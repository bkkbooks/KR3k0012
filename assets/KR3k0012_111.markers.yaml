  - {type: variant, offset: 1785, length: 592, content: 聖弘道元年十二月大帝崩皇太子顯即位尊天后為皇太后既將篡奪是日自臨朝稱制嗣聖元年春正月甲申朔改元二月戊午廢皇帝為廬陵王幽于別所仍改名哲己未立豫王輪為皇帝令居於別殿大赦天下改為文明皇太后仍臨朝稱制庚申廢皇太孫重照為庶人九月柳州司馬徐敬業殺楊州長史陳敞之舉兵移檄天下左玉鈐衛大將軍李孝逸討平之垂拱四年五月皇太后加尊號曰聖母神皇秋七月大赦天下八月壬寅愽州刺史瑯琊王冲據愽州起兵命左金吾大將軍丘神勣為行軍揔管討之庚戍冲父豫州刺史越王貞又舉兵與冲相應九月命內史岑長倩鳳閣侍郎張光輔左監門大將軍麴崇裕率兵討之景寅斬貞及冲等傅首神都改姓為虺音卉氏曲赦愽州韓王元嘉魯王靈夔元嘉子黃國公譔音選靈夔子左散騎常侍范陽王藹霍王元軌及子江都王緒故虢王元鳳子東莞音管公融坐與貞通謀元嘉靈夔自殺元軌配流黔州譔等伏誅改姓虺氏自是宗室諸王相繼誅死者殆將盡矣其子孫年幼者咸配流嶺外并誅其親黨數百餘家載初元年春正月神皇親享明堂大赦天下依周制建子月為正月改十二月為臘月改舊正月為臺月大酺三日神皇以曌字為名遂改詔書為制書秋九月革唐命改國號為周改元為天授大赦天下乙酉加尊號為聖神皇帝降皇帝輪為皇嗣景戍立武氏七廟追尊神皇父士彠為孝明皇帝證聖元年春正月加尊號曰慈氏越古金輪聖神皇帝大赦天下改元大酺七日二月上去慈氏越古尊號秋九月親祀南郊加尊號天冊金輪聖神皇帝大赦天下改元為天冊萬歲大辟罪已下及犯十惡常赦所不原者咸赦除之大酺九日萬歲登封元, SBCK: ''}
  - {type: variant, offset: 1785, length: 592, content: 聖弘道元年十二月大帝崩皇太子顯即位尊天后為皇太后既將篡奪是日自臨朝稱制嗣聖元年春正月甲申朔改元二月戊午廢皇帝為廬陵王幽于別所仍改名哲己未立豫王輪為皇帝令居於別殿大赦天下改為文明皇太后仍臨朝稱制庚申廢皇太孫重照為庶人九月柳州司馬徐敬業殺楊州長史陳敞之舉兵移檄天下左玉鈐衛大將軍李孝逸討平之垂拱四年五月皇太后加尊號曰聖母神皇秋七月大赦天下八月壬寅愽州刺史瑯琊王冲據愽州起兵命左金吾大將軍丘神勣為行軍揔管討之庚戍冲父豫州刺史越王貞又舉兵與冲相應九月命內史岑長倩鳳閣侍郎張光輔左監門大將軍麴崇裕率兵討之景寅斬貞及冲等傅首神都改姓為虺音卉氏曲赦愽州韓王元嘉魯王靈夔元嘉子黃國公譔音選靈夔子左散騎常侍范陽王藹霍王元軌及子江都王緒故虢王元鳳子東莞音管公融坐與貞通謀元嘉靈夔自殺元軌配流黔州譔等伏誅改姓虺氏自是宗室諸王相繼誅死者殆將盡矣其子孫年幼者咸配流嶺外并誅其親黨數百餘家載初元年春正月神皇親享明堂大赦天下依周制建子月為正月改十二月為臘月改舊正月為臺月大酺三日神皇以曌字為名遂改詔書為制書秋九月革唐命改國號為周改元為天授大赦天下乙酉加尊號為聖神皇帝降皇帝輪為皇嗣景戍立武氏七廟追尊神皇父士彠為孝明皇帝證聖元年春正月加尊號曰慈氏越古金輪聖神皇帝大赦天下改元大酺七日二月上去慈氏越古尊號秋九月親祀南郊加尊號天冊金輪聖神皇帝大赦天下改元為天冊萬歲大辟罪已下及犯十惡常赦所不原者咸赦除之大酺九日萬歲登封元, krp: ''}
