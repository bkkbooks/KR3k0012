  - {type: variant, offset: 4461, length: 0, content: '', krp: 於上壇有司祀五帝百神于下壇禮畢藏玉冊於封祀壇之石䃭然後燔柴燎發群臣稱萬歳傳呼自山頂至嶽下震動山谷上還齋宫慶雲見日抱戴辛夘祀皇地祇于社首藏玉冊於石䃭如封祀壇之禮壬辰御帳殿受朝賀大赦天下封太山神爲天齊王禮秩加三公一等環山十里禁其樵採賜酺七日甲午發岱嶽景申幸孔子宅親設奠祭十二月己巳至東都時累歳豐稔東都米㪷十錢青齊米㪷五錢是冬分吏部爲銓勑禮部尚書蘇頲刑部尚書韋抗工部尚書盧從愿等分掌選事十四年五月癸夘户部進計帳今年管户七百六萬九千五百六十五管口四千一百四十一萬九千七百一十二二十二年五月關中大風拔木同州尤甚是夏上自於苑中種麥率皇太子巳下躬自收穫謂太子等曰此將薦宗廟是以躬親亦欲令汝等知稼穡之難也因分賜侍臣謂曰此歳令人廵檢苗稼所對多不實故自種植以觀其成且春秋書麥禾豈非古人所重也二十五年春正月壬午制曰朕猥集休運多謝哲王然而哀矜之情小大必愼自臨寰宇子育蒸黎未甞行極刑起大獄上玄降鑒應以祥和思叶平邦之典致之仁壽之域自今有犯死刑除十惡罪冝令中書門下與法官詳所犯輕重具狀奏聞秋七月己夘大理少卿徐岵奏天下今歳斷死刑五十八幾致刑措二十七年八月甲申制追贈孔宣父爲文宣王顔回爲兖國公餘十哲皆爲侯夾坐後嗣襃聖侯改封爲文宣公二十九年正月制兩京諸州各置玄元皇帝廟并置崇玄學天寳元年春正月丁未朔大赦天下改元常赦不原咸赦除之百姓有欠負租稅及諸色並免之前資官及白身人有儒學愽通文詞秀逸及軍謀武藝者所在具以名薦京文武官才堪爲刺史者各令封狀自舉改黄鉞爲金鉞内外官各賜勲兩轉甲寅陳王府參軍田同秀上言玄元皇帝降見于丹鳯門之通衢告錫靈符在尹喜之故宅上遣使就函谷故關尹喜臺西發得之乃置玄元廟於大寜坊二月丁亥上加尊號爲開元天寳聖文神武皇帝辛夘親享玄元皇帝于新廟甲午親享太廟景申合祭天地于南郊制天下囚徒罪無輕重並釋放三載正月景辰朔改年爲載四載秋八月甲辰冊太眞妃楊氏爲貴妃七載三月乙酉大同殿柱産玉芝有神光照殿羣臣請加皇帝尊號曰開元天寳聖文神武應道許之夏五月壬午上御興慶宫受冊徽號大赦天下六月范陽節度使安禄山賜實封及鐵劵十一載十一月庚申御史大夫兼蜀郡長史楊國忠爲右相兼文部尚書十三載二月禄山奏前後討奚契丹立功將士跳盪等請超三資於是超授將軍者五百餘人中郎將者二千餘人十四載冬十月壬辰幸華清宫景寅范陽節度使安禄山率蕃漢之兵十餘萬自幽州南向指闕以誅楊國忠爲名先殺太原尹楊光􅔘於博陵郡壬申聞於行在所癸酉以郭子儀爲靈武太守朔方節度使封常清自安西入奏至行在甲戍以常清爲范陽平盧節度使令募兵三萬以禦逆胡戊寅還京十二月景戍朔禄山於靈昌郡渡河辛夘䧟陳留郡殺張介然甲午䧟滎陽郡殺太守崔無詖景申封常清與賊戰于成皐甖子谷官軍敗績常清奔于陜郡丁酉禄山䧟東京殺留守李憕中丞盧弈判官蔣清時髙仙芝鎮陜郡棄城西保潼關常山太守顔杲卿與長史袁履謙賈深等殺賊將李欽湊執賊將何千年髙邈送京師辛丑詔皇太子統兵東討十五年春正月乙夘御宣政殿受朝其日禄山僣號於東京六月庚寅哥舒翰將兵八萬與賊將崔乾祐戰于靈寳西原官軍大敗死者十六七甲午將謀幸蜀乃下詔親征仗下後士庻恐駭奔走于路乙未凌晨自延秋門出微雨霑濕扈從唯宰相楊國忠韋見素内侍髙力士太子親王妃主皇孫已下多從之不及平明渡便橋國忠欲斷橋上曰後來者何以能濟命緩之辰時至咸陽望賢驛置頓官吏駭散無復儲擬上憩於宫門之樹下亭午未進食俄有老父獻麨上謂之曰爾可進飰於是百姓獻食相繼俄又尚食持御膳至上頒給從官而後食是夕次金城縣官吏巳遁令魏方進男允招誘俄得智藏寺僧進蒭粟行從方給景辰次馬嵬驛諸衛頓軍不進龍武大將軍陳玄禮奏曰逆胡指闕以誅國忠爲名然中外羣情不無嫌怨今國歩艱阻乗輿震蕩陛下冝徇羣情爲社稷大計國忠之徒可致之於法㑹吐蕃使二十一人遮國忠告訴於驛門衆即呼曰楊國忠連蕃人謀逆兵士圍驛四合及誅楊國忠魏方進一族兵猶未解上令髙力士詰之廻奏曰諸將旣誅國忠以貴妃在宫人情恐懼上即命力士賜貴妃自盡玄禮等見上請罪命釋之丁酉將發馬嵬驛朝臣唯見韋素一人乃命素子京兆府司録諤爲御史中丞充置頓使議其所向軍士或言河隴或言靈武太原或言還京爲便韋諤曰還京湏有捍賊之備兵馬未集恐非萬全不如且幸扶風徐圖所向上詢于衆衆以爲然及行百姓遮路乞留皇太子願戮力破賊收復京城即日留太子戊戍次扶風縣巳亥次扶風郡軍士各懷去就咸出醜言陳玄禮不能制㑹益州貢春綵十萬疋上悉命置于庭召諸將諭之曰卿等國家功臣陳力乆矣朕之優獎常亦不輕逆胡背恩事湏廻避甚知卿等不得別父母妻子朕亦不及親辭九廟言發涕流又曰朕湏幸蜀路險狹人若多往恐難供承今有此綵卿等即冝分取各圖去就朕自有子弟中官相隨便與卿等訣別衆咸俯伏涕泣曰死生願從陛下上曰去住任卿自是悖亂之言稍息庚子以司勲郎中劒南節度留後崔圎爲蜀郡長史劒南節度副大使以頴王璬爲劒南節度大使以監察御史宋若思爲御史中丞充置頓使韋諤充廵閣道使並令先發辛丑發扶風郡是夕次陳倉壬寅次散關分部下爲六軍頴王璬先行壽王瑁等分統六軍前後左右相次景午次河池郡崔圎奏劒南歳稔民安儲供無闕上恱授圎中書侍郎同中書門下平章事蜀郡長史劒南節度如故以前華州刺史魏仲犀爲梁州長史秋七月壬戍次益昌縣渡吉栢江有雙魚夾舟而躍議者以爲龍甲子次普安郡憲部侍郎房琯自後至上與語甚恱即日拜爲吏部尚書同中書門下平章事丁夘詔以皇太子諱充天下兵馬元帥都統朔方河東河北平盧等節度兵馬收復兩京庚午次巴西郡庚辰車駕至蜀郡扈從官吏軍士到者一千三百人宫女二十四人而巳八月癸未朔御蜀郡府衙宣詔大赦天下癸已靈武使至始知皇太子即位丁酉上用靈武冊稱上皇詔稱誥巳亥上皇臨軒降冊冊肅宗命宰臣韋見素房琯使靈武冊命曰朕稱太上皇軍國大事先取皇帝處分後奏朕知俟克復兩京朕當怡神姑射偃息大庭明年九月郭子儀收復西京十月肅宗遣中使啖廷瑶入蜀奉迎丁夘上皇發蜀郡十一月景申次鳯翔郡肅宗遣精騎三千至扶風迎衛十二月景午肅宗具法駕至咸陽望賢驛迎奉上皇御宫之南樓肅宗拜慶樓下嗚咽流涕不自勝爲上皇徒歩控轡上皇撫背止之即騎馬前導丁未至京師文武百寮京城士庻夾道歡呼靡不流涕即日御大明宫之含元殿見百寮上皇親自撫問人人感咽上皇謁廟請罪遂幸興慶宫三載二月肅宗與群臣奉上皇尊號曰太上至道聖皇帝乾元三年七月丁未移幸西内之甘露殿時閹官李輔國離間肅宗故移居西内髙力士陳玄禮等遷謫上皇䆮不懌上元二年四月甲寅}
