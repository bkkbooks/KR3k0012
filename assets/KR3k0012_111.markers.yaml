  - {type: variant, offset: 4455, length: 1, content: 甲, SBCK: 癸}
  - {type: variant, offset: 4455, length: 0, content: '', WYG: 李光弼郭子儀出土門路敗賊衆於常山郡東嘉山河北諸郡順歸者千餘祿山窘急圖欲却投范陽㑹哥舒翰自潼闗領馬步八萬與賊將崔乾祐戰於靈寳西為賊覆敗西奔潼闗為其帳下執送與賊關門不守𤣥宗幸蜀十一月遣阿史那承慶攻陷頴州屠之祿山以體肥及造逆後兩眼漸暗至是不見物又苦疽疾至徳二年正月朔受朝瘡甚而中罷尤躁急動用斧鉞嚴莊亦被捶撻莊謀立慶緒領李猪兒同入禄山帳中猪兒以大刀斫其腹祿山眼無所見捫床頭刀不得但撼幄帳中大呼曰是我家賊腹已破血流數斗在床上言訖氣絶莊即宣言於外言祿山傳位於晉王慶緒縦樂飲酒無度呼莊為兄事之小大必咨之慶緒為偽主素懦弱言詞無序二月肅宗南幸鳯陽郡始知祿山死使僕固懐恩使于回紇結婚請兵討逆九月廣平王領蕃漢之衆收西京走安守忠賊之死者積如山阜王師乗勝至陜郡賊懼令嚴莊傾其驍勇而來拒廣平王遣副元帥郭子儀等與賊戰于陜州西曲沃大破之斬首十餘萬嚴莊奔至京告慶緒慶緒率其餘衆奔河北保節郡嚴莊至河内南來歸順賊將阿史那承慶等麾下三萬餘衆悉奔恒趙范陽従慶緒者唯疲卒一千騎三百而已乾元元年九月肅宗遣郭子儀等九節度率步騎二十萬以攻之子儀使善射者三千人伏於壘垣内明日接戰子儀麾其屬偽奔慶緒逐之伏者齊發賊軍大潰使薛嵩求救於史思明言禪讓之禮思明先遣李歸仁以步騎二萬馬軍三千先徃滏陽以應之及至滏陽子儀之圍已固築城穿壕各三重引水以灌城下思明南攻魏州節度使崔光逺南走思明據之乾元二年正月思明稱周王慶緒自十月被圍至二月城中人相食思明引衆來救三月子儀等戰敗遂解圍而南斷河陽橋以守榖水思明領其衆營於節縣南慶緒使收子儀等營中粮千六石萬石張通儒髙尚平列謂慶緒曰史王逺來臣等皆合迎謝對曰任公暫徃見思明思明與之涕泗厚其禮復令歸城經三日慶緒以三百騎詣思明引入令三軍環}
