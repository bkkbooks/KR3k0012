  - {type: variant, offset: 4489, length: 0, content: '', SBCK: 見金栗山崗有龍盤鳯翥之勢復近先塋謂侍臣曰吾千秋後冝葬此地得奉先陵不志孝敬矣至是追奉先旨以創􅃦園廣德元年三月辛酉葬㤗陵安禄山附唐書安禄山營州栁城雜種胡人也本無姓氏名軋􅕸山母阿史德氏亦突厥巫師以卜爲業開元􅀄與將軍安道買男俱逃出突厥中安道買次男貞節爲嵐州别駕收獲之年十餘歳矣冒姓爲安及長解六蕃語二十年張守珪爲幽州節度禄山盗羊事覺守珪剥坐欲捧殺之大呼曰大夫不欲㓕兩蕃耶何爲打殺禄山守珪見其肥白壯其言而釋之令與郷人史思明同捉生行必尅獲拔爲偏將以驍勇聞遂養爲子二十八年爲平盧兵馬使性巧宻人多譽之授營州都督平盧軍使厚賂往來者乞爲好言􅀇宗益信嚮之}
