  - {type: variant, offset: 4494, length: 2, content: 改謚, SBCK: 正月謁於華清宫因涕泣言臣蕃人不識字陛下擢臣不次􅀍楊國忠欲得殺臣􅀇宗益親厚之遂以爲左僕射却廻又請爲閑廐隴右群牧等都使又請知揔􅁥事旣爲閑廐羣牧等使上䈥脚馬皆隂選擇之三月歸范陽疾行出􅀜日三四百里至范陽人言反者􅀇宗必大怒􅅞送與之十四載十一月反於范陽矯稱奉恩命以兵討逆賊楊國忠以諸蕃馬歩十五萬以髙尚嚴莊爲謀主孫孝哲髙邈何千年爲腹心天下承平日乆人不知戰聞其兵起朝廷震驚禁衛皆市井啇販之人乃以髙仙芝封常清等擊之禄山又嚴肅得士死力無不一當百遇之必敗十二月渡河遂入陳留郡太守郭納出降至滎陽太守崔無詖拒戰城䧟死之次于汜水甖子谷乃取谷南而過東京留守李憕中丞盧弈使採訪判官蔣清燒絶河陽橋禄山入東京殺李憕盧弈蔣清召河南尹逹奚珣使之蒞事十五年正月賊竊號燕國年號聖武逹奚珣已下署爲將相五月南陽節度魯炅率荆襄黔中嶺南子弟十萬與賊將武令珣戰于葉縣城北滍河王師盡没六月李光弼郭子儀出土門路大破賊衆於常山郡東嘉山河北諸郡歸順者十餘禄山窘急圖欲却投范陽㑹哥舒翰自潼􅀜領馬歩八萬與賊將崔乾祐戰于靈寳西爲賊覆敗翰西奔潼􅀜爲其帳下執送于賊􅀜門不守􅀇宗幸蜀十一月遣阿史那承慶攻䧟頴川屠之禄山以體肥及造逆後而眼漸暗至是不見物又着疽疾至德二年正月朔受朝瘡甚而中罷尤躁急動用斧􅃏嚴莊亦􅀍捶撻莊謀立慶緒領竪李猪兒同入禄山帳中猪兒以大刀斫其腹禄山眼無所見捫床頭刀不得但撼幄帳中大呼}
