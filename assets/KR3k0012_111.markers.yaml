  - {type: variant, offset: 4500, length: 1, content: 聖, krp: 必咨之慶緒爲僞主素懦精神言詞無序二月肅宗南幸鳯翔郡始知禄山死使僕固懷恩使于廻紇結婚請兵討逆九月廣平王領蕃漢之衆收西京走安守忠賊之死者積如山阜王師乗勝至陜郡賊懼令嚴莊傾其驍勇而來拒廣平王遣副元帥郭子儀等與賊戰于陜西曲沃}
  - {type: variant, offset: 4502, length: 1, content: 興, SBCK: 破之斬首十餘萬嚴莊奔至東京告慶緒慶緒率其餘衆奔河北保鄴郡嚴莊至河内南來歸順賊將阿史那承慶等麾下三萬餘衆悉奔􅁪趙范陽從慶緒者唯疲卒一千􅀐三百而巳乾元元年九月肅宗遣郭子儀等九節度率歩􅀐二十萬以攻之子儀使善射者三千人伏於壘垣内明日接戰子儀麾其屬僞奔慶緒逐之伏者齊發賊軍大潰使薛髙求救於史思明言禪讓之禮思明先遣李歸仁以歩􅀐一萬馬軍三千先往􅇭陽以應之及至􅇭陽子儀之圍巳固築城穿壕各三重引水以灌城下思明南攻魏州節度使崔光逺南走思明據其城乾元二年正月思明僞稱燕王慶緒自十月􅀍圍至二月城中人相食思明引衆來救三月子儀等戰敗遂解圍而南斷河陽橋以守榖水思明領其衆營於鄴縣南慶緒使收子儀等營中粮尚六七萬石張通儒髙尚平列謂慶緒曰史王逺來臣等皆合迎謝對曰任公蹔往見思明思明與之涕泗厚其禮復令歸城經三日慶緒以三百􅀐詣思明思明引入令三軍擐甲執兵待之及諸弟領至于庭再拜稽首曰臣不克􅀒荷弃失兩都乆䧟重圍不意大王以太上皇之故將兵逺救思明曰弃失兩都用兵不利亦何事也爾爲人子殺汝父以求位庸非大逆乎吾爲太上皇討賊即牽出并其四弟及髙尚孫}
