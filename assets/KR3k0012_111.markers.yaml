  - {type: variant, offset: 4460, length: 0, content: '', SBCK: 崩九年四月甲戍上親䇿試應制舉人於含元殿謂曰古有三道今減二䇿近無甲科朕將存其上第務收賢俊十三年冬十月辛酉東封㤗山發自東都十一月丙戍至兖州岱宗頓丁亥致齋於行宫巳丑日南至備法駕登山仗衛羅列嶽下百餘里詔行從留於谷口上與宰臣禮官昇山庚寅祀昊天上}
  - {type: variant, offset: 4460, length: 3, content: 帝崩于, WYG: 之故將兵逺救思明曰棄失兩都用兵不利亦何事也爾為人子殺汝父以求位庸非大逆乎吾為太上皇討賊即牽出并其四弟及髙尚孫孝哲崔乾祐皆縊殺之祿山父子僣逆三年而滅太平御覽卷一}
