  - {type: variant, offset: 2050, length: 397, content: 年因便送出又三十年王果卒又曰桓玄時牛大疫有一人食死牛肉因得病亡死時見人執錄將至天上有一貴人問云此人何罪對曰此人坐食疫牛肉貴人云須牛以轉輸肉以充百姓食何故復殺之催令還既更生具說其事於是食牛肉者旡復有患又曰于慶無病卒吳猛語慶子曰于侯筭未窮方為請命未可殯殮尸臥淨舍唯心下尚暖七日時盛暑慶形體向壞猛教令屬纊候氣續為作水令以與洗并飲漱如此便退日中許慶蘇但開眼張口不得發聲時合門欣喜以向水洗唅吐腐血數升能言語三日平復如常說初見十數人來執縛桎梏到獄同輩十餘人以次語對未至俄而見吳君北面陳釋聽斷之王勑脫械歸所經官府莫不迎接請謁吳君皆與抗禮不知悉何神耳愽物志曰漢末大亂有發前漢時宮人冢者宮人猶活既出平復如舊魏郭后愛念之錄著宮中常置左右問漢時宮中事說之了了皆有次緒及郭后崩哭泣過遂死又曰魏大司馬曹休所統中郎將謝漳部曲義兵奚儂息女年四歲病死故埋藏五日復生太和三年七月詔令休使父母持送女來視之其年四月三日病死四日埋藏至, SBCK: ''}
