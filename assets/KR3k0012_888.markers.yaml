  - {type: variant, offset: 342, length: 0, content: '', SBCK: 同體而生二頭四足手是爲􅀩􅀟氏續捜神記曰尋陽縣北山中蠻人有術能使人化作虎毛色爪牙悉真虎郷人周眕有一奴使入山伐薪奴有婦及妹亦與俱行旣至奴語二人云汝旦上髙樹視我所爲如其言旣而入草湏􅁷見一大黃班虎從草出奮迅吼喚甚爲可畏二人大怖良乆還草中少時復還爲人語二人曰歸家愼勿道後遂向等軰􅀃之周得知乃以淳酒飲之令熟醉使人解其衣服及身體事事詳視了無所異唯於髻中得一􅁓􅀞作大虎虎邊有符周宻取録之奴旣醒喚問之見事巳露遂具􅀃夲末云先甞於蠻中告糴有一蠻師云有此術以三尺布數􅂛米麺一赤雄雞一􅂛酒受此法又曰清河宋士宗母以黄􅀄中夏天於浴室裏浴遣家中子女盡出户獨在一室中良乆家人不解其意於壁穿中闚不見人正見木盆水中有一大鼈遂開户大小悉入乃與人}
