  - {type: variant, offset: 537, length: 0, content: '', SBCK: 採桑虎徃取之食食竟乃藏其􅁫釧著山石門後還作}
  - {type: variant, offset: 537, length: 446, content: 人為上其後王莽篡位又曰晉咸寧中琅邪顏畿得病就醫張嗟自治死於嗟家家人迎喪旐每繞樹木不可解送喪者或為之傷乃言曰我壽命未應死但服藥太多傷我五臟耳今當復活慎無葬我也父拊而祝之曰若爾有命復當更生豈非骨肉所願今但欲還家不葬爾也旐乃解還家乃開棺形骸如故微有人色而手爪所刮摩棺材皆傷於是漸漸氣息以緜飲瀝口能咽遂乃出之日久飲食稍多能開目視瞻屈伸手足然不與人相當不能言語飲食猶常人如此者十餘年家疲相供護不復得操事其弟弘都絕棄人事躬侍養以知名後氣力稍更衰劣卒後還死又曰建安中南陽賈偶字文合得病卒亡死時有吏將詣太山同名男女十人司命閱呈謂行吏曰當召某郡文合來何以召此人促遣令去時日暮治下有禁不得舍遂至郭門外大樹下宿有好女獨行無伴文合問之曰子似衣冠家何為步行姓字為誰女曰我三河人也父見為易陽令昨錯召來今得遣去遂逼日暮懼獲瓜田李下之譏望君之容似類賢者是以停留依憑左右文合曰悅子之心願交歡於今夕女曰聞之諸姑婦人以貞專為德潔白為稱文合與相反覆終無動志天明別去文合死已再宿停當歛視其面有色摸心溫半日間蘇文合將驗其事遂至易陽問其令, WYG: ''}
