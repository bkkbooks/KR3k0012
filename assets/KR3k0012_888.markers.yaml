  - {type: variant, offset: 2699, length: 4, content: 陰氣淖小, WYG: 顔色美好盖山之精也蜀王取以為妻不習水土疾病欲歸蜀王留之無幾物故蜀王發卒於武都擔土於成都郭中葬之盖地數畆髙七丈號曰武擔以石作鏡一枚表其墓於是秦王知蜀王好色乃獻美女五}
