  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 四變化下莊子曰夫白鶂之相視眸子不運而風化蟲雄鳴於上風雌應之於下風而風化鶂以眸子相視蟲鳴以聲相因不待合而便生子故曰風化也淮南子曰夫歷陽之都一夕反爲湖勇力聖智與怯不肖者同命歷陽屬九江郡歷陽縣中有老嫗常行仁義有兩諸生過之謂曰此國當没爲湖嫗視東城閫有血便走上山勿反顧也自此嫗數徃視閫門吏問之對如其言暮門吏殺雞以血塗門閫明日嫗徃視門見血便走上山因没爲湖又曰有牛哀者病七日化而爲虎兄啓户而入哀􅅮而殺之又曰雌雄相接隂陽相薄羽者爲雛鷇毛者爲駒犢軟者爲皮􅁏堅者爲齒角人不恠也水生蚌蜃山生金玉人不恠也老槐生火乆血爲燐人弗恠也水生罔象木生畢方井生墳羊人恠之聞見鮮而所識淺也論衡曰天地不變日月不易星辰不没正也人受正氣故體不變男化爲女女化爲男由髙岸爲谷深谷爲陵也應政爲變非常恠也蠐螬化爲復育轉而爲蟬蟬生翼翼不􅀋蠐螬凡諸螟􅀋多化也抱朴子曰周穆王南征一軍盡化君子爲楥爲鵠小人爲蟲爲沙又曰案老子玉䇿云松脂入地千年變爲伏苓伏苓千年變爲虎魄虎魄千年變爲石膽石膽千年變爲威喜千歳之狐豫知將來千歳之狸變爲好女千歳之猨變爲老人又曰伍􅀍記八公造淮南王安􅀄爲老公不見通湏􅁷皆成少年又墨子五行書云墨子能變形易貌坐在立亡蹙面則成老人含􅀏則成女子踞地則成小兒􅀶物志曰化民食桑二十七年以絲自裹九年死又曰吴王江行食膾棄於中流化而爲魚今魚有名王餘者長數寸大如箸猶有膾形又曰無䏿民穴居食土無男女死埋之其心不朽百年還化爲人又曰埋蜻蜓頭於西向户下則化成青珠也又曰江漢有貙人能爲虎俗云貙虎化爲人好着葛衣其足無踵有五指者皆貙也越隍之國老者時化爲虎寜州南見有此物王子年拾遺録曰崑崙者西方曰湏彌山最下層有螭潭百里多龍螭皆白色千歳一蛻其五藏潭側有五色石云是白螭之膓化爲此石又曰因墀國去王都十六萬里有解形之民放其身於空潭先使頭飛於南方次使左手飛於東方次使右手飛於西方自齊以下兩足􅀌立至暮頭還於體兩手不至遇疾風吹兩手於北海玄洲上化爲五足之獸則一指爲一足也蜀王夲紀曰蜀王之先名􅁞叢後代名曰栢濩後者名魚鳬此}
