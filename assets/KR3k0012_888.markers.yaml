  - {type: variant, offset: 2713, length: 4, content: 豫章男子, WYG: 五丁共引地山崩壓五丁五丁大呼秦王五女及送迎者悉}
  - {type: page-break, offset: 2713, content: '', id: KR3k0012_WYG_888-5b, image: WYG0900/WYG0900-0730d.png}
  - {type: variant, offset: 2719, length: 0, content: '', WYG: 石蜀王登臺望之不來因名五}
  - {type: variant, offset: 2720, length: 0, content: '', WYG: 候臺蜀王親埋作冢皆致方石以誌其墓列異傳曰昔鄱陽郡安樂縣有人姓彭世以捕射為業兒随父入山父忽蹶然倒地乃變成白鹿兒悲號鹿遂跳躍逺逝遂失所在兒於是不捉弓終身至孫復學射忽得一白鹿乃於鹿角間得道家七星符并有其祖姓名年月分明視之惋悔乃燒去弧矢又曰武昌新縣北山上有望夫石狀若人立者傳云昔有貞婦其夫從役逺赴國難婦携幼}
  - {type: page-break, offset: 2720, content: '', id: KR3k0012_WYG_888-6a, image: WYG0900/WYG0900-0731a.png}
  - {type: punctuation, offset: 2721, content: ，, id: KR3k0012_CHANT_888-bkkpn732}
  - {type: 'tls:seg', offset: 2721, content: '', id: KR3k0012_CHANT_888-21a.12}
  - {type: variant, offset: 2721, length: 1, content: 嫁, WYG: 餞送此山立望而形化為石丹陽記曰孫皓寳鼎元年丹陽宣蹇之母年八十因浴於後湖化為鼈捜神記曰千嵗之雉入海為蜃百年之雀入江為蛤千嵗龜黿能與人語千嵗蛇斷而復續百年之䑕能相卜數之至也春分之日鷹變為鳩秋分之日鳩變為鷹時之化也故腐草之為螢也朽葦之為蚕也麥之為蛺蝶也羽翼生焉眼目成焉心知出焉自無知而化為有知而氣易也蛇之為鼈也蚕之為蝦也不失其血氣而形性變也又曰土蜂名曰蜾臝今世謂之蝄蜽細腰之類也其為物純雄而無雌不交不産常取桑䖝之子而育之則皆成己子焉又曰麥之為蝶由於濕也爾則萬物之變皆有以也農民止麥之化者漚之以灰聖人理萬物之化者濟之以道又曰南方有落頭民其頭能飛其種人部有祭祀號曰蟲落故因取名焉呉時將軍朱桓得一婢每夜卧後頭輙飛去或從狗竇或從天窓中出入以耳為翼將曉復還如此傍人怪之夜中照視唯身無頭其體㣲冷氣息裁屬乃蒙之以被至時頭還礙被不得安兩三度墮地噫咤甚愁體氣甚急狀若將死乃去被頭復起𫝊頸有頃平和桓以為大怪畏不敢畜乃放還之既而詳之乃知天性也時南征大將亦往往得之又嘗有覆以銅盤者頭不得進死又曰昔者髙陽氏有同産而為夫婦帝放之於崆峒之野相抱而死神鳥以不死草覆之七年男女同體而生二頭四手足是為蒙雙氏續捜神記曰尋陽縣北山中蠻人有術能使人化作虎毛色爪牙悉如真虎鄉人周眕有一奴使入山伐薪奴有婦及妹亦與俱行既至奴與二人云汝且上髙樹視我所為如其言既而入草須臾見一大黃班虎從草出奮迅吼喚甚為可畏二人大怖良久還草中少時復還}
