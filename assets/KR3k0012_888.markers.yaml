  - {type: variant, offset: 2724, length: 1, content: 婦, WYG: 語二人曰歸家慎勿道後遂向等軰説之周得知乃以淳酒飲之令熟醉使人解其衣服及身體事事詳悉了無所異惟於髻中得一紙畫作大虎虎邊有符周宻取録之奴既醒喚問之見事已露遂具説本末云先嘗於蠻中告糴有一蠻師云有此術以三尺布數升米􅀈一赤雄雞一升酒受此法又曰清河宋士宗母以黃初中夏天於浴室裏浴遣家中子女盡出戸獨在一室中良久家人不解其意於壁穿中闚不見人正見木盆水中有一大鼈遂開户大小悉入了不與人相承嘗先著釵猶在頭上相與守之積日轉懈遂自投出户外其去甚駛逐之不及遂便入水後數日忽還巡行宅舍如平}
