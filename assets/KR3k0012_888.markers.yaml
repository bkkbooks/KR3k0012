  - {type: variant, offset: 332, length: 2, content: 晉武, SBCK: 千歳之雉入海爲蜃百年之雀入江爲鴿千歳􅀛黿能與人語千歳虵斷而復續百年之䑕能相卜數之至也春分之日鷹變爲鳩秋分之日鳩變爲鷹時之化也故腐草之爲螢也朽葦之爲蚕也麥之爲蛺蝶也羽翼生焉眼目成焉心知存焉此自無知而化爲有知而氣易也䳰之爲也虵之爲鼈也蛬之爲蝦也不失其血氣而形性變也又曰􅁟蜂名曰蜾今丗謂之蝄䗸細腰之􅀋也其爲物純雄而無雌不交不産常取桑蟲之子而育之則皆化成巳子焉又曰麥之爲蝶由于濕也爾則萬物之變皆有以也農夫止麥之化者區之以􅁅聖人理萬物之化者濟之以道又曰南方有落頭民其頭能飛其種人部有􅀕祀號曰蠱落故因取名焉吴時將軍朱桓得一婢毎夜卧後頭輒飛去或從狗竇或從天䆫中出入以耳爲翼將曉復還如此傍人恠之夜中照視唯身無頭其體微冷氣息裁属乃蒙之以􅀍至時頭還礙􅀍不得安兩三墮地噫咤甚愁而其體氣急􅃺􅀂將死乃去􅀍頭復起傳頸有頃平和桓以爲巨恠畏不敢畜乃放還之旣而詳之乃知天恠也時南征大將亦徃徃得之又甞有覆以銅盤者頭不得進死又曰昔者髙陽氏有同産而爲夫婦}
