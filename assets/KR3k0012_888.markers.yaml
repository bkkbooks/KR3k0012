  - {type: xml-element, offset: 4, content: '', id: KR3k0012_CHANT_888-bkkxmlele1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_888-1a.1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_888-1a.2}
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 代各數百歳皆神化不死其民亦頗隨王化去王獵至湔山便仙去今廟祀之於湔時蜀民稀少後有一男子名曰杜宇從天墮止朱提有一女子名利從江源地井中出爲杜宇妻宇自立爲蜀王號曰望帝治汶山下邑郫化民徃徃復出望帝積百餘歳荆有一人名鼈靈其尸亡去荆人求之不得鼈靈尸至蜀復生蜀王以爲相時玉山出水􅀂堯之洪水望帝不能治水使鼈靈决玉山民得陸處鼈靈治水去後望帝與其妻通帝自以薄徳不如鼈靈委國援鼈靈而去如堯之禪舜鼈靈即位號曰開明竒帝生盧保亦號開明天爲蜀王生五丁力士能徙蜀山王死五丁輒立大石長三丈}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_888-3a}
  - {type: variant, offset: 4, length: 0, content: '', krp: 代各數百歳皆神化不死其民亦頗隨王化去王獵至湔山便仙去今廟祀之於湔時蜀民稀少後有一男子名曰杜宇從天墮止朱提有一女子名利從江源地井中出爲杜宇妻宇自立爲蜀王號曰望帝治汶山下邑郫化民徃徃復出望帝積百餘歳荆有一人名鼈靈其尸亡去荆人求之不得鼈靈尸至蜀復生蜀王以爲相時玉山出水若堯之洪水望帝不能治水使鼈靈决玉山民得陸處鼈靈治水去後望帝與其妻通帝自以薄徳不如鼈靈委國援鼈靈而去如堯之禪舜鼈靈即位號曰開明竒帝生盧保亦號開明天爲蜀王生五丁力士能徙蜀山王死五丁輒立大石長三丈}
  - {type: variant, offset: 5, length: 2, content: 生左, SBCK: 千鈞號曰石井千人不能動萬人不能移蜀王據有巴蜀之地夲治廣都後徙治成都秦惠王時蜀王不降􅁗􅁗亦無道出於蜀蜀王從萬餘人東獵褒谷卒見􅁗惠王惠王以金一笥遺蜀王蜀王報以禮物物盡化爲土秦王大怒臣下皆再拜賀曰土者土地秦當得蜀矣秦王恐亡相見處乃刻五石牛置金其後蜀王以爲金便令五丁拖牛成道致三枚於成都􅁗道乃得通石牛之力也武都人有善知蜀王者將其妻女適蜀王居蜀之後不習水土欲歸蜀王愛其女留之乃作伊鳴之聲六曲以樂之或曰前是武都丈夫化爲女子顔色美好蓋山之精也蜀王取以爲妻不習水土疾病欲歸蜀王留之無幾物故蜀王發卒於武都檐土於成都郭中葬之盖地數􅅿髙七丈號曰武擔以石作鏡一枚表其墓於是􅁗王知蜀王好色乃獻美女五人與蜀王愛之遣五丁迎女還至梓潼見一大蛇入山穴中五丁共引蛇山崩壓五丁五丁大呼􅁗王五女及送迎者上化爲石蜀王登臺望之不來因名五婦候臺蜀王親理作冡皆致方石以誌其墓列異}
