  - {type: variant, offset: 2773, length: 1, content: 氏, WYG: 母相似異苑曰豫章郡吏易㧞義熙中受畨還家逺遁不返郡遣追見㧞言語如常亦為設食使者催令束裝㧞因語曰汝看我面乃見眼目角張身有黃班便豎一足徑出門去家先依山為居至林麓變成三足大虎所豎一脚即成其尾又曰邵陵髙平黃秀以元嘉三年無故入山經日不還其兒根生尋覔見蹲空樹中從頭至腰毛色如熊問其何故答云天譴我如此汝但自去哀慟而歸踰年伐山人見}
