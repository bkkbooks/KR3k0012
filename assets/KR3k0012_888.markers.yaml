  - {type: variant, offset: 2448, length: 1101, content: 日同墟人採桑聞兒啼聲即語儂妻往發視兒生活今能飲食如常陸氏異林曰鍾繇嘗數月不朝會意性異常或問其故云常有好婦來美麗非凡問者曰必是鬼物可殺之婦人後往不即前止戶外繇問何以曰公有相殺意繇曰無此勤勤呼之乃曰繇意恨恨有不忍心然斫之傷髀婦人即出以新緜拭血竟路明使人尋跡之至一大冢木中有好婦人形體如生人衣青絹衫丹繡裲襠傷一髀以裲襠中綿拭血變化禮記月令曰仲春鷹化為鳩季春田鼠化為鴽季夏腐草為螢季秋雀入大水為蛤孟冬野雞入大水為蜃左傳昭二曰昔堯殛鯀于羽山其神化為黃熊以入于羽淵春秋潛潭巴曰女子化為丈夫賢人去位君獨居丈夫化為女子陰氣淖小人聚漢書曰哀帝建平中豫章男子化為婦子嫁為人婦生一子長安陳鳳言此陽變為陰將亡繼嗣自相生之象一日嫁為人婦生一子者將復一世乃絕續漢書曰靈帝時江夏黃氏之母浴而化為黿入于深淵其後時時出見初簪一銀釵及見猶在其首又曰建安二十年越嶲有男子化為女子時周群言哀帝時亦有此將有易代之事至二十五年獻帝封于山陽國語曰趙簡子歎曰雀入海化為蛤雉入于淮化為蜃黿鼉魚鼈莫不能化唯人不能悲夫鴻範五行傳曰魏襄王十三年張儀詐得罪於秦而去相魏將為秦而欺奪魏君是歲魏有女子化為丈夫者天若語魏曰勿用張儀陰變為陽臣將為君是時魏王亦覺之不用張儀儀免去歸秦魏無害紀年曰周宣王時馬化為狐山海經曰姑媱之山音遙帝女死焉其名曰女尸化為瑤草其葉成言葉相重亦音遙其華黃其實如莬丘莬免絲服者媚於人為人所媚愛一名荒夫草又曰炎帝之女娃惡住切遊于東海溺而死化為精衛其狀如鳥常銜西山之木石以堙東海又曰夸父與日競走渴飲河河涸不足北飲大澤未至道死棄其杖化為鄧林又曰鍾山其子鼓北神名鍾山之子耳其狀人面龍身是與欽䲹音邳殺葆江于崑崙之陽帝乃戮之鍾山之東日𡺯岸音遙欽䲹化為鶚鶚鵰屬也鼓亦化為駿音俊鳥又曰刑夭與帝爭神帝斷其首葬之常羊之山乃以乳為目以齊為口操干戚以舞是為無首民又曰太室嵩高成陽西啟母化為石在焉莊子曰北溟有魚其名為鯤鯤之大不知其幾千里也化而為鳥其名曰鵬又曰列子行食於道仄見百歲髑髏攓蓬而指曰唯余與女知而未嘗死而未嘗生也種有幾得水則為繼得水土之際則為蠅蠙之衣生於陵屯則為陵舄陵則為鬱棲鬱棲則為烏足烏足之根為蠐螬其葉為蝴蝶蝴蝶胥也化而為蟲生於竈下其狀若脫其名為駒掇駒掇千日而化為鳥其名為乾餘胥乾餘胥之沫為斯彌斯彌為食醯頤輅生乎食醯黃軦食醯黃軦生乎九猷九猷生乎瞀芮瞀芮生乎腐蠸腐蠸生乎羊奚羊奚比乎不笋久竹不笋久竹生於青寧青寧生程程生馬馬生人人又返入於機萬物皆出於機皆入於機此言一氣而萬形有變化而無死生也又曰萇弘死于蜀藏其血三年而化為碧石又曰馬血之為燐也人血之為野火也鷂之為鸇鸇之為布穀布穀之復為鷂也鷰之為蛤也田鼠之為鶉也老韭之為芫也老羭之為猨也羭狀羊魚卵之為蟲也此皆物之變者, SBCK: ''}
