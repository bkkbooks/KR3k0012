  - {type: variant, offset: 355, length: 0, content: '', SBCK: 伐山人見之其形盡爲熊矣又曰符堅建元年中長安樵人於城南見金走白堅堅遣載取倒化爲銅鼎入門又變成大鐸又曰隆安中東海錯魚皆化虎上岸食人異物志云東海有虎錯或時變成虎將是此耶吴都賦所謂沉虎潜鹿也越嶲河有魚皆人形而着冠幘俗語曰故没郡人悉變而爲魚也又曰司馬䡄之字道爰善射雉太元中將雉下翳此雉屢雊野雉亦應試令尋覔所應者頭翅巳成雉半身後故是虵􅀳中朝武庫内忽有雉時人咸謂爲恠張司空云此虵之所作耳即使搜除庫中果得蛇蛻又曰太元中汝南人入山伐一竹中央虵形巳成枝葉如故吴郡桐盧民甞伐竹遺竹一􅀫見竿化雉頭頸盡就身猶未變化亦竹爲虵爲雉也又曰隆安中有青雌雞化而爲赤雄形尾都變冠綵皆具唯不能鳴又曰元興二年衡陽有雌雞化爲雄八十日冠綏後桓玄􅆲八旬而敗幽明録曰冝陽縣有女子姓彭名娥}
