  - {type: variant, offset: 2404, length: 138, content: 年四歲病死故埋藏五日復生太和三年七月詔令休使父母持送女來視之其年四月三日病死四日埋藏至八日同墟人採桑聞兒啼聲即語儂妻往發視兒生活今能飲食如常陸氏異林曰鍾繇嘗數月不朝會意性異常或問其故云常有好婦來美麗非凡問者曰必是鬼物可殺之婦人後往不即前止戶外繇問何以曰公有相殺意繇曰無此勤勤呼, WYG: 留}
