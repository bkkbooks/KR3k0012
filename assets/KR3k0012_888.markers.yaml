  - {type: variant, offset: 350, length: 1, content: 男, SBCK: 去時人謂士宗應行喪治服士宗以母形雖變而生理尚存竟不治喪與江夏黃母相似異􅁐曰豫章郡吏易抜義熈中受畨家違道不及郡遣追見拔言語如常亦爲施設使者催令莊束抜因語曰汝看我面仍見眼目角張身有黄斑便結一足徑出門去家先依山爲居至林麓變成三足大虎所竪之脚即成其尾又曰邵陵髙平黄秀以元嘉三年無故入山經日不還其兒根生尋覔見蹲空樹中}
