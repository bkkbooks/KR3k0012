  - {type: variant, offset: 61, length: 1, content: 何, WYG: 肉堪為藥軍士分割之列女傳曰齊人杞梁襲莒戰而死其妻無所歸乃就夫屍於城下而哭之七日而城崩妻遂投於淄水而死博物志曰靈帝光和元年遼西太守黄翻言海邊有流屍靈符絳衣屍體完全感夢曰我伯夷弟孤竹君子也海水壊吾棺求見掩藏吳㑹稽分地曰種山者大夫種所𦵏也在西鄉郭外後潮水穴山漂去其屍俗云伍子胥乗潮水取}
