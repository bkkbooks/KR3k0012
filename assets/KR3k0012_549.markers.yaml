  - {type: variant, offset: 13, length: 3, content: 苴杖竹, SBCK: 在牀曰屍左傳哀下曰陳侯使公孫貞子聘呉未至而卒將以屍入呉人使太宰嚭營勞且辭上介芉尹盖對曰寡君聞楚爲不道荐伐呉國滅厥民人寡君使盖備使弔君之下吏無禄使人逢天之慼大命殞墜今君命逆使人曰無以屍造千門是我寡君之命委于草莽}
