  - {type: variant, offset: 27, length: 2, content: 本杖, WYG: 靈公弔焉怪而問之其子以父言告公公曰寡人之過也命殯于客位進蘧伯玉退彌子瑕孔子曰史魚死而屍諌可謂直乎史記曰崔杼弑莊公晏嬰立崔杼門外曰君為社稷死則死之為社稷亾則亡之若為己死己亡非其私䁥誰敢任之門開而入枕公屍而哭三踊而出人謂崔杼必殺之崔杼曰民之望也舍之得民白虎通曰屍}
