  - {type: variant, offset: 1000, length: 1, content: 男, SBCK: 􅀄鈎弋夫人有罪以譴死殯屍不臰而香及昭帝即位改葬之棺空無屍獨􅁝履存焉異苑曰河內荀儒字君林乗冰省舅氏䧟河死兄倫求屍積日不得設􅀕水側又箋與河伯投箋一􅀫岸側冰開屍手執箋浮出倫又箋謝又曰㝷陽周處字孟威寧康中鎮于巳西爲符堅所摧守節不屈堅使使者請通虓躬治逵陌謂使者云煩君語賊符堅何至耳煩國士如此又潜圖襲堅聞之曰小人正欲覔死殺之􅃴足成名耳乃􅀂考楚不食而卒歛巳經旬堅怒猶未歇剖棺臨視虓屍欻廻眸􅁂髭張烈精瞳明亮􅅆盻矚堅覩而嘉稱乃厚加贈􅉠又曰元嘉中豫章胡家奴開昌邑王􅃁青州人開齊衰公􅃁並得金鈎而屍骸露在巖中儼然兹亦未必有慿而然也京房屍至義熈中猶完具僵屍人肉堪爲藥軍士分割之列女傳曰齊人􅂎梁襲莒戰而死其妻無所歸乃就夫屍於城下而哭之七日而城崩妻遂投於淄水而死􅀶物志曰靈帝光和元年元遼西太守黄翻言海邊有流靈冠絳衣屍體完令感夢曰我伯夷弟􅀌竹君也海水壞吾棺求見掩藏呉㑹稽分地曰重山者大夫種所葬也在西郷郭外後潮水穴山漂去其屍俗云伍}
