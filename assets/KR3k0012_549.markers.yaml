  - {type: variant, offset: 251, length: 1, content: 庶, WYG: 復與書銘自天}
  - {type: variant, offset: 251, length: 1, content: 庶, krp: 唅者執璧將命曰寡君使某唅則諸侯唅以璧小宰䘮荒受其唅禭幣玉之事春秋傳曰口實曰唅衣服曰禭凶荒有幣玊者賔客所賙委之禮又天官玉府曰大喪共含玉又春官典瑞曰大䘮共飯玉含玉贈玉飯玉砕玉以雜米也禮記檀弓下曰邾婁考公之䘮考公益之曽孫也考公或爲定公也徐君使容居來弔含弔且唅非之也曰寡君使容居坐含進侯玉其使容居以唅欲親唅非禮也唅不使賤者君行則親唅耳言侯玉者徐僣稱王自比天}
  - {type: variant, offset: 253, length: 0, content: '', WYG: 達於士其辭一也男子稱名婦人書姓與伯仲如不知姓則書氏此謂殷禮也殷質不重名復則臣得名君周之禮天子崩則復曰臯天子復諸侯薨則復曰臯某甫復其餘及書銘同禮記外傳曰人之精氣曰魂魂陽也云云而動形體謂之魄魄陰也漠然不動合陰陽二氣而生也精氣聚而為一物形勞則神逝謂死而魂逝散死則難復生也孝子之心不能忍也故升屋而招其魂神也神智無涯也魄者復於土也人皆食土之物養成形體也氣絶而収其魂使反復於體也齊書曰張融建武四年病卒遺令白旐無旒不設祭令人捉麈尾登屋復魂曰吾生平所善自當陵雲一笑三千貫棺無製新衾左手執孝經老子右手執小品法華經妾二人事哀畢各遣還家唅周禮天官冢宰曰太宰之職大喪賛贈玉唅玉助王為之也贈玉既窆所以送先王唅玉死者口實也天子以玉雜記曰唅者執璧将命曰寡君使某唅則諸侯唅以璧也小宰喪荒受其唅襚幣玊之事春秋傳曰口實曰唅衣服曰襚凶荒有幣玉者賓客所賙委之禮又天官玉府曰大喪共唅玉又春官典瑞曰大喪共飯玉含玊贈玊飯玊碎玊以雜米也禮記檀弓下曰邾婁考公之喪考公益之曾孫也考公或為定公徐君使容居来弔含弔且含非之也曰寡君使容居坐含進侯玉其使容居以含欲親唅非禮也唅不使賤者君行則親唅耳言侯玉者徐僣稱王自比天子有司曰諸侯之来辱敝邑者易則易于則于易于雜者未之有也易謂臣禮于謂君禮也容居以臣欲行君禮于徐自比天子使大夫敵諸侯有司固拒之是也容居對曰容居聞之事君不敢㤀其君亦不敢遺其祖昔我先君駒王西討濟於河無所不用斯言也容居魯人也不敢㤀其祖言我祖與今君於諸侯使初如是不聞義則服也駒王徐先君謂僣號者容居其孫也濟渡也言西討渡於河廣大其國也魯鈍也言魯鈍者欲自明不妄又曰飯用米貝弗忍虛也}
