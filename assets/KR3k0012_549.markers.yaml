  - {type: variant, offset: 80, length: 0, content: '', WYG: 有禱祠之心焉復謂招魂分禱五祀庶幾其精氣之反望反諸幽求諸鬼神之道也鬼神處幽闇望其從鬼神所来北面求諸幽之義也鄉其所從来也禮復者升屋北面又曰邾婁復之以矢蓋自戰於升陘始也時師雖勝死傷亦甚無衣可以招魂又曾子問曰為君使而卒於舎禮曰}
  - {type: page-break, offset: 80, content: '', id: KR3k0012_WYG_549-5b, image: WYG0898/WYG0898-0106d.png}
  - {type: variant, offset: 80, length: 0, content: '', krp: 禮記檀弓曰復盡愛之道也有禱祠之心焉復謂招魂且分禱五祀庶幾其精氣之反望反諸幽求諸鬼神之道也鬼神處幽闇望其從鬼神所來北靣求諸幽之義也郷其所從來也禮復者升屋北靣又檀弓曰邾婁復之以矢也盖自戰於升陘始也時師雖勝死傷亦甚無衣可以招魂又曰曽子問曰爲君使而卒於舎禮曰}
  - {type: variant, offset: 81, length: 0, content: '', WYG: 館復私館不復凡所使之國有司所授舎則公館已何謂私館孔子曰善乎問也自卿大夫}
  - {type: variant, offset: 81, length: 0, content: '', krp: 館復私館不復凡所使之國有司所授舎則公館巳何謂私館子曰善乎問也自卿大夫家曰私館公與公所爲曰公館公館復此之謂也又禮運曰及其死也升屋而號告曰臯某復招之於天又禮運曰復諸侯以褒衣冕服爵弁服復招魂復魄也冕服者上公五侯伯四子男三褒衣亦始命爲諸侯及朝覲見加賜之衣也褒猶進也夫人稅衣榆狄狄稅素沙言其招魂用稅衣上至䄖狄也狄稅素伙言皆以白紗縠爲褒復西上北面而西上賜長左也復者多少各如其命之數又雜記上曰大夫}
  - {type: punctuation, offset: 82, content: 、, id: KR3k0012_CHANT_549-bkkpn27}
  - {type: variant, offset: 82, length: 0, content: '', WYG: 之家曰私館公館與公所為曰公館公館復此之謂也又禮運曰及其死也升屋而號吿曰臯某復招之於天又雜記上曰復諸侯以襃衣冕服爵弁服復招魂復魄也冕服者上公五侯伯四子男三襃衣亦始命為諸侯及朝覲見加賜之衣也襃猶進也夫人税衣揄狄狄税素沙言其招魂用税衣上至揄狄也狄税素沙言皆以白紗縠為襃復西上北面則西在左左為陽兾其復生故尚左也復者多少各如其命之數又曰諸侯行而死於館則其復如於其國如於道則升其乗車之左轂以其綏復綏主所致舎館旌旗又曰大夫士死於道則升其乗車之左轂以其綏復如於館死則其復如於家又喪大記曰復有林麓則虞人設階無林麓則狄人設階復招魂復魄也階所乗以升屋者虞人主林麓之官也狄人樂吏之賤者階梯也簨簴之類小臣復復者朝服君以卷夫人以屈狄大夫以𤣥頳世婦以䄠衣士以爵弁士妻以税衣皆升自東榮中屋履危北面三號捲衣投於前司服受之降自西北榮其為賓則公館復私館不復其在野則升其乗車之左轂而復私館卿}
  - {type: page-break, offset: 82, content: '', id: KR3k0012_WYG_549-6a, image: WYG0898/WYG0898-0107a.png}
  - {type: page-break, offset: 82, content: '', id: KR3k0012_WYG_549-6b, image: WYG0898/WYG0898-0107b.png}
  - {type: variant, offset: 82, length: 0, content: '', krp: 死於道則升其乗車之左轂以其綏復如於館死則其復如於其家又喪大記曰復有林麓則虞人設階無林麓則狄人設階復招魂復魄也階所乘以升屋者虞人主林麓之官也狄人樂吏之賤者階弟也簨虞之類小臣復復者朝服君以卷夫人以屈狄大夫以玄頳世婦以䄠衣士以爵弁士妻以稅衣皆升自東榮中屋履危北靣三號捲衣投于前司服受之降自西北榮其爲賔則公館復私館不復其在野則升其乗車之左轂而復私館卿}
