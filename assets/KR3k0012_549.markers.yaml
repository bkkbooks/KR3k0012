  - {type: variant, offset: 157, length: 5, content: 削杖嫌服男, krp: 右手執小品法華經妾二人事哀畢各遣還家含周禮天官冡宰曰太宰之職大䘮賛贈玊含玉助王爲之也贈玉旣窆所以送先王含玉死者實也天}
