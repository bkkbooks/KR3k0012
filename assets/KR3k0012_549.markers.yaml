  - {type: variant, offset: 61, length: 1, content: 何, krp: 肉堪爲藥軍士分割之列女傳曰齊人𣏌梁襲莒戰而死其妻無所歸乃就夫屍於城下而哭之七日而城崩妻遂投於淄水而死博物志曰靈帝光和元年元遼西太守黄翻言海邊有流靈冠絳衣屍體完令感夢曰我伯夷弟孤竹君也海水壞吾棺求見掩藏呉㑹稽分地曰重山者大夫種所葬也在西郷郭外後潮水穴山漂去其屍俗云伍子胥乗漸水取}
