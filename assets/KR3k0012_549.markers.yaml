  - {type: variant, offset: 2301, length: 187, content: 荅凶門問曰簿帳似不出禮文何由行此荅曰凶門非禮禮有縣重於庭以席覆之其形似凶門後出之於門外表喪由比俗遂行之耳禮論曰問改葬立凶門否蔡謨荅云改葬若停喪謂應有凶門死周禮春官大宗伯四以喪禮哀死亡禮記曲禮上曰天子曰崩諸侯曰薨大夫曰卒士曰不祿庶人曰死鄭玄注曰山巔壞曰崩薨崩之聲也卒終也不祿不充其祿也死之言澌也精神澌盡也死寇曰兵異於凡人當饗祿其後也壽考曰卒短折曰不祿老而死從大夫之稱少而死從士, SBCK: 急}
