  - {type: variant, offset: 326, length: 6, content: 武叔朝見輪人, WYG: 豹㑹晉士匄于柯盟于督陽荀偃癉疽生瘍於頭癉疽惡瘡二月卒而視不可含目開口禁宣子盥而撫之曰事吳敢不如事主猶視欒懐子曰其為未卒事於齊故也懐子欒盈乃復撫之曰主苟終所不嗣事于齊者有如河乃瞑受含又哀上曰公㑹吳子伐齊將戰公孫夏命其徒歌虞殯虞殯送終歌示必死也陳子行命其徒具含玉亦示必死春秋説題辭曰口實曰唅緣生象食孝子不忍虛其欲不忍虛政欲其口食天子}
