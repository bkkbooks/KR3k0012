  - {type: variant, offset: 3260, length: 787, content: 孟賁衛人慶忌夏育之勇焉而死者人之所必不免也後漢書曰馬援謂孟冀曰方今匈奴烏丸尚擾北邊欲自請擊之男兒要當死於邊野以馬革褁屍還葬耳何能臥床上在兒女子手中耶冀曰諒為烈士當如此矣後魏書曰張預每羨古人飡玉之法乃採訪藍田躬往攻掘得若環璧雜器形者大小百餘至而觀之皆光潤可玩預乃椎七十枚為屑日服食之餘多惠人後乃聞者更求玉於故處皆無所見馮翊公源懷等得其玉琢為器珮皆鮮明可寶預服延年云有效驗而世事寢食皆不禁節又加之好酒損志及疾篤謂妻子曰服玉若能屏居山林棑棄嗜欲或當大得柛力而吾酒色不絕自致於死非藥過也然吾尸體必當有異勿使速殯令後人知飡服之妙時七月中旬長安毒熱預停尸四宿而體色不變其妻常氏以玉珠二枚唅之口閉常謂之曰君自云飡玉有神驗何故不受唅也言訖齒啟納珠因噓屬其口都無穢氣舉斂於棺堅直不傾委死猶有遺玉屑數升囊盛納諸棺中文子曰老子曰聖人同死生愚人亦同死生聖人之同死生知於分理也愚人同死生不知利害所在莊子曰人之生氣也聚則為生散則為死又曰夫大塊載我以形勞我以生佚我以老息我以死故善吾生者乃所以善吾死也又曰莊子之楚見空髑髏髐然有形檄以馬捶因而問之曰夫子貪生失理而為此乎將子有亡國之事鈇鉞之誅而為此乎於是語卒援髑髏枕而臥夜半髑髏見夢曰子之談者似辯士諸子所言皆生人之累也死則無此矣子欲聞死之說乎莊子曰然髑髏曰死無君於上無臣於下亦無四時之事縱然以天地為春秋雖南面王樂不能過也說苑曰齊景公出而見殣謂晏子曰此何死對曰餧而死公曰噫寡人之無德也亦甚矣晏子曰君之德著而不彰何為無德景公曰何謂也對曰君之德及後宮與臺榭之玩君之鴈食以菽粟君之宮內自樂延及後宮之族何為其無德也顧臣有請於君由君之意自樂之心推與百姓同之則何殣之有又曰子貢問孔子人死有知將無知也孔子曰吾欲言死人有知也恐孝子妨生以送死也吾欲言死人無知也恐不孝子孫棄親不葬也賜欲知人死有時將無知也死徐自知之猶未晚也又曰魯哀公問孔子曰有智者壽乎對曰然人有三死而非命也者人自取, SBCK: 交結}
