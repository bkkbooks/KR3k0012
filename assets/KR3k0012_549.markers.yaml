  - {type: variant, offset: 139, length: 2, content: 為主, krp: 知姓則書氏此謂殷禮也殷質不重名復則臣得名君周之禮天子崩則同復曰臯夭子復諸侯薨復曰臯某甫復其餘及書銘禮記外傳曰人之精氣曰魂魂陽也云云}
  - {type: variant, offset: 142, length: 8, content: 杖者姑在為夫杖姑, WYG: 後行死事氣絶則哭哭而復復而}
  - {type: variant, offset: 142, length: 1, content: 杖, krp: 動形體謂之魄魄隂也漠然不動合隂陽二氣而生也精氣聚而爲一物形勞則神逝謂正而魂遊散死則難復生也孝子之心不能忍也故升屋而招其魂神也神智無涯也鬼}
