  - {type: variant, offset: 1174, length: 1, content: 紒, SBCK: 下齊手上衣尢下赤象地也又}
  - {type: variant, offset: 1176, length: 1, content: 髽, SBCK: 厥明陳衣于房南頭西上綪紟撗三縮一廣終幅拆其末綪屈也紟所以束衣服爲堅急也以布爲之縮從撗者三幅從者一幅折其未令可結之也禮記雜記曰唯絞紟衾冒死而後製又䘮大記曰君錦冒黼殺綴旁七大夫􅀇冒黼殺綴旁五士緇冒頳殺綴房三又䘮大記曰小歛布絞縮者一撗者三大歛布絞縮者三撗者五布紟二衾君大夫士一}
