  - {type: variant, offset: 175, length: 1, content: 重, SBCK: 成禮我死汝其陳屍牖下靈公弔焉怪而問之其子以父言告公公曰寡人過也命殯}
  - {type: variant, offset: 175, length: 3, content: 重於子, WYG: ''}
  - {type: variant, offset: 175, length: 74, content: 重於子為己也女子子在室為父母其主喪者不杖則子一人杖女子子在室亦童子也無男昆弟使同姓為攝主不杖則子一人杖謂長女也許嫁二十而笄笄為成人成人正杖也又喪服小, krp: 玉雜}
  - {type: variant, offset: 177, length: 0, content: '', SBCK: 客位進蘧伯玉退彌}
  - {type: variant, offset: 178, length: 2, content: 為己, SBCK: 瑕孔子曰史魚死而屍諌可謂直乎史記曰崔杼殺莊公晏嬰立崔杼門外曰君爲社稷死死之爲社稷亡亡􅀂爲巳死非其私暱誰敢任之門開而入枕公屍而哭三踴而出人謂崔杼殺之杼曰民之望}
  - {type: variant, offset: 179, length: 66, content: 己也女子子在室為父母其主喪者不杖則子一人杖女子子在室亦童子也無男昆弟使同姓為攝主不杖則子一人杖謂長女也許嫁二十而笄笄為成人成人正杖也, WYG: 死事}
