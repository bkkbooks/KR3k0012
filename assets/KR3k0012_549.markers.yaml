  - {type: variant, offset: 652, length: 525, content: 也故為父苴杖竹也為母削杖削桐也言所以杖者義一也顧所用異耳或問曰杖者以何為也怪所為施曰孝子喪親哭泣無數服勤三年身病體羸以杖扶病也言得杖乃能起也則父在不敢杖矣尊者在故也堂上不杖辟尊之處也堂上不趨示不遽也此孝子之志也人情之實也禮義之經也非從天降也非從地出也人情而已矣父在不杖謂為母也尊者不杖辟尊渚之處不杖有事不趨皆為其感動使之憂歲也矣又喪服四制曰杖者何也爵也三日授子杖五日授大夫杖七日授士杖或曰擔主或曰輔病婦人童子不杖不能病也白虎通曰所以杖竹桐何取其名也竹慼也桐痛也父以竹母以桐竹陽也桐陰也竹斷而用之質故為陰也韓子曰儒執喪三年大毀扶杖世主以為孝而禮之幗髽儀禮喪服曰女子子在室為父布總箭笄髽襄三年總束髽也謂總者既束其本又總其未箭篠也髽露紒也猶男子之括髽以麻則髽上用麻也用麻者自頭交額上卻繞紒如若幧頭小記曰男子冠而婦人笄男子免而婦人髽但言襄不言裳者婦人不雖裳也又曰女子子之適人者為其父母婦人為舅姑惡笄有首以髽卒哭子折笄首以笄布總傳曰笄有首者惡笄之有首也惡笄者櫛笄也折笄首者折吉笄之首也吉笄者象笄也禮記檀弓上曰南宮縚之妻之姑喪孔子誨之髽曰爾無從從爾爾無扈扈爾誨教也爾汝也縱縱謂太高扈扈謂太廣爾助語又檀弓上曰魯婦人之髽而弔自敗於臺鮐也時家家有喪髽而相弔去纚而紒曰髽, WYG: ''}
