  - {type: variant, offset: 2507, length: 601, content: 墓者而哀使子路問之曰子之哭也一似重有憂者而曰然昔者吾舅死於虎吾夫又死焉今吾子又死焉夫子曰何為不去也曰無苛政夫子曰小子識之苛政猛於虎也又喪大記曰男子不死於婦人之手婦人不死於男子之手君夫人卒於路寢大夫世婦卒於適寢內子未命死於下室士之妻死於寢左傳定下曰齊侯伐晉敝無存之父將室之辭以與其弟曰此役也不死反必娶於高國先登求自門出死於霤下又哀上曰簡子巡列曰畢萬匹夫也七戰皆獲有馬百乘死於牖下畢萬晉獻公卿也死於牖下言得壽中群子勉之死不在寇言有命也又哀下曰太子聞之懼下石乞盂壓敬子路以戈擊之斷纓子路曰君子死冠不免結纓而死孔子聞衛亂曰柴也其來乎由其死矣又哀下曰晉荀瑤帥師圍鄭人浮酅魁壘賂之以知政閉其口而死穀梁傳隱公曰高厚曰崩尊曰崩天子之崩以尊之也其崩之何也以在民上故崩之也春秋說題辭曰天子曰崩崩之為言殞也諸侯稱薨薨之為言奄然而亡大夫曰卒精輝終卒卒之為言絕絕於邦也士曰不祿失其忠也不祿之言削名章也庶人曰死魂魄去心死之為言精爽窮也白虎通又載爾雅曰崩薨無祿卒殂落殪死也論語里仁曰子曰朝聞道夕死可矣言將至死不聞世之有道又子罕曰子疾病子路使門人為臣病間曰久矣哉由之行詐也且予與其死於臣之手也無寧死於二三子之手乎且予縱不得大葬予死於道路乎又先進曰顏淵死子曰噫天喪予天喪予子哭之慟從者曰子慟矣曰有慟乎非夫人之為慟而誰為又先進曰季路曰敢問死曰未知生焉知死鬼神及死事難明語之無益故不荅又季氏曰齊景公有馬千駟死之日民無德而稱焉伯夷叔齊餓于首陽, SBCK: 紟}
