  - {type: variant, offset: 376, length: 102, content: 命則去杖大夫之命則輯杖內子為夫人之命去杖為世婦之命授人杖大夫有君命去杖此指大夫之子也而云大夫者通實大夫有父母之喪也授杖與使人執之同也士之喪二日而殯三日之朝主人杖婦人皆杖於君命夫人之命如大夫於大夫世婦之命如, WYG: ''}
  - {type: variant, offset: 376, length: 102, content: 命則去杖大夫之命則輯杖內子為夫人之命去杖為世婦之命授人杖大夫有君命去杖此指大夫之子也而云大夫者通實大夫有父母之喪也授杖與使人執之同也士之喪二日而殯三日之朝主人杖婦人皆杖於君命夫人之命如大夫於大夫世婦之命如, krp: ''}
  - {type: variant, offset: 379, length: 483, content: 杖大夫之命則輯杖內子為夫人之命去杖為世婦之命授人杖大夫有君命去杖此指大夫之子也而云大夫者通實大夫有父母之喪也授杖與使人執之同也士之喪二日而殯三日之朝主人杖婦人皆杖於君命夫人之命如大夫於大夫世婦之命如大夫士二日而殯者下大夫也士之禮死與往日生與來日此二日於死者亦得三日也婦人皆杖謂主婦容妾為君女子子在室者子皆杖不以即位才謂凡庶子也不以即位與去秋同也大夫士哭殯則杖哭柩則輯杖哭殯謂既塗也哭柩謂啟後也大夫士之子於父父也尊近哭殯可以杖子哭諸侯之子於父父也君也尊遠杖不入廟門也棄杖者斷而棄之於隱者杖以喪至尊為人得而褒之又問喪曰或問曰杖者何也怪其義各異曰竹桐一也故為父苴杖竹也為母削杖削桐也言所以杖者義一也顧所用異耳或問曰杖者以何為也怪所為施曰孝子喪親哭泣無數服勤三年身病體羸以杖扶病也言得杖乃能起也則父在不敢杖矣尊者在故也堂上不杖辟尊之處也堂上不趨示不遽也此孝子之志也人情之實也禮義之經也非從天降也非從地出也人情而已矣父在不杖謂為母也尊者不杖辟尊渚之處不杖有事不趨皆為其感動使之憂歲也矣又喪服四制曰杖者何也爵也三日授子杖五日授大夫杖七日授士杖或曰擔主或曰輔病婦人童子不杖不能病也, SBCK: ''}
