  - {type: variant, offset: 10, length: 0, content: '', WYG: 記曲禮下曰在牀曰屍左傳哀下曰陳候使公孫貞子聘吳未至而卒將以屍入吳人使太宰嚭勞且辭上介芊尹蓋對曰寡君聞楚為不道翦伐吳國滅厥民人寡君使蓋備使弔君之下吏無禄使人逢天之慼大命殞墜今君命逆使人曰無以屍造於門是我寡君之命委於草莽也且臣聞之事死如生禮也於是乎有朝聘而終以屍將事之禮又有朝聘而遭}
