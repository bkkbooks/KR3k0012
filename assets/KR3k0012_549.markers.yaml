  - {type: variant, offset: 181, length: 0, content: '', SBCK: 舎之得民又曰吳兵入郢伍子胥求昭王旣不得乃掘楚平王墓出屍鞭之三百又曰呉王取子胥屍盛以䲻夷􅀿劭曰取馬皮以爲䲻夷形也浮之江呉人憐之爲立祠於江上因命曰胥山魏志曰宣王討王陵乃窮治其事發陵及令狐思冡剖棺􅁀屍於所近市三日王隱晉書曰王浚在幽州謡曰幽州城門似藏户中有伏屍王彭祖又曰趙王倫害張華之時洛中震悚唯閻纉敢獨詣東市號哭弔屍而撫之曰早語君遜位而不肯去今果不免禍車頻奏書曰􅀄慕容暐在鄴居石虎宫夢虎齧其臂募人求虎殯所在}
