  - {type: variant, offset: 320, length: 4, content: 貴賤皆杖, krp: 執璧將命曰寡君使某唅相者入告出曰孤某須矣唅玉爲璧制其分寸之大小未聞唅者入升堂致命于拜稽顙含者委于殯東南又曰天子飯九具諸侯七大夫五士三此盖夏時也周禮天子飯唅用玉左傳曰}
