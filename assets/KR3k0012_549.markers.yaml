  - {type: variant, offset: 326, length: 7, content: 武叔朝見輪人以, krp: 豹㑹晉士丐于柯盟于督陽荀偃癉疽生瘍於頭癉疽堊瘡二月卒而視不可唅目開口噤宣子與撫之曰事呉敢不如事主猶視欒懷子曰}
