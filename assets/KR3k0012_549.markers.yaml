  - {type: variant, offset: 333, length: 0, content: '', WYG: 珠諸侯以玉大夫以璧士以貝唅之為言實具口含也生常食故死用含説文曰唅送終口中玊也釋名曰唅以米貝含}
  - {type: variant, offset: 334, length: 3, content: 杖關轂, WYG: 口中也莊子曰青青之麥生於陵陂生不布施死何唅珠為吕氏春秋曰含珠鱗施今𦵏皆用之注云含珠口實鱗施施玊匣於死者之體如魚鱗絞紟衾冒儀禮士喪禮曰死於適室幠用斂衾幠覆也斂衾大斂聴用之衾也衾被也奉屍於室幠用夷衾夷衾覆屍柩之衾也又曰冒緇質長與手齊頳殺掩足冒韜尸者也制如直囊上曰質下曰殺殺韜足}
