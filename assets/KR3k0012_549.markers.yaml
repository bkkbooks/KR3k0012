  - {type: variant, offset: 21, length: 2, content: 各齊, SBCK: 於是乎有朝聘而終以屍將事之禮又有朝聘而遭䘮之禮􅀂不以屍將命是遭䘮而還也無乃不可乎以禮防民猶或踰之今大夫曰死而棄之是棄禮也苟我寡君之命逹于君所雖殞于深淵則天命也吴人內之禮統曰屍之言矢也陳也家語曰史魚將卒命}
