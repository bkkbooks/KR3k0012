  - {type: variant, offset: 57, length: 1, content: 病, WYG: 復自勝歛搜神記曰初鈎弋夫人有罪以譴死殯屍不臰而香及昭帝即位改𦵏之棺空無屍獨絲履存焉異苑曰河内荀儒字君林乗水省舅氏䧟河死兄儉求屍積日不得設祭水側又箋與河伯投箋一宿岸側冰開屍手執箋出倫又箋謝又曰潯陽周虓字孟威寧康中鎮于巴西為苻堅所摧守節不屈堅使使者道虓躬治逵陌謂使者云煩君語賊苻堅何至耳煩國士如此又潛圗襲堅堅聞之曰小人正欲覓死殺之適足成名耳乃苦考楚不食而卒歛已經旬堅怒猶未歇剖棺臨視虓屍歘迴眸鬢髭張裂精瞳明亮迴盼矚堅堅覩而稱善乃厚加贈賻又曰元嘉中豫章胡家奴開昌邑王冢青州人開齊襄公冢並得金鈎而屍骸露在巖中儼然兹亦未必有憑而然}
  - {type: page-break, offset: 57, content: '', id: KR3k0012_WYG_549-3a, image: WYG0898/WYG0898-0105c.png}
  - {type: page-break, offset: 57, content: '', id: KR3k0012_WYG_549-3b, image: WYG0898/WYG0898-0105d.png}
  - {type: variant, offset: 57, length: 1, content: 病, krp: 復自勝歛捜神記曰𥘉鈎弋夫人有罪以譴死殯屍不臰而香及昭帝即位改葬之棺空無屍獨絲履存焉異苑曰河內荀儒字君林乗冰省舅氏䧟河死兄倫求屍積日不得設祭水側又箋與河伯投箋一宿岸側冰開屍手執箋浮出倫又箋謝又曰㝷陽周處字孟威寧康中鎮于巳西爲符堅所摧守節不屈堅使使者請通虓躬治逵陌謂使者云煩君語賊符堅何至耳煩國士如此又潜圖襲堅聞之曰小人正欲覔死殺之適足成名耳乃若考楚不食而卒歛巳經旬堅怒猶未歇剖棺臨視虓屍欻廻眸鬢髭張烈精瞳明亮廻盻矚堅覩而嘉稱乃厚加贈􅉠又曰元嘉中豫章胡家奴開昌邑王冡青州人開齊衰公冡並得金鈎而屍骸露在巖中儼然兹亦未必有慿而然}
