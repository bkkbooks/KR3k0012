  - {type: variant, offset: 1308, length: 992, content: 皆髽魯於是乎始髽髽麻髮合結也遭喪者多故不能備凶服髽而已廣雅曰幗謂之帺音忌魏氏春秋曰諸葛亮挑司馬宣王戰致巾幗婦人之飭以怒宣王廬周禮天宮宮正曰掌王宮之戒令大喪則授廬舍辯其親踈貴賤之居鄭玄注曰廬舍堊室也親者貴者居倚廬踈者踐者居堊室儀禮喪服傳曰喪服斬襄居倚廬寢苦枕塊馬融曰倚木以為廬於東墻下西向開北端也禮記雜記曰大夫居廬士居堊室又喪大記曰父母之喪居倚廬不塗寢苫枕凷非喪事不言君為廬宮之大夫士䄠之宮謂圍障既葬柱楣塗廬不於顯者君大夫士皆宮之不於顯者不塗見面又曰問喪成壙而歸不敢入處室居於倚廬哀親之在外也白虎通曰父母之喪倚廬於中門外東牆下戶北又曰婦人不居倚廬天子七日諸侯五日卿大夫三日而成服居門外東壁為廬王肅喪服要記曰魯哀公葬父孔子問曰寧設菰廬乎哀公曰菰廬起太伯太伯出奔聞古公崩還赴喪故作菰廬以彰其尸吾父無太伯之罪何用此為孝子傳曰王琳汝南上蔡人十歲失父母弟季年七歲兄弟二人哭泣哀聲不絕在冢側作廬不妄出入餘見孝部重儀禮士喪禮曰重木刊鑿之甸人置重于中庭參分庭一在南夏祝取鬻餘飯盛用二鬲于西牆下冪用䟽布久之擊用靲懸于重冪用葦席北面左衽帶用靲賀之結于後祝取銘置于重鄭玄曰重木也懸物也馬曰重木也刊斫治之也鑿之為懸簪孔士重木長三尺也禮記雜記曰重既虞而埋之就所倚處里之禮記外傳曰重者未葬之前以代主也猶以生事之未忍作木主主以存神也設重於庭懸瓦鬲以養病之米淅之為沐則煮之為粥實之重用葦席蓋之鬼神依而飲食始死之奠但用但未有黍稷故也黍稷在下之中如生時也殷人作主之後聯其重懸之於廟梁去高祖之廟親盡則埋之周人將葬重隨柩而朝廟之外柩而埋之於階間而後作主也凶門南史孔琳之議曰凶門柏裝不出禮典起自末代積習生常遂成舊俗兄人士喪儀多出閭里每有此須動十數萬損人財力而義無所取至於寒庶則人思自竭雖復室如懸磬莫不傾產殫財所謂葬之以禮其此之謂乎宜一罷凶門之式王肅喪服要記曰魯哀公葬父孔子問寧設襄門乎哀公曰襄門起於禹禹治水故表其門閭以紀其功吾父無功何用此焉韋弘與蔡謨牋問凶門曰父在母喪應立凶門不又問與父別止立凶門愚意猶所疑厭於父故也今於父大門之內別立凶門便為父一家有二門以名義言之門者父之有也今子復立門豈合聖人之典訓茍不出於禮其所不曰故以諮白蔡荅曰禮以二瓦器盛始死之祭擊木襄之葦席置於庭中近南名為重今之凶門是其象也禮既虞而作主今未有主故以重當主本為喪設非以表其門恐不應以尊卑厭降也禮命士以上父子異宮今卑私之喪皆別開門亦不知今人如此者皆有凶門不范, SBCK: ''}
