  - {type: variant, offset: 1149, length: 1, content: 魯, SBCK: 大夫士死於道則􅂛其乗車之左轂以其綏復如於館死則其復如於其家又喪大記曰復有林麓則虞人設階無林麓則狄人設階復招魂復魄也階所乘以􅂛屋者虞人主林麓之官也狄人樂吏之賤者階弟也簨虞之􅀋小臣復復者朝服君以卷夫人以屈狄大夫以􅀇頳世婦以䄠衣士以爵弁士妻以稅衣皆􅂛自東榮中屋履危北靣三號捲衣投于前司服受之降自西北榮其爲賔則公館復􅀻館不復其在野則􅂛其乗車之左轂而復􅀻館卿大夫之家也不於之復爲主人之惡也復衣不以衣尸不以斂不以衣尸謂不襲也復者庶其生也􅀂以其衣襲歛是用生施死於義相友䘮禮云以衣衣尸俗而去之}
  - {type: page-break, offset: 1149, content: '', id: KR3k0012_SBCK_549-5a}
  - {type: variant, offset: 1152, length: 0, content: '', SBCK: 復不以袡袡嫁時上服而非事􅄦神}
  - {type: variant, offset: 1153, length: 1, content: 髽, SBCK: 衣凡復男子稱名婦人稱字婦人不以名行唯哭先復復}
  - {type: variant, offset: 1155, length: 0, content: '', SBCK: 後行死事氣絶則哭哭而復復而不􅂫可以爲死事諸侯行而死於館則其復如於其國如於道則􅂛其乗車之左轂以其綏復館主所致舎綏旌旗又䘮服小記曰復與書銘自天子逹於士其辭一也男子稱名婦人書姓與伯仲如不知姓則書氏此謂殷禮也殷質不重名復則臣得名君周之禮天子崩則同復曰臯夭子復諸侯薨復曰臯某甫復其餘及書銘禮記外傳曰人之精氣曰魂魂陽也云云而動形體謂之魄魄隂也漠然不動合隂陽二氣而生也精氣聚而爲一物形勞則神逝謂正而魂遊散死則難復生也孝子之心不能忍也故升屋而招其魂神也神智無涯也􅀑者復於土也人皆食土之物養成形體也氣絶而収其魂使反復於體也齊書曰張融建武四年病卒遺令白旐無旒不設􅀕令人捉塵尾登屋復魂曰吾生平所善自當陵雲一􅀏三千買棺無製新衾左手執孝經老子右手執小品法華經妾二人事哀畢各遣還家含周禮天官􅃁宰曰太宰之職大䘮賛贈玊含玉助王爲之也贈玉旣􅉎所以送先王含玉死者實也天子以玉􅄂記曰唅者執璧將命曰寡君使某唅則諸侯唅以璧小宰䘮荒受其唅禭幣玉之事春秋傳曰口實曰唅衣服曰禭凶荒有幣玊者賔客所賙委之禮又天官玉府曰大喪共含玉又春官典瑞曰大䘮共飯玉含玉贈玉飯玉砕玉以􅄂米也禮記檀弓下曰邾婁考公之䘮考公益之曽孫也考公或爲定公也徐君使容居來}
  - {type: page-break, offset: 1155, content: '', id: KR3k0012_SBCK_549-5b}
  - {type: page-break, offset: 1155, content: '', id: KR3k0012_SBCK_549-6a}
  - {type: punctuation, offset: 1156, content: ，, id: KR3k0012_CHANT_549-bkkpn324}
  - {type: 'tls:seg', offset: 1156, content: '', id: KR3k0012_CHANT_549-11a.4}
  - {type: variant, offset: 1156, length: 0, content: '', SBCK: 含弔且唅非之也曰寡君使容居坐含進侯玉其使容居以唅欲親唅非禮也唅不使賤者君行則親唅耳言侯玉者徐僣稱王}
  - {type: variant, offset: 1157, length: 1, content: 敗, SBCK: 比天子有司曰諸侯之來辱弊邑者易則易于則于易于􅄂者未之有也易謂臣禮于謂君禮也容居以臣欲行君禮于徐自比天子使大夫敵諸侯有司固拒之是也容居對曰容居聞之事君不敢志其君亦不敢遺其祖昔我先君駒王西討濟}
  - {type: variant, offset: 1159, length: 2, content: 臺鮐, SBCK: 河無所不用斯言}
  - {type: punctuation, offset: 1162, content: 。, id: KR3k0012_CHANT_549-bkkpn325}
  - {type: punctuation, offset: 1162, content: 」, id: KR3k0012_CHANT_549-bkkpn326}
  - {type: 'tls:seg', offset: 1162, content: '', id: KR3k0012_CHANT_549-11a.5}
  - {type: variant, offset: 1162, length: 0, content: '', SBCK: 容居魯人也不敢忘其祖言我祖與今君於諸侯􅀄如是不聞義則服也駒王徐先君謂僣號者容居其孫也濟渡也言西討渡於河廣大其國也魯魯鈍也言魯鈍者欲自明不妄又檀弓下曰飯用米貝弗忍虚也不以食道用羙焉爾尊之也食道米見美也又􅄂記上曰唅者執璧將命曰寡君使某唅相者入告出曰􅀌某須矣唅玉爲璧制其分寸之大小未聞唅者入􅂛堂致命于拜稽顙含者委于殯東南又曰天子飯九具諸侯七大夫五士三此盖夏}
  - {type: variant, offset: 1163, length: 2, content: 家家, SBCK: 也周禮天子飯唅用玉左傳曰叔孫豹㑹晉士丐于柯盟于督陽荀偃癉疽生􅅑於頭癉疽堊瘡二月卒而視不可唅目開口噤宣子與撫之曰事呉敢不如事主猶視欒懷子曰其爲未卒事於齊故也懷子欒盈乃復撫之曰主茍終所不嗣事于齊}
  - {type: page-break, offset: 1163, content: '', id: KR3k0012_SBCK_549-6b}
  - {type: variant, offset: 1166, length: 2, content: 喪髽, SBCK: 如河乃暝受唅也又曰公㑹呉子伐齊將戰公孫夏命其徒歌虞殯虞殯送終歌典示必死也陳子行命其徒且唅玉亦示必死春秋􅀃題辭曰口實曰唅縁生象食孝子不忍虚其欲不忍虚故欲實其口天子以珠諸侯以玉大夫以璧士以貝唅之爲言含也生常食故死亦有所含􅀃文曰含送終口中玉也釋名曰唅以米貝含其口中也莊子曰青青之麥生於陵阪生不布施死何唅珠爲吕氏春秋曰含珠鱗施今葬皆用之注云含珠口實鱗施施玉匣於死者之體如魚鱗絞紟衾冒儀禮士䘮禮曰死於適室撫用歛衾撫覆也歛衾大歛所用之衾也衾􅀍也奉屍于室撫用夷衾夷衾覆屍柩之衾也又曰冒緇質長與手齊頳殺掩足冒韜尸者也制如直囊上曰質下曰殺殺韜足}
