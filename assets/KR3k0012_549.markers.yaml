  - {type: variant, offset: 220, length: 158, content: 杖則子一人杖謂長女也許嫁二十而笄笄為成人成人正杖也又喪服小記曰庶子不以杖即位下適子也位朝夕哭位也父不主庶子之喪則孫以杖即位可也祖不厭孫孫得神也父在庶子為妻以杖即位可也舅不主妾之喪子得神也又雜記上曰古者貴賤皆杖叔孫武叔朝見輪人以其杖關轂而輠輪者於是有爵而后杖也又喪大紀曰大夫之喪三日之朝既殯主人主婦室老皆杖大夫有君命則, SBCK: ''}
