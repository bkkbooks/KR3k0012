  - {type: variant, offset: 338, length: 2, content: 輠輪, WYG: 上質韜首而下齊手上衣左下赤象地也又曰厥明陳衣于房南頭西上綪紟横三縮一横終幅拆其末綪屈也紟所以束衣服為堅急以布絞之縮從横}
