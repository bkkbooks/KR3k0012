  - {type: variant, offset: 3404, length: 13, content: 後得遺金一餅以與貞義曰妾聞, SBCK: 􅀂吾㫁斯織也夫}
  - {type: variant, offset: 3404, length: 13, content: 後得遺金一餅以與貞義曰妾聞, krp: 若吾㫁斯織也夫}
  - {type: variant, offset: 3405, length: 0, content: '', WYG: 姑以孝聞數年之間姑及伯叔皆相繼而死覃氏躬自節儉晝夜紡績蓄財十年而葬八喪為州里所敬上聞而賜米百石表其門閭又曰鄭善果母清河崔氏既寡之後恒自紡績每夜分而寐善果曰兒封侯開國位居三品秩俸幸足母何自勤如是耶荅曰嗚呼汝年已長成吾謂汝知天下之理今聞此言故猶未也至於公事何由濟乎今此秩俸乃是天子報爾先人之徇命也當須散贍六姻為先君之惠妻子奈何獨擅其利以為富貴哉又絲枲紡績婦人之務上至王后下至大夫士妻各有所製若堕業者是謂驕逸吾雖不知禮其可自敗名乎唐書曰永泰二年夏賜安南節婦金氏兩丁侍飬金氏本賊帥陶齊亮之母以忠義訓齊亮不受遂絶齊亮自績而衣自田而食州里稱之乃詔本道每使季給銀二兩充衣服以終其身國語曰公父文伯退朝其母方績文曰以歜之家而主猶績懼干季孫之怒也季孫康子位尊又為大宗其以歜為不能事主乎其母歎曰魯其亡乎使僮子備官而未之知耶春秋後語曰甘茂奔齊路逄蘇代將為齊使於秦甘茂曰臣}
  - {type: page-break, offset: 3405, content: '', id: KR3k0012_WYG_826-8b, image: WYG0900/WYG0900-0313d.png}
  - {type: page-break, offset: 3405, content: '', id: KR3k0012_WYG_826-9a, image: WYG0900/WYG0900-0314a.png}
  - {type: page-break, offset: 3405, content: '', id: KR3k0012_WYG_826-9b, image: WYG0900/WYG0900-0314b.png}
  - {type: variant, offset: 3406, length: 0, content: '', WYG: 罪於秦逃遁至此無所容跡吾聞貧人女與富人女會績貧人女曰我無錢以買燭而子燭幸有光子可以分我餘光無損子明而得一斯便焉斯在也今臣困而子方使秦而當路矣茂之妻子在秦願君以餘光振之振整也蘇代許諾列女傳曰齊女徐吾者東海上貧婦人也隣婦李吾之屬合燭相從夜績徐吾曰我無以買燭而子之火光有餘分我餘光無損子明而我為便不亦可乎異苑曰昔有老姥雨夜紡績斷失其􅜒所在姥獨罵云何物鬼擔去户外即有應言暫寄避雨實不偷􅜒宜就覔之姥驚懼窺外無所見􅜒亦尋獲王子年拾}
  - {type: page-break, offset: 3406, content: '', id: KR3k0012_WYG_826-10a, image: WYG0900/WYG0900-0314c.png}
  - {type: variant, offset: 3407, length: 1, content: 金, WYG: 記曰魏文帝所愛美人薛靈芸常山人父業經為鄭鄉亭長母陳氏随業舍於亭傍靈芸年十七生居貧賤至夜每聚隣婦夜績以麻蒿自照漂説文曰漂水中撃絮也史記曰韓信從下鄉城下釣有漂母見信飢飯信竟漂數十日越絶書曰伍子胥至溧陽見}
  - {type: page-break, offset: 3407, content: '', id: KR3k0012_WYG_826-10b, image: WYG0900/WYG0900-0314d.png}
  - {type: variant, offset: 3409, length: 1, content: 餅, WYG: 女子擊絮於瀬水中子胥曰豈得可食乎女曰諾即發其簞食清其壺漿而與之子胥謂女子母令之露子胥行五歩還顧女子自投瀬水之中荘子曰宋人有善為不龜手之藥者世世}
