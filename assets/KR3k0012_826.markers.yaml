  - {type: variant, offset: 3917, length: 2, content: 鯤桃, SBCK: 與冨人㑹績貧人女曰我無錢以買燭而子燭幸有光子可以分我餘光無損子明而得一斯便焉斯在也言貧女子此一便也今臣困而子方使􅁗而當路矣茂}
