  - {type: variant, offset: 3935, length: 1, content: 捕, SBCK: 有侍臣衣滯卷摺帝怒曰卿衣帶如繩欲何所􅅞又曰昭明太子統欲以已率物服御朴素身衣浣衣膳不兼肉南史曰陳王逡之衣裳不澣几案塵黒唐書曰肅宗性儉約衣服無綺繡嘗出衣䄂示韓擇木曰朕巳三浣矣淮南子曰楚莊王誅里史孫叔敖制冠澣衣仲長子昌言曰攻玉以石澣布以􅁅龍}
