  - {type: variant, offset: 1406, length: 1935, content: 風清明宜蠶列仙傳曰園客濟陽人姿皃好而良邑人多欲以女妻之客終不娶種五色香草積數十年服食其實一旦五色蛾止其香末客收而薦之以布生桑蠶焉蠶時有女夜至自稱客妻客與俱蠶得繭大如盆郭子橫洞宜記曰寒青之國其國人皆以鳥為衣其地多霜雪陰翳忽見日從南方出則百獸皆鳴國俗以為祥異有蠶色青長一丈亦曰青蠶績其絲大如指一絲可羈絆牛馬國人常以十丈充黃門之廄以拘馬也巨象師子帝令以此一絲繫之古今注曰元帝永元四年東萊郡東弁山有野蠶為繭收得萬餘石民人以為絲絮司馬徽別傳曰人有臨蠶求徽蔟者徽便以與之自棄其蠶搜神記曰舊說太后古時有人遠征家唯有一女并馬一疋女思父戲馬曰爾能為我迎得父吾將嫁汝馬乃絕韁而去至父所父疑家中有故乘之而還馬後見女輒怒而奮繫父怪之密問女女具以荅父乃射殺馬曝皮於庭女至皮所足蹙之曰爾馬而欲人為婦自取屠剝何如言未竟皮蹶然起卷女而行父還失女後大樹枝得女及皮乃盡化為蠶績於樹上其繭厚大異於常蠶鄰婦取養之其收二倍今世或謂蠶為女兒古之遺語也拾遺錄曰員嶠之山名環丘有冰蠶長七寸黑色有角有鱗以霜雪覆之然後作繭長一尺其色五綵織為文錦入水而不濡投火則經宿不燎海人獻堯以為黼黻顏氐家訓曰胡人見錦不信有蟲食樹吐絲所成昔在江南不信有千人氈帳及來河北不信有萬石舟舡皆實驗也齊諧記曰正月半有神降陳氏之宅云我是蠶神能見祭當令蠶百倍今人正月半作餻糜像此也一云吳郡張誠皇后親蠶儀注曰皇后躬桑始將一條執筐受桑將三條女尚書跪白曰可止執筐者以桑授蠶母蠶母以桑適金室也先蠶儀注曰親蠶前三日太祝令質明以太牢祠先蠶也週遷古今輿服雜事曰蠶始生后食之三灑而止三輔故事曰始皇后葬用金蠶二十箔玄中記曰大月支有牛名為日及今日割取其肉三四斤明日瘡愈漢人入此國以牛示之以為珍異漢人曰吾國有蟲大小如指名為蠶食桑葉為人吐絲外國人不復信有蠶也又曰化民食桑三七年化能以自裹如蠶績九年生翼七年而死去琅耶四萬里神異經同林邑記曰九真郡蠶年八熟繭小輕薄絲弱綿細永嘉郡記曰永嘉有八輩蠶蚖珍蠶三月績柘蠶四月初績蚖蠶四月初績愛珍五月績愛蠶六月末績寒珍七月末績四出蠶九月初績寒蠶十月績凡蠶再養者前輩皆謂之珍少養之愛蠶者故蚖蠶種也蚖珍三月既績出蛾取卵七月八月便割蠶生多養之是為蚖蠶欲作愛者取蚖珍之卵藏內甕器中隨器大小亦可十紙百紙蓋覆器口安冷水使冷氣折其出勢僅得三七日然後劄生養之謂為愛珍亦愛子績成繭蛾生卵卵七日又剖成蠶多養之此則愛蠶也顧微廣州記曰吳黃武三年遣交州治中呂瑜發趙嬰齊冢得金蠶曰珠各數斛廣志曰有原蠶有冬蠶有野蠶有柞蠶食柞葉可以作綿崔贛易林兌之坎曰飢蠶作室緒多亂纏端不可得又震之說曰秋蠶不成冬種不生龍魚河圖曰蠶沙宅亥地大富得蠶絲吉利仲長子昌言曰北方寒其人壽南方暑其人夭此寒暑之方驗於人也約之蠶也寒而餓之則引日多溫而飽之則用日少此寒溫飢飽之為脩短驗於物者也物理論曰使人主養民如蠶母之養蠶則其用豈徒絲蠶而已哉雜五行書曰含南種棗九株辟縣官宜蠶桑又曰二月上壬取土泥屋四角宜蠶吉呂氏本草曰石蠶一名沙蜯神農雷公醎無毒生漢中治五淋破隨肉解結氣利水道除熱孫卿蠶賦曰食桑而吐絲前亂而後治夏生而惡暑疾溫而惡雨蛹以為母蛾以為父三俯三起事乃大已是謂蠶理閔鴻蠶賦曰體龍頸而驥喙邁皦素於羔羊左思吳都賦曰國稅再熟之稻鄉貢八蠶之綿古艷歌曰日出東方隅照我秦氏樓秦氏有好女自名為羅敷羅敷善蠶桑採桑城南隅陸機詩曰老蠶晚績縮老女晚嫁辱曾不如老鼠飜飛成蝙蝠蔡邕書曰家祖君常言客有三當死夜半蠶時至人室家也今者一行而犯其兩嵇康養生論曰火蠶十八日寒蠶三十餘日裴頠崇有論曰鳥無胃肺蛤無五藏蛭以空中而生蠶以無胃而育也繰禮記祭義曰古之獻繭者其率用此與問者之辭及良日夫人繅三盆手遂布于三宮夫人世婦之吉者使繅遂朱綠之玄黃之以為黼黻文章服既成君服以祀先王先公敬之至也三盆手者三掩也凡繅每淹大揔而手掖之以出緒也說文曰繰𦅰繭為絲也尸子曰夫繭合而弗治則腐蠹而棄使女工繰之以為美錦列仙傳曰園客蠶得繭大如盆繰一繭數十日繰訖俱去莫知所如濟陽今有革蠶祠已備於前故此小略繀車通俗文曰織纖謂之繀音碎受緯曰孚繀車方言曰繀車趙魏之間謂之歷鹿車東齊海岱之間謂之道軌孫德施繀車賦曰惟工藝之多門偉英麗乎創形擬老氏之一轂兮應天運以廻行秉轉屈以成規兮不辭勞以自傾故其用同造物功參天地軒轅垂衣因其以濟袞冕龍旂用康上帝勳存王室惠流皂隸觀其微風興於輪端霧雨散于𨌘輻制以靈木絡以奇竹危朝日以投員兮准暈月以造象若洪輪之在雄兮似蜘蛛之結網爾乃才藝妻妾工巧是嘉或織綿組或匠綾羅舒皓腕於輕輪兮煥擬景乎鏡華絲成妙於指端號𢬤兮幽而相和象蟋蟀之鳴戶兮類寒蟬之吟家篗方言曰篗援也音爰兗豫河濟之間謂之轅郭璞注曰所以絡絲說文曰篗收絲者也或作音角從角間聲絡車方言曰河濟之間絡謂之格郭璞注曰所以轉篗紿事也柅易姤卦曰繫于金柅金者堅剛之物柅者制動之至通俗文曰張絲曰柅也說文曰檷絡絲檷從木爾聲讀若柅機杼, SBCK: 