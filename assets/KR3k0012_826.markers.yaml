  - {type: variant, offset: 3375, length: 0, content: '', SBCK: 去織婦㧞園葵戰國䇿曰甘茂謂􅁗武王曰曽子處屈人有與曽子同名族者而殺人人告曽子之母母曰吾子不殺人也織自􅀂有頃人又曰曽參殺人曽子母懼投杼踰墻魏略曰太祖始丁夫人又劉夫人生子循及清河長公主劉早終丁養子循子循亡於穰丁常言將我兒殺之都不復念遂􅂘泣無節太祖忿之遣歸家欲其意折後太祖就}
  - {type: page-break, offset: 3375, content: '', id: KR3k0012_SBCK_826-1b}
  - {type: variant, offset: 3375, length: 0, content: '', WYG: 去織婦㧞園葵戰國䇿曰甘茂相秦武王曰曽子處屈人有與曽子同名姓者而殺人人告曽子之母母曰吾子不殺人也織自若有頃人又曰曽參殺人曽子母懼投杼踰墻而走魏志曰太祖始丁夫人又劉夫人生子脩及清河長公主劉早終丁飬子脩亡於穣丁常言将我兒殺之都不復念遂泣哭无節太祖忿之遣歸家欲其意折後太祖就}
  - {type: page-break, offset: 3375, content: '', id: KR3k0012_WYG_826-2a, image: WYG0900/WYG0900-0310c.png}
  - {type: variant, offset: 3375, length: 0, content: '', krp: 去織婦㧞園葵戰國䇿曰甘茂謂秦武王曰曽子處屈人有與曽子同名族者而殺人人告曽子之母母曰吾子不殺人也織自若有頃人又曰曽參殺人曽子母懼投杼踰墻魏略曰太祖始丁夫人又劉夫人生子循及清河長公主劉早終丁養子循子循亡於穰丁常言將我兒殺之都不復念遂哭泣無節太祖忿之遣歸家欲其意折後太祖就}
  - {type: variant, offset: 3376, length: 0, content: '', SBCK: 之夫人方織外人傳公至夫人踞機如故公到撫其背曰頋我共載歸乎夫人不頋又不應太祖却行立於户外復云得無尚可􅁘遂不應太祖曰眞決矣遂與絶魏志曰中山㳟王衮徙封濮陽太和二年就國尚儉約勑妃妾紡績紝織習爲家人之事呉志曰陸凱上䟽云自昔先帝時後宫列女及諸織絡數不滿百米有畜積貨財有餘先帝崩後㓜景在位便改奢侈不蹈先跡伏聞織絡及諸徒坐乃有千數又曰華覈上䟽云今吏士之家少無子女多者三四少者一二通令户有一女十萬家則十萬人人人織績一歳一束則十萬束矣使四疆之内同心勠力數年之間}
  - {type: page-break, offset: 3376, content: '', id: KR3k0012_SBCK_826-2a}
  - {type: variant, offset: 3376, length: 0, content: '', WYG: 之夫人方織外人傳公至夫人踞機如故公到撫其背曰顧我共載歸乎夫人不顧又不應太祖却行立於外户復云得无尚可耶遂不應太祖曰真訣矣遂絶魏志曰中山恭王褒徙封濮陽太和二年就國尚儉約勅妃妾紡績紝織習為家人之事吴志曰陸凱上言云自昔先帝時後宫列女及諸織絡數不滿百諸有蓄積貨財有餘先帝崩後㓜景在位便改奢侈不蹈先跡伏聞織絡及諸徒坐乃有千數又曰華覈上疏云今吏士之家少無子女多者三四少者一二通令户有一女十萬家則十萬人人人織績一嵗一束則十萬束矣使四疆之内同心戮力數年之間}
