  - {type: variant, offset: 162, length: 221, content: 季春吉祀皇后享先蠶先蠶天駟享先蠶而後躬桑示率先天下也又孟夏曰是月也蠶事既登后妃獻繭乃收繭稅以桑為均貴賤長幼如一以給郊廟之服后妃獻繭進其成功也乃收繭稅十而取一以桑為均者謂用桑多則繭多桑少則繭少貴賤長幼如一各自以桑為不得以人貴賤長幼為差又檀弓曰成人有其兄死而不為衰者聞子皋將為成宰遂為衰成人曰蠶則績而蟹有匡范則冠而蟬有緌兄則死而子皋為之衰蚩兄死者言其衰之不為兄死如蟹有匡蟬有緌不為蠶之績范之冠也范蜂也蟬蜩也緌謂蜩啄長在腹下又祭義曰古者天子諸侯必有, SBCK: 左傳文}
