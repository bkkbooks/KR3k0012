  - {type: variant, offset: 3910, length: 3, content: 謝鯤鄰, SBCK: 鄭袤妻曹氏事舅姑甚孝躬紡績之勤以充奉養南史曰宋􅀽㓜孤飢寒不足母琅邪王氏太尉長史延之女也躬事績紡以供朝夕又曰齊劉揩爲交州與垣曇􅀷同行曇􅀷未至交州而卒曇􅀷妻鄭字獻英筞陽人時年二十子文凝始生仍隨揩到鎭晝夜紡織居一年私裝了乃告揩求還又曰梁武丁貴嬪少時與隣女月下紡績諸女並患蚊蚋而貴嬪弗之覺也郷人魏益將娉之及成而武帝鎮樊城嘗登樓以望見漢濵五采如龍下有女子擘絖則貴嬪也又丁氏因人以聞之於帝帝贈以金環納之時年十四又曰諸曁東洿里屠氏女父失明痼疾親戚相弃郷里不容女移父母逺住紵舎晝採樵夜紡績以供養父母陳書曰陳靈洗爲公侯數妾無游手普督之紡績至於散用貲財亦不儉恡隋書曰孝婦覃氏者上郡鍾氏婦也與其夫相見未幾而夫死時年十八事後姑以孝聞數年之間姑及伯叔皆相繼而死覃氏躬自節儉晝夜紡績畜財十年而葬喪爲州里所敬上聞而賜米百石表其門閭又曰鄭善果母清河崔氏旣寡之後􅁪自紡績毎夜分􅄰善果曰兒封侯開國位居三品秩俸幸足母何自勤如是耶荅曰嗚呼汝年巳長成吾謂汝知天下之理今聞此言故猶未也至於公事何由濟乎今此秩俸乃是天子報尔先人之用命也當須散贍六姻爲君先之惠妻子柰何獨擅其利以爲富貴哉又絲枲紡績婦人之務上自王后下至大夫士妻各有所製􅀂墮業者是爲驕逸吾雖不知禮其可自敗名乎唐書曰永泰二年夏賜安南節度婦金氏兩丁侍養金氏夲賊帥陶齊亮之母以忠義訓齊亮齊亮不受遂與齊亮絶自績而衣自田而食州里稱之仍詔夲道使毎季給銀二兩充衣服以終其身國語曰魯公父文伯退朝朝其母母方績文伯曰以􅢴之家而主猶績言}
