  - {type: variant, offset: 114, length: 47, content: 是月也命有司無伐桑柘愛蠶食有司謂主山林之官乃修蠶器蠶器謂簿槌鈳筐之類后妃齊戒享先蠶而躬桑以勸蠶, SBCK: 女子十年不出執麻葈治絲繭織紝組紃學女}
  - {type: variant, offset: 114, length: 180, content: 是月也命有司無伐桑柘愛蠶食有司謂主山林之官乃修蠶器蠶器謂簿槌鈳筐之類后妃齊戒享先蠶而躬桑以勸蠶事季春吉祀皇后享先蠶先蠶天駟享先蠶而後躬桑示率先天下也又孟夏曰是月也蠶事既登后妃獻繭乃收繭稅以桑為均貴賤長幼如一以給郊廟之服后妃獻繭進其成功也乃收繭稅十而取一以桑為均者謂用桑多則繭多桑少則繭少貴賤長幼如一各自以桑為不得以人貴賤長幼為差又檀弓曰成人有其兄死而不為衰者聞, WYG: 女}
