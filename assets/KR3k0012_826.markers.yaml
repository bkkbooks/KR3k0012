  - {type: variant, offset: 3377, length: 0, content: '', SBCK: 帛必積恣民五色唯所服用但禁綺繡無益之飾此救乏之上務冨國之夲業也南史曰齊宣孝陳皇后家貧少勤織作家人矜其勞或止之后終不改唐書曰盧坦爲壽安令時河南尹徴賦限窮而縣人訴以機織未就坦請延十日府不許令人就織而輸勿頋限也違之不過罰令俸耳旣成而輸坦亦坐罰由是知名墨子非樂曰使婦人爲之廢紡績織維之事莊子曰民有常性織而衣耕而食是謂同德又曰叔文相莒三年歸其母自織請其母曰文相莒三年有馬千駟今猶自績文之所得事皆將弃之母曰婦人不}
  - {type: page-break, offset: 3377, content: '', id: KR3k0012_SBCK_826-2b}
  - {type: variant, offset: 3377, length: 0, content: '', WYG: 帛必積恣民五色唯所服用禁綺繡無益之飾此救乏之上務富國之本業也南史曰齊孝宣陳皇后家貧少勤織作家人矜其勞或止之后終不改唐書曰盧坦為夀安令時河南尹徴賦限窮而縣人訴以機織未就坦請延十日府不許令人就織而輸勿顧限也違之不過罰令俸耳既成而輸坦亦坐罰由是知名墨子非樂曰使婦人為之廢紡織績紝之事荘子曰民有常性織而衣耕而食是謂同徳又曰叔文相莒三年歸其母自織請其母曰文相莒三年有馬千駟今主猶自績文之所得事皆将去之母曰婦人不}
