  - {type: variant, offset: 3411, length: 3, content: 與貞義, WYG: 澼絖為事澣禮記禮器曰晏平仲祀其先人豚肩不揜豆澣衣濯冠以朝君子以為隘矣又内則曰父母舅姑冠𢃄垢和灰請潄衣裳垢和灰請澣又曰是日也妻以子見父貴人則為衣服由命士以下皆潄澣又}
