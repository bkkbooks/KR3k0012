  - {type: variant, offset: 3398, length: 1, content: 妻, SBCK: 少}
  - {type: variant, offset: 3398, length: 0, content: '', WYG: 少也既學而歸孟母方織問曰學何所至矣子曰自若也母以刀斷其機子懼而問其故母曰子之廢學若吾斷斯機也夫君子學以立名問則廣之是以居則安寕動則逺害今而廢之則是不免於斯役而無以離於患禍何以異於織而中道廢而不為豈能衣其夫子而長不乏粮食哉孟子懼旦夕勤學不息又曰文伯相魯敬姜謂之曰吾語汝治國之要盡在經耳畫者所以正枉也不可不强故幅可以為将畫所以均不服也故畫可以為正物所以治蕪與草也故物可以為都大夫持而不出入而不絶者捆也以為大行人推而往引而來者綜也可以為闗内之師主多少之數者均也均可為内史服重任行逺道正直而固者軸也可以為相舒而無窮者摘摘者可以為三公文伯載拜受教孝子傳曰董永性至孝而父死賣身以備棺斂既葬即詣主人将償其值路逢一女子云能織願為永}
  - {type: page-break, offset: 3398, content: '', id: KR3k0012_WYG_826-5a, image: WYG0900/WYG0900-0312a.png}
  - {type: variant, offset: 3398, length: 1, content: 妻, krp: 少}
  - {type: variant, offset: 3399, length: 0, content: '', WYG: 永不得已與同詣主人問其故永具以對主人曰必爾者但令爾婦為我織縑百疋於是妻謂主人曰必爾百疋具焉主人大驚即遣永夫妻出門妻謂永曰我天之織女卿篤孝賣身葬父故天使我為君償債耳言終忽然不見仇池記曰仇池縣庫下悉安織婢綾羅絹布數十張機崔元始正論曰僕前為五原太守土地不知緝織冬至織草卧其中若見吏以草纒身令人酸鼻吾乃賣儲歭得二十餘萬詣雁門廣武迎織師使功手作機及紡以教民織具以上聞古艶歌曰孔雀東飛苦寒無衣為君作妻中心惻悲夜夜織作不得下機三日載疋尚言吾遲古歌辭曰大婦織綺羅中婦織流黄小婦無所為携琴上髙堂大人且徐徐調絃遽未央古詩曰迢迢牽牛星皎皎河漢女纎纎擢素手札札弄機杼被徒元書曰冝修田農作園圃織紡紝績為坐作之本利常令供食之物有廉幅紡績左傳昭十九年初莒有婦人莒子殺其夫己為嫠婦及老託於記鄣紡焉以度而去之因紡纑連所紡以度城而藏之以待外攻者欲以報仇及師至則投諸外投繩城外隨之而出毛詩國風東門之枌曰不績其麻市}
  - {type: page-break, offset: 3399, content: '', id: KR3k0012_WYG_826-5b, image: WYG0900/WYG0900-0312b.png}
