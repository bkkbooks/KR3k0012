  - {type: variant, offset: 3915, length: 1, content: 美, SBCK: 寵不當績也懼忓季孫之怒也季孫康子位尊又爲大宗其以歜爲不能事主乎其毋歎曰魯其亡乎使僮子備官而未之聞耶僮矇不達也言巳居官而未聞道春秋後語曰甘茂奔齊路逢􅂫代將爲齊使於􅁗甘茂曰臣得罪於􅁗逃遁至此遁潜也無所容跡容跡猶容足也吾聞貧人}
