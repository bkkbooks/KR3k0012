  - {type: variant, offset: 3378, length: 1, content: 出, SBCK: 紡績織絍必有􅁋泆之心韓子曰呉起示其妻以組曰爲我織組令如是組巳就而效之其組異善起曰非詔也使衣而歸其父請徃之起曰}
  - {type: variant, offset: 3378, length: 1, content: 出, WYG: 績紡織紝必有滛泆之心韓子曰吴起示其妻以組曰為我織組令如是組已就而效之其組異善起曰非詔也使衣而歸其父請往之起曰}
  - {type: variant, offset: 3378, length: 1, content: 出, krp: 紡績織絍必有淫泆之心韓子曰呉起示其妻以組曰爲我織組令如是組巳就而效之其組異善起曰非詔也使衣而歸其父請徃之起曰}
  - {type: variant, offset: 3380, length: 2, content: 婦燔, SBCK: 無虚言又曰魯人身善織履妻善織縞而欲徙於越或謂之曰子必窮矣魯人曰何也曰履之也而越人舟行縞爲冠之也而越人􅀍髮以子之所長也游於不用之國欲使無窮}
  - {type: variant, offset: 3380, length: 2, content: 婦燔, WYG: 無虛言又曰魯人身善織履妻善織縞而欲徙於越或謂之曰子必窮矣魯人曰何也曰履之也而越人舟行縞為冠之資而越人被髪以子之所長也㳺扵不用之國欲使無窮}
