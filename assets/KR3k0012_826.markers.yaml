  - {type: variant, offset: 3932, length: 2, content: 陶侃, SBCK: 昔有老姥雨夜紡績㫁失􅜒所在姥獨罵云何物􅀑擔去户外即有應言蹔􅀉避雨實不偷􅜒自執覔姥驚懼窺外無所見􅜒亦㝷􅀗王子年拾遺記曰魏文帝所愛美人薛靈芸常山人父業經爲鄭郷亭長母陳氏隨業舎於亭傍靈芸年十七生居貧賤至夜毎聚隣婦夜績以麻蒿自照漂說文曰漂水中擊絮也史記曰韓信從下郷城下釣有漂母見信飢飯信竟漂數十日越絶書曰伍子胥至漂陽見一女子擊絮於瀬水中子胥曰豈可得飡乎女曰諾即發其簞飯清其壷漿而與之子胥謂女子母令之露子胥行五歩還頋女子自投瀬水之中呉越春秋同莊子曰宋人有善爲不􅀛手之藥者丗丗以洴澼絖爲事郭象注曰其藥能令手不拘折故常漂絮於水中也澣禮記禮器曰晏平仲祀其先人豚肩不揜豆澣衣濯冠以朝君子以爲隘矣隘猶狹陋也祀不以少牢與無田者同不盈礼也大夫士有田則􅀕無田則薦澣衣濯冠儉不務新又内則曰父母舅姑冠帶垢和􅁅請漱衣裳垢和􅁅請澣手曰漱足曰澣和漬也又曰是日也妻以子見於父貴人則爲衣服由命士以皆漱澣貴人大夫以上也由自也又曰妾子生三月之未漱澣夙齊見於内寢毛詩葛覃曰薄汙我私薄澣我衣汙煩也私燕服也婦人有副禕盛飾以朝事舅姑接見于宗廟進見于君子其餘則私也澣謂濯之耳又栢舟曰心之憂矣如匪澣衣如衣之不澣矣箋云衣之不澣則憒辱無照察漢書曰石奮以上大夫禄歸老于家長子建爲郎中令少子慶爲内史建老白首萬石君尚無恙毎五日洗沐歸謁親入子舎􅀼問侍者取親中帬厠榆身自澣洒師古曰親謂父也中羣􅀂今言中衣也厠䄖者近身之小衫􅀂今小衫也復與侍者不敢令萬石君知之以爲常晉書曰王師敗績於湯隂百官侍衛莫不潰散唯􅄞紹以身捍衛遂􅀍害於帝側血濺御服天子􅀷哀歎之及事定左右欲澣衣帝曰此嵇侍中血勿去又曰鄭袤妻曹氏食無重味服澣濯之衣宋書曰左僕射謝景仁性嚴整潔居宇浄麗每坐輙唾左右人衣事畢即聽一日澣濯毎欲唾左右爭來受之又曰江湛爲吏部尚書家甚貧不營財利餉饋盈門無一所受無兼衣餘食甞爲上所召遇澣衣稱疾經日衣成然後起梁書曰武帝雖衣浣衣而左右衣必須㓗}
