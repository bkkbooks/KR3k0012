  - {type: variant, offset: 3618, length: 339, content: 十綜者六十躡馬生者天下之名巧也患其遺日喪功乃皆易以十二躡其奇文異變因感而作王逸機賦曰舟車棟宇麤工也杵臼碓磑直巧也槃材縷小用也至於織機功用大矣上自太始下訖羲皇帝軒龍躍庾業是創俯系聖思仰攬三光悟彼織女終日七襄爰制布帛始垂衣裳於是取衡山之孤桐南岳之洪樟勝復迴轉刻象乾形大庭淡泊擬則川平先為日月蓋取昭明三轉列布上法台星兩驥齊首儼若將征方圓綺錯極妙窮奇兔耳跧伏若安若危猛犬相守竄身匿蹄高樓雙峙以臨清池遊魚衘餌瀺灂其陂鹿廬並趍纖繳俱垂宛若星圖屈膝推移爾乃垂輕杼欖床帷動搖多容俯仰生姿古詩曰纖纖擢素年扎扎弄機杼又曰皎皎白素絲織為寒女衣寒女雖巧妙不得秉機杼梭通俗文曰梭織具也所以行緯之蘇戈切鄧粲晉書曰謝鯤鄰家有美女鯤桃之女以梭投之折其兩齒異苑曰陶侃嘗捕魚得一梭還插著壁有頃雷雨梭變成赤龍從屋而躍, WYG: ''}
