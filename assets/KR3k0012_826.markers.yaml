  - {type: variant, offset: 3421, length: 9, content: 利洿行反裘負薪古人, SBCK: 離於患禍何以異於織績而中道廢而不爲豈能衣其夫子而長不乏粮食哉孟子懼旦夕勤學不息又曰文伯相魯敬姜謂之曰吾語汝治國之要盡在經耳經者緫絲縷以成文采有經國治民之象夫幅者所以正枉也不可不強故幅可以爲將枉曲也幅強乃能正曲將強乃能除亂以幅喻將也晝者所以均不服也故晝可以爲正晝傍也正官長也緦縷得晝以喻徒庶得長而後齊物者所以治蕪與莫莫也故物可以爲都大夫物謂一文墨也不}
