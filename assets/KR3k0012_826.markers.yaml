  - {type: 'tls:seg', offset: 3400, content: '', id: KR3k0012_CHANT_826-53a.10}
  - {type: variant, offset: 3400, length: 1, content: 羊, SBCK: 旣學而歸孟母方織問曰學何所至矣}
  - {type: page-break, offset: 3400, content: '', id: KR3k0012_SBCK_826-3a}
  - {type: variant, offset: 3400, length: 1, content: 羊, WYG: 婆娑又曰八月載績載𤣥載黄我朱孔陽為公}
  - {type: variant, offset: 3400, length: 1, content: 羊, krp: 旣學而歸孟母方織問曰學何所至矣}
  - {type: variant, offset: 3402, length: 1, content: 出, SBCK: 曰自􅀂也言未能􅀶母以刀㫁其織子懼而問其故母曰子之廢}
  - {type: variant, offset: 3402, length: 2, content: 出學, WYG: 裳漢書曰張安世尊為公侯食邑萬户身衣弋綈夫人自紡績又曰冬民既入婦人同巷相從夜績女工一月得四十五日必相從者所以省費燎火同巧拙而合習俗也晋書曰鄭柔妻曹氏事舅姑甚孝躬紡績之勤以充奉飬南史曰宋袁粲幼孤飢寒不足母琅邪王氏太尉長史誕之女也躬事紡績以供朝夕又曰齊劉楷為交州與垣曇深同行曇深未至交州而卒曇深妻鄭獻英榮陽人時年二十子文凝初生乃隨楷到鎮晝夜紡績居一年私装了乃告求還又曰梁武丁貴嬪少時與隣女月下共織諸女並患蚊蚋而貴嬪弗之覺也鄉人魏益德將聘之未成而武帝鎮樊城嘗登楼以望見漢濱五采如龍下有女子擘絖則貴嬪也又丁氏因人以聞之於帝帝贈以金環納之時年十四嵗又曰諸暨東灣里屠氏女父失明痼疾親戚相弃鄉里不容女移父母逺住紵舍晝採樵夜紡績以供飬父母陳書曰程靈洗為公侯伎妾無游手並督之紡績至於散用貲財亦不儉恡隋書曰孝婦覃氏者上郡鍾氏婦也與其夫相見未幾而夫死時年十八事}
  - {type: page-break, offset: 3402, content: '', id: KR3k0012_WYG_826-7b, image: WYG0900/WYG0900-0313b.png}
