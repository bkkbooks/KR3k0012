  - {type: variant, offset: 3575, length: 139, content: 初作衣也伯余黃帝臣也緂麻素縷手經指挂後世為之機杼勝復以便其用傳子曰舊機五十綜者五十躡六十綜者六十躡馬生者天下之名巧也患其遺日喪功乃皆易以十二躡其奇文異變因感而作王逸機賦曰舟車棟宇麤工也杵臼碓磑直巧也槃材縷小用也至於織機功用大矣上自太始下訖羲皇帝軒龍躍庾業是創俯系聖思仰攬三光悟彼, SBCK: ''}
