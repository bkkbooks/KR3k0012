  - {type: variant, offset: 3416, length: 1, content: 聞, WYG: 生子三月之末潄澣夙齊見於内寢毛詩葛覃曰薄汙我私薄澣我衣又栢舟曰心之憂矣如匪澣衣漢書曰石奮以上大夫禄歸老于家長子建為郎中令少子慶為内史建老白首萬石}
