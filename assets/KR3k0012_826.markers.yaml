  - {type: variant, offset: 295, length: 1149, content: 皋將為成宰遂為衰成人曰蠶則績而蟹有匡范則冠而蟬有緌兄則死而子皋為之衰蚩兄死者言其衰之不為兄死如蟹有匡蟬有緌不為蠶之績范之冠也范蜂也蟬蜩也緌謂蜩啄長在腹下又祭義曰古者天子諸侯必有公桑蠶室近川而為之築宮仞有三尺棘牆而外閉之及大昕之朝君皮弁素積卜三宮之夫人世婦之吉者使入蠶室奉種浴于川桑于公桑風戾以食之大昕季春朔月之朝也諸侯夫人三宮半王后也風戾之者及早涼脆采之風戾之使露氣燥乃以食蠶蠶性惡濕歲既單矣世婦卒蠶奉繭以示于君遂獻繭于夫人又祭統曰是故天子親耕于南郊以共齊盛王后蠶于北郊以共純音緇服諸侯耕於東郊以共齊盛夫人蠶於北郊以共冕服天子諸侯非莫耕也王后夫人非莫蠶也春秋文耀鉤曰商絃絕蠶合絲絃將絕蠶含絲以待用也春秋考異郵曰蠶陽者大火惡水故食不飲桑者土之液木生火故蠶以三月葉類會精合相食爾雅曰蛾羅蠶蛾螝蛹音龜蠶蛹蟓桑繭食桑葉作繭即今蠶也雔由樗繭食樗葉棘繭食棘葉欒繭食欒葉蚢蕭繭食蕭葉者皆蠶類史記天官書曰正月上甲風從東方來宜蠶續漢書曰光武建武二年野蠶成繭民收其絮又輿服志曰貴人助蠶瑇瑁釵簪珥東觀漢記曰明德馬后置織室蠶於濯龍中往來觀內以為娛樂謝承後漢書曰南陽范充為吳桂陽太守教民植桑絺紵之屬養蠶織履民得利益吳錄曰南陽郡一歲蠶八績後魏書曰世宗正始年徐州蠶蛾喫人尫殘者一百一十餘人死者二十二人時高肇專政聚歛不息隋書曰江湖之南一年蠶四五熟唐書曰武德中梁州言野蠶成繭百姓採而用之又曰文德太后率內外命婦有事於親蠶又曰開元中上命官中食蠶親自臨視欲使嬪御已下知女工之事及蠶罷獲絲甚多因以賜焉又曰天寶中益州獻三熟蠶緊厚白淨與常蠶不殊又曰大曆中太原府清河縣人韓景暉養冬蠶成繭詔給復終身韓子曰鱓似虵蠶似蠋人見虵驚駭見蠋則毛起而漁者持鱓婦人拾蠶利之所在皆賁育也淮南子曰季春后妃齋戒東鄉就桑省婦使觀蠶事又曰蠶食而不飲三十日而化又曰食桑者有絲而蛾又曰蠶食礜而不飲又曰蠶餌絲而商絃絕商絃金聲也春蠶吐絲金死故絕賁星墜而渤海決賁星流星也勃海水之勃怒也又曰原蠶一歲再登非不利也然王法禁之者以其殘桑淮南方畢術曰白芳七結浴蠶又曰僵蠶使馬不食欲愈之以桑拭口皋即食矣馬喜齧人亦以僵蠶眉拭脣即不齧也抱朴子曰甘始以藥粉桑長蠶蠶得十月不老金樓子曰楊泉蠶賦序曰古人作賦者多矣而獨不賦蠶乃為蠶賦是何言歟楚蘭陵荀如有蠶賦德淵近不見之有文不如無述也東方朔別傳曰武帝求神仙朔言能上天取藥上知其謾欲極其言即遣方士與朔上天朔曰當有神來迎我後方士晝臥朔遽口呼若極真者吾從天上還方士遽以聞上以為面欺下朔獄朔泣曰臣幾死者再天公問臣下方何衣朔曰衣蠶蠶何若曰喙呥呥仁廉切類馬色班班類虎天公大怒以臣為謾繫臣司空使使下問還報有之乃出臣今陛下以臣為詐願使使上問之上曰齊人多詐欲以喻我止方士也罷方士東方朔占曰正月旦竟日不風清明宜蠶列仙傳曰園客濟陽人姿皃好而良邑人多欲以女妻之客終不娶種五色香草積數, WYG: ''}
