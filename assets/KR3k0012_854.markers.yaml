  - {type: punctuation, offset: 9, content: 「, id: KR3k0012_CHANT_854-bkkpn4}
  - {type: variant, offset: 9, length: 1, content: 腕, SBCK: 臣聞貧賤之知不可忘糟糠之妻不下堂帝顧謂主曰事不諧矣華嶠後漢書曰藥崧家貧爲郎無􅀍食糟自此詔給大官食魏志曰李通禽黄巾大師呉覇而降其属遭歳大飢通傾家振施與士分糟糠皆争爲用由是盗不敢犯六韜太公曰古之亂君夏桀殷紂積糟爲丘以酒爲池飲者常三千人糠爾雅曰糠}
  - {type: variant, offset: 9, length: 1, content: 腕, WYG: 臣聞貧賤之交不可忘糟糠之妻不下堂帝顧謂主曰事不諧矣華嶠後漢書曰樂崧家貧為郎無被食糟自此詔給太官食魏志曰李通禽黄巾大師呉覇而降其屬遭歳大荒飢通傾家振能與士分糟糠皆爭為用由是盗不敢犯六韜太公曰古之亂君夏桀殷紂積糟為丘以酒為池飲者常三千人糠爾雅曰糠}
