  - {type: variant, offset: 8, length: 0, content: '', SBCK: 貴易交冨易妻人情乎弘}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 富易交貴易妻人情乎𢎞}
  - {type: punctuation, offset: 9, content: ：, id: KR3k0012_CHANT_854-bkkpn3}
