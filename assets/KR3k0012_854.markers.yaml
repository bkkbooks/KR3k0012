  body:
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 二糟糠糟􅀃文曰糟酒滓也糠榖皮也春秋後語曰張儀􅀃韓惠王曰韓地多阨惡山居五榖所生非菽而麥民之食大板菽飯藿羹}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 二糟糠糟説文曰糟酒滓也糠糓皮也春秋後語曰張儀説韓恵王曰韓地多險惡山居五榖所生非菽而麥民之食大校菽飯藿羮}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_854-1b, image: WYG0900/WYG0900-0509b.png}
  - {type: variant, offset: 4, length: 27, content: 一𩜌方言曰腕謂之餚以豆屑雜𩛿也蒼頡解詁曰𩜌飴中著豆屑也, krp: 二糟糠糟}
  - {type: xml-element, offset: 5, content: '', id: KR3k0012_CHANT_854-bkkxmlele1}
  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0012_CHANT_854-1a.1}
  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0012_CHANT_854-1a.2}
  - {type: variant, offset: 5, length: 1, content: 𩜌, SBCK: 歳不収民不厭食糟糠又曰秦急圍邯鄲邯鄲且欲降􅀓舎吏子李同􅀃平原君曰今邯鄲之民析骨而炊易子而食可謂急矣而君之後宫以百數婢妾􅀍綺縠餘梁􅁏而民􅁦衣不完糟糠不厭君器物鍾鼔自􅀂使秦破趙安得而有此哉後漢書曰明帝姉湖陽公主新寡帝與共論朝臣微􅀚其意主曰宋公威容德器羣臣莫及帝白}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_854-1b}
  - {type: variant, offset: 5, length: 1, content: 𩜌, WYG: 歳不収民不厭糟糠又曰秦急圍邯鄲邯鄲且欲降𫝊舍吏子李同説平原君曰今邯鄲之民析骨而炊易子而食可謂急矣而君之後宫以百數婢妾被綺縠餘梁肉而民弊衣不完糟糠不厭君器物鐘鼓自若使秦破趙安得而有此哉後漢書曰明帝姉湖陽公主新寡帝與共論朝臣微觀其意主曰宋𢎞威容徳器羣臣莫及帝曰}
  - {type: substitution, offset: 5, original: 𩜌, replacement: 豌, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-14562}}
