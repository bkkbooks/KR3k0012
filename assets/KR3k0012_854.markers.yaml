  - {type: variant, offset: 7, length: 0, content: '', SBCK: 且圖之後弘􅀍引見帝令主坐屏風後因謂弘曰諺}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 且圖之後𢎞被引見帝令主坐屏風後因謂𢎞曰常}
