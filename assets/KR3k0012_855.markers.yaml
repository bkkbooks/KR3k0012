  - {type: variant, offset: 149, length: 0, content: '', SBCK: 羊續爲南陽太守塩䜴共壷􅀽宏漢紀曰李􅔸數設酒請郭汜或留汜汜妻懼與􅔸婢妾私而奪巳愛思有以離間之􅔸送饋汜妻乃以䜴爲藥汜將食妻曰食從外來儻或有故遂􅎥藥示之曰一栖不兩雄我固疑將軍之信李公也}
  - {type: variant, offset: 149, length: 0, content: '', WYG: 羊續為南陽太守鹽豉共一壺袁宏漢記曰李傕數設酒請郭汜或留汜妻懼與傕婢妾私而奪己愛思有以離間之傕送饋汜妻乃以豉為藥汜將食妻曰食従外来儻或有故遂摘藥示之曰一栖不兩雄我固疑將軍之信李公也}
