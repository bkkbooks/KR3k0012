  - {type: variant, offset: 2028, length: 173, content: 郭璞注曰在糞土中者蝤蠐蝎在木中有也今雖通名之為蝎所在異也莊子曰烏足根為蠐螬司馬彪曰烏足草名生水邊曹齊曹也淮南萬畢術曰黍成蠐螬以秋冬穫黍置溝中即生蠐螬也王充論衡曰蠐螬化為復育復育轉為蟬揚雄方言曰蠀螬謂之蟦蜚翠自關而東謂之蝤蠀酋資兩音或謂之卷屬書卷或謂之蝖螜亦呼堂齊或呼地蠶宣斛兩音梁益之間謂之蛒音格或謂之蝎或謂之蛭音質蛒秦晉之間或謂蠹或謂之天螻按爾, WYG: 廣}
