  - {type: variant, offset: 1530, length: 342, content: 馬蠲虳也俗呼馬蚰虳音均張揖廣雅曰蛆子魚切蟝強魚切馬蚰音逐馬蚰馬蚿也宋書曰王素聲譽甚高山中有蚿其聲清長聽之使人不厭而其形甚醜素乃為蚿賦以自況魯仲連子曰諺云百足蟲三斷不蹶者持之者眾文子曰善用人者若蚿之足眾不相害淮南子同莊子曰夔憐蚿蚿憐虵夔謂蚿曰吾以一足趻士今切踔勑卓切而行予無如矣今子使萬足獨柰何蚿曰不然子不見夫唾乎噴則大者如珠小者如露今子動吾天機不知所以然司馬彪曰北燕謂蚿為且渠也淮南子曰季夏草為蚈草得陰而死極陰中反陽故化為蚈蚈馬蠸也蠸音權又曰良將之卒若虎之牙若兕之角若鳥之羽若蚈音牽之足蚈馬蠸也又曰蚈足眾走不及虵物固有小不如大也明堂月令曰腐草為蠲揚雄方言曰北燕馬蚿謂之蛆蟝張茂先博物志曰馬蚿一名百足中斷則頭尾各異行而去本草經曰馬陸一名百足吳氏本草經曰一名馬軸蝔淮南子曰蝔知將雨高誘曰蝔, SBCK: 此瓮器底}
