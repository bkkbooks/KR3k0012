  - {type: punctuation, offset: 328, content: 《, id: KR3k0012_CHANT_949-bkkpn125}
  - {type: variant, offset: 328, length: 214, content: 符子曰晉公子重耳奔齊與五臣而遊乎大澤之中見蜘蛛布其網曳其網而執豸以食之公子重耳觀之顧謂其臣咎犯曰此蟲也智之薄者矣而猶役其智曳其網而執豸以食之況乎人之有智而不能廓垂天之網布絡地之網以供方丈之御是曾不如蜘蛛之智孰可謂之人乎咎犯曰公子慎勿言也終行之則有邦有嗣矣金樓子曰楚國龔舍初隨楚王朝宿未央宮見蜘蛛焉有赤蜘蛛大如栗四面縈羅網有蟲觸之而死者退而不能得出焉舍乃歎曰吾生亦如是耳仕官者人之網羅也豈可淹歲於是挂冠而退時人笑之謂舍為蜘蛛之隱揚, SBCK: 楊}
