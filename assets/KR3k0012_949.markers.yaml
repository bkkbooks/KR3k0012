  - {type: variant, offset: 15, length: 17, content: 蜘蛛作網以司行旅青蠅嚵噉以求膏腴又, SBCK: 武帝元鼎五年秋蛙與蝦蟇俱􅃲是歳四􅀅軍衆十萬征南越開九郡後漢書曰馬援爲隗􅅝使公孫􅄒歸謂􅅝曰子陽井底蛙耳言述志識􅄶狹如坎}
  - {type: page-break, offset: 15, content: '', id: KR3k0012_SBCK_949-2b}
  - {type: variant, offset: 15, length: 4, content: 蜘蛛作網, WYG: 蟼蟇郭璞注云蛙類音驚亦曰景科斗活東蝦蟇子也周禮秋官下曰蟈氏掌去鼃黽焚牡鞠菊同}
  - {type: variant, offset: 15, length: 17, content: 蜘蛛作網以司行旅青蠅嚵噉以求膏腴又, krp: 武帝元鼎五年秋蛙與蝦蟇俱鬪是歳四将軍衆十萬征南越開九郡後漢書曰馬援爲隗囂使公孫𫐠歸謂囂曰子陽井底蛙耳言述志識𥚹狹如坎}
  - {type: punctuation, offset: 19, content: ，, id: KR3k0012_CHANT_949-bkkpn6}
  - {type: 'tls:seg', offset: 19, content: '', id: KR3k0012_CHANT_949-1a.5}
  - {type: variant, offset: 20, length: 12, content: 司行旅青蠅嚵噉以求膏腴又, WYG: 灰洒之則死齊魯之間謂鼃為蟈黽耿黽蟈與耿黽尤怒鳴而聒人耳故去之漢書曰武帝元鼎五年秋蛙與蝦蟇相鬭是嵗四將軍衆十萬征南越開九郡後漢書曰馬援為隗囂使公孫述歸謂囂曰子陽井底蛙耳言述知識褊狹如坎}
