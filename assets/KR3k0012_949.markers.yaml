  - {type: variant, offset: 9, length: 3, content: 林未濟, SBCK: 通卦驗曰夏至小暑蝦蟇無聲山海經曰藟音誄山湖水出焉東流于食水其中多活即師科斗也小雅或曰活東也爾雅曰蟼蟇郭璞注云蛙􅀋音驚亦曰景科斗活東蝦蟇子也周禮秋官下曰蟈氏掌去鼃黽焚牡蘜菊同以灰洒}
  - {type: variant, offset: 9, length: 3, content: 林未濟, WYG: 通卦驗曰夏至小暑蝦蟇無聲山海經曰藟音誄山湖水出焉東流注於食水其中多活師科斗也爾雅謂}
  - {type: variant, offset: 9, length: 3, content: 林未濟, krp: 通卦驗曰夏至小暑蝦蟇無聲山海經曰藟音誄山湖水出焉東流于食水其中多活即師科斗也小雅或曰活東也爾雅曰蟼蟇郭璞注云蛙類音驚亦曰景科斗活東蝦蟇子也周禮秋官下曰蟈氏掌去鼃黽焚牡蘜菊同以灰洒}
