  - {type: variant, offset: 146, length: 2, content: 次蟗, SBCK: 蟋蟀蛬也郭璞曰今促織也亦名青蛚也周書時訓曰小暑之日温風至又五日蟋蟀居壁􅀽宏後漢書曰崔駰上書曰竊聞春陽發而倉庚鳴秋風厲而蟋蟀吟盖氣使之然也于寳搜神記曰朽葦爲蛬麥爲􅺄蝶崔豹古今注曰蟋蟀一名吟蛬秋􅀄生得寒則鳴噪濟南謂爲􅈸婦也又曰沙雞一名促織一名絡緯一名蟋蟀促織謂鳴聲如急織也絡緯謂其聲如紡也促織一曰促機絡緯一名紡緯阮籍詩曰開秋肇涼氣蟋蟀鳴牀帷感物懷殷憂消然心悲盧諶蟋蟀賦曰何兹蟲之資生亦靈智之攸授享神氣之么眇體形容之微陋于時微凉旣戒火靈告去􅀇乙辭宇翔鶤}
