  - {type: variant, offset: 2022, length: 1, content: 蟦, SBCK: 蝎蛣􅔒木中蠹蟲蝎桒蠹即蛣􅔒也漢書曰文帝賜尉佗書衣物佗因使者獻桂蠹一器文子曰山生金反自刻木生蠧還自食穆天子傳曰天子東遊次雀梁蠹書于羽陵謂暴書蠹蟲囚曰蠹書也杜寳大業拾遺録曰七年始安郡獻桂蠹四瓶瓶別一千頭紫色香辛有味噉之去隂痰之疾強蝆}
