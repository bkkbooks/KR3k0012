  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覧卷第九百四十九}
  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 六蟾蜍蝦蟇蟋蟀虭蟧䑕􅀒蠹強蝆齧桑守􅀲蚰蜒蜰蜚廉蠁螋塵蟲蛇公螲蟷金花兹母蟾蜍春秋運斗樞曰紀乖政則蟾蜍月精四頭感翔感翔為妖韓詩外傳曰魚網之設鴻則離之嬿婉之求得此戚施薛君曰戚施蟾蜍喻醜惡文子曰蟾蜍辟兵壽在}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_949-1b}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 六蟾蜍春秋運斗樞曰政紀乖則蟾蜍月積四頭咸翔咸翔為妖韓詩新臺曰魚網之設鴻則罹之嬿婉之求得此戚施薛君戚施蟾蜍也喻醜貎文子曰蟾蜍辟兵壽在}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_949-1b, image: WYG0901/WYG0901-0398b.png}
  - {type: variant, offset: 3, length: 0, content: '', krp: 六蟾蜍蝦蟇蟋蟀虭蟧䑕負蠹強蝆齧桑守瓜蚰蜒蜰蜚廉蠁螋塵蟲蛇公螲蟷金花兹母蟾蜍春秋運斗樞曰紀乖政則蟾蜍月精四頭感翔感翔為妖韓詩外傳曰魚網之設鴻則離之嬿婉之求得此戚施薛君曰戚施蟾蜍喻醜惡文子曰蟾蜍辟兵壽在}
  - {type: xml-element, offset: 4, content: '', id: KR3k0012_CHANT_949-bkkxmlele1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_949-1a.1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_949-1a.2}
  - {type: variant, offset: 4, length: 4, content: 蜘蛛焦贛, SBCK: 月之望淮南子曰月照天下而蝕於蟾諸騰虵游霧而殆於蝍蛆蟾諸月中蝦蟇食羽故曰食於蟾諸殆猶畏也蝍蛆蟋蟀爾雅謂之蜻􅖹之大腹也上蛇蛇不敢動故曰殆於蝍蛆抱朴子曰蟾蜍壽三千歳又曰肉芝者謂萬歳蟾蜍頭上有角頷下有丹書八字再重以五月五日日中時取之隂乾百日以其足畫地即爲流水帶其左手於身辟五兵􅀂敵人射巳者弓弩矢皆反還自向也又曰辟兵法或以月蝕時刻三歳蟾蜍喉下有八字者血以書所持之刀劒􅀇中記曰蟾蜍頭生角得而食之壽千歳又能食山精張衡靈憲曰羿請不死之藥於西王母姮娥竊之以奔月遂託身於月是爲蟾蜍淮南子同河圖曰蟾蜍去月天下大亂西京雜記曰廣川王發晉靈公􅃁得玉蟾蜍一枚大如拳腹空容五合如新王取以盛水滴硯崔寔四民月令曰五月五日取蟾蜍可治惡疽瘡傅􅀇詩曰蟾蜍食明月虹蜺薄朝日蝦蟇}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_949-2a}
  - {type: variant, offset: 4, length: 4, content: 蜘蛛焦贛, WYG: 月之望淮南子曰月照天下而蝕於蟾蜍騰蛇游霧而殆於蝍蛆蟾蜍月中蝦蟇食月故曰食於蟾蜍之大腹也騰蛇畏蝍蛆不敢動故曰殆殆猶畏也蝍蛆蟋蟀爾雅謂之蛬又曰抱朴子曰蟾蜍壽三千嵗又曰肉芝者謂萬嵗蟾蜍頭上有角領下有丹書字再重以五月五日午時取之隂乾百日以其足畫地即為流水書符帶之於身辟五兵若敵人射已者弓弩矢皆反還自向也又曰辟兵法或以月蝕刻時三嵗蟾蜍喉下有八字者取其血以書所持之刀劍即辟五兵𤣥中記曰蟾蜍頭生角得而食之壽千嵗又能食山精之化也張衡靈憲曰羿請不死之藥於西王母姮娥竊之以奔月河圖曰蟾蜍去月天下大亂西京雜記曰廣川王發晉靈公冢得玊蟾蜍一枚大如拳腹空容五合水光潤如新玉取以為書滴崔氏寔四民月令曰五日取蟾蜍可治惡疽瘡詩曰蟾蜍食明月虹蜺薄朝日蝦蟇}
