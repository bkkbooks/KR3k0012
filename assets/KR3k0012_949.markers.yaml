  - {type: variant, offset: 42, length: 10, content: 罔罟杜季利兵傷我心膂, WYG: 記曰懷州凝真觀東廊下柱已五十餘年矣道士徃往聞有蝦蟆聲不敢居處後因柱朽壞以他柱易之斫之於柱中得一蝦蟆其柱又無孔隙嶺表録異曰唐林藹為高州太守有鄉野小兒牧羊聞田中有蛤鳴蛤即大蝦蟆牧童遂捕之蛤躍入一穴中得一銅鼓其色翠緑土射數處損缺其上隱起多鑄蛙黽之狀疑其鳴蛙即銅鼓精也楚辭曰蝦黽遊於藥池芳藥之池成公綏隂霖賦曰百川泛濫横潦流竈中生黽庭通舟蟋蟀易通繋卦曰蟋蟀之䖝隨隂迎陽居壁向外趣婦女織績女工之象今失節不居壁是女工不成有淫佚之行因夜為姦故為門户夜開門户人之所由出入今夜不閉明非也易通卦驗曰立秋蜻蛚鳴白露下蜻蛚上堂京房易妖占曰七月建申為夷則蟋蟀鳴}
