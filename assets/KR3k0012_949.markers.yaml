  - {type: punctuation, offset: 2019, content: 《, id: KR3k0012_CHANT_949-bkkpn687}
  - {type: variant, offset: 2019, length: 0, content: '', SBCK: 似白魚者也􅀃文曰蟠蟅音柘䑕婦也蛜威委􅁰䑕􅀒也于寳搜神記曰豫章有一家婢在竈下忽有人長數寸來竈間婢誤以履踐殺一人湏􅁷遂有數百人着縗麻持棺迎喪凶儀皆備出東門入園中覆舩下就視皆是䑕婦作湯澆殺遂絶葛洪治瘧方曰取䑕婦蟲十四枚各以糟封裹之凢十四丸臨發服七丸便愈陶弘景夲草經曰䑕婦一名蟠􅀒一名伊威一名委人俗言䑕多在坎中背則負之今作婦字如似乖理又一名䑕姑家用此恱媚人甚多方而應少蠹韓詩外傳曰枯魚衘索于何不蠹}
  - {type: page-break, offset: 2019, content: '', id: KR3k0012_SBCK_949-7a}
  - {type: variant, offset: 2019, length: 0, content: '', krp: 似白魚者也說文曰蟠蟅音柘䑕婦也蛜威委黍䑕負也于寳搜神記曰豫章有一家婢在竈下忽有人長數寸來竈間婢誤以履踐殺一人湏臾遂有數百人着縗麻持棺迎喪凶儀皆備出東門入園中覆舩下就視皆是䑕婦作湯澆殺遂絶葛洪治瘧方曰取䑕婦蟲十四枚各以糟封裹之凢十四丸臨發服七丸便愈陶弘景夲草經曰䑕婦一名蟠負一名伊威一名委人俗言䑕多在坎中背則負之今作婦字如似乖理又一名䑕姑家用此恱媚人甚多方而應少蠹韓詩外傳曰枯魚衘索于何不蠹}
