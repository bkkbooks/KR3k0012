  - {type: variant, offset: 146, length: 2, content: 次蟗, WYG: 蟋蟀蛬也郭璞曰今促織也一名蜻蛚也周書時訓曰小暑之日温風至又五日蟋蟀居壁袁洪後漢書曰崔駰上書曰竊聞春陽發而倉庚鳴秋風厲而蟋蟀鳴葢氣使之然也干寶搜神記曰朽葦為蛬麥為蝴蝶崔豹古今注曰蟋蟀一名吟蛬秋初生得寒則鳴噪濟南謂為懶婦也又曰莎雞一名促織一名絡緯一名蟋蟀促織謂鳴聲如急織也絡緯其聲如紡也促織一名促機絡緯一名紡績阮籍詩曰開秋肇凉氣蟋蟀鳴牀帷感物懷殷憂悄然令心悲盧諶蟋蟀賦曰何兹䖝之資生亦靈智之攸授享神氣之么芔體形容之㣲陋于時㣲涼既成大火告去𤣥乙辭宇翔鴻南顧風颯颯而動柯露零零而隕樹月轉景而西頺漢迴波而東注厲清響于干霄激悲聲以迄署王褒聖主得賢臣頌曰虎嘯而風冽龍興而致雲蟋蟀俟秋吟蜉蝣出以隂楚辭曰澹容與而獨倚兮蟋蟀鳴於西堂虭蟧詩義疏曰蝘}
