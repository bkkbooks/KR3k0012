  - {type: variant, offset: 931, length: 67, content: 云受命於天云有瑞應豈然乎賈曰有之夫目瞤得酒食火花得錢財乾鵲噪行人至蜘蛛集百事喜小故猶徵大亦宜然故目瞤則呪之乾鵲噪則餧之蜘蛛集則放之況天, WYG: 備出東門入園中覆舩}
  - {type: variant, offset: 935, length: 281, content: 天云有瑞應豈然乎賈曰有之夫目瞤得酒食火花得錢財乾鵲噪行人至蜘蛛集百事喜小故猶徵大亦宜然故目瞤則呪之乾鵲噪則餧之蜘蛛集則放之況天下大寶人君重位非天命何以得之劉敬叔異苑曰陳郡殷家養子名琅與一婢結好經年婢死後猶往來不絕後夕見大蜘蛛形如斗拌緣床就琅便宴爾怡悅母取而殺之琅性理遂僻劉義慶幽明錄曰某郡張甲者與司徒蔡謨有親僑住謨家暫行數宿過期不反謨晝眼夢甲云暫行忽暴病患心腹病痛脹滿不得吐下某時死主人殯殮謨悲涕相對又云我病名乾霍亂自可治之但人莫知其藥故令死耳謨曰何以治之甲曰取蜘蛛生斷去腳吞之則愈謨覺使人往甲行所驗之果死問主人病時日皆與夢符後有乾霍亂者試用輒差廣五行記曰蜘蛛集, SBCK: 朝寒螿鳴}
