  - {type: variant, offset: 2744, length: 210, content: 屈申體道識窮達傅休弈潛通賦曰蠖屈體以求伸兮龍階木而升雲鮑明遠尺蠖賦曰智哉尺蠖觀機而作申非向厚詘非今薄靜值泉渟機躁遇風驚起軒軀而曠莽伏累氣而併形冰炭弗觸韋刃靡迕逢嶮蹙跡值夷舒步忌好退之見猜哀必進之為蠹每驤首以瞰塗常景行而翻路故身不豫托地無前期從方而應何慮何思是以軍筭慕其權國容擬其變高賢圖之隱淪智士以之藏見笑虵靈之久蟄羞龍德之方戰郭璞尺蠖讚曰貴有可賤賤有不珍嗟茲尺蠖體此屈申論配龍虵見歎聖人張協七命曰鷦飛而生風尺蠖動而成響, WYG: 晦太平御覽卷九百四十九}
