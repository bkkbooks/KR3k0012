  - {type: variant, offset: 40, length: 1, content: 巡, WYG: 郊晉書曰有蛙鳴于華林園惠帝問左右曰為官乎為私乎侍中賈𦙍對曰在官地為官在私地為私宋書曰張暢弟収嘗為猘犬所傷醫云食蝦蟇膾収甚難之暢含笑先嘗収因此乃食創亦即愈齊書曰沈僧昭别名法朗少事天師道士中年為山隂縣梁武陵王紀為㑹稽太守宴坐池亭蛙鳴聒耳王曰殊廢絲竹之聴僧昭呪厭十許口便息及日晩王又曰欲其復鳴僧照曰王宴已䦨令汝鳴即便喧聒又曰卞彬蝦蟆賦云紓青拖紫名為蛤魚世謂比令僕也又曰蝌斗唯唯羣浮闇水唯朝繼夕聿役如鬼比令史諮事也南史孝義傳曰丘傑字偉時呉興烏程人也年十四遭母喪以熟菜有味不嘗於口嵗餘忽夣見母曰死亡是分别耳何事乃爾荼苦汝噉生菜遇蝦蟆毒靈牀前有三味藥可取服之傑驚起果得甌中有藥服之下科斗子數升三國典略曰周天和二年齊武安妖人與其徒偽云盲躄因飲泉水下得金佛其躄遂愈於是逺近信之男女務集水中有黄老蝦蟇如金色乍作乍没齊武安及百官已下莫不敬之隋書曰煬帝在東宫中數有妖變乃命衛尉少卿蕭吉禳邪氣於宣慈殿座祭神是時孟冬地乆無水乃有蝦蟆從西南來入至座忽然而失文子曰禽子問曰多言有益乎墨子曰蝦蟇蛙黽日夜恒鳴口乾舌擗而人不聽今觀晨雞待旦而鳴天下俱動多言何益惟言之時也韓子曰越王句踐欲其民輕死出見鬭黽乃下軾從者曰王何敬也曰以其勇氣故也其後國人輕命死戰淮南子曰夫蝦蟆為鶉蠆為蟌音聰皆生於非其類老蝦為鶉水中䖝所化蠆化為蟌蟌者蜻蜓也唯聖人能知其化又曰蘭芝以芳未嘗見霜芳香也皷造辟兵壽盡五月之望皷造五月葢謂闕一日蝦蟆闕世也人望闕美闕蝦蟆美國語曰趙襄子以尹鐸有寛政於晉陽其民必和乃守晉陽後晉師圍而灌之沉竈生鼃民無叛意神仙傳曰指蝦蟆使舞皆應絃節使止乃止燕丹為太子自喜得荆軻永無秦憂日與軻之東宫臨池而觀軻拾瓦投蛙太子令人奉盤金物理論曰夫虛無之談尚其華藻此無異於春蛙秋蟬聒耳而已風俗通曰蝦蟆善掉尾俗說蝦蟆一跳八尺再跳丈六從春至冬袒裸相逐無他所作掉尾肅肅謹按蝦蟆既處水中其尾又短正使掉之豈能肅肅乎原其所以當言夏馬患蚋掉尾振撃常肅肅也蝦蟆夏馬音相似崔豹古今注曰科斗蝦蟆子也一名懸鈎一名𤣥魚形圓有尾聞雷則尾脱脚生也廣五}
