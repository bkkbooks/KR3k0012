  - {type: variant, offset: 2024, length: 3, content: 汾蠐螬, SBCK: 芈爾雅曰蛄䗐強蝆也郭璞曰米穀中蠹小墨蟲也建平人呼爲蛢子音􅇗方言曰蛄䗐音施謂之強䖫郭璞注曰江東謂之蛄䗐也齧桒爾雅曰蠰音餉齧桒郭璞曰似天牛也長角體有白􅀧喜齧桒􅀣作孔藏其中江東呼爲齧髪守􅀲爾雅曰蠸音權輿父守􅀲也郭璞曰今􅀲中黄小蟲喜食􅀲葉故曰守􅀲蚰蜒爾雅曰螾􅨪入耳蚰蜒也􅨪音衍方言曰自􅀜而東蚰蜒謂之螾􅣓或謂之入耳或謂之䗅音長􅫡所冝切趙魏之間或謂之蚨虶音扶于北燕謂之䖡蚭廣雅同䖡奴六切蚭音尼蜰音肥廣五行記曰春秋魯莊公二十九年蜰劉向以爲此非中國所有南越盛暑男女同川澤滛亂所生爲蟲臰惡時公娶齊􅁋女爲夫人後漢書曰王莽地皇元年蜰蔽天至長安入未央宫縁奔發吏捕之于時天下大亂㝷而莽敗見殺蜚廉夲草經曰蜚廉味鹹治血瘀逐下血破積聚喉痺生晉地山澤中二月採之呉氏本草曰蜚廉蟲神農黄帝云治婦人寒􅀬蠁爾雅曰國音或貉蟲蠁也音許兩切今呼蛹蟲爲蠁廣雅曰土蛹蠁蟲螋音求搜􅀃文曰多足蟲也廣雅曰矜螋也􅀶物志曰蠷螋蟲溺人影亦隨所着處生瘡盧氏曰以雞腸草搗塗經日即愈塵蟲呉氏本草曰塵蟲一名土鼈蛇公異苑曰海曲有物名蛇公形如覆蓮花正白􅁃闡楊都賦曰蛇公沉光於海曲螲蟷上知栗切下多􅀰切爾雅曰三蛈音䥫蝪音湯}
