  - {type: variant, offset: 40, length: 1, content: 巡, krp: 郊晉書曰有蛙鳴于華林園惠帝問左右曰爲官乎爲私乎侍中賈㣧對曰在官地爲官在私地爲私宋書曰張暢弟収嘗爲猘大所傷醫云冝食蝦蟇膾収甚難之暢含笑先嘗収因此乃食創亦即愈齊書曰沈僧照別名法朗少事文師道土梁武陵王紀爲㑹稽太守宴坐池亭蛙鳴䀨耳王曰殊廢絲竹之聽僧照呪厭十許口便息及日晚王又曰欲其復鳴僧照曰王歡巳䦨令汝鳴即便喧聒又曰卞彬蝦蟆賦云紆青拖紫名蛤魚丗謂比令僕也又云蝌斗唯唯羣浮暗水唯朝繼夕筆役如鬼比令史諮事也南史孝義傳曰丘傑字偉跱呉興烏程人也年十四遭母喪以熟菜有味不甞於口歳餘忽夢見母曰死亡是分别耳何事乃爾荼苦汝噉生菜遇蝦蟆毒靈牀前有三丸藥可取服之傑驚起果得甌甌中有藥服之下科斗子數升三國典略曰周天和二年齊武安妖人與其徒僞云盲躄因飲泉水下得金佛其疾並愈於是逺近信之男女霧集水中有老黄蝦蟆全如金色乍出乍没齊武成及百官巳下莫不飲之隋書曰焬帝在東宫宫中數有妖變乃命衛尉少卿蕭吉禳邪氣於宣慈殿座祭神是時孟冬地乆無水乃有蝦䗫從西南來入至座忽然而失文子曰禽子曰多言有益乎墨子曰蝦蟇蛙黽日夜恒鳴口乾舌擗然而不聽今觀晨雞時夜而鳴天下俱動多言何益唯其言之時也韓子曰越王勾踐欲伐呉欲民輕死岀見鬪鼃乃下軾從者曰王何敬也曰以其有勇氣故也其後國人而輕命死戰淮南子曰夫蝦蟇爲鶉水蠆爲䗓音聦皆生於非其類老蝦蟇化爲鶉水中蠆蟲化爲蟌蟌者蜻蜓也唯聖人能知其化又曰蘭芝以芳未甞見霜芳香也皷造辟兵壽盡五月之望鼓造蓋謂梟一曰蝦蟇今丗人五月望作梟羮亦作蝦蟇羹國語曰趙襄子以尹鐸有寛政於晉陽其心必和乃守晉陽後晉師圍而灌之沉竈生鼃民無叛意神仙傳曰葛玄指蝦蟇使舞皆應絃節使止乃止燕丹子曰太子自喜得荆軻永無秦憂日與軻之東宫臨池而觀軻拾塼投鼃太子令人奉槃金以進物理論曰夫虚无之談尚其華藻此無異於春蛙秋蟬聒耳而巳國俗通曰肅肅蝦蟇掉尾俗說蝦蟇一跳八尺再跳丈六從春至冬袒祼相逐無他所作掉尾肅肅謹按蝦蟇旣處水中其尾又短正能使掉之豈能肅蕭乎原其所以當言夏馬患蚋掉尾振擊常肅肅也蝦蟇夏馬音相似崔豹古今注曰科斗蝦蟇子也一名懸針一名玄魚形圓有尾聞雷則尾脫脚生也廣五}
  - {type: variant, offset: 42, length: 10, content: 罔罟杜季利兵傷我心膂, SBCK: 記曰懷州凝眞觀東廊下柱巳五十餘年道士徃徃聞有蝦䗫聲不知的處後因柱朽壞以他柱易之斫之於柱中得一蝦䗫其柱又無孔􅂩嶺表録異曰唐林藹爲髙州太守有郷墅小兒牧牛聞田中有蛤鳴蛤即大蝦蟇牧童遂捕之蛤躍入一穴中遂掘之乃蛮酋􅊘也得一銅鼓其色翠緑土射數處損缺其上隱起多鑄蛙黽之狀疑其鳴蛙即銅皷精也楚辭七諌曰蝦鼃遊於藥池芳藥之池成公綏隂霖賦曰百川泛濫潢潦流竈中生鼃庭運舟蟋蟀易通系卦曰蟋蟀之蟲隨隂迎陽居壁向外趣婦女織績女工之象今失節不居壁似女事不成有􅁋佚之行因夜爲姦故爲門户夜開門户人之所由岀入今夜不閉明非也易通卦驗曰立秋蜻音精蛚音列鳴白露下蜻蛚上堂京房易妖占曰七月建申爲夷則蟋蟀鳴}
