  - {type: variant, offset: 1217, length: 198, content: 軍中及人家有喜事夢書曰䵹鼄為大腹其性然也夢見蜘蛛憂懷任婦人也葛洪治瘧方曰取蜘蛛一枚著飯中吞即愈成公綏蜘蛛賦曰獨高懸以浮處遂設罔於四隅南連大廡北接華堂左憑廣廈右依高廊吐絲屬緒目引結網纖羅絡漠綺錯交張雲舉霧綴以待無方張望蜘蛛賦曰余嘯詠蓬蘆遨步丘園覽蜘蛛之為蟲焉乘虛運巧構不假物欲足性命蕭然靖逸良可翫也伊蜘蛛之為蟲縱微性乎天壤稟妙造於化靈忽無礙而無想吐自然之纖緒先皇羲而結網憑輕羅以隱顯應大明之幽朗縊女, SBCK: 夜䑕􅀒}
