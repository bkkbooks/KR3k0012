  - {type: variant, offset: 680, length: 254, content: 置其一面更教之祝曰昔蛛蝥作罔今人學結欲左者左欲右者右欲高者高欲下者下吾取其犯命者郭璞洞林曰流移道路諸人並欲令郭璞射覆人人自持五月五日蜘蛛者物悉驗遂不復射淮南萬畢術曰蜘蛛塗布而雨自晞取蜘蛛置甕中食以膏百日煞以塗布而雨不能濡也又曰取蜘蛛與水狗及豬肪置甕中密以新縑仍懸室後百日視之蜘蛛肥殺之以塗足涉水不沒矣又一法取蜘蛛二七枚內甕中合肪百日以塗足得行水上故曰蜘蛛塗足不用橋梁王充論衡曰觀夫蜘蛛之絲以罔飛蟲也人之用詐安過之郭義恭廣志曰草蜘蛛在草上色青土䵹鼄在地上春行草間索索履地西京雜記曰樊噲問陸賈曰古帝王人君皆云受命, SBCK: 蟪蛄鳴}
