  - {type: variant, offset: 2147, length: 807, content: 屬書卷或謂之蝖螜亦呼堂齊或呼地蠶宣斛兩音梁益之間謂之蛒音格或謂之蝎或謂之蛭音質蛒秦晉之間或謂蠹或謂之天螻按爾雅曰螜天螻謂蛞螻耳而方言以為蝎未詳其義也博物志曰蠐螬以背行駛於用足也祖台之志怪曰吳中書郎盛冲至孝母王氏失明冲暫行勑婢食母婢乃取蠐螬蒸食之王氏甚以為美而不知是何物兒還王氏語曰汝行婢進吾一食甚甘美然非魚非肉汝試問之既而問婢服食是蠐螬冲抱母慟哭母目霍然立開本草經曰蠐螬一名蟦齊主治血痺螻蛄子然曰有一人身著練單衣恰直造席捧手與子然語子然問其姓名即荅云僕姓盧名鉤家在壈溪邊臨水復經半旬中其作人掘田塍西溝邊蟻垤忽見大坎滿中螻蛄將近斗許而有數頭極壯一箇彌大子然至是始悟曰近日客盧鉤反音則螻蛄也家在壈溪即西坎也悉灌以沸湯自是遂絕搜神記曰廬陵太守平原龐企字子及自說其乃祖非罪繫獄時有螻蛄蟲行其左右謂曰爾有神當活我因投飯與之食盡復來形稍大數日形如豚及當刑螻蛄夜掘壁為孔以出故龐氏常祠螻蛄葛洪治箭鉤在咽喉不出方曰用螻蛄腦塗之即出范注治不得小便方曰取螻蛄大者二枚斷取體下以一升水漬之去皮飲之須臾便通本草經曰䗜蛄一名天螻一名螜產難出剌在肉中潰癰腫下哽咽解毒愈惡瘡陶洪景本草經曰螻蛄味鹹寒取自出者其自腰以前甚澀主大小便尺蠖周易下繫辭曰尺蠖之屈以求伸也龍虵之蟄以存身也爾雅曰蠖蚗蠖今蝍𧑙也晏子春秋曰弦章謂景公曰尺蠖食黃即身黃食蒼即身蒼說文曰尺蠖曲信蟲信音申方言曰蠀音資𧑙子六切謂之尺蠖郭璞曰步屈也曹子建長歌行曰尺蠖知屈申體道識窮達傅休弈潛通賦曰蠖屈體以求伸兮龍階木而升雲鮑明遠尺蠖賦曰智哉尺蠖觀機而作申非向厚詘非今薄靜值泉渟機躁遇風驚起軒軀而曠莽伏累氣而併形冰炭弗觸韋刃靡迕逢嶮蹙跡值夷舒步忌好退之見猜哀必進之為蠹每驤首以瞰塗常景行而翻路故身不豫托地無前期從方而應何慮何思是以軍筭慕其權國容擬其變高賢圖之隱淪智士以之藏見笑虵靈之久蟄羞龍德之方戰郭璞尺蠖讚曰貴有可賤賤有不珍嗟茲尺蠖體此屈申論配龍虵見歎聖人張協七命曰鷦飛而生風尺蠖動而成響, SBCK: 第九百四十九}
