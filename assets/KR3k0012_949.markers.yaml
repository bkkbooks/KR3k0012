  - {type: variant, offset: 36, length: 2, content: 蜘蛛, SBCK: 彭寵堂上聞蝦蟇聲在火鑪下鑿地求之無所得寵爲奴所殺張璠漢記曰靈帝鑄天禄蝦蟇吐水於平昌門外橋東約入宫又作翻車渴烏施於橋西洒}
  - {type: variant, offset: 36, length: 2, content: 蜘蛛, WYG: 彭寵堂上聞蝦蟇聲在火爐下鑿地求之無所得張璠漢記曰靈帝鑄天禄蝦蟆吐水於平昌門外橋東注入宫又作翻車渴烏施於橋西洒}
