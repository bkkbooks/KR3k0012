  - {type: variant, offset: 1644, length: 941, content: 以廢不義而復有德也有逆天之道率民為賊者身死族滅以家聽者祿以家以里聽者賞以里以鄉聽者封以鄉以縣聽者侯以縣剋國不及其民廢其君而易其政尊其秀士而顯其賢良賑其孤寡恤其貧窮出其囹圄賞其有功百姓開門而待之浙米而儲之浙清唯恐其不來也此湯武之所以致王也而齊桓晉文之所以成霸也又曰君為無道民之思兵也若旱而望雨也渴而求飲夫何誰與交兵接刃乎故義兵之至也至於不戰而心服也又曰晚世之兵君雖無道莫不設渠塹傅堞加守傅守也堞城上女墻也攻者非以禁暴除害也欲以侵地廣壤也故至於伏尸流血相支以日而霸王之功不世出者自為之故也又曰夫為戰地者不能立其功舉事以自為者眾去之眾之所助雖弱必強眾之所去雖大必亡也又曰兵失道而弱得道而彊將失道而拙得道而工國得道而存失道而亡所謂道者恥員而法方背陰而抱陽左柔而右剛履幽而觀晹地方而無限故莫能窺其門天育而無形象地生長而無計量渾渾沉沉孰知其藏也又曰凡物有聯唯道無聯萬物可聯也而道不可聯也所以無聯者以其常形勢也轉輪而無窮象日月之行若春秋有代謝若日月有晝夜終而復始明而復晦莫能得其紀制形而無形故功可成矣物而不物故勝不屈形兵之極也至於無形可謂之極矣又曰大兵無創與鬼神通五兵不厲天下莫敢之當建鼓不出庫諸侯莫不慴㥄沮膽故廟戰者帝神化者王所謂廟戰者法天道也神化者法四時也脩政於境內而遠方慕其德制勝於未戰而諸侯服其威也又曰民誠從令雖少無畏民不從令雖眾為寡故下不親上下心不用卒不畏將其形不戰守有必固而攻有必勝不待交兵接刃而存亡機固已形矣又曰兵有三勢有二鈐有氣勢有地勢有因勢將充勇而輕敵卒果敢而樂戰三軍之眾百萬之師志厲青雲氣如飄風聲如雷電誠積踰而威加敵人此謂氣勢狹路關津大山名塞龍虵蟠蟠冤屈也却苙居却偃覆也苙登也羊腸道羊腸一屈一伸魚茍門竹笱所以捕魚其門可入而不得出也一人守險而千人不敢過此謂地勢因其勞倦怠亂飢渴凍暍推其搖搖擠其揭揭此謂因勢間諜間諜軍之反間也審錯規慮設蔚施伏草木盛曰蔚隱遁其形出於不意使敵人之兵無所適備此謂知鈐陣卒正前行選進退俱什伍搏前後不相蹍蹍蹀蹈也左右不相干受刃者少傷敵者眾此謂事鈐鈐勢必形吏卒愽精選良用才官得其人計定謀決明於死生舉錯得時莫不振驚故攻不待衝隆雲梯而城拔雲梯可依雲而立所以瞰敵之城中也戰不至交兵接刃而敵破明於必勝之數也又曰夫飛鳥之鷙也俛其首猛獸之玃也匿其爪虎豹不外其牙噬犬不見其齒, SBCK: ''}
