  - {type: variant, offset: 3, length: 1, content: 敘, SBCK: 年爲原大夫卿次卿辭曰夫三德者偃之出也偃狐偃三徳謂勸文公納襄王以示民義伐原以示民信大蒐以示民禮故以三徳紀民三德紀之語在下以德紀民其章大矣不可廢也章著也使狐偃爲卿辭曰毛之智賢於臣其齒又長毛偃之兄也毛也不在位不敢聞命乃使狐毛將上軍狐偃佐之尚齒也傳曰使狐偃將上軍讓于狐毛而佐之是也狐毛卒使趙衰代之虞唐云代將新軍昭謂代將上軍辭曰城濮之役先且居之佐軍也善先且居先􅎮之子蒲城伯復受霍爲霍伯也軍伐有賞伐功也善君有賞能其官有賞且居有三賞不亦可廢也且臣之倫箕鄭胥嬰先都在倫疋三子晉大夫乃使先且居將上軍代狐毛也公曰趙衰三讓三使爲卿三讓之進欒枝等八人其所讓皆社稷之衛也廢讓是廢德也以趙衰之故蒐于淸源作五軍清源警地晉本三軍有中軍上下今有五益新上下使趙衰將新上軍箕鄭佐之胥嬰將新下軍先都佐之子犯卒蒲城伯清佐蒲城伯先且居公曰夫趙衰三讓不失義義冝也讓推賢也義廣德也廣德賢至有何患矣請令衰也從子從先且居乃使趙衰佐新上軍此有新字誤也趙衰從新上軍之將進佐上軍爲升一等新上軍之將位在上軍佐之下此章或在狐毛卒上非也當左下史記孟甞君傳曰文聞將門必有將相門必有相又項羽本紀曰項氏世世爲楚將封於項故姓項氏又曰章邯已破項梁軍則以爲楚}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_272-2b}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_272-3a}
  - {type: variant, offset: 3, length: 1, content: 敘, WYG: 年爲原大夫卿次卿辭曰夫三德者偃之岀也偃狐偃三德謂勸文公納襄王以示民義伐原以示民信大蒐以示民禮是以三德紀民三德之紀語在下以德紀民其章大矣不可廢也章著使狐偃爲卿辭曰毛之智賢於臣其齒又長毛偃之兄毛也不在位不敢聞命乃使狐毛將上軍狐偃佐之尚齒也傳曰使狐偃將上軍讓於狐毛而佐之是也狐毛卒使趙衰代之虞翻云代將新軍昭謂之代將上軍辭曰城濮之役先且居之佐軍也善先且居先軫之子蒲城伯復受霍爲霍伯也軍伐有賞伐功也善君有賞能其官有賞且居有三賞不可廢也且臣之倫箕鄭胥嬰先都在倫疋三子晉大夫乃使先且居將上軍代狐毛也公曰趙衰三讓三使爲卿三讓之進欒枝等八人其所讓皆社稷之衞也廢讓是廢德也以趙衰之故蒐於清源作五軍清源晋地晋本三軍有中軍上下今有五益新軍使趙衰將新上軍箕鄭佐之胥嬰將新下軍先都佐之子犯卒蒲城伯請佐蒲城伯先且居公曰夫趙衰三讓不失義義宜也讓推賢也義廣德也德廣賢至有何患矣請使衰也從子從先且居乃使趙衰佐新上軍此有新字誤也趙衰從新上軍之將進佐上軍爲升一等新上軍之將位在上軍佐之下此章或在狐毛卒上非也當在下戰國䇿曰秦與趙}
