  - {type: variant, offset: 6, length: 2, content: 六韜, SBCK: 非能將兵而善將將此迺信之所以爲陛下禽也漢書韓信傳曰漢王使酈生徃􅀃魏王豹不聽乃以信爲左丞相擊魏信問酈生魏得母用周叔爲大將乎曰栢直也信曰竪子耳遂進擊魏又陸賈傳曰賈謂陳平曰天下安注意相天下危注意將將相和則士豫附士豫附天下雖有變則權不分爲社稷計在兩君掌握耳又齊王傳曰祝干給琅邪王曰吕氏爲亂齊王發兵欲西誅之齊王自以兒子年少不習兵革之事願舉國委大王大王自髙帝將也言髙帝之時爲將也又髙紀曰帝置酒雒陽南宫曰通侯諸將母敢隠朕後漢書虞詡傳曰李循曰􅀜西出將􅀜東出相觀其習兵壯勇實過餘州又}
