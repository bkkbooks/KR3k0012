  - {type: variant, offset: 6, length: 2, content: 六韜, WYG: 莫能當嘗與其父言兵事奢不能難然不謂之善其母問其故奢曰兵死地也而乃易言之趙若以爲將破軍者必是兒及是其母上書具言不可曰始妾事其父時爲將大王及宗室所賞者盡以與軍吏士大夫受命之日不問家事今此兒爲將東向而朝軍吏無敢仰視之者王所賜金帛歸藏家而日視便利田宅買之王以爲何如其父父子異心願王母遣王曰吾已决矣其母因曰即有如不稱妾得無隨罪乎王許之諾遂與秦軍戰死軍敗數十萬降秦秦悉坑之史記孟嘗君傳曰文聞將門必有將相門必有相又項羽本紀曰項氏世世爲楚將封於項故姓項氏又曰章邯已破項梁軍則以爲楚兵不足憂乃渡河擊趙大破之當此之時趙歇爲王陳餘爲將張耳爲相又吳起傳曰魏文侯問曰吳起何如人李克曰起貪而好色然其用兵司馬穰苴弗能過也於是魏文侯以爲將擊秦㧞五城又王翦傳曰或曰王離秦之名將也今將强秦之兵攻新造之趙舉之必矣客曰不然夫將三世者必敗何也以其殺伐多矣其后受其不祥又淮隂侯傳曰韓信曰陛下非能將兵而善將將此信之所以爲陛下擒也漢書韓信傳曰漢王使酈生徃說魏王豹不聽乃以信爲左丞相擊魏信問酈生魏得毋用周叔爲大將乎曰栢直也信曰豎子耳遂進擊魏又陸賈傳曰賈謂陳平曰天下安注意相天下危注意將將相和則士豫附士豫附天下雖有變則權不分權不分爲社稷在兩君掌握耳又齊王傳曰祝午紿瑯琊王曰吕氏爲亂齊王發兵欲西誅之齊王自以兒子年少不習兵革之事願舉國委大王大王自高帝將也習戰事齊王不敢離兵使臣請大王幸之臨淄見齊王計事並將齊兵以平關中之亂後漢書虞詡傳詡說李脩曰喭曰關西出將關東出相觀其習兵壯勇實過餘州又}
