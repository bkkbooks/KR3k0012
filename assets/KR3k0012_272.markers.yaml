  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 三將帥上開元文字曰將率也春秋元命苞曰上天一星爲郎將左傳曰楚子及諸侯圍宋宋公孫固如晉告急公孫固宋莊公孫先􅎮曰報施救患取威定霸於是乎在矣先􅎮下軍之佐原􅎮也報宋贈馬之施也狐偃曰楚始得曹而新㛰於衛􅀂伐曹衛楚必救之則齊宋免矣前年楚使申叔戌榖以逼齊於是乎蒐于􅀍廬晉常以蒐禮改政令敬其始也被廬晉地作三軍閔元年晉獻公作三軍令復大國之禮謀元帥中軍師趙衰曰郤縠可臣亟聞其言矣􅀃禮樂而敦詩書詩書義之府也禮樂德之則也德義利之本也夏書曰賦納以言明試以功車服以庸尚書虞夏書也賦納以言觀其志也明試以功考其事也車服以庸報其勞也賦猶取也庸功也君其試之乃使郤縠將中軍郄溱佐之使狐偃將上軍讓于狐毛而佐之毛狐偃之兄命趙衰爲卿讓於欒枝先􅎮欒枝貞子也欒賔之孫使欒枝將下軍先􅎮佐之荀林父御戎魏犨爲右荀林父中行桓子公羊傳曰君將使射姑將陽處父諌曰射姑民衆不􅀃不可使將於是廢將戰國䇿曰秦與趙兵相距長平趙孝成王使趙奢之子將藺相如曰王以名使括􅀂膠柱而鼓瑟耳此子徒能讀其父奢書傳而不知合變也趙王不聽奢子括少時學兵法言兵事以天下莫能當甞與其父言兵事奢不能難然不謂之善其母問其故奢曰兵死地也而乃易言之趙􅀂以爲將破軍者必是兒及是其母上書具言不可曰始妾事其父時爲將大王及宗室所賞者盡以與軍吏士大夫受命之日不問家事今此兒爲將東向而朝軍吏無敢仰視之者王所賜金帛歸藏家而日視便利田宅買之王以爲如其父父子異心願王母遣王曰吾巳决矣其母因曰即有如不稱妾得無隨罪乎王許之諾遂與秦軍戰死軍敗數十萬降秦秦悉坑之國語曰公使趙衰爲卿辭曰欒枝貞愼枝晉大夫欒共子之子也先􅎮有謀胥臣多聞皆可以爲輔臣弗􅀂也乃使欒枝將下軍先􅎮佐之前取五鹿先􅎮之謀也五鹿衛地郄縠使先􅎮代之從下軍之佐超將中軍傳曰尚德也代先􅎮之胥臣佐下軍又曰公使原季爲卿原季趙衰也文公}
