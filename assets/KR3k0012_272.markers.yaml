  - {type: variant, offset: 3240, length: 139, content: 皆兵之由也昔五帝不能偃況衰世乎又曰濫殺無辜之民以養不義之君非兵之體也殫天下之財以贍一人之求非兵之體也怙其兵甲之器矜其變詐之謀欲以立威成名非兵之體也虜其君隸其臣遷其社易其民非兵之體也故夫霸王之用兵也始之以義終之以仁將以存亡非以亡存也將以禁暴非以為暴也又曰兵之來也以除不義而授德克其, SBCK: ''}
