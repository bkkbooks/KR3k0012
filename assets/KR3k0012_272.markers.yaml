  - {type: variant, offset: 2, length: 0, content: '', WYG: 三將帥上將帥上春秋元命苞曰上天一星爲郎將左傳曰楚子及諸侯圍宋宋公孫固如晉吿急公孫固莊公孫也先軫曰報施救患取威定覇於是乎在矣先軫下軍之佐原軫也報宋贈馬之施也狐偃曰楚始得曹而新婚於衞若伐曹衞楚必救之則齊宋免矣前年楚使申叔戍榖以逼齊於是乎蒐於被廬晉常以蒐禮改政令敬其事也被廬地名作三軍閔元年晉獻公作三軍令復大國之禮謀元帥中軍帥趙衰曰郤縠可臣亟聞其言矣説禮樂而敦詩書詩書義之府也禮樂德之則也德義利之本也夏書曰敷納以言明試以功車服以庸夏書虞夏書也敷納以言觀其志也明試以功考其事也車服以庸報其勞也庸功也君其試之乃使郤縠將中軍郤溱佐之使狐偃將上軍讓於狐毛而佐之毛狐偃之兄命趙衰爲卿讓於欒枝先軫欒枝貞子也欒賔之孫使欒枝將下軍先軫佐之荀林父御戎魏犨爲右荀林父中行桓子公羊傳曰君將使射姑將陽處父諫曰射姑民衆不説不可使將於是廢將國語曰公使趙衰爲卿辭曰欒枝貞愼枝晉大夫欒共子之子也先軫有謀胥臣多聞皆可以爲輔臣弗若也乃使欒枝將下軍先軫佐之前取五鹿先軫之謀也五鹿衞地郤縠卒使先軫代之從下軍之佐超將中軍傳曰尚德也胥臣佐下軍代先軫又曰公使原季爲卿原季趙衰也文公}
