  - {type: variant, offset: 3381, length: 428, content: 傷其民廢其君而不易其政尊其俊秀顯其賢良賑其孤寡恤其窮困百姓聞之欣然簞食壺漿以迎其君奚之遲也以湯武之師用兵上也誰與交鋒而接刃哉又曰所謂善用兵者先弱敵而後戰者也若乃征之以義以責其過振之以武以威其淫懷之以德以誓其民置之以仁以救其危此四者用兵之體所謂因民之欲乘民之力也又曰治國家理境內施仁義布德惠明勸賞黜幽昧功臣附親士卒和輯上下一心君臣同德指麾而響應此上兵之體也地廣民眾主賢將能國富賞罰信未至交兵而敵人亡遁此次兵之體也知地之形因險阨之利明奇正之變審進退之宜援枹而鼓之黃塵四起乃以決勝此用兵之下非兵之體也又曰夫德義足以懷天下之民事業足以當天下之急選舉足以得賢才之用則兵之所加若勁風振槁此兵之體也鹽鐵論曰兵者凶器也甲堅兵利為天下殃其母制子故能久長聖人法之厭而不傷蔣子萬機論曰夫虎之為獸水牛之為畜殆似兵矣夫虎爪牙既鋒膽力無伍至於即豕也卑俯而下之必有枙喉之獲夫水牛不便速角又喬踈然處郊之野朋遊屯行部隊相伍及其寢宿因陣反禦若見兕虎抵角牛全兕害矣若用兵恃彊必鑒於虎居弱必誡水牛, SBCK: ''}
