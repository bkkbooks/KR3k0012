  - {type: variant, offset: 230, length: 387, content: 正也士所以輕戰者用兵也故戰如風發勇如河決眾可望而不可當可下而不可勝也黃石公三略曰聖王之制兵也非好樂之也將以誅暴也暴謂亂國賊民夫以義誅不義決江河溉螢火其剋必也商君書曰夫民情好爵祿而畏刑罰人君設此二者以御民夫民力盡而名隨之功立而賞隨之君能使其民信此明於日月則兵無敵也呂氏春秋曰古之聖王有義兵譬之若用良藥治人毒藥殺人義兵為天下之良藥也又曰古聖王有義兵而無有偃兵兵所自來者尚矣古始有民凡兵也者威也威也者力也民之有威力性也性者所受於天也非人之所能為也武有黃炎固用水火矣黃帝炎帝共工固欲作難矣與高辛氏爭為帝而亡之也五帝固相與爭矣又曰人曰𧈪尤作兵𧈪尤非作兵利其械也未有𧈪尤之時民固剝林木已戰矣故勝為長長帥長則猶不足以治之故立君君又不足以治之故立天子天子之立也出於君君之立出於長長之立出於爭爭鬥之所自來者久矣不可禁不可止故古之聖王有義兵而無有偃兵也又曰家無怒笞則豎子嬰兒之有過也立見天下無伐, SBCK: 旣惑旣疑}
