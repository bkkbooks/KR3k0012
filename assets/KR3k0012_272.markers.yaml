  - {type: variant, offset: 10, length: 0, content: '', krp: 將曹公每攻城破邑得靡麗之物則悉以賜有功者若勲勞冝賞則不恡萬金無功兾施分毫不與魏志曰太祖旣破張繍東擒吕布定徐州遂與袁紹相距孔融謂荀彧曰紹地廣兵彊田豊許悠智計之士爲之謀審配逢紀盡忠之臣也任其事顔良文醜勇冠三軍統其兵殆難尅乎彧曰顔良文醜疋夫之勇可一戰而擒又曰太祖征荆南劉備奔吴論者以爲權必殺備程昱料之曰孫權新立未爲海内所憚曹公無敵於天下𥘉舉荆州不能獨當劉備英名關羽張飛皆萬人敵權必資之禦我難解勢分備資以成又可得而殺也權果多與備兵以禦太祖晉書曰王導字茂引光禄大夫覽之孫也父裁鎮軍司馬導少有風鑒識量清逺年十四陳留髙士張公見而竒之謂其從兄敦曰此兒容貌志氣將相之器也又張華傳曰今之所要在軍師然議者舉將多推宿舊又慕容德載記曰昔韓信以禆將伐齊有征無戰耿弇以偏軍討張渉尅不移朔後周書曰王勱性忠果有才幹年七十從太祖入關及太祖平秦隴定關中勱常侍從太祖甞謂之曰爲將坐見成敗者上也𬒳堅執銳者次也勱曰意欲兼之太祖大笑隋書曰煬帝之在東宫甞謂弼曰楊素韓擒虎史万歳三人俱稱良將其間優劣何如弼曰楊素是猛將非謀將韓擒虎是鬪將非領將史万歳是騎將非大將太子曰然則大将誰也弼拜曰唯殿下所擇弼意自許爲大將弼賀若弼唐書曰太宗甞論將帥謂左右曰當今名將唯李勣任城王道宗薛万徹三人而已李勣道宗不能大勝亦不大敗万徹非大勝即夫破又曰太宗與長孫無忌薛万徹等宴於丹霄殿各賜膜皮而悮呼万徹爲万均因愴然曰万均朕之勲舊不幸早亡不覺呼名豈其魂靈欲朕之賜也因取膜皮呼万均以同賜而焚之於前侍坐者無不感泣潞公薛万均万徹兄也國𥘉立大功故太宗思之又曰賈言忠乾封中爲侍御史時朝廷有事遼東言忠奉使往支軍糧及還髙宗問以軍事言忠畫其山川地勢具陳遼東可平之狀髙宗大恱又問諸將優劣言忠曰李勣先朝舊臣聖鑒所悉龐同善雖非鬪將而持軍嚴整薛仁貴勇冠三軍名可振敵髙偘儉素自處忠果有謀契苾何力沉毅持重有統御之才然頗有忌前之癖諸將夙夜小心忘身憂國莫逮於李勣者髙宗深然之又曰裴度使蔡州行營宣諭諸軍旣還帝問諸將之才度曰臣觀李光顔見義能勇終有所成不數日光顔奏大破賊軍於時曲帝尤歎度之知人又曰朱滔効順代宗臨軒勞問旣而曰卿自謂才孰與泚多滔曰各有長短統御士衆方略明辯臣不及泚臣年二十八獲謁龍顔泚長臣五歳未朝鳯闕泚不及臣代宗愈喜古司馬兵法曰上貴不伐之士上之器也茍不伐則無求無求則不争國中之聽必得其情軍旅之聽必得其冝此貴不伐之士也不伐之士治國必得其實在軍必得其冝故先貴而用之從命爲士上賞犯命爲士上戮故其勇力不相犯旣致教其民然後謹選而使之事極脩則百官給矣教極省則人興良矣又曰凢戰則與衆分善將雖有獨見之知戰勝不自取功常推與下分者也選良先無功者勇猛勁才戰不得功後戰必選爲前當以激致其銳氣也若使不勝使過在巳戰有失利當爲吏士引其過咎今無慙愧使復可使又曰上同無獲將智與衆同等不能自用又不能用人隨衆取同故無功也上專不死將無明智耻求賢問智自專事爲衆所弊故戰多死也上生多疑將無義心茍求全免害避難則士多疑者也上死不勝將無善略茍以死當敵故不勝也凢民死愛死怒死威死義死利視下如子則民生愛志意激楊則民㤪怒使民以禮征伐以義則民死威賞賜分明則民死義賞爵重則民死利孫子曰將者智信仁勇嚴也故知兵之術}
