  - {type: variant, offset: 3810, length: 166, content: 謂攻取屠城而守必能全者矣劉向新序曰上古之時其民敦朴故三皇教而不誅無師而威故善為國者不師三皇之德也至於五帝有師旅之備而無用故善師者不陣五帝之謂也湯伐桀文王伐崇武王伐紂皆陣而不戰故善陣者不戰三王之謂也及夏后之伐有扈殷高宗討鬼方周宣王之征勳鬻而不血刃皆仁聖之惠時化之風也至齊桓侵蔡而蔡潰伐楚而楚服而彊楚以致苞茅之貢於周室北伐山戎使奉朝覲三, SBCK: 復}
