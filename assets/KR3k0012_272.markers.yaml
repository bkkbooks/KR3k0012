  - {type: variant, offset: 996, length: 382, content: 不得所以用之術也不得所以用之術國雖大勢雖便卒雖眾何益也淮南子曰古之用兵者非利壤土之廣而貪金玉之賂將以存亡繼絕平天下之亂而除萬民之害也又曰凡有血氣之虫含牙戴角前爪後距有角者觸有齒者螫有蹄者趹喜而相戲怒而相害天之性也人有衣食之情而物弗能足也群居雜處分不均求不贍則爭爭則彊脅弱而勇侵怯人無筋骨之彊爪牙之利故割革而為甲爍鐵而為刃貪昧饕餮之人殘賊天下萬民騷動莫寧其所有聖人勃然而起乃討彊暴平亂世夷險除穢以濁為清以危為寧也又曰兵之所由來遠黃帝嘗與炎帝戰矣炎帝神農氏之末世也與黃帝戰於阪泉帝滅之顓頊嘗興共工爭矣共工與顓頊爭為帝觸不周山之折也故黃帝戰於涿鹿之野黃帝與𧈪尤戰於涿鹿涿鹿在上谷堯戰於丹水之浦堯以楚伯受命滅不義於丹浦丹浦在南陽舜伐有苗有苗三苗啟攻有扈禹之子伐有扈於甘在右扶風鄠縣也自五帝而不能偃也况衰世乎又曰夫兵者所以禁暴討亂也炎帝為火災故黃帝禽之共工為水害故顓頊誅之教, SBCK: 趣}
