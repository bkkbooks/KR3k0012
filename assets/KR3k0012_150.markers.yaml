  - {type: variant, offset: 2612, length: 2, content: 皇后, WYG: 驃騎將軍位在三公上四年蒼上疏願朝上以王觸寒涉道使中謁者賜乗輿豹裘蒼到洛陽使鴻臚持節郊迎引入不在讃拜之位升殿乃拜上親答拜諸王歸國上特留蒼八月飲酎畢大鴻臚奏遣蒼蒼發上親臨送流涕賞賜以億萬數又曰明帝詔書示諸國曰詔問東平王蒼處家何等最樂王對云為善最樂帝曰甚大稱是腰腹蒼美鬚髯腰帶圍八尺二寸}
