  - {type: variant, offset: 2653, length: 1, content: 等, SBCK: 誅後始使乳母於城北遥祠及竇太后崩慶求上冢致哀帝許之詔大官四時給􅀕慶垂涕曰生雖不獲供養終得奉􅀕祀私願足矣又曰李爕字德公靈帝時拜安平相先是時安平王續爲張角賊所略國家贖王還欲復其國爕奏曰續在國無守蕃政不稱損辱聖朝不冝復國續竟歸蕃爕以謗毀宗室輸作佐校未滿歳王果坐不道􅀍誅乃貴爕爲議又曰董卓置􅀪農王於閣上使郎中令李儒進酖曰服此藥可以辟惡王曰我無疾是欲殺我耳乃與妻唐􅁎宫人飲讌別王悲歌曰天道易兮我何如棄萬乗兮退居蕃逆臣見迫兮命不延逝將去汝兮適幽􅀇}
