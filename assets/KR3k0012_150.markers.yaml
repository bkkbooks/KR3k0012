  - {type: variant, offset: 36, length: 4, content: 立為皇太, krp: 來朝天}
  - {type: variant, offset: 38, length: 1, content: 皇, WYG: 累欷思者不可為歎息故高漸離擊筑易水上荆軻為之泣而不食雍門子一微吟孟嘗君為之於邑今臣之心結日乆而每聞窈𦕈之聲不知涕泣之集也夫衆喣漂山應劭曰喣吹煦聚蚊成雷朋黨執虎十夫橈椎臣身逺與寡莫為之先衆口爍金積毁銷骨叢輕折軸羽翮飛肉今臣雍閼不得間竊自悲也臣聞社鼷不灌屋鼠不燻何則所託者然也臣雖薄也得蒙肺腑位雖卑也得為東藩屬又稱兄今羣臣非有葭莩之親張晏曰葭蘆也莩葉裏白皮也鴻毛之重羣居黨議朋友相為使夫宗室擯却骨肉氷釋斯伯竒所以流離比干所以横分也勝又樂酒好内有子百二十餘人常與趙王彭祖相非曰兄為王專代吏治事王者當日聽音樂御聲色趙王亦曰中山王但奢淫不佐天子拊循百姓何以稱為藩臣又曰景帝唐姬生長沙定王發唐姬故程姬侍者景帝召程姬有所避不願進而飾侍者唐兒使夜進上醉不知幸之遂有身及生子因名曰發以母微無寵故王居卑濕貧國應劭曰景帝後二年諸王來朝有詔稱壽歌舞定王但張袖小舉手左右笑其拙上怪而問之對曰臣國小地狹不足迴旋帝以武陵零陵桂陽益焉又曰孝武李姬生燕刺盧達切王旦為人辯略博學經書及衞}
