  - {type: variant, offset: 3345, length: 116, content: 妃王氏入金墉城妃父尚書令王衍見脅表離婚妃出金墉城號哭感動左右道路為之悲愴也又曰劉曜王彌等入洛盡將諸后妃去愍懷太子王妃拔刀向賊曰我司徒公女皇太子妃死則已終不為賊婦賊乃害之晉起居注曰元帝太興五年上臨軒使策命拜晉王太子妃庾氏為皇太子妃晉孝, SBCK: 文}
