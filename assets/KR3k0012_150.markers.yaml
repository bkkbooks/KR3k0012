  - {type: variant, offset: 3, length: 0, content: '', SBCK: 第十六諸王上漢書百官表曰諸侯王髙帝􅀄置金璽組綬史記曰髙帝得定陶戚􅁎愛幸生趙王如意幾代太子者數矣頼大臣爭之及留侯䇿太子得無廢髙帝崩惠帝立吕后使人持鴆飲之遂斷戚夫人手足去眼燻耳飲瘖藥使居厠中名曰人彘居數日迺召惠帝視人彘帝視而知其戚夫人迺大哭因病歳餘不能起使人請太后曰此非人所爲臣爲太后子終不能治天下又曰燕王劉澤漢書曰澤髙帝從祖昆弟髙帝十一年封爲營陵侯髙后時齊人田生以畫干營陵侯澤澤大恱之用二百斤金爲壽田生巳得金假大宅令其子求事吕太后所幸大謁者張卿居數月請張卿酒酣乃屏人􅀃張卿曰太后欲立吕産爲王恐大臣不聽今卿最幸大臣所敬何不諷大臣以聞太后太后必喜諸吕巳王萬戸侯亦卿有卿大然之乃諷大臣立吕産爲王田生因􅀃張卿曰吕産王也諸大臣未服今營陵侯澤諸劉長爲大將軍尚觖音决望今卿言太后裂十縣王之彼得王喜於諸吕益固矣張卿入言太后乃以澤爲琅瑘王又曰齊哀王襄悼惠王子髙祖孫也太尉周勃誅諸吕大臣欲立齊王瑯瑘王澤曰齊王母家駟鈞惡戾虎而冠者張晏曰言鈞惡戾如虎而着冠也方以吕氏幾亂天下又立齊王是復爲吕氏也漢書曰呉王濞髙帝兄仲之子也髙祖立濞於沛爲呉王巳拜受印髙祖召濞相之曰􅀂狀有反相因撫其背曰後五十年東南有亂豈􅀂耶天下同姓一家汝愼無反濞頓首曰不敢又曰楚元王交髙帝少弟也髙祖即帝位交與盧綰常侍上出入卧內傳語言諸內事隱謀文帝尊寵元王子爵比皇子又曰齊悼惠王肥其母髙祖微時外婦也髙祖六年立食七十餘城孝惠二年入朝帝與齊王燕飲后前置齊王上坐如家人禮太后怒遣人酌巵鴆酒置前令齊王爲壽齊王起帝亦起欲俱爲壽太后恐自起反巵齊王怪之因不敢飲陽醉而去又曰濟北王興居􅀄以東牟侯與大臣共立文帝於代邸曰誅吕氏臣無功請與太僕􅅬公入清宫遂將少帝出迎皇帝入宫始誅吕氏時朱虚侯功尤大大臣許盡以趙地王朱虚侯章盡以梁地王東牟侯興居及孝文帝立聞朱虚東牟之􅀄欲立齊王故黜其功又曰淮南王安爲人好書鼔琴不喜弋獵狗馬騁馳亦欲行隂德撫循百姓流譽招致賔客方術之士數千人作爲內書二十篇外書甚衆有中篇八卷言神仙黄白之術張晏曰黃黃金白白銀亦二十萬言時武帝方好藝文以安屬爲諸父辯􅀶善爲文辭甚重尊之毎爲報書及賜張晏曰賜賜書常召司馬相如等視草乃遣􅀄安入朝獻所作內篇新出上愛秘之使爲離騷賦旦受詔食時上又曰孝文皇后生景帝梁孝王孝王太后少子愛之賞賜不可勝道於是孝王築東􅁐方三百餘里廣睢陽城七十里大治宫室爲􅃨道自宫連屬於平臺三十餘里如淳曰在梁東北離宫所在也得賜天子旌旗從千乗萬􅀐出稱蹕入言警擬天子招延四方豪傑自山東遊士莫不至又曰梁懷王揖文帝子也文帝愛之異於他子五年壹朝因墮馬死又曰孝景栗􅁎生河間獻王德孝景二年立脩學好古從民間得善書必爲好寫與之留其夲加金帛賜以招之繇是四方道術之人不逺千里或有先祖舊書多奉以奏獻王者故得書多與漢朝等脩禮樂􅀍服儒術造次必於儒者武帝時獻王來朝獻雅樂及詔䇿問三十餘事其對推道術而言得事之中文約而指明又曰江都易王非景帝子呉楚反時非年}
