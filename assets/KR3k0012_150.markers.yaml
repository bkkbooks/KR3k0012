  - {type: variant, offset: 2618, length: 0, content: '', WYG: 北海靖王興每朝廷有異政京師雨澤秋稼好醜輒乘驛馬問焉其見親重如此又曰廣陵思王荆性刻急隱害善文法有才能中元二年世祖崩不悲哀而作飛書與東海王彊説之令舉兵為逆亂彊得荆書即其行書者封上之以親親隱其事遣荆止河南宫又曰}
  - {type: variant, offset: 2618, length: 3, content: 明德馬, krp: 沛獻王輔矜嚴有法度好經書善說京氏易孝經世號之曰沛王通論在國謹節終始如一稱爲賢王顯宗敬重數賞賜焉又曰琅瑘孝王京建武十七年追爵爲王京性恭孝好經學顯宗尤愛幸賞賜恩寵殊異莫以爲比光烈}
  - {type: variant, offset: 2620, length: 0, content: '', WYG: 后詔書流布咸稱至德王主諸室莫敢犯禁廣平鉅鹿樂成王在邸入問起居帝望見車騎鞍勒皆純墨無金銀綵飾}
