  - {type: variant, offset: 3156, length: 161, content: 又曰賈妃酷妬手斫數人或以戟擿音擲孕妾子乃隨刃墮地上聞大怒垂廢之荀勗深救之故得不廢晉氏后妃別傳曰武悼皇后武帝繼室也太傅楊駿女賈庶人為太子妃時數以肆情性忌妬失帝意帝欲廢焉后為妃陳請曰魯公有勳於王府妃親則其子妬忌婦人之常事不足以一眚而忘大德帝納焉王隱晉書曰初世祖遣才人謝玖給事惠帝因是有娠臨娶賈妃迎玖西宮遂生愍懷太子惠帝即位立為, SBCK: 亂國無制度}
