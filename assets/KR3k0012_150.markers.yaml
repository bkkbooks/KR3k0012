  - {type: variant, offset: 1207, length: 878, content: 皆先關諮唐書曰武宗肅皇帝穆宗第五子母曰宣懿皇后韋氏長慶元年封穎王開成五年文宗疾兩軍中尉仇士良魚志弘矯詔迎穎王於十六宅曰朕自嬰疾疹有加無瘳懼不能躬總萬機日釐庶政稽于古訓謀及大臣用建親賢以貳神器親弟穎王湹音鄽昔在藩邸與朕嘗同師訓動成儀矩性稟寬仁俾奉昌圖必諧人欲可立為皇太弟應軍國政事便令句當百辟卿士宜竭迺心又曰昭宗景文皇帝懿宗第七子母曰惠安太后王氏帝於僖宗母弟也尤相親睦自艱難播越嘗隨侍左右僖宗不豫遺詔立為皇太弟太孫王隱晉書曰趙王倫既廢賈后皇帝使使持節追復皇太子拜皇孫臧為臨淮王尚為襄陽王又詔立臧為皇太孫文武官屬即轉為太孫官屬車服侍從皆愍懷之舊也趙王倫篡位太孫廢為濮陽王薨惠帝復作立襄陽王尚為皇太孫薨謚冲皇太孫并追謚前太孫為哀皇太孫晉惠帝起居注曰拜皇孫臧為臨淮王尚為襄陽王又詔臧為皇太孫臧廢到銅駞街宮人嚴從皆哽咽路人收淚焉桑復生於西廂長丈餘太孫廢乃枯又曰惠帝詔以太常成粲為太孫太傅前城閭校尉梁柳為太孫少傅又曰惠帝使使持節兼司空任城王濟策命愍懷皇太子前妃為皇太孫太妃是日也以復妃告于太廟後魏書曰高宗文成皇帝景穆帝之長子也母曰閻氏帝少聰達太武常置左右號世嫡皇孫又曰劉尼代人也父祖皆為方面大人少壯健有膂力世祖善之拜羽林中郎宗愛既殺南安王余於東廟秘之唯尼知之尼勸愛立高宗愛自以負罪於景穆聞而驚曰君大癡人皇孫若立豈忘正平時事乎尼以狀告殿中尚書源賀仍謀於南部尚書陸麗麗曰唯有密奉皇孫耳於是賀與長孫渴侯嚴兵守衛尼與麗迎高宗於苑中麗抱高祖馬上入於京城尼馳還東廟大呼曰宗愛殺南安王大逆不道皇孫已登大位有詔宿衛之士皆可還宮眾咸唱萬歲後周書曰建德二年夏六月壬子皇孫衍生文武官普加一陛蕭子顯齊書曰文惠太子長懋音戊字雲喬世祖長子也世祖年未弱冠而生太子為太祖所愛建元元年封南郡王邑二千戶江左未有嫡皇孫封王始自此也又曰鬱林王昭業字元尚文惠太子長子也小名法身文惠太子薨立昭業為皇太孫居東宮昭業少美容止好餘書世祖勑皇孫手書不得妄出以貴重之唐書貞觀十七年誕皇太孫宴宮寮於弘教門太宗幸東宮自殿北門入謂宮臣曰頃來生業稍可非乏酒食而唐突公等宴會朕有甲觀之慶故就卿為樂耳謂太子曰爾國之儲二府藏是同金玉綺羅, SBCK: 地狹}
