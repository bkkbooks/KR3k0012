  - {type: variant, offset: 3, length: 0, content: '', WYG: 第十六諸王上諸王上漢書百官表曰諸侯王髙帝初置金璽組綬史記曰髙帝得定陶戚姬愛幸生趙王如意幾代太子者數矣賴大臣争之及留侯䇿太子得無廢髙帝崩惠帝立吕后使人鴆趙王遂斷戚夫人手足去眼燻耳飲瘖藥使居厠中名曰人彘居數日召惠帝視而知其戚夫人廼大哭因病歳餘不能起又曰燕王劉澤漢書曰澤高帝從祖昆弟高帝十一年封為營陵侯高后時齊人田生以畫干營陵侯澤澤大悦之用二百斤金為壽田生已得金假大宅令其子求事吕太后所幸大謁者張卿居數月請張卿臨酒酣屛人説張卿曰太后欲立吕産為王恐大臣不聽今卿最幸大臣所敬何不諷大臣以聞太后太后必喜諸吕已王萬户侯亦卿有卿大然之乃諷大臣立吕産為王田生因説張卿曰吕産王也諸大臣未服今營陵侯劉澤長為大將軍尚觖音决望今卿言太后裂十縣王之彼得王喜於諸吕益固矣張卿入言太后乃以澤為琅琊王又曰齊哀王襄悼惠王子高祖孫也太尉周勃誅諸吕大臣欲立齊王琅琊王澤曰齊王母家駟鈞惡戾虎而冠者張晏曰言鈞惡戾如虎而著冠者方以吕氏幾亂天下又立齊王是復為吕氏也漢書曰吳王濞高帝兄仲之子也高祖立濞於沛為吳王已拜受印高祖召濞相之曰若狀有反相因拊其背曰後五十年東南有亂豈若耶天下同姓一家汝慎無反濞頓首曰不敢又曰楚元王交髙帝少弟也高帝即帝位交與盧綰常侍上出入卧内傳語言諸内事隱謀文帝尊寵元王子爵比皇子又曰齊悼惠王肥其母高祖微時外婦也高祖六年立食七十餘城孝惠二年入朝帝與齊王燕飲太后前置齊王上坐如家人禮太后怒遣人酌兩巵鴆酒置前令齊王為壽齊王起帝亦起欲俱為壽太后恐自起反巵齊王怪之因不敢飲佯醉而去又曰濟北王興居初以東牟侯與大臣共立文帝於代邸曰誅吕氏臣無功請與太僕勝公入淸宫遂將少帝出迎皇帝入宫始誅吕氏時朱虛侯功尤大大臣許盡以趙地王朱虛侯章盡以梁地王東牟侯興居及孝文帝立聞朱虛東牟之初欲立齊王故黜其功又曰淮南王安為人好書鼔琴不喜弋獵狗馬馳騁亦欲以行隂德拊循百姓流名譽招致賔客方術之士數千人作為内書二十篇外書甚衆又有中篇八卷言神仙黄白之術張晏曰黄黄金白白銀亦二十萬言時武帝方好藝文以安屬為諸父辨博善為文辭甚尊重之每為報書及賜師古曰賜賜書帝召司馬相如等視草乃遣初安入朝獻所作内篇新出上愛秘之使為離騷傳旦受詔食時上又曰孝文皇后生景帝梁孝王孝王太后少子愛之賞賜不可勝道於是孝王築東苑方三十餘里廣睢陽城七十里大治宫室為復道自宫連屬於平臺三十餘里如淳曰平臺在大梁東北離宫所在得賜天子旌旗從千乗萬騎出稱蹕入言警擬天子招延四方豪傑自山東逰士莫不至又曰梁懷王揖文帝子也文帝愛之異於他子五年一朝因墮馬死又曰孝景栗姬生河間獻王德孝景二年立修學好古從民間得善書必為好寫與之留其真加金帛賜以招之繇是四方道術之人不遠千里或有先祖舊書多奉以奏獻王者故得書多與漢朝等脩禮樂被服儒術造次必於儒者武帝時獻王來朝獻雅樂及詔䇿問三十餘事其對推道術而言得事之中文約指明又曰江都易王非景帝子吳楚反時非年}
