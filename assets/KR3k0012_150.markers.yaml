  - {type: variant, offset: 4511, length: 161, content: 子及良娣史皇孫皆遭害沈約宋書曰大明五年上更為太子置內職二等曰保林曰良娣納南中郎長史太山羊贍女為良娣蕭子顯齊書曰建元三年太子宮置三內職良娣比開國侯唐書肅宗張皇后天寶中選入太子宮為良娣唐書曰順宗莊憲皇后王氏幼以良家子入宮為才人順宗在藩邸時代宗以才人賜之生憲宗皇帝立為孺人順宗升儲冊為良娣孺子後魏史曰劉芳沉雅方正太子恂之在東宮高, SBCK: ''}
