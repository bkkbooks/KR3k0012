  - {type: variant, offset: 3175, length: 1286, content: 乃隨刃墮地上聞大怒垂廢之荀勗深救之故得不廢晉氏后妃別傳曰武悼皇后武帝繼室也太傅楊駿女賈庶人為太子妃時數以肆情性忌妬失帝意帝欲廢焉后為妃陳請曰魯公有勳於王府妃親則其子妬忌婦人之常事不足以一眚而忘大德帝納焉王隱晉書曰初世祖遣才人謝玖給事惠帝因是有娠臨娶賈妃迎玖西宮遂生愍懷太子惠帝即位立為皇太子為娉王夷甫小女惠風賈后暴戾日甚乃表乞免為庶人送太子妃王氏入金墉城妃父尚書令王衍見脅表離婚妃出金墉城號哭感動左右道路為之悲愴也又曰劉曜王彌等入洛盡將諸后妃去愍懷太子王妃拔刀向賊曰我司徒公女皇太子妃死則已終不為賊婦賊乃害之晉起居注曰元帝太興五年上臨軒使策命拜晉王太子妃庾氏為皇太子妃晉孝武帝起居注曰納采聘太子妃百官朱服會於新安公主第秘書監王操之為主人晉孝武帝起居注曰上臨軒設懸而不樂遣兼司空望蔡公謝琰納太子妃王氏詔曰太子諱婚禮即就仰祖宗遺烈憑道德之資保傅將翼賢士竭誠慎行修德積善慶隆豈唯在予天齎錫所以宣其悅情其便依蒨有賜左僕射王珣奏賜文武絹布百官詣止車門上禮甲辰儀曰皇太子妃公妃夫人逢持節使者高車使者皆住車相揖妃主皆住車不揖東宮舊事曰司徒會稽王道子等啟曰皇太子係體宸極年德並茂宜簡國媛緝宣內教故中書令太常王獻之新安公主息女六行聿修四德光備加世載簡正慶深積善僉曰宜作配儲宮正位中饋太元二十一年皇太子納妃琅邪臨沂王氏時年十四王隱晉書曰安僖皇后王氏字神受太常王獻之女新安公主生即安帝姑也孝武帝以后少孤無兄弟故為安帝納為太子妃東宮舊事曰有詔以皇太子納妃賜帛各有差使持節兼司空公尚書右僕射謝琰副護軍將軍臨湘縣侯車胤迎詹事尚書左僕射王徇率東宮屬迎于主第東宮舊事曰皇太子納妃織成衮帶白玉佩四望車羽葆前後部鼓吹各一部步搖一具九鈿函盛之同心雀鈿一具函盛鬢花六五支登花二五支團樹花十株碧紗座袿半繡一丹羅杯文長命綺䙱一䙱音屬袴別名又曰太子納妃絳真文羅一幅被子一絳羅繡四幅被一又曰皇太子納妃有絳真文羅袴漆龍頭支髻枕一銀花鐶釰自副金塗連盤鴨燈一絳地文履一量漆花簏一絳地織成綺緩有七綵杯文綺一絳石杯文綺被有一又七綵杯文綺袴長命杯文綺袴晉令曰皇太子妃珮瑜玉沈約宋書曰皇太子妃金璽龜鈕纁朱緩佩瑜玉又曰少帝司馬皇后諱茂英河內溫人晉恭帝女也初封海鹽公主少帝以公子尚焉宋初拜皇太子妃少帝即位為皇后又曰前廢帝何皇后諱令婉廬江灊人也孝建三年納為皇太子妃又曰後廢帝江皇后諱簡珪濟陽考城人北中郎長史智淵孫女太始五年太宗訪太子妃而雅信小數名家女多不合江氏雖世為華族而后父祖並已亡弟又弱小門無強蔭以卜筮最吉拜為皇太子妃蕭子顯齊書曰皇太子妃厭翟車如重翟車飾微減漆畫輪車太子妃亦乘之又曰文安王皇后諱寶明琅耶臨沂人建元元年為南郡王妃四年為皇太子妃無寵太子為宮人制新麗衣裳及首飾而后床帳陳古舊釵錜奴叶切小釵也十餘枚唐書曰太宗文德皇后長孫氏少好讀書造次必循禮則十三嬪于太宗武德九年冊拜皇太子妃又曰高宗廢后王氏同安長公主即后之從祖母也公主以后有美色遂納為晉王妃高宗登儲冊為皇太子妃又曰開元中勑所選皇太子及諸王等妃既是百官子女禮合避人今追就本縣及過本司未為得所其應預妃者宜令所司具名錄奏各令女及近親隨使於命婦朝堂待進止良娣漢書曰衛太子史良娣宣帝妃祖母, WYG: ''}
