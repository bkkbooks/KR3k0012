  - {type: variant, offset: 2196, length: 162, content: 彰子孫千億之盛福祚靈長之應也上悅太子妃白虎通云妃者匹也妃匹者何謂也相與偶然古者天子後宮嫡庶皆曰妃史記曰黃帝有四妃帝嚳有四妃虞舜有二妃周以天子之正嫡為王后秦稱皇帝因稱皇后以太子之正嫡稱妃漢因之漢書外戚傳云太子妃有良娣有孺子妻妾凡三等是也魏晉以後咸遵之漢書曰孝景薄皇后孝文薄太后家女也景帝為太子時薄太后取以為太子妃帝即位立為皇后, SBCK: 武陵桂陽屬焉}
