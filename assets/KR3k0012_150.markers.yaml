  - {type: variant, offset: 2610, length: 3, content: 立為皇, SBCK: 詔以爲驃􅀐將軍位在三公上四年蒼上䟽願朝上以王觸寒渉道使中謁者賜乗輿豹裘蒼到洛陽使鴻臚持節郊迎引入不在讃拜之位􅂛殿乃拜上親荅拜諸王歸國上特留蒼八月飲酎畢大鴻臚奏遣蒼蒼發上親臨送流涕賞賜以億萬數又曰明帝詔書示諸國曰詔問東平王蒼處家何等最樂王對云爲善最樂帝曰其言甚大稱是腰腹蒼美􅁂髯腰帶圍八尺二寸又曰北海靖王興毎朝廷有異政京師雨澤秋稼好醜輙乗驛馬問焉其見親重如此又曰廣陵思王荆性刻急隱害喜文法有才能中元二年丗祖崩不悲哀而作飛書與東海王彊􅀃之令舉兵爲逆亂彊得荆書即執其行書者封上之以親親隱其事遣荆止河南宫又曰明德}
