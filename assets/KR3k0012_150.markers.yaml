  - {type: variant, offset: 628, length: 578, content: 仁明孝悌天后方圖臨朝乃鴆殺之立雍王賢每自憂惕知必不保全與二弟同侍父母之側無由敢言乃作黃臺苽辭令樂工歌之冀天后聞之哀愍辭曰種苽黃臺下苽熟子離離一摘使苽好再摘令苽稀三摘尚自可摘絕抱蔓歸太子賢終為天后所逐死於黔中陛下有今日運祚已一摘矣慎無再摘上愕然曰卿安得有是言自是奪宗之計不行又曰憲宗章武皇帝順宗長子母王太后六七歲時德宗抱置膝上問曰汝誰子在吾懷對曰是第三個天子德宗異而怜之貞元四年封廣陵王順宗即位之年封冊為皇太子又曰懿宗恭惠皇帝宣宗長子母曰元昭皇太后晁氏大和七年生於藩邸封鄆王大中十三年宣遺詔立為皇太子姿貌瑰傑有異稠人藩邸時當重疾郭妃侍毉見黃龍出入於臥內妃以告帝曰慎勿言又曰僖宗恭定皇帝懿宗第五子母曰惠安皇后王氏初封普王懿宗大漸制曰朕守大器之重居兆人之上日慎一日如履如臨旰昊勞懷寢興思治涉道猶淺道化未孚而攝養乖方寒暑成厲實有慮於闕政且無暇而怡神考茲舊章謀于卿士思闡鴻業式建皇儲第五男普王孝敬溫恭寬和愽厚日新令德天假英姿言皆中規動必由禮俾崇邦本允叶人心宜立為皇太子權勾當軍國政事咨爾中外卿士暨于腹心之臣各竭乃心永安黎獻太弟王隱晉書曰惠帝永寧二年立清河王覃為太子成都河間王復廢覃為清河王立成都為皇太弟晉陽秋曰永興元年河間王顒表拜成都王穎為皇太弟司空越高密王簡平昌公模等以大駕北征廢皇太弟穎立預章王熾為皇太弟崔鴻十六國春秋曰晉成都王穎為皇太弟領丞相自鄴懸秉朝政事無大, SBCK: ''}
