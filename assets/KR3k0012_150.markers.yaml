  - {type: variant, offset: 2562, length: 0, content: '', SBCK: 弟婦相餽音匱遺通私書後延壽謀反誅辭連及胥又聞漢立太子謂􅁎南等曰我終不得立矣居數月祝詛事發􅁴有司桉驗天子遣廷尉大鴻臚即訊胥胥旣見使者還置酒顯陽殿召太子霸及子女董訾胡生等夜飲使所幸八子郭昭君家人子趙左君等鼓瑟歌舞王自歌曰欲人生􅀆無終長不樂􅀆安窮奉天期􅀆不得須􅁷千里馬􅀆駐待路黄泉下􅀆幽􅀷人生要死􅀆何爲苦心何用爲樂心所喜出入無悰爲樂亟蒿里召􅀆郭門閱死不得取代庸身自逝左右悉更涕泣奏酒至雞鳴時罷胥讓太子霸曰上遇我厚今􅀒之甚我死骸骨當暴幸而得葬薄之無厚也即以綬自絞死}
