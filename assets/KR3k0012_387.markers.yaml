  - {type: variant, offset: 1301, length: 2, content: 校世, SBCK: 丗說曰鍾毓鍾㑹少有令譽年十三魏文帝聞之召見問毓曰卿何汗曰戰戰惶惶汗出如漿復問㑹卿何不汗對曰戰戰慄慄汗不敢出又曰桓公旣廢太宰父子仍上表欲除之簡文手荅書云所不忍言况過於言桓又重表簡文復手荅云􅀂使晉祚靈長明公便應奉行此詔􅀂大運去矣請避賢路桓公讀詔手戰汗流於此而止語林曰何晏羙姿容明帝見之謂其􅀓粉賜之湯餅晏食之汗出流靣以巾拭之色轉皎然揚雄長楊賦曰髙}
