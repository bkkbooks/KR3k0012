  - {type: variant, offset: 1297, length: 1, content: 人, SBCK: 陽秋曰桓玄甞詣㑹稽王道子道子巳醉對􅀇張眼屬四㘴云桓温作賊玄見此辭􅀔難測伏席流汗長史謝重歛板正色曰故大司馬公廢昏立明功全社稷風塵之論宜絶聖聽唐書曰張又新等搆李紳貶端州司馬朝臣表賀又至中書賀宰相及門門者止之曰請少留縁張􅀘闕在齋内與相公談俄而又新揮汗而出旅揖羣臣曰端溪之事又新}
