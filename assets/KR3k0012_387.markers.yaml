  body:
  - {type: variant, offset: 5, length: 110, content: 七健釋名曰健建也能有所建為也左傳莊公曰宋萬弒閔公于蒙澤曹師伐之南宮長萬奔陳以乘車輦其母一日而至乘車非兵車也駕人曰輦宋去陳二百六十里言萬之多力宋人請南宮長萬於陳陳人使婦人飲之酒而以犀革褁之比及宋手足皆見又曰初雩講于梁氏女公, SBCK: 八黒}
