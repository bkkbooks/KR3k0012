  - {type: variant, offset: 128, length: 439, content: 般怒使鞭之公曰不如殺之是不可鞭犖有力焉能投蓋于稷門蓋覆地稷門魯南城門走而自投接其屋之桷反覆門上又宣公下曰晉魏顆見老人結草以抗杜回杜秦之力人也又成公上曰高固入晉師磔石以投人禽之而乘其繫桑本焉以徇齊壘又成公下曰晉楚交戰叔山冉搏人以投中車折軾晉師乃止又襄公二曰晉荀偃士丐請伐偪陽偪陽人啟門諸侯之士門焉見門開故攻之懸門發鄹人紇抉之以出門者紇鄹邑大夫仲尼父叔梁紇也狄虎彌建大車之輪而蒙之以甲以為櫓狄虎彌魯人蒙覆也櫓大楯也左執之右拔戟以成一隊百人曰隊孟獻子曰詩所謂有力如虎者也主人縣布堇父登之及堞而絕之墜則又縣之蘇而復上者三主人辭焉乃退又哀公下曰楚白公作亂劫惠王子西以袂掩面而死子期曰昔者吾以力事君不可以弗終抉豫章以殺人而後死以效其多力豫章大木史記曰秦王有力好戲士任鄙烏獲孟說皆至大官王與說舉龍文赤鼎絕臏而死又曰范睢說秦昭王曰烏獲任鄙之力成荊孟賁慶忌夏育之勇又曰張良常學淮陽東見滄海君得力士為鐵椎重百二十斤秦皇東遊良與客俱擊秦皇博浪沙中悞中副車秦皇大怒大索天下求賊甚急張良乃更姓名亡匿於下邳, SBCK: ''}
