  - {type: variant, offset: 2135, length: 214, content: 衛王儀長七尺五寸容皃甚偉美鬢髯有笇略少能舞劍騎射膂力過人弓將十石陳留公虔矟大見稱異時人云衛王弓桓王矟也又曰韓茂字元輿嘗從太宗征丁零時大風旍旗皆偃仆茂於馬上持幢初不傾倒太宗訝其膂力又曰伊馥代人也善射多力曳牛卻行三國典略曰周賀若敦嘗從太祖校獵於甘泉宮圍人不齊獸多越逸太祖大怒圍內唯有一鹿俄亦突圍而走敦躍馬馳之鹿上東山敦棄馬步逐山半掣之而下太祖大悅周書曰韓雄河東垣人也少敢勇魁岸膂力絕人工騎射有將帥才略又曰竇熾字光成性寬明有偉略美鬢髯, SBCK: 寜}
