  - {type: variant, offset: 2562, length: 347, content: 子來丹謀復仇丹氣甚猛形甚露計粒而食從風而趨誓手劍以屠黑卯黑卯悍志絕眾力抗百夫筋骨皮肉非人類也延頸承刃披胸受矢鋩鍔摧屈而體無痕負其才力視來丹猶鶵鷇也孟子曰有馮婦善搏虎尸子曰中黃伯余左執太行之獶音猱右搏雕虎唯象未與吾試願為牛與象斗以自試又曰飛廉惡來力角犀兕勇搏熊虎也孔叢子曰孔鮒謂陳王曰梁人有陽由者其力扛鼎伎巧過人骨騰肉飛淮南子曰孔子勇復孟諸足蹀狡兔不以力聞六韜曰紂之卒握炭流湯者十八人崇侯虎等舉五百石重沙二十四人山海經曰中曲之山有懷木食之多力穆天子傳曰有虎在於葭中七萃之士曰高奔戎生捕以獻天子乃命為匣而畜之東虞是曰虎牢呂氏春秋曰孔子之勁能招國門之關招舉也淮南子同也又曰趙氏中山之多力者曰吾兵衣鐵甲操鐵杖以戰所擊無不碎所衝無不陷以車投車以人投人春秋外傳曰少室為聞子右聞牛談有力請與之戲不勝致右焉簡子, SBCK: 帝}
