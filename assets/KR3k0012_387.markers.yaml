  - {type: variant, offset: 1367, length: 0, content: '', SBCK: 僕射謝景仁性矜嚴整㓗居宇清麗每唾左右人衣事畢即聽澣濯毎欲唾左右爭來受之趙書曰石虎娉崔氏爲夫人無寵所愛鄭夫人有百日女病謂崔與藥以告後石虎作威問之崔言外舎見小子以少唾其容作實非藥也後石乃射之一箭通中而死􅁗記曰符㓪渡江嘗與朝士宴集時賢並机蓐壷席㓪欲誇之唾則令小児跪而張口就唾而含出坐者爲不及之逺矣吕氏春秋曰齊莊公之時有士曰賔卑聚夢有壯士白縞之􅃣練布之衣素屨黒劒從而叱之唾其面􅅥然而寤徒夢也終坐不決明日召其友而告之曰吾少好勇無所挫辱今夜辱吾將索之得之則可不得將死每朝立于衢三日不得退而自刎又曰伍貟出奔過鄭問許公許公東向唾貟知所歸矣乃奔呉莊子曰蚿謂虵曰子見夫唾者乎噴則大者如珠小者如霧􅄂而下者不可勝數也風俗通曰彭祖壽年八百􅀊猶恨唾逺周生列子曰人君其尊重矣音聲振於金玉咳唾甘於醴泉九州春秋曰公孫瓉曰始天下兵起吾謂其唾掌可决樊英别傳曰樊英旣見陳畢西南向唾天子問其故對曰成都今日失火後蜀郡太守上火災言時雲雨從東北來故火不爲害列仙傳曰}
