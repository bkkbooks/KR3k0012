  - {type: variant, offset: 918, length: 0, content: '', SBCK: 犯事乃詣昌訟昌疑母不􅀋蜀人因問所由云夲㑹稽黃昌妻也嘗爲賊所掠至此昌驚曰何以識黃昌邪曰昌左足心有黒子常自言當至二千石昌乃出足示之因相持泣還爲夫妻楚國先賢傳曰來陽頋紹字伯蕃年十八爲郡門下幹迎}
