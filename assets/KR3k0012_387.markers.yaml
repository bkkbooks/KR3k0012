  - {type: variant, offset: 1378, length: 0, content: '', SBCK: 徑至市中下着地化爲一羊賣之􅂲其變化唾之得錢五千幽明録曰漢武帝在甘泉宫有玉女降嘗與武帝圍碁相娯女風姿端正帝宻恱乃欲逼之玉女唾帝靣而去遂病瘡經年故漢書云避暑甘泉宫此其時也趙壹嫉邪賦曰􅀔家多所宜欬唾自成珠披􅄄懷金玉蘭蕙化爲蒭洟淚淚事巳多見在泣篇說文曰洟鼻液也周易離卦曰六五出涕沱􅀂戚嗟􅀂􅁻毛詩鄁栢舟曰之子于歸逺送于野瞻望弗及泣涕如雨又谷風大東曰眷言頋之潜焉出涕禮記檀弓上曰孔子合葬於防封之崇四尺孔子先反門人後雨甚至孔子問曰尓來何遟也曰防墓崩孔子􅊄然流涕曰吾聞之古不脩墓又曰孔子至衛遇舊館人之喪入而哭之哀出使子貢脫􅆖而賻之子貢曰脫􅆖於舊館無乃巳重乎夫子曰予嚮者入而􅂘之遇一哀而出涕予惡夫涕之無從也小子行之又曰將軍文子之喪旣除喪而後越人來吊主人衣練􅃣待于廟垂涕淚又内則曰父母唾洟不見輒刷去之左傳襄四曰孟孫卒臧孫入哭甚哀多涕出其御曰孟孫之惡子也而哀如是季孫􅀂死其􅀂之何公羊傳哀公曰西狩獲麟孔子曰孰爲來哉孰爲來哉反􅃑拭靣涕沾􅂁何休注曰􅃑衣􅁭史記曰蘇􅁗說􅄦谷先生淚下沾􅁭東觀漢記曰來歙蓋延攻公孫述蜀人大懼使客刺歙未死馳告蓋延延見歙悲哀不能仰視歙叱曰欲屬以軍事而乃効兒女之涕泣乎又曰更始害齊武王光武飲食}
  - {type: page-break, offset: 1378, content: '', id: KR3k0012_SBCK_387-5b}
  - {type: page-break, offset: 1378, content: '', id: KR3k0012_SBCK_387-6a}
  - {type: variant, offset: 1378, length: 0, content: '', WYG: 恐其變化唾之得錢五緡幽眀録曰漢武帝在甘泉宫有玊女降嘗與武帝圍棋相娛女風姿端正帝宻悦乃欲逼之玉女唾帝面而去遂病瘡經年故漢書云避暑甘泉宫此其時也趙壹嫉邪賦曰勢家多所宣欬唾自成珠披褐懐金玉簡蕙化為蒭洟淚説文曰洟鼻液也周易離卦曰六五出涕沲若戚嗟若吉毛詩􅆁柏舟燕燕曰之子于歸遠送于野瞻望弗及泣涕如雨又谷風大東曰眷焉顧之澘焉出涕禮記檀弓上曰孔子合葬于防封之崇四尺孔子先反門人後雨甚至孔子問曰爾来何遲也曰防墓崩孔子泫然流涕曰吾聞之古不修墓又曰孔子至衛遇舊館人之䘮入而哭之哀出使子貢脱驂而賻之子貢曰脱驂於舊館無乃已重乎夫子曰予嚮者入而哭之遇於一哀而出涕予惡夫涕之無從也小子行之又曰將軍文子之䘮既除䘮而後越人来吊主人練冠侍于廟垂涕洟乂内則曰父母唾涕不見輙刷去之左傳襄四曰孟孫卒臧孫入哭甚哀多涕出其御曰孟孫之惡子也而哀如是季孫若死其若之何公羊傳哀公曰西狩獲麟孔子曰孰為来哉孰為来哉反袂拭面涕涙沾袍史記曰蘇秦説鬼谷先生下淚沾襟東觀漢記曰来歙盖延攻公孫述蜀人大懼使客刺歙未死馳告盖延延見歙悲哀不能仰視歙叱曰欲屬以軍事而乃効兒女之涕泣乎又曰更始害齊武王光武飲食笑}
