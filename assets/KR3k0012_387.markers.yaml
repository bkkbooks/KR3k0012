  - {type: variant, offset: 1300, length: 0, content: '', SBCK: 多讓人皆辟易憚之淮南子曰今夫傜者揭钁鍤負籠土傜役也籠受土籠也鹽汗交流喘息薄喉白汗鹹如鹽故曰鹽風俗通曰傳曰后稷觸冬墾田流汗而種田不生者人力非不至天時不}
