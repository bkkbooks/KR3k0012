  - {type: variant, offset: 672, length: 236, content: 良家子善騎射為羽林投石拔距絕於等倫常超踰羽林亭樓由是遷為郎又曰淮南王長力能扛鼎廣陵王肯空手搏熊羆又曰上官桀從武帝上甘泉天大風車不得行解盍授桀桀奉蓋雖風常屬車兩下蓋御上奇其才力遷未央廄令又曰彭城王翌身長八尺七寸驍幹過人能手舉殿梁超過平陽楚漢春秋曰項梁嘗陰養士最高者多力拔樹以擊地東觀漢記曰蓋延字巨卿身長八尺彎弓三百斤以氣勢聞又曰陰興字君陵為期門僕射從上出入常操小蓋疾風暴雨屏翳左右泥塗隘狹自投車下脫袴解履涉淖至𣍿又曰祭彤字次孫力貫弓三百斤入為太僕從至魯帝指子路室曰此太僕室也, SBCK: 有所禁禦}
