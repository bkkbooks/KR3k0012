  - {type: variant, offset: 2911, length: 3, content: 使少室, WYG: 從是遂斷語林曰王太保作荆州有二兒亡一兒還葬舊塋一兒留葬太保垂涕曰不忘故鄉仁也不戀本土達也唯仁與達吾二子有焉素問曰肝液}
  - {type: variant, offset: 2911, length: 5, content: 使少室為宰, krp: 從是遂斷語林}
  - {type: variant, offset: 2915, length: 538, content: 宰曰知賢而讓可以訓矣蜀王本紀曰秦王知蜀王好色乃獻女五人蜀王遣五丁迎女還梓潼見大虵入山穴一丁引其尾不出五丁共引虵山乃崩說苑曰勇士孟賁水行不避蛟龍陸行不避虎狼發怒吐氣聲響動於天王充論衡曰語稱紂力能索鐵伸鉤撫梁易柱言其多力也風俗通曰頴川張欽字孟孝吳楚反與亞夫常為前鋒陷陣潰圍傍人觀曰壯哉此君欽聞自矜遂死軍方言曰蹶膂力也東齊曰䠇宋魯曰膂膂刀也郭璞曰律蹶多力貌通俗文曰強健曰馶音翅曹肇別傳曰肇之弟字德思力舉千鈞明帝寵之寢止恒同嘗與戲賭衣物有所獲輒入御帳取而出之石虎別傳曰虎字季龍勒從弟年十七八身長七尺五寸好弓馬射獵迅健有勇力同時等類多畏憚之異苑曰荊州上明浦常有蛟殺人死者不脫歲昇平中鄧遐為太守素勇健入水覔蛟曳出斬之至今不復有患博物志曰石蕃衛臣也有勇力背負千二百斤沙西京雜記曰江都王勁捷能超七尺屏風任豫益州記曰元帝為丞相有力士鐘齊本吳人百斛米分為三擔擔從渚入市五六里世說曰周處年少時凶強使氣為鄉里所患時義興水中有鮫山中有虎並皆犯暴百姓議與人為三橫而處尤極或說處使殺蛟虎遂入擊蛟或沒或出行數十里經三日夜鄉里皆謂死更相慶處竟殺蛟而出始知為人情所患處遂自改勵終為忠臣孝子楚辭曰魂兮來歸無上天一夫九首拔木九千言有一丈夫身有九段強梁多力從朝至暮能拔木九千也張衡西京賦曰烏獲扛鼎都盧尋橦羸說文曰羸痿也, WYG: 淚欠}
