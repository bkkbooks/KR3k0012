  - {type: variant, offset: 1632, length: 293, content: 人咸異之曰此兒必興郭氏河內陸允世之豪民望見以女妻之又曰陳安字虎侯家世農民安少慷慨曰大丈夫當乘軒杖節安能久執犁鋤乎遂東遊京師頗學書笇讀魏書見許禇而慕之乃自字虎侯遇晉室喪亂遂憑結司馬賓驍壯果毅武幹過人多力善射持七尺刀貫甲奔及馳馬又前秦錄曰張音剌本姓弓上黨泫氏人也泫玄字膂力過人能卻曳牛走張平愛而子之媱於平妾知而責之慚割陰以自誓遂為閹人堅甚寵之常侍左右終為名將所在有殊功稱鄧羗張萬人敵也又後趙錄曰張珍字巨秦汲郡人晉永嘉中與梁臣戍武德城石勒攻之城潰彌隨例當坑大呼曰官當活健兒何以殺也曰有何捷事而求活也彌曰武德西城上大聲督時警備嚴設使賊不入正是張彌勒笑曰降兒能爾正自奇健乃赦之趙書曰汲桑清河貝丘人, SBCK: ''}
