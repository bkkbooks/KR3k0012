  - {type: variant, offset: 2353, length: 191, content: 二寸善騎射膂力過人隋書曰魚俱羅馮翊下邽人也身長八尺膂氣雄壯言聞數百步墨子曰紂有勇力之人生捕兕虎指畫殺人晏子曰昔夏之衰也有推侈大戲殷之衰也有費仲惡來足走千里手制兕虎子思子曰中行穆伯手捕虎列子曰公儀伯以力聞諸侯周宣王備禮聘之公儀伯至觀形懦夫也宣王心惑曰汝之力何以對曰臣之力能折春螽之服勝秋蟬之翼王作色曰吾之力者能分犀兕之革曳九牛之尾猶憾其弱公儀伯曰臣之師有南丘子者力無敵於天下而六親弗知, SBCK: 龍顔秀目每􅀕}
