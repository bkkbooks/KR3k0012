  - {type: variant, offset: 2225, length: 3, content: 日日新, SBCK: 書曰昔周文王使太公望傅太子發􅄝鮑歩巧切魚而公弗與文王曰發􅄝鮑魚何爲弗與太公曰禮鮑魚不登乎爼豆豈有非禮而可以養太子乎籩􅀃文曰籩竹豆也爾雅曰竹豆謂之籩禮器也書曰祀於周廟􅀖甸侯衛駿奔走執豆籩詩曰儐尓籩豆飲酒之飫}
