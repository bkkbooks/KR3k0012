  - {type: variant, offset: 3090, length: 5, content: 逍遙宮門裏, SBCK: 文帝十七年新垣平使人持玉杯闕下獻之刻曰人主延壽平所言詐下吏誅漢書曰項羽置太公於髙俎上曰不降烹汝翁髙祖曰吾翁即汝翁儻烹遺我一杯羹又曰元帝徴貢禹爲諌議大夫禹奏曰臣甞從之東宫見賜柸案盡文􅀞金銀飾非當所以食臣下也又曰朱博爲御史大夫爲人廉儉食不重味案上不過三杯又曰王嘉爲丞相數上言不冝封董賢上怒詔丞相詣廷尉詔獄吏和藥進嘉引藥杯以擊地謂官屬曰丞相幸得備位三公奉職􅀒國當伏刑都市以示衆豈兒女子耶何謂咀藥而死續漢書曰鄭􅀇飲三百餘杯不醉又禮儀志曰天子明器}
  - {type: page-break, offset: 3090, content: '', id: KR3k0012_SBCK_759-7b}
  - {type: variant, offset: 3090, length: 5, content: 逍遙宮門裏, WYG: 文帝十七年新垣平使人持玉杯闕下獻之刻曰人主延壽平所言詐下吏誅漢書曰項羽置太公於鼎爼上曰不降烹汝翁髙祖曰吾翁即若翁儻烹遺我一杯􅅅又曰元帝徴貢禹為諫議大夫禹奏曰臣嘗從之東宫見賜杯案盡文􅀞金銀飾非當所以食臣下也又曰朱愽為御史為人廉儉食不重味案上不過三杯又曰王嘉為丞相數上言不冝封董賢上怒詔丞相詣廷尉獄掾吏和藥進嘉引藥杯以擊地謂官属曰丞相幸得備位三公奉職負國當伏刑都市以示衆豈兒女子耶何為咀藥而死續漢書曰鄭𤣥飲三百餘杯不醉又禮儀志曰天子明器}
