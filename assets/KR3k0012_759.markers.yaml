  - {type: variant, offset: 3097, length: 10, content: 浴槃面徑丈二尺魏景初, SBCK: 杯十價錢而用不殊箕子之譏始在天子今在疋夫論衡曰項㬅都好道學仙去家三年而反曰有仙人將我上天離月數里而止月之旁甚寒飢欲食輙飲我流霞一杯王逸子曰顔淵之簞瓢則勝慶封之玉杯何者德行髙逺能絶殊也晉咸康起居注曰詔送遼東使叚遼等鸚鵡杯東宫舊事曰􅃮四升杯四十􅃮杯子三百漢武故事曰上崩後鄠縣有一人於市貨玉杯吏欲捕之因忽不見縣送其器推問茂陵}
