  - {type: variant, offset: 3139, length: 2, content: 沈義, WYG: 左慈能分盃飲酒曹公聞試之慈㧞簮以畫盃盃即斷飲畢以盃擲屋棟杯懸著屋棟動揺似飛鳥欲落良乆乃墮地又曰劉剛未仙時姮娥降共語如人語不觧其意又曰劉剛未仙時姮娥降共飲留一明月杯云以示世人南州異物志曰鸚鵡螺狀似覆杯形如鳥頭向其腹視似鸚鵡故以}
