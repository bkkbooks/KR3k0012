  - {type: variant, offset: 1168, length: 199, content: 三司廣不持本親服云於本親以我為死人深譏之罃說文曰罃備火長頸缾也方言曰罃陳魏宋楚之間謂之瓦音俞臾或謂之㼡音殊燕之東北朝鮮冽水之間謂之瓺音暢亦音腸齊之東北海岱之間謂之儋所謂家無儋石之儲者也音擔或作甔周洛韓鄭之間謂之甀或謂之罃罃謂之野音鼙史記曰韓信擊魏從夏陽以木罌渡軍襲安邑服虔曰以木捭縛罌缶以為渡異苑曰月支國有佛髮盛以琉璃甖幽明錄曰清河崔茂伯女結婚裴氏剋期未至女暴亡提一金甖受二升許徑到裴床前立以甖贈裴, WYG: 附籩樏鉶鉢窪}
