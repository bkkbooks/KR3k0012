  - {type: variant, offset: 3301, length: 2, content: 恩旨, SBCK: 􅋲上雜物䟽有上成帝螺杯一枚棬音卷方言曰孟海岱東齊北燕之間或謂之捲禮曰母没而杯圈不能飲焉口澤之氣存焉耳圈者屈木所}
  - {type: variant, offset: 3301, length: 2, content: 恩旨, WYG: 侃上雜物䟽有上成帝螺盃一枚棬音卷方言曰盂海岱東齊北燕之間或謂之棬禮曰母没而杯棬不能飲焉口澤之氣存焉耳孟子曰告子云性猶把栁也義猶杯棬也孟子曰子能順把栁之性}
