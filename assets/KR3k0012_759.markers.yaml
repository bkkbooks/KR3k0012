  - {type: variant, offset: 2217, length: 1, content: 湯, SBCK: 魯季夏六月以禘禮祀周公於太廟爼用梡嶡梡音丸嶡居衛切又曰爼有虞氏以梡夏后氏以嶡殷以椇音矩周以房爼鄭玄曰梡斷木爲}
