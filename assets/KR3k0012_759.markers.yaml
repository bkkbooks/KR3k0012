  - {type: variant, offset: 3086, length: 2, content: 述征, WYG: 袁彦伯羅山䟽曰善道開尸在石室北壁下形體朽壊止有白骨在昔成都識此道士聞之使人慨然其業行殊異當蟬蛻觧骨耳石室中先有甌盛香得便掃除燒香梁皇太子謝勑賚廣州甌等啓曰淮南承月之杯豈均符彩西國浮雲之椀非謂􅅛竒臣南珍靡究未讀奏曹之表方物罕逢不識議郎之畫杯說文曰㔶小杯也通俗文曰醬杯曰盞或謂之盌方言曰㿿椷盞盌􅦝􅡸杯也秦晉之郊謂之㿿自關而東趙魏之間曰椷或曰盞或曰盌其大者謂之盌呉越之間曰􅦝齊右平原以東或謂之􅡸杯其通語也陳楚宋魏之間謂之杯􅀢又謂之豆筥自闗而西皆謂之杯􅀢禮曰母没而杯棬不能飲焉口澤之氣存焉爾史}
