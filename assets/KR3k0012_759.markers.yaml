  - {type: variant, offset: 3085, length: 0, content: '', SBCK: 口異􅁐曰司州衛士度苦行居士也其母常誦經長齋堂衆僧未食俱望見空中有一物下旣落其前乃是大鉢滿中香飯度以􅀳惠懐之際得道齊王融謝安陸王賜銀鉢啓曰素金之貴有訪山經鐫刻可竒見符神鼎撤膳器於珎羞之席降寳玩於簞瓢之門窪烏􅀲切俗􅀃曰毛㤗買一玉窪八十八万甌方言曰甌甂音遍陳魏宋楚之間謂之㼵今河北人呼小盆爲題子杜啓切自􅀜而西謂之甂其大者謂之甌通俗文曰小甌曰㼵抱朴子曰取金液及水銀以黄土甌盛置之猛火上皆化爲丹以此丹金爲盤盌食其中令人長生諸􅁑恢集曰詔賜恢白甌二}
