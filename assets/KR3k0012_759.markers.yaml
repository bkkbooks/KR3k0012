  - {type: variant, offset: 2219, length: 2, content: 槃銘, SBCK: 四足而巳嶡之言蹶也謂中足爲横距之象周禮謂之距相之言枳椇也謂曲橈之也房謂足下跗也上下兩間有似於堂房魯頌}
  - {type: variant, offset: 2219, length: 2, content: 槃銘, WYG: 四足而已嶡之言蹶也謂中足為横距之象周禮謂之距椇之言枳椇也謂曲橈之也房謂足下跗上下兩間有似於堂房魯頌}
