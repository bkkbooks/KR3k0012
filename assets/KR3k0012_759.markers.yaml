  - {type: variant, offset: 2120, length: 17, content: 漆二升魁三漆注醬五升魁二李尤羹魁銘, SBCK: 寸中圎外方挫其四角􅃮赤中蓋亦􅀛形其飾如簠盛稻􅆝易}
  - {type: variant, offset: 2120, length: 0, content: '', WYG: 寸中圓外方挫其四角}
  - {type: variant, offset: 2120, length: 2, content: 漆二, krp: 寸中圎外方挫其四角􅃮赤中蓋亦龜形其飾如簠盛稻粱易曰樽酒簋貳用缶鄭玄曰唯北有斗不可以挹酒漿斗上有建星建星形似簋貳副也建星上星又似缶也納約自牖無咎詩曰權輿刺康公與賢人有始無終也於我乎毎食四簋今也每食不飽于嗟乎不承權輿又曰於粲洒掃陳饋八簋周禮曰瓬音放人爲簋實一觳音夫崇尺厚半寸脣寸儀禮曰佐食分簋士用敦言簋者客同姓之士得從周制禮曰管仲鏤簋而朱絃鄭玄日刻而飾之大夫刻之爲龜諸侯飾之以象天子飾之以王君子以爲濫矣又曰周之八簋黍稷器也傳曰衛孔文子之攻太叔也訪於仲尼仲尼曰簠簋之事則嘗聞之矣甲兵之事未之學也孝經曰陳其簠簋鄭玄曰方曰簠圎曰簋而哀慼之墨子曰堯飯土簋啜土鉶賈誼書曰古者大臣有坐不廉而廢者不謂不廉曰簠簋不飾瑚璉三禮圖曰瑚受一}
  - {type: punctuation, offset: 2121, content: ，, id: KR3k0012_CHANT_759-bkkpn840}
  - {type: 'tls:seg', offset: 2121, content: '', id: KR3k0012_CHANT_759-40a.9}
  - {type: variant, offset: 2121, length: 1, content: 二, WYG: 赤中蓋亦龜形其飾如簠盛稻粱易曰樽酒簋貳用缶納約自牖終无咎詩曰權輿刺康公禮賢人有始無終也於我乎每食四簋今也每食不飽于嗟乎不承權輿又曰於粲灑掃陳饋八簋周禮曰旊音倣人為簋實一觳音斛崇尺厚半寸脣寸儀禮曰佐食分簋敦言簋者客同姓之士用從周制禮曰管仲鏤簋而朱紘君子以為濫矣又曰周之八簋傳曰衞孔文子之攻太叔也訪於仲尼仲尼曰簠簋之事則嘗聞之矣甲兵之事未之學也孝經曰陳其簠簋而哀慼之墨子曰堯飯土簋啜􅁟鉶賈誼書曰古者大臣有坐不廉而廢者不謂不廉曰簠簋不飭瑚璉三禮圖曰瑚受一}
