  - {type: variant, offset: 2172, length: 1, content: 合, SBCK: 敦盤􅀋也珠玉以爲飾也古以盤盛血以敦盛食也禮曰敦牟危匜音移非餕莫敢用敦牟􅁰稷器也又曰有虞氏之雨敦􅁰稷器儀禮曰主婦設雨敦􅁰稷于爼南爼豆􅀃文曰豆古食肉器也爾雅曰木豆謂之豆豆禮器也瓦豆謂之登即髙登也三禮圖曰豆以木爲之受四升髙尺二寸􅃮赤中大夫以上亦雲􅀞}
