  - {type: variant, offset: 707, length: 1352, content: 瓿謂之瓵瓿小甖也長沙曰瓵瓵音也易曰井谷射鮒甕弊漏禮曰宋襄公葬其夫人醯醢百甕又曰儒有蓬戶甕牖易衣而出併日而食左傳曰齊侯伐燕燕人歸燕姬賂以瑤甕玉櫝斝耳不克而還玉甕也孝經援神契曰銀甕也不汲自隨不盛自盈瑞應圖同漢書曰陳平家貧居甕牖家語原憲同東觀漢記曰王渙為洛陽令盜賊發不得遠走或藏溝渠或伏甕下渙以方略取之皆稱神明王隱晉書曰太孫臧外祖蔣迪吳興人後迪作酪當釀未成大瓮自行迪打酪甕破問景養養曰當生太子儲副又曰畢卓為吏部郎性嗜酒比舍郎酒熟卓因醉夜至其甕間盜飲之為掌酒者所縛旦視之乃畢吏部也墨子曰備城百步一井井十甕莊子曰子貢過漢陰見一丈夫方將為圃畦鑿隧而入井抱甕而出灌志怪曰建康小史曹著為廬山府君所迎見門有一丈甕可受數百斛但見風雲出其中鍾離意別傳曰意為魯相孔子堂有甕皆有丹書自夫子亡後無敢發者意乃發甕得素書為學華陽國志曰趙琰青州刺史廳置水甕得貴要之書投於其中淮南萬畢術曰銅甕雷鳴取沸湯著銅甕中堅密塞內之井中則雷鳴聞數十里語林曰羊稚舒冬月釀酒令人抱甕為暖羊琇字稚舒世說曰胡廣本姓黃五月五日生父母惡之乃置甕投於江胡公見甕流下聞兒啼取兒養之遂七登三司廣不持本親服云於本親以我為死人深譏之罃說文曰罃備火長頸缾也方言曰罃陳魏宋楚之間謂之瓦音俞臾或謂之㼡音殊燕之東北朝鮮冽水之間謂之瓺音暢亦音腸齊之東北海岱之間謂之儋所謂家無儋石之儲者也音擔或作甔周洛韓鄭之間謂之甀或謂之罃罃謂之野音鼙史記曰韓信擊魏從夏陽以木罌渡軍襲安邑服虔曰以木捭縛罌缶以為渡異苑曰月支國有佛髮盛以琉璃甖幽明錄曰清河崔茂伯女結婚裴氏剋期未至女暴亡提一金甖受二升許徑到裴床前立以甖贈裴甄異傳曰晉隆安中吳縣張君才忽有鬼來令才取一白甖盛水半以絹覆頭明日視之錢滿甖才家先貧因此遂富墨子守備曰用瓦大甖容十升以上者步而十盛水旦用之蔡謨與何驃騎書曰昔墨翟以瓦甖濟國也淮南萬畢術曰馬蹄破甖取馬蹄燒如炭置甖中有頃破矣坩纂文曰大坩為坊音塤東宮舊事曰白坩五枚世說曰陶侃少時作魚梁吏嘗以一坩鮓餉母母責侃曰汝為吏以官物見餉非唯不能益吾乃以增吾憂裴淵廣州記曰董奉至晉興五里封一白坩置高崖中而去人欲取不能得今猶在缾說文曰甕也甕壅也汲缾也瓴形似缾易曰汔至亦未繘井羸其缾凶詩曰缾之罄矣傳曰衛孫蒯田于曹隧飲馬於重丘毀其鉼重丘人𨳲門而訽之親逐其君爾父為厲衛石買孫蒯伐曹取重丘又曰晉人來治杞田季孫將以成與之盛孟氏邑本杞曰謝息為孟孫守不可曰人有言曰雖有挈缾之知守不假器禮也又曰邾子在門臺閽以缾水沃廷事具鑪門中史記曰田肯說高祖曰秦形勝之國也地勢便利其以下兵於諸侯譬猶居高屋之上建瓴水也如淳曰瓴盛水缾也建音蹇漢書曰揚雄作酒賦以諷諫成帝其文為酒客難法度士譬之於物曰子猶缾矣觀缾之居居井之湄處高臨深動常近危酒醪不入藏水滿懷不得左右牽於纏徽一旦擊礙為黨所櫑音雷身投黃泉骨肉為泥自用如此不如鴟夷前涼錄曰張軌時西胡致金胡缾皆拂䔉力禁切作奇狀並人高二杖魯子曰一井五缾泄之可待分流者眾也呂氏春秋曰見缾水之冰而知天下之寒魚鼈之藏也淮南子曰古者抱缾而汲唐子曰猛將之發觀于虎而覽于鷹故攻如擊電避如收霧𨳲之如在缾開之如散星西域記曰踈勒王致魏文帝金胡缾二枚銀胡缾二枚雜五行書曰懸缾井中除邪鬼楚辭曰缾甌登於明堂缾甌瓦器也周鼎潛乎深泉古樂府詞曰後園鑿井銀作床金缾素綆汲寒漿甒方言曰甒瓮甖也禮曰君尊瓦甒此以小為貴也瓦甒五斗儀禮曰東方之饌兩瓦甒, SBCK: 杯棬欓簠簋}
