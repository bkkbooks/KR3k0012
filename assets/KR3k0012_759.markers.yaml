  - {type: variant, offset: 1368, length: 691, content: 異傳曰晉隆安中吳縣張君才忽有鬼來令才取一白甖盛水半以絹覆頭明日視之錢滿甖才家先貧因此遂富墨子守備曰用瓦大甖容十升以上者步而十盛水旦用之蔡謨與何驃騎書曰昔墨翟以瓦甖濟國也淮南萬畢術曰馬蹄破甖取馬蹄燒如炭置甖中有頃破矣坩纂文曰大坩為坊音塤東宮舊事曰白坩五枚世說曰陶侃少時作魚梁吏嘗以一坩鮓餉母母責侃曰汝為吏以官物見餉非唯不能益吾乃以增吾憂裴淵廣州記曰董奉至晉興五里封一白坩置高崖中而去人欲取不能得今猶在缾說文曰甕也甕壅也汲缾也瓴形似缾易曰汔至亦未繘井羸其缾凶詩曰缾之罄矣傳曰衛孫蒯田于曹隧飲馬於重丘毀其鉼重丘人𨳲門而訽之親逐其君爾父為厲衛石買孫蒯伐曹取重丘又曰晉人來治杞田季孫將以成與之盛孟氏邑本杞曰謝息為孟孫守不可曰人有言曰雖有挈缾之知守不假器禮也又曰邾子在門臺閽以缾水沃廷事具鑪門中史記曰田肯說高祖曰秦形勝之國也地勢便利其以下兵於諸侯譬猶居高屋之上建瓴水也如淳曰瓴盛水缾也建音蹇漢書曰揚雄作酒賦以諷諫成帝其文為酒客難法度士譬之於物曰子猶缾矣觀缾之居居井之湄處高臨深動常近危酒醪不入藏水滿懷不得左右牽於纏徽一旦擊礙為黨所櫑音雷身投黃泉骨肉為泥自用如此不如鴟夷前涼錄曰張軌時西胡致金胡缾皆拂䔉力禁切作奇狀並人高二杖魯子曰一井五缾泄之可待分流者眾也呂氏春秋曰見缾水之冰而知天下之寒魚鼈之藏也淮南子曰古者抱缾而汲唐子曰猛將之發觀于虎而覽于鷹故攻如擊電避如收霧𨳲之如在缾開之如散星西域記曰踈勒王致魏文帝金胡缾二枚銀胡缾二枚雜五行書曰懸缾井中除邪鬼楚辭曰缾甌登於明堂缾甌瓦器也周鼎潛乎深泉古樂府詞曰後園鑿井銀作床金缾素綆汲寒漿甒方言曰甒瓮甖也禮曰君尊瓦甒此以小為貴也瓦甒五斗儀禮曰東方之饌兩瓦甒, WYG: 杯棬欓簠簋}
