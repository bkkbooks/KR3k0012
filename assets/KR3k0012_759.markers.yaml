  body:
  - {type: variant, offset: 3, length: 703, content: 三盆爾雅曰盎謂之缶盆也易曰初六有孚盈缶王肅曰缶者下民質素之器又曰九三日昊之離不鼓缶而歌則大耋之嗟凶詩曰坎其擊缶宛丘之道盎謂之缶周禮曰盆實二鬴厚半寸禮曰夫奧者老婦之祭也盛於盆尊於瓶盆瓶炊器也又曰世婦卒蠶遂獻繭于夫人及良日夫人繅三盆手三盆手者三淹也史記曰秦趙會澠池藺相如曰趙王竊聞秦王善為秦聲請奏盆缻音缶皆瓦器竹以盛酒秦人鼓之以節歌於是秦王不懌為一擊缻趙御書曰某年某月秦王為趙王擊缻又曰王惲書云醉後仰天撫缶而歌又曰司馬遷書云僕以為戴盆何以望天續晉陽秋曰桓宣武與妻妾坐月下流星墜下銅盆水中光如二寸珠顃然妾酌飲之生玄晏子春秋曰景公飲酒自鼓盆甕也莊子曰莊子妻死惠子吊之莊子箕踞鼓盆而歌淮南子曰今夫窮鄙之社也扣盆拊瓴相和而歌自以為樂矣嘗試為之擊建鼓撞巨鍾然知其盆瓴之足羞藏詩書修文學而不知至論之旨則拊盆扣瓴之徒也又曰屠者藿羹車者步行陶人用缺盆匠人處狹廬又曰今盆水在庭清之終日未能見目睫濁之不用一橈而不能察方圓人神易濁而難清猶盆水之類乎學同又曰日冬至則盆水溢世說曰阮仲容至宗人聞共集以大盆盛酒王韶之始興記曰林源山有石室室盤石上行羅十甕皆蓋以青盆中悉是缾銀交州雜記曰夷俗以銅盆甕贖罪潘岳笙賦曰傾縹盆以酌酃甕說文曰罌於耕切甀直為切說文亦作垂也甀小口甖也瓨下江切以甖與罌字同長頸受十甕甖也通俗文曰甕下孔曰姑縣切方言曰瓬音剛瓭都貪切一音波甒音武䍃音由㽀音鄭㼻士雙切甕瓿甊瓿音部甊郎口切㽈魚記切甖也酃桂之郊謂之缸今江東通名大瓮為缸也其小者謂之瓭周魏之間謂之甒今江東亦呼甖甒子秦之舊都謂之㽀江淮之間謂之䍃江湖之間謂之㼻自關而西晉之舊都河汾之間其大者謂之甀其中者謂之瓿甊自關而東趙魏之間謂之甕或謂之甖東齊海岱之間謂之㽈甖其通語也爾雅曰, SBCK: 四簠簋瑚璉敦牟爼豆登附籩樏鉶鉢窪}
  - {type: variant, offset: 3, length: 1164, content: 三盆爾雅曰盎謂之缶盆也易曰初六有孚盈缶王肅曰缶者下民質素之器又曰九三日昊之離不鼓缶而歌則大耋之嗟凶詩曰坎其擊缶宛丘之道盎謂之缶周禮曰盆實二鬴厚半寸禮曰夫奧者老婦之祭也盛於盆尊於瓶盆瓶炊器也又曰世婦卒蠶遂獻繭于夫人及良日夫人繅三盆手三盆手者三淹也史記曰秦趙會澠池藺相如曰趙王竊聞秦王善為秦聲請奏盆缻音缶皆瓦器竹以盛酒秦人鼓之以節歌於是秦王不懌為一擊缻趙御書曰某年某月秦王為趙王擊缻又曰王惲書云醉後仰天撫缶而歌又曰司馬遷書云僕以為戴盆何以望天續晉陽秋曰桓宣武與妻妾坐月下流星墜下銅盆水中光如二寸珠顃然妾酌飲之生玄晏子春秋曰景公飲酒自鼓盆甕也莊子曰莊子妻死惠子吊之莊子箕踞鼓盆而歌淮南子曰今夫窮鄙之社也扣盆拊瓴相和而歌自以為樂矣嘗試為之擊建鼓撞巨鍾然知其盆瓴之足羞藏詩書修文學而不知至論之旨則拊盆扣瓴之徒也又曰屠者藿羹車者步行陶人用缺盆匠人處狹廬又曰今盆水在庭清之終日未能見目睫濁之不用一橈而不能察方圓人神易濁而難清猶盆水之類乎學同又曰日冬至則盆水溢世說曰阮仲容至宗人聞共集以大盆盛酒王韶之始興記曰林源山有石室室盤石上行羅十甕皆蓋以青盆中悉是缾銀交州雜記曰夷俗以銅盆甕贖罪潘岳笙賦曰傾縹盆以酌酃甕說文曰罌於耕切甀直為切說文亦作垂也甀小口甖也瓨下江切以甖與罌字同長頸受十甕甖也通俗文曰甕下孔曰姑縣切方言曰瓬音剛瓭都貪切一音波甒音武䍃音由㽀音鄭㼻士雙切甕瓿甊瓿音部甊郎口切㽈魚記切甖也酃桂之郊謂之缸今江東通名大瓮為缸也其小者謂之瓭周魏之間謂之甒今江東亦呼甖甒子秦之舊都謂之㽀江淮之間謂之䍃江湖之間謂之㼻自關而西晉之舊都河汾之間其大者謂之甀其中者謂之瓿甊自關而東趙魏之間謂之甕或謂之甖東齊海岱之間謂之㽈甖其通語也爾雅曰甌瓿謂之瓵瓿小甖也長沙曰瓵瓵音也易曰井谷射鮒甕弊漏禮曰宋襄公葬其夫人醯醢百甕又曰儒有蓬戶甕牖易衣而出併日而食左傳曰齊侯伐燕燕人歸燕姬賂以瑤甕玉櫝斝耳不克而還玉甕也孝經援神契曰銀甕也不汲自隨不盛自盈瑞應圖同漢書曰陳平家貧居甕牖家語原憲同東觀漢記曰王渙為洛陽令盜賊發不得遠走或藏溝渠或伏甕下渙以方略取之皆稱神明王隱晉書曰太孫臧外祖蔣迪吳興人後迪作酪當釀未成大瓮自行迪打酪甕破問景養養曰當生太子儲副又曰畢卓為吏部郎性嗜酒比舍郎酒熟卓因醉夜至其甕間盜飲之為掌酒者所縛旦視之乃畢吏部也墨子曰備城百步一井井十甕莊子曰子貢過漢陰見一丈夫方將為圃畦鑿隧而入井抱甕而出灌志怪曰建康小史曹著為廬山府君所迎見門有一丈甕可受數百斛但見風雲出其中鍾離意別傳曰意為魯相孔子堂有甕皆有丹書自夫子亡後無敢發者意乃發甕得素書為學華陽國志曰趙琰青州刺史廳置水甕得貴要之書投於其中淮南萬畢術曰銅甕雷鳴取沸湯著銅甕中堅密塞內之井中則雷鳴聞數十里語林曰羊稚舒冬月釀酒令人抱甕為暖羊琇字稚舒世說曰胡廣本姓黃五月五日生父母惡之乃置甕投於江胡公見甕流下聞兒啼取兒養之遂七, WYG: 四簠簋瑚璉敦牟俎豆}
