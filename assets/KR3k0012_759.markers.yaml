  - {type: variant, offset: 3090, length: 5, content: 逍遙宮門裏, krp: 文帝十七年新垣平使人持玉杯闕下獻之刻曰人主延壽平所言詐下吏誅漢書曰項羽置太公於髙俎上曰不降烹汝翁髙祖曰吾翁即汝翁儻烹遺我一杯羹又曰元帝徴貢禹爲諌議大夫禹奏曰臣甞從之東宫見賜柸案盡文畫金銀飾非當所以食臣下也又曰朱博爲御史大夫爲人廉儉食不重味案上不過三杯又曰王嘉爲丞相數上言不冝封董賢上怒詔丞相詣廷尉詔獄吏和藥進嘉引藥杯以擊地謂官屬曰丞相幸得備位三公奉職負國當伏刑都市以示衆豈兒女子耶何謂咀藥而死續漢書曰鄭玄飲三百餘杯不醉又禮儀志曰天子明器}
  - {type: variant, offset: 3096, length: 0, content: '', SBCK: 瓦大杯十六容三升瓦小杯二十受二升謝承後漢書曰豫章宋叔平爲定陵令素杯食麥飲酒髙弘爲琅邪相桑杯盛漿唐書曰胡楚賔屬文敏速毎飲酒半酣而後操筆髙宗每令作文必以金銀杯盛酒令飲便以杯賜之呉越春秋曰闔閭女自殺以玉杯送之管子曰人君百杯而食又曰桓公管仲鮑叔牙􅇞戚四人飲叔牙奉杯而起曰願公無忘在莒時文子曰清之爲明杯水而見眸子濁之爲闇河水不見太山韓子曰智伯身死三國分其首以爲杯又曰紂爲象箸箕子怖以爲象箸必不加於土鉶必將犀玉之杯象著玉杯必不美菽藿則必薦豹胎又曰樂羊爲魏文侯攻中山其子在中山中山之君烹其子而遺之樂羊坐幕下而饗之盡一杯淮南子曰夫江河之腐胔音漬不可勝數也然􅀕者用之大也一杯酒蠅漬其中疋夫不嘗小也鹽鐵論曰古者汙樽杯飲蓋毎爵樽觴豆及其後庶人器用即竹柳陶匏而巳唯瑚璉觴豆而後彫文彤􅃮今冨者銀口黄耳金壘玉鍾中者野玉紵器金錯屬杯失一杯得}
  - {type: page-break, offset: 3096, content: '', id: KR3k0012_SBCK_759-8a}
  - {type: variant, offset: 3096, length: 0, content: '', WYG: 瓦大杯十六容二升瓦小杯二十受二升謝承後漢書曰豫章宋叔平為定陵令素杯食麥飯髙𢎞為琅邪相桑杯盛醬唐書曰胡楚賔屬文敏速飲酒半酣而後操筆髙宗每命作文必以金銀杯盛酒令飲便以杯賜之呉越春秋曰闔閭女自殺以玉杯送之管子曰人君百杯而食又曰桓公管仲鮑叔牙甯戚四人飲叔牙奉杯而起曰願公無忘在莒時文子曰清之為明杯水而見眸子濁之為闇河水不見泰山韓子曰智伯身死三國分其首以為杯又曰紂為象箸箕子怖以為象箸必不加於􅁟鉶必將犀玉之杯象箸玉杯必不􅅅菽藿則必薦豹胎又曰樂羊為魏文侯攻中山其子在中山中山之君烹其子而遺之樂羊幕下而饗之盡一杯淮南子曰夫江河之腐胔音漬不可勝數也然祭者用之大也一杯酒蠅漬其中匹夫不嘗小也鹽鉄論曰古曰汙樽杯飲蓋無爵樽觴豆及其後庻人器用即竹栁陶匏而已唯瑚璉觴豆而後彫文彤漆今富者銀口黄耳金疊玉鍾中者玉紵器金錯属杯失一杯得}
