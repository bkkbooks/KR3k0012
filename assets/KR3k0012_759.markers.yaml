  - {type: variant, offset: 2267, length: 366, content: 國反其國必得志於諸侯得志於諸侯而誅無禮曹其首也子盍蚤音早與早同自貳焉乃饋槃飧寘璧焉又曰莒人伐我東鄙圍台季武子救台遂入鄆取其鍾以為公槃史記曰平原君與楚王合從音縱言利害毛遂謂楚王之左右曰取鷄狗馬之血來毛遂捧銅槃血跪進曰當啑血盟而定之又曰武帝作柏梁銅柱承露槃仙人掌蘇林曰仙人以手掌檠槃承甘露也後漢書曰左慈有術於銅槃鈞鯔魚漢官儀曰封禪壇南有玉槃槃中有玉龜焉晉陽秋曰武帝時御府令蕭譚承徐循儀䟽作漆畫銀槃詔殺之晉四王起事曰惠帝還洛陽道中有老公蒸雞素木槃中盛以奉帝沈約宋書曰高祖儉諸子食不過五醆槃後魏書曰太武帝作黃金槃十二具鏤以白銀鈿以玫瑰珠玉隋書曰上賜王公已下射楊素箭為第一上以外國所獻金精槃價直鉅萬賜之荀卿子曰君者槃也水者民也槃圓則水圓槃方則水方燕丹子曰太子出美人能琴者荊軻曰好手太子即斷手以玉槃奉之淮南子曰窺面於槃水則圓於杯水則脩面形不變其, SBCK: 哀}
