  - {type: variant, offset: 2162, length: 1, content: 若, SBCK: 瓬音放人爲簋實一觳音夫崇尺厚半寸脣寸儀禮曰佐食分簋士用敦言簋者客同姓之士得從周制禮曰管仲鏤簋而朱絃鄭玄日刻而飾之大夫刻之爲􅀛諸侯飾之以象天子飾之以王君子以爲濫矣又曰周之八簋􅁰稷器也傳曰衛孔文子之攻太叔也訪於仲尼仲尼曰簠簋之事則嘗聞之矣甲兵之事未之學也孝經曰陳其簠簋鄭􅀇曰方曰簠圎曰簋而哀慼之墨子曰堯飯土簋啜土鉶賈􅁩書曰古者大臣有坐不廉而廢者不謂不廉曰簠簋不飾瑚璉三禮圖曰瑚受一升形制未聞制度云如簋而平下璉受一升􅃮赤中蓋亦􅀛形大夫飾口以白金制度云如簋而兊下禮曰夏后氏之四璉殷之六瑚皆􅁰稷器論語曰子貢問賜也何如曰汝器也曰何器也曰瑚璉也盛􅁰稷之器夏曰瑚殷日璉敦牟上音堆三禮圖曰敦有足其形如今酒罇法牟受一斗如敦形古牟受一升平下􅃮赤中飾口以白金蓋亦􅀛形周禮曰􅀂}
