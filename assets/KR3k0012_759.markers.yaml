  - {type: variant, offset: 2222, length: 2, content: 茍日, krp: 邊豆大房也夏后氏以楬苦戞切豆殷玉豆周獻息列切豆掲無異物之飾也獻䟽剖之又曰禮有以多爲貴者天子之豆二十有六諸公十有六諸侯十有二上大夫八下大夫六又曰子云觴酒豆肉讓而受惡民猶犯齒傳曰鳥獸之肉不登於爼皮革齒牙骨角毛羽不登於器則公不射古之制也論語曰衛靈公問陳音陣於孔子孔子曰爼豆之事則嘗聞之矣軍旅之事未之學也史記曰孔子爲小兒時常陳爼豆以爲戯國語曰晉侯使聘周王召士季曰汝今我王室之一二兄弟以相見將和恊典禮以示民訓奉其犧息竒切象出其尊彛陳其爼豆漢書曰韓延夀爲潁川太守令文學諸生皮弁執爼豆爲吏民行喪娶之禮又曰劉向說上曰有司定法筆削救時務也至於禮樂則曰不敢是敢於殺人不敢於養人爲其爼豆管絃之間小不備因絶不爲是去小不備而就大不備東觀漢記曰劉昆教授弟子恒五百餘人毎春秋饗射常備列典儀以素木瓠葉爲爼豆莊子曰祝宗人說彘曰汝奚惡死吾將加汝肩尻乎彫爼之上賈誼}
