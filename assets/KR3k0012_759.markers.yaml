  - {type: variant, offset: 3086, length: 2, content: 述征, krp: 庾翼與燕王書曰今致白甌二枚袁彦伯羅山䟽曰善道開尸在石室北壁下形體朽壞止有白骨在昔在都識此道士聞之使人慨然其業行殊異當蟬蛻解骨耳石室中先有甌盛香得便掃除燒香梁皇太子謝勑賚廣州甌等啓曰淮南承月之杯豈均符彩西國浮雲之椀非謂瓌竒臣南珎靡究未讀奏曹之表方物罕逢不識議郞之畫杯說文曰杯㔶小杯也㔶音貢盛二音通俗文曰醬杯曰盞或謂之䀀夫凡切又薄淹切方言曰㿿音雅椷音緘盞酒盞也䀀呼雅切楊音章歴音摩杯也秦晉之郊謂之㿿所謂伯㿿者也自關而東趙魏之間曰椷或曰盞最小杯也或曰䀀其大者謂之聞呉越之間曰􅦝齊右平原以東或謂之􅡸杯其通語也杯落盛杯器籠也陳楚宋魏之間謂之杯落又謂之豆筥自關而西謂之杯落禮曰母没而杯圏巨阮切不能飲焉口澤之氣存焉尓史}
