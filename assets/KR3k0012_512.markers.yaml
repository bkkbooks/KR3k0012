  - {type: variant, offset: 240, length: 0, content: '', SBCK: 融俱好老易融與浩口談論詞屈著篇則融勝浩由是爲風流談論者所宗又曰鄧攸逃奔石勤􅀒其妻子而主擔其兒及其弟子綏度不能兩全遂棄其巳子卒以無嗣綏服攸䘮三年又曰謝安字安石於東山營墅樓館林竹甚盛毎携中外子姪徃來遊集餚饌亦屢費百金丗頗以此譏焉安殊不以屑意又曰徐苗字叔胄髙宻淳于人也其兄弟皆}
