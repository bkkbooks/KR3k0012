  - {type: variant, offset: 257, length: 1272, content: 有暇則講學亡疲師事譙周門人方之遊夏太始初徵為太子洗馬密以祖母老上表云臣無祖母難以至於今日祖母無以終餘年母孫二人更相為命臣密今年四十四祖母年九十六是臣盡節於陛下之日長而恭事於劉之日短劉終後復為太子洗馬又曰王爽字季明強正有志歷侍中嘗與會稽王道子飲道子醉呼爽為小子爽曰亡祖長史與簡文帝為布衣之交亡姑亡姊伉儷二宮何小子之有又曰符生字長生健第二子幼而無賴祖洪甚惡之生而無一目為童兒洪戲之曰吾聞瞎兒一淚信乎生怒引佩刀自剌出血曰此亦一淚洪大驚鞭之生曰性耐刀槊不堪杖箠洪曰吾將以爾為奴生曰可不如石勒也洪懼跣而掩其口陳留志曰范喬字伯山年二歲祖父馨臨終執其手曰恨不見汝成人因以所用硯與之至五歲祖母以告喬喬便執硯流涕江蕤別傳曰蕤年十一始樗蒲祖母費為說往事有博弈破業廢身於是棄五木終身不以為戲父母爾雅曰父為考母為妣毛詩陟岵曰孝子行役思念父母也陟彼岵兮瞻望父兮陟彼屺兮瞻望母兮又蓼莪曰蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞蓼蓼者莪匪莪伊蔚哀哀父母生我勞瘁無父何怙無母何恃出則銜恤入則靡至父兮生我母兮鞠我撫我畜我長我育我顧我復我出入腹我欲報之德昊天罔極禮記曲禮曰生曰父曰母死曰妣曰考左傳隱公曰鄭莊公母弟共叔段以母之寵請邑居之涼段遂以京叛公伐京段出奔遂寘母姜氏於城潁而誓之曰不及黃泉無相見也既而悔之頴考叔曰若闕地及泉隧而相見其誰曰不然公從之遂為母子如初又莊公曰宋南宮長萬作亂奔陳以乘車輦其母一日而至又成上曰晉敗秦師于鞍齊請平晉人曰必以蕭同叔子為質對曰蕭同叔子非他寡君之母也若以疋敵則亦晉君之母也吾子布大命於諸侯而曰必質其母以為信其若王命何且是以不孝令也又襄三曰晉叔向之母妒叔虎之母美而不使視寢其子皆諫其母母曰深山大澤實生龍虵彼美余懼其生龍虵以禍汝汝獘族也余何愛焉使往視寢生叔虎美而有勇欒盈嬖之故羊舌氏之族及於難公羊傳曰惠公者何隱之考也仲子者何桓之母也史記曰趙括奢之子趙孝成王欲以括為將母曰不可使也王曰母何以知之對曰妾事其父時其父為將王之所賞賜盡分散與軍吏士大夫受命之日不問家事令括一朝為將軍吏不敢仰視王之所賜悉藏於家而視利便田宅父子異心願王勿遣王曰母致之吾已決矣母曰王必遣忽有不稱妾乞不坐王許之後果敗為白起所坑漢書曰王陵沛人以兵屬漢王項羽得陵母置於軍中以招陵後漢使至陵母謂使者曰為老妾語陵漢王長者必有天下善事之無以老妾在故懷持二心遂伏劍而死羽怒烹之又曰陸賈使南越趙他賜陸生橐中裝直千金他送亦千金呂后時病免歸家有五男乃出所使得越橐中裝賣千金分與其子各二百金令為生產賈常乘安車駟馬從歌舞鼓吹琴瑟侍者十人有寶劍直百金謂其子曰與汝約過汝給吾人馬酒食極歡十日而更所死家得寶劍及車騎從者又曰金日磾字翁叔休屠王太子也父以降漢見殺與母閼氏弟俱沒入宮後拜光祿大夫既親近未嘗有過武帝甚信愛之日磾母教誨兩子甚有法度上嘉之及死詔圖形于甘泉宮曰休屠王閼氏也日磾每見畫常拜泣不止又曰霍去病父仲孺河東人以縣吏給事平陽侯家與侯侍者衛少兒私通生去病仲孺吏畢歸家娶婦生子不相聞久之去病為驃騎將軍擊匈奴道出河東至平陽傳舍遣迎仲孺趍入拜謁將軍迎拜因跪曰去病不早知為大人之遣體也仲孺扶服叩頭曰老臣得訖命將軍此天力也去病大買, SBCK: 州里}
