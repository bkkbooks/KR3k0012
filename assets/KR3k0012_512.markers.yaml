  - {type: variant, offset: 2715, length: 5, content: 本渡江託足, WYG: 少時所治意所戀也器物取其朽敗曰我服食已乆身口所安也袁山松後漢書曰范丹為萊蕪長去官於市賣卜妻紡績以自給丹弟子愷見丹在蕃不完載柴将客藩之時丹適行還怒勅子㧞柴載以還之後漢書曰馬援字文淵扶風茂陵人也援兄子嚴敦並喜譏議而通輕侠客援前在交趾遺書誡之曰吾欲汝曺聞人過失如聞父母之名耳可得聞而口不可得言也好議論人長短妄是非正法此吾所大惡寕死不願聞子孫有此行也汝曺知吾惡之甚矣所以復言者施襟結褵申父母之戒欲使汝曹不忘之耳龍伯高敦厚周慎口無擇言謙約節儉㢘公有威吾愛而重之願汝曺效之杜季良豪侠好義憂人之憂樂人之樂清濁}
