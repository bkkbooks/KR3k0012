  - {type: variant, offset: 3710, length: 242, content: 不言撫前妻子如己所生又曰王祥字休徵瑯琊人至孝繼母朱氏不慈由是失愛於父令掃除牛下祥愈恭謹父母有疾衣不解帶母令守丹㮏實每風雨則抱而泣母常思黃雀炙忽有黃雀數十飛入幕遂以供母三十國春秋曰王延九歲喪母孝行有聞後母卜氏御之無道延恭事彌謹卜常取蒲穰敗麻與之貯衣延知而不言卜冬月杖之流血令求生魚延扣冰慟哭而得與之卜乃心悟撫之如所生也又曰晉安帝時郭逸妻以大竹杖打逸前妻之子子死妻因棄市如常刑家語曰曾參武城人志存孝道後母遇之無恩其妻藜烝不熟出之人曰此非七出也荅曰藜蒸小物不用吾命況大事遂遣之終身不娶其子請, SBCK: 客}
