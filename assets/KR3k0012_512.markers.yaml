  - {type: variant, offset: 2365, length: 311, content: 嘉之拜武昌太守丞相已下皆拜之年九十五譚立養堂於家又曰郄詵濟陰人對策高第拜議郎母憂去職母在日苦病車及亡不欲車載家貧無以市馬乃於住堂北壁外假葬朝夕拜哭養雞種蒜竭其方術喪過三年得馬八疋輿棺至塚負土成墳又曰韓康伯潁川長社人母殷氏高明有行家恒貧伯年數歲大塞母為作布襦令伯捉熨斗而謂之曰且著布襦尋復作袴伯曰不須母問故曰火在斗中柄熱今上著襦下亦當暖矣又曰羊躭妻辛氏隴西人侍中毗之女有才鑒鍾會為鎮西請其子琇為參軍母曰吾為國憂今日難至吾家行矣戒之軍旅之間可以濟者惟仁恕乎古之君子入則致孝於親出則盡忠於國在職思其所司在義思其所立無貽父母憂患而己後會至蜀果反琇竟以道全身又曰桑虞字子深魏郡黎陽人五代義居閨門雍睦青州刺史符朗甚重之嘗詣虞家昇堂拜時, WYG: ''}
