  - {type: variant, offset: 1345, length: 206, content: 殺與母閼氏弟俱沒入宮後拜光祿大夫既親近未嘗有過武帝甚信愛之日磾母教誨兩子甚有法度上嘉之及死詔圖形于甘泉宮曰休屠王閼氏也日磾每見畫常拜泣不止又曰霍去病父仲孺河東人以縣吏給事平陽侯家與侯侍者衛少兒私通生去病仲孺吏畢歸家娶婦生子不相聞久之去病為驃騎將軍擊匈奴道出河東至平陽傳舍遣迎仲孺趍入拜謁將軍迎拜因跪曰去病不早知為大人之遣體也仲孺扶服叩頭曰老臣得訖命將軍此天力也去病大買田宅奴婢而去又曰嚴延平字次卿東海下邳人為河南, WYG: ''}
