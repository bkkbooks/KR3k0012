  - {type: variant, offset: 2810, length: 0, content: '', WYG: 王昶聞籍竒偉請與相見乃歎息不能測也又曰王湛字處冲司徒渾之弟也兄子濟輕之嘗詣湛見牀頭有周易問曰叔父何用此為湛曰體中不佳時脱復㸔耳濟請言之湛因剖析𤣥微妙有竒趣皆所未聞也濟才氣抗邁於湛畧無子姪之敬既聞其言不覺慄然心形俱肅遂留連彌日累夜自視缺然乃嘆曰家有名士三十年而不知濟之罪也濟有從馬絶難乗濟問湛曰叔頗好騎否湛曰亦好之因騎此馬姿形既妙廻䇿如素善騎者無以過之又濟所乗馬湛愛之湛曰此馬雖快然力薄不堪苦行近見督郵馬當勝但芻秣不至耳濟試養之而與已馬等湛又曰此馬雖快任方知之平路無以别也於是當蟻封内試之濟馬果躓而郵馬如常濟益歎異還謂其父曰濟始得一叔乃濟上人也武帝亦以湛為癡每見濟輙語之曰卿家癡叔死未濟常無以答及是帝又問如初濟曰臣叔殊不癡因稱其美帝曰誰比濟曰上比山濤不足下比魏舒有餘湛聞曰欲處我季孟間乎又曰殷浩字深源陳郡常平人也叔父融俱好老易融與浩口譚論詞屈著篇則融勝浩由是為風流譚論者所宗又曰鄧攸逃奔石勒負其妻子而去擔其兒及其弟子緩度不能兩全遂棄兒其後卒以無嗣緩服攸䘮三年又曰謝安字安石於山東營墅樓館林竹甚盛毎擕中外子姪徃来逰集餚􅄿亦屢費百金世頗以此譏焉安殊不以屑意又曰徐苗字叔胄髙宻淳于人也其兄皆早亡撫養遺孤慈愛州里田宅奴婢盡推與之又曰謝𤣥字幼度以勲封康樂縣公陳以先封東興侯賜兄子玩詔聴之更封玩豫寕伯又曰劉曜逼長安凉州刺史張寔叔父西海太守肅請為先鋒撃曜曰孤死者立心不􅁯本鍾儀在晉楚弁南音肅受晉寵割符列位羯逆㴞天朝廷傾覆晏安方裔難至不奮何以為人臣寔曰門户受重恩自當闔宗效死但叔父春秋已高氣力衰竭軍旅之事非耆耄所堪乃止既而聞京師陥没肅悲憤而卒又曰羅憲兄子尚字敬之少孤依叔父憲又曰慕容超字祖眀徳之兄子東海王納之子也苻堅破鄴以為廣武太守數嵗去官家于張掖徳南征留金刀而去及垂起兵山東苻昌收徳諸子皆誅之納}
