  - {type: variant, offset: 2723, length: 0, content: '', WYG: 願汝曺效之效伯髙不得猶為謹勅士所}
  - {type: variant, offset: 2724, length: 7, content: 爾等並居貴位在, WYG: 刻鵠不成尚類鶩也效季良不得陥天下輕薄子所謂畫虎不成反類狗也迄今季良尚未可知郡将下車輒切齒州縣以為言}
