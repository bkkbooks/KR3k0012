  - {type: punctuation, offset: 3389, content: 「, id: KR3k0012_CHANT_512-bkkpn1005}
  - {type: variant, offset: 3389, length: 3, content: 吳司徒, SBCK: 安帝時以劉鎮之爲散􅀐常侍光禄大夫不受鎮之毅季父也義􅄉􅀄謂毅蕃曰汝軰才力􅀔運足以得志當身爭耳我不就汝求位求財又不受汝罪累毎見毅等道從吏卒到門輙罵詬之毅甚敬畏毎未至宅數百歩止與白衣數人而進儀衛悉不自隨及至毅敗天下服其先見而劉􅁉甚敬遇之又曰燕金紫光禄大夫髙平公平歆􅀄歆伯父左光禄大夫熈拊歆首而告之曰汝儀容偉茂志節果當有佐命之功顯吾門者必汝也孫巖宋書曰許昭先義興人也諸父肇坐事繫獄七年不判子姪三十餘人昭先家最貧薄專獨斷訮無日在家餉饋肇莫非珎新家産旣盡賣宅以充之肇諸子倦怠唯昭先無有懈息如是七􅀊尚書沈演之嘉其操行肇事由此得釋沈休文宋書曰宗慤字元幹徴士柄兄子也年少時炳問慤所志荅曰願乗長風破萬里浪炳曰汝􅀂不冨貴必破我門户又曰何承天叔肹爲益陽令隨肹之官隆安四年南蠻校尉桓偉命爲叅軍時殷仲堪桓􅀇等牙舉兵以向朝廷承天懼禍難未巳解職還益陽又曰劉凝之字志安小名長年南郡人也推家財與弟及兄子立屋於野外非其力不食典略曰鄭均字仲虞任城人也好黄老兄亡後飬嫂兄子思禮甚篤及居併門盡推財産與之由是名稱風俗通云周玘字}
  - {type: page-break, offset: 3389, content: '', id: KR3k0012_SBCK_512-8a}
  - {type: page-break, offset: 3389, content: '', id: KR3k0012_SBCK_512-8b}
  - {type: variant, offset: 3389, length: 3, content: 吳司徒, WYG: 安帝時以劉謓之為散騎常侍光禄大夫不受謓之毅季父也義熈初謂毅蕃曰汝輩才力勢運足以得志當自争耳我不就汝求財又不受汝罪累每見毅等導從吏卒到門輙罵詬之毅甚敬畏毎未至宅數百歩止與白衣數人而進儀衛悉不自随及至毅敗天下服其先見而劉裕甚敬遇之又曰燕金紫光禄大夫高平公歆初歆伯父在光禄大夫拊歆首而告之曰汝儀容偉茂志節果勇當有佐命之功顯吾門者必汝也孫岩宋書曰許照先義興人也諸父肇坐事繋獄七年不判子姪三十餘人照先家最貧薄專獨㫁許無日在家餉饋􅒊莫非珍新家産既盡賣宅以充之肇諸子倦怠照先無有懈怠如是七嵗尚書沈演之嘉其操行􅒊事由此得釋沈休文宋書曰宗慤字元幹徴士炳兄子也年少時炳問慤所志答曰願乗長風破萬里浪炳曰汝若不富貴必破我門户又曰何承天叔盻為義陽令随盻之官隆安四年南蠻校尉違命為叅軍殷仲堪桓𤣥等牙舉兵以向朝廷承天懼禍難及已解職還益陽又曰劉凝之字志安小名長年南郡人也推家財與弟及兄子立屋於野外非其力不食典畧曰鄭均字仲虞任城人也好黄老兄亡後養嫂兄子恩禮甚篤及居併門盡推財産與之由是名稱風俗通云周玘字}
