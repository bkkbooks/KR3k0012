  - {type: variant, offset: 71, length: 522, content: 後漢書曰虞詡陳國人祖父為郡縣獄吏務在寬恕常稱曰東海于公高其里門定國卒至丞相吾治獄六十年雖不及于公子孫何得不為九卿故字詡曰昇卿後遷僕射尚書令晉書曰何曾侍武帝宴退告其子道曰國家應天受命創業垂統吾每侍宴未嘗聞經國遠圖唯說平生常事非貽厥孫謀之兆也後嗣其殆乎此吾子孫之憂汝等猶可沒指孫曰此輩必遇亂亡及遵之子綏死兄嵩哭之曰吾祖其殆聖乎又曰李密字令伯父早亡母改醮祖母劉撫養密奉事以孝謹聞有暇則講學亡疲師事譙周門人方之遊夏太始初徵為太子洗馬密以祖母老上表云臣無祖母難以至於今日祖母無以終餘年母孫二人更相為命臣密今年四十四祖母年九十六是臣盡節於陛下之日長而恭事於劉之日短劉終後復為太子洗馬又曰王爽字季明強正有志歷侍中嘗與會稽王道子飲道子醉呼爽為小子爽曰亡祖長史與簡文帝為布衣之交亡姑亡姊伉儷二宮何小子之有又曰符生字長生健第二子幼而無賴祖洪甚惡之生而無一目為童兒洪戲之曰吾聞瞎兒一淚信乎生怒引佩刀自剌出血曰此亦一淚洪大驚鞭之生曰性耐刀槊不堪杖箠洪曰吾將以爾為奴生曰可不如石勒也洪懼跣而掩其口陳留志曰范喬字伯山年二歲祖父馨臨終執其手曰恨不見汝成人因以所用硯與之至五歲祖母以告喬喬便執硯流涕江蕤別傳曰蕤年十一始樗蒲祖母費為說往事有博弈破業廢身於是棄五木終身不以為戲父母, WYG: ''}
