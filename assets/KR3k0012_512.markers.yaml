  - {type: variant, offset: 84, length: 7, content: 縣獄吏務在寬恕, SBCK: 人也父植有名於丗毓十􅀊而􅀌遇夲州亂二兄死難當􅀽紹公孫瓉交兵幽兾飢荒飬寡嫂􅀌兄子以學行見稱又曰王昶字文舒太原人其爲兄子及子作名字皆一依謙實以見其意故兄子黙字處静沉字處道其子渾字􅀇冲深字道冲遂書戒之曰夫爲人子之道莫大於寳身全行以顯父母又曰毛玠居顯位}
