  - {type: variant, offset: 2803, length: 0, content: '', WYG: 范遷字子盧沛國人也為司徒及在公公轉有宅數畆田不過一頃復推與兄子其妻謂曰君有四子而無立錐之地可餘俸禄以為後世遷曰吾備位大臣而蓄財求利何以示後在位四年薨家無擔石焉又曰張堪字君逰南陽宛人也堪早孤譲先父餘財數百萬與兄子又曰第五倫字伯魚京兆長陵人或問倫曰公有私乎對曰吾兄子嘗疾一夜十徃退而安寝吾子有疾雖不省視竟夕不眠若是者豈可謂無私乎又曰張属字伯達父歆為淮陽相終於家及令属徃篤志節儉父卒及吏人賻送前後百萬悉無所受又以田宅推與伯父自身寄止又曰中常侍趙忠言於省内曰袁本初坐作聲價好養名士不知此兒終欲作何叔父太傅隗聞而呼紹以忠言責之紹終不改又曰戴封遭伯父䘮去官又曰沮授為曺操所執授曰叔父母弟懸於袁氏若蒙公靈速死為福操歎曰孤早得授天下不足慮也遂赦而厚遇焉又曰}
  - {type: page-break, offset: 2803, content: '', id: KR3k0012_WYG_512-6b, image: WYG0897/WYG0897-0580b.png}
  - {type: page-break, offset: 2803, content: '', id: KR3k0012_WYG_512-7a, image: WYG0897/WYG0897-0580c.png}
  - {type: variant, offset: 2804, length: 1, content: 琨, WYG: 矩字叔方少有髙節以叔父遼未得仕進遂絶州郡之命又曰伏恭字叔齊司徒湛之兄子湛位至光禄勲無子以恭}
  - {type: variant, offset: 2806, length: 1, content: 并, WYG: 後魏書曰荀攸字公達祖父曇攸少孤及曇卒故吏張推求守曇墓攸年十三疑之謂叔父衢曰此吏有非常之色殆将姦亂衢悟乃推問果殺人亡命因是異之又曰盧毓字子家涿郡人也父植有名於世毓十嵗而孤遇本州亂二兄死難當袁紹公孫瓉交兵幽冀飢荒養寡嫂孤兄子以學行見稱又曰王昶字文舒太原人其為兄子及子孫名字皆一依謙實以見其意故兄子黙字處静沉字處道其子渾字𤣥冲深字道冲遂書戒之曰夫為人子之道莫大於保身全行以顯父母又曰馬玠居顯位常布衣蔬食撫育兄子甚篤又曰張範子陵及弟子戩為山賊所得範直詣賊請二子賊以陵還範範謝曰諸君相還兒厚矣夫人情雖愛其子然吾於戩之小請以陵易之賊義其志悉以還範又曰王基字伯興東莱曲城人也少孤與叔父翁居撫養甚篤亦以孝稱又曰髙慎字孝甫敦厚少華有沉深之量撫育孤兄子五人恩養甚篤瑯琊相何英嘉其行履以女妻焉蜀志曰諸葛亮初未有子求兄子喬為嗣瑾啟孫權遣喬来而亮以喬為嫡子故易其字焉拜為駙馬都尉王隐晉書曰庾衮孤兄女曰芳将嫁衣服具美衮以荆苕為箕箒召諸子集之于堂男女以班而命芳曰汝芳少孤今汝適人将事舅姑灑掃内庭婦人之道也故賜汝以此匪器之美欲汝之温恭朝夕雖休勿休也又曰魏舒質朴容貌少號遲鈍人莫知之唯叔父恒知其竒每有賔客進見常勸使過舒言吾兄子非常人也臧榮緒晉書曰阮籍随叔父至東兖}
