  - {type: variant, offset: 2587, length: 371, content: 惟仁恕乎古之君子入則致孝於親出則盡忠於國在職思其所司在義思其所立無貽父母憂患而己後會至蜀果反琇竟以道全身又曰桑虞字子深魏郡黎陽人五代義居閨門雍睦青州刺史符朗甚重之嘗詣虞家昇堂拜時以為榮又曰周顗母李氏名洛秀汝南人中興時顗等並列顯位嘗冬至置酒洛秀舉酒賜三子曰吾本渡江託足無所不謂爾等並居貴位在吾目前吾身後何憂嵩起曰恐不如尊旨伯仁志大而才短名重而識闇好因人之獘此非自全之道嵩性抗直亦不容於世唯阿奴碌碌在阿母前耳後果如其言阿奴即謨小字也又曰劉琨為并州刺史母謂之曰汝能弘濟經略驅駕豪傑專欲除於勝己以自安當何以濟禍必及我也後父母並為劉聰所害又曰朱序字次倫義陽人鎮襄陽符堅令符丕圍序序母韓氏自登城履行謂西北角必先破受獘遂領百餘婢及城中女同丁築三十餘丈後賊果從西北角攻眾潰城破遂固新築丕用引退得免城破襄陽人謂此城為夫人城宋書曰張興世字文德竟陵人以平江陵功轉右, SBCK: 衛}
