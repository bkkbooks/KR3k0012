  - {type: variant, offset: 2058, length: 305, content: 氏通百家之言莽以殊禮之號義成夫人金印紫綬乘文軒丹轂又曰張甫字孟侯汝南人為太尉雖在公位父常居田里每有遷職輒一詣京師公卿罷朝俱詣甫府奉酒上壽時人榮之吳志曰蔣欽母踈帳縹被妻妾布裙孫權歎其在位能守約儉勑御府為母作被乃幃帳晉書曰劉惔字真長沛人少清遠有奇才與母任氏寓居京口家貧織芒屩以為養雖蓽門圭竇晏如也又曰伏滔字玄度平昌人甚有才學知名拜著作郎孝武會西堂滔預坐還下車先呼子系曰百人高會天子先問伏滔在座不此固未易得為人作父如此如何又曰汜毓字稚春濟北盧人奕世儒素敦睦九族時人號之兒無常父衣無常主又曰荀羨字令則清和有準纔年七歲遇蘇峻難隨父在石頭峻甚愛之惜置羨於膝上羨乃陰白其母曰得一利刀子足以殺賊母掩其口又曰虞譚母孫氏訓子以節義, WYG: 傅}
