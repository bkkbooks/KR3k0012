  - {type: variant, offset: 3141, length: 166, content: 常攜孺於市道途中逢中丞鹵簿驅迫落溝中及孺拜中丞日引孺清道悲不自勝劉璠梁典曰張充字延符吳人父緒特進有重名充少不拘細行肆意畋放時緒請假還吳始入西郭值充正獵左手臂鷹右手牽犬遙望見父乃脫韝放膺紲犬向舟而拜緒曰一身兩役無亦勞乎充跪對曰充聞三十而立今二十九歲矣請至來歲終身折節緒曰若過而能改乃顏子矣及明年乃一朝易操尋師就學博覽今古鬱為名士蕭方等, SBCK: ''}
