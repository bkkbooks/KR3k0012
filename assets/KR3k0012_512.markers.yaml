  - {type: variant, offset: 56, length: 3, content: 路溫舒, SBCK: 􅀄髙祖微時嘗避事時與賔客過其丘嫂食應邵日丘氏女也孟康曰西方謂亡女壻爲丘婿丘空也兄亡空有嫂也晉灼曰丘大也大嫂爲家嫂也嫂厭叔與客來陽爲羮盡轢釡客以故去巳而視釡中有羮由是怨嫂及立齊代王而伯子獨不得侯太上皇以爲言髙祖曰某非敢忘封之也爲其母不長者封其子信爲頡羮侯又曰踈廣}
  - {type: variant, offset: 56, length: 3, content: 路溫舒, krp: 𥘉髙祖微時嘗避事時與賔客過其丘嫂食應邵日丘氏女也孟康曰西方謂亡女壻爲丘婿丘空也兄亡空有嫂也晉灼曰丘大也大嫂爲家嫂也嫂厭叔與客來陽爲羮盡轢釡客以故去巳而視釡中有羮由是怨嫂及立齊代王而伯子獨不得侯太上皇以爲言髙祖曰某非敢忘封之也爲其母不長者封其子信爲頡羮侯又曰踈廣}
  - {type: variant, offset: 60, length: 1, content: 長, SBCK: 仲翁東海蘭陵人也宣帝時爲太子太􅀓兄子受字公子爲少􅀓太子每朝因進見太􅀓在前少􅀓在後叔姪並爲師􅀓朝廷以爲榮又曰王莽字巨}
  - {type: page-break, offset: 60, content: '', id: KR3k0012_SBCK_512-2a}
  - {type: variant, offset: 60, length: 1, content: 長, krp: 仲翁東海蘭陵人也宣帝時爲太子太傳兄子受字公子爲少傳太子每朝因進見太傳在前少傳在後叔姪並爲師傳朝廷以爲榮又曰王莽字巨}
