  - {type: variant, offset: 3413, length: 11, content: 小兒無德可容而學者多貧, SBCK: 卒中惡風叔父以告嵩驚愕呼操操曰貌如}
  - {type: variant, offset: 3413, length: 2, content: 小兒, WYG: 卒中惡風叔父以告嵩驚愕呼操操曰貌如故嵩曰叔父言汝中風為已差乎操曰初不中風但失愛叔父故見枉耳嵩乃疑焉後叔父有所告嵩終不復信操於是益得肆志陳留耆舊𫝊曰爰彌字伯仁年十嵗叔父蘭部濟隂從事與御卒俱獵縣送酒肉彌不肯受甞問其故答曰聞之於諸侯夫臨其事不食其食蘭然其言還而不受貞㓗之質由是以彰也海内先賢𫝊曰故南郡太守南陽程堅體履仁孝秉志清㓗少譲財兄子仕郡縣居貧}
