  - {type: variant, offset: 2692, length: 0, content: '', WYG: 頭以視示子張見之悲喜因絶後漢書曰劉平字公子楚郡彭城人也更始時天下亂平弟仲為賊所殺其後賊復忽然而至平扶侍其母奔走逃難仲遺腹女始一嵗平抱仲女而棄其子母欲還取之平不聴曰力不能兩活仲不可以絶類遂去不顧謝承後漢書曰魏霸字嶠卿濟陽人為鉅鹿太守與兄子同苦樂不得自異又曰許荆兄子世嘗報讐殺人怨家㑹衆操兵至荆家欲殺世荆始從府休歸與相遇因出門觧劒長跪曰前無状相犯咎皆在荆不䏻相教既兄早殁一子為嗣如令死者傷其㓕絶今願殺身代世塞咎雖死以往猶謂更生怨家扶起荆曰許掾郡}
