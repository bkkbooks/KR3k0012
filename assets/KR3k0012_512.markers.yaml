  - {type: variant, offset: 46, length: 7, content: 念爾祖聿脩厥德, SBCK: 亡而得者三始誦之今得而行之是學益明也俸禄所供􅀍及親戚是骨肉益親也雖也有公事而兼以弔死問疾是朋友信篤也孔子喟然謂子賤曰君子哉􅀂人魯無君子者斯焉取斯也}
