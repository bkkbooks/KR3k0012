  - {type: variant, offset: 20, length: 1, content: 逮, SBCK: 滕伯文爲孟虎齊衰其叔父也爲孟皮齊衰其叔父也伯文殷時滕君也爵爲伯名文家語曰孔子兄子有孔蔑者與宓子賤偕仕孔子徃過孔蔑而問焉曰自汝之仕何得何亡對曰未有所得而亡者三王}
  - {type: variant, offset: 20, length: 40, content: 逮事父母則諱王父母不逮事父母則不諱王父母毛詩商頌曰無念爾祖聿脩厥德漢書曰路溫舒字, WYG: 伯}
