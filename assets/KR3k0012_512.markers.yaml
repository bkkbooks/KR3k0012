  - {type: variant, offset: 75, length: 3, content: 虞詡陳, SBCK: 劉平字公子楚郡彭城人也更始時天下亂平弟仲爲賊所殺其後賊復忽然而至平扶持其母奔走逃難仲遺腹女始一􅀊平抱仲女而棄其子母欲還取之平不聽曰力不能兩活仲不可以絶􅀋遂去不顧謝承後漢書曰魏覇字嶠卿濟隂人爲鉅鹿太守與兄子同苦樂不得自異又曰許荆兄子丗嘗報讎殺人怨家㑹衆操兵至荆家欲殺丗荆始從府休歸與相遇因出門解劒長跪曰前無狀相犯咎皆在荆不能相教旣兄早殁一子爲嗣如令死者傷其滅絶今願殺身代丗塞咎雖死以徃猶謂更生怨家扶起荆曰許􅁺郡中稱爲賢吾何敢相侵因遂委去華嶠後漢書曰薛苞弟子求出苞不敢止乃中分其財奴婢引其老者曰與我共事乆􅀂不能使也田廬取其荒頓曰吾少時所治意所戀也器物取其朽敗曰我服食乆身口所安也􅀽山松後漢書曰范丹爲萊蕪長去官於市賣卜妻紡績以自給丹弟子愷見丹藩不完載柴將客藩之時丹適行還怒勑子抜柴載以還之後漢書曰馬援字文淵扶風茂陵人也援兄子嚴敦並喜譏議而通輕俠客援前在交阯還書誡之曰吾欲聞汝曹聞人過失如聞父母之名耳可得聞而口不可得言也好論議人長短妄是非正法此吾所大惡寧死不願聞子孫有此行也汝曹知吾惡之甚矣所以復言者施􅁭結䄜申父母之戒欲使汝曹不志之耳龍伯髙敦厚周慎口無擇言謙約節儉廉公有威吾愛之重之願汝曹効之杜季良豪俠好義憂人之憂樂人之樂清濁無所失父喪致客數郡畢至吾愛之重之不願汝曹効之効伯髙不得猶爲謹勑士所謂刻鵠不成尚􅀋鶩也効季良不得䧟爲天下輕薄子所謂􅀞虎不成反􅀋狗也訖今季良尚未可知郡將下車輒切齒州縣以爲言吾常寒心是以不願子孫効也又曰范遷字子廬沛}
