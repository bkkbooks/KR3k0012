  - {type: variant, offset: 143, length: 0, content: '', SBCK: 􅁃衮􅀌兄女曰芳將嫁羙服具矣衮刈荆苕爲箕箒焉召諸子集之于堂男女以班而命芳曰汝芳少􅀌今汝適人將事舅姑洒掃庭内婦人之道也故賜汝以此匪器之羙欲汝之温恭朝夕雖休勿休也又曰魏舒容皃質朴少号遟鈍人莫之知唯叔父衡知其竒每有賔客造巳常勸使過舒言吾兄子非常人也臧榮緒晉書曰阮籍隨叔父至東兖州刺史王昶聞籍竒偉請與相見乃歎息以不能測也又曰王湛字處冲司徒渾之弟也兄子濟輕之嘗詣湛見牀頭有周易問曰叔父}
  - {type: page-break, offset: 143, content: '', id: KR3k0012_SBCK_512-5b}
  - {type: variant, offset: 143, length: 0, content: '', krp: 庾衮孤兄女曰芳將嫁羙服具矣衮刈荆苕爲箕箒焉召諸子集之于堂男女以班而命芳曰汝芳少孤今汝適人將事舅姑洒掃庭内婦人之道也故賜汝以此匪器之羙欲汝之温恭朝夕雖休勿休也又曰魏舒容皃質朴少号遟鈍人莫之知唯叔父衡知其竒每有賔客造巳常勸使過舒言吾兄子非常人也臧榮緒晉書曰阮籍隨叔父至東兖州刺史王昶聞籍竒偉請與相見乃歎息以不能測也又曰王湛字處冲司徒渾之弟也兄子濟輕之嘗詣湛見牀頭有周易問曰叔父}
  - {type: variant, offset: 144, length: 2, content: 曾侍, SBCK: 用此爲湛曰體中不佳時脫復看耳濟請言之湛因剖析􅀇微妙有竒趣皆所未聞也濟才氣抗邁於湛略無子姪之敬旣聞其言不覺慄然心形俱肅遂留連彌日累夜自視鈌然乃歎曰家有名士三十年而不知濟之罪也濟有從馬絶難乗濟問湛曰叔頗好􅀐不湛曰亦好之因􅀐此馬姿形旣妙廽䇿如素善􅀐者無以過之又濟所乗馬湛愛之湛曰此馬雖快然力薄不堪苦行近見督郵馬當勝但芻秣不至耳濟試飬之而與巳馬等湛又曰此馬雖快任方知之平路無以别也於是當蟻封内試之濟馬果躓而郵馬如常濟益歎異還白其父曰濟始得一叔乃濟以上人也}
