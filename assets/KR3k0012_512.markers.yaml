  - {type: 'tls:seg', offset: 3419, content: '', id: KR3k0012_CHANT_512-42a.9}
  - {type: variant, offset: 3420, length: 1, content: 學, WYG: 歎曰徳公誠知人此實盛徳也張方賢楚國先賢𫝊曰隂蒿字文玊南陽新野人衛尉興從祖兄也少䘮父母與叔父居恭謙婉順温良節儉王莽末義兵初起乃與叔父避世蒼梧後徴拜謁}
  - {type: page-break, offset: 3420, content: '', id: KR3k0012_WYG_512-15b, image: WYG0897/WYG0897-0584d.png}
  - {type: variant, offset: 3422, length: 83, content: 多貧故為廣被可得氣類相接也列女傳曰鄒氏孟軻之母見孟子少而學歸母方織問之曰子之廢學若吾斷織孟子懼因更勤不息遂為大儒世說曰華歆遇子弟甚整雖闇室之內儼然若朝典也又曰陳元方遭, WYG: 以叔}
