  - {type: variant, offset: 80, length: 0, content: '', SBCK: 也爲司徒及在公公輔有宅數畒田不過一頃復推與兄子其妻謂曰君有四子而無立錐之地可餘奉禄以爲後丗遷曰吾備位大臣而蓄財求利何以示後在位四年薨家無檐石焉又曰張堪字君遊南陽宛人也堪早􅀌讓先父餘財數百萬與兄子又曰第五倫字伯魚京兆長陵人或問倫曰公有私乎對曰吾兄子嘗疾一夜十徃退而安寢吾子有疾雖不省視竟夕不眠􅀂是者豈可謂無私乎又曰張禹字伯逹父歆爲淮陽相終於汲令禹性篤節儉父卒汲吏人􅉠送前後百萬悉無所受又以田宅推與伯父自身􅀉止又曰中常侍趙忠言於省内曰􅀽夲􅀄坐作聲價好飬死士不知此兒終欲作何叔父太􅀓隗聞而呼紹以忠言責之紹終不改又曰戴封遭伯父䘮去官又曰沮授爲曹操所執援曰叔父母弟懸命􅀽氏􅀂􅂪公靈速死爲福操歎曰􅀌早相得天下不足慮也遂赦而厚遇焉又曰劉矩字叔方少有髙節以叔父遼未得仕進遂絶州郡之命又曰伏恭字叔齊司徒湛之兄子湛弟黯位至光禄勲無子以恭爲後魏志曰荀攸字公逹}
  - {type: page-break, offset: 80, content: '', id: KR3k0012_SBCK_512-4a}
