  - {type: variant, offset: 3393, length: 1, content: 宗, SBCK: 玉爲右將軍􅁺弟子使客殺人􅀍罪玘詣府與太守盛亮相見了不論弟子之命遂俱盡於獄弟婦不哭其子但􅂘孟玉孟玉由此爲髙曹瞞傳曰太祖一名􅁻利字阿瞞}
