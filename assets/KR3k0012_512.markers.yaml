  - {type: variant, offset: 1533, length: 0, content: '', SBCK: 盡推與之又曰謝玄字㓜度以勲封康樂縣公陳以先封東興侯賜兄子玩詔聽之更封玩豫寧伯又曰羅憲兄子尚字敬之少􅀌依叔父憲又曰劉曜逼長安凉州刺史張寔叔父西海太守肅請爲先鋒擊曜曰狐死首丘心不忘夲鍾儀在晉楚弁南音肅受晉寵割符列位羯逆滔天朝廷傾覆宴安方裔難至不奮何以爲人臣寔曰門户受重恩自當闔宗効死但叔父春秋巳髙氣力衰竭軍旅之事非耆耄所堪乃止旣而聞京師䧟􅃿肅悲憤而卒又曰慕容超字祖明德之兄北海王納之子也符堅破鄴以納爲廣武太守數􅀊去官家于張掖德之南征留金刀}
