  - {type: variant, offset: 1552, length: 433, content: 守冬日行屬縣刑戮囚徒流血數里河號屠伯母見責之曰汝宣化千里不聞仁愛而殺人立威名豈為人父母哉天道神明人不可獨殺我不意老見壯子被刑戮也行矣去東歸掃墓地耳歲餘果敗延年兄弟五人皆有吏才並至大官東海號為萬石嚴嫗又曰雋不疑為京兆尹每行縣錄囚徒還其母輒問有所平反活幾人即不疑多有平反母喜而為之食或無所出母怒而不食故不疑為吏嚴而不殘後漢書曰竇武字游平扶風人初武母產武并產一虵送之林中後母卒葬有一大虵自榛草出至擊柩流血若哀泣之容時人以為竇氏之祥又曰楊彪為太尉子修為曹操所殺操見彪問曰君何瘦之甚也彪曰媿無日磾先見之明猶懷老牛舐犢之愛操為改容又曰范滂字孟博汝南征羗人也建甯二年大誅黨人滂母就與之訣滂白母曰仲博孝敬足以供養仲博滂弟也滂從龍舒君歸之黃泉存亡各得其所惟大人割不可忍之恩勿增感戚母曰汝今得與李杜齊名死何恨滂跪受教再拜而辭顧謂其子曰吾欲使汝為惡則惡不可為使汝為善則我不為惡行路聞之莫不流涕又曰黃憲字叔度汝南人世貧賤父為牛醫袁閬母謂閬曰汝從牛醫兒來耶對曰閬不見叔度自以為及既覩其人則瞻之, WYG: 傅}
