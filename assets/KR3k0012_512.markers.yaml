  - {type: variant, offset: 62, length: 2, content: 從祖, SBCK: 孝元皇后之弟子}
  - {type: variant, offset: 62, length: 2, content: 從祖, krp: 孝元皇后之弟子}
  - {type: variant, offset: 65, length: 0, content: '', SBCK: 及兄弟皆以元成世封侯輔政凡九侯五大司馬唯莽父曼早死不侯五侯子爭侈靡莽獨􅀌貧折節爲儉}
  - {type: variant, offset: 65, length: 0, content: '', krp: 及兄弟皆以元成世封侯輔政凡九侯五大司馬唯莽父曼早死不侯五侯子爭侈靡莽獨孤貧折節爲儉}
  - {type: variant, offset: 66, length: 1, content: 曆, SBCK: 禮經勤身􅀶學事母及寡嫂養􅀌兄子行甚整又外交英俊内事諸父丗父鳯病莽侍疾亂髪垢面鳯且死以託太后及帝拜黄門侍郎東觀漢記曰鄭均好義篤實事寡嫂収兒恩禮甚至又曰魏譚有一􅀌兄子年一二􅀊常自飬視遭饑饉分升合以相生活譚時有一女生裁}
  - {type: variant, offset: 66, length: 1, content: 曆, krp: 禮經勤身博學事母及寡嫂養孤兄子行甚整又外交英俊内事諸父丗父鳯病莽侍疾亂髪垢面鳯且死以託太后及帝拜黄門侍郎東觀漢記曰鄭均好義篤實事寡嫂収兒恩禮甚至又曰魏譚有一孤兄子年一二歲常自飬視遭饑饉分升合以相生活譚時有一女生裁}
  - {type: punctuation, offset: 68, content: 、, id: KR3k0012_CHANT_512-bkkpn33}
  - {type: variant, offset: 68, length: 0, content: '', SBCK: 月念無榖食終不能兩全棄其女飬活兄子州郡髙其義又曰桓榮卒子郁當襲爵讓於兄子顯宗不許不得巳受封而悉以租入與之又曰淳于㳟飬兄崇􅀌兒教誨學問時不如意輙平責數以捶自擊其脛欲以感之兒慙􅀒不敢復有過􅀽子又載又曰郅惲友董子張叔父及爲郷里民所害子張病惲往候之氣絶良乆復視惲歔欷惲曰知子不悲}
  - {type: page-break, offset: 68, content: '', id: KR3k0012_SBCK_512-2b}
