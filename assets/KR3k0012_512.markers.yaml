  - {type: variant, offset: 1594, length: 905, content: 母哉天道神明人不可獨殺我不意老見壯子被刑戮也行矣去東歸掃墓地耳歲餘果敗延年兄弟五人皆有吏才並至大官東海號為萬石嚴嫗又曰雋不疑為京兆尹每行縣錄囚徒還其母輒問有所平反活幾人即不疑多有平反母喜而為之食或無所出母怒而不食故不疑為吏嚴而不殘後漢書曰竇武字游平扶風人初武母產武并產一虵送之林中後母卒葬有一大虵自榛草出至擊柩流血若哀泣之容時人以為竇氏之祥又曰楊彪為太尉子修為曹操所殺操見彪問曰君何瘦之甚也彪曰媿無日磾先見之明猶懷老牛舐犢之愛操為改容又曰范滂字孟博汝南征羗人也建甯二年大誅黨人滂母就與之訣滂白母曰仲博孝敬足以供養仲博滂弟也滂從龍舒君歸之黃泉存亡各得其所惟大人割不可忍之恩勿增感戚母曰汝今得與李杜齊名死何恨滂跪受教再拜而辭顧謂其子曰吾欲使汝為惡則惡不可為使汝為善則我不為惡行路聞之莫不流涕又曰黃憲字叔度汝南人世貧賤父為牛醫袁閬母謂閬曰汝從牛醫兒來耶對曰閬不見叔度自以為及既覩其人則瞻之在前忽然在後固難測矣又曰廬江蔡宗字孟承兢廉嚴正其子未嘗見面子為二千石求謁宗宗下帷不許子伏於庭其母穿壁使其子窺之乃識儀皃又曰崔發仕王莽位至大司空母師氏通百家之言莽以殊禮之號義成夫人金印紫綬乘文軒丹轂又曰張甫字孟侯汝南人為太尉雖在公位父常居田里每有遷職輒一詣京師公卿罷朝俱詣甫府奉酒上壽時人榮之吳志曰蔣欽母踈帳縹被妻妾布裙孫權歎其在位能守約儉勑御府為母作被乃幃帳晉書曰劉惔字真長沛人少清遠有奇才與母任氏寓居京口家貧織芒屩以為養雖蓽門圭竇晏如也又曰伏滔字玄度平昌人甚有才學知名拜著作郎孝武會西堂滔預坐還下車先呼子系曰百人高會天子先問伏滔在座不此固未易得為人作父如此如何又曰汜毓字稚春濟北盧人奕世儒素敦睦九族時人號之兒無常父衣無常主又曰荀羨字令則清和有準纔年七歲遇蘇峻難隨父在石頭峻甚愛之惜置羨於膝上羨乃陰白其母曰得一利刀子足以殺賊母掩其口又曰虞譚母孫氏訓子以節義朝廷嘉之拜武昌太守丞相已下皆拜之年九十五譚立養堂於家又曰郄詵濟陰人對策高第拜議郎母憂去職母在日苦病車及亡不欲車載家貧無以市馬乃於住堂北壁外假葬朝夕拜哭養雞種蒜竭其方術喪過三年得馬八疋輿棺至塚負土成墳又曰韓康伯潁川長社人母殷氏高明有行家恒貧伯年數歲大塞母為作布襦令伯捉熨斗而, SBCK: 􅃉}
