  - {type: variant, offset: 2681, length: 2, content: 周顗, WYG: 王莽字巨君孝元皇后之弟子父及兄弟皆以元成世封侯専政凡九侯五大司馬唯莽父曼死不侯五侯子争侈靡莽獨孤貧折節為儉受禮經勤身博學事}
  - {type: page-break, offset: 2681, content: '', id: KR3k0012_WYG_512-3a, image: WYG0897/WYG0897-0578c.png}
  - {type: variant, offset: 2684, length: 7, content: 李氏名洛秀汝南, WYG: 及寡嫂養孤児行甚整又外交英俊内事諸父世父鳯病莽侍疾亂髪垢面鳯且死以託太后及帝拜黄門郎東觀漢記曰鄭均好義篤實事寡嫂孤児恩禮甚至又曰魏譚有一孤兄子年一二嵗常自養親遭饑饉分升合以相生活譚時有一女生裁數月念無榖食終不能兩全棄其女養活兄子州郡高其義又曰桓榮卒子郁當襲爵譲於兄子顯宗不許不得已受封而悉以租入與之又曰淳于恭養兄崇孤兒教訓學問時不如意輙手責數以捶自撃其脛欲以感之兒慙負不敢復有過又曰郅惲友董子張叔父及為鄉里民所害子張庸惲往候之氣絶良久復視惲歔欷傳曰知子不悲天命痛讐不復也惲即起将客取仇}
