  - {type: variant, offset: 4363, length: 240, content: 襄陽耆舊傳曰魏伐蜀羅獻為巴東太守得劉禪委質定問乃帥所部臨于都亭三日吳聞蜀已敗遂起兵西上外託援救內欲襲獻城以固其國遣盛曼等水陸到說獻以合同之計獻乃會議曰今本朝傾覆吳為同盟不恤我難而邀其利可主降於北臣求福於東乎今守孤城百姓未定宜一決戰以定眾心遂銜枚夜擊破曼旋軍保城告誓將士厲以節義莫不用命襄陽記曰劉備以習珍為零陵北部都尉孫權遣潘濬討珍珍帥數百人登山自將濬乃單將左右自到山下交語珍謂曰我必為漢鬼不為吳臣矣濬攻珍圍守月餘糧箭並竭珍謂群下曰珍受漢中王厚恩不得不報之以死諸君何為者耶乃伏劍自裁, SBCK: ''}
  - {type: variant, offset: 4363, length: 4, content: 襄陽耆舊, WYG: 又曰宦者田鵬事齊至内侍中齊主走青州圖入陳出覘為周人所獲歐問齊主所在紿云已去周人折其支毎折一支辭色逾厲四支俱絶而死許肅别}
