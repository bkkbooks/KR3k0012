  - {type: variant, offset: 7, length: 1, content: 勇, SBCK: 貞管子曰忠者臣下之髙行孟子曰教人以善謂之忠淮南子曰交淺而言深是忠也抱朴子曰竭身命以徇國經夷險而一節者忠臣也􅀃􅁐曰逆命利君謂之忠又曰卑身賤體夙興夜寐進賢不懈數稱徃古之行事以厲主意庶幾有益以安國家如此者忠臣也禮記文王丗子曰爲人臣者殺其身有益于君則爲之又檀弓曰公叔文子卒其子戍請謚於君君曰昔者衛國有難夫子以其死衛寡人不亦貞乎}
