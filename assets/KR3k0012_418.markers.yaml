  - {type: variant, offset: 2577, length: 203, content: 蘇峻反桓彝為宣城內史往赴朝廷長史禆惠等減以宜且桉甲以謀須眾力齊集彝厲色曰夫見無禮於其君者誅之如鷹鸇之逐鳥雀今社稷之難而欲逡巡將何以云眾力雖寡義無寧處長驅往進尋主師敗績彝慷慨流涕皆勸偽同以紓交至之禍如其不然重兵必至彝曰吾受國厚恩不能死節焉能忍辱與之通問如其不濟此郎命也遣俞縱進軍左右以力不敵勸縱退軍縱曰吾承桓侯厚遇吾之不可負桓侯猶桓侯不可負國也遂力戰而死峻遣韓晃因進軍討彝力屈被害又曰易雄長沙濟陽人為舂陵令聞, SBCK: ''}
