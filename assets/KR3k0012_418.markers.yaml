  - {type: variant, offset: 3450, length: 864, content: 必不為我用又得眾死心不可留故害之五代史曰後唐應順末少帝失位自洛涉河與數百騎欲奔鄴時晉高祖改鎮常山亦自郡詣闕夜與帝遇於獲嘉東遂俱入衛郡郵舍中是夜少帝伏甲欲與徒臣謀害晉高祖詐屏人對語方坐於亭廡帝密遣御士石敢袖鎚立其後伏甲者俄起左右驚擾敢素有勇力擁晉高祖入一室以巨木塞門敢力當其鋒尋死焉呂氏春秋曰荊莊襄王獵於雲夢射隨兕中之申公子培劫而奪之王曰何其暴而不敬也命吏誅之左右大夫皆進諫曰子培賢者也又為王百倍之臣此必有故願王察之也不出三月子培疾而死荊興師戰於兩棠大勝晉歸而賞有功者申公子培之弟進請賞於吏曰人之有功也於軍旅臣之兄有功也於車下王曰何謂也對曰臣之兄犯暴不敬之名觸死亡之罪於王之側愚以忠於君王之身而特千歲之壽也臣之兄嘗讀故記曰殺隨兕者不出三月是以臣之兄驚懼而爭之故伏其罪而死王令人發平府而視之於故記果有乃厚賞之申公子培其忠也可謂穆行矣穆美也穆行之意人知之不為勸人不知之不為沮行無高乎此者又曰人殺衛懿公熒澤盡食其肉獨舍其肝弘演使還哭畢呼天而號盡哀而止曰臣請為襮博卜二音因自出其肝內懿公之肝襮表也新序曰崔杼殺莊公申蒯漁於海將入死之其御止之曰君無道聞於天下不可死也申蒯曰安得食亂君之祿而死治君之事乎申蒯至門曰請入吊門者以告崔杼杼令勿內申蒯曰汝疑我乎吾與汝臂乃斷左臂以與門者以示崔杼杼陳八列令其入申蒯拔劍呼天鬭殺七列未及崔子一列而死又曰楚有士申鳴者在家而養其父孝聞於楚國王欲授之相申鳴辭不受其父曰王欲相汝汝何不受乎申鳴對曰捨父之孝子而為王之忠臣何也其父曰使有祿於國立義於庭汝樂吾無憂矣吾欲汝之相也申鳴曰喏遂入朝楚王因授之相居三年白公為亂殺司馬子期申鳴將往死之父止之曰棄父而死其可乎申鳴曰聞夫仕者身歸於君而祿歸於親今去子事君得無死其難乎遂辭而往因以兵圍之石乞曰申鳴者天下之孝子也往劫其父以事兵申鳴聞之必來來與之語白公曰善則往取其父持之以兵告申鳴曰子與吾吾與子分楚國子不與吾子父則死矣申鳴流涕而應之曰始吾父之孝子也今吾君之忠臣也吾聞之也食其食者死其事受其祿者畢其能今吾已不得為孝子矣乃君之忠臣也吾何得以全身援桴鼓之遂殺白公其父亦死王賞之百斤金申鳴, WYG: ''}
