  - {type: variant, offset: 1739, length: 237, content: 堅守比至二國圍齊數重無從入二國與路中大夫盟曰若反言漢已破大夫許之至城下望見齊王曰漢已發兵百萬使太尉周亞夫擊破吳楚方引兵救齊齊必堅守二國誅之魏志曰許渚從征袁紹於官渡徐他等謀為逆以褚常侍左右憚之不敢發伺褚休下日他等懷刀入褚至下舍心動即還侍他等不知入帳見褚大驚褚覺之即擊殺他等太祖益親信之又曰諸葛恪圍合肥新城城中遣士劉整出圍傳消息為賊所得栲問所傳語賊謂整曰諸葛公欲活汝汝可具服整罵曰我當必死為魏國鬼不茍求活逐汝去也終無他辭又遣使鄭像出城傳消息恪遣騎尋跡得像歸面縛繞城令整像大呼言大, SBCK: ''}
