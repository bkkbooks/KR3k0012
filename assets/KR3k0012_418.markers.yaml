  - {type: variant, offset: 4065, length: 211, content: 何也其父曰使有祿於國立義於庭汝樂吾無憂矣吾欲汝之相也申鳴曰喏遂入朝楚王因授之相居三年白公為亂殺司馬子期申鳴將往死之父止之曰棄父而死其可乎申鳴曰聞夫仕者身歸於君而祿歸於親今去子事君得無死其難乎遂辭而往因以兵圍之石乞曰申鳴者天下之孝子也往劫其父以事兵申鳴聞之必來來與之語白公曰善則往取其父持之以兵告申鳴曰子與吾吾與子分楚國子不與吾子父則死矣申鳴流涕而應之曰始吾父之孝子也今吾君之忠臣也吾聞之也食其食者死其事受其祿者畢其能今吾已, SBCK: ''}
