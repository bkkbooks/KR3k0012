  - {type: variant, offset: 4476, length: 375, content: 決戰以定眾心遂銜枚夜擊破曼旋軍保城告誓將士厲以節義莫不用命襄陽記曰劉備以習珍為零陵北部都尉孫權遣潘濬討珍珍帥數百人登山自將濬乃單將左右自到山下交語珍謂曰我必為漢鬼不為吳臣矣濬攻珍圍守月餘糧箭並竭珍謂群下曰珍受漢中王厚恩不得不報之以死諸君何為者耶乃伏劍自裁又曰晉伐吳張悌渡江戰吳軍大敗諸葛靚過迎悌悌不肯去垂泣曰仲思今是我死日且我作兒童便為卿家丞相所扶常恐不得其死負名賢知故今身殉社稷復何所遁華陽國志曰曹公察關羽不安使張遼以情問之曰極知曹公待我厚然吾受劉將軍恩不可背之要當立効報公公聞而美之是歲袁紹遣顏良攻東郡太守劉延於白馬公使遼羽為先鋒羽望見麾策馬剌良於萬眾之中斬其首還遂解延圍公即表封羽壽亭侯重加賞賜羽盡封其物拜書告辭而歸先主周處別傳曰氐賊齊萬年為亂乃以處為建威將軍進軍大戰奮劍慷慨仰天歎曰古者將受賑鑿凶門以出蓋有進無退我為大臣以身殉國不亦可乎遂戰死, WYG: 十八}
