  - {type: variant, offset: 3118, length: 0, content: '', SBCK: 忠於夲朝故有今難豈有背將軍理哉衆相枕而死者五千人又南涼録曰振武將軍尉賢政固守浩亹不下熾盤招之曰樂都巳潰卿妻子皆在吾聞􅀌城獨守何所爲也政曰受涼王厚恩爲國家藩屏雖知樂都巳䧟妻子爲擒先歸􅀗賞後順受誅然不知主存亡未敢歸命妻子小事豈動懷盤乃遣虎臺手書喻政政曰爲國儲不能盡忠反面􅅞於人棄父􅀒君􅃜萬世之業賢政義士豈如汝乎三國典略曰齊平東雍州刺史􅀓伏堅守不降帝遣韋孝寛將伏子仁寛招伏曰并州巳平故遣公兒來報今授上大將軍武郷郡公以金馬腦二酒鍾爲信公冝急下伏不受謂孝寛日事君有死無貳此兒爲臣不忠爲子不孝願即斬以示天下帝又遣髙阿郍肱等百餘人臨汾召伏伏}
  - {type: page-break, offset: 3118, content: '', id: KR3k0012_SBCK_418-6b}
  - {type: variant, offset: 3118, length: 0, content: '', WYG: 忠於本朝故有今難豈有背將軍理哉衆相枕而死者五千人又南凉錄曰振武將軍尉賢政固守浩亹不下熾磐招之曰樂都已潰卿妻子皆在吾所孤城獨守何所為也政曰受凉王厚恩為國家藩屏雖知樂都已陷妻子為擒先歸獲賞後順受誅然不知主存亡未敢聞命妻子小事豈足動懷磐乃遣虎臺手書喻政政曰為國儲不能盡忠反面縛於人棄父負君墮萬世之業賢政義士豈如汝乎三國典略曰齊山東維州刺史傅伏堅守不降帝遣􅅊孝寛將伏子仁寛招伏曰并州已平故遣公兒來報今授上大將軍武卿郡公以金馬腦二酒鍾為信公宜急下伏不受謂孝寛曰事君有死無二此兒為臣不忠為子不孝願即斬以示天下帝又遣髙阿那肱等百餘人臨汾召伏伏}
  - {type: page-break, offset: 3118, content: '', id: KR3k0012_WYG_418-10a, image: WYG0896/WYG0896-0659c.png}
  - {type: variant, offset: 3118, length: 0, content: '', krp: 忠於夲朝故有今難豈有背將軍理哉衆相枕而死者五千人又南涼録曰振武將軍尉賢政固守浩亹不下熾盤招之曰樂都巳潰卿妻子皆在吾聞孤城獨守何所爲也政曰受涼王厚恩爲國家藩屏雖知樂都巳䧟妻子爲擒先歸獲賞後順受誅然不知主存亡未敢歸命妻子小事豈動懷盤乃遣虎臺手書喻政政曰爲國儲不能盡忠反面縛於人棄父負君虧萬世之業賢政義士豈如汝乎三國典略曰齊平東雍州刺史傳伏堅守不降帝遣韋孝寛將伏子仁寛招伏曰并州巳平故遣公兒來報今授上大將軍武郷郡公以金馬腦二酒鍾爲信公冝急下伏不受謂孝寛日事君有死無貳此兒爲臣不忠爲子不孝願即斬以示天下帝又遣髙阿郍肱等百餘人臨汾召伏伏}
  - {type: variant, offset: 3119, length: 10, content: 避難將向龍都禁衛四散, SBCK: 軍隔水相見問至尊何在阿郍肱曰巳􅀍捉􅀗別路入閞伏仰天大哭率衆入城於㕔事前北面哀號良乆乃降帝見之曰何不早下伏流涕而對曰臣三代􅀍任草命不能自死羞見天地帝執其手曰爲臣當􅀂此朕平齊國}
