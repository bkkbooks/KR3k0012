  - {type: variant, offset: 2231, length: 0, content: '', SBCK: 巳丑白虹貫日此金氣再見也金能勝木必有兵氣冝黜司徒以應天意又郎顗對問曰方春東作報徳之始元氣開發養導萬物王者因天視聽奉順時氣務崇温柔遵行月令禮祀月令孟春天子命相布德和令行慶施惠下及兆人仲春安萌芽養㓜少存諸􅀌省囹圄去桎桔止獄訟而今立春之後考事不息秋冬之政行乎春故虹春見掩蔽日曜凡邪氣乗陽則虹蜺在日斯皆執事刻急所致殆非朝廷優寛之本此其變常之咎也又曰孔子作春秋書正月者敬􅀊之始也公羊傳曰元年春王正月元年者何君之始年也正月者何嵗之始王者則天之象因時之序冝開發德號爵賢命士流寛大之澤垂仁厚之德禮祀迎春於東郊還乃賞公卿諸侯大夫於朝命相布和令行慶施惠下及兆人慶賞遂行無有不當順助元氣含養庶􅀋如此則天文昭爛星辰顯列五緯循􅁤四時和睦五帝五星否則天陽不光天地溷濁時氣錯逆霾霧蔽日爾雅曰風而雨土爲霾也自立春以來累經旬朔未見仁德有所施布但聞罪罰考掠之聲夫天之應人疾於影響而自從入嵗常有蒙氣月不舒光日不宣曜日者太陽以象人君政變於下日應於天清濁之占隨政抑􅀭天之見異事無虚作豈獨陛下倦於萬機帷幄之政有所闕歟晉書禮志曰太史毎嵗}
