  - {type: variant, offset: 3, length: 0, content: '', SBCK: 五春下立春春分春下說苑曰管仲曰吾不能以春風風人夏􅀨􅀨人吾道窮矣白虎通曰嫁娶以春何春者天地交通萬物始生隂陽交接之時也京房占曰春當退貪吏進柔良恤㓜􅀌賑不足求隱士即萬物應節而生隨氣而長所爲春令司馬法曰春不東征秋不西伐月食班師所以省戰也謂春不成生秋不伐熟夫兵隂象也月食則隂毀故息戰也顔氏家訓曰夫學者猶種樹也春翫其華秋取其實講說文章春之華也脩身利行秋之實也徐子中論曰夫名之繫於實也猶物之繫於時也生物者春也吐華者夏也布葉者秋也収成者冬也斯無爲而自成者􅀂強爲之則傷其性矣風俗通曰赤春俗說赤春從人假貸家皆自乏之時謹案詩曰春日載陽有鳴鶬鶊月令衣青衣服蒼玉又爾雅春曰青陽凡三春時不得復赤也今里語曰相斥角牛原其所以言不當角牛春從人求索也斥與赤音相似周生烈曰仁如春風惠如冬日汜勝之書曰三月榆莢􅀨髙地強土可種禾投荒録曰南方春時晴霽即如夏隂􅀨即如冬不復有韶光麗景􅀂通}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_020-1b}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 五春下立春春分春下説苑曰管仲曰吾不能以春風風人夏雨雨人吾道窮矣白虎通曰嫁娶以春何春者天地交通萬物始生隂陽交接之時也京房占曰春當退貪吏進柔良恤孤幼賑不足求隱士萬物應節而生隨氣而長是為春令司馬法曰春不東征秋不西伐月食班師所以省戰謂春生成秋不伐熟夫兵隂象也月食則隂毁故息戰也顏氏家訓曰夫學者猶種樹也春翫其華秋取其實講説文章春之華也修身利行秋之實也徐子中論曰夫名之繫于時也猶物之繫于時也生物者春也吐華者夏也布葉者秋也收成者冬也斯無為而自成者若强為之則傷其性矣風俗通曰赤春俗説赤春從人假貸家皆自乏之時謹按詩曰春日載陽有鳴鶬鶊月令衣青衣服蒼玉又爾雅春曰青陽凡三春時不得服赤也今俚語曰相斥角牛原其所以言不當角牛春從人求索也斥與赤同周生烈曰仁如春風惠如冬日汜勝書曰榆莢雨髙地强土可種木投荒録曰南方春時晴霽即如夏隂雨即如冬不復有韶光麗景若通}
