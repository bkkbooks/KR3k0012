  - {type: variant, offset: 227, length: 2, content: 群居, SBCK: 是月也立春太史先三日謁於天子曰某日立春盛德在木天子乃齊太史禮官之屬謁告立春之日親率公卿諸侯大夫以迎春於東郊起春祀青帝靈威仰於東郊之北也周禮迎郊五十里也還乃賞公卿大夫於朝命相布德和令行慶施惠下及兆民傳曰凡分至啓閉必書雲物爲備故也立春爲啓立冬爲閉又曰郯子對孔子曰少皡摯爲鳥師而鳥名青鳥氏司啓}
