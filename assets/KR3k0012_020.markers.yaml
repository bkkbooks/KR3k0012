  - {type: variant, offset: 2778, length: 340, content: 稷而為諸侯笑臣聞忠不避死諫不違罪君不聽臣臣將逝矣景公曰唯唯唯唯從其諫也楊子法言曰或曰為政先殺后教歟曰於乎天先秋而後春乎將先春而後秋乎梁元帝纂要曰春亦曰發生芳春青春陽春三春九春風曰陽風暄風柔風惠風景曰媚景和景韶景時曰良時嘉時辰曰良辰嘉辰芳辰節曰芳節嘉節韶節淑節草曰弱草芳卉木曰華木華樹芳林芳樹林曰茂林鳥曰陽鳥時鳥陽禽候鳥時禽好禽夏書曰龜人之職凡攻龜用春時各以其物入于龜室六龜各異室也秋取龜及萬物成也攻治也治龜骨以春是時乾解不發傷也上春釁龜祭祀先卜釁者殺性以血塗之也鄭司農云祭祀先卜者卜其日與其牲玄謂先始用卜筮者言祭祀尊天地也世本作日巠咸作筮卜未聞其人也是上春者夏正建寅之月月令孟冬云釁祀龜策相互矣秦以十月建亥為歲首則月令秦世之書亦或欲以歲首釁龜耳筮人上春相筮相謂更選擇其蓍龜歲易者歟, SBCK: ''}
