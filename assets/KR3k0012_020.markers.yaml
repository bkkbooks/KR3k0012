  - {type: variant, offset: 3125, length: 0, content: '', SBCK: 蟲不震隂氣姧陽魚不上氷甲胄私藏􅀨水之日􅆩不􅀕魚國多盗賊鴻鴈不來逺人不服草木不萌動果􅀲不熟國語曰農祥晨正唐固注曰農祥房星也晨正謂晨見南方謂立春之日齊人月令曰凡立春日食生菜不可過多取迎新之意而巳及進漿粥以導和氣四時􅛞要曰立春貯水謂之水神釀酒不壞修眞入道秘言曰以立春日清朝北望有紫縁白雲者爲三元君三素飛雲也乗八輿之輪上詣天帝是太素三元君女眞也天帝是天帝玉清君天子􅀱見再拜自陳某乙乞得侍給輪轂以意云云􅀂雖不見與服之形亦冝拜乞之他放此三過見元君之輦者白日昇天按舉塲常試立春日望三素雲詩取此事眞誥曰立春日勿行威刑八節同此論衡曰立春爲土象人男女各}
  - {type: page-break, offset: 3125, content: '', id: KR3k0012_SBCK_020-6a}
  - {type: variant, offset: 3125, length: 69, content: 二月節桃始花時訓云桃若不花是謂否塞又云倉庫災鶬鶊鳴時訓云若不鳴即下不從上鷹化為鳩時訓云若不化即寇賊數起春分二月中玄鳥至時訓云玄鳥不至即婦人, WYG: 蟲}
  - {type: variant, offset: 3125, length: 1, content: 二, krp: 蟲不震隂氣姧陽魚不上氷甲胄私藏雨水之日獺不祭魚國多盗賊鴻鴈不來逺人不服草木不萌動果瓜不熟國語曰農祥晨正唐固注曰農祥房星也晨正謂晨見南方謂立春之日齊人}
