  - {type: variant, offset: 2563, length: 214, content: 月玄鳥至之日以太牢祠于高禖蔡邕曰高禖神名也又曰仲春之月先雷三日奮鐸以令于兆民曰雷且發聲有不戒其容止者生子不備必有凶災不戒容止謂以雷霆合房室之者生子必有瘖躄癡狂之疾矣耕者少舍皆耕在野少有舍於都邑者也晏子春秋曰齊景公夏遊獵又起大臺之役晏子諫曰春夏起役游獵奪民農時國家空虛不可景公曰吾聞相賢者國治臣忠者主逸吾年無幾矣言將老欲遂吾所樂卒即律反吾所好子其息矣晏子曰文王不敢盤于游田故國昌而民安楚靈不廢乾谿之役起章華之臺而民叛之今君不思將危, SBCK: 嘉}
  - {type: variant, offset: 2563, length: 324, content: 月玄鳥至之日以太牢祠于高禖蔡邕曰高禖神名也又曰仲春之月先雷三日奮鐸以令于兆民曰雷且發聲有不戒其容止者生子不備必有凶災不戒容止謂以雷霆合房室之者生子必有瘖躄癡狂之疾矣耕者少舍皆耕在野少有舍於都邑者也晏子春秋曰齊景公夏遊獵又起大臺之役晏子諫曰春夏起役游獵奪民農時國家空虛不可景公曰吾聞相賢者國治臣忠者主逸吾年無幾矣言將老欲遂吾所樂卒即律反吾所好子其息矣晏子曰文王不敢盤于游田故國昌而民安楚靈不廢乾谿之役起章華之臺而民叛之今君不思將危社稷而為諸侯笑臣聞忠不避死諫不違罪君不聽臣臣將逝矣景公曰唯唯唯唯從其諫也楊子法言曰或曰為政先殺后教歟曰於乎天先秋而後春乎將先春而後秋乎梁元帝纂要曰春亦曰發生芳春青春陽春三春九春風曰陽風暄風柔風惠風景曰媚景和景韶景時曰良時, WYG: ''}
