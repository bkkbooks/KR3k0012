  - {type: variant, offset: 58, length: 2, content: 為端, SBCK: 亥地破日不可開山動土虞丗南史略曰北齊盧士􅀷妻崔林義之女有才學春日以桃花靧兒面靧荒内切洗靣也呪曰取紅花取白雪與兒洗靣作光恱取白雪取紅花與兒洗靣作光澤取雪白取花紅與兒洗靣作華容楚辭曰獻嵗發春􅀆洎吾南征又曰目極千里􅀆傷春又曰開春發嵗􅀆承陽施惠養百姓􅀆又曰王孫遊􅀆不歸春草生􅀆萋萋又曰青春受謝謝去也白日昭昭者明也崔駰臨洛觀春賦曰迎夏之首桃之夭夭楊柳依依張衡歸田賦曰仲春令}
