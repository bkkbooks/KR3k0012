  - {type: variant, offset: 500, length: 1762, content: 月養穀復其夫勿筭一歲著以為令又詔三公曰方春生養萬物莩甲宜助萌牙以育時物其令有司罪非殊死且勿案驗又丙午詔曰畿內七十已上暮春赴京師將行養老之禮又曰王莽下書曰夫三皇象春五帝象夏三王象秋五伯象冬皇王德運也伯者繼空續乏以成曆數故其道駮謝承後漢書曰鄭弘為臨淮太守春行有兩白鹿隨車夾轂而行弘後為太尉續漢書曰太守常以春行縣所至縣勸人農桑振救乏絕第五倫為太守因春行見鄭弘奇之署督郵鄭弘時為鄒嗇夫又律曆志曰日行東陸謂之春魏略曰孟康為弘農守清平領群吏二百餘人涉春遣休常四分遣一分無宿諾晉書曰郭黁奴郎反西平人也少明於易仕郡主簿張天錫末年苻氏每有西伐之問太守趙凝使黁筮之黁曰若郡內二月十五日失囚者東軍當至涼祚必終凝乃申條屬縣至十五日鮮卑折握送馬於凝凝怒其非駿幽之廄內鮮卑懼而夜遁凝以告黁黁曰是也國家將亡弗可復振春秋繁露曰春喜氣故生又曰春之猶言偆偆者音蠢又癡准反喜樂之貌也春秋元命包曰春者神明推移精華結紐神明猶陰陽也相推使物精華結成紐結要也又曰春含名出位東方動春明達春之言蠢東之言動合此名以自明自達也六合俱生萬物應節雖於時為春以其蠢動無節應此時節也五行並起各以名利自六合俱生以通五行各有陰陽交合故能然也其精青龍龍之言萌也獸之妙莫若龍故就青萌以名之陰中之陽也老子曰眾人熙熙若享太牢如登春臺莊子曰夫春氣發而百草生正得秋而萬寶成夫春與秋豈無得而然哉天道已行矣春秋主生成皆得自然之道故不為又曰春夏先秋冬後四時之序也萬物化則萌區有壯盛衰之殺變化之流也又曰舜以天下讓善卷善卷曰子立於宇宙之中冬日衣皮毛夏日衣葛絺春耕夏種形足以勞動秋收冬歛身足以休食日出而作日入而息逍遙於天地之間而心意自得吾何以天下為哉文子曰政失於春歲星盈縮不居其常春政不失禾黍滋又曰因春而生因秋而殺所生不德所殺不怨則幾於道矣尸子曰翔風瑞風也一名景風一名惠風春為發生夏為長蠃秋為收成冬為安寧爾雅以為四時之別名也又曰春為忠也東方為春春動也是故鳥獸孕榮華生萬物遂忠之志也鶡冠子曰斗柄指東天下皆春列子曰荊之南有冥靈者五百歲為春五百歲為秋上古有大椿者以八千歲為春八千歲為秋管子曰孟春之朝君自聽朝論爵賞管子曰鄰人謂展禽曰魯聘夫子夫子三黜無憂色何展禽曰春風鼓百草敷蔚吾不知其茂秋霜降百草零落吾不知其枯茂非四時之悲欣榮辱非吾心之憂喜淮南子曰何謂五星東方木也其帝太昊太昊庖犧氏天下號也死託於東方帝也其佐勾芒執規而治春漢書魏相上書太昊乘震執規治春又曰日陽之主也是故春則群獸除除冬毛微墮也又曰太陰治春則欲行柔惠溫涼木德人也故柔涼也又曰春為規規之為度也轉而不復圓而不規復遏也垸轉也復而不縱廣大以寬感動有理發通有紀優優簡簡百怨不起優優簡簡寬舒之貌也規度不失生氣乃理氣類理達又曰六合孟春與孟秋合孟春始盈孟秋始縮盈長也縮短也故正月失政七月涼風不至又曰仲春始出仲秋始內出二月播種內八月始收歛又曰春肅秋榮冬雷夏霜皆賊氣之所生又曰四時者春生夏長秋收冬藏取與有節出入有時開闔張歙不失其序歙讀曰翕又曰春女悲秋士哀知物化矣周禮仲春之月令媒氏會男女女當外成於夫家骨肉相離故女悲秋金氣用事戰士執兵勝敗若化故士哀也又曰孟春之月東宮御女青色衣青采鼓琴瑟春王東方故處東宮也琴瑟木也春木生故鼓其兵矛有鋒銳以萬物鉆地如生也其畜羊羊木土之母故畜之也二月官倉其樹杏二月播種故官倉也杏有核在中象陰在內陽在外也故其樹杏也三月官鄉其樹李三月折民戶口故言鄉也李亦有核說與杏同又曰季春三月豐隆乃出將其雨也豐隆雷也至秋三月地氣不藏乃收其殺百蟲蟄伏靜居閉戶殺氣安靜青女乃出以降霜雪青女天神青天王女主霜雪也十二時之氣以至于仲春二月之夕乃布收其藏而閉其寒收歛其所藏而出布之閉其陰塞全不得發泄也女夷鼓歌以司天和以長百穀禽獸草木女夷主春夏養長之中也蔡邕月令章句曰季春戴鵀降於桑又曰仲春之月天子獻羔開冰又曰仲春玄鳥至玄鳥鷰也崔寔四人月令曰二月祠太社之日薦韭卯于祖禰五行志曰於易震在東方為春為木者也兌在西方為秋為金離在南方為夏為火坎在北方為冬為水春與秋日夜分寒暑平是以金木之氣易以相變故貌傷則致秋陰常雨言傷則致春陽常旱也至於冬夏日夜相反謂夏日長夜短冬日短夜長寒暑殊絕水火之氣不得相併故視傷常燠聽傷常寒者其氣然也又曰夾鍾言陰夾助太蔟宣四方之氣而出鍾物也位於卯在二月東陽記曰山南有春草巖出龍鬚多藥物西京雜記曰賈佩蘭云在宮時正月上辰出池邊盥濯食蓬餌以去祅邪荊州記曰陸凱與路曄為友在江南寄梅花, WYG: ''}
