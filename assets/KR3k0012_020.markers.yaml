  - {type: variant, offset: 1457, length: 541, content: 執規而治春漢書魏相上書太昊乘震執規治春又曰日陽之主也是故春則群獸除除冬毛微墮也又曰太陰治春則欲行柔惠溫涼木德人也故柔涼也又曰春為規規之為度也轉而不復圓而不規復遏也垸轉也復而不縱廣大以寬感動有理發通有紀優優簡簡百怨不起優優簡簡寬舒之貌也規度不失生氣乃理氣類理達又曰六合孟春與孟秋合孟春始盈孟秋始縮盈長也縮短也故正月失政七月涼風不至又曰仲春始出仲秋始內出二月播種內八月始收歛又曰春肅秋榮冬雷夏霜皆賊氣之所生又曰四時者春生夏長秋收冬藏取與有節出入有時開闔張歙不失其序歙讀曰翕又曰春女悲秋士哀知物化矣周禮仲春之月令媒氏會男女女當外成於夫家骨肉相離故女悲秋金氣用事戰士執兵勝敗若化故士哀也又曰孟春之月東宮御女青色衣青采鼓琴瑟春王東方故處東宮也琴瑟木也春木生故鼓其兵矛有鋒銳以萬物鉆地如生也其畜羊羊木土之母故畜之也二月官倉其樹杏二月播種故官倉也杏有核在中象陰在內陽在外也故其樹杏也三月官鄉其樹李三月折民戶口故言鄉也李亦有核說與杏同又曰季春三月豐隆乃出將其雨也豐隆雷也至秋三月地氣不藏乃收其殺百蟲蟄伏靜居閉戶殺氣安靜青女乃出以降霜雪青女天神青天王女主霜雪也十二時之氣以至于仲春二月之夕乃布收其藏而閉其寒收歛其所藏而出布之閉其陰塞全不得發泄也女夷鼓歌以司天和以長百穀禽獸草木女夷主春夏養長之中也蔡邕, SBCK: ''}
