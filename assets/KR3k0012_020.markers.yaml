  - {type: variant, offset: 786, length: 648, content: 軍當至涼祚必終凝乃申條屬縣至十五日鮮卑折握送馬於凝凝怒其非駿幽之廄內鮮卑懼而夜遁凝以告黁黁曰是也國家將亡弗可復振春秋繁露曰春喜氣故生又曰春之猶言偆偆者音蠢又癡准反喜樂之貌也春秋元命包曰春者神明推移精華結紐神明猶陰陽也相推使物精華結成紐結要也又曰春含名出位東方動春明達春之言蠢東之言動合此名以自明自達也六合俱生萬物應節雖於時為春以其蠢動無節應此時節也五行並起各以名利自六合俱生以通五行各有陰陽交合故能然也其精青龍龍之言萌也獸之妙莫若龍故就青萌以名之陰中之陽也老子曰眾人熙熙若享太牢如登春臺莊子曰夫春氣發而百草生正得秋而萬寶成夫春與秋豈無得而然哉天道已行矣春秋主生成皆得自然之道故不為又曰春夏先秋冬後四時之序也萬物化則萌區有壯盛衰之殺變化之流也又曰舜以天下讓善卷善卷曰子立於宇宙之中冬日衣皮毛夏日衣葛絺春耕夏種形足以勞動秋收冬歛身足以休食日出而作日入而息逍遙於天地之間而心意自得吾何以天下為哉文子曰政失於春歲星盈縮不居其常春政不失禾黍滋又曰因春而生因秋而殺所生不德所殺不怨則幾於道矣尸子曰翔風瑞風也一名景風一名惠風春為發生夏為長蠃秋為收成冬為安寧爾雅以為四時之別名也又曰春為忠也東方為春春動也是故鳥獸孕榮華生萬物遂忠之志也鶡冠子曰斗柄指東天下皆春列子曰荊之南有冥靈者五百歲為春五百歲為秋上古有大椿者以八千歲為春八千歲為秋管子曰孟春之朝君自聽朝論爵賞管子曰鄰人謂展禽曰魯聘夫子夫子三黜無憂色何展禽曰春風鼓百草敷蔚吾不知其茂秋霜降百草零落吾不知其枯茂非四時之悲欣榮辱非吾心之憂喜淮南子曰何謂五星東方木也其, SBCK: ''}
