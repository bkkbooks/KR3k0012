  - {type: variant, offset: 5758, length: 277, content: 崔光安豐王延明等議定服章三年春正月辛亥帝耕籍田十有一月車駕有事圓丘詔曰治曆明時前王茂軌孝成正律弈代通規去神龜中始命儒官改度易憲如會旋衡今天正斯始陽煦將開品物初萌宜變耳目所謂魏雖舊邦其曆惟新者也便可班宣內外號曰正光曆思與億兆共此惟新可大赦天下十二月以牧守妄立碑頌輒興寺塔第宅豐侈店肆商販詔中尉端衡肅厲威風以見事糺劾七品六品祿足代耕亦不聽錮店占肆爭利城市也四年春二月蠕蠕主阿𨚗瓌環帥眾犯塞遣尚書左丞元孚兼尚書為北道行臺持節喻之四月阿𨚗瓌執元孚驅掠畜牧北遁詔驃騎大將軍尚書令李崇中軍將軍兼尚書右僕射元纂帥騎十萬討蠕蠕出塞三千餘里不及而還五年秦州城人莫折大提據城, SBCK: 侯景}
