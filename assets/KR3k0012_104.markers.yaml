  - {type: variant, offset: 3200, length: 413, content: 年春正月立皇子恪為皇太子夏四月行幸長安遣使者以太牢祭周文王於豐祭武王於鎬六月車駕至自長安帝親為群臣講喪服於清徽堂八月車駕南討九月車駕至新野冬十月四面進攻不剋詔左右軍築長圍以守之二十有二年春正月拔新野三月大破蕭鸞平北將軍崔惠景黃門郎蕭衍軍於鄧城斬獲首虜二萬有餘秋七月詔曰朕以寡德屬茲喪亂實賴群英凱清南夏宜約躬賞效以勸茂績后之私府便可損半六宮嬪御五服男女恒恤恒供亦令減半在我之親三分省一是月蕭鸞死子寶卷僣立九月當以蕭鸞死禮不伐喪乃詔反斾二十有三年春正月朝群臣於鄴宮三月車駕南伐帝不豫司徒彭城王勰音協侍疾禁中攝百揆車駕至馬圈賊將蔡道福成公期率萬人棄順陽遁走帝疾甚車駕北次穀塘原詔司徒勰徵太子於魯陽踐祚夏四月帝崩於穀塘原之行宮在位二十九年時年三十三祕諱至魯陽發喪還京師上謚曰孝文皇帝廟曰高祖葬長陵帝幼有至性寡欲寬慈每垂矜捨進食者曾以熱羹傷帝手曾又於食中得蟲穢之物笑而恕之宦者譖帝於太后太后大怒杖帝數十帝默而不自明太后崩後亦不以介意聽覽, SBCK: 靣敷}
  - {type: variant, offset: 3200, length: 413, content: 年春正月立皇子恪為皇太子夏四月行幸長安遣使者以太牢祭周文王於豐祭武王於鎬六月車駕至自長安帝親為群臣講喪服於清徽堂八月車駕南討九月車駕至新野冬十月四面進攻不剋詔左右軍築長圍以守之二十有二年春正月拔新野三月大破蕭鸞平北將軍崔惠景黃門郎蕭衍軍於鄧城斬獲首虜二萬有餘秋七月詔曰朕以寡德屬茲喪亂實賴群英凱清南夏宜約躬賞效以勸茂績后之私府便可損半六宮嬪御五服男女恒恤恒供亦令減半在我之親三分省一是月蕭鸞死子寶卷僣立九月當以蕭鸞死禮不伐喪乃詔反斾二十有三年春正月朝群臣於鄴宮三月車駕南伐帝不豫司徒彭城王勰音協侍疾禁中攝百揆車駕至馬圈賊將蔡道福成公期率萬人棄順陽遁走帝疾甚車駕北次穀塘原詔司徒勰徵太子於魯陽踐祚夏四月帝崩於穀塘原之行宮在位二十九年時年三十三祕諱至魯陽發喪還京師上謚曰孝文皇帝廟曰高祖葬長陵帝幼有至性寡欲寬慈每垂矜捨進食者曾以熱羹傷帝手曾又於食中得蟲穢之物笑而恕之宦者譖帝於太后太后大怒杖帝數十帝默而不自明太后崩後亦不以介意聽覽, krp: 靣敷}
