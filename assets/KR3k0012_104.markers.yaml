  - {type: variant, offset: 28, length: 0, content: '', SBCK: 正寺及宣武崩乃得雪正光中拜直閣將軍時胡太后嬖寵帝與明帝謀誅之事泄免官武㤗中封劭縣侯永安三年進封南陽王孝武即位拜太尉加侍中永熈二年進位太保開府尚書令三年孝武與髙歡構難以帝中軍四面大都督及從入􅀜拜太􅌠録尚書事孝武崩丞相略陽公宇}
