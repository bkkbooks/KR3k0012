  - {type: variant, offset: 1191, length: 624, content: 定州上言為粥飢民所活九十四萬七千餘口八月詔曰帝業至重非廣詢無以至治今制百辟卿士工商吏民各上便宜利民益治損化傷政直言極諫勿有所隱務令辭無煩華理從簡實朕將親覽以知世要使言之者無罪聞之者足以戒九年春正月詔曰圖讖之興起於三季既非經國之典徒為妖邪所憑自今圖讖祕諱及名為孔子閉房記者一切皆焚之留者以大辟論又諸巫覡假稱神鬼妄說吉凶及委巷諸卜非墳典所載者嚴加禁斷大饗群臣干大華殿班賜皇誥十年春正月帝始服袞冕饗方國二月初立黨里鄰三長定民戶籍夏四月始制五等公服帝服以法服御輦祀於西郊八月給尚書五等品爵已上朱衣玉佩大小組綬九月詔起明堂辟雍冬十月有司議依故事配始祖於南郊十有一年春正月詔定樂章非雅者除之十有一月詔罷尚方錦繡綾羅之工四民欲造任之無禁其御府衣服金銀珠玉綾羅紬錦太官雜器太僕乘具內庫弓矢出其太半班齎百官及京師民庶下至工商皂隸逮於六鎮戍士各有差十二月詔祕書丞李彪著作郎崔光改析國記依紀傳之體十有二年春正月初建五牛旌旗五月詔雲中河西及關內六郡各脩水田通渠溉灌增置彝器於太廟九月起宣文堂經武殿十三年春正月車駕有事於圓丘於是初備大駕七月幸靈泉池與群臣御龍舟賦詩而罷立孔子廟於京師十有四年八月詔議國之行次九月皇太后馮氏崩冬十月葬文明太后於永固陵車駕謁永固陵群臣固請公除帝不許帝居廬引見群寮於大和殿東陽王丕等據權制固請帝引古禮往復群臣乃止十五年春正月帝始聽政於皇信東室初分置左右史官夏四月帝始進蔬食自正月不雨至于六月有司奏祈詔百神曰昔成湯遇旱齊景逢災並不由祈山川而致雨皆至誠, SBCK: ''}
