  - {type: variant, offset: 1816, length: 358, content: 中澍潤千里萬方有罪在予一人今普天喪恃幽顯同哀神若有靈猶應未息安饗何宜四氣未周便行祀事當考躬責已以待天譴五月議改律令上於東明觀析疑獄八月議養老又議肆類上帝禋于六宗之禮帝親臨決詔郡國有時物可以薦宗廟者貢之移道壇於桑乾之陰改曰崇靈寺詔諸州舉秀才先盡才學定親祫禘之禮議律令十有一月詔二千石考在上者假四品將軍賜乘黃馬一疋上中者五品將軍上下者賜衣一襲十有二月帝為高麗王璉舉哀於城東行宮車駕迎春於東郊十有六年春正月饗群臣於太華殿帝始為王公興懸而不樂宗祀顯祖獻文皇帝於明堂以配上帝遂昇靈臺以觀雲物詔定行次以水承金制諸遠屬非太祖子孫及異姓為王者皆降為公公為侯侯為伯伯為子子為男二月詔祀唐堯於平陽祀虞舜於廣甯夏禹於安邑周文王於洛陽改謚宣尼曰文聖尼父謚孔廟夏四月頒新律令大赦天下八月司徒尉元以老遜位以尉元為三老游明根為五更又養國老庶老詔曰, SBCK: ''}
