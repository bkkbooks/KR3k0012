  - {type: variant, offset: 96, length: 0, content: '', WYG: 改元十一月魏師滅梁戕士良切梁元帝梁之諸臣復立泰元帝子方知為皇帝都于建業三年春正月丁丑初行周禮建六官以安定公宇文泰為太師冢宰以柱國李弼為大司徒以趙貴為太保兼宗伯以尚書令獨孤信為大司馬以于謹為大司㓂以侯莫陳崇為大司空冬十月乙亥安定公宇文泰薨十二月庚子帝遜位於周周閔帝元年正月東魏封帝為宋公尋殂東魏孝静皇帝後魏書曰孝静皇帝諱善見清河文宣王亶之世子也母曰胡妃永熙二年拜通直㪚騎常侍秋八月為驃騎大將軍開府儀同三司孝武帝既入闗渤海王髙歡奉迎不克乃與百僚會議推帝以奉肅宗之後時年十一冬十月即位大赦天下改永熙三年為天平元年有事於太廟下詔曰安土能遷自古之明典所居靡定徃昔之成規是以殷遷八城周卜三地吉㓙有數隆替無常事由於通變理出於不得已故也髙祖孝文皇帝仰觀乾象俯恊人謀發自武州來幸嵩縣魏雖舊邦其命維新及正光之季國步孔棘喪亂不已冦賊相侵禆我生民無所措手今逺遵古式深騐時事考龜襲吉遷宅漳滏庶克隆洪基再昌寳厯主者明為條格及時發邁車駕北遷詔渤海王髙歡留後部分以衛軍大將軍尚書令元弼為驃騎大將軍儀同三司洛州刺史鎮洛陽十一月車駕至鄴是冬蕭衍以元慶和為鎮北將軍魏王入據平瀨鄉孝武崩於長安二年春正月渤海王髙歡襲擊山胡劉彛升大破之詔以髙歡為相國假黄鉞劍履上殿入朝不趨王固讓不受三月髙歡討劉彛升斬之彛升子髙海王復僣帝號歡進擊破擒之及其弟西海王皇后夫人王公以下四百餘人幷獲逋逃之民二萬餘户八月發衆七萬六千人營新宫十二月車駕待於鄴是嵗西魏文帝大統元年三年春正月詔加渤海王世子澄使持節尚書令大行臺大都督秋七月大赦天下四年夏四月遷七帝神主入新廟大赦天下通使蕭衍冬十一月西魏遣其大行臺元帥李海大都督獨孤信願逼洛州行軍事廣陽王湛棄城退還李海信願遂據金墉潁川長史賀若徽執刺史田迅西叛引西魏都督梁迴據城西魏又遣其都督趙繼宗右丞韋孝寛等攻䧟豫州元象元年春正月有巨象至自碭郡陵中南兖州獲送于鄴大赦改年大都督賀拔仁攻西魏南汾州拔之率豫州刺史堯雄等與大行臺侯景司徒髙敖曹大都督万俟受洛于等於北豫相㑹俱討潁州梁迴等棄城遁走潁州平秋七月行臺侯景司徒髙敖曹圍西魏將獨孤信願於金墉城八月大敗西魏於河隂司徒髙敖曹儀同三司大都督李猛宗顯並戰没西魏留其長孫子彥守金墉渤海王髙歡濟河子彥棄城走興和元年五月納皇后髙氏}
