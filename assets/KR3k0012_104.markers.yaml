  - {type: variant, offset: 11, length: 0, content: '', WYG: 武王髙歡與百僚㑹議僉謂髙祖不可無後乃共奉王戊子即位於東郭之外入自陽雲龍門御太極前殿羣臣朝賀禮畢升閶闔門大赦天下改中興三年為大昌元年帝以世易復除齊獻武王為大丞相大將軍大將軍還鄴車駕餞别於乾脯山殺大司馬汝南王悅大赦天下改大昌為永興以同太宗時號尋改為永熙二年春正月車駕幸崧髙石窟靈岩寺十二月車駕狩於嵩陽遂幸温湯車駕還宫三年春二月壬子大赦壬午封左衛將軍元斌之為頴昌王夏四月癸丑日有蝕之五月丙戌置勲府庶子廂别六百人騎官廂别二百人閤内部曲數千人帝内圖髙歡乃以斛斯椿為領君使與王思政等統之以為心膂軍謀朝政咸决于椿分置督將及河南闗西諸刺史辛夘下詔戒嚴揚聲伐梁實謀北討七月己丑帝總六軍率南陽王寶炬清河王亶廣陽王湛斛斯椿以五千騎宿於瀍西楊王别舍沙門都維那惠臻負璽持千牛刀以從有牛百頭盡殺以食軍士衆知帝將出其夜亡者過半清河廣陽二王亦逃歸略陽公宇文泰遣都督駱超李賢和各領數萬騎赴超先至甲戌賢和㑹帝於崤中己酉髙歡入洛遣婁昭及河南尹元子思領左右侍官追帝請廻駕髙昻率勁卒及帝於陜西帝揚鞭長騖至湖城飢渇甚有王思村人以麥飯壺漿獻帝帝甘之復一村十年帝至椆桑潼闗大都督毛洪賓迎獻食八月宇文泰遣大都督趙貴梁禦甲騎二千來赴乃奉迎帝過河謂禦曰此水東流而朕西上若得重謁洛陽廟是卿等功也帝及左右皆流涕宇文泰迎帝於東陽帝勞之將士皆呼萬嵗遂入長安以雍州公廨為宫大赦甲寅髙歡推司徒清河王亶為大司馬承制總萬機居尚書省歡追車駕至潼闗九月己酉歡東還洛陽帝親督衆攻潼闗斬其行臺華長瑜冬十月髙歡推清河王亶子善見為主徙都鄴是為東魏魏於此始分焉二十二日帝崩時年二十五諡曰孝武塟雲陵}
