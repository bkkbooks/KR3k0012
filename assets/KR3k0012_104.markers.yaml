  - {type: variant, offset: 5987, length: 766, content: 將軍尚書令李崇中軍將軍兼尚書右僕射元纂帥騎十萬討蠕蠕出塞三千餘里不及而還五年秦州城人莫折大提據城反自稱秦王殺刺史李彥詔雍州刺史元志討之南秦州城人孫獠張絞切長命韓祖香據城反殺刺史崔遊以應大提遣城人卜胡襲剋高平殺鎮將赫連略行臺高元榮大提尋死子念生代立僣稱天子年號天建置立百官孝昌元年春正月徐州刺史元法僧據城反害行臺高諒自稱宋王年號天啟遣其子景仲歸於蕭衍遣其將朝龍牙成景俊元略等帥眾赴彭城詔祕書監安樂王鑒廻師以討之鑒於彭城南擊元略大破之盡俘其眾既而不備為元法僧所敗衍遣子豫章王綜入守彭城法僧擁其寮屬守令兵武及郭邑士女萬餘口南入夏四月辛卯皇太后復臨朝攝政引群臣面陳得失詔曰神龜之末權臣擅命元乂劉騰陰相影響遂使皇太后幽隔後宮為有無君之心積習不臣之跡緣事彌彰蔽耳目之明專生殺之柄天下為之不康四郊由茲多壘此而可忍孰不可懷騰身既往可追削爵乂之罪狀誠合徽纆但以宗枝舅戚特全弘貸之法可除名為民秋八月詔斷遠近貢獻珍麗違者免官九月詔減天下租調之半十二月山胡劉蠡升反自稱天子置官寮二年春正月五原降戶鮮于脩禮反於定州號魯興元年二月皇太后臨大夏門親覽冤訟六月詔曰自運屬寇難歷載於茲烽驛交馳征鼓不息朕威德不能遐被經略無以及遠俾是蒼生罹此荼炭何以茍安黃屋無愧黔黎今便避居正殿蔬飡素服當親自招慕收集忠勇有直言正諫之士敢決徇義之夫二十五日悉集華林東門人別引見共論得失班告內外咸使聞知八月賊元洪業斬鮮于脩禮請降為賊黨葛榮所殺都督爾未榮於肆州執刺史尉慶賓令其從叔羽生統州事九月葛榮敗都廣陽王淵章武王融於愽野白牛邏去聲融歿於陣榮自稱天子號曰齊國年稱廣安冬十一月杜洛周攻陷幽州執刺史王延年及行臺常景丙午稅京師田租畝五升借賃公田者畝一升閏月稅市人入者各一錢居店舍為五等三年春正月葛榮陷殷州刺史崔楷固執節死之三月詔金紫光祿大夫源子邕為大都督討葛榮冬十月以衛將軍討虜大都督爾朱榮為車騎, WYG: ''}
