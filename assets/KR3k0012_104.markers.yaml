  - {type: variant, offset: 96, length: 0, content: '', SBCK: 二年秋八月大將軍尉遟逈尅成都剱南平冬十一月安定公宇文㤗殺尚書元烈三年正月安定公宇文㤗廢而立齊王廓帝自元烈之誅有怨言淮安王育廣平王賛等並垂泣諌帝不聽故及於辱恭皇帝後魏書曰恭皇帝諱廓文帝之第四子也大統十四年封爲齊王廢帝三年正月即皇帝位改元十一月師㓕梁戕土良切梁元帝梁太尉王僧辨奉元帝子方智爲王承制居建業三年春正月丁􅐫􅀄行周禮建六官以安定公宇文㤗爲太師􅃁􅌠以柱國李弼爲大司徒以趙貴爲太保大宗伯以尚書令獨狐信爲大司馬以于謹爲大司宼以侯莫陳榮爲司空冬十月乙亥安定公宇文㤗薨十二月庚子帝遜位於周閔帝元年正月東魏封帝爲宋公㝷殂東魏孝静皇帝後魏書曰孝静皇帝諱善見清河文宣王亶之丗子也母曰胡妃永熙二年拜通直散􅀐侍郎秋八月爲驃􅀐大將軍開府儀同三司孝武旣入􅀜渤海王髙歡奉迎不克乃與百僚㑹議推帝以奉肅宗之後時年十一月冬十月即位大赦天下改永熈三年爲天平元年有事於太廟詔曰安安能遷自古之明典所居靡定徃昔之成䂓是以殷遷八城周卜三地􅁻凶有數隆替無􅁪事由於通變理出於不得巳故也髙祖孝文皇帝式觀乾象俯恊人誅發自武州來幸嵩縣魏雖舊國其命惟新及正光之季國歩孔􅁄喪亂不巳宼賊相侵俾我生民無所措手今逺遵古式深驗時事考􅀛襲􅁻遷澤漳􅇭庶克隆洪基再昌寳暦主者明爲條格及時發邁車駕北遷詔渤海三髙歡留後部分以衛軍大將軍尚書令元弼爲驃騎大將軍儀同三司洛州刺史鎮洛陽十一月車駕幸鄴是冬蕭衍以元慶和爲鎮北將軍魏王入據平瀬郷孝武崩於長安二年春正月渤海王髙歡襲擊山胡劉蠡升大破之詔以髙歡爲相國假黄􅃏劒履上殿入朝不趨王固讓不受三月髙歡討劉蠡升斬之蠡升子南海王復僣帝號髙歡進擊破擒之及其第西海王皇后夫人王公巳下四百餘人并獲逋逃之民二萬餘户八月發七萬六千人營新宫十二月車駕狩於鄴是􅀊西魏文帝大統元年三月春正月詔加渤海王高歡九􅃬之禮遣侍中元子思敦喻固讓乃止二月詔加渤海王丗子澄使持節尚書令大行臺大都督秋七月大赦天下四年夏四月遷七帝神主入新廟大赦天下先是蕭衍因益州刺史傅和請好遣李諧等使於蕭衍冬十月西魏遣其大行臺元季海大都督獨􅀌如願逼洛州行軍事廣陽王湛弃城退還季海如願遂據金墉頴川長史賀􅀂徽執刺史田迅西叛引西魏都督梁廽據城西魏又遣其都督趙繼宗右丞韋孝寛等攻䧟豫州大象元年春正月巨象至自碭郡陂中南兖州􅀗送大赦改年大都督賀抜仁攻西魏南汾州拔之率豫州刺史堯雄等與大行臺侯景司徒髙敖曹大都督万俟受洛于等於北豫相㑹俱討頴州梁廻等棄城遁走頴川平秋七月行臺侯景司徒髙敖曹圍西魏將獨􅀌如願於金墉城八月大敗西魏於河隂司徒髙敖曹儀同三司大都督李猛宗顯並戰殁西魏留其長孫子彦守金墉渤海王髙歡濟河子彦棄城走興和元年五月立皇后髙氏}
