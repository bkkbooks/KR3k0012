  - {type: variant, offset: 29, length: 1, content: 成, SBCK: 㤗率群公卿士奉表勸進三讓乃許焉大統元年春三月戊申帝即位於城西大赦改元追尊皇考爲文景皇妣楊氏爲后己酉進丞相略陽公宇文㤗都督中外諸軍録尚書事大行臺改封安定郡公以尚書令斛斯椿爲太保廣平王賛爲司徒乙夘立妃乙氏爲皇后二年春正月辛亥祀南郊改以神元皇帝配東魏攻陷夏州三年冬十月安定公宇文㤗大破東魏軍於沙􅁐拜㤗柱國大將軍四年春正月辛酉拜天於清暉室終帝丗遂爲常二月東魏攻䧟南汾頴豫廣四州廢皇后乙氏三月立蠕蠕而蠢切女都九閭氏爲皇后大赦秋七月東魏將侯景等圍洛陽帝與安定公宇文㤗東伐九月車駕至東伐五年冬十月於陽武門外懸鼔置􅁓筆以求得失六年春正月庚戌朝群臣自西遷至此禮樂始備七年十二月御憑雲觀引見諸王叙家人之禮手詔爲宗誡十條以賜之八年春正月􅀄置六軍十六年五月東魏静帝遜位於齊秋七月安定公宇文㤗東伐至􅁪農齊師不出乃還九月大赦十七年春正月庚戍帝崩于乾安殿時年四十五葬於永陵謚曰文皇帝廢帝後魏書曰廢帝名欽文}
  - {type: page-break, offset: 29, content: '', id: KR3k0012_SBCK_104-8a}
  - {type: variant, offset: 29, length: 1, content: 成, WYG: 泰率羣公卿士奉表勸進三讓乃許焉大統元年春三月戊申帝即位於西城大赦改元追尊皇考為皇帝皇妣楊氏為后己酉進丞相洛陽公宇文泰都督中外諸軍錄尚書事大行臺改封安定郡公以尚書令斛思椿為太保廣平王賛為司徒乙夘立妃乙氏為皇后二年春正月辛亥祀南郊改以神元皇帝配東魏攻䧟夏州三年冬十月安定公宇文泰大破東魏軍於沙苑拜泰柱國大將軍四年春正月辛酉拜天於清輝室終帝世遂為常二月東魏攻䧟南汾頴豫廣四州廢皇后乙氏三月立蠕蠕而蠢切女郁九閭氏為皇后大赦秋七月東魏將侯景等圍洛陽帝與安定公宇文泰東伐九月帝至自東伐五年冬十月於陽武門懸鼓置紙筆以求得失六年春正月庚戌朝羣臣自西遷至此禮樂始備七年十二月御慿雲觀以見諸王叙家人之禮手詔為宗戒十條以賜之八年春三月初置六軍十六年五月東魏静帝遜位於齊秋七月安定公宇文泰東伐至恒農齊師不出乃還九月大赦十七年春正月庚戌帝崩於乾安殿年四十五塟於永陵諡曰文皇帝廢帝後魏書曰廢帝名欽文}
