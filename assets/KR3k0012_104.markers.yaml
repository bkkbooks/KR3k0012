  - {type: variant, offset: 3643, length: 204, content: 不以寒暑為倦雅好讀書手不釋卷五經之義覽之便講學不師授探其精奧史傳百家無不該涉善談莊老尤明釋義才藻富瞻好為文章詩賦銘頌有興而作有大文筆馬上口授及其成也不改一字自泰和十年已後詔冊皆常之文也自餘章百有餘篇愛奇好士情如飢渴待納朝賢隨才輕重常寄以布素之意悠然玄邁不以世務嬰心又少而善射有膂力年十餘歲能以指彈碎羊膊骨及射禽獸莫不隨志而斃之至年十五便不復殺生射獵之事悉止性儉素常服澣濯之衣鞍勒鐵木而已帝之雅志皆此類也世宗宣, SBCK: 理獄訟}
