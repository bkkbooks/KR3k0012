  - {type: variant, offset: 5231, length: 525, content: 王雍入居西柏堂決庶政又詔任城王澄為尚書令百官惣已以聽於二王二月尊皇后高氏為皇太后三月皇太后出俗為尼徙御金墉城八月尊皇太妃為皇太后帝朝皇太后於宣光殿大赦天下群臣奏請皇太后臨朝稱制九月皇太后親覽萬機熙平元年春正月大赦改年二年八月宴太祖已來宗室年十五已上於顯陽殿申家人之禮九月詔曰察訟理冤冤寶惟政首躬親聽覽民信所由自今月望當暫出城闉親決滯枉主者可宣諸近遠咸使聞知神龜元年二月詔以神龜表瑞大赦改年七月開恒州銀山之禁與人共之二年九月皇太后幸崧高山正光元年秋七月侍中元又劉騰奉帝幸前殿矯皇太后詔曰世祖宣武皇帝以叡明承業廓寧區夏而鴻功未半早年登遐乃車書弗同勍寇尚熾幼主稚弱夙纂寶曆曾定宗祏莫剋祗奉朕所以敬慎群請臨朝惣政僶俛從事以迄于茲自此春來先疹屢發夏首及今數加動劇恐不堪日釐萬務巨細兼省帝齒周星紀識學逾躋日就月將人君道茂足以撫緝萬邦諧決百揆朕當率前志敬遜別宮乃幽皇太后於北宮殺太傅領太尉清河王懌乂等總勒禁旅決事殿中帝加元服大赦改年九月蠕蠕而蠢切主阿那壞來奔以太師高陽王雍為丞相十月詔曰蠕蠕世雄朔方擅制漠表鄰通上國百有餘載宜且優以賓禮期之立功䟽爵胙土大啟河岳可封朔郡公蠕蠕王食邑一千戶錫以袞冕加之輕蓋祿秩儀衛同於戚藩二年三月駕幸國子學講孝經祠孔子以顏淵配十有二月詔, SBCK: ''}
