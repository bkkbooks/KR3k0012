  - {type: variant, offset: 873, length: 2400, content: 縣劫盜者兼治二縣即食其祿能靜二縣者兼治三縣三年遷為郡守二千石能靜二郡上至三郡亦如之三年遷為刺史三月詔諸倉屯穀夌充積者出賜貧民夏四月詔以孔子二十八世孫魯郡孔乘為崇聖大夫給以十戶供洒掃四年九月以留昱內相攻戰詔將軍元蘭將三萬騎及假東陽王丕為後繼伐蜀漢承明元年六月太上皇帝崩大赦改年尊皇太后為太皇太后臨朝稱制秋七月追尊皇妣李貴人為思皇太后太和元年七月劉昱死弟准僣立二年夏四月京師旱祈天文於北苑親自禮焉減膳避正殿澍雨大洽曲赦京師九月龜茲國遣使獻龍馬三年四月吐谷渾國遣獻貓牛五十頭是年島夷蕭道成廢其主劉准而僣立自號曰齊四年春罷畜鷹鷂之所以其地為報德佛寺五月詔會京師耆老賜錦綵衣服几杖稻米蜜麵復家人不傜役六年三月蕭道成死子賾僣立七年閏月皇子生大赦天下定州上言為粥飢民所活九十四萬七千餘口八月詔曰帝業至重非廣詢無以至治今制百辟卿士工商吏民各上便宜利民益治損化傷政直言極諫勿有所隱務令辭無煩華理從簡實朕將親覽以知世要使言之者無罪聞之者足以戒九年春正月詔曰圖讖之興起於三季既非經國之典徒為妖邪所憑自今圖讖祕諱及名為孔子閉房記者一切皆焚之留者以大辟論又諸巫覡假稱神鬼妄說吉凶及委巷諸卜非墳典所載者嚴加禁斷大饗群臣干大華殿班賜皇誥十年春正月帝始服袞冕饗方國二月初立黨里鄰三長定民戶籍夏四月始制五等公服帝服以法服御輦祀於西郊八月給尚書五等品爵已上朱衣玉佩大小組綬九月詔起明堂辟雍冬十月有司議依故事配始祖於南郊十有一年春正月詔定樂章非雅者除之十有一月詔罷尚方錦繡綾羅之工四民欲造任之無禁其御府衣服金銀珠玉綾羅紬錦太官雜器太僕乘具內庫弓矢出其太半班齎百官及京師民庶下至工商皂隸逮於六鎮戍士各有差十二月詔祕書丞李彪著作郎崔光改析國記依紀傳之體十有二年春正月初建五牛旌旗五月詔雲中河西及關內六郡各脩水田通渠溉灌增置彝器於太廟九月起宣文堂經武殿十三年春正月車駕有事於圓丘於是初備大駕七月幸靈泉池與群臣御龍舟賦詩而罷立孔子廟於京師十有四年八月詔議國之行次九月皇太后馮氏崩冬十月葬文明太后於永固陵車駕謁永固陵群臣固請公除帝不許帝居廬引見群寮於大和殿東陽王丕等據權制固請帝引古禮往復群臣乃止十五年春正月帝始聽政於皇信東室初分置左右史官夏四月帝始進蔬食自正月不雨至于六月有司奏祈詔百神曰昔成湯遇旱齊景逢災並不由祈山川而致雨皆至誠發中澍潤千里萬方有罪在予一人今普天喪恃幽顯同哀神若有靈猶應未息安饗何宜四氣未周便行祀事當考躬責已以待天譴五月議改律令上於東明觀析疑獄八月議養老又議肆類上帝禋于六宗之禮帝親臨決詔郡國有時物可以薦宗廟者貢之移道壇於桑乾之陰改曰崇靈寺詔諸州舉秀才先盡才學定親祫禘之禮議律令十有一月詔二千石考在上者假四品將軍賜乘黃馬一疋上中者五品將軍上下者賜衣一襲十有二月帝為高麗王璉舉哀於城東行宮車駕迎春於東郊十有六年春正月饗群臣於太華殿帝始為王公興懸而不樂宗祀顯祖獻文皇帝於明堂以配上帝遂昇靈臺以觀雲物詔定行次以水承金制諸遠屬非太祖子孫及異姓為王者皆降為公公為侯侯為伯伯為子子為男二月詔祀唐堯於平陽祀虞舜於廣甯夏禹於安邑周文王於洛陽改謚宣尼曰文聖尼父謚孔廟夏四月頒新律令大赦天下八月司徒尉元以老遜位以尉元為三老游明根為五更又養國老庶老詔曰夫文武之道自古並行威福之施必也相籍故三五至仁尚有征伐之事夏殷明叡未未舍兵甲之行今則訓文有典教國家雖崇文以懷九服修武以宁八荒然於習武之方猶未盡將於馬射之前先行講武之式可勑有司豫脩場埒其列陣之儀五戎之數別俟後勑冬十月太極殿成大饗群臣十有七年夏四月立皇后馮氏六月帝將南伐詔造河橋立皇子恂為皇太子秋七月以皇太子立詔賜民為父後者爵一級是月蕭頤死孫昭業僣立八月車駕發京師南伐步騎三十餘萬太尉丕奏請以宮人從詔曰臨戎不語內事宜停車駕至肆州幸并州親見高年問疾苦車駕所經傷民秋稼畝給穀五斛戊辰濟河語洛懷并肆所過四州賜高年爵百年以上假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級鰥寡孤獨不能自存者人粟五斛帛二疋幸洛陽周巡故宮基趾帝顧謂侍臣曰晉德不脩早傾宗祀荒毀至此用傷朕懷遂詠黍離之詩為之流涕觀河橋幸太學觀石經詔六軍發軫帝戎服執鞭御馬而出群臣稽顙於馬前請停南伐帝乃止仍定遷都之計冬十月幸金墉城詔徵司空穆亮與尚書李冲將作大匠董爵經始洛陽帝幸河南城幸豫州解嚴設壇於滑臺城東告行廟以遷都之意大赦天下還幸鄴十有八年春朝群臣於鄴宮車駕南巡幸洛陽西宮二月行幸河陽規建方澤之所車駕北巡至平城宮臨朝堂部分遷留三月罷西郊祭天帝臨太極殿喻在代群臣以遷移之略秋七月以宋玉劉昶為大將軍是月島夷蕭鸞殺其主蕭昭業立業弟昭文冬十月親告太廟奉遷神主車駕發平城宮次於中山之唐湖是月蕭鸞廢殺其主蕭昭文而僣立車駕幸鄴經比干墓傷其忠而獲戾親為吊文樹碑而刊之車駕至洛陽蕭鸞雍州刺史曹虎據襄陽降十有二月車駕至懸瓠詔壽陽鍾離馬頭之師所獲男女之口皆