  - {type: variant, offset: 3848, length: 410, content: 皇帝後魏書曰世宗宣武皇帝諱恪高祖孝文皇帝之弟二子也母曰高夫人初夢為日所逐避之床下日化為龍繞夫人數匝寤而驚悸既而有娠泰和七年閏四月生帝於平城宮二十一年正月立為皇太子二十三年夏四月即皇帝位于魯陽大赦天下帝居諒闇委政宰輔秋八月遵遺詔高祖二夫人以下悉歸家景明元年春正月車駕謁長陵大赦改年丁未蕭寶卷豫州刺史裴叔業以壽春內屬二年春正月帝始親政三月詔曰治尚簡靜任貴應事州府佐史除授稍多誠為損弊無益政道又京師百司寮局殷雜官有閑長者亦同此例茍非精要悉從蠲省是月蕭衍立寶卷第南康王寶融為主年號中興東赴建業九年發畿內夫五萬五千築京師三百二十三坊四旬而罷立皇后于氏十有一月築圓丘於伊水之陽仍有事焉是月寶卷直後張齊殺寶卷降蕭衍衍克建業三年三月寶卷第建安王寶寅來降是月蕭衍又廢其主寶融而僣立自稱曰梁九月車駕行幸鄴詔使者吊殷比干墓閱武於鄴南冬十月帝親射遠及一里五十步群臣勒銘於射所四年春正月車駕籍田於千畝三月皇后先蚕於北郊夏四月南天笁國獻辟支佛牙正始, SBCK: 定}
