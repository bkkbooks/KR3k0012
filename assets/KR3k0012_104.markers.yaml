  - {type: variant, offset: 8, length: 0, content: '', SBCK: 敬宗孝莊皇帝節閔皇帝廢帝安定王孝武皇帝文皇帝廢帝恭皇帝東魏孝静皇帝敬宗孝莊皇帝後魏書曰孝莊皇帝諱子攸彭城王勰音恊之第三子母曰李妃肅宗􅀄以勰有魯陽翼衛之功封帝武城縣開國公幼侍肅宗書於禁内及長風神秀慧姿兒甚美拜中書侍郎城門校尉兼給事黄門侍郎雅爲肅宗所親待長直禁中遷散􅀐常侍御史中尉孝昌二年八月進封長樂王轉侍中中軍將軍及武太元年春二月肅宗崩大都督爾朱榮將兵向京師謀欲廢立以帝家有忠勲且兼人望隂與帝通榮乃帥衆來赴夏四月帝與兄弟夜北渡河㑹榮於河陽南濟河即帝位以兄彭城王紹爲無上王弟霸成公子正爲始平王榮爲侍中都督中外諸軍事大將軍尚書令領軍將軍領左右衛封太原王百僚相率有司奉璽綬備法駕奉迎於河梁車駕廵河西至淘渚榮以兵權在巳遂有異志乃害靈太后及幼主次害無上王紹始平王子正公卿巳下二千餘人列􅀐衛帝迁於便幕車駕入宫御太極殿大赦天下改武太爲建義元年是月汝南王恱北海王顥臨淮王彧前後奔蕭衍郢州刺史元願逹據城叛五月加大將軍尓朱榮北道大行臺以尚書右僕射元榮爲東道大使征東將軍光禄勲元欣副之循方黜陟先行後聞大將軍尓朱榮還晉陽帝餞於邙隂六月通直散􅀐常侍髙乾邕及弟帥合流民起兵於齊州之太原頻破州軍詔東道大使元欣喻􅈲乃降是月葛榮飢使其僕射任襃帥車三萬餘乗南宼至沁水幽州平北府主簿河開邢果帥河北流民十餘萬户反於青州之北海自署濮王年號天統詔諸有司馬伏從戎者職人優兩大階詔當親御六戎掃清燕代大將軍太原王尓朱榮帥精銳十萬爲左軍上黨王天穆㹅衆八萬爲前軍司徒公楊椿勒兵十萬爲右軍司空公穆紹統卒八萬爲後軍是月葛榮衆退屯相州之北七月齊獻武王於鄴西北招慰葛榮別帥稱王者七人衆萬餘降之加大將軍尓朱榮柱國大將軍録尚書事光州人劉舉聚衆數千反於濮陽自稱皇武大將軍是月髙平鎮人万俟墨其二音醜奴僣大位署置百官八月葛榮帥衆圍相州九月詔太尉公上黨王天穆討􅁑榮次於朝歌以征東將軍齊州刺史元欣爲沛郡王柱國大將軍尓朱榮率􅀐七千討􅁑榮於􅇭口破擒之餘衆帥降兾定滄瀛殷五州平大赦天下巳改爲永安元年以柱國大將軍太原王尓朱榮爲大丞相都督河北畿外諸軍事冬十月蕭衍以北海王顥爲魏主年號孝基入據南兖之銍音質城二年夏四月上黨王天穆齊獻武王大破邢果於齊州之濟南果降送京師五月元顥尅梁國内外戒嚴癸酉元顥䧟滎陽甲戌夜車駕北廵幸河内景子元顥入洛戊寅太原王尓朱榮㑹車駕於長子即日反斾上黨王天穆北渡河㑹車駕於河内秋七月都督尓朱兆賀抜勝從硤石夜濟破顥子冠受及安豐王延明軍元顥敗走車駕入居華林園昇大夏門大赦天下宴勞天柱大將軍尓朱榮上黨王天穆及北平來督於都亭出宫人三百繒錦􅄂綵數萬疋班賜有差三年春三月雍州刺史尓朱天光討醜奴蕭寳寅於安定破擒之囚送京師六月嚈噠國獻師子九月天柱大將軍尓朱榮上黨王天穆自晉陽来朝帝殺榮及天穆於明光殿大赦天下遣武衛將軍奚毅前燕州刺史侯淵帥衆鎮北中是夜左僕射尓朱丗隆榮妻郷郡長公主帥榮部曲焚西陽門出屯河隂攻河橋擒毅等屠害之據北中城南逼京邑十月通直散􅀐常侍假平西將軍都督李苗以火舡焚河橋尓朱丗隆退走壬寅尓朱丗隆停建興之髙都尓朱兆自晉陽來㑹之共推太原太守行并州刺史長廣王曄爲主大赦所部號年建明十二月尓朱兆宼丹谷都督崔伯鳯戰殁都督羊文義史五龍降兆大都督源子恭奔退尓朱兆尓朱度律自富平津上率􅀐渉渡以襲京城事出倉卒禁衛不守帝歩出雲龍門兆逼帝幸永寕之佛寺殺皇子亂兵殺司徒公臨淮王彧僕射范陽王誨戊申元曄大赦天下尓朱度律自鎮京師尓朱兆遷帝於晉陽崩於城内三級佛寺時年二十四中興二年謚爲武懐皇帝太昌元年又謚孝莊皇帝廟號敬宗葬靜陵節閔皇帝後魏書曰節閔皇帝諱恭自脩業廣惠王之子也母曰王氏王少端謹有志度長而好學事祖母嫡母以孝聞正始中襲爵延昌中拜通直散􅀐常侍正光三年加散􅀐常侍領給事黄門侍郎以元乂擅權遂稱疾不起乆之因託瘖病五年就除金紫光禄大夫建義元年除儀同三司旣絶言垂將一紀居於龍華佛寺無所交通永安末有白莊帝者言王不語將有異圖民間遊聲又云有天子之氣王懼禍逃匿上洛㝷見追躡執送京師拘執多日以無狀獲免及莊帝崩尓朱丗隆等以元曄踈逺又非人望所推以王潜嘿晦身有過人量將謀廢立恐實不語乃令王所親申其意􅈲且兼迫䝱王遂荅曰天何言哉丗隆等大恱春三月曄迫至邙南丗隆等奉王東郭之外行禪讓之禮太尉公尓朱度律進璽綬衮冕之服及就輅車百官侍衛入自建春雲龍門昇太極殿前羣臣拜禮畢遂登閶闔門詔大赦天下以魏爲大魏改建明二年爲普㤗是月幽州刺史劉靈助起兵於薊撫軍將軍金紫光禄大夫兼侍中河北大使髙乾邕及弟平北將軍通直散􅀐常侍髙敖曹率衆夜襲兾州執刺史元嶷魚力切共推前河内太守封隆之行州事三月封長廣王爲東海王潁川王尓朱兆爲天柱將軍晉州刺史平陽郡開國公髙歡封勃海信都王夏四月詔有司不得復稱僞梁罷細作之條無禁鄰國還往髙歡以尓朱逆亂始興義兵於信都西定殷州斬其刺史尓朱羽生命南趙郡太守李元忠爲刺史鎮廣阿八月追尊皇考爲先帝皇妣爲先太妃封皇弟永業爲髙宻王皇子子恕爲青州渤海王旣而髙歡推立安定王爲帝於信都二年三月髙歡敗尓朱天光等於韓陵夏四月髙歡使魏蘭根慰喻洛邑且觀帝之爲人蘭根忌帝雅德還致毀謗竟從崔㥄音陵議廢帝於崇訓佛寺而立平陽王脩是爲孝武帝五月帝殂於門下外省時年三十孝武帝詔百司赴㑹大鴻臚􅁥護事葬用王禮加以九旒鑾輅黄屋左纛班劒百二十人後西魏追謚莭閔皇帝後廢帝安定王後魏書曰後廢帝諱朗字仲哲章武王融第三子也母曰程氏少稱明悟永安二年爲肆州魯郡王後軍府司馬元曄之建明二年正月爲兾州渤海太守及髙歡起義兵􅀅誅􅁀逆乃推載之冬十月即皇帝位於信都城西升壇柴燎大赦稱中興元年以髙歡爲侍中丞相都督中外諸軍事大將軍録尚書大行臺増邑三萬户以兼侍中撫河北大使髙乾邕爲侍中司空以前平北將軍通直散􅀐常侍髙敖曹爲驃􅀐大將軍儀同三司兾州刺史以終其身十一月髙歡率師攻鄴城二年春正月抜鄴擒刺史劉誕二月以髙歡爲大丞相柱國大將軍太師増封三萬户并前爲六萬户三月以齊文襄王起家爲驃􅀐大將軍儀同三司車駕幸鄴閏月尓朱天光兆度律仲逺等屯於洹水之南髙歡出頓紫陌尓朱兆率輕􅀐三千夜襲鄴城叩西門不尅退走髙歡大破尔朱天光等四胡於韓陵前廢帝鎮軍將軍賀抜勝徐州刺史杜德於陣降尓朱兆走并州仲逺奔東郡天光度律將赴洛陽大都督斛斯椿賈}
