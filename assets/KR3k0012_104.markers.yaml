  - {type: variant, offset: 8, length: 0, content: '', WYG: 敬宗孝莊皇帝節閔皇帝廢帝安定王孝武皇帝文皇帝廢帝恭皇帝東魏孝静皇帝敬宗孝莊皇帝後漢書曰敬宗孝莊皇帝諱子攸彭城王勰勰音恊之第三子母曰李妃肅宗初以勰有魯陽翼衛之功封帝武城縣開國公㓜侍肅宗於禁内及長丰神秀慧姿貌甚美拜中書侍郎城門校尉兼給事黄門侍郎雅為肅宗所親待長直禁中遷㪚騎常侍御史中尉孝昌二年八月進封長樂王厯位侍中中軍將軍及武泰元年春二月肅宗崩大都督爾朱榮將兵向京師謀欲廢立以帝家有忠勲且兼人望隂與帝通榮乃帥衆來赴夏四月帝與兄弟夜北渡河㑹榮於河陽南濟河即位以兄彭城王邵為無上王弟霸城公子正為始平王榮為侍中都督内外諸軍事大將軍尚書令領軍將軍領左右衛封太原王百僚相率有司奉璽綬備法駕奉迎於河梁車駕巡河西至陶渚榮以兵權在已遂有異志乃害靈太后及㓜主次害無上王劭始平王子正公卿以下二千餘人列騎衛帝遷於便幕車駕入宫御太極殿大赦天下改武泰為建義元年是月汝南王恱北海王顥臨淮王彧前後奔蕭衍郢州刺史元願達據城叛五月加大將軍爾朱榮北道大行臺以尚書右僕射元羅為東道大使征東將軍光祿勲元欣副之廵方黜陟先行後聞大將軍爾朱榮還晉陽帝餞於邙隂六月通直散騎常侍高乾邕及弟等率流民起兵於齊州之太原頻敗州軍詔東道大使元欣喻旨乃降是月葛榮飢使其僕射任褒帥車三萬餘乗南冦至沁州豳州平北府主簿河間邢杲帥河北流民十餘萬户反於青州之北海自署漢王年號天統詔諸有􅀻馬仗従戎者職人優兩大階詔當親御六戎掃清燕代大將軍太原王爾朱榮帥精銳十萬為左軍上黨王天穆總衆八萬為前軍司徒公陽春勒兵十萬為右軍司空公穆紹統率八萬為後軍是月葛榮衆退屯相州之北七月齊獻武王於鄴西北招慰葛榮别帥稱王者七人衆萬餘降之加大將軍爾朱榮柱國大將軍錄尚書事光州人劉舉聚衆數千反於濮陽自稱皇武大將軍是月髙平鎮人万俟墨其二音醜奴僣大位置百官八月葛榮帥衆圍相州九月詔太尉公上黨王天穆討葛榮次於朝歌以征東將軍齊州刺史元欣為沛郡王柱國大將軍爾朱榮率騎七千討葛榮於滏口破擒之餘衆悉降冀定滄瀛殷五州平大赦天下改為永安元年以柱國大將軍太原王爾朱榮為大丞相都督河北畿外諸軍事冬十月蕭衍以北海王顥為魏主年號孝基入據南兖之銍城二年夏四月上黨王天穆齊獻武王大破邢杲於齊州之濟南杲降送京師五月元顥克梁國内外戒嚴癸酉元顥䧟滎陽甲戌夜車駕北巡幸河内丙子元顥入洛戊寅太原王爾朱榮㑹車駕於長子即日反斾上黨王天穆北渡河會車駕于河内秋七月都督爾朱兆賀拔勝於硤石夜濟破顥子冠爰及安豐王延明軍元顥敗走車駕入居華林園昇大夏門大赦天下宴勞天柱大將軍爾朱榮上黨王天穆及北來諸將於都亭出宫人三百繒錦雜綵數萬疋頒賜有差三年春三月雍州刺史爾朱天光討醜奴蕭寳寅於安定破擒之囚送京師六月嚈噠國獻獅子九月天柱大將軍爾朱榮上黨王天穆自晉陽來朝帝殺榮及天穆於明光殿大赦天下遣武衛將軍奚毅前燕州刺史侯淵帥衆鎮北中是夜左僕射爾朱世隆榮妻鄉郡長公主帥榮部曲焚西陽門出屯河隂攻河橋擒毅等屠害之據北中城南逼京邑十月通直散騎常侍假平西將軍都督李苗以火船焚河橋爾朱世隆退走壬寅爾朱世隆亭建興之髙都爾朱兆自晋陽來㑹之共推太原太守行并州刺史長廣王曄為主大赦所部年號建明十二月爾朱兆等冦丹谷都督崔伯鳯戰殁都督羊文義史五龍降兆大都督源子恭奔退爾朱兆爾朱度律自當平津上率騎涉渡以襲京城事出倉卒禁衛不守帝步出雲龍門逼帝幸永寕之佛寺殺皇子亂兵殺司徒公臨淮王彧僕射范陽王誨戊申元曄大赦天下爾朱度律自鎮京師爾朱兆遷帝於晉陽崩於城内三級佛寺時年二十四中興二年諡為武懐皇帝太昌元年又諡孝莊皇帝廟號敬宗塟静陵節閔皇帝後魏書曰節閔皇帝諱恭字修業廣陵恵王羽之子也母曰王氏帝少端謹有制度長而好學事祖母嫡母以孝聞正始中襲爵延昌中拜通直㪚騎常侍正光三年加散騎常侍領給事黄門侍郎以元義擅權遂稱疾不起久之因託瘖病五年就除金紫光祿大夫建義元年除儀同三司既絶言垂將一紀居於龍華佛寺無所交通永安末有白莊帝者言王不語將有異圖民間逰聲又云有天子之氣王懼禍逃匿上洛尋見追攝執送京師拘縶多日以無狀獲免及莊帝崩爾朱世隆以元曄踈逺又非人望所推以王潜嘿晦身有過人量將謀廢立恐實不語乃令王所親申其意旨且兼迫脅王遂答曰天何言㢤世隆等大恱春三月曄進至邙南世隆等奉王東郭之外行禪讓之禮太尉公爾朱度律進璽綬衮冕之服及就輅車百官侍位入自建春雲龍門昇太極殿前羣臣拜賀禮畢遂登閶闔門詔大赦天下以魏為大魏改建明二年為普泰是月幽州刺史劉靈助起兵於薊撫軍將軍金紫光祿大夫兼侍中河北大史髙乾邕及弟平北將軍通直㪚騎常侍髙敖曹率衆夜襲冀州執刺史元嶷魚力切共推前河南太守封隆之行州事三月封長廣王為東海王頴州王爾朱兆為天柱將軍晉州刺史平陽郡開國公髙歡封渤海信都王夏四月詔有司不得復稱偽梁罷細作之條無禁鄰國還往髙歡以爾朱逆亂始興義兵於信都西定殷州斬其刺史爾朱羽生命南趙郡太守李元忠為刺史鎮廣河八月追尊皇考為先帝皇妣為先大妃封皇弟永業為髙宻王皇子一恕為青州渤海王既而髙歡推立安定王為帝於信都二年三月髙歡敗爾朱天光等於韓陵夏四月髙歡使魏蘭根慰喻洛邑且觀帝之為人蘭根忌帝雅徳還致毁謗竟從崔陵橋議廢帝於崇訓佛寺而立平陽王脩是為孝武帝五月帝遇弑殂於門下外省時年三十五孝武帝詔有司赴㑹大鴻臚監䕶事塟用王禮加以九旒鑾輅黄屋左纛班劍百二十人後西魏追諡節閔皇帝後廢帝安定王後魏書曰後廢帝諱朗字仲哲章武王融第三子也母曰程氏帝少稱明悟永安二年為泗州魯郡王後軍府司馬元曄之建明二年正月為冀州渤海太守及髙歡起義兵將誅暴逆乃推戴之冬十月即皇帝位於信都西升壇柴燎大赦稱中興元年以髙歡為侍中丞相都督中外諸軍事大將軍錄尚書大行臺増邑三萬户以兼侍中撫河北大使髙乾邕為侍中司空以前平北將軍通直散騎常侍髙敖曹為驃騎大將軍儀同三司冀州刺史以終其身十二月髙歡率師攻鄴城二年春正月拔鄴城擒刺史劉誕二月髙歡為大丞相柱國大將軍太師増邑三萬户并為六萬户三月齊文襄王起家為驃騎大將軍儀同三司車駕幸鄴閏月爾朱天光北度律仲逺等屯於洹水之南髙歡出屯紫陌爾朱兆率輕騎三千夜襲鄴城中西門不克退走髙歡大破爾朱天光等四胡於韓林前廢帝鎮軍將軍賀拔勝徐州刺史杜徳於陣降爾朱兆走并州仲逺奔東郡天光度律將赴洛陽大都督解斯椿賈}
