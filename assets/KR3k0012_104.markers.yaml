  - {type: variant, offset: 11, length: 0, content: '', SBCK: 武王髙歡與百竂㑹謂僉謂髙祖不可無後乃共奉王即帝位於東郭之外自來陽雲龍門御太極前殿群臣朝賀禮畢升閶闔門大赦天下改中興二年爲太昌元年帝以丗昜除復齊獻武王爲大丞相大將軍還鄴車駕餞別於乾脯山殺大司馬汝南王恱大赦天下改太昌爲永興以同太宗時號㝷改爲永熈二年春正月車駕幸崧髙石窟靈巖寺十二月車駕狩於嵩陽遂幸温湯車駕還宫三年春二月壬子大赦壬午封左衛將軍元斌之爲頴川王夏四月癸􅐫日有蝕之五月丙戌直勲府庶子箱別六百人􅀐官箱別二百人閤内部曲數千人帝内圖髙歡乃以斛斯椿爲領軍使興王思玫等統之以爲心膂軍謀朝政咸决於椿分置督將及河南關西諸刺史辛夘下詔戒嚴楊聲伐梁實謀北討秋七月巳􅐫帝親惣六軍率南陽王寳炬清河王亶廣陽王湛斛斯椿以五千􅀐􅀫於􅈆西陽王別舎沙門都維郍惠臻􅀒璽持千牛刀以從有牛百頭盡殺以食軍士衆知帝將出其夜亡者過半清河廣陽二王亦逃歸略陽公宇文㤗遣都督駱超李賢和各領數百􅀐赴駱超先至甲戍賢和㑹帝於崤中巳酉髙歡入洛遣疋屢昭及河南尹元子思領左右侍官追帝請廻駕髙昻率勁卒及帝於陜西帝楊鞭長騖至湖城飢渇甚有王思村人以麥飯壷漿獻帝甘之復一村十年帝至稠桑潼􅀜大都督毛洪賔迎獻食八月宇文㤗遣大都督趙貴梁禦甲􅀐二千來赴乃奉迎帝過河謂禦曰此水東流而朕西上􅀂得重謁洛陽廟是卿等功也帝及左右皆流涕宇文㤗迎於東陽帝勞之將士皆呼萬歳遂入長安以雍州公廨爲宫大赦甲寅髙歡推司徒清河王亶爲大司馬承制惣萬機居尚書省歡追車駕至潼􅀜九月巳酉歡東還洛陽帝親督衆攻潼􅀜斬其行臺華長瑜冬十月髙歡推清河王亶子善見爲主徙都鄴是爲東魏魏於此始分爲二十二月帝崩時年二十五謚曰孝武葬雲陵}
