  - {type: variant, offset: 2175, length: 911, content: 文武之道自古並行威福之施必也相籍故三五至仁尚有征伐之事夏殷明叡未未舍兵甲之行今則訓文有典教國家雖崇文以懷九服修武以宁八荒然於習武之方猶未盡將於馬射之前先行講武之式可勑有司豫脩場埒其列陣之儀五戎之數別俟後勑冬十月太極殿成大饗群臣十有七年夏四月立皇后馮氏六月帝將南伐詔造河橋立皇子恂為皇太子秋七月以皇太子立詔賜民為父後者爵一級是月蕭頤死孫昭業僣立八月車駕發京師南伐步騎三十餘萬太尉丕奏請以宮人從詔曰臨戎不語內事宜停車駕至肆州幸并州親見高年問疾苦車駕所經傷民秋稼畝給穀五斛戊辰濟河語洛懷并肆所過四州賜高年爵百年以上假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級鰥寡孤獨不能自存者人粟五斛帛二疋幸洛陽周巡故宮基趾帝顧謂侍臣曰晉德不脩早傾宗祀荒毀至此用傷朕懷遂詠黍離之詩為之流涕觀河橋幸太學觀石經詔六軍發軫帝戎服執鞭御馬而出群臣稽顙於馬前請停南伐帝乃止仍定遷都之計冬十月幸金墉城詔徵司空穆亮與尚書李冲將作大匠董爵經始洛陽帝幸河南城幸豫州解嚴設壇於滑臺城東告行廟以遷都之意大赦天下還幸鄴十有八年春朝群臣於鄴宮車駕南巡幸洛陽西宮二月行幸河陽規建方澤之所車駕北巡至平城宮臨朝堂部分遷留三月罷西郊祭天帝臨太極殿喻在代群臣以遷移之略秋七月以宋玉劉昶為大將軍是月島夷蕭鸞殺其主蕭昭業立業弟昭文冬十月親告太廟奉遷神主車駕發平城宮次於中山之唐湖是月蕭鸞廢殺其主蕭昭文而僣立車駕幸鄴經比干墓傷其忠而獲戾親為吊文樹碑而刊之車駕至洛陽蕭鸞雍州刺史曹虎據襄陽降十有二月車駕至懸瓠詔壽陽鍾離馬頭之師所獲男女之口皆放還南十有九年春正月饗群臣於懸瓠講武於汝水之西大齎六軍車駕濟淮二月幸八公山路中雨甚詔去蓋見軍士病者親恤之車駕至鍾離軍士擒鸞三卒帝曰在君為君其民何罪於是免歸之車駕發鍾離遣使臨江數蕭鸞罪惡幸小沛遣使以太牢祭漢高祖廟行幸瑕丘以太牢祠岱岳詔選諸孔宗子一人封崇聖侯邑百戶以奉孔子之祀又詔兗州為孔子起圉柏修飾墳壠更建碑銘襃揚聖德行幸滑臺次于石濟車駕至自南伐六月詔始為漢語不得以北俗之語言於朝廷若有違者免所居官詔求天下遺書祕閣所無有禆時用者加以優償詔遷洛之民死葬河南不得還北於是代人南遷者悉為河南洛陽人詔改長尺大升依周制度班之天下八月詔選天下武勇之士十, SBCK: ''}
