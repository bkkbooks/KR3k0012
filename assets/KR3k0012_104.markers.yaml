  - {type: variant, offset: 4794, length: 1006, content: 集諸醫士尋篇推簡務有精要取三十餘卷以班九服郡縣備寫布下鄉邑使知救患之術延昌元年三月京師穀貴出倉粟八十萬石以賑貧者夏四月詔曰肆州地震陷死傷甚多言念毀沒有酸懷抱亡者不可復追生病之徒宜加療救可遣太醫折傷醫并給所取之藥就治之大赦改元二年夏四月庚子以絹五十五萬疋賑恤河南郡飢民三年春三月詔曰肆州秀容郡敷城縣雁門郡原平縣並自去年四月以來山鳴地震于今不已告譴彰咎朕甚懼馬祗畏兢兢若臨深谷可恤瘼寬刑以荅災譴四年正月帝不豫丁巳崩于式乾殿時年三十三謚曰宣武皇帝廟號世宗葬景陵帝幼有大度喜怒不形於色雅性儉素初高祖欲觀諸子志尚乃大陳寶物任其所取京兆王愉等皆競取珍玩帝唯取骨如意而已高祖大奇之及庶人恂失德高祖謂彭城王勰音協曰吾固疑此兒有非常志相今果然矣雅愛經史尤長釋氏之義每至講論連夜忘疲善風儀美容貌臨朝淵嘿端嚴若神有君人之量矣肅宗孝明皇帝後魏書曰肅宗孝明皇帝諱翊世宗宣武皇帝之第二子母曰胡充華永平三年三月帝生於宣光殿之東北有光照于庭中延昌元年十月立為皇太子四年春正月丁巳夜即皇帝位大赦天下詔太保高陽王雍入居西柏堂決庶政又詔任城王澄為尚書令百官惣已以聽於二王二月尊皇后高氏為皇太后三月皇太后出俗為尼徙御金墉城八月尊皇太妃為皇太后帝朝皇太后於宣光殿大赦天下群臣奏請皇太后臨朝稱制九月皇太后親覽萬機熙平元年春正月大赦改年二年八月宴太祖已來宗室年十五已上於顯陽殿申家人之禮九月詔曰察訟理冤冤寶惟政首躬親聽覽民信所由自今月望當暫出城闉親決滯枉主者可宣諸近遠咸使聞知神龜元年二月詔以神龜表瑞大赦改年七月開恒州銀山之禁與人共之二年九月皇太后幸崧高山正光元年秋七月侍中元又劉騰奉帝幸前殿矯皇太后詔曰世祖宣武皇帝以叡明承業廓寧區夏而鴻功未半早年登遐乃車書弗同勍寇尚熾幼主稚弱夙纂寶曆曾定宗祏莫剋祗奉朕所以敬慎群請臨朝惣政僶俛從事以迄于茲自此春來先疹屢發夏首及今數加動劇恐不堪日釐萬務巨細兼省帝齒周星紀識學逾躋日就月將人君道茂足以撫緝萬邦諧決百揆朕當率前志敬遜別宮乃幽皇太后於北宮殺太傅領太尉清河王懌乂等總勒禁旅決事殿中帝加元服大赦改年九月蠕蠕而蠢切主阿那壞來奔以太師高陽王雍為丞相十月詔曰蠕蠕世雄朔方擅制漠表鄰通上國百有餘載宜且優以賓禮期之立功䟽爵胙土大啟河岳可封朔郡公蠕蠕王食邑一千戶錫以袞冕加之輕蓋祿秩儀衛同於戚藩二年三月駕幸國子學講孝經祠孔子以顏淵配十有二月詔司徒崔光安豐王延明等議定服章三年春正月辛亥帝耕籍田十有一月車駕有事圓丘詔曰治曆明時前王茂, WYG: 空韓}
