  - {type: variant, offset: 101, length: 0, content: '', krp: 着衣大鏡尺八寸銀花小鏡尺二寸􅃮匣盛蓋銀華金薄鏡三枚銀龍頭受福蓮華鈎鏁四副魏武帝上雜物䟽曰御物有尺二寸金錯鏡一枚皇太子雜純銀錯七寸䥫鏡四枚貴人至公主九寸䥫鏡四十枚鄴中記曰石虎三人臺及内宫中鏡有徑二三尺者純金蟠龍雕飾丗說曰晉孝武將軍講孝經謝公凡弟與諸人私相講習車武子苦問謝謂袁羊曰不問則德音有遺多問則重勞二謝袁曰何嘗見明鏡疲於屢照益部耆舊傳曰杜眞孟宗周覧求師經歷齊魯資用將乏磨鏡自給南蛮獠人俗曰諸婚姻以奴婢一人爲娉無奴婢以銅鏡當人婢呉興郡記曰臨安縣東石鏡山山東有石鏡一徑二尺四寸甚清亮山謙之尋陽記曰廬山東靣有一石若鏡懸崖明净照見人形海内士品曰徐孺子甞事江夏黄公黄公薨往㑹其葬家貧無以自致賫磨鏡具自隨賃磨取資然後得前旣至祭而退荀恱申鍳曰君子三鍳鍳乎前鍳乎下鍳乎鏡前惟人訓人惟明啇德之衰不鍳於湯禹也周秦之弊不鍳於羣下也側弁垢顔不鍳於明鏡也古今注曰平帝元始三年延陵西園神寢内御户座前大鏡皆清液如汗水岀狀西京雜記曰髙祖入咸陽宫周行府庫有方鏡九寸表裏明人直來照之影則側見以手掩心而來即腸胃五藏歷然無礙人有病在内則掩心而照之即知病之所在女子有邪心則膽張心動秦始皇帝以照宫人膽張心動者則殺之又曰宣帝𬒳収繫郡邸獄臂上猶帶史良娣合綵婉轉䋲繫身毒寳鏡一枚如八銖錢舊傳此鏡照見妖魅佩之者爲天神所福宣帝從危獲濟及紹大位每持此鏡感咽移辰帝崩鏡不知所在拾遺録曰周穆王時渠國貢火齊鏡廣三尺六寸闇中視物如晝人向鏡語鏡中則響應之也又曰周穆王時有如石之鏡此石色白如月照面如雪謂之月鏡又曰方丈山池泥}
  - {type: variant, offset: 102, length: 1, content: 濟, SBCK: 錬成金鏡色青可照魑魅洞􅁳記曰望蟾閣上有青金鏡廣四尺元光年中祗國獻此鏡照見魑魅百鬼不能隱形列仙傳曰􅀒局先生􅀒石磨鏡局徇呉中衒摩鏡得一錢因磨之神仙傳曰河東孫愽能引鏡爲刀屈刀爲鏡劉根別傳曰思形􅃺可以長生以九寸明鏡照靣熟視之令自識巳身形常令不忘乆則身神不散疾患不入搜神記曰孫䇿旣殺于􅁻每獨自􅿂髴見在其左右引鏡自照見在鏡中因掊大呌瘡皆裂湏􅁷而死又呉曆曰䇿爲許貢客所傷引鏡自照曰靣如此當可復建功立事乎因椎几大呌瘡裂而卒續搜神記曰文獻文獻王道謚曽令郭璞筮巳一年中􅁻凶璞曰當有小不􅁻利可取廣州二大甖盛水置床帳二角名曰鏡耗以厭之某時撤甖去水如此其災可消至日忘之尋失銅鏡不知所在後撤去水乃見所失鏡在於甖中甖口數寸鏡大尺餘王公後令筮鏡甖之意璞云撤甖違期故致此妖邪魅所爲無他故也使燒車轄以擬鏡立出又曰林慮山下有一亭人過􅀫者或病或死常云十許男女各雜衣或}
