  - {type: variant, offset: 5, length: 3, content: 手巾漢, SBCK: 歳䘮母四月八日敬宣見衆人􅈅佛乃抜頭上金鏡以爲母􅈅因悲泣不勝又曰殷仲文在東陽照鏡而不見其頭靣旬日而戮又蕭方等三十國春秋曰甘卓將􅀍誅引鏡不見其頭又曰慕容垂攻鄴符丕遣其從弟龍請救乃遺謝玄青銅鏡黄金宛轉䋲等以爲之信齊書曰綦母珎之有一銅鏡背有三公字常語人云徴祥如此何患三公不至又曰陸慧暁遷太子洗馬廬江何􅀧常稱慧暁心如照鏡遇形觸物無不朗然梁書曰王珎國武帝起兵東昏召珎國以衆還都使岀屯朱雀門爲王茂所敗及入城宻遣郄纂奉明鏡獻成於梁帝帝断金以報之後侍宴帝曰卿明鏡尚存昔金何在珎國曰黄金謹在臣不敢失墜又曰到漑子鏡字圎照􅀄在孕其母夢懐鏡及生因以名焉隋書曰文帝委任髙頻後右衛將軍龐晃及將軍盧賁等前後短熲於上上怒之皆􅀍踈黜因謂頻曰獨􅀌公猶鏡也毎􅀍磨瑩皎然益明唐書曰太宗謂群臣曰夫以銅爲鏡可以正衣冠以古爲鏡可以知興替以人爲鏡可以明得失朕常保此三鏡以防巳過今魏徴殂猶一鏡亡矣莊于曰至人之用心也若鏡不將不迎應而不藏故勝物而無傷符子曰心能善知人如明鏡善自知者如淵蚌鏡以曜明故鍳人蚌以含珠故内照韓子曰古之人目短於自見故以鏡􅀚靣智短於自知故以道正巳鏡無見庇之罪道無明過之惡靣失鏡則無以正􅁂眉身失道則無以知迷惑吕氏春秋曰人之阿甚矣而無所鏡其殘亡無日矣孰當可鏡其唯士人乎鏡明巳也細士明巳也大淮南子曰明鏡之始矇然未見形容也及拭之以玄錫磨之以白氊則􅁂眉微毛可得而察又曰鏡便於照形承食不如竹簟又曰聖人若鏡不將不迎將送也應而不倡故萬化無傷其得之乃失之也又曰髙懸大鏡坐見四隣取大鏡髙懸盆中水晃見四隣又曰人莫鍳於沬雨而鍳於止水者以其静也沬需潦上沬起言其濁也莫窺形於生鏡而窺形於明鏡者以其易也抱朴子内篇曰或問知將來􅁻凶爲有道乎荅曰用鏡九寸自照有所思存七月則神仙千里事也明鏡用一或二謂之日月或用四謂之四規鏡又曰萬物之老者其精皆能假託人形以炫人於鏡中不能易其眞形是以入山道士以明鏡徑九寸懸於背有老魅未敢近或後來者視鏡中其是仙人及山中好神者鏡中故如人形蜀王本紀曰武都大夫化爲女子蜀王娶以爲夫人無幾物故葬於武都以石作鏡一枚表其墓魏}
