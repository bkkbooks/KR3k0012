  - {type: variant, offset: 114, length: 3, content: 浣布為, SBCK: 燎一枚至不復明其人眼乃失明地鏡圗曰欲知寳所在地以大鏡夜照見影若光在鏡中者物在下也風角要占曰厭盗賊法三月以小形銅鏡七枚埋於申地秤七百斤􅁟覆之坎深二尺五寸廣二尺五寸築令堅固孟逹與劉封書曰天地􅀄生如鏡陸機與弟雲書曰仁壽殿前有大方銅鏡高五尺餘廣三尺二寸立着庭中向之便冩人形體了了亦怪也􅁗嘉與婦徐淑書曰頃得此鏡旣明且好形觀文藻丗所希有意甚愛之故以相與明鏡可以鑒形淑荅書曰今君征未旋鏡將何施行明鏡鑒形當待君至􅀓咸鏡賦曰從隂位於清啇採秋金之剛精醮祝融以致度命歐冶而是營晞日月之光烈儀厥象乎曜靈鏡臺丗說曰温嶠爲劉越石長史北討劉聦得玉鏡臺嶠從姑劉氏有女羙嶠有意自媒數日乃下玉鏡臺姑喜既婚交禮女曰我固疑是老奴果如所卜也三國典略曰胡太后使沙門靈昭造七寳鏡臺合有三十六戸每室别有一婦人}
