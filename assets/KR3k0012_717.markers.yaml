  - {type: variant, offset: 4, length: 0, content: '', SBCK: 九鏡鏡臺奩合多羅嚴器鏡釋名曰鏡景也有光景也廣雅曰鍳謂之鏡玄中記曰尹壽作鏡大戴禮曰武王踐祚鏡之銘曰見尔前必慮尔後尚書帝命期曰桀失其玉鏡用之噬虎鄭玄注曰鏡喻清明之道虎喻􅁀也尚書考靈耀曰􅁗失金鏡魚目入珠金鏡喻明道也始皇不韋子言乱真也詩鄘栢舟曰我心匪鍳不可以茹鍳所以察形茹度也漢書東方朔傳曰郭舎人曰四銖籕文章皆有組索兩人相見朔能知之爲上客朔曰此玉之塋石之精表如日光裹如衆星兩人相覩見相知情此名爲鏡魏略曰夏侯惇從征吕布爲流矢所中傷左目時夏侯淵俱爲將軍軍中號惇爲肓夏惇􅁖之毎照鏡恚發􅂺撲鏡着地蜀志曰張􅁉曉相術毎舉鏡視靣自知刑死未甞不撲之于地沈約宋書曰劉敬宣}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_717-1b}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 九鏡鏡臺奩盒多羅嚴器鏡釋名曰鏡景也有光景也廣雅曰鑒謂之鏡𤣥中記曰尹夀作鏡大戴禮曰武王踐阼鏡之銘曰見爾前必慮爾後尚命帝命期曰桀失其玉鏡用之噬虎尚書考靈耀曰秦失金鏡魚目入珠詩邶栢舟曰我心匪鑒不可以茹漢書東方朔𫝊曰郭舎人曰銖籀文章背有組素兩人相見朔能知之為上客朔曰此玉之瑩石之精表如日月裏如衆星兩人相覩見相知情此為鏡魏畧曰夏侯惇從征吕布為流矢所中傷左目時夏侯淵俱為将軍中號惇惡目夏侯惇惡之每照鏡恚發輒撲鏡着地蜀志曰張裕曉相術每舉鏡視面自知刑死未嘗不撲之於地沈約宋書曰劉敬宣}
