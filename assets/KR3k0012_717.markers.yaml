  - {type: variant, offset: 5, length: 3, content: 手巾漢, WYG: 嵗喪母四月八日敬宣見衆人灌佛乃披頭上金鏡以為母灌因悲泣不勝又曰殷仲文在東陽照鏡而不見其頭面旬日而戮又蕭方等三十國春秋曰甘卓将被誅引鏡不見其頭又曰慕容垂攻鄴苻丕遣其從弟龍請救乃遺謝𤣥青銅鏡黄金宛轉繩等以為之信齊書曰綦母􅈿之有一銅鏡背有三公字常語人云徵祥如此何患三公不至又曰陸慧曉遷太子洗馬廬江何㸃常稱慧曉心如照鏡遇形觸物無不朗然梁書曰王珎國武帝起兵東昏召􅈿國以衆還都使出屯朱雀門為王茂先所敗及入城宻遣㕁纂奉明鏡獻誠於梁帝帝斷金以報之後侍宴帝曰卿明鏡尚存黄金何在珎國曰黄金謹在臣肘不敢失墜又曰劉漑子鏡字圓照初在孕其母夢懐鏡及生因以名焉隋書曰文帝委任髙熲後衛右将軍龎晃及将軍盧賁等前後短熲於上上怒之皆被疎出因謂熲曰獨孤公猶鏡也每被磨瑩皎然益明唐書曰太宗謂羣臣曰夫以銅為鏡可以正衣冠以古為鏡可以知興替以人為鏡可以明得失朕常寳此三鏡以防己過今魏徵殂去一鏡矣莊子曰至人之用心也若鏡不将不迎應而不藏故勝物而無傷符子曰心能善知人者如明鏡善自知者如淵蚌鏡以曜明故鑒人蚌以含珠故内照韓子曰古之人目短於自見故以鏡觀面智短於自知故以道正己鏡無見疵之罪道無明過之惡面失鏡則無以正鬂眉身失道則無以知迷惑吕氏春秋曰人之阿甚矣而無所鏡其㓕亡無日矣孰當可鏡其惟士人乎鏡明己也細士明己也大淮南子曰明鏡之始矇然未見形容也及拭之以𤣥錫磨之以白氊則髪眉㣲毛可得而察又曰鏡便於照形承食不如竹簟又曰聖人若鏡不将不迎應而不藏故萬物無傷其得之乃失之也又曰高懸大鏡坐見四鄰又曰人莫鑒於沬雨而鑒於止水者以其静也莫窺形於生鏡而窺形於明鏡者以其易也抱朴子内篇曰或問知将來吉凶為有道乎荅曰用鏡九寸自照有所思存七日則見神仙知千里事也明鏡用一或二謂之日月或用四謂之四規鏡又曰萬物之巧者其精皆能假託人形以炫人惟鏡中不能逃其真形是以入山道士以明鏡徑九寸懸於背有老魅未敢近或後來者視鏡中疑是仙人及山中神者鏡中故知人形蜀王本記曰武都大夫化為女子蜀王娶以為夫人無㡬物故塟於武都以石化鏡一枚表其墓魏}
