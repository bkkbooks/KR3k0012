  - {type: variant, offset: 4, length: 0, content: '', krp: 九鏡鏡臺奩合多羅嚴器鏡釋名曰鏡景也有光景也廣雅曰鍳謂之鏡玄中記曰尹壽作鏡大戴禮曰武王踐祚鏡之銘曰見尔前必慮尔後尚書帝命期曰桀失其玉鏡用之噬虎鄭玄注曰鏡喻清明之道虎喻暴也尚書考靈耀曰秦失金鏡魚目入珠金鏡喻明道也始皇不韋子言乱真也詩鄘栢舟曰我心匪鍳不可以茹鍳所以察形茹度也漢書東方朔傳曰郭舎人曰四銖籕文章皆有組索兩人相見朔能知之爲上客朔曰此玉之塋石之精表如日光裹如衆星兩人相覩見相知情此名爲鏡魏略曰夏侯惇從征吕布爲流矢所中傷左目時夏侯淵俱爲將軍軍中號惇爲肓夏惇悪之毎照鏡恚發輒撲鏡着地蜀志曰張𥙿曉相術毎舉鏡視靣自知刑死未甞不撲之于地沈約宋書曰劉敬宣}
