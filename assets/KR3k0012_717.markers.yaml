  - {type: variant, offset: 110, length: 10, content: 炎州以火浣布為手巾博, WYG: 玲瓏類丹檻孤高似𤣥闕對鳯臨清水垂龍掛明月照粉拂紅粧挿花理雲髪玉顔徒自見畏見君情歇古詩曰珊瑚掛鏡爛生光奩後漢書曰陰太后崩明帝性孝愛追慕無已謁原陵帝從席前伏御床視太后鏡奩中}
