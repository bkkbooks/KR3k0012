  - {type: variant, offset: 104, length: 2, content: 手巾, SBCK: 或黒輙來爲害有郅伯夷者過􅀫於此獨坐誦經忽有十餘人來與伯夷並坐因共蒲􅀶於是伯夷宻以鏡照之乃是一群犬因執燭而起佯誤以燭燒其衣毛乃樵伯夷懷刀投一人中之遂死成犬餘悉走去神異經曰昔有夫婦將別破鏡人執半以爲信其妻與人通其鏡化鵲飛至夫前其夫乃知之後人因鑄鏡爲鵲安背上自此始}
