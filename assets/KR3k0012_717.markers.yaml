  - {type: variant, offset: 96, length: 0, content: '', WYG: 皇太子納妃自着衣大鏡尺八寸銀花小鏡尺二寸漆匣盛盖銀華金簿鏡三枚銀龍頭受福蓮華鈎鏁四副魏武帝上雜物疏曰御物有尺二寸金錯鏡一枚皇太子雜純銀錯七寸鑯鏡四枚貴人至公主九寸鐵鏡四十枚鄴中記曰石虎三人臺及内宫中鏡有徑二三尺者純金蟠龍雕飾世說曰晉孝武将軍講孝經謝公兄弟與諸人私相講習車武子欲問謝謂袁羊曰不問則徳音有遺多問則重勞二謝袁曰何嘗見明鏡疲於屢照益部耆舊𫝊曰杜真孟宗周覽求師經歴齊魯資用将乏磨鏡自給南蠻獠人俗曰諸婚姻以奴婢一人為聘無奴婢以銅鏡當人婢吴興郡記曰臨安縣東石鏡山山東有石鏡一徑二尺四寸甚清亮山謙之潯陽記曰廬山東面有一石若鏡懸崖明净照見人形海内士品曰徐孺子嘗事江夏黄公公死往㑹塟家貧無以自致賫磨鏡具自隨賃磨取資然後得前既至祭而退荀悦申鑒曰君子三鑒鑒乎前鑒乎下鑒乎鏡前惟人訓人訓惟明商徳之衰不鑒於湯禹也周秦之弊不鑒於民下也側弁垢顔不鑒於明鏡也古今注曰平帝始元三年延陵西園神寢内御戸座前大鏡皆清液如汗水出牀西京雜記曰高祖入咸陽宫周行府庫有方鏡九寸表裏明澈人直來照之影則側見以手掩心而來即腸胃五臟厯然無礙人有病在内則掩心而照之即知病之所在女子有邪心則膽張目動秦始皇帝以照宫人膽張心動者則殺之又曰宣帝被収繫郡邸獄臂上猶帶史良娣合綵婉轉繩繫身毒寳鏡一枚如八銖錢舊傳此鏡照見妖魅佩之者為天神所福宣帝從危獲濟及紹大位每持此鏡感應如神帝崩鏡不知所在拾遺録曰周穆王時渠國貢火濟鏡廣三尺六寸闇中視物如晝人向鏡語鏡中則響應之也又曰周穆王時有如石之鏡此石色白如月照面如雪謂之月鏡又曰方丈山池泥百煉成金鏡色青可照魑魅洞冥記曰望蟾閣上有青金鏡廣四尺元光中波祇國献此鏡照見魑魅百鬼不能隠形列仙𫝊曰負局先生負石磨鏡局狥吳中街磨鏡得一錢因磨之神仙傳曰河東孫􅀶能引鏡為刀屈刀為鏡劉根别傳曰思形状可以長生以九寸明鏡照面熟視之令自識己身形長令不忘久則身神不散疾惡不入搜神記曰孫䇿既殺于吉每獨自髣髴見其左右引明鏡自照見在鏡中因倍大呌瘡皆裂須臾而死又吳厯曰䇿為許貢客所傷引鏡自照曰面如此尚可建功立事乎因推几大呌瘡裂而卒續捜神記曰文獻曽令郭璞筮已一年中吉凶璞曰當有小不吉利可取廣州二大甖盛水置床帳二角名曰鏡耗以厭之某時撤甖去水如此其災可消至日忘之尋失銅鏡不知所在後撤去水乃見所失鏡在於甖中甖口數寸鏡大尺餘王公後令筮鏡甖之意璞云甖違期故致此妖邪魅所為無他故也使燒車轄而鏡立出又曰林慮山下有一亭人過宿者或病或死常有十許男女各雜衣或白或黒輙來為害有郅伯夷者過宿於此獨坐誦經忽有十餘人來與伯夷並坐因共蒲博於是伯夷宻以鏡照之乃是一羣犬因執燭而起佯誤以燭燒其衣毛乃焦伯夷懐刀殺一人中之遂死成犬餘悉走去神異經曰昔有夫妻将别破鏡人執半以為信其妻與人通其鏡化鵲飛至夫前其夫乃知之後人因鑄鏡為鵲安背上自此始也幽明録曰宫亭湖邊傍山門有石數枚形圓若鏡明可以鑑人謂之石鏡後有行人過以火燎一枚至不復明其人眼乃失明地鏡圖曰欲知寳所在以大鏡夜照見影若光在鏡中者物在下也雲角要占曰厭盗賊法三月以小形銅鏡七枚埋於地秤七百斤土覆之坎深二尺五寸廣一尺五寸築令堅固孟逵與劉封書曰天地生如鏡陸機與弟雲書曰仁夀殿前有大方銅鏡髙五尺餘廣三尺二寸立著庭中向之便寫人形體了了亦怪也秦嘉與婦徐淑書曰頃得此鏡既明且好形觀文藻世所希有意甚愛之故以相與明鏡可以鑒形淑荅書曰今君征未旋鏡将何施有明鏡鑒形當待君至傅咸鏡賦曰從陰位於清商採秋金之剛精醮祝融以致度命歐冶而是營晞日月之光烈儀厥象乎曜靈鏡臺世説曰温嶠為劉越石長史北討劉聰得玉鏡臺嶠從姑劉氏有女美嶠有意自媒數日乃下玉鏡臺姑喜既㛰交禮女曰我固疑是老奴果如所卜也三國典略曰胡太后使沙門靈照造七寳鏡臺合有三十六户每户别有一婦人手各執鏁才下一闗三十六户一時自閉若抽此闗諸門皆啓婦人各出户前魏武雜物疏曰鏡臺出魏宫中有純銀㕘帶鏡臺一純銀七貴人公主鏡臺四晉東宫舊事曰皇}
