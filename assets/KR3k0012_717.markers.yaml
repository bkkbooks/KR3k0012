  - {type: variant, offset: 181, length: 1, content: 鬱, SBCK: 隂貴人食􅀲羙帝使求之時有燉煌獻異􅀲云是空峒靈􅀲又常山獻巨桃及后崩侍者見鏡奩中有瓜桃之核視之涕零也列仙傳曰朱崖令死當還法内珠於􅀜者死其繼母弃其繫臂珠其男年九歳好之置鏡奩中皆不知也至海􅀜吏収得十枚乃母子争死吏遂弃而遣之事具義門語林曰范汪至能噉梅人致一斛奩噉湏􅁷盡也蔡邕表曰賜鏡奩等前後重疊父母於子無以加此魏武上雜物䟽曰純銀藻豆奩純銀括摟奩孫仲􅀉妹臨亡書曰鏡與粉盤與郎香奩與若欲令其行身如明鏡純如粉譽如香合宋元嘉起居泣曰廣}
  - {type: page-break, offset: 181, content: '', id: KR3k0012_SBCK_717-7b}
