  - {type: variant, offset: 3121, length: 0, content: '', SBCK: 之利此謂地陣用車用馬用人用文用武謂之人陣武王曰善又曰武王問曰引兵入諸侯之地髙山盤石其避無草木四面受敵士卒惑迷爲之柰何太公曰當爲雲象之陣兵鈐曰有運衡陣洞當陣龍騰陣鳥翔陣握機陣虎翼陣兵書要決曰孫子稱無要正正之旗無擊堂堂之陣正正之旗者謂行軍也前後正治故不可要而擊之也堂堂之陣者謂營軍也堂堂不冒亂者不可就而擊之黄石公記曰使商人爲前兵者象白虎陣使羽人爲前兵者象􅀇武陣使徴人爲前兵者象朱雀陣使角人爲前兵者象青龍陣亦曰旬始陣又曰彼以直陣來者我以方陣應之方來銳應之銳來曲應之曲來圎應之圎來直應之直木方金銳火曲水圎土也各以能克者應勝之諸葛亮軍令曰連衝陣狹而厚也衛公兵法曰諸逢賊布陣湏有次第先右虞􅃸爲首其次右軍其次前軍其次中軍其次後軍其次左軍其次左虞􅀱其諸軍跳盪竒兵馬軍各隨夲軍以次行至戰所並於夲軍戰鋒隊前布列待五方旗節度加戰鋒等隊打賊不入其跳盪竒兵排後即入山谷林木蒙密之處并渡水狹路及下營戰處百里以來揔湏搜踏清静不然兵引過半臨戰下營伏兵起發致損軍旅其收軍還營却抽左虞􅀱見入即左軍後軍中軍前軍右軍右虞􅃸次之諸賊徒恃固阻山布陣不得横列兵士分立冝爲竪陣其陣法弩手弓手與戰鋒隊相間引前兩隊兩邊相翊布列旣定諸軍旣聽角聲其角聲節度一准前看黄旗向賊亞聞鼔聲發諸軍弩手弓手及戰鋒隊各令人捉馬一時籠槍大叫齊入􅀂弩手弓手戰鋒等隊引退跳盪竒兵隊一時齊入戰鋒等隊排比􅅆面還與竒兵同入如見黄旗却立不亞及聞金鉦聲乃止􅈩上架搶引還各於舊處准前聽角聲卷幅簇隊一准前如便放散即更聽一㑹角聲依軍次發行又曰諸方陣先成逢賊􅋐戰或打頭或打尾打頭其陣行不前進陣旣不進自然牢密如其打尾頭行不停其陣中間多即斷絶湏面別各定揔管都押幹當勾令斷絶太白隂經曰黄帝設八陣之形車廂洞當金也車土中黄上也鳥雲鳥翔火也折衝木也龍騰却月水也鴈行鵝鸛天也輪車地也飛翼浮阻巽也風后亦演渥竒圖云以正合以竒勝或合而爲一陣或散而爲八聚散之勢節制之度復置虚實二壘力牧亦創營圖其後􅁗由余蜀諸􅁑亮並有陣圖以教人戰夫營壘教圖使士卒知進止識金鼔其應敵戰不可預􅄱故其戰勝不復而應形無窮兵形象水因地而制形兵因敵而制勝能與敵變化而取勝者謂之神則其戰陣無圖明矣而庸將以教習之陣爲戰敵之陣不亦謬乎又曰合而爲一陣終一陣之中離而爲八陣聽音望麾以出四竒飛龍虎翼鳥朔虵盤爲四竒陣地天風雲爲四正陣夫善戰者以正合以竒勝竒正相生如環之無端孰能窮之竒爲陽正爲隂隂陽相薄而四時行焉竒爲剛正爲柔剛柔相得而萬物成焉竒正之用而萬物無所勝焉又曰天陣經曰風后演握竒圖自一陣之中分爲八陣天有衝或圎布形黄帝曰少則爲圎利爲主色尚玄爲乾地陣黄帝曰壯則爲方利爲主色尚黄爲坤風陣風附於天風象峯其形銳首利爲客色尚赤爲巽雲陣雲附於天太公曰}
