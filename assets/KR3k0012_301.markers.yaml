  - {type: variant, offset: 238, length: 2, content: 君屋, WYG: 其未濟請擊之公曰不可既陣而後擊之宋師敗績公傷股門官殱焉門官守門者也國人皆咎公公曰古之為軍也不阻隘也寡人雖亡國之餘宋商紂之後不鼓不成列恥以詐勝也又曰晉楚将戰晉欒書曰楚師輕窕固壘而待之三日必退退而擊之必獲勝焉郤至曰楚有六間不可失也其二卿相惡子重子反也王卒以舊罷老不代鄭陣而不整蠻軍而不陣蠻夷從楚不結陣也陣不違晦晦月終隂之盡故兵家以為忌在陣而囂囂喧聲也合而加囂陣合冝静而益有聲各顧其後莫有鬭心人各恤其}
