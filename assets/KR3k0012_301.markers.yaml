  - {type: variant, offset: 2578, length: 355, content: 濟太祖皇帝以騎軍浮水而渡遂破其砦虜其戰艦而廻三國典略曰陳韋翽字子羽有志操以孝著稱先尋以為驍騎將軍領朱衣直閣驍騎之職舊領營兵梁世已來其任逾重翽素有名望每大事恒令俠侍左右時人榮之號曰俠御將軍禰衡別傳曰衡著官布單衣以杖捶地數罵責操及其先祖無所不至操乃勑外具上廄驎馬三疋并騎二人須臾外給啟馬辨曹公謂孔文舉曰禰衡小人無狀乃爾孤今殺之無異鼠雀耳顧此子有異才遠近聞之孤今殺之將謂孤不能容劉景升天性險急不能容受此子必當殺之乃以衡置馬上兩騎挾送至南陽也會稽典錄曰朱育謂鍾離曰大皇帝以神武之姿欲得五千騎乃可有圖今騎無從出而懷進取之志將何計收曰大皇以中國多騎欲得騎以當之吳神鋒弩射三四里洞三四馬騎敢近之乎鄴中記曰石虎皇后出女騎千人皆著五綵靴鄴城故事記涼馬臺一名閱馬臺亦名戲馬臺案鄴中記云趙王虎建武六年造涼馬臺在城西漳水之南約坎為臺虎, SBCK: 爲}
