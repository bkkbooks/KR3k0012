  - {type: variant, offset: 512, length: 2, content: 吳王, SBCK: 馬隆擊涼州惡虜斷道隆作八陣圖車營並追狹則木屋施輪並前智謀縱横岀其不意故能成功後魏書曰文成帝和平二年制戰陣之法十有餘條因大儺曜兵有飛龍騰蛇魚麗之變以示威武隋書曰周法尚爲定襄太守時帝幸榆林法尚朝于行宫内史令元夀言於帝曰漢武出塞旍旗千里今御營之外請分爲二十四軍日别遣一軍發相去三十里旗幟相望鉦鼓相聞首尾連注千里不絶此亦出師之盛者也法尚曰不然兵亘千里動間山川卒有不虞四分五裂腹心有事首尾未知道阻且長難以相救雖是故事此乃取敗之道也帝不懌曰卿意以爲如何法尚曰結爲方陣四面外拒六宫及百官家口並住其間若有變起當頭分抗内引竒兵岀外奮擊車爲壁壘重設鈎陳此與據城理亦何異苦戰而捷抽􅀐追奔或戰不利此屯營自守臣謂牢固萬全之䇿也帝曰善因拜左武衛將軍良馬一疋絹三百疋唐書曰太宗自爲眞草書屏風以示群臣筆力遒勁爲一時之絶}
