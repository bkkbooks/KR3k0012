  - {type: variant, offset: 3164, length: 182, content: 色可勝之符先以二十八騎感之騎象二十八宿也淮南子曰夫善游者溺善騎者墮各以其所好反自為禍禍害也是故好事者未嘗不中中傷也好為情欲之事者未嘗不自傷也爭利者未嘗不窮也通典曰孫臏云用騎有十利一曰迎敵始至二曰乘敵虛背三曰追散亂擊四曰迎敵前擊後使敵奔走五曰遮其糧食絕其軍道六曰敗其津關發其橋梁七曰掩其不備卒擊其未振八曰攻其靜怠出其不意九曰燒其積聚市里十曰掠其田野係纍其子弟此十者騎, WYG: 死}
