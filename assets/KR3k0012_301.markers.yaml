  - {type: variant, offset: 467, length: 9, content: 故不敗史記項羽本紀, SBCK: 虜見漢軍少直前就營陵搏戰攻之千弩俱發應弦而倒虜還走上山漢軍追殺千人又}
  - {type: variant, offset: 467, length: 0, content: '', WYG: 虜見漢軍少直前就營陵搏戰攻之千弩俱發應弦而倒虜還走上山漢軍追擊殺千人又曰衛青軍出塞千里餘見單于兵陣而待於是青令武剛車自環為陣張晏曰兵陣也而從五千騎徃當匈奴晉書曰卞壼字望之子眕及旴同没陣母撫二子尸哭曰父為忠臣汝為孝子夫何恨乎徴士翟湯曰父死於君子死於父忠孝之道萃於一門王隱晉書曰馬隆擊凉州惡虜斷道隆作八陣圖車軍並進狹則撤屋施輪並前智謀縱横出其不意}
  - {type: page-break, offset: 467, content: '', id: KR3k0012_WYG_301-5a, image: WYG0895/WYG0895-0610c.png}
  - {type: variant, offset: 467, length: 9, content: 故不敗史記項羽本紀, krp: 虜見漢軍少直前就營陵搏戰攻之千弩俱發應弦而倒虜還走上山漢軍追殺千人又}
  - {type: variant, offset: 468, length: 0, content: '', WYG: 能成功後魏書曰文帝和平二年制戰陣之法有十餘條因大儺曜兵有飛龍騰蛇魚麗之變以示威武隋書曰周法尚為定襄太守時帝幸榆林法尚朝於行宫内史令元夀言於帝曰漢武出塞旌旂千里今御營之外請分為二十四軍日别遣一軍發相去三十里旂幟相望鉦鼓相聞首尾連注千里}
  - {type: page-break, offset: 468, content: '', id: KR3k0012_WYG_301-5b, image: WYG0895/WYG0895-0610d.png}
  - {type: variant, offset: 469, length: 0, content: '', WYG: 絶此亦出師之盛者也法尚曰不然兵亘千里動間山川卒有不虞四分五裂腹心有事尾首未知道阻且長難以相救雖是故事此乃取}
  - {type: punctuation, offset: 470, content: 。, id: KR3k0012_CHANT_301-bkkpn154}
  - {type: punctuation, offset: 470, content: 」, id: KR3k0012_CHANT_301-bkkpn155}
  - {type: xml-element, offset: 470, content: '', id: KR3k0012_CHANT_301-bkkxmlele30}
  - {type: xml-element, offset: 470, content: '', id: KR3k0012_CHANT_301-bkkxmlele31}
  - {type: 'tls:seg', offset: 470, content: '', id: KR3k0012_CHANT_301-8a.7}
  - {type: punctuation, offset: 470, content: 《, id: KR3k0012_CHANT_301-bkkpn156}
  - {type: variant, offset: 470, length: 4, content: 史記項羽, WYG: 之道也帝不懌曰卿意以為如何法尚曰結為方陣四面外拒六宫及百官家口並住其間若有變當頭分抗内引竒兵出外奮擊車為壁壘重設鈎陳此與據城理亦何異若戰而㨗抽騎追奔或戰不利據此屯營自守臣謂牢固萬全之䇿也帝曰善因拜左武衛将軍良馬一匹絹三百疋唐書曰太宗自為真草書屏風以示羣臣筆力遒勁為一時之絶先是人間有羲之書凡真行二百九十紙裝為七十卷草書二千紙裝為八十卷毎聽覽餘閒時取臨翫焉謂朝臣曰書小道初非急務時或留心猶勝棄日凡諸藝業未有學而不得者也病在心力懈怠不能專精耳朕少時為公子未遭陣敵義旂之始乃平冦亂毎執鼔必自指撝習覩兵陣即知强弱常取吾弱對其强强對其弱敵犯吾弱追奔不踰百數十歩吾擊其弱必突過其陣自背而反擊之無不潰矣使此而制勝思得其理深也今吾臨人之書非學於形勢唯在求其骨力及得骨力而形勢自生耳然吾所為皆先作意是以果能成也又曰太宗製破陣樂舞圖左圓右方先偏後伍魚麗鵝鸛箕張翼舒交錯屈伸首尾廻環以象戰陣之形令起居郎吕才依圖教樂工一百二十人被甲執㦸而習之凡為三變每變為四陣有來徃疾徐擊刺之象以應歌節數日而就更名七徳之舞又曰髙宗御武成殿親試制舉人問之曰兵書云天陣地陣人陣其説何如舉人員半千對曰臣觀載籍此説頗多或謂天陣偏伍彌縫也以臣愚見謂不然矣夫師出以義有若時雨得天之時此天陣也兵在足食且耕且戰得地之利此地陣也善用兵者使三軍之士如父子兄弟得人之和此人陣也三者去矣其何以戰髙宗嗟賞之擢居上第家語曰戰陣有列矣而勇為}
