  - {type: variant, offset: 2275, length: 297, content: 來共決死敵皆無敢近者又曰趙雲字子龍隨先主為先主主騎晉書載記曰符堅伐晉捨大軍于項城以輕騎八千兼道赴之令軍人曰敢言吾至壽春者拔舌而族之宋書曰傅弘之素善騎射高祖至長安弘之於姚泓馳道內緩服戲馬或馳或驟往反二十里中甚有節制羌胡聚觀者數十人並惋驚歎息梁書曰曹景宗謂所親曰我昔在鄉里騎快馬如龍與年少輩數十騎拍弓絃作礕靂聲箭如餓鴟叫平澤逐麞數肋射之後周書曰太祖嘗從數騎於野忽聞簫鼓之音以問從人皆莫之聞也唐書曰貞觀中左右屯營始置飛騎揀材力驍捷善騎射者為之太宗時出遊幸則從馬衣五色袍乘六閑駿馬賜猛獸皮韉以摽異之又加階級廩食各有差五代周史曰顯德中世宗車駕至濠州城下戊子親破十八里灘砦在濠州東北淮水之中四面阻水上令甲士, SBCK: ''}
