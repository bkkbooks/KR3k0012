  - {type: variant, offset: 1593, length: 170, content: 時韓嫣與上學書相愛及上為太子愈益親嫣善騎射上即位欲事伐匈奴而嫣先習胡兵以故益尊貴漢書曰霍去病年十八為侍中善騎射又曰趙充國字公孫隴西上邽人也始為騎士以六郡良家子服虔曰金城隴西天水安定北地上郡也善騎射對補羽林後漢書曰景丹從擊王郎將倪宏等於南蠻郎兵迎戰漢軍追却續漢書曰甫蠻賊迎擊上營得上鼓車輜重數乘丹等縱突騎擊大破之追奔十餘里死傷者從橫丹還世祖謂, SBCK: 問尉繚}
