  - {type: variant, offset: 1223, length: 313, content: 黃池曹植求自試表曰伏見先帝武臣宿兵年耆即世者有聞矣雖賢不乏世宿將舊卒猶習戰也阮嗣宗為鄭冲勸晉王牋曰東誅叛逆全軍獨剋擒闔閭之將斬輕銳之卒以萬計威加南海名懾三越干寶晉紀論曰將相侯王連頭受戮乞為奴僕而猶不獲免嬪嬙妃主虜辱於戎卒豈不哀哉陸士衡辨亡論曰告類上帝拱揖群后虎臣毅卒循江而守劉孝摽辨命論曰楚師屠漢卒睢河鯁其流秦人坑趙士卒沸聲若雷霆班孟堅西都賦曰列卒周匝星羅雲布左太冲吳都賦曰雕題之士鏤身之卒又魏都賦曰簿戍綿冪無異蛛蝥之網弱卒瑣甲何異螳蜋之衛王仲宣從軍詩曰汎舟盖長川陳卒被隰坰謝靈運擬魏太子鄴中集應瑒詩曰官度廁一卒烏林預艱阻賈誼過秦篇曰率罷散之卒將數百之眾轉而攻秦斬木為兵揭竿為旗又曰信臣精卒陳利兵而誰何顏延年楊給事誄曰立于將卒, SBCK: 麗譙}
