  - {type: variant, offset: 653, length: 63, content: 時轉相攻伐齊愍以伎擊強魏惠以武卒奮秦昭以銳士勝又五行志曰成帝綏和二年八月鄭通里男子王褒衣綘衣小冠帶劍入北司馬門上前殿解帷組結佩, SBCK: 軍爲方陣白裳白旗素甲白羽望}
  - {type: variant, offset: 653, length: 295, content: 時轉相攻伐齊愍以伎擊強魏惠以武卒奮秦昭以銳士勝又五行志曰成帝綏和二年八月鄭通里男子王褒衣綘衣小冠帶劍入北司馬門上前殿解帷組結佩之自云天帝使我居此收縛考問故公車大誰卒病狂易不自知入宮下獄死大誰者非常之人名大姓誰是也本以誰何為稱因用名官有大誰長今此卒即長所領之卒也又食貨志曰董仲舒說武帝曰今荒淫越制踰侈以相高邑有人君之尊里有公侯之富小民焉得不困又加月為更卒已復為正一歲屯戍三十倍於古更工衡切更卒謂給郡縣一月而更也又胡建傳曰建字子孟河東人也孝武天漢中守軍正丞貧亡車馬常步與走卒起居所以尉薦走卒甚得其心尉者自上安之也薦者舉藉之也晉書天文志曰積卒十三星在房心南主為衛也又謝萬傳曰萬乃召集諸將都無所說直, WYG: ''}
