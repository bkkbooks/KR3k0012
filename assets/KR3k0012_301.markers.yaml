  - {type: variant, offset: 522, length: 1, content: 石, SBCK: 􅁓裝爲八十卷每聽覽餘閑時取臨翫焉謂朝臣曰書小道􅀄非急務時或留心猶勝弃日凡諸藝業未有學而不得者也病在心力懈怠不能專精耳朕少時爲公子未遭陣敵義旗之始乃平㓂亂毎執鼔必自指撝習覯兵陣即知強弱常取吾弱對其強強對其弱敵犯其弱追奔不踰百數十歩吾擊其弱必突過其陣自背而反擊之無不潰多使此而制勝思得其理深也今吾臨人之書殊學於形勢唯在求其骨力及得骨力而形􅀔自生耳然吾所爲皆先作意是}
