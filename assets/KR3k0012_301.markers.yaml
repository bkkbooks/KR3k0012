  - {type: variant, offset: 453, length: 12, content: 左師潰楚師敗績子玉收其卒, SBCK: 使龍且將號二十萬救齊齊王使龍且并軍與信戰夾濰水陣信乃夜令人爲萬餘囊盛沙以壅水上流引軍半渡擊龍且佯不勝還走龍且果追渡水信使人決壅囊水大至龍且軍太半不得渡即擊殺龍且虜齊王廣遂平齊又曰李陵至峻稽山與單于相值􅀐可三萬圍陵陵軍居山間以大車爲營陵引士出營外爲陣前行持㦸楯後行持弓弩令曰聞鼔聲而縱聞金聲}
