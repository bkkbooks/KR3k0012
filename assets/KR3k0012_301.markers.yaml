  - {type: variant, offset: 2934, length: 152, content: 於此臺簡練騎卒虎牙宿衛號雲騰黑矟騎五千人每月朔晦閱馬於此臺乃於漳水之南張幟鳴鼓列騎星羅虎乃登臺射髇箭一發五千騎一時奔走從漳水之南齊走集於臺下隊督已下皆班賚虎又射一箭其五千騎又齊走於漳水之北其五千流散攢促若數萬人騎皆以漆矟從事故以黑矟為號季龍又常以女騎一千人為鹵簿皆著紫綸巾熟錦袴金銀鏤帶五文織成靴遊于臺上, SBCK: 山虵勢}
