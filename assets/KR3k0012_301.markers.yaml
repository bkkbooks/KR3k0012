  - {type: variant, offset: 3121, length: 0, content: '', WYG: 之利此為地陣用車用馬用人用文用武謂之人陣武王曰善又曰武王問曰引兵入諸侯之地髙山盤石其地無草木四面受敵士卒惑迷為之奈何太公曰當為雲象之陣兵鈐曰有運衡陣洞當陣龍蛇陣鳥翔陣握機陣虎翼陣兵書要决曰孫子稱無要正正之旂無擊堂堂之陣正正之旂者謂行軍也前後正治故不可要而擊之也堂堂之陣者謂營陣也堂堂不冐亂也不可就而擊之也黄石公記曰使商人為前兵者象白虎陣使羽人為前兵者象𤣥武陣使徴人為前兵者象朱雀陣使角人為前兵者象青龍陣亦曰旬始陣又曰彼以直陣來者我以方陣應之方來銳應之銳來曲應之曲來圓應之圓來直應之直木方金銳火曲水圎土也各以能克者應勝之諸葛亮軍令曰連衡陣狹而厚也衛公兵法曰諸逢賊布陣須有次第先右虞候為首其次右軍其次前軍其次中軍其次後軍其次左軍其次左虞候其諸軍跳盪竒兵馬軍各隨本軍以次行至戰所並於本軍戰鋒隊前布列待五方旂節度如戰鋒等隊打賊不入其跳盪竒兵排後即入山谷林木䝉宻之處并渡水狹路及下營戰處百里以來總須捜踏清静不然兵引過半臨戰下營伏兵起發致損軍旅其收軍還營却抽左虞候先入即左軍後軍中軍前軍右軍右虞候次之諸賊徒恃固阻山布陣不得横列兵士分立宜布為堅陣其軍發弩手弓手與戰鋒隊相間引前兩隊兩邊相翊右列既定諸軍既聽角聲其角聲節度一准前看黄旂向賊亞聞鼔聲發諸軍弩手弓手及戰鋒隊各令人捉馬一時籠槍大呌齊入若弩手弓手戰鋒等隊引退跳盪竒兵隊一時齊入戰鋒等隊排比廽面還與竒兵同入如見黄旂却立不亞及聞金鉦聲乃止膞止架槍引還各於舊處准前聽角聲卷幅簇隊一准前如便放散即更聽一㑹角聲依軍次發又曰諸方陣先成逢賊鬭戰或打頭或打尾打頭其陣行不前進陣既不進自然牢宻如其打尾頭行不停其陣中間多即斷絶須面列各定摠管都狎幹當勾令斷絶太白隂經曰黄帝設八陣之刑車廂洞當金也車中黄土也鳥云烏翔火也折衝木也龍騰却月水也鴈行鵝鶴天也輪車地也飛翼浮阻巽也風后亦演握竒圖云以正合以竒勝或合而為一陣或散而為八陣聚散之形節制之度復置虛實二壘力牧一創營圖其後秦由余蜀諸葛亮並有陣圗以教人戰夫營壘教圖使士卒知進止識金鼔其應敵戰不可預形故其戰勝不復而應形無窮兵形象水水因地而制形兵因敵而制勝能與敵變化而取勝者謂之神則其戰陣無圖明矣而庸將以教習之陣為戰敵之神不亦謬乎又曰合而為一陣終一陣之中離而為八陣聽音望麾以出四竒飛龍虎翼鳥翔蛇盤為四竒陣天地風雲為四正陣夫善戰者以正合以竒勝竒正相生如環之無端孰能窮之竒為陽正為隂隂陽相薄而四時行焉竒為剛正為柔剛柔相得而萬物成焉竒正之用而萬物無所勝焉又曰天陣經曰風后演握竒圗自一陣之中分為八陣天有衝或圎布形黄帝曰少則為員利為主色上元為乾地陣黄帝曰壯則為方利為主色上黄為坤風陣風附於天風象峰其形銳首利為客色赤為巽雲陣雲附於天太公曰}
