  - {type: variant, offset: 4, length: 0, content: '', WYG: 二陣陣尚書曰武王與紂癸亥陣於商郊左傳曰晉荀吳敗無終及羣狄於太原崇卒也無終山戎初將戰魏舒曰彼走我車所遇又阨地險不便也阨烏界反以什共車必克更増十人當}
