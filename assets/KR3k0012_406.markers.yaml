  - {type: punctuation, offset: 111, content: 「, id: KR3k0012_CHANT_406-bkkpn39}
  - {type: variant, offset: 111, length: 492, content: 膳夫凡王祭祀賓客食則徹王之胙俎又春官大宗伯職曰以饗燕之禮親四方之賓客賓客朝聘者也禮記曲禮上曰凡與客入者每門讓於客客至於寢門則主人請入為席然後出迎客客固辭主人肅客而入肅進也進謂導也主人入門而右客入門而左禮記王制曰天子諸侯無事則歲三田一為乾豆二為賓客左傳曰襄四曰季武子無適子公彌長而愛悼子欲立之誘於臧紇曰飲我酒吾為子立之季氏飲大夫酒臧紇為客為上賓既獻臧孫命北面重席新樽絜之召悼子降逆之又昭元曰趙孟孫豹曹大夫入于鄭鄭伯兼享之及享具五獻籩豆於幕下趙孟辭私於子產曰武請於冢宰矣乃用一獻趙孟為客禮終乃宴又昭六曰會于黃父謀王室也王室有子朝亂謀定之趙簡子令輸王粟具戍人明年將納王納王於王城也宋樂大心曰我不輸粟我於周為客二王後後為賓客若之何使客史記曰孟嘗君名文姓田氏父曰靖郭君田嬰使主家待賓客賓客日進名聲聞於諸侯嬰卒文代立是為孟嘗君孟嘗君在薛招致賓客以故傾天下之士食客數千人無貴賤一與文等孟嘗君待客坐語而屏風後嘗有侍史主記君所與客語問親戚居處客去孟嘗君已使使存問獻遺其親戚孟嘗君曾待客夜食有一人蔽火光客怒以飯不等輟食辭去孟嘗君起自持其飯比之客慚自刎士以此多歸孟嘗君客無所擇皆善遇之人人各自以為孟嘗君親己, SBCK: 朋從爾思}
