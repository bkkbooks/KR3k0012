  - {type: variant, offset: 1813, length: 434, content: 質疑問事論道經書而已又曰張楷治嚴氏春秋古文尚書門徒常數百人賓客慕之自父黨宿儒皆造門謝承後漢書曰傅賢遷廷尉賢素廉正自掌法官無私賓客袁山松後漢書曰陳蕃遷豫章在郡下接賓客獨坐一室唯徐孺子來為置對榻去則懸之及徵為尚書令送之者亦不出郭門東觀漢記曰崔瑗愛士好賓客盛修殽膳殫極滋味不問餘產張璠漢記曰孔融拜太中大夫雖居家失勢賓客日蒲其門愛才樂士常若不足每歎曰坐上客常滿樽中酒不空吾無憂矣英雄記曰袁紹居雒陽西北陬不妄通賓客非海內知名不得相見魏略曰劉備屯於樊城諸葛亮見備備以諸生意待之坐集既畢眾賓皆去而亮獨留備亦不問其所言備性好毦時適有旄牛尾與備者備因手自結之亮乃進曰明將軍當復有遠志但結毦而已備知亮非常人乃投毦而荅由此知亮乃以上客禮之魏志曰蔡邕貴重朝廷常車騎填巷賓客盈里坐聞王粲在門外倒屣迎之蜀志曰簡雍字憲和涿郡人少與先主有舊隨從先主至荊州雍與麋笁孫乾共為從事中郎常為談客吳志曰孫權以魯肅諸葛瑾等為賓客又曰諸葛融每會賓合鐏促席問眾客所能或有博弈或有樗蒲投壺於是甘菓繼進清酒徐行融周流觀之, SBCK: 卷}
