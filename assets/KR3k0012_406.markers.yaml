  - {type: variant, offset: 1760, length: 0, content: '', krp: 魏志曰胡質云古人之交也取多知其不貪奔北知其不怯聞流言而不信故可終也莊子曰凢交近則必相靡以信逺則必忠之以言孟子曰萬章曰敢問友孟子曰不挾長不挾貴不挾兄弟而友者友其徳也不可以有挾也又曰舜尚見帝帝館甥于貳室迭爲賔主是天子而友於匹夫也譙子齊交曰譬之於物猶素之白也染之以藍則青遊居交友亦人之所染也韓起與田蘇處而成好仁之名甘茂事史舉用顯齊秦之功曹叅師盖公致清靜之治竇長君兄弟岀於賤隷謹恭師友皆爲退譲君子語曰蓬生麻中不扶自直此言雖小可以喻大必得其人千里同好固於膠􅃮堅於金石窮逹不阻其分毀譽不疑其實鄒子曰昔邢髙吕安飲於市仰天泣二子非有喪之哀傷相知之晚耳君子所以勤於接賢汲汲於結善欲以立名者也吕氏春秋曰荆有善相人者言無遺䇿聞於楚囯莊王見而問焉曰臣非得相人能觀人之友也布衣其友皆孝悌純謹如此者家必日益此謂吉人也居官事君其友皆誠信有行好善如此者事君日益此謂吉臣也人主也朝臣多賢左右多忠主有失皆敢交争此謂吉主也臣非能相人能觀人之友王曰善於是取士不解乃大霸晉陽春秋曰知幾其神乎古人以爲難交踈而吐誠今人以爲難風土記曰越俗性率朴意親好合即脫頭上手巾解要間五尺刀以與之爲交拜親跪妻定交有禮俗皆當於山間大樹下封土爲壇祭以白犬一丹雞一雞子三名曰木下雞犬五其壇地人畏不敢犯也祝曰卿雖乗車我戴笠後日相逢下車揖我雖歩行卿乗馬後日相逢卿當下白虎通曰朋友之道有四焉近則正之逺則稱之樂則思之患則死之仲長子昌言曰幽閑則攻己之短㑹同則述人之長負我者我加厚焉未有與人交若此而見憎者也要覧曰諸葛亮曰勢利之交難以經逺士之相知温不増華寒不改葉能貫四時而不衰歴夷險而益固劉欽新議曰夫交接者人道之始紀綱之大要名由之成事由之立又曰交之於人也猶脣齒之相濟又曰才非交不用名非交不發身非交不立楊子法言曰朋而不心面朋也友而不心面友也周昭新撰曰交之爲道起自羲皇造化之𥘉君臣始立而有人倫上下之叙象天地交泰以左右於民也唐虞三代莫不因之故交全情親則國安治強交敗情乖則國危治弱立交者欲其親也是故百姓不親禹作司徒踈者能睦廉頗相如忍忿以崇厚陳平周勃感陸生而相親所以安趙於強敵定漢於幾殆此交接之大義帝王之極務聞之於易曰交乃人倫之本務王道之大義也魏文帝集論曰夫隂陽交萬物成君臣交邦國治士庶交徳行光同憂樂共冨貴而交道備矣阮子政論曰夫交遊者儔黨結於家威權傾其國或以利厚而比或以名髙相求同則譽廣異則毀深朝有兩端之議家有不恊之論至令父子不同好兄弟異交友破和穆之道長諍訟之源鍾㑹芻蕘論曰凢人之結交誠冝盛不忘衰逹不弃窮不疑惑於䜛搆不信受於流言經長歷逺乆而逾固而人多𥘉隆而後薄始宻而終䟽斯何故也皆由交靜不發於神氣道數乖而不同權以一時之術取倉卒之利有貪其財而交有慕其勢而交有愛其色而交三者旣衰䟽薄由生東方朔與公孫弘書曰蓋聞爵禄不相責以禮同類之遊不以逺近爲是故東門先生居蓬户空穴之中而魏公子一朝以百騎曰造之吕望未甞與文王同席而坐一朝讓以天下半夫丈夫相知何必以撫塵而遊垂髮齊年偃伏以日數哉離騷曰交不忠信兮怨長晉潘岳陽肇誄曰余以頑蔽覆露重隂仰追先逹執友之心也古歌辭曰結交在相知骨肉何必親甘言無忠實世薄多蘇秦又日採葵莫傷根結交莫羞貧傷根葵不生羞貧交不成交友一左傳曰吴公子劄聘于齊說晏平仲躬於鄭見子産如舊相識又曰鄭子皮卒子産哭且曰吾己無爲爲善矣唯夫子知我注云無人知己之善故曰吾己又曰伍貟與申包胥友包胥楚大夫其亡也謂申包胥曰我必復楚國復執也申包胥曰勉之能復之我必能興之及昭王在隨申包胥如秦乞師尚書大傳曰散冝生閎夭南宫括三子者學乎太公大公見三子知爲賢人遂酌酒切脯除爲師學之禮約爲朋友家語曰孔子遇程子傾蓋而語終日甚相恱頋謂子路曰程子天下之賢士取束帛以贈之史記曰趙有處士毛公藏於愽徒薛公藏於賣漿家魏公子無忌從此二人結交遊也又曰蘇秦之先逹張儀候之數日乃見坐於堂下食以僕妾之餐告舎人曰儀才吾不及恐以小利忘求進故辱之儀怒入秦蘇君使舎人齎金帛車馬隂結助之卒相秦也又曰藺相如望見廉頗引車避匿廉頗聞之肉袒負荆至藺相如門謝罪曰鄙賤之人不知將軍寛之至此也卒相與歡爲刎頸之交漢書曰漢王與韓信爲金石之交又曰衛青姊子夫得入宫幸上皇后大長公主女也無子妬之大長公主捕青囚欲殺之其友公孫武與壯士往奪之故得不死上聞乃召青爲建章監侍中賞賜數日間累千金又曰盧綰豊人與髙祖同里綰親與太上皇相愛髙祖綰同日生里中持羊酒賀兩家親相愛生子同日壯又相愛又曰兩龔皆楚人勝字君賔舎字君倩二人相友著名節故時號之楚兩龔又曰王吉字子陽京兆人也少與貢禹爲友及陽仕至益州刺史貢聞之拂冠以待之陽遂薦稱焉世稱王陽在位貢公彈冠言其取舎同也又曰張耳大梁人陳餘亦大梁人也好儒術餘年少父事耳相與爲刎頸之父又曰鄭崇弟立與髙武侯傳喜同門學相友善喜爲大司馬薦崇哀帝擢爲尚書僕射}
