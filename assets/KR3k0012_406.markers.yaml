  - {type: variant, offset: 712, length: 2, content: 春申, SBCK: 孝友任恤注任信於友道恤憂患也論語曰益者三友損者三友友直友諒友多聞益矣友便僻友便倿友善柔損矣便僻巧譬喻也善柔誇毗也便倿辯以爲倿也又曰晏平仲善與人交乆而敬之又曰衛靈公曰居是􅀖也事其大夫之賢者友其士之仁者又曰子貢問友子曰忠告而善道之不可則止無自辱焉忠言以告之不從則止之又曰}
  - {type: variant, offset: 712, length: 2, content: 春申, WYG: 孝友任恤任信於友道恤憂患也論語曰益者三友損者三友友直友諒友多聞益矣友便僻友便佞友善柔損矣便僻巧譬喻也善柔誇毗也便佞辨以為佞也又曰晏平仲善與人交乆而敬之又子貢問為仁子曰居是邦也事其大夫之賢者友其士之仁者又曰子貢問友子曰忠告而善道之不可則止無自辱焉忠言以告之不從則止之又曰}
