  - {type: variant, offset: 1841, length: 1751, content: 人賓客慕之自父黨宿儒皆造門謝承後漢書曰傅賢遷廷尉賢素廉正自掌法官無私賓客袁山松後漢書曰陳蕃遷豫章在郡下接賓客獨坐一室唯徐孺子來為置對榻去則懸之及徵為尚書令送之者亦不出郭門東觀漢記曰崔瑗愛士好賓客盛修殽膳殫極滋味不問餘產張璠漢記曰孔融拜太中大夫雖居家失勢賓客日蒲其門愛才樂士常若不足每歎曰坐上客常滿樽中酒不空吾無憂矣英雄記曰袁紹居雒陽西北陬不妄通賓客非海內知名不得相見魏略曰劉備屯於樊城諸葛亮見備備以諸生意待之坐集既畢眾賓皆去而亮獨留備亦不問其所言備性好毦時適有旄牛尾與備者備因手自結之亮乃進曰明將軍當復有遠志但結毦而已備知亮非常人乃投毦而荅由此知亮乃以上客禮之魏志曰蔡邕貴重朝廷常車騎填巷賓客盈里坐聞王粲在門外倒屣迎之蜀志曰簡雍字憲和涿郡人少與先主有舊隨從先主至荊州雍與麋笁孫乾共為從事中郎常為談客吳志曰孫權以魯肅諸葛瑾等為賓客又曰諸葛融每會賓合鐏促席問眾客所能或有博弈或有樗蒲投壺於是甘菓繼進清酒徐行融周流觀之終日不倦王隱晉書曰嵇喜為太仆廄長馮陵知其英俊待以賓友之禮以狀表上宋書曰袁粲字景倩陳郡人閑默寡言善吟諷獨酌園庭以此自適居負南郭時策杖獨遊素寡往來門無雜客文士過見不過一兩人南史曰謝瞻兄晦時宋臺右衛權遇己重於彭城還都迎家賓客輻湊時瞻在家驚駭謂晦曰吾家以遠退為業汝遂勢傾朝野此豈門戶福耶蕭子顯齊書曰謝超宗坐公事免詣東府門自通其日風寒慘厲太祖謂四座曰此客至使人不衣自暖矣超宗既坐飲酒數甌辭氣橫出太祖對之甚欣拔為驃騎諮議及即位轉黃門郎後魏書曰崔道固為劉義隆諸子參軍事使向青州募人長史已下皆詣道固道固諸兄逼道固所生母自致酒炙於客前道固驚起接取謂客曰人家無力老親自執劬勞諸客皆知其兄等所作咸起拜謝其母母謂道固曰我不足以報貴賓汝宜荅拜諸客皆歎美三國典略曰周獲梁俘王褒王克劉瑴宗懔殷不害等至長安太祖喜曰晉氏平吳之利二陸而已今定楚之功群賢畢至可謂過之矣乃謂褒及克曰吾即王氏甥也卿等並吾之舅氏當以親戚為情勿以去鄉分意皆厚禮待引為賓客尹文子曰康衢長者字僮曰善搏字犬曰善噬賓客不過其門者三年長者怪而問之人以實對於是改之賓客復往淮南子曰客有見人於孚子者客出孚子曰子之客獨有過望我而笑之是慢也談論而不稱師是叛也交淺而言深是亂也客曰望君而笑是公也談論不稱師是通也交淺而言深是忠也故客一體也或以為君子或以為小人從視之異說苑曰魏文侯與大夫飲酒使公乘不仁為觴政曰飲不釂子曜切者浮以大白文侯飲而釂公乘不仁舉白浮君君視而不應侍者曰不仁退君已醉矣公乘不仁曰前車覆後車誡蓋言其危為人臣者不易為君亦不易今君已設令令可不行乎君曰善白而飲之以公乘不仁為上客又曰燕昭王問於郭隗曰寡人地狹民寡齊人削取八城匈奴驅馳樓煩之下以孤之不肖得承宗廟恐亡社禝存之有道乎隗曰帝者之臣其名臣也其實友也霸者之臣其名臣也其實僕也危國之臣其名臣也其實虜也今王將東面目指氣使以求臣則廝役之臣至矣南面聽朝不失揖讓之禮求臣則人臣之臣至矣北面等禮相亢下之以色不乘勢以求臣則朋友之臣至矣西面拘指逡巡而退以求臣則師傅之才至矣王誠欲興道隗請為天下之士開路於是燕王常置郭隗為上客三輔決錄曰頻陽游殷字季齊初為郡功曹有童子張既者時未知名為郡書佐殷察異之勑既過家具設賓饌及既至妻笑曰君甚勃乎張德容童昏小兒何異客哉殷曰卿勿怪乃方伯之器也殷遂與論霸王之事饗訖以子楚託之列女傳曰孟嘗君食客三千人廚有三列上客食肉中客食魚下客食菜齊市中有乞食人馮煖經冬無袴面有飢色願得上廚又曰漢中楊子拒妻字大英子仲珍有高名常請客母盛為供具從窗中窺客罷讓之曰吾視汝所交皆不及己此自損之道也後歲餘復請賓客皆耆德秀士母觀之喜曰吾無憂矣華陽國志曰任熙字伯遠開門待賓客朝無少長必有供膳陸績別傳曰孫策在吳張紘為上客共論四海未安當用武治而平之績年少未坐遙大聲言曰昔管仲相齊桓公九合諸侯一匡天下不用兵車孔子曰遠人不服修文德以來之今論者不務道德之術而唯當用武績雖童蒙竊所未安世說曰孫長樂兄弟就謝公宿言至駿雜劉大夫在壁後聽之具聞其論謝公明還問劉昨客何以劉荅曰亡兄未有如此賓客謝深有愧色郭子曰桓大司馬病篤桓溫字子元也謝公省病謝安字安石也從東門入桓遙矚而歎曰吾門中不久復見如此客蘇州志曰通賢橋東有吳丞相顧雍宅自雍至孟名著四代常居此宅門無雜賓投剌攝齊者不過一時英俊俗說曰謝僕射陶太常詣吳領軍坐久吳留客作食日已申使婢賣狗供客比得一頓食殆無復氣可語, WYG: 六}
