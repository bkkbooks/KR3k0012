  - {type: variant, offset: 1210, length: 490, content: 蒯通見曹相國曰婦人有夫死三日而嫁者有幽居守寡不嫁者足下即欲求婦何取曰取不嫁者通曰然則求臣亦猶是也彼東郭先生梁石君齊之俊士也隱居不嫁未嘗卑節下意以求仕也願足下使人禮之曹相國曰敬受命以為上客又曰公孫弘徒步數年至宰相封侯於是起客館開東閣以延賢人與參謀議弘身食一肉脫粟之飯故人賓客仰衣食奉祿皆以給之家無所餘其後李蔡與石慶為丞相府客館丘墟而已又曰蘇建嘗責大將軍至尊重天下之賢士大夫無稱焉願將軍觀古名將所招選者勉之哉青謝曰自魏其武安之厚賓客天子常切齒彼親待士大夫招黜賢不肖者人主之柄也人臣奉法遵職而已何與招士又曰大將軍既益尊姊為皇后然汲黯與抗禮或說黯自天子欲群臣下大將軍大將軍尊貴誠重君不可以不拜黯曰夫以大將軍有揖客反不重也大將軍聞愈賢黯大將軍衛青也又曰樓護字君卿為人短小精辯論聽之者皆竦然與谷永俱為五侯上客又曰成都侯王商子邑為大司馬貴重商故人皆敬事邑唯樓護自安如舊節邑亦父事之不敢有闕時請召賓客邑居樽下稱賤子上壽坐者百數皆離席伏唯護獨東向正坐又曰鄭當時為太子舍人每五日洗沐常置驛馬諸郊請謝賓客以夜繼日常恐不遍年少官薄然其知交皆天下名士又曰鄭當時始與汲黯列為九卿中廢賓客益少當時死家亡餘財先是, SBCK: ''}
