  - {type: variant, offset: 639, length: 0, content: '', SBCK: 定其交而後求又曰嗟爾朋友又曰朋來無咎毛詩曰伐木讌朋友故舊也自天子至于庶人末有不湏友以成者也親親以睦友賢不弃則民徳歸厚矣伐木丁丁鳥鳴嚶嚶嚶其鳴矣求其友聲又曰雖有兄弟不如友生又曰朋友攸攝攝以威儀攝􅂇也又曰旣見君子我心則喜又曰豈無他人唯子之好又曰言念君子温其如玉又曰未見君子憂心忡忡禮記曰君子不盡人之歡不竭人之忠以全交又曰君子之交淡如水小人之交甘如醴君子淡以成小人甘以壞又曰儒有合志同方營道同術相下不厭乆不相見聞流言不信義同而進不同而退其交友有如此者同方同術志行也門流言不信不信其友所行􅀍毁而謗之又曰隨武子利其君子忘其身忘其身不遺其友又曰父}
