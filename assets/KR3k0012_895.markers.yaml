  - {type: variant, offset: 44, length: 185, content: 衣以文繡置華屋之下啗以棗脯馬死欲以大夫禮葬之樂人優孟入殿門大哭曰請以人君之禮葬之以彫玉為棺文梓為槨豫章為題湊發甲卒為壙老弱負土諸侯聞之皆知大王賤人貴馬也王曰為之奈何請為王言六畜之葬以龍竈為槨銅音曆為棺齊以薑桂薦以木蘭衣以火光葬人腹中王乃以馬屬太官又曰巴蜀沃野西近卭笮有笮馬旄毛又曰馬蹄躈千躈苦吊切牛千足此亦比千乘之家又曰陸地牧馬二百蹄牛蹄角千皆與千戶侯等又曰東胡使求冒頓, WYG: ''}
