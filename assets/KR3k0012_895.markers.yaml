  - {type: variant, offset: 2456, length: 289, content: 人當以此為法是伯山所以勝我也又曰上始欲征匈奴與竇固等議出兵調度皆以為塞外草美可不須馬穀其各以固等將兵到燉煌當出塞上請馬穀上以固言前後相違怒不與穀皆言案軍出塞無穀馬故事馬防言宣帝時五將出征匈奴候騎得漢馬矢見其中有粟知漢兵出以故引去以是言之馬當與穀上善其用意微動勑下調馬穀防遂見親近又曰明德后詔書流布咸稱至德王主諸處莫敢犯禁廣平鉅鹿樂成王入問起居車騎鞌勒皆純黑無金銀采飾馬不踰六即賜錢五百萬又曰桓典為御史是時官官秉權典執政無所廻避常乘驄馬京帥畏憚為之語曰行行且止避驄馬御史獻帝春秋曰曹操與呂布軍戰敗布得操騎而不知是問曰曹使君何在荅曰騎黃馬者是也因得免魏志曰穢國出菓下馬漢時恒獻之馬高, WYG: 貞觀十}
