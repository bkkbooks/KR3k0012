  - {type: variant, offset: 437, length: 2, content: 家貧, SBCK: 各乗馬突陣而出賊以為謹也皆争逐之謹乃入塞三國典略曰西魏孝武將爲齊太祖所殺孝武索所乗波斯騮馬命太宰南陽王躍之將舉其鞍馬蹶而死帝惡之日晏還宫至後門馬驚不前捶之鞭折入謂潘弥曰今日幸}
  - {type: variant, offset: 437, length: 2, content: 家貧, krp: 各乗馬突陣而出賊以為謹也皆争逐之謹乃入塞三國典略曰西魏孝武將爲齊太祖所殺孝武索所乗波斯騮馬命太宰南陽王躍之將舉其鞍馬蹶而死帝惡之日晏還宫至後門馬驚不前捶之鞭折入謂潘弥曰今日幸}
