  - {type: variant, offset: 1303, length: 5, content: 大夫衛綰奏, WYG: 尤善文義及長頗習武藝誦孫呉兵法嘗與吕光太史令郭黁及其同母弟宋繇同宿黁起謂繇曰君當位極人臣李君有國土之分家有騧草}
