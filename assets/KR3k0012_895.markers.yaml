  - {type: variant, offset: 4, length: 2, content: 二史, SBCK: 三晉書曰王濟善解馬性甞乗一馬著連乾鄣泥前有水終不肯渡濟云此必是惜鄣泥使人解去便渡故杜預謂濟有馬癖又曰王師敗於蕩隂嵇紹􅀍害􅀄紹之行也侍中􅁗准謂曰今日向難卿有佳馬否紹正色曰大駕親征以正伐邪理必有征無戰􅀂使乗輿失守臣節有在駿馬何爲聞者莫不歎息載}
  - {type: variant, offset: 4, length: 2, content: 二史, WYG: 三晉書曰王濟善解馬性嘗乗一馬著連乾鄣泥前有水終不肯渡濟云此必是惜鄣泥使人解去便渡故杜預云濟有馬僻又曰王師敗於蕩隂嵇紹被害初紹之行也侍中秦準謂曰今日向難卿有佳馬否紹正色曰大駕親征以正伐逆理必有征無戰若使乗輿失守臣節有在駿馬何為聞者莫不歎息載}
