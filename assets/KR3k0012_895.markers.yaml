  - {type: variant, offset: 1351, length: 0, content: '', WYG: 冬氣末去日春風始其後陳主果為韓擒虎所敗擒虎黄斑之謂也破建康之始復乘青驄馬徃反時節皆相應隋書曰吐火羅國}
