  - {type: variant, offset: 2719, length: 217, content: 曰騎黃馬者是也因得免魏志曰穢國出菓下馬漢時恒獻之馬高三尺乘於菓樹下行又曰龐意討關羽親與羽交戰射羽中額時意常乘白馬羽軍謂之白馬將軍又曰陳思王表文帝曰臣於武皇帝世得大宛紫騂馬一疋形法應圖善持頭尾教令習拜今已能拜又能行與鼓節相應謹以奉獻又曰文帝與孫權書曰前使于禁及王敦去時所道騶吾鐵驪馬本欲使禁自致之念將軍儻欲速得今故先以付往此二馬朕常所自乘其調良善走數萬疋選之真可樂也中國雖饒馬其知名絕足亦時有耳又曰朱建平善相馬文帝將出取馬建平道遇之語人, SBCK: ''}
