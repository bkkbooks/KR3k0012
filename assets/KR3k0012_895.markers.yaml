  - {type: variant, offset: 237, length: 1, content: 群, SBCK: 作止馬詩而遣之示無欲也又曰武昭王暠字􅀇盛少而好學性沉敏寛和羙噐度通渉經史尤善於文義及長頗習武藝誦孫呉兵法甞與吕光太史令郭黁及其同母弟宋繇同􅀫黁起謂繇曰君當位極人}
  - {type: variant, offset: 237, length: 1, content: 群, krp: 作止馬詩而遣之示無欲也又曰武昭王暠字玄盛少而好學性沉敏寛和羙噐度通渉經史尤善於文義及長頗習武藝誦孫呉兵法甞與吕光太史令郭黁及其同母弟宋繇同宿黁起謂繇曰君當位極人}
  - {type: variant, offset: 239, length: 0, content: '', SBCK: 李君有國土之分家有騧草馬生白額駒此其時也吕光末京兆叚業自稱凉州牧以燉煌太守趙郡孟敏爲沙州刺史署􅀇盛效輦今敏尋卒燉煌護軍馮翊郭謙沙州治中燉煌索仙等以􅀇盛温毅有惠政推爲寧朔將軍燉煌太守􅀇盛􅀄難之會宋繇仕於業告歸燉煌言於􅀇盛}
  - {type: page-break, offset: 239, content: '', id: KR3k0012_SBCK_895-2a}
  - {type: variant, offset: 239, length: 0, content: '', krp: 李君有國土之分家有騧草馬生白額駒此其時也吕光末京兆叚業自稱凉州牧以燉煌太守趙郡孟敏爲沙州刺史署玄盛效輦今敏尋卒燉煌護軍馮翊郭謙沙州治中燉煌索仙等以玄盛温毅有惠政推爲寧朔將軍燉煌太守玄盛𥘉難之會宋繇仕於業告歸燉煌言於玄盛}
  - {type: punctuation, offset: 240, content: ：, id: KR3k0012_CHANT_895-bkkpn76}
  - {type: 'tls:seg', offset: 240, content: '', id: KR3k0012_CHANT_895-3a.10}
  - {type: punctuation, offset: 240, content: 『, id: KR3k0012_CHANT_895-bkkpn77}
  - {type: variant, offset: 240, length: 0, content: '', SBCK: 兄忘郭黁之言耶白額駒今巳生矣􅀇盛乃從之又曰􅁃亮所乗馬的顱殷浩以爲不利勸賣之亮曰􅂚有巳之不安移於人乎晉中興書曰㳟帝之爲琅邪王好竒戯閉一疋馬於門内令人射之欲觀幾箭而死左右曰馬國姓而射之不祥甚矣乃止俄而桓􅀇篡位續安帝紀曰司馬休之奔廣固慕容超有欲害心而休之不知休之常以所乗騅馬於牀前養飼忽連鳴不食注目視鞍休之試􅀍之即不動也訖還牀坐馬又驚跳因試􅀐視馬即驟岀裁至門外奔而馳之走行數里休之頋望所住巳有㓂至乗以南奔殆而􅀗免後還荆州加騅馬揚武之號王隱晉書曰馬隆子咸爲成都王前鋒長沙王所統冠軍司馬王湖率衆討咸於馬市咸堅不動湖乃使數十􅀐下馬縳㦸於鞍而令向咸又使數十􅀐各刾所放馬馬驚奔咸軍軍壞湖因馳逐猛戰臨陣斬咸于寳晉紀曰桓範岀赴曹爽宣王謂蔣濟曰智囊徃矣濟曰智則智矣駑馬戀芻豆爽必不能用也鄧粲晉紀曰王湛有隱兄弟宗族皆以爲癡居墓次不交當丗兄子濟性好馬所乗駿快意甚愛之湛曰此馬雖快力薄不堪苦近見督郵馬當勝此濟然之取督郵馬榖食十數日與湛試之湛未甞乗馬卒然便􅀐馳騁歩驟不異於濟而馬不相勝湛曰直行平路何以别馬唯當於蟻封於是就蟻封盤馬濟馬果倒躓濟乃服崔鴻十六國春秋曰驍􅀐將軍吕光封西域平上䟽曰唯􅀛兹據三十六國之中制彼王侯之命入其國城天􅂹龍麟腰􅙂丹髦萬計盈厩雖伯益更生衛賜復岀不能辨也又曰太上四年髙麗使至獻美女十人}
