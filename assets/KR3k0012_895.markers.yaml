  - {type: variant, offset: 1562, length: 525, content: 馬式還表上之曰夫行天莫若龍行地莫若馬馬者兵甲之本國之大用安寧則以別尊卑之序有變則以濟遠近之難昔有騏驥一日千里伯樂見之昭然不惑近世有西河子輿亦明相法子輿傳西河儀長孺長孺傳茂陵丁君都君都傳成紀楊子阿臣援嘗師事子阿受相馬骨法考之行事輒有效驗臣愚以為傳聞不如親見視影不如察形今欲形之於生馬則骨法難備又不可得傳之於後孝武皇帝時善相馬者東門京鑄作銅馬法獻之詔立於魯班門外更名魯班門曰金馬門臣謹備數家骨相以為法馬高三尺五寸圍四尺五寸詔置於宣德殿下以名為馬式焉又曰卓茂為丞相府史嘗出行有人認其馬茂問曰子亡馬幾何時對曰月餘日矣茂有馬數年心知其謬嘿解與之挽車而去顧曰若非公馬幸至丞相府歸我他日馬主別得亡者乃詣府送馬叩頭謝之茂性不爭如此又曰或問第五倫曰公有私乎對曰昔人有與吾千里馬者吾雖不受每三公有所選舉心不能忘而亦終不用也又曰光和元年京師馬生人京房易傳曰諸侯相伐闕妖馬生人又洪範五行傳云秦孝公二十一年傳有馬生人非其類也必有非姓者其後始皇蓋呂不韋子終以絕嗣此非姓也又曰光和四年春正月初置騄驥廄丞領受郡國調馬騄驥善馬也調謂徵發也豪右辜榷馬一疋至二百萬前書音義曰辜障榷專也謂障餘人賣買而自取其利又曰明帝賜東平王蒼陰太后器服及遺宛馬一疋血從前膊上小孔中出嘗聞武帝歌天馬霑赤汗今親, WYG: 霹靂}
