  - {type: variant, offset: 1331, length: 2, content: 昌邑, WYG: 君轡何疾偃曰牛駿馭精所以疾耳偃曰君馬何遲曰騏驥羅於羈絆所以居後偃曰何不着鞭使致千里荅曰一蹙造青雲何致與駑馬争路蕭子顯齊書楊玉夫殺宋蒼梧玉將首與}
  - {type: variant, offset: 1334, length: 2, content: 賀召, WYG: 敬則敬則送太祖夜乘常所騎赤馬入殿及踐祚號此馬為龍驤將軍後魏書曰高肇字首文文昭}
  - {type: page-break, offset: 1334, content: '', id: KR3k0012_WYG_895-6a, image: WYG0901/WYG0901-0019a.png}
  - {type: variant, offset: 1339, length: 1, content: 菓, WYG: 之兄也大舉征蜀以肇為大將軍都督面辭世宗於東堂親奉規略是日肇所乘駿馬停於神虎門外無故驚倒轉卧渠中鞍具瓦解人咸怪異肇辭出見而惡焉世宗崩肇還髙陽王與領軍于忠遣壯士殺之後周書曰于謹嘗率騎追茹茹前後十七戰盡降其衆嘗為賊所圍謹乗駿馬一紫一騧賊所先識乃使二人各乘馬突陣賊以為謹也皆争逐之謹乃入塞三國典略曰西魏孝武將為齊太祖所殺孝武索所乘波斯騮馬命太宰南陽王躍之將舉其鞍馬蹶而死帝惡之日晏還宫至後門馬驚不前捶之鞭折入謂潘彌曰今日幸無他不又曰髙歡歸朱爾榮劉貴事榮盛言歡美榮未之竒也歡更衣服重裘見焉因隨榮之廐廐有惡馬榮命剪之歡不絆剪竟不蹄齧己而起曰凡御惡人亦如此矣榮方坐歡於牀}
  - {type: page-break, offset: 1339, content: '', id: KR3k0012_WYG_895-6b, image: WYG0901/WYG0901-0019b.png}
  - {type: substitution, offset: 1339, original: 菓, replacement: 果, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-16696}}
  - {type: variant, offset: 1341, length: 0, content: '', WYG: 屏左右而訪時事歡曰聞公有}
  - {type: variant, offset: 1342, length: 0, content: '', WYG: 十二谷色别為羣將此竟何用也榮曰且言爾意歡曰方今天子愚弱左右淫亂四方雲擾朝政不行以明公雄武乘時奮發但將討鄭儼徐紇為辭舉鞭足以定天下此是賀六渾意榮大悦曰爾意即我意也自是每參軍謀又曰齊盧潛與特進慕容儼善儼之將死謂其子曰盧尚書教我為人我死之後將吾騂馬與之其子遂以他馬與潛儼死出𦵏柩停不肯進巫祝為儼聲曰盧尚書教我為人我以騂馬許之我死之後何意不與子懼而更之喪乃行潜以馬價為儼營福又曰齊馮子琮被執於省内以弓絃絞殺之使内㕘以庫車載其尸歸人無知者子琮所}
