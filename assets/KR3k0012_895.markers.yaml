  - {type: punctuation, offset: 1344, content: 《, id: KR3k0012_CHANT_895-bkkpn430}
  - {type: variant, offset: 1344, length: 0, content: '', WYG: 馬曳韁走以頭扣車狀如號哭見者異之車至其門諸子方握槊聞庫車來以為賜也大喜開視乃哭又唐貞觀中骨利幹遣使朝貢太宗遣雲麾將軍康蘇宻徃慰撫之仍列其地為𤣥闕州俄又遣使隨蘇宻使入朝獻良馬十疋太宗取其異者為之制名號為十驥一曰騰霜白二曰皎雪驄三曰凝露驄四曰懸光驄五曰决波騟六曰飛霞驃七曰發電赤八曰流金鍋九曰翔麟紫十曰奔虹赤又為文以叙其事又曰永徽中吐谷渾河源郡王慕容納遣使獻駿馬上問其馬之種性對曰臣國中之最者所以獻之上曰馬人之所欲豈可輟彼不足而加我之有餘哉乃命却之又曰永徽中駮馬國遣使朝貢其地在突厥之北漸近北海去京師一萬四千里户十萬勝兵三萬人馬三十萬疋馬色並駮故以為名又曰開元十二年太原獻異馬駒其耳如筒左右各十六肋無尾又曰天寶中隴右節度皇甫惟明奏龍支縣人庫狄孝義有馬生龍駒經九旬有九日身有麟而不生毛臣就檢視時有慶雲五色遥覆馬上久而不散伏望宣付史官以為實録従之又曰吐火羅國有頗梨山南崖穴中有神馬國人牧牝於側時産名駒皆汗血焉又曰李懐逺雖久居榮位而𢎞尚簡率其園宅無所改作嘗乘欵叚馬左僕射豆盧欽望謂曰公榮貴如此何不買駿乘荅曰此馬幸免驚蹶無假别求聞者莫不嘆美周史曰徐台符仕晉為翰林學士中書舍人契丹之陷中原也台符従敵帳北至於薊門及戎人内潰乃竄身南歸初台符所乘馬好嘶鳴及自北方囬常露宿於草中塞馬連羣經其左右而台符馬若箝其口然及行至漢地即嘶鳴如故時人謂為積善之所致也又曰齊王北伐太保領太僕安定王賀拔仁馬遲不及前鋒齊王讓之仁對曰御馬超逸羣下不逮齊王大怒免為庻人命之負炭輸於晉陽又曰周裴果字戎昭魏齊州刺史遵之子也従軍征討乘黄驄馬衣青袍毎先登陷陣時人號為黄驄年少又曰周賀若敦與侯􅖰相拒敦軍數有叛人乘馬投􅖰者輒納之乃别取一馬牽以赴船船中逆以鞭鞭之如是再三馬便畏船不上}
