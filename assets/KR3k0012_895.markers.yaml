  - {type: variant, offset: 446, length: 3, content: 家家監, SBCK: 謀又曰齊盧濳與特進慕容儼善儼之將死謂其子曰盧尚書教我爲人我死之後將吾騂馬與之其子遂以他馬與濳儼䘮出得停不肯進巫祝爲儼聲曰何意不與盧尚書騂馬其子遵命儼䘮乃行又曰齊馮子琮􅀍執於省内以弓􅁌絞殺之}
