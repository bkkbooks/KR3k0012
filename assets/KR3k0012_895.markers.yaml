  - {type: variant, offset: 440, length: 1, content: 錢, krp: 他不弥曰過夜半則大吉湏臾帝飲酒遇鴆而崩時年二十五謚曰孝武殯於草堂佛寺十餘年乃葬又曰髙歡歸尔朱榮劉貴事榮盛言歡羙榮未之竒也歡更衣服重求見焉因隨榮之厩厩有害馬榮命翦之歡不絆翦竟不蹄齧巳而起曰凢御惡人亦如此矣榮遂坐歡於牀下屏左右而訪時事歡曰聞公有馬十二各色別爲羣將此竟何}
  - {type: variant, offset: 442, length: 0, content: '', SBCK: 也榮曰且言爾意歡曰方今天子愚弱太后淫亂四方雲擾朝政不行}
