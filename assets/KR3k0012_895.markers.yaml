  - {type: variant, offset: 1397, length: 164, content: 以緹油屏泥於軾前絳襜絡又曰更始既誅王莽乃北都洛陽申屠建李松自長安傳送乘輿服御又遣中黃門從官奉迎遷都二年二月更始自洛陽而西初發李松奉引馬驚奔觸北宮鐵柱門三馬皆死續漢書曰禍也時更始失道將亡之徵又曰賈復持劉嘉書此渡河及光武於柏人因鄧禹得召見光武奇之禹亦稱有將帥節於是署復破虜將軍督盜賊復馬羸光武解左驂以賜之又曰馬援於交阯得駱越銅鼓乃鑄, WYG: ''}
