  - {type: variant, offset: 1003, length: 780, content: 因號曰天馬子也又天馬歌曰太一貺天馬千里下霑赤汗沫流赭大宛馬汗血沾濡也志俶儻精權奇籋浮雲籋音躡言馬上浮雲也晻音奄上馳體容與迣萬里迣音逝迣超踰今安匹龍為友又歌曰天馬來從西極涉流沙九夷服天馬來曆無草徑千里循東道天馬來開遠門竦子身逝崑崙天馬來龍之媒天馬龍之類馬來龍必至之媒也遊閶闔觀玉臺又曰孝武之世聞天馬蒲陶則通大宛安息自是之後明珠文甲通犀翠羽之珍盈於後宮龍文魚目汗血之馬皆駿馬也充於黃門又曰烏孫國大昆彌治赤谷城山多松樠不田作種樹畜逐水草與匈奴同俗國多馬富人至四五千疋又曰王褒聖主得賢臣頌曰及至駕齧𣍿驂乘旦王良執靶韓哀附輿縱馳騁騖忽如草靡過都越國蹶如歷塊追奔電逐遺風周流八極萬里一息何其遼哉人馬相得也又曰御史大夫衛綰奏馬高五尺九寸以上齒未平馬十歲齒下平不得出關又曰昌邑王賀召皇太后菓下馬乘之後漢書曰光武時有獻名馬者日行千里又進寶劍價兼百金帝以馬駕鼓車劍賜騎士又曰劉盆子既立乘鮮車大馬赤屏泥赤屏泥謂以緹油屏泥於軾前絳襜絡又曰更始既誅王莽乃北都洛陽申屠建李松自長安傳送乘輿服御又遣中黃門從官奉迎遷都二年二月更始自洛陽而西初發李松奉引馬驚奔觸北宮鐵柱門三馬皆死續漢書曰禍也時更始失道將亡之徵又曰賈復持劉嘉書此渡河及光武於柏人因鄧禹得召見光武奇之禹亦稱有將帥節於是署復破虜將軍督盜賊復馬羸光武解左驂以賜之又曰馬援於交阯得駱越銅鼓乃鑄為馬式還表上之曰夫行天莫若龍行地莫若馬馬者兵甲之本國之大用安寧則以別尊卑之序有變則以濟遠近之難昔有騏驥一日千里伯樂見之昭然不惑近世有西河子輿亦明相法子輿傳西河儀長孺長孺傳茂陵丁君都君都傳成紀楊子阿臣援嘗師事子阿受相馬骨法考之行事輒有效驗臣愚以為傳聞不如親見視影不如察形今欲形之於生馬則骨法難備又不可得傳之於後孝武皇帝時善相馬者東門京鑄作銅馬法獻之詔立於魯班門外更名魯班門曰金馬門臣謹備數家骨相以為法馬高三尺五寸圍四尺五寸詔置於宣德殿下以名為馬式, SBCK: ''}
