  - {type: variant, offset: 2162, length: 256, content: 從事奏濟陰太守單匡贓罪并連匡兄中常侍車騎將軍超三府喭曰車如雞栖馬如狗疾惡如風朱伯厚續漢書曰張奐字然明為安定屬國都尉堯離湳奴感切上奐馬二十疋大豪嘗以金渠八枚遺奐奐召主簿張祁入於羌前以酒酹地曰使馬如羊不得以入廄使金如粟不得以入懷盡還不受東觀漢記曰張湛為光祿勳帝臨朝或有惰容湛輒諫其失常乘白馬上每見湛輒言白馬生復諫矣事具職官部光祿篇又曰吳漢兵守成都公孫述將延岑遣奇兵出吳漢兵後襲擊破漢漢墮水緣馬尾得出又曰杜林字伯山與馬援鄉里素相親厚援從南方還時林馬適死援令子持馬一疋遺林曰朋友有車馬之饋可具以備乏林受之居數月林遣子奉書, WYG: 閃電王笑}
