  - {type: variant, offset: 231, length: 768, content: 馬冒頓問群臣群臣曰千里馬匈奴寶也勿與冒頓曰與人鄰國奈何惜一馬遂以與也又曰冒頓圍高祖於平城所騎西方盡白馬東方盡青龍北方盡烏驪南方盡騂馬又曰郭隗謂燕昭王曰臣聞古人有以千金求市千里馬而不能得於是與涓人金請為市之齎千金覔之而絕域有千里馬已死乃用五百金市其首而還王怒曰安用死馬首乎徒費五百金涓人荅曰死馬首尚用五百金況生馬乎天下以王好馬馬必將至矣未朞年果有獻千里馬者三疋又曰任安為衛將軍舍人與田仁會俱為舍人居門下心同相愛二人家貧無錢用以事將軍家家監使養惡齧馬兩疋同床臥仁竊言曰不知人哉家監任安曰將軍尚不知人乃況家監也又曰項王駿馬名騅常騎及被圍於垓下乃悲歌忼苦莽切愾苦改切為歌詩曰力拔山兮氣蓋世時不利兮騅不逝及至烏江謂亭長曰吾騎此馬五歲所當無敵嘗一日千里不忍殺以賜公又曰大宛有善馬在貳師城匿不肯與漢使天子既好宛馬使壯士車令等持千金以請宛王貳師城善馬宛國饒漢物相與謀曰貳師馬宛寶馬也遂不肯與漢使怒妄言推金而去宛貴人怒遮攻漢使取財物天子大怒拜李廣利為貳師將軍發屬國騎及郡國惡少年數萬人以伐宛期至貳師城取善馬漢書曰孝文皇帝時有獻千里馬者詔曰鸞旗在前屬車在後吉行日五十里朕乘千里之馬獨先安之乃還馬又曰鄭當時以任俠自喜孝景時為大子舍人五日洗沐常置驛馬長安諸郊請謝賓客夜以繼日又曰萬石君過官門闕必下車趍見輅馬必式焉又曰石建為太僕奏事自下讀之驚恐曰書馬者與尾而五今乃四獲譴死矣又石慶為太僕御出上問車中幾馬慶以策數馬畢曰六馬又曰初天子發易書發易書以卜也以卜曰神馬當從西北來得烏孫馬好名曰天馬及得宛汗血馬益壯更名烏孫馬曰西極馬宛馬曰天馬又曰武帝求賢詔曰馬或奔踶而致千里士有負俗之累而立功名夫泛駕之馬亦在御之而已又曰元狩二年馬生余吾水中在朔方北元鼎四年馬生渥洼水中作天馬之歌又曰大宛國別邑七十餘城多善馬汗血言其先天馬子也言大宛國喬山其上有馬不可得因取五色馬母置其下與集生, WYG: ''}
