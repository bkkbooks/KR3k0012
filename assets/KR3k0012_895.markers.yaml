  - {type: variant, offset: 407, length: 0, content: '', SBCK: 一疋羊􅂡去地九寸拜蒲長水校尉廪丘公宋書曰宋大明五年吐谷渾拾寅遣使獻舞馬沈約宋書曰鮮卑二子長曰吐谷渾少曰若洛廆􅀂洛廆别爲渾庶長廆正嫡父在特分七百戸與渾渾與廆二部俱牧馬馬􅃲相傷廆怒讓渾曰􅃲在馬而怒及人耶乖別甚易今當去汝萬里於是擁馬西行廆悔悟深自咎責遣舊父老及長吏乙郍樓追渾令還渾曰我是卑庶理無並大今以馬致别殆天所啓諸君試擁馬令東馬若還東我當相隨去即使二千􅀐共遮馬令廻馬廻不盈三百歩顃然悲鳴西走聲􅀂頽山如是}
  - {type: page-break, offset: 407, content: '', id: KR3k0012_SBCK_895-3b}
  - {type: variant, offset: 407, length: 0, content: '', krp: 一疋羊鬚去地九寸拜蒲長水校尉廪丘公宋書曰宋大明五年吐谷渾拾寅遣使獻舞馬沈約宋書曰鮮卑二子長曰吐谷渾少曰若洛廆若洛廆别爲渾庶長廆正嫡父在特分七百戸與渾渾與廆二部俱牧馬馬鬪相傷廆怒讓渾曰鬪在馬而怒及人耶乖別甚易今當去汝萬里於是擁馬西行廆悔悟深自咎責遣舊父老及長吏乙郍樓追渾令還渾曰我是卑庶理無並大今以馬致别殆天所啓諸君試擁馬令東馬若還東我當相隨去即使二千騎共遮馬令廻馬廻不盈三百歩顃然悲鳴西走聲若頽山如是}
