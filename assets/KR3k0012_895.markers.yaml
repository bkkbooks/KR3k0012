  - {type: variant, offset: 429, length: 0, content: '', SBCK: 後相去數十歩瑀蹋徒合切馬及之謂偃曰君轡何疾偃曰牛駿馭精所以疾耳偃曰君馬何遟曰騏􅂹羅於覉絆所以居後偃曰何不着鞭使致千里荅曰一蹙造青雲何至與駑馬争路蕭子顯齊書曰楊玉夫殺宋蒼梧王將首與王敬則敬則送太祖太祖夜乗常所􅀐赤馬入殿及踐祚号此馬爲龍驤將軍後魏書曰髙肇字道文文昭王太后之兄也大舉征蜀以肇爲大將軍都督諸軍面辭丗宗於東堂親奉䂓略是日肇所乗駿馬停於神虎}
