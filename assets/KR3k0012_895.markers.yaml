  - {type: variant, offset: 1098, length: 200, content: 草徑千里循東道天馬來開遠門竦子身逝崑崙天馬來龍之媒天馬龍之類馬來龍必至之媒也遊閶闔觀玉臺又曰孝武之世聞天馬蒲陶則通大宛安息自是之後明珠文甲通犀翠羽之珍盈於後宮龍文魚目汗血之馬皆駿馬也充於黃門又曰烏孫國大昆彌治赤谷城山多松樠不田作種樹畜逐水草與匈奴同俗國多馬富人至四五千疋又曰王褒聖主得賢臣頌曰及至駕齧𣍿驂乘旦王良執靶韓哀附輿縱馳騁騖忽如草靡過都越國蹶如歷塊追奔電逐遺風周流八極萬里一息何其遼哉人馬相得, WYG: 欲}
