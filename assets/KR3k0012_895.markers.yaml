  - {type: variant, offset: 2920, length: 209, content: 善相馬文帝將出取馬建平道遇之語人曰此馬之相今日死矣帝將乘馬馬惡衣香嚙帝𣍿帝大怒即殺之魏書曰曹公所乘馬名絕影為矢所中傷頰及足吳書曰孫堅於西華失利堅被瘡墮馬臥草中軍眾分散不知堅所在堅所騎驄馬馳還營棓地鳴呼將士隨馬於草中得堅又曰諸葛恪為將蜀使至上謂使曰元遜為將軍君還蜀可報丞相為致佳馬恪起陳謝上曰卿未得馬何為謝對曰夫蜀陛下外廄陛下有詔臣必得之是以謝也吳志曰魏使以馬求易珠璣翡翠瑇瑁孫權曰此皆孤所不用而可以得馬何苦而不聽與交易, WYG: 御覽卷八百}
