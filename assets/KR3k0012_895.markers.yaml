  - {type: variant, offset: 1321, length: 4, content: 歲齒下平, WYG: 騎共遮馬令迴馬迴不盈三百步欻然悲鳴西走聲若頽山如是者十餘迴又曰劉瑀為右衞將軍年位本在何偃前孝武初偃為吏部尚書瑀圖侍中}
