  - {type: variant, offset: 1314, length: 0, content: '', WYG: 拜滿長水校尉廪邱公宋書曰宋大明五年吐谷渾拾寅遣使獻善舞馬沈約宋書曰鮮卑二子長曰吐谷渾少曰若洛廆若洛廆别為慕容氏渾庻長廆正嫡父在時分七百户與渾渾與廆二部俱牧馬馬鬭相傷廆怒讓渾渾曰鬭在馬而怒及人耶乖别甚易今當去汝萬里於是擁馬西行廆悔悟深自責遣舊父老及長吏乙那樓追渾令還渾曰我是卑庶理無並大今}
