  - {type: variant, offset: 1309, length: 3, content: 高五尺, WYG: 生白額駒此其時也吕光末年弑段業自稱凉州牧以燉煌太守趙郡孟敏為沙州刺史署𤣥盛効榖令尋卒燉煌䕶軍馮翊郭謙沙州治中燉煌索仙等以𤣥盛溫毅有惠政推為寧朔將軍燉煌太守𤣥盛初難之會宋繇仕於業告歸燉煌言於𤣥盛曰兄忘郭黁之言耶白額駒今已生矣𤣥盛乃従之又曰庾亮所乗馬的顱殷浩以為不利勸賣之亮曰曷有己之不安移於人乎晉中興書曰恭帝之為琅琊王好竒戲閉一疋馬於門内令人射之欲觀幾箭而死左右曰馬國姓而射之不德甚矣乃止俄而桓𤣥􅆲位續安帝紀曰司馬休之奔廣固慕容超有欲害心而休之不知休之常所乗騅馬於牀前養飼忽連鳴不食注目視鞍休之試披之不動也訖還牀坐馬又驚跳因試騎視馬即驟出裁至門外奔而馳之行十餘里休之顧望所住已有兵至乗馬南奔殆而獲免後還荆州加騅馬揚武之號王隱晉書曰馬龍子咸為成都王前鋒長沙王所統冠軍司馬王湖率衆討咸於馬市咸堅不動湖乃使數十騎下馬縛㦸於鞍而令向咸又使數十騎各郟所放馬馬驚奔咸軍軍壊湖因馳逐猛戰臨陣斬咸于寶晉紀曰桓範出赴曹爽宣王謂蔣濟曰智囊徃矣濟曰智則智矣駑馬戀芻豆爽必不能用也鄧粲晉紀曰王湛有隱德兄弟宗族皆以為癡居墓次不交當世兄子濟性好馬所乗駿快意甚愛之湛曰此馬雖快力薄不堪苦近見督郵馬當勝此濟不然之取督郵馬榖食十數日與湛試之湛未嘗乗馬率然便騎馳騁步驟不異於濟而馬不相勝湛曰直行平地何以别馬唯當於蟻封於是就蟻封試馬濟馬果躓濟乃服崔鴻十六國春秋曰驍騎將軍吕光封西域還上疏曰唯龜兹據三十六國之中制彼王侯之命入其國城天驥龍麟腰䮍丹髦萬計盈廐雖伯益再生衞賜復出不能辦也又曰太康四年髙麗使至獻美女十人千里馬一疋兖州民王滿率衆二千來降獻馬一疋羊鬚去地}
