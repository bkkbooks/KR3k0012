  - {type: variant, offset: 2041, length: 677, content: 而自取其利又曰明帝賜東平王蒼陰太后器服及遺宛馬一疋血從前膊上小孔中出嘗聞武帝歌天馬霑赤汗今親見其然也又曰明德馬后過濯龍門上見外家門起居者車如流水馬如游龍倉頭衣綠褠褠臂衣今之臂褠以縛左右手於事便也顧視御者不及遠矣謝承後漢書曰朱震字伯厚性剛烈初為從事奏濟陰太守單匡贓罪并連匡兄中常侍車騎將軍超三府喭曰車如雞栖馬如狗疾惡如風朱伯厚續漢書曰張奐字然明為安定屬國都尉堯離湳奴感切上奐馬二十疋大豪嘗以金渠八枚遺奐奐召主簿張祁入於羌前以酒酹地曰使馬如羊不得以入廄使金如粟不得以入懷盡還不受東觀漢記曰張湛為光祿勳帝臨朝或有惰容湛輒諫其失常乘白馬上每見湛輒言白馬生復諫矣事具職官部光祿篇又曰吳漢兵守成都公孫述將延岑遣奇兵出吳漢兵後襲擊破漢漢墮水緣馬尾得出又曰杜林字伯山與馬援鄉里素相親厚援從南方還時林馬適死援令子持馬一疋遺林曰朋友有車馬之饋可具以備乏林受之居數月林遣子奉書曰將軍內施九族外有賓客望恩者多林父子兩人食列卿祿常有盈今送錢五萬援受之謂子曰人當以此為法是伯山所以勝我也又曰上始欲征匈奴與竇固等議出兵調度皆以為塞外草美可不須馬穀其各以固等將兵到燉煌當出塞上請馬穀上以固言前後相違怒不與穀皆言案軍出塞無穀馬故事馬防言宣帝時五將出征匈奴候騎得漢馬矢見其中有粟知漢兵出以故引去以是言之馬當與穀上善其用意微動勑下調馬穀防遂見親近又曰明德后詔書流布咸稱至德王主諸處莫敢犯禁廣平鉅鹿樂成王入問起居車騎鞌勒皆純黑無金銀采飾馬不踰六即賜錢五百萬又曰桓典為御史是時官官秉權典執政無所廻避常乘驄馬京帥畏憚為之語曰行行且止避驄馬御史獻帝春秋曰曹操與呂布軍戰敗布得操騎而不知是問曰曹使君何在, SBCK: 駿乗}
