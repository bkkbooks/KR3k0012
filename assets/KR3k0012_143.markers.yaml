  - {type: variant, offset: 2585, length: 927, content: 五十疋因此恚恨甚深稱疾不復見上上每入必他處廻避上數掩伺之不能得疾篤上執手流涕問所欲言后視上良久乃引被覆面崩于顯陽殿時年四十六上甚悼痛之詔永壽太守顏延之為哀策文其文甚麗也劉駿母路后沈約宋書曰文帝路淑媛諱惠男丹陽建康人也以色貌選入後宮生孝武拜為淑媛年既長無寵常隨世祖出藩世祖入討元兇淑媛留守尋陽上即位有司奉尊號曰皇太后第休之並超顯職太后頗豫政事賜與休之等財物家累千金居處器服與帝子相侔尋崩時年五十五遷殯東宮改東宮門題曰崇憲宮劉駿王后沈約宋書曰孝武文穆王皇后諱憲嫄琅邪臨沂人元嘉二十年拜武陵王妃生廢帝山陰公主世祖在藩后甚有寵上伐凶逆與太后同還京都立為皇后大明四年率六宮躬桑于西郊廢帝即位尊曰皇太后宮曰永訓其年崩于含章殿時年三十八祔葬景寧陵劉彧母沈婕妤沈約宋書文帝沈婕妤諱容姬納後宮為美人生明帝拜為婕妤元嘉三十年卒時年四十世祖即位追贈湘東國太妃太宗即位上尊號為皇太后劉彧王后沈約宋書曰明恭王皇后諱貞風瑯琊臨沂人也上嘗宮內大集而裸婦人觀之以為懽笑后以扇鄣面獨無所言帝怒曰外舍家寒乞今共為笑樂何獨不視后曰為樂之事其方自多豈有姑姊妹集聚而祼婦人形體以為樂外舍之為懽適實與此不同帝大怒遣后令起廢帝即位尊為皇太后元徽五年五月五日太后賜帝玉柄毛扇帝嫌其毛柄不華因此欲加酖害已令太醫煮藥左右止之曰若行此事官家便應作孝子豈復得出入交會帝曰汝語有大理乃止孝建元年薨于第時年四十四陳妃沈約宋書曰明帝陳貴妃諱妙登丹陽屠家女也太妃家在建康縣東家貧有草屋兩三間上出行見之賜錢三萬令起瓦屋尉自送錢與之家人並不在唯太妃在家時年十二三尉見其容質甚美即以白世祖於是迎入宮賜太宗始有寵一年許衰歇以乞將軍李道兒尋又還生廢帝故民中皆呼廢帝為李氏子廢帝踐祚號曰皇太妃輿服一如晉孝武太妃故事置家令一人改諸國太妃曰大姬劉昱江后沈約宋書曰後廢帝江皇后諱簡珪濟陽考城人太始五年太宗求太子妃而雅信小數名家女多不合后弱小門無強廕卜筮最吉為太子納焉太子即位為后帝既廢降為蒼梧王妃劉准母陳昭華沈約宋書曰明帝陳昭華諱法容丹陽人也太宗晚年諸弟姬人有懷孕者輒取入宮及生男殺其母而與六宮所愛者養之順帝桂陽王休範子也以昭華為母焉順帝即位進為皇太妃劉准謝后沈約宋書曰順帝謝后諱梵境光祿大夫莊孫女也昇明二年立為皇后順帝禪位降為汝陰王妃, SBCK: ''}
