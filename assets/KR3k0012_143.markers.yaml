  - {type: variant, offset: 3494, length: 3, content: 昇明二, WYG: 容德甚美初為太原公夫人及帝建中宫高隆之高德正言漢婦人不可為天下母宜更擇美配楊愔固請依漢魏故事不改元妃而德正猶固請廢后而立段昭儀欲以結勲貴之援帝竟不從而立后焉帝好捶撻嬪御乃至有殺戮者唯后獨蒙禮敬天保十}
  - {type: page-break, offset: 3494, content: '', id: KR3k0012_WYG_143-13b, image: WYG0894/WYG0894-0328d.png}
