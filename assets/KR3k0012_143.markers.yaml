  - {type: variant, offset: 1169, length: 205, content: 何恒左右之又太史言於運歷中后不可易皓信巫覡故得不廢常供養昇平宮長秋官僚備員而已受朝賀表疏如故皓內諸寵姬佩皇后璽蔽者多矣天紀四年隨皓遷于洛陽前趙劉淵母呼延妃崔鴻三十國春秋前趙錄曰左賢王妃呼延氏魏嘉平中祈子於龍門俄而一大白魚頭有二角軒髯躍鱗於龍門而至於祭所久之乃去巫覡皆異之曰此嘉祥也其夜夢旦所見魚變為人左手把一物大如半雞子光影非常授延氏曰此是日精服之生貴子自是十三月而生淵劉淵張后崔鴻三十國春秋前趙錄曰劉淵皇后張, WYG: 桓}
