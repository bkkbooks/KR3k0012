  - {type: variant, offset: 2988, length: 0, content: '', WYG: 者皆推扵貴妃而已御其次焉髙祖崩始興王叔陵為亂後主頼后與吴媪救而獲免後主即位尊后為皇太后宫曰𢎞範當此之時新失淮南之地隋師臨江又國遭大喪後主病瘡不能聽政其誅叔陵供太行䘮事邉境防守及百司衆務雖假以後主之命實皆决之扵后後主瘡愈乃歸政焉陳亡入長安隋大業十一年薨扵東都時年八十三𦵏於洛陽之邙山陳叔寳沈后陳書曰後主沈皇后諱婺華儀同三司憲侯君理女也母髙祖女㑹穆公主主早亡時后尚㓜而毁瘠過甚服畢每至嵗時朔望恒獨坐涕泣哀慟左右内外咸敬異焉大建三年納為皇太子妃後主即位立為皇后后生性端静寡嗜慾聰敏強記渉獵經史工書翰初後主在東宫而后父君理卒后居憂處别殿哀毁逾禮後主遇既薄而張妃寵傾後宫後宫之政並歸之后澹然未}
