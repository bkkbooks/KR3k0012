  - {type: variant, offset: 1378, length: 2, content: 懷寤, SBCK: 東昏宫建康城平髙祖納爲綵女天􅁥六年八月生丗祖㝷拜爲脩容常隨丗祖出蕃大同六年六月薨于江州内寢時年六十七歸葬江寧縣通望山謚曰宣丗祖即位追崇爲文宣太后蕭䌉王后梁書曰太宗簡皇后王氏諱靈賔瑯瑘臨沂人也祖儉太尉南昌文憲公后㓜}
