  - {type: variant, offset: 1636, length: 21, content: 侍勑左右停刑於是手䟽啟曰伏聞勑旨將為妾營殿, WYG: 見上有雲氣焉年十七適太祖嚴整有禮法家庭肅然宋泰豫元年殂葬宣帝墓側}
  - {type: punctuation, offset: 1642, content: ，, id: KR3k0012_CHANT_143-bkkpn427}
