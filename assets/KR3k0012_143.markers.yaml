  - {type: variant, offset: 615, length: 319, content: 吳志曰吳主權潘夫人會稽句章人父為吏坐死夫人與姊俱輸織室權見而異之召充後宮得幸有身夢有以龍頭授己者己以蔽膝受之遂生孫亮夫人為皇后性妬媚容自始至卒譖害甚眾權不豫夫人使問中書令張昭呂后專制故事侍疾疲勞因以羸病諸人伺其昏臥共縊殺之託言中惡後事泄坐死者六七十人權尋薨合葬蔣陵謝妃吳志曰吳主權謝夫人會稽山陰人也權聘以為妃愛幸有寵後權納姑孫徐氏欲令謝下之謝不肯由是失寵早卒徐妃吳志曰吳主權徐夫人吳郡富春人也初適同郡陸尚尚卒權娉以為妃使母養子登後權以夫人妬忌廢之以疾卒孫亮全后吳志曰孫亮全夫人全尚女也立為皇后孫綝廢亮為會稽王隨亮之國吳錄曰亮妻惠解有容色吳平乃歸永寧中卒孫休朱后吳志曰孫休朱夫人朱據女孫綝廢亮休立夫人為皇后休卒群臣尊夫人為皇太后孫皓即位月餘, SBCK: ''}
