  - {type: variant, offset: 3132, length: 247, content: 子豈復得出入交會帝曰汝語有大理乃止孝建元年薨于第時年四十四陳妃沈約宋書曰明帝陳貴妃諱妙登丹陽屠家女也太妃家在建康縣東家貧有草屋兩三間上出行見之賜錢三萬令起瓦屋尉自送錢與之家人並不在唯太妃在家時年十二三尉見其容質甚美即以白世祖於是迎入宮賜太宗始有寵一年許衰歇以乞將軍李道兒尋又還生廢帝故民中皆呼廢帝為李氏子廢帝踐祚號曰皇太妃輿服一如晉孝武太妃故事置家令一人改諸國太妃曰大姬劉昱江后沈約宋書曰後廢帝江皇后諱簡珪濟陽考城人太始五年太宗求太子妃而雅信小數名家女多不合后弱小門無強廕卜筮最吉為太子納焉太子, WYG: 昭}
