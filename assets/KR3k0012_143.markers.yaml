  - {type: variant, offset: 1398, length: 227, content: 聰劉聰呼延后崔鴻三十國春秋前趙錄曰劉聰皇后呼延氏淵后之從父妹有美色恭孝稱於宗族淵后愛聰姿貌故以配焉每謂聰曰父終子紹古今之大典陛下自承高祖之嗣太弟何為者哉陛下百年後粲兄弟必無種也願陛下深思之聰亦信之曰然吾當為計后曰事留變生太弟見粲兄弟並大必有不安之志矣或有小人構間其中未必不禍發于今日妾常聞陛下說魯隱公事一何相似竊為陛下寒心聰深然其言於是相圖之計起矣大劉后崔鴻三十國春秋前趙錄曰劉聰皇后劉氏殷長女也字麗芳以左貴嬪立為皇后聰將起𪃫儀殿廷尉陳元達諫聰大怒將斬之, WYG: ''}
