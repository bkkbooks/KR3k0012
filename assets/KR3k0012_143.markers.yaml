  - {type: variant, offset: 3498, length: 0, content: '', WYG: 改為可賀敦后孝昭即位䧏居昭信宫號昭信皇后高演元后北齊書曰孝昭皇后元氏開府元蠻女也初為常山王妃天保末賜姓歩六孤孝昭即位}
  - {type: punctuation, offset: 3502, content: 。, id: KR3k0012_CHANT_143-bkkpn874}
