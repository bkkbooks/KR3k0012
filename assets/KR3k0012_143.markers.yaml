  - {type: variant, offset: 3502, length: 0, content: '', WYG: 帝崩梓宫之鄴始度汾橋武成聞后有竒藥追索之不得使閹人就車頓辱䧏居}
  - {type: page-break, offset: 3502, content: '', id: KR3k0012_WYG_143-14a, image: WYG0894/WYG0894-0329a.png}
  - {type: variant, offset: 3503, length: 0, content: '', WYG: 成宫武成既殺樂陵王元被閟隔不得與家相知宫闈内忽有飛語}
  - {type: variant, offset: 3504, length: 3, content: 禪位降, WYG: 令檢推得后父兄書信元蠻由是坐免官后以齊亡入周氏宫中隋文帝作相放還山東高湛胡后北齊書曰武成皇后胡氏安定胡延之女其母范陽盧道約女初懐孕有胡僧詣門曰此宅瓠蘆中有月既而生后天保初選}
