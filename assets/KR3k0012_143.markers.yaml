  - {type: variant, offset: 935, length: 324, content: 為景皇后稱安定宮孫皓母何太后吳志曰孫和何姬丹陽句容人也父遂本騎士孫權嘗遊幸諸營而何姬觀於道中權望見異之命宦者召入以賜子和生男權喜名之曰彭祖彭祖即皓也後徙和居新都遣使賜嫡妃張氏自殺何姬曰若皆從死誰當養孤遂撫育皓及其王弟皓即位尊和為昭獻皇帝何姬為昭獻皇后月餘進為皇太后焉孫皓滕后吳志曰孫皓滕夫人故太常胤之族女也胤夷滅夫人父牧以踈遠徙邊郡孫休即位大赦得還以牧為五官中郎皓既封烏程侯娉牧女為妃皓即位為皇后封牧高密侯拜衛將軍錄尚書事時人以牧尊戚頗推令諫爭而夫人寵漸衰皓滋不悅皓母何恒左右之又太史言於運歷中后不可易皓信巫覡故得不廢常供養昇平宮長秋官僚備員而已受朝賀表疏如故皓內諸寵姬佩皇后璽蔽者多矣天紀四年隨皓遷于洛陽前趙劉淵母呼延妃崔鴻三十國春秋前趙錄曰左賢, SBCK: 爲}
