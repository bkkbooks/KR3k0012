  - {type: variant, offset: 217, length: 743, content: 劉禪張后蜀志曰後主敬哀皇后車騎將軍張飛長女章武元年納為太子妃建興元年立為皇后小張后蜀志曰後主小張皇后飛小女隨後主遷于洛陽吳孫堅吳后吳志曰孫堅吳夫人權之母也本吳人徙錢塘早失父母與弟居孫堅聞其才貌欲娶之吳氏親戚嫌堅輕狡將距焉堅甚慚恨夫人謂親戚曰何愛一女以取禍乎如有不遇命也於是遂許為婚生四男一女及權少年統業夫人助理國政甚有補益建安七年臨薨引見張昭等囑以後事孫權步后吳志曰吳主權步夫人臨淮淮陰人也以美麗得幸於權寵冠後宮夫人性不嫉妬多所推進故久見愛權為王及帝意欲以為后群臣議在徐氏權依違者十餘年然宮內皆稱皇后親戚上䟽稱中宮及薨臣下緣權旨請追正名號乃贈皇后印綬二王后吳志曰吳主權一土夫人琅琊人也夫人以選入宮得幸生孫和權將立為后而全公主素憎夫人數加譖毀及權寢疾言有喜色由是權深責怒以憂死吳志曰吳主權王夫人南陽人也生孫休及和為太子和母貴諸姬有寵者皆出居外夫人出在公安卒因葬焉休即位遣使追尊曰敬懷皇后改葬敬陵潘后吳志曰吳主權潘夫人會稽句章人父為吏坐死夫人與姊俱輸織室權見而異之召充後宮得幸有身夢有以龍頭授己者己以蔽膝受之遂生孫亮夫人為皇后性妬媚容自始至卒譖害甚眾權不豫夫人使問中書令張昭呂后專制故事侍疾疲勞因以羸病諸人伺其昏臥共縊殺之託言中惡後事泄坐死者六七十人權尋薨合葬蔣陵謝妃吳志曰吳主權謝夫人會稽山陰人也權聘以為妃愛幸有寵後權納姑孫徐氏欲令謝下之謝不肯由是失寵早卒徐妃吳志曰吳主權徐夫人吳郡富春人也初適同郡陸尚尚卒權娉以為妃使母養子登後權以夫人妬忌廢之以疾卒孫亮全后吳志曰孫亮全夫人全尚女也立為皇后孫綝廢亮為會稽王隨亮之國吳錄曰亮妻惠解有容色吳平乃歸永寧中卒孫休朱后吳志曰孫休朱夫人朱據女孫綝廢亮休立夫人為皇后休卒群臣尊夫人為皇太后孫皓即位月餘貶為景皇后稱安定宮孫皓母何太后吳志曰孫和何姬丹陽句容, WYG: ''}
