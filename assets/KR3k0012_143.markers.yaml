  - {type: variant, offset: 3479, length: 1, content: 順, WYG: 彭城太妃尒朱榮之女魏孝荘后也神武納為别室敬重踰扵婁妃見必束帶自稱下官神武迎蠕蠕公主還尒朱迎扵木井北與蠕蠕公主前後别行不相見公主引角弓仰射翔鴟應弦而落妃亦引弓仰射飛鳥亦一發而中神武喜曰此二婦並堪擊賊後為尼神武為起佛寺天保初為太妃及文宣狂酒將無禮扵太妃太妃不從遂遇禍髙澄元后北齊書曰文㐮敬皇后元氏魏孝静}
  - {type: page-break, offset: 3479, content: '', id: KR3k0012_WYG_143-12b, image: WYG0894/WYG0894-0328b.png}
  - {type: variant, offset: 3481, length: 1, content: 謝, WYG: 之妹也孝武帝時封馮翊公主而歸扵文㐮容德兼美曲盡和敬初生河間王孝琬時文㐮為世子三日而孝静幸世子第贈錦綵及布帛萬疋世子辭求通受諸貴禮遺扵是十屋皆滿次生兩公主文宣受禪尊為文㐮皇}
  - {type: page-break, offset: 3481, content: '', id: KR3k0012_WYG_143-13a, image: WYG0894/WYG0894-0328c.png}
