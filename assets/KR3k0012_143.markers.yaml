  - {type: punctuation, offset: 1648, content: 『, id: KR3k0012_CHANT_143-bkkpn429}
  - {type: variant, offset: 1648, length: 354, content: 伏聞勑旨將為妾營殿今四海未一禍難猶繁廷尉之言社稷之計當賞以美爵而反欲誅之陛下此怒由妾而起廷尉之禍由妾而招自古國敗家喪未始不由婦人妾每覽古事忿之不忘何意今日妾自為之後人觀妾猶妾之視前人復何面目仰侍巾櫛請歸死此堂以塞陛下誤惑之過聰覽之色變曰朕此來得微風之患意怒不自由元達忠臣命其冠履就坐引元達以劉后表示曰外輔如公等內輔如此后朕亦何憂矣小劉后崔鴻三十國春秋前趙錄曰聰后劉氏殷小女字麗華童齒聰惠膚髮異常晝營女工夜誦書傳母每止之敦翫彌甚與諸兄爭論經義理旨超然諸兄常深歎謝性孝友善風儀進止如珪璋焉以貴嬪立為皇后殷二女四孫皆姿色超世女德冠時聰並納之自是六劉之寵傾於後宮建元中流星起於牽牛入紫微龍形委蛇其光照地落平陽北十里視之則肉臭聞于平陽肉傍常有哭聲晝夜不止聰甚惡之劉后產一蛇一虎各害人而走尋之不得頃見隕肉之傍劉氏卒偽謚武, SBCK: 髙祖}
