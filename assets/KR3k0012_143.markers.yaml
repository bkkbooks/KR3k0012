  - {type: variant, offset: 3483, length: 0, content: '', WYG: 高洋李后北齊書曰文宣皇后李氏}
  - {type: variant, offset: 3484, length: 8, content: 梵境光祿大夫莊孫, WYG: 祖娥趙郡李希宗}
  - {type: punctuation, offset: 3486, content: ，, id: KR3k0012_CHANT_143-bkkpn871}
