  - {type: variant, offset: 1375, length: 0, content: '', SBCK: 諱尚柔范陽方城人也祖次惠宋濮陽太守后母蕭氏即文帝從姑宋元嘉中嬪於太祖生長沙宣武王懿永陽昭王敷次生髙祖􅀄后嘗於室内忽見庭前菖蒲生花光彩照灼非丗中所有后驚視謂侍者曰汝見不對曰不見后曰常聞見者當冨貴因遽取吞之是月産髙祖將産之夜后見庭内􅀂有衣冠陪列焉次生衡陽宣王暢義興昭長公主令嫕宋泰始七年殂於秣陵縣同夏里舎葬武進縣東城里山天􅁥元年五月甲辰追上尊號爲皇后謚曰獻蕭􅄛郗后髙祖德皇后郗氏諱徽髙平金郷人也祖紹宋國子􅀕酒領東海王帥父燁太子舎人早卒􅀄后母㝷陽公主方娠}
