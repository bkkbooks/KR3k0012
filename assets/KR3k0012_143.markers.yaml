  - {type: variant, offset: 2037, length: 1, content: 三, SBCK: 餘歳以梁大同中歸于丗祖髙祖之討侯景丗祖時在呉興景遣使收丗祖及后景平乃獲免髙祖踐祚永定元年后爲臨川王妃丗祖即位立爲皇后陳頊栁后陳書曰髙宗栁皇后諱敬言河東解縣人也曽祖丗隆侯景之亂與弟盼徃江陵依梁元帝以長城公主之故待遇甚原及髙宗赴江陵元帝以后配焉承聖二年后生後主於江陵明年江陵䧟髙宗遷于􅀜右后與後主留穰城天嘉二年與後主還朝后爲安城王妃髙宗即位立爲皇后后美姿容身}
