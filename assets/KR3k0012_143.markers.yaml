  - {type: variant, offset: 1375, length: 0, content: '', krp: 諱尚柔范陽方城人也祖次惠宋濮陽太守后母蕭氏即文帝從姑宋元嘉中嬪於太祖生長沙宣武王懿永陽昭王敷次生髙祖𥘉后嘗於室内忽見庭前菖蒲生花光彩照灼非丗中所有后驚視謂侍者曰汝見不對曰不見后曰常聞見者當冨貴因遽取吞之是月産髙祖將産之夜后見庭内若有衣冠陪列焉次生衡陽宣王暢義興昭長公主令嫕宋泰始七年殂於秣陵縣同夏里舎葬武進縣東城里山天監元年五月甲辰追上尊號爲皇后謚曰獻蕭衍郗后髙祖德皇后郗氏諱徽髙平金郷人也祖紹宋國子祭酒領東海王帥父燁太子舎人早卒𥘉后母㝷陽公主方娠}
  - {type: variant, offset: 1376, length: 1, content: 日, SBCK: 人云當生貴子及生后有赤光照于室內器物盡明家人皆怪之巫言此女光適有所妨乃於水濵祓除之后㓜而明慧善􅀠書讀史傳女工之事無不閑習宋後廢帝將納爲后齊􅀄安陸王緬又欲結婚郗氏並辭以女疾乃止建元末髙祖始娉焉生永興公主玉姚永丗公主玉婉永康公主玉嬛建武五年髙祖爲雍州刺史先之鎭後乃迎后至州未幾殂於襄陽官舎時年三十二明年歸葬南徐州武進縣二年齊朝進髙祖位相國封梁公詔贈后爲梁公妃髙祖踐祚追崇爲皇后丁貴嬪梁書曰髙祖丁貴嬪諱令光譙國人也丗居襄陽貴嬪生于樊城􅀄産有神光之異紫煙滿室故以爲名相者云此女當大貴髙祖臨州丁氏因人以聞嬪時年十四髙祖納焉􅀄貴嬪生而有赤誌在左臂治之不滅至是無何忽失所在事德皇后小心􅕼敬甞於供養經案之側髣髴􅀂見神人心獨異之髙祖義師起昭明太子始誕育貴嬪與太子留在州城京邑平乃還京都天􅁥元年五月有司奏爲貴人未拜其年八月又爲貴嬪位在三夫人上居于顯陽殿阮脩容髙祖阮脩容諱令嬴夲姓石㑹稽餘姚人也齊始安王遥光納焉遥光敗後}
  - {type: page-break, offset: 1376, content: '', id: KR3k0012_SBCK_143-3b}
