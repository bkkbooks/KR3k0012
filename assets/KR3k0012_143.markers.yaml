  - {type: 'tls:seg', offset: 2987, content: '', id: KR3k0012_CHANT_143-29a.7}
  - {type: variant, offset: 2987, length: 0, content: '', WYG: 祖儉太尉南昌文憲公后㓜而柔明淑徳叔父暕見之曰吾家女師也天監十一年拜晉安王妃生哀太子大器南郡王大連長山公主妙䂮大通三年十月拜皇太子妃太清三年三月薨扵永福省時年四十五其年太宗即位追崇為皇后諡曰簡太寳元年九月葬莊陵蕭繹徐妃梁書曰元帝徐妃諱昭佩東海郯人也祖孝嗣齊太尉枝江文忠公父緄侍中信武將軍妃以天監十六年十二月拜湘東王妃生世子方等益昌公主含貞妃無容質不見禮帝三二年一入房妃以帝𦕈一目每知帝將至必為半面粧以俟帝見則大怒而出妃性嗜酒多洪醉帝還房必吐衣既而貞恵世子方諸母王氏寵愛未幾而終元帝歸咎扵妃及方等死愈見疾太清三年遂逼令自殺妃知不免乃投井死帝以屍還徐氏謂之出妻葬江陵瓦官寺陳霸先章后陳書曰髙祖宣皇后章氏諱要兒吴興烏程人也本姓鈕父景明為章氏所養因改姓焉景明梁代官至散騎侍郎后母蘇氏嘗遇道士以小龜遺已光彩五色曰三年有徴及期后生而紫光照室因失龜所在后少而聰慧美容儀手爪長五寸色紅白每有朞功之服則一爪先折善書計能誦詩及楚辭髙祖自廣州南征交趾命后與衡陽王昌随世祖由海道歸於長城侯景之亂髙祖下至豫章后為侯景所囚景平髙祖為長城縣公后拜夫人及髙祖踐祚永定元年立為皇后髙祖崩后與中書舍人蔡景厯定計秘不發哀召世祖入纂世祖即位尊后為皇太后令黜廢帝為臨海王命髙祖嗣位大建元年册尊后為皇太后二年三月甲申崩扵紫極殿時年六十五陳蒨沈后陳書曰世祖沈皇后諱妙容吴興武康人也父法深梁安州録事后年十餘嵗以梁大同中歸扵世祖髙祖之討侯景世祖時在吴興景遣使収世祖及侯景平乃獲免髙祖踐祚永定元年后為臨川妃世祖即位立為皇后陳頊桞后陳書曰髙祖栁皇后諱敬言河東觧縣人也曾祖世隆侯景之亂與弟昐往江陵依梁元帝帝以長城公主故恩遇甚厚及髙祖赴江陵元帝以后配焉承聖二年后生後主於江陵明年江陵陷髙祖遷於關右后與後主留㐮城天嘉二年與後主還朝后為安城王妃髙祖即位立為皇后后美姿容身長七尺二寸手垂過膝初髙祖居鄉里先娶吴興錢氏女及即位拜為貴妃甚有寵幸后傾心下之每尚方供奉之物其}
