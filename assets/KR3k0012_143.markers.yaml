  - {type: variant, offset: 2555, length: 84, content: 待后恩禮甚篤袁氏貧薄后每就上求錢帛以贍與之上性節儉所得不過三五十疋因此恚恨甚深稱疾不復見上上每入必他處廻避上數掩伺之不能得疾篤上執手流涕問所欲言后視上良久乃引被覆面崩于, WYG: 歸扵}
