  - {type: variant, offset: 2997, length: 1, content: 觀, WYG: 唯尋閲圖史佛經為事陳亡與後主俱入長安及後主薨后自製哀辭文甚酸切隋煬帝每巡幸恒令從駕及煬帝為宇文化及所害后自廣陵過江還鄉里不知所終張貴妃陳書曰後主張貴妃名麗華兵家女也家貧父兄以織蓆為業後主為太子選入宫是時龔貴嬪為良娣貴妃年十嵗後主見而悦焉因得幸遂有娠生太子深後主即位拜為貴妃妃性聰慧甚被寵遇後主每引見貴妃與賓客逰宴貴妃薦諸宫女預焉後宫等咸德之競言貴妃之善由是愛傾後宫又好厭魅之術假鬼道以惑後主置淫祠扵宫中聚諸妖巫使之鼓舞因叅訪外人間有一言一事妃必知}
