  - {type: variant, offset: 1387, length: 236, content: 富者人之情性所不學而俱顯也今有無袟祿之俸爵邑之人而與之比者命曰素封又曰蜀卓氏之先趙人用鐵冶富秦破趙遷卓氏見虜略獨夫妻推輦行諸遷虜少有餘財爭干吏求近卜處葭萌唯卓氏曰此地挾薄吾聞岷山之下沃野下有蹲鴟至死不飢民工於市易賈乃求遠遷致之臨邛大喜即鐵山鼓鑄運籌策漢蜀之民富至僮千人田池射獵之樂擬於人君程鄭山東遷虜也亦冶鑄賈椎結之民富埒卓氏俱居臨邛也漢書曰甯成既被刑乃詐刻傳出關歸家曰仕不至二千石賈不至千萬安可比人乎乃廣貸陂曲千餘頃假貧人役使數千家致產數千萬為任俠又曰張耳大梁人少時魏公, SBCK: 淮南}
