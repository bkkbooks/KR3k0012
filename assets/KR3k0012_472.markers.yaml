  - {type: variant, offset: 244, length: 0, content: '', WYG: 大唐者勾踐治以為義肥饒謂之富中王子年拾遺記曰郭況累金數億庭中起高閣厯衡石於其上以稱量珠玉謂之瓊厨金窟張淵廣州記曰豪富子女以金銀為大釵執以和銅鼓與主}
