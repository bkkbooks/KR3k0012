  - {type: variant, offset: 288, length: 0, content: '', SBCK: 之家孰與我冨獻子曰吾家甚貧我有二士曰顔回慈無靈此二士者使吾􅀖家安平百姓和恊客出宣子曰彼君子也以畜賢爲冨我鄙人也以鍾石金玉爲富孔子曰孟獻子之冨也可著於春秋也歸藏曰上有髙臺下有雝池以此事君其貴􅀂化􅀂以賈市其冨如河漢列子曰虞氏者梁之冨人也家旣完盛錢金無量財貨無比登髙樓臨大路設樂陳酒擊搏樓上管子曰凢爲國之道}
