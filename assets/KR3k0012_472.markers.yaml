  - {type: 'tls:seg', offset: 284, content: '', id: KR3k0012_CHANT_472-6a.7}
  - {type: variant, offset: 284, length: 2, content: 史鰌, SBCK: 名爲車子擥嘖乃悟曰吾昔夢從天換錢外白以張車子錢貸我必是子也財當歸之矣自是居日衰减車子長冨於周家又曰京兆長安有張氏者獨處室有鳩自外入于室止于對床張氏惡之披懷而祝曰爲我禍耶飛上承塵爲我福耶來入我懷鳩飜入懷以手探之則不知鳩之所在而得一金帶鈎焉遂寳之自是後子孫昌盛貲財萬倍故關西稱張氏鈎又曰河間管弼僑居臨水北岸田作啇賈往往如意嘗載兩舫米下都糶垂行忽於宅中見一物形似鼉而長大行還輙大得利如此一家遂巨冨二十年恒有萬斛米續搜神記曰廬陵巴丘人夕晃者丗以田作爲業年市田數十頃家漸冨晉太元􅀄秋収巳過穫刈都畢明旦至田禾悉復滿鬱然如先即便更穫於是遂巨冨列女傳曰陶荅子妻者陶大夫荅子之妻也子治陶三年名譽不興家冨三倍其妻數荅子怒曰非汝所知居五年從車百乗歸休宗人牽牛酒而賀之其妻抱兒而泣姑怒其不祥也婦曰夫子能薄而官大是謂縈害無功而家昌是謂積殃昔楚令尹之治國家貧而國冨君敬之民戴之故福禄結於子孫名垂於後丗今夫子貪冨務大不頋後害妾聞南山有􅀇豹霧􅀨七日不下食何也飽其志飢其腹將欲以澤其毛衣而成其文章也故藏而逺害豕不擇食以肥身坐而湏死今夫子治陶家日益冨而國日益貧君不敬人不戴也夫子之逢禍必矣請去頋與少子俱脫於是遂弃之出其年荅子之家果以盗誅母老而免婦乃與少子歸養終始天年録異傳曰昔廬陵邑子甌明者從容賈道經彭澤湖每輙以舡中所有多少投湖中云以爲禮積數年後過見湖中有大道道上多風塵有數吏乗車馬來􅀱云是青洪君使要明知是神然不敢不往甚怖問吏恐不得還吏曰無可怖責洪君以君前後有禮故要君必重送君者皆勿收獨求如願尓去果以繒帛送明辭之乃求如願神大怪明知之意甚惜不得巳呼如願使隨去如願者青洪婢也常使之取物明將如願歸所欲輙得之數年大成冨人意漸驕盈不復愛如願嵗朝鷄一鳴呼如願如願不起明大怒欲捶之如願乃走明逐之於糞上糞上有昨日故歳掃除聚薪如願乃於此得去明不知謂逃在積薪糞中乃以杖棰使出乆無出者乃知不能困曰汝但使我冨不復捶汝今丗人歳朝鷄鳴時轉往捶糞云使人冨也韓詩外傳曰陳之冨人有處師氏者校車百乗觴於韞兵之止風俗通曰河南平隂龐儉本魏郡鄴人遭倉卒之丗失其父時儉三歳弟􅂊襁抱耳流傳客居廬里中鑿井得錢千餘萬遂温冨儉作府吏躬親家事行求老倉頭謹信屬任者年六十餘直二萬錢使主牛馬耕種有賔婚大會母在堂上酒酣陳樂歌􅀏奴在竈下助厨竊言堂上母我婦也客罷婢語次􅀃老奴無􅃺爲妄語所􅀃不可道也窮誌具白母謂婢試問其形􅃺奴曰家居鄴時在冨樂里宛西婦艾氏女字阿横大兒字阿嶷小兒曰越子時爲縣吏爲人所畧賣阿撗右足下有黒子右胲下赤誌如半櫛母曰是汝公也因下堂相對啼泣兒婦前爲汝公拜即洗浴身見衣􅀍遂爲夫婦如􅀄時人爲之語曰廬里諸龐鑿井得銅買奴得公子孫羞之言我先人􅀄居廬里者兄弟二人家買奴得公尓丗􅀃曰司徒王戎旣貴且冨區宅僮役膏􅃾水碓之屬洛下莫有比契䟽鞅掌夜與夫人燭下散籌筭計又曰武帝嘗降王武子家武子供饌並不用盤悉用琉璃器婢子百餘人皆綾羅袴褶以手擎飲食蒸肫肥美於常味武帝恡問何由得尔云以人乳飲之武帝色甚不平所下飲食未畢便去又曰王君夫以􅏁䊇澳釡石季倫以蠟炊君夫作絲布步障四十里崇作錦歩障五十里石以椒爲􅅺􅅺屏王以赤石脂􅅺壁新序曰魯孟獻子聘於晉韓宣子觴之飲三徒鍾石之懸不移而具獻子曰冨哉宣子}
