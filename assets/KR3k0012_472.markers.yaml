  - {type: variant, offset: 277, length: 5, content: 退見史鰌給, SBCK: 曰善曙覺言之於是夫妻戮力晝夜以治生所爲輙得貲至千萬先時有嫗者常往擥嘖傭賃墅舎有身月滿孕使遣岀駐車屋下産得皃主人往視哀其􅀌寒作麋粥以食之問當名汝兒作何嫗曰在車下生夢天}
  - {type: variant, offset: 277, length: 5, content: 退見史鰌給, krp: 曰善曙覺言之於是夫妻戮力晝夜以治生所爲輙得貲至千萬先時有嫗者常往擥嘖傭賃墅舎有身月滿孕使遣岀駐車屋下産得皃主人往視哀其孤寒作麋粥以食之問當名汝兒作何嫗曰在車下生夢天}
