  - {type: variant, offset: 225, length: 0, content: '', SBCK: 古者庻賤􅀐繩校草鞮皮薦而巳今冨者黄金銀鑣􅄢繡掩汗又曰燕之􅃰葪趙之邯鄲魏之温軹韓之滎陽}
  - {type: variant, offset: 225, length: 0, content: '', WYG: 古者庶賤騎繩校草鞮皮薦而已今富者黄金銀鑣􅄢繡掩汗又曰燕之涿蒯趙之邯鄲魏之溫軹韓之滎陽}
  - {type: variant, offset: 225, length: 0, content: '', krp: 古者庻賤騎繩校草鞮皮薦而巳今冨者黄金銀鑣罽繡掩汗又曰燕之涿葪趙之邯鄲魏之温軹韓之滎陽}
  - {type: variant, offset: 226, length: 0, content: '', SBCK: 之臨淄楚之宛陳鄭之陽翟冨冠海内皆爲天下名都也魏文帝典論曰雒陽郭珍居財巨億毎暑夏召客侍婢數十盛裝飾披羅縠使之進酒劉義}
