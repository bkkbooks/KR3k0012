  - {type: variant, offset: 91, length: 6, content: 富潤屋德潤身, SBCK: 黄帝設五法布之天下用之無窮盖丗有能知者莫不尊榮如范子可謂暁之矣子貢吕不韋之徒頗預焉自是以後無其人曠絶一百有餘年管子設輕重九府行伊尹之術則桓公以覇九合諸侯一匡天下范蠡爲越相三江五湖之間民冨國強卒以擒呉功成而弗居變名易姓之陶自謂朱公行十術之計二十一年之間三致千萬再散與貧桓寛塩鐵論曰古者盂樽杯飲蓋無爵無觴今冨者銀劒黄耳罍樽玉鋪}
