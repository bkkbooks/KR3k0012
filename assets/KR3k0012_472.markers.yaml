  - {type: variant, offset: 262, length: 0, content: '', WYG: 我鄙人也以鍾石金玉為富孔子曰孟獻子之富也可著於春秋也歸藏曰上有高臺下有雝也以此事君其貴若化若以賈市其富如何列子曰虞氏者梁之富人也家既完盛錢金無量財貨無比登高樓臨大路設樂陳酒擊摶樓上管子曰凡為國之道必富人人富則易理者也七十九代之君法制不一號令不同然而居天下何也必國富而粟衆}
