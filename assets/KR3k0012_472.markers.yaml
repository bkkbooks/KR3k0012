  - {type: variant, offset: 107, length: 115, content: 對山澤所出問大夫之富曰有宰食刀祭器衣服不假問士之富以車對問庶人之富數畜以對周禮曰太宰掌建邦之六典以佐王平邦國六曰事典以富邦國左傳曰秦后子有寵於桓后子秦桓公子也景公之母弟公子鍼如二君於景其母曰不去懼選選數也君子奢富弗去君將數其罪而加, SBCK: 禄使}
