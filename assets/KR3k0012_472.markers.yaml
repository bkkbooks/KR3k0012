  - {type: 'tls:seg', offset: 249, content: '', id: KR3k0012_CHANT_472-5a.9}
  - {type: variant, offset: 249, length: 0, content: '', WYG: 故藏而遠害豕不擇食以肥身坐而須死今夫子治陶家日益富而國日益貧君不敬人不戴也夫子之逢禍必矣請去願與少子俱脫於是遂棄之出其年荅子之家果以盜誅母老而免婦乃與少子歸養終始天年錄異傳曰昔廬陵邑子甌明者從客賈道經彭澤湖每輙以船中所有多少投湖中云以為禮積數年後過見湖中有大道道上多風塵有數吏乗車馬來候云是青湖君使要明知是神然不敢不往甚怖問吏恐不得還吏曰無可怖青湖君以君前後有禮故要君必重送君者皆勿收獨求如願爾去果以繒帛送明辭之乃求如願神大怪明知之意甚惜不得已呼如願使隨去如願者青湖婢也常使之取物明將如願歸所欲輙得之數年大成富人意漸驕盈不復愛如願歲朝雞一鳴呼如願如願不起明大怒欲捶之如願乃走明逐之於糞上糞上有昨日故歲掃除聚薪如願乃於此得去明不知謂逃在積薪糞中乃以杖捶使出久無出者乃知不能困曰汝但使我富不復捶汝今世人歲朝雞鳴時轉徃捶糞云使人富也韓詩外傳曰陳之富人有處師氏者校車百乗觴於韞丘之上風俗通曰河南平陰龎儉本魏郡鄴人遭倉卒之世失其父時儉三歲弟纔襁褓耳流傳客居廬里中鑿井得錢千餘萬遂富儉作府吏躬親家事行求老蒼頭謹信屬任者年六十餘直二萬錢使主牛馬耕種有賓婚大㑹母在堂上酒酣陳樂歌笑奴在竈下助厨竊言堂上母我婦也客罷奴語次說老奴無狀為妄語所説不可道也窮詰具白母謂婢試問其形狀奴曰家居鄴時在富樂里宛西婦艾氏女字阿横大兒字阿嶷小兒曰越子時為縣吏為人所畧賣阿横右足下有黒子右胲下赤志如半櫛母曰是汝公也因下堂相對啼泣兒婦前為汝公拜即洗浴易著衣被遂為夫婦如初時人為之語曰廬見諸龎鑿井得銅買奴得公子孫羞之言我先人初居廬里者兄弟二人家買奴得公爾世説曰司徒王戎既貴且富巨宅僮役膏腴水碓之屬洛下莫有比契疏鞅掌夜與夫人燭下散籌計筭又曰武帝嘗降王武子家武子供饌並不用盤悉用琉璃器婢子百餘人皆綾羅袴褶以手擎飲食蒸肫肥美於常味武帝怪問}
