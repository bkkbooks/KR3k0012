  - {type: variant, offset: 1517, length: 379, content: 至僮千人田池射獵之樂擬於人君程鄭山東遷虜也亦冶鑄賈椎結之民富埒卓氏俱居臨邛也漢書曰甯成既被刑乃詐刻傳出關歸家曰仕不至二千石賈不至千萬安可比人乎乃廣貸陂曲千餘頃假貧人役使數千家致產數千萬為任俠又曰張耳大梁人少時魏公子母忌為客嘗亡命遊外黃富人女甚美庸奴其夫亡邸父客如淳曰父時賓客也謂曰求賢夫從張耳女聽為請決嫁之女家厚奉給耳以故致千里客官為外黃令陳餘亦大梁人好儒術遊趙苦陘富人公乘氏以妻之餘年少父事耳相與為刎頸交又曰梁孝王未死財以巨萬計不可勝數及死藏府餘黃金尚四十萬斤他財物稱是也又曰張安世尊為公侯食邑萬戶然身衣弋綈夫人自紡績家僮七百人皆有手伎作事內治產業累積纖微是以能植其貨富於大將軍光也又曰卓氏女文君亡奔司馬相如相與歸成都家徒四壁立相如與俱之臨邛盡賣車騎置酒舍乃令文君當壚相如身自著犢鼻褌與傭保雜作滌器於市中卓王孫恥之為杜門不出昆弟諸公謂王孫曰有一男兩女所乏者, WYG: 而}
