  - {type: variant, offset: 265, length: 2, content: 初衛, krp: 張永家地有泉出小龍在焉從此遂爲冨室踰年因雨騰躍而去於是生貲日不暇給俗說云與龍共居不知龍神効矣說苑曰楚王問莊辛曰君子之冨柰何對曰君子之冨假貸人不買也飲食人不便不役也親戚愛之罪人善之不尚者事之皆欲其壽樂不傷於患此君子之冨也論衡曰楊子雲作法言蜀冨賈人齎錢十萬願載書子雲不能曰夫冨無仁義猶圏中之羊安得妄載三輔决録曰平陵士孫奮字景卿少爲郡五官掾起宅得錢貲至一億七千萬冨聞京師而性儉恡客舎雇錢甚少主人曰君士大夫惜錢如此欲作孫景卿耶不知實是景卿從子端梁兾掾奮送絹五疋食以干魚兾問奮何以相送端以實對兾素聞奮冨且恡乃以一鏤安革遺奮從貸錢五千萬奮知兾貪暴畏之以三千萬與兾大怒乃告郡許認奮母爲守官藏婢云盗白珠十斛紫金千萬收考奮兄弟死獄中財貲盡没越絶書曰冨中大塘者勾踐治以爲義肥饒謂之冨中王子年拾遺記曰郭况累金數億庭中起髙閣厝衡石於其上以稱量珠玉也謂爲瓊厨金窟張淵廣州記曰豪冨子女以金銀爲大釵執以叩銅鼓與主人名爲銅鼓釵西京雜記曰茂陵冨人袁廣漢藏鏹萬億八九百人於芒山下築園東西四里南北五里百歩激流注其内構石爲山髙十餘丈連延數里養白鸚鵡紫鴛鴦旄牛青兕竒禽恠獸委積其間也劉道真錢塘記曰防海塘去邑一里郡議曹華信家冨立此塘以防海水始開募有能致土一石即與錢一升旬日之間來者雲集塘未成而譎不復取皆弃置而去塘以之成於是改爲錢塘羅浮山記曰牛潭深洞無極北岸有石周貟三丈討魚人見金牛自水而出磐于此石義興周靈甫嘗見此牛寝伏石上旁有金鏁如索繩焉周甫素銳勇徃掩此牛掣断其鏁得二丈許遂以財雄于寳搜神記曰魏郡張巨本冨忽衰死散賣宅與程應舉家疾病賣與何文文先獨持大刀暮入北堂梁上至一更見人丈餘髙冠赤幘呼曰細腰細腰應喏何以有人氣荅無便去文往向呼處因問向赤衣冠誰荅是金也在屋西壁下問君誰荅云我杵也今在竈下文掘得金三百斤燒去杵由此大富宅清寕又曰元康中屢縣瑶懷家忽聞池中有犬聲視之得犬子雌雄各一長老云此名犀大得之者冨又曰有周擥嘖者貧而好道夫婦夜耕困卧夢天}
