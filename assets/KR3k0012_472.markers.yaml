  - {type: variant, offset: 231, length: 8, content: 邑與晏子晏子不受, SBCK: 家錢來觸籬援誤落在餘處皆拾而得之㝷巨冨錢至數千萬異苑曰晉陵曲阿湯貺財數千萬三呉}
  - {type: variant, offset: 231, length: 1, content: 邑, WYG: 家錢來觸籬援誤落在餘處皆拾而得之尋巨富錢數至千萬異苑曰晉陵曲阿湯貺財數千萬三吳人多取其直為商賈治生輙得倍宜或行長江卒暴風及刼盜者若投錢多獲免濟貺死後先所埋金皆移去鄰人嘗晨起見門外忽有百許萬錢封題是湯貺姓字然後知財物聚散必由天運也又曰張永家地有泉出小龍在焉從此遂為富室踰年因雨騰躍而去於是生貲日不暇給俗說云}
