  - {type: variant, offset: 240, length: 3, content: 問曰富, SBCK: 多取其直爲啇賈治生輙得倍直或行長江卒􅁀風及刼盗}
  - {type: variant, offset: 240, length: 0, content: '', WYG: 不便不役也親戚愛之罪人善之不尚者事之皆欲其壽樂不傷於患此君子之富也論衡曰揚子雲作法言蜀富賈人贏錢十萬願載書子雲不能曰夫富無仁義猶圈中之羊安得妄載三輔决録曰平陵士孫奮字景卿少為郡五官掾起宅得錢貲至一億七千萬富聞京師而性儉恡客舎顧錢甚少主人曰君士大夫惜錢如此欲作孫景卿耶不知實是景卿從子端梁冀掾奮送絹五疋食以千魚冀}
  - {type: variant, offset: 240, length: 3, content: 問曰富, krp: 多取其直爲啇賈治生輙得倍直或行長江卒暴風及刼盗}
  - {type: variant, offset: 241, length: 0, content: '', WYG: 奮何以相送端以實對冀素聞奮富且恡乃以一鏤安革貽奮從貸錢五千萬奮知冀貪暴畏之以三千萬與冀大怒乃告郡詐認奮母為守官藏婢云盜白珠十斛紫金千萬收考奮兄弟死獄中財貲盡没越絶書}
