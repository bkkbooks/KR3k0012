  - {type: variant, offset: 903, length: 308, content: 家累千金又曰齊俗賤奴虜而刁間獨貴人之桀黠奴人所患也惟刁間收使之逐漁鹽商賈之利或連騎交守相然愈益任終得其力起富數千萬又曰范蠡浮海出齊變名姓自謂鴟夷子皮耕於海畔苦身務力父子治生無幾何致錢數千萬齊人聞賢以為相范蠡嘆曰居致千金官則至卿相此布衣極又受尊名不祥乃歸相印盡散財以分於知交鄉黨懷其重寶間行以去止於陶以為此天下之中交易有無之路通為生可致富矣於是自謂陶朱公復約身又耕畜勞居候時轉物逐什一之利居無何則致貲累巨萬天下稱陶朱公也又曰子貢既學於仲尼退而仕於衛廢著鬻財曹魯之門徐廣曰子貢傳云廢居著猶居也讀音如貯七十子徒賜最為饒原憲不饜糟糠匿於窮巷子貢結駟車騎束帛之幣以聘諸侯所至國君無不界迎與杭禮者夫使孔子名布揚於天下者子貢先後之, SBCK: ''}
