  - {type: variant, offset: 244, length: 0, content: '', krp: 若投錢多獲免濟貺死後先所埋金皆移去隣}
  - {type: variant, offset: 245, length: 17, content: 之所欲也何為不受對曰我非惡富恐失富, SBCK: 嘗晨起見門外忽有百許萬錢封題是湯貺姓字然後知財物聚散必由天運}
  - {type: variant, offset: 245, length: 0, content: '', WYG: 名為銅鼓釵西京雜記曰茂陵富人袁廣漢藏鏹萬億八九百人於邙山下築園東西四里南北五里百步激流注其内搆石為山高十餘丈連延數里養白鸚鵡紫鴛鴦旄牛青兕竒禽恠獸委積其閒劉道眞錢塘記曰防海塘去邑一里郡議曹華信家富立此塘以防海水始開募有能致土一石即與錢一升旬日之間來者雲集塘未成而譎不復取皆棄置而去塘以之成於是改名錢塘羅浮山記曰牛潭深洞無極北岸有石周員三丈許漁人見金牛自水而出磐於此石義興周靈甫嘗見此牛寢伏石上旁有金鏁如索繩周甫素銳勇往掩此牛掣斷其鏁得二丈許遂以財雄干寶捜神記曰魏郡張巨本富忽衰死散賣宅與程應舉家疾病賣與何文文先獨持大刀暮入北堂梁上至一更見人丈餘高冠赤幘呼曰細腰細腰應諾何以有人氣荅無便去文往向呼處因問向赤衣冠誰荅是金也在屋西壁下問君誰荅云我杵也今在堂竈下文掘得金三百斤燒去杵由此大富宅亦清寧又曰元康中婁縣瑶懷家忽聞池中有犬聲視之得犬子雌雄各一長老云此名犀犬得之者富又曰有周臨子者貧而好道夫婦夜耕困卧夢天公過而哀之勅外有以給與司禄案云此人相貧限不過此唯有張車子應賜錢千萬車子未生請以借之公曰善曙覺言之於是夫妻戮力盡夜以治生所為輙得貲至千萬先時有嫗者常往臨子傭賃野合有身月滿孕使遣出駐車屋下産得兒主人往視哀其孤寒作糜粥貽之問當名汝兒作何嫗曰在車下生夢天告之名為車子臨子乃悟曰吾昔夢從天得錢外白以張車子錢貸我必是子也財當歸之矣自是居日衰減車子長富於周家又曰京兆長安有張氏者獨處室有鳩自外入于室止于對床張氏惡之披懷而祝曰為我禍耶飛上承塵為我福耶來入我懷鳩飜入懷以手探之則不知鳩}
