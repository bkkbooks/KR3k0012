  - {type: variant, offset: 245, length: 17, content: 之所欲也何為不受對曰我非惡富恐失富, krp: 嘗晨起見門外忽有百許萬錢封題是湯貺姓字然後知財物聚散必由天運}
  - {type: variant, offset: 247, length: 0, content: '', WYG: 在而得一金帶鈎焉遂寶之自是後子孫昌盛貲財萬倍故闗西稱張氏傳鈎又曰河間管弼僑居臨水北岸田作商賈往往如意嘗載兩舫米下都糶垂行忽於宅中見二物形似鼉而長大行還輙大得利如此一家遂巨富二十年恒有萬斛米續捜神記曰廬陵巴丘人夕晃者世以田作為業年常田數十頃家漸富晉大元初秋收已過穫刈都畢明旦至田禾悉復滿鬱然如先即便更穫於是遂巨富列女傳曰陶荅子妻者陶大夫荅子之妻也荅子治陶三年名譽不興家富三倍其妻數之荅子怒曰非汝所知居五年從車百乗歸休宗親牽牛酒而賀之其妻抱兒而泣姑怒其不祥也婦曰夫子能薄而官大是謂縈害無功而家昌是謂積殃昔楚令尹之治國家貧而國富君敬之民戴之故福禄結於子孫名垂於後世今夫子貪富務大不顧後害妾聞南山有𤣥豹霧雨七日不下食何也飽其志饑其腹將}
  - {type: page-break, offset: 247, content: '', id: KR3k0012_WYG_472-8a, image: WYG0897/WYG0897-0304a.png}
