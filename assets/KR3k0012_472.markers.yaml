  - {type: variant, offset: 2724, length: 215, content: 時仕州郡家累千金隱居養志好施周給每歲農時輒載酒肴於田間候勤勞者而勞之其墮孏者恥不致丹皆兼功自萬邑藂相率以致富殷其輕黠游薄廢業為患者輒曉其父兄使黜責之沒則賻給親自將護其有遭喪憂者輒待丹為辦也又曰馬防以病乞骸骨詔賜故中山王田廬以特進就第防弟貴盛奴婢各千人已上寶貨巨億皆買京師膏腴美業又大起第複觀連閣臨道彌貨曰街路多藂聲樂曲度比諸郊廟賓容畢至京兆杜篤之徒數百人常為食客居門下刺史守令多出其家謝承後漢書曰戴遵字子高富於貲產輕財好義賓客常三, WYG: 御覽卷}
