  - {type: variant, offset: 2522, length: 201, content: 世善農稼好貨殖性溫厚有法度三世共財子孫朝夕禮敬常若父家其營理產業物無所棄課役童隸各得其宜故能上下戮力財利歲倍至及廣開田土三百餘頃其所起廬舍皆有重堂高閣陂渠灌注池魚畜牧有求必給貲至巨萬而賑贍宗族恩加鄉閭又曰宣帝時陰子方者至孝有仁恩當臘日晨炊而竈神形見子方再拜受福家有黃羊因以祠之自是以後暴至巨富有田七百餘頃輿馬僕隸比於封君方常言我子孫必將強大至識三世而遂繁昌故後常以臘日祠竈而以黃羊又曰王丹字仲回京兆人哀, WYG: 太}
