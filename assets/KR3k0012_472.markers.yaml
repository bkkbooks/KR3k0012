  - {type: variant, offset: 3288, length: 437, content: 餘區倉頭八百人他珍寶奇異不可稱數又曰何曾遒豪累世人有小紙為書者曾勑記室勿報也蒸餅上不坼作十字不食食日膳萬錢猶曰無下筯處又曰刁達字伯道弟暢字仲遠次弘字叔仁各歷職州刺史兄弟子姪並不治名行競脩貨殖有田萬頃奴婢數千人義旗初建弘將謀起兵宋王遣劉毅誅之刁氏既富奴客從橫上山固澤為京口之蠹宋既誅暢散其穀帛金錢牛羊令民稱力取之彌日不盡時天下飢儉編戶菜色及刁氏之破百姓充足徐廣晉記曰石季倫甚富侈衣服妓樂誇於許史有妓人曰綠珠美孫秀欲之使人求焉崇盡出其婢妾數十人皆蘊蘭麝而被羅縠晉諸公讚和嶠字長輿逌之子也少知名以雅重稱常慕其舅夏侯玄之為人厚自封植嶷然不群拜黃門郎遷中書令轉尚書愍懷太子初立以嶠為少保加散騎常侍家產豊富擬王公而性至儉恡宋書曰沈攸之少貧及貴在荊州富擬王侯夜中諸廂廊然燭達曉曳珠玉者數百人皆一時絕妙孫巖宋書曰徐堪之產業豊富室宇園池貴遊莫及門生千餘皆三吳富人子每出入行遊塗巷盈滿唐書郝處俊侍中平恩公許圉師即處俊之舅早同州里俱官達於時又其鄉人田氏彭氏以殖貨見稱有彭志筠顯慶中上表請以家財絹布, WYG: ''}
