  - {type: variant, offset: 227, length: 3, content: 氏亡分, SBCK: 記曰王武子移第北芒下于時人多地貴濟好馬射買地作垀編錢布地竟埒時人號曰金埒又幽明録曰餘杭人沈縱家素貧與父同入山得一玉豚從此所向如意田􅅙並収家冨又曰海陵人黄㝷先居家單貧常因大風雨散錢飛至}
