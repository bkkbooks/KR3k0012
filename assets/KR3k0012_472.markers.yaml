  - {type: variant, offset: 2941, length: 346, content: 人時人名之關東大豪戴子高魏典略曰公沙穆字文人北海膠東人也體履清直兼學多文隱居東萊山中桓帝時有富人王仲者謂穆曰今多以貸仕吾奉子以百萬唯子所用穆荅曰斯意厚矣夫富貴在天得之有命以賄求爵姦莫大焉郡舉孝廉除郎中以高第為光祿主事吳書曰劉表亡曹公向荊州表子琮降以節迎曹公諸將皆疑其詐曹公以問婁子伯子伯曰天下擾攘各貪王命以自重今以節來是必至誠曹公大喜遂進近寵袟子伯家累千金公曰婁子伯富樂於孤但勢不如孤耳從破馬超等子伯功為多曹公常歎曰子伯之計孤不及也蜀志曰董和字幼宰南郡人益州牧劉璋以為牛鞞江原長成都令蜀土富實時俗奢侈貨殖之家侯服玉食婚姻葬送傾家竭產和躬率之以儉惡衣蔬食防遏踰僣為之軌制所在皆移風變善又曰麋笁字仲祖業貨殖僮客萬人貲產巨億王隱晉書曰石崇雖有人財而性麤強貪而好利富擬王者有司簿閱崇田宅財物及水碓有三, WYG: 七}
