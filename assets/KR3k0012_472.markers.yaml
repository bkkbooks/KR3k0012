  - {type: variant, offset: 1897, length: 324, content: 財今文君既失身於司馬長卿長卿故倦遊雖貧其人才足依也且又令客柰何相辱如此王孫不得已分與文君僮百人錢百萬及其嫁時衣被財物文君乃與相如歸成都買田宅為富人居又曰鮑宣上書哀帝曰柰何獨私養外親與幸臣董賢多賞賜以萬數奴從賓客漿酒藿肉蒼頭盧兒比日用致富非天意也又曰上使善相人相鄧通曰當貧餓死上曰然富通者在我何說貧於是賜通蜀嚴道銅山得自鑄錢鄧氏錢布天下其富如此餓部中亦出又曰原涉父哀帝時南陽太守時天下殷富大郡二千石死官賦歛送喪皆千萬以上妻子通共受之以定產業時又少行三年喪者及涉父死讓還南陽賻送行喪塚廬三年由是顯名京師遊使部中亦出又曰故秦陽以田農而甲一州以田地過限從而富貴為一州第一翁伯以脂而傾縣濁氏以賣脯而連騎張里以馬毉而擊鍾又曰宣曲任氏之先為督道倉吏秦之敗豪桀皆爭, WYG: ''}
