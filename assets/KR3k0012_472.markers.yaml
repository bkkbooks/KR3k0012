  - {type: variant, offset: 720, length: 182, content: 絲漆繭出取帛絮與之食趍時若猛獸鷙鳥之發又曰卓氏用鐵冶富又曰程鄭富埒卓氏又曰吳楚七國兵起時長安中列侯封軍從軍旅齎貸于錢子家以為侯邑國在關東成敗未決莫肯與唯無鹽氏捐千金貸息什之三月吳楚平一歲中則無鹽氏息十倍用此富埒關中又曰關中富商大賈盡諸田田蘭韋家粟氏安陵杜氏亦巨萬此其章章尤異者也皆非有爵邑奉祿弄法犯奸而富也盡推理去就與時俯仰獲其贏利以來致財用也又曰呂不韋往來販賤賣, WYG: ''}
