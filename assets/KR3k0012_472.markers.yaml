  - {type: variant, offset: 1624, length: 1460, content: 母忌為客嘗亡命遊外黃富人女甚美庸奴其夫亡邸父客如淳曰父時賓客也謂曰求賢夫從張耳女聽為請決嫁之女家厚奉給耳以故致千里客官為外黃令陳餘亦大梁人好儒術遊趙苦陘富人公乘氏以妻之餘年少父事耳相與為刎頸交又曰梁孝王未死財以巨萬計不可勝數及死藏府餘黃金尚四十萬斤他財物稱是也又曰張安世尊為公侯食邑萬戶然身衣弋綈夫人自紡績家僮七百人皆有手伎作事內治產業累積纖微是以能植其貨富於大將軍光也又曰卓氏女文君亡奔司馬相如相與歸成都家徒四壁立相如與俱之臨邛盡賣車騎置酒舍乃令文君當壚相如身自著犢鼻褌與傭保雜作滌器於市中卓王孫恥之為杜門不出昆弟諸公謂王孫曰有一男兩女所乏者非財今文君既失身於司馬長卿長卿故倦遊雖貧其人才足依也且又令客柰何相辱如此王孫不得已分與文君僮百人錢百萬及其嫁時衣被財物文君乃與相如歸成都買田宅為富人居又曰鮑宣上書哀帝曰柰何獨私養外親與幸臣董賢多賞賜以萬數奴從賓客漿酒藿肉蒼頭盧兒比日用致富非天意也又曰上使善相人相鄧通曰當貧餓死上曰然富通者在我何說貧於是賜通蜀嚴道銅山得自鑄錢鄧氏錢布天下其富如此餓部中亦出又曰原涉父哀帝時南陽太守時天下殷富大郡二千石死官賦歛送喪皆千萬以上妻子通共受之以定產業時又少行三年喪者及涉父死讓還南陽賻送行喪塚廬三年由是顯名京師遊使部中亦出又曰故秦陽以田農而甲一州以田地過限從而富貴為一州第一翁伯以脂而傾縣濁氏以賣脯而連騎張里以馬毉而擊鍾又曰宣曲任氏之先為督道倉吏秦之敗豪桀皆爭金玉任氏獨窖倉粟楚漢相距滎陽人不得耕種米石至萬四豪桀金玉盡歸任氏以此起富又曰安邑千樹棗燕秦千樹栗此其人皆與千戶侯等又曰劉德寬厚好施家產過百萬則以賑昆弟賓客又曰史丹盡得父財身又食大國邑數見褒賞賜累千金僮奴以百數後房妾數十人內奢淫好飲食極滋味聲色之樂又曰富者土木被文錦犬馬餘肉粟又曰中大夫張匡上書言王商宗族權勢合貲巨萬計私奴以千數又曰郡國富人兼利顓業以貨賂自行取重於鄉里者不可勝數又曰師史轉轂百數賈郡國無所不至能致千萬又曰京師富人杜楊樊嘉茂陵勢綱為天下高貲又曰所忠言貴家子弟富人或鬭雞走狗馬弋獵博戲亂齊人又曰成都羅裒貲至鉅萬又後漢書曰郭況遷大鴻臚上數幸其宅賞金帛甚盛京師號況家為金穴言其富貴也又曰樊童字君雲世善農稼好貨殖性溫厚有法度三世共財子孫朝夕禮敬常若父家其營理產業物無所棄課役童隸各得其宜故能上下戮力財利歲倍至及廣開田土三百餘頃其所起廬舍皆有重堂高閣陂渠灌注池魚畜牧有求必給貲至巨萬而賑贍宗族恩加鄉閭又曰宣帝時陰子方者至孝有仁恩當臘日晨炊而竈神形見子方再拜受福家有黃羊因以祠之自是以後暴至巨富有田七百餘頃輿馬僕隸比於封君方常言我子孫必將強大至識三世而遂繁昌故後常以臘日祠竈而以黃羊又曰王丹字仲回京兆人哀平時仕州郡家累千金隱居養志好施周給每歲農時輒載酒肴於田間候勤勞者而勞之其墮孏者恥不致丹皆兼功自萬邑藂相率以致富殷其輕黠游薄廢業為患者輒曉其父兄使黜責之沒則賻給親自將護其有遭喪憂者輒待丹為辦也又曰馬防以病乞骸骨詔賜故中山王田廬以特進就第防弟貴盛奴婢各千人已上寶貨巨億皆買京師膏腴美業又大起第複觀連閣臨道彌貨曰街路多藂聲樂曲度比諸郊廟賓容畢至京兆杜篤之徒數百人常為食客居門下刺史守令多出其家謝承後漢書曰戴遵字子高富於貲產輕財好義賓客常三四百人時人名之關東大豪戴子高魏典略曰公沙穆字文人北海膠東人也體履清直兼學多文隱居東萊山中桓帝時有富人王仲者謂穆曰今多以貸仕吾奉子以百萬唯子所用穆荅曰斯意厚矣夫富貴在天得之有命以賄求爵姦莫大焉郡舉孝廉除郎中以高第為光祿主事吳書曰劉表亡曹公向荊州表子琮降以節迎曹公諸將皆疑其詐曹公以問婁子伯子伯, SBCK: ''}
