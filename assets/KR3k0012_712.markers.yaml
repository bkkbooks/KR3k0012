  - {type: variant, offset: 5, length: 1, content: 箱, SBCK: 輔故事曰董卓壞銅人十枚爲小錢熨斗淮南子曰糟丘生於象箸炮烙始於熱斗許愼曰􅀬斗熨斗也爛人手遂作炮格之刑也晉}
  - {type: variant, offset: 5, length: 1, content: 箱, WYG: 輔故事曰董卓壞銅人十杖為小錢熨斗淮南子曰糟丘生於象箸炮烙始於熱斗許類曰熱斗熨手也爛人手遂作炮烙之刑也晉}
  - {type: variant, offset: 5, length: 1, content: 箱, krp: 輔故事曰董卓壞銅人十枚爲小錢熨斗淮南子曰糟丘生於象箸炮烙始於熱斗許愼曰熱斗熨斗也爛人手遂作炮格之刑也晉}
