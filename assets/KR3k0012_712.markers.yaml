  - {type: variant, offset: 7, length: 1, content: 宮, SBCK: 宫}
  - {type: variant, offset: 7, length: 1, content: 宮, WYG: 宫舊事曰皇太子納妃有金塗熨斗三枚魏武帝集上勝所得順帝賜物銅熨斗二枚澡盤魏武上雜物疏曰御物有純銀盤又有容五石銅澡盤也杜預奏事曰澡盤熨斗民間要用世説曰大將軍王敦至石崇家如厠還有數十婢曵羅縠擎金澡盤盛水琉璃盛澡豆因令著水調而飲之謂是乾飯羣婢莫不大笑也述征記云長安逍遙宫門裏有澡盤面徑丈二也異􅁐曰中朝有人畜銅澡盤旦夕恒鳴張華曰與洛鍾宫啇相諧故聲應錯鑢之乃止傅𤣥澡盤銘曰與其澡於水寧澡於徳水之清猶可穢也徳之修不可塵也澡灌四王起事曰惠帝征成都君敗帝渴帳下齎五升銅灌就民家取水就灌飲之齊書曰劉悛少與齊武欵好帝常至悛宅晝卧覺悛自奉金澡灌受四升水以沃􅏕因以與帝前後所納稱此東宫}
