  - {type: variant, offset: 30, length: 112, content: 帝崩時遺詔以雜道書四十卷置棺中至延康二年河東功曹李及入上黨抱犢山採藥於岩室中得此書盛以金箱卷後題日月是武帝時河東太守張純以箱及書奏上之武帝時左右見之涕泣曰此是帝崩時殯殮物宣帝愴然以書付茂陵安合如故晉陸雲與兄機書曰一日行曹公器, SBCK: 御}
