  - {type: variant, offset: 1155, length: 0, content: '', WYG: 澡灌二枚西域諸國志曰月支國有佛澡灌受二升許青石名羅勒色碧玉班受水無定隨其多少逺惠法師澡灌銘序曰得摩羅勒石澡灌一枚故以此銘荅之伏虎周禮天官曰太尉掌王燕衣服凡䙝器鄭司農云褻溺器虎子也春秋後語曰智伯圍趙襄子於晉陽襄子大敗智伯軍殺智伯}
