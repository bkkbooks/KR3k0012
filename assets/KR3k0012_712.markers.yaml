  body:
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 四熨斗澡盤澡灌伏虎熨斗通俗文曰火斗曰熨帝王丗紀曰紂欲重刑乃先作大熨斗以火􅅡之使人舉不能勝輙爛手與妲己爲戯􅀏魏末傳曰優人欲使㓜帝取大將軍昭昌熨斗柄帝不敢發晉書曰韓康伯年數歳殷氏髙明時大寒母方爲作袴令康伯捉熨斗而謂之曰且着􅃭尋當作􅃨袴康伯曰火在斗中而柄尚熱今旣着􅃭下亦當煖又張蕪别傳曰蕪小時母謂其寒且作袴蕪曰且作􅃭如熨斗着火柄亦􅀬隋書曰尉遲逈反於鄴時李穆在并州髙祖獻慮其爲逈所誘遣使往布腹心穆遽奉熨斗於髙祖曰願以此慰安天下也高祖大恱}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_712-1b}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 四熨斗澡盤澡灌伏虎熨斗通俗文曰火斗曰熨帝王世紀曰紂欲重刑乃先作大熨斗以火熱之使人舉不能勝輒爛手與妲己為戱笑魏末𫝊曰優人欲使記㓜帝取大将軍昭昌熨斗柄帝不敢發晉書曰韓康伯年數嵗母殷氏以時大寒方為作襦令康捉熨斗而謂之曰且著襦尋當作複袴康伯曰火在斗中而柄尚熱今既著襦下亦當煖又張蕪别𫝊曰蕪小時母謂其寒且作袴蕪曰且作襦如熨斗著火柄亦熱隋書曰尉遲迥及於鄴時李穆在并州高祖獻慮其為迥所誘遣使往布腹心穆遽奉熨斗於高祖曰願以此熨安天下也高祖大悦}
