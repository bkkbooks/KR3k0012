  - {type: variant, offset: 147, length: 10, content: 枚想兄識彥高書箱甚似, SBCK: 石銅澡盤也杜預奏事曰澡盤熨斗民間要用丗說曰大將軍王敦至石崇家如厠還有數十婢曳羅縠擎金澡盤盛水琉璃盛澡豆因令著水調而飲}
  - {type: page-break, offset: 147, content: '', id: KR3k0012_SBCK_712-2a}
  - {type: variant, offset: 147, length: 634, content: 枚想兄識彥高書箱甚似之巾箱漢武內傳曰武帝見西王母巾箱中有一卷書王母曰此五岳真形圖昨青城諸仙就我求今當付之宋書曰元凶劭弒逆南陽公主見女巫嚴道育云天神當賜符應時主夕臥見流光相隨狀若螢火遂入巾箱化為雙珠圓青可愛因是巫蠱而敗齊書曰衡陽王鈞常手自細書寫五經部為一卷置于巾箱中以備遺忘侍讀賀玠問曰殿下家自有墳素復何須蠅頭細書別藏巾箱中荅曰巾箱中有五經於撿閱易且一更手寫則永不忘諸王聞而爭効為巾箱五經自此始也世說曰威法濟者義興人其兒年二十得病經年有神來語言床席不淨神何處得坐曰有漆內箱甚淨神何不入中因內新果於箱中覺有聲以箱蓋覆之於是便聞箱中動搖即以衣傅之可五升米重而病愈異苑曰晉孝武太元末每聞手巾箱中有鼓吹鞞角之音帝是歲崩天下大亂笥說文曰簞笥飯及衣之器也尚書曰惟衣裳在笥論語曰一簞食一瓢飲簞笥也東觀漢記曰上問第五倫卿為市掾人有遺卿母一笥餅卿從外來見之奪母笥探口中餅出之倫對曰實無此眾人以臣愚蔽故為生此語東觀漢記曰上聞王郎將軍至復驚去馮異進笥麥飯兔肩續漢書曰世祖微時繫南鳴市獄市吏以一笥飯與之吳越春秋曰越以文笥七枚獻吳王西京雜記曰宣帝以虎魄笥盛身毒寶鏡風俗通曰孝靈帝建寧中京師長者皆以葦辟方笥為粧具時有識者竊言葦方笥郡國讞篋也今珍用天下皆當有罪讞於理官也後黨錮皆讞廷尉人名悉入方葦笥中斯為驗矣張衡綬笥銘曰南陽太守鮑德有詔所賜先公綬笥傳世用之更治笥平子為德主簿故為之銘也笈說文作扱曰笈驢上負也風俗記曰笈學士所以負書箱如冠籍箱也謝承後漢書曰徐稚字孺子公車五徵皆不降志其有喪負笈赴弔行五里也, WYG: 尺}
