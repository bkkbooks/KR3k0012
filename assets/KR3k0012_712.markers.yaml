  - {type: page-break, offset: 487, content: '', id: KR3k0012_SBCK_712-2b}
  - {type: variant, offset: 488, length: 659, content: 觀漢記曰上問第五倫卿為市掾人有遺卿母一笥餅卿從外來見之奪母笥探口中餅出之倫對曰實無此眾人以臣愚蔽故為生此語東觀漢記曰上聞王郎將軍至復驚去馮異進笥麥飯兔肩續漢書曰世祖微時繫南鳴市獄市吏以一笥飯與之吳越春秋曰越以文笥七枚獻吳王西京雜記曰宣帝以虎魄笥盛身毒寶鏡風俗通曰孝靈帝建寧中京師長者皆以葦辟方笥為粧具時有識者竊言葦方笥郡國讞篋也今珍用天下皆當有罪讞於理官也後黨錮皆讞廷尉人名悉入方葦笥中斯為驗矣張衡綬笥銘曰南陽太守鮑德有詔所賜先公綬笥傳世用之更治笥平子為德主簿故為之銘也笈說文作扱曰笈驢上負也風俗記曰笈學士所以負書箱如冠籍箱也謝承後漢書曰徐稚字孺子公車五徵皆不降志其有喪負笈赴弔行五里也又曰袁閎字夏甫汝南人也博覽群書常負笈尋師變易姓名又曰高弘字伯武河內山陽人為琅琊相到官自負笈單步入界聽採風俗又曰蘇章字士成北海人負笈追師不遠萬里又曰方儲字聖明負笈到三輔無術不覽又曰郎宗負笈賣卜給食諸公表上博士徵宗宗負笈遁去李固傳曰固父為三公而固步行負笈千里從師拾遺錄曰漢惠帝時有仙人韓稚東至泥離國遇其人洞室負笈而問其年幾何漢武內傳曰上元夫人語武帝曰阿母令以瓊笈妙蘊發紫臺之文賜汝火籠方言曰南楚江沔之間籠謂之篣或謂之笯陳楚宋魏之間謂之庸君今薰籠是也齊書曰卞彬性飲酒火籠什物多諸詭異自稱卞田居又曰范述曾為永嘉太守有善政徵為游擊將軍郡故舊送錢二十餘萬一無所受唯得白桐皮火籠朴十餘枚而已梁書曰臨賀王正德為吳郡太守正德自謂應居儲嫡心常怏怏後奔魏初去之始為詩一絕內火籠曰楨幹屈曲盡蘭麝氣氳銷欲知懷炭日正是履冰朝脩復山陵故事曰當梓宮中有象牙火籠東宮, SBCK: 宫}
