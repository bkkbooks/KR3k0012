  - {type: variant, offset: 783, length: 367, content: 袁閎字夏甫汝南人也博覽群書常負笈尋師變易姓名又曰高弘字伯武河內山陽人為琅琊相到官自負笈單步入界聽採風俗又曰蘇章字士成北海人負笈追師不遠萬里又曰方儲字聖明負笈到三輔無術不覽又曰郎宗負笈賣卜給食諸公表上博士徵宗宗負笈遁去李固傳曰固父為三公而固步行負笈千里從師拾遺錄曰漢惠帝時有仙人韓稚東至泥離國遇其人洞室負笈而問其年幾何漢武內傳曰上元夫人語武帝曰阿母令以瓊笈妙蘊發紫臺之文賜汝火籠方言曰南楚江沔之間籠謂之篣或謂之笯陳楚宋魏之間謂之庸君今薰籠是也齊書曰卞彬性飲酒火籠什物多諸詭異自稱卞田居又曰范述曾為永嘉太守有善政徵為游擊將軍郡故舊送錢二十餘萬一無所受唯得白桐皮火籠朴十餘枚而已梁書曰臨賀王正德為吳郡太守正德自謂應居儲嫡心常怏怏後奔魏初去之始為詩一絕內火籠曰楨幹屈曲盡蘭麝氣氳銷欲知懷炭日正是履冰朝脩復山陵故事曰當梓宮中有象牙火籠東宮舊事曰, WYG: 皇}
