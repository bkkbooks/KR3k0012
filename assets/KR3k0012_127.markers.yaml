  - {type: variant, offset: 1890, length: 701, content: 衰庚戍撫曰幾何曰年則一紀世則及子撫曰何其促乎朗曰卦兆然也豈關人哉撫祕不敢言德大悅三月德引歸而南五月次薛城八月入廣固即皇帝位于南郊大赦改元為建平元年又曰漢宣憫吏民犯諱故改名朕今增一備字以為複名庶開臣子避諱之路於是敘賞有差褒德任賢新舊咸悅十月太極端門並就以公匠張剛為材官將軍尚方令二年十月徐州刺史潘聰青州刺史鞫仲來朝讌于延賢堂酒酣德嘆謂群臣曰朕雖寡薄拱已南面在上不驕夕惕于位可稱自古何等主也仲曰陛下中興之聖后少康光武之儔也顧命左右賜仲帛千匹仲疑多陳讓德曰卿知調朕朕不知戲卿乎卿飾對非實故亦虛言相賞不賞謬加何足謝也韓範進曰臣聞天子無戲言忠臣無妄對今日之論可謂君臣俱失德大悅賜範絹五十匹三年三月德如齊城登營丘望見晏嬰塚顧左右曰禮大夫不逼城葬平仲古之一賢人達者而生居近市死葬近城豈有意乎青州秀才晏謨對曰孔子稱臣先人平仲賢矣豈不知高其梁豐其禮蓋政在家門故儉以矯世存居湫隘卒豈擇地而葬乎所以不遠門者猶冀悟平生意也德悅之三月以太牢祀漢城陽景王廟遂北登社首山東望鼎足因目牛山問謨以齊之山川賢哲故事謨曆對詳辨畫地成圖德深嘉之拜尚書郎五年二月夜地震在栖之雞皆驚擾飛散三月德疾動經旬幾於不振會前尚書右丞曹默自冀州來奔以白酒解之乃瘳以默為御史中丞封永熙侯六年正月兄子超自秦還九月汝水竭十一月德疾篤夜夢皝曰汝既無子何不早立超為太子不爾惡人生心戊午引見群臣于東陽殿議立超為太子俄而震起百寮驚越德亦不安還宮疾甚呼叚后公主及超申以後事執超手曰若得至曉更見公卿顧託以汝死無所恨舉目視公主欲有所言竟遂不能叚后大言今日召董中書造誥立超開目頷之是夕薨于顯安宮年七十為十餘棺夜分出門潛瘞山谷莫知其屍所在虛葬于東陽陵謚獻武皇帝廟號世宗在位五年慕容超, WYG: 馮䟦}
