  - {type: variant, offset: 1413, length: 230, content: 以德鎮鄴及寶失中山奔龍城以德為丞相領冀州承制南夏德曰中山既沒魏必乘勝來攻鄴元年正月德率戶四萬三千車二萬七千乘自鄴徙滑臺黎陽魏軍垂至三軍危懼欲堡據黎陽昏日流澌冰合是夜濟訖冰亦尋消德大悅改黎陽津為天橋津德入滑臺趙王麟等九十八人上言今中山傾陷龍都蕭條趙魏遺黎鵠企皇澤伏願仰承俯順以安宗廟謹上皇帝尊號德許之令曰今假順來議且依燕元故事統符行帝制奏詔而已改永康三年為元年大赦殊死已下置百宮封進有差寶自龍城南奔至黎陽城西數里伏于河西遣中黃門趙思告北地王鍾曰上以去二月得丞相表, krp: 立爲太子盤薨僭}
