  - {type: variant, offset: 1630, length: 259, content: 地王鍾曰上以去二月得丞相表即自南征叚速骨作逆于乙連今失據來此呼丞相奉迎鍾馳使白狀寶遣思之後見採樵者知德稱帝懼而北奔初符登既滅登弟廣率所部三千來降拜冠軍將軍處之乞活壍至是復叛稱秦王德留撫軍魯陽王和守滑臺德率眾攻廣斬之和長史李辨殺和以滑臺降魏德曰符廣雖平撫軍失據進有強敵退無所託計將安出尚書潘聰曰滑臺四通八達非帝王之居青齊沃壤號曰東秦地方二千里戶余十萬四塞之固可謂用武之國德猶預未決於是遣牙門蘇撫問沙門朗公報曰山遷絕俗之士不應預問朝議但有待之累非有託無以立陛下今來即朗之檀越敬覽潘尚書之議可謂興邦撫又問以年世朗以周易筮之曰, WYG: ''}
