  - {type: variant, offset: 1409, length: 541, content: 永康元年以德鎮鄴及寶失中山奔龍城以德為丞相領冀州承制南夏德曰中山既沒魏必乘勝來攻鄴元年正月德率戶四萬三千車二萬七千乘自鄴徙滑臺黎陽魏軍垂至三軍危懼欲堡據黎陽昏日流澌冰合是夜濟訖冰亦尋消德大悅改黎陽津為天橋津德入滑臺趙王麟等九十八人上言今中山傾陷龍都蕭條趙魏遺黎鵠企皇澤伏願仰承俯順以安宗廟謹上皇帝尊號德許之令曰今假順來議且依燕元故事統符行帝制奏詔而已改永康三年為元年大赦殊死已下置百宮封進有差寶自龍城南奔至黎陽城西數里伏于河西遣中黃門趙思告北地王鍾曰上以去二月得丞相表即自南征叚速骨作逆于乙連今失據來此呼丞相奉迎鍾馳使白狀寶遣思之後見採樵者知德稱帝懼而北奔初符登既滅登弟廣率所部三千來降拜冠軍將軍處之乞活壍至是復叛稱秦王德留撫軍魯陽王和守滑臺德率眾攻廣斬之和長史李辨殺和以滑臺降魏德曰符廣雖平撫軍失據進有強敵退無所託計將安出尚書潘聰曰滑臺四通八達非帝王之居青齊沃壤號曰東秦地方二千里戶余十萬四塞之固可謂用武之國德猶預未決於是遣牙門蘇撫問沙門朗公報曰山遷絕俗之士不應預問朝議但有待之累非有託無以立陛下今來即朗之檀越敬覽潘尚書之議可謂興邦撫又問以年世朗以周易筮之曰燕衰庚戍撫曰幾何曰年則一紀世則及子撫曰何其促乎朗曰卦兆然也豈關人哉撫祕不敢言德大悅三月德引歸而南五月次薛城八月入廣固即皇帝, SBCK: ''}
