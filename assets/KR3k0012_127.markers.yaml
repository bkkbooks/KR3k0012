  - {type: variant, offset: 2607, length: 3, content: 明德兄, SBCK: 和爲元皇帝父安爲宣帝子永爲太子三年七月以太子永領大單于内置四輔七年建太學以長樂劉軒營丘張熾成周翟崇爲􅀶士簡二千石巳下子弟年十五巳上教之十四年􅀫軍地燃一旬乃滅十七年二月}
  - {type: variant, offset: 2607, length: 1, content: 明, WYG: 和為元皇帝父安為宣帝子永為太子三年七月以太子永領大單于内置四輔七年建太學以長樂劉軒營丘張熾成周翟崇為博士簡二千石已下子弟年十五以上教之十四年宿軍地燃一旬乃滅十七年二月北部人趙夀女既嫁化為男娶妻而無子䟦問諸羣臣曰此何祥尚書左承傅權對曰漢世雌雞為雄隂變為陽君替臣僣之象卒有婦人專寵王莾簒今女為男臣将無君之徵䟦曰将何以禳之權曰桑糓生朝太戊脩}
