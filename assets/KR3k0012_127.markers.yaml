  - {type: variant, offset: 3058, length: 283, content: 人姚興大悅還超母妻十月華發長安宗正元馳先反命超大悅遣征虜公孫五樓率騎二千迎于境上超親率六宮迎於馬耳關四年正月大赦尊父北海穆王為穆皇皇帝母叚氏為皇太后居長樂宮妻呼延氏為皇后五年二月晉相劉裕率眾來伐三月晉師渡淮超聞晉軍之盛自率眾四萬距戰大敗奔還廣固徙郭內民入堡小城晉攻陷大城長圍列守超請為藩臣以大峴為界裕不許六年正月超登天門朝群臣于城上殺馬以饗將士十一月尚書悅壽開門納晉師超出奔為晉所執送建康市斬之時年二十六殺鮮卑王公已下三千餘人以男女萬餘口為軍賞始德建平元年歲在己亥僣號居齊至為劉裕所滅在已酉凡二十一年晉書曰超在位六年初德以安帝隆安四年僣立至超二世凡十一年以義熙六年滅, SBCK: 七}
