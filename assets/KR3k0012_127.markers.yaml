  - {type: variant, offset: 2752, length: 2, content: 此刀, SBCK: 轉禍十八年八月立子翼爲太子䟦戒之曰吾聞君人以學爲夲不學無以立尊敬師傅人倫之始汝其夙夜䖍䖍欽承明訓二十二年八月䟦寢疾召中書監申秀侍中陽哲於内寢謂之曰吾患當不濟卿等善相吾子參決萬機九月䟦疾甚輦而臨軒命太子翼勒兵聽政以備非常宋夫人規立其子受惡翼聽政謂之曰上疾將瘳柰何便欲代父臨天下乎翼性仁弱遂}
