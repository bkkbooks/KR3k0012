  - {type: variant, offset: 355, length: 0, content: '', SBCK: 西􅁗録曰乞伏乾歸國仁弟雄武有度略仁薨群寮以仁子公府㓜稚乃立乾歸爲將軍大單于河}
  - {type: variant, offset: 355, length: 0, content: '', WYG: 西秦録曰乞伏乾歸國仁弟雄武有度畧國仁薨羣僚以國仁子公府㓜稚乃立乾歸為将軍大單于河}
  - {type: variant, offset: 355, length: 0, content: '', krp: 西秦録曰乞伏乾歸國仁弟雄武有度略仁薨群寮以仁子公府㓜稚乃立乾歸爲將軍大單于河}
  - {type: variant, offset: 356, length: 17, content: 涼錄曰利鹿孤烏孤弟太初三年八月即位, SBCK: 王}
  - {type: variant, offset: 356, length: 3, content: 涼錄曰, WYG: 王大赦改四年為太初元年立邉氏為后以南川侯出連乙都為丞相九月遷于金城二年正月苻登遣使拜為大将軍金城王六年立子熾磐為太子七年登遣使授左丞相河南王假黄鉞加九錫之禮十月氐王楊定步騎四萬來伐乾歸勒衆而進大敗定軍斬定及首級萬有七千于是盡有隴西之地十二月僣稱秦王大赦八年呂光來伐歸乃稱藩遣子勃勃為質既而悔之十三年秦征西大将軍姚碩德率衆來伐入自南安峽乾歸次隴西以拒碩德興潜師繼發乾歸聞兵将至率輕騎數千候興俄與中軍相失為興追騎所逼戰敗遁歸苑川乃率騎數百馳至允吾秃髪}
  - {type: page-break, offset: 356, content: '', id: KR3k0012_WYG_127-3a, image: WYG0894/WYG0894-0183a.png}
  - {type: variant, offset: 356, length: 3, content: 涼錄曰, krp: 王大赦改四年爲太𥘉元年立妻邊氏爲后以南川侯出連乞都爲丞相九月遷于金城二年正月符登遣使拜爲大將軍金城王六年立子熾盤爲太子七年登遣使授左丞相河南王假黄鉞加九錫之禮十月氐王楊定歩騎四萬來伐歸勒衆而進大敗定軍斬定及首級萬有七千於是盡有隴西之地十二月僭稱秦王大赦八年吕光來伐歸乃稱蕃遣子勃勃爲質旣而悔之十三年秦征西大將軍姚碩德率衆來伐入自兩安峽歸次于隴西以拒碩德興潜師繼發歸聞興至自率輕騎數千候興俄與中軍相失爲興追騎所逼戰敗遁歸苑川乃率騎數百馳至允吾秃發}
