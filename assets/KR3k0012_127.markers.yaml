  - {type: variant, offset: 3141, length: 0, content: '', WYG: 秦王以酒泉公倫為太子璝聞将廢已率衆七萬北伐倫倫率騎三萬拒之既戰倫為璝所敗倫死之太原公昌率騎一萬襲殺璝率衆八萬五千歸于綂萬勃大悦立昌為太子七月勃勃寝疾甚輦升永安殿召羣臣囑以後事薨于永安殿年四十五諡武烈}
  - {type: variant, offset: 3142, length: 1, content: 后, WYG: 帝葬嘉平陵廟號世祖赫連昌崔鴻十六國春秋夏録曰赫連昌一名折勃勃之第三子身長八尺魁岸美姿貌勃勃薨即位于永安臺大赦改真興七年為永光元年七月杏城劉暏川有青石大如馬頭浮在水上逆流而行人見而送之十月魏乘虛來伐三年}
