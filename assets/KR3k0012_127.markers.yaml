  - {type: variant, offset: 379, length: 3, content: 建和元, WYG: 乾歸遂奔長安姚興大悦拜持節都督河南諸軍事河州刺史歸義侯十四年遣乾歸還鎮苑川盡以部民配之十八}
  - {type: variant, offset: 379, length: 3, content: 建和元, krp: 歸遂奔長安姚興大悅拜河南諸軍事河州刺史歸義侯十四年姚興遣歸還鎮苑川盡以部民配之十八}
