  - {type: variant, offset: 2957, length: 2, content: 驃騎, SBCK: 建興公虞弼東平公鵝青伐攻尅白狼句麗將􅁑居孟光率衆數萬隨陽伊來迎屯于臨川尚書令郭生因民之憚遷開門而引魏軍魏軍疑而不赴生遂勒衆攻弘弘引句麗兵入自東門與生戰于闕下生中流矢卒句麗軍旣入城取武庫甲以給其衆城内羙女皆句麗軍人所掠五月乙卯弘率龍城見戸東徙焚燒宫殿火一旬不絶令婦人􅀍甲居中陽伊等勤精兵於外􅁑居孟先率􅀐後殿方軌而進前後八十餘里魏軍追至遼水不擊而還遣使徴弘于句麗後二年爲句麗所殺僞謚昭成皇帝自馮䟦太平元年􅀊在巳酉至弘滅亡之􅀊丙子二十八載夏赫連勃勃崔鴻十六國春秋夏録曰赫連勃勃朔方人右賢王去卑之後劉元海之族也曽祖父劉虎前趙嘉平中以宗室封樓煩公拜安北將軍丁零中郎將祖父豹後趙建武中拜平北將軍左賢王父衛辰符堅以爲西單于督攝河西諸虜屯于伐來城因􅁗末兵亂遂有朔方之地控􅁌之士三萬八千姚萇拜辰}
