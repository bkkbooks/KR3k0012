  - {type: variant, offset: 2996, length: 0, content: '', SBCK: 冬十月以太子璝領大將軍雍州牧録南臺尚書事鎮長安十一月勃勃還統萬統萬統萬勃勃所都之城名也宫殿大成大赦改昌武二年爲真興元年刻石都南頌紀功德四月追尊父衛辰曰桓皇帝廟號太祖母符氏爲桓文皇后父豹曰宣皇帝曽祖虎曰景皇帝祖訓兒曰元皇帝五月雨魚于統萬二年十月起冲天臺于統萬南山欲登之以望長安六年勃將廢太子璝爲􅁗王以酒泉公倫爲太子璝聞將廢巳率衆七萬北伐倫倫率􅀐}
  - {type: variant, offset: 2996, length: 71, content: 三年七月遣中書令韓範聘秦姚興許還超母妻八月秦使兼員外散騎常侍韋宗還聘贈以千金超復遣右僕射張華給事中宗正元聘秦送大樂伎一百二十人姚興大悅還超母妻, WYG: 冬}
