  - {type: variant, offset: 2755, length: 14, content: 汝叔也後因呂隆歸秦秦徙涼州民, SBCK: 東宫一日三省疾宋夫人矯絶内外遣􅕡寺傳問而巳翼及大臣皆不得見䟦弟弘於是舉壯士數十人裹甲入禁中􅀫衛皆不戰而散宋夫人命閇東閤弘家僮庫斗頭徑捷有勇力踰閤而入至于皇堂射殺女御一人䟦驚懼而薨弘遣脩城告曰天降凶禍大帝崩背太子不侍疾群公不奔喪疑有逆謀國危社稷吾備太弟之親遂攝大位以寧國家百官叩門入者進階二等太子翼率東宫兵出戰敗退兵皆奔散弘遣使賜死命宗正馮哲黄門盧昭典葬事于東宫葬䟦}
