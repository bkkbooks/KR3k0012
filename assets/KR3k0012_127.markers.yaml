  - {type: variant, offset: 2604, length: 2, content: 超字, WYG: 永將永滅䟦東徙和龍家於長谷䟦夜夢天門開神光赫然燭于庭中永康末拜中衛将軍建始元年與二弟結謀襲殺慕容熈立髙雲為主正始元年以䟦為中外都督開府儀同三司録尚書事封武邑公太平元年雲為其幸臣離班桃仁所殺帳下督張泰李桑誅班及仁羣臣推䟦為主僣即天王位大赦令曰義貴適時不必改作故陳氏代姜不徙齊號即號燕國改為太平元年追尊}
