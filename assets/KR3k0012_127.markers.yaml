  - {type: variant, offset: 3008, length: 7, content: 姚興許還超母妻, krp: 州魏東平公鵝青追擒之送于魏魏封昌秦王尚始平公主㝷爲魏所殺赫連定崔鴻十六國春秋夏録曰赫連定勃勃第五子鳯翔二年封平原公雍州牧鎮長安率衆赴安定進封平原王大將軍領司徒昌爲魏所擒定遂率遺衆數萬據平原僣稱皇帝大赦改承光四年爲勝光元年進征南大將軍白蘭王吐谷渾莫璝爲開府儀同三司河南王十月畋于隂磐登苛藍山而望統萬城泣曰先帝以朕承大業者豈有今日之事乎使天假朕年當與諸郷建王季之業俄而有群狐百數鳴於定傍命射之無所獲定惡之曰此大不善咄咄天道復何言三年}
  - {type: variant, offset: 3012, length: 3, content: 超母妻, SBCK: 魏追􅀐亦至昌留河内公費連烏提守髙平徙諸城民七萬户于安定以都之四年二月魏軍至安定三月城潰昌奔􅁗州魏東平公鵝青追擒之送于魏魏封昌􅁗王尚始平公主㝷爲魏所殺赫連定崔鴻十六國春秋夏録曰赫連定勃勃第五子鳯翔二年封平原公雍州牧鎮長安率衆赴安定進封平原王大將軍領司徒昌爲魏所擒定遂率遺衆數萬據平原僣稱皇帝大赦改承光四年爲勝光元年進征南大將軍白蘭王吐谷渾莫璝爲開府儀同三司河南王十月畋于隂磐登苛藍山而望統萬城泣曰先帝以朕承大業者豈有今日之事乎使天假朕年當與諸郷建王季之業俄而有群狐百數鳴於定傍命射之無所獲定惡之曰此大不善咄咄天道復何言三年}
