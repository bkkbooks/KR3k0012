  - {type: variant, offset: 385, length: 0, content: '', SBCK: 符登遣使拜爲大將軍金城王六年立子熾盤爲太子七年登遣使授左丞相河南王假黄􅃏加九錫之禮十月氐王楊定歩􅀐四萬來伐歸勒衆而進大敗定軍斬定及首級萬有七千於是盡有隴西之地十二月􅆫稱􅁗王大赦八年吕光來伐歸乃稱蕃遣子勃勃爲質旣而悔之十三年􅁗征西大將軍姚碩德率衆來伐入自兩安峽歸次于隴西以拒碩德興潜師繼發歸聞興至自率輕􅀐數千候興俄與中軍相失爲興追􅀐所逼戰敗遁歸􅁐川乃率􅀐數百馳至允吾秃發利鹿􅀌迎歸處之於晉歸將叛謀泄懼爲利鹿􅀌所害謂其子熾盤曰姚興方盛吾將歸之令送汝兄弟及汝母爲質於是送熾盤兄弟於西平歸遂奔長安姚興大悅拜河南諸軍事河州刺史歸義侯十四年姚興遣歸還鎮苑川盡以部民配之十八年正月歸至自長安十九年五月苑川地震裂十一月又朝于長安二十年姚興慮歸終爲西州之患留拜主客尚書以其子熾盤爲西夷校尉行河州刺史二十一年盤以長安亂將始乃招結諸部築城于嵻㟍山以據之更始元年歸隨姚興如平流盤攻抱罕尅之遂遣使來告歸奔還苑川遂如抱罕留熾盤鎮之歸將衆二萬遷于度堅山諸將勸稱王七月僣稱􅁗王}
