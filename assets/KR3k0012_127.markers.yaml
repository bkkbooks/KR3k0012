  - {type: variant, offset: 2604, length: 2, content: 超字, SBCK: 永將永滅䟦東徙和龍長樂中䟦夜見天門開神光赫然燭於庭中永康末拜中衛將軍建始元年與二弟結謀襲殺慕容熈立髙雲爲主正始元年以䟦爲中外都督開府儀同三司録尚書封武邑公太平元年雲爲離班桃仁所殺下督李垂等誅班及仁群臣推䟦爲主􅆫即天王位大赦令曰義貴適時不必改作故陳氏代姜不徙齊號即號燕國改爲太平元年追尊}
