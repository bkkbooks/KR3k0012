  - {type: variant, offset: 2997, length: 0, content: '', SBCK: 萬拒之戰於平爲璝所敗倫死之太原公昌率􅀐一萬襲殺璝率衆八萬五千歸于統萬勃大恱立昌爲太子七月勃寢疾八月疾甚輦昇永安殿召群臣屬以後事薨於永安殿年四十五謚武烈皇帝葬嘉平陵廟號丗祖赫連昌崔鴻十六國春秋夏録曰赫連昌一名折勃勃之第三子身長八尺魁岸羙姿貌勃薨即位于永安臺大赦改真興七年爲永光元}
