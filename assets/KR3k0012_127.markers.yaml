  - {type: variant, offset: 3000, length: 7, content: 遣中書令韓範聘, krp: 杏城劉睹川有青石大如馬頭浮在水上逆流而行人見而送之十月魏乗虚來伐三年五月戰于黒渠爲魏所敗昌與數千騎奔還魏追騎亦至昌留河内公費連烏提守髙平徙諸城民七萬户于安定以都之四年二月魏軍至安定三月城潰昌奔}
