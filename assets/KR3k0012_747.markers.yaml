  - {type: variant, offset: 1739, length: 484, content: 馬力竭矣而猶求焉故曰敗列子曰造父師曰秦豆氏造父之始從習御也執禮甚卑秦豆氏三年不告造父執禮愈謹迺告之曰古語曰良弓之子必先為箕良冶之子必先為裘汝先觀吾趨趨如吾然後六轡可持六馬可御造父曰唯命所從秦豆氏乃立木為塗僅可容足計步而置之履之而行趨走往還無缺失也造父學之三日盡其巧秦豆歎曰子何敏也得之捷乎御者亦如此也曩汝行之於足應之於心推於御也齊揖乎轡銜之際急緩乎脣吻之和正度乎胸臆之中節節乎掌握之間內得於中心外合於馬志是故能進退履繩而旋曲中規取道致遠而氣力有餘誠得其術矣得之於銜應之於轡得之於轡應之於手得之於手應之於心則不以目視不以策驅心閑體正六轡不亂二十四蹄所投無差迴旋進退莫不中節然後車輪之外可使無餘轍馬蹄之外可使無餘地未嘗覺山谷之嶮原隰之夷視之一也吾術窮矣汝其識之管子曰造父善御者也善視其馬節其飲食量其馬力故能取遠道而馬不罷音疲明主猶造父也善治其民度量其力也孟子曰昔者趙簡子使王良與嬖奚乘終日而不獲一禽嬖奚反命曰天下之賤工也或以告王良良曰請復之強而後可一朝而獲十嬖奚反命曰天下之良工也韓子曰鈆陵卓子乘蒼龍桃文乘鉤錦在前錯錣丁括切在後馬欲進則鉤錦之欲退則錯錣貫之馬因旁出造父過之, WYG: 言}
