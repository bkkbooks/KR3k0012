  - {type: variant, offset: 1509, length: 0, content: '', SBCK: 盧知猷器度長厚文詞美麗尤工書一落簡翰人爭摸倣又曰鍾紹京䖍州贑人也􅀄爲司農録事以工書直鳯閣則天時明堂門額九鼎之銘及諸宫殿門牓皆紹京所題又曰王涯旣誅涯家書數萬卷侔於書府前代法書名􅀞人所保惜者必以厚貨致之不受貨者必以官爵致之厚爲垣竅而藏之覆壁至是人破其垣取之或剔取凾奩金寳之飾與其玉軸而弃之蔡琰別傳曰琰對曹操曰乞給紙筆真草唯命也邴原別傳曰原年五六歳過書舎而泣師曰何泣原曰􅀌}
