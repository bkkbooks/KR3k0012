  - {type: variant, offset: 1492, length: 4, content: 刑者策也, SBCK: 早􅀌母徐氏教其父書毎遺通錢紿云質汝父書跡之直通慕名甚恱晝夜精力無倦遂亞於詢唐書曰龍朔二年四月上自爲書與遼東諸將謂許敬宗曰許圉師常自愛朕書可於朝堂開示圉師見驚憙私謂朝官曰圉師見古跡多矣魏晉巳後唯稱二王然逸少少力而研子敬研而少力今觀聖跡兼絶二王鳯翥鸞廻實古今書聖又曰太宗甞於晉史右軍傳後論之曰鍾書布纎濃分䟽密霞舒雲卷無所間然但其體古而不今字長而逾制獻之雖有父風殊非新巧䟽痩如陵冬之枯樹槎而無屈伸拘束􅀂嚴家餓􅀠羈羸而不放縱蕭子雲無丈夫之氣行行如縈春蚓字字􅀂綰秋蛇卧王濛於紙中坐徐偃於筆下以兹播美豈非濫名耶所以詳察古今研精􅂐素盡善盡美其唯王逸少乎又曰孔􅀂思早􅀌母禇氏親自敎訓遂以學行知名年少時有}
