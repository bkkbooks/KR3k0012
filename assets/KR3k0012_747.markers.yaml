  - {type: variant, offset: 1486, length: 0, content: '', SBCK: 也其材任霸王之佐屈節治單父以自試意者其以此諌乎公寤太息歎曰寡人亂宓子之政而責其善數矣漢書曰陳遵長八尺餘長頭大鼻容貌甚偉略渉傳記贍於文辭性善書與人尺牘主皆藏去以爲榮又曰宣帝時中郎將張彭祖少與帝微時同席研書及帝即尊位彭祖以舊恩封陽都侯又曰田蚡學盤盂諸書孔甲二十六篇􅄂家書後漢書曰孫敬字文寳少時畫地學書日進焉東觀漢記曰樂成静王黨善吏書喜正文字也魏志曰胡昭善尺牘動見模楷衛覬好古文鳥􅂐􅀠草無所不善也晉書曰王羲之甞詣門生家見棐几滑淨因書之真草相半後爲其父刮去之門生驚懊者累日又曰王羲之山隂有道士好養鵝羲之觀焉意甚恱固求市之道士云爲冩道德經當舉羣相贈耳羲之欣然冩畢籠鵝而歸又曰羲之每自稱我書比鍾繇當抗行比張芝猶當鴈行也曽與人書云張芝臨池學書池水盡黒使其人躭之􅀂是未必後之也又曰羲之甞在蕺音戢山老姥持六角竹扇賣之羲之因書其扇各爲五字姥􅀄有愠色乃謂姥曰但言是王右軍書以求百錢姥如其言人􅔡買之他日姥又持扇來羲之􅀏而不荅又曰王獻之七八歳時學書父羲之從後掣其筆不得歎曰此兒後當復有大名常書壁爲方丈字羲之甚以爲能觀者數百人又曰謝安甞問獻之君書何如君家尊荅曰故當不同安曰外論不尓荅曰人郍得知又曰衛常字巨山轉黄門郎常善草􅊢書爲四體書􅀔曰昔者在黄帝創制造物有沮側魚切誦蒼頡者始作書契以代結繩蓋覩鳥跡以興思也因而遂滋則爲之字有六義焉一曰指事上下是也二曰象形日月是也三曰形聲江河是也四曰㑹意武信是也五曰轉注老考是也六曰假借令長是也又曰索靖作書狀其辭曰聖皇御丗隨時之冝蒼頡旣生書契是爲科斗鳥􅂐􅀋物象形叡哲變通意巧滋生損之􅀠草以崇簡易百官畢脩事業正厲草書之爲狀也婉􅀂銀鈎漂􅀂驚鸞舒翼未發􅀂舉復安䖝虵虬蟉力幽切或徃或還頽阿郍以羸羸欻奮釁而桓桓及其逸遊盻蠁乍正乍邪騏􅂹􅁀怒逼其轡海水窳隆􅀭其波芝草蒲萄還相結棠棣融融反其華􅀇熊對踞于山岳飛燕相追而差池舉而察之又似乎和風吹林偃草扇樹枝條順氣轉相比附窃嬈奴鳥切廉苫隨體散布紛擾擾以綺靡中持疑而猶豫􅀇螭狡獸嬉其間騰猿飛鯢相奔趣凌魚奮尾蛟龍反據􅄬空自􅇡張設㸦距或􅀂登髙望其􅀋或􅀂旣徃而中顧或􅀂倜儻而不羣或􅀂自檢於常度於是多才之英篤藝之彦役心精微躭此文憲守道兼權觸􅀋生變離拆八體靡形不判去䌓存微本象末亂上理開元下周謹按騁辭放手兩行氷散髙音翰厲溢越流漫忽班班而成章言竒妙之煥爛體磥落而壯麗姿光潤以璀璨命杜度運其指使伯英廻其腕著絶􅀔於紈素垂百丗之殊觀宋書曰劉穆之傳髙祖書素拙穆之曰此雖小事然宣􅀍四逺願公少復留意髙祖旣不能措意又禀分有在穆之乃曰公但縱筆爲大字一字徑尺旣足有所苞且其名亦美髙祖從之一􅁓不過六十字便滿齊書曰太祖善書及登位篤好不巳與王僧䖍賭書畢謂䖍曰誰爲第一僧䖍對曰臣書臣中第一陛下書帝中第一上􅀏曰卿可謂善自爲謀矣宋書曰謝超宗謂王慈曰卿書可及䖍公慈曰我之不及父猶雞之不及鳯也時人以爲名荅宋書曰江夏王鋒字宣頴髙帝第十三子也四歲好學書畜於母張氏舎張氏無紙乃􅀝井欄爲書之滿則洗之己而復書如此累月又每晨不肯去䆫塵而就塵書帝甞使學鳯尾詔一學即工帝大恱以玉麒麟賜之曰以麒麟賞鳯尾矣梁書曰武帝論蕭子雲書曰筆力勁駿心手相應巧踰杜度美過崔寔當與元常鍾繇也並驅争先其梁蕭子雲岀爲東陽太守百濟國使人至建業求書逢子雲維舟將發使人於渚次􅃸之望舡三十許歩前行子雲遣問之荅曰侍中尺牘之羙逺流海外今日所求唯在名迹子雲乃爲停舡三日書三十紙與之獲金貨數百萬性恡自非荅餉不書好事者重加賂遺以要其荅又曰顔恊􅀶渉羣書工於草􅊢飛白時吴人范懷約能􅊢書恊學其書殆過真也荆楚碑碣皆恊所書時人有㑹稽謝善勛能爲八體六丈方寸千言京兆韋仲善飛白並在湘東王府善勛爲録事叅軍仲爲中兵叅軍府中以恊優於韋仲而減於善勛善勛飲酒至數􅂛醉後􅂺張眼大罵雖復貴賤親踈無所擇也時謂之謝方眼而胷襟夷坦有士君子之操焉後魏書曰崔濳爲兄渾誄手筆草夲㑹昌􅀄著作佐郎王遵業買書於市而遇得之計誄至今將二百載寳其書迹􅀷秘藏之武定中遵業子松年以遺黄門郎崔季舒人多摹搨之又曰崔􅀇伯尤善草􅊢行狎之書爲丗模楷􅀇伯祖恱與范陽盧諶並以􅀶藝著名諶法鍾繇恱法衛瓘而俱習索靖諶傳子偃偃傳子邈恱傳子濳濳傳􅀇伯故魏􅀄重崔盧之書唐書曰太宗甞謂侍中魏徵曰虞丗南死後無人可與論書徵曰禇遂良下筆遒勁甚得王逸少體太宗即日召令侍讀甞以金帛購求王羲之書跡天下爭賫古書詣闕以獻當時莫能辯其真僞遂良備論所出一無所誤又曰虞丗南字伯施同郡沙門釋智永智永羲之裔孫善學王羲之書丗南師焉妙得其體由是聲名藉甚又曰栁公權字誠懸㓜􅄝學十二能爲詞賦元和􅀄進士擢第釋􅄄祕書省校書郎李聽鎮夏州辟爲掌書記穆宗即位入奏事帝召見謂公權曰我於佛寺見卿筆蹟思之乆矣即日拜右拾遺充翰林侍書學士遷右􅀘闕司封貟外郎穆宗政僻甞問公權筆何盡善對曰用筆在心心正則筆正上改容知其筆諌也公權􅀄學王書遍閱近代筆法體􅀔勁媚自成一家當時公卿大臣家碑板不得公權手筆者人以爲不孝外夷入貢皆別署貨貝曰此購栁書上都西明寺金剛經碑備有鍾王歐虞禇陸之體尤爲得意文宗夏日與學士聮句帝曰人皆苦炎􅀬我愛夏日長公權續曰薰風自南來殿閣生微凉時丁􅀽五學士皆屬繼帝獨諷公權兩句曰詞清意足不可多得乃令公權題於殿壁字方圎五寸帝視之歎曰鍾王復生無以加焉又曰栁公􅁠大中􅀄轉少師中謝宣宗召昇殿御前書三紙軍容使西門季􅀇捧硯樞宻使崔巨源過筆一紙真書十宇曰衛夫人傳筆法於王右軍一􅁓行書十一字曰永禪師真草千字文得家法一􅁓草書八字曰謂語􅂇者焉哉乎也賜錦綵缾盤䓁銀器仍令自書謝狀勿拘真行帝尤竒惜之又曰歐陽詢潭州臨湘}
