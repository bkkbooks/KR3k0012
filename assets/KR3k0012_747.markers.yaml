  - {type: variant, offset: 2227, length: 0, content: '', WYG: 曰欲書不須費也遂就書江偉家傳曰偉性善書人得其手䟽莫不蔵之以為寳神僊傳曰東郭延服靈飛散能夜書言目明又曰王逺字方平東海人也博學尤明天文䜟緯河洛之要逆知天下盛衰之期漢桓帝聞之連徵不出使郡國逼載詣京師低頭閉口不肯答乃題宫門扇四百餘字皆説方來帝甚恐之使刮去外字復見墨皆徹入版裏石虎鄴中記曰石虎有馬妓著朱衣進賢冠立於馬上馬走而作書字皆端正永嘉郡記曰昔王右軍遊永嘉經於惡道右軍書南邉大石猶見墨跡而字不甚了了抱朴子曰英葱實天雄鶴腦服之令人夜書}
