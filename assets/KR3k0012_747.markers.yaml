  - {type: variant, offset: 1515, length: 3, content: 孔子孔, SBCK: 馬上馬走而作書字皆端正永嘉郡記曰昔王右軍遊永嘉經於惡道右軍書南邊大石今猶見墨跡而字不甚了了抱朴}
