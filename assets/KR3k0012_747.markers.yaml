  - {type: variant, offset: 93, length: 1354, content: 春陽氣微弱恐物有窒塞不能自達者天子射熊何示服猛遠巧佞也熊為獸猛巧者也非但當服猛巧者示當服天下巧佞之臣也諸侯射麋何示遠迷惑人者也麋之言迷也大夫射虎豹何示服猛也士射鹿豕何示除害也各取德而能服也大夫士射兩物何大夫士俱人臣陰數偶也侯者以布為之何布者用人事之始也本正則末正矣名之為侯者何明諸侯有不朝者則當射之君子重同類不忍射之故畫獸射之射主何為乎曰射義非一也夫射者執弓堅固心平體正然後中也二人爭勝樂以養德也勝負俱降以崇禮讓故可以選士夫勝者發近而制遠選士所以助微抑強調和陰陽戒不虞也天子射百二十步諸侯九十步大夫七十步士五十步明尊者所服遠卑者所服近也列女傳曰晉平公使工為弓三年乃成射不穿一札公怒將殺工其妻見公曰妾之夫造此弓亦以勞矣而不穿一札是君不能射也妾聞射之道左手如矩右手如附枝右手放發左手不知公以其言為儀儀法而穿七札弓工立得出賜金三鎰英雄記曰袁術遣將紀靈率步騎三萬攻劉備呂布遣人招備并請靈等饗飲謂靈曰布性不喜合鬭但喜解鬭耳乃令植戟於營門彎弓曰諸君觀布射戟小支中者當解兵不中留決鬭布一發中戟支遂罷兵西京雜記曰茂陵人周楊本瑯耶人善馴野雞以為媒用以射雉每三春之月茅障自翳用鮭古迷切矢以射之日連百數茂陵輕薄者化之皆以雜寶錯廁翳障輕騎妖服追隨於道路以為歡娛楊死其子亦善其事董司馬賢也好之以為上客典論曰文帝自敘曰少好弓馬逐禽輒十里射常出百步後獩貊貢良弓燕代獻名馬於鄴西獵終日獲麞鹿九雉兔二十後尚書令荀彧問余曰聞君善左右射此實難能余曰執事未覩凡埒有常徑的有定所雖矢發輒中非妙也若夫馳平原赴豐草逐狡獸截輕禽使弓不虛彎矢不虛發此乃妙耳山海經曰軒轅國在窮山之際不敢西射畏軒轅之丘故也言敬畏黃帝威靈故不敢向之射也論衡曰養由基見寢石以為虎射之飲羽案精誠所感不過入一寸耳今勇夫卒見寢石以手推之能令石有跡乎射經曰夫射者所以觀德也不能則辭之以疾懸孤之義在焉故曰和容為上主皮為次并之者又何加矣乃君子之所爭也雖欲勿用禮其捨諸乎王昶戲論曰禮記有投壺之宴論語稱愽弈之賢茲三戲者君子末事不足為也樗蒲彈碁既不益人又國有禁皆不得為也吾見坐圍碁而死近事非遠昔晉侯以投壺喪宋公好愽弈亡豈不哀哉諸戲中唯有射者男子之事在於六藝若欲戲唯得射而已其餘不得為也曹植樂府歌曰控弦破左的發矢摧月支仰手接飛猱俯身散馬蹄又曰鬭雞東郊道走馬長楸間驅馳未能半雙兔過我前攬弓挾鳴鏑長驅上南山左挽因右發一縱兩禽連餘巧未盡展仰手接飛鳶觀者咸稱善眾工歸我妍御書曰若朽索之御六馬禮曰君將駕則僕執策立於馬前監駕且為馬行已駕僕展軨展軨具視效駕自已駕矣奮衣由右上取貳綏奮振去塵也貳副也跪乘未敢立散也執策分轡驅之五步而立調成之也君出就車則僕并轡授綏車上僕所主也左右攘辟謂群臣陪位侍駕者也攘卻也或音攘古讓乎也車騎而騶至于大門君撫僕之手而顧命車右就車門閭溝渠必步車右勇力之士備制非常者君行則陪乘君式則下步行也凡僕人之禮必授人綏若僕者降等則撫僕之手不然則自下拘之撫小止之議也自下取之也僕與己下拘之由僕手同爵則不受又曰魯莊公及宋人戰于乘丘懸奔父御卜國為右馬驚敗績公墜左車授綏公曰未之卜也懸奔父曰他日不敗績而今敗績是無勇也遂死之圉人浴馬有流矢在白肉公曰非其罪也遂誄之周禮曰教國子以五馭一曰鳴和鑾二曰逐水曲三曰過表四曰舞交衢五曰遂禽在論語曰子謂門弟子曰吾何執執御乎執射乎吾執御矣大戴禮曰善御馬者正御勒齊轡策均馬力和馬心, SBCK: ''}
  - {type: variant, offset: 93, length: 1354, content: 春陽氣微弱恐物有窒塞不能自達者天子射熊何示服猛遠巧佞也熊為獸猛巧者也非但當服猛巧者示當服天下巧佞之臣也諸侯射麋何示遠迷惑人者也麋之言迷也大夫射虎豹何示服猛也士射鹿豕何示除害也各取德而能服也大夫士射兩物何大夫士俱人臣陰數偶也侯者以布為之何布者用人事之始也本正則末正矣名之為侯者何明諸侯有不朝者則當射之君子重同類不忍射之故畫獸射之射主何為乎曰射義非一也夫射者執弓堅固心平體正然後中也二人爭勝樂以養德也勝負俱降以崇禮讓故可以選士夫勝者發近而制遠選士所以助微抑強調和陰陽戒不虞也天子射百二十步諸侯九十步大夫七十步士五十步明尊者所服遠卑者所服近也列女傳曰晉平公使工為弓三年乃成射不穿一札公怒將殺工其妻見公曰妾之夫造此弓亦以勞矣而不穿一札是君不能射也妾聞射之道左手如矩右手如附枝右手放發左手不知公以其言為儀儀法而穿七札弓工立得出賜金三鎰英雄記曰袁術遣將紀靈率步騎三萬攻劉備呂布遣人招備并請靈等饗飲謂靈曰布性不喜合鬭但喜解鬭耳乃令植戟於營門彎弓曰諸君觀布射戟小支中者當解兵不中留決鬭布一發中戟支遂罷兵西京雜記曰茂陵人周楊本瑯耶人善馴野雞以為媒用以射雉每三春之月茅障自翳用鮭古迷切矢以射之日連百數茂陵輕薄者化之皆以雜寶錯廁翳障輕騎妖服追隨於道路以為歡娛楊死其子亦善其事董司馬賢也好之以為上客典論曰文帝自敘曰少好弓馬逐禽輒十里射常出百步後獩貊貢良弓燕代獻名馬於鄴西獵終日獲麞鹿九雉兔二十後尚書令荀彧問余曰聞君善左右射此實難能余曰執事未覩凡埒有常徑的有定所雖矢發輒中非妙也若夫馳平原赴豐草逐狡獸截輕禽使弓不虛彎矢不虛發此乃妙耳山海經曰軒轅國在窮山之際不敢西射畏軒轅之丘故也言敬畏黃帝威靈故不敢向之射也論衡曰養由基見寢石以為虎射之飲羽案精誠所感不過入一寸耳今勇夫卒見寢石以手推之能令石有跡乎射經曰夫射者所以觀德也不能則辭之以疾懸孤之義在焉故曰和容為上主皮為次并之者又何加矣乃君子之所爭也雖欲勿用禮其捨諸乎王昶戲論曰禮記有投壺之宴論語稱愽弈之賢茲三戲者君子末事不足為也樗蒲彈碁既不益人又國有禁皆不得為也吾見坐圍碁而死近事非遠昔晉侯以投壺喪宋公好愽弈亡豈不哀哉諸戲中唯有射者男子之事在於六藝若欲戲唯得射而已其餘不得為也曹植樂府歌曰控弦破左的發矢摧月支仰手接飛猱俯身散馬蹄又曰鬭雞東郊道走馬長楸間驅馳未能半雙兔過我前攬弓挾鳴鏑長驅上南山左挽因右發一縱兩禽連餘巧未盡展仰手接飛鳶觀者咸稱善眾工歸我妍御書曰若朽索之御六馬禮曰君將駕則僕執策立於馬前監駕且為馬行已駕僕展軨展軨具視效駕自已駕矣奮衣由右上取貳綏奮振去塵也貳副也跪乘未敢立散也執策分轡驅之五步而立調成之也君出就車則僕并轡授綏車上僕所主也左右攘辟謂群臣陪位侍駕者也攘卻也或音攘古讓乎也車騎而騶至于大門君撫僕之手而顧命車右就車門閭溝渠必步車右勇力之士備制非常者君行則陪乘君式則下步行也凡僕人之禮必授人綏若僕者降等則撫僕之手不然則自下拘之撫小止之議也自下取之也僕與己下拘之由僕手同爵則不受又曰魯莊公及宋人戰于乘丘懸奔父御卜國為右馬驚敗績公墜左車授綏公曰未之卜也懸奔父曰他日不敗績而今敗績是無勇也遂死之圉人浴馬有流矢在白肉公曰非其罪也遂誄之周禮曰教國子以五馭一曰鳴和鑾二曰逐水曲三曰過表四曰舞交衢五曰遂禽在論語曰子謂門弟子曰吾何執執御乎執射乎吾執御矣大戴禮曰善御馬者正御勒齊轡策均馬力和馬心, WYG: ''}
