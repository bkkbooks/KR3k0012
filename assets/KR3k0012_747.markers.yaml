  - {type: variant, offset: 1509, length: 0, content: '', krp: 盧知猷器度長厚文詞美麗尤工書一落簡翰人爭摸倣又曰鍾紹京䖍州贑人也𥘉爲司農録事以工書直鳯閣則天時明堂門額九鼎之銘及諸宫殿門牓皆紹京所題又曰王涯旣誅涯家書數萬卷侔於書府前代法書名畫人所保惜者必以厚貨致之不受貨者必以官爵致之厚爲垣竅而藏之覆壁至是人破其垣取之或剔取凾奩金寳之飾與其玉軸而弃之蔡琰別傳曰琰對曹操曰乞給紙筆真草唯命也邴原別傳曰原年五六歳過書舎而泣師曰何泣原曰孤}
  - {type: variant, offset: 1510, length: 3, content: 貢問治, SBCK: 易傷感夫書者皆有父母也今顧其書故惻然涕零也師哀原言而爲之泣曰欲書不須費也遂就書江偉家傳曰偉性善書}
  - {type: variant, offset: 1510, length: 118, content: 貢問治人於孔子孔子曰懍焉如與腐索御汗馬懍懼也汗突之馬也國語曰鐵之戰簡子曰鄭人擊我吾伏弢他刀切弢弓文流血鼓音不衰今日之事莫我若也衛莊公為右衛莊公奔晉趙簡子將納之為右也曰吾九登九下擊人盡殪今日之事莫我加也郵無正御曰吾兩鞅將絕吾能止之郵無正大, WYG: 易傷感}
  - {type: variant, offset: 1510, length: 3, content: 貢問治, krp: 易傷感夫書者皆有父母也今顧其書故惻然涕零也師哀原言而爲之泣曰欲書不須費也遂就書江偉家傳曰偉性善書}
  - {type: variant, offset: 1514, length: 0, content: '', SBCK: 得其手䟽莫不藏之以爲寳神仙傳曰東郭延服靈飛散能夜書言目明又曰王逺字方平東海人也􅀶學尢明天文䜟緯河洛之要逆知天下盛衰之期漢桓帝聞之連徴不岀使郡國逼載詣京師低頭閇口不肯荅乃題官門扇四百餘字皆􅀃方來帝甚恐之使刮去外字復見墨皆徹入版裏石虎鄴中記曰石虎有馬妓着朱衣進賢冠立}
