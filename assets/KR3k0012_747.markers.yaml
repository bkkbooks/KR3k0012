  - {type: variant, offset: 1486, length: 0, content: '', WYG: 也其材任覇王佐屈節治單父以自試意者其以此諫乎公悟太息歎曰寡人亂宓子之政而責其善數矣漢書曰陳遵長八尺餘長頭大鼻容貌甚偉畧渉傳記贍於文辭性善書與人尺牘主皆藏弆以為榮又曰宣帝時中郎将張彭祖少與帝微時同席研書及帝即尊位彭祖以舊恩封陽都侯又曰田蚡學盤盂諸書孔甲三十六篇雜家書後漢書曰孫敬字文寳少時畫地學書日進焉東觀漢記曰樂成靖王黨善史書喜正文字也魏志曰胡昭善尺牘動見模楷衛覬好古文鳥篆𨽻草無所不善也晉書曰王羲之嘗詣門生家見棐几滑浄因書之真草相半後為其父刮去之門生驚懊累日又曰王羲之山隂有道士好養鵝羲之觀焉意甚悦固求市之道士云為冩道徳經當舉羣相贈耳羲之欣然冩畢籠鵝而歸又曰羲之每自稱我書比鍾繇當抗行比張芝猶當鴈行曽與人書曰張芝臨池學書池水盡黒使人耽之若是未必後之也又曰羲之嘗在蕺山見老姥持六角竹扇賣之羲之因書其扇各為五字姥初有愠色乃謂姥曰但言是王右軍書以求百錢姥如其言人競買之他日姥又持扇來羲之笑而不答又曰王獻之七八嵗時學書父羲之從後掣其筆不得歎曰此兒後當復有大名常書壁為方丈字羲之甚以為能觀者數百人又曰謝安嘗問獻之君書何如君家尊答曰故當不同安曰外論不爾答曰人那得知又曰衛恒字巨山轉黄門郎恒善草𨽻書為四體書勢曰昔在黄帝創制造物有沮則魚反誦蒼頡者始作書契以代結繩盖覩鳥跡以興思也因而遂滋則為之字有六義焉一曰指事上下是也二曰象形日月是也三曰形聲江河是也四曰㑹意武信是也五曰轉注老考是也六曰假借令長是也又曰索靖作書状其辭曰聖王御世隨時之宜蒼頡既生書契是為科斗鳥篆類物象形睿哲變通意巧滋生損之𨽻草以崇簡易百官畢修事業並麗盖草書之為状也婉若銀鈎漂若驚鸞舒翼未發若舉復安蟲虵虬蟉力幽切或往或還形阿那以羸類歘奮釁而桓桓乃其逸遊盻嚮乍正乍邪騏驥暴怒逼其轡海水窊隆揚其波芝草蒲萄還相繼棠棣融融載其華𤣥熊對踞於山岳飛燕相追而差池舉而察之又似乎和風吹林偃草扇樹枝條順氣轉相比附窈嬈奴鳥切亷苫隨體散布紛擾擾以綺靡中持疑而猶豫𤣥螭狡獸嬉其間騰猿飛鼺相奔趨凌魚奮尾蛟龍反據投空自竄張設牙距或若登髙望其類或若既往而中顧或若倜儻而不羣或若自檢於常度於是多才之英篤藝之彦役心精微躭此文憲守道兼權觸類生變離析八體靡形不判去繁存微大象未亂上理開元下周謹按騁辭放手兩行氷散髙音翰勵溢越流漫忽班班而成章信奇妙之煥爛體磥落而壮麗姿光潤以璀璨命杜度運其指使伯英廽其腕著絶勢於紈素垂百世之殊觀宋書曰劉穆之傳髙祖書素拙穆之曰此雖小事然宣被四逺願公少復留意髙祖既不能措意又禀分有在穆之乃曰公但縱筆為大字一字徑尺既足有所苞且其勢亦美髙祖從之一紙不過六七字便滿齊書曰太祖善書及登位篤好不已與王僧䖍賭書畢謂䖍曰誰為第一僧䖍對曰臣書臣中第一陛下書帝中第一上笑曰卿可謂善自為謀矣宋書曰謝超宗謂王慈曰卿書可及䖍公慈曰我之不及父猶鷄之不及鳯也時人以為名言宋書曰江夏王鋒字宣頴髙帝第十三子也四嵗好學書畜於母張氏舎張氏無紙乃倚井欄為書滿則洗之已而復書如此累月又每晨不肯去窓塵而就塵書帝常使學鳯尾詔一學即工帝大悦以玉麒麟賜之曰以麒麟賞鳯尾矣梁書曰武帝論蕭子雲書曰筆力勁駿心手相應巧踰杜度美過崔寔當與元常鍾繇也並驅争先其見賞如此比為東陽太守百濟國使人至建業求書逄子雲維舟将發使人於渚次候之望船三十許歩前行子雲遣問之答曰侍中尺牘之美逺流海外今日所求惟在名迹子雲乃為停船三日書三十紙與之獲金貨數百萬性恡自非答餉不書好事者重加賂遺以要其答又曰顔協者渉羣書工於草𨽻飛白時吳人范懐約能𨽻書協學其書殆過真也荆楚碑碣皆協所書時人有㑹稽謝善勛能為八體六丈方寸千言京兆韋仲善飛白並在湘東王府善勛為録事參軍仲為中兵參軍府中以協優於韋仲而減於善勛飲酒至數升醉後輙張眼大罵雖復貴賤親踈無所擇也時謂之謝方眼而胷襟夷坦有士君子之操焉後魏書曰崔潜為兄渾誄手筆草本㑹昌初著作郎王遵業買書於市而遇得之至今將二百載寳其書迹深秘蔵之武定中遵業子松年以遺黄門郎崔季舒人多摹榻之又曰崔𤣥伯尤善草𨽻行狎之書為世模楷𤣥伯祖悦與范陽盧諶並以博藝著名諶法鍾繇悦法衛瓘而俱習索静諶傳子偃偃傳子邈悦傳子潜潜傳𤣥伯故魏初重崔盧之書唐書曰太宗嘗謂侍中魏徴曰虞世南死後無人可與論書徴曰禇遂良下筆遒勁甚得王逸少體太宗即日召令侍讀嘗以金帛購求王羲之書跡天下争賫古書詣闕以獻當時莫能辨其真偽遂良備論所出一無所悞又曰虞世南字伯施同郡沙門釋智永智永羲之嫡孫善學王羲之書世南師焉妙得其體由是聲名籍甚又曰栁公權字誠懸㓜嗜學十三能為詞賦元和初進士擢第釋褐秘書省校書郎李徳鎮夏州辟為掌書記穆宗即位入奏事帝召見謂公權曰我以佛寺見卿筆跡思之乆矣即日拜右拾遺充翰林侍書學士遷右補闕司封員外郎穆宗政僻嘗問公權用筆何盡善對曰用筆在心心正則筆正上改容知筆諫也公權初學王書遍閲近代筆法體勢勁媚自成一家當時公卿大臣家碑板不得公權手筆者人以為不孝外夷入貢皆别署貨貝曰此購栁書上都四明寺金剛經碑備有鍾王歐虞禇陸之體尤為得意文宗夏日與學士聨句帝曰人皆苦炎熱我愛夏日長公權續曰薫風自南來殿閣生微凉時丁袁五學士皆屬繼帝獨諷權兩句曰詞清意足不可多得乃令公權題於殿壁字方圎五寸帝視之歎曰鍾王復生無以加焉又曰栁公權大中初轉少師中謝宣宗召昇殿御前書三紙軍容使西門季𤣥捧硯樞宻使崔巨源過筆一紙真書十字曰衛夫人傳筆法於王右軍一紙行書十一字曰永禪師真書千字文得家法一紙草書八字曰謂語助者焉哉乎也賜錦綵缾盤等銀器仍令自書謝状勿拘真行帝尤奇惜之又曰歐陽詢潭州臨湘}
