  - {type: variant, offset: 2475, length: 0, content: '', SBCK: 明月之光可以逺望而不可以細書也慎子曰書契所以識公信也隋巢子曰史皇産而能書三輔決録曰韋誕字仲將除武都太守以書不得之郡轉侍中典作魏書號散􅀐書一名大魏書凡五十篇洛陽鄴許三都宫􅀚始就命誕銘題以爲永制以}
