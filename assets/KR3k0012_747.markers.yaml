  - {type: variant, offset: 1509, length: 0, content: '', WYG: 盧知猷器度長厚文詞美麗尤工書一落簡翰人争模倣又曰鐘紹京䖍贛州人也初為司農録事以工書直鳯閣則天時明堂門額九鼎之銘及諸宫殿門牓皆紹京所題又曰王涯既誅涯家書數萬卷侔於書府前代法書名畫人所保惜者必以厚貨致之不受貨者必以官爵致之厚為垣竅而蔵之覆壁至是人破其垣取之或剔取函奩金寳之飾與其玉軸而棄之蔡琰别傳曰琰對曹操曰乞給紙筆真草唯命也邴原别傳曰原年五六嵗過書舎而泣師曰何泣原曰孤}
