  - {type: variant, offset: 2302, length: 2, content: 說苑, SBCK: 來公言未有善也故知未死膺甚竒之後與膺談論百家經史應荅如流膺不能下之又曰劉祐字伯祖中山安國人也祐􅀄察孝廉􅀘尚書侍侍郎閑悉故事文札強辯每有奏議對應爲儕􅀋所歸謝承後漢書曰郭宏爲郡上計吏正月朝覲宏進殿下謝祖宗受恩言辭辯麗專對移時天子曰潁川乃有此辨士邪子貢晏嬰何以加之羣公屬目卿士歎伏又曰郭宏爲郡上計吏朝廷問宏潁川風俗所尚土地所岀先賢將相儒林文學之士宏援經以對陳事荅問出言如浮引義如流東觀漢記曰班超字仲叔扶風平陵人徐令彪之子也爲人大志不脩細節然内孝謹居家常執勤苦不耻勞辱有口辯而渉獵書傳魏志曰黄􅀄元年郭淮奉使賀文帝踐祚而道路疾稽留帝正色責之曰昔禹㑹諸侯於塗山防風後至使行顯戮今􅄎天同慶而最留遲何也淮對曰臣聞五帝先教道人以德夏后政衰始用刑辟今臣遭唐虞之代是以自知免於防風之誅也帝恱之擢領雍州刺史魏典畧曰邯鄲之北有蘇大侯者􅂫􅁗徃􅀃之􅂫大侯送以百金家丞問其故蘇大侯曰客辯士也立談之間再奪吾地而復歸之吾地雖小豈直百金耶又曰韓宣字景然渤海人爲人短小建安中丞相召署軍謀椽冗散在鄴甞於鄴歩行入宮於東掖門内與臨淄侯植相遇時天新雨地有泥潦宣欲避之閡潦不得去乃以扇自鄣住於道邊植嫌旣不去又不爲禮乃駐車使其常從問宣何官宣云丞相軍謀椽也植又問曰應得唐突列侯不宣曰春秋之義王人雖微列于諸侯之上未聞宰士而爲下士諸侯之禮植又曰即如所言爲人父吏見其子應有禮不宣又曰於禮臣子一例也植知其難窮乃釋去去以爲辯也梁祚魏國統曰黄權來降文帝從容謂權曰君舎逆効順欲進蹤陳韓邪對曰臣過受劉氏殊遇降呉不可歸蜀無路是以歸命且敗君之將免死爲幸何古人之敢慕也帝善之呉志}
