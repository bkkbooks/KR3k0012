  - {type: variant, offset: 1913, length: 333, content: 疑議家事既定則又決之所幸蔡嫗故事多不就母子之間猶不免乎蔡嫗之議今人主皆有蔡嫗而於臣非骨肉之親安得不敗君曰寡人聞命遂相之委以從事江表傳曰曹公聞周瑜年少有俊才謂可遊說動也密下楊州遣九江蔣幹往見瑜幹有儀容以才辯見稱獨步江淮之間莫與為對乃布衣葛巾自託私行詣瑜瑜出迎之立謂幹曰子翼卿苦遠江湖為曹氏作說客耶幹曰吾與足下州里中間別隔遙聞芳烈故來敘闊并觀雅頌而云說客無乃逆詐乎瑜曰吾雖不及夔曠聞弦賞音足知曲也因延幹入為設酒食後三日瑜請幹與周觀營中行視倉庫軍資器仗言訖還飲宴示之侍者服飾珍玩之物因謂幹曰丈夫處世一遇知己外守君臣之義內結骨肉之恩言行計從禍福共之假使蘇張更生酈叟復在吾猶拊其背而折其辭豈足下幼生所能移乎幹但笑終無所言幹還稱瑜雅量非言辭所間中州之士亦此多之王充論衡曰傳稱蘇秦, SBCK: ''}
