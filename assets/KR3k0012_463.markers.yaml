  - {type: variant, offset: 389, length: 966, content: 抗衡不如與之絕若不能當何不按兵束甲北面而事之今將軍外託服從之名而內懷猶豫之計事急而不斷禍至無日矣晉中興書曰蘇峻反溫嶠推陶侃為盟主侃欲西歸嶠說侃曰天子幽逼社稷危殆四海臣子肝腦塗地嶠等與公致命之秋事若剋濟則臣主同休如其不然身雖灰滅足以謝責於先帝今之事勢義無旋踵騎虎之勢可得下平公若違眾獨反眾心必沮沮眾以敗事義旗將廻指於公矣侃無以對遂留不去又曰建興初祖逖進說曰晉室之亂非上無道而逃民怨叛也由藩王爭權自相誅滅遂使戎狄乘隙毒流中原今天下既被殘酷遺黎思本人有奮擊之心但悉無所憑倚大王誠能命將帥使若逖等執殳前驅上為國家雪恥下為百姓請命則郡國豪傑必因風嚮起沉溺之民欣於來蘇也掃灑中原清復寰宇此千載之一時願大王圖之中宗於是始欲疆理神州又曰劉牢之屯洌州桓玄至于湖熟遣牢之族舅何睦說曰今君戰敗則傾宗戰勝亦覆族欲以是安歸乎孰若翻然改圖唯理是宅則與金石等固名與天壤俱窮哉牢之得說詣玄請降也范亨燕書曰晉室大亂高祖方經略江東高翔說高祖曰自王公政錯士人失望繈負歸公者動有萬數今王氏敗沒而福宿見尾箕其兆可見也今晉室雖衰人心未變宜遣貢使江東亦有所尊然後仗義聲以掃不庭可以有辭於天下高祖深納焉宋書曰二凶搆逆王僧達廻感不知所從有客說之曰為君計莫若承義師之撽移告傍郡使工言之士明示禍福也唐書曰李懷光屯軍咸陽反狀始萌李景略時說懷光請復宮闕迎大駕懷光不從景略出軍門慟哭曰誰知此軍一日陷於不義軍士相顧甚義之因退歸私家又曰柏耆者將軍良器之子素負志略學縱橫家流會王承宗以常山叛朝廷厭兵欲以恩澤撫之耆於蔡州行營以畫干裴度請以朝旨奉使鎮州乃自處士受左拾遺既見承宗以大義陳說承宗泣下請質二男獻兩郡由是知名韋昭吳書曰將軍曹仁在公安拒守呂蒙令虞飜說之飜至城門仁不肯相見乃為書曰將軍獨守縈帶之城而不降死戰則毀宗滅祀為天下笑幸熟思焉仁得書流涕而降之太公六韜曰文王齋戒三日乘田車田馬田于渭之陽呂尚以竿以漁曰今臣言至情不諱君其惡之乎緡微餌明小魚食之緡調餌多大魚食之夫魚食於餌乃牽於緡人食其祿而服於君故以餌取魚魚可殺以祿取人人可竭也春秋後傳曰梁以張儀為齊相楚怒約而攻梁雍沮曰請令解攻雍沮謂齊楚之王曰王亦聞張儀之約秦王乎曰王若相儀於梁齊楚惡儀必攻魏魏戰而勝是齊楚之兵折而儀固得梁矣若不勝梁必事秦以持其國必割地以賂王若欲復攻其弊不足以應秦此儀之所以與秦王陰相約也齊楚王曰善乃遽解兵又曰魏加問春申君聞欲將臨武君, SBCK: 柄}
