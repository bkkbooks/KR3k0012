  - {type: variant, offset: 1363, length: 0, content: '', SBCK: 燕容蔡澤天下俊雄辯智士也彼一見􅁗王必奪君位應侯使人召澤澤入揖應侯應侯固不快矣及見又倨應侯因讓之曰子甞宣言欲代吾相􅁗豈有之乎對曰然應侯曰請聞其􅀃澤曰吁君何見之晚耶夫四時之序功成者去未成者來君禄位貴盛私家之冨皆巳極矣不退將危}
