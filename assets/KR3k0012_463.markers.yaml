  - {type: punctuation, offset: 1476, content: 「, id: KR3k0012_CHANT_463-bkkpn389}
  - {type: variant, offset: 1476, length: 436, content: 皇甫嵩既破黃巾威震天下故信都令漢陽閻忠說嵩曰難得易失者時也時至不旋踵者機也故聖人常順時而動智者必因機以發今將軍遭難得之時蹈機而不發將何以權大名乎又曰劉備救徐州刺史陶謙會謙病死伏波將軍陳登說備曰今欲為使君合眾十萬上可以匡主濟人成五霸之業下可以割地守境書名竹帛若使君不聽登亦未聽使君得發備遂領徐州孔演漢魏春秋曰興平元年曹公復征陶謙陳宮說張邈曰雄傑並起君以千里之眾當四戰之地撫劍顧盼亦足以為人豪而反制於人不以鄙乎魏氏春秋曰鍾會陰懷異圖姜維見而知其心謂可構成擾亂以圖克復乃詭說之曰君自淮南已來筭無遺策晉道克昌皆君為之今復定蜀威德大震其民高其功而主畏其謀欲以此安歸乎夫韓信不背漢於擾攘而見疑於既平大夫種不從范蠡於五湖卒伏劍而亡彼豈闇主愚臣哉利害使之然也今君大功既立大德已著何不法陶朱公汎絕跡全功保身登娥媚之嶺而從赤松遊乎會曰君言遠我不能行且為全身之道或未盡於此也維曰其他則君智力之所能無煩於老夫矣由是情好欣甚周載曰薄款者衛之居士也疑進說衛嗣君以王道嗣君悅延之以相辭曰疑之毋以疑為賢然, SBCK: 蘇􅁗初}
  - {type: variant, offset: 1476, length: 768, content: 皇甫嵩既破黃巾威震天下故信都令漢陽閻忠說嵩曰難得易失者時也時至不旋踵者機也故聖人常順時而動智者必因機以發今將軍遭難得之時蹈機而不發將何以權大名乎又曰劉備救徐州刺史陶謙會謙病死伏波將軍陳登說備曰今欲為使君合眾十萬上可以匡主濟人成五霸之業下可以割地守境書名竹帛若使君不聽登亦未聽使君得發備遂領徐州孔演漢魏春秋曰興平元年曹公復征陶謙陳宮說張邈曰雄傑並起君以千里之眾當四戰之地撫劍顧盼亦足以為人豪而反制於人不以鄙乎魏氏春秋曰鍾會陰懷異圖姜維見而知其心謂可構成擾亂以圖克復乃詭說之曰君自淮南已來筭無遺策晉道克昌皆君為之今復定蜀威德大震其民高其功而主畏其謀欲以此安歸乎夫韓信不背漢於擾攘而見疑於既平大夫種不從范蠡於五湖卒伏劍而亡彼豈闇主愚臣哉利害使之然也今君大功既立大德已著何不法陶朱公汎絕跡全功保身登娥媚之嶺而從赤松遊乎會曰君言遠我不能行且為全身之道或未盡於此也維曰其他則君智力之所能無煩於老夫矣由是情好欣甚周載曰薄款者衛之居士也疑進說衛嗣君以王道嗣君悅延之以相辭曰疑之毋以疑為賢然與疑議家事既定則又決之所幸蔡嫗故事多不就母子之間猶不免乎蔡嫗之議今人主皆有蔡嫗而於臣非骨肉之親安得不敗君曰寡人聞命遂相之委以從事江表傳曰曹公聞周瑜年少有俊才謂可遊說動也密下楊州遣九江蔣幹往見瑜幹有儀容以才辯見稱獨步江淮之間莫與為對乃布衣葛巾自託私行詣瑜瑜出迎之立謂幹曰子翼卿苦遠江湖為曹氏作說客耶幹曰吾與足下州里中間別隔遙聞芳烈故來敘闊并觀雅頌而云說客無乃逆詐乎瑜曰吾雖不及夔曠聞弦賞音足知曲也因延幹入為設酒食後三日瑜請幹與周觀營中行視倉庫軍資器仗言訖還飲宴示之侍者服飾珍玩之物因謂幹曰丈夫處世一遇知己外守君臣之義內結骨肉之恩言行計從禍福共之假使蘇張更生酈叟復在吾猶拊其背而折其辭豈足下幼生所能移乎幹但笑終無所言幹還稱瑜雅量非言辭所間中州之士亦此多之王充論衡曰傳稱, WYG: ''}
