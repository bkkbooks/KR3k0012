  - {type: variant, offset: 1360, length: 0, content: '', SBCK: 之澤曰今􅀂臣者何如唐舉熟視而􅀏曰先生揭􅈹戾脣魋顔蹙齃吾聞聖人不相殆先生乎蔡澤被唐舉之戲乃曰冨貴吾所自有吾不知者壽也願聞之舉曰先生從今巳徃四十三歳澤􅀏謝去謂其衘者曰吾躍馬食肉冨貴四十三年亦足}
