  - {type: variant, offset: 2978, length: 962, content: 儀曰上中下曰參以立焉變生事事生謀謀生計計生儀儀生說說生進注曰三儀有上有下有中會同異曰儀決是非曰說呂氏春秋曰伍子胥將見吳王而不得客有言之於王子光者王子光見之而惡其皃不聽其說而辭之客請之王子光曰其皃吾所甚惡也客以告子胥子胥曰此易改也願令王子光居於堂上重帷而見其衣子光許之胥說之半王子光舉帷搏其手而與之坐說畢王子光大悅子胥以為有吳國者必王子光也退而耕於野十年子光為王任子胥子胥為法制下賢良選陣士習戰鬭六年然後大勝楚於柏舉九戰九勝逐北千里昭王出奔又曰韓氏城新城期十五日而成段橋為司空有一縣後二日段橋執其吏而囚之囚者之子走告封人子高曰唯先生能活臣父封人子高曰諾乃見段橋自扶而上城封人子高左右望曰美哉城壹大功矣子必有厚賞矣自古及今功若此其大也而能無有罪戮者未曾有也封人子高出段橋使人夜解其吏之束縛之者而出之說之行若此其精也封人子高可謂善說矣又曰孟嘗君為從公孫弘謂孟嘗曰不若西觀秦王之意弘見昭王曰薛之地小大弘曰百里昭王曰寡人之國地數千里猶未敢以有難也今薛百里之地而欲難寡人乎公孫弘曰孟嘗君好士大王不好士昭王笑而謝之又曰善說者若巧士因人之力以自為力因其來而與來因其往而與往所因便也尸子曰公輸般為蒙天之階階成將以攻宋墨子聞之赴於楚行十日十夜而至於郢見王曰今有人於此舍其文軒鄰有弊輿而欲竊之舍其錦繡鄰有短褐而欲竊之舍其梁肉鄰有糟糠而欲竊之此為何若人王曰必竊疾矣墨子曰荊之地方五千里宋方五百里此猶文軒之與弊輿也荊有雲夢犀兒麋鹿盈溢江漢之魚鱉黿鼉為天下饒宋所謂無雉兔鮒魚者也猶梁肉之與糠糟也荊有長松文柏梓柟豫章宋無長木猶錦繡之與短褐也臣以王之攻宋也為與此同類王曰善哉請無攻宋孔叢曰齊攻趙國稟立趙使孔青擊之克齊軍尸三萬趙王詔勿歸其尸將以困之子慎聘齊曰以臣愚計貧齊之術乃宜歸尸使其家遠來迎尸不得事農一費歸而葬之二費也一年之中喪三萬費欲無困貧弗可得也王曰善又曰五國約而誅秦未入秦境而留兵於成皋子慎謂市丘君曰此師楚為之主今兵不散殆有異意君其備之市丘君曰先生幸而教之子慎許諾遂見楚王曰王約五國而伐秦事既不集王胡不卜交乎楚王曰柰何子慎曰王今出令使五國勿攻市丘五國重王則聽王之令矣不重王且反王令而攻市丘以此卜為國交王之輕重必明矣楚王敬諾而五國散揚雄解嘲曰婁敬委輅脫輓棹三寸之舌案漢書曰婁敬說高祖西都又曰上說人主下談公卿一從一橫論者莫當班固荅賓戲曰遊說之徒風颺電激, SBCK: ''}
