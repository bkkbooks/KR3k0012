  - {type: variant, offset: 215, length: 173, content: 眾遠來疲弊聞追豫州騎一日一夜行三百里此所謂強弩之末不能穿魯縞者今將軍誠與豫州協規同力破操軍必矣權大悅即并力拒曹公敗於赤壁又曰曹公追先主至於夏口諸葛亮曰事急矣請奉命求救於孫將軍時權軍柴桑觀望成敗亮說權曰海內大亂將軍起兵江東劉表豫州牧眾漢南與曹操並爭天下今操芟荑大難略已平矣遂破荊州威震四海英雄無所用武故豫州牧遁逃至此將軍量力而處之若能以吳越之眾與中, SBCK: 内持}
