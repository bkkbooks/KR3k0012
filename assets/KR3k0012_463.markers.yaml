  - {type: variant, offset: 2370, length: 0, content: '', SBCK: 酒色不肯復飲曰此非養老之禮也權曰卿其能令公辭屈乃當飲之耳恪難昭曰師尚父九十秉旄伏􅃏猶未告老也今軍旅之事將軍在後酒食之事將軍在先何謂不養老也昭卒無辭遂爲盡爵又曰孫權遣都尉趙咨使魏帝問曰呉王何等主趙咨對曰聦明仁智雄畧之主也帝問其狀荅曰納魯肅於凢品是其聦也拔吕蒙於行軍是其明也獲于禁而不害是其仁也取荆州兵不血刃是其智也據}
