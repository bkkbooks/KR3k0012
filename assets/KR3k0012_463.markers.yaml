  - {type: variant, offset: 2541, length: 3, content: 擊排然, SBCK: 屈服張勃呉録曰呉興沈友字子正善屬文有口辯每所至衆人皆黙因號曰謐衆咸言其筆之妙力之妙舌之妙皆絶於人也蜀志曰先是應闓送張裔於孫權諸􅁑亮遣鄧芝使呉亮令芝言次從權請裔裔自至呉數年流徙伏匿權未知也許之遣裔臨發乃引見問裔曰蜀卓氏寡女亡奔司馬相如貴土風俗何以乃爾裔對曰愚以爲卓氏之女猶賢於買臣之妻權又謂裔君還必用事西朝終必不作田父於閭里也將何以報我對曰裔􅀒罪而歸將委命有司􅀂蒙僥倖得全首領五十以前父母之年自此以}
