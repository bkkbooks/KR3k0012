  - {type: variant, offset: 2296, length: 4, content: 泣亦沾襟, SBCK: 曰􅂫􅁗詞說與張儀一體也又曰楚陳􅎮詞辯之士也􅀄與張儀俱事􅁗惠王惠王皆重之儀惡􅎮於王曰陳􅎮重幣輕信􅁗使之楚將爲交也今楚不善於􅁗而善於􅎮王以儀言召􅎮問之􅎮曰然王聞楚有两妻者乎王曰不聞􅎮曰楚有兩妻者人挑其長者長者罵之挑其少者少者復挑之居無何有兩妻者死客謂挑者曰謂汝娶長者乎少者乎挑者曰娶長者客曰長者罵汝少者復挑汝何故娶長者對曰居人之所則欲其挑我爲妻則欲其罵人今楚王明主昭陽賢相使􅎮爲臣常以國情輸楚楚王將不留臣昭陽將不與臣從事矣臣必之楚足以明臣爲楚與不也􅎮岀張儀入問王曰􅎮果欲之楚不王曰然􅎮天下之辯士寡人遂無柰何也惠王終相張儀􅎮遂奔楚楚用爲上卿後􅎮爲楚使之􅁗惠王見之謂曰子去寡人之楚寡人甚思子子思寡人乎􅎮曰王聞越人莊舄乎王曰不聞􅎮曰越人莊舄仕楚執珪有頃而病楚王曰舄越之鄙人凢人之思固在其病也思越則越聲不思越則楚聲使人聽之猶尚越聲今臣弃逐之楚能無􅁗聲哉漢書曰酈食其有詞辯年六十身長八尺鬢髮皓然請見髙祖謁者曰上好嫚罵人不喜儒生有客冠而來者輙解其冠而溺其中食其作色叱之曰我髙陽酒徒何儒生之有謁君股慄而見之髙祖乃踞床使兩女子洗足食其入長揖不拜曰欲助􅁗攻諸侯乎將欲率諸侯攻􅁗乎髙祖罵曰竪儒夫天下同苦􅁗乆矣故諸侯相率攻􅁗汝奚爲助􅁗耶食其曰必欲聚合義兵誅無道􅁗不冝踞見長者髙祖懔然而起抜足揮洗攝衣延食其坐而謝之食其因言六國縱横王覇之道高祖大恱問其計食其曰足下起烏合之衆収散亂之兵不滿二旅而欲皷行入􅁗所謂探虎口而餵餓狼也夫陳留者當天下之衝四通五逵之郊城堅粟多可以少留臣知其令請使命下之如不聽可舉兵攻之臣爲内應不崇朝而拔之矣於是髙祖乃遣食其􅀃陳留令髙祖引兵隨之遂下陳留又曰少府五鹿充宗貴幸善梁丘氏易元帝好之欲考其異同令與諸家論易充宗貴辯口諸儒莫能與抗皆稱疾不敢㑹有薦朱雲者召入攝齊登臺抗首而請音動左右旣論難連柱五鹿君故諸儒爲之語曰五鹿嶽嶽朱雲折其角又曰婁護爲人短小精辯論議常依名節聽之者竦然與谷永俱爲五侯上客長安號曰谷子雲之筆札婁君卿之脣舌言其見信用也又曰􅄯錯頴川人也爲太子家令以其辯得幸太子太子家號曰智囊又曰田蚡貴幸爲中大夫辯有口學盤盂諸書應劭曰黄帝史孔甲所作名也孔甲盤孟二十六篇又曰東方朔自公卿在坐朔皆傲弄無所屈上以朔口諧給甞問先生視朕何如主也朔對曰自唐虞之隆成康之際未足喻當世臣朔伏觀陛下功德陳五帝之上在三王之右非􅀂此而巳誠得天下賢士公卿在位或得其人譬若以周邵爲丞相孔丘爲御史大夫太公爲將軍卞莊子爲衛尉臯陶爲大理后稷爲司農伊尹爲少府應劭曰伊尹善烹割太官屬少府故令作子貢使外國顔閔爲􅀶士子夏爲太常孟子爲右扶風季路爲埶金吾契爲鴻臚龍逢爲宗正伯夷爲京兆管仲爲馮翊魯般爲將作山甫爲光禄申伯爲大僕延陵季子爲水衡百里奚爲典屬國曉其風俗故令為之柳下惠爲大長秋史魚爲司直蘧伯玉爲太傅如淳曰太傅傅人主使無過伯玉欲寡其過也孔父爲詹事叔敖爲諸侯相子産爲郡守王子慶忌爲期門夏育爲鼎官羿爲旄頭宋萬爲式道候上乃大􅀏也又曰終軍字子雲濟南人少好學以辯􅀶能屬文聞於郡年十八選爲􅀶士弟子至府太守聞其有異才召見軍甚竒之及至長安上書言事武帝異其文拜軍爲謁者給事中又曰蒯通知天下權在於韓信令背漢乃先微感信曰僕甞受相人之術相君之面不過封侯又危而不安相君之背貴而不可言信曰何謂也通曰天下􅀄作難也俊雄豪傑建號壹呼天下之士雲合霧集魚鱗雜襲飈至風起當此之時憂在亡􅁗而巳今}
