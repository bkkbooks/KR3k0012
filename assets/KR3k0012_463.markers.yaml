  - {type: variant, offset: 2668, length: 3, content: 午合篇, SBCK: 伊籍字幾伯陽人隨先主入益州東使呉孫權聞其才辯欲逆折以辭籍適入拜權曰勞事無道之君籍即對曰一拜一起未足爲勞又曰呉遣使張温來聘百官皆徃餞焉温問􅁗密曰天有頭乎密曰詩女乃眷西顧以此推之頭在西方温曰天有耳乎密曰詩}
