  - {type: variant, offset: 2301, length: 0, content: '', WYG: 項分爭使人肝腦塗地流離中野不可勝數今時兩主懸命足下足下為漢則漢勝與楚則楚勝臣􅂅披心腹肝膽効愚忠恐足下不能用也方今為足下計莫若兩利而俱存之三分天下鼎足而立天下孰不聴足下􅂅圖之信曰漢王遇我厚我豈可見利而背恩乎通曰臣聞勇畧震主者身危功盖天下者不賞今足下挾不賞之功載震主之威歸楚楚人不信歸漢漢人震恐足下欲將安歸乎故猛虎猶預不如蜂蠆之致螫孟賁狐疑不如童子之必至信不忍背漢遂謝通通說不聴惶恐乃徉狂為巫天下既定後信以罪廢為淮隂侯謀反誅臨死嘆曰悔不用蒯通之言髙帝曰是齊辯士蒯通乃詔齊召蒯通至上欲烹之曰若教韓信反何也通曰狗各吠非其主當彼時臣獨知韓信非知陛下也且秦失其鹿天下共逐之髙材者得天下洶洶争欲為陛下所為顧力不能何憚誅耶上廼赦之又曰淮南王黥布反朱建諌之不聴漢既誅布聞建諌之髙祖賜建號平厚君家徙長安為人有口辯刻㢘剛直行不苟合義不取容又曰辯士曹丘生數招權顧金錢孟康曰招金錢事權貴而求事也事貴人趙談竇長君等善季布聞寄書諌長君曰吾聞曹丘非長者勿與通及曹丘歸欲得書謁布竇長君曰季將軍不説足下足下無徃固請使人先發書布大怒曹至則揖布曰楚人諺曰得黄金百斤不如得季布一諾足下何以得此聲梁楚之間哉且僕與足下俱楚人使僕游揚足下名於天下顧不美乎何足下之距僕深也布乃大說引入留數月為上客厚送之布名所以益聞者曹丘揚之也范煜後漢書曰黄琬字子琰瓊之孫早而辯慧祖父瓊為魏郡太守建和元年正月日蝕京師不見瓊以狀聞梁太后太后詔問所蝕多少瓊思其對而未知所况時琬年七嵗在傍云何不言日蝕之餘如月之初瓊大驚即以其言應詔又曰孔融字文舉孔子世孫也李膺為河南尹恃才倨傲誡守門者非吾通家子孫不得輒通融年二十入洛欲以觀其人乃謂守門者曰吾與李君通家子孫耳守門者告膺膺呼召問曰卿與吾有何所故融曰臣先君孔子與公老君同徳比義則臣與公累代通家也膺大恱引坐謂曰卿欲食乎融曰須食膺曰教君為客之禮主人問食但讓不須融曰不然教君為主之禮但置飲食不須問客膺慙乃歎曰吾將老死不見卿富貴也融曰公殊未死膺曰如何融曰鳥之將死其鳴也哀人之將死其言也善}
