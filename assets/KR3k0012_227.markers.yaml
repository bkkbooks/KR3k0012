  body:
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 五侍御史殿中侍御史監察御史侍御史六典曰侍御史掌糺舉百寮推鞫獄訟凢有别付者則按其實狀以奏􅀂尋常之獄推訖断于大理凢事非大夫中丞所劾而合彈奏者則具其事爲狀大夫中丞押大事則豸冠朱衣纁裳白紗中單以彈之小事常服而巳續漢書百官志曰侍御史貟五人秩六百石以公府􅁺属髙第􅀘之或牧守議郎郎中爲之掌察非法受公卿群吏奏事有違失者舉劾之凢郊廟及大拜則一人監威儀有違失則劾奏漢官儀侍臣下曰御史􅁗官也案問有御史掌􅀖國都鄙及萬民之治今以賛􅃁宰應劭漢官儀曰侍御史周官也爲柱下史冠一名曰柱後以䥫爲之言其審固不撓也或􅀃古有獬豸獸主觸邪佞故執憲者以其角形爲冠耳余覽􅁗事云始皇滅楚以其君冠賜御史漢興襲秦因而不改漢書儀曰御史貟}
