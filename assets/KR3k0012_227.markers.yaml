  - {type: variant, offset: 1761, length: 333, content: 今巳後若緣軍國大事及牒式無文者任奏取進旨自餘據章程合行者各令准法處分其故生疑滯致有稽失者請令御史隨事糺彈上從之又曰盧弈懷慎之少子也與兄奐音喚齊名天寶十一年為御史中丞始懷慎及奐並為此官父子三人為中丞清節不易時人美之又曰齊映為御史中丞從德宗幸梁州每遇險映嘗執轡會上馬驚跳奔益甚上懼傷映令捨轡映堅執久之乃止問其故對曰馬奔踶音弟不過傷臣如捨之或犯清塵雖臣萬死何以塞責上嘉歎無巳又曰御史中丞武元衡奏貞元二年御史中丞竇參所奏凡諸使兼憲官者除元帥都統節度觀察都團練防禦等使餘並在本官之位其後蘇弁音卞于顧音顧以度支郎中兼御史中丞鄧求以易州刺史兼御史大夫皆奉進旨令在同類之上伏以前後異同遵守不一臣謹議伏請自今常參官兼御史大夫中丞者惟檢校省官立在本品同類之上從之又曰元和中御史中丞王播奏, SBCK: ''}
