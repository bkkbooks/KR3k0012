  - {type: variant, offset: 3406, length: 818, content: 八將披荊棘定天下及功成之後無所職任伏見詔書以上柱國和干子為祀州刺史其人年垂八十鐘鳴漏盡前任趙州闇於職務政由群小賄賂公行百姓吁嗟謌謠滿道乃云老禾不早殺餘種穢良田古人有云耕當問奴織當問婢此言各有所能也干子弓馬武用是其所長治民莅職非其所解至尊思治無忘興寢如謂優老尚年自可厚賜金帛若令刺舉所損殊大臣死而後巳敢不竭誠上善之干子竟免又曰梁毗為持書侍御史時京師饑上令禁酒劉昉使妾任任縱也屋當鑪酤酒毗劾奏昉曰臣聞處貴則戒之以奢持滿則守之以約昉既位列郡公秩高庶尹縻爵稍久厚祿巳淹正當戒滿歸盈監斯止足何乃規麴蘗之潤競錐刀之末身昵酒徒家為逋藪若不糺繩何以肅厲有詔不治昉鬱鬱不得志又曰柳彧為治書御史右僕射楊素當塗顯貴百寮慴憚無敢忤者嘗以少譴勑送南臺素恃貴坐彧床彧從外來見素如此於階下端笏整容謂素曰奉勑治公之罪素遽下彧據案而坐立素於廷辨詰事狀素由是御之唐書曰孫伏伽初以三事上諫高祖大悅擢拜治書侍御史兼賜帛三百疋時軍國多事賦歛繁重伏伽屢奏請改革舊政高祖並納之因謂裴寂曰隋末無道上下相蒙主則驕矜臣唯謟佞上不聞過下不盡忠使社稷傾危身死疋夫之手朕撥亂反正志在安人平亂任武臣官方委文吏庶得各展器能以匡不逮此每虛心接待冀聞讜言然惟李綱差盡忠款孫伏伽可謂誠直餘人猶踵弊風俛首而巳豈朕所望哉江總贈孔中丞詩曰我行五嶺表辭鄉二十年聞鸎欲動詠披霧即依然疇昔同寮寀今隨年代改借問藏書處唯君故人在故人名官高清簡肅權豪誰知懷九歎徒然泣二毛傅咸御史中丞箴敘曰百官之箴以箴王闕余承先君之蹤竊位憲臺懼有忝累垂翼之責且造斯箴以自勗勵不云自箴而云御史中丞箴者凡為御史中丞欲通以箴之也詞曰煌煌天文眾星是環爰立執法其暉有煥執憲之綱秉國之憲鷹揚虎視肅清違慢蹇蹇匪躬是曰王臣既直其道奚顧其身身之不顧孰有弗震邦國若否惟仲山甫是明焉用彼相莫扶其傾淮南構逆實憚汲生赫赫有國可無忠貞憂責有在繩亦必直良農耘穢勿使能植無禮是逐安惜翅翼喏爾庶寮各敬乃職無為罰先無怙厥力怨及朋友無慚于色罪天子內省有恧音匿慚也是用作箴惟以自勑, SBCK: 七}
