  - {type: variant, offset: 24, length: 5, content: 中宗每歎其, SBCK: 陛下雖巳釋放然天子置三}
  - {type: variant, offset: 25, length: 3, content: 宗每歎, WYG: 暠字景伯順帝時爲侍御史監䕶太子承光宫中常侍高梵受勅迎太子不齎詔書以衣車載太子欲岀太子太傅高褒不知所以力不能止開門臨去暠至横劍當車曰御史受詔監䕶太子太子國之儲副人命所繫常侍來無一尺詔書安知非挾姦耶今日之事有死而已梵不敢爭又曰張綱字文紀遷侍御史漢初遣八使廵行風俗八使同日拜謂之八彦皆宿儒要位唯綱年少官微受命各之所部而綱獨埋車輪於洛陽都亭曰豺狼當路安問狐狸遂奏大將軍梁冀兄弟罪惡京師震悚魏志曰袁紹字本初有姿貌威容能折節下士士多附之太祖少與交以大將軍掾爲侍御史又曰帝嘗大㑹殿中御史簮白筆側階而坐問左右此爲何官何主左右不對辛毗曰謂御史舊持簮筆以奏不法今者直備官但珥筆耳吳志曰吕岱親近吳郡徐原慷愾有才志岱知}
