  - {type: variant, offset: 526, length: 302, content: 劾莫不深相呵毀或延及祖宗其言切直又頗雜嘲戲故世人以此非之齊書曰王僧處遷御史中丞甲族由來多不居憲職王氏分枝居烏衣者位官微咸僧處為此官乃曰此是烏衣諸郎坐處我亦可試為耳又曰江淹為御史中丞明帝作相謂淹曰君昔在尚書中非公事不妄行在官寬猛能析衷今為南司足以震肅百寮也曰今日之事可謂當官而行更恐不足仰稱明旨耳於是彈中書令謝朏音斐司徒左長史王綪音茜護軍長史庾弘遠並以託疾不預山陵公事又奏收前益州刺史劉悛梁州刺史陰智伯並贓貨巨萬輒收付廷尉臨海太守沈昭略永嘉太守庾曇隆及諸郡二千石并大縣官長多被劾內外肅然明帝謂曰自宋巳來不復有嚴明中丞君今日可謂近世獨步梁書曰樂藹遷御史中丞初藹發江陵無故於舡得八車輻如中丞健步避道者至是果遷焉, SBCK: ''}
