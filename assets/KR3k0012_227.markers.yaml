  - {type: variant, offset: 10, length: 2, content: 下晉, SBCK: 崔謐等分道存問賑給思立上䟽諌曰今麥序方秋蠶功未畢三時之務萬姓所先勑使撫廵人皆竦抃忘其家業兾此天恩踊躍叅迎必難抑止集聚旣廣妨廢亦多加以途程往還兼之晨夕停滯旣縁賑給湏立簿}
