  - {type: variant, offset: 14, length: 6, content: 熊遠字孝文遷, SBCK: 李義府恃寵用事婦人淳于氏有美色坐事繫大理乃諷丞畢正義枉法出之將納爲妾㑹有宻言其􅃺者上令給事中劉仲䡄鞠之義府恐洩其謀逼正義自縊於獄中上知而特原義府之罪侍}
