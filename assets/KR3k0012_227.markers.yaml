  - {type: variant, offset: 25, length: 3, content: 宗每歎, krp: 暠字景伯順帝時爲侍御史監護太子承光宫中常侍髙𣑽受勑迎太子不齎詔書以衣車載太子欲出太子太傳髙褒不知所以力不能止開門臨去暠至撗劒當車曰御史受詔監護太子太子國之儲副人命所繫常侍來無一尺詔書安知非挾姦耶今日之事有死而巳𣑽不敢争又曰張綱字文紀遷侍御史漢𥘉遣八使廵行風俗八使同日拜謂之八彦皆宿儒要位唯綱年少官微受命各之所部而綱獨埋車輪於洛陽都亭曰犲狼當路安問狐狸遂奏大將軍梁兾兄弟罪惡京師震悚魏志曰袁紹字夲𥘉有姿皃威容能折節下士士多附之太祖少與交以大將軍掾爲侍御史又曰帝嘗大會殿中御史簮白筆側階而坐上問左古此爲何官何主左右不對辛毗曰謂御史舊時簮筆以奏不法今者直備官但珥耳吴志曰吕岱親近吴都徐原慷愾有才志岱知}
