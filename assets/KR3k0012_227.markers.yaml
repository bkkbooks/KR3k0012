  - {type: variant, offset: 2404, length: 1, content: 秩, SBCK: 禮乎衆不敢對至忠進曰故事臺中無長官御史人君耳目比肩事主得各自彈事不相􅀜或先白大夫而許彈事如彈大夫不知白誰也承嘉黙然而憚其剛正又曰崔琬爲監察御史彈奏宰相宗楚客紀處納等驕恣䟦扈請収劾之舊制大臣有􅀍御史彈者皆俯僂趍出待罪朝省楚客瞋目作色稱以忠鯁􅀍誣中宗令琬與楚客約爲兄弟人竊歎焉又曰齊澣定州義豐人少以詞學稱弱冠制科登第景雲二年中書令姚}
  - {type: page-break, offset: 2404, content: '', id: KR3k0012_SBCK_227-11a}
  - {type: variant, offset: 2404, length: 1, content: 秩, WYG: 禮乎衆不敢對至忠曰故事臺中無長官御史人君耳目比肩事主得各自彈事不相闗白若白大夫乃許彈事如彈大夫不知白誰也承嘉怫然然而憚其剛正又曰崔琬爲監察御史彈奏宰相宗楚客紀處訥等驕恣䟦扈請收劾之舊制大臣有被御史彈者皆俯僂趍岀待罪朝省楚客瞋目作色稱以忠鯁被誣中宗令琬與楚客約爲兄弟人竊歎焉又曰齊澣定州義豐人少以詞學稱弱冠制科登第景雲二年中書令姚}
  - {type: page-break, offset: 2404, content: '', id: KR3k0012_WYG_227-18a, image: WYG0895/WYG0895-0110c.png}
  - {type: variant, offset: 2404, length: 1, content: 秩, krp: 禮乎衆不敢對至忠進曰故事臺中無長官御史人君耳目比肩事主得各自彈事不相關或先白大夫而許彈事如彈大夫不知白誰也承嘉黙然而憚其剛正又曰崔琬爲監察御史彈奏宰相宗楚客紀處納等驕恣䟦扈請収劾之舊制大臣有𬒳御史彈者皆俯僂趍出待罪朝省楚客瞋目作色稱以忠鯁𬒳誣中宗令琬與楚客約爲兄弟人竊歎焉又曰齊澣定州義豐人少以詞學稱弱冠制科登第景雲二年中書令姚}
