  - {type: variant, offset: 836, length: 0, content: '', SBCK: 貞元末華臣李實爲京兆尹恃恩頗撗嘗遇播於途不避故事尹避臺官播移文詆之又曰温造拜侍御史請復置彈事朱衣豸冠於外廊大臣阻而不行李祐自眞州入拜金吾違制進馬一百五十疋造正衙彈奏祐服戰汗流祐私謂人曰吾踰蔡州城擒吴元濟未嘗心動今日膽落于温御史吁可畏哉英雄記曰􅀽紹辟犬將軍府不得巳起從命舉髙第遷侍御史弟術爲尚書紹不欲爲臺下告疾求退三輔决録曰韋約字季明司徒劉愷甚敬重之謂曰君以輕去就故大位不躋今歳垂盡選御史實欲煩君約曰犬馬齒盡旣無膂力又無考課所以躊躇戀慕者以明公禮遇隆崇未能自割因稱素有風疾眩冒不堪乆侍遂徒跣趍出公追不及陳留􅂄舊傳曰楊仁字文義明帝引見問當代政治之事仁對上大竒之拜侍御史明帝崩是時諸馬貴賤各争入宫仁􅀍甲持㦸遮勑宫門不得令入章帝旣立諸馬貴更讃仁刻峻於是上善之通典曰侍御史之職四謂推推有掌推鞫彈掌彈舉公廨知公廨事􅄂事臺}
