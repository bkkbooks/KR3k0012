  - {type: variant, offset: 2146, length: 4, content: 舊例在任, SBCK: 郭震劾刑部尚書趙彦照太子賔客韋嗣立青州刺史韋安石曰彦照以女巫趙五娘左道亂常託爲諸姑潜相影援旣因提挈遂踐台階或駈車造門施婦人之服或携妻就謁申猶子之情同惡相濟一至於此又張易之兄弟􅀔傾朝野嗣立此際結爲舅甥神龍之􅀄巳合誅死天網踈漏􅆎領誤全與安石託附阿韋編諸属籍中宗晏駕削太皇輔正之制定阿韋臨朝之䇿此時朝野危懼人神怨憤臣忝司清憲敢不糺彈彦照等並請准法處分於是並貶官山公啓事曰中書属通事令史孫琳限滿乆習内事才冝殿中侍御史湏空􅀘之不審可否詔曰可曹氏傳曰左擁起於碎吏武帝以爲能擢爲殿中侍御史監察御史}
  - {type: page-break, offset: 2146, content: '', id: KR3k0012_SBCK_227-10a}
  - {type: variant, offset: 2146, length: 4, content: 舊例在任, WYG: 郭震劾刑部尚書趙彦昭太子賔客韋嗣立青州刺史􅅊安石曰彦昭以女巫趙五娘左道亂常託爲諸姑濳相影援旣因提挈遂踐台階或輕車造門施婦人之服或擕妻就謁申猶子之情同惡相濟一至於此又張易之兄弟勢傾朝野嗣立此際結爲舅甥神龍之初已合誅死天網疎漏要領誤全與安石託附阿􅅊編諸屬籍中宗晏駕削太皇輔正之制定阿􅅊臨朝之策此時朝野危懼人神怨憤臣忝司清憲敢不糺彈彦昭等並請准法處分於是並貶官山公啓事曰中書屬通事令史孫琳限滿乆習内事才宜殿中侍御史湏空補之不審可否詔曰可曹氏傳曰左擁起於部吏武帝以爲能擢爲殿中侍御史監察御史}
