  - {type: variant, offset: 1042, length: 370, content: 肅然又曰琅邪王儼字仁威武成第三子累為御史中丞魏氏制中丞出清道與皇太子分路行王公皆逕住車去牛頓車於地以侍中丞過其或違遲則赤棒棒之自都鄴後此儀寢絕武成欲雄寵儼乃使一依舊制初從北宮出將上宮丞凡京畿步騎領軍之官屬中丞之威儀司徒之鹵簿莫不畢備時儼惣領四職帝與胡后在華林園東門外張幕隔青紗步幛觀之遣中使驟馬趣仗不得入自言奉勑赤棒應聲碎其鞍馬驚人墜帝大笑以為善更勑令駐車傳語良久觀者傾京邑陳書曰徐陵除散騎常侍御史中丞時安成王為司空以帝弟之尊勢傾朝野直兵鮑僧叡假王威權抑塞辭訟大臣莫敢言者陵聞之乃為奏彈導從南臺官屬引奏案而入世祖見陵服章嚴肅若不可犯為歛容正色坐陵進讀奏狀時安成王殿上侍立仰視世祖流汗失色陵遣殿中御史引王下殿遂劾免侍中中書監自此朝廷肅然隋書曰後魏延昌中王顯有寵於宣武御史中丞請革選御史此後踵其事每一中尉更置御史自開皇後始自吏部選用依舊入直禁中, SBCK: 也}
