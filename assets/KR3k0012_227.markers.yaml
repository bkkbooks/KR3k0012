  - {type: variant, offset: 990, length: 0, content: '', WYG: 踰蔡州城擒吳元濟未嘗心動今日膽落於温御史吁可畏哉英雄記曰袁紹辟大將軍府不得已起從命舉高第遷侍御史弟術爲尚書紹不欲爲臺下告疾求退三輔决録曰韋約字季明司徒劉愷甚敬重之謂曰君以輕去就大位不躋今歲垂盡選御史實欲煩君約曰犬馬齒盡旣無膂力又無考課所以躊躇戀慕者以明公禮遇隆崇未能自割因稱素有風疾眩冒不堪乆侍遂徒跣趍岀公追不及陳留耆舊傳曰楊仁字文義明帝引見問當代政治之事仁對上大竒之拜侍御史明帝崩是時諸馬貴賤各爭入宫仁披甲持㦸遮勅宫門不得令入章帝旣立諸馬貴人更讚仁勅峻於是上善之通典曰侍御史之職四謂推推者掌推鞫彈掌彈舉公廨知公廨事雜事臺中事悉總之定殿中監察以下職事及進名改轉臺内之事悉主之號爲臺端他人稱之曰端公其知雜事者謂之雜端最爲雄劇食坐之南設横榻謂之南床殿中監察不得坐亦謂之癡床言處其上者皆驕傲自得使人如癡故謂之癡床也凡侍御史之例不出累月則遷登南省故號爲南床百日察其行歩出入揖讓去就殿中已下皆禀而隨之先後虧失者有罰又曰二漢侍御史所掌凡有五曹一曰令曹掌律令二曰印曹掌劾印三曰供曹掌祭祀四曰尉馬曹掌廐馬五曰乗曹掌車駕豹尾之内便爲禁省又曰舊例御史臺下不受訴訟有通詞狀者卧於臺門候御史竟往門外収採知可彈者畧其姓名皆云風聞訪知永徽中崔義𤣥爲大夫始定受事御史知一日劾狀題吿人姓名黄石公隂謀秘法曰熒惑火之精御史之象主禁令刑罰収補糺正殿中侍御史六典曰殿中侍御史掌殿供奉之儀式凡冬至元正大朝會則具服升殿若郊祀廵省則具服從於旌門檢察視其文物}
