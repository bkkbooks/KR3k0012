  - {type: variant, offset: 2408, length: 7, content: 常置中丞常為憲, SBCK: 叶更相執奏詔暹案其事實史獻以金遺暹固辭左右曰公逺使絶域不可失蕃人情暹不得巳受之埋於幕下旣去出境乃移牒令収取之又曰李勉拜監察御史属朝廷右武勲臣恃寵多不知禮大將榮崇嗣於行在朝堂背闕而坐言􅀏自􅀂勉劾之拘於省司肅宗特原之歎曰吾有李勉始知朝廷尊矣又曰御史}
