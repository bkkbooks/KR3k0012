  - {type: variant, offset: 2396, length: 1, content: 為, SBCK: 來俊臣犯􅃺有五一專擅國權二謀害忠善三􅂍賄貪濁四失義㪍禮五􅁋昏很戾論兹五罪合至萬誅請下獄理罪又曰蕭至忠爲監察御史彈鳯閣侍郎同鳯閣鸞臺三品􅂫味道􅂍污貶官御史}
