  - {type: variant, offset: 22, length: 0, content: '', krp: 劾霍光專廢立東觀漢記曰陳寵曽祖父咸哀平間以明律爲侍御史王莾簒位父子相將歸郷里閉門不出乃収家}
  - {type: variant, offset: 23, length: 1, content: 丞, WYG: 律令文書壁藏之以俟聖王咸常戒子孫爲人議法當依輕雖有百金之利無與人重後漢書曰桓典爲侍御史執政無所避常乗驄馬京師畏之語曰行行且止避驄馬御史又曰杜詩爲御史案集洛陽時將軍蕭廣放縱兵士暴横民間百姓惶擾詩勅暁不改遂格殺廣還以狀聞世祖召見賜以棨㦸焉又曰李恂拜侍御史持節使幽州宣布恩澤慰撫北狄所過皆圖冩山川屯田聚落百餘卷悉封奏上肅宗嘉之又曰光武聞杜林還三輔乃徴拜侍御史引見問以經書故舊及西州事甚悦之賜以車馬衣被又曰陳翔字子麟拜侍御史元日朝賀大將軍梁冀威儀不整翔奏請收冀治罪時人奇之又曰楊秉字叔節拜侍御史京畿咸稱其宰相之才又曰譙𤣥爲繡衣使者持節分行天下觀覽風俗所至專行誅賞續後漢書曰种音}
