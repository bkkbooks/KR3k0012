  - {type: variant, offset: 60, length: 1, content: 為, WYG: 長安大獄乆不决轉峻御史徃斷朝野稱當又曰劉毅子暾它昆切正直有父風爲御史庫失火尚書郭彰率百人自衞而不救火暾正色詰之彰怒曰我能截卿角也暾勃然謂彰曰君何時敢恃寵作威作福天子法冠而欲截角乎命紙筆奏之彰伏不敢言衆人皆釋乃止隋書曰栁調轉侍御史左僕射楊素嘗於朝堂見調因獨言曰栁條通體弱獨揺不湏風調歛板正色曰調信無取者公不當以爲侍御史調信有可取不應發此言公當具瞻之秋樞機何可輕發素甚竒之又曰游元爲侍御史奉使於黎陽督運㑹楊𤣥感作逆乃謂元曰獨夫肆虐天下士大夫肝腦塗地以䧟身絶域之所軍粮斷絶此乃天亡之時我今親率義兵誅無道卿意如何元正色答曰尊公荷國寵靈功叅佐命高官重禄近古莫儔公之兄弟青紫交映當謂竭誠盡節上答鴻㤙豈意墳土未乾親圖反噬深爲明公不取願思禍福之端僕有死而已不敢聞命𤣥感怒而囚之屢脅以兵竟不屈節於是害之又曰陳孝意大業初爲魯郡司法書佐郡内號爲亷平太守蘇威嘗欲殺一囚孝意故諫至於再三威不許孝意因解衣請先受死良乆威意乃解謝遣之漸加禮敬及威爲納言奏孝意侍御史又曰獬豸冠案禮圖曰法冠也一曰柱後惠文如淳注漢官云惠蟬也細如蟬翼今御史服之禮圖也又曰獬豸冠高五寸秦制也法官服之案董巴志云獬豸神羊也蔡邕云如麟一角應劭云由此獸觸不直故執憲者爲冠以象之秦滅楚以其冠賜御史唐書曰李素立丁憂高祖令所司奪情授七品清要官所司權擬雍州刺史録叅軍高祖曰此官要而不清又擬秘書郎高祖曰此官清而不要遂擢授侍御史又曰栁範爲侍御史時吳王恪好畋獵損居人田苖範奏彈之太宗因謂侍臣曰權萬紀事我兒不能匡正其罪合死範進曰房𤣥齡事陛下猶不能諫止畋獵豈可獨罪萬紀太宗大怒拂衣而去乆之獨引範曰何得逆折我範曰臣聞主聖臣直陛下仁明臣敢不盡愚直太宗意乃大解又曰高宗嘗問群臣求可爲御史者僉舉萬年尉楊子失其名居數月復問之群臣又舉焉上曰吾聞斯人常䙝服居公堂視事其可爲凖繩司乎由是百寮必表而視事又曰乾封中􅅊仁約除侍御史與公卿相見未嘗行拜禮或勉之仁約曰鵰鶚鷹鸇豈衆禽之偶奈何設拜以狎之且耳目之官故當特立乃曰御史䘖命岀使不能動揺山岳震懼州縣誠曠職耳又曰賈言忠河南洛陽人也乾封中爲侍御史時朝廷有事遼東言忠奉使往支運粮及還高宗問以軍事言忠盡其山川地勢且陳遼東可平之狀高祖悦又問諸將優劣言忠曰李勣先朝舊臣聖鑒所悉龎同善雖非鬪將而持軍嚴整薛仁貴勇冠三軍名可振敵高偘儉素自處忠果有謀契苾何力沉毅持重有統御之才然頗有忌前之癖將將夙夜小心忘身憂國莫逮於李勣者高宗深然之又曰劉思立宋州寜陵人也高宗時爲侍御史屬河南河北旱儉遣}
