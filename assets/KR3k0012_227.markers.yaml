  - {type: variant, offset: 23, length: 1, content: 丞, krp: 律令文書壁藏之以俟聖主咸常戒子孫爲人議法當依輕雖有百金之利無與人重後漢書曰桓典爲侍御史執政無所避常乗􅍡馬京師畏之語曰行行且止避騘馬御史又曰杜詩爲御史安集洛陽時將軍蕭廣放縱兵士暴横民間百姓惶擾詩勑曉不改遂格殺廣還以狀聞世祖召見賜以棨㦸焉又曰李恂拜侍御史持節使幽州宣布恩澤慰撫北狄所過皆圖冩山川屯田聚落百餘卷悉封奏上肅宗嘉之又曰光武聞杜林還三輔乃徴拜侍御史引見問以經書故舊及西州事甚恱之賜以車馬衣𬒳又曰陳翔字子麟拜侍御史元日朝賀大將軍梁兾威儀不整翔奏請収兾理罪時人竒之又曰楊秉字叔節拜侍御史京畿咸稱其宰相之才又曰譙玄爲繡衣使者持節分行天下觀覽風俗所至專行誅賞續後漢書曰种音}
