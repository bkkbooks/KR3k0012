  - {type: variant, offset: 30, length: 0, content: '', SBCK: 九卿二十七大夫八十一元士本欲水火相濟塩梅相成然後庶績咸熈風雨交泰則知人主不得獨是非昔唐堯至聖失之於四㐫漢祖深仁失之於陳狶光武聦明寛恕失之於逢萌魏武勇略英雄失之於張邈此英傑之主莫不失之於前得之於後陛下継聖撫有萬􅀖蠻陬夷落猶懼刑綱况輦轂咫尺姦臣肆虐殺一六品寺丞足使}
