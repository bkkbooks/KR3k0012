  - {type: variant, offset: 34, length: 1, content: 卿, WYG: 是我所以貴德淵德淵原字者也及原死岱哭之甚哀曰德淵吕岱之益友今不幸岱復於何聞過談者美之又曰張紘字子綱吴郡人也孫策遣紘奉章至許昌留爲侍御史少府孔融等皆與親善又曰朱據字子範吳郡人也補侍御史是時選曹尚書曁艷疾貪汚}
  - {type: page-break, offset: 34, content: '', id: KR3k0012_WYG_227-6a, image: WYG0895/WYG0895-0104c.png}
  - {type: variant, offset: 34, length: 1, content: 卿, krp: 德淵吕岱之益友今不幸岱復於何聞過談者美之又曰張紘字子綱廣陵人也孫䇿遣紘奏章至許宫留爲侍御史少府孔融等皆與親善又曰朱據字子範吴郡人也𥙷侍御史是時選曹尚書曁艶疾貪汚}
