  - {type: variant, offset: 2263, length: 128, content: 文宗謂宰臣曰丁居晦作中丞何如因悉數大臣而品第之歎曰宋申錫堪任此官惜哉又曰牛僧孺可為大夫宰臣鄭覃曰頃為中丞未嘗搏擊恐無風望上曰不然鸞鳳與鷹隼事異又曰居晦作此官朕曾以時諺謂杜甫李白輩為四絕問居晦曰此非君上要知之事常以此記得居晦今所以擢為中丞又曰會昌元年中書門下, SBCK: 紀履忠爲監察御史劾}
