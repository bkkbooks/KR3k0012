  - {type: variant, offset: 6, length: 0, content: '', SBCK: 十五人皆是六百石其十五人衣綘給事殿中爲御史宿盧在石渠門外二人尚璽四人持書給事二人持前中丞一人領餘三十人留寺理百官事也史記曰趙禹者郿人武帝即位禹以刀筆吏積勞遷爲侍御史與張湯論定律令又曰下杜人程懇爲御史得罪始皇幽繫雲陽十年從獄中作大􅂐少者増益多者損减方者使貟貟者使方奏之始皇善之出爲御史又曰張蒼好舊曆秦時爲御史主柱下方書漢書曰江充拜直指繡衣使督三輔盗賊禁察踰侈時近臣多奢僣充皆舉劾請没入車馬令身從北軍擊匈奴奏聞貴戚惶恐又曰王駕字翁孺武帝時爲繡衣御史逐捕羣盗皆縱而不誅又曰嚴延年遷御史劾霍光專廢立東觀漢記曰陳寵曽祖父咸哀平間以明律爲侍御史王莾簒位父子相將歸郷里閉門不出乃収家中律令文書壁藏之以俟聖主咸常戒子孫爲人議法當依輕雖有百金之利無與人重後漢書曰桓典爲侍御史執政無所避常乗􅍡馬京師畏之語曰行行且止避騘馬御史又曰杜詩爲御史安集洛陽時將軍蕭廣放縱兵士􅁀横民間百姓惶擾詩勑曉不改遂格殺廣還以狀聞世祖召見賜以棨㦸焉又曰李恂拜侍御史持節使幽州宣布恩澤慰撫北狄所過皆圖冩山川屯田聚落百餘卷悉封奏上肅宗嘉之又曰光武聞杜林還三輔乃徴拜侍御史引見問以經書故舊及西州事甚恱之賜以車馬衣􅀍又曰陳翔字子麟拜侍御史元日朝賀大將軍梁兾威儀不整翔奏請収兾理罪時人竒之又曰楊秉字叔節拜侍御史京畿咸稱其宰相之才又曰譙􅀇爲繡衣使者持節分行天下觀覽風俗所至專行誅賞續後漢書曰种音中暠字景伯順帝時爲侍御史􅁥護太子承光宫中常侍髙􅆊受勑迎太子不齎詔書以衣車載太子欲出太子太􅀓髙褒不知所以力不能止開門臨去暠至撗劒當車曰御史受詔監護太子太子國之儲副人命所繫常侍來無一尺詔書安知非挾姦耶今日之事有死而巳􅆊不敢争又曰張綱字文紀遷侍御史漢􅀄遣八使廵行風俗八使同日拜謂之八彦皆宿儒要位唯綱年少官微受命各之所部而綱獨埋車輪於洛陽都亭曰犲狼當路安問狐狸遂奏大將軍梁兾兄弟罪惡京師震悚魏志曰􅀽紹字夲􅀄有姿皃威容能折節下士士多附之太祖少與交以大將軍􅁺爲侍御史又曰帝嘗大會殿中御史簮白筆側階而坐上問左古此爲何官何主左右不對辛毗曰謂御史舊時簮筆以奏不法今者直備官但珥耳吴志曰吕岱親近吴都徐原慷愾有才志岱知其可成賜巾褠古切衣侯丹與共言論後遂薦抜官至侍御史原性忠壯好直言岱時有得失原輙諌爭又公論之人或以告岱岱􅀏是我所以貴德淵德淵岱字者也及原死岱􅂘之甚哀曰德淵吕岱之益友今不幸岱復於何聞過談者美之又曰張紘字子綱廣陵人也孫䇿遣紘奏章至許宫留爲侍御史少府孔融等皆與親善又曰朱據字子範吴郡人也􅀘侍御史是時選曹尚書曁艶疾貪汚在位欲沙汰之據以爲天下未定冝以功覆過弃瑕取用舉清勵濁足以沮勸􅀂一時貶黜懼有後咎艶不聽卒敗晉書曰􅁃峻字山甫長安大獄乆不决轉峻御史往断朝野稱當又曰劉毅子暾它昆切正直有父風爲御史庫失火尚書郭彰率百人自衛而不救火暾正色詰之彰怒曰我能截卿角也皦㪍然謂彰曰君何時敢恃寵作威作福天子法冠而欲截角呼命􅁓筆奏之彰伏不敢言衆人皆釋乃止隋書曰柳調轉侍御史左僕射楊素嘗於朝堂見調因獨言曰柳調通躰弱獨揺不湏風調歛板正色曰調信無取者公不當以爲侍御史調信有可取不應發此言公當具瞻之秋樞機何可輕發素甚竒之又曰游元爲侍御史奉使於􅀺陽督運㑹楊􅀇感作逆乃謂元曰獨夫肆虐天下士大夫肝腦塗地以䧟身絶域之所軍粮断絶此亦天亡之時我今親率義兵誅無道卿意如何元正色荅曰尊公荷國寵靈功叅佐命髙官重禄近古莫儔公之兄弟青紫交映當謂竭誠盡節上荅鴻恩豈意墳土未乾親圖反噬深爲明公不取願思禍福之端僕有死而巳不敢聞命􅀇感怒而囚之屢脅以兵竟不屈節於是害之又曰陳孝意大業􅀄爲魯郡司法書佐郡内號爲廉平太守􅂫威嘗欲殺一囚孝意固諌至於再三威不許孝意因解衣請先受死良乆威意乃解謝遣之漸加禮敬及威爲納言奏孝意侍御史又曰獬豸冠案禮圖曰法冠也一曰柱後惠文如淳注漢官云惠蟬也細如蟬翼今御史服之禮圖也又曰獬豸冠髙五寸􅁗制也法官服之案董巴志云獬豸神羊也蔡邕云如麟一角應劭曰古有此獸主觸不直故執憲者爲冠以象之􅁗滅楚以其冠賜御史唐書李素立丁憂髙祖令所司奪情授七品清要官所司權擬雍州刺史録叅軍髙祖曰此官要而不清又擬祕書郎髙祖曰此官清而不要遂擢授侍御史又曰柳範爲侍御史時吴王恪好畋獵損居人範奏憚之太宗因謂侍臣曰權萬紀事我兒不能匡正其罪合死範進曰房􅀇齡事陛下猶不能諌止畋獵豈可獨罪萬紀太宗大怒拂衣而去乆之獨引範曰何得逆折我範曰臣聞主聖臣直陛下仁明臣敢不盡愚直太宗意乃解又曰髙宗嘗問群臣求可爲御史者僉舉萬年尉楊子失其名居數月復問之群臣又舉焉上曰吾聞斯人常褻服居公堂視事其可爲凖繩司乎由是百司群僚必表而視事又曰乾封中韋仁約除侍御史與公卿相見未嘗行拜禮或勉之仁約曰鵰鶚鷹鸇豈衆禽之偶柰何設拜以狎之且耳目之官故當特立乃曰御史銜命出使不能動揺山岳震懾州縣誠曠職耳又曰賈言忠河南洛陽人也乾封中爲侍御史時朝廷有事遼東言忠奉使往支軍粮及還髙宗問以軍事言忠畫其山川地􅀔具陳遼東可平之􅃺髙宗恱又問諸將優劣言忠曰李勣先朝舊臣聖鑒所悉龐同善雖非闘將而持軍嚴整薛仁貴勇冠三軍名可振敵髙偘儉素自處忠果有謀契苾何力沉毅持重有統御之才然頗有忌前之癖諸將夙夜小心忘身憂國莫逮於李勣者髙宗深然之又曰劉思立宋州寕陵人也髙宗時爲侍御史属河南河北旱儉遣}
