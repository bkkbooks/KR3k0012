  - {type: variant, offset: 3464, length: 1, content: 崩, SBCK: 上如東都其日大赦天下戊子入東都十二年七月甲子幸江都宫以越王侗光禄大夫叚逹太府卿元文都檢校民部尚書韋津右武衛將軍皇甫無逸右司郎盧楚等惣留後事十三年二月巳丑馬邑校尉劉武周殺太守王仁恭舉兵作亂北連突厥自稱定楊可汗庚寅賊帥李宻翟譲等䧟興洛倉越王侗遣武賁郎將劉長恭光禄少卿房崱擊之反爲所敗死者十五六庚子李密自號魏公稱元年開倉以賑羣盗衆至數十萬河南諸郡相繼皆䧟焉五月甲子唐公起義師於太原丙寅突厥數千寇太原唐公擊破之秋七月壬子熒惑守積屍丙辰武威人李軌舉兵反攻䧟河西諸郡自稱凉王建元安東八月辛巳唐公破武牙郎將宋老生於霍邑斬之十一月景辰唐公入京師辛酉遥尊帝爲太上皇立代王侑爲帝改元義寧帝在江都聞唐公舉兵動容者乆之以手琢按曰渠有竒相渠得之矣如此者再三遂欲渡江幸丹陽時􅀫衛諸將皆是􅁗人各有懷土之志宇文化及因人之心與裴䖍通作亂入犯宫闈􅀫衛皆走遂執帝將出示衆數以十罪復引帝入求鴆不得令狐行逹牽帝使坐以練布縊之}
