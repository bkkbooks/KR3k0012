  - {type: variant, offset: 673, length: 374, content: 不聽於是太祖與公卿定議廢帝立齊王廓是為恭帝元年夏四月帝大饗群臣魏史柳虬執簡書告於朝曰廢帝文皇帝之嗣子年七歲文帝託於安定公曰是子也才由于公不才亦由于公公宜勉之公既受茲重寄居元輔之任又納女為皇后遂不能訓誨有成致令廢黜負文皇帝付囑之意此咎非安定公而誰太祖乃令太常盧辯作誥諭公卿曰嗚呼我群后暨眾士維文皇帝以襁褓之嗣託於子訓之誨之庶厥有成而予岡能弗變厥心庸暨乎廢墜我文皇帝之志嗚呼茲咎予其焉避予實知之矧爾眾人之心哉惟予之顏豈惟今厚將恐來世以子為口實乙亥魏帝詔封太祖子邕為輔城公憲為安城公邑各二千戶三年九月太祖有疾還至雲陽命中山公護受遺輔嗣子冬十月乙亥崩於雲陽宮還長安發喪時年五十二葬于成陵謚曰文公孝閔帝受禪追尊為文王廟曰太祖武成元年追為文皇帝孝閔皇帝後周書曰孝閔皇帝諱覺字陁羅尼太祖第三子也母曰元皇后大統八年生於同州七歲封略陽郡公時有善相者史元華見帝退謂所親, SBCK: ''}
