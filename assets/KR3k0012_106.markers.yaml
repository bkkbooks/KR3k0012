  - {type: variant, offset: 3464, length: 1, content: 崩, WYG: 上如東都大赦天下戊子入東都十二年七月甲子幸江都宫以越王侗光祿大夫段達大府卿元文都撿校民部尚書韋津右武衛將軍皇甫無逸右司郎盧楚等總留後事十三年二月己丑馬邑校尉劉武周殺太守王仁恭舉兵作亂北連突厥自稱定陽可汗庚寅賊帥李宻翟讓等陷興洛倉越王侗遣虎賁郎將劉長恭光祿少卿房崱擊之反為所敗死者十五六庚子李宻自號魏公稱元年開倉以賑羣盗衆至數十萬河南諸郡相繼皆陷焉五月甲子唐公起義師於太原丙寅突厥數千㓂太原唐公擊破之秋七月壬子熒惑守積屍丙辰武威人李軌等舉兵反攻陷河西諸郡自稱涼王建元安樂八月辛巳唐公破武牙郎將宋老生於霍邑斬之十一月丙辰唐公入京師辛酉遙尊帝為太上皇立代王侑為帝改元義寕帝在江都聞唐公舉兵動容者久之以手舉案曰渠有異相渠得之矣如此者再三遂欲渡江幸青陽時宿衛諸將皆是秦人各有懐土之志宇文化及因人之心與裴虔通作亂入犯宫闈宿侍皆走遂扶帝出閣示衆數十罪復引帝入求鴆不得逼帝使坐以練縊之}
