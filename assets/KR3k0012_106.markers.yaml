  - {type: variant, offset: 1165, length: 313, content: 為宋公帝性剛果見晉公護執政深忌之司會李植軍司馬孫恒以先朝佐命入侍左右亦疾護權重乃與宮伯乙弗鳳賀拔提等潛謀請帝誅護帝然之又引宮伯張先洛同謀先洛密白護護乃出植為梁州刺史恒為潼州刺史鳳等遂不自安更奏帝將召群臣入因此誅護先洛又白之時小司馬尉遲綱楤統宿衛兵謢乃召綱共謀廢立令綱入殿中詐呼鳳等論事既至以次執送護第並誅之綱乃罷禁兵帝方悟無左右獨在內殿令宮人持兵自守護又遣大司馬賀蘭祥逼帝遜位遂幽於舊邸月餘以弒崩時年十六護誅後謚曰孝閔皇帝陵曰靜陵明皇帝後周書曰世宗明皇帝諱毓小名統萬突太祖長子也母曰姚夫人永熙三年太祖臨夏州生帝於統萬城因以名焉大統十四年封寧都郡公十六年行華州事尋拜開府儀同三司宜州諸軍事宜州刺史魏恭帝三年授大將軍鎮隴右孝閔踐祚, SBCK: 平齊}
