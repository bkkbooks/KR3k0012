  - {type: variant, offset: 144, length: 217, content: 月夜夢抱子昇天纔不至而止寤而告德皇帝德皇帝喜曰雖不至天貴亦極矣魏孝昌二年燕州亂太宗始以統軍從爾朱榮征之先是北海王顥奔梁梁人立為魏王令率兵入洛魏孝莊帝出居河內以避之榮遣賀拔岳討顥仍迎孝莊帝太祖與岳有舊乃以別將從岳及孝莊帝反正以功封寧都子邑三百戶遷鎮遠將軍步兵校尉万俟上音墨下音其醜奴作亂關右孝莊帝遣泰朱天光及岳等討之太祖遂從岳入關先鋒破魏行臺尉遟菩薩等及平醜奴定隴右太祖功居多遷征西將軍金紫光祿大夫增邑三百戶加直閤將軍行原州事太常元年岳, SBCK: ''}
