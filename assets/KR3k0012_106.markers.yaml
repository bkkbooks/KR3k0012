  - {type: variant, offset: 2559, length: 343, content: 宮廢同州及長春宮甲戍初服常冠以皂紗為之加簪而不施纓道其制若今之折角巾也上大將軍郯國公王軌破陳師於呂梁擒其將吳明徹等俘斬三萬餘人五月己丑帝總戎北伐遣柱國平原公姬願東平公宇文紳舉等率軍五道俱入發關中公私馬驢悉從軍癸巳帝不豫止於雲陽宮丙申詔停諸軍事六月丁酉帝疾甚還京其夜崩於乘輿時年三十六謚曰武皇帝廟稱高祖葬孝陵宣皇帝後周書曰宣皇帝諱贇字乾伯高祖長子也母曰李太后武成元年生於同州保定元年五月景午封魯國公建德元年四月癸巳高祖親告廟冠於阼階立為皇太子詔皇太子巡撫西土文宣皇后崩高祖諒闇詔太子總朝政五旬而罷高祖每巡幸四方太子常留監國五年二月又詔皇太子巡西土因討吐谷渾宣政元年六月丁酉高祖崩戊戍太子即皇帝位尊皇后為皇太后大象元年春正月癸酉受朝於露門帝服通天冠絳紗袍群臣皆服漢魏衣冠大赦改元大成初置四輔, SBCK: ''}
