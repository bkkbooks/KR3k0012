  - {type: variant, offset: 3461, length: 0, content: '', krp: 德相生赤爲火色其郊及社廟依服冕之儀而朝㑹之服旗幟犧牲各令尚赤戎服以黄秋七月乙夘上始服黄百寮畢賀二年六月景申詔曰龍首山川原秀麗卉物滋阜卜食相土冝建都邑定鼎之基永固無窮之業所在公私府宅規模逺近營構資費隨事條奏仍詔左僕射髙熲將作大匠劉龍鉅鹿郡公賀婁子幹太府少卿髙龍乂等創造新都三年春正月庚子將入新都大赦天下六年二月丁亥發丁男十一萬修築長城三旬而罷七年春正月癸巳有事於太廟乙未制諸州歲貢三人丁巳祀朝日於東郊已巳陳遣兼散騎常侍王亨兼通直散騎常侍王眘來聘壬申車駕幸醴泉宫是月發丁男十萬餘修築長城二旬而罷夏四月巳酉幸晉王第庚戍於楊州開山陽瀆以通運漕八年冬十月甲子將伐陳有事於太廟命晉王廣秦王俊清河公楊素並爲行軍元帥以伐陳九年春正月巳巳白虹夾日辛未賀若弼拔陳京口韓擒虎抜陳南豫州癸酉以尚書右僕射虞慶則爲右衛大將軍景子賀若弼敗陳師於蔣山獲其將蕭摩訶韓擒虎進師入建業獲其將任蠻奴獲陳主叔寳陳國平得州三十郡一百縣四百癸巳遣使持節廵撫之夏四月巳亥幸驪山親勞旋師乙巳三軍凱入獻俘於太廟拜晉王廣爲太尉五月巳夘以吏部尚書蘇威爲尚書右僕射六月乙丑以荆州㹅管楊素爲納言丁丑以吏部侍郎盧愷爲禮部尚書時朝野物議咸願登封秋七月景午詔曰豈可命一將軍除一小國遐邇注意便謂太平予以薄德而封名山用虚言而干上帝非朕攸聞而今以後言及封禪冝即禁絶二十年冬十月乙丑皇太子勇及其諸子並廢爲庶人殺柱國太平縣公史萬歲巳巳殺左衛大將軍五原郡公元旻十一月戊子天下地震京師大風雪以晉王廣爲皇太子十二月戊午詔東宫官属不得稱臣於皇太子仁壽元年春正月乙酉朔大赦改元以尚書右僕射楊素爲尚書左僕射納言蘇威爲尚書右僕射丁酉徙河南王昭爲晉王三年七月詔令州縣搜掦賢哲皆取明知今古通識治亂究政敎之夲逹禮樂之源不限多少不得不舉以三旬咸令進路徴召將送必湏以禮四年春正月景辰大赦甲子幸於仁壽宫乙丑詔賞罰支度事無巨細並付皇太子夏四月乙夘上不豫六月庚申大赦天下八月甲辰上疾甚卧於仁壽宫與百寮辭訣並握手歔欷是時唯太子及陳宣華夫人侍疾太子無禮宣華訴之帝怒曰死狗郍堪付後事遽令召勇楊素祕不宣乃屏左右令張衡入拉帝血濺屏風冤痛之聲聞于外年六十四在位二十四年史臣曰髙祖龍德在田竒表見異晦明藏用故知我者稀始以外戚之尊受託孤之任與能之議未爲當時所許是以周室舊臣咸懷憤惋旣而王謙固三蜀之阻不踰朞月尉遟逈舉全齊之衆一戰而亡斯乃非止人謀抑亦天之所賛也乗兹機運遂遷周鼎于時蠻夷猾夏荆楊未一劬勞日􅉴經營四方樓船南邁則金陵失險驃騎北指則單于欵塞職方所載並入疆理禹貢所圗咸受正朔雖晉武之克平吴㑹漢宣之推亡固存比義論功不能尚也七德旣敷九歌巳洽要荒咸曁尉侯無警於是躬節儉平傜賦倉廪實法令行君子咸樂其生小人各安其業強無陵弱衆不暴寡人物殷阜朝野歡娯二十年間天下無事區宇之内晏如也考之前王足以叅蹤盛烈但素無學術不能任下無寛仁之度有刻薄之資曁乎暮年此風逾扇又雅好符瑞暗於大道建彼維城權侔京室人皆同帝制靡所適從聽哲婦之言惑邪臣之說溺寵廢嫡託付失人滅父子之道開昆弟之隙縱其尋斧剪伐本枝墳土未乾子孫繼踵屠戮松檟纔列天下皆非隋有惜哉迹其衰怠之源稽其亂亡之兆起自髙祖成於焬帝所由來逺矣非一朝一夕其不祀忽諸未爲不幸也賜皇帝隋書曰焬皇帝諱廣一名英小字阿𡡉髙祖第二子也母曰文獻獨孤皇后上羙姿儀少敏慧髙祖及后於諸子中特所鍾愛在周以髙祖勲封鴈門郡公開皇元年立爲晉王拜柱國并州揔管時年十三尋授武衛大將軍進位上柱國河北道行臺尚書令大將軍如故髙祖令項城公韶安道公才李徹輔導之上好學善屬文沉深嚴重朝野属望髙祖宻令善相者來和遍視諸子和曰晉王眉上雙骨隆起貴不可言旣而髙祖幸上居第見樂器絃多斷絶又有塵埃若不用者以爲不好聲妓善之上尤自矯飾當時稱爲仁孝嘗觀獵遇雨左右進油衣上曰士卒皆霑濕我獨衣此乎乃令持去六年轉淮南道行臺尚書令其年徴拜雍州牧内史令八年冬大舉伐陳以上爲行軍元帥及陳平進位太尉賜輅車乗馬衮冕之服玄珪白璧各一復拜并州揔管髙祖之祠太山領武候大將軍明年歸藩後數載突厥宼邊復爲行軍元帥出靈武無虜而還及太子勇廢立上爲皇太子是月當受冊髙祖曰吾以大興公成帝業令上出舎大興縣其夜烈風大雪地震山崩民舎多壞壓死者百餘口仁壽𥘉奉詔廵撫東南是後髙祖每避暑仁壽宫恒令上監國四年七月髙祖崩上即皇帝位於仁壽宫八月奉梓宫還京師并州揔管漢王諒舉兵反詔尚書左僕射楊素討平之十一月癸丑詔可於伊雒營建東京即設官分職以爲民極也大業元年正月壬辰朔大赦改元立妃蕭氏爲皇后改豫州爲秦州洛州爲豫州廢諸州揔管府景申立晉王昭爲皇太子三月丁未詔尚書令楊素納言楊逹將作大匠宇文愷營建東京徙豫州郭下居民以實之辛亥發河南諸郡男女萬餘開通濟渠自西苑引榖洛水逹於河自板渚引河通於淮庚申遣黄門侍郎王弘上儀同於上澄往江南採木造龍舟鳯舸黄龍赤艦樓船等數萬艘七月景子詔曰今宇宙平一文軌攸同十歩之内必有芳草四海之中豈無竒秀諸在家及見入學者若有篤志好古躭恱典墳學行優敏堪膺時務所在採訪具以名聞即當隨其器能擢以不次八月壬寅上御龍舟幸江都以左武衛大將軍郭衍爲前軍李景爲後軍文武官五品巳上給樓舩九品巳上給黄蔑舳艫相接二百餘里冬十月巳丑赦江淮巳南陽州給復五年舊揔管内給復三年二年春正月辛酉東京成賜監督者各有差三月庚午車駕發江都夏四月庚戍上自伊闕陳法駕備千乗萬騎入於東京辛亥上御端門大赦免天下今年租賦三年四月甲午詔曰夫孝悌有聞人倫之夲德行敦厚立身之基或節義可稱或操履清潔所以激貪厲俗有益風化強毅正直執憲不撓學業優敏文才美秀並爲廊廟之用寔乃瑚璉之資才堪將略則抜之以禦侮膂力驍壯則任之爪牙爰及一藝可取亦冝採録衆善畢舉與時無弃以此求治庶幾非逺文武有職事者五品巳上宜依今十科舉人有一於此不必求備朕當待以不次隨才升擢景申車駕北廵狩六月戊子次榆林郡丁酉啓民可汗來朝巳亥吐谷渾髙昌並遣使貢方物甲辰上御北樓觀漁於河北宴百僚秋七月辛亥啓民可汗上表請變服襲冠帶詔啓民賛拜不名位在諸侯王上甲寅上於郡城東御大帳其下備儀衛建旌旗宴啓民及其部落三千五百人奏百戯之樂賜啓民及其部各有差八月壬午車駕發榆林乙酉啓民飾廬清道以候乗輿帝幸其帳啓民奉觴上壽宴賜極厚上謂髙麗使者曰歸語尓王當早來朝見不然者吾與啓民廵彼土矣皇后亦幸義城公主帳己丑啓民可汗歸蕃癸巳入樓煩關壬寅次太原詔營晉陽宫九月己未次濟源幸御史大夫張衡宅宴享極歡己巳至于東都五年三月己巳車駕西廵河右乙亥幸扶風舊宅夏四月己亥大獵於隴西壬寅髙昌吐谷渾伊吾並遣使來朝乙巳狄道党項羗來貢方物癸亥出臨津關渡黄河至西平陳兵講武五月乙亥上獵於抜延山長圍周亘二千里庚辰入長寧谷度星領甲申宴羣臣於金山之上六月景午次張掖辛亥詔諸郡學業該通才藝優敏膂力驍壯超絶等倫在官勤舊堪理政事立性正直不避強禁四科舉人壬子髙昌王麴伯雅來朝伊吾吐屯設等獻西域數千里之地上大恱景辰上御觀風行殿盛陳文物奏九部樂設魚龍曼延宴髙昌王吐屯設於殿上以寵異之其蠻夷陪列者三十餘國戊午大赦天下文皇巳來流配悉放還郷晉陽逆黨不在此例寵右諸郡給復一年行經之所給復二年秋七月丁夘置馬牧於青海渚中以求龍種無効而止九月癸未車駕入長安六年二月庚申徴魏齊周陳樂人悉配太常三月癸亥幸江都宫甲子以鴻臚卿史祥爲左驍衛大將軍夏四月丁未宴江淮巳南父老頒賜各有差七年二月己未上升釣臺臨楊子津大宴百寮頒賜各有差庚申百濟遣使朝貢乙亥上自江都御龍舟入通濟渠遂幸於涿郡八年正月辛巳大軍集於涿郡壬午下詔曰髙麗小醜昬迷不恭崇聚渤碣之間荐食遼穢之境親㹅六師用伸九伐拯厥阽危恊從天意若髙麗泥首轅門自歸司寇即宜解縛焚櫬弘之以㤙其餘臣人歸朝奉順咸加撫慰各安生業隨才任用無隔夷夏營壘所次務在整肅芻蕘有禁秋毫勿犯布以恩宥喻以禍福若其同惡相濟抗拒官軍國有常刑俾無遺類明加曉示稱朕意焉揔管一百一十三萬三千八百號二百萬其餽運者倍之癸未第一軍發終四十日引師乃盡旌旗亘千里近古出師之盛未之有也三月癸巳上御師甲子臨戎於遼水橋戊戌大軍爲賊所拒不果濟右屯衛大將軍左光禄大夫麥鐵杖武賁郎將錢士雄孟金乂等皆死之甲午車駕渡遼大戰於東岸擊賊破之進圍遼東時諸將各奉旨不敢赴機旣而髙麗各城守攻之不下六月己未幸遼東責怒諸將止城西數里御六合城七月壬寅宇文述等敗績於薩水右屯衛將軍辛丗雄死之九軍並䧟將帥奔還亡者二千餘騎癸卯班師九月庚寅上至東都九年春正月丁丑徹天下兵募民爲驍果集於涿郡二月戊寅幸遼東以越王侗民部尚書樊子盖留守東都庚子北海人郭方預聚徒爲盗自號盧公衆至三萬攻䧟城大掠而去夏四月庚午車駕渡遼壬申遣宇文述楊義臣趣平壤五月丁丑熒惑入南斗己夘濟北人甄寶車聚衆萬餘寇掠城邑六月乙巳禮部尚書楊玄感反於黎陽丙辰玄感逼東都河南賛治裴弘䇿拒之反爲賊所敗戊辰兵部侍郎斛斯政奔於髙麗庚午上班師髙麗犯後軍八月壬寅左翊衛大將軍宇文述等破楊玄感於閿郷斬之餘黨悉平十年二月辛夘詔曰菆尓髙麗僻居荒表鴟張狼噬侮慢不恭抄竊我邊陲侵軼我城鎮是以去歲出軍問罪遼碣殪長蛇於玄莬戮封豕於襄平扶餘衆軍風馳電逝追奔逐北徑踰沮水滄海舟檝衝賊腹心焚其城郭汚其宫室髙元伏鑕泥首送欵軍門尋請入朝歸罪司寇朕以許其改過乃詔班師而長惡靡悛宴安鴆毒此而可忍孰不可容便可分命六師百道俱進朕當親執武節臨御諸軍秣馬九都觀兵遼水順天誅於海外救窮民於倒懸征伐以正之明徳以誅之止除元惡餘無所問三月壬子行幸涿郡癸亥次臨渝宫親御戎服禡祭黄帝斬叛軍者以釁鼔秋七月甲子髙麗遣使降囚送斛斯政上大恱八月己巳班師二}
