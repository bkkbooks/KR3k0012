  - {type: variant, offset: 2903, length: 457, content: 以上柱國大冢宰越王盛為大前疑相州總管蜀國公尉遟逈為大右弼申國公李穆為大左輔大司馬隋國公楊堅為大後丞二月辛已詔曰皇太子衍地居上嗣正統所歸遠憑積德之休允協無疆之祚帝王之量不肅而成天祿之期不謀已至朕今傳位於衍乃睠四海深合謳歌之望俾予一人高蹈風塵之表萬方兆庶知朕意焉可大赦天下改大成年為大象元年帝於是自稱天元皇帝所居稱天臺冕二十有四旒車服於鼓皆以二十四為節內史御正皆置上大夫皇帝衍稱正陽宮置納言御正諸衛等官皆准天臺尊皇太后為天元皇太后二年五月甲午夜帝備法駕幸天興宮乙未帝不豫還宮詔隋國公堅入侍疾己酉大漸御正下大夫劉昉與內史上大夫鄭譯矯制以隋國公堅受遺輔政是日帝崩於天德殿時年二十二謚曰宣皇帝葬定陵靜皇帝後周書曰靜皇帝諱衍後改為闡宣帝長子也母曰朱皇后建德二年六月生於東宮大象元年正月癸卯封魯王戊午立為皇太子二月辛巳宣帝於鄴宮傳位授帝居正陽宮二年夏五月乙未宣帝寢疾詔帝入宿於露門學已酉宣帝崩帝入居天臺廢正陽宮大赦天下停洛陽宮作大定元年春正月壬午詔曰朕以不天夙遭極罰光陰遄速遽及此辰窮慕纏綿言增號絕踰祀革號憲章前典可改大象三年為, SBCK: ''}
