  - {type: variant, offset: 2269, length: 289, content: 德元年三月癸卯朔曰有蝕之齊遣使來聘景辰誅大冢宰晉國公護其子柱國潭國公會會弟大將軍莒國公至崇業公靜并柱國侯伏侯龍恩龍恩弟大將軍萬壽大將軍劉勇等大赦改元罷中外府二年秋七月己巳祠太廟自春末不雨至於是月壬辰集百寮於文德殿帝責躬罪已問以治政得失五年十月乙酉帝總戎東伐以越王盛為右一軍總管杞國公亮為右二軍總管隋國公楊堅為右三軍總管譙王儉為左一軍總管大將軍竇恭為左二軍總管廣化公丘崇為左三軍總管齊王憲陳王純為前軍六年春正月尉遟勒擒齊主及其太子恒於青州四月乙已至自東伐列齊主於前其王公等並從車轝旗幟及器物以次陳於其後大駕布六軍備凱樂獻俘於太廟京邑觀者皆稱萬歲戊申封齊主為溫國公宣政元年三月於蒲州, SBCK: 臺}
