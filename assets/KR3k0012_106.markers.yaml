  - {type: variant, offset: 1602, length: 387, content: 諸州軍事為揔管八月己亥改天王稱皇帝追尊文王為文皇帝大赦改元二年春正月癸丑朔大會群臣於紫極殿始用百戲三月辛酉重陽閣成會群公列將卿大夫及突厥使者於芳林園賜錢帛各有差夏四月帝因食遇毒庚子大漸辛丑崩於延壽殿時年二十七謚曰明皇帝廟稱世宗葬昭陵武皇帝後周書曰高祖武皇帝諱邕字祚羅突太祖第四子母曰叱奴太后大統九年生於同州有神光照室幼而孝敬聰敏有器質太祖異之曰成吾志者必此兒也年十二封輔城郡公孝閔帝踐祚拜大將軍出鎮同州世祖即位遷柱國授蒲州諸軍事蒲州刺史武成元年入為大司空治御正進封魯國公領宗師甚為世宗所親愛朝廷大事多共參議性沉深有遠識非因顧問終不輒言世宗每歎曰夫人不言言必有中武成二年世宗崩遺詔傳位於帝帝固讓百官勸進乃從之壬寅即皇帝位大赦天下保定元年春正月戊寅詔曰寒暑亟周奄及徂歲改元命始國之典章朕承寶圖宜遵故實可改武成三年為保定元年嘉號既新惠澤宜溥文武百官各增四級以大冢宰晉國公護為都督中, SBCK: 内}
