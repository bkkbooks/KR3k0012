  - {type: variant, offset: 4773, length: 4, content: 必居上游, WYG: 衆數十萬人亦足王也願大王急渡今獨臣有船漢軍至無以渡項王笑曰天之亡我我何渡為且籍與江東子弟八千人渡江而西今無一人還縱江東父兄憐而王我我何面目見之縱彼不言籍獨不愧於心乎}
