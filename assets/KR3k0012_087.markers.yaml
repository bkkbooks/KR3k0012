  - {type: variant, offset: 4773, length: 1, content: 必, SBCK: 衆數十萬人亦足王也願大王急渡今獨臣有船漢軍至無以渡項王􅀏曰天之亡我我何渡爲且籍與江東子弟八千人渡江而西今無一人還縱江東父兄憐而王我我何靣目見之縱彼不言籍獨不愧於心乎乃謂亭長曰吾知公長者吾􅀐此馬五歳所當無敵嘗一日千里吾不忍殺之以賜公乃令􅀐皆下馬歩行持短兵接戰獨籍所殺漢軍數百人項王身亦􅀍十餘創頋見漢􅀐吕馬童曰􅀂非吾故人乎馬童靣之張晏曰以故人難親斫之故皆靣之也如淳曰靣不視正也指王翳曰如淳曰指示王翳也此項王也項王乃曰吾聞漢購我頭千金邑萬戸吾爲汝得徐廣曰亦可取是功德之德也乃自刎而死漢以魯公禮葬項王於榖城太史公曰吾聞之周生周時賢也曰舜重瞳子又聞項羽亦重瞳子豈其苗裔乎何其興之暴也夫􅁗失其政陳渉首難豪傑蜂起相與並爭不可勝數然羽非有尺寸乗􅀔起隴畒之中三年遂將五諸侯滅􅁗此時山東六國而齊趙韓魏燕五國並伐􅁗故云五諸侯也分裂天下而封王侯政由羽出號爲霸王位雖不終近古以來未嘗有也周生烈子曰桀紂是湯武之梯􅁗項是大漢之階也四逆不興則三順不勝也蔣子萬機論曰項羽􅀂聽范増之䇿則平歩取天下也譙周法訓曰劉項方爭父戰於前子闘於後孝惠皇帝史記曰孝惠爲人仁弱髙祖以爲不􅀋我也常欲廢太子而立戚􅁎子如意􅀋我戚􅁎得幸常從上之􅀜東日夜啼泣欲立其子代太子吕后年長常留守希見上益䟽髙祖崩太子襲號爲惠皇帝吕后最怨戚夫人及其子趙王惠帝慈仁知太后怒自挾與趙王起}
