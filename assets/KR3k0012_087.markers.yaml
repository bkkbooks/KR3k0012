  - {type: variant, offset: 4781, length: 4, content: 都郴縣其, SBCK: 來觀人􅇾孝惠見問迺知是戚夫人也迺哭因􅀊餘不能起使人請太后曰此非人之所爲臣爲太后子終不能治天下孝惠以此日飲爲􅁋樂不聽政故有疾又曰太史公曰孝惠皇帝髙后之時􅀺民得離戰國之苦君臣俱欲休息乎無爲故惠帝垂拱髙后女主稱制政不出閨房天下晏然刑罰罕用罪人是希民務稼穡衣食滋殖矣漢書曰孝惠諱盈之字曰滿應劭曰禮謚法柔質慈民曰惠矣七年帝崩于未央宫案帝年十七即位在位七年矣葬安陵漢書賛曰孝惠内脩親親外禮􅌠相可謂寛仁之主遭吕太后虧損至德悲夫荀恱漢紀曰立皇后張氏帝姉魯元公主之女也太后欲以重親故以配於帝也論曰夫婦之際人道大倫姉子而爲后昬於禮而瀆於人情非所以示天下作民則也}
  - {type: page-break, offset: 4781, content: '', id: KR3k0012_SBCK_087-9b}
  - {type: variant, offset: 4781, length: 4, content: 都郴縣其, krp: 來觀人彘孝惠見問迺知是戚夫人也迺哭因歲餘不能起使人請太后曰此非人之所爲臣爲太后子終不能治天下孝惠以此日飲爲淫樂不聽政故有疾又曰太史公曰孝惠皇帝髙后之時黎民得離戰國之苦君臣俱欲休息乎無爲故惠帝垂拱髙后女主稱制政不出閨房天下晏然刑罰罕用罪人是希民務稼穡衣食滋殖矣漢書曰孝惠諱盈之字曰滿應劭曰禮謚法柔質慈民曰惠矣七年帝崩于未央宫案帝年十七即位在位七年矣葬安陵漢書賛曰孝惠内脩親親外禮宰相可謂寛仁之主遭吕太后虧損至德悲夫荀恱漢紀曰立皇后張氏帝姉魯元公主之女也太后欲以重親故以配於帝也論曰夫婦之際人道大倫姉子而爲后昬於禮而瀆於人情非所以示天下作民則也}
