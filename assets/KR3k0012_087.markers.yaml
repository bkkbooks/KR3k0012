  - {type: variant, offset: 4685, length: 1, content: 難, SBCK: 遂走還入壁不敢復出漢王使人間問之乃項王也漢王大驚於是項王乃即漢王相與臨廣武間而語漢王數之項王怒甚欲一戰漢王不聽項王伏弩射中漢王漢王傷走入成臯項王乃與約中分天下割鴻溝以西者爲漢文頴曰於榮陽下引河東爲鴻溝以通宋鄭陳蔡曹衛兵濟汝淮泗㑹於楚即今官渡水也鴻溝而東者爲楚項王巳約乃引兵解而東歸漢欲西歸張良陳平說曰楚兵疲食盡此天亡楚之}
