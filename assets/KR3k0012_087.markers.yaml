  - {type: variant, offset: 926, length: 1, content: 昭, WYG: 二世元年秋陳勝等起沛令欲以沛應勝沛父老皆曰生平所聞劉季諸珍怪當貴且卜筮之莫如劉季最吉乃立為沛公祠黃帝祭蚩尤於沛庭而釁鼔旗幟皆赤漢元年冬十月五星聚於東井沛公兵先諸侯至覇上秦}
