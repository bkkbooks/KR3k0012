  - {type: variant, offset: 4802, length: 0, content: '', WYG: 三年遂將五諸侯滅秦此時山東六國而齊趙韓魏燕五國並伐秦故云五諸侯也分裂天下而封王侯政由羽出號為霸王位雖不終近古以來未嘗有也周生烈子曰桀紂是湯武之梯秦項是大漢之階也四逆不興則三順不勝蔣子萬機論曰項羽若聽范增之䇿則平步取天下也譙周法訓曰劉項方爭父戰於前子鬭於後孝惠皇帝史記曰孝惠為人仁弱髙祖以為不類我常欲廢太子而立戚姬子如意如意類我戚姫得幸常從上之關東日夜啼欲立其子代太子吕后年長常留守希見上益疏頼留侯䇿太子得毋廢髙祖崩太子襲號皇帝吕后最怨戚夫人及其子趙王惠帝慈仁知太后怒自挾與趙王起居飲食太后欲殺之不得間孝惠元年十二月帝晨出射雉趙王少不能早起太后聞其獨居使人持酖飲之黎明孝惠還趙王已死徐廣曰黎猶比太后遂斷戚夫人手足去眼煇耳飲瘖藥使居厠中命曰人彘居數日乃召孝惠帝來觀人彘孝惠見問廼知是戚夫人也廼大哭因歲餘不能起使人請太后曰此非人所為臣為太后子終不能治天下孝惠以此日為淫樂不聽政故有病七年秋八月戊寅帝崩又曰太史公曰孝惠皇帝髙后之時黎民得離戰國之苦君臣俱欲休息於無為故惠帝垂拱髙后女主稱制政不出閨房天下宴然刑罰罕用罪人是希民務稼穡衣食滋殖矣漢書曰孝惠諱盈之字曰滿應劭曰禮諡法柔質慈民曰惠七年帝崩于未央宫案帝年十七即位在位七年矣葬安陵漢書賛曰孝惠内修親親外禮宰相可謂寛仁之主遭吕太后虧損至徳悲夫荀悅漢紀曰四年立皇后張氏帝姊魯元公主女也太后欲為重親故配帝論曰夫婦之際人道之大倫姊子而為后昏於禮而瀆於人情非所以示天下作民則也班固漢書述曰孝惠短世髙后稱制罔顧天顯吕宗以敗前少帝史記曰惠帝崩太子即位為帝號令一出太后太后稱制宣平侯女為孝惠皇后時無子佯有娠取美人子名之殺其母立所名子以為太子孝惠崩太子為帝帝壯或聞其母死非真皇后之子乃出言曰后安能殺吾母而名我太后聞而患之恐其後為亂於是乃幽之於永巷中羣臣奉㫖廢帝後少帝史記曰后元年立孝惠後宫子山為襄成侯二年以為常山王更名義四年廢少帝立常王義為帝更名𢎞不稱元年者以太后制天下事也八年七月太后崩大臣謀誅諸吕相與隂謀曰少帝及梁淮陽常山王皆非真孝惠子迺相與隂使人召代王代王至長安立為天子東平侯興居曰誅吕氏吾無功請得除宫乃與太僕汝隂侯滕公入宫前謂少帝曰足下非劉氏不當立乃召乘輿載少帝出少帝曰欲將我安之乎滕公曰出就舎代王遂入而聽政夜有司分部誅滅梁淮陽常山王少帝於邸太平御覽卷八十七}
