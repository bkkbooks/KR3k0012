  - {type: variant, offset: 4691, length: 1, content: 後, SBCK: 兵圍之數重夜聞漢軍四靣皆楚歌應劭曰楚歌者雞鳴歌也漢巳略得其地楚歌者多也項王乃大驚曰漢皆巳得楚乎是何楚人之多也項王乃夜起飲於帳中有羙人名虞徐廣曰云虞氏常幸從駿馬名騅常􅀐之於是項王乃悲歌慷􅁣自爲詩曰力􅋞山􅀆氣蓋世時不利􅀆騅不逝騅不逝􅀆可奈何虞􅀆虞􅀆奈􅀂何歌數闋美人和之項王泣下數行左右皆泣莫能仰視於是項王乃上馬􅀐麾下壯士􅀐從者八百餘人直夜潰圍南出馳走平明漢軍乃覺之令􅀐將灌嬰}
  - {type: variant, offset: 4691, length: 1, content: 後, WYG: 皆附之楚兵罷食盡此天亡楚之時也漢王乃追項王至垓下項王軍壁垓下兵少食盡漢軍及諸侯兵圍之數重夜聞漢軍四面皆楚歌應邵曰楚歌者雞鳴歌也漢已畧得其地楚歌者多也項王乃大驚曰漢皆已得楚乎是何楚人之多也項王乃夜起飲於帳中有美人名虞徐廣曰姓虞氏常幸從駿馬名騅常騎之於是項王乃悲歌慷慨自為詩曰力㧞山兮氣蓋世時不利兮騅不逝騅不逝兮可奈何虞兮虞兮奈若何歌數闋美人和之項王泣下數行左右皆泣莫能仰視於是項王乃上馬騎麾下壯士騎從者八百餘人直夜潰圍南出馳走平明漢軍乃覺之令騎將灌嬰}
