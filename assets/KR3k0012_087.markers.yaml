  - {type: variant, offset: 3448, length: 1048, content: 心不樂怪問占夢卜曰涇水為祟二世乃齋於望夷宮欲祠涇水沉四白馬使使責讓高以盜賊事高懼乃陰與其壻咸陽令閻樂其第趙成謀使郎中令為內應詐為有大賊遣樂將吏卒千餘人至望夷宮郎中令與樂俱入射上幄坐幃二世怒召左右左右皆惶擾不鬥旁有官者一人侍不敢去二世入內謂曰何不早告我官者曰臣不敢言故得全使臣早言皆已誅安得至今樂前即二世數曰足下驕恣誅殺無道天下共叛足下其自為計二世曰丞相可得見不樂曰不可二世曰吾願得一郡為王弗許又曰願為萬戶侯弗許又曰願與妻子為黔首比諸公子樂曰臣受命於丞相為天下誅足下足下雖多言臣不敢報麾其兵進二世自殺閻樂歸報趙高趙高乃悉召諸大臣公子告以誅二世之狀曰秦故王國始皇君天下故稱帝今六國復自立秦地益小乃以空名為帝不可宜為王如故便立二世之兄子公子嬰為秦王以黔首葬二世杜南宜春苑中在位三年秦王子嬰史記曰趙高令子嬰齋當廟見受玉璽齋五日子嬰與其子二人謀稱疾不行高果自往曰宗廟重事王奈何不行子嬰遂刺殺趙高於齋宮夷三族以狥咸陽子嬰為秦王四十六日楚將沛公破秦軍入武關遂至霸上使人約降子嬰子嬰即係頸以組白馬素車奉天子之璽符降軹道旁項籍為從長殺子嬰及秦諸公子宗族史記太史公曰始皇自以為功過五帝地廣三皇而羞與之侔善哉賈生推言之曰秦并兼諸侯繕津關據險塞脩甲兵而守之陳涉以戍卒散亂之眾數百奮臂大呼不用弓戟之兵鉏櫌白挺櫌田器也音憂望屋而食橫行天下秦人阻險不守關梁不闔長戟不刺強弩不射楚師深入戰於鴻門曾無藩籬之艱當此時也世非無深慮知化之士也然不敢盡忠拂過者秦俗多忌諱之禁忠言未卒於口而身為戮歿矣故天下之士傾耳而聽重足而立拑口而不言是以三主失道忠臣不敢諫智士不敢謀天下已亂姦不上聞豈不哀哉秦王纘六世之餘烈振長筴而御宇內吞二周而亡諸侯履至尊而制六合執棰拊拊拍音府以鞭笞天下威振四海南取百越之地以為桂林象郡乃使蒙恬北築長城而守藩籬卻匈奴七百餘里胡人不敢南下而牧馬士不敢彎弓而報怨於是廢先王之道焚百家之言以愚黔首隳名城殺豪俊收天下之兵聚之咸陽銷鋒鏑鑄以為金人十二以弱黔首之民然後塹華為城因河為津據億丈之城臨不測之谿以為固良將勁弩守要害之處信臣精卒陳利兵而誰何何問之也天下已定秦王之心自以為關中之固金城千里子孫帝王萬世之業也秦王既沒陳涉斬木為兵揭竿為旗天下雲集而響應羸糧而影從山東豪後遂並起而亡秦族矣然秦以區區之地千乘之權招八州而朝同列百有餘年然後以六合為家崤函為宮一夫作難而七廟隳身死人手為天下笑者何也仁義不施而攻守之勢異也秦王懷貪鄙之心行自奮之智不信功臣不親士民廢王道立私權禁文書而酷刑法先詐力而後仁義以暴虐為天下始孤獨而有之故其亡可立而待, WYG: ''}
