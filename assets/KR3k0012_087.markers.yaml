  - {type: variant, offset: 2200, length: 2296, content: 自是後莫知行之所在聽事群臣受決事悉於咸陽宮長子扶蘇諫曰天下初定遠方黔首未集諸生皆誦法孔子今皆重法繩之臣恐天下不安唯上察之始皇怒使扶蘇北監蒙恬於上郡三十七年始皇出遊左丞相斯從右丞相去疾守少子胡亥愛慕請從始皇許之十一月行至雲夢望祀虞舜於九疑浮江下觀蘇柯渡梅渚過丹陽至錢塘浙江水波惡乃西百二十里從狹中渡上會稽祭大禹望于南海而立石刻頌秦德還過吳從江乘渡並海上北至琅邪方士徐福等入海求神藥數歲不得費多恐譴乃詐曰蓬萊藥可得然常為大鮫魚之所害故不得至願請善射與俱見則以連弩射之始皇夢與海神戰如人狀以問占夢愽士曰水神不可見以大魚蛟龍為候今上禱祠備謹而有此惡神當除去而善神可致乃命入海者齎捕巨魚具而自以連弩候大魚出射之自琅邪北至營成山弗見至之罦見巨魚遂並海至平津而病始皇惡言死群臣莫敢言死事上病益甚乃為璽書賜公子扶蘇曰與喪會咸陽而葬書已封在中車府令趙高行符璽事所未授使者七月丙寅始皇崩於沙丘平臺時年五十在位三十七年丞相斯為上崩在外恐諸公子及天下有變乃祕之不發喪棺載轀輬車中故幸官者參乘所至上食百官奏事如故宦者輒從轀輬車中可其奏事獨子胡亥趙高及用幸宦者五六人知上死趙高故嘗教胡亥書及獄律令法事胡亥私幸之高乃與胡亥丞相斯陰謀破去始皇所封書賜公子扶蘇者而更詐為丞相斯受始皇遺詔沙丘立子胡亥以為太子乃更為書賜公子扶蘇蒙恬數以罪賜死遂從井陘抵九原會暑上轀輬車臭乃詔從官令車載一石鮑魚以亂其臭行從直道至咸陽發喪太子胡亥襲位漢書曰秦據勢勝之地騁狙詐之兵蠶食山東一切取勝因矜其所習自任私智姍笑三代蕩滅古法竊自號為皇帝而子弟為疋夫內亡骨肉本根之輔外亡尺土蕃翼之衛吳陳奮其白挺劉項隨而斃之又曰秦始皇即位三十九年內平六國外攘四夷死人如麻暴骨長城之下頭顱相屬於道不一日而無兵又曰賈山借秦為諭名曰至言其辭曰始皇貴為天子富有天下賦歛重數百姓罷弊赭衣半道群盜滿山使天下之人載目而視傾耳而聽離宮三百鍾鼓不移而具為宮室之麗如此使其後世曾不得聚廬而託處焉為馳道於天下東窮燕齊南極吳楚厚築其外隱以金椎樹以青松為馳道之麗如此使其後世曾不得邪徑而託足焉葬乎驪山銅錮其內漆塗其外中城遊觀上成山林為葬埋之侈如此使其後世曾不得蓬顆蔽塚而託葬焉秦以熊羆之力虎狼之心蠶食諸侯并吞海內而不篤禮義故天殃已加矣異苑曰秦世有謠云秦始皇奄僵開吾戶據吾床飲吾酒唾吾漿飡吾飲以為糧張吾弓射東牆前至沙丘當滅亡始皇既坑儒焚典乃發孔子墓欲取諸經傳壙既啟於是悉如謠者之言又言謠文刊在塚壁政甚惡之及達沙丘而脩別路見一群小兒輦沙為阜問云沙丘從此得病淮南子曰秦之時高為臺榭大為苑囿造馳道數千里鑄金人發邊戍入芻藁頭會箕歛輸於少府丁壯丈夫西至臨洮狄道東至會稽浮石南至象郡桂林北至飛狐陽原道路死人以溝量當此之時有忠諫者謂之不祥道仁義者謂之狂桓譚新語曰秦始皇見周室失統自以當保有九州見萬民碌碌猶群羊聚豬皆可以竿而驅之故遂以敗也二世皇帝史記曰二世皇帝元年年二十一趙高為郎中令任用事徵材士五萬人為屯衛咸陽令教射狗馬禽獸用法益刻深七月戍卒陳勝等反二年冬陳涉所遣周章等西至戲兵數十萬二世大驚夢白虎齧其左驂馬殺之心不樂怪問占夢卜曰涇水為祟二世乃齋於望夷宮欲祠涇水沉四白馬使使責讓高以盜賊事高懼乃陰與其壻咸陽令閻樂其第趙成謀使郎中令為內應詐為有大賊遣樂將吏卒千餘人至望夷宮郎中令與樂俱入射上幄坐幃二世怒召左右左右皆惶擾不鬥旁有官者一人侍不敢去二世入內謂曰何不早告我官者曰臣不敢言故得全使臣早言皆已誅安得至今樂前即二世數曰足下驕恣誅殺無道天下共叛足下其自為計二世曰丞相可得見不樂曰不可二世曰吾願得一郡為王弗許又曰願為萬戶侯弗許又曰願與妻子為黔首比諸公子樂曰臣受命於丞相為天下誅足下足下雖多言臣不敢報麾其兵進二世自殺閻樂歸報趙高趙高乃悉召諸大臣公子告以誅二世之狀曰秦故王國始皇君天下故稱帝今六國復自立秦地益小乃以空名為帝不可宜為王如故便立二世之兄子公子嬰為秦王以黔首葬二世杜南宜春苑中在位三年秦王子嬰史記曰趙高令子嬰齋當廟見受玉璽齋五日子嬰與其子二人謀稱疾不行高果自往曰宗廟重事王奈何不行子嬰遂刺殺趙高於齋宮夷三族以狥咸陽子嬰為秦王四十六日楚將沛公破秦軍入武關遂至霸上使人約降子嬰子嬰即係頸以組白馬素車奉天子之璽符降軹道旁項籍為從長殺子嬰及秦諸公子宗族史記太史公曰始皇自以為功過五帝地廣三皇而羞與之侔善哉賈生推言之曰秦并兼諸侯繕津關據險塞脩甲兵而守之陳涉以戍卒散亂之眾數百奮臂大呼不用弓戟之兵鉏櫌白挺櫌田器也音憂望屋而食橫行天下秦人阻險不守關梁不闔長戟不刺強弩不射楚師深入戰於鴻門曾無藩籬之艱當此時也世非無深慮知化之士也然不敢盡忠拂過者秦俗多忌諱之禁忠言未卒於口而身為戮歿矣故天下之士傾耳而聽重足而立拑口而不言是以三主失道忠臣不敢諫智士不敢謀天下已亂姦不上聞豈不哀哉秦王纘六世之餘烈振長筴而御宇內吞二周而亡諸侯履至尊而制六合執棰拊拊拍音府以鞭笞天下威振四海南取百越之地以為桂林象郡乃使蒙恬北築長城而守藩籬卻匈奴七百餘里胡人不敢南下而牧馬士不敢彎弓而報怨於是廢先王之道焚百家之言以愚黔首隳名城殺豪俊收天下之兵聚之咸陽銷鋒鏑鑄以為金人十二以弱黔首之民然後塹華為城因河為津據億丈之城臨不測之谿以為固良將勁弩守要害之處信臣精卒陳利兵而誰何何問之也天下已定秦王之心自以為關中之固金城千里子孫帝王萬世之業也秦王既沒陳涉斬木為兵揭竿為旗天下雲集而響應羸糧而影從山東豪後遂並起而亡秦族矣然秦以區區之地千乘之權招八州而朝同列百有餘年然後以六合為家崤函為宮一夫作難而七廟隳身死人手為天下笑者何也仁義不施而攻守之勢異也秦王懷貪鄙之心行自奮之智不信功臣不親士民廢王道立私權禁文書而酷刑法先詐力而後仁義以暴虐為天下始孤獨而有之故其亡可立而待, SBCK: ''}
