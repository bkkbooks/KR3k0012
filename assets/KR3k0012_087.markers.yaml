  - {type: variant, offset: 928, length: 0, content: '', SBCK: 子嬰降軹道旁遂西入咸陽召諸縣豪桀曰父老苦􅁗苛法乆矣誹謗者族偶語者棄市吾與諸侯約先入􅀜者王之吾當王􅀜中與父老約法三章耳殺人者死傷人及盗抵罪餘悉除去􅁗民大喜五年項羽㓕諸侯尊漢王爲皇帝天下大定髙祖都雒陽置酒南宫髙祖曰通侯諸將無敢隠朕皆言其情吾所以有天下者何項氏之所以失天下者何髙起孟康曰姓髙名起也王陵對曰陛下慢而侮人攻城略地降下者因以予之與天下同利也項羽妬賢嫉能有功者害之賢者疑之戰勝而不與人功得地而不與人利此所以失天下者也髙祖曰公知其一未知其二運籌䇿於帷帳之中決勝於千里之外吾不如子房鎮國家撫百姓給餉饋不絶粮道吾不如蕭何連百萬之衆戰必勝攻必取吾不如韓信此三人者皆人傑也吾能用之此所以取天下也戍卒婁敬􅀃髙祖曰都雒陽不便不如入􅀜據􅁗之國上以問張良因勸上即日車駕西都長安九年髙祖大朝諸侯群臣置酒未央前殿上奉玉巵起爲太上皇壽曰始大人嘗以臣無頼不能治産業不如仲力今某之業所就與仲力孰多群臣皆稱萬􅀊大爲􅀏樂髙祖廻歸過沛留置酒沛宫悉召故人父老子弟佐酒發沛中兒得百二十人教之歌酒酣髙祖擊筑自爲歌詩曰大風起􅀆雲飛􅀭威加海内􅀆歸故郷安得猛士􅀆守四方令兒皆和習之髙祖乃起舞慷􅁣傷懐泣數行下謂沛父兄曰遊子悲故郷吾雖都􅀜中萬􅀊後吾䰟魄猶樂思沛且朕自沛公以誅暴逆遂有天下其以沛爲朕湯沐邑後其民世世無有所與沛父兄諸母故人曰樂飲極歡道舊故爲􅀏樂十餘日髙祖欲去沛父兄固請留髙祖曰吾人衆多父兄不能給乃玄沛中空縣皆之邑西獻獻牛酒髙祖復留止張飲三日張宴曰張張惟髙祖擊黥布時爲流矢所中行道病甚吕后迎良醫醫入見髙祖問醫醫曰病可治於是髙祖嫚罵之曰吾以布衣提三尺劔取天下此非天命乎命乃在天雖扁鵲亦何益遂不使治病四月甲辰崩于長樂宫時年六十一在位十二年葬長陵群臣上尊號爲髙皇帝令郡國諸侯各立髙祖廟以􅀊時祠及孝惠五年思髙祖之悲樂沛以沛宫爲髙祖原廟也􅀄髙祖不脩文學而性明逹好謀能聽自􅁥門戍卒見之如舊􅀄從民心作三章之約天下旣定命蕭何治律令韓信申軍法張蒼定章程如淳曰章歷數之章術也程者權衡丈尺斛斗之平叔孫通制禮儀陸賈造新語又與功臣剖符作誓丹書鐵契金匱石室藏之宗廟雖日不暇給規摹弘逺矣又曰范増􅀃項羽曰沛公居山東貪於財貨好美姬今入􅀜財物無所取婦女無所幸此其志不在小漢書賛曰漢承堯運徳祚巳盛斷虵著符旗幟尚赤恊于火德自然之應得天統矣荀恱漢紀曰項羽自立爲楚王王梁楚地九郡都彭城立沛公爲漢王王巴蜀漢中}
