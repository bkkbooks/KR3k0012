  - {type: variant, offset: 2255, length: 1191, content: 安唯上察之始皇怒使扶蘇北監蒙恬於上郡三十七年始皇出遊左丞相斯從右丞相去疾守少子胡亥愛慕請從始皇許之十一月行至雲夢望祀虞舜於九疑浮江下觀蘇柯渡梅渚過丹陽至錢塘浙江水波惡乃西百二十里從狹中渡上會稽祭大禹望于南海而立石刻頌秦德還過吳從江乘渡並海上北至琅邪方士徐福等入海求神藥數歲不得費多恐譴乃詐曰蓬萊藥可得然常為大鮫魚之所害故不得至願請善射與俱見則以連弩射之始皇夢與海神戰如人狀以問占夢愽士曰水神不可見以大魚蛟龍為候今上禱祠備謹而有此惡神當除去而善神可致乃命入海者齎捕巨魚具而自以連弩候大魚出射之自琅邪北至營成山弗見至之罦見巨魚遂並海至平津而病始皇惡言死群臣莫敢言死事上病益甚乃為璽書賜公子扶蘇曰與喪會咸陽而葬書已封在中車府令趙高行符璽事所未授使者七月丙寅始皇崩於沙丘平臺時年五十在位三十七年丞相斯為上崩在外恐諸公子及天下有變乃祕之不發喪棺載轀輬車中故幸官者參乘所至上食百官奏事如故宦者輒從轀輬車中可其奏事獨子胡亥趙高及用幸宦者五六人知上死趙高故嘗教胡亥書及獄律令法事胡亥私幸之高乃與胡亥丞相斯陰謀破去始皇所封書賜公子扶蘇者而更詐為丞相斯受始皇遺詔沙丘立子胡亥以為太子乃更為書賜公子扶蘇蒙恬數以罪賜死遂從井陘抵九原會暑上轀輬車臭乃詔從官令車載一石鮑魚以亂其臭行從直道至咸陽發喪太子胡亥襲位漢書曰秦據勢勝之地騁狙詐之兵蠶食山東一切取勝因矜其所習自任私智姍笑三代蕩滅古法竊自號為皇帝而子弟為疋夫內亡骨肉本根之輔外亡尺土蕃翼之衛吳陳奮其白挺劉項隨而斃之又曰秦始皇即位三十九年內平六國外攘四夷死人如麻暴骨長城之下頭顱相屬於道不一日而無兵又曰賈山借秦為諭名曰至言其辭曰始皇貴為天子富有天下賦歛重數百姓罷弊赭衣半道群盜滿山使天下之人載目而視傾耳而聽離宮三百鍾鼓不移而具為宮室之麗如此使其後世曾不得聚廬而託處焉為馳道於天下東窮燕齊南極吳楚厚築其外隱以金椎樹以青松為馳道之麗如此使其後世曾不得邪徑而託足焉葬乎驪山銅錮其內漆塗其外中城遊觀上成山林為葬埋之侈如此使其後世曾不得蓬顆蔽塚而託葬焉秦以熊羆之力虎狼之心蠶食諸侯并吞海內而不篤禮義故天殃已加矣異苑曰秦世有謠云秦始皇奄僵開吾戶據吾床飲吾酒唾吾漿飡吾飲以為糧張吾弓射東牆前至沙丘當滅亡始皇既坑儒焚典乃發孔子墓欲取諸經傳壙既啟於是悉如謠者之言又言謠文刊在塚壁政甚惡之及達沙丘而脩別路見一群小兒輦沙為阜問云沙丘從此得病淮南子曰秦之時高為臺榭大為苑囿造馳道數千里鑄金人發邊戍入芻藁頭會箕歛輸於少府丁壯丈夫西至臨洮狄道東至會稽浮石南至象郡桂林北至飛狐陽原道路死人以溝量當此之時有忠諫者謂之不祥道仁義者謂之狂桓譚新語曰秦始皇見周室失統自以當保有九州見萬民碌碌猶群羊聚豬皆可以竿而驅之故遂以敗也二世皇帝史記曰二世皇帝元年年二十一趙高為郎中令任用事徵材士五萬人為屯衛咸陽令教射狗馬禽獸用法益刻深七月戍卒陳勝等反二年冬陳涉所遣周章等西至戲兵數十萬二世大驚夢白虎齧其左驂馬, WYG: 若}
