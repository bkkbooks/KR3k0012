  - {type: variant, offset: 4501, length: 2, content: 秦凡, SBCK: 豐公家于沛之豐沛邑之陽里其妻夢赤馬􅀂龍戯巳而生執嘉是爲太公即太上皇也太上皇之妃曰媪是爲昭靈后名含始遊於洛池有玉鷄衘赤珠出刻曰玉英吞此者王含始吞之生􅀖字季又曰􅀇晏先王曰禮稱至道以王義道以霸觀漢祖之取天下也遭􅁗世暴亂不偕尺土之資不權將相之柄發迹泗亭􅁬其智謀羈勒英雄鞭驅天下或以威服或以德致或以義成或以權斷逆順不常霸王之道􅄂焉是以聖君帝王之位而無一定之制三代之美固難及矣後漢班叔皮王命論曰在昔帝堯之禪曰咨爾舜天之暦數在爾躬舜亦命禹暨于稷契咸佐唐堯光濟}
  - {type: page-break, offset: 4501, content: '', id: KR3k0012_SBCK_087-5a}
  - {type: variant, offset: 4501, length: 0, content: '', WYG: 豐公家于沛之豐沛邑中陽里其妻夢赤馬若龍戲已而生孰嘉是為太公即太上皇也太上皇之妃曰媪是為昭靈后名含始遊於洛地有玉雞銜赤珠出刻曰玉英吞此者王含始吞之生邦字季又曰𤣥晏先生曰禮稱至道以王義道以霸觀漢祖之取天下也遭}
  - {type: variant, offset: 4501, length: 0, content: '', krp: 豐公家于沛之豐沛邑之陽里其妻夢赤馬若龍戯巳而生執嘉是爲太公即太上皇也太上皇之妃曰媪是爲昭靈后名含始遊於洛池有玉鷄衘赤珠出刻曰玉英吞此者王含始吞之生邦字季又曰玄晏先王曰禮稱至道以王義道以霸觀漢祖之取天下也遭}
  - {type: variant, offset: 4502, length: 1, content: 凡, WYG: 世暴亂不階尺土之資不權將相之柄發迹泗亭奮其智謀羈勒英雄鞭驅天下或以威服或以德致或以義成或以權斷逆順不常霸王之道雜焉是以身居帝王之位而無一定之制三代之美固難及矣後漢班叔皮王命論曰在昔帝堯之禪也曰咨爾舜天之厯數在爾躬舜亦命禹暨于稷契咸佐唐堯光濟}
  - {type: page-break, offset: 4502, content: '', id: KR3k0012_WYG_087-8a, image: WYG0893/WYG0893-0700c.png}
  - {type: variant, offset: 4502, length: 1, content: 凡, krp: 世暴亂不偕尺土之資不權將相之柄發迹泗亭奮其智謀羈勒英雄鞭驅天下或以威服或以德致或以義成或以權斷逆順不常霸王之道雜焉是以聖君帝王之位而無一定之制三代之美固難及矣後漢班叔皮王命論曰在昔帝堯之禪曰咨爾舜天之暦數在爾躬舜亦命禹暨于稷契咸佐唐堯光濟}
  - {type: variant, offset: 4504, length: 0, content: '', SBCK: 海弈世載德至于湯武而有天下雖其遭遇異時禪代不同至于應天順民其揆一也是故劉氏承堯之祚氏族之世著于春秋唐據火德而漢紹之始起沛澤則神母夜號以彰赤帝之符由是言之帝}
  - {type: variant, offset: 4504, length: 0, content: '', WYG: 海奕世載德至于湯武而有天下雖其遭遇異時禪代不同至於應天順民其揆一也是故劉氏承堯之祚氏族之世著於春秋唐據火德而漢紹之始起沛澤則神母夜號以彰赤帝之符由是言之帝}
  - {type: variant, offset: 4504, length: 0, content: '', krp: 海弈世載德至于湯武而有天下雖其遭遇異時禪代不同至于應天順民其揆一也是故劉氏承堯之祚氏族之世著于春秋唐據火德而漢紹之始起沛澤則神母夜號以彰赤帝之符由是言之帝}
  - {type: variant, offset: 4505, length: 7, content: 二帝合四十九年, SBCK: 之作必有明聖顯懿之德豐功厚利積累之業然後精誠通于神明流澤加於生人故能爲􅀑神所福饗天下所歸往未見運世無本功德不能紀而得堀然在此位者世俗見髙祖興於布衣不逹其故以爲適遭暴亂得􅁬其劒遊􅀃之士至比天下於逐鹿幸捷而得之不知神器有命不可智力求悲夫此世之所以多亂臣賊子者項籍河圖曰恠目勇敢重瞳大力}
