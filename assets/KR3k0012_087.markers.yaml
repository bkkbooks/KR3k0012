  - {type: variant, offset: 80, length: 621, content: 舜曰咨爾費贊禹功其賜爾皂游爾後嗣將大出遂妻之姚姓之玉女大費拜受佐舜調馴鳥獸是為柏翳舜賜姓蠃氏大費生子二人一曰大廉實鳥俗氏二曰若木實費氏其玄孫曰費昌子孫或在中國或在夷狄費昌當夏桀之時去夏歸商為湯御以敗桀於鳴條大廉玄孫曰孟戲中衍鳥身人言帝太戊聞而卜之使御吉遂致使御而妻之自太戊以下中衍之後世有功以佐殷國故嬴姓多顯遂為諸侯其玄孫曰中潏在西戎生蜚廉蜚廉生惡來惡來有力蜚廉善走父子俱以材力事紂周武王伐紂并殺惡來蜚廉死葬於霍太山蜚廉復有子曰季勝造父以善御幸於周繆王繆王以趙城封造父造父族由此為趙氏趙衰其後也惡來革者蜚廉子也早死有子曰女防女防四世生非子以造父之寵皆姓趙氏非子居犬丘周孝王分土為附庸邑之秦今天水隴西縣秦亭也使復續嬴氏祀號曰秦嬴三世至秦仲始大其孫襄公時周平王避犬戎之難東徙洛邑襄公以兵送平王平王封襄公為諸侯賜之歧以西之地襄公於是始與諸侯通使聘享之禮至繆公康公之世漸為強霸與齊晉爭為諸候盟主秦仲已下二十八世曰武王武王卒立異母弟是為昭襄王于時周室微弱昭襄王史記曰昭襄王十九年王為西帝齊為東帝皆復去之五十二年周九鼎入秦周初亡五十四年王郊見上帝於雍丘五十六昭襄王卒子孝文王立古史考曰王赧卒後天下無主四十九年以歲所在紀之孝文王史記曰孝文王元年赦罪人脩先王功臣褒厚親戚文王除喪十月己亥即位三日辛丑卒子莊襄王立莊襄王史記曰莊襄王元年大赦罪人脩先王之功臣施德厚骨肉而布惠於民東周君與諸候謀秦秦使相國呂不韋誅之盡入其國以陽人之地賜周君奉其祭祀四年莊襄王卒子政立始, SBCK: 漢髙祖}
