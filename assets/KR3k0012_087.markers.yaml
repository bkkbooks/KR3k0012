  - {type: variant, offset: 4693, length: 3, content: 伐秦然, SBCK: 五千􅀐追之項王渡淮􅀐能屬者百餘人耳項王至隂陵徐廣曰在淮南迷失道問一田父田父紿曰左文頴曰紿欺也欺令左也左乃䧟大澤中以故漢追及之項王乃復引兵而東至東城漢書音義曰縣名屬臨淮乃有二十八􅀐漢􅀐追者數千人項王自度不得脫謂其􅀐曰吾起兵至今八􅀊矣}
