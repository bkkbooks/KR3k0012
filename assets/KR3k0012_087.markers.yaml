  - {type: variant, offset: 4775, length: 2, content: 上游, SBCK: 飲食太后欲殺之不得間孝惠元年十二月帝晨出射雉趙王少不能早起太后聞其獨居使人特鴆而飲之犂明孝惠還趙王巳死徐廣曰犂猶比太后遂斷戚夫人手足去眼燻耳使居厠中命曰人􅇾居數日}
