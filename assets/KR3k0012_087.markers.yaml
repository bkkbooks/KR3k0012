  - {type: variant, offset: 900, length: 2, content: 莊襄, SBCK: 髙祖沛豐邑中陽里人姓劉氏字季母媪嘗息大澤之陂夢與神遇是時雷電晦暝父太公往視則見蛟龍於上巳而有娠遂産髙祖髙祖爲人隆凖而龍顔美􅂡髯左股有七十二黒子仁而愛人意豁如也爲泗上亭長廷中吏無不狎侮好酒及色常從}
