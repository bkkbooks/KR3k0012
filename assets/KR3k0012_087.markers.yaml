  - {type: variant, offset: 1550, length: 638, content: 來更命宮為極廟象天極廟道通驪山上作甘泉前殿築甬道自咸陽屬之二十八年始皇東行郡縣上鄒嶧山立石與魯諸儒生刻石頌秦德議封禪望祭山川之事乃遂上太山立石封祠祀禪梁父刻所立石乃並渤海以東過黃腄窮成山登之罘立石頌秦德而去南登琅邪大樂之留三月徙黔首三萬戶琅邪臺下復十二歲作琅邪臺立石頌秦德二十九年始皇東遊至陽武愽浪沙中為盜所驚求弗得乃令天下大索十日三十一年始皇為微行咸陽與武士四人俱夜出逢盜蘭池見窘武士擊殺盜三十二年始皇之碣石使燕人盧生求羨門高誓刻碣石門盧生使入海還以鬼神事因奏錄圖書曰亡秦者胡也始皇乃使將軍蒙恬發兵三十萬人北擊胡略取河南地三十三年略取陸梁地為桂林象郡南海西北斥逐匈奴自榆中並河以東屬之陰山以為三十四縣城河上為塞又使蒙恬渡河取高闕陶山北假中北假地名築亭鄣以逐戎人三十四年丞相斯議曰臣請史官非秦記燒之天下敢有藏詩書百家語者悉詣守尉雜燒之有敢偶語詩書棄市以古非今者族吏見不舉與之同罪諸有文學之書蠲除之令下三十日不燒黥為城旦所不去者醫藥卜筮種樹之書若有學法令以吏為師三十五年乃營作朝宮渭南北上林苑中先作前殿阿房東西五百步南北五十丈上可坐萬人下可建五丈旌旗周馳為閣道自殿下直抵南山表南山之巔以為闕為複道自阿房渡渭屬之咸陽以象天極閣道絕漢抵營室也立石東海上朐界中以為秦東門因徙三萬家驪邑五萬家雲陽皆復不事乃令咸陽之旁二百里內宮觀二百七十複道甬道相連帷帳鍾鼓美人充之各寒暑不移徙所幸有言其處者罪死始皇帝幸梁山宮從山上見丞相車騎眾不善也中人或告丞相丞相後損車騎始皇怒曰此中人泄吾語案問莫服當, WYG: ''}
