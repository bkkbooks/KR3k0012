  - {type: variant, offset: 1110, length: 1088, content: 可與久遊乃亡去秦王覺固止為秦國尉卒用其計策二十六年秦初并天下廷尉斯等與愽士議曰有天皇有地皇有人皇人皇最貴臣等昧死上尊號王為秦皇命為制令為詔天子自稱為朕王曰去秦著皇採上古帝王位號號曰皇帝他如議制曰朕聞太古有號死而以行為謚如此則子議父臣議君甚無謂朕弗取自今以來除謚法朕為始皇帝後世以計數二世三世至於萬世傳之無窮始皇推終始五德之傳音亭傳之傳也以為周得火德秦代周德從所不勝方今水德之始改年始朝賀皆自十月朔衣服旄旌節旗皆上黑數以六為紀符法冠皆六寸而轝六尺六尺為步乘六馬更名河曰德水以為水德之始剛毅戾深事皆決於法分天下之國以為三十六郡郡置守尉監更命民曰黔首大酺收天下兵聚之於咸陽銷以為鍾鐻鑄為金人十二重各千石置宮庭中一法度衡石丈尺車同軌書同文字地東至海暨朝鮮西至臨洮羌中南至北向戶北據河為塞並陰山至遼東徙天下豪富於咸陽十二萬戶諸廟及章臺上林皆在渭南秦每破諸侯寫放其宮室作之咸陽北阪二曰臨渭自雍門以東至涇渭殿屋複道周閤相屬所得諸美人鍾鼓以充入之二十七年始皇巡隴西北地出雞頭山過回中作長信宮渭南已來更命宮為極廟象天極廟道通驪山上作甘泉前殿築甬道自咸陽屬之二十八年始皇東行郡縣上鄒嶧山立石與魯諸儒生刻石頌秦德議封禪望祭山川之事乃遂上太山立石封祠祀禪梁父刻所立石乃並渤海以東過黃腄窮成山登之罘立石頌秦德而去南登琅邪大樂之留三月徙黔首三萬戶琅邪臺下復十二歲作琅邪臺立石頌秦德二十九年始皇東遊至陽武愽浪沙中為盜所驚求弗得乃令天下大索十日三十一年始皇為微行咸陽與武士四人俱夜出逢盜蘭池見窘武士擊殺盜三十二年始皇之碣石使燕人盧生求羨門高誓刻碣石門盧生使入海還以鬼神事因奏錄圖書曰亡秦者胡也始皇乃使將軍蒙恬發兵三十萬人北擊胡略取河南地三十三年略取陸梁地為桂林象郡南海西北斥逐匈奴自榆中並河以東屬之陰山以為三十四縣城河上為塞又使蒙恬渡河取高闕陶山北假中北假地名築亭鄣以逐戎人三十四年丞相斯議曰臣請史官非秦記燒之天下敢有藏詩書百家語者悉詣守尉雜燒之有敢偶語詩書棄市以古非今者族吏見不舉與之同罪諸有文學之書蠲除之令下三十日不燒黥為城旦所不去者醫藥卜筮種樹之書若有學法令以吏為師三十五年乃營作朝宮渭南北上林苑中先作前殿阿房東西五百步南北五十丈上可坐萬人下可建五丈旌旗周馳為閣道自殿下直抵南山表南山之巔以為闕為複道自阿房渡渭屬之咸陽以象天極閣道絕漢抵營室也立石東海上朐界中以為秦東門因徙三萬家驪邑五萬家雲陽皆復不事乃令咸陽之旁二百里內宮觀二百七十複道甬道相連帷帳鍾鼓美人充之各寒暑不移徙所幸有言其處者罪死始皇帝幸梁山宮從山上見丞相車騎眾不善也中人或告丞相丞相後損車騎始皇怒曰此中人泄吾語案問莫服當是時詔捕諸時在旁者皆, SBCK: 􅀂}
