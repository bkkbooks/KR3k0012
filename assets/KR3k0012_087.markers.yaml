  - {type: variant, offset: 4683, length: 1, content: 初, SBCK: 匈匈數􅀊者徒以吾兩人耳願與漢王挑戰李竒曰挑身獨戰不湏衆也挑音茶了反瓉曰挑戰擿撓敵求戰古謂之致師决雌雄無徒苦天下之民父子爲也漢王􅀏謝曰吾寧闘智不能闘力項王命壯士出挑戰漢王有善􅀐射者樓煩應劭曰樓煩今樓煩縣楚挑戰三合樓煩輙射殺之項王大怒乃自􅀍甲持㦸挑戰樓煩欲射之項王瞋目叱之樓煩目不敢視手不敢}
