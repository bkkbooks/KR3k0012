  - {type: variant, offset: 925, length: 2, content: 秦昭, SBCK: 厭當之髙祖隠於芒碭山間吕后與人俱來常得之髙祖恠問吕后曰季所居上常有雲氣故從徃常得季髙祖又喜沛中子弟或聞之多欲附者􅁗二世元年秋陳勝等起沛令欲以沛應勝沛父老皆曰生平所聞劉季竒恠當貴且卜筮之莫如劉季最吉乃立爲沛公祠黄帝􅀕􅃖尤於沛庭而釁鼓旗熾皆赤漢元年冬十月五星聚於東井沛公兵先諸侯至霸上􅁗}
