  - {type: variant, offset: 4677, length: 0, content: '', SBCK: 自立爲西楚霸王王九部都彭城漢之二年漢王伐楚皆巳入彭城收其寳貨項王乃從蕭晨擊漢軍而東至彭城大破漢軍漢軍皆走相隨入榖泗水二水皆在沛郡彭城殺漢卒十餘萬人漢卒皆南走山楚又追擊之靈壁東徐廣曰在彭城睢水上徐廣曰睢水彭城西水入泗水漢軍却爲楚所擠擠排也多殺漢卒十餘萬皆入睢水睢水爲之不流圍漢王三匝於是大風從西北起折木發屋􅀭沙石窈􅄀晝晦逢迎楚軍楚軍大亂壞散而漢王乃得與數十􅀐遁去漢之四年項王西與漢俱臨廣武而軍孟康注曰築兩城相對在廣武敖倉西三皇山山上相守數月當此時彭越數反梁也絶楚糧道項王患之楚漢乆相持未決丁壯苦軍旅老弱罷轉漕項王}
