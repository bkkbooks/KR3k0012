  - {type: variant, offset: 2200, length: 477, content: 長公主及昶終與三公主同塋異穴又曰劉輝字重昌正始初尚蘭陵長公主世宗第三姊也公主頗嚴妬輝嘗私幸主侍婢有身主笞殺之割其孕子節解以草裝實婢腹祼以示輝輝遂忿憾踈公主公主姊因入聽講言其故靈太后太后初勑清河王懌窮其事懌與高陽王雍廣平王懷奏其不知之狀無可為夫婦之禮請離婚削除封位太后從之又曰稽拔世為訖奚部帥其父根皇始初率眾歸魏太祖嘉之拔尚華陰公主生子敬元紹之逆也公主有功超授敬大司馬封長樂王又蠕蠕曰太昌元年六月阿那瓌遣使朝貢并為長子請尚公主孝武詔以范陽王誨之長女瑯琊公主許之未及成婚帝入關東西魏競結阿那瓌為婚好西魏文帝乃以孝武時舍人元翌女稱為化政公主妻那瓌兄弟塔寒又曰阿那瓌遣使朝貢復因求婚詔以常山王隲妹樂安公主許之改封為蘭陵郡長公主阿那瓌奉馬千疋以為娉禮請迎公主詔兼宗正卿元壽兼太常卿孟韶等送公主自晉陽北邁資用器物咸出豐渥阿那瓌遣迎公主於新城之南陳書沈君理美風儀博涉有識覽陳武帝鎮南徐州深見器重命尚會稽長公主及帝受禪拜駙馬都尉封永定亭侯為吳郡太守時兵革未寧百姓荒弊君理揔集士卒修飾器械深以幹理見稱又曰蔡凝字子居美容止及長愽學有文詞尤工草隸累遷太子中舍人以名家子選尚信義, WYG: ''}
