  - {type: variant, offset: 1761, length: 4, content: 嗟嘆良久, SBCK: 風俗通曰列侯尚公主國人尚公主以妻制夫陽屈於隂􅈛漢武帝集柏梁詩曰左九嬪作萬年公主誄曰赫赫京室河洛所經隂精發曜降兹淑靈篤生公主誕奮休禎秀出紫曒日暉月明紅顔鬒髪金質玉形駙馬漢書曰駙馬都尉掌駙馬駙馬非正駕車皆爲副馬一曰駙近也疾也又百官公卿表曰漢武元鼎二年置三都尉駙馬奉車掌御乗輿車􅀐都尉掌羽林從􅀐並無貟或以侍中常侍卿尹校尉左迁爲之漢舊儀曰駙馬都尉掌􅀐從武帝置秩比二千石蜀志曰諸􅁑瞻字思逺建興十二年亮出武功與兄瑾書曰瞻巳今年八􅀊聦惠可愛嫌其早成恐不爲重器耳十七尚公主拜駙馬都尉宋書曰江斆字叔文母宋文帝女淮陽公主㓜以戚屬召見孝武謂謝㽵曰此小兒方當爲名器少有美譽尚孝武女臨江公主拜駙馬都尉爲丹陽丞時􅀽粲爲尹見斆歎曰風流不墜正在江郎數與宴賞留連日夜齊書曰王􅌔字思晦年數歳而風神警拔有成人之度時祖儉作宰相賔客盈門見􅌔曰公才公望復在此矣弱冠選尚淮南長公主拜駙馬都尉梁書曰􅀽樞愽學明悉舊典􅀄陳武帝長女永嗣公主先適陳留太守錢蕆生子􅯀主及􅯀並卒于梁時武帝受命唯主客請議加蕆駙馬都尉并贈􅯀官樞議曰昔王􅁎下嫁必適諸侯同姓爲主聞於公羊之􅀃車服不繫顯於詩人之篇漢氏􅀄興列侯尚主自斯巳後降嬪素族駙馬都尉置由漢武或以假諸功臣或以加於戚屬}
