  - {type: variant, offset: 1743, length: 0, content: '', SBCK: 從之又曰貞元三年遣廻紇使合闕將軍歸其國􅀄合闕將其君命請婚於我上許以咸安公主嫁之命公主見合闕於麟徳殿且命齎公主畫圖就示可汗以馬價絹五萬疋還之許其互市而去以殿中監嗣王湛然爲送咸安公主使仍兼婚禮使四年廻紇公主兼使者}
  - {type: variant, offset: 1743, length: 0, content: '', WYG: 從之又曰貞元三年遣回紇使合厥將軍歸其國初合厥將其君命請婚於我上許以咸安公主嫁之命公主見合厥於麟德殿且命齎公主畫圖就示可汗以馬價絹五萬匹還之許其互市而去以殿中監嗣王湛然為送咸安公主使仍兼婚禮使四年回紇公主兼使者}
  - {type: variant, offset: 1743, length: 0, content: '', krp: 從之又曰貞元三年遣廻紇使合闕將軍歸其國𥘉合闕將其君命請婚於我上許以咸安公主嫁之命公主見合闕於麟徳殿且命齎公主畫圖就示可汗以馬價絹五萬疋還之許其互市而去以殿中監嗣王湛然爲送咸安公主使仍兼婚禮使四年廻紇公主兼使者}
  - {type: variant, offset: 1744, length: 7, content: 婁敬說漢高祖欲, SBCK: 自夲蕃上御延喜門禁婦人及車輿觀者時廻紇可汗喜於和親其禮甚恭乃上言曰昔爲兄弟今即子壻子壻半子也彼猶父此猶子父􅀂患於西戎子當遣兵除之又曰太和公主長慶元年封爲公主􅁽爲廻紇可敦出降愛登里邏骨没密施合毗伽保義可汗􅀄保義可汗旣立遣使求婚遂封第九妹爲永安公主將}
  - {type: page-break, offset: 1744, content: '', id: KR3k0012_SBCK_154-5a}
  - {type: variant, offset: 1744, length: 7, content: 婁敬說漢高祖欲, WYG: 自本蕃上御延喜門禁婦人及車輿觀者時回紇可汗喜於和親其禮甚恭乃上言曰昔為兄弟今即子壻子壻半子也彼猶父此猶子父若患於西戎子當遣兵除之又曰太和公主長慶元年封為公主册為回紇可敦出降愛登里邏骨沒宻施合毗伽保義可汗初保義可汗既立遣使求婚遂封第九妹為永安公主將}
