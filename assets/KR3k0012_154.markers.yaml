  - {type: variant, offset: 1720, length: 0, content: '', WYG: 與遺愛謀反之狀遺愛伏誅公主賜自盡又曰杜如晦之子荷以功臣子尚城陽公主賜爵襄陽郡公授尚乘奉御貞觀中與太子承乾謀反坐斬又曰髙士亷子以履行尚太宗女東陽公主拜駙馬都尉遭父艱居喪以孝聞太宗手詔敦諭曰古人立孝毁不滅身聞卿絶粒殊乖大禮幸抑摧裂之情割傷生之累俄起為衞尉卿又曰蕭瑀子競尚太宗女襄陽公主雅有禮度太宗每令諸公主凡厥所為皆視其楷則又令所司别為營第公主辭曰婦人侍舅姑如侍父母若處不同則定省有闕再三固讓乃止又曰王珪子敬直尚南平公主禮有婦見舅姑之儀自近代公主岀降此禮皆廢珪曰今主上欽明動循法制吾受公主謁見豈為身榮所以成國家之美耳遂與妻就位而坐令公主親執笄行盥饋之道禮成而退是後公主下降有舅姑者皆備婦禮自珪始也又曰貞觀中長樂公主岀降太宗以皇后所生勑有司資送倍於永嘉長公主秘書監魏徵諫曰不可昔漢明帝欲}
