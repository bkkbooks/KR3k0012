  - {type: variant, offset: 1757, length: 1, content: 匈, SBCK: 止其上一旦皆隨鳯飛去荀氏家傳曰荀羡字令則年十五擬國婚之選君不欲連姻帝室乃逺遁長沙監司追㝷不􅀗巳遂尚㝷陽公主丗􅀃曰桓武平蜀以李勢女爲妾有寵甞着齋後温尚南康長公主主始不知之旣聞乃伺温不在率數十婢拔白刃徃李所故欲斫之見李梳頭髮垂委地姿貌端麗乃徐下地結髮歛手向主曰國破家亡以至今日􅀂能見殺實猶生之年神色閑正辭氣悽婉主於是擲刀前抱之阿姊我見汝不能不怜何況老}
