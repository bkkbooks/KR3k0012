  - {type: variant, offset: 1752, length: 0, content: '', SBCK: 降嫁其年保義可汗卒􅁽九姓廻鶻爲崇德可汗五月遣使請迎所許嫁公主朝廷封第五妹爲太和公主以降今廻紇焉雖狄人固請永安而終不許故命中書舎人王起就鴻臚寺以宣喻焉列仙傳曰朱仲㑹稽市販珠人髙后募三寸珠乃詣闕上之珠好過度賜五百金}
