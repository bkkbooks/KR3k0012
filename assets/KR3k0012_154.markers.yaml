  - {type: variant, offset: 571, length: 1079, content: 東陽獻公主初為江夏王義恭司徒參軍累遷尚書吏部郎參掌大選宏識流品任舉咸盡其分又曰宋世諸公主莫不嚴妬明帝每疾之湖熟令袁慆妻以妬賜死使近臣虞通之撰妬婦記左光祿大夫江湛孫斅尚孝武帝女上乃使人為斅作表讓婚曰伏承詔旨當以臨海公主降嬪臣寒門悴族人凡質陋閭閻有對本隔天姻如臣素流家貧業寡年近將冠皆已有室荊釵布裙足得成禮自晉氏已來配尚公主者雖累經美冑亟有名才至如王敦懾氣桓溫歛威真長佯愚以固辭子敬炙足以求免王偃無仲都之質而祼雪於北階何瑀闕龍工之姿而見投於深井謝莊迨自害於朦膄殷仲幾不免於強鉏制勒甚於僕隸防閑過於婢妾行來出入人理之常當待賓客朋從之義而令掃轍息駕無窺門之期廢筵抽席絕接對之理非唯交友離異仍乃兄弟踈闊姆妳爭媚相勸以嚴妮媼競前相謟以急其間又有應荅問訊卜筮師母乃至殘飲餘食詰辨與誰衣被故弊必責頭領或進不獲前或入不聽出入則嫌於欲踈出則疑有別意召必以三更為期遣必以日出為限夕不見晚魄朝不識曙星至於夜步月而弄琴晝拱袂而披卷一生之內與此長乖又聲影才聞則少婢奔迸裾袂向席則醜丑老叢來左右整刷以疑寵見嫌賓客未冠以少容致斥如臣門外代荷殊榮足定家聲便預提拂清宮美宦或由才升一叨婚戚咸成恩假是以仰冒非宜披霧丹質非唯上陳一己規全身之願實乃廣申諸門受患之切伏願天慈照察特賜蠲停若恩制頒降披請不申便當刑膚剪髮投山竄海帝以此表遍示諸王以諷切之并為戲笑梁書曰武帝諸女臨安安吉長城三主並有文才而安吉最得令稱又曰王琳字孝璋位司徒左長史琳齊代娶梁武帝妹義興昭長公主有子九人並知名長子銓字公衡美風儀善占吐尚武帝女永嘉公主拜駙馬都尉銓雖學業不及弟錫而孝行齊焉時人以為錫銓二王可謂玉昆金季母長公主疾銓形貌瘠貶人不復識及居喪哭泣無常因得氣疾位侍中丹陽尹卒於衛尉卿又曰柳偃字彥游年十二梁武帝引見詔問讀何書對曰尚書又問有何美句對曰德惟善政政在養民眾咸異之詔尚武帝女長城公主拜駙馬都尉又謝覽字景滌尚齊錢唐公主拜駙馬都尉武帝平建業朝士皆拜覽時年二十餘為太子舍人長揖而已意氣閑雅視瞻聰明武帝目送良久謂徐勉曰覺此生芳蘭竟體想謝庄正當如此自此乃被賞味又曰謝眺及殷叡素與梁武以文章相得帝以大女永興公主適叡子鈞第二女永世公主適眺子謨及帝為雍州二女並暫隨母向州及帝即位二公主始隨內還武帝意薄謨又以門單欲更適張弘策子弘策卒又以與王志子諲而謨不堪歎恨為書狀如詩贈公主公主以呈帝甚加矜歎而婦終不得還尋用謨為信安縣稍遷王府諮議又曰殷叡子鈞尚武帝永興公主自宋齊已來公主多驕淫無行永興公主加以險虐鈞形貌短小為公主所憎每被召入先滿壁為殷叡字鈞輒流涕以出主命婢束而反之鈞不勝怒而言於帝帝以犀如意擊主碎於背然猶恨鈞又曰張纘字伯緒纘年十一尚武帝第四女富, SBCK: 髙}
