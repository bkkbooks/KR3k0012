  - {type: variant, offset: 1733, length: 0, content: '', WYG: 平公主髙宗少女以則天所生特承恩寵開曜元年降駙馬薛紹垂拱中被誣告與諸王連謀誅死則天乃殺武攸暨之妻以主配焉公主豐碩方額廣頥多權略則天以為類己每預謀議神龍年誅張易之有謀進號鎮國太平公主賞賜不可勝紀二年置公主府時中宗韋后上官昭容用事皆以為智謀不及公主甚憚之公主益日豪横唐隆元年𤣥宗清内難公主又預其謀令男崇簡從之與𤣥宗尊立睿宗公主頻著大勲益尊重加實封五千户通前一萬户每八奏事坐語移日所言皆聽軍國大政事皆參決如不朝謁即宰臣就第議其可否公主由是驕恣田園遍於近甸貨殖流於江淮公主懼𤣥宗英武乃連結將相專謀異計時宰相七人五岀公主門光天二年𤣥宗漸危逼乃勒兵誅其黨蕭至忠等公主遁入山寺數日方岀賜死於家籍其家財貨山積珍竒寳物侔於御府又曰唐隆元年勅公主置府近有勅總停太平公主有崇保社稷功其鎮國太平公主府即宜依舊酸棗縣袁楚客奏記於中書令魏元忠曰女有内男有外男女有别剛柔分矣中外斯隔隂陽著矣豈可相濫哉然則幕府者丈夫之職非婦人之事今諸公主並皆開府建僚崇置宫秩若以女處男職所謂長隂而抑陽也而望隂陽不僣風雨不爽其可得乎竊謂非致逺之計乖久安之策書曰事不師古以克永世匪説攸聞此之謂也君侯不正誰正之哉又曰安樂公主韋后所生初中宗遷於房州將及州境生於路次性慧敏容質秀絶中宗韋后愛寵日深恣其所欲奏請無不允許恃寵驕縱權傾天下自侯王宰相以下除拜多出其門所營宅第併造安樂佛寺擬於宮掖於城西鑿定昆池延袤數里出降之時以皇后仗發於宮中中宗與韋后御安福門觀之及韋庶人敗與駙馬武延秀皆斬之追貶為悖逆庶人又曰武延秀武承嗣之第二子也時武崇訓為安樂公主壻即延秀同宗之兄也數引至主第延秀久䧟蕃中解突厥語常於主第唱突厥歌作胡旋舞有姿媚主甚喜及崇訓死延秀得幸尚主拜席日授太常卿兼右衞將軍駙馬都尉又曰大中二年以起居郎駙馬都尉鄭顯尚萬壽公主詔曰女人之德雅合慎修嚴奉舅姑夙夜勤事此婦人之節也先王制禮貴賤同遵既已下嫁臣僚儀則須依古典萬壽公主婦禮宜依士庶又曰𢎞化公主宗室女貞觀十三年降於吐谷渾慕容諸葛鉢又曰文成公主宗室女貞觀十五年封降於吐蕃賛普弄賛命禮部尚書江夏王道宗送之弄賛親迎於河源見主人子壻禮甚謹歎大國服飾禮儀之美俯仰有媿沮之色謂所親曰我}
