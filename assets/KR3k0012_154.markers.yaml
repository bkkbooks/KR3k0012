  - {type: variant, offset: 3182, length: 268, content: 嫁許國公宇文士及以謹肅聞及述病且卒主親調飲食手自奉上世以此稱之及宇文化及逆弒主隨至聊城而化及為竇建德所敗士及自濟北西歸大唐時隋代衣冠並在其所建德引見之莫不惶懼失常唯主神色自若建德與語主自陳國破家亡不能報怨雪恥淚下盈襟聲辭不輟情理切至建德及觀聽者莫不為之動容隕涕咸肅然敬異焉及時主有一子名禪師年且十歲建德遣武賁郎將於士澄謂主曰字文化及躬行弒逆人神所不容今將族滅其家公主之子法當從坐若不能割愛亦聽留之主泣曰武賁既是隋室貴臣此事何須見問建德竟殺之主尋請建德削髮為尼士及右衛將軍述之子也以父勳封新城縣公隋文帝嘗引入臥內與語奇之令尚煬帝女南陽公主, SBCK: ''}
