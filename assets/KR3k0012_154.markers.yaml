  - {type: variant, offset: 1797, length: 155, content: 公主奉姑有孝稱初與穆氏瑯琊長公主茲並為女侍中又性不妬忌以昕之無子為納妾媵而皆育女公主有三女無男以昕之從兄希道第四子彰為嗣又曰蕭寶寅尚南陽長公主賜帛一千疋并給禮具公主有婦德事寶寅盡肅雍之禮好合雖積年而敬事不替寶寅每入室公主必立以待之相遇如賓自非太妃疾篤未曾歸休寶寅器性溫順自處以禮奉敬公主內外諧穆清河王懌親而重之, SBCK: ''}
