  - {type: variant, offset: 1733, length: 0, content: '', SBCK: 平公主髙宗少女以則天所生特承恩寵􅀄永隆年降駙馬薛紹垂拱中􅀍誣告與諸王連謀誅死則天乃殺武攸曁之妻以配主焉公主豊碩方額廣頥多權略則天以爲􅀋已毎預謀議神龍年誅張易之有謀進號鎮國太平公主賞􅃬不可勝紀二年置公主府時中宗韋后上官昭容用事皆以爲智謀不及公主甚憚之公主日益豪横唐隆元年􅀇宗清内難公主又預其謀令男崇簡從之與􅀇宗尊立睿宗公主頻著大勲益尊重加實封五千户通前一萬户每入奏事坐語移日所言皆聽軍國大政事必參决如不朝謁即宰臣就第議其可否公主由是驕恣田園遍於近甸貨殖流於江淮公主懼􅀇宗英武乃連結將相專謀異計時宰相七人五出公主門先天二年􅀇宗漸危逼乃勒兵誅其黨蕭至忠等公主遁入山寺數日方出賜死于家藉其家財貨山積珍竒寳物侔於御府又曰唐隆元年勑公主置府近有勑揔停太平公主有崇保社稷功其鎭國太平公主府即冝依舊酸􅀥縣􅀽楚客奏記於中書令魏元忠曰女有内男有外男女有別剛柔分矣中外斯隔隂陽著矣豈可相濫哉然而幕府者丈夫之職非婦人之事今諸公主並開府建僚崇置官秩􅀂以女處男職所謂長隂而抑陽也而望隂陽不僣風雨不爽其可得乎竊謂非致逺之計乖乆安之䇿書曰事不師古以克永丗匪􅀃攸聞此之謂也君侯不正雅之哉又曰安樂公主韋后所生􅀄中宗遷於房州欲及州境生於路次性惠敏容質秀絶中宗韋后愛寵日深恣其所欲奏請無不允許恃寵驕縱權傾天下自王侯宰相以下除拜多出其門所營第宅并造安樂佛寺擬於宫掖城西造定昆池於㽵延袤數里出降之時以皇后仗發於宫中中宗與韋后御安福門觀之及韋庶人敗與駙馬武延秀皆斬之追貶爲悖逆庶人又曰武延秀武承嗣之弟子也時武崇訓爲安樂公主壻即延秀之從父兄也數引至主第延秀乆䧟蕃中解突厥語常於主第唱突厥歌作胡旋舞有姿媚主甚喜及崇訓死延秀得幸尚主拜席日授太常卿兼右衛將軍駙馬都尉又曰大中二年以起居郎駙馬都尉鄭顥尚萬壽公主詔曰女人之德雅合愼修嚴奉舅姑夙夜勤事此婦之節也先王制禮貴賤同遵旣巳下嫁臣寮儀則湏依古典萬壽公主婦禮冝依士庶又曰弘化公主宗室女貞觀十三年降吐谷渾慕容諸􅂚鉢又曰文成公主宗室女貞觀十五年封降於吐蕃賛普弄賛命禮部尚書江夏王道宗送之弄賛親迎于河源見主人子婿禮甚謹歎大國服飾禮儀之美俯仰有媿沮之色謂所親曰我}
