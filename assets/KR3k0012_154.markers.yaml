  - {type: variant, offset: 1720, length: 0, content: '', SBCK: 與遺愛謀反之􅃺遺愛伏誅公主賜自盡又曰杜如晦之子荷以功臣子尚城陽公主賜爵襄陽郡公授尚乗奉御貞觀中與太子承乾謀反坐斬又曰髙士廉子以履行尚太宗女東陽公主拜駙馬都尉遭父艱居䘮以孝聞太宗手詔敦喻曰古人立孝毀不滅身聞卿絶粒殊乖大禮幸抑摧裂之情割傷生之累俄起爲衛尉卿又曰蕭瑀子銳尚太宗襄城公主公主雅有禮度太宗毎令諸公主凡厥所爲皆視其楷則又令所司別爲營弟公主辭曰婦人事舅姑如事父母􅀂居處不同則定省多闕再三固讓乃止又曰王珪子敬直尚南平公主禮有婦見舅姑之儀自近代公主出降此禮皆廢珪曰今主上欽明動循法制吾受公主謁見豈爲身榮所以成國家之美耳遂與其妻就位而坐令公主親執笲行盥饋之道禮成而退是後公主下降有舅姑者皆備婦禮自珪始也又曰貞觀中長樂公主出降太宗以皇后所生勑有司資送倍於永嘉長公主秘書監魏徴諫曰不可昔漢明帝欲}
