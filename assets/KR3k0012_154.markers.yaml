  - {type: variant, offset: 1777, length: 2, content: 國又, SBCK: 重庶姓之輕􅀂不如其等級寧可合􅈟而酳所以假駙馬之位乃配於皇女也今公主早薨伉儷巳絶旣無禮數致疑何湏駙馬之授案杜預尚晉宣帝第二女晉武踐祚而主巳亡泰始中追贈公主元凱無復駙馬之號梁文帝女新安穆公主早薨天監􅀄王氏無追拜之事逺近二例足以校明無勞此授冝追贈陳侯時以議爲當後魏書}
  - {type: variant, offset: 1777, length: 2, content: 國又, WYG: 重庶姓之輕若不加其等級寧可合􅈟而酳所以假駙馬之位乃崇於皇女也今公主早薨伉儷已絶既無禮數致疑何須駙馬之授案杜預尚晉宣帝第二女晉武踐阼而主已亡泰始中追贈公主元凱無復駙馬之號梁文帝女新安穆公主早薨天監初王氏無追拜之事逺近二例足以校明無勞此授宜追贈亭侯時以議為當後魏書}
