  - {type: variant, offset: 1761, length: 4, content: 嗟嘆良久, WYG: 風俗通曰列侯尚公主國人尚公主以妻制夫陽屈於隂耳左九嬪萬年公主誄曰赫赫京室河洛所經隂精發曜降兹淑靈篤生公主誕膺休禎秀出紫㣲日輝月明紅顔鬒髪金質玉形駙馬漢書曰駙馬都尉掌駙馬師古曰駙副馬也非正駕車者皆為副馬一曰駙近也疾也又百官公卿表曰漢武元鼎二年置三都尉駙馬奉車掌御乘輿車騎都尉掌羽林從騎並無員或以侍中常侍卿尹校尉左遷為之漢舊儀曰駙馬都尉掌騎從武帝置秩比二千石蜀志曰諸葛瞻字思逺建興十二年亮出武功與兄瑾書曰瞻已今年八歲聰慧可愛嫌於早成恐不為重器耳十七尚公主拜駙馬都尉宋書曰江斆字叔文母宋文帝女淮陽公主幼以戚屬召見孝武謂謝莊曰此小兒方當為名器少有美譽尚孝武女臨海公主拜駙馬都尉為丹陽丞時袁粲為尹見斆歎曰風流不墜正在江郎數與宴賞連日夜齊書曰王暕字思晦年數歲而風神警拔有成人之度時祖儉作宰相賔客盈門見暕曰公才望復在此矣弱冠選尚淮南長公主拜駙馬都尉梁書曰袁樞博學明悉舊典初陳武帝長女永嗣公主先適陳留太守錢蕆生子岊主及岊並卒於梁梁武帝時受命唯主追封至是將𦵏尚書請議加蕆駙馬都尉併贈岊官樞議曰昔王姬下嫁必適諸侯同姓為主聞於公羊之説車服不繫顯於詩人之篇漢氏初興列侯尚主自斯以後降嬪素族駙馬都尉置由漢武或以假諸功臣或以加於戚屬}
