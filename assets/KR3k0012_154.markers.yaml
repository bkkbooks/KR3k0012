  - {type: variant, offset: 314, length: 6, content: 留止臺內揔攝, SBCK: 封有以國名者鄎國代國霍國是也有以郡名者平陽宣陽東陽是也有以美名者太平樂安長寜是也唯􅀇宗之女皆以美名名之又曰髙祖平陽公主起義兵公主於鄠縣㽵散家資招引山中亡命得數百人以應髙祖略地至盩厔武功始平皆下之每申明法令禁兵士無得侵掠故逺近奔赴者甚衆得兵七萬人公主間使以聞使者至髙祖大恱及義軍渡河公主引精兵萬餘與太宗㑹於渭北與其駙馬柴紹各置幕府營中號爲娘子軍京城平封爲平陽公主以獨有功毎賞賜異於他主及薨謚曰昭又曰竇誕竇抗弟三子也尚髙祖女襄陽公主竇氏自武德至今再爲外戚尚主者八人女爲王妃}
