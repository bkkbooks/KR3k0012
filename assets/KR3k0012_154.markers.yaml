  - {type: variant, offset: 3029, length: 151, content: 大悅由是述漸見寵遇初晉王廣欲以主配其妃弟蕭瑒高祖初許之後遂適述晉王因不悅及述用事彌惡之高祖既崩述徙嶺表煬帝令主離絕將改嫁之公主以死自誓不復朝謁上表請免主號與述同徙帝大怒曰天下豈無男子欲與述同徙耶主曰先帝以妾適于柳家今有罪妾當從坐願陛下屈法申恩帝不從主憂而卒又曰南陽公主煬帝長女也美風儀有志節造次必以禮年, SBCK: 尤皎然太平御覽卷一百五}
