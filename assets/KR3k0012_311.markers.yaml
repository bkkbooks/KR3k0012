  - {type: variant, offset: 22, length: 33, content: 不拔齊騎奄至齊公憲率兵禦之乃有數人為敵所執已去陣二百餘步臺望見之憤, SBCK: 致死忿速昜}
  - {type: variant, offset: 22, length: 0, content: '', WYG: 還摩旌疾驅也摩近也樂伯曰吾聞致師者左射以菆代御執轡御下兩馬掉鞅而還攝叔曰吾聞致師者右入壘折馘執俘而還皆行其所聞而復晉人逐之左右角之樂伯左射馬而右射人角}
