  - {type: variant, offset: 889, length: 258, content: 是賞帛二千疋令自分之軍皆拜上州刺史以雍州歧州北雍州擬授勇等然州頗有優劣又令探籌取之勇遂得雍州文達得歧州令貴得北雍州仍賜勇名為勇令貴名豪文達名傑以彰其功又曰耿豪從太祖戰於邙山豪謂所部曰大丈夫見賊須右手拔刀左手把矟直斫慎莫皺眉畏死遂大呼獨入敵人鋒刃亂下當時咸謂豪歿俄然奮刃而還戰數合當豪前者死傷相繼又謂左右曰吾豈樂殺人但壯士除賊不得不尒若不能殺賊又不為人所傷何異逐坐人也太祖嘉之拜北雍州刺史隋書曰突厥入寇隋將楊素擊之先是諸將與虜戰每慮胡騎奔突皆戎車步騎相參舁鹿角為方陣騎在其內素謂之曰此乃自固之道非取勝之方也於是悉除舊法, SBCK: 野}
