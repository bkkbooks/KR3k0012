  - {type: variant, offset: 340, length: 0, content: '', WYG: 述果自出戰死城下又曰王覇討蘇茂賊聚衆挑戰覇堅守不出方饗士卒作樂茂矢射營中中覇前酒樽安坐不動軍吏皆曰茂前日已破今易擊也覇曰不然茂客兵逺來糧食不足故數挑戰以徼一切之勝徼要也一切猶權時也今閉營休士}
