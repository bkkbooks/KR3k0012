  - {type: variant, offset: 613, length: 1, content: 祏, WYG: 崔鴻十六國春秋曰姚襄據黄落前秦苻堅遣將苻黄眉鄧羗等率步騎討之襄深溝高壘固守不戰鄧羗説黄眉曰傷弓之鳥落於虛發襄頻為晉將桓温張平所敗鋭氣喪矣今固壘不戰自窮㓂也襄性剛狠易以剛動若長驅鼔行且壓其壘襄必忿而出師可以戰擒也黄眉從之遣羗率騎三千軍於襄壘襄果怒盡鋭出戰羗偽不勝引騎而退襄追}
  - {type: variant, offset: 615, length: 4, content: 弘農夜中, WYG: 平原羗廻騎拒襄俄而黄眉至大戰斬之盡俘其衆宋書曰沈攸之反自江西舉兵東下分兵出夏口據魯山攸之既至郢以郢城弱小不足攻宋郢州今江夏郡遣人告郢州守將柳世崇曰被太后令當蹔還都卿既相}
