  - {type: variant, offset: 88, length: 0, content: '', SBCK: 怒而可以復喜愠而可以復恱亡國不可以復存死者不可以復生主怒興伐人無素謀明計則破亡矣將愠怒而􅋐倉卒而合戰所傷殺必多怒愠復可以恱喜言亡國不可復存死不可復生言當湏憤之也故曰明王慎之良將儆之此安危之道也儆戒也左傳曰趙旃求卿未得且怒於失楚之致師者請挑戰弗許請召盟許之左傳曰楚許伯御樂伯攝叔爲右以致晉師許伯曰吾聞致師者御靡旍摩壘而還靡近也靡於馳也樂伯曰吾聞致師者代御執轡御下兩馬掉鞅而還叔曰吾聞致師者右入壘折馘馘断耳也執俘而還皆行所聞而復晉人逐之左右角之樂伯左射馬而右射人角不能進矢一而已麋興於前射麋麗􅀛戰國䇿曰魏武侯問呉起曰兩軍相常不知其將欲擊何如起曰令賤而勇者將而擊銳交合而北告而勿罰觀敵進取一來一起其政以理奔北不追見利不取此將有謀􅀂其衆追北旗幟雜亂自止自行或縱或横貪利務得凢􅀂此􅀋將令不行史記曰呉丗家曰夏呉伐越越王勾踐迎擊之雋李賈逵曰越地也越使死士挑戰三行造呉師自頸左傳曰使罪人三行屬劒亦頸呉師觀之因伐呉敗之姑􅂫}
