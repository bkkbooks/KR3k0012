  - {type: variant, offset: 3534, length: 0, content: '', SBCK: 􅁀用之則勝徐用之則敗可爲四衝陣以驍􅀐驚其親君左軍疾左右軍疾右中軍迭前迭後徃敵之空吾軍疾擊鼓而當之又曰敵踈其陣又逺其後跳我流矢以弱我弓弩勞我士卒爲之奈何太公曰發我銳士先擊其前車􅀐獵其左右引而分隊以隨其後三軍疾}
  - {type: variant, offset: 3534, length: 0, content: '', WYG: 暴用之則勝徐用之則敗可為四衝陣以驍騎驚其三軍左軍疾左右軍疾右中軍迭前迭後窺敵之空處吾軍疾擊鼔而當之又曰敵踈其陣又逺其後挑我以流矢以弱我弓弩勞我士卒為之奈何太公曰發我鋭士先擊其前軍騎列其左右引而分隊以隨其後三軍疾}
