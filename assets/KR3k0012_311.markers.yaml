  - {type: variant, offset: 1884, length: 294, content: 奄至城下時諸軍無備為賊所乘高祖親率十餘騎撗出擊之所射應弦而倒賊大潰逐北數十里伏屍相繼於道時高祖射七十發明日斬首築為京觀於屍上盡得所射箭其妙如此又曰至德中宜春郡太守劉秋子率士卒攻賊兵盡矢窮秋子張空拳大呼於軍前死戰而勝詔嘉其忠勇授淮陽太守又曰白孝德胡人也驍悍有膽力乾元中李光弼為偏禆史思明攻河陽使騎將劉龍仙率鐵騎五十臨河挑戰龍仙勇捷自恃舉右足加馬鬣上手運兩矢嫚罵光弼登城望之諸將皆侍顧曰孰可取者僕固懷恩前請行光弼曰此非大將所為歷選其次無可於是左右竊議曰孝德可光弼聞之乃招孝德前問可得乎孝德曰得光弼問所加幾何人而可曰獨往則可加人不可光弼曰壯哉終問所欲對曰願備五十騎於壁門候既入然後進及諸大軍鼓譟, SBCK: 稜僅}
