  - {type: variant, offset: 1862, length: 1, content: 為, WYG: 起師次霍邑隋將宋老生拒之上謂諸將曰老生若嬰城自守當即攻之主客勢懸卒難致力其計若何太宗進曰老生勇而無謀請以輕兵挑之必出戰則成擒矣從之太宗以數騎詣其城下舉鞭指麾若將圍城者老生果怒開門出兵太宗馳白高祖曰事諧矣高祖謂隴西公建成曰汝看兩陣將交引左軍直趨東門命太宗引右軍直趨南門以斷其歸路老生之軍背城而陣高祖以中軍與建成合陣于城東太宗及柴紹陣於城南老生麾兵進先薄髙祖而建成墜馬老生乗之中軍與左軍咸却太宗自南原遥見塵起知義師退率二百騎馳下峻坂殺一賊將遂横斷其軍出于陣後表裏齊譟響若崩}
