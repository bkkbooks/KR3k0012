  - {type: variant, offset: 335, length: 0, content: '', SBCK: 怒自􅀍甲挑戰樓煩欲射羽嗔目叱之樓煩目不能視手不能發走還入壁不敢復出漢王使問之廼羽漢王大驚又曰楚漢相持彭城數絶楚粮道項羽欲討越謂其將曹咎曰謹守成臯即漢欲挑戰愼勿與戰無令得東我十五日必誅彭越定梁地漢果數挑戰楚}
