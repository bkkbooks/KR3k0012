  - {type: variant, offset: 3030, length: 433, content: 守到官遣使迎母及妻子垂當到郡道經柳城值鮮卑萬餘人入塞寇鈔苞母及妻子遂為所劫質載以劫郡苞率步騎二萬與賊對陣賊出母以視苞苞悲號謂母曰為子無狀欲與微祿奉養朝夕不圖為母作禍昔為母子今為人臣義不得顧私恩毀忠節唯當萬死無以塞罪母遙謂曰威豪人各有命何得相顧以虧忠義尒其勉之苞即時進戰敗之其母妻皆為所害東觀漢記曰孔奮為武都郡丞時在郡為隗囂餘黨所攻殺太守得奮妻子奮追賊賊推奮妻子於軍前奮年五十唯有一子不顧遂擒賊而其子見屠帝嘉其忠遷武都太守九州春秋曰初清河李雍以鄃叛袁紹而降公孫瓚遣兵衛之紹遣朱靈攻之靈家在城中瓚以靈母弟置城上誘呼靈靈望城上泣曰丈夫一出身與人豈復顧家耶戰遂拔之生擒雍而靈家皆死靈字文愽蜀志曰姜維與母相失孫盛雜記曰姜維得母書并求當歸維曰良田百頃不在一畝但有遠志不見當歸續帝王世紀曰晉師度峴慕容超使拒之聞晉兵盛自將四萬繼之及晉人戰於臨昭燕兵大敗超單馬奔入城八月將封融自河北奔晉師使詔誘城內超怒縛其母懸諸城上融曰姜維有言良田百頃不在一畝梁書曰羊侃長子鷟為侯景所獲執來城下示侃侃, SBCK: 宗}
