  - {type: variant, offset: 3575, length: 2, content: 流矢, WYG: 車五乗之兵而把梁華周獨不與焉故歸而不食其母曰食汝生而無義死而無名則雖非五乗孰不汝笑也生而有義死而有名則五乗之兵盡汝下也趣食乃行杞梁華周同車侍莊公而行至莒莒人逆之把梁華周下鬬獲甲首三莊公止之曰子止與子同齊國杞梁華周曰君為五乗之兵而周梁不與焉是少吾勇也臨敵涉難止我以利是惡吾行也深入多殺者臣之事也齊國之利非吾}
