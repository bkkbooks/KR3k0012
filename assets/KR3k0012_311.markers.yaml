  - {type: variant, offset: 1577, length: 1, content: 被, SBCK: 賊甚盛髙祖將挑戰茂固止不得因捉馬鞚髙祖忿之抜刀斫其額流血􅀍面詞氣不撓髙祖感而謝之厚加禮敬又曰竇榮定之擊突厥也史萬􅀊詣轅門請自効榮定素聞其名見而大恱因遣人謂突厥曰士卒何罪過令殺之但當各遣一壯士決勝􅀒耳突厥許諾因遣一􅀐挑戰滎定遣萬􅀊出應之萬􅀊馳斬其首而還突厥大驚不敢復戰遂引軍而去唐書曰髙祖􅀄起師次霍邑隋將宋老生拒之上謂諸將曰老生􅀂嬰城自守當即攻之主客勢懸卒難致力其計􅀂何太宗進曰老生勇而無謀請以輕兵挑之必出戰則成擒矣從之太宗以數􅀐詣其城下舉鞭指麾􅀂將}
  - {type: page-break, offset: 1577, content: '', id: KR3k0012_SBCK_311-5a}
  - {type: variant, offset: 1577, length: 0, content: '', WYG: 賊甚盛高祖將挑戰茂固止不得因捉馬鞚高祖忿之㧞刀斫其額流血}
  - {type: variant, offset: 1577, length: 1, content: 被, krp: 賊甚盛髙祖將挑戰茂固止不得因捉馬鞚髙祖忿之抜刀斫其額流血𬒳面詞氣不撓髙祖感而謝之厚加禮敬又曰竇榮定之擊突厥也史萬歲詣轅門請自効榮定素聞其名見而大恱因遣人謂突厥曰士卒何罪過令殺之但當各遣一壯士決勝負耳突厥許諾因遣一騎挑戰滎定遣萬歲出應之萬歲馳斬其首而還突厥大驚不敢復戰遂引軍而去唐書曰髙祖𥘉起師次霍邑隋將宋老生拒之上謂諸將曰老生若嬰城自守當即攻之主客勢懸卒難致力其計若何太宗進曰老生勇而無謀請以輕兵挑之必出戰則成擒矣從之太宗以數騎詣其城下舉鞭指麾若將}
  - {type: variant, offset: 1578, length: 30, content: 圍百餘重襲慶力戰矢盡短兵相接殺傷甚眾於是刀矟皆折脫冑擲地向賊, WYG: 面詞氣不撓高祖感而謝之厚加禮敬又曰竇榮定之擊突厥也史萬嵗詣轅門請自効榮定素聞其名見而}
  - {type: variant, offset: 1579, length: 0, content: '', SBCK: 城者老生果怒開門出兵太宗馳白髙祖曰事諧矣髙祖因謂隴西公建成曰汝看兩陣將交引左軍直趨東門命太宗引右軍直趨南門以斷其歸路老生之軍背城而陣髙祖以中軍與建成合陣於城東太宗及柴紹陣於城南老生麾兵疾進先薄髙祖而建成墜馬老生乗之中軍與左軍咸却太宗自南原遥見塵起知義師退率二}
  - {type: variant, offset: 1579, length: 0, content: '', krp: 城者老生果怒開門出兵太宗馳白髙祖曰事諧矣髙祖因謂隴西公建成曰汝看兩陣將交引左軍直趨東門命太宗引右軍直趨南門以斷其歸路老生之軍背城而陣髙祖以中軍與建成合陣於城東太宗及柴紹陣於城南老生麾兵疾進先薄髙祖而建成墜馬老生乗之中軍與左軍咸却太宗自南原遥見塵起知義師退率二}
  - {type: variant, offset: 1580, length: 0, content: '', SBCK: 􅀐馳下峻坂殺一賊將遂衡斷其軍出于陣後表裏齊譟響􅀂崩山隋師大潰各捨杖而走懸門發老生不得入城乃棄馬投壍甲士斬之致其首於麾下流血數里僵死屍相枕四面乗勝進薄其城時無攻具士卒縁矟而上一時攀堞無敢當者遂平霍邑撫其}
  - {type: page-break, offset: 1580, content: '', id: KR3k0012_SBCK_311-5b}
  - {type: variant, offset: 1580, length: 0, content: '', krp: 騎馳下峻坂殺一賊將遂衡斷其軍出于陣後表裏齊譟響若崩山隋師大潰各捨杖而走懸門發老生不得入城乃棄馬投壍甲士斬之致其首於麾下流血數里僵死屍相枕四面乗勝進薄其城時無攻具士卒縁矟而上一時攀堞無敢當者遂平霍邑撫其}
  - {type: variant, offset: 1581, length: 39, content: 重襲慶力戰矢盡短兵相接殺傷甚眾於是刀矟皆折脫冑擲地向賊大罵曰何不來斫頭也賊遂殺, SBCK: 衆而用}
