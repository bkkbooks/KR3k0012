  - {type: variant, offset: 1085, length: 480, content: 突厥入寇隋將楊素擊之先是諸將與虜戰每慮胡騎奔突皆戎車步騎相參舁鹿角為方陣騎在其內素謂之曰此乃自固之道非取勝之方也於是悉除舊法令諸軍為騎陣突厥達頭可汗聞之大喜率精騎十餘萬而至素奮擊大破之素多權略乘機赴敵應變無方然大抵馭戎嚴整有犯軍令者立斬之無所寬貸每將臨寇求人過失而斬人多者萬餘人少不下千數流血盈前言笑自若及其對陣先令三百人赴敵陷陣則已如不能陷陣而還者無問多少悉斬之又令二三百人復進還如向法將士股慄有必死之心由是戰無不勝時稱名將又曰張須陁將兵拒東郡賊翟讓前後三十餘戰每破走之轉滎陽守時李密說讓取洛口倉讓憚須陁不敢進密勸之讓遂與密率兵逼滎陽須陁拒之讓懼而退須陁乘之逐北十餘里時李密先伏數千人於林木間邀擊須陁軍遂敗績密與讓合軍圍之須陁潰圍輒出左右不能盡出復躍馬入救之往來數四眾皆散乃仰天曰兵敗如此何面見天子乎乃下馬戰死時年五十二其所部兵晝夜號泣數日不止又曰麥鐵杖遼東之役將渡遼謂其三子曰阿奴當備淺色黃衫吾荷國恩今是死日我既被殺爾當富貴唯誠與孝爾其勉之及濟橋未成去東岸尚數丈賊大至鐵杖跳上岸與賊戰死武賁郎將錢士雄孟金又亦死之左右更無及者帝為之流涕購得其屍又曰權襲慶仕周, WYG: 陳茂}
