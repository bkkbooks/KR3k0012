  - {type: variant, offset: 3593, length: 3, content: 被瘡深, SBCK: 攻狄必不能下矣單曰單以破亡餘卒破萬乗之燕今攻狄而不能下何也上車不謝而去遂攻狄三月不克齊嬰兒謡曰大冠􅀂箕修劒柱歸單乃懼問仲連子對曰將軍在即墨之時坐即織簣立即杖挿爲士卒唱當此之時將軍有死之心而士卒無生之氣聞是言莫不掩泣􅁬臂而欲戰此所以破燕也當今將軍東有掖邑之封西有淄上之寳足以樂生而惡死此以不勝也田單明日結髮勵氣立於矢石間引抱而鼓之狄人乃下漢書曰御史大夫韓安國曰魏其言灌夫父死事荷㦸駈不測之呉軍身􅀍數十創名冠三軍此天下壯士也非有大惡爭杯酒不足引他過以誅之後漢書曰劉伯升起兵光武守昆陽莽將王㝷王邑來討兵號百萬先至昆陽巳十萬圍數}
