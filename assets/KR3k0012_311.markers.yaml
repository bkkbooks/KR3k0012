  - {type: variant, offset: 3571, length: 6, content: 濡須口為流矢, SBCK: 髙國髙氏國氏齊貴族也無存欲必有功還取卿相之女也先登求自門出死於霤下旣入城夷儀人不服故闘死於門屋霤下也齊侯克夷儀謂夷儀人曰得敝無存者以五家免給五家不使役乃得其尸公三禭之禭衣也比殯加禭深厚禮之也與之犀軒直盖犀軒卿車直盖髙盖也親推之三齊候自推喪車輪三轉也國語曰齊莊公且伐莒爲車五乗之賔而􅂎梁華舟獨不與焉故歸而不食其母曰汝生而無義死而無名則雖非五乗孰不汝􅀏也生而有義死而有名則五乗之賔盡汝下也趣食乃行􅂎梁華舟同車侍於莊公而行至莒莒人逆之􅂎梁華舟下闘獲甲首三莊公止之曰子止與子同齊國􅂎梁華舟曰君爲五乗之賔而舟梁不與焉是少吾勇也臨敵渉難止我以利是惡吾行也深入多殺者臣之事也齊國之利非吾}
  - {type: page-break, offset: 3571, content: '', id: KR3k0012_SBCK_311-7a}
  - {type: variant, offset: 3571, length: 3, content: 濡須口, WYG: 高國髙氏國氏齊貴族也無存欲必有功還取卿相之女先登求自門出死於霤下既入城夷儀人不服故鬬死于門屋霤下也齊侯克夷儀謂夷儀人曰得敝無存者以五家免給五家不使役乃得其尸公三襚之襚衣也比殯三加襚深禮厚之與之犀軒直蓋犀軒軒車直蓋高蓋也親推之三齊侯自推車三轉也國語曰齊莊公且伐莒}
