  - {type: variant, offset: 3555, length: 0, content: '', SBCK: 故雖傷而擊鼓不息也曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之丘緩曰自始合苟有險余必下推車子豈識之然子病矣以其不識巳推車也張曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事殿鎭也集成也􅀂之何以病敗君之大事也擐甲執兵固即死也擐貫即就也擐}
