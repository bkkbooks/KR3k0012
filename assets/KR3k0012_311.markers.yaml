  - {type: variant, offset: 2179, length: 691, content: 借威他無所用光弼撫其背以遣孝德挾二矛策馬截流而渡半濟而懷恩賀曰克矣光弼曰未及何知其克懷恩曰觀其攬跂便辟可萬全者龍仙始見其獨來甚易之足不降鬣稍近將動孝德搖手示之若使其不動然龍仙不測又止孝德呼太尉使予致辭非他龍仙去三十步與之言褻罵如初孝德息馬伺便久之因瞋目曰賊識我乎龍仙曰誰曰我國之大將白孝德龍仙曰是豬狗乎孝德發聲虓然執矛突前城上萬鼓齊噪五十騎以繼進龍仙矢不及發環走堤上孝德以疋馬逐之胡騎五十皆披靡若猛犬之獵群狐也遂斬之提首而歸又曰王難得試衛尉卿至鳳翔為都知兵馬使兼興平軍事嘗有禆將靳元矅當合戰墮馬呼難得難得俯馬救之賊射難得中眉皮穿下蔽目難得乃拔去箭并皮掣棄之勇冠三軍由是士眾多附之五代周史曰王殷遷奉國右廂都指揮使漢祖受命從征杜重威於鄴下殷與劉詞皆率先力戰矢中於首久之出折鏃於口中以是漢祖嘉之三國典略曰茹茹寇肆齊王自晉陽討之虜騎散走大軍遂還齊主率二千餘騎為殿夜宿黃爪堆茹茹別部數萬騎扣鞍而進四面圍逼麾下齊主安臥平明方起神色自若指畫軍形潰圍而出虜騎追擊之伏尸二十里獲奄羅辰妻子生口三萬餘令都督高阿那肱率騎數千塞其走道那肱以兵少請益齊主更減其半那肱騎奮擊亦大剋捷戰不顧親史記曰項王為高俎置太公其上告漢王曰今不急下吾烹太公漢王曰吾與項羽俱北面受懷王約為兄弟吾翁即迺翁必欲烹而翁即幸分我一杯羹項王怒欲烹之項伯曰天下事未可知且為天下者不顧家雖殺之無益祗益禍耳項王從之後漢書曰邳彤字偉君世祖拜為後將軍常從戰攻信都復反為王郎所置信都王捕擊彤父弟及妻子使為手書呼彤曰降者封爵不降者族滅彤涕泣報曰事君者不得顧家彤親屬所以至今得安於信都者劉公之恩公方爭國事彤不得復念私也會更始所遣將攻拔信都王郎兵敗走彤家得, SBCK: 身}
