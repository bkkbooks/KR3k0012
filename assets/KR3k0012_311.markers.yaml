  - {type: variant, offset: 10, length: 1, content: 梁, SBCK: 王}
  - {type: variant, offset: 10, length: 2, content: 梁臺, WYG: 曰王覇傳軍中壯士路潤等數十人斷髪請戰挑戰孫子曰忿速可侮急疾之人可忿而致死忿速易動者主不可以怒而興軍不可以愠而致戰合於利而用不合於利而止人主聚衆興師以道理勝負之計不可以己之私舉兵則以策不可以己之愠故合利而戰也怒而可以復喜愠而可以復悅亡國不可以復存死者不可以復生主怒興兵人無素謀成計則破亡可危主愠而動倉卒而合戰所傷者必多怒愠復可以悅喜而亡國不可復存死不可復生言當須慎之也故曰明王儆之良將慎之此安危之道也儆戒也左}
