  - {type: variant, offset: 6, length: 1, content: 下, SBCK: 不克請再再不克請三三不克請四四不克請五五不克舉國而授於是而與之盟史記楚丗家曰六年􅁗使白起伐韓於伊闕大勝斬首三十四萬秦乃與楚王書曰楚倍􅁗􅁗且率諸侯伐爭一旦之命願王之飭士卒得一樂戰楚頃襄王患之乃謀與秦平}
  - {type: variant, offset: 6, length: 1, content: 下, WYG: 不剋請再再不剋請三三不剋請四四不剋請五五不剋舉國而授於是而與之盟史記楚世家曰六年秦使白起伐韓於伊闕大勝斬首二十四萬秦乃遺楚王書曰楚倍秦秦且率諸侯伐楚一旦之命願王之飭士卒得一樂戰楚頃襄王患之乃謀與秦平}
