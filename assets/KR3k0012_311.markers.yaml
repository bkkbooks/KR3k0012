  - {type: variant, offset: 196, length: 129, content: 敵人見之皆曰避此小兒太祖初亦聞摽驍悍未見其能至是方嗟歎之謂摽曰但使膽決如此何必要須八尺之軀也又曰賀若敦太祖時群盜鋒起各據山谷大龜山賊張世顯潛來襲統敦挺身赴戰手斬七八賊乃退走父統大悅謂左右僚屬曰我少從軍旅戰陣非一如此兒年時膽略者未見其人非唯成我門戶亦當為國名將, SBCK: 吾指}
