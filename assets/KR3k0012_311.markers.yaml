  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_311-1a, image: WYG0895/WYG0895-0684a.png}
  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第三百一十一}
  body:
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 二請戰挑戰决戰上請戰左傳曰帥師以來固敵是永敵至不擊將何俟矣又曰晉師至于靡笄之下齊侯使請戰又曰子玉使伯棼請戰曰非敢必有功也願以間執䜛慝之口又曰􅀳侯逆􅁗師使韓簡視師韓簡晉大夫韓萬之孫復曰師少於我闘士倍於我公曰何故對曰出因其資請奔梁求秦也入用其寵爲秦所納飢食其粟三施而無報是以來也今又擊之我怠􅁗奮倍猶未也公曰一夫不可狃況國乎狃忲也言避􅁗則使忲來遂使請戰曰寡人不侫能合其衆而不能離也君􅀂不還無所逃命􅁗伯使公孫枝對曰君之未入寡人懼之入而未定列猶吾憂也苟列定矣敢不承命又曰子玉使􅋐勃請戰曰請與君之士戯君慿軾而觀之得臣與寓目焉晉侯使欒枝對曰煩夫子謂二三子戒爾車乗敬爾軍事詰朝將見榖梁曰請}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_311-1b}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 二請戰挑戰决戰上請戰左傳曰帥師以來固敵是求敵至不擊將何俟矣又曰晉師至于磨筓之下齊侯使請戰又曰子玊使伯棼請戰曰非敢必有功也願以間執䜛慝之口又曰晉侯逆秦師使韓簡視師韓簡晉大夫韓萬之孫復曰師少於我鬭士倍於我公曰何故對曰出因其資謂奔梁求秦入用其寵為秦所納饑食其粟三施而無報是以來也今又擊之我怠秦奮倍猶未也公曰一夫不可狃况國乎杜註狃􅏸也言辟秦則使􅏸來遂使請戰曰寡人不佞能合其衆而不能離也君若不還無所逃命秦伯使公孫枝對曰君之未入寡人懼之入而未定列猶吾憂也苟列定矣敢不承命又曰子玉使鬭勃請戰曰請與君之士戲君憑軾而觀之得臣與寓目焉晉侯使欒枝對曰敢煩大夫謂二三子戒爾車乗敬爾君事詰朝將見榖梁曰請}
