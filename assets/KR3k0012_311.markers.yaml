  - {type: variant, offset: 23, length: 11, content: 拔齊騎奄至齊公憲率兵禦, WYG: 能進矢一而已麋興于前射麋麗龜戰國䇿曰魏武侯問吳起曰兩君相當不知其將若何起曰令賤而勇者將而擊鋭交而自北告而勿罰觀敵進取一來一起其政以理奔北不追見利不取此將有謀若其衆追北其幟雜亂自止自行或縱或横貪利務得凡若此類將令不行史記吳世家曰夏吳伐越越王勾踐迎擊}
