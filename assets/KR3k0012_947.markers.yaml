  - {type: variant, offset: 426, length: 548, content: 交州丹水亭下有石穴甚深未嘗測其遠近穴中蝙蝠大者如烏多倒懸得而服之使人神仙荊州記曰宜都夷道縣有石穴穴中有蝙蝠如烏多倒懸崔豹古今注曰蝙蝠一名仙鼠又曰飛鼠五百歲則色白腦重集物則頭垂故謂為倒挂鼠食之得仙幽明錄曰淮南郡有物髡人髮太守朱誕曰吾知之矣多置黐音離以塗璧夕有數蝙蝠大如雞集其上不得去殺之乃絕屋簷下已有數百人頭髻范汪治瘧方曰蝙蝠七枚合擣五百發雞鳴服一丸禺中一丸遇發乃與粥清一升耳守宮毛詩節正月曰哀今之人胡為虺蝪蝪螈也虺蝪之性見人則走陸機毛詩䟽義曰蝪一名榮原水蜴也或謂之䗂蜼音濉虵醫如蜥蜴青綠色大如指形狀可惡也春秋考異郵曰土勝水故守宮食蠆宋均曰守宮生於土蠆藏物屬坎水也爾雅曰蠑螈蜥蜴蜥蝪蝘蜓蝘蜓守宮也轉相解博異語別四名也漢書東方朔傳曰武帝置守宮盆下使射之朔曰臣以為龍又無角謂之為虵又有足跂跂脈脈善緣壁若非守宮即蜥蝪上曰善賜帛十匹抱朴子曰謂蜥蝪為神龍者非但不識神龍亦不識蜥蝪又曰沙礫無量而珠壁甚尠鴟隼屯飛而鸞鳳罕出虺蜥盈藪而虬龍希覿王充論衡曰禹南濟於江黃龍負舟舟中人人五色無主禹乃笑而稱曰我受命於天竭力以勞萬民生寄也死歸也視龍猶蝘蜓也龍去而亡患揚雄方言曰秦晉西夏謂之守宮其在澤者謂之蜥蝪南楚謂之虵毉或謂之蠑螈北燕謂之祝蜓桂林之中守宮大能鳴者謂之蛤蟹許慎說文曰榮蚖虵毉以注鳴者也在壁曰蝘蜓在草曰蜥蝪蜥蝪守宮, SBCK: 螾蚯蚓}
