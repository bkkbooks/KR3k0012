  - {type: variant, offset: 2995, length: 2, content: 皮可, SBCK: 大􅀂蜂動逾萬計乃掘及泉因得此石張茂先􅀶物志曰蟻知􅀅􅀨伏侯古仐注曰漢光武建武元年山陽有小蟲􅀋人形甚衆明日皆懸樹枝而死乃大蟻也崔豹古今注曰牛亨問蟻曰􅀇駒何也荅曰河内人無何而見有人馬數千萬騎皆大如􅁰米旋動徃來從朝至暮家人}
