  - {type: variant, offset: 1425, length: 2, content: 蜣蜋, WYG: 唐景龍文館記曰上已日上幸於渭濵宴侍臣其日賜侍臣等柳棬各一云帶之寛躉毒辟濕氣干寳捜神記曰安陽城南有亭宿者輒死有書生入亭宿明掘得蠍大如琵琶毒長數尺亭遂安静葛洪方曰蠍中國最多江東即無也稽含遇蠆賦曰元康二年余中夜遇躉客有戲余曰俗語云過滿百為躉所螫斯言信哉雖内省不疚而逢此害喟然而嘆遂作賦蟻焦贛易林震之蹇曰蟻封戸穴大雨將集又復之萃曰蚍蜉戴粒不能上山却推跌蹶損傷其顔韓詩外傳曰夫吞舟之魚大矣蕩而失水則為蟻所制大戴禮曰十二月𤣥駒賁蟻也賁者走於地中也周官曰饋食之豆蜃蚳醢􅜹蛤也蚳蟻之子也禮記檀弓曰子張喪公明儀為志焉禇幕丹質蟻結於四隅鄭𤣥曰畫禇之四角其文如蟻行往來相交錯也蟻蚍蜉也殷之蟻結似今之虵文􅀞也又内則曰蚳醢蚳蚍蜉子也又學記曰蛾子時術之其此之謂乎蛾蚍蜉也蚍蜉之子微虫耳時術蚍蜉之所為其功乃復成大垤也}
