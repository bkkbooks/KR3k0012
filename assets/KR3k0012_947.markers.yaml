  - {type: variant, offset: 1468, length: 0, content: '', WYG: 䗂蝓山海經曰清安之山北望河曲是多倮纍郭璞曰倮纍蝸牛也陶洪景集註本草經曰䗂蝓味鹹寒無毒一名陵蠡一名土蝸一名附蝸生泰山池澤生隂地沙中垣下䗂蝓入三十六禽限又是四種角蟲之類營室星之精蠍毛詩魚藻彼都人士曰彼君子女卷髪如蠆毛詩義疏曰蠆一名杜伯河内謂之蚊幽州謂之蠍左傳僖公上臧文仲曰䗬蠆有毒而况國乎又昭公二年鄭人謗子産曰其父死於路已為蠆尾大戴禮曰神人國有蜂蠆不螫嬰兒張揖廣雅曰杜伯蠧蠆蠍也説文曰蠍毒蟲也魏志曰彭城夫人夜之厠蠆螫其手呻呼無賴華佗令温湯近熱漬手其中卒可得寢但旁人數為易湯令煖其日即愈北史曰齊後主詔鏁南陽王綽赴行在所至宥之問在其州何者最樂對曰多取蠍令咀人㸔時極樂後主即夜索蠍一斗比曉得二三升置諸浴斛使人祼卧斛中號呌宛轉帝與綽臨觀喜噱不已謂綽曰如此樂事何不早馳驛奏聞綽由是大為後主所寵鼇潛未出羣蟻將反遇長風激浪崇濤萬仭海中沸地雷震羣蟻曰此鼇之將作也數日風止雷黙海中隱如岳羣蟻曰彼之冠山何異我之戴粒逍遥封壤之巔伏乎窟穴也山海經曰朱蟻其狀如蟻郭璞曰蟻蚍蜉在崑崙之墟京房易妖占曰蟻無故當道若門户城郭聚土水且傷人揚雄方言曰蚍蜉齊魯之間謂之蚼蟓音駒養西南梁益之間謂之𤣥駒燕謂之蛾􅀈楚郢以南蟻土謂之封王充論衡曰人坐樓臺之上察地之螻蟻尚不見其體安能聞其聲何則螻蟻之體不若人形夫聲音非氣不能達也今}
