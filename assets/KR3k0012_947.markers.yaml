  - {type: variant, offset: 1398, length: 1, content: 揚, WYG: 曰千里之堤以螻蟻之穴漏而百尋之屋以突隙之標焚抱朴}
  - {type: variant, offset: 1400, length: 0, content: '', WYG: 曰雞有專距之雄蟻有兼弱之志蜂有攻寡之計人相役御亦猶是耳又曰周髀家云天圓如張葢地方如棊局天旁轉如推磨而左行日月右行隨而左轉如推於磨蟻行磨上磨左旋而蟻右去磨疾而蟻遲故不得不隨磨以左迴焉又曰百尋之山焚於分寸之颷千丈之陂潰於一蟻之穴符子曰東海有鰲焉冠蓬萊而浮游於滄海騰躍而上則干}
