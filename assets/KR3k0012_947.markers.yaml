  - {type: variant, offset: 1232, length: 2, content: 守宮, SBCK: 劉德願兄子太宰從事中郎道存景和元年五月忽有白蚓數十登其齋前砌上通身白色人所未甞見也蚓並張口吐舌大赤色其年八月與德願並誅劉敬叔異苑曰孟州王􅀟宋文帝元嘉􅀄忽不欲見明常取水沃地以菰􅃽覆上眠息飲食悉入中云有女着青裙白領巾來就其􅃦母聽聞薦下歴歴有声發之見}
