  - {type: variant, offset: 204, length: 122, content: 舂箕角長青色斑黑其股似瑇瑁文五月中以兩股相瑳作聲聞數十步毛詩題網曰螽斯名蜙蝑一名舂黍似蝗而小青色長股而鳴喻后妃之性不妒忌子孫眾多爾雅曰蜇音斯螽蜙蝑郭璞注曰蜙䗥也俗呼𧐍𧑓蝙蝠春秋運斗樞曰搖光攜則服翼兩頭並翔廢江淮山瀆之祠搖光不明服翼九足服翼附鼠也, SBCK: 日蚯蚓結}
