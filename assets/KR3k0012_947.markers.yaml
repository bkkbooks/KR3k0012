  - {type: variant, offset: 1395, length: 1, content: 山, SBCK: 土}
  - {type: variant, offset: 1395, length: 0, content: '', WYG: 土龍生􅀢谷平土白頸者是其老大耳䗂蝓尚書大𫝊曰鉅定螺鄭𤣥曰鉅定澤也今屬樂安故有則屬齊螺蝸牛也禮記曰蝸醢而苽食後漢書曰鉅鹿張角賊起皆着黄巾為標幟時人謂之黄巾亦名為蛾賊蛾音魚綺切即蟻字論賊衆多故以為名張勃呉録曰九真移風縣有土赤如膠人視土知有蟻因墾發以木枝挿其中則蟻緣而生漆堅凝如螳蜋子螵蛸也折漆以其色正赤所作赤絮則此膠也孟堅曰羊肉不慕蟻蟻慕羊肉羶也莊子曰函牛之鼎沸蟻不得措一足焉喻聖主之法明奸邪不敢蹈之又曰東郭子問莊子曰道安在莊子曰道在螻蟻又曰吞舟之魚蕩而失水則螻蟻能苦之孫鄉子曰不食者蟻不飲者蜉蝣韓子曰桓公伐孤竹行}
