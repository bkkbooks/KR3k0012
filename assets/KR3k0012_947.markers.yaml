  - {type: variant, offset: 1396, length: 1, content: 龍, WYG: 中無水隰朋曰蟻冬居山陽夏居山隂蟻壤寸而有水乃掘遂有水又曰千丈之堤以螻蟻之穴而潰又曰以骨去蟻蟻愈多以肉驅蠅蠅愈至吕氏春秋曰吞舟之魚陸處不勝螻蟻淮南}
