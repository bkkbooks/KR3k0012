  - {type: variant, offset: 1468, length: 4, content: 天柱衝波, krp: 螔蝓山海經曰清要之山北望河曲是多倮纍郭璞曰倮纍蝸牛也陶洪景集注夲草經曰螔蝓味鹹寒無毒一名陵蠡一名土蝸一名附蝸生泰仙池澤生隂地沙石垣下螔蝓入三十六禽限又是四種角之例營室之精矣蠍毛詩魚藻彼都人士曰彼君子女卷髪如蠆毛詩義䟽曰蠆一名杜伯河内謂之蚊幽州謂之蠍左傳僖二臧文仲曰䗬蠆有毒而况國乎又昭二曰鄭人謗子産曰其父死於路巳爲蠆尾大戴禮曰神人國有蜂蠆不螫嬰兒張揖廣雅曰杜伯蠧蠆蠍也說文曰蠆毒蟲也魏志曰彭城夫人夜之厠蠆螫其手呻呼無頼華佗令温湯近熱漬手其中卒可得寢但旁人數爲昜湯令煖其日即愈北史曰齊後主詔鏁南陽王綽赴行在所至而宥之問在州何者最樂對曰多取蠍将咀漢看時極樂後主即夜索蠍一斗比暁得二三升置諸浴斛使人祼卧斛中號叫宛轉帝與綽臨觀喜噱不巳謂綽曰如此樂事何不早馳驛奏聞綽由是大爲後主寵唐史曰劒南夲無蠍甞有人任主簿将之至今呼爲主簿蟲荘子曰老聃曰三皇之知上悖日月之明下暌山川之精中隳四時之施其智􅉃音慘於蠆蠍之尾而猶自以爲聖人不可恥乎唐景龍文館記曰上巳日上幸於渭濵宴侍臣其日賜侍臣等栁棬各一云帶之免蠆毒辟温氣于寳搜神記曰安陽城南有亭宿者輙死有書生入亭宿明掘得蠍大如琵琶毒長數尺亭遂安静葛洪方曰蠍中國屋中多江東即無也稽含遇蠆賦序曰元康二年余中夜遇蠆客有戲余曰俗諺云過满百爲蠆所螫斯言信哉雖内省不疚而逢此害喟然而歎遂作賦蟻焦贛易林震之蹇曰蟻封户穴大雨将集又復之萃曰蜱蜉戴怨不能上山却推趹蹶損傷其顔韓詩外}
  - {type: variant, offset: 1469, length: 4, content: 柱衝波傳, WYG: 之崇髙非直樓臺人體比於天非若螻蟻於人也謂天聞人之言隨善惡為吉凶誤矣揚子法言}
