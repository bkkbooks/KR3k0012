  - {type: variant, offset: 1485, length: 4, content: 玄蟬潔飢, SBCK: 雞有專栖之雄雉有擅澤之鷮音嬌蟻有兼弱之智蜂有攻寡之計人相役御亦猶是耳又曰周髀家云天圎如張蓋地方如棊局而旁轉如推磨左行日月右行隨而左轉如推於磨蟻行磨石之上磨左旋而蟻右去磨疾而蟻遲故}
  - {type: variant, offset: 1485, length: 10, content: 玄蟬潔飢不羨蜣蜋穢飽, WYG: 臣進退惟谷}
  - {type: variant, offset: 1485, length: 0, content: '', krp: 雞有專栖之雄雉有擅澤之鷮音嬌蟻有兼弱之智蜂有攻寡之計人相役御亦猶是耳又曰周髀家云天圎如張蓋地方如棊局而旁轉如推磨左行日月右行隨而左轉如推於磨蟻行磨石之上磨左旋而蟻右去磨疾而蟻遲故不得不隨磨以左迴焉又曰百㝷之山焚於分寸之飈千丈之陂潰於一蟻之穴符子曰東海有鼇焉冠蓬萊而浮游於凔海騰躍而上則千雲之峯類邁於羣岳沉没而下則隠天之丘潜嶠於重川有蚳蟻聞而恱之與羣蟻相要乎海畔欲觀鼇焉月餘日鼇潜未岀羣蟻将反遇長風激浪崇濤萬仭海水沸地雷震羣蟻曰此将鼇之作也數日風止雷黙海中隠如岳羣蟻曰彼之冠山何異我之戴粒逍遥封壤之巔伏乎窟穴也山海經曰朱蟻其狀如蟻郭璞曰蟻蚍蜉在崐崘之墟京房易妖占曰蟻無故當道若門户城郭聚土水且傷人揚雄方言曰蚍蜉齊魯之間謂蚼蟓音䮀養西南梁益之間謂之}
  - {type: variant, offset: 1486, length: 3, content: 蟬潔飢, krp: 駒燕謂之蛾咩楚郢以南蟻土謂之封王充論衡曰人坐樓臺之上察地之螻蟻尚}
  - {type: punctuation, offset: 1489, content: ，, id: KR3k0012_CHANT_947-bkkpn562}
  - {type: 'tls:seg', offset: 1489, content: '', id: KR3k0012_CHANT_947-29a.6}
  - {type: variant, offset: 1490, length: 5, content: 羨蜣蜋穢飽, SBCK: 得不隨磨以左迴焉又曰百㝷之山焚於分寸之飈千丈之陂潰於一蟻之穴符子曰東海有鼇焉冠蓬萊而浮游於凔海騰躍而上則千雲之峯􅀋邁於羣岳沉没而下則隠天之丘潜嶠於重川有蚳蟻聞而恱之與羣蟻相要乎海畔欲觀鼇焉月餘日鼇潜未岀羣蟻􅀅反遇長風激浪崇濤萬仭海水沸地雷震羣蟻曰此􅀅鼇之作也數日風止雷黙海中隠如岳羣蟻曰彼之冠山何異我之戴粒逍遥封壤之巔伏乎窟穴也山海經曰朱蟻其狀如蟻郭璞曰蟻蚍蜉在崐崘之􅇕京房易妖占曰蟻無故當道􅀂門户城郭聚土水且傷人􅀭雄方言曰蚍蜉齊魯之間謂蚼蟓音䮀養西南梁益之間謂之􅀇駒燕謂之蛾咩楚郢以南蟻土謂之封王充論衡曰人坐樓臺之上察地之螻蟻尚不見其體安能聞其聲何則螻蟻之體細不􅀂人形夫聲音孔氣不能逹也今天之崇髙非直樓臺人體比於天非􅀂螻蟻於人也謂天聞人之言隨善惡爲􅁻凶誤矣揚子法言曰食如蟻衣如華不以泰乎劉義慶丗􅀃曰殷仲堪父病虚悸聞牀下蟻動云是牛􅃲孝武不知殷父問有一殷病如此不仲堪流涕而起曰臣進退惟谷}
