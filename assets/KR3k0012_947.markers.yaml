  - {type: variant, offset: 1479, length: 2, content: 聞香, SBCK: 有水乃掘遂得水又曰千丈之堤以螻蟻之穴而潰又曰以骨去蟻蟻愈多以肉驅蠅蠅愈至吕氏春秋曰吞舟之魚陸處不勝螻蟻淮南子曰千里之堤以螻蟻之穴漏而百尋之屋以突􅂩之熛焚突竈突也}
