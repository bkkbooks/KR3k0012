  - {type: variant, offset: 1474, length: 1, content: 蜣, SBCK: 夫吞舟之魚大矣蕩而失水則爲蟻所制大戴禮曰十二月􅀇駒賁蟻也賁者走於地中也周官曰饋食之豆􅜹蚳醢􅜹蛤也蚳蟻子也禮記檀弓曰子張之喪公明儀爲志焉禇幕丹質蟻結于四隅鄭􅀇曰畫禇之四角其文如蟻行徃來相交錯也蟻蚍蜉也殷之蟻結似今虵文􅀞也又内則曰蚳醢蚳蚍蜉子也又學記曰蟻子時術之其此之謂乎蚳蚍蜉也蚍蜉之子微蟲耳時蜉之所爲其功乃復成大垤也爾雅曰蚍蜉大螘俗呼爲馬蚍蜉小者螘齊人呼蟻蟻蛘龔音龍朾直耕功螘赤駮蚍蜉螱音尉飛螘有翅其子蚳蚳蟻夘周禮曰蜃螘醬後漢書曰鉅鹿張角賊起皆着黄巾爲摽幟時人謂之黄巾亦名爲蛾賊蛾音魚綺切即蟻字論賊衆多故以爲名張勃吴録曰九眞移風縣有赤絮膠人視土知有蟻因墾發以木枝挿其中則蟻縁而生􅃮堅凝如螳}
  - {type: page-break, offset: 1474, content: '', id: KR3k0012_SBCK_947-5a}
  - {type: variant, offset: 1474, length: 4, content: 蜣蜋無鼻, WYG: 食如蟻衣如葉不以泰乎劉義慶世説曰殷仲堪父病虛悸聞牀下動云是牛鬭孝武不知殷父問有一殷病如此不仲堪流涕}
  - {type: variant, offset: 1474, length: 1, content: 蜣, krp: 夫吞舟之魚大矣蕩而失水則爲蟻所制大戴禮曰十二月玄駒賁蟻也賁者走於地中也周官曰饋食之豆􅜹蚳醢􅜹蛤也蚳蟻子也禮記檀弓曰子張之喪公明儀爲志焉禇幕丹質蟻結于四隅鄭玄曰畫禇之四角其文如蟻行徃來相交錯也蟻蚍蜉也殷之蟻結似今虵文畫也又内則曰蚳醢蚳蚍蜉子也又學記曰蟻子時術之其此之謂乎蚳蚍蜉也蚍蜉之子微蟲耳時蜉之所爲其功乃復成大垤也爾雅曰蚍蜉大螘俗呼爲馬蚍蜉小者螘齊人呼蟻蟻蛘龔音龍朾直耕功螘赤駮蚍蜉螱音尉飛螘有翅其子蚳蚳蟻夘周禮曰蜃螘醬後漢書曰鉅鹿張角賊起皆着黄巾爲摽幟時人謂之黄巾亦名爲蛾賊蛾音魚綺切即蟻字論賊衆多故以爲名張勃吴録曰九眞移風縣有赤絮膠人視土知有蟻因墾發以木枝挿其中則蟻縁而生􅃮堅凝如螳}
  - {type: variant, offset: 1476, length: 0, content: '', SBCK: 子螵蛸也折􅃮以染絮其色正赤所作赤絮則此膠也孟子曰羊肉不慕蟻蟻慕羊肉羊肉羶也莊子曰凾牛之鼎沸蟻不得置一足焉喻聖主之法明姧至不敢蹈之又曰東郭子問荘子曰道安在荘子曰道在螻蟻又曰吞舟之魚蕩而失水則螻蟻能苦之孫卿子曰不食者蟻不飲者蜉蝣韓子曰􅁊公伐􅀌竹行山中}
  - {type: variant, offset: 1476, length: 0, content: '', krp: 子螵蛸也折􅃮以染絮其色正赤所作赤絮則此膠也孟子曰羊肉不慕蟻蟻慕羊肉羊肉羶也莊子曰凾牛之鼎沸蟻不得置一足焉喻聖主之法明姧至不敢蹈之又曰東郭子問荘子曰道安在荘子曰道在螻蟻又曰吞舟之魚蕩而失水則螻蟻能苦之孫卿子曰不食者蟻不飲者蜉蝣韓子曰桓公伐孤竹行山中}
