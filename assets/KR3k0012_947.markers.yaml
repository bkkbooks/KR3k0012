  - {type: variant, offset: 1751, length: 1227, content: 日螳蜋生不生是謂陰息韓詩外傳曰齊莊公出獵有螳蜋舉足將搏其輪問其御曰此何蟲對曰此螳蜋也為蟲知進而不知退不量力而輕就敵公曰此為天下勇士矣廻車避之勇士歸焉淮南子同又曰楚莊王將伐晉告士大夫有諫者死孫叔敖曰臣園中有榆榆上有蟬蟬方奮翼悲鳴不知螳蜋在後欲攫而食之螳蜋方取蟬不知黃雀在其後也禮記月令曰仲夏之月螳蜋生蔡邕月令章句曰螳蜋蟲名食蟬殺蟲鄭玄禮記注曰螳蜋螵蛸母也王瓚曰爾雅云莫貈螳蜋同類物色也今沛魯以南謂之螳蜋燕趙之際謂之食肬齊兗以東謂之馬敷爾雅曰莫貈螳蜋蛑螳蜋有斧蟲江東呼為石蜋蛑音謀貈戶各反不過蟷蠰螳蠰螳蜋別名堂襄二音其子蜱蛸一名𧐕蟭螳蠰卵也蜱音裨𧐕音搏蟭音焦張揖廣雅曰羊羊蛻蚘堂蜋也博焦夷冒焦螵蛸也華嶠後漢書曰蔡雍在陳留其鄰人有以酒食召雍者比至而酒酣焉客有彈琴於屏雍至門潛聽之曰嘻以樂召我而有殺心何也遂反將命者告主人曰蔡君向來至門而去主人遽自追而問其故雍具以告彈琴者曰我向鼓絃見螳蜋方向鳴蟬蟬將去未飛螳蜋為之一前一卻吾心聳然唯恐螳蜋失之也此豈為殺心而形於聲者乎雍曰此足以當之矣吳越春秋曰吳王夫差令於邦中曰寡人欲伐齊敢有諫者死太子友因諷諫以激於王以清且懷丸挾彈從後園而來衣浹履濡吳王夫差怪而問之太子對曰臣遊後園聞秋蟬之鳴往而觀之秋蟬登高樹自以為安不知螳蜋超枝緣條曳要舉刃欲哺其形也螳蜋貪心務進志在有利不知黃雀盛緣茂林徘徊枝葉欲啄螳蜋也莊子曰莊周游於雕陵之樊覩一異鵲自南方來者執彈而留之宿留伺其便也覩一蟬方得美蔭而忘其身螳蜋執翳且搏之執草以自翳見得而忘其形異鵲從而利之見利而忘其真真身也莊周怵然曰噫物固相累二類相召也捐彈而反走又曰螳蜋怒臂以當車轍不知不勝任也是才之美者也司馬彪曰非不有美才顧不勝任耳揚雄方言曰螳蜋謂之髡或謂之丁或謂之羊羊郭璞曰江東呼齕肮按爾雅丁應下屬方言依此失其旨許慎說文曰螳蜋不過也一名蟷蠰一名研父邯鄲氏笑林曰楚人居貧讀淮南方得螳蜋伺蟬自鄣葉可以隱形遂於樹下仰取葉螳蜋執葉伺蟬以摘之葉落樹下樹下先有落葉不能復分別掃取數斗歸一一以葉自鄣問其妻曰汝見我不妻始時怕荅言見經日乃厭倦不堪紿云不見嘿然大喜齎葉入市對面取人物吏遂縛詣縣縣官受辭自說本末官大笑放而不治夢書曰螳蜋為亡人蔽匿草也夢見螳蜋憂亡命者范子許然曰螵蛸出三輔上價三百吳氏本草經曰桑蛸條蝕肬一名害焦一名致神農鹹無毒成公綏螳蜋賦曰戢翼應時延頸鵠望推翳俟前翹翼高抗鳥伏虵騰鷹擊隼放俯飛蟬而奮猛躍蟪蛄而逞壯距車輪而軒翥固齊侯之所尚郭璞螳蜋讚曰螳蜋氣蟲揮斧奮臂當轍不廻勾踐是避勇士致斃勵之以義蝍蛆春秋考異郵曰土勝水故蝍蛆搏虵宋均曰蝍蛆生土虵藏物屬於坎坎水也為隱伏爾雅曰蒺蔾蝍蛆郭璞曰似蝗大腹長角能食虵腦張揖廣雅曰蝍蛆吳公也莊子曰蝍蛆甘帶司馬彪曰帶小虵也蝍蛆紀喜食其眼抱朴子曰南人入山皆以竹管盛活吳公吳公知有虵之地便動作於管中如此則草中便有虵也吳公見虵能以氣禁之虵即死淮南子曰月照天下蝕於蟾蜍螣虵游霧而殆蝍蛆蟾諸月中蝦蟆也食月故曰食於蟾諸蝍蛆蓋吳公也殆猶畏也沈懷遠南越志曰綏定縣多吳公其大者能以氣吸蜥蝪, SBCK: 蟻}
