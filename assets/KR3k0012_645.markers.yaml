  - {type: variant, offset: 1972, length: 496, content: 郿獄銀鐺卓誅烈得歸長安也王隱晉書曰石勒鏁敬晞頸以為司馬而反煞之南史曰丹徒縣令沈巑之以清廉抵罪巑之吳興武康人性踈直在縣自以清廉不事左右浸潤日至遂鏁繫尚方歎曰一見天子足矣上召問曰復欲何陳荅臣坐清所以獲罪上曰清復何以獲罪曰無以承奉要人上曰要人為誰巑之以手扶四面指曰此赤衣諸賢皆是若臣得更鳴必令清譽日至巑之雖危言上亦不責後知其無罪重除丹徒令又曰禇玠除山陰令縣人張次的王休達等與諸猾吏賄賂通姦全丁戶類多隱沒玠鏁次的等具狀啟臺宣帝手勑慰勞并遣使助玠搜括所出軍人八百餘戶三國典略曰梁湘東王以鮑泉圍湘州久不陷使平南將軍王僧辯代為都督數泉十罪舍人羅重懽帥三百與僧辯俱發先令通泉曰羅舍人被令送王竟陵來泉愕然顧左右曰得王竟陵助我賊不足平俄而重懽先入僧辯繼之泉方拂席而坐僧辯曰鮑郎卿有罪令旨令我鏁卿勿以故意相待羅重懽宣令即鏁之於床側泉舉止自若謂重懽曰稽緩王師甘受其罪但恐後人更思鮑泉之憤耳僧辯意甚不平泉乃為啟自申并謝淹遲之罪湘東怒解遂釋之宋躬孝子傳曰繆斐字文雅東海蘭陵人父忽得患醫藥不給斐晝夜叩頭不寢不食氣息將盡至三更中忽有二神引鏁而至求哀曰尊府君昔經見侵故有怒報君至孝所感昨為天曹所攝鏁銀鐺斐驚視父已差父云吾病恒見, SBCK: ''}
