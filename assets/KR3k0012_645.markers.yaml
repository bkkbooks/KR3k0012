  - {type: variant, offset: 268, length: 2, content: 赤眉, SBCK: 梁兾誅李固而露尸於衢令有敢臨者加其罪又曰梁兾專權其同巳者榮顯違迕者劒死同僚側目臺閤機事先以聞兾乃得奏御内外恐懼上下鉗口天子恭巳而巳不有所親任上旣不平之矣兾以私憾專殺議郎邴遵上愈益忿八月癸酉上問小黄門唐衡曰左右誰與梁氏不相得者衡荅曰單超左悺音管上呼超悺}
