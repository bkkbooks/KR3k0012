  - {type: variant, offset: 268, length: 2, content: 赤眉, krp: 梁兾誅李固而露尸於衢令有敢臨者加其罪又曰梁兾專權其同巳者榮顯違迕者劒死同僚側目臺閤機事先以聞兾乃得奏御内外恐懼上下鉗口天子恭巳而巳不有所親任上旣不平之矣兾以私憾專殺議郎邴遵上愈益忿八月癸酉上問小黄門唐衡曰左右誰與梁氏不相得者衡荅曰單超左悺音管上呼超悺}
  - {type: variant, offset: 271, length: 0, content: '', SBCK: 室上曰梁將軍兄弟專朝逼脅内外公卿巳下從其風旨今欲誅之於常侍意如何皆對曰誠國賊當誅之日乆臣等弱少未知聖意如何上曰審然者常侍宻圗之對曰圗之易耳但恐陛下腹中狐疑上曰姦臣脅國當㐲其罪復何狐疑於是命衡呼超等曰陛下今計已决勿得數言恐爲人疑丁􅐫兾心疑超等使中黄門張惲入省􅀫以防其變瑗勑吏収惲自外謀圗不軌於是帝幸殿召公卿勒兵使者収兾大將軍印綬更封比景部郷侯黄門令瑗將虎賁劒士卒千人司􅀠與共捕兾宗親送雒陽獄無少}
