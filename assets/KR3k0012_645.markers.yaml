  - {type: variant, offset: 1458, length: 4, content: 有善相狗, SBCK: 王疾痛使人迎文摯至視王疾謂太子曰非怒王則疾不可活王怒則摯必死太子頓首強請曰苟巳王疾臣與母以死事之願先生勿患也摯曰諾與太子期而至將徃不當}
