  - {type: variant, offset: 629, length: 0, content: '', SBCK: 節節過則毀於義多犯法以法之重無所措手}
  - {type: variant, offset: 629, length: 2, content: 足將, WYG: 罪又曰梁冀専權其同己者榮顯違迕者誅死同僚側目臺閣機事先以聞冀乃得奏御内外恐懼上下鉗口天子恭己而己不有所親任上既不平之矣冀私憾専殺議郎邴尊上愈益忿八月癸酉上問小黄門唐衡曰左右誰與梁氏不相得者衡荅曰單超左悺音管上呼超悺入室上曰梁将軍兄弟専朝迫脅内外公卿已下從其風㫖今欲誅之於常侍意如何皆對曰誠國姦賊當誅日久臣等弱劣未知聖意如何上曰審然者常侍密圖之對曰圖之易耳但恐陛下腹中狐疑上曰姦臣脅國當伏其罪復何狐疑於是更召璜瑗璜瑗等曰陛下今計已决勿得數言恐為人疑丁丑冀心疑超等使中黄門張惲入省宿以防其變瑗勅吏收惲自外謀圖不軌於是帝御殿召公卿勒兵使者收冀大将軍印綬徙封比景部鄉侯黄門令瑗将虎賁劍㦸士千人與司隸共捕冀宗親送雒陽獄無少長皆誅之冀自殺坐冀所連及公卿列侯校尉刺史二千石死者數十人冀故吏賔客免絀者二百餘人朝廷為之一空又曰鍾離意為瑕丘令吏有檀建者盜竊縣内意屛人問狀建叩頭伏罪不忍加刑遣令長休建父聞之為建設酒謂曰吾聞旡道之君以刃殘人有道之君以義行誅子罪命也遂令建進藥死又前秦録曰有司奏人有盜其母之錢而逃者請投之四裔太后聞而怒曰三千之罪莫大於不孝當棄之市朝奈何投之方外乎方外豈有无父母之鄉乎於是轘而}
