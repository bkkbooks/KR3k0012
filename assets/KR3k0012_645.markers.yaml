  - {type: variant, offset: 633, length: 12, content: 義誦觀世音經至夜土開械脫, WYG: 淮南子曰萇𢎞周王之執政者也天地之氣日月之行風雨之變律厯之數无所不通也然不自知車裂而死劉向説苑曰秦始皇太后不謹幸郎嫪毐封長信侯專國事驕奢與侍中左右内臣俱博飲酒醉争言而鬭與鬬者走白皇帝大怒毐因作亂咸陽宫始皇取毐四支車裂之取太后遷之長信宫桓寛鹽鐵論曰李斯相秦藉天下之勢志小萬乗及其囚於囹圄車裂咸陽之市願牽黄犬}
