  - {type: variant, offset: 2233, length: 253, content: 罪舍人羅重懽帥三百與僧辯俱發先令通泉曰羅舍人被令送王竟陵來泉愕然顧左右曰得王竟陵助我賊不足平俄而重懽先入僧辯繼之泉方拂席而坐僧辯曰鮑郎卿有罪令旨令我鏁卿勿以故意相待羅重懽宣令即鏁之於床側泉舉止自若謂重懽曰稽緩王師甘受其罪但恐後人更思鮑泉之憤耳僧辯意甚不平泉乃為啟自申并謝淹遲之罪湘東怒解遂釋之宋躬孝子傳曰繆斐字文雅東海蘭陵人父忽得患醫藥不給斐晝夜叩頭不寢不食氣息將盡至三更中忽有二神引鏁而至求哀曰尊府君昔經見侵故有怒報君至孝所感昨為天曹所攝鏁銀鐺斐驚視父已差父云吾病恒見二人見持向來忽不見斐乃具說父曰吾曾過, WYG: ''}
