  - {type: variant, offset: 32, length: 2, content: 木絞, SBCK: 爲治古無􅁏刑治古謂上古至治之時也有象刑墨黥之屬非屨赭衣而不純菲草也屨履也純縁衣也不加縁示有耻也是不然矣以爲治古則人莫觸罪非獨無􅁏刑哉亦不待象刑矣人不犯法即象刑無所施也以爲人或觸罪矣而直輕其刑是殺人}
