  - {type: variant, offset: 1479, length: 485, content: 此良狗也志在麞豕鹿不在鼠也欲其鼠則桎之其鄰桎其後足則狗取鼠矣賈誼書曰紂作梏數千睨諸侯之不諂己者而桎梏之文王桎梏囚于羑里七年而後得免及武王剋殷既定令殷之民連梏而流之於河民輸梏者以手撤之弗敢敗之跪入之水不敢投也昔者文王擁此故思愛文王猶敬其梏況其法教乎風俗通曰延嘉中京師長者皆著木屐婦人始嫁至作漆畫五采為系謹案黨事始發傳詣黃門北寺臨時惶恐不能信天任命多有逃亡不就栲者九族拘繫及所過歷長少婦女皆被桎梏應木屐之像矣又曰械戒也所以警戒使為善也桎實也言其下垂至地然後吐情首實語林曰嵇中散夜彈琴忽有一鬼著械來歎其手快曰君一絃不調中散與琴調之聲更清婉問姓名不對疑是蔡伯喈伯喈將亡亦被桎梏拲周禮秋官上曰掌囚掌守盜賊凡囚上罪梏拲而桎王之同族拲有爵者桎以待弊罪拲者兩手共入一木王同性及命上已上雖有上罪或拲或桎而已弊猶斷也晉令曰死罪二械加拲手趙書曰後石率精騎五千襲邵續一戰生禽續於青丘鉗頸拲手於襄國青陽城門頓頭稱囚鎖說文曰銀鐺鏁也漢書食貨志曰王莽為貨有誹詛者郡國檻車鐵鏁傳送長安鍾官又王莽傳曰民犯錢伍人相坐沒官為奴婢其檻車兒女步以鐵鏁銀鏁其頸傳至鍾官奴以千萬數華嶠後漢書曰崔鈞為西河太守與袁紹起兵, SBCK: ''}
