  - {type: variant, offset: 78, length: 5, content: 宋華弱樂轡, SBCK: 商罪貫盈天命誅之予不順天厥罪惟均禮曰振書端書於君前有誅倒筴側􅀛於君前有誅臣不豫事不敬也振去塵也端正也倒顛倒也側反也皆謂甫省視之也又曰以足蹙路馬芻有誅齒路馬有誅皆廣敬也路馬君之馬誅罰也周禮秋官下曰布憲掌憲􅀖之刑禁傷人見血而不以告者攘獄者遏訟者故以告而誅之謂吏民相殺傷見血者攘獄者距却不受也遏訟者上遏公羊傳曰君親無將將而必誅傳曰見無禮於君者誅之如鷹鸇之逐鳥雀也家語曰孔子爲魯司㓂七日而誅亂政大夫}
