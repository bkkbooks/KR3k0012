  - {type: variant, offset: 630, length: 0, content: '', krp: 故也今天下悠悠士無定處有德則徃無德則去欲䂓覇王之業與衆大國爲難而行酷刑以懼逺近國内之民將畔四方之士不至此乃士國之道君之下吏不得以聞是爲自居於中正之地而闇推之君王使同於桀紂也且夫爲人臣見主非而不爭以䧟主於危亡罪之大者也人主疾臣之弼已而惡之資臣以箕子比干之忠惑之大者也齊王曰謹聞命遂除車裂之法焉史記曰秦發兵攻商君殺之於鄭澠池秦惠王車裂商君徇曰莫如鞅反滅商君之家又曰張儀西說趙王曰蘇秦熒惑諸侯以是爲非以非爲是欲反之不可一亦以明矣漢書曰陳勝𥘉令銍人宋留將兵定南陽入武關留巳徇南陽聞勝死南陽復爲秦宋留不能入武關乃東至新蔡遇秦軍宋留以軍降秦傳留至咸陽車裂留以徇續漢書曰張角别黨馬元義爲山陽所捕得鎻送京師車裂於市崔鴻前涼録曰武威姑臧氏名白興以女爲妻其妻妬之興怒以妻爲婢爲女給使郡縣以聞張駿大驚曰自古所未聞也將爲恠乎於姑臧市轘煞之是月沉隂昏霧䨪四塞又曰前秦録曰池陽民惑其婦言而欲煞母遂車載母辭詣親家入南山母曰汝詣親家何至是也児曰老婢何言遂下母於嵠谷之間脫衣}
