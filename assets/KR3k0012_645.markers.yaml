  - {type: variant, offset: 615, length: 4, content: 符丕敗徐, SBCK: 昌黎尹孫伯仁護弟北支支弟乙㧞等俱有才力以驍勇聞馮跋之立也並兾開府而跋未知所欲由是有怨言每於朝享之際常㧞劒擊柱曰興建大業有功力焉而滯於散將豈是漢祖山河之}
  - {type: variant, offset: 615, length: 4, content: 符丕敗徐, WYG: 昌黎尹孫伯仁䕶弟叱支支弟乙拔等俱有才力以驍勇聞馮跋之立也並冀開府而跋未之許由是有怨言每於朝享之際常拔劍擊柱曰興建大業有功力焉而滯於散将豈是漢祖河山之}
