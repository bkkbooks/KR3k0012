  - {type: variant, offset: 620, length: 4, content: 為慕容永, SBCK: 乎跋怒誅之趙書曰臨沅侯崔約字道恭與太子詹事羯孫珎㑹朝珎患目痛問約用何方治爲佳約戯言唯溺取愈珎曰目何可溺約曰卿目腕腕正可溺中珎入奏天子怒約父子伏誅晉書曰劉􅁉誅諸葛長民士庻咸恨正刑之晚􅀂釋桎梏焉宋書曰謝眺􅀄告王敬則反眺臨誅歎曰天道其不可昧乎我不殺王公王公因我而死莊子曰爲不善乎顯明之中者人得而誅之爲不善乎幽闇之中者􅀑得而誅之明乎人明乎􅀑者然後能獨行也列子曰鄧析操兩可之說設無窮之辭當子産執政作竹刑鄭國用之數難子産之治子産俄而誅之慎子曰有虞之誅以幪巾當墨以草纓當劓以菲履當刖以艾韡當宫布衣無領當大辟此有虞之誅也斬人支體鑿其肌膚謂之刑􅀞衣冠異章服謂之戮上丗用戮而民不犯也當丗用刑而民不從韓子曰堯欲傳天下於舜諌曰不祥哉孰以天下傳之疋夫堯不聽舉兵誅之於郊共工又諌流於幽都天下莫敢言又曰太公東封齊齊東海上有居士曰狂獝華士昆弟二人立議曰上不臣天子下不事諸侯耕作而食掘井而飲吾無求於上太公至營丘使執而殺之周公聞發急傳問之太公荅曰今有馬如􅂹之狀天下至良也驅之不前引之不至左之不左右之不右賢士而不爲主用􅂹之不可以左右是以誅之㑹稽典録曰孟嘗仕郡户曹史上虞有寡婦􅀟飬姑至孝姑卒病亡其女言縣以􅀟煞其母縣不理斷結竟言郡郡報治罪嘗諌以爲此婦素名孝謹此必見誣固諌不聽遂抱其獄文書哭於府門後郡遭大旱三年上虞尤甚太守殷丹下車訪問嘗具陳􅀟不當死誅姑之女改葬孝婦丹如其言天應雨注襄陽耆舊記曰李衡聞王衜音道有人物往干之衜曰多士丗尚書劇曹郎才也後數年校書郞吕壹操弄權柄大臣逼畏莫敢言或問衜衜曰非李衡無能困之者遂共薦衡爲郎衡一引見口奏壹數千語孫權有愧色劉助復告壹壹即伏誅丗􅀃曰桓宣武之誅􅀽眞也未當其罪丗以爲􅁈焉􅀽眞在壽春甞與宣武一妾姙焉生玄及􅆲亦覆桓族識者以爲天理之}
