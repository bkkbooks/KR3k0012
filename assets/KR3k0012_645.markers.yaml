  - {type: variant, offset: 1463, length: 3, content: 其鄰畜, SBCK: 三齊王固已怒矣摯至不解履登牀問疾王怒不與言摯因出固辤以重怒王吐而起疾乃遂已王大怒不恱將烹摯太子與王左右急争}
  - {type: variant, offset: 1463, length: 3, content: 其鄰畜, WYG: 三齊王固已怒矣摯至不解履登牀問疾王益怒與言摯因出固辭以重怒王吐而赴疾乃遂已王大怒不悦将烹摯太子與王左右争急}
  - {type: variant, offset: 1463, length: 3, content: 其鄰畜, krp: 三齊王固已怒矣摯至不解履登牀問疾王怒不與言摯因出固辤以重怒王吐而起疾乃遂已王大怒不恱將烹摯太子與王左右急争}
  - {type: variant, offset: 1467, length: 2, content: 數年, SBCK: 不得果以鼎烹摯㸑之三日三夜顔色不變摯曰誠欲殺我則胡不覆之以絶隂陽之氣王使覆之乃死新序曰田卑處中牟佛肹以中牟叛置鼎於庭致士大夫曰與我者受邑不吾與者烹大夫從之至於田卑曰義士死不避斧􅃏之罪窮不受軒冕之服無義而生不仁而冨不􅀂死褰衣將入鼎佛肹􅀃乃止趙氏攻取之聞田卑不肯與也求而賞之卑曰不可也一人舉而萬夫俛首智者不爲賞一人而慙萬夫義者}
  - {type: page-break, offset: 1467, content: '', id: KR3k0012_SBCK_645-10b}
  - {type: variant, offset: 1467, length: 2, content: 數年, WYG: 不得果以鼎烹摯爨之三日三夜顔色不變摯曰誠欲殺我則胡不覆之以絶隂陽之氣王使覆之乃死新序曰田單處中牟佛肸以中牟叛置鼎於庭致士大夫曰與我者受邑不吾與者烹大夫從之至於田單曰義士死不避斧鉞之罪窮不受軒冕之服无義而生不仁而富不若死褰衣将入鼎佛肸説乃止趙氏攻取之聞田單不肯與也求而賞之單曰不可也一人舉而萬夫俛首智者不為賞一人而慙萬夫義者}
