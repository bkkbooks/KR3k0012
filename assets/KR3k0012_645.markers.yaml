  - {type: variant, offset: 621, length: 3, content: 慕容永, WYG: 佳約戲言唯溺取愈珍曰目何可溺約曰卿目腕腕正可溺中珍入奏天子怒約父子伏而已至賀屈釐壊為馬廏車痺室矣唯慶以惇謹終丞相位其餘盡伏誅漢書曰上遣公孫敖將兵深入匈奴迎李陵敖軍無功還言陵教單于為兵以備漢軍故臣無}
  - {type: variant, offset: 625, length: 3, content: 獲械埋, SBCK: 至轘釋名曰車裂曰轘轘也者散也支體分散傳曰齊人殺子亹而轘髙渠彌車裂曰轘又曰楚子爲陳夏氏亂故伐陳謂陳人無動將討於少西氏遂入陳煞夏徴舒轘之栗門又曰楚觀起有寵於令尹子南未益禄而有馬數十乗楚人患之王煞子南於朝轘起於四境孔藂子曰齊王行車裂之刑群臣諌不聽子髙見齊王曰聞君行車裂之刑夫車裂之刑無道之刑也而君行之臣切以爲下吏之過也王曰寡人耳民多犯法爲法之輕也子髙曰然此誠君之盛意也夫人含五常之性有哀樂喜怒無不過}
  - {type: page-break, offset: 625, content: '', id: KR3k0012_SBCK_645-6b}
  - {type: variant, offset: 625, length: 3, content: 獲械埋, WYG: 得上聞於是族陵家母弟妻子皆伏誅後漢書曰梁冀誅李固而露尸於衢令有敢臨者加}
