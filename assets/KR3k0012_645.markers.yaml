  - {type: variant, offset: 210, length: 0, content: '', WYG: 陸續獄急母不得見餉之食續泣吏詰之續曰母截肉未嘗不方斷蔥以寸為度是以知之魏志曰太祖征劉備先遣賈逵至斜谷視形勢道逢水衡載囚數十里逵以運急輒寛重者一人皆放其餘太祖善之晉書曰曹攄為臨淄令獄有死囚歲夕攄行獄愍之曰卿等不幸致此非所如何新歲人情所重豈欲暫見家耶衆囚皆泣曰若得暫歸死无恨也攄悉開獄出之尅日令還掾吏固争咸謂不可攄曰此雖小人義不可負自謂諸君仕之至日相率而還並无違者一縣歎服號為聖君北史曰後魏元麗拜雍州刺史為政嚴酷吏人患之其妻崔氏誕一男麗遂出州獄囚死及徒流案未申臺者一時放免宋書曰王者累遷宣城内史清謹有恩惠郡人張􅀈吳慶争囚經年不决志到官父老相謂曰王府君有徳政吾鄉里乃有如此争􅀈慶因相攜請罪所訟地遂成閑田後為東陽太守郡獄有罪重囚十餘人至日悉遣還家過節皆反惟一人失期志曰此自太守事王者勿憂明日果至以婦孕吏人入益歎服之崔鴻前凉録姑臧人以女為妾妻為婢為女給使張駿驚曰古未聞也將為怪乎就姑臧市轘殺之是月沉隂昏霧四塞又曰前秦録曰池陽民惑其婦言而欲殺母遂車載母辭詣親家入南山母曰汝詣親家何至是也兒曰老婢何言遂下母於溪谷之間脱衣將殺之初婦謂其夫曰不可不得中衣來也兒不欲手脱背坐厲聲令母自脱母泣曰我生養汝得至於今日汝信婦言枉殺我可不乞我此衣兒怒曰老婢復何言母呼曰天神山神當見此否言未卒聲見所持刀忽貫其項而殺投於山穴母乗車却歸昏而反家婦謂其夫還逆問曰得中衣來否母馳告鄰里收其婦送官郡縣以聞堅驚曰宇宙之内乃有此事将非怪乎於是轘而殺之崔鴻南燕録曰慕容超即位太后告超曰左僕射封嵩數殷丹下車訪問嘗具陳奴不當死誅姑女改𦵏孝婦丹如其言天應雨注襄陽耆舊記曰李衡聞羊衜音道有人物往之鑒干之衜曰多事之世尚書劇曹郎才也後數年校事郎吕壹操弄權柄人臣逼畏莫敢言或問衜衜曰非李衡無能困之者遂共薦衡為郎權引見衡口陳壹姦短數千言權有愧色劉助復告壹壹即伏誅世説曰桓宣武之誅袁真也未當其罪世以為寃焉袁真在夀春嘗與宣武一妾妊焉生𤣥及簒亦覆桓族識者以為天理之所至又曰吕后為太后乃令永巷囚戚夫人又曰天文志}
