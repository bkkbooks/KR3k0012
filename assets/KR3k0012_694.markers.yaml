  - {type: punctuation, offset: 973, content: 『, id: KR3k0012_CHANT_694-bkkpn344}
  - {type: variant, offset: 973, length: 0, content: '', WYG: 麛裘而􅔖受之無戾􅔖而麛裘授之無郵用三年男行乎途左女行乎途右物之遺者民莫之舉淮南子曰夫夏日之不披裘者非愛之也煖有餘於身也裘與蓑孰急見雨則裘不用上堂則蓑不御此代為貴者代更也白狐之裘天子之被也而在朝堂然為􅈢計者不若走於澤披羊裘而賃困其事也狐裘而負籠甚可怪也抱朴子曰􅈢白不可以當暑説􅁐曰晉平公使叔嚮聘吳吳人飾舟以逆左右各五百人有繡衣而貂裘者説􅁐曰林既衣韋衣而朝齊景公曰此君子服耶既作色曰服何足以端士行如君言衣狗裘當犬號羊裘當羊鳴乎今君衣狐意得無變乎又曰千金之裘非一􅈢之皮也説苑曰晉平公出朝有鳥環平公不去平公謂師曠曰}
