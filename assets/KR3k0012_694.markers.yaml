  - {type: variant, offset: 1160, length: 3, content: 六姿顏, WYG: 為成帝侍郎善鼔琴后悦之曰正得出入御内絶見愛幸常着輕絲履招風紫綈裘與后同居又曰成帝好蹙鞠群臣以勞體非尊者所宜帝曰可擇似而不勞者奏之劉向作弹碁以獻帝大悦賜青羔裘紫絲履拾遺記曰周昭王綴青鳳毛為二裘一名燠質一名暄肌可以禦寒也至厲王流于彘彘人得而竒之分裂此裘遍于彘土罪入大辟者抽裘一毛以贖死直萬金也五經要義曰古者著裘於内而以繒衣覆之乃加以朝服朝會之時袒其朝服見裘覆衣謂之裼裼之言露可見之辭所以示美呈好而為飾加以朝衣謂之襲袒謂之裼大裘不覆反本以質也又曰諸侯黼裘以誓田雜羔裘為黼文也白虎通曰裘所以佐女工助温也古者緇衣羔裘黄衣狐裘禽獸衆多獨以狐羔取其輕煖因狐死首丘明君子不㤀本也羔取其跪乳遜順也黄帝世紀曰夏禹時渠捜國來獻褐裘也春秋後語曰淳于髠見鄒忌曰狐裘雖敝不可補以黄犬之皮忌曰諾謹受教請擇君子}
