  - {type: variant, offset: 929, length: 0, content: '', krp: 江河之水非一源千鎰之裘非一狐又曰晉文公好士之惡衣故文公之臣皆牂裘列子曰林類年且百歳書傳无聞盖古之隱土底春而裘於畦底當也秦青子曰有千金之裘而無千金之布田休子曰渠捜之人服夏禹德獻其珎裘毛出五彩光曜五色又曰少昊氏都於曲阜鞬鞮毛人獻其羽裘韓子曰齊有盗狗子與胡跪子相誇盗狗子曰吾父之裘獨有尾胡跪子曰吾父冬夏獨有一足袴又曰堯之王天下也冬則鹿裘夏則葛絺又曰孫叔敖相}
  - {type: variant, offset: 930, length: 8, content: 莊王鮮冠縕組纓絳, SBCK: ''}
  - {type: variant, offset: 930, length: 8, content: 莊王鮮冠縕組纓絳, WYG: ''}
  - {type: variant, offset: 930, length: 1, content: 莊, krp: 衣羖羊裘又孔藂子曰田子方遺孔子思狐白裘也符子曰爲千金之裘而與狐謀之其皮不可得吕氏春秋曰天下無粹白之狐而有粹白之裘粹純取之於衆白也又曰孔子始用於魯魯人謗之曰麛裘而􅔖投之無戻鞞而麛裘投之無郵用三年男行乎途左女行乎途右物之遺者民莫之舉淮南子曰夫夏日之不披裘者非爱之也煖有餘於身也裘與蓑孰急見雨則裘不用上堂則蓑不御此代爲帝者代更帝}
  - {type: variant, offset: 932, length: 6, content: 鮮冠縕組纓絳, krp: 白狐之裘天子之𬒳也而在朝堂然爲狐計者不若走於澤披羊裘而賃固其事也狐裘而負籠甚可恠也抱朴子曰狐白不可以當暑說苑曰晉平公使叔嚮聘呉呉人飾舟以逆左右各五百人有繡}
  - {type: punctuation, offset: 937, content: ，, id: KR3k0012_CHANT_694-bkkpn331}
  - {type: 'tls:seg', offset: 937, content: '', id: KR3k0012_CHANT_694-15a.8}
  - {type: variant, offset: 939, length: 10, content: 博袍以理其國政也說苑, SBCK: 羖羊裘又孔藂子}
  - {type: variant, offset: 939, length: 10, content: 博袍以理其國政也說苑, WYG: 羖羊裘又}
  - {type: variant, offset: 939, length: 2, content: 博袍, krp: 而貂裘者說苑曰林旣衣韋衣而朝齊景公曰此君子服耶旣作色曰服何足}
  - {type: punctuation, offset: 941, content: ，, id: KR3k0012_CHANT_694-bkkpn332}
  - {type: 'tls:seg', offset: 941, content: '', id: KR3k0012_CHANT_694-15a.9}
  - {type: variant, offset: 942, length: 4, content: 理其國政, krp: 端士行如君言衣狗裘當犬號羊裘當羊鳴乎今君衣狐意得無變乎又曰千金之裘非一狐之皮}
