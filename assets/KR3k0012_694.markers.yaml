  - {type: variant, offset: 1076, length: 342, content: 複布袍賜之受之出門從人借刀斷袍上下異處放駿門下又大讙斫刺當時人謂為狂後乃知駿當誅斬其人王褒內傳曰真人將褒見太上文人著流霞羽袍芙蓉冠搜神記曰有談生者年四十無婦夜有女年十五六姿顏無雙來為生妻經三年遂乃生一兒曰慎勿以火照我後三年可照耳生不能忍照之腰上肉如人腰以下但枯骨婦求去將生入華堂奧室以珠袍與之生至市賣袍睢陽王識是女袍收拷談生談生具對呼兒似玉女又曰郭璞每自為卦知其凶終嘗逢一趍走少年便脫青絲袍與之此人不解其意璞曰身命卒當在君手故逆相屬耳及當死果此人行刑傍人皆為屬求利璞曰我常託之久矣此人為之歔欷哽咽行刑既畢乃說如此鄴中記曰石虎臨軒大會著丹紗袍鍾岏良吏傳曰袁彭字伯楚為南陽太守政以清潔糲食縕袍不改其操古樂府曰紵歌曰紵實如月輕如雲色似銀袍以光軀巾拂塵製以為袍餘作巾古詩曰青袍似春草長條隨風舒, SBCK: 􅁅藏氊裘}
