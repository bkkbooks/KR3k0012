  - {type: variant, offset: 16, length: 3, content: 袍禮記, SBCK: 彼都人士狐裘黄黄又曰狐裘尨茸一國三公吾誰適從又曰齊人以郲􅀉衛侯右宰榖從而逃歸衛人將殺之辭曰余不恱􅀄矣余狐裘而羔䄂乃赦之狐裘羔䄂言一身盡盖唯少有􅁖喻巳雖從出其罪不多又傳曰公賜公衍羔裘使獻龍輔於齊侯龍輔}
  - {type: variant, offset: 16, length: 3, content: 袍禮記, WYG: 彼都人士狐裘黄黄左傳曰狐裘尨茸一國三公吾誰適從又曰齊人以郲寄衛侯右宰榖從而逃歸衛人将殺之辭曰余不悦初矣余狐裘而羔䄂乃赦之狐裘羔袖言一身盡善唯少有惡喻雖從出其罪不多又傳曰公賜公衍羔裘使獻龍輔於齊侯龍輔}
