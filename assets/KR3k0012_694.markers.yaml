  - {type: variant, offset: 9, length: 1, content: 絮, SBCK: 誓省大裘非古也君衣狐白裘錦衣以裼之君之右虎裘厥左狼裘士不衣狐白君子狐青裘豹襃􅀇綃衣以裼之麛裘青豻襃絞衣以裼之豻胡犬也音岸絞蒼黄之色羔裘豹飾緇衣以裼之狐裘黄衣以裼之錦衣狐裘諸侯之飾也犬羊之裘不裼庶人無文飾裘之裼也見美也又}
  - {type: variant, offset: 9, length: 1, content: 絮, WYG: 警省大裘非古也君衣狐白裘錦衣以裼之君之右虎裘厥左狼裘士不衣狐白君子狐青裘豹褎𤣥綃衣以裼之麛裘青豻褎紋衣以裼之豻胡犬也音岸紋蒼黄之色也羔裘豹飾緇衣以裼之狐裘黄衣以裼之錦衣狐裘諸侯之服也犬羊之裘不裼庻人無文飾裘之裼也見美也又}
