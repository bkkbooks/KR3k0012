  - {type: variant, offset: 950, length: 8, content: 子思居衛縕袍無裏, SBCK: ''}
  - {type: variant, offset: 950, length: 0, content: '', WYG: 孔藂}
  - {type: variant, offset: 950, length: 0, content: '', krp: 晉平出朝有鳥環平公不去平公謂師曠曰吾聞之覇王之主鳯下之今者出朝有鳥環寡人終朝不去是其鳯鳥耶曠對曰東方有鳥名諌珂其爲鳥也文身而赤足憎鳥而爱狐今者君必衣狐裘以朝乎平公曰然又曰趙簡}
