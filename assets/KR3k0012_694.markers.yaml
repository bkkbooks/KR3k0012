  - {type: variant, offset: 929, length: 0, content: '', SBCK: 江河之水非一源千鎰之裘非一狐又曰晉文公好士之惡衣故文公之臣皆牂裘列子曰林􅀋年且百歳書傳无聞盖古之隱土底春而裘於畦底當也􅁗青子曰有千金之裘而無千金之布田休子曰渠捜之人服夏禹德獻其珎裘毛出五彩光曜五色又曰少昊氏都於曲阜鞬鞮毛人獻其羽裘韓子曰齊有盗狗子與胡跪子相誇盗狗子曰吾父之裘獨有尾胡跪子曰吾父冬夏獨有一足袴又曰堯之王天下也冬則鹿裘夏則􅁑絺又曰孫叔敖相}
  - {type: page-break, offset: 929, content: '', id: KR3k0012_SBCK_694-5a}
  - {type: variant, offset: 929, length: 0, content: '', WYG: 江河之水非一源千鎰之裘非一狐又曰晉文公好士之惡衣故文公臣皆解裘列子曰林類年且百威書傳無聞盖古之義士也底春而裘於畦底當也秦青子曰有千金之裘而無千金之布田休子曰渠捜之人服夏禹德獻其珎裘毛出五彩光曜五色又曰少昊氏都於曲阜鞬鞮毛人獻其羽裘韓子曰齊有盗狗子與胡跪子相誇盗狗子曰吾父之裘獨有尾胡跪子曰吾父冬夏獨有一足袴又曰堯之王天下也冬則鹿裘夏則葛絺又曰孫叔敖相}
