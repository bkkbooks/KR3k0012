  - {type: variant, offset: 9, length: 1, content: 絮, krp: 誓省大裘非古也君衣狐白裘錦衣以裼之君之右虎裘厥左狼裘士不衣狐白君子狐青裘豹襃玄綃衣以裼之麛裘青豻襃絞衣以裼之豻胡犬也音岸絞蒼黄之色羔裘豹飾緇衣以裼之狐裘黄衣以裼之錦衣狐裘諸侯之飾也犬羊之裘不裼庶人無文飾裘之裼也見美也又}
  - {type: variant, offset: 11, length: 2, content: 繭繭, SBCK: 童子不衣裘裳裘大温又曰有􅀂曰晏子一狐裘三十年言其太儉偏下又曰良冶之子必學爲裘補器者其金柔乃合有似於裘詩曰羔裘如濡洵直且侯羔裘豹飾孔武有力羔裘晏􅀆三英粲􅀆晏鮮盛貌三英三德剛克柔克正直也又曰君子至止錦衣狐裘顔如渥丹其君也哉又曰一之日于貉取彼狐狸爲公子裘又曰羔裘逍遥狐裘}
