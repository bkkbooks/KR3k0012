  - {type: variant, offset: 1002, length: 155, content: 倪寬練袍衣若僕妾食若庸夫東宮舊事曰太子納妃有絳綾袍一領漢武內傳曰上元夫人降武帝服赤霜之袍雲綵亂色非錦非繡不可得名神仙傳曰太傅楊駿使人迎孫登共語不荅以複布袍賜之受之出門從人借刀斷袍上下異處放駿門下又大讙斫刺當時人謂為狂後乃知駿當誅斬其人王褒內傳曰真人將褒見太上文人著流霞羽袍芙蓉冠搜神記曰有談生者年四十無婦夜有女, WYG: 度宴}
