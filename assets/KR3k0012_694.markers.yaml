  - {type: variant, offset: 962, length: 1, content: 狐, WYG: 孔子思􅈢白裘也符子曰為千金之裘而與􅈢謀之其皮不可得呂氏春秋曰天下無粹白之􅈢而有粹}
  - {type: variant, offset: 963, length: 0, content: '', SBCK: 白裘也符子曰爲千金之裘而與狐謀之其皮不可得吕氏春秋曰天下無粹白之狐而有粹}
  - {type: punctuation, offset: 966, content: ，, id: KR3k0012_CHANT_694-bkkpn341}
  - {type: 'tls:seg', offset: 966, content: '', id: KR3k0012_CHANT_694-16a.6}
  - {type: variant, offset: 966, length: 1, content: 恐, SBCK: 粹純取之於衆白也又曰孔子始用於魯魯人謗之曰麛裘而􅔖投之無戻鞞而麛裘投之無郵用三年男行乎途左女行乎途右物之遺者民莫之舉淮南子曰夫夏日之不披裘者非爱之也煖有餘於身也裘與蓑孰急見雨則裘不用上堂則蓑不御此代爲帝者代更帝王白狐之裘天子之􅀍也而在朝堂然爲狐計者不若走於澤披羊裘而賃固}
  - {type: page-break, offset: 966, content: '', id: KR3k0012_SBCK_694-5b}
  - {type: variant, offset: 966, length: 5, content: 恐其不受謂, WYG: 取之於衆白也又曰孔子始用於魯魯人謗}
  - {type: variant, offset: 966, length: 1, content: 恐, krp: ''}
  - {type: variant, offset: 968, length: 0, content: '', SBCK: 事也狐裘而􅀒籠甚可恠也抱朴子曰狐白}
  - {type: variant, offset: 968, length: 0, content: '', krp: 宰曰車新則安馬肥則疾狐裘則温君冝改之簡子曰君子服善則益㳟小人服善則益踞新序曰魏文侯出遊見反裘負蒭者問之對曰愛毛者文侯曰尓}
  - {type: variant, offset: 969, length: 1, content: 受, SBCK: 可以當暑􅀃苑曰晉平公使叔嚮聘呉呉人飾舟以逆左右各五百人有繡衣而貂裘者􅀃苑曰林旣衣韋衣而朝齊景公曰此君子服􅁘旣作色曰服何足以端士行如君言衣狗裘當犬號羊裘當羊鳴乎今君衣狐意得無變乎又曰千金之裘非一狐之皮也􅀃苑曰晉平出朝有鳥環平公不去平公謂師曠曰吾聞之覇王之主鳯下之今者出朝有鳥環寡人終朝不去是其鳯鳥耶曠對曰東方有鳥名諌珂其爲鳥也文身而赤足憎鳥而爱狐今者君必衣狐裘以朝乎平公曰然又曰趙簡子􅁦車瘦馬衣羖羊之裘其宰曰車新則安馬肥則疾狐裘則温君冝改之簡子曰君子服善則益㳟小人服善則益踞新序曰魏文侯出遊見反裘􅀒蒭者問之對曰愛毛者文侯曰尓不知皮盡而已無所附耶明年東陽上計其布十倍大夫賀之文侯曰民不憎而稅倍亦何異反裘􅀒蒭者厚取於下則上不安此自危之道也子何用賀乎新論曰振裘時領萬毛皆整潜夫論曰扶夫私計以論公政與狐議裘無時可得也西京雜記曰司馬相如􅀄與卓文君至成都居貧愁懣以所服鷫鶴裘貰酒與文君爲歡又曰度安爲十五爲成帝侍郎善皷琴趙后恱之白上得出入衘内絶見愛幸常着輕絲履招風紫綈裘與后同居又曰成帝好蹙鞠群臣以勞體非尊者所冝帝曰可擇似而不勞者奏之劉向作彈碁以獻帝大恱賜青羔裘紫絲履拾遺録曰周昭王綴青鳯毛爲二裘一名煩質一名暄風可以禦寒也至厲王流于􅇾人得而竒之以裂此裘遍􅇾罪人大辟者抽裘一毛以贖死價直萬金也五經要義曰古者著裘於内而以繒衣覆之乃加以朝服㑹之時祖其朝服見裘裒覆衣}
  - {type: page-break, offset: 969, content: '', id: KR3k0012_SBCK_694-6a}
  - {type: page-break, offset: 969, content: '', id: KR3k0012_SBCK_694-6b}
  - {type: variant, offset: 969, length: 1, content: 受, krp: 知皮盡而已無所附耶明年東陽上計其布十倍大夫賀之文侯曰民不憎而稅倍亦何異反裘負蒭者厚取於下則上不安此自危之道也子何用賀乎新論曰振裘時領萬毛皆整潜夫論曰扶夫私計以論公政與狐議裘無時可得也西京雜記曰司馬相如𥘉與卓文君至成都居貧愁懣以所服鷫鶴裘貰酒與文君爲歡又曰度安爲十五爲成帝侍郎善皷琴趙后恱之白上得出入衘内絶見愛幸常着輕絲履招風紫綈裘與后同居又曰成帝好蹙鞠群臣以勞體非尊者所冝帝曰可擇似而不勞者奏之劉向作彈碁以獻帝大恱賜青羔裘紫絲履拾遺録曰周昭王綴青鳯毛爲二裘一名煩質一名暄風可以禦寒也至厲王流于彘人得而竒之以裂此裘遍彘罪人大辟者抽裘一毛以贖死價直萬金也五經要義曰古者著裘於内而以繒衣覆之乃加以朝服㑹之時祖其朝服見裘裒覆衣}
  - {type: punctuation, offset: 970, content: ，, id: KR3k0012_CHANT_694-bkkpn342}
  - {type: 'tls:seg', offset: 970, content: '', id: KR3k0012_CHANT_694-16a.7}
  - {type: variant, offset: 972, length: 0, content: '', SBCK: 裼之言露可見之辭所以示美呈好而爲飾加以朝服謂之襲祖謂之裼大裘不覆反夲以其質也又曰諸侯黼裘以誓田新羔狐爲黼文也白虎通曰裘所以佐女工􅂇温也古者緇衣羔裘黄衣狐裘禽獸衆多獨以狐羔取其輕暖因狐死首丘明君子不忘夲也羔取其跪乳遜順也帝王丗紀曰夏禹時渠搜國來獻􅄄裘也春秋後語曰淳于髠見鄒忌曰狐裘雖􅁦不可􅀘以黄犬之皮忌曰諾謹受教請擇君子無雜小人其間戰國䇿曰􅂫􅁗􅀃李兊兊送􅁗黒貂裘黄衣百鎰又曰蘇􅁗詣􅁗王上書十上而􅀃不行黒貂之裘弊黄金百鎰盡形容枯槁及歸妻不爲下機嫂不爲炊又曰或謂孟嘗君曰太廟之椽非一木之枝也千鎰之裘非一狐之裘也呉越春秋曰延陵季子適齊見路有遺金當夏五月有披裘而薪者季子呼取金薪者}
  - {type: page-break, offset: 972, content: '', id: KR3k0012_SBCK_694-7a}
