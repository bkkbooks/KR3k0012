  - {type: variant, offset: 1974, length: 1037, content: 十無所容入衒嫁不售乃拂短褐自詣宣王曰願當君王盛顏符子曰有澤父者冠葭蘆之笠納蔍之屨莎裳褐衣裴淵記曰蠻夷取穀樹皮熟搥之以為褐趙壹疾邪賦曰勢家多所宜欬唾自成珠被褐懷金玉蘭蕙化為芻古詩曰短褐中無絮帶斷續以繩衫釋名曰衫芟也衫乘無袖端也襦襠者當胸一當背也揚雄方言曰陳魏宋楚之間謂之䄡或謂之單襦沈約宋書曰徐湛之母會稽公主高祖微時有納布衫襖等衣皆是武敬皇后手自作高祖既貴以此衣付公主曰後代若驕奢不節者可以此示之又曰到溉為建安太守任昉以詩贈之求二衫云鐵錢兩當一百代易名實為惠當及時無待涼秋日溉荅云余衣本百結閩中徒八蠶假令金如粟詎使廉夫貪宋書曰薛安都與魏戰魏多縱突騎眾軍患之安都怒甚乃脫兜鍪解所帶鎧唯著絳衲兩襠衫馬亦去具裝馳入賊陣猛氣咆𠷺所向無當其鋒者又曰渴盤陁國土人翦髮著氈帽小袖衣為衫則開頸縫前齊書曰陽休之除散騎常侍監修起居注頃之坐事左遷驍騎將軍衣兩襠文宣郊天百僚咸從休之為驍騎將軍衣兩襠用手持白棓時魏收為中書令嘲之曰義真服采休之曰我昔為常伯首戴蟬冕今處驍游身被衫甲允文允武何必減卿談笑晏然議曰服其夷曠唐書曰德宗在梁州地熱未給將士春衣上亦御夾服以視朝左右請御衫上曰從我者冬服未易我豈可獨衣衫乎將士聞之莫不流涕魏文帝別傳曰吳選曹令史長沙劉卓字德然病荒夢見一人以白越單衫與之言曰汝著衫汗火燒便潔也卓覺果有汗衫在側汗輒火浣之晉惠帝起居注曰愍懷以體上白絹單衣一領寄與妃宋起居注曰太始二年御史丞羊希奏山陰令謝沉親憂未除常著青絳衲兩襠請免沈前所居官也晉東宮舊事曰太子納妃有白縠白紗白絹衫並紫玉緌祖台之志怪曰建康小吏曹著為廬山使君所迎配以女婉著形意不安屢求諫退婉潸然流涕賦詩序別并贈織禈衫也劉敬叔異苑曰母丘儉征浟浿使王傾窮其東界父老云曾有破舡從漢海流得布衫身如中國人但兩袖俱長三丈䄡䄖方言曰䄡䄖江淮之間謂之𧝎容常容反自關而西謂之䄡䄖以布而無緣謂之藍縷漢書曰元始五年有一男子乘黃犢車建黃旐衣黃䄡䄖著黃慴詣北闕自謂衛太子又曰何並為長陵令侍中王林卿通輕俠傾京師至寺拔刀剌其建鼓並追之卿迫窘乃令奴冠被其䄡䄖自代乘變服馳去東觀漢記曰耿純率宗族賓客二千人皆縑䄡䄖絺巾迎上又曰更始在長安自恣三輔苦之又所官爵多群小或繡面衣錦袴䄡䄖罵詈道路又曰王阜為益州太守大將軍竇憲貴盛以絳罽䄡䄖與阜阜不受又曰段潁滅羗詔賜潁錢十萬絳䄡䄖一領又曰延岑上光武皮䄡䄖宿下邑亭亭長白言睢陽賊衣絳罽擔今宿客疑是乃發卒來岑臥不動吏謝去邊讓別傳曰讓字文禮孔融薦讓於武帝曰邊讓為九州衣被則不足為單衣䄡䄖則有餘恒譚新論曰余自長安歸道病蒙絮被罽䄡䄖宿下邑亭, SBCK: ''}
