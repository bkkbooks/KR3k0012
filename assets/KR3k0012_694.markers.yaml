  - {type: variant, offset: 1167, length: 3, content: 生妻經, WYG: 下機嫂不為炊又曰或謂孟嘗君曰太廟之椽非一木之枝也千鎰之裘非一狐之皮也吳越春秋曰延陵季子適齊見路有遺金當夏五月有披裘而薪者季子呼取金薪者曰吾五月披裘而薪資以金者哉外國圖曰毛民國出名裘去朔方七千里十洲記曰漢武帝天漢}
