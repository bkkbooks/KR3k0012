  - {type: variant, offset: 1718, length: 255, content: 城易壁趙遣藺相如奉璧秦王無償城色相如使從者衣褐懷壁便道亡歸又曰婁敬齊人戍隴西過洛陽衣羊裘因齊人虞將軍求見上虞將軍欲為易其衣不肯曰臣衣帛衣帛見衣褐衣褐見遂見上說上西都長安漢書曰貢禹上書云年老貧窮家貲不滿萬錢妻子糠豆不贍短褐不完范曄後漢書曰張玄處徵有才略以世亂不仕司空張溫數以禮辟不能致後溫以車騎將軍出征涼州將行玄自廬被褐帶索要說溫不能用晉書曰皇甫謐字士安上䟽曰咎繇振褐不仁者遠矣陶潛五柳先生傳曰短褐穿結簞瓢屢空晏如也孝子曰聖人被褐而懷玉墨子曰人不可衣短褐衣服不美身體從容不足觀也新序曰齊有婦人極醜無雙號無鹽女行年, SBCK: ''}
