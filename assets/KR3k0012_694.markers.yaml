  - {type: variant, offset: 976, length: 2, content: 遂忘, WYG: 終朝不去是其鳳鳥耶曠對曰東方有鳥名諌珂其為鳥也文身而赤足憎烏而愛狐今者君必衣􅈢裘以朝乎平公曰然又曰趙簡子弊車痩馬衣羖羊裘其宰曰車新則安馬肥則疾狐裘則温君宜改}
