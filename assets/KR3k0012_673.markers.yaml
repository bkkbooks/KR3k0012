  - {type: variant, offset: 1753, length: 874, content: 蓋陰景之內真玉珮者太上之隱玄洞飛之寶章得其道者上陟雲漢宴寢太極元始太常之言是太宵二景隱書玉珮金璫之文章也又有陰陽二景內真符與本文相隨太上法惟令授諸司命子玉札玄挺綠字刊金黃暎內曜素書上清與當為上卿之君司命之任矣然不先聞明堂玄真之道亦未由得太宵隱書也玄真之道是食日月之法鍊五神之術耳其經曰太上玄玄雙神四明玄真內映明堂外清吞息二暉長生神精上補司命監御萬靈六華充溢徹視黃寧凡四十字太上刻於鳳臺南闕也非惣真弟子而不教非司命之挺而不傳也太上真官用日霞之道挹二景之法使通靈致真體生玉映役命萬神上昇帝房昔鍾山真公用此玄真法耳王君乃將盈歸西城依承真訣按而行之三年之中面生玉澤後王君又賜盈九轉還丹及方一首立壇結盟約不得傳泄乃遣令歸告曰復百年求我於南岳將授汝仙官於吳越盈後得仙居句曲山邦人因改句曲之名為茅君之山時茅君二弟聞盈方信有仙矣棄官而去渡江求兄相見告二弟真訣一十八年道成因使更齋戒三年授以上道使存明堂玄真之氣盈乃啟王君自說二弟得為地仙之法要當受籙佩帶真極之符王君賜玄水玉液絳日丹芝可使二弟齋戒三月而服之盈命颷車與二弟詣青洲請書名金簡而詣西城洞宮朝見惣真上宰次南詣衡山之朱臺謁太虛赤真人歸方諸請地仙二真之策造赤城受真變神符又之羅霍求華旌繡幡又上登九宮詣金闕之下受聖君之書頓首於闕下三月於是聖君命九微太真上相王大司命高晨師青童君使上詣太上請朱冠使者下拜二弟於金闕下授二弟真簡而還又曰神仙經黃白方二十五卷千有餘首然率多深微難知其可解分明者少許耳世人多疑此事為虛誕與不信神仙者正同耳余昔從鄭君受九丹及金液經因復求授黃白中經五卷鄭君言曾與左慈於廬江銅山中試作皆成也然齋潔禁忌之勤苦與合九丹神仙藥無異也俗人多譏余好攻異端謂余欲強通天下之不通若方諸所得水火豈與常水火別哉皆自然之所感致非窮理盡性不能究其指歸非原始要終不能得其情狀成都內史吳太文博達多知亦自說昔事道士李根見根術有所成不得其術令百日齋戒太史文連在官終不能得恒歎息言人間不足處也太真科曰清虛小有天王撰三天一正法經金液經曰太初混元皇經以陳上真絳晨封之玉篋至道之大合符天圖三丹要言太皇所紀祕之玉堂勿傳其旨太真玄丹經刻于清虛, SBCK: ''}
