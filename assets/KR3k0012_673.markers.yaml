  - {type: variant, offset: 924, length: 0, content: '', SBCK: 其内飛行羽經曰峨嵋山金臺之室飛玄羽經祕其内又曰太上飛經藏於玉清上宮七映紫臺五寳經曰靈寳紫文祕在九天之上太玄靈臺又曰神州七轉舞天經祕於紫天元臺三元玉檢曰九天三􅀜之門九天龍書三元空洞玉檢飛玄之文刻題其内又曰三玄臺玉檢紫文九天眞書在其内又曰西沙方臺上眞三元之檢在其中也又曰晨燈之臺飛天檢文在其中明照九天之上又曰金牖臺三元玉檢刻題其中又曰鳯生臺太眞金書在其内金簡玉字經曰有洞天陽臺玉佩金璫經在其内洞景金玄經曰自非眞}
  - {type: page-break, offset: 924, content: '', id: KR3k0012_SBCK_673-3a}
  - {type: variant, offset: 924, length: 0, content: '', WYG: 其内飛行羽經曰峨眉之山金臺之室飛𤣥羽經秘其内又曰太上飛經藏于玉清上宫七映紫臺五寳經曰靈寳紫文秘在九天之上大𤣥靈臺又曰神州七轉舞天經秘於紫天元臺三元玉檢曰九天三闗之門九天龍書三元空洞玉檢飛𤣥之文刻題其内又曰三𤣥臺玉檢紫文九天真書在其内又曰西沙方臺上真三元之檢在其中也又曰晨燈之臺飛天檢之文在其中明照九天之上又曰金牖臺三元玉檢刻題其中又曰鳯生室大真金書在其内金檢玊字經曰有洞天陽臺玊佩金璫經在其内洞景金𤣥經曰自非真}
