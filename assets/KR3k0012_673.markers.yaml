  - {type: variant, offset: 925, length: 0, content: '', SBCK: 之名帝圖玉籙者不得聞見此經得見此經者飛仙上清法輪經曰太上玄一眞人曰吾昔受無極太上大道君無上八門經道成位加眞人此文與元始同生包含天地億刼長存自非仙籙不得妄傳天地綱紀經曰太上玉經隱書皆盛以別笈道迹經曰東井華林堂元洞天中内音玉書置其上大有經曰太玄靈臺玄}
