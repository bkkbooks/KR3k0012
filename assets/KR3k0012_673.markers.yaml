  - {type: variant, offset: 969, length: 0, content: '', SBCK: 九皇四司眞人之所寳祕玄元君之玉章也自非有金闕玉名及東華紫字皆不得聞見此鬰儀奔日結隣奔月二章之篇目三元布經曰南極上上寳祕玉檢之文自無玄名帝圖不得見其篇第也又金羽玄章經此文隱藏不傳於丗自無蘭臺丹字不得見聞靈寳眞一訣曰洞玄自然經夲文出乎太上道也者弥綸無極微妙無形老子曰天下莫柔弱於氣氣莫柔弱於道道之所以柔弱者苞乎天地萬物夫柔之生剛弱之生強而天下莫能知其根夲所從生者乎是故有以無爲母無以虚爲母虚以道爲母自然者道之根本也人能以自然爲道眞則道可得而通也太上經曰道實無形隱爲化本經有文字顯爲教端師有形言出處爲法語黙隨時爲存爲最期至乎道白經與師師經及道號爲三寳又云化夲有三道經師也大道無形湏經爲階經文玄妙非凢所知聖降爲師示人旨訣老子云道者萬物之奥善人之寳賢者得之以爲}
