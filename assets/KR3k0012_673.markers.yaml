  - {type: variant, offset: 915, length: 0, content: '', SBCK: 眞訣玉篇太有經曰帝卿執大洞眞經盛以紫玉凾又曰太一君執素靈洞玄大有妙經盛以黄玉凾又曰大有經金縷玉字以明其篇又曰大有妙經九眞科檢校祕於金藏玉匱大洞雌一篇目曰大洞眞經在九天之}
  - {type: variant, offset: 915, length: 0, content: '', WYG: 眞訣玉篇大有經曰帝卿執大洞眞經盛以紫玊函又曰大有經金縷玉字以明其篇又曰大有妙經九貞科檢校於金藏大洞雌一篇目曰大洞眞經在九天之}
  - {type: variant, offset: 915, length: 0, content: '', krp: 眞訣玉篇太有經曰帝卿執大洞眞經盛以紫玉凾又曰太一君執素靈洞玄大有妙經盛以黄玉凾又曰大有經金縷玉字以明其篇又曰大有妙經九眞科檢校祕於金藏玉匱大洞雌一篇目曰大洞眞經在九天之}
  - {type: variant, offset: 916, length: 1, content: 法, SBCK: 大有宮太玄靈臺又曰華玉堂仙母金丹在其内奔日月二景隱文曰西玄山下洞臺中有鬱儀結隣經也王屋山清虚中亦有此經也而不備惟太上玄宫髙上臺及蓬萊府北室金柱玉壁刻此並備八素經日太上曰諸學眞人而受玄清八素經皆有太帝篇目西華宫有玉簡藻書當爲眞人者乃得此文也}
