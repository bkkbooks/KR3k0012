  - {type: variant, offset: 207, length: 621, content: 玉木石興致雲雨之類亦大術也其淮南鴻寶萬畢之書不能過也鄭君博極五經知道者也兼綜九宮三棊推步天下河雒與洛同讖緯太和元年知季辰之亂江南將鼎沸負笈將仙藥東入霍山莫所知之又曰家有五岳真形圖辟惡人不能害又曰黃老玄聖深識獨見開祕文於名山受仙經於神人蹶埃塵以遣累凌太遐以高躋金石龜鶴與之等壽念有志於將來愍信者之無聞垂以方法炳然著明淺見之徒區區所守甘於蓼而酣於醨知飲食過度而速病而不能節知極情恣慾而致殞而不能割神仙可得安能信乎按仙經以為諸得仙者皆其受命偶值神仙之氣自然所稟故胎育之中已含道性及其有識心好其事必遇明師而得其法不然則不信不求求亦不得夫百年之壽三萬餘日幼弱則未有所知衰邁則懽樂並廢童蒙昏老除數十年而險厄憂病又相尋焉居世之年略銷其半人凡得壽不過五六十咄丁骨切嗟咸盡除哀憂昏耄六七千日耳顧眄已盡況於全百年者萬無一焉諦而念之亦無笑夏虫朝菌也蓋知道者所至悲也太上太宵琅書曰道本無形應感生象大象無象象妙難明故見真文結空成字又曰大上真人靈寶祕文內符者九天真王三天真皇以授帝譽藏於鍾山北阿夏禹治水畢詣鍾山鍾山真人以授之禹還會稽更撰定為二通一通藏苗山山𥕵須萬年劫會乃出一通絹寫付雲水洞室須甲申期至令與理水傳伯長等又曰吳王闔閭十二年正月使龍威丈人入包山洞庭取之以出有符而無說又齊人樂子長受之於霍林仙人韓眾乃敷演服御之方藏於東海北陰之室太一金液經者按劍經序云高丘子服金液水長史書云欲合金液意皆是此方今有葛洪注是郗愔黃素書又有別訣一卷此亦太清上丹法也登真隱訣曰楊君許長史共, WYG: ''}
