  - {type: variant, offset: 916, length: 1, content: 法, WYG: 大有宫大𤣥靈臺又曰華玉堂仙母金丹在其内奔日月二景隱文曰西𤣥山下洞臺中有鬱儀結隣經也玉屋山清虛中亦有此經也而不備惟太上𤣥宮髙上臺及􅅫萊府北室金柱玉壁刻此並備八素經曰太上曰諸學眞人而受𤣥清八素經皆有大帝篇目西華宫有玉簡藻書當為眞人者乃得此文也}
