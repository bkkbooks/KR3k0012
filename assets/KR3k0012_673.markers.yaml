  - {type: variant, offset: 1250, length: 0, content: '', SBCK: 者旦夕當致眞仙論道講妙有四極明科經者則玉帝遣五方神兵左右三官檢制靈文靈寳經曰元始洞玄靈寳赤書五篇眞文者於元始之先空洞之中天地未根日月未光幽幽􅁳􅁳無祖無宗靈文闇藹乍存乍亡二儀待之以分太陽待之以明靈圖革運玄象推遷乗機應運於是存焉天地得之而分判三景得之而發光靈文鬰秀洞映上清發乎始青之天而色無定方支􅀔曲折不可尋究元始錬之於洞陽之館冶于飛火之庭鮮其正文瑩發光芒洞陽氣赤故號赤書天寳之以致浮地祕之以致安五帝賞之以得鎭三光乗之以髙明上聖奉之以致眞五岳從之以得靈天子得之以致治國享之太平寔靈文之妙德摽天地之玄根威靈恢廓普加無窮蕩蕩大化爲神明之宗其量莫測巍巍太空生天立地開化神明上謂之靈施鎭五岳安國長存下謂之寳靈寳玄妙爲萬物之尊又曰太上}
