  - {type: variant, offset: 2801, length: 0, content: '', krp: 不必盡言也趣令前人受悟爲限也内敎者眞一妙術發自内心行善得道非從外來若道可假外而得者便應以道授至眞不變湛然常存也三皇經者}
  - {type: variant, offset: 2802, length: 3, content: 光八景, SBCK: 清洞眞上清洞玄太清洞神又太極隱注寳訣經云受三洞經當絶人事而行之也㹅三洞名太上洞一髙上之經矣大洞眞經或曰太眞道經或曰太清上道觀天内經上清之髙旨極眞之微辭飛仙之妙經也靈寳經或曰洞玄或云太上昇玄}
  - {type: variant, offset: 2802, length: 3, content: 光八景, WYG: 清洞真上清洞𤣥太清洞神又曰太極隠注寳訣}
  - {type: variant, offset: 2802, length: 3, content: 光八景, krp: 清洞眞上清洞玄太清洞神又太極隱注寳訣經云受三洞經當絶人事而行之也㹅三洞名太上洞一髙上之經矣大洞眞經或曰太眞道經或曰太清上道觀天内經上清之髙旨極眞之微辭飛仙之妙經也靈寳經或曰洞玄或云太上昇玄}
  - {type: punctuation, offset: 2806, content: 》, id: KR3k0012_CHANT_673-bkkpn579}
  - {type: variant, offset: 2806, length: 0, content: '', WYG: 云受三洞經當絶人事而行之也總三洞名太上洞一髙上之經矣又曰大洞真經或曰太上真道經或曰太清上道觀天内經上清之髙真極真之㣲辭飛仙之妙經也又曰靈寳經或曰洞𤣥或云太上昇𤣥經皆髙仙之上品虛無之至真大道之幽賛也三皇天文或云洞神或云洞仙或云太上玉䇿此三洞經符道之綱紀太虛之𤣥宗主真之首經矣豈中仙之所聞哉又}
