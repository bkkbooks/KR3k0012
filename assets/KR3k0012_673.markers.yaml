  - {type: variant, offset: 1218, length: 0, content: '', WYG: 曰道實無形隠為化本經有文字顯為教端師有形言出處為法語黙隨時為存為最期至乎道由經與師師經及道號為三寳又云化本有三道經師也大道無形湏經為階經文𤣥妙非凡所知聖降為師示人㫖訣老子云道者萬物之奥善人之寳賢者得之以為真寳愚者得之不敢失道道無常術德無常方神無常體和無常容道無中主與靜為友又曰龍景九文紫鳯赤書經舊文藏在太上六合紫房之内天人侍衛其經太㣲黄書經曰天真三皇藏八㑹之文於委羽山太㣲天帝藏一通於龜山其靈書八㑹字無正形趣究乎奥難可尋詳得為天書自然之真斯八㑹之氣全五和之音非淺近者所能洞明天真皇人竭其所見注解其意八㑹之者生天立地開化人神萬物之本主召九天上帝校定神仙圖籙政天分度安國息民攝制酆都降魔伏鬼勑命水帝召龍上雲論天地刼期辨聖賢名氏所理城臺種種因縁廣宣區别五方元精服御求仙化形之法皆演𤣥妙自然虛無正真妙趣明于具足}
