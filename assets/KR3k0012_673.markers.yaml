  - {type: variant, offset: 1217, length: 0, content: '', WYG: 所以柔弱者包乎天地萬物夫柔之生剛弱之生强而天下莫能知其根本所從生者乎是故有以無為母無以虛為母虛以道為母自然者道之根本也人能以自然為道貞則道可得而通也太上}
