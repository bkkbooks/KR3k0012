  - {type: variant, offset: 920, length: 0, content: '', SBCK: 􅀛之山玄圃之上積石之隂八素眞經在其内􅀛山元籙曰􅀛山丹皇飛玄紫文西母常所寳祕其旨隱奥自無仙名不得眄其篇目得者皆九天書籙名題􅀛山又曰玉}
