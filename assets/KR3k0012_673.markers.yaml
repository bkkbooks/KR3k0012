  - {type: variant, offset: 1238, length: 3, content: 大洞真, SBCK: 曰有上清列紀}
  - {type: variant, offset: 1238, length: 0, content: '', WYG: 曰有上清列紀經卷者得為太極仙人益能誦之者遂為上清之君也有玉清隠晝者旦夕當致真仙論道講妙有四極明科經曰則玊帝遣五方神靈左右三官檢制靈文也靈録經曰元始洞𤣥靈寳赤書五篇真文者於元始之先空洞之中天地未判日月未光幽幽冥冥無祖無宗靈文闇藹乍存乍亡二儀待之以分太陽待之以明靈圖華運𤣥象推遷乗機應運於是存焉天地得之而分判三景得之而發光靈文欎秀洞映上清發乎始清之天而色無定方之勢曲折不可尋䆒元始鍊之於洞陽之舘治于飛火之庭鮮其正文瑩發光芒洞陽氣赤故號赤書天寳之以致浮地秘之以致安五常賞之以得鎮三光乗之以髙明上聖奉之以致真五岳從之以得靈天子得之以致治國祚享之以太平是靈文之妙德標天地之𤣥根威靈耿廓普加無窮蕩蕩大化為神明之宗其量莫測巍巍大空生天立地開化神明上謂之靈施鎮五岳安國長存下謂之寳靈寳𤣥妙為萬物之尊又曰太上八威䇿文今靈寳玊符後有一符名太上入威身其制虎豹仙書也太上隠書金真上光經即太上玉晨傳也素靈洞𤣥}
