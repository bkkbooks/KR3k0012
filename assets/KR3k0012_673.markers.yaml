  - {type: variant, offset: 960, length: 0, content: '', SBCK: 以丹金書之紫金爲界三元眞一經曰琳霄之室者三元眞一之法藏在其中也玉光八景經曰金輝紫殿金眞玉光八景經藏其内上清經曰南極藏上清經於瑶臺茅君傳曰金臺者上眞内經封其中三道順行經曰南洞之室王君封三道經在其中玄眞經曰髙玄之妙道玉清之祕篇皆授金名玉字髙仙之人}
