  - {type: variant, offset: 2793, length: 1, content: 女, SBCK: 堂大洞眞經在其中又曰大洞眞經者三五之祕號眞道之至精三一之極章並玉清之禁訣髙上之祕篇也又太上九眞明科經云大洞真經雌一寳經素靈妙經三竒之章髙上玉皇寳篇祕在九天之上大有之宫太玄靈臺玉房之中也三籙者衆經之端也}
