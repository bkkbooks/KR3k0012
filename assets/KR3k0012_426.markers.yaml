  - {type: variant, offset: 1189, length: 2, content: 少為, SBCK: 如弃之子思辭曰伋聞忘予不如遺弃物於溝壑伋雖貧不忍以身爲溝壑楊子法言曰楚兩龔之㓗其清矣兩龔龔勝龔舍三輔決録曰安陵清者有頃仲山飲馬渭水曰與三錢以償之風俗通曰頴川黃子廉者毎飲馬投錢於水中又曰鮑焦耕田而食穿井而飲非妻所織不衣餓於山中食􅀥或問之此􅀥子所種也遂強嘔立枯而死又曰郝子廉飢不可得食寒不可得衣一分不取}
