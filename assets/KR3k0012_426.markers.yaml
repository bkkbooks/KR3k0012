  - {type: variant, offset: 1186, length: 1, content: 昌, SBCK: 子曰曽子立廉不飲盗泉所謂養志者也又曰君子不入市爲其挫廉􅀃苑曰孔子見景公景公致廪丘以爲養孔子辭不受出謂弟子曰吾聞君子當功以受禄今􅀃景公未之行而賜我廪丘其不知丘亦甚矣遂辭而行又曰子思居於衛緼袍無裏二旬九食田子方使人遺白裘恐其不受因謂之曰吾假人遂忘之吾予}
