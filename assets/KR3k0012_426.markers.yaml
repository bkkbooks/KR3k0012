  - {type: variant, offset: 2002, length: 321, content: 書曰魏舒為尚書三娶妻皆亡自表求還本郡葬上曰魏舒清貧不營財產頓舉眾喪必無以自供其賜葬地一頃錢五十萬鄧粲晉記曰王敦籍周顗家笥簏中有故絮故播酒五甕米數斛在位者服其清晉陽秋曰胡威字伯虎少有志尚清白歷位宰牧武帝賜見嘆其父清因謂威曰卿清孰與父清威對曰臣不如也帝曰以何為不如對曰臣父清恐人知臣清恐人不知是臣不如遠矣晉中興書曰劉驎之字子驥志在逸遁居于岐陽凡人致贈一無所受又曰龔玄之字道玄潛處未曾至公門有致餉一無所受又曰翟湯字道淵尋陽人篤行純素始安太守于干寶與湯通家遣船餉之勑吏翟公廉讓卿致書記便委舩還湯無人送致乃更貨易絹物因寄還寶寶本以惠而反煩之益愧嘆焉徐廣晉記曰中宗令曰太常賀循冰清玉潔行為俗表孤曾造其廬屋室服物周身而已賜床褥錢二十萬崔鴻前涼錄曰汜勝字無忌, krp: ''}
