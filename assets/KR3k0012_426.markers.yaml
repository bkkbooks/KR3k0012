  - {type: variant, offset: 1183, length: 1, content: 豫, SBCK: 路問於孔子曰仁人廉士窮則改節乎子曰改節則何以稱仁廉哉孔叢子曰子思居貧其友饋之粟者受三車焉或獻罇酒束脩子思弗當也或曰子取人粟而辭吾酒是辭少而取多也義則無名介則不全子思曰然伋不幸而貧於財至乃困乏將絶先人之祀夫所以受粟爲賙之酒脯則所飲讌也方乏於食而乃飲讌非義也吾豈以爲介哉或擔其酒脯以歸韓詩外傳曰鮑焦衣弊膚見挈畚採􅂼遇子貢於道子貢問曰吾子何以至於此乎鮑焦曰天下之道德敎者衆矣吾何以不至於此吾聞之丗不已知而行之不巳者是華行也上不已用而干之不正者是毁廉也行華廉毁然且弗舎惑於利者也子貢曰吾聞之非其丗者不生其利汙其君者不食其􅁟非其丗而採其􅂼詩曰􅄎天之下莫非王􅁟此誰之有哉鮑焦曰於戲吾聞賢者重進而輕退廉者易愧而輕死則棄其􅂼而立槁於洛水之上列子曰東方有人焉曰爰旌目將有適也而餓於道􅀌父之盗曰丘見而下一飱以餔之旌目三餔而後能視曰子何爲者也曰我􅀌父盗人爰旌目曰譆汝非盗􅁘吾義不食也兩手據地而歐之不出喀喀而死孟子萬}
  - {type: page-break, offset: 1183, content: '', id: KR3k0012_SBCK_426-3b}
  - {type: variant, offset: 1183, length: 1, content: 豫, WYG: 路問於孔子曰仁人廉士窮則改節乎子曰改節則何以稱仁廉哉孔叢子曰子思居貧其友饋之粟者受三車焉或獻罇酒束脩子思弗當也或曰子取人粟而辭吾酒是辭少而取多也義則無名介則不全子思曰然伋不幸而貧於財至乃困乏將絶先人之祀夫所以受粟為賙之酒脯則所飲讌也方乏於食而乃飲讌非義也吾豈以為介哉或擔其酒脯以歸韓詩外傳曰鮑焦衣弊膚見挈畚採蔬遇子貢於道子貢曰吾子何以至於此乎鮑焦曰天下之道德教者衆矣吾何以不至於此吾聞之世不巳知而行之不巳者是爽行也上不巳用而干之不止者是毁廉也行爽廉毁然且弗舎惑於利者也子貢曰吾聞之非其世者不生其利汙其君者不食其土非其世而採其蔬詩曰普天之下莫非王土此誰之有哉鮑焦曰於戯吾聞賢者重進而輕退廉者易愧而輕死則棄其蔬而立槁於洛水之上列子曰東方有人焉曰爰旌目將有適也而餓於道孤父之盜曰邱見而下一飱以餔之旌目三餔而後能視曰子何為者也曰我孤父盜人爰旌目曰譆汝非盗耶吾義不食也兩手據地而嘔之不出喀喉焉而死孟子萬}
