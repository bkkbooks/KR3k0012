  - {type: variant, offset: 1083, length: 1, content: 迎, SBCK: 知其刺史也又曰􅀽承序陳尚書僕射憲之子也武徳中累轉建昌令在任清㓗士吏懷之髙宗在藩太宗選學行之士爲其僚属謂岑文夲曰梁陳名臣有誰可稱復有子弟堪招引否文夲言隋師入陳百司奔散唯􅀽憲獨在其主之傍王丗充將受隋禪群僚勸進憲子給事中承家託疾不署名此之父子足稱忠烈承家第承序清貞雅操寔繼先風由是召守晉王友又曰􅂫頲性廉儉所得俸禄盡推與諸弟或散之親族家無餘資又曰盧懷愼清儉不營産業噐玩服飾無金玉綺文之麗所得俸禄皆隨時分散而家無餘蓄}
