  - {type: variant, offset: 1185, length: 0, content: '', WYG: 曰陳仲子豈不誠廉士哉居於陵三日不食耳無聞目無見井上有李螬食實者過半矣匍匐徃將食之三咽然後耳有聞目有見也李食有蟲食之過半避兄離母處於於陵孟子曰伯夷聖之清者也又曰故聞伯夷之風者頑夫廉懦夫有立志晏子春秋曰景公以五十乘魚賜弦章章歸魚車塞塗撫其御之手曰昔者晏子辭賞以正君故過失不掩之今諸臣諂諛以干利吾若受魚是反晏之義而順諂諛之欲故辭魚不受君子曰弦章之亷晏子之遺行也又曰有工女託於晏子之家者曰婢子東郭之野人願得入身比數於下陳焉晏子曰乃今而後自知吾不肖也古之為政者士農工商異居男女有别而士無邪行女無􅁋事今吾專國而民有市心必行無清也遂不見韓子曰晉文公出亡箕鄭挈一壺飱而從迷而失道與文公相失餓而不敢食及文公反國伐原以為原令吕氏春秋曰古之人非無寶也所寶者異孫叔敖將死屬其子曰我死王必封汝汝毋受利地荆楚之間有寢邱其利少而甚惡可長有也其子受之至今不失淮}
