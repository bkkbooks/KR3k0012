  - {type: variant, offset: 691, length: 4, content: 天知神知, krp: 范岫毎所居官恒以廉㓗著稱爲長城令時有梓材巾箱至數十年經貴遂不改易在晉陵唯作牙管一雙猶以爲費又曰沈顗字處嘿呉興武康人也顗不治家産值齊未兵荒家人并日而食或饋其梁肉者閉門不受陳書曰姚察字伯審呉興武康人察自居顯要其勵清節甞有私門生送南布一端花練一疋察謂之曰吾所衣着止於麻布蒲練幸不煩此人遜請猶兾受納察勵色駈出自此伏事者莫敢饋也隋書曰狄士文甞入朝遇上賜公}
