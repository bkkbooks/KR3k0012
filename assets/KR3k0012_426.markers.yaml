  - {type: variant, offset: 1565, length: 412, content: 者相謂曰汝非程謀甫何為不食人食魏略曰沐並字德信河間人少孤苦袁紹父子時始為吏名有志介嘗過姊姊為殺雞炊黍而不留為三府長吏時吳使朱然諸葛瑾攻圍樊城遣舩兵於峴山東斫材兵人作食有先熟者呼後熟者荅言不也呼者曰汝欲作沐德信耶其名流布播於異域如此又曰舊故西征有官廚財藉遷轉之際無不因緣而趙儼又手上車發到灞上忘持其常所服藥雍州聞之乃追送雜藥朴數箱儼笑曰人言語殊不易我偶問所服耳何用是為遂不取魏志曰盧欽著書稱徐邈曰徐公志高行潔才博氣猛其施之也高而不狷潔而不介博而守約猛而能寬聖人以清為難而徐公之所易也或問欽徐公當武帝之時人以為通向在涼州及還京師人以為介何也欽荅曰往者毛孝先崔季珪用事貴清潔之士時皆變易車服以求名高而徐公不改其常故以為通比來天下奢靡轉相放効而徐公雅尚自若不與世同故前日之通乃今日之介是世人無常而徐公有常也又曰景初二年以蒲寵年老徵還為太尉寵不治產業家無餘財詔曰君典兵在外專心憂國有行父祭遵之風賜田十頃榖五百斛錢二十萬以明清忠儉約之節, SBCK: ''}
