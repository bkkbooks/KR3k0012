  - {type: variant, offset: 35, length: 41, content: 季文子卒宰庀家器為葬具無衣帛之妾無食粟之馬無藏金玉無重器備器備謂珍寶甲兵之物君子是, WYG: 范岫毎所居官恒}
  - {type: variant, offset: 38, length: 228, content: 卒宰庀家器為葬具無衣帛之妾無食粟之馬無藏金玉無重器備器備謂珍寶甲兵之物君子是以知季文子之忠於公室也相三君矣而無私積可不謂忠乎又襄二曰宋人或得玉獻諸子罕子罕弗受獻玉者曰以示玉人玉人以為寶也故敢獻之子罕曰我以不貪為寶爾以玉為寶若以與我皆喪寶也不若人有其寶又襄五曰與晏子邶殿其鄙六十弗受子尾曰富人之所欲也何獨弗欲對曰慶氏之邑足欲故亡吾邑不足欲也益之以邶殿乃足欲足欲亡無日矣且夫富如布帛之有幅焉為之制度使無遷也謂之幅利利過則為敗吾不敢貪多所謂幅也與子雅邑辭多受少漢, SBCK: 顯齊}
