  - {type: variant, offset: 1183, length: 1, content: 豫, krp: 路問於孔子曰仁人廉士窮則改節乎子曰改節則何以稱仁廉哉孔叢子曰子思居貧其友饋之粟者受三車焉或獻罇酒束脩子思弗當也或曰子取人粟而辭吾酒是辭少而取多也義則無名介則不全子思曰然伋不幸而貧於財至乃困乏將絶先人之祀夫所以受粟爲賙之酒脯則所飲讌也方乏於食而乃飲讌非義也吾豈以爲介哉或擔其酒脯以歸韓詩外傳曰鮑焦衣弊膚見挈畚採𬞞遇子貢於道子貢問曰吾子何以至於此乎鮑焦曰天下之道德敎者衆矣吾何以不至於此吾聞之丗不已知而行之不巳者是華行也上不已用而干之不正者是毁廉也行華廉毁然且弗舎惑於利者也子貢曰吾聞之非其丗者不生其利汙其君者不食其土非其丗而採其𬞞詩曰溥天之下莫非王土此誰之有哉鮑焦曰於戲吾聞賢者重進而輕退廉者易愧而輕死則棄其𬞞而立槁於洛水之上列子曰東方有人焉曰爰旌目將有適也而餓於道孤父之盗曰丘見而下一飱以餔之旌目三餔而後能視曰子何爲者也曰我孤父盗人爰旌目曰譆汝非盗耶吾義不食也兩手據地而歐之不出喀喀而死孟子萬}
  - {type: variant, offset: 1185, length: 0, content: '', SBCK: 曰陳仲子豈不誠廉士哉居於陵三日不食耳無聞目無見井上有李螬食實者過半矣匍匐往將食之三咽然後耳有聞目有見也李實有虫食之過半避兄離母居於陵又曰伯夷叔齊聖人之清者也聞伯夷叔齊之風貪夫廉懦夫有立志晏子春秋曰景公以五十乗魚賜􅁌章章歸魚車塞塗撫其御之手曰昔者晏子辭賞以正君故過失不掩今諸臣謟䛕以干利吾若受魚是反晏子之義而順謟䛕之欲固辭魚不受君子曰􅁌章之廉晏子之遺行也又曰有工女託於晏子之家者曰婢子東郭之野人願得入身比數於下陳焉晏子曰乃今而後自知吾不肖也古之爲政者士農工商異居男女有別而士無邪行女無􅁋事今僕託國主民而僕必行無清也遂不見韓子曰晉文公出亡箕鄭挈一壷食而從迷而失道與文公相失餓而不敢食及文公反國伐原以爲原令呂氏春秋曰古之人非無寳也所寳者異孫叔敖將死属其子曰我死王必封汝汝母受利地荆楚之間有寢丘其利少而甚惡可長有也其子受之至今不失淮}
