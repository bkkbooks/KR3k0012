  - {type: variant, offset: 1094, length: 7, content: 左雄字伯豪為冀, SBCK: 馮履謙􅀘河北尉有部人張懷道任江陽尉與謙疇舊銄鏡一靣謙集寮吏遍視之曰此張公所致也吾與之有舊吾効官以俸禄自守豈私受遺哉昌言曰清水見底明鏡照心余之効官必至於此復書於使者乃歸之又曰李懷逺乆居榮位而好尚清廉宅舎屋無所增改甞乗􅅃叚馬豆盧欽望謂之曰榮貴如此何不買駿馬乗之荅曰此馬幸免驚蹶無假別求聞者莫不歎伏又曰裴玢爲鄜}
