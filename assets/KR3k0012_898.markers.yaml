  - {type: variant, offset: 455, length: 3, content: 玄子觀, SBCK: 冲犢相􅀋來認取之冲不與爭後得之於堅冰之下慙謝冲冲不受王隱晉書曰朱冲字巨融少有德行隣人牛犯冲苗冲乃擔芻送牛牛主大慙不敢復􅁀又曰潘岳岀爲河陽令以仕次冝爲郎不得意出山濤領選岳内非之密作謡曰閣道}
