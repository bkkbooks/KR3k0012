  - {type: variant, offset: 453, length: 0, content: '', SBCK: 􅀕天地之牛角繭栗宗廟之牛角握賔客之牛角赤周禮地官封人曰凢􅀕祀飾其牛牲設其楅衡置其絼供其水藁楅在鼻衡在角言不得觸絼繫牛鼻繩絼夲又作紖持忍反又冬官考功記曰稺牛之角直而澤老牛之角終而昔昔讀爲交錯之錯謂角錯也角長二尺有五寸三色不失謂之牛戴牛三色夲白中清未豐也戴牛角直一牛又地官上曰牛人掌養國之公牛以待國之政令公猶官也凡􅀕祀共其享牛求牛以授職人而芻之求牛禱於􅀑神之牛謂所以􅀕者也求終也終事之牛謂所以繹者也宗庿有繹者孝子求神非一處職讀爲樴樴謂之我可以繫牛樴人者謂牧人凡賔客之事共其牢禮積膳之牛饗食賔射共其膳羞之牛軍事共其犒牛喪事共其奠牛凡㑹同軍旅行役共其兵車之牛與其牽傍以載公任器牽傍在轅外輓牛也人御之居其前曰牽居其旁曰傍任猶用也凡􅀕祀共其牛牲之互與其盆簝以待事鄭司農云互謂楅衡之属盆簝皆器名盆所以盛血簝受肉籠也玄謂互若今屠家縣肉格又秋官上曰罪􅀠掌役百官府與凡有守者掌使令之小事役給其小役凡封國若家牛􅂇爲牽傍鄭司農云凡封國若家謂建諸侯立大夫家也牛助爲牽傍此官主爲送致之也􅀇謂牛助國以牛助轉徙也罪􅀠牽傍之在前曰牽在旁曰傍史記曰􅀐劫攻即墨田單用牛千頭衣以五綵縛刄其角結火其尾穿城而岀牛壯士五千銜枚隨其後牛出火明所觸皆死壯士擊之城上士大譟燕師大敗􅀐刼死乗勝逐北三戰三克遂收齊城也又曰馬蹄躈千牛千足此亦比千乗之家躈苦吊切又曰寗戚欲仕齊候桓公岀牽牛叩角而歌曰南山粲白石爛短布單衣才至骭生不逢堯與舜禪長夜漫漫何時旦桓公用之又曰􅂫秦􅀃韓王曰鄙語云寕爲雞口無爲牛後今西面事􅁗何異牛後乎漢書曰邴􅁻甞岀逢羣牛􅃲者死傷橫道􅁻過之不問前行逢人逐牛牛喘吐舌止使􅀐吏問牛行幾里或譏􅁻􅁻曰民􅃲殺傷長安令京兆尹職所當禁備逐捕丞相課其殿最不親小事也方春少陽用事未可以􅀬恐牛近行因暑故喘此時氣失節恐有所傷害者三公典調和隂陽職所當憂也又曰龔遂爲渤海太守民有帶持刀劒者使賣劒買牛賣刀買犢可謂帶牛佩犢矣又曰宣帝地節三年求得外祖母王媪男無故弟武皆隨使者詣闕時乗黃牛車故百姓謂之黃牛嫗後漢書曰朱暉爲臨淮太守時牛大疫而臨淮獨無疫者鄰郡牽牛入界避災耳范曄後漢書曰漢光武􅀄起􅀐牛殺新野尉乃得馬又曰劉盆子􅀄與兄䒫屬右校卒吏劉俠卿主芻牧牛號曰牛吏及立爲帝恐畏欲啼即復還依俠卿又曰更始即位舞隂大姓李氏擁城不下更始遣柱天將軍李寳降之不肯云聞宛之趙氏有孤孫熹信義著名願得降之更始乃徴熹熹年未二十旣引見更始􅀏曰蠒栗犢豈能􅀒重致逺乎犢角如蠒栗言小也禮緯曰天地之牲角蠒栗即除爲郎中行偏將軍事使詣舞隂而李氏遂降又曰劉寛甞行有人失牛者乃就寛車中認之寛無所言下駕歩歸有頃認者得牛而送還叩頭謝曰慙􅀒長者隨所刑罪寛曰物有相􅀋事容脫誤幸勞見歸何爲謝之州里服其不校又曰魯恭爲中牟令亭長有從民借牛不還者牛主自言恭召亭長敎令還牛亭長不還如是者三遂不還㳟涕泣曰教化不行也欲解印綬去椽吏亭者固爭亭長即還牛詣獄受罪恭貰出不問於是吏人敬信皆不忍欺謝承後漢書曰朱暉爲郡吏太守阮况甞欲市暉牛暉不從及况卒暉乃􅌋贈送其家人或以譏焉暉曰前阮府君有求於我所以不敢聞命誠恐以財貨汙君今而相送明}
