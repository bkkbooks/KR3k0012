  - {type: variant, offset: 20, length: 0, content: '', SBCK: 馬牛不相及風放不虞君之渉吾地何故又僖下曰介􅁑盧來朝聞牛鳴曰是生三犧皆用之矣其音云問之而信又曰􅁗師入滑鄭商人􅁌髙將市於周遇之以乗韋先牛十}
  - {type: page-break, offset: 20, content: '', id: KR3k0012_SBCK_898-2b}
  - {type: variant, offset: 21, length: 0, content: '', SBCK: 犒師}
  - {type: variant, offset: 21, length: 0, content: '', WYG: 三子不能事君焉用厥也尸主也又昭十三年傳}
  - {type: variant, offset: 22, length: 3, content: 逐兔三, SBCK: 寡君聞吾子將歩師岀於敝邑敢犒從者又宣上}
  - {type: variant, offset: 22, length: 2, content: 逐兔, WYG: 邾人莒人愬于晉曰魯朝夕伐我幾亡矣我之不共魯故之以不共晉貢以魯故也晉侯使叔向來辭曰寡君不得事君矣請君無勤子服惠伯對曰君信蠻夷之訴以絶兄弟之國寡君聞命矣叔向曰寡君有甲車四千乘在雖以無道行之必可畏也况其率道何敵之有牛雖瘠僨於豚上其畏不死禮記曲禮上曰國君不齊牛又王制曰諸侯無故不殺牛又月令曰季春犧牲駒犢舉書其數又曰季冬命有司出土牛以示農耕之早晩又曲禮下曰天子祭天地諸侯祭山川大夫祭五祀士祭其先天子以犧牛諸侯以肥牛大夫以索牛又郊特牲曰郊所以眀天道也帝牛不吉以為稷牛帝牛必在滌}
  - {type: page-break, offset: 22, content: '', id: KR3k0012_WYG_898-5a, image: WYG0901/WYG0901-0038a.png}
  - {type: page-break, offset: 22, content: '', id: KR3k0012_WYG_898-5b, image: WYG0901/WYG0901-0038b.png}
