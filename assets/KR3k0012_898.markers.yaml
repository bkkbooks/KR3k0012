  - {type: variant, offset: 83, length: 0, content: '', krp: 乎二三子不能事君焉用厥也尸也又昭四年曰邾人莒人愬于晉曰魯朝夕伐我幾亡矣我之不共魯故之以不共晉貢以魯故也晉侯使叔向來辭曰寡君不得事君矣請君無勤子服惠伯對曰君信蠻夷之訴以絶兄弟之國寡君聞命矣叔向曰寡君有甲車四千乗在雖以無道行之必可畏也况其率道何敵之有牛雖瘠僨加於豚上其畏不死乎禮記曲禮上曰國君下齊牛又曲禮下曰諸侯無故不殺牛又月令曰季春犧牲駒犢舉書其數在牧而書數秋當保内又曰季冬命有司岀土牛以示農耕之早晚又曲禮下曰天子祭天地諸侯祭山川大夫祭五祀士祭其先天子以犧牛諸侯以肥牛大夫以索牛又郊特牲曰郊所以明天道也帝牛不吉以爲稷牛帝牛必在滌三月稷牛惟具所以别事天神}
  - {type: variant, offset: 85, length: 280, content: 相疋或曰馬夜行目明照前四丈故曰一疋或說度馬從橫適得一疋或說馬死賣得一疋帛或云春秋左氏說諸侯相贈乘馬束帛束帛為疋與馬之相匹耳又曰疲馬不能度繩俗說馬之疲羸不能復度繩索言其極也或云不能度畦塍也謹按齊有繩水裁三四步馬疲不能度此水耳又曰殺君馬者路傍兒也語云長吏食重祿芻藁豐美馬肥希出路傍小兒觀之卻驚致死按長吏馬肥觀者快馬之走驟也騎者驅馳不足至於瘠死金樓子曰鳥與鳥遇則相躅獸與獸遇則相觸馬與馬遇則趹蹄相傷天之生此物多其力而少其智也傅子曰九日養親一日飾物之寧可言飽飽多飽少同為孝子穀馬一日餓之馬肥不損於義無傷非可同之夏侯子曰一舟之覆無一毫不濕一馬之走無一毛不動故大同萬物不一, SBCK: 􅀑}
