  - {type: variant, offset: 1513, length: 387, content: 罵此轅中馬蹇馬蹇馬亦罵之曰眇馬衘者不信使往視之馬目果眇鹽鐵論曰騏驥負鹽車垂頭於太行之坂屠者持刀睨之又曰古者諸侯不秣馬天子有命以車就牧庶人之乘馬者足以代勞而已故行則服軛止則就犁一馬服櫪當中家六口之食孔融論曰馬之駿者名曰騏驥犬之駿者名曰韓盧犬之有韓盧馬之有騏驥人之聖也名號等設使騏驥與韓盧並走寧能頭尾相當八腳如一無有先後之覺矣英雄記曰公孫瓚每聞邊警輒厲色作氣如赴讎常乘白馬又白馬數十疋選騎射之士號為白馬義從以為左右翼胡甚畏之相告曰當避白馬長史曹瞞傳曰呂布有駿馬名赤兔常騎乘之時人為之語曰人中有呂布馬中有赤兔袁淮正書曰牛馬之為人駕乘者非樂負千鈞之重行千里之險鞭策痛矣桓公世論曰朝鮮之馬被鬣踶齧能使其成騏驥者習之故也愽物志曰穢貊國南與辰韓北與句麗沃沮接東窮大海海中出班魚皮陸出文豹又出果下馬高三尺漢時獻之駕輦車正始六年樂浪太守劉茂帶方太守弓遵領東穢屬勾麗伐之舉邑降愽物志曰唐公有驌驦, SBCK: ''}
