  - {type: variant, offset: 83, length: 0, content: '', SBCK: 乎二三子不能事君焉用厥也尸也又昭四年曰邾人莒人愬于􅀳曰魯朝夕伐我幾亡矣我之不共魯故之以不共晉貢以魯故也晉侯使叔向來辭曰寡君不得事君矣請君無勤子服惠伯對曰君信蠻夷之訴以絶兄弟之國寡君聞命矣叔向曰寡君有甲車四千乗在雖以無道行之必可畏也况其率道何敵之有牛雖瘠僨加於豚上其畏不死乎禮記曲禮上曰國君下齊牛又曲禮下曰諸侯無故不殺牛又月令曰季春犧牲駒犢舉書其數在牧而書數秋當保内又曰季冬命有司岀土牛以示農耕之早晚又曲禮下曰天子􅀕天地諸侯􅀕山川大夫􅀕五祀士􅀕其先天子以犧牛諸侯以肥牛大夫以索牛又郊特牲曰郊所以明天道也帝牛不􅁻以爲稷牛帝牛必在滌三月稷牛惟具所以别事天神}
