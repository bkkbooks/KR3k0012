  - {type: variant, offset: 463, length: 3, content: 升乎𡺁, SBCK: 反制之可聽蹁轅則駃矣因從之遂爭長崇後知之殺所告者又曰王濟􅀍斥外於是乃移第北芒}
  - {type: variant, offset: 463, length: 0, content: '', WYG: 反制之可聼蹁轅則駃矣因従之遂争長崇後知之殺所告者又曰王濟被斥外於是乃移第北山下性豪侈麗服玉食時王愷以帝舅奢豪有牛名八百里駮嘗瑩其蹄角濟請以錢千萬與牛對射而賭之愷亦自恃其能令濟先射一發破的因據胡牀叱左右速探牛心來須臾而至一割便去又曰何曾性奢豪都官従事劉亨嘗奏以銅鉤黻紖車瑩牛蹄角後曾辟亨為掾勸勿應亨謂至公之體不以私憾遂應又曰桓温北伐過淮泗踐北境與諸寮屬登千乘樓矚中原慨然曰遂使神州陸沈百年丘墟王夷甫諸人不得不任其責袁宏曰運有廢興豈必諸人之過温作色謂四座曰頗聞劉景}
  - {type: page-break, offset: 463, content: '', id: KR3k0012_WYG_898-11b, image: WYG0901/WYG0901-0041b.png}
  - {type: page-break, offset: 463, content: '', id: KR3k0012_WYG_898-12a, image: WYG0901/WYG0901-0041c.png}
  - {type: variant, offset: 463, length: 0, content: '', krp: 反制之可聽蹁轅則駃矣因從之遂爭長崇後知之殺所告者又曰王濟𬒳斥外於是乃移第北芒山下性豪侈麗服玉食時王愷以帝舅奢豪有牛名八百里駮甞瑩其蹄角濟請以錢千萬與牛對射而賭之愷亦自恃其能令濟先射一發破的因據胡牀叱左右速探牛心來須臾而至一割便去又曰何曽性奢豪都官從事劉亨甞奏曾以銅鈎黻紖車瑩牛蹄角後曾辟亨爲掾勸勿應亨謂至公之體不以私憾遂應又曰桓温北伐過淮泗踐北境與諸寮屬登平乗樓矚中原慨然曰遂使神州陸沉百年丘墟王夷甫諸人不得不任其責袁宏曰運有廢興豈必諸人之過温作色謂四座曰頗聞劉景}
  - {type: variant, offset: 464, length: 4, content: 乎𡺁山未, WYG: 有千斤大牛噉芻豆十倍於常牛負重致逺曽不若一羸牸魏武入荆州以享軍士意以况宏坐}
  - {type: variant, offset: 464, length: 4, content: 乎𡺁山未, krp: 有千斤大牛噉芻豆十倍於常牛負重致逺曾不若一羸牸魏武入荆州以享軍志意以況宏坐}
  - {type: punctuation, offset: 467, content: ，, id: KR3k0012_CHANT_898-bkkpn134}
  - {type: 'tls:seg', offset: 467, content: '', id: KR3k0012_CHANT_898-7a.5}
  - {type: variant, offset: 467, length: 1, content: 未, SBCK: 下性豪侈麗服玉食時王愷以帝舅奢豪有牛名八百里駮甞瑩其蹄角濟請以錢千萬與牛對射而賭之愷亦自恃其能令濟先射一發破的因據胡牀叱左右速探牛心來須􅁷而至一割便去又曰何曽性奢豪都官從事劉亨甞奏曾以銅鈎黻紖車􅉷牛蹄角後曾辟亨爲􅁺勸勿應亨謂至公之體不以私憾遂應又曰桓温北伐過淮泗踐北境與諸寮屬登平乗樓矚}
  - {type: variant, offset: 469, length: 3, content: 路而忘, SBCK: 原􅁣然曰遂使神州陸沉百年丘墟王夷甫諸人不得不任其責􅀽宏曰運有廢興豈必諸人之過温作色謂四座曰頗聞劉景􅂛有千斤大牛噉芻豆十倍於常牛􅀒重致逺曾不若一羸牸魏武入荆州以享軍志意以況宏坐中皆失色又曰王延家中生一犢他人認之延牽與之􅀄無吝色其人後知其妄認送犢還延叩頭謝罪延以與之不取也又曰肅愼國武帝時及元帝中興皆來貢獻成帝時又通貢於石季龍四年方逹季龍問之荅曰每􅃸牛}
  - {type: page-break, offset: 469, content: '', id: KR3k0012_SBCK_898-7b}
  - {type: variant, offset: 469, length: 3, content: 路而忘, WYG: 皆失色又曰王延家中生一犢他人認之延牽與之初無憾色其人後知其妄認送犢還叩頭謝罪延以與之不取也又曰肅慎國武帝時及元帝中興皆來貢獻成帝時又通貢於石季龍四年方達季龍問之答曰毎候牛}
  - {type: variant, offset: 469, length: 3, content: 路而忘, krp: 皆失色又曰王延家中生一犢他人認之延牽與之𥘉無吝色其人後知其妄認送犢還延叩頭謝罪延以與之不取也又曰肅愼國武帝時及元帝中興皆來貢獻成帝時又通貢於石季龍四年方逹季龍問之荅曰每候牛}
