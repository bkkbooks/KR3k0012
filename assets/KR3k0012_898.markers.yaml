  - {type: variant, offset: 473, length: 3, content: 符子使, SBCK: 向西南眠者三年矣是知大國所在故來南史四夷傳曰扶乗國有牛角甚長以角載物至勝二十斛宋書曰禇湛之有一牛至所受無故墮㕔事前井湛之率左右躬自營救郡中喧擾彦回下簾不視又曰江湛爲吏部尚書性廉儉牛餓御}
