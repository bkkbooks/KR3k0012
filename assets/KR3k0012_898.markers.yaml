  - {type: variant, offset: 454, length: 0, content: '', SBCK: 非有愛也魏略曰鉅鹿時苗字胃爲壽春令始之官乗牸牛􅀊餘生一犢子及代留其犢而去晉書曰羊篇祜之姪也爲鉅平侯奉祜嗣篇歴官清愼有私牛於官舎産犢及還而留之張勃呉録地理志曰合浦徐聞縣多牛其項上有持骨大如覆斗日行三百里蜀志曰蔣琰曽夢門前有一牛頭血流問於趙直直曰牛角及口公字也血者事明也夢􅁻矣晉朝雜事曰泰康九年三月幽州上言塞北有死牛頭語于寳晉記曰南安朱冲其鄰人失犢}
  - {type: variant, offset: 454, length: 0, content: '', WYG: 非有愛也魏略曰鉅鹿時苗字稷為夀春令始之官乘牸牛嵗餘生一犢及代留其犢而去晉書曰羊篇祜之姪也為鉅平侯奉祜嗣篇歴官清慎有私牛於官舍産犢及還而留之張勃呉地理志曰合浦徐聞縣多牛其項上有特骨大如覆斗日行三百里蜀志曰蔣琰曽夣門前有一牛頭角及口而血流問於趙直直曰牛角及口公字也血者事明也夣吉矣晉朝雜事曰泰康九年三月幽州上言塞北有死牛頭語干寶晉記曰南安朱冲其鄰人失犢}
