  - {type: variant, offset: 578, length: 1, content: 精, WYG: 牛象鬭於江南北史曰後魏元仲景性嚴峭孝荘時兼御史中尉京師肅然毎向臺恒駕赤牛時人號赤牛中尉又曰魏婁提雄傑有識度僮僕千數牛馬谷量好周給士多歸附之又曰道武時窟咄冦南鄙莫題時二於帝遺箭於窟咄謂曰三嵗犢豈勝重載言窟咄長而帝少}
