  - {type: variant, offset: 3, length: 0, content: '', WYG: 五東鄰殺牛不如西鄰之禴祭又説卦曰坤為牛周書王㑹曰十盧紈牛紈牛者牛之大者大夏兹白牛數楚毎牛毎牛者牛之小者也詩無羊曰誰謂爾無牛九十其犉黄牛黑唇曰犉又曰爾牛來思其耳濕濕尚書曰武王尅紂放牛於桃林之野左傳成公七年鼷䑕食郊牛角改卜牛鼷䑕又食其角乃免牛又宣公三年經曰王正月郊牛之口傷改卜牛牛死乃不郊又僖上曰齊侯伐楚楚子使與師言曰君處北海寡人處南海唯是風}
