  - {type: variant, offset: 2077, length: 1395, content: 疋馬出戰還建鄴蜀使有五部兵家滇音顛池者識其馬色云是己亡父所乘對之流涕世語曰劉備屯樊城劉表禮焉憚其為人不甚信用曾諸宴會荊越蔡瑁欲因會取備備覺之偽如廁潛遁出行所乘馬名為的顱騎的顱走墮襄陽城西檀溪水中溺不得出備急曰的顱今日厄可不努力的顱乃一踴三丈遂得過異苑曰符堅為慕容冲所襲堅馳馬墮澗追兵幾及計無由出馬即踟躊臨澗垂控與堅堅不能及馬又跪而授焉堅攀之得登岸西走廬江七賢傳曰陳眾辟州從事楊州部有賊擊之多死眾請取之因單車乘白馬往賊束身歸降遂生為立祠號曰白馬從事竹林七賢論曰王戎簡脫不持儀形好乘巴𩥄馬雖為三司率爾私行巡省園田不從一人以手巾插腰戎故吏多至大官相逢戎輒下道避之搜神記曰昔秦人築城於武州塞內以備胡城將成而崩者數焉有馬馳走周旋反覆父老異之因依以築之為城乃定遂名為馬邑又曰吳先主殺武衛兵錢小小刑見大街顧借賃人吳永使永送書與桁南廟借木馬二疋以酒噀之皆成好馬鞍勒全耳志怪集曰孫弘常自云見鬼神與其言語委曲眾未之信鎮西將軍謝尚常所乘馬忽暴死會弘詣尚尚愛惜至甚弘謂尚曰我為公活馬何如尚常不信弘荅曰卿若能令此馬更生者卿真實通神矣弘於是便下床去良久還語尚曰廟神愛樂君馬故耳向我詣神請之初殊不許後乃見聽馬即便活尚時對死馬意甚不信怪其所言須臾其馬忽從門外走還眾咸見之莫不驚惋既至馬屍應時能動有頃奮迅呼鳴尚於是歎息述異記曰東平畢眾寶家在彭城有一驄馬甚快常乘出入至所愛惜宋大明六年眾寶夜夢見其亡兄眾慶曰吾有戎役方置艱危而無得快馬汝可以驄馬見與眾寶許諾既覺呼同宿客說所夢始畢仍聞馬倒聲遣人視之裁餘氣息狀如中惡眾寶心知其故為試治療向晨馬死眾寶還臥如欲眠聞眾慶語云向聊求馬汝治護備至將不惜之今以相還別更覔也至曉馬活食時復常續搜神記曰趙固常乘一疋赤馬以征戰甚所愛重常所繫看齋前忽腹脹少時死郭璞從北過因往詣之門吏云將軍馬今死甚愛惜今盛懊惋景純使語門吏云入通道吾能活此馬則必見我門吏聞驚喜即啟固固踊躍令門吏走迎之始交寒溫便問卿能活我馬不璞曰馬可活耳固忻喜即問須何方術璞云得卿同心健兒二三十人皆令持長竹竿於此東行三十里當有丘陵林樹狀若社廟有此者便以竿攪擾打拍之當得一物便急持歸既得此物馬便活矣於是命左右驍勇之士五十人使去果如璞言得大藂林有一物似猴而非走出人共逐得便抱持歸入門此物遙見死馬便跳梁欲往璞令放之此物便自走往馬頭間噓吸其鼻良久馬即起噴鼻奮迅鳴喚便不復見此物固厚資給璞得過江靈鬼志曰陳安為河間王顒給使甚壯健常樂一馬駿駃非常後馬死雙赤蛇出其鼻列異記曰胡司隸校尉上黨鮑子都少時舉上計於道遇一書生卒得心痛子都下車為按摩奄忽不知姓字有素書一卷銀十餅即賣一餅以資殯殮其餘以枕之素書著腹上埋之謂曰子若魂靈有知當令子家知子在此未至京師有驄馬隨之唯子都得近子都歸行失道遇一關內侯家住宿侯問曰君何以致此馬子都因說之侯乃驚愕曰此吾兒也侯迎喪開棺視銀書如言侯乃舉送詣闕上薦子都辟公府侍御史豫州牧司隸校尉至子永孫昱俱為司隸其在公皆復乘驄馬故京師歌之曰鮑氏驄三入司隸再入公馬雖瘦行步工傅玄乘輿馬賦曰往日劉備之初降也太祖賜之駿馬使自至廄選之歷名馬以百數莫可意者次至下廄有的顱馬委棄莫視瘦悴骨立劉備撫而取之眾莫不笑之馬超破蘇氏塢塢中有駿馬百餘疋自超已下俱爭取肥好者而將軍龐恩獨取一騧馬形觀既醜眾亦笑之其後劉備奔於荊州馬超戰於渭南逸足電發追不可逮眾乃服焉傅玄馳射馬賦曰耳小易使鼻大勢怒來往若鷹鷂超騰如逸虎劉琬馬賦曰吾有駿馬名曰騏雄龍頭鳥目麟腹虎胸尾如雲彗耳如插筒, SBCK: 八}
