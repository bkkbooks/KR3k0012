  - {type: variant, offset: 430, length: 0, content: '', WYG: 三色本白中青末豐也牛戴牛角直一牛也又地官上曰牛人掌養國之公牛以待國之政令公猶官也凡祭祀共其享牛永牛以授職人而芻之永牛禱於鬼神之牛謂所以祭者也永終也終事之牛謂所以繹者也宗廟有繹者孝子求神非一處職讀為樴樴謂之棧可繫牛樴人謂牧人凡賓客之事共其牢禮積膳之牛饗食賓射共其膳羞之牛軍事共其犒牛䘮事共其奠牛凡㑹同軍旅行役共其兵車之牛與其牽傍以載公任器牽傍在轅外輓牛也人御之居其前曰牽居其後曰旁任猶用也凡祭祀共其牛牲之互與其盆簝以待事鄭司農云謂楅衡之屬盆簝皆器名盆所以盛血簝受肉籠也互若}
