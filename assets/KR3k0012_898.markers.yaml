  body:
  - {type: variant, offset: 2, length: 1, content: 九, SBCK: 十牛上􅀃文曰牡畜父也從牛土聲犅古郎切特牛父也牝畜母也從牛匕聲犢牛子也牬普外切二歳牛也犙山耽切三歲牛也牭思貳切四歳牛也戒戒又音加騬牛也牻莫江切白黒雜毛牛也掠力強切牻牛也犡力制切牛白脊也逹胡切黃牛虎文也犖駮牛也㸹力拙切牛白脊也匹耕切牛文駮如星也犥普表切牛黃白色也犉而純切黃牛黒脣也攉音岳白牛也㹔居羊切牛}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 十牛上説文曰牡畜父也従牛土上聲犅古郎切特牛父也牝畜母也從牛七上聲犢牛子也牬普外切二嵗牛也犙山耽切三嵗牛也牭思貳切四嵗牛也犗介又音加騬牛也牻莫江切白黑雜毛也㹁力强切牻牛也犡力制切牛白脊也􅀈達胡切黄牛虎文也犖駿牛也㸹力掘切牛白脊也􅀈匹耕切牛文駮如星也犥普表切牛黄白色也犉而純切黄牛黑唇也㹊音岳白牛也㹔居羊切牛脊也􅀈音叨牛徐行也犨牛息聲也一曰牛名牷音全牛純色也􅀈音遶牛柔謹也廣志曰有犘馬象切牛出巴中重千斤犦蒲南切牛一曰犎牛亦音豹如橐駝水牛毛青腹大狀似猪有牧牛項上肉大如斗似橐駝行三百里犤音皮牛猶庳小今謂之稷牛又呼果下牛出廣州高凉郡犩吾威切牛如牛而大肉數千斤出蜀中犪牛重千斤晋時此牛出上庸郡犣力渉切牛旄牛也髀膝間有長毛花蹄牛髙六尺尾環繞角端有肉蹄如蓮花􅀈牛色黑或黄日南有之潜牛形狀似水牛一名􅀈音沈牛􅀈牛似鹿又似羊肉美牥音方牛如槖駝能行又有犛牛莊子曰其大若垂天之雲易大畜卦曰六四童牛之牿元吉又无妄卦曰六三无妄之災或繫之牛行人之得邑人之灾象曰行人得牛邑人災也又遯卦曰六二執之用黄牛之革莫之勝説象曰執用黄牛固志也又離卦曰離利貞亨畜牝牛吉又既濟曰}
