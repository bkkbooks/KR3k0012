  - {type: variant, offset: 455, length: 3, content: 玄子觀, krp: 冲犢相類來認取之冲不與爭後得之於堅冰之下慙謝冲冲不受王隱晉書曰朱冲字巨融少有德行隣人牛犯冲苗冲乃擔芻送牛牛主大慙不敢復暴又曰潘岳岀爲河陽令以仕次冝爲郎不得意出山濤領選岳内非之密作謡曰閣道}
  - {type: variant, offset: 459, length: 3, content: 海釋駟, SBCK: 有大牛王濟鞅裴楷鞦和嶠㓨促不得休又曰郭洗牛生犢兩頭八足晉陽秋曰武帝時有司奏御牛青絲紖斷詔可以青麻代之晉書曰郭舒嘗有郷人盗食舒牛事􅁴來謝舒曰卿飢所以食牛耳餘肉可共啖之丗以此服其􅀪量又曰夫餘國􅀂有軍事殺牛􅀕天以其蹄占􅁻凶蹄解者爲凶合者爲􅁻也又曰石崇與貴戚王愷奢靡相尚嘗與愷出遊爭入洛城崇牛迅􅀂飛禽愷絶不能及乃密貸其帳下問其所以對曰牛奔不迅良由御者逐之不及}
  - {type: page-break, offset: 459, content: '', id: KR3k0012_SBCK_898-7a}
  - {type: variant, offset: 459, length: 3, content: 海釋駟, WYG: 有大牛王濟鞅裴楷鞦和嶠刺促不得休又曰郭洗牛生犢兩頭八足晉陽秋曰武帝時有司奏御牛青絲紖斷詔可以青麻代之晉書曰郭舒嘗有鄉人盜食舒牛事覺來謝舒曰卿飢所以食牛耳餘肉可共啖之世以此服公𢎞量又曰夫餘國若有軍事殺牛祭天以其蹄占吉凶蹄解者為凶合者為吉也又曰石崇與貴戚王愷奢靡相尚嘗與愷出遊争入洛城崇牛迅若飛禽愷絶不能及乃密貸其帳下問其所以對曰牛奔不迅良由御者逐之不及}
  - {type: page-break, offset: 459, content: '', id: KR3k0012_WYG_898-11a, image: WYG0901/WYG0901-0041a.png}
  - {type: variant, offset: 459, length: 3, content: 海釋駟, krp: 有大牛王濟鞅裴楷鞦和嶠㓨促不得休又曰郭洗牛生犢兩頭八足晉陽秋曰武帝時有司奏御牛青絲紖斷詔可以青麻代之晉書曰郭舒嘗有郷人盗食舒牛事覺來謝舒曰卿飢所以食牛耳餘肉可共啖之丗以此服其弘量又曰夫餘國若有軍事殺牛祭天以其蹄占吉凶蹄解者爲凶合者爲吉也又曰石崇與貴戚王愷奢靡相尚嘗與愷出遊爭入洛城崇牛迅若飛禽愷絶不能及乃密貸其帳下問其所以對曰牛奔不迅良由御者逐之不及}
