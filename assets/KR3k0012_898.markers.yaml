  - {type: variant, offset: 2, length: 0, content: '', krp: 十牛上說文曰牡畜父也從牛土聲犅古郎切特牛父也牝畜母也從牛匕聲犢牛子也牬普外切二歳牛也犙山耽切三歲牛也牭思貳切四歳牛也戒戒又音加騬牛也牻莫江切白黒雜毛牛也掠力強切牻牛也犡力制切牛白脊也逹胡切黃牛虎文也犖駮牛也㸹力拙切牛白脊也匹耕切牛文駮如星也犥普表切牛黃白色也犉而純切黃牛黒脣也攉音岳白牛也㹔居羊切牛馬脊也音牛徐行也犫牛息聲也一曰牛名牷音全牛純色也牛音遶柔謹也廣志曰有靡犘牛馬象切牛出巴中千斤犦蒲角切牛一曰犁牛有赤豹封牛周留水牛毛青腹犬狀似猪有牧牛項上堆肉大如斗似槖駝日行三百里䆉音皮牛猶痺小今謂之稷牛又呼杲下牛出廣州髙凉郡犩吾威切牛如牛而大肉數千斤出蜀中夔牛重千斤晉時此牛岀上庸郡獵力渉切牛旄牛也髀膝尾間皆有毛花蹄牛髙六尺尾環繞角有四耳角端有肉蹄如蓮華堂牛色黒或黃日南有之潜牛形狀似水牛一名音沉牛麟牛似鹿又似羊肉羙牥音方牛如槖駞能行又有犛牛莊子曰其大若垂天之雲易大畜卦曰六四童牛之㸵元吉又無妄卦曰六三無妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也又遯卦曰六二執之用黃牛之革莫之勝說象曰執用黃牛固志也又離卦曰離利貞畜牝牛吉又旣濟曰}
