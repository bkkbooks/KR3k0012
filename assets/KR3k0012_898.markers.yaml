  - {type: variant, offset: 18, length: 1, content: 追, SBCK: 牛名牷音全牛純色也牛音遶柔謹也廣志曰有靡犘牛馬象切牛出巴中千斤犦蒲角切牛一曰犁牛有赤豹封牛周留水牛毛青腹犬狀似猪有牧牛項上堆肉大如斗似槖駝日行三百里䆉音皮牛猶痺小今謂之稷牛又呼杲下牛出廣州髙凉郡犩吾威切牛如牛而大肉數千斤出蜀中夔牛重千斤晉時此牛岀上庸郡獵力渉切牛旄牛也髀􅂰尾間皆有毛花蹄牛髙六尺尾環繞角有四耳角端有肉蹄如蓮華堂牛色黒或黃日南有之潜牛形狀似水牛一名音沉牛麟牛似鹿又似羊肉羙牥音方牛如槖駞能行又有􅏚牛莊子曰其大若垂天之雲易大畜卦曰六四童牛之㸵元􅁻又無妄卦曰六三無妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也又遯卦曰六二執之用黃牛之革莫之勝􅀃象曰執用黃牛固志也又離卦曰離利貞畜牝牛􅁻又旣濟曰九五東鄰殺牛不如西鄰之禴􅀕又􅀃卦曰坤爲牛周書王㑹曰卜盧紈牛紈牛者牛之小者大夏兹白牛數楚每牛牛之小者也大夏西北戎數楚北戎兹白牛野獸形似白牛詩鴻鴈無羊曰誰謂尔無牛九十其犉黄牛黑脣曰犉又曰尔牛來思其耳濕濕尚書曰武王尅紂放牛於桃林之野左傳成七年曰鼷䑕食郊牛角改卜牛鼷䑕又食其角乃免牛又宣三年經曰王正月郊牛之口傷改卜牛牛死乃不郊又僖上曰齊侯伐楚楚子使與師言曰君處北海寡人處南海唯是}
  - {type: page-break, offset: 18, content: '', id: KR3k0012_SBCK_898-1b}
  - {type: page-break, offset: 18, content: '', id: KR3k0012_SBCK_898-2a}
  - {type: variant, offset: 18, length: 2, content: 追風, WYG: 楚子為陳夏氏亂故伐陳殺夏徴舒因縣陳申叔時使於齊反命而退王使讓之曰夏徴舒為不道弑其君寡人以諸侯討而殺之汝獨不慶寡人何也對曰夏徴舒弑其君其罪大矣討而戮之君之義也抑人有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣諸侯之従君討有罪也今縣陳貪其富也無乃不可乎王曰善又成下曰韓厥曰古人有殺老牛莫之敢尸而况於君乎}
  - {type: page-break, offset: 18, content: '', id: KR3k0012_WYG_898-4b, image: WYG0901/WYG0901-0037d.png}
  - {type: variant, offset: 18, length: 3, content: 追風二, krp: 楚子爲陳夏氏亂故伐陳殺夏徴舒因縣陳申叔時使於齊反命而退王使讓之}
  - {type: punctuation, offset: 20, content: ，, id: KR3k0012_CHANT_898-bkkpn6}
