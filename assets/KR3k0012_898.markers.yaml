  - {type: variant, offset: 575, length: 0, content: '', WYG: 廐殺綸所乘駿馬又以兩角貫一馬復載之而行衝突營幕軍中驚亂蕭子顯齊書曰豫章文獻王嶷為揚州刺史拜陵還過延陵季子廟親沸井有水牛突部伍直兵執牛推問王不許取絹一疋横繫牛角放歸其家為治務存寛厚故得朝野忻後魏書曰邢昕以本官副李象使於梁昕好忤物人謂之牛是行也談}
