  - {type: 'tls:seg', offset: 601, content: '', id: KR3k0012_CHANT_898-10a.5}
  - {type: variant, offset: 602, length: 396, content: 天下駿足也名曰浮雲赤電絕群逸驃紫鷰騮綠螭驄龍子驎駒絕塵號為九逸又曰衛將軍生子或有獻騧馬者乃命其子為騧字叔馬東方朔傳曰驃騎難諸愽士朔對曰騏驎綠耳蜚鴻華騮天下良馬也將以捕鼠於深宮之中曾不如跛貓神異經曰西南大宛有馬其大二丈髯至𣍿尾委地蹄如升踠可握日行千里至日中而汗血乘者當以絮纏頭以避風病其國人不纏揚子法言曰或問治己曰治己以仲尼問治己何用益以用孔子之道或曰治己以仲尼奚寡矣言學孔子道多而成者何少也曰率馬以驥不亦可乎又曰希驥之馬亦驥之乘也希顏之人亦顏之徒也桓譚新論曰顏淵所以命短者慕孔子所以傷其年也若庸馬良馬相追至暮共列宿所良馬鳴食如故庸馬垂頭不復食何異顏淵與孔丘優劣又曰衛后園有送葬時乘輿馬十疋吏卒養視善飲不能乘而馬皆六十歲乃死又曰薛翁者長安善相馬者也於邊郡求得駿馬騎以入市去來人不見也後勞問之因請觀馬翁曰諸卿無目不足示也論衡曰儒書稱孔子與顏淵俱登魯東山望吳昌門謂曰爾何見曰見一疋練前有生藍孔子曰噫, krp: ''}
