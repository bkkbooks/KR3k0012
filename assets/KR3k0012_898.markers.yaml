  - {type: variant, offset: 1177, length: 5, content: 東方朔遊吉, SBCK: 牛􅀪有弟曰弼好酒而酗甞因醉射殺􅀪車牛􅀪來還宅其妻迎謂之曰叔射殺牛矣􅀪聞之無所恠問直荅云作脯坐定其妻又曰叔忽射殺牛大是異事􅀪曰巳知之矣顔色自􅀂讀書不輟其寛和如此又曰于仲文遷安固太守有任杜兩客各失牛後得牛兩家俱認州郡乆不能决益州長史韓伯儁曰于安固少聦察可令决之仲文曰此易解耳於是令二家各驅牛羣至乃放所認者遂向任氏羣中又隂使人微傷其牛任氏嗟惋杜家自若仲文於是訶杜氏杜氏服罪而去又曰盧愷從周武帝在}
