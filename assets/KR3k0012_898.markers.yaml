  - {type: variant, offset: 712, length: 344, content: 𣍿尾委地蹄如升踠可握日行千里至日中而汗血乘者當以絮纏頭以避風病其國人不纏揚子法言曰或問治己曰治己以仲尼問治己何用益以用孔子之道或曰治己以仲尼奚寡矣言學孔子道多而成者何少也曰率馬以驥不亦可乎又曰希驥之馬亦驥之乘也希顏之人亦顏之徒也桓譚新論曰顏淵所以命短者慕孔子所以傷其年也若庸馬良馬相追至暮共列宿所良馬鳴食如故庸馬垂頭不復食何異顏淵與孔丘優劣又曰衛后園有送葬時乘輿馬十疋吏卒養視善飲不能乘而馬皆六十歲乃死又曰薛翁者長安善相馬者也於邊郡求得駿馬騎以入市去來人不見也後勞問之因請觀馬翁曰諸卿無目不足示也論衡曰儒書稱孔子與顏淵俱登魯東山望吳昌門謂曰爾何見曰見一疋練前有生藍孔子曰噫此白馬盧芻使人視之果然王子年拾遺記曰周穆王即位巡行天下馭八龍之駿名曰絕地翻羽奔霄越影踰暉超光勝霧挾翼又曰曹洪與魏武帝, WYG: 淺儀}
