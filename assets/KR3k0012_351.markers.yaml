  - {type: variant, offset: 33, length: 1, content: 富, SBCK: 進戈者前其鐏徂悶切後其刃進矛㦸者前其鐓音隊後其銳鄭玄曰後刃敬也二兵鐓鐏雖在下猶為首銳底曰鐏取其鐏地也}
  - {type: variant, offset: 33, length: 1, content: 富, WYG: 進戈者前其鐏徂悶切後其刃進矛㦸者前其鐓音隊鄭𤣥曰後刃敬也二兵鐓鐏雖在下猶為首鋭底曰鐏取其鐏也}
  - {type: page-break, offset: 33, content: '', id: KR3k0012_WYG_351-2b, image: WYG0896/WYG0896-0144b.png}
  - {type: variant, offset: 33, length: 1, content: 富, krp: 進戈者前其鐏徂悶切後其刃進矛㦸者前其鐓音隊後其銳鄭玄曰後刃敬也二兵鐓鐏雖在下猶為首銳底曰鐏取其鐏地也}
  - {type: variant, offset: 35, length: 60, content: 城孝明帝時改為厭次此城東南五十里有蒲臺高丈八秦始皇所頓處時在臺下縈蒲繫馬夾道數百步到今蒲生猶縈馬蒲似水楊而勁堪為箭愽物志, SBCK: 底}
  - {type: variant, offset: 35, length: 2, content: 城孝, WYG: 底曰鐓取其鐓也又曰春夏學干戈秋冬學羽籥皆於東序干盾也戈句序㦸也干戈萬舞禹舞象舞也又曰能執干戈以衛社稷又曰賔牟賈侍坐於孔子孔子與之言及樂子曰夫樂者象成者也總干而山立武王之事也發揚而蹈厲太公之志也武亂皆坐周召之治也武王克商濟河而西倒載干戈苞以虎皮將帥之士使為諸侯名之曰建櫜又曰大夫士既殯而君往焉祝先升君即位于阼小臣二人執戈立于前二人立于後周禮曰旅賁氏掌執戈盾夾王車而趨左八人右八人車止則持輪䘮紀則衰葛執戈盾軍旅則介而趨又曰節服氏掌祭祀朝覲衮冕六人維王之太常郊祀裘冕二人執戈送逆尸從車鄭𤣥曰裘冕者亦從尸服也從尸車送迎之往來也又曰方相氏掌蒙熊皮執戈揚盾帥百𨽻而時儺以索室敺疫及墓入壙以戈撃四隅方良方良㒺良也又曰司戈楯掌戈楯之物而頒之祭祀授故士戈楯故士王族故士也與旅賁當事則衛王者也軍旅㑹同授二車戈楯建乗車戈楯授旅賁及虎士戈楯乘車王所乗車軍旅則革路會同則金路也又曰車謂之六等之數鄭𤣥曰六等之數法易之三才六畫也車軫四尺謂之二等人長八尺崇於戈四尺謂之三等殳長尋有四尺崇於人四尺謂之四等車㦸常崇於殳四尺謂之五等酋矛常有四尺崇於㦸四尺謂之六等又曰金有六齊四分其金則錫居一謂之戈㦸之齊又曰戈廣二寸内倍之胡三之援四之鄭𤣥曰戈今勾孑㦸也或者謂之鷄鳴或謂之擁頸也已倨則不入已勾則不决長内則折前短内則不疾鄭𤣥曰戈勾兵也主於胡已倨謂胡微直而和多以勾人則不入已勾為胡曲多也以啄人則創不決前謂援也内長則援短援短曲於磬折曲於磬折則引之於胡並勾内短則援長援長則倨於磬折倨於磬折則引之而不疾又曰廬人為廬噐戈柲六尺六寸殳長尋有四尺車㦸常酋矛常有四尺夷矛三尋鄭𤣥曰秘猶柄也八尺曰尋子倍尋曰常酋夷長短名也左傳曰晋公子重耳及齊齊桓公妻之公子安之姜曰行也懐與安實敗名公子不可姜與子犯醉而遣之醒以戈逐子犯又曰秦伐晋戰之}
