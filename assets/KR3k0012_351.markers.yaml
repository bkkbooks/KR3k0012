  body:
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 二戈易曰離爲戈兵又曰投戈散地則六親不能相保書曰武王至啇郊王左仗黃􅃏右秉白旄以麾曰逖矣西土之人稱􅈛戈比􅈛干立􅈛矛予其誓又曰武王伐紂戰於牧野前徒倒戈血流漂杵又曰成王崩太保命仲桓南宫毛孔安國日二臣桓毛名俾爰齊侯吕伋以二干戈虎賁百人逆子釗于南門之外又曰兊之戈和之弓垂之竹矢在東房兊和古之巧人又曰四人綦弁執戈上刃夾兩階戺}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 二戈易曰離為戈兵又曰投戈散地則六親不能相保書曰武王至商郊王左仗黄鉞右秉白旄以麾曰逖矣西土之人稱爾戈比爾干立爾矛予其誓又曰武王伐紂戰於牧野前徒倒戈血流漂杵又曰成王崩太保命仲桓南宫毛孔安國曰臣桓毛名二俾爰齊侯吕伋以二干戈虎賁百人逆子于南門之外又曰兌之戈和之弓垂之竹矢在東房兌和古之巧人又曰四人綦弁執戈上刃夾兩階戺}
