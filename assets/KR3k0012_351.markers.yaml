  - {type: variant, offset: 2522, length: 0, content: '', krp: 我好見之不知其}
  - {type: variant, offset: 2523, length: 2, content: 敢諫, SBCK: 異志故傷又曰晉平公有疾鄭伯使公孫僑如晉聘且問疾叔向問寡君之疾病卜人曰實沉臺駘爲祟此何神也子産曰昔髙辛氏有二子伯曰閼伯季曰實沈不相能也日尋干戈以相征討后帝不臧遷閼伯于啇丘主辰遷實沉于大夏主參又曰衛公孟縶狎齊豹公孟靈公兄也齊豹齊惡之子爲衛司㓂也奪之司㓂與鄄公孟惡北宫喜禇師圃欲去之公子朝通于襄夫人宣姜懼而欲以作亂故齊豹北宫喜禇師圃公子朝作亂公孟有事於盖獲之門外有事􅀕也盖獲衛郭門也齊氏帷於門外而伏甲焉使祝􅀛寘戈於車薪以當門華齊御公孟宗魯􅆖乗及閎齊氏用戈擊公孟宗魯以背蔽之中公孟肩殺之又曰吴入郢楚昭王渉睢濟江入于夢中王􅃦盗攻之以戈擊王王孫由于以背受之中肩又曰吴伐越越子句踐禦之陳于檇李靈姑浮以戈擊闔閭傷將指又曰齊人輸晉范氏粟鄭子姚子般送之范􅁻射逆之趙鞅禦之郵無恤御簡子衛太子爲右登鐵上鄭人擊趙簡子中肩斃于車中太子救之以伐鄭師北太子復伐之鄭師大敗又曰齊簡公即位與婦人飲酒于檀臺成子遷諸􅃦徙公使居正􅃦公執戈將擊之疑其欲作亂也太史子餘曰非不利也將除害也又曰晉荀瑶帥師伐鄭荀瑶智伯也鄭駟弘請救于齊􅀪駟歂子陳成子救鄭及濮雨不渉成子衣製杖戈製􅀨衣也立于阪上馬不出}
  - {type: page-break, offset: 2523, content: '', id: KR3k0012_SBCK_351-4b}
  - {type: page-break, offset: 2523, content: '', id: KR3k0012_SBCK_351-5a}
