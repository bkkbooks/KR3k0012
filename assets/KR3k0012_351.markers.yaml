  - {type: variant, offset: 14, length: 9, content: 拜賜鶉尾鶻尾髇許交, SBCK: 曰備乃弓矢鍜乃戈矛詩曰豈曰無衣與子同􅂁王于興師修我戈矛與子同仇豈曰無衣與子同澤王于與師修我矛㦸與子偕作又曰彼候人兮荷戈與祋毛萇曰候人道路送迎賔客者也荷揭也祋殳也祋丁外}
  - {type: variant, offset: 14, length: 9, content: 拜賜鶉尾鶻尾髇許交, WYG: 曰備乃弓矢鍛乃戈矛詩曰豈曰無衣與子同袍王于興師修我戈矛與子同仇豈曰無衣與子同澤王于興師修我矛㦸與子偕作又曰彼候人兮荷戈與祋毛萇曰候人道路送迎賔客者也荷掲也祋殳也音丁外}
  - {type: variant, offset: 14, length: 9, content: 拜賜鶉尾鶻尾髇許交, krp: 曰備乃弓矢鍜乃戈矛詩曰豈曰無衣與子同𫀆王于興師修我戈矛與子同仇豈曰無衣與子同澤王于與師修我矛㦸與子偕作又曰彼候人兮荷戈與祋毛萇曰候人道路送迎賔客者也荷揭也祋殳也祋丁外}
