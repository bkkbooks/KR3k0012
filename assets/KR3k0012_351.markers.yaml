  - {type: variant, offset: 1696, length: 264, content: 左執鞭弭右執櫜鞬以與君周旋橐受箭也後漢書曰董卓膂力過人雙帶兩鞬左右馳射方言曰所以藏箭謂之箙藏弓謂之鞬左氏傳云右屬橐鞬魏百官名曰三公拜賜魚皮步叉一貛皮鞬一琢菆金校步叉一金校豹皮鞬一射捍說文曰韝射臂㧺也三禮弓矢圖曰檖者臂捍以朱韋為之謂之檖者所以遂弦也括地圖曰羿年五歲父母與入山其母處之大樹下侍蟬鳴還欲取之群蟬俱鳴遂捐去羿為山間所養羿年二十能習弓矢仰天歎曰我將射遠方矢至吾門止因捍即射矢摩地截草經至羿門隨矢去管子曰桓公弋管仲隰朋朝公望二予弛弓脫捍而迎之魯連子曰弦銲音汗相第而矰矢得高焉專諸刺王僚闔廬乃名成焉彈廣雅釋器曰𢐂謂之彈𢐂音置字, WYG: 干戈森若}
