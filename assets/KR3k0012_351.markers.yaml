  - {type: variant, offset: 341, length: 1, content: 昔, WYG: 梗楊之巫臯他日見諸道與之言同巫亦夢見獻子與厲公訟巫曰今兹主必死若有事于東方則可以逞又曰晋侯伐齊范鞅門於雍門其御追喜以戈殺犬於門中又曰齊慶封好田而嗜酒與慶舍政舍慶封子盧蒲癸臣子之子之舍也與王何二人皆嬖使執寢戈而先後之寢戈親近兵代也嘗於太公之廟慶舍涖事臨祭事也麻嬰為尸為祭尸也盧蒲癸王何執寢戈慶氏以其甲環公宫盧蒲癸自後刺子之王何以戈撃之解其左肩猶援廟桷動於甍以俎壺投殺人而後死言其力多又曰鄭徐吾犯之妹美公孫楚聘之楚子南也公子黒又使强委禽焉禽鳥也委禽納雁也子南戎服入左右}
