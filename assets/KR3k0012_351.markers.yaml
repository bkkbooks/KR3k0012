  - {type: variant, offset: 2250, length: 903, content: 蒿矢彈丸之用魏書曰齊王芳為帝常喜以彈彈人魏書傳曰曹爽兄弟歸家勑洛陽縣發民八百人使尉部圍爽第四角作高樓令人在上望視爽計窮愁悶持彈到後園中樓上人便唱言故大將軍東行南行爽還廳事上矣晉安帝紀曰瑯㖿內史孫無終貪橫忍虐妓妾有忤意者輒彈其面蕭子顯齊書曰桓榮祖字華先下邳人榮祖善彈彈鳥毛盡而鳥不死海鵠群翔榮祖登城西樓彈之無不折翅而下崔鴻西秦錄曰辛進字國都隴西人建弘初為散騎常侍從乞伏熾盤遊于後園霄觀彈鳥丸傷暮末母之面至是末問母面傷之由母曰辛進彈鳥所傷末怒故誅之隋書曰長孫晟善彈有鳶群飛上曰公為我取之晟十發俱中並應丸而落賜賚極多韓詩外傳曰楚莊王將興師伐晉告大夫曰有敢諫者罪至死無赦孫叔敖進諫曰臣之園中有榆其上有蟬蟬方奮翼悲鳴欲飲清露不知螳蜋在後曲其頸欲擢而食之也螳蜋方欲食蟬而不知黃雀在後舉頭而欲音卓食之黃雀方欲食螳蜋不知童子挾彈丸在榆下仰而欲彈之童子方欲彈黃雀不知前有深坑後有掘株也此皆貪前之利不顧後害者也非獨昆蟲眾庶若此人主亦然楚國不殆而晉國以寧孫叔敖之力也西京雜記曰韓嫣音焉於騫武帝佞倖也作金丸人皆逐之長安為之語曰苦飢寒逐金丸異苑曰青溪小姑廟云是蔣侯第三妹廟中有大穀樹扶踈蔭瀆烏常產育其上太元中陳郡謝慶執彈乘馬激殺數頭至夜夢一女子衣裳楚楚怒云此鳥是我養何故見侵經年而謝卒慶名渙靈運父也幽明錄曰元嘉初散騎劉儁家在丹陽郡後嘗閑居而天大驟雨見門前有三小兒皆可六七歲相牽狡獪音儈而並不沾濡儁疑非人俄見共爭一瓠壺子儁引彈彈之正中壺霍然不見儁出人問前得一壺而泣曰此是小兒物不知何由在此儁具說之東方朔記曰東方朔對驃騎難曰以珠彈不如埿丸各有所用也莊子曰莊周遊乎雕陵之樊覩一異鵲自南方來翼廣七尺目大運寸而進集于栗林周曰何鳥哉執彈而留之覩一蟬方得美蔭而忘其身螗蜋執翳而搏之見得而忘其形異鵲從而利之見利而忘其真莊周怵然曰物固相累二類相招也指彈而射之虞人逐而訊之以周為盜栗又曰化予之左臂以為雞子因以求時夜浸假而化右臂以為彈余因以求鶚炙又曰以隋侯之珠彈千仞之雀以所用者重所要者輕大玄經曰明珠彈於飛害其得不傷潛夫論曰丁夫不傅犁鋤懷丸挾彈或取好土作丸賣之其彈外不可禦盜內不足禁鼷鼠妄彈鳥雀百發不得一反中人面目此無用而有害也世說曰前輩人忌曰唯不飲酒作, WYG: ''}
