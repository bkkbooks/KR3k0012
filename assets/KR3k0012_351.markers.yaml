  - {type: variant, offset: 3330, length: 3, content: 雙桐生, SBCK: 詰朝彈竹冠荷戈翦荒要應貞華覽曰萬夫决拾武􅀐齊足乗夷長森分行別属弓不虚彎戈不茍撲傳毅西征頌曰愠昆夷之匪恊咸矯於戎事干戈動而後戢天將祚而隆化崔駰北征頌曰人事恊兮皇恩得金精揚兮水靈伏順天機兮把刑德戈所指兮罔不尅張恊七命曰舉戈林竦揮鋒電滅仰傾雲巢俯殫地穴孔欣七誨曰擕同好命􅀲牙攝烏號杖雄戈縁山結網叅雲張羅殷融議曰自頃多難國度屢}
