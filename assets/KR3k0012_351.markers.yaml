  - {type: variant, offset: 2533, length: 3, content: 敖進諫, SBCK: 悝於厠強盟之孔氏專政故刼孔埋欲令逐􅂺漢書曰宣帝時美陽鼎獻之張敞好古文字案鼎銘勒而上議曰今鼎出於郊東中有刻書曰王命尸臣孟康曰尸主也官此㧦邑賜􅈛鸞旂黻琱戈尸臣拜手稽首竊以傳記言之鼎殆周之所以褒賜大臣也又曰武帝元鼎五年南越相吕嘉反遣歸義侯嚴爲戈舡􅀅軍張晏曰嚴故越人降義歸義侯越人於水中􅀒鑿鍳人舡又有蛟龍之害故置戈於下因以爲名也下離水晉書曰賈充傳云髙貴郷公之攻相府也充率衆拒戰於南闕軍將敗􅀐督成倅弟太子舎人濟問充曰今日之事當如何充謂曰公飬汝等正擬今日復何疑濟於是抽戈犯蹕崔鴻前趙録曰李景年字延祐前部人長平之戰劉聦馬中矢幾爲晉軍所獲景年以馬授聦揮戈前戰以功封梁鄒侯戰國䇿曰中山君饗都大夫羊羮不徧司馬子期怒而走於楚􅀃楚王伐中山中山君亡走有二人挈戈而隨中山君顧謂二人子奚爲者也二人對}
