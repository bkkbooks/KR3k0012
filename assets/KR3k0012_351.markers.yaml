  - {type: variant, offset: 915, length: 174, content: 調調張也矯直也擁抱也諸葛子曰若能力兼三人身與馬如膠漆手與箭如飛䖟誠宜寵異亢倉子曰勾粵之幹鏃以精金鷙隼為之羽以之掊箠則其與槁朴也無擇勾粵東粵幹似幹也鷙隼鵰鶚之類掊箠打擊也爾雅曰東南之美有會稽之竹箭焉夫勾越之幹以精金為鏃以隼翎羽之打擊則同於槁朴也無擇猶無異也及夫盪寇爭虔音衡覿武決勝加之彊弩之上則三百步之外不立敵矣排盪寇敵爭衡決勝如此勾粵之幹於強弩之上, SBCK: 巳倨}
