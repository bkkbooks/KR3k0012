  - {type: variant, offset: 423, length: 9, content: 溪見二蛟在水引弓射, WYG: 夏主參又曰衞公孟縶狎齊豹公孟靈公之兄也齊豹齊惡之子為衞司冦也奪之司㓂與鄄惡公孟北宫喜禇師圃欲去之公子朝通于襄夫人宣姜懼而欲以作亂故齊豹北宫喜禇師圃公子朝作亂公孟有事蓋獲之門外有事祭也盖獲衞郭門也徐氏帷於門外而伏甲焉使祝龜寘戈於車薪以當門華濟御公孟宗魯􅆖乗及閎齊氏用戈撃公孟宗魯以背蔽}
