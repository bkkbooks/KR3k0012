  - {type: variant, offset: 183, length: 231, content: 燋銅者有聲以物打之徐聽其聲得燋毒者偏鑿取以為箭鏑焦貢易林曰雙鳧俱飛以歸稻池經涉其澤為矢所射傷我胸臆劉向新序曰楚熊渠子夜行見寢石似伏獸射之飲羽異苑曰烏傷黃蔡義熙初於查溪岸照射見水際有物眼光徹其間相去三尺許形大如斗引弩射之應弦而中便聞從流奔驚波浪砰磕苦盍切不知所向經年與伴共至一處名為竹落崗盍先所二十許里有骨可長三丈餘見昔射箭貫在其中因語伴云此是我往年所射物乃死於斯拔矢而歸其夕夢見一長人責誚之曰我在洲渚之間無關人事而橫見殺害怨苦莫申連時覓汝今始相得眠寤仍患腹疾而殞, SBCK: ''}
