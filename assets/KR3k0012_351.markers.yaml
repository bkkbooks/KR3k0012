  - {type: variant, offset: 710, length: 14, content: 智伯將伐趙趙襄子召張孟談問之, SBCK: 大夫士旣殯而君徃焉祝先升君即位于阼小臣二人執戈立于前一人立于後周禮}
  - {type: variant, offset: 710, length: 0, content: '', WYG: 吳入郢楚昭王渉淮濟江入于夢中王寢盜攻之以戈王王孫子由以背受之中肩又曰吳伐越越子勾踐禦之陳于檇李靈姑浮以戈撃闔閭傷將指又曰齊人輸晋范氏粟鄭之姚子般送之范吉射逆之趙鞅禦之郵無恤御簡子衞太子為右登鐵上鄭人撃趙簡子中肩斃于車中太子救之以戈鄭師北太子後伐之鄭師大敗又曰齊簡公即位與婦人飲酒于檀臺成子請遷寢從公使居正寢公執戈將撃之疑其欲作亂也太史餘曰非不利也將除害也又曰晋荀瑤帥師伐鄭荀瑤}
  - {type: page-break, offset: 710, content: '', id: KR3k0012_WYG_351-7b, image: WYG0896/WYG0896-0146d.png}
  - {type: page-break, offset: 710, content: '', id: KR3k0012_WYG_351-8a, image: WYG0896/WYG0896-0147a.png}
  - {type: variant, offset: 710, length: 14, content: 智伯將伐趙趙襄子召張孟談問之, krp: 大夫士旣殯而君徃焉祝先升君即位于阼小臣二人執戈立于前一人立于後周禮}
  - {type: variant, offset: 712, length: 0, content: '', WYG: 也鄭駟𢎞請救于齊𢎞駟歂子陳成子救鄭及濮雨不渉成子衣製杖戈製雨衣也立于阪上馬不出者助之鞭之智伯聞之乃還畏其得衆心也曰我卜伐鄭不卜敵齊又曰衞良夫與太子蒯聵入舍於孔氏之外圃昏入適伯姬氏既入孔伯姬仗戈而先太子與五人分輿豭從之分被厚也廹叔悝於厠强盟之孔氏專政故劫孔悝欲令逐輙漢書曰宣帝時美陽得鼎獻之張敞好古文字案鼎銘勒而上議曰今鼎出於􅑢東中有刻書曰王命尸臣孟康曰尸主也官此栒邑賜爾鸞旂黼黻琱戈尸臣拜手稽首竊以傳記言之此鼎殆周之所以襃賜大臣也又曰武帝元鼎五年南越相吕嘉反遣歸義侯嚴為戈船}
  - {type: page-break, offset: 712, content: '', id: KR3k0012_WYG_351-8b, image: WYG0896/WYG0896-0147b.png}
  - {type: variant, offset: 713, length: 4, content: 伐趙趙襄, WYG: 軍張晏曰嚴故越人降為歸義侯越人于水中竊負人之船又有蛟龍之害故置戈於下因以為名也下灕水晉書曰賈充傳云髙貴鄉公之攻相府也充率衆拒戰於南關將軍散騎督成倅弟太}
