  - {type: variant, offset: 1150, length: 272, content: 雕弓右夏服之勁箭射雉賦曰昔賈氏之如皋始解顏於一箭醜夫為之改貌憾妻為之釋怨吳都賦曰其竹則篔于君切簹都郎切箖音吟箊音於桂箭射筩由梧有篁篻音瓢簩音勞有叢後漢李尤弧矢銘曰弦木為弧剡木為矢大恊并八極同紀晉江統弧矢銘曰幽都䈥角會稽竹矢率土名珍東南之美易以獲隼詩以殪兕伐叛柔服用威不韙梁昭明太子弓矢贊曰弓用䈥角矢製良工亦以觀德非止臨戎楊葉命中猨墮張空箭筒釋名曰箭萁受矢之器以皮曰箙扶福切柔服用之也織竹曰笮音幘相迫笮之名也說文曰蘭所以盛弩矢人所負也詩義問曰總所以覆矢也謂箭筒蓋也周禮夏官下司弓矢曰仲秋獻矢服菔盛矢器也獸皮為之也左傳曰公徒執冰而踞杜預注曰冰箭筒蓋, WYG: 者}
