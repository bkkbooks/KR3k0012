  - {type: variant, offset: 2922, length: 2, content: 異鵲, SBCK: 皷而士乘之畢盡也乗凌也簡子曰與吾得革車千乗也不如聞行人燭過之一言淮南子曰陽虎爲亂於魯魯君令人閉城門而捕之得者有賞失者夷族圍三匝矣陽虎將舉劒而}
  - {type: variant, offset: 2922, length: 2, content: 異鵲, krp: 皷而士乘之畢盡也乗凌也簡子曰與吾得革車千乗也不如聞行人燭過之一言淮南子曰陽虎爲亂於魯魯君令人閉城門而捕之得者有賞失者夷族圍三匝矣陽虎將舉劒而}
  - {type: variant, offset: 2925, length: 0, content: '', SBCK: 刎頸門者止之曰我將出子陽虎左持劒右提戈赴圍而走門者岀之陽虎旣出顧出之者以戈推之攘祛薄腋魯君聞陽虎失怒所岀之門以爲傷者戰􅋐者也不傷者爲縱之傷者受厚不傷者受重罪也此所謂害之而反利之者也又曰魯陽公與韓搆難戰酣日暮援戈而撝日日反三舎魯陽楚人也王之孫司馬期之子所謂魯陽文子也楚僣號稱王其守縣大夫皆稱公曰魯陽公今}
  - {type: variant, offset: 2925, length: 0, content: '', krp: 刎頸門者止之曰我將出子陽虎左持劒右提戈赴圍而走門者岀之陽虎旣出顧出之者以戈推之攘祛薄腋魯君聞陽虎失怒所岀之門以爲傷者戰鬪者也不傷者爲縱之傷者受厚不傷者受重罪也此所謂害之而反利之者也又曰魯陽公與韓搆難戰酣日暮援戈而撝日日反三舎魯陽楚人也王之孫司馬期之子所謂魯陽文子也楚僣號稱王其守縣大夫皆稱公曰魯陽公今}
  - {type: variant, offset: 2926, length: 4, content: 方來翼廣, SBCK: 陽魯是也五經要義曰國君及元率戎車將在中央當皷御者在左勇力之士執戈在後陸景典語曰戈刀雖備於執事而無所揚其鋒桓寛鹽鐵論曰匈奴處沙漠之中生不食之地如中國之麋鹿耳好事之臣求其義責之禮使中國干戈至今未息玄晏春秋曰七年春王正月乙酉予長}
