  - {type: variant, offset: 339, length: 1, content: 餘, WYG: 又曰晋敗齊於鞌頃公既免求逢丑父三入三出入于狄卒皆抽戈楯冒之以入于衞師免之遂自徐關入又曰晋楚戰於鄢陵范匄趨進匄士爕子曰塞井夷竈陣於軍中晋楚惟天所授何患焉文子執戈逐之曰國之存亡天也童子何知焉又曰晋胥童夷羊五帥甲八百將攻卻氏長魚矯請無用衆公使清沸魋助之沸魋嬖人也抽戈結祍祍裳也而偽訟者三郄將謀於謝謝講武堂也矯以戈殺駒伯苦成叔於其位駒伯郤錡苦成叔郄犨也温季曰逃威也遂趨郄至未奉君命故意欲禀命今魚矯等不以君命而來故欲逃也矯及其車以戈殺之皆尸諸朝又曰晋中行獻子將伐齊夢與厲公訟弗勝厲公獻子所殺公以戈撃之首墜於前跪而戴之奉之以走}
