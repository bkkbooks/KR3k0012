  - {type: variant, offset: 2526, length: 6, content: 罪至死無赦孫, SBCK: 助之鞭之智伯聞之乃還畏其得衆心也曰我卜伐鄭不卜敵齊又曰衛良夫與太子蒯聵入舎於孔氏之外圃昏入適伯􅁎氏旣食孔伯􅁎仗戈而先太子與五人分輿猳從之分披甲也迫}
  - {type: variant, offset: 2526, length: 6, content: 罪至死無赦孫, krp: 助之鞭之智伯聞之乃還畏其得衆心也曰我卜伐鄭不卜敵齊又曰衛良夫與太子蒯聵入舎於孔氏之外圃昏入適伯姬氏旣食孔伯姬仗戈而先太子與五人分輿猳從之分披甲也迫}
