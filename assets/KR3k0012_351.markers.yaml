  - {type: variant, offset: 1917, length: 361, content: 迎之魯連子曰弦銲音汗相第而矰矢得高焉專諸刺王僚闔廬乃名成焉彈廣雅釋器曰𢐂謂之彈𢐂音置字林曰彈行丸者又栟也栟使戰動掉彈也栟普耕切與枰同桂苑曰彈行丸弓也又作弓音彈開元文字曰引彈之謂行丸者也又彈栟也說文曰彈行丸也吳越春秋曰陳音對越王云弩生於弓弓生於彈彈生於古之孝子古者人民質朴死則裏以白茅投之中野孝子不忍父母為禽獸所食則作彈以守之故古人歌之曰斷竹屬木飛土逐肉遂令死者不犯鳥狐之殘也周禮曰凡句兵欲無彈刺兵欲無蜎注云句兵戈戟屬彈為掉也蜎狂左傳曰晉靈公不君從臺上彈人觀其避丸者穀梁曰靈公朝大夫而暴彈之也觀其避丸也暴戲暴之也漢書曰長安中姦猾浸多閭里多少年群輩殺吏受財報仇相與探丸為彈得赤丸者破武吏黑者斫文吏白者主治喪城中薄暮塵起剽劫行者死傷橫道張璠漢紀曰班超使于寘願將三十六人以為蒿矢彈丸之用魏書曰齊王芳為帝常喜以彈彈人魏書傳曰曹爽兄弟, SBCK: ''}
