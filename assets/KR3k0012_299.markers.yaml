  - {type: variant, offset: 92, length: 366, content: 漢書武紀曰建武元年春二月赦天下賜民爵一級年八十復二筭九十復甲卒張晏注云復甲卒不豫革車之賦也白虎通曰王命法三十受兵六十歸兵國有三軍何以誡非常伐無道尊宗廟重社稷安不忘危何以言有三軍也論語云子行三軍則誰與詩云周王于邁六師及之三軍者何法法天地人也以為五人為伍五伍為兩四兩為卒五卒為旅五旅為師師二千五百人二師為一軍三軍六師萬五千人也傳曰一人必死十人不能當百人必死千人不能當千人必死萬人不能當萬人必死橫行天下雖有萬人猶謙讓自以不足故復加五千人因法月數月群陰之長也十二月足以窮盡陰陽備物成功萬二千人亦足以征伐不義致天下太平穀梁傳曰天子六軍諸侯上國三軍次國二軍下國一軍諸侯所以一軍者何諸侯藩屏之臣也任兵革之重距一方之難故得有一軍也淮南子曰季武子為三軍為作也武子魯卿季文子之子季孫夙也周禮天子六軍諸侯大國三軍魯伯禽之封舊有三軍其後削弱二軍而已武子欲專, SBCK: 衛}
