  - {type: variant, offset: 2, length: 0, content: '', WYG: 三十練士兵衆隊伍練士通典搜才凡為將統戎在知士之器局當設科目差等優異應機而任以收其效曰選士之科沉謀宻畧出人者詞辯縱横能移奪人之性情堪辯説者能徃來聽言語覽視四方之事軍中之情偽日列於前者能得敵人之主佐門廬請謁之情堪間諜者能知山川險易行止形勢利害逺近井泉水草逕路迂直堪鄉導者巧思出人製造五兵及攻守噐械者引彊徹扎戈鋌劒㦸便於利用挺身捕虜搴旂斬將堪陥陣者趫揵若飛踰越城塹出入無形堪窺覘者徃返三百里不及暮至者破格舒鈎或負六百斤行五十歩四百斤行百歩者推歩五行瞻風雲氣候轉式多言天道詭説隂陽者此雖非兵家本事所要資權譎以取勝耳罪犯者父子兄弟破執讐者貧窮忿怒將欲快其志者故贅聓入虜欲昭迹揚名者長短經曰夫王者帥師必練簡英雄知士髙下因能授職各取所長為其股肱羽翼以伸威神然後萬事畢矣腹心一人主理繁應卒揆天消變摠撮計謀保國全命者也謀士五人主國安危謀慮未然論才能明賞罰受官位决嫌疑定可否者也天文三人主占星厯候風氣理時日考効驗占灾異知天心去就者也地利三人主軍行止形勢利害逺近險易水涸山阻而不失地利者也兵法九人主講論異同行事成敗練簡兵器凡軍陣所用利于兵法者也通粮四人主廣飲食宻蓄積通粮道致五穀令三軍不乏食用也奪威四人主擇才士諭兵馬風流電掣不識所由竒狀也鼓旂三人主佐旂鼔傳宣號令倐忽徃來出入若神股肱四人主出旂節任重持難修溝壍治壁壘回轉守禦者通才三人主拾遺補過集㑹術數周流並㑹應待賔客議論談語争息結解也權士三人主竒譎殊異非人所識行無窮之變也耳目七人主徃來聽言語覽視四方之事軍中之情偽日列於前也爪牙五人主揚威武激厲三軍冐也難死攻正令三軍勇猛羽翼四人主飛名譽震逺近動移四境以弱敵之心也游士八人主伺徴祥候開闔視敵人為謀者也偉士}
