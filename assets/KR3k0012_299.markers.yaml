  - {type: variant, offset: 39, length: 0, content: '', krp: 司戈掌戈盾之物而頒之軍旅㑹同授貳車戈盾建乗車戈盾授旅賁及虎士戈盾左傳曰彤弓虎賁文公受之以有南陽之田又曰組甲三百𬒳練三千史記曰蘇秦說韓惠王曰韓之卒勇𬒳堅帶甲利劒一人當百以大王之賢西面事秦爲天下笑漢書晁錯云陛下又興數千萬之衆以誅數萬之匈奴衆寡之計以一擊十之術也後漢書光武紀曰伯升拔宛巳三日而丗祖尚未知乃爲使書報城中宛已下兵到而佯墮其書㝷邑得之不喜諸將旣累捷膽氣益壯無不一當百後漢書曰光武起王莽遣大司徒王尋大司空王邑王莽時表章所獻金匱圖有王尋姓名王邑王南子於莽爲從父兄弟將兵百萬其甲士四十二萬人五月到潁川復與嚴尤陳茂合頴川郡今洛州陽瞿縣也又曰王元說隗囂曰今天水完冨士馬景強北取西河上郡東收三輔之地按秦舊迹表裏河山秦外山而内河元請以一九泥爲大王東封函谷關此萬代一時也又曰河南賊張歩據齊地耿弇討敗之歩肉袒負斧鑕於軍門鑕鍖也示必死鍖音砧鑕音質弇傳歩詣行在而勒兵入據其城樹十二郡旗鼔弇凢平城陽琅邪髙密膠東萊比海齊千乗濟山臨淄令歩兵各以郡人詣旗下衆尚十餘萬輜重七千餘兩皆罷遣歸郷里齊地悉平又曰建安中劉表爲荆州牧理今江陵郡也劉備時在荆州衆力尚少諸葛亮曰荆非少人也而著藉者寡平居發調即人心不恱凡有游户皆使自實因録以益衆可也備言其計故表衆遂強又曰百官志云節從武賁比二百石東觀漢記曰上賜馮異璽書曰聞吏士精銳水火不避購賞之賜必不令將軍負丹青失斷金也魏志曰張繡反襲太祖出戰不利輕騎引去典韋戰於門中賊不得入兵遂散從他門並入時韋校尚有十餘人皆殊死戰無不一當十前後至稍多韋以長㦸左右擊之左右死傷者略盡晉書曰桓玄使陶謙屯覆舟山劉毅至蔣山𥙿羸弱登山多張旗幟玄不之測𥙿與毅分爲數隊進突謙陣皆殊死戰無不一當百謙等諸軍一時奔散𥙿則劉𥙿也又職官志曰左衛將軍領熊渠武賁右衞將軍領佽飛武賁又天文志曰武賁一星在太微西蕃北下台南静室旄頭之騎官也徐爰宋書曰衆推髙祖爲盟主移檄京邑遇呉甫之主驍將也其兵甚銳髙祖躬執長刀徑入其陣衆皆披靡甫之進至羅落橋髙祖望賊旗鼓誓衆馳進挺劒指麾光曜如電將士皆莫敢仰視但馮神武爭爲先登殊死而戰無不一當百蕭方等三十國春秋曰陳安奔隴城前趙將劉賁馳將追之石虎止賁曰窮㓂歸兵不可迫也我士卒連勝皆巳怠矣以驕急之卒當致死之衆恐無萬全之利賁曰不然彼銳氣盡矣衆心乖沮人懷苟免莫有鬭志我卒乗猛氣甚盛皆一當十豈其衰沮之餘所能抗也賁躬先士卒戰輙敗之遂圍安于隴城又曰定陽人梁犢因民心怨趙也謀兵東還犢自稱大將軍率衆攻下辨尅之犢軍人皆多力善射一當十餘無兵甲所在略大斧施一丈柯攻戰若神擬向崩潰後魏書曰燕鳯甞使於符竪曰彼國人馬實爲多少鳯曰控弦之士數十萬見馬百萬疋堅曰卿言人衆可尔說馬太多是虚辭耳鳯曰雲中川自東山至西河二百里北山至南山百有餘里每歲孟秋馬常大集略爲滿川以此推之使人之言猶尚未盡堅厚加贈遺又曰宋遣沈攸之呉憘公領卒數萬從沂清而進欲援下邳尉元遣孔伯恭卒歩騎一萬以拒之并以攸之前敗軍人傷殘手足瘃兀膝行者盡送令還之又宫氏志曰太和中定品令有㦸楯武賁將軍有募貟武賁將軍有髙車武賁將軍又曰河北賊葛榮爲魏將尔朱榮所擒餘衆悉降以賊徒旣衆若即分割恐其疑懼或更結聚乃普告勒從所樂親屬相隨任所居止於是羣情喜恱登即四散數十萬衆一時散盡待出百里之外乃始分道押領隨便安置咸得其冝擢其渠帥量才授用新附者咸安時人服其處分機速三國典略曰蕭明王僧辨書曰凡諸部曲並使招携投赴戎行前後雲集霜戈電㦸無非武庫之兵龍甲犀渠皆是雲臺之仗莊子曰䈥力之士矜難勇敢之士奮忠兵革之士樂戰文選曰雲屯七萃士魚麗六郡兵又曰士馬精研陸士衡辨亡論曰于時雲興之將帶州焱起之師跨邑哮闞之羣風驅熊羆之士霧集又曰夫曹劉之將非一丗所選向時之師無曩中之衆又曰孫子荆爲石仲容與孫皓書云今百僚濟濟俊乂盈庭虎臣武將折衝萬里國冨兵強六軍精練隊伍太白隂經曰陽隊起一至九隂隊起九至一隊有五十人}
