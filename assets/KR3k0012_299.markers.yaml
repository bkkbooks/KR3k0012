  - {type: variant, offset: 1772, length: 1550, content: 二禆為軍三千二百人有將軍副將軍唐書曰高祖起義兵命太宗將兵徇西河郡下之癸巳建大將軍府以裴寂為長史劉文靜為司馬具設官屬始置三軍分為左右以公子建成為隴西公左領大都督左三軍悉隸焉命太宗為燉煌公右領大都督右三軍悉隸焉開倉庫以賑窮乏遠近響應又曰高祖二年秋七月壬申詔曰天生五材司物資其器用武有七德撥亂所以定功故黃帝垂衣尚有阪泉之戰放勛光宅猶稱丹浦之師禁暴安人率由茲道創業垂統莫此為先以是周置六軍每習蒐狩漢增八校畢選驍勇故能化行九有威震百蠻奸宄不興虔劉息志季葉凌替軍政湮亡卒利不修旌旗舛雜部伍符籍空有調發之名逗撓之興竟無討襲之用遂使夷狄放命盜賊交侵戰爭多虞黔黎殄喪朕受天明命撫育萬方爰自義師克成帝業至如超乘之士莫匪百金彀騎之材豈惟七萃今雖關塞寧謐荒裔肅清伊洛猶蕪江湖尚梗役車未息戎馬載馳武備之方尤宜精練所以各因部校序其統屬改授鋋鼓創造徽章取象天官定其名號庶使前茅後勁類別區分玉帳絳宮刑德允備蹈茲湯火譬彼椒蘭大定戎衣止戈斯在於是置十二軍分關內諸府以隸焉萬年道為參旗軍長安道為鼓旗軍富平道為玄戎軍醴泉道為井鉞軍同州道為羽林軍華州道為騎官軍寧州道為折威軍歧州道為平道軍幽州道為招搖軍西麟道為苑游軍涇州道為天紀軍宜州道為天節軍時高祖以天下未定實資武力將舉關中之眾以臨四方故興此制也每軍一人副一人取威名素重者為之督以耕戰之務自是士馬精強無敵於天下矣五代周史曰顯德初世宗自高平還乃大閱帝親臨之帝自高平之役覩諸軍未甚嚴整遂有退却至是命太祖皇帝一概簡閱選武藝超絕者署為殿前諸班因是有散員散指揮內殿直散都頭鐵騎控鶴之號復命揔戎者目龍捷虎捷以降一一選之老弱羸小者去之諸軍士伍無不精當由是兵甲之盛近代無比偏將尚書曰司馬掌邦政統六師平邦國左傳曰趙朔趙嬰齊為中軍大夫鞏朔韓穿為上軍大夫荀息趙同為下軍大夫韓厥為司馬又曰晉侯請於王戊申以紱冕命士會將中軍且為太傅命卿之服於是晉國之盜逃奔于齊又曰楚子北師次于郔沈尹將中軍子西將左子反將右將飲馬於河而歸又曰魯宣公十年夏六月晉師救鄭荀林父將中軍先縠佐之士會將上軍郄克佐之趙朔將下軍欒書佐之公羊曰秋衛師入盛昌為或言帥師或不言帥師將尊師少稱將將卑師眾稱師論語曰王孫賈治軍旅奚其喪衛靈公無道得賈免喪也史記項羽本紀曰於是梁為會稽守籍為裨將又曰項王召宋義與計事而大說之因置以為上將軍項羽為魯公為次將范增為末將又灌嬰傳曰嬰擊陳狶受詔別攻狶丞相侯敝斬敝及特將五人文穎注云特一之將後漢書西域傳曰大秦國一名梨鞬所治城周百餘里各有官曹文書置三十六將皆會議國事晉書曰張光字景武江夏鐘武人也身長八尺明眉目美音聲少為郡吏家世有部曲以牙門將伐吳有功遷江夏西部都尉又曰羊祜在軍常輕裘緩帶身不被甲鈴閣之下侍衛者不過十數人而頗以田漁廢政嘗欲夜出軍司徐胤執棨當營門曰將軍都督萬里安可輕脫將軍之安危亦國家之安危也胤今日若死此門乃開耳祜改容謝之此後稀出矣又曰吾彥為小將級吳大司馬陸抗抗奇其勇略將拔用之患眾情不允乃會諸將密使人佯狂拔刀跳躍來坐諸將皆懼而走惟彥不動舉几拒之眾服其勇乃擢用焉又天文志曰太白為上將羽林為中軍又曰文昌六星在北斗魁前天府之六星也一曰上將建武威二曰次將尚書中書司隸賞功也又曰郎將位北主閱旗所以為武備也又曰畢八星主邊兵弋獵其大星曰天高一曰邊將又曰參白獸之體其中三星橫列三將也北曰左肩主左將西北曰右肩主右將故黃帝占參應七將七將大天下兵精又曰南三星騎陣將軍騎將也南三星車騎車騎之將也又曰狼一星在東南狼為野將主侵掠也色有常欲不動也後周書曰賀拔岳事爾朱榮以定策功授前將軍時万俟醜奴僭稱大號關中騷動朝廷深以為憂榮將遣岳討之岳私謂其兄勝曰醜奴擁秦隴之兵足為勍敵若岳往而無功罪責立至假克定恐讒愬生焉勝曰汝欲何計自安岳曰請爾朱氏一人為元帥岳副貳之則可矣勝以為然乃請於榮榮大悅乃以天光為雍州刺史以岳為衛將軍左都督隋書曰大業九年徵天下兵募民為驍果置, WYG: ''}
