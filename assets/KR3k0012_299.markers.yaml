  - {type: variant, offset: 1120, length: 342, content: 大夫百人為卒卒長皆上士二十有五人為兩兩司馬皆中士五人為伍伍皆有長軍師旅卒兩伍皆眾名伍一比兩一閭卒一旅旅一黨師一州軍一卿家所出人也按司馬法二十五人為兩四兩為卒百人也五卒為旅五百人五旅為師二千五百人五師為軍一萬二千三百人萬二千象十有二月五百象閏管子言於齊桓公曰欲正卒伍脩兵甲則大國亦將為之君有征戰之事則小國有守圍之備矣公欲速得意於天下諸侯則事有所隱而政有所寓不顯習於兵事故曰事有所隱軍政寓之田獵故有所寓公作內政而寓軍令焉三分齊國為高子之里為國子之里為公之里以為三軍擇其賢民使為里君每里皆使賢者為君鄉有行伍卒長則有制令且以田獵因以賞罰因曰獵之功過寄行賞罰則百姓通於軍事矣於是乃制五家以為軌軌為之長十軌為里里有司四里為連連為之長十連為鄉鄉有良人以為軍令是故五家為軌故五人為軌軌長率之十軌為里故, SBCK: 等}
