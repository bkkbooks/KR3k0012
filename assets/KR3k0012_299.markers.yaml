  - {type: variant, offset: 459, length: 311, content: 室故欲益中軍為三三家各征其一事在魯哀公十一年叔孫穆子曰不可天子作師公帥之以征不德師謂六軍之眾公謂諸侯為王卿士者為元帥也元侯作師卿帥之以承天子元侯大國之君師三軍之眾大國三卿皆命於天子一卿命於其君無軍無三軍也若元侯有事則命卿帥其所教武衛之士以佐元侯禮所云次國二軍小國一軍謂以賦出軍從征伐贊佐也自伯子男有大夫無卿無卿無命卿也王制小國二卿皆命於其君也帥賦以從諸侯賦國中出兵車甲士以從大國諸侯是以上能征下無姦慝征正慝惡今我小侯也言小侯削弱之日久矣處大國之間大國齊楚繕貢賦以共從猶懼有討猶懼以不給見誅討若為元侯之所之所謂作三軍元帥所為以怒大國無乃不可乎弗從遂作中軍中者明己有上下軍自是齊楚代討於魯代更襄昭皆如楚襄公昭公如楚朝事楚也穰苴, SBCK: ''}
