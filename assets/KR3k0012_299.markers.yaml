  - {type: variant, offset: 2439, length: 883, content: 士伍無不精當由是兵甲之盛近代無比偏將尚書曰司馬掌邦政統六師平邦國左傳曰趙朔趙嬰齊為中軍大夫鞏朔韓穿為上軍大夫荀息趙同為下軍大夫韓厥為司馬又曰晉侯請於王戊申以紱冕命士會將中軍且為太傅命卿之服於是晉國之盜逃奔于齊又曰楚子北師次于郔沈尹將中軍子西將左子反將右將飲馬於河而歸又曰魯宣公十年夏六月晉師救鄭荀林父將中軍先縠佐之士會將上軍郄克佐之趙朔將下軍欒書佐之公羊曰秋衛師入盛昌為或言帥師或不言帥師將尊師少稱將將卑師眾稱師論語曰王孫賈治軍旅奚其喪衛靈公無道得賈免喪也史記項羽本紀曰於是梁為會稽守籍為裨將又曰項王召宋義與計事而大說之因置以為上將軍項羽為魯公為次將范增為末將又灌嬰傳曰嬰擊陳狶受詔別攻狶丞相侯敝斬敝及特將五人文穎注云特一之將後漢書西域傳曰大秦國一名梨鞬所治城周百餘里各有官曹文書置三十六將皆會議國事晉書曰張光字景武江夏鐘武人也身長八尺明眉目美音聲少為郡吏家世有部曲以牙門將伐吳有功遷江夏西部都尉又曰羊祜在軍常輕裘緩帶身不被甲鈴閣之下侍衛者不過十數人而頗以田漁廢政嘗欲夜出軍司徐胤執棨當營門曰將軍都督萬里安可輕脫將軍之安危亦國家之安危也胤今日若死此門乃開耳祜改容謝之此後稀出矣又曰吾彥為小將級吳大司馬陸抗抗奇其勇略將拔用之患眾情不允乃會諸將密使人佯狂拔刀跳躍來坐諸將皆懼而走惟彥不動舉几拒之眾服其勇乃擢用焉又天文志曰太白為上將羽林為中軍又曰文昌六星在北斗魁前天府之六星也一曰上將建武威二曰次將尚書中書司隸賞功也又曰郎將位北主閱旗所以為武備也又曰畢八星主邊兵弋獵其大星曰天高一曰邊將又曰參白獸之體其中三星橫列三將也北曰左肩主左將西北曰右肩主右將故黃帝占參應七將七將大天下兵精又曰南三星騎陣將軍騎將也南三星車騎車騎之將也又曰狼一星在東南狼為野將主侵掠也色有常欲不動也後周書曰賀拔岳事爾朱榮以定策功授前將軍時万俟醜奴僭稱大號關中騷動朝廷深以為憂榮將遣岳討之岳私謂其兄勝曰醜奴擁秦隴之兵足為勍敵若岳往而無功罪責立至假克定恐讒愬生焉勝曰汝欲何計自安岳曰請爾朱氏一人為元帥岳副貳之則可矣勝以為然乃請於榮榮大悅乃以天光為雍州刺史以岳為衛將軍左都督隋書曰大業九年徵天下兵募民為驍果置, SBCK: ''}
