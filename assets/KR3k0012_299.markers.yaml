  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 三十練士兵衆隊伍練士通典搜才曰凡爲􅀅統戎在知士器用當設目差等優異應機而任以收其效選士之科沉謀密略出人者詞辨從衡能移奪人之性情堪辨􅀃者能徃來聽言語覽視四方之事軍中之情僞日列於前者能得敵之主佐門廬請謁之情堪間諜者能知山川險易行止形勢利害逺近井泉水草逕路迂直堪郷導者巧思出人制造五兵及攻守器械者引強敵撤扎戈鋋劒㦸便於利用挺身捕虜搴旗斬將堪䧟陣者趫捷􅀂飛踰城越塹出入無形堪窺覘者徃返三百里不及暮至者破格舒鈎或負六百斤行五十歩四百斤行百歩者推歩五行瞻風雲氣􅀱轉或多言天道詭􅀃隂陽者此雖非兵家本事所要資權譎以取勝耳罪犯者父子兄弟欲執仇者貧窮忿怒將欲快其志故贅聓人虜欲昭迹楊名長短經曰夫王者帥師必簡練英雄知士髙下因能授職各取所長爲其股肱羽翼以成威神然後萬事畢矣腹心一人主淵泉應卒揆天消变緫樶計謀保國全命者也謀士五人主國安危豫慮未然諭才能明賞罰授官位决嫌疑定可否者也天文三人主占星暦候風氣理時日考符驗效災異知天心去就者也地形三人主軍行上形􅀔利害逺近險昜水涸山阻不失地利者也兵法九人主講論異同行事成敗簡練兵器凢軍陣所用刺舉非法者也通粮四人主廣飲食密蓄積通粮道致五榖令三軍不困乏食也奮威四人主擇材士諭兵馬風流電掣不失所由竒􅃺也鼔旗三人主左鼓旗符節號令倐忽徃來出入若神股肱四人主出旌扞任重持難修溝塹治壁壘四轉守禦者通才三人主拾遺􅀘過集㑹術數周流並㑹應偶賔客議論談語消息結解也權士三人主竒譎殊異非人所識行無窮之變也耳目七人主徃來聽言語覽視四方之事軍中之情僞日列於前也爪牙五人主揚威武激厲三軍冒難死攻令三軍勇猛也羽翼四人主飛名譽震逺近動移四境以弱敵心也游士八人主祠徵祥􅃸開闔視敵人爲謀者也偉士}
