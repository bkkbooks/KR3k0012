  - {type: variant, offset: 1954, length: 407, content: 為先以是周置六軍每習蒐狩漢增八校畢選驍勇故能化行九有威震百蠻奸宄不興虔劉息志季葉凌替軍政湮亡卒利不修旌旗舛雜部伍符籍空有調發之名逗撓之興竟無討襲之用遂使夷狄放命盜賊交侵戰爭多虞黔黎殄喪朕受天明命撫育萬方爰自義師克成帝業至如超乘之士莫匪百金彀騎之材豈惟七萃今雖關塞寧謐荒裔肅清伊洛猶蕪江湖尚梗役車未息戎馬載馳武備之方尤宜精練所以各因部校序其統屬改授鋋鼓創造徽章取象天官定其名號庶使前茅後勁類別區分玉帳絳宮刑德允備蹈茲湯火譬彼椒蘭大定戎衣止戈斯在於是置十二軍分關內諸府以隸焉萬年道為參旗軍長安道為鼓旗軍富平道為玄戎軍醴泉道為井鉞軍同州道為羽林軍華州道為騎官軍寧州道為折威軍歧州道為平道軍幽州道為招搖軍西麟道為苑游軍涇州道為天紀軍宜州道為天節軍時高祖以天下未定實資武力將舉關中之眾以臨四方故興此制也每軍一人副一人取威名素重者為之督以耕戰之務自是士馬精強無敵於天下矣五代周史曰顯德初世宗自高平還乃大閱帝親臨之帝自高平之役覩, SBCK: ''}
