  - {type: variant, offset: 10, length: 2, content: 六十, SBCK: 冒將之士有勃氣壯勇􅁀強者聚爲一卒名曰䧟陣之士有學於竒正長劒琱弧接武齊列者聚爲一卒名曰銳􅀐之士有破格舒鈎強梁多力能潰破金鼔絶滅旗旌者聚爲一卒名曰勇力之士有能踰髙超逺輕足善走者聚爲一卒名曰冠兵之士有故王臣失勢欲復見其功者聚爲一卒名曰死􅃲之士有死罪之人昆弟爲其將報讎者聚爲一卒名曰死責之士有貧窮忿怒將快其志者聚爲一卒名曰必死之士有故贅聓人虜欲昭迹揚名者聚爲一卒名曰厲頓之士有辯言巧辭善毁譽者聚爲一卒名曰間諜飛言弱敵之士有故咠靡免罪之人欲逃其恥者聚爲一卒名曰幸用之士有材􅇊過人能負重行數百里者聚爲一卒名曰待令之士夫卒強將弱曰陁音豕吏強卒弱曰䧟兵無選鋒曰北必然之數矣故曰兵衆孰強士卒孰練知之者勝}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_SBCK_299-2b}
  - {type: variant, offset: 10, length: 2, content: 六十, WYG: 冐將之士有勃氣壮勇强暴者聚一為卒名曰䧟陣之士有學於長劍􅿹弧接武齊列者聚為一卒名曰銳竒之士有破格舒鈎强梁多力能潰破金鼓絶㓕旂旌者聚為一卒名曰勇力之士有能踰髙超逺輕足善走者聚為一卒名曰冠兵之士有故王臣失勢欲復見其功者聚為一卒名曰死闘之士有死事之人昆弟為其將報讐者聚為一卒名曰死貴之士有貧窮忿怒将快其志者聚為一卒名曰必死之士有故贅聓入虜欲昭迹揚名者聚為一卒名曰厲頓之士有辯言巧辭善毁譽者聚為一卒名曰間諜飛言弱敵之士有故激厲免罪之人欲逃其恥者聚為一卒名曰幸用之士有才伎過人能負重行百里者聚為一卒名曰待令之士夫卒强將弱曰陁音豕吏强卒弱曰䧟兵無選鋒曰北必然之勢矣故曰兵衆勢强士卒熟練知之者勝}
