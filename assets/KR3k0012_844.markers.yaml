  - {type: variant, offset: 3105, length: 1, content: 酺, SBCK: 纉爲湘州刺史􅀄呉興呉規頗有才學邵陵王綸引爲賔客深相禮遇及綸作牧郢藩䂓隨從江夏遇纉岀之湘鎮路經郢服綸餞之南浦纉見䂓在坐意不能平忽舉盃曰呉䂓此酒慶汝得陪今宴䂓尋起還其子翁孺見父不恱問而知之翁孺因氣結尓夜便卒䂓恨纉悲慟而憤哭兼至信次之間又殞䂓妻深痛夫子翌日又亡時人爲張纉一盃酒殺呉氏三人南史曰南海有頓遜國在海﨑上有酒樹似安石榴採其花汁停瓮中數日而成酒後魏書曰太宗引崔浩論事語至中夜太宗大悅賜浩縹醪酒十斛水精戎塩一兩曰朕味卿言􅀂塩酒故與卿同其味也又曰髙允􅀍勑論集往丗酒之敗德以爲酒訓孝文覽而恱之又曰胡􅅱少􅀌毎言及父母則淚下􅀂孺子之號春秋常􅀕之前則先求旨酒時燉煌汜潜家善釀酒毎節送一壷與􅅱論者以潜爲君子又李元忠拜南趙郡太守好酒無政績及莊帝崩弃官潜圖義舉㑹齊神武東岀元忠便乗露車載濁酒以奉迎神武聞其酒客未即見之元忠下車獨坐酌酒擘脯食之謂門者曰夲言公招延豪傑今聞國士到門不能吐哺輟洗其人可知還吾刺勿復通也門者以告神武遽見之又曰齊神武自太原來朝見朱遊道曰此人是遊道邪常聞其名今日始識其面遷遊道別駕後日神武之司州饗朝士舉觴屬遊道曰飲髙歡手中酒者大丈夫卿之爲人合飲此酒又曰魏帝宴華林園謂神武曰自頃所在百司多有貪􅁀朝􅋝中有能公平直言彈劾不避親戚者王可勸酒神武降階跪言唯御史中尉崔暹一人謹奉明旨敢以酒勸并臣所射賜物千叚乞以廻賜帝又褒美之又曰劉藻字彦先父宗之廬江太守涉獵群籍美談􅀏善與人交飲酒至一石不亂藻爲平東別將辭於洛水之南孝文曰興卿石頭相見藻對曰臣}
