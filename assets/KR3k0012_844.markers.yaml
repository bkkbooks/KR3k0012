  - {type: variant, offset: 2868, length: 7, content: 歐陽歙請郅惲為, SBCK: 豫州刺史二十餘年有勲方岳及鎮淮南呉人憚之􅀂不如所表將爲所闘可令還朝問以方事以察之帝從之寵旣至進見飲酒至一石不亂帝慰勞遣還又曰華歆能劇飲至石餘不亂衆人微察常以其整衣冠爲異又曰烏桓東胡俗能作白酒而不知作麴蘖常仰中國九州春秋曰曹公制酒禁而孔融書嘲之曰夫天有酒旗之星地列酒泉之郡人有旨酒之德故堯不先千鍾無以成其聖且桀紂以色亡國今令不禁㛰姻也太祖外雖寛容之内不能平御史大夫郄憲知旨以免融官呉志曰孫權於武昌臨釣臺飲酒大醉令人以水灑群臣曰今日酣飲唯醉墮臺中乃當止耳張昭正色不言出外車中坐權遣人呼昭還謂曰爲共作樂耳公亦何爲怒乎昭對曰昔紂爲糟丘酒池長夜之飲當時亦不以爲惡也權黙然有慙色又曰孫權常令中書郎詣頋雍有所咨訪􅀂合雍意事可施行即與相反覆究而論之爲設酒食如不合意雍即正色改容黙然不言無所施郎退造權曰頋公歡恱是事合冝也其不言者是事未平也􅀌當重思之其見敬信如此又曰孫權嘗命諸􅁑恪行酒至張昭前昭先有酒色不肯飲曰此非養老之禮也權曰卿其能令張公辭屈乃當飲之耳恪難昭曰昔師尚父九十擁旌仗􅃏猶未告老也今軍旅之事將軍在後酒食之事將軍在先何謂不養老也昭卒無辭遂爲盡爵又曰曹公出濡湏甘寧爲前部督受勑斫敵前營權特賜米酒衆肴寕刀特賜手下百餘人食之畢寕先以銀盌酌酒自飲兩盌乃酌與其都督不時肯持寕引刀置􅂰上呵謂之曰卿見知於至尊孰與甘寕尚不惜死卿何以獨惜死都督見寕色厲即起拜持酒及通酌兵各一兩盌至二更時銜枚出斫敵敵驚動遂退寕益貴重又曰孫皓毎饗宴無不竟日坐席無能不率以七升爲限雖不悉入口皆澆灌取盡韋曜素飲酒不過二􅂛􅀄見禮異時常爲裁減或宻賜茶茗以當酒至於寵衰更見逼強輙以爲罪又於酒後使侍臣難折公卿以嘲弄侵尅發擿私短以爲歡􅀏焉又曰笮融督廣陵運漕大起浮圗祠每浴佛多設酒飯布席於路經數十里民人來觀及就食且萬人費以巨万計蜀志曰簡雍拜昭德將軍時天旱禁酒釀者有刑吏於人家索得釀具論者欲令與作酒者同罰雍從先主遊觀見一男子行於道謂先主曰彼欲淫何以不縛先主曰卿何以知之對曰彼有其具與欲釀者同先主大􅀏而原欲釀者晉書曰王戎嘗如阮籍飲時兖州刺史劉昶字公榮在坐籍以酒少酌不及昶昶無恨色戎異之他日問籍曰彼何如人荅曰勝公榮不可不與飲􅀂減公榮則不敢不共飲惟公榮可不與飲晉書曰山濤飲酒至八斗方醉帝欲試之以酒八斗飲之宻益其酒濤極本量而止又曰陸抗與羊祜推之好抗嘗遺祜酒祜飲之不疑抗有疾祜饋之藥抗亦推心服之于時以爲華元子反復見於今又曰阮孚爲散􅀐常侍以金貂換酒爲有司所彈又曰謝弈爲桓温司馬謂之方外司馬因以酒逼温走入南康王門避之主曰君無狂司馬何由得相見弈遂引温一兵卒於㕔事共飲曰失一老兵得一老兵亦何所恠又曰陸納字祖言爲呉興太守將之郡先至姑熟辭桓温因問温曰公致酒可飲幾升食肉多少温曰年大來飲三􅂛便醉白肉不過十臠卿復云何曰素不能飲正可二升肉亦不足言後伺温閑曰外有微禮方守逺郡欲與公一醉以展下情温欣然納之時王坦之刁協在座及受禮唯有酒一斗鹿肉一拌座客驚愕納徐曰明公近云飲酒三􅂛納正可二􅂛今有一斗以備杯酌餘􅄋温及賔客並歎其眞率温更勑中厨設精饌酣宴極歡而罷又曰何充字次道能飲酒雅爲劉恢所貴恢毎云見次道飲令人欲傾家釀言其能温克也又曰陶侃毎飲酒有常限歡有餘而限巳竭殷浩更勸少進侃悽然曰年少時甞誡之乃巳宋書曰王弘爲江州刺史欲識陶潜不能致也潜甞往廬山弘令潜故人龐通之遺酒於半道栗里要之潜有脚疾使一門生二兒舉籃轝及至欣然便共飲酌俄頃弘至亦無忤也先是顔延之爲劉柳後車}
