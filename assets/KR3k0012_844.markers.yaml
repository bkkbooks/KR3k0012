  - {type: variant, offset: 3109, length: 0, content: '', SBCK: 私之事妻常氏燕郡公喜女也文明太后以賜簡幹綜家事頗節簡酒乃至盗竊求乞婢侍卒不能禁又曰阮孚性機辯好酒貌短而秃周文帝偏所眷顧常於室内置酒十缾餘一斛上皆加帽欲戯孚孚適入室見即驚喜曰吾兄弟軰甚無禮何爲竊入王家匡坐相對冝早還宅也因持酒歸周文撫手大􅀏北齊書曰叚韶尤嗇於財雖親戚故舊畧無施與其子孫尚公主并省丞郎在家佐事十餘日事畢辭還人唯賜一杯酒又曰髙季式豪率好酒又恃舉家勲功不拘儉節與光州刺史李元忠生平遊欵在濟州夜飲憶元忠開城門令左右乗驛馬持一壷酒徃光州勸元忠朝廷知而容之又曰齊河南王孝瑜武成禮遇特隆帝在晉陽手勑之曰吾飲汾清二盃勸汝鄴酌兩盌其親愛如此也又曰齊皇甫亮性質朴純厚終無片言矯飾属有勑下司各列勤墮亮三日不上省文宣王親詰其故亮曰一日雨一日醉一日病酒文宣以其實優容之又曰周文帝聞韋夐養髙不仕辟之不能屈明帝即}
