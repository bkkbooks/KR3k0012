  - {type: variant, offset: 2877, length: 2, content: 汝南, SBCK: 在㝷陽與潜情欵後爲始安郡經過潜毎徃必酣飲致醉延之臨去留二萬錢與潜潜悉送酒家稍就取酒嘗九月九日無酒出宅邊菊叢中坐乆之逢弘送酒至即便就酌醉而後歸潜不解音聲而畜素琴一張毎有酒適輙撫弄以􅀉其意貴賤造者有酒輙設潜􅀂先醉便語客我醉欲眠卿可去其真率如此郡將候潜逢其酒熟取頭上􅁑巾漉酒畢還復着之又曰頋憲之爲建康令清儉強力爲政甚得人和故都下飲酒者醇旨輙號爲頋建康謂其清且美焉又曰孔顗爲江夏内史性便酒毎醉輙彌日不醒居常貧罄無有豊約未嘗􅀜懷爲府長史典籖諮事不呼前不敢前不令去不敢去雖醉日居多而曉明政事醒時判决未嘗有擁衆咸云孔公一月二十九日醉勝丗人二十九日醒也又曰顔延之好􅀐馬遨遊里巷遇}
