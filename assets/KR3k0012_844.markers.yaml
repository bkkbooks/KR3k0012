  - {type: variant, offset: 3170, length: 0, content: '', SBCK: 麟徳元年九月壁州刺史鄧弘慶制酒令平索看精四序又曰張鎮州拜舒州都督舒州即其夲邑鎮州乃多市酒肴就望江舊宅盡召故人親戚與之酣宴散髮箕踞敦疇昔之歡十日贈以錢帛旣而垂泣謂親賔曰比者張鎮州與故人爲歡今日以後舒州都督治百姓耳君民禮隔不得交遊因與之訣自是親戚有犯法一無所縱州境因兹肅然又曰李景伯景龍中爲諌議}
  - {type: page-break, offset: 3170, content: '', id: KR3k0012_SBCK_844-8b}
  - {type: variant, offset: 3170, length: 0, content: '', WYG: 李元忠拜南趙郡太守好酒無政績及荘帝崩棄官潜圖義舉㑹齊神武東出元忠便乗露車載濁酒奉迎神武聞其酒客未即見之元忠下車獨坐酌酒擘脯食之謂門者曰本言公招延豪傑今聞國士到門不能吐哺輟洗其人可知還吾刺勿復通也門者以告神武遽見之又曰齊神武自太原來朝見宋逰道曰此人是逰道邪常聞其名今日始見其面遷逰道别駕後神武之司州饗朝士舉觴屬逰道曰飲髙歡乎中酒者}
