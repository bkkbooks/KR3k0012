  - {type: variant, offset: 3056, length: 3, content: 奉觥歙, WYG: 頓首悲不自勝上不曉其意起自扶之主曰車子嵗暮必不見容特乞其命因慟哭上亦流涕指蒋山曰必無此慮若違今誓便是負初寧陵即封所餘酒賜義康曰㑹稽姉飲憶弟所餘酒今封送車子義康小字也齊書曰髙帝幸東宫召諸王宴飲因遊𤣥圃長沙王晃捉華盖臨川王暎執雉尾扇聞喜公子良持酒鎗南郡王行酒武帝與豫章王嶷及王敬則自捧肴饌髙帝大飲賜武帝已下酒並大醉盡歡日暮乃去又曰謝胐為吳興與弟􅊪於征虜渚送别胐指􅊪口曰此中唯宜飲酒􅊪建武之朝專以長酣為事與劉塡沈昭畧交歡飲各至數斗朏既至郡致􅊪數斛酒遣曰力飲此物勿豫人事􅊪嘗與劉悛飲推辭乆之悛曰謝荘兒不可云不能飲􅊪曰苟得其人自可沉湎千日悛甚慙無言又曰王琨儉於財用酒不過兩爵輙云取酒難過遇之粱書曰初梁武帝招延後進二十餘人置酒賦詩臧盾以詩不成罰酒一斗飲盡顔}
