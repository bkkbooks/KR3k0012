  - {type: variant, offset: 166, length: 994, content: 母也醴酒一宿熟也醪汁滓酒也酎三重之酒也醨薄酒也醑莤酒也酒經曰空乘穢飯醞以稷麥以成醇醪酒之始也烏挴女䴷胡板反甜醹音乳九杸澄清百品酒之終也周禮天官下曰酒正掌酒之政令以式法授酒材辨五齊之名一曰泛齊二曰醴齊三曰盎齊四曰醍齊五曰沉齊以節度作之故以齊為名泛者成而滓浮泛泛然如今宜成醪矣醴猶體也成而汁滓相將如今甜酒矣盎猶翁也成而色翁翁然葱白色如今酇白矣醍者成而紅赤如今下酒矣沉者成而滓沉如今造清酒矣辨三酒之物一曰事酒二曰昔酒三曰清酒事酒如今之醳酒也昔酒久酒今之舊醳也清酒今之冬釀夏成者也禮記月令孟冬曰是月也乃命有司秫稻必齊麴孽必時湛熾必潔水泉必香陶器必良火齊必得兼用六物酒官監之無有差貣有司謂煮酒之官六物者一曰秫稻二曰麴蘗三曰湛熾四曰水泉五曰陶器六曰火齊命酒官監之無有差貣謂失誤善惡又曲禮曰侍飲於長者酒進則起進受於尊所降席拜受敬也長者辭少者反席而飲長者舉未釂少者不敢飲又檀弓曰知悼子卒未葬悼子晉大夫荀盈平公飲酒師曠李調侍鼓鍾樂作也杜蕢自外來聞鍾聲曰安在曰在寢燕於寢杜蕢入寢歷階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐飲之降趍而出三酌皆罰平公呼而進之曰蕢曩者爾心或開予是以不與爾言謂始來入時開謂諫爭有所發爾飲曠何也曰子卯不樂紂以甲子死桀以乙卯亡王者謂之疾日不以舉樂為吉事所以自戒懼知悼子在堂斯其為子卯也大矣言大臣喪重於疾日也曠也大師也不以詔是以飲之也詔告也師典奏樂爾飲調何也曰調也君之褻臣也為一飲一食忘君之疾是以飲之也言調貪酒食褻嬖也近臣亦當規君疾憂爾飲何也曰蕢匱也宰夫也非刀匕是共又敢與知防是以飲之也防禁放謚又玉藻曰君子之飲酒也受一爵而色洒如也洒如肅敬貌二爵而言言斯言言和敬貌禮已三爵而油油油油說敬貌以退禮飲過三爵則敬殺可以去矣又樂記曰夫豢豕為酒非以為禍也而獄訟益繁則酒之流生禍也以穀食犬豕曰豢為作也言豢豕作酒本以饗祀養賢而小人飲之善醉以致獄訟是故先王因為酒禮壹獻之禮賓主百拜終日飲酒而不得醉焉此先王之所以備酒禍也壹獻士飲酒之百拜以喻多禮又坊記曰子云觴酒豆肉讓而受惡民猶犯齒左傳莊公二十二年曰陳公子完奔齊桓公使為正卿辭使為工正飲桓公酒樂公曰以火繼之辭曰臣卜其晝未卜其夜不敢君子曰酒以成禮不繼以淫義也夜飲為淫樂也以君成禮弗納於淫仁也又宣公上曰晉侯飲趙盾酒伏甲將攻之其右提彌明知之右車右趍曰臣侍君宴過三爵非禮也遂扶以下又成公下曰鄢陵之戰楚王召子反謀穀陽堅獻飲於子反子反醉而不能見穀陽子反內豎王曰天敗楚也夫余, SBCK: ''}
