  - {type: variant, offset: 1201, length: 1663, content: 子立之季氏飲大夫酒臧紇為客為上賓既獻已獻酒臧孫命北面重席新樽潔之酒潔既新復潔召悼子降逆之大夫皆起臧孫下迎悼子及旅而召公鉏獻酬禮畢而通行為旅使與之齒季孫失色又昭公十二年曰晉侯以齊侯宴中行穆子相穆子茍吳投壺晉侯先穆子曰有酒如淮有肉如坻淮水名坻山名寡君中此為諸侯師中之齊侯舉矢曰有酒如澠有肉如陵寡人中此與君代興代更也亦中之又哀公下曰齊子我夕夕視事陳逆殺人逢之遂執以入陳氐方睦使疾而遺之潘沐備酒肉焉使詐病內潘沐并得酒肉潘沐可以沐頭饗守囚者醉而殺之而逃又曰衛侯占夢嬖人以能占夢見愛求酒於大叔僖子僖子大叔遺不得與卜人比而告曰君有大臣在西南隅弗去懼害託占卜夢而言乃逐大叔遺遺奔晉毛詩國風曰十月穫稻為此春酒以介眉壽又小雅魚藻曰王在在鎬豈樂飲酒箋云豈亦樂而天下平安萬物得其姓武王何所處乎處於鎬京樂八音之樂與群臣飲酒而已又小雅曰伐木許許釃酒有藇以筐曰釃以數曰湑藇美貌又曰有酒湑我無酒酤我湑莤之也酤一宿酒也箋云酤買也此族人東王之思也王有酒則沛莤之王無酒酤買之要欲厚於族人尚書酒誥曰乃穆考文王肇國在西土厥誥毖庶邦庶士越少正御事朝夕曰祀茲酒文王告眾國眾土朝夕勑之唯祭祀用此酒不常飲惟天降命肇我民惟元祀天降威我民用大亂喪德亦罔非酒惟行越小大邦用喪亦罔非酒惟辜文王誥教小子有正有事無彝酒越庶國飲惟祀德將無醉自成湯咸至于帝乙成王畏相惟御事厥棐有恭不敢自暇自逸矧曰其敢崇飲崇聚也自暇自逸猶不敢况敢聚會飲酒乎明無厥或誥曰群飲汝勿佚盡執拘以歸于周予其殺盡執拘群飲酒者以歸於京師我其擇罪重者而殺之論語曰惟酒無量不及亂沽酒市脯不食禮記外傳曰五齊三酒皆供祭祀之用五齊尊而三酒卑所以明齊者酒人和合之分劑之名也一曰泛齊酒之初成滓有泛者泛泛然俗為白醪二曰醴齊醴體也汁滓未相同一體也今之甜酒也三曰盎齊一名醆酒狀如葱白色今之白醝酒也四曰醍齊色在白赤之間五曰況齊一名澄齊醍之與沉三酒與上君夫人及賓長廟中酌獻尸相酬酢之用三酒者列於堂下臣下相酌酬酢之用一曰事酒一名醳酒新成者酌飲有事謂廟中助祭親事者也廟中有事者為榮二曰昔酒久成而色白謂舊醳之酒與無事飲之三曰清酒冬釀夏成味醇厚史記曰秦繆公亡善馬歧下野人共得而食之者三百餘人逐得欲法之公曰君子不以畜害人乃赦之又曰高帝除秦苛法為簡易群臣飲酒爭功高帝患之叔孫通知上益厭也說上願與諸弟子共起朝儀漢七年長樂宮成群臣皆朝十月復置法酒諸臣侍坐殿上皆伏以尊卑次起上壽觴九行謁者言罷酒御史執法舉不如儀者輒引去竟朝置酒無敢失禮者高帝乃曰吾今日知為皇帝之貴也又曰沛公先入關屯霸上項羽至沛公左司馬曹無傷使人言於羽曰沛公欲王關中羽大怒欲擊之沛公因項伯見羽羽留沛公飲項王項伯東向坐亞父南向坐亞父者范增也沛公北向坐張良西向侍增數目項王舉所佩玉玦示之者三項王默然項莊入以劍舞欲因擊沛公張良至軍門見樊噲曰甚急今項莊拔劍舞其意常在沛公也噲曰此迫矣臣請入與之同命噲即帶劍擁盾入軍門交戟之衛士欲止不內噲側其盾以撞衛士仆地噲遂披帷西向而立瞋目視項王項王按劍而跽曰客何為者良曰沛公參乘樊噲也王曰壯士賜之巵酒則與斗巵酒樊噲飲之王曰賜之彘肩則有一生彘肩噲覆盾於地拔劍切而啗之王曰壯士能復飲乎曰臣死且不避巵酒安足辭又曰曹參代蕭何為相一遵何約束日夜飲淳酒卿大夫及賓客見參不事事皆欲言至者參輒飲醉之終莫得言丞相舍後園近吏舍吏舍日飲歌呼從吏惡之無如之何乃請參遊園中聞吏醉歌呼從吏請按之參乃取酒張坐飲亦歌呼與相參又曰高祖過沛置酒自擊筑為歌使沛子弟佐酒又曰高后與諸呂劉氏大臣宴飲令朱虛侯章為酒吏章曰臣將種也請以軍法行酒后可之酒酣諸呂有一人醉亡酒章追斬之后與左右皆大驚也漢書曰酒者天之美祿帝王所以頤養天下享祀祈福扶衰養病百福之會又曰百末旨酒百華之末酒也布蘭生芬芳布列老蘭之生也又曰于定國飲酒至石不亂益精明又曰陳遵字孟公每大飲賓客閉門取車轄投井中雖有急終不得去又曰張讓專權孟他以蒲桃酒一斗遺讓拜他為涼州刺史後漢書曰光武詔馮異歸家上冢使太中大夫齎牛酒令二百里內太守都尉已下及宗族會焉又曰寇恂數與鄧禹謀議禹奇之因奉牛酒交歡又曰魯恭兄弟俱為諸儒所稱學士爭歸之太尉趙憙慕其志每歲時遣子問以酒糧皆辭不受問遺也又曰, WYG: ''}
