  - {type: variant, offset: 3171, length: 30, content: 將軍袁紹惣兵冀州遣使要鄭玄大會賓客玄最後至乃延升上坐身長八尺, WYG: 丈夫卿之為人合飲此酒又曰魏帝宴華林園謂神武曰自頃所在百司多有貪暴朝廷中有心公平直言彈劾不避親戚者王可勸酒神武降階跪言與御史中尉崔暹一人謹奉明㫖敢以酒勸并臣所射賜物千段乞以迴賜帝又褒美之又曰劉藻字彦先光父宗之廬江太守涉獵羣籍美談笑善與人交}
