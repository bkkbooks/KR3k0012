  - {type: variant, offset: 3204, length: 11, content: 斛秀眉明目容儀溫偉魏志, SBCK: 斗不亂夜則宴賞晝决公務廷無留事管子}
  - {type: variant, offset: 3204, length: 3, content: 斛秀眉, WYG: 石不亂藻為東平别将辟於洛水之南文帝曰與卿石頭相見藻對曰臣雖不才非古人度亦不留賊虜而陛下輙當釃曲阿之酒以待百姓帝大笑曰今未至曲阿且以河東數石賜卿又曰裴粲傅元顥入洛以粲為西兖州刺史尋為漢陽太守崔巨倫所逐棄州入嵩髙山節閔帝初復為中書令後正月晦帝出臨洛濵粲起御前再拜上夀酒帝曰昔北海入朝慙竊神器爾日卿誡之以酒今欲我飲何異於往情粲曰北海志在沈湎故諫其所失陛下齊聖温克臣敢獻㣲誠帝曰甚愧來譽仍為令酌又曰齊郡王簡性好酒不能理公私之事妻常氏燕郡公喜女也文}
