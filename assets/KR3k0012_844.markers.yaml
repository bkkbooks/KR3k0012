  - {type: variant, offset: 2942, length: 4, content: 嘉厥休牛, SBCK: 上嘗就主宴集甚歡主起􅄪拜頓首悲不自勝上不曉其意起自扶之主曰車子歳暮必不見容特乞其命因慟哭上亦流涕指蔣山曰必無此慮􅀂違今誓便是􅀒初寕陵即封所餘}
