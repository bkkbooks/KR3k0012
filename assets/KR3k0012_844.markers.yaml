  - {type: variant, offset: 2877, length: 2, content: 汝南, WYG: 在尋陽與潜情欵後為始安郡經過潜每往必酣飲致醉延之臨去留二萬錢與潜潜悉送酒家稍就取酒嘗九月九日無酒出宅邊菊叢中坐乆之逢𢎞送酒至即便就酌醉而後歸潜不解音聲而素畜琴一張每有酒適輙撫弄以寄其意貴賤造者有酒輙設潜若先醉便語客我醉欲卧卿可去其真率如此郡将候潜逢其酒熟取頭上葛巾漉酒畢還後着之又曰顧憲之為建康令清儉强力為政甚得人和共都下飲酒者醇㫖輙號為顧建康謂其清美焉又曰孔顗為江夏内史性使酒每醉輙彌日不醒居常貧罄無有豐約未嘗闗懐為府長史典籖諮事不呼前不敢前不令去不敢去雖醉日居多而曉明政事醒時判决未嘗有擁衆咸云孔公一月二十九日醉勝世人二十九日醒也又曰顔延之好騎馬遨逰里巷遇}
