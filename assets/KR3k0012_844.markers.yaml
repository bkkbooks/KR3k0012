  - {type: variant, offset: 2941, length: 0, content: '', SBCK: 文季飲酒至五斗妻王氏飲亦至三斗常對食竟日而視事不廢又曰􅀽粲爲丹陽尹嘗歩􅓏白􅀭郊野間道遇一士大夫便呼與飲酣明日此人謂􅀍知頋到門求進粲曰昨飲酒無偶聊相要耳竟不與相見又曰蕭思話嘗從文帝登鍾山北嶺中道有盤石清泉上使於石上彈琴因賜以銀鍾酒謂曰相賞有松石間意又曰彭城王義康傳曰㑹稽長公主於兄弟爲長文帝所親}
  - {type: variant, offset: 2941, length: 0, content: '', WYG: 文秀飲酒五斗妻王氏飲酒亦至三斗常對飲竟日而視事不廢又曰袁粲為丹陽尹嘗步屧白楊郊野間道遇一士大夫便呼與酣飲明日此人謂被知顧到門求進粲曰昨飲酒無偶聊相要耳竟不與相見又曰蕭思話嘗從文帝登鍾山北嶺中道有磐石清泉上使於石上彈琴因賜以銀鍾酒謂曰相賞有松石間意又曰彭城王義康傳曰㑹稽長公主於兄弟為長文帝所親}
