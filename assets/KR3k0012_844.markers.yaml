  - {type: variant, offset: 2958, length: 5, content: 受賜惲於下, SBCK: 後進二十餘人置酒賦詩臧盾以詩不成罰酒一斗飲盡顔色不變言􅀏自􅀂蕭介染翰便成文無加􅀧帝兩美之曰臧盾之飲蕭介之文席之美也又曰隂鏗嘗與賔友飲宴見行觴者因廻酒炙以授之衆}
