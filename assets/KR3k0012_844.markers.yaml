  - {type: variant, offset: 3110, length: 0, content: '', SBCK: 禮敬逾重乃爲詩願時朝謁帝大悅勑有司日給河東酒一斗號之曰逍遥公唐書曰定州㹅管李􅀇通性剛烈無所屈撓􅀄城䧟爲劉黒闥所囚其故吏有以酒食餽之者􅀇通謂之曰諸君哀吾困辱故以酒食來相寛慰耳吾要當爲諸君一醉可乎遂與樂飲因請劒起舞舞畢以劒潰腹}
  - {type: variant, offset: 3110, length: 0, content: '', krp: 禮敬逾重乃爲詩願時朝謁帝大悅勑有司日給河東酒一斗號之曰逍遥公唐書曰定州㹅管李玄通性剛烈無所屈撓𥘉城䧟爲劉黒闥所囚其故吏有以酒食餽之者玄通謂之曰諸君哀吾困辱故以酒食來相寛慰耳吾要當爲諸君一醉可乎遂與樂飲因請劒起舞舞畢以劒潰腹}
  - {type: variant, offset: 3111, length: 7, content: 父常居田里酺每, SBCK: 死又曰蒲桃酒西域}
  - {type: variant, offset: 3111, length: 6, content: 父常居田里酺, WYG: 知之翁孺因氣結爾夜便卒規恨纉悲慟而憤哭兼至信次之間又殞規妻深痛夫子翌日又亡時人為張纉一盃酒殺吳氏三人南史曰南海有頓遜國在海峙上有酒樹似安石榴採其花汁停瓮中數日而成酒後魏書曰太宗引崔浩論事語至中夜太宗大悦賜浩縹醪酒十斛水精戎塩一兩曰朕味卿言若塩酒故與卿同其味也又曰髙允被勅論集往世酒之敗德以為酒訓孝文覽而悦之又曰胡叟少孤}
