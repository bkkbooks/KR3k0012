  - {type: variant, offset: 2950, length: 29, content: 簿讀書教戶曹引延受賜惲於下坐愀然前曰司正舉觥愀變色皃也司正, krp: 宴集甚歡}
  - {type: variant, offset: 2953, length: 4, content: 教戶曹引, SBCK: 曰髙帝幸東宫召諸王宴飲因遊玄圃園長沙王晃捉華盖臨川王暎執雉尾扇聞喜公子良持酒鎗南郡王行酒武帝與豫章王嶷及王敬則自捧肴饌髙帝大飲賜武帝巳下酒並大醉盡歡日暮乃去又曰謝朏爲呉興太守與弟瀹於征虜渚送別朏指􅊪口曰此中唯冝飲酒􅊪建武之朝専以長酣爲事與劉瑱沈昭畧交飲各至數斗朏旣至郡致􅊪數斛酒遺上曰力飲此物勿豫人事􅊪嘗與劉悛飲推辭乆之悛曰謝莊兒不可云不能飲􅊪曰茍得其人自可沉湎千日悛甚慙無言又曰王琨儉於財用酒不過兩爵輙云取酒難遇之梁書曰􅀄梁武帝揔}
