  - {type: variant, offset: 902, length: 0, content: '', SBCK: 裝飾舩舫而句麗無道圗欲見吞臣亡考濟方欲大舉奄喪父兄使垂成之功不獲一簣今欲練兵甲父兄之志􅀼自假開府儀同三司其餘咸各假授以勸忠節詔除武使持節督倭新羅任郍加羅秦韓六囯諸軍事安東大將軍倭國王至齊建元中及梁武帝時並來朝貢北史曰隋開皇二十年倭王姓何毎宇多利思比􅀌號河軰雞弥遣使詣闕上令所司訪其風俗使者言倭王以天爲兄以日爲弟天明時岀聽政跏趺坐日坐便理務云委我弟文帝曰此大無義理於是訓令改之王妻姓雞弥􅃿官有女六七百人名太子爲利歌弥多弗利又曰倭國内官有十二等一曰大德次小德次大仁次小仁次大義次小義次大禮次小禮次大智次小智次大信次小信貟無定數有軍尼一百二十人猶中國牧宰八十户置一伊尼翼如今里長也十伊尼翼屬一軍尼又曰倭國男子服飾衣裙􅃭其䄂微小履如屨形漆其上繫之脚人庻多跣足不得用金銀爲飾故時衣横幅結束相連而無縫頭亦無冠但垂髮於兩耳上至隋時王始制冠以錦綵爲之以金銀鏤花爲飾婦人束髮於後亦衣裙􅃭裳皆有􅙦纎竹聚以爲梳編草爲薦􅄂皮爲表縁以􅄂文皮文曰倭國兵有弓矢􅗋斧添皮爲甲骨爲矢鏑雖有兵無征戰其王朝㑹必陳設儀仗其國樂户户可十萬俗殺人強盗及姦皆死盗者計􅂍酬物無財者􅃿身爲奴自餘輕重或流或杖毎訊􅁈獄不承引者以木壓􅂰或置小石於沸湯中令所􅔡者探之云理曲者即手爛或置虵甕中令取之云曲者即螫手人頗恬静罕爭訟少盗賊樂有五弦琴笛男女多黥面文身􅃿水捕魚無文字唯刻木結繩後於百濟求得佛經始有文字知卜筮尤信巫覡毎至正月一日必射戯飲酒其餘節略與華同好棊博握槊樗蒲之戯氣候温煖草木冬青土地膏􅃾水多陸少以水環挂鸕鷀項令入水捕魚日得百餘頭俗無盤爼藉以槲葉性質直有雅風女多男少女婚嫁不取同姓男女相恱者即爲婚婦入夫家必先跨火乃與夫相見婦人不淫妬死者歛以棺椁親賔就屍者歌舞妻子兄弟以白布製服貴人三年殯庻人卜日而瘞及葬置屍舩上陸地牽之或以小輿又曰倭國有阿􅂫山其石無故大起接天者俗以爲異因行禱􅀕有如意寳珠其色青大如雞􅆑夜則有光新羅百濟皆以倭爲大國多珎物並仰之恒}
