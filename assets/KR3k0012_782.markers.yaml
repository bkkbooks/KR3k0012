  - {type: variant, offset: 426, length: 181, content: 量歲豊儉差等輸之其刑罰反叛退軍及殺人者斬盜者流其贓兩倍徵之婦犯姦沒入夫家為婢婚娶之禮略同華俗父母及夫死者三年居服餘親則葬訖除之土田下濕氣候溫暖人皆山居有巨粟其五穀雜菓菜蔬及酒醴肴饌之屬多同內地維無駞騾羊鵝鴨又曰百濟國中大姓有八族沙氏燕人劦音恊氏真氏解氏骨氏木氏苗氏其俗每以四仲月祭天及五帝之神立其始袒仇台之廟於國城歲四祠之又曰隋開皇初百濟王餘昌遣使貢方物拜上開府, SBCK: 言}
