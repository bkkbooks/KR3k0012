  - {type: variant, offset: 1044, length: 269, content: 獻及至見城闕荒毀並號慟涕泣侯景怒囚執之景平乃得還國唐書曰百濟國王所居有東西兩城所置內官曰臣佐平掌宣納事內頭佐平掌庫藏事內法佐平掌禮儀事衛士佐平掌宿衛兵事朝廷佐平掌刑獄事兵官佐平掌在外兵馬事其用法叛逆者死籍沒其家殺人者以奴婢三人贖罪官人受財及盜者三倍追贓乃終身禁錮凡諸賦稅及風土所產多與高麗同其王服大袖紫袍青錦袴烏羅冠金花為飾素皮帶鳥革履官人盡緋為衣銀花飾冠庶人不得衣緋紫歲時伏臘同於中國其書籍有五經子史又表䟽並依中華之法其國西南海中有三島其上出黃漆樹似小榎而樹大六月取其汁漆器物色如黃金其光自奪目又曰武德四年百濟王扶餘璋遣使來獻果下馬七年, SBCK: ''}
