  - {type: variant, offset: 1585, length: 666, content: 十餘城顯慶五年命左衛大將軍蘇定方統兵討之大破其國虜義慈及太子隆小王孝演偽將五十八人等送於京師上責而宥之其國舊分為五部統郡三十七城二百戶七十六萬至是乃以其地分置熊津馬韓東明等五都督府各統州縣立其酋渠為都督刺史及縣令命右衛郎將王文度為熊津都督揔兵以鎮之又曰百濟王義慈事親以孝行聞友于兄弟時人號東海曾閔及至京數日疾卒贈金紫光祿大夫衛尉卿特許其舊臣赴哭送就孫皓陳叔寶墓側葬之夫餘後漢書曰夫餘國在玄菟北千里南與高句麗東與挹婁西與鮮卑接北有弱水地方二千里本濊地也初北夷橐離國王出行其侍兒於後妊身正遂欲殺之侍兒曰前見天上有氣如大雞子來降我因以有身王囚之後遂生男王令置於豕牢豕以口氣噓之不死復徙於馬欄馬亦如之以為神乃聽母收養名曰東明東明長而善射王忌其猛欲殺之東明奔走南至掩淲音斯水以弓擊水魚鱉皆聚浮水上東明乘之得度因至夫餘而王之焉於東夷之域最為平敞土宜五穀出名馬赤玉貂豽大珠如酸棗以員柵為城有宮室倉庫牢獄其人麤大強勇而謹厚不為寇鈔以弓矛為兵以六畜名官有馬加牛加狗加其邑落皆主屬諸加食飲用俎豆會同拜爵洗爵揖讓升降以臘月祭天大會連日飲食歌舞名曰迎鼓是時斷刑獄解囚徒有軍事亦祭天殺牛以蹏占其吉凶行人無晝夜好歌吟音聲不絕其俗用刑嚴急被誅者皆沒其家人為奴婢盜一責十二男女淫皆殺之尤惡如婦既殺復尸於山上兄死妻嫂死則有槨無棺殺人殉葬多者以百數其王葬用玉匣漢朝常預以王匣付玄菟郡王死則迎取以葬焉建武二十五年夫餘王遣使奉貢光武厚報荅之於是使命歲通至安帝永初五年夫餘王始將步騎七八千人寇鈔樂浪殺傷吏人後復歸附永寧元年乃遣嗣子尉仇台詣闕貢獻天子賜尉仇台印綬金綵順帝永和元, SBCK: ''}
