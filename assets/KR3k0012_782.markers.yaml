  - {type: variant, offset: 610, length: 0, content: '', SBCK: 求詣天子朝見太守劉夏送詣京師難􅂛米致所獻男生口四人女生口六人班布二疋詔書賜以雜錦采七種五尺刀二口銅鏡百枚眞珠鈆丹之屬付使還又封下倭王印綬女王死大作􅃁殉葬者百餘人更立男王國中不伏更相殺數千人於是復更立卑弥呼宗女臺舉年十三爲王國中遂定其倭國之東渡海千里復有國皆倭種也又有朱中儒國在其南人長三四尺去倭國四千餘里又有躶國墨齒囯復在其南舩行可一年至南史曰倭國風俗不淫男女皆露髻冨貴者以錦綉雜來爲帽似中國胡}
