  - {type: variant, offset: 2854, length: 774, content: 辰韓種也辰韓始有六國後稍分為十二新羅則先本辰韓種也辰韓始一也或稱魏將母丘儉討高麗破之奔沷沮其後復歸故國有留者遂為新羅亦曰斯盧其人雜有華夏高麗百濟之屬兼有沷沮不耐韓濊之地其王本百濟人自海逃入新羅遂王其國初附庸百濟百濟征高麗不堪戎役後相率歸之遂致強盛因襲百濟附庸於迦羅國焉又曰新羅王真平以隋開皇十四年遣使貢方物文帝拜真平上開府樂浪郡公新羅王其官有十七等一曰伊罰干貴如相國次伊尺干次迎干破彌干次大阿尺干次阿尺干次乙吉干次涉咄干次及伏干次太奈摩干次奈摩次大舍次小舍次吉土次大焉次小焉次達位外有郡縣其文字甲兵同於中國選壯健者悉入軍烽戍邏俱有屯管部伍風俗刑政衣服略與高麗百濟同每月旦相賀王設宴會班賚群官其日拜日月神主八月十五日設樂令官人射賞以馬布其有大事則聚群官詳議定之服色尚畫素婦人辮髮繞頭以新綵及珠為飾婚嫁禮唯酒食而已輕重隨貧富死有棺歛葬送起墳陵王及父母妻子喪居服一年田甚良沃水陸兼種其五穀果菜鳥獸物產略與華同大業以來歲遣朝貢唐書曰新羅王所居曰金城周七八里衛兵三千人設師子隊文武官凡有十七等武德四年其王金真平遣使朝貢高祖遣使賜以璽書及畫屏風錦綵自此朝貢不絕其食器用柳箱亦以銅及瓦國多金朴樸兩姓異姓不為婚又曰貞觀五年新羅遣使獻女樂二人皆鬒髮美色太宗謂侍臣曰朕聞聲色之娛不如好德且山川阻遠懷土可知近日林邑獻白鸚鵡尚解思鄉訴請還國鳥猶如此況人情乎但愍其遠來思戀親戚宜付使者聽其還家又曰新羅曰金真平安卒無子立其女善德為王貞觀九年遣使冊命善德為樂浪郡王新羅王十七年遣使王言高麗百濟累相攻襲亡失數十城兩國連兵意在滅臣社稷謹遣陪臣歸命大國乞偏師救助後太宗將親伐高麗詔新羅纂集士馬應接大軍新羅遣大臣領兵五萬入高麗南界攻水口城降之又曰新羅王善德卒立其妹真德為王貞觀二十二年其德遣其弟國相伊贊于金春秋及其子文王來朝春秋請詣國學觀釋奠及講論太宗因賜以所製溫湯及晉碑并新撰晉書將歸, SBCK: ''}
