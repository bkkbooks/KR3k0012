  - {type: variant, offset: 3, length: 0, content: '', SBCK: 千里其地大較在㑹稽東冶與朱崖儋耳相近故其俗多同土冝禾稲麻紵蚕桑知織績爲縑布出白珠青玉其山有丹土氣温煖冬夏生菜茹無牛馬虎豹羊鵲鵲或作鷄其兵有矛楯木弓竹矢或以骨爲鏃男子皆黥靣文身以其文左右大小別尊卑之差其男衣皆横幅結束相連女人􅀍髮屈紒衣如單􅀍貫頭而着之並以丹朱坋身􅀃文曰坋塵也音蒲頓切如中國之用粉也有城柵屋宇父母兄弟異處唯㑹同男女無别飲食以手而用籩豆俗皆徒跣以蹲踞爲恭敬其人性嗜酒多壽考至}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_782-1b}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 千里其地大較在㑹稽東冶之東與朱崖儋耳相近故其俗多同土宜禾稻麻紵蠶桑知織績為縑布出白珠青玉其山有丹土氣温煖冬夏生菜茹無牛馬虎豹羊鵲鵲或作雞其兵有矛矟木弓竹矢或以骨為鏃男子皆黥面文身以其文左右大小别尊卑之差其男衣皆横幅結束相連女人被髮屈紒衣如單被貫頭而着之並以丹朱坋身說文曰坋塵也音蒲頓切如中國之用粉也有城栅屋宇父母兄弟異處唯㑹同男女無别飲食以手而用籩豆俗皆徒跣以蹲踞為恭敬人性嗜酒多壽考至}
