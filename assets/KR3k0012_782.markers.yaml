  - {type: variant, offset: 3704, length: 190, content: 月撫運邁陶唐幡旗何赫赫征鼓何鍠鍠外夷違命者剪覆被天殃淳風凝幽顯遐邇竟呈祥四時和玉燭七耀巡萬方維岳降宰輔帝任忠與良五三成一德昭我家大唐帝嘉之拜法敏為太府卿又曰永徽六年百濟與高麗鞂鞨率兵侵新羅北界其王春秋遣使上表求救顯慶五年命左武衛大將軍蘇定方為熊津道大惣管統水陸十萬仍令春秋為嵎夷道行軍揔管與定方討平百濟俘其王扶餘義慈來獻自是新羅漸有高麗百濟之地其界益大西至于海又曰龍朔三年詔以新羅, SBCK: 夲}
