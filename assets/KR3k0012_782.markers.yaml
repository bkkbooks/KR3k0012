  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 三俀曰夲紵嶼人蝦夷國俀後漢書曰俀在韓東南大海中依山島爲居凢百餘國武帝滅朝鮮使驛通於漢者三十許國俀王居邪馬臺國俀今名邪魔惟音之訛反樂浪郡徼去其國萬}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 三倭日本紵嶼人蝦夷國倭後漢書曰倭在韓東南大海中依山島為居凡百國漢武帝滅朝鮮使馹通於漢者三十許國倭王居邪馬臺國倭音之訛反今名邪摩推樂浪郡徼去其國}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_WYG_782-1b, image: WYG0899/WYG0899-0807b.png}
