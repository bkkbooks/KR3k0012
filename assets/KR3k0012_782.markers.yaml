  - {type: variant, offset: 3, length: 0, content: '', krp: 千里其地大較在㑹稽東冶與朱崖儋耳相近故其俗多同土冝禾稲麻紵蚕桑知織績爲縑布出白珠青玉其山有丹土氣温煖冬夏生菜茹無牛馬虎豹羊鵲鵲或作鷄其兵有矛楯木弓竹矢或以骨爲鏃男子皆黥靣文身以其文左右大小別尊卑之差其男衣皆横幅結束相連女人𬒳髮屈紒衣如單𬒳貫頭而着之並以丹朱坋身說文曰坋塵也音蒲頓切如中國之用粉也有城柵屋宇父母兄弟異處唯㑹同男女無别飲食以手而用籩豆俗皆徒跣以蹲踞爲恭敬其人性嗜酒多壽考至}
  - {type: variant, offset: 4, length: 1, content: 濟, SBCK: 餘歳者甚衆國多女子大人皆有四五妻其餘或兩或三女人不滛不妬又俗不盗竊少爭訟犯法者沒其妻子重者滅其門族其死者停喪十餘日家人哭泣不進酒食而等􅀋就􅁔舞爲樂灼骨以爲卜用决􅁻凶行來渡海令一人不櫛沐不食肉不近婦人名曰持衰􅀂在塗吉利則雇以財物如病疾遭害以爲持衰不謹便共殺之魏志曰倭國在帶方東南大海中依山島爲舊國百餘小國漢時有朝見者今令使譯所通其三十國從帶方至倭循海岸水行歷韓國從乍南乍東到其}
  - {type: variant, offset: 4, length: 1, content: 濟, WYG: 餘歲者甚衆國多女子大人皆有四五妻其餘或兩或參女人不淫不妬又俗不盗竊少爭訟犯法者没其妻子重者滅其門族其死者停喪十餘日家人哭泣不進飲食而等類就歌舞為樂灼骨以為卜用决吉㓙行來渡海令一人不櫛沐不食肉不近婦人名曰持衰若在塗吉利則賜以財物如病疾遭苦以為持衰不謹便共殺之魏志曰倭國在帶方東南大海中依山島為舊國百餘小國漢時有朝見者今令使譯所通其三十國從帶方至倭循海岸水行歴韓國乍南乍東到其}
