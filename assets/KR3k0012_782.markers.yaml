  - {type: variant, offset: 614, length: 144, content: 平陳之歲戰舩漂至海東躭牟羅國其舩得還經于百濟昌資送甚厚并遣使奉表賀陳平文帝善之八年昌復使長史王辯郍來獻方物屬興遼東之役奉表請為軍導高麗頗知其事兵侵其境大業七年帝親征高麗其王餘璋使國智牟來請軍期帝遣尚書起居郎席律詣彼與相知明年六軍度遼餘璋亦嚴兵於境聲言助軍實持兩端尋與新羅有彈每相戰爭十年復, SBCK: 讃}
