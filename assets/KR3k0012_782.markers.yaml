  - {type: variant, offset: 12, length: 0, content: '', SBCK: 官曰爾支副曰泄謨觚柄渠觚有千餘户丗有王皆統屬女王帶方使徃來常止住又東南至奴國百里置官曰先馬觚副曰卑奴母離有二萬餘户又東行百里至不彌國户千餘置官曰多模副曰卑奴母離又南水行二十日至於投馬國户五萬置官曰彌彌副曰彌彌郍利又南水行十日陸行一月至耶馬臺國户七萬女王之所都其置官曰伊支馬次曰彌馬叔次曰彌馬獲支次曰奴佳鞮其屬小國有二十一皆統之女王之南又有狗奴國男子爲王其官曰狗石智卑狗}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 官曰爾支副曰泄謨觚柄渠觚有千餘户世有王皆統屬女王國郡使徃來常止住又東南至奴國百里置官曰兕馬觚副曰卑奴母離有二萬餘户又東行百里至不彌國户千餘家置官曰多模副曰卑奴母離又南水行二十日至於投馬國户萬置官曰彌彌副曰彌彌那利又南水行十日陸行一月至耶馬壹國户七萬女王之所都其置官曰伊支馬次曰彌馬升次曰彌馬獲支次曰奴佳鞮其屬小國有二十一皆統之女王之南又有狗奴國男子為王其官有狗古智卑狗}
