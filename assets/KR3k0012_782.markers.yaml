  - {type: variant, offset: 902, length: 0, content: '', WYG: 裝飾船舫而句麗無道圖欲見吞臣亡考濟方欲大舉奄喪父兄使垂成之功不獲一簣今欲練兵申父兄之志竊自假開府儀同三司其餘咸各假授以勸忠節詔除武使持節都督倭新羅任那加羅秦韓慕韓六國諸軍事安東大將軍倭王齊建元中及梁武帝時並來朝貢北史曰隋開皇二十年倭王姓阿每字多利思比孤號阿輩雞彌遣使詣闕上令所司訪其風俗使者言倭王以天為兄以日為弟天明時出聽政跏趺坐日出便停理務云委我弟文帝曰此大無義理於是訓令改之王妻姓雞彌後宫有女六百人名太子為利歌彌多弗利又曰倭國内官有十二等一曰大德次曰小德次大仁次小仁次大義次小義次大禮次小禮次大智次小智次大信次小信員無定數有軍尼一百二十人猶中國牧宰八十户置一伊尼翼如今里長也十伊尼翼屬一軍尼又曰倭國男子服飾衣裙襦其袖小履如屨形漆其上繫之脚人庶多跣足不得用金銀為飾故時衣横幅結束相連而無縫頭亦無冠但垂髪於兩耳上至隋其王始制冠以錦綵為之以金銀鏤花為飾婦人束其髪於後亦衣裙襦裳皆有襈織竹以為梳編草為薦聚皮為裘縁以雜文皮又曰倭國有弓矢䂎斧漆皮為甲骨為矢鏑雖有兵無征戰其王朝㑹必陳設儀仗其國樂戸可十萬俗殺人强盗及奸皆死盗者計贓酬物無財者没身為奴自餘輕重或流或杖每訊寃獄不承引者以木壓膝或置小石於沸湯中令所競者探之云理曲者即手爛或置蛇甕中令取之云曲者即螫手人頗恬靜罕爭訟少賊盗樂有五絃琴笛男女多黥面文身没水捕魚無文字唯刻木結繩後於百濟求得佛經始有文字知卜筮尤信巫覡每至正月一日必射戲飲酒其餘節畧與華同好棊博握槊樗蒲之戲氣候温煖草木冬青土地膏腴水多陸少以小環掛鸕鷀項令入水捕魚日得百餘頭俗無盤爼籍以槲葉性質直有雅風女多男少婚嫁不娶同姓男女相恱者即為婚婦入夫家必先跨火乃與夫相見婦人不淫妬死者斂以棺槨親賔就屍者歌舞妻子兄弟以白布製衣服貴人三年殯庶人卜日而遷及葬置屍船上陸地牽之或以小輿又曰倭國有阿蘇山其石無故火起接天者俗以為大異因行禱祭有如意寳珠其色青大如鷄卵夜則有光新羅百濟皆以倭為大國多珍物並仰之恒}
