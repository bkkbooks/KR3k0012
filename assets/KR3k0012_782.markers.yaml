  - {type: variant, offset: 908, length: 0, content: '', SBCK: 王多利思比􅀌遣朝貢使者曰聞海西菩薩天子重興佛法國書曰日出處天子致書日􅃿處天子無恙云云帝覽不恱謂鴻臚卿曰夷書有無禮者勿復以聞明年上遣文林郞裴丗清使倭國王遣小德何軰䑓從數百人設儀仗鳴鼓角來迎後十日又遣大禮歌多毗從三百餘􅀐郊勞旣至彼都其王與丗清來貢方物此後遂絶唐書曰倭國土風頗􅀋新羅貞觀}
