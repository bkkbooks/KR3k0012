  - {type: variant, offset: 2338, length: 321, content: 著布面衣去環珮大體與中國相類漢末公孫度雄張海東威服東夷夫餘王尉仇台更屬遼東時句麗鮮卑強度以夫餘在三虜之間妻以宗女正始中幽州刺史母丘儉討句麗遣玄菟太守王頎詣夫餘王位居遣大加郊迎供軍糧舊夫餘俗水旱不調五穀不熟輒歸咎於王或言當易或言當殺其印文言濊王之印國有故城名濊城蓋本濊貊之地而夫餘王其中自謂亡人抑有以也晉書曰夫餘國至太康六年為慕容廆所襲破其依慮自殺子弟走保沷沮武帝以何龕為護東夷校尉明年夫餘後王依羅遣使詣龕求率見人還復舊國遣督郵賈沈以送之爾後每為廆掠其種人賣於中國帝又以官物贖還禁市夫餘之口自後無聞新羅秦書曰符堅建元十八年新羅國王樓寒遣使衛頭獻美丈國在百濟東其人多美髮髮長丈餘又曰符堅時新羅國王樓寒遣使衛頭朝貢堅曰卿言海東之事與古不同何也荅曰亦, SBCK: 者}
