  - {type: variant, offset: 9, length: 1, content: 濟, SBCK: 餘里地多山林無良田食海物自活乗舩南北市糴又南渡一海一千里名曰瀚海至一大國置官與對馬同地方三百里多竹木叢林有三千許家亦有田地耕田不足食方行市糴又渡海千餘里至未盧國户四千濵山海居人善捕魚水無深淺皆能沉没取}
