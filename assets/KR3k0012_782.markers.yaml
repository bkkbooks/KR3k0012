  - {type: variant, offset: 40, length: 281, content: 于帶方故地漢遼東太守公孫度以女妻之遂為東夷強國初以百家濟因號百濟其國東極新羅北接高句麗西南俱限大海東西四百五十里南北九百里其都曰居拔城亦曰固麻城其外更有五方中方曰古沙城東方曰得安城南方曰久知下城西方曰刀先城北方曰熊津城又曰百濟國王姓夫餘氏號於羅瑕百姓呼為鞬士口之夏言並王也王妻號於陸夏言妃也官有十六品左平五人一品達率三十人二品恩率三品德率四品杆率五品奈率六品已上冠飾銀華將德七品紫帶施德八品皂帶固德九品赤帶季德十品青帶對德十一品文督十二品皆黃帶武督十三品左軍十四品振武十五品卷虞十六品皆白帶自恩率以下官無常員各有部分其人飲食衣服與高麗略同若朝拜祭祀其冠兩箱加翅戎, SBCK: 草傳辭􅀃}
