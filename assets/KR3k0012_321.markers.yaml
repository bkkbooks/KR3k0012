  - {type: variant, offset: 90, length: 216, content: 小幕止宿有急即自往救之行至府門未嘗廻頭不復省視妻子賊退後收拾器械處置公事經三日然後歸家又曰史思明圍光弼於太原四面重圍十日不解每日使賊於陣前嫚罵光弼並戲弄城上人光弼使人穿地道以木撐之賊明日還於舊處立將戲之地道透遂把賊腳曳入地道中光弼得而對眾戮之城中大喜思明知事不集遂退歸河北又曰薛愿為頴川太守本郡防禦使時賊已陷陳留滎陽汝南等郡方圍南陽頴川當其來往之路愿與防禦副使龐堅同力固守城中儲蓄無素兵卒單寡自至德元年正月至十一月賊晝夜攻之不息距城, WYG: 千六}
