  - {type: variant, offset: 2721, length: 3, content: 燻鼠食, WYG: 在其下或謂絢曰四瀆天所以節宣其氣不可久塞若鑿湫東注則游波寛緩堰得不壊絢然}
  - {type: punctuation, offset: 2725, content: ，, id: KR3k0012_CHANT_321-bkkpn691}
  - {type: 'tls:seg', offset: 2725, content: '', id: KR3k0012_CHANT_321-25a.7}
  - {type: variant, offset: 2725, length: 5, content: 一無叛者宋, WYG: 開湫東注又縱反間於魏曰梁所懼開湫魏人信之果鑿山深五丈開湫北注水日夜分流湫猶不減其月魏軍竟潰而歸水之所及夾淮方數百里地魏壽陽城戍稍徙頓八公山南北居人散就岡壟初堰起徐州界刺史張豹子謂已必尸其事既而絢以他官來監作豹子甚慚由是譖絢與魏交通帝雖不納猶以事畢徵絢尋除司州刺史領安陸太守絢還後豹子不脩堰至其秋淮水暴漲堤壊奔流於海殺數萬人聲若雷聞三百里水中怪物隨流而下或人頭魚身或龍形馬首殊類詭狀不可勝名陳}
