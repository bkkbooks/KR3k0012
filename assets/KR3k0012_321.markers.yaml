  - {type: variant, offset: 2489, length: 362, content: 㪷萬錢晉書劉崑赴并州上表曰臣自涉州彊目覩困之流移四散十不得存二攜老扶弱不絕於路及其在者鬻賣妻子生相捐棄死亡委厄白骨橫野哀呼之聲感傷和氣群胡數萬周匝四山動足遇掠開目覩寇唯有壺關可得告糴而此二道九州之險數人當路則百夫不敢進公私往反沒喪者多嬰守窮城不得薪菜耕牛既盡又乏田器以臣愚短當此至難憂如循環不遑寢食晉中興書曰中宗初鎮江左假郄鑒龍驤將軍兗州刺史徐龕石勒左右交侵鑒收合荒散保固一山隨宜抗對百姓飢饉掘野鼠蟄鷰而食之三十六國春秋曰蜀王李雄攻譙登于涪城無救援登固守不下士卒皆燻鼠食之一無叛者宋書曰朱脩之留府滑臺乃為索虜所攻圍脩之糧盡救兵不至將士燻鼠食之城陷為虜所執上嘉其節蕭子顯齊書曰魏遣魏郡王元英圍南鄭退入斜谷天大雨軍馬浛截竹炊米於馬上持炬吹而食之隋書曰李密聞行人關被囚於京兆與王仲伯亡抵平原賊帥郝孝德不甚禮之備遭飢饉至削樹皮食之矣, SBCK: ''}
