  - {type: variant, offset: 214, length: 384, content: 喜思明知事不集遂退歸河北又曰薛愿為頴川太守本郡防禦使時賊已陷陳留滎陽汝南等郡方圍南陽頴川當其來往之路愿與防禦副使龐堅同力固守城中儲蓄無素兵卒單寡自至德元年正月至十一月賊晝夜攻之不息距城百里廬舍墳墓林樹開發斬徹殆盡而外救不至賊將阿史郍承慶悉以銳卒併攻為木驢木鵝雲梯衝棚四面雲合鼓噪如雷矢石如雨力攻十餘日城中守備皆竭賊夜半乘梯而入而愿堅俱被執送於東都將支解之或說祿山曰薛愿龐堅義士也人各為其主屠之不祥乃繫於洛水之濱屬苦寒一夕凍死又曰張巡守睢陽在城中每戰登陴大呼以助威皆血流面牙齒皆碎城將陷西向再拜曰為救不至臣智勇俱竭不能全一城今使逆賊見逼臣死之後願為鬼與賊為厲以荅國恩及城陷尹子奇見巡問之曰聞公每督戰皆裂齒碎實有之否巡應之曰然子奇曰何以至此曰欲得殺逆賊遂至於此子奇以大刀剔其口見其存者不過三數巡因大詬罵子奇責以悖逆損害平人子奇欲存之左右曰此人必不為我用又得眾死心不可留故害, SBCK: 破}
