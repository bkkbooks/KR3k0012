  - {type: variant, offset: 21, length: 42, content: 高麗勣嘗令頃作文檄高麗其語有譏高麗不知守鴨綠之險莫離支報云謹聞命矣遂移兵固守鴨綠官軍, SBCK: 匈奴戰敗班師爲單于所逐及於大澤匈奴於上風縱火陵亦先放火燒斷葭葦用絕火勢蕭代誠曰敵用火焚吾門思火减敗吾當更積薪􅂇火使火􅀔盛敵}
