  - {type: 'tls:seg', offset: 2739, content: '', id: KR3k0012_CHANT_321-25a.10}
  - {type: variant, offset: 2740, length: 0, content: '', WYG: 出頓于洭口多聚沙石盛以竹籠置於木栅之外用遏舟艦昭逹居其上流裝艦造舟以臨賊栅又令軍人銜刀潜行水中以斫竹籠籠篾皆解因縱大艦隨流突之賊衆大敗因擒紇三國典畧曰東魏慕容紹宗髙岳等堰洧水以灌潁川時有怪獸毎衝壊其堰岳等悉衆苦攻分休迭進王思政身當矢石與士卒同其勞苦屬時大雪岳衆多死岳等乃作鐵籠雜獸用厭水神後周書曰太祖遣大將軍趙貴帥軍至穰兼督諸州兵以援王思政髙岳起堰引洧水以灌城自潁川以北皆}
