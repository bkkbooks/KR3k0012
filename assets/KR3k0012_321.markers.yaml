  - {type: variant, offset: 11, length: 2, content: 乾符, WYG: 月在箕壁翼軫四星不出三日必有大風火借風以張其勢凡火攻必因五火之變而應之火發於内即早應之於外以兵應之使奸人縱火於敵營内當速進以攻其外火發而兵靜者待而勿攻極其火力可從而從之不可從則止見利則進知難則止極盡火力可則進不可則止吾無使敵知吾為火可發於外無待於内以時發之火發於上風無攻於下風下風不便也燒之必退而迎攻之則必為所害者也晝風久夜風止風起於晝延起於夜易恬老子云飄風不終朝當因晝夜之候而知緩急之計凡兵必知五火之變以數守之既知起五火之變當復以數理消息其可否也故以火佐攻者明史記曰田單齊人也燕將樂毅攻齊單保即墨不下燕兵圍之單乃收城}
