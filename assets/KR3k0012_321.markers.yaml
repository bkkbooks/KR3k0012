  - {type: variant, offset: 1602, length: 1, content: 墨, WYG: 官屬皆曰今在危亡之地死生從司馬超曰不入虎穴不得虎}
  - {type: page-break, offset: 1602, content: '', id: KR3k0012_WYG_321-3b, image: WYG0895/WYG0895-0756d.png}
  - {type: variant, offset: 1604, length: 0, content: '', WYG: 當今之計獨有因夜以火攻虜使彼不知我多少必大震怖可殄盡也滅北虜則鄯善破膽功成事立矣衆}
  - {type: punctuation, offset: 1605, content: ：, id: KR3k0012_CHANT_321-bkkpn380}
