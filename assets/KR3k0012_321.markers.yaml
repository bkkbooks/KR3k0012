  - {type: variant, offset: 2735, length: 4, content: 留府滑臺, WYG: 據其上流命軍士伐木帶枝葉為筏施拍於其上綴以大索相次列營帶夾兩岸寳應數挑戰昭逹按甲不動俄而暴雨江水大漲昭逹放筏衝突水栅盡破又出兵攻其歩軍寳應大潰克定閩中又曰歐陽紇據嶺南反遣將章昭逹督衆軍討之紇}
