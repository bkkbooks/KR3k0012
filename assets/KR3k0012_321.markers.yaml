  - {type: variant, offset: 2656, length: 1, content: 兗, WYG: 震懼姚襄去軍十里結草為營方欲擊浩浩甚懐憂令逌伐之逌曰今兵非不精而衆少於羗且塹栅甚固難與校力乃取數百鷄以長繩連之脚皆繫火一時驅放以兵遏後羣鷄駭散一時飛過塹並集羗營皆燃因其驚亂縱兵擊之襄遂摧退宋書王𤣥謨圍滑臺城内多茅屋衆皆曰宜以火箭燒之又殷琰傳曰琰與劉勔相持勔用茅苞土擲以塞塹擲者如雲城内乃以火箭射之又宋良吏杜慧度傳曰慧度為交}
