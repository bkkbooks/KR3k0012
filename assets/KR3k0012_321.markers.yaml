  - {type: variant, offset: 2763, length: 1, content: 虜, WYG: 之柰何張孟談曰亡不能安無為貴智臣請自潛行見韓魏之君而約之乃見韓魏之君說曰聞之唇亡則齒寒今智伯率二君而伐趙趙將亡矣趙亡則二君為之次今不圖之禍將及二君二君曰智伯之為人麄中而少親我謀而泄事必敗為之奈何張孟談曰言出二君之口入臣之耳人孰知之者乎且同情相成同利相死君盍圖之二君乃與孟談謀隂與之盟張孟談乃報襄子至期夜殺守隄之吏决水灌智伯智伯軍救水而亂韓魏翼而擊之襄子卒犯其前大敗智伯殺其身而三分其國太白隂經水攻具篇曰以水佐攻者強水因地而成勢使源髙於城本大於末可以遏而止可以决而流故晉水可以灌安邑汾水可以浸平陽先設水平測其髙下可以漂城灌軍沉營殺將又曰水平槽長二尺四寸兩頭及中間鑿為三池池橫濶一寸八分長一尺深一寸二分分間相去一寸五分中間有通水渠濶二分深一寸三分池各置浮木木濶狹㣲小施池内厚二分上建立齒髙八分闊一寸七分厚一分槽下置轉關脚髙下與身等以水注之三池浮木齊起𦕈目視之齒齊平則為天下準式十歩一里乃至數十里目力}
