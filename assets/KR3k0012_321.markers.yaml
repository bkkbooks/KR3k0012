  - {type: variant, offset: 2191, length: 297, content: 餘日後漢書曰車師王與匈奴共攻耿恭於䟽勒中恭食盡乃煮鎧弩食其筋革又曰臧洪為東郡太守為袁紹所圍初尚掘鼠煮筋角後無所食取草實而食之魏志曰太祖圍張超於雍丘超言唯臧洪當來救吾眾人以為袁曹方穆洪為紹所表用必不敗好招禍洪聞之果徒跣號泣勒所鎮又從紹請兵馬救超紹不許遂為太祖所滅洪由是怨紹紹興兵圍之歷年不下紹忿洪無降意增兵急攻洪自度不得免呼吏士謂曰袁氏無道所圖不軌且不救洪郡洪於大義不得不死念諸君無事空興此禍耳可將妻子去吏士皆垂泣掘鼠煮筋角後無所食主簿啟內廚米三斗洪使作薄粥眾分醊之殺其愛妾以食士城中男女七八千人相枕而死莫有離叛城陷紹生執洪徐廣晉紀曰霍彪為賊貴黑所隔積百日殺馬燒皮鎧食之又曰韓晃蘇碩等攻苑城中飢米, SBCK: ''}
