  - {type: variant, offset: 601, length: 0, content: '', SBCK: 劉表死曹公尅荆州得劉琮水軍㳂流東下呉主孫權遣周瑜領兵逆曹公遇於赤壁初一交戰曹公軍披退引次江北瑜等在南岸瑜部將黄盖曰今㓂衆我寡難與持乆然觀軍方連舡艦首尾相接可燒而走乃取􅂪衝􅋐艦數十艘實以薪草膏灌其中裏以帷幕上建牙旗先書報曹公欺以欲降又先備走舸各繫大舡後因風相次俱進曹公軍吏士皆延頸遥觀指言盖降諸舡同時發火時風盛猛悉延燒岸上營落頃之熛熖張天熛音摽火飛也人馬燒溺死者甚衆遂敗退耳魏志諸葛誕傳曰太􅀓司馬宣王潜軍東伐以誕爲鎭東將軍後母丘儉反大爲攻具晝夜五六日攻南圍欲决圍盪出圍上諸軍臨髙以發石車火箭逆燒破其攻具晉書王濬伐呉呉人於江險磧要害之處普以鐡鏁横截之又作鐵錐長丈餘暗置江中以逆拒舡先是羊祐獲呉間諜具知情狀濬乃作大筏數十亦方百餘歩􅅞草爲人􅀍甲持杖令善水者以筏先行筏遇鐵錐輙着筏去又作火拒長十餘丈大數十圍灌以麻油在舡前遇鏁燃炬燒之湏􅁷融液断絶於是舡无所礙晉中興書曰殷浩北伐江逌爲長}
