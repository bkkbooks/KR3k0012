  - {type: variant, offset: 624, length: 1, content: 岑, SBCK: 詢仕周遷司衛上士武帝幸雲陽宮委以留府事衛王直作乱焚肅章門詢於内益火故賊不得入武帝善之後周書曰遣將伐髙齊齊將叚韶與太尉蘭陵王長恭同徃扞禦至西境有栢谷城者乃絶險古城千仞諸將莫肯攻圍韶曰分北河東勢爲國家之有􅀂不去栢谷事同痼疾}
