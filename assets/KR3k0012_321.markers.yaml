  - {type: variant, offset: 719, length: 227, content: 謀召置軍中超授試左金吾衛郎將又曰元和中鄂岳都團練使李道古攻申州剋其羅城乃進圍逼其中城城中守卒夜師婦人登城而呼懸門竊發分出其眾道古之眾驚亂多為虜殺又曰王凝為宣州黃巢自嶺表北歸大掠淮南攻圍和州凝令牙將樊儔舟師據採石以援之儔違令凝即斬之以徇命別將馬頴代儔赴援竟解歷陽之圍賊怒引眾攻宣城大將王涓請出軍逆戰凝曰賊忿而來宜持重待之彼眾我寡萬一不捷則州城危矣涓銳意請行凝即閱集丁壯分守要害登陴設備涓果戰死賊乘勝而來則守有備矣賊為梯衝之具急攻數月禦備力殫吏民請曰賊之兇勢, SBCK: 鋒}
