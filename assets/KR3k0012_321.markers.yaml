  - {type: variant, offset: 602, length: 1, content: 朝, SBCK: 及丁零反叛浩軍震懼姚襄去軍十里結草爲營方欲擊浩浩甚懷憂令逌代之逌曰今兵非不精而衆少於羗且壍柵甚固難與校力乃取數百雞以長繩連之脚皆繫火一時驅放以兵遏後群鷄駭散一時飛過壍並集羗營皆燃因其驚乱縱兵擊之襄遂摧退宋書王􅀇謨圍滑臺城内多茅屋衆皆曰冝以火箭燒之又殷琰傳曰琰與}
