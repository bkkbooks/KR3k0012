  - {type: variant, offset: 662, length: 0, content: '', SBCK: 能來且城勢雖髙其中甚狹火弩射之一朝可盡諸將稱善遂鳴鼓而攻之城潰獲儀同薛敬禮大斬獲首虜仍城華谷置戍而還隋書曰文帝時髙頴獻取陳之䇿曰江南土薄舎多竹茅所有儲積皆非地窖古孝切宻遣行人因風縱火待彼修立復更燒之不出數年自可財力俱盡帝行其䇿由是陳人益弊通典曰火兵以驍􅀐夜䘖枚􅅞馬口人􅀒束薪麻藴懷火直抵敵營一時舉火營中驚亂急而乗之静而勿攻几火攻皆因天時燥旱營舎茅竹積穗粮軍營於􅮘草􅀫莽之中因風而焚也又曰火獸以艾煴火煴於問切置瓢中瓢開四孔繫瓢於野猪麞鹿項下針其尾端向敵營而縱之奔入草中瓢敗火發又曰火禽以胡桃剖分空中實艾火開兩孔復合繫野鷄項下針其尾而縱之奔入草中器敗火發又曰火盗遣人暗伏與敵人同者夜􅀼號逐便懷火偷入營焚其積聚火發必亂而出又曰火弩以擘張弩射及三百歩者以瓢盛火符矢端以數百張中夜齊射敵營中芻草積聚又曰以小瓢盛油冠矢端射城樓櫓版木上瓢敗油散因燒矢鏃内中射油散處火立燃復以油瓢續之則樓櫓盡焚謂之火箭又曰磨杏子中空以艾實之繫雀足上加火薄暮群放飛入城壘中捷􅀫其積聚廬舎湏􅁷火發謂之火杏矣水攻孫子曰以水佐攻者強水以爲衛故強也水可以絶而可以奪水但以絶其敵道分敵軍不以奪敵蓄積史記曰漢王遣韓信巳定齊臨淄遂東追齊王田廣至髙宻項羽使龍且將}
