  - {type: variant, offset: 853, length: 696, content: 引眾攻宣城大將王涓請出軍逆戰凝曰賊忿而來宜持重待之彼眾我寡萬一不捷則州城危矣涓銳意請行凝即閱集丁壯分守要害登陴設備涓果戰死賊乘勝而來則守有備矣賊為梯衝之具急攻數月禦備力殫吏民請曰賊之兇勢不可當願尚書歸疑退之懼覆尚書家族凝曰人皆有族子豈獨全誓與此城同存亡也既而賊已退去時乾符五年也又曰王栖曜為常州別駕時江左兵荒詔內常侍馬日新領汴滑五千人鎮之日新貪暴賊蕭庭蘭乘人怨訴逐之而劫其眾時栖曜遊弈遠郊遂為賊所脅進圍蘇州栖曜因其懈怠挺身登城率城中出攻賊眾大潰又曰張伾建中初以澤潞將鎮臨洺田悅攻之伾度兵力不能出戰嚴設守備嬰城拒守賊不能拔累月攻之益急士多死傷糧儲漸乏救兵未至伾知事不濟無以激士心乃悉召將卒於軍門命其女出拜之謂曰將士辛苦守戰伾之家無尺寸物與公等為賞獨有此女幸未嫁人願出賣之為將士一日費眾皆大哭曰誓與將軍死戰幸無慮也會馬燧以太原之師至與軍眾合擊悅於城下大敗之伾乘勢出戰士卒無不一當百圍解以功遷泗州刺史三國典略曰周獨孤永業恐洛州刺史叚思文不能自固馳入金墉助守尉遲逈為士山地道曉夕攻戰永業選其三百人為爪牙每先鋒死戰逈不能剋又曰臺城朱陷侯景又燒大司馬門後閣舍人高善寶以私金千兩賞其戰士直閣將軍宗思領將士數人踰城出外灑水久之火滅景又遣持長柯斧入門下斫門將開羊促鑿扇為孔以槊刺倒二人斫者乃退又曰陳人侵齊北徐州刺史祖班令不閉城門守陴者皆下街巷禁斷人行雞犬不許鳴吠陳人莫測所以疑人走城空不設警備中夜班忽令鼓譟陳人驚散曉復結陳向城班自臨戰陳人先聞其盲謂不能抗拒忽見親在戎行彎弧縱鏑怪之遂退時穆提婆憾之不已欲令城陷不遣救援班軍守百日城竟保全北史曰梁將吳明徹攻圍海西齊將郎基固守乃至削木為箭翦紙為羽圍解還朝僕射楊愔迎勞, WYG: ''}
