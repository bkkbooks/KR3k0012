  - {type: punctuation, offset: 1605, content: 『, id: KR3k0012_CHANT_321-bkkpn381}
  - {type: variant, offset: 1605, length: 0, content: '', WYG: 當與從事議之超怒曰吉凶决於今日從事又俗吏聞此必恐而謀洩死無所名非壯士也衆曰善初夜遂將吏士往奔賊營㑹天大風起令十人持鼓藏賊舍後約曰見火燃皆當鳴鼓大呼餘人悉持兵弩夾門而伏超乃順風縱火前後鼓噪賊衆驚亂超手格殺三人吏兵斬其使及從士三十餘級餘衆百許人悉燒死東觀記曰斬得匃奴節使屋頼帶副使比離支首及節也明日乃還告郭恂恂大驚既而色動超知其意舉手曰掾雖不行班超何心獨擅之乎恂乃説又曰楊璇字機平為零陵太守是時蒼梧桂陽猾賊相聚攻郡縣賊衆}
  - {type: page-break, offset: 1605, content: '', id: KR3k0012_WYG_321-4a, image: WYG0895/WYG0895-0757a.png}
  - {type: variant, offset: 1606, length: 2, content: 下矢, WYG: 而璇力弱吏民憂恐璇乃特制馬車數十乘以排囊盛}
  - {type: punctuation, offset: 1608, content: 、, id: KR3k0012_CHANT_321-bkkpn382}
  - {type: punctuation, offset: 1609, content: 、, id: KR3k0012_CHANT_321-bkkpn383}
  - {type: variant, offset: 1610, length: 0, content: '', WYG: 於車上排囊即今囊袋也繫布索於馬尾又為兵車專彀弓弩尅期㑹戰乃令馬車居前順風鼓灰賊不得視因}
  - {type: page-break, offset: 1610, content: '', id: KR3k0012_WYG_321-4b, image: WYG0895/WYG0895-0757b.png}
  - {type: variant, offset: 1611, length: 1, content: 雨, WYG: 火燒布燃馬驚奔突賊陣因使後車弓弩亂發鉦鼔鳴震羣盗波駭破散追逐傷斬無數梟其渠帥郡境以清又曰皇甫嵩討黄巾賊張角嵩保長社賊來圍城嵩兵少軍中皆恐乃召軍吏謂曰兵有竒變不在衆寡今賊依草結營易為風火若因夜縱火必大驚亂吾出兵擊之其功可成其夕遂大風嵩乃約勒軍士皆束炬乘城使鋭士間出圍外縱火大呼城上舉燎應之嵩因鼓而奔其陣賊驚亂奔走嵩進兵討之與角弟梁戰於廣宗梁衆精勇嵩不能剋明日乃閉營休士以觀其變知賊意稍懈乃潛夜勒兵鷄鳴馳赴其陣至晡時大破之吳志劉表死曹公克荆州得劉琮水軍㳂流東下吳主孫權遣周瑜領兵逆曹公遇於赤壁初一交戰曹公軍敗退引次江北瑜等在南岸瑜部將黄蓋曰今㓂衆我寡難與持久然操軍方連船艦首尾相接可燒而走乃取蒙衝鬭艦數十艘實以}
  - {type: page-break, offset: 1611, content: '', id: KR3k0012_WYG_321-5a, image: WYG0895/WYG0895-0757c.png}
