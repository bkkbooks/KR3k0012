  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0012_CHANT_321-1a.2}
  - {type: variant, offset: 5, length: 1, content: 拒, SBCK: 曰火人與敵陳師敵傍近草因風燒之戰之􅂇也二曰火積燒其積蓄三曰火輜燒其輜重四曰火庫當使姦人入敵營燒其兵庫五曰火墜墜墮也以火墮敵營中也尖頭之法以鐵籠火着箭頭強弩射敵營中一曰火道燒絶其粮道行火必有因因姦人也又因風燥而焚之煙火素具燒煙具也先具燒燧之属發火有時起火有日時者天之燥也日者􅀫在戍箕東壁翼軫也戊翼叅日􅀫此􅀫之日風起凢此四􅀫者風起之日蕭丗誠云春景丁夏戊巳秋壬癸冬甲乙此日有疾風猛雨也吾勘太乙中有飛鳥十精知風雨期五子元運式也各候其時可用火也凢火攻必因五火之變而應之火發於内則軍應之於外以兵應之使姦人縱火於敵營内當逺進以攻攻其外火發而兵静者待而勿攻極其火力可從而從之不可從則止見利則進知難則止極盡火力可則進不可則止吾无使敵知吾爲火可發於外無待於内以時發之火發於上風無攻於下風不便也燒之必退退而逆攻之則必爲所害者也晝風乆風夜止數常也陽風也晝風則火氣相動夜也風卒欲縱火亦當如風之長短也几軍必知五火之變以數}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_321-1b}
  - {type: variant, offset: 5, length: 4, content: 拒守下唐, WYG: 曰火人與敵相持敵傍近草因風燒之戰之助也二曰火積燒其積蓄三曰火輜燒其輜重四曰火庫當使奸人入敵營燒其兵庫五曰火墜墜墮也以火墮敵營中也火墜之法以鐵籠火著箭頭頸强弩射敵營中一曰火道燒絶其糧道行火必有因因奸人也又因風燥焚之煙火必素具具燒具也先具燒燧之屬發火有時起火有日時者天之燥也日者月在箕壁翼軫也凡此四宿者風起之日也月在謂月之所次也箕水豹壁水㺄翼火蛇軫火蚓四宿乃風之使當推歩躔次月宿于此必有風起天官}
