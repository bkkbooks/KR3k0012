  - {type: variant, offset: 66, length: 8, content: 萬頃坐是流于嶺外, SBCK: 亦拒火之方也後漢書曰奉車都尉竇固出擊匈奴以班超爲假司馬將兵別擊伊吾戰於蒲􅀋海多斬首虜而還伊吾匈奴中地名今在伊州納職縣界前書音義曰蒲􅀋匈奴中海名在潡煌北也固以爲能遣與從事郭恂俱使西域超到鄯善鄯夲西域樓蘭囯也昭帝元鳯四年改爲鄯善去陽関一千六百里去長安六千一百里鄯善王廣奉超禮敬甚備後忽更踈懈超謂其宮屬曰覺廣禮意薄乎此必有北虜使來狐疑未知所從故也明者暏未萌况巳着邪乃召侍胡詐之曰匈奴使來數日今安在乎侍胡惶恐具服其狀超乃閉侍胡悉㑹其吏士三十六人與共飲酒酣因激怒之曰卿曹與我俱在絶域曹輩欲立大功以求冨貴今虜使到裁數日而王廣禮敬即廢如今鄯善収吾屬送匈奴骸骨長爲豺狼食矣爲之奈何官屬皆曰令在危亡之地死生從司馬超曰不入虎穴不得虎子當今之計獨有因夜以火攻虜使彼不知我多少必大震怖可殄盡矣滅此虜則鄯善破膽功成事立矣衆曰當與從事議之超怒曰􅁻㐫决於今日從事文俗吏聞此必恐而謀􅂥死無所名非壯士也衆曰善於夜遂將吏士徃奔虜營㑹天大風超令十人持鼓藏虜舎後約曰見火然皆當鳴鼓大呼餘人悉􅀅兵弩夾門而伏超乃順風縱火前後鼓噪虜衆驚亂超手格殺三人兵吏斬其使及從士三十餘級餘衆百許人悉燒死東觀記曰斬得匈奴節使屋頼帯副使北離支首及節也明日乃還告郭恂恂大驚旣而色動超知其意舉手曰􅁺雖不行班超何必獨擅之乎恂乃􅀃}
