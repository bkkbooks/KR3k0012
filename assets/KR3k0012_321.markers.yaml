  - {type: variant, offset: 2660, length: 0, content: '', WYG: 盧循襲破合浦徑向交州慧度自登髙艦合戰放火箭雉尾炬循衆懼一時潰散齊書宗室始安貞王遥光𫝊曰太子右衞率左興盛屯東府東籬門衆軍圍東城臺軍射火箭燒東北角樓至夜城潰南史曰武帝時江東梁將王琳率兵東下陳遣大將侯瑱等拒之瑱以琳軍威方盛乃引軍入蕪湖避之是時西南風至急琳謂得天時將取琳州侯瑱等}
  - {type: page-break, offset: 2660, content: '', id: KR3k0012_WYG_321-7a, image: WYG0895/WYG0895-0758c.png}
  - {type: variant, offset: 2661, length: 1, content: 龕, WYG: 出蕪湖以躡其後比及兵交西南風翻為瑱用琳兵放火燧以擲瑱船者返燒其船琳兵潰亂投水死者十二三其餘皆棄船上岸為陳軍所殺殆盡北史曰李詢仕周遷司衛上士武帝幸雲陽宫委以晉府事衛王直作亂焚肅章門詢於内益火故賊不得入武帝善之北齊書曰二月周師來冦遣叚韶與大尉蘭陵王長恭同徃扞禦至西境有栢谷城者乃絶險}
