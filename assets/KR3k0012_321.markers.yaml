  - {type: variant, offset: 2754, length: 0, content: '', WYG: 唐書曰武徳中劉黑闥據河北反太宗率兵討之先遣人堰水上流令黑闥得渡及戰遽合决堰水至深丈餘賊徒既敗爭渡水溺死者數千人咸以為神黑闥與二百餘騎奔於突厥悉虜其兵衆河北復平又曰武徳中李靖隨河間王孝恭討蕭銑屬江水大汎漲諸}
  - {type: page-break, offset: 2754, content: '', id: KR3k0012_WYG_321-14b, image: WYG0895/WYG0895-0762b.png}
  - {type: variant, offset: 2755, length: 0, content: '', WYG: 皆請停兵以待水退靖謂孝恭曰以速為神機者時不可失今若乗水漲之勢倐忽至其城下可謂疾雷不及掩耳兵家上䇿也孝恭從之進兵次夷陵銑將文}
  - {type: page-break, offset: 2755, content: '', id: KR3k0012_WYG_321-15a, image: WYG0895/WYG0895-0762c.png}
  - {type: variant, offset: 2756, length: 3, content: 燻鼠食, WYG: 𢎞屯清江靖與之决戰大破賊軍仍率所部星馳進發營於荆州城下𢎞既敗銑衆莫不震讋靖又破其將楊君茂鄭秀等遂圍城數重其夜銑遣使請降靖即入據其城號令嚴肅軍無私焉淮南子曰始智伯率韓魏二國伐趙晉陽决水而灌}
