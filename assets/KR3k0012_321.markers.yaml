  - {type: variant, offset: 1578, length: 267, content: 禽滑厘問曰雲梯施攻備已具武力又多爭上吾城為之奈何墨子曰多下矢石灰以雨薪火水湯以濟之若城外穿地來攻者宜城中掘於井以薄甖內井中使聽聰者伏甖聽之審知穴處鑿內而迎之呂氏春秋曰公輸般為高雲梯欲以攻宋墨子聞之自魯而往裂裳裹足日夜不休十日十夜而至於郢見荊王曰臣北方之鄙人也聞大王將攻宋信有之乎王曰然墨子曰臣以宋必不可得公輸般天下之攻工也已為攻宋之械矣墨子曰請公輸般試攻之臣請試守之於是公輸般設攻宋之械墨子設守宋之備公輸般九攻之墨子九卻之不能入故荊輟不攻宋墨子也能以術禦之荊而存乎宋矣博物志曰處士東里魂責禹亂天下事禹退作三城強者攻弱者守敵者戰城郭蓋禹, SBCK: ''}
