  - {type: variant, offset: 2720, length: 0, content: '', WYG: 死者十有七八帝遣賜以衣袴十一月魏遣楊大眼揚聲决堰絢命諸軍撤營露次以待之遣其子悦挑戰斬魏咸陽王府司馬徐方興軍小却十五年四月堰成其長九里下濶一百四十丈上廣四十五丈髙二十丈深十九丈五尺夾之以堤并樹把栁軍人安堵列居其上其水清潔俯視居人墳墓了然}
