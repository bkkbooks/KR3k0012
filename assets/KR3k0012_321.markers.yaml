  - {type: variant, offset: 560, length: 292, content: 大詬罵子奇責以悖逆損害平人子奇欲存之左右曰此人必不為我用又得眾死心不可留故害之又曰史朝劉昌在圍中連月不解城中食盡賊垂將陷之刺史李岑計蹙昌為之謀曰今河陽有光弼制勝且江淮足兵此廩中有數千斤趜可屑以食眾計援兵不二十日當至東南敵眾以為危昌請守之昌遂被鎧持盾登之陳逆順以告諭賊之眾甚畏之後十五日副元師李光弼救軍至賊乃霄潰光弼聞其謀召置軍中超授試左金吾衛郎將又曰元和中鄂岳都團練使李道古攻申州剋其羅城乃進圍逼其中城城中守卒夜師婦人登城而呼懸門竊發分出其眾道古之眾驚亂多為虜殺又曰王凝為宣州黃巢自嶺表北歸大掠淮南攻圍和州凝令牙將樊儔舟師據採石以援之儔違令凝即斬之以徇命別將馬頴代儔赴援竟解歷陽之圍賊, WYG: 激}
