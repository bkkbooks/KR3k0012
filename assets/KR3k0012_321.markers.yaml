  - {type: variant, offset: 1332, length: 244, content: 金千兩賞其戰士直閣將軍宗思領將士數人踰城出外灑水久之火滅景又遣持長柯斧入門下斫門將開羊促鑿扇為孔以槊刺倒二人斫者乃退又曰陳人侵齊北徐州刺史祖班令不閉城門守陴者皆下街巷禁斷人行雞犬不許鳴吠陳人莫測所以疑人走城空不設警備中夜班忽令鼓譟陳人驚散曉復結陳向城班自臨戰陳人先聞其盲謂不能抗拒忽見親在戎行彎弧縱鏑怪之遂退時穆提婆憾之不已欲令城陷不遣救援班軍守百日城竟保全北史曰梁將吳明徹攻圍海西齊將郎基固守乃至削木為箭翦紙為羽圍解還朝僕射楊愔迎勞之曰卿本文吏遂有武略削木剪紙皆無故事班墨之思何以相過墨, krp: 焉淮南}
