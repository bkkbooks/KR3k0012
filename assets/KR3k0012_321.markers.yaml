  - {type: variant, offset: 2663, length: 1, content: 勒, WYG: 城千仞諸將莫肯攻圍韶曰汾北河東勢為國家之有若不去栢谷事同痼疾計彼援兵㑹在南道今斷其要路救不能來且城勢雖髙其中甚狹火弩射之一朝可盡諸將稱善遂鳴鼓而攻之城潰獲儀同薛敬禮大斬獲首虜仍城華谷置戍而還隋書曰文帝時髙熲獻取陳之䇿曰江南土薄舍多竹茅所有儲積皆非地窖宻遣行人因風縱火待彼脩立復更燒之不出數年自可財力俱盡帝行其䇿由是陳人益弊通典曰火兵以驍騎夜啣枚縛馬口人負束薪麻煴懐火直抵敵營一時舉火營中驚亂急而乘之又曰火獸以艾煴火置瓢中瓢開四孔繫瓢於野猪麞鹿項下針其尾端向敵營而縱之奔入草中瓢敗火發又曰火禽以胡桃剖分空中實艾火開兩孔復合繫野鷄項下針其尾而縱之奔入草中噐敗火發又曰火盗遣人暗伏與敵營相近夜竊號令便懐火偷入營焚其積聚火發必亂而出又曰火弩者以强弩射及三百歩者以瓢盛火縛於矢端以數百張中夜齊射敵營中焚其積聚又曰以小瓢盛油冠矢端射城樓櫓版木上瓢敗油散因燒矢鏃内中射油散處火立燃復以油瓢續之則樓櫓盡焚謂之火箭又曰火杏磨杏子中空以艾實之繫雀足上加火薄暮羣放飛入城壘中棲宿積聚廬舎湏􅁷火發謂之火杏水攻孫子曰以水佐攻者強水以為衛故強也水可以絶而不可以奪水但以絶其敵道分敵軍不以奪敵畜積史記曰漢王遣韓信已定齊臨淄遂東追齊王田廣至髙宻項羽使龍且將二十萬救齊田廣龍且并軍與信戰未合人或説龍且曰漢兵逺鬭窮㓂力戰其鋒不可當齊楚自居其地戰兵易敗散不如深壁令齊王使信臣招所亡城亡城聞其王在楚來救必反漢漢兵二千里客居齊齊城皆反之其勢無所得食可無戰而降也龍且曰吾救齊不戰而降之吾何功今戰而勝之齊之半可得何為止遂戰與信夾濰水陣濰音淮韓信乃夜令人為萬餘囊盛沙壅水上流引軍半渡擊龍且佯不勝還走龍且果喜曰固知信怯也遂追信渡水信使人决壅囊水大至龍且軍大半不得渡即急擊之龍且水軍遂敗走後漢書曰董卓將兵三萬討先零羌為羌胡所圍糧食乏絶進退逼急乃于所度水中偽立􅋣以捕魚􅋣與堰同而潛從􅋣下過軍比賊追之决水深不得渡時衆敗退唯董卓全師而還也又曰曹操圍吕布於下邳引沂泗二水灌城克之又曰光武至邯鄲故趙繆王子林繆王景七代孫名元前書曰元坐殺人為大鴻臚所奏諡曰繆音謬又東觀漢記曰林作臨字說光武曰赤眉今在河東但决水灌之百萬之衆可使為魚南史曰齊髙帝新踐祚恐魏致討以送劉昶為辭以為軍衝必在夀春非垣崇祖莫可為捍徙為豫州刺史監豫司二州諸軍事封望蔡侯建元二年魏遣劉昶攻夀春崇祖乃於城西北立堰塞肥水起小城使數千人守之謂長史封延伯曰虜必悉力攻小城若破此堰放水一激急踰三峽自然沉溺豈非小勞而大制耶及魏軍由西道集堰南分軍東路内薄攻小城崇祖著白紗帽肩輿上城手自轉式日晡時决小堰水勢奔下魏攻城之衆溺死千數大衆退走梁書曰魏降人王足陳計求堰淮水以灌壽陽足引北方童謡曰荆山為上格浮山為下格潼沱為激溝併灌鉅野澤帝以為然使水工陳承伯材官將軍祖暅視地形咸謂淮内沙土漂輕不堅實其功不可就帝弗納發徐揚人率二十户取五丁以築之假康絢節督淮上諸軍事并䕶堰作人及戰士有衆二十萬於鍾離南起浮山北抵巉石依岸築土合脊於中流十四年四月堰將合淮水漂疾復决潰衆患之或謂江淮多有蛟能乘風雨决壊岸其性惡鐵因是引東西二冶鐡噐大則釡鬲小則鋘鋤數千萬沉於堰所猶不能合乃伐樹為井榦填以巨石加土其上縁淮百里内岡陵木石無巨細必盡負擔者肩穿夏日疾疫死者相枕蠅蟲晝夜聲相合武帝愍之遣尚書}
