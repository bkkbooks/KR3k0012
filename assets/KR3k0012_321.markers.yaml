  - {type: variant, offset: 2246, length: 392, content: 食取草實而食之魏志曰太祖圍張超於雍丘超言唯臧洪當來救吾眾人以為袁曹方穆洪為紹所表用必不敗好招禍洪聞之果徒跣號泣勒所鎮又從紹請兵馬救超紹不許遂為太祖所滅洪由是怨紹紹興兵圍之歷年不下紹忿洪無降意增兵急攻洪自度不得免呼吏士謂曰袁氏無道所圖不軌且不救洪郡洪於大義不得不死念諸君無事空興此禍耳可將妻子去吏士皆垂泣掘鼠煮筋角後無所食主簿啟內廚米三斗洪使作薄粥眾分醊之殺其愛妾以食士城中男女七八千人相枕而死莫有離叛城陷紹生執洪徐廣晉紀曰霍彪為賊貴黑所隔積百日殺馬燒皮鎧食之又曰韓晃蘇碩等攻苑城中飢米一㪷萬錢晉書劉崑赴并州上表曰臣自涉州彊目覩困之流移四散十不得存二攜老扶弱不絕於路及其在者鬻賣妻子生相捐棄死亡委厄白骨橫野哀呼之聲感傷和氣群胡數萬周匝四山動足遇掠開目覩寇唯有壺關可得告糴而此二道九州之險數人當路則百夫不敢進公私往反沒喪者多嬰守窮城不得薪菜耕牛既盡又乏田器以臣愚短當此至難憂如循環不遑寢食, WYG: 礙}
