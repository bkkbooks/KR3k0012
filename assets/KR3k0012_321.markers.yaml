  - {type: variant, offset: 623, length: 0, content: '', SBCK: 盧脩龍破合浦徑向交州慧度自登髙艦合戰放火箭雉尾炬修衆俱然一時潰散齊書宗室脩安王遥光反詔太子右衛率左興盛屯東府東離門衆軍圍東城臺軍射火箭燒東北角樓至夜城潰陳書曰武帝時江東梁將王琳率兵東下陳遣大將侯瑱等拒之瑱以琳軍威方盛乃引軍入蕪湖避之是時西南風至急琳謂得天時將取􅀭州侯瑱等徐出蕪湖以躡其後北及兵放火西南風翻爲瑱用琳兵放火燧以擲瑱舡者返燒其舡琳兵潰乱透水死者十二三其餘皆棄舡上岸爲陳軍所殺殆盡北史曰}
