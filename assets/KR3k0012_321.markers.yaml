  - {type: variant, offset: 2024, length: 2, content: 解宋, SBCK: 能存危不能安無爲貴智臣請試潜行伏行也見韓魏之君而約之乃見韓魏之君􅀃曰聞之脣亡而齒寒今智伯率二君而伐趙趙將亡矣則君爲之次矣今而不圗之禍將及二君二君曰智伯之爲人麄中而少親我謀而泄事必敗爲之奈何張孟談曰言出二君之口入臣之耳人孰知之者乎且同情相成同利相死君亦圖之二君乃與孟談謀隂與之盟張孟談乃報襄子至期日之夜趙民煞守隄之吏决水灌智伯智伯軍救水而亂韓魏翼而擊之襄子卒犯其前大敗智伯軍煞其身而三分其國太白隂經水攻具篇曰以水佐攻者強水因地而成勢爲源髙於}
