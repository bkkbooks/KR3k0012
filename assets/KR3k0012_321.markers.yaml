  - {type: variant, offset: 1250, length: 0, content: '', SBCK: 􅁥二州諸軍事封望蔡侯建元二年魏遣劉昶攻壽春崇祖乃於城西北立堰塞肥水起小城使數千人守之謂長史封伯曰虜必悉力攻小城􅀂破北堰放水一激急愈二峽自然沉溺豈非小勞而大制􅁘及魏軍由西道集堰南分軍東路内薄攻小城崇祖着白紗帽肩輿上城手自轉式日晡時决小埭水勢奔下魏攻城之衆溺死千數大衆退走梁書曰魏降人王足陳計求堰淮水以灌壽陽足引北方童謡曰荆山爲上格浮山爲下格潼江爲激溝併灌鉅野澤帝以爲然使水工陳承伯材官將軍祖暅視地形咸謂淮内沙土漂輕不堅實其功不可就帝弗納發徐楊人卒二十户取五以築之假康絢節督淮上諸軍事并堰作役人及戰士有衆二十萬於鍾離南起浮山北􅔰巉石依岸築土合脊於中流十四年四月堰將合淮水漂没復決潰衆患之或謂江淮多蛟能乗風雨决壞岸崖其性惡鐵因是引東西二冶鐵器大則釡鬲小則钁鋤數千萬沉於堰所猶不能合乃伐樹爲幹以巨石加土其上縁淮百里内崗陵木石無巨細盡􅀒擔者肩穿夏日疾疫死者相枕蠅蠱晝夜聲合武帝愍之遣尚書右僕射􅀽昂侍中謝舉假節慰勞并加蠲復是冬寒甚淮泗盡凍士卒死者十有七八帝遣賜以衣袴十二月魏遣將楊大眼聲決堰絢命諸軍徹營露次以待之遣其子恱挑戰斬魏咸陽王府司馬徐方興軍小却十五年四月堰成其長九里下闊一百四十丈上廣三十五尺髙二十丈􅀷十九丈五尺夾之以堤并樹􅂎柳軍人安堵列居其水清㓗俯視居人墳墓了然皆在其下或謂絢曰四瀆天所以節宣其氣不可乆塞􅀂鑿湫東注則游波寛緩堰得不壞絢然之開湫東注人縱反間於魏曰梁所懼開湫魏人信之果鑿山􅀷五丈開湫北注水日夜分流湫猶不减其月魏軍竟潰而歸水之所及夾淮方數百里地魏壽陽城戍稍徙頓八公山北南居人散就崗壟􅀄起徐州界刺史張豹子謂巳必尸其事旣而絢以他官來􅁥作豹子甚慙由是譛絢與魏交通帝雖不納猶以軍事徴絢㝷除司州刺史領安陸太守絢還後豹子不脩堰至其秋淮水􅁀長堰壞奔流于海殺數萬人其聲若雷聞三百里水中怪物隨流而下或人頭魚身或龍形馬首殊􅀋詭狀不可勝名陳書曰閩中守陳寳應舉兵反據建安晉安二郡界水陸爲柵將軍章昭逹討之據其上流命軍士伐木帶枝葉爲筏施拍於其上拍普伯切綴以大索相次列營帶夾兩岸寳應數挑戰昭逺按甲不動俄而􅁀􅀨江水大漲昭逹放筏衝突水柵盡破又出兵攻其歩軍寳應大潰遂尅定閩中又曰歐陽紇據嶺南反遣將章昭逹督衆軍討之紇乃出柵涯口涯音崖多聚沙石盛以竹籠置于木柵之外用遏舟艦昭逹居其上流裝艦造舟以臨賊柵又令軍人䘖刀潜行水中斫竹籠篾皆解因縱大艦隨流突之賊衆大敗因擒紇}
