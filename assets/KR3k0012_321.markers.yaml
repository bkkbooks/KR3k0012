  - {type: variant, offset: 84, length: 0, content: '', SBCK: 相聚攻郡縣賊衆多而琁力弱吏民憂恐琁乃特制馬車數十乗以排囊盛石􅁅於車上排嚢即令排袋也排蒲拜切繫布索於馬尾又爲兵車專彀弓弩剋共㑹戰乃令馬車居前順風鼓􅁅賊不得視因以火燒布然馬驚奔突賊陣因使後車弓弩亂發鉦鼓鳴震群盗波駭破散追逐傷斬無數梟其渠師郡境以清又曰皇甫嵩討黄巾賊張角嵩保長社賊來}
