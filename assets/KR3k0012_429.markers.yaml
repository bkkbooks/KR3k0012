  - {type: variant, offset: 3250, length: 0, content: '', SBCK: 非一人之天下也天下之天下也書云皇天無親惟德是輔故天下之天下隂陽之和不私長一􅀋甘露時雨不私長一物私猶異也萬民之主不阿一人又曰夏不衣裘非愛裘也煖}
  - {type: variant, offset: 3250, length: 11, content: 有五默默而臣不得預一焉, WYG: 所以}
  - {type: variant, offset: 3250, length: 0, content: '', krp: 非一人之天下也天下之天下也書云皇天無親惟德是輔故天下之天下隂陽之和不私長一類甘露時雨不私長一物私猶異也萬民之主不阿一人又曰夏不衣裘非愛裘也煖}
  - {type: variant, offset: 3251, length: 3, content: 五默默, SBCK: 餘也冬不用翣翣扇也非愛翣也清有餘也清寒聖人不爲私非愛費也節乎巳也說苑曰人臣之公治官事則不營私處公門則不言貨當公法則不阿親奉公舉則不避仇讎忠於事君謂之公又曰楚令尹虞丘子言於莊王曰臣聞奉公行法可以得榮能淺行薄無望上位臣爲令尹十年國不加治竊選俊士孫叔敖秀才多能其性無欲君舉}
