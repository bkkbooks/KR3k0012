  - {type: variant, offset: 2670, length: 176, content: 貴士者以其能直言也言直則枉者見人主欲聞枉而惡直是鄣水源而欲其流也說苑曰魏武侯浮西河而下中流謂吳起曰美哉山河之固此魏之寶也對曰在德不在險昔三苗氏左洞庭而右彭蠡德義不脩而禹滅之夏桀之居左河濟而右太華伊闕在南羊腸在北脩政不仁而湯放之殷紂之國左孟門而右太行常山在其北大河經其南脩政不德而武王伐之由此觀之在德不在險若君不脩德舡中之人盡敵國也武侯曰善又曰秦始皇既有, SBCK: 禁殺傷}
