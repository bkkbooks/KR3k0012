  - {type: variant, offset: 2320, length: 288, content: 正言直論餘慶因亦重之晏子春秋曰景公觀於淄上歎曰使國可長保而傳之子孫豈不樂哉晏子曰今君臨民若寇讎見善如避熱不亦難乎又曰景公晝被髮乘六馬御婦人以出正閨肘跪擊馬而反之曰非吾君也公慚而不朝晏子曰臣聞下無直辭上有墮君民多矯行今君有失行而刖跪直禁是君之福也於是令刖跪倍資又曰景公見梁丘據公曰與我和晏子曰此同也和者君甘則臣酸君淡則臣醎今據也君甘則甘所謂同也安得為和尸子曰范獻子遊河大夫皆在君曰孰知欒氏之子大夫莫荅舟人清涓捨揖荅曰君奚問欒氏之子君曰自吾亡欒氏也其老者未死少者壯矣清涓曰善脩晉國之政內得大夫外不失百姓雖欒氏子其若君何若不脩晉國之政內不得大夫而外失百姓則舟中之人皆欒氏子也君曰善呂, WYG: 吕}
