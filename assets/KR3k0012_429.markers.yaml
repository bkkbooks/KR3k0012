  - {type: variant, offset: 785, length: 886, content: 宰相之坐有失行婦人一坐竦然道子為慚崔鴻十六國春秋後趙錄曰張進元城屠各人也為剌奸外部都督糺舉不避豪右軍中憚之號曰張霹靂又前涼錄曰汜禕字休臧燉煌人為福祿令剛直不事上府酒泉太守馬漢遣督郵張休祖劾禕休祖曰君不聞寧逢三千頭虎不逢張休祖乎禕怒以印擊肘出而就縛縛訖發印以告從事聞休祖坐不解印擅縛令長以大不敬論禕遷居延令又前秦錄曰王墮字安生京兆霸城人也博學有雄才性剛愎疾惡雅好直言疾董榮如仇讎每朝見之略不與言人謂之曰董尚書貴幸一時公宜降意墮曰何雞狗而令國士與之言乎榮聞而慚恨故說符生誅之及刑榮謂墮曰君今復敢不數董龍作雞狗乎墮瞋目而叱之龍榮之小字也後魏書曰尉聿字成興性耿介肅宗時為武衛將軍領軍元乂秉權百寮莫不致敬聿獨長揖不拜出為涼州刺史涼州緋色天下之最又送白綾二千疋令聿染之聿拒而不許又曰古弼代人也少忠謹善騎射初為獵郎使長安稱旨轉門下奏事以敏正著稱太宗嘉之賜名曰筆取其直而有用後改名弼言其有輔佐才也上谷民上書言苑囿過度民無田業宜減太半以賜貧者弼覽而善之入欲陳奏遇世祖與給事中劉樹棊志不聽事弼侍坐良久不獲申聞乃起於世祖前捽樹頭掣下床以手搏其耳以拳歐其背曰朝廷不治寔爾之罪世祖失容曰於棊不聽奏事實在朕躬樹有何罪置之弼乃具狀以聞世祖奇弼公直皆可其所奏以與百姓又曰游肇之為廷尉也世宗嘗私勑肇有所降怒肇執而不從曰陛下自能恕之豈是令臣曲筆也其執意如此又曰于烈世宗初咸陽王禧當權遣家奴傳信於烈曰須舊羽林虎賁執仗出入烈曰天子諒闇事歸宰輔領軍典掌宿衛有詔不敢違理無私給奴惘然而返以報禧禧遣謂烈曰我號天子兒天子叔元輔之命與詔何異烈厲色曰其若是詔應遣官人何由遣私奴索官家羽林烈頭可得羽林不可得禧惡其剛直遂議出之乃授恒州刺史又曰于忠嘗侍宴世宗賜之劍杖令出入周旋恒以自衛遷侍中辭無文世宗曰今文人少心直不如卿欲使卿劬勞於下我無憂於上又曰錄尚書高陽王雍欲以令史朱暉為廷尉評頻煩託吏部尚書元順順不為用雍遂下命用之順投之於地雍聞大怒昧爽坐都廳召順曰身天子之子天子之弟四海之內親尊莫二元順何人以身成命投棄於地順徐謂雍曰高祖遷宅中士創定九流官方清濁軌儀萬古而朱暉小子身為省吏何合為廷尉清官殿下既先皇同氣宜遵成旨自有短垣而復踰之也, SBCK: ''}
