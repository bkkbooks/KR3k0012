  - {type: variant, offset: 195, length: 0, content: '', WYG: 吾聞前志有之曰敵惠敵怨不在後嗣忠之道也敵猶對也夫子禮於賈季我以其寵報私怨無乃不可乎介人之寵非勇也介因也損怨益仇非智也以私害公非忠也釋此三者何以事夫子盡具其孥與其噐用財賄親帥扞之送致諸境又襄三曰祁奚請老晉侯問嗣焉稱解狐其讎也將立之而卒解狐已卒又問焉對曰午也可午祁奚子於是羊舌職死矣晉侯曰孰可以代之對曰赤也可赤職之子伯華於是使祁午}
  - {type: page-break, offset: 195, content: '', id: KR3k0012_WYG_429-2a, image: WYG0896/WYG0896-0736a.png}
  - {type: variant, offset: 195, length: 2, content: 為更, krp: 吾聞前志有之曰敵惠敵怨不在後嗣忠之道也敵猶對也夫子禮於賈季我以其寵報私怨無乃不可乎介人之寵非勇也介因也損怨益仇非智也以私害公非忠也釋此三者何以事夫子盡具其孥與其噐用財賄親帥扞之送致諸境又襄上曰祁奚請老晉侯問嗣焉稱解狐其讎也將立之而卒解狐之卒又問焉對曰午也可午祁奚子於是羊舌職死矣晉侯曰孰可以代之對曰赤也可赤職之子伯華於是使祁年爲中軍尉羊舌赤佐之君子謂祁奚能舉善矣稱其讎不爲謟立其子不爲比舉其偏不爲黨啇書曰無偏無黨王道蕩蕩其祁奚之謂矣又昭七年曰晉韓宣子卒魏献子爲政魏舒魏戊爲梗陽大夫戊舒之庶子也梗陽在太原也魏子謂成鱄鱄晉大夫吾與戊也縣人其以我爲黨乎對曰何也夫舉無他唯善所取親踈一也論語雍也曰子游爲武城宰孔子問之曰汝得人焉耳乎汝爲此宰寧得賢人與之耳語助也對曰有澹臺滅明者行不由徑非公事未甞至於偃之室史記曰邑人出獵任安常爲人分麋鹿雉兔部署小大劇易衆人皆喜曰任少卿分別平又曰陳平爲社宰分肉甚均里父老曰善哉陳孺子之爲宰平曰嗟乎使平得宰天下亦如此肉漢書曰蕭何不與曺叅相能及何病惠帝自臨視因問君即百歲後誰可代君對曰知臣莫若主帝曰曺叅何如何稽首曰帝得之矣臣死不恨又曰朱邑惇篤於故舊然性公正不可交以利天子器之東觀漢記曰耿嵩字文都鉅鹿人履清髙之節髫童介然特立不隨於俗郷黨大人莫不敬異之王莾敗盗賊起宗族在兵中榖食饑貴宗家數百人升合分粮時嵩年十二三宗人長少咸共推令主廩莫不稱平又曰隂興字君陵盡忠竭}
