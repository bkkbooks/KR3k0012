  - {type: variant, offset: 221, length: 1, content: 初, SBCK: 􅂫章字孺文扶風平陵人順帝時遷兾州刺史故人爲清河太守章行部案其姦􅂍乃請太守爲設酒殽陳平生甚欣太守喜曰人皆有一天我獨有二天章曰今夕􅂫孺文與故人飲者私恩地明日兾州刺史案事者公法也遂舉正其罪典略曰荀彧在臺閣不以私欲撓意彧有群從一介才徳實薄或謂彧曰以君當事不可以某爲議郎􅁘彧􅀏曰官者所以表才也􅀂如汝言衆人其謂我何其持心平實皆􅀋此也魏志曰}
