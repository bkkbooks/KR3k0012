  - {type: variant, offset: 2930, length: 2, content: 誰何, WYG: 隂陽之和不私長一類甘露時雨不私長一物私猶異也萬民之主不阿一人又曰夏不衣裘非愛裘也暖有餘也冬不用翣翣扇也非愛翣也清有餘也清寒聖人不為私非愛費也節乎已也説苑曰人臣之公治官事則不營私處公門則不言貨當公法則不阿親奉公舉則不避仇讎忠於事君謂之公又曰楚令尹虞丘子言於莊王曰臣聞奉公行法可以得榮能淺行薄無望上位臣為令尹十年國不加治竊不俊士孫叔敖秀才多能其性無欲君舉而授之政則國可寜莊王從之賜虞丘子田三百號曰國老以孫叔敖為令尹少焉而虞丘子家干法孫叔敖執而戮之虞丘子喜入見於王言孫叔敖果可}
