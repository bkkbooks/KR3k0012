  - {type: variant, offset: 1905, length: 0, content: '', SBCK: 丘上也愼子曰有權衡者不可欺以輕重有尺寸者不可差以長短有法度者不可巧以詐僞又曰夫投鈎分財投䇿分馬非以鈎䇿爲均也使得羙者不知所以德得惡者不知所以怨故􅆱􅀛所以立公識也權衡所以立公正也書契所以立公信也度量所以立公審也法制禮籍所以立公義也凢立公所以弃私也國語曰趙宣子言韓獻子於靈公以爲司馬宣子趙孟獻子韓厥河曲之役趙孟使人以其乗車奸行獻子執而戮之衆咸曰韓厥必不役矣其主朝登之而夕戮其車車車僕也宣子召禮之告諸大夫曰可賀我矣吾舉厥而忠吾乃今知免於罪矣家語曰澹臺滅明公正無私韓詩外傳曰}
  - {type: page-break, offset: 1905, content: '', id: KR3k0012_SBCK_429-6a}
  - {type: variant, offset: 1905, length: 0, content: '', WYG: 邱上也慎子曰有權衡者不可欺以輕重有尺寸者不可差以長短有法度者不可巧以詐偽又曰夫投鈎分財投策分馬非已鈎策為均也使得美者不知所以德得惡者不知所以怨故蓍龜所以立公識也權衡所以立公正也書契所以立公信也度量所以立公審也法制禮籍所以立公義也凡立公所以棄私也國語曰趙宣子言韓獻子於靈公以為司馬宣子趙孟獻子韓厥河曲之役趙孟使人以其乘車奸行獻子執而戮之衆咸曰韓厥必不役矣其主朝登之而夕戮其車車車僕也宣子召禮之告諸大夫曰可賀我矣吾舉厥而忠吾今知免於罪矣家語曰澹臺滅公正而無私韓詩外傳曰}
