  - {type: variant, offset: 4130, length: 469, content: 世清德海內所瞻周書父子兄弟罪不相及況以袁氏歸罪易稱積善餘慶徒欺人耳操曰此國家之意融曰假使成王殺邵公周公可得言不知耶纓綏搢紳所以瞻仰明公者以公聰明仁智輔相漢朝舉直措枉致之雍熙今橫殺無辜則海內觀聽莫不解體孔融魯國男子便當拂衣而去操不得已遂理出彪樊英別傳曰順帝策書備禮玄纁徵英詔切郡縣駕載上道英不得已到京師稱疾不肯赴乃強輿入殿猶不以禮屈帝怒曰朕能生君能殺君能貴君能賤君能富君能貧君君何慢朕英曰臣受命於天生盡其命天也死得其命亦天也陛下焉能殺臣臣見暴君如見仇讎立朝猶不肯可得貴乎雖在布衣列環堵之中晏然自得不易萬乘之尊又何得而賤乎陛下焉能賤臣臣非禮之祿萬鍾不受也申其志雖簞食不厭也陛下焉能富臣焉能貧臣帝不能屈而敬其名使出就太醫養疾日置羊酒語林曰晉王敦與世儒議下都世儒以朝廷無亂且唱兵始自古所難諫諍甚苦處冲變色曰吾過蒙恩遇受任南夏卿自同姦邪阻遏義舉王法焉得相私因目左右令進世儒正色曰君昔歲害兄今又殺弟自古多士豈有如此舉動言畢流涕敦意乃止王符論曰國以賢興以謟衰君以忠安以佞危此古今之常論而時所共知也然衰國危君繼踵不絕者豈時無忠信正直之士哉誠苦其道不得行耳, SBCK: 百二十九}
