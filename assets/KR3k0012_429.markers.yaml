  - {type: variant, offset: 1905, length: 0, content: '', krp: 丘上也愼子曰有權衡者不可欺以輕重有尺寸者不可差以長短有法度者不可巧以詐僞又曰夫投鈎分財投䇿分馬非以鈎䇿爲均也使得羙者不知所以德得惡者不知所以怨故蓍龜所以立公識也權衡所以立公正也書契所以立公信也度量所以立公審也法制禮籍所以立公義也凢立公所以弃私也國語曰趙宣子言韓獻子於靈公以爲司馬宣子趙孟獻子韓厥河曲之役趙孟使人以其乗車奸行獻子執而戮之衆咸曰韓厥必不役矣其主朝登之而夕戮其車車車僕也宣子召禮之告諸大夫曰可賀我矣吾舉厥而忠吾乃今知免於罪矣家語曰澹臺滅明公正無私韓詩外傳曰}
  - {type: variant, offset: 1906, length: 1, content: 耶, SBCK: 者順道而行順理而言公平無私不爲安肆志不爲危易行又曰楚有白公之難有壯之善者辭其母將死君難其母曰棄母死君何乎壯之善曰聞事君者内其禄而外其身今之所養母者君之禄也請往死之比至朝三廢車中其僕曰子懼如是何不返也壯之善曰懼吾私也死吾公也吾聞君子不以私害公遂徃死之韓子曰古之全大體者則天地觀江海不以智累心不以私累巳􅀉治乱於法術託是非於賞罰属輕重於權衡不逆天理不傷情性不引繩之外不推繩之内不急法之外不緩法之内守成理因自然禍福主乎道法而不出乎愛惡榮辱之責在巳而不在乎人故名成於前德垂於後治之至也又曰解狐與荆伯栁爲怨趙簡主問於解狐曰孰可以爲上黨守對曰荆伯栁可趙簡主曰非子之讎乎}
