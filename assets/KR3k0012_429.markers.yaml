  - {type: variant, offset: 517, length: 2, content: 王彬, WYG: 魏國初建時未立太子臨淄侯植有才而愛太祖狐疑以函令宻訪於外唯崔琰露板答曰盖聞春秋之義矣立子以長如五官郎將仁孝聰明宜承正統琰以死守之植琰之兄女壻太祖貴其公亮蜀志廖立傳曰諸葛亮為人公直表廖立徙汶山立聞亮卒泣曰吾其左袵矣又李𫝊曰亮表廖平徙梓潼平聞亮卒乃發病死習鑿齒曰夫水至平而邪者取法鏡至公而醜者忘怒水鏡之所以窮物而不怨者以其無私也水鏡無私猶以免謗况大人君子懐樂生之心流矜恕之德爵之而非私誅之而非怒天下豈有不服也哉故蜀志評曰諸葛亮之為國開誠心布公道其盡忠益時者雖讎必賞犯法怠慢者雖親必罰吴志曰吕䝉字子明嘗以部曲事為江夏太守蔡遺所白䝉無恨意及豫章太守顧邵卒權問所用蒙因薦遺奉職佳吏權笑曰君欲為祁奚耶於是用之甘寧麄暴好殺既嘗失䝉意又時違權令權怒之䝉輒陳請曰天下未定闘將如寧者難得宜容忍之權遂厚寧卒得其用徐廣晉紀曰劉𢎞字和季在襄陽帝在西京命𢎞選良才乃稱守宰徴士武陵五朝}
