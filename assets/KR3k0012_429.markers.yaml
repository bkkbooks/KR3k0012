  - {type: variant, offset: 594, length: 185, content: 齊行忠烈之軌邈焉難逮其有何罪而致禍戮勃然數敦曰兄抗旌內侮戮殺忠義謀圖不軌禍及門戶敦大怒厲聲曰爾之狂悖乃可至此為吾不能殺汝耶丞相導在坐勸彬起謝彬曰昨暴腳痛不能拜且此復何所謝意氣自若敦曰腳痛孰若頸痛然猶以至親忍不加害檀道鸞續晉陽秋曰初淮陵內史虞珧子妻裴以尺牘辯利兼服食絕谷常衣黃衣狀若學道司馬道子常延致甚悅其才每與百官飲宴裴亦預焉悉令與賓客談眾人皆為降節王恭辭曰恭聞男女之別, SBCK: 恐非西}
