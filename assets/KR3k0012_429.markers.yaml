  - {type: variant, offset: 3794, length: 249, content: 職未有對揚謇謇之言其所旌命不授巖谷之士小掾私以於邑小掾聞之三台不明責在三公願明公深思消復災異進納忠良眾人默然慚愧華陽國志曰中山諸王每過溫縣必責求供給溫吏民患之李密至縣中山王過欲徵芻茭薪蒸密引高祖過沛賓客老幼禮桑梓之恭一無煩擾伏惟明王孝思惟則本國望風式歌且儛誅求之疲所未聞命後諸王經過不煩溫縣又曰陳禪字紀山安漢人也拜諫議大夫西域獻幻伎天子與公卿觀之禪獨伏不視李固外傳曰梁冀欲立清河王蒜常侍曹騰聞議定見冀曰清河為人嚴明若遂即位將軍受禍不久矣冀更會議立蠡吾侯子唯固與杜喬深據本議桓帝立固與杜喬以本立蒜下獄, SBCK: 美者乎}
