  - {type: variant, offset: 517, length: 0, content: '', SBCK: 魏國􅀄建時未立太子臨淄侯植有才而愛太祖狐疑以亟令密訪於外唯崔琰露荅曰蓋聞春秋之義立子以長加五官郎將仁孝聦明冝承正統琰以死守之植琰之兄女壻太祖貴其公亮蜀志廖立傳曰諸􅁑亮爲人公直表廢立徙汶山立聞亮卒泣曰吾其左祍矣又李傳曰亮表廢平徙梓潼平聞亮卒乃發病死習鑿齒曰夫水至平而邪者取法鏡至公而醜者忘怒水鏡之所以能窮物而不怨者以其無私也水鏡無私猶以免謗况大人君子懐樂生之心流矜恕之德爵之而非私誅之而非怒天下豈有不服也哉故蜀志評曰諸􅁑亮之爲國開誠心布公道其盡忠益時者雖讎必賞犯法怠慢者雖親必罰呉志曰吕蒙字子明甞以部曲事爲江夏太守蔡遺所白蒙無恨意及豫章太守顧邵卒權問所用蒙因薦遺奉職佳吏權􅀏曰君欲爲祁奚􅁘於是用之甘寧麁􅁀好殺旣甞失蒙意又時逹權令權怒之蒙輙陳請曰天下未定闘將如寧者難得冝容忍之權遂原寧卒得其用徐廣晉紀曰劉弘字和季在襄陽帝在西京命弘選良才乃稱守宰徴士武陵五朝字丗朗髙尚荆}
