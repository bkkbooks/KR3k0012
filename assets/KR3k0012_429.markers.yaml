  - {type: variant, offset: 230, length: 95, content: 周顗以為敦剛愎不仁親害乎子必能稱兵以向朝廷敦既剋石頭顗與戴淵共詣敦謂顗曰伯仁卿負我顗荅曰公戎車內侮下官親帥六軍不能其事使王旅敗績以此負公又問淵吾此舉動天下為何如荅曰見形者謂之逆體識者以為忠敦, krp: 郎耶彧}
