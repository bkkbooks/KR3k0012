  - {type: variant, offset: 190, length: 2, content: 太祖, SBCK: 又儒行曰儒有内稱不避親外舉不避怨左傳文上曰賈季奔狄宣子使􅁷駢送其孥孥妻子也宣子以賈季中軍之佐同官故也夷之蒐賈季戮􅁷駢􅁷駢之人人􅁷駢從臣也欲盡殺賈氏以報之􅁷駢}
  - {type: page-break, offset: 190, content: '', id: KR3k0012_SBCK_429-1b}
  - {type: variant, offset: 190, length: 2, content: 太祖, WYG: 又儒行曰儒有内稱不避親外舉不避怨左傳文六曰賈季奔狄宣子使臾駢送其孥孥妻子也宣子以賈季中軍之佐同官故也夷之蒐賈季戮臾駢臾駢之人人臾駢家臣也欲盡殺賈氏以報之臾駢}
  - {type: variant, offset: 190, length: 2, content: 太祖, krp: 又儒行曰儒有内稱不避親外舉不避怨左傳文上曰賈季奔狄宣子使臾駢送其孥孥妻子也宣子以賈季中軍之佐同官故也夷之蒐賈季戮臾駢臾駢之人人臾駢從臣也欲盡殺賈氏以報之臾駢}
  - {type: punctuation, offset: 193, content: ：, id: KR3k0012_CHANT_429-bkkpn55}
  - {type: 'tls:seg', offset: 193, content: '', id: KR3k0012_CHANT_429-3a.14}
  - {type: punctuation, offset: 193, content: 『, id: KR3k0012_CHANT_429-bkkpn56}
  - {type: variant, offset: 195, length: 2, content: 為更, SBCK: 吾聞前志有之曰敵惠敵怨不在後嗣忠之道也敵猶對也夫子禮於賈季我以其寵報私怨無乃不可乎介人之寵非勇也介因也損怨益仇非智也以私害公非忠也釋此三者何以事夫子盡具其孥與其噐用財賄親帥扞之送致諸境又襄上曰祁奚請老晉侯問嗣焉稱解狐其讎也將立之而卒解狐之卒又問焉對曰午也可午祁奚子於是羊舌職死矣􅀳侯曰孰可以代之對曰赤也可赤職之子伯華於是使祁年爲中軍尉羊舌赤佐之君子謂祁奚能舉善矣稱其讎不爲謟立其子不爲比舉其偏不爲黨啇書曰無偏無黨王道蕩蕩其祁奚之謂矣又昭七年曰晉韓宣子卒魏献子爲政魏舒魏戊爲梗陽大夫戊舒之庶子也梗陽在太原也魏子謂成鱄鱄晉大夫吾與戊也縣人其以我爲黨乎對曰何也夫舉無他唯善所取親踈一也論語雍也曰子游爲武城宰孔子問之曰汝得人焉耳乎汝爲此宰寧得賢人與之耳語助也對曰有澹臺滅明者行不由徑非公事未甞至於偃之室史記曰邑人出獵任安常爲人分麋鹿雉兔部署小大劇易衆人皆喜曰任少卿分別平又曰陳平爲社宰分肉甚均里父老曰善哉陳孺子之爲宰平曰嗟乎使平得宰天下亦如此肉漢書曰蕭何不與曺叅相能及何病惠帝自臨視因問君即百􅀊後誰可代君對曰知臣莫􅀂主帝曰曺叅何如何稽首曰帝得之矣臣死不恨又曰朱邑惇篤於故舊然性公正不可交以利天子器之東觀漢記曰耿嵩字文都鉅鹿人履清髙之節髫童介然特立不隨於俗郷黨大人莫不敬異之王莾敗盗賊起宗族在兵中榖食饑貴宗家數百人􅂛合分粮時嵩年十二三宗人長少咸共推令主􅅒莫不稱平又曰隂興字君陵盡忠竭}
