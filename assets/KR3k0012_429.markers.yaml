  - {type: 'tls:seg', offset: 2089, content: '', id: KR3k0012_CHANT_429-19a.5}
  - {type: variant, offset: 2089, length: 519, content: 宦者所在縱暴還過荊州蘇良嗣囚之因上䟽諫稱遠求珍異以疲道路恐非聖人抑己愛人之道又小人竊弄威福以虧皇明言甚切直䟽奏高宗下詔慰勉遽令棄竹於江中又曰高宗謂侍臣曰邢文偉事我兒能減膳切諫此正直人也遂擢拜右史又曰憲宗以李緯為相同列李吉甫便僻善逢迎上意絳梗直多所規諫故與吉甫不叶絳性剛訐每與吉甫爭論人多直絳憲宗察絳忠正自立故絳論奏多所允從又曰武元衡從父弟儒衡字庭碩才度俊偉氣直貌莊言不妄發與人交友終始不渝相國鄭餘慶不事華潔後進趍其門者多垢衣敗服以望其知而儒衡謁見未輒易所好但與之正言直論餘慶因亦重之晏子春秋曰景公觀於淄上歎曰使國可長保而傳之子孫豈不樂哉晏子曰今君臨民若寇讎見善如避熱不亦難乎又曰景公晝被髮乘六馬御婦人以出正閨肘跪擊馬而反之曰非吾君也公慚而不朝晏子曰臣聞下無直辭上有墮君民多矯行今君有失行而刖跪直禁是君之福也於是令刖跪倍資又曰景公見梁丘據公曰與我和晏子曰此同也和者君甘則臣酸君淡則臣醎今據也君甘則甘所謂同也安得為和尸子曰范獻子遊河大夫皆在君曰孰知欒氏之子大夫莫荅舟人清涓捨揖荅曰君奚問欒氏之子君曰自吾亡欒氏也其老者未死少者壯矣清涓曰善脩晉國之政內得大夫外不失百姓雖欒氏子其若君何若不脩晉國之政內不得大夫而外失百姓則舟中之人皆欒氏子也君曰善呂, SBCK: 吕}
