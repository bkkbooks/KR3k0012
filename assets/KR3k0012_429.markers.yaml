  - {type: variant, offset: 221, length: 1, content: 初, WYG: 蘇章字孺文扶風平陵人順帝時遷兾州刺史故人為清河太守章行部案其姦贓乃請太守為設酒殽陳平生甚欣太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲者私恩也明日兾州刺史案事者公法也遂舉正其罪典畧曰荀彧在臺閣不以私欲撓意彧有羣從一介才徳實簿或謂彧曰以君當事不可以某為議郎耶彧笑曰官者所以表才也若如汝言衆人其謂我何其持心平實皆類此也魏志曰}
