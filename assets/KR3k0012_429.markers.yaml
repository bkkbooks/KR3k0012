  - {type: variant, offset: 209, length: 3, content: 次太祖, SBCK: 有用猶稱其所長而薦之張汜杜禽之徒與興厚善以其華而少實私貨以財終不爲言是以丗稱其忠平又曰第五倫字伯魚京兆尹閻興召爲主簿時長安鑄錢多姦巧乃署倫爲督鑄錢􅁺領長安市長倫平銓衡正斗斛市無阿枉百姓恱服又曰呉漢甞出征妻子在後買田業漢還讓之曰軍師在外吏士不足何多買田宅乎遂盡以分與昆弟外家謝承後漢書曰張陵清河人􅀄爲梁兾弟胤舉孝廉正月􅀄􅀊百官朝賀兾恃豪􅀔不卹王憲帶劔入省陵主臺中威儀呵兾使出勑羽林虎賁奪其劔胤爲陵曰昔舉君適所以自伐也荅曰明府不以陵之不德誤見擢序不敢阿公以報私恩㣧有媿色華嶠後漢書蔡孟喜汝南頓人以禮化郷里郷里有諍訟者輙詣喜决之其所平處皆曰無怨范曄後漢書曰􅀽紹官渡之役審配二子爲曹操所擒逢紀與配不睦紹以問之紀對曰配天性烈直毎所言行慕古人之節不以二子在南爲不義也公勿疑之紹曰君不惡之􅁘紀曰先所爭者私情今所陳者國事紹曰善}
