  - {type: variant, offset: 3255, length: 0, content: '', SBCK: 授之政則國可寧莊王從之賜虞丘子田三百號曰國老以孫叔敖爲令尹少焉而虞丘子家干法孫叔敖執而戮之虞丘子喜入見於王言孫叔敖果可使持政奉國法而不黨施刑戮而不乱可謂公平莊王曰夫子之賜也又曰楚令尹子文之族有奸法者廷理拘之聞其令尹族也釋之子文召廷理而責之曰今立廷理者將以伺犯王令察觸國法者也於犯法甚明而使廷理縁吾私心釋之是吾不公之心明著於國執一國之柄而以私聞吾生無義吾不􅀂死遂致其族人於廷理曰不是刑也吾將死廷理懼遂刑其族人又曰晉文侯問於咎犯誰可使爲西河守者對曰盧子羔可曰子羔非汝之仇歟曰君問可爲守者非問}
