  - {type: variant, offset: 2890, length: 142, content: 天下家則世繼是也故五帝以天下為官三王以天下為家秦皇帝仰天歎曰吾德出乎五帝將官天下誰何使代我後者鮑白令之對曰陛下行桀紂之道欲為五帝之禪非陛下所能行也秦皇大怒曰令之前若何以言我桀紂之道也速說之不解則死令之對曰陛下築臺干雲宮殿五里建千石之鍾立萬石之𧇽婦女連百倡優累千興作麗山宮室至雍相繼不絕, SBCK: 忍}
