  - {type: variant, offset: 3589, length: 154, content: 以知君之仁也文侯曰善復召任座郭子曰王含為廬江含字處弘敦兄也貪強狼藉王敦欲護其兄故於眾坐中稱家兄在郡為政定善廬江人咸稱之時何充為主簿在坐正色曰充即廬江人所聞異於此汝南先賢傳曰李宣字公休為太尉黃瓊所辟是時寒暑不和羗夷數起瓊見掾屬曰是太尉無德願諸掾有以匡之掾東平王象對曰昔堯遭洪水之變湯有六年之旱自上聖之君誰能無此, SBCK: 非允當忠感}
