  - {type: variant, offset: 3386, length: 0, content: '', krp: 見迫兮命不延逝將棄爾兮適幽玄唐姬起舞歌曰皇天崩兮后土頽身爲帝王兮命夭摧死生路畢兮從此乖悼我焭獨兮中心哀因泣下坐者嘘欷不自勝王謂唐姬曰卿故王者妃勢不復爲吏民妻也行矣自愛從此長辭遂鴆死孝獻皇帝續漢書曰孝獻皇帝諱恊靈帝少子也母曰王羙人何皇后妬而害之靈帝母永樂太后董氏収養焉故號董侯中平六年四月靈帝崩太子辯即尊位年㓜皇太后詔封上爲渤海王七月徙封陳留王九月董卓廢天子立陳留王是日即皇帝位年九歳董卓秉政𥘉平元年二月天子自雒陽遷都長安興平元年正月帝加元服二年十月上自長安東遷建安元年七月至雒陽八月上自雒陽遷都於許二十五年十月上禪位於魏魏王即帝位對上爲山陽公青龍二年三月薨以天子禮葬禪陵獻帝春秋曰袁紹將兵入宫誅諸黄門張讓等逼迫以尺一詔開大夏門將帝及陳留王出不}
