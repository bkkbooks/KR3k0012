  - {type: variant, offset: 1882, length: 424, content: 南巡狩幸梁祠沛高原廟豐枌榆社二年正月帝崩於章德前殿在位十二年時年三十一遺詔無起寢廟一如先帝法制葬敬陵廟曰肅宗論曰魏文稱明帝察察章帝長者帝素知人猒明帝苛切事從寬厚除慘獄之科著胎養之令奉承明德太后盡心孝道割裂名都以崇建周親平傜簡賦而人賴其慶又體之以忠貞文之以禮樂藩輔克諧群后德讓謂之長者不亦宜乎東觀漢記序曰孝乎惟孝友于兄弟聖之至要也乾乾夕惕寅畏皇天帝王之上行也明德慎罰湯文所務也密靜天下容於小大高宗之極致也肅宗兼茲四德以繼祖考臣下百僚力誦聖德紀述明詔不能辯章豈敢空言增廣以累日月之光袁山松後漢書曰孝章皇帝弘裕有餘明斷不足閨房讒惑外戚檀寵惜乎若明章二主損有餘而補不足則古之賢君矣薛瑩漢記贊曰章帝以繼世承平天下無事敬奉神明友于兄弟息省徭賦賦緌靜兆民除苛法蠲禁錮抑有仁賢之風矣是以陰陽協和而百姓安樂眾瑞並集不可勝載考之圖籍有微云爾帝王世紀曰孝章皇帝以中元三年生於京師其母姓祕不出號其墓日長信家三輔決錄注曰何敞字文高為汝南太守章帝南巡過郡有刻鏤屏風為帝張設詔命, SBCK: 遣}
