  - {type: variant, offset: 2339, length: 274, content: 穆宗孝和皇帝東觀漢記曰孝和皇帝諱肇章帝之中子也母曰梁貴人早薨上自歧嶷至於總角孝順聰明寬和篤仁孝章猶是深珍之以為宜承天位年四歲以皇子立為太子初治尚書遂兼覽書傅好古樂道無所不照章和二年春二月章帝崩太子即位永元三年春正月帝加元服四年六月大將軍竇憲潛圖弒逆幸北宮詔收捕憲黨使謁者收憲大將軍印綬遣憲及弟篤景就國到皆自殺五年正月宗祀五帝於明堂遂登靈臺望雲物大赦天下自京師離宮果園上林廣成囿悉以假貧人恣得收捕不收其稅十二年春正月上日以五經義異書傅意殊親幸東觀覽書林閱篇籍朝無寵族政如砥矢惠澤沾濡鴻恩茂篤外憂庶績內勤經藝自左右近臣皆誦詩書德教在寬仁恕並洽是以黎元寧, SBCK: 舉實臧否建}
