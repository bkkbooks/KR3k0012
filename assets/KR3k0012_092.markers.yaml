  - {type: variant, offset: 3382, length: 0, content: '', SBCK: 痛哉左傳曰國於天地有與立焉不數世􅁋不能􅁦也信矣孝靈皇帝續漢書曰孝靈皇帝諱宏章帝􅀇孫河間孝王曽孫解瀆亭侯淑之孫萇之子也母曰董􅁎萇薨上襲爵爲侯永康元年十二月桓帝崩先是數有皇子夭昬不遂太后與父竇武定䇿禁中建寕元年正月徴到止夏門亭以王青蓋車迎入于殿即皇帝位太后臨朝四年正月帝加元服光和元年􅀄置鴻都門生本頗以經學相引後試能爲尺牘辭賦及以王書鳥􅂐相課試至千人皆尺一勑州郡三公舉用辟召或典州郡入爲尚書侍中封侯賜爵四年於後宫與宫人爲列肆販賣使相偷盗爭􅋐上臨視以爲樂又於西園令狗帶綬著進賢冠中平元年􅀄賣官自關内侯以下至虎賁羽林入錢各有差二年収天下田􅅿十錢以治宫殿發太原河東豫道林木黄門常侍斷截州郡送林文石掌主史譴呼不中退賣之貴戚因縁賤買十倍入官其貴戚所入者然後得中宫室連年不成州郡因増加調發刺史二千石遷除皆責助治宫錢大郡至二千万諸詔所徴皆令西園騶宻約勑號曰中使恐動州郡多受財賂天下騷動起爲盗賊矣是􅀊又於西園造萬金堂以爲􅀻藏別司農金錢繒帛積之於中又還河間買田業起弟觀上本侯家居貧即位常曰桓帝不能作官家曽無􅀻錢故爲􅀻藏復􅀉小黄門常侍家錢至數千万又云張常侍是我翁趙常侍是我母由是宦官專朝日盛奢僣無度各起弟宅擬則宫室上甞登永安候臺黃門常侍惡其登髙臺見居處樓殿乃使中大夫尚坦諌曰天子不當登髙登髙則百姓虚自後遂不復登臺榭矣四年又募買關内侯假金紫入錢五百萬六年四月帝崩于嘉徳殿在位二十二年時年三十四葬文陵續漢書五行志曰靈帝好胡服帳胡床胡飯胡箜篌笛胡儛京都貴戚皆競爲之其後董卓多縱胡兵虜掠夜發掘園陵帝又於宫中西園駕四白驢躬自操轡駈馳周旋以爲大樂於是公卿貴戚轉相倣効至相謀奪驢價與馬齊獻帝春秋曰􅀄黄巾賊起靈帝建九重華蓋自稱無上將軍身􅀍介胄講兵京城先是造作角錢猶五銖而有四道連於籩輪百姓有識者以爲妖徵竊言新錢有四道京城將壞而此錢四出散於四方之外乎遂皆如言薛瑩漢記賛曰漢氏中興至于延平而世業損矣冲質短祚孝桓無嗣母后稱制姧臣執政孝靈以支庶而登至尊由藩侯而紹皇統不恤宗緒不祗天命上虧三光之明下傷億兆之望于時爵服横流官以賄成自公侯卿士降於皂􅀠遷官襲級無不以貨刑戮無辜摧仆忠賢佞䛕在側直言不聞是以賢智退而窮處忠良擯於下位遂至姧邪蜂起法防隳壞夷狄並侵盗賊糜沸小者帶城邑大者連州郡編户騷動人人思亂當斯之時已無天子矣㑹靈帝即世則禍㝷其後宫室焚滅郊社無主危自上起覃及華夏使京室爲墟海内蕭條豈不痛哉典略曰建寜二年帝年時十三歳宦官用事排疾士人熹平四年五月帝自造皇義五十章光和五年帝幸太學自就石碑作賦廢帝􅀪農王獻帝春秋曰孝靈皇帝何皇后生太子辯帝數失子不敢正名養于道人史子眇家號曰史侯後漢書曰中平六年四月丙辰靈帝崩于南宫嘉徳殿戊午皇子辯即皇帝位年十七太后臨朝八月中常侍叚珪等殺大將軍何進於是虎賁中郎將袁術燒東西宫攻諸宦者庚午張讓叚珪等刧少帝及陳留王幸北宫司􅀠校尉袁紹勒兵収僞司􅀠校尉樊陵及諸閹人無少長皆斬之讓珪等復刧少帝陳留王走小平津尚書盧植追讓珪等斬之其餘投河而死帝與陳留王協夜歩逐螢火光行數里得民家露車共乗之還宫九月董卓廢帝爲弘農王英雄記曰董卓在顯陽苑請官僚共議}
