  - {type: variant, offset: 3383, length: 13, content: 令群臣知上道崩欲偽道得病遣, WYG: 轉乗輿幸黃白城帝不肯}
  - {type: variant, offset: 3383, length: 0, content: '', krp: 有廢立謂袁紹曰劉氏之種不足復遺袁紹曰漢家君天下四百許年恩澤深渥兆民戴之恐衆不從公議卓曰天下之事豈不在我我今爲之誰敢不從紹曰天下健者不唯董公紹請立觀之横刀長揖而去坐中皆驚愕時卓新至見紹大家故不敢害之卓於是遂䇿廢皇太后遷之永安宫其夜崩廢皇帝史侯爲弘農王立陳留王爲皇帝卓聞東方州郡謀欲舉兵恐其以弘農王爲主乃置王閣上荐之以棘召王太傅責問之曰弘農王病困何故不白遂遣兵迫守太醫致藥即日弘農王及妃唐氏皆薨袁山松後漢書曰董卓使弘農郎中}
  - {type: variant, offset: 3384, length: 1, content: 群, SBCK: 李孝儒進鴆於􅀪農王曰服此辟惡王曰此必是毒也弗肯強之於是王與唐􅁎及宫人共飲酒王自歌曰天道易􅀆我何艱棄萬乗􅀆退守藩逆}
  - {type: variant, offset: 3384, length: 1, content: 群, krp: 李孝儒進鴆於弘農王曰服此辟惡王曰此必是毒也弗肯強之於是王與唐姬及宫人共飲酒王自歌曰天道易兮我何艱棄萬乗兮退守藩逆}
  - {type: variant, offset: 3386, length: 0, content: '', SBCK: 見迫􅀆命不延逝將棄爾􅀆適幽􅀇唐􅁎起舞歌曰皇天崩􅀆后土頽身爲帝王􅀆命夭摧死生路畢􅀆從此乖悼我焭獨􅀆中心哀因泣下坐者嘘欷不自勝王謂唐􅁎曰卿故王者妃勢不復爲吏民妻也行矣自愛從此長辭遂鴆死孝獻皇帝續漢書曰孝獻皇帝諱恊靈帝少子也母曰王羙人何皇后妬而害之靈帝母永樂太后董氏収養焉故號董侯中平六年四月靈帝崩太子辯即尊位年㓜皇太后詔封上爲渤海王七月徙封陳留王九月董卓廢天子立陳留王是日即皇帝位年九歳董卓秉政􅀄平元年二月天子自雒陽遷都長安興平元年正月帝加元服二年十月上自長安東遷建安元年七月至雒陽八月上自雒陽遷都於許二十五年十月上禪位於魏魏王即帝位對上爲山陽公青龍二年三月薨以天子禮葬禪陵獻帝春秋曰􅀽紹將兵入宫誅諸黄門張讓等逼迫以尺一詔開大夏門將帝及陳留王出不}
