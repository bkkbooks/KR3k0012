  - {type: variant, offset: 1206, length: 672, content: 四夷賓服斷獄希少有治平之風號曰顯宗不亦宜乎潛夫論曰明帝時公車以反支日不受章奏帝聞而怪曰民廢農遠來詣闕而復拘以禁忌豈為政之意乎於是遂蠲其制後漢書曰明帝遵奉建武制度無違者後宮之家不得封侯與政館陶公主光武之女為子求郎不許而賜錢千萬謂群臣曰郎官上應列宿出宰百里非其人則人受其殃是以難之故吏稱其官民安其業遠近肅服戶口滋殖焉後漢書曰帝善刑理法令分明日晏坐朝幽枉必達外內無倖曲之私在上無矜大之色斷獄得情號居前世之十二故後之言事者莫不先建武永平之政然而鍾離意宋均之徒常以察慧為言夫豈引人之度未優乎肅宗孝章皇帝東觀漢記曰孝章皇帝諱烜孝明皇帝太子永平三年二月以皇子立為太子年四歲幼而聰達才敏多識世事動容進正聖表有異壯而仁明謙恕溫慈惠和寬裕廣愽親愛九族矜嚴方厲威而不猛既志於學始治尚書遂兼五經周覽古今無所不觀於是上敬重之每事諮焉水平十八年孝明皇帝崩帝即位范曄後漢書曰章帝建初元年詔有司明選舉進柔良退貪猾順時令理冤獄又詔以上林池籞田賦與貧人四年詔曰蓋三代遵人教學為本漢承暴秦褒顯儒術建立五經為置愽士其後學者精進雖曰承師亦別名家孝宣帝以為去聖久遠學不猒愽故遂立大小夏候尚書又立京氏易至建武中復置嚴氏顏氏春秋大小戴禮愽士此皆所以扶進微學廣道藝也孔子曰愽學而篤志切問而近思仁在其中矣於戲其勉哉於是下太常將大夫愽士議郎郎官及諸儒會白虎觀講議五經同異使五官中郎魏應承制問侍中淳于恭奏帝親稱制臨決如孝宣甘露石渠故事作白虎議奏今白虎通也元和二年正月詔曰人有棄子者復勿筭三歲令諸懷妊者賜胎養穀三斛復其夫勿筭一歲著以為令又詔三公方春生養萬物莩甲宜助萌陽以育時物其令有司罪非殊死勿案驗章和, SBCK: ''}
