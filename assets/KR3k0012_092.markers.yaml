  - {type: variant, offset: 2614, length: 449, content: 方國協和真符瑞應八十餘品帝讓而不宣故靡得而記元興元年十二月帝崩于章德前殿在位十七年時年二十七葬順陵廟曰穆宗東觀漢記序曰穆宗之嗣世正身履道以奉大業賓禮耆艾動式舊典宮無嬪嬙鄭衛之讌囿無槃樂遊畋之豫躬履玄德虛靜自損是以屢獲豐年遠近承風云爾後漢書曰自竇憲誅後帝躬親萬機每有災異輒延問公卿極言得失舊南海獻龍眼荔枝十里一置五里一堠奔騰險阻死者相繼時臨武長汝南唐羌縣接南海乃上書陳狀帝下詔曰遠國珍羞本以薦奉宗廟茍有傷害豈愛人之本其勑令太官勿復受獻由是遂省續漢書曰孝和年十四能折外戚驕橫之權即昭帝斃上官之類矣朝政遂一民安職業懃恤本務苑囿希幸遠夷稽服西域開泰郡國言符瑞八十餘品咸懼虛妄抑而不宣云爾范曄後漢書曰自中興以後逮于永元雖頗有弛張而俱存不擾是以齊民歲增闢土世廣偏師出塞則漢北地空都護西指則通驛四方豈其道遠三代術長前世將服叛懷來自有數也孝殤皇帝東觀漢記曰孝殤皇帝諱隆和帝之少子也和帝皇子數十生者輒夭故殤帝養於民元興元年十二月和帝崩是日倉卒殤帝時生百餘日乃立以為皇太子其夜即位尊皇后鄧氏為皇太后帝在繈褓太后臨朝延平, SBCK: ''}
