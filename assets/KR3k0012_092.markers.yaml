  - {type: variant, offset: 3383, length: 0, content: '', SBCK: 有廢立謂袁紹曰劉氏之種不足復遺袁紹曰漢家君天下四百許年恩澤􅀷渥兆民戴之恐衆不從公議卓曰天下之事豈不在我我今爲之誰敢不從紹曰天下健者不唯董公紹請立觀之横刀長揖而去坐中皆驚愕時卓新至見紹大家故不敢害之卓於是遂䇿廢皇太后遷之永安宫其夜崩廢皇帝史侯爲􅀪農王立陳留王爲皇帝卓聞東方州郡謀欲舉兵恐其以􅀪農王爲主乃置王閣上荐之以􅁄召王太傅責問之曰弘農王病困何故不白遂遣兵迫守太醫致藥即日􅀪農王及妃唐氏皆薨􅀽山松後漢書曰董卓使􅀪農郎中}
