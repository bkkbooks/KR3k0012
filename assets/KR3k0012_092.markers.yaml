  - {type: variant, offset: 3382, length: 0, content: '', WYG: 知所如時昏夜螢火照道到盟津河上傳國六璽不及自隨百僚分散唯河南中部掾閔貢見天子出率騎追之比曉到河上天子飢渴貢宰羊進之厲聲謂讓曰今不速死吾射殺汝讓等惶怖义手再拜叩頭向天子曰臣等死陛下自愛遂投河而死貢扶輦還宫時董卓適至屯顯陽苑聞帝當至率兵迎帝於北邙帝見卓兵振不自勝羣公曰有詔却兵卓曰卿為大臣不能匡輔國朝至令㓜主蒙塵播越何却兵之有遂俱入城帝幸北宫改元號曰昭寧於閣上得傳國璽又曰興平元年蝗蟲起民飢帝盡賣廐馬二百餘疋及御府雜繒二萬疋賜公卿已下及貧民車騎將軍李傕不聽盡收以置其邸李傕郭汜有隙傕使兄子副車中郎將李進勒兵數千統宫使虎賁王曹等三百人以軺車三乗載帝及伏后幸傕營又迎宫人公卿家屬入塢移御府諸置繒綵珍寳上方在廐車馬乗輿噐物盡置其邸放兵燒居府及居民被害者不可勝數五月或}
