  - {type: variant, offset: 3379, length: 2, content: 偽詐, WYG: 平元年正月帝加元服二年十月上自長安東遷建安元年七月至雒陽八月上自雒陽遷都於許二十五年十月上禪位於魏魏王即帝位封上為山陽公青龍二年三月薨以天子禮𦵏禪陵獻帝春秋曰袁紹將兵入宫誅諸黃門張讓等逼迫以尺一詔開大夏門將帝及陳㽞王出}
