  - {type: variant, offset: 3366, length: 0, content: '', WYG: 梁氏為皇太后帝㓜弱太后臨朝永熹元年正月帝崩于玉堂前殿在位一年𦵏懐陵帝王世紀曰孝冲皇帝即位一年年三嵗孝質皇帝東觀漢記曰孝質皇帝諱讃章帝𤣥孫千乗貞王伉之曾孫樂安王孫渤海王子也年八嵗茂質純淑好學尊師有聞於郡國孝冲帝崩徵封建平侯即皇帝位本初元年閏六月帝崩于玉堂前殿在位一年時方九嵗𦵏静陵漢晉春秋曰帝初年㓜小聞梁冀専權於天下毎朝出輙目之曰此䟦扈將軍冀聞而大懼遂隂行鴆毒始病呼太尉李固入固前問病帝曰食煑餅令腹中悶得水尚可活冀曰不可語未絶而崩威宗孝桓皇帝東觀漢記曰孝桓皇帝諱志章帝曽孫河間孝王孫蠡吾侯翼之長子也母曰􅂒音晏夫人年十四襲爵始入有殊於人梁太后欲以女弟妃之太初元年四月徵詣雒陽既至未及成禮㑹質帝崩無嗣太后宻使瞻察威儀才明任奉宗廟遂}
