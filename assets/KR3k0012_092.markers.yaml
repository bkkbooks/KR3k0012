  - {type: variant, offset: 3530, length: 224, content: 有餘年及親萬機佞邪始進閹官用事寵加私愛阿母王聖勢傾朝廷遂樹姦黨搖動儲副山陵未乾蕭牆作難兵交禁省社稷殆危典略曰安帝永初元年以災故免司空尹勤凡以災寇故輒免三公多以卿為之或再三退而還復其故桓靈又甚自此始也少帝北鄉侯續漢書曰安帝崩太子前廢後無餘子皇后與兄閻顯謀以北鄉侯犢為帝嗣三月立北鄉侯皇太后臨朝十月辛亥北鄉侯薨顯及江京等徵濟北河間王子欲以為嗣中黃門孫程王康等十九人共討京等迎立濟陰王皇德傳曰安帝崩北鄉侯即尊位十月北鄉侯薨以王禮葬未即帝位不成君故以王禮葬, SBCK: 二}
