  - {type: variant, offset: 3399, length: 1, content: 分, SBCK: 方亂以忠節責􅔸􅔸怒欲斬温􅔸從弟上軍校尉維故温􅁺請諫乃止於是􅐬温與帝同門設反􅀜校尉以監察之十一月車駕東幸到黄卷亭庚午乗輿到􅀪農張濟欲與董承楊奉交質而留乗輿承奉不肯白帝東行到澗中濟郭汜放兵欲留車駕承奉力戰乗輿得過公卿婦女衣服悉見鈔奪不解帶便斫㓨寒凍死者不可勝計天子得過路次曹陽乗輿到安邑十二月使侍中史跱直里切太僕韓融奉詔詔張濟悉遣宫人公卿以下婦女及乗輿服物車馬諸見略者皆}
  - {type: variant, offset: 3399, length: 3, content: 分詣郊, WYG: 方亂以忠節責傕傕怒欲斬温傕從弟上軍校尉維故温掾請諌乃止於是閔温與帝同門設反關校尉以監察之十一月車駕東幸到黃卷亭庚午乗輿到𢎞農張濟欲與董承楊奉交質而留乗輿承奉不肯奉帝東行到澗中濟郭汜放兵欲留車駕承奉力戰乗輿得過公卿婦女衣服悉見鈔奪不解帶便斫刺寒凍死者不可勝計天子得過路次曹陽乗輿到安邑十二月使侍中史跱直里切大僕韓融奉詔詔張濟悉遣宫人公卿已下婦女及乗輿服物車馬諸見略者皆令諸安邑元年七月乗輿到洛幸城西故中常侍趙忠舎宫室燒盡百官被荆棘依墻壁墟間侍郎以下皆出𦵏采四方州郡各擁强兵莫有至者曹操白帝遷都許庚申車駕出洛轘轅而東楊奉韓暹引軍追之輕騎既至曹操設伏兵要於陽城山夾中大敗之九月車駕到許幸曹操營設有司營宗}
