  - {type: variant, offset: 3074, length: 259, content: 年二歲葬康陵又曰孝殤繈褓承統寢疾不豫天命早崩國祚中絕社禝無主天下敖然賴皇太后臨朝孔子稱有婦人焉信哉恭宗孝安皇帝東觀漢記曰孝安皇帝諱祐清河孝王弟二子也少聰明敏達慈仁惠和寬容愽愛好樂施予自在邸弟數有神光赤虵嘉應照耀於室內盤紆殿屋床第之間孝王常異之年十歲善史書嘉經籍和帝甚喜重焉號曰諸生數燕見在禁中特加賞賜下及玩弄之物諸王子莫得與比殤帝即位鄧后臨朝以帝幼小詔留於清河邸欲為儲副殤帝崩以王青蓋迎齊中殿中拜為長安侯乃即帝位謙讓恪懃孜孜經學志在供養委政長樂宮永初元年十一月上始講尚書躭於典藝二年春正月帝加元服延光四年三月帝崩于葉縣, SBCK: ''}
