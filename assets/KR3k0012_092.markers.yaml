  - {type: variant, offset: 3375, length: 1, content: 豐, WYG: 陵及諸閹人無少長皆斬之讓珪}
  - {type: variant, offset: 3376, length: 0, content: '', SBCK: 及聖二女永等相是非聖永誣譛男􅁻皆物故太子思戀男等數爲之歎息聖永懼有後害遂與京豐}
  - {type: variant, offset: 3376, length: 0, content: '', krp: 及聖二女永等相是非聖永誣譛男吉皆物故太子思戀男等數爲之歎息聖永懼有後害遂與京豐}
  - {type: variant, offset: 3377, length: 0, content: '', WYG: 復刼少帝陳留王走小平津尚書盧植追讓珪等斬之其餘投河而死帝與陳留王恊夜歩逐螢光行數里得民家露車}
  - {type: variant, offset: 3378, length: 0, content: '', SBCK: 構太子坐廢爲王孝冲皇帝東觀漢記曰孝冲皇帝諱炳順帝之少子也年三歳是時皇太子數不幸國副未定有司上言冝建聖嗣建康元年四月立爲太子順帝崩太子即帝位尊皇后梁氏爲皇太后帝㓜弱太后臨朝永熹元年正月帝崩于玉堂前殿在位一年葬懐陵帝王世紀曰孝冲皇帝即位一年年三歳孝質皇帝東觀漢記曰孝質皇帝諱纉章帝􅀇孫千乗貞王之曽孫也樂安王孫渤海王子也年八歳茂質純淑好學尊師有聞於郡國孝冲帝崩徵封建平侯即皇帝位夲􅀄元年閏六月帝崩于玉堂前殿在位一年時方九歳葬靜陵漢􅀳春秋曰帝􅀄年㓜小聞梁兾專權於天下每朝岀輙目之曰此跋扈將軍兾聞而大懼遂隂行鴆毒始病呼太尉李固入固前問病帝曰食煑餅令膓中悶得水尚可活兾曰不可語未絶而崩威宗孝桓皇帝東觀漢記曰孝桓皇帝諱志章帝曽孫河間孝王孫蠡吾侯翼之長子也母曰匽音匽夫人年十四襲爵始入有殊於人梁大后欲以女弟妃之太􅀄元年四月徴詣雒陽旣至未及成禮㑹質帝崩無嗣太后宻使瞻察威儀才明任奉宗廟遂與兄兾定䇿於禁中迎帝即位時年十五改元建和元年大將軍梁兾輔政縱横爲亂帝與中常侍單超等五人共謀誅之於是封超等爲五侯五侯暴恣日甚毒流天下白馬令李雲坐直諌誅名臣少府李膺等並爲閹人所譛誣爲黨人下獄死在位二十一年崩年三十六薛瑩漢記賛曰漢徳之衰有自來矣而桓帝繼之以􅁋暴封殖官竪群妖滿側姦黨彌}
