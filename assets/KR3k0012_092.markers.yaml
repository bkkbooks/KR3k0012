  - {type: 'tls:seg', offset: 3369, content: '', id: KR3k0012_CHANT_092-22a.52}
  - {type: variant, offset: 3372, length: 1, content: 江, WYG: 單超等五人共謀誅之於是封超等為五侯暴恣日甚毒流天下白馬令李雲坐直諌誅名臣少府李膺等並為閹人所譛誣為黨人下獄死在位二十一年崩薛瑩漢記賛曰漢德之衰有自來矣而桓帝繼之以滛暴封殖宦䜿羣妖滿側姦黨彌興賢良被辜政荒民散亡徵漸積逮至靈帝遂傾四海豈不痛哉後漢書賛曰桓自宗支越躋天禄政移五倖刑滛三獄傾宫雖積皇躬靡續孝靈皇帝續漢書曰孝靈帝諱宏章帝𤣥孫河間孝王曽孫解瀆亭侯淑之孫萇之子也母曰董姬萇薨上襲爵為侯永康元年十二月桓帝崩先是數有皇子屢殤不立太后與父竇武定䇿禁中建寧元年正月徵到止夏門亭以王青蓋車迎入于殿即皇帝位太后臨朝四年正月帝加元服光和元年初置鴻都門學生頗以經學相引後請能為尺牘辭賦及以玉書鳥篆者相課試至千人皆勅州郡三公舉用辟召或典州郡入為尚書侍中封侯賜爵四年於後宫與宫人為列肆販賣更相偷盗爭鬬上著商賈服以為樂又於西園弄狗著進賢冠帶綬中平元年初開西邸賣官自關内侯以下至虎賁羽林入錢各有差二年税天下田畆十錢以治宫殿發太原河東諸郡材木黄門常侍斷截州郡送材人召掌正史譴呼不中退賣之貴戚因縁賤買十倍于官其貴戚所入者然後得中宫室連年不成州郡因増加調發刺史二千石遷除皆責助治官錢大郡至二千萬諸詔所徵皆令西園特署約勅號曰中使恐動州郡多受財賂天下騷動起為盗賊矣是嵗又於西園造萬金堂以為私藏别司農金錢繒帛積之於中又還河間買田業起第觀上本侯家居貧即位常曰桓帝不能作家家曽無私錢故為私藏復寄小黄門常侍家錢至數千萬又云張常侍是我翁趙常侍是我母由是宦官専朝日盛奢僣無度各起第宅擬于宫殿上嘗登永安侯臺黄門常侍惡其登髙臺見居處樓殿乃使中大夫尚垣諌曰天子不當登髙登髙則百姓虛自後遂不復登臺榭矣四年又募買關内侯假金紫入錢五百萬六年四月帝崩於嘉徳殿在位二十二年時年三十四𦵏文陵續漢書五行志曰靈帝好胡服帳胡牀胡飯胡箜篌笛胡儛亰都貴戚皆競為之其後董卓多權胡兵擄掠夜發掘園陵帝又於宫中西園駕四白驢躬自操轡驅馳周旋以為大樂於是公卿貴賤轉相倣效至相謀奪驢價與馬齊獻帝春秋曰初黄巾賊起靈帝建九重華蓋自稱無上將軍身被介胄練兵}
