  - {type: variant, offset: 3374, length: 0, content: '', WYG: 城先是造作角錢猶五銖而有四道連於邊輪百姓或有識者以為妖徵竊言新錢有四道京城將壊而此錢四出散於四方之外乎遂皆如言薛瑩漢紀賛曰漢氏中興至于延平而世業損矣冲質短祚孝桓無嗣母后稱制奸臣執政孝靈以支庶而登至尊由藩侯而紹皇統不恤宗緒不祗天命上虧三光之明下傷億兆之望于時爵服橫流官以賄成自公侯卿士降於皂𨽻遷官襲級無不以貨刑戮無辜推仆忠賢佞諛在側直言不聞是以賢智退而窮處忠良擯於下位遂至姦邪蜂起法防墮壊夷狄並侵盗賊糜沸小者吞城邑大者連州郡編戸騷動人人思亂當斯之時已無天子矣㑹靈帝即世則禍㝷其後宫室焚滅郊社無主危自上起覃及華夏使京室為墟海内蕭條豈不痛哉典略曰建寧二年帝時年十三嵗宦官用事排疾士人熹平四年五月帝自造皇義五十章光和五年帝幸太學自就碑作賦廢帝𢎞農王獻帝春秋曰孝靈皇帝何皇后生太子辯帝數失子不敢正名養于道人史子𦕈家號曰史侯後漢書曰中平六年四月丙辰靈帝崩於南宫嘉徳殿戊午皇子辯即皇帝位年十七太后臨朝八月中常侍叚珪等殺大將軍何進於是虎賁中郎將袁術燒東西宫攻諸宦者庚午張讓叚珪等刼少帝及陳留王幸北宫司𨽻校尉袁紹勒兵收偽司𨽻校尉}
  - {type: page-break, offset: 3374, content: '', id: KR3k0012_WYG_092-7b, image: WYG0893/WYG0893-0747d.png}
