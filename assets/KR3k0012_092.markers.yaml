  - {type: variant, offset: 3405, length: 1, content: 告, SBCK: 自帝西遷朝廷傾覆王制節度於是始建漢晉陽秋曰獻帝都許守位而巳􅀫衛近侍莫非曹氏黨舊恩戚議郎趙彦甞爲帝陳言時䇿曹操惡而殺之其餘内外多見誅操後以事入見殿中帝不任其忿因曰君能相輔則厚不爾幸垂恩相捨操失色俛仰求出舊儀三公輔兵入朝令虎賁執刃挾之操頋左右汗流洽背自後不敢復朝請􅀽山松後漢書曰獻帝﨑嶇危亂之間飄薄萬里之衢萍流蓬轉嶮岨備經自古帝王未之有也觀其}
