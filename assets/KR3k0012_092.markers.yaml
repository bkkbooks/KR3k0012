  - {type: page-break, offset: 3378, content: '', id: KR3k0012_SBCK_092-2b}
  - {type: variant, offset: 3378, length: 0, content: '', WYG: 乗之辛未還宫大赦九月董卓廢帝為𢎞農王英雄記曰董卓欲廢帝謂袁紹曰劉氏之種不足復遺袁紹曰漢家君天下四百許年恩澤深渥兆民戴之恐衆不從公議卓曰天下之事豈不在我我令為之誰敢不從紹曰天下健者不唯董公紹請立觀之橫刀長揖而去坐中皆驚愕時卓新至見紹大家故不敢害之卓於是遂䇿廢皇太后遷之永安宫其夜崩廢皇帝史侯為𢎞農王立陳留王為皇帝卓聞東方州郡謀欲舉兵恐其以𢎞農王為主乃置王閤上圍之以棘召太醫傳責問之曰𢎞農王病因何故不白遂遣兵迫守太醫致藥即日𢎞農王及妃唐氏皆薨袁山松後漢書曰董卓使𢎞農郎中令李儒進鴆於𢎞農王曰服此辟惡王曰此必是毒也弗肯强之於是王與唐姬及宫人共飲酒王自歌曰天道易兮我何艱棄萬乗兮退守藩逆臣見迫兮命不延逰將棄爾兮適幽𤣥唐姬起舞歌曰皇天崩兮后土頽身為帝王兮命夭推死生路畢兮從此乖悼我㷀獨兮中心哀因泣下坐者歔欷不自勝王謂唐姬曰卿故王者妃勢不復為吏民妻也行矣自愛從此長辭遂鴆死孝獻皇帝續漢書曰孝獻皇帝諱協靈帝少子也母曰王美人何皇后妬而害之靈帝母求樂太后董氏收養焉故號董侯中平六年四月靈帝崩太子辯即尊位年㓜皇太后詔封上為渤海王七月徙封陳留王九月董卓廢天子立陳留王是日即皇帝位年九嵗董卓秉政初平元年正月逼帝自雒陽遷都長安}
