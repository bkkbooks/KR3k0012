  - {type: variant, offset: 3361, length: 3, content: 及還宮, WYG: 太子思戀男等數為之歎息聖永懼有後害遂與亰豐等共構䧟太子坐廢為王孝冲皇帝東觀漢記曰孝冲皇帝諱炳順帝之少子也年三嵗是時皇太子數不幸國副未定有司上言宜建聖嗣建康元年四月立為太子順帝崩太子即帝位尊}
