  - {type: variant, offset: 3388, length: 2, content: 道崩, SBCK: 傳國六璽不及自隨百僚分散唯河南中部􅁺閔貢見天子出率􅀐追之比暁到河上天子飢渇貢􅈗羊進之厲聲謂讓曰今不速死吾射殺汝讓等惶怖又手再拜叩頭向天子辭曰臣等死陛下自愛遂投河而死貢扶輦還宫時董卓適至屯顯陽苑聞帝當至率兵迎帝於北邙帝見卓兵振喜不自勝羣公曰有詔却兵卓曰卿爲大臣不能匡輔國朝至令㓜主蒙塵播越何却兵之有遂俱入城帝幸北宫改年號曰昭寧於閣上得六璽失傳國璽又曰興平元年蝗虫起百姓飢穀一斛五六萬錢帝勑主者盡賣厩馬二百餘疋及御府雜繒二萬疋賜公卿巳下及貧民車􅀐將軍李􅔸不聽盡取以置其邸李􅔸郭汜有􅂩􅔸使兄子副車中郎將李進勒兵數千統宫使虎賁王曹等三百人以軺車三乗載帝及㐲后幸􅔸營又迎宫人公卿家屬入塢移御府諸署繒綵珍寳上方在廐車馬乗輿器物盡置其邸放兵燒府庫及居民􅀍害者不可勝數五月或}
  - {type: page-break, offset: 3388, content: '', id: KR3k0012_SBCK_092-6b}
  - {type: page-break, offset: 3388, content: '', id: KR3k0012_SBCK_092-7a}
  - {type: variant, offset: 3388, length: 2, content: 道崩, krp: 傳國六璽不及自隨百僚分散唯河南中部掾閔貢見天子出率騎追之比暁到河上天子飢渇貢宰羊進之厲聲謂讓曰今不速死吾射殺汝讓等惶怖又手再拜叩頭向天子辭曰臣等死陛下自愛遂投河而死貢扶輦還宫時董卓適至屯顯陽苑聞帝當至率兵迎帝於北邙帝見卓兵振喜不自勝羣公曰有詔却兵卓曰卿爲大臣不能匡輔國朝至令㓜主蒙塵播越何却兵之有遂俱入城帝幸北宫改年號曰昭寧於閣上得六璽失傳國璽又曰興平元年蝗虫起百姓飢穀一斛五六萬錢帝勑主者盡賣厩馬二百餘疋及御府雜繒二萬疋賜公卿巳下及貧民車騎將軍李􅔸不聽盡取以置其邸李􅔸郭汜有隙􅔸使兄子副車中郎將李進勒兵數千統宫使虎賁王曹等三百人以軺車三乗載帝及㐲后幸􅔸營又迎宫人公卿家屬入塢移御府諸署繒綵珍寳上方在廐車馬乗輿器物盡置其邸放兵燒府庫及居民𬒳害者不可勝數五月或}
