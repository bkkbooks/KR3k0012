  - {type: variant, offset: 2449, length: 0, content: '', SBCK: 相爲引重其游如父子然相得驩甚恨相知晚也夫有服過丞相丞相從容曰吾欲與仲孺過魏其侯㑹仲孺有服夫曰將軍乃肯幸臨况魏其侯夫安敢以服爲解請語魏其侯帳具將軍旦日早臨武安許諾夫具語魏其侯如所謂武安侯魏其與其夫人益市牛酒夜灑掃早帳具至旦平明令門下候伺至日中丞相不來魏其謂夫曰丞相豈忘之哉夫不懌曰夫以服請冝徃乃駕自徃迎丞相丞相特前戯許灌夫殊無意徃及夫至門丞相尚卧於是夫入見曰將軍昨日幸許過魏其魏其夫妻治具自旦至今未敢嘗食武安愕謝曰吾昨日醉忽忘與仲孺言乃駕徃及飲酒酣夫起舞屬丞相丞相不起夫從坐上語侵之魏其扶灌夫去謝丞相丞相卒飲至夜極驩而去丞相嘗使籍福請魏其城南田不得由此怨灌夫魏其後丞相娶燕王女爲夫人有太后詔召列侯宗室皆徃賀魏其侯過灌夫與俱夫謝曰夫數以酒失得過丞相丞相今者又與夫有郄魏其曰事巳解強與俱飲酒酣武安起爲壽皆避席伏巳魏其侯爲壽獨故人避席耳餘半􅂰席夫不恱起行酒至武安武安􅂰席曰不能滿觴夫怒因嘻􅀏曰將軍貴人也屬之時武安不肯行酒次至臨汝侯灌嬰孫名賢臨汝侯方與程不識耳語又不避席夫無所發怒乃罵臨汝侯曰生平毀程不識不直一錢今日長者爲夀乃效女兒呫囁耳語武安謂灌夫曰程李俱東西宫衛尉今衆辱程將軍仲孺獨不爲李將軍地乎灌夫曰今日斬頭䧟􅅐何知程李乎坐乃起更衣稍稍去續漢書曰時聖公聚客家有酒請游徼飲賔客醉歌言朝烹兩都尉游徼後來用調羮味游徼大怒縛捶數百魏志曰呉質黄􅀄五年朝京師詔大將軍及特進以下皆㑹質所太官給供俱酒酣質欲盡歡時上將軍曹真性肥中領軍朱鑠性瘦質召優使􅀃肥瘦真􅀒其貴耻見賤怒謂質曰卿欲以部曲將遇我􅁘驃􅀐將軍曹洪輕車將軍王忠言將軍必欲使上將軍肥即自冝爲痩真愈恚拔刀瞋目言俳敢輕􅀃吾斬爾遂罵坐質案劒曰曹子丹汝非屠机上肉呉質吞爾不嚙喉咀汝不嚙牙何敢恃勢憍􅁘鑠因起曰陛下使吾等來樂卿耳乃至此耶質頋叱之曰朱鑠敢壊坐諸將軍皆還坐鑠愈恚還拔劒斬地遂使罷也呉志曰權旣爲吳王歡宴之末自起行酒虞翻伏地佯醉不起權去翻起坐權於是大怒手拔劒欲擊之侍坐者}
