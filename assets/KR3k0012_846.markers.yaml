  - {type: variant, offset: 315, length: 419, content: 遺冠乎又曰宋人有少者欲效善見長者飲無餘亦自飲而盡之王孫子新書曰楚莊王攻宋廚有臭肉樽有敗酒將軍子重諫曰今君廚肉臭而不可食樽酒敗而不可飲而三軍之士皆有飢色欲以勝敵不亦難乎莊王曰請有酒投之士有食饋之賢淮南子曰楚會諸侯魯趙皆獻酒於楚王主酒吏求酒於趙趙不與吏怒乃以趙厚酒易魯薄者奏之楚王以趙酒薄遂圍邯鄲抱朴子曰鄭君釀酒酒成因以附子甘草屠內酒中暴令乾如雞子大一丸投一斗水立成美酒又曰葛仙公每飲酒醉常入門前陂中竟日乃出曾從吳主到列州還大風仙公舡沒吳主謂其已死須臾從水上來衣履不濕而有酒色云昨為伍子胥召設酒不能便歸以淹留也呂氏春秋曰肥肉厚酒務以自強命曰爛腸之食韓詩外傳曰夫飲食之禮不脫屨而即序者謂之禮跣而上坐者謂之宴能飲者飲之不能飲者已謂之醧齊顏色均眾寡謂之況閉門不出者謂之湎故君子可以宴可以醧不可以沉不可以湎黃石公記曰昔者良將用兵人有饋一單醪者使投之於河令將士迎流而飲之夫一單醪不能味一河水三軍思為之死非滋味及之也賈誼新書曰晉師伐虢虢公出奔至澤中曰吾飢, SBCK: 呼}
