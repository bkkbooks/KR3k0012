  - {type: variant, offset: 5, length: 2, content: 下孟, SBCK: 使酒􅄝酒傳曰齊慶封好田而􅄝酒與舎政舎封子慶封當國不自爲政以付舎則以其内實遷于盧蒲嫳氏易内而飮酒内實寳物妻妾也傳曰鄭伯有􅄝酒爲窟室窟實地室而夜飲酒擊鐘焉朝至未巳朝者曰公焉在家臣故謂伯有爲公其人曰吾公壑谷壑谷窟室皆自朝布路而罷布路分散旣而朝伯有朝鄭君則又將使子晳如楚歸而飲酒庚子子晳以駟氏之甲伐而焚之伯有奔雍梁雍梁鄭地醒而後知之遂奔許傳曰齊惠欒髙氏皆􅄝酒欒髙二族皆出惠公信内多怨􅀃婦人言政多怨疆於陳鮑氏而惡之惡陳鮑夏有告陳桓}
  - {type: variant, offset: 5, length: 2, content: 下孟, WYG: 使酒嗜酒傳曰齊慶封好田而嗜酒與舍政舎封子慶封當國不自為政以付舍則以其内實遷于蘆蒲嫳氏易内而飲酒内室室物妻娶家數日國遷朝焉就於盧蒲氏朝見封傳曰鄭伯有嗜酒為窟室窟室地室而夜飲酒擊鍾焉朝至未已朝者曰公焉在家臣故謂伯有謂公其人曰吾公在壑谷壑谷窟也皆自朝布路而罷布路分散既而朝伯有朝鄭君則又将使子晳如楚歸而飲酒庚子子晳以駟氏之甲伐而焚之伯有奔雍梁雍梁鄭地醒而後知之遂奔許傳曰齊惠栾髙氏皆嗜酒栾髙二族皆出惠公信内多怨彊於陳鮑氏而惡之惡陳鮑夏有告陳桓}
