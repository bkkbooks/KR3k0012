  - {type: variant, offset: 61, length: 0, content: '', SBCK: 之憊即住而啖肴膳酒有㪷􅂛減即隨益之不亦快乎晉書曰光逸字孟祖遇亂避難渡江依胡母輔之􅀄至屬輔之與謝鯤阮放畢卓羊曼桓彛阮孚散髪祼衣閉室酣飲巳累日逸將排户入守者不聽逸便於户外脫衣露頭於狗竇中窺之而大叫輔之驚曰他人决不能爾必我孟祖也遽呼入遂與飲不捨晝夜人謂之八逹又曰孟嘉爲桓温叅軍嘉好酣飲愈多不亂温問嘉酒有何好而卿􅄝之之嘉曰未得酒中趣耳又曰孝武末年􅄝酒好肉而㑹稽王道}
  - {type: page-break, offset: 61, content: '', id: KR3k0012_SBCK_846-2b}
  - {type: variant, offset: 61, length: 0, content: '', WYG: 之備即住而啖肴膳酒㪷升减則隨益之不亦快乎晉書曰光逸字孟祖遇亂避難渡江依胡母輔之初至属輔之與謝鯤阮放畢卓羊曼桓彛阮孚散髪裸衣閉室酣飲以累日逸将排户入守者不聽逸便於户外脱衣露頭於狗竇中窺之而犬呌輔之驚曰他人决不能爾必我孟祖也遽呼入遂與飲不舎晝夜人謂之八逹又曰孟嘉為桓温叅軍嘉好酣飲愈多不亂温問嘉酒有何好而卿嗜之嘉曰未得酒中趣耳又曰孝武末年嗜酒好肉而㑹稽王道}
  - {type: page-break, offset: 61, content: '', id: KR3k0012_WYG_846-4a, image: WYG0900/WYG0900-0467c.png}
  - {type: variant, offset: 61, length: 0, content: '', krp: 之憊即住而啖肴膳酒有㪷升減即隨益之不亦快乎晉書曰光逸字孟祖遇亂避難渡江依胡母輔之𥘉至屬輔之與謝鯤阮放畢卓羊曼桓彛阮孚散髪祼衣閉室酣飲巳累日逸將排户入守者不聽逸便於户外脫衣露頭於狗竇中窺之而大叫輔之驚曰他人决不能爾必我孟祖也遽呼入遂與飲不捨晝夜人謂之八逹又曰孟嘉爲桓温叅軍嘉好酣飲愈多不亂温問嘉酒有何好而卿嗜之之嘉曰未得酒中趣耳又曰孝武末年嗜酒好肉而㑹稽王道}
  - {type: variant, offset: 62, length: 0, content: '', SBCK: 昏醟尤甚唯狎眤謟邪於是國寳䜛䛕之計稍行於主相之間宋書曰衡陽王義季素􅄝酒自彭城王義康廢後遂爲長夜飲畧少醒曰文帝詰責曰此非唯傷事業亦自損性皆汝所請近長沙兄弟皆縁此致故將軍􅂫徴躭酒成疾旦夕待盡一門無此酣法汝於}
