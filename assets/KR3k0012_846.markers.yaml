  - {type: variant, offset: 899, length: 873, content: 美如肉清如鏡其上有玉樽取一鐏復一鐏與天地同休無乾時飲此酒人不死不生東方朔別傳曰武帝幸甘泉長平阪道中有蟲赤如肝頭目口齒悉具先驅馳還以報上使視之莫知也時朔在屬車中令往視焉朔曰此謂怪氣是必秦獄處也上使案地圖果秦獄地上問朔何以去之朔曰夫積憂者得酒而解乃取蟲置酒中立消賜朔帛百疋後屬車上盛酒為此故也說苑曰魏文侯與大夫飲使公乘不仁為觴政曰飲若不盡浮之大白文侯不盡公乘不仁舉白浮君也又曰吳王從民飲酒子胥諫曰昔白龍下清泠之淵化為魚漁者射中其目白龍上告天王捨萬乘從布衣恐有射目之患也論衡曰東風至酒湛溢按酒味酸從東方木也味酸故酒湛溢也又曰文王飲酒千鍾孔子百觚聖人胸腹小大與人均等若飲千鍾宜食百牛能飲百觚則能食十羊使文王身如防風孔子身如長狄文王孔子率禮之人垂譽後世豈千鍾百觚耶紂車行酒騎行炙二十日為一夜按紂以酒為池因謂車行酒以肉為林因為騎行炙耳或是覆酒滂沱於地因以為池釀酒積糟因以為丘懸肉似林因言肉林耳西京雜記曰司馬相如還成都以所服鷫鸘裘就市陽昌貰酒與卓文君為歡典論曰孝靈末百司湎酒酒千文一斗常侍張讓子奉為太醫令與人飲輒去衣露形為戲樂也又曰洛陽令郭珍家有巨億每暑召客侍婢數十盛裝飾羅縠披之袒裸其中使進酒又曰劉表有酒爵三大曰伯雅次曰仲雅小曰季雅伯雅容七升仲雅六升季雅五升又設大針於杖端客有酒輒以劖之驗醉醒也博物志曰劉玄石曾於中山酒家沽酒酒家與千日酒飲之至家大醉其家不知以為死葬之後酒家計向千日往視之云已葬於是開棺醉始醒俗云玄石飲酒一醉千日又曰西域有蒲桃酒積年不敗彼俗傳云可至十年欲飲之醉彌日乃解古今記曰烏孫國有青田核得水則有酒味甚淳美如好酒飲盡隨更注水隨成不可久久則苦不可飲名曰青田酒世說曰鍾毓鍾會少有令譽其父晝寢因共偷服散酒父時覺且託寐以觀之毓拜而後飲會飲而不拜父問其故毓曰酒以成禮不敢不拜問會會曰偷酒乃非禮所以不拜又曰阮籍遭母憂在晉文王座進酒肉司隸何曾亦在座曰明公方以孝理天下而阮籍以重哀顯於公座飲酒食肉宜流之海外以正風教文王曰嗣宗毀頓如此君不能共憂之宜且有疾而飲酒食肉固喪禮也籍飲噉不輟神色自若步兵校尉缺廚中有貯酒數百斛阮籍乃求為步兵或云籍與劉靈飲步兵廚中酒未盡並, SBCK: 馥乗}
