  - {type: variant, offset: 9, length: 3, content: 禹惡旨, SBCK: 子旗子良將攻陳鮑氏亦告鮑氏桓子授甲而如鮑氏遭子良醉而騪欲及子良醉故驅告鮑文子遂見文子文子鮑國則亦授甲矣使視二子二子子旗子良也則皆將飲酒桓子曰彼雖不信彼傳言者聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒髙氏後漢書曰更始韓夫人尤􅄝酒毎侍飲見常侍奏事輙怒曰帝方對我飲正用此時持事來乎起抵破書案又曰馬氏爲人􅄝酒闊達敢言闊達大度也敢言謂言果言敢無所隱也時醉在御前面折同列言其短長無所避忌帝故縱之以爲􅀏樂魏志曰徐邈字景山魏國􅀄爲尚書郎時科禁}
