  - {type: variant, offset: 1965, length: 476, content: 語葛強何如并州兒高陽池在襄陽是其愛將并州人也襄陽記曰漢侍中習郁於峴山南依范蠡養魚法作魚池池邊有高堤皆種竹及長梑芙蓉覆水是遊宴各家山季倫遊此池未嘗不大醉而還恒曰此是我高陽池也又曰鴻臚孔群好飲酒王丞相語云卿恒飲酒不見酒家覆瓶布日月久則糜爛群曰公不見糟中肉乃更堪久群常與親舊書云今年田得七百斛秫米不了麴蘗事又曰周顗字伯仁風德雅重深遠危亂還江東積年恒大飲酒嘗經三日不醒人謂之三日僕射又曰諸阮能飲酒仲容至宗人間若集不復用常杯酌以瓮盛酒賓坐相向大酌更飲時有群豬來飲酒去上便共飲之又曰桓公有主簿善別酒輒令先嘗好者謂青州從事惡者謂平原督郵青州有齊郡平原有革縣從事言至齊督郵言至革上住又曰王孝伯問王大阮籍何如司馬相如王大曰阮籍胸中壘隗故須澆之言同相如唯有酒異大悅小字王大歎曰三日不飲酒覺形神不復相親宋明帝文章志曰洸嗜酒一飲或連日不醒自號上頓也諺以大飲為上頓起於忱也王孝伯云名士不須奇才但使常得無事痛飲酒讀離騷便可稱名士也神仙傳曰孔元方者專修道術元方為人惡衣踈食飲酒不過一斗年百七十餘歲道成人或請元方同會人人作酒令次至元方作令元方無所說直以一杖柱地因把杖倒堅頭在下足在上以, SBCK: 持蟹螯}
