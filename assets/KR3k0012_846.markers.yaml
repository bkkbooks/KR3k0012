  - {type: variant, offset: 1503, length: 461, content: 醉千日又曰西域有蒲桃酒積年不敗彼俗傳云可至十年欲飲之醉彌日乃解古今記曰烏孫國有青田核得水則有酒味甚淳美如好酒飲盡隨更注水隨成不可久久則苦不可飲名曰青田酒世說曰鍾毓鍾會少有令譽其父晝寢因共偷服散酒父時覺且託寐以觀之毓拜而後飲會飲而不拜父問其故毓曰酒以成禮不敢不拜問會會曰偷酒乃非禮所以不拜又曰阮籍遭母憂在晉文王座進酒肉司隸何曾亦在座曰明公方以孝理天下而阮籍以重哀顯於公座飲酒食肉宜流之海外以正風教文王曰嗣宗毀頓如此君不能共憂之宜且有疾而飲酒食肉固喪禮也籍飲噉不輟神色自若步兵校尉缺廚中有貯酒數百斛阮籍乃求為步兵或云籍與劉靈飲步兵廚中酒未盡並醉而物故皆好事者為之籍景元年卒太始中靈猶存焉又曰劉靈縱酒放達或脫衣倮形在室中人見譏之靈曰我以天地為棟宇室屋為褌衫諸君何以入我褌中又曰張季鷹縱任不拘時人號為江東步兵或謂之曰卿乃縱適一時獨不為身後名也張荅曰使我有身後名不如即時一杯酒又曰阮宣子嘗步行以百錢掛杖頭至酒店便獨酣暢雖當世貴盛不肯詣也又曰山季倫為荊州時出酣暢人為之歌曰山公時一醉逕造高陽池日暮倒載歸酩酊無所知時復乘駿馬倒著白接籬舉, WYG: ''}
