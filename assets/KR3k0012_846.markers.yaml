  - {type: variant, offset: 60, length: 0, content: '', SBCK: 自懲時復中之然􅀫瘤以醜見傳而臣以醉見識帝大􅀏頋左右曰名不虚立又曰時苗字徳胄鉅鹿人也少清白爲人疾惡建安中入丞相府出爲壽春令令行風靡􅀭州治在其縣時蔣濟爲治中苗以􅀄至欲徃謁濟素􅄝酒適㑹其醉不能見苗恚恨還刻木爲人署曰酒徒蔣濟竪之於墻下旦夕射之州郡雖知其所爲不恪然以其履行過人無􅀂之何呉書曰鄭泉字文淵陳郡人􅀶學有竒志而性􅄝酒其閑居毎日願得美酒滿五百斛舡以四時甘脆置兩頭反覆以}
  - {type: variant, offset: 60, length: 0, content: '', WYG: 自懲時復中之然宿瘤以醜見傳而臣以醉見識帝大笑顧左右曰名不虛立又曰時苗字德昌鉅鹿人也少清白為人疾惡建安中入丞相府出為夀春令令行風靡揚州治在其縣時􅃽濟為治中苗以初至欲往謁濟濟素嗜酒適㑹其醉不能見苖恚恨還刻木為人署曰酒徒蒋濟竪之於牆下旦夕射之州郡雖如其所為不恪然以其履行過人無若之何吳書曰鄭泉字文淵陳郡人博學有竒志而性嗜酒其閑居每曰願得美酒五百斛船以四時甘脆置兩頭反覆}
  - {type: page-break, offset: 60, content: '', id: KR3k0012_WYG_846-3a, image: WYG0900/WYG0900-0467a.png}
