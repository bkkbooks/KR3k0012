  - {type: variant, offset: 2445, length: 1, content: 倒, SBCK: 盃拍浮酒池中便足了一生使酒史記曰季布爲河東守孝文時人有言其賢者孝文召欲以爲御史大夫復有言其勇使酒難近至留邸一月見罷布因進曰臣無功竊寵待罪河東陛下無故召臣此人必有以臣欺陛下者今臣至無所受事罷去此人必有毀臣者夫陛下以一人之譽而召臣以一人之毀而去臣臣恐天下有識聞之有以窺陛下也上嘿然慙良乆曰河東吾股肱郡故時召君耳布辭之官又曰孝武建元元年灌夫入爲太僕二年夫與長樂衛尉竇甫}
