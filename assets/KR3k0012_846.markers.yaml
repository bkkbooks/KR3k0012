  - {type: variant, offset: 60, length: 0, content: '', krp: 自懲時復中之然宿瘤以醜見傳而臣以醉見識帝大笑頋左右曰名不虚立又曰時苗字徳胄鉅鹿人也少清白爲人疾惡建安中入丞相府出爲壽春令令行風靡揚州治在其縣時蔣濟爲治中苗以𥘉至欲徃謁濟素嗜酒適㑹其醉不能見苗恚恨還刻木爲人署曰酒徒蔣濟竪之於墻下旦夕射之州郡雖知其所爲不恪然以其履行過人無若之何呉書曰鄭泉字文淵陳郡人博學有竒志而性嗜酒其閑居毎日願得美酒滿五百斛舡以四時甘脆置兩頭反覆以}
