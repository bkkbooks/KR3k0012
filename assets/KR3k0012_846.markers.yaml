  - {type: variant, offset: 2695, length: 452, content: 洲記曰瀛州有玉膏如酒味名曰玉酒飲數斗輒醉令人長生南岳夫人傳曰夫人設王子喬瓊蘇綠酒孝子傳曰蔡順字君仲母飲酒吐嘔顛倒恐母中毒嘗母吐驗之楚辭曰蕙肴設兮蘭籍奠桂酒兮椒漿又屈原曰眾人皆醉唯我獨醒漁父曰眾人皆醉何不餔其糟而歠其醨梁四公記曰高昌遣使獻乾蒲桃凍酒帝命杰公迓之謂其使曰蒲桃七是洿林三是無半凍酒非八風谷所凍者又無高寧酒和之使者曰其年風災蒲桃不熟故駮雜凍酒奉王急命故非時耳帝問杰公群物之異對曰蒲桃洿林者皮薄味美無半者皮厚味苦酒是八風谷凍成者終年不壞今臭其氣酸洿林酒滑而色淺故云然嶺表錄異曰南中醞酒即先用諸藥別淘漉粳米漉乾旋入藥和米搗熟即綠紛矣熱水溲而團之形如餢飳以指中心刺作一竅布於簟席上以茍杞構葉罨之其體候好弱一如造麴法既而以藤篾貫之懸於煙火之上每醞一年用幾箇餅子固有恒準矣南中地暖春冬七日熟秋夏五日熟既熟貯以瓦甕用糞掃火燒之亦有不燒者為清酒也大抵廣州人多好酒晚市散男兒女人倒載者日有三二十輩生酒行即兩面羅列皆是女人招呼鄙夫先令嘗酒盎上白瓷甌謂之𤭇刮一𤭇三文不持一錢來去嘗酒致醉者當壚嫗伹笑弄而已蓋酒賤之故也, SBCK: 六}
