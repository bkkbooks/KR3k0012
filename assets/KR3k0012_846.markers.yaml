  - {type: variant, offset: 2453, length: 2, content: 列仙, SBCK: 又曰胡綜性愛酒酒後讙呼極意或推引杯觴搏擊左右權愛其才不備責也又曰凌統當擊賊圍先期統與督將陳勤㑹飲酒勤剛勇任氣因督酒際陵轢一坐舉罰不以其道統疾其侮慢面折不爲具酒勤怒詈統及其父操統流涕不荅衆因罷坐勤乗酒凶悖又於道路辱統統不忍引刀斫勤數日死及當攻屯統曰非死無以謝罪乃率厲士卒身當矢石所攻一面應時破壞諸將乗勝遂大破之還自拘於軍正權壯其果毅許以功贖罪晉書曰􅁃純爲河南尹以賈充姦倿與任愷共舉充西鎮􅀜中充由是不平充嘗宴朝士而純後至充謂曰尹行嘗居人前今何以在後純曰且有小市事不了是以來後丗言純之先嘗有五百者充之先有市魁者故充純以此相譏焉充自以功隆望重意殊不平及純行酒充不時飲純曰長者爲夀何敢爾乎充曰父老不歸供養將何言也純因發怒曰賈充天下兇兇由爾一人充曰輔佐二丗蕩平巴蜀有何罪而天下謂之兇兇純曰髙貴郷公何在衆坐因罷充左右欲執純中護軍羊琇侍中王濟佐之因得出充慙怒上表解職純懼上河南尹􅀜中侯印綬上表自劾晉裴楷}
  - {type: page-break, offset: 2453, content: '', id: KR3k0012_SBCK_846-9a}
  - {type: variant, offset: 2453, length: 2, content: 列仙, WYG: 純因發怒曰賈充天下匈匈由爾一人充曰輔佐二世蕩平巴蜀有何罪而天下為之匈匈純曰髙貴鄉公何罪衆坐因罷充左右欲執純中䕶軍羊琇侍中王濟佐之因得出充慙上表解職純懼上河南尹闗中侯印綬上表自劾晉裴楷}
  - {type: variant, offset: 2453, length: 2, content: 列仙, krp: 又曰胡綜性愛酒酒後讙呼極意或推引杯觴搏擊左右權愛其才不備責也又曰凌統當擊賊圍先期統與督將陳勤㑹飲酒勤剛勇任氣因督酒際陵轢一坐舉罰不以其道統疾其侮慢面折不爲具酒勤怒詈統及其父操統流涕不荅衆因罷坐勤乗酒凶悖又於道路辱統統不忍引刀斫勤數日死及當攻屯統曰非死無以謝罪乃率厲士卒身當矢石所攻一面應時破壞諸將乗勝遂大破之還自拘於軍正權壯其果毅許以功贖罪晉書曰庾純爲河南尹以賈充姦倿與任愷共舉充西鎮關中充由是不平充嘗宴朝士而純後至充謂曰尹行嘗居人前今何以在後純曰且有小市事不了是以來後丗言純之先嘗有五百者充之先有市魁者故充純以此相譏焉充自以功隆望重意殊不平及純行酒充不時飲純曰長者爲夀何敢爾乎充曰父老不歸供養將何言也純因發怒曰賈充天下兇兇由爾一人充曰輔佐二丗蕩平巴蜀有何罪而天下謂之兇兇純曰髙貴郷公何在衆坐因罷充左右欲執純中護軍羊琇侍中王濟佐之因得出充慙怒上表解職純懼上河南尹關中侯印綬上表自劾晉裴楷}
