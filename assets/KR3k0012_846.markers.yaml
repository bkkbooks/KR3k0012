  - {type: variant, offset: 2464, length: 0, content: '', SBCK: 後於座辭氣不悅沈約因勸酒欲以觀之頴逹大罵約曰我今日形容正是汝老䑕所爲何忽復勸我酒舉坐驚愕帝謂之曰汝是我}
