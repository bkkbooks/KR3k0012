  - {type: variant, offset: 2451, length: 1, content: 為, SBCK: 容賢畜衆故海内望風今一朝棄之可乎權曰曹孟徳殺孔文舉􅀌於虞翻何有哉基曰孟德輕害士人天下非之大王躬德義欲與堯舜比隆曽何自喻於彼乎翻由是得免權因勑左右自今酒後言殺皆不得殺}
  - {type: page-break, offset: 2451, content: '', id: KR3k0012_SBCK_846-8b}
  - {type: variant, offset: 2451, length: 0, content: '', WYG: 容賢畜衆故海内望風今一朝棄之可乎權曰曹孟德殺孔文舉孤於虞翻何有哉基曰孟德輕害士人天下非之大王躬行徳義欲與尭舜比隆曽何自喻於彼乎翻由是得免權因勑左右自今酒後言殺皆不得殺也又曰胡綜性愛酒後讙呼極意或推引杯觴搏擊左右權愛其才不備責也又曰凌統當擊賊圍先期統與督将陳勤㑹飲酒勤剛勇任氣因督酒陵鑠一坐舉罰不以其道統疾其侮慢面折不}
  - {type: page-break, offset: 2451, content: '', id: KR3k0012_WYG_846-13b, image: WYG0900/WYG0900-0472b.png}
  - {type: variant, offset: 2451, length: 1, content: 為, krp: 容賢畜衆故海内望風今一朝棄之可乎權曰曹孟徳殺孔文舉孤於虞翻何有哉基曰孟德輕害士人天下非之大王躬德義欲與堯舜比隆曽何自喻於彼乎翻由是得免權因勑左右自今酒後言殺皆不得殺}
  - {type: variant, offset: 2452, length: 0, content: '', WYG: 具酒勤怒詈統及其父操統流涕不答衆因罷勤乗酒㓙悖又於道路辱統統不忍引刀斫勤數日死及當攻屯統曰非死無以謝罪乃率厲士卒身當矢石所攻一面應時破壊諸将乗勝大破之還自拘於軍正權壮其果毅許以功贖罪晉書曰庾純為河南尹以賈充姦佞與任愷共舉充西鎮闗中充由是不平充嘗宴朝士而純後至充謂曰尹行嘗居人前今何在後純曰且有小市不了是以來後世言純之先嘗有五百者充之先有市魁者故充純以此相譏焉充自以功隆望重意殊不平及純行酒充不時飲純曰長者為夀何敢爾乎充曰父老不歸供養将何言}
  - {type: page-break, offset: 2452, content: '', id: KR3k0012_WYG_846-14a, image: WYG0900/WYG0900-0472c.png}
