  - {type: variant, offset: 83, length: 0, content: '', SBCK: 過差吾有此好五十餘年昔呉國張公亦稱躭􅄝吾見張公時伊巳六十自言引滿大勝少年時吾今所進亦勝於徃曰老而彌篤唯吾與張季舒耳吾方與此子交歡於地下汝欲夭吾此志􅁘昔阮咸阮籍同遊竹林宣子不聞斯言王湛能􅀇言巧􅀐武子呼爲癡叔何陳留之風不嗣大原之氣巋然飜成可怪吾旣寂寥當丗朽病殘年産不異於顔原名未動於卿相􅀂不日飲醇酒復欲安歸女以飲酒爲非吾以不飲爲過昔周伯仁渡江唯三日醒吾不以爲少鄭康成一日三百盃吾不以爲多然洪醉之後有得失成厮養之志是其得也使次公之狂是其失也吾常譬酒猶水也可以濟舟亦可以覆舟故五議有言酒猶兵也兵可千日而不用不可一日而不備酒可千日而不飲不可一飲而不醉美哉江公可與共論酒矣汝驚吾墮車侍中之門䧟池武陵之地遍布朝野自言憔悴丘也幸苟有過人必知之吾平生所願身没之後題吾墓云陳故酒徒陳君之神道􅀂斯志意豈避南征之不覆賈􅁩之慟哭者哉何水曹眼不識盃鐺吾口不離觚杓汝寕與何同日醒與吾同日而醉乎政言其醒可及其醉不可及也速營糟丘吾將老焉後魏書曰夏侯道迁長子史字元廷歴鎮逺將軍南兖州大中正史性好酒居䘮不戚醇醪肥鮮不離口沽買飲噉多所費用父時田園貨賣畧盡人間債猶數千餘疋榖食至常不足弟妹不免飢寒於是昏酣而卒􅀄史與南人辛諶􅁃遵江文遥等終日遊聚酣飲之際􅁪相謂曰人生局促何殊朝露坐上相看先後間耳脫有先亡者於良辰美㬌靈前飲宴儻或有知庻共歆饗及史亡後三月上巳諸人相率至史靈前仍共酌飲時日晚天隂室中微闇咸見史在坐衣服形容不異平昔時執盃酒似􅀂獻酬但無語耳後魏書曰李元忠微拜侍中雖處要任􅀄不以物務干懐唯以聲酒自娱大率常醉家事大小了不􅀜心園庭羅種果藥親朋尋詣必留連宴賞每挾彈㑺壷遊遨里閈毎言寕無食不可使我無酒阮步兵吾師也孔少府豈欺我哉後自中書令復求爲太常以其有音樂而多美酒故神武欲用爲僕射文襄言其放逹常醉不可任以臺閣其子揆聞之請節酒元忠曰我言作僕射不勝飲酒樂爾愛僕射時冝勿飲酒北齊書曰黃門郎司馬消難左僕射子知之子是髙祖之壻勢盛當時因退食之暇㝷髙季式與之酣飲留􅀫旦日重門並閉􅀜鑰不通消難固請云我是黄門郎天子侍臣豈有不參朝之理旦一􅀫不歸家君必當大怪今􅀂又留我狂飲我得罪無辭恐君亦不免譴責季式曰君自稱黄門郎又言畏家君怪欲以地勢脅我邪髙季式死自有處􅀄不畏此消難拜謝請出終不見許酒至不肯飲季式云我留君盡興君是何人不爲我飲命左右賫車輪括消難頸又賫一輪自括頸仍命酒引滿相勸消難不得巳欣􅀏而從之方仍俱脫車輪更留一􅀫是時失消難兩􅀫莫知所在内外驚異及消難岀方具言之丗宗在京輔政白魏帝賜消難美酒數石珎羞十轝并令朝士與季式親狎者就季式宅讌集其􅀍優遇如此唐書曰王源中爲户部侍郎翰林丞㫖學士性頗􅄝酒甞召對源中方沉醉不能起及醉醒同列告之源中但懷憂殊無悔恨他日又以醉不任赴召遂終不得大任以眼病求免所職}
