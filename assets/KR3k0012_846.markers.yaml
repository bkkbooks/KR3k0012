  - {type: variant, offset: 2457, length: 0, content: '', SBCK: 石崇以功臣子有才氣與裴楷志趣各異不與之交長水校尉孫季舒常酣讌慢慠過度欲表免之楷聞之謂崇曰足下飲人狂藥責人正禮不亦乖乎乃止又曰裴遐嘗在平東將軍周馥坐與人圍碁馥司馬行}
  - {type: variant, offset: 2457, length: 0, content: '', WYG: 石崇以功臣子有才氣與楷志趣各異不與之交長水校尉孫季舒嘗酣讌慢敖過度欲表免之楷聞之謂崇曰足下飲人狂藥責人正禮不亦乖乎乃止又曰裴遐嘗任平東将軍周馥坐與人圍碁馥司馬醉怒因曳遐墮地遐徐起還坐顔色不變復碁如故其性和如是宋書曰謝超宗為人恃才使}
  - {type: page-break, offset: 2457, content: '', id: KR3k0012_WYG_846-15a, image: WYG0900/WYG0900-0473a.png}
  - {type: variant, offset: 2457, length: 0, content: '', krp: 石崇以功臣子有才氣與裴楷志趣各異不與之交長水校尉孫季舒常酣讌慢慠過度欲表免之楷聞之謂崇曰足下飲人狂藥責人正禮不亦乖乎乃止又曰裴遐嘗在平東將軍周馥坐與人圍碁馥司馬行}
  - {type: variant, offset: 2458, length: 2, content: 客者, SBCK: 遐不即飲司馬醉怒因曵遐墮地遐徐起還坐顔色不變復碁如故其性和如是宋書曰謝超宗爲人恃才使酒多所陵忽在直省常醉上召見語及北方事超宗曰虜動來二十年矣佛出亦無如之何以失儀出爲南郡王中軍司馬}
