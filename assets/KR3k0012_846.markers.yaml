  - {type: variant, offset: 888, length: 353, content: 又曰西北荒中有酒泉此酒美如肉清如鏡其上有玉樽取一鐏復一鐏與天地同休無乾時飲此酒人不死不生東方朔別傳曰武帝幸甘泉長平阪道中有蟲赤如肝頭目口齒悉具先驅馳還以報上使視之莫知也時朔在屬車中令往視焉朔曰此謂怪氣是必秦獄處也上使案地圖果秦獄地上問朔何以去之朔曰夫積憂者得酒而解乃取蟲置酒中立消賜朔帛百疋後屬車上盛酒為此故也說苑曰魏文侯與大夫飲使公乘不仁為觴政曰飲若不盡浮之大白文侯不盡公乘不仁舉白浮君也又曰吳王從民飲酒子胥諫曰昔白龍下清泠之淵化為魚漁者射中其目白龍上告天王捨萬乘從布衣恐有射目之患也論衡曰東風至酒湛溢按酒味酸從東方木也味酸故酒湛溢也又曰文王飲酒千鍾孔子百觚聖人胸腹小大與人均等若飲千鍾宜食百牛能飲百觚則能食十羊使文王身如防風孔子身如長狄文王孔子率禮之人垂譽後世豈千鍾百觚耶紂車行酒騎行炙二十日為一夜按紂, WYG: 劉伶}
