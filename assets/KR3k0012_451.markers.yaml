  - {type: variant, offset: 4121, length: 216, content: 世之明君也申不害一世之賢相也韓與魏仇敵之國而釐侯執珪見梁君者非好卑而惡尊慮過而計失與嚴敵為鄰動有滅亡之變獨勁不能支二難故降心以相從屈己以求存也申不害慮事而言忠臣也昭釐侯聽而行之明君也今之韓弱於始之韓今之秦強於始之秦而背先人之舊好以區區之眾居二敵之間非良策也齊楚遠而難恃秦魏呼吸而至舍近而求遠是虛名自累而不知近敵之困者也為王計者莫如除小忿全大恕也吳越之人同舟濟江中流遇風波其相救如左右手所患同也今不恤所同之患是不如吳越之舟人也韓王曰善, SBCK: ''}
