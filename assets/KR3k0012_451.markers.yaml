  - {type: variant, offset: 3190, length: 0, content: '', SBCK: 尚湏乳母而活耶尚何還顧於是人主憐悲之乃下詔止無徙乳母又曰始皇長子扶蘇諌曰天下􅀄定逺方黔首未集今皆重法繩之臣恐天下不安唯上察之始皇怒使扶􅂫北監蒙恬於上郡漢書曰上朝東宫趙談叅乗􅀽盎㐲車前曰臣聞天子所與共六尺輿皆天下豪英今漢雖乏人陛下獨奈何與刀鋸之餘同載於是上􅀏下趙談談泣下車又曰呉王謀反枚乗諌曰夫舉呉以訾於漢譬由虻蜹之脯羣牛腐􅁏之齒利劒}
