  - {type: punctuation, offset: 3177, content: 『, id: KR3k0012_CHANT_451-bkkpn872}
  - {type: variant, offset: 3177, length: 0, content: '', SBCK: 婦言愼無爲楚相孫叔敖盡忠爲廉以治楚楚王以得霸今死其子無立錐之地貧困負薪以自飲食必如孫叔敖不如自殺於是莊王謝優孟乃召孫叔敖子封寢丘侯四百户以奉其祀又曰優旃者􅁗倡侏儒也二丗立欲􅃮}
  - {type: variant, offset: 3177, length: 0, content: '', WYG: 殺身以明君臣之願也扵是乃罷淫樂聴政所誅者数百人所進者数百人任伍舉蘇從以政國人大恱又曰孫叔敖病且死属其子曰我死必貧困徃見優孟言我孫叔敖子也居数年其子窮困負薪逢優孟與言曰我孫叔敖子也父且死時属我貧困往見優孟孟曰若無逺有所之即為叔敖衣冠抵掌談語嵗餘像孫叔敖楚王及左右不能别也荘王置酒優孟前為壽荘王大驚以為孫叔敖復生也欲以為相優孟曰請歸與婦計之三日而為相荘王許之三日優孟復來王曰婦言何對曰婦言慎無為楚相孫叔敖盡忠為亷以治楚楚王以得覇今死其子無立錐之地貧困負薪以自飲食必如孫叔敖不如自殺於是荘王謝優孟乃召孫叔敖子封寝邱侯四百户以奉其祀又曰優旃者秦倡侏儒也二世立欲漆}
  - {type: page-break, offset: 3177, content: '', id: KR3k0012_WYG_451-9a, image: WYG0897/WYG0897-0146c.png}
