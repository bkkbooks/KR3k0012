  - {type: variant, offset: 336, length: 1, content: 脣, WYG: 儉徳之恭也侈惡之大也先君有恭徳而君納諸大惡無乃不可乎秋哀姜至公使宗婦覿用幣御孫諫曰男䞇大者玉帛公侯伯子男執玉至諸侯世子附庸孤卿執帛也小者禽鳥卿執羔大夫執鴈士執雉以章物也女䞇不過榛栗棗脩以告䖍也榛小栗也脩脯也䖍敬也皆取名以示敬也今男女同䞇是無别也男女之别國之大節也由夫人亂之無乃不可乎又曰晉侯假道扵虞以伐虢宫之竒諫曰虢虞之表也虢}
