  - {type: variant, offset: 3574, length: 4, content: 夫差破越, SBCK: 莽新即位恃府庫之冨欲立威乃拜十二部將率同時十道並出窮追匈奴因分其地立呼韓邪十五子莽將嚴尤諫曰周宣存時獫狁內侵至于涇陽命將征之盡境而還其視戎狄之侵譬猶蚊䖟之螫馳之而已故天下稱明是爲中䇿漢武帝選將治兵輕糧深入逺戍雖有尅獲之功胡輙報之兵連禍結三十餘年中國罷耗匈奴亦創而天下稱武是爲下䇿􅁗始皇不忍小恥而輕民力築長城之固延袤萬餘里轉輸之所行起於負海壃境旣完中國内竭以喪社禝是爲無䇿莽不聽轉兵榖如故天下騷動}
  - {type: variant, offset: 3574, length: 0, content: '', WYG: 謀反枚乘諫曰}
  - {type: variant, offset: 3574, length: 4, content: 夫差破越, krp: 莽新即位恃府庫之冨欲立威乃拜十二部將率同時十道並出窮追匈奴因分其地立呼韓邪十五子莽將嚴尤諫曰周宣存時獫狁內侵至于涇陽命將征之盡境而還其視戎狄之侵譬猶蚊䖟之螫馳之而已故天下稱明是爲中䇿漢武帝選將治兵輕糧深入逺戍雖有尅獲之功胡輙報之兵連禍結三十餘年中國罷耗匈奴亦創而天下稱武是爲下䇿秦始皇不忍小恥而輕民力築長城之固延袤萬餘里轉輸之所行起於負海壃境旣完中國内竭以喪社禝是爲無䇿莽不聽轉兵榖如故天下騷動}
  - {type: variant, offset: 3575, length: 2, content: 差破, WYG: 舉吳以訾扵漢譬由蠅蚋之附羣牛腐肉之齒利劒鋒也又曰南}
  - {type: punctuation, offset: 3578, content: ，, id: KR3k0012_CHANT_451-bkkpn987}
  - {type: 'tls:seg', offset: 3578, content: '', id: KR3k0012_CHANT_451-26a.4}
  - {type: variant, offset: 3578, length: 0, content: '', WYG: 自相攻上欲救之淮南王上書曰臣聞越非有城郭邑里也處谿谷之間篁竹之中習扵水鬬便扵用舟地深昧而水險中國之人不知其勢阻而入其地雖百不當其一夫頼宗廟之靈方内大寧戴白之老不見兵革民得夫婦相守子孫相保陛下之徳也陛下方寸之印丈二之組鎮撫方外不勞一卒不煩一戰而威徳並行}
  - {type: page-break, offset: 3578, content: '', id: KR3k0012_WYG_451-11a, image: WYG0897/WYG0897-0147c.png}
  - {type: variant, offset: 3579, length: 0, content: '', SBCK: 曰王莽新即位立威而窮追匈奴莽}
  - {type: variant, offset: 3579, length: 2, content: 將伐, WYG: 曰王吉字子陽為昌邑中尉上疏諫曰大王不好書術而樂逸遊口倦乎叱咤手苦扵轡捶身勞乎車輿朝則冐霜露晝則被塵埃夏則為大暑之所暴炙冬則為風寒之所侵薄以輭脆之玉體犯勤勞之煩毒夫廣厦之下細氊之上明師居前勸誦在後上論唐虞之際下及殷周之盛考仁聖之風習治國之道訢訢焉發憤忘食日新厥徳其樂豈徒銜撅之間哉又曰鮑宣每居位嘗上書諫民有七亡而無一得欲望國安誠難也民有七死而無一生欲望刑厝誠難也陛下擢臣岩穴誠冀有益毫毛豈徒欲臣美食大官重髙門地哉又曰龔遂字少卿山陽人以明經為昌邑郎中令王動作不正遂為人忠厚剛毅有大節内諫争扵王外責𫝊相引經義}
  - {type: page-break, offset: 3579, content: '', id: KR3k0012_WYG_451-11b, image: WYG0897/WYG0897-0147d.png}
  - {type: page-break, offset: 3579, content: '', id: KR3k0012_WYG_451-12a, image: WYG0897/WYG0897-0148a.png}
  - {type: variant, offset: 3579, length: 0, content: '', krp: 曰王莽新即位立威而窮追匈奴莽}
  - {type: variant, offset: 3580, length: 7, content: 伐陳楚大夫皆懼, SBCK: 嚴尤諌曰今天下遭陽九之阨比年飢饉此一難也不然奉軍糧二難也胡地沙鹵多乏水草三難也胡地秋冬甚寒春夏甚風多此四難也輜重自隨虜徐遁逃五難也功必不成莽不聽又曰成帝時王氏擅權羣臣莫敢言梅福上書諫}
  - {type: page-break, offset: 3580, content: '', id: KR3k0012_SBCK_451-8b}
  - {type: variant, offset: 3580, length: 7, content: 伐陳楚大夫皆懼, krp: 嚴尤諌曰今天下遭陽九之阨比年飢饉此一難也不然奉軍糧二難也胡地沙鹵多乏水草三難也胡地秋冬甚寒春夏甚風多此四難也輜重自隨虜徐遁逃五難也功必不成莽不聽又曰成帝時王氏擅權羣臣莫敢言梅福上書諫}
  - {type: punctuation, offset: 3582, content: ，, id: KR3k0012_CHANT_451-bkkpn988}
  - {type: 'tls:seg', offset: 3582, content: '', id: KR3k0012_CHANT_451-26a.5}
  - {type: variant, offset: 3582, length: 0, content: '', WYG: 禍福至扵涕泣蹇蹇亡已靣刺王過王至掩耳起走曰郎中令善愧人及國中皆畏憚焉王嘗與騶奴宰人遊戯飲食過度遂入見王涕泣􅂰行左右皆出涕王曰郎中令何為遂曰臣痛社稷之危也又曰張敞為膠東相王太后數出逰獵敞上書諫曰臣聞秦王好淫聲華陽后為不聴鄭衛之曲}
  - {type: variant, offset: 3583, length: 0, content: '', WYG: 荘好畋獵樊姬為不食鳥獸之肉口非惡芳甘耳非憎絲竹也所以抑心意絶嗜欲将以帥二君而全宗祀也禮君母出門則乘輜軿下堂則從傅姆進退則鳴玉佩内飾則結綢繆此言尊貴所以自歛制不縦恣之義也唯觀徃古令后姬有所則書奏后不復出又曰成帝起昌陵數年不成復還歸延陵制度奢}
  - {type: page-break, offset: 3583, content: '', id: KR3k0012_WYG_451-12b, image: WYG0897/WYG0897-0148b.png}
  - {type: variant, offset: 3584, length: 3, content: 夫皆懼, WYG: 劉向上書諫曰闔閭違禮厚葬十有餘年越人發之秦皇帝葬于驪山之阿下錮三泉髙五十餘丈周五里水銀為江海黄金為鳬雁珍寳之藏機械之變棺槨之麗宫館之盛不可勝量工匠計以萬數數年之間被項羽之災罹牧豎之禍丘壠彌髙者發掘必速竊為殿下羞之上甚感向言而不能從又曰王莽新即位恃府庫之富欲立威福乃拜十二部将率同時十道並出窮追匈奴因分其地立呼韓邪十五子莽将嚴尤諫曰周宣王時獫狁内侵至于涇陽命将征之盡境而還其視戎狄之侵譬猶蚊䖟之螫驅之而已故天下稱明是為中策漢武帝選将治兵輕粮深入逺戍雖有剋獲之功胡輙報之兵連禍結三十餘年中國罷耗匈奴亦創而天下稱武是為下策秦始皇不忍恥而輕民力築長城之固延衺萬餘里轉輸之所行起扵負海疆境既完中國内竭以䘮社稷是為無策莽不聴轉兵轂如故天下騷動又曰王莽新即位立威而窮追匈奴莽将嚴尤諫曰今天下遭陽九之阨比年飢饉此一難也不能奉軍粮二難也胡地沙鹵多乏水草三難也胡地秋冬甚寒春夏甚風多此四難也輜重自隨虜徐遁逃五難也功必不成莾不聴又曰成帝時王氏擅權羣臣莫敢言梅福上書諫}
