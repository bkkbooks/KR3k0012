  - {type: variant, offset: 3177, length: 0, content: '', krp: 婦言愼無爲楚相孫叔敖盡忠爲廉以治楚楚王以得霸今死其子無立錐之地貧困負薪以自飲食必如孫叔敖不如自殺於是莊王謝優孟乃召孫叔敖子封寢丘侯四百户以奉其祀又曰優旃者秦倡侏儒也二丗立欲􅃮}
  - {type: variant, offset: 3179, length: 0, content: '', SBCK: 優旃曰善主上雖無言臣固將請之􅃮城雖於百姓愁費然佳哉􅃮城光蕩蕩冦來不得上即欲就之易爲􅃮耳固難爲􅄻室於是二丗以其故止又曰武帝少時東武侯母嘗養帝帝壯時號之曰大乳母所言未甞不聽公卿大臣皆敬重乳母家子孫奴從者横暴長安中當道掣頓人車馬奪人衣服聞於中上不忍致之法有司徙乳母於邊奏可乳母當入至前靣見辭乳母先見}
