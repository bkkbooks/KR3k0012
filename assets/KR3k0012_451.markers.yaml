  - {type: variant, offset: 336, length: 0, content: '', SBCK: 儉德之泰也侈惡之大也先君有㳟德而君納諸大惡無乃不可乎秋哀姜至公使宗婦覿用幣御孫諫曰男贄大者玉帛公侯伯子男執玉至諸侯丗子附庸孫􅀌執帛也小者禽鳥卿執羔大夫執鴈士執雉以章物也女贄不過榛栗􅀥脩以告䖍也榛小栗也脩脯也䖍敬也皆取名以示敬也今男女同贄是無別也男女之別國之大節也由夫人亂之無乃不可乎又曰晉侯假道於虞以伐虢宮之竒諫曰虢虞之表也虢亡虞必從之晉不可啓冦不可翫一之謂甚其可再乎諺所謂輔車相依}
