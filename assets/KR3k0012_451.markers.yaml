  - {type: variant, offset: 380, length: 474, content: 以其少有利焉今救韓日費千金獨不可使妾少有利耶靳尚歸報王王遣張翠張翠稱病日行一縣張翠至甘茂曰韓急矣先生病而來張翠曰韓未急也甘茂曰韓之急緩人莫弗知今先生言不急可乎翠曰韓急則折而入楚矣臣安敢來甘茂曰先生勿復言也乃入言於王曰公叔且以國南合於楚楚韓為一魏氏不敢不聽是楚以三國謀秦也如此則伐秦之形成矣不識坐而待伐孰與伐人之利秦王曰善果下師於殽以救韓又曰中山陰姬與江姬爭為后司馬喜請見陰姬公為畫計公稽首曰誠如君言喜即奉書詣中山王曰臣聞趙強即中山弱臣能弱趙而強中山中山王悅而見之喜曰臣願乞之趙觀其地形險阻人民貧富君臣賢不肖商榷為資未可豫陳也乃見趙王曰臣聞趙天下善為音容佳麗之所出也今來至境入都邑人民謠俗容貌顏色殊無佳麗好美者以臣所見多矣周流無所不至未嘗見人如中山陰姬者不知者將以為神其容貌顏色過絕人矣乃其眉准頞權衡犀角偃月彼乃帝王之后非諸侯之姬趙王大悅曰吾願請之何如對曰非臣所敢議願王無泄喜歸報中山君曰趙王非賢王也不好道德而好聲色不好仁義而好勇力聞其乃欲請陰姬中山君作色不悅喜曰趙強國也請之必矣王不與之即社稷危與之即為諸侯笑王立為后以絕趙王意可也遂立為后趙王亦無請, SBCK: 車牙車}
