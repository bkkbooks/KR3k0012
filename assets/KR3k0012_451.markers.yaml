  - {type: variant, offset: 278, length: 0, content: '', SBCK: 父母有過下氣怡色柔聲以諫又曰子曰事君逺而諫則謟也近而不諫則尸利也尸謂不知人事無辭讓者子曰邇臣守和宰正百官大臣慮四方邇近也和為和君臣事也宰主治百官也子曰事君欲諫不欲陳諌謂言其過於外左傳曰衛公子州吁嬖人之子也有寵而好兵公弗禁石碏諫曰臣聞賤妨貴少陵長逺間親新間舊小加大􅁋破義所謂六逆也君義臣行父慈子孝兄愛弟敬所謂六順也去順效逆所以速禍也又曰魏獻子爲政以魏戊爲梗陽大夫梗陽人有獄魏戊不能斷以其獄上大宗賂以女樂訟者之大宗也魏子將受之魏戊謂閻没汝寛曰二子晉大夫魏子之屬主以不賄聞於諸侯􅀂受梗陽人賂賄莫甚焉吾子必諫皆許諾退朝待於庭饋入召之召二大夫食此置三歎旣食使坐魏子曰吾聞諸伯叔諺曰唯食忘憂吾子置食之間三歎何也同辭對曰昨或賜二小人酒不夕食昨飲酒醉故不夕食饋之始至恐其不足是以歎中置自咎曰豈將軍食之而有不足是以再歎及饋之畢願以小人之腹爲君子之心屬厭而巳獻子辭梗陽人屬足也小人二子自謂小人腹飢則恐食之不足厭飽則恐君亡君子居尊官食重禄而知不足故願以其腹爲君子之心又曰公將如棠觀漁臧僖伯諫曰凢物不足以講大事其材不足以備器用君不舉焉材謂皮革齒牙骨角君將納民於䡄物者也故講事以度䡄量謂之􅁤取材以章物采謂之物不􅁤不物謂之亂政亂政亟行所以敗也又曰宋華督巳殺孔父而弑殤公召莊公于鄭而立之以親鄭以郜大鼎賂公納于太廟非禮也臧哀伯諌曰君人者將昭德塞違以臨照百官猶懼或失之故昭令德以示子孫夫德儉而有度升降而有數文物以紀之聲明以發之百官於是乎戒懼而不敢易紀律今滅德立違而寘其賂器於太廟以明示百官百官象之又何誅焉國家之敗由官邪也官之失德寵賂章也郜鼎在廟章甚孰焉周內史聞之曰臧孫逹其有後於魯乎君違不忘諌之以德又曰􅀄鬻拳强諌}
