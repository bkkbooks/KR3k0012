  - {type: variant, offset: 1556, length: 347, content: 將欲襲鄶先問鄶之辯智果敢之士書其名姓擇鄶之良臣而與之為官爵之名而書之因為設壇於門外而埋之釁之以猳若盟狀鄶君以為內難也盡殺其臣桓公因襲之遂取鄶又曰鄭桓公東會封於鄭暮舍於宋東之逆旅逆旅之叟從外來曰客將焉之曰會封為鄭逆旅之叟曰吾聞之時難得而易失今客之寢安殆非封也鄭桓公援轡自駕其僕接御而載之行十日十夜而至至釐何與之爭封故以鄭桓公之賢微旅之叟幾不會封也又曰趙簡子使成何涉他與衛靈公盟於專澤靈公未喋盟成何涉他衛靈公之手而撙之靈公怒欲反趙王孫商曰君欲反趙不如與百姓同惡之公曰若何對曰請命臣令於國曰有姑姊女者家一人質於趙百姓必怨君因反之矣君曰善乃令之三日遂徵之五日而令畢國人巷哭君乃召國大夫而謀曰趙為無道反之可乎大夫皆曰可乃出西門閉東門趙氏聞之縛涉他而斬之以謝於衛成何走燕子貢曰王孫商可謂善謀矣憎人而能害之有, SBCK: ''}
