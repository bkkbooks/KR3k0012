  - {type: variant, offset: 1007, length: 548, content: 之華有時而落子何以長幸無解於王乎安陵纏曰臣年少愚陋願委質於先王江乙曰獨從為殉可耳安陵纏曰敬聞命矣江乙去居朞年逢安陵纏謂曰前諭子者通之於王乎曰未可也居朞年江乙復見安陵纏曰子豈諭王乎安陵纏曰臣未得王之閒也江乙曰子出與王同車入與王同坐居三年言未得王之間子以吾之說未可耳不悅而去其年共王獵江渚之野野火之起若雲蜺虎狼之嗥若雷霆有狂兕從南方來正觸王左驂王舉旌旄而使善射者射之一發兕死車下王大喜拊手而笑顧謂安陵纏曰吾萬歲之後子將誰與此樂乎安陵纏乃逡巡而卻泣下沾衿曰萬歲之後臣將從為殉安知樂此誰於是共王乃封安陵纏於車下三百戶故曰江乙善謀安陵纏知時也又曰智伯欲襲衛故遺之乘馬先之一璧衛君大悅酌酒諸大夫皆喜南文子獨不喜有憂色衛君曰大國禮寡人寡人故酌諸大夫酒諸大夫皆喜而子獨不喜有憂色者何也南文子曰無方之禮無功之賞禍之先也我未有往彼有以來是憂也於是衛君乃修梁津而擬邊城智伯聞衛兵在境上乃還又曰智伯欲襲衛乃佯亡其太子顏使奔衛南文子曰太子顏之為其君子也甚愛非有大罪也而亡之有故然人亡而不受不祥使吏逆之曰車過五乘慎勿內也智伯聞之乃止又曰趙簡子使人以明白之乘六先以一璧為遺於衛衛叔文子曰先不意可以生故以小之所以事大也今我未以往而簡子先以來必有故於是斬林除園藂歛蓄積而後遣使者簡子曰吾舉也為不可知也今既已知之矣乃輟圍衛也又曰鄭桓, SBCK: 驟諫}
