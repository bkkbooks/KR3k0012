  - {type: variant, offset: 2455, length: 165, content: 人又不能自用則功盡矣國有此五者無辜必亡中山與齊皆當此若使中山之與齊也聞五盡而更之則必不亡也其患在不聞也雖聞又不信也然則人主之務在乎善聽而已矣又曰下蔡威公閉門而哭三日三夜泣盡而繼之以血旁鄰窺牆而問之曰子何故而哭悲若此乎對曰吾國且亡曰何以知也應之曰吾聞病之將死不可為良醫國之將亡不可為計謀吾數諫吾君吾君不用是以知國之將亡也於是窺牆者聞, SBCK: ''}
