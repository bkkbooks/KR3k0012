  body:
  - {type: variant, offset: 2, length: 2, content: 五轍, SBCK: 一奉使上周禮小行人曰使適四方恊九儀賔客之禮朝覲宗遇㑹同君之禮也存覜省聘問臣之禮也又掌􅀖國之禮籍以待四方之使者凢四方之使者大客則擯小客則受其弊而聽其辤凡使爲旌節禮曰凢爲君使者己受命君言不􅀫於家君言至則主人出拜君言之辱使者歸則必拜送於門外又􅀂使人於君所則必朝服而命之使者反則必下堂而受命也詩曰四牡勞使臣之來也有功而見知則􅀃矣四牡騑騑周道逶遟豈不懷歸王事靡盬我心傷悲又曰皇皇者華君遣使臣也送之以禮樂言遠而有光華也皇皇者華于彼原隰駪駪征夫毎懹靡及}
