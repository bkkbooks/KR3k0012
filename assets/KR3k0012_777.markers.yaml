  - {type: variant, offset: 29, length: 0, content: '', WYG: 釋之又曰司馬相如為郎數嵗㑹唐蒙使畧通夜郎西僰中發巴蜀吏卒千人郡又多為發轉漕萬餘人用軍興法誅其渠而巴蜀民大驚恐上聞之乃使相如責唐䝉等因喻告巴蜀民以非上意還報天子拜相如為中郎将建莭馳四乗之傳因巴蜀幣物以賂西南夷至蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵於是卓王孫臨卭諸公皆因門下而獻牛酒又曰淳于髠者齊之贅壻也壻比于子如人疣贅也長不滿七尺滑稽滑音骨亂也稽同也多辯數使諸侯未嘗詘辱威王八年楚大發兵加齊齊王使淳于髠之趙請兵齎金百斤馬千駟淳于髠仰天大笑冠纓索絶王曰先生少之乎髠曰何敢王曰先生笑豈有説乎髠曰今者臣從東來見道旁有穰田者操一㹠蹄酒一盂而祝曰甌窶滿篝篝籠也音溝甌窶猶柸樓也言豐年收掇易可滿篝汚耶滿車汚耶下地田也即下地田之中有薪萊可滿車也五榖蕃熟穰穰滿家臣見所持者狹而欲者奢故笑於是齊王乃益齎黄金千鎰白璧十雙車馬百駟髠辭而行至趙趙與之精兵十萬革車千乗楚聞之夜引兵而去威王大悦漢書曰漢王曰孰能為我使淮南使之發兵背楚留項王於齊數月我之取天下可萬全隨何曰臣請使之乃與二十人俱使淮南至太宰主之淮南太宰作内主也三日不得見隨何因説太宰曰王之不見何必以楚為强以漢為弱使何得見言之而是耶是大王所欲聞言之而非耶使何等二十人伏斧鑕淮南市以明背漢而與楚也太宰乃言之王王見之隨何説淮南王王曰請奉命隂許叛楚與漢未敢泄楚使者在方急責布發兵隨何直入曰九江王歸漢楚何以得發兵布驚曰何至是楚使者出何曰事已搆可殺楚使歸而疾走漢併力布從之遂歸漢又曰張騫漢中人建元中為郎時匈奴降者言匈奴破月支氏擒其王以其頭為飲器月攴遁而怨匈奴無對與共擊之漢方欲滅胡聞之乃募使者騫應募與堂邑氏奴甘父俱往匈奴不聼去乃留騫十餘嵗娶胡妻有子然騫持漢莭不失居匈奴西騫因與其屬亡鄉月支氏西走數十日至大宛後單于死國亂騫與胡妻及堂邑父俱亡歸漢拜騫太中大夫騫為人寛信蠻夷愛之騫曰臣在大夏時見卭竹杖蜀布問安得此國人曰吾賈人往市之身毒國一名天竺國在大夏東南數千里人乗象以戰臣度大夏去漢萬二千里有蜀物其去蜀不逺矣於是漢復事西南夷騫從大将軍擊匈奴嘗諳知水草處軍得不乏封博}
