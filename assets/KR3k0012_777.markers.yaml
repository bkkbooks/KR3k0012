  - {type: variant, offset: 70, length: 2, content: 昔穆, WYG: 蘇武字子卿建次子也少以父任為郎中武帝遣以為郎將使持節送匈奴使留在漢者武與副中郎将張勝及假吏常惠等募士斥候百餘人俱既至匈奴致幣遺單于單于益驕非漢所望也方欲發使送武等㑹緱王與長水虞常等謀反匈奴中緱王是昆耶王姊子與昆耶王俱降漢後隨浞野侯没胡中及衛律所将降者隂相與謀刼單于母閼氏歸漢㑹武等至匈奴虞常在漢時素與張勝善私候勝曰聞漢天子甚怨衛律常能為漢伏弩射殺之吾母與弟在漢幸䝉爵賞張勝許之事敗單于怒欲殺漢使左伊狄訾曰宜皆降之單于使衛律召武受辭武謂常惠曰屈莭辱命雖生何面目以歸漢乃引佩刀自刺衛律大驚召醫瘡單于鑿地為坎置煴火覆武其上蹈其背以出血氣絶半日復息惠勝等號哭單于壯其莭朝夕遣人候問武愈單于愈欲降之武不能屈乃幽武大窖中絶食天雨雪武卧囓雪與氊毛并吞之數日不死匈奴以為神乃徙武於北海令牧羊不得食掘野鼠去草實食之杖漢莭旄盡落積五六年昭帝即位與匈奴和親求武匈奴紿言死後漢使復至匈奴常惠請其守者夜見漢使教使謂單于曰天子射上林中得鴈足有係帛書言武在北海大澤中牧羊使者如惠言以讓單于單于視左右大驚謝漢使曰武等實在乃召武相隨官屬等九人歸漢武以元始六年春至京師拜典屬國常惠䓁皆為郎又曰鄭吉㑹稽人累遷衛司馬神爵中匈奴亂日逐}
