  - {type: variant, offset: 1454, length: 248, content: 似之也輨說文曰輨軨轂端錔也枕釋名曰枕撗在前若臥床之有枕方言曰軫謂之枕郭璞曰車後橫木周禮曰車軫四尺謂之一等戈祕音必六尺有寸既建而迆音移崇於軫四尺謂之二等六分其廣以一為之軫圍參分軫圍去一以為式圍五分其軫間以其一為之軸圍軫之方象地也軾周禮曰參分軫圍去一以為式圍參分式圍去一以為較圍釋名曰軾式也式所敬者左傳曰齊與魯戰于長勺齊師敗績公將馳之曹劌曰未可下視其轍登軾而望之曰可矣又曰子玉使鬭勃請戰曰請與君之士戲君憑軾而觀得臣與寓目焉又曰叔山冉搏人以投中車折軾晉師乃止又曰長狄喬如之首眉隱於軾漢書曰酈生憑軛軾下齊, SBCK: 甚恱太平御覧卷第七百}
