  - {type: variant, offset: 26, length: 2, content: 轍登, SBCK: 俗不足以辱天子之使河内失火燒千餘家上使黯徃視之還報曰家人失火屋比延燒不足憂也臣過河南貧人傷水旱萬餘家或父子相食臣謹以便冝持節發河南倉粟以賑貧民臣請歸節伏矯制之罪上賢}
