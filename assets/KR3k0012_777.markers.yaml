  - {type: variant, offset: 24, length: 0, content: '', WYG: 恵也齊侯未入境展喜從之曰寡君聞君親舉玉趾將辱於敝邑使下臣犒執事又曰晉侯及秦伯圍鄭以其無禮於晉且貳於楚也晉軍函陵秦軍汜南佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退公從之又文下曰秦伯使西乞術來聘且言将伐晉襄仲辭玉曰君不忘先君之好照臨魯國鎮撫其社稷重之以大器寡君敢辭玉賔荅曰不腆先君之弊器而使下臣結二國之好是以敢致之襄仲曰不有君子其能國乎國無陋矣厚賄之又宣十五年曰楚子圍宋宋人使樂嬰齊告急於晉晉侯使解楊如宋使無降楚曰晉師悉起将至矣鄭人囚而獻諸楚楚子厚賂之使反其言不許三而許之登諸樓車使呼宋人而告之遂致其君命楚子将殺之使與之言曰爾既許不榖而反之何故非我無信汝則棄之速即爾刑對曰臣聞之君能制命為義臣能承命為信信載義而行之為利謀不失利以衛社稷民之主也義無二信信無二命義本信而行不受二命也君之賂臣不知命也奉命以出有死無霣音殞又可賂乎臣之許君以成命也成其君命也死而成命臣之禄也寡君有信臣下臣獲考死又奚求楚子舎之以歸又曰晉侯使郤克徴㑹于齊齊頃公帷婦人使觀之郤子登婦人笑於房獻子怒出而誓曰所不此報無能渉河郤子請伐齊晉侯弗許至成公三年衛孫桓子臧宣叔亦乞師以伐齊晉侯許之又曰齊叔老為季武子介自是晉人輕魯幣而益敬其使又曰呉公子札來聘見叔孫穆子説之謂穆子曰子其不得死乎好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不慎所與何以堪之禍必及子聘于齊説晏平仲謂之曰子速納邑與政無邑無政乃免於難齊國之政将有所歸未獲所歸難未歇也故晏平仲因陳桓子以納政與邑是以免於欒髙之難事在昭八年聘于鄭見子産如舊相識與之縞帶子産獻紵衣焉大帶呉地貴縞鄭地貴紵故各獻己所貴示損己而不為彼貨利謂子産曰鄭之執政侈難将至矣政必及子為政慎以禮不然鄭國将敗又曰韓宣子如楚送女叔向為介鄭子皮子太叔勞諸索氏太叔謂向曰楚王侈已甚子其戒之叔向曰汰侈已甚身之災也焉能及人若奉吾幣帛慎吾威儀守之以信行之以禮敬始而思終終無不復行而不失儀敬而不失禮尊之以訓詞奉之以舊法考之以先王度之以二國雖汰侈若我何又曰楚費無極譛太子建王使城父司馬奮楊殺太子建未至而使遣之太子奔宋王召奮楊使城父人執巳而至王曰言出於余口入於爾耳誰告建也對曰臣告之君王命臣曰事建如事余臣不佞不能苟貳奉初以還不忍後命故遣之既而悔之亦無及也已王曰而敢來何也對曰使而失命召而不來是再奸也逃無所入王曰歸從政如他日論語曰使於四方不辱君命可謂士矣又曰蘧伯玉使人於孔子孔子與之坐而問焉曰夫子欲寡其過而未能也使者出子曰使乎使乎史記曰呉季札之為使北遇徐君徐君初好札劍口雖弗言季札知之為使上國未獻還至徐君徐君已死乃解其寳劍繫徐君塜樹而去之從者曰徐君已死當誰與乎曰不然始吾已心許之豈以死背吾心哉又曰趙平原君使人於春申君趙使欲夸楚為瑇瑁簮刃劒室悉以珠飾之春申君三千餘人上客皆躡珠履以見趙使大慙又曰陸賈楚人以客從髙祖定天下名為有口辯士居左右常使諸侯時中國初定佗平南越因王之髙祖使賈賜佗印為南越王佗魋結箕踞見賈賈因説佗曰足下以區區之越與天子抗衡為敵國禍且及身矣佗乃蹶然起坐謝賈曰生長蠻夷中久殊失禮義因問賈曰我與蕭何曹參韓信孰賢賈曰王似賢之復問曰我與皇帝孰賢賈曰皇帝起豐沛討暴秦誅强楚為天下興利除害繼五帝三王之業統理中國中國之人以億計地方萬里居天下之膏腴人衆車轝萬物殷富政由一家自天下剖判未始有也今王衆不過數十萬皆蠻夷﨑嶇山海間譬若漢一郡王何乃比於漢佗笑曰吾不起中國故王此使我居中國何遽不若漢迺大恱賈至孝文帝元年召丞相陳平舉可使南越者平言陸賈先帝時習使南越乃召為太中大夫往使因讓佗自立為帝南越王甚恐為書謝於是乃下命國中曰吾聞兩雄不俱立兩賢不並世皇帝賢天子也自今以後去帝制黄屋左纛賈還贄文帝大恱又曰汲黯為謁者東越相攻上使黯往}
