  - {type: variant, offset: 1704, length: 1359, content: 二城宋玉九辨云倚結軫兮太息涕潺湲兮霑軾箱方言曰箱謂之輫音斐詩曰睆彼牽牛不以服箱通俗文曰車箱曰較音角風俗通曰車一曰兩相與為體也原其所以言兩箱轅及輪兩而耦故稱兩耳轙爾雅曰載轡謂之轙郭璞曰車軛上環轡所貫轊說文曰轊車軸端也杜林說轂錔也方言曰車轊齊謂之𨏠鮑明遠蕪城賦曰當昔全盛之時車挂轊人駕肩廛音鄽閈樸地歌吹沸天環釋名曰游環在休馬背上驂馬之外轡貫之游移前卻無常處爾雅曰與環謂之捐徐絹切郭璞曰著車眾環詩曰游環脅驅釭說文曰釭轂之鐵也方言曰車釭燕齊海代之間謂之鐹音戈或謂之錕自關而西謂之釭錕音袞續搜神記曰鄭茂病亡殯殮訖未得葬忽然婦及家人夢茂云巳未應死偶悶絕耳可開棺出我燒車釭以熨頂頭如言乃活轄釋名曰轄害也車之急害也詩曰出宿干干飲餞于言載脂載舝還車言邁舝與轄同左傳曰諸侯賓至甸設庭燎僕人巡宮車馬有所賓從有侍巾車脂轄隸人牧圄各贍其事漢書曰陳遵嗜酒每大飲賓客滿堂輒閉門取客車轄投井中雖有急終不能去蔡邕獨斷曰乘輿之車皆副轄副轄者施轄於外乃服設轄銘曰載馳非轄不行臨政誤教非賢不明張平子東京賦曰重輪貳轄䟽轂展軨潘正叔贈陸機詩云星陳夙駕載脂載轄鍊釋名曰鍊簡也鍊釭軸之間使不相忘輠釋名曰輠褁也褁軹也軹指見於轂頭禮曰叔孫武叔朝見輪人以杖關轂而輠輪者以是有爵而后讀如前後之後杖也餘具輪事注中史記曰淳于髡齊人也愽聞彊學其諫說慕晏嬰之為人然而秉意觀色為務故齊人謂之炙輠輠者之盛膏者炙之不盡猶有餘流言髡之智不盡如炙輠當通俗文曰車當謂箳步輕切篂郭林宗別傳曰宿仲琰為部從事嘗柴車駕牛編荊為當蓋周禮曰輪人為蓋達常圍二寸達常盍斗扛入丘中也上欲尊而宇欲卑上近部平者也隤下瓦宇上尊而宇卑則吐水是疾而霤蓋者主為兩設也蓋已崇則雖為門也蓋已卑是蔽目也是故蓋崇十尺良蓋弗冒弗紘殷敏而馳不隊謂之國工蓋之圜也以象天也蓋弓二十有八以象星也方言曰蓋在上如屋舍之復蓋蔡邕獨斷曰乘輿車皆黃蓋者並以黃為裏也董卓別傳曰卓諷朝廷使光祿宣璠持節拜卓為太師位諸侯上引還長安百官迎路拜揖卓遂僣擬車服乘金華青蓋畫兩輪時人號為竽摩車轑釋名曰轑似弓曲也說文曰轑蓋弓也淮陽名車穹周禮曰弓鑿廣枚鑿上二枚鑿下四枚弓轑也鑿深二寸有半下庇軹五尺謂庇輪四尺謂之庇軫參分弓長而揉其一以為尊之蓋之二十有八以象星也杠周禮曰輪人為蓋達常圍三寸桯音楹蓋杠也信其桯圍以為部廣六寸部長二尺桯長倍之四尺者二杠長八尺謂達常以下也加達常二尺則蓋高一丈也覆笭釋名曰笭撗在車前織竹作之空笭笭也廣雅曰覆笭謂之辟枸心廣雅曰從下枸軸也通俗文曰軸限者謂之枸較周禮曰參分式圍去一以為較圍去一以為軹圍釋名曰其較重卿所乘也幰通俗文曰張布曰幰儀制令曰諸車一品青油纁道幰朱裏朱絲絡網三品以上青道幰朱五品以上青徧幰碧裏六品以下皆不得用幰鹵簿令曰安車紫油通幰紫油纁朱裏四望車青油通幰青油纁並朱絲絡網后及皇太子車幰並准此風土記曰周禮以拂拭車一義謂施嚴惟幰潘岳籍田賦曰微風生於輕幰纖埃起乎朱輪潘尼書曰朝從長塗暮栖所集歸雲乘幰浮悽風尋惟入䋺釋名曰䋺道也在後道曰使不得卻縮也王隱晉書曰山濤為尚書有人題曰閣中有大牛王齊鞅裴揩鞦和嶠踖踧不敢休茵釋名曰茵車中所坐也用虎皮有文采詩曰陰靷鋈音沃續文茵暢轂駕我騏馵音注漢書曰邴吉為丞相馭吏嗜酒數逋蕩逋亡也蕩放也謂亡其所供之職而漸放也常從吉出醉歐丞相車茵上西曹主吏白欲斥之吉曰以醉飽之失去士使此人復何所容西曹但忍之此不過汙丞相車茵爾遂不去也, SBCK: 七}
