  - {type: variant, offset: 29, length: 0, content: '', SBCK: 釋之又曰司馬相如爲郎數􅀊㑹唐蒙使略通夜郎西􅈎中發巴蜀吏卒千人郡又多爲發轉漕萬餘人用興法誅其渠而巴蜀民大驚恐上聞之乃使相如責唐蒙等因喻告巴蜀民以非上意還報天子乃拜相如爲中郎將建節持四乗之傳因巴蜀弊物以賂西夷至蜀太守以下郊迎縣令負弩矢先驅蜀人以爲寵於是卓王孫臨卭諸公皆因門下而獻牛酒又曰淳于髠者齊之贅壻也壻也者女之夫比於子餘剩故曰贅壻長不满七尺滑稽音骨乱也稽者同也多辨數使諸侯未嘗詘辱威王八年楚大發兵加齊齊王使淳于髠之趙請兵賫金百斤馬千駟淳于髠仰天大􅀏􅃣纓索絶王曰先生少之乎髠曰何敢王曰先生􅀏豈有􅀃乎髠曰今者臣從東來見道旁有穰田者操一肫蹄酒一盃而呪曰甌寠滿篝篝籠也音構甌寠猶柸樓也言豊年菜樹易可满篝汚耶滿車行耶下地田也則下地田之中有薪菜可满車也五􅂖蕃熟穰穰满家臣見所持者狹而欲者大奢􅀏於是齊王乃益賫黄金千鎰白璧十􅀟車馬百駟髠辭而行至趙趙與之精兵十萬革車千乗楚聞之夜引兵而去威王大恱漢書曰漢王曰孰能爲我使淮􅀯使之發兵背楚留項王於齊數月我之取天下可萬全隨何曰臣請使之乃與二十人俱使淮南至太宰主之淮南太宰作内主也三日不得見隨何因􅀃太宰曰王之不見何必以楚爲強以漢爲弱使何得見言之而是耶是大王所欲聞言之而非耶使何等二十人伏斧質淮􅀯市以明背漢而與楚也太宰乃言之王王見之隨何􅀃淮􅀯王王曰請奉命隂許叛楚與漢未敢泄楚使者在方急責布發兵隨何直入曰九江王歸漢楚何以得發兵布驚曰何至是楚使者岀何曰事己搆可殺楚使無使歸而疾走漢併力布從之遂歸漢又曰張騫漢中人建元中爲郎時匈奴降者言匈奴破月支氏擒其王以其頭爲飲器月支遁而怨匈奴無與共擊之漢方欲滅胡聞之乃募使者騫應募與堂邑氏奴甘父俱徃匈奴不聽去乃留騫十餘􅀊娶胡妻有子然騫持漢節不失居匈奴西騫因與其屬亡嚮月氏西走數十日至大宛後單于死國亂騫與胡妻及堂邑父俱亡歸漢拜騫太中大夫騫爲人寛信蠻夷愛之騫曰臣在大夏時見卭竹杖蜀布問安得此國人曰吾賈人往市之身毒國一名天竺國在大夏東南數千里人乗象以戰臣度大夏去漢萬二千里有蜀物其去蜀不逺矣於是漢復事西南夷騫從大將軍擊匈奴嘗諳知水草處軍湏不乏封􅀶}
