  - {type: variant, offset: 958, length: 396, content: 為輪斬三材必以其時三材轂輻牙輻也者以為直指也望其輻欲其揱音消爾而纖也進而眡音視之欲其肉稱也參分其轂長二在外一在內以置其輻凡輻量其鑿深以為輻廣而鑿淺則是以大枕雖有良工莫之能固鑿深輻小則是固有餘而強不足故竑音宏其輻廣以為之弱則雖有重任轂不折參分其輻之長而殺音肢其一則雖有深泥亦弗溓讀如黏漢書曰李陵擊匈奴矢盡斬車軸而持之輞釋名曰輞羅也周輪其外周禮曰輪人為輪斬三材必以其時三材轂輻牙也牙讀如迓也間或謂之輞牙也者以為固抱也凡揉而首切牙外不廉而內不挫旁不腫謂之用火之善廉絕也挫所也腫廆也是故規之以眡其圜音員也萬音矩之以眡其匡也又曰六分其輪崇以其一為之牙圍叄分其牙圍而漆其二不漆其踐地者軛續漢書曰文虎伏軾龍道衡軛齊書曰吳興有項羽神護郡廳事太守不得上太守到郡必須祀以軛下牛李安民奉佛法為太守到郡不與神牛著屐上廳事又於廳上入關齊俄而牛死葬廟側今呼為李公牛韓詩外傳曰武王伐紂到邢丘軛折為三天雨三日不休武王召太公而, SBCK: ''}
