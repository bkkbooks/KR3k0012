  - {type: variant, offset: 287, length: 482, content: 轍跡居無室廬幕天席地縱意所如謝靈運送孔令詩曰河流有急瀾浮驂無蹊轍豈伊川途念宿心愧將別顏延年贈王太常詩曰林閭時晏開亟迴長者轍陸韓卿荅兄希升詩曰駿足思長坂柴車畏危轍傅武仲舞賦曰或踰埃赴轍霆駭電滅軸說文曰軸持輪也周禮曰軸有三理一者以為媺音美也二者以為久也三者以為利也媺無節目也久堅刃心利滑密也釋名曰軸複也重複非一之言也左傳曰齊侯執陽虎將東之陽虎願東陽虎欲西奔晉如齊必反己故許以東為願也及囚諸西鄙盡借邑人之車鍥若結切其軸麻約而歸之鏤刻也欲絕追者載葱音䆫靈寢於其中而逃葱靈輜車名追而得之囚於齊又以葱靈奔宋遂奔晉適趙氏史記曰淳于髡曰狶膏棘軸所以為滑也然不能運方穿漢書曰臨江閔王榮立為太子廢為臨江王坐侵廟壖地為宮上徵榮榮行祖於江陵北門既上車軸折車廢江陵父老涕泣竊言曰吾王不反矣轂詩曰文茵暢轂駕我騏馵周禮曰轂也者以為利轉也凡斬轂之道必矩其陰陽陽也者稹音奠理而堅陰也者䟽理而柔是故以火養其陰而齊諸其陽則轂雖敝不藃音耗轂小而長則祚鋤革切大而短則擊音致又曰行澤者欲短轂行山者長轂短轂則利長轂則安左傳曰楚子與若敖戰皋許射汰輈以貫笠轂穀梁傳曰長轂五百乘緜地千里長轂兵車四馬曰乘春秋考異郵曰黃, SBCK: 金城湯}
