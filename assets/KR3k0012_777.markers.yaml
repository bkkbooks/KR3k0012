  - {type: variant, offset: 21, length: 0, content: '', SBCK: 魯可取乎對曰不可猶秉周禮周禮所以爲夲也臣聞之國將亡夲必先顛而后枝葉從之魯不弃周禮}
  - {type: variant, offset: 21, length: 0, content: '', WYG: 難不已将自斃君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以為本也臣聞之國将亡本必先顛而後枝葉從之魯不棄周禮}
  - {type: variant, offset: 21, length: 0, content: '', krp: 魯可取乎對曰不可猶秉周禮周禮所以爲夲也臣聞之國將亡夲必先顛而后枝葉從之魯不弃周禮}
  - {type: punctuation, offset: 23, content: ！, id: KR3k0012_CHANT_777-bkkpn10}
