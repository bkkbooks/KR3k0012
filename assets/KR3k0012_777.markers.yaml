  - {type: 'tls:seg', offset: 23, content: '', id: KR3k0012_CHANT_777-1a.10}
  - {type: variant, offset: 23, length: 0, content: '', SBCK: 動也君其務寧魯難而親有禮因重固能重固者因而成之間携貳覆昏亂霸王之器也又曰齊孝公伐我北鄙公使展喜犒師使受命于展禽栁}
  - {type: variant, offset: 23, length: 0, content: '', WYG: 動也君其務寜魯難而親有禮因重固能重固者因而成之間擕貳覆昏亂覇王之器也又曰齊孝公伐我北鄙公使展喜犒師使受命於展禽栁}
  - {type: variant, offset: 23, length: 0, content: '', krp: 動也君其務寧魯難而親有禮因重固能重固者因而成之間携貳覆昏亂霸王之器也又曰齊孝公伐我北鄙公使展喜犒師使受命于展禽栁}
  - {type: variant, offset: 24, length: 0, content: '', SBCK: 惠也齊侯未入境展喜從之曰寡君聞君親舉玉趾將辱弊邑使下臣犒執事又曰晉侯及􅁗伯圍鄭以其無禮於晉且貳於楚也晉軍凾陵􅁗軍汜南佚之孤言於鄭伯曰國危矣􅀂使燭之武見􅁗君師必退公從之又文下曰􅁗伯使西乞術來聘且言將伐晉襄仲辭王曰君不忘先君之好照臨魯國鎮撫其社稷重之以大噐寡君敢辭玉賔荅曰不腆先君之敝噐而使下臣結二國之好是以敢致之襄仲曰不有君子其能國乎國無陋矣厚賂之又宣十五年曰楚子圍宋宋人使樂嬰齊告急于晉晉侯使解楊如宋使無降楚曰晋師悉起將至矣鄭人囚之而獻於楚楚子厚賂之使反其言不許三而許之登諸樓車使呼宋人而告之遂致君命楚子將殺之使與之言曰爾旣許不榖而反之何故非我無信汝則棄之速即爾刑對曰臣聞之君能制命爲義臣能承命爲信信載義而行之爲利謀不失利以衛社稷民之主也義無二信信無二命義不行两信不受二命也君之賂臣不知命也奉命以出有死無霣音殞又可賂乎臣之許君以成命也成其君命也死而成命臣之禄也寡君有信臣矣下臣獲考死又何求楚子舎之以歸考城又曰晉侯使郄克徴㑹于齊齊頃公惟婦人使觀之郄子登婦人􅀏於房獻子怒出而誓曰所不此報無能涉河郄克請伐齊晉侯弗許至成公三年衛孫桓子臧宣叔亦乞師以伐齊晉侯許之又曰齊叔老爲季武子介自是晉人輕魯弊而益敬其使又曰呉公子札來聘見叔孫穆子􅀃之謂穆子曰子其不得死乎好善而不能擇人吾聞君子務在擇人吾子爲魯宗卿而任其大政不慎所舉何以堪之禍必及子聘于齊􅀃晏平仲謂之曰子速納邑與政無邑無政乃免於難齊國之政將有所歸未獲所歸難未歇也故晏子因陳桓子以納政與邑是以免於欒髙之難難在昭八年聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉大帶也吴地貴縞鄭地貴紵故各獻己所貴示損己而不爲􅀍貨利謂子産曰鄭之執政侈難將至矣政必及子爲政慎以禮不然鄭國必敗敗謂伯有也又曰韓宣于如楚送女叔向爲介鄭子皮子太叔勞諸索氏太叔謂叔向曰楚王汰侈己甚子其戒之叔向曰汰侈己甚身之災也焉能及人􅀂奉吾幣帛愼吾威儀守之以信行之以禮敬始而思終終無不復行而不失儀敬而不失禮導之以訓詞奉之以舊法考之以先王度之以二國雖汰侈􅀂我何又曰費楚無極譛太子建王使城父司馬􅁬楊殺太子建未至而使遣之太子奔宋王召􅁬楊使城父人執己以至王曰言出於余口入於耳爾誰告建也對曰臣告之君王命臣也事建如事余臣不佞不能苟貳奉􅀄以還不忍後命故遣之旣而悔之亦無及也己王曰而敢來何也對曰使而失命召而不來是再姧也逃無所入王曰歸從政如他日姧犯也論語曰使於四方不辱君命可謂士矣又曰蘧伯玉使人於孔子孔子與之坐而問焉曰夫子欲寡其過而未能也使者出子曰使乎使乎史記曰呉季札之爲使北過徐君徐君􅀄好札劒口雖弗言季札知之爲使上國未獻還至徐君徐君巳死乃解其寳劒繫徐君塜樹而去從者曰徐君己死當誰與乎曰不然始吾心己許之豈以死背吾心哉又曰趙平原君使人於春申君趙使欲夸楚爲瑇瑁簮刀劒室悉以珠飾之春申君三千餘人上客皆鑷珠履以見趙使大慙又曰陸賈楚人以客從髙祖定天下名爲有口辨士居左右常使諸侯時中國􅀄定尉佗平南越因王之髙祖使賈賜佗印爲南越王佗魋結箕倨見賈賈因􅀃佗曰足下欲以區區之越與天子杭衡爲敵國禍且及身矣佗廼蹶然起㘴謝賈曰生長蠻夷中乆殊失禮義因問賈曰我與蕭何曹叅韓信孰賢賈曰王似賢之復問曰我與皇帝孰賢賈曰皇帝起豐沛討􅁀􅁗誅強楚爲天下興利除害繼五帝三王之業統理中國中國之人以億計地方萬里居天下之膏􅃾人衆車轝萬物殷冨政由一家自天地剖判未始有也今王衆不過數十萬皆蠻夷﨑嶇山海間譬􅀂漢一郡王何乃比於漢佗􅀏曰吾不起中國故王此使我居中國何遽不􅀂漢廼大􅀃至孝文帝元年詔丞相陳平舉可使南越者平言陸賈先帝時曽使南越乃召爲太中大夫徃使因讓佗自立爲帝賈至南越王甚怒爲書謝於是乃下令國中曰吾聞兩雄不俱立兩賢不並丗皇帝賢天子也自今己後去帝制黄屋左纛賈還報文帝大恱又曰汲黯爲謁者東越相攻上使黯徃}
