  - {type: variant, offset: 2326, length: 0, content: '', SBCK: 定倨句非用其度也其􅀶爲一􅀶謂服􅀶􅀶廣也股爲二皷爲三三分其股􅀶去一以爲皷􅀶三分其皷􅀶以其一爲之厚郑衆云股磬之上者也皷其下小者所當擊也郑玄謂股外面皷内面也假令磬股廣四寸半者股長九寸股廣三寸長尺三半厚一寸巳上則摩其旁鄭玄云磬声太上則摩鑢其旁也郑玄謂太上声清也薄而廣則濁也巳下則摩其端太下声濁也矩而厚則清又曰磬師掌教擊磬教教視瞭磬亦編於鍾也教縵樂讌樂之}
