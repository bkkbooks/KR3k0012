  - {type: variant, offset: 2342, length: 5, content: 鍾大者三十, SBCK: 不斈操縵不能安絃宴謂房中之樂所謂隂声}
  - {type: variant, offset: 2342, length: 1, content: 鍾, WYG: 漢武帝起招仙虛閣於甘泉宮西其上懸浮金輕玉之磬也王韶之始興記曰縣下流有石室内有懸石扣之聲若磬響十餘里淮南子曰孟冬之月北宫御女黒衣綵擊磬石又曰禹以五音聴政懸鐘鼓磬鐸置鞀以待四方之士為號曰教寡人以道者擊鼔喻寡人以義者擊鐘告寡人以事者振鐸語寡人以憂者擊磬五經要義曰磬立秋之樂也吕氏春秋曰堯命䕫拊石擊石以象上帝玉磬之音以舞百獸世本云叔所造不知何代人又曰無句作磬古史考曰堯時人周禮冬官考工記磬氏為磬倨句一矩有半必先度一矩為句一矩為股而求其弦既而以一矩有半觸其弦則磬之倨句也磬之制有大小此假矩以定倨句非用其度也其博為一博謂股愽愽廣也股為二鼓為三弦分其股博去一以為鼓博參分其鼓博以其一為之厚鄭衆云股磬之上}
