  - {type: variant, offset: 2917, length: 1, content: 會, WYG: 圓山其形圓也有木林疾風震地而林木不動以其木為瑟故曰靜瑟也黄帝使素女鼓庖羲氏之瑟滿席悲不能已後破為七尺二寸二十五絃韓子曰齊宣王問巨倩曰儒者鼔瑟乎對曰不也夫瑟者以小絃為大聲以大絃為小聲是細大以易序貴賤易位儒者為害義故不能宣王曰善筝説文曰箏五絃筑身樂也風俗通曰謹按樂記箏五絃筑身也今并凉州箏形如瑟不知誰作也按京房制五音唯加瑟十二絃此乃箏也今雅樂箏十二絃他樂十三絃如箏稍小曰雲和樂府不用史記曰秦逐客李斯上書曰夫擊甕缶彈箏摶髀而歌嗚嗚使快耳者真秦之聲也晉書曰謝安婿王國寶専利無檢行安惡其人每抑之武帝末年嗜酒而㑹}
