  - {type: variant, offset: 2798, length: 4, content: 鍾左右鍾, SBCK: 治天下多風陽氣畜積果實不成故王建作爲五絃之瑟以來隂以定群瞽瞍制五絃之瑟作十五之絃舞益以八絃爲二十三絃髙誘曰王建朱襄之臣慎子曰公輸子巧用材也不能以檀爲瑟韓詩外傳曰趙王使人於楚鼓瑟遣之曰無失吾言使者受命伏而不起曰大王鼓瑟未甞􅀂今日之悲也王日然鼓瑟者固方調也使者曰調則可記其柱王曰不可天有燥濕􅁝有緩急柱有推移不可記也使者曰臣請此以諭楚之去趙千有餘里亦有􅁻凶之變凶則弔之􅁻則賀之猶柱之有推移不可記典略曰百里奚虞大夫晉君以女爲􅁗穆夫人用奚爲媵奚亡走宛楚人執之􅁗穆公知其賢欲厚貨以求之恐楚不與乃以羖羊皮贖之號五羖大夫􅁗遂以覇奚相􅁗其妻傭浣入宫見琴者之自言能鼓瑟歌曰百里奚母已死葬南溪墳巳覆以紫春莫􅀺搤伏雞西入秦五羖皮今日冨貴􅂢我爲百里奚乃識之尸子曰夫瑟二十五絃其僕人鼓之則爲􅀏賢者以其義鼓之欲樂則樂欲悲則悲雖有暴君爲之立變丗夲曰庖羲氏作瑟瑟㓗也一使人精㓗於心淳一於行也王子年拾遺録白圎山其形圎也有木林疾風震地而林木不動以其木爲瑟故曰静瑟也黄帝使素女鼓庖羲氏之瑟滿席悲不能已後破爲七尺二寸二十五絃韓子曰齊宣王問巨倩曰儒者鼓瑟乎對曰不也瑟者也以小絃爲大聲以大絃爲小聲是細大以易序貴賤易位儒者爲害義故不能宣王曰善筝􅀃文曰筝皷絃筑身樂也風俗通曰謹按樂記筝五絃筑身也今并涼州筝形如瑟不知誰作也按京房制五音唯加瑟十三絃此乃筝也今雅樂筝十二絃他樂}
