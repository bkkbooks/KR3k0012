  - {type: variant, offset: 2757, length: 1, content: 已, WYG: 不用鐘也瑟白虎通曰瑟者閉也所以懲忿窒欲正人之徳也故曰瑟有君父之節臣子之法商角則君父有節臣子有義然後四時和然後萬物生故謂之瑟大瑟謂之灑長八尺一寸廣一尺八寸二十七絃爾雅曰徒鼓瑟謂之歩三禮圖曰雅瑟長八尺一寸廣二尺八寸二十三絃其常用者十九絃其餘四絃謂之蕃羸也頌瑟七尺二寸廣尺八寸二十五絃盡用也蔡邕月令章句曰瑟前其柱則清却其柱則濁毛詩鹿鳴篇曰呦呦鹿鳴食野之苹我有嘉賔鼓瑟吹笙乂車鄰曰既見君子並坐鼓瑟禮記曰清廟之瑟朱絃而疏越一唱而三嘆有遺音者矣此雅淡之樂也言至和不在于音故不須絙絃促柱以䧟人心也論語曰由之瑟奚為於丘之門論語曰孺悲欲見孔子孔子辭以疾将命者出户取瑟而歌使之聞之}
