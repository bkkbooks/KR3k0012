  - {type: variant, offset: 1037, length: 887, content: 作勞耳鳴無不祥也勒至平原常在平人師驩家為奴有老父謂勒曰君魚龍髮際際四道已成當貴為人主甲戍之歲王彭祖可圖勒曰若如公言不敢忘德忽然不見每耕又聞鼓角之聲勒又告諸奴又聞之因曰吾初在家恒聞如是諸奴白驩驩奇而免之至是眾歸焉莊子曰梓慶削木為鐻見者驚猶鬼神魯侯問其術對曰臣將為鐻未嘗敢以耗氣齊七日忘吾四支然後入山林觀天性區別見成鐻然後加手鐻似夾鍾也管子曰黃帝作五聲以正五鍾一曰青鍾大音二曰赤鍾心三曰黃鍾洫光四日景鍾昧其明五曰黑鍾隱其帝五聲既調然後作五行屍子曰鄭公謂子產曰飲酒之不樂鍾鼓不鳴寡人之性也國家之不乂朝廷之不理與諸侯交之不得志也子之任也子無入寡人之樂寡人無入子之朝自是以來子產理鄭城門不閉國無盜賊道無餓人孔子曰若鄭公之好樂也雖抱鍾而朝可也戴延之西征記曰陝縣城西北二面帶河河中對城西北角水涌起銅鍾翁仲頭髮常出水上漲減恒與水齊晉軍當至髮不復出唯見水異嗟嗟有聲聲聞數里翁仲本在城內大司馬門外為賊所徙當西入關至此而沒呂氏春秋曰晉平公鑄為鍾使工聽之皆以為調矣師曠曰不調請更鑄之公曰吾皆以為調矣師曠曰後世有知音者知鍾不調也臣竊恥之至於師涓而果知鍾之不調也慎子曰魯莊公鑄大鍾曹翽入見曰今國褊小而鍾大君何不圖之鬻子曰大禹治天下也以五聲聽之政曰教寡人以義者擊之鍾韓子曰叔孫相魯有子曰孟丙豎牛妒之叔孫為丙鑄鍾鍾成丙不敢擊使豎牛請之叔孫豎牛不為之請又欺之曰吾已為爾請之矣使爾擊之叔孫聞之曰丙不請而擅擊鍾遂怒之丙出奔齊尸子曰鍾鼓之聲怒而擊之則武憂而擊之則悲喜而擊之則樂其意變其聲亦變意誠感之達於金石而況人乎晏子曰景公為大鍾將懸之仲尼伯常騫晏子三人俱朝曰鍾將毀之撞之果毀公見三子問之晏子對曰鍾大不以禮故曰將毀仲尼曰鍾大懸下氣上薄故曰將毀伯常騫曰今日庚申雷日也陰莫勝於雷故曰將毀韓子曰智伯欲伐仇由而道難不通鑄大鍾遺之方車二軌仇由大悅除塗將內之赤草曼支諫曰此小所以事大也今以大事小兵必隨之仇由君不聽曼支因斷轂而馳至齊十月仇由亡淮南子曰闔閭伐楚破九龍之鍾許慎注曰刻簴為九龍懸鍾也賈于云毀十龍之鍾又曰齊景公族鑄大鍾撞之於庭下郊雉皆雊許慎注曰族聚也鍾聲如雷震雉皆應之又曰孟秋之日西館御好白色白綵撞白鍾故處西宮又曰鍾之與, SBCK: 頌}
