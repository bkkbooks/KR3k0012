  - {type: variant, offset: 2406, length: 314, content: 三品已上女樂五人五品已上不過三人也虞喜志林曰吳時於江水中得鍾有百餘字募求讀者並無人曉樂什圖徵曰君子鑠金為鍾四時九乳是以撞鐘以知君鍾調則君道得宋均注曰九乳法九州又曰聖王往承天定爵祿人者不過其能尊卑有位位有物物有宜功成者賞功敗者罰故樂用鍾宋均注曰不過能謂量能授爵也有罪鳴鍾以攻之也白虎通曰鍾之為言動也陰氣用事萬物動成鍾為氣用金聲也鎛者時之聲也節度之所生也有節度則萬物昌無節度則萬物亡異苑曰魏時殿前鍾忽鳴張華曰蜀銅山崩說苑曰鼓法天鍾法地秦始皇建千石之鍾立萬石之簴傅玄歌辭曰雷師鳴鍾鼓風伯吹笙簧西母出穴聽王父吟東廂三禮圖曰凡鍾十六枚同為一筍簴為編鍾特懸者謂之鎛又曰鎛鍾之大者也形如鍾但大耳其在簴亦一枚而已三輔黃圖曰始皇簴高三丈鍾小者千石, SBCK: ''}
