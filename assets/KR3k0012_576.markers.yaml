  - {type: variant, offset: 2757, length: 1, content: 已, SBCK: 不用鍾也瑟白虎通曰瑟者閑也所以懲忿窒欲正人之徳也故曰瑟有君父之節臣子法啇角則君父有節臣子有義然後四時和然後萬物生故謂之瑟大瑟謂之灑長八尺一寸廣一尺八寸二十七絃爾雅曰徒皷瑟謂之歩三禮圖曰雅瑟長八尺一寸廣二尺八寸二十三絃其常用者十九絃其餘四絃謂之蕃羸也頌瑟七尺二寸廣尺八寸二十五絃盡用也蔡邕月令章句曰瑟前其柱則清却其柱則濁毛詩鹿鳴篇曰􅊯􅊯鹿鳴食野之苹我有嘉賔皷瑟吹笙又車鄰曰旣見君子並坐皷瑟禮記曰清廟之瑟朱絃而䟽越一唱而三歎有遺音者也此雅淡之樂也言至和不在於音故不湏絙絃促柱以慆人心也論語曰由之瑟奚爲於丘之門陽貨曰孺悲欲見孔子孔子辝之以疾將命者岀户取瑟而歌使之聞之}
