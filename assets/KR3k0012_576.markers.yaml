  - {type: variant, offset: 2323, length: 0, content: '', SBCK: 擊皷喻寡人以義者擊鍾告寡人以事者振鐸語寡人以憂者擊磬五經要義曰磬立秋之樂也吕氏春秋曰堯命夔拊石擊石以象上帝玉磬之音以舞百獸代夲云叔所造不知何代人又曰無句作磬古史考曰堯時人周禮冬官考工記磬氏爲磬倨句一矩有半必先度一矩爲句一矩爲股而求其絃旣而以一矩有半觸其弦}
