  - {type: variant, offset: 3270, length: 3, content: 金錞和, SBCK: 此知之取謝引詣府襄􅃆記曰辛居士名宣仲隴西人大明末寓居襄陽縣西六里多植松竹栖遟其下静嘿不交塵俗林中起一草廬容􅂰而已善彈筝與淮南胡陶京兆駱惠度同志爲友常共讌集此林陶能吹笛惠度工歌拾林下絃管道韻時人謂之三公樂宋邵陵王休􅀂爲南雍州刺史躬徃浩焉宣仲正在林中彈筝了不廻顧逡廵致筝於席延邵陵與語􅂊􅄒寒温而巳時邵陵客有述其旨者授筝令彈再三固請荅曰幸非王門伶人何事見逼所勝於君者正舉止自由若聞君鞫躬復與君何異占對詳雅衆不能屈齊文惠臨州吴興沈約奉教聘引並不降志約乃共論文章宣仲輙言莊老旣各言其志不能相屈建武中遇疾卒惠度及陶並不知所終英雄記曰吕布詣􅀽紹紹患之布不自安因求還洛陽紹聽之丞制使領司􅊢校尉遣壯士送布而隂殺之布疑其圗巳乃使人}
