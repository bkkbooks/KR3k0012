  - {type: variant, offset: 192, length: 1, content: 郃, SBCK: 雄母羅氏雄信巫覡之言多有忌諱至欲不葬其母司空趙肅諫之宋書日前廢帝子業好遊華林園竹林堂使婦人倮身相逐有一婦人不從命斬之後經少時夜夢遊後堂有一女子罵曰尓悖虐不道明年不及熟矣帝怒遂於官中求得似所夢者戮之其夕復夢所戮女罵曰汝枉殺我以訴上帝至是巫云此堂有􅀑帝日與陰山公主及六宫綵女數百人隨群巫捕􅀑屏除侍衛帝親自射之又日王僧綽豫參朝政從兄微懼其太盛勸令損抑僧綽乃求吳郡及廣州㑹巫蠱事泄上先召儈綽具以言之又曰明帝選王儉尚陽羨公主拜駙馬都尉帝以儉嫡母武康主因太初巫蠱事不可以爲婦姑欲開冢離葬儉因人自陳密以死請故事不行齊書日鬱林王在西州令女巫楊氏禱祝速求大位及文惠薨謂由楊氏之力倍加敬信呼揚婆宋氏己來人閒有揚婆兒歌蓋此徵也武帝有疾又命揚氏日夜祈禱又曰明帝身有衣絳衣服飾皆赤以爲厭勝巫覡云後湖水頭經過宫内致帝有疾帝乃自至太官水溝左右啓太官無水則不立決意塞之欲南引淮流會崩事寢又曰東昏侯偏信蔣侯迎來入宫晝夜祈禱左右朱光尚詐云見神動輒諮啓並云降福遂加位國朱又爲靈帝車服羽儀一依王者又曲信小祠日有十數巫師魔媪迎送紛紜光尚輒託云神意范雲謂光尚曰君是天子要人當思百全計光尙曰至尊不可諫止當託神􅀑以達意耳後東入樂遊人馬忽驚以問光尚光尙曰先帝大瞋不許數出帝大怒拔刀與光尙尋覔旣不見處乃縛菰爲明帝形北面斬之又日諸曁東洿里屠氏女父失明母有痼病疾親戚相棄鄉里不容女移父母遠住紵舎晝採樵夜紡績以供養父母俱卒親營殯葬􅀒土成墳忽空中聲云汝性可重山神欲相驅使汝可爲人療病必得大富女謂是魃魅弗敢從遂得病積時隣舎人有溪蜮毒者女試療之自覺病便差遂以巫道爲人療病無不愈家産日益鄉里多欲娶之女以無兄弟誓守墳墓不嫁又日武陵王曅爲祠部尚書巫覡或言曅有非常之相以此自負武帝聞之故無寵未常處方岳焉又日王敬則母爲女巫常謂人云敬則生時胞衣紫色後應德嗚皷􅊁人􅀏之日汝子得爲人吹􅊁可矣後果封侯給皷吹又日袁君政}
