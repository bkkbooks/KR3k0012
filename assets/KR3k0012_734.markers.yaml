  - {type: variant, offset: 10, length: 3, content: 高祖元, WYG: 敢有恒舞于宫酣歌于室時謂巫風論語曰人而無恒不可以作巫醫史記曰魏文侯時西門豹為鄴令徃到鄴㑹長老問民之疾苦長老云苦於河伯娶婦以故貧豹問其故對曰鄴三老廷掾常嵗歛百姓取其錢數百萬用其三二十萬為河伯娶婦與巫共分其餘錢持歸當時其巫行視小家女好者云是當為河伯婦即聘取洗沐為治新繒綺縠之衣間居齋戒為治齋宫河上張緹帳帷女居其中為具牛酒飲食十餘日共粉飾之如嫁女牀席令女居其上浮之河中始浮行數十里乃没其人家有好女者恐大巫祝為河伯取之以故多持女遠遁亡以故城中益空無人又貧困所從來久遠矣民人俗語曰即不為河伯娶婦水來漂溺人民西門豹曰至為河伯娶婦時願與三老巫祝父老送女河上幸來告語之吾欲徃送女皆曰諾至其時西門豹徃㑹之河上三老女子豪長父老皆㑹與人民觀之者三千人其巫子老女也}
