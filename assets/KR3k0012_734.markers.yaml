  - {type: variant, offset: 2463, length: 107, content: 梁城洋往潯陽時劉裔鎮潯陽九月甲申時迴風從東來入裔兒舡中西過狀如疋練長五六丈洋曰風從咸池中來攝堤下去咸池為刀兵大殺為死喪到甲子日申時府內大聚骨埋之裔問在何處洋曰不出州府門也裔架東門洋又曰東為天牢下閉門憂天獄至十二月十, SBCK: 御覽卷第}
