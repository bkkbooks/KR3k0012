  - {type: variant, offset: 4, length: 3, content: 四占星, WYG: 五巫上說文曰巫祝也女能事無形舞降神也象人兩褎舞形與工同意周禮春官曰司巫掌羣巫之政令若國大旱則帥巫而舞雩國有大烖則帥巫而造巫恒凡䘮事掌巫降之禮男巫掌望祀望衍授號旁招以茅女巫掌嵗時祓除釁浴旱暵則舞雩若王后弔則與祝前凡邦之大烖歌哭而請禮曰君臨臣䘮以巫祝桃茢執戈惡之以所異於生也又曰襄公朝于荆康王卒荆人曰必請襲欲使㐮之公依魯人曰非禮也荆人強之巫先桃茢荆人悔之巫祝桃茢君臨臣䘮之禮又曰嵗旱穆公召縣子而問然曰天久不雨吾欲暴巫而奚若曰天則不雨而望之愚婦人於以求之毋乃已疏乎已猶甚也巫主接神亦覡天哀而雨之春秋傳說巫曰在女曰巫在男曰覡周禮女巫旱暵則舞雩傳曰晉侯改塟共太子秋狐突適下國遇太子太子使登僕而告之曰夷吾無禮余得請於帝矣將以晉􅂌秦秦將祀余對曰臣聞之神不歆非類民不祀非族君祀無乃殄乎且民何罪失刑乏祀君其圗之君曰諾吾將復請七日新城西偏將有巫者而見我乎許之遂不見又曰夏大旱公欲焚巫尪臧文仲曰非旱備也修城郭貶食省用務穡􅂆分此其務也巫尪何為天欲殺之則如勿生若能為旱焚之滋甚公從之是嵗飢而不害又曰初楚范巫商似商似范巫之名謂成王與子玉子西曰三君皆將強死城濮之役王思之故使止子玉曰毋死不及止子西縊而懸絶王使適至遂止之使為商公沿}
