  - {type: variant, offset: 383, length: 458, content: 凡五十年而公破袁紹天下莫敵也晉書曰戴洋善占候揚州剌史嘗問吉凶於洋荅曰熒惑入南斗八月暴水當有客軍西南來如期果大水而石冰作亂冰既據揚州洋謂人曰視賊雲氣四月當破果如其言泰寧二年正月有流星東南行洋曰至秋應當壽陽及王敦作逆祖約問其勝敗洋曰大白在東方辰星不出兵法先起者為主應者為客辰星若出太白為主辰星為客辰星不出太白為客先起兵者敗今有客無主有前無後宜傳檄所部應詔伐之約乃率眾向合肥俄而敦死眾敗遂住壽陽洋又謂曰江淮之閒當有軍事譙城虛曠宜還固守不言然者雍丘沛皆非官有也約不從豫土遂陷於賊南中郎將桓宣以洋為參軍將隨宣往襄陽太守陶侃留之住武昌時侃謀北伐洋曰前年十一月熒惑守胃昴至今年四月積五百餘日昂趙之分野石勒遂死熒惑以七月退從畢右順行入潢道未及天關以八月二十二日復逆行還鉤繞畢向昴昴畢為邊兵主胡夷故置天弓以射之熒惑逆行司無德之國石勒死是也勒之餘燼已自殘害今年官與太歲太陰三合癸己癸為北方北方當受災歲鎮二星共合翼軫從子及己徘徊六年荊郢之分歲鎮所守其下國昌豈非功德之徵也今年六月鎮星前角亢角亢鄭之分歲星移入房太白為心房宋分順之者昌逆之者亡, WYG: ''}
