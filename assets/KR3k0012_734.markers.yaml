  body:
  - {type: variant, offset: 4, length: 3, content: 四占星, SBCK: 五巫上說文日巫祝也女能事無形舞降神也象人兩襃無形與工同意周禮春官日司巫掌羣巫之政令若國大旱則帥巫而舞雩雩旱祭也國有大烖則帥巫而造巫􅁪凡喪事掌巫降之禮男巫掌望祀望衍授號旁招以茅女巫掌歲時祓除釁浴旱暵則舞雩若王后弟則與祝前凡􅀖之大烖歌􅂘而請禮日君臨臣喪以巫祝桃茢執弋惡之爲有凶邪之氣在側君聞大夫之喪去樂卒事血往未襲也其己襲則止巫去桃茢鬼所惡茢萑苕可掃不􅖤所以異於生也又曰襄公朝于荆康王卒荊人曰必請襲欲使襄之公依魯人日非禮也荆人强之巫先桃茢荊人悔之巫祝桃茢君臨臣喪之禮又日歲旱穆公召縣子而問然日天乆不雨吾欲暴巫而奚若日天則不雨而望之愚婦人於以求之母乃已䟽乎巳猶甚也巫主接神亦覡天哀而􅀨之春秋傳說巫日在女日巫在男日覡周禮女巫旱暵則舞雩傳曰晉侯改葬共太子秋狐突適下國遇太子太子使登僕而告之曰夷吾無禮余得詣於帝矣將以晉卑秦秦將祀余對曰臣聞之神不歆非􅀋民不祀非族君祀無乃殄乎且民何罪失刑乏祀君其圖之君日諾吾將復請七日新城西偏將有巫者而見我乎許之遂不見又曰夏大旱公欲焚巫尫臧文仲日非旱備也脩城郭貶食省用務牆勸分社預注曰勸分有無相濟也此其務也巫尩何爲天欲殺之則如勿生若能爲旱焚之滋甚公從之是歲飢而不害又曰初楚范巫商似商似范巫之名謂成王與子玉子西日三君皆將强死城濮之役王思之故使止子玉曰母死不及止子西縊而懸絕王使適至遂止之使爲商公㳂漢沂江將入郢王在渚宫下見之懼而辭曰臣免於死又有䜛言謂臣將逃臣歸死於司敗也王使爲工尹又與子家謀殺穆王穆王聞之殺􅃲冝申及仲歸又曰晉侯夢大厲被髪及地搏膺而踊曰殺余孫不義余得請於帝矣壞大門及寢門而入公懼入于室又壞戸公覽召桑田巫桑田晉邑巫言如夢公日何如日不食新麥矣言公不得及食新麥六月丙午晉侯欲麥使甸人獻麥饋人爲之召桑田巫示而殺之將食張如厠陷而卒又曰晉中行獻子將伐齊夢與厲公訟弗勝公以戈擊之首墜於前跪而戴之奉之以走見梗陽之巫皐他日見諸道與之言同巫日今兹主必死若有事於東方則可逞獻子許諾晉伐齊又日公在楚楚人使公親禭公患之穆叔日祝殯而襚則布幣也先使巫祝除殯之凶邪而行禭禮與朝而布幣無異乃使巫以桃茢先殯茢黍穰楚人弗禁旣而悔之書日敢有􅁪舞于宫酣歌于室時謂巫風論語日人而無􅁪不可以作巫醫史記曰魏文侯時西門豹爲鄴令往到鄴㑹長老問民之疾苦長老云苦於河伯娶婦以故貧豹問其故對日鄴三老廷􅁺常歲歛百姓取其錢數百萬用其二三十萬為河伯娶婦與巫共分其餘錢持歸當其時巫行視小家女好者云是當爲河伯婦卽娉取洗沐爲治新繒綺縠之衣閒居齊戒爲治齊宮河上張緹絳帳帷女居其中爲具牛酒飰食十餘日共粉飾之如嫁女床席令女居其上浮之河中始浮行數十里乃沒其人家有好女者恐大巫祝爲河伯取之以故多持女遠逃亡以故城中益空無人又貧困所從來乆遠矣民人俗語曰即不爲河伯娶婦水來漂溺人民西門豹曰至爲河伯娶婦時願與三老巫祝父老送女河上幸來告語之吾欲往送女皆曰諾至其時西門豹往會之河上三老官屬豪長父老皆㑹與人民觀之者三二千人其巫老女子也年七十從弟子女十人所衣皆繒單衣立大巫旁西門豹曰呼河伯婦來視其好醜即將女出帷中來至前豹視之頋謂三老巫祝父老女子曰是女不好煩大巫嫗爲入報河伯更求好女後日送之卽使卒共抱女巫嫗投之河中有頃曰巫嫗何乆也弟子趨之復以弟子一人投河中有頃曰弟子何乆也復使一人趨之復投一弟子河中凡三弟子西門豹曰巫嫗弟子女也不能白事煩三老入白之復投三老河中西門豹簪筆罄折嚮河立待良乆長老吏旁觀者皆爲驚恐西門豹頋日巫嫗三老不來還柰之何復使廷掾與豪長一人趨之皆叩頭且破額血流地色若死􅁅西門豹曰諾且留待之須􅁷豹曰廷􅁺起矣河伯留之乆也皆罷去歸鄴吏民大驚恐是後不敢復言河伯娶婦又日武帝時游水發根服彪云游水縣名發根人姓言上都有巫病而􅀑下之上召置祠之甘泉及病使人問神君神君曰天子無憂病於是病愈又曰􅁊梁灾越巫勇之曰越俗有火災後起屋必用勝服之於是作建章宫度爲千門萬戸又曰起巫立越祀而以雞卜上信之}
