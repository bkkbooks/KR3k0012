  - {type: variant, offset: 2293, length: 146, content: 宗恥以占驗見知聞徵書到包懸印綬於縣廷而遁去遂終身不仕吳志曰孫權征黃祖軍行及潯陽吳範見風氣因詣舡賀催兵急行至郎破祖祖夜亡權恐失之範曰未遠必生擒祖至五更果得之權與呂蒙謀襲關羽議之近臣多曰不可權以問範範曰得之在後王辛德在南方酉受自刑梁在譙北乘德伐刑賊必破亡及甲子日東風而雷西行譙在南雷在軍前為軍驅除, SBCK: 衆}
