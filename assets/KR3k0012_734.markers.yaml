  - {type: variant, offset: 356, length: 271, content: 殷馗善天文言後五十歲當有真人起於梁沛之閒其鋒不可當至是凡五十年而公破袁紹天下莫敵也晉書曰戴洋善占候揚州剌史嘗問吉凶於洋荅曰熒惑入南斗八月暴水當有客軍西南來如期果大水而石冰作亂冰既據揚州洋謂人曰視賊雲氣四月當破果如其言泰寧二年正月有流星東南行洋曰至秋應當壽陽及王敦作逆祖約問其勝敗洋曰大白在東方辰星不出兵法先起者為主應者為客辰星若出太白為主辰星為客辰星不出太白為客先起兵者敗今有客無主有前無後宜傳檄所部應詔伐之約乃率眾向合肥俄而敦死眾敗遂住壽陽洋又謂曰江淮之閒當有軍事譙城虛曠宜還固守不言然者雍丘沛皆非官有也約不從豫土遂陷於賊南中郎將桓宣以洋為, SBCK: 付諮議}
