  - {type: variant, offset: 208, length: 1, content: 官, SBCK: 禪代之事不由已岀又日元帝背生黑子巫媪見日此大貴不可言又日蔡撙爲臨海太守有百姓楊元孫以婢探蘭貼與同里正黃權約生子酬乳哺直權死後元孫就權妻吳氏贖婢吳背約不還元孫訴樽判還本主吳能爲巫出入撙内以金釧賂撙妾遂改判與吳元孫撾登聞皷訟之爲有司劾時撙已去郡雖不坐而常以爲耻又日王神念爲靑兾二州刺史性剛正所更州郡必禁止淫祠時東北有石鹿山臨海有神廟祅巫欺惑百姓遠近祈禱縻費極多及神念}
