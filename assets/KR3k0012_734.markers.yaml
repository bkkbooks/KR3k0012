  - {type: variant, offset: 1430, length: 347, content: 及卜相之術則天時為監察御史稍遷太史令聖曆二年熒惑人輿鬼則天以問善思善思對曰商姓大臣當之其年文昌左相王及善卒長安中熒惑入月鎮星犯天關善思奏曰法有亂臣伏罪且有臣下謀上之象歲餘張柬之敬暉等起兵誅張易之昌宗其占驗皆此類又曰尚獻甫衛州汲人也尢善天文則天時召見起家拜太史令數顧問災異事皆符驗長安二年獻甫奏曰臣本命納音在金今熒惑犯上諸侯太史之位熒惑火也火能剋金是臣將死之徵則天曰朕為卿穰之遽轉獻甫為水衡都尉謂曰水能生金又去太史之位卿無憂矣其秋獻甫卒則天甚嗟異惜之又曰元和八年熒惑犯太微上相歷執法占者言今之三相皆不利始輕末重月餘李絳以足疾免明年十日李吉甫以暴疾卒九年六月武元衡為盜所害年五十八始元衡與吉甫齊年又同日為宰相及出鎮分領楊益至吉甫再入元衡亦還吉甫先一年以元衡生月卒元衡後一年以吉甫生月卒吉凶之數若符會, SBCK: 萬}
