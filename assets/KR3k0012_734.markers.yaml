  - {type: variant, offset: 336, length: 2, content: 袁紹, SBCK: 衣裳爲窮兒入市躬自交易焉築西鄙諸城爲羌兵皷譟凌之多作黑衣人共相執縛親率内參臨拒或實彎弓射人自晉陽東巡單馬馳騖前不得有人解髪散而歸又曰崔季舒未遇害家池蓮莖化爲人面着鮮卑帽妻晝魘魘寤云見人長一丈遍體黒毛欲來逼已巫曰此是五道將軍入宅者不祥又曰侯景之首至于江陵梟之}
