  - {type: variant, offset: 50, length: 0, content: '', SBCK: 日樊􅑂等至􅀪農舉更始諸將連戰尅勝衆遂大集乃分萬人爲一營凡三十營置三老從事各一人進至華陰軍中常有齊巫皷舞祠城陽景王以求福助以其定諸吕安社稷故郡國多為立祠焉盆子承其後故軍中祠之也巫言景王大怒日當爲縣官何故作賊縣官謂天子也有􅀏巫者輒病軍中驚動時方望弟陽怨更始殺其兄乃逆説崇等日更始荒亂令不行故使將軍得至於此今將軍擁百萬之衆西向帝城而無稱號名爲群賊不可以乆不如立宗室挾義誅伐以此號令誰敢不服崇等以爲然而巫言益甚前及鄭令阜孫乃相與議日今廹近長安而鬼神如此當求劉氏共尊立之六月遂立盆子為帝自號爲建世元年又}
