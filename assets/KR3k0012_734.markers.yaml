  - {type: variant, offset: 73, length: 2, content: 隱身, SBCK: 爲巫醫逃匿他界莽敗方還鄕里又曰第五倫爲㑹稽太守㑹稽俗多淫祀好卜筮人常以牛祭神百姓財産以之困匱其自食牛肉而不以薦祠者發病且死爲牛鳴前後郡將莫敢禁倫到官移書屬縣曉告百姓其巫祝有依託􅀑神者詐怖愚人皆案論之有妄屠牛者吏輒行罰人初頗恐懼或祝詛妄言倫案之愈急後遂絶百姓以安又曰順帝時廷尉河南吳雄字季高以明法律斷獄平起自孤寒致位司徒雄少時家貧喪母營人所在封土者擇葬其中喪事趣辨不問時日毉巫皆言當族滅而不頋及子訢孫恭三代廷鼠爲法名家又日宋均爲九江太守陵道縣有虞后二山人共祠之衆巫遂取百姓男女以為公嫗以男爲山公以女爲山嫗猶祭之尸主也歲歲改易旣而不敢嫁娶前後守令莫敢禁均乃下書日自今以後爲山娶者娶巫家勿擾良人於是遂絕又日安丘望之字仲都京兆長陵人少時學老子經恬靜不求進官號曰安丘丈人成帝聞欲見望之辭不肯見爲巫醫於人閒也獻帝起居注日李􅔸性喜鬼怪左道之術常有道人女巫繫下神祭六丁符劾厭勝之具無不爲又於朝廷省門外爲董卓作神坐數以牛羊祠之天子使左中郞將李國持節拜􅔸爲大司馬在三公之右􅔸自爲得鬼神之助乃厚賜諸巫東觀漢記曰高鳯年老執志不倦名聲著聞太守連召請恐不得免自言本巫家不應爲吏又日班超使西域于闐王廣德超至禮意甚踈其俗信巫言神怒何故向漢漢使有驪馬急求取以祠我廣德就超請馬超許之而令巫自來取馬有頃巫至超即斬其首送廣德因辭讓之呉志曰景帝有疾求視􅀑者得一人景帝欲試之乃殺鵝而埋之於中架小屋施床机以婦人紙履服物着其上乃使覡視之告日若能說此冢中鬼形狀者即信當厚賜加賞矣竟日盡夕無言帝問之急乃日實}
