  - {type: variant, offset: 8, length: 0, content: '', WYG: 泝江將入郢王在渚宫下見之懼而辭曰臣免於死又有讒言謂臣將逃臣歸死於司敗也王使為公尹又與子家謀殺穆王穆王聞之殺闘宜申及仲歸又曰晉侯夣大厲披髮及地搏膺而踊曰殺余孫不義余得請於帝矣壞大門及寢門而入公懼入於室又壞戸公覺召桑田巫巫言如夣公曰何如曰不食新矣六月丙午晉侯欲麥使甸人獻麥饋人為之召桑田巫示而殺之將食張如厠陷而卒又曰晉中行獻子將伐齊夣與厲公訟弗勝公以戈擊之首墜于前跪而戴之奉之以走見梗陽之巫臯他日見諸道與之言同巫曰今兹主必死若有事於東方則可逞獻子許諾晉伐齊又曰公在楚楚人使公親襚公患之穆叔曰祝殯而襚則布幣也乃使巫以桃茢先殯茢黍穰楚人弗禁既而悔之}
