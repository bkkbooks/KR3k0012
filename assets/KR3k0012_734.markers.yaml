  - {type: variant, offset: 1778, length: 219, content: 占風後漢書曰郎顗上書曰今月十七日戊午徵日也陽嘉二年正月日加申日在申時也風從寅來丑時而止丑寅申皆徵也不有火災必當為旱南方為徵故為火及旱也願陛下校計繕脩之費求念百姓之勞罷將作之官減彫文之飾損庖廚之饌退宴私之樂又曰任文公巴郡閬中人也閬中今隆川縣父文孫明曉天官風星秘要文公少脩父術州辟從事哀帝時有越嶲太守欲反剌史大懼遣文公等五從事檢行郡界潛伺虛實共止傳舍時暴風卒至文公遽起白諸從事促去當有逆變來害人者因起駕速驅諸從事未能自發郡果使兵殺之文公獨得免, SBCK: ''}
