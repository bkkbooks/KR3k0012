  - {type: variant, offset: 26, length: 3, content: 東井秦, WYG: 是女不好煩大巫嫗為入報河伯更求好女後日送之即使卒共抱女巫嫗投之河中有頃曰巫嫗何久也弟子趨之復以弟子一人投河中有頃曰弟子何久也復使一人趨之復投一弟子河中凡三弟子西門豹曰巫嫗弟子女也不能白事煩三老入白之復投三老河中西門豹簮筆聲罄折嚮河神立侍良久長老旁觀者皆為驚恐西門豹顧曰巫嫗三老不來還奈之何復使廷掾與豪長一人趨之皆叩頭且破額血流}
