  - {type: variant, offset: 192, length: 1, content: 郃, WYG: 矩屯滎陽劉聰遣從弟暢歩騎三萬討矩屯于韓王故壘時暢卒至城東未暇為備遣使奉牛酒詐降於暢暢大饗渠帥人皆醉飽矩謀夜襲之兵士以賊衆皆有懼色矩令郭誦禱鄭子産祠曰君昔相鄭惡鳥不鳴凶胡臭羯何得過庭使巫揚言東里有教當遣神兵相助將士聞之皆踊躍爭進又載記曰石虎太子􅃉保母劉芝初以巫術進既養􅃉有深寵通賄賂豫言論權傾朝廷親貴多出其門封芝為宜城君又曰李雄母羅氏死雄信巫覡之言多有忌諱至欲不塟其司空趙肅諫之宋書曰前廢帝子業好遊華林園竹林堂使婦人倮身相逐有一婦人不從命斬之後經少時夜夣遊後堂有一女子罵曰爾悖虐不道明年不及熟矣帝怒遂於宫中求得似所夣者戮之其夕復夣所戮女罵曰汝枉殺我以訴上帝至是巫云此堂有鬼帝日與隂山公主及六宫綵女凡數百人隨郡巫捕鬼屏除侍衛帝見自射之又曰王僧綽豫叅朝政兄徵懼其太盛勸令損抑僧綽乃求吳郡及廣州並不許㑹巫蠱事泄上先召僧綽具其言之又曰明帝選王儉尚陽羡公主拜駙馬都尉帝以儉嬌母武康主因太初蠱事不可以為婦姑欲開冡離塟儉因入自陳宻以死請故事不行齊書曰鬱林王在西州令女巫楊氏禱祝急求天位及文惠薨謂由楊氏之力倍加敬信呼楊姿宋氏已來人間有楊姿兒歌蓋此徵也武帝有疾又命楊氏日夜祈禱又曰明帝身有衣絳衣服飾皆赤以為厭勝巫覡云後湖水願經過宫内致帝有疾帝乃自至太官水溝左右啓太官無此則不立决意塞之欲南引淮流㑹崩事寢又曰東昏侯偏信蔣侯迎來入宫晝夜祈禱左右朱光尚詐云見神動輙諮啓並云降福遂加位國朱又為靈帝車服羽儀一依王者又曲信小祠日有十數巫師魔媪迎送紛紜光尚輙託云神意范雲謂光尚曰君是天子要人當思百全計光尚曰至尊不可諫止當託神鬼以達意耳後東入樂遊人馬忽驚以問光尚光尚曰先帝大瞑不許數出帝大怒拔刀與光尚尋覔既不見處乃縛菰以為人形比而斬之又曰諸暨東洿里屠氏女朱明病痼疾親戚相棄鄉里不容女移父母遠住紵舍晝採樵夜紡績以供養父母俱卒親營殯葬負土成墳忽空有聲云汝性可重山神欲相報使汝可為人療病必得大富女謂是魃魅弗敢從遂得病積時鄰舍人有溪蜮毒者女試療之自覺病便差遂以巫道為人療病無不愈家産日益鄉里多欲娶之女以無兄弟誓守墳墓不嫁又曰武陵王畢為祠部尚書巫覡或言曰畢有非常之相以此自負武帝聞之故無寵未常處方岳焉又曰王敬則母為女巫常謂人云敬則生時胞衣紫色後應得鳴鼓角人笑之曰汝子則為人吹角可矣後果封侯給鼓吹又曰袁君政}
