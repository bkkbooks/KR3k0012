  - {type: variant, offset: 2605, length: 1388, content: 日壬辰裔遂為郭默所害北齊書曰權會明風角玄象曾令家人遠行久而不反其行人還垂欲至宅乃逢寒雪寄息他舍會方處學堂講說忽有旋風瞥然吹雪入戶會乃笑曰行人至何意中停遂命使人令詣某處追尋果如語每為人占筮小大必中但用爻辭彖象以辨吉凶占雨後漢書曰任文公為侍中從事時天大旱白剌史曰五月一日當有大水其變己至不可防救宜令吏人豫為其備剌史不聽文公獨儲大船百姓惑聞頗有為防者到其日旱烈文公曰急促載使白剌史笑之日將中天北雲起須臾大雨至晡時湔水湧起十餘丈湔音子延反突壞廬舍所害數千人又曰高獲善天文曉遁甲能役使鬼神時郡境大旱太守鮑昱自往問何以致雨獲曰急罷三部督郵續漢書曰監屬縣有三部每部督郵書椽一人明府當自北出到三十里享雨可致也昱從之果得大雨又曰楊統善天文推步之術建初中為彭城令一州大旱統推陰陽消伏縣界蒙澤太守宗湛使統為郡求雨亦即陸澍望氣史記曰漢文十五年夏四月趙人新垣平以望氣見因說上設立渭陽五廟欲出周鼎當有玉英見瑞圖云玉英五常並脩則見漢書曰范增說羽曰沛公居山東時貪財好色今聞其入關珍物無所取婦女無所幸此其志不小吾使人望其氣皆為寵成五色此天子氣急擊之勿失又曰孝武鉤弋趙婕妤昭帝母也家在河閒武帝巡狩過河閒望氣者言此有奇女天子使召之既至女兩手皆拳上自披之手即時伸由是得幸號曰拳夫人進為婕妤居鉤弋宮生昭帝又曰宣帝武帝曾孫戾太子孫生數月遭巫蠱事雖在襁褓猶坐收繫郡邸獄而邴吉為廷尉監怜之無辜使女徒更乳養望氣者言長安獄中有天子氣上遣使者分條中都官獄繫者輕重皆殺之內謁者令郭穰夜至郡邸獄吉拒閉使者不得入賴吉得全後漢書曰光武紀云望氣者蘇伯阿為王莽使至南陽遙望見春陵郭唶曰唶歎也音子夜反氣佳哉鬱鬱葱葱然及始起兵還舂陵遠望舍南火光赫然屬天有頃不見晉書曰秦時望氣者云五百年後金陵有天子氣故始皇東巡狩以厭之改其地曰秣陵壍北山以絕其勢及孫權之稱號自謂當之考其曆數猶為未及元帝之渡江也乃五百二十六年真人應之在此矣又曰初吳之未滅也斗牛之閒有紫氣道術者皆以吳方強盛未可圖也唯張華以為不然及吳平之後紫氣愈明事見劍門中又曰陳訓字元道歷陽人也學天文筭曆陰陽占候無不畢綜尢善風角孫皓以為奉車都尉使其占候皓政嚴酷訓知其必敗而不敢言時錢塘湖開或言天下當太平青蓋入洛時皓以問訓訓曰臣止能望氣不能達湖之開塞退而告其友曰青蓋入洛將有輿櫬銜璧之事非吉祥也尋而吳亡及陳敏作亂弟宏為歷陽太守訓謂邑人曰陳家無王氣不久當滅宏聞將斬之訓鄉人泰璩為宏參軍乃說宏曰訓善風角可試之如不中徐斬未晚也乃赦之時宏攻征東參軍衡彥於歷陽乃問訓曰城中有幾千人攻之可拔不訓登牛渚山望氣曰不過五百人然不可攻之必敗宏復大怒曰何有五千人攻五百人而不得理令將士攻之果為彥所敗方信訓有道術乃優遇之宋紀曰齊宣帝墳塋在武進縣常有雲氣氤氳入天故元嘉中望氣者稱此地有天子氣後周書曰蔣昇字鳳起少善天文玄象之學太祖雅信待之常侍左右以備顧問大統三年東魏將竇泰入寇濟自風陵頓軍潼關太祖出師馬牧澤時西南有黃紫氣抱日從未至酉太祖謂昇曰此何祥也昇曰西南未地主土土王四季秦之分也今大軍既出喜氣下臨必有大慶於是進軍與竇泰戰擒之隋書曰韋鼎仕梁為太府卿至德初鼎質貨田宅寓居僧寺友人毛彪問其故荅曰江東王氣盡於此矣吾與爾當葬長安期運將及故破產耳陳武帝在南州鼎望氣知其當王遂寄孥焉因為陳武帝曰明年有大臣誅死後四歲梁其代終天之曆數當歸舜後昔周滅殷氏封媯滿于宛丘其裔子孫因為陳氏僕觀明公天縱神武繼絕統者無乃是乎武帝陰有圖僧辯意聞鼎言大喜因而定策, SBCK: ''}
