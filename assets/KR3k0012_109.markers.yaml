  - {type: variant, offset: 826, length: 2, content: 切諫, SBCK: 曰本興大義以救蒼生當湏先入咸陽號令天下遇小敵即班師將恐從義之徒一朝解體還守太原一城之地以爲賊耳何以自全髙祖不納促令引發太宗遂號泣於外聲聞帳中髙祖召問其故對曰今兵以義動戰則必尅退還則必散衆散於前敵乗於後死亡湏􅁷而至是以悲耳髙祖}
