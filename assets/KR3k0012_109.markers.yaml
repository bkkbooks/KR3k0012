  - {type: variant, offset: 4112, length: 0, content: '', WYG: 之夏四月癸夘誓師於幽州城南因大饗六軍以遣之癸亥李世勣攻葢牟城破之夏五月丁丑車駕渡遼東甲申上親率鐵騎與世勣命圍遼東城因烈風發火弩斯須城上屋樓皆焚麾戰士令登乃㧞之六月丙辰師次安市城丁巳髙䴡將髙延夀髙惠真帥兵五十萬來援安市以拒王師李世勣率兵奮擊上自髙峯引軍臨之髙䴡大潰殺獲不可勝紀延夀等以其衆來降因名所幸為駐蹕山刻石紀功焉賜天下大酺二日秋七月李世勣進軍攻安市城至九月不克乃班師冬十月丙辰入臨渝闗皇太子自定州迎謁戊午次漢武臺刻石以紀功徳十一月幸幽州癸酉大饗還師十二月幸并州二十年春正月上在并州遣大理卿孫伏伽黄門侍郎褚遂良等二十四人以六條巡察四方黜陟官吏庚辰曲赦并州宴從官及起義諸人賜帛給復有差三月車駕至京師六月遣兵部尚書固安公崔敦禮特進英國公李世勣擊破薛延陁於鬱督山北前後斬首五千餘級擄男女三萬餘人二十一年春正月詔以來年二月有事泰山甲寅賜京師酒酺三年八月詔以河北大水停封禪辛未骨利幹國遣使貢名馬二十三年二月辛酉大赦丁夘太宗以不豫勅皇太子於金液門聽政是月日赤無光夏四月己亥幸翠㣲宫五月乙巳上疾甚令草遺詔有頃崩於含風殿年五十二遺命令皇太子即位於柩前喪紀宜依}
