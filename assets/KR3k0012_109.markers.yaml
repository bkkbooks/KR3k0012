  - {type: variant, offset: 2663, length: 1029, content: 月甲寅加秦王益州道行臺尚書令秦王大破宋金剛於介州金剛與武周俱奔突厥遂平并州偽總管尉遟敬德尋相以介州降六月壬辰徙封楚王杜伏威為吳王賜姓李氏加授東南道行臺尚書令景午親錄囚徒七月壬戍命秦王率諸軍討王世充遣皇太子鎮蒲州以備突厥景申突厥殺劉武周於白道冬十月庚子懷戎賊帥高開道遣使降授蔚州揔管封北平郡王賜姓李氏四年五月己未秦王大破竇建德之眾於武牢擒建德河北悉平景寅王世充舉東都降河南平秋七月甲子秦王凱旋獻俘於太廟丁卯大赦天下廢五銖錢行開通元寶錢斬竇建德於市流王世充於蜀甲戍建德餘黨劉黑闥據漳南反置山東道行臺尚書省於洛州八月兗州總管徐圓朗舉兵反以應劉黑闥僣稱魯王冬十月乙丑加秦王天策上將軍位在王公上領司徒陜東道大行臺尚書令齊王元吉為司空乙巳趙郡王孝恭平荊州獲蕭銑五年春正月景申劉黑闥據洺州僣稱漢東王三月丁未秦王破劉黑闥于洺水上盡復所陷州縣黑闥亡奔突厥蔚州總管北平王高開道叛寇易州夏四月庚戌秦王還京師高祖迎勞於長樂宮壬申代州總管定襄郡王大恩為虜所敗戰死六月劉黑闥引突厥寇山東置諫議大夫官員秋七月隋漢陽太守馮盎以南越之地來降嶺表悉定八月辛亥以洺荊并幽交五州為大總管府改封恒山王承乾為中山王葬隋煬帝于楊州景辰突厥頡利寇鴈門己未進寇朔州遣皇太子及秦王討擊大敗之冬十月己酉遣齊王元吉擊劉黑闥於洺州時山東州縣多為黑闥所守所在殺長吏以應之行軍總管淮陽王道玄與黑闥戰于下愽道玄敗沒十一月甲申命皇太子率兵討劉黑闥景申幸宜州簡閱將士十二月景辰校獵於華池庚申至自宜州皇太子破劉黑闥於魏州斬之山東平六年春二月辛亥校獵於驪山三月乙未幸昆明池宴百官夏四月己未幸舊宅改為通義宮曲赦京城繫囚於是置酒高會賜從官帛各有差癸酉以尚書右僕射魏國公裴寂為左僕射中書令宋國公蕭瑀為右僕射秋七月突厥頡利寇朔州遣皇太子及秦王屯并州以備之八月壬子東南道行臺僕射輔公祏據丹陽反僣稱宋王遣趙郡王孝恭及嶺南道大使永康縣公李靖討之景寅吐谷渾內附九月景子突厥退皇太子班師七年二月丁已幸國子學親臨釋奠改大揔管府為大都督府三月戊寅廢尚書省六司侍郎增吏部郎中秩正四品掌選事戊戍趙郡王孝恭大破輔公祏擒之丹陽平夏四月庚子大赦天下頒行新律令以天下大定詔遭父母喪者聽終制五月造仁智宮於宜州之宜君縣李世勣討徐圓朗平之六月辛丑幸仁智宮秋七月巂音髓州地震山崩江水咽流八月戊辰突厥寇并州京師戒嚴壬午突厥退乙未京師解嚴八年夏六月甲子幸太和宮突厥寇定州命皇大子往幽州秦王往并州以備突厥八月并州道總管張公謹與突厥戰于大谷王師敗績中書令溫彥愽沒於賊九月突厥退冬十, SBCK: ''}
