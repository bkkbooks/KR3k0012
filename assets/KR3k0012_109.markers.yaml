  - {type: page-break, offset: 1973, content: '', id: KR3k0012_SBCK_109-5b}
  - {type: variant, offset: 1973, length: 0, content: '', WYG: 命囚之親出𤣥武門馳六騎幸渭水之上與頡利隔津而語責以負約俄而衆軍繼至頡利見軍容既盛又如思力就拘由是大懼遂請和詔許焉即日還宫乙酉又幸便橋與突利殺白馬設盟突厥引退九月丙戌頡利獻馬三千疋牛萬口帝不受令頡利歸所掠中國户口丁未引諸軍衛騎兵統將等習射於顯徳殿庭謂將軍以下曰自古突厥與中國更有盛衰若軒轅善用五兵即能北逐獯鬻周宣驅馳方邵亦能制勝太原至漢晉之君逮於隋代不使兵士素習干戈突厥來侵莫能抗禦致使中國生民塗炭於冦手我今不使汝等穿池築苑造諸淫費農民恣令逸樂兵士唯習弓馬庶使汝鬭戰亦望汝前無横敵於是毎日引數百人於殿前教習帝親自臨試射中者賞弓刀布帛自是後士卒皆}
