  - {type: variant, offset: 1195, length: 3, content: 劉弘基, WYG: 史大柰程䶧金秦叔寶宇文歆等揮幡而入直突出其陣後張我旗幟賊顧見之大潰追奔三十里生擒建徳於陣太宗數之曰我以干戈問罪本在王世充得失存亡不預汝事何故越境犯我兵鋒建徳股慄而言曰今若不來恐勞逺取乃將建徳至東都城下世充懼率其官屬二千餘人詣軍門請降山東悉平太宗入據宫城令蕭瑀竇軌等封守府庫一無所取令記室房𤣥齡收隋圖籍於是誅其同惡段逹等五十餘人大饗將士頒賜有差髙祖令尚書左僕射裴寂勞于軍中六月凱旋太宗親披金甲鐵馬一萬騎甲士三萬人前後部鼔吹俘二偽主及隋氏器物輦輅獻於太廟髙祖大恱行飲至禮以享焉髙祖以自古舊官不稱殊功乃别表徽號用旌勲徳十月加號天䇿上將軍陜東道大行臺位在王公上增邑二萬户通前三萬户賜金輅一乘衮冕之服玉璧一雙黄金六十斤前後部鼔吹及九部之樂班劍四十人于時海内漸平太宗銳意經籍開文學館以待四方之士行臺司勲郎中杜如晦等十有八人為學士毎更直閣下降以溫顏與之討論經義或夜分而罷八年加中書令九年皇太子建成齊王元吉謀害太宗六月太宗率}
