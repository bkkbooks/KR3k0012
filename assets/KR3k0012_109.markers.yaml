  - {type: variant, offset: 4137, length: 0, content: '', krp: 星十九日而退夏四月皇太子承乾有罪廢爲庻人景戍立晉王治爲皇太子大赦賜酺三日巳丑加司徒長孫無忌太子太師司空房玄齡太子太傅特進蕭瑀太子太保兵部尚書李勣爲太子詹事仍同中書門下三品庚寅上親謁太廟以謝承乾之過五月乙丑手詔舉孝廉茂才異能之士十八年十一月命太子詹事英國公李勣爲遼東道行軍揔管出栁城禮部尚書江夏郡王道宗副之刑部尚書鄖國公張亮爲平壤道行軍揔管以舟師出萊州左領軍常何瀘州都督左難當副之發天下甲士召募十萬並趣平壤以伐髙麗十九年春二月庚戍上親統六軍發洛陽乙夘詔皇太子留定州監國髙士廉攝太子太傳與侍中劉洎中書令馬周太子少詹事張行成太子右庻子髙季輔五人同掌機務以吏部尚書安德郡公楊師道爲中書令贈殷比干爲太師謚曰忠烈命所司封墓葺祠堂春秋祀以少牢上自爲文以祭之三月壬辰上發定州以司徒長孫無忌中書令岑文本楊師道從夏四月癸夘誓師於幽州城南大饗六軍以遣之癸亥李丗勣攻盖牟城破之五月丁丑車駕渡遼東甲申上親率鐵騎與丗勣㑹圍遼東城因烈風發火弩斯湏城上屋及樓皆盡麾戰士令登乃拔之六月景辰師次安市城丁巳髙麗別將髙延壽髙恵真帥兵十五萬來援安市以拒王師李丗勣率兵奮擊上自髙峯引軍臨之髙麗大潰殺獲不可勝紀延壽等以其衆降因名所幸爲駐蹕山刻石紀功焉賜天下大酺二日秋七月李世勣進軍攻安市城至九月不尅乃班師冬十月景辰入臨渝關皇太子自定州迎謁戊午次漢武臺刻石以紀功德十一月幸幽州癸酉大饗還師十二月幸并州二十年春正月上在并州遣大理卿孫伏伽黄門侍郎禇遂良等二十二人以六條廵察四方黜陟官吏庚辰曲赦并州宴從官及起義元從賜帛給復有差三月車駕至京師六月遣兵部尚書固安公崔敦禮特進英國公李世勣擊破薛延陁於鬱督山北前後斬首五千餘級虜男女三萬餘人二十一年正月詔以來年二月有事泰山甲寅賜京師酺三日八月詔以河北大水停封禪辛未骨利幹國遣使貢名馬二十三年三月辛酉大赦丁夘太宗以不䂊勑皇太子於金液門聽政是月日赤無光夏四月巳亥幸翠微宫五月巳巳上疾甚令草遺詔有頃崩於含風}
