  - {type: variant, offset: 932, length: 1, content: 驍, WYG: 將段達率萬餘人自後而至度三王陵發伏擊之段達大敗追奔至於城下因於宜陽新安置熊榖二州戍之而還徙封趙國公髙祖受禪拜尚書令左武}
  - {type: page-break, offset: 932, content: '', id: KR3k0012_WYG_109-4b, image: WYG0894/WYG0894-0037b.png}
  - {type: variant, offset: 937, length: 0, content: '', WYG: 進封秦王加授雍州牧三年七月總率諸將攻王世充於洛邑師次榖州世充率精兵三萬陣於慈澗太宗以輕騎挑之時衆寡不敵陷於重圍左右咸懼太宗命左右先歸獨留後殿世充驍將軍雄信數百騎夾道來逼交鎗競進太宗㡬為所敗太宗遣行軍總管左右射之無不應弦而倒獲其大將燕頎世充乃拔慈澗之鎮歸于東都太宗遣行軍總管史萬寶自冝陽南據龍門劉徳威自太行東圍河内郡王君廓自洛口斷賊粮道又遣黄君漢夜從孝水河中下舟師襲回洛城克之黄河已南莫不響應城堡相次來降大軍進屯邙山九月太宗以五百騎先觀戰地卒與世充萬餘人相遇㑹戰復破之斬首三千餘級獲大將陳智世充僅以身免其總管楊慶遣使詣降李世勣率師出轘轅道安撫其衆滎汴洧豫九州相繼來降世充遂求救於竇建徳四年二月又進屯青城宫營壘未立世充率衆二萬自方諸門臨榖水而陣太宗以精騎陣於北邙山令}
