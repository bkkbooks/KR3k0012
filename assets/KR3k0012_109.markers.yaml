  - {type: variant, offset: 834, length: 1, content: 父, SBCK: 生不出戰乃將數􅀐先詣其城下舉鞭指麾􅀂將圍城者以激怒之老生果怒開門出兵背城而陣髙祖與建成合陣於城東太宗及柴紹陣於城南老生麾兵疾進先薄髙祖而建成墜馬老生乗之髙祖與建成軍咸却太宗自南原率二􅀐馳下峻坂衝斷其軍引兵奮擊賊衆大敗各捨仗而走懸門發老生引繩欲上遂斬之平霍邑至河東􅀜中豪傑争走赴義太宗請進師入􅀜取永豐倉以賑窮乏収群盗以圖京師髙祖稱善太宗以前軍濟河先定㴘北三輔吏民及諸豪猾}
  - {type: variant, offset: 834, length: 1, content: 父, WYG: 生不出戰乃將數騎先語其城下舉鞭指麾若將圍城者以激怒之老生果怒開門出兵背城而陣髙祖與建成合陣於城東太宗及柴紹陣於城南老生麾兵疾進先薄髙祖建成墜馬老生乘之髙祖與建成軍咸却太宗自南原率二騎馳下峻坂衝斷其軍引兵奮擊賊衆大敗各捨仗而走懸門發老生引繩欲上遂斬之平霍邑至河東闗中豪傑争走赴義太宗請進師入闗取永豐倉以賑窮乏收羣盗以圖京師髙祖稱善太宗以前軍濟河先定渭北三輔吏民及諸豪傑}
