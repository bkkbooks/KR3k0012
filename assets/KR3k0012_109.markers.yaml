  - {type: variant, offset: 1594, length: 1, content: 郡, SBCK: 腹背受敵恐非萬全請退師榖州以觀之太宗曰世充糧盡内外離心我當不勞攻擊坐收其弊建德新破孟海公將驕卒惰吾當進據武牢扼其􅁭要賊􅀂冒險與我爭鋒破之必矣如其不戰旬月間世充當自潰􅀂不速進賊入武牢諸城新附必不能守二賊併力將􅀂之何通又請解圍就險以就其變太宗不許於是留通輔齊王元􅁻以圍世充親率歩􅀐三千五百人趣武牢建德自滎陽西上築壘於板渚太宗屯武牢相持二十餘日謀者曰建德伺官軍芻盡俟牧馬於河北因將襲武牢太宗知其謀遂牧馬於河北以誘之詰朝建德果悉衆而至陳兵汜水世充將郭士衡陣於其南綿亘數里鼓譟諸將大懼太宗將數􅀐升髙丘以望之謂諸將曰賊起山東未見大敵今度險而囂是無政令逼城而陣有輕我心我按兵不出彼廼氣衰陣乆卒饑必將自退追而擊之無往不尅吾與公等約必以午時後破之建德列陣自辰至午兵士饑倦皆坐列又争飲水逡廵欲退太宗曰可撃親率輕􅀐誘之衆繼至建德廻師而陣未及整列太宗先登擊之所向皆靡俄而衆軍合戰囂塵四起太宗率史大奈程䶧金秦叔寳宇文歆等􅆞幡而入直突出其陣後張我旗幟賊顧見之大潰追奔三十里生擒建徳於陣太宗數之曰我以于戈問罪本在王世充得失存亡不預汝事何故越境犯我兵鋒建德股慄而言曰今􅀂不來恐勞逺取乃將建德至東都城下世充懼率其官屬二千餘人詣軍門請}
