  - {type: variant, offset: 931, length: 0, content: '', WYG: 収納英俊以備僚列逺近聞者咸自托焉師次於涇陽勝兵九萬破猾賊劉鷂子以并其衆留殷開山劉𢎞基屯長安故城太宗自趣司竹賊帥李仲文何潘仁向志善等皆來㑹頓於阿城獲兵十三萬長安父老賫牛酒詣轅門者不可勝紀勞而遣之一無所受軍令嚴肅秋毫無犯尋與大軍平京城髙祖輔政授唐國内史改封秦國公㑹薛舉以勁卒萬人來逼渭濵太宗親撃之大破其衆追斬萬餘級畧地至于隴坻義寕元年十二月復為右元帥總兵十萬徇東都及將旋謂左右曰賊見吾還必相追躡設三伏以待之俄而}
