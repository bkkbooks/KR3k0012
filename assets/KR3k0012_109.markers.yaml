  - {type: variant, offset: 4134, length: 2, content: 垂拱, SBCK: 曰他人之言或有靣䛕公等朕之故人實以告朕即日政教於百姓何如人間得無疾苦耶皆奏即日四海太平百姓歡樂陛下力也臣等餘年日惜一日但眷戀聖化不知疾苦因固請過并州上謂曰飛鳥過故郷猶躑躅徘􅆦况朕於太原起義兵定天下復少小遊觀誠所不忘岱禮􅀂畢或兾與公等相見於是賜物各有差六月戊申詔天下諸州舉學綜古今及孝悌淳篤文章秀異者並以來年二月揔集㤗山巳酉有星孛于太微犯郎位景辰停封㤗山避正殿以思咎命尚食减膳秋七月甲戍孛星滅十六年冬十一月景辰狩于岐山辛酉使􅀕隋文帝陵丁夘宴武功士女於慶善宫南門酒酣上與父老等涕泣論舊事老人等遞起爲舞争上千萬歳壽上各盡一柸庚午至自岐州十二月癸夘幸温湯甲辰狩于驪山時隂寒晦􅁳圍兵斷絶上乗髙望見之欲捨其罰恐􅃜軍令乃廻鑾轡入谷以避之十七年正月戊申詔圖􅀞司徒趙國公無忌等勲臣二十四人於凌煙閣三月丁巳熒惑守心}
