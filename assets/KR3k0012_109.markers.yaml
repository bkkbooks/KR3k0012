  - {type: variant, offset: 4104, length: 0, content: '', WYG: 寅𦵏髙祖于獻陵十三年春正月乙巳朔謁獻陵曲赦三原縣及行免縣人租四月戊寅幸九成宫甲申阿史那結社爾犯御營伏誅壬寅雲陽石燃者方丈晝如灰夜則有光投草木上則焚厯年而止十二月壬辰狩於咸陽是嵗滁州言野蠶食槲音斛葉成繭大如柰其色綠色收六千五百七十石髙䴡新羅西突厥吐火羅康國安國波斯踈勒于闐焉耆髙䴡新昌林邑昆明及荒服蠻首相次遣使朝貢十五年詔以來年二月有事泰山所司詳定儀制五月壬申并州僧道及老人等抗表以太原王業所因明年登封以後願時臨幸上於武城殿賜宴因從容謂侍臣曰朕少在太原喜羣聚博戯暑徃寒逝將三十年矣時㑹中有舊識上者相與道舊以為笑樂因謂之曰他人之言或有靣諛公等朕之故人實以告朕即日政教於百姓何如人間得無疾苦耶皆奏即日四海太平百姓歡樂陛下之力也臣等餘年日惜一日但眷戀聖化不知疾苦因固請過并州上謂曰飛鳥過故鄉猶躑躅徘徊朕於太原起義兵定天下復少小逰戯誠所不忘岱禮若畢或冀與公等相見於是賜物各有差六月戊申詔天下諸州舉學博古今及孝悌淳篤文章秀異者並以來年二月總集太山己酉有星孛於太㣲犯郎位丙辰停封泰山避正殿以思命尚食減膳秋七月甲戌孛星滅十六年冬十一月丙辰狩于岐山辛酉使祭隋文帝陵丁夘宴武功士女於慶善宫南門酒酣上與父老等涕泣論舊事父老人等逓起為舞争上千萬嵗夀上各盡一巵庚午至自岐州十一月癸夘幸温湯甲寅狩於驪山時隂塞晦𡨕兵圍斷絶上乘髙望見之欲捨其罰恐虧軍令乃迴轡入谷避之十七年正月戊申詔圖畫司徒趙國公無忌等勲臣二十四人於凌煙閣三月丁巳熒惑守心前星十九日而退夏四月皇太}
