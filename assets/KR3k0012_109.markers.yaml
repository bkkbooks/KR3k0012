  - {type: variant, offset: 405, length: 153, content: 猜忌人懷疑懼會有詔徵高祖詣行在所遇疾未謁時甥王氏在後宮帝問曰汝舅何遟王氏以疾對帝曰可得死不高祖聞之益懼因縱酒沉湎納賄以混其跡焉十一年煬帝幸汾陽宮命高祖往山西河東黜陟討捕師次龍門賊帥母端兒帥眾數千薄于城下高祖從十餘騎擊之所射七十發皆應弦而倒賊乃大潰十三年為太原留守郡丞王威武牙部將高君雅為副將群賊蜂起江都阻絕, SBCK: 圍}
