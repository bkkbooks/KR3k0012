  - {type: variant, offset: 838, length: 253, content: 曰余為霍山神使謁唐皇帝曰八月雨止路出霍邑東南吾當濟師高祖曰此神不欺趙無卹豈負我哉八月辛巳高祖引師趨霍邑斬宋老生平霍邑景戍進下臨汾郡及綘郡癸巳至龍門突厥始畢可汗遣康稍利率兵與劉文靜會于麾下隋驍衛大將軍屈突通鎮河東津梁斷絕關中向義者頗以為阻於是水濱居人競進舟楫不謀而至者前後數百人九月壬寅馮翊賊帥孫華土門賊帥白玄度各率其眾送款并具舟楫以待義師高祖令華與統軍王長諧劉弘基引兵渡河屈突通遣其武牙郎將桑顯和率兵數千夜襲長諧義師不利太宗以遊騎數百掩其後顯和潰散義軍復振景辰馮翊太守蕭造以郡來降戊午高祖親率眾圍河東屈突通, SBCK: 請}
