  - {type: variant, offset: 4111, length: 0, content: '', WYG: 舉孝廉茂才異能之士十八年十二月命太子詹事英國公李勣為遼東行軍總管出栁城禮部尚書江夏郡王道宗副之刑部尚書鄖國公張亮為平壤道行軍總管以舟師出萊州左領軍常河瀘州都督左難副之約天下甲士召募十萬並趣平壤以伐髙䴡十九年春二月庚戌上親統六軍發至于洛陽乙夘詔皇太子留定州監國髙士㢘攝太子太傅與侍中劉洎中書令馬周太子少詹事張行成太子右庶子髙季輔五人同掌機務以吏部尚書安徳郡公楊師道為中書令贈殷比干為太師諡曰忠烈命所司封墓葺祠堂春秋祀以少牢上自為文以祭之春三月壬辰上發自定州以司徒長孫無忌中書令岑文本楊師道}
