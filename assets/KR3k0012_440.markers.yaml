  - {type: variant, offset: 969, length: 0, content: '', SBCK: 汝姑貞義仰天而歎以刀刎頸而死太守以大夫葬之號曰貞義皇甫謐列女傳曰漢中趙嵩妻者同郡張氏之女也字禮脩遭賊嵩死君難理脩以碧塗靣亂髪稱病懷刀在身意氣列决賊不迫也叔父矜其年少又世方喪亂欲更嫁禮脩慷􅁣以死爲誓又曰丹陽羅静者廣德羅勤之女爲同縣朱曠所婚禮未成勤遇疫疾喪没鄰比齗絶曠觸冒經營㝷復病亡静感其義遂誓不嫁與弟妹共居求者過十餘志無傾移有楊祚者多將人衆自徃納幣静乃逃竄祚刼其弟妹静懼爲祚所害乃出見之曰實感朱曠爲妾父而死是以託身亡者自誓不貳辛苦之人願君哀而舎之如其不然請守之以死祚乃舎之静守純固年六十餘卒又曰蜀景竒妻者羅氏之女字貢羅竒亡無嗣貢羅專心供養父青以許同郡宰詩貢羅與父母書陳其情志暦年不歸後青使詩白州告縣發遣貢羅乃由徑道詣州自訴言意慷􅁣請死不從州嘉而許焉貢羅恐詩於道路迫脅乃請吏兵自衛還家執義終身又曰犍爲相登妻者周氏之女名度適登一年而寡牢令呉厚因人問度心執匪石引刀截髮縣長吏復遣媒欲娉度曰前巳斷髮謂足表心何誤復有斯言哉取刀欲割鼻左右救止表其閭又曰廣漢馮季宰妻者季氏之女名珥字進娥早寡無嗣奉飬繼姑及宰兄顯守心純固以義自防珥母愍其姑苦隂有所許珥斷髮自明遂乞飬男女各一率道有法郷人稱}
