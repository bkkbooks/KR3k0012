  - {type: variant, offset: 1550, length: 741, content: 曰后若自殺禍及卿宗桓以言告楊氏楊氏曰大人本賣女與氐以圖富貴一之以甚可復使女辱于二氐乎桓不能強乃自殺後魏書曰經州貞女仙氏許嫁彭老生為妻幣娉既畢未成禮率行貞淑君貧常自汲以養父母老生輒往逼之女曰與君禮命雖畢二門多故未相見何由不稟父母擅見陵辱若茍行非禮正可身死耳遂不肯從老生怒而刺殺之取其衣服女尚能言臨死謂老生曰先身何罪與君相遇我所以執節自固者寧更有所邀政欲奉給君耳今反為君所殺若魂靈有知自當知報言終而絕老生持女衣服珠瓔至其叔宅以告叔叔曰此是汝婦奈何殺之天不祐汝遂執送官太和七年有司劾以死罪詔曰老生不仁侵陵貞淑原其強暴便可誅戮而女守禮履節沒身不移雖處草萊行合古跡宜賜美名以顯風操其摽墓旌善號曰貞女又曰勃海封卓妻彭城劉氏女也成婚一夕卓官於京師後以事伏法劉氏在家忽然夢想知卓已死哀泣不輟諸嫂喻之不止經旬凶問果至遂憤歎而死時人比之秦嘉妻中書令高允念其義高而名不著為之詩又曰平原鄃縣女子孫男王夫為零縣民所殺追執讎人男王欲自殺之其弟止而不聽男王曰女人出適以夫為天當親自復雪云何假人之手遂以杖敺殺有司處死以聞顯祖詔曰男王重節輕身以義犯法緣情定罪理可原其特恕之隋書曰楊慶王世充以兄女妻之署滎州刺史及世充將敗慶欲將其妻同歸長安其妻乃告之曰國家以妾奉箕箒於公者欲以申厚意結公心耳今叔父窮迫家國將危而公不顧婚姻孤負付囑為全家之計非妾所能責公也妾若至長安則公家一婢耳何用妾為願得送還君之惠也慶不許其妻遂沐浴靚粧飲藥而死慶遂歸大唐為宜州刺史又曰元務光母者范陽盧氏女也少好讀書造次以禮盛年寡居諸子幼弱家貧不能就學盧氏每親自教授勗以義方世以此稱之仁壽末漢王諒舉兵反遣將綦良往山東略地良以務光為記室及良敗慈州刺史上官政薄務光之家見盧氏悅而逼之盧氏以死自誓政為人凶悍怒甚以燭燒其身盧氏執志彌固竟不屈節又曰孝女王舜者趙郡王子, SBCK: 始}
