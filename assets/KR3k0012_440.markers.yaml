  - {type: variant, offset: 145, length: 166, content: 共伯蚤死其妻守義父母欲奪而嫁之誓而弗許故作是詩以絕之也汎彼柏舟在彼中河髧彼兩髦實唯我儀之死矢靡它母也天只不諒人只禮記曰文伯之喪敬姜據其床而不哭曰昔者吾有斯子也吾以為將為賢人也吾未嘗以就公室今及其死也朋友諸臣未有出涕者而內人皆行哭失聲斯子也必多曠於禮矣夫穀梁傳曰宋災伯姬卒傳曰取卒之日加之災上者見以災卒也其見以災卒奈何伯姬之舍失火左右, SBCK: 胥}
