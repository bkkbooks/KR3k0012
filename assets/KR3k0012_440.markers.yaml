  - {type: variant, offset: 5, length: 0, content: '', krp: 一}
  - {type: variant, offset: 7, length: 0, content: '', SBCK: 中唐書曰魏衡妻王氏梓州郪人也武德􅀄薛仁果舊將旁企地侵掠梁部因獲王氏逼而妻之後企地漸強盛衡謀以城應賊企地領衆將趍梁州未至數里飲酒醉卧王氏取其佩刀斬之携其首入城賊衆乃散髙祖大恱封爲崇義大夫人又曰絳州孝女衛氏字無忌夏縣人也􅀄其父爲郷人衛長則所殺無忌時年六歳母又改嫁更無弟兄及長常思復讎無忌從伯嘗設宴爲樂長則時亦預坐無忌以􅅮擊殺之旣而詣吏稱父讎旣報請就刑戮廵察大使黃門侍郎禇遂良以聞太宗嘉其孝烈特令免罪又曰鄒侍徴妻薄氏待徴大暦中爲嘗州山隂縣尉其妻爲海賊所掠薄氏守節出待徴官告於懷中託付村人使謂待徴曰義不受辱乃投江而死賊退潮落待徴於江岸得妻屍焉江左文士多著節婦文以紀之又曰奉天縣竇昇朝二女伯娘仲娘雖長於村野而㓜有志操住與邠州接界永泰中草賊數千人持兵刄入其村落行剽刼聞二女有容色姉年十九妹年十六藏於巖窟間賊徒擬爲逼辱乃先曵伯娘出行數十歩又曵仲娘出賊相顧自慰行臨深谷伯娘曰我豈受賊汚辱乃􅄬之於谷賊方驚駭仲娘又􅄬於谷谷深數百尺姉㝷卒仲娘脚折靣破血流􅀍體氣絶良乆而蘇賊義而去又曰崔玄暐􅀶陵安平人也父行謹爲胡􅂫令夲名畢以字下體有則天祖諱乃改爲玄暐少有學行深爲叔父秘書􅁥行功所器重龍朔中舉明經累􅀘庫部貟外郎其母盧氏嘗誡之曰吾見姨兄屯田郎中辛玄馭云兒子從官者有人來云貧乏能有立此是好消息􅀂聞貲貨充足衣馬輕肥此是惡消息吾嘗重此言以爲確論比見親表中仕官者多將錢物}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_440-1b}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_440-2a}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 中唐書曰魏衡妻王氏梓州鄴人也武徳初薛仁杲舊将旁企地侵掠梁部因獲王氏逼而妻之後企地漸强盛衡謀以城應賊企地領衆将赴梁州未至數里飲酒醉卧王氏取其佩刀斬之攜其首入城賊衆乃散髙祖大悦封為崇義大夫人又曰絳州孝女衛氏字無忌夏縣人也初其父為鄉人衛長則所殺無忌時年六嵗母又改嫁更無弟兄及長常思復讎無忌從伯嘗設宴為樂長則時亦預坐無忌以摶擊殺之既而詣吏稱父讎既報請就刑戮廵察大使黄門侍郎禇遂良以聞太宗嘉其孝烈特令免罪又曰鄒待徴妻薄氏待徴大歴中為常州山隂縣尉其妻為海賊所掠薄氏守節出待徴官告於懐中託付村人使謂待徴曰義不受辱乃投江而死賊退潮落待徴於江岸得妻屍焉江左文士多著節婦文以紀之又曰奉天縣竇朝二女伯娘仲娘雖長於村野而㓜有志操住與邠州接界永泰中草冦數千人持兵刃入其村落行剽刼聞二女有容色姊年十九妹年十六藏於􅑐窟間賊徒擬為逼辱乃先曳伯娘出行數十步又曳仲娘出賊相顧自慰行臨深谷伯娘曰我豈受賊汚辱乃投之於谷賊方驚駭仲娘又投於谷谷深數百丈姊尋卒仲娘脚折面破流血被體氣絶良乆而蘇賊義而去又曰崔元暐博陵安平人也父行謹為姑蘇令本名韋以字下體有則天祖諱乃改為元晦少有學行深為叔父秘書監行功所器重龍朔中舉明經累補庫部員外郎其母詹氏嘗誡之曰吾見姊兄屯田郎中辛元馭六兒子從官者有人來言貧乏能自立此是好消息若聞貲貨充足衣馬輕肥此是惡消息吾常重此言以為確論比見親表中仕宦者多将錢物}
