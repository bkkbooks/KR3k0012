  - {type: variant, offset: 990, length: 286, content: 年十餘歲為邦邑所宗既歸鄭氏為九族可重休前妻女少孤父希臨終庶子沉生是時漢未大亂希命棄之曰奈何使舅愛之至不存活乎寧割肌膚之恩以存顧援之命養沉乃前女力不兼舉九年之中三不舉子梁書曰王僧辨母貞敬太夫人夫人姓魏氏僧辨父神念以天監初董率徒眾據東關退保合肥漅胡西因娶以為室生僧辨性甚安和善於綏接家門內外莫不懷之初僧辨下獄夫人流淚徒行將謝罪世祖不與相見時貞惠世子有寵於世祖軍國大事多問焉夫人往詣閤自陳無訓涕泗嗚咽眾並憐之及僧辨免出夫人深相責勵辭色俱嚴云人之事君唯須忠烈非但保祐當世亦乃慶流子孫及僧辨剋復舊京功蓋天下夫人恒自謙損不以富貴驕物朝野咸共稱之謂為明哲婦人也崔鴻前秦錄曰符登妻毛氏毛與, SBCK: ''}
