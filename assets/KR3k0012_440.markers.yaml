  - {type: variant, offset: 2708, length: 504, content: 有二女及兒婦三人皆有美色柳氏謂之曰我輩逢禍亂汝父已死我自念不能全汝我門風有素義不受辱於群賊我將與汝等同死如何其女等皆垂泣曰唯母所命柳氏自投于井其女及婦相繼而下皆重死於井中又曰趙元揩妻者清河崔氏之女也父儦在文學傳家有素範子女皆遵禮度元揩父為僕射家富於財重其門望厚禮以娉之元揩甚敬崔氏雖在宴私不妄言笑進止容服動合禮儀化及之反也元揩隨至河北將歸長安至滏口遇盜攻掠元揩僅以身免崔氏為賊所拘賊請以為妻崔氏謂賊曰我士大夫女為僕射子妻今日破亡自可即死遣為賊婦終必不能群賊毀裂其衣形體悉露縛於簀床之上將凌辱詐之曰人力已屈當聽處分不敢相違請解縛賊遽釋之妻因著衣取賊佩刀倚樹而立曰欲殺我任加刀鋸若欲覔死任來相逼賊大怒亂射殺元揩後得殺妻者支解之以祭崔氏之柩又曰鍾士雄母者臨賀蔣氏女也士雄仕陳為伏波將軍陳主以士雄嶺南酋帥慮其反覆每質蔣氏於都下及晉王平江南以士雄在嶺表欲以恩義致之遣蔣氏歸臨賀既而同郡虞子茂鍾文華等作亂舉兵攻城遣人召士雄士雄將應之蔣氏謂士雄曰我前在楊都備嘗辛苦今逢聖化母子藂集沒身不能上報烏得為逆哉汝若禽獸其心背德忘義者我當自殺於汝前士雄於是遂止蔣氏復為書與子茂等諭以禍福子茂不從尋為官軍所敗上聞蔣氏甚異之封為安樂縣君, SBCK: ''}
