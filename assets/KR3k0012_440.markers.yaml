  - {type: variant, offset: 769, length: 155, content: 為逆胡所汙遂見害何法盛晉中興書曰張茂初起義討賊陳武一郡用全中宗初鎮召為掾屬中興累遷至太子右衛率出為吳國內史為沈充所殺茂妻陸氏散家財合義軍助國討充詣闕上書理茂忠節詔書褒歎追贈太僕卿鄧粲晉紀曰前始興太守尹虞起兵於巴陵日號監軍以討杜弢連戰稍勝遂進長沙為弢所沒初敗略虞二女皆國色也將妻之女不肯曰我父二千石終不為賊作婦有, SBCK: 畏}
