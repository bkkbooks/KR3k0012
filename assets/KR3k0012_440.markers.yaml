  - {type: variant, offset: 8, length: 2, content: 毛詩, SBCK: 其父母但知喜恱竟不問此從何而來必是禄俸餘資誡以善事如其非理所得此與盗賊何别縱無大咎獨不内媿於心孟母不受魚鮓之饋盖爲此也汝今坐食禄俸榮幸巳多􅀂其不能忠清何以戴天履地孔子云雖日用三牲之飬猶爲不孝又}
  - {type: variant, offset: 8, length: 2, content: 毛詩, WYG: 其父母但知喜悦竟不問此從何而來是必禄俸餘資誠為善事如其非理所得與盜賊何别縱無大咎獨不内愧於心陶母不受魚鮓之饋蓋為此也汝今坐食禄榮幸已多若其不能忠清何以戴天履地孔子云雖日用三牲之養猶為不孝又}
