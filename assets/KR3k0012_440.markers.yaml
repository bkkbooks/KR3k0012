  - {type: variant, offset: 21, length: 8, content: 道被于南國美化行, SBCK: 事願先就死執刄者斷其臂詞氣不撓雖􅇯捍圜視無不傷歎其夕蕭氏亦卒趙畢呉越春秋曰子胥至呉乞食至於溧陽溧陽有女子澣紗瀬水之上筥中有少飯子胥遇見長跪而請之曰夫人豈可乞一飡}
