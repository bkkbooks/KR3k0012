  - {type: variant, offset: 945, length: 1, content: 隴, WYG: 伏地大哭仰白今上曰妾聞女不再醮男以義烈聞妾夫已死理無獨生乞就辟有司地下以事舅姑且婦人再聘明公亦安用哉遂號哭不止上曰貞婦也任之自殺又曰魯陽侯王廣字廣之為}
  - {type: page-break, offset: 945, content: '', id: KR3k0012_WYG_440-5a, image: WYG0897/WYG0897-0063c.png}
  - {type: variant, offset: 945, length: 1, content: 隴, krp: 伏地大哭仰白今上曰妾聞女不再醮男以義烈聞妾夫巳死理無獨生乞就辟有司地下以事舅姑且婦人再娉明公亦安用哉遂號哭不止上曰貞婦也其任之亦自殺又曰魯陽侯王廣字廣之爲}
  - {type: variant, offset: 947, length: 0, content: '', WYG: 揚州刺史晋末聚衆避世為蠻楊芳扇動山夷圍廣城䧟蠻因廣将詣芳廣女有羙色芳引入甚有寵入經一旬王伺芳睡引刀斬芳芳驚起曰何故反也王罵曰蠻畜我欲誅反賊何等謂我反乎吾聞父仇不同天母仇不同地汝反逆無状害}
  - {type: page-break, offset: 947, content: '', id: KR3k0012_WYG_440-5b, image: WYG0897/WYG0897-0063d.png}
  - {type: variant, offset: 947, length: 0, content: '', krp: 揚州刺史晉末聚衆避丗爲蠻梅芳扇動山夷圍廣城䧟蠻囚廣將詣芳廣女有美色芳引入甚有寵入經一旬王伺芳睡引刀斬芳芳驚起曰何故反耶王罵曰蠻畜我欲誅反賊何等謂我反乎吾聞父仇不同天母仇不同地汝反逆無狀害我父母而復無禮凌}
  - {type: variant, offset: 948, length: 3, content: 也劉曜, SBCK: ''}
  - {type: variant, offset: 948, length: 0, content: '', WYG: 父母而復無禮凌人吾所以不死者欲誅與耳今死自吾分不待汝殺我但恨不得梟汝首於通逵以塞大耻辭氣猛厲色無變容乃自殺時年十五劉義慶幽明録曰武昌陽新縣北山上望夫石状若人立者傳云昔有貞婦其夫從役逺赴國難婦携弱子餞送此山立望而死形化為石列女傳曰息夫人者息君之夫人伐息破之虜其君使守門将其夫人而納之於宫楚王出遊夫人遂出見息君謂之曰人生要一死而已何苦乃作詩曰榖則異室死則同穴謂予不信有如皎日息君止之夫人不聽遂自殺息君亦自殺又曰安定陳仲妻者同郡張叔明之妹名芝字季張年十四適仲朞年而寡執節不嫁叔明從軍芝與二嫂没賊恐見侵掠而相謂曰婦人以不汚身為髙不虧節為美豈可委身待辱哉於是自刺二嫂既死芝獨不死叔明言於将軍耿弇耿弇以駿馬負芝芝曰女死亡之餘汚将軍服乘不可}
  - {type: page-break, offset: 948, content: '', id: KR3k0012_WYG_440-6a, image: WYG0897/WYG0897-0064a.png}
  - {type: page-break, offset: 948, content: '', id: KR3k0012_WYG_440-6b, image: WYG0897/WYG0897-0064b.png}
  - {type: variant, offset: 948, length: 0, content: '', krp: 吾所以不死者欲誅汝耳今死自吾分不待汝殺我但恨不得梟汝首於通逵以塞大耻辭氣猛厲色無變容乃自殺時年十五劉義慶幽明録曰武昌陽新縣北山上有望夫石狀若人立者傳云昔有貞婦其夫從役逺赴國難婦携弱子餞送此山立望而死形化爲石列女傳曰息夫人者息君之夫人伐息破之虜其君使守門將其夫人而納之於宫楚王出遊夫人遂出見息君謂之曰人生要一死而巳何自苦乃作詩曰糓則異室死則同穴謂予不信有如皎日息君止之夫人不聽遂自殺息君亦自殺又曰安定陳仲妻者同郡張叔明之妹名芝字李張年十四適仲朞年而寡執節不嫁叔明從軍芝與二嫂没賊恐見侵略而相謂曰婦人以不汙身爲髙不虧節爲美豈可委身待辱哉於是自刺二嫂旣死芝獨不死叔明言於將軍耿弇耿弇以駙馬負芝芝曰女子亡之餘汙將軍服乗不可}
  - {type: punctuation, offset: 949, content: 。, id: KR3k0012_CHANT_440-bkkpn281}
  - {type: 'tls:seg', offset: 949, content: '', id: KR3k0012_CHANT_440-13a.5}
  - {type: variant, offset: 949, length: 0, content: '', WYG: 弇竒其言更以他馬負芝至營為致醫藥因乃得全郡表其閭九十壽終又曰譙國曹文叔妻者同郡夏侯文寜之女字令女文叔早死無子䘮畢㫁髪自誓不二後其家欲嫁之又截兩耳依文叔從兄爽爽後被誅文寜上書與曹絶婚復欲嫁之乃割鼻其母謂曰曹氏夷滅已盡守此欲為誰乎令女曰仁者不以盛衰改節義者不以存亡易心曹氏前盛尚欲保終况今衰滅何忍棄之太傅宣王聞而嘉嘆聽乞子為曹氏後又曰吳孫竒妻者廣陵范慎女名姬十八配竒一年而竒亡慎以姬少寡無子起還其家姬不肯歸迎者以父命廹之姬遂操刀割耳及鼻曰父迎我者不過以我年少色美今已殘矣行将焉之於是迎者空反又曰丹陽華穆妻者下邳}
  - {type: page-break, offset: 949, content: '', id: KR3k0012_WYG_440-7a, image: WYG0897/WYG0897-0064c.png}
  - {type: variant, offset: 949, length: 0, content: '', krp: 弇竒其言更以他馬負芝至營爲致醫藥因乃得全郡表其閭九十壽終又曰譙國曹文叔妻者同郡夏侯文寜之女字令女文叔早死無子喪畢斷髪自誓不貳其後家欲嫁之又截兩耳依文叔從兄爽爽後𬒳誅文寜上書與曹氏絶婚復欲嫁之乃割鼻其母謂曰曹氏夷滅巳盡守此欲爲譙乎令女曰仁者不以盛衰改節義者不以存亡易心曹氏前盛尚欲保終况今衰滅何忍棄之太傅司馬公聞而嘉嘆聽乞子爲曹氏後又曰呉孫竒妻者廣陵范慎女名姬十八配竒一年而竒亡慎以姬少寡無子起還其家姬不肯歸迎者以父命迫之姬遂操刀割耳及鼻曰父迎我者不過以我年少色美今巳殘矣行將焉之於是迎者空反又曰丹陽華穆妻者下邳}
  - {type: variant, offset: 950, length: 1, content: 曜, WYG: 方之女字桃樹生一男而早亡吳丁諝相與反知名之士家将嫁許焉桃樹聞之乃操刀割耳其子又亡桃樹安身守正動必以禮又曰吳沉伯陽妻者顧文宣之女字昭君早寡無嗣盡禮供飬其父隂許人姑聞知而哭昭君乃引刀剪髪割兩耳以明其志又曰吳許升妻吕氏之女名榮升遊誕博戯不治操行榮躬勤家業以飬其姑勸升學問未嘗不垂淚而言榮父疾升呼榮}
  - {type: page-break, offset: 950, content: '', id: KR3k0012_WYG_440-7b, image: WYG0897/WYG0897-0064d.png}
