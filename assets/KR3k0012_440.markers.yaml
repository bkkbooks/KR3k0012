  - {type: variant, offset: 318, length: 2, content: 伯姬, SBCK: 吾聞父仇不同天母仇不同地汝反逆無狀害我父母而復無禮凌人吾所以不死者欲誅汝耳今死自吾分不待汝殺我但恨不得梟汝首於通逵以塞大耻辭氣猛厲色無變容乃自殺時年十五劉義慶幽明録曰武昌陽新縣北山上有望夫石狀􅀂人立者傳云昔有貞婦其夫從役逺赴國難婦携弱子餞送此山立望而死形化爲石列女傳曰息夫人者息君之夫人伐息破之虜其君使守門將其夫人而納之於宫楚王出遊夫人遂出見息君謂之曰人生要一死而巳何自苦乃作詩曰􅂖則異室死則同穴謂予不信有如皎日息君止之夫人不聽遂自殺息君亦自殺又曰安定陳仲妻者同郡張叔明之妹名芝字李張年十四􅃴仲朞年而寡執節不嫁叔明從軍芝與二嫂没賊恐見侵略而相謂}
