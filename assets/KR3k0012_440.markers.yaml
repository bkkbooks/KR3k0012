  - {type: variant, offset: 315, length: 0, content: '', SBCK: 飯有何嫌乎女知非恒人言曰妾豈可逆人情乎即發其簞飯清其壷漿長跪而與子胥子胥去顧見女子自沉孔演漢魏春秋曰龐濟外祖父酒泉趙君安爲同縣李壽所殺濟舅兄弟三人同時病死壽家喜相賀濟母娥自傷讎不報乃推車䄂劔白日刺壽於都亭前訖徐詣縣顔色不變曰父讎巳報請受戮禄福長尹嘉解印綬縱娥娥不肯去遂強載還㑹赦得免州郡莫不嗟歎嘉其烈義刋石以表其閭張勃呉録曰呉入郢也自王以下位班處宮而妻其室次及伯嬴伯嬴者昭王之母也伯嬴操刄曰公侯一國之儀表也有失則其􅀖危亂夫婦之禮人倫之始王教之端􅀂君王棄儀表則無以臨民妾犯非禮則無以自存貪生受辱固不如死王乃止和苞漢趙記曰今上殺晉散􅀐常侍梁緯召妻辛氏伏地大􅂘仰白今上曰妾聞女不再醮男以義烈聞妾夫巳死理無獨生乞就辟有司地下以事舅姑且婦人再娉明公亦安用哉遂號哭不止上曰貞婦也其任之亦自殺又曰魯陽侯王廣字廣之爲西揚州刺史晉末聚衆}
  - {type: page-break, offset: 315, content: '', id: KR3k0012_SBCK_440-3a}
  - {type: page-break, offset: 315, content: '', id: KR3k0012_SBCK_440-3b}
  - {type: variant, offset: 315, length: 2, content: 避火, WYG: 飯有何嫌}
  - {type: variant, offset: 315, length: 2, content: 避火, krp: 飯有何嫌}
  - {type: variant, offset: 316, length: 1, content: 火, SBCK: 丗爲蠻梅芳扇動山夷圍廣城䧟蠻囚廣將詣芳廣女有美色芳引入甚有寵入經一旬王伺芳睡引刀斬芳芳驚起曰何故反耶王罵曰蠻畜我欲誅反賊何等謂我反}
