  - {type: variant, offset: 16, length: 0, content: '', SBCK: 害而赦公主主視琮受禍爲賊曰妾李氏女也義不獨存願與于公并命賊不許公主入室自經而死又曰幽州兵亂殺判官韋雍雍妻蕭氏聞難號呼專執夫􅃑左右格去以死不從}
