  - {type: variant, offset: 2746, length: 0, content: '', SBCK: 君根夲也臣枝葉也根夲不善枝葉茂者未聞也有道之丗以人與國無道之丗以國與人以賢人而與之國堯舜是也以國與人桀紂與湯武是也說苑曰晉平公問於師曠曰人君之道奈何師曠曰人君清静無爲務在於􅀶愛趣在任賢開耳目以察萬方不溷溺於俗不拘繫於左右廓然逺見倬然獨立屢省考績以臨臣下此人君之操也平公曰善新序曰趙襄子問於}
