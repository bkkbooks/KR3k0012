  - {type: variant, offset: 70, length: 1, content: 壞, SBCK: 主有治主有存主有衰主有危主有亡主體正性仁心明志固動以爲人不以爲巳是謂王主克巳恕躬好問力行動以從義不以從情是謂治主勤居守業不敢荒怠動以先公不以先私是謂存主情義交争公私並行一得一失不純道度是謂衰主情過其義私多於公制度踰限政令失常是謂危主親用邪䜛放逐忠賢縱情追欲不顧禮度岀入游放不拘儀禁賞賜行禮以越公用忿怒施罰以踰治理遂非文過知而不改忠言壅塞直諌誅戮是謂亡主故王主能致興平治主能脩其政存主能保其國衰主遭無難則庶幾得全茍有難則殆矣危主遭無難則幸而免有難則亡亡主者必亡而巳矣白虎通曰君者群也群下之所歸心管仲曰地之生財有時民之用力有倦而人君之欲無窮以有時與有倦養無窮之君而度量不生於其間則上下相疾也鄧析書曰君有三累臣有四責何謂三累親所信一累也以名取士二累也近故䟽親三累也何謂四責受重賞而無功一責也居大位而不治二責也爲理而不平三責也御軍陳而奔背四責也君無三累臣無四責可謂安國家也又曰爲君者當􅀂冬日之陽夏至之隂萬物歸之莫之使也偃卧而功自成優㳺而政自治又曰爲君者滅形匿影群下無私掩目塞耳萬民恐震循名責實案法立成是謂明主孟子曰君視臣如手足臣視君如腹心君視臣如犬馬臣視君如國人君視臣如土芥臣視君如㓂讎孫卿子曰君舟也庻人水也水能行舟亦能覆舟又曰君者義也義正則君正君者盤也水者民也盤方則水方盤貟則水貟君者源也水者流也源清則流清源濁則流濁鬼谷子曰事聖君有聽從無諌争事中君有諌諍無謟䛕事􅁀君有􅀘削無矯拂又曰君得名則群臣恃之君失名則群臣欺之尸子曰}
