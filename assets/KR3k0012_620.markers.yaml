  - {type: variant, offset: 614, length: 2128, content: 永嘉之後寇竊競興其建國立家雖傳名號憲章禮樂寂滅無聞劉𥙿平姚泓收其圖籍五經子史纔四千卷皆赤軸赤紙文字古拙並歸江左宋祕書丞王儉依劉氏七略撰為七志梁人阮孝緒亦為七錄總其書數三萬餘卷及侯景渡江攻破梁室秘省經籍雖從兵火其文德殿內書及公私典籍重本七萬餘卷悉送荊州及周師入郢繹悉焚之於外城所收十纔一二此則書之五厄也後魏爰自幽方遷宅伊洛日不暇給經籍闕如周氏創基關右戎車未息保定之始書止八千後加收集方盈萬卷高氏據有山東初亦採訪驗其本目殘闕猶多及東夏初平獲其經史四部重雜三萬餘卷所益舊書五千而已今御書單本合一萬五千餘卷部帙之間仍有殘缺比梁之舊目正有其半至於陰陽河洛之篇醫方圖譜之說彌復為少臣以經書自仲尼迄今數遭五厄興集之期屬膺聖代今祕籍見書亦足披覽但一時載籍須令大備不可王府所無私家乃有若猥發明詔兼開購賞則異典必致觀閣斯積上納之於是下詔獻書一卷賚縑一匹一二年間篇籍稍備乃揔加編次召天下工書之士京兆韋霈南陽杜頵等於祕書內補續殘缺為正副二本藏於宮中其餘以實祕書內外之閣凡二萬餘卷煬帝即位祕閣之書分為三品於東都觀文殿東西廂屋以貯之東屋藏甲乙西屋藏丙丁後唐史曰都官郎中庾傳美充三川搜訪圖籍使傳美偽蜀王衍之書舊寮家在成都便於歸計且言成都具有本朝實錄及傳美使廻所得纔九朝而已其餘殘缺雜書蓋不足紀借書西京雜記曰匡衡勤學邑人大姓又不識字家富多書乃與客作不求其價主人怪而問之衡曰願得主人書遍讀之主感歎給以書後成大儒後漢書曰王充師事扶風班彪好博覽而不守章句家貧無書常遊洛陽市肆閱賣書一見輒能誦憶遂博通眾流百家之言蜀志曰李權從秦宓借戰國策宓曰成湯大聖覩野漁而有獵逐之失定公賢者受女樂而棄朝事道家法曰不見可欲使心不亂是故君子先以懿文德也博物志曰蔡邕有書萬卷漢末年載數車與王粲亡後相國掾魏諷謀反粲子預焉既被誅邕所與粲書悉入粲族子業王隱晉書曰齊王攸好學不倦借人書皆治護時以還之又曰皇甫謐表從武帝借書上送一車與之謐羸病手不釋卷歷觀古今無不皆綜先賢傳曰延篤從唐溪李度受左氏欲寫傳本無紙乃借本誦及篤辭歸李度曰卿欲寫本何故辭歸荅曰已誦之矣齊張率傳曰時陸少玄家有父澄書萬餘卷率與少玄善遂通書籍盡讀其書陳書曰孔奐字休文山陰人好學經史百家莫不通涉沛國劉顯時稱學府每共奐討論深相歎乃執奐手曰昔伯喈墳素悉與仲宣吾當希彼蔡君足下無愧王氏所保書籍尋以相付後魏書曰崔亮家貧傭書自業時隴西李冲當朝任事亮從兄光往依之謂亮曰安能久事筆硯而不往託李氏也彼家饒書因可得學亮曰弟妹飢寒豈可獨飽自可觀書於市安能看人眉睫乎後周書曰梁蔡文寶字敬仁嘗以書干僕射徐勉大為勉所賞異乃令與其子遊處所有墳籍盡以給之遂博覽群書學無不綜北齊書曰劉晝少負笈從師伏膺無勌恨下里少墳籍便杖策入都知太府少卿宗正世良多書乃造焉世良納之恣意披覽晝夜不倦隋書曰盧思道字子行聰爽俊辯就魏收借異書數年之間才學兼著唐書曰裴行儉初以門蔭補弘文生累年在館唯閉戶讀書館司將加薦舉固辭左僕射房玄齡問其故對曰遭隋季亂離私門書籍蕩盡冀在館披閱有所成耳又曰中書令李敬玄亳州譙人也博覽群書特善三禮初上在東宮馬周啟薦之召入崇賢館兼預侍讀仍借御書讀之又曰陽城字元宗北平人也代為官族家貧不能得書乃求為集賢寫書吏竊官書讀之晝夜不出房經六年乃無所不通賜書後漢書曰東平王蒼傳明帝賜蒼以祕書列圖道術祕方又曰王景永平二年議修汴渠乃引見問景以理水景陳其利害應對敏捷帝善之乃賜景山海經河渠書禹貢圖又曰章帝賜黃香淮南孟子各一本又曰班彪字叔皮幼與從兄嗣共遊太學家有賜書內足於財好古之士自遠方來齊春秋曰蕭晉字元卿蘭陵人家有賜書志學不倦也陳書曰江揔字揔持幼篤學有詞采家傳賜書數千卷總尋讀未嘗釋手也唐書曰垂拱三年新羅王金政明遣使請禮記一部并新文章令所司寫吉凶禮禮并於文館詞林掎其詞涉規誡者勒成五十卷賜之又曰開元十九年命有司寫毛詩禮記左傳文選各一部以賜金城公主從其請也寫書王子年拾遺記曰張儀蘇秦二人同志剪髮以相活或傭力寫書行遇聖人之文無題記則以墨畫於掌內及股裏夜還更折竹寫之抱朴子自敘曰葛洪字稚川丹陽句容人也生為二親所驕饒累遭火典籍蕩盡伐薪賣之給筆夜以寫書家貧乏紙所寫皆反覆有字人少能讀者桓譚新論曰余同時佐郎官有梁子初楊子林好學所寫萬卷至於白首嘗有所不曉百許寄余余觀其事皆略可見蕭子顯齊書曰隱士沈驎士火燒書數千卷驎士年過八十耳目猶聰明乃手寫細書復成三二年卷滿數十篋後魏書曰穆子容少好學無所不覽求天下書逢即寫錄所得萬餘卷三國典略曰郎基字世業中山新市人魯郡太守智之孫也泛涉墳籍清慎無所營求嘗語人云任官之所木枕亦不須作況重於此乎唯頗令人寫書樊子蓋曾遺之書曰在官寫書亦是風流罪過基荅曰觀過知仁斯亦可矣梁書曰袁峻字孝高早孤志篤好學家貧無書從假借必皆抄寫自課日五十紙紙數不登則不止後周書曰裴漢借人異書必躬自錄本至於疾疹彌年亦未嘗釋卷載書史記曰蘇秦說秦王書十上而說不行去秦而歸負書擔橐形容枯槁續漢書曰李固為三公子躬步以驢負書從師墨子曰墨子南使衛載書甚多強唐子見而怪之對曰昔周公曰朝讀書夕見七十二士相天下猶如此吾安敢廢此也晉書曰張華無餘財唯文史溢几篋徙居載書三十車也焚書史記曰秦始皇二十二年令天下敢有藏詩書百家語者悉詣守尉燒之下三十日不燒黥為城旦所不禁醫藥卜筮種樹之書耳風俗通曰董卓盪覆王室天子西移所載書七十車遇雨道難分半投棄即於處燒燔麋為灰穢, WYG: ''}
