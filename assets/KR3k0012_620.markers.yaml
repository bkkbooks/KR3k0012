  - {type: variant, offset: 1993, length: 433, content: 各一本又曰班彪字叔皮幼與從兄嗣共遊太學家有賜書內足於財好古之士自遠方來齊春秋曰蕭晉字元卿蘭陵人家有賜書志學不倦也陳書曰江揔字揔持幼篤學有詞采家傳賜書數千卷總尋讀未嘗釋手也唐書曰垂拱三年新羅王金政明遣使請禮記一部并新文章令所司寫吉凶禮禮并於文館詞林掎其詞涉規誡者勒成五十卷賜之又曰開元十九年命有司寫毛詩禮記左傳文選各一部以賜金城公主從其請也寫書王子年拾遺記曰張儀蘇秦二人同志剪髮以相活或傭力寫書行遇聖人之文無題記則以墨畫於掌內及股裏夜還更折竹寫之抱朴子自敘曰葛洪字稚川丹陽句容人也生為二親所驕饒累遭火典籍蕩盡伐薪賣之給筆夜以寫書家貧乏紙所寫皆反覆有字人少能讀者桓譚新論曰余同時佐郎官有梁子初楊子林好學所寫萬卷至於白首嘗有所不曉百許寄余余觀其事皆略可見蕭子顯齊書曰隱士沈驎士火燒書數千卷驎士年過八十耳目猶聰明乃手寫細書復成三二年卷滿數十篋後魏書曰穆子容少好學無所不覽求天下書逢即寫錄所得萬餘卷三國典略曰郎基字世業中山新市人魯郡太守智之孫也泛涉墳籍清慎無所營求嘗語人云任官, SBCK: ''}
