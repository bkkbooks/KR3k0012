  - {type: variant, offset: 1878, length: 6, content: 代為官族家貧, SBCK: 自上丗以來天下亡國多矣而君道不廢者天下利之也又曰齊桓公染於管仲鮑叔晉文染於舅犯郭偃荆莊王染於孫叔敖沈尹承呉闔閭染於伍貟文之義越句踐染於范蠡大夫種此五君者所染當故覇諸侯范􅁻射染於張栁朔王生中行寅染於籍秦髙強呉夫差染於王孫雄太宰嚭智伯瑶染於智國張武申尚染於魏義偃長宋康王染於唐鞅田不禮此六君者所染不當故國皆殘亡身或死辱爲君非爲君而因榮也非爲君而安也以爲行理也又曰先王用非其有如已之有通乎君道者也君者處虚素服而無智故能使衆智也無能故能使衆能也能執無爲故能使衆爲也無智無能無爲此君之所執又曰鄭君問於􅀍瞻曰聞先生之義不死君信有之乎􅀍瞻對曰有之夫言}
