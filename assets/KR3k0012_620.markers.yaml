  - {type: variant, offset: 1080, length: 297, content: 都官郎中庾傳美充三川搜訪圖籍使傳美偽蜀王衍之書舊寮家在成都便於歸計且言成都具有本朝實錄及傳美使廻所得纔九朝而已其餘殘缺雜書蓋不足紀借書西京雜記曰匡衡勤學邑人大姓又不識字家富多書乃與客作不求其價主人怪而問之衡曰願得主人書遍讀之主感歎給以書後成大儒後漢書曰王充師事扶風班彪好博覽而不守章句家貧無書常遊洛陽市肆閱賣書一見輒能誦憶遂博通眾流百家之言蜀志曰李權從秦宓借戰國策宓曰成湯大聖覩野漁而有獵逐之失定公賢者受女樂而棄朝事道家法曰不見可欲使心不亂是故君子先以懿文德也博物志曰蔡邕有書萬卷漢末年載數車與王粲亡後相國掾魏諷謀反粲子預焉既被誅邕所與粲書悉入粲族子業王隱晉書曰齊王攸好學不倦借人書皆治護時以還, SBCK: 商汝知}
