  - {type: variant, offset: 344, length: 735, content: 以大聖之才開素王之業憲章祖述制禮刊詩正五始而條春秋闡十翼而弘易道及秦皇馭㝢吞滅諸侯先王墳籍掃地皆盡此則書之一厄也漢興建藏書之策置校書之官至孝成之代遣謁者陳農求遺書於天下詔劉向父子讎校篇籍漢之典文於斯為及王莽之末並從焚燼此則書之二厄也光武嗣興尤重經誥未及下車先求文雅至肅宗親臨講肆和帝數幸書林其蘭臺石室鴻都東觀祕牒填委更倍於前及孝獻移都吏人擾亂圖書縑帛皆取為帷囊所收而西裁七十餘乘屬西京大亂一時燔蕩此則書之三厄也魏文代漢更集經典祕書郎鄭默刪定舊文時之論者美其朱紫有別晉氏承之文籍尤廣晉祕書監荀勗定魏內經更著新簿屬劉石憑陵從而失墜此則書之四厄也永嘉之後寇竊競興其建國立家雖傳名號憲章禮樂寂滅無聞劉𥙿平姚泓收其圖籍五經子史纔四千卷皆赤軸赤紙文字古拙並歸江左宋祕書丞王儉依劉氏七略撰為七志梁人阮孝緒亦為七錄總其書數三萬餘卷及侯景渡江攻破梁室秘省經籍雖從兵火其文德殿內書及公私典籍重本七萬餘卷悉送荊州及周師入郢繹悉焚之於外城所收十纔一二此則書之五厄也後魏爰自幽方遷宅伊洛日不暇給經籍闕如周氏創基關右戎車未息保定之始書止八千後加收集方盈萬卷高氏據有山東初亦採訪驗其本目殘闕猶多及東夏初平獲其經史四部重雜三萬餘卷所益舊書五千而已今御書單本合一萬五千餘卷部帙之間仍有殘缺比梁之舊目正有其半至於陰陽河洛之篇醫方圖譜之說彌復為少臣以經書自仲尼迄今數遭五厄興集之期屬膺聖代今祕籍見書亦足披覽但一時載籍須令大備不可王府所無私家乃有若猥發明詔兼開購賞則異典必致觀閣斯積上納之於是下詔獻書一卷賚縑一匹一二年間篇籍稍備乃揔加編次召天下工書之士京兆韋霈南陽杜頵等於祕書內補續殘缺為正副二本藏於宮中其餘以實祕書內外之閣凡二萬餘卷煬帝即位祕閣之書分為三品於東都觀文殿東西廂屋以貯之東屋藏甲乙西屋藏丙丁後唐史, SBCK: ''}
