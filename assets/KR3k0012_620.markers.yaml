  - {type: variant, offset: 1869, length: 1, content: 陽, SBCK: 君者仁義以治之愛利以安之忠信以道之務除其災致其福故人之於上也􅀂璽之於塗也抑之以方則方以圎則圎􅀂五種之地必應其􅀋而蕃息百倍此五帝三王之所以無敵也又曰古之王者其所爲少其所爲少因者君術也爲者臣道也爲則擾矣因則静矣因冬爲寒因夏爲暑君奚事焉故曰君道無爲又曰昔太古甞無君其民聚生群處知母不知父無親戚兄弟夫妻男女之別無上下長㓜之道無進退揖讓之禮無衣服履帶宫室畜積之便無器械舟車}
