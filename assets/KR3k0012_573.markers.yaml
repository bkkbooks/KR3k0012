  - {type: variant, offset: 2401, length: 2, content: 巴東, SBCK: 丁督護其聲哀切後人因爲曲焉懊惱歌崇安􅀄人間訛謡之曲又云石崇爲緑珠作古有􅁝布澁難縫一曲而巳宋太祖謂之中朝曲也太平御覽卷第五百七十}
