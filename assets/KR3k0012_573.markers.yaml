  - {type: variant, offset: 324, length: 199, content: 其妻世說曰王曇孫年十四五便歌諸妓向謝公稱歎王郎能歌謝公甚欲聞之而王既名家年少無由得聞諸妓又具向王說謝公意後出東府土山上作伎王時作兩丸髻著袴褶騎馬住土山下庾家墓林中作一曲歌于時秋月王因舉頭看北林卒曲便去土山上妓白謝公曰此是王郎歌也說苑曰襄成君始封之日衣翠衣帶玉劍履蹻舄立乎流水上楚大夫莊辛過而說之曰臣願把君之手其可乎襄成君忿然作色而不言莊辛遷延而稱曰君獨不聞夫鄂君方乘青翰之舟張翠蓋會鍾鼓之音越人擁楫, SBCK: 左顧宛頸}
