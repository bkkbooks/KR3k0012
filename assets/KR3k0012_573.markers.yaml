  - {type: variant, offset: 236, length: 1, content: 並, SBCK: 莫愁莫愁者女子也樂府詩云莫愁在何處莫愁石城西艇子打兩催送莫愁來善歌者必先調其氣氤氲自臍間發至喉乃憶其詞即分抗墜之音旣得其術即可致遏雲響谷之妙也又曰大暦􅀄有才人張紅者夲與父唱歌丐於衢路因過將軍韋青所居在昭囯坊南門也青於看街䆫中聞其歌喉寥亮仍有美色即納爲􅁎其父亦舎於後户優給之乃自傳其藝頴悟絶倫甞有樂工自撰一曲即古曲長命西河女也加减其節奏頗有新聲未進間先印可於青青潜令紅於屏風後聽之紅乃以小豆數合以記其節拍樂工歌罷青因入問紅何如紅曰巳唱得矣青出給云某有女弟子乆曽唱非新曲也即令隔屏唱之一聲不失樂工大驚異遂請相見歎伏不巳兼云此曲先有一聲不稳今巳正矣尋逹上聽翌日召入冝春院寵澤隆異宫中号爲記曲娘子尋爲才人一日内史奏韋青卒上告紅紅乃於上前嗚呼奏云妾夲風塵丐者一旦老父死有所歸致身入内皆自韋青妾不忍忘其恩因一慟而絶上嘉歎乆之即贈昭儀又曰韋青夲士人也甞自爲詩云三代掌綸誥一身能唱歌青官至金吾將軍明皇􅄂録曰唐玄宗自巴蜀廻因夜䦨登勤政樓慿欄南望烟月滿目上因自歌曰庭前琪樹巳堪攀塞外征人殊未還盖盧思道之詞也歌歇上問有舊人乎逮明爲我訪來翌日力士潜求於里中因召與同至則果梨園弟子也其夜上復與乗月登樓左右唯力士及貴妃}
  - {type: page-break, offset: 236, content: '', id: KR3k0012_SBCK_573-3b}
  - {type: variant, offset: 236, length: 1, content: 並, WYG: 歿後千載曠其人至永新始繼其能遇髙秋朗月臺殿清虛喉囀一聲響傳九陌明皇嘗獨召李謨吹笛逐其歌曲終管裂其妙如此一日賜大脯於勤政樓觀者數十萬衆諠譁聚語莫得聞魚龍百戲之音上怒欲罷宴髙力士奏請永新出樓歌一曲必可止喧上從之永新乃撩鬢舉袂直奏慢聲至是廣塲寂寂若無一人噫者聞之血湧愁者聞之腸絶自漁陽之亂六宫星散永新為一士人所得韋青避地廣陵因月夜憑欄於小河上忽聞舟中唱水調者曰此永新故歌也乃登舟省之因與永新對泣久之青始晦其事後士人卒與其母之京師終於狹斜間又曰古之能歌者即有韓娥李延年莫愁莫愁者女子也樂府詩云莫愁在何處莫愁石城西船子打兩槳催送莫愁來善歌者必先調其氣氤氲自臍間發至喉乃噎其詞即分抗墜之音既得其術即可致遏雲響谷之妙也又曰大厯初有才人張紅者本與父唱歌丐於衢路因過将軍韋青所居在昭國坊南門也青於看街忩中聞其歌喉嘹亮仍有美色即納為姬其父亦舎於後户優給之乃自得其藝頴悟絶倫常有樂工自撰一曲即古曲長命西河女也加减其節奏頗有新聲未進間先印可於青青潛令紅於屏風後聴之紅乃以小豆數合以記其節拍樂工歌罷青因入問紅何如紅曰巳唱得矣青出紿云某有女子弟久曽唱非新曲也即令隔屏唱之一聲不失樂工大驚異遂請相見歎伏不已且云此曲先有一聲不穩今已正矣尋逹上聴翌日召入宜春院寵澤隆異宫中號為記曲娘子尋為才人一日内使奏韋青卒上告紅紅乃於上前嗚咽奏云妾本風塵丐者一旦老父死有所歸致身入内皆自韋青妾不忍忘其恩一慟而絶上嘉歎之久之即贈昭儀韋青者本士人也嘗自為詩云三代掌綸誥一身能唱歌青官至金吾将軍明皇雜録曰唐𤣥宗自蜀回夜闌登勤政樓憑欄南望煙雲滿目上因自歌曰庭前琪樹已堪攀塞外征夫久未還葢慮思道之詞也歌歇上問有舊人乎逮明為我訪來翌日力士潛求於里中因召與同至則果梨園子弟也其夜上復與乗月登樓左右唯力士及貴妃}
