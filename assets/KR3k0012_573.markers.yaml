  - {type: variant, offset: 1358, length: 657, content: 征長安大延賓客怒瑀不與言使就伎入列瑀善解音能鼓琴撫絃而歌曰弈弈天門開大魏應期運青蓋巡九州在東西人怨士為知己死女為悅者玩恩義茍潛暢他人焉能亂為曲既捷音聲殊妙太祖大悅淮南子曰歌採菱發陽阿鄙人聽之不若延露陵陽非歌拙也聽各異也又曰甯戚欲干齊桓公困窮無以自達為商旅將任車任載也毛詩曰我任我輦也以商於齊暮宿於郭門之外桓公郊迎客夜開門甯戚飯牛車下望見桓公而悲擊牛角而疾商歌歌曰南山粲白石爛短褐單衣長止骭生不逢堯與舜禪終日飼牛至夜半長夜漫漫何時旦桓公聞之撫其僕之手曰異哉歌者非常人也命後車載之又曰易道良馬使人欲馳飲酒而樂使人欲歌燕丹子曰荊軻入秦不擇日而發太子與知謀者皆素衣冠送之於易水之上荊軻起為壽歌曰風蕭蕭兮易水寒壯士一去兮不復還高漸離擊筑宋意和之孟子曰有孺子歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足孔子曰小子聽之哉韓子曰宋玉築武宮謳倡行者心歡築者不倦王召賜之對曰臣師射瞀之謳賢於臣召使之謳行者不止築者甚倦王怪問對曰王試度其功美四板射瞀八板甚堅美五寸射瞀二寸列子曰林類年且百歲拾遺穗於故畦並歌進孔子適衛望之於野顧謂弟子曰彼可與言者試往評之子貢請行逆之壠端面而歌曰先生曾不悔乎行歌拾穗林類行不留歌不輟逸士傳曰堯時有八九十老人擊壤而歌曰日出而作日入而息鑿井而飲耕田而食帝何力於我哉列女傳曰魯陶嬰妻者夫死守志不二作歌詩曰悲夫黃鵠之早寡七年不雙宛勁獨宿不與眾同夜半悲鳴想其故雄天命早寡獨宿何傷寡婦念此泣下數行鳴呼悲哉死者不可忘飛鳴尚然況於貞良雖有賢雄終不可重行韋昭洞曆記日紂無道比干知極諫必死作秣馬金闕之歌西京雜記曰高帝令戚夫人, SBCK: ''}
