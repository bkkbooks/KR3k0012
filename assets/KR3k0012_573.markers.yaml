  - {type: variant, offset: 2135, length: 182, content: 其形歌聲繞梁三匝乃上旁梁草樹枝葉皆動歌之感也張華博物志曰薛談學謳於秦青未窮青之技而辭歸青錢於郊乃撫節悲歌聲振林木響遏行雲談乃謝求返歸辛氏三秦記曰隴右西開其阪九迴不知高幾里欲上者七日越高處可容百餘家下處數十萬戶上有清水四注流下俗歌曰隴頭流水鳴聲幽噎遙望秦川心肝斷絕黃閞武陵記曰有綠羅山側岩垂水懸蘿百里許得明月池碧潭鏡澈百尺見厎素岸若雪松如插翠流風叩阿有絲桐之韻土人為, SBCK: 珉}
