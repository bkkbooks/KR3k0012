  - {type: variant, offset: 700, length: 0, content: '', WYG: 及梁元帝纂要八闋葛天氏之歌而見吕氏春秋也唐歌帝嚳之歌南風卿雲並虞舜歌漢歌曲有大風髙祖所作芝房白麟朱鴈交門天馬房中已上並武帝歌見漢書也盛唐縱陽武帝歌見漢人内傳古樂府有歌行艶歌行長歌行短歌行魏武帝作朝歌行怨歌行前緩聲歌行後緩聲歌行櫂歌行鞠歌行放歌行蔡歌行陳歌行又古今樂録晉宋已後歌曲有淫豫歌楊叛兒歌南齊有楊賢母為師入官童謡呼為楊婆兒婆轉為反扶風歌晉列琨作百年歌晉王道中陸機並作白日歌宋沈攸之所作亦}
