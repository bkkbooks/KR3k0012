  - {type: page-break, offset: 2401, content: '', id: KR3k0012_WYG_573-10b, image: WYG0898/WYG0898-0272d.png}
  - {type: variant, offset: 2401, length: 2, content: 巴東, krp: 丁督護其聲哀切後人因爲曲焉懊惱歌崇安𥘉人間訛謡之曲又云石崇爲緑珠作古有絲布澁難縫一曲而巳宋太祖謂之中朝曲也太平御覽卷第五百七十}
  - {type: variant, offset: 2404, length: 312, content: 峽猨鳴悲猨鳴三聲淚沾衣鄭緝之東陽記曰歌山在吳寧縣故老相傳雲昔有乘舡從下過見一女子汲乃登此山負水行歌甚妍而莫之所由故名歌山劉欣期交州記曰俗好鼓琴收豎於野澤乘牛唱遼遼之歌歌曲說牛力強弱耕具輕重也僮隸於月下撫掌發烈謠以令美歌魏太山秦州記曰隴西郡隴山其上懸吐溜於中嶺泉亭因名萬石泉泉溢漫散而下涓澮皆注有人昇此而歌紀義宣城記曰臨城縣南三十里有蓋山登百許步有舒姑泉俗傳去有舒氏女未適人與其父析薪於此女坐泉處牽挽不動遽告家比還唯見清泉湛然母云女好音樂乃作絃歌泉湧迴流雙鯉赴節盛弘之荊州記曰臨賀馮乘縣有歌父山傳云有老人不娶室而善歌聞者莫不灑泣年八十餘而聲逾妙及病將困命鄉里六七人與上山穴中鄰人辭歸老人歌而送之聲振林木響遏行雲餘音傳林數日不絕, SBCK: ''}
