  - {type: variant, offset: 894, length: 50, content: 汝比及三年將復而野又曰天子東遊於黃澤宿於曲洛洛水之曲也使宮樂謠曰黃之池其馬歕沙音普悶反黃之澤其馬歕玉, SBCK: ''}
  - {type: variant, offset: 894, length: 1423, content: 汝比及三年將復而野又曰天子東遊於黃澤宿於曲洛洛水之曲也使宮樂謠曰黃之池其馬歕沙音普悶反黃之澤其馬歕玉漢武內傳曰西王母降命侍女安法嬰歌玄雲曲曰大象雖云寥我把天地戶披雲汎靈輿儵忽適下土泰真靈中唱始知風塵若頤神三田中約精六闕下上元夫人自彈雲林之璈鳴絃駭洞清音零朗乃奏步玄曲其辭曰黃陟真道騰步玄登天霞負笈造天關借問太上家忽遇紫微圃真人列如麻流景清飆起雲蓋映朱葩蘭房癖林闕碧室啟瓊沙丹臺結空構曄曄生露華誰言終有終扶桑不為查王母命侍女田四非荅歌其辭曰晨登太霞宮挹此玉水蘭夕入玄圃闕採蘂掇琅玕濯足瓠瓜河織女立津盤吐納抱景雲味之當一飡朝發漫汗府暮宿鉤陳垣莫與世人說行尸言此難列女傳曰趙簡子南擊楚津吏醉臥不能渡召欲殺之津吏女娟持楫而前曰昔父聞君東渡不測之水恐風波之起故禱九江三淮之神不勝巫祝杯酒飲沉醉至於此矣妾願鄙𨈬易父之死簡子將渡用楫少一人娟願備員用楫遂與渡中流奏河激之歌歌曰昇彼河兮西觀清水揚波兮杳冥禱求福兮醉不醒誅將加兮妾心驚蛟龍助兮主將歸呼來掉兮行勿疑簡子大悅立為夫人文士傳曰太祖雅聞阮瑀辟之不應連見逼乃逃入山中使人焚山得瑀送至召入太祖時征長安大延賓客怒瑀不與言使就伎入列瑀善解音能鼓琴撫絃而歌曰弈弈天門開大魏應期運青蓋巡九州在東西人怨士為知己死女為悅者玩恩義茍潛暢他人焉能亂為曲既捷音聲殊妙太祖大悅淮南子曰歌採菱發陽阿鄙人聽之不若延露陵陽非歌拙也聽各異也又曰甯戚欲干齊桓公困窮無以自達為商旅將任車任載也毛詩曰我任我輦也以商於齊暮宿於郭門之外桓公郊迎客夜開門甯戚飯牛車下望見桓公而悲擊牛角而疾商歌歌曰南山粲白石爛短褐單衣長止骭生不逢堯與舜禪終日飼牛至夜半長夜漫漫何時旦桓公聞之撫其僕之手曰異哉歌者非常人也命後車載之又曰易道良馬使人欲馳飲酒而樂使人欲歌燕丹子曰荊軻入秦不擇日而發太子與知謀者皆素衣冠送之於易水之上荊軻起為壽歌曰風蕭蕭兮易水寒壯士一去兮不復還高漸離擊筑宋意和之孟子曰有孺子歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足孔子曰小子聽之哉韓子曰宋玉築武宮謳倡行者心歡築者不倦王召賜之對曰臣師射瞀之謳賢於臣召使之謳行者不止築者甚倦王怪問對曰王試度其功美四板射瞀八板甚堅美五寸射瞀二寸列子曰林類年且百歲拾遺穗於故畦並歌進孔子適衛望之於野顧謂弟子曰彼可與言者試往評之子貢請行逆之壠端面而歌曰先生曾不悔乎行歌拾穗林類行不留歌不輟逸士傳曰堯時有八九十老人擊壤而歌曰日出而作日入而息鑿井而飲耕田而食帝何力於我哉列女傳曰魯陶嬰妻者夫死守志不二作歌詩曰悲夫黃鵠之早寡七年不雙宛勁獨宿不與眾同夜半悲鳴想其故雄天命早寡獨宿何傷寡婦念此泣下數行鳴呼悲哉死者不可忘飛鳴尚然況於貞良雖有賢雄終不可重行韋昭洞曆記日紂無道比干知極諫必死作秣馬金闕之歌西京雜記曰高帝令戚夫人歌出塞望歸之曲侍婢數百皆為之後宮齊唱聲入雲宵又曰賈佩蘭說在宮中時常以絃管歌舞相娛竟為妖服以趍良時十月十五共入靈女廟吹笛擊筑歌上雲曲而相連臂踏地為節歌赤鳳來也洞冥記曰漢武帝使董謁乘浪霞之輦以昇壇候王母王母至與宴歌奏春歸之樂謁乃聞王母歌聲而不見其形歌聲繞梁三匝乃上旁梁草樹枝葉皆動歌之感也張華博物志曰薛談學謳於秦青未窮青之技而辭歸青錢於郊乃撫節悲歌聲振林木響遏行雲談乃謝求返歸辛氏三秦記曰隴右西開其阪九迴不知高幾里欲上者七日越高處可容百餘家下處數十萬戶上有清水四注流下俗歌曰隴頭流水鳴聲幽噎遙望秦川心肝斷絕黃閞武陵記曰有綠羅山側岩垂水懸蘿百里許得明月池碧潭鏡澈百尺見厎素岸若雪松如插翠流風叩阿有絲桐之韻土人為, WYG: 珉}
