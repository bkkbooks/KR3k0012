  - {type: variant, offset: 502, length: 3, content: 紀告寧, SBCK: 有流殛放煞之誅三王有大辟刻肌之刑所以爲除去亂也髙帝定法傳之後代遭丗康平因時施恩去肉刑相坐之法天下幾平武帝值中國全盛征伐逺方百姓罷􅁦豪傑犯禁姦吏弄法故重首匿之科著知縱之律宣帝履道要以御海内臣下奉憲不失繩墨天下稱安孝元孝哀即位日淺丞相王嘉等猥以數年之間虧除先帝舊約穿令断律凢百餘事臣取其尢妨政者條奏伏謂擇其善而從之以定不易}
