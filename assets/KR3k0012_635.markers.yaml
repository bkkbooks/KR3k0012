  - {type: variant, offset: 1083, length: 1056, content: 得就郡又曰謝𥙿字景仁晦從父也為左僕射𥙿性矜嚴居家守靜每唾輒唾左右衣事畢即聽假一日浣濯每唾右右爭來受之徐爰宋書曰申恬字道獻少懷貞恪志業介然拜殿中將軍禁省八載不休急時莫之比齊書曰衡陽公諶字彥平高帝絕服族子武帝即位除步兵校尉領御仗主齊內兵仗委付之心膐密事皆使參掌鬱林即位深委信諶每請急宿出帝通夕不能寐諶還乃安梁書曰太清元年大舉北侵初謀元帥帝欲用蕭範時朱異取急外還聞之遽入曰嗣王雄豪蓋世得人死力然所至殘暴非常非吊人之才昔陛下登北顧亭以望謂江右有異氣今日之事尤宜詳矣後魏書邢虬字神寶為光祿卿虬母在鄉遇患請假而歸值秋水暴長河梁斷絕虬得一舡而渡舡漏而不溢時人異之唐書曰張志寬蒲州安邑人隋末喪父哀毀骨立為州里所稱賊帥王君廓屢為寇掠聞其名獨不犯其閭鄰里賴之而免者百餘家後為里正詣縣稱母疾取急求歸縣令問其狀對曰母常有所苦志寬亦所苦向患心痛知母有疾令怒曰妖妄之辭也繫之於獄馳驗其母竟如所言令異之慰諭遣去襄陽耆舊傳曰習溫長子宇為執法郎取急歸賓從甚盛溫怒杖宇責之曰吾聞生於亂世貴而能貧始可以後亡況侈競乎文士傳曰顧榮兼侍中安慰河北以前後功封嘉興伯求急還南既造江渚欣然自得風俗通曰濟北李登為從事吏病得假歸復移剌延斯後被召登自嫌不甚羸瘦謂雙生弟寧曰我兄弟相似人不能別汝類病者代我至府寧曰府君大嚴得無不可登曰我新吏耳無能覺者我自行見診必死寧便詣府醫藥集診有驗後為人所言事發覺遂殺登世說曰車武子為侍中與王東亭諸人期共遊集車早請急出過詣王子敬子敬於時宅在建陽門內道北車求去王問卿何以忽忽車荅云與東亭諸人期共行王曰卿何以乃作此不急行車遂不敢去盡急還臺又曰顧長康作殷州請假還東爾時例不給苦求之乃得又曰張敷為宋臺祕書郎自彭城請假還東于時相國府有一參軍督護亦請假武帝遣傳令語敷云可載之荅曰臣性不雜遂不載俗說曰張邀在鼓城請假當歸東傳亮時為宋臺侍中下舫中與張別張不起授兩手指著舫戶外傳遂不執其手熟視張面云樝是梨中之不臧者便去陸機思歸賦序曰余牽役京室去家四載以元康六年冬取急歸而羌虜作亂王師外征機興憤而成篇范甯啟國子生假故事曰國學開建彌歷年載講誦之音靡聞考課之績不著良由導達之訓未弘鑽仰之心弗至陵替文源宜見整正謂應斷假精加督勵嚴其師訓舉善黜違眾官受假故事曰伏見內外眾官陳假紛紜煩黷無已舊有急假一月五急一年之中六十日為限不問虛實相率如此誣罔視聽煩穢官曹舉世行之不以為非急假之制唯以父母妻子為辭而伯叔兄弟制所不及長偷薄之風傷敦睦之化臣謂宜去病解故之制一年令賜衣假日隨其所欲之適任其取日多少假寧令曰諸內外官五月給田假九月給受衣假為兩番各十五日田假若風土異宜種收不等通隨給, WYG: 罷}
