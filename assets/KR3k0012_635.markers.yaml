  - {type: 'tls:seg', offset: 149, content: '', id: KR3k0012_CHANT_635-2a.5}
  - {type: variant, offset: 149, length: 0, content: '', SBCK: 不別其父請止夫子赦焉曰上失其道獄犴不治不可刑也書曰義刑義殺勿庸以即汝心三尺之限空車不能登者何峻故也百刃之山重載陟焉何陵遟也俗之陵遟乆矣雖有刑法人能勿踰乎國語曰臧文仲曰大刑用兵甲次刑用斧􅃏中刑用刀鋸薄刑用鞭朴以威民也孔叢子曰仲弓問古之刑教與今之刑敎孔子曰古之刑教省今之刑敎繁古教有禮然後有刑是以刑省今無禮以教而齊之以刑是以刑繁史記曰胡亥立以趙髙爲郎中令令更變律有罪者相坐収族又群盗起胡亥責李斯斯懼上書請行督責刑者相半其後趙髙譛斯具五刑􅆎斬夷三族又曰申不害韓非好刑名法術之學以爲儒者以文亂法俠者以武犯禁漢書刑法志曰古人有言曰天生五材民並用之廢一不可鞭朴不可㢮於家刑罰不可廢於國征伐不可偃於天下用之有夲末行之有逆順耳又曰孝武即位徴發煩數百姓貧窮民􅀍酷吏擊姦断宄不勝於是招進張湯趙禹之屬修定法令又曰古之知法者能省刑夲也今之知法者不失有罪上下相臨以刻爲明深者􅀗功名平者多後患諺曰鬻棺者欲歳之疫非憎人欲殺之利在於人死又曰貢禹上言孝文皇帝時貴廉㓗賤貪汙賈人贅壻及吏坐􅂍者皆禁錮不得爲吏無贖罪之法欲令禁止海内大化武帝始臨天下尊賢用士開地廣境自見功大遂縱􅄝慾廼一時之變使犯法者贖罪入􅂖者􅀘吏是以官亂民貧盗賊並起又曰文帝制人有巳論其父母妻子同産坐之及收孥律令冝除之孥子也􅁗法一有罪并収其家也罪疑者與人從輕断之於是刑罰大省断獄四百又曰􅁗始皇專任刑罰躬操文墨晝断獄夜理書又曰于定國爲廷尉季秋後請讞時}
