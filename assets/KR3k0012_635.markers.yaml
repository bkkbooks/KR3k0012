  - {type: variant, offset: 20, length: 50, content: 漢書曰高祖常告歸之田李斐注曰告請也言請休謁也寧安也吉日告凶日寧也漢律吏二千石有予告有賜告者在官有功最, SBCK: 以正}
  - {type: variant, offset: 20, length: 1, content: 漢, WYG: 被此五刑喻犯數罪也孔子曰不然也五刑有此教教然耳犯數罪猶以上一罪刑之又曰子夏曰昔者三王慤然欲錯刑遂罰錯處也遂行也平心而應之和然後行之然且曰吾意者以不平慮之乎吾意者以不和平之乎如此者三然後行之此之謂慎罰又曰孔子曰古之刑者省之今之刑者繁之其教古者有禮然後有刑是以刑省也今也反是無禮而齊之以刑是以繁也}
