  - {type: variant, offset: 146, length: 1, content: 滿, krp: 曰吾意者以不平慮之乎吾意者以不和平之乎如此者三然後行之此之謂慎罰又曰孔子曰古之刑者省之今之刑者䌓之其教古者有禮然後有刑是以刑省也今也反是無禮而齊之以刑是以䌓也書曰伯夷降典禮析民惟刑謂有禮然後有刑也又曰兹殷罰有倫今也反是諸侯不同聽每君異法聽議獄也聽無有倫是故知法難也又曰有過赦小罪勿增大罪勿纍延罪無辜曰纍老弱不受刑有過不受罰故老而受刑謂之悖弱者受之不克不赦有過謂之賊詩小雅曰菀栁刺幽王也暴虐無親而刑罰不中也詩含神霧曰燁燁震電不寧不令此應刑政之大暴故震雷驚人使天下不安周禮地官上大司徒曰以郷八刑紏万民一曰不孝之刑二曰不睦之刑三曰不婣之刑四曰不悌之刑五曰不任之刑六曰不恤之刑七曰造言之刑八曰乱民之刑紏猶割祭也不弟不敬况師長也造言訛言惑衆乱民乱名改作執左道以亂政也任謂朋友相任也恤謂相憂又地官下司市曰市刑小刑憲罰中刑徇罰大刑朴罰其附于刑者歸千士徇舉以示其地之衆也朴撻也國君過市則刑人赦大人過市罰一幕世子過市罰一弈命夫過市罰一蓋命婦過市罰一帷謂諸侯及夫人丗子過其國之市大夫内子過其都之市也市者人所交利而行刑之處君子無故不遊觀焉若遊觀則施惠以爲説又曰秋官上曰大司㓂掌建邦之三典以佐王刑邦國詰四方典法也詰謹也書曰穆王耄荒度作詳刑以詰四方也一曰刑新國用輕典新國新辟地立君之國也用輕法者爲其民之未習於教二曰刑平國用中典平國承平守成之國用中典者常行之法三曰刑亂國用重典亂國篡弑叛逆之囯用重典者以其化悪伐㓕之也以五刑糾萬民一曰野刑上功紏力功農切力勤力也三曰軍刑上命紏守命將命也守不失部伍也三曰卿刑上德紏孝德六德也善父母爲孝也四曰官刑上能紏職能能其事也職職事脩理也五曰國刑上愿紏暴愿慤慎也暴當爲恭字文誤也禮曰刑不上大夫禮不下庶人又曰九十曰耄七年曰悼悼與耄雖有罪不加刑焉又曰刑者侀也刑者成也一成而不可變故君子盡心焉傳曰先君周公作誓命曰毀則爲賊掩賊爲藏竊藏爲盗盗器爲姦主藏之名頼姦之用爲大㓙德有常刑無赦在九刑不忌誓命巳下皆九刑之書又曰晉侯之第陽干亂行於曲梁行陳曲梁地名魏絳戮其僕僕御晉侯怒謂羊舌職曰合諸侯以爲榮陽干爲戮何辱如之必殺魏絳對曰絳無二志事君不避難有罪不逃刑其将來辭何辱命焉言終魏絳至又曰聲子謂楚令尹子木曰善爲國者賞不僣而刑不濫賞僣則懼及淫人刑濫則懼及善人若不幸而過寜僣無濫與其失善寧其利淫無善人則國從之從之亡也古之治民者勸賞而畏刑恤民而不倦賞以春夏刑以秋冬是以將賞爲之加膳則飫賜此以知其勸賞也將刑爲之不舉不舉則徹樂此以知其畏刑也又曰𥘉景公欲更晏子之宅曰子之宅近市湫隘囂塵不可以居湫下隘小囂聲塵土請更諸塽塏者塽明塏燥辭曰君之先臣容焉先臣晏子之先人臣不足以嗣之於臣侈矣公笑曰子近市識貴賤乎對曰旣利之敢不識乎公曰何貴何賤於是景公䌓於刑有鬻踊者故對曰踊貴屨賤景公爲是省於刑君子曰仁人之言其利博哉晏子一言而齊侯省刑又曰鄭人鑄刑書鑄刑書於鼎以爲國之常法叔向使謂子産曰昔先王議事以制不爲刑辟懼民之有争心也夏有亂政而作禹刑啇有亂政而作湯刑夏啇之亂着禹湯之法言不能議事以制周有亂政而作九刑周之衰亦爲刑書謂之九刑三辟之興皆叔丗也言制書不起於始全盛之丗今吾子相鄭國作封洫立謗政制三辟鑄刑書制三辟謂用三代之末法將以靖民不亦難乎又曰爲刑罰威獄使民畏忌以類其震曜殺戮雲電震曜天地威也刑獄以象類之論語曰導之以政齊之以刑民免而無耻又曰禮樂不興則刑罰不中刑罰不中則民無所措手足孝經曰五刑之屬三千而罪莫大於不孝家語曰閔子騫問政於孔子孔子對曰以德以法夫德法者御民之具猶御馬之有衘勒也君者人也吏者轡也刑者䇿也夫人君之政執其轡䇿而已乎閔子騫曰敢問古之爲政孔子曰古者天子以内史爲左右手以德法爲衘勒以百官爲轡以刑罰爲䇿以萬人爲馬以御天下數百年而不失也又曰有父子訟者孔子同狴執之}
