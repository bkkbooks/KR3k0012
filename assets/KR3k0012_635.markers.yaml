  - {type: variant, offset: 5, length: 4, content: 急假釋名, SBCK: 刑法部一叙刑上易蒙卦}
  - {type: variant, offset: 5, length: 3, content: 急假釋, WYG: 宋李昉等撰刑法部一叙刑上易䝉卦曰初六發䝉利用刑人象曰利用刑人以正法也刑人之道道所惡也以正法制故刑人也又豫卦曰順以動豫聖人以順動則刑罰清而民服又噬嗑卦曰噬嗑亨利用獄噬齧也嗑合也凡物之不親由有間也物之不齊由有過也有間與過齧而合之所以通也刑克以通獄之利也象曰雷電噬嗑先王以明罰勅法又豐卦象曰雷電皆至豐君子以折獄致刑文明以動不失情理也尚書舜典曰象以典刑象法也法用常刑用不越法流宥五刑宥寛也以流放之法寛五刑鞭作官刑以鞭為治官事之刑朴作教刑朴榎楚也不勤道業則撻之金作贖刑金黄金誤而入刑出金以贖罪𤯝災肆赦怙終賊刑𤯝過也災害也肆緩也賊殺也過而有害當緩赦之怙姧自終當刑殺之欽哉欽哉惟刑之恤哉舜陳典刑之義勅天下使敬之憂欲得中又舜典曰帝曰臯陶蠻夷猾夏冦賊姦宄猾亂也夏華夏羣行攻刼曰冦殺人曰賊在外曰姦在内曰宄言無教之致汝作士五刑有服士治獄官也五刑墨劓剕宫大辟服從也言刑得輕重中正之法也五服三就既從五刑謂服罪也行刑當就三處大罪於原野大夫于朝士于市五流有宅五宅三居謂不忍加刑則流放之若四㓙則有五刑之流各有所居五居之差有三等之居大罪四裔次九州之外次千里之外也惟明克允言臯陶能明信五刑施之逺近蠻夷猾夏使咸信服無敢犯之又大禹謨曰帝曰臯陶惟兹臣庶罔或干予正無有干我正言順耳汝作士明于五刑以弼五教期于予治弼輔也期當也歎其能以刑輔教當於治體刑期于無刑民協於中時乃功懋哉雖或行刑以殺止殺終無犯者刑期於無所刑民皆合於大中之道是汝之功勉之臯陶曰帝徳罔愆臨下以簡御衆以寛罰無及嗣賞延于世宥過無大刑故無小罪疑惟輕功疑惟重刑疑附輕賞疑從重忠厚之至與其殺不辜寧失不經好生之徳洽於民心兹用不犯于有司辜罪也經常也司主也臯陶因帝勉已遂稱帝之徳所以明民不犯上也寕失不常之罪不犯無辜仁愛之道又臯陶謨曰天討有罪五刑五用哉言天以五刑罰有罪用五刑宜必當又吕刑曰穆王訓夏贖刑吕侯以穆王命作書訓示夏禹贖刑之法更從輕以布告天下作吕刑甫刑後為甫侯故或稱甫刑惟吕命王享國百年耄荒言吕侯見命為卿時穆王以享國百年耄亂荒忽穆王即位過四十矣言百年大期雖老而能用賢以揚}
