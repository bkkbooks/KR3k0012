  - {type: variant, offset: 527, length: 479, content: 有吏父病篤近在外舍自白求假思疑其不實發教曰世有思婦病母者豈此謂乎遂不與假吏父明日死思無恨意其為刻薄如此魏志曰祝皓字子春南陽平氏人也志節抗烈篤於仁義為吏歸休周旋鄉里吊死問疾畢乃還家晉起居注曰孝武太元元年詔大臣疾病假蒲三月解職王隱晉書曰王𡰥音夷字季孫洛中貴盛名士王澄胡母輔之等皆與𡰥交時𡰥為兵曹左大將軍幕澄等持羊酒詣軍門吏䟽名內請入見大將軍澄等既入語吏過王𡰥炙羊飲酒訖而去竟不見將軍聞之因與尼長假遂得離兵宋書曰王敬弘字惔之為祕書郎惔之曾請假還家未定省敬弘剋日見之至輒不果假日將盡惔之乞求奉辭敬弘呼前至閣復不見又曰謝景仁增弟述嘗設饌請宋武帝帝召述述知非景仁夙意又慮帝之命請急不從帝馳遣呼述頃至乃飡其見重如此又曰謝靈運自以名輩應參時政王曇首王華名位素不踰之並見任遇意不平多稱疾不朝直出郭遊行或一百六七十里經旬不歸既不表聞又不請急上不欲傷大臣諷旨令自解靈運表陳疾賜假東歸又曰庾炳之居選部請急還家尚書令史來諮事一人善彈一人工歌留與宿有司以違制奏焉又曰伏𣈶音亙自以名輩素在始興內史何遠前為吏俱稱廉白遠累見擢𣈶循階而已意望不滿多託居家尋求假到東陽迎妹喪因留會稽築宅自表解職詔, WYG: 廷尉議}
