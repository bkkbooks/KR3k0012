  - {type: variant, offset: 140, length: 7, content: 汲黯多病病且滿, WYG: 兹殷罰有倫今也反是諸侯不同聴毎君異法聴議獄也聴無有倫是故法之難也又曰有過赦小罪勿增大罪勿纍延罪無辜曰纍老弱不受刑有過不受罰故老而受刑謂之悖弱者受之不克不赦有過謂之賊詩小雅曰菀栁刺幽王也暴虐無親而刑罰不中也詩含神霧曰􅂱􅂱震電不寜不令此應刑政之大暴故震電驚人使天下不安周禮地官上大司徒曰以鄉八刑糾萬民一曰不孝之刑二曰不睦之刑三曰不婣之刑四曰不悌之刑五曰不任之刑六曰不恤之刑七曰造言之刑八曰亂民之刑糾猶審察也不悌不敬兄師長也造言訛言惑衆亂民亂名改作執左道以亂政也任謂朋友相任也恤謂相愛又地官下司市掌市刑小刑憲罰中刑狥罰大刑朴罰其附於刑者歸于士狥舉以示其地之衆也朴撻也國君過市則刑人赦夫人過市罰一幕世子過市罰一帟命夫過市罰一蓋命婦過市罰一帷謂諸侯及夫人世子過其國之市大夫内子過其都之市也市者人所交利而行刑之處君子無故不逰觀焉若逰觀則施恵以為說又曰秋官上曰大司冦掌建邦之三典以佐王刑邦國詰四方典法也詰謹也書曰穆王耄荒度作詳刑以詰四方也一曰刑新國用輕典新國新辟地立君之國也用輕法者為其民之未習於教二曰刑平國用中典平國承平守成之國用中典常行之法三曰刑亂國用重典亂國簒殺叛逆之國用重典者以其化惡伐滅之也以五刑糾萬民一曰野刑上功糾力功農功力勤力也二曰軍刑上命糾守命將命也守不失部伍也三曰鄉刑上徳糾孝徳六徳也善事父母為孝也四曰官刑上能糾職能能其事也職職事修理也五曰國刑上愿糾暴愿慤慎也暴當為恭字之悮也禮曰刑不上大夫禮不下庶人又曰九十曰耄七年曰悼悼與耄雖有罪不加刑焉又曰刑者侀也刑者成也一成而不可變故君子盡心焉傳曰先君周公作誓命曰毁則為賊掩賊為藏竊藏為盗盗器為奸主藏之名頼奸之用為大㓙徳有常無赦在九刑不忘誓命以下皆九刑之書又曰晉侯之弟陽干亂行於曲梁行陳曲梁地名魏絳戮其僕僕御晉侯怒謂羊舌赤曰合諸侯以為榮陽干為戮何辱如之必殺魏絳對曰絳無二志事君不避難雖有罪不迯刑其將来辭何辱命焉言終魏絳至又曰聲子謂楚令尹子木曰善為國者賞不僣而刑不濫賞潜則懼及淫人刑濫則懼及善人若不幸而過寜僣無濫與其失善寜其利淫無善人則國從之從之亡也古之治民者勸賞而畏刑恤民而不倦賞以春夏刑以秋冬是以將賞為之加膳加膳則飫賜以此知其勸賞也將刑為之不舉不舉則徹樂以此知其畏刑也又曰初景公欲更晏子之宅曰子之宅近市湫隘囂塵湫下隘小囂聲塵土請更諸爽塏者爽明塏燥辭曰君之先臣容焉先臣晏子之先人臣不足以嗣之於臣侈矣公笑曰子近市識貴賤乎對曰既利之敢不識乎公曰何貴何賤於是景公繁於刑有鬻踊者故對曰踊貴屨賤景公為是省於刑君子曰仁人之言其利溥哉晏子一言而齊侯省刑又曰鄭人鑄刑書鑄刑書于鼎以為國之常法叔向使詒子産書曰昔先王議事以制不為刑辟懼民之有争心也夏有亂政而作禹刑商有亂政而作湯刑夏商之亂著禹湯之法言不能議事以制周有亂政而作九刑周之衰亦為刑書謂之九刑三辟之興皆叔世也言刑書不起于明盛之世今吾子相鄭國作封洫立謗政制參辟鑄刑書制參辟謂用三代之末法将以靖民不亦難乎又曰為刑罰威獄使民畏忌以類其震曜殺戮雷電震曜天之威也刑獄以象類之論語曰道之以政齊之以刑民免而無恥又曰禮樂不興則刑罰不中刑罰不中則民無所措手足孝經曰五刑之屬三千而罪莫大於不孝家語曰閔子騫問政於孔子子曰以徳以法夫徳法者御民之具猶御馬之有銜勒也君者人也吏者轡也刑者䇿也夫人君之政執其轡䇿而已子騫曰敢問古之為政孔子曰古者天子以内史為左右手以徳法為銜勒以百官為轡以刑罰為策以萬民為馬故御天下數百年而不失也又曰有父子訟者孔子同狴執之}
