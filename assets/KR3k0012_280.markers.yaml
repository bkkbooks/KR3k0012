  - {type: variant, offset: 2264, length: 2, content: 賊銅, SBCK: 􅁑公死無恨以至于盡無一人降時人比之田横呉戍將于詮曰大丈夫受命其主以兵救人旣不能尅又束手於敵吾不取乃免胄冒陣而死其得士心如此呉志曰陸琩字子璋丞相遜弟也少好學篤義先是陳留濮陽逸沛郡朱纂廣陵􅀽迪等皆單食有志就瑁遊處瑁割少分甘與共豊約蜀志曰鄧艾爲大將二十餘年賞罰明善卹卒伍身之衣食資仰於官素儉終不治私妻子不免飢寒晉書曰祖逖居丹徒之京口賔客義徒皆豪桀勇士逖遇之如子弟時楊土大飢此軰多爲盗竊攻剽冨室逖慰撫問之曰比復南塘一出不或爲吏所䋲逖輙擁護救解之談者以此少逖自若也又曰祖逖據太丘樊雅攻之陳留太守陳川使李頭救之頭力戰有勲逖時獲雅駿}
