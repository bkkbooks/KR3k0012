  - {type: variant, offset: 1430, length: 1229, content: 恚曰使汝行逢宋都督信義左傳曰曹衛告絕於楚子玉怒從晉師晉退軍吏曰以君避臣辱也且楚師老矣何故退子犯曰師直為壯曲為老豈在久乎微楚之惠不及此重耳遇楚楚成王有贈送之惠退三舍避之所以報也一舍三十里初楚子云若反國何以報我故以退三舍為報又曰晉文公圍原命三日之糧原不降命去之諜出曰原將降矣軍吏請待公曰信國之寶也民之所庇也得原失信何以庇之所亡滋多退三舍而原降又曰晉將荀吳伐鮮虞圍鼓鼓白狄之別也鼓人或請以城叛吳曰吾聞諸叔向好惡不愆民知所適事無不濟也愆過適歸或以吾城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何無復加所好也若其弗賞是失信也何以庇民力能則進否則退量力而行吾不可以欲城而邇姦也所喪滋多使鼓人殺叛人而繕守備圍鼓三月鼓人或請降使其民見曰猶有食色軍吏曰獲城而不取勤民而頓兵何以事君吳曰所以事君也獲一邑而教民怠將焉用邑邑以賈怠不如完舊完獶保守也賈音估完戶官切賈怠無卒卒終棄舊不祥鼓人能事其君我亦能事吾君德義不爽爽差好惡不愆城可獲而民知義所知義所在也荀吳必其能獲故因以示義有死命而無二心不亦可乎鼓人告食竭力盡而後取之剋鼓而返不戮一人史記曰秦末天下兵起范增說項梁曰陳勝敗固當夫秦滅六國楚最無罪自懷王入秦不返楚人憐之至今曰楚雖三戶亡秦必楚今陳勝首事不立楚後而自立其勢不長今君起江楚蜂起之將皆爭附君者以君世世楚將為能復立楚之後也乃求楚懷王孫心立為懷王以從民欲也又曰漢楚相持之際項羽擊陳留外黃外黃不下數日降羽悉令男子年十五以上詣城東欲坑之外黃令舍人兒年十三令之舍人兒也以其幼弱故孫其父往說羽曰彭越強劫外黃強音其兩反外黃恐故且降待大王大王至又皆坑之百姓豈有所歸心哉從此以東梁地十餘城皆恐莫肯下矣羽然其言迺赦外黃當坑者而東至睢陽聞之皆爭下又曰漢王至洛陽新城三老董公遮說漢王以義帝死請發喪漢王從之高祖大哭遂為義帝發喪臨三日發使者告諸侯曰天下共立義帝北面事之今項王放殺義帝江南大逆無道寡人親為發喪諸侯皆縞素發國內兵收三河士南浮江漢以下願從諸侯王擊楚之殺義帝者於是諸侯多從之後漢書曰更始初光武為蕭王定河北諸賊銅馬餘眾降封其渠帥為列侯降者猶不自安光武知其意令各歸營勒兵乃自乘輕騎案行部陣降者更相語曰蕭王推赤心置人腹中安得不投死乎投死猶言致也由是皆服蜀志曰明帝自征蜀至長安遣張郃諸軍勁卒四十餘万向劍閣諸葛亮有戰士万二千時魏軍始陣兵適交參佐咸以敵眾強多非力所制控權停下兵并聲勢亮曰吾聞用武行師以大信為本得原失信古人所惜去者束裝以待期妻子企踵而計日乃勑速遣於是去者感悅願留一戰往者慣踊咸思致命臨戰之日莫不拔刃爭先以一當十殺張郃却司馬宣王一戰大剋此之由也吳志曰孫皎嘗遣兵候魏獲魏邊將吏美女以進皎皎更其衣服送還之也晉書曰武帝有滅吳之志以羊祐為督荊州諸軍事假節散騎常侍衛將軍如故祐率營兵出鎮南夏開設庠序綏懷遠近得江漢之心與吳人開布大信降者欲去皆聽之又曰羊祜為征南大將軍督荊州諸軍事祜以孟獻營武牢而鄭人懼晏嬰城東陽而萊子服乃進據險要開建五城收膏腴之地奪吳人之資石城以西盡為晉有自是前後降者不絕乃增修德信以懷柔初附, WYG: 結}
