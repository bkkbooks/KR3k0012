  - {type: variant, offset: 3517, length: 1, content: 輕, SBCK: 詔領山東兵數万􅁥築長城于時盛夏先有氷毎歳藏氷長史宗欽道以叡冒犯暑熱遂遣與氷追送正值日中炎赫叡乃對之歎息云三軍皆飲温水吾以何義獨進寒氷遂至消液竟不一甞兵人感恱遐邇稱數後漢書曰司馬楚之少有英氣能折節待士及宋受禪規欲報復収衆據長社歸之者常万餘人劉􅁉􅀷憚之遣刺客沐謙圖害楚之楚之待謙甚厚謙夜詐疾知楚之必來欲因殺之楚之聞謙疾果自賷湯藥徃省之謙感其意乃岀匕首於席下以狀告之楚之歎曰若如來言雖有所防恐有所失謙遂委身事之其推誠信物得士心皆此􅀋也後周書曰侯莫陳順於渭橋與賊戰頻破之魏文帝還親執順手曰魏橋之戰卿有殊力便解所服金鏤玉梁帶賜之又曰史寧爲凉州刺史遣使詣太祖請事太祖即以所服冠履衣􅀍及弓箭甲矟等賜寧謂其使人曰爲我謝凉州􅀌解衣以衣公推心以委公公其善始令終無損功名也又曰武帝勝齊出齊宮中金銀寳器珠翠麗服及宫人二千人班賜}
  - {type: page-break, offset: 3517, content: '', id: KR3k0012_SBCK_280-5b}
  - {type: variant, offset: 3517, length: 1, content: 輕, WYG: 詔領山東兵數萬監築長城于時盛夏未有氷定州先藏氷長史宗欽道以叡冐犯暑熱遂遣人追送氷正值日中炎赫叡乃對之歎息云三軍皆飲温水吾以何義獨進寒氷遂至消液竟不一嘗兵人感恱遐邇稱歎後漢書曰司馬楚之少有英氣能折節待士及宋受禪規欲報復收衆據長社歸之者常萬餘人劉裕深憚之遣刺客沐謙圖害楚之楚之待謙甚厚謙夜詐疾知楚之必來欲因殺之楚之聞謙疾果自齎湯藥徃省之謙感其意乃出匕首於席下以狀告之楚之歎曰若如來言雖有所防恐有所失謙遂委身事之其推誠信物得士心皆此類也後周書曰侯莫陳順於渭橋與賊戰頻破之魏文帝還親執順手曰渭橋之戰卿有殊力便解所服金鏤玉梁帶賜之又曰史寧為凉州刺史遣使詣太祖請事太祖即以所服冠履衣被及弓箭甲弰等物賜寧謂其使人曰為我謝凉州孤解衣以衣公推心以委公公其善始令終無損功名也又曰武帝勝齊出齊宫中金銀寳噐珠翠䴡服及宫人二千人班賜将士又曰武帝勞謙接下自强不息以海内未康銳精教習至於治兵閱武歩行山谷履渉勤苦皆人所不堪平齊之後見軍士有跣而行者帝親脫靴以賜之又曰武帝善於撫下每宴㑹将士必自執盃勸酒或手付賜物至於征伐之處躬在行陣性又果决能㫁大事故能得士卒死力以弱制强又曰太祖平侯莫陳悦整兵入上邽收銳府庫財物山積皆以賞士卒毫釐無所取左右􅀼一銀鏤甕以歸太祖知而罪之即剖賜将士衆大恱又曰武帝大舉伐齊次於晉州初齊攻晉州恐周師卒至於城南穿塹自橋山属於汾水帝率諸軍八萬人置陣東南二十餘里帝常御馬從􅂾人廵陣處分之至輒呼主帥姓名以慰勉之}
