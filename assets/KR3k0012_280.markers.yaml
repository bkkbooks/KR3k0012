  - {type: variant, offset: 1219, length: 777, content: 德宗以万福為濠州刺史召見謂曰先帝改作名正者所以褒卿也朕以為江淮草木亦知卿名若從先帝所改恐賊不知是卿也復賜名万福慰遣之万福馳至渦口立馬岸上發進奉舡淄青兵馬倚岸睥睨不敢動諸道舡繼進吳越春秋曰吳公子慶忌吳王僚子也勇捷為人所聞筋力果勁萬人之敵也世說曰桓石虎小字鎮惡常從征枋頭車騎冲沒左右莫能先救宣武問汝叔落賊汝知否虎聞氣甚奮策馬於万眾中置冲還三軍歎服河朔遂以其威時有患瘧者怖之多愈因斷瘧焉燉煌實錄曰宋質直破虜有威名兒啼恐之即止虜相恚曰使汝行逢宋都督信義左傳曰曹衛告絕於楚子玉怒從晉師晉退軍吏曰以君避臣辱也且楚師老矣何故退子犯曰師直為壯曲為老豈在久乎微楚之惠不及此重耳遇楚楚成王有贈送之惠退三舍避之所以報也一舍三十里初楚子云若反國何以報我故以退三舍為報又曰晉文公圍原命三日之糧原不降命去之諜出曰原將降矣軍吏請待公曰信國之寶也民之所庇也得原失信何以庇之所亡滋多退三舍而原降又曰晉將荀吳伐鮮虞圍鼓鼓白狄之別也鼓人或請以城叛吳曰吾聞諸叔向好惡不愆民知所適事無不濟也愆過適歸或以吾城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何無復加所好也若其弗賞是失信也何以庇民力能則進否則退量力而行吾不可以欲城而邇姦也所喪滋多使鼓人殺叛人而繕守備圍鼓三月鼓人或請降使其民見曰猶有食色軍吏曰獲城而不取勤民而頓兵何以事君吳曰所以事君也獲一邑而教民怠將焉用邑邑以賈怠不如完舊完獶保守也賈音估完戶官切賈怠無卒卒終棄舊不祥鼓人能事其君我亦能事吾君德義不爽爽差好惡不愆城可獲而民知義所知義所在也荀吳必其能獲故因以示義有死命而無二心不亦可乎鼓人告食竭力盡而後取之剋鼓而返不戮一人史記曰秦末天下兵起范增說項梁曰陳勝敗固當夫秦滅六國楚最無罪自懷王入秦不返楚人憐之至今曰楚雖三戶亡秦必楚今陳勝首事不立楚後而自立其勢不長今君起江楚蜂起之將皆爭附君者以君世世楚將為能復立楚之後也乃求楚懷王孫心立為懷王以從民欲, SBCK: ''}
