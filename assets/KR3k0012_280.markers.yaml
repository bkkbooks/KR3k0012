  - {type: 'tls:seg', offset: 3, content: '', id: KR3k0012_CHANT_280-1a.2}
  - {type: variant, offset: 3, length: 2, content: 威名, SBCK: 一撫士上孫子曰視卒如嬰兒故可與之赴深谿視卒如愛子故可與之俱死厚而不能使愛而不能令亂而不能理恩不可專用罰不可獨在譬如驕子不可用也軍䜟曰軍無財則士不來軍無賞則士不徃故香餌之下必有懸魚重賞之下必有勇夫故曰禮者士之所歸也賞者士之所死也昭其所歸示有所死故曰禮有後悔則士不止賞而後悔則士不使禮賞不倦則士進矣左傳曰冬楚師伐宋圍蕭蕭潰楚大夫申公巫臣曰師人多寒楚子於是廵三軍拊而勉之拊撫慰勉也三軍之士皆如挾纊纊綿也言士恱以忘寒又曰聲子詣楚謂令尹屈建曰雍子奔晉以爲謀主彭城之役晉楚遇於靡角之谷雍子曰歸老㓜返􅀌疾二人役歸一人簡兵蒐乗簡擇蒐閱秣馬蓐食師陣楚次次舍也焚舍示必死明日將戰行歸者而逸楚囚欲使楚知楚師宵潰晉降彭城而歸諸宋楚失東夷子辛死之則雍子之爲也}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_280-1b}
  - {type: variant, offset: 3, length: 2, content: 威名, WYG: 二撫士撫士孫子曰視卒如嬰兒故可與之赴深谿視卒如愛子故可與之俱死厚而不能使愛而不能令亂而不能理如驕子不可用也軍䜟曰軍無財則士不來軍無賞則士不徃故香餌之下必有懸魚重賞之下必有勇夫故曰禮者士之所歸也賞者士之所死也昭其所歸示其所死故曰禮而後悔則士不歸賞而後悔則士不死禮賞不倦則士進矣左𫝊曰冬楚師伐宋圍蕭蕭潰楚大夫申公巫臣曰師人多寒楚子於是廵三軍拊而勉之拊勉慰勉也三軍之士皆如挾纊纊綿也又曰聲子詣楚謂令尹屈建曰雍子奔晉以為謀主彭城之役晉楚遇於靡角之谷雍子曰歸老㓜返孤疾二人役歸一人簡兵蒐乗簡擇蒐閲秣馬蓐食師陣焚次次舍也焚舍示必死明日將戰行歸者而逸楚囚欲使楚知楚師宵潰晉降彭城而歸諸宋楚失東夷子辛死之則雍子之為也}
