  - {type: variant, offset: 714, length: 504, content: 捷蠻甚畏憚之小兒啼語之曰劉胡來便即止又曰沈慶之伐沔北結蠻大破之威震諸山群蠻皆稽顙慶之患頭風著狐皮帽群蠻惡之號曰蒼頭公後魏書曰李崇沉深有將略寬厚善御眾在楊州凡經十年常養壯士數千人寇賊侵邊所向摧破號曰臥虎賊甚憚之後周書曰韓杲從大軍破稽胡於北山胡地險阻人迹罕至杲進兵窮討散其種落稽胡憚杲勁健號為著翅人太祖聞之笑曰著翅之名寧減飛將又曰蔡祏與齊神武遇戰於邙山祏時著明光鐵鎧所向無前敵人咸曰此是鐵猛獸也皆遽避之又曰裴寬在孔城十三年與齊洛州刺史獨孤永業相對永業有計謀多譎詐或聲言春發秋乃出兵或揜敵消息倏忽而至寬每揣知其情出兵邀擊無不克之永業常戒其所部曰但好慎孔城自外無足慮其見憚如此又曰怡峰字景阜遼東人也從征役以驍勇聞當時號為驍將又曰梁武勑蕭續曰賀拔勝北間驍將汝宜慎之又曰郝玼為刺史始玼以臨涇地宜當畜息蕃戎每為寇即屯其地嘗白其帥願以城控之前帥不從其後叚祐為節度使玭復白祐祐多其策乃表請城之故詔玼鎮其地自是西戎無敢犯涇者玼自行間前無強敵在邊上三十年生得蕃人輒刳剔而歸其屍蕃人畏之如神下令得玼者賞以等身金蕃中小兒啼號者但連呼郝玼以怖之又曰張萬福帶和州刺史鎮咸陽因留宿衛李正已反將斷江淮路令兵守埇橋渦口淮進奉舡千餘隻江泊渦下不敢, SBCK: ''}
