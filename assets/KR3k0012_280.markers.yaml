  - {type: variant, offset: 2252, length: 0, content: '', SBCK: 桓帝以叚頴爲破羗將軍征羗每行軍仁愛士卒疾者親自瞻省手爲裹瘡在邊十餘年未甞一日蓐寢與將士同勤苦故皆樂爲死戰又曰皇甫規延熹中爲中郎將持節􅁥討零吾等羗㑹軍中大疫死者十三四規親入菴廬廵視將士三軍感恱東羗遂遣使乞降又曰皇甫嵩平黄巾䘏士卒甚得衆情每軍行頓止須營幔修立然後就舎帳軍士皆食爾乃甞飯吏有因事受賂者嵩}
  - {type: page-break, offset: 2252, content: '', id: KR3k0012_SBCK_280-3a}
  - {type: variant, offset: 2252, length: 0, content: '', krp: 桓帝以叚頴爲破羗將軍征羗每行軍仁愛士卒疾者親自瞻省手爲裹瘡在邊十餘年未甞一日蓐寢與將士同勤苦故皆樂爲死戰又曰皇甫規延熹中爲中郎將持節監討零吾等羗㑹軍中大疫死者十三四規親入菴廬廵視將士三軍感恱東羗遂遣使乞降又曰皇甫嵩平黄巾䘏士卒甚得衆情每軍行頓止須營幔修立然後就舎帳軍士皆食爾乃甞飯吏有因事受賂者嵩}
  - {type: variant, offset: 2253, length: 2, content: 始初, SBCK: 以錢物賜之吏懷慙或至自殺又曰馬援討西羗中流矢貫脛帝以璽書勞之賜牛羊數千頭援盡班諸賔客又曰董卓擊漢陽叛羗破之拜郎中賜縑九千疋卓曰爲者則巳有者則士爲功者雖巳共有者乃士乃悉分吏兵無所留又曰王覇常與臧宫傅俊共營覇獨善撫士卒死者脫衣以斂之傷者躬親以養之又曰}
  - {type: variant, offset: 2253, length: 2, content: 始初, krp: 以錢物賜之吏懷慙或至自殺又曰馬援討西羗中流矢貫脛帝以璽書勞之賜牛羊數千頭援盡班諸賔客又曰董卓擊漢陽叛羗破之拜郎中賜縑九千疋卓曰爲者則巳有者則士爲功者雖巳共有者乃士乃悉分吏兵無所留又曰王覇常與臧宫傅俊共營覇獨善撫士卒死者脫衣以斂之傷者躬親以養之又曰}
