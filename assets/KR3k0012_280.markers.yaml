  - {type: variant, offset: 208, length: 232, content: 瓚為降虜校尉討烏桓每聞有警瓚輒厲色憤怒如赴讎敵望塵奔逐或繼之以夜戰虜識聲憚其勇莫敢抗犯又曰瓚征烏桓常與善騎射之士數十人皆乘白馬以為左右翼自號白馬義從烏桓更相告語避白馬長史乃畫作瓚形馳射之中者咸稱万歲虜自此之後遂遠竄塞外又曰承宮名播匈奴時北單于遣使求得見宮顯宗勑自整飾宮對曰夷狄眩名非識實者也臣狀醜不可以示遠宜選有威容者續漢書承宮傳曰夷狄聞臣虛稱故欲見臣臣醜陋形寢不如選長有威容者示之也帝乃以大鴻臚魏應代之又曰武王縯音引字伯升世祖之長兄也慷慨有大節進圍宛城中自號天柱, SBCK: 竇嬰拜}
