  - {type: variant, offset: 1190, length: 239, content: 正已反將斷江淮路令兵守埇橋渦口淮進奉舡千餘隻江泊渦下不敢過德宗以万福為濠州刺史召見謂曰先帝改作名正者所以褒卿也朕以為江淮草木亦知卿名若從先帝所改恐賊不知是卿也復賜名万福慰遣之万福馳至渦口立馬岸上發進奉舡淄青兵馬倚岸睥睨不敢動諸道舡繼進吳越春秋曰吳公子慶忌吳王僚子也勇捷為人所聞筋力果勁萬人之敵也世說曰桓石虎小字鎮惡常從征枋頭車騎冲沒左右莫能先救宣武問汝叔落賊汝知否虎聞氣甚奮策馬於万眾中置冲還三軍歎服河朔遂以其威時有患瘧者怖之多愈因斷瘧焉燉煌實錄曰宋質直破虜有威名兒啼恐之即止虜, WYG: 矩郭黙}
