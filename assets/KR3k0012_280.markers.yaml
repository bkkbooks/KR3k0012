  - {type: variant, offset: 1000, length: 158, content: 怡峰字景阜遼東人也從征役以驍勇聞當時號為驍將又曰梁武勑蕭續曰賀拔勝北間驍將汝宜慎之又曰郝玼為刺史始玼以臨涇地宜當畜息蕃戎每為寇即屯其地嘗白其帥願以城控之前帥不從其後叚祐為節度使玭復白祐祐多其策乃表請城之故詔玼鎮其地自是西戎無敢犯涇者玼自行間前無強敵在邊上三十年生得蕃人輒刳剔而歸其屍蕃人畏之如神下令得玼者賞以等身金蕃, WYG: 周訪練兵簡卒欲宣力}
