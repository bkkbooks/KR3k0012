  - {type: variant, offset: 2257, length: 2, content: 為蕭, SBCK: 遣太中大夫賜征西吏士死傷者醫藥棺殮大司馬巳下親弔死問疾以崇謙譲又曰耿恭在䟽勒遣軍吏范羗至燉煌迎兵士寒服又曰􅀽紹攻臧洪粮盡主簿啓内厨米三斗稍爲饘粥洪曰何能獨此耶使爲薄粥遍班士衆又殺其愛妾以食兵將咸流涕無能仰視魏書曹公令曰趙奢竇嬰之爲將也受賜千金一朝散之故能濟大功永代流聲吾讀其文未甞不慕其爲人也魏志曹真傳曰真毎征行與將士同勞苦軍賞不足輙以家財頒賜士卒皆願爲用又曰諸葛誕守夀春以司馬氏累丗擅權遂舉兵稱匡輔魏室爲辭司馬文}
