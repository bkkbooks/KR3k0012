  - {type: variant, offset: 2715, length: 266, content: 家後吳將夏詳邵顗等來降二兒之父亦率其屬與俱吳將陳尚潘景來寇祜追斬之美其死節而厚加殯斂景尚子弟迎喪祐以禮遣還吳將鄧香掠夏口祜募生縛香既至宥之香感其恩率部曲而降祜出軍行吳境刈穀為糧皆計所侵送絹償之每會眾江沔遊獵常止晉境若禽獸先為吳人所傷而為晉兵所得者皆封還之於是吳人翕然悅服稱為羊公不之名也祜與陸抗相對使命交通抗稱祜之德量雖樂毅諸葛孔明不能過也抗嘗病祐饋之藥抗服之無疑心士多諫抗抗曰羊祜豈酖人者時談以為華元子反復見於今抗每告其戍曰彼專為德我專為暴是不戰而自服也各保分界而已無求細利孫皓聞二境交和以詰抗抗曰一邑一鄉不可以無信義况大國乎臣不, SBCK: 仁}
