  - {type: variant, offset: 3914, length: 465, content: 荅曰吾受命為彰義軍節度使元惡就擒蔡人即吾人也蔡之父老無不感泣申光之民即時平定又曰李愬襲蔡州既獲李祐又解其縛而客禮之愬乘間常召祐及李忠義屏人而語義亦降將也本名憲愬改之軍中多以諫愬愬益親祐始募敢死者三十人以為突將愬自教習之將襲元濟會雨水自五月至七月所在陂澤潰溢不可行營諸軍皆以愬不殺祐為言慮其誘覆官軍簡牒日至且言得賊諜具事愬無以止之乃持祐泣曰豈天不欲平此賊何爾我一身而見奪於眾口愬亦慮諸軍先以謗聞則不能全之矣乃械祐送京師先表請釋且言必殺祐則無與成功者比至京詔釋以還愬愬喜甚署為散兵馬使授刀佩之夜則倚以巡警或使入愬帳中言事愬因留對舉酒往往達旦竊聽者時聞祐泣涕聲尋署為六院兵馬使說苑曰晉文公伐楚歸國行賞狐偃為首或曰城濮之事先軫之謀文公曰城濮之事偃說我無失信不背三舍之約先軫所謀軍事吾用之以勝然此一時之說偃言萬世之功奈何以一時之利而加萬世功乎是以先之眾人悅服莊子曰市南宜僚弄丸兩家之難解孫叔敖秉羽而郢人投兵彪曰宜僚善弄丸白公脅之弄九如故孫淑敖秉羽之舞郢人無所攻故投兵韓詩外傳曰簡子薨未葬中牟叛之葬五日興師攻之圍未匝而城自壞者十丈襄子擊金而退, SBCK: 勞}
