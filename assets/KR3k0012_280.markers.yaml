  - {type: variant, offset: 527, length: 4, content: 舉國號哭, WYG: 甚得衆情每軍行頓止湏營幔脩立然後就舍帳軍士皆食嵩乃嘗食吏有因事受賄者嵩更以錢物賜之吏懐慚或至自殺又曰馬援討西羗中流矢貫脛帝以璽書勞之賜牛羊數千頭援盡班諸賔客又曰董卓擊漢陽叛羗破之拜郎中賜縑九千疋卓曰為者則已有者則士為功者雖已共有者乃士乃悉分吏兵無所留又曰王覇常與臧宫傅俊共營覇獨善撫士卒有死者脫衣以斂之傷者躬親以養之又曰光武遣大中大夫賜征西吏士死傷者醫藥棺殮大司馬以下親弔死問疾以崇謙讓又曰耿恭在䟽勒遣軍吏范羗至燉煌迎兵士寒服又曰袁紹攻臧洪糧盡主簿啟内厨米三斗稍為饘粥紹曰何能獨此耶使為薄粥遍班士衆又殺其愛妾以食兵將咸流涕無能仰視魏書曹公令曰趙奢竇嬰之為將也受賜千金一朝散之故能濟大功奕代流聲吾讀其文未嘗不慕其為人也}
