  - {type: variant, offset: 2983, length: 391, content: 正是彰其德於祜無傷也又曰羊祜在軍常輕裘緩帶身不被甲鈴閤之下侍衛者不過十數又曰劉道規為荊州刺史桓玄餘黨荀林屯江津桓謙軍屯枝江二寇交逼久絕都邑之問荊楚既桓氏義舊並懷異心道規乃會將士告之曰桓謙今在近畿聞諸君頗有去就之計吾東來文武足以濟事若欲去者本不相禁因夜開城門達曉不閉眾咸憚服莫有去者又曰劉𥙿為將北伐後秦姚泓烏宏反以擅道濟為前鋒至洛陽凡援城破壘俘四千餘人議者謂應以戮為京觀道濟曰伐罪吊民正在今日皆釋而遣之於是戎夷感悅相率歸之者甚眾崔鴻後燕錄曰遣將慕容白曜伐宋無塩城剋之將盡以其人為軍實副將酈範酈音曆也曰齊四履之地號為東秦不遠為經略恐未可定也今皇威始被民無霑澤連城有懷二之將比邑有拒守之失宜先信義示之軌物然後民心可懷二州可定白曜從之進次肥城白曜將攻之範曰肥城雖小攻則淹日得之無益軍聲失之有損威勢且無塩之卒死者塗炭成敗之機足為鑒矣若飛書告喻可不攻自伏縱其不降亦當逃散白曜乃以書曉之肥城果潰也, SBCK: ''}
