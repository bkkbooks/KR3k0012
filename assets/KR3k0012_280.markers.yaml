  - {type: variant, offset: 8, length: 2, content: 李廣, SBCK: 楚人有饋一簞醪者楚莊王投之於河令將士迎流而飲之三軍皆醉又曰趙括爲將母上書曰始妾事其父王所賞賜者盡與軍吏今括一日爲將所賜金視便田宅買之父子異心不可用王不聽遂請曰有所不稱妾得無隨乎王許諾又曰呉起之爲將與士卒最下者同衣食卧不設席暑不張蓋分率勞苦卒有病疽者起爲吮之又曰田横據有齊地漢將韓信灌嬰平齊地横走歸彭越漢滅項籍後横與其徒屬五百餘人入海}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_SBCK_280-2a}
