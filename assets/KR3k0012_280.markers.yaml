  - {type: variant, offset: 11, length: 5, content: 右北平匈奴, SBCK: 隝中隝音島同帝使使赦横罪而召之曰横來大者王小者乃侯大者謂横耳小者謂徒屬不來發兵加誅乃與其客二人乗􅀓詣洛陽至户郷廐置之驛馬之所謂其客曰陛下所以欲見我不過欲一見我靣貌耳陛下在洛陽今斬吾頭馳三十里間形容尚未能敗猶可觀也遂自剄令客奉其頭從使者馳奏之髙祖以王者禮葬横旣葬二客穿其􅃁旁皆自剄餘尚五百人在海中}
