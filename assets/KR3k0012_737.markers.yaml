  - {type: variant, offset: 1931, length: 2, content: 博陵, krp: 臣太公使人甲乙日拔丁侯着頭箭丙丁日拔着口箭戊己日拔着腹箭丁侯病稍愈四夷聞各以來貢異苑曰永嘉陽童孫權時俗師也嘗獨乘船往建寧泊在渚次宵中忽有一鬼來欲擊童因起謂曰誰敢近楊童者鬼卽稽顙云實不知是楊使者童便勑使乘船飛迅駃有過猛帆至縣乃遣之又曰趙侯少好諸術姿形悴陋長不滿數尺以盆盛水閉目作禁魚龍立見侯有白米爲兒所盜乃把刀畫地作獄四面開門向東嘯羣鼠俱到呪曰凡非噉者過去有止者十餘剖腹看藏有米在焉曾徒跣須履因仰頭微吟雙屐自至有笑其形容者便佯説以酒杯向口中卽掩鼻不脫仍稽顙謝過著地不舉永康有騎石山山上有石人騎石馬侯仰指之人馬一時落首今猶在山下神仙傳日嚴靑常從弟子家夜歸都督夜行逢靑呵問何人夜行靑亦厲聲問日汝是何人而夜行都督怒應對不知是青因叱從兵使録夜行人靑亦復叱其從神曰皆縛夜行人靑便去而都督及從者數十人人馬皆不復得去明旦行人見都督問何爲在此都督曰事狀如此行人曰必是嚴公也都督曰我不能得動可報余家家人知之往叩頭啓謝青自説昨宵不知是先生乞得放遣青乃大聲曰解遣昨宵所録夜行人還去都督乃得去其後夜行每見行人先逆問非嚴公乎又曰}
  - {type: variant, offset: 1934, length: 7, content: 納崔陵妹為妃勑, WYG: 方平降蔡經家北舎有陳姓者失其姓字嘗罷尉出聞經家有人乃詣門叩頭乞求拜見方平遣人引前與語此人便得隨從驅使比放蔡經方平曰君且起向日方平從後視之言曰噫君心緒不正終不可教以仙道也當授君以地上主者之職臨去以符併一𫝊着小箱}
  - {type: variant, offset: 1934, length: 1, content: 納, krp: 方平降蔡經家北舎有姓陳者失其字嘗罷尉也聞經家有人乃詣門叩頭求乞拜見方平遣人引前與語此人便乞得隨從驅使比於蔡經方平日君旦起向日方平從後視之言日噫君心敘不正終不可教以仙道也當授君以地上主者之職臨去以符併一傳着小箱中以與陳尉告言此不令君度世也能令君本壽自出百餘歲也可穰災治病者命未終及無罪過者君以符到其家便愈矣若有邪鬼血食作禍崇者君便以符帶此傳以勑社吏當收送其鬼心中亦當知其輕重臨時以意治之陳尉以此符治病有効事之者數百家壽一百一十歳而死後弟子行其符不効也抱朴子日治金創以氣吹之卽斷痛登山蛇虺毒蟲中人在近者就以氣禁之其相遠者或數十里便延治之呯其姓名而呪之男也吹我右手記識其時後校問之皆卽時愈也又有介象者能以氣禁一里中愈居人炊之不得蒸以氣禁樹上羣鳥卽墮地又於茅屋上爨火煑雞熟而茅不燋又禁刀矛以刺人腹以椎打之刃曲而不復入又燒釡正赤而立下乆之不知熱以錢投於沸釡湯中亦探取錢而手不灼能令一市人皆坐不得起幻説文曰幻相詐幻惑幻人從反子周書云無或譸張爲幻後漢書曰永寧元年西南夷撣國王詣闕獻樂及幻人能變化吐火自支解易牛馬頭元㑹在庭作安帝與群臣共觀大奇之又日安帝時作九賔樂有含和賔利之獸從西方來戲于庭入前殿激水化成魚嗽木作霧化成黃龍長八丈岀水遨戲千庭炫熠日光又日解奴辜張貂者亦不知是何郡國人也皆能隱淪出入不由門戸奴辜能變易物形以誑幻人晉書日郭璞將促裝去愛主人婢無由而得乃取小豆三斗繞主人宅散之主人晨起見赤衣人數千圍其家就視則滅甚惡之請郭璞曰君家不冝畜此婢可於東南二十里賣之愼勿爭價則此妖可除也主從之璞陰令人賤買此婢復爲符投井中數千赤衣人皆反縛一一自投于井主人大恱璞攜婢而去後魏書曰恱般國眞君九年遣使朝貢并送幻人稱能割人喉脉令斷擊人頭令碎陷皆血出淋落數升或盈斗以草藥令嚼咽之須臾血止世祖恐言是虛乃取死囚試之皆驗}
  - {type: variant, offset: 1936, length: 50, content: 陵妹為妃勑中使曰好作法用勿使崔家笑人婚夕顯祖舉酒祝曰新婦宜男孝順富貴陵奏曰孝順出自臣門富貴恩由陛下尸, SBCK: ''}
  - {type: variant, offset: 1936, length: 5, content: 陵妹為妃勑, krp: 鴻北涼録曰玄始十四年七月西域貢吞刀吐火秘幻奇伎北齊書曰由吾道榮琅琊人也初晉陽有人甚明法術爲人傭力無識知者道榮聞之訪得其人以道榮好尚將法授之謂道榮曰我本恒山仙人有罪爲天官所謫今限滿將歸鄉里卿且送吾至于汾水及至汾河值水暴至其人乃臨水禹歩以一符投水}
