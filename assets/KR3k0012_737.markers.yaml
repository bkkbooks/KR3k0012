  - {type: variant, offset: 2090, length: 1, content: 出, krp: 不見舉家惶怖不知所在開裝器忽然見父母在澤壺中不知何由復往請之其人云君當更作千人飲食以飴百姓窮者當時便作父母在床也幽明録曰安城人俗巫也善於幻術每至祠神時擊鼔宰三牲積薪燃火盛熾束帶入火中章𥿄燒盡而開形體衣服猶如初時王凝之為江祠王當酒行爲王刷頭簪荷葉爲帽與王亦當不覺有異到坐之後荷葉乃見}
