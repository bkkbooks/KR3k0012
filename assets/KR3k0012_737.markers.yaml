  - {type: variant, offset: 1995, length: 2, content: 使公, WYG: 淮南王好方士皆以術見遂後畫地為江河攝土為山岳􅐵呼為寒暑噴嗽為雨露王亦卒與諸方士俱去異􅁐曰高陽新城叟晉咸寧中為涇祠妖幻置署百官又以水自鑒輒見所署置之人衣冠麗然百姓信惑京都翕集收而斬之又曰上虞孫溪奴多諸幻伎元嘉初叛建安中復出民間治人頭風流血滂沲噓之便斷創又即歛虎傷􅉬噬煩毒乗死禁䕶皆差向空長笑則群鵲來萃夜呪蚊虻悉皆死倒至十三年於長山為本主所得知有術慮必亡叛的鏁枷極為重複明日已失所在搜神記曰永嘉中有夫空胡人來渡江南其人有數術能斷舌復續之吐火所在人士聚觀試其斷時先以舌示賔客然後刀截血流覆地乃以置器中傳以示人視之舌頭半舌猶在既而還取續之坐有頃坐人見舌則如故不知其實斷否其續斷取絹布與人各執一頭對剪一斷之已而兩叚合将視之則復還連絹}
