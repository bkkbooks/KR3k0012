  - {type: 'tls:seg', offset: 3411, content: '', id: KR3k0012_CHANT_737-29a.9}
  - {type: variant, offset: 3412, length: 0, content: '', SBCK: 下詔曰如聞在外有婆羅門胡等每於戲處乃將劒刺肚以刀割舌幻惑百姓極非道理冝並遣發還蕃勿}
  - {type: variant, offset: 3413, length: 0, content: '', SBCK: 乆住仍約束邊州若更有此色並不須遣入朝金樓子曰周穆王時西極有化人入水火貫石及山川移城邑秉虛不墜觸實不礙千變萬化不可窮極穆王爲起中天之臺鄭衛奉承雲之樂日日獻玉衣月月薦玉食幻人猶不肯舎乃攜玉至幻人宫稱以金銀絡以珠玉鼻口所納皆非常人閒物也由是王心厭宫室幻人曰易之耳王恱遂肆志遠遊西京雜}
  - {type: page-break, offset: 3413, content: '', id: KR3k0012_SBCK_737-6a}
  - {type: variant, offset: 3414, length: 2, content: 其日, SBCK: 曰余所知有鞠道龍善爲幻術向余說古事有東海人黃公少}
  - {type: punctuation, offset: 3417, content: 。, id: KR3k0012_CHANT_737-bkkpn1034}
  - {type: 'tls:seg', offset: 3417, content: '', id: KR3k0012_CHANT_737-29a.10}
  - {type: variant, offset: 3417, length: 14, content: 客後有從蜀都來云是日大火有黑, SBCK: 爲幻能刺虵御虎佩赤金爲刀以絳繒束髪立興}
  - {type: punctuation, offset: 3424, content: ，, id: KR3k0012_CHANT_737-bkkpn1035}
