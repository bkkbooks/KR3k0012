  - {type: variant, offset: 71, length: 2, content: 六辭, SBCK: 者知誤也炳乃張蓋坐其中長􅀏呼風亂流而濟吳志曰賀齊討山賊中有善禁者每當交戰官軍刀劒皆不得拔弓弩射矢皆還自向輒致不利齊有長思乃曰吾聞金有刃者可禁蟲有毒者可禁其無刃毒則不可禁彼必能禁吾兵也必不能禁無刃物矣乃多作勁木棓選勇力精卒五千人爲先登盡捉棓彼山賊恃其善禁不嚴備於是官軍}
