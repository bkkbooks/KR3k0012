  - {type: variant, offset: 1993, length: 1, content: 祝, WYG: 少時為幻能刺􅉬御虎佩赤金為刀以綘繒束髪立興雲霧坐成山河及衰老氣力嬴憊飲酒過度不能復行其術又}
