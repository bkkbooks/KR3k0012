  - {type: variant, offset: 575, length: 1348, content: 蕃祉老壽者為信君使也其言於鬼神其適遇淫君內外傾邪上下怨疾動作辟違從欲厭私高臺深池撞鍾舞女斬刈民力輸掠其聚以成其違不恤後人暴虐淫縱肆行非度無所還忌不思謗言不憚鬼神神怒民痛無悛於心其祝史薦信是言罪也其蓋失數美是矯誣也進退無辭則虛以求媚是以鬼神不饗其國以禍之祝史與焉所以夭昏孤疾者為暴君使也其言僣嫚於鬼神公曰然則若之何對曰不可為也言非誅祝史所能治山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之縣鄙之人人從其政福介之關暴征其私丞嗣大夫強易其賄布常無藝徵歛無度宮室日更淫樂不違內寵之妾肆奪於市外寵之臣僣令於鄙私欲養求不給則應人民苦病夫婦皆詛祝有益也詛亦有損聊攝以東姑尢以西其為人也多矣雖其善祝豈能勝億兆人之詛君若誅於祝史脩德而後可公說使有司寬政毀關去禁薄歛責己又曰衛太子禱曰曾孫蒯聵敢昭告皇祖文王烈祖康叔文祖襄公鄭勝亂從晉午在難不能治亂使鞅討之蒯聵不敢自佚備持矛焉敢告無絕筋無折骨無面傷以集大事無作三祖羞大命不敢請佩玉不敢愛韓詩外傳曰齊桓公至海丘見封人曰尒何為者也對曰臣海丘封人也桓公曰叟年幾何曰臣八十有三矣桓公曰美哉壽也叟盍為寡人壽也對曰野臣不知為君王之壽桓公曰盍叟之壽祝寡人封人奉觴再拜曰使吾君罔壽金玉之賤人民是寶桓公曰善哉祝乎叟盍復祝乎封人曰使吾君好學而不惡問賢者在側諫者得入桓公曰善哉祝乎封人曰無使群臣百姓得罪於吾君亦無使吾君得罪於群臣百姓桓公不悅曰此言非夫前二言之善也叟其革之封人瀾然涕下曰願與吾君終言之此言乃夫前二言之上也臣聞子得罪於父母可因姑姊妹而謝也父乃赦之臣得罪於君可因便僻之左右而謝也君乃赦之昔桀得罪於湯紂得罪於武王此君得罪於臣也至今未有為謝者公曰善扶而載之自御以歸禮外篇成王冠周公使祝雍曰辭達而已勿多也祝雍曰近於民遠於佞近於義嗇於時惠於財任賢使能陛下摛顯先帝之光耀以承皇天之嘉祿欽順仲春之吉日遵並大道邦域康阜萬福之休靈始加昭明之元服推遠邪佞之忠弘積文武之龍德肅勤高祖之清廟六合之內靡不蒙德永永與天無極又曰大夫成群立社祝曰今某月日君為某立社社祭上而主陰氣也五穀用成萬民以生敢用肥豚嘉蔬清酒敬致大神自今日已來祈請止雨惟靈是聽子孫眉壽萬神含靈止雨祝曰天生五穀以養人民今天雨不止用傷五穀如何神靈而行而止殺牲以賽神靈雨則不止鳴鼓攻之朱緣繩索而脅之史記曰楚大發兵如齊齊王使淳于髡之趙請救兵遺金百斤車馬十駟淳于髡仰天大笑冠纓索絕王曰先生少之髡曰何敢王曰笑豈有說乎髡曰今者臣從東方來見道傍有禳田者操一豚蹄酒一盂而祝曰甌窶滿篝甌窶猶桮樓也言豐年採掇易滿篝籠也篝音汙耶滿車汙耶下地有薪草也五穀蕃熟穰穰滿家臣見其所持者狹而所欲者奢故笑之吳越春秋曰勾踐五年夏五月將與大夫種范蠡入臣於吳群臣皆送臨水祖道大夫種前為祝其辭曰皇天祐助先沉後揚禍為德根憂為福嘗威人者滅服從者昌王雖牽致其後無殃君臣生離感動上皇眾夫哀悲莫不感傷臣謹再拜伏稱萬歲上洒三觴勾踐仰天大息舉杯垂涕嘿無所言宋書曰王悅之宋明帝泰始中為黃門郎上以其廉介賜良田五頃以為侍中在門下盡心力檢校御府太官太醫諸署時承奢忲之後奸竊者眾悅之案意刻覆無所避得奸巧甚多於是眾署共呪詛悅之病甚恒見兩烏衣人捶之及卒上乃收典掌者十許人桎梏之送淮陰密令渡瓜步江投之中流北史曰後魏時有沙門惠憐自云呪水飲人能差諸病病人就之者日有千數靈太后詔給衣食事力使於西南療百姓, SBCK: 瘳}
