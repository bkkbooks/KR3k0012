  - {type: variant, offset: 62, length: 3, content: 掌六祈, SBCK: 徐登萬者閩中人也本女子化爲丈夫善爲巫術又日趙炳字公阿東陽人能爲越方時遭兵亂疾疫大起二人遇於烏溪水之上酈元長注水經曰吳寧溪岀吳寧縣烏傷之烏傷溪在今婺州義烏縣東也遂結言約共}
