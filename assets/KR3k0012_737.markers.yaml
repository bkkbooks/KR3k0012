  - {type: variant, offset: 1995, length: 2, content: 使公, krp: 髙陽新城叟晉咸寧中爲淫祠妖幻署置百官又以木自鑒輒見所署置之人衣冠麗然百姓信惑京都翕習收而斬之又日上虞孫湲奴多諸幻伎元嘉初叛建安中復岀民閒治人頭風流血滂沲嘘之便斷創又即歛虎傷虵噬煩毒乘死禁護皆差向空長嘯則群雀來萃夜呪蚊虻悉皆死於側至三十年於長山爲本主所得知有術慮必亡叛約縛枷鏁極爲重複明日已失所在搜神記日永嘉中有天竺胡人來渡江南其人有數術能斷舌復續之吐火所在人士聚觀試其斷時先以舌示賔客然後刀截血流覆地乃取置器中傳以示人視之舌頭半舌猶在旣而選取續之坐有頃坐人見舌則如故不知其實斷否其續斷取絹布與人各執一頭對剪一斷之已而兩叚合將視之則復還連絹}
  - {type: variant, offset: 1998, length: 1, content: 忘, WYG: 異故時人多疑以為幻隂乃試之其所絹也其吐火先有藥}
