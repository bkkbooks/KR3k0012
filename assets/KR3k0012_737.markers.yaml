  - {type: variant, offset: 1927, length: 1, content: 婁, krp: 崔子武季舒之族孫也幼時宿於外祖揚州刺史趙郡李憲家一夜夢一女姿色甚麗自云封龍王女願與崔郞私通子武悅之牽其衣裙微有裂綻未曉告辭結帶而別至明訪問乃是山神遂往祠中觀之傍畫女容狀卽夢中見者裂裙尙存結帶猶在子武自是通夢忽恍成疾後逢醫禁之乃絕隋書曰張文詡常有腰疾㑹醫者自言善禁文詡令禁之遂爲刃所傷至於頓伏牀枕醫者叩頭請罪文詡遽遣之唐書曰葉法善嘗於東都凌空觀設壇醮祭城中士女競往觀之俄頃數十人自投於火中觀者大驚救之而免法善曰此皆魅病於吾法所攝耳問之果然法善悉爲禁劾其病遂愈六韜曰武王代殷丁侯不朝}
  - {type: variant, offset: 1929, length: 1, content: 后, WYG: 公乃畫丁侯於䇿三箭射之丁侯病困卜者占云祟在周恐懼乃請舉國}
  - {type: variant, offset: 1929, length: 1, content: 后, krp: 公乃畫丁侯於筞三箭射之丁侯病困卜者占云祟在周恐懼乃請舉國}
  - {type: variant, offset: 1931, length: 2, content: 博陵, WYG: 臣太公使人甲乙日拔丁侯着頭箭丙丁拔着口箭戊己日拔着腹箭丁侯病稍愈四夷聞各以來貢異􅁐曰永嘉陽童孫權時俗師也嘗獨乘舩往建寧泊在渚次宵中忽有一鬼來欲擊童因起謂曰誰敢近陽童者鬼即稽顙云實不知是陽使者童便􅃯使乗舩舩飛迅駃有過猛㠶至縣乃遣之又曰趙侯少好諸術姿形悴陋長不滿數尺以盆盛水閉目作禁魚龍立見侯有白米為䑕所盗乃把刀畫地作獄四面開門向東嘯羣䑕俱到呪曰凢非噉者過去有止者十餘剖腹㸔藏有米在焉㑹徒跣須履因仰頭㣲吟雙屐自至有笑其形容者便徉説以酒打向口中即掩鼻不脱仍稽顙謝過着地不舉永康有騎石山山上有石人騎石馬侯仰指之馬一時落首今猶在山下神仙𫝊曰嚴青常從弟子家夜歸都督夜行逢青呵問何人夜行青亦厲聲問曰汝是何人而夜行都督怒不知是青因叱從兵使録夜行人青亦復叱其從神曰皆縳夜行人青便去而都督及從者數十人人馬皆不復得去明旦行人見都督問何謂在此都督白事状如此行人曰必是嚴公也都督曰我不能得動可報余家家人知之往叩頭啓謝青自説昨宵不知是先生乞得放遣青乃大聲曰解遣昨宵所録夜行人還去都督乃得去其後夜行每見人行先通問非嚴公乎又曰}
