  - {type: variant, offset: 4, length: 0, content: '', WYG: 八禁後漢書曰章帝時有夀光侯者夀姓也風俗通云夀於姚吳大夫能劾百鬼衆魅令自縳見形其鄉人有婦為魅病侯為劾之得大蛇數丈死於門外又有神樹人止者輒死鳥過者必墜侯復劾之樹盛夏枯落見大蛇長}
