  - {type: variant, offset: 2039, length: 0, content: '', WYG: 數里樹下住食擔人呼共食云我自有食不肯出止住籠中飲食器物羅列肴膳豐腆亦辦乃呼擔人食來未半語擔人我欲婦共食腹中吐出一女子年二十許衣裳容貎甚美二人共食食欲竟其夫便卧婦語擔人曰我有外夫欲來共食夫覺君勿道之婦便口中吐出一年少丈夫食籠中便有三人寛急之事亦復不異有頃其夫動如欲覺婦便以外夫内口中夫起語擔人曰可去即以婦内口中吹及食物此人既至國中}
  - {type: page-break, offset: 2039, content: '', id: KR3k0012_WYG_737-12a, image: WYG0899/WYG0899-0499a.png}
  - {type: variant, offset: 2039, length: 0, content: '', krp: 數里樹下住食擔人呼共食云我自有食不肯岀止住籠中飲食器物羅列肴饍豐腆亦辨乃呼擔人來食未半語擔人我欲婦共食腹中吐出一女子年二十許衣裳容皃甚美二人共食食欲竟其夫便卧嬌語擔人云我有外夫欲來共食夫覺君勿道之婦便口中出一年少丈夫食籠中便有三人寬急之事亦復不異有頃其夫動如欲覺婦便以外夫內口中夫起語擔人曰可去卽以婦內口中次及食器物此人旣至國中}
  - {type: variant, offset: 2041, length: 6, content: 絕澗窈然無底, SBCK: 􅀑來欲擊童因起謂曰誰敢近楊童者鬼卽稽顙云實不知是楊使者童便勑使乘船飛迅駃有過猛帆至縣乃遣之又曰趙侯少好諸術姿形悴陋長不滿數尺以盆盛水􅐬目作禁魚龍立見侯有白米爲兒所盜乃把刀畫地作獄四面開門向東嘯羣鼠俱到呪曰凡非噉者過去有止者十餘剖腹看藏有米在焉曾徒跣須履因仰頭微吟􅀟屐自至有􅀏其形容者便佯説以酒杯向口中卽掩鼻不脫仍稽顙謝過著地不舉永康有騎石山山上有石人騎石馬侯仰指之人馬一時落首今猶在山下神仙傳日嚴靑常從弟子家夜歸都督夜}
