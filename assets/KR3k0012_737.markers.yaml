  - {type: variant, offset: 372, length: 201, content: 多在梁丘據與裔款言於公曰吾事鬼神豐於先君有加矣今君疾病為諸侯憂是祝史之罪也諸侯不知其謂我不敬君盍誅於祝固史嚚以辭賓公說先告晏子曰日宋之盟屈建問范會之德於趙武趙武曰夫子家事治言於晉國竭情私其祝史祭祝陳信不媿其家事無猜其祝史不祈建以語康王曰神人無怨宜夫子之光輔五君以為諸侯主也公曰據與款謂寡人能事鬼神欲誅於祝史子稱是語何對曰若有德之君內外不廢上下無怨動無違事其祝史薦信媿心矣是以鬼神用饗國受其福祿祝史與焉其, SBCK: ''}
