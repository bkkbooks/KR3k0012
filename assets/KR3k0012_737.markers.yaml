  - {type: punctuation, offset: 3532, content: 『, id: KR3k0012_CHANT_737-bkkpn1064}
  - {type: variant, offset: 3532, length: 3, content: 臨武縣, SBCK: 太元十二年有道人外國來解吞刀吐火珠玉金銀􅀃其所受術師曰衣非沙門也行見一人擔擔上有小籠子可受升餘語擔人云吾步行疲極欲寄君擔擔人甚恠之慮是狂人便語之云自可爾君欲何許自厝耶其人荅云若見許正欲入籠子中籠不便擔人逾恠之乃下擔入龍中籠更不大其人亦不更小擔之亦不覺重於先旣行數里樹下住食擔人呼共食云我自有食不肯岀止住籠中飲食器物羅列肴饍豐腆亦辨乃呼擔人來食未半語擔人我欲婦共食腹中吐出一女子年二十許衣裳容皃甚美二人共食食欲竟其夫便卧嬌語擔人云我有外夫欲來共食夫覺君勿道之婦便口中出一年少丈夫食籠中便有三人寬急之事亦復不異有頃其夫動如欲覺婦便以外夫內口中夫起語擔人曰可去卽以婦內口中次及食器物此人旣至國中有一家大富資財巨萬而性慳悋語擔人云試爲君破慳卽至其家有好馬甚珍之繫在柱上忽}
  - {type: page-break, offset: 3532, content: '', id: KR3k0012_SBCK_737-7b}
  - {type: variant, offset: 3536, length: 0, content: '', SBCK: 去尋索不得明日見馬在五升甖中終不可破便語君作百人㕑以周一窮乏馬得岀耳主人即作之畢馬還在柱下明早其父母在堂上忽然不見舉家惶怖不知所在開裝器忽然見父母在澤壺中不知何由復往請之其人云君當更作千人飲食以飴百姓窮者當時便作父母在床也幽明録曰安城人俗巫也善於幻術每至祠神時擊鼔宰三牲積薪燃}
  - {type: punctuation, offset: 3537, content: ，, id: KR3k0012_CHANT_737-bkkpn1065}
  - {type: 'tls:seg', offset: 3537, content: '', id: KR3k0012_CHANT_737-31a.8}
  - {type: variant, offset: 3537, length: 1, content: 以, SBCK: 盛熾束帶入火中章􅁓燒盡而開形體衣服猶如初時王凝之為江祠王當}
  - {type: page-break, offset: 3537, content: '', id: KR3k0012_SBCK_737-8a}
