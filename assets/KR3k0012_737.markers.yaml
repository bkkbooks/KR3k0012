  - {type: variant, offset: 3526, length: 2, content: 司問, SBCK: 天竺胡人來渡江南}
  - {type: variant, offset: 3529, length: 0, content: '', SBCK: 人有數術能斷舌復續之吐火所在人士聚觀試其斷時先以舌示賔客然後刀截血流覆地乃取置器中傳以示人視之舌頭半舌猶在旣而選取續之坐有頃坐人見舌則如}
  - {type: punctuation, offset: 3530, content: ，, id: KR3k0012_CHANT_737-bkkpn1062}
  - {type: 'tls:seg', offset: 3530, content: '', id: KR3k0012_CHANT_737-31a.6}
  - {type: variant, offset: 3530, length: 0, content: '', SBCK: 不知其實斷否其續斷取絹布與人各執一頭}
  - {type: variant, offset: 3531, length: 0, content: '', SBCK: 剪一斷之已而兩叚合將視之則復還連絹無異故體時人多疑以爲幻隂乃試之眞斷絹也其吐火先有藥在器中取一片與黍餹合之再三吹呼已而張口火滿口中因就􅅡取以爨則火也又取書􅁓及繩縷之屬投火中衆共視之見其燒燃消糜乃盡及舉而岀之故向物也靈􅀑志}
  - {type: page-break, offset: 3531, content: '', id: KR3k0012_SBCK_737-7a}
