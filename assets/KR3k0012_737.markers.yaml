  - {type: punctuation, offset: 3398, content: 『, id: KR3k0012_CHANT_737-bkkpn1030}
  - {type: variant, offset: 3398, length: 0, content: '', SBCK: 我本􅁪山仙人有罪爲天官所謫今限滿將歸鄉里􅀸且送吾至于汾水及至汾河值水暴至其人乃臨水禹歩以一符投水中流便絶徐自沙石上渡河而去道榮嘗至遼陽山中夜逢猛獸以杖畫地}
  - {type: variant, offset: 3399, length: 11, content: 都市火甚盛因含水西向漱, SBCK: 大坑猛獸逐走唐書曰顯慶元年上御安福門樓觀大酺胡人欲持刀自刺以爲幻戲上不許}
  - {type: punctuation, offset: 3404, content: 。, id: KR3k0012_CHANT_737-bkkpn1031}
  - {type: punctuation, offset: 3404, content: 』, id: KR3k0012_CHANT_737-bkkpn1032}
