  - {type: variant, offset: 3670, length: 212, content: 日夜見天文及四鄰不復有屋舍籬障有妾死已久亦見其形與語如平生念思方信道術又曰李阿者行道逢奔車阿兩腳中車腳即折弟子古弼見之驚怖阿須臾取斷腳相續如故也淮南萬畢術曰慈石提棊取雞磨針鐵以相和慈石棊頭置局上自相投也又曰鵲腦令人相思取雌雄鵲各一燔之四通道丙寅日與人共飲酒置腦酒中則相思也又曰老槐生火膠撓水則清弊箕止醎取箕以內醫中鹹著箕矣又曰首澤浮針取頭中垢以塗針塞其孔置水即浮又曰燒角入山則虎豹自遠惡其臭也又曰赤布在戶婦人留連取婦人月事布, SBCK: 三十}
