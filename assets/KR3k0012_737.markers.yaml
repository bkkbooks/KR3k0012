  - {type: variant, offset: 1993, length: 1, content: 祝, krp: 少時爲幻能刺虵御虎佩赤金爲刀以絳繒束髪立興雲霧坐成山河及衰老氣力羸憊飲酒過度不能復行其術又日淮南王好方土皆以術見遂後畫地爲江河攝土爲山嶽􅐵呼爲寒暑噴嗽爲雨露王亦卒與諸方士俱去異苑}
