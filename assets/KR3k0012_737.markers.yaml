  - {type: variant, offset: 1927, length: 8, content: 婁太后為博陵王納, SBCK: ''}
  - {type: variant, offset: 1927, length: 1, content: 婁, WYG: 崔子武季舒之族孫也㓜時宿於外祖揚州刺史趙郡李憲家一夜夢一女姿色甚麗自云封龍王女願與崔郎私通子武悦之牽其衣裙㣲有裂綻未曉吿辭結帶而别至明訪問乃是山神遂往祠中觀之傍畵女容狀即夢中見者裂裙尚存結帶猶在子武自是通夢恍惚成疾後逢醫禁之乃絶隋書曰張文詡常有腰􅍚㑹醫者自言善禁文詡令禁之遂為刃所傷至於頓伏􅇃枕醫者叩頭請罪文詡遽遣之唐書曰葉法善嘗於東都凌空觀設壇醮祭城中士女悉往觀之俄頃數十人自投於火中觀者大驚救之而免法善曰此皆魅病吾以法攝之耳問之果然法善悉為禁劾其病遂愈六韜曰武王伐殷丁侯不朝}
  - {type: page-break, offset: 1927, content: '', id: KR3k0012_WYG_737-4a, image: WYG0899/WYG0899-0494c.png}
