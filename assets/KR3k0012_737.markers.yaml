  - {type: variant, offset: 2574, length: 1010, content: 案明帝起居注東巡太山到滎陽有烏飛鳴乘車上虎賁王吉射之中而祝曰烏鳴啞啞引弓射洞右腋陛下壽萬歲臣為二千石明帝賜錢二百萬世說曰劉靈嗜酒其婦止之靈祝曰天生劉靈以酒為名一飲一斛五㪷解酲婦人之言慎不可聽蔡邕祖餞祝曰令歲淑月日吉時良爽應孔嘉君當遷行神龜吉兆休氣煌煌著卦利貞天見三光鸞鳴噰噰四牝彭彭君既升輿道路開張風伯雨師灑道中央陽遂求福蚩尢辟兵倉龍夾轂白虎扶行朱雀道引玄武作侶勾陳居中厭伏四方君往臨邦長樂無疆符黃帝出軍訣曰昔者蚩尢揔政無道殘酷無己黃帝討之於涿鹿之野暴兵中原黃帝仰天歎息愀然而睡夢西王母遣人披玄狐之裘以符受之曰太一在前天一備後得兵契信戰則剋矣黃帝悟思其符立壇請而祈之祭以太牢用求神祐須臾玄龜巨鼇銜符出從水中置壇中而去黃帝再拜稽首親自受符視之乃所夢也於是黃帝佩之以攻即日擒蚩尢龍魚河圖曰玄女出兵符付黃帝制蚩尢葛仙公別傳曰仙公丹書符投江中順流而下次又投一符逆流而上次投一符不上不下停住水中而向二符皆還就之神仙傳曰漢章帝問劉馮殿下有怪常有朱衣被髮持燭相隨而走為可劾不馮曰可帝因使人偽為之馮以符擲之使人頓地帝驚曰以相試耳乃解之又曰仙人帛和弟子孫真舅氏當葬路遠不得車馬和以一函符與真誡曰汝持此行二十里當有以車牛給汝者又有廚供不可發此函真行果有一少年御一車牛給真并送酒食即到舅家以函著衣箱中真弟不知發函函有紙畫車牛一人御之因失車牛所在列仙傳曰涓子釣於河澤得符於鯉魚腸中續搜神記曰吳猛字世雲有道術狂風暴起猛擲符上便有一飛鳥接符去須臾風靜人問之荅云南湖有遭此風者兩舫人是道士呼天求救故符以止風抱朴子曰劉安君用藥及符能令人含笑則為婦人蹙面則為老夫踞地則為小兒葛洪神仙傳曰葛玄見賣大魚者謂曰暫煩此魚往河伯處魚主曰魚已死玄曰無苦乃丹書紙內魚口中投水有頃魚化禁而飛術後漢書曰郭憲字子橫建武七年伐張堪為光祿動從駕南郊憲在位忽乃向東北含酒三噀埤蒼曰噀也音執法奏為不敬詔問其故憲對曰齊國失火故以厭之比後齊果有火災與郊同日又曰樊英字季齊善風角筭河洛七緯常有暴風從西方來起英謂學者曰成都市火甚盛因含水西向漱之乃令記其日時客後有從蜀都來云是日大火有黑雲卒從東起須臾大雨火遂得滅於是天下稱其術藝邵氏家傳曰邵信臣為少府南陽遭火燒數萬人信臣時在丞相匡衡坐心動含酒東向漱之遭火處見雲西北來冥晦大雨以滅火雨中酒香桂陽列仙傳曰成武丁正且大會以酒沃廷中有司問其故對曰臨武縣失火以酒救之遣騎果然神仙傳曰欒巴為尚書正旦會得酒西南漱云成都失火作雨救之後使至果如其言抱朴子曰外國, WYG: ''}
