  - {type: variant, offset: 3393, length: 1, content: 英, SBCK: 見赤衣人數千圍其家就視則滅甚惡之請郭璞曰君家不冝畜此婢可於東南二十里賣之愼勿爭價則此妖可除也主從之璞陰令人賤買此婢復爲符投井中數千赤衣人皆反縛一一自投于井主人大恱璞攜婢而去後魏書曰恱般國眞君九年遣使朝貢并送幻人稱能割人喉脉令斷擊人頭令碎陷皆血出淋落數升或盈斗以草藥令嚼咽之須􅁷血止世祖恐言是虛乃取死囚試之皆驗崔鴻北涼録曰􅀇始十四年七月西域貢吞刀吐火秘幻奇伎北齊書曰由吾道榮琅琊人也初晉陽有人甚明法術爲人傭力無識知者道榮聞之訪得其人以道榮好尚將法授之}
  - {type: page-break, offset: 3393, content: '', id: KR3k0012_SBCK_737-5b}
  - {type: variant, offset: 3395, length: 1, content: 學, SBCK: 道}
  - {type: variant, offset: 3396, length: 1, content: 者, SBCK: 榮}
