  - {type: punctuation, offset: 2162, content: 《, id: KR3k0012_CHANT_737-bkkpn636}
  - {type: variant, offset: 2163, length: 409, content: 書曰湯見設網者四面張網而祝之曰自天下者自四方至者皆羅我網湯曰嘻盡之矣非桀其孰能如此合去三面教之曰蛛蝥作網今之人脩緒欲左者左欲右者右欲高者高欲下者下吾請受其犯命者民聞之曰德及禽獸而況我乎於是下親其上說苑曰齊遣淳于髡到楚為人短小楚王甚薄之謂曰齊無人耶而使子來子何長也對曰臣無長腰中七尺之劍欲斬無狀王曰止吾但戲子耳即與髡曰飲酒謂髡曰吾有仇在吳國子定能為報之乎對曰來見道傍鄙民持一頭魚上田祝曰上得萬木下得千斛臣竊笑之以為禮薄而辭多祭輕而望重王今與吾半日之樂而委以吳王非其計楚王嘿然新序曰中行寅將軍召其大祝而欲加罪曰子為我祝辭令不精耶犧牲不肥澤也威儀不謹敬耶齋戒不潔清也乃使吾國將亡何也祝簡對曰昔吾先君中行密子有車十乘不憂其薄憂其德義之不足也今之主君有車百乘不憂德義之薄唯患車之不足也且船車飭則賦斂厚賦斂厚則民怨而謗詛矣君苟以為祝之有益於國則謗詛亦將為亡矣一人祝之一國詛之一人祝不勝萬人詛國亡不亦宜乎祝其何罪中行子默然而慚風俗通, WYG: ''}
