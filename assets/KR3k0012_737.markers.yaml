  - {type: variant, offset: 3471, length: 3, content: 信臣時, SBCK: 頭風流血滂沲嘘之便斷創又即歛虎傷虵噬煩毒乘死禁護皆差向空長嘯則群雀來萃夜呪蚊虻悉皆死於側至三十年於長山爲本主所得知有術慮必亡叛約縛枷鏁極爲重􅃨明日已失所}
  - {type: variant, offset: 3475, length: 49, content: 丞相匡衡坐心動含酒東向漱之遭火處見雲西北來冥晦大雨以滅火雨中酒香桂陽列仙傳曰成武丁正且大會以酒沃廷, SBCK: 搜神記日永嘉}
