  - {type: variant, offset: 3457, length: 1, content: 邵, SBCK: 髙陽新城叟晉咸寧中爲淫祠妖幻署置百官又以木自鑒輒見所署置之人衣冠麗然百姓}
  - {type: variant, offset: 3459, length: 11, content: 臣為少府南陽遭火燒數萬, SBCK: 惑京都翕習收而斬之又日上虞孫湲奴多諸幻伎元嘉初叛建安中復岀民閒治}
