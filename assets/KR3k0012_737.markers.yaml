  - {type: variant, offset: 2048, length: 0, content: '', SBCK: 逢靑呵問何人夜行靑亦厲聲問日汝是何人而夜行都督怒應對不知是青因叱從兵使録夜行人靑亦復叱其從神曰皆縛夜行人靑便去而都督及從}
  - {type: variant, offset: 2049, length: 9, content: 恃山為道魚貫相連忽, SBCK: 數十人人馬皆不復得去明旦行人見都督問何爲在此都督曰事狀如此行人曰必是嚴公也都督曰我不能得動可報余家家人知之往叩頭啓謝青自説昨宵不知是先生乞得放遣青乃大聲曰解遣昨宵所録夜行人還去都督乃得去其後夜行每見行人先逆問非嚴公乎又曰王方平降蔡經家北舎}
  - {type: variant, offset: 2052, length: 5, content: 道魚貫相連, WYG: 君破慳即至其家有好馬甚珍之繫在柱上}
