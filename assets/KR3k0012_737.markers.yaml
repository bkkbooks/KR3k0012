  - {type: variant, offset: 2034, length: 0, content: '', SBCK: 祖揚州刺史趙郡李憲家一夜夢一女姿色甚麗自云封龍王女願與崔郞私通子武悅之牽其衣裙微有裂綻未曉告辭結帶而別至明訪問乃是山神遂往祠中觀之傍畫女容狀卽夢中見者裂裙尙存結帶猶在子武自是通夢忽恍成疾後逢醫禁之乃絕隋書曰張文詡常有腰疾㑹醫者自言善禁文詡令禁之遂爲刃所傷至於頓伏牀枕醫者叩頭請罪文詡遽遣之唐書曰葉法善嘗於東都凌空觀設壇醮祭城中士女競往觀之俄頃數十人自投於火中觀者大驚救之而免法善曰此皆魅病於吾法所攝耳問之果然法善悉爲禁劾其病遂愈六韜曰武王代殷丁侯不朝太公乃畫丁侯於筞三箭射之丁侯病困卜者占云祟在周恐懼乃請舉}
  - {type: page-break, offset: 2034, content: '', id: KR3k0012_SBCK_737-3a}
  - {type: variant, offset: 2035, length: 2, content: 深山, SBCK: 為臣太公使人甲乙日拔丁侯着頭箭丙丁日拔着口箭戊己日拔着腹箭丁侯病稍愈四夷聞各以來貢異苑曰永嘉陽童孫權時俗師也嘗獨乘船往建寧泊在渚次宵}
  - {type: variant, offset: 2035, length: 2, content: 深山, WYG: 來解吞刀吐火珠玉金銀説其所受師曰白非沙門也行見一人擔擔上有小籠子可受升餘語擔人云吾歩行疲極欲寄君擔擔人甚怪之慮是狂人便語之云自可爾君欲何許自厝耶其人答云若見許正欲入籠子}
  - {type: page-break, offset: 2035, content: '', id: KR3k0012_WYG_737-11b, image: WYG0899/WYG0899-0498d.png}
  - {type: variant, offset: 2035, length: 2, content: 深山, krp: 來解吞刀吐火珠玉金銀說其所受術師曰衣非沙門也行見一人擔擔上有小籠子可受升餘語擔人云吾步行疲極欲寄君擔擔人甚恠之慮是狂人便語之云自可爾君欲何許自厝耶其人荅云若見許正欲入籠子}
