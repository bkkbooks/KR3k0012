  - {type: variant, offset: 3451, length: 5, content: 藝邵氏家傳, SBCK: 又日淮南王好方土皆以術見遂後畫地爲江河攝土爲山嶽􅐵呼爲寒暑噴嗽爲雨露王亦卒與諸方士俱去異苑}
