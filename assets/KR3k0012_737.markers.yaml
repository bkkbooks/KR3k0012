  - {type: variant, offset: 67, length: 1, content: 鬼, SBCK: 志旦可試各所能登乃禁溪水水爲不流炳復次禁枯樹樹卽生荑易曰枯楊生荑王弼注云荑者楊之秀也二人相視而􅀏共行其道焉登年長炳師事之貴尚清儉禮}
  - {type: variant, offset: 67, length: 1, content: 鬼, WYG: 志可各試所能登乃禁溪水水為不流炳復吹禁枯樹樹即生荑注云荑者楊之秀也二人相視而笑共行其道焉登年長炳師事之具尚清儉禮}
  - {type: variant, offset: 67, length: 1, content: 鬼, krp: 志旦可試各所能登乃禁溪水水爲不流炳復次禁枯樹樹卽生荑易曰枯楊生荑王弼注云荑者楊之秀也二人相視而笑共行其道焉登年長炳師事之貴尚清儉禮}
  - {type: variant, offset: 69, length: 1, content: 示, SBCK: 唯以東流水爲酌削桑皮爲晡但行禁架所療皆除禁架卽禁術也後登物故炳東入章安百姓未之知也炳乃故升第屋捂鼎而爨主人見之驚懅捂支也懅忙也炳􅀏不應旣而爨熟屋無損異又嘗臨水求渡船人不和之和猶許也俗本}
  - {type: variant, offset: 69, length: 1, content: 示, WYG: 惟以東流水為酌削桑皮為脯但行禁架所療皆除禁架即禁術也後登物故炳東入章安百姓未之知也炳乃故升茅屋梧鼎而㸑主人見之驚懅梧枝也懅忙也炳笑不應既而㸑熟屋無損異又嘗臨水求渡舩人不和之和猶許也俗本}
  - {type: variant, offset: 69, length: 1, content: 示, krp: 唯以東流水爲酌削桑皮爲晡但行禁架所療皆除禁架卽禁術也後登物故炳東入章安百姓未之知也炳乃故升第屋捂鼎而爨主人見之驚懅捂支也懅忙也炳笑不應旣而爨熟屋無損異又嘗臨水求渡船人不和之和猶許也俗本}
