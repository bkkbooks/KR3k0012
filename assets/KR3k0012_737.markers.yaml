  - {type: variant, offset: 1988, length: 4, content: 鮑叔為桓, krp: 周穆王時西極有化人入水火貫石及山川移城邑秉虛不墜觸實不礙千變萬化不可窮極穆王爲起中天之臺鄭衛奉承雲之樂日日獻玉衣月月薦玉食幻人猶不肯舎乃攜玉至幻人宫稱以金銀絡以珠玉鼻口所納皆非常人閒物也由是王心厭宫室幻人曰易之耳王恱遂肆志遠遊西京雜記曰余所知有鞠道龍善爲幻術向余說古事有東海人黃}
  - {type: variant, offset: 1991, length: 1, content: 桓, WYG: 幻後漢書曰永寧元年西南夷撣國王詣闕獻樂及幻人能變化吐火自支解易牛馬頭元㑹在庭作安帝與群臣共觀大竒之又曰安帝時作九賔樂有含和舎利之獸從西方來戱於庭入前殿激水化成魚嗽水作霧化成黄龍長八丈出水遨戯於庭炫熠日光又曰解奴辜張貂者亦不知是何郡國人也皆能隠淪出入不由門户奴辜能變易物形以誑幻人晉書曰郭璞将促装去愛主人婢無由而得乃取小豆三斗繞主人宅散之主人晨起見赤衣人數千圍其家就視則滅甚惡之郭璞曰君家不宜畜此婢可於東南二十里賣之慎勿争價則此妖可除也主人從之璞隂令人賤買此婢復為符投井中數千赤衣人皆反縳一一自投於井主人大悦璞携婢而去後魏書曰悦般國真君九年遣使朝貢并送幻人稱能割人喉脈令㫁擊人頭令骨䧟皆血出淋漓數升或盈斗以草藥令嚼咽之須􅁷血止世祖恐言是虛乃取死囚試之皆騐崔鴻北凉録曰𤣥始十四年七月西域貢吞刀吐火秘幻竒伎北齊書曰由吾道榮瑯琊人也初晉陽人某明法術為人傭力無識之者道榮聞之訪得其人其人以道榮好士将法授之謂道榮曰我本恒山仙人有罪為天官所謫今滿将歸卿且送吾至於汾水乃至汾河值水至其人乃臨水禹步以一符投水中流便絶徐自沙石上渡河而去道榮嘗至遼陽山中夜逢猛獸以杖畫地即成大坑猛獸遂走唐書曰顯慶元年上御福安門樓觀大酺畨人欲持刀自刺以為幻戯上不許之乃下詔曰如聞在外有婆羅門人等每於戱處乃将劒刺肚以刀割舌幻惑百姓極非道理宜並遣發還蕃勿令久住仍約束邊州若更有此色並不須遣入朝金樓子曰周穆王時西極有化人入火貫金石反山川移城邑乗虛不墜觸實不碎千變萬化不可窮極穆王為起中天之臺鄭衛奉承雲之樂日日獻玉衣月月薦玉食幻人猶不肯舎乃携王至幻人宫構以金銀絡以珠玉鼻口所納皆非常人間物也由是王心厭宫室幻人易之耳王悦遂肆志逺遊西京雜記曰余所知有鞠道龍善為幻術向余説古事有東海人黄}
