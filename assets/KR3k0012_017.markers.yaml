  - {type: variant, offset: 1906, length: 1582, content: 也平之以六平之以六律成以十二十二律呂也天之道也天之大數不過十二夫六中之色也故名之曰黃鍾六者天地之中天有六氣降生五味天有六甲地有五子十一而天地畢矣而六為中故六律六呂而成天道也所以宣養六氣九德也宣徧也六氣陰陽風雨晦明也九德九功之德水火金木土穀政德利用厚生之者也由是第之由從也弟次也次其日也二曰太蔟所以多以金奏贊陽出滯也三曰沽洗所以脩潔百物考神納賓也四曰蕤賓所以安靖神人獻酬交酢也五曰夷則所以詠歌九則平民無二也六曰無射所以宣布哲人之令德示民軌儀也為之六間以楊沉伏而黜散越也六間六呂在陽律之間沉滯也黜去也越楊也呂陰律所以呂間陽成其功發楊滯伏之氣而去越散者也元間大呂助宣物也二間夾鍾出隟之細也四時之間氣微細三間中呂宣中氣也四間林鍾和展百事俾莫不任肅純恪也五間南呂贊陽季也六間應鍾均利器用俾應復也律呂不易無姦物也蔡邕月令曰律率也聲之管也中應也太蔟鍾名上古本陰陽別風聲審清濁別風聲不可以文載口傳也故鑄金作鍾以正十二月之聲然後以效升降之氣而鍾不可用乃截竹為管曰律為清濁之率也以律長短為制正月之律與太蔟相中也言出於鍾乃置深室葭莩為灰以實其端其月氣既至則灰飛管通古以鍾律齊其聲後人不能則數以正其度度正則音亦正矣仲春中夾鍾仲春夾鍾也管長七寸四分強夾鍾類分也季春中姑洗管長七寸一分強故鮮也言萬物去故就新莫不鮮明也孟夏中仲呂長六寸二分陽氣將極後中難仲夏中蕤賓六寸一分小二分陽氣上極陰始起故賓敬之蕤下也季夏中林鍾長六寸九分物成熟鍾類也林鍾眾也孟秋中夷則長五寸六分二分夷傷則法也萬物始傷仲秋中南呂長四寸三分小三分南任也言陽氣尚有任也生孽長也季秋中無射長四寸八分小三分射終也言萬物隨陽終也孟冬中應鍾長四寸八分言萬物應陽而動下藏仲冬中黃鍾長九寸律之始言陽於黃泉下動也鍾動也季冬中大呂長八寸呂距也言陽氣欲出陰不許也京氏律術曰律難以度調故作准以代之准之狀如瑟長丈而十三弦隱間九尺中共一弦下盡分寸均中其弦使應黃鍾之聲然案分寸以求諸律則稍皆如盡而應矣然則上古有鍾其次有律近古有准皆稍簡易之意其相生也黃鍾下生林鍾林鍾上生太蔟太蔟下生南呂南呂上生沽洗沽洗下生應鍾應鍾上生蕤賓蕤賓下生大呂大呂下生夷則夷則上生夾鍾夾鍾下生無射無射上生中呂中呂上生黃鍾上下相生終六十執始以下四十八律文多不載孟春之月則太蔟為宮沽洗為啇蕤賓為角南呂為徵應鍾為羽大呂為變宮夷則為變徵他月效此也六韜曰武王問太公曰聽律之音聲何以知三軍之消息勝負之決乎公曰深哉王之問也夫律管十二其要以五宮啇角徵羽此其正聲也萬物不易五行之神道之常也可以知敵金木水火各以其勝攻之其法以天清靜無霧雨風雲夜遣輕騎往至敵人之壘九百步偏持律管橫管當耳大呼驚之有聲應管其來甚微角管聲應當以白虎徵管聲應當以朱雀羽管聲應當以勾陳五管盡不應無有應聲當以青龍此五行之符佐勝之徵成敗之機也白虎通曰十一月律謂之黃鍾何黃中和之氣鍾者動也言陽於黃泉之下動養萬物也十二月律謂之大呂何大者太也呂者距也言陽氣欲出陰不許也正月謂之太蔟何太者大也蔟者湊也言萬物始大湊地而出也二月謂之夾鍾何夾者物孚夾言萬物孚夾種類分也三月謂之沽洗何沽者故也洗者鮮也言萬物去故就新莫不鮮明也四月謂之中呂何言陽氣將極故復中難之也五月謂之蕤賓何蕤者下也賓者敬也言陽氣上極陰氣始起故賓敬之六月謂之林鍾何林者眾也萬物成熟其類眾多也七月謂之夷則何夷傷則法也言萬物始傷被刑法也八月謂之南呂何呂任也言陽氣尚有任也生孳長也故陰之也九月謂之無射何射終也言萬物隨陽而終也當復隨陰起無有終也十月謂之應鍾何應者動也言萬物應陽而動下藏也蔡邕月令章句曰鍾以斤兩尺寸中所容受升之數為法律亦以寸分大小長短為法故也黃鍾之管長九寸孔徑三分圍九分其餘皆稍短唯大小圍數無增減以度量者可以文載口傳與眾共知然不如耳決之明也周官曰太師掌六律六呂文以五聲播以五教以六詩六德為之本以六律為之音也劉向別錄曰鄒子在燕燕有黍谷地美而寒不生五穀鄒子居之吹律而溫氣至今名黍谷論衡曰, SBCK: 儺}
