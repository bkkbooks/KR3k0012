  - {type: variant, offset: 25, length: 1, content: 乃, WYG: 方曰辰其時曰秋其氣曰隂隂生金北方曰月其時曰冬其氣曰寒寒生水淮南子曰六合孟春與孟秋為合仲春與仲秋為合季春與季秋為合孟夏與孟冬為合仲夏與仲冬為合季夏與季冬為合孟春始盈孟秋始縮盈長也縮短也仲春始出仲秋始内出二月播殖也内八月收歛也季春大出季秋大内孟夏始緩孟冬始急緩四月陽安急十月寒肅仲夏至修仲冬至短季夏徳畢季冬刑畢徳畢陽施窮也刑畢隂殺盡也又曰隂陽}
