  - {type: variant, offset: 10, length: 5, content: 黃帝命伶倫, krp: 水二曰火三曰木四曰金五曰土皆其生數水曰潤下火曰炎上言其自然之常性也木曰曲直金曰從革木可以揉曲直金可以改更者土曰爰稼穡種曰稼歛曰穡土可以種可以歛也潤下}
  - {type: variant, offset: 16, length: 7, content: 為律伶倫自大夏, SBCK: 鹹水鹵所生炎上作苦焦氣}
  - {type: variant, offset: 16, length: 7, content: 為律伶倫自大夏, krp: 鹹水鹵所生炎上作苦焦氣}
  - {type: variant, offset: 17, length: 3, content: 律伶倫, WYG: 玉燭又曰春為青陽夏為朱明秋為白藏冬為𤣥英論語曰天何言哉四時行焉百物生焉汲冡周書曰凡時成嵗有春秋冬夏各有孟仲季以名十有二月月中氣以著時應春三中氣雨水春分榖雨夏三中氣小滿夏至大暑秋三中氣處暑秋分霜䧏冬三中氣小雪冬至大寒閏無中氣斗指両辰之間萬物春生夏長秋收冬藏天地之正四時之極不易之道春秋繁露曰四時天之四選春者少陽之選夏者太陽之選秋者少隂之選冬者太隂之選四時之行父子之道也天地之至君臣之義也隂陽之理聖人之法也爾雅曰四時者四方各一時時期也物之生死各應節期而止也又曰時空也司空主也各主一方物之生死京房易妖占曰海燕}
  - {type: page-break, offset: 17, content: '', id: KR3k0012_WYG_017-6b, image: WYG0893/WYG0893-0174b.png}
  - {type: punctuation, offset: 18, content: 。, id: KR3k0012_CHANT_017-bkkpn5}
  - {type: 'tls:seg', offset: 18, content: '', id: KR3k0012_CHANT_017-1a.5}
  - {type: variant, offset: 21, length: 0, content: '', WYG: 来衆燕随之榖不登失春政則蒼燕見于邑民多流亡失夏政則赤燕見于邑失秋政則白燕見于邑失冬政則黑燕見于邑皆如春占管子曰嵗有四秋而分四時故曰農事即成農夫賦其耜鐡此之謂春之秋}
  - {type: page-break, offset: 21, content: '', id: KR3k0012_WYG_017-7a, image: WYG0893/WYG0893-0174c.png}
  - {type: variant, offset: 23, length: 0, content: '', WYG: 且至絲纊}
  - {type: variant, offset: 24, length: 2, content: 西乃, SBCK: 味曲直作酸木實}
  - {type: variant, offset: 24, length: 0, content: '', WYG: 所作此之謂夏之秋秋成五榖之所㑹此之謂秋之秋營室中女事紡績緝縷之所作也此之謂冬之秋又曰東方曰嵗星其時曰春其氣曰風風生木南方曰熒惑其時曰夏其氣曰陽陽生火}
  - {type: variant, offset: 24, length: 2, content: 西乃, krp: 味曲直作酸木實}
