  - {type: variant, offset: 1500, length: 282, content: 螾蟲也律受太蔟蔟者湊而未出也太蔟正月律指卯卯則茂茂然律受夾鍾夾鍾者鍾始夾也夾鍾二月律指辰辰則振振之也律受沽洗沽洗者陳去而新來也沽洗三月律指巳巳則生己定也律受中呂中呂者中充大也中呂四月也指午午者忤也律受蕤賓蕤賓者安而服也蕤賓五月律指未未者味也律受林鍾林鍾者引而止之也林鍾六月律指申申者呻也律受夷則夷則易其則也德去矣夷則七月律也德以去生氣盡也指酉酉者飽也律受南呂南呂者任苞大也南呂八月律指戍戍者滅也律受無射無射者人之無厭也無射九月律指亥亥者閡也律受應鍾應鍾者應其鍾也應鍾十月律指子子者茲也律受黃鍾黃鍾者已鍾也黃鍾十一月律指丑丑者紐也律受大呂大呂者旅旅而去也大呂十二月律, SBCK: 楚辭曰獻嵗發春􅀆獻進}
