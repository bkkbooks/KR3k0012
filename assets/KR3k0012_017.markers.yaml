  - {type: variant, offset: 4, length: 0, content: '', WYG: 曰水二曰火三曰木四曰金五曰土皆其生數水曰潤下火曰炎上言其自然之常性也木曰曲直金曰從革木可以操曲直金可以改更者土爰稼穡種曰稼歛曰穡土可以種可以歛也潤下作鹹水鹵炎所生上作苦焦氣之味曲直作酸木實之性從革作辛金之氣味稼穡作甘甘味生于百榖五行以下箕子之所陳也禮曰五行之動迭相竭也五行四時十二月還相為本也又曰五行之秀氣也傳曰秋龍見于絳郊魏獻子問于蔡墨蔡墨對曰古有豢龍氏有御龍氏獻子曰今何故知之對曰五行之官是謂五官實列受氏姓封為上公祀為貴神社稷五祀是尊是奉木正曰勾芒正官長也取木生勾曲而有芒角火正曰祝融融明見也金正曰蓐收初秋摧蓐而可收也水正曰𤣥冥水正而隂幽𠖇也土正曰后土土為羣物之主故曰后土獻子曰社稷五行祀誰氏之官也對曰少皥氏有四叔曰重曰修曰該曰熈實能理金木水火土使重為勾芒該為蓐收脩及熈為𤣥冥二子相代為水正也世不失職遂濟窮桑此三祀也窮桑少昊之號四子能治其官顓頊氏有子號曰黎為祝融共工氏有子曰勾龍為后土此其二祀也后土為社稷田正也掌播殖也有烈氏之子曰柱為稷自夏以上祀之周棄亦為稷成周之始祖能播百榖湯既勝夏廢柱而以棄代之也自商以來祀之漢書曰五行者五帝之形氣也又}
