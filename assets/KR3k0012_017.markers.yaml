  - {type: variant, offset: 257, length: 0, content: '', krp: 五行之動迭相竭也五行四時十二月還相爲夲也又曰五行之秀氣傳曰秋龍見于絳郊魏獻子問於蔡墨蔡墨對曰古有豢龍氏有御龍氏獻子曰今何故無之對曰五行之官是謂五官實列受氏姓封爲上公祀爲貴臣社稷五祀是尊是奉木正曰勾芒正官長也取木生勾曲而有芒角火正曰祝融融明皃也金正曰蓐收初秋摧折而可収也水正曰玄冥水出而隂幽冥也土正曰后土士爲群物之主故曰后土獻子曰社稷五祀誰氏之官也對曰少皡氏有四叔曰重曰該曰脩曰熈實能理金木及水使重爲勾芒該爲蓐收脩及熈爲玄冥二子相代爲水王也世不失職遂濟窮桑此三祀也窮桑少昊之號四子能治其官顓頊氏有子號曰犂爲祝融共工氏有子號曰勾龍爲后土此其二祀也后土爲社稷田正也掌播殖也有烈山氏之子曰柱爲稷自夏巳上祀之周棄亦爲稷棄周之始祖能播百榖湯旣勝夏廢柱而以棄代之也自啇以來祀之漢書曰五行者五常之形氣也又律曆志曰天以一生水地以二生火天以三生木地以四生金天以五生土魏略曰詔以漢火行火忌水故去洛水而加佳魏於行次爲土水得土而流土得水而軟故除佳加水變雒為洛家語曰季康子問於孔子曰舊聞五帝之名而不知其實請問何謂孔子曰昔丘也聞諸老聃天有五行木金水火土分時化育以成萬物一歳三百六十日五行行至七十三日化生長育萬物莫不成也其神謂之五帝五帝五行之神佐天理物者也而說皆爲之名字亦爲妖怪而妄也古之王者易代改號取法五行更王終始相生亦象其義也法五行更王終始相生以木徳王天下其次所生之行轉相承故其生爲明王者死配五行是以太皡配木炎帝配火少皥配金顓頊配水黃帝配土康子曰太皡氏其始之木何也孔子曰五行用事先起於木木東方也萬物之初皆出焉是故王者作而首以木德王天下則以所生之行轉相承也康子曰吾聞勾芒爲木正祝融爲火正蓐収爲金正玄冥爲水正后土爲土正此則五行之主也而不稱何孔子曰凡五正者五行之官名也言但主五行之官名安得同名爲帝五行佐成上帝而稱五帝太皥之屬配焉亦云帝從其號音昔少皥氏之子有四叔曰重曰該曰脩曰熈實能理金木水火土使重爲勾芒該爲蓐収脩及熈爲玄冥顓頊氏之子曰黎爲祝融共工氏子曰勾龍爲后土此五者各所以能業其官職生爲上公死爲貴神別稱五祀不得同帝也五祀上公之神耳故不得稱帝五正不及五帝五帝不及天地也遁甲開山圖榮氏解曰五龍受爰皇後君也兄弟四人皆人靣龍身長曰角龍木仙也次曰羽龍水仙也父曰宫龍土仙也父子同得仙治在五方今五行之神也白虎通曰五行者何謂也謂金木水火土言行者欲言爲天行氣之義也地之承天猶婦之事夫臣之事君也其位卑卑者親視事故自同於一行尊於天也尚書一曰水二曰火三曰木四曰金五曰土水位在北方者隂氣在黃泉之下任養萬物水之爲言准也隂化沾濡任生木木在東方者陽氣始動萬物始生木之爲言觸也陽氣動躍火在南方陽在上萬物垂枝火之爲言委隨也萬物布施火之爲言化也陽氣用事萬物變化也金在西方者隂始起萬萬物禁止金之爲言禁也土在中央中央者土土主吐萬物土之爲言吐也樂記曰春生夏長秋収冬藏土所以不名時者地土之别名也比於五行最尊故自居部職也又曰萬物懷任交易變化始起先有太𥘉然後有太始形兆旣成名曰太素渾沌相連視之不見聽之不聞然後剖判清濁旣分精耀出布庶物生精者爲三光麄者爲五行五行生情性情性生汙中汙中生神明神明生道德道德生文章四時釋名曰四時四方各一時時期也不失期也書曰乃命羲和敬授民時禮曰天有四時春秋冬夏無非教也周禮曰典瑞掌玉器之藏土圭以致四時日月度其影至不至以知其行失也爾雅曰四時和爲玉燭又曰春爲青陽夏爲朱明秋爲白藏冬爲玄英論語曰天何言哉四時行焉萬物生焉周禮曰凡四時成歳嵗者春秋冬夏各有孟仲季以名十有二月月中氣以著時應春三中氣雨水春分榖雨夏三中氣小滿夏至大暑秋三中氣處暑秋分霜降冬三中氣小雪冬至大寒閏無中氣斗指兩辰之間萬物春生夏長秋成冬藏天地之正四時之極不易之道春秋繁露曰四時天之四選春者少陽之選夏者太陽之選秋者少隂之選冬者太隂之選四時之行父子之道也天地之志君臣之義也隂陽之理聖人之法也廣雅曰四方各一時時期也物之生死各應節期而止也又曰時司空也司空主也各主一方物之生死京房易妖占曰海鷰自來衆鷰隨之榖不登君失春政則蒼鷰見於邑民多流亡失夏政則赤鷰見於邑失秋政則白鷰見於邑失冬政則黒鷰見於邑皆如春占管子曰嵗有四秋而分四時故曰農事旣成農夫賦其耜鐵此之謂春之秋大夏且至絲纊之所作此之謂夏之秋秋成五㯏之所㑹此謂秋之秋營室中女事紡績緝縷之所作也此之謂冬之秋榖同音又曰東方曰嵗星其時曰春其氣曰風風生木南方曰日其時曰夏其氣曰陽陽生火西方曰辰其時曰秋其氣曰隂隂生金北方曰月其時曰冬其氣曰寒寒生水淮南子曰時則曰六合孟春與孟秋爲合仲春與仲秋爲合季春與季秋爲合孟夏與孟秋爲合仲夏與仲冬爲合季夏與季冬爲合孟春始盈孟秋始縮盈長也縮短也仲春始出仲秋始内出二月播植也内八月取歛也季春大出季秋大内孟夏始緩孟冬始急緩四月陽炎也急十月寒肅也仲夏德畢季冬刑畢德畢陽施窮也刑畢隂殺盡也又曰隂陽之專精爲四海四時之散精爲萬物四時者天之吏也又曰以天爲蓋以地爲輿四時爲馬又曰日廻而月周時不與人㳺徐整三五曆記曰北斗當崑崙崑崙氣連注天下春夏爲露秋冬爲霜晉張華詩曰四氣鱗次寒暑環周晉陸機詩曰年往迅勁矢時來諒急絃閏說文曰餘分之月五嵗再閏也告朔之禮天子居宗廟門中故其字從王在門中也白虎通曰月有閏何周天三百六十五度四分度之一十二月日不匝十二度故三年一閏五嵗再閏也明隂不足陽有餘閏者陽之餘也書堯典曰帝曰咨汝羲曁和朞三百有六旬有六日以閏月定四時成嵗咨嗟曁與也匝四時曰朞一歳十二月月三十日正三百六十日除小月六爲六日是爲一歳有十二日未盈三歳足得一月則置閏焉以定四時之氣節成一歳之暦象傳曰閏月不告朔非禮也先王之正時也履端於始舉正於中歸餘於終杜預注曰歩暦之始以爲術之端首也日月之行有遲有速必分十二月舉中氣以正月也餘日則歸於終積爲閏也履端於始序則不愆舉正於中人則不惑歸餘於終事則不悖又曰閏月戊寅濟于隂阪注以爲門五日蓋悮以門字與五字合爲閏月也公羊傳曰閏月不告朔曷爲不告朔天無是月也閏月矣何以謂之天無是月月非常月也所在無常故無正也榖梁傳曰閏月者附月之餘日也一歳三百六十日餘六日又有小月積五歳得六十日而再閏故曰附月之餘日者也積分而成於月者也天子不以告朔而喪事不數也禮玉藻曰聽朔於南門之外諸侯聽朔於廟天子聽朔於明堂諸侯告朔於祖則天子告朔於文武也閏月則闔門左扉立乎其中閏無中氣無時令故不聽於堂也門謂廟門立其中當視朝周禮春官曰閏月太史詔王居門終月門謂路寢門也鄭司農云月令十二月令在青陽明堂㹅章玄堂左右之位唯閏無居干門故於文王在門謂之閏春秋元命包曰三年一閏以起紀宋均注曰紀法也三年加以一閏以會成嵗也史記曰黃帝起消息正閏餘漢書音義曰嵗之餘爲閏文士傳曰陸績字公紀作渾天說曰閏月無中氣斗斜指二辰之間荆楚嵗時記曰周禮云王出居寢門故爲字門中從王也是月也不舉百事以非中氣也嵗釋名曰嵗越也越故限也年進也進而前也祀已也新氣生故氣巳也載載生物也白虎通曰年者仍也年以紀事據月言年數者載成萬物終始也五帝言載三王言年丗本曰后益作占嵗易曰寒往則暑來暑往則寒來寒暑相推而嵗成焉又洪範曰叶用五紀一曰嵗孔安國曰所以紀四時也禮曰日窮於次月窮于紀星回于天數將幾終嵗且更始歳者四時一終日一周天之名也言前至}
