  - {type: variant, offset: 10, length: 5, content: 黃帝命伶倫, SBCK: 水二曰火三曰木四曰金五曰土皆其生數水曰潤下火曰炎上言其自然之常性也木曰曲直金曰從革木可以揉曲直金可以改更者土曰爰稼穡種曰稼歛曰穡土可以種可以歛也潤下}
  - {type: variant, offset: 10, length: 6, content: 黃帝命伶倫作, WYG: 典瑞掌玉噐之藏土圭以致日月四時度其影至不至也爾雅曰四時和}
