  - {type: variant, offset: 448, length: 986, content: 率猶導也春秋孔演圖曰孔子曰丘援律吹命陰得羽之宮孝經援神契曰聖王吹律有姓漢書張蒼傳曰蒼乃自秦時為柱下御史明習天下圖書計籍又善用笇律曆故令蒼以列侯居相府領王郡國上計又曰張蒼代灌嬰為丞相漢興二十餘年天下定公卿皆軍吏蒼為計吏時正緒律曆故漢家言律曆者法張蒼蒼好書無所不通而尤邃律曆邃深又京房傳曰房字君明東都頓丘人好鍾律知音聲房本姓李推律自定為京氏又曰夫五音生於本姓分為十二律轉生六十二律皆所以紀升氣效物類也天效以影地效以響響即律也陰陽和則影至以律氣應則灰除是故天子常以冬夏至御前殿合八能之士陳八音聽樂均度晷影候鍾律權土灰校陰陽冬至陽氣應則均清景長極黃鍾通土灰輕而衡仰夏至陰氣應則均濁景短極蕤賓通土灰重而衡低進退於先後五日之中八音能各以候狀聞大史合封上效則和否則占候氣之法為室三重戶開塗舋必周密布緹㦥室中以木為案每律各一內庫外高從其加律其上以葭莩灰抑其內端案曆而候之氣至者灰去其為氣所動者其灰散風所動者其灰聚殿中候用玉律十二唯二至乃候靈臺用竹律六十又曰凡律度量衡用銅銅為物也精不為燥濕寒暑變其節不為風雨曝露改其形介然常似於士君子之行是以用銅也用竹為引者事之宜也又曰至治之世天地之氣合以生風天地之風氣定士律王隱晉書曰荀勗以魏杜夔所制律呂撿校太樂揔章鼓吹八音與律呂乖錯始知後漢至魏度漸長於古四分餘而夔依為律呂故致不韻不和部佐著作劉恭依周禮制尺所謂古尺也依古尺作新律呂以調聲韻以律量黍以尺度古器皆與本銘尺寸無差又故冢得古玉律鍾聲亦與新律闇合遂班下太常使太樂總章鼓吹清啇施用勗遂典知樂事晉諸公讚曰世祖時以荀勗所造律班示朝臣散騎侍郎阮咸唱議謂勗所造聲高必由古今尺有長短所致然勗亦依案經典笇而制之又求古器得周時玉律比較正同荀勗奏曰中所出御府銅竹律二十五具部太常樂郎正劉秀等校試其三具與杜夔左延年法同其二十二具視其銘題尺寸是笛律也問恊律中郎將列和云昔魏明帝時令和丞受笛聲以作此律欲使學者別居一坊歌詠講習以此律調至於都合樂時但識其尺寸之名則絲竹歌皆得均合歌聲濁者用長笛長律歌聲清者用短笛短律凡弦歌調張清濁之制不依笛寸尺名之則不可知也趙書曰劉曜築建德殿取土城西南墎內得圓石狀若水碓其銘曰律推石重四釣同律度量衡有辛氏造議者未之詳或以為瑞參軍事續咸曰王莽時物東方朔十洲記曰武帝時有西胡月氏國遣使曰臣國去此三十萬里國有常占東風入律百旬不休青雲干呂連月不散者閻浮國將有好道之君矣孟子曰師曠之聰不以六律不能正五音, SBCK: ''}
