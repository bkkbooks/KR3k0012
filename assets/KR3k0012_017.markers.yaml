  - {type: punctuation, offset: 5, content: 《, id: KR3k0012_CHANT_017-bkkpn1}
  - {type: variant, offset: 5, length: 1, content: 呂, WYG: 厯志曰天以一生水地以二生火天以三生木地以四生金天以五生土魏畧曰詔以漢德為火忌水故去洛水而加佳魏于行次為土水得土而流土得水而軟故除佳加水變雒為洛家語曰季康子問于孔子曰舊聞五帝之名而不知其實請問何謂孔子曰昔丘也聞諸老耼天有五行金木水火土分時化育以成萬物一嵗三百六十日五行行至七十三日化生長育萬物莫不成也其神謂之五帝五帝五行之神佐天理物者也而説皆謂之名字亦為妖怪而妄也古之王者易代改號取法五行更王終始相生亦象其義也法五行更王終始相生以木徳王天下其次所生之行轉相承故其生為明王者死配五行是以太皥配木炎帝配火少皥配金顓頊配水黄帝配土康子曰太皥}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_017-3a, image: WYG0893/WYG0893-0172c.png}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_017-3b, image: WYG0893/WYG0893-0172d.png}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 其始之木何也孔子曰五行用事先起于木木東方也萬物之始皆出焉是故王者則而首以木徳王天下則以所生之行轉相承也康子曰吾聞勾芒為木正祝融為火正蓐收為金正𤣥㝠為水正后土為土正此則五行之主也而不稱何孔子曰凡五正者五行之官名也言但正五行之官名安得即名為帝五行佐成上帝而稱五帝太皥之屬配焉亦云帝從其號昔者少皥氏之子有四叔曰重曰該曰修曰熈實能理金木水火土使重為勾芒該為蓐收修及熈為𤣥冥顓頊氏之子曰黎為祝融共工氏子曰勾龍為后土此五行者各以所能業為官職生為上公死為貴神别稱五祀不得同地也五祀上公之神耳故不得稱帝五正不及五帝五帝不及天地也遁甲開山圖榮氏解曰五龍受爰皇後君也兄弟四人皆人面龍身長曰角龍木仙也次曰羽龍水仙也父曰宫龍上仙也父子同得仙治在五方今五行之神也白虎通曰五行者何謂也謂金木水火土言行者猶言為天行氣之義也地之承天猶婦之事夫臣之事君也其位卑卑者親事是故自周于一行尊于天也尚書一曰水二曰火三曰木四曰金五曰土水位在北方者隂氣在黄泉之下任飬萬物水之為言准也隂化沾濡任生木木在東方者陽氣始動萬物始生木之為言觸也陽氣動躍火在南方陽在上萬物垂枝火之為言委随也萬物布施火之為言化也陽氣用事萬物變化也金在西方者隂始起萬物禁止金之為言禁也土在中央者主吐􅅤萬物土之為言吐也樂記曰春生夏長秋收冬藏土所以不名時者地土之别名也比于五行尊故自居部職也白虎通曰萬物懐任交易變化始起先有太初然後有太始形兆既成名曰太素混沌相連視之不見聽之不聞然後剖判清濁既分精出曜布度物施生精者為三光號者為五行五行生情性情性生汁中汁中生神明神明生道徳道徳生文章四時釋名曰四時四方各一時時期也不失期也書曰以閏月定四時成嵗禮曰天有四時}
