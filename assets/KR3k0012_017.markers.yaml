  - {type: variant, offset: 5126, length: 1257, content: 月十六日日蝕待詔楊岑見時月食多先曆即縮用筭因上言月當十五日食官曆不中詔書令岑普候與官曆課起七月盡十一月弦望凡五官曆皆失岑皆中庚寅詔書令岑署弦望月食官復令待詔張盛景防鮑業等六四分法與岑課歲餘盛等所中多岑六事又曰黃帝造曆元起辛卯而顓頊用乙卯虞用戊午夏用丙寅殷用甲寅周用丁巳魯用庚子漢初用乙卯至武帝元年以丁丑王莽之際劉歆作三統追太初前世一九得五星會庚戌之歲以為上元太初曆到章帝元和施復踈闊徵能術者課效諸曆定朔稽元追漢四十五年庚辰之歲退朔一日乃與天合以為四分曆又曰昔者聖人之作曆觀璇璣之運三光之行道之發軔景之長短斗綱所建青龍所踵參五以變錯綜其數而制術焉日月相推日舒月速當其同所謂之合朔舒速先後近一遠三謂之弦相與為衡分天之中謂之望以遠及舒光盡體伏謂之晦朔合離斗建移辰謂之朔魏略曰太史上言漢曆不及天時因更推步弦望朔晦為太和曆帝以高堂隆學問優深於天文又精乃詔使隆與尚書郎楊偉太史待詔駱祿參共推校更相刻奏紛紜數歲祿得日蝕而月晦不盡隆不得日蝕而晦盡詔從太史隆所爭雖不得而遠近猶知其精微又曰景初元年山茬音在貍切縣言黃龍見有司奏以為魏得地宜以建丑之月為正乃定曆年改太和曆為景初曆吳志曰孫權黃武二年改四分曆用乾象曆王隱晉書曰張載弟前烏程令亢依蔡邕注明堂月令中台要綴諸說曆數而為曆讚祕書監荀崧見讚異之亦信該羅曆義唐書曰王勃聰警絕眾於推步曆笇尤精嘗作大唐千歲曆言唐德靈長千年合承周漢運曆不合承周隨短祚其論大旨日云以土王者五十代而一千年金王者四十九代而九百年水王者二十代而六百年木王者三十代而八百年火王者二十代而七百年此天地之常期符曆之大數也自黃帝至漢并是五運真主五行之匝土運復歸唐德承之宜矣魏晉至于周隨咸非正統五行之沴氣也故不可承之大率如此鴻笵五行傳曰聖人所以揆天行而紀萬國也孔子作春秋正春正秋所以重曆也五家之曆多踈闊唯顓頊曆為微近故張蒼用顓頊曆元封中立太初曆測弦望皆冣密益部耆舊傳曰巴郡落下閎漢武帝時改顓頊曆更作太初曆曰後八百歲此曆差一日當有聖人定之風土記曰自黃帝瑞顓下逮三王治曆十有一家考課損益各有變衰非運之錯考察意異故也尸子曰造曆者羲和之子也楊泉物理論曰疇昔神農始治農功正節氣審寒溫以為早晚之期故立曆日董巴議曰武王作周曆周公作魯曆蔡邕議曰邕以為曆數精微去聖人久遠得失更迭術無常是漢丞秦正曆用顓頊元用乙卯百有二歲孝武皇帝始改正朔曆用太初元用丁丑行之百八十九歲孝章皇帝用清河李梵之言改從四合元用庚辰今馮光陳晃各以庚申為非甲寅為是案曆法黃帝顓頊夏殷周魯凡六家各自有元先晃所據則殷曆元也他元雖不明圖讖各自一家之術皆當有效於當時昔太初始用丁丑之後六家紛錯爭訟是非太史令張壽王挾甲寅元以非漢曆雜候清臺課在下第卒以踈闊連見剝奏太初效驗無所漏失是則非圖讖之元而有效於前者也及用四分以來考之行度密於太初是知新元有效於今者也延光元年中謁者擅誦亦非四分庚申上言當用命曆序甲寅元公卿百寮參議正處竟不施行且三光之行遲遲進退不必若一術家以笇追而求之取合於當時而已故有古今之而行不能上通於古猶古術不能下通於今也由此言之有文於讖無驗於今未必為是有驗於今無文於讖未必為非, SBCK: ''}
