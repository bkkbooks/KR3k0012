  - {type: variant, offset: 3982, length: 656, content: 周武王訪箕子箕子言大法九章而五紀明曆法歲月日星辰為五紀也五伯之末史官喪記疇子弟分散如淳曰家業世相傳為疇律年三十三傳之疇官各從父事或在夷狄故其所記有黃帝顓頊夏殷周及魯曆戰國擾攘秦兼天下未遑暇也亦頗推五勝五行相勝秦以周為火周水勝之也而自以為獲水德迺以十月為正色尚黑漢興方紀大基庶事草創襲秦正朔以北平侯張蒼言用顓頊曆比於六曆踈闊中最為微近然正朔服色未暏其真而朔晦弦望多虧矣至武帝元封七年漢興百二歲矣太中大夫公孫卿壺遂太史令司馬遷等言曆紀壞廢宜改正朔遂詔卿遂遷與侍郎尊大典星射姓等師古曰姓射名姓也議造漢曆迺定東西立晷儀下漏刻以進二十八宿相距於四方舉終以定朔晦分至躔離弦望應劭躔徑也離遠臣瓚案離曆也日月之曆也姓等奏不能為筭願募治歷者更造密度各自增減以造漢太初歷迺選治歷鄧平及長樂司馬可酒泉侯宜君侍郎尊及與民間治歷者凡二十餘人方士唐都巴郡洛下閎與焉晉灼曰史記曆書云唐部分天部而巴郡洛下閎運笇推歷也都分天部謂分部二十八宿為距度也而閎運筭轉曆與鄧平所造八十一分律歷律昏明踈遠者十七家使校歷律昏明宮者淳于陵渠復覆太初歷晦朔弦望皆最密日月如合璧五星如連珠謂太初上元甲子夜半朔旦冬至時七曜皆會聚斗牽牛中如合璧連珠也陵渠奏狀遂用鄧平歷以平為太史丞後二十七年元鳳三年太史令張壽王上書言曆者天地之大紀上帝所為傳黃帝調律歷漢元年以來用之今陰陽不調宜更歷之過也詔下主歷使者鮮干妄人請與治歷大司農中丞麻光等二十餘人雜候日月晦朔弦望八節二十四氣鈞校諸歷用狀奏可詔與丞相御史大將軍右將軍史各一人雜候上林青臺諸曆踈密凡十一家以元鳳三年十一月朔旦冬至盡五, SBCK: 新}
