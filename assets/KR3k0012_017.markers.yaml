  - {type: variant, offset: 3752, length: 229, content: 叶用五紀其五曰曆數易乾鑿度曰堯以甲子天元為推術注云甲子為蔀首起十月朔又曰曆原名握先紀曰甲子握先為曆始之名始言無前者也七十六歲為一紀二十紀而一蔀首易是類謀曰其觸耀而出師曠曆推音筭以度知旦觸耀而出謂師曠得聖人之一體故觸耀而生其人能曆數樞機之事又能推五音知將來之事漢書律曆志曰曆數之起上矣傳述顓頊命木正重司天火正黎司地其后三苗亂德二官咸廢而閏餘乖次孟陬殄滅攝提失方攝提星名隨斗柄所指建十二月若曆誤春三月當指辰乃指巳是為失方也堯復育重黎之后使纂其業後以授舜舜亦以命禹, SBCK: 留􅀫嵗飯}
