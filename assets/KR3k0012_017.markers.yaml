  - {type: variant, offset: 201, length: 1, content: 律, WYG: 十日餘六日又有小月積}
  - {type: variant, offset: 203, length: 2, content: 聲八, WYG: 嵗得六十日而再閏故曰附月之餘日也積分而成于是月者也天子不以告朔而䘮事不數也禮玉藻曰聽朔于南門之外諸侯聽朔于廟天子聽朔于明堂諸侯告朔于天子則天子告朔于文武也閏月則闔門左扉立乎其中閏無中氣無全時故不聼于堂也門謂廟門立其中當親朝也周禮春官曰閏月太史詔王居門終月門謂路寝門也鄭司農云月令十二月分在青陽明堂總章𤣥堂左右之位惟閏月無所居于門故于文王在門謂之閏春秋元命苞曰三年一閏以起紀宋均注曰紀法也三年加以一閏以㑹成嵗也史記曰黄帝起消息正閏餘漢書}
