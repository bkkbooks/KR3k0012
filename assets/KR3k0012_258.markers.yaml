  - {type: variant, offset: 1143, length: 13, content: 勸課農桑境內稱為慈父鄰州號, SBCK: 遇孝章皇帝廵狩幸魯陽有詔勑夷吾入傳録見囚有亭長姧部民者縣言和姧上意以爲吏刼民何得言和湏􅁷夷吾呵之}
  - {type: variant, offset: 1143, length: 0, content: '', WYG: 武昌軍節度使江夏城風土散惡難立垣墉每年加版築賦菁茅以覆之吏縁為奸蠧弊綿嵗僧孺至計茅苫板築之費嵗十餘萬即賦之以塼以當苫築之價凡五年墉皆甃葺蠧弊永除又曰皇甫無逸為同州刺史閉門自守不通賔客左右不得出門凡所貨易皆往他州每按部樵採不犯於人嘗夜宿人家遇燈炷盡主人將續之無逸遽抽佩刀斷衣帶以為其炷其㢘介如此又曰吕元膺為蘄州刺史頗著恩信嘗嵗終閲郡獄囚囚有自告者曰某有父母在明日元正不得相見因泣下元膺憫焉盡脱其械縱之以為期守吏曰賊不可縱元膺曰吾以忠信待之及期無後到者由是羣盜感義相引而去又曰栁宗元為栁州刺史土俗以男女質錢過期則没入宗元革其鄉法其已没者仍出私錢贖之歸其父母又曰王仲舒為洪州刺史江南西道觀察使江西前例𣙜酒私醸法深仲舒至鎮奏罷之又出官錢二萬貫代貧户輸税又曰令狐楚子緒以廕授官厯隋壽汝三郡刺史在汝州日有能政郡人請立碑頌緒以弟綯在輔弼上言曰臣先父元和中特承恩顧弟綯官不因人出自宸衷臣伏睹詔令以臣刺壽州日粗立政勞吏民求立碑頌尋乞追罷臣任隋州日郡人乞留得上上考此名已聞於日下不必更立碑頌乞賜寢停宣宗嘉其意從之五代史梁書曰韓建為潼闗防禦使兼華州刺史河湟經大冦之後户口流散建披荆棘闢汚萊}
