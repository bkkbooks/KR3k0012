  - {type: variant, offset: 1511, length: 813, content: 嫗撫膺哭曰兒昨著此靴向妻家如其語捕獲之時稱明察又曰齊平覽遷懷州刺史覽奏諸於州西故車道築城以防西軍從之尋而西魏來攻時新築城糧仗未集素乏水南門有大井隨汲即竭覽具衣冠俯井而祝至旦而井泉湧溢有異於常又曰齊彭城王浟為滄州刺史有人從幽州來驢馱鹿脯至滄州界腳痛行遲偶會一人為伴遂盜驢及脯去明旦告州乃令左右及府僚吏分市鹿脯不限其價其主見識之推獲盜者又曰竇熾為原州刺史熾挫抑豪右申理幽滯在州十載甚有政績州城北有泉水屢經遊踐嘗與僚吏宴於泉側因酌水自飲曰吾在此州唯當飲水而已又曰申微為襄州刺史時南方初附舊俗官人皆通餉遺微性廉慎乃畫楊震像於寢室以自戒及代還人使送者數十里不絕微自以無德於人慨然懷愧因賦詩題於清水亭長幼聞之皆競來讀遞相謂曰此是申使君手迹並寫誦之又曰赫連達為雲州刺史性廉儉邊境胡人或饋達羊達欲招異類報以繒帛主司請用官物達曰羊入我廚物出官庫是欺上也命取私帛與之識者嘉其仁恕三國典略曰賀祥為荊州刺史祥有惠政遠近款附梁岳陽王詧欽其清素乃贈以竹屏風祥難違其意取付所司太祖聞之並以賜祥後周書曰獨狐信為秦州刺史先是守宰闇弱政令乖方民有冤訟歷年不能決信在州事無擁滯示以禮教勸以耕桑數年之中公私富實流民願附者數萬家太祖以其信著遐邇故賜名為信又曰達奚武之在同州也時屬大旱高祖勑武祀華嶽而廟在舊山下當往祈禱武謂寮屬曰吾備位三公不能爕理陰陽遂使盛農之月久絕甘雨天子勞心百姓惶懼忝寄既重憂責實深不可同於眾人在常祀之所必須登峰展誠須其靈奧嶽既高峻千仞壁立武年逾六十唯將數人攀藤援棘然後得上於是稽首祈請陳百姓懇誠晚不得還即於嶽上藉草而宿夢見白衣人來執武手曰快辛苦甚相嘉尚武遂驚覺益用祗肅至旦雲霧四起俄而澍雨遠近沾浹高祖聞之璽書慰勞又曰韋瑱字世珍魏恭帝二年賜姓宇文氏三年除瓜州刺史通西域蕃夷往來前後刺史多受賂遺胡寇犯邊又莫能禦瑱雅性清儉兼有武略蕃夷贈遺一無所受胡人畏威不敢為寇公私安靜夷夏懷之又曰長孫儉授荊州刺史東南道行臺僕射所部鄭縣令泉璨為民所訟推理獲實儉即大集僚屬, krp: 縑}
