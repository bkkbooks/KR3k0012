  - {type: variant, offset: 796, length: 1, content: 寡, SBCK: 累年器用車服無増飾者􅂄老以爲可継前朝宋璟盧奐李朝隱之徒人吏詣闕請立碑代宗許之又曰楊城爲道州刺史在州以家人法待吏人冝罰者罰之冝賞者賞之一不以簿書介意道州土地産民多矮每年常配郷户貢其男號爲矮奴城不平其以良爲賤又憫其編甿􅀊有離異之苦乃抗䟽論而免之自是乃停其貢民皆頼之無不泣荷又曰尹思貞爲青州刺史境内有􅁞一年四熟者黜陟使衛州司馬路敬潜八月至州見􅁞歎曰非善政孰能至}
