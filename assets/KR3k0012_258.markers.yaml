  - {type: page-break, offset: 3559, content: '', id: KR3k0012_SBCK_258-9a}
  - {type: variant, offset: 3559, length: 190, content: 德煚常有疾百姓奔馳爭為祈禱其得民情如此冀州俗薄市井多姦詐煚為銅斗鐵尺置之於肆百姓便之上聞而嘉焉頒告天下以為常法又曰蔡王智積為同州刺史儀衛資送甚盛頃之以修謹聞高祖善之在州未嘗嬉戲遊獵聽政之暇端然讀書門無私謁有侍讀公孫尚儀山東儒士府佐楊君英蕭德言並有文學時延於座所設惟餅果酒纔三酌家有女妓唯年節嘉慶奏於太妃之前其簡靜如此又曰公孫景茂為道州刺史悉以秩俸買牛犢雞豬散惠孤弱不自存者好單騎巡, WYG: 名郡}
