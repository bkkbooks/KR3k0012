  - {type: variant, offset: 3359, length: 198, content: 城東有沂泗二水合而南流汎濫大澤中冑遂積石堰之使決令西注陂澤盡為良田又通轉運利盡淮海百姓賴之號為薛公豐兗渠又曰梁毗出為西寧州刺史改封邯鄲縣侯在州十一年先是蠻夷酋長皆服金冠以金多者為豪儁由此遞相陵奪每尋干戈邊境略無寧歲毗患之後因諸酋長相率以金遺毗於是置金座側對之慟哭而謂之曰此物飢不可食寒不可衣汝等以此相滅不可勝數今將此來欲殺我耶一無所納悉以還之於是蠻夷感悟遂不相攻擊高祖聞而善之又曰趙煚為冀州刺史甚, SBCK: 治}
