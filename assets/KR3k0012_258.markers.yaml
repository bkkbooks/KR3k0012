  - {type: variant, offset: 1318, length: 14, content: 人為奴婢以美女十人賞蘭根蘭根, SBCK: 有骨􅁏恩薄不収歛者皆加貶責由是百姓感化復覩太平置酒大㑹坐中􅂄老相與流涕而歎}
  - {type: variant, offset: 1319, length: 127, content: 為奴婢以美女十人賞蘭根蘭根曰此縣分於強虜故成背叛今當恤其飢寒奈何並充僕隸於是盡以歸其父兄部內麥多五穗鄰州田鼠為災犬牙不入歧土又曰韓軌遷秦州刺史甚得邊和神武巡秦州欲以軌還仍賜城人戶別絹布兩疋州人田昭等七千戶皆辭不受唯乞留軌神武嘉歎乃留焉北史曰齊任城王諧為并, WYG: 也繼領亳鄭二}
