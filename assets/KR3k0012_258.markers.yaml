  - {type: variant, offset: 3565, length: 655, content: 姓奔馳爭為祈禱其得民情如此冀州俗薄市井多姦詐煚為銅斗鐵尺置之於肆百姓便之上聞而嘉焉頒告天下以為常法又曰蔡王智積為同州刺史儀衛資送甚盛頃之以修謹聞高祖善之在州未嘗嬉戲遊獵聽政之暇端然讀書門無私謁有侍讀公孫尚儀山東儒士府佐楊君英蕭德言並有文學時延於座所設惟餅果酒纔三酌家有女妓唯年節嘉慶奏於太妃之前其簡靜如此又曰公孫景茂為道州刺史悉以秩俸買牛犢雞豬散惠孤弱不自存者好單騎巡人家至戶入閱視百姓產業有循理者於都會時乃襃楊稱述如有過惡隨即訓導而不彰也由是人行義讓有無均通男子相助耕耘婦人相助紡績大村或數百戶皆如一家之務其後請致仕上優詔聽之仁壽中上明公楊紀出使河北見景茂神力不衰還以狀奏於是就拜淄州刺史賜以馬轝便道之官前後歷職皆有德政論者稱為良牧又曰梁彥光為相州刺史初齊亡後衣冠士人多遷關內唯伎巧啇販及樂戶之家移實州郭由是人情險詖妄起風謠訴訟官人萬端千變彥光欲革其弊乃用秩俸之物招致山東大儒每鄉立學非聖哲之書不得教授常以季月召集之親臨策試有勤學異等聰令有聞者升堂設饌其餘並座廊下有諍訟惰業無成者坐之庭中設以草具及大成當舉行賓貢之禮又於郊外祖道并以財物資之於是人皆剋勵風俗大改又曰韋世康尉遟迴之作亂也高祖憂之謂世康曰汾絳舊是周齊分界因此亂皆恐生搖動今以委公善為吾守因授絳州刺史以雅望鎮之闔境清肅又曰豆盧勣為渭州刺史甚有惠政華夷悅服德澤流行多致祥瑞鳥鼠山俗呼為高武隴其下渭水所出其山絕壁千尋由來乏水諸羌苦之勣馬足所踐忽飛泉湧出有白烏翔止廳前乳子而後去又白狼見於襄武民為之謠曰我有丹陽山出玉漿濟我民夷神鳥來翔百姓因號其泉為玉漿泉, SBCK: 五十八}
