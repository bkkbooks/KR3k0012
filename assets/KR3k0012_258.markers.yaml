  - {type: variant, offset: 788, length: 6, content: 假魏昌侯麒麟, SBCK: 蕭復濠州刺史張溢爲理行第一其勸農桑均賦稅逋亡歸復户口増加定又冠焉又曰叚秀實爲涇州刺史兼御史大夫四鎮北庭行軍涇原鄭頴節度使三四年間吐蕃不敢犯塞清約率昜逺近稱之非公㑹不聽樂飲酒私室無妓媵無嬴財退公之後端居静慮而巳德宗嗣位就加檢校禮部尚書又曰劉賛子􅀇之孫爲淅西都􅇛練判官建中􅀄楊炎作相擢爲歙州刺史以勤幹聞有老婦捃拾於叢林之間爲猛獸將噬㓜女號呼􅅮而救之母子俱免夲道觀察使韓滉奏爲異跡加金紫之服累歳遷常州刺史又曰李惠登李希烈反授惠登兵二千鎮隋州貞元􅀄舉州歸順授隋州刺史兼御史中丞州遭李忠臣希烈殱殘後野曠無人惠登朴質不知學居官無枝棄率心爲政皆與理順利人者因行之病人者因去之二十年間田疇闢户口加諸州奏吏入其境無不謌謡其能又曰韓愈爲潮州刺史旣視事詢吏民疾苦皆曰郡西湫水有鱷魚夘而化其長數丈食民畜産將盡以是民貧居數日愈徃視之令判官􅁗濟炮一豚一羊投之湫水呪之曰前代德薄之君棄楚越之地則鱷魚涵泳於此可也今天子神聖四海之外撫而有之况楊州之境刺史縣令之所治出貢賦以供天地宗廟之祝鱷魚豈可與刺史雜處此土哉刺史受天子命令守此土而鱷魚晘然安谿潭食民畜熊鹿麞豕以肥其身以䌓其􅆑與刺史争爲長雄刺史雖駑弱安肯爲鱷魚低手而下哉今潮州大海在其南鯨鵬之大蝦蟹之細無不容鱷魚朝發而夕至今與鱷魚約三日乃至七日如頑而不徙湏爲物害則刺史選材􅇊壯夫操勁弓毒矢與鱷魚從事矣呪之夕有􅁀風雷起於湫中數日湫水盡涸徙於舊湫西六十里自是潮人無鱷患又曰盧鈞開成元年爲廣州刺史御史大夫嶺南節度使南海有蠻舶之利珎貨輻湊舊帥作法興利以致冨凡爲南海者靡不稇載而還鈞性仁恕爲政廉㓗請􅁥軍領市舶使巳一不干預自貞元巳來衣冠得罪流放嶺表者因而物故子孫貧悴雖遇赦不能自還凡在封境者鈞减俸錢爲營槥櫝其家疾病死䘮則爲醫藥殯歛􅀌兒稚女爲之㛰嫁凡數百家由是山越之俗服其德義不嚴而人化又曰朱敬則爲御史冉祖雍所誣貶授廬州刺史經數月代到還郷里無淮南一物唯有所乗馬一疋諸子姪徒歩而歸又曰許圉師轉相州刺史政寛存惠人吏刋石以頌之甞有官吏犯􅂍事露圉師不令推究但賜清白詩以激其犯者愧懼遂改節爲廉士其寛如此又曰齊瀚定州義豊人爲汴州刺史河南爲雄郡自江淮逹于河洛舟車輻湊人庶浩䌓前後牧守多不稱職唯倪􅀂水與瀚皆以清嚴爲治吏民歌之又曰李勉爲廣州刺史兼嶺南節度使觀察畨禺賊帥馮崇道桂州叛將朱濟時等阻洞爲亂前後累歳䧟没十餘州勉至遣將李觀與容州刺史王翃併力招討悉斬之五嶺平前後西域舶泛海者歳􅂊四五勉性廉㓗舶來都不撿閱故末年舶至者四十餘}
