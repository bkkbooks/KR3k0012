  - {type: variant, offset: 2641, length: 430, content: 舩客於郭外星居者勒為聚落僑人逐令歸本其有滯獄並決遣之令行禁止稱為良政上聞而嘉之顧謂侍臣曰鄴都天下難理處也勑相州刺史豆盧通令習熙之法其年朝考績為天下之最賜帛三百疋頒告天下又曰楊達字士達為鄯鄭趙三州刺史俱有能名平陳之後四海大同上差品天下牧宰達為第一賜雜綵五百叚加以金帛又曰慕容三藏授廓州刺史州極西界與吐谷渾鄰接姦宄犯法者皆遷配彼州流人多有逃逸及三藏至招納綏撫百姓愛悅繈負日至吏民歌頌之高祖聞其能屢有勞問其年當州畜產繁孳獲醍醐奉獻賴物百叚又曰衛玄出為資州刺史以鎮撫之玄既到官時獠攻圍大牢鎮玄單騎造其營謂群獠曰我是刺史銜天子詔安養汝等勿驚懼也諸賊莫敢動於是說以利害渠帥感悅解兵而去前後歸附者十餘萬口高祖大悅賜縑二千疋又曰郭衍為瀛州刺史遇秋霖大水其屬縣多漂沒民皆上高樹依大冢衍親備船栰并齎糧拯救之民多獲濟衍先開倉賑恤後始聞奏上大善之又曰辛彥之拜隋州刺史于時州牧多貢珍翫唯彥之所貢並供祭之物高祖善之顧謂朝臣曰人安得無學彥之所貢稽古之力也又曰梁彥光為歧州刺史甚有惠政嘉禾連出, SBCK: 聲遍}
