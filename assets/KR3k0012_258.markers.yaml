  - {type: variant, offset: 1306, length: 11, content: 從行臺蕭寶夤討破宛川俘, SBCK: 克巳矜施不畜資産䘮亂之餘白骨未収者爲之殯葬}
  - {type: variant, offset: 1306, length: 2, content: 從行, krp: 克巳矜施不畜資産䘮亂之餘白骨未収者爲之殯葬其有骨肉恩薄不収歛者皆加貶責由是百姓感化復覩太平置酒大㑹坐中耆老相與流涕而歎曰吾等投老更得父母死將何恨又童謡曰幸哉遺民免豺虎三辰旣㓪遇慈父玄酒清醪甘瓠脯亦何報恩歌且舞陶氏家傳曰基字叔先爲交州刺史始夷人不識禮義男女牙相奔隨生子乃不知父君乃敦以㛰姻之道訓以父子之恩道之以禮齊之以刑設庠序立學校合境化之莫不恱之語林曰何公爲楊州有葬親者乞數萬錢而帳下無有楊州常有糲米以賑孤寡乃有萬餘斛虞存爲治中面見道帳下空素求粲此米付帳下何公曰何次道義不與孤寡争粒酷刺史續漢書曰侯覽爲益州刺史豊冨者輙誣以大罪皆誅㓕之没入財物謝承後漢書曰第五倫上䟽襃稱盛美曰前歲誅刺史二千石貪殘者皆明聖所察非臣下所及晉書曰郄隆爲楊州刺史僚屬有過輙依}
  - {type: variant, offset: 1309, length: 9, content: 蕭寶夤討破宛川俘其, krp: 閣峻制繩之逺近咸怨于寳晉記曰茍晞爲兖州刺史姨母寡有一子坐小事姨母向晞叩頭及中外皆乞活不聽死後徃哭之甚悲曰殺弟者兖州刺史哭卿者茍道將也後魏書曰于洛侯代}
