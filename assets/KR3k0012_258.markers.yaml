  - {type: variant, offset: 505, length: 203, content: 除并州刺史先是州界下霜人庶逃散徽輒開倉賑之文武咸共諫止徽曰昔汲長孺郡守耳尚輒開倉救人飢弊况我皇家親近授委大藩豈可拘法而不救人困也先給後表肅宗嘉之又曰李平字曇定為相州刺史勸課農桑脩飾太學簡試通儒以充愽士選五郡聰敏者以教之圖孔子及七十二弟子於講堂親為立贊前臺使頗好平畫履虎尾踐薄冰於客館注頌其下以示誡焉又曰韋彧為東豫州刺史彧以蠻俗荒梗不識禮儀乃表立太學選諸郡生徒於州總教文於城北置崇武館以習武焉境內清肅又曰韋珍, SBCK: 􅀄累}
