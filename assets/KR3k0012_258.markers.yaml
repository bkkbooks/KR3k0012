  - {type: variant, offset: 329, length: 132, content: 通舩行人艱阻謂寮佐曰昔杜預乃造河梁況此有異長河且魏晉之日亦自有橋吾今決欲營之咸曰水淺不可為浮橋汎長無常又不可施柱恐難成立亮曰昔秦居咸陽橫橋渡渭以像閣道此即以柱為橋今惟慮長柱不可得耳會天大雨山水暴至浮出長木數百根藉此為用橋遂成立百姓利之至今猶名崔公橋又曰任城王雲為冀, SBCK: 知其刺史也後轉瀛}
