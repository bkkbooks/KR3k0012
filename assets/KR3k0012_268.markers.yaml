  - {type: variant, offset: 4531, length: 2, content: 武昌, WYG: 各引咎而去所得俸禄賑施窮乏百姓感其徳化更相篤勵曰有君如此何得為非唐書曰李大亮授土門令屬百姓饑荒盗賊侵剋大亮賣所乘馬分給貧弱勸以墾田嵗因大稔躬捕冦盗所擊輒平時}
  - {type: variant, offset: 4534, length: 2, content: 守除, WYG: 宗在藩廵撫北境聞而嗟歎下書勞之又曰賈敦頤弟敦實貞觀中為饒陽令政化清静老㓜懐之時敦頤復授瀛州刺史舊制大功以上不復連官朝廷以其兄弟在職俱有能名遂不遷替又曰髙宗以尚乘奉御權懐恩為萬年令賞能也時有奉乘安畢羅善於調馬上頗狎之懐恩因奏事遇畢羅在左右言戯無禮懐恩既退執而杖之上知而嗟賞謂侍臣曰懐恩乃能不避强禦真良吏也即日遷擢又曰景雲長安縣令李朝隐加太中大夫朝隐之宰京縣也政刑畢舉權豪懾憚有内寺以非禮干忤朝隐叱繫于獄上喜焉故有此命又曰路嗣恭京兆三原人始名劒客厯仕郡縣有能}
