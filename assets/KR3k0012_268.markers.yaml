  - {type: variant, offset: 4612, length: 2, content: 謙却, WYG: 還之已至勿還也使者及之}
  - {type: variant, offset: 4616, length: 1, content: 受, WYG: 還君問其故對曰臣見所與共載者白首也夫以老者之智以少者之决必能治阿矣是以不還}
