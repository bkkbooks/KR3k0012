  - {type: variant, offset: 343, length: 534, content: 察以斷故其政不擾也以此觀之雖三稱善庸盡其美乎史記曰西門豹為鄴令豹到鄴會長老問民之所疾苦長老曰鄴三老廷掾常歲賦歛百姓收取其錢得數百萬為河伯取婦當其時巫行視小家女好者云是當為河伯婦娉取洗沐之如嫁女床席令女居其上浮之河中浮行數十里乃沒其人家有好女者恐大巫祝為河伯取之以故多持女逃亡豹曰至河伯取婦時願三老語之至其時豹往河上呼河伯婦來曰是女不好煩大巫嫗為入報河伯得更求好女後日送之即使抱大巫嫗投河中豹顧曰巫嫗不來復欲使廷掾與豪長一人趣之皆叩頭血流地後不敢言為河伯取婦豹即發民鑿渠十二引灌民田田皆灌溉至今皆得水利漢書曰邵信臣字翁卿九江壽春人補穀陽長舉高第遷上蔡長其治視民如子所居見稱後漢書曰卓茂為密令勞心諄諄視民如子民不忍欺光武初即位詔曰前密令卓茂能為人所不能為夫名冠天下當受天下重賞今以茂為太傅封褒德侯食邑二千戶茂長子為太中大夫次子為郎中又曰劉昆字桓公為江陵令縣連災火昆輒向火叩頭多能降雨止風又曰戴封字平仲為西華令大旱祈禱無獲乃積薪自焚火起而雨大至又曰王渙為洛陽令人為立祠及桓帝事黃老道毀諸旁祀唯特詔密縣留卓茂廟及渙祠也東觀漢記曰卓茂字子康南陽人遷密令視民如子口無惡言吏民親愛而不忍欺之民嘗有言部亭長受其米肉遺者茂問之曰亭長從汝求乎為汝有事屬之而受乎將平居以恩意遺之乎民曰往遺之, WYG: 府}
