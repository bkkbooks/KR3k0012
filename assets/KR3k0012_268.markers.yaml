  - {type: variant, offset: 13, length: 1, content: 成, SBCK: 房彦謙遷長􅁑令甚有惠化百姓號爲慈父仁壽中上令持節使者廵行縣察長吏能不以彦謙爲天下第一超授鄀州司馬吏民號􅂘相謂曰房明府今去吾屬何用生爲其後百姓思之立碑頌德又曰劉曠不知何許人也性謹厚毎以誠恕應物開皇􅀄爲平郷令單􅀐之官}
  - {type: variant, offset: 13, length: 1, content: 成, WYG: 張譚字元慶武威姑臧}
  - {type: variant, offset: 13, length: 1, content: 成, krp: 房彦謙遷長葛令甚有惠化百姓號爲慈父仁壽中上令持節使者廵行縣察長吏能不以彦謙爲天下第一超授鄀州司馬吏民號哭相謂曰房明府今去吾屬何用生爲其後百姓思之立碑頌德又曰劉曠不知何許人也性謹厚毎以誠恕應物開皇𥘉爲平郷令單騎之官}
  - {type: variant, offset: 15, length: 0, content: '', WYG: 也為和寧令政以徳化為本不務威刑民}
  - {type: variant, offset: 16, length: 0, content: '', SBCK: 争訟者輙丁寧暁以義理不加繩劾自各引咎而去所得俸禄賑施窮乏百姓感其德化更相篤勵曰有君如此何得爲非唐書曰李大亮授土門令屬百姓饑荒盗賊侵冦大亮遂賣所乗馬分給貧弱勸以墾田歳因大稔躬捕冦盗所擊輙平時太宗在藩廵撫北境聞而嗟歎下書勞之又曰賈敦頥弟敦實貞觀中爲饒陽令政化清静老㓜懷之時敦頥復授瀛州刺史舊制大功以上不復連官朝廷以其}
  - {type: page-break, offset: 16, content: '', id: KR3k0012_SBCK_268-3a}
  - {type: variant, offset: 16, length: 3, content: 兄死而, WYG: 過者讀孝經及忠臣孝子𫝊訓導之百姓愛之如父母號曰慈君又後趙録曰王謨字思賢甕鼻言}
  - {type: page-break, offset: 16, content: '', id: KR3k0012_WYG_268-1b, image: WYG0895/WYG0895-0395d.png}
  - {type: variant, offset: 16, length: 0, content: '', krp: 争訟者輙丁寧暁以義理不加繩劾自各引咎而去所得俸禄賑施窮乏百姓感其德化更相篤勵曰有君如此何得爲非唐書曰李大亮授土門令屬百姓饑荒盗賊侵冦大亮遂賣所乗馬分給貧弱勸以墾田歳因大稔躬捕冦盗所擊輙平時太宗在藩廵撫北境聞而嗟歎下書勞之又曰賈敦頥弟敦實貞觀中爲饒陽令政化清静老㓜懷之時敦頥復授瀛州刺史舊制大功以上不復連官朝廷以其}
  - {type: variant, offset: 17, length: 1, content: 死, SBCK: 弟在職俱有能名遂不遷替又曰髙宗以尚乗奉御權懷恩爲万年令賞能也時有奉乗安畢羅善於調馬上頗狎之懷恩因奏事遇畢羅在左右言戯無禮懷恩旣退執}
  - {type: variant, offset: 17, length: 1, content: 死, krp: 弟在職俱有能名遂不遷替又曰髙宗以尚乗奉御權懷恩爲万年令賞能也時有奉乗安畢羅善於調馬上頗狎之懷恩因奏事遇畢羅在左右言戯無禮懷恩旣退執}
  - {type: variant, offset: 19, length: 0, content: '', SBCK: 杖之上知而嗟賞謂侍臣曰懷恩乃能}
  - {type: variant, offset: 19, length: 0, content: '', krp: 杖之上知而嗟賞謂侍臣曰懷恩乃能}
  - {type: variant, offset: 20, length: 2, content: 為衰, SBCK: 避強禦真良吏也即日遷擢又曰景雲中長安縣令李朝隱加太中大夫朝隱之宰京縣也政刑畢舉權豪懾憚有内寺伯非禮千忤朝隱叱擊于獄上喜焉故有此命又曰路嗣恭京兆三原人始名劒客歴仕郡縣有能名後授神烏令考績上上而爲天下最􅀇宗以其能嗣魯恭賜改其名又曰韋景駿開元中爲肥郷令縣人有母子相訟者景駿謂之曰吾少􅀌毎見人養親自痛終天無分汝幸在温凊之地何得如此錫􅀋不行令之罪也因垂泣嗚咽仍取孝經與之令習讀於是母子感悟各請改悔遂􅁛慈孝累轉趙州長史路由肥郷人吏驚喜竟來犒餞留連經日有童稚數人年甫十餘歳亦在其中景駿謂曰計吾去此時汝軰未生旣無舊恩何慇勤之甚也咸對曰比}
  - {type: page-break, offset: 20, content: '', id: KR3k0012_SBCK_268-3b}
  - {type: variant, offset: 20, length: 10, content: 為衰聞子皋為成宰而為, WYG: 清暢尫短無威儀將拜曲陽令石勒疑}
  - {type: variant, offset: 20, length: 2, content: 為衰, krp: 避強禦真良吏也即日遷擢又曰景雲中長安縣令李朝隱加太中大夫朝隱之宰京縣也政刑畢舉權豪懾憚有内寺伯非禮千忤朝隱叱擊于獄上喜焉故有此命又曰路嗣恭京兆三原人始名劒客歴仕郡縣有能名後授神烏令考績上上而爲天下最玄宗以其能嗣魯恭賜改其名又曰韋景駿開元中爲肥郷令縣人有母子相訟者景駿謂之曰吾少孤毎見人養親自痛終天無分汝幸在温凊之地何得如此錫類不行令之罪也因垂泣嗚咽仍取孝經與之令習讀於是母子感悟各請改悔遂稱慈孝累轉趙州長史路由肥郷人吏驚喜竟來犒餞留連經日有童稚數人年甫十餘歳亦在其中景駿謂曰計吾去此時汝軰未生旣無舊恩何慇勤之甚也咸對曰比}
