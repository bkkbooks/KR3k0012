  - {type: variant, offset: 3517, length: 482, content: 稱之為一州諸城之首吳錄曰張舉字子清為句章令有婦殺夫者因焚屋言燒死其弟疑而訟之舉按屍開口視無灰令人取豬二頭殺一生一而俱焚之開視其口所殺者無灰生者有灰乃明夫先死婦遂首服焉政化流行民歌遺澤晉書曰陸雲為浚儀令縣居都會之要名為難理雲到官下不能欺市無二價人有見殺者主名不立雲錄其妻而無所問十許日遣出密令人隨後謂曰其去不出十里當有男子候之與語便縳來既而果然問之具服云與此妻通共殺其夫聞妻得出欲與語憚近縣故相要候於是一縣稱為神明郡守害其能屢譴責之雲乃去官百姓追思之圖畫形像配食縣社又曰范廣為堂邑令大旱米貴廣散私穀賑飢人至數千斛遠近流寓歸投之戶口十倍又曰曹攄為洛陽令仁惠明斷百姓懷之時天大雨雪宮門夜失行馬群官檢察莫知所在攄使收門士眾官咸謂不然攄曰宮掖禁嚴非外人所敢盜必是門士以燎寒耳詰之果服又曰曹攄為臨淄令縣有寡婦守節不移姑愍之密自殺親黨告婦殺官為考鞠寡婦不勝苦楚乃自誣獄當決攄察其有冤更加辯究具得情實時稱其明晉中興書曰范甯字武子解褐除餘杭令在縣興學校養生徒潔己志行之士莫不來宗朞年之後風化大行自中興已來崇學敦教未有如甯者也宋書曰顧憲之為建康令清儉強力為政甚得人和故都下飲酒者醇旨輒, WYG: ''}
