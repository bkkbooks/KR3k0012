  - {type: 'tls:seg', offset: 4562, content: '', id: KR3k0012_CHANT_268-50a.19}
  - {type: variant, offset: 4563, length: 0, content: '', WYG: 痛終天無分汝幸在温清之地何得如此錫類不行令之罪也因垂泣嗚咽取孝經與之令習讀於是母子感悟各請改悔遂稱慈孝累轉趙州刺史路由肥鄉人吏驚喜競來犒餞留連累日有童稚數人年甫十餘嵗亦在其中景駿謂曰計吾去此時汝輩未生既無舊恩何慇懃之甚也咸對曰比聞長宿𫝊說縣中廨宇學堂館舍堤橋並是明公遺跡將謂古人不意親得瞻覩不覺忻戀倍於常也其為人所思如此又曰馮伉遷尚書膳部貟外郎李抱真卒充弔贈使抱真男遺伉帛數百疋不納又轉送至京伉因表奏固請不受屬醴泉闕}
  - {type: page-break, offset: 4563, content: '', id: KR3k0012_WYG_268-5b, image: WYG0895/WYG0895-0397d.png}
