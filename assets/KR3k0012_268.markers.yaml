  - {type: variant, offset: 1838, length: 527, content: 篣捶也音彭信陽侯陰就乃訴帝譖延多所冤枉帝乃臨御道之館親錄囚徒延陳其獄狀可論者在東無理者居西成乃廻欲趍東延前執之謂曰爾人之巨蠹久依城社不畏熏燒今考實未竟宜當盡法成大呼稱枉陛戟郎以戟刺延叱使置之帝知延不私謂成曰汝犯王法身自取之呵使速去後數日伏誅於是外戚歛手莫敢干法又曰法雄除平氏長善政事好發擿姦伏盜賊希發吏人畏愛之南陽太守鮑得上其理狀遷苑陵令續漢書曰魯恭為中牟令導民以孝推誠而治建初中郡國螟傷稼犬牙緣界不入中牟河南尹袁安疑其不實遣仁恕掾肥親往察廉之恭隨行阡陌俱坐桑下有雉過止其傍傍有童兒親曰何不擊之兒言雉方將雛親瞿然而起與恭訣曰所以來者欲察治之善惡耳今虫不犯境此一異也化及鳥獸此二異也豎子有仁心此三異也久留徒擾賢者耳還府以狀白安安美其治以勵屬縣又曰祭彤除偃師長視事五年縣無盜賊州課第一遷襄賁令時賊鈔掠彤到官誅鉏姦猾縣界清靜詔書增秩一等賜縑百疋冊書勉勵又曰劉寵除東平陵令是時民俗奢泰寵到官躬儉訓民以禮上下有序都鄙有章視事數年以母病去官歸百姓士女攀車拒輪充塞道路車不得前乃止亭輕服潛遁又曰劉駼騊為湞陽長政化大行道不拾遺以病去官童謠歌之曰邑然不樂思我劉君何時復來安此下民又曰公孫述補清水長太守以其能使兼治五縣政事脩理姦盜不發郡中謂之神明又曰胡紹為河內懷令三日一視事, SBCK: 六}
