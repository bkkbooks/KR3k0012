  - {type: variant, offset: 23, length: 4, content: 子皋為成, SBCK: 長􅀫傳􅀃縣中􅅟宇學堂舘舎堤橋並是明公遺跡將謂古人不意親得瞻覩不􅁴欣戀倍於常也其爲人所思如此又曰馮伉遷尚書膳部貟外郎李抱真卒充弔贈使抱真男遺伉帛數百疋不納又專送至京伉因表奏固請不受屬醴泉闕縣令}
  - {type: variant, offset: 23, length: 4, content: 子皋為成, krp: 長宿傳說縣中廨宇學堂舘舎堤橋並是明公遺跡將謂古人不意親得瞻覩不覺欣戀倍於常也其爲人所思如此又曰馮伉遷尚書膳部貟外郎李抱真卒充弔贈使抱真男遺伉帛數百疋不納又專送至京伉因表奏固請不受屬醴泉闕縣令}
