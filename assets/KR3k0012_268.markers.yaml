  - {type: variant, offset: 4565, length: 0, content: '', WYG: 宰臣進人名上意不可謂宰臣曰前使澤潞不受財帛者此人必有清政可以授之遂改醴泉縣令患百姓多昏猾}
  - {type: variant, offset: 4566, length: 2, content: 邦畿, WYG: 著諭䝉十四篇}
  - {type: variant, offset: 4569, length: 0, content: '', WYG: 指明忠孝仁義勸學務農每鄉給一卷俾其𫝊習又曰元徳秀字紫芝河南人也為魯山令先是墮車傷足不任趨拜汝}
  - {type: punctuation, offset: 4570, content: ，, id: KR3k0012_CHANT_268-bkkpn1258}
  - {type: 'tls:seg', offset: 4570, content: '', id: KR3k0012_CHANT_268-50a.20}
  - {type: variant, offset: 4570, length: 3, content: 近代未, WYG: 守以客禮待}
  - {type: variant, offset: 4574, length: 0, content: '', WYG: 部人為盗吏捕之繫獄㑹縣界}
  - {type: variant, offset: 4575, length: 0, content: '', WYG: 猛獸為暴盗自陳曰願格殺猛獸以自贖徳秀許之胥吏曰盗詭計苟免擅放官囚無乃累乎徳秀曰吾不欲負約累則吾坐必請不及諸君即破械出之翌日格猛獸而還誠信化人大率此類又曰王敬則為暨陽令時軍後縣有一部刼逃入山中頗為人患敬則遣人致意刼帥使出首當申論郭下廟神甚酷烈百姓信之敬則引神為誓必不相負刼帥既出敬則於廟中設酒㑹於座収縛曰吾啓神若負誓還神十牛今不得違誓即殺十牛解神并斬諸刼百姓恱之晉史曰夀張令趙􅆳考滿之外量留二年以飛蝗避境故也廣州先賢傳曰黄豪字子㣲交趾人除外黄令豪約已儉節麄布蔬食所得俸秩悉賜貧吏一縣稱平益部耆舊傳曰羅衡字仲伯為萬年令誅除姦黨縣界肅然民夜不閉門繫牛馬於道傍曰以屬羅公又曰趙珜字孫明少好逰俠行部帶劍過長亭亭長譴之乃嘆曰無大志故為亭吏所輕耳於是解劍掛壁曰珜不乘輜車佩紱不復帶劍因之京師詣大學受業治春秋變行厲操名徳遂稱除野王令乃解劍帶之官治官清約以身率下煙火不舉常食乾糒又曰閻憲字孟度為綿竹令治以禮讓為首寛猛相濟其聴察甚明簡選吏職甚得其人男子杜成夜於路得遺装一嚢開視有錦二十五疋迄明詣吏曰縣有明君不能慙心故}
