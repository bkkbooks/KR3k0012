  - {type: variant, offset: 4585, length: 1, content: 煩, WYG: 貴戚無所􅂞避汝南先賢𫝊曰黄浮字隐公陽安人年二十在於民伍曽為墟里所差至當路亭於是感激學書慨然長嘆曰黄浮非郷里所知因隨人到京師求學嵗餘除昌慮長濮陽令同嵗子為都市掾犯罪當死一郡盡為之請浮曰周公誅二弟石碏討其子今雖同嵗子浮所不能赦也治政清明號為神君又曰陳曄邵陵人也體尚篤烈學通古今除巫令民張遺腹子年十五為父報讐吏捕得之曄愍曰嗟乎今殺遺腹之孤絶人嗣祀是不仁也去報讎之子是不義也不仁不義焉可為人君長哉遂解印綬逃亡鍾玩良吏𫝊曰髙玩字伯珎蜀郡人也除曲陽令及徴還送者不使出界布被緼裘猶去時之服朝野稱其清又曰司馬雋字元異補洛陽令豪右挫氣京都號曰卧虎又曰陳登字元龍廣漢人也為東陽令長視民如子崔氏家𫝊曰崔瑗為汲令乃為開渠造稻田薄鹵之地更為沃壤民頼其利長老歌之曰天降神明君錫我慈仁父臨民布徳澤恩恵施}
  - {type: page-break, offset: 4585, content: '', id: KR3k0012_WYG_268-9a, image: WYG0895/WYG0895-0399c.png}
  - {type: page-break, offset: 4585, content: '', id: KR3k0012_WYG_268-9b, image: WYG0895/WYG0895-0399d.png}
  - {type: variant, offset: 4587, length: 1, content: 簡, WYG: 序穿溝廣灌溉决渠作甘雨殷氏𫝊曰殷裒為滎陽令先多滛雨百姓饑饉君乃穿渠入河三十餘里䟽導原隰用致豐年民賴其利號殷渠而頌之鍾離意别𫝊曰意遷東平瑕丘令男子兒直勇悍有力便弓弩飛射走獸百不脫一桀悖好犯長吏意到官召署捕盗掾勅謂之云令昔嘗破三軍之衆不用尺兵嘗縛暴虎不用尺繩但以良謀為之耳掾之氣勢安若宜慎之因復召直子渉署門下將游徼私出入寺門無所闗白収渉鞭之直走之寺門吹氣大言言無上下意勅直能為子屈者自縛誡令不則鞭殺其子直果自縛意告曰令前告汝嘗縛暴虎不用尺繩汝自視何如虎自縛耶勅}
  - {type: page-break, offset: 4587, content: '', id: KR3k0012_WYG_268-10a, image: WYG0895/WYG0895-0400a.png}
  - {type: page-break, offset: 4587, content: '', id: KR3k0012_WYG_268-10b, image: WYG0895/WYG0895-0400b.png}
  - {type: punctuation, offset: 4588, content: ，, id: KR3k0012_CHANT_268-bkkpn1264}
  - {type: 'tls:seg', offset: 4588, content: '', id: KR3k0012_CHANT_268-51a.5}
  - {type: variant, offset: 4589, length: 0, content: '', WYG: 械直父子結連其頭對榜博壮切欲死掾吏陳諌乃貸之由是相率為善所謂上徳之政鷹化為鳩暴虎成狸此之謂也荀氏家𫝊曰荀貎除太原榆次令為政以徳人懐之時有鳯凰集其境内晉武帝下詔褒美太始三年卒吏人如䘮親戚為之樹碑其序曰仰之如日月敬之如神明愛之如父母樂之如時雨典略曰韓攸字仲潢潁川人為羸長時民大饑而太守未至攸因發食賑之吏白言太守垂至軍粮重事可湏來到攸言民命懸急令以擅出榖受罪合眼入地不以為恨也後竟不坐吏民䝉濟者數千人㑹稽典録曰徐𢎞字聖通為山隂令縣俗剛強大姓兼并𢎞到官誅剪姦桀豪右斂手商旅路宿道不拾遺童歌之曰徐聖通政}
  - {type: page-break, offset: 4589, content: '', id: KR3k0012_WYG_268-11a, image: WYG0895/WYG0895-0400c.png}
  - {type: page-break, offset: 4589, content: '', id: KR3k0012_WYG_268-11b, image: WYG0895/WYG0895-0400d.png}
  - {type: variant, offset: 4590, length: 0, content: '', WYG: 雙平刑罰姦宄空華陽國志曰王長文字徳雋元康初試守江源令縣収得盗馬賊及發塜賊長文引見誘慰時適臘晦皆遣歸家獄先有}
  - {type: punctuation, offset: 4592, content: 。, id: KR3k0012_CHANT_268-bkkpn1265}
  - {type: 'tls:seg', offset: 4592, content: '', id: KR3k0012_CHANT_268-51a.6}
  - {type: variant, offset: 4592, length: 5, content: 及去官百姓, WYG: 亦遣之謂曰教化不厚使汝等如此長吏之過也蜡節慶祚歸就汝上下善相懽樂過節來還當為汝思他理郡吏惶懼争請不許尋有赦令無不感恩又曰景毅字文堅梓潼人為髙陵令有文學}
  - {type: punctuation, offset: 4595, content: ，, id: KR3k0012_CHANT_268-bkkpn1266}
  - {type: 'tls:seg', offset: 4595, content: '', id: KR3k0012_CHANT_268-51a.7}
  - {type: variant, offset: 4598, length: 1, content: 謙, WYG: 禮讓化民遷侍御史吏民守闕請之三年不絶捜神記曰徐栩字敬卿吳由拳人少為獄吏執法詳平為小黄令時屬縣大蝗野無生草小黄界飛過不集山公啓事曰温令許竒等並見稱名雖}
  - {type: page-break, offset: 4598, content: '', id: KR3k0012_WYG_268-12a, image: WYG0895/WYG0895-0401a.png}
  - {type: variant, offset: 4601, length: 0, content: '', WYG: 各日淺宜顯報大郡以勸天下詔曰案其資厯悉自足為郡守各以在職日淺則宜盡其政績}
  - {type: variant, offset: 4602, length: 3, content: 受餉遺, WYG: 宜速他轉也博物志曰太公望為灌壇令期年風不鳴條文王夢見一婦人甚麗當道而哭問其故婦人言曰我東海太山神女嫁為西海婦欲東歸灌壇令當吾道太公有徳吾不敢以暴風疾雨過也文王夢覺明日召太公三日果有疾風暴雨去者皆西來也說苑曰晏子治東阿三年景公召而數之曰吾以子為可而使子治東阿今子治而亂子退而自察也寡人将加大誅乎晏子曰臣請改過易行而治東阿三年不治臣請死之景公許之於是明年上計景公迎而賀之曰善矣子之治東阿也晏子對曰前臣之治東阿屬託不行貨賂不至陂池之魚以利貧民當此之時民無饑者而君反以罪今臣之治東阿也屬託行貨賂至事左右陂池之魚入權家民之貧饑者過半君反迎而賀臣臣願乞骸骨景公乃下席而謝曰子強復治之東阿者子之東阿也寡人無復與焉新序曰昔子竒年十八齊君使之治阿既行矣悔之使使}
  - {type: page-break, offset: 4602, content: '', id: KR3k0012_WYG_268-12b, image: WYG0895/WYG0895-0401b.png}
