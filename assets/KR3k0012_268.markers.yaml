  - {type: variant, offset: 4044, length: 239, content: 決憲之至覆其狀謂二家曰無為多言吾得之矣乃令解牛任其所去牛逕還本主宅盜者始伏其辜發姦擿伏多如此類時人號曰神明又曰顧覬之遷山陰令山陰民戶三萬海內劇邑前後官長晝夜不得休事猶不舉覬之理繁以約用無事晝日垂簾門階閑寂自宋世為山陰務簡而績修莫能尚也齊書曰傅琰為山陰令有賣針賣糖老姥爭團絲來詣琰不辯乃縛團絲於柱鞭之密視有鐵屑乃罰賣糖者又三野父爭雞琰各問何以食雞一人云粟一人云豆乃破雞果得粟罪言豆者縣內咸稱神明無敢復為盜者又曰傅琰字季珪為山陰令父僧祐亦為山陰令父子並著奇績世云諸傅有治縣譜子孫相傳, WYG: ''}
