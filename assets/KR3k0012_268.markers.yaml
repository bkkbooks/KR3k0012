  - {type: variant, offset: 4584, length: 0, content: '', WYG: 寛和多恵以至誠接下為民所愛比縣連嵗蝗灾曲折不入茂陵長沙耆舊傳曰祝良字邵卿為洛陽令貴戚斂手桴皷稀鳴時亢旱天子祈雨不得良乃暴身階庭告誠引罪紫雲沓起甘雨乃降陳留風俗𫝊曰昭帝時蒙人焦貢為小黄令路不拾遺囹圄空虛詔遷貢百姓揮涕守闕求索還貢天子聴増貢之秩千石令貢風化猶存其民好學多貧此其風也海内先賢傳曰公沙穆遷𢎞農令界有蝗蟲食禾稼百姓惶懼穆設壇謝曰百姓有過咎在典長罪穆之由請以身禱𤣥雲四集雨下滂沱自日中至晡不知蝗蟲所在百姓稱曰神明魯國先賢𫝊曰孔翊為洛陽令置水於庭前得私書皆投其中一無所發彈}
