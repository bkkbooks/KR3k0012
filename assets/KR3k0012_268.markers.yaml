  - {type: variant, offset: 10, length: 2, content: 禮記, SBCK: 聞而嘉之賜物四百叚恭懿以所得賜分給窮乏未幾復賜米三百石恭懿又以賑貧人上聞而止之時雍州諸縣令毎朔朝謁上見恭懿必呼至榻前訪以理人之術又}
