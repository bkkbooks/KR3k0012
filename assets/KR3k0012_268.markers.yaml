  - {type: variant, offset: 2452, length: 741, content: 陽人除上黨長治政嚴峻明於疑理縣中謂之神明謝承後漢書曰鄭弘字巨君為鄒令勤行德化部人王逢等得路遺寶物懸於道衢求主還之魯國當春大旱五穀不豐鄒獨致兩偏熟永平十五年蝗起泰山流被郡國過鄒界不集郡國以狀聞詔書以為不然遣使案行如言也又曰方儲字聖明曉風角占候為句章長時人田還置餘粟一石及刀鋤於田陌明日求亡去疑其旁家儲曰此人非偷自呼縣功曹謂曰君何取人粟置家後積茭中功曹歎服後為洛陽令功曹是憲客為憲所諷夜殺人斷頭著奩中置廄門下欲令儲去官儲摩死者耳邊問誰所殺有頃曰死人言為功曹所殺收功曹栲竟具服又曰賈彪字偉節補新息長政多奇異小人迫困貧產子不能舉養彪禁有犯者以殺人罪罪之縣境震慄人養子僉曰賈父所長男女皆以賈為名華嶠後漢書曰劉平為全椒令掾吏五日一朝罷門闌卒署各遣就農人感懷至或增貲就賦或減年從役刺史行部獄無囚徒民各自以為職不知所問唯班詔書而去先是縣多虎為害平到修政選進儒良黜貪殘視事三月虎皆渡江而去又曰劉永國字叔儒為東城令民聞其名枉者更直濁者強清肅然無事唯以著作為務袁山松後漢書曰范丹為萊蕪長去官常便賣卜以自給步行無車被囊自隨漢官儀曰明帝臨觀見洛陽令車騎意河南尹定至而非尤其太盛勑去軒綏時偃師長治有能名以事詣臺因取賜之下縣遂以為故事魏志曰鄭渾字文公避難淮南太祖聞其篤行召為邵陵令天下未定民皆不念產殖其生子無以相活率皆不舉渾所在奪其漁獵之具課使耕種又兼開稻田重去子之法民初畏罪後稍豊給無不舉育所育男女多以鄭為名又曰胡質字文德楚國壽春人也為頓丘令縣民郭政通於從妹殺其夫程他郡吏馮諒繫獄為證政與妹皆耐掠隱抵諒不勝痛自誣當反其罪質至官察其情色更詳其事檢驗具服又曰王脩字叔治守高密令高密孫氏素豪俠人客數犯法民有相劫者賊入孫氏吏不能得脩將吏民畏憚不敢近脩令吏民敢有不攻者與同罪孫氏懼乃出賊由是豪強懾服又曰趙儼字思伯為朗陵長, WYG: 隂}
