  - {type: variant, offset: 2366, length: 2275, content: 日一詣倉受俸米於閤外炊作乾飯食之不設釜竈得一強盜問其黨與得數百人皆誅之政教清平為三河表又曰牟融舉茂才為豐令視事二年政化流行縣無獄訟吏畏而愛之治有異迹為州郡最又曰度尚字愽平山陽人除上黨長治政嚴峻明於疑理縣中謂之神明謝承後漢書曰鄭弘字巨君為鄒令勤行德化部人王逢等得路遺寶物懸於道衢求主還之魯國當春大旱五穀不豐鄒獨致兩偏熟永平十五年蝗起泰山流被郡國過鄒界不集郡國以狀聞詔書以為不然遣使案行如言也又曰方儲字聖明曉風角占候為句章長時人田還置餘粟一石及刀鋤於田陌明日求亡去疑其旁家儲曰此人非偷自呼縣功曹謂曰君何取人粟置家後積茭中功曹歎服後為洛陽令功曹是憲客為憲所諷夜殺人斷頭著奩中置廄門下欲令儲去官儲摩死者耳邊問誰所殺有頃曰死人言為功曹所殺收功曹栲竟具服又曰賈彪字偉節補新息長政多奇異小人迫困貧產子不能舉養彪禁有犯者以殺人罪罪之縣境震慄人養子僉曰賈父所長男女皆以賈為名華嶠後漢書曰劉平為全椒令掾吏五日一朝罷門闌卒署各遣就農人感懷至或增貲就賦或減年從役刺史行部獄無囚徒民各自以為職不知所問唯班詔書而去先是縣多虎為害平到修政選進儒良黜貪殘視事三月虎皆渡江而去又曰劉永國字叔儒為東城令民聞其名枉者更直濁者強清肅然無事唯以著作為務袁山松後漢書曰范丹為萊蕪長去官常便賣卜以自給步行無車被囊自隨漢官儀曰明帝臨觀見洛陽令車騎意河南尹定至而非尤其太盛勑去軒綏時偃師長治有能名以事詣臺因取賜之下縣遂以為故事魏志曰鄭渾字文公避難淮南太祖聞其篤行召為邵陵令天下未定民皆不念產殖其生子無以相活率皆不舉渾所在奪其漁獵之具課使耕種又兼開稻田重去子之法民初畏罪後稍豊給無不舉育所育男女多以鄭為名又曰胡質字文德楚國壽春人也為頓丘令縣民郭政通於從妹殺其夫程他郡吏馮諒繫獄為證政與妹皆耐掠隱抵諒不勝痛自誣當反其罪質至官察其情色更詳其事檢驗具服又曰王脩字叔治守高密令高密孫氏素豪俠人客數犯法民有相劫者賊入孫氏吏不能得脩將吏民畏憚不敢近脩令吏民敢有不攻者與同罪孫氏懼乃出賊由是豪強懾服又曰趙儼字思伯為朗陵長縣多豪猾無所畏忌儼取其尤甚者收縛案驗皆得死罪儼既囚之乃表府解放自是威恩並著又曰張暨字德容馮掖高陵人也舉茂才為新豐令治為三輔第一又曰司馬朗字伯達河內溫人也為堂陽長其治務寬惠不行鞭杖而民不犯禁又曰吉茂字叔暢馮翊池陽人也世為著姓好書不恥惡衣惡食而恥一物之不知建安初關中始平茂與扶風蘇則共入武功南山隱處精思數歲州舉茂才除臨汾令居官清靜吏民不忍欺又曰太祖平袁氏以高柔為菅長縣中素聞其名姦吏數人皆引去柔教曰昔邴吉臨政吏嘗有非猶尚容之况此諸吏於吾未有失乎其召復之咸還皆礪誠佳吏蜀志曰董和字幼宰南郡人也益州牧劉璋以為成都令蜀土富實時俗奢侈貨殖之家侯服玉食婚姻葬送傾家竭產和躬率以儉惡衣蔬食防遏踰僣為之軌制所在皆移風變善畏而不犯又曰呂義字季陽遷新都綿竹令乃心隱恤百姓稱之為一州諸城之首吳錄曰張舉字子清為句章令有婦殺夫者因焚屋言燒死其弟疑而訟之舉按屍開口視無灰令人取豬二頭殺一生一而俱焚之開視其口所殺者無灰生者有灰乃明夫先死婦遂首服焉政化流行民歌遺澤晉書曰陸雲為浚儀令縣居都會之要名為難理雲到官下不能欺市無二價人有見殺者主名不立雲錄其妻而無所問十許日遣出密令人隨後謂曰其去不出十里當有男子候之與語便縳來既而果然問之具服云與此妻通共殺其夫聞妻得出欲與語憚近縣故相要候於是一縣稱為神明郡守害其能屢譴責之雲乃去官百姓追思之圖畫形像配食縣社又曰范廣為堂邑令大旱米貴廣散私穀賑飢人至數千斛遠近流寓歸投之戶口十倍又曰曹攄為洛陽令仁惠明斷百姓懷之時天大雨雪宮門夜失行馬群官檢察莫知所在攄使收門士眾官咸謂不然攄曰宮掖禁嚴非外人所敢盜必是門士以燎寒耳詰之果服又曰曹攄為臨淄令縣有寡婦守節不移姑愍之密自殺親黨告婦殺官為考鞠寡婦不勝苦楚乃自誣獄當決攄察其有冤更加辯究具得情實時稱其明晉中興書曰范甯字武子解褐除餘杭令在縣興學校養生徒潔己志行之士莫不來宗朞年之後風化大行自中興已來崇學敦教未有如甯者也宋書曰顧憲之為建康令清儉強力為政甚得人和故都下飲酒者醇旨輒號為顧建康謂其清且美焉又曰顧憲之為建康令時有盜牛者被主所認盜者亦稱己牛二家辭理等前後令莫能決憲之至覆其狀謂二家曰無為多言吾得之矣乃令解牛任其所去牛逕還本主宅盜者始伏其辜發姦擿伏多如此類時人號曰神明又曰顧覬之遷山陰令山陰民戶三萬海內劇邑前後官長晝夜不得休事猶不舉覬之理繁以約用無事晝日垂簾門階閑寂自宋世為山陰務簡而績修莫能尚也齊書曰傅琰為山陰令有賣針賣糖老姥爭團絲來詣琰不辯乃縛團絲於柱鞭之密視有鐵屑乃罰賣糖者又三野父爭雞琰各問何以食雞一人云粟一人云豆乃破雞果得粟罪言豆者縣內咸稱神明無敢復為盜者又曰傅琰字季珪為山陰令父僧祐亦為山陰令父子並著奇績世云諸傅有治縣譜子孫相傳不以示人梁書曰傅歧除始新令縣民有因鬥相歐而死者死家訴郡郡錄其仇人考掠備至終不引咎郡乃移獄於縣歧即命脫械以和言問之便即自服法當償死會冬節至歧乃放其還家使過節一日復獄曹掾固爭曰古者乃有此於今不可行歧曰其若負信縣令當坐主者勿憂竟如期而反太守深相歎異遽以狀聞歧後去縣民無老小皆出境拜送啼號之聲聞於數十里又曰蕭景字子昭為永寧令永嘉太守牓郡門曰諸縣有疑滯可就永寧令決之又曰丘仲孚遷山陰令居職甚有聲稱百姓為之謠曰二傅沈劉不如一丘又曰丘仲孚為山陰令仲孚長於撥煩善適權變吏民敬服號稱神明治為天下第一又曰何遠字義方自武昌太守除名後起為武康令正身勵廉節除淫祀高祖聞其能擢為宣城太守自縣令為邦畿大郡近代未之有也又曰孫謙為錢塘令治煩以簡獄無繫囚及去官百姓以謙在職不受餉遺追載縑帛以送之謙却而不受又曰裴子野出為諸暨令在縣不行鞭罰民有爭者示之以理, SBCK: 八}
