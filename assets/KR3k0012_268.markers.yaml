  - {type: variant, offset: 223, length: 255, content: 由乎恭敬以信矣入其邑曰善哉由乎忠信以寬矣至其庭曰善哉由乎明察以斷矣子貢執轡而問曰夫子未見由之政而三稱其善可得聞乎孔子曰吾見其政矣入境田疇闢溝洫深此其恭敬以信故其人盡力也入其邑墻屋完固樹木甚茂此其忠信以寬故其人不偷也入其庭甚清閑諸下用命此其明察以斷故其政不擾也以此觀之雖三稱善庸盡其美乎史記曰西門豹為鄴令豹到鄴會長老問民之所疾苦長老曰鄴三老廷掾常歲賦歛百姓收取其錢得數百萬為河伯取婦當其時巫行視小家女好者云是當為河伯婦娉取洗沐之如嫁女床席令女居其上浮之河中浮行數十里乃沒其人家有好女者恐大巫祝為河伯取之以故多持女, SBCK: 遂解印綬}
