  - {type: variant, offset: 1297, length: 1154, content: 戴封字平仲拜議郎遷西華令汝潁有蝗災獨不入西華界時督郵行縣蝗忽大至督郵其日即去蝗亦頓除一境奇之其年大旱封禱請無獲乃積薪艾坐其上以自焚火起而大雨暴至遠近歎服又曰童恢為不其令吏有犯違禁法輒隨方曉示若吏稱其職人行善事者皆賜以酒殽之禮以勸勵之耕織種牧皆有條章一境清靜牢獄連年無囚比縣流人歸化徙居二萬餘戶人嘗為虎所害乃設檻捕之生獲二虎恢聞而出呪虎曰天生萬物唯人為貴虎狼當食六畜而殘暴於人王法殺人者死傷人則論法汝若是殺人者當垂頭服罪自知非者當號呼稱冤一虎低頭閉目狀如震懼即時殺之其一視恢鳴吼踊躍自奮遂令放釋又曰劉矩為雍丘令以禮讓化之其無孝義者皆感悟自革人有爭訟矩常引人於前提耳訓告以為忿恚可忍縣官不可入使歸更尋思訟者感之輒各罷去其有路得遺者皆推尋其主又曰王渙為洛陽令有善政元興元年病卒百姓市道莫不咨嗟男女老壯皆相與賦歛致奠醊以千數醊音張芮反說文曰祭酹也渙喪西歸道經引農人庶皆設槃案於路吏問其故咸言平常持米到洛為卒司所鈔恒亡其半自王君在事不見侵枉故來報恩其政化懷物如此人思其德為立祠於安陽亭西每食輒絃歌而薦又曰虞延為細陽令每至歲時伏臘輒休遣徒繫各使歸家並感其恩德應期而還有囚於家被病自載詣獄既至而死延率掾吏殯于門外百姓感悅之又曰虞延遷洛陽令是時陰氏有客馬成者常為姦盜延收考之陰氏屢請獲一書輒加篣二百篣捶也音彭信陽侯陰就乃訴帝譖延多所冤枉帝乃臨御道之館親錄囚徒延陳其獄狀可論者在東無理者居西成乃廻欲趍東延前執之謂曰爾人之巨蠹久依城社不畏熏燒今考實未竟宜當盡法成大呼稱枉陛戟郎以戟刺延叱使置之帝知延不私謂成曰汝犯王法身自取之呵使速去後數日伏誅於是外戚歛手莫敢干法又曰法雄除平氏長善政事好發擿姦伏盜賊希發吏人畏愛之南陽太守鮑得上其理狀遷苑陵令續漢書曰魯恭為中牟令導民以孝推誠而治建初中郡國螟傷稼犬牙緣界不入中牟河南尹袁安疑其不實遣仁恕掾肥親往察廉之恭隨行阡陌俱坐桑下有雉過止其傍傍有童兒親曰何不擊之兒言雉方將雛親瞿然而起與恭訣曰所以來者欲察治之善惡耳今虫不犯境此一異也化及鳥獸此二異也豎子有仁心此三異也久留徒擾賢者耳還府以狀白安安美其治以勵屬縣又曰祭彤除偃師長視事五年縣無盜賊州課第一遷襄賁令時賊鈔掠彤到官誅鉏姦猾縣界清靜詔書增秩一等賜縑百疋冊書勉勵又曰劉寵除東平陵令是時民俗奢泰寵到官躬儉訓民以禮上下有序都鄙有章視事數年以母病去官歸百姓士女攀車拒輪充塞道路車不得前乃止亭輕服潛遁又曰劉駼騊為湞陽長政化大行道不拾遺以病去官童謠歌之曰邑然不樂思我劉君何時復來安此下民又曰公孫述補清水長太守以其能使兼治五縣政事脩理姦盜不發郡中謂之神明又曰胡紹為河內懷令三日一視事十日一詣倉受俸米於閤外炊作乾飯食之不設釜竈得一強盜問其黨與得數百人皆誅之政教清平為三河表又曰牟融舉茂才為豐令視事二年政化流行縣無獄訟吏畏而愛之治有異迹為州郡最又曰度尚字愽平, WYG: 褚玠}
