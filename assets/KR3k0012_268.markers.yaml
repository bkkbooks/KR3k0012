  - {type: variant, offset: 28, length: 0, content: '', SBCK: 臣進人名上意不可謂宰臣曰前使澤潞不受財帛者此人必有清政可以授之遂改醴泉縣令患百姓多昏猾爲著諭蒙十四篇大指明忠孝仁義勸學務農毎郷給一卷俾其傳習又曰元徳秀字紫芝河南人也爲魯山令先是墮車傷足不任趨拜汝郡守以客禮待之部人爲盗吏捕之繫獄㑹縣界有猛獸爲􅁀盗自陳曰願格殺猛獸以自贖德秀許之胥史曰盗詭計苟免擅放官囚無乃累乎德秀曰吾不欲􅀒約累則吾坐必請不及諸君即破械出之翌日格猛獸}
