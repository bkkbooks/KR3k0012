  - {type: variant, offset: 9, length: 0, content: '', SBCK: 下崔鴻十六國春秋北凉録曰張譚字元慶武威姑臧人也爲和寧令政以德化爲本不務威刑民有過者讀孝經及忠臣孝子傳訓導之百姓愛之如父母號曰慈君又後趙録曰王謨字思賢甕􅈹言不清暢尫短無威儀將拜曲陽令石勒疑之問長史張賔賔曰請試可勒從之政教嚴明百城尤最出爲都部從事守宰去官者十五人又後趙録曰申録字道時爲廣昌令白烏巢其庭樹甘露降其㕔事後爲三公北齊書曰郎茂除衛國令時有擊囚二百茂親自究審數日擇免者百餘人歴年辭訟不詣州省魏州刺史元暉謂曰長史言衛國人不敢申訴者畏明府耳茂曰人猶水也法令爲隄防不固必致奔突茍無决溢使君何患哉暉無以應後周書曰辛昻行成都令昻到縣便與諸生􅀕文翁學堂因共歡宴謂諸生曰子孝臣忠師嚴友信立身之要如斯而巳􅀂不事斯語何以成名冝自勉克成令譽昻言切理至諸生等深感悟歸而告其父老曰辛君教誡如此不可違之於是井邑肅然咸從其化陳書曰禇玠山隂縣多豪猾前後令皆以贓汙免髙宗患之謂中書舎人蔡景歴曰稽隂大邑乆無良宰卿文士之内試思其人景歴進曰禇玠廉儉有幹用未審堪其選不髙宗曰甚善卿言與朕意同乃除山隂令隋書曰魏徳深遷貴郷長爲政清浄不嚴而治㑹興遼東之役徴稅百端使人往來責成郡縣于時王綱㢮紊吏多􅂍賄所在徴歛下不堪命唯德深一縣有無相通不竭其力所求皆給百姓不擾稱爲大治㝷轉館陶長貴郷吏人聞之皆歔欷流涕語不成聲及將赴任傾城送之號泣之聲道路不絶旣至館陶闔境老㓜皆如見其父母有猾人貟外郎趙君寔與郡丞元寳藏深相交結前後令長未有不受其指麾者自德深至縣君寔屏處於室未甞輙敢出門逃􅇡之徒歸來如市貴郷父老冒渉險難詣闕請留德深有詔許之舘陶父老復詣郡相訟以貴郷文書爲詐郡不能决㑹持節使者韋霽杜整等至兩縣詣使訟之乃斷從貴郷貴郷吏人歌呼滿道互相稱慶舘陶衆庻合境悲􅂘因而居住者數百家隋書曰􅂫威薦房恭懿授新豐令政爲三輔之最}
