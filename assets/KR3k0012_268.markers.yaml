  - {type: variant, offset: 4619, length: 1, content: 裴, WYG: 魯君使宓}
  - {type: variant, offset: 4621, length: 2, content: 野出, WYG: 賤}
  - {type: variant, offset: 4624, length: 5, content: 諸暨令在縣, WYG: 單父宰子賤辭去因請借善書者二人書其憲法教品魯君與之至單父使書子賤從旁引其肘書醜則怒之欲好則引之書者患之請辭而去歸以告魯君曰子賤苦吾擾之使}
  - {type: punctuation, offset: 4627, content: 。, id: KR3k0012_CHANT_268-bkkpn1273}
  - {type: 'tls:seg', offset: 4627, content: '', id: KR3k0012_CHANT_268-51a.12}
  - {type: variant, offset: 4630, length: 4, content: 行鞭罰民, WYG: 得施其善政也乃命}
  - {type: punctuation, offset: 4633, content: ，, id: KR3k0012_CHANT_268-bkkpn1274}
  - {type: 'tls:seg', offset: 4633, content: '', id: KR3k0012_CHANT_268-51a.13}
  - {type: variant, offset: 4635, length: 1, content: 爭, WYG: 司無得擅徴發單父單父大治故孔子曰君子哉若人尚徳哉若人魯無君子}
  - {type: punctuation, offset: 4637, content: ，, id: KR3k0012_CHANT_268-bkkpn1275}
