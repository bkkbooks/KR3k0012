  - {type: variant, offset: 1111, length: 184, content: 鸞鳥集止學宮阜使校官掾長涉疊為張雅樂擊磬鳥舉足垂翼應聲而舞翾翔復上縣庭屋十餘日乃去又曰孔奮字君魚右扶風茂陵人守姑臧長七年詔書以為奮在姑臧治有絕迹賜爵關內侯奮素孝供養至謹在姑臧唯老母極膳妻子飯食蔥芥時人笑之或嘲奮曰置脂膏中不能自潤而奮不改其操又曰鍾離意為堂邑令初到市無屋意乃出俸錢作屋民齎茅竹或持材木爭赴趣作不日而成既畢為解土祝曰興功役者令也如有禍祟令自當之民皆大悅後漢, WYG: 陳}
  - {type: variant, offset: 1116, length: 435, content: 宮阜使校官掾長涉疊為張雅樂擊磬鳥舉足垂翼應聲而舞翾翔復上縣庭屋十餘日乃去又曰孔奮字君魚右扶風茂陵人守姑臧長七年詔書以為奮在姑臧治有絕迹賜爵關內侯奮素孝供養至謹在姑臧唯老母極膳妻子飯食蔥芥時人笑之或嘲奮曰置脂膏中不能自潤而奮不改其操又曰鍾離意為堂邑令初到市無屋意乃出俸錢作屋民齎茅竹或持材木爭赴趣作不日而成既畢為解土祝曰興功役者令也如有禍祟令自當之民皆大悅後漢書曰戴封字平仲拜議郎遷西華令汝潁有蝗災獨不入西華界時督郵行縣蝗忽大至督郵其日即去蝗亦頓除一境奇之其年大旱封禱請無獲乃積薪艾坐其上以自焚火起而大雨暴至遠近歎服又曰童恢為不其令吏有犯違禁法輒隨方曉示若吏稱其職人行善事者皆賜以酒殽之禮以勸勵之耕織種牧皆有條章一境清靜牢獄連年無囚比縣流人歸化徙居二萬餘戶人嘗為虎所害乃設檻捕之生獲二虎恢聞而出呪虎曰天生萬物唯人為貴虎狼當食六畜而殘暴於人王法殺人者死傷人則論法汝若是殺人者當垂頭服罪自知非者當號呼稱冤一虎低頭閉目狀如震懼即時殺之其一視恢鳴吼踊躍自奮遂令放釋又曰劉矩為雍丘令, SBCK: ''}
