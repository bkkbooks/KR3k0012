  - {type: variant, offset: 4285, length: 233, content: 示人梁書曰傅歧除始新令縣民有因鬥相歐而死者死家訴郡郡錄其仇人考掠備至終不引咎郡乃移獄於縣歧即命脫械以和言問之便即自服法當償死會冬節至歧乃放其還家使過節一日復獄曹掾固爭曰古者乃有此於今不可行歧曰其若負信縣令當坐主者勿憂竟如期而反太守深相歎異遽以狀聞歧後去縣民無老小皆出境拜送啼號之聲聞於數十里又曰蕭景字子昭為永寧令永嘉太守牓郡門曰諸縣有疑滯可就永寧令決之又曰丘仲孚遷山陰令居職甚有聲稱百姓為之謠曰二傅沈劉不如一丘又曰丘仲孚為山陰令仲孚長於撥煩善適權變吏民敬服號稱神明治, WYG: 謙彦}
