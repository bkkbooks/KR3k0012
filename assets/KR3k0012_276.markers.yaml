  - {type: variant, offset: 837, length: 2, content: 謙退, SBCK: 逆來挑戰仁貴發三箭中三人其餘下馬請降並坑之更就磧北安撫餘衆而還軍中歌曰將軍三箭定天山將士長歌入漢􅀜又曰劉仁䡄顯慶四年出爲青州刺史五年大軍征遼令仁䡄􅁥統水軍以後期免特令以白衣隨軍自効㝷撿校帶方州刺史兼熊津道行軍長史仍別領水軍二万襲破倭賊數万於白波虜􅀗舡艦四百餘艘倭及躭羅等國皆遣使詣之請降􅀄仁􅁤將發帶方州謂人曰天將富貴此翁耳乃於州司請歴日一卷并七廟諱人恠其故荅曰擬削平遼海頒示國家正朔使夷俗遵奉焉至是果以軍功顯正除帶方州刺史又曰郭元振爲安西大都護時安西突厥首領烏質勒部落強盛欵塞通和元振就其牙帳計㑹軍事時天大雪元振立於帳前與烏質勒言議湏􅁷雪􅀷風冷元振未嘗移足烏質勒年老}
