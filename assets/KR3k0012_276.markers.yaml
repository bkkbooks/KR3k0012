  - {type: variant, offset: 209, length: 1, content: 如, SBCK: 􅀉又曰王傑夲名文逹太祖竒其才擢授楊烈將軍羽林􅁥㝷加都督太祖嘗謂諸將曰王文逹万}
  - {type: page-break, offset: 209, content: '', id: KR3k0012_SBCK_276-2a}
  - {type: variant, offset: 209, length: 0, content: '', WYG: 寄又曰王傑本名文達太祖竒其才擢授揚烈将軍羽林監尋加都督太祖嘗謂諸将曰王文達萬人敵也但恐勇决太過耳復潼関破沙苑爭河橋戰邙山皆以勇敢聞親待日隆賞賜加於倫等於是賜姓宇文氏又曰于謹平江陵還太祖親至其第宴語極歡賞謹奴婢一千口及寳物并金石絲竹樂一部謹自以乆當權望隆位功名既定願保優閒乃上先所乗駿馬及所著鎧甲等太祖識其意乃曰今巨猾未平公豈得便爾獨善遂不受又曰蔡祐字承先有膂力便騎射從征伐常潰圍䧟陣為士卒先軍還之日諸將爭功祐終無所競太祖每嘆之嘗謂諸將曰承先口不言勲孤當代其論叙其見知}
  - {type: page-break, offset: 209, content: '', id: KR3k0012_WYG_276-3a, image: WYG0895/WYG0895-0450a.png}
  - {type: variant, offset: 209, length: 1, content: 如, krp: 寄又曰王傑夲名文逹太祖竒其才擢授楊烈將軍羽林監㝷加都督太祖嘗謂諸將曰王文逹万}
  - {type: variant, offset: 210, length: 0, content: '', WYG: 此三國典畧曰周髙琳每征戰勇冠諸軍太祖謂之曰公即我之韓白也又曰胡僧祐為梁名将常以鼓吹置於齋中恒坐對之以自娱玩或諫之曰公名望隆重朝野具瞻此是羽儀可自居外僧祐曰我性愛之恒須見耳又曰北齊斛律金字阿六敦朔州勅勒部}
  - {type: page-break, offset: 210, content: '', id: KR3k0012_WYG_276-3b, image: WYG0895/WYG0895-0450b.png}
