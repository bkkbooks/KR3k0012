  - {type: variant, offset: 777, length: 2, content: 馮異, SBCK: 史万􅀊少英武善􅀐射驍捷􅀂飛好讀兵書兼精占候又曰宇文忻毎叅帷幄出入卧内禪代之際忻有力焉後拜右領軍}
  - {type: variant, offset: 777, length: 2, content: 馮異, krp: 史万歲少英武善騎射驍捷若飛好讀兵書兼精占候又曰宇文忻毎叅帷幄出入卧内禪代之際忻有力焉後拜右領軍}
  - {type: variant, offset: 780, length: 0, content: '', SBCK: 將軍恩賜彌重忻妙解兵法馭戎齊整當時六軍有一善事雖非忻所建在下輙相謂曰此必忻法也其見推服如此又曰薛丗雄性廉謹凢所行軍}
  - {type: variant, offset: 780, length: 0, content: '', krp: 將軍恩賜彌重忻妙解兵法馭戎齊整當時六軍有一善事雖非忻所建在下輙相謂曰此必忻法也其見推服如此又曰薛丗雄性廉謹凢所行軍}
  - {type: variant, offset: 781, length: 0, content: '', SBCK: 敵之處秋毫無犯帝由是嘉之帝嘗從容謂群臣曰我欲舉好人未知諸君識不羣臣咸曰臣等何能測聖心帝曰我欲舉者薛丗雄羣臣皆稱善帝復曰丗雄廉正節槩有古人之風於是超拜右翊衛將軍又曰楊􅀇感欲立名隂求將領謂兵部尚書叚文振曰􅀇感世荷國恩寵踰涯分自非立効邊裔何以塞責􅀂方隅有風塵之警庶得執鞭行陣少展􅁝髪之功明公兵革是司敢布心腹文振因言於帝帝嘉之顧謂群臣曰將門必有將相門必有相故不虚也於是賚物千叚禮遇益隆又曰突厥入朝上賜之射突厥一發中的上曰非賀􅀂弼無能當此於是命弼弼再拜而呪曰􅀂}
  - {type: page-break, offset: 781, content: '', id: KR3k0012_SBCK_276-3b}
  - {type: variant, offset: 781, length: 0, content: '', krp: 敵之處秋毫無犯帝由是嘉之帝嘗從容謂群臣曰我欲舉好人未知諸君識不羣臣咸曰臣等何能測聖心帝曰我欲舉者薛丗雄羣臣皆稱善帝復曰丗雄廉正節槩有古人之風於是超拜右翊衛將軍又曰楊玄感欲立名隂求將領謂兵部尚書叚文振曰玄感世荷國恩寵踰涯分自非立効邊裔何以塞責若方隅有風塵之警庶得執鞭行陣少展絲髪之功明公兵革是司敢布心腹文振因言於帝帝嘉之顧謂群臣曰將門必有將相門必有相故不虚也於是賚物千叚禮遇益隆又曰突厥入朝上賜之射突厥一發中的上曰非賀若弼無能當此於是命弼弼再拜而呪曰若}
