  - {type: variant, offset: 1137, length: 2, content: 與將, WYG: 有三伐勇而有禮反之以仁吾三逐楚君之卒勇也見其君必趨禮也能獲鄭伯而捨之仁也老子曰以道佐人主者不以兵强天下果而勿矜果而勿伐河上公注云當果敢推讓勿自伐取其美也六韜曰兵入殷郊見太公曰是吾新君也而商容曰非也其人虎據而鷹峙威怒自副見利欲發進不顧前后見武王曰是新君也見敵不怒獻帝春秋曰張遼問吴降人曰紫髯将}
