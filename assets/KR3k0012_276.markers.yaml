  - {type: variant, offset: 1302, length: 1096, content: 曰上自征隗囂至漆諸侯多以王師之重不宜遠入險阻計未決會召馬援因說隗囂將帥土崩之勢兵進必破之狀於上前聚米為山指畫囂眾大潰又曰吳漢當出師朝受詔夕即引道初無辦嚴之日故能常任職以功名終又曰吳漢常屬吏士治兵事上時令人視吳公何為還言曰方脩攻具上曰吳公隱若一敵國矣魏志曰諸葛亮斜谷出軍至武功司馬宣王禦之亮挑戰宣王不出亮遺之婦人巾幗宣王怒表請決戰天子不許遣辛毗杖節立於軍門以制之會亮病卒歸宣王不敢追之而退百姓為之語曰死諸葛走生仲達宣王曰吾便料死故也宣王案幸亮營壘處曰天下奇才也又曰趙典字曼成好學問貴儒不與諸將爭功敬賢士大夫若不及又任城王傳曰太祖問諸子所好便各言其志至彰曰好為將又曰劉曄謂太祖曰諸葛亮明於治而為相關羽張飛勇冠三軍而為將蜀人既定據險守要則不可犯矣又曰賈逵字梁道河東人自為兒童戲弄常設部伍祖父習異之曰汝大必為將率口授兵法數萬言蜀志曰鄧芝為大將二十餘年賞罰明善䘏卒伍身之衣食資仰於官然終不治私產妻子不免飢寒死之日家無餘財又曰關羽字雲長亡命奔𣵠先主於鄉里合徒眾而羽與張飛為之禦侮晉書曰應詹遷南平太守鎮南將軍山簡復假詹督五郡軍事蜀賊杜疇作亂金寶溢目詹一無所取唯收圖書莫不難之又曰周訪威風既著遠近悅服智勇過人為中興名將性謙虛未嘗論功伐或問訪曰人有小善鮮不自稱卿功勳如此初無一言何也訪曰朝廷威靈將士用命訪何功之有又曰蘇峻平論功顧眾推功於蔡謨謨眾唱謨非己之力俱表相讓論者美之又曰符堅眾號百萬次于淝水謝玄入問計謝安無懼色方與玄圍碁遊涉至夜乃還指受將帥各當其任玄等破堅驛書至安對客圍碁看書便攝放床上了無喜色客問徐荅小兒輩破賊既罷還內過戶限心喜甚不覺屐齒之折其矯情鎮物如此也又曰帝謂紀瞻曰卿雖疾病為朕臥護六軍所益多矣又羊祜傳曰吳人寇戈陽江夏略戶口語遣侍臣移書詰祜不追討之意并欲移州復舊之宜祜曰江夏去襄陽八百里皆知賊去亦已經日矣步軍方往安能救之哉勞師以免責恐非事宜也昔魏武帝置都督皆與州相近以兵勢好合惡離疆場之間一彼一此慎守而已古之善教也若輒徙州賊出無常亦未知之所宜據者使者不能詰又曰羊祜入朝武帝遣中書令張華問其籌策祜曰今主上有禪代之美而功德未著吳人虐政已甚可不戰而剋混一六合以興文教則主齊堯舜臣同稷契為百代之盛若孫皓不幸而殘吳人更立令主雖百萬之眾長江未可而越也將為患乎華深讚成其計祜謂華曰成吾志者子也帝欲使祜臥護諸將祜曰取吳不必須臣自行但既平之後勞聖慮耳功名之際臣所不敢居事當有所付授願審擇其人疾漸篤乃舉杜預自代尋卒又曰毛穆之鎮廣陵遷右將軍宣城內史假節鎮姑熟穆之以為戍在近畿無復軍驚不宜加節上䟽辭讓許之又曰朱伺字仲文安陸人少為吳牙門將陶丹給使吳平徙江夏伺有武勇訥口不知書為郡將督見鄉里士大夫揖稱名而已及為將遂以謙恭稱又, SBCK: ''}
