  - {type: variant, offset: 755, length: 1, content: 所, krp: 性愛之恒須見耳又曰北齊斛律金字阿六敦朔州勑部人光禄大夫郍瓌之子世敦直善騎射行兵用匈奴法望塵識馬歩多少嗅地知軍度逺近神武戒文襄曰有讒此人者勿信之文宣嘗與金宴射親持矟走馬}
