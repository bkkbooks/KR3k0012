  - {type: variant, offset: 830, length: 6, content: 馮異字公孫為, SBCK: 髙宗時吐蕃䧟安西四鎮長壽􅀄蕃軍逼安西府則天令武威軍緫管王孝傑將軍阿史那忠節等率師拒之孝傑至安西合戰屢捷大破蕃軍収復􅀛兹于闐踈勒碎葉四鎮而還則天大恱謂侍臣曰昔貞觀年中俱統得此蕃域其後西陲不守並䧟吐蕃今旣復舊邊境自然無事孝傑建兹功効竭盡欵誠遂能裏足徒行身與士卒齊力如此忠懇􅀷足可嘉遷左衛大將軍又曰薛仁貴擊九姓突厥於天山軍將發髙宗出甲令仁貴射之射穿五重九姓衆十餘万令驍徤十}
