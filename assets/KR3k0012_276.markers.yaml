  - {type: punctuation, offset: 214, content: 『, id: KR3k0012_CHANT_276-bkkpn80}
  - {type: variant, offset: 214, length: 0, content: '', WYG: 史萬嵗少英武善騎射驍捷若飛好讀兵書兼精占候又曰宇文忻每叅帷幄出入卧内禪代之際忻有力焉後拜右領軍大将軍恩賜彌重忻妙解兵法馭戎齊整當時六軍有一善事雖非忻所建在下輒相謂曰此必忻法也}
  - {type: page-break, offset: 214, content: '', id: KR3k0012_WYG_276-5a, image: WYG0895/WYG0895-0451a.png}
  - {type: variant, offset: 215, length: 1, content: 用, WYG: 見推服如此又曰薛世雄性㢘謹凡所行軍破敵之處秋毫無犯帝由是嘉之帝嘗從容謂羣臣曰我欲舉好人未知諸君識不羣臣咸曰臣等何能測聖心帝曰我欲舉者薛世雄羣臣皆稱善帝復曰世雄㢘正有古人之風於是超拜右翊衛将軍又曰楊𤣥感欲立名隂求将領謂}
  - {type: punctuation, offset: 217, content: ，, id: KR3k0012_CHANT_276-bkkpn81}
  - {type: 'tls:seg', offset: 217, content: '', id: KR3k0012_CHANT_276-4a.13}
  - {type: variant, offset: 217, length: 0, content: '', WYG: 部尚書段文振曰𤣥感世荷國㤙寵踰涯分自非立効邊裔何以塞責若方隅有風塵之警庶得執鞭行陣少展絲髪之功明公兵革是}
