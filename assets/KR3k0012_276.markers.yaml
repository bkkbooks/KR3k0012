  - {type: variant, offset: 202, length: 1, content: 魏, krp: 劉亮夲名道德累遷左大都督從擒竇泰復弘農與沙苑之後並力戰有功遷車騎大將軍開封府長廣公亮以勇敢見知爲當時名將并屢陳謀䇿多合機冝太祖謂之曰卿}
