  - {type: variant, offset: 920, length: 5, content: 異常獨屏樹, WYG: 効盡忠欵誠遂能裹足徒行身與士卒齊力如此忠懇深足可嘉遷左衞大将軍又曰薛仁貴擊九姓突厥於天山軍将發髙宗出甲令仁貴射之射穿九重九姓衆十餘萬令驍健十人逆來挑戰仁貴發三箭中三人其餘}
