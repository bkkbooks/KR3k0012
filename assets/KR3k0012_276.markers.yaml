  - {type: variant, offset: 931, length: 1, content: 樹, SBCK: 大夫小大夫國語周語曰邵公告單公曰晉有三伐勇而有禮返之以仁吾三逐楚君之卒勇也見其君必趨禮也能􅀗鄭伯而捨之仁也老子曰以道佐人主者不以兵強天下果而勿矜果而勿伐河上公注云當果敢推讓勿自伐取其美也六韜曰兵入殷郊見太公曰是吾新君也而啇容曰非也其人虎據而鷹峙威怒自副見利欲發進不頋前後見武王曰是新君也見敵不怒獻帝春秋曰張遼問呉降人曰紫髯}
