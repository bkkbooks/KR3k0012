  - {type: variant, offset: 2614, length: 578, content: 石偽事曰郭權降石虎虎問權曰卿若得吾者當殺不權曰若登時得至尊必殺不疑也虎曰卿健將也因與共言事崔鴻前燕錄曰張蚝本姓弓上黨人也膂力過人能曳牛走堅甚寵之常侍左右終為名將所在有殊功世稱鄧羗張蚝皆萬人敵也宋書曰姚泓屯軍長城下王鎮惡撫慰士卒及以身先士眾騰躍爭先泓眾一時奔潰泓妻子歸高祖降將至京鎮惡於灞上奉迎高祖勞之曰成吾霸業者真卿也鎮惡再拜謝曰此明公之威諸將之力鎮惡何功之有焉笑曰卿欲學馮異耶又曰桓玄云劉毅勇冠三軍當今實為無敵又曰劉順幢主樊僧愛勇冠三軍軍中皆懼齊書曰曹景宗建武四年隨太尉陳顯達北圍馬圈以奇兵二千破魏援中山王英四方人及剋馬圈顯達論功以景宗為後景宗退無怨言又曰垣崇祖初見高帝便自北韓白唯上獨許之及破魏軍啟至上謂朝臣曰崇祖恒自擬韓白今其人也進為都督梁書曰馮道根每征伐終不言功其部曲或怨非之道根喻曰明主自監功夫多少吾將何事武帝常指道根示尚書令沈約美其口不論勳約曰此陛下之大樹將軍也梁後略曰陸納分其眾輕舸掩襲巴陵晨至城下驃騎始命諸將會議乃出自壘門坐胡床以望之賊乘水來攻矢下如雨人情搔擾莫不震懼而驃騎方食甘蔗曾無遽色又曰齊遣其將竇泰趨潼關太祖將襲秦眾咸難之太祖問策於宇文深深對曰竇氏歡之驍將也歡每伏之以為禦侮北齊書曰劉豊本出河間樂城豊有雄姿壯氣果毅絕人有口辯好說兵事又曰辛術字懷哲隴西狄道人也清儉寡欲及平楚定淮南凡諸貲物一毫不犯唯收典籍多是晉宋齊梁時佳本鳩集萬有餘卷, SBCK: 百七十六}
