  - {type: 'tls:seg', offset: 211, content: '', id: KR3k0012_CHANT_276-4a.11}
  - {type: variant, offset: 211, length: 12, content: 李克曰其用兵司馬穰苴弗能, SBCK: 敵也伹恐勇决太}
  - {type: variant, offset: 211, length: 0, content: '', WYG: 光禄大夫那瓌之子性敦直善騎射行兵用匈奴法望塵識馬歩多少嗅地知軍度逺近神武戒文襄曰有讒此人者勿信之文宣嘗與金宴射親持矟走馬以擬金胸者三金堅不動賜帛千疋因過其宅置酒作樂北史曰隋文帝嘗從容命髙熲與賀若弼言及平陳事熲曰賀若弼先獻十䇿後於蔣山苦戰破賊臣文吏耳聞焉敢與将論功帝大笑時論嘉其有讓又曰周将王思政乆經軍旅每戰唯着破衣弊甲敵人疑非将帥故得免又曰韓果從平竇泰於潼闗周文因其規畫軍以勝返賞真珠金帶一腰隋書曰}
  - {type: page-break, offset: 211, content: '', id: KR3k0012_WYG_276-4a, image: WYG0895/WYG0895-0450c.png}
  - {type: page-break, offset: 211, content: '', id: KR3k0012_WYG_276-4b, image: WYG0895/WYG0895-0450d.png}
