  - {type: variant, offset: 840, length: 2, content: 伐行, SBCK: 勝寒苦㑹罷而死又曰李晟臨洮人也祖思恭父欽代居隴右嘗爲禆將晟數􅀊而􅀌事母孝聞少雄烈有材力善􅀐射年十八從軍身長六尺勇敢絶倫時河西節度使王忠嗣擊吐蕃有驍將乗城拒闘頗多殺士卒忠嗣募軍中能射者射之晟乃引弓一發而斃三軍大呼忠嗣厚賞之因撫其背曰此万人之敵也又曰貞元五年九月馬燧與太尉晟召見於延英殿上嘉其有大勲力皆圖形於凌煙閣列於元臣之次九年十月召見延英殿因拜手仆于地上親起之又曰王栖耀性謹厚善􅀐射始起兵渉寇境太􅀷遇遊􅀐四合百歩内立表俾之環視發必破的虜相顧恐懼徐而解去嘗獵㑹稽山中有逸林白額獸卒起草中應􅁌而斃在􅂫州嘗}
