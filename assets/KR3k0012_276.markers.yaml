  - {type: variant, offset: 926, length: 0, content: '', WYG: 馬請降並坑之更就磧北安撫餘衆而還軍中歌曰将軍三箭定天山将士長歌入漢關又曰劉仁軌顯慶四年出為青州刺史五年大軍征遼令仁軌監統水軍以後期免特令以白衣随軍自效尋檢校帶方州刺史兼熊健道行軍長史乃别領水軍二萬襲破倭賊萬餘於白波敵獲船艦四百餘艘倭及躭羅等國皆遣使詣仁軌請降初仁軌將發帶方州謂人曰天将富貴此翁耳乃於州司請厯日一卷并七廟諱人􅏜其故答曰擬削平遼海頒示國家正朔使邊俗遵奉焉至是果以軍功顯正除帶方州刺史又曰郭元振為安西大都䕶時安西突厥首領烏質勒部落强盛欵塞通和元振就其牙帳計㑹軍事時天大雪元振立於帳前與烏質勒言議須臾雪深風冷元振未嘗移足烏質勒年老不勝寒苦㑹罷而死又曰李晟臨洮人也祖思恭父欽代居隴右嘗為禆将晟數嵗而孤事母以孝聞少雄烈有材力善騎射年十八從軍身長六尺勇敢絶倫時河西節度使王忠嗣擊吐蕃有驍将乗城拒鬭頗多殺士卒忠嗣募軍中能射者射之晟乃引弓一發而斃三軍大呼忠嗣厚賞之因撫其背曰此萬人之敵也又曰貞元五年九月馬燧與太尉晟召見於延英殿上喜其有大勲力皆圖形於凌煙閣列於元臣之次九年十月召見延英殿因拜手仆於地上親起之又曰王栖耀性謹厚善騎射始起兵渉冦境太深遇遊騎四合百歩内立表俾之環視發必破的敵相顧恐懼徐而解去嘗獵㑹稽山中有逸林白額獸卒起草中應弦而斃在蘇州嘗與文士遊虎丘寺平野霽日先一箭射空再發貫之江東文士自梁肅已下歌詠焉又曰李愬既執送吴元濟裴度建彰義軍節擁降卒萬餘人次入焉李愬具櫜鞬候度馬首度将避之愬曰此方不識上下等威之分乆矣請公因以示之度以宰相禮受愬謁衆聳觀焉明日愬以師還文城柵度乃視節度使觀察及刺史事蔡人大恱又曰李光顔為河東禆将討李懐光楊惠琳皆有功後随髙崇文平蜀搴旗斬将出入如神由是稍稍知名授兼御史大夫時兄光進官亦至兼御史大夫}
