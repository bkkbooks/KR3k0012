  - {type: variant, offset: 325, length: 65, content: 不倦宜在上將久矣屬聞以特進領城門兵屬之欲切愚竊不為君侯喜宜深辭職自陳淺薄不足以固城門守收太伯之讓保謙謙之路闔門高枕為智者譚得書大感, SBCK: ''}
  - {type: variant, offset: 325, length: 65, content: 不倦宜在上將久矣屬聞以特進領城門兵屬之欲切愚竊不為君侯喜宜深辭職自陳淺薄不足以固城門守收太伯之讓保謙謙之路闔門高枕為智者譚得書大感, krp: ''}
  - {type: variant, offset: 326, length: 561, content: 倦宜在上將久矣屬聞以特進領城門兵屬之欲切愚竊不為君侯喜宜深辭職自陳淺薄不足以固城門守收太伯之讓保謙謙之路闔門高枕為智者譚得書大感遂辭讓不受領城門職又曰霍去病為驃騎將軍上嘗欲教之孫吳兵法對曰顧方略何如耳不至學古兵法上為治第令視之對曰匈奴不滅無以家為又曰李廣為右北平匈奴號曰漢飛將軍廣歷七郡太守前後三十餘年得賞賜輒分其麾下飲食與士卒共之家無餘財不言生產事又曰李廣其先曰李信秦時為將逐其燕太子丹者也廣以良家子從軍擊胡文帝曰惜廣不逢時令當高祖世萬戶侯豈足道哉又曰劇孟洛陽人也以任俠顯吳楚反時條侯為太尉乘傳東將至河南得劇孟喜曰吳楚舉大事而不求劇孟吾知其無能為也天下騷動大將得之若一敵國又曰沛公入咸陽諸將皆爭赴金帛財物之府分之蕭何獨先收秦丞相御史律令圖書藏之沛公具知天下阨塞戶口多少強弱處民所疾若者以得圖書故也後漢書景丹傳曰帝曰景將軍北州大將是其人也又馬武傳論曰中興二十八將前世以為上應二十八宿未之詳也然咸能感會風雲奮其智勇稱為佐命亦各志能之士也又曰賈復傳曰世祖大驚曰我所以不令賈復別將者為其輕敵也不然失吾名將又曰馮異大破赤眉于郁璽書曰始雖垂翅回谿終能奮翼澠池可謂失之東隅收之桑榆者也又曰耿秉能說司馬兵法尤好將帥之略又曰馮異字公孫為人謙退不伐行與諸將相逢輒引車避道東觀漢記曰續漢書云異勑吏士非交戰受敵常行諸營之後相逢引車避之由是無爭道, WYG: ''}
