  - {type: variant, offset: 916, length: 0, content: '', WYG: 争取通一無所犯髙祖聞之曰通清正奉國著於終始名下定不虛也賜金銀六百兩雜綵千段又曰右武侯將軍張士貴破反獠而還太宗勞之曰聞公親䝉矢石為士卒先雖古名将無以加也朕嘗聞以身報國者不顧性命嘗聞其語未覩其實於公方見之矣又曰文徳皇后之葬也段志𤣥與宇文士及分統士馬出宿於章武門太宗夜使宫官至二将軍所宇文士及披戸内使志𤣥閉門不内曰軍門不可夜開使者曰此有手勅志𤣥曰夜中不辨真偽竟停使者至曉太宗聞而嘆曰此真将軍也周亞夫何以加焉又曰霍王元範髙祖第十四子也母曰張美人元範少善騎射初為吴王時嘗從太宗逰獵遇羣獸命射之矢不虛發獸無遺者太宗撫其背曰汝才藝過人恨今無所施耳當天下未定我得汝豈不安乎又曰王君廓統兵經略東都王世充将郭士行許羅漢前後入掠君廓輒擊退之拜右武衞將軍詔勞之曰卿以十三人破賊一萬自古以少擊衆未之前聞非惟驍勇絶人亦足以顯卿忠莭也又曰突厥入寇王君廓邀擊破之俘斬二千餘人獲馬十五疋髙祖聞而大恱徴之入朝賜與御馬令殿廷乘之而出又謂侍臣曰吾聞藺相如叱秦王目皆出血君廓徃擊建徳將出戰徐勣遏之君廓憤發大呼目及鼻耳一時流血此之壮氣何謝古人不可以常例賞之復賜錦袍金帶還領豳州又曰髙宗時吐蕃䧟安西四鎮長夀初蕃軍逼安西府則天令威武軍總管王孝傑将軍阿史那忠莭等率師拒之孝傑至安西合戰屢㨗大破蕃軍收復龜兹于闐䟽勒碎葉等城而還則天大恱謂侍臣曰昔貞觀年中俱統得此蕃城其後西陲不守}
