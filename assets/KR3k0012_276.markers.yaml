  - {type: variant, offset: 202, length: 1, content: 魏, SBCK: 劉亮夲名道德累遷左大都督從擒竇泰復􅀪農與沙苑之後並力戰有功遷車􅀐大將軍開封府長廣公亮以勇敢見知爲當時名將并屢陳謀䇿多合機冝太祖謂之曰卿}
  - {type: variant, offset: 202, length: 1, content: 魏, WYG: 劉亮本名道徳累遷左大都督從擒竇泰復𢎞農與沙苑之後並力戰有功遷車騎大將軍開府封長廣公亮以勇敢見知為當時名将兼屢陳謀䇿多合機宜太祖謂之曰卿}
