  - {type: variant, offset: 23, length: 0, content: '', SBCK: 書曰臣無有作福作威王食臣之有作福作威玉食其害于而家凶于而國又曰熊羆之士不二心之臣保乂王家用端命于上帝詩曰進厥虎臣闕如虓虎闞呼檻切禮曰衛有大夫曰柳莊寢疾公曰􅀂疾亟雖當􅀕必吿也公再拜稽首請於尸曰有臣栁莊也者非寡人之臣是社稷之臣也聞之死請徃不釋服而徃遂以禭之又曰爲人臣者殺其身有益於君則爲之况于其身以善其君乎周公優爲之于讀爲迂迃廣也大也又曰故仕於公曰臣仕於家曰僕又}
