  - {type: variant, offset: 136, length: 0, content: '', SBCK: 明也臣之願也淫刑以逞誰則無罪乃殺之又曰􅁗醫和謂晉侯曰良臣將死天命不祐趙孟曰誰當良臣對曰主是謂矣主相晉國於今八年晉國無亂諸侯無闕可謂良矣和聞之國之大臣榮其寵禄任其大節有菑禍興而無改焉必受其咎又曰陳無宇謂楚王曰天子經畧諸侯正封封畧之内何非君土食土之毛誰非君臣毛草也故詩曰普天之下莫非王土率土之濵莫非王臣詩小雅濵涯也天有十日甲至癸人有十等下}
