  - {type: variant, offset: 132, length: 2, content: 政者, SBCK: 大臣不治而邇臣比矣忠敬不足謂臣不忠於君君不敬其臣邇近也言近以見逺言大以見小牙言之記私相親也故大臣不可不敬也是民之表也邇臣不可不慎也是民之道也民之道言民循從也君母以小謀大母以逺言近母以内圖外則大臣不怨邇臣不疾而逺臣不蔽矣左傳曰石碏純臣也怨州吁而厚與焉大義滅親其是之謂乎又曰晉惠公卒懐公立命無從亡人期朞而不至無赦狐突之子毛及偃從重耳在秦弗召懐公執狐突曰子來則免對曰子之能仕父教之忠古之制也䇿名委質貳乃辟也今臣之子名在重耳有年數矣􅀂又召之教之貳也父教子貳何以事君刑之不濫}
