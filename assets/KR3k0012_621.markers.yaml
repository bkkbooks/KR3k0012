  - {type: variant, offset: 886, length: 1, content: 視, SBCK: 非其人也又曰孟氏之臣畔武伯問孔子曰如何荅曰人臣而畔天下之所不容也其將自反子姑待之三旬果自歸孟氏武伯􅀅執之訪於夫子夫子曰無也子之於臣禮意不至是以去子今其反罪以反除又何執焉子脩禮以待之則臣去子將安徃哉武伯乃止孟子曰孟子見齊宣王曰所謂故國者丗臣之謂也丗臣先丗舊國也王者當有累世脩徳之臣常能輔其}
  - {type: page-break, offset: 886, content: '', id: KR3k0012_SBCK_621-5b}
  - {type: variant, offset: 886, length: 1, content: 視, WYG: 非其人也又曰孟氏之臣畔武伯問孔子曰如何答曰人臣而畔天下之所不容也其将自反子姑待之三旬果自歸孟氏武伯将執之訪於夫子夫子曰無也子之於臣禮意不至是以去子今其反罪以反除又何執焉子脩禮以待之則臣去子将安徃哉武伯乃止孟子曰孟子見齊宣王曰所謂故國者非謂有喬木之謂也有世臣之謂也世臣先世舊臣也王者當有累世脩徳之臣常能輔其君以道也王無親臣矣今王無可親任之臣昔者所進今日不知其亡也言王取人不詳審徃日之所知臣今日為惡當誅亡王無知之也王曰吾何以識其不才而舍之曰國君進賢如不得已将使卑踰尊疎踰戚可不慎與言國君欲進用人當留意考擇如使忽然不精心意而詳審之如不得已而取備官則使卑尊疏戚相踰也又曰景子曰内則父子外則君臣人之大倫也父子主恩君臣主敬又曰故将大有為之君必有所不召之臣欲有謀焉則就之故湯之於伊尹學焉而後臣之故不勞而王桓公之於管仲學焉而後臣之故不勞而霸説苑曰人臣之術義不苟合位不苟尊必有益於國必有補于君故其身尊而子孫保之臣之所有行六邪六正行六正則榮犯六邪則辱賢臣處六正之道不行六邪之術故上安而下治又曰子貢問孔子曰為臣孰大曰齊有鮑叔鄭有東里子皮子貢曰齊無管仲鄭無子産乎孔子曰吾聞進賢為善鮑叔進管仲子皮進子産未聞管仲子産有所進也新序曰秦欲伐楚使者徃觀楚之寳器楚王聞之召令尹子西而問焉曰秦欲觀楚寳器吾和氏之璧隋侯之珠可以示諸乎令尹子西對曰臣不知也召昭奚恤而問焉昭奚恤對曰此欲觀吾國得失而圖之不在寳器在于賢臣夫珠玉玩好之物非國所寶重者于是遂使昭奚恤應之奚恤稱曰楚國之所寶者賢臣也理百姓實倉廩使民人各得其所令尹子西在此奉珪璋使諸侯解忿怨之難交兩國之歡使無兵革之憂大宗子敖在此守封疆謹境界不侵鄰國鄰國亦不見侵葉公子髙在此理師徒整兵戎以當強敵提桴鼓以動百萬之衆使赴湯火以蹈白刃出萬死不顧一生司馬子反在此若懐伯王之餘義攝治亂之遺風昭子奚恤在此唯大國之所觀秦使者瞿然無以對又曰周舍事趙簡子立門三日三夜簡子使人出問之夫子将何以令我周舍曰臣願為諤諤臣墨筆操牘隨}
