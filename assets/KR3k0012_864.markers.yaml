  - {type: variant, offset: 2284, length: 95, content: 文章生方言曰燕之北郊朝鮮洌水間凡異肉及披牛羊五臟謂之膊音愽說文曰殽雜肉也醃漬肉也一劫反膊切肉也之耎反廣志曰北方有牧草便於其畜故北方出美肉異苑曰山陰有人嘗食牛肉便作牛鳴菜食乃止廣州先賢傳曰丁密, WYG: 熖起散卒}
