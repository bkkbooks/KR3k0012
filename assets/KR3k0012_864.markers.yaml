  - {type: variant, offset: 903, length: 290, content: 食豬羊肉故終身不以豬羊肉入口又曰李充延平年中詔公卿中二千石各舉隱士大儒務取高行以勸後進特徵充為愽士侍中大將軍鄧隲貴戚傾時無所下借下音假借音子夜反以充高節每卑敬之嘗置酒請賓客滿堂酒酣隲跪曰幸託椒房位列上將幕府初開欲辟天下奇偉以匡不逮惟諸君愽求其器充乃為陳海內隱居懷道之士頗有不合隲欲絕其論以肉啖之充抵肉於地曰說士猶甘於肉遂出徑去甚望之漢舊儀曰齊法食肉三十六兩英雄記曰冀州刺史韓馥問諸從事曰收有何長何短治中劉子曰前勞賜有餘肉百斤賣之一州調度奢儉不復在是猶可勞賜勤勞吏士賣之可示儉吳志曰趙達嘗過故知取盤中隻箸再縱橫之乃言卿東壁下有美酒一斛又有鹿肉三斤何以辭無王隱晉書曰愍懷太子令人屠肉己, SBCK: 能}
