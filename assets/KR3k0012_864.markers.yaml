  - {type: variant, offset: 1775, length: 489, content: 治當世之民是猶待梁肉而救餓之說也又曰晏子對景公曰田成子殺一牛取一豆肉餘以食士燕丹子曰荊軻入秦過陽翟買肉爭輕重屠辱軻武陽欲擊軻止之淮南子曰今屠牛而烹其肉或以酸或以甘煎熬犢炙和有萬方其本一牛之體呂氏春秋曰肉之美者猩猩之脣貛貛之炙雋燕之翠述蕩之掔音牽獸名旄象之約旄象牛獸也族牛肉羹貴之也又曰嘗一臠而知一鑊之味一鼎之調又曰肥肉厚酒務以相強命之曰爛腸之食劉向新序曰趙簡子使使者聘孔子於魯以胖牛肉迎於河上使者謂舡人曰孔子即上舡中河安流而殺之孔子至使者致命進胖牛之肉孔子仰天而歎曰美哉水乎洋洋也使丘不濟此水者命也夫桓譚新論曰九江太守龐真案縣令高曾受社祭釐有生牛肉二十斤劾以主守盜上請逮捕詔釐不贓天下緣是諸府縣社臈祠祭竈不但進熟食皆復多肉米酒脯腊諸奇珍益盛是故諸郡府至殺牛數十頭又曰關東鄙語世人聞長安樂出門西向笑知肉味美則對屠門而屑風俗通曰陳伯敬目有所見不食其肉王充論衡曰仲子兄祿萬鍾以兄之祿為不義而不食之避兄離母處於陵他日歸有饋其兄生鵝者曰惡用是鶂鶂者他日其母殺是鵝與之食其兄自外來至曰鶂鶂之肉而仲子恥負前言即吐而出之典略曰凡宗廟三歲大祫每大牢分之左辯上帝右辯上后俎餘委肉積於前數千斤名堆俎愽, WYG: 退博}
