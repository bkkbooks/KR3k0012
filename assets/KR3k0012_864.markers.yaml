  - {type: variant, offset: 2727, length: 164, content: 脯然也釜炙於釜中汁和熟之也衘炙細掾肉和以薑椒鹽豉已乃以肉衘裏其表而炙之豹炙全體炙之各自方割出於胡貊之為也禮曰膾炙處外母嘬炙嘬音初夬切詩曰執爨踖踖為俎孔碩或燔或炙又曰有兔斯首炮之燔之君子有酒酌言獻之毛曰炮加火曰燔傳曰欒寧將飲酒炙未熟聞亂使告季子季子子路也為孔氏宰邑也召獲駕乘車召獲衛大夫駕乘車言不欲戰也行爵食炙奉衛侯輒來奔韓子曰晉, SBCK: 太}
