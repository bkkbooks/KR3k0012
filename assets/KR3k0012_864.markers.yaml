  body:
  - {type: variant, offset: 5, length: 2, content: 一肉, SBCK: 二脂膏油脂膏周禮庖人曰凢用禽獸春行羔豚膳膏香夏行踞鱐音搜膳膏臊秋行犢膳膏腥冬行鱻羽膳膏羶用禽獸謂煎和之以獻王也鄭司農云膏香牛脂也臊豕膏也杜子美云膏臊犬膏腥豕鮮生魚也羽鴈也膏也羶羊脂也􅀇謂膏腥雞膏也八物者得四時之氣尤盛爲人食之弗勝是以用休廢之脂膏煎和膳之又冬官梓人曰天下之獸五脂者膏者嬴者羽者鱗者脂牛羊之属膏豕之属也宗廟之事脂者膏者以爲牲致美味也}
  - {type: variant, offset: 5, length: 2, content: 一肉, WYG: 二脂膏脂膏周禮庖人曰凡用禽獸春行羔豚膳膏香夏行腒鱐音搜膳膏臊秋行犢麛膳膏腥冬行鱻羽膳膏羶用禽獸謂煎和之以獻王也又冬官梓人曰天下之獸五脂者膏者臝者羽者鱗者脂牛羊之屬膏豚之屬也宗廟之事脂者膏者以為牲致美味也}
