  - {type: variant, offset: 146, length: 171, content: 其泊饋進卿食者饔人御者欲使諸大夫怨慶氏減其膳蓋盧蒲癸王何之謀也又曰有酒如淮有肉如坻有酒如澠有肉如陵亦具酒門穀梁傳曰公曰天王使石尚來歸脤脤也者何也俎實也祭肉也生曰脤熟曰俎論語曰子在齊聞韶三月不知肉味又鄉黨曰魚餒而肉敗不食肉雖多不使勝食氣祭於君不宿肉助祭於君所得性體歸即以班賜不留神惠也祭肉不出三日出三日不食之矣自家其食肉也過三日不食之褻鬼神之餘, WYG: 與稻米為酏}
