  - {type: variant, offset: 2274, length: 433, content: 為蛟所吞龍肉以醢漬則文章生方言曰燕之北郊朝鮮洌水間凡異肉及披牛羊五臟謂之膊音愽說文曰殽雜肉也醃漬肉也一劫反膊切肉也之耎反廣志曰北方有牧草便於其畜故北方出美肉異苑曰山陰有人嘗食牛肉便作牛鳴菜食乃止廣州先賢傳曰丁密不食有目之肉桂陽先賢畫讚曰程曾子孝孫七歲亡母號慕毀悴王母哀憐嚼食哺之知有肉味遂吐不食華陽國志曰孝子狼偶二親病時不能食肉遂終身不食肉董卓別傳曰呂布殺卓百姓欣慶相賀長安酒肉為暴貴江氏家傳曰蕤年七歲葬父有酒肉食之左右或戲曰郎為孝何肉食蕤瞿然歛容遂不食十洲記曰崑崙銅柱下有回屋焉壁方丈上有鳥名曰希有左翼覆東王公右翼覆西王母其肉若醢仙人甘之笑林曰甲買肉過入都廁挂肉著外乙偷之未得去甲出覔肉因詐便口衘肉曰挂著外門何得不失若如我衘肉著口豈有失理世說曰羅友作荊州從事桓宣武為王車騎集別有求集坐良久辭出宣武曰卿向以諮事今何以去荅曰友聞白羊白肉美一生未嘗得故來求食食了無事可諮魏文帝與吳質書曰舉太山以為肉竭東海以為酒陸凱表曰呂蒙凌統早亡先帝痛悼不已子並幼稚皆內省中稱肉食之客炙, SBCK: 而􅆋起飛散}
  - {type: variant, offset: 2274, length: 9, content: 為蛟所吞龍肉以醢漬, WYG: ''}
