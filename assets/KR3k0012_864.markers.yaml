  - {type: variant, offset: 3135, length: 370, content: 三謁周顗顗異之時重牛心炙座客未噉顗割噉羲之於是始知名齊書曰桂楊之役詔檄久之未就齊高帝引江淹入中書省光賜酒食淹素能飲啖食鵝炙垂盡進酒數升訖文誥亦辦隋書曰煬帝初在藩魚俱羅弟贊以左右從累遷大都督及帝嗣位拜車騎將軍贊性凶暴虐其部下令左右炙肉遇不中意以籤刺瞎其眼有溫酒不適者立斷其舌孟子曰嗜秦人之炙無以異於嗜吾炙夫物則亦有然者也然則嗜炙亦有外與又曰曾晳嗜羊棗而曾子不忍食羊棗公孫丑問曰膾炙與羊棗孰美孟子曰膾炙哉公孫丑曰然則何為食膾炙而不食羊棗乎曰膾炙所同也羊棗所獨也孝子傳曰王祥後母病欲黃雀炙乃有黃雀數枚飛入其幕因以供母說苑曰智伯以庖人忘炙而不知韓魏炙知小而不忘知大也世說曰顧榮字彥先輟已炙啖行炙者曰豈有終日執之而不知其味也耶明皇雜錄曰杜甫後漂寓湘潭間羈旅鷦悴於衡州耒陽縣頗為令長所厭甫投詩於宰宰遂致牛炙白酒以甫遺甫飲過多一夕而卒集中猶有贈聶耒陽詩也, SBCK: 四}
