  - {type: variant, offset: 372, length: 31, content: 廉頗奔魏趙王使者視頗尚可得用不趙使見頗頗為之一飯㪷米肉十斤八曰, SBCK: 敗脂辱處也而}
  - {type: variant, offset: 372, length: 248, content: 廉頗奔魏趙王使者視頗尚可得用不趙使見頗頗為之一飯㪷米肉十斤八曰公孫弘為丞相食一肉帝王世紀曰夏桀為肉山脯林漢書曰黃霸頴川太守使吏出不敢舍郵亭食於道旁烏欔其肉民有欲詣府口言事者適見霸與語道此後日吏謁見霸迎勞之曰甚苦食於道旁乃為鳥所盜肉吏大驚又曰武帝為酒池肉林令外國客遍觀又曰陳平為里社分其肉均父老曰善陳孺子之為宰平曰嗟乎使平宰天下亦當如此肉矣又曰張湯父為長安丞出湯為兒守舍父還鼠盜肉父怒笞湯湯掘室得鼠及餘肉劾鼠掠治又曰伏日賜從官肉大官丞日晏不來東方朔獨拔劍切肉即懷肉歸太官奏之朔入免冠謝上曰先生起自責, WYG: 販脂辱處}
