  - {type: variant, offset: 404, length: 460, content: 孫弘為丞相食一肉帝王世紀曰夏桀為肉山脯林漢書曰黃霸頴川太守使吏出不敢舍郵亭食於道旁烏欔其肉民有欲詣府口言事者適見霸與語道此後日吏謁見霸迎勞之曰甚苦食於道旁乃為鳥所盜肉吏大驚又曰武帝為酒池肉林令外國客遍觀又曰陳平為里社分其肉均父老曰善陳孺子之為宰平曰嗟乎使平宰天下亦當如此肉矣又曰張湯父為長安丞出湯為兒守舍父還鼠盜肉父怒笞湯湯掘室得鼠及餘肉劾鼠掠治又曰伏日賜從官肉大官丞日晏不來東方朔獨拔劍切肉即懷肉歸太官奏之朔入免冠謝上曰先生起自責也朔再拜曰朔來受賜不待詔何無禮也拔劍割肉一何壯也割之不多一何廉也歸遺細君又何仁也上笑曰使先生自責乃反自譽賜酒一石肉百斤歸遺細君客漿酒霍肉視酒如漿視肉如霍又曰成帝許后上䟽曰故時酒肉有所賜外家輒上表迺決東觀漢記曰太尉趙喜聞魯恭志行每歲時遣子送米肉辭讓不敢當又曰卓茂為密令民有言亭長受其米肉者茂問之亭長從汝求乎有事與之自以恩意遺人乎民曰自遺之茂曰人異於禽獸者以有仁愛也亭長素為善吏歲時遺之禮也又曰賊經姜詩墓不敢驚孝子致米肉詩埋之後吏譴詩掘出示之又曰閔仲叔客居安邑老病家貧不能買肉日買豬肝一片謝承, SBCK: 伯千金}
