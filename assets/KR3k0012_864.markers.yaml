  - {type: variant, offset: 1194, length: 645, content: 分齊手揣輕重斤兩不差云其母本屠家之女也太康起居注曰尚書郭弈有疾日賜酒米各伍升豬羊肉各一斤石崇崔亮母疾曰賜清酒粳米各伍升豬羊肉各一斤半臧榮緒晉書曰趙高為丞相指鹿為馬持蒲作肉晉中興書曰陸納為吳興太守辭大司馬桓溫因問桓公醉可飲幾酒肉食多少溫曰溫酒不過三升便醉白肉不過十臠納後伺間求入自言外有徵禮溫勑而受正有酒一斗鹿肉一盤一坐愕然納曰公近云飲三升民正可二升今有一斗似備餘瀝溫歎服晉書曰周訪鄉人盜訪牛於家間殺之訪得之密埋其肉不使人知宋書曰衡陽王儀季鎮荊州隊主續豊母老家貧無以充養遂不食肉儀季哀其志以錢米給豊母并制豊噉肉齊書曰高帝雖從官而家業本貧為建康令時明帝等冬月猶無縑纊而奉瞻甚厚后母撤去兼肉曰於我過足矣梁書曰傅昭性尤篤慎予婦嘗得家餉牛肉以進昭昭召其子曰食之則犯法告之則不可取而埋之隋書曰王邵篤好經史遺落世事用思既專性頗怳忽至對食閉目疑思盤中之肉輒為僕從所食邵弗之覺唯責肉少數罰廚人以情白依前閉目伺候而獲之廚人方免笞辱墨子曰孔子厄於陳蔡子路烹豚孔子不問肉所由來食之晏子春秋曰梁丘據見晏子中食而肉不足王孫子曰楚莊伐宋廚有臭肉將軍子重諫王以肉饋於賢公孫尼子曰殷紂為肉圃孟子曰孔子為魯司寇從而祭膰肉不至不稅冕而行不知者以為肉也其知者以無禮也又曰庖有肥肉廄有肥馬民有飢色野有餓殍此率獸而食人也又曰雞豚狗彘之畜無失其時七十者可以食肉矣韓子曰夫百日不食以待梁肉餓者不育令待堯舜之賢乃治當世之民是猶待梁肉而救餓之說也又曰晏子對景公曰田成子殺一牛取一豆肉餘以食士燕丹子曰荊軻入秦過陽翟買肉爭輕重屠辱軻武陽欲擊軻止之, SBCK: 潤徒益苦辛耳}
