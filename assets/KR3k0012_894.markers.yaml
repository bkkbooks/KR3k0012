  - {type: variant, offset: 67, length: 0, content: '', SBCK: 充於黄門又曰烏孫國大昆弥治赤谷城山多松樠不田作種樹畜逐水草與匈奴同俗國多馬冨人至四五千疋又曰王褒聖主得賢臣頌曰及至駕齧膝驂乗且王良執靶韓哀附輿縱馳騁騖忽如草靡過都越國蹶如歴塊追奔電逐遺風周流八極萬里一息何其遼哉人馬相得也又曰御史大夫衛綰奏馬髙五尺九寸}
