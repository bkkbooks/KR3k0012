  - {type: variant, offset: 1339, length: 187, content: 晉侯伐齊齊師夜遁邢伯告中行伯曰有班馬之聲夜遁馬不相見故鳴斑別也齊師其遁又昭四年傳曰魯使椒舉如晉求諸侯晉侯欲勿許司馬侯曰不可公曰晉有三不殆其何敵之有國險而多馬齊楚多難有是三者何鄉而不濟對曰恃險與馬而虞鄰國之難是三殆也四嶽三塗陽城大室荊山中南九州之險也是不一姓冀之北土馬之所生無興國焉恃險與馬不可以為固也又宣上曰宋人以文馬百駟以贖華元於鄭半入華元逃歸又昭七年曰衛侯來獻其乘馬曰啟, SBCK: 明帝賜東平王蒼隂太后器}
  - {type: variant, offset: 1339, length: 5, content: 晉侯伐齊齊, WYG: 馬援於交阯得駱越銅鼔乃鑄為馬式還上表曰夫行天莫如龍行地莫如馬馬者兵甲之本國之大用安寧則以别尊卑之叙有變則以濟逺近之難昔有騏驥一日千里伯樂見之昭然不惑近世有西河子輿亦明相法子輿傳西河儀長孺長孺傳茂陵丁君都君都傳成紀楊子阿臣援嘗}
