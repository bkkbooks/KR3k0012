  - {type: variant, offset: 8, length: 51, content: 馬怒也武也馬一歲曰馵音環二歲曰駒三歲曰駣音兆八歲曰𩡩音八高六尺曰驕七尺曰騋音來八尺曰龍騊音陶駼音途北野, WYG: 請以人君}
