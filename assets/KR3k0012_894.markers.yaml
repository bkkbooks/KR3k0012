  - {type: variant, offset: 3419, length: 2, content: 義渠, SBCK: 上始欲征匈奴與竇固等議出兵調度皆}
  - {type: variant, offset: 3419, length: 4, content: 義渠以茲, WYG: 光和四年春正月初置騄驥廐丞領受郡國調馬豪右辜𣙜馬一匹至二百萬又曰明帝賜東平王蒼隂太后器服及大宛馬一疋血従前􅈩上小孔中出嘗聞武帝歌天馬霑赤汗今親見其然也又曰明德馬后過濯龍門上見外家問起居馬如游龍倉頭衣緑褠領袖正}
  - {type: page-break, offset: 3419, content: '', id: KR3k0012_WYG_894-7b, image: WYG0901/WYG0901-0014d.png}
  - {type: variant, offset: 3419, length: 2, content: 義渠, krp: 上始欲征匈奴與竇固等議出兵調度皆}
  - {type: variant, offset: 3422, length: 4, content: 茲白茲白, SBCK: 爲塞外草羙可不湏馬榖其各以固等將兵到燉煌當出塞上請馬榖上以固言前後相違怒不與榖皆言案軍出塞無榖馬故事馬防言宣帝時五將岀征匈奴􅀱􅀐得漢馬矢見其中有粟知漢兵出以故引去以是言之馬當與榖上善其用意微動勑下調馬榖防遂見親近又曰明徳后詔書流布咸稱至德王主諸處莫敢犯禁廣平鉅鹿樂成王入問起居車􅀐鞌勒皆純黒無金銀采飾馬不踰六即賜錢五百萬又曰桓典爲御史是時官官秉權典執政無所廻避常乗􅍡馬京帥畏憚爲之語曰行行且止避􅍡馬御史獻帝春秋曰曹操與吕布軍戰敗布得操􅀐而不知是問曰曹使君何在荅曰􅀐黄馬}
  - {type: page-break, offset: 3422, content: '', id: KR3k0012_SBCK_894-6b}
  - {type: variant, offset: 3422, length: 4, content: 茲白茲白, krp: 爲塞外草羙可不湏馬榖其各以固等將兵到燉煌當出塞上請馬榖上以固言前後相違怒不與榖皆言案軍出塞無榖馬故事馬防言宣帝時五將岀征匈奴候騎得漢馬矢見其中有粟知漢兵出以故引去以是言之馬當與榖上善其用意微動勑下調馬榖防遂見親近又曰明徳后詔書流布咸稱至德王主諸處莫敢犯禁廣平鉅鹿樂成王入問起居車騎鞌勒皆純黒無金銀采飾馬不踰六即賜錢五百萬又曰桓典爲御史是時官官秉權典執政無所廻避常乗􅍡馬京帥畏憚爲之語曰行行且止避􅍡馬御史獻帝春秋曰曹操與吕布軍戰敗布得操騎而不知是問曰曹使君何在荅曰騎黄馬}
