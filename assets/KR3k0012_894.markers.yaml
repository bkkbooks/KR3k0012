  - {type: variant, offset: 3429, length: 2, content: 倨齒, WYG: 公軍謂之白馬將軍又陳思王表文帝曰臣於武皇帝世得大宛紫騂馬一疋形應圖法善持頭尾教令習拜今已能拜又能行與鼓節相應謹以奉獻又文帝與孫權書曰前使于禁郭及夫所道吾纎驪馬本欲使禁自致之念將軍儻欲速得今故先以付徃此二馬朕常所自乗甚調良善走數萬疋選之真可樂也中國雖饒馬知名絶足亦時有耳又曰朱建平善相馬文帝將出取馬建平道遇之語人曰此馬之相今日死矣帝將乗馬馬惡衣香齧帝膝帝大怒即殺之魏書曰曹公所乗馬名絶影為矢所中傷頰及足呉書曰孫堅於西華失利堅被瘡墮馬卧草中軍衆分散不知堅所在堅所騎驄馬馳還營培地將士隨馬於草中得堅又曰諸葛恪為將蜀使至上謂使曰元遜為將軍君還蜀可報丞相為致佳馬恪起陳謝上曰卿未得馬何為謝對曰夫蜀陛下外廐陛下有詔臣必得之是以謝也呉志曰魏使以馬求易珠璣孔翠瑇􅈘孫權曰此皆孤所不用而可以得馬何苦而不聼與交易九州春秋曰初吕布騎將侯成遣客牧馬十五疋客悉驅馬去向沛城欲歸劉備吕布將騎逐之竟得馬還諸將合禮賀成成醸五六斛酒獵得十餘頭豬未飲}
