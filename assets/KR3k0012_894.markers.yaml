  - {type: variant, offset: 3603, length: 427, content: 鎰求天下珍物以免君之罪於是得犬戎氏文馬毫毛朱鬣目如黃金項如雞尾名雞斯之乘以獻商王禮斗威儀曰君乘火而王其政頌平南海輸駮馬春秋考異郵曰陰合於八八合陽九八九七十二二為地地主月月精為馬月數十二故馬十二月而生人乘以理天下王者駕馬故其字以為王馬春秋說題辭曰地精為馬十二月而生應陰紀陽以合功故人駕馬任重致遠利天下月度疾故馬善走淮南子曰八九七十二耦以乘奇奇主辰辰主月月主馬馬十二月而生孝經援神契曰德至山陵則澤出神馬龍魚河圖曰白馬玄頭食之殺人下病食馬肉亦殺人無以賣馬錢娶婦洞林曰殷鴻業來作卦身在申本命酉乘馬南行西北走逕趨木家化為狗賴子救之不成咎鴻業丁酉生後八月中有急事借馬南出行數里馬欻驚更西北走向戌地入李家遂落地馬因齧之主人出救得免不見傷也尚書中候曰堯沉璧於河龍馬衘甲赤文綠色臨壇吐甲圖鄭玄曰龍象馬也赤文而綠色廣雅曰飛兔飛鴻野麋娥鹿騶吾走狐桃𩧋音黎金喙馬屬也方言曰馬食橐關西曰掩囊掩音鵪或曰掩兜或曰樓兜字林曰驫方問切眾馬走也𩥇知扇切馬臥土中也䩥音但馬帶也鞚馬勒也鞚口貢切, SBCK: 四}
