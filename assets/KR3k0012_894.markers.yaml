  - {type: variant, offset: 854, length: 274, content: 帷詩國風卷耳曰陟彼崔嵬我馬虺隤又曰陟彼高岡我馬玄黃虺隤玄黃皆病又魯頌曰駉頌僖公也僖公能遵伯禽之法務農重穀牧于坰野而史克作是頌史克魯人也駉駉牡馬在坰之野駉駉哀馬也坰遠野也薄言駉者有驈有皇有驪有黃以車彭彭驪馬白跨曰驈黃白曰皇純黑曰驪黃騂曰黃彭彭有容力也駉駉牡馬在坰之野薄言駉者有騅有駓有騂有騏以車伾伾倉白雜毛曰騅黃白雜毛曰駓赤黃曰騂倉祺曰騏伾伾有力也駉駉牡馬在坰之野薄言駉者有驒有駱有騮有雒以車繹繹青驪驎曰驒白馬黑鬣曰駱赤身黑鬣曰騮黑身白鬣曰駱繹繹善走也駉駉牡馬在坰之野薄言駉者有駰有騢有驔有魚以車祛祛陰白雜毛曰駰彤白雜毛曰駰豪骭曰驔二目白曰魚祛祛彊健, SBCK: 絶嗣此非姓}
