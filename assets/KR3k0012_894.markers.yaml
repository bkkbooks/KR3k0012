  - {type: variant, offset: 63, length: 1, content: 驁, SBCK: 遂不肯與漢使怒妄言推金而去宛貴人怒遮攻漢使取財物天子大怒拜李廣利爲貳師將軍發屬國􅀐及郡國惡少年數萬人以伐宛期至貳師城取善馬漢書曰孝文皇帝時有獻千里馬者詔曰鸞旗在前屬車在後􅁻行日五十里朕乗千里之馬獨先安之乃還馬又曰鄭當時以任俠自喜孝景時爲大子舎人五日洗沐常置驛馬長安諸郊請謝賔客夜以繼日又曰萬石君過官門闕必下車趍見輅馬必式焉又曰石建爲太僕奏事自下讀之驚恐曰書馬者與尾而五今乃四獲譴死矣又石慶爲太僕御岀上問車中幾馬慶以䇿數馬畢曰六馬又曰􅀄天子發易書發易書以卜也以卜曰神馬當從西北來得烏孫馬好名曰天馬及得宛汗血馬益壯更名烏孫馬曰西極馬宛馬曰天馬又曰武帝求賢詔曰馬或奔踶而致千里士有􅀒俗之累而立功名夫泛駕之馬亦在御之而巳又曰元狩二年馬生余吾水中在朔方北元鼎四年馬生渥洼水中作天馬之歌又曰大宛國别邑七十餘城多善馬汗血言其先天馬子也言大宛國喬山其上有馬不可得因取五色馬母置其下與集生駒皆汗血因號曰天馬子也又天馬歌曰太一貺天馬千里下霑赤汗沫流赭大宛馬汗血沾濡也志俶儻精權竒籋浮雲籋音躡言馬上浮雲也晻音奄上馳體容與迣萬里迣音逝迣超踰今安匹龍爲友又歌曰天馬來從西極渉流沙九夷服天馬來暦無草徑千里循東道天馬來開逺門竦子身逝崐崘天馬來龍之媒天馬龍之􅀋馬來龍必至之媒也遊閶闔觀玉臺又曰孝武之丗聞天馬蒲陶則通大宛安息自是之後明珠文甲通犀翠羽之珎盈於後宫龍文魚目汗血之馬皆}
