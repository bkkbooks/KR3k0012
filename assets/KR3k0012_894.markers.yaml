  - {type: variant, offset: 1978, length: 614, content: 駑馬則皆分為三焉凡馬特居四之一欲其乘之性相似也物同氣則心一鄭司農云四之一者三牝一牡春祭馬祖執駒馬祖天駟也孝經說云房為龍馬鄭司農云執駒無令近母猶攻駒也二歲曰駒三歲曰駣玄謂執猶拘也春通淫之時駒弱血氣未定為其乘正傷也夏祭先牧頒馬攻特先牧始養馬者其人未聞夏通淫之後攻其特為其蹄齧不可乘用鄭司農云攻特謂騬之秋祭馬社臧僕馬社始乘馬者世本作曰相士作乘馬鄭司農云臧僕謂簡練馭者令皆善也玄謂僕馭五路之僕冬祭馬步獻馬講馭夫馬步神為災害馬者獻馬見成馬於王也馭夫馭貳車從車使車者也講猶簡習凡大祭祀朝覲會同毛馬而頒之毛馬齊其色也頒授當乘之飾幣馬執朴而從之鄭司農云校人主飾之也幣馬以馬遺人當幣處者也聘禮曰馬則北面奠幣于其前士喪禮下篇曰薦馬纓三就入門北面交轡圉人夾牽之馭者執策立于馬後凡賓客受其幣馬賓客之幣馬來朝聘而享王者大喪飾遣車之馬及葬埋之言埋之則是馬塗車之芻靈田獵則師驅逆之師猶將也凡將事于四海山川則飾黃駒四海猶四方也王巡守過大山川則有殺駒以祈沈禮與王人職有宗祀以黃金勺前馬之禮凡國之使者共其幣馬使者所用私覿凡軍事物馬而頒之物色齊其力又夏官下曰趣馬掌贊正良馬而齊其飲食簡其六節贊佐也佐正者謂校人臧僕講馭夫之時簡差也節猶量也差擇王馬以為六等掌駕說之頒用馬之第次辨四時之居治之聽馭夫居謂牧庌所處治謂執駒攻轉之屬巫馬掌養疾馬而乘治之相醫而樂攻馬疾受財于校人乘謂驅步以發其疾知所疾處乃治之相助也馬死則使其賈粥之入其布于校人布泉也鄭司農云賈謂其屬官小吏賈二人粥賣, SBCK: 然}
