  - {type: variant, offset: 17, length: 5, content: 馵音環二歲, SBCK: 大宛有善馬在貳師城匿不肯與漢使天子旣好宛馬使壯士車令等持千金以請宛王貳師城善馬宛國饒漢物相與謀}
