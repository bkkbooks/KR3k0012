  - {type: variant, offset: 2899, length: 517, content: 庇馬涼也充猶居也茨蓋也闔苫也椹質翦闔圉人所習也杜子春讀椹為齊人言鈇椹之椹椹質所射者習射處圉人掌養馬芻牧之事以役圉師役者圉師使令焉凡賓客喪紀牽馬而入陳賓客之馬王所以賜之者詩云雖無子之路車乘馬喪紀之馬啟後所薦焉廞馬亦如之廞馬遣車之馬人捧之赤牽而入陳又夏官上曰馬質掌質馬馬量三物一曰戎馬二曰田馬三曰駑馬皆有物賈此三馬買以給官府之使無種也鄭司農曰皆有物賈皆有物色及賈直網惡馬鄭司農云網讀為以亢其讎之亢書亦或為亢亢御也禁也禁去惡馬不畜也玄謂網以縻索維網狎習之凡受馬於有司者書以齒毛與其賈馬死則旬之內更旬之外入馬耳以其物更外其否鄭司農云更謂償也玄謂旬之內死者償以齒毛與賈受之日淺養之惡也旬之外死入馬耳償以毛色不以齒賈任之過其任也其外否旬之外踰二十日而死不任用非用者罪馬及行則以任齊其行識其所載輕重及道里齊其勞逸乃復用之若有馬訟則聽之訟謂賣買之言相負禁原蠶者原再也天文辰為馬蠶書蠶為龍精月直大火則浴其種是蠶與馬同氣物莫能兩大禁再蠶者為傷馬與論語曰齊景公有馬千駟死之日民無德而稱焉又憲問曰驥不稱其力稱其德也驥古之善馬也德謂在五御之威儀周書曰其西天子車立馬乘六青馬陰羽鳧旌鳧羽為旌旄也周公旦主東青馬黑鬣謂之母兒周公主東則太公主西也東青馬則西白矣馬名未聞, SBCK: 勝我}
