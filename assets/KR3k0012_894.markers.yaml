  - {type: variant, offset: 1527, length: 336, content: 啟服馬名壍而死墮壍死也公將為之櫝為作棺也子家曰從者病矣請以食之乃以帷裹之又定三年曰唐成公如楚有雨肅爽馬子常欲之成公唐惠侯之後肅爽駿馬名弗與三年止之唐人或相與謀請代先從者許之飲先從者酒醉之竊馬而獻之子常子常歸唐侯自拘於司敗竊馬者自拘曰君以弄馬之故隱君身隱懮約也棄國家群臣請相夫人以償馬必如之相助也夫人謂養馬者唐侯曰寡人之過也二三子無辱皆賞之又定下曰衛公子地有白馬四公嬖向魋向魋欲之向魋司馬桓魋公取而朱其尾鬣以與之與桓魋也地怒使其徒扶魋而奪之魋懼將走公閉門而泣之目盡腫穀梁傳僖公曰晉獻公將伐虢荀息請以屈產之乘垂棘之璧假道於虞公曰此晉寶也荀息曰是取中府藏外府取中廄藏外廄也後舉虞荀息牽馬操璧而前曰璧猶是馬齒長矣周禮夏官下曰校人掌王馬之政政謂差擇養乘之數也月令曰班馬政辨六馬之屬種, SBCK: 及遺宛}
