  - {type: variant, offset: 7, length: 0, content: '', SBCK: 繡置華屋之下㗖以􅀥脯馬死欲以大夫禮葬之樂人優孟入殿門大􅂘曰請以人君之禮葬之以彫玉爲棺文梓爲槨豫章爲題湊發甲卒爲壙老弱􅀒土諸侯聞之皆知大王賤人貴馬也王曰爲之奈何請爲王言六畜之塟以龍竈爲槨銅音暦爲棺齊以薑桂薦以木蘭衣以火光塟人腹中王乃以馬屬太官又曰巴蜀沃野西近卭笮有笮馬旄毛又}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 繡置華屋之下㗖以棗脯馬死欲以大夫禮塟之樂人優孟入殿門大哭}
  - {type: variant, offset: 7, length: 0, content: '', krp: 繡置華屋之下㗖以棗脯馬死欲以大夫禮葬之樂人優孟入殿門大哭曰請以人君之禮葬之以彫玉爲棺文梓爲槨豫章爲題湊發甲卒爲壙老弱負土諸侯聞之皆知大王賤人貴馬也王曰爲之奈何請爲王言六畜之塟以龍竈爲槨銅音暦爲棺齊以薑桂薦以木蘭衣以火光塟人腹中王乃以馬屬太官又曰巴蜀沃野西近卭笮有笮馬旄毛又}
