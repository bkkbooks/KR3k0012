  - {type: variant, offset: 3429, length: 2, content: 倨齒, SBCK: 羽軍謂之白馬將軍又曰陳思王表文帝曰臣於武皇帝丗得大宛紫騂馬一疋形法應圖善持頭尾教令習拜今巳能拜又能行與鼔節相應謹以奉獻又曰文帝與孫權書曰前使于禁及王敦去時所道騶吾鐵驪馬本欲使禁自致之念將軍儻欲速得今故先以付徃此二馬朕常所自乗其調良善走數萬疋選之真可樂也中國雖饒馬其知名絶足亦時有耳又曰朱建平善相馬文帝將岀取馬建平道遇之語人曰此馬之相今日死矣帝將乗馬馬惡衣香嚙帝膝帝大怒即殺之魏書曰曹公所乗馬名絶影爲矢所中傷頰及足呉書曰孫堅於西華失利堅􅀍瘡墮馬卧草中軍衆分散不知堅所在堅所􅀐􅍡馬馳還營棓地嗚呼將士隨馬於草中得堅又曰諸􅁑恪爲將蜀使至上謂使曰元遜爲將軍君還蜀可報丞相爲致佳馬恪起陳謝上曰卿未得馬何爲謝對曰夫蜀陛下外厩陛下有詔臣必得之是以謝也呉志曰魏使以馬求易珠璣翡翠瑇瑁孫權曰此皆孤所不用而可以得馬何苦而不聽與交易九州春秋曰􅀄吕布􅀐將侯成遣客牧馬十五疋客悉驅馬去向沛城欲歸劉備成自將􅀐逐之悉得馬還諸將合禮賀成成釀五六斛酒獵得十餘頭猪未飲}
