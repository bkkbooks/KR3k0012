  - {type: variant, offset: 3427, length: 0, content: '', SBCK: 是也因得免魏志曰穢國岀菓下馬漢時恒獻之馬髙三尺乗於菓樹下行又曰龐意討􅀜羽親與羽交戰射羽中額時意常乗}
  - {type: variant, offset: 3427, length: 0, content: '', WYG: 不及逺矣謝承後漢書曰朱震字伯厚性剛烈曾為従事奏濟隂太守單匡贓罪並連匡兄中常侍車騎將軍超三府喭曰車如雞棲馬如狗疾惡如風朱伯厚又曰桓典為御史是時宦官秉政典無所迴避常乗驄馬京師畏憚為之語曰行行且止避驄馬御史獻帝春秋曰曹操與吕布軍戰敗布得操騎而不知是操問曰曹使君何在荅曰騎黄馬者是也因得免魏志曰濊國出果下馬漢時恒獻之又曰龎惪禦關公親與公交戰射中額時惪常乗}
