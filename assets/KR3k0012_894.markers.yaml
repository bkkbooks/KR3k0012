  - {type: variant, offset: 9, length: 0, content: '', SBCK: 蹄躈千躈苦吊切牛千足此亦比千乗之家又曰陸地牧馬二百蹄牛蹄角千皆與千户侯等又曰東胡使求冒頓千里馬冒頓問羣臣羣臣曰千里馬匈奴寳也勿與昌頓曰與人隣國奈何惜一馬遂以與也又曰冒頓圍髙祖於平城所􅀐西方盡白馬東方盡青龍北方盡烏驪南方盡騂馬又曰郭隗謂燕昭王曰臣聞古人有以千金求市千里馬而不能得於是與㳙人金請爲市之賫千金覔之而絶域有千里馬巳死乃用五百金市其首而還王}
