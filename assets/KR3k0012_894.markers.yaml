  - {type: variant, offset: 2644, length: 570, content: 四牡孔阜杜子春云佚當為逸鄭司農云馬三歲曰駣二歲曰駒散讀為中散大夫之散謂聒馬耳母令善驚也玄謂逸者用之不散甚勞安其血氣也教駣始乘習之也攻駒騬其蹄齧者閑之先牧先牧制閑者散馬耳以竹括甲其耳頭動搖則括中物後遂串習不復驚正校人員選校人謂師圉也正員選者選擇可備員者平之馬八尺以上為龍七尺以上為騋六尺以上為馬大小異名爾雅曰騋牝驪牝玄駒褭驂鄭司農說以月令曰駕蒼龍又曰圉師掌教圉人養馬春除蓐釁廄始牧夏庌馬冬獻馬射則充椹質茨牆則翦闔蓐馬茲也馬既出而除之新釁焉神之也春秋傳曰凡馬日中而出日中而入故字庌為訝鄭司農云當為庌玄謂庌廡也廡所以庇馬涼也充猶居也茨蓋也闔苫也椹質翦闔圉人所習也杜子春讀椹為齊人言鈇椹之椹椹質所射者習射處圉人掌養馬芻牧之事以役圉師役者圉師使令焉凡賓客喪紀牽馬而入陳賓客之馬王所以賜之者詩云雖無子之路車乘馬喪紀之馬啟後所薦焉廞馬亦如之廞馬遣車之馬人捧之赤牽而入陳又夏官上曰馬質掌質馬馬量三物一曰戎馬二曰田馬三曰駑馬皆有物賈此三馬買以給官府之使無種也鄭司農曰皆有物賈皆有物色及賈直網惡馬鄭司農云網讀為以亢其讎之亢書亦或為亢亢御也禁也禁去惡馬不畜也玄謂網以縻索維網狎習之凡受馬於有司者書以齒毛與其賈馬死則旬之內更旬之外入馬耳以其物更外其否鄭司農云更謂償也玄謂旬之內死者償以齒毛與賈受之日淺養之惡也旬之外死入馬耳償以毛色不以齒賈任之過其任也其外否旬之外踰, WYG: 秦孝公}
