  - {type: variant, offset: 14, length: 0, content: '', SBCK: 名騅常􅀐及􅀍圍於垓下乃悲歌忼苦莽切愾苦改切爲歌詩曰力拔山兮氣蓋世時不利兮騅不逝及至烏江謂亭長曰吾􅀐此馬五歳所當無敵甞}
  - {type: variant, offset: 14, length: 0, content: '', krp: 名騅常騎及𬒳圍於垓下乃悲歌忼苦莽切愾苦改切爲歌詩曰力拔山兮氣蓋世時不利兮騅不逝及至烏江謂亭長曰吾騎此馬五歳所當無敵甞}
