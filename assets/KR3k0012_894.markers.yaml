  - {type: variant, offset: 10, length: 0, content: '', SBCK: 曰安用死馬首乎徒費五百金㳙人荅曰死馬首尚用五百金况生馬乎天下以王好馬馬必將至矣未朞年果有獻千里馬者三疋又曰任安爲衛將軍舎人與田仁會俱爲舎人居門下心同相愛二人家貧無錢用以事將軍家家􅁥使飬惡齧馬兩疋同牀卧仁竊言曰不知人哉家監任安曰將軍尚不知人乃况家監}
