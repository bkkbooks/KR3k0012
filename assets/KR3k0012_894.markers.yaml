  - {type: variant, offset: 886, length: 1, content: 魯, WYG: 武帝求賢詔曰馬或奔踶而致千里士有負俗之累而立功名夫泛駕之馬亦在御之而已又曰元狩二年馬生余吾水中元鼎四年馬生渥洼水中作天馬之歌又曰大宛國别邑七十餘城多善馬汗血言其先天馬子也又天馬歌曰太一貺天馬下霑赤汗沫流赭志俶儻精權竒籋浮雲晻上馳體容與迣萬里今安匹龍為友又歌曰天馬來従西極涉流沙九夷服天馬來歴無草徑千里循東道天馬來開逺門竦予身遊崑崙天馬來龍之媒逰閶闔觀玉臺又曰孝武之世聞天馬蔔萄則通大宛安息自是之後明珠文甲通犀翠羽之珍盈於後宫龍文魚目汗血之馬充於黄門又曰烏孫國大昆彌治赤谷城山多松柏不田作種樹隨畜逐水草與匈奴同俗國多馬富人至四五千匹又王褒聖主得賢臣}
