  - {type: variant, offset: 1649, length: 2, content: 凡狂, WYG: 癭瘤痬􅦤為害傷范􅁮後漢書曰貞定王劉揚造作䜟記云赤九之後癭揚為主揚病癭以惑衆魏畧曰賈逵前在𢎞農與校尉争公事不得理乃發憤生癭後所病稍大自啟欲割之太祖惜逵恐其不活教謝主薄吾聞十人割癭九人死逵尤行其意而癭愈大宋書曰杜預病癭初攻江陵呉人以瓠壼繫狗頸示之山海經曰天目之山有草如葵名曰杜衡食之能令人癭博物志曰山居之民多癭養生論曰頸處險而癭莊子曰闔跂離無脤甕㼜大癭典術曰服食天門冬治癭除百病傴僂禮記喪服四制曰傴}
