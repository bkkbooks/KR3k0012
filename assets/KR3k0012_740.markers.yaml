  - {type: variant, offset: 2187, length: 0, content: '', SBCK: 水氣多瘖黄帝素問曰瘖者何病􅄮伯曰胞之絡脉何以言之胞絡繫於腎少隂脉實腎繫舌本故不能言續捜神記曰沛國一士人姓周生三兒向應可語便啞皆七八歳有一人經門過來乞問主人此是何聲云是僕兒頻生三子皆啞不能語客曰君􅁳罪還内省我於外待君主人異其言知非常人便入内思良乆而出謂客曰昔爲小兒時當牀上有鷰巢中有三子其母從外食哺子子輙出頭作聲受之積日如此時屋下攀得及巢試以指内巢中鷰子亦岀口承之乃取三蒺梨各與其子吞之旣死其母㝷還不復見其子出户徘徊悲鳴而去有此事}
  - {type: variant, offset: 2187, length: 0, content: '', krp: 水氣多瘖黄帝素問曰瘖者何病𡵨伯曰胞之絡脉何以言之胞絡繫於腎少隂脉實腎繫舌本故不能言續捜神記曰沛國一士人姓周生三兒向應可語便啞皆七八歳有一人經門過來乞問主人此是何聲云是僕兒頻生三子皆啞不能語客曰君冥罪還内省我於外待君主人異其言知非常人便入内思良乆而出謂客曰昔爲小兒時當牀上有鷰巢中有三子其母從外食哺子子輙出頭作聲受之積日如此時屋下攀得及巢試以指内巢中鷰子亦岀口承之乃取三蒺梨各與其子吞之旣死其母㝷還不復見其子出户徘徊悲鳴而去有此事}
  - {type: variant, offset: 2188, length: 0, content: '', SBCK: 甚悔之客曰是矣便問其三兒言語周正異苑曰髙惠清隆安中爲太􅀓主簿忽晝日有群䑕更相衘尾自屋梁相連至地清㝷得瘖疾數日而亡靈驗記曰王導河内人也兄弟三人並得時疾其宅有鵲巢旦夕翔鳴聞其諠噪俱惡之念云􅆧當治此鳥旣􅏔果張取鵲斷舌而殺之兄弟悉得啞疾吃􅀃文曰吃言語難也方言云􅟌極吃也或謂之軋或謂之嬰郭璞曰軋榖氣不利也江東名吃爲嘆也漢書曰魯㳟王餘口吃難言又曰馬相如吃而善著書又曰揚雄爲人簡易口不能劇談劇甚也一說劇遽疾也言吃不能疾言也鄭玄自序曰趙商子字子聲河内温人􅀶學有秀才能講難而吃不能劇談管子曰吾畏事不敢爲事畏言不敢爲言故行年六十如老吃耳新序曰周昌者沛人以軍功封汾隂侯御史大}
  - {type: page-break, offset: 2188, content: '', id: KR3k0012_SBCK_740-7a}
  - {type: page-break, offset: 2188, content: '', id: KR3k0012_SBCK_740-7b}
  - {type: variant, offset: 2188, length: 0, content: '', krp: 甚悔之客曰是矣便問其三兒言語周正異苑曰髙惠清隆安中爲太傳主簿忽晝日有群䑕更相衘尾自屋梁相連至地清㝷得瘖疾數日而亡靈驗記曰王導河内人也兄弟三人並得時疾其宅有鵲巢旦夕翔鳴聞其諠噪俱惡之念云羌當治此鳥旣差果張取鵲斷舌而殺之兄弟悉得啞疾吃說文曰吃言語難也方言云􅟌極吃也或謂之軋或謂之嬰郭璞曰軋榖氣不利也江東名吃爲嘆也漢書曰魯㳟王餘口吃難言又曰馬相如吃而善著書又曰揚雄爲人簡易口不能劇談劇甚也一說劇遽疾也言吃不能疾言也鄭玄自序曰趙商子字子聲河内温人博學有秀才能講難而吃不能劇談管子曰吾畏事不敢爲事畏言不敢爲言故行年六十如老吃耳新序曰周昌者沛人以軍功封汾隂侯御史大}
  - {type: variant, offset: 2189, length: 1, content: 狂, SBCK: 髙帝欲廢惠帝立戚夫人子如意群臣固争莫能得昌廷争之強上問其􅀃昌爲人吃曰臣口不能言然臣則知其不可也陛下雖欲廢太子臣期期不奉詔丗􅀃曰魏明帝口吃少言而内明斷丗􅀃曰鄧艾口吃語稱艾艾晉文王戲之曰艾艾爲是幾艾鄧荅曰鳯兮鳯兮故是一鳯秃禮記曰秃}
  - {type: variant, offset: 2189, length: 1, content: 狂, krp: 髙帝欲廢惠帝立戚夫人子如意群臣固争莫能得昌廷争之強上問其說昌爲人吃曰臣口不能言然臣則知其不可也陛下雖欲廢太子臣期期不奉詔丗說曰魏明帝口吃少言而内明斷丗說曰鄧艾口吃語稱艾艾晉文王戲之曰艾艾爲是幾艾鄧荅曰鳯兮鳯兮故是一鳯秃禮記曰秃}
  - {type: variant, offset: 2191, length: 0, content: '', SBCK: 不免􅂖梁傳曰魯季孫行父秃聘于齊齊使秃者御音迓蔡邕獨斷曰古幘}
