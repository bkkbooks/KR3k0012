  - {type: variant, offset: 3188, length: 280, content: 偉遂陽狂及盲不受晉華陽國志曰犍為費昭不肯仕公孫述乃漆身為厲陽狂以避之人謂之狂史記曰東方朔人主左右諸郎半呼之狂人人主聞之曰今朔在事無為是行者若等安能及之哉朔行殿中郎謂之曰人皆以先生為狂朔曰若朔等所謂避世於朝廷間者漢書曰酈食其陳留高陽人也沛公略地陳留沛公麾下騎士適食其里中子騎士歸食其謂曰吾聞沛公有大略吾所願從若見沛公謂曰臣里中有酈生人皆謂之狂生自謂我非狂騎士如所戒沛公召之後漢書曰延熹末黨事將作袁閎遂散髮絕世欲投跡深林以母老不宜遠遁乃築土室四周於庭不為戶自牖納飲食而已旦於室中東向拜母母思閎時往就視母去便自掩閉兄弟妻子莫得見也及母歿不為制服設位時莫能名或以為狂生, SBCK: 害傷}
