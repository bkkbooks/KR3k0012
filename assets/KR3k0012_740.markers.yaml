  - {type: variant, offset: 1925, length: 1, content: 昔, SBCK: 元帝字丗誠武帝第七子也􅀄武帝夢眇目僧執香爐稱託生王宫旣而采女石氏侍始褰户慢有風廻裙梁武帝意感幸之乃生元帝賜采女姓曰阮進爲脩容脩容常失珠謂是左右所盗乃炙魚目不知其珠孝元吞之信􅀫之間珠遂便出一目致眇魚之報焉南史曰梁湘東王於江東泛舟顧而言曰今可稱有樂功曹劉源曰帝子降兮北渚王作色曰當道目眇眇兮愁予耶坐者股慄酒遂不酣又邵陵王賦詩戯之曰湘東}
  - {type: variant, offset: 1925, length: 1, content: 昔, WYG: 衞孫良夫跛郄克𦕈聘於齊齊使跛者御跛蕭同姪子處臺笑之春秋後語曰秦攻趙急求救於齊齊王曰必長安君為質長安君者太后之少子也太后愛之不肯遣大臣強諫太后怒左師觸龍請見太后曰老臣病足㑹不能疾走不得見久矣自恐太后體}
  - {type: page-break, offset: 1925, content: '', id: KR3k0012_WYG_740-18b, image: WYG0899/WYG0899-0524b.png}
