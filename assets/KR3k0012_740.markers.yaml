  - {type: variant, offset: 512, length: 76, content: 自量年少新進而猥欲逮及嘗激一事而作小賦用精思大劇而立感病子雲亦言帝上甘泉詔使作賦為文卒暴及倦臥夢其五藏出在地以手收內及覺大少氣病一歲卒王符潛夫論曰夫理世, WYG: 導引}
