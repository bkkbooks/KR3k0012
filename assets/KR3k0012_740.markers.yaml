  - {type: variant, offset: 4034, length: 166, content: 而病癲疾者安得知之岐伯曰此名胎病此得在腹時母大驚氣上下精氣并故令子發癲病范汪秘方曰邪入於陽轉則為癲長安李府君女得癲病募治愈者賞百萬朝那縣卒自言能不敢求錢但願為門下卒服藥即愈祖台之議錢耿殺妻事曰尋建康獄竟囚錢耿癲疾發作毆殺妻了無他變故荒病之人不蒙哀矜之施無知之禮加以大辟之刑懼非古原心定罪之義癡左傳曰晉周子有兄不慧不能辨菽麥蓋所謂白癡, SBCK: 瘤腫}
