  - {type: variant, offset: 1632, length: 7, content: 昌邑王賀衣服言, WYG: 桓帝元嘉中京師婦女作齲齒笑齲齒笑者齒痛也淮南子曰啄木愈齲又曰决物治齲君子不與兔缺續晉陽秋曰魏詠之生而兔缺相者云後當貴年十八聞荆州殷仲堪帳下有術人能治之因西上仲堪與}
