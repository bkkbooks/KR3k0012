  - {type: variant, offset: 442, length: 52, content: 平病困庾司空為會稽省之問訊甚至為之流涕孔慨然曰丈夫將終不問安國寧家之術而反作兒女相問庾聞廻還謝之請其語言, WYG: 子則易道遇小人則蹈於溝􅊤}
