  - {type: variant, offset: 3, length: 10, content: 二惣敘疾病下呂氏春秋, SBCK: 三聾盲瘖啞吃秃􅙄齲齒兎􅆙癭傴僂疣贅瘤跛躄偏折附聾􅀃文}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 三聾盲瘖啞吃秃􅙄齲齒兔缺癭傴僂疣贅瘤跛躄偏枯附尰聾説文曰聾無聞也從耳從龍秦晉謂之􅀈又益梁之州謂聾曰􅀈秦晉聴而不聞聞而不達謂之􅀈又曰生而聾謂之聳釋名曰聾籠也如在䝉籠之内不察也左傳僖中曰耳不聴五聲之和為聾漢書曰黄霸為頴川太守長吏許丞老病聾督郵白欲逐之霸曰許丞廉吏雖老尚能拜起送迎正頗重聴何傷且善助之無失賢者東觀漢記曰尹敏遷長陵令永平五年詔書捕男子周慮慮素有名字與敏善過候敏坐繫免官出乃嘆曰瘖聾之徒真世之有道者也何謂察察而遇斯禍也老子曰五音令人耳聾莊子曰耳之與形吾不知其異也而聾者不能自聞淮南子曰土地各以類生人水氣多瘖風氣多聾説苑曰仲尼曰非其地而樹之不生非其人而語之不聴得其人如聚沙而雨之非其人若聚聾而皷之抱朴子曰豹􅈢之裘不為負薪施九成六變不為聾夫設談藪曰後魏中書侍郎裴敬憲字伯茂敬憲新構山亭與賓客集謂邢子曰山池始就願為一名子才曰海中曰蓬萊山仙人之所居宜名蓬萊裴聾也敬憲患耳故以戯之憲初不悟於後覺忻然謂子才曰長忌及户髙則無慮公但大語聾亦何嫌盲廣雅曰矇瞍瞽盲也説文曰聾目無眸也𦕈一目小也眺目不正也瞎目病也睞童子不正也眄目偏合也青目病生醫音縊也瞍無目也周易履卦曰六三眇能視跛能履象曰眇能視不足以有明也跛能履不足以與行也毛詩臣工有瞽曰有瞽有瞽在周之庭禮記檀弓上曰子夏喪其子而喪其明明目精也曾子弔之曰吾聞之朋友喪明則哭之曽子哭子夏亦哭曰天乎予之無罪也曽子怒曰商女何無罪也吾與女事夫子於洙泗之間退而老於西河之上使西河之民疑女於夫子爾罪一也喪爾親使民未有聞焉爾罪}
