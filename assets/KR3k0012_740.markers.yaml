  - {type: variant, offset: 1927, length: 0, content: '', WYG: 所苦也太后曰老婦恃輦而行長沙耆舊傳曰夏叔丁母憂過禮遂患風濕}
  - {type: variant, offset: 1928, length: 105, content: 國國中一水號曰狂泉國人飲此水無不狂也唯國君穿井汲獨得無恙國人既狂謂主不狂為狂也是聚謀共執國主療其狂疾火艾針藥莫不必具國主不任其苦於是到泉所酌水飲之飲畢便狂君臣大小其狂若一眾乃懽然我既不狂難以獨立比亦欲試飲此水宋, SBCK: 病非啞復非聾相思下􅃗淚望直有全功後魏}
