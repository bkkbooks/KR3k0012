  - {type: punctuation, offset: 2249, content: 「, id: KR3k0012_CHANT_740-bkkpn712}
  - {type: variant, offset: 2251, length: 465, content: 禍則詘有福則盈有過則悔有功則矜遂不知反此之謂狂傅子曰惡劉曄於魏明帝曄不盡忠善伺上意所趣而合之帝如言以驗之果得情從此踈焉曄遂發狂出為大鴻臚以憂死諺曰巧詐不如拙誠信矣抱扑子曰食莨蕩令人狂荒不可謂人本有荒狂山海經曰觀水多鰩音遙魚其味酸食之已狂越絕書曰慧種生聖癡種生狂桂實生桂桐實生桐禰衡別傳曰衡為鼓吏裸身辱曹操孔融復見操說衡狂疾令求得自謝裴揩別傳曰石崇嘗與裴揩孫綽酣宴而綽慢節過度崇責之揩曰季舒酒狂四海所知足下飲人狂藥責人正禮王韶之始興記曰觀亭峽下有神廟傍巖向江經道不恪者必狂走或變而為虎世說曰阮德如嘗與親友逍遙河側歎曰大丈夫不能使僕從陷於河橋非丈夫也坐者或曰德如以高素致名不應發此言必將病之候俄而性理果僻欲逸走家人嘗以一細繩撗繫之戶前以維之每欲出礙繩輒反時人以為名士狂黃帝八十一問曰狂顛之疾何以別荅曰狂之始發少臥少飢自賢自貴妄笑好樂神異經曰西方有人飲食被髮東走其婦追之不止怒亦被髮名曰狂一名顛一名狷一名風此人夫妻與天俱生狂走東西沒晝夜魏武帝令曰昔吾同縣有丁幼陽者其人衣冠良士又學問材器吾愛之後以憂恚得狂病即差愈往來故當共宿止吾常遣歸謂, SBCK: 比擬顔師伯􅆙齒號}
