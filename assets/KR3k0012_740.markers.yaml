  - {type: variant, offset: 4, length: 2, content: 惣敘, WYG: 也喪爾子喪爾明爾罪三也而曰女何無罪與子夏投其杖而拜曰吾過矣吾過矣又仲尼燕居曰治國而無禮譬猶瞽之無相與倀倀乎其何之韓詩外傳曰海之上有勇士曰菑邱訢以勇遊於天下過神淵飲馬其僕曰馬飲此者必死訢言飲之其僕以其言飲之馬果死菑邱拔劔而入三日三夜殺二蛟一龍而去雷神隨而擊之十日十夜眇其左目漢書曰杜欽字子夏少好經書家富而目偏盲故不好為吏茂陵杜業與同姓字俱以才能稱京師衣冠謂欽為盲杜子夏以相别欽惡之為小冠髙廣二寸由是京師謂欽為小冠杜子夏業為大冠杜子夏東觀漢記曰杜篤仕郡文學掾以目}
