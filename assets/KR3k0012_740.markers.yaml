  - {type: variant, offset: 2180, length: 267, content: 痺丘氣多狂又曰今夫狂者無憂聖人亦無憂不知禍福也又曰不知道者釋其所已有而求其所未得故福至則喜禍至則怖不悔己之所生乃反怨人不喜則憂謂之狂生又曰士有禍則詘有福則盈有過則悔有功則矜遂不知反此之謂狂傅子曰惡劉曄於魏明帝曄不盡忠善伺上意所趣而合之帝如言以驗之果得情從此踈焉曄遂發狂出為大鴻臚以憂死諺曰巧詐不如拙誠信矣抱扑子曰食莨蕩令人狂荒不可謂人本有荒狂山海經曰觀水多鰩音遙魚其味酸食之已狂越絕書曰慧種生聖癡種生狂桂實生桂桐實生桐禰衡別傳曰衡為鼓吏裸身辱曹操孔融復見操說衡狂疾令求得自謝裴揩別傳曰石崇嘗與裴揩孫綽酣宴而綽慢節過度崇責之揩曰季舒酒狂, WYG: 尰太平御覽卷七百}
