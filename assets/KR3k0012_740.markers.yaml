  - {type: variant, offset: 1919, length: 1, content: 嘗, SBCK: 江紑甫鳩反字含㓗㓜有孝性年十三父蒨患眼紑侍疾將朞月衣不解帶夜夢一僧云患眼者飲慧眼水必差及􅁴􅀃之莫能解者紑第三叔禄與草堂寺智者法師善徃訪之智者曰無量壽經云慧眼見真蒨乃因智者荅捨同夏縣界牛屯里舎爲寺乞賜嘉名勑荅云純臣孝子徃徃感應􅀳時顔含遂見􅁳中送藥近見智者以卿第二息云飲慧眼水慧眼則五眼之一號可以慧眼爲名及就創造泄故井水清冽異於恒泉依夢中取水洗眼及煑藥稍􅁴有瘳因此遂􅏔時人}
  - {type: page-break, offset: 1919, content: '', id: KR3k0012_SBCK_740-4a}
  - {type: variant, offset: 1919, length: 1, content: 嘗, WYG: 齊宿瘤者東郭採桑之女項有大瘤故以名焉閔王出而女採桑如故王召問之對曰受之父母教採桑不教觀王王曰此奇女也取以為后女死後燕遂屠齊跛躄偏枯附方言曰自關西秦晉之間足蹇}
  - {type: variant, offset: 1919, length: 1, content: 嘗, krp: 江紑甫鳩反字含㓗㓜有孝性年十三父蒨患眼紑侍疾將朞月衣不解帶夜夢一僧云患眼者飲慧眼水必差及覺說之莫能解者紑第三叔禄與草堂寺智者法師善徃訪之智者曰無量壽經云慧眼見真蒨乃因智者荅捨同夏縣界牛屯里舎爲寺乞賜嘉名勑荅云純臣孝子徃徃感應晉時顔含遂見冥中送藥近見智者以卿第二息云飲慧眼水慧眼則五眼之一號可以慧眼爲名及就創造泄故井水清冽異於恒泉依夢中取水洗眼及煑藥稍覺有瘳因此遂差時人}
  - {type: variant, offset: 1921, length: 3, content: 周旋人, SBCK: 之孝感又}
