  - {type: variant, offset: 2448, length: 138, content: 海所知足下飲人狂藥責人正禮王韶之始興記曰觀亭峽下有神廟傍巖向江經道不恪者必狂走或變而為虎世說曰阮德如嘗與親友逍遙河側歎曰大丈夫不能使僕從陷於河橋非丈夫也坐者或曰德如以高素致名不應發此言必將病之候俄而性理果僻欲逸走家人嘗以一細繩撗繫之戶前以維之每欲出礙繩輒反時人以為名士狂黃帝八, WYG: ''}
