  - {type: variant, offset: 3908, length: 0, content: '', SBCK: 彼以生爲附贅懸疣以死爲决疣漬癕夫􅀂然者惡知死生先後之所在也太玄經曰割疣贅惡不得大山海經曰單􅀌之山滑水出焉中有滑魚狀如鱓其音如梧食之巳疣又曰旄山有鱃魚狀如鱧食之者不疣瘤釋名曰瘤}
  - {type: variant, offset: 3908, length: 0, content: '', krp: 彼以生爲附贅懸疣以死爲决疣漬癕夫若然者惡知死生先後之所在也太玄經曰割疣贅惡不得大山海經曰單孤之山滑水出焉中有滑魚狀如鱓其音如梧食之巳疣又曰旄山有鱃魚狀如鱧食之者不疣瘤釋名曰瘤}
  - {type: variant, offset: 3909, length: 124, content: 脈並作則為驚怖陽氣獨上則為癲病風俗通曰俗說臥枕戶砌鬼陷其頭令人病癲語林曰王右軍少重患一二年輒發動後荅許掾詩忽復惡中得二十字云取歡仁智樂寄暢山水陰清冷澗下瀨歷落松竹林既醒左右誦之讀竟乃歎曰癲何預盛德事耶圖墓書曰一崗三頭相連無有頭尾狂癲絕世黃帝素問曰人, SBCK: 也聚而}
