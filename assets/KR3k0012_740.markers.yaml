  - {type: variant, offset: 1917, length: 1, content: 傳, SBCK: 費太妃猶停都後於都不豫恢未之知一夜忽夢還侍疾及􅁴憂惶廢寢食俄而信至太妃巳瘳後有目疾乆廢視瞻有道人慧龍得療眼術恢請之及至空中忽見聖僧及慧龍下針豁然開目咸謂精神所致也又}
