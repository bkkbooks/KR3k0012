  - {type: variant, offset: 1909, length: 7, content: 袁愍孫著妙德先, SBCK: 景王嬰孩時有目疾宣王令華陀治之出眼瞳割去疾而内之以藥梁書曰鄱陽王恢有孝性􅀄鎮蜀所}
  - {type: variant, offset: 1909, length: 8, content: 袁愍孫著妙德先生, WYG: 朱齡石舅頭有大瘤齡石伺舅眠密徃刮之舅即死列女}
