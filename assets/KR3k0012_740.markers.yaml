  - {type: variant, offset: 1753, length: 2, content: 君章, SBCK: 與敏善過候敏敏坐繫免官出乃歎曰瘖聾之徒真丗之有道者也何謂察察而遇斯禍也老子曰五音令人耳聾莊子曰耳之與形吾不知其異也而聾者不能自聞淮南子曰土地各以􅀋生水氣多瘖風氣多聾􅀃􅁐曰仲尼曰非其地而樹之不生非其人而語之不聽得其人如聚沙而􅀨之非其人􅀂聚聾而皷之抱朴子曰豹狐之裘不爲􅀒薪施九成六變不爲聾夫設談藪曰後魏中書侍郎裴敬憲字伯茂敬憲新搆山亭與賔客集謂邢子才曰山池始就願爲一名子才曰海中有蓬萊山仙人之所居冝名蓬萊裴聾也敬憲患耳故以戯之憲􅀄不晤於後􅁴忻然謂子才曰長忌及户髙則無憲公但大語聾亦何嫌盲廣雅曰矇瞍瞽盲也方言曰半盲爲睺呼鈎反􅀃文曰盲目無眸也眇一目小也眺目不正也瞎目病也睞童子不正也眄目偏合也青目病主醫音縊也瞍無目也周易履卦曰六三眇能視跛能履象曰眇能視不足以與明也跛能履不足以與行也毛詩臣工有􅎩曰有􅎩有􅎩在周之庭禮記檀弓}
