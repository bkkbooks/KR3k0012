  - {type: variant, offset: 4528, length: 2, content: 顧愷, krp: 趙王倫得異鳥問皆不知名宫西有素衣小兒言是服劉鳥倫使録小兒并鳥置牢室明旦開視並失所在倫目上有瘤時以爲祅焉閉沈約宋書曰朱齡石舅頭有大瘤齡石伺舅眠宻徃割}
  - {type: variant, offset: 4531, length: 1, content: 字, SBCK: 舅即死列女傳曰齊􅀫瘤者東郭採桑之女項有大瘤故以名焉閔王岀而女採桑如故王召問之對曰受之父母教採桑不教觀王王曰此竒女也内以爲后女死後燕遂屠齊跛躄偏枯附方言曰自􅀜西􅁗晉之間凡蹇謂之逴勑略反周易歸妹􅀄九曰歸妹以娣跛能履禮記䘮服四制曰跛者不踊身有痼疾不可備禮也左傳宣公下曰晉侯使郄克㑹于齊傾公帷婦人使觀之郄子登婦人􅀏於房跛而登故􅀏之又穀梁傳成公曰衛孫良夫跛郄克眇聘於齊齊使跛者御跛蕭同叔子處臺􅀏之春秋後語曰􅁗攻趙急求救於齊齊王曰必}
