  - {type: variant, offset: 440, length: 0, content: '', WYG: 元帝字世誠武帝第七子也初武帝夢眇目僧執香爐稱託生王宫既而綵女石氏侍始褰户幔有風迴裙梁武帝意感幸之乃生元帝賜綵女姓曰阮進為修容修容常失珠謂是左右所盗乃炙魚目不知其珠孝元吞之信宿之間珠遂便出一目致𦕈魚之報焉南史曰梁湘東王於江東泛舟顧而言曰今可稱有樂功曹劉源曰帝子降兮北渚王作色曰當道目𦕈𦕈兮愁予即坐者股慄酒叛朝衛又邵枚不可詩賊之因寅根肖之病非啞復非聾相思下雙淚望真有大功後魏書曰祖珽以罪徙於光州别駕張奉禮希大臣意上言班雖為流囚常與刺史對坐𠡠報曰牢掌奉禮曰牢者地牢也乃為深坑置諸内夜中以蕪菁子燭熏眼因此失明異苑曰丹陽多寳寺元嘉中畫佛堂作金剛寺主奴婢惡戯以刀刮其目眼輒見一人甚壯五綵衣持小刀挑目精數夜眼爛於今永盲後越書曰戎陽一目瞽劉曜冦洛水復降曜曜復敗生擒起前石使人罵曰瞎狗何降賊復持瞎來陽曰臣不降即死死則大王那得復見瞎狗前石笑曰瞎狗不足汚刀活之文子曰師曠瞽為太師列子曰宋人有好行仁義者三世不懈家無故黒牛生白犢以問}
