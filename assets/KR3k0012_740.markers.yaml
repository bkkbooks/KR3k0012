  - {type: variant, offset: 1921, length: 3, content: 周旋人, krp: 之孝感又}
  - {type: variant, offset: 1922, length: 1, content: 旋, WYG: 易歸妹初九曰歸妹以婚跛能履禮記喪服四制曰跛者不踊身有瘤疾不可備禮也左𫝊宣公下曰晉侯使郄克㑹于齊頃公集婦}
