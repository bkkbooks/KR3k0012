  - {type: variant, offset: 2035, length: 2, content: 顏延, SBCK: 祖班以罪徙於光州别駕張奉禮希大臣意上言班雖爲流囚常與刺史對坐勑報曰牢掌奉禮曰牢者地牢也乃爲深坑置諸内夜中以蕪青子燭熏眼因此失明異苑曰丹陽多寳寺元嘉中􅀞佛堂作金剛寺主奴婢惡戲以刀刮其目眼輙見一人甚壯五綵衣持小刀挑目精數夜眼爛於今永盲後越書曰戎陽一目瞽劉曜冦洛水復降曜曜敗生擒送前石使人罵曰瞎狗何降賊復持瞎來陽曰臣不降即死死則大王那得復見瞎狗前石􅀏曰瞎狗不足汚刀活}
