  - {type: variant, offset: 49, length: 331, content: 欲以病其身故九窮寥寥然虛曲失其適以害其生也雖有彭祖猶不能為也太公金匱曰丁侯不朝武王乃畫丁侯三旬射之丁侯病大劇使人卜之祟在周恐懼乃遣使者請之於武王願舉國為臣虜武王許之歸為太師尚父謂使曰歸矣吾已告諸神言丁侯前畔義今已遣人來降勿復過也使者辭去歸至丁侯病稍愈四夷聞之皆懼各以其職來貢六韜曰欲伐大國行且有期王寢疾十日不行太公負之而起之曰行已有期君不發天子聞之國亡身死胡不勉之王允焉如無病者說苑曰邴吉有陰德於孝宣帝微時及即位眾莫知亦不言帝將封之會吉病甚將使人加封及其生也太子太傅夏侯勝曰此未死也臣聞有陰德必饗其樂以及子孫病果愈封為愽陽侯世說曰衛玠總角時嘗問樂廣夢樂云是想衛曰神形所不接而夢豈是想曰因也衛思因經日不得遂病樂聞故命駕為剖折之衛病小小而差樂歎曰此兒胸中當必無膏肓病, SBCK: 䏁}
