  - {type: variant, offset: 896, length: 0, content: '', WYG: 董君異以玉屑與盲人服之而愈世説曰顧愷畫殷荆州形殷不許顧曰明府正當嫌眼明㸃童子飛白抑上若輕雲之蔽月又曰桓南郡與殷荆州語次因作危言桓公曰矛頭浙米劔頭炊殷云百嵗老公攀枯枝井上轆轤卧小兒殷有一叅軍云盲人騎瞎馬臨深池殷曰咄咄逼人仲堪𦕈故也法顯記曰祗洹精舍西北四里有榛名曰得眼本有五百盲人依精舍住佛為説法盡還得眼盲人歡喜刺杖著地頭面作禮杖遂生長大世重之無敢伐者遂以得眼為名楚辭九章曰離婁㣲睇瞽以為無明蔡邕瞽師賦曰夫何矇昧坐瞽兮心窮忽以欝慰目冥而無暏兮羌求湏以張志瘖瘂釋名曰瘖唵然無聲也漢書曰韓延夀待下吏恩施甚厚而約誓明或欺負之者延夀自刻責吏聞者自傷悔其縣尉至自刺死及門下掾自剄人救不殊因瘖不能言延夀聞之對掾吏涕泣遣吏醫治視又曰吕后斷戚夫人手足去眼薰耳飲瘖藥呉書曰程普殺叛者數百人皆使投火即日病瘖百餘日卒文子曰臯陶瘖而為士師淮南子曰瘖者可使守圉不可使通語又曰夫大怒破隂大喜墜陽滿氣發瘖驚怖為狂又曰水氣多瘖黄帝素問曰瘖者何病岐伯曰胞之絡脈何以言之胞絡繫於腎少隂脈貫腎繫舌本故不能言續搜神記曰沛國一士人姓周生三兒向應可語便瘂皆七八嵗有一人經門過來乞問主人此是何聲云是僕兒頻生三子皆瘂不能語客曰君冥罪還内省我於外待君主人異其言知非常人便入内思良久而出謂客曰昔為小兒時當牀上有燕巢中有三子其母從外食哺子子輒出頭作聲受之積日如此時屋下攀得其巢試以指内巢中燕子亦出口承之乃取三蒺䔧各與其子吞之既死其母尋還不復見其子出户徘徊悲鳴而去有此事今甚悔之客曰是矣便聞其三兒言語周正異苑曰髙恵清隆安中為太傅主簿忽一日有羣䑕更相啣尾自屋梁相連至地清尋得瘖疾數日而亡露騐記曰王導河内人也兄弟三人並得時疾其宅有鵲巢旦夕翔鳴忽甚諠噪俱惡之念云差當治此鵲既差果張取鵲斷舌而殺之兄弟悉得瘖疾吃説文曰吃言語難也方言云􅟌極吃也或謂之軌或謂之嬰郭璞軋見}
