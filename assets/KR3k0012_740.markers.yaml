  - {type: variant, offset: 5225, length: 139, content: 歲矣似欲聰哲雖蝦不生鯉子此子似人俗為求婦不知所向君為訪之勿怪老癡譽此兒也癇說文曰癇病也續晉陽秋曰大司馬府軍人朱興妻周息男道扶年三歲先得癇病因其病發掘地生埋之為道扶姑雙女所告正周棄市刑徐羨之議曰自然之愛虎狼猶仁周之凶忍宜加顯戮臣以為法律之外故當弘通物之理愚謂可特原母命投之遐裔從之, SBCK: 十}
