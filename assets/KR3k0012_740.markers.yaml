  - {type: variant, offset: 421, length: 1199, content: 王仲祖病劉真長為稱藥荀令則為量水矣又曰孔君平病困庾司空為會稽省之問訊甚至為之流涕孔慨然曰丈夫將終不問安國寧家之術而反作兒女相問庾聞廻還謝之請其語言桓譚新語曰余少時見揚子雲之麗文高論不自量年少新進而猥欲逮及嘗激一事而作小賦用精思大劇而立感病子雲亦言帝上甘泉詔使作賦為文卒暴及倦臥夢其五藏出在地以手收內及覺大少氣病一歲卒王符潛夫論曰夫理世不得真賢譬由治疾不得真藥也治病當得真人參反得羅菔當得麥門冬反得蒸穬麥已而不識真合而服之病以浸劇不自知為人所欺也乃反謂方不誠而藥皆無益於療病因棄後藥弗敢復飲而更求巫覡者雖死可也論衡曰子夏喪明曾子責以有罪按伯牛有疾仲尼以為命也或是喪子數哭因中風耳風俗通曰無恙俗說恙病也凡人相見及書問者曰無疾病邪案上古之時草居野宿恙噬虫也善食人心凡相勞問曰無恙乎非為病也白虎通曰天子疾稱不悆諸侯稱負子大夫稱負薪士稱犬馬不悆者不復預政也負子者諸侯子民今不復子民也負薪犬馬皆謙也楊泉物理論曰凡病可治也人不可治也體羸性弱不堪藥石或剛暴狷急喜怒不節或情慾放縱貪淫嗜食此皆良醫不能加功焉夫君子病也猶可為也必使無病也不可為矣蓋謂節其飲食量其多少也又曰穀氣勝元氣其人肥而不壽元氣勝穀氣其人瘦而壽養性之術常使穀氣少則病不生矣葛洪神仙傳曰茅君治於茅山人有疾病往請福常煮雞子十枚以內帳中須臾茅君皆一二擲雞子還之歸破之皆無復黃者病人當愈若中有土者不愈以為常候雞子如故無開處也漢武故事曰初霍去病微時數自禱神君乃見其形自脩飾欲與去病交接去病不肯神君亦慚及去病疾篤上命為禱神君神君曰霍將軍精氣少壽命不長吾嘗欲以太一精補之可得延年霍將軍不曉此意遂見斷絕今疾必死非可救也去病竟薨西京雜記曰高祖初入咸陽宮周行庫有方鏡廣四尺高五尺九寸表裏有明人疾病在內照揜心則知其病之所在皇甫謐高士傳曰安丘望之病弟子公沙都來看之舉丘於庭樹下安丘曉然有痊開目見雙赤李著枯枝都仰手承李安丘食之所苦盡除皇甫謐自序曰士安每病母輒推燥居濕以複易單何顒別傳曰張仲景過山陽王仲宣謂曰君體有病後年三十當眉落仲宣時年十七以其言貰遠不治後至三十疾果眉落三輔決錄曰趙岐初名嘉年三十餘有重疾臥蓐七年自慮奄忽乃為遺令勑兄子可立一員石於吾墓前刻之曰漢有逸民姓趙名嘉有志無時命也奈何劉楨與曹植書曰明使君始垂憐哀意眷日崇譬之疾乃使炎農分藥岐伯下鍼疾雖未除就沒無恨何者以其天醫至神而榮魄自盡也狂書曰狂恒雨若君行誑妄則常雨順之尚書多方曰周公曰惟聖罔念作狂唯狂克念作聖毛詩曰不見子都乃見狂且又東方未明曰折柳樊圃狂夫瞿瞿論語子路曰不得中行而與之必也狂狷乎狂者進取狷者有所不為也中行行能得中者狂者進取於善道狷者守節無為又子在陳曰歸歟歸歟吾黨之小子狂簡斐然成章不知所以裁之又楚狂接輿歌而過孔子曰鳳兮鳳兮何德之衰往者不可諫來者猶可追已而已而今之從政者殆而國語晉語曰下邑之役董安于多下邑晉邑安于趙簡子家臣趙簡子賞之固辭賞之對曰今臣一旦為狂疾而曰必賞汝言戰鬥為凶事猶人有狂易之疾是以狂疾賞, SBCK: 聾籠}
