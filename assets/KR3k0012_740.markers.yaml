  - {type: variant, offset: 4533, length: 5, content: 康晉陵無錫, SBCK: 安君爲質長安君者太后之小子也太后愛之不肯遣大臣強諌太后怒左師觸龍請見太后曰老臣病足曽不能疾走不得見乆矣􅀼自恐太后體亦所苦也太后曰老婦恃輦而行耳因是太后怒色稍解乃徐說之太后從之又曰趙平原君家樓臨民家民家有躄者盤散行及散音􅃢平原君羙}
