  - {type: variant, offset: 441, length: 0, content: '', WYG: 子孔子曰此吉祥也以薦上帝居一年其父無故而盲牛又復生白犢其子又問孔子孔子曰吉祥也復教以祭居一年其子又盲其末楚攻宋圍城民易子而食析骸而炊丁壯皆乘城戰死者太半父子有疾皆免及圍解而盲疾俱復莊子曰連叔謂肩吾子曰夫瞽者不知文章之觀又曰目之與形吾不知其異也盲者不能自見又曰許由曰夫𦕈者無以與乎眉目顔色之好尹文子曰瞽者無目而耳不可以􅕉察視也精於聴也又曰聾者不歌無以自樂盲者不觀無以接物韓子曰寐則盲者不知覺而使之視則窮矣淮南子曰今夫盲者行於道遇}
  - {type: page-break, offset: 441, content: '', id: KR3k0012_WYG_740-8a, image: WYG0899/WYG0899-0519a.png}
