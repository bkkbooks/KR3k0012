  - {type: variant, offset: 2587, length: 2777, content: 一問曰狂顛之疾何以別荅曰狂之始發少臥少飢自賢自貴妄笑好樂神異經曰西方有人飲食被髮東走其婦追之不止怒亦被髮名曰狂一名顛一名狷一名風此人夫妻與天俱生狂走東西沒晝夜魏武帝令曰昔吾同縣有丁幼陽者其人衣冠良士又學問材器吾愛之後以憂恚得狂病即差愈往來故當共宿止吾常遣歸謂之曰昔狂病儻發作持兵刃我畏汝俱共大笑輒遣不與共宿陽狂周書曰太公曰知與眾同者非人師也大知似狂不癡不狂其名不彰不狂不癡不能成事史記曰箕子紂庶兄也諫紂不聽或曰可以去矣箕子曰為人臣諫不聽而去是彰君惡而自悅民吾不忍為乃被髮陽狂而為奴又曰蒯通說韓信信不從通乃陽狂為巫東觀漢記曰丁鴻讓國於弟盛逃去鴻初與九江人鮑駿同事桓榮甚相友善及鴻亡駿遇於東海陽狂不識駿駿乃止而讓之曰今子以兄弟私恩而絕父不滅之基可謂智乎鴻感愴垂涕歎息乃還就國謝承後漢書曰雷義字仲公舉茂才讓於友陳重刺史不聽義陽狂被髮走不應命晉書曰王衍字夷甫神情明秀風姿詳雅陽駿欲以女妻焉而衍恥之遂陽狂自免又素輕趙王倫之為人及倫篡衍陽狂斫婢以自免王隱晉書曰王長文字德叡廣漢郪人世為郡守少放蕩不羇檢益州五辟公府再辟皆不就陽狂不詣郡縣舉致改服逃出舉州追求乃於成都賣熟布弟見長文蹲踞地嚙胡餅刺史知其不居禮送還家英雄記曰向栩字甫興性卓詭不倫恒讀老子狀如學道又似狂生好被髮著幓頭常於竈北坐板床上如是積久板乃有膝踝足指之處楚國先賢傳曰石偉字公操南郡人仕吳拜光祿大夫吳建威將軍王戎親詣偉太康二年詔以偉為議郎加二千石秩以終厥身偉遂陽狂及盲不受晉華陽國志曰犍為費昭不肯仕公孫述乃漆身為厲陽狂以避之人謂之狂史記曰東方朔人主左右諸郎半呼之狂人人主聞之曰今朔在事無為是行者若等安能及之哉朔行殿中郎謂之曰人皆以先生為狂朔曰若朔等所謂避世於朝廷間者漢書曰酈食其陳留高陽人也沛公略地陳留沛公麾下騎士適食其里中子騎士歸食其謂曰吾聞沛公有大略吾所願從若見沛公謂曰臣里中有酈生人皆謂之狂生自謂我非狂騎士如所戒沛公召之後漢書曰延熹末黨事將作袁閎遂散髮絕世欲投跡深林以母老不宜遠遁乃築土室四周於庭不為戶自牖納飲食而已旦於室中東向拜母母思閎時往就視母去便自掩閉兄弟妻子莫得見也及母歿不為制服設位時莫能名或以為狂生范曄後漢書曰仲長統倜儻不務小節語嘿無常時人謂之狂生南史曰王僧達所為非法坐免官後孝武獨召見慠然了不陳遜唯張目而視及出帝歎曰王僧達非狂如何乃戴面向天子後魏任城王澄傳高肇當朝猜忌賢戚澄為肇間搆常恐不令乃終日昏飲以示荒敗所作詭越時謂為狂唐書曰蘇世長嘗從高祖幸涇陽校獵至高陵合圍是日大獲陳禽獸於旌門高祖入御營顧謂朝臣曰今畋樂乎世長進曰陛下遊獵薄廢萬機不滿十旬未為大樂高祖色變既而笑曰狂態發耶又對曰為臣私計則狂為陛下國計則忠墨子曰周公旦人謂之狂後世稱其德尉繚子曰太公望行年七十屠牛朝歌賣食棘津遇七十餘主不聽人皆曰狂丈夫莊子曰宋桓侯行未出城門其前驅呼避至於家家人止之以為狂也呼避使人避道也家人謂狂止而不聽此乃言聞其所未聞則以為狂也世說曰諸葛厷在西朝少有清譽尤為王夷甫所重時論亦以擬王氏後為繼母族黨所讒論之為狂將遠徙友人王夷甫之儔詣檻與別厷問王曰朝廷何以徙我王曰言卿狂逆厷曰逆則宜殺狂則何所徙繆襲撰仲長統昌言表稱統曰統性俶儻敢言不拘小節每州郡命召輒稱疾不就語默無常時人或謂之狂癲說文曰癲病也莊子曰流脈並作則為驚怖陽氣獨上則為癲病風俗通曰俗說臥枕戶砌鬼陷其頭令人病癲語林曰王右軍少重患一二年輒發動後荅許掾詩忽復惡中得二十字云取歡仁智樂寄暢山水陰清冷澗下瀨歷落松竹林既醒左右誦之讀竟乃歎曰癲何預盛德事耶圖墓書曰一崗三頭相連無有頭尾狂癲絕世黃帝素問曰人生而病癲疾者安得知之岐伯曰此名胎病此得在腹時母大驚氣上下精氣并故令子發癲病范汪秘方曰邪入於陽轉則為癲長安李府君女得癲病募治愈者賞百萬朝那縣卒自言能不敢求錢但願為門下卒服藥即愈祖台之議錢耿殺妻事曰尋建康獄竟囚錢耿癲疾發作毆殺妻了無他變故荒病之人不蒙哀矜之施無知之禮加以大辟之刑懼非古原心定罪之義癡左傳曰晉周子有兄不慧不能辨菽麥蓋所謂白癡也後漢書曰光武見劉盆子曰宗室無𧈪者𧈪癡也魏志曰許褚以勇力常從太祖征伐軍中以楮力如虎而癡故謂之癡虎魏略曰寒貧者本姓石字德林初客三輔關中亂南入漢中後還長安遂癡愚不復識人食不求味冬夏常衣弊布連結衣人問其姓名口不肯言故號之曰寒貧也或往存卹之輒跪拜人復謂其不癡晉書王述字懷祖年三十尚未知名人或謂之癡司徒王導始辟為中軍參軍既見無他言唯問以江東米價述但張目不荅導曰王掾不癡人何言癡也南史曰沈昭略字茂隆性狂儁不事公卿使酒氣無所推下嘗醉晚日負杖攜家賓子弟至婁湖苑逢王景文子約張目視之曰汝是王約耶何乃肥而癡約曰汝沈昭略耶何乃瘦而狂昭略撫掌大笑曰瘦已勝肥狂又勝癡奈何王約奈汝癡何魏志曰明悼毛皇后父嘉本典虞車工卒暴富貴帝令朝臣會其家飲宴其容止舉動甚癡騃語輒自謂侯身時人以為笑晉書曰顧愷之字長康晉陵無錫人尤善丹青嘗以畫一廚糊題其前寄桓玄皆深所珍者玄乃發其廚後竊取畫而緘閉如舊以還之紿云未開愷之見封題如初但失其畫真云妙畫通靈變化而去猶人之登仙了無怪色玄嘗以一柳葉紿之曰此蟬所翳葉也取以自蔽人不見己愷之喜引以自蔽玄就溺焉愷之嘗在桓溫府嘗云愷之體中癡黠各半而論之正得其平耳故俗傳愷之有三絕才絕癡絕畫絕後魏書曰太祖謂尚書崔玄伯曰蠕蠕而蠢反之民昔來號為頑囂每來抄掠駕㹀牛奔遁驅犍牛隨之㹀牛伏不能前異部人教其以犍牛易之者蠕蠕曰其母尚不能行而況其子終於不易遂為敵所虜隋書曰楊玄感司徒素之子也體皃容偉美鬚髯少時晚成人多謂之癡其父每謂所親曰此兒不癡也及長好讀書便騎射以父軍功位至柱國唐書曰竇威家世勳貴諸昆弟並尚武藝而威躭玩文史介然自守諸兄哂之謂為書癡又曰雜端御史最為雄劇食坐之南設一橫榻謂之南床殿中監察不得坐其榻亦謂之癡床言處其上者皆驕慠自得使人如癡故謂之癡床又曰李益與李賀齊名然少有癡病而多猜忌防閑妻妾過為苛酷而有散灰扃戶之譚時謂妬癡風俗通曰夜糴俗說市買者當清旦而行日中交易所有夕時便罷今乃夜糴明其癡騃不足郭子曰王長史求東陽王蒙字仲祖撫軍不肯用晉太宗簡文皇帝先為撫軍大將軍王後疾篤臨終撫軍哀歎曰吾將負仲祖於此乃命用之長史曰人言會稽王癡真癡也會稽王簡文先封世說曰任育字長年少時甚有令名自過江便失志下飲人問云此為茶為茗覺有怪色乃自中名云向問飲為熱為冷嘗行從棺底下流度涕而悲王丞相聞之曰此是有情癡應璩新論曰漢末桓帝時郎有馬子侯自謂識音律請客鳴笙竽為作陌上桑反言鳳將鶵左右偽稱善亦復自搖頭馬子侯為人頗癡自謂曉音律黃門樂人更往嗤誚子知不知名陌上桑反言鳳將鶵搖頭忻喜賜左右錢帛無復慚也虞翻書曰此中小兒年四歲矣似欲聰哲雖蝦不生鯉子此子似人俗為求婦不知所向君為訪之勿怪老癡譽此兒也癇說文曰癇病也續晉陽秋曰大司馬府軍人朱興妻周息男道扶年三歲先得癇病因其病發掘地生埋之為道扶姑雙女所告正周棄市刑徐羨之議曰自然之愛虎狼猶仁周之凶忍宜加顯戮臣以為法律之外故當弘通物之理愚謂可特原母命投之遐裔從之, WYG: ''}
