  - {type: punctuation, offset: 2748, content: 『, id: KR3k0012_CHANT_740-bkkpn884}
  - {type: variant, offset: 2748, length: 439, content: 知與眾同者非人師也大知似狂不癡不狂其名不彰不狂不癡不能成事史記曰箕子紂庶兄也諫紂不聽或曰可以去矣箕子曰為人臣諫不聽而去是彰君惡而自悅民吾不忍為乃被髮陽狂而為奴又曰蒯通說韓信信不從通乃陽狂為巫東觀漢記曰丁鴻讓國於弟盛逃去鴻初與九江人鮑駿同事桓榮甚相友善及鴻亡駿遇於東海陽狂不識駿駿乃止而讓之曰今子以兄弟私恩而絕父不滅之基可謂智乎鴻感愴垂涕歎息乃還就國謝承後漢書曰雷義字仲公舉茂才讓於友陳重刺史不聽義陽狂被髮走不應命晉書曰王衍字夷甫神情明秀風姿詳雅陽駿欲以女妻焉而衍恥之遂陽狂自免又素輕趙王倫之為人及倫篡衍陽狂斫婢以自免王隱晉書曰王長文字德叡廣漢郪人世為郡守少放蕩不羇檢益州五辟公府再辟皆不就陽狂不詣郡縣舉致改服逃出舉州追求乃於成都賣熟布弟見長文蹲踞地嚙胡餅刺史知其不居禮送還家英雄記曰向栩字甫興性卓詭不倫恒讀老子狀如學道又似狂生好被髮著幓頭常於竈北坐板床上如是積久板乃有膝踝足指之處楚國先賢傳曰石偉字公操南郡人仕吳拜光祿大夫吳建威將軍王戎親詣偉太康二年詔以偉為議郎加二千石秩以終厥, SBCK: 癭瘤瘍􅦤爲}
