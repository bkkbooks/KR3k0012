  - {type: variant, offset: 2177, length: 1, content: 谷, SBCK: 今夫盲者行於道遇君子則易道遇小人則䧟於溝壑桓譚新論曰余爲典樂大夫得樂家記言文帝時得魏文侯時樂人竇公年百八十歲兩目皆盲帝問其何服食至此對曰臣年十三失明父母教爲樂皷琴不導引不知壽得若何余以爲竇公少盲專一内視故拘扑子曰魏武收左慈慈走入市吏傳言慈一目眇葛巾單衣於是一市皆然也又曰董君異以玉醴與盲人服之而愈丗􅀃曰頋愷􅀞殷荆州形殷不許頋曰明府正當嫌眼耳明􅀧童子飛白拂上􅀂輕雲之蔽月又曰桓南郡與殷荆州語次因作危言桓公曰予頭浙米劒頭炊殷云百歲老公攀枯枝井上轆轤卧小兒殷有一叅軍云盲人􅀐瞎馬臨深池殷曰咄咄逼人仲堪眇故也法顯記曰祗洹精舎西北四里有榛名曰得眼本有五百盲人依精舎住佛爲􅀃法盡還得眼盲人歡喜刺杖着地頭靣作禮杖遂生長大丗重之無敢伐者遂以得眼爲名楚辭九章曰離婁微睇瞽以爲無明蔡邕瞽師賦曰夫何矇昧坐瞽兮心窮忽以欎伊目􅁳而無睹兮羗永煩以悲愁瘖啞釋名曰云瘖唵也唵然無聲也漢書曰韓延夀待下吏恩施甚厚而約誓明或欺􅀒之者延壽自刻責吏聞者自傷悔其縣尉至自刺死及門下􅁺自剄人救不死因瘖不能言延夀聞之對􅁺吏涕泣遣吏醫治又曰吕右斷戚夫人手足去眼董耳飲瘖藥吴書曰程普殺叛者數百人皆使投火即日病瘖百餘日卒文子曰臯陶瘖而爲士師淮南子曰瘖者可使守圉不可使通語又曰夫人大怒破隂大喜墜陽滿}
