  - {type: variant, offset: 1909, length: 7, content: 袁愍孫著妙德先, krp: 景王嬰孩時有目疾宣王令華陀治之出眼瞳割去疾而内之以藥梁書曰鄱陽王恢有孝性𥘉鎮蜀所}
