  - {type: variant, offset: 2192, length: 2, content: 憂聖, SBCK: 巾如今半幘而巳王莽乃始施巾故語曰王頭秃幘施屋􅁗書曰符堅徴隱士張臣和至長安堅賜以衣冠和辭曰年老頭秃不可加冠野服而入旣見求歸矣􅙄釋名曰鼻塞曰􅙄晉書曰謝安字安石本能爲洛下書生詠有鼻疾故其音濁名流愛其詠而不能及或手掩鼻以斆之也崔鴻春秋後趙録曰王謨字思賢􅙄鼻言不清暢尫短無威儀將拜曲陽令石勒疑之長史曰請試之政教嚴明百城尤最幽明録曰晉司空桓豁在荆州有叅軍教鸜鵒令語遂無所不名當大㑹令効}
