  - {type: variant, offset: 2815, length: 7, content: 香出蒼梧桂林二, SBCK: 則青珠黄連拳栢决明蓯蓉鹿茸漏蘆松榮痊痾則年永練質則翰生謝靈運山居賦曰本草所載山澤不一雷桐是別和緩是悉三枝六根五華九實樂府歌詩曰仙人􅀐白鹿髮短耳何長道我奉上藥覽之􅀗無疆來到主人門奉藥一玉箱主人服此藥身體日康強髮白復還黒延年壽命長魏文帝詩曰西山何如髙髙髙殊無極上有兩仙童不飲亦不食與我一丸藥光耀有五色服藥四五日身體生羽翼應劭表曰臣劭言}
