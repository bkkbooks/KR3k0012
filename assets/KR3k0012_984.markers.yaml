  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 一藥歸藏經曰昔常娥以不死之藥奔月易曰無妄之疾勿藥有喜象曰無妄之藥不可試也書曰􅀂藥弗􅉂眩厥疾弗瘳周禮曰醫師掌聚藥供醫事疾醫以五藥飬病凡藥以酸飬骨以辛飬筯以鹹飬脉以苦飬氣以甘養􅁏以滑飬竅鄭􅀇注曰毒藥之辛苦者也五藥草木䖝石榖禮記曰君有疾飲藥臣先甞之親有疾飲藥子先甞之甞者度所堪也醫不}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 一藥歸藏經曰昔嫦娥盗不死之藥奔月易曰旡妄之疾勿藥有喜象曰旡妄之藥不可試也書曰若藥弗瞑眩厥疾弗瘳周禮曰醫師掌聚毒藥以供醫事疾醫以五藥養病凡藥以酸養骨以辛養筋以鹹養脉以苦養氣以甘養肉以滑養竅鄭𤣥注曰毒藥之辛苦者也五藥草木䖝石榖禮記曰君有疾飲藥臣先嘗之親有疾飲藥子先嘗之醫不}
