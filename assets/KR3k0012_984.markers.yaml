  - {type: variant, offset: 934, length: 3, content: 含致仁, SBCK: 孝武皇帝好方士敬􅀑神使人求神僊不死之藥甚至􅀄無所得天下方士四靣鋒至不可勝言東方朔睹方士虚語以求尊顯即云上天欲以喻之其辭曰陛下所使取神藥者皆天地之間藥也不能使人不死不獨天上藥能使人不死耳上曰然天何可上也朔對曰臣能上天上知其謾詫陁後二音極其語即使朔上天取不死之藥朔旣辭去出殿門復}
  - {type: page-break, offset: 934, content: '', id: KR3k0012_SBCK_984-7a}
  - {type: variant, offset: 934, length: 3, content: 含致仁, WYG: 韓康字伯休京兆霸陵人採藥名山賣於長安市口不二價三十餘年時有女子從康買藥康價不移女子怒曰公是韓伯休耶乃不二價也康歎曰我本避名今女子皆知我又何用藥為乃避入覇陵山中魯世女生别傳曰封君逹隴西人也少好道初服黄連丸五十餘年乃入鳥䑕山又于山中服水銀百餘年}
  - {type: variant, offset: 934, length: 3, content: 含致仁, krp: 孝武皇帝好方士敬鬼神使人求神僊不死之藥甚至𥘉無所得天下方士四靣鋒至不可勝言東方朔睹方士虚語以求尊顯即云上天欲以喻之其辭曰陛下所使取神藥者皆天地之間藥也不能使人不死不獨天上藥能使人不死耳上曰然天何可上也朔對曰臣能上天上知其謾詫陁後二音極其語即使朔上天取不死之藥朔旣辭去出殿門復}
  - {type: variant, offset: 938, length: 1, content: 家, SBCK: 曰今臣上天似謾詫者願得一人爲信驗上即遣方士與朔俱徃期三十日而反朔等旣辭而行日日過諸侯傳飲徃徃留十餘日期又且盡無上天意方士謂之曰期且盡日日飲酒爲奈何朔曰􅀑神之事難豫言當有神來迎我者於是方士晝卧良乆朔遽覺之曰呼君極乆不應我今者屬從天上來方士大驚還具以聞上以爲面欺詔下朔獄朔啼對曰朔湏幾死者再上曰何也朔對曰天公問臣下方人何衣臣朔曰衣䖝䖝何若臣朔曰䖝喙髯髯􅀋馬邠邠􅀋虎天公大怒以臣爲􅓽言繫臣使下問還報有之名蚕天公乃出臣今陛下苟以臣爲詐願使人上問之上大驚曰善齊人多詐欲以喻我止方士也罷諸方士弗復用也由此朔日以親近列僊傳曰樂子長者齊人也少好道真到霍林山遭僊人受服巨勝赤松散方僊人告之曰虵服此藥化爲龍人服此藥老翁成童能昇雲上下改易形容崇氣益精起死飬生子能服之可以度丗子長服之年百八十色如少女妻子九人皆服此藥老者還少少者不復老又曰燕王遣韓終採藥王先使韓終服之面如金色又曰安期生賣藥海邊時人以爲千歳公又曰瑕丘仲賣藥於寗後地動舎壞仲死人取屍弃水収其藥賣之仲􅀍裏誚之後爲失余使者又曰崔文子太山人賣藥都市後有疫死者萬計文子擁朱幡持黄散循問民服其散愈者萬計後在蜀賣黄散赤丸丗故寳之又曰􅀒局先生者語似燕代間人也􅀒磨鏡局循吴帝市中磨一鏡一錢因磨輙問主得無人疾苦者有輙出紫丸藥以與之得莫不愈後上吴山絶崖頭丗丗懸藥與下人曰吾欲還蓬莱山與汝曹神水崖頭一旦有水白色從石間來下服之病多愈髙士傳曰韓康字伯休京兆覇陵人採藥名山賣於長安市口不二價三十餘年時有女子從康買藥康價不移女子怒曰公是韓伯休郍乃不二價也康歎曰我本避名今女子皆知有我何用藥爲乃遯入覇陵山中魯女生別傳曰封君逹隴西人也少好道􅀄服黃連丸五十餘年乃入鳥䑕山又於山中服水銀百餘年還鄊里年如二十者常乗青牛故號爲青牛道士桂陽先賢􅀞讃曰􅂫眈甞除門}
  - {type: page-break, offset: 938, content: '', id: KR3k0012_SBCK_984-7b}
