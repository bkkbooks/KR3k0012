  - {type: variant, offset: 940, length: 0, content: '', krp: 有衆賔来耽告母曰人招耽去已種藥着後園梅樹下可治百病一葉愈一人賣此藥過足供飬便隨賔去母走牽之四體如醉足不能舉邴原別傳曰魏太子爲五官}
  - {type: variant, offset: 941, length: 0, content: '', SBCK: 郎􅀅原爲長史太子讌㑹衆賔百數十人太子建議曰君父各有篤疾有藥一丸可救一人當救君耶父耶衆人紛然或君或父時原在坐不與此論太子諮之於原原悖然對曰父太子亦不復難曹毗杜蘭香傳曰神女蘭香降張碩碩問壽如何香曰消磨自可愈疾􅁋祀無益香以藥消磨王子年拾遺録曰燕昭王坐祇明之室晝而假寐}
  - {type: variant, offset: 941, length: 1, content: 忽, WYG: 郎将原為長史太子讌㑹衆賔客數十人太子建議曰君父各有篤疾有藥一丸可救一人當救君耶父耶衆人紛然或君或父時原在位不與此論太子諮之于原原悖然對曰父太子亦不復難曹毗杜蘭香傳曰神女蘭香降張碩問禱祀如何香曰消摩}
  - {type: page-break, offset: 941, content: '', id: KR3k0012_WYG_984-14a, image: WYG0901/WYG0901-0630a.png}
  - {type: variant, offset: 941, length: 0, content: '', krp: 郎将原爲長史太子讌㑹衆賔百數十人太子建議曰君父各有篤疾有藥一丸可救一人當救君耶父耶衆人紛然或君或父時原在坐不與此論太子諮之於原原悖然對曰父太子亦不復難曹毗杜蘭香傳曰神女蘭香降張碩碩問壽如何香曰消磨自可愈疾淫祀無益香以藥消磨王子年拾遺録曰燕昭王坐祇明之室晝而假寐}
  - {type: variant, offset: 942, length: 1, content: 自, SBCK: 夣西方有白雲蓊蔚而起俄而闇於庭間有人衣服皆毛羽駕蒼螭之車從雲中而出直詣王所王夣中與語問以上僊之術羽人曰大王精智未開欲求恒}
