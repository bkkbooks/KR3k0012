  - {type: variant, offset: 18, length: 160, content: 登於歷山之陽仰眺崇巒俯視幽坂乃覩槐香生蒙楚之間曾見斯草殖於廣夏之庭或披帝王之圃怪其遐棄遂遷樹于中唐華麗則殊彩阿郍芳實則可以藏書又感其棄本高崖委身階庭似傳說顯殷四叟歸漢故因實制名蒙蒙綠葉搖搖弱莖蘭香易曰同心之言其臭如蘭蘭芳也易卦通驗曰冬至廣莫風至蘭始生說文曰蘭香草也韓詩曰溱與洧說文云詩人言溱與洧方盛流洹洹然謂三月桃花水下, SBCK: 聚蓄百藥蕃蕪}
  - {type: variant, offset: 18, length: 247, content: 登於歷山之陽仰眺崇巒俯視幽坂乃覩槐香生蒙楚之間曾見斯草殖於廣夏之庭或披帝王之圃怪其遐棄遂遷樹于中唐華麗則殊彩阿郍芳實則可以藏書又感其棄本高崖委身階庭似傳說顯殷四叟歸漢故因實制名蒙蒙綠葉搖搖弱莖蘭香易曰同心之言其臭如蘭蘭芳也易卦通驗曰冬至廣莫風至蘭始生說文曰蘭香草也韓詩曰溱與洧說文云詩人言溱與洧方盛流洹洹然謂三月桃花水下之時士與女方盛流秉蘭兮秉執也蘭簡也當此盛流之時眾姓與眾女方執蘭而拂除鄭國之俗三月上巳之日此兩水之上招魂續魄拂除不祥大戴禮夏小正曰五月蓄蘭為沐浴禮曰婦人或賜之茞蘭則受而獻諸舅姑, WYG: 聚畜百藥}
