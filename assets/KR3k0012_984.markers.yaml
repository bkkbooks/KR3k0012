  - {type: variant, offset: 2808, length: 0, content: '', SBCK: 藥草山山中有紫陽觀丗傳神農於此辨百藥也飬生略要曰神農經曰五味飬精神強魂魄五石飬髓肌􅁏肥澤諸藥其味酸者􅀘肝飬心除腎病其味苦者􅀘心飬痺除肝病其味甘者􅀘脾飬肺除心病其味辛者􅀘肺飬腎除脾病其味鹹者􅀘腎飬肺除肝病故五味應五行四體應四時夫人性生於四時然後命於五行以一􅀘身不死命神以母飬子長生延年以子守母除病䆒年嶺表録異曰廣之屬郡及郷里之間多蓄蟲彼之人悉能驗之以草藥治之十得其七八藥則}
  - {type: page-break, offset: 2808, content: '', id: KR3k0012_SBCK_984-10a}
  - {type: variant, offset: 2808, length: 3, content: 金杜香, WYG: 藥草山山中有紫陽觀世傳神農于此辨百藥也養生畧要曰神農經曰五味養精神强䰟魄五石養髓肌肉肥澤諸藥其味酸者補肝養心除腎病其味苦者補心養痺除肝病其味甘者補肺養痺除心病其味辛者補肺養腎除痺病其味鹹者補腎養肺除肝病故五味應五行四體應四時夫人性生于四時然後命于五行以一補身不死命神以母養子長生延年以子守母除病究年嶺表録異曰廣之屬郡及鄉里之間多畜蠱彼之人悉能驗之以草藥治之十得七八藥則僉釵肥形如石斛古漏子食之能即吐肝漆濃汁煎吃陳家白藥子}
