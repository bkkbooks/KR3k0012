  - {type: variant, offset: 1936, length: 180, content: 名香草也廣雅曰白芷葉謂之藥淮南子曰今鼓舞者便媚擬神擬象也身若秋藥被風藥白芷香草被風言其弱髮若結旌屈而復舒范子計然曰白芷出齊郡以春取黃澤者善也本草經曰白芷一名芳香味辛溫生河東吳氏本草曰白芷一名𧄤許嬌切一名符離一名澤分一名葩楚辭曰獻歲發春兮汨吾南征綠蘋葉齊兮白芷生又曰桂楝兮蘭撩辛夷楣兮藥房又曰掔木根以結芷兮掔持也貫薜荔之落蘂貫抬也薜荔香草蕊實也佩結香香拾其花心次, SBCK: 􅀃粲在荆州從劉}
