  - {type: variant, offset: 907, length: 1, content: 毛, krp: 良醫醫病病万變藥亦万變病變而藥不變嚮之壽民今爲殤子矣又曰若用藥者得良藥則活人得惡藥則殺人義兵之爲天下良藥也亦大矣論衡曰大王亶父睹王季之可立故易名曰歴歴者適也大}
  - {type: variant, offset: 909, length: 3, content: 成既負, SBCK: 覺悟採藥以避王季山海經曰大荒之中有黄木赤枝青葉群帝取藥言樹花實皆爲藥也又曰大荒中有山名豐阻玉門日月所入有靈山巫咸巫昉巫即巫盼巫彭巫姑巫真巫祀巫謝巫羅十巫從此升降百藥爰在酈善長注水經曰茷山甚嵒峻重疊灌栢齊隂攅柯翠峙泉石轉深盖仙居之􅀫所是以丗人目巖爲擣藥巖名此水爲擣藥水漢武内傳曰王母謂武帝曰太上之藥乃有􅀇光􅀺角風實雲子帝園王族昌城王蘂夜河天骨崆峒靈􅀲四刧一實寘陵驎膽仰掇扶桑之丹椹俯採長河之文藻紫虬童子九色鳯腦太真虹芝天漢臣草南宫大碧西郷扶老三梁龍華生子大道有得食之後天而老此太上之所服非中山之所寳也又曰武帝崩遺詔以􅄂道書四十卷置棺中到延康二年河東工曹李及入上黨抱犢山採藥於巖室中得此書盛以金箱}
  - {type: page-break, offset: 909, content: '', id: KR3k0012_SBCK_984-6b}
  - {type: variant, offset: 909, length: 3, content: 成既負, krp: 覺悟採藥以避王季山海經曰大荒之中有黄木赤枝青葉群帝取藥言樹花實皆爲藥也又曰大荒中有山名豐阻玉門日月所入有靈山巫咸巫昉巫即巫盼巫彭巫姑巫真巫祀巫謝巫羅十巫從此升降百藥爰在酈善長注水經曰茷山甚嵒峻重疊灌栢齊隂攅柯翠峙泉石轉深盖仙居之宿所是以丗人目巖爲擣藥巖名此水爲擣藥水漢武内傳曰王母謂武帝曰太上之藥乃有玄光黎角風實雲子帝園王族昌城王蘂夜河天骨崆峒靈瓜四刧一實寘陵驎膽仰掇扶桑之丹椹俯採長河之文藻紫虬童子九色鳯腦太真虹芝天漢臣草南宫大碧西郷扶老三梁龍華生子大道有得食之後天而老此太上之所服非中山之所寳也又曰武帝崩遺詔以雜道書四十卷置棺中到延康二年河東工曹李及入上黨抱犢山採藥於巖室中得此書盛以金箱}
  - {type: variant, offset: 913, length: 18, content: 才器常稱寧為蘭摧玉折不作蕭芳茇榮羅含, SBCK: 書後題臣姓名記日月是武帝時物也河東太守張純以箱及書奏宣帝宣帝示武帝時左右侍臣有典書中郎見書流涕曰此是帝崩時殯殮物也東方朔}
