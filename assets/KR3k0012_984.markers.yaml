  - {type: variant, offset: 2199, length: 162, content: 海經曰浮山有草焉麻葉而方莖赤華而黑實臭如麋無名曰薰草也廣雅曰鹵薰也其葉謂之惠魏略曰大秦出薰草蘇子曰象以牙喪身不能去其白薰以芳自燒不能去其香淮南子曰以潔白為汙辱譬猶沐浴而杼溷薰燧而負彘燒薰自香楚人謂之薰燧也抱朴子曰常以執日取天井上土以和柏葉薰草以泥門戶方一尺則盜賊不來西京雜記曰漢掖庭有綠熊席其席皆長一丈餘眠而擁毛自蔽望其不能, SBCK: ''}
