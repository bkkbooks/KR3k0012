  - {type: variant, offset: 2813, length: 1, content: 蘪, WYG: 吉利本梧州陳氏有此藥是善攻蠱毒有中者即求之前後救人多矣遂以為名今封康州有得其種者廣府毎嵗常為土貢焉諸解毒藥功力皆不及陳家白藥王彪之閩中賦曰藥}
