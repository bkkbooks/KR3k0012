  - {type: variant, offset: 1676, length: 258, content: 草間行貌姍音蘇寒切窣蘇骨切上金隄䔾車爾雅曰䔾車䒗音乞輿也郭璞曰䔾車香草也見離騷說文曰䔾䔾輿也䔾音乞廣志曰䔾車黃葉白華出徐州楚辭曰畦留夷與䔾車雜杜蘅與芳芷杜蘅山海經曰天帝之山有草焉其狀如葵臭如蘪蕪名杜蘅香草也可以走馬郭璞曰帶之令人便或曰馬得之而健走食之而癭爾雅曰杜土鹵也郭璞曰杜衡也似葵而香也唐書曰貞觀中度支郎以宋謝朓詩云芳洲多杜若乃下坊州令貢州判司報云坊州不出杜若應由謝朓詩誤太宗聞之大笑判司改雍州司法度支郎免官廣雅曰杜蘅杜若也范子計然曰杜若出南郡漢中大者善本草經曰杜若一名杜衡白芷山海經曰號山其草多藥郭璞注曰藥白芷, SBCK: 􅀋此}
