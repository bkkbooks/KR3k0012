  - {type: variant, offset: 632, length: 0, content: '', WYG: 以自銷損又曰豫章王嶷薨後見形于沈文季曰吾未應死皇太子加膏中十一種藥使我癰不瘥湯中復加藥一種使我利不㫁吾已訴之先帝先帝許還東邸當判此事因胷中出青紙文書示文季曰與卿少舊因卿呈主上俄失所在文季秘}
