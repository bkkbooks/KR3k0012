  - {type: variant, offset: 362, length: 1, content: 冬, SBCK: 長桑君與扁鵲藥服之三十日見人五藏漢書曰灌夫擊吴身中大創十餘適有萬金良藥故得不死又曰王嘉爲丞相數上封事言不冝封董賢上怒有詔假謁者節召丞相詣廷尉詔獄使者旣到府􅁺史涕泣共和藥進嘉嘉引藥盃以擊地謂官屬曰丞相幸得備位三公奉職有罪當伏刑都市以示萬衆丞相豈兒女耶何爲咀藥而死東觀漢記曰上甞與朱祐共買􅁡合藥上追念之即賜祐白􅁡一石問何如長安時共買􅁡乎又曰鄧訓爲護烏桓校尉吏士常大病瘧轉易}
