  - {type: variant, offset: 630, length: 1, content: 莫, WYG: 劉寄奴所射合藥傅之帝曰神何不殺之童子曰寄奴王者不死不可殺帝叱之皆散乃收藥而反又客經下邳逆旅㑹一沙門謂帝曰江表將亂能安之者其在君乎帝先患手瘡經年不愈沙門有黄藥因留與帝既而忽亡帝以黄散傅瘡一傅而愈寶其餘及所得童子藥毎遇生瘡傅之並愈南史曰南郡王子隆年二十一而體過充壯常使徐嗣伯合蘆茄丸}
  - {type: page-break, offset: 630, content: '', id: KR3k0012_WYG_984-5a, image: WYG0901/WYG0901-0625c.png}
