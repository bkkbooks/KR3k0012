  - {type: variant, offset: 777, length: 1, content: 鼻, SBCK: 身安命延昇天神仙遨遊上下役使萬靈體生毛羽行厨立至又曰五芝及餌丹砂玉札曽青雄黄雲母太一禹餘粮各可單服之皆令人飛行長生又曰中藥飬性不藥除病能令毒蟲不加猛獸不死惡氣不行衆祅辟屏孝經援神契曰椒薑禦濕菖蒲益聦巨勝延年威喜辟兵此皆上聖之至言方術之實録也又曰仙藥之上者丹砂次則黄金次則白銀次則諸芝次則五玉次則五雲次則明珠次則太一禹餘粮次則石中黄子次則石桂英次則石腦次則石流丹次則石􅏁次則曽青次則松栢脂茯苓地黄麦門冬术巨勝重樓黄連石韋柠石家紫一名托盧是也或名仙人杖或名西王母杖或名天精或名却老或名地骨或名枸􅂎也􅀾國䇿曰有獻不死之藥於荆王者謁者操以入中射之士問曰可食乎曰可因奪而食之王怒使人殺中射之士士曰臣問謁者謁者曰可食臣故食之是臣}
