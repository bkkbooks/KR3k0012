  - {type: variant, offset: 629, length: 0, content: '', WYG: 疑抗有疾祐饋之藥抗亦推心服之南史曰髙祖㣲時伐荻新洲見大蛇長數丈射傷之明日洲中聞臼杵聲往視之見童子數人皆青衣于樁中擣藥問其故曰我王}
