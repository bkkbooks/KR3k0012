  - {type: variant, offset: 984, length: 0, content: '', WYG: 仙之術羽人曰大王精智未開欲求常生不可得也王請受絶慾之教羽人指畫王心應手而裂王乃驚悟因患心疾乆之乃昇于泉照之館復見其前所夢人曰前日本欲易王之心乃出方寸緑囊囊中有續脉明丸補血精散其細若灰以手摩王之臆俄而即愈王因請其方曰其用物也有九名神明芝煎以蒼鷹之血黑河鱗膽煑以崐嶼之脂貯以玉璽緘以金繩封以玉印王得服之後天而死若溺于滛嗜于慾求者秪苦心焉語畢化為青鳬入天際王求合藥終不能成黑河北極也其}
