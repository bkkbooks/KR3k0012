  - {type: variant, offset: 472, length: 1, content: 淑, krp: 反又客經下邳逆旅㑹一沙門謂帝曰江表當亂能安之者其在君乎帝先患手瘡經年}
  - {type: variant, offset: 474, length: 5, content: 為改意由是, SBCK: 愈沙門有黄藥因留與帝旣而忽亡帝以黄散傳瘡一傅而愈寳其餘及所得童子藥毎遇金瘡傅之並愈齊書曰隨郡王子隆年二十一而體過充壯常使徐嗣伯合藘茹丸服以自銷損又曰䂊章王嶷薨後見形於沈文季曰我未應死皇太子加膏中十一種藥使我癰不差湯中復加藥一種使利不断吾已訴先帝先帝許還東邸當判此事因􅇩中出青􅁓文書示文季曰與卿少舊因卿呈主上俄失所在文季袐而不傳甚懼此事少時太子薨矣魏書曰邢巒爲侍郞甚見親遇髙祖因行藥園至司空府南見巒宅遣使謂巒曰朝行藥園至此見卿第宅乃佳東望徳舘情有依然又曰天竺烏長國婆羅門爲上族解天文人有争訟服之藥曲者發狂直者無恙隋書曰隋}
