  - {type: variant, offset: 834, length: 1, content: 芳, WYG: 可以為全者矣又曰良醫醫病病萬變藥亦萬變病變而藥不變嚮之夀民今為殤子矣又曰若用藥者得良藥則活人得惡藥則殺人義兵之為天下良藥也亦大矣論衡曰太王亶父睹王季之可立故易名曰歴歴者適也太伯覺悟採藥以避王季山海經曰大荒之中有黄木赤枝青葉羣帝取藥又曰大荒有山名豊阻玉門日月所入有靈山巫咸巫昉巫即巫盼巫彭巫姑巫眞巫祀巫謝巫羅十巫從此升降百藥爰在酈善良註水經曰茷山甚嵒峻重疊淮栢齊隂攢柯峙泉水石轉深蓋羣仙居宿之所是以世人目巖為𢷬藥巖名此水為𢷬藥水漢武内傳曰王母謂武帝曰太上之藥乃有風實雲子玊津金漿冥陵驎膽炎山夜日東掇扶桑之丹椹俯採長河之文藻大真紅芝九色鳯腦有得食之後天而老此太上之所服非衆仙之所寶也次藥有斑龍黒胎閬風石髓蒙山白鳯之胏靈丘蒼鸞之血有得服之後天而逝此天帝之所服非下仙之所逮也又曰武帝崩遺詔以雜道書四十卷置棺中到延康二年河東工曹李及入上黨抱犢出採藥于巖窟中得此書盛以金箱其書後題臣姓名記日月是武帝時物也河東太守張純以箱及書奏獻宣帝帝示武帝時左右侍臣有典書中郎見書流涕曰此是帝崩時殯殮物也東方朔别傳曰孝武皇帝好方士敬鬼神使人求神仙不死之藥甚至初無所得天下方士四面蜂至不可勝言東方朔諳方士虛語以求尊顯即云上天欲以喻之其辭曰陛下所使取神藥者皆天地之間藥也不能使人不死獨天上藥能使人不死耳上曰然天何可上也朔對曰臣能上天上知謾􅑲極其語即使朔上天取其不死之藥朔既辭去出殿門復還曰今臣上天若謾詫者願得一人為信驗上即遣方士與朔俱往期三十日而反朔等既辭而行日日過諸侯傳飲往往留十餘日期又且盡無上天意方士謂之曰期且盡日日飲酒為奈何朔曰鬼神之事難預言當有神來迎我者于是方士晝卧良乆朔遽覺之曰呼}
