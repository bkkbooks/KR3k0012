  - {type: variant, offset: 940, length: 0, content: '', SBCK: 有衆賔来耽告母曰人招耽去已種藥着後園梅樹下可治百病一葉愈一人賣此藥過足供飬便隨賔去母走牽之四體如醉足不能舉邴原別傳曰魏太子爲五官}
  - {type: variant, offset: 940, length: 0, content: '', WYG: 有衆賔來招耽吿母曰人招耽去已種藥在後園梅樹下可治百病一葉愈一人賣此藥過足供養矣便隨賔去母捉牽之四體如醉足不能舉邴原别傳曰魏太子為五官}
