  - {type: variant, offset: 1019, length: 454, content: 名水香久服益氣輕身不老楚辭曰余既滋蘭之九畹兮滋蒔也二十畝為畹又曰扈江離與辟芷兮扈被也楚人名披曰扈離薜芷皆香草名也紉秋蘭以為佩紉細又曰沅有芷澧有蘭言沅水之中有盛茂之芷禮水之中有芬芳之蘭喻湘夫人美好亦異於眾人也欲思公子未敢言又曰秋蘭兮蘪蕪羅生兮堂下綠葉兮素枝芳菲兮襲子秋蘭兮青青綠葉兮紫莖滿堂兮美人忽獨與余兮目成又曰光風轉蕙泛崇蘭趙壹疾邪賦曰勢家多所宜欬唾自成珠被褐懷珠玉蘭蕙化為芻張衡怨詩曰秋蘭嘉美人也嘉而不獲用故作是詩也猗猗秋蘭植彼中阿有馥其芳有黃其葩雖曰幽深厥美彌嘉之子之遠我勞如何酈炎詩曰靈芝生河洲動搖回洪波秋蘭榮何晚嚴霜害其柯哀哉之芳草不植太山阿琴操曰猗蘭操者孔子所作也孔子聘諸侯莫能任自衛反魯過億谷之中見薌蘭獨茂喟然歎曰夫蘭當為王者香今乃獨茂與眾草為伍乃止車援琴鼓之自傷不逢時託辭於香蘭云晉傳玄詠秋蘭詩曰秋蘭蔭玉池池水清且芳雙魚自踴躍兩鳥時徊翔晉王羲之蘭亭記曰永和九年歲在癸丑暮春之初會于會稽山陰之蘭亭修褉事也蘪蕪說文曰江蘺蘪蕪也楚謂之蘺晉謂之𧄤軒嬌切齊謂之茝爾雅曰蘄茝蘪蕪郭璞曰香草也葉小如萎狀淮南, SBCK: ''}
