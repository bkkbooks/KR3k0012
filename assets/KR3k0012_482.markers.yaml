  - {type: variant, offset: 2800, length: 548, content: 殺翊悉取其嬪妾而復欲逼徐氏恐違之見害時月垂竟乃使人謂覽乞至晦日設祭除服覽許之徐氏遂潛使親信者語翊舊所委任將孫高傅嬰二人具白逼己之狀欲徵立計以求助焉高嬰等聞之涕泣言舊蒙翊恩許之乃密結翊平時所侍養二十餘人以徐氏之言語之仍皆盟誓合謀至晦日徐氏遂設祭除服薰衣沐浴內施帷帳以候覽焉大小怪其如此無不悽愴覽密遣偵之無復疑慮徐氏乃命高嬰輩羅住戶外使人報覽言已除凶畢矣覽遂盛飾而入徐氏出拜戶外覽纔下拜徐氏即呼二郡可起高嬰等齊出即時殺覽徐氏卻服縗絰使持覽首以祭墓舉軍震駭以為神韋昭吳書曰淩統怨甘甯殺其父操甯常避統不與相見孫權亦命統不得讎之嘗於呂蒙舍酒酣統乃以刀舞甯起曰甯能雙戟舞蒙曰甯雖能未若蒙之功也因操刀楯以身分之王隱晉書曰趙誘為杜曾所害誘子胤斬曾食其肝肺又曰桓溫父被害之時溫年十五枕戈泣血密欲報仇經年方知乃提刀直進手刃仇人由是名重當時又曰龔壯字子偉值惠懷末天下大亂李特為寇壯父叔並為特所害壯欲報仇會李壽鎮漢中壽時與李期有嫌壯因說壽討期壽然之遂帥眾還討期特孫也故壯假以復讎壽既捷因欲官壯誓不仕又曰沈充敗於吳興吳興人吳儒充之將也充亡失道誤入儒家誘內充重壁因笑謂充曰三千戶侯也充曰封侯不足貪也爾大義全我我宗族必厚報若必殺我汝族滅矣儒遂殺之充子勁字世堅即潛報仇族滅吳氏沈約宋書曰沈林子以仇讎未復從高祖剋京城進平都邑時年十, SBCK: 卷第四百}
