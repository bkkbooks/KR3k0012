  - {type: variant, offset: 119, length: 1, content: 共, krp: 延壽争葬父之事延壽與其友隂殺季宗季兒曰殺夫不義事兄之讎亦不義何面目以生而戴天履地乎遂以繩自縊死馮翊王譲聞之大其義令縣復其三子而表其墓也又曰京師節女者長安大昌里人之妻也其夫有仇仇家欲報夫而無道聞其妻孝義乃刼其妻父使要其女爲中間父呼其女而告之計念不聽則殺父不孝聽之則殺夫不義不孝不義雖生不可以行於代欲以身當之且曰諾夜在樓上新沐頭東首卧則是矣妾請開户而夜半仇家果至斷頭持去明視之乃其妻之頭也仇家痛以爲義遂釋不殺其父越統書曰伍子胥入呉居三年闔閭將爲之報讎子胥曰不可臣聞諸侯不爲匹夫興師於是止其後荆將伐蔡子胥言之闔閭即使子胥救蔡而伐荆十五戰十五勝荆平王巳死子胥捶笞平王之墓而數之曰昔者吾先人無罪而子殺之今以此報子也趙曄呉越春秋曰越王念呉欲復怨非一旦也冬寒則抱氷夏熱則握火愁心苦思懸膽於户出入甞之不絶於口乃中夜抱柱而哭哭訖復承之以嘯於是群臣聞之咸曰夫復讎謀敵非君王之憂自臣下之急務也二十一年興師滅呉檀道鸞續晉陽春秋曰王談年十許歲父爲隣人竇度所殺談隂有復讎之志年十八宻買市利挿刃陽若以耕耘者度常乗舡出入經一橋下談伺度行還於橋上以挿斬之應手而死旣而歸罪有司太守孔巖義其孝勇列上宥之搜神記曰丁蘭河内野王人年十五喪母乃刻木作母事之供飬如生隣人有所借木母顔和則與不和不與後隣人忿蘭盗斫木母應刀血出蘭乃殯殮報讎漢宣帝嘉之拜中大夫幽明録曰項縣民姚牛年十餘父爲郷人所殺牛常賣衣物市刀㦸圖欲報讎後在縣署前手刃之於衆中吏捕得官長深矜孝節爲推遷其事㑹赦得免後令岀獵逐鹿入草草有古深穽數處馬將趍之忽見一公舉杖擊馬馬驚僻不得及鹿令怒引弓將射之曰此中有穽恐君墯耳令曰汝爲何人公爲跪曰民姚牛父也感君活牛故來謝恩因滅不見令身感其事在官數年多惠於民㑹稽典録曰魏㓪字少英上虞人少爲縣吏兄爲郷人所殺㓪白日操刀報讎於縣中遂亡命到陳國從博士郄仲信學春秋圖緯又詣太學受五經京師長者李膺之徒争從之解系傳曰張華裴頠之𬒳誅也趙王倫孫秀以宿讎収系兄弟將殺之梁王彤救之倫等怒曰我見水中蟹尚欲殺之况此人兄弟輕我也遂并戮其妻子崔鴻前燕録曰吐谷渾子吐延年少有大志身長七尺八寸雄姿魁桀羗虜憚之號曰項羽性俶儻不群慷慨謂群下曰大丈夫生不在中國當髙皇光武之代與韓彭呉鄧並驅中原定}
  - {type: variant, offset: 122, length: 0, content: '', SBCK: 决雌雄使名垂竹帛而潜竄窮山隔閉殊俗不聞聖教於上宗不得䇿名於天府生與麋鹿同群死作氈裘之􅀑雖偷觀日月獨不愧於心乎􅀒其智勇猜忍不恤下爲帛城羌酋姜聦所刺殺長子業年十歳常􅅞草人號曰姜聦哭而射之大號而泣不中瞋目大呼要中乃止其母謂之曰姜聦諸將巳屠膾之矣汝何如此業泣曰誠知射草人無益於先公所以申罔極之心耳陳留志曰韓卓父甞爲吏所辱卓執兵伏道欲候殺之而長子􅁀病將死卓乃歎曰道家有信報讎不欲過今長子病豈爲是乎於是乃投刃援杖復耻而止常璩華陽國志曰陳網字仲卿少與同郡張宗受學南陽以母䘮歸宗爲安衆至元所殺網終䘮徃復之自拘有司㑹赦免應劭風俗通曰汝南陳公思爲五官􅁺王子祐爲兵曹行㑹食下亭子祐曽以縣官事考殺公思叔父斌斌無子父思欲爲報仇不能得卒見子祐不勝憤怒便格殺之還府歸死時大守太􅀓胡廣以爲公思追念叔父仁勇憤發手刃仇敵自歸司敗便原遣之梁祚魏國統曰崔周平者漢太尉烈之孫}
  - {type: page-break, offset: 122, content: '', id: KR3k0012_SBCK_482-5b}
  - {type: variant, offset: 122, length: 0, content: '', WYG: 决雌雄使名垂竹帛而潛竄窮山隔閉殊俗不聞禮教於上京不得䇿名於天府生與麋鹿同羣死作氊裘之鬼雖偷觀日月獨不愧於心乎負其智勇猜忍不恤下為帛城羗酋姜聦所刺長子葉延年十歲常縛草人號曰姜聦哭而射之號天而泣不中瞋目大呼要中乃止其母謂之曰姜聦諸將已屠膾之矣汝何如此業泣曰誠知射草人旡益於先讐所以申罔極之心耳陳留志曰韓卓父嘗為人所辱卓執兵伏道欲候殺之而長子暴病將死卓乃歎曰道家有言報讎不欲過今長子病豈為是乎於是乃投刃援杖復耻而止常􅟛華陽國志曰陳綱字仲鄉少與同羣張宗受學南陽以母喪歸宗為安衆至元所殺網終喪往復之自拘有司㑹赦免應劭風俗通曰汝南陳公思為五官掾五子祐為兵曹行㑹食下亭子祐曽以縣官事考殺公思叔父斌斌無子公思欲為報仇不能得卒見子祐不勝憤怒便格殺之還府歸死時太守太傅胡廣以為陳公思追念叔父仁勇憤發手刃仇敵自歸司敗便原遣之梁祚魏國統曰崔州平者漢太尉烈之孫}
