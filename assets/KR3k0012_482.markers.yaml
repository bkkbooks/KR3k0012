  - {type: variant, offset: 46, length: 1, content: 避, SBCK: 也對曰君問可非問讎也於是將以伯栁爲西河守伯栁見解狐而謝之解狐曰言子者公也怨子者私也虞􅄎江表傳曰孫䇿殺許貢貢客爲貢報讎射䇿中頰陸胤廣州先賢傳曰尹牙字猛德太守南陽寵下車牙以德進幹任喉舌寵雖當國厚禄而懷愧戚見於顔色牙常用恠焉曰伏見明府四節悲歎有􅃤瘁之思何也寵謂牙曰父爲豪周張所害重仇未報並與戴天非孝子雖官尊禄重而塵耻未判是以長愧而無耻也聞好馬牙與校圉交通遂充騶馬之職乃先醉張近侍以夜解縱}
  - {type: page-break, offset: 46, content: '', id: KR3k0012_SBCK_482-2b}
  - {type: variant, offset: 46, length: 1, content: 避, WYG: 也對曰君問可非問讎也於是將以伯栁為西河守伯栁見觧狐而謝之觧狐曰言子者公也怨子者私也虞薄江表傳曰孫䇿殺許貢貢客為貢報讎射䇿中頰陸𦙍廣州先賢傳曰尹牙字猛徳太守南陽滿寵下車牙以徳進幹任喉舌寵雖當國厚禄而懐愧戚見於顔色牙常用恠焉曰伏見明府四節悲歎有􅆭瘁之思何也寵謂牙曰父為豪周張所害重仇未報並與戴天非孝子雖官尊禄重而耻未報是以長愧而無止也於是馬牙與校圉交通遂充騶馬之職乃先醉張近侍以夜觧縱}
