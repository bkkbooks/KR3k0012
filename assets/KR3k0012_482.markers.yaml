  - {type: variant, offset: 3452, length: 299, content: 隨父向楊州父於路為盜所害誕雖童稚而哀感奮發傾資結客旬朔之內遂得復讎由是州里歎異之又曰孫益德其母為人所害益德童幼為母復仇還家哭於殯以待縣官高祖文明太后以其幼而孝決又不逃罪特免之梁書曰張景仁廣平人也父天監初為同縣違法所殺景仁時年八歲及長志在復讎普通七年遇法公田渚手斬其首以祭父墓事竟詣郡自縛乞依刑法太守蔡天起上言乃下教褒美之原其罪下屬長蠲其一戶租調以旌孝行唐書曰絳州孝女衛氏子無忌夏縣人也初其父為鄉人衛長則所殺無忌時年六歲母又嫁更無弟兄及長常思復讎無忌從伯嘗設宴為樂長則時亦預坐無忌以搏擊殺之既而詣吏稱父讎既報請就刑戮巡察大使黃門侍郎褚遂良以聞太宗嘉其孝烈特令免罪給傳乘徙於雍州并給田宅仍令州縣以禮嫁之, SBCK: ''}
