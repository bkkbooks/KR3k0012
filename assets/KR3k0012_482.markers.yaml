  - {type: variant, offset: 123, length: 1, content: 遇, SBCK: 兄曰元平爲議郎以忠直稱董卓之亂烈爲卓所害元平常思有報復之心㑹病卒魏文帝􅄂詔曰䘮亂以來兵革從横天下之人多相殺害昔賈復宼恂私相怨憾至懷手劒之忿光武召而和之卒共同輿而載崔鴻後燕録曰􅁗滅燕慕容桓阻兵遼東爲􅁗所殺子鳯泣血不言年十一告其母曰昔張良養士以擊􅁗王復君之仇也先王之事豈可一日忘之虞預㑹稽典録曰朱㓪字恭明父爲道士淫祀不法遊在諸縣爲烏傷長陳頵所殺㓪隂圖報怨而未有便㑹頵以病亡㓪乃刺殺頵子事發亡命奔魏魏聞其孝勇擢以爲將又曰董黯字孝治家貧採薪供養母甚肥恱憐人家冨有子不孝母甚瘦不孝子疾黯母肥甞苦之黯不報及母終􅀒土成墳竟殺不孝子置􅃁前以􅀕詣獄自繫㑹赦免廣德神異録曰賈氏女不知何許人年十五父爲宗人所害其弟強仁年㓜賈氏撫育之及強仁長乃共殺讎者自列其罪髙祖嘉之又曰王君操父大業中爲郷人李君則歐死貞觀􅀄君則以運代遷革不懼憲網又以君操􅀌微謂無復讎之志遂仕州府操宻䄂白刃刺殺之刳其心肝咀食立盡詣州自陳刺史以其擅殺問之曰殺人當死律有明文何方自理以求生路君操對曰亡父􅀍殺二十餘載聞諸典禮父讎不可同天早願圖之乆而未遂常懼滅亡不展􅁈情今大耻旣雪甘從刑憲太宗特原之又曰張琇蒲州解縣人父審素爲嶲州都督在邊累載有糺其軍中贓罪勑監察御史楊汪馳傳就軍按之汪在路爲審素黨與所刧對汪殺告事者脅汪令審素無罪俄曰州人翻殺審素之黨汪始得還至益州奏稱審素謀反因深按審素構成其罪斬之籍没其家琇與兄瑝以年㓜坐徙嶺外㝷各逃歸累年隱匿汪後累遷殿中侍御史改名萬頃是年瑝琇􅃸萬頃於東都城挺刀殺之瑝雖年長其發意及手刃皆琇爲之旣殺萬頃繫表於斧刃自言報讎之狀便逃奔就江外殺萬頃同謀搆父罪者行至汜水爲捕者所􅀗時都城士女皆矜琇等㓜稚義烈能復父讎多言其合矜恕者中書令張九齡又欲活之裴耀卿李林甫固言國法不可縱讎上以爲然因謂九齡等曰復讎雖禮法所許殺人亦格律具存孝子之情義不顧命國家設法焉得容斯殺人成復讎之志赦之虧格律之條然道路諠議故湏告示乃下勑曰張琇等兄弟同殺推問疑承律有正條湏合至死近聞士庶頗有諠詞矜其爲父報讎或言本罪􅁈濫但國家設法事存經乆蓋以濟人期於止殺各申爲子之志誰非徇孝之夫展轉相讎殺傷何限咎陶作士法在必行曽參殺人亦不可恕不能加以刑戮肆}
