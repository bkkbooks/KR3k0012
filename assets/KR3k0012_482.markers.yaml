  - {type: punctuation, offset: 11, content: 《, id: KR3k0012_CHANT_482-bkkpn1}
  - {type: variant, offset: 11, length: 5, content: 周禮地官調, SBCK: 車而歩顔色不變其御欲驅撫而止之曰爲父報讎以岀死非爲生也今事巳成矣有何去之追者曰此有節行之士不可殺也解圍而去之琴操曰樗里牧恭爲父報怨而亡林岳之下有馬夜降圍其室而鳴於是覺而聞走馬聲以爲吏追之乃奔而亡明視天馬迹也乃曰吾以義殺人而天馬來降以驚動吾處不安以告吾耶乃感懼入沂澤之中作走馬引後果讎家候之不得也又曰聶政父爲韓王治劒過期不成王殺之時政未生及壯問母知之乃入山遇仙人學鼔琴􅃮身吞炭七年琴成入韓逢妻從買櫛對而􅀏妻泣曰君似政齒政曰天下人齒盡相似耳乃入山援石擊落其齒以刀内琴中刺韓王國語曰呉敗越於㑹稽勾踐􅀃國}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_SBCK_482-2a}
