  - {type: variant, offset: 231, length: 333, content: 奔紀鄣紀鄣莒邑使孫書孫書陳無字子占也伐之初莒有婦人莒子殺其夫已為嫠婦及老託於紀鄣紡焉以度而去之曰紡纑連所以度城而藏之以待外攻者及師至則投諸外投繩城外隨之而出或獻諸子占子占使師夜縋而登緣繩登城也登者六十人縋絕師鼓譟城上之人亦譟莒共公懼啟西門而出齊入紀傳言怨不在天又曰吳伐越越子勾踐禦之陣于攜李靈姑浮以戈擊闔廬傷將指取其一履其大足指見斬遂失履姑浮取之也還卒於陘去攜李七里夫差使人立於庭茍出入必謂己曰夫差而忘越王之殺汝父乎則對曰唯不敢忘三年乃報越也又曰五年春晉圍柏人士吉射奔齊初范氏之臣王生惡張柳朔言諸昭子使為柏人令柳朔為柏人宰也昭子范吉射也昭子曰夫非而讎乎對曰私讎不及公好不廢過惡不去善義之經也臣敢違之及笵氏出柏人奔齊張柳朔謂其子爾從主免之我將止死王生授我矣授我以死節也, SBCK: 引}
