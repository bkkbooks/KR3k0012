  - {type: variant, offset: 666, length: 1249, content: 最怨知伯而將其頭以為飲器讓遁逃山中曰嗟乎士為知己者死女為悅己者容吾其報知氏之讎矣乃變姓名為刑人入宮塗廁欲以剌襄子襄子如廁心動執問塗者讓刃其扞曰欲為知伯報讎左右欲殺之襄子曰彼義士也吾謹避之耳知伯己死無後而其臣報讎此天下之賢人也卒釋之讓又漆身為癩滅鬚去眉自刑以變其容為乞人而往乞其妻不識曰狀貌不似吾夫其音何類吾夫之甚也又吞炭為啞變其音有謂之曰子之道甚難而無功謂子有志則然矣謂子智則否以子之才而善事襄子襄子必近子子之得近而行所欲此甚見而功必成讓乃笑而應之曰是為先知報後知為故君賊新君大亂君臣之義者無此矣凡吾所謂此者以明君臣之義非從易也且夫委質而事人而求弒之懷二心以事君也吾所為難亦將以愧天下後世人臣懷二心者頃之襄子當出讓伏所當過橋下襄子至橋而馬驚襄子曰此必豫讓也使人問之果讓於是襄子數讓曰子不嘗事范中行氏乎知伯滅范中行氏而子不為報讎反委質事知伯知伯已死子獨何為報之深也讓曰臣事范中行氏中行氏以眾人遇我我故眾人報之知伯以國土遇我我故國士報之襄子乃喟然泣曰嗟乎豫子豫子為知伯名既成矣寡人舍子亦以足矣子自為計使兵環之讓曰臣聞明主不掩人之義忠臣以死為名君前以寬舍臣天下莫不稱君之賢今日之事臣故伏誅然願請君之衣而擊之則死不恨非所望也敢布腹心於是襄子義之乃使使者持衣與讓讓拔劍三躍擊之曰可以報知伯矣遂伏劍而死死之日趙國之士聞者皆為涕泣史記曰秦昭王聞魏齊在平原君所欲為笵睢必報其仇乃佯為好書遺平原君曰願與君為布衣之交十日飲也又曰項梁殺人與項籍避仇吳中吳中賢大夫皆出項梁下又曰留侯張良者其先韓人也秦滅韓良家僮三百人弟死不葬悉以家財求客剌秦王為韓報仇以大父五代相韓故乃變姓名之東海得力士以鐵椎椎秦始皇中其副車又曰河東李文故嘗與張湯有隙己而為御史中丞湯有所愛史魯謁居知文與湯弗平使人上飛變告文姦事事下湯湯治論殺文袁山松後漢書曰蘇謙字仲讓為郡督郵李暠為美陽令貪暴謙案得其贓謙遷金城太守治有異跡延熙九年至京師暠時為司隸收謙誣陷之死獄中謙子不韋字公先變名姓以家財求劍客邀暠不得暠之大司農乃於司農府旁買舍夜為地突入暠室中暠適出不值破其臥具暠大怖棘屋上以板棧地而臥一宿數徙不韋乃至魏郡掘暠父冢斬級以祭父墓級首又曰樂府左延年秦女休行曰始出上西門遙望秦氏家秦氏有好女自名曰女休女休年十五為宗行報讎左執白陽刀右據宛景矛讎家東南僵女休西上山上山四五里關吏不得休女休前置辭生為燕王婦今為詔獄囚刀矛未及下攏障擊鼓赦書下東觀漢記曰海曲有呂母者子為縣吏犯小罪宰論殺之呂母怨宰密藂客規以報仇母家素豐貲產數百萬乃益釀醇酒買刀劍衣服少年來沽者皆貰與之視其乏者輒假衣裘不問多少少年欲相與償之呂母泣曰縣宰枉殺吾子欲為報怨耳諸君甯肯哀之乎少年許諾相藂得數十百人因與呂母入海自稱將軍遂破海曲執縣宰殺之以祭其子冢也又曰趙喜字伯陽南宛人也少有節操從兄為人所殺無子喜十五常思欲報之乃挾兵結客後遂往復仇而仇家皆疾病無相拒者喜以因疾報殺非仁者心且釋之而去顧謂仇曰爾曹若健遠相避也後病愈悉自縛詣喜不與相見後竟殺之又曰周黨字伯況太原人至長安遊學初鄉佐嘗眾中辱黨父黨懷之後讀春秋聞, SBCK: ''}
