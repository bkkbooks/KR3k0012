  - {type: variant, offset: 9, length: 0, content: '', WYG: 讐下太公六韜云武王伐殷乘舟濟河兵車出壊船於河中太公曰太子為父報仇今死無生所過津梁皆悉燒之列子曰魏黒卯以暱嫌殺丘邴章其子來丹謀復}
  - {type: variant, offset: 10, length: 0, content: '', SBCK: 下太公六韜云武王伐殷乗舟濟河兵車出壞舡於河中太公曰太子爲父報仇令死無生所過津梁皆悉燒之列子曰魏黒夘以暱嫌殺丘邴章其子來丹謀復讎丹氣甚猛形甚露計粒而食之順風而趨雖怒不能稱兵耻假力於人誓手劒以屠黒夘黒夘悍志絶衆力抗百夫筋骨皮肉非人􅀋也延頸承刃披􅇩受矢鋩鍔摧屈而體無㾗負材力視來丹猶鶵􅑹也來丹之友申抱曰子怨黒夘至矣黒夘之易子過矣將奚謀焉丹垂涕曰願爲我謀申抱曰吾聞衛孔周其祖得殷帝之寳劒童子服之却三軍之衆奚不請焉巳下具劒部淮南子曰魯人有爲其父報讎於齊者刳其腹而見其心坐而拭冠起而更衣徐出門}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_SBCK_482-1b}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 丹氣甚猛形甚露計粒而食之順風而趨雖怨不能稱兵耻假力於人誓手劒以屠黒卯黒卯悍志絶衆力抗百夫筯骨皮肉非人類也延頸承刃披胷受矢鋩鍔摧屈而體無㾗負財力視來丹猶鶵􅑹也來丹之友申抱曰子怨黒卯至矣黒卯之易子過矣將奚謀焉丹垂涕曰願為我謀申抱曰吾聞衛孔周其祖得殷帝之寳劒童子服之却三軍之衆奚不請焉下已具劒部淮南子曰魯人有為其父報讎於齊者刳其腹而見其心坐而拭冠起而更衣徐出門}
