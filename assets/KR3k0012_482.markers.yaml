  - {type: variant, offset: 2201, length: 598, content: 常張奐嘉歎以束帛禮之又曰彭寵故舊渤海趙寬妻子家屬依託寵居寬仇家趙伯有好奴以賕寵寵貪之為盡殺寬家屬寵之勃德不仁貪狼如此又曰郅惲友人董子張病將終惲候之子張視惲戲欷不能言惲曰吾知子不悲天命痛讎不復也惲即起將客遮仇人取其頭以示子張子張見而氣絕惲即詣縣以狀自首漢書曰原涉與新豐富人祁大伯友大伯同母弟王游公素嫉涉時為縣門下掾說尹公曰君以守令辱原涉如是一旦真令至君復單車歸為府史涉剌客如雲殺人皆不知主民可為寒心今為君計莫若條奏其舊惡君必得真令如此涉亦不敢怨矣尹公如其計王莽果以尹公為真令涉繇此怨王游公遂殺游公及子斷兩頭去謝承後漢書曰橋玄遷齊國相郡有孝子為父報讎繫臨淄獄玄愍其至孝欲上讞減罪縣令路芝酷烈苛暴因殺之懼玄收錄佩印綬欲走玄自以為深負孝子捕得芝束縛藉械以還笞殺以謝孝子冤魂范曄後漢書曰劉鯉更始子也得幸於劉輔鯉怨劉盆子害其父因輔結客殺盆子兄故式侯恭輔坐繫詔獄三日乃得釋魏志曰楊阿若後名豐字伯陽少遊俠常以報仇解怨為事至建安中太守徐揖誅郡中強族黃氏時黃昂得脫在外乃募眾得千餘以攻揖揖城守豐時在外以昂為不義乃捐妻子入南羌中合眾得千餘騎昂獨走出羗捕得之豐遂殺之又曰韓暨字公至同縣豪右陳茂譖暨父兄幾致大辟暨陽不以為言庸賃積資陰結死士遂追尋擒茂以首祭父墓由是顯名又曰典韋形貌魁梧膂力過人好節俠襄邑劉氏與睢陽李禮為讎韋為報之禮故富春長備怨甚謹韋乘車載雞酒偽為候者門開懷匕首入殺禮并殺其妻徐出取車吳志曰孫翊之妻徐氏甚美賊媯, SBCK: 平御}
