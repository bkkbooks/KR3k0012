  - {type: variant, offset: 2053, length: 147, content: 論鄉人稱美之又曰酒泉龐涓母者趙氏之女字娥父為同縣人所殺而娥兄弟三人俱疾物故讎乃喜而自賀以為莫己報也娥陰懷感憤乃潛備刀兵常推車以候讎家十餘年不能得後遇於都亭剌殺之因詣縣自首曰父仇已報請就刑戮福富長尹喜義之解印綬欲與俱亡娥不肯去曰怨塞身死妾之明分結罪治獄君之常理何敢茍生以枉公法後遇赦得免州郡表其閭, SBCK: 矣}
