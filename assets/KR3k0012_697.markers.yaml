  - {type: variant, offset: 1967, length: 460, content: 子好為長裙而上甚短魏略曰燉煌俗婦人作裙攣縮如羊腸用布一疋皇甫隆為太守禁改之魏志曰管寧恒著布裙宋書曰羊欣字敬元年二十時王獻之為吳興太守甚知愛之欣嘗夏月著新絹裙晝寢獻之入縣見之書裙數幅而去欣書本工因此彌善齊書曰魚復侯子響不道帝以兵圍之有司奏絕子響屬籍賜為蛸氏子響密作啟數紙藏妃王氏帬腰中具自申明云輕舫還闕而不得見此苦之深唯願矜之無使竹帛齊有反父之子父有害子之名後魏書曰河間人齊與太武攻赫連昌帝以微服入其城齊固諫不許乃與數人從帝入城內既覺諸門悉閉帝及齊等因入其宮中得婦人裙繫之槊帝乘而上因此得拔於齊有力焉北齊書曰世祖為胡皇后造真珠裙積所費不可勝計後被火燒之晉東宮舊事曰皇太子納妃有絳紗複裙絳碧結綾複裙丹碧紗紋雙裙紫碧紗紋雙裙紫碧紗紋繡纓雙裙紫碧紗縠雙裙丹碧杯文雙裙山陵故事曰梓宮有緗絳雙裙無腰晉宋舊事曰崇進皇太后為太皇太后有絳碧絹雙裙絳絹褥裙緗絳紗複裙由絹裙四王起事曰惠帝還洛陽得鹿犢車一乘以單帛裙為幃河東記曰西河無蠶桑婦女著碧纈裙上加細布裳秦州記曰婦人著裙制乃三千餘幅崔鴻十六國春秋後趙錄曰孟卓字君偉少脩苦之志著單裙十年不換, SBCK: 也}
