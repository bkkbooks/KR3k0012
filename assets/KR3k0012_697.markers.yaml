  - {type: variant, offset: 529, length: 513, content: 扶南人悉著鉤絡帶穆天子傳曰天子北征舍于珠澤獻白玉食天子賜黃金之環三五朱帶具飾三十西征至赤烏氏先出自周宗乃賜赤烏之人具帶五十鄴中記曰石虎皇后女騎腰中著金環參鏤帶述異記曰夏侯祖欣為兗州剌史喪於宮沈僧榮代之祖欣見形詣僧榮沈床上有一織成寶飾絡帶夏侯曰此帶殊好豈能見之與沈曰甚善夏侯曰卿直許終不見關必以為施可命焚與沈沈對前燒視此帶已在夏腰矣應璩新詩曰革帶繩為複舄穿無底大帶論語衛靈公曰子張問行子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉子張書諸紳紳大帶詩芃蘭曰容兮遂兮垂帶悸兮容儀可觀佩玉遂遂然垂其紳帶悸悸焉有節度又野有死麕曰無感我悅兮無使尨也吠又都人士曰彼都人士垂帶而厲彼君子女卷髮如蠆匪伊垂之帶則有餘匪伊卷之髮則有旟旟揚也又鳴鳩曰淑人君子其帶伊絲其帶伊絲其弁伊騏騏騏文也弁皮弁也其帶伊然謂大帶也大帶用素絲以雜色飾焉騏當作琪以玉為之禮玉藻曰凡侍於君紳垂足如履齊紳垂則磬折齊裳下緝又曰紳長制士三尺有司二尺有五寸子游曰三分帶下紳居二焉韠結三齊又曰素帶終辟大夫素帶辟垂士練帶率下辟居士錦帶弟子縞帶素帶終辟謂諸侯也辟讀如裨冕之裨謂以繒采飾其側也裳釋名曰上曰衣下曰裳裳障也以自障也易坤卦六五曰黃裳元吉象曰黃裳元吉文在中也又易繫曰黃, SBCK: 昔}
