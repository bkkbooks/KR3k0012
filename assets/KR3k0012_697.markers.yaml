  - {type: variant, offset: 2443, length: 2, content: 成裙, WYG: 履前於江陵得雜綵絲履以與家約當着盡此履不得效作也晉令曰士卒百工履色無過緑青白婢履色無過紅青市儈古會切賣者皆當着巾帖額題所儈賣者及姓名一足着黒履一足着白履東宫舊事曰太子妃有綘地文履一緉漢舊儀曰乘輿帶七尺斬蛇劍履虎尾約履徐乾古履儀曰正㑹大司馬問劍履上殿義徐言所以遂見從着履上殿将入人咸譏云古無履但有舄着舄上殿不宜着履案周禮天王赤舄黒舄后素葛履鄭君注曰複下曰舄单下曰履是則古有履也蔡謨荅臺符分别履舄之名事曰被符小㑹義注侍臣劍履升殿而摯虞决疑言劍舄履之名宜審謹案今時所謂履者自漢以前皆名為屨左傳曰踊貴屨賤禮曰戸外有二屨不言二履賈誼曰冠雖弊不以苴履言履者猶足所履踐耳詩云紏紏葛屦可以履霜舄者一物之别名履者足踐之通稱先代以來優崇重臣言劍履則包舄也又大臣昇殿不唯朝會或􅀻覿獨見臨時所着不必是舄故㧾言履以明不跣而已摯虞中朝宿臣多識徃行親覿其禮退而書之即是晉之故典令决疑言舄者書時事也儀注言履者舉揔名也尋文㧾意所稱雖異其制一也鄧徳明南康記曰昔有盧躭仕州為治中當元會至曉不及朝化為白鵠至閣前廻翔欲下威儀以帚擲之得一雙履躭驚還就列内外左右莫不駭異時歩隲為廣州刺史意甚惡之便以状聞遂至誅滅荆州記曰興安水邉平石上有石履捜神記曰宫亭湖孤石有一佑客下都經其下見二女子云可為妾買両緉絲履自厚相報佑客至都與置之並一箱置履在内㽞廟中去兼一書一刀忘而㽞之及乗舟去忽有鯉魚躍入剖之得刀與書幽明録曰晉太寕元年餘杭人姓王失其名徃上舎過廟乞福既去已行五六里􅈸復更反取一白衣人持履厚至云宫使還君化為鵠飛入田中列仙傳曰􅀈父兾州人在曲州市補履数十年不老人竒之又曰昭帝既𦵏鉤弋夫人空棺無屍但有絲履列異傳曰胡母班為太山府君賫書詣河伯貽其青絲履甚精巧也漢武内傳曰七月七日西王母降履𤣥瓊鳯文之舄}
