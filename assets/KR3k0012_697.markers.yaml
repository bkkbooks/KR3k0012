  - {type: variant, offset: 1504, length: 1, content: 飲, WYG: 為履黄金之綦飾以銀連以珠良玊之約其長尺又曰景公為履飾以金玊服以聼朝履重僕不能舉之問曰天寒乎晏子曰古之制衣服冬輕而煖夏重而清金玊之履是重而寒也公入撤履荘子曰儒者冠圓冠者知天時履方履者知地形孫卿子曰大布之衣粗絲之履可以養體也又曰曽子居衛捉衿而肘見納履而踵决韓子曰鄭人有欲買履者先自度足而置其坐徃市而忘操之見履乃曰吾忘度足乃歸取之市罷不得履人曰何不試以足曰寕信度數無自信也又曰文王履係觧視左右盡賢無可使係者因俛而係之又曰魯人身善織履其妻善織縞而徙於越或謂之曰子必窮履飾足也而越人跣縞為冠也而越人披髮欲不窮可得乎賈子曰天子黒方履諸侯素方履大夫素圓履賈誼書曰昔楚昭王與呉戰楚軍敗昭王走而履决失之行三十歩復旋取左右問曰何惜此一踦履乎王曰楚國雖貧豈愛一踦履哉惡與偕出弗與俱反也自是之後楚國之俗無相弃者又曰履雖鮮弗加之於枕冠雖弊弗以苴履又曰二世胡亥之為公子也詔置}
