  - {type: variant, offset: 1504, length: 1, content: 飲, SBCK: 爲履黄金之綦飾以銀連以珠良玉之約其長尺又曰景公爲履飾以金玉服以聽朝履重僕不能舉之問曰天寒乎晏子曰古之制衣服冬輕而煖夏重而清金玉之履是重而寒也公入徹履孫卿子曰大布之衣簏紃之履可以養體也莊子曰儒者冠圓冠者知天時履方屨者知地形又曰曽子居衛捉衿而肘見納履而踵决韓子曰鄭人有欲買履者先自度足而置其坐徃市而忘操之見履乃曰吾忘度足乃歸取之市罷不得履人曰何不試以足曰寧信度數無自信也又曰文王履係解視左右盡賢無可使係者因俛而係之又曰魯人身善織履其妻善織縞而徙於越或謂之曰子必窮履飾足也而越人跣縞爲冠之也而越人􅀍髮欲不窮可得乎賈子曰天子黒方履諸侯素方履大夫素圓履賈􅁩書曰昔楚昭王與呉戰楚軍敗昭王走而履决失之行三十歩復旋取左右問曰何惜此一踦履乎王曰楚國雖貧豈愛一踦履哉惡與偕出弗與俱反也自是之後楚國之俗無相弃者又曰履雖鮮弗加之於枕冠雖弊弗以苴履又曰二丗胡亥之爲公子曰詔置}
