  - {type: variant, offset: 2464, length: 3, content: 戴良嫁, SBCK: 陳仲字子終自齊適楚楚王欲以爲相其妻子曰家織履以食淡然而無爲樂在其中矣謝使者􅁗嘉與婦淑書曰今枉虎龍組緹履一緉髙文惠婦與文惠書曰今聊奉組生履一緉曹植賀冬表曰獻白文履七緉韈百副崔寔四民月令曰八月制韋履十月作白履劉楨魯都賦曰纎纎絲履粲爛鮮新表以文組綴以朱蠙曹植洛神賦曰踐逺遊之人履曵霜綃之輕裙古樂府詩曰君子防未然不處嫌疑間􅀲田不納履李下不正冠張華輕薄篇曰足下黄金履手中􅀟莫􅁘甄述女詩曰足躡承雲履豊趺暠春錦古詩曰頭上金􅁫十二行足下絲履}
