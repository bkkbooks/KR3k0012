  - {type: variant, offset: 2473, length: 3, content: 緣裙四, krp: 履邪正者吉之路邪者凶之徴賈誼弔屈原文曰章甫薦履漸不可乆嗟若先生獨離此咎舄崔豹古今注曰舄以木置履下乾腊不畏泥溺也方言曰履中有木者謂之複舄自関而東謂之複履其上單者謂之宛下單者謂之鞮詩曰公孫碩膚赤舄几几又南有嘉魚車攻曰赤芾金舄箋云金舄黄朱色也周禮天官下曰屨人掌王及后之服屨爲赤舄黒舄赤繶黄繶青句素屨葛屨鄭玄曰王告服有九舄有三}
