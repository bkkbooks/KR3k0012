  - {type: variant, offset: 2473, length: 5, content: 緣裙四等真, WYG: 履邪正者吉之路邪者㓙之徴賈誼吊屈原文曰章甫薦履漸不可乆嗟若先生獨離此咎舄崔豹古今注曰舄以木置履下乾腊不畏泥溺也方言曰履中有木者謂之複舄自関而東謂之複其上單者謂之宛下謂之鞮詩曰公孫碩膚赤舄几几又南有嘉魚車攻曰赤芾金舄周禮天官下曰履}
