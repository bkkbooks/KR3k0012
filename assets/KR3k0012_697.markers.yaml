  - {type: variant, offset: 1612, length: 335, content: 被髮文身祼以為飾蓋正朔所不及也猥見大聖之君悅禹文德欣然皆著衣裳矣郭子橫洞冥記曰東方朔生三日而母死鄰母得而養之經歲母忽失朔累月暫歸後復去家萬里見一枯樹脫白布裳掛樹裳化為龍嵇康集自錄曰孫登字公和於汲郡北山中為土窟夏則編草為裳冬則以髮自覆崔駰達旨曰有事則褰裳濡足劉梁七舉曰黼黻之服紗縠之裳繁飾參差微鮮若霜古樂府陌上桑曰秦氏有好女自名為羅敷緗綺為下裳紫綺為上𥜗傅玄裳銘曰上衣下裳天地則也服從其宜君子德也楚辭曰青雲衣兮白蜺裳又曰採辟荔以為裳又曰披綵裳之芬芳又曰制芰荷以為衣兮集芙蓉以為裳揚雄反騷曰被芙蓉之朱裳裙釋名曰裙下裳也連接裙幅也緝下撗縫緝其下也緣裙之柂緣也又曰裙裏衣也古服裙不居外皆有衣籠之揚雄方言曰陳魏之間謂裙為帔音披繞𥘞謂之裙東觀漢記曰王良為司徒司司直妻布裙徒跣曳柴續漢, SBCK: 夢}
