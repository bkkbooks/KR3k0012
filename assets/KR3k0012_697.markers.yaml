  - {type: variant, offset: 64, length: 0, content: '', SBCK: 謂之卭角南方江􅃆之間惣謂之麄梁益謂之屣或謂之下几反一音盡履其通語也徐土邳沂之間今下邳沂音圻謂之叩角緉􅥭上兩下爽閞之東西或謂之緉或謂之􅥭其通語也史記曰張良甞遊於下邳圯上有一老父至良所墮其履圯下頋謂良曰孺子下取之父曰履我良業爲取履因長跪進之又曰東郭先生待詔公車貧困飢寒衣幣不完行雪中履屨有上無下足盡踐地道中人􅀏之又曰趙平原君使人於春申君欲誇楚爲瑇瑁簮刀劒之室}
  - {type: variant, offset: 64, length: 0, content: '', WYG: 謂之卭角南方江沔之間揔謂之麄梁益謂之㞜或謂之䋀履其通語也徐土邳圻之間謂之印角緉􅥭關之東西或謂之緉或謂之􅥭其通語也史記曰張良常逰於下邳圯上有一老父至良所堕其履圯下顧謂良曰孺子下取履良愕然欲歐之為其老彊忍下取履殳曰履我良業為取履因長跪進之又曰東郭先生待詔公車貧困飢寒衣弊不完行雪中履􅋰有上無下足盡踐地道中人笑之又曰趙平原君使人于春申君欲誇楚為瑇􅈘簮刀劔之室}
