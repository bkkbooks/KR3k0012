  - {type: variant, offset: 2482, length: 0, content: '', SBCK: 楚子次于乾谿雨雪王皮冠􅁗復陶􅁗所遺羽衣也翠􅀍以翠羽飾􅀍豹舄以豹皮爲􅂂執鞭以出三禮六服圖曰王后翬衣􅀇舄榆翟赤舄鞠衣着履鞠衣以下皆􅂂之三禮圖曰􅃨下曰舄單下曰履夏葛冬皮也􅀃苑曰襄成君始封之時衣翠衣帶玉佩玉劒履縞舄典論曰中常侍張譲子奉爲太醫令與人飲酒輙掣引衣掌發露形體以爲戲樂將罷又亂其舄履無不顛倒漢武内傳曰西王母履文鳯之舄列仙傳曰安期先生瑯瑘阜郷人􅁗始皇請見與語三日三夜賜金壁千萬出於阜郷皆置去留書以赤玉舄一枚以報拾遺録曰􅁗王子嬰寢於望夷宫夜夢有人長文􅂡􅁂絶青納王舄而乗丹車告云天下當亂王乃殺趙髙所夢則始皇之靈所着舄則安期所遺者列仙傳曰黄帝葬橋山山崩無尸唯劒舄存衝波傳曰足履萬錢之舄漂如日光宛如遊龍風俗通曰孝文身履革舄而衣弋綈又曰俗􅀃明帝時尚書郎鄴令王喬毎月朔常詣臺朝帝恠其來數而無車馬密令太史候望言其臨至時常有􅀟鳬從東􅀯飛來因舉羅得一􅃗舄使上方識是四年中所賜尚書􅂂也杜氏幽求曰褒衣􅀶帶髙冠厚舄佩以珠璣結之纓蕤陳思王七啓曰金華之舄動趾遺光韤􅀃文曰韤足衣釋名曰韤末在脚也左傳曰衛侯與諸大夫飲酒禇聲子韈而登席公怒帝王丗紀曰武王伐紂行至啇山韈係解五人在前莫肯係皆曰臣所以事君非爲係韈漢書曰中山王來朝成帝賜食後飽起下韈係解成帝以爲不能而賢定陶王又曰景帝時王生者善爲黄老言甞召居廷中公卿盡㑹張釋之爲廷尉王生頋曰吾韈解爲我結韈釋之跪而結之人或讓王生獨奈何辱張廷尉如此王生曰吾老且賤自度終亡益於張廷尉方今天下名臣吾故聊使廷尉跪結韤欲以重之諸公聞之賢王生而重釋之東觀漢記曰和帝召諸儒侍中賈逵黄香相難罷朝特頒賜履韈文子曰均爲縞也或爲冠或爲韈則履之又曰文王伐崇至鳯皇之墟而韈係解文王自結之太公問焉文王曰吾聞亡君所與處盡其役寡人雖不肖所與處皆先君之人也故無令結之漢舊儀曰凡齋􅀇豹韈耕用青韈㑹稽典録曰賀劭爲人美容止與人交乆益敬之在官府常著韈希見其足崔浩女儀曰近古婦以冬至日進履韈於舅姑張衡}
