  - {type: variant, offset: 1107, length: 369, content: 已明也又葛屨曰摻摻女手可以縫裳摻摻猶纖纖也要之襋音戟之好人服之要䙅襋領也又七月曰載玄載黃我朱孔陽為公子裳陽明也又鴻鴈曰乃生男子載衣之裳載弄之璋禮玉藻曰衣正色裳間色又曲禮上曰諸母不漱裳左傳曰華登以吳師救華氏齊烏枝明曰用少莫如齊致死齊致死莫如去備彼多兵矣請皆用劍從之華氏北復即之廚人濮以裳裏首而荷以走曰得華登矣遂敗華氏干新里春秋演孔圖曰驅除名政衣吾衣裳坐吾曲床濫長九州滅六王至于沙丘亡後漢書曰祭遵為人廉約夫人裳不加緣東觀漢記曰鮑宣妻桓氏女字少君宣嘗就少君父學父奇其精苦以女妻之裝送甚盛宣謂妻曰少君生富驕習美飾而吾貧賤不敢當禮妻乃悉歸侍御服飾更著短布之裳續漢書輿服志曰樊噲常持鐵揗聞項羽有意殺漢王噲裂裳以褁楯冠之入軍門立漢王旁管子曰桀之時女樂三千人無不服文繡衣裳者鄧析子曰責疲者以舉千鈞督跛者以及走兔驅騏驥於廷求猨猴於檻斯逆理而求之猶倒裳以索領, WYG: ''}
