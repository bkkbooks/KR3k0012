  - {type: variant, offset: 2443, length: 2, content: 成裙, SBCK: 履前於江陵得雜綵絲履以與家約當着盡此履不得效作也晉令曰土卒百工履色無過緑青白婢履色無過紅青古儈古㑹切賣者皆當着巾帖額題所儈賣者及姓名一足着黒履一足着白履東宫舊事曰太子妃有絳地絞履一緉漢舊儀曰乗輿帶七尺斬蛇劒履虎尾約履徐乹古履儀曰正㑹大司馬問劒履上殿義徐言所以遂見從着履上殿時人見咸譏云古無履伹有舄今當着舄上殿不冝着履案周禮天王赤舄黒舄后素􅁑履鄭君注曰􅃨下曰舄單下曰履是則古有履也蔡謨荅臺符分别履舄之名事曰􅀍符小㑹義注侍臣劒履􅂛殿而摯虞決疑言劒舄履之名冝審謹案今時所謂履者自漢以前皆名屨屨左傳曰踊貴履賤禮曰户外有二屨不言二履賈􅁩曰冠雖弊不以苴屨亦不言苴履言履者猶足所履踐耳詩云糺糺􅁑屨可以履霜舄者一物之别名履者足踐之通稱稱先代以來優崇重臣言劒履則包舄也又大臣昇殿不唯朝㑹或私覿獨見臨時所着不必是舄故揔言履以明不跣而巳摯虞中朝􅀫臣多識徃行親覩其禮退而書之即是晉之故典令决疑言舄者書時事也儀注言履者舉揔名也㝷文揔意所稱雖異其制一也鄧德明南康記曰昔有盧躭仕州爲治中當元㑹至曉不及朝化爲白鵠至閣前迴翔欲不威儀以帚擲之得一􅀟履躭驚還就列内外左右莫不駭異時歩騭爲廣州刺史意甚惡之便以狀聞遂至誅滅荆州記曰興安水邊平石上有石履搜神記曰宮亭湖􅀌石有一估客下都經其下見二女子云可爲妾買兩緉絲履自厚相報估客至都與置之並一箱置履在内留廟中去兼一書一刀忘而和留之及下去乗舟忽有鯉魚躍入剖之得刀與書幽明録曰晉太寧元年餘杭人姓王失其名徃上舎過廟乞福旣去亡履巳行五六里􅈸復更反取一白衣人持履後至云宫使還君化爲鵠飛入田中列仙傳曰嘯父兾州人在曲周市􅀘履數十年不老人竒之又曰昭帝旣葬鈎弋夫人空棺無屍但有絲履列異傳曰胡母班爲太山府君賷書詣河伯貽其青絲履甚精巧也漢武内傳曰七月七日西王母降履􅀇瓊鳯文之舄}
