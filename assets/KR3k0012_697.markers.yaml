  - {type: variant, offset: 2730, length: 221, content: 弘正年少未知名著紅禈錦紋髻踞關而聽眾人蔑之弗譴也既而乘間進難舉坐盡傾法師疑非世人覘知相賞狎弘正後為左民尚書夏月著犢鼻裩衣朱衣為有司所奏彈其放達如此又曰吉士瞻少時嘗於南蠻國中擲搏無禈褰露於儕輩所侮及平魯休烈軍得絹三萬疋乃作百裩其外並賜軍士不以入室又曰謝幾卿性通脫在省署夜著犢鼻裩與門生登閣道飲酒酣呼為有司糺奏坐免西京雜記曰司馬相如初與卓文君至成都遂相謀還成都賣酒相如自著犢鼻裩滌器以恥王孫也世說曰范宣潔行廉約韓伯字康伯為豫章太守遺百疋絹不受減五, SBCK: 九}
