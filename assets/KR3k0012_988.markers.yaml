  - {type: variant, offset: 2157, length: 1, content: 精, WYG: 氣堅肌去毒蟲散鹽一名食鹽令人吐主腸胃結熱禽獸藥附龍骨角齒附史記曰穿渠自徴引洛水至商顔下穿渠得龍骨故名龍骨渠盛宏之荆州記曰始安駭鹿山室鑿室内輒得龍骨范子計然曰龍骨出東海本草經曰龍骨味甘平出山谷治心疾鬼症生晉地華陽國志曰蜀五城縣其上值天門龍昇天不達死墜此地故掘死龍骨冬夏無已吳氏本草經曰龍骨生晉地山谷陰大水所過處是死龍骨色青白者善十二月採或無時龍骨畏乾漆蜀椒石膏龍齒神農李氏大寒龍骨治驚癎久服輕身牛黄文士傳曰延篤為京兆尹桓帝時梁兾専政時皇子疾詔書發京兆出牛黄兾遣諸生齎書持牛黄詣篤賣篤以為詐論殺之本草經曰牛黄味苦生隴西平澤特牛膽中治驚癎寒熱生晉地吳氏本草經曰牛黄出入鳴吼者有之夜視有光走角中牛死其膽中如雞子黄人參為使惡地黄飛廉龍骨阿膠東水經曰東阿縣有大井其巨若輪每嵗常煮膠以貢天府本草所謂阿膠也故世俗有阿井之名庾信哀江南賦云阿膠不能止黄河之濁海蛤博物志曰東海有蛤鳥嘗啖之肉消盡殻起出浮泊在沙岸潮水往來揩蕩白如雪入藥最良取自死者本草經曰海蛤味苦平生池澤}
