  - {type: variant, offset: 97, length: 214, content: 至性七歲時父遇篤疾醫云餌五石可愈時求紫石英五色文石於太行不得彥光憂瘁不知所為於園中見一物彥光所不識怪而持歸即紫石英也親屬咸異之抱朴子內篇曰或問不寒之道荅曰以立冬之日或服六丙六壬符或服太陽酒或服紫石英東筦縣西北二十里有襮山出紫石英舊以貢獻永嘉記曰固陶朴有小山出紫石英人嘗於山下得一紫石英王府君聞遣人緣山掘得數升芒角甚好色小薄孫府君亦掘得數升也從征記曰自太峴至太山皆有紫石英太山所出特復瓌殊吳興記曰烏程縣北壟山有紫石英甚光明但小黑博, SBCK: 赤斧􅀶}
