  - {type: variant, offset: 763, length: 2, content: 漢中, SBCK: 隴道芒消本草經曰消石一名芒消味酸苦寒生山谷治五藏積􅀬生益州朴消本草經曰朴消味苦寒生山谷治百病除寒􅀬邪氣除六府積聚結癖山谷之隂有鹹苦之水􅃺如芒消而麄能化七十二種石練餌服之輕身}
  - {type: page-break, offset: 763, content: '', id: KR3k0012_SBCK_988-2b}
  - {type: variant, offset: 763, length: 107, content: 漢中神仙傳曰劉馮餌石流黃老而更少博物志曰西域使至王暢說石流黃出且彌山去高昌八百里有石流黃高數十丈縱廣五六畝有取流黃孔穴晝視其孔上狀如青煙常高數尺夜視皆如燃燈光明高尺餘暢所親視見也且彌人言是時氣不和皆往保此山毒氣自滅, WYG: 河東}
