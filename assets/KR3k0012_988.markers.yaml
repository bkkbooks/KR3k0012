  - {type: variant, offset: 773, length: 7, content: 流黃老而更少博, SBCK: 神農歧伯雷公無毒生益州或山隂入土千歳不變練之不成不可服雄黄玄中記曰貟丘之上多大蛇以雄黄精厭之水經曰黄水出零陽縣西北連巫山溪出雄黄頗有神異採常以冬月􅀕祀鑿石深數丈方得故溪水取名焉淮南萬畢術曰夜焼雄黄水虫成列水虫聞燒雄黄臰氣皆趣火吴氏本草曰雄黄神農苦山隂有丹雄黄生山之陽故曰雄是丹之雄所以名雄黄也雌黄吴越春秋曰太官舎春由君所造殿後殿名逃夏宫春申子假君宫也數失火因塗雌黄故曰黄堂臨海水土}
