  - {type: variant, offset: 1235, length: 1, content: 羗, WYG: 益州或山陰入土千年不變煉之不成不可服雄黄𤣥中記曰員丘之上多大蛇以雄黄精壓之水經曰黄水出零陵縣西北連巫山溪出雄黄頗有神異採常以冬月祭祀鑿石深數丈方得故溪水取名焉淮南萬畢術曰夜燒雄黄水蟲成列來水蟲聞燒雄黄氣皆趨火死吳氏本草曰雄黄神農苦山陰有丹雄黄生山之陽故曰雄是丹之雄所以名雄黄也雌黄越絶書曰今太守舍者春申君所造後璧屋以為桃夏宫今宫者春申君子假君宫也數失火因塗雌黄故曰黄堂土物志曰丹山草木赫然盡彰雄黄雌黄所産煒煌内含竒寳外發英光昔𨽻交部今則南康典術曰天地之寳藏於中極名曰雌黄千年化為雄黄雄黄千年化為黄金本草經曰雌黄石金味辛平生山谷治身癢諸毒磁石王隐晉書曰馬隆撃凉州以磁石累}
