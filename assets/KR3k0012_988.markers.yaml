  - {type: variant, offset: 783, length: 3, content: 西域使, SBCK: 丹山草木赫然盡彤雌黄所産煒煌内含竒寳外發英光昔􅀠交部今則南康典術曰天地之寳藏於中極命曰雌黃雌黃千年化爲雄黄雄黄千年化爲黄金本草經曰雌黄石金味辛平生山谷治身癢諸毒磁石王隱晉書曰馬隆擊凉州以磁石累道側賊􅀒䥫鎧不得過以爲神吕氏春秋曰磁石召䥫或引之也石䥫之母也石之不慈者亦不能引之也抱朴子曰五石者丹沙雄黄白礬石曽青磁石也一石轉五轉而各成五色五石合爲二十五色南州異物志曰漲海﨑頭水淺而多磁石外徼人乗大舶皆以䥫鐷鐷之}
