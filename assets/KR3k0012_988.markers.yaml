  - {type: variant, offset: 1237, length: 0, content: '', WYG: 側賊負鐡鎧不得過以為神呂氏春秋曰磁石召鐡}
  - {type: variant, offset: 1238, length: 1, content: 句, WYG: 引之也石䥫之母也石之不磁者亦不能引之也抱朴子曰五石者丹砂雄黄礜石曽}
