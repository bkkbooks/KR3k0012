  - {type: variant, offset: 1240, length: 0, content: '', WYG: 磁石也一石輒五轉而各成色五五石合為二十五色南州異物志曰漲海﨑頭水淺而多磁石外徼人乗大船皆以鐵鎖鎖之至此闗以磁石不得過淮南萬畢術曰磁石拒碁取雞血作針針磨鐡𢷬之以和磁石日塗碁頭曝乾之置局上則相拒不休又曰磁石懸入井亡人自歸吳氏本草曰磁石一名磁君石膏廣州記曰鄣平縣有石膏}
