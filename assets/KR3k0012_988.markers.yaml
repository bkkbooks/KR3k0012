  - {type: variant, offset: 2, length: 0, content: '', SBCK: 下禽獸藥附餘粮消石芒消朴消雄黄雌黄磁石石膏滑石礬石曽青空青白青扁青長石冷石石宻玉泉水銀决明赭代赭附白堊鹵鹹龍骨角齒附牛黄阿膠海蛤犀角靈羊角鹿茸鹿脂鴈肪䳒頭并尾餘粮列仙傳曰赤斧者巴戎人爲碧祠主簿能錬丹與消石服之三十年身反童子髮毛皆赤數十年}
