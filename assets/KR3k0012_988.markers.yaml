  - {type: variant, offset: 903, length: 629, content: 流黃一名石流黃神農黃帝雷公鹹有毒醫和扁鵲無毒或生易陽或河西或五色黃是潘水石液也燒令有紫炎者八月九月採治婦人結陰能化金銀銅鐵石流青本草經曰石流青青白色主益肝氣明目石流赤神仙傳曰許由巢父服箕山石流丹抱朴子曰石流丹者山之赤精蓋石流黃之類也皆浸溢於涯岸之間其濡濕者可丸服其已堅者可散服如此者有百二十種皆石芝本草經曰石流赤生羗道山谷石膽孝子王冊曰虎魄又名為石膽十洲記曰滄浪海島上有石膽服之神仙仇池記曰石膽川平池出石膽博物志曰皇初三年武都西部都尉王褒獻石膽二十斤范子計然曰石膽出隴西羌道本草經曰石膽一名畢石一名君石生秦州羗道山谷大石間或出句青山其為石也青色多白文易破狀似空青能化鐵為銅合成金銀練餌食之不老吳氏本草經曰石膽一名黑石一名銅勒神農酸小寒李氏大寒桐君辛有毒扁鵲苦無毒生羗道或句青山二月庚子辛丑採石肺本草經曰石肺一名石肝黑澤有赤文如覆肝置水中即乾濡主益氣明目生水中石脾本草經曰石脾一名胃口一名腎石赤文主治胃中寒熱青石脂本草經曰青石脂味酸平無毒主養肝膽氣赤石脂越絕書曰田鍾穹隆山赤松子所取赤石脂也永嘉記曰赤石脂出永寧赤石山荊州記曰義陽有赤石脂山本草經曰赤石脂味酸無毒養心氣范子計然曰赤石脂出河東色赤者善黃石脂本草經曰黃石脂味平無毒主養脾氣白石脂本草經曰白石脂味甘無毒主養肺氣黑石脂本草經曰黑石脂味甘無毒主養腎氣強陰陽蝕腸泄利吳氏本草曰五石脂一名青赤黃白黑符青符神農甘雷公酸無毒桐君辛無毒季氏小寒生南山或海涯採無時赤符神農雷公甘黃帝扁鵲無毒季氏小寒或生少室或生太山色絳, SBCK: ''}
