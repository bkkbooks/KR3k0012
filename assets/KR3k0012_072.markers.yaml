  - {type: variant, offset: 237, length: 0, content: '', SBCK: 澤損君子以懲忿窒慾又曰澤上於地萃君子以除戎器戒不虞又曰澤上有水節君子以制數度議德行又曰澤中有火革君子以治曆明時又曰澤上有風中孚君子以議獄緩死又曰澤滅木大過君子以獨立不懼遁丗無悶又曰澤無水困君子以致命遂志又曰象曰澤上於天夬君子以施禄及下居德則忌河圖曰大迹出雷澤華胥履之生伏犧雷澤澤也書曰雷夏旣澤灉沮㑹同孔安國注曰雷夏澤名書大傳曰舜漁於雷澤鄭􅀇注曰雷澤今属濟隂詩曰彼澤之陂有蒲與荷周禮曰川澤其動物冝鱗物其植物冝膏物其民黒而津又曰澤虞掌國澤之政令爲之厲禁使其地之人守其財物以時入之于王府頒其餘于萬民禮曰􅆩􅀕魚然後虞人入澤梁禮記稽命徴曰王者德禮之制者澤谷中有朱鳥白玉赤虵赤龍出焉傳曰宣十五年晉侯救宋伯宗曰不可古人有言雖鞭之長不及馬腹天方受楚未可與争雖晉之強能違天乎諺曰髙下在心度時制置川澤納汚受汙濁也山藪藏疾又曰衛侯出奔齊孫氏追之敗公徒于柯澤齊北東河縣西南有大澤是也又曰叔向母曰}
