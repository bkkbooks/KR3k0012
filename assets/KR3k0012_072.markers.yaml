  - {type: variant, offset: 1988, length: 413, content: 水可荐於鬼神可羞於王公坻說文曰秦謂陵阜曰坻釋名曰坻遟也能小遏水使流遟也賈誼鳥賦曰乘流爰逝兮得坻則止湄神仙傳曰河上公漢景帝時結草為庵於河之湄常讀老子帝不解老子數事遣問公不荅帝駕從之公即躍身空中矣濆說文曰濆水涯也詩曰汝墳道化行也文王之化行乎汝墳之國也遵彼汝墳伐其條枚又曰彼汾沮洳言采其莫涘說文曰涘水涯也詩曰綿綿葛藟在河之涘又曰所謂伊人在水之涘波釋名風吹水成文為瀾瀾連也波體轉流相及連也小波曰淪淪倫也水文相次有倫理也詩曰有豕白蹢烝涉波矣魏志曰魏明帝至廣陵臨江觀兵見濤波洶涌歎曰此天所以限南北也遂歸又曰徐宣從文帝於廣陵六軍乘舟風浪暴起帝舩廻倒宣時病在後凌波獨前群僚無至者帝壯之遷尚書益部耆舊傳曰張霸為會稽太守入海捕賊遭疾風晦冥波水涌起士卒驚曰霸霸曰無得恐太守奉法追賊風必不為害須臾風靜波止莊子曰孔子遊乎緇帷之林休坐乎杏壇之上有漁父者孔子曰其聖人歟乃下求之漁父語訖刺舡而去延緣葦間顏淵還車子路授綏孔子不顧待水波定不聞挐音而後敢乘挐舡櫂也, SBCK: 䕃鋪茅蘼爲席}
  - {type: variant, offset: 1988, length: 63, content: 水可荐於鬼神可羞於王公坻說文曰秦謂陵阜曰坻釋名曰坻遟也能小遏水使流遟也賈誼鳥賦曰乘流爰逝兮得坻則止湄神仙傳曰河上公漢景帝時結草, WYG: 䕃鋪茅蘼}
