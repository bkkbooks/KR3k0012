  - {type: variant, offset: 22, length: 9, content: 水口知車輪名為瀵尾, SBCK: 大野今髙平鉅野縣東北大澤晉有大陸今鉅鹿北廣河澤秦有楊紆音謳今在扶風洴縣西也宋有孟諸今在梁國睢陽縣東北也楚有雲夢今南郡華容縣東南巴丘丘川也吴越之間有具區今吴縣南大湖即震澤也鄭有甫由今滎陽中牟縣西阜田澤周有焦穫音牙今扶風池縣陽瓠中是也謂之十藪漢書曰司馬相如論巴蜀父老文云鷦鵬巳翔於寥廓之宇而羅者}
