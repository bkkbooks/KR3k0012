  - {type: variant, offset: 1274, length: 1, content: 東, SBCK: 中有沙岡上下二十四浦津流逕通淵潭相接各有名焉有大斬小斬有大􅁅小􅁅義魯練秋大白楊小白楊散嚇禺中羊圈大鵠小鵠龍澤鬯罷大哀小哀大長小長大縮小縮伯丘大蓋牛眼等浦水盛則北注渠溢則}
  - {type: variant, offset: 1274, length: 1, content: 東, WYG: 中有沙岡上下二十四浦津流遥通淵潭相接各有名焉有大漸小漸有大灰義魯練秋大白楊小白楊散嚇禺中羊圏大鵠小鵠龍澤蜜羅大哀小哀大長小長大縮小縮伯丘大葢牛眼等浦水盛則北注渠溢則}
