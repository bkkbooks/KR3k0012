  - {type: variant, offset: 1318, length: 1, content: 海, SBCK: 數水陂溢爲害翟方進爲丞相以爲决去陂水其地肥美省隄防之費遂奏罷之及翟氏敗後郷里歸惡於方進言方進請陂下良田不得而奏罷陂頋野王云王莾時甞苦旱起追怨方進童謡云壞陂誰翟子威飰我豆食美芋魁反乎覆陂當復誰言者兩黄鵠建武中太守鄧晨使許陽典復鴻郄以陽爲都水􅁺陽曰昔成帝夢上天天帝怒曰何故壞我濯龍池於是乃因髙下形勝起塘四百餘里數年乃立續漢書郭林宗交汝南黃叔度過􅀽奉髙不􅀫而去㤗曰叔度之量汪汪􅀂萬頃之陂澄之不清撓之不濁不可量也謝承後漢書曰汝南許陽暁以術承地脉太守鄧晨署爲平水􅁺使治鴻郄陂陂成}
