  - {type: variant, offset: 1286, length: 1, content: 開, WYG: 後漢書云安帝永初元年以廣成游獵地假與貧人于時馬融作廣成頌云大漢之初基也揆厥靈囿營于南郊右曫莫板切三途左槩嵩岳面據衡隂箕背王屋浸以波溠演以滎洛金}
