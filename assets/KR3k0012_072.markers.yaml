  - {type: variant, offset: 978, length: 245, content: 曰雷煥卒子華為州從事持劍行經延平津忽於腰間躍出墮水使人沒水取之不見劍但見兩龍各長數丈蟠縈其文章沒者懼而返須臾光采照水波浪驚沸崔鴻十六國春秋曰石虎起河橋於靈昌津採石為中濟石無大小下輒隨流用功五百餘萬而終不成虎遣散騎侍郎崔收沉璧中流告神已地震水流莫不傾壞壓死者百餘人虎甚怒乃斬工匠止作而還又曰慕容德正月渡黎陽津流澌冰合鄴令韓軌言於德曰光武渡呼沱澌冰自合大王濟河天橋自成靈命所扶徵兆已見德大悅改黎陽津為天橋津郡國志曰陜州平陸縣小平津張讓劫獻帝處南岸有勾陳壘武王伐紂八百諸侯會處又曰杜預造河橋於富平, SBCK: ''}
