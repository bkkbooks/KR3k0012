  - {type: variant, offset: 1766, length: 1, content: 嶠, krp: 見昨所祭餘食充溢膓内須臾復得釡又取發水便暴出五百人一時沒溺唯督監得存具說事狀于今猶名此湖爲五百陂汝南}
  - {type: variant, offset: 1768, length: 207, content: 有齒疾至是拔之中風至鎮未旬而卒又曰殷羨建元中為豫章太守去郡郡人多附書一百餘封行至江西石頭渚岸以書擲水中祝曰沉者自沉浮者自浮殷洪喬非是致書郵故時人號為投書渚吳興記曰烏程西風渚者防風氏國也幽明錄曰淮南牛渚津水極深無可筭計人見一金牛形甚瑰壯以金為鏁絆文選詩曰雙鷰遊蘭渚潏釋名曰潏術也堰使水鬱術也魚梁水碓之類也爾雅曰人所為曰潏犍為舍人曰人力水為居止沚釋名曰沚也小可以息其止也廣雅同詩曰遡洄從之宛在水中沚又曰菁菁者莪在彼中沚, SBCK: 賢}
