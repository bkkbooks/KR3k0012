  - {type: variant, offset: 1286, length: 1, content: 開, krp: 後漢書云安帝永𥘉元年以廣成遊獵地假與貧人于時馬融作廣成頌云大漢之𥘉基也揆厥靈囿營于南郊右矕莫板切三途左枕嵩岳面據衡陽箕背王屋浸以波溬演以榮洛金}
  - {type: variant, offset: 1288, length: 2, content: 圖所, SBCK: 石牀殷起乎中神泉側出丹水星湟池恠石浮磬混乎其陂是此澤也隋大業中置馬牧焉亦名廣陂其漑灌之利至今百生頼之輿地志曰稡澤在王城西北三十里與金谷相近又郡國志云稡澤即金谷也有金水出焉故}
  - {type: variant, offset: 1288, length: 2, content: 圖所, WYG: 石林殷起乎其中神泉側出丹水湟池怪石浮磬焜燿于其陂是此澤也隋大業中置馬牧焉亦名廣陂其漑灌之利至今百姓頼之輿地志曰梓澤在王城西北三十里與金谷相近又郡國志云梓澤即金谷也有金水出焉故}
