  - {type: variant, offset: 238, length: 2, content: 湖湖, SBCK: 山大澤實生龍蛇廣雅曰方澤􅀕地也太公金匱曰夏桀之時有芩山之水桀常以十月發民鑿山穿陵通於河民諌曰孟冬鑿山穿陵是泄天氣發藏天子失道後必有敗桀殺之朞年芩山一旦崩爲天澤戰國䇿曰淳于髠一日見七人於齊宣王王曰千里而一士是比肩而立百丗而一聖􅀂隨踵而生淳于髠曰今求桔梗於沮澤則累丗不得一矣桔梗山}
