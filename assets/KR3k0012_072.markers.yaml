  - {type: variant, offset: 758, length: 4, content: 棗陽縣界, SBCK: 涸澤數百歳水不絶者生其狀􅀂人長四寸黄衣黄冠戴黄蓋乗水鳥好疾馳以其名呼之可使千里外一日反報此涸澤之精也文子曰髙莫髙於天下莫下於澤天髙澤下聖人法之韓宣子曰魯焼積澤天北風火南􅀝恐焼國哀公懼自持衆趨救之新序曰晉公逐獸于碭入大澤迷不知所出問漁者送出澤因以諌之公令記其名漁者曰公亟反國臣亦反漁所又曰楚威王問於宋玉曰先生其}
