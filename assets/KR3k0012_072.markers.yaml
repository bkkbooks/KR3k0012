  - {type: variant, offset: 1276, length: 3, content: 去白馬, SBCK: 潘故竹書紀年云梁惠成王十五年入河水于甫田又爲大溝而引甫水者也圖經曰晉有大陸吕氏春秋云晉之大陸猶趙之鉅鹿也按隋圖經云大陸大鹿大河即一澤而異名也漢書云路温舒取蒲於此也澤亦尚書云納于大麓是此也河南圖經曰廣成澤在梁}
  - {type: variant, offset: 1276, length: 3, content: 去白馬, WYG: 播故竹書紀年云梁惠成王十五年入河于甫田又為大溝而引甫水者也圖經曰晉有大陸吕氏春秋云晉之大陸猶趙之鉅鹿也按隋圖經云大陸大鹿大河即一澤而異名也又按漢書云路温舒取蒲用寫書即此也尚書云納於大􅅢是此也河南圖經曰廣成澤在梁}
