  - {type: variant, offset: 4, length: 2, content: 六瀵, SBCK: 七藪澤陂藪􅀃文曰藪大澤也周禮曰楊州之澤藪曰具區荆州之澤藪曰雲夢䂊州之澤藪曰甫田青州之澤藪曰孟諸兖州之澤藪曰大野雍州之澤藪曰􅁌蒲幽州之澤藪曰醫無閭兾州之澤藪曰昭余祁虞候祈望皆官名也國語曰榖洛􅃲將毀王宫王欲壅之太子晉諌曰古之長民者不隳山不崇藪不防川不竇澤夫山土之聚也藪物之歸也又曰其後伯禹念前之非度度法􅁵改制景象物土地以􅀋百則儀之于羣生共之從孫四岳左焉髙髙下下䟽川導滯鐘}
