  - {type: variant, offset: 1228, length: 1, content: 曹, SBCK: 􅉾澤河水之所潜也其源渾渾泡泡者也東去玉門陽􅀜一千三百里廣輪四百里其水澄停冬夏不减其中洄湍雷輪轉爲隱輪之脉當其圜流之上飛禽舊翮於霄中者無不墜於淵波即河水之所潜而出於積石也又曰徐}
