  - {type: variant, offset: 1286, length: 1, content: 開, SBCK: 後漢書云安帝永􅀄元年以廣成遊獵地假與貧人于時馬融作廣成頌云大漢之􅀄基也揆厥靈囿營于南郊右矕莫板切三途左枕嵩岳面據衡陽箕背王屋浸以波溬演以榮洛金}
