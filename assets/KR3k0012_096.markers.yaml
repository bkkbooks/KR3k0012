  - {type: variant, offset: 3324, length: 2, content: 立廟, WYG: 㑹公卿謀征討計朝議多謂可遣諸將擊之王肅及尚書傅嘏中書侍郎鍾㑹勸帝自行戊午帝統中軍步騎十餘萬以征之倍道兼行召三萬兵大㑹}
  - {type: variant, offset: 3324, length: 5, content: 立廟于洛陽, krp: 輔政}
  - {type: variant, offset: 3327, length: 1, content: 洛, WYG: 陳許之郊甲申次于隱橋儉將史招李續相次來降儉欽移入項城帝遣荆州刺史王基進據南項以逼之帝深壁高壘以待東軍之集諸將請進軍攻其城帝曰諸軍得其一未得其二淮南將士本無反志且儉欽欲蹈縱橫之跡習秦儀之説謂逺近必應而事起之日淮北不從史招李續前後瓦解内乖外叛自知必敗困獸思鬭速戰更合其志雖云必尅傷人亦多且儉等欺誑將士詭變萬端少與持久詐情自露此不戰而尅之也乃遣諸葛誕督豫州諸軍自安風向壽春征東將軍胡遵督青徐諸軍出譙宋之間絶其歸路帝屯汝}
