  - {type: variant, offset: 3423, length: 0, content: '', WYG: 昭哲輔弼我皇家勲德光于四海格爾上下神祗罔不克順地平天成萬邦以乂應受上帝之命協皇極之中肆予一人祗承天序以敬授爾位厯數實在爾躬允執其中天禄永終於戲王其欽順天命率循訓典底綏四國用保天休無替我二皇之休烈帝初以禮讓魏朝公卿何曽王沈等固請乃從之太始元年冬十二月丙寅設壇于南郊百寮在位及匈奴南單于四夷㑹者數萬人柴燎告類于上帝於是大赦改元賜天下爵人五級三年春正月癸丑白龍二見于𢎞農澠池丁夘立皇子衷為皇太子九月甲申詔曰古者以德詔爵以庸制禄雖為下士猶食上農外足以奉公忘私内足以養親施惠今在位者禄不代耕非所以崇化之本也其議增吏俸四年己未詔王公卿尹及郡國守相舉賢良方正直言之士十二月班五條詔書於郡國一曰正身二曰勤百姓三曰撫孤寡四曰敦本息末五曰去人事庚寅帝臨聽訟觀録廷尉洛陽獄囚親平決焉八年春正月癸亥帝耕于藉田二月乙亥禁雕}
