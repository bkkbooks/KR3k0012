  - {type: variant, offset: 3412, length: 1, content: 高, SBCK: 世宗文皇帝􅀳書曰文皇帝諱昭字子上景皇帝母弟魏景􅀄三年封新城郷侯正元􅀄爲洛陽典農中郎將值魏明奢侈之後帝蠲除苛碎不奪農時百姓大恱轉散􅀐常侍大將軍曹爽之伐蜀也以帝爲征蜀將軍副夏侯􅀇出駱谷次于興勢蜀將王林夜襲帝營帝堅卧不動林退帝謂􅀇曰費禕以據險拒守進不􅀗戰攻之不可冝亟旋軍以爲後圖爽等引還禕果馳兵趣三嶺争險刀得過還拜議郎及誅曹爽帥衆衛二宫以功増邑千户髙貴郷公之立也以叅定䇿進封髙都侯邑二千户母丘儉文欽之亂大軍東征帝兼中領軍留鎮洛陽及景帝疾篤帝自京都省疾拜衛將軍景帝崩天子命帝鎮許昌尚書傅嘏帥六軍還京師帝用嘏及鍾㑹䇿自帥軍而還至洛陽進位大將軍加侍中都督中外諸軍録尚書事輔政劒履上殿固辭不受甘露元年春加大都督奏事不名夏六月進封髙都公地方七百里加九錫假斧􅃏進號大都督劒履上殿又不受秋八月庚申加假黄􅃏増封三縣二年夏六月辛未鎮東大將軍諸􅁑誕殺楊州刺史樂琳以淮南作亂遣子靚音浄爲質於呉以請救議者請速伐之帝曰誕以母丘儉輕疾傾覆今必外連呉㓂此爲變大而遟吾當與四方同力以全勝制之秋七月奉天子及皇太后東征徴兵青徐荆豫分取􅀜中遊軍皆㑹淮北師次于項城假廷尉何禎節度淮南宣慰將士申明逆順示以誅賞甲戌帝進軍丘頭因命合圍三年春正月諸􅁑誕文欽等出攻長圍諸軍逆擊走之􅀄誕欽内不相恊及至窮蹙轉相疑貳欽計事於誕忤誕手刃殺欽欽子鴦攻誕不克踰城降以爲將軍封侯使鴦廵城市而呼帝見城上持弓者不發謂諸將曰可攻矣二月乙酉攻而拔之斬誕夷三族四月歸于京師魏帝令改丘頭爲武丘以旌武功五月天子以并州太原上黨西河樂平新興鴈門司洲之河東平陽八郡地方七百里封帝爲􅀳公加九錫進位相國九讓乃止景元元年夏四月天子旣以帝三世宰輔政非巳出情不能安又慮廢辱將臨軒召百僚而行放黜五月戊子夜使冗從僕射李昭等發甲於陵雲臺召侍中王沉散􅀐常侍王業尚書王經出懷中黄素詔示之戒嚴俟旦沉業馳告于帝召護軍賈充等爲之備天子知事泄帥左右攻相府稱有所討敢有動者族誅相府兵將止不敢戰賈充叱諸將曰公畜養汝軰正爲今日耳太子舎人成濟抽戈犯蹕天子崩于車中帝召百僚謀故僕射陳泰不至帝遣其舅荀顗輿致之定于曲室謂曰􅀇伯天下其如我何泰曰唯􅆎斬賈充徴以謝天下帝曰卿更思其次泰曰但見其上不見其次於是歸罪成濟而斬之與公卿議立燕王宇之子常道郷公璜音黄爲帝二年秋八月甲寅天子使太尉髙柔授帝相國印綬司鄭冲致晉公茅土九􅃬固辭三年夏四月肅慎來獻楛矢石砮弓甲貂皮等天子命歸大將軍府四年夏帝將伐蜀徴四方之兵十八萬使鄧艾自秋道攻姜維於沓中雍州刺史諸􅁑緒自祁山軍于武街絶維歸路鎮西將軍鍾㑹帥前將軍李輔征蜀護軍胡烈等自駱谷襲漢中秋八月軍發洛陽大賚將士陳師誓衆將軍鄧敦謂蜀未可討帝斬以徇九月使天水太守王頎攻維營隴西太守牽􅒮邀其前金城太守楊欣趣其後鍾㑹分爲二隊入自斜谷使李輔圍王含於樂城又使部將易愷攻蔣斌於漢城㑹直指陽安護軍胡烈攻䧟􅀜城姜維聞之引還王頎追敗維於強川維與張翼廖化合軍守劒閣鍾㑹攻之冬十月天子以諸侯獻捷交至詔加九錫帝乃受命十一月鄧艾帥萬餘人自隂平踰絶險至于江由破蜀將􅁑贍於綿竹斬贍首􅀓道進軍雒縣劉禪降天子命􅀳公以相國㹅百揆於是上節􅀓去侍中大都督録尚書之號焉咸熈元年春正月乙丑帝奉天子西征至于長安遣護軍賈充持節督諸軍據漢中鍾㑹遂反於蜀􅁥軍衛瓘右將軍胡烈攻㑹斬之景辰帝至自長安三月巳夘進爵爲王増封并前二十郡冬十月景午天子命中撫軍新昌郷侯炎爲􅀳世子二年五月天子命冕十有二旒建天子旌旗岀警入蹕乗金根車駕六馬備五畤副車置旄頭雲罕樂儛八佾設鍾虡音巨宫懸位在燕王上進王妃爲王后世子爲太子王女王孫爵命之號皆如帝者之儀秋八月辛卯帝崩于露寢時年五十五葬崇陽陵武帝受禪追尊號曰文皇帝廟稱太}
