  - {type: variant, offset: 1558, length: 448, content: 寇帝遣將軍牛金擊走之斬千餘級四年遼東太守公孫文懿反徵帝詣京師天子曰此不足以勞君事欲必剋故以相煩耳君度其作何計對曰棄城預走上計也據遼水以拒大軍次計也坐守襄平此成擒耳天子曰其計將安出對曰唯明者能深度彼我乃能豫有所割棄此非其所及也今懸軍遠征將謂不能持久必先拒遼水而後守此中下計也天子曰往還幾時對曰往百曰還百日攻百日以六十日為休息一年足矣景初二年帥牛金明遵等步騎四萬發自京都車駕送出西明門詔弟孚子師送過溫賜以穀帛牛酒勑郡守典農已下皆往會焉見父老故舊讌飲累日帝歎息悵然有感為歌曰天地開闢日月重光遭遇際會畢力遐方將掃群穢還過故鄉肅清萬里總齊八荒告成歸老待罪舞陽遂進師經孤竹越碣石次于遼水文懿果遣步騎數萬阻遼隧堅壁而守南北六七十里以拒帝帝盛兵多張旗幟出其南賊盡銳赴之乃汎舟灒濟以出其北與賊營相逼沉舟焚梁傍遼水作長圍棄賊而向襄平賊見兵出其後果邀之乃縱兵逆擊大破之三戰皆捷賊保襄平進軍攻之初文懿聞魏師之出也請救於孫權權亦出兵遙為之聲援遺文懿書曰司馬公善用兵變化若神所向無前深為弟憂之會霖潦大水平地數尺賊恃水樵採自若, WYG: ''}
