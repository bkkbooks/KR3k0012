  - {type: variant, offset: 14, length: 157, content: 諱懿字仲達河內溫縣孝敬里人姓司馬氏其先出自帝高陽之子重黎為夏官祝融歷唐虞夏商世序其職及周以夏官為司馬其後程伯休父周宣王時以世官剋平徐方錫以官族因而為氏楚漢間司馬昂為趙將與諸侯伐秦秦亡立為殷王都河內漢以其地為郡子孫遂家焉自昂八世生征西將軍鈞字叔平鈞生豫章太守量字公度量生潁川太守雋字元異雋生京兆尹防字建公帝即防之弟二, SBCK: 長}
