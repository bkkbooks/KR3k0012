  - {type: variant, offset: 3379, length: 0, content: '', SBCK: 天子以􅀇緝之誅􅀷不自安而亦慮難作潜謀廢立乃宻諷魏永寜太后秋九月甲戌太后下令遣使迎髙貴郷公於元城而立之改元曰正元天子受璽情惰舉趾髙帝聞而憂之及將大㑹帝訓於天子曰夫聖王重始正本敬􅀄古人所慎也明當大㑹萬衆瞻穆穆之容公卿聽玉振之音詩云示人不佻是則是効易曰出其言善則千里之外應之雖禮儀周備猶冝加之以祗恪以副四海顒顒式仰癸巳天子詔登位相國進號大都督假黄􅃏入朝不趍奏事不名劒履上殿帝固辤相國二年春正月有彗星見于呉楚之分西北竟天鎮東大將軍母丘儉楊州刺史文欽舉兵作亂矯太后令移檄郡國爲壇盟於西門之外各遣子四人質于呉以請救二月儉欽帥衆}
  - {type: page-break, offset: 3379, content: '', id: KR3k0012_SBCK_096-2a}
  - {type: variant, offset: 3379, length: 0, content: '', krp: 天子以玄緝之誅深不自安而亦慮難作潜謀廢立乃宻諷魏永寜太后秋九月甲戌太后下令遣使迎髙貴郷公於元城而立之改元曰正元天子受璽情惰舉趾髙帝聞而憂之及將大㑹帝訓於天子曰夫聖王重始正本敬𥘉古人所慎也明當大㑹萬衆瞻穆穆之容公卿聽玉振之音詩云示人不佻是則是効易曰出其言善則千里之外應之雖禮儀周備猶冝加之以祗恪以副四海顒顒式仰癸巳天子詔登位相國進號大都督假黄鉞入朝不趍奏事不名劒履上殿帝固辤相國二年春正月有彗星見于呉楚之分西北竟天鎮東大將軍母丘儉楊州刺史文欽舉兵作亂矯太后令移檄郡國爲壇盟於西門之外各遣子四人質于呉以請救二月儉欽帥衆}
  - {type: variant, offset: 3380, length: 0, content: '', SBCK: 萬渡淮而西帝㑹公卿謀征討計朝議多謂可遣諸將擊之王肅及尚書傅嘏中書侍郎鍾㑹勸帝自行戊午帝統中軍歩􅀐十餘萬以征之倍道兼行召三萬兵大㑹于陳許之郊甲申次于隠橋儉將史招李績相次來降儉欽移入項城帝遣荆州刺史王基進據南頓以逼之帝􅀷壁髙壘以待東軍之集諸將請進軍攻其城帝曰淮南將士夲無反志且儉欽欲蹈縱横之跡習􅁗儀之􅀃謂逺近必應而事起之日淮北不從史招李績前後瓦解内乖外叛自知必敗困獸思闘速戰便合其志雖云必剋傷人亦多且儉等欺誑將士詭變萬端少與持乆詐情自露此不戰而尅之也乃遣諸􅁑誕督豫州諸軍自安風向壽春征東將軍胡遵督青徐諸軍出譙宋之間絶其歸路帝屯汝陽遣兖州刺史鄧艾督太山諸軍進屯樂嘉示弱以誘之欽進軍將攻艾帝潜軍銜枚徑進樂嘉與欽相遇欽子鴦年十八勇冠三軍謂欽曰及其未定請登城鼔譟擊之可破也旣謀而行三譟而欽不能應鴦退相與引而東帝謂諸將曰欽走矣三鼓而欽不應其􅀔巳屈不走何侍欽將遁鴦曰不先折其􅀔不得去也乃與驍􅀐十餘摧鋒䧟陣所向皆披靡遂引去帝遣左長史司馬璉督騎驍八千翼而追之欽父子與麾下走保項城儉聞欽敗棄衆霄遁淮南安風津都尉儉斬之傳首京都欽遂奔呉淮南平􅀄帝目有瘤疾使醫割之鴦之來攻也驚而目出六軍大恐蒙之以􅀍痛甚齧􅀍敗而左右莫知焉閏}
