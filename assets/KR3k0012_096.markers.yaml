  - {type: variant, offset: 227, length: 184, content: 清河崔琰與帝兄朗善亦謂朗曰君弟聰亮明允剛斷英特非子所及也漢建安六年郡舉上計椽魏武帝為司空聞而辟之帝知漢運方微不欲屈節曹氏辤以風痺不能起居魏武使人夜往密刺之帝堅臥不動及魏武為丞相又辟為文學掾勑行者曰若復盤桓便收之帝懼而就職於是使與太子遊處遷黃門侍郎轉議郎丞相東曹屬尋轉主簿魏國既建遷太子中庶子每與大謀輒有奇策為太子所信重與陳群吳質朱鑠號為四友遷為軍司馬言於魏武曰昔箕子陳, WYG: 藥反等}
