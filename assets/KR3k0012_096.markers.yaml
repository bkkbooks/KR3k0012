  - {type: variant, offset: 1113, length: 444, content: 與曹真伐蜀軍次丹口遇雨班師明年諸葛亮寇天水圍將軍賈嗣魏平於祁山天子曰西方有事非君莫可付者乃使帝西屯長安都督雍梁二州諸軍事統車騎將軍張郃後將軍費曜征蜀護軍戴凌雍州刺史郭淮等討亮遂進軍隃式朱切麋亮聞大軍直至乃自帥眾將芟音衫上邽音圭之麥諸將皆懼帝曰亮慮多決少必安營自固然後芟麥吾得二日兼行足矣於是卷甲晨夜赴之亮望塵而遁進次漢陽與亮相遇帝列陣以待之使將牛金輕騎誘之兵纔接而亮退追至祁山亮屯鹵城據南北二山斷水為重圍帝攻之拔其圍亮霄遁追擊破之俘斬萬計天子使使勞軍增封邑二年亮又帥眾十餘萬出斜谷壘于郿音眉之渭水南原天子憂之遣征蜀將軍秦朗督步騎二萬受帝節度諸將欲住渭北待之帝曰百姓積聚皆在渭南南北必爭之地也遂引軍而濟背水為壘因謂諸將曰亮若勇者當出武功依山而東若西上五丈原則諸軍無事矣亮果上原將北渡渭帝遣將軍周當屯陽遂以餌之數日亮不動遂遣將軍胡遵雍州刺史郭淮共備陽遂與亮會于積石臨原而戰亮不得進還于五丈原會有長星墜亮之壘帝知其必敗遣奇兵椅音巳亮之後斬五百餘級獲生口千餘降者六千餘人三年遷太尉累增封邑蜀將馬岱, WYG: ''}
