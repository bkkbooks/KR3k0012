  - {type: variant, offset: 3331, length: 1, content: 久, WYG: 被痛甚齧被破而左右莫知焉閏月}
  - {type: variant, offset: 3331, length: 10, content: 久疾不任朝請每有大事, krp: 車迎豐見迫隨羡而至帝數之豐知禍及因肆惡言帝怒遣勇士以刀鐶築殺之逮捕玄緝等皆夷三族三月乃諷}
