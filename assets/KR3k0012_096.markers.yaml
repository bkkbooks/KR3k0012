  - {type: variant, offset: 2311, length: 979, content: 贊拜不名劍履上殿如蕭何故事八年夏四月曹爽用何晏鄧颺丁謐之謀遷太后於永寧宮專檀朝政兄弟並典禁兵多樹親黨屢改制度帝不能禁於是與爽有隙五月帝稱疾不與政事九年春三月黃門張當私出掖庭才人石英等一十一人與曹爽為伎人爽晏謂帝疾篤有無君之心與當密謀圖危社稷期有日矣帝亦潛為之備爽之徒屬亦頗疑帝會河南尹李勝將蒞荊州來侯帝帝詐疾篤使兩侍婢持衣衣落指口言渴婢進粥帝不能持柸飲粥皆流出霑胸勝曰眾情謂明公舊風發動何意尊體乃爾帝使聲氣纔屬說年老抱疾死在旦夕君當屈并州并州近胡善為之備恐不獲相見以子師昭弟兄為託勝曰當還忝本州非并州也帝乃錯亂其辭曰君方到并州勝復曰當忝荊州帝曰年老意荒不解君言今還本州盛德壯烈好建功勳勝退告爽曰司馬公尸居餘氣形神已離不足慮矣他日又言曰太傅不可復濟令人愴然故爽等不復設備嘉平元年春正月甲午天子謁高平陵爽兄弟皆從是日太白襲月帝於是表奏永寧太后廢爽兄弟時景帝為中護軍將兵屯司馬門帝列陣闕下經爽門爽帳不督嚴世上樓引弩將射帝孫謙止之曰事未可知三注三止皆引其肘不得發大司農桓範出赴爽蔣濟言於帝曰智囊往矣帝曰爽與範內踈而智不及駑馬戀短豆必不能用也於是假司徒高柔節行大將軍事領爽營謂柔曰君為周勃矣命太僕王觀行中領軍攝羲義營帝親帥太尉蔣濟等勒兵出迎天子屯于洛水浮橋上奏曰先帝詔陛下齊王及臣升于御床楃臣臂曰深以後事為念今大將軍爽背棄顧命敗亂國典內則僣擬外專威權群官要職皆置所親宿衛舊人並見仟黜根據槃牙縱恣日甚又以黃門張當為都監專共交關伺候神器天下洶洶人懷危懼陛下便為寄坐豈得久安此非先帝詔陛下及臣升御床之本意也臣雖朽邁敢忘前言昔趙高極意秦是以亡呂霍早斷漢祚永延此乃陛下之殷鑒臣授命之秋也公卿群臣皆以爽有無君之心兄弟不宜典兵宿衛表皇太后皇太后勑如奏施行臣輒勑主者及黃門令罷爽羲訓吏兵各以本官侯就第若稽留車駕以軍法從事臣輒力疾將兵詣洛水浮橋伺察非常爽不通奏留車駕宿伊水南伐樹為鹿角發屯兵數千人以守桓範果勸爽奉天子幸許昌傳徼徵天下兵爽不能用而夜遣侍中許允尚書陳泰詣帝以觀望風旨帝數其過失事止免官泰還以報爽勸之通奏帝又遣爽所信殿中校尉尹大目諭爽指洛水為誓爽意信之桓範等援引今古諫說萬端終不能從乃曰司馬公正當欲奪吾權耳吾得以侯還弟不失為富家翁範拊膺曰坐卿滅吾族矣遂通帝奏既而有司劾黃門張當并發爽與何晏等反事乃收爽兄弟及其黨與何晏丁謐鄧颺畢軌李勝桓範等誅之二月天子以帝為丞相增封八縣邑二萬戶, WYG: ''}
