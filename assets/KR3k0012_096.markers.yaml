  - {type: variant, offset: 3423, length: 0, content: '', SBCK: 昭哲輔弼我皇家勲徳光于四海格于上下神祗罔不尅順地平天成萬􅀖以乂應受上帝之命恊皇極之中肆予一人祗承天序以敬授爾位暦數實在爾躬允執其中天禄永終於戯王其欽順天命率修訓典厎綏四國公卿及何曽王沉等固請乃從之太始元年冬十二月景寅設壇于南郊百寮在位及匈奴南單于四夷㑹者數萬人柴燎告􅀋于上帝於是大赦改元賜天下爵人五級三年春正月癸丑白龍二見于弘農澠池丁卯立皇子􅂨爲皇太子九月甲申詔曰古者以徳詔爵以庸制禄雖爲下士猶食上農外足以奉公忘􅀻内足以養親施惠今在位者禄不代耕非所以崇化之本也其議増吏俸四年十一月巳未詔王公卿尹及郡國守相舉賢良方正直言之士十二月班五條詔書於郡國一曰正身二曰勤百姓三曰撫􅀌寡四曰敦本息末五曰去人事庚寅帝臨聽訟觀録廷尉洛陽獄囚親平决焉八年春正月癸亥帝耕于籍田二月乙亥禁雕}
