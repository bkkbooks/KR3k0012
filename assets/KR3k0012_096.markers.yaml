  - {type: variant, offset: 2789, length: 409, content: 事領爽營謂柔曰君為周勃矣命太僕王觀行中領軍攝羲義營帝親帥太尉蔣濟等勒兵出迎天子屯于洛水浮橋上奏曰先帝詔陛下齊王及臣升于御床楃臣臂曰深以後事為念今大將軍爽背棄顧命敗亂國典內則僣擬外專威權群官要職皆置所親宿衛舊人並見仟黜根據槃牙縱恣日甚又以黃門張當為都監專共交關伺候神器天下洶洶人懷危懼陛下便為寄坐豈得久安此非先帝詔陛下及臣升御床之本意也臣雖朽邁敢忘前言昔趙高極意秦是以亡呂霍早斷漢祚永延此乃陛下之殷鑒臣授命之秋也公卿群臣皆以爽有無君之心兄弟不宜典兵宿衛表皇太后皇太后勑如奏施行臣輒勑主者及黃門令罷爽羲訓吏兵各以本官侯就第若稽留車駕以軍法從事臣輒力疾將兵詣洛水浮橋伺察非常爽不通奏留車駕宿伊水南伐樹為鹿角發屯兵數千人以守桓範果勸爽奉天子幸許昌傳徼徵天下兵爽不能用而夜遣侍中許允尚書陳泰詣帝以觀望風旨帝數其過失事止免官泰還以報爽勸之通奏帝又遣爽所信殿中校尉尹大目諭爽指洛水為誓爽意信之桓範等援引今古諫說萬端終不能從乃曰司馬公, SBCK: ''}
