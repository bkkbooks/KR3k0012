  - {type: variant, offset: 3330, length: 0, content: '', WYG: 潛軍銜枚徑進樂嘉與欽相遇欽子鴦年十八勇冠三軍謂欽曰及其未定請登城鼓譟擊之可破也既謀而行三譟而欽不能應鴦退相與引而東帝謂諸將曰欽走矣三鼓而欽不應其勢已屈不走何待欽將遁鴦曰不先折其勢不得去也乃與驍騎十餘摧鋒陷陣所向皆披靡遂引去帝遣左長史司馬璉督驍騎八千翼而追之欽父子與麾下走保項城儉聞敗棄衆宵遁淮南安風津都尉追斬儉傳首京都欽遂奔吳淮南平初帝目有癅疾使醫割之鴦之來攻也驚而目出恐六軍知之蒙之}
