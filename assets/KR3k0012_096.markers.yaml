  - {type: variant, offset: 3419, length: 2, content: 上雖, SBCK: 武皇帝諱炎字安世文帝長子也寛惠仁厚沉􅀷有度量魏嘉平中封北平亭侯歴給事中奉車都尉中壘將軍加散􅀐常侍累遷中護軍假節迎常道郷公於東武陽遷中撫軍進封新昌郷侯及􅀳國建立爲世子拜撫軍大將軍開府副貳相國􅀄文帝以景帝旣宣皇之嫡早世無後以帝弟攸爲嗣特加愛異自謂攝居相位百年之後大業冝歸攸毎曰此景帝之天下也吾何與焉將議立世子屬意於攸何曽等固爭曰中撫軍聦明神武有超世之才髮委地手過􅂰此非人臣之相也由是遂定咸熈二年五月立爲晉王太子八月辛夘文帝崩太子嗣相國晉王位十一月乙未令諸郡中正以六條舉淹滯是時晋徳旣洽四海宅心於是天子知歴數有在乃使太保鄭冲奉䇿曰咨爾晉王我皇祖有虞氏誕膺靈運受終于陶唐亦以命于有夏惟三后陟配于天而咸用光敷聖徳自兹厥後天又輯音集大命于漢火徳旣衰乃眷命我髙祖方軌虞夏四代之明顯我弗敢知惟王乃祖乃父}
