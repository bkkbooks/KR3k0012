  - {type: variant, offset: 3431, length: 0, content: '', SBCK: 下東西凡二十餘萬以太尉賈充爲大都督行冠軍楊濟爲副㹅統衆軍十萬太康元年春正月巳丑朔五色氣貫日癸巳王渾尅呉㝷陽頼卿諸城獲呉武威將軍周興二月戊午王濬唐彬等尅丹陽城庚申又尅西陵壬戍濬又尅夷道樂郷城甲戍杜預尅江陵三月壬申王濬以舟師至于建業之石頭孫皓大懼面縛輿櫬降于軍門濬杖節解縛焚櫬送于京師收其圖籍尅州四郡四十三縣三百一十三户五十二萬三千吏三萬二千兵二十三萬男女二百三十萬其收守以下皆因吴所置除其苛政示之簡昜呉人大恱乙酉大赦改元賜酺五日恤􅀌老困窮九月羣臣以天下一統屢請封禪帝謙謙弗許泰熈元年春正月辛酉改元夏四月巳酉帝崩于含章殿時年五十五在位二十五年葬峻陽陵廟號丗祖謝靈運諭曰丗徂受命禎祥屢臻苛慝不作萬國欣戴逺至迩安徳足以彰天啓其運民樂其功矣反古之道當以羙事爲先今五等罔刑并田王制凡諸禮律未能是正而採擇嬪媛不拘華門者昔武王伐紂歸傾宫之女不以助紂爲虐而世祖平皓納呉妓五千是同皓之􅁦婦人之封六國亂政如追贈外曽祖母違古之道凡此非事並見前書誠有􅀧於徽猷史氏所不敢蔽也唐太宗􅀳武帝紀論曰武皇承基誕膺天命握圖御㝢敷化􅀪道民以佚而代勞世以治而昜亂絶縑綸之貢去雕􅅣之飾制奢俗以變約俾澆風而反淳}
