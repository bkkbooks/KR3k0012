  - {type: variant, offset: 2007, length: 302, content: 廷聞師遇雨咸謂召還天子曰司馬公臨危制變計日擒之矣既而雨止遂合圍起土山地道楯櫓釣橦發矢石雨下晝夜攻之文懿大懼乃使其所署相國王建御史大夫柳甫乞降請解圍面縛不許執建等皆斬之文懿復遣侍中衛演乞剋日送任而守者日軍事大要有五能戰當戰不能戰當守不能守當走餘二事唯有降與死耳汝不肯面縛此為決就死也不須送任文懿攻南圍突出帝縱兵擊敗斬于梁又作沮水上時有兵士寒凍乞襦帝弗之與或曰幸多故襦可以賜之帝曰襦者官物人臣無私施也遂班師天子遣使者勞軍于薊增封食昆陽并前三縣及齊王即位遷侍中持節都督中外諸軍錄尚書事與曹爽各統兵三千人共執朝政更直殿中乘輿入殿爽欲使尚書奏事先由已乃言於天子徙帝為大司馬朝議以為前後大司馬累薨於位乃以帝為太傅入殿, WYG: ''}
