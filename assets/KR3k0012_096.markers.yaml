  - {type: variant, offset: 3426, length: 4, content: 儒素立德, SBCK: 阿媚爲患豈以爭臣爲損哉徽越職妄奏豈朕之意遂免徽官咸寜四年十一月太醫司馬程據獻雉頭裘帝以竒􅇊異服非典禮焚之于殿前五年大舉伐呉遣鎮東將軍瑯瑘王伷出徐中安東將軍王渾出江西建威將軍王戎岀武昌平南將軍胡􅁬出夏口鎮南大將軍杜預岀江陵龍驤將軍王濬廣武將軍唐彬率巴蜀之卒浮江}
  - {type: variant, offset: 3426, length: 2, content: 儒素, WYG: 阿媚為患豈以争臣為損哉徽越職妄奏豈朕之意遂免徽官咸寧四年十一月大醫司馬程據獻雉頭裘帝以竒伎異服非典禮焚之于殿前五年大舉伐吳遣鎮東將軍琅琊王伷出涂中安東將軍王渾出江西建威將軍王戎出武昌平西將軍胡奮出夏口鎮南大將軍杜預出江陵龍驤將軍王濬廣武將軍唐彬率巴蜀之卒浮江而下東西凡二十餘萬以太尉賈充為大都督行冠軍楊濟為副總統衆軍十萬太康元年春正月己丑朔五色氣冠日癸巳王渾克吳尋陽賴鄉諸城獲吳武威將軍周興二月戊午王濬唐彬等克丹陽城庚申又克西陵壬戌濬又克夷道樂鄉城甲戌杜預克江陵三月壬申王濬以舟師至於建業之石頭孫皓大懼面縛輿櫬降于軍門濬杖節解縛焚櫬送于京師収其圖籍克州四郡四十三縣三百一十三户五十二萬三千吏三萬二千兵二十三萬男女二百三十萬其牧守已下皆因吳所置除其苛政示之簡易吳人大悦乙酉大赦改元賜酺五日恤孤老困窮九月羣臣以天下一統屢請封禪帝謙讓弗許太熙元年春正月辛酉改元夏四月己酉帝崩于含章殿時年五十五在位二十五年葬峻陽陵廟號世祖謝靈運論曰世祖受命禎祥屢臻苛慝不作萬國欣戴逺至邇安大化覃被天啟其運民樂其功矣反古之道以㳟儉為先今五等罔刑井田王制凡諸禮律未能定正而採擇嬪媛不拘華門者昔武王伐紂歸傾宫之女不以助紂為虐而世祖平皓納吳妓五千是同皓之弊婦人之封六國亂政如追贈外曾祖母違古之道凡此非事並見前書誠有玷於徽猷史氏所不敢蔽也唐太祖晉武帝紀論曰武皇承基誕膺天命握圖御宇敷化宏道民以佚而代勞世以治而易亂絶縑綸之貢去雕琢之飾制奢俗以變約俾澆風而反淳雅好言直畱心採擢劉毅裴楷以質直而見容嵇紹許竒雖仇讎而不棄仁以御物寛而得衆宏畧大度有帝王之量焉于時民和俗靜家給民足聿修武用思啓封疆决神算於深衷斷雄圖於議表馬隆西伐王濬南征師不延時獯虜削跡兵無血刃揚越為墟通近代之不通服前王之不服禎祥顯應風教肅清天地之功成矣霸王之業大矣雖登封之禮讓之而不為而驕泰之心因斯以起見土地之廣謂萬葉而無虞覩天下之安謂千年而永治不知處廣以思狹則廣可長存居治而忘危則治無常治加之建}
