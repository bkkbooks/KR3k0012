  - {type: 'tls:seg', offset: 3592, content: '', id: KR3k0012_CHANT_096-2a.26}
  - {type: variant, offset: 3592, length: 1, content: 爽, krp: 寛惠仁厚沉深有度量魏嘉平中封北平亭侯歴給事中奉車都尉中壘將軍加散騎常侍累遷中護軍假節迎常道郷公於東武陽遷中撫軍進封新昌郷侯及晉國建立爲世子拜撫軍大將軍開府副貳相國𥘉文帝}
  - {type: variant, offset: 3594, length: 5, content: 勢族致誅玄, SBCK: 喪身所謂取輕徳而捨重功畏小忍而忘大孝聖賢之道豈􅀂斯乎雖則善始於􅀄而乖令終於末所}
  - {type: variant, offset: 3594, length: 5, content: 勢族致誅玄, krp: 景帝旣宣皇之嫡早世無後}
  - {type: punctuation, offset: 3598, content: ，, id: KR3k0012_CHANT_096-bkkpn827}
  - {type: 'tls:seg', offset: 3598, content: '', id: KR3k0012_CHANT_096-2a.27}
  - {type: variant, offset: 3600, length: 4, content: 時望被戮, SBCK: 殷勤史䇿不能無慷􅁣焉太平御覽卷第九十六}
  - {type: variant, offset: 3600, length: 0, content: '', krp: 帝弟攸爲嗣特加愛異自謂攝居相位百年之後大業冝歸攸毎曰此景帝之天下也吾何與焉將議立世子屬意於攸何曽等固爭曰中撫軍聦明神武有超世之才髮委地手過膝此非人臣之相也由是遂定咸熈二年五月立爲晉王太子八月辛夘文帝崩太子嗣相國晉王位十一月乙未令諸郡中正以六條舉淹滯是}
  - {type: variant, offset: 3601, length: 0, content: '', krp: 晋徳旣洽四海宅心於是天子知歴數有在乃使太保鄭冲奉䇿曰咨爾晉王我皇祖有虞氏誕膺靈運受終于陶唐亦以命于有夏惟三后陟配于天而咸用光敷聖徳自兹厥後天又輯音集大命于漢火徳旣衰乃眷命我髙祖方軌虞夏四代之明顯我弗敢知惟王乃祖乃父服膺昭哲輔弼我皇家勲徳光于四海格于上下神祗罔不尅順地平天成萬邦以乂應受上帝之命恊皇極之中肆予一人祗承天序以敬授爾位暦數實在爾躬允執其中天禄永終於戯王其欽順天命率修訓典厎綏四國公卿及何曽王沉等固請乃從之太始元年冬十二月景寅設壇于南郊百寮在位及匈奴南單于四夷㑹者數萬人柴燎告類于上帝於是大赦改元賜天下爵人五級三年春正月癸丑白龍二見于弘農澠池丁卯立皇子衷爲皇太子九月甲申詔曰古者以徳詔爵以庸制禄雖爲下士猶食上農外足以奉公忘私内足以養親施惠今在位者禄不代耕非所以崇化之本也其議増吏俸四年十一月巳未詔王公卿尹及郡國守相舉賢良方正直言之士十二月班五條詔書於郡國一曰正身二曰勤百姓三曰撫孤寡四曰敦本息末五曰去人事庚寅帝臨聽訟觀録廷尉洛陽獄囚親平决焉八年春正月癸亥帝耕于籍田二月乙亥禁雕文綺組非禮法之物詔内外群官舉任邊郡者三人帝與右將軍皇甫陶論事陶與帝爭言散騎常侍鄭徽表請罪之帝曰謹言謇諤所}
  - {type: variant, offset: 3602, length: 2, content: 被戮, krp: 於左右也人主常以阿媚爲患豈以爭臣爲損哉徽越職妄奏豈朕之意遂免徽官咸寜四年十一月太醫司馬程據獻雉頭裘帝以竒伎異服非典禮焚之于殿前五年大舉伐呉遣鎮東將軍瑯瑘王伷出徐中安東將軍王渾出江西建威將軍王戎岀武昌平南將軍胡奮出夏口鎮南大將軍杜預岀江陵龍驤將軍王濬廣武將軍唐彬率巴蜀之卒浮江而下東西凡二十餘萬以太尉賈充爲大都督行冠軍楊濟爲副㹅統衆軍十萬太康元年春正月巳丑朔五色氣貫日癸巳王渾尅呉㝷陽頼卿諸城獲呉武威將軍周興二月戊午王濬唐彬等尅丹陽城庚申又尅西陵壬戍濬又尅夷道樂郷城甲戍杜預尅江陵三月壬申王濬以舟師至于建業之石頭孫皓大懼面縛輿櫬降于軍門濬杖節解縛焚櫬送于京師收其圖籍尅州四郡四十三縣三百一十三户五十二萬三千吏三萬二千兵二十三萬男女二百三十萬其收守以下皆因吴所置除其苛政示之簡昜呉人大恱乙酉大赦改元賜酺五日恤孤老困窮九月羣臣以天下一統屢請封禪帝謙謙弗許泰熈元年春正月辛酉改元夏四月巳酉帝崩于含章殿時年五十五在位二十五年葬峻陽陵廟號丗祖謝靈運諭曰丗徂受命禎祥屢臻苛慝不作萬國欣戴逺至迩安徳足以彰天啓其運民樂其功矣反古之道當以羙事爲先今五等罔刑并田王制凡諸禮律未能是正而採擇嬪媛不拘華門者昔武王伐紂歸傾宫之女不以助紂爲虐而世祖平皓納呉妓五千是同皓之弊婦人之封六國亂政如追贈外曽祖母違古之道凡此非事並見前書誠有點於徽猷史氏所不敢蔽也唐太宗晉武帝紀論曰武皇承基誕膺天命握圖御㝢敷化弘道民以佚而代勞世以治而昜亂絶縑綸之貢去雕琢之飾制奢俗以變約俾澆風而反淳雅好直言留心採擢劉毅裴楷以質直而見容嵇紹許竒雖仇讎而不棄仁以御物寛而得衆宏略大度有帝王之量焉于時民和俗静家給民足聿脩武用思啓封疆次神筭於深衷斷雄圖於議表馬隆西伐王濬南征師不延時獯虜削跡兵無血刃揚越爲墟通近代之不通服前王之不服禎祥顯應風教肅清天地之功成矣霸王之業大矣雖登封之禮讓而不爲而驕泰之心因斯以起見土地之廣謂萬葉而無虞都天下之安謂千年而永治不知處廣以思狹則廣可長存居治而忘危則治無常治加之建立非所委寄失才志欲就于升平行先迎於禍亂是猶將適越者指沙漠而遵途欲登山者渉舟航而覔路所趣逾逺所向轉難南北倍殊髙下相反求其至也不亦難乎況以新習易動之基而無乆安難拔之慮故賈充兇堅懷姧志而擁權楊駿豺狼包禍心以專輔及乎宫車晚出諒闇未周藩翰變親以成踈連兵競滅其本棟梁廻忠而起僞擁衆各舉其威曽未數年綱紀大亂以至海内版蕩宗廟播遷帝道王猷反居文身之俗神州赤縣翻成𬒳髮之郷弃所大以資人掩其小而自託爲天下笑其故何哉良由失愼於前所以貽患於後且知子者賢父知臣者明君子不肖則家亡臣不忠則國亂亂國不可以安也亡家不可以全也是以君子防其始聖人閉其端而世祖惑荀朂之姧謀迷王渾之僞䇿心屢移於衆口事不定於巳圖元海當除而不除卒令擾亂區夏惠帝可廢而不廢終使傾覆洪基夫全一人者徳之輕極天下者功之重棄一子者忍之小安社稷者孝之大况乎資二丗而成業延三孽以喪身所謂取輕徳而捨重功畏小忍而忘大孝聖賢之道豈若斯乎雖則善始於𥘉而乖令終於末所以殷勤史䇿不能無慷慨焉太平御覽卷第九十六}
