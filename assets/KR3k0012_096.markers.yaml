  - {type: variant, offset: 3420, length: 1, content: 雖, WYG: 景皇帝之母弟魏景初三年封新城鄉侯正元初為洛陽典農中郎將値魏明奢侈之後帝蠲除苛辟不奪農時百姓大悦轉散騎常侍大將軍曹爽之伐蜀也以帝為征蜀將軍副夏侯𤣥出駱谷次于興勢蜀將王林夜襲帝營帝堅卧不動林退帝謂𤣥曰費禕以據險拒守進不獲戰攻之不可宜亟旋軍以為後圖爽等引還褘果馳兵趣三嶺争險乃得過還拜議郎及誅曹爽帥衆衛二宫以功增邑千户高貴鄉公之立也以參定䇿進封高都侯邑二千石毌丘儉文欽之亂大軍東征帝兼中領軍畱鎭洛陽及景帝疾篤帝自京師省疾拜衞將軍景帝崩天子命帝鎭許昌尚書傅嘏帥六軍還京帝用嘏及鍾㑹䇿自帥軍而還至洛陽進位大將軍加侍中都督中外諸軍録尚書事輔政劒履上殿固辭不受甘露元年春加大都督奏事不名夏六月進封高都公地方七百里加之九錫假斧鉞進號大都督劒履上殿又固辭不受秋八月庚申加假黃鉞増封三縣二年夏五月辛未鎭東大將軍諸葛誕殺揚州刺史樂琳以淮南作亂遣子靚音浄為質於吳以請救議者請速伐之帝曰誕以毌丘儉輕疾傾覆今必外連吳㓂此為變大而遲吾當與四方同力全勝制之秋七月奉天子及皇太后東征徵兵青徐荆豫分取關中遊軍皆㑹淮北師次于項城假廷尉何楨節度淮南宣慰將士申明逆順示以誅賞甲戌帝進軍丘頭因命合圍三年春正月諸葛誕文欽等出攻長圍諸軍逆擊走之初誕欽内不相協及至窮蹙轉相疑貳㑹欽計事於誕忤誕手刃殺欽欽子鴦攻誕不克踰城降以為將軍封侯因使鴦廵城而呼帝見城上持弓者不發謂諸將曰可攻矣二月乙酉攻而拔之斬誕夷三族四月歸于京師魏帝今改丘頭為武丘以旌武功五月天子以并州太原上黨西河樂平新興鴈門司州之河東平陽八郡地方七百里封帝為晉公加九錫進位相國九讓乃止景元元年夏四月天子既以帝三世宰輔政非已出情不能安又慮廢辱將臨軒召百僚而行放黜五月戊子夜使冗從僕射李昭等發甲於凌雲臺召侍中王沈散騎常侍王業尚書王經出懷中黃素詔示之戒嚴俟旦沈業馳告于帝召護軍賈充等為之備天子知事泄帥左右攻相府稱有所討敢有動者族誅相府兵將止不敢戰賈充叱諸將曰公畜養汝輩正為今日耳太子舍人成濟抽戈犯蹕天子崩于車中帝召百僚謀其故僕射陳泰不至帝遣其舅荀顗輿致之延于曲室謂曰𤣥伯天下其如我何泰曰唯斬賈充可以謝天下帝曰卿更思其次泰曰但見其上不見其次於是歸罪成濟而斬之與公卿議立燕王宇之子常道鄉公璜音黄為帝二年秋八月甲寅天子使太尉高柔授帝相國印司空鄭沖致晉公茅土九錫固辭三年夏四月肅愼來獻楛矢石弩弓甲貂皮等天子命歸大將軍府四年夏帝將伐蜀徵四方之兵十八萬使鄧艾自狄道攻姜維於沓中雍州刺史諸葛緒自祁山軍武街絶維歸路鎭西將軍鍾㑹帥前將軍李輔征蜀護軍胡烈等自駱谷襲漢中秋八月軍發洛陽大賚將士陳師誓衆將軍鄧敦謂蜀未可討帝斬以徇九月使天水太守王頎攻維營隴西太守牽𢎞邀其前金城太守楊欣趣甘松鍾㑹分為二隊入自斜谷使李輔圍王含於樂城又使部將易愷攻蔣斌於漢城㑹直指陽安護軍胡烈攻陷關城姜維聞之引還王頎追敗維於强川維與張翼廖化合軍守劒閣鍾㑹攻之冬十月天子以諸侯獻捷交至詔加九錫帝乃受命十一月鄧艾帥萬餘人自陰平踰絶險至於江油破蜀將諸葛瞻於綿竹斬瞻傳首遂進軍雒縣劉禪降天子命晉公以相國總百揆於是上節傳去侍中大都督録尚書之號焉咸熙元年春正月乙丑帝奉天子西征次至于長安遣護軍賈充持節督諸軍據漢中鍾㑹遂反於蜀監軍衞瓘右將軍胡烈攻㑹斬之丙辰帝至自長安三月乙夘進爵為王增封并前二十郡冬十月庚午天子命中撫軍新昌鄉侯炎為晉世子二年五月天子命帝冕十有二旒建天子旌旗出警入蹕乗金根車駕六馬備五時副車置旄頭雲罕樂舞八佾設鐘簴音巨宫縣位在燕王上進王妃為王后世子為太子王女王孫爵命之號皆如帝者之儀秋八月辛夘帝崩于靈寢時年五十五九月癸酉葬崇陽陵諡曰文王武帝受禪追尊號曰文皇帝廟稱太祖世祖武皇帝晉書曰武皇帝諱炎字安世文帝長子也寛惠仁厚沈深有度量魏嘉平中封北平亭侯厯給事中奉車都尉中壘將軍加散騎常侍累遷中護軍假節迎常道鄉公於東武陽遷中撫軍進封新昌鄉侯及晉國建立為世子拜撫軍大將軍開府副貳相國初文帝以景帝既宣皇之嫡早世無後以帝弟攸為嗣特加愛異自謂攝居相位百年之後大業宜歸攸每曰此景帝之天下也吾何與焉將議立世子屬意於攸何曾等因爭曰中撫軍聰明神武有超世之才髮委地手過膝此非人臣之相也由是遂定咸熙二年五月立為晉王太子八月辛夘文帝崩太子嗣相國晉王位十一月乙酉令諸郡中正以六條舉淹滯是時晉德既洽四海宅心於是天子知厯數有在乃使太保鄭沖奉䇿曰咨爾晉王我皇祖有虞氏誕膺靈運受終于陶唐亦以命于有夏惟三后陟配于天而咸用光敷聖德自兹厥後天又輯音集大命于漢火德既衰乃眷命我高祖方軌虞夏四代之明顯我弗敢知惟王乃祖乃父}
