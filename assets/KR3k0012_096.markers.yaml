  - {type: variant, offset: 3429, length: 0, content: '', WYG: 非所委寄失才志欲就于升平行先迎于亂禍是猶將適越者指沙漠而遵途欲登山者涉舟航而覔路所趣逾逺所向轉難南北倍殊高下相反求其至也不亦難乎况以新集易動之基而無久安難拔之慮故賈充兇豎懷姦志而擁權楊駿豺狼包禍心以專輔及乎宫車晩出諒闇未周藩翰變親以成疎連兵競滅其本棟梁迴忠而起偽擁衆各舉其威曾未數年綱紀大亂以至海内板蕩宗廟播遷帝道王猷反居文身之俗神州赤縣翻成被髮之鄉棄所大以資人掩其小而自託為天下笑其故何哉良由失愼於前所以貽患於後且知子者賢父知臣者明君子不肖則家亡臣不忠則國亂國亂不可以安也家亡不可以全也是以君子防其始聖人閉其端而世祖惑荀朂之奸謀迷王渾之偽䇿心屢移於衆口事不定於已圖元海當除而不除卒今擾亂區夏惠帝可廢而不廢終使傾覆洪基夫全一人者德之輕極天下者功之重棄一子者忍之小安社稷者孝之大况乎資二世而成業延三孽以喪身所謂取輕}
