  - {type: variant, offset: 863, length: 1, content: 際, SBCK: 性髙髙下下今而反之旣非其理􅀂九河盛溢洪水爲害丘陵皆夷何以禦之乃止晉書曰武帝問尚書郎虞摯三日曲水事摯曰漢章帝時平原徐肇以三月􅀄生三女至三日俱亡一村以爲怪乃相携至水邊洗除因流水以濫觴遂以成俗帝曰􅀂如所􅀃非嘉事也尚書郎束晳對曰虞摯小生未究其夲此事起自周公卜成洛邑因流水泛酒故逸詩羽觴隨波流及秦昭王時三月上巳日置酒河曲遂有金人自泉而出捧水心劒於王曰令君制有西夏此即其處因立爲曲水}
