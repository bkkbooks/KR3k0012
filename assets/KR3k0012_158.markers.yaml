  - {type: variant, offset: 949, length: 1830, content: 地也又曰順帝時李固上書曰夫天下之大譬一人之身本朝者心腹也州郡者四支也心腹病則四支不舉故臣之憂在心腹之疾非四支之患應劭漢官儀曰孝武皇帝南平百越北攘戎狄置交阯朔方之州復徐梁之地改雍曰梁改梁曰益凡十三州所以交朔獨不稱州明示帝王未必相襲始開北方遂交南方為子孫基阯也漢官解詁曰冀趙常山胡廣注曰經曰冀州既載居趙國今治常山兗衛濟河經曰濟河惟兗州衛國今治山陽青齊海岱經曰海岱惟青州居齊國今治焉徐魯淮沂經曰海岱及淮惟徐州又曰淮沂其又居魯國今居豫州而治東海楊吳彭蠡經曰淮海惟揚州又曰彭蠡既瀦居吳國今治九江荊楚衡陽經曰荊及衡陽惟荊州居楚國今治武陵益庸岷梁經曰華陽黑水惟梁州漢改梁州為益州合治廣漢涼邠黑水經曰黑水西河惟雍州居邠國漢改雍州為邠州國右扶鳳拘邑縣屬司隸部不復屬州今治漢陽雍別朔方漢別雍州之地置朔方刺史交阯南越漢平南越之地置交阯刺史列諸州治蒼梧幽燕朝鮮經無幽州而周官有焉蓋冀之別也居燕國今廣陽是并代晉翟經無并州而周官有蓋州之別也居燕國今廣陽是淮南子曰天地之間九州八柱又曰九州大統方千里九州之外乃有八寅亦千里又曰何謂九州東南神州曰晨土東南晨焉後稷所經緯也故曰神土也正南次州曰沃土沃盛也五月建午稼穡長故曰沃土西南戎州曰滔土滔大也七月建申萬物壯大故曰滔土正西弇州曰并土并猶成八月建酉百穀成熟故曰并也正中冀州曰中土冀大也為四方內主故曰中土西北括州曰肥土正北濟州曰成土未聞東北薄州曰隱土薄猶平也陰氣所隱伏也故曰隱土正東楊州曰申土申復也陰氣盡所隱伏也東北陽氣復起東方故曰申土輿地志曰周成王時周公作輔定官分職改禹九州以徐梁合之於青分冀州之域為幽并二州風俗通曰周禮五黨為州州疇也州有長使之相周足也物理論曰九州變易交錯不同禹貢有梁州無并州周官有并州爾雅有營州無青州漢興武帝開拓三方立十三州通并梁之數而增交益焉太一式占周公城名錄曰黃帝受命風后受圖割地布九州置十二圖張衡靈憲曰崑崙東南有赤縣之州風雨有時寒暑有節茍非此土南則多暑北則多寒東則多陰故聖王不處焉敘郡釋名曰郡群也人所群聚也秦改諸侯置郡縣隨其所在山川土形而立其名史記曰秦始皇廢五等之爵立郡縣之官以公國為大以侯伯為小大郡曰守小郡曰都漢書地理志曰漢孝平時凡郡國一百三十二侯國二百四十一又曰六郡者金城隴西天水安定北地上郡也續漢書郡國志曰光武中興命併省郡國明章和至于順帝凡郡國一百五仍為十三郡又曰光武以官多役煩乃併省郡國十凡縣道侯國四百餘所後為十三州部司隸理河南今洛陽豫州理亳州兗州理昌邑今兗州金鄉縣徐州理剡今泗州下邳縣青州理臨淄今青州臨淄縣涼州理隴今秦州隴城縣并州理晉陽今太原冀州理鄗音郝都今趙州高邑縣幽州理薊今幽州薊縣楊州理歷陽今和州縣荊州理漢壽今朗州武陵縣交州理廣信今梧州蒼梧縣至于末加置郡國百有五凡縣道侯國千一百八十東有樂浪郡西有燉煌郡南有日南郡北有鴈門郡西南有永昌郡廣袤如前漢通典曰秦始皇帝併天下分置三十六郡三十六者三川河東南陽南郡九江鄣郡會稽頴川碭郡泗水薛郡瑯琊齊郡上谷漢陽右北平遼西遼東代郡鉅廢邯鄲上黨太原雲中九原雁門上郡隴西北地漢中巴郡蜀郡黔中長沙凡三十五輿內史為三十六郡郡各領縣縣萬戶已上為令減萬戶為長平百越又置西郡閩中南海桂林象海合四十郡置一守一丞兩尉以典之監侍御史掌監諸郡漢有天下王侯郡國並置焉迄于平帝戶口繁息凡新置郡國六十七與秦三十六合一百三改周雍州曰涼州復置夏之徐梁二州而改梁曰益北置朔方南有交阯別置二刺史凡十三郡涼益荊楊青豫兗徐幽并冀十一州交阯朔方二刺史合十三部刺史十三人各掌一州又曰後漢魏武輔政吳蜀三方鼎跱疆場不定建安中置郡十二新興樂平西平新平略陽陰平帶方譙郡樂陵章武南陽襄陵是也又省上郡朔方五原雲中定襄漁陽廬江等七郡文帝受禪又置七郡朝歌陽平弋陽魏興新成美陽安豐也明帝置六郡平公孫度得遼西遼東帶方玄菟樂浪又置上庸一郡少帝又置平陽一郡并得漢舊郡國五十四平蜀得二十郡劉備初置郡九巴東巴西梓潼江陽文山漢嘉朱提雲南涪陵并得漢舊巴郡廣漢犍為祥拘越嶲益州漢中永昌南安武都也晉太康平吳之後天下一統平吳得州四交廣荊楊也郡四十三凡州十六太康地記曰司冀兗豫楊徐青幽并雍涼梁益交廣荊也晉自湯陰敗後羌羯交侵至乎劉曜陷洛陽於是司冀雍涼青并兗豫幽平秦營十二州並淪沒矣後魏孝文帝都洛陽開拓土宇明帝熙平元年凡州四十六鎮十二都國二百八十九矣天平年凡州六十八至武定年凡州一百一十一郡五百一十九周明帝受魏禪至大象二年凡州二百一十一隋文帝受周禪至開皇三年罷天下郡其縣但隸州而已九年平陳已後四海一家大業三年罷州為郡四年大簿凡郡國一百八十三唐貞觀十三年大簿凡州府三, SBCK: ''}
