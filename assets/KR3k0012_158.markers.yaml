  - {type: variant, offset: 344, length: 0, content: '', WYG: 牟武陽宋州之襄邑曹州之戴邑許州之扶溝鄢陳州之太康九縣𨽻焉後唐復降爲汴州以宣武軍爲額其武陽長垣扶溝考城等四縣仍且𨽻汴州其餘五縣却還本部晉天福中復升爲東京復以前五縣𨽻之漢周並因之太康地記曰豫州之分其人得中和之氣性安舒其俗阜其人和今俗多寛慢漢志曰開封逢池在東北或曰宋之逢澤也瓚曰汲郡古文梁惠王廢逢忌之藪以賜民今浚儀是也史記王稽與范雎言曰先生待我于三亭之南三亭今屬浚儀陳留風俗記曰阮簡為開封令時外白有刼賊甚急簡方圍棋長嘯曰局上刼亦急徐廣史記音義曰秦孝公㑹諸侯於蓬澤圖經曰浚儀有高陽故城顓頊高陽氏佐少昊有功封於此城又曰浚儀有信陵亭在城内即魏國公子無忌勝槩之地左傳曰韓起送女於楚還過鄭鄭伯勞諸圉今圉城是也漢志曰陳留郡鄭邑後爲陳所併故曰陳留瓚曰宋亦有留彭城留是也留屬陳故稱陳留也古史考曰伊尹生於空桑陳留有空桑故城家語曰孔子南遊於楚至阿谷之隧使子貢奉觴從女子乞飲今陳留阿谷水漢志曰雍丘屬陳留故杞國周武王封禹後東樓公左傳曰衛侯伐鄭至于鳴鴈在雍丘有鳴鴈亭左傳曰齊桓公㑹諸侯于葵丘今在雍丘縣漢志曰陳留郡東昏莽改曰東明又曰襄邑屬陳留有服官莽曰襄平師古曰襄邑宋地本承匡襄陵鄉宋襄公所葬故曰襄陵秦始皇以承匡卑濕故徙縣于襄陵謂之襄邑縣陳留風俗傳曰襄邑縣南有睢水渙水傳曰睢渙之水岀文章故有黼黻藻錦日月華蟲以奉天子宗廟御服焉左傳曰宣二年鄭破宋師于大棘杜預曰在襄邑後漢地理志曰陳留郡邑已吾有大棘鄉國都記云封丘衛地故燕之延鄉也高祖與項羽戰于延鄉有翟母免其難故以延鄉封翟母焉漢志曰封丘屬陳留郡孟康曰春秋傳敗翟于長丘今翟溝是也漢志曰尉氏屬陳留郡應劭曰古獄官曰尉氏鄭之别獄也瓚曰鄭大夫尉氏之邑遂以爲邑師古曰鄭大夫尉氏亦以掌獄之官故爲族耳後漢地理志曰陳留郡尉氏有陵樹鄉鄉北有澤澤北有天子苑囿有秦樂廐漢以馴養猛獸漢志曰外黃屬陳留郡張晏曰魏郡有内黃故加外耳瓚曰縣有黃溝故氏之也左傳曰惠公敗宋師于黃杜注外黃縣東有黃城陳留風俗傳曰沛公起兵野戰喪皇妣於皇鄉天下平定乃使使者以梓宫招魂於野有丹蛇自洒濯入梓宫其浴處仍有遺髪其處在小黃屬陳留漢志曰長垣屬陳留郡莽曰長固孟康曰春秋㑹於匡今匡城是晉地道記曰長垣古衛故匡城地孔子所厄處也地道記曰承匡城在縣西左傳文十一年㑹晉卻缺于承匡是也漢志曰鄢屬陳留莽曰順通左傳隱公曰鄭伯克段于鄢又鄭大叔侵鄭至于廩延注曰縣北有延津後漢地理志曰即酸􅀥也戰國䇿云齊欲伐辛取周九鼎顔率曰夫梁之君臣欲得九鼎謀於沙海之上爲日久矣陳留風俗傳曰縣有倉頡師曠城其城有列山吹臺梁王増築之以爲吹臺史記曰大梁城有十二門東門曰夷門隱士侯嬴年七十家貧爲大梁夷門抱關者魏公子無忌厚遺之不肯受水經曰大禹塞滎陽澤開渠以通淮泗}
