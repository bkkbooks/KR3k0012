  - {type: variant, offset: 614, length: 1, content: 壤, SBCK: 元和郡縣志曰河南府三代皆爲都邑周公營之爲成周秦爲三川郡漢爲河南郡後漢光武都之左傳曰􅀄平王東遷辛有適伊川見􅀍髮而􅀕於野者曰不及百年此其戎乎其禮先亡矣帝王丗紀曰周襄王十五年秦晉遷陸渾之戎于伊川果辛有之言又曰晉趙鞅納王使汝寛守闕塞服䖍曰闕塞南}
