  - {type: variant, offset: 345, length: 0, content: '', SBCK: 莨菪渠即汴渠也漢平帝時河汴決壞後明帝遣使者修治汴渠至隋大業中更令開導名通濟渠引河水入汴口自大梁之東引入泗連于淮至江都宮入于海亦謂之御河河畔築御道植栁煬帝廵幸乗龍舟而徃江都自楊益湘南至交廣閩中公私漕運商旅軸轤相接隋書}
