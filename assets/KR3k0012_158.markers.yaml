  - {type: variant, offset: 2783, length: 2669, content: 敘之為十道應劭漢官儀曰秦用李斯議分天下為三十六郡凡郡或以列國陳魯齊吳是也或以舊邑長沙丹陽是也或以山大山山陽是也或以川源西河河東是也或以所出金城城下有金酒泉泉味如酒豫章章樹生庭中鴈門鴈之所育是也或以號令禹合諸侯大計東冶之山會稽是也京兆絕高曰京京大也十億曰兆欲令帝都殷盈也左輔右弼蕃翊承風也張掖始開垂張臂掖也黃恭十四州記曰秦兼天下始皇二十六年廢五等之爵立郡縣之官以公國為大侯伯為小大郡曰守小郡曰都尉都尉之言君改公侯之封而言君者君至尊也言郡守專權君臣之禮更宗也今之郡字君在其左邑在其右君為元首邑以載民故取名於君而謂之郡也風俗通曰周制天子方千里分為百縣縣有四郡故左氏傳曰上大夫受縣下大夫受郡敘縣釋名曰縣懸也懸係於郡也說文曰縣邑也從口已聲周書曰郊田方六百里因四土為方千里分以百縣縣有四郡郡有鄙鄙不過百室以便野事周禮地官遂人曰五家為鄰五鄰為里四里為鄻五鄻為鄙五鄙為縣五縣為遂禮記王制曰天子之縣內方百里之國九七十里之國二十有一五十里之國六十有三凡九十三國縣內夏時天子所居州界也黃恭十四州記曰縣萬戶以上為令則子國也千戶為長男國也今人呼縣為百里子男本方百里也故言今之百里古之諸侯又曰縣者弦也言施繩用法狀如絃絃聲近縣故以取名風俗通曰周禮百里曰同所以獎王室協風俗總名縣縣玄也言當玄靜平徭役邑尚書大傳曰五里為邑周禮地官曰四井為邑易訟卦曰逋其邑人三百戶周書曰周公乃作大邑于成周左傳曰凡邑有宗廟先君之主曰都無曰邑穀梁傳曰齊人取子糺殺之十室之邑可以隱死以千乘之魯而不能存子糺公為病矣論語曰十室之邑必有忠信如丘者焉不如丘之好學也史記曰黃帝邑于涿鹿之阿遷徙無常處以兵師為營衛張華詩曰駕言遊東邑東邑紛穰穰婚姻及良時嫁娶避當梁鄉釋名曰鄉向也眾所向也周禮地官司徒曰五州為鄉使之相賓論語曰孔子於鄉黨恂恂如也似不能言者又曰玄鄉難與言童子見門人惑後漢書曰張湛為左馮翊告歸平陵望寺門而步主簿進白明府位尊德重不宜自輕湛曰禮下公門軾路馬孔子於鄉黨恂恂如也父母之國所宜盡禮何謂輕哉唐書曰張道源并州祁人也年十五父死居喪以孝行稱縣令郭湛改其所居為復禮鄉至孝里老子曰以鄉觀鄉莊子曰遊於無何有之鄉鄭玄別傳曰國相孔文舉教高密縣曰公者人德之正號不必三事大夫也今鄭君鄉宜曰鄭公鄉黃恭交廣記曰秦兼天下改附庸為鄉鄉則有族今嗇夫是也鄉之言境言其在人境域內非天王所置故言鄉零陵先賢傳曰鄭產泉陵人為白土嗇夫漢末產子一歲輒出口錢民多不舉產乃勑民勿得殺子口錢自當代出因名其鄉曰更生鄉萬歲曆曰黃武六年正月獲彭綺是歲由拳西鄉有產兒墮便語云天方明河欲清鼎腳折金乃生於是因曰語兒鄉郡國志曰秭歸縣屈原鄉里南岸曰歸鄉西岸曰秭歸屈原既放蹔歸鄉里因曰歸鄉縣屈原姊女須聞原還亦來喻之因曰姊歸也王子年拾遺錄曰張掖郡郅奇字君珍居喪盡禮以淚灑石石即成痕著枯木枯草在冬必茂浸地成鹹俗謂之鹹鄉漢帝嘉其孝異表銘其邑改曰孝行之鄉歲時使立廟祭祀黨周禮地官司徒曰四閭為族使之相葬五族為黨使之相助釋名曰五百家為黨黨長也一聚所尊長也六韜曰友之友謂之朋朋之朋謂之黨黨之黨謂之群閭周禮地官司徒曰五家為比使之相保五比為閭使之相受說文曰閭里門也周禮五比為閭閭侶也二十五家相群侶也尚書曰武王克商軾商容閭范曄後漢書曰袁忠子秘為郡門下議生黃巾起秘從太守趙謙擊之軍敗秘與功曹封觀等七人以身扞刃皆死於陣謙以侍免詔復秘等閭號曰七賢閭戰國策曰王孫假年十五齊閔王之出走天王之處其母曰汝朝出而晚來吾倚閭而望汝又曰齊桓公宮中七市女閭七百管仲故為三歸之家以掩桓公之罪呂氏春秋曰魏文侯過叚干木之閭而軾之里周禮地官遂人曰五家為鄰五鄰為里風俗通曰里者止也五十家共居止也禮記曲禮上曰里有殯不巷歌春秋傳潛潭巴曰里社鳴此里有聖人論語曰仁為美又曰東里子產潤色之論語撰考讖曰里名勝母曾子廉襟漢書曰禮古經者出魯淹中里又曰盧綰與高祖同里閈又曰宣帝舍長安尚冠里東觀漢記曰鮑永字君長為魯郡太守時彭豐等不肯降後孔子闕里無故荊棘自闢從講室掃除至孔里永異之召郡府丞謂曰方今阨急而闕里無故自滌意豈夫子欲令太守大行饗誅無狀也乃修學校禮請豐等會手格殺之張璠漢記曰荀爽兄弟八人時人謂之八龍舊居西豪里縣令苑康曰昔高陽氏有才子八人署其里曰高陽里宋書曰太原王知玄者僑居會稽剡縣居家以孝聞及丁憂哀毀而卒帝嘉之詔改所居青苦里為孝家里宋略曰張敷幼樹風規貞心簡立居喪滅性孝道淳深宜追甄異以旌厥美可改所居里曰孝張里又曰散騎常侍袁瑜薦會稽郭世道詔改所居曰孝行里又曰太祖十三年春鳳皇見于京師眾鳥隨之改其地曰鳳皇里唐書曰劉禕之貞觀元年詔遣入京以母老固辭太宗許其終養江南道大使李襲譽嘉其至孝賜以東帛因上表旌其門閭改所居為孝慈里典略曰衛襄字叔遼河東人也修行至孝州郡嘉之改其里謂之孝德里晉官閣名曰洛陽城中諸里年和里宜壽里永年里宜都里太學里富儲里德官里大雅里孝敬里永安里安城里左池里東臺里安民里延壽里日中里