  - {type: variant, offset: 10, length: 0, content: '', WYG: 之域春秋為鄭戰國為魏都史記曰魏惠王自安邑里徙大梁今浚儀縣按後漢書大梁城魏惠王所築漢書曰酈食其説高祖曰陳留天下之衝四通五達之郊又曰文帝以皇子武爲梁王都大梁後東徙睢陽}
  - {type: variant, offset: 10, length: 0, content: '', krp: 之域春秋時爲鄭地戰國時爲魏都史記曰魏恵王自安邑里徙大梁今浚儀縣按後漢書大梁城魏惠王所築漢書曰酈食其說髙祖曰陳留天下之衝四通五逹之郊又曰文帝以皇子武爲梁王都大梁後東徙睢陽}
  - {type: variant, offset: 11, length: 0, content: '', SBCK: 曰睢陽今宋州也後漢書曰明帝永平十五年東巡至大梁春秋後語曰􅂫秦去韓之魏􅀃襄王曰大王之地南有鴻溝陳留汝南郾邵陵舞陽新都東譙潁煑棗無䟽鴻溝今在譙縣潁今潁州煑棗今曹州宛可地無䟽或作無咠未詳所在西有長蛇之地史記作長城之地今武原縣有長城北有河水卷燕酸棗地方千里田舎廬廡之數無所不畜收人民之衆牛馬之多夜行不絶􅟁􅟁殷殷車馬聲也􅟁火宏切夫魏天下之強國也王天下之賢王}
