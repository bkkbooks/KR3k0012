  - {type: variant, offset: 865, length: 0, content: '', SBCK: 二漢相㳂爲盛集帝嘉晢對隋書曰焬帝命僕射楊素等營構宫室大業元年遂成新都而徙居之今洛陽宫是也洛陽地圖曰鞏在洛水之間鞏固也言四面有山可以鞏固也朱超石與兄書曰洛下道路夲好青槐暎䕃可愛陸機洛陽記曰洛陽有銅駞街漢鑄銅駞二枚在宫南四㑹道相對俗語曰金馬門外集衆賢銅駞陌上集少年水經曰伊水東北過伊闕昔大禹䟽龍門以通水兩山相對望之如闕伊水歷其間謂之伊闕穆天子傳曰天子射鳥有獸在葭中七萃之士髙賁戎擒之以獻天子命畜之東虞曰虎牢唐諱虎故改武其後又名成臯十道志曰壽安縣漢冝陽縣也史記曰張儀爲􅁗􅀃韓王曰大王今不事􅁗􅁗下甲據冝陽斷韓之上地東取成臯滎陽則鴻臺之宫非大王有也又􅂫􅁗􅀃韓宣惠王曰韓北有鞏成臯之固東有宛穰洧水南有陘山密縣有徑山西有冝陽商坂之塞地方九百里帶甲數十萬陜州十道志曰陜州陜郡禹貢豫州之域周爲二伯分陜之地即古虢國地戰國時屬韓􅁗併天下屬三川郡史記曰周成王時召公爲三公自陜以西召公主之自陜以東周公主之}
  - {type: page-break, offset: 865, content: '', id: KR3k0012_SBCK_158-7b}
  - {type: page-break, offset: 865, content: '', id: KR3k0012_SBCK_158-8a}
  - {type: variant, offset: 865, length: 0, content: '', WYG: 二漢相沿爲盛集帝嘉晳對隋書曰煬帝命僕射楊素等營搆宫室大業元年遂成新都而徙居之今洛陽宫是也洛陽地圖曰鞏在洛水之間鞏固也言四面有山可以鞏固也朱超石與兄書曰洛水道路本好青槐映䕃可愛陸機洛陽記曰洛陽有銅駞街漢鑄銅駞二枚在宫南西會道相對俗語曰金馬門外集衆賢銅駞陌上集少年水經曰伊水東北過伊闕昔大禹疏龍門以通水兩山相對望之如闕伊水厯其間謂之伊闕穆天子傳曰天子射鳥有獸在葭中七萃之士高賁戎擒之以獻天子命畜之東虞曰虎牢唐諱虎故改武其後又名成臯十道志曰壽安縣漢宜陽縣也史記張儀爲秦説韓王曰大王今不事秦秦王中據宜陽斷韓之上地東取成臯滎陽則鴻臺之宫非大王有也又蘇秦説韓宣惠王曰韓北有鞏成臯之固東有宛穰洧水南有陘山密縣有陘山西有宜陽商坂之塞地方九百里帶甲數十萬陜州十道志曰陜州陜郡禹貢豫州之域周爲二伯分陜之地即古虢國地戰國時屬韓秦倂天下屬三川郡史記曰周成王時召公爲三公自陜以西召公主之自陜以東周公主之}
