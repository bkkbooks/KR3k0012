  - {type: variant, offset: 612, length: 1, content: 別, krp: 東都漢書曰商祖欲都洛陽戍卒婁敬求見上曰陛下都洛陽欲與周室比隆哉上曰然敬曰陛下取天下與周室異周之先自后稷積德十餘丗公劉避狄居豳大王以狄伐故去豳之歧國人争歸之文王爲西伯武王伐紂八百諸侯不期而㑹成王即位周公之屬輔相焉乃營成周於洛邑以爲天下中四方納貢道里均有德則以王無徳則易以亡凡居此者欲務以德致人不令後丗驕奢以虐民也及周之衰乃分爲二天下莫朝周不能制形勢弱也今陛下用兵取天下百姓肝腦塗地而欲比隆周室臣以爲不侔矣不如都秦帝以問張良良曰洛陽雖險其中不過百里四面受敵此非用武之國不如都關中婁敬之說是也博物志曰周在中樞三河之分風雨所起四險之國武王克殷定鼎郟鄏以爲東都皇甫謐帝王丗紀曰周公相成王以鄷鎬偏在西方職貢不均乃使邵公卜居洛水之陽以即中}
