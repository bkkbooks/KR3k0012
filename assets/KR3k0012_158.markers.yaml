  - {type: variant, offset: 876, length: 5, content: 復禹貢九州, SBCK: 芮伯萬爲母姜氏所逐遂居于魏今芮城是也詩曰虞芮質厥成文王蹶厥生毛萇注曰虞芮之君相與爭田而乆不平乃相謂曰西伯仁人盍往質焉及入境見行者讓路耕者讓畔咸相謂曰我等小人不可以履君子之庭乃相讓所争之地以爲閑田天下聞之歸周者四十餘國唐書曰天寳元年陵郡太守李齊物鑿三門山路所通深便於漕運於所開瀆中得古鏵鉏上有古􅂐平陸二字由是其年改爲平陸縣山海經曰夸父之山其北有林名曰桃林廣圍三百里中多馬造父於其中得驊騮騄耳之乗以}
