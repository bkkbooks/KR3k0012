  - {type: variant, offset: 344, length: 0, content: '', SBCK: 牟武陽宋州之襄邑曹州之戴邑許州之扶溝􅋣陵陳州之太康九縣􅀠焉後唐復降爲汴州以宣武軍爲額其陽武長垣扶溝考城等四縣仍且􅀠汴州其餘五縣却還夲部晉天復中復升爲東京復以前五縣􅀠之漢周並因之太康地記曰豫州之分其人得中和之氣性安舒其俗阜其人和今俗多寛慢漢志曰開封逢池在東北或曰宋之逢澤也瓉曰汲郡古文梁惠王廢逢忌之藪以賜民今浚儀是也史記曰王稽興范睢言曰先王待我于三亭之南三亭今屬浚儀陳留風俗儀傳曰阮簡爲開封令有劫賊外白甚急簡方圍棊長嘯曰局上有劫甚急徐廣史記音義曰秦孝公㑹諸侯於蓬澤圖經曰浚儀有髙陽故城顓頊髙陽氏佐少昊有功封於此城又曰浚儀有信陵亭在城内即魏公子無忌勝槩之地左傳曰韓起送女於楚還過鄭鄭伯勞諸國今圍城是也漢志曰陳留郡鄭邑後爲陳所併故曰陳留瓉曰宋亦有留彭城留是也留屬陳故稱陳留也古史考曰伊尹生於空桑陳留有空桑故城家語曰孔子南遊於楚至阿谷之隧使子貢奉觴從女子乞飲今陳留有阿谷水漢志曰雍丘屬陳留故􅂎國周武王封禹後東樓公左傳曰衛侯伐鄭至于鳴鴈在雍丘有鳴鴈亭左傳曰齊桓公㑹諸侯于葵丘今在雍丘縣漢志曰東昏陳留郡莽改曰東明又曰襄邑屬陳留有服官莽曰襄平師古曰襄邑宋地夲承匡襄陵郷宋葬公所葬故曰襄陵􅁗始皇以承匡卑濕故徙縣於襄陵謂之襄邑縣陳留風俗傳曰襄邑縣南有渙水睢水傳曰睢渙之水出文章故有黼黻藻錦日月華蟲以奉天子宗廟御服焉左傳曰宣二年鄭破宋師于大􅁄杜預曰在襄邑後漢地理志曰陳留郡巳吾有大􅁄郷國都記云封丘衛地故燕之延郷也髙祖與項羽戰戰於延郷有翟母免其難故以延郷封翟母焉漢志曰封丘屬陳留郡孟康曰春秋時敗翟于長丘今翟溝是也漢志曰尉氏屬陳留郡應劭曰古獄官曰尉氏鄭之别邑也瓉曰鄭大夫尉氏之邑遂以爲邑師古曰鄭大夫尉氏亦以掌獄之官故爲族耳後漢地理志曰陳留郡尉氏有陵樹郷郷北有澤澤有天子􅁐囿有秦樂廐漢以馴養猛獸漢志曰外黄屬陳留郡張晏曰魏郡有内黄故加外耳瓉曰縣有黄溝故依之也左傳曰惠公敗宋師于黄杜注外黄縣東有黄城陳留風俗傳曰沛公起兵野戰喪皇妣於皇郷天下平定乃使使者以梓宫招䰟於野有丹蛇自洒濯入梓宫其俗處仍有遺髮其處在小黄屬陳留漢志曰長垣屬陳留郡莽曰長固孟康曰春秋㑹于匡今匡城是晉地道記云長垣故衛故匡城地孔子所厄處也地道記曰承匡城在縣西左傳文十一年㑹晉郤􅆙于承匡是也漢志曰鄢屬陳留莽曰順通左傳隱公曰鄭伯克叚于鄢又鄭太叔侵鄭至于廪延注曰縣北有延津後漢地理志曰即酸􅀥也戰國䇿云齊欲發卒取周九鼎顔率曰夫梁之君臣欲得九鼎謀於沙海之上爲日乆矣沙海屬浚儀陳留風俗傳曰縣有蒼頡師曠城其城有列仙吹臺梁王增築之以爲吹臺俗号繁臺史記曰大梁城有十二門東門曰夷門隱士侯嬴年七十家貧爲大梁夷門抱關者魏公子無忌厚遺之不肯受水經曰大禹塞滎陽澤開渠以通淮泗}
