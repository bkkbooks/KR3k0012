  - {type: variant, offset: 5, length: 0, content: '', krp: 悉埋之又曰貞觀八年其賛普弃宋弄讃始遣使朝貢弄讃弱冠嗣位性驍武多英略其隣國羊同及諸羗並賔伏之太宗遣行人馮徳遐徃撫慰之見德遐大恱聞突厥及吐谷渾皆尚公主乃遣使献金随德遐入朝多賫金寳奉表求婚太宗未之許又曰弄讃常率衆二十餘萬頓於松州西境遣使貢金帛云來迎公主太宗遣吏部尚書侯君集等擊破之弄讃大懼遣使謝罪因復請婚太宗許之弄讃乃遣其相禄東賛至禮獻金五千兩自餘寳玩數百事貞觀十五年太宗以文成公主妻之令禮部尚書江夏郡王道宗主婚持節送公主于吐蕃弄讃率其部兵次柏海親迎于河源見王人執子壻之禮甚恭旣而歎大國服飾禮儀之美俯仰有愧沮之色及與公主歸國謂所親曰我祖父未有通婚上國者今我得尚大唐公主爲幸實多當爲公主築一城以誇示後代遂築城邑立棟宇以居處焉公主惡其人赭靣弄讃令國中權且罷之身亦釋氈裴襲紈綺漸慕華風仍遣酋豪子弟請入國學以習詩書又請中國識文之人典其表䟽又曰太宗伐遼東還弄讃遣禄東賛來賀奉表曰聖天子平定四方日月所照之國並爲臣妾而髙麗恃逺闕於臣禮天子自領百萬渡遼致討隳城䧟陣指日凱還夷狄纔聞陛下發駕少進之間巳聞歸國鷹飛迅越不及陛下速疾奴忝預子壻喜百常夷夫鵝猶鴈也故作金鵝奉献其鵝黄金鑄成髙七尺中可實酒三斛又曰髙宗嗣位授弄讃爲駙馬都尉封西海郡王賜物二千叚弄讃因致書與司徒長孫無忌等云天子𥘉即位若臣下有不忠之心者當勒兵以赴國并獻金銀珠寳十五種髙宗嘉之進封爲寳王賜雜綵三千叚因請蚕種及造酒碾磑紙墨之匠並許焉又曰髙宗聞劉審禮等敗召侍臣問以綏禦之䇿中書舎人郭正一曰吐蕃作梗年歳巳深命將興師相継不絶空勞士馬虚費粮儲近討則徒損兵威深入則未窮巢穴臣望少發兵募且遣備邊明立烽候勿令侵抄使國用豐足人心叶同寛之數年可一舉而滅給事中劉齊賢皇甫文亮等皆言嚴守之便又曰長壽元年武威軍揔管王孝傑大破吐蕃之衆克復龜兹于闐踈勒碎葉等四鎮乃於龜兹置安西都護府發兵以鎮守之又曰聖暦三年畨將賛婆率所部千餘人及其兄弟莽布支等來降則天遣羽林飛騎郊外迎之授賛婆輔國大將軍行右衛大將軍封歸德郡王優賜甚厚又曰神龍元年賛普之祖母遣其大臣悉董然來献方物爲其孫請婚中宗以所養雍王守禮女爲金城公主許嫁與之自是頻歳貢献景龍三年十一月又遣其大臣尚賛吐等來逆女中宗宴之于苑内毬塲命駙馬都尉楊慎交與吐蕃使打毬中宗率侍臣以觀之四年正月下制曰聖人布化用百姓爲心王者垂仁以八荒無外故能光宅遐迩財成品物由是隆周理暦恢柔逺之圗強漢乗時建和親之義斯盖御㝢長䇿經邦茂軌朕受命上靈克纂洪業庻幾前烈永致和平睠彼吐蕃僻在西服皇運之始早申朝貢太宗文武聖皇帝德侔覆載情深億兆思偃兵甲遂通姻好數十年間一方清浄自文成公主化往其國因多變革我之邊隅亟興師旅彼之蕃落頗聞凋弊頃者賛普及祖母可敦酋長等屢披誠𣢾積有歳時思託舊親請崇親好金城公主朕之少女豈不鍾念但爲人父母志恤黎元若允乃誠祈更敦和好則邊土寧晏兵役休息遂割深慈爲國大計築兹外館聿膺嘉禮降彼吐蕃賛普即以今月進發朕親自送于郊外命大將軍楊矩使焉其月帝幸始平縣以送公主設帳殿於百頃泊側引王公宰臣賦詩餞別改始平縣爲金城縣改其地爲鳯池郷又曰開元二年秋吐蕃大將蚠逹延乞力徐等率衆十餘萬㓂臨洮軍又進㓂蘭渭等州掠監牧羊馬而去玄宗令攝左羽林將軍薛訥及太僕少卿王晙率兵邀擊之仍下詔將大舉親征召募將士克期進發俄而晙等與賊相遇于渭源之武階驛前軍王海濵力戰死之晙等乗之而進大破吐蕃之衆殺數萬人盡收得所掠羊馬則賊餘黨奔北相枕藉而死洮水爲之不流上遂停親征命紫微舎人倪若水往按軍實仍吊祭王海濵而還又曰開元十七年玄宗遣皇甫惟明等使土畨惟明等旣見賛普及公主具宣上意賛普等欣然請和盡出貞觀巳來前後敕書以示惟明等令其重臣名悉獵隨惟明入朝上表曰外甥是先皇帝宿親又蒙降金城公主遂和同爲一家天下百姓普皆安樂中間爲張玄表李知古等東西兩處先動兵馬侵抄吐蕃邊將所以互相征討迄至今日遂成釁隙外甥以先代文成公主今金城公主之故深識尊卑豈敢失禮又縁年小枉𬒳邊將䜛搆闘亂令舅致怪伏乞垂察追留死將万足承前數度使人入朝皆𬒳邊將不許所以不敢自奏去冬公主遣使人婁衆失若將狀專往蒙降使看公主來外甥不勝喜荷謹遣論名悉獵及副使押衙將軍浪些紇夜悉獵入朝奏取進百兩國事意悉獵所具外甥蕃中巳處分邊將不許抄掠若有漢人來投便令却送伏望皇帝舅逺察赤心許從舊好長令百姓快樂如蒙聖恩千年万歳外甥終不敢先違盟誓謹奉進金胡瓶一金盤一椀一馬腦盃一零羊衫叚一謹充微國之禮金城公主又别進金鴨盤盞雜器物等十八年十月名悉獵等至京師上御宣政殿列羽林仗以見之悉獵頗曉書記先曽迎金城公主至長安當時朝廷皆稱其材辯及是上引入内宴與語甚禮之賜紫𫀆金帶及魚袋并時服繒綵銀盤胡瓶等仍於别舘供擬甚厚悉獵受𫀆帶器物而却進魚袋辝曰本國無此章服不敢當殊異之賞上喜而許之詔御史大夫崔琳充使報聘仍於赤嶺各竪分界之碑約以更不相侵時吐蕃使奏云公主請毛詩禮記左傳文選各一部制令祕書省冩與之正字于休烈上䟽諌曰臣聞戎狄國之㓂也經籍國之典也戎之生心不可以無備典有恒制不可以假人傳曰裔不謀夏夷不亂華所以革其非心在乎有備無患昔者東平王入朝求史記諸子漢帝不與盖以史記多兵謀諸子雜詭術夫以東平漢之懿戚尚不欲示征戰之書今西戎國之㓂讎豈可貽經典之事且臣聞吐蕃之性慓悍果决敏情持銳善學不廻若逹於書必能知戰深於詩則知武夫有師干之試深於禮則知月令有廢興之兵深於傳則知用師多詭詐之智深於史則知往來有書檄之刺何異備㓂兵而資盗粮也臣聞魯秉周禮齊不加兵吴獲乗車楚屢奔命一以守典存國一以喪法危邦可取鑒也且公主出嫁從人逺適異國合慕夷禮返求良書愚臣料之恐非公主本意也慮有奔北之類勸教於中若陛下慮失蕃情以備國信必不得巳請去春秋當周德旣衰諸侯強盛禮樂自岀戰伐交興情僞於是乎生変詐於是乎起則以臣召君之事取威定覇之名若與此書國之患也傳曰于奚請曲縣鞶纓仲尼云惜也不如多與之邑惟名與器不可假人狄固貪婪貴貨易土正可錫之錦綺厚以玉帛何必率從其求以資其智臣忝叨列位職刋祕籍實痛經典弃在戎夷昧死上聞惟陛下深察又曰開元二十二年遣將軍李佺於赤嶺與吐蕃分界立碑二十四年正月吐蕃遣使貢方物金銀器玩數百事皆形制竒異上令列於提象門外以示百寮又曰開元二十八年春章求兼瓊宻與安戎城中吐蕃翟都局及維州別駕董承宴等通謀都局等遂飜城歸欵因引官軍入城盡殺吐蕃將士使監察御史許逺率兵鎮守上聞之甚恱中書令李林甫等上表曰伏以吐蕃此城正當衝要慿險自固恃以窺邊積年己來蟻聚爲患縱有百萬之衆難以施功陛下親紆祕䇿不興師旅湏令中使李思敬曉諭羗族莫不懷恩飜然改圖自相謀䧟神筭運於不測睿略通於未然累載逋誅一朝蕩滅又臣等今日奏事陛下從容謂臣等曰卿等但看四夷不乆當漸淪喪德音纔降遽聞戎捷則知聖與天合應如響至前古巳來所未有也請宣示百寮編諸史䇿手制荅曰此城儀鳯年中羗引吐蕃遂𬒳固守歳月旣乆攻伐亦多其地險隘非力所制朝廷羣議不勸取之朕以小蕃無知事湏處置授以竒計所以行之獲彼戎心歸我城守有足爲慰也大羊同通典曰大羊同東接吐蕃西接小羊同北直于闐東西千餘里勝兵八九萬其人辮髮氈裘畜牧爲業地多風雪冰厚丈餘所出物産頗同吐蕃俗無文字但刻木結绳而巳刑法嚴峻其酋豪死扶於穴切去其䐉實以珠玉剖其五臟易以黄金假造金鼻銀齒以人爲殉卜以吉辰藏諸岩穴地人莫知其所多殺㹀牛莫馬以充祭祀葬畢服除其王姓姜葛有四大臣分掌國事自古未通悉立通典曰悉立在吐蕃西南户五萬餘有城邑村落依溪澗丈夫以繒綵纒頭衣氈褐婦人辮髮着短裙以蒸報爲俗畜多水牛羖羊雞豕糓冝秔稻麥豆饒甘蔗諸菓死葬於中野不爲封樹喪制以黒爲衣一年就吉刑有刖劓羈事吐蕃章求㧞通典曰章求㧞或云章掲抜本西羗種也在悉立西南居四山之内近代移出山西接東天笁遂改衣服變西羗之俗其地延袤八九百里勝兵二千餘人居無城郭好爲㓂掠啇旅患之聞悉立入朝亦遣使朝貢且末上子余切}
