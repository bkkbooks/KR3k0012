  - {type: variant, offset: 8, length: 139, content: 蒲類王治天山西䟽榆谷去長安八千三百六十餘里後漢書曰蒲類國王居天山西䟽榆谷廬帳而居逐水草頗知田作有牛馬駱駞羊畜能作弓矢國出名馬蒲類本大國也前西域屬匈奴時蒲類王得罪單于單于怒徙蒲國人民六千餘口內之匈奴右部阿惡地號曰阿惡國初徙居時甚貧羸不能者逃亡在山谷間故得留為蒲類國云小宛漢書曰小宛, SBCK: 且末}
