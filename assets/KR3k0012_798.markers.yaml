  - {type: variant, offset: 2, length: 0, content: '', WYG: 七吐蕃大羊同悉立章求㧞且末烏耗西夜吐蕃唐書曰吐蕃在長安之西八千里本漢西羌之地其種落莫知所出或云南凉秃髪利鹿孤之後也利鹿孤有子曰樊尼及利鹿孤卒樊尼尚㓜弟傉檀嗣位以樊尼爲安西將軍後魏神瑞元年傉檀為西秦乞伏熾盤所滅樊尼招集餘衆以投沮渠蒙遜而蒙遜以為臨松太守及䝉遜滅樊尼乃率衆西奔濟黃河踰積石於羌中建國開地千里樊尼威惠夙著為群羗所懷皆撫以恩信歸之如市遂改姓為窣勃野以秃髪爲國號語訛謂之吐蕃其後子孫蕃昌又侵伐不息土宇漸廣歴周及隋猶隔諸羌未通於中國其國人號其王為贊普相為大論小論以統理國事無文字刻木結繩為約雖有官不常厥職臨時統領徴兵用金箭㓂至舉􅇏燧百里一亭用刑嚴峻小罪剜眼劓刖或皮鞭鞭之但隨喜怒而無常科囚人扵地牢深數丈二三年方出之宴異國賔客必驅犂牛令客自射牲以供饌與其臣下一年一小盟刑羊狗獼猴先折其足而殺之繼裂其腸而屠之令巫者告扵天地山川日月星辰之神云若心遷志變懷奸反覆神明鑒之同扵羊狗三年一大盟夜扵壇墠之中陳設肴饌殺犬牛馬驢以為牲呪曰爾等咸須同心戮力共保我家惟天神地祗共知爾志有負此盟使爾身體屠裂同扵此牲其地氣候大寒不生稷稻有䴹麥䝁豆小麥喬麥畜多犂牛猪犬羊馬又有天䑕狀如雀䑕其大如猫皮可為裘又多金銀銅錫其人或隨畜牧而不常厥居然頗有城郭其國都城號為邏㱔城屋皆平頭髙者至數十尺貴人處扵大氊帳名為拂廬寝處汙穢絶不櫛沐接手飲酒以氊爲盤捻麨為椀實以羮酪并而食之多事羱羝之神人信巫覡不知節候麥熟為嵗首圍碁}
