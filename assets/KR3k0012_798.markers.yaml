  - {type: variant, offset: 1255, length: 1965, content: 里土平宜稻麥多五菓卑伽至後魏書曰卑伽至國治卑伽至城東接忸密國去代二萬三千七百二十八里土平少田殖取稻麥於鄰國有五菓伽不單後魏書曰伽不單國治伽不單城在悉万斤西北去代一萬二千七百八十里土宜稻麥有五菓伽倍後魏書曰伽倍國故休密翎侯所治和墨城也在莎車西去代萬三千里民居山谷間折薛莫孫後魏書曰折薛莫孫國故雙靡翎侯所治變靡城也在伽倍西去代一萬三千五百里居山谷間鉗敦後魏書曰鉗敦國古之貴霜翎侯所治護藻城也在折薛莫孫西去代一萬三千五百六十里居山谷之間弗敵沙後魏書曰弗敵沙國古盻頓翎侯所治薄芳城也在鉗敦西去代一萬三千六百里居山谷間臨兒魏略曰臨兒國浮屠經云其國王生浮屠太子也父曰屑頭耶母曰莫耶浮屠身服黃色髮青乳有青毛冬青始莫耶夢白象而孕及生從母右脅出墮地能行七步漢哀帝元壽元年愽士景庸從月氐王使伊存口授浮屠經其所載與老子經相出入蓋以老子西出關教胡為浮屠也貲虜魏略曰貲虜本匈奴之奴也匈奴名奴婢為貲始建武時匈奴衰分其奴婢亡匿在金城武威酒泉此黑水東畜牧逐水草抄盜涼州不與東部鮮卑同也其種非一有大胡丁零羗雜處並本亡奴婢也盤越魏書曰盤越國一名漢越王在天竺東南數千里與益部相近其人小大與中國人同鹽長山海經曰西海中有鹽長國其人烏首亦名烏民奇恒括地圖曰奇恒民善為機巧設百禽為車飛從風遠行湯時西風多奇恒車至於豫州湯破其車十年西風倒乃令復作車遣歸去玉門四萬里石尖玄中記曰玉門之西南羗之東有一國五六百戶無他事役國中有山山上有祠廟國人每歲出石尖數千枚輸于廟中名霹靂尖以給霹靂所用從春雷出而尖日減至秋尖盡扶伏玄中記曰扶伏民者黃帝軒轅之臣曰茄豊有罪刑而放之扶伏而去後是為扶伏民去玉門關二萬五千里可蘭沙州記曰大白蘭西北千二百里有可蘭虜風俗卑陋從開闢後口不知穀味目不識五色耳不聞六律五聲是四夷中不臧者土無所出直大養群畜而已戶落萬餘然其人頑弱不鬭戰忽見異人舉國便走鵠國神異經曰西海之中有鵠國男女皆長七寸為人自然有禮好經論跪拜其人歲壽三百行如飛日行千里百物不敢犯之唯畏海鵠鵠遇吞之亦壽三百歲人在鵠腹中不死而鵠一舉千里無不達神異經曰西南大荒中有人烏長一丈腹圍九尺龜虵戴朱烏左手憑青龍右手憑白虎知河海升斛識山石多少知鳥獸言語知百穀可食識草木鹹苦名曰聖一名哲一名仙一名通一名無不達凡人見拜者令人神知無繼民外國圖曰無繼民穴居食土無夫婦死則埋之心不朽百年復生去玉門四萬六千里錄民外國圖曰錄民穴居食土無夫婦死則埋之肺不朽百二十年復生去玉門萬一千里無首民外國圖曰無首民乃與帝爭神帝斬其首勑之此野以乳為目臍為口去玉門三萬里納民外國圖曰納民陛居食土無夫婦死埋之其肝不朽八年復生去玉門五萬里拘夷釋道安西域志曰拘夷國北去城數百里山上有石駱駞溺水滴下以金銅鐵及木器手掌承之皆漏唯瓢瓠不漏服之令人身臭毛皮盡脫得止其國掌有婆羅門守視波羅秦斯釋道安西域志曰波羅秦斯國佛轉法輪調達入地獄土陷處皆在其國鼠王釋道安西域志曰于闐道中有鼠王國大者如狗小者如菟著金袈裟沙門過不禮白衣不禮輒害人摩訶賴釋道安西域志曰摩訶賴國又南得訶賴國有阿耨達山王舍城在耨達山東南角竹園精舍在城西佛六年若行貝多樹去城五十里波麗越釋道安西域志曰羅衛國東西四百里至波麗越國波麗越國即佛外祖國也鷄城釋道安西域志曰胡國北有鷄城北有人皆冠象鷄也和訶條支僧載外國事曰和訶條國在大海中地方二萬里大山名三漫屈有石井井中生千葉白蓮花數種井邊石上有四佛足跡每月六齋日彌勒菩薩常以諸天神禮佛跡畢便飛去國王長者常作金樹銀花銀樹金花以供奉佛播黎曰支僧載外國事曰播黎曰國者昔是小國耳今是外國之大都流沙之外悉稱臣妾舍衛支僧載外國事曰舍衛國今無復王盡屬播黎曰國王遣小兒注國人不奉佛法維耶離支僧載外國事曰維耶離國去合衛五十由旬者晉言三十里維摩詰家在城內國人不復奉佛悉事水火餘外道也迦維羅越支僧載外國事曰迦維羅越國今無復王也國人亦屬播黎曰國今尚精進昔太子生時有二龍一吐水一吐火一冷一暖今有二池尚一冷一煖郍訶維支僧載外國事曰郍訶維國土豐樂多民物在迦維越南相去三十里碓國支僧載外國事曰迦葉佛生碓國今無復此國故處在舍衛國西相去三十里拘郍舍支僧載外國事曰拘郍舍國牟尼佛所生也亦名拘郍舍在迦維羅越西相去復三十里波羅奈國支僧載外國事曰彌勒佛當生波羅奈國是屈陁羅經所說在迦羅越南拘宋婆支僧載外國事曰拘宋婆國今見過去佛四所住處四屋迦葉佛住中教化四十年釋迦文佛住五年二佛不說罽密支僧載外國事曰罽密小國耳在舍衛之西國王民人悉奉佛土地寒羅漢道人及沙門到冬月日未中前飲少酒過中後不復飲酒食果國屬大秦拘私郍竭支僧載外國事曰佛在拘私郍竭國佛欲入涅槃時自然有寶床從地出有八萬四千國王爭將佛歸神妙天人曰佛應就此亡郍竭王乃作金棺栴檀車送佛喪積薪不燒自然王將舍利歸宮八萬四千國興兵爭舍利婆羅門分之乃用金升量舍利得八斛四㪷諸國各得少許還國各立浮屠摩竭提支僧載外國事曰摩竭提國在迦維羅