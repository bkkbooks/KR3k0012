  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 七吐蕃大羊同悉立章求拔且末烏耗西夜吐蕃唐書曰吐蕃在長安之西八千里本漢西羗之地其種落莫知所出或云南涼秃髮利鹿􅀌之後也利鹿􅀌有子曰樊尼及利鹿􅀌卒樊尼尚㓜弟傉檀嗣位以樊尼爲安西將軍後魏神瑞元年傉檀爲西秦乞佛盤熾所滅樊尼招集餘衆以投沮渠蒙遜蒙遜以爲臨松太守及蒙遜㓕樊尼乃率衆西奔濟黄河逾積石於羗中建國開地千里樊尼威惠夙著爲群羗所懷皆撫以恩信歸之如市遂改姓爲窣勃野以秃髮爲國号語訛謂之吐蕃其後子孫蕃昌又侵伐不息土宇漸廣歴周及隋猶隔諸羗未通於中國其國人号其王爲賛普置大論小論以統理國事無文字刻木結繩爲約雖有官不常厥職臨時統領徴兵用金箭㓂至舉烽燧百里一亭用刑嚴峻小罪剜眼劓刖或皮勒鞭鞭之但隨喜怒而無常科囚人於地牢深數丈二三年方出之宴異國賔客必驅􅄔牛令客自射牲以供饌與其臣下一年一小盟刑羊狗猕猴先折其足而殺之繹其膓而屠裂之令巫者告于天地山川日月星辰之神云􅀂心遷變懷姦反覆神明鑒之同於羊狗三年一大盟夜於壇墠之中陳設肴饌殺人馬牛驢以爲牲呪曰尓等咸湏同心勠力共保我家惟天地神祗共知尓志有􅀒此盟使尓身體屠裂同於此牲其地氣􅀱大寒不生秔稻有青䴹音果麥䝁豆小夌蕎麥畜多􅏚牛猪犬羊馬又有天䑕狀如雀䑕其大如猫皮可爲裘又多金銀銅錫其人或隨畜牧而不常厥居然頗有城郭其國都城号爲邏些城屋皆平頭髙者至數十尺貴人處於大氈帳名爲拂廬寢處汙􅁾絶不櫛沭接手飲酒以氈爲盤捻麸爲椀實以羮酪并而食之多事羱羝之神人信巫覡不知節􅀱夌熟爲歳首圍碁}
