  - {type: variant, offset: 1068, length: 1107, content: 曰見規者眾未有若此者也又曰劉邕穆之之子河東王歆之與邕俱嘗為南康相素輕邕後歆之與俱豫元會並坐邕嗜酒謂歆之曰卿昔見臣今能見勸一盃酒不歆之因斅孫皓歌荅曰昔為汝作臣今為汝比肩既不勸汝酒亦不願汝年梁書曰王贍為吏部尚書性率亮居選所舉其意多行頗嗜酒每飲或彌日而精神朗贍不廢簿領武帝每稱贍有三術射棊酒也南史曰陳暄文才俊逸尤嗜酒無節操遍歷王公室沉湎過差非度其兄子秀常憂之致書於暄友人何胥異其諷諫暄聞之與秀書曰且見汝書與孝典陳吾飲酒過差吾有此好五十餘年昔吳國張公亦稱躭嗜吾見張公時伊已六十自言引滿大勝少年時吾今所進亦勝於往曰老而彌篤唯吾與張季舒耳吾方與此子交歡於地下汝欲夭吾此志耶昔阮咸阮籍同遊竹林宣子不聞斯言王湛能玄言巧騎武子呼為癡叔何陳留之風不嗣大原之氣巋然飜成可怪吾既寂寥當世朽病殘年產不異於顏原名未動於卿相若不日飲醇酒復欲安歸女以飲酒為非吾以不飲為過昔周伯仁渡江唯三日醒吾不以為少鄭康成一日三百盃吾不以為多然洪醉之後有得失成廝養之志是其得也使次公之狂是其失也吾常譬酒猶水也可以濟舟亦可以覆舟故江議有言酒猶兵也兵可千日而不用不可一日而不備酒可千日而不飲不可一飲而不醉美哉江公可與共論酒矣汝驚吾墮車侍中之門陷池武陵之地遍布朝野自言憔悴丘也幸茍有過人必知之吾平生所願身沒之後題吾墓云陳故哭徒陳君之神道若斯志意豈避南征之不覆賈誼之慟哭者哉何水曹眼不識盃鐺吾口不離觚杓汝寧與何同日醒與吾同日而醉乎政言其醒可及其醉不可及也速營糟丘吾將老焉後魏書曰夏侯道遷長子史字元廷歷鎮遠將軍南兗州大中正史性好酒居喪不戚醇醪肥鮮不離口沽買飲噉多所費用父時田園貨賣略盡人間債猶數千餘疋穀食至常不足弟妹不免飢寒於是昏酣而卒初史與南人辛諶庾遵江文遙等終日遊聚酣飲之際恒相謂曰人生局促何殊朝露坐上相看先後間耳脫有先亡者於良辰美景靈前飲宴儻或有知庶共歆饗及史亡後三月上巳諸人相率至史靈前仍共酌飲時日晚天陰室中微闇咸見史在坐衣服形容不異平昔時執盃酒似若獻酬但無語耳後魏書曰李元忠微拜侍中雖處要任初不以物務干懷唯以聲酒自娛大率常醉家事大小了不關心園庭羅種果藥親朋尋詣必留連宴賞每挾彈攜壺遊遨里閈每言寧無食不可使我無酒阮步兵吾師也孔少府豈欺我哉後自中書令復求為太常以其有音樂而多美酒故神武欲用為僕射文襄言其放達常醉不可任以臺閣其子揆聞之請節酒元忠曰我言作僕射不勝飲酒樂爾愛僕射時宜勿飲酒北齊書曰黃門郎司馬消難左僕射子知之子是高祖之壻勢盛當時因退食之暇尋高季式與之酣飲留宿旦曰重門並閉關鑰不通消難固請云我是黃門郎天子侍臣豈有不參朝之理旦一宿不歸家君必當大怪今若又留我狂飲我得罪無辭恐君亦不免譴責季式曰君自稱黃門郎又言畏家君怪欲以地勢脅我邪高季式死自有處初不畏此消難拜謝請出, SBCK: ''}
