  - {type: variant, offset: 3, length: 2, content: 四嗜, WYG: 五食上周禮天官膳夫曰膳夫掌王之食飲膳羞以養王及后世子羞有滋味凡王之饋食用六榖膳用六牲飲用六清羞用百二十品珎用八物醤用百有二十罋王日一舉鼎十有二物皆有俎以樂侑食膳夫授祭品嘗食王乃食又曰王齊則玉府供玉食玉陽之精御水氣也食玉犀也又天官食醫曰掌和王之六食六膳百羞百醤八珎八齊凡食齊眡春時飲宜温羮齊眡夏時美宜熱醤齊眡秋時醤宜凉飲齊眡冬時飲宜寒凡和春多酸夏多苦秋多辛冬多醎調以滑甘凡㑹膳食之宜牛宜稌羊宜黍豕宜稷犬宜梁㕍宜麥魚宜苽凡君子之食恒倣焉又曰内饔掌王及后世子膳羞之割烹煎和之事辨體名肉物辨百品味之物選百羞醤物珎物以俟饋選進其中御者共后及世子之膳羞又曰小宰凡朝覲㑹同賔客以牢禮之法掌其牢禮委積膳獻飲食賔賜之飱牽與其陳數太戴禮曰食穀者必智惠而巧禮記曲禮上曰侍食於長者主人親饋則拜而食主人不親饋則不拜而食共食不飽無流歠無咤食毋囓骨毋反魚肉毋投與狗骨毋固獲又曰凡進食之禮左殽右胾食居人之左羮居人之右膾炙處外醯醤處内葱㳿處末}
