  - {type: variant, offset: 16, length: 4, content: 舍政舍封, WYG: 肉寘諸槖以與之既而與為公介倒㦸以禦公徒而免之問其故對曰翳桑之餓人也問其名居不告而退遂自亡也又曰諸侯之師次于鄭西我師次于督楊不敢過鄭}
