  - {type: variant, offset: 8, length: 3, content: 齊慶封, WYG: 晉公子重耳過衞衞文公不禮焉出於五鹿乞食於野人與之塊公子怒欲鞭之子犯曰天賜也稽首受而載之又曰楚伐庸出師旬有五日至濮乃罷自廬以往振廪同食又曰初宣子}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_WYG_847-5b, image: WYG0900/WYG0900-0476b.png}
  - {type: variant, offset: 9, length: 3, content: 慶封田, SBCK: 大飢黔敖爲食於路以待餓者}
  - {type: variant, offset: 9, length: 3, content: 慶封田, krp: 大飢黔敖爲食於路以待餓者}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 於首山舎於翳桑見靈輙餓問其病曰不食三日矣食之舎其半問之曰宦三年矣未知母之存否今近焉請以遺之使盡之}
  - {type: variant, offset: 13, length: 12, content: 嗜酒與舍政舍封子慶封當國, SBCK: 食之有餓者蒙􅃑輯屨􅐙􅐙然來黔敖左奉食右執飲曰嗟來食􅀭其目而視曰予唯}
  - {type: variant, offset: 13, length: 2, content: 嗜酒, WYG: 遺之簞食}
  - {type: variant, offset: 13, length: 12, content: 嗜酒與舍政舍封子慶封當國, krp: 食之有餓者蒙𬒮輯屨貿貿然來黔敖左奉食右執飲曰嗟來食揚其目而視曰予唯}
