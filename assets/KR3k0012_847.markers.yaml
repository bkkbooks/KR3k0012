  - {type: variant, offset: 98, length: 6, content: 公壑谷壑谷窟, WYG: 必有以重報母母怒曰丈夫不能自食吾哀王孫而進食豈望報乎後信為楚王至國召所從食漂母賜千金又曰景帝居禁中召條侯周亞夫賜食獨置大胾無切肉又不置􅀈條侯心不平顧謂尚席取􅀈景帝視而笑曰此非不足君所乎後漢郅元義父伯考為尚書僕射元義還鄉里妻留事姑甚謹姑憎之幽閉空}
