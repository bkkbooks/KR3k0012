  - {type: variant, offset: 4482, length: 342, content: 年矣佛出亦無如之何以失儀出為南郡王中軍司馬梁書曰蕭頴達出為豫章內史意甚憤憤未發前預華林宴酒後於座辭氣不悅沈約因勸酒欲以觀之穎達大罵約曰我今日形容正是汝老鼠所為何忽復勸我酒舉坐驚愕帝謂之曰汝是我家阿五沈公宿望何意輕脫若以法繩汝汝復何理達竟無一言唯大涕泣心愧之又曰謝善勳飲酒至數升醉後輒張眼大罵雖復貴賤親踈無所擇也時謂之謝方眼陳書曰柳盼為散騎常侍性愚戇使酒因醉乘馬入殿門為有司劾免於家風俗通曰陳國有趙祐者酒後自相署或稱亭長督郵祐復於外騎馬將絳幡云我使者也司徒鮑昱決獄云騎馬將幡起於戲耳無他惡意又曰汝南張妙酒後相戲遂縛捶二十下又縣足指遂至死鮑昱決事云原其本意無賊心宜減死風俗通曰巴郡宋遷母名靜往阿奴家飲酒遷母坐上失氣奴謂遷曰汝母在坐上何無儀適遷曰腸痛誤耳人各有氣豈止我遷罵奴乃持木枕擊遷遂死, WYG: 七}
