  - {type: variant, offset: 4795, length: 0, content: '', krp: 愈恭郭林宗見而竒之共與言因請寓宿旦日容殺鷄爲黍林宗謂爲已設旣而以供其母自以菜𬞞與林宗同飯林宗起拜之曰卿賢乎哉因勸令學卒以成德也後列曰董宣爲洛陽令殺胡陽公主奴帝怒欲殺宣後原之勑令詣太官賜食宣受詔出飯盡覆杯食按}
  - {type: punctuation, offset: 4796, content: ，, id: KR3k0012_CHANT_847-bkkpn1313}
  - {type: 'tls:seg', offset: 4796, content: '', id: KR3k0012_CHANT_847-35a.8}
  - {type: variant, offset: 4796, length: 0, content: '', SBCK: 太官以狀聞上問宣宣對曰臣食不敢遺餘如奉職不敢遺力又曰帝􅉖竇融年衰遣中常侍中謁者即其卧内強進酒食又曰趙咨躬率子孫耕農爲養盗嘗夜往刼之咨恐母驚懼乃先至門迎盗因請爲設食謝曰老母八十疾病湏養居貧朝夕無儲乞少置衣粮妻子物餘一無請盗皆慙歎跪而辭曰所犯無狀干􅁀賢者言畢奔出咨追以物與之由此益知名又曰郅元義父伯考爲尚書僕射元義還郷里妻留事姑甚謹姑憎之幽閉空室節其飲食羸困妻終無怨言後伯考恠而問之時義子朗年數歳言母不病但苦飢耳又曰韓卓字子助臘日奴竊食􅀕其先卓義而免之又曰延熹末黨事將作􅀽閎遂散髮絶代欲投迹深林以母老不冝逺遁乃築土室四周於庭不爲户自牖納飲食而巳魏志曰典韋好酒食飲啖兼人毎賜食於前大飲長歠左右相属人益乃供太祖壯之又曰漢末中常侍唐衡弟爲京兆虎牙都尉入謁尹尹欲修主人勑外爲市買功曹趙息啓云左悺子弟來爲虎牙非德選不足爲持酤買冝隨中舎菜食而巳魏志曰文帝爲太后弟康起苐成太后至苐請諸家外親設下厨無異膳太后左右菜食粟飯無魚肉其儉約如此也又曰扈累者嘉平中年八十九歳􅀂六七十者縣官以􅀌老日給廪五􅂛五􅂛不足食頗行傭作以禆之粮盡復出人與不敢食不求美衣弊緼故後一二年病亡又曰諸􅁑亮出斜谷與司馬宣王對壘宣王見亮使唯問其寢食及其事之繁簡戎事使對曰諸􅁑公夙興夜􅄰二十罰巳上皆親覽焉所啖食不至數􅂛宣王曰亮躰斃矣其能乆乎又曰沐並字德信河間人也少􅀌苦􅀽紹父子時始爲吏名有志介甞過姊爲殺鷄炊􅁰而不留也正始中爲三府長史時呉使朱然諸􅁑瑾攻圍樊城遣舡兵於峴山東斫材牂牁人兵作食有先熟者呼後熟者言其食來後熟者荅言不也呼者曰欲作沐德信耶其名流布播於異域如此雖自華夏不知者以爲前丗人江表傳曰南陽樊伷爲武昌部從事誘導諸夷叛属劉備孫權召問潘濬濬曰以五千兵往呉擒矣權曰卿}
