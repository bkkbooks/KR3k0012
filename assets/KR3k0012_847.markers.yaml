  - {type: variant, offset: 43, length: 2, content: 易內, WYG: 食公子}
  - {type: variant, offset: 46, length: 0, content: '', WYG: 後歸又曰昔闔廬在國天有菑厲親廵孤寡而共其乏困在軍熟食者分而後敢食其所嘗者卒乗與焉又曰衞侯為虎幄於籍圃成求令名者而與之始食焉太子請使良夫以良夫應為令名良夫乗衷甸兩牡衷甸一轅卿車紫衣狐裘至袒裘不釋劒而食食而熟故偏袒亦不敬太子使牽以退數之三罪而殺之又曰左師每食擊鍾聞鍾聲公曰夫子将食詩曰民之失徳乾餱以諐又曰民之貭矣日用}
