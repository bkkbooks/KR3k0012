  - {type: variant, offset: 4768, length: 3, content: 巴郡宋, SBCK: 齊人不食而死也又曰食於有喪者之側未甞飽也助哀戚也又曰庶人春薦韭夏薦麥秋薦􅁰冬薦稻韭以夘麥以魚􅁰以豚稻以鴈庶人無常桂取與新物相冝而巳又曰文王之爲太子朝於王季日三食上必在視寒煖之節在察也食下問所膳問所食者命上宰曰未有原應曰諾然後退未猶物也原再也勿有所再進爲其失飪􅆨味惡也退乆其寝也又曰朝夕之食上丗子必在視寒煖之節食下問所膳羞必知所進以命膳宰然後退羞必所進必知親所食也􅀂内竪言疾則丗子親齊􅀇而養親猶自也養疾者齊􅀇冠􅀇端也膳宰之饌必敬視之疾者之食齊和所欲或異疾之藥必親嘗之試毒也嘗饌善則丗子亦能食善謂多於前嘗饌寡丗子亦不能飽又不及武王一飯再飯又曰古者未有火化食草木之實鳥獸之肉飲其血茹其毛後聖有作然後修火之利以炮以燔以烹以炙以爲醴酪又曰夫禮之􅀄始諸飲食其燔􅁰捭豚捭卜麦切汙尊而杯飲汙烏莘切杯歩侯切蕢桴而土鼔蕢苦對切猶􅀂可以致其敬於􅀑神言其物雖質畧有齊敬之心則可以薦羞於􅀑神􅀑饗德不饗味也又曰天子一食諸侯再大夫三又曰不食雛鼈狼去膓狗去腎狸去正脊兎去凥狐去首豚去腦魚去乙鼈去醜皆爲不利人也又曰膳目諸膳也膷臐暁醢膷音香臐許云切曉許堯切牛炙醢牛胾醢牛膾羊炙胾醢豕炙醢豕胾芥醬魚膾雉兎鶉鷃此上大夫之禮庶羞二十豆也以公食大夫禮饌校之則曉牛炙間不得有醢醢衍字也又以鷃爲鴑也玉藻曰侍食於先生異爵者後察先飯謙也客􅀕主人辭曰不足􅀕也􅀕者盛食人饌也客飡主人辭以䟽飡者之言麄也又曰父命呼唯而不諾手執業則投之食在口則吐之又曰􅀂賜之食而君客之則命之􅀕然後􅀕雖見賔客猶也侍食則正不敢備禮不􅀕也先飯辨嘗羞飲而俟俟君食而後食之患也將食臣先嘗孝也􅀂有嘗羞者則俟君之食然後食飯飲而俟不􅀕侍食不嘗羞膳敢備禮也不飯飲利宰存也將食也君命之羞羞近者辟貪味也命之品甞之然後唯所欲必先編甞之凡甞逺食必順近食從近如也君未覆手不敢飱覆手食也以循咡巳飱勸食也君旣食又飯飱不敢先君飽飯飱者三飯也臣勸君如是可食也君旣徹執飯與醬乃出授從者食於尊前親徹也凢侑食不盡食於人不飽謙也又學記曰雖有嘉肴弗食不知其㫖也雖有至道弗學不知其善也旨美也又􅄂記曰孔子曰吾食於少施氏而飽少施氏食我以禮言貴其以禮待巳而爲之飽也時人倨慢􅀂季氏則不以禮矣少施氏魯惠公子施父之後吾􅀕作而辭曰䟽食不足􅀕也吾飱作而辭曰䟽食也不敢以傷吾子納幣一束束五兩兩五㝷又坊記曰故食禮主人親饋則客不􅀕故君親饋則客不􅀕故君子苟無禮雖美不食焉左傳曰晉公子重耳過衛衛文公不禮焉出於五鹿五鹿鄖地乞食於野人與之塊公子怒欲鞭之子犯曰天賜也得士有天賜稽首受而載之又曰楚伐庸岀師旬有五日百濮乃罷濮夷無屯聚見難則散歸自廬以徃振廪同食徃徃伐庸也振發也廪倉也同食上下無異饌也又曰􅀄宣子田於首山舎于翳桑田獵也桑桑之多䕃翳者首山在河東蒲板縣東南見靈輙餓問其病曰不食三日矣食之舎其半問之曰官三年矣官學也未知母之存否今近焉去家近請以遺之使盡之而爲之簞食與肉簞笥也寘諸槖以與之旣而與爲公介靈輒爲公甲士倒㦸以禦公徒而免之問其故對曰翳桑之餓人也問其名居問所居不告不退不望報也遂自亡也輒亦去又曰諸侯之師次于鄭西我師次于督楊不敢過鄭督鄭楊也子叔聲伯使叔孫豹請逆于晉師爲食於鄭郊師逆以至聲伯戒叔孫以必須所逆晉師至乃食聲伯四日不食以待之食使者使者豹之介而後食言其忠也又曰晉侯合諸侯楊干亂行魏綘戮其僕晉侯以綘爲能以刑佐民矣反役與之禮食使佐新軍羣臣族㑹禮食也又曰衛獻公戒孫文子寗惠子食勑戒二子欲共讌食皆服而朝日旰不召而射鴻於囿二子從之不釋皮冠而與之言二子怒又曰魏獻子爲政以魏戊爲梗楊大夫梗楊人有獄魏戊不能斷以獄上上魏子也其太宗賂以女樂訟者大宗魏子將受之戊謂閻没汝寛二人魏子大夫曰主以不賄聞於諸侯􅀂受梗楊人賄莫甚焉吾子必諌皆許諾退朝待於廷魏子朝君退而待於魏子之庭饋入召之召大失食比置三歎旣食使坐魏子曰吾聞諸伯叔諺曰唯食忘憂吾子置食之間三歎何也同辭而對曰或賜二小人酒不夕食或他人也言飢其也饋之始至恐其不足是以歎中置自咎曰豈將軍食之而有不足是以再歎及饋之畢願以小人之腹爲君子之心属厭而巳属足小人腹飽知足也言君子之心厭冝亦然獻子辭梗楊人又曰叔孫穆子食慶封慶封汜􅀕有余示有所先也汜􅀕逺散所􅀕不共穆子不􅀃使工爲之誦芧䲭工樂師芓鴟逸詩刺不敬亦不知又曰晉悼夫人食與人之城祀者與衆也城祀在往年綘縣人或年長矣無子而徃與於食又曰華亥與其妻必盥而食所質公子者後食公與夫人毎日必適華氏食公子而後歸又曰昔闔廬在國天有菑厲親廵􅀌寡而共其乏困在軍熟食者分而後敢食必湏軍士皆分熟食不敢先食分猶編也其所嘗者卒乗與焉所嘗甘珎非常食又曰衛侯爲虎幄於藉圃放藉田之圃新造幄幕皆以虎獸爲飾成求令名者而與之始食焉太子請使良夫以良夫應爲令名良夫乗􅂨甸兩壯􅂨甸一轅車紫衣狐裘紫衣君服至􅃝䘮不釋劒而食食而􅀬故偏祖亦不敬太子使牽以退數之以三罪而殺之又曰左師毎食擊鍾聞鍾聲公曰夫子將食詩曰民之失徳乾餱以餱食也箋云德言過乎又曰民之質矣日用飲食質成又生民曰克􅄮克嶷以就口食韓詩外傳曰子夏過曽子食之子夏曰不爲公費乎曽子曰有三費飲食不在其中少而學長而忘之一費事君而䡖􅀒乆交中絶三費舜典曰咨十有二牧曰食哉惟時王肅注曰食哉者所以重之民又洪範曰八政一曰食又曰惟辟玉食孔安國曰王食美食周書曰甘食美衣使長貧尚書大傳曰八政何以先食食者萬物之始人之所夲者也易曰雲上於天需君子以飲食讌樂需飲食之道也九五需于酒食貞吉又曰噬嗑食也頥中有物曰噬嗑又曰山下有雷頥君子慎言語節飲食論語曰一簞食一瓢飲人不堪其憂回也不改其樂又曰齊必變食居必}
