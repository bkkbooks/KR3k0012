  - {type: variant, offset: 144, length: 863, content: 甲伐而焚之伯有奔雍梁雍梁鄭地醒而後知之遂奔許傳曰齊惠欒高氏皆嗜酒欒高二族皆出惠公信內多怨說婦人言政多怨疆於陳鮑氏而惡之惡陳鮑夏有告陳桓子曰子旗子良將攻陳鮑氏亦告鮑氏桓子授甲而如鮑氏遭子良醉而騪欲及子良醉故驅告鮑文子遂見文子文子鮑國則亦授甲矣使視二子二子子旗子良也則皆將飲酒桓子曰彼雖不信彼傳言者聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒高氏後漢書曰更始韓夫人尤嗜酒每侍飲見常侍奏事輒怒曰帝方對我飲正用此時持事來乎起抵破書案又曰馬氏為人嗜酒闊達敢言闊達大度也敢言謂言果言敢無所隱也時醉在御前面折同列言其短長無所避忌帝故縱之以為笑樂魏志曰徐邈字景山魏國初為尚書郎時科禁酒而邈私飲至於沉醉校尉趙達問以曹事邈曰中聖人達白太祖太祖甚怒度遼將軍鮮于輔進曰平日醉客謂酒清者為聖人濁者為賢人邈性慎偶醉言耳坐刑後車駕幸許昌問邈曰頗復中聖人不邈對曰昔子反斃於穀陽御叔罰於飲酒臣嗜酒二子不能自懲時復中之然宿瘤以醜見傳而臣以醉見識帝大笑顧左右曰名不虛立又曰時苗字德胄鉅鹿人也少清白為人疾惡建安中入丞相府出為壽春令令行風靡楊州治在其縣時蔣濟為治中苗以初至欲往謁濟素嗜酒適會其醉不能見苗恚恨還刻木為人署曰酒徒蔣濟豎之於墻下旦夕射之州郡雖知其所為不恪然以其履行過人無若之何吳書曰鄭泉字文淵陳郡人愽學有奇志而性嗜酒其閑居每曰願得美酒滿五百斛舡以四時甘脆置兩頭反覆以飲之憊即住而啖肴膳酒有㪷升減即隨益之不亦快乎晉書曰光逸字孟祖遇亂避難渡江依胡母輔之初至屬輔之與謝鯤阮放畢卓羊曼桓彝陵孚散髮裸衣閉室酣飲已累日逸將排戶入守者不聽逸便於戶外脫衣露頭於狗竇中窺之而大叫輔之驚曰他人決不能爾必我孟祖也遽呼入遂與飲不捨晝夜人謂之八達又曰孟嘉為桓溫參軍嘉好酣飲愈多不亂溫問嘉酒有何好而卿嗜之之嘉曰未得酒中趣耳又曰孝武末年嗜酒好肉而會稽王道子昏醟尤甚唯狎眤謟邪於是國寶讒諛之計稍行於主相之間宋書曰衡陽王義季素嗜酒自彭城王義康廢後遂為長夜飲略少醒曰文帝詰責曰此非唯傷事業亦自損性皆汝所請近長沙兄弟皆緣此致故將軍蘇徵躭酒成疾旦夕待盡一門無此酣法汝於何得之義季雖奉旨酣縱不改成疾, SBCK: 食}
