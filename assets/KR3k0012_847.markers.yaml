  body:
  - {type: variant, offset: 3, length: 2, content: 四嗜, SBCK: 五食上周禮天官膳夫曰膳夫掌王之食膳羞以養王及后丗子羞有滋味凡王之饋食用六榖膳用六牲飲用六清羞用百二十品珎用八物醬用百有二十罋王日一舉鼎十有二物皆有俎以樂侑食膳夫用􅀕品嘗食王乃食又曰王齊則玉府供玉食鄭􅀇注曰玉陽之精御水氣也鄭司農云食玉犀也又天官食醫曰掌和王之六膳百羞百醬八珎之齊凢食齊眡春時飲冝温羹齊眡夏時羹冝熱醬齊眡秋時醬冝凉飲齊眡冬時飲冝寒凡和春多酸夏多苦秋多辛冬多鹹調以滑甘凢㑹膳食之冝牛冝稌羊冝􅎟豕冝稷犬冝梁鳥冝麦魚冝􅋎凡君子之食恒放焉又曰内饔掌王及后丗子膳羞之割烹煎和之事辨躰名肉物辨百品味之物割肆解由也烹煑也煎和成數選百羞醬物珎物以侯饋先進其中御者共后及丗子之膳羞膳夫掌之又曰小宰凡朝覲㑹同賔客以牢禮之灋掌其牢禮委積膳獻飲食賔賜之飡牽與其陳數又曰大宗伯以飲食之禮親宗族兄弟大戴禮曰食榖者必智惠而巧禮記曲禮上曰侍食於長者主人親饋則拜而食主人不親饋則不拜而食共食不飽無流歠鄭􅀇注曰流歠有似食也無咤食咤陟嫁切毋囓骨毋反魚肉毋投與狗骨母固獲飲自得曰固争自取曰獲毋刺齒又曰凡進食之禮左殽右胾食居人之左羮居人之右皆便食也殽骨躰也胾切肉也食飯属也居之左右明其近也殽在爼胾在豆膾炙處外醯醬處内殽胾之外内也近醯醬者食之主膾炙皆在豆也葱㳿處末㳿烝葱也處醯醬之左言末者殊加也在豆}
