  - {type: variant, offset: 4797, length: 2, content: 無儀, SBCK: 以輕之濬曰伷昔爲州人設饌比至日中食不可得而十餘自起此亦侏儒觀一節之驗權即遣將五千兵徃果平武昌呉志曰歩騭字子山丗亂避難江東單身窮困與廣陵衛旌同年相善俱以種􅀲自給晝勤四躰夜誦經傳㑹稽焦征羗郡之豪族人客放縱騭與旌􅀉食其地懼爲所侵乃共修刺奉􅀲以奏征羗方内卧駐之移時旌欲去騭止之曰本所以來畏其強也今舎去欲以爲髙祗怨耳良乆征羗聞牖見之身隱几坐帳中設席致地坐騭旌於牖外旌愈耻之騭辭色自􅀂征羗身自亨大案殽膳重沓而小盤飯與騭旌唯菜茄而巳旌不能食騭極飲致飽乃辭出旌怒騭曰能忍此乎騭曰吾等貧賤是以主人以貧賤遇之固其冝也當何所耻蜀志曰漢献帝舅車􅀐將軍董永辭帝受帝太帶中宻詔當誅曹公先主是時與曹公從容曹公謂先主曰天下英雄唯使君與操耳夲􅀄之徒不足數也先主食失匕箸又曰􅀜羽甞爲流矢所中貫其左臂後瘡雖愈毎隂雨痛醫曰矢鏃有毒毒入于骨當破臂作瘡刮骨去毒然後此患乃除耳羽便伸臂令醫鑿之時羽}
