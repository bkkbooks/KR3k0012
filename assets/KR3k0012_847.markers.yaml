  - {type: variant, offset: 26, length: 117, content: 自為政以付舍則以其內實遷于盧蒲嫳氏易內而飲酒內實寶物妻妾也傳曰鄭伯有嗜酒為窟室窟實地室而夜飲酒擊鐘焉朝至未已朝者曰公焉在家臣故謂伯有為公其人曰吾公壑谷壑谷窟室皆自朝布路而罷布路分散既而朝伯有朝鄭君則又將使子晳如楚歸而飲酒庚子子晳以駟氏, SBCK: 食嗟來}
  - {type: variant, offset: 26, length: 1, content: 自, WYG: 食以待之食使者而後食又曰晉侯㑹諸侯楊干亂行魏絳戮其僕晉侯以絳為能以刑佐民矣反役與之禮食使佐新軍又曰衞獻公戒孫文子寗惠子食皆服而朝日旰不召而射鴻於囿二子從之不釋皮冠而與之言二子怒又曰魏獻子}
