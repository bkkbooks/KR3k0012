  - {type: variant, offset: 4793, length: 1, content: 在, SBCK: 疾不能飲食郁亦不肯食宗親共竒之因名曰異又曰趙孝字長平建武􅀄天下新定榖食尚少孝得榖炊熟令弟禮夫妻使出比還孝夫妻共茹􅂼菜禮夫妻來歸告言巳食輒獨飯之積乆禮心怪疑後掩伺見之亦不肯後岀遂共􅂼食兄弟怡怡郷里歸徳又曰梁鴻少􅀌以㓜童詣太學受業治詩禮春秋常獨止不與人同食又曰明德皇后旣處椒房太官上飯累餚膳備副重加幕覆輙徹去譴勑令與諸舎相望也謝氶後漢書曰茅容字季偉陳留人與等軰避西樹下衆皆箕踞相對容危}
  - {type: variant, offset: 4793, length: 1, content: 在, krp: 疾不能飲食郁亦不肯食宗親共竒之因名曰異又曰趙孝字長平建武𥘉天下新定榖食尚少孝得榖炊熟令弟禮夫妻使出比還孝夫妻共茹𬞞菜禮夫妻來歸告言巳食輒獨飯之積乆禮心怪疑後掩伺見之亦不肯後岀遂共𬞞食兄弟怡怡郷里歸徳又曰梁鴻少孤以㓜童詣太學受業治詩禮春秋常獨止不與人同食又曰明德皇后旣處椒房太官上飯累餚膳備副重加幕覆輙徹去譴勑令與諸舎相望也謝氶後漢書曰茅容字季偉陳留人與等軰避西樹下衆皆箕踞相對容危}
  - {type: variant, offset: 4795, length: 0, content: '', SBCK: 愈恭郭林宗見而竒之共與言因請寓􅀫旦日容殺鷄爲􅁰林宗謂爲已設旣而以供其母自以菜􅂼與林宗同飯林宗起拜之曰卿賢乎哉因勸令學卒以成德也後列曰董宣爲洛陽令殺胡陽公主奴帝怒欲殺宣後原之勑令詣太官賜食宣受詔出飯盡覆杯食按}
