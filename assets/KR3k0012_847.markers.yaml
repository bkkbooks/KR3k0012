  - {type: variant, offset: 105, length: 195, content: 皆自朝布路而罷布路分散既而朝伯有朝鄭君則又將使子晳如楚歸而飲酒庚子子晳以駟氏之甲伐而焚之伯有奔雍梁雍梁鄭地醒而後知之遂奔許傳曰齊惠欒高氏皆嗜酒欒高二族皆出惠公信內多怨說婦人言政多怨疆於陳鮑氏而惡之惡陳鮑夏有告陳桓子曰子旗子良將攻陳鮑氏亦告鮑氏桓子授甲而如鮑氏遭子良醉而騪欲及子良醉故驅告鮑文子遂見文子文子鮑國則亦授甲矣使視二子二子子旗子良也則皆將飲酒桓子曰彼雖不信彼傳言者聞我授甲則必逐我及, WYG: 節}
