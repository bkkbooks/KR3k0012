  - {type: variant, offset: 95, length: 0, content: '', WYG: 中少而學長而亡之一費舜典曰咨十有二牧曰食哉惟時又洪範曰八政一曰食又曰惟辟玉食周書曰甘食美衣使長貧尚書太傅曰八政何以先食食者萬物之始}
  - {type: page-break, offset: 95, content: '', id: KR3k0012_WYG_847-8a, image: WYG0900/WYG0900-0477c.png}
  - {type: variant, offset: 96, length: 0, content: '', WYG: 之所本者也易曰雲上扵天需君子以飲食宴樂九五需于酒食貞吉又曰噬嗑食也頥中有物曰噬嗑又曰山下有雷頥君子慎言語節飲食論語曰一簞食一瓢飲人不堪其憂囘也不改其樂又曰齋必變食居必遷坐食不厭精膾不厭細肉雖多不使勝食氣食不語寝不言雖蔬食菜羮𤓰祭必齋如也史記曰張蒼常被刑王陵救免之蒼常德陵後為丞相洗沐常先朝陵夫人食然後敢歸家又曰韓信從下鄉南昌亭長寄食亭長患之乃晨炊蓐食時信往不為具食信亦知其意怒竟絶去釣於城下諸母漂有一母見信飢飯信竟漂數十日信喜謂漂母}
