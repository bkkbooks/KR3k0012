  - {type: variant, offset: 4774, length: 3, content: 靜往阿, SBCK: 焉及神農時民食榖釋米加于燒石之上而食及黄帝始有釡甑火食之道成戰國䇿曰蘇􅁗之楚三月迺得見王談卒辭行楚王曰先王不逺千里而臨寡人曽弗肯留願聞其􅀃對曰楚國食貴於玉薪貴於桂謁者難見於鬼王難見於帝今令臣食玉炊桂因􅀑見帝其可得乎漢書曰陸賈勸陳平與太尉綘侯和以謀諸吕平乃以}
