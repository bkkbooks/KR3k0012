  - {type: variant, offset: 34, length: 0, content: '', WYG: 獄上}
  - {type: variant, offset: 35, length: 7, content: 內實遷于盧蒲嫳, WYG: 大宗賂以女樂魏子将受之戊謂閻没汝寛曰主不賄聞扵諸侯若受楩楊人賄莫甚焉吾子必諫皆許諾退朝待扵廷饋入召之北置三歎既食使坐魏子曰吾聞諸伯叔諺曰唯食㤀憂吾子置食之間三歎何也同辭而對曰或賜小人酒不夕食饋之始至恐其不足是以歎中置自咎曰豈将軍食之而有不足是以再歎及饋之畢願以小人之腹度君子之心屬厭而已獻子辭楩陽人又曰叔孫穆子食慶封慶封汜祭穆子不説使工為之誦茅鴟亦不如又曰晉悼夫人食輿人之城杞者絳縣人或年長矣無子而往與於食又曰華亥與其妻必盥而食所質公子者後食公與夫人每日必適華}
