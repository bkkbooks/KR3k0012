  - {type: variant, offset: 3574, length: 907, content: 魏志曰吳質黃初五年朝京師詔大將軍及特進以下皆會質所太官給供俱酒酣質欲盡歡時上將軍曹真性肥中領軍朱鑠性瘦質召優使說肥瘦真負其貴恥見賤怒謂質曰卿欲以部曲將遇我耶驃騎將軍曹洪輕車將軍王忠言將軍必欲使上將軍肥即自宜為瘦真愈恚拔刀瞋目言俳敢輕說吾斬爾遂罵坐質案劍曰曹子丹汝非屠机上肉吳質吞爾不嚙喉咀汝不嚙牙何敢恃勢憍耶鑠因起曰陛下使吾等來樂卿耳乃至此耶質顧叱之曰朱鑠敢壞坐諸將軍皆還坐鑠愈恚還拔劍斬地遂使罷也吳志曰權既為吳王歡宴之末自起行酒虞翻伏地佯醉不起權去翻起坐權於是大怒手拔劍次擊之侍坐者莫不惶遽唯大司農劉基起抱權諫曰大王以三爵後手殺善士雖翻有罪天下孰知之且大王以能容賢畜眾故海內望風今一朝棄之可乎權曰曹孟德殺孔文舉孤於虞翻何有哉基曰孟德輕害士人天下非之大王躬德義欲與堯舜比隆曾何自喻於彼乎翻由是得免權因勑左右自今酒後言殺皆不得殺也又曰胡綜性愛酒酒後讙呼極意或推引杯觴搏擊左右權愛其才不備責也又曰凌統當擊賊圍先期統與督將陳勤會飲酒勤剛勇任氣因督酒際陵轢一坐舉罰不以其道統疾其侮慢面折不為具酒勤怒詈統及其父操統流涕不荅眾因罷坐勤乘酒凶悖又於道路辱統統不忍引刀斫勤數日死及當攻屯統曰非死無以謝罪乃率厲士卒身當矢石所攻一面應時破壞諸將乘勝遂大破之還自拘於軍正權壯其果毅許以功贖罪晉書曰庾純為河南尹以賈充姦佞與任愷共舉充西鎮關中充由是不平充嘗宴朝士而純後至充謂曰尹行嘗居人前今何以在後純曰且有小市事不了是以來後世言純之先嘗有五百者充之先有市魁者故充純以此相譏焉充自以功隆望重意殊不平及純行酒充不時飲純曰長者為壽何敢爾乎充曰父老不歸供養將何言也純因發怒曰賈充天下凶由爾一人充曰輔佐二世蕩平巴蜀有何罪而天下謂之凶凶純曰高貴鄉公何在眾坐因罷充左右欲執純中護軍羊琇侍中王濟佐之因得出充慚怒上表解職純懼上河南尹關中侯印綬上表自劾晉裴楷傳曰石崇以功臣子有才氣與裴楷志趣各異不與之交長水校尉孫季舒常酣讌慢慠過度欲表免之楷聞之謂崇曰足下飲人狂藥責人正禮不亦乖乎乃止又曰裴遐嘗在平東將軍周馥坐與人圍碁馥司馬行酒遐不即飲司馬醉怒因曳遐墮地遐徐起還坐顏色不變復碁如故其性和如是宋書曰謝超宗為人恃才使酒多所陵忽在直省常醉上召見語及北方事超宗曰虜動來二, WYG: 四}
