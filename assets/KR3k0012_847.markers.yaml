  - {type: variant, offset: 758, length: 309, content: 與謝鯤阮放畢卓羊曼桓彝陵孚散髮裸衣閉室酣飲已累日逸將排戶入守者不聽逸便於戶外脫衣露頭於狗竇中窺之而大叫輔之驚曰他人決不能爾必我孟祖也遽呼入遂與飲不捨晝夜人謂之八達又曰孟嘉為桓溫參軍嘉好酣飲愈多不亂溫問嘉酒有何好而卿嗜之之嘉曰未得酒中趣耳又曰孝武末年嗜酒好肉而會稽王道子昏醟尤甚唯狎眤謟邪於是國寶讒諛之計稍行於主相之間宋書曰衡陽王義季素嗜酒自彭城王義康廢後遂為長夜飲略少醒曰文帝詰責曰此非唯傷事業亦自損性皆汝所請近長沙兄弟皆緣此致故將軍蘇徵躭酒成疾旦夕待盡一門無此酣法汝於何得之義季雖奉旨酣縱不改成疾以至於終又曰范泰初為太學愽士外弟荊州刺史王忱請為天門太守忱嗜酒醉輒累旬及醒則儼然端肅泰陳酒既傷生所宜深誡其言甚切忱嗟歎久, WYG: 移時旌欲去隲止}
