  - {type: variant, offset: 2232, length: 2531, content: 從之方仍俱脫車輪更留一宿是時失消難兩宿莫知所在內外驚異及消難出方具言之世宗在京輔政白魏帝賜消難美酒數石珍羞十輿并令朝士與季式親狎者就季式宅讌集其被優遇如此唐書曰王源中為戶部侍郎翰林丞旨學士性頗嗜酒嘗召對源中方沉醉不能起及醉醒同列告之源中但懷憂殊無悔恨他日又以醉不任赴召遂終不得大任以眼病求免所職列子曰子產之兄公孫朝聚酒千鍾積麴成封望門百步糟漿之氣逆於人鼻方其荒於酒也不知正道之安危人理之悔恡室內之有無九族之親踈雖水火兵刃交於前不知也王子年拾遺記曰晉有羌人姚馥字世芬充廄馬圉每醉中好言王者興亡之事常云九河之水不足以漬麴蘗八藪之木不足以為蒸薪七澤之麋不足以充庖俎恒言渴於醇酒群輩呼為渴羗後武帝受以朝歌守馥辭願且為馬圉時賜美酒以樂餘年帝曰朝歌紂之舊都地有酒池故使老羗不復呼渴固辭遷酒泉太守地有清池其味若酒馥乘醉而拜受之世說曰劉靈病酒渴甚從婦求酒持器泣諫曰君飲酒太過非攝生之道必宜斷之靈曰甚善我不能自禁唯當祝鬼自誓斷之耳便可具酒肉婦從之靈跪而呪曰天生劉靈以酒為名一飲一斛五斗解醒婦人之言慎不可聽便引酒進肉隗然已醉又曰畢茂世云一手持蟹螯一手持酒盃拍浮酒池中便足了一生使酒史記曰季布為河東守孝文時人有言其賢者孝文召欲以為御史大夫復有言其勇使酒難近至留邸一月見罷布因進曰臣無功竊寵待罪河東陛下無故召臣此人必有以臣欺陛下者今臣至無所受事罷去此人必有毀臣者夫陛下以一人之譽而召臣以一人之毀而去臣臣恐天下有識聞之有以窺陛下也上嘿然慚良久曰河東吾股肱郡故時召君耳布辭之官又曰孝武建元元年灌夫入為太僕二年夫與長樂衛尉竇甫飲輕重不得飲酒輕重不得其平夫醉搏甫甫竇太后昆弟也上恐太后誅夫徙為燕相數歲坐法去官家居長安灌夫為人剛直使酒不好面諛貴戚諸有勢在己之右不欲加禮必陵之諸士在己之左愈貧賤尤益敬灌夫家居雖富然失勢賓客益衰及魏其侯失勢亦欲倚夫引繩排根生平慕之後棄之者夫亦倚魏其而通列侯宗室為名高兩人相為引重其游如父子然相得驩甚恨相知晚也夫有服過丞相丞相從容曰吾欲與仲孺過魏其侯會仲孺有服夫曰將軍乃肯幸臨況魏其侯夫安敢以服為解請語魏其侯帳具將軍旦日早臨武安許諾夫具語魏其侯如所謂武安侯魏其與其夫人益市牛酒夜灑掃早帳具至旦平明令門下候伺至日中丞相不來魏其謂夫曰丞相豈忘之哉夫不懌曰夫以服請宜往乃駕自往迎丞相丞相特前戲許灌夫殊無意往及夫至門丞相尚臥於是夫入見曰將軍昨日幸許過魏其魏其夫妻治具自旦至今未敢嘗食武安愕謝曰吾昨日醉忽忘與仲孺言乃駕往及飲酒酣夫起舞屬丞相丞相不起夫從坐上語侵之魏其扶灌夫去謝丞相丞相卒飲至夜極驩而去丞相嘗使籍福請魏其城南田不得由此怨灌夫魏其後丞相娶燕王女為夫人有太后詔召列侯宗室皆往賀魏其侯過灌夫與俱夫謝曰夫數以酒失得過丞相丞相今者又與夫有郄魏其曰事已解強與俱飲酒酣武安起為壽皆避席伏已魏其侯為壽獨故人避席耳餘半膝席夫不悅起行酒至武安武安膝席曰不能滿觴夫怒因嘻笑曰將軍貴人也屬之時武安不肯行酒次至臨汝侯灌嬰孫名賢臨汝侯方與程不識耳語又不避席夫無所發怒乃罵臨汝侯曰生平毀程不識不直一錢今日長者為壽乃效女兒呫囁耳語武安謂灌夫曰程李俱東西宮衛尉今眾辱程將軍仲孺獨不為李將軍地乎灌夫曰今日斬頭陷胸何知程李乎坐乃起更衣稍稍去續漢書曰時聖公聚客家有酒請游徼飲賓客醉歌言朝烹兩都尉游徼後來用調羹味游徼大怒縛捶數百魏志曰吳質黃初五年朝京師詔大將軍及特進以下皆會質所太官給供俱酒酣質欲盡歡時上將軍曹真性肥中領軍朱鑠性瘦質召優使說肥瘦真負其貴恥見賤怒謂質曰卿欲以部曲將遇我耶驃騎將軍曹洪輕車將軍王忠言將軍必欲使上將軍肥即自宜為瘦真愈恚拔刀瞋目言俳敢輕說吾斬爾遂罵坐質案劍曰曹子丹汝非屠机上肉吳質吞爾不嚙喉咀汝不嚙牙何敢恃勢憍耶鑠因起曰陛下使吾等來樂卿耳乃至此耶質顧叱之曰朱鑠敢壞坐諸將軍皆還坐鑠愈恚還拔劍斬地遂使罷也吳志曰權既為吳王歡宴之末自起行酒虞翻伏地佯醉不起權去翻起坐權於是大怒手拔劍次擊之侍坐者莫不惶遽唯大司農劉基起抱權諫曰大王以三爵後手殺善士雖翻有罪天下孰知之且大王以能容賢畜眾故海內望風今一朝棄之可乎權曰曹孟德殺孔文舉孤於虞翻何有哉基曰孟德輕害士人天下非之大王躬德義欲與堯舜比隆曾何自喻於彼乎翻由是得免權因勑左右自今酒後言殺皆不得殺也又曰胡綜性愛酒酒後讙呼極意或推引杯觴搏擊左右權愛其才不備責也又曰凌統當擊賊圍先期統與督將陳勤會飲酒勤剛勇任氣因督酒際陵轢一坐舉罰不以其道統疾其侮慢面折不為具酒勤怒詈統及其父操統流涕不荅眾因罷坐勤乘酒凶悖又於道路辱統統不忍引刀斫勤數日死及當攻屯統曰非死無以謝罪乃率厲士卒身當矢石所攻一面應時破壞諸將乘勝遂大破之還自拘於軍正權壯其果毅許以功贖罪晉書曰庾純為河南尹以賈充姦佞與任愷共舉充西鎮關中充由是不平充嘗宴朝士而純後至充謂曰尹行嘗居人前今何以在後純曰且有小市事不了是以來後世言純之先嘗有五百者充之先有市魁者故充純以此相譏焉充自以功隆望重意殊不平及純行酒充不時飲純曰長者為壽何敢爾乎充曰父老不歸供養將何言也純因發怒曰賈充天下凶由爾一人充曰輔佐二世蕩平巴蜀有何罪而天下謂之凶凶純曰高貴鄉公何在眾坐因罷充左右欲執純中護軍羊琇侍中王濟佐之因得出充慚怒上表解職純懼上河南尹關中侯印綬上表自劾晉裴楷傳曰石崇以功臣子有才氣與裴楷志趣各異不與之交長水校尉孫季舒常酣讌慢慠過度欲表免之楷聞之謂崇曰足下飲人狂藥責人正禮不亦乖乎乃止又曰裴遐嘗在平東將軍周馥坐與人圍碁馥司馬行酒遐不即飲司馬醉怒因曳遐墮地遐徐起還坐顏色不變復碁如故其性和如是宋書曰謝超宗為人恃才使酒多所陵忽在直省常醉上召見語及北方事超宗曰虜動來二十年矣佛出亦無如之何以失儀出為南郡王中軍司馬梁書曰蕭頴達出為豫章內史意甚憤憤未發前預華林宴酒後於座辭氣不悅沈約因勸酒欲以觀之穎達大罵約曰我今日形容正是汝老鼠所為何忽復勸我酒舉坐驚愕帝謂之曰汝是我家阿五沈公宿望何意輕脫若以法繩汝汝復何理達竟無一言唯大涕泣心愧之又曰謝善勳飲酒至數升醉後輒張眼大罵雖復貴賤親踈無所擇也時謂之謝方眼陳書曰柳盼為散騎常侍性愚戇使酒因醉乘馬入殿門為有司劾免於家風俗通曰陳國有趙祐者酒後自相署或稱亭長督郵祐復於外騎馬將絳幡云我使者也司徒鮑昱決獄云騎馬將幡起於戲耳無他惡意又曰汝南張妙酒後相戲遂縛捶二十下又縣足指遂至死鮑昱決事云原其本意無賊心宜減, SBCK: ''}
