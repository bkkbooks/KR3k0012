  - {type: variant, offset: 4779, length: 0, content: '', SBCK: 必稽首俯伏而食如在上前子孫有過對案不食又曰有司劾竇嬰矯先帝詔棄市嬰陽病不食欲死或聞上無意殺嬰復食也又曰昌邑王在䘮詔太官上乗轝食如故食監奏未釋服未可御故食也又曰鮑宣上書曰陛下擢臣岩穴誠兾有益毫毛豈徒欲臣美食大官重髙門之地哉晉灼曰高門殿名也又曰太師孔光聖人之後先師之子徳行純淑賜飱十七物服䖍曰食具十七動物也續漢書曰靈帝數遊於西園令後宫采女爲客舎主身爲啇賈行至客舎采女下酒因共}
