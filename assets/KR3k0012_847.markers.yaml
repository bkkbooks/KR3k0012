  - {type: punctuation, offset: 6, content: 《, id: KR3k0012_CHANT_847-bkkpn1}
  - {type: variant, offset: 6, length: 1, content: 傳, SBCK: 醬處右處羮之右此言􅀂酒若􅄴耳兩有之則左酒右醬也以脯脩置者左朐右末亦便食也屈中曰俱其俱切又}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 醤處右以脯脩置者左朐右末又曰齊大饑黔敖為食扵路以待餓者而食之有餓者䝉袂輯履貿貿然來黔敖左奉食右執飲曰嗟來食揚其目而視之曰予唯不食嗟來之食以至於斯也從而謝焉終不食而死又曰食扵有喪者之側未嘗飽也又曰庶人春薦韭夏薦麥秋薦黍冬薦稻韭以卵麥以魚黍以豚稻以鴈又曰文王之為世子朝於王季日三食上必在視寒煖之節食下問所膳命膳宰曰未有原應曰諾然後退又曰朝夕之食上世子必在視寒煖之節食不問所膳羞必知所進及命膳宰然后退若内豎言疾則世子親齊𤣥而養膳宰之饌必敬視之疾之藥必親嘗之嘗饌善則世子亦能食嘗饌寡世子亦不能飽又曰古者未有火化食草木之實鳥獸之肉飲其血茹其毛後聖有作然後脩火之利以炮以燔以烹以炙以為醴酪又曰夫禮之初始諸飲食其燔黍捭豚汗尊而抔飲蕢桴而土鼓猶若可以致其敬扵鬼神又曰天子一食諸侯再大夫士三食力無數又曰不食雛鼈狼去膓狗去腎貍去正脊兎去尻狐去首豚去腦魚去乙鼈去醜皆為不利人也又曰膳目諸膳也膷臐膮醢膷晉香切臐許云切膮許尭切牛炙醢牛胾醢牛膾羊炙羊胾醢豕炙醢豕胾芥醤魚膾雉兎鵓鷃此上大夫之禮玉藻曰侍食於先生異爵者后祭先飯客祭主人辭曰不足祭也客飱主人辭以疏又曰父命呼唯而不諾手執業則投之食在口則吐之又曰君賜之食而君客之則命之祭然後祭先飯辯嘗羞飲而俟若有嘗羞者則俟君之食然後食飯飲而俟君命之羞羞近者辟貪味也命之品嘗之然後唯所欲凡嘗逺食必順近食從近始也居未覆手不敢飱君既食又飯飱不敢先君飽飯飱者三飯也君既徹執飯與醤乃出授從者凡侑食不盡食食於人不飽又學記曰雖有嘉肴弗食不知其㫖也雖有至道弗學不知其善也又雜記曰孔子曰吾食於少施氏而飽少施氏食我以禮吾祭作而辭曰不足祭也吾飱作而辭曰䟽食也不敢以傷吾子又坊記曰故食禮主人親饋則客祭主人不親饋則客不祭故君子苟無禮雖美不食焉左}
