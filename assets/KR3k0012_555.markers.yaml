  - {type: variant, offset: 814, length: 0, content: '', SBCK: 自夫子之死吾無質矣吾無與言之矣韓子曰墨者之葬也冬日冬服夏日夏服桐棺三寸執䘮二日世主以爲儉而尤之儒者破家而葬債子而償執䘮三年毀而扶杖世主以爲孝而禮之也又曰齊國好厚葬布帛盡於衣衾材木盡於棺椁桓公患之以告管仲曰布帛盡則無以爲幣材木盡則無以爲守備而人厚葬之不休柰何管仲對曰凡人之有爲也非名之則利之也乃下令曰棺椁過度者僇其尸罪夫當裘者夫僇死無名罪當䘮者無利人何故爲之也尸子曰禹之䘮法死於陵者葬於陵死於澤者者葬於澤桐棺三寸制䘮三日舜西教平七戎道死葬南巴之中衣衾三領欵木之棺􅁑以緘之吕氏春秋曰}
