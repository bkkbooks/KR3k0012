  - {type: variant, offset: 2812, length: 527, content: 里屈澗之濱下車數乘不設旒旐百姓相聚而觀之曰前所殺天子也或掩面而泣晉諸公讚賈后女宣華公主葬用羽葆鼓吹熊渠佽飛為鹵簿晉書曰石苞以泰始八年薨預為終制曰延陵薄葬孔子以為達禮華元厚葬春秋以為不臣古之明義也自今死亡者皆斂以時服不得兼重又不設床帳明器窆後復土滿坎不得起墳種樹王隱晉書曰庚峻遺勑子珉曰朝卒暮殯幅巾布衣葬不擇日珉奉遺命殮以時服晉中興書曰劉驎之少有信義去家百餘里有一獨嫗病將死歎息謂人曰誰當埋我唯有劉長史耳何由令知驎之先聞有病故往候之值其命終乃身為治棺殯送其仁愛惻隱若此也王隱晉書曰蘇韶安平人也為中牟令第九子名節畫日見韶入乘馬介黃練衣曰吾欲改葬乃授節為書曰吾性好愛京洛每往來瞻覩芒山上樂哉乎此萬代之基也背孟津洋洋之河南望天邑濟濟之盛此志雖未言銘之於心不啚奄忽所懷未果前至十月可速改葬買數畝地便自足矣晉書曰成都王潁死其後沒桑害東羸公騰稱為潁報讎遂出頴棺載之於軍中每事啟靈以行軍令桑敗棄棺於故井中頴故臣收之改葬於洛陽晉中興書曰王導薨詔給九旒轀輬車黃屋左纛前後羽葆鼓吹挽歌兩部虎賁班劍百人中興名臣莫與為此也晉中興書曰初溫嶠葬豫章朝議以嶠首受顧命功濟社稷宜還陪陵官為起冢太尉侃上䟽停其移葬詔從之至嶠後妻何氏卒便載嶠喪還都詔令葬建平陵北并贈嶠二妻王氏何氏始安夫人印綬云, SBCK: 五}
