  - {type: variant, offset: 3220, length: 0, content: '', WYG: 王詔孝子傳南史曰顧憲之仕齊為衡陽内史先是郡境連歲疾疫死者大半棺椁尤貴悉裹以葦席棄之路傍憲之下車分告屬縣求其親黨悉令殯葬其家人絶滅者憲之出公禄使綱紀營䕶之又土人有病輙云先亡為禍皆開塜剖椁水洗枯骨名為除祟憲之曉喻為開譬生死之别事不相由其俗遂改又}
