  - {type: variant, offset: 14, length: 1, content: 鄧, SBCK: 子能葬我是以相報子五十已後當富貴不可言勿忘玄度也宋書曰謝方明父冲爲孫恩所殺伯父邈守呉興又爲孫恩黨害之方明體素羸弱而勇決過人結邈門生討其黨悉擒手刃之時亂後􅁻凶禮廢方明合門遇禍資産無遺而營舉之功盡力數月葬送並畢平世備禮無以加也南史曰王思逺少無仕心宋建平王景素辟南徐州主簿深見禮景素􅀍誅左右離散思逺親視殯葬手種松栢與盧江何昌寓上表理之宋書曰王徽少好學弟僧謙亦有才譽爲太子舎人遇疾徽躬自處療而僧謙服藥失度遂卒徽深自咎恨發病不復自療哀痛僧謙不能巳以書告靈僧謙卒後四旬而徽終遺令薄葬不設轜旐鼓挽之屬施五尺床爲靈二􅀫便毀又曰范泰卒􅀄議贈開府殷景仁曰泰素望不重不可擬議台司竟不果及葬王}
  - {type: page-break, offset: 14, content: '', id: KR3k0012_SBCK_555-1b}
  - {type: page-break, offset: 14, content: '', id: KR3k0012_SBCK_555-2a}
  - {type: variant, offset: 16, length: 0, content: '', SBCK: 撫棺哭曰君生平重殷鐵今以此爲報沈約宋書曰呉逵呉興烏程人經荒饉繼以疾病父母兄弟嫂及郡羣從小功之親男女死者十三人唯逵夫妻獲全家徒四壁立冬無􅀍袴晝則傭賃夜則伐木燒塼妻亦同逵此誠朞年中成七墓十三棺亦出中興書王韶孝子傳南史曰顧憲之仕齊爲衡陽内史先是郡境連歳疾疫死者太半棺椁尤貴悉褁以葦席弃之路傍憲之下車分告屬縣求其親黨悉令殯葬其家人絶滅者憲之出公禄使綱紀營護之又土山人有病輒云先亡爲禍皆開􅃁剖椁水洗枯骨名爲除祟憲之曉諭爲陳生死之別事不相由風俗遂改又曰王儉領中書監參掌選事其年疾上親視}
