  - {type: variant, offset: 3283, length: 0, content: '', WYG: 故使雪弛其期更為曰此文王之義也太子曰善莊子曰莊子將死弟子欲厚葬之莊子曰吾以天地為棺椁日月為連璧星辰為珠璣萬物為齊送吾葬具不備耶何以加此弟子曰吾恐烏䳒之食夫子也莊子曰在上為烏䳒食在下為螻蟻食奪彼與此何偏耶又曰莊子送葬過惠子之墓顧謂從者曰郢人有墁以堊汚其鼻端若蠅翼使匠石斷之運斤成風堊盡而鼻不傷自夫子之死吾無質矣吾无與言之矣韓子曰墨者之葬也冬日冬服夏日夏服桐棺三寸執䘮二日世主以為儉而尤之儒者破家而葬債子而償執䘮三年毁而扶杖世主以為孝而禮之也又曰齊國好厚葬布帛盡於衣衾材木盡於棺椁桓公患之以告管仲曰布帛盡无以為幣材木盡則无以為守備而人厚葬之不休奈何管仲對曰凡人之有為也非名之則利之也乃下令曰棺椁過度者僇其尸罪夫當䘮者夫僇死无名罪當䘮者无利人何故為之尸子曰禹之䘮法死於陵者葬於陵死於澤者葬於澤桐棺三寸制䘮三日舜西教乎七戎道死葬於南巴之中衣衾三領欵木之棺葛以緘之吕氏春秋曰孝子之重其親也慈親之愛其子也痛於肌骨性也所重所愛死而棄之溝壑人之情不忍為故有葬死之義葬者藏也藏淺則狐貍迫之深則及於泉故凡葬必於髙陵之上以避狐貍之患水泉之濕此則善也又曰審知生聖之要審知死聖之極也知生者不以害生養生之謂也知死者不以害死二者聖人之所獨决也凡生於天地之間其必有死所不免也淮南子曰禹之時天下水禹身執畚挿當此之時死陵者葬陵死澤者葬澤節財薄葬焉又曰馬免人於難者死也葬之以帷􅞲為衾牛有德於人其葬之大車之箱牛馬有功猶不可忘又况人乎又曰禹有洪水之患陂塘之事陂蓄水塘池也故朝死而暮葬此皆聖人之所以應時設教見而施}
