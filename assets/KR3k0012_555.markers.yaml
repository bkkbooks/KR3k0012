  - {type: variant, offset: 8, length: 0, content: '', SBCK: 三􅀳中興書曰東海王越妃裴氏痛越棺柩􅀍焚乃招魂葬越於丹徒中宗以爲非禮下詔曰夫􅃁以藏形廟以安神今世招魂葬者是埋神也其禁之後魏書曰韓延字顯宗爲虎牢鎭將初延曽徃栢谷塢有魯宗之墓有終焉之志因謂子孫曰我不勞向北代葬也即可就此子孫從其言崔鴻後燕録曰趙秋字武汲郡朝歌人也輕財好施隣人李玄度母死家貧無以葬秋謂其兄曰赴死救不足仁之本也家有}
  - {type: variant, offset: 8, length: 488, content: 二東觀漢記曰鄧弘薨有司復請加謚曰昭成君發五校輕車騎士為陳至葬所所施皆如霍光故事皇太后皆曰門生輓送謝承後漢書曰鄧晨尚世祖姊新野公主主為王莽兵所害及薨詔備主官屬法駕招迎主魂與晨合葬於北邙謝承後漢書曰馬援卒後有人上書譖之者援妻孥惶怖不敢以喪還舊塋裁買城西數畝地槀葬而已賓客故人莫敢弔會援妻子草索相連詣闕請罪帝乃出訟書以示之方知所坐上書訢冤前後六上辭甚哀灱然後得葬謝承後漢書曰崔瑗為濟北相光祿大夫杜喬為八使徇行郡國以贓奏瑗徵詣廷尉瑗上書自訟得理出會病卒臨終顧命子實曰人稟天地之氣以生及其終也歸精於天還骨於地何地不可藏形骸勿歸鄉里實奉遺令遂留葬洛陽初崔實父卒摽賣田宅起冢塋立碑頌葬訖資產竭盡因窮困以搉酤鬻為業時人多以此譏之實終不改亦取足而已不致盈餘謝承後漢書曰陳寵為廣漢太守先是洛縣城南每陰雨常有哭聲聞於府中積數十年寵問而疑其故使吏桉行還言襄亂時此下多死亡者而骨骸不得葬償儻在於是寵愴然矜之即勑縣盡收斂葬之自是哭遂絕華嶠後漢書曰楊震為太尉中常侍樊豐等驕恣震常灱諫由是共構譖震策罷遣歸本郡遂仰鴆薨薨日有大烏來止樹上須臾下地安行到柩前正立低頭旁人共更撫抱終不驚駭鳥蒼色頸去地五六尺舒翅廣一丈, WYG: ''}
