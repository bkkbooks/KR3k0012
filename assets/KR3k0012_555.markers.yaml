  - {type: variant, offset: 798, length: 0, content: '', SBCK: 須載以輴車覆以麄布爲使人勿惡也崔鴻三十國春秋夏録曰赫連昌發二百里内民二萬五千人鑿嘉平陵七千人繕清廟於契呉􅀄昌父勃北遊契呉昇髙而歎曰美哉斯阜臨廣澤而帶清流吾行地多矣未有􅀂斯之美昌以勃平昔之意也故立廟焉葬勃曰於城西十五里起行宫摸冩統萬宫殿飾以金銀珠璣葬訖楚之殺駿馬數千疋唐書曰貞觀十年葬文德皇后於昭陵因山爲墳不封不樹太宗懲秦漢巳來厚葬以致發掘因序平生之志刻於石以誡將來又曰髙宗以頻年飢儉召雍州長史李義琛謂曰庶人之徒啇賈􅄂􅀋竟爲厚葬違越禮度雍州列郡之首四方取則卿爲嚴禁勿復使然也又曰􅀄玄宗因拜橋陵至金粟山覩㟵巒有龍盤鳯翥之􅀔謂左右曰吾千秋後宜葬此地羣臣乃追先旨築陵此山曰泰陵又曰􅂫頲葬上遊咸宜宮將出獵聞頲䘮出愴然曰􅂫頲今日葬吾寧忍娯遊遂還宫又曰􅀄涇原節度使劉昌之領涇州也平涼盟㑹所亡殁將士骸骨在焉乃令聚而坎瘞之因感夢於昌有媿謝之意遂以聞由是下詔深自剋責仍遣秘書少􅁥孔述睿及中官以御厨饌物及内造衣服數百襲令劉昌収其骸骨以歸大將三十人將士一百人皆具棺櫕歛以衣服葬於淺水原置二塜其大將曰旌義塜將士曰懷忠􅃁詔翰林學士撰二􅃁誌文及􅀕文其曰劉昌盛陳兵於葬所具牢饌祖祭之禮昌及大將皆素服臨之焚其屍及􅁓錢千幅又立三堠題以􅃁名表於道傍師人觀之莫不感泣穆天子傳曰甲辰天子南葬盛􅁎於樂池之南即玄池也天子乃命盛􅁎之䘮視皇后之葬法河濟之間共事供給葬事七萃之事抗即車舉棺以就車御日月之旗七星之文今旒上􅀞日月及北斗星周禮日月爲當旗亦通名也鼓鍾以葬山海經曰秋山帝堯葬于陽今堯􅃁在濟隂陽城縣也帝嚳葬于隂爰有熊文虎雕虎文王皆葬其所文王墓今在畢也案帝王􅃁墓有定處而山海經徃徃偏見之者盖以爲聖人在於其位仁化廣及恩沾鳥獸至於殂亡四海若䘮考妣無思不哀故絶域殊􅀋之聞天子崩各自立廟􅀕起土爲冡也又曰務隅之山帝顓頊葬于陽􅃁在頓丘城門外廣陽里中也九殯葬于隂婦嬪又曰赤水之東蒼梧之野舜與叔均之所葬也叔均啇均墓今在九疑山中也其中有九疑山舜所葬在長沙零陵界中九疑山九谿其山皆相似又曰邢天與帝爭神帝斷其首葬之常羊山及乃以乳爲目以臍爲口玄中記又載晏子曰景公成路寢之基逢於何遭晏子再拜前日於何之母死兆在路寢之臺牖下願請合骨晏子入白公公作色曰自古及今子亦甞聞請葬人主之宫者乎對曰古之人君不奪生人之居不殘死人之墓故未嘗聞請葬人主之宫也嬰聞之生者不安命之曰畜憂死者不葬命之曰畜哀畜憂者怨畜哀者危君不如許之公曰諾逢於何遂葬路寢之䑓牖下墨子曰古者聖人制爲葬埋之法曰棺三寸足以朽體衣衾二領足以覆惡者昔堯北教八狄道死卬卬之山衣衾二領滿坎無封巳葬牛馬乗之舜西教犬戎道死南紀之市旣葬而市人乗之禹東教於越葬於㑹稽之山桐棺三寸皆下不及泉上無通臰三王者豈財}
