  - {type: variant, offset: 3295, length: 2, content: 䟽停, WYG: 又曰何武葬北邙薄龍陂去王嘉塜東北一里許又曰楊貴字王孫京兆人也生時厚自奉養死卒祼葬終南山下}
  - {type: variant, offset: 3295, length: 2, content: 䟽停, krp: 又曰何武葬北邙薄龍阪王嘉冡東北一里許又曰楊貴字王孫京兆人也生時厚自奉養死卒祼葬終南山下}
  - {type: variant, offset: 3298, length: 4, content: 移葬詔從, WYG: 孫掘土鑿石深七尺而反奢又曰安定嵩真𤣥莬曹元禮並明算術皆成帝時人真常以算自剋其壽七十三真曰綏和元年正月二十五日晡時死矣書其壁以誌}
  - {type: page-break, offset: 3298, content: '', id: KR3k0012_WYG_555-11b, image: WYG0898/WYG0898-0149d.png}
  - {type: variant, offset: 3298, length: 4, content: 移葬詔從, krp: 孫掘土鑿石深七尺而反奢又曰安定嵩真玄莬曹元禮並明筭術皆成帝時人眞常以筭自克其壽七十三眞曰綏和元年正月二十五日晡時死矣書其壁以誌}
