  - {type: variant, offset: 806, length: 4, content: 宜復見如, SBCK: 備耶何以加此弟子曰吾恐烏䳒之食夫子也莊子曰在上爲烏䳒食在下爲螻蟻食奪彼與此何偏耶又曰莊子送葬過惠子之墓顧謂從者曰郢人}
