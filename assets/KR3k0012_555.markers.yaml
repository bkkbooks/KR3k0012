  - {type: variant, offset: 3162, length: 0, content: '', krp: 王徽少好學弟僧謙亦有才譽爲太子舎人遇疾徽躬自處療而僧謙服藥失度遂卒徽深自咎恨發病不復自療哀痛僧謙不能巳以書告靈僧謙卒後四旬而徽終遺令薄葬不設轜旐鼓挽之屬施五尺床爲靈二宿便毀又曰范泰卒𥘉議贈開府殷景仁曰泰素望不重不可擬議台司竟不果及葬王弘撫棺哭曰君生平重殷鐵今以此爲報沈約宋書曰呉逵呉興烏程人經荒饉繼以疾病父母兄弟嫂及郡羣從小功之親男女死者十三人唯逵夫妻獲全家徒四壁立冬無𬒳袴晝則傭賃夜則伐木燒塼妻亦同逵此誠朞年中}
