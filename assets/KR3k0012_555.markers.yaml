  - {type: variant, offset: 3287, length: 1, content: 官, WYG: 襄王母夏太后别葬杜東臨死時曰東望我子西望我夫後百年旁當有萬家邑及漢有天下宣帝果起陵邑焉西京雜記曰曹敞在吳章門下往往好斥人過以}
  - {type: variant, offset: 3287, length: 2, content: 官為, krp: 襄王母夏太后别葬杜東臨死時曰東望我子西望我夫後百年旁當有萬家邑及漢有天下宣帝果}
  - {type: variant, offset: 3289, length: 5, content: 起冢太尉侃, WYG: 輕薄世人皆以為然章後見殺全無有敢收葬者敞乃稱吳章弟子收葬其屍方知亮直者不見容於凡軰矣平陵人文生立碑於吳章墓側在龍首山南幕嶺}
  - {type: page-break, offset: 3289, content: '', id: KR3k0012_WYG_555-11a, image: WYG0898/WYG0898-0149c.png}
  - {type: variant, offset: 3290, length: 4, content: 冢太尉侃, krp: 陵邑焉西京雜記曰曹敞在呉章門下徃徃好斥人過以爲輕薄世人皆以爲然章後見殺全無有敢収葬者敞乃稱呉章弟子収葬其屍方知其亮直者不見容於凡軰矣平陵人文生爲碑於呉章墓側在龍首山南暮嶺}
