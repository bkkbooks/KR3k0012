  - {type: variant, offset: 2142, length: 0, content: '', SBCK: 應時設教見而施宜者也典略曰秦始皇十年華陽君卒與孝文王合葬壽陵襄王母夏太后别葬杜東臨死時曰東望我子西望我夫後百年旁當有萬家邑及漢有天下宣帝果起陵邑焉西京􅄂記曰曹敞在呉章門下徃徃好斥人過以爲輕薄世人皆以爲然章後見殺全無有敢収葬者敞乃􅁛呉章弟子収葬其屍方知其亮直者不見容於凡軰矣平陵人文生爲碑於呉章墓側在龍首山南暮嶺上又曰何武葬北邙薄龍阪王嘉􅃁東北一里許又曰楊貴字王孫京兆人也生時厚}
  - {type: page-break, offset: 2142, content: '', id: KR3k0012_SBCK_555-7a}
  - {type: variant, offset: 2143, length: 1, content: 容, SBCK: 奉養死卒祼葬終南山下其孫掘土鑿石深七尺而反奢又曰安定嵩真玄莬曹元禮並}
  - {type: variant, offset: 2145, length: 0, content: '', SBCK: 筭術皆成帝時人眞常以筭自克其壽七十三眞曰綏和元年正月二十五日晡時死矣書其壁以誌之至二十四日晡時死妻曰眞筭時見長下一筭欲以告之慮脫其旨故不告今校一日也又曰北芒青龍隴上􅀌檟之西四尺所鑿之七尺吾欲筭此地也眞死依言徃掘得古時空椁即以葬之又曰漢帝及諸侯王葬皆珠琥玉匣形如鎧甲連以金縷匣上皆鏤爲蛟龍鸞鳯􅀛麟之象時謂蛟龍玉匣又曰杜子夏葬長安北四里臨終作文曰魏郡杜鄴立身忠欵犬馬未陳奄先草木骨肉歸於􅁟塊氣則無所不知何必故丘然後即化封長安北郭此焉安息及死命刋石埋墓前陳留風俗傳曰小黄縣者宋地故陽武東黄郷也因黄水以名縣沛}
