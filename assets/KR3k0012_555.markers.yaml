  - {type: variant, offset: 1343, length: 503, content: 還之彥父不取又厚遺忳忳辭讓而去後漢書曰范式字巨卿與張元伯為友元伯窮疾篤同郡郅君章殷子微晨夜省疾視之元伯臨盡歎曰恨不見吾死友尋而卒式或夢見元伯玄冕垂纓復屣而呼曰巨卿吾以其日死當以爾時葬永歸黃泉子未我忘豈能相及式怳然覺寤悲歎泣下具告太守請往奔喪投其葬日馳往赴之式未及到而喪已發引既至壙將窆而柩不肯進其母撫之曰元伯豈有望耶遂停柩移時乃見有素車白馬號哭而來其母望之曰是必范巨卿也即至叩喪言曰行矣元伯死生路異永從此辭會葬者千人咸為揮涕式因執紼而引柩於是乃前式遂留止冢次為脩墳樹後漢書曰繆肜汝南召陵人也太守隴西梁湛召為決曹史安帝初湛病卒官肜送喪還隴西始葬會西羗反叛湛妻子悉避亂他郡肜獨留不去為起墳塚乃潛穿井傍以為窟室晝則隱竄夜則負土及賊平而墳已立其妻子意肜已死還見大驚關西咸稱傳之共給車馬衣資肜不受而歸後漢書曰張霸蜀郡成都人也為會稽太守後徵四遷為侍中卒年七十遺詔諸子曰昔延州使齊子死嬴博因坎路側遂以葬焉今蜀道阻遠不且歸塋可止此葬足藏齒髮而已務遵速朽副我本心人生一代但當畏敬於人若不善加己直為受之諸子承命葬於河南梁縣因遂家焉後漢書曰士孫瑞理王充等事曰興平二年秋朝廷以九月九日引見公卿近臣飲宴離席前說故司徒王允故司隸黃琬並, SBCK: ''}
