  - {type: variant, offset: 3162, length: 0, content: '', WYG: 王徽少好學弟僧謙亦有才譽為太子舍人遇疾徽躬自處療而僧謙服藥失度遂卒徽深自咎恨發病不復自療哀痛僧謙不能已以書告靈僧謙卒後四旬而徽終遺令薄葬不設轜旐鼓輓之屬施五尺牀為靈二宿便毁又曰范泰卒初議贈開府殷景仁曰泰素望不重不可擬議台司竟不果及葬王𢎞撫棺哭曰君生平重殷鐵今以為報沈約宋書曰吳逵吳興烏程人經荒饉繼以疾病父母兄弟嫂及羣從小功之親男女死者十三人唯逵夫婦獲全家徒四壁立冬無被袴晝則傭賃夜則伐木燒磚妻亦同逵此誠期年中}
