  - {type: variant, offset: 800, length: 1, content: 為, SBCK: 爲葬埋之法也孟子曰滕文公卒葬有日矣天大雨雪甚至牛目羣臣請㢮期太子不許惠公諌曰昔王季葬滑山之尾欒水齧其墓見}
  - {type: variant, offset: 802, length: 3, content: 槨一藏, SBCK: 前和文王曰先君欲見羣臣百姓矣乃出爲張三日而後葬令太子亦曰先王以留而撫社稷故使雪㢮其期更爲日此文王之義也太子曰善莊子曰莊子將死弟子欲厚葬之莊子曰吾以天地爲棺椁日月爲連璧星辰爲珠璣萬物爲齊送吾葬具}
