  - {type: variant, offset: 3251, length: 12, content: 中興名臣莫與為此也晉中興, WYG: 葬禮依太宰文簡公褚彦回故事齊}
  - {type: variant, offset: 3251, length: 0, content: '', krp: 皆具棺櫕歛以衣服葬於淺水原置二塜其大將曰旌義塜將士曰懷忠冡詔翰林學士撰二冡誌文及祭文其曰劉昌盛陳兵於葬所具牢饌祖祭之禮昌及大將皆素服臨之焚其屍及𥿄錢千幅又立三堠題以冡名表於道傍師人觀之莫不感泣穆天子傳曰甲辰天子南葬盛姬於樂池之南即玄池也天子乃命盛姬之䘮視皇后之葬法河濟之間共事供給葬事七萃之事抗即車舉棺以就車御日月之旗七星之文今旒上畫日月及北斗星周禮日月爲當旗亦通名也鼓鍾以葬山海經曰秋山帝堯葬于陽今堯冡在濟隂陽城縣也帝嚳葬于隂爰有熊文虎雕虎文王皆葬其所文王墓今在畢也案帝王冡墓有定處而山海經徃徃偏見之者盖以爲聖人在於其位仁化廣及恩沾鳥獸至於殂亡四海若䘮考妣無思不哀故絶域殊類之聞天子崩各自立廟祭起土爲冡也又曰務隅之山帝顓頊葬于陽冡在頓丘城門外廣陽里}
  - {type: variant, offset: 3252, length: 2, content: 興名, krp: 也九殯葬于隂婦嬪又曰赤水之東蒼梧之野舜與叔均之所葬也叔均啇均墓今在九疑山中也其中有九疑山舜所葬在長沙零陵界中九疑山九谿其山皆相似又曰邢天與帝爭神帝斷其首葬之常羊山及乃以乳爲目以臍爲口玄中記又載晏子曰景公成路寢之基逢於何遭晏子再拜前日於何之母死兆在路寢之臺牖下願請合骨晏子入白公公作色曰自古及今子亦甞聞請葬人主之宫者乎對曰古之人君不奪生人之居不殘死人之墓故未嘗聞請葬人主之宫也嬰聞之生者不安命之曰畜憂死者不葬命之曰畜哀畜憂者怨畜哀者危君不如許之公曰諾逢於何遂葬路寢之䑓牖下墨子曰古者聖人制爲葬埋之法曰棺三寸足以朽體衣衾二領足以覆惡者昔堯北教八狄道死卬卬之山衣衾二領滿坎無封巳葬牛馬乗之舜西教犬戎道死南紀之市旣葬而市人乗之禹東教於越葬於㑹稽之山桐棺三寸皆下不及泉上無通臰三王者豈財用不足哉以爲葬埋之法也孟子曰滕文公卒葬有日矣天大雨雪甚至牛目羣}
