  - {type: variant, offset: 2310, length: 475, content: 妻上曰舒當左右朝政不宜遠還鄉里舒素清貧不營財產頓舉眾喪必無以自供其賜葬地一頃錢伍拾萬王隱晉書曰皇甫謐篤終論曰氣絕之後便時服幅巾以遽蒢褁尸覆卷三重麻繩約二頭置屍靈床上擇不毛之地穿坑十尺長一丈二尺廣六尺坈訖去床下屍平生之物皆無自隨唯齎孝經一卷示不忘孝道王隱晉書曰杜頒薨遺令曰吾往為公使過密縣邢山之上有塚問耕者云是鄭大夫祭仲或子產之冢也遂師從者登而觀焉其造冢居山之嶺四望周達連山體南北之正而耶東北向新鄭城意不忘本也藏無珍寶不取於重深居子尚其儉小人無利可動歷千載無毀儉之致也吾去春入朝因自營洛陽城東首陽之南為將來兆域而所得地中有小山上無舊塚其高顯雖未足比邢山然東奉二陵西瞻宮闕南觀伊洛北望夷叔曠然遠覽情之所安也故遂表樹開道為一定之制取法鄭大夫欲以儉自完耳棺器小歛之事皆當稱比王隱晉書曰馬隆字孝興東平人也少有智勇門寒無仕路兗州剌史令狐愚坐事死舉州無敢送喪者唯隆以武吏託稱家客殯送喪葬種柏三年禮畢乃還舉州皆慚王隱晉書曰徐苗以永寧三年春亡遺令濯巾澣衣榆棺雜塼露車載柩葦席瓦器而葬矣晉陽秋曰荀粲亡時年二十九性簡實不能與常人交接所交者一時俊傑至葬夕赴者裁十餘人皆同時知, SBCK: 此君風流}
