  - {type: variant, offset: 3336, length: 3, content: 印綬云, WYG: 盧植别傳曰植初平三年卒臨困勅其子儉葬於山足不用棺附體單帛而已鄭𤣥别傳曰𤣥卒遺令薄葬自郡守以下嘗受業者衰絰赴者千餘郭翻别傳曰翻字道翔武昌人遺令儉葬唯以兩卷老子示存道德杜祭酒别傳曰君年五十二當其終亡安厝先塋帛布轜車䘮儀儉約執引者皆三吳令望及北人賢流虞氏家記曰潭母太夫人薨宜都府君即世五十九載改殯脩構窀穸靈柩住而莫前羣從咸以䘮事有往無反不應遷移潭以昔文王之葬王季既定而洪水出截塜棺椁文王乃設張屋出柩三日羣臣臨之然後葬此則上聖之遺令載在篇籍遂奉遷神柩權停幕屋使子孫展哀晨夕宗族相臨允合張屋之儀也天子給太夫人徘徊車謁者送䘮禮儀光備合葬於舊壙衞玠别傳曰君卒丞相王公教曰衞洗馬明當改葬此君風流名士海内民望可脩三牲之祭以敦舊好太平御覽卷五百五十五}
