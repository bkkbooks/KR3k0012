  - {type: variant, offset: 811, length: 2, content: 腐敗, SBCK: 漫以堊汚其鼻端􅀂蠅翼使匠石斵之運斤成風堊盡而鼻不}
  - {type: punctuation, offset: 813, content: ，, id: KR3k0012_CHANT_555-bkkpn208}
