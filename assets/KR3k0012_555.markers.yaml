  - {type: variant, offset: 3281, length: 0, content: '', WYG: 之間共事共給葬事七萃之士抗即車舉棺以就車御日月之旗七星之文今旒上畫日月及北斗星周禮日月為常旗亦通名也鼓鐘以葬山海經曰秋山帝堯葬于陽今堯塜在濟隂陽城縣也帝嚳葬于隂爰有熊文虎雕虎文王皆葬其所文王墓今在畢也案帝王塜墓有定處而山海經往往偏見之者葢以為聖人在於其位仁化廣及恩洽鳥獸至於殂亡四海若䘮考妣无思不哀故絶域殊類之人聞天子崩各自立廟祭起土為塜也又曰務隅之山帝顓頊葬于陽塜在頓丘城門外廣陽里中也九嬪葬于隂嬪婦又曰赤水之東蒼梧之野舜與叔均之所葬也叔均商均墓今在九疑山中也其中有九疑山舜所葬在長沙零陵界中九疑山九谿其山皆相似又曰形天與帝爭神帝斷其首葬之常羊山乃以乳為目以臍為口𤣥中記又載晏子曰景公成路寢之臺逢於何遭晏子再拜前曰於何之母死兆在路寢之臺牖下願請合骨晏子入白公公作色曰自古及今子亦嘗聞諸葬人主之宫者乎對曰古之人君不奪生人之居不殘死人之墓故未嘗聞請葬人主之宫也嬰聞之生者不安命之曰畜憂死者不葬命之曰畜哀畜憂者怨畜哀者危君不如許之公曰諾逢於何遂葬路寢之臺牖下墨子曰古者聖人之制為葬埋之法曰棺三寸足以朽體衣衾二領足以覆惡昔者堯北教八狄道死鞏山之隂衣衾二領滿坎無封已葬牛馬乗之舜西教犬戎道死南紀之市既葬而市人乗之禹東教於越葬於㑹稽之山桐棺三寸皆下不及泉上無通臰三王者豈財用不足哉以為葬埋之法也吕氏春秋曰滕文公卒葬有日矣天大雨雪甚至十日羣臣請弛期太子不許惠公諌曰昔王季葬滑山之尾欒水齧其墓見棺前和文王曰先君欲見羣臣百姓矣乃出張三日而後葬今太子亦曰先君以留而撫}
