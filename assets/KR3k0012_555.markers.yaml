  - {type: variant, offset: 3248, length: 1, content: 劍, krp: 劒爲六十人葬禮依太宰文簡公禇彦回故事齊書曰𥘉豫章王嶷葬金牛山文惠太子葬夾石竟陵王子良臨送望祖硎山悲感歎曰北瞻吾叔前望吾兄死而有知請葬兹地及薨葬焉又曰何點哀樂過人嘗行逢葬者歎曰此哭者之懷豈可思耶於是悲慟不能禁梁書曰到漑臨終託子孫薄葬之禮曰氣絶便歛歛以法服歛竟便葬不須擇日凶事心存約儉孫姪不得違言便屏冢人請僧讀經噆唄及卒顔色如恒手屈二指即佛道所云得果也又曰顧憲之臨終爲制勑其子曰夫出生入死理兼晝夜生即不知所從死亦安識所徃延陵云精氣上歸于天骨肉下歸于地魂氣則無不知良有以也雖復茫昧難徴要若非妄百年之期迅若馳隙吾今預焉終制瞑目之後念並遵行勿違吾志也莊周澹臺逹生者也王孫士安矯俗者也吾進不及逹退無所矯常謂中都之制允理愜情衣周於身示不違禮棺周於衣足以蔽臭入棺之物一無所須載以輴車覆以麄布爲使人勿惡也崔鴻三十國春秋夏録曰赫連昌發二百里内民二萬五千人鑿嘉平陵七千人繕清廟於契呉𥘉昌父勃北遊契呉昇髙而歎曰美哉斯阜臨廣澤而帶清流吾行地多矣未有若斯之美昌以勃平昔之意也故立廟焉葬勃曰於城西十五里起行宫摸冩統萬宫殿飾以金銀珠璣葬訖楚之殺駿馬數千疋唐書曰貞觀十年葬文德皇后於昭陵因山爲墳不封不樹太宗懲秦漢巳來厚葬以致發掘因序平生之志刻於石以誡將來又曰髙宗以頻年飢儉召雍州長史李義琛謂曰庶人之徒啇賈雜類竟爲厚葬違越禮度雍州列郡之首四方取則卿爲嚴禁勿復使然也又曰𥘉玄宗因拜橋陵至金粟山覩㟵巒有龍盤鳯翥之勢謂左右曰吾千秋後宜葬此地羣臣乃追先旨築陵此山曰泰陵又曰蘇頲葬上遊咸宜宮將出獵聞頲䘮出愴然曰蘇頲今日葬吾寧忍娯遊遂還宫又曰𥘉涇原節度使劉昌之領涇州也平涼盟㑹所亡殁將士骸骨在焉乃令聚而坎瘞之因感夢於昌有媿謝之意遂以聞由是下詔深自剋責仍遣秘書少監孔述睿及中官以御厨饌物及内造衣服數百襲令劉昌収其骸骨以歸大將三十人將士一}
  - {type: variant, offset: 3249, length: 1, content: 百, WYG: 為六十}
