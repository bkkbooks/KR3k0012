  - {type: variant, offset: 3304, length: 1, content: 嶠, WYG: 二十四日晡時死妻曰真算時見長下一算欲以告之慮脱其㫖故不告今校下一日也又曰北芒青龍隴上孤檟之西四尺所鑿之七尺吾欲葬此地也真死依言往掘得古時空椁即以葬之又曰漢帝及諸侯王葬皆珠襦玉匣形如鎧甲連以金縷匣上皆縷為蛟龍鸞鳳龜麟之象時謂蛟龍玉匣又曰杜子夏葬長安北四里臨終作文曰魏郡杜鄴立身忠義犬馬未陳奄先草木骨肉歸於土魂氣則无所不之何必故丘然}
  - {type: page-break, offset: 3304, content: '', id: KR3k0012_WYG_555-12a, image: WYG0898/WYG0898-0150a.png}
  - {type: variant, offset: 3304, length: 1, content: 嶠, krp: 二十四日晡時死妻曰眞筭時見長下一筭欲以告之慮脫其旨故不告今校一日也又曰北芒青龍隴上孤檟之西四尺所鑿之七尺吾欲筭此地也眞死依言徃掘得古時空椁即以葬之又曰漢帝及諸侯王葬皆珠琥玉匣形如鎧甲連以金縷匣上皆鏤爲蛟龍鸞鳯龜麟之象時謂蛟龍玉匣又曰杜子夏葬長安北四里臨終作文曰魏郡杜鄴立身忠欵犬馬未陳奄先草木骨肉歸於土塊氣則無所不知何必故丘然}
  - {type: variant, offset: 3306, length: 14, content: 妻何氏卒便載嶠喪還都詔令葬建, WYG: 即化封長安北郭此焉安息及死命刋石埋墓前陳留風俗傳曰小黄縣者宋地故陽武東黄鄉也因黄水以名縣沛公起兵野戰䘮皇妣於黄鄉天下}
