  - {type: variant, offset: 1295, length: 0, content: '', SBCK: 羊茂字季實爲東郡守夏處單板榻又曰宋均爲九江太守五日一視事夏以平旦晉書日魏末有孫登字公和汲郡人無家屬時人於汲縣北山上土窟中得之夏則編草爲裳又日肅愼國一名抱樓夏則巢居晉書曰山濤將去選官舉嵇康自代康與濤書告絕且曰性巧而好鍛宅中有一柳樹甚茂乃激水圜之夏月居其下以鍛東平吕安服康髙致毎一相思千里命駕毎鍛而向秀爲佐又五行志云晉義熙時􅁊玄旣􅆲位謡曰草生及馬腹鳥啄􅁊玄目及玄敗走至江陵時當五月中被誅晉陽秋曰車胤字武子家貧讀書不常得油夏月則練囊盛數十螢以夜繼日沉約宋書云羊欣字敬}
  - {type: page-break, offset: 1295, content: '', id: KR3k0012_SBCK_021-7a}
  - {type: variant, offset: 1295, length: 0, content: '', WYG: 羊茂字季實為東郡守夏處單板榻晉書曰魏末有孫登字公和汲郡人無家屬時人於汲縣北山上土窟中得之夏則編草為裳又肅慎國一名抱樓夏則巢居晉書曰山濤將去選官舉嵇康自代康與濤書吿絶且曰性巧而好鍜宅中有一柳樹甚茂乃激水圜之夏月居其下以鍜東平吕安服康髙致每一相思千里命駕每鍜向秀為佐又五行志云晉義熙時桓𤣥既簒位謡曰草生及馬腹鳥啄桓𤣥目及𤣥敗走至江陵時當五月被誅晉陽秋曰車允字武子家貧讀書常不得油夏月則練囊盛數十螢以夜繼日沈約宋書云羊欣字敬}
