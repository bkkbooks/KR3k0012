  - {type: variant, offset: 104, length: 0, content: '', WYG: 鬰及薁鬰棣屬薁蘡薁也又六月莎雞振羽又四月維夏六月徂暑又冬之夜夏之日傳曰龍見而雩禮曰四月之節日在昴昏翼中曉牽牛中斗建巳位之初其日丙丁其帝炎帝其神祝融其蟲羽其音徴律中仲吕立夏之日螻蟈鳴後五日蚯蚓出後五日王瓜生盛德在火迎夏于南郊命樂正習盛樂中氣日在畢昏軫中曉須女中斗建巳位之中小滿之日苦菜秀後五日靡草死後五日小暑至挺重囚出輕繫無起土功無發大衆無伐大樹天子初衣暑服無大田獵以含桃先薦寢廟蠶事既登后妃獻繭天子飲酎用禮樂又五月之節日在參昏角中曉危中斗建午位之初律中蕤賓芒種之日螳蜋生後五日鵙始鳴後五日反舌無聲縶騰駒}
