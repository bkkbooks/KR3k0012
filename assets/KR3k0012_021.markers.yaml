  - {type: variant, offset: 570, length: 309, content: 施惠養百姓兮又曰王孫遊兮不歸春草生兮萋萋又曰青春受謝謝去也白日昭昭者明也崔駰臨洛觀春賦曰迎夏之首桃之夭夭楊柳依依張衡歸田賦曰仲春令月時和氣清原隰鬱茂百草滋榮王睢鼓翼鶬鶊哀鳴交頸頡頏關關嚶嚶於焉逍遙聊以娛情湛方生惜春賦曰夫榮凋之感人由色象之在鏡事隨化而遷廻心無主而虛映眄秋林而情悲遊春澤而心令孰云知其所以乘天感而叩性古樂府詩曰青青園中葵朝露待日晞陽春布德澤萬物生光暉張衡歌曰浩浩陽春發楊柳何依依百鳥自南歸翱翔萃我枝李充春遊賦曰蓋適性莫暢乎遊而時和莫踰乎春陸機樂府詩曰遊容芳春林春芳傷客心和風飛清響鮮雲垂薄陰蕙草饒淑氣時鳥多好音翩翩鳴鳩羽喈喈鶬鶊吟王廙春可樂曰春可樂兮樂孟月之初陽野暉赫以揮綠山翠蒨以發蒼立春禮記月令曰孟春, WYG: 純乾}
