  - {type: variant, offset: 1317, length: 8, content: 于東郊祭東帝勾芒, SBCK: 居葛籠夏居密陽秋不風冬不煬飲食不饋飲酒不勤醫日是良藥也太玄經曰蒙南方也夏也物之脩長也皆可得而載也謂長出向上也括地圖曰天毒國最暑􅀬夏草木皆乾白虎通曰六月謂之林鍾林者衆也萬物成熟􅀋衆多也蔡邕}
