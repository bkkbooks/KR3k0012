  - {type: variant, offset: 2140, length: 557, content: 枝荊楚歲時記曰立春日悉剪綵為鷰以戴之帖宜春之字傳咸鷰賦有其言矣傅咸鷰賦云四氣代王敬逆其始彼應運而方臻乃設鷰以迎止翬輕翼之岐若將飛而未起何夫人之功巧式儀形之有似衘青書以贊時著亙春之嘉祉周書時訓曰立春之日東風不解凍號令不行蟄蟲不震陰氣奸陽魚不上冰甲冑私藏雨水之日獺不祭魚國多盜賊鴻鴈不來遠人不服草木不萌動果瓜不熟國語曰農祥晨正唐固注曰農祥房星也晨正謂晨見南方謂立春之日齊人月令曰凡立春日食生菜不可過多取迎新之意而已及進漿粥以導和氣四時纂要曰立春貯水謂之水神釀酒不壞修真入道秘言曰以立春日清朝北望有紫緣白雲者為三元君三素飛雲也乘八輿之輪上詣天帝是太素三元君女真也天帝是天帝玉清君天子候見再拜自陳某乙乞得侍給輪轂以意云云若雖不見與服之形亦宜拜乞之他放此三過見元君之輦者白日昇天按舉場常試立春日望三素雲詩取此事真誥曰立春日勿行威刑八節同此論衡曰立春為土象人男女各二秉耒鉏與鋤同或立土牛象人土牛未必耕也順氣應時示率下也春分禮曰春分之日玄鳥至後五日雷乃發聲後五日始電傳曰玄鳥氏司分者也春分來秋分去易通卦驗曰震東方也主春春分日青氣出直震此正氣也氣出右物半死氣出左蛟龍出震氣不出則歲中少雷萬物不實人民疾熱孝經說曰春分之日日在中衡又曰斗指卯為春分齊人月令曰春分不殺生不吊疾君子齊戒衣夾衣導引不食生冷白虎通曰明庶風春分至王者修封疆理田疇, SBCK: ''}
