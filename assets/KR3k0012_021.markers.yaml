  - {type: variant, offset: 345, length: 0, content: '', WYG: 者何也任方也任方者物之方任何以謂之夏夏者假也吁荼萬物而養之外也故曰南方夏又主夏者大火大火昏中可以種黍菽上吿乎天子而下賦之民三禮義宗曰夏大也謂萬物長大也夏謂南者南任也又火正曰祝融者祝甚也融明也言夏時物氣甚明也又南岳謂之霍霍者護也言陽氣用事盛夏之日護養萬物故以為稱又六月小暑為節者此以相形為名形大暑故謂之小暑六月之初暑氣熱未極故以小為名大暑為中者自十一月一陽爻上從地而出至此之時方始上徹陽氣併出以上大暑既極故暑為中大戴禮曰夏以教士車甲士執伎論力修四衛强股肱質射御才武聰慧始衆長入可以為儀綴於國出可以為卒誘於軍旅四方諸侯之㳺士國中賢者充焉方夏三月養長莠蕃庻物於時有事享於皇考爵士之有慶者七人以成夏事易通統圖曰夏月日行東南赤道曰南陸尚書考靈曜曰火星為夏期專陽相同精感符詩含神霧曰曹地處季夏之位土地勁急音中徴其聲清以急}
