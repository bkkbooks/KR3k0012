  - {type: variant, offset: 1332, length: 572, content: 去邑八里木數也車旗服飾皆青歌青陽八佾舞雲翹之舞返因賜文官太愽司徒以下縑各有差漢官名秋曰賜司徒司空帛三十匹九卿十五匹古今注曰建武八年立春賜公十匹卿七匹也又曰立春之日皆青幡幘迎春于東郭外令一童男冐青衣先在東郭外野中迎春至自野中則迎者拜之而還弗祭三時不迎又郎顗上䟽曰今立春之後火卦用事當溫而寒違反時節由功賞不至而刑罰必加也宜須立秋順氣行罰臣伏案飛候參察眾政京房作易飛候以為立夏之後當有震裂涌水之害又曰自司徒居位陰陽多謬時劉嶠為司徒至陽嘉二年榮免久無虛己進賢之策天下興議異人同咨咨嗟歎也且立春已來金氣再見謂元年十二月己丑夜白氣入玉井二年正月己丑白虹貫日此金氣再見也金能勝木必有兵氣宜黜司徒以應天意又郎顗對問曰方春東作報德之始元氣開發養導萬物王者因天視聽奉順時氣務崇溫柔遵行月令禮祀月令孟春天子命相布德和令行慶施惠下及兆人仲春安萌芽養幼少存諸孤省囹圄去桎梏止獄訟而今立春之後考事不息秋冬之政行乎春故虹春見掩蔽日曜凡邪氣乘陽則虹蜺在日斯皆執事刻急所致殆非朝廷優寬之本此其變常之咎也又曰孔子作春秋書正月者敬歲之始也公羊傳曰元年春王正月元年者何君之始年也正月者何歲之始王者則天之象因時之序宜開發德號爵賢命士流寬大之澤垂仁厚之德禮祀迎春於東郊還乃賞公卿諸侯大夫於朝命相布和令行慶施惠下及兆人慶賞遂行無有不當順助元氣含養庶類如此則天文昭爛星辰顯列五緯循軌四時和睦五, SBCK: ''}
