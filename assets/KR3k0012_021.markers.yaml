  - {type: variant, offset: 1314, length: 2, content: 等立, SBCK: 坐處丞相王導曰胡威之淸何以過此又日劉眞長始見王丞相時盛暑之月丞相以腹熨彈棊局曰何如乃渹吳人以冷爲渹也音楚敬反劉旣出人問見王公如何劉曰未見他異唯作吳語耳又曰胡廣本姓黃五月生父母惡之乃置之甕投於江胡翁見甕流下聞有小兒啼聲往取因長養之以爲子遂七登三司流中庸之號廣後不治其本親服云我本親以己爲死人也世以爲深譏焉又曰謝遏按謝㓪小名遏夏月常仰卧謝公淸晨卒來未暇著衣跣出屋外方躡履問訊公曰汝可謂前踞後恭語林曰何平叔美姿儀而絕白魏文帝疑傅以粉夏月與􅀬湯餅旣啖大汗出隨以朱衣自拭色轉皎然又曰陸機夏在洛忽思東頭竹篠飲語劉寶曰吾思鄕轉深矣公孫尼子曰孔子有病哀公使醫視之醫曰子居處飲食何如孔子曰}
  - {type: page-break, offset: 1314, content: '', id: KR3k0012_SBCK_021-9a}
  - {type: variant, offset: 1314, length: 2, content: 等立, WYG: 坐處丞相王導曰胡威之清何以過此又劉真長始見王丞相時盛暑之月丞相以腹熨彈棊局曰何如乃渹吳人以冷為渹也音楚敬反劉既出人問見王公如何劉曰未見他異唯作吳語耳又胡廣本姓黄五月生父母惡之乃置之甕投於江胡翁見甕流下聞有小兒啼聲往取因長養之以為子遂七登三司流譽當世廣後不治其本親服云我本親已以為死人也世以為深譏焉又謝遏按謝朗小名遏夏月常仰卧謝公清晨卒來未暇著衣跣出屋外方躡履問訊公曰汝可謂前踞後恭語評曰何平叔美姿儀面絶白魏文帝疑傅以粉夏月與熱湯餅既啖大汗出隨以朱衣自拭色轉皎然又陸機夏在洛忽思齋東頭竹篠中飲語劉寶曰吾思鄉轉切矣公孫尼子曰孔子有病哀公使醫視之醫曰子居處飲食如何孔子曰}
