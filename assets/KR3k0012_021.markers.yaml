  - {type: variant, offset: 1296, length: 1, content: 始, SBCK: 父不疑爲烏程縣令欣時年十二王獻之爲吳興守甚知愛之嘗夏月入縣欣着新練裠晝寢獻之書數幅而去欣本工書因此彌善又曰劉敬宣八歲喪母四月八日入寺及下頭上金鏡爲母灌佛因泣下悲不自勝北齊書日僕射魏收字伯起初習武不成改節讀書夏月坐板床隨逐樹陰諷讀累年牀爲之銳遂工辭令也南史曰梁何逺爲武昌太守武昌俗皆汲江水盛夏逺患水溫每以錢買人井寒水不受錢者則以水還之其他事率多此類陸翽鄴}
