  - {type: variant, offset: 437, length: 132, content: 月午天地凶門日不可建造穿鑿又曰正月亥地破日不可開山動土虞世南史略曰北齊盧士深妻崔林義之女有才學春日以桃花靧兒面靧荒內切洗面也呪曰取紅花取白雪與兒洗面作光悅取白雪取紅花與兒洗面作光澤取雪白取花紅與兒洗面作華容楚辭曰獻歲發春兮洎吾南征又曰目極千里兮傷春又曰開春發歲兮承, WYG: ''}
