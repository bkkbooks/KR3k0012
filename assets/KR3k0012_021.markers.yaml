  - {type: variant, offset: 1298, length: 0, content: '', SBCK: 記石季龍於冰井臺藏冰三伏之月以冰賜大臣趙書日汲桑六月盛暑而垂重裘累茵使十餘人扇之患不得淸涼斬扇者軍中爲之謡曰奴爲將軍何可羞六月重茵被狐裘不識寒暑斷人頭三十國春秋燕王暮容熙后符氏嘗季夏思凍魚膾仲冬須生地黄皆下有司切責之不得加之以辟焉隋書曰煬帝大業十二年五月上幸玉華宮徵求螢火得數斛夜出遊於山而放之光遍巖谷續㑹要曰貞元六年五月朔御紫宸殿受朝先是上以五月一陰生臣子道長君父道衰非善月也因創是月朝見之儀也國語曰魯宣公夏濫於泗淵潰罟於泗水之泉以取魚里革斷其罟而棄之曰古者大寒降土蟄發寒氣下謂季冬建丑之月土蟄發謂孟春建寅之月水虞於是乎講罛罶取名魚登川禽而嘗之寢廟行諸國人助宣氣也水虞漁師也罟魚網罶笱也言陽氣起魚􅀒氷}
  - {type: page-break, offset: 1298, content: '', id: KR3k0012_SBCK_021-7b}
  - {type: variant, offset: 1298, length: 0, content: '', WYG: 記石季龍於井氷臺藏氷三伏之月以氷賜大臣趙書曰汲桑六月盛暑而重裘累茵使十餘人扇之患不得清涼斬扇者軍中為之謡曰奴為將軍何可羞六月重茵被狐裘不識寒暑斷人頭三十國春秋曰燕王慕容熙后符氏嘗季夏思凍魚膾仲冬須生地黄皆下有司切責之不得加之以遣斥焉隋書曰煬帝大業十二年五月上幸玉華宫徵求螢火得數斛夜出逰於山西放之光徧巖谷續㑹要曰貞元六年五月朔御紫宸殿受朝先是上以五月一隂生臣子道長君父道衰非善月也因創是月朝見之儀國語曰魯宣公夏濫于泗淵漬罟於泗水之淵以取魚里革斷其罟而棄之曰古者大寒降土蟄發寒氣下謂季冬建丑之月土蟄𤼵謂孟春建寅之月水虞於是乎講罛罶取名魚登川禽而嘗之寢廟行諸國人助宣氣也水虞漁師也罛魚網罶笱也言陽氣起魚負氷}
  - {type: page-break, offset: 1298, content: '', id: KR3k0012_WYG_021-11a, image: WYG0893/WYG0893-0197c.png}
  - {type: variant, offset: 1298, length: 0, content: '', krp: 記石季龍於冰井臺藏冰三伏之月以冰賜大臣趙書日汲桑六月盛暑而垂重裘累茵使十餘人扇之患不得淸涼斬扇者軍中爲之謡曰奴爲將軍何可羞六月重茵被狐裘不識寒暑斷人頭三十國春秋燕王暮容熙后符氏嘗季夏思凍魚膾仲冬須生地黄皆下有司切責之不得加之以辟焉隋書曰煬帝大業十二年五月上幸玉華宮徵求螢火得數斛夜出遊於山而放之光遍巖谷續㑹要曰貞元六年五月朔御紫宸殿受朝先是上以五月一陰生臣子道長君父道衰非善月也因創是月朝見之儀也國語曰魯宣公夏濫於泗淵潰罟於泗水之泉以取魚里革斷其罟而棄之曰古者大寒降土蟄發寒氣下謂季冬建丑之月土蟄發謂孟春建寅之月水虞於是乎講罛罶取名魚登川禽而嘗之寢廟行諸國人助宣氣也水虞漁師也罟魚網罶笱也言陽氣起魚負氷}
  - {type: variant, offset: 1299, length: 0, content: '', SBCK: 令國人取之今魚方别孕不教魚長又行網罟貪無蓺也公曰吾過矣蓻猶極也吳越春秋日越王念吳之復夏則握火說苑日趙􅂤于謂陽虎日樹李春夏得休息秋得食樹蒺藜者夏不得息秋得刺今子種樹蒺蔾耳太公金匱曰紂常以六月獵於西土發民逐禽民諌曰今六月天務覆施地務長養今盛夏發民逐禽而元元懸於野君殘一日之苗而民百日不食天子失道後必無福紂以爲妖言而誅之後數月天暴風雨發屋折木六韜日武王伐殷得二大夫而問之曰殷國常雨血雨􅁅雨石小者如雞子大者如箕常六月雨雪深丈餘武王曰大哉妖也其一人日是非大妖也殷國大妖三十七章雨血雨􅁅雨石盛夏雨雪臣不爲妖災武王踧然而問三十七章之妖對曰殷君好射人以餧虎喜割人心喜殺孕婦喜煞人父􅀌人之子上數}
  - {type: page-break, offset: 1299, content: '', id: KR3k0012_SBCK_021-8a}
  - {type: page-break, offset: 1299, content: '', id: KR3k0012_SBCK_021-8b}
  - {type: variant, offset: 1299, length: 0, content: '', WYG: 令國人取之今魚方別孕不教魚長又行罟網貪無蓺也公曰吾過而里革匡我不亦善乎吳越春秋曰越王念吳之復夏則握火說苑曰趙簡子謂陽虎曰春樹桃李夏得休息秋得其食樹蒺藜者夏不得息秋得其刺今子樹蒺藜耳太公金匱曰紂常以六月獵於西土發民逐禽民諫曰盛夏之時地務長養今大霧覆施乃發民逐禽以懸元元於野君殘一日之苗而民百日不食天子失道後必無福紂以妖言而誅之後數月天暴風雨𤼵屋折木六韜曰武王伐殷行遇二大夫而問之曰殷國常雨血雨灰雨石小者如雞子大者如箕常六月雨雪深丈餘武王曰大哉妖也其一人曰是非大妖也殷國大妖三十七章雨血雨灰雨石盛夏雨雪臣不謂妖災武王踧然而問三十七章之妖對曰殷君好射人以餧虎喜割人心喜殺孕婦喜寡人之婦孤人之子上數}
