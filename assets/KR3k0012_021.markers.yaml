  - {type: variant, offset: 454, length: 1, content: 亥, SBCK: 繁霜我心憂傷正月夏之四月建巳之月純陽用事面霜多急􅁪寒若之異傷害萬物故心爲之憂傷民之訛言亦孔之將又曰綢繆束楚三星在戸三星五月中直戸也箋云心星在戸謂五月之節六月之中今夕何夕見此粲者又曰維此六月旣成我服我服旣成于三十里又曰六月食鬱及薁鬱棣屬薁嬰薁也又曰六月莎雞振羽又曰四月維夏六月徂暑徂往也六月火星中暑盛而往矣箋云徂猶始也六月乃始盛暑與人爲惡亦有漸非一朝一夕又曰無冬無夏值其鷺羽又曰冬之夜夏之日百歲之後歸于其室傳曰龍見而雩龍角亢星也建巳月昏見東方禮日四月之節曰在昴立夏爲四月之節昏翼中曉牽午中斗建巳位之初其日丙丁丙丁屬人主夏故云其日丙丁其帝炎帝其神祝融昔炎帝神農氏以火德繼大而王故爲夏帝火正曰祝融爲火神任炎辛夏其蟲羽南方朱鳥羽蟲之長凡有羽之􅀋皆屬於火故曰其蟲羽其音徵三折宫去一以生徵徵數五十四屬火以其徵清事之象也夏氣和則徵聲調樂記曰徵亂則哀其事勤律中仲吕四月氣至則仲吕之律應仲吕者無射之所生三分益一管長六寸六分立夏之日螻蟈鳴後五日蚯蚓出後五日王􅀲生盛德在火迎夏於南郊迎夏爲祀亦帝命樂正習盛樂爲將大雩先習盛樂自折鞞至祝皆作日盛樂中氣日在畢小滿爲四月中氣昏􅎮中曉須女中斗建巳位之中小滿之日苦菜秀後五日靡草死後五日小暑至挺重囚出輕繫挺猶寛也重囚寛之至秋方決輕繫出而捨之無起土功無發大衆無伐大樹爲妨蠶農之事天子初衣暑服論語曰當暑袗絺綌謂暑服無大田獵恐傷生􅀋以含桃先薦寢廟含桃櫻桃也先薦寢廟後乃食之􅁞事旣登后妃獻繭后妃獻繭進其成功也天子飲酎用禮樂酎之言醇也春酒至此始成與群臣飲之又曰五月之節日在參芒種爲五月節也昏角中曉危中斗建午位之初律中㽔賔五月氣至則􅅋賔之律應􅅋賔者􅀿鍾之所生三分益一管長六寸三分其日其音其數並同孟夏芒種之日螳蜋生後五日鵙始鳴後五日反舌無聲縶騰駒恐相蹄齧班馬政馬政謂掌十二閑養馬之政教聚蓄百藥因草木蕃廡之時則採聚百藥中氣日在東井夏至爲五月中氣昏亢中曉營室中斗建午位之中夏至之日鹿角解後五日蜩始鳴後五日半夏生祀皇}
