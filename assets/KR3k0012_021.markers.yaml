  - {type: variant, offset: 346, length: 0, content: '', WYG: 秋繁露曰夏樂氣故養也孝經説曰斗指午為夏鶡冠子曰斗柄南指天下皆夏史記曰墨者亦尚堯舜言德行曰夏日葛衣冬日鹿裘又曰田嬰有子四十餘人其賤妾有子名文以五日生嬰告其母曰勿舉也其母竊舉生之及長因其兄弟而見其子文於田嬰田嬰怒其母曰吾令若去此子敢生之何也文頓首因曰君所不舉五月子者何故嬰曰五月子者長及户齊將不利父母文曰人生受命於天君何憂焉必受命於户則可髙其户耳誰能至户者嬰曰子休矣漢書曰熒惑南方夏火禮也視也禮虧視失逆夏令傷火氣罰見熒惑逆行一舎二舎為不祥居之三月國有殃五月受兵七月半亡地九月地太半亡又漢武帝始幸雍郊見五帝以孟夏四月答禮焉又賈誼既已謫居長沙長沙卑濕自以為壽不得長傷悼之乃為賦以自廣曰單閼之歲兮四月孟夏歲在卯曰單閼庚子日斜鵩集余舍五行志曰秦始皇六年四月大寒人多凍死}
