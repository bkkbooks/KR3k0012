  - {type: variant, offset: 1312, length: 1, content: 尺, SBCK: 十七章之事又曰夏不操扇冬不服裘天雨不張蓋名日禮將又曰冬冰可折夏條可結傅子曰夏令披裘冬令披褐雖有嚴令終不從者逆也世說日郗嘉賔三伏之月詣謝公炎暑方盛雖復當風交扇猶沾汗流離又日周鎭罷臨川還都泊淸溪時夏暴雨舡舫狹小而漏殆}
