  - {type: variant, offset: 1172, length: 2, content: 寅為, SBCK: 午爲夏鶡冠子曰斗柄南指天下皆夏史記曰墨者亦尙堯舜言德行曰夏日葛衣冬日鹿裘又曰田嬰有子四十餘人其賤妾有子名文以五月生嬰告其母曰勿舉也其母竊舉生之及長因其兄弟而見其子文於田嬰田嬰怒其母曰吾令若去此子敢生之何也文頓首因曰君所不舉五月子者何故嬰曰五月子者長及戸齊將不利其父母文曰人生受命於天君何憂焉必受命於戸則可髙其戸耳誰能至戸者嬰曰子休矣又曰熒惑南方夏火禮也視也禮虧視失逆夏令傷火氣罰見熒惑逆行二舎爲不祥居之三月國有殃五月受兵七月半亡地九月太半亡地又曰漢武帝始幸雍郊見五帝以孟夏四月荅禮焉又曰賈􅁩旣以謫居長沙長沙卑濕自以爲壽不得長傷悼之乃爲賦以自廣曰單閼之歲兮四月孟夏嵗在夘日單閼庚子日斜兮鵩集余舎五行志曰秦始皇九年四月大寒人多凍死時嫪毒及大臣二十餘人車裂以徇而滅宗放遷四千餘家于房陵漢食貨志日朝錯曰今農人五口之家其服役者不下二人其能耕者不過百􅅿百􅅿之收不過百石春耕夏耘秋穫冬藏采樵治宫病給役使春不得避風夏不得避暑􅀬秋不得避陰}
  - {type: page-break, offset: 1172, content: '', id: KR3k0012_SBCK_021-5a}
