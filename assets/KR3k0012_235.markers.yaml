  - {type: variant, offset: 421, length: 594, content: 輒命賜以御粥其砥直任時不為窮通改節皆此類也又曰程駿拜著作郎顯祖屢引與論易老之義顧謂群臣曰朕與此人言意甚閑暢又問駿曰卿年幾何對曰臣六十有一顯祖曰昔太公既老而遭文王卿今遇朕豈非早也駿曰臣雖才謝呂望而陛下尊過西伯覬天假餘年竭六韜之效又曰韓顯宗除著作郎高祖曾謂顯宗及程靈虬曰著作之任國言是司卿等之才朕自委悉中省之品卿等所聞若欲取古人班馬之徒固自遼闊若求之當代文學之能卿等應推崔孝伯又曰趙逸為赫連屈丐著作郎世祖平統萬見逸所書曰此豎無道安得為此言乎作者誰也其速推之司徒崔浩進曰彼之謬述亦猶子雲之美新皇王之道固宜容之世祖乃止三國典略曰齊主以其著作郎祖珽數上密啟命中書門下二省斷珽奏事初珽為秘書郎用芳林遍略質摴蒲錢又陳元康被傷將死憑珽作書屬家累并云祖喜邊有少許物宜早索取珽不通此書喚喜私問得金二十五鋌唯與喜二鋌餘並自入祖喜告元康二弟叔諶季璩等叔諶以語楊愔愔嚬眉答曰恐不益亡者因此得停其後齊文宣以珽為秘書丞盜遍略事發付平陽王淹令錄珽付禁淹遣使收珽珽便私逃黃門侍郎高德正謀云但宣命向秘書稱奉并州進止須經史各部仰丞親自檢校催遣如此則珽意自安夜當還宅然後掩捉之果如德正所圖遂縛送廷尉據犯當死文宣以其伏事先代除名為民愛其才伎令直中書普選勞舊遷為著作唐書曰著作郎鄧隆上表請編錄御製詩集太宗冲讓不許隆好學多伎王充兄子太之守河陽也引隆為賓客大見親遇及太宗攻洛陽遣書諭太隆為太復書言辭不遜洛陽平後隆懼罪變姓名自號隱玄先生竄, SBCK: ''}
