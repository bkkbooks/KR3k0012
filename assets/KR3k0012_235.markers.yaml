  - {type: variant, offset: 58, length: 186, content: 監虞濬所請為著作郎議晉書限斷又曰何嵩善史漢為著作晉書曰元康元年詔著作郎舊隸中書而秘書既典司文籍今改中書著作郎為秘書著作郎晉中興書曰孫盛歷散騎常侍秘書監常領著作又曰孫綽為散騎常侍領大著作于時才筆之士綽為其冠又曰李充為大著作于時典籍混亂充刪除煩重以類分作四部秘閣以為永制又曰謝沈為祠部郎何充庾冰以沈有史才遷大著作晉太興起居注曰元帝依故事召陳郡王隱待詔著作單衣介幘朔望朝著作之省, SBCK: ''}
