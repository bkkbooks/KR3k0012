  - {type: variant, offset: 13, length: 4, content: 弘農楊彪, SBCK: 張衡字平子以郎中遷太史令妙善璣衡之正紀渾天儀復造候風地動儀以精銅鑄成貟徑八尺合盖隆起形如酒杯如有地動樽則震㝷其方靣知震所在驗之以事合契􅀂神張璠漢記曰􅀄王師敗於曹陽欲浮河東下侍御史太史令王立曰去春太白犯鎭星於斗過天津熒惑又逆行守河北不可犯也由是遂北渡河將自軹􅀜東出立又謂宗正劉艾曰前太白守天􅀜與熒惑㑹金火交㑹革命之象也漢祚終矣晉魏必有興者後立數言於帝曰天命有去就五行不常盛代者土也丞漢魏也能安天下者曹姓唯委任曹氏而巳曹公聞之使人語立曰知忠於朝廷天道深逺幸勿多言應劭曰太史令秩六百石掌天時星曆凢歳奏新年曆凢國􅀕祀䘮娶之事奏良日國有瑞應灾異記之又曰太史令秩六百石望郎三十人掌故三十人昔在顓頊南正重司天火正􅀺司地唐虞之際分命羲和曆象日月星辰敬授民時至于夏后殷周世叙其官皆精研術數窮神知化當春秋時魯有梓愼晉有卜偃宋有子韋鄭有禆竈觀乎天文以察時變其言屢中有備無害漢興甘石唐都司馬父子抑亦次焉未塗偷進茍忝兹階旣闇􅃸望競飾邪僞以㓙爲􅁻莫之懲糺漢舊儀曰承周史官至武帝置太史公司馬遷父談世爲太史遷年十三使乘傳行天下求古諸侯之史記魏志曰黃龍見譙橋桓􅀇問太史令單颺颺曰其國當有王者呉志曰呉範}
