  body:
  - {type: variant, offset: 5, length: 1, content: 二, SBCK: 三太史令殿中􅁥六尚附大長秋太史令春秋元命苞云屈中挾一而起者爲史史之爲言紀也天度文法以此起也尚書酒誥曰太史友内史友太史内史掌國典法所賔友者也周書曰維正月王在成周昧爽召三公右史戎夫曰今夕朕寤遂事其驚余乃取遂事之要戒甲戎夫主之朔望以聞也禮記曲禮下曰天子建六太曰太宰太宗太史太祝太工太卜典司六典又玉藻曰動則左史書之言則右史書之荷斧之人嚮􅎮而蹲蟠猶周也蹲踞也楚驚唐史曰君慢命又簡宗廟命天命也􅎮於天文楚之分也向之而踞是慢命踞簡宗廟於是晝遺炎煙耀于蒼雲精消無文􅎮火精雲水氣圍􅎮水也晝日陽也炎火亦陽也遺之者象蟠所也水難勝火三陽併氣且火炎上冝消滅也文則蜺也唐史之􅁽上滅蒼雲告神以史功也韓詩外傳曰據法守職而不敢爲非者太史也毛詩序曰國史明乎得失之迹傷人倫之廢哀刑政之苛吟詠情性以諷其上逹於事變而懐其舊俗者也春秋後語曰晉太史屠􅁰見晉之亂以其國法歸周國語曰鄭桓公爲司徒問於史伯曰王室多故史伯周太史也余懼及之焉漢書曰司馬喜生談談爲太史公如淳曰漢儀注太史公武帝置位在丞相上天下計書先上太史公副上丞相序事如古春秋遷死宣帝以其官爲令行太史文書而巳臣瓉案百官表無太史公茂陵中書司馬談爲太史令遷仕爲郎中使西征巴蜀以南略卭筰音昨昆明還報命是歳天子始建漢家之封而太史公留滯周南如淳曰周南洛陽也不得與從事發憤且卒而子遷適反見父於河洛之間太史公執遷手而泣曰予先周室之太史也自上世甞顯功名虞夏典天官事後世中衰絶於予乎汝復爲太史則續吾祖矣今天子接千􅀊之緒封秦山而予不得行是命也夫是命也夫予死汝必爲太史爲太史無忘吾所欲論}
