  - {type: variant, offset: 1542, length: 198, content: 郎中高祖曾因朝會之次歷訪治道弁年少官微自下而對聲姿清亮進止可觀高祖稱善者久之因是大被知遇賜名為弁意取弁和獻玉楚王不知寶之理也後周書曰黎景熙字季明正定古今文字於東閣大統未除安西將軍尋拜著作佐郎於時倫輩皆位兼常伯車服華盛唯季明獨以貧素居之而無愧色又勤於所職著述不怠然性尤專固不合於時是以一為史官十年不調張華別傳曰陳壽好學善著述論著作佐郎當時夏侯湛等多欲作魏書見壽所作即壞己書文士傳曰束晢晚應司空辟入府, SBCK: 􅁥}
