  - {type: variant, offset: 5, length: 0, content: '', WYG: 三太史令殿中監六尚附大長秋太史令春秋元命苞云屈中挾一而起者為史史之為言紀也天度文法以此起也尚書酒誥曰太史友内史友太史内史掌國典法所賔友者也周書曰維正月王在成周昧爽召三公右史戎夫曰今夕朕寤遂事其警余乃取遂事之要戒申戎夫王之朔朢以聞也禮記曲禮下曰天子建六太曰太宰太宗太史太祝太士太卜典司六典又玉藻曰動則左史書之言則右史書之春秋左傳曰趙穿攻靈公於桃園宣子未出山而復太史書曰趙盾弑其君以示於朝宣子曰不然對曰子為正卿亡不越境返不討賊非子而誰宣子曰嗚呼我之懷矣自貽伊戚其我之謂矣孔子曰董狐古之良史也書法不隱又襄四曰太史書崔杼弑其君崔子殺之其弟嗣書而死者}
