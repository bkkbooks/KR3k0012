  - {type: variant, offset: 6, length: 0, content: '', WYG: 人嗣續其弟又書乃舎之南史氏聞太史盡死執簡以往聞既書矣乃還又曰魯昭公二年晉韓宣子聘魯觀書於太史氏見易象與魯春秋曰周禮盡在魯矣周禮春官下曰太史掌建國之六典太史日官也春秋傳曰天子有日官諸侯有日卿大戴禮曰太子既冠成人免於保傅則有司過之史春秋文耀鈎曰楚立唐氏以為史官蒼雲如蜺圍軫七蟠中有荷斧之人嚮軫而蹲蟠猶周也蹲踞也楚驚唐史曰君慢命又簡宗廟命天命也軫於天文楚之分也向之而踞是慢命踞簡宗廟於是晝遺炎煙耀於蒼雲精消無文軫火精雲水氣圍軫水也晝日陽也炎火亦陽也遺之者䝉蟠所也水難勝火三陽併氣且火炎上宜消滅也文則蜺也唐史之䇿上滅蒼雲告神以史功也韓詩外傳曰據法守職而不敢為非者太史也毛詩序曰國史明乎得失之迹傷人倫之廢哀刑政之苛吟詠性情以諷其上達於事變而懷其舊俗者也春秋後語曰晉太史屠黍見晉之亂以其圖法歸周國語曰鄭桓公為司徒問於史伯曰王室多故史伯周太史也余懼及之焉漢書曰司馬喜生談談為太史公如淳曰漢儀注太史公武帝置位在丞相上天下計書先上太史公副上丞相序事如古春秋遷死宣帝以其官為令行太史公文書而已臣瓚案百官表無太史公茂陵中書司馬談為太史令遷仕為郎中使西征巴蜀以南略卭筰音昨昆明還報命是嵗天子始建漢家之封而太史公畱滯周南如淳曰周南洛陽也不得與從事發憤且卒而子遷適反見父於河洛之間太史公執遷手而泣曰予先周室之太史也自上世嘗顯功名虞夏典天官事後世中衰絶於予乎汝復為太史則續吾祖矣今天子接千嵗之緒封泰山而予不得行是命也夫是命也夫予死汝必為太史為太史無忘吾所欲論}
