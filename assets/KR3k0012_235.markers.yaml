  - {type: variant, offset: 1810, length: 1, content: 校, SBCK: 殿中􅁥掌服御之事惣尚食尚藥尚衣尚乗尚舎尚輦六局之官屬備其禮物而供其職事少監爲之貳尚食奉御掌常謹其儲供辯其名數直長爲之貳尚藥奉御掌合和藥物辯藥上中下之三品直長爲之貳尚衣奉御掌衣服詳其制度辯其名數尚乗奉御掌内外閑廐之馬辯其麄良而率其習馭直長爲之貳尚舎奉御掌殿庭張設湯沐而㓗其灑掃直長爲之貳尚輦奉御掌輿輦繖扇之分分其次叙而辯其名數直長爲之貳大長秋天官}
  - {type: page-break, offset: 1810, content: '', id: KR3k0012_SBCK_235-5a}
  - {type: variant, offset: 1810, length: 7, content: 校書郎八人正九, WYG: 殿中監掌服御之事惣尚食尚藥尚衣尚乘尚舍尚輦六局之官屬偹其禮物而供其職事少監為之貳尚食奉御掌謹其儲供辨其名數直長為之貳尚藥奉御掌合和藥物辨藥上中下之三}
  - {type: page-break, offset: 1810, content: '', id: KR3k0012_WYG_235-8b, image: WYG0895/WYG0895-0165d.png}
