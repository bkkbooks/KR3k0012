  - {type: variant, offset: 1016, length: 522, content: 白鹿山黃冠野服不接人事貞觀初徵授國子主簿與愽陵崔仁師昌黎慕容善行弘農劉顗新野康安禮河東敬播俱為修史學士隆負宿罪猶不自安太宗聞之遣房玄齡謂之曰爾為王太作書誠合重責但各為其主於朕何有惡哉朕今為天子何能追責疋夫之過爾宜坦然勿懷危懼也擢授著作郎及修史成尋卒撰東都記三十卷為學者所重又曰龍朔二年改著作郎為司文郎中佐郎為司文郎又曰劉允濟傳垂拱四年明堂初成允濟奏上明堂賦以諷則天甚嘉歎之手製襃美拜著作郎陶氏職官要錄曰著作郎舊視通直郎史才富愽者為之應亨集讓著作表曰自司隸校尉奉至臣五葉著作不絕鄉族以為美談著作佐郎王隱晉書曰武帝欲以郭琦為佐著作郎問尚書郭彰彰憎琦不附己答詔不識上曰若如卿言烏丸家兒能事卿即堪郎矣及趙王倫篡又欲用琦琦曰我已為武帝吏不能復為今世吏終於家又曰華嶠漢書十典未成秘書監繆徵奏嶠少子暢為著作佐郎卒成十典晉中興書曰郭璞奏南郊賦中宗見賦嘉其才以為著作佐郎又曰華譚為秘書監時晉陵朱鳳吳郡吳震等以單族有史才白首衡門譚薦二人擢補著作佐郎並皆稱職沈約宋書曰謝裕字景仁陳郡陽夏人也會稽王世子元顯嬖人張法順權傾一時內外無不造門者唯景仁不至年三十方為著作佐郎桓玄誅元顯見景仁謂四坐曰司馬庶人父子云何不敗遂令謝景仁三十方作著作佐郎後魏書曰宋弁字義和為著作佐郎尋除, SBCK: ''}
