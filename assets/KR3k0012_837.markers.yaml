  - {type: variant, offset: 30, length: 0, content: '', WYG: 岱嶽與其五穀魚鹽生焉榖不熟為飢仍飢為荐郭璞注曰言泰山有魚鹽之饒也不熟五糓不成荐連歳不熟也周書曰凡禾麥居東方黍居南方稻居中央粟居西方史記曰黄帝考定星厯立五行民神易業敬而不黷故神降之嘉生嘉糓也又曰齊桓公欲封禪管仲曰今鳯凰不来嘉榖不生而蓬蒿蔾莠茂鴟梟數至又曰留侯性多病即𨗳引不食穀服碎穀藥而靜居行氣漢書晁錯曰粟米布帛生於地長於時聚於力非可一日成也數石之重中人弗勝不為奸邪所利一日弗得而饑寒至是故明君貴五穀而賤金玉今海内為一土地人民之衆不減湯禹加以亡天災數年之水旱而蓄積未及者何也地有餘利民有餘力生榖之土未盡墾山澤之利未盡出也游食之人未盡歸農也又曰宣帝即位歳數豐穣榖至石五錢東觀漢記曰永平十五年上始欲征匈奴與竇固等議出兵調度皆以為塞外草美可不須穀馬案軍出塞無榖馬故事馬防言當與榖上曰何以言之對曰宣宗時五將出征案其奏言匈奴候騎得漢矢見其中有粟知漢兵出以故引去以是言之馬當與穀上善其用意微緻即下調馬穀防遂見親也又曰建武初榖食尚少趙孝得榖炊將熟令弟禮夫妻出比還孝共蔬食茹菜禮夫妻来輙獨遺之積久禮心疑怪後伺掩見亦不復肯出兄弟怡怡鄉里歸徳華嶠後漢書曰馬援在河西有榖數萬斛乃嘆曰凡殖財者貴以施也否則守錢虜耳袁宏漢記曰赤眉亂後闗中}
