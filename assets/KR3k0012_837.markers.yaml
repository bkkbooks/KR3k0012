  - {type: variant, offset: 36, length: 1, content: 當, SBCK: 王莽末天下大飢建武二年天下野穀旅生麻菽尤盛魏志曰自遭荒亂率乏糧榖曹公曰夫定國之術在於強兵足食􅁗人以急農兼天下孝武以屯田定西域此先丗之良式也是歳乃募民屯田許下得榖百萬斛於是郡列置田官所在積榖又曰􅀽曜卿爲魏國郎中令及卒太祖爲之流涕賜榖二}
