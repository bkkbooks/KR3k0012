  - {type: variant, offset: 3, length: 0, content: '', WYG: 一穀周易曰日月麗乎天百穀草木麗乎土尚書曰稷降播種農殖嘉穀毛詩國風信南山曰既霑既足生我百穀毛詩甫田曰播厥百穀既庭且碩曾孫是若周禮天官曰太宰以九賦任萬民一曰三農生九穀鄭司農云九榖稷黍秫稻麻大小豆大小麥凡上之膳食用六穀鄭司農云稻稷黍粱麦菰米彫胡也藥養其病又夏官曰職方氏掌天下之圖辨其邦國都鄙九穀之數揚州荆州其穀宜稻豫州并州其榖宜五種鄭𤣥云黍稷稻麥麻青州其穀宜稻麥兖州其穀宜四種黍稷稲麥雍州冀州其穀宜黍稷幽州其穀宜三種稷黍稻禮記月令曰孟春天子乃以元日祈穀於上帝孟夏驅獸無害五穀獸麋鹿之屬食穀苖驅之令勿害也孟秋農乃登穀天子嘗新先薦寢廟又王制曰五穀不熟不鬻於市又樂記曰夫古者天地順而四時當民有徳而五穀昌疾疹不作而無妖祥徳盛而教尊五穀時熟然後賞之以樂大戴禮曰黄帝播百穀草木節用水火財物生而民得其利百年民畏其神百年亡而民用其教百年故曰三百年又曰食氣者神明而夀食穀者智恵而考不食者不死左傳襄公曰泰伯之弟鍼謂趙文子曰鍼聞之國無道年穀和熟天賛之也鮮不五稔禮斗威儀曰君乗木而王則草木豐茂嘉穀並生也左傳晉范宣子為政賦黍苖季武子興再拜稽首曰小國之於大國也如百穀之仰膏雨焉穀梁傳襄公二}
