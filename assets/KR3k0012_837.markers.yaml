  - {type: variant, offset: 129, length: 0, content: '', SBCK: 先生以寡人國爲戯乎淳于髠對曰臣不敢以王國爲戯也臣􅀏隣之祠田也以篋飲與一鮒魚其祝曰下田洿耶得榖百車㙰户買反塊口對反者冝禾臣􅀏其所以祠者少而求者多王曰善賜之千金革車百乗立爲上卿山海經曰都廣之野百榖自生冬夏播琴郭璞注曰其城方三百里盖天地之中素女所出也播琴猶播殖方俗言耳楊雄方言曰凡以火乾五榖之􅀋岀自山東}
