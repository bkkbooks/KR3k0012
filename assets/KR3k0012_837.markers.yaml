  - {type: variant, offset: 1981, length: 469, content: 有五千錢遣人追與賊聞知陽悉還其物陽以付亭長邴原別傳曰原字根短避地遼東嘗行得遺錢拾以繫樹枝此錢既不見取而繫錢者多原問其故荅者謂之神樹原惡由己而成淫祀乃辯之由是里中遂歛其錢以為社供桓範世論曰靈帝置西園之邸賣爵號曰禮錢錢積如屋封塗漆書杜恕體論曰可以使鬼者錢也可以使神者誠也語林曰杜預道王武子有馬癖和長輿有錢癖竹林七賢傳曰王戎女適裴氏乏用遣女為貸錢數萬文而未還女歸戎色不悅女遽還錢乃懌干寶搜神記曰南方有蟲其形若蟬而大其子著草葉如蠶種得子以歸則母飛來就之殺其母以塗錢以其子塗貫用錢貨市旋則自還故淮南子術以之還名曰青鳧世說曰王武子私第近北邙山于時人多地貴濟好馬射買地作埒編錢布地竟埒時人號為金埒又曰郗公大聚歛有錢數千萬嘉賓甚不同常朝旦問訊郗家法子弟不坐因倚語移時遂及錢貨事郗公曰汝政當得錢耳乃一日開庫任意用郗公始謂正損數百萬許嘉賓遂一日乞與人都盡郗公聞之大驚不能已巳俗說曰王子敬學王夷甫呼錢為阿堵物後既詔出赴謝公主簿過會下與共擲散當其夕手自抱錢戲竟明日已後云何至須阿堵物葛仙公別傳曰取十錢使人一一投井中公井上以器呼錢人見從井中一一飛出入公器中投人刻識, WYG: ''}
  - {type: variant, offset: 1984, length: 74, content: 錢遣人追與賊聞知陽悉還其物陽以付亭長邴原別傳曰原字根短避地遼東嘗行得遺錢拾以繫樹枝此錢既不見取而繫錢者多原問其故荅者謂之神樹原惡由己而成淫祀乃辯之由, SBCK: 斛賜臣謝􅀇書奉白糧榖十斛}
