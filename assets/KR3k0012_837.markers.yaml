  - {type: variant, offset: 44, length: 2, content: 字篆, SBCK: 歳失父後天下兵亂飢饉百姓皆賣金銀珠金寳物時后家大有儲榖頗以買之后年十餘歳白母曰今丗亂而多買寳物匹夫無罪懷璧爲罪又左右皆飢乏不如以榖振給親族鄰里廣爲恩惠舉家稱善曹暪傳曰太祖甞賦廪榖不足私謂主者如何主者曰可以小斛以足之後軍中言太祖欺衆太祖謂主者曰借汝一死厭衆乃殉曰小斛盗官穀即斬之江表傳曰諸葛亮聞恪代徐詳書與陸遜曰家兄年老而恪性踈今使典主粮榖糧榖軍之要㝡僕雖在逺􅀼用不安足下特爲啓至尊轉之王隱晉書曰鄧攸爲吴郡太守吴人飢荒攸輙出䑓倉穀振之後􅀍効攸曰善}
