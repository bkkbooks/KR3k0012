  - {type: variant, offset: 4, length: 8, content: 六錢下崔鴻十六國, SBCK: 四年曰京師大飢五榖不􅂛爲大飢升成也一榖不􅂛謂之嗛嗛不足貌二榖不升謂之飢三穀不􅂛謂之饉四榖不升謂之康康虐也五榖不􅂛謂之大侵}
