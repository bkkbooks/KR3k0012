  - {type: variant, offset: 2750, length: 1320, content: 誠不敢當敞曰府君固謬言耳郎君無疑之列異傳曰西河鮮子冀建武中為清河太守言出錢六百萬屋未成而死趙高代之計功用錢凡二百萬耳五官黃秉功曹劉商言是冀所自取便表沒冀田宅奴婢妻子送曰南俄而白曰冀鬼見入府與商秉等共計校定餘錢二百萬皆商等匿冀乃表自烈付商上詔還冀田宅異苑曰桂楊臨武徐孫太元中江行見岸有錢溢出即輦著船中須臾悉變成土異苑曰剡縣陳婺妻少寡與二兒為居宅中先有古塚姥母作茗先以著墳上息患之曰枯墓何知欲掘除之母苦禁乃止夜即夢見一人息說沒世以來三百餘載謬蒙惠澤賢二子怕欲見毀相賴保護雖潛壤朽骨敢忘翳桑之報姥霄竊述焉明負杖晨與於外屋得錢十萬似久埋而貫皆新還告兒兒並有慚色自是設饌愈謹幽明錄曰海陵民黃尋先居家單貧嘗因大風雨散錢飛至其家來觸籬援誤落餘處拾而得之尋後巨富錢至數千萬遂擅名於江表三輔黃圖曰金寶一銀寶二龜寶三貝寶四布寶五泉寶六凡寶貨六種世八品煩碎難行乃羅本貨五百枚為重十二斤百姓安之闞駰十三州志曰青州平原國和帝延平九年以封子懷王勝風俗與舊齊同然吏奸倍於他民給衛士吏賦狐肉稍從假錢積至萬餘歲竟交代吏無償意衛士恨恚取狐肉沃以酒從而呪之曰狐肉狐肉尾斯尾斯身軀雖小錢多吏聞之恐乃償之錢盛弘之荊州記曰義熙十二年有童子群浴南陽淯水忽岸邊有錢出如流沙因競取之手滿放地尋復行去乃以衫衣縛各有所得王韶之始興記曰勞口東岸有石四方高百餘仞其狀如臺父老相傳此石昔有三人伐木以作橋於石頂戲見數甕錢共取半甕還劉道真錢塘記曰防海大塘郡議曹華信象家富乃議立此塘以防海水信始開募有致土石一斛即與錢一斗旬日之間來者雲集塘未成而誦云不復取於是載土者皆棄置而去塘以之成既遏絕湖漁一竟蒙利縣遷治餘姚王莽時縣名泉亭於是改為錢塘百姓懷德立碑塘所至今猶在地境圖曰錢銅之氣望之如有青雲又曰望錢千萬以上如車十萬之精如一素木萬錢精蓋地如甕江津上便宜曰夫錢之為物無益飢寒之用而儲之家利其不朽古今行之蓋亦由此又便交宜易小市之宜誠勝寸裂尺斷破為大小也過此以往無所一用軍國唯穀與帛錢雖可積未急寶也殷仲堪集太子令曰朝廷遂為吾營宮室顧省不才而大興役費深用愧愓冬氣已應作者殊常寒苦可使監殿舍人一月齎酒肉稱勞賜之吾蒙月俸錢上生塵無所用之可以供事晉魯褒錢神論曰大矣哉錢之為體有乾坤之象其積如山其流如川動靜有時行藏有節井便易不患耗折故親如兄弟字曰孔方失之則貧弱得之則富昌無翼而飛無足而走解嚴毅之顏開難發之口錢多者居前錢少者居後綦母氏論錢曰黃銅中方叩頭對曰僕自西方庚辛分土諸國處處皆有長沙越儁僕之所守黃金為父白銀為母鈆為長男錫為少婦伊我初生周末時也景王尹世大鑄茲也貪人見我如病得醫飢饗太牢未之喻也成公綏錢神論曰路中紛紛行人悠悠載馳載驅唯錢是求朱衣素帶當塗之士愛我家兄皆無能已執我之手託分終始不計優劣不論能否賓客輻湊門常如市諺曰錢無耳何可闇使豈虛也哉趙壹疾邪賦曰文籍雖滿腹不如一囊錢曹植樂府歌曰巢許蔑四海商賈爭一錢鄭氏婚禮謁讚文曰金錢為質所歷長久金取和明錢用不止貲財周禮地官下司關曰司關司貨賄之出入後漢書曰樊重字君雲世善農稼好貨殖重性溫厚有法度三世共財子孫朝夕禮敬常若公家其營理產業物無所棄課役童隸各得其宜故能上下戮力財利歲倍管子曰倉廩實知禮節國足則遠者來衣食足則知榮辱矣不務天時則財不生不務地利則倉不盈又曰桀有天下而用不足湯有土, SBCK: ''}
