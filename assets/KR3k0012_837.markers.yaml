  - {type: variant, offset: 1293, length: 6, content: 布散諸濟陰商, WYG: 間早生而晩殺五榖之所蕃熟也陳子要言曰食榖而鄙田衣帛而笑蠶是惑也范子計然曰五榖者萬民之命國之重寳也是故無道之君及無道之臣皆不能積其盛有餘之時以待其衰不足星經曰八榖八星在五車北主黍稷稻粱麻菽麥烏麻星明俱熟師曠曰杏多實不蟲者来年秋善五榖之先欲知五榖但視五木擇其木盛者来年益種之京房五星占者五榖俱傷何君無徳也京房易逆刻曰天雨榖歳大熟淮南}
