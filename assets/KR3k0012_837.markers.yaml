  - {type: variant, offset: 1410, length: 1, content: 銅, krp: 至于神農甞百草之實察容鹹苦之味教民食榖汜勝之書曰雪者五榖之精又曰小豆忌夘稻麻忌辰禾忌田秫忌未小麥忌戍大麥忌子桓譚新論曰丗俗咸言漢文帝澤加黎庶榖至石數錢論譚曰謂天雨榖從天而下應變而生非也夫雲岀於山散而爲雨人見從天墜謂雨水也夏日則雨冬寒則凝爲雪發於丘山}
  - {type: variant, offset: 1412, length: 2, content: 布下, krp: 從天降明矣榖從地起與疾風俱飄集於地人謂天之雨也建武三十一年陳留雨榖蔽地視榖形如米而黒此夷狄地所生榖也夷狄不食榖生於草野成熟委於地遭疾風之俱飛衰榖集中國中國見之謂天雨榖丗要論曰學不勤則不知道耕不力則}
