  - {type: variant, offset: 946, length: 782, content: 開通之狀文曰天下太平云於希烈庭中得之命宰臣召百寮遍視之後唐書曰朱守殷奏於積善坊役所得古文錢四百五十六文曰得一元寶四百四十文順天元寶守殷進納勑凡窺奇異盡繫休明所獲錢文式昭玄貺得一者佇歸於一統順天者式契於天心道煥一時事光千載殊休繼出信史必書宜付史館又曰劉仁恭在幽州以墐士為錢令部人行使聚銅錢於山上鑿穴藏之為無窮之計晉書曰右驍衛大將軍張籛始在雍州因春景舒和出遊近郊憩於大塚之上忽有黃雀衘一銅錢置之而去未幾復於衙院晝臥見二燕相鬥畢各衘一錢落於籛首後所獲三錢嘗秘於巾箱識者以為大富之徵又曰天福三年勑先許鑄錢仍令每一錢重二銖四黍十錢重一兩者切慮逐處闕銅難依先定銖兩宜令天下無問公私應有銅欲鑄錢者一任取便酌量輕重鑄造因茲不得入錫并錢及令缺漏不堪久遠行用仍委鹽鐵司明行曉示誡約管子曰桓公請棧臺之錢散諸城陽鹿臺之布散諸濟陰商子曰今臣之所言民無一日之繇官無數錢之費其弱晉而強秦有過三戰之勝韓子曰或令孺子懷錢挈壺瓮往酤而狗齕之酒所以酸呂氏春秋曰趙桑子見翳桑之下有臥餓人不能起趙宣子命食之拜受而不食問其故曰臣有母請持以遺之宣子更賜之脯二束錢一百賈誼書曰銅不布下不得採銅不得鑄錢則民反耕田矣鹽鐵論曰教與俗改弊與世易夏后以貝周人以紫石後世或金錢刀布極而衰終始之運也又曰古者市朝而無刀弊各以所有易所無抱布貿絲而已後世則有龜貝金錢又曰夫鑠金在爐盜蹠不顧錢刀在路疋婦撥之論衡曰人文章豈徒調墨弄筭為英麗哉載人行傳人名楊子法言蜀富貴人齎錢十萬願載一名子雲不聽夫富人無仁義正如圈中之鹿欄中之牛安得妄載又曰手中無錢而欲往市決貨貨主問錢何在曰無錢貨主必不與也胸中無學猶手中無錢也又曰淮陽鑄偽錢吏不能禁汲黯為太守不壞一爐不刑一人高枕安臥淮陽政清郭子璜洞冥記曰帝升望月臺有三青鴨化為三小童皆著青綺文襦各握鯨文大錢五枚以置帝几前身止而影動因名曰輕影錢潛夫論曰諺曰痛不著身言忍之錢不出家言與之猶見朝廷有寇而言不足憂也, SBCK: 榖價}
