  - {type: variant, offset: 30, length: 0, content: '', krp: 岱岳與其五榖魚鹽生焉榖不熟爲飢仍飢爲荐郭璞注曰言㤗山有魚鹽之饒也不熟五榖不成荐連歲不成也周書曰凡禾麥居東方黍居南方稻居中央粟居西方菽居北方史記曰黃帝考定星暦立五行民神易業敬而不黷故神降之嘉生嘉榖也又曰齊桓公欲封禪管仲曰今鳯皇不來嘉榖不生而還蓬蒿䔧莠茂鴟梟數至又曰留侯性多病即導引不食榖服辟榖藥而靜居行氣漢書晁錯曰粟米布帛生於地長於是聚於力非可一日成也數石之重中人弗勝不爲姧邪所利一日弗得而飢寒至是故明君貴五穀而賤金玉今海内爲一土地人民之衆不減湯禹加以亡天灾數年之旱而蓄積之未及也何也地有遺利民有餘力生榖之土未盡墾山澤之利未盡出也游食之人未盡歸農也又曰宣帝即位歲數豐穰榖至石五錢東觀漢記曰永平十五年上始欲征匈奴與竇固等議出兵調度皆以爲塞外草美可不須榖馬案軍出塞無穀馬故事馬防言常與榖上曰何以言之防對曰宣帝時五帝出征案其奏言匈奴候騎得漢矢見其中有粟知漢兵出以故引去以是言之馬當與榖上善其用意微緻即下調馬穀防遂見親也又曰建武𥘉榖食尚少趙孝得榖炊將熟令弟禮夫妻岀北還孝夫妻共𬞞食茹菜禮夫妻來輙獨飴之積乆禮心疑恡後同掩見亦不復肯岀兄弟怡怡鄉里歸德華嶠後漢書曰馬援在河西有榖數萬斛乃歎曰凡殖財者貴以施也否則守錢虜耳袁宏漢紀曰赤眉亂後關中}
  - {type: variant, offset: 31, length: 1, content: 錢, SBCK: 饑黄金一斤易五􅂛榖後漢書曰董卓築塢於郿髙原七丈號曰萬􅀊塢今案塢舊基高一丈周􅅆一里一百歩也積穀爲}
