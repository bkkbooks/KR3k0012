  - {type: substitution, offset: 1, original: 產, replacement: 産, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20835}}
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 一榖周易曰日月麗乎天百榖草木麗乎土尚書曰稷降播種農食嘉穀毛詩谷風信南山曰旣沾旣足生我百榖毛詩甫田曰播厥百榖旣庭且碩曽孫是􅀂周禮天官曰太宰以九職任萬民一曰三農生九穀鄭曰農云九榖稷􅁰秫稻麻大小豆大小麦凡王之膳食用六穀鄭司農云稻􅁰稷梁麥菰菰彫胡也藥養其病鄭􅀇注五榖麻􅁰稷麥豆又夏官曰職方氏掌天下之圗辯其􅀖國都鄙九榖之數楊州荆州其榖冝稻䂊州并州其􅂖冝五稷鄭􅀇云􅁰稷麥稻菽青州其榖冝稻麥兖州其穀冝四種􅁰稷稻麥雍州冀州其榖冝稷幽州其榖冝三種稷黍稻禮記月令曰孟春天子乃以元日祈榖于上帝孟夏驅獸無害五榖獸䴢鹿之屬食􅂖苗驅之令勿害也孟秋農乃登穀天子甞新先薦寢廟􅁰稷之屬於是始熟又王制曰五榖不時不鬻於市又樂記曰夫古者天地順而四時當民有德而五榖昌疾􅐄不作而無妖祥德盛而教尊五榖時熟然後賞之以樂大戴禮曰黄帝播百榖草木節用水火財物生而民得其利百年民畏其神百年亡而民用其敎百年故曰三百年又曰食氣者神明而壽食榖者智惠而考不食者不死禮斗威儀曰君乗木而王則草木豐茂嘉榖並生也左傳襄公曰㤗伯之弟鍼謂趙文子曰鍼聞之國無道年榖和熟天賛之也鮮不五稔又曰晉范宣子爲政賦􅁰苗季武子興再拜稽首曰小國之仰大國也如百榖之仰膏雨也榖梁傳襄公二}
