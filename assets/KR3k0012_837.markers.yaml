  - {type: variant, offset: 104, length: 13, content: 沙門為誕採藥還見誕間外消息, SBCK: 雪則百榖豐末知此語有何故實文昌左丞姚璹}
  - {type: page-break, offset: 104, content: '', id: KR3k0012_SBCK_837-5a}
  - {type: variant, offset: 104, length: 220, content: 沙門為誕採藥還見誕間外消息對曰唯聞王貪願王早代誕曰齊州七萬家吾至來一家未得三斗錢何得言貪也後魏書曰王昕為汝南王悅騎兵參軍悅數散錢於地令諸佐爭拾之昕獨不拾悅又散銀錢以目盺乃取其一北齊書高恭之字道穆時用錢稍薄道穆表曰百姓之業錢貨為本救弊改鑄王政所先自頃以來私鑄薄濫官司糺繩挂網非一在市銅價八十一文得銅一斤私鑄薄錢斤餘二百既示之以深利又隨之以重刑得罪者雖多奸鑄者彌眾今錢徒有五銖之文而無二銖之實薄甚榆葉上貫便破置之水上殆欲不沉此乃因循有漸科防不切, WYG: 聲績}
