  - {type: variant, offset: 4071, length: 747, content: 十里用有餘而非獨為湯兩粟地非獨為湯出財物尸子曰農夫比粟商賈比財烈士比義列子曰端木子貢之世也籍其先貲家累萬金放意所好生民所無不為也庖廚之下不絕煙火堂廡之上不絕聲樂行年六十乃棄其家事都散庫藏及其死也無埋瘞之資孫卿子曰仁義禮智之於人也譬若財貨粟米之於家也多有者富少有者貧至無有者窮文子曰使信士分財不如探籌使廉士守財不如閉戶羽翼美傷其骨枝葉茂害其根憂河之涸泣以益也呂氏春秋曰白公愛財若梟之愛子梟養子長則食母白公得荊府庫不分人家語曰南宮敬叔以富得罪於定公而奔衛夫子聞之曰若其以貨喪不若速貧之愈也喪亡位也又曰孔子曰自季孫賜我千鍾而交益親以賜於眾故益親自南宮敬叔之乘我以車也而道加行說苑曰安陵纏得寵於楚恭王江乙謂纏曰吾聞以財事人者財盡而交踈以色事人者華落而寵衰予安得長被幸乎鹽鐵論曰荊陽南有桂林之饒內有江湖之利左陵陽之金右蜀漢之材吳越之貨隋唐之林不可勝用江湖之魚菜黃之鮐不可勝食隴蜀丹沙毛羽荊陽皮革骨焉江南柟梓竹箭燕齊魚鹽旃裘兗豫漆絲絺紵養生奉終之具也待商而通潛夫論曰富貴人爭附之貧賤人爭去之富貴而交者上有稱舉之用下有貲財之益與貧賤交者大有賑貸之費小有假貸之損故富貴易為交貧賤難得適又曰炎帝為市聚天下之貨各得其所孫綽子曰命駕而遊五都之市天下之貨畢陳矣風俗通曰陳留有富老年九十無男娶田家女為妻一交即氣絕後生得男其女曰我父死時年尊何一夕便有子爭財數年不決丞相邴吉出上殿決獄云老翁兒無影亦復畏寒于時八月取同歲小兒俱解衣裸之老翁兒獨呼寒復令並行日中無影因以財與男又曰沛中有富豪家訾三千萬小婦子是男又早失母其大婦女甚不賢公病困恐死後必當爭財男兒判不全得因呼族人為遺令云悉以財屬女但以一劍與男年十五以付之兒後大姊不肯與劍男乃詣官訴之司空何武曰劍所以斷決也限年十五有智力足也女及壻溫飽十五年已幸矣議者皆服謂武原情度事得其理, SBCK: ''}
