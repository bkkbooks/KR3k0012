  - {type: variant, offset: 119, length: 1, content: 唯, SBCK: 汜勝書云雪是五榖之精以其汁和種則年榖大穰又宋孝武帝大明五年元日降雪以爲嘉瑞上曰朕臨御萬方心存百姓如得年登􅀊稔此即可爲大瑞雖􅀗麟鳯亦何用爲墨子曰一榖不收謂之饉二榖不收謂之旱三榖不収謂之凶四榖不收謂之五榖不收謂之饑饉則大夫以下損禄五分之一旱則三凶則四饑則盡禄廪食而己孔叢子曰魏王問子愼曰寡人}
  - {type: variant, offset: 121, length: 0, content: '', SBCK: 昔上天神異后稷而爲之下嘉穀周遂以興住中山之地無故有榖非人所爲云天雨之反以亡國何荅曰天雖至神自古及今未聞其下榖與人也詩美后稷能大教民種善榖以利天下所謂稷降播種農殖嘉榖其義一也􅀂中山之榖妖怪之事非所謂天祥也管子曰常山之東河汝之間早生而晚殺五榖之所蕃熟也陳子要言曰食榖而鄙田衣帛而􅀏􅁞是惑也范子計然曰五榖者萬民之命國之重寳也是故無道之君及無道之臣皆不能積其盛有餘之時以待其衰不足星經曰八榖八星在五車北主􅁰稷稻粱麻麥烏麻星明俱熟師曠曰杏多實不蟲者來年秋喜五榖之先欲知五榖但視五木擇其木盛者來年益種之京房五星占曰五榖俱傷何君無德也京房易逆刺曰天雨榖歳大熟淮南子曰木勝土土勝水水勝火火勝金金勝水故禾春生秋死禾木也木}
  - {type: page-break, offset: 121, content: '', id: KR3k0012_SBCK_837-5b}
  - {type: variant, offset: 122, length: 1, content: 貪, SBCK: 而生金王而死也菽夏生冬死菽火也火王而生水王而死也麥秋生夏死麥金也金王而生火王而死也薺冬生仲夏死薺水也水王而生土王而死也又曰稷墾草發甾糞土樹榖使五榖之五種各得冝因地之勢也又曰女夷鼔歌女夷天帝之女下司時和春陽喜樂鼔歌也以司天和以長百穀禽獸草木孟夏之月以享穀夲雄鳩長榖爲帝􅃸􅀊雄鳩養長榖之鳥也金樓子曰鬻官者欲民之死蓄榖者欲歳之飢船漏水入囊洞内虚也􅀃苑曰楚魏㑹於晉陽將以伐齊王患之使人召淳于髠曰楚魏謀欲伐齊}
