  - {type: variant, offset: 2663, length: 374, content: 家之言又善屬文詞論清美渭濱弟子扶風馬融沛國桓驎等自遠方至十餘人既通古今而性溫敏不恥下問故學者宗之常慕其先人之高遂隱於南山之陰初馬融始從恂受業恂愛其才因以女妻之融後果為大儒文冠當世以是服恂之知人永和中和帝博求名儒公卿薦恂行侔曾閔學擬仲舒文參長卿才同賈誼實瑚璉器也宜在宗廟為國真輔由是公車徵不詣大將軍竇憲舉賢良不就清名顯於世以壽終三輔稱焉又曰姜歧字子平漢陽上郡人也少失父獨與母兄居治書易春秋恬居守道名重西州延熹中沛國橋玄為漢陽太守召歧欲以為功曹歧稱疾不就玄怒勑督郵尹益收歧若實不起者欲嫁其母而後殺歧益爭之玄怒益撾之益得杖且諫曰歧少修學孝義栖遲衡廬鄉里歸仁名宣州里實無罪杖益敢以死守之玄心乃止歧於是高名逾廣及母死喪禮畢盡讓平水田與兄岑遂隱以畜蜂豕為事教授者滿於天下營業者三百餘人辟州從事不詣民從而居之者數千家後舉賢良公府辟以為茂才為蒲阪令皆不就以壽終於家, WYG: 九}
