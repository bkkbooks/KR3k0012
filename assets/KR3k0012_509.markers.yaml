  - {type: variant, offset: 1045, length: 18, content: 經行高於南州桓帝時汝南陳蕃為豫章太守, SBCK: 告弟子乎容曰將語子過故郷而下車知之乎老子曰非謂不忘故耶容曰過喬木而趍知之乎老子曰非謂其敬老耶容張口曰吾舌存乎曰存曰吾齒存乎曰亡知之乎老子曰非謂其剛亡而弱存乎容曰嘻天下事盡矣又曰􅀜令尹喜周大夫也善内學星辰服食老子西遊喜先見氣物色遮之果得老子老子爲著書}
  - {type: variant, offset: 1045, length: 136, content: 經行高於南州桓帝時汝南陳蕃為豫章太守因惟薦稚於朝廷由是三舉孝廉賢良皆不就連辟公府不詣未嘗荅命公薨輒身自赴弔太守黃瓊亦嘗辟稚至瓊薨歸葬江夏稚既聞即負笈徒步豫章三十餘里夏瓊墓前致酹而哭之後公車三徵不就以壽終又曰夏馥字子治陳留圉人也少為諸生質直不茍動必依道同縣高儉及蔡氏凡二家豪, WYG: ''}
