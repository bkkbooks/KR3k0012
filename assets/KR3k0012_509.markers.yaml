  - {type: variant, offset: 650, length: 361, content: 春秋教授隱身不仕龐參為漢陽太守就家候棠以薤一本水一盆置戶屏前自抱孫兒伏戶下參曰棠是欲諭太守也水欲太守清也拔一本薤欲太守擊強宗也抱孫兒當戶者欲太守開門恤孤也終參去不言詔徵不至及卒鄉人圖畫其形至今稱任徵君也又曰張仲蔚平陵人與同郡魏景卿俱修道德隱身不仕明天官博物善屬詩賦所處蓬蒿沒人閉門養性不治榮名時人莫識惟劉龔知之又曰高恢字伯遠少治老子經恬虛不營世務與梁鴻善隱於華陰山又曰姜肱字伯淮彭城廣戚人也家世名族肱兄弟三人皆孝行著肱年㝡長與二弟仲海季江同被臥甚相親友及長各娶兄弟相愛不能相離習學五經兼明星緯弟子自遠方至者三千餘人聲重於時凡一舉孝廉十辟公府九舉有道至孝賢良公車三徵皆不就仲季亦不應徵辟建甯三年靈帝詔徵為犍為太守肱得詔乃告其友曰吾以為虛獲實遂藉聲價盛明之世尚不委質況今政在私門哉乃隱遯命乘舡浮海使者追之不及再以玄纁聘不就即拜, SBCK: 爲}
