  - {type: variant, offset: 759, length: 0, content: '', WYG: 之士豈若從避世之士哉耰而不輟子路以告孔子孔子憮然曰鳥獸不可}
  - {type: variant, offset: 761, length: 5, content: 郡魏景卿俱, WYG: 羣吾非斯人之徒歟又曰荷蓧丈人不知何許人也子路從而後問曰子見夫子乎丈人曰四體不勤五榖不分孰為夫子植其杖而耘子路行以告子曰隐者也使子路反見之至則行矣又曰顔闔者魯人也魯君聞其賢以幣聘焉闔方服布衣自飲牛使者問曰此顔闔家耶曰然使者致幣闔曰恐聽誤而遺使者羞使者反復來求之闔乃鑿坯而遁又曰市南宜僚楚人也姓熊白公為亂使石乞告之不從承以劔而僚弄丸不輟魯侯問曰吾學先生之道勤而行之然不免於憂患何也僚曰君今能刳形洗心而遊無人之野則無憂矣又曰太公任者陳人孔子圍陳七日不火食太公往弔之曰子㡬死乎夫直木先伐甘井先竭子其飾智以矜愚}
  - {type: page-break, offset: 761, content: '', id: KR3k0012_WYG_509-7b, image: WYG0897/WYG0897-0561b.png}
  - {type: page-break, offset: 761, content: '', id: KR3k0012_WYG_509-8a, image: WYG0897/WYG0897-0561c.png}
  - {type: variant, offset: 767, length: 3, content: 道德隱, WYG: 身以明汙昭昭如揭日月而行故汝不免於患也孰能削迹捐勢不為功名者哉無責於人人亦無責焉孔子曰善辭其交遊巡於大澤入獸不亂羣而况人也又曰漢隂丈人者楚人也子貢適楚見丈人為圃入井抱甕而灌用力甚多子貢曰有機於此後重前輕曰桔橰用力寡而見功多丈人作色曰聞之吾師有機事者必有機心機心存於胸則純白不備子貢愕然慙不對有間丈人曰子奚為曰孔丘之徒也丈人曰子非博學以疑聖知獨絃歌以買聲名於天下者乎方且亡汝神氣墮汝形體何暇治天下乎子往矣勿妨吾事又曰延陵季子名札呉王之子最少而賢使上國還㑹闔閭使專諸刺殺王僚致國於札札不受去之延陵終}
