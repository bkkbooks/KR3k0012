  - {type: variant, offset: 1507, length: 391, content: 不加哀矜醜善其言乃為讞減死論人稱之及父母卒蟠思慕不飲酒食肉十餘年遂隱居學治京氏易嚴氏春秋小戴禮三業先通因博貫五經兼明圖緯學無常師始與濟陰王子居在太學子居病困以身託蟠蟠即步負其喪至濟陰遇司隸從事於河鞏之間從事義之為符傳護送蟠蟠不肯投傳於地而去事畢還家前後凡一察蒲車特徵皆不就年七十四以壽終又曰郭泰字林宗太原人也少事父母以孝聞身長八尺餘家貧郡縣欲以為吏歎曰大夫何能執鞭斗筲哉乃辭母與同郡宗仲至京師從屈伯彥學春秋博洽無不通又審於人物由是名著於陳梁之間步行遇雨巾一角蟄眾人慕之皆折巾角士爭往從之載策盈車凡泰知之於無名之中六十餘人皆先言後驗以母喪歸徐稚來吊以生芻一束頓泰廬前而去泰曰南州高士徐孺子也詩曰生芻一束其人如玉吾不堪此喻後辟司徒府有道徵皆不就又曰袁閎字夏甫汝南人也築室於庭中閉門不見客旦於室中向母拜雖子往不得見也子亦向戶拜而去首不著巾身無單衣足著木履母死不列服位公車再徵不詣范滂美而稱, SBCK: 過}
