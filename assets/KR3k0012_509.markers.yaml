  - {type: variant, offset: 395, length: 236, content: 道德深重常宗師焉望之不以見敬為高愈自損退為巫醫於民間著老子章句故老氏有安丘之學扶風耿況王伋等皆師事之從受老子終身不仕道家宗焉又曰丘訢字季春扶風人也少有大材傲世不能與俗人為群郡召始見曰明府欲臣訢耶交訢耶師訢耶明府所以尊寵人者極於功曹所以榮祿人者已於孝廉一極一已皆訢所不用也府君異之遂不敢屈三輔決錄曰丘訢傲俗自謂無伍又曰荀靖字叔慈父淑有名績靖兄弟八人號曰八龍靖至孝闔門悌睦隱身脩道弟爽字慈明亦有材學汝南許章稱二人皆玉也慈明外朗叔慈內潤太尉辟不就及終頴陽令丘禎號靖曰玄行先生頴川, SBCK: 友邴原渉海依遼東}
