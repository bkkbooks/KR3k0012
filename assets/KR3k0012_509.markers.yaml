  - {type: variant, offset: 753, length: 1, content: 張, WYG: 榮啟期者不知何許人也披裘帶索鼓琴而歌孔子曰先生何樂也對曰天生萬物唯人為貴吾得為人是一樂也以男為貴吾得為男二樂也人生有不免於襁褓吾年九十五矣是三樂也貧者士之常死者民之終居常以待終何不樂也又曰長沮桀溺者不知何許人也耦而耕孔子過之使子路問津焉長沮曰夫執輿者是誰子路曰是孔子是魯孔丘歟曰是也是知津矣問於桀溺桀溺曰子為誰曰}
