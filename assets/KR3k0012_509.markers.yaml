  - {type: variant, offset: 1018, length: 0, content: '', SBCK: 應􅀽紹之命武帝亦辟昭昭自陳夲志帝曰人各有志出處不同勉卒髙尚義不相屈昭乃隱陸渾山中又曰焦先字孝然丗莫知其所出或言生漢末及魏}
