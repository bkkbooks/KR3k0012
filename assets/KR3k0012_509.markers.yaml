  - {type: variant, offset: 2289, length: 6, content: 十五失父母家, krp: 乃見}
  - {type: variant, offset: 2291, length: 371, content: 失父母家於穀城陬中孝慕甚篤陬中化之少長有禮勝之每行見老人檐負輒以身代之獵得禽獸嘗分肉與有親者貧依姊居數歲乃至長安受易通明以信義見稱從兄裒為東平內史遣吏召之勝之曰眾人所樂者非勝之願也乃去遊太原從郇越牧羊以琴書自娛丞相孔光聞而就太原辟之不至元始三年病卒于太原又曰東海隱者漢故司直王良友人建武中良以清節徵用歷位至一年復徵還見友不肯見而讓之曰不有忠信奇謀而取大位自知無德曷為致此而復遽玄何往來屑屑不憚煩也遂距良終不納論者高之又曰韓順字子良天水成紀人也以經行清白辟州宰不就王莽未隱於南山地黃四年漢兵起於南陽順同縣隗囂等起兵自稱上將軍西州大震唯順脩道山居執操不迴囂以道術深遠使人齎璧帛車辭厚禮聘順欲以為師順因使謝囂曰禮有來學義無往教即欲相師但入深山來囂聞矍然不敢強屈其後囂等諸姓皆滅唯順山栖安然以貧潔自終焉又曰擊恂字季直伯陵之十二世孫也明禮易遂治五經博通, WYG: ''}
