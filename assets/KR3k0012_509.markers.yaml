  - {type: variant, offset: 1019, length: 3, content: 詔名振, SBCK: 禪常結草爲廬於河之湄獨止其中冬夏􅃝不着衣卧不設席又無草蓐以身親土其體垢汙皆如泥滓不行人間或數日一食行不由邪徑目不與女子迕視口未甞言雖有驚急不與人語後野火燒其廬先因露􅃦遭冬雪大至先􅃝卧不移人以爲死就視如故後百餘􅀊卒􅄞康髙士傳曰子州友父者堯舜各以}
