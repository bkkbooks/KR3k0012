  - {type: variant, offset: 1043, length: 0, content: '', SBCK: 唐虞時爲諸侯至禹復去而耕禹徃趍而問曰昔堯治天下吾子立爲諸侯堯授舜舜授予吾子去而耕敢問其故何耶子髙曰昔尭治天下至公無私不賞而民勸不罰而民畏今子賞而不勸罰而不畏德自此衰刑自此作夫子盍行無留吾事偘偘然遂復耕而不顧又曰卞隨務光者不知何許人湯將伐桀因卞隨而謀曰非吾事也湯遂伐桀以天下讓隨隨曰后之伐桀謀於我必以我爲賊也而又讓我必以我爲貪也吾不忍聞乃自投桐水又讓務光光曰廢上非義殺民非仁無道之丗不踐其土况於尊我哉乃抱石而沉廬水又曰小臣稷者齊人抗厲希古桓公三徃而不得見公曰吾聞士不輕爵禄無以易萬乗之主萬乗之主不好仁義無以下布衣之士於是五徃乃得見焉又曰亥唐晉人也髙恪寡素晉國憚之雖􅂼食菜羹平公毎爲之欣飽公與亥唐坐有間亥唐出叔向入平公伸一足曰吾向時與亥子坐腓痛足痺不敢伸叔向悖然作色不恱公曰子欲貴乎吾爵子子欲冨乎吾禄子夫亥先生乃無欲也吾非正坐無以飬之子何不恱哉又曰㳙子齊人餌术接食甚精至三百年後釣於河澤得鯉魚中符後隱於宕石山能致風雨告伯陽九仙法淮南王}
