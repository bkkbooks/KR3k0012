  - {type: variant, offset: 1182, length: 1040, content: 郡人畏事之唯馥閉門不與高蔡通桓帝即位災異數發詔百司舉直言之士各一人太尉趙戒舉馥不詣遂隱身久之靈帝即位中常侍曹節等專朝禁錮善士謂之黨人馥雖不交官然聲名為節等所憚遂以汝南范滂山陽張儉等數百人並為節所誣悉在黨中詔下郡縣各捕以為黨魁馥於是頓足而歎曰孽自己作空汙良善一人逃死禍及百家何以生為乃剪鬚變服易形改姓入相慮山中為冶工客作形貌毀悴積傭三年而無知者後詔悉放儉等皆出馥獨歎曰以為人所棄不宜復齒鄉里矣留賃作不歸家人求不知所處其後人有識其聲者以告同郡上黨太守濮陽潛潛使人以車迎馥馥自匿不肯見潛車三返乃得馥又曰申屠蟠字子龍陳留外黃人也少有名節同縣大女雖玉為父報仇外黃令梁醜欲論殺玉蟠時年十五為書生進諫曰玉之節義足以感無恥之孫激忍辱之子不遭明時尚當追旌廬表況在清聽而不加哀矜醜善其言乃為讞減死論人稱之及父母卒蟠思慕不飲酒食肉十餘年遂隱居學治京氏易嚴氏春秋小戴禮三業先通因博貫五經兼明圖緯學無常師始與濟陰王子居在太學子居病困以身託蟠蟠即步負其喪至濟陰遇司隸從事於河鞏之間從事義之為符傳護送蟠蟠不肯投傳於地而去事畢還家前後凡一察蒲車特徵皆不就年七十四以壽終又曰郭泰字林宗太原人也少事父母以孝聞身長八尺餘家貧郡縣欲以為吏歎曰大夫何能執鞭斗筲哉乃辭母與同郡宗仲至京師從屈伯彥學春秋博洽無不通又審於人物由是名著於陳梁之間步行遇雨巾一角蟄眾人慕之皆折巾角士爭往從之載策盈車凡泰知之於無名之中六十餘人皆先言後驗以母喪歸徐稚來吊以生芻一束頓泰廬前而去泰曰南州高士徐孺子也詩曰生芻一束其人如玉吾不堪此喻後辟司徒府有道徵皆不就又曰袁閎字夏甫汝南人也築室於庭中閉門不見客旦於室中向母拜雖子往不得見也子亦向戶拜而去首不著巾身無單衣足著木履母死不列服位公車再徵不詣范滂美而稱之曰隱不違親身不絕俗可謂至賢也又曰牛牢字君直世祖為布衣時與牢遊夜講訖共言讖劉秀當為天子世祖曰安知非我萬一各言爾志牢獨默然世祖問之牢曰丈夫立義不與帝友眾大笑及世祖即位徵牢稱疾不至詔曰朕幼交牛君直清高士也恒有疾州郡之官者常先到家致意焉刺史郡守是以每輒奉詔就家存問牢恒被髮稱疾不荅詔命又曰成公者成帝時自隱姓名嘗誦經不交世利時人號曰成公成帝時出遊問之成公不屈節上曰朕能富貴人能殺人子何逆朕哉成公曰陛下能貴人臣能不受陛下之官陛下能富人臣能不受陛下之祿陛下能殺人臣能不犯陛下之法上不能折使郎二人就受政事十二篇又曰彭城老父者楚之隱人也見漢室衰乃自隱修道不治名利至年九十餘王莽時徵故光祿大夫龔勝欲為太子師友祭酒恥事二姓莽迫之勝遂不食而死莽使者及郡守已下會斂者數百人, WYG: ''}
