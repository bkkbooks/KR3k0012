  - {type: variant, offset: 629, length: 4, content: 頴川太守, WYG: 無遺教以告弟子商容曰將語子過故鄉而下車知之乎老子曰非謂不忘故耶容曰過喬木而趨知之乎老子曰非謂其敬老耶容張口曰吾舌存乎曰存吾齒存乎曰亡知之乎老子曰非為其剛亡而弱存乎容曰嘻天下事盡矣又曰闗令尹喜州大夫也善内學星辰服食老子西遊喜先見氣物色􅃒之果得老子老子為著書因與老子俱之流沙西服巨勝實莫知所終又曰康市子者聖人之無欲者也見人爭財而訟推千金之璧於旁而訟者息又曰狂接輿楚人也耕而食楚}
