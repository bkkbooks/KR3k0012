  - {type: variant, offset: 318, length: 0, content: '', krp: 騎前問蕃在所荅云在後顯之旣至後不見蕃而見軍人擔鼓排戰具又遥見江津船艦巳𬒳焚燒煙熖張天而鼓嚴之聲甚盛如其非蕃上便躍馬馳去告毅外有大軍似從下上垂已至城江津船悉𬒳火燒矣行命閇諸城門鎭惡亦馳進軍人縁城得入門猶未及下關因得開大城東門入城内毅凡有八隊餘已得戒嚴蒯思入東門便北廽擊射堂前軍攻金城東門鎭惡入東門便直西擊金城西門軍分攻金城南門毅金城内東從舊將士猶有六隊千餘人食時就關中晡西入退散及歸降略盡鎭惡入城便因風放火燒大城南門及東門又遣人以詔及文并髙祖手書凢三篋示毅皆燒不視金城内亦未信𥙿自來鎭惡至軍門人與毅東來將士或有是父兄子弟中表親者鎭惡命因闘且共語衆並知劉𥙿自來人情離懈一更許聽事前陣散潰毅左右兵猶閇東西閣拒戰鎭惡恐慮夜暗自相傷犯乃引軍出繞金城開其南面以退毅慮南有伏兵三更中率左右三百許人開北門突出城於佛寺自縊}
