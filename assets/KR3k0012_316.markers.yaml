  - {type: variant, offset: 322, length: 1, content: 琳, krp: 伏羅督髙平源州諸軍討吐谷渾慕利延軍至樂都謂諸將曰若從大道恐軍聲先振必當逺遁若潜軍出其非意此鄧艾擒蜀之計也諸將咸難之伏羅曰夫將軍制勝萬里擇利專之可也遂間道行至大母橋利延衆驚奔白蘭慕利延兄子拾寅走河曲降其一萬餘落又曰陸俟代人也長安盧永劉超等聚黨以叛丗祖詔俟以夲官鎭長安使以方略定之於是俟單馬之鎭超聞之欣然以爲無能爲也旣申揚威信示以成敗誘納超女外若姻親超猶自驚𥘉無降意俟乃率其帳下徃見超觀其舉措超使人逆曰三百人以外適當以弓馬相待三百以内當以酒食相供乃將三百騎詣超超設備甚嚴俟遂縱酒以盡醉而返後謂將士曰超可取乃宻選精兵五百人激厲之言至懇切士卒荅曰以死從公必無二也遂僞獵詣超與士卒約曰今㑹發機以當醉爲限俟於是詐醉上馬大呼手斬超將士皆應聲縱擊遂平之丗祖大恱徴還轉外都大官又曰魏使蕭寳寅伐梁堰淮水濫溢將爲楊徐之患寅於堰上流鑿新渠引注淮澤乃遣將士千餘夜渡淮燒其營聚破賊斬其將軍而還又曰慕容白曜南征宋以酈範爲副}
  - {type: variant, offset: 324, length: 0, content: '', SBCK: 次無鹽宋將申纂慿城拒守議者僉以攻具未周不冝便進範曰今輕軍逺襲深入敵境無冝淹留乆稽機候且纂必以我軍來速不在攻守謂方城可慿弱卒可恃今􅀂外潜威形内整戎旅宻厲將士出其不意可一攻而尅之白曜遂潜軍僞退示以不攻纂果不設備於是即夜部分晨便騰城崇朝而剋又曰幽州刺史劉靈助以莊帝􅀍爾朱兆所弑遂舉}
  - {type: variant, offset: 324, length: 0, content: '', WYG: 次無鹽宋將申纂慿城拒守議者僉以攻具未周不宜便進範曰今輕軍逺襲深入敵境無宜淹留久稽機候且纂必以我軍來速不去攻守謂方城可憑弱卒可恃今若外􅅗威形内整戎旅宻厲将士出其不意可一攻而剋之白曜遂􅅗軍偽退示以不攻纂果不設備于是即夜部分晨便騰城崇朝而剋又曰幽州刺史劉靈助以莊帝被爾朱兆所弑遂舉}
  - {type: variant, offset: 324, length: 0, content: '', krp: 次無鹽宋將申纂慿城拒守議者僉以攻具未周不冝便進範曰今輕軍逺襲深入敵境無冝淹留乆稽機候且纂必以我軍來速不在攻守謂方城可慿弱卒可恃今若外潜威形内整戎旅宻厲將士出其不意可一攻而尅之白曜遂潜軍僞退示以不攻纂果不設備於是即夜部分晨便騰城崇朝而剋又曰幽州刺史劉靈助以莊帝𬒳爾朱兆所弑遂舉}
  - {type: variant, offset: 325, length: 1, content: 東, SBCK: 唱義諸州豪右咸相通結靈助屯於定州之安固兆遣將叱列延慶討之諸將謂延慶曰靈助善於卜占百姓信惑所在響應未易可圗􅀂万一戰有利鈍則大事去矣􅀂未還師西入據􅀜拒嶮以待其變延慶曰劉靈助庸人也天道深逺豈其所識大兵一臨彼皆恃其妖術坐看符猒寜肯勠力致死與吾爭勝􅀒哉如吾計者欲出城營外詭言西歸靈助聞之必信而自寛潜軍徃襲可一舉而擒乃出頓城西聲云將還簡精􅀐一千夜發詰朝造靈助壘戰於城北遂破􅀍擒之又曰宕昌羌獠甘作亂逐其王彌定魏遣將史寧討破之甘將百􅀐走投生羌鞏㢘王彌定遂得復位寧以未獲獠甘宻欲圖之乃􅀭聲欲還獠甘聞之復招引叛羌依山起柵欲攻彌定寧謂諸將曰此羌人入吾術中當進兵擒之耳諸將思歸咸曰羌之聚散無常依據山谷今􅀂追討恐引日無成且彌定還得守藩將軍功巳立矣獠甘􅀔弱定能制之此還軍䇿之上者寧曰一日縱敵數丗之患豈可捨垂滅之㓂更煩再舉人臣之禮知無不爲此觀諸軍不足與計事也如更沮衆寧豈不能斬諸將遂進軍獠甘衆亦至與戰大破之生擒獠甘并鞏廉王後周書曰劉亮􅀄從賀㧞岳西征常先鋒䧟陣以功拜大都督及岳􅀍害亮與諸將謀迎太祖􅃎州刺史孫定兒據州不}
