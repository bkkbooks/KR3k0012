  - {type: variant, offset: 670, length: 209, content: 世世以洴澼絖為事不過數金一朝而鬻伎百金請與之客得之以說吳王越有難吳王使之將冬與越人水戰大敗越人裂地而封能不龜手一也阮元瑜為曹公與孫權書曰若恃水戰臨江塞要欲令王師終不得渡亦未必也孫子荊為石仲恭與孫皓書曰自頃國家整治器械修造舟楫簡習水戰掩襲上白虎通曰襲者何謂行不假塗掩人不備也人銜枚馬纏勒晝伏夜行為襲也左傳曰凡師有鐘鼓曰伐無曰侵輕曰襲又曰初周人與范氏田公孫厖稅焉趙氏得而獻之吏請殺之趙孟曰為其主也何罪止而與之田及鐵之戰以徒, SBCK: 愬道分}
