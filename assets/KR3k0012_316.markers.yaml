  - {type: variant, offset: 2182, length: 1190, content: 月艾自陰平行無人之地七百餘里鑿山通道造作橋閣山高谷深至為艱嶮又糧運將匱頻於危殆艾以氈自裹推轉而下將士皆攀木緣崖魚貫而進先登至江油蜀守將馬邈降諸葛瞻自涪還綿竹列陣相拒大破之斬贍及尚書張遵等首進軍至成都蜀主劉禪面縛輿襯櫬詣軍門降又曰楊阜字義山天水蓽人也韋康以為別駕馬超率萬餘人攻冀城阜率國士大夫及宗族子弟勝兵千餘人使弟岳於城上作偃月營與超接戰自正月至八月拒守而救兵不至超入拘岳於冀殺刺史太守阜內有報超之志而未得其便外兄姜敘屯歷城阜少長敘家見敘母說前在冀中時事歔欷悲甚敘曰何乃爾阜曰守臣不能見君亡不能死亦何面目以視息天下乎時敘母慨然勑從阜計超聞阜等兵起自將出襲歷城得敘母罵之曰若背父之逆子弒君桀賊天地豈久容敢以面目視人乎超怒殺之阜與戰身被五瘡宗族昆季死者七人吳志曰蜀將關羽遣麋芳守南郡羽領兵圍樊吳主遣將呂蒙屯陸口外倍脩恩厚與關羽結好羽多留兵備南郡恐蒙有變蒙上疏曰羽計樊而多留備兵必恐蒙圖其後故也蒙常有病乞分眾還建業以理病為名羽聞之必徹備徐以大軍泝江馳上襲其空虛則南郡可不戰而羽易擒耳吳主然之蒙遂稱病而還建業羽果稍徹備而悉眾赴樊城蒙遂發兵逆流而上伏甲於舟使更衣為啇人以理征棹達𥌓兼行過羽所置屯戍輒縛之羽遂失驚師次于南郡襲奪其城羽吏士攻樊城未下聞城以陷而家屬無恙見待甚於平時無復鬥心稍稍散羽竟為吳師所擒荊州遂平又曰建安二十四年關羽圍曹仁於襄陽曹公遣左將軍于禁救之會漢水暴起羽以舟兵盡生虜禁等步騎三萬送江陵唯城未拔權內憚羽外欲以為己功淺與曹公乞討羽自効權征羽先遣呂蒙襲公安獲將軍士仁蒙到南郡太守糜芳以城降蒙據江陵撫其老弱釋于禁之囚晉書曰王如京兆人也初為州武吏遇亂流移至宛時諸流人有詔並遣還鄉如等以關中荒殘不願歸征南將軍山簡南中郎將杜蕤各遣兵送之而促期令發如遂潛結無賴少年夜襲二軍大破之又陷攻襄城於是流人諸郡各率其黨攻諸城鎮多殺令長以應之未幾眾四五萬號大將軍後如連年種穀皆化為莠軍中大飢又曰石勒遣其將石良率精兵五千襲李矩矩逆擊不利郭誦弟元復為賊所執遣元以書說矩曰去東平曹嶷西平猗廬矩如牛角何不歸命矩以示誦誦曰昔王陵父母在賊猶不改意弟當何論勒復遺誦塵尾馬鞭以示殷勤誦不荅又曰張駿為涼州牧咸和初駿遣武威太守竇濤金城太守張閬武興太守辛巖揚烈將軍宋輯等率眾來會韓璞攻討秦州諸郡劉曜遣其將劉胤來拒屯于狄道城韓璞進渡沃于嶺辛巖曰我握眾數萬籍氐羌之銳宜速戰以滅之不可以久久則變生璞曰自夏末以來太白犯月辰逆行白虹貫日皆變之大者不可以輕動輕動而不捷為禍更深吾將久而斃之且躍與石勒相攻胤亦不能久也積十七日軍糧竭遣辛巖督於金城胤聞之大悅謂其將士曰韓璞之眾十倍於吾羌胡皆叛不為之用吾糧廩將懸難以持久今虜分兵運糧可謂天授吾也若敗辛巖璞等自潰彼眾我寡宜以死戰戰而不捷當無疋馬得還宜厲爾戈矛竭汝智力眾咸奮於是率騎二千襲巖于沃于嶺敗之璞軍遂潰死者二萬餘人面縛歸罪駿曰孤之罪也將軍何辱皆赦之王隱晉書曰祖逖軍大飢進據食犬丘城樊雅遣, WYG: ''}
