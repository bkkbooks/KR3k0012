  - {type: variant, offset: 575, length: 2, content: 越絕, WYG: 諸將以為然安率衆先鋒大破陳師高祖嘉之詔書勞曰陳賊之意自然水戰為長險隘之間彌謂官軍所憚開府親將所部夜動舟師摧破賊徒生擒虜衆益官軍之氣破賊人之膽副朕所委聞之忻然以位上大將軍又曰李宻擊宇文化及精兵良將多有死傷王充在東都乗其弊而擊之率步騎二萬營于洛南李宻軍于偃師北充􅅗遣二百騎夜伏於邙山自統其衆遲明渡水人奔馬馳以襲宻營宻遽出兵拒之陣未成列兩軍已合伏兵於北山中乗髙而下馳入宻營燒其廬舍宻見營中火發因而遁走又曰煬帝末年羣盜起遣將張湏陁擊盧明月於下邳賊連營十餘萬湏陁纔萬人力勢不敵去賊六七里立柵相持經十餘日糧盡退謂將士曰賊見兵却必輕來追我其衆若出營内即虛欲以千人襲營可有大利此乗危險誰能去者人皆莫對唯秦叔寳與羅士信皆曰願行於是湏陁委柵而遁使二人分領千兵漸伏於草既而明月悉兵追之叔寳士信馳至其柵柵門閉不得入二人起升其樓㧞賊幟各殺數人營中大亂叔寳斬關而納外兵因風縱火焚其營三十里烟焰漲天明月奔還湏陁反擊遂大破賊衆明月以數百騎遁去餘皆虜又曰李宻起兵于雍丘是時河南山東大水死者將半宻將李勣言於宻曰今人多阻饑若據得黎陽倉大事濟矣宻乃遣勣領麾下五千人自原武濟河掩襲即日剋之開倉資食一旬之間勝兵二十餘萬人唐}
