  - {type: variant, offset: 2366, length: 262, content: 拘岳於冀殺刺史太守阜內有報超之志而未得其便外兄姜敘屯歷城阜少長敘家見敘母說前在冀中時事歔欷悲甚敘曰何乃爾阜曰守臣不能見君亡不能死亦何面目以視息天下乎時敘母慨然勑從阜計超聞阜等兵起自將出襲歷城得敘母罵之曰若背父之逆子弒君桀賊天地豈久容敢以面目視人乎超怒殺之阜與戰身被五瘡宗族昆季死者七人吳志曰蜀將關羽遣麋芳守南郡羽領兵圍樊吳主遣將呂蒙屯陸口外倍脩恩厚與關羽結好羽多留兵備南郡恐蒙有變蒙上疏曰羽計樊而多留備兵必恐蒙圖其後故也蒙常有病乞分眾還建業以理病為名羽聞之必徹備徐以大軍泝江馳上襲其空虛則南郡可不戰而羽易擒耳吳主然之蒙遂稱病, SBCK: 京師放火燔諸門斬級}
