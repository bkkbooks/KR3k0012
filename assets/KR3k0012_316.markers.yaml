  - {type: variant, offset: 436, length: 4, content: 楊素伐陳, SBCK: 遂州獠反命將周法尚討之軍將至賊弃州城走散山谷間法尚捕不能得於是遣使慰諭以官號僞班師自行二十里軍再舎潜遣人覘之知其首領盡歸柵聚飲相賀法尚選歩􅀐數千人襲擊破之又曰李徹從元帥衛王爽擊突厥行軍㹅管李充言於爽曰周齊之丗有戰國中夏力分其來乆矣突厥毎侵邊諸將輙以全軍爲計莫能死戰由是突厥勝多敗少所以毎輕中國之師今者沙鉢略悉國内之衆屯據要險必輕我而無備精兵襲之可破也爽從之諸將多以爲疑唯徹􅅄成其計請以同行遂與充}
