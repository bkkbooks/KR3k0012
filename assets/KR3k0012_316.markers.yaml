  - {type: punctuation, offset: 321, content: 「, id: KR3k0012_CHANT_316-bkkpn81}
  - {type: variant, offset: 321, length: 0, content: '', SBCK: 侯景反䧟建業髙州刺史李遷仕據大臯圗逆召髙梁太守馮寳寳欲徃其妻沈氏止之曰刺史無故不合召太守此詐君欲爲反耳頃者京師危逼羽檄徴兵遍于郡縣刺史稱疾不赴繕甲治兵今巳備矣而更召君徃必見留追君兵衆此意可知矣魚不可脫於泉願且勿行遣使譎之曰身病篤謹遣妻傳意并送土物以省之彼聞喜必無防爲君取之如反掌矣寳從之於是沈氏自將千人皆藏短兵歩檐雜物唱言賝貨賝音琛先書報遷仕曰太守馮寳疾篤謹令妻沈氏傳啓并奉土貢以資軍費遷仕大恱出迎沈氏因釋檐出刃大破之遷仕脫身而遁沈氏入據其城盡収其衆後魏書曰晉}
  - {type: page-break, offset: 321, content: '', id: KR3k0012_SBCK_316-2b}
  - {type: variant, offset: 321, length: 0, content: '', WYG: 侯景反陷建業髙州刺史李遷仕據大臯圖逆召髙梁太守馮寳寳欲往其妻沈氏止之曰刺史無故不合召太守此詐君欲為反耳頃者京師見逼羽檄徴兵遍于郡縣刺史稱疾不赴繕甲治兵今已備矣而更召君往必見留追君兵衆此意可知矣魚不可脱于水願且勿行遣使譎之曰身疾篤謹遣妻傳意并送土物以省之彼聞喜必無防為君取之如反掌矣寳從之于是沈氏自將千人皆藏短兵步擔雜物倡言珍貨先書報遷仕曰太守馮寳疾篤謹令妻沈氏傳唘并奉土貢以資軍費遷仕大悦出迎沈氏因釋擔出刃大破之遷仕脱身而遁沈氏入據其城盡収其衆後魏書曰晉}
