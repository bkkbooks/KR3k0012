  - {type: variant, offset: 1528, length: 14, content: 縫革為船置於簞上以渡河簞本殘, SBCK: 可}
  - {type: variant, offset: 1528, length: 455, content: 縫革為船置於簞上以渡河簞本殘也音步佳反掩擊迷唐廬落大豪多所斬獲又曰馬援討諸羌引精兵聚北山上援陳軍向山而分遣數百騎繞襲其後乘夜放火擊鼓叫譟虜遂大潰凡斬首千餘級援以兵少不得窮追收其穀糧畜產而還又曹瞞傳曰公聞許攸來跣出迎攸勸公襲紹將公大喜乃選精銳步騎皆執袁軍旗幟銜枚縛馬口夜從間道出人把束薪所歷道問者語之曰袁公恐曹操鈔掠後軍還兵以益備問者信以為然既至圍屯大放火營中驚亂大破之盡燔其糧穀寶貨斬督將睢元晉等割得諸軍淳于仲簡鼻殺士卒千餘人皆取鼻牛馬割脣舌以示紹軍將士皆惶懼又曰曹公征張魯至陽平張魯使弟衛據陽平關橫山築城十餘里攻之不拔乃引軍還賊見大軍退其守備懈公乃密遣騎將等乘險夜襲大破之又曰廬江太守劉勳理明城今同安郡恃兵強士勇橫於江淮之間無出其右者孫策惡之時已有江左自領會稽太守使人卑辭厚幣而說之曰海昏上繚宗人數欺下國患之有年矣擊之路由不便幸因將軍之神武而臨之且上繚國富廩實吳姓越姬充於後庭明珠大貝被於帑藏帑他朗切取之可以資軍雖蜀郡成都金碧之府未能過也策願舉弊邑士卒以為外援勳然之劉曄諫曰上繚雖小而城堅池深守之則易攻之則難, WYG: 水}
  - {type: variant, offset: 1528, length: 14, content: 縫革為船置於簞上以渡河簞本殘, krp: 可}
