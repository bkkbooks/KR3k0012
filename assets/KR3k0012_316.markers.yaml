  - {type: variant, offset: 575, length: 2, content: 越絕, SBCK: 諸將以爲然安率衆先鋒大破陳師髙祖嘉之詔書勞曰陳賊之意自言水戰爲長險隘之間彌謂官軍所憚開府親將所部夜動舟師摧破賊徒生擒虜衆益官軍之氣破賊人之膽副朕所委聞以欣然進位上大將軍又曰李宻擊宇文化及精兵良將多有死傷王世充在東都乗其弊而擊之率歩􅀐二萬營於洛南李宻軍於偃師北世充潜遣二百􅀐夜伏於邙山自統其衆遲明渡水人奔馬馳以襲宻營遽出兵以拒之陣未成列兩軍已合伏兵於北山中乗髙而下馳入宻營燒其廬舎宻見營中火發因而遁走又曰煬帝末年群盗起遣將張須陁擊盧明月於下邳賊連營十餘萬須陁􅂊萬人力勢不敵去賊六七里立柵相持經十餘日糧盡欲退謂將士曰賊見兵却必輕來追我其衆􅀂出營内即虚欲以千人襲營可有大利此乗危險誰能去者人皆莫對唯秦叔寳與羅士信皆曰願行於是須陁委柵而遁使二人分領千兵潜伏於草莾旣而明月悉兵追之叔寳士信馳至其柵柵門閉不得入二人超昇其樓抜賊幟各殺數人營中大亂叔寳斬􅀜而納外兵因散縱火焚其三十餘柵煙熖漲天明月奔還須陁却逐之大破賊衆明月以數百􅀐遁去餘皆虜之又曰李宻起兵于雍丘是時河南山東大水死者將半宻將李勣言於宻曰今人多阻飢􅀂據得􅀺陽倉大事濟矣宻乃遣勣領麾下五千人自原武濟河掩襲即日剋之開倉恣食一旬之間勝兵二十餘萬人唐}
