  - {type: variant, offset: 2761, length: 388, content: 暴起羽以舟兵盡生虜禁等步騎三萬送江陵唯城未拔權內憚羽外欲以為己功淺與曹公乞討羽自効權征羽先遣呂蒙襲公安獲將軍士仁蒙到南郡太守糜芳以城降蒙據江陵撫其老弱釋于禁之囚晉書曰王如京兆人也初為州武吏遇亂流移至宛時諸流人有詔並遣還鄉如等以關中荒殘不願歸征南將軍山簡南中郎將杜蕤各遣兵送之而促期令發如遂潛結無賴少年夜襲二軍大破之又陷攻襄城於是流人諸郡各率其黨攻諸城鎮多殺令長以應之未幾眾四五萬號大將軍後如連年種穀皆化為莠軍中大飢又曰石勒遣其將石良率精兵五千襲李矩矩逆擊不利郭誦弟元復為賊所執遣元以書說矩曰去東平曹嶷西平猗廬矩如牛角何不歸命矩以示誦誦曰昔王陵父母在賊猶不改意弟當何論勒復遺誦塵尾馬鞭以示殷勤誦不荅又曰張駿為涼州牧咸和初駿遣武威太守竇濤金城太守張閬武興太守辛巖揚烈將軍宋輯等率眾來會韓璞攻討秦州諸郡劉曜遣其將劉胤來拒屯于狄道城韓璞進渡沃于嶺辛巖曰我握眾數萬籍氐羌之銳宜速戰以滅之, SBCK: ''}
