  - {type: variant, offset: 322, length: 1, content: 琳, WYG: 伏羅督髙平源州諸軍討吐谷渾慕利延軍至樂都謂諸將曰若從大道恐軍聲先振必當逺遁若􅅗軍出其非意此鄧艾擒蜀之計也諸將咸難之伏羅曰夫將軍制勝萬里擇利専之可也遂間道行至大母橋慕利延衆驚奔白蘭慕利延子拾寅走阿曲降其一萬餘落又曰陸俟代人也安定盧永劉超等聚黨以叛世祖詔俟以本官鎮長安使以方略㝎之于是俟單馬之鎮超聞之欣然以為無能為也既申揚威信示以成敗誘納超女外若姻親超猶自警初無降意俟乃率其帳下往見超觀其舉措超使人逆曰三百人以外當以弓馬相待三百人以内當以酒食相供乃將三百騎詣超超設備甚嚴俟遂縱酒盡醉而返後謂將士曰超可取也乃宻選精兵五百人激厲之言至懇切士卒答曰以死從公必無二也遂偽獵詣超與士卒約曰今㑹發機以當醉為限俟于是詐醉上馬大呼手斬超首將士皆應聲縱擊遂平之世祖大悦徴還轉外都大官又曰魏使蕭寳寅伐梁堰淮水濫溢將為揚徐之患寅于堰上流鑿新渠引注淮澤乃遣將士千餘人渡淮燒其營聚破賊斬其將軍而還又曰慕容白曜南征宋以酈範為副}
