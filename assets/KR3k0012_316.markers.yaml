  - {type: variant, offset: 322, length: 1, content: 琳, SBCK: 伏羅督髙平源州諸軍討吐谷渾慕利延軍至樂都謂諸將曰􅀂從大道恐軍聲先振必當逺遁􅀂潜軍出其非意此鄧艾擒蜀之計也諸將咸難之伏羅曰夫將軍制勝萬里擇利專之可也遂間道行至大母橋利延衆驚奔白蘭慕利延兄子拾寅走河曲降其一萬餘落又曰陸俟代人也長安盧永劉超等聚黨以叛丗祖詔俟以夲官鎭長安使以方略定之於是俟單馬之鎭超聞之欣然以爲無能爲也旣申􅀭威信示以成敗誘納超女外􅀂姻親超猶自驚􅀄無降意俟乃率其帳下徃見超觀其舉措超使人逆曰三百人以外適當以弓馬相待三百以内當以酒食相供乃將三百􅀐詣超超設備甚嚴俟遂縱酒以盡醉而返後謂將士曰超可取乃宻選精兵五百人激厲之言至懇切士卒荅曰以死從公必無二也遂僞獵詣超與士卒約曰今㑹發機以當醉爲限俟於是詐醉上馬大呼手斬超將士皆應聲縱擊遂平之丗祖大恱徴還轉外都大官又曰魏使蕭寳寅伐梁堰淮水濫溢將爲楊徐之患寅於堰上流鑿新渠引注淮澤乃遣將士千餘夜渡淮燒其營聚破賊斬其將軍而還又曰慕容白曜南征宋以酈範爲副}
