  - {type: variant, offset: 586, length: 1, content: 翼, SBCK: 非川將赴烏海仁貴謂待封曰烏海險逺車行艱澁􅀂引輜重將失事機又破賊即廻不煩轉運彼多瘴癘無冝乆留大非川嶺上寛平足堪置柵可留二萬人作兩柵輜重並留柵内吾等輕銳倍道掩其未整即撲滅之矣仁貴遂率衆先行至河口遇賊擊破斬之所獲甚衆収其牛羊萬餘頭又曰貞觀􅀄突厥頡利可汗牙於定襄時諸部離散代州道行軍揔管李靖選驍􅀐三千徑赴惡陽嶺出其不意擊之突利驚走靖遂収定襄之地頡利可汗懼退寳鐵山遣使入朝謝罪請舉國内附又命靖徃迎之頡利雖外請入朝猶持兩端待草青馬肥將踰沙磧其年太宗遣唐儉安脩仁徃頡利牙慰撫之靖揣知其意謂副將張公謹曰詔使到彼虜必自寛􅀂選精􅀐}
