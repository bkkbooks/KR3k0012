  - {type: variant, offset: 1646, length: 522, content: 精銳步騎皆執袁軍旗幟銜枚縛馬口夜從間道出人把束薪所歷道問者語之曰袁公恐曹操鈔掠後軍還兵以益備問者信以為然既至圍屯大放火營中驚亂大破之盡燔其糧穀寶貨斬督將睢元晉等割得諸軍淳于仲簡鼻殺士卒千餘人皆取鼻牛馬割脣舌以示紹軍將士皆惶懼又曰曹公征張魯至陽平張魯使弟衛據陽平關橫山築城十餘里攻之不拔乃引軍還賊見大軍退其守備懈公乃密遣騎將等乘險夜襲大破之又曰廬江太守劉勳理明城今同安郡恃兵強士勇橫於江淮之間無出其右者孫策惡之時已有江左自領會稽太守使人卑辭厚幣而說之曰海昏上繚宗人數欺下國患之有年矣擊之路由不便幸因將軍之神武而臨之且上繚國富廩實吳姓越姬充於後庭明珠大貝被於帑藏帑他朗切取之可以資軍雖蜀郡成都金碧之府未能過也策願舉弊邑士卒以為外援勳然之劉曄諫曰上繚雖小而城堅池深守之則易攻之則難不可旬月而拔也且見疲於外而國虛於內孫策多謀而善用兵乘虛襲我將何禦之而將軍進屈於敵退無所歸羝羊觸藩羸其角不能退不能進其在茲乎勳不從遂大興師伐上繚其廬江果為策所襲勳窮蹙遂奔曹公魏志曰遣將鐘會鄧艾伐蜀蜀將姜維守劍閣鐘會攻維未能拔艾上言請從陰平江由邪徑經漢德陽亭趣涪出劍閣西四百里去成都三百里奇兵衝其腹心劍閣之守必還赴涪則會方軌而進劍閣之士不還則應涪之兵寡矣軍志有之曰攻其不備出, SBCK: 驍徤乗}
