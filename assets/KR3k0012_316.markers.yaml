  - {type: variant, offset: 1077, length: 120, content: 祖也其北陵文王之所避風雨此道在二殺之間南谷中各深委曲兩山相嶔故可以避風雨古道由此魏武帝西討巴漢惡其險而更開北山高道也必死是間余收爾骨焉秦師遂東晉原軫曰秦違蹇叔而以貪勤人天奉我也奉與奉不可失敵不可縱縱敵患生違天不祥必伐秦師欒枝曰未報秦施而伐其, SBCK: 愬得元濟檻送京}
