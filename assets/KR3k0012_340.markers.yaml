  - {type: variant, offset: 908, length: 4, content: 金鼓鈇鉞, SBCK: 􅀛知氣兆之􅁻凶建之於後察度事冝之形兆也爾雅曰績廣充幅長㝷曰旐郭璞注曰帛全愊長八尺者也詩曰設此旐矣又曰建旐設旄薄獸干敖周宣王也周禮曰􅀛虵爲旐四斿縣鄙之所建也旞釋名曰全羽爲旞旞猶也順滑貌也一作旞􅀃文曰旞者導車所載全羽允允而進也周禮曰全羽爲旞道車所進車象路也王以朝夕燕出入也旌釋名曰折羽爲旌旌精光也綏有虞氏之旌也注旄竿首其形蘂蘂然也綏夏后氏之旌也其形襄也白斾殷旌也以帛繼旐末也翿陶也其皃陶陶下垂也爾雅曰旄首曰旌郭璞注曰戴旌於竿頭如令之幢亦有旄也廣雅曰天子之旌髙九仞諸侯七仞丈夫五仞士三仞詩曰孑孑干旌在浚之城又曰悠悠斾旌禮記曰前有水則載青旌鄭􅀇注曰載所謂舉於旌首}
