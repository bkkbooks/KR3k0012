  - {type: variant, offset: 1581, length: 525, content: 云但誦五兵名亦驗矣刀名大房虛星主之矢名防徨熒惑主之弓名曲張角星主之弩名遠望張星主之戟名大將參星主之臨戰時嘗細祝之或以五月五日作赤靈符著心前或丙午日日中作燕軍龍虎三囊符歲易之歲符歲易月符月易日符日易或佩西毒兵信符或佩南極鑠金符或取牡荊以作六陰神將符指敵人或以月蝕時刻三歲蟾蜍候下之有八字者血以書所將之刀劍或交鋒之際乘魁履剛呼四方之長亦有明効也魏文帝校獵賦曰抗冲天之素旄兮靡格擇之脩循旃雄戟趪音皇而躍厲兮黃鉞扈而楊鮮又曰千乘亂擾萬騎奔走經營原隰騰越峻岨彤弓斯彀戈鋋具舉徐幹齊都賦曰矢流鏑絓胡卦切張羅𥸢作合切飛鋋抱雄戈繆襲籍田賦曰靈旂蔚以燾奡兮雄戟偈以而嵯峨彎枉矢於狼狐兮建黃鉞於匏瓜繁欽征天山賦曰有漢丞相武平侯曹公杖節東征觀六軍於三江浮五湖以曜武左駢雄戟右攢干將彤弧朱矰舟羽絳房望之如火映奪朝陽應璩詩曰放戈釋甲冑乘軒入紫微從容待帷幄光輔日月暉崔駰安豊侯詩曰被兕甲兮跨良馬擇長戟兮彍強弩彍音霍曹植詩曰皇考建世業余從征四方櫛風而沐雨萬里蒙露霜劍戟不離手鎧甲為衣裳魏文帝董桃行曰晨背大河南轅跋涉遐路漫漫師徒百萬譁諠戈矛若林成山旌旗拂日蔽天應璩書曰左執屈盧之勁矛右秉干將之雄戟高冠拂雲長劍耿介簫管振音厥聲載路馮軾虎視清風震疊可謂堂堂乎難與並為仁也太白陰經曰工欲善, SBCK: ''}
