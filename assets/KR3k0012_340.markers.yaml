  - {type: variant, offset: 900, length: 1, content: 兵, SBCK: 凢國有難君自宫召將詔之曰社稷之命在將軍身今國有難願子將而應之將軍受命乃令祝史太卜齋三日之太廟鑚靈􅀛卜􅁻日以受鼓旗楚辭曰駕龍輈􅀆乗雷斬車轅也載雲旗􅀆逶迤又曰乗廻風􅀆載雲旗又曰楊彗星以爲旗又曰乗赤豹􅀆狐從文狸新夷車􅀆結旌桂旗宋玉髙唐賦曰眄􅀆􅀂妖姫楊􅃑鄣日而望所思忽􅀆􅀂駕駟馬建羽旗相如上林賦曰靡魚須之撓旃以魚須爲旃柄駈馳逐戰也曳明月之珠旗以明珠綴飾旃王沉餞行賦曰曵招揺之脩旗􅀂蜿虹之垂天崔駰東廵頌曰升九龍之華旗文選曰雲旗拂霓又曰牙紛繽又曰旌旗拂天又曰掲竿爲旗又曰曳彗星之飛旗又曰朱旗所拂九土破攘又曰朱旗降天又曰建祝姑祝姑旗名又曰青霞雜桂旗旟釋名曰鳥隼爲旟旟譽也軍吏所建也急疾趨事則有稱譽也爾雅曰錯}
