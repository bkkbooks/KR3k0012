  - {type: variant, offset: 4, length: 1, content: 敘, SBCK: 一常旂旃物旗􅒅旐旞旌常釋名曰九旗之名日月爲常􅀞日月於其端天子所建言常名也尚書君牙曰惟乃祖乃父丗篤忠貞服勞王家厥有成績紀于太常周禮曰日月爲常十二旒河圗曰風后曰予告汝帝之五旗東方法青龍曰旗南方法赤鳥曰鼠西方法白虎曰典北方法玄蛇曰旂中央法黄龍曰常國語曰呉王㑹晉於黄池呉王白常白旂赤常赤旗文選曰建辰旒之太常又曰建太常􅀆裶裶旂釋名曰交龍爲旂旂􅀝也􅀞作兩龍相依􅀝也通以一赤色爲之無文采諸侯所建也爾雅曰有鈴曰旂郭璞注曰懸鈴竿頭􅀞交龍於旒詩曰王錫韓侯淑旗綏章龍旂陽陽和鈴央央又曰旂旐央央禮記月令曰天子春載青旂夏載赤旂秋載白旂冬載􅀇旂周禮曰交龍爲九旂諸侯所建左傳曰周分魯大路大旂又曰三辰旂旗昭其明也三辰日月星也旃釋名曰旃戰也戰戰恭巳而巳三􅀌所建象無事也􅀃文曰旃曲柄也所以招士衆也丗本曰黄帝作旃爾雅曰因章曰旃郭璞曰以白練爲疏因其文章不復畫也周禮曰通帛爲旃大赤也周正赤無斿飾􅀌所建也左傳曰城濮之戰亡大斾之左旃旃旗名繫旐曰旃祁暪奸命當此之事而不治為奸軍令也司馬殺之以殉于諸侯漢書曰田蚡音憤前堂羅鍾鼓立曲旃如淳曰通白爲旃蘇休曰柄上曲也孟子曰招庶人以旃田也西京賦曰虹旃蜺旄又曰樹脩旃上林賦曰立歴天之旂曳梢星之旃物釋名曰雜帛爲物以雜色綴其邊爲翅尾也將帥之所建也禮含文嘉曰制度爲科物應以冝明物以􅀋感其方也左傳曰蔿敖爲􅌠擇楚之令典軍行右轅左追蓐右者侠爲軍備左者追草爲􅀫備前茅慮無如今斥候持綘及白幡見騎賊舉綘幡見歩賊舉白幡備不虞有無茅明也或以云楚以茅爲旌熾也中權後勁中軍制謀後以精}
