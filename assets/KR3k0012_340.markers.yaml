  - {type: variant, offset: 28, length: 4, content: 五兵五兵, SBCK: 九旗之物名各有属以侍國事日月爲常交龍爲旂通帛爲旃雜帛爲物熊虎爲旗鳥隼爲旟􅀛虵爲旐金羽爲禭析羽爲旌物名日所􅀞異物則異名也又曰龍旂九斿以象大火也交龍爲旗諸侯所建也大火倉龍􅀫之心也其属箕尾九星也鳥􅒅七斿以象鶉火也鳥隼爲􅒅州里之所建也鶉火朱鳥宿之柳也其属有七星也熊旗六斿以象叅伐熊虎爲旗師都之所建也伐属白虎􅀫與叅連體而六星也􅀛虵四斿以象營室也􅀛虵爲旐縣鄙之所建營室玄武􅀫也與東壁連體而四星也旒旌枉矢以象弧勤禮曰侯氏載龍旂弧韣則旌旗之属皆有弧弧以張縿之幅有衣謂之韣又爲設矢象弧星有矢象妖星有枉矢枉矢}
  - {type: variant, offset: 28, length: 4, content: 五兵五兵, WYG: 九旗之物名各有屬以待國事日月為常交龍為旂通帛為旃雜帛為物熊虎為旗鳥隼為旟龜蛇為旐全羽為旞析羽為旌物各有所畵異物亦異名也又曰龍旂九斿以象大火也交龍為旗諸侯所建也大火蒼龍宿之心也其屬箕尾九星也鳥旟七斿以象鶉火也鳥隼為旟州里之所建也鶉火朱鳥宿之栁也其屬有七星也熊旗六斿以象參伐也熊虎為旗師都之所建也伐屬白虎宿與參連體而六星也龜蛇四斿以象營室也龜蛇為旐縣鄙之所建營室𤣥武宿也與東壁連體而四星也弧旌枉矢以象弧也覲禮曰侯氏載龍旂弧韣則旌旗之屬皆有弧弧以張弦為幅有衣謂之韣又為設矢象弧星有矢象妖有枉矢枉矢}
