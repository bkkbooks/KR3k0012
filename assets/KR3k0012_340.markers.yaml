  - {type: variant, offset: 2731, length: 216, content: 徵凶氣先應破軍殺將黃帝出軍決曰始立牙之日喜氣來應旗幟指敵或從風舉暉二終日不繞竿勇氣奔逸是謂堂堂之陣此大勝之徵又曰有所攻伐作五采牙旗青牙旗引住東赤牙旗引住南白牙旗引住西黑牙旗引住北黃牙旗引住中又曰始立牙之日凶氣先應旗幟皆垂或逆風滂浡牙竿摧折旗幡絕烈還繞繳竿如此終日勢弱又曰將軍出兵有所討伐引兵出城門望見白雲及白水者舉白牙旗五色牙旗隨天氣四時也真人水鏡經曰凡軍始出立牙竿必令貌堅若有折將軍不利牙旗竿軍之精也即周禮司常職云軍旅會同置旌門是, SBCK: 禄}
