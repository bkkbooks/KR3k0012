  - {type: variant, offset: 681, length: 2, content: 雜則, WYG: 失天地人之道也章夏后氏以日月上明也殷以虎上威也周以龍上文也郝萌占曰旗上有光人主大喜延年益夀黄公三畧曰欲敵形色可勝之符先戰以二十八騎角人青衣赤旗東方七人徵人赤衣黄旗南方七人商人白衣黑旗西方七人羽人黑衣青旗北方七人凡二十八騎象二十八宿軍令曰聞雷鼓音舉白幢綘旗大小船皆進戰}
