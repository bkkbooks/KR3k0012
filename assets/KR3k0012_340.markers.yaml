  - {type: variant, offset: 900, length: 1, content: 兵, WYG: 凡國有難君自宫召將詔之曰社稷之命在將軍身今國有難願子將而應之將軍受命乃令祝史大小齊三日太廟鑚靈龜卜吉日以受旗鼓楚辭曰駕龍輈兮乘雷輈車轅也載雲旗兮逶迤又曰乗廻風兮載雲旗又曰揚彗星以為旗又曰乗赤豹兮從文貍辛夷車兮結桂旗宋玉髙唐賦曰晰兮若妖姬揚袂鄣日而望所思忽兮若駕駟馬建羽旗相如上林賦曰靡魚須之橈旃以魚須為旃柄驅馳逐戰也曳明月之珠旗以明珠綴飾旃王沉餞行賦曰曳招揺之修旗若蜿虹之垂天崔駰東廵頌曰升九龍之華旗文選曰雲旗拂霓又曰牙旗繽紛又曰旌旗拂天又曰揭竿為旗又曰曳彗星之飛旗又曰朱旗所拂九土披攘又曰朱旗綘天又曰建祝姑祝姑旗名又曰青霞雜桂旗旟釋名曰鳥隼為旟旟譽也軍吏所建也急疾趨事則有稱譽也爾雅曰錯}
