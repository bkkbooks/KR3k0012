  - {type: variant, offset: 1061, length: 414, content: 戟車戟也長丈六尺犀或作三直出三甲也有輕罪者贖以金分輕小以金分出金匱隨罪輕重有分兩也說而不勝者出一束箭不勝猶不直也箭十二為束也百姓皆說乃矯箭為矢矢箭之竿好者也鑄金而為刃刃五刃也刀劍矛戟矢也以伐不義而征無道遂霸天下崔寔政論曰兵器精利有蔡太僕之弩龍亭之劍至今擅名天下陸機要覽曰東弓南矛西戟北劍中鼓亦曰四兵鹽鐵論曰強楚勁鄭有犀兕之甲堂谿之揵內據金城外任利兵是以威行諸夏強伏敵國故孟賁畜臂眾人輕之怯夫有備其氣自倍以吳楚之士儛利劍蹶強弩以與狢虜騁於中原一人當百不足道也邯鄲五經折疑駮曰矢絕於弦不可追止戟執在手制之在人山海經曰天地東西二萬八千里南北二萬六千里出銅之山四百六十七出鐵之山三千六百九十此天下之所分壤樹穀也戈矛之所發也刀鎩之所起也能者有餘拙者不足干寶搜神記曰晉元康中婦人以金銀象角瑇瑁為斧鉞戈戟而戴之以當笄蓋妖之大者也樊文淵七經義綱格論曰車上五兵戈殳車戟酋矛牟夷步卒五兵戈殳車戟酋矛矢魏文典論曰昔周有雍孤之戟屈盧之矛狐父之戈上世名器, SBCK: ''}
