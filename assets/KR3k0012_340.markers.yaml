  - {type: variant, offset: 4, length: 1, content: 敘, WYG: 一常旂旃物旗旟旐旞旌常釋名曰九旗之名日月為常畫日月於其端天子所建言常明也尚書曰惟乃祖乃父世篤忠貞服勞王家厥有成績紀于太常周禮曰日月為常十二旒河圗曰風后曰予告汝帝之五旗東方法青龍曰旗南方法赤鳥曰旐西方法白虎曰旟北方法𤣥蛇曰旂中央法黄龍曰常國語曰吳王㑹晋於潢池吳王白常白旂赤常赤旂文選曰建辰旒之太常又曰建太常􅀆裶裶旂釋名曰交龍為旂竒也畵作兩龍相依倚也通以一赤色為之旡文采諸侯所建也爾雅曰有鈴曰旂郭璞注曰懸鈴竿頭畵交龍旂旒詩曰王錫韓侯淑旂綏章龍旂陽陽和鈴央央又曰旂旐央央禮記月令曰天子春載青旂夏載赤旂秋載白旂冬載𤣥旂周禮曰交龍為九旂諸侯所建左傳曰周分魯大路大旂又曰三辰旂旗昭其明也三辰日月星也旃釋名曰旃戰也戰戰恭巳而已三孤所建象旡事也説文曰旃曲柄也所以招士衆也世本曰黄帝作旃爾雅曰因章曰旃郭璞曰以白絹為之不畵也周禮曰通帛為旃大赤周正赤旡所飾孤所建也左傳曰城濮之戰亡大斾之左旃旃旗名擊旐曰旃祁瞞奸命當此之事而不治為事令也司馬殺之以狥于諸侯漢書曰田蚡音憤前堂羅鍾鼔立曲旃如淳曰通白為旃蘇林曰柄上曲也孟子曰招庶人以旃西京賦曰虹旃蜺旄又曰樹修旃羽獵賦曰立厯天之旗曳捎星之旃物釋名曰雜帛為物以雜色綴其邊為翅尾也將帥之所建也禮含文嘉曰物以色應其名也物以類應其方也左傳曰蒍敖為宰擇楚之令典軍行右轅左追蓐古者行軍右為軍備左者追草為宿備前茅慮無如今斥堠持綘及白旛見騎賊舉綘旛見歩賊舉白旛備不虞有無茅明也或云楚以茅為旌旗也中權後勁中軍制謀後以精}
