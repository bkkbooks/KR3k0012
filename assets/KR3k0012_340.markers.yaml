  - {type: variant, offset: 900, length: 1, content: 兵, krp: 凢國有難君自宫召將詔之曰社稷之命在將軍身今國有難願子將而應之將軍受命乃令祝史太卜齋三日之太廟鑚靈龜卜吉日以受鼓旗楚辭曰駕龍輈兮乗雷斬車轅也載雲旗兮逶迤又曰乗廻風兮載雲旗又曰楊彗星以爲旗又曰乗赤豹兮狐從文狸新夷車兮結旌桂旗宋玉髙唐賦曰眄兮若妖姫楊𬒮鄣日而望所思忽兮若駕駟馬建羽旗相如上林賦曰靡魚須之撓旃以魚須爲旃柄駈馳逐戰也曳明月之珠旗以明珠綴飾旃王沉餞行賦曰曵招揺之脩旗若蜿虹之垂天崔駰東廵頌曰升九龍之華旗文選曰雲旗拂霓又曰牙紛繽又曰旌旗拂天又曰掲竿爲旗又曰曳彗星之飛旗又曰朱旗所拂九土破攘又曰朱旗降天又曰建祝姑祝姑旗名又曰青霞雜桂旗旟釋名曰鳥隼爲旟旟譽也軍吏所建也急疾趨事則有稱譽也爾雅曰錯}
  - {type: variant, offset: 902, length: 4, content: 錞摩錞祺, SBCK: 鳥曰旟郭璞注曰此謂全剥鳥皮毛置之竿頭也舊􅀃刻革烏置竿首也孫叔敖云革急也言􅀞急疾之鳥於旒也周官鳥隼爲旟也按禮記鄭􅀇云載之以示衆即此􅀋也書云鳥戰目革詩云如載鳴鳶鳥斯革旌首鳥者自是鳥之皮毛明矣詩曰子子干旟在浚之都又曰彼旟旐斯胡不斾斾斾旒垂也周禮曰鳥隼爲旟州里所建也州長之属旐釋}
