  - {type: variant, offset: 28, length: 4, content: 五兵五兵, krp: 九旗之物名各有属以侍國事日月爲常交龍爲旂通帛爲旃雜帛爲物熊虎爲旗鳥隼爲旟龜虵爲旐金羽爲禭析羽爲旌物名日所畫異物則異名也又曰龍旂九斿以象大火也交龍爲旗諸侯所建也大火倉龍宿之心也其属箕尾九星也鳥旟七斿以象鶉火也鳥隼爲旟州里之所建也鶉火朱鳥宿之柳也其属有七星也熊旗六斿以象叅伐熊虎爲旗師都之所建也伐属白虎宿與叅連體而六星也龜虵四斿以象營室也龜虵爲旐縣鄙之所建營室玄武宿也與東壁連體而四星也旒旌枉矢以象弧勤禮曰侯氏載龍旂弧韣則旌旗之属皆有弧弧以張縿之幅有衣謂之韣又爲設矢象弧星有矢象妖星有枉矢枉矢}
