  - {type: variant, offset: 2382, length: 1, content: 陳, krp: 安知此非神仙余曰道必形體如此無以道焉風俗通曰齊有一女二家求之其家語其女曰汝欲東家則左袒欲西家則右袒其女兩袒父母問其故對曰願東家食而西家息以東家富而醜西家貧而羙也新序曰齊有田巴先生者行脩於外王聞其賢聘之將問政焉田巴先生改製新衣拂餙冠帶顧謂其妾妾曰佼將出門問其從者從者曰使過於淄水自照視醜惡甚焉遂見齊王齊王問政對曰今者大王召臣臣問妾妾愛臣䛕臣曰佼問從者從者畏臣䛕臣曰佼臣至臨淄水而觀然後知醜惡也今王察之齊國治矣㑹稽録曰任弈字安和句章人也爲人皃寢無威儀劉謚之龐郎賦曰其頭也則中觡而上下銳額}
  - {type: variant, offset: 2384, length: 8, content: 為高帝解平城圍隱, SBCK: 而承枕四起繁欽三胡賦曰莎車之胡黄目深精貟耳狹頥康居之胡焦頭折頞髙輔䧟無眼無黒眸頰無餘􅁏罽賔之胡靣象炙蝟頂如持囊隈目赤眥洞頞卬鼻朱彦時黒兒賦曰丗有非常人實惟彼玄士禀兹至緇色内外皆相似卧如驪牛􅕁立如烏牛時忿如鸜鵒闘樂似鸕鷀喜醜婦人周易曰老婦士夫亦可醜也韓詩外傳曰齊王厚送女欲妻屠門肚肚辭以疾其友勸之曰子孫死腥臭之肆而巳乎何以辭之肚應曰其女醜其友曰何謂也肚曰吾􅁏善如量而去苦少耳吾􅁏不善雖以他附益之尚猶不讎今厚送子子醜故耳其友下問女果醜目如擗杏齒如編蟹東觀漢記曰梁鴻同郡孟氏其女名光􅃺貌醜而黒力能舉石臼擇}
  - {type: page-break, offset: 2384, content: '', id: KR3k0012_SBCK_382-7a}
  - {type: variant, offset: 2384, length: 8, content: 為高帝解平城圍隱, WYG: 而承枕四起繁欽三胡賦曰莎車之胡黄目深精員耳狹頤康居之胡焦頭折頞髙輔䧟鼻眼無黒眸頰無餘肉􅄢賔之胡面象炙蝟頂如持嚢隅目赤眥洞頞仰鼻朱彦時黒兒賦曰世有非常人實惟彼𤣥士禀茲至緇色内外皆相似卧如驪牛眠立如烏牛跱忿如鸜鵒鬭樂似鸕鷥喜醜婦人周易曰老婦士夫亦可醜也韓詩外傅曰齊王厚送女欲妻屠門肚肚辭以疾其友觀之曰子孫死腥臭之肆而已乎何以辭之肚應曰其女醜其友曰何謂也肚曰吾肉善如量而去若少耳吾肉不善雖以他附益之尚猶不售今厚送子子醜故耳其友下問女果醜目如劈杏齒如編􅈉東觀漢記曰梁鴻同郡孟氏其女名光狀貌醜而黒力能舉石臼擇}
