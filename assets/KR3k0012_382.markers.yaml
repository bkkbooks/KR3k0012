  - {type: variant, offset: 2382, length: 1, content: 陳, SBCK: 安知此非神仙余曰道必形體如此無以道焉風俗通曰齊有一女二家求之其家語其女曰汝欲東家則左􅃝欲西家則右􅃝其女兩􅃝父母問其故對曰願東家食而西家息以東家富而醜西家貧而羙也新序曰齊有田巴先生者行脩於外王聞其賢聘之將問政焉田巴先生改製新衣拂餙冠帶顧謂其妾妾曰佼將出門問其從者從者曰使過於淄水自照視醜惡甚焉遂見齊王齊王問政對曰今者大王召臣臣問妾妾愛臣䛕臣曰佼問從者從者畏臣䛕臣曰佼臣至臨淄水而觀然後知醜惡也今王察之齊國治矣㑹稽録曰任弈字安和句章人也爲人皃􅃦無威儀劉謚之龐郎賦曰其頭也則中觡而上下銳額}
  - {type: page-break, offset: 2382, content: '', id: KR3k0012_SBCK_382-6b}
