  - {type: variant, offset: 680, length: 216, content: 宮靈芸別父母歔欷累日淚下沾衣至升車就路之時玉唾壺承淚壺即如紅色及至京師壺中之淚凝如血矣又曰蜀先主甘后沛人生微賤里中相者云此後後貴位極宮掖及后長體貌特異年十八玉質柔肥態媚容冶先主置后白綃帳中戶外望者如月下藂雪河南獻玉人高三尺乃取玉人置后側常稱玉人之所貴比德君子況為人形而不可說乎后與玉人潔白齊色觀者殆相亂惑嬖者非唯嫉於后亦妒在玉人后欲毀之乃誡上曰昔子罕不以玉為寶春秋美之今吳魏未滅安以妖玩經懷勿復進也上乃徹玉人眾嬖皆退當時以甘后為神智, WYG: 室言語始交王語}
