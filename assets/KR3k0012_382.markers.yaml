  - {type: variant, offset: 10, length: 0, content: '', SBCK: 一言而善叔向將飲酒聞之曰必􅞭明也下執其手以上曰昔賈大夫惡娶妻三年不言不􅀏如臯射雉獲之其妻始􅀏而言賈大夫曰才之不可以巳我之不能射汝遂不言不􅀏夫今子少不颺言醜貌不發􅀭子􅀂無言吾幾失子又曰宋華元爲植廵功植將主也城者曰睅其目皤其腹睅岀目皤大腹廣雅曰仳倠媒婄儓􅤵䫪䫂噅睢頦鶻䫏醜也仳鼻之切倠火遺切始音倍儓音臺􅤵蒲比反䫪差丈切䫂丁可切爲許爲切睢音佳頦古來切鶻音骨䫏音欺家語曰髙柴字子羔長不滿六尺狀皃甚惡爲人篤孝知名孔氏之門仕爲郕宰又曰耗土之人醜史記曰􅁗相蔡澤魋顔蹙頞頞鼻堇也又曰澹臺滅明字子羽􅃺皃甚惡欲事孔子孔子以爲材薄旣而受業退而脩行行不由徑非公事不見卿大夫南遊至江弟子三百人從之設取子去就名施乎諸侯孔子聞之曰吾以言取人失之宰子以皃取人失之子羽嘆書曰田蚡孝景帝皇后同母弟也辯有口學盤盂諸書爲人貌􅃦而貴又曰詔求能爲韓詩者蔡義召見恱之擢爲光禄大夫代楊敞爲相時年八十餘短小無􅁂眉貌似老嫗行歩僂傴常吏挾乃行又曰張良貌􅀂婦人范曄後漢書曰周舉字宣光汝南人也姿貌短陋而慱學東觀漢記曰永平中徴承宫爲􅀶士遷左中郎數納忠諌論議切直名播匈奴時單于遣使求欲得見宫詔勑宫自整飾宫對曰夷狄􅋑名非識實也臣􅃺醜不可以示逺宜選長大威容者帝乃以大鴻臚魏應代之魏志曰管輅容貌醜無威儀言語不擇非􅀋又曰王粲字仲宣山陽髙平人也年十七徃荆州依劉表表以粲貌􅃦而體通脫不甚重也晉書曰孫秀尚河東公主形陋短小奴僕之下者也又曰左思貌醜而口訥又曰張孟陽毎出人惡之輒擲瓦礫盈車王隱晉書曰劉伶字伯倫長六尺貌甚醜悴常携一壷酒使人荷鍤自隨以爲死便埋也孫嚴宋書曰桓護之字彦宗少倜儻不拘小節形􅃺短陋而氣幹強果又曰少帝㓜而狷急輕脫嶮迅細形黄貌色長頸鳥喙嘶聲齊書曰張融形貌短醜精神清徹王敬則見融革帶寛謂曰革帶太急融曰旣非歩吏急帶何爲又曰蕭坦之肥黒無􅁂詔聲嘶時人號爲蕭瘂剛佷專執群小畏而憎之崔鴻十六國春秋前趙録曰郭汜字子游上郡人也父士爲縣卒隨巫而遇一女子於路巫曰此女生貴子君亦有貴子可相納之當興君門士納之生汜長不滿七尺醜極當時朴訥無慧後爲縣卒感憤遊學師事安平趙孔曜曜見而偉之曰此生有公骨其當貴逹又曰前􅁗録曰符雄字元才趙建武中拜龍驤將軍貌醜頭大而足短故軍稱爲大頭龍驤又曰徐成純直亮素爲王猛所知長不滿六尺醜極當時車頻秦書曰符堅六歳戯於路司􅀠徐統見而異焉而問曰符郎此官街小兒戯不畏􅅞耶荅曰吏縳犯事者不􅅞小兒戯統語左右曰此兒有王覇相左右曰此兒狀皃甚醜而君以爲相貴異何也曰非尓等所知也南史曰劉韞人材凡鄙爲明帝所寵在湘州雍州使善􅀞者圖其形出行鹵簿羽儀常自披翫嘗以圖示征西將軍蔡興宗戯之陽􅀂不解􅀞者指韞形問之曰此何人韞曰是我其庸底􅀋如此耶北史曰後魏廣陵侯衍弟欽中書監尚書右僕射儀同三司欽色尤黒故時人號爲黒面僕射唐書曰李輔國本名静忠短小貌陋頗知書計髙力士見之収在左右與諸奴爲伍年四十餘矣爲小䆠掌廐中文帳後遷至封成國公也又曰􅂫丗長容貌醜陋頗有學識性滑稽言雜諧調隋大業中爲都水使者煬帝嘗謂之曰卿面何􅀋駏驢丗長再拜叫呼以手據地蹙項敗面爲駏驢之􅃺羣臣掩口而􅀏煬帝大恱賜帛百疋又曰貞觀十年文德皇帝崩百官縗絰率更令歐陽詢狀貌醜異衆或指之許敬宗見而大􅀏爲御史所劾左授洪州都督周史曰慕容彦超吐渾部人也父亮以彦超貴累贈至三師彦超即漢髙祖之同産弟也嘗冒姓閻氏體黒面胡故謂之閻崑崙}
