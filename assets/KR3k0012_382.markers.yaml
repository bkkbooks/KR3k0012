  - {type: variant, offset: 2394, length: 0, content: '', krp: 嫁至年三十鴻聞而聘之王隱晉書曰武帝爲太子納妃謀乆不决上欲娶衛瓘女楊后欲娶賈充女上曰衛公女有五可賈公女有五不可衛家種賢而多子端正而長白賈家種妬而少子醜而短黒也唐書曰張萬福典泗州時遇德宗幸奉天李希烈反陳少遊悉令管内刺史送妻子楊州以爲質萬福獨不肯送謂使者曰爲某白相公萬福妻老且醜不足煩相公意獨不送又曰中宗好與朝臣狎戲韋庶人微時有一乳母實蠻婢也旣老且醜齒髮秃落制於後宫刻列花燭嫁爲御史大夫竇懷貞妻俗謂乳母之􅡾曰阿遮懷貞毎進表狀列其官位必曰國遮欣然有自負之色莊子曰陽子之宋宿於逆旅逆旅人有妾二人其一人羙其一人惡惡者貴而羙者賤陽子問其故逆旅小子對曰羙者自羙吾不知其美也陽子曰弟子記之行賢而去自賢之行何徃而不受哉郭子曰許允婦是阮德如妹甚醜交禮竟許永無復入理桓範勸之曰阮嫁醜女與卿故當有意冝察之許便入見婦即出提裙𥚑停之許謂婦曰婦有四德卿有幾荅新婦所乏唯容士有百行君有其幾許曰皆備婦曰君好色不好德何謂皆備許有慙色遂雅相重劉向列女}
