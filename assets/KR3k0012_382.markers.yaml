  - {type: variant, offset: 1396, length: 979, content: 諱請效死尊前誓無他志二人自殺天錫有瘳追悼二姬葬以夫人禮說苑曰齊王起九重之臺募國中有畫者賜之錢狂卒敬君居常飢寒妻端正敬君工畫貪賜畫臺去家曰久思念其妻像向之憙笑旁人瞻見之以白王王即設酒與敬君相樂謂敬君曰國中獻女無好者以錢百萬謂妻可乎不者殺汝敬君慞惶聽許又曰太祖下鄴文帝先入袁尚府有婦女被髮垢面立紹妻後文帝問之荅曰是熙妻顧攬髮以袖拭面姿貌絕倫遂納之世說曰漢元帝宮人既多乃令畫工圖之欲有呼者輒披圖召焉其中皆行貨賂王昭君姿容甚麗志不可茍求工遂毀為甚醜終身不召後匈奴來和求美女於帝以昭君充行既召見而嘆之又曰桓宣武平蜀以李勢妹為妾主始不知既聞與數十婢拔白刃襲之溫尚明帝女南康長公主正值梳頭髮籍地膚色玉曜不為動容徐曰國破家亡以至今日若能見殺乃其本懷主慚而退俗說曰宋禕是石崇妓綠珠弟子有色善吹笛後在晉明帝處帝疹患篤群臣進諫請出宋禕帝曰卿諸人誰欲得之阮遙集時為吏部尚書對曰願以賜臣即與之典說曰司隸馮方女國色也避地楊州袁術登城見而遂納焉諸婦害其寵紿言將軍以貴人有志節但見時示憂色必長見敬重馮氏如其言術益哀之諸婦因絞懸之廁言自殺術誠以為不得志而死乃厚葬之方言曰娥㜲音盈好也秦曰娥言娥娥也宋謂之㜲言㜲㜲也秦晉之間凡好而輕者謂之娥自關而東河淆之間謂之媌今關西人亦呼好為媌吾交切或謂之姣言姣潔也音姣趙魏燕岱之間曰姝音姝亦四方通語耳或曰妦言妦容也音蜂自關而西秦晉之間故都曰忓秦舊都今扶風雍縣也晉舊都今太原晉陽縣也其俗通呼好為忓五干切又曰釥錯眇切嫽夭切好也青徐海岱之間曰釥或謂嫽今通呼小姣潔喜好者為嫽眇好凡通語也朦巳紅切庬鴟鴻切豐也自關而西秦晉之間凡大貌謂之朦或謂之庬豐其通語也娃烏佳切媠諾過切窕途了切艷美也吳楚衡淮之間曰娃南楚之外曰媠言嬌媠也宋衛晉鄭之間曰艷陳楚周南之間曰窕自關而西秦晉之間凡美色或謂之好或謂之窕故吳有館娃之宮秦有柴娥之臺柒音七秦晉之間美貌謂之娥美狀為窕美色為艷美心為窈弈偞容也自關而西凡美容謂之弈或謂之媟弈弈媟媟皆輕麗之皃書紀年曰桀伐岷山獻女于桀二女曰琬曰琰桀受女刻其名于苕華之玉苕是琬華是琰楚辭曰姱容脩態絙洞房娥眉慢脧目騰光又曰粉白黛黑施芳澤又曰美人既醉朱顏𨠑又曰室中之觀多珍怪蘭膏燭明華容備山海經曰丹山西即巫山也帝女居焉宋玉所謂我帝之季女名曰瑤姬其間首尾一百六十里謂之巫峽蓋因山為名也崔豹古今注曰魏文帝宮人有莫瓊樹薛夜來陳回衣陳巧笑瓊樹始製蟬鬢望之縹緲如蟬翼故號曰蟬鬢, SBCK: 純}
