  - {type: variant, offset: 273, length: 0, content: '', SBCK: 婦人之請於父母曰與爲人妻寜爲失子妾者十數而未止也是必有以異乎人也寡人召而觀之果以惡駭天下又曰支離䟽者頥隱於臍肩髙於頂㑹撮指天五管在上兩髀爲脅也孫卿子曰衛靈公有臣曰公孫吕身長七尺面長三尺而廣三寸名動天下孔藂子曰子髙見齊王齊王問誰可爲臨淄宰稱管穆焉王曰管穆容貌陋民不敬他荅曰夫見敬在德且臣所稱其能也君不聞晏子乎長不滿六尺面􅃺醜惡齊王上下莫不崇焉以穆體形方之猶賢之逺矣王乃以管穆爲臨淄宰也尸子曰禹長頸鳥喙面目顔色亦惡矣天下猶獨賢之吕氏春秋曰陳有惡人曰敦洽犨麋椎顙色如􅃮也又曰列精子髙德行於齊涽王所敬着布衣白縞􅃣㑹朝歩堂下謂侍者曰我好醜何如侍者曰公艷出而窺井歎曰惡丈夫也人之阿齊王實不良而}
