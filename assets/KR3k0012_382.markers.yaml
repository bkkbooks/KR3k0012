  - {type: variant, offset: 2996, length: 157, content: 神女賦曰楚襄王遊於雲夢之浦使宋玉賦高唐之事王夢神女其狀甚麗王異之明日以白玉玉曰其夢若何王曰見一婦人狀甚異撫心定氣復有所夢其始來也耀乎若日初出照屋梁其少進也皎乎若明月舒其光穠不短纖不長步裔裔兮曜殿堂忽兮改容蜿若遊龍乘雲翔王曰此盛矣試為寡人賦之玉曰夫何神人妖麗兮含陰陽之渥飾被華藻之可好兮若翡翠之奮翼其象無雙其極毛嬙又, SBCK: ''}
