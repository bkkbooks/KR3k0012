  - {type: variant, offset: 2416, length: 0, content: '', SBCK: 鹽邑之女鍾離姓春名也其爲人極醜無􅀟臼頭深目長壯大節卭鼻結喉頂上少髮折腰出􅅐皮膚􅀂􅃮行年三十無所容入行嫁不售流弃莫執於是乃拂拭短􅄄自詣宣王願乞一見謁者曰晏齊之不售女也聞大王之聖願備後宫之掃除頓首司馬門外謁者以聞宣王方置酒於漸臺左右聞之莫不掩口而􅀏王曰此天下強顔女子也乃召見之謂曰昔先王爲寡人娶妃疋皆以備}
  - {type: page-break, offset: 2416, content: '', id: KR3k0012_SBCK_382-9a}
