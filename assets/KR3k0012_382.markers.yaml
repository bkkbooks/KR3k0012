  - {type: variant, offset: 2424, length: 0, content: '', SBCK: 干萬乘之主有何異乎鍾離春曰竊慕大王之羙義耳王曰然何善曰嘗隱善王曰試一行之言未卒忽不見王大驚立發隱書而讀之乆不能解明日復召之但揚目衘齒舉手拊􅂰曰殆哉如此者四矣王曰願聞命對曰今大王之國西有撗􅁗之患南有強楚之讟外有二國之難内聚姧臣衆人不附春秋四十年壯男不立故不務衆子而務衆婦尊所好而忽所恃一旦山陵崩墜社稷不定此一殆也漸臺五層黄金白玉琅玕翡翠萬人疲極比二殆也賢者伏匿於山林謟䛕強行於左右耶僞立於夲朝不得通入此三殆也酒漿流湎以夜繼晝女樂俳優縱橫大㗛外不脩諸侯之禮内不康國家之理此四殆也王闇然無聲喟然而歎曰痛乎無鹽君之言於是立壞漸臺罷女樂退謟䛕去彫􅅣選兵馬寳府庫闢四門招}
  - {type: page-break, offset: 2424, content: '', id: KR3k0012_SBCK_382-9b}
  - {type: variant, offset: 2424, length: 0, content: '', WYG: 干萬乘之主有何異乎鍾離春曰竊慕大王之美義耳王曰然何善曰常善隱王曰試一行之言未卒忽不見王大驚立發隠書而讀之人不能觧明日復召之但揚目含齒舉手拊膝曰殆哉如此者四齊王曰願聞命對曰今大王之國西有横秦之患南有強楚之讟外有二國之難内聚奸臣衆人不附春秋四十年壯男不立故不務衆子而務衆婦尊所好而忽所持一旦山陵崩墜社稷不定此一殆也漸臺五層黄金白玉琅玕翠羽萬人疲極此二殆也賢者伏匿扵山林謟諛强行扵左右邪偽立扵本朝不得通入此三殆也酒漿流湎以夜繼晝女樂俳優縱横大笑外不修諸侯之禮内不康國家之理此四殆也王闇然無聲喟然而嘆曰痛乎無鹽君之言扵是立壊漸臺罷女樂退謟諛去彫琢選兵馬實府庫闢四門招}
