  - {type: variant, offset: 2415, length: 0, content: '', SBCK: 歸善桀紂不自飭仁義爲髙臺榭深池澤後宫蹈綺縠弄珠玉身死國亡爲天下㗛至今千餘􅀊天下歸惡由是觀之飭與不飭相去千萬閔王大感立以爲后朞月之間化行隣國諸侯朝之侵三晉懼􅁗楚立帝號及女死燕遂屠齊又曰齊鍾離春者齊}
  - {type: variant, offset: 2415, length: 0, content: '', WYG: 歸善桀紂不自餙仁義為髙臺榭深池澤後宫蹈綺縠弄珠玉身死國亡為天下笑至今千餘嵗天下歸惡由是觀之飾與不飾相去千萬閔王大感立以為后期月之間化行隣國諸侯朝之侵三晋懼秦楚立帝號及女死燕遂屠齊又曰齊鍾離春者齊}
