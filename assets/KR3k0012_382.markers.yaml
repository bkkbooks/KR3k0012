  - {type: variant, offset: 3411, length: 727, content: 八飾侍眉連娟以增繞目流睇而橫波劉楨魯都賦曰眾媛侍側鱗附盈房娥眉青眸顏若濡霜含丹吮素巧笑妍詳掖耀日之珍笄珥明月之珠璫圭衣紛棑振佩鳴璜應瑒神女賦曰騰玄眸而俄青陽離朱脣而耀雙輔紅顏曄而和妍時調聲以笑語張衡舞賦曰裾若飛煙柚如廻雪窣若霆震瞥若電滅於是粉黛施兮玉質粲朱簪挺兮緇髮亂謝靈運江妃賦曰小腰微骨朱顏皓齒綿視騰采靡膚膩理天台二娥宮庭雙媛青袿晨接紫衣形見或飄翰凌煙或潛泳浮海萬里俄頃寸陰未改辭不具載魏文帝與繁欽書曰今之妙舞莫巧於絳樹清歌莫激於宋臘古詩曰青青河畔草鬱鬱園中柳盈盈樓上女皎皎當窗牖娥娥紅粉粧纖纖出素手又曰燕趙多佳人美者顏如玉被服羅衣裳當戶理清曲音響一何悲絃急知柱促願為雙飛燕銜泥巢君屋梁簡文帝晚景出行詩曰細樹含殘影春閨散晚香輕花鬢邊墮微汗粉中光梁徐悱妻詩曰東家挺奇麗南國檀容暉夜月方神女朝霞喻洛妃晉阮籍詩曰妖冶閑都子英曜何芬葩玄鬢發朱顏睇聘有光華又曰西方有佳人皎若白素光被服織羅衣左右佩雙璜又詩曰二妃游浙江濱逍遙順風翔交甫懷玉珮婉孌有芬芳左思嬌女詩曰吾家有嬌女嬌女皦白晢小字為紈素口齒自清歷髻髮覆廣額雙耳似連璧明朝弄梳臺黛眉類掃跡五言傅玄歌曰有女懷芬芳媞媞步東廂蛾眉雙翠羽明眸發清光丹脣翳皓齒秀顏若珪璋巧笑露靨輔眾媚不可詳令儀希世出無乃古毛嬙首戴金步搖耳系明月繫瑣璫李延年歌曰北方有佳人絕世而獨立一顧傾人城再顧傾人國豈不言傾城國佳人難再得陸機艷歌行曰美目楊玉澤蛾眉象翠翰古樂府陌上桑行曰日出東南隅照我秦氏樓秦氏有好女自言名羅敷羅敷善蠶桑采桑城南隅青絲為籠繩桂枝為籠鉤頭上髮墮髻耳中明月珠鮑昭堂上行曰暉暉朱顏𨠑紛紛織女梭滿堂皆美女目我對湘娥箏笛更彈吹高唱好相和曹植美女篇曰美女妖且閑採桑岐路間桑條芬苒苒落葉何翩翩攘袖見素手皓腕約金鐶頭上金雀釵腰佩翠琅玕, SBCK: ''}
