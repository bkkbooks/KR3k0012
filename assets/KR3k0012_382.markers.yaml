  - {type: variant, offset: 2384, length: 8, content: 為高帝解平城圍隱, krp: 而承枕四起繁欽三胡賦曰莎車之胡黄目深精貟耳狹頥康居之胡焦頭折頞髙輔䧟無眼無黒眸頰無餘肉罽賔之胡靣象炙蝟頂如持囊隈目赤眥洞頞卬鼻朱彦時黒兒賦曰丗有非常人實惟彼玄士禀兹至緇色内外皆相似卧如驪牛𩥇立如烏牛時忿如鸜鵒闘樂似鸕鷀喜醜婦人周易曰老婦士夫亦可醜也韓詩外傳曰齊王厚送女欲妻屠門肚肚辭以疾其友勸之曰子孫死腥臭之肆而巳乎何以辭之肚應曰其女醜其友曰何謂也肚曰吾肉善如量而去苦少耳吾肉不善雖以他附益之尚猶不讎今厚送子子醜故耳其友下問女果醜目如擗杏齒如編蟹東觀漢記曰梁鴻同郡孟氏其女名光狀貌醜而黒力能舉石臼擇}
  - {type: punctuation, offset: 2391, content: ，, id: KR3k0012_CHANT_382-bkkpn691}
  - {type: 'tls:seg', offset: 2391, content: '', id: KR3k0012_CHANT_382-30a.10}
  - {type: variant, offset: 2394, length: 0, content: '', SBCK: 嫁至年三十鴻聞而聘之王隱晉書曰武帝爲太子納妃謀乆不决上欲娶衛瓘女楊后欲娶賈充女上曰衛公女有五可賈公女有五不可衛家種賢而多子端正而長白賈家種妬而少子醜而短黒也唐書曰張萬福典泗州時遇德宗幸奉天李希烈反陳少遊悉令管内刺史送妻子楊州以爲質萬福獨不肯送謂使者曰爲某白相公萬福妻老且醜不足煩相公意獨不送又曰中宗好與朝臣狎戲韋庶人微時有一乳母實蠻婢也旣老且醜齒髮秃落制於後宫刻列花燭嫁爲御史大夫竇懷貞妻俗謂乳母之􅡾曰阿遮懷貞毎進表􅃺列其官位必曰國遮欣然有自􅀒之色莊子曰陽子之宋􅀫於逆旅逆旅人有妾二人其一人羙其一人惡惡者貴而羙者賤陽子問其故逆旅小子對曰羙者自羙吾不知其美也陽子曰弟子記之行賢而去自賢之行何徃而不受哉郭子曰許􅁢婦是阮德如妹甚醜交禮竟許永無復入理桓範勸之曰阮嫁醜女與卿故當有意冝察之許便入見婦即出提裙􅅂停之許謂婦曰婦有四德卿有幾荅新婦所乏唯容士有百行君有其幾許曰皆備婦曰君好色不好德何謂皆備許有慙色遂雅相重劉向列女}
