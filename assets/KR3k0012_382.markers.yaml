  - {type: variant, offset: 58, length: 169, content: 惡醜惡之名遠布年過而一國無敢聘者衛有鰥夫失時冐娶之果國色闞子曰西施自窺於井不恃其美猶佐湯沐堯舜自窺於世不恃其賢猶須才德況中庸而距諫嫫母自窺於井以為媚於西施桀紂自窺於世以為賢於堯舜韓子曰魏王遺楚王美女王甚悅之慎子曰毛嬙西施天下之至姣也衣以皮褐則見者皆走易以玄錫則行者皆止淮南子曰曼顏皓齒形姱骨佳不待脂粉芳澤而美者西施陽文也許慎注曰陽文楚好女, SBCK: 人}
