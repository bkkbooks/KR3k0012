  - {type: variant, offset: 2395, length: 0, content: '', SBCK: 曰齊􅀌逐女者其􅃺甚醜三逐於郷五逐於里過時無所容乃造襄王之門而求見王輟食而起謹敬左右曰三逐於郷者不忠五逐於里者少禮何足爲遽王曰}
