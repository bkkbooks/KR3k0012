  - {type: variant, offset: 1105, length: 290, content: 則成文錦吴會分地記曰土城者勾踐時索美女欲以獻吴於羅山得西施鄭旦作土城貯之使近道習見人令賢傅母教之三年段龜龍涼州記曰隱王美人張氏色豔出家為道乃自投門樓雙服頻折口誦經顏色自若俄而死鄴中記曰廣陵公陳逵妹才色甚美發長七尺石虎以為夫人三國典略曰崔孝芬取貧家子賈氏以為養女有姿色騰納之請以邑號又曰齊武成曾有疾自云初見空中有五色物稍近變成一美婦人去地數丈亭亭而立徐之才云此至靈所致即進湯服一劑便覺稍遠又服還變成五色物數劑疾平帝王世紀曰紂以鬼侯為三公鬼侯有女美而進之於紂悅之妲己乃泣而讚之紂怒鬼侯女遂殺之而醢鬼侯何集續帝王世紀曰張天錫疾篤閻薛二姬並有國色天錫謂曰吾死之後汝二人豈可更為他妻皆曰尊若, SBCK: 薄禀性}
