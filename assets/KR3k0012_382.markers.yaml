  - {type: variant, offset: 2400, length: 5, content: 陳平說閼氏, SBCK: 齊􅀫瘤者東都採桑之女閔王之后也閔王宣王子也項有大瘤故號曰􅀫瘤􅀄閔王遊至東百姓盡觀􅀫瘤女採桑如故王召問曰寡人出遊車􅀐甚衆百姓無長少弃事來觀汝不視何也對曰妾受父母教採桑不受教觀大王王曰此女也惜其􅀫瘤女曰中心何謂􅀫瘤何傷王大恱曰此賢女也命後車載之女曰女不受父母之教而隨大王是奔女也王大慙曰寡人失之貞女一禮不備雖死不從及歸遣使奉禮加金百鎰娉迎之父母驚惶欲洗沐爲衣裳女曰變容更服恐見不識於是如故隨使者閔王歸見諸夫人告曰今日出遊得一聖女及至諸夫人見者皆大􅀏王曰未飭耳飭與不飭相去十百女曰飭與不飭相去千萬不足}
  - {type: page-break, offset: 2400, content: '', id: KR3k0012_SBCK_382-8b}
  - {type: variant, offset: 2400, length: 5, content: 陳平說閼氏, WYG: 齊宿瘤者東都採桑之女閔王之后也閔王宣王子也項有大瘤故號曰宿瘤初閔王逰至東郭百姓盡觀宿瘤女採桑如故王召問曰寡人出逰車騎甚衆百姓無長少弃事來觀汝不視何也對曰妾受父母教採桑不受教觀大王曰此女也惜其宿瘤女曰中心何靖宿瘤何傷王大恱曰此賢女也命後車載之女曰女不受父母之教而隨大王是奔女也王大慙曰寡人失之貞女一禮不備雖死不從及歸遣使奉禮加金百鎰聘迎之父母驚惶欲洗沐為衣裳女曰變容更服恐見不識扵是如故隨使者閔王歸見諸夫人告曰今日出逰得一聖女及至諸夫人見者大笑王曰未餙耳餙與不餙相去十百女曰餙與不餙相去千萬不足}
