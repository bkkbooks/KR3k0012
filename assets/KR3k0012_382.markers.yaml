  - {type: variant, offset: 9, length: 0, content: '', krp: 醜丈夫釋名曰醜臭也如臭穢也說文曰音蚩酉反可惡也又曰丈十尺也從手而持十也又曰夫從一大象人形也一象簮形冠而旣簮人二十而冠成人也故成人曰丈夫尚書曰洪範六極五曰惡孔安國曰醜陋也毛詩曰不見子都乃見狂且注曰狂且犯醜之人左傳曰賈大夫貌惡娶妻而羙三年不言不笑御以如臯射雉獲之其妻始笑又曰叔向適鄭唆口鬲薎惡惡醜皃也欲觀叔向從使之収器者而往立於堂}
