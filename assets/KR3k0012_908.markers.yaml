  - {type: variant, offset: 1686, length: 436, content: 記曰殷紂之時大龜生毛兔生角兵甲將興兆也春秋後語曰昔齊有良兔曰東郭俊本或作狡兔以其善走故曰俊一日走百里有良狗曰韓子獹黑犬也獹讀如盧也亦一日而走百里使人遙見而指屬指屬猶指蹤也屬音之欲切則雖韓獹不及良兔躡跡而蹤之則雖東郭不能離也春秋後語曰淳于髡說齊威王曰韓子獹天下之壯犬也東郭俊者海內之狡兔也韓子獹逐東郭俊環山者三騰山者五兔極於前而犬疲於後犬兔俱疲各死其處田父見而獲之無勞倦之苦而擅其功今齊魏相持頓兵獘眾臣恐強秦大楚乘其後而有田父之功也威王懼而罷兵又曰莊辛對楚王曰臣聞鄙諺曰見兔而顧犬未為晚也亡羊而補牢未為遲也又曰馮煖謂孟嘗君曰聞狡兔有三穴范子計然曰兔毫出玄菟樂浪書紀年曰昭王十九年天大曀雉兔皆震宣王三十年有兔舞鎬風俗通曰食兔髕音牝者令人面生髕食得髕者賞以寒酒按秦法言好車裂抽脅黔首飲泣永歎故食兔髕以為嘉瑞全己之髕也所以有賞耳古今注曰成帝建平元年山陽得白兔目赤如朱京房妖占曰兔止城上邑必虛入宮生子宮空廣志曰漢諸郡獻兔毫書鴻都門題唯趙國豪中用論衡曰兔䑛雄豪而孕及其生子從口中出又博, WYG: ''}
