  - {type: variant, offset: 375, length: 1, content: 天, krp: 㫪山百獸所聚也爰有赤豹熊羆六韜曰文王囚羑里散冝生受命而行宛懷條塗之山有黄熊得而獻於紂左傳曰晉靈公使宰夫臑熊蹯不熟殺之寘諸畚載以過朝又曰楚}
  - {type: variant, offset: 377, length: 3, content: 賜曹奴, SBCK: 將以商臣爲太子令尹子上諌之不聽又欲立王子職而黜商臣商臣以宫甲圍成王王請食熊蹯而死弗聽王縊史記曰趙簡子病不知人五日而寤曰我之帝所見一熊欲援我帝命我射之中熊死有當道者曰帝令主君滅晉二卿熊其祖也漢書曰昌邑王賀在藩帝見熊以問左右左右皆荅不見又曰孝元帝馮昭儀上幸虎圈􅋐獸後宮皆坐熊出圈攀檻欲上殿昭儀乃當熊而立及左右格殺熊上問人情驚懼何故當熊昭儀曰夫猛獸得人而止妾恐熊至御坐故身當之耳帝嗟嘆以此倍敬重之淮南子曰誠中}
