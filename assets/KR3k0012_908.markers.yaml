  - {type: variant, offset: 2142, length: 242, content: 又曰儒者言月中兔夫月水也兔在水中無不死者夫兔月氣也又曰任娠者不食兔肉令兒口缺幽明錄曰桓大司馬溫時有參軍夜坐忽見屋樑棟間有一伏兔張目切齒而向之甚可畏惡兔來轉近遂引刀而斫之正中於兔而實反傷其膝流血滂沱深怪此意命家中悉藏刀刃不以自近後忽復見如前意廻或復索刀重斫因傷委頓幸刀不利故不至死再過而止傅玄歌辤曰兔擣藥月間安足道神烏戲雲間安足道楚辤天問曰夜光何德死則又育夜光月也育生也言月得於天死而復生也古豔歌曰焭焭白兔東走西顧衣不如新人不如故樂府歌詩曰採取神藥山之端白兔擣成蝦蟆丸奉上陛下一玉柈音盤, SBCK: 太平御覽卷第九百八}
