  - {type: variant, offset: 2125, length: 3, content: 兔望月, SBCK: 豻猨屬頭形正方髮長尺餘皆蒼色犬􅀋似人欲有所視輒揺頭兩手􅀍髮不􅈛則覆鄣其兩目衣毛皤皤􅀂披狐裘木居洄藏宻向乃得見耳蹷爾雅曰西方有比肩獸與卭卭矩比焉其名曰蹷孫子曰北方有獸其名曰蹷前足䑕後足兎是獸也甚矣其愛蛩蛩巨虚也食得甘草必齧以遺蛩蛩巨虚蛩蛩巨虚見人將來必􅀒蹷以走蹷非性心愛蛩蛩巨虚也爲假足也二獸者亦非性心愛蹷也爲其得甘草}
