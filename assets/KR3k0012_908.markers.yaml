  - {type: variant, offset: 435, length: 2, content: 中興, WYG: 昌邑王賀在藩邸見熊以問左右左右皆答不見又曰孝元帝馮昭儀上幸虎圏閲獸後宫皆坐熊出圏攀檻欲上殿昭儀乃當熊而立及左右格殺熊上問人情驚懼何故當熊昭儀曰夫猛獸得人而止妾恐熊至御坐故身當之耳帝嗟嘆以此倍敬重之淮南子曰愛熊而食之鹽愛獺而飲之酒雖欲養之非其道也熊食鹽而死獺飲酒而敗故曰非其道也周書王㑹曰成王時不屠國獻青熊一孟子曰魚我}
