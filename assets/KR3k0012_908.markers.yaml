  - {type: variant, offset: 935, length: 2, content: 石勒, SBCK: 符徤字業洪第三子也􅀄母姜氏夢大羆而孕長而勇果北史曰齊神武遣韓􅁤司馬子如從河東霄濟華州襲王羆羆不覺比曉䡄衆巳乗梯入城羆尚卧未起聞閤外匈匈有聲便􅃝身露髻徒跣持一白挺大呼而詬曰老羆當道卧貛子那敢過敵見驚退猰窳上音軋下音􅁃爾雅曰猰窳􅀋􅓔虎食人迅走􅓔勑俱切海内經曰猰窳龍首而虵身人靣居於弱水中食人山海經曰少咸之山獸其􅃺如牛而赤身人靣馬足名曰窫窳其音如嬰兒食人淮南子曰堯}
