  - {type: variant, offset: 2, length: 95, content: 十九麞春秋運斗樞曰樞星散為麞伏侯古今注曰麞有牙而不能噬鹿有角而不能觸麞一名麕青州人謂麕為麞抱朴子曰麞兔入軍中當徙之又曰山中稱赤吏者麞也呂氏春秋曰使麞疾走馬弗及也而得之者時願也瑞應圖曰宋文元嘉, SBCK: ''}
