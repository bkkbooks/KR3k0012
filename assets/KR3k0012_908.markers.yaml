  - {type: variant, offset: 99, length: 222, content: 五年華林園飬麞生二百子文帝又獲青麞晉起居注曰咸寧中白麞見魏郡後諸州各送白麞異苑曰青州劉幡元嘉初射得一麞剖肚藏以草塞之厥然起走幡怪而拔塞須臾復還倒如此三焉幡密錄此種求類治傷痍多愈北史曰後魏廣平王懷嘗獵於河北馬塲間逐一麞入草命人圍遶將自射之田已先經燒不見其出遂失麞所在唯有塼塔存焉懷乃悵然動仁恕之心解鷹放犬遂不復獵蕭廣濟孝子傳曰蕭國遭喪有鵠遊其庭至暮而玄麞暮入其門與馬犬侶至旦而去王述上白麞表曰所領阮藻之於江寧縣界得白麞一頭毛色鮮潔異於類誠嘉祥也麕, SBCK: 􅆛熊羆猰窳􅓔貘騊駼猩猩􅍛􅍛風母豻蹷􅆛}
