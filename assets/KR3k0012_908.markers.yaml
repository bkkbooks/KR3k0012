  - {type: variant, offset: 375, length: 1, content: 天, WYG: 舂山百獸所聚也爰有赤豹熊羆瑞獸也六韜曰文王囚羑里散宜生受命而行宛懐條塗之山有黄熊得而獻於紂左傳曰晉靈公使宰夫胹熊蹯不熟殺之寘諸畚載以過朝又曰楚}
