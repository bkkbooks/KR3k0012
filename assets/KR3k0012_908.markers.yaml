  - {type: variant, offset: 438, length: 4, content: 在獻白麕, WYG: 欲熊掌亦我所欲二者不可得兼舎魚而取熊掌生亦我所欲義亦我所欲二者不可得兼舎生而取義列子曰黄帝戰扵阪泉帥熊驅虎為前驅纒子曰桀王天下酒濁而殺厨人紂王天下熊蹯不熟而殺厨人抱朴子曰玊䇿記稱熊壽五百歳五百歳則能化𤨏語曰晉平公夢見赤熊闚屏惡之而有疾使問子産子産曰昔共工之御曰浮逰既敗於顓頊自沒沉淮之淵其色赤其言善笑其行善頋其状如熊常為天下􅑂見之堂上則王天下者死見堂下則邦人駭見門近臣憂見庭則無傷窺君之屏病而無傷祭顓頊共工則瘳公如其言而疾間魏略曰大秦國出文熊赤螭}
