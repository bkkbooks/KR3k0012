  - {type: page-break, offset: 2044, content: '', id: KR3k0012_WYG_025-14b, image: WYG0893/WYG0893-0226b.png}
  - {type: variant, offset: 2045, length: 434, content: 白出入不常尚書考靈曜曰虛星為秋候昴星為冬期陰氣相佐德乃弗邪子助母母母拿符虛星北方宿也昴星西方宿也陰稱母也毛詩傳曰壯士悲秋感陰氣也詩含神霧曰秦地處仲秋之位男懦弱女高膫膫明也落瀟切白色身音中啇其言舌舉而仰聲清而揚三禮義宗曰九月大享帝於明堂之中孝經云宗祀文王於明堂是也三禮義宗曰秋曰庚辛者庚更也辛新也言物皆改更而新也又曰周祫以秋者萬物新成可以奉薦宗廟故合先祖之神而祭之故祫宜在秋也又曰九月寒露為節者九月之時露氣轉冷故謂之寒露節霜降為中露變為霜故以霜降為中春秋繁露曰秋之為言猶湫湫者憂悲之狀又曰秋怒氣故殺春秋元命包曰堯為天子季秋下旬夢白帝遺吾鳥喙子其母索扶始升高丘白帝上有雲如虎感己生皋陶索扶始問之如堯言又淮南子云皋陶鳥喙春秋感精符曰霜殺伐之表季秋霜始降鷹隼擊王者順天行誅以成肅殺之威穆天子傳曰仲秋甲戌天子東遊次雀梁一宿為舍再宿為信過信為次蠹書于羽陵謂暴書蠹蟲因曰蠢書也聖賢記曰馮夷弘農潼鄉堤首里人服八石得道為水仙河伯又一說華陰人八月上庚日渡河溺死天帝署為河伯荊楚歲時記曰八月, SBCK: 平御覽卷第二}
