  - {type: variant, offset: 114, length: 0, content: '', WYG: 窮秋九月塞外草衰夜不能寐側耳逺聼胡笳互動牧馬悲鳴吟嘯成羣邉聲四起晨坐聼之不覺淚下楚辭曰嫋嫋兮秋風洞庭波兮木葉下言秋風疾則草木搖湖水波而樹葉落矣又悲哉秋之爲氣也蕭瑟兮草木揺落而變衰憭慄兮若在逺行登山臨水兮送將歸泬㵳兮天髙而氣清寂寥兮收潦而水清憯悽増欷兮薄寒之中人愴怳曠浪兮去故而就新坎􅇄兮貧士失職而志不平廓落兮覊旅而無友生惆悵兮而私自憐燕翩翩其辭歸兮蟬寂寞而無聲鴈嗈嗈而南遊鵾雞啁哳上章流下陟轄切鳥鳴聲也而悲鳴獨申旦而不寢兮哀蟋蟀之宵征又皇天平}
