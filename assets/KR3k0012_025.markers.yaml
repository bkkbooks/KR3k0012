  - {type: variant, offset: 54, length: 0, content: '', SBCK: 丹鳥羞白鳥羞進也白鳥蚊蚋辰則伏辰房星鴽爲䑕也九月内火漢舊儀曰八月飲酎車駕夕牲以繡衣之皇帝暮視牲以隂燧取水於月以陽燧取火於日爲明水火左􅃝以水沃牛右肩手執鸞刀以切牛毛血薦之而即更衣李彫四部曰弔鳥山俗傳曰鳯死其上毎至七月九日晦望群鳥常來集其上鳴呼也應劭風俗通曰周秦常以八月輶軒使采異俗方言藏之祕府劉歆鍾律書曰春宮秋律百卉必凋秋宫春律萬物必榮魏丁儀刑禮論曰上天垂象聖人則之歳先春而後秋宫之爲理先禮而後刑論衡曰秋氣繫殺􅂖草不任凋傷而死此言失實夫物以春生夏榮秋而熟老適自枯死隂氣適盛與之㑹遇何以驗之物有秋不死者生性未極也陸機要覽曰秋樹名成秋􅀨名愁地鏡經曰八月中草木獨有葉枝下垂者必有美玉又云八月後草木死者亦有玉梁元帝纂要曰秋曰白藏氣白而収藏万物亦曰收成万物成而收歛亦曰三秋九秋素秋素啇髙啇天曰旻天旻􅉖也􅉖万物之彫零風曰啇風素風淒風髙風涼風激風悲風景曰㓪景澄景清景時曰凄辰霜辰霜辰可施九月節曰素節啇節草曰衰草木曰踈木衰林霜柯霜條七月孟秋亦曰􅀄秋首秋上秋肇秋蘭秋八月仲秋亦曰仲啇九月季秋亦曰暮秋末暮啇季啇抄秋亦曰授衣此時婦功畢始授衣亦曰􅀇月盧公範饋餉儀曰凢八月旦上承露盤赤松子栢上露爲囊以膏靣皮古人用􅀧炙枝以梨枝爲之反銀盞中有朱砂銀枝子也盧公範者盧懷慎之家臨海異物志曰黄雀常以八月入海化爲魚􅀶物志曰舊􅀃天河與海通近丗有人居海渚者年年至八月浮查來至甚大往返不失期其人乃至查上賫粮食乗查而去至天河世􅀃曰張季鷹辟齊王東曹􅁺在洛見秋風起因思吴中蓴菜羮鱸魚鱠曰人生貴適志耳何能從宦數千里以要名爵遂命駕便歸俄而齊王敗人皆}
