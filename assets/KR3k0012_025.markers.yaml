  - {type: variant, offset: 515, length: 1, content: 涼, WYG: 鷹鸇擊三禮義宗曰七月立秋秋之言湫言湫聚也縮之意隂意出地始殺萬物故以秋爲節名五經要義曰磬立秋之樂也白虎通曰磬者夷則之氣象萬物之成月令占候圖曰立秋坤卦用事其神攝提二宮荆州分也晡時申西南凉}
