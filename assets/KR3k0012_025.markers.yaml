  - {type: variant, offset: 96, length: 0, content: '', SBCK: 堅成而疆大故曰大梁漢李陵與蘇武書曰窮秋九月塞外草衰夜不能寐側耳逺聽胡笳牙動牧馬悲鳴吟嘯成群邊聲四起晨坐聽}
  - {type: page-break, offset: 96, content: '', id: KR3k0012_SBCK_025-3b}
  - {type: variant, offset: 96, length: 0, content: '', krp: 堅成而疆大故曰大梁漢李陵與蘇武書曰窮秋九月塞外草衰夜不能寐側耳逺聽胡笳牙動牧馬悲鳴吟嘯成群邊聲四起晨坐聽}
  - {type: variant, offset: 97, length: 0, content: '', SBCK: 不覺流淚楚詞曰嫋嫋􅀆秋風洞庭􅀆木葉下言秋風疾則草木摇湖水波而樹葉落矣又曰悲哉秋之爲氣也蕭瑟􅀆草木揺落而變衰憀慄􅀆􅀂在逺行登山臨水􅀆送將歸泬寥􅀆天髙而氣清寂寥􅀆收潦而水清􅉃悽増欷􅀆薄寒之中人愴恍曠浪􅀆去故而就新坎􅇄􅀆貧士失職而志不平廓落􅀆羈旅而無友生惆悵􅀆而私自憐䴏鶣鶣其辭歸蟬寂寞而無聲鴈嗈嗈而南遊鵾雞啁哳上張流下陟轄切鳥鳴聲也而悲鳴獨申旦而不寐哀蟋蟀之霄征又曰皇天平分四時􅀆竊獨悲此凛秋白露旣下降百草􅀆􅍕離􅀍梧楸去白日之昭昭􅀆襲長夜之悠悠魏曹植秋思賦曰四節更王􅀆秋氣悲遥思惝恍􅀆􅀂有遺雲髙氣静露凝衣野草變色莖葉稀鳴蜩抱木鴈南飛西風悽悷郎計切朝夕臻扇􅝍屏弃絺􅗽􅂢晉潘岳秋興賦曰嗟秋月之可哀良無愁而不盡野有歸鷰隰有翔隼遊氣朝興槁葉夕殞於時乃屏輕􅝍釋纎絺藉莞蒻御裌衣庭樹槭}
  - {type: page-break, offset: 97, content: '', id: KR3k0012_SBCK_025-4a}
  - {type: variant, offset: 97, length: 2, content: 所說, WYG: 彫風曰商風素風凄風髙風凉風激風悲風景曰朗景澄景清景時曰凄辰霜辰霜辰可施九月節曰素節商節草曰衰草木曰踈木竹曰霜柯霜筠七月孟秋亦曰初秋首秋上秋肇秋蘭秋八月仲秋亦曰仲商九月季秋亦曰暮秋末商季商杪秋亦曰授衣此時婦功畢始授衣盧公範饋餉儀曰凡八月旦上承露盤赤松子承栢上露爲囊以膏面皮古人用㸃炙枝以梨枝為之及銀盞中者朱砂銀枝子}
  - {type: page-break, offset: 97, content: '', id: KR3k0012_WYG_025-3b, image: WYG0893/WYG0893-0220d.png}
  - {type: variant, offset: 97, length: 0, content: '', krp: 不覺流淚楚詞曰嫋嫋兮秋風洞庭兮木葉下言秋風疾則草木摇湖水波而樹葉落矣又曰悲哉秋之爲氣也蕭瑟兮草木揺落而變衰憀慄兮若在逺行登山臨水兮送將歸泬寥兮天髙而氣清寂寥兮收潦而水清􅉃悽増欷兮薄寒之中人愴恍曠浪兮去故而就新坎壈兮貧士失職而志不平廓落兮羈旅而無友生惆悵兮而私自憐䴏鶣鶣其辭歸蟬寂寞而無聲鴈嗈嗈而南遊鵾雞啁哳上張流下陟轄切鳥鳴聲也而悲鳴獨申旦而不寐哀蟋蟀之霄征又曰皇天平分四時兮竊獨悲此凛秋白露旣下降百草兮奄離𬒳梧楸去白日之昭昭兮襲長夜之悠悠魏曹植秋思賦曰四節更王兮秋氣悲遥思惝恍兮若有遺雲髙氣静露凝衣野草變色莖葉稀鳴蜩抱木鴈南飛西風悽悷郎計切朝夕臻扇􅝍屏弃絺絺巾捐晉潘岳秋興賦曰嗟秋月之可哀良無愁而不盡野有歸鷰隰有翔隼遊氣朝興槁葉夕殞於時乃屏輕􅝍釋纎絺藉莞蒻御裌衣庭樹槭}
  - {type: variant, offset: 98, length: 1, content: 說, SBCK: 責切殞落㒵以洒落勁風戾而吹帷蟬嘒嘒以寒吟鴈噰噰而南飛天晃朗而弥髙日游腸而􅪶微何微陽之短晷覺涼夜之方永月曈朧以􅍭光露凄清以凝冷熠燿熠燿螢}
