  - {type: variant, offset: 518, length: 1, content: 後, SBCK: 又}
  - {type: variant, offset: 518, length: 0, content: '', WYG: 黄雲如羣羊宜粟糓若晴朗風雲不至萬物不成望西南坤上有黄雲氣是正氣立秋應節萬物皆榮豆糓熟赤氣出其右萬物半死豆糓半収地動人民不安坤氣衰萬物不成地頻動牛馬病應在十二月坤氣見于江湖江湖水必竭坤氣退則地裂泉湧申時西南有赤黄氣或白潤厚白澤者粟大熟又立秋日午時竪竿影得四尺五寸二分半五糓熟立秋}
  - {type: page-break, offset: 518, content: '', id: KR3k0012_WYG_025-10b, image: WYG0893/WYG0893-0224b.png}
  - {type: variant, offset: 518, length: 1, content: 後, krp: 又}
  - {type: variant, offset: 519, length: 0, content: '', WYG: 四十五日内土氣在坤不得修造動土及逺行出軍事凶漢書曰孫寳爲京兆尹請侯文爲掾進見如賔禮數月以立秋日署文東部督郵且曰今鷹隼始擊當順天地取姦惡以成嚴霜之誅掾部詎有其人乎文曰無其人不敢受職寳曰誰也文曰霸陵杜穉季寳問其次文曰豺狼横道不宜復問狐狸後漢書曰申屠建等與御史大夫隗囂合以立秋日貙膢時共刼更始漢書音義曰貙獸也以立秋日祭獸王者亦以此日出獵用祭宗廟冀州北八月朔作飲食爲膢其俗謂曰膢獵社又貙音丑于反膢音娄續漢書曰立秋之日夜漏未盡五刻京都百官皆衣白絁皂領縁中衣迎氣于西郊又立秋之日西郊畢始揚威武斬牲于郊東門以薦陵廟其儀乘輿御戎輅白馬朱鬛躬執弩射牲牲以鹿麛太宰令謁者各一人載獲車送陵廟還宮遣使者賫束帛以賜武官肄兵習戰陣之儀斬牲之禮名曰貙劉如淳曰膢漢儀注立秋貙婁許慎曰俗以二月祭飲食冀州北部或以八月作飲食爲婁也祠令曰立秋祀白帝于西郊帝少昊配蓐収從祠又立秋後辰祀靈星于國城東南登真隱訣曰立秋之日日中五岳諸真人諸黄老于黄房雪庭山㑹仙官于日中定天下神圖靈圖藥圖符瑞圖曰立秋西方閶闔風至一名飈風白虎通曰立秋之日凉風至王者報地德禮西郊周書時訓曰立秋之日凉風至又}
