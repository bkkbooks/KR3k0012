  - {type: variant, offset: 1269, length: 293, content: 之嘗稻先荐寢廟稻初熟藏帝藉於神倉祗敬必飭重祭祀之穀是月也乃伐薪為炭伐必因殺氣又曰秋歛冬藏義也又曰西方者秋秋之為言愁也周禮曰大司馬之職仲秋教理兵掌建邦國之九法以佐王平邦國又曰司裘掌為大裘以供王祀天之服仲秋獻良裘季秋獻功裘又曰籥章氏掌仲秋擊土鼓吹豳詩以迎寒氣鄭玄注曰迎寒以夜來諸侯也又曰司矢仲秋獻矢箙弓弩成於秋矢箙成於堅箙盛矢器也以獸皮為之箙音服又曰南呂酉之氣八月建焉而辰在壽星又曰秋見曰覲覲之言勤也其勤王之事大行人云秋覲以比天下功也又曰秋獻龜魚又曰司爟音貫掌行火之政令季秋內火九月黃昏心星伏在戍上使民內傳曰歲云秋矣我落其實而取其材爾雅曰秋為白藏又曰秋曰收成又曰秋為旻天李巡曰秋万物成熟皆有, SBCK: ''}
