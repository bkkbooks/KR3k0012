  - {type: variant, offset: 63, length: 1, content: 言, SBCK: 明堂之制曰秋治以矩矩之爲度也肅而不勃剛而不匱取而無怨内而無害威厲而不懾令行而不廢殺伐旣得仇敵乃克矩正不失百誅乃服乙巳占曰太白主秋人君當秋之時順太白以施政則􅁻逆則凶秋時行冬令則辰星之氣干於大白色黒而有芒角隂氣大勝戎兵乃來風災數起國多盗賊邊境不寧亡地震坼而國有大喪重獄秋時行春令則歳星之氣干於太白色青昧小則國旱君有大憂}
  - {type: page-break, offset: 63, content: '', id: KR3k0012_SBCK_025-3a}
  - {type: variant, offset: 63, length: 2, content: 言陽, WYG: 陸機要覽曰秋樹名成秋雨名愁地鏡經曰八月中草木獨有枝葉下垂者必有美玉又云八月後草木死者亦有玉梁元帝纂要曰秋曰白藏}
