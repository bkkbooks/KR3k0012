  - {type: variant, offset: 2480, length: 230, content: 日四民並以朱點小兒頭名為天灸以厭疾也又曰以綿綵為眼明囊赤松子以八月囊承柏樹露為宜服後世以金薄為之遞相餉遺西京雜記曰賈佩蘭云在宮時八月四日出彫房北戶竹林下圍碁勝者終年有福負者終年疾病又曰漢宗廟八月飲酎用九十牢王子年拾遺記曰漢武嘗以季秋之月泛靈鶂之舟於淋池之上窮夜達晝以晝達夜於桂臺之下以香金為鉤縮紉絲為輪以丹鯉為餌不踰旬釣一白蛟長三四丈若大虵無鱗甲帝曰非龍也於是付太官為鮓而肉紫骨清香美無倫詔賜臣下時以上為神感所獲後更不得續齊諧記曰弘農鄧紹八月朝入華山見一童子以, SBCK: ''}
