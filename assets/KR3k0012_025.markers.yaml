  - {type: variant, offset: 121, length: 5, content: 昧谷寅餞納, WYG: 嗟秋月之可哀兮良無愁而不盡野有歸燕隰有翔隼逰氛朝興槁葉夕殞於時乃屏輕箑釋纎絺藉莞蒻御裌衣庭樹槭所責切以洒落勁風戾而吹幃蟬嘒嘒以寒吟兮雁雝雝而南飛天晃朗而彌髙}
