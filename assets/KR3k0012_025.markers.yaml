  - {type: variant, offset: 530, length: 168, content: 天子居總章左個乘白輅駕白駱載白旂衣白衣服白玉食稻與魚其器廉以深總章左個當申上之室乘白輅衣白衣從秋色也食稻與魚秋味之宜也其器廉以深象金傷害物入藏太史以先立秋三日謁於天子曰某日立秋盛德在金天子乃齋立秋之日天子親率諸侯大夫以迎秋於西郊迎秋為祖白帝白招桓於西郊以少皞配坐以蓐收太白三辰七宿從祀還乃賞軍帥武人於朝乃命將帥選士勵兵簡練俊專任有功以征, SBCK: 涼風}
