  - {type: variant, offset: 158, length: 0, content: '', SBCK: 苦促短遥夜邈綿綿貧士感此時慷􅁣不能眠晉陸機爲顧彦先作詩曰肅肅素秋節湛湛濃露凝太陽夙夜降少隂忽巳􅂛又悼亡詩曰皦皦牎中月照我室南端清啇應秋至溽暑隨節闌懔懔涼氣􅂛始覺夏衾單晉張載詩曰靈象運天機日月如激電秋風兼夜式微霜凄舊院嘉木殞蘭圃芳草悴芝菀嚶嚶南翔鴈翩翩辭歸䴏玉肌隨爪素嘘氣應口見歛􅁭思輕衣出入忘華扇覩物識時移頋巳知節變晉孫綽詩曰蕭瑟仲秋月飂戾風雲髙山居感時變逺詠興長謡踈林積涼氣虚岫結凝霄零露灑庭林宻葉辭榮條撫茵悲先落攀松羡後凋宋劉鑠詩曰旻天清旦髙秋氣發􅀄凉白露下微津明月流素光凝煙泛城闕凄風入軒房朱華先零落緑草就芸黄纎羅還笥篋輕紈改衣裳宋江逌詩曰祝融解炎轡蓐收起凉駕長林悲素秋茂草思朱夏鳴鴈薄雲嶺蟋蟀吟深榭寒蟬向夕號驚飈激中夜感物増人懷悽然無忻暇宋謝惠連懷秋詩曰平生懷苦心矧復值秋晏皎皎天月明弈弈河􅀫爛蕭瑟含風蟬嘹唳度雲鴈寒啇動清閨􅀌燈曖幽幔又曰擣衣詩曰衡紀無淹度晷運倐如催白露滋園菊秋風落庭槐肅肅莎雞羽烈烈寒螿啼夕隂結空幕霄月皓中閨美人式常服端􅅚相招携簮玉出北房鳴金歩南階􅉉髙砧響發楹長杵聲哀宋湯惠休白紵舞歌詩曰秋風嫋嫋入曲房羅帳含月思心傷蟋蟀夜鳴断人膓長夜思君心飛􅀭它人相思君相忘錦衾瑶席爲誰芳又古歌八變曰北風􅀄秋至吹我章華臺浮雲多暮色似從崦嵫來宋鮑昭荅湯惠休曰枯桑葉易零疲客心易驚今兹亦何早巳聞絡緯鳴回風滅且起卷蓬息復征愴愴簟上寒}
