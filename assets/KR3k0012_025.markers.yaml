  - {type: variant, offset: 100, length: 0, content: '', WYG: 盧公範者盧懷慎之家法也臨海異物志曰黄雀常以八月入海化爲魚博物志曰舊説天河與河海通近世有人居海渚者年年至八月浮槎來往返不失期其人乃至槎上賫糧食乗槎而去至天河見牽牛飲牛渚世説曰張季鷹辟齊}
