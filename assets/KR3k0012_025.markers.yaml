  - {type: variant, offset: 2711, length: 1071, content: 色囊承取柏葉下露露皆如珠子亦云赤松先生取以明目今八月朝作眼明囊像此也鄧明德南康記曰平固縣有湖中有石鴈浮在湖中每至秋石鴈飛鳴如候時也莊子曰舜以天下讓善卷曰余立於宇宙之中冬日衣皮毛夏日衣葛絺春耕種足以勞秋收之足以休日出而作日入而息逍遙於天地之間何以天下為哉入深山莫知其處又曰荊之南有冥靈者以五百歲為春五百歲為秋上古有大椿者以八千歲為春以八千歲為秋管子曰東方曰歲星其時曰春其氣曰風風生木南方曰日其時曰夏其氣曰陽陽生火西方曰辰其時曰秋其氣曰陰陰生金北方曰月其時曰冬其氣曰寒寒生水管子曰秋三月以庚辛之日發五政一政曰禁愽賽二政曰無見五兵之刃三政曰慎旅農趨聚收四政曰補缺坼修垣墻謹門閭五政曰徇時五穀之皆入也又曰歲有四秋春農事既成農夫賦耜鐵此春之秋夏至蠶纊之所作此夏之秋秋成五穀之所會此謂大秋冬營室中女事紡績之所作此謂冬之秋文子曰日月欲明浮雲盖之藂蘭欲茂秋風敗之又曰政失於秋大白出入無常文子曰因春而生因秋而殺所生不德所殺不怨即幾於道矣春秋無心生殺有時人主無為當罰必當遠違其理近合其道又曰唯神化為貴精至為神精之所動若春氣之生秋氣之殺其生也暄然如春物得其生死也肅然如秋物終於死故生不祈報死無歸怨生之死之以其無心也幽求子曰秋風晨厲則慘然多悽抱朴子曰南海之中蕭丘之上有自生火火常以秋起而秋減鄒子曰秋取柞楢之火淮南子曰春氣發而百草生正得秋而萬物成實又曰春女怨秋士悲感物化矣又曰至秋三月青女乃出降霜雪青女乃天神青霄玉女主霜雪又曰一葉落而知天下秋又曰太陰治秋則欲脩備繕兵金德斷割故脩兵也又曰孟秋之月西宮御女白色白采橦白鐘其兵鉞其畜狗八月官尉其樹柘九月官候其樹槐又曰秋為矩者所以方物也又曰九月失政三月春風不濟濟止也又曰時則曰六合孟春與孟秋為合仲春與仲秋為合季春與季秋為合孟夏與孟冬為合仲夏與仲冬為合季夏與季冬為合孟春始盈孟秋始縮仲春始出仲秋始內出二月播植也內八月收歛也季春大出季秋大內孟夏始緩孟冬始急緩四月陽炎急十月寒肅仲夏至脩仲冬至短夏至北極冬至南極季夏德畢季冬刑畢德畢陽施窮也刑畢陰殺盡也又曰西方金也其帝少昊其佐蓐收執矩而治秋其神為太白又曰西方之極自崑崙絕流沙沉羽西至三危之國流沙蓋在崑崙之西南也石城金室飲氣之民不死之野少昊蓐收之所司者萬二千里其令曰審用法誅必辜備寇賊禁姦邪飭群牧謹著聚脩城郭補決竇塞蹊徑遏溝瀆擁谿谷守門閭陳兵甲選百官誅不法應金斷也鶡冠子曰斗柄西指天下皆秋尸子曰秋為禮西方為秋秋肅也萬物莫不肅敬禮之至也啇子曰螟螣春生秋死出而民失食今一民耕而百人食焉螟螣大矣呂氏春秋曰秋早寒冬必暖春多雨夏必旱太玄經曰酉西方也秋也物皆成象而就也有形則復於無形故曰冥也謂物終藏, SBCK: ''}
