  - {type: variant, offset: 105, length: 21, content: 萬物成所以悅也書曰分命和仲宅西曰昧谷寅餞納, SBCK: 風蕭蕭愁殺人出亦愁入亦愁胡地多颷風樹木何蕭蕭離家}
  - {type: variant, offset: 105, length: 0, content: '', WYG: 至以矩矩之爲度也肅而不勃剛而不匱取而無怨内而無害威厲而不懾令行而不廢殺伐既得仇敵乃克矩正不失百職乃服乙巳占曰太白主秋人君當秋之時太白以施政則吉逆則凶秋時行冬令則辰星之氣干於太白黑色而有芒角隂氣太勝戎兵乃來風灾數起國多盗賊邊境不寧而地震坼國有大喪重獄秋時行春令歳星之氣干於太白青色昩小則國旱君有大憂陽氣陵遲五糓不實秋雨不降草木非時生榮矣秋時行夏令則熒惑之氣干於太白赤色而怒國多火寒熱不節人多瘧疾蟄蟲不藏矣大衍星分圖曰八月酉日月㑹于夀星天文録曰胃昴趙之分野自胃七度止畢十二度於辰在酉大梁之疆也八月之時白露始降}
