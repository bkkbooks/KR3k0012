  - {type: variant, offset: 101, length: 2, content: 弼注, SBCK: 諐期懷秋賦曰哀時來之慘悽悼秋氣之可悲古樂府􅁔詩}
  - {type: variant, offset: 101, length: 2, content: 弼注, WYG: 東曹掾在洛見秋風起囬思吳中蓴菜羮鱸魚鱠曰人生貴適志耳何能從宦數千里以要名爵遂命駕便歸俄而齊王敗人皆謂見幾而作又王子敬云從山隂道上行山川自相映發使人應接不暇若値秋冬之時尤難為懷隂陽五行厯曰一時爲三月一月爲一秋三月爲三秋又一日爲三秋故三月有九秋之名也明堂之制}
