  - {type: variant, offset: 2086, length: 3, content: 厚加贈, SBCK: 守三國將誅路中大夫韓詩外傳曰越王勾踐使廉稽獻民於荆使者越夷狄之國也臣請欺其使者荆王越曰王賢人也其使者亦賢子慎之使者出見廉稽曰冠則得以見廉稽曰夫越亦周室之列封也不得處中國則處江海之陂與黿鱣魚鼈爲伍文身剪髮而後處焉今來至上國必曰􅃣乃得見不􅃣不得如此則大國使適越亦將劓墨文身剪髮而後得見乎荆王披衣出謝}
