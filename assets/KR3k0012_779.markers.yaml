  - {type: 'tls:seg', offset: 45, content: '', id: KR3k0012_CHANT_779-1a.10}
  - {type: variant, offset: 47, length: 276, content: 使青徐招降張步等五校尉皆降其冬拜隆為光祿大夫復使於步皆招懷綏輯多來附隆帝嘉其功以比之酈生即拜步為東萊太守劉永復遣使立步為齊王步貪受王爵猶與未決隆曉譬曰高祖與天下約非劉氏不王今可得為十萬戶侯耳步欲留隆與共守二州隆不聽求得反命步不從乃執隆隆遣間使上書曰臣隆奉使無狀言罪大也受執凶逆雖在困戹授命不顧又吏人知步反叛心不附之願以時進兵無以臣隆為念也臣隆得生歸闕庭受誅於有司此其大願若令沒身寇手以父母兄弟長累陛下陛下與皇后太子永享萬國與天無極帝得隆奏召其父湛流涕以示之曰隆可謂有蘇武之節恨不且許而遽求還也其後步遂殺之時人莫不憐哀焉以其子瑗為中郎又曰奉車都尉竇固出擊, SBCK: 往至}
