  - {type: variant, offset: 367, length: 1646, content: 固以為能遣與從事郭恂俱使西域超到鄯善鄯善本西域樓蘭國也後改為鄯善去陽關一千六百里去長安六千一百里鄯善王廣奉迎超禮敬甚備後忽更踈懈超謂其官屬曰寧覺廣禮意蒲乎此必有北虜使來狐疑未知所從故也明者覩其未萌況已著耶乃召侍胡詐之曰匈奴使來數日今安在乎侍胡惶恐具服其狀超乃閉侍胡悉會其吏三十六人與共飲酒酣因激怒之曰卿曹與我俱在絕域欲立大功以求富貴今虜使到裁數日而王廣禮敬即廢如今鄯善收吾屬送匈奴骸骨長為豺狼食矣為之柰何官屬皆曰今在危亡之地死生從司馬超曰不入虎穴不得虎子當今計獨有因夜以火攻虜使彼不知我多少必大震怖可殄盡也滅此虜則鄯善破膽功成事立矣眾曰當與從事議之超怒曰吉凶決於今日從事文俗吏聞此必恐而謀泄死而無所名非壯士也眾曰善初夜遂將吏士往奔虜營會天大風超令十人特鼓藏虜舍後約曰見火燃者當鳴鼓大呼餘人悉持弓弩夾門而伏超乃順風縱火前後鼓噪虜眾驚亂超手格殺三人吏兵斬其使及從士三十餘級眾百許人悉燒死明日乃還告郭恂恂大驚既而色動超知其意舉手曰掾雖不行班超何心獨擅之乎恂乃悅超於是召鄯善王廣以虜使首示之一國震怖超曉告撫慰遂納子為質還奏於竇固固大善具上超功効并求更選使使西域帝壯超節詔報曰吏如班超何故不遣而更選乎今以超為軍司馬令遂前功又曰鄭眾字伯師拜越騎校尉使匈奴至北庭虜欲令拜眾不屈單于大怒不與水火欲脅伏眾拔劍自誓單于乃止又曰張網字文紀為侍御史漢安元年選八使徇行風俗皆耆舊知名多歷顯位唯網年少官資最微餘人受命之部而綱獨埋其車輪於洛陽都亭曰豺狼當路安問狐狸遂奏大將軍梁冀弟河南尹不疑皆蒙外戚之任居阿衡之職不能敷揚五教專務虵豕而已帝雖知綱言公直然不忍行用也時廣陵賊張嬰殺太守據部冀乃用綱為廣陵太守綱至乃陳示禍福嬰等開門出降網乃撫納離叛使各得安居部內肅清帝嘉之賜錢十萬續漢書曰大使車乘駕駟赤帷持節者重導伍百瑣弩十二人小使車蘭與赤轂赤帷從騶騎四十人又曰周舉字宣光順帝時詔八使遣巡行風俗皆選素有威名者拜舉侍中杜喬守光祿大夫周栩前貴州刺史馮羨尚書欒巴侍御史張綱兗州刺史甄遵太尉張史劉班普守光祿大夫分行於天下其刺史二千石有贓罪顯明者驛馬上之墨綬以下便輒收舉其有清忠惠利為百姓所安宜表異者皆以狀上於是八使同時俱拜天下號曰八俊舉於是劾奏貪猾表薦清公朝廷稱之又曰范滂字孟愽汝南征西人厲清節為州所服舉孝廉時冀州飢荒盜賊群起乃使滂案察之滂登車攬轡慨然有澄清天下之志乃至州境守令自知贓汙望風解印綬去其所舉奏莫不厭伏眾議東觀漢記曰來歙字君叔南陽人也建武五年持節送馬援奉璽書於隗囂囂遣子恂隨入侍時山東略定帝謀西牧囂兵與俱伐蜀囂將三元說囂故不決歙素剛直遂發憤責之曰國家以公知臧否曉廢興故以手書暢至意足下擁忠誠眷委質是君臣父子信也今乃欲從佞惑之言為族滅之計叛主負子違背忠信吉凶之決在於今日因欲前刺囂囂起入部勒兵將殺歙歙徐杖節就車而去又曰隗囂甚重馬援以為綏德將軍時公孫述稱帝囂使援往觀之援素與述同鄉里相善以為至當握手迎如平生而述方盛陳陛衛以延援入交拜禮畢就館更為援製都布單衣交讓冠會百官於宗廟立舊交之位述鸞旗旄騎警蹕就車禮甚盛欲以援封侯食大將軍位賓客皆樂留援曉之因而辭歸謂囂曰子陽井底鼃耳不如專意東方囂乃使援奉書洛陽援至引見於宣德殿上迎笑謂之曰卿遨遊二帝間見卿使人慚援頓首謝曰當今之世非獨君擇臣臣亦擇君臣與公孫述少相善臣前至蜀述陛戟而後進臣今遠來陛下何知非刺客而簡易如此於是上復笑曰卿非刺客顧說客耳援乃曰天下反覆自盜名字者不可勝數今見陛下恢廓大度同符高祖乃知帝王自有真也又曰郭丹從師於長安買傳入函谷關乃慨然歎曰丹不乘使者車終不出關後三公舉丹賢能徵諫議大夫丹自去家十有二年果乘高車出關如其志也何賢之有伊曰以地言尉佗不在弊邑馮弘聞而大悅還封都亭侯後魏書曰燕鳳字子章代人也拜代王左長史參決國事常使符堅堅問鳳曰代王何如人也對曰寬和仁愛經略高遠一時雄主也常有并吞天下之志堅曰卿輩北人無剛甲利器敵弱則進敵強則退安能兼并也鳳曰北人壯掉上馬持三仗驅使若飛主人雄雋率服北土控弦百萬號令若一軍糧輕重樵自若輕行速捷因敵取資此南方所以疲弊北方所以常勝也堅曰彼國人馬多少鳳曰, SBCK: ''}
