  - {type: variant, offset: 2079, length: 0, content: '', SBCK: 縛一人從殿前過佯問之此何罪也左右荅曰此齊人也今犯盗王謂晏子曰齊國善盗也晏子荅曰臣聞江南生橘江北爲枳土地使其然也臣察此人在齊不爲盗今來楚而盗亦土地使然也楚王大慙漢雜事曰呉楚七國反齊孝王城守膠西濟南三國圍齊齊使路中大夫告於天子還報曰堅守此至三國圍齊已數重矣無從入三國將與路中大夫盟􅀂反}
