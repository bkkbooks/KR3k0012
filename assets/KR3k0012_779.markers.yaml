  - {type: variant, offset: 2138, length: 0, content: '', krp: 獻之文侯曰嘻擊知吾好北大晨鳬也即見使者文侯曰擊無恙乎倉唐唯唯三問}
  - {type: variant, offset: 2139, length: 0, content: '', SBCK: 不對文侯曰不對何也倉唐曰臣聞諸侯下名君旣己賜弊邑使得小侯國不敢對也文侯曰中山君無恙乎倉唐曰今者之來拜送於郊文侯曰中山君長短􅀂何矣倉唐曰聞諸侯比諸侯不朝則側者皆人臣也臣無所比之然則所賜之裘幾能勝之矣文侯曰中山之君亦何好乎對曰好詩文侯曰於詩何好曰好􅁰離與晨風文侯曰􅁰離詩何哉對曰彼􅁰離離彼稷之苗行邁靡靡中心揺揺知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉文侯曰怨乎曰非敢怨也時思也文侯曰晨風謂何對曰詩云鴆彼晨風鬰彼北林未見君子憂心欽欽如何如何忘我}
  - {type: page-break, offset: 2139, content: '', id: KR3k0012_SBCK_779-3a}
  - {type: variant, offset: 2139, length: 0, content: '', WYG: 不對文侯曰不對何也倉唐曰臣聞諸侯下命君既已賜敝邑使得小國侯不敢對也文侯曰中山君無恙乎倉唐曰臣來時拜送于郊文侯曰中山王君長短若何矣倉唐曰聞諸侯比諸侯諸侯之朝則側者皆人臣無所比之然君所賜之裘幾能勝之矣文侯曰中山之君亦何好乎對曰好詩文侯曰於詩何好曰好黍離與晨風文侯曰黍離詩何哉對曰彼黍離離彼稷之苗行邁靡靡中心揺揺知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉文侯曰怨乎曰非敢怨也時思也文侯曰晨風謂何對曰詩云鴪彼晨風欝彼北林未見君子憂心欽欽如何如何忘我}
