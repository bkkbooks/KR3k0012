  - {type: variant, offset: 2559, length: 210, content: 常愽士轉虞部員外郎為入回紇副使回紇驕倨見漢使盛陳兵甲與其相不拜欲受漢使禮侑堅立不動宣命既畢虜使責之云欲留使者行人皆惶怖獨侑謂虜曰今可汗是漢家子壻坐受使臣禮是可汗無禮非使臣無禮也虜憚其嚴正卒不敢逼荊州先德傳曰費褘字文偉江夏人也吳與蜀和遣使張溫字惠怒來脩好溫辨好論議鮮能抑之諸葛亮以褘有俊才宜遣報溫使以褘為奉信校尉權時竊尊號意猶豫未決褘為陳存亡之晝開國建家之策權甚悅滑稽時知名皆在會並使發異端之難褘應機輒荅坐席稱之由是愛敬焉, WYG: 平御覽卷七百七十九}
