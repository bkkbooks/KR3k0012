  - {type: variant, offset: 2165, length: 1, content: 降, SBCK: 更臣之服也遂以諸侯禮見之又曰楚使者聘齊齊王享之梧宫使者曰大哉梧乎王曰江海之魚吞舟國之樹臣公使者王曰昔燕攻齊遵雄路渡濟橋楚雍問擊齊左而虚其右王鼎絶頭乎杜山公孫羌格死于龍門飲馬乎淄澠宣獲乎瑯瑘王與太后奔乎莒逃城陽之山此時梧之大小何如矣力渤對曰使者問梧之年即昔荆州王爲無道加諸申氏殺子胥父與兄子胥􅀍髮食於呉闔廬以爲相三年將兵復讎于楚戰勝舉級頭百萬囊瓦奔鄭王保於隨師入郢胥行郢都親射宫臨于王􅃁笞其墓􅀂此}
