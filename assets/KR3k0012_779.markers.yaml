  - {type: variant, offset: 2206, length: 0, content: '', SBCK: 周流斷城東西數萬里其中胡貊皆如其習俗得始大䔉蒲萄首蓿等語林曰魏武將見匈奴使自以形陋不足雄逺國使崔季珪代當坐自捉刀床頭座旣畢令人問魏王何如使荅曰魏王信曰雅望非常然床頭捉刀人此乃英雄也魏王聞馳遣殺此使天文要集曰天節星主奉使小而明則使中正也梁元帝鄭衆論曰漢丗銜命匈奴困而不食者二人而己子}
