  - {type: variant, offset: 2298, length: 181, content: 皆悉遍涉禎明二年加通直散騎常侍聘隋遇文帝伐陳禮成而不獲反命留縶賓館陳亡素服號泣於西陛下藉草三日有詔就館拜通直散騎常侍憙盡夜哀哭北面立垂涕再拜受詔明日乃朝伏泣於殿下悲不能勝左右曰我平陳唯獲此人既懷其舊君則我誠臣也勑以本官直門下省賜物千叚唐書曰大歷初以授歸崇敬倉部郎中兼御史中丞賜金紫充吊祭冊立新羅王使至海中流波濤迅急舟漏眾咸驚駭舟人請以小艇載崇敬避禍崇敬曰舟人凡數, SBCK: 第七}
