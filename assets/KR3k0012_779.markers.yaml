  - {type: variant, offset: 2017, length: 2, content: 數十, SBCK: 處焉割土盟誓然後求還華陽李郃別傳曰郃字孟君漢中人和帝即位分遣使者循州郡觀風俗皆微服單行使者二人當到益州􅄬公舎􅀫時夏月露坐爲出酒與談公仰視問曰二君發京師時寧知二使者何日發耶二人驚相視而曰不聞問公何以知之公指星有二使星向益部二人知其深明遂共談甚嘉異焉風俗通曰周􅁗常以􅀊八月遣輶車之使采異代方言還奏之事藏祕室晏子春秋曰晏子使呉呉稱曰天子請見晏子蹵然曰臣受命弊邑使於呉王臣迷惑入于天子之朝敢問呉王惡存呉王夫差請見以諸侯之禮又曰晏子使楚楚王進橘置削晏子不剖而并食王曰橘去剖對曰臣聞之賜人主者􅀲桃不削橘柚不剖臣故不敢剖臣非不知又曰晏子使楚楚人爲小門而延晏子晏子不入曰使狗國者從狗門入今臣使楚不當狗門入也王曰齊無人耶對曰齊之臨淄三}
