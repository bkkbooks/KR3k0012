  - {type: variant, offset: 2480, length: 289, content: 我何獨濟逡巡波濤稍息故事使新羅者至海東多有所求或攜資帛而往貨易規利崇敬一皆絕之東夷稱重其德又曰殷侑為童兒力學不念家產長能通經以講習自娛五經登第通歷代沿革擢為太常愽士轉虞部員外郎為入回紇副使回紇驕倨見漢使盛陳兵甲與其相不拜欲受漢使禮侑堅立不動宣命既畢虜使責之云欲留使者行人皆惶怖獨侑謂虜曰今可汗是漢家子壻坐受使臣禮是可汗無禮非使臣無禮也虜憚其嚴正卒不敢逼荊州先德傳曰費褘字文偉江夏人也吳與蜀和遣使張溫字惠怒來脩好溫辨好論議鮮能抑之諸葛亮以褘有俊才宜遣報溫使以褘為奉信校尉權時竊尊號意猶豫未決褘為陳存亡之晝開國建家之策權甚悅滑稽時知名皆在會並使發異端之難褘應機輒荅坐席稱之由是愛敬焉, SBCK: 七十九}
