  - {type: variant, offset: 637, length: 917, content: 死而浮出庫莫奚竊相謂曰池有靈魚犯之不祥乃出長城北道齊主分兵追擊獲牛羊七萬振旅而還水經曰魚復縣地多木瓜樹有子大如甒音武白黃實甚苦香爾雅之所謂楙也盛弘之荊州記曰魚復縣有固陵村地多木瓜樹其子大者如甒晉宮閣記曰華林園有木瓜五株廣志曰木瓜子可藏枝為一尺百二十節吳氏本草曰木瓜生夷陵虎丘山䟽曰山三面悉有木瓜何承天木瓜賦曰惟茲木之在林亦超類而獨劭方朝華而繁實比沙棠而有曜劉爾雅曰劉劉杙也劉子生山中實如梨酢甜核堅出交趾杙音弋吳錄地理志曰交阯羸僂縣有劉子樹出山中實如梨而味酸美郡內皆有之南方草物狀曰劉三月華七月八月熟其色黃其味酢出交阯武平興古九真吳都賦曰梌劉禦霜鬱周書曰夏食鬱棣也毛詩豳七月曰六月食鬱毛注曰鬱棣詩義䟽曰其樹高五六尺其實大如李正赤食之甜魏王花木志曰鬱薁樹高五六尺實大如李赤色食之甘廣雅曰一名雀李又名車下李又名郁李亦名棣亦名薁李子毛詩七月食鬱及薁即郁李也一名棣也呂氏本草曰郁核一名雀李一名車下李一名棣晉宮閣名曰華林園薁李一林司馬相如上林賦曰隱夫鬱棣合逯離支潘岳閑居賦曰梅杏薁棣之屬曹毗魏都賦曰若榴郁棣杜梨爾雅曰杜甘棠今之杜梨也山海經曰岷山其木多棠韓詩外傳曰邵伯在朝所司請召民邵伯曰不勞一身而勞百姓此非文王之志也於是廬於棠樹之下百姓大悅詩人見而歌焉毛詩鵲巢甘棠曰蔽芾甘棠勿剪勿伐召伯所茇毛云甘棠杜也詩義䟽曰今棠梨也一名杜梨如梨而小有甜酢可噉也毛詩蟋蟀杕杜曰有杕之杜生于道周陸氏毛詩䟽義曰杕杜杜赤棠也與白棠同但有赤白美惡子白色者為白棠白棠甘棠也多酸美滑赤棠子澀而酢者也俗語澀如杜是也木理亦赤可以作弓材孫楚杕杜賦序曰家弟以虞氏梨賦見示余謂豈以梨有用之為貴杜無用之為賤故賦之㮕棗晉宮閣名曰華林園㮕音軟棗四株廣志曰㮕棗味如柿晉陽楛㮕肌細而厚以供御范子計然曰㮕棗出漢中郡崔豹古今注曰㮕棗葉如柿實似柿而小味甘美司馬相如子虛賦曰樝梨梬栗梬楟棗也橘柚芬芳左思蜀都賦曰林檎枇杷橙柿梬楟榛毛詩邶柏舟簡兮曰山有榛隰有苓陸機毛詩䟽義曰山有榛枝葉似粟樹子似橡子味似栗枝莖可以為燭毛詩鄘柏舟定之方中曰樹之榛栗椅桐梓漆詩義䟽曰榛栗屬有兩種其一種大小皮葉皆如栗其子小形似杼子味亦如栗所謂樹之榛栗者也其一種枝莖如木蓼生高丈餘作胡桃味遼代上黨皆饒周禮天官下籩人職曰饋食之籩其實榛, WYG: 薄}
