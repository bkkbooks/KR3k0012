  - {type: variant, offset: 1855, length: 3, content: 雷柚實, WYG: 糝因其草似鬼目甘蔗説文曰藷蔗也漢書禮樂志郊祀歌曰百末㫖酒布蘭生泰尊柘漿析朝酲應劭曰柘漿取柘汁以為飲也吳録地理志曰交阯句屚音漏縣甘蔗大數寸其味醇美異于他處笮以為餳曝之凝}
  - {type: page-break, offset: 1855, content: '', id: KR3k0012_WYG_974-7a, image: WYG0901/WYG0901-0564a.png}
