  - {type: variant, offset: 979, length: 222, content: 名雀李又名車下李又名郁李亦名棣亦名薁李子毛詩七月食鬱及薁即郁李也一名棣也呂氏本草曰郁核一名雀李一名車下李一名棣晉宮閣名曰華林園薁李一林司馬相如上林賦曰隱夫鬱棣合逯離支潘岳閑居賦曰梅杏薁棣之屬曹毗魏都賦曰若榴郁棣杜梨爾雅曰杜甘棠今之杜梨也山海經曰岷山其木多棠韓詩外傳曰邵伯在朝所司請召民邵伯曰不勞一身而勞百姓此非文王之志也於是廬於棠樹之下百姓大悅詩人見而歌焉毛詩鵲巢甘棠曰蔽芾甘棠勿剪勿伐召伯所茇毛云甘棠杜也詩義䟽曰今棠梨也一名杜梨如梨而小有甜酢, SBCK: 屋酒}
