  - {type: variant, offset: 1202, length: 352, content: 噉也毛詩蟋蟀杕杜曰有杕之杜生于道周陸氏毛詩䟽義曰杕杜杜赤棠也與白棠同但有赤白美惡子白色者為白棠白棠甘棠也多酸美滑赤棠子澀而酢者也俗語澀如杜是也木理亦赤可以作弓材孫楚杕杜賦序曰家弟以虞氏梨賦見示余謂豈以梨有用之為貴杜無用之為賤故賦之㮕棗晉宮閣名曰華林園㮕音軟棗四株廣志曰㮕棗味如柿晉陽楛㮕肌細而厚以供御范子計然曰㮕棗出漢中郡崔豹古今注曰㮕棗葉如柿實似柿而小味甘美司馬相如子虛賦曰樝梨梬栗梬楟棗也橘柚芬芳左思蜀都賦曰林檎枇杷橙柿梬楟榛毛詩邶柏舟簡兮曰山有榛隰有苓陸機毛詩䟽義曰山有榛枝葉似粟樹子似橡子味似栗枝莖可以為燭毛詩鄘柏舟定之方中曰樹之榛栗椅桐梓漆詩義䟽曰榛栗屬有兩種其一種大小皮葉皆如栗其子小形似杼子味亦如栗所謂樹之榛栗者也其一種枝莖如木蓼生高丈餘作胡桃味遼代上黨皆饒周禮天官下籩人職曰饋食之籩其實榛, SBCK: 薄}
