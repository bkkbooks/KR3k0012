  - {type: variant, offset: 1850, length: 1, content: 別, SBCK: 􅀑目益智直爾不敢噉可爲漿也交州記曰􅀑目樹似棠梨葉似楮皮白樹髙大如木􅀲而小邪傾不周正味酢九月熟又}
  - {type: variant, offset: 1850, length: 1, content: 別, WYG: 鬼目益智眞爾不敢噉可為漿也交州記曰鬼目樹似棠梨葉似紙皮白樹髙大如木瓜而小邪傾不周正味酸九月熟又}
  - {type: variant, offset: 1850, length: 1, content: 別, krp: 鬼目益智直爾不敢噉可爲漿也交州記曰鬼目樹似棠梨葉似楮皮白樹髙大如木瓜而小邪傾不周正味酢九月熟又}
