  - {type: variant, offset: 254, length: 189, content: 吳錄地理志曰高涼安寧縣有餘甘初食之味苦後口中更甘臨海異物志曰餘甘子如梭形出晉安候官界中餘甘橄欖同一果耳雲南記曰瀘水南岸有餘甘子樹子如彈丸許色微黃味酸苦核有五稜其樹枝如枯枝葉如小夜合葉陳祁暢異物志曰餘甘大小如彈丸大視之理如定陶瓜片初入口如苦忽咽口中乃更甜美鹽而蒸之尤美可多食之朱崖故事曰朱崖果有餘甘左思吳都賦曰其果則丹橘餘甘荔支之林蒟子漢書曰番陽令唐蒙風曉南粵南粵食蒙蜀枸醬注曰枸, SBCK: 藷燕薁廉薑枳椇}
