  - {type: variant, offset: 1573, length: 1, content: 梓, SBCK: 柳子似􅃢瑚其味如􅁡十一月熟樹乾者益羙岀南方大如指頭崔豹古今注曰枳椇子一名樹􅁡一名木錫實形拳曲核在實外味甜羙如餳蜜一名白石一名木石一名枳椇也探音蟾南越志果名似柰而酸薛瑩荆楊以南異物志曰探子樹産山中實似梨冬熟味酸丹陽諸郡有之蒳音納異物志曰蒳草樹果如栟櫚而小三月採其葉細破乾之味近苦雞舌香食之益善也顧徽廣州記曰山㯽榔大於蒳子蒳子土人亦呼爲㯽榔左思吴都賦曰藿蒳荳䓻木威顧徽廣州記曰餘甘甘蕉木威黄皮其味殊苦顧徽廣州記曰木威髙丈餘子如橄欖而堅削去皮以爲粽榞木吴録地理志曰廬陵南部雩都縣有榞樹其}
  - {type: page-break, offset: 1573, content: '', id: KR3k0012_SBCK_974-1b}
