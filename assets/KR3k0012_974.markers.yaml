  - {type: variant, offset: 1596, length: 2, content: 栗而, WYG: 南方橄欖子其味甜常五月十月熟諺言楊桃無蹙一嵗三熟其色青黄核如􅀥核又曰楊桃子生晉安侯官縣一}
  - {type: variant, offset: 1596, length: 0, content: '', krp: 南方橄欖子其味甜常五月十月熟謔言楊桃無蹙一歳三熟其色靑黄核如棗核臨海異物志曰楊桃子生晉安候官縣一小樹得數十石實大三寸可蜜藏之庾仲𥘉楊都賦曰楊桃枇杷楊榣臨海異物志曰楊榣有七脊子生樹皮中其躰雖異味則無竒長四五寸色青黄味甘也冬熟臨海異物志曰冬熟如指大正赤其味甘勝梅猴闥臨海異物志曰猴闥子如指頭大其味小苦可食關桃臨海異物志曰關桃子其味酸土翁臨海異物志曰土翁子如漆子大熟時甜酸其色青黒狗槽臨海異物志曰狗槽子如指頭大正赤其味甘雞橘臨海異物志曰鷄橘子如指頭大味甘永寜南界中有之猴惣臨海異物志曰猴惣子如指頭大與柿相似其味不減於柿多南臨海異物志曰多南子如指大其色紫味甘與梅子相似晉安候宫界中有王壇臨海異物志曰王壇子如棗大其味甘晉安候官越王祭壇邊有此果無知其名因見生處遂名王壇其形小於龍眼有似木瓜七月熟甘羙也王彪之閩中賦曰王壇侯}
  - {type: variant, offset: 1597, length: 5, content: 而小任昉述, SBCK: 楊都賦曰草則龍目荔支王壇丹橘三廉出熈安郡雲母山見南趙志陳祈暢}
