  - {type: variant, offset: 1861, length: 0, content: '', SBCK: 數寸其味醇羙異於他處笮以爲餳嚗之凝如氷破如􅀶碁入口消釋江表傳曰孫亮使黄門以銀盌并蓋就中藏吏取交州所獻甘蔗􅃬黄門先恨藏吏以䑕矢投餳中啓言吏不謹亮呼吏持餳器入門曰此器旣蓋之且有油覆無縁有此也黄門將有恨汝耶叩頭曰常從臣求官莞蓆有數不敢與亮曰必是此也問具服即於前加髠鞭斥外付晉書曰顧愷之每食蔗自尾至夲人或問之曰漸入佳境宋書曰􅁃仲文好貨劉雍自謂得其􅂇力事之如父夏中送甘蔗又曰元嘉末魏太武征彭城遣使至小市門致意求甘蔗及酒孝武遣人送酒二器甘蔗百挺齊書曰冝都王鏗善射常以堋的太闊曰終日射侯何難之有乃取甘蔗挿地百歩射之十發十中又曰范雲永明十年使魏魏人李彪宣命至雲所甚見稱羙彪爲設甘蔗黄粽隨尽復益彪􅀏謂曰范散􅀐小驗之一盡不能復得梁書曰􅁃沙弥性至孝母劉亡好噉甘蔗沙弥遂不食焉三國典略曰陸納反湘州分其衆二千人夜襲巴陵晨至城下冝豊候脩出壘門座胡牀以望之納衆乗水來攻矢下如雨脩方食甘蔗曽無懼色部分軍旅鼔而進之遂獲其一艦生擒六千人納遂㱕保長沙又曰侯景至朱雀街南建康令􅁃信守朱雀門俄而景至信衆撤桁始除一舶見景軍皆着鐵靣退隱于門自言口􅏫屢求甘蔗俄而飛箭中其門柱信手中甘蔗應弦而落隋書曰赤土國物産多同於交阯以甘蔗作酒雜以紫􅀲根酒色黄赤味亦香羙永嘉郡記曰樂城縣三州府江有三洲因以爲名對岸有浦名爲菰子出好甘蔗盧諶􅀕法曰冬祀用甘蔗范汪祠制曰孟春祠用甘蔗扶南傳曰安息國岀甘蔗}
