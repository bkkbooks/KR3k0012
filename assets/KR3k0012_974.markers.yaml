  - {type: variant, offset: 1859, length: 1, content: 升, SBCK: 之亦可爲糁周其草似􅀑目甘蔗􅀃文曰藷蔗也漢書禮樂志郊祀歌曰百味旨酒布蘭生泰尊柘漿㭊朝酲應劭曰柘漿取柘汁以爲飲也吴録地理志曰交阯句屚音漏縣干蔗}
  - {type: variant, offset: 1859, length: 2, content: 升大, WYG: 氷破如博碁入口消釋江表傳曰孫亮使黄門以銀椀并蓋就中藏吏取交州所獻甘蔗餳黄門先恨藏吏以䑕矢投餳中啓言吏不謹亮呼吏持餳噐入問曰此噐既蓋之且有掩覆無縁有此也黄門將有恨於汝耶叩頭曰常從臣求官中莞蓆有數不敢與亮曰必是此也問之具服即於前加髠鞭斥付外署晉書曰顧愷之毎食蔗自尾至本人或問之曰漸入佳境宋書曰庾仲文好貨劉雍自謂得其助力事之如父夏中送甘蔗若新發於州又曰元嘉末魏太祖征彭城遣使至小市門致意求甘蔗及酒孝武遣人送酒二噐及甘蔗百根南史曰宜都王鏗善射常以堋的太濶曰終日射侯何難之有乃取甘蔗挿地百歩射之十發十中又曰范雲永明十年使魏魏人李彪宣命至雲所甚見稱美彪為設甘蔗黄甘粽隨盡復益彪笑謂曰范散騎小復儉之一盡不可復得梁書曰庾沙彌性至孝母劉氏好噉甘蔗母亡沙彌遂不食焉三國典畧曰陸納反湘州分其衆二千人夜襲巴陵晨至城下宜豐侯修出壘門坐胡床以望之納衆乗水來攻矢下如雨修方食甘蔗曾無懼色部分軍旅鼓而進之遂獲其一艦生擒六十人納遂歸保長沙又曰侯景至朱雀航南建康令庾信守朱雀門俄而景至信衆撒術始除一舶見景軍皆着銕面退隐于門自言口燥屢求甘蔗俄而飛箭中其門柱信手中甘蔗應弦而落隋書曰赤土國物產多同于交阯以甘蔗作酒雜以紫𤓰根酒色黄赤味亦香美永嘉郡記曰樂城縣三州府江有三洲因以為名對岸有浦名為菰子出好甘蔗盧諶祭法曰冬祀用甘蔗范汪祠制曰孟冬祀用甘蔗扶南傳曰安息國出甘蔗}
