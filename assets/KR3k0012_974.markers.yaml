  - {type: variant, offset: 2670, length: 193, content: 中夏之桑椹也但椹稀而赤九千歲一生實耳楊衒之洛陽伽藍記曰願會寺中書侍郎王翊捨宅立也佛堂前生桑樹一株直上五尺枝條橫遶柯葉傍布形如羽蓋復高五尺凡為五重每一重葉椹各異京師道俗謂之神桑觀者成市布施者甚眾帝聞而惡之以為惑眾命給事黃門侍郎元紀伐殺之其日雲霧晦冥下斧之處流血至地見者莫不悲泣東方朔神異記曰東方有樹高八十丈敷張自輔葉長一丈廣六七尺名曰桑上有椹長三尺五寸其圍如數異苑曰漢興平元年九月桑再椹時, SBCK: 琥珀}
