  - {type: variant, offset: 364, length: 0, content: '', WYG: 友聞楚成王賢好士三人俱徃見之於豪嶔岩之間卒逢飄風暴雨俱伏於空栁之下衣寒粮乏度不俱活三人相親歎曰與其飢寒俱死豈若并衣粮於一哉二子以革子為賢推衣與之革子曰生者同樂死則兵之固辭二子曰吾相與猶左右手也左傷則右救右傷則左勞子不我受俱死無名何庸乎於是革子受之二子遂凍餓而死其思革子揭衣粮而去徃見楚王王知其賢用百酒嘉殽設鼓樂之革子有憂悲之色楚王乃推樽罷樂升琴而進之其思革子援琴而鼓作相與别散之志孫楚牽招碑曰初君與𤣥德少長河朔英雄河契為刎􅖪之交友有横波截流柎翼横飛之志俄而委質於太祖劉遂鼎足於蜀漢所交非常為時所忌每自酌損乎季夏之間蔡邕真定直父辟曰其接友也審辦真偽明于知人度終始而後交情不踈而貌親夏侯湛鮑叔象賛曰鮑子愔愔式昭德音綢繆陳仲二人同心厥芳猶蘭其堅如金遥遥景迹}
