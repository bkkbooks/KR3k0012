  - {type: variant, offset: 35, length: 0, content: '', WYG: 㑹稽孔道徵亦守志産與友善又曰薛彪之間陶隠居委􅀈架石室與蒋負蒭鄰居接宇彪歡曰彼二人者可為道友何為乆滯東川於是命棹来歸便相就共住日夕講習又曰潘洪字文盛山隂人㓜辭家入山修禀上法陶貞白見而悦之遂與投分共遊諸處尋求真書又曰許邁字逺遊少與髙陽許詢並治髙節同志齊名詢能清言兼有詞藻邁愽學亦善屬文廣州先賢傳曰董正字伯和番禺人也隠士南陽車遂字徳陽聞正令名不逺萬里徑来投正正道同志合恩如仲伯數年中遂得病正為傾家救恤病篤命絶停屍於堂殯歛之禮如同生身自送䘮於南陽殷士世傳曰殷褒字元祚渤海府君之子河南鄭亷始出寒賤又未知名見而友之亷父常居肆乃就拜其父於中衆皆驚亷由是顯名位至司徒荀氏家傳曰荀羡與沛國劉真長太原王仲祖陳郡商洪源並著情契太宗時居阿衡之任虛中誘納賔友賢哲與羡等數人為布衣之好又曰荀粲簡貴不能與常人交接所交者皆一時雋傑粲卒至葬夕赴者千餘人皆同年名士也哭之盛慟路人悲之嵇康髙士傳曰逢萌條房李雲王尊同時相友世號之四子海内先賢傳曰潁川鍾皓字季明為郡功曹時陳寔為西門亭長皓深禮之與同分義皓辭公府太守問誰可代君皓曰明府必得其人西門亭長可也張}
