  - {type: variant, offset: 61, length: 4, content: 宋徵為庶, SBCK: 與人期約雖遭􅁀風疾􅀨無不至者甞從建鄴辭太􅀓諸葛恪恪問何當復來恕荅曰某日當復親覲至是日恪停食􅀱恕至時賔客㑹者皆以爲稽建業相去千餘里道隔江湖豈得如期湏􅁷恕至一坐盡驚又曰賀劭字興伯山隂人也爲人羙姿容動静有常與人交乆而敬之又曰虞倫字孝緒餘姚人也與駱瑗爲彈􅃣之友吴録曰歩隲與衛於同年相善俱以種􅀲自給晝勤四體夜誦經傳三輔决錄曰游殷爲胡軫所害同郡􅁻伯房郭公休與殷同歳相善爲緦麻三月趙歧三輔决錄曰蔣詡字元卿舎中三徑唯羊仲裘仲從之遊二仲皆雅廉逃名之士華陽國志曰洛陽慶鴻慷􅁣好義廉范與爲刎頸之交時人稱曰前有管鮑後有慶廉陳留志曰韋􅁃字宣明襄邑人也常居園中故世謂之園公與河内軹人角里先生綺里季夏黄公爲友皆修道㓗已非義不踐當􅁗末避代入啇洛山隱居自娱竹林七賢諭曰嵇康字叔夜與東平吕安少相知友每一相思輙千里命駕又曰山濤與阮藉嵇康皆一面契􅀂金蘭濤妻韓氏甞問濤曰吾當年可爲交者唯二人而已崔豹古今注曰鄭弘行䆠京洛未至夜􅀫一壖如過而縁二切河邊地也於是逢舊友四人四頋荒郊村落絶逺酤酒無處情抱不申仍各以錢投水中依評共飲盡夕酣暢皆得大醉因名沉釀川劉向􅀃苑曰伯牙}
