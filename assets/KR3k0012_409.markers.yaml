  - {type: variant, offset: 12, length: 11, content: 晉安帝義熙初高祖命瑯琊, krp: 吴有程普者頗以年長數凌侮周瑜瑜折節下容終不之與交普後自敬服而親重之乃告人曰與周公瑾交若飲醇醪不覺自醉袁宏山濤別傳曰陳留阮籍譙國嵇康並髙才逺識少有陪其契者濤𥘉不識一與相遇便爲神交列士傳曰六國時羊角哀與左伯桃爲友聞楚}
