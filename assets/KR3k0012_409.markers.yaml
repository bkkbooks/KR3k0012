  - {type: variant, offset: 1568, length: 755, content: 璟張仲之為忘年之友又曰蕭昕河南人也開元中首舉博學宏詞授陽武簿後遷左拾遺昕嘗與布衣張鎬友善表薦之曰如鎬者用之則為王者師不用則幽谷一叟爾玄宗擢鎬拾遺後為將相又曰權皋德輿之父大曆中卒于家元和中謚曰貞孝初皋卒韓洄王定為服朋友之喪李華為其墓表以為分天下善惡一人而已又曰杜伏威齊州章丘人也少為盜與鄉人輔公祐為刎頸之交公祐姑家以牧羊為業公祏數欀羊以餵之又曰楊憑字虛受為左散騎少負氣節與母弟凝凌相愛皆有名重交遊與穆質許孟容李鄘王仲舒為友故時人稱穆許李之交又曰朱敬則毫州永城人也長壽中為右補闕家代孝義敬則倜儻早以詞學知名與左史江融尚書左僕射魏元忠相友善又曰劉黑闥貝州漳南人也與竇建德少相友善家貧無以自給建德每資之黑闥所費至盡而不以為疑建德亦弗之間也又曰劉孝孫者荊州人也祖貞周石臺太守孝孫弱冠知名為當時詞人虞世南蔡君和孔德紹庾自直劉斌等登臨山水結為交會又曰陸象先弟監察御史景倩吏部侍郎景融大理正景獻河南令景裔皆有美譽僧一行少時與象先昆弟友善常謂人曰陸氏兄弟皆有才行古之荀陳無以加也又曰楊纂華州華陰縣人也父文偉隋溫州刺史纂略涉經史尤明時務少與瑯琊顏師古燉煌令狐德棻音芬友善大業中進士舉終為考功郎中又曰張道源嘗與友人客遊友人病中霄而卒道源恐驚擾主人遂共屍臥達曙方哭親步營送至其本鄉後仕隋為監察御史又曰孔紹安越州山陰人也陳吏部尚書奐子也少以文詞知名年十三入隋徙居京兆鄠縣閉門讀誦集數十萬言時有詞人孫萬壽與紹安篤忘年之好紹安大業末為監察御史又曰李密長安人也父寬隋上柱國蒲山公密開皇中襲父爵年始弱冠尚書令楊素見而奇之謂其子玄感曰李密智計不窮爾所不及可與為友玄感遂傾心禮遇定為刎頸之交又曰劉裔之徐州彭城人也少有學業與隋信都丞孫萬壽宗正卿李百藥為忘年之交又曰柳宗元移柳州時劉禹錫得播州宗元謂所親曰禹錫有母今為郡蠻方絕域萬里如何與母偕行吾於禹錫為, SBCK: 祗}
