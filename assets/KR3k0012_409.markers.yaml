  - {type: variant, offset: 406, length: 1917, content: 一文一詠雲輒嗟賞又曰張緬弟纘遷尚書吏部河東裴子野曰張吏部有喉舌之任子野性曠遠自云年出三十不復詣人初未與纘遇便相推重因為忘年交又曰蕭介性高簡少交遊唯與族兄琛從兄眕音軫素子洽從弟俶等文酒賞會時人以比謝氏烏衣之遊又曰高祖性不好聲色頗慕高名與裴子野劉顯蕭子雲張纘及當時才秀為布衣交何玄之梁典曰劉許字彥度與陳留阮藉李緒申金蘭之契築室鍾阜之傍共聽內義鑽尋奧典魏書曰夏侯尚字伯仁有籌畫智略文帝器之為布衣之交後魏書曰眭夸一名昶趙郡高邑人也少與崔浩為莫逆之交北齊書曰崔瞻與趙郡李概為莫逆之交概將東還瞻與之書曰仗氣使酒我之恒弊詆訶詣切在卿尤甚足下告歸吾於何聞過也又曰袁聿修歷任清華郎署之日值趙彥深為水部郎中同在一院因成交友彥深後被沙汰停私門生藜藋聿修猶以故情存問往來又曰裴讞魚列切之字士平不妄交遊唯與隴西辛術趙郡李繪頓丘李構清河崔瞻為忘年之友後周書曰柳弘字光道河東解縣人少聰潁工草隸博涉群書詞彩豐贍與弘農楊素為莫逆之交又曰張軌濟陰臨邑人也少好學志識開朗初在洛陽家貧與樂安孫仁為莫逆之交每易衣而出以此見稱又曰黎景希字季明河間鄭音莫人也好占玄象頗知術數而落魄音託不事生業與范陽盧道源為莫逆之交又曰韋敻休政切字弘遠志尚夷簡澹於榮利周弘正乃造敻談謔盡日恨相遇之晚也後請敻至賓館敻未赴弘正乃贈詩曰德星猶未動真車詎肯來當時所欽如此南史曰謝弘微性寬博無喜慍末年嘗與友人棊友人西南棊有死勢復一客曰西風急或有覆舟者友人悟乃救之弘微大怒投局於地識者知其暮年之事果以此歲終北史曰盧懷仁有行撿善與人交與瑯瑯王衍隴西李壽之情好相得嘗語衍云昔太丘道廣許劭知而不顧嵇生峭立鍾會遇而絕言語處季孟之間去其太甚衍曰然三十國春秋曰燉煌太守李暠古老切表於段業暠稱盡忠不貳橫為李嗣所讒請業殺嗣暠自歸司敗業乃殺嗣遣使謝暠初嗣與暠結刎頸之交嗣常以宗族託暠曰我身猶子身勿為疑也及是暠反為嗣所構暠乃恨之又曰姚萇單騎度淮見豫州刺史謝尚于壽陽幅巾以待之一面如舊相識又曰王鎮惡隨宋高祖入關中初鎮惡流寓崤澠崤澠人李方厚待之鎮惡曰待吾佇英雄王取萬戶侯乃厚相報方笑曰本縣足矣鎮惡力不絕人不閑弓馬略通諸子兵書縱橫有智計以此成名及是李方尚在鎮惡昇堂拜母表方澠池令陳書曰江總聰敏篤學有文范陽張纘瑯琊王筠南陽劉之遴並高才碩學總時少有名纘等雅相推重為忘年友又曰陸景文字叔辯少有膽略武勇與陳武帝有布衣之舊隋書曰李密與楊玄感為刎頸之交尤好兵書常皆在口唐書曰武德中元敬為秘書郎太宗召為天策府參軍兼直記室薛收與元敬俱為文學館學士時房杜等處心腹之寄深相友託元敬畏於權勢竟不之狎如晦常云小記室不可得而親不可得而踈又曰于休烈河南人也貞觀中任左僕射為十八學士心性貞愨機鑒敏悟自幼好學善屬文與會稽賀朝萬齊融延陵包融為文詞之友齊名一時又曰王琚懷州河內人也少孤而聰敏有才略好玄象合鍊之學神龍初嘗謁駙馬王同皎甚器之及謀剌武三思事琚義許之與周璟張仲之為忘年之友又曰蕭昕河南人也開元中首舉博學宏詞授陽武簿後遷左拾遺昕嘗與布衣張鎬友善表薦之曰如鎬者用之則為王者師不用則幽谷一叟爾玄宗擢鎬拾遺後為將相又曰權皋德輿之父大曆中卒于家元和中謚曰貞孝初皋卒韓洄王定為服朋友之喪李華為其墓表以為分天下善惡一人而已又曰杜伏威齊州章丘人也少為盜與鄉人輔公祐為刎頸之交公祐姑家以牧羊為業公祏數欀羊以餵之又曰楊憑字虛受為左散騎少負氣節與母弟凝凌相愛皆有名重交遊與穆質許孟容李鄘王仲舒為友故時人稱穆許李之交又曰朱敬則毫州永城人也長壽中為右補闕家代孝義敬則倜儻早以詞學知名與左史江融尚書左僕射魏元忠相友善又曰劉黑闥貝州漳南人也與竇建德少相友善家貧無以自給建德每資之黑闥所費至盡而不以為疑建德亦弗之間也又曰劉孝孫者荊州人也祖貞周石臺太守孝孫弱冠知名為當時詞人虞世南蔡君和孔德紹庾自直劉斌等登臨山水結為交會又曰陸象先弟監察御史景倩吏部侍郎景融大理正景獻河南令景裔皆有美譽僧一行少時與象先昆弟友善常謂人曰陸氏兄弟皆有才行古之荀陳無以加也又曰楊纂華州華陰縣人也父文偉隋溫州刺史纂略涉經史尤明時務少與瑯琊顏師古燉煌令狐德棻音芬友善大業中進士舉終為考功郎中又曰張道源嘗與友人客遊友人病中霄而卒道源恐驚擾主人遂共屍臥達曙方哭親步營送至其本鄉後仕隋為監察御史又曰孔紹安越州山陰人也陳吏部尚書奐子也少以文詞知名年十三入隋徙居京兆鄠縣閉門讀誦集數十萬言時有詞人孫萬壽與紹安篤忘年之好紹安大業末為監察御史又曰李密長安人也父寬隋上柱國蒲山公密開皇中襲父爵年始弱冠尚書令楊素見而奇之謂其子玄感曰李密智計不窮爾所不及可與為友玄感遂傾心禮遇定為刎頸之交又曰劉裔之徐州彭城人也少有學業與隋信都丞孫萬壽宗正卿李百藥為忘年之交又曰柳宗元移柳州時劉禹錫得播州宗元謂所親曰禹錫有母今為郡蠻方絕域萬里如何與母偕行吾於禹錫為, WYG: 祗}
