  - {type: variant, offset: 9, length: 0, content: '', SBCK: 人相與爲友孟子曰舜上見帝帝館于貳宫迭爲賔主是天子交匹夫也史記曰管夷吾鮑叔牙二人相友管仲曰吾始困時甞與鮑叔賈分財利多自與鮑叔不以我爲貪知我貧也吾甞爲鮑叔謀事而更窮困鮑叔不以我爲愚知時有利不利也吾甞三仕三見逐於君鮑叔不以我爲不肖知我不遭時也吾嘗爲君三戰三北鮑叔不以我爲怯知我有老母也生我者父母知我者鮑叔也􅀓子曰杜畿至許見侍中耿紀共語終夜尚書令荀彧家與紀屋相比夜聞畿言異之至旦遣謂紀曰有國士何以居位旣見畿如舊相識遂進畿於朝郭子曰兾州刺史楊准二子喬字國彦髦字士彦清平有識俱揔角爲成器准與裴頠樂廣友善遣見之頠謂准曰喬及卿髦小減也廣謂准曰喬自及卿髦尤精岀准􅀏曰我二兒之優劣乃裴樂之優劣論者許之魯連子曰舜耕於歴山而交益陶於河濵而交禹孔叢子曰子髙遊趙平原君客之有鄒文節與子高相友善及將還魯諸故人訣旣畢文節送行三􅀫臨別文節流涕交頥子髙徒抗手而已分背就路其徒問之曰先生與彼之子善彼有戀戀之心悽愴流涕而先生厲聲高揖無乃非親親之謂乎子髙曰始吾謂之大丈夫乃今知其婦人也人生則有四方之志豈鹿豕也哉而常群聚乎又曰􅁗莊子死孟武伯問孔子曰古者同寮有服乎荅曰聞諸老􅡭昔虢叔閎夭太㒹散冝生南宫括五者同寮比徳以賛文武及虢叔死四人爲服古之逹禮者行之韓詩外傳曰}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_SBCK_409-1b}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_SBCK_409-2a}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 人相與為友又曰舜尚見帝帝館甥於貳室亦饗舜迭為賓主是天子而友匹夫也史記曰管夷吾鮑叔牙二人相友管仲曰吾始困時嘗與鮑叔賈分財利多自與鮑叔不以我為貪知我貧也吾嘗為鮑叔謀事而更窮困鮑叔不以我為愚知時有利不利也吾嘗三仕三見逐於君鮑叔不以我為不肖知我不遭時也吾嘗為君三戰三北鮑叔不以我為怯知我有老母也生我者父母知我者鮑叔也傅子曰杜畿至許昌見耿紀共語終夜尚書令荀彧家與紀屋相比夜聞畿言異之詰旦遣謂紀曰不有國士何以居位既見畿如舊相識遂進畿於朝郭子曰兾州刺史楊准二子喬字國彦髦字士彦清平有識方總角為成器准與裴頠樂廣善遣見之頠謂准喬及卿髦小减也廣謂准曰喬自及卿髦尤精出准笑曰我二兒之優劣乃裴樂優劣論者許之魯連子曰舜耕於厯山而交益陶於河濵而交禹孔叢子曰子髙遊趙平原君客之有鄒文節與子髙相友善及将還魯諸故人訣既畢文節送行三宿臨别文節流涕交頥子髙徒抗手而已分背就路其徒問之曰先生與彼之子善彼有戀戀之心悽愴流涕而先生厲聲髙楫無乃非親親之謂乎子髙曰始吾謂之子丈夫乃今知其婦人也人生則有四方之志豈鹿豕也哉而常羣聚乎又曰秦荘子死孟武伯問孔子曰古者同寮有服乎答曰聞諸老耼昔虢叔閎天太顛散宜生南宫括五者同寮比徳以賛文武及虢叔死四人為服古之達禮者行之韓詩外傳曰}
