  - {type: variant, offset: 24, length: 9, content: 弘為徐州治中從事吏, krp: 賢俱徃仕至梁山逢雪粮盡度不兩全遂併粮與角哀哀至楚楚用爲上卿後來收葬伯桃伯桃墓逼近荆將軍陵而伯桃告云我曰夜𬒳荆將軍伐之哀乃加兵未知勝否云我向地下看之遂自刎死道學傳曰杜京産建武𥘉徴之産曰莊周持釣豈爲白壁所囬避}
  - {type: variant, offset: 26, length: 7, content: 徐州治中從事吏, WYG: 上卿後来収葬伯桃伯桃墓逼近荆将軍陵而伯桃告云我日夜被荆将軍伐之哀乃加兵未知勝否云我向地下㸔之遂自刎死道學傳曰杜京産建武初徵之産曰莊周特釣豈為白璧所回辭}
