  - {type: punctuation, offset: 215, content: 《, id: KR3k0012_CHANT_409-bkkpn54}
  - {type: variant, offset: 215, length: 735, content: 齊書曰劉悛字士操彭城安上里人也從駕登蔣山上數歎曰貧賤之交不可忘顧悛曰此況卿也今日與卿盡布衣之交遊悛起拜謝又曰柳世隆字彥緒河東解縣人宋太尉元景弟也當時名士張緒王延之沈淡之徒雅相欽慕以為君子之交又曰劉善明素與崔思祖友善聞死慟哭仍得病卒又曰孔稚珪字德璋會稽人也早立名譽當時名士陸惠曉謝瀹張融何點沈淵相與為君子之交梁書曰何遜字仲言東郡郯人也弱冠舉秀才南鄉范雲見其荅策大相稱賞因結忘年交好自是一文一詠雲輒嗟賞又曰張緬弟纘遷尚書吏部河東裴子野曰張吏部有喉舌之任子野性曠遠自云年出三十不復詣人初未與纘遇便相推重因為忘年交又曰蕭介性高簡少交遊唯與族兄琛從兄眕音軫素子洽從弟俶等文酒賞會時人以比謝氏烏衣之遊又曰高祖性不好聲色頗慕高名與裴子野劉顯蕭子雲張纘及當時才秀為布衣交何玄之梁典曰劉許字彥度與陳留阮藉李緒申金蘭之契築室鍾阜之傍共聽內義鑽尋奧典魏書曰夏侯尚字伯仁有籌畫智略文帝器之為布衣之交後魏書曰眭夸一名昶趙郡高邑人也少與崔浩為莫逆之交北齊書曰崔瞻與趙郡李概為莫逆之交概將東還瞻與之書曰仗氣使酒我之恒弊詆訶詣切在卿尤甚足下告歸吾於何聞過也又曰袁聿修歷任清華郎署之日值趙彥深為水部郎中同在一院因成交友彥深後被沙汰停私門生藜藋聿修猶以故情存問往來又曰裴讞魚列切之字士平不妄交遊唯與隴西辛術趙郡李繪頓丘李構清河崔瞻為忘年之友後周書曰柳弘字光道河東解縣人少聰潁工草隸博涉群書詞彩豐贍與弘農楊素為莫逆之交又曰張軌濟陰臨邑人也少好學志識開朗初在洛陽家貧與樂安孫仁為莫逆之交每易衣而出以此見稱又曰黎景希字季明河間鄭音莫人也好占玄象頗知術數而落魄音託不事生業與范陽盧道源為莫逆之交又曰韋敻休政切字弘遠志尚夷簡澹於榮利周弘正乃造敻談謔盡日恨相遇之晚也後請敻至賓館敻未赴弘正乃贈詩曰德星猶未動真車詎肯來當, SBCK: 非常爲}
