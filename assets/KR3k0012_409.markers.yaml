  - {type: variant, offset: 69, length: 1, content: 陳, SBCK: 嵇阮契若金蘭山公妻韓氏􅁴二人異於常欲窺之他日二人來妻竊窺之公曰二人何如妻曰君殊不如正當以識度相及耳公曰伊輩亦當以我爲勝又曰華歆與管寧邴原相友曽共鋤園得金寧以鋤揮之與瓦礫無異歆掘而擲之又曰荀臣伯逺看友人疾值胡賊攻}
