  - {type: variant, offset: 1155, length: 412, content: 身勿為疑也及是暠反為嗣所構暠乃恨之又曰姚萇單騎度淮見豫州刺史謝尚于壽陽幅巾以待之一面如舊相識又曰王鎮惡隨宋高祖入關中初鎮惡流寓崤澠崤澠人李方厚待之鎮惡曰待吾佇英雄王取萬戶侯乃厚相報方笑曰本縣足矣鎮惡力不絕人不閑弓馬略通諸子兵書縱橫有智計以此成名及是李方尚在鎮惡昇堂拜母表方澠池令陳書曰江總聰敏篤學有文范陽張纘瑯琊王筠南陽劉之遴並高才碩學總時少有名纘等雅相推重為忘年友又曰陸景文字叔辯少有膽略武勇與陳武帝有布衣之舊隋書曰李密與楊玄感為刎頸之交尤好兵書常皆在口唐書曰武德中元敬為秘書郎太宗召為天策府參軍兼直記室薛收與元敬俱為文學館學士時房杜等處心腹之寄深相友託元敬畏於權勢竟不之狎如晦常云小記室不可得而親不可得而踈又曰于休烈河南人也貞觀中任左僕射為十八學士心性貞愨機鑒敏悟自幼好學善屬文與會稽賀朝萬齊融延陵包融為文詞之友齊名一時又曰王琚懷州河內人也少孤而聰敏有才略好玄象合鍊之學神龍初嘗謁駙馬王同皎甚器之及謀剌武三思事琚義許之與, SBCK: 攸欽}
