  - {type: variant, offset: 12, length: 11, content: 晉安帝義熙初高祖命瑯琊, SBCK: 吴有程普者頗以年長數凌侮周瑜瑜折節下容終不之與交普後自敬服而親重之乃告人曰與周公瑾交􅀂飲醇醪不覺自醉􅀽宏山濤別傳曰陳留阮籍譙國􅄞康並髙才逺識少有陪其契者濤􅀄不識一與相遇便爲神交列士傳曰六國時羊角哀與左伯桃爲友聞楚}
  - {type: variant, offset: 12, length: 5, content: 晉安帝義熙, WYG: 吳有程普者頗以年長數凌侮周瑜瑜折節下之終不與之校普後自敬服而親重之乃告人曰與周公瑾交若飲醇醪不覺自醉袁宏山濤别傳曰陳留阮籍譙國嵇康並髙才逺識少有悟其契者濤}
