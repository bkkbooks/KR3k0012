  - {type: variant, offset: 75, length: 8, content: 張融會稽孔稚珪為, SBCK: 疾促軍而還一郡並全又曰陸機赴假還洛輜重甚盛戴淵與年少掠之淵在岸上據胡牀指揮左右皆得其冝淵旣有風摽鋒潁雖處鄙事神氣獨異於衆機於舩屋上遥謂之曰卿才如此亦復作刼淵便流涕投劎歸機辭属非常機彌重之便與定交咋筆薦焉又曰夏侯稱字義權年十六與文帝爲布衣之交毎讌氣凌一座辯士不能荅代之髙者多從之遊又曰支道林喪法慶之後精神殞喪風味轉墜常謂人曰昔匠石廢斤於野人牙生輟絃於鍾子推已外求良不虚也􅁳契旣逝發言莫賞中心藴結余其亡矣却後一年支遂亦隕又曰王爽與司馬太􅀓飲酒太􅀓醉呼王爲小子王曰亡祖長史與簡文帝爲布衣之交亡姉伉儷二宫何小子之有楊松玠談藪曰太原孫伯翳放情物外棲志丘壑與王令君髙范將軍雲爲}
