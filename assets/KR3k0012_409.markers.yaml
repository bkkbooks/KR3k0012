  - {type: variant, offset: 71, length: 3, content: 謝瀹吳, SBCK: 臣伯不忍去賊旣至謂臣伯曰大軍至一郡並空汝何男子輕大軍而敢獨止臣伯曰有友人疾不忍委之寧以我身代友人之命賊知其賢自相謂言我輩無義之人而入有義之}
