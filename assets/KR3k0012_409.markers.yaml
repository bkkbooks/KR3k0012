  - {type: variant, offset: 36, length: 2, content: 于會, SBCK: 居委紱架石室與蔣􅀒蒭隣居接宇彪歎曰彼二人者可爲道友何爲乆滯東川於是命棹來歸便相就共住日夕講習又曰潘洪字文盛山隂人㓜辭家入山修禀上法陶貞白見而恱之遂與投分共逰諸處尋求真書又曰許邁字逺遊少與髙陽許詢並治高節同志齊名詢能清言兼有詞藻邁􅀶學亦善属文廣州先賢傳曰董正字伯和番禺人也隱士南陽車遂字徳陽聞正令名不逺萬里徑來投正正道同志合恩如伯仲數年中遂得病正爲傾家救恤疾篤命絶停屍於堂殯歛之禮如同生身自送喪於南陽殷氏世傳曰殷褒字元祚渤海府君之子河南鄭廉始出寒賤又未知名見而友之廉父常居肆乃就拜其父於市衆皆驚廉由是顯名位至司徒荀氏家傳曰荀羡與沛國劉真長太原至仲祖陳郡啇洪源並著情契太宗時居阿衡之任虚中誘納賔友賢哲與羡等數人爲布衣之好又曰荀粲簡貴不能與常人交接所交者皆一時雋傑粲卒至葬夕赴者十餘人皆同年名士也哭之感慟路人􅄞康髙士傳曰逢萌條房李雲王尊同時相友丗號之四子海内先賢傳曰潁川鍾皓字季明爲郡功曹時陳寔爲西門亭長皓深禮之與同分義皓辤公府太守問誰可代君皓曰明府必得其人西門亭長可也張隱文士傳曰禰衡與孔融作爾汝之交時衡未滿二十融巳五十重衡才秀忘年也向秀别傳曰秀字子期少爲同郡山濤所知又與譙國嵇康東平吕安友善其趍舎進止無不必同造事營生業亦不異常與康偶鍜於洛邑與吕安灌園於山陽收其餘利以供酒食之費或率爾相携觀原野極遊浪之􅀔亦不計逺近或經日乃歸復脩常業郭林宗别傳曰郭泰字林宗入潁川則友李元禮至陳留則結符偉明之外黄則親韓子助過蒲亭則師仇季智也英雄記曰􅀽紹不妄通賔客好遊俠與張孟卓何伯求吴子卿許子逺伍德瑜等皆奔走之友不應辟命荆州記曰陸凱與范曄爲友江南􅀉梅花一枝來諸長安與曄并贈詩曰折花奉驛使􅀉與隴頭人江南無所得聊贈一枝春虞預㑹}
