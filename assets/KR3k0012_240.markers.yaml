  - {type: variant, offset: 1041, length: 0, content: '', SBCK: 以孫琇爲伏波將軍材官將軍漢書曰武帝以李息爲材官將軍軍馬邑折衝將軍魏書曰武帝以樂進爲折衝將軍虎威將軍魏志曰于禁字文則太山人將軍王服異之薦禁才任大將太祖召見與語拜軍司馬後拜虎威將軍呉志曰朱然字義封從孫權討􅀜羽別與潘璋到臨沮擒羽遷昭武將軍封西安郷侯虎威將軍吕蒙病篤權問曰卿如不起誰可代者蒙對曰朱然膽守有餘愚以爲可任蒙卒權假然節鎭江陵齊書曰栁世隆元景子也出爲虎威將軍上庸太守帝謂元景曰卿昔以虎威之號爲隋郡今復以授世隆使卿門世不絶公也偏將軍後漢書曰呉漢字子顔南陽宛人家貧以販馬自業素聞世祖長者獨欲歸心及世祖於廣阿拜漢爲偏將軍又曰臧宫字君翁潁川人也從世祖征戰諸將多稱勇世祖察宫勤力少言甚親納之及至河北以爲偏將軍呉志曰陳武字子列廬江人孫䇿在壽春武脩謁時年十八長七尺七寸及權統事尤爲權所愛拜爲偏將軍又曰董襲字元}
  - {type: page-break, offset: 1041, content: '', id: KR3k0012_SBCK_240-3a}
  - {type: page-break, offset: 1041, content: '', id: KR3k0012_SBCK_240-3b}
  - {type: variant, offset: 1041, length: 0, content: '', WYG: 以孫琇為伏波將軍材官將軍漢書曰武帝以李息為材官將軍軍馬邑折衝將軍魏書曰武帝以樂進為折衝將軍虎威將軍魏志曰于禁字文則泰山人將軍王朗異之薦禁才任大將太祖召見與語拜軍司馬後拜虎威將軍吳志曰朱然字義封從孫權討關羽别與潘璋到臨沮擒羽遷昭武將軍封西安鄉侯虎威將軍吕蒙病篤權問曰卿如不起誰可代者蒙對曰朱然膽守有餘愚以為可任蒙卒權假然節鎮江陵齊書曰桞世隆元景子也出為虎威將軍上庸太守帝謂元景曰卿以虎威之號為隋郡今復以授世隆使卿門世不絶公也偏將軍漢書曰吳漢字子顔南陽宛人家貧以販馬自業素聞世祖長者獨欲歸心及世祖於廣阿拜漢為偏將軍又曰臧宫字君翁潁川人也從世祖征戰諸將多稱勇世祖察宫勤力少言甚親納之及至河北以為偏將軍吳志曰陳武字子烈廬江人孫䇿在夀春武修謁時年十八長七尺七寸及權統事尤為權所愛拜為偏將軍又曰董襲字元代㑹稽人長八尺武力過人拜偏將軍裨將軍魏志曰李通字文達江夏平春人以遊俠聞於江汝之間屬連嵗大饑通傾家振施與士分糟糠建安初通舉衆詣太祖于許太祖討張繡通為先登大破繡軍拜裨將軍虎牙將軍漢書曰宣帝以雲中太守田順為虎牙將軍}
