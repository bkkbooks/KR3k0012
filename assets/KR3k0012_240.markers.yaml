  - {type: variant, offset: 1383, length: 0, content: '', krp: 史記曰漢髙帝以陳平爲護軍中尉盡護諸}
  - {type: variant, offset: 1384, length: 0, content: '', SBCK: 漢書曰護軍都尉秦官元狩四年屬大司馬元夀元年更名司㓂元始元年更名護}
  - {type: variant, offset: 1384, length: 0, content: '', WYG: 禁兵又曰太祖還長安以曹休為中領軍又曰文帝征孫權以尚書令陳羣為中領軍晉書曰吳隱之為中領軍清儉不華每月初得禄裁留身糧其餘悉分賑親族家人績紡以供朝夕時有困絶或併日而食恒布衣不完妻子不霑寸禄晉中興書曰羊祜字叔子遷中領軍悉統宿衛入直殿中執兵之要事兼内外齊書曰蕭景先武帝少時與景先共車行泥路車久故壞至領軍府西門車轅折俱狼狽景先謂帝曰兩人脱作領軍亦不得忘今日艱辛及武帝踐阼詔以景先為領軍拜日羽儀甚盛傾朝觀屬拜還未至府門中詔相問領軍今日故當無折轅事耶景先奉謝梁書曰臧盾遷中領軍領軍營天下兵要監局事多盾為人敏贍有風力長於撥繁職事甚理天監中吳平侯蕭景居此職著聲稱至是盾復繼之三國典畧曰齊左僕射祖珽附陸令萱求為領軍齊主許之侍中斛律孝卿謂上洛王元海侯吕芬等云珽是漢兒兩眼盲豈合作領軍也海遂入啟之珽言於齊主云元海與臣素有隟必是元海譛臣齊主曰然珽列元海共太府少卿李叔元平淮令張叔畧等結朋樹黨陸令萱又唱和之遂除元海為鄭州刺史叔元為襄城郡守叔略為南營州録事叅軍珽遂獨處機衡緫知兵事齊主亦令中要人扶持出入每同御榻論決朝政髙堂隆集曰己巳詔書中領軍游擊皆青玉佩中護軍史記曰漢髙帝以陳平為護軍中尉盡護諸將漢書曰護軍都尉秦官元狩四年屬大司馬元夀元年更名司冦元始元年更名護}
