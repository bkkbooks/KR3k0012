  - {type: variant, offset: 1369, length: 0, content: '', SBCK: 呉置輔呉將軍班亞三司盪魏將軍呉志曰吕據太元元年大風江水盛溢泛流漸淹城門權使視水獨見據使人取大舡以備宫權嘉之拜盪魏將軍鷹􅀭將軍晉書曰郭奕咸寧初遷雍州刺史鷹􅀭將軍㝷假赤幢曲盖鼓吹牙門將軍蜀志曰魏延字文長義陽人也以部曲將隨先主入蜀數有戰功遷牙門將軍中將軍北齊書曰沙苑之敗崔仲文持馬尾以渡河波中乍没乍出髙祖望見之曰崔􅁺也遽遣舡赴接旣濟勞之曰卿爲親爲君不顧萬死可謂家之孝子國之忠臣加中將軍中領軍魏略曰中領軍延康中置故漢北軍中􅀱之官又曰太祖以史渙忠勇爲中領軍領禁軍又曰太祖還長安以曹休爲中領軍又曰文帝征孫權以尚書令陳群爲中領軍晉書曰呉隱之爲中領軍清儉不革毎月􅀄得禄裁畱身粮其餘悉分賑親族家人績紡以供朝夕時有困絶或併日而食􅁪布衣不完妻子不霑寸禄晉中興書曰羊祜字叔子遷中領軍悉統宿衛入直殿中執兵之要事兼内外齊書曰蕭景先武帝少年與景先共車行埿路車乆故壞至領軍府西門車轅折俱狼狽景先謂帝曰兩人脫作領軍亦不得忘今日艱辛及武帝踐阼詔以景先爲領軍拜日羽儀甚盛傾朝觀屬拜還未至府門中詔相聞領軍今日故當無折轅事耶景先奉謝梁書曰臧盾遷中領軍領軍管天下兵要監局事多盾爲人敏贍有風力長於撥繁職事甚理天監中呉平􅀱蕭景居此職著聲稱至是盾復繼之三國典略曰齊左僕射祖珽附陸令萱求爲領軍齊主許之侍中斛律孝卿謂上洛王元海侯吕芬等云珽是漢兒兩眼盲豈合作領軍也元海遂入啓之珽言於齊主云元海與臣素有􅂩必是元海譛臣齊主曰然珽列元海共太府少卿李叔元平准令張叔略等結明樹黨陸令萱又唱和之遂除元海爲鄭州刺史叔元爲襄城郡守叔略爲南營州録事叅軍珽遂獨處機衡揔知兵事}
