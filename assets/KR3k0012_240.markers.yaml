  - {type: variant, offset: 2236, length: 403, content: 丹陽尹桓景頗以佞事司徒王導導甚眤之回常慷慨謂景非正人不宜親狎會熒惑守南斗經旬王公語回曰南斗楊州分而熒惑守之吾當遜位以厭此讁回荅曰公以明德作鎮輔弼聖主當親忠貞遠邪佞與桓景造膝熒惑何由退舍導深愧之梁書曰胡曾祐拜領軍將軍厚自封植以所加鼓吹恒置齋中對之自娛人曰此是羽儀公名望隆重不宜若此荅曰我性愛之恒須見耳或出遊亦以自隨人士笑之唐書曰貞元十一年以前太子賓客李愿為左領軍大將軍李憑為右威衛大將軍依前兼中丞皆太尉晟之子以免喪故晟諸子同日授官者凡九人護軍將軍王隱晉書曰王敦將復作逆明帝問曰何如應詹厲然慷慨荅詔曰陛下宜奮赫斯之威臣等當負戈從戎以順討逆誠社稷之計也即以詹為護軍將軍同心滅敦中軍將軍漢書曰馮奉世字子明元帝以為中軍屯首陽魏志曰曹真持節都督中外諸軍事中軍將軍受顧命王隱晉書曰太始元年以羊祐為中軍將軍惣宿衛游擊將軍史記曰漢高祖以陳狶為游擊將軍漢書曰太祖太初元年以蘇建韓說為游擊將軍袁宏漢紀曰建武二年以鄧隆為游擊將軍助, SBCK: ''}
