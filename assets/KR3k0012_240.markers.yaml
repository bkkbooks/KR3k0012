  - {type: variant, offset: 2640, length: 593, content: 浮攻彭寵魏志曰卞闌少有才學為游擊將軍加散騎常侍山濤啟事曰游擊將軍諸葛冲精果有文武擬補兗州詔荅曰冲領兵未欲出之積射將軍後周書曰于謹除積射將軍又隨廣陽王元深征鮮于脩禮停軍中山侍中元晏言於靈太后曰廣陽王以宗室之重受律專征今乃盤桓不進坐圖非望又有于謹者智略過人為其謀主風塵之隟恐非陛下純臣矣靈太后詔於尚書省門外立牓募能獲謹者許重賞謹聞之乃謂廣陽王曰今女主臨朝取信讒佞脫不明白殿下素心便恐禍至謹請束身詣闕歸罪有司披露心腹深遂許之謹遂到牓下曰吾知此人眾共詰之謹曰我即是也有司以聞靈后引見之大怒謹備述廣陽忠款兼陳停軍之狀靈后意解捨之世語曰積射將軍樊震對武帝稱鄧艾之忠積弩將軍沈約宋書曰積弩將軍晉官也齊職儀曰積弩將軍品第四銀章青綬武冠絳朝服佩水蒼玉晉太康十年立積弩積射營各二千五百人並以將軍領之強弩將軍漢書曰元狩元年以李沮為強弩將軍伐匈奴又曰太初二年以路愽德為強弩將軍又曰神雀二年以許延壽為強弩將軍遷大司馬傅暢晉讚曰晉文王晉臺置強弩將軍掌宿衛殿中將軍玄中記曰漢桓帝時出遊河上忽有一青牛從河中出直走盪桓帝邊人皆走太尉何公為殿中將軍有勇力輒走逆之牛見公往乃反走還河未至河公及牛乃以手拔牛左足脫以右手持斧斫牛頭殺之此青牛者是萬年木精也語林曰庾公欲伐王公先書與郄公曰老賤賊轉欲輈張殿中將軍舊用才學士以廣視聽而頃悉內面牆人是欲蔽主之明便欲勒數州之眾以除君側之惡今年之舉篾不濟矣員外將軍後魏官氏志曰員外將軍從第八品, SBCK: 衣}
