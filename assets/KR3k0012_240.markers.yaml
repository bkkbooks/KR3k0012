  - {type: variant, offset: 483, length: 551, content: 亡命東海以壯勇聞太祖募索得霸見而悅之以為琅㖿相文帝即位遷鎮東將軍鎮西將軍魏志曰曹真字子丹文帝即位以真為鎮西將軍蜀志曰馬超父騰靈帝末與邊章韓遂等俱起居事於西州初平三年遂騰率眾詣長安漢朝以遂為鎮西將軍遣還金城騰為征西將軍屯郿鄔鎮南將軍蜀志曰黃權字公衡伐吳敗於白帝既附魏文帝曰君捨逆順欲追蹤陳韓耶權曰臣降吳不可歸蜀無路是以歸命敗軍之將免死焉幸何古人之可纂帝善之拜鎮南將軍吳志曰呂岱既定交州進討九真斬獲萬數又遣從事南宣國化及徼外扶南林邑堂明諸王各遣使奉貢權嘉其功進拜鎮南將軍晉書曰杜預為鎮南將軍繕兵甲曜威武乃簡精銳襲吳西陵督張政大破之以功增封三百六十五戶政吳之名將也據要害之地恥以無備取敗不以所喪之實告于孫皓預欲間吳邊將乃表還所獲之眾於皓皓果召政遣武昌監劉憲代之故大軍臨至使其將帥移易以成傾蕩之勢預處分既定乃啟請伐吳之期後魏書曰唐和詣闕世祖優之待以上客高宗以和歸誠先朝拜鎮南將軍鎮北將軍魏氏春秋曰許元字士宗為鎮北將軍都督河北諸軍事蜀志魏延字文長先主大會群臣問延曰今委卿以重任卿居之欲云何延對曰若曹操舉天下而來請為大王距之偏將十萬之眾至請為大王吞之先主稱善眾咸壯其言先主踐尊號進拜鎮北將軍晉書曰何曾為鎮北將軍文帝使武帝齊王攸送之帝又過其子曾先勑劭曰客必過汝汝當預嚴劭不冠帶停帝良久曾深以為譴劭曾見崇重如此安東將軍, SBCK: ''}
