  - {type: variant, offset: 1057, length: 0, content: '', SBCK: 李典字㬅成山陽鉅野人爲破虜將軍典好學問貴儒雅不與諸將争功敬賢士大夫恂恂􅀂不及中軍稱其長者建義將軍東觀漢書曰光武以朱祐爲建義將軍攻朱鮪刺姦將軍東觀漢記曰光武以軍市令􅀕遵爲刺姦將軍范曄後漢書曰岑彭字君然南陽􅁄陽人也後}
