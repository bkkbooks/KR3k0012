  - {type: variant, offset: 1042, length: 1, content: 吳, SBCK: 㑹稽人長八尺武力過人拜偏將軍禆將軍魏志曰李通字文達江夏平春人以遊俠聞於江汝之間屬連歳大飢通傾家振施與士分糟糠建安初通舉衆詣太祖于許太祖討張繡通爲先登大破繡軍拜禆將軍虎牙將軍漢書曰宣帝以雲中太守田順爲虎牙將軍伐匈奴范曄後漢書曰盖延字巨卿漁陽人也身長八尺邊俗尚勇力而延以氣聞延與呉漢同歸世祖從平河北世祖即位拜虎牙將軍漢臣將軍東觀漢記曰上於大㑹中指王常謂群臣曰此家率下江諸將輔翼漢室心如金石真忠臣也是日以常爲漢臣將軍與諸將絶席討虜將軍東觀漢記曰光武}
  - {type: page-break, offset: 1042, content: '', id: KR3k0012_SBCK_240-4a}
  - {type: variant, offset: 1042, length: 0, content: '', WYG: 匈奴范曄後漢書曰葢延字巨卿漁陽人也身長八尺邉俗尚勇力而延以氣聞與}
