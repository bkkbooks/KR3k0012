  - {type: variant, offset: 181, length: 198, content: 嗜酒為窟室而夜飲酒擊鐘焉朝至未已朝者曰公焉在家臣故謂伯有為公其人曰吾公在壑谷壑谷窟室又昭公曰莒子庚輿虐而好劍茍鑄劍必試諸人又哀上曰曹伯陽即位好田弋曹鄙人公孫彊好弋獲白雁獻之公羊傳僖公曰虞公貪而好寶及為晉所滅抱寶牽馬而出國語曰屈到嗜艾有疾召其宗老而屬之祭我必以艾子木曰夫子不以私欲奸國之典言不犯常法遂不用論語公冶長曰子曰十室之邑必有忠信如丘者焉不如丘之好學也又雍也曰哀公問弟子孰為好學孔子對曰有顏回, SBCK: 近於死}
