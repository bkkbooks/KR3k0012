  - {type: variant, offset: 2154, length: 3, content: 懸案下, SBCK: 言也}
  - {type: variant, offset: 2154, length: 3, content: 懸案下, krp: 當新序曰晉文逐麋而失迹問農夫老古曰麋何在老古以足指曰如是行往公曰寡人問子子以足指何也老古振衣而起曰虎豹之居也厭閑而之近故得魚鱉之居也厭深而之淺故得諸侯之居也厭衆而逺遊故亡其國公恐歸曰寡人逐麋而失之得善言故有恱色欒武子曰其人安在公曰吾未與來也欒武子曰取人之言而弃其身盗也公曰善遂載老古與俱歸楊子曰大哉聖人言之至也開之廓然見四海之内閑之寂然不覩墻垣之裏良玉不彫至言不文賈誼新書曰言有四術言敬以禮朝廷之言也文言有序祭祀之言也并氣折聲軍旅之言也言若不足喪紀之言也}
