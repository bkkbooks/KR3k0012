  - {type: variant, offset: 2160, length: 0, content: '', SBCK: 孫安國盛字安國徃殷中軍許共語殷名浩也徃返精苦客主無間左右進食冷而復煖者數四彼我奮擲塵尾毛悉隨落滿飡飰中賔主遂至暮忘飡殷方語孫卿曰公勿作強口馬我當併卿控孫亦曰卿勿作穴鼻牛我當穿卿頰尸子曰言羙則響羙言惡則響惡五帝夲紀曰黄帝弱而能言神仙傳曰老子生而能語衛玠别傳曰太尉王君見阮千里而問曰老莊與聖教同異阮曰將無同太尉善其言辟之爲􅁺丗號曰三語􅁺王君嘲之曰一言可辟何假於三阮曰苟足天下民望亦可無言而辟復何假於一管輅别傳曰裴兾州何鄧二尚書及郷里劉太常潁川兄弟輅曰自與此五君共言論使人精神清發至昏不暇寐自此巳下殆白日欲􅃦陵零先賢傳曰張飛嘗就劉巴􅀫巴不與語遂忿恚諸􅁑亮謂巴曰張飛雖實武人敬慕足下足下雖天素髙亮冝少降意曰丈夫處丗當交四海英雄如何與兵子語備聞之怒曰􅀌欲定天下而子􅀄專亂之括地圗曰太極山採華之草一日服之通萬里語丗說曰晉文王􅁛阮嗣宗天下之至愼每與之言言及􅀇逺未甞臧否人物又曰諸􅁑瑾爲豫州遣别駕到臺語云小児知談卿可與語於張輔呉􅚋中相遇别駕呼恪咄咄郎君恪因嘲之曰豫州亂矣何咄咄有荅曰君明臣賢未聞有亂恪復云昔唐堯在上四凶在下荅曰非唯四凶亦有丹朱又曰或問王濟云昨遊有何語議濟曰張華善說史漢裴􅇣民叙前言徃行衮衮可聽王戎道子房季扎之間陶然􅀇著又曰郝隆爲桓公南蠻參軍三月三日作詩不能者罰酒隆􅄃筆作一句云娵隅躍清池桓曰娵隅是何物荅曰蠻名魚爲娵隅桓曰作詩何以作蠻語隆曰千里投公始得蠻府叅軍那得不作蠻語又曰裴僕射時人謂言談之林藪又曰殷中軍浩嘗至劉尹所惔字真長殷理屈而遊詞不巳劉亦不復荅殷去乃言曰田舎児學人作爾馨語又曰}
