  - {type: variant, offset: 4096, length: 373, content: 顏含別傳曰顏髦字居道含之子也少慕家業惇於孝行儀狀嚴整風皃端美桓公見而歎曰顏侍中廊廟之望也桓邵別傳曰邵字敬倫丞相之第五子清貴簡素風姿甚美而善治容儀雖家人近習莫見其怠墮之皃溫見而稱之曰可謂鳳鶵郭子同三輔決錄曰竇叔高名玄為上郡計吏朝會數百人儀狀絕眾天子異之詔以公主妻之出同輩調笑焉叔高時已自有妻不敢以聞方欲迎婦與訣未發而詔召叔高就第成婚益部耆舊傳曰張肅有威儀容貌甚偉弟松為人短小不持節操然識達精果有材幹劉璋乃遣詣曹公曹公不甚禮楊修深器之脩以所撰兵書示松飲讌之間一省即便闇誦修以此異之會稽典錄曰賀邵善容止正其衣冠尊其瞻視動靜有常與人交久益敬之至於官府左右莫見其跣坐常著韤希見其足荀氏家傳曰荀羨風器英秀識準摽貴明鬚眉美音氣俯仰顧盼容止可則世說曰太尉總角時常造公司徒王衍神情明秀風姿詳雅山公嗟嘆者良久既去目之而言曰何物老嫗生此寧馨兒然恐誤天下生民者未必非此人, SBCK: 遂大進}
