  - {type: variant, offset: 2833, length: 1259, content: 貌也視容瞿梅梅不審貌也言容繭繭聲氣微也戎容暨暨果毅貌也言容詻詻教令嚴也色容厲肅儀形貌也視容清明察於事也立容辯卑母讇辯讀為貶自貶卑謂聲磬折也又表記曰容貌以文之衣服以移之是故君子服其服則文以君子之容有其容則文以君子之辭左傳定下曰邾隱公來朝子貢觀焉邾子執玉高其容仰公受玉卑其容俯子貢曰以禮觀之二君者皆有死亡焉論語子張曰曾子曰堂堂乎張也難與並為仁矣言子張容儀盛而於仁道薄難勉進漢書曰薛宣好威儀容止甚可觀又曰息夫躬河內陽人也少受春秋通覽詩書容貌壯麗為眾所異又曰江充召見大臺宮自請以所常被服見上上許之充衣紗縠單衣冠步搖冠為人魁岸容貌甚壯帝望見而異之謂左右曰燕趙固多奇士又曰武帝即位徵天下賢良待以不次之位自衒鬻者以千數東方朔上書曰臣朔年二十二長九尺三寸目若懸珠齒若編貝又曰王商為丞相河平四年單于來朝引見丞相唑未央庭中單于前拜謁商商起離席與言單于仰視商貌大畏之遷延卻退天子聞而歎曰此真漢相矣又曰司馬相如字長卿蜀郡成都人也至臨邛富人卓王孫請之相如時從車騎雍容閑雅甚都美也詩曰不見子都都王孫有女文君新寡竊從戶窺心說而好之遂夜奔相如又曰雋不疑字曼倩渤海人也暴勝之為直指使者至東海素聞不疑賢請與相見望見不疑容貌尊嚴衣冠甚偉勝之躧履起迎續漢書曰侯霸字君房河南人為人矜嚴有威容家累千金不事產業篤志詩書師事房元常為都講東觀漢記曰上過頴陽祭遵以縣吏數進見上愛其容儀署為門下吏又曰虞延字子太陳留人為都督郵世祖聞而奇之二十年東巡路過小黃高帝母昭陵后園陵在焉時延為都督郵詔呼引見問園陵之事延進旨從容跪拜可觀其陵樹株柏皆諳其數俎豆犧牲頗曉其禮帝善之勑延從駕西盡郡界賜錢及劍帶佩刀還郡又曰杜詩薦伏湛䟽曰容皃堂堂國之光輝智略謀慮朝之淵藪齠齓勵志白首不衰實足以先後王室名足以光示遠人柱石之臣宜居輔弼英雄記曰袁紹生而孤幼為郎容貌端正威儀進止動見倣效弱冠除復陽長有清能名吳書曰張純字元基少厲操行學博才秀切問捷對容止可觀拜郎中補廣德令治有異績擢為太子輔義都尉吳錄曰滕胤年十二孤單焭獨為人白晢威儀可觀每正朔朝會脩覲在位大臣見者莫不歎賞魏志曰延康元年蜀將孟達率眾降達有容止可觀文帝甚器愛之使達為新城太守加散騎常侍蜀志曰魏文帝察黃權有扃量試欲驚之遣左右請權未至之間累催相屬馬使奔馳交錯於道官屬莫不褫魄而權舉止顏色自若後領益州刺史大將軍司馬宣王深器之問權曰蜀中有卿輩幾人權笑而不荅曰不圖明公見顧之重蜀志曰彭求年廣漢人身長八尺容皃甚偉姿性驕傲多所輕忽唯敬同郡秦子勑吳志曰張昭容皃矜嚴有威風權常曰孤與張公言不敢妄也舉邦憚之王隱晉書曰王褒少立操尚非禮不動非法不言身長八尺四寸容皃絕異音聲清亮辭氣韶雅沈約宋書曰元凶弒逆義宣發哀即日便舉兵張暢為元佐位居僚首哀容俯仰蔭映當時舉哀畢變服著黃韋袴褶出射堂簡人音姿容止莫不矚目見之者皆願為盡命又曰羊欣字敬先少靜默無競於人美言笑善容止徧覽經籍尤長隸書賈誼新書曰朝廷之容師師然翼翼然整以敬祭祀之容遂遂然粥粥然敬以婉軍旅之容愊然肅然固以猛喪紀之容怮然懾然若不還顧譚別傳曰譚字子嘿吳人常慕賈誼之為人身長七尺八寸少言笑容皃矜整有珪璋威重未常失色於物非其人或, SBCK: ''}
