  - {type: variant, offset: 4064, length: 1, content: 身, WYG: 精神渙發至昏不假寐自此以下殆白日欲寢陵零先賢𫝊曰張飛常就劉巴宿巴不與言遂忿恚諸葛亮謂巴曰張飛雖實武人敬慕足下足下雖天素髙亮宜少降意曰丈夫處世當交四海英䧺如何與兵子語𤣥徳聞之怒曰孤欲定天下而子初専亂之括地圖曰太極山採華芝草一日服之通萬里語世説曰晉文王稱阮嗣宗天下之至慎毋與之語語及𤣥逺未嘗臧否人物又曰諸葛瑾為豫州遣别駕到臺語云小兒知談卿可與語於吳張輔座中相遇别駕呼恪咄咄郎君恪因嘲之曰豫州亂矣何咄咄有荅曰君眀臣賢未聞有亂恪復云昔唐堯在上四㐫在下荅曰非惟四㐫亦有丹朱又曰或問王濟云昨游有何語議濟曰張華善説史漢裴逸民叙前言往行袞袞可聽王戎道子房季札之間超然𤣥著又曰郝隆為桓公南蠻叅軍三月三日作詩不能者罰酒隆攬筆作一句云陬隅躍清池桓曰陬語是何物荅曰蠻名魚為陬隅桓曰作詩何以作蠻語隆曰千里投公始得蠻府參軍那得不作蠻語又曰裴僕射時人謂言談之林藪又曰殷中軍浩嘗至劉尹所掞字真}
