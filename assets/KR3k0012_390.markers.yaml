  - {type: variant, offset: 2313, length: 220, content: 目近翫養令翮成遂飛去又曰王武子好驢鳴既葬文帝臨其喪顧語同遊曰王子好驢鳴可各作聲以送赴客皆一時作驢鳴語林曰王武子死孫子荊哭之甚悲賓客莫不垂涕哭畢向靈座曰卿嘗好我作驢鳴今我為君作驢鳴聲似真賓客皆笑孫聞之曰諸君不死而令王武子死賓客皆怒焉又戴叔鸞母好驢鳴叔鸞每為驢鳴以樂其母又曰祖約少好財阮遙集好屐並常自經營同是一累而未判其得失有詣祖見料視財物客至併當不盡餘兩小以置背後傾身障之意未能平或有詣阮正見自蠟屐因歎曰未知一生當著幾緉屐神甚閑暢於是勝負始分, WYG: 于垣壁聽}
