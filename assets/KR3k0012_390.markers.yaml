  - {type: variant, offset: 3985, length: 8, content: 徧覽經籍尤長隸書, WYG: 鴈羣駭梁君怒欲殺行者其御公孫龍下車對曰昔者齊景公之時天旱三年卜之曰必以人祠乃雨景公曰吾之所以求雨者為吾民也今以人祠乃雨寡人將自當之言未卒天大雨方千里今主君以白鴈故而欲殺之無異於狼虎梁君援其手與上車歸入郭門呼萬嵗曰樂哉今日獵也獨得善言子思子曰同言而信信在言前申子曰眀君治國三寸之機運而天下定方寸之謀正而天下治一言正而天下定一言倚而天下靡淮南子曰人有多言者百舌之聲也又曰得萬人之兵不若聞一言之富新序曰晉文逐麋而失迹問農夫老古曰麋何在老古以足指曰如是行往公曰寡人問子子以足指何也老古振衣而起曰虎豹之居也厭閒而之近故得魚鼈之居也厭深而之淺故得諸侯之居也厭衆而遠遊故亡其國公恐歸曰寡人逐麋而失之得善言故有悦色欒武子曰其人安在公曰吾未與来也欒武子曰取人之言而棄其身盜也公曰善哉遂載老古與俱歸楊子曰大哉聖人言之至也開之廓然見四海之内閉之寂然不覩墻垣之裏良玊不彫至言不文}
