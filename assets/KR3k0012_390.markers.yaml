  - {type: variant, offset: 5, length: 1, content: 嗜, SBCK: 一言語說文曰直言曰言語議曰語釋名曰言宣也宣彼此之意也語叙也叙巳所欲說述也易繫辭曰同心之言其臭如蘭又曰子曰書不盡言言不盡意又曰君子出其言善則千里之外應之况其迩者乎出其言不善則千里之外違之况其迩者乎言出乎身加乎民行發乎迩見乎逺言行君子之樞機樞機之發榮辱之主也又曰將叛者其辭慙中心疑者其辭枝􅁻人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈又少儀曰言語之羙穆穆皇皇又中庸曰故君子語大天下莫能載焉語小天下莫能破焉君子言頋行行頋言也又表記曰天下無道則言有枝葉又曰子曰事君大言入則望大利小言入則望小利大言可以立大事小言可以立小事立謂君受故君子不以小言受大禄不以大言受小禄又緇衣曰子曰王言如絲其出如綸王言如綸其出如綍故大人不倡遊言逰浮也不可用之浮也可行也不可言也君子弗言也可言也不可行也君子弗行也則民言不危行而行不危言也左傳僖中曰介子推曰言身之文也身將隱矣焉用文之求顯也又襄四年曰仲尼曰言以足志文以足言足猶成也不言誰知其志言之無文行而不逺左傳昭公曰晉叔向適鄭鬷薎惡欲觀叔向從収器者立於堂下一言而善叔向聞之曰必􅎦明也又定上曰鄭子太叔卒晉趙簡子爲臨甚哀曰黄父之㑹賈逹解曰黄父㑹在昭五年夫子語我九言曰無始亂無爲乱始無怙冨無恃寵無違同無慠禮無驕能無復怒無謀非德無犯非義又哀上曰呉舎衛侯衛侯歸効夷言子之尚㓜曰君必不免其死於夷乎執焉而又說其言從之固矣論語曰詩三百一言以蔽之曰思無邪又曰君子欲訥於言而敏於行又曰定公問一言而可以興􅀖有諸孔子對曰言不可以􅀂是其幾也人之言曰爲君難爲臣不易如知爲君之難也不幾乎一言而興􅀖乎又曰言語宰我子貢又曰群居終日言不及義}
