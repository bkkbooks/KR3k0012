  - {type: variant, offset: 1982, length: 1, content: 願, SBCK: 大哉聖人言}
  - {type: variant, offset: 1982, length: 1, content: 願, krp: 同言而信信在言前申子曰明君治國三寸}
  - {type: variant, offset: 1984, length: 8, content: 久矣未得可使者對, SBCK: 至也開之廓然見四海之内閑之寂然不覩墻垣之裏良玉不彫至言不文賈􅁩新書}
  - {type: variant, offset: 1984, length: 75, content: 久矣未得可使者對曰願奉使於是遣倉唐緤北大奉晨鳧獻之文侯曰擊愛我知我所嗜好韓詩外傳同風俗通曰趙王好大眉民闊半額楚王好廣領國人沒頸文士傳曰嵇康性絕巧好鍜家, WYG: 言將}
  - {type: variant, offset: 1984, length: 6, content: 久矣未得可使, krp: 機運而天下定方寸之謀正而天下治一言正而天下定一言倚而天下靡淮南子曰人有多言}
