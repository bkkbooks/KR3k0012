  - {type: variant, offset: 1971, length: 0, content: '', krp: 必以人祠乃雨景公曰吾昔所以求雨者爲吾民也今以人祠乃雨寡人將自當之言未卒天大雨方千里今主}
  - {type: variant, offset: 1972, length: 3, content: 何不遣, WYG: 子毋易由言耳屬於垣箋云猶用也王毋輕用䜛}
  - {type: variant, offset: 1972, length: 8, content: 何不遣人使大國太, krp: 以白鴈故而欲殺之無異於狼虎梁君援其首與上車歸入郭門呼萬歳曰樂哉今日獵也獨得善言子思}
  - {type: variant, offset: 1976, length: 7, content: 使大國太子曰願, WYG: ''}
