  - {type: variant, offset: 7, length: 5, content: 禮記檀弓上, SBCK: 行小恵難矣哉又曰君子不以言舉人不以人廢言又曰有德者必有言有言者不必有德又曰可與之言而不與言失人不可與言而與之言失言智者不失人亦不失言又曰侍於君子有三􅄽言未及之而言謂之躁言及之而不言謂之隱末見顔色而言謂之瞽又曰子曰予欲無言疾時利口多言無賢也子貢曰子如不言則小子何述焉子曰天何言哉四時行焉百物生焉天何言哉孝經曰口無擇言身無擇行言滿天下無口過家語曰仲孫何忌問於顔回曰仁者一言而必有益於仁智可得聞乎顔回曰一言而有益於智莫􅀂蒙一言而有益於仁莫如恕又曰顔回問孔子曰小人之言有同乎君子者不可不察也子曰君子以行言小人以舌言又}
