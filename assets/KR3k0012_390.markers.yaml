  - {type: variant, offset: 2972, length: 0, content: '', WYG: 子如不言則小子何述焉子曰天何言哉四時行焉百物生焉天何言哉孝經曰口無擇言身無擇行言滿天下無口過家語曰仲孫何忌問於顔囘曰仁者一言而必有益於仁智可得聞乎顔囘曰一言而有益於智莫若䝉一言而有益於仁莫如恕又曰顔囘問孔子曰小人之言有同乎君子者不可不察也子曰君子以行言小人以舌言又曰孔子北遊登農山子路子貢顔囘侍側孔子四望喟然嘆曰二三子各言爾志子路進曰由願得白羽若月赤羽若日鐘鼓之音上振于天旌旗紛紛下蟠於地由當一隊而敵之必也攘地千里搴旗執馘使二子者從我焉夫子曰勇哉子貢復進曰賜願使齊楚合戰兩壘相當旗皷相望埃塵連接挺刃交兵賜縞衣白冠陳説其間推論利害使二國釋患惟賜能之使夫二子者從我焉夫子曰辯哉囘曰願得眀王聖主而相之敷其五教導}
