  - {type: variant, offset: 1952, length: 10, content: 魏文侯封太子擊於中山, krp: 梁君出獵見白鴈群梁君下車彀弓欲射之道有行者觀勸梁君止鴈群駭梁君怒欲殺行者其御公孫龍下車對曰昔者齊景公之時天旱}
  - {type: punctuation, offset: 1962, content: ，, id: KR3k0012_CHANT_390-bkkpn661}
  - {type: 'tls:seg', offset: 1962, content: '', id: KR3k0012_CHANT_390-32a.11}
  - {type: variant, offset: 1964, length: 6, content: 不往來趙倉唐, krp: 卜之}
  - {type: variant, offset: 1965, length: 5, content: 往來趙倉唐, WYG: 言其唯不言言乃雍又秦誓曰予誓告汝羣言之首毛詩雨無正曰哿矣能言巧言如流俾躬處休箋云巧猶善也謂以事類風切如水之流急忽然而過之故不悖逆使身居安休如之也亂世之言順而為上也又小弁}
  - {type: punctuation, offset: 1967, content: ，, id: KR3k0012_CHANT_390-bkkpn662}
