  - {type: variant, offset: 65, length: 272, content: 祭義曰先王之孝也心志嗜欲不忘乎心又祭統曰不齊則於物無防也嗜欲無止也及其將齋也防其邪物訖其嗜欲耳不聽樂左傳閔公曰衛懿公好鶴鶴有乘軒者及有狄人之難國人皆曰鶴實有祿位余焉能戰遂敗又僖中曰齊侯好內多內寵內嬖如夫人者六人左傳襄公曰鄭伯有好田而嗜酒為窟室而夜飲酒擊鐘焉朝至未已朝者曰公焉在家臣故謂伯有為公其人曰吾公在壑谷壑谷窟室又昭公曰莒子庚輿虐而好劍茍鑄劍必試諸人又哀上曰曹伯陽即位好田弋曹鄙人公孫彊好弋獲白雁獻之公羊傳僖公曰虞公貪而好寶及為晉所滅抱寶牽馬而出國語曰屈到嗜艾有疾召其宗老而屬之祭我必以艾子木曰夫子不以私欲奸國之典言不犯常法遂不用論語公冶長, WYG: ''}
