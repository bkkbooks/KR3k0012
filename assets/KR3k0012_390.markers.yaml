  - {type: variant, offset: 1362, length: 600, content: 與促膝雖然既去之後猶令二人交箒掃其坐處又曰明帝好食逐夷以銀缽盛密漬之一飡數缽謂王景文曰此味卿頗足不景文曰臣夙好此味貧素致之甚難帝甚悅食夷積多胸腹不息氣將絕疾大困一食漬汁猶至三斗終以此卒管子曰吳王好劍而國士輕死墨子曰晉文公好士之惡服大夫牂羊之裘韋以帶劍大帛之冠越王好士勇自焚其室曰越國之寶悉在此中王自鼓蹈火而死者百餘人孟子曰曾晢嗜羊棗而曾子不忍食羊棗羊棗大棗也莊子曰子張見魯哀公哀公不禮曰臣聞君好士不遠千里以見公今見公之好士也有似葉公子高之好龍葉公好龍室中彫文畫以為龍於是天龍聞而下之窺頭於牗拖尾於堂葉公見之棄而還走失其魂魄五神無主是葉公非好龍也夫似龍而非龍也今君非好士也夫似士而非士也新序同尹文子曰昔齊桓公好紫闔境不鬻異綵又曰齊宣王好射所用弓不過三石以示左右左右引之皆曰此不下九石而宣王終身自以為用九石韓子曰齊桓公好服紫一國盡服紫當時十素不得一紫公患之管仲曰君欲止之何不試勿衣也謂左右曰甚惡紫臭公曰諾於是三日境內莫有衣紫又曰楚恭王與晉厲公戰于鄢陵楚師敗恭王傷目其戰之時司馬子反渴而求飲穀陽豎操觴酒而進之子反曰此酒也豎曰非也飲之子反謂之嗜酒弗能絕口又曰公儀休相魯而嗜魚一邦皆爭買魚而獻之公儀子不愛又曰鄒君好服長纓左右皆服纓纓甚貴鄒君患之問左右對曰君服之百姓亦多服是故貴也鄒君因先自斷其纓而出國中皆不服長纓賈誼曰文王使呂望傅太子發發嗜鮑魚公不與曰鮑魚不登於俎豈有非禮而可養太子哉說苑曰魏文侯封太子擊於中山, WYG: 或諒闇}
