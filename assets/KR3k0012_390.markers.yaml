  - {type: variant, offset: 2924, length: 0, content: '', WYG: 民言不危行而行不危言也左傳僖中曰介子推曰言身之文也身將隠矣焉用文之文之是求顯也又襄四年曰仲尼曰言以足志}
  - {type: page-break, offset: 2924, content: '', id: KR3k0012_WYG_390-3b, image: WYG0896/WYG0896-0457d.png}
  - {type: variant, offset: 2926, length: 0, content: '', WYG: 足言足猶成也不足誰知其志言之無文行而不遠左傳昭公曰晉叔向適鄭􅎦蔑惡欲觀叔向從收器者立於堂下一言而善叔向聞之曰必􅎦眀也又定上曰鄭子太叔卒晉趙簡子為臨甚哀曰黄父之㑹賈逵解曰黄父㑹在昭五年夫子語我九言曰無始亂無為亂始無怙富無恃寵無違同無傲禮無驕能無復怒無謀非得無犯非義又哀上曰吳舍衛侯衛侯歸効夷言子之尚㓜曰君必不免其死於夷乎執焉而又説其言從之固矣論語曰詩三百一言以蔽之曰思無邪又曰}
  - {type: page-break, offset: 2926, content: '', id: KR3k0012_WYG_390-4a, image: WYG0896/WYG0896-0458a.png}
  - {type: variant, offset: 2928, length: 0, content: '', WYG: 欲訥於言而敏於行又曰定公問一言而可以興邦有諸孔子對曰言不可以若是其㡬也人}
  - {type: variant, offset: 2929, length: 7, content: 容有其容則文以, WYG: 言曰為君難為臣不易如知為君之難也不㡬乎一言而興邦乎又曰言語宰我子貢又曰羣居終日言不及義好行小慧難矣哉又曰}
  - {type: page-break, offset: 2929, content: '', id: KR3k0012_WYG_390-4b, image: WYG0896/WYG0896-0458b.png}
