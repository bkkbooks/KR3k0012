  - {type: variant, offset: 2009, length: 124, content: 文侯曰擊愛我知我所嗜好韓詩外傳同風俗通曰趙王好大眉民闊半額楚王好廣領國人沒頸文士傳曰嵇康性絕巧好鍜家有盛柳樹乃激水圜之夏天甚涼恒居其下自鍜有人就者康不受其直孝子傳曰隗通字君相犍為僰道人母好飲江脊水常乘舡捷致漂浚辛苦忽然有橫石特起直江脊後取水無復勞劇, krp: 聲也}
