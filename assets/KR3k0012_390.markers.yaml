  - {type: variant, offset: 2060, length: 252, content: 盛柳樹乃激水圜之夏天甚涼恒居其下自鍜有人就者康不受其直孝子傳曰隗通字君相犍為僰道人母好飲江脊水常乘舡捷致漂浚辛苦忽然有橫石特起直江脊後取水無復勞劇又曰陳遺為郡主簿母好食鐺底焦飯常持一囊盛之懸案下郭子曰陸士衡初入雒張公云宜詣劉道真於是二陸既往劉尚在哀制性嗜酒禮畢初無他言唯問東吳有長柄胡盧卿得種不陸兄弟殊失望乃云悔往世說曰謝遏年少玄也好著紫羅香囊太傅患之而不欲傷其意賭得而焚之又曰林公好鶴往剡東時有人遺其雙鶴少時翅長欲飛林公意甚惜之乃鎩其翮鶴騫翥不能復起乃舒翼反頭視之如似懊惱意林公曰既有凌霄之姿何肯為人作, WYG: 屬}
