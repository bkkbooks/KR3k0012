  - {type: variant, offset: 3983, length: 1, content: 容, WYG: 應墨子曰子禽問曰多言有益乎墨子曰蝦蟆蛙蠅日夜而鳴舌乾擗然而不聽今鶴雞時夜而鳴天下振動多言何益唯其言之時也孫卿子曰贈人以言重於金石珠玊傷人以言重於刃㦸觀人以言美於黼黻文章聽人以言樂於鍾鼓琴瑟又曰金人銘曰周太廟右階之前有金人焉三緘其口而銘其背曰我古之慎言人也戒之哉無多言無多事多言多敗多事多害皇覽云出太公金匱家語説苑又載莊子曰言者所以在意也得意而忘言吾安得忘言之人與之言哉説苑曰梁君山獵見白鴈羣梁君下車彀弓欲射之道有行者觀勸梁君}
