  - {type: variant, offset: 886, length: 197, content: 杖端客有醉寢伏輒以劖鋤銜切剌驗其醒醉晉書曰王濟好弓馬嘗乘一馬著連乾鄣泥前有水終不肯渡濟云此必是惜鄣泥使人解去便渡故杜預謂濟有馬癖晉中興書曰郭璞性輕易不持威儀嗜酒好色或過度其友人干寶常誡之曰此非適性爾璞曰吾所受有本限用之恒恐不盡乃憂為害乎後魏書曰辛少雍字季仲少有孝行尤為祖父紹先所受紹先愛食羊肝常呼少雍共食及紹先卒少雍終身不食羊肝宋書曰庚炳之性好潔士大夫造之者去未出戶輒令拭席枕床時陳郡殷沖亦好凈, WYG: 外爰暨}
