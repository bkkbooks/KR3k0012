  - {type: variant, offset: 427, length: 0, content: '', SBCK: 書曰啓與有扈戰于甘之野作甘誓又曰大野旣瀦東原厎平又曰伊尹相湯伐桀升自陑遂與桀戰于鳴條之野孔安國曰地在安邑之西又曰髙宗夢得􅀃審厥象傍求于天下􅀃築􅀓巖之野惟肖又曰王曰來􅀃台小子舊學于甘盤旣乃遯于荒野入宅于河旣學而中廢業遯居田野河洲也又曰歸馬于華山之陽放牛于桃林之野示天下弗復用又曰武王伐紂至于牧野乃誓毛}
  - {type: page-break, offset: 427, content: '', id: KR3k0012_SBCK_055-3b}
  - {type: variant, offset: 427, length: 0, content: '', WYG: 書曰啟與有扈戰于甘之野作甘誓又曰大野既瀦東原底平又曰伊尹相湯伐桀升自陑遂與桀戰于鳴條之野孔安國曰地在安邑之西又說命曰夢帝賚予良弼其代予言乃審厥象俾以形旁求于天下說築傅巖之野惟肖又曰王曰來汝說台小子舊學于甘盤既乃遯于荒野入宅於河既學而中廢業遯居田野河洲也又曰歸馬于華山之陽放牛於桃林之野示天下弗服又曰王朝至于商郊牧野乃誓毛}
  - {type: page-break, offset: 427, content: '', id: KR3k0012_WYG_055-5b, image: WYG0893/WYG0893-0467b.png}
  - {type: variant, offset: 427, length: 0, content: '', krp: 書曰啓與有扈戰于甘之野作甘誓又曰大野旣瀦東原厎平又曰伊尹相湯伐桀升自陑遂與桀戰于鳴條之野孔安國曰地在安邑之西又曰髙宗夢得說審厥象傍求于天下說築傳巖之野惟肖又曰王曰來說台小子舊學于甘盤旣乃遯于荒野入宅于河旣學而中廢業遯居田野河洲也又曰歸馬于華山之陽放牛于桃林之野示天下弗復用又曰武王伐紂至于牧野乃誓毛}
