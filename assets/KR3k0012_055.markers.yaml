  - {type: variant, offset: 431, length: 2, content: 異室, WYG: 削之又曰甸師掌共野果蓏之薦又曰遂人掌邦之野凡事致野役而師田作野民帥而至掌其政治禁令凡國祭祀共野牲令野職凡賔客令脩野道而委積委積於廬宿市經田野造縣鄙形體之法皆有地域溝樹之入野職野賦于王府又曰大司冦之職以五刑糾萬民一曰野刑上功糾力刑亦法也功農功力勤力又曰縣士掌野各掌其縣之民數糾其戒令而聽其獄訟左傳曰辛有適伊川見被髮祭於野者曰不及百年此其戎乎其禮先亡矣又曰鄭伯享趙孟于垂隴伯有賦鶉之賁賁趙孟曰牀第之言不踰閾况在野乎非使人之所敢聞又曰崔氏之亂申鮮虞僕賃於野以喪莊公楚人召之遂如楚為右尹又曰子産之從政也擇能而使之禆諶能謀謀於野則獲謀於邑則否鄭國將有諸侯之事子産乃令禆諶乘以適野使謀可否而告馮簡子使斷之又曰鸜鵒之羽公在外野往饋之馬又曰齊悼公使朱毛遷安孺子於駘不至殺諸野幕之下爾雅曰邑外謂之牧牧外謂之野春秋合誠圖曰堯母慶都蓋天帝之女生於斗維之野當三河東南天大雷電有血流潤大石之中生慶都管子曰萬乘之國兵不可以無主博大之地野不可以無夫野無夫則無蓄積也無田夫則人惰本業故無蓄積又曰行其田野視其耕耘計其農事而饑飽之國可知也其耕之不深耘之不謹地宜不任草田多穢耕者不必肥荒者不必墝其野草田多而闢田少者雖不水旱國必饑淮南子曰孔子行於東野馬食農夫之稼野人怒取其馬而擊之使子貢往説之卑辭而弗能得乃使馬圉往説之野人大喜解馬而與之又曰上遊乎霄雿之野下出乎垠鄂之門髙誘曰霄雿髙峻之貌也垠鄂無形之貌也國語曰臼季使舍於冀野賈逵曰臼季晉臣冀野晉地冀缺耨其妻饁之敬相待如賔從而問之曰冀芮之子也與之歸家語曰叔孫氏之車士曰鉏商車士持車者商子姓也鉏商名也採薪於大野獲麟焉折前左足載以歸叔孫以為不祥棄郭外告孔子曰麕而角者何也孔子往觀之曰麟也孰為來哉孰為來哉呂氏春秋曰禹東至扶桑之地青差之野髙誘曰青差東方之野也帝王世紀曰黄帝與神農氏戰於阪泉之野又曰炎帝殺蚩尤於中冀名其地曰絶轡之野又曰湯時大旱殷史卜曰當以人禱湯曰吾當自禱之遂齋戒剪髮斷爪已為牲禱於桑林之野告於上天已而雨大至又曰棄恤民勤稼蓋封地方百里廵教天下}
