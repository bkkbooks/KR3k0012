  - {type: variant, offset: 2496, length: 310, content: 逆旅劉向別錄曰方士傳言鄒衍在燕有谷地美而寒不生五穀鄒子居之吹律而溫氣至而生黍穀今名黍谷博物志曰夏桀之時為長宮於深谷之中三旬不出大風揚沙一夕填此宮谷也虞喜安天論曰日月行於飛谷謂地中也不聞列星復流於地且谷有水體日為火精水火不共器得無傷日之明乎水經注曰令居縣面北塞外瓦街容水文成龍試攪破之尋手成龍畜生將飲皆畏而走又燉煌西有馬蹄谷漢武帝聞大宛有天馬遣李廣利伐而得之甚以為奇故賦天馬之欹秦州記曰古有神婦負土欲塞谷繩絕墜負押木因成二樹其大數圍尋陽記曰廬山西南有康王谷又北嶺有劉成谷天欲雨輒聞鼓角簫笳之聲戴延之西京記曰梓澤去洛城二十里澤在金谷之中朝賢所集賦詩是石崇所居郡國志曰武都沮水之西有角弩谷即蜀將姜維勦五部溪羌之所又曰玉喬谷俗謂, SBCK: 郊}
