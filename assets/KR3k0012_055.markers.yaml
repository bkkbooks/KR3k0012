  - {type: variant, offset: 107, length: 2, content: 九里, SBCK: 子曰鳥飛反郷兎走歸窟典略曰􅂫秦與張儀始俱東學於齊􅀑谷先生皆通經藝百家之言􅀑谷弟子五百餘人爲作窟深二丈曰}
  - {type: page-break, offset: 107, content: '', id: KR3k0012_SBCK_055-2a}
  - {type: variant, offset: 107, length: 2, content: 九里, WYG: 子曰鳥飛反鄉兎走歸窟典略曰蘇秦與張儀始俱東學於齊鬼谷先生皆通經義百家之言鬼谷弟子五百餘人為作窟深二丈曰}
  - {type: variant, offset: 107, length: 2, content: 九里, krp: 子曰鳥飛反郷兎走歸窟典略曰蘇秦與張儀始俱東學於齊鬼谷先生皆通經藝百家之言鬼谷弟子五百餘人爲作窟深二丈曰}
  - {type: variant, offset: 110, length: 1, content: 高, SBCK: 能獨下在窟中􅀃使泣者則能分人主之地矣秦下􅀃之􅀑谷泣下沾衿秦與儀記一體也又曰董卓雖親愛吕布然時醉則罵以刀劒擊之不中而後止布恐終􅀍害乃私與司徒王允及尚書令士孫端謀養死士於窟室三年四月天子疾瘳卓詣宫賀布先置死士以邀之卓嚴駕岀馬躓不肯行心恠之欲還布􅂆使行到宫門入掖門死士交㦸刺卓墮車頋布所在布下馬曰有詔遂殺之列仙傳曰歷陽有彭祖仙窟請雨輙得也神仙傳曰李意其蜀人於成都角作一圡窟居之冬夏單衣髪長剪去之皆使長五寸或百日二百日三百日不岀窟郡國志曰相州隆慮}
  - {type: page-break, offset: 110, content: '', id: KR3k0012_SBCK_055-2b}
  - {type: variant, offset: 110, length: 1, content: 高, WYG: 能獨下在窟中説使泣者則能分人主之地矣秦下説之鬼谷泣下沾衿又曰董卓雖親愛呂布然時醉則罵以刀劍擊之不中而後止布恐終被害乃私與司徒王允及尚書僕射孫端謀養死士於窟室三年四月天子疾瘳卓詣宮賀布先置死士以邀卓嚴駕出馬躓不肯行心怪之欲還布勸使行到宫門入掖門死士交㦸刺卓墮車顧布所在布下馬曰有詔遂殺之列仙傳曰厯陽有彭祖仙窟請雨輙得也神仙傳曰李意期蜀人於成都角作一土窟居之冬夏單衣髪長剪去之皆使長五寸或百日二百日三百日不出窟郡國志曰相州隆慮}
