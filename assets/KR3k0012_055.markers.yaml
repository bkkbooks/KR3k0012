  - {type: variant, offset: 3145, length: 154, content: 越城嶺即零陵郡南臨源嶺是也談藪曰光州西北有一嶺高峻北臨滄江齊尚書郎崔挺遷光州於嶺上欲立觀宇故老云北嶺秋夏之際常有暴風迅雨巖石盡落相傳云是龍道不可久立挺曰人神相去何遠之有虬龍條忽豈唯一路乎𨔵營之數年果無風雨之患挺還歸尋為雷風所毀後不能立吳地志云南野縣有大庾嶺通廣州晉太康地志嶺峻阻螺轉上踰九磴二里至頂下七里平行, SBCK: ''}
