  - {type: variant, offset: 768, length: 288, content: 縣有重山即烈山也山下有一穴父老相傳是神農所生處也又曰大洪山巖嶂皆數百許仞入石門又得鍾乳穴穴上素崖立非人跡所及穴中多鍾沉凝膏下垂望齊水雪微津細液滴瀝不斷幽穴潛遠行者不極風土記曰太湖中山有洞穴傍行地中無所不通謂之洞庭續搜神記曰長沙醴陵縣有小水有二人乘舡取樵見岸下土穴中水流出有新斫木片逐水流上有深山有人跡異之相謂曰可試入水中看何由爾一人便以笠自鄣入穴穴纔容人行數十步便開明朗然不異世上外國圖曰風山之首高三百里風穴方三十里春風自此出也又曰神丘有火穴其光照千里去琅琊三万里荊州圖記曰盧縣有馬穴山傍有地道漢時常有百疋馬出其中形皆小似滇池馬今遂名其處曰馬穴又曰縣北九十里有趙屬山傍有石臺高, WYG: 御覽卷五}
