  - {type: variant, offset: 665, length: 1688, content: 眾奉以為君巴氏子務相乃中之又各令乘土舡約浮者當以為君唯務相獨浮因共立之是為廩君又曰江陵有駕部口宋文帝車駕發江陵至此黑龍躍出負帝乘舟左右失色上謂長史王曇首曰此乃夏禹所以受天命矣我何德以堪之故穴為龍穴焉又曰夏平縣有重山即烈山也山下有一穴父老相傳是神農所生處也又曰大洪山巖嶂皆數百許仞入石門又得鍾乳穴穴上素崖立非人跡所及穴中多鍾沉凝膏下垂望齊水雪微津細液滴瀝不斷幽穴潛遠行者不極風土記曰太湖中山有洞穴傍行地中無所不通謂之洞庭續搜神記曰長沙醴陵縣有小水有二人乘舡取樵見岸下土穴中水流出有新斫木片逐水流上有深山有人跡異之相謂曰可試入水中看何由爾一人便以笠自鄣入穴穴纔容人行數十步便開明朗然不異世上外國圖曰風山之首高三百里風穴方三十里春風自此出也又曰神丘有火穴其光照千里去琅琊三万里荊州圖記曰盧縣有馬穴山傍有地道漢時常有百疋馬出其中形皆小似滇池馬今遂名其處曰馬穴又曰縣北九十里有趙屬山傍有石臺高十五丈廣三丈有穴深一里內甚平整虛寂謂之仙穴錢塘記曰靈隱山有石穴傍入行十數步有水廣丈餘昔有人採鍾乳見龍跡聞穴裏搔搔有聲出宜都記曰佷山縣有丈石穴平居無水有渴者至請乞輒得水戲乞則不得又曰自西陵北行三十里有石穴名馬穴嘗有白馬出食人逐之入穴潛行出漢中漢中人失馬亦嘗出此穴相去數里武昌記曰蕪菁山有龍穴其水深闇少得入者人採鍾乳乘火而入下有水深數尺多有蝙蝠來撲火江乘地記曰西南二十里木廬山有鍾乳穴鄭緝之東陽記曰北山西崖有石床流水澆灌其側又有石田如稻田云堂裏有洞穴有人常於此採鍾乳入十餘日糧絕而穴不可窮王韶之神境記曰滎陽郡有孤山直長百餘丈東北有二穴寥寥然杳杳然便是雲霞中館矣又曰滎陽郡北三十里有何家巖傍有一穴始入幽峽而甚闇昔有採鍾乳者至此見有書三卷竹一枝潯陽記曰赤山下有石穴有人取鍾乳者經宿不知所窮水恒流出深處浮乃得過數里輒見有光明聞裏有聲若霹靂此人遽出竟無以測遠近有仙鼠常撲火鄧德明南康記曰西南有通天穴四壁石色似書丈六像下有石床有石子彈丸聚有一角又曰平固縣西覆笥下有洞穴穴口可廣五六尺高五尺餘昔有人採鍾乳深入為瞑不得出遂留住宿忽聞頭上有篙舡之聲北征記曰姑熟有井山有九穴與江通吳郡臨海記曰虞縣有穿山下有洞穴昔有在海中行者舉帆從穴中過盛弘之荊州記曰宜都佷山縣有山山有風穴口大數尺名為風井夏則風出冬則風入樵人有冬過者置笠穴口風吸之經月還涉長陽溪而得其笠則知溪穴潛通玄中記曰蜀郡有青城山有洞穴分為三孔西北通崑崙輿地記曰太湖東小山名洞庭純石巉巖木唯松柏山有三穴東頭北面一穴不容人西頭南面一穴亦然并有青泉流出西北一穴傴僂纔得入穴外石盤礡形勢驚人穴裏如一間堂屋上高丈餘恒津潤四壁石色青白南壁開處側肩得入潛行二道北通琅琊東通武縣西通長沙巴陵湖吳大帝使人行三十餘里而反云上聞有浪聲有大蝙蝠如鳥拂殺人火穴中高處火照不見穴有鵝管鍾乳冰寒可得入春夏不可入郡國志曰虔州歸義山夢水出焉有石室金色號為金穴室內常有金鼠出入又曰瓜州常樂縣縣有風穴恒以大石棧之若開暴風起連日又曰循州有龍穴潛通于海傍于洞庭吳都賦云目龍川而帶坰是此也又曰虢州楊震宅西有龍望原南崖有太尉公藏書穴太元初人入穴見古書二十餘卷焉會稽記曰郡有禹穴案漢書司馬遷傳云上會稽探禹穴又有禹井楊都云入洞穴出蒼梧注云在零陵言人從禹穴入至蒼梧出也周地圖記曰順政郡丙穴以其口向因以為名沮水經穴間而過或謂之大丙水每春三月上旬復有魚長八九寸或二三日聯綿從穴出躍相傳名為嘉魚即左太冲蜀都賦所謂嘉魚出於丙穴是也武陵記云鹿山有穴昔宋元嘉初武陵溪蠻入射鹿逐入一石穴穴才可容人蠻人入穴見有梯在其傍因上梯豁然開朗桑果靄然行人翱翔不似戎境此蠻乃枇樹記之其後尋之莫知所處谷說文曰泉通川曰谷易曰入于幽谷三歲不覿凶詩曰葛之覃兮施于中谷唯葉萋萋又曰惴惴小心如臨于谷又曰伐木丁丁鳥鳴嚶嚶出於幽谷遷于喬木又曰皎皎白駒在彼空谷左傳曰莫敖縊于荒谷盛弘之荊州記曰今竹林是也爾雅曰水注溪曰谷蜀志曰谷口今之斜谷是也唐書曰王龜字大年性簡淡蕭灑不樂仕進少以詩酒琴書自適不從科試京城光福里起第兄弟同居斯為宏敞龜意在人外倦接朋游乃於永達里園林深僻處創書齋吟嘯其間目為半隱亭及從父起在河中於條山谷中起草堂與山人道士遊朔望一還府第後人目為郎君谷, SBCK: ''}
