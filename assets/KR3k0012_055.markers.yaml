  - {type: variant, offset: 431, length: 2, content: 異室, SBCK: 削之又曰甸師掌共野果蓏之薦又曰遂人掌􅀖之野凢事致野役而師田作野民帥而至掌其政治禁令凢國􅀕祀共野牲野職凢賔客令脩野道而委積委積於廬宿市經田野造縣鄙形體之法皆有地域溝樹之入野職野賦于王府又曰野廬氏掌達國道路至于四畿比國郊野之道路宿息井樹又曰大司寇之職以五刑糺萬民一曰野刑上功糺力刑亦法也功農功力勤力又曰縣士掌野合掌其縣之民數糺其戍令而聽其獄訟左傳曰辛有適伊川見􅀍髮􅀕於野者曰不及百年此其戎乎其禮先亡矣又曰鄭伯亨趙孟于垂隴伯有賦鶉之賁賁趙孟曰牀苐之言不踰閾況在野乎非使人之所得聞又曰崔氏之亂申鮮虞僕賃於野以䘮莊公楚人召之遂如楚爲右尹又曰子産之從政也擇能而使之禆諶能謀謀於野則獲謀於邑則否鄭國將有諸侯之事子産乃令禆諶乗以適野使謀可否而告馮簡子使断之又曰鸜鵒之羽公在外野往饋之焉又曰齊悼公使朱毛遷安孺子於駘不至殺諸野幕之下爾雅曰邑外謂之牧牧外謂之野春秋合成圖曰堯母慶都蓋大帝之女生於斗維之野常三河東南天大雷電有血流潤大石之中生慶都管子曰萬乘之國兵不可以無主地博大野不可以無吏野無吏則無蓄積野無田夫則人墮本業故無蓄積又曰行其田野視其耕耘計其農事而飢飽之國可知也其耕之不深耘之不謹地冝不任草田多穢耕者不必肥荒者不必墝其野草田多而闢田少者雖不水旱飢國之野淮南子曰孔子行於東野馬食農夫之稼野人怒取其馬而擊之使子貢往􅀃之畢辭而弗能得乃使馬圉往􅀃之野人大喜解馬而與之又曰上遊乎霄雿之野下岀乎無垠鄂之門髙誘曰霄雿髙峻之貌也垠鄂無形之貌也霄讀縓綃雿讀􅀂翟氏之翟也國語曰􅍫季使舎於兾野賈逵曰􅍫季晉臣兾野晉地兾缺耨其妻饁之敬相待如賔從而問之曰兾芮之子也與之歸家語曰叔孫氏之車士曰鉏啇車士將車者啇于姓也鉏啇名也採薪於大野􅀗麟焉折前左足載歸叔孫以爲不祥棄郭外告孔子曰而角者何也孔子往觀曰麟也孰爲來哉孰爲來哉吕氏春秋曰禹東至搏木之地青差之野高誘曰青差東方之野也帝王世紀曰黃帝與神農氏戰於阪泉之野又曰炎帝殺􅃖尤於中兾名其地曰絶轡之野又曰湯時大旱殷吏􅁲曰當以人禱湯曰吾所爲謂自當遂齋戒剪髮断爪巳爲牲禱於桒林之野告於上天巳而雨大至又曰棄恤民勤稼盖封地方百里廵教天下}
