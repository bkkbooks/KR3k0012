  - {type: variant, offset: 429, length: 1, content: 穀, SBCK: 野有死􅍪惡無禮也林有撲樕野有死鹿白茅純束又曰燕燕于飛差池其羽之子于歸逺送于野又曰野有蔓草零露􅇛􅀆又曰􅁑生􅂪楚蘝蔓于野予美亡此誰與獨處毛萇曰喻婦人外成扵它家謂其君子從軍未還未知死生又曰蜎蜎者蜀烝在桑野敦彼獨宿亦在車下鄭􅀇曰蜀特行乆處桒野有似勞苦者詩曰鴻鴈于飛肅肅其羽之子于征劬勞于野又曰鶴鳴于九臯聲聞于野又曰我行其野蔽芾其樗㛰姻之故言就爾居又曰我征徂西至于艽野又曰殷啇之旅其㑹如林矢于牧野維予侯興又曰京師之野于時處處于時廬旅于時言言于時語語鄭􅀇曰京地衆民所居之野舎其賔旅言其所當言語也又曰駉駉牧馬在坰之野韓詩外傳曰孔子出遊少原之野有婦人哭甚哀問之婦人曰向刈薪亡吾􅆱簮是以哀也非傷亡簮其不忘故也禮記曰季春之月命司空曰時􅀨將降下水上騰循行國邑周視原野脩利堤防又曰舜勤衆事而野死鯀鄣洪水而殛死周禮曰大司徒之職掌建􅀖之土地之圖而辯其􅀖國都鄙之數制其畿疆而溝封之設其社稷之壝而樹之田主各以其野之所冝木遂以名其社與其野壝壇與堳埰也又曰惟王建國辨方正位體國經野又曰以九伐之法正􅀖國野荒民散}
