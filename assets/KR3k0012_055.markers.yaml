  - {type: variant, offset: 434, length: 1, content: 則, WYG: 於黑水之間潢􅀈之野又曰秦自非子受封至昭王滅周之嵗在大梁前後七遷皆在禹貢雍州之域荆山終南敦物之野東井輿鬼之分鶉火之次也焦贛易林曰舜升大禹石夷之野徵詣王庭拜治水土又曰多載重負捐棄於野但徒勞苦顧無誰予水經注曰自朝歌以南暨清水土地平衍據臯跨澤悉坶野矣郊説文曰距國百里曰郊爾雅曰邑外曰郊易曰密雲不雨自我西郊又曰}
