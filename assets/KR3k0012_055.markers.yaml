  - {type: variant, offset: 434, length: 1, content: 則, SBCK: 於黒水之間潢渚之野又曰秦自非子受封至昭王滅周之歳在大梁前後七遷皆在禹貢雍州之域荆山終南敦物之野東井輿􅀑之分鶉火之次也焦贑易林曰舜升大禹石夷之野徴詣王庭拜治水土又曰多載重􅀒􅂢棄於野徒勞但苦頋無誰予水經注曰自朝歌以南墍清水圡地平衍據臯跨澤悉坶野矣郊􅀃文曰距國百里曰郊爾雅曰邑外曰郊易曰宻雲不雨自我西郊又曰}
