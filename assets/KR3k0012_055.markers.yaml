  - {type: variant, offset: 2807, length: 336, content: 公即王喬所隱處谷有喬堂歲常祀之雲陽記曰龍谷水出雲陽宮東南又有鄭泉云漢時鄭朴字子真隱於谷口不屈其志耕於巖石之下名震京師時人亦因子真所居以為名也又有治谷封禪書所謂谷口是也去雲陽宮八十里出鐵治鑄之所因以為名入谷便流潦沸騰飛泉激兩岸峭壁孤豎盤橫枕谷口凜然凝沍常如八九月中朱明盛暑當晝暫暄涼秋晚候縵袍不暖所謂寒門也又云入冶谷二十里有百里槐樹樹北有泉名曰金泉按此樹猶存金泉西南百步谷中今有毛原監也十道志曰大谷在鞏縣東五里張衡東京賦曰孟津達其後大谷通其前陳思王洛神賦曰經通大谷潘岳閑居賦曰張公大谷之梨皆謂此也嶺廣州記曰有五嶺大庾始安臨賀桂陽揭陽是也南康記曰秦始皇略定楊越謫戍五方南守五嶺第一塞上嶺即南康大庾嶺是第二騎田嶺今桂陽郡臘嶺是第三都龐嶺今江華郡永明嶺是第四甿渚嶺亦江華郡白芒嶺是, SBCK: 平御覽卷}
