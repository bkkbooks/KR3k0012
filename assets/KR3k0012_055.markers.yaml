  - {type: variant, offset: 3300, length: 234, content: 里至亭一名橫亭一名塞上嶺建安記曰建安縣有禱嶺與泉州分界言嶺高禱而方過又有飛猿嶺喬木造天猿猱之所飛走故曰飛猿嶺歙州圖經曰海寧有容嶺有木石糖出樹空石罅中百姓每採之又曰黝縣有墨嶺上有石如墨色軟膩士人取以為墨又曰婺源有甘子嶺此地本無甘樹唯此忽有一株因以為名輿地志曰東陽畢嶺之下有錢嶺往往人於此嶺下獲大錢俗謂之錢嶺又曰贊皇縣有孔子嶺上有石堂寬博其石相拒若楹柱有石人象執卷之狀雷次宗豫章記曰西山中峰最高頂名鶴嶺即子喬控鶴經過之所壇在鶴嶺之側雲景鮮美草木秀潤異於它山山側有土名控鶴鄉, SBCK: 五}
