  - {type: variant, offset: 429, length: 1, content: 穀, WYG: 野有死麕白茅包之林有樸􅈪野有死鹿惡無禮也又曰燕燕于飛差池其羽之子于歸逺送于野又曰野有蔓草零露漙兮又曰葛生蒙楚蘞蔓于野予美亡此誰與獨處毛萇曰喻婦人憶其君子從軍未還未知死生又曰蜎蜎者蠋烝在桑野敦彼獨宿亦在車下鄭𤣥曰燭時行久處桑野似勞苦者又曰鴻鴈于飛肅肅其羽之子于征劬勞于野又曰鶴鳴于九臯聲聞于野又曰我行其野蔽芾其樗婚姻之故言就爾居又曰我征徂西至于艽野又曰殷商之旅其會如林矢于牧野維予侯興又曰京師之野于時處處于時廬旅于時言言于時語語鄭𤣥曰京地衆民所居之野舍其賔旅言其所當言語也又曰駉駉牡馬在坰之野韓詩外傳曰孔子出遊少原之野有婦人哭甚哀問之婦人曰向刈蓍薪亡吾簮是以哀也非傷亡簮不忘故也禮記曰季春之月命司空曰時雨將降下水上騰循行國邑周視原野修利隄防又曰舜勤衆事而野死鯀鄣洪水而殛死周禮曰大司空之職掌建邦之土地之圖而辨其邦國都鄙之數制其畿疆而溝封之設其社稷之壝而樹之田主各以其野之所宜木遂以名其社與其野壝壇與堳埒也又曰惟王建國辨方正位體國經野又曰周以九伐之法正邦國野荒民散}
