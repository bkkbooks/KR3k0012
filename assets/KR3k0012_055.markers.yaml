  - {type: variant, offset: 102, length: 4, content: 徐伯珍宅, SBCK: 魏末有孫登字公和汲郡共人也無家屬時人於汲縣北山土窟中得之崔鴻十六國春秋前秦録曰張忠字巨和中山人也永嘉之亂隱於秦山端拱􅀂尸無琴書之適不脩經典勸教但以至道虚無爲宗其居也依崇巖幽谷鑿地爲窟室弟子亦窟居去忠六十餘歩五日一朝其教也以形不以言弟子受業觀形而退淮}
  - {type: variant, offset: 102, length: 4, content: 徐伯珍宅, WYG: 魏末有孫澄字公和汲郡共人也無家屬時人於汲縣北山土窟中得之夏則編草為裳冬則披髮自覆為人無言好讀易鼔琴也崔鴻十六國春秋前秦錄曰張忠字巨和中山人也永嘉之亂隱於泰山端拱若尸無琴書之適不修經典勸教但以至道虛無為宗其居也依崇巖幽谷鑿地為窟室弟子亦窟居去忠六十餘步五日一朝其教也以形不以言弟子受業觀形而退淮}
