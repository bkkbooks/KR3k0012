  - {type: variant, offset: 19, length: 2, content: 石勒, WYG: 君後必為命世之器定難濟時者也涉歸率弟耐立将謀殺廆廆亡匿於遼東徐郁家太康五年國人殺耐迎廆立之太康十年又遷于徒河之青山元康四年定都大棘城所謂紫蒙之邑也永嘉六年王浚承制以廆為散騎常侍冠軍将軍前鋒大都督大單于皆讓不受擢舉賢良隨才授任魯國孔纂宿徳清望請為賔友平原劉讃儒學該通引為東庠祭酒其世子皝率國胄受業焉太興四年晉遣謁者拜廆使持節都督幽平東夷諸軍事車騎将軍平州牧封遼東郡公丹書鐵劵承制海東咸和元年加侍中位特進八年夏五月薨于文徳殿年六十五塟于青山晉遣使者贈車騎大将軍開府儀同三司諡襄公皝為燕王追諡武宣王雋稱尊追尊曰武宣皇帝廟號髙祖慕容皝崔鴻十六國春秋前燕録曰慕容皝}
