  - {type: variant, offset: 4911, length: 0, content: '', SBCK: 傅録尚書毛貴車􅀐尚書令梁楞左僕射梁安后安之女孫又誅丞相雷弱兒諸羗悉殺弱兒南安羗酋也生雖諒闇遊飲荒淫殺戮無道彎弓露刃以見朝臣錘鉗鋸鑿備置左右未幾后妃公卿巳下至于僕􅀠誅五百餘人二年正月嬖臣右僕射董榮言於生曰日蝕之灾宜以貴臣應之生曰唯有大司馬國之懿戚不可其在王司空生從之誅司空王隨壬戌饗羣臣于太極殿樂奏生親歌以}
  - {type: page-break, offset: 4911, content: '', id: KR3k0012_SBCK_121-9a}
  - {type: variant, offset: 4911, length: 0, content: '', krp: 傅録尚書毛貴車騎尚書令梁楞左僕射梁安后安之女孫又誅丞相雷弱兒諸羗悉殺弱兒南安羗酋也生雖諒闇遊飲荒淫殺戮無道彎弓露刃以見朝臣錘鉗鋸鑿備置左右未幾后妃公卿巳下至于僕隷誅五百餘人二年正月嬖臣右僕射董榮言於生曰日蝕之灾宜以貴臣應之生曰唯有大司馬國之懿戚不可其在王司空生從之誅司空王隨壬戌饗羣臣于太極殿樂奏生親歌以}
  - {type: variant, offset: 4912, length: 1, content: 八, SBCK: 之命尚書令辛牢典勸生怒曰何不強酒猶有坐者引弓矢射牢殺之於是百僚大懼無不引滿昬醉汙服蓬頭僵仆生以爲樂三}
  - {type: variant, offset: 4912, length: 1, content: 八, krp: 之命尚書令辛牢典勸生怒曰何不強酒猶有坐者引弓矢射牢殺之於是百僚大懼無不引滿昬醉汙服蓬頭僵仆生以爲樂三}
  - {type: variant, offset: 4914, length: 0, content: '', SBCK: 四月姚襄遣姚蘭等衆二萬七千進據黃洛生遣平王黃眉東海王堅建節將軍鄧羌等歩􅀐萬五千以討之羌僞不勝引􅀐而退襄追之至於三原羌廻􅀐拒襄大戰獲襄襄有駿馬日行千里是戰}
  - {type: variant, offset: 4914, length: 0, content: '', krp: 四月姚襄遣姚蘭等衆二萬七千進據黃洛生遣平王黃眉東海王堅建節將軍鄧羌等歩騎萬五千以討之羌僞不勝引騎而退襄追之至於三原羌廻騎拒襄大戰獲襄襄有駿馬日行千里是戰}
