  - {type: variant, offset: 4852, length: 1, content: 諸, SBCK: 六璽送于中山傳國璽蔣幹先巳送晉儁欲神其事業言曆運在己乃詐云得之賜閔妻號奉璽君封冉智爲海濵侯以輔弼評爲司州刺史鎭鄴十月輔國恪等三百五人奉皇帝璽十一月僭即皇帝位于正陽前殿大赦改年時晉遣使詣儁謂之曰還白汝天子我承人乏爲中國所推巳爲帝矣庚午書曰追崇祖考古人之令典武宣}
