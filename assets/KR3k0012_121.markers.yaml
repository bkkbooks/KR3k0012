  - {type: variant, offset: 2050, length: 2, content: 石虎, SBCK: 年四月黒龍一白龍一見于龍山皝率羣竂觀龍去龍二百歩􅀕以太牢二龍交首嬉翔解角而去皝大悦赦境內號新宫曰和龍立龍翔寺于山皝雅好文籍親造太上章以代急就又著典誡十五篇並以教胄子十四年皝親臨東庠考試學生其通經秀異者擢充近侍十月饗羣僚于承乾殿右長史宋諺性貪賜布百匹令自負而歸以傀其心十五年八月皝因見白兔馳射馬倒輦而還宫引太子儁囑以後事謂曰今中原未平方須經建委賢任哲此其時也恪智勇兼濟方堪任重汝其委之以成吾志九月薨于承乾殿年五十二冬十月葬龍山謚文明王儁稱尊追尊曰文明皇帝廟號太祖陵曰龍平晉書曰皝嘗田于西鄙將濟河見一老父服朱衣乗白馬舉手麾皝曰此非獵所王其還也祕之不言遂濟河連日大獲後見白兔馳射之馬倒被傷乃說所見輦而還宫引儁囑以後事以永和四年死在位十五年慕容儁}
