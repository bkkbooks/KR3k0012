  - {type: xml-element, offset: 4915, content: '', id: KR3k0012_CHANT_121-bkkxmlele20}
  - {type: variant, offset: 4915, length: 0, content: '', SBCK: 馬倒而擒之眉等振旅而歸初長安謠曰東海大魚化爲龍男爲王女爲公問在何所洛門東東海即堅封也第在洛門東生荒暴日滋殘虐彌甚羣臣朔望漏盡請見生曰知盡乎湏待飲訖或曰暮而不出百僚飢弊或至申酉之間方岀臨朝酒怒色厲多有殺戮或連月昏醉弗堪省覽或使宫人與男子躶交於殿前引羣臣臨而觀之或生剥牛羊驢馬爛雞鴨三五千爲羣放之殿中或生剥死囚面皮令其歌舞觀以爲樂勲戚忠良殺害略盡朝士奔逃草野皆曰從虎口岀左右得度一日如過十年至於截脛刳胎拉脇鋸頭殺者動有千數生夜對侍婢曰阿法兄弟亦不可信明當除之是夜清河王符法夢神告之旦將禍集汝門先覺可以免寤而心悸㑹侍婢來告乃與特進梁平老等帥壯士數百人潜入雲龍門東海王堅帥麾下三百人繼集宿衛將士皆捨仗歸堅生猶昬寢不悟堅衆旣至生驚問左右曰此輩何等人引生置别室廢爲越王俄而殺之時年二十三謚厲王封子馗爲越侯太平御覽卷第一百二十一}
