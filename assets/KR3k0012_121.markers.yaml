  - {type: variant, offset: 478, length: 0, content: '', WYG: 公時姚弋仲圖據關中恐洪先之遣子襄率衆五萬來伐洪洪迎擊敗之於是安定梁擾等並率關西民望説洪曰今胡運将終中原喪亂明公神武必成大業繼蹤周漢冝稱尊號以副四海之望洪以讖文有草付應王又孫堅之生背有草付字遂改姓苻氏自稱大将軍大單于三秦王初趙将軍麻秋西鎮枹音符䍐聞冉閔之亂率衆歸鄴洪使子龍驤雄逆擊獲之以秋為軍帥将軍秋説洪西都長安旣而秋因讌鴆洪将併其衆世子健收而殺之洪将死謂健曰關中周漢舊都形勝之國吾亡之後便可鼓行而西言終而薨年六十六苻健崔鴻十六國春秋前秦録曰健字運業洪第三子母𦍑氏夢感大羆而孕生之夜洪又夢族胄氐王蒲健謂之曰是兒興家門可以吾名字之於是名羆字世健後避石虎外祖張羆之名故改焉晉永和六年自稱征西大将軍開府都督關西諸軍事雍州刺史於是盡衆西行至孟津起浮橋以濟濟訖焚橋三輔堡壁悉降十一月入都長安于是左長史賈𤣥碩等請依昭烈稱漢中王故事表健為秦王繼而又請}
