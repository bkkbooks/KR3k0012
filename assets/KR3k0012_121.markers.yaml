  - {type: variant, offset: 4904, length: 0, content: '', SBCK: 餘封授各有差是年野蠶成繭野禾􅀍原百姓採野繭而衣収野粟而食􅀜西家給人足二年正月丞相雄等固請宜依漢晉兼皇王之美不可過自謙冲同趙之初號健從之僭即皇帝位于太極殿大赦諸公進爵爲王立五等之封以次進之三年正月下書}
  - {type: variant, offset: 4904, length: 0, content: '', krp: 餘封授各有差是年野蠶成繭野禾𬒳原百姓採野繭而衣収野粟而食關西家給人足二年正月丞相雄等固請宜依漢晉兼皇王之美不可過自謙冲同趙之初號健從之僭即皇帝位于太極殿大赦諸公進爵爲王立五等之封以次進之三年正月下書}
  - {type: variant, offset: 4905, length: 0, content: '', SBCK: 其令公卿巳下歳舉賢良方正孝廉清才多略博學秀才異行各一人或獻書規諫或靣陳朕過其速以聞勿俱貴賤四年丞相東海王雄卒贈相國進封魏王謚敬武王雄字元才洪之季子趙建武中拜龍驤將軍雄頭}
