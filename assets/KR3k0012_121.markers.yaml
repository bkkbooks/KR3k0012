  - {type: variant, offset: 4906, length: 2, content: 雨雪, SBCK: 足短故軍中稱爲大頭龍驤健甚重之曰元才吾之􅁎旦五年四月立淮南王生爲皇太子六月健寢疾引太師魚尊丞相雷弱兒太傅毛貴司空王隨等囑以後事受遺輔政乙酉薨于大極前殿年四十九葬原陵僞謚明皇帝廟號丗宗永興初追尊曰景明皇帝廟號髙祖符生崔鴻十六國春秋前秦録曰符生字長生健第三子㓜而麄􅁀昬酒無賴祖洪甚惡之生無一目七歳洪戲之問侍者曰吾聞瞎兒一淚信乎侍者曰然生怒引佩刀自刺出血曰此亦一淚耶洪大驚鞭之生曰性耐刀槊不堪鞭捶洪曰汝爲爾不巳吾將以汝爲奴生曰可不如石勒也及長力舉千鈞走及奔馬皇始五年僭即皇帝位大赦改年羣臣奏先帝晏駕甫尓不宜改號生怒不從窮推議主壽光元年七月殺右僕射叚純以太子門大夫趙韶爲僕射太子舎人趙誨爲中護軍著作佐郎董榮爲尚書竝以佞倖進也九月中書監胡文言於生昆頻有客星孛于大角榮惑入東井大角爲帝㘴東井秦之分野不出三年國有大喪大臣戮死願陛下逺追周文脩德以攘之生曰皇后與朕對臨天下足塞大喪之變於}
