  - {type: variant, offset: 4854, length: 3, content: 公卿于, SBCK: 尊爲髙武宣皇帝文明王爲太祖文明皇帝二年正月立后可足渾氏爲皇后光臺元年正月立中山王暐爲皇太子赦改年初廆有駿馬曰赭白有竒相逸力石虎之伐􅁄城皝將出避難欲乗之馬悲鳴踶嚙人莫能近皝曰此馬見異先朝􅀌嘗仗之濟難今不欲出者蓋先君之旨也乃止虎㝷奔退皝益竒之至是年四十九歳而駿逸不虧儁比之於鮑氏騘命鑄銅以圖其像親爲銘讚鐫頌其旁置}
