  - {type: variant, offset: 4897, length: 1, content: 謚, SBCK: 拜冠軍將軍監六夷諸軍事涇陽伯趙建平四年石生起兵於􅀜中洪遂西結張駿自稱晉北平將軍雍州刺史石虎旣滅生洪率户二萬下隴東如馮翊虎拜洪護氐校尉進爵爲侯徙秦雍州民羗十餘萬户于􅀜東遷洪龍驤將軍流民都督處之方頭從征叚遼有功進封西平郡公佛圖澄言符氏有王氣虎陰欲殺之洪稱疾不朝太寧元年進位侍中車􅀐大將軍開府儀同三司雍州刺史進封本國略陽郡公時姚弋仲亦圖據􅀜中恐洪先之遣子襄率衆五萬來伐洪洪逆擊敗之於是安定梁擾等並􅀜西民望說洪}
