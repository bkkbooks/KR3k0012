  - {type: variant, offset: 1616, length: 278, content: 上言西鄉竹死虵鼠鬥于安定府間二日虵死臨涇馬生角長安城中雞鳴音皆曰基茲安定廳事前夜聞誦書聲求之不得七日乃止隕石于肥鄉六月勒寢疾召中山王虎太子弘中常侍嚴震等侍疾禁中七月薨于西閤偽謚明皇帝廟號高祖晉書曰勒年十四隨邑人行敗洛陽倚嘯上東門王衍見而異之顧謂左右曰向胡雛吾觀其聲視有奇志恐將為天下之患馳遣收之會勒已去石弘崔鴻十六國春秋後趙錄曰石弘字大雅第三子母程夫人右光祿遐之妹建平元年立為太子虛衿受士好為文詠其所親昵莫非儒素勒謂徐光曰大雅愔愔殊不似將家子光曰漢祖以馬上取天下孝文以玄默治之聖人之後必世勝殘天之道也勒大悅程遐言於勒曰中山怏怏不可以輔少主宜早除之以便大計勒, WYG: 怒}
