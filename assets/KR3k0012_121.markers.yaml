  - {type: variant, offset: 474, length: 0, content: '', WYG: 鎮梁國五年正月暐南郊十月太尉奕迎神主和龍初暐委政太宰恪專受經于博士王勸助教尚鋒秘書郎杜詮並以明經講論左右至是通諸經祀孔子于東堂以勸為國子祭酒鋒國子博士詮散騎侍郎其執經侍講皆有拜授八年太宰恪卒九年十二月有神降于鄴自稱湘女有聲與人相接數日而去十年四月立貴妃可足渾氏為皇后六月晉大司馬桓溫率衆五萬來伐遂至枋頭吳王垂大敗之斬獲三萬餘級温奔還淮南垂既敗溫威德彌振太傅評大不便之太后遂與評謀殺垂十二月垂出奔秦十一年六月秦輔國将軍王猛鎮南将軍楊安率衆六萬來伐以太傅評下邳王厲等帥精兵三十萬拒秦師于潞川州郡盗賊大起鄴中怪異非常十月評及猛戰于潞川評師敗績單騎遁還猛乘勝追奔長驅至鄴十一月苻堅帥衆㑹猛來攻拔鄴城外亂散騎侍郎餘蔚䓁率扶餘髙句麗及上黨質子五百餘人夜開城門引納秦師暐與太傅評左衛将軍孟高等數十騎出奔昌黎堅遣将軍郭慶帥騎五千追之及暐于高陽秦将巨武執暐将縛之暐曰汝何小人而敢縛天子武曰我梁山巨武受詔縛賊何謂天子耶執暐送鄴堅問其奔状暐曰狐死首丘欲歸死于先人陵墓耳堅哀而釋之令還宮率文武出降堅入鄴宫升正陽殿徙暐及王公已下并諸鮮卑四萬餘户于長安封暐新興郡侯邑五千戸尋拜尚書堅征臺城為平南将軍别部都督淮南之敗隨堅還長安旣而吳王垂攻苻丕于鄴中山王冲起兵關中暐謀殺堅事發為堅所誅年三十五徳僭稱尊號偽諡幽皇帝晉書曰廆以武帝太康六年稱公至暐四丗暐在位十一年以海西公太和五年滅廆皝凡八十五年前秦苻洪崔鴻十六國春秋前秦録曰苻洪字廣世洛陽臨渭氐人其先有扈氏之苗裔子孫强盛世為氐酋其後家池生蒲長五丈節如竹形于時咸異之謂之蒲家因以為氏焉父懐歸為部落小帥母姜氏寝産洪先是隴右大雨霖百姓苦之謡曰雨若不止洪水必起故名之曰洪年十二父卒代為部帥好施多權畧善騎射屬劉氏之亂乃散千金招延俊傑戎晉襁負奔之權為盟主劉聰遣使拜平逺将軍不受自稱䕶氐校尉秦州刺史洛陽公羣氐推為首劉曜以洪為氐王及曜敗于洛陽洪率部人西保隴山石虎将軍攻上邽洪詣虎降虎跣出迎之拜冠軍将軍監六夷諸軍事涇陽伯趙建平四年石生起兵于關中洪遂西結張駿自稱晉北平将軍雍州刺史石虎旣滅生洪率户二萬下隴東如馮翊虎拜洪䕶氐校尉進爵為侯徙秦雍州民羌十餘萬户于關東遷洪龍驤将軍流民都督處于枋頭從征叚遼有功}
