  - {type: variant, offset: 4900, length: 1, content: 悼, SBCK: 自天必繼蹤周漢宜稱尊號以副四海之望洪以䜟文有草付應王又孫堅之生背有符字遂改姓符氏自稱大將軍單于三秦王初趙將軍麻秋西鎭抱音符牢聞冉閔之亂率衆歸鄴洪使子龍驤雄逆擊獲之以爲軍帥將軍秋說洪西都長安旣而秋因讌酖洪將併其衆丗子健収而殺之洪將死謂健曰􅀜中周漢舊都形勝之國吾亡之後便可鼓行而西言終而薨年六十六符健崔鴻十六國春秋前秦録曰健字建業洪第三子母姜氏夢感大羆而生生之夜洪夢族曽氐王蒲建謂之曰是兒興家門可以吾名字之於是名羆字丗健後避石虎外祖張羆之名故改焉晉永和六年自稱晉征西大將軍開府都督􅀜西諸軍事雍州刺史於是盡衆西行至盟津起浮橋以濟濟訖焚橋三輔堡壁悉降十一月入都長安於是左長史賈􅀇碩等依諸葛亮劉備故事表健爲秦王􅀇碩等乃上尊號健僞讓再三乃從之皇始元年正月僣即}
