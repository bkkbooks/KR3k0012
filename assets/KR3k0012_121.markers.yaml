  - {type: variant, offset: 4892, length: 0, content: '', SBCK: 寢疾謂大司馬恪曰吾患惙頓恐不濟脩短命也復何所恨但二宼未除景茂冲㓜慮其未堪家國多難吾欲逺追宋宣以社稷屬汝恪曰太子雖㓜天縱聦聖必能勝殘致治不可以亂正統儁怒曰兄弟之間豈虚飾乎恪曰陛下若以臣堪荷天下之任者寧不能輔少主也儁曰􅀂汝行周公之事吾復何憂四年正月儁薨於應福前殿年五十三僞謚景昭皇帝廟號烈祖葬龍陵儁雅好文籍性嚴重未曾以慢服臨朝雖閑居宴處亦無懈怠之色晉書曰儁在位十一年自初即位至于末年講論不倦覽政之暇唯與侍臣錯綜義理凡所著述四十餘篇也慕容暐崔鴻十六國春秋前燕録曰慕容暐字景茂儁之弟三子元璽三年封中山王㝷立爲皇太子光壽四年僭即帝位大赦改元建熈元年以太原王恪爲太宰録尚書行周公事專百揆上庸王評爲太傅副􅐌朝政司空楊騖爲太保呉王垂爲河南大都督十州諸軍事兖州牧鎭梁國四年正月暐南郊十月太尉弈迎神王和龍初暐委政太宰恪專受經于博士王勸助教尚鋒祕書郎杜詮竝以明經講論左右至是通諸經祀孔子于東堂以勸爲國子􅀕酒鋒國子博士詮散􅀐侍郎其執經侍講皆有拜授八年太宰恪卒九年十二月有神降于鄴自稱湘女有聲與人相接數日而去十年四月立貴妃可朱渾氏爲皇后六月晉大司馬􅁊温率衆五萬來伐遂至方頭呉王垂大敗之軒獲三萬餘級温奔還淮南垂旣敗温威德彌振太傅評大不使之太后遂與評謀殺垂十二月垂出奔秦十一年六月秦輔國將軍王猛鎭南將軍楊安率衆六萬來伐以太傅評下邳王厲等帥精卒三十萬拒秦師于潞州州郡盗賊大起鄴中怪異非常十月評及猛戰于潞川評師敗績單􅀐遁還猛乗勝追奔長駈至鄴十月符堅帥衆㑹猛來攻拔鄴城外亂散􅀐侍郎徐蔚等率扶餘句麗及上黨質民子弟五百人夜開城北門引納秦師暐與太􅀓評左衛將軍孟髙等數十􅀐岀奔昌􅀺堅遣將軍郭慶帥􅀐五千追之及暐于髙陽秦將巨虎執暐將縛之暐曰汝何小人而敢縛天子虎曰我梁山巨虎受詔縛賊何謂天子也執暐送鄴堅問其本狀暐曰狐死首丘欲歸死于先人陵墓堅哀而釋之令還宮率文武出降堅入鄴宫昇正陽殿徙暐及王公巳下并諸鮮卑四萬餘户于長安封暐新興郡侯邑五千户㝷拜尚書堅征臺城爲平南將軍别部都督淮南之敗隨堅還長安旣而呉王垂攻符丕于鄴中山王冲起兵􅀜中暐謀殺堅事發爲堅所誅年三十五德稱尊號僞謚幽皇帝晉書曰始廆以武帝太康六年稱公至暐四丗暐在位十一年以海西公太和五年滅通皝凡八十五年前秦符洪崔鴻十六國春秋前秦録曰符洪字廣丗略陽臨渭氐人其先有扈氏之苗裔子孫強盛丗爲氐酋其後家池生蒲長五丈節如竹形于時咸異之謂之蒲家因以氏焉父懷歸爲部落小帥母姜氏寢産洪先是隴右大􅀨霖百姓苦之謡曰􅀨􅀂不止洪水必起故名之曰洪年十二父卒代爲部帥好學多權略嘗􅀐射屬劉氏之亂散千金招延儁傑戎晉繈負奔之推爲盟主劉聦}
