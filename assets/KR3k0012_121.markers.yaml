  - {type: variant, offset: 467, length: 0, content: '', WYG: 州牧大将軍燕王承制封拜一如廆皝故事元璽元年正月司南車成雋大悦告于皝廟四月遣輔國恪相國奕討冉閔戰于魏昌㢘臺閔師大敗擒送之閔大将軍蒋幹輔閔子智固守鄴城遣輔弼評等帥騎一萬以討之鄴北郡縣悉降輔國奕等一百一十人勸稱尊號令曰非常之事匪寡德所宜聞也八月尅鄴輔弼評等送閔妻董氏太子智太尉申鍾并乘輿服物及六璽送于中山傳國璽蒋幹先以送晉雋欲神其事業言數在已乃詐云閔妻得之以獻賜閔妻號奉璽君封冉智為海濵侯以輔弼評為司州刺史鎮鄴十月輔國恪等五百五人奉皇帝璽上尊號十一月僭即皇帝位于正陽前殿大赦改元時晉遣使詣雋謂之曰還白汝天子我承人乏為中國所推己為帝矣庚午下令曰追崇祖考古人令典其追尊武宣王為髙祖武宣皇帝文明王為太祖文明皇帝二年正月立后可足渾氏為皇后升平元年正月復立中山王暐為皇太子赦其境内改元曰光壽初廆有駿馬曰赭白有竒相逸力石虎之伐棘城皝将出避難欲乘之馬悲鳴蹄齧人莫能近皝曰此馬見異先朝孤嘗仗之濟難今不欲出者蓋先君之㫖也乃止虎尋奔退皝益竒之至是年四十九嵗而駿逸不虧雋比之鮑氏驄命鑄銅以圖其像親為銘讃鐫勒其旁置之薊城東掖門是月像成而馬死十一月自薊遷鄴十二月入鄴宫大赦繕宫殿復銅雀臺以吳王垂為東夷校尉平州刺史鎮遼東二年三月常山寺大樹自㧞根出得璧二十七圭七十三光色精竒有異常玉雋以為岳神之命遣尚書郎段勤以太牢祀之五月遼西獲黒兎三年三月雋夜夢石虎齧其臋寤而惡之命發其墓剖棺出屍踏而罵之曰死胡安敢夢生天子遣御史中尉楊約數其殘酷之罪鞭而投之漳水十二月雋寝疾謂大司馬恪曰吾患惙頓恐不濟修短命也復何所恨但二冦未除景茂冲幼慮其未堪家國多難吾欲逺追宋宣以社稷屬汝恪曰太子雖幼天縦聰聖必能勝殘刑措不可以亂正統雋怒曰兄弟之間豈虛飾乎恪曰陛下若以臣堪荷天下之任者寧不能輔少主也雋曰若汝行周公之事吾復何憂四年正月雋薨于應福前殿年五十三偽諡景昭皇帝廟號烈祖葬龍陵雋雅好文籍性嚴重未曽以慢臨朝雖閒居宴處亦無懈怠之色晉書曰雋在位十一年自初即位至于末年講論不倦覽政之暇唯與侍臣錯綜義理凡所著述四十餘篇也慕容暐崔鴻十六國春秋前燕録曰慕容暐字景茂雋之第三子元璽三年封中山王尋立為皇太子光壽四年僣即帝位大赦改元建熈元年以太原王恪為太宰録尚書行周公事專百揆上庸王評為太傅賛朝政司空陽騖為太保吳王垂為河南大都督十}
