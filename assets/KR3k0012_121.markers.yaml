  - {type: variant, offset: 2791, length: 2124, content: 棺埋之誅其宮臣友黨二百餘人立河間公宣為太子建武六年追尊號考樂平孝公為太宗孝皇帝八年六月上黨孟門上有神人之像坐坐于山上三日而去虎遣使以太牢祀之九年十二月武鄉送雄虎變為雌乳一狼子七日噬虎腦而殺之後三日狼子亦死佛圖澄聞之流涕十年虎起河橋於靈昌津採石為中濟石無大小輒隨流用功五百餘萬不成虎如靈昌津沉壁告誠壁浮于渚上水波騰上津所殿觀莫不傾壞壓死者百餘人虎恚甚斬工匠而還十一年發雍梁十六萬人城長安未央宮又發司豫荊兗二十六萬人城洛陽宮十三年二月虎親耕籍田于桑梓苑十四年三月虎夢龍飛西南自天落地旦而問澄公公曰禍將至矣陛下宜父慈子和深以慎之四月秦公韜起宣光殿于太尉府梁長九丈太子宣視而惡之斬匠截梁而去韜怒增之十丈宣聞之恚甚謂楊柸牟成等曰韜凶豎勃逆敢違我如是汝等能殺之者吾入宮盡以韜之國邑分封汝等韜既死主上必親臨喪因行大事無不濟矣柸等許諾八月煞韜宣奏之虎哀絕久之乃蘇召太子宣鏁繫於鄴北火焚殺之議立太子于東堂虎曰吾欲以純灰三㪷洗吾腹穢惡故生凶子兒年二十便欲煞父今世方十歲比其二十吾已老矣齊公世為皇世子立昭儀劉氏為皇后十一月饗群臣于大武前殿佛圖澄殿上褰衣而行吟曰棘子成林將壞人衣虎發石而視之有棘子生焉冉閔小字棘奴也十二月辛巳雷大雨霖虎問佛圖澄澄曰其為我乎至戊子而澄卒大寧元年正月虎僣即皇帝位于南郊大赦改年二月有沙門從雍州來稱見佛圖澄西入關虎掘之無屍唯有一石虎惡之曰石者朕也葬我而去吾將死矣因而寢疾四月薨于金華殿晉書曰季龍始咸康元年僣位至此太和六年凡在位十五歲子世即位尊劉后為太后彭城王遵先鎮關右至是勒兵而還戎卒九萬次于湯陰石閔為前鋒都督太后令授遵丞相加九錫增封十郡己丑至安陽亭庚申曜兵入自鳳陽門昇太武前殿盡哀退如東閤群臣敦勸即位大赦封世為譙王邑萬戶廢太后劉氏為昭儀尋皆殺之世立凡三十三日尊其母鄭氏為皇太后立妃張氏為皇后大司馬義陽王鑒為太傅沛王冲為太保石閔為都督中外諸軍事錄尚書事甲午太武殿災諸門觀閤蕩然服御燒者太半光炎照天月餘乃滅乙未雨血周遍鄴城六月葬虎顯原陵偽謚武皇帝廟號太祖十一月石閔劫司空李農右衛王基等謀共廢遵閔使將軍蘇彥周成帥甲士三一人執于南臺如意觀遵時方與婦人彈碁問成等曰反者誰也成曰義陽王鑒當立遵曰我尚如是汝等立鑒復幾時遂殺之于琨華殿并誅鄭太后張皇后遵字太祗虎第九子凡在位百八十三日鑒即位大赦以石閔為將軍封武德王李農為大司馬鑒使中書令李松殿中將軍張才等夜誅閔農于琨華殿不克禁中擾亂鑒偽不知夜斬松才於西中華門龍驤將軍孫伏都劉誅等結羯士三千人伏于胡天亦欲誅閔等鑒在中臺伏都帥三十人將昇臺挾鑒以攻之鑒見問其故伏都曰閔農等反己在都掖門臣嚴帥衛士謹先啟知鑒曰卿好陳力勿憂無報也伏都等攻閔農不克閔農攻斬伏都等自鳳陽門至琨華撗尸相枕諸胡羯無少長斬之死者二十餘萬人于時高鼻多鬚至有濫死者青龍初元年正月石閔欲滅二石之號議曰孔子曰死姓而王七月者七十有二國繼趙李上讖書炳然且德星鎮衛宜改號大衛易姓李氏又大赦改元閏月廢鑒煞之誅虎孫三十八人盡殪石氏鑒在位一百三日鑒字太朗虎第三子也晉書曰季龍十三子五人為冉閔所殺八人自殘害讖言滅石者陵尋而徙封蘭陵公字龍惡之改蘭陵為武興郡至是終為閔所滅石勒以成帝咸和三年僣立二主四子凡二十三年以穆帝永和五年滅石閔崔鴻十六國春秋後趙錄曰石閔字永曾虎之養孫也父瞻字弘武本姓冉名良魏郡內黃人也其先漢黎陽騎督累世牙門勒破陳午於河內獲贍時年十二長而勇悍便弓馬臨陣不顧勒奇之曰此兒壯健可嘉命虎子之歷位左積射將軍封西華侯閔幼而果銳虎撫之如孫及身長八尺善謀勇力絕人虎即位為脩武侯歷北中郎將虎之敗昌黎閔軍獨全由此功名大顯永興元年閏月司徒申鍾司空郎闓等四十八人上尊號於閔僣皇帝位于南郊大赦改元號稱大魏復姓冉氏追尊祖隆元皇帝考贍烈祖皇帝母王氏為皇太后妻董氏為皇后子智為皇太子以司馬李農為太宰諸子皆為縣公新興王祗聞石鑒之死稱尊號于襄國改年永寧石祗遣相國汝陰王石琨帥眾十萬伐鄴六月進據邯鄲閔盡眾拒之琨軍大敗二年三月閔改襄國百餘日祗懼乃去皇帝之號改稱趙王遣太尉張舉乞師于慕容雋中軍張春請救于姚弋仲三月祗相國汝陰王琨自冀州救祗弋仲遣子襄帥騎三萬八千儁遣將軍悅綰帥甲士三萬勁卒十三萬四方攻之祗衛其後閔師大敗閔與十餘騎奔還鄴祗使劉顯師眾七萬追奔伐鄴閔盡眾出戰大敗之追奔至于陽平顯懼密使請降求煞石祗為效四月劉顯煞祗及其丞相樂安王炳太保張舉等遣拜顯上大將軍大單于冀州牧祗炳皆虎之庶子也七月劉顯稱尊號襄國三年二月劉顯帥眾伐常山守蘇彥告難閔率騎八千救彥敗顯于常山追奔及于襄國顯大將軍曹伏駒開門為應遂入襄國誅顯及其公卿已下百餘人焚襄國宮室遷其民于鄴三月慕容儁已剋幽葪略地至于冀州閔帥騎擊之與慕容恪遇于廣臺恪方陣而前閔眾寡不敵所乘赤馬曰朱龍日行千里潰圍出東奔二十餘里馬無故而死遂為恪所擒送之于薊儁立閔而問之曰汝奴僕下才何敢妄稱天子閔曰天下大亂尒曹夷狄人面獸心尚欲篡逆我一時英雄何為不可作王耶儁怒鞭之三日遣慕容評帥眾圍鄴五月送閔龍城告廆而煞之鄴中餓人相食虎時宮人略盡冉智尚幼蔣幹遣詹事劉猗奏表降晉八月長水校尉馬願龍驤將軍田香開門降評蔣幹懸而投出于倉垣評送閔后董氏太子智太尉申鍾及諸王公卿于薊初慕容儁斬閔于遏陘山山左右七里草木悉枯蝗虫大起自五月不雨至于十二月儁遣使者祀之謚曰武悼天王其曰大雨雪是歲太和八年也, WYG: ''}
