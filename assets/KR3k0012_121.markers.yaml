  - {type: variant, offset: 476, length: 0, content: '', WYG: 平西郡公佛圖澄觀苻氏有王氣虎陰欲殺之洪稱疾不朝太寧元年進位侍中車騎大将軍開府儀同三司雍州刺史改封}
