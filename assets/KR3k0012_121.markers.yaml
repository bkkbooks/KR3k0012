  - {type: variant, offset: 3655, length: 815, content: 如意觀遵時方與婦人彈碁問成等曰反者誰也成曰義陽王鑒當立遵曰我尚如是汝等立鑒復幾時遂殺之于琨華殿并誅鄭太后張皇后遵字太祗虎第九子凡在位百八十三日鑒即位大赦以石閔為將軍封武德王李農為大司馬鑒使中書令李松殿中將軍張才等夜誅閔農于琨華殿不克禁中擾亂鑒偽不知夜斬松才於西中華門龍驤將軍孫伏都劉誅等結羯士三千人伏于胡天亦欲誅閔等鑒在中臺伏都帥三十人將昇臺挾鑒以攻之鑒見問其故伏都曰閔農等反己在都掖門臣嚴帥衛士謹先啟知鑒曰卿好陳力勿憂無報也伏都等攻閔農不克閔農攻斬伏都等自鳳陽門至琨華撗尸相枕諸胡羯無少長斬之死者二十餘萬人于時高鼻多鬚至有濫死者青龍初元年正月石閔欲滅二石之號議曰孔子曰死姓而王七月者七十有二國繼趙李上讖書炳然且德星鎮衛宜改號大衛易姓李氏又大赦改元閏月廢鑒煞之誅虎孫三十八人盡殪石氏鑒在位一百三日鑒字太朗虎第三子也晉書曰季龍十三子五人為冉閔所殺八人自殘害讖言滅石者陵尋而徙封蘭陵公字龍惡之改蘭陵為武興郡至是終為閔所滅石勒以成帝咸和三年僣立二主四子凡二十三年以穆帝永和五年滅石閔崔鴻十六國春秋後趙錄曰石閔字永曾虎之養孫也父瞻字弘武本姓冉名良魏郡內黃人也其先漢黎陽騎督累世牙門勒破陳午於河內獲贍時年十二長而勇悍便弓馬臨陣不顧勒奇之曰此兒壯健可嘉命虎子之歷位左積射將軍封西華侯閔幼而果銳虎撫之如孫及身長八尺善謀勇力絕人虎即位為脩武侯歷北中郎將虎之敗昌黎閔軍獨全由此功名大顯永興元年閏月司徒申鍾司空郎闓等四十八人上尊號於閔僣皇帝位于南郊大赦改元號稱大魏復姓冉氏追尊祖隆元皇帝考贍烈祖皇帝母王氏為皇太后妻董氏為皇后子智為皇太子以司馬李農為太宰諸子皆為縣公新興王祗聞石鑒之死稱尊號于襄國改年永寧石祗遣相國汝陰王石琨帥眾十萬伐鄴六月進據邯鄲閔盡眾拒之琨軍大敗二年三月閔改襄國百餘日祗懼乃去皇帝之號改稱趙王遣太尉張舉乞師于慕容雋中軍張春請救于姚弋仲三月祗相國汝陰王琨自冀州救祗弋仲遣子襄帥騎三萬八千儁遣將軍悅綰帥甲士三萬勁卒十三萬四方攻之祗衛其後, SBCK: ''}
