  - {type: variant, offset: 1298, length: 317, content: 營露臺稱之於千古迨夏商之瓊臺瑤室楚秦章華阿房資財內竭華夷外叛詔曰且勑停作申吾直臣之氣九月以太尉中山王虎為大司馬程遐開府儀同是月大雨霖中山西北暴水流巨木萬餘根集于堂陽勒大悅謂公卿曰此非為災天意欲吾營鄴都耳於是營之勒以成周漢晉舊京欲有移都之意乃命洛陽為南都置行臺治書侍御史于洛陽三年正月大饗于建德殿酒酣勒謂徐光曰朕方自古開基何等主也光對曰陛下神武籌略邁于高皇雄藝卓犖超絕魏祖自三王已來無可比也其軒轅之亞乎勒笑曰人豈不自知卿言亦已太過朕若逢高皇當北面而事之然猶與韓彭競鞭而爭先耳脫遇光武者當並驅于中原未知鹿死誰手丈夫行事當礧礧落落如日月皎然終不能如曹孟德司馬仲達父子欺他孤兒寡婦狐媚以取天下朕在二劉之間軒轅豈所擬乎群臣皆稱萬歲四年雍州刺史石, WYG: 宜改號}
