  - {type: variant, offset: 3325, length: 329, content: 南郊大赦改年二月有沙門從雍州來稱見佛圖澄西入關虎掘之無屍唯有一石虎惡之曰石者朕也葬我而去吾將死矣因而寢疾四月薨于金華殿晉書曰季龍始咸康元年僣位至此太和六年凡在位十五歲子世即位尊劉后為太后彭城王遵先鎮關右至是勒兵而還戎卒九萬次于湯陰石閔為前鋒都督太后令授遵丞相加九錫增封十郡己丑至安陽亭庚申曜兵入自鳳陽門昇太武前殿盡哀退如東閤群臣敦勸即位大赦封世為譙王邑萬戶廢太后劉氏為昭儀尋皆殺之世立凡三十三日尊其母鄭氏為皇太后立妃張氏為皇后大司馬義陽王鑒為太傅沛王冲為太保石閔為都督中外諸軍事錄尚書事甲午太武殿災諸門觀閤蕩然服御燒者太半光炎照天月餘乃滅乙未雨血周遍鄴城六月葬虎顯原陵偽謚武皇帝廟號太祖十一月石閔劫司空李農右衛王基等謀共廢遵閔使將軍蘇彥周成帥甲士三一人執于南, SBCK: 魏昌廉}
