  - {type: variant, offset: 3124, length: 155, content: 邑分封汝等韜既死主上必親臨喪因行大事無不濟矣柸等許諾八月煞韜宣奏之虎哀絕久之乃蘇召太子宣鏁繫於鄴北火焚殺之議立太子于東堂虎曰吾欲以純灰三㪷洗吾腹穢惡故生凶子兒年二十便欲煞父今世方十歲比其二十吾已老矣齊公世為皇世子立昭儀劉氏為皇后十一月饗群臣于大武前殿佛圖澄殿上褰衣而行吟曰棘子成林將壞人衣虎發石而視之有棘子生焉, SBCK: 恪相國弈討}
