  - {type: variant, offset: 2321, length: 731, content: 征伐刑斷乃親覽之三月南遊臨江而還江東大震是日鶴省臺成賜匠有羗九月遷都鄴宮二年徙洛陽鍾簴九龍等于鄴是歲大武殿東西宮皆就大武殿基二丈八尺穿為伏室置衛士五百人於其中東西七十五步南北六十五步皆漆瓦金璫銀楹珠簾玉壁窮極伎巧起靈臺之殿于顯陽後採召百官州郡民女以充之後庭服綺穀珍奇者萬餘人內置宮女十八等教宮人星占及馬步射置女太史靈臺仰觀災祥以考外太史虛實禁郡國不得私知學星讖左校令成公叚造庭燎于崇杠之末高十餘丈上置繚下盤置人絙繳上下虎試而悅之三年太保安夔等文武五百九十人上皇帝尊號勸進方入而庭燎油灌下盤死者七人虎大怒腰斬成公叚于閶闔門即天王位南郊大赦親王貶為郡公蕃王為縣侯太子邃總百揆其後荒酒淫色驕恣無道或盤于遊畋懸管而入或夜百騎宿于宮臣家淫其妻妾裝飾宮人美淑者斬首洗血置盤上傳首視之又內諸比丘尼有姿色者與其交褻後煞之合牛羊肉煮而食亦賜左右所以識其味也虎荒躭內遊威怒違度邃以事可呈之怒曰此小事何足呈也時有所不聞復怒曰何以不呈誚責杖捶月至再三邃甚慍私謂中庶子李顏等曰官家難稱吾欲行冒頓之事卿從我乎顏等伏不敢對事發幽邃于東宮殺之及妃張氏男女二十六人盡賜死合一棺埋之誅其宮臣友黨二百餘人立河間公宣為太子建武六年追尊號考樂平孝公為太宗孝皇帝八年六月上黨孟門上有神人之像坐坐于山上三日而去虎遣使以太牢祀之九年十二月武鄉送雄虎變為雌乳一狼子七日噬虎腦而殺之後三日狼子亦死佛圖澄聞之流涕十年虎起河橋於靈昌津採石為中濟石無大小輒隨流用功五百餘萬不成虎如靈昌津沉壁告誠壁浮于渚上水波騰上津所殿觀莫不傾壞壓死者百餘人虎恚甚斬工匠而還十一年發雍梁十六萬人城長安未央宮又發司豫荊兗二十六萬人城洛陽宮十三年二月虎親耕籍田于桑梓苑十四年三月虎夢龍飛西南自天落地旦而問澄公公曰禍將至矣陛下宜父慈子和深以慎之, SBCK: ''}
