  - {type: variant, offset: 552, length: 803, content: 錄尚書事受遺輔政勒固辭乃止劉曜稱尊號將授勒太宰大將軍加九錫增封十郡并前二十郡出入警蹕如曹公輔故事曜聞曹平樂之言停太宰之授勒大怒曰趙王趙帝孤自取之名號大小豈爾所呼耶征虜虎與左右長史張敬張賓等上䟽曰大司馬雖位冠九台非霸者之號請改稱大將軍大單于領冀州牧趙王依魏王在鄴故事以二十四郡戶十九萬為趙國十一月勒即位改光初二年為趙王元年建社稷宗廟主書司典胡人出內重其禁法不聽侮易衣冠華族號胡為國人二年令曰國人不聽執㛐在喪婚娶至於燒葬令如本俗八月繕軒懸儛八佾作金根大輅黃屋左纛天子禮樂於斯備矣三年黎陽民陳武妻產三男一女上書自陳令曰昔周之興也四乳八子今武妻乳四子可謂慶過姬祥美加曩日其賜乳婢一人穀百石雜繒四十疋庶以肅迎嘉祥冬十月勒與鄉親齒坐語及平生勒曰李陽壯士也孤方任之何以不來父老歸語令速來漚麻麻之忿是布衣之恨孤方崇信于天下寧讎疋夫乎令曰武鄉吾之豐沛也其復之三世十一月李陽至引入懽酣宣楊臂笑視之曰卿雖老臂中猶有力頗復與人鬥不孤住曰厭卿老拳卿亦飽孤毒手賜甲第一拜為都尉陽與勒鄰居歲常爭漚麻池迭相敺擊四年二月拜子弘為世子勒雅好文學雖在軍旅之中常令儒生讀春秋史漢諸傳而聽之聞酈食其勸立六國後大驚曰此法當失何以得成天下至留侯諫乃曰賴有此侯耳其天資英達如此八年八月脩三臺十月以世子衛將軍弘鎮鄴太和十年劉曜圍洛陽襄國大震勒統步騎四萬趙金墉濟河先是流澌風猛軍至冰泮清和濟畢流澌大至以為神靈之助命曰靈昌津戰于西陽門曜軍大潰石堪執曜送之二年曜子熙等去長安奔于上邽車騎虎剋上封遣主簿趙封奉傳國玉璽送之秦隴悉平建元元年二月車騎虎等上尊號勒不許固請勒以趙天王行皇帝事大赦八月群臣又固請以名位不正宜即尊號九月僣即皇帝位大赦改年正月勒南郊有白氣自壇屬天勒大悅四月勒如鄴議營新宮廷尉續咸諫曰臣聞唐虞之治採掾茅茨土階三尺美彰于詩書漢文惜百金不營露臺稱之於千古迨夏商之瓊臺瑤室楚秦章華阿房資財內竭華夷外叛詔曰且勑停作申吾直臣之氣九月以太尉中山王虎為大司馬程遐, SBCK: ''}
