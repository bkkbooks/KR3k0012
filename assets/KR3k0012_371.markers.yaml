  - {type: variant, offset: 746, length: 55, content: 孝武帝鉤弋趙婕妤家在河間帝巡狩過河間望氣者言有奇女天子氣使使召之既至女兩手皆拳上自披之手即時伸由是得幸號為拳夫, SBCK: 王莽好反膺髙視京房易妖占曰}
  - {type: variant, offset: 746, length: 0, content: '', WYG: 王莽好反膺髙視京房易奴占曰人生子有二胸民謀其主帝王世紀曰禹母吞神珠胷圻而生禹淮南子曰文王洿膺南州異物志曰獠民亦謂文身國刻其胸前作華文以為飾山海經曰結胸國為人結胸郭璞注曰臆前突出如人結喉貫胷國為人胸有竅世說曰王}
