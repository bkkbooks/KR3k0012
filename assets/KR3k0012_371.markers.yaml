  - {type: variant, offset: 1550, length: 493, content: 以相殺是義貴於身孟子曰嫂溺則援之以手乎曰嫂溺不援是豺狼嫂溺則援之以手權也反於經而善者曰權韓子曰名實相須而成形體相應而生故一手獨抃雖疾無聲故曰左手畫圓右手畫方則不兩成呂氏春秋曰客有言伍員於王子光惡其容貌以告伍員曰願王子居重帷見衣若手請因說之王子光許之子胥說之半舉惟搏其手而與之坐燕丹子曰太子與荊軻置酒美人鼓琴軻曰好手太子即斷其手以玉盤奉之又王曰秦王斷荊軻兩手軻踞而罵曰吾坐輕易為豎子所欺太元經曰九體一為手足山海經曰柔利國為人一手野人國面目手足盡異一臂國為人一手神仙傳曰金筒玉札內經背云太上老子足踏二五手把十文鄭玄別傳曰玄唯有一子益恩有遺腹子玄以其手文似己名曰小同李郃別傳曰公長七尺八寸多鬚髯手握三公之字幽明錄曰石勒問佛圖澄劉曜可擒兆可見不澄令童子齊七日取麻油掌中研之燎旃檀而呪有頃舉手向童子掌內粲然有異澄問有所見不曰唯見一軍人長犬白哲以朱絲縛其肘澄曰此即曜也其年果生擒曜異苑曰陶侃左手有文直達中指至上撗節便絕占者以為此文若過位在無極侃針挑令徹血流彈壁乃作公字又取紙裹公跡愈明搜神記曰周暢少孝獨與母居每出入母欲呼之常自齧其手暢即應手痛而至治中從事未之信候暢時在田母齧手而暢即歸班固幽通賦注曰, WYG: ''}
