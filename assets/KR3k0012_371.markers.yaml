  - {type: variant, offset: 2107, length: 177, content: 虎掌是謂威射論語摘輔象曰澹臺滅明歧掌是謂正直戰國策曰蘇秦說李兌明曰復見抵掌而說兌送秦以明月之珠和氏之璧九州春秋曰公孫瓚為袁紹所圍曰天下兵起我謂可唾掌而決今視之兵革方始不如休兵積穀魏志曰上攻呂布於濮陽焚其東門布騎犯青州兵奔陣亂趨門門已燒上乘馬突火出墮馬燒左手掌司馬樓異扶上馬乃出魏略曰京兆鮑出有文才值世飢餓出求食飲噉人賊以繩貫其母手掌驅去走追擊賊得其母還孟, WYG: 龜脊墨}
