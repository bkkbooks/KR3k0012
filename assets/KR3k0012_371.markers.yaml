  - {type: variant, offset: 2865, length: 19, content: 駢拇枝指出乎性哉而侈於德枝於手者樹無用, krp: 文王四乳是謂太仁天下所歸百姓所親山海經曰形夭與帝爭神帝斷其首罪葬}
  - {type: variant, offset: 2870, length: 886, content: 乎性哉而侈於德枝於手者樹無用之指也又曰以指喻指之非指不若以非指喻指之非指也又曰指窮為薪而火傳也窮盡以為薪猶前薪以指指盡前薪之理故火傳而不滅黑子曰桀有勇力之人大戲紂有勇力之人費仲惡來崇侯虎並指畫殺人孟子曰養其一指而失肩背而不知也則為狼疾人矣醫養人疾治其一指而不知其害之此為也狼籍亂不知治疾之人也肩背之有疾以至於抱朴子指測海指極則謂水盡猶目察百步而云見極也吴越春秋曰夫差聞孔子至吳微服觀之或人傷其指王怒欲索國而誅之子胥諫乃止呂氏春秋曰倕巧人也不愛倕之指而愛己之指搜神記曰曾子從仲尼在楚而心動辭歸問母曰思之齧指孔子聞之曰曾之至誠也精感萬里孝子傳曰樂正者曾參門人也來候參參採薪在野母嚙右指旋頃走歸見正不語入跪問母何患母曰無參曰負薪右臂痛薪墮地何謂無母曰向者容來無所使故嚙指呼汝耳參乃悲然列仙傳曰漢武帝巡太山禝丘君冠章甫擁琴來拜曰陛下勿上上必傷足及上數里右足指果折上諱之故但祠而還列女傳曰廣漢龐伯妻段有美色早寡父母欲嫁之援刀割指以自誓陳留耆舊傳曰吳祐為膠東相安丘男子母丘長共母到市遇醉客罵母長怒殺之為吏所得繫獄祐問知無子令妻入遂有身臨刑齧指斷吞之謂妻曰若生男名曰吳生云我臨死吞指為誓屬子報吳君世說曰范宣年八歲後園桃菜誤傷指大啼人問痛也荅曰非為痛也但身體髮膚不敢毀傷是以啼耳班固幽通賦注曰管仲射小白中其鉤白陽僵鮑叔割指血塗之傾蓋以覆之哭曰吾君死矣魯攝兵爪釋名曰爪紹也䈥極為爪以紹續指端詩鴻鴈祈父曰祈父予王之爪牙胡轉予于恤靡所止居史記曰成王少時病周公乃自剪其爪沉之河以祀於神曰王少未有識干神命者乃旦也亦藏策於府成王病瘳及成王用事人或譖周公周公奔楚成王發見周公之禱書乃泣而歸周公謝承後漢書曰會稽戴就為郡倉曹掾太守為州所奏就見收持鐵針剌手爪中使以把土就十爪皆墮地終無撓辭魏略曰臨樂國王生浮屠身色黃髮青如絲爪赤如銅續晉陽秋曰義熙九年群盜發卞壺墓剖棺虜略壺屍僵鬚髮蒼白面如生人兩手悉拳爪甲乃長穿達手背焉三國典略曰齊主誅諸元姻黨死者凡七百二十一人悉投屍於漳水剖魚者得人爪甲鄴都為之不食魚也南史曰羊侃有妓著七寸鹿角爪彈箏一時無對韓子曰韓昭侯除爪而陽亡一爪求之甚急左右因取爪而效之昭侯以此察左右之不誠, SBCK: ''}
