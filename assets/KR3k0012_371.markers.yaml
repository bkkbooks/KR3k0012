  - {type: variant, offset: 953, length: 50, content: 記曰董卓於眾座中生斬人手足百姓嗷嗷魏略曰鄧雄鳴詣太祖太祖執其手曰孤方入關夢得神人即汝耶乃厚賜之王隱晉, WYG: ''}
