  - {type: variant, offset: 382, length: 235, content: 縣尹也上下手以遵囚意又曰邑姜方娠太叔夢帝謂己余命而子曰虞將與之唐屬諸參而蕃育其子孫及生有文在其手曰虞遂以命之又曰齊魯戰于炊鼻舟堅射陳武子中手舟堅季氏臣也失弓而罵武子罵也以告平子曰有君子白晢黰鬚眉甚口甚口多口平子曰必子彊也子彊武子又曰昔叔向適鄭鬷篾惡欲觀叔向從使之收器者而往立於堂下一言而善叔向將飲酒而聞之曰必鬷明也下執其手以上又曰衛侯為靈臺於籍圃與諸大夫飲酒焉褚師聲子襪而登席右者見君解襪公怒辭曰臣有病異於人足存創疾若見之君將歐嘔吐也許角切公愈怒褚師出公戟其手曰必斷其足, SBCK: ''}
