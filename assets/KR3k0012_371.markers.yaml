  - {type: variant, offset: 3330, length: 533, content: 身臨刑齧指斷吞之謂妻曰若生男名曰吳生云我臨死吞指為誓屬子報吳君世說曰范宣年八歲後園桃菜誤傷指大啼人問痛也荅曰非為痛也但身體髮膚不敢毀傷是以啼耳班固幽通賦注曰管仲射小白中其鉤白陽僵鮑叔割指血塗之傾蓋以覆之哭曰吾君死矣魯攝兵爪釋名曰爪紹也䈥極為爪以紹續指端詩鴻鴈祈父曰祈父予王之爪牙胡轉予于恤靡所止居史記曰成王少時病周公乃自剪其爪沉之河以祀於神曰王少未有識干神命者乃旦也亦藏策於府成王病瘳及成王用事人或譖周公周公奔楚成王發見周公之禱書乃泣而歸周公謝承後漢書曰會稽戴就為郡倉曹掾太守為州所奏就見收持鐵針剌手爪中使以把土就十爪皆墮地終無撓辭魏略曰臨樂國王生浮屠身色黃髮青如絲爪赤如銅續晉陽秋曰義熙九年群盜發卞壺墓剖棺虜略壺屍僵鬚髮蒼白面如生人兩手悉拳爪甲乃長穿達手背焉三國典略曰齊主誅諸元姻黨死者凡七百二十一人悉投屍於漳水剖魚者得人爪甲鄴都為之不食魚也南史曰羊侃有妓著七寸鹿角爪彈箏一時無對韓子曰韓昭侯除爪而陽亡一爪求之甚急左右因取爪而效之昭侯以此察左右之不誠淮南子曰古將之出鑿凶門設明衣剪指爪許慎注曰明衣遺終衣也剪手足指爪者是必死也帝王世紀曰湯伐桀後大旱七年遂齊戒剪髮斷爪以己為犧牲禱於桑林之社夏侯湛新論曰爪生於肉去爪而肉不知列異傳曰神仙麻姑降東陽蔡經家手爪長四寸經意曰此, krp: ''}
