  - {type: xml-element, offset: 3929, content: '', id: KR3k0012_CHANT_371-bkkxmlele222}
  - {type: variant, offset: 3929, length: 0, content: '', SBCK: 耳有識者聞而惡其言南燕録曰慕容德其母夢日入臍中晝寑而生德莊子曰支離䟽頥隠於臍􅀏林曰趙伯翁肥大夏日醉卧孫兒縁其肚上戲因以李八九枚内臍中至後日李大爛汁出乃泣謂家人曰我膓爛將死明日李核出乃知孫兒所内李子也腰􅀃文曰腰身中也釋名曰腰約也在體之中約繼大而小也春秋元命苞曰腰而上者爲天尊髙陽之狀腰而下者爲隂豐厚地之重數合於四故腰周四尺後漢書曰東平憲王蒼腰帶八圍顯宗甚重之詔曰日者問東平王處家何等最樂王曰爲善最樂其言甚大副是腰腹矣又曰梁兾妻能作折􅆎歩晉書曰陶潜曰不能爲五斗米折腰於郷里小人干寳晉紀曰中書令李豐謀廢大將軍世宗使舎人王羡請之豐來辭不遜左右以刀環築腰死南史曰羊偘有妓張静琬腰一尺六寸能掌中舞孫荆玉能反腰帖地衘得地上簮二石僞事曰石虎攻中山得鄭略之妹生二男更娶崔爲妻至相敬待無兒鄭復生男崔求養鄭不許一月卒病死鄭䜛崔謂妾多養胡子虎時踞胡牀於庭中大怒索弓箭崔聞欲殺之徒跣至虎前曰公勿枉殺妾乞聽妾言虎不聽但言促還坐無預卿崔便去未至虎於後射之中腰而覆墨子曰楚靈王好士細腰故其臣皆三飯爲節脇息然後帶扶墻然後起韓子曰楚靈王好細􅆎國有餓死人尹子曰楚莊王好細􅆎一國皆有飢色西京雜記曰趙后體腰柔弱善行歩進止女弟昭儀不能及也太平御覽卷第三百七十一}
