  - {type: variant, offset: 2105, length: 288, content: 仲尼虎掌是謂威射論語摘輔象曰澹臺滅明歧掌是謂正直戰國策曰蘇秦說李兌明曰復見抵掌而說兌送秦以明月之珠和氏之璧九州春秋曰公孫瓚為袁紹所圍曰天下兵起我謂可唾掌而決今視之兵革方始不如休兵積穀魏志曰上攻呂布於濮陽焚其東門布騎犯青州兵奔陣亂趨門門已燒上乘馬突火出墮馬燒左手掌司馬樓異扶上馬乃出魏略曰京兆鮑出有文才值世飢餓出求食飲噉人賊以繩貫其母手掌驅去走追擊賊得其母還孟子曰行不忍人之政治天下可運之掌上孫卿勸學曰有子惡臥而卒倉韋切其掌可謂能自忍矣桓範世要論曰有君好臥而剌其掌南方異物志曰烏滸人以人掌蹶為珍重以食長老指春秋元命苞曰指五者法五行傳曰楚人獻黿於鄭靈公公子宋與子家將入見公子宋子公, SBCK: 乳酒}
