  - {type: variant, offset: 2768, length: 370, content: 曰武帝與胡貴嬪爭樗蒲傷其指帝怒曰此固將種也嬪曰北伐公孫西拒諸葛非將種而何唐書曰太宗嘗閑宴顧謂李勣曰朕將屬以幼孫思之無越卿者公往不遺於李密今豈負於朕哉勣雪涕致詞因噬指流血俄而沉醉乃解御服覆之莊子曰駢拇枝指出乎性哉而侈於德枝於手者樹無用之指也又曰以指喻指之非指不若以非指喻指之非指也又曰指窮為薪而火傳也窮盡以為薪猶前薪以指指盡前薪之理故火傳而不滅黑子曰桀有勇力之人大戲紂有勇力之人費仲惡來崇侯虎並指畫殺人孟子曰養其一指而失肩背而不知也則為狼疾人矣醫養人疾治其一指而不知其害之此為也狼籍亂不知治疾之人也肩背之有疾以至於抱朴子指測海指極則謂水盡猶目察百步而云見極也吴越春秋曰夫差聞孔子至吳微服觀之或人傷其指王怒欲索國而誅之子胥諫乃止呂氏春秋曰倕巧人也不愛倕之指而愛己之指搜神記曰曾子從仲尼在楚而心動辭歸問母曰思之齧指孔子聞之曰曾之至誠也精感萬里孝子, WYG: 陶潛}
