  - {type: variant, offset: 856, length: 2, content: 廣漢, WYG: 奉乳自飲以其餘賜争者竊相語遂號哭攀援不觧俱言曰侍御豈不以兄弟同乳母耶悲號不自勝請同居如初相書許負曰乳間闊尺富貴足夀乳黒如墨公侯之相腹說文曰腹厚也釋名曰腹複也富也腹胃之屬已自裏盛復扵外複之其中多品似富也自臍以下曰水腹水汋所聚也又曰少腹少小也比臍以上為小也易說卦曰坤為腹離其於}
  - {type: page-break, offset: 856, content: '', id: KR3k0012_WYG_371-7a, image: WYG0896/WYG0896-0306a.png}
