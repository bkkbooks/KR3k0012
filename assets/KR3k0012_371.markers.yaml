  - {type: variant, offset: 854, length: 1, content: 玉, WYG: 氏為人凶妬生兒犂民年始二嵗充外入就乳母抱中鳴撮郭遥見謂充愛乳嫗即殺之兒恒啼泣不吃他乳經日遂死郭於是終身無子唐新語曰韓思彦以侍御史廵察于蜀成都有富商兄弟三人分資不平争訴累年不决思彦推案數日令厨}
  - {type: page-break, offset: 855, content: '', id: KR3k0012_WYG_371-6b, image: WYG0896/WYG0896-0305d.png}
