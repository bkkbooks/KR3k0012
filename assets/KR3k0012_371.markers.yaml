  - {type: variant, offset: 3901, length: 0, content: '', krp: 崔遽令檢之玠捫腹曰巳藏之經笥矣世說曰郝隆七月七日出日中仰卧人問其故荅曰我曬腹中書耳又曰張華旣貴有少時賔客來候之華與共飲九醖爲酣暢其夜醉眠張常飲此酒眠輙使人左右轉倒其夜客卧忘勑左右而左右依常爲張公轉側至明起友人猶不起視之酒果穿腹流牀下滂沲又曰劉眞長始}
  - {type: variant, offset: 3902, length: 0, content: '', SBCK: 謂充愛乳嫗即殺之兒􅁪啼泣不飲他乳經日遂死郭於是終身無子唐新語曰韓思彦以侍御史廵察于蜀成都有冨啇兄弟三人分資不平爭訴累年不决思彦推案數日令厨者奉乳自飲以其餘賜爭者􅀼相語遂號􅂘攀援不解俱言曰侍御豈不以兄弟同乳母耶悲號不自勝請同居如􅀄相書許􅀒曰乳間闊尺冨貴足壽乳黒如墨公侯之相腹􅀃文曰腹厚也釋名曰腹􅃨也冨也腹胃之屬已自裹盛復於外􅃨之其中多品似冨者也自齊巳下曰水腹水汋所聚也又曰少腹少小也比齊巳上爲小也易􅀃卦曰坤爲腹離其於人也爲大腹尚書盤庚曰今予其敷心腹腎膓歴告爾百姓于朕志左傳宣十三年傳曰楚子圍蕭司馬卯言號申叔展曰有麥麴乎曰無有山芎藭乎曰無河魚腹疾柰何曰目於眢井而出之國語曰叔魚牛腹其母歎曰必以賄死史記曰薄􅁎曰昨夜夢蒼龍據妾腹帝曰此貴徴也吾爲汝成之}
  - {type: page-break, offset: 3902, content: '', id: KR3k0012_SBCK_371-4a}
  - {type: page-break, offset: 3902, content: '', id: KR3k0012_SBCK_371-4b}
  - {type: variant, offset: 3902, length: 0, content: '', krp: 王丞相時盛暑之月丞相以腹熨彈碁局曰何乃訋吴人以冷爲訋或作渹音與鄭相近劉旣出人問見王公如何劉曰未見他異唯作吴語耳又曰郄太尉在京日遣門生與王丞相書求女壻丞相語郄信曰君徃東廊下任意選之門生歸白郄云王家諸郎皆可喜聞某來覔女壻咸自矜持唯有}
  - {type: variant, offset: 3903, length: 0, content: '', SBCK: 幸生男是爲代王史記曰范睢􅀃秦昭王曰伍子胥橐載而出昭門夜行晝伏至於陵水無以餬其口膝行匍匐稽首肉􅃝鼓腹吹簫乞食於吴市卒興吴國闔閭爲伯東觀漢記曰光武降銅馬諸將未能信賊賊亦兩心上勑賊各歸勒兵上輕􅀐入賊營賊曰蕭王推赤心置人腹中安得不投死又曰帝問東平王蒼在家何等最樂對曰爲善最樂後詔與諸國述之曰王言甚大副其腰腹矣謝承後漢書曰濟隂戎良字子恭年十八爲郡門下幹良儀容佳麗太守諸􅁑禮使冩書從者誣良與婢通良刳腹引出肝膓示禮赤心後漢書曰邊韶字孝先教授數百人韶口辯曽晝眠卧弟子嘲曰邊孝先腹便便􅈸讀書但欲眠韶潜聞之應之曰吾以邊爲姓先爲字腹便便五經笥但欲眠思經義寐與周公通夢静與孔子同意師而可嘲出何典記嘲者大慙魏志曰管輅弟展謂輅曰大將軍待君意厚兾當冨貴輅長歎曰天與我明才不與我年壽恐四十七八間不見}
  - {type: page-break, offset: 3903, content: '', id: KR3k0012_SBCK_371-5a}
  - {type: variant, offset: 3903, length: 26, content: 女子枕其臂始欲捉之以爪槨呼郭切其手痛不可忍放之遂飛去, WYG: ''}
  - {type: variant, offset: 3903, length: 0, content: '', krp: 郎在東床坦腹而食如不聞郄云正好比訪之乃是逸少因嫁}
  - {type: variant, offset: 3904, length: 0, content: '', SBCK: 嫁男娶吾背無三甲腹無三壬此皆不壽之驗明年四十八卒吴録曰丁固夢腹上生松趙逹謂之曰松字十八公後果然夢門巳具齊書曰髙帝爲領軍蒼梧王深相猜忌屢欲害帝常帥數十人直入領軍府時暑熱帝晝卧祼􅃝蒼梧立帝於室内􅀞腹爲射的自引滿將射之帝神色不動歛􅃑曰老臣無罪蒼梧左右王天恩諌曰領軍腹大是佳射堋而一箭便死後無可復射不如􅐴射之乃取􅐴箭一發即中帝臍蒼梧投弓於地大􅀏曰此手如何崔鴻十六國春秋後趙録曰佛圖澄腹傍有一孔常以絮塞之每夜書則拔絮孔中出光照于一室又當齋時平旦至流水側復腹傍孔中引出五藏六腑洗之訖還内腹中老}
  - {type: page-break, offset: 3904, content: '', id: KR3k0012_SBCK_371-5b}
  - {type: variant, offset: 3904, length: 0, content: '', krp: 與之俗說曰有人指周伯仁腹曰此中何有荅此中洪洞容卿等數百人背說文曰背脊也釋名曰背陪也在後稱也廣雅曰背謂之骶音帝背北也左傳莊公曰齊襄公田于貝丘見大豕從者曰公}
  - {type: variant, offset: 3905, length: 1, content: 枕, SBCK: 曰虚}
  - {type: variant, offset: 3905, length: 1, content: 枕, krp: 彭生也公怒曰彭生敢見射之豕人立而啼公懼墜于車傷足喪屨反誅屨於徒人費弗得鞭之見血走出遇賊于門刧而束之費曰我奚御哉祖而示之背信之費請先入伏公而出鬪死于門中史記曰婁敬說髙祖曰夫與人闘不搤}
  - {type: variant, offset: 3907, length: 1, content: 臂, SBCK: 心實其腹又曰聖人爲腹不爲目莊子曰夫赫胥氏之時民含餔而熈鼓腹而遊唐子曰人君以江海爲腹山爲面如此則下不知其量畏而懷之帝王世紀曰紂刳孕婦之腹中以觀其胎吴越春秋曰子胥鞭平王尸三百右手决其目左手踐其腹京房易占曰人生有二腹其國分王子年拾遺録曰孫䇿母夢膓出委地有神女夜來爲其收内腹裏云必生才雄之子方興吴國神女􅀒䇿母繞吴昌門三匝曰當錫尓此土鼎足於天下談藪曰楊玠娶􅀶陵崔季讓女崔家冨圖籍殆將萬卷成婚之後頗亦遊其書齋旣而告人曰崔氏書􅀍人盗盡曽不之􅁴崔遽令檢之玠捫腹曰巳藏之經笥矣世􅀃曰郝隆七月七日出日中仰卧人問其故荅曰我曬腹中書耳又曰張華旣貴有少時賔客來候之華與共飲九醖爲酣暢其夜醉眠張常飲此酒眠輙使人左右轉倒其夜客卧忘勑左右而左右依常爲張公轉側至明起友人猶不起視之酒果穿腹流牀下滂沲又曰劉眞長}
  - {type: page-break, offset: 3907, content: '', id: KR3k0012_SBCK_371-6a}
