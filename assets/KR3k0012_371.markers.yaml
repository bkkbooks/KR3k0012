  - {type: variant, offset: 3894, length: 0, content: '', krp: 趙嫗者九眞軍安縣女子也乳長數尺不嫁入山聚羣盗遂攻郡常着金㩉蹤屐戰退輙張帷幙與少男通數十侍側}
  - {type: variant, offset: 3896, length: 5, content: 陶璜畫臥覺, SBCK: 吴郡陸胤平之王子年拾遺録曰無老國其人皆千歳百歳一老齒落髮秃又年少嫗者乳養還復􅀂㓜稚神仙服食經曰仙藥有陽丹隂丹隂丹婦人乳汁也婦人十五巳上下爲月客有身月客絶上爲乳汁養性經曰乳者意之府也世􅀃曰王武子蒸肫肥美異常味武帝怪問何由乃尔云以人乳飲之武帝色甚不平所以飲食未畢便去異苑曰賈充妻郭氏爲人凶妬生兒􅀺民年始二歳充外入就乳母抱中嗚撮郭遥}
  - {type: variant, offset: 3896, length: 2, content: 陶璜, krp: 吴郡陸胤平之王子年拾遺録曰無老國其人皆千歳百歳一老齒落髮秃又年少嫗者乳養還復若㓜稚神仙服食經曰仙藥有陽丹隂丹隂丹婦人乳汁也婦人十五巳上下爲月客有身月客絶上爲乳汁養性經曰乳者意之府也世說曰王武子蒸肫肥美異常味武帝怪問何由乃尔云以人乳飲之武帝色甚不平所以飲食未畢便去異苑曰賈充妻郭氏爲人凶妬生兒黎民年始二歳充外入就乳母抱中嗚撮郭遥見謂充愛乳嫗即殺之兒恒啼泣不飲他乳經日遂死郭於是終身無子唐新語曰韓思彦以侍御史廵察于蜀成都有冨啇兄弟三人分資不平爭訴累年不决思彦推案數日令厨者奉乳自飲以其餘賜爭者竊相語遂號哭攀援不解俱言曰侍御豈不以兄弟同乳母耶悲號不自勝請同居如𥘉相書許負曰乳間闊尺冨貴足壽乳黒如墨公侯之相腹說文曰腹厚也釋名曰腹複也冨也腹胃之屬已自裹盛復於外複之其中多品似冨者也自齊巳下曰水腹水汋所聚也又曰少腹少小也比齊巳上爲小也易說卦曰坤爲腹離其於人也爲大腹尚書盤庚曰今予其敷心腹腎膓歴告爾百姓于朕志左傳宣十三年傳曰楚子圍蕭司馬卯言號申叔展曰有麥麴乎曰無有山芎藭乎曰無河魚腹疾柰何曰目於眢井而出之國語曰叔魚牛腹其母歎曰必以賄死史記曰薄姬曰昨夜夢蒼龍據妾腹帝曰此貴徴也吾爲汝成之一幸生男是爲代王史記曰范睢說秦昭王曰伍子胥橐載而出昭門夜行晝伏至於陵水無以餬其口膝行匍匐稽首肉袒鼓腹吹簫乞食於吴市卒興吴國闔閭爲伯東觀漢記曰光武降銅馬諸將未能信賊賊亦兩心上勑賊各歸勒兵上輕騎入賊營賊曰蕭王推赤心置人腹中安得不投死又曰帝問東平王蒼在家何等最樂對曰爲善最樂後詔與諸國述之曰王言甚大副其腰腹矣謝承後漢書曰濟隂戎良字子恭年十八爲郡門下幹良儀容佳麗太守諸葛禮使冩書從者誣良與婢通良刳腹引出肝膓示禮赤心後漢書曰邊韶字孝先教授數百人韶口辯曽晝眠卧弟子嘲曰邊孝先腹便便嬾讀書但欲眠韶潜聞之應之曰吾以邊爲姓先爲字腹便便五經笥但欲眠思經義寐與周公通夢静與孔子同意師而可嘲出何典記嘲者大慙魏志曰管輅弟展謂輅曰大將軍待君意厚兾當冨貴輅長歎曰天與我明才不與我年壽恐四十七八間不見女嫁男娶吾背無三甲腹無三壬此皆不壽之驗明年四十八卒吴録曰丁固夢腹上生松趙逹謂之曰松字十八公後果然夢門巳具齊書曰髙帝爲領軍蒼梧王深相猜忌屢欲害帝常帥數十人直入領軍府時暑熱帝晝卧祼袒蒼梧立帝於室内}
  - {type: variant, offset: 3899, length: 1, content: 臥, krp: 腹爲射的自引滿將射之帝神色不動歛𬒮曰老臣無罪蒼梧左右王天恩諌曰領軍腹大是佳射堋而一箭便死後無可復射不如􅐴射之乃取􅐴箭一發即中帝臍蒼梧投弓於地大笑曰此手如何崔鴻十六國春秋後趙録曰佛圖澄腹傍有一孔常以絮塞之每夜書則拔絮孔中出光照于一室又當齋時平旦至流水側復腹傍孔中引出五藏六腑洗之訖還内腹中老子曰虚其心實其腹又曰聖人爲腹不爲目莊子曰夫赫胥氏之時民含餔而熈鼓腹而遊唐子曰人君以江海爲腹山爲面如此則下不知其量畏而懷之帝王世紀曰紂刳孕婦之腹中以觀其胎吴越春秋曰子胥鞭平王尸三百右手决其目左手踐其腹京房易占曰人生有二腹其國分王子年拾遺録曰孫䇿母夢膓出委地有神女夜來爲其收内腹裏云必生才雄之子方興吴國神女負䇿母繞吴昌門三匝曰當錫尓此土鼎足於天下談藪曰楊玠娶博陵崔季讓女崔家冨圖籍殆將萬卷成婚之後頗亦遊其書齋旣而告人曰崔氏書𬒳人盗盡曽不之}
