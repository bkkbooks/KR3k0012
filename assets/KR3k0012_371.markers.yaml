  - {type: variant, offset: 807, length: 154, content: 鮑永辟鮑恢為從事京師語曰貴戚歛手避二鮑後漢書曰劉寬欲朝婢飜羹污朝衣手收之寬曰徐徐羹爛汝手又曰郭玉者廣漢人也學方診之伎和帝奇異之乃試令嬖臣美手腕者與女子雜處其中使玉各診一手玉言左陽右陰脈有男女疾若異人臣疑其故帝歎稱善東觀漢記曰公孫述自言手文有奇瑞數移書中國上賜述書曰瑞應手掌成文亦非吾所知張璠漢記曰董卓於眾座中, SBCK: 禹母吞神珠胷坼而}
