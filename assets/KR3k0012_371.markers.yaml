  - {type: variant, offset: 962, length: 529, content: 斬人手足百姓嗷嗷魏略曰鄧雄鳴詣太祖太祖執其手曰孤方入關夢得神人即汝耶乃厚賜之王隱晉書曰初武帝未為太子文帝問裴秀曰人有相不秀曰中撫軍伸手過𣍿非人臣之相也又曰愍懷太子名遹字熙初惠帝晚成世祖遣才人謝玖給惠帝生愍懷與諸王子共戲惠帝來朝謂諸王子也執其手世祖曰是汝兒也乃縮手又曰高平劉柔臥鼠嚙其左手中指意甚惡之以問淳于智筮之曰鼠本欲殺君而不能當為使之反死乃以朱書其手腕橫文後三寸為田字辟方一寸二分使夜露手以臥其明有一大鼠伏死手前又曰郭文字文舉入餘杭山蘇峻未亂之前詣臨安山中臨安令萬寵迎著縣中養病及峻黨破餘杭山臨安如故人始異之自後不復語但舉手指麾以宣其意病甚寵問先生可復得幾日文三舉其手果以十五日終晉中興書曰范宣陳留人也年十歲能誦詩書嘗以刀傷手捧手改容人問痛耶荅曰不足為痛但受全之體而致毀傷不可處耳家人以其年幼而異焉崔鴻前趙錄曰劉翌驍幹過人能一手舉殿柱跳過平陽門三十六國春秋曰劉淵父豹母呼延氏淵生而左手有文曰淵遂以命之又曰彭神符生而有文在其手曰神符梁書曰武帝手文曰武三國典略曰梁劉之遴字思貞文范先生虬之子也博綜文史尚書令沈休之深敬器之右手偏直不得屈伸每晝則以紙就筆唐書曰承乾數引侯君集入內問以自安之術君集以承乾劣弱意欲乘釁以圖之遂贊成不軌常舉手謂承乾曰此好手當為殿下用之老, SBCK: 禹淮南}
