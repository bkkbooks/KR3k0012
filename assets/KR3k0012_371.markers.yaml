  - {type: 'tls:seg', offset: 860, content: '', id: KR3k0012_CHANT_371-18a.5}
  - {type: variant, offset: 860, length: 3, content: 學方診, WYG: 為大腹尚書盤庚曰今予其敷心腹腎腸歴告爾百姓于朕志左傳宣十三年傳曰楚子圍蕭司馬卯言號申叔展曰有麥􅎘乎曰無有山鞠藭乎曰無河魚腹疾奈何曰目於眢井而出}
  - {type: variant, offset: 864, length: 2, content: 伎和, WYG: 國語曰叔魚牛腹其母嘆曰必以賄死史記曰薄姬曰昨夜夢蒼龍據妾腹}
