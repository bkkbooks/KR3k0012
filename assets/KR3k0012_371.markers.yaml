  - {type: variant, offset: 1364, length: 0, content: '', WYG: 骶背比也左傳莊公曰齊襄公田于貝邱見大豕従者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼墜于車傷足䘮屨反誅屨於徒人費弗得鞭之見血走出遇賊于門刦而束之費曰我奚禦哉袒而示之背信之費請先入伏公而出鬭死于門中史記曰婁敬說髙祖曰夫與人鬭不搤其亢張晏曰亢喉嚨也拊其背未能全勝也今陛下入闗而都秦之故地此亦搤天下之亢而拊其背}
