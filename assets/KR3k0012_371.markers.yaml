  - {type: variant, offset: 1384, length: 0, content: '', WYG: 過平陽主既飲謳者進帝起更衣子夫侍尚衣軒中得幸還坐忻甚賜平陽主金千斤主因奉子夫送入宫子夫上車主撫其背曰行矣强飲勉之即貴願無相㤀元朔元年生男懅遂立為皇后後漢書曰越騎校尉伍子孚怒董卓兇毒乃朝服懐刃見卓語畢辭去卓送至閣以}
  - {type: variant, offset: 1385, length: 0, content: '', WYG: 撫其背孚因出刃刺之不中卓自奮得免呼左右執殺孚魏畧曰孟達降文帝乗小輦執手撫其背戱之曰卿得無為𤣥徳刺客耶又曰太祖丁夫人養劉夫人子脩脩亡於穰丁常言将我兒殺之遂哭泣無節太祖忿之遣歸家後太祖就見之夫人方織踞機如故太祖拊其背曰􅂅我共載歸乎夫人不應太祖却行户外遂不應太祖曰真决矣遂與之絶吴志曰魯肅代周瑜之當陸口過吕蒙屯下肅常輕蒙蒙問肅君受重任與雲長為鄰将何計畧以備不虞肅造次應曰臨時施宜蒙曰今東西雖一家而雲長實熊虎因為畫五策肅扵是越席就之拊其背曰吕子明吾不知卿才畧所及扵此車頴秦書曰苻堅生肩背赤色隐起状若篆文苻因為苻氏又曰堅背}
