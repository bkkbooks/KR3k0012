  - {type: variant, offset: 2652, length: 4, content: 匈奴連戰, WYG: 俗人相忤其人攘袂而徃必欲歐之伶頋而笑曰雞肋不足以安尊拳臍說文曰臍肚臍也釋名曰臍劑也腸端之所限劑也春秋元命苞曰臍者下流並}
