  - {type: variant, offset: 819, length: 7, content: 貴戚歛手避二鮑, WYG: 有頭為佳吏涕泣曰有頭佳雍曰無亦佳言畢遂死志怪集曰石季倫母䘮洛下豪俊赴殯者傾都王戎亦入臨殯便見鬼攘臂打搥鑿甚惶惶有一人當棺立此鬼披胷䧟之此人即應鑿而倒人便去得病半日死故世間相傳不宜當棺由戎所見膈說文曰膈心上膈也釋名曰膈塞也膈塞上下使不與榖氣相亂世說曰桓公有主簿善别酒輙令先嘗好者謂青州従事惡者謂平原督郵青州有齊郡平原有鬲縣従事言至臍督郵言至膈上住乳廣雅曰湩音凍謂之乳說文曰湩乳汁也通俗文曰乳病曰􅂒音丁故反河圖曰蒼帝并乳春秋元命苞曰文王四乳是為含良盖法酒旗市恩舒明宋均曰乳酒也漢書曰張蒼免相後口中無齒食乳以女子為乳母也謝承}
