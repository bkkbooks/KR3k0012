  - {type: variant, offset: 1342, length: 0, content: '', WYG: 後趙録曰佛圖澄腹旁有一孔常以絮塞之每夜書則拔絮孔中出光照於一室又當天時平旦至流水側復腹旁孔中引出五臓六腑洗之訖還内腹中老子曰虚其心實其腹又曰聖人為腹不為目荘子曰夫赫胥氏之時民含餔而熈鼓腹而逰唐子曰人君以江海為腹山為靣如此則下不知其量畏而懐之帝王世紀曰紂刳孕婦之腹中以觀其胎吴越春秋曰子胥鞭平王屍三百右手决其目左足踐其腹京房易占曰人生有二腹其國分王子年拾遺録曰孫䇿每夢腸出委地有神女夜来為其收内腹裏云必生才雄之子方興吴國神女負策母繞吴昌門三匝曰當賜爾此土鼎足于天下談藪曰楊玠娶􅀶陵崔季讓女崔家冨圖籍殆將萬卷成婚之後頗亦逰其書齋既而告人曰崔氏書被人盡盗曾不知覺崔遽令撿之玠捫腹曰已蔵之經笥矣世說曰郝隆七月七日出日中仰卧人問其故答曰我曬腹中書耳又曰張華既貴有少時賔客来候之華與共飲九醖為酣暢其夜醉眠張常飲此酒眠輙使人左右轉側其夜客别忘勅左右而左右依常為張公轉側至明起友人猶不起視之酒果穿腹流床下滂沱又}
