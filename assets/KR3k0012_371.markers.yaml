  - {type: variant, offset: 2649, length: 20, content: 高祖與匈奴連戰會於樓煩十月寒冰墮指十二三, SBCK: 張蒼免相}
  - {type: variant, offset: 2649, length: 2, content: 高祖, WYG: 周顗在中朝時能飲一石及過江雖醉每稱無對偶有舊對従北来顗亦出二石酒共飲各大醉及顗醒使視客已腐脅而死世本曰陸終娶于鬼方氏之妹謂之女嬇生六子孕而不育三年啓其左脇三人出焉啓其右脇三人出焉王充論衡曰張儀駢脇卒相秦魏外國圖曰大秦國人長脅肋釋名曰肋勒也檢肋五蔵也廣雅曰幹謂之肋竹林七賢論曰劉伶嘗醉}
