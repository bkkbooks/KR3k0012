  - {type: punctuation, offset: 853, content: 「, id: KR3k0012_CHANT_371-bkkpn320}
  - {type: variant, offset: 853, length: 0, content: '', WYG: 昭成皇帝諱什翼卧則乳至席齊書曰太祖母陳皇后生太祖二年乳人乏乳后夢人以兩甌麻粥與之覺乳遂大出淮南子曰文王四乳是謂大仁天下所歸百姓所親山海經曰刑天與帝争神帝斷其首遂塟之常羊山乃以乳為目臍為口益部耆舊傳曰蜀郡張寛字叔文漢武帝時為侍中従祀甘泉至渭橋有女子浴於渭水乳長七尺上怪問之女曰帝後第七車者知我所来時寛在第七車對曰天皇主祭祀者齋戒不嚴時則女人見劉欣期交州記曰趙嫗者九真軍安縣女子也乳長數尺不嫁入山聚羣盗遂攻郡常着金㩉蹤屐戰退輙張帷幙與少男通數十侍側刾史吴郡陸𦙍平之王子年拾遺録曰無老國其人皆千嵗百嵗一老齒落髮秃又年少嫗者乳養還復若幼稚神仙服食經曰仙藥有陽丹隂丹隂丹婦人乳汁也婦人十五已上下為月客有身月客絶上為乳汁養性經曰乳者意之府也世說曰武子烝肫肥美異常味武帝怪問何由乃爾云以人乳飲之武帝色甚不平所以飲食未畢便去異苑曰賈充妻}
