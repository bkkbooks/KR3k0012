  - {type: variant, offset: 3909, length: 2, content: 欲捉, SBCK: 見王丞相時盛暑}
  - {type: punctuation, offset: 3912, content: ，, id: KR3k0012_CHANT_371-bkkpn1415}
  - {type: 'tls:seg', offset: 3912, content: '', id: KR3k0012_CHANT_371-67a.7}
  - {type: variant, offset: 3912, length: 0, content: '', SBCK: 月丞相}
  - {type: variant, offset: 3912, length: 6, content: 以爪槨呼郭切, krp: 故地此亦搤天下之亢而拊}
  - {type: variant, offset: 3913, length: 5, content: 爪槨呼郭切, SBCK: 腹熨彈碁局曰何乃訋吴人以冷爲訋或作渹音與鄭相近劉旣出人問見王公如何劉曰未見他異唯作吴語耳又曰郄太尉在京日遣門生與王丞相書求女壻丞相語郄信曰君徃東廊下任意選之門生歸白郄云王家諸郎皆可喜聞某來覔女壻咸自矜持唯有一郎在東床坦腹而食如不聞郄云正好比訪之乃是逸少因嫁女與之俗􅀃曰有人指周伯仁腹曰此中何有荅此中洪洞容卿等數百人背􅀃文曰背脊也釋名曰背陪也在後稱也廣雅曰背謂之骶音帝背北也左傳莊公曰齊襄公田于貝丘見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼墜于車傷足喪屨反誅屨於徒人費弗得鞭之見血走出遇賊于門刧而束之費曰我奚御哉祖而示之背信之費請先入伏公而出􅃲死于門中史記曰婁敬􅀃髙祖曰夫與人闘不搤}
  - {type: page-break, offset: 3913, content: '', id: KR3k0012_SBCK_371-7a}
