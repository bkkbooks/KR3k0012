  - {type: variant, offset: 3919, length: 2, content: 手痛, SBCK: 亢張晏曰亢喉嚨也拊其背未能全勝也今陛下入􅀜而都􅁗之故地此亦搤天下之亢而拊其背又曰蒯通知天下權在韓信􅀃之曰相君之面不過封侯相君之背貴乃}
  - {type: page-break, offset: 3919, content: '', id: KR3k0012_SBCK_371-7b}
  - {type: variant, offset: 3919, length: 2, content: 手痛, krp: 背又曰蒯通知天下權在韓信說之曰相君之面不過封侯相君之背貴乃}
  - {type: punctuation, offset: 3920, content: ，, id: KR3k0012_CHANT_371-bkkpn1417}
  - {type: 'tls:seg', offset: 3920, content: '', id: KR3k0012_CHANT_371-67a.10}
  - {type: variant, offset: 3923, length: 2, content: 忍放, SBCK: 言漢書曰吴王濞髙帝兄仲之子上患吴㑹輕悍無壯王鎮之乃立濞爲吴王王三郡五十二城髙祖召濞相之曰尓狀有反相因拊其背曰漢帝後五十年東南有亂豈非若耶天下一家愼無反濞頓首曰不敢又曰武帝過平陽主旣飲謳者進帝起更衣子夫侍尚衣軒中得幸還坐忻甚賜平陽主金千斤主因奉子夫送入宫子夫上車主拊其背曰行矣強飰勉之即貴願無相志元朔元年生男據遂立爲皇后後漢書曰越􅀐校尉伍子孚怒董卓兇毒乃朝服懷刃見卓語畢辭去卓送至閤以手撫其背孚因出刀刺之不中卓自􅁬得免呼左右執殺孚魏略曰孟逹降文帝乗小輦執手拊其背戯之曰卿得無爲劉備刺客耶又曰太祖丁夫人養劉夫人子脩脩士於穰下常言將我兒殺}
  - {type: page-break, offset: 3923, content: '', id: KR3k0012_SBCK_371-8a}
  - {type: variant, offset: 3923, length: 2, content: 忍放, krp: 言漢書曰吴王濞髙帝兄仲之子上患吴㑹輕悍無壯王鎮之乃立濞爲吴王王三郡五十二城髙祖召濞相之曰尓狀有反相因拊其背曰漢帝後五十年東南有亂豈非若耶天下一家愼無反濞頓首曰不敢又曰武帝過平陽主旣飲謳者進帝起更衣子夫侍尚衣軒中得幸還坐忻甚賜平陽主金千斤主因奉子夫送入宫子夫上車主拊其背曰行矣強飰勉之即貴願無相志元朔元年生男據遂立爲皇后後漢書曰越騎校尉伍子孚怒董卓兇毒乃朝服懷刃見卓語畢辭去卓送至閤以手撫其背孚因出刀刺之不中卓自奮得免呼左右執殺孚魏略曰孟逹降文帝乗小輦執手拊其背戯之曰卿得無爲劉備刺客耶又曰太祖丁夫人養劉夫人子脩脩士於穰下常言將我兒殺}
  - {type: punctuation, offset: 3924, content: 。, id: KR3k0012_CHANT_371-bkkpn1418}
  - {type: 'tls:seg', offset: 3924, content: '', id: KR3k0012_CHANT_371-67a.11}
  - {type: punctuation, offset: 3926, content: ，, id: KR3k0012_CHANT_371-bkkpn1419}
  - {type: 'tls:seg', offset: 3926, content: '', id: KR3k0012_CHANT_371-67a.12}
  - {type: variant, offset: 3927, length: 1, content: 飛, SBCK: 􅂘泣無節太祖忿之遣歸家後太祖就見之夫人方織踞機如故太祖拊其背曰顧我共載歸乎夫人不應太祖却行户外遂不應太祖曰眞決矣遂與之絶吴志曰魯肅代周瑜之當陸口過吕蒙屯下肅常輕蒙蒙問肅君受重任與關羽爲鄰將何計略以備不虞肅造次應曰臨時施冝􅀩曰今東西雖一家而􅀜羽實熊虎因爲畫五䇿肅於是越席就之拊其背曰吕子明吾不知卿才略所及於此子明蒙之字也車頻􅁗書曰苻堅生肩背赤色隠起狀􅀂􅂐文付因爲苻氏又曰堅背文曰草付之祥因爲苻氏唐書曰貞觀四年制决罪人不得鞭背以明堂孔穴針灸之所又曰吕温者以小吏事崔漢衡貞元􅀄吐蕃背盟漢衡爲􅄍蕃所虜將殺之温趨往以背受刃吐蕃義之由是與漢衡俱免尸子曰醫者􅁗之良醫爲宣王割痤爲惠王治痔皆愈張子之背腫謂曰背非吾背也子製焉醫竘善治疾張子委製焉夫爲身與國亦猶此必有所要製然後治矣音叩又音孔叢子曰仲尼􅀛背帝王世紀曰簡翟浴􅀇丘之水燕遺夘吞之剖背生契白虎通曰傳稱周公背僂是謂強後成就周道輔相㓜主又孫卿子曰周公傴背不伸也􅀶物志曰宋有田夫自曝背於日其妻曰􅀒日之暄今獻必蒙重賞田夫曰昔人有美戎菽甘芹子獻之郷豪甞苦於口􅀏而弃之論衡曰書言齊桓公􅀒婦人以朝諸侯管仲曰吾君背疽瘡不得婦人瘡不愈此虚也桓公設庭燎夜坐以致賢士豈反以白日􅀒婦人於背乎幽明録曰王子猷先有背疾子敬疾篤􅁪禁來往聞子敬亡撫心悲惋都不一聲背即潰裂脊􅀃文曰脊背􅡗也釋名曰脊積也積續骨節終上下也春秋元命苞曰陽立於三故人脊三寸而結宋均曰結節結也孝經鈎命決曰仲尼􅀛脊墨子曰周宣王殺其臣杜伯不辜後三年王田於圃田車徒滿野杜伯乗白馬素車衣朱衣朱冠弓矢射王車上中心折脊王殪車中伏韔而死韔音暢脅􅀃文曰骿并脅也膀兩脅旁也從内脅聲通俗文曰腋下謂之脅釋名曰脅挾也在兩旁臂所挾也春秋元命苞曰隂極於八故人旁八幹長八寸又曰顓頊駢幹上法月叅集成紀以理隂陽左傳僖中曰晉公子重耳及曹曹共公聞其駢脅欲觀其躶浴薄而觀之公羊傳曰齊公子彭生送魯莊公拉幹而殺之也史記曰范睢先事魏中大夫湏賈賈使齊雎從齊王聞雎辯賜金及牛湏賈以爲雎持隂事告齊旣歸以告魏相魏大怒使人笞擊雎折脇摺齒雎佯死弃於厠吴志曰曹仁攻圍甘寧周瑜救寧圍解乃渡屯北岸剋期大戰瑜跨馬略陣㑹流矢中右脅瘡甚便還後仁聞瑜卧瘡未起勒兵就陣瑜乃自輿按行激揚吏士仁遂退晉書曰周顗在中朝時能飲一石及過江雖醉每稱無對偶有舊對從北來顗亦出二石酒共飲各大醉及顗醒使視客巳腐脅而死世本曰陸終娶于􅀑方氏之妹謂之女嬇音蒯生六子孕而不育三年啓其左脅三人出焉啓其右脅三人出焉王充論衡曰張儀駢脅卒相秦魏外國圖曰大秦國人長脅肋釋名曰肋勒也檢肋五藏也廣雅曰幹謂之肋竹林七賢論曰劉伶甞醉與俗人相忤其人攘􅃑而往必欲歐之伶顧而􅀏曰鷄肋不足以安尊拳臍􅀃文曰臍肚臍也釋名曰齊劑也膓端之所限劑也春秋元命苞曰齊者下流並㑹合爲齊腹宋均曰齊中也四方並湊者也左傳莊公曰楚文王過鄧鄧祁侯享之三甥曰亡鄧國者必此人也􅀂不早圖後君噬臍􅀂齧腹齊喻不可及後漢書曰董卓旣誅乃尸於市天時始熱卓充肥脂流於地守尸吏燃火置卓臍中光明達曙如是積日漢晉陽秋曰齊王冏之方盛也有婦人詣大司馬門求􅀉産吏詰之婦人曰我截齊罷便}
