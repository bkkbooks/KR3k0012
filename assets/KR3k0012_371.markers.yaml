  - {type: variant, offset: 830, length: 0, content: '', WYG: 南陽李善本濟陽李元家奴元遭病死惟有孤孫續有貲千萬奴婢欲謀殺續分其財産善夜抱續逃瑕邱界親自哺養乳為生潼遂至成長吴書曰潁川馮熈使魏辭意不屈魏留之熈懼見廹乃引刀刺中乳房上聞嘉之賜鹽米復其門後漢書曰朱循之為}
