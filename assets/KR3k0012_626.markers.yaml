  - {type: variant, offset: 3246, length: 0, content: '', SBCK: 周亦􅂇也又曰尊賢使能則天下之士皆恱而願立於其朝矣市􅒡而不征則天下之啇皆恱而願藏於其市矣㕓市宅也古無征衰丗征之王制曰市􅌀而先稅周禮曰國宅無征法而不㕓者當以什一之法征其地耳不當征其㕓宅也􅀜譏而不征則天下之旅皆恱而願出於其路矣言􅀜禁異服異語耳不征稅也周禮曰􅀜市之賦司􅀜門之征猶譏王制不征謂文王以前文王亦不征也耕者􅂇而不稅則天下之農皆恱而願耕於其野矣􅂇者井田什一􅂇佐公家治公田不横稅賦􅀂履畒之􅀋廛無夫里之布則天下之人皆恱而願爲之氓矣里居也布錢也夫一夫也周禮曰宅不毛者岀里布田不耕者有屋粟凢人無職事者出夫家之征襄代縁是之重故孟子欲反則寛夫去里布則人皆樂之人白圭問孟子曰吾欲二十而取一何如孟子曰子之道貊道也萬室之國一人陶則可乎曰不可器不足用也夫貊五􅂖不生唯􅁰生之無城郭宫室宗廟􅀕祀之禮諸侯幣帛饔餼無百官有司故二十取一而足也今居中國去人倫無君子如之何其可也孫武曰夫帝王處四海之内居五千里之中焉能盡專其利是以分建諸侯以其利而利之使食其土之毛實役其人民之力故賦稅無轉徙之勞徭役無怨曠之歎矣新序曰楚人有獻魚楚王者曰獲魚食之不盡賣之不售棄之又惜故來獻之左右曰鄙哉辭也楚王曰子不知魚意其以此諭寡人也於是乃遣使恤鰥寡而存􅀌獨岀倉粟發幣而賑不足罷去後宫不御者出人以鰥夫楚民欣欣大恱隣國歸之荀恱論曰昔文帝十}
  - {type: page-break, offset: 3246, content: '', id: KR3k0012_SBCK_626-4b}
  - {type: variant, offset: 3246, length: 0, content: '', WYG: 周亦助也又曰尊賢使能俊傑在位則天下之士皆悦而願立於其朝矣市廛而不征則天下之商皆悦而願藏於其市矣㕓市宅也古無征衰世征之王制云市㕓而無税周禮曰國宅無征法而不㕓者當以什一之法征其地耳不當征其廛宅也闗譏而不征則天下之旅皆悦而願出於其路矣言闗禁異服異言耳不征税也周禮曰闗市之法無闗門之征猶譏王制不征謂文王以前文王亦不征也耕者助而不税則天下之農皆悦而願耕於其野矣助者耕田什一助佐公家治公田不横税賦若履畆之類㕓無夫里之布則天下之人皆悦而願為之氓矣里居也布錢也夫一夫也周禮曰宅不毛者出里布田不耕者有屋粟凡人無職事者出夫家之征衰代遂兩征之故孟子言能寛夫征去里布則人皆樂為之氓白圭問孟子曰吾欲二十而取一何如孟子曰子之道貊道也萬室之國一人陶則可乎曰不可噐不足用也夫貊五榖不生惟黍生之無城郭宫室宗廟祭祀之禮無諸侯幣帛饔飱無百官有司故二十取一而足也今居中國去人倫無君子如之何其可也孫武曰夫帝王處四海之内居五千里之中焉能盡專其利是以分建諸侯以其利而利之使食其土之毛實役其人民之力故賦税無轉徙之勞徭役無怨曠之歎新序曰楚人有獻魚楚王者曰獲魚食之不盡賣之不售棄之可惜故來獻之左右曰鄙哉辭也楚王曰子不知魚人其以此諭寡人也于是遣使恤鰥寡而存獨孤出倉粟發幣帛賑不足罷去後宫不御者出以妻鰥夫楚民欣欣大悦隣國歸之荀悦論曰昔文帝十}
