  - {type: variant, offset: 2648, length: 594, content: 其力工商食官工百工商官賈周禮府藏皆有賈人以知物賈食官官稟之皂隸食職士臣皂皂臣與與臣隸食職名以其職大小食祿也官宰食加官宰家臣加夫夫之加田也論語原憲為之宰政平民阜財用不匱阜安呂氏春秋曰吳起行魏武侯自送之絕河謂吳起曰先生將何以治之西河對曰以忠以信以勇以敢武侯曰四者足矣請以四者恃先生又曰宓子賤治單父彈鳴琴身不下堂而單父治巫馬期以星出以星入日夜不居以身親之而單父亦治巫馬期問其故於宓子宓子曰我之謂任力任力者固勞任人者固逸子則君子矣又曰使民無欲上雖賢不用失無欲者其視為天子與隸同彭祖與殤子同天子至貴也天下至富也彭祖至壽也誠無欲則三者不足勸故人之欲多者其可得用亦多也人之欲少者其可得用亦少也無欲者不可得而用之善為上者能令人欲無窮故人亦可得用而無窮然欲不正以治身則夭以治國則亡群狗相與居皆靜投以炙雞則相與爭或折其骨或絕其筋爭術在也凡治國令其民爭行義也亂國令其民爭不義也強國令其民爭樂用也弱國令其民競不用也又曰桀紂以去之道致之罰雖重刑雖嚴何益大寒民煖是利熱在上民清是利走故民無常處見利則去欲為天子者民之所走不可不察今之世至寒矣至熱矣而民無走聚則行鈞也等於暴亂民無走則王者廢矣暴君幸矣民絕望矣家語曰子路治蒲三年孔子過之入其境三稱善孔貢執轡而問其善可得聞乎孔子曰吾入其境田疇盡易草萊甚辟溝洫深濬此恭敬以信故其民盡力入其邑墉屋宅固樹木甚茂此其忠信而寬故其民不偷也至其庭甚清閑諸不用命此其言明察以斷故其政不擾也以, SBCK: ''}
