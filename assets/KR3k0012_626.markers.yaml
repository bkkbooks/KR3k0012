  - {type: variant, offset: 3247, length: 0, content: '', WYG: 年六月詔除人田租且古者什一而税以為天下之中正今漢人田或百一而税可謂鮮矣然豪富强人占田愈多其賦大半官收百一之税而人輸豪家大半之賦官家之惠優于三代豪强之暴酷於亡秦是以惠不下通而威福分於豪人也今不正其本而務除租税適足以資富强也魚豢魏畧曰漢陽嘉三年踈勒國王貢西海青石帯舟至皇甫謐帝王世紀曰西王母慕舜徳來獻白環及玦并貢益地圖西京雜記曰初修上林苑羣臣逺方各貢合枝李異物志曰橘為樹白花而赤實皮既馨香味又交趾有橘官十人秩三百石歲主貢御橘甘美雜望氣經曰黄白氣潤澤入翼四海有侯王來獻者天子賜四海之國入輔諸侯王者有獻車者出輔天子用車為幣賜諸侯王魏文帝與王朗書曰孫權重遣使}
