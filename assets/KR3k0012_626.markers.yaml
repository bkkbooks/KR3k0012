  - {type: variant, offset: 10, length: 3, content: 哀公問, krp: 元鳯中詔曰夫榖賤則傷農今三輔太常榖减賤减猶少也其令以菽粟當今年賦租稅元年𥘉詔曰天下以農桑爲夲日者省用罷不給官减外徭耕桑者益衆而百姓未能家給朕甚愍焉其减口賦錢有司奏請减什三上許之後漢書曰建武中田租三十稅一有産子者復以三年之筭明帝即位人無横徭天下安寕時糓尚貴尚書張林上書言榖所以貴由錢賤也可盡封錢一取布帛爲租以通天下之用從之魏志曰太祖𥘉平袁紹下令田租畝収粟四升戸絹二疋綿二斤餘不得擅興晉書曰武帝平呉後制戸調之式丁男之戸歳輸絹三疋綿三斤女及次丁男爲戸者半輸諸邊郡或三分之二逺者三分之一夷人輸賨布戸一疋逺者或一丈不果田者輸義米戸三斛逺者五斗極逺者輸筭錢人二十八文齊書曰髙帝𥘉竟陵王子良上表曰今所在糓價雖和而比室飢嗛縑纊雖賤駢門躶質而守宰務在裒刻圍桑品屋以准貲課}
  - {type: variant, offset: 14, length: 0, content: '', SBCK: 令斬樹發瓦以充重賦破人敗産賈利一時進違舊科退容姦利欲人康泰其可得乎隋書曰􅀄蘇威父綽在西魏時以國用不足爲征租稅之法頗稱爲重旣而歎曰今所爲者正如張弓非平丗也後之君子誰能施乎威聞其言毎以爲己任至是威爲納言奏減賦役從輕典帝悉從之又曰開皇元年陳平上御朱雀門觀凱旋因行慶賞頒給所費三百餘萬帝以江表􅀄定給復十年自餘諸州並免當年租賦十二年有司上言庫藏皆滿帝曰朕旣薄賦}
