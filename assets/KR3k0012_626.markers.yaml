  - {type: variant, offset: 1259, length: 1388, content: 狩畢弋不聽國政卑聖侮士而唯女是崇九妃六嬪正適稱妃言九者尊之如一明其淫侈非禮制也姪娣之屬皆稱望嬪婦官也陳妾數百陳列食必梁肉衣必文繡戎士凍餒戎車待遊車之裂戎士待陳妾之餘戎車兵車遊車遊戲之車裂殘也優笑在前賢材在後優笑車倡非是以國家不日引引申不月長長益恐宗社不掃除社稷不血食敢問為此若何為治管子對曰昔吾先王昭王穆王世法文武遠績以成名周管之先績功也言昭王雖有所闕猶能世法文王武王之典以成其功名也合群叟比校民之有道合會叟老比方校考也謂考其德行道蓺而興賢設象以為民紀式權以相應式用也權平也治正用民使平均相應比綴以度比其眾寡綴連也連失也度法也端本肇末端等肇正也謂先等其本以正其末勸之以賞賜糺之以刑罰班序顛毛以為民紀統班次序列顛等也毛髮也統經也言次列使長幼有序以為治民之經紀也桓公曰為之若何管子對曰昔者聖王之治天下也參其國而伍其鄙參三國也也郊以內也伍伍也鄙郊以外謂三分國都以為三軍五分其鄙以為五屬聖王謂若湯武定民之居成民之事使四民各居其職若公就官府農就田野所以成其事陵為之終以為葬地而慎用其六柄焉柄本六柄生殺貧富貴賤又曰齊桓公問管仲曰國安矣吾欲事於諸侯其可乎管子對曰未可君若正卒伍脩甲兵周禮五人為五百人為卒今管子亦以五人為五而以二百人為卒則大國亦將正卒伍脩甲兵則難以速得志矣君有攻伐之器小國諸侯有守禦之備則難以速得志矣君若欲速得志於天下諸侯則事可以隱令可寄政事戎事隱匿寄託也匿軍令託於國政若有征伐鄰國不知桓公曰為之若何管子對曰作內政而寄軍令焉內政國政因治正以寄軍令桓公曰善管子於是制國五家為軌軌為之長軌中一人為之長十軌為里里有司為立有司四里為連連為之長十連為鄉鄉有良人焉良人鄉士又為大夫也以為軍令為軍常令五家為軌故五人為伍軌長帥之居則為軌出則為伍所謂寄政十軌為里故五十人為小戎里有司帥之小戎兵車此有司之所乘故曰小戎詩云小戎俴收古者戎車一乘步卒二十二人令齊五十人四里為連故二百人為卒連長帥之十里為鄉故二千人為旅鄉良人帥之五鄉一帥故萬民為一軍五鄉之帥帥之五鄉每一軍有五鄉也鄉帥鄉也萬人為軍齊制也周則萬二千五百人為軍帥長三軍故有中軍之鼓有國子之鼓有高子之鼓春以搜振旅春田日搜旅整眾也周禮仲春教振旅遂以搜田秋以獮治兵秋田目獮周禮仲秋教治兵遂以獮田也是故卒伍整於里軍旅整於郊內教既成令勿使遷徙遷徙猶改更伍之人祭祀同福死喪同恤恤憂禍災共之人與人相疇疇疋世同居少同遊故夜戰聲相聞足以不乖晝戰目相見足以相識其歡欣足以相死致死以相救居同樂行同龢與和同死同哀是故守則同固戰則同強君有此士也三萬人方行於天下方橫以誅無道以屏周室屏蕃天下大國之君莫之能禦禦當又曰晉文公元年春屬百官賦職任功屬會賦授也授職事任有功棄責薄歛施舍分寡注當云棄責除宿責也施施德也舍舍禁也分寡分少財也救乏振滯匡困資無救救乏絕振極淹滯之士匡正困窮之人資無與無財輕關易道通商寬農輕關輕其稅易道除盜賊通商利旅寬農寬其政不奪其時茂穡勸分省用足財茂勉稼穡也勸有分無也省減減國用足財備凶年利器明德以厚民性利利器用明明德教厚民性厚其性情也舉善授能官方定物方常物事亡其常官以定百事正名育類正名正上下服位之名育類長育善類昭舊族昭明舊臣有功者之善愛親戚明賢良明顯尊貴寵國之責臣尊禮之賞功勞事耇老禮賓旅旅客友故舊故舊公子時胥藉狐箕欒郤柏先羊舌董韓寔掌近官舊十一性晉之舊旅近官朝廷諸姬之良掌其中官諸姬同姓中官內官異姓之能掌其遠官遠官縣鄙公食貢大夫食邑士食田受公田庶人食力各, SBCK: ''}
