  - {type: variant, offset: 164, length: 272, content: 一旦而賜人以千乘之家者三故曰政在節財魯君有三人孟叔叔孫季叔內比周以愚其君外讎諸侯之賓以蔽其明故曰政在諭臣夫荊之地廣而教狹民有離心莫安其居故曰政在悅近而來遠此三者皆所以為政又曰閔子騫為費宰問政於孔子孔子曰以德以法夫德法者御民之具猶御馬之銜勒也子騫曰敢問古之政孔子曰古之政者天子以內史為左右手內史掌手八柄及敘事之受納以語王聽治以德為銜勒以百官為轡以刑罪為策以萬民為馬故御天下數百年而不失善御馬者正銜勒齊轡策善御民者一其德法正其百官刑不用而天下治又曰子游問於孔子曰子亟言子產之惠可得聞乎孔子曰惠在愛民而已子游曰愛民之謂德教何翅於惠哉孔子曰夫子產者猶眾, WYG: ''}
