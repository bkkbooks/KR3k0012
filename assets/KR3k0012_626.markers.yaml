  - {type: variant, offset: 31, length: 4, content: 且壽也公, WYG: 於斤兩遂即加其丈尺有至五丈為疋者理甚不然濶尺八長四丈同文共軌其事乆行立様之時湏載此數若求兩而加尺甚暮四而朝三宜令所司簡閲有踰于比年常例尺丈過多者奏聞又}
