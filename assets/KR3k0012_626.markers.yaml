  - {type: variant, offset: 3247, length: 0, content: '', SBCK: 年六月詔除人田租且古者十一而稅以爲天下之中正今漢人田或百一而稅可謂鮮矣然豪冨強人占田踰多其賦太半官収百一之稅而人輸豪家太半之賦官家之惠優於三代豪強之􅁀酷於亡􅁗是以惠不下通而威福分於豪人也今不正其本而務除租稅適足以資冨強也魚豢魏略曰漢陽嘉三年踈勒國王貢西海青石帶舟至皇甫謐帝王丗紀曰西王母慕舜徳來獻白環及玦并貢益地圖西京􅄂記曰􅀄脩上林苑群臣逺方各貢合枝李者楊乎楊孚異物志曰橘爲樹白華而赤實皮旣馨香裏又善味交阯有橘官一人秩三百石歳主貢御橘􅄂望氣經曰黄白氣潤澤入翼四海有侯王來獻者天子賜四海之國入􅎮諸侯王者有獻車者岀􅎮天子用車爲幣賜諸侯王魏文帝與王朗書曰孫權重遣使}
