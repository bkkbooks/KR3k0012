  - {type: variant, offset: 710, length: 468, content: 四寸棺五寸槨因丘陵為墳不封不樹行之一年而四方諸侯皆則焉又曰宓子賤者仕魯為單父宰恐魯君聽讒使己不得行其政於是辭行故請君之近吏二人與之俱至官令二吏書方書輒掣其肘書不善則從而怒之二吏患焉辭請歸魯子賤曰子之書不善子勉歸之矣二吏歸報於君曰宓子賤使臣書而掣臣肘書惡而又怒臣邑吏皆笑之此臣所以去之而來也魯君以問孔子孔子曰宓不齊君子也其才任霸王之佐屈節而治單父將以自試意者宓子以此諫乎公寤太息曰此寡人之不肖也寡人亂宓子之政而責其善者數矣微二吏則寡人無以知過微夫子則寡人無由自寤遽發所愛之使告宓子曰自今以往單父非魯有也從子之制有便於人者子決之五年一言其要宓子敬奉詔遂得行其政於是單父治焉躬教厚明親親尚篤敬施至仁加懇誠致忠信百姓化之又曰孔子兄之子蔑者與宓子賤皆仕孔子往過蔑而問之曰自子之仕何得何亡對曰未有所得而亡者三王事若聾聾宜為襲言前後相因襲學焉得習言不得學習也是學不得明也奉祿少饘粥不及親戚是骨肉益踈也公事多急不得弔死問疾是朋友道闕也其亡者三即謂此也孔子不悅往過子賤問如孔蔑對曰自來仕無所亡而所得者三始誦之今得而行之是學益明也奉祿所供被及親戚是骨肉益親, WYG: ''}
