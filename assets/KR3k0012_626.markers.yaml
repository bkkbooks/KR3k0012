  - {type: variant, offset: 10, length: 3, content: 哀公問, SBCK: 元鳯中詔曰夫榖賤則傷農今三輔太常榖减賤减猶少也其令以菽粟當今年賦租稅元年􅀄詔曰天下以農桑爲夲日者省用罷不給官减外徭耕桑者益衆而百姓未能家給朕甚􅉖焉其减口賦錢有司奏請减什三上許之後漢書曰建武中田租三十稅一有産子者復以三年之筭明帝即位人無横徭天下安寕時􅂖尚貴尚書張林上書言榖所以貴由錢賤也可盡封錢一取布帛爲租以通天下之用從之魏志曰太祖􅀄平􅀽紹下令田租􅅿収粟四􅂛戸絹二疋綿二斤餘不得擅興晉書曰武帝平呉後制戸調之式丁男之戸歳輸絹三疋綿三斤女及次丁男爲戸者半輸諸邊郡或三分之二逺者三分之一夷人輸賨布戸一疋逺者或一丈不果田者輸義米戸三斛逺者五斗極逺者輸筭錢人二十八文齊書曰髙帝􅀄竟陵王子良上表曰今所在􅂖價雖和而比室飢嗛縑纊雖賤駢門躶質而守宰務在裒刻圍桑品屋以准貲課}
