  - {type: punctuation, offset: 265, content: 『, id: KR3k0012_CHANT_626-bkkpn68}
  - {type: variant, offset: 265, length: 400, content: 以德以法夫德法者御民之具猶御馬之銜勒也子騫曰敢問古之政孔子曰古之政者天子以內史為左右手內史掌手八柄及敘事之受納以語王聽治以德為銜勒以百官為轡以刑罪為策以萬民為馬故御天下數百年而不失善御馬者正銜勒齊轡策善御民者一其德法正其百官刑不用而天下治又曰子游問於孔子曰子亟言子產之惠可得聞乎孔子曰惠在愛民而已子游曰愛民之謂德教何翅於惠哉孔子曰夫子產者猶眾人之母也食之弗能教也子游曰其事可言乎孔子曰子產以其乘車濟冬涉者盡愛而無教也又曰孔子謂宓子賤曰子治單父眾悅子何施而得之對曰不齊之治也父恤其子其子恤諸孤而哀喪紀孔子曰善小節也小民附矣猶未足也曰不齊所父事者三人所兄事者五人所友事者十一人孔子曰父事三人可以教孝矣兄事五人可以教悌矣友事十一人可以舉善矣中節也中節人附矣猶未足也曰此地民有賢於不齊者五人不齊事之而稟度焉皆教不齊所以治之之道孔子歎曰其大者乃於此乎有矣又曰孔子初仕為中都宰中都魯邑名也為養生送死之節長幼異食如, SBCK: 夏后氏}
