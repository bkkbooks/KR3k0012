  - {type: variant, offset: 7, length: 0, content: '', SBCK: 令人入粟得以拜爵邊食足支五歳可令入粟郡縣足支一歳已上可時赦勿収農人租如此德澤加於萬人帝從之後天下充實乃下詔曰農天下之夲務莫大焉今勤身從事而有租稅之賦是謂夲末者無以異也夲農也末賈也言農與賈俱出租無異也於勸農之道未備其除田之租稅又曰董仲舒說上曰古者稅人不過十一其求易供使人不過三曰其力易足􅁗用啇鞅之法加月爲更卒巳復爲正卒一歳屯戍一歳力役三十倍於古更卒謂給郡縣一月而更者也正卒謂給中都官者率計令人一歳之中屯戍及力役之事三十倍多於古也田租口賦塩鐵之利二十倍於古􅁗賣塩鐡貴故下人受其用也旣收田租又出口賦而官更奪塩鐡之利卒計一歳之中失其資二十倍多於古也或耕豪人之田見稅十五故貧人常衣馬牛之衣而食犬􅇾之食又曰倪寛爲左内史勸農業緩刑獄卑體下士務在於得民心收租稅時裁闊狹與民相假貸爲有貧弱及農要之時不即徵収也以故租多不入後有軍發左内史以􅀒租課殿當免皆恐失之大}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_626-1b}
  - {type: variant, offset: 7, length: 2, content: 家語, WYG: 令人入粟得以拜爵邊食足支五歲可令入粟郡縣矣足支一歲已上可時赦勿収農人租如此徳澤加於萬人帝從之後天下充實乃下詔}
  - {type: variant, offset: 7, length: 0, content: '', krp: 令人入粟得以拜爵邊食足支五歳可令入粟郡縣足支一歳已上可時赦勿収農人租如此德澤加於萬人帝從之後天下充實乃下詔曰農天下之夲務莫大焉今勤身從事而有租稅之賦是謂夲末者無以異也夲農也末賈也言農與賈俱出租無異也於勸農之道未備其除田之租稅又曰董仲舒說上曰古者稅人不過十一其求易供使人不過三曰其力易足秦用啇鞅之法加月爲更卒巳復爲正卒一歳屯戍一歳力役三十倍於古更卒謂給郡縣一月而更者也正卒謂給中都官者率計令人一歳之中屯戍及力役之事三十倍多於古也田租口賦塩鐵之利二十倍於古秦賣塩鐡貴故下人受其用也旣收田租又出口賦而官更奪塩鐡之利卒計一歳之中失其資二十倍多於古也或耕豪人之田見稅十五故貧人常衣馬牛之衣而食犬彘之食又曰倪寛爲左内史勸農業緩刑獄卑體下士務在於得民心收租稅時裁闊狹與民相假貸爲有貧弱及農要之時不即徵収也以故租多不入後有軍發左内史以負租課殿當免皆恐失之大}
  - {type: variant, offset: 8, length: 1, content: 語, SBCK: 牛車小家擔􅀒輸租繦屬不絶課吏以最上上由此愈竒寛又}
