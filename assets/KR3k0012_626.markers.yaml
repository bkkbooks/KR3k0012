  - {type: variant, offset: 25, length: 10, content: 莫大乎使民富且壽也公, SBCK: 以庸調無慿好惡湏准故遣作様以頒諸州令其好不得過精惡不得至濫任土作貢防源斯在諸州送物作巧生端苟欲副於斤兩遂即加其丈尺有至五丈爲疋者理甚不然闊尺八長四丈同文共䡄其事乆行立様之時湏載此數􅀂求兩而加尺甚暮四而朝三冝令所司簡閱有踰於比年常例尺丈過多者奏聞又}
  - {type: page-break, offset: 25, content: '', id: KR3k0012_SBCK_626-3a}
  - {type: variant, offset: 25, length: 10, content: 莫大乎使民富且壽也公, krp: 以庸調無慿好惡湏准故遣作様以頒諸州令其好不得過精惡不得至濫任土作貢防源斯在諸州送物作巧生端苟欲副於斤兩遂即加其丈尺有至五丈爲疋者理甚不然闊尺八長四丈同文共䡄其事乆行立様之時湏載此數若求兩而加尺甚暮四而朝三冝令所司簡閱有踰於比年常例尺丈過多者奏聞又}
  - {type: variant, offset: 27, length: 1, content: 乎, WYG: 焉今勤身從事而有租税之賦是謂本末者無以異也本農也末賈也言農與賈俱出租無異也於勸農之道未備其除田之租稅又曰董仲舒説上曰古者税民不過十一其求易供}
  - {type: variant, offset: 29, length: 0, content: '', WYG: 人不過三日其力易足秦用商鞅之法加月為更卒已復為正卒一歲屯戍三歲力役三十倍於古更卒謂給郡縣一月而更者也正卒謂給中都官者也率計今人一歲之中役之事三十倍多于古也田租口賦鹽鐵之利二十倍於古秦賣鹽鐵貴故下}
  - {type: variant, offset: 30, length: 0, content: '', WYG: 受其困也既収田租又出口賦而官更奪鹽鐵之利率計今人一歲之中失其資産二十倍多於古也或耕豪民之田見税十五故貧民常衣馬牛之衣而食犬彘之食又曰兒寛為左内史勸農業緩刑罰卑體下士務在於得民心收租税時裁濶狹與民相假貸為有貧弱及農要之時不即徴收也以故租多不入後有軍發左内史以負租課殿當免民皆恐失之大家牛車小家擔負輸租繦屬不絶課吏以最上上由是愈竒寛唐書曰開元八年二月制曰頃者以庸調無慿好􅁖湏準故遣作様以頒諸州令其好不得過精惡不得至濫任土作貢防源斯在諸州送物作巧生端苟欲}
  - {type: page-break, offset: 30, content: '', id: KR3k0012_WYG_626-2a, image: WYG0898/WYG0898-0615c.png}
