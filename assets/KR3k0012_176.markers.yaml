  - {type: variant, offset: 319, length: 0, content: '', SBCK: 也後太守居之以數失火故塗以雌黄遂名黄堂􅀃苑曰聖人之於天下譬如一堂之上也今有滿堂飲酒者一人獨纍然向隅而泣則一堂之人皆不樂矣管子曰堂上逺於百里門廷逺於萬里今歩者一日百里之情通堂上有事十日而君不聞歩者十日千里之情通堂下有事一月而君不聞歩者百日萬里之情通門庭有事朞年而君不聞此謂逺於萬里也漢武内傳曰上元夫人言西王母有六甲之術用之可以遊景雲之宫登流霞之堂漢武故事曰玉堂去地十二丈基堦皆用玉東京賦金華玉堂白虎麒麟潘尼詩曰鸞鳯棲堂廡不􅀂翔廖廓文選天台山賦玉堂䕃暎乎髙隅楚辝曰魚鱗屋􅀆龍堂古詩云黄金爲君門白玉爲君堂庭中生桂樹華燈何煌煌堂皇附漢書曰坐堂皇上室而無四壁曰皇也廣雅曰堂皇合殿也洛陽記曰洛陽宫有桃間堂皇杏間堂皇㮏間堂皇竹間堂皇李間堂皇魚梁堂皇醴泉堂皇百戯堂皇晉宫闕名曰洛陽宫有水碓堂皇擇果堂皇陸機四言詩序曰太子宴朝士於宣猷堂皇遂命機賦詩樓爾雅曰狹而脩曲日樓􅀃文曰樓重屋也樔澤中守草樓也釋名曰樓有戸牖諸孔婁婁然也史記曰方士言武帝曰黄帝爲五城十二樓以候神人帝乃立神明臺井幹樓髙五十丈輦道相屬漢書曰濟南人上皇帝明堂圖圖中有一殿四面無壁以茅蓋通水園宫垣爲􅃨道上有樓從西南入蓋樓之始也又郊祀志云其南有玉堂壁門大鳥之屬立神明臺井幹樓髙五十丈輦道相屬焉顔師古注云漢宫閣䟽云神臺髙五十丈上有九室}
