  - {type: 'tls:seg', offset: 314, content: '', id: KR3k0012_CHANT_176-5a.4}
  - {type: variant, offset: 314, length: 2, content: 復修, SBCK: 廷尉陳元逹極諌聦怒將斬之聦時幸逍遥園李中堂元逹抱堂下樹叫曰臣所言者社稷之計聦免之於是易李中堂爲愧賢堂北史齊文襄於鄴東起山池遊觀河澗王孝瑜遂於第作水堂龍舟植幡矟於舟上數集諸弟宴射爲樂武成幸其第見而恱之故盛興後園之翫習於是貴賤慕効處處營造又曰􅀂干惠事母以孝聞周文甞造射堂新成與諸將宴射惠竊歎曰親老矣何時辨此周文聞之即日徙堂於惠宅論衡曰王者之堂墨子稱堯舜堂髙三尺儒家以爲卑下假使之然髙三尺之堂蓂莢生於階下湏臨堂察之乃知莢數夫起視堂下之莢孰與懸日曆於扆坐頋輙見之也風俗通曰殿堂象東井形刻作荷蓤蓤水物也所以厭火晉宫閣名曰洛陽宫有則百堂螽斯堂休徴堂延禄堂仁壽堂綏福堂含芳堂樂日堂椒華堂芳音堂顯成堂承光堂五福堂嘉寜堂瑞應圖帝琴堂前有二橘樹連理改琴堂爲連理堂華陽國志曰文翁立講堂作石室一曰}
  - {type: page-break, offset: 314, content: '', id: KR3k0012_SBCK_176-2b}
  - {type: variant, offset: 314, length: 2, content: 復修, WYG: 造萬公堂於西園三十國春秋西凉傳曰李暠於南門外臨水起堂名曰靖恭堂以議朝政閱武事堂成圖讃自古明王忠臣孝子貞女暠自為序以明鑒戒文武羣僚亦皆圖焉是月白雀翔于靖恭暠頌之梁書曰髙祖五年改閲武堂為德陽堂改聽訟堂為義賢堂魏書曰任城王澄從髙祖於觀徳殿髙祖曰射以觀德次之凝閒堂髙祖曰名要有其義此取夫子閒居之義不可縱奢以忘儉自安以忘危故此堂後作茅茨堂謂李冲曰此東曰歩元廡西曰遊凱廡此坐雖非唐堯之居卿等當無愧於元凱冲對曰臣既遇唐堯之君不敢辭元凱之譽髙祖曰光景垂落朕同宗則有載考之義卿等將出無逺何得黙爾德音即命黄門侍郎崔光郭祚邢巒崔休等賦詩言志燭至公卿辭髙祖曰在夜載考宗族之義卿等且還朕與諸王宗室欲成此夜飲和苞漢趙記曰劉聰嘉平三年廷尉陳元達極諫聰怒將斬之聰時幸逍遥園李中堂元達抱堂下樹呌曰臣所言者社稷之計聰免之於是易李中堂為愧賢堂北史齊文襄於鄴東起山池遊觀河間王孝愉遂於第中作水堂龍舟植幡矟於舟上數集諸弟宴射為樂武成幸其第見而悦之故盛興後園之翫於是貴賤慕效處處營造又曰若干惠事母以孝聞周文帝造射堂新成與諸將㑹宴射惠竊歎曰親老矣何時辦此周文聞之即日徙堂於惠宅論衡曰王者之堂墨子稱堯舜堂髙三尺儒家以為卑下假使之然髙三尺之堂蓂莢生於階下須臨堂察之乃知莢數夫起視堂下之莢孰與懸日歴於扆坐顧輙見之也風俗通曰殿堂象東井形刻作荷菱荷菱水物也所以厭火晉宫闕名曰洛陽宫有則百堂螽斯堂休徴堂延祿堂仁夀堂綏福堂含芳堂樂日堂椒華堂芳音堂顯成堂承先堂五福堂嘉寧堂瑞應圖曰帝琴堂前有橘樹連理改琴堂為連理堂華陽國志曰文翁立講堂前又作石室一曰}
