  - {type: variant, offset: 2280, length: 383, content: 曰太極殿十二間徽行殿顯陽殿暉章殿含章殿建始殿仁壽殿百福殿清暑殿章華殿嘉福殿宣光殿修明殿嘉樂殿芙蓉殿崇光殿華光殿蔬圃殿華德殿九華殿右五殿在華林園章陽殿百兒殿芳德殿靈光殿承光殿永寧殿景福殿延休殿百子殿虞清殿淵冥殿安昌殿建康宮殿簿云林光殿在縣東北十里潮溝村覆舟山前晉以為藥園又曰陳永初中於臺城中起昭德嘉德壽安乾明有覺等殿又曰光嚴殿在縣東北六里景陽山東嶺南起重雲光嚴二殿前為兩樓又云梁於臺城中立曾城觀觀歷四代修理更起重閣七間上名重雲殿下名光嚴殿又云太初宮中有神龍殿去縣三里左太冲吳都賦云杭神龍之華殿是也又云臺城溫德門內又起三善長春勝辯等殿又云鳳光殿在縣東北五里一百步舊臺城內又云宋於臺城立正福清曜等殿又云臺城中有麗譙閣麗日殿飛香三重閣又云臺城溫德門內有永貞溫文文思壽安等殿輿地志云未央後宮有鴛鴦昭陽飛翔增地合歡蘭林披香鳳皇等八殿又云丹陽郡建康縣文德殿梁武帝移張衡渾儀置此殿又, SBCK: ''}
