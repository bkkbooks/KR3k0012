  - {type: variant, offset: 2416, length: 248, content: 陳永初中於臺城中起昭德嘉德壽安乾明有覺等殿又曰光嚴殿在縣東北六里景陽山東嶺南起重雲光嚴二殿前為兩樓又云梁於臺城中立曾城觀觀歷四代修理更起重閣七間上名重雲殿下名光嚴殿又云太初宮中有神龍殿去縣三里左太冲吳都賦云杭神龍之華殿是也又云臺城溫德門內又起三善長春勝辯等殿又云鳳光殿在縣東北五里一百步舊臺城內又云宋於臺城立正福清曜等殿又云臺城中有麗譙閣麗日殿飛香三重閣又云臺城溫德門內有永貞溫文文思壽安等殿輿地志云未央後宮有鴛鴦昭陽飛翔增地合歡蘭林披香鳳皇等八殿又云丹陽郡建康縣文德殿梁武帝移張衡渾儀置此殿又云, WYG: ''}
