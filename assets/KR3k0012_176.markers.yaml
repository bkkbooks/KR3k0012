  - {type: variant, offset: 318, length: 0, content: '', krp: 在城南𥘉堂遇火太守更脩立又増二石室虞氏家記曰虞潭爲右衛將軍太夫人年髙求解職𬒳詔不聽特假百日迎母東歸起養堂親親集㑹作詩言志齊地記曰臨淄城西門外有古講堂基柱猶存齊宣王脩文學處也拾遺記曰董偃常卧延清之堂設火齊屏風又曰海人獻龍膏爲燈於燕昭王王坐通雲之堂具燈王子年拾遺記漢武息於延涼室卧夢李夫人授帝蘅蕪之香帝驚起而香氣猶著衣枕歷月不歇帝弥思涕乃改延涼室爲遺芬夢堂襄沔記白馬泉毎年刺史三月上旬於此泉起曲水流杯堂引泉水爲祓禊之所臨時構造事竟毀除其流杯堂本在壘城西郡國誌王屋縣有孔子學堂西南七里有石室臨大河水勢湍急五里之間寂無水聲如似聽義又曰齊桓公宫城西門外有講堂齊宣王立此學也故稱爲稷下學莒子如齊盟于稷門此也宋永𥘉山川古今記永康縣縉雲堂黄帝練丹處又曰費北有積弩堂益州記文翁學堂在城南羊頭山記太學堂洛陽南開陽門外長十丈廣三丈堂前石經四部本碑凡四十八枚西尚書周易公羊十六碑南禮記五碑東論語三碑有諌議大夫馬日磾碑議郎蔡邕銘又曰聖壽堂石虎造垂王佩八百大小鏡二萬枚丁香末爲泥油瓦四面垂金鈴一萬枚去鄴三十里聞響十洲記曰崑崙山有光碧之堂西王母所居郡國志雞陂之側即春申君子假居之}
