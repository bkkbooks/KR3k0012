  - {type: variant, offset: 1795, length: 128, content: 自魏史記秦皇改命宮為廟以擬太極魏號正殿為太極蓋採其義而加以太亦猶漢夏門魏加曰大夏耳咸康中散騎侍郎庾闡議求改太為泰蓋謬矣東西堂亦魏制於周小寢也皇后正殿曰顯陽東曰含章西曰徽音又洛宮之舊也含章名起後漢顯陽徽音亦起魏曰明陽晉避文帝諱改為此周禮亦有路寢小寢又其制度也, SBCK: 真人結草爲樓占星候氣}
