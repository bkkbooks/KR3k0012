  - {type: variant, offset: 312, length: 0, content: '', SBCK: 二年造萬金堂於西園三十國春秋西涼傳曰李暠於南門外臨水起堂名曰靖恭堂以議朝政閱武事堂成圖讃自古明王忠臣孝子貞女暠自爲序以明鑒戒文武群寮亦皆圖焉是月白雀翔于靖恭堂暠頌之梁書曰髙祖五年改閱武堂爲徳陽堂改聽訟堂爲議賢堂後魏書任城王澄從髙祖於觀徳殿髙祖曰躬以觀徳次之凝閑堂髙祖曰名要有義此堂天子閑居之義不可縱奢以忘儉自安以忘危故此堂後作茅茨堂謂李沖曰此東曰歩元廡西日遊凱廡此坐雖非唐堯之君卿等當無媿於元凱冲對曰臣旣遭唐堯之君不敢辝元凱之譽髙祖曰光景垂落朕同宗則有載考之義卿等將出無逺何得黙尔示聽徳音即命黄門郎崔光鄴郭雅邢巒崔休等賦詩言志燭至公卿辝髙祖曰在夜載考宗族之義卿等且還朕與諸王宗室欲成此夜飲和苞漢趙記曰劉聦嘉平}
  - {type: page-break, offset: 312, content: '', id: KR3k0012_SBCK_176-2a}
