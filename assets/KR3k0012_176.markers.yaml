  - {type: variant, offset: 319, length: 0, content: '', WYG: 也後太守居之以數失火故塗以雌黄遂名黄堂説苑曰聖人之於天下譬如一堂之上也今有滿堂飲酒者一人獨纍然向隅而泣則一堂之人皆不樂矣管子曰堂上逺於百里門庭逺於萬里今步者一日百里之情通堂上有事十日而君不聞步者十日千里之情通堂下有事一月而君不聞步者百日萬里之情通門庭有事朞年而君不聞此謂逺於萬里也漢武内傳曰上元夫人言西王母有六甲之術用之可以遊景雲之宫登流霞之堂漢武故事曰玉堂去地十二丈基階皆用玉東京賦曰金華玉堂白虎麒麟潘尼詩曰鸞鳯棲堂廡不若翔寥廓文選天台山賦玉堂䕃映乎髙隅楚辭曰魚鱗屋兮龍堂古詩云黄金為君門白玉為君堂庭中生桂樹華燈何煌煌堂皇附漢書曰坐堂皇上宫而無四壁曰皇也廣雅曰堂皇合殿也洛陽記曰洛陽宫有桃間堂皇杏間堂皇柰間堂皇竹閒堂皇李閒堂皇魚梁堂皇醴泉百戯堂皇晉宫闕名曰洛陽有水碓堂皇擇果堂皇陸機四言詩序曰天子晏朝士於宣猷堂皇遂命機賦詩樓爾雅曰狹而修曲曰樓説文曰樓重屋也樔澤中守草樓也釋名曰樓有户牗諸孔婁婁然也史記曰方士言武帝曰黄帝為五城十二樓以候神人帝乃起神明臺井榦樓髙五十丈輦道相屬漢書曰濟南人公玉帶上黄帝明堂圖中有一殿四面無壁以茅葢通水水圜宫垣為復道上有樓從西南入葢樓又郊祀志云其南有玉堂璧門大鳥之屬立神明臺井榦樓髙五十丈輦道相屬顔師古注云漢宮閤疏云樓髙五十丈上有室}
