  - {type: variant, offset: 1046, length: 518, content: 頴冑改為嘉福殿隋書宇文愷傳云時上北巡愷造觀風行殿上容侍衛者數百人離合為之下施輪軸推移倏忽有若神功戎狄見之莫不驚駭唐太宗謂侍臣曰今天下無事四夷賓服唯須守此成功以養百姓因指殿而言曰安百姓者如造此舍經始斯畢安可改移若易一榱增一瓦人足竟踐良工揮墨搖其梁棟所壞益多亦猶百姓既安因而撫養若慕奇功變法制不恒其德必致勞擾又曰太宗謂侍臣曰朕頃覽劉聰傳聰將為劉后起𪃫儀殿廷尉陳元達諫聰大怒命斬之劉后手疏啟請甚切聰怒解而甚媿之人之讀書欲廣聞見然非知之難也朕近於藍田市木將別為一殿取制兩儀仍構重閣其木已具遠想聰事斯作遂止又曰高祖引蘇世長宴於披香殿世長酒酣奏曰此隋煬帝之所作耶何雕麗之若此高祖曰卿好諫以直其心實詐豈不知此殿是吾所造何須姦詭疑煬帝乎對曰臣實不知但見傾宮鹿臺琉璃之瓦並非受命帝王愛民節用之所為也若是陛下作此誠非所宜臣昔在武功幸獲陪侍見陛下宅宇纔蔽風霜當彼時亦以為足今目隋之侈民不堪命數歸有道而陛下得之實謂懲其奢淫不忘儉約今初有天下而於隋宮之內又加雕飾欲撥其亂寧可得乎高祖每優容之又曰玄宗嘗召張說及禮官學士等賜宴於集仙殿上謂說曰今與卿等賢才同宴於此宜改殿為集賢殿因下制改麗正書院為集賢殿書院又曰麗正殿高宗降誕之所開元中繕寫圖籍貯之洛陽宮殿簿有明光殿三秦, SBCK: 荆州}
