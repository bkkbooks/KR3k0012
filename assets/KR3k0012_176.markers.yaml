  - {type: variant, offset: 2402, length: 5, content: 潮溝村覆舟, WYG: 世説曰凌雲臺樓觀極精巧先稱平衆材輕重當宜然後造構乃無錙銖相負揭臺雖髙峻恒隨風揺動魏明帝登臺懼其勢危别以大材扶持之樓便頽壞論者謂輕重力偏故也九江録曰庾亮在武昌諸佐吏殷浩等乘秋夜佳景共登髙樓俄而不覺亮至衆將避之公曰老子於此興復不淺便坐談詠至今名庾公樓幽明録曰鄴城鳯陽門五層樓去地五十丈安金鳯凰三頭於其上二頭飛入漳河朗見在水㡳一頭今獨存水經曰鄧州㶚陵}
