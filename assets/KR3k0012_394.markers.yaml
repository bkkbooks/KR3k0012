  - {type: variant, offset: 13, length: 1, content: 骨, SBCK: 如有所司捕務安詳也爾雅曰堂下謂之歩禮記王制曰古者以周尺八尺爲歩今以周尺六尺四寸爲歩又􅀕義曰故君子跬歩而弗敢忘孝也漢書曰息夫躬曰匈奴飲馬於渭水邊境雷動四野風起京師雖有武􅑣音鋒精兵末有能窺左足而先應者也窺音跬丰歩曰跬歩也言一舉足也又曰蔡義河内温人也以明經爲給事大將軍幕府家貧常歩行禮不逮衆門下好事者相合爲義置犢車令乗之又曰盖寛饒爲人剛直髙}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_SBCK_394-3a}
  - {type: variant, offset: 13, length: 1, content: 骨, WYG: 知有所司捕務安詳也爾雅曰堂下謂之歩禮記王制曰古者以周尺八尺為歩今以周尺六尺四寸為歩又祭義曰故君子跬歩而弗敢㤀孝也漢書息夫躬曰匈奴飲馬於渭水邊境雷動四野風起京師雖有武將精兵未有能窺左右而先應者也又曰蔡義河内温人也以明經給事大將軍幕府家貧常歩行禮不逮衆門下好事者相合為義置犢車令乗之又曰盖寛饒為人剛直髙}
