  - {type: variant, offset: 25, length: 7, content: 床王床者王者床, WYG: 丞相拜司空廷尉作兩角髻葛裙拄杖臨路邊窺之嘆曰人言阿龍超阿龍故自超不覺歩至臺門方言曰半歩為跬世說曰阮宣子常歩行以百錢挂杖頭至酒店上便獨酌酣暢趨說文曰趨低頭疾行也釋名曰疾行也趨趨赴也赴所期也}
