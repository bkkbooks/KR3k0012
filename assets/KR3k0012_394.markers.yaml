  - {type: variant, offset: 19, length: 13, content: 人群黨坐於王床王床者王者床, krp: 名赤龍阿龍故自超不覺歩至䑓門方言曰半歩爲跬丗說曰阮宣子常歩行以百錢桂杖頭至酒店上便獨酌酣暢趨說文曰趨低頭疾行也赴直行也釋名曰疾行曰趨趨赴也赴所斯也}
  - {type: variant, offset: 20, length: 4, content: 群黨坐於, WYG: 踐三尺法天地人也再舉足為歩備隂陽也郭子曰}
