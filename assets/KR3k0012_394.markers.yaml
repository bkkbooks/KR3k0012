  body:
  - {type: variant, offset: 5, length: 2, content: 四坐, SBCK: 五行歩趨走跳蹲行易困卦曰臋無膚其行趑趄毛詩谷風曰行道遲遲中心有違遲遲舒行㒵又􅁰離曰彼􅁰離離彼稷之苗行邁靡靡中心搖搖又載驅曰汶水湯湯行人彭彭又我行其野曰我行其野蔽芾其樗昬􅊚之故言就爾居又蟋蟀枤杜曰獨行蝺蝺禮記仲尼燕居曰行則有隨行而無隨則亂於塗也又王藻曰君與尸行接武尊者尚徐蹈半迹大夫繼武迹相及也士中武迹間容迹端行頥霤如矢弁行剡剡起􅋰凡行容惕惕直疾㒵也凡行謂道路也左傳襄五曰衛獻公使與寗喜言寗喜告蘧伯玉伯玉曰瑗不得聞君之岀敢聞其入遂行從近􅀜岀論語述而曰子曰三人行必有我師焉史記曰伍子胥曰爲我謝申包胥吾日暮途逺吾故倒行而逆施之譬如人行前塗尚逺日勢巳暮在㒹倒疾行何得責吾順行禮漢書曰􅀽盎使吴見守從史適在守盎校爲司馬司馬曰君第去臣亦且亡辟吾親君何患廼以刀决帳盎解節旄履歩行七十里着屐歩行而逃亡吴書曰孫䇿討山越斬其渠帥悉令左右分行逐賊獨􅀐與虞翻相得山中翻曰危事也令䇿下馬此草深卒有警急馬不及人翻善用矛請在前行得平地􅂆䇿乗馬䇿曰卿無馬奈何荅曰飜能歩行日可三百里明府試鞭馬翻能䟽歩屬之東方朔別傳曰武帝問朔曰公孫丞相倪大夫等先生自視何與此哉朔曰臣觀其臿齒牙樹頰胲音改吐脣吻擢項頥結股肱連脽音誰凥逶虵其迹行歩偊旅臣朔雖不肖尚兼此數子神仙傳曰黄盧子者姓葛名越年二百八十􅀊行及走馬王眞者上黨人也年十七八乃學道服食胎息之術行及走馬力兼數人河上公者莫知其姓名也又能行及走馬頭上常有五色氣髙丈餘孔安者魯人也行氣服鈆丹有陳和者樂安人也重之求事安遂受其方合藥服之二百餘年頭色轉黒氣力百倍行及走馬也列仙傳曰沈建者丹陽人也丗爲長史建獨好導引服食之術一日行五百里能舉千斤葛仙公別傳曰孫堅欲害仙公馳馬徃遂見仙公徐行逐之不及歩}
