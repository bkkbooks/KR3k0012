  - {type: variant, offset: 942, length: 753, content: 用耳禁雖為翻所惡然猶盛歎翻魏文帝為翻設虛坐蜀志曰費禕為諸葛亮司馬值軍帥魏延與長史楊儀相憎每並坐論延或舉刃擬儀儀泣涕橫集禕常入坐其間諫喻分別終亮之世各盡延儀之用也又曰王平字子均西宕渠人生長戎旅手不能書所識不過十字而占授作書皆有意理使人讀史漢書記傳聽之備知其義從朝至夕端坐儼然也吳志曰步騭字子山與廣陵衛旍俱以種瓜自給會稽焦征羗郡之豪族騭等脩剌奉瓜征羗見之隱几坐帳中設席於地坐騭旍旍忿恥騭神色自若鄧粲晉記曰裴遐性恬和同類有試遐者推墮床下遐拂衣還坐言無異色漢晉春秋曰王褒父儀為文帝所殺未嘗西向坐示不臣也晉中興書曰陶淡字處靜年十五便服食絕穀家累千金僮客百數淡終日端拱絕不婚娶居臨湘縣山中立小草屋裁足容身時還家設小床獨坐不與人共何晏別傳曰晏小時武帝雅奇之欲以為子每挾將遊觀命與諸子長幼相次晏微覺於是坐則專席止則獨立或問其故荅曰禮異族不相貫坐位孟嘉別傳曰廋亮領江州嘉為從事禇褒為豫章出朝亮正旦大會時彥悉集嘉坐次第甚遠褒問亮曰聞有孟嘉其人何在亮曰在坐卿但自覔褒觀眾人指嘉謂亮曰將無是乎亮欣然笑嘉為褒所得乃益重嘉焉皇甫謐高士傳曰管寧常坐一木榻五十餘年榻上當膝皆穿六韜曰文王出田見呂尚坐茅而漁乃再拜與歸又曰紂之時婦女坐之綺席晏子曰景公獵休坐地食晏子後至滅葭而席公不悅曰子席何也對曰臣聞介胄坐陣不席獄訟不席獄戶不席三者皆憂也臣不敢以憂侍坐孟子曰晉平公之於亥唐也入云則入坐云則坐食云則食雖蔬食菜羹未嘗不飽莊子曰原憲處魯居環者之室匡坐而弦歌風俗通曰延嘉中常侍坐單超左悺音貫徐璜具瑗唐衡在帝左右縱其姦慝時人謂之語曰左迴天徐轉日具獨坐言其信用甚於圓轉又曰汝南陳伯敬行必舉步坐必儼然郭子曰何次道充字次道往王丞相以塵尾礭床呼何共坐云來來此是君位世說曰魏明帝使后弟毛曾與夏侯太初共坐時人謂之蒹葭倚玉樹語林曰馬融笇渾天不合召鄭玄令笇一笇便決及玄, SBCK: 治産}
