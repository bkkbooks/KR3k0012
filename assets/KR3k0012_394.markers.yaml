  - {type: variant, offset: 1696, length: 1130, content: 成辭歸融心忌焉玄亦疑有追者乃坐橋下在水上據屐融果轉戒欲勑追之告左右曰玄在土下水上據木此必死矣遂罷追俗說曰王僧敬神明俊徹為一時之摽桓玄時集藂賓客莫有出其右者王在坐都不復覺有餘人坐無王便覺殷仲文謝益壽為佳王僧敬兄弟列坐齋中見之若神小人從戶前過皆肅然毛豎嵇康絕交書曰危坐一時痺不得搖臥說文曰眠翕目也寢病臥也臥休也釋名曰臥化也其精神變化不與覺時同也寐謐也謐靜無聲也寢侵也損事功也瞑泯也無知泯泯也禮記玉藻曰君子寢恒東首鄭玄注曰首生氣也又樂記曰魏文侯問於子夏曰吾端冕而聽古樂則唯恐臥聽鄭衛之音則不知倦論語公冶長曰宰予晝寢子曰朽木不可雕也糞土之墻不可污也於予與何誅誅責又鄉黨曰寢不尸布展手足似尸象史記曰吳起為將與士卒最卞者同衣食臥不設席行不乘騎又曰上自將擊黥布群臣居守皆送至灞上留侯病自強起至曲郵因說上令太子為將軍監關中軍上曰子房雖疾強臥而傳太子漢書曰黥布反上疾欲使太子擊之呂后承間為上泣曰上雖疾強載輜車臥而護之諸將不敢不盡力又曰上欲廢太子呂后使建成侯呂澤劫張良曰君常為上謀臣今上日欲易太子君安得高枕而臥又曰汲黯拜淮陽太守黯伏謝不受上曰君薄淮陽耶顧淮陽吏民不相得吾徒得君重臥而治之又曰初武帝遣昭帝以討莽何罪功封金日磾為秺侯日磾以帝少不受封輔政歲餘病困大將軍光白封日磾臥授印綬一月薨又曰吳楚反乏糧飢欲退數挑戰周亞夫終不出夜軍中驚內相攻擊擾亂至於帳下亞夫終臥不起須臾亦定又曰董賢常與上臥起嘗晝寢偏藉上衣袖上欲起恐動賢乃斷袖而起又曰王莽軍師外破大臣內叛憂懣不能食但飲酒啗鰒步角切魚讀軍書倦因憑几寢不復就床後漢書曰彭寵自立為燕王其妻數惡夢又多見變怪五年春寵齋獨在便室倉頭子密等三人因寵臥寢寐共縛寵著告外吏云大王齋禁皆使休東觀漢記曰吳漢擊富平獲索二賊於平原明年春賊率五萬餘人夜攻漢營軍中驚亂堅臥不動又曰上在邯鄲宮晝臥溫明殿耿弇入造床下請問因說曰今更始失政天下可馳檄而定又曰楊政常過楊虛侯馬武稱疾臥欲令政拜床下政入戶徑上床坐武恨語言不懌政因曰蕃臣不思求賢報國而驕天下英俊今日搖動者刀入脅左右大驚蜀志曰先主既定益州廣漢太守夏纂請秦密為師友祭酒領五官掾稱曰仲父密稱疾臥在茅舍纂將功曹石祐主簿王並即密第宴談密臥如故沈約宋書曰羊欣字敬元從父不疑為烏程令年十二時王獻之為吳興太守甚知愛之獻之常夏月入縣欣看新絹裙晝寢獻之書數幅而去欣書本工因此彌善鍾離意別傳曰嚴遵者與光武皇帝俱為諸生遊涉他縣同門精學暮夜宿二人寒不得寢臥更相謂曰後若豪貴憶此之難宜勿相忘羅含別傳曰羅含字君章少嘗晝臥夢一鳥文色異常徑飛入口杜祭酒別傳曰君新作被腝眠覺晏起乃歎腝便眠使人不起異事因令看陌上有寒人舉被乞之常眠布被中會稽典錄曰陳脩字奉遷少為郡幹受韓詩穀梁春秋家貧為吏常出擔上下恒食乾糒音備每至正臈僵臥不起同僚請不肯往其志操如此吳, SBCK: 吴}
