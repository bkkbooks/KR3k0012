  - {type: variant, offset: 5, length: 2, content: 四坐, WYG: 五行歩趨走跳蹲行易困卦曰臋無膚其行趦趄毛詩谷風曰行道遲遲中心有違遲遲舒行貌又黍離曰彼黍離離彼稷之苗行邁靡靡中心揺揺又載驅曰汶水湯湯行人彭彭又我行其野曰我行其野蔽芾其樗昏姻之故言就爾居又蟋蟀杕杜曰獨行踽踽禮記仲尼燕居曰行則有隨行而無隨則亂於塗也又玉藻曰君與尸行接武尊者尚徐蹈半迹大夫繼武迹相及也士中武迹間容迹端行頥霤如矢弁行剡剡起屨凡行容􅅥􅅥直疾貌也凡行謂道路也左傳襄五曰衛獻公使與寗喜言寗喜召蘧伯玉伯玉曰瑗不得聞君之出敢聞其入遂行従近闗出論語述而曰子曰三人行必有我師焉史記曰伍子胥曰為我謝申包胥吾日暮途逺吾故倒行而逆施之譬如人行前途尚逺日勢已暮改歩顛倒疾行何得責吾順行禮漢書曰袁盎使吴見守従史適在守盎校為司馬司馬曰君苐去臣亦且亡辟吾親君何患廼以刀决帳盎觧節旄屐歩行七十里着屐歩行而逃亡吴書曰孫䇿討山越斬其渠帥悉令左右分行逐賊獨騎與虞翻相行山中翻曰危事也令䇿下馬此草深卒有驚急馬不及人翻善用矛請在前行得平地勸䇿乘馬䇿曰卿無馬奈何答曰翻能歩行日可三百里明府試鞭馬翻能疏歩屬之東方朔别傳曰武帝問朔曰公孫丞相倪大夫等先生自規何與此哉朔曰臣觀其臿齒牙樹頬胲吐唇吻擢項頤結股肱連脽尻逶虵其迹行歩踽旅臣朔雖不肖尚兼此數子神仙傳曰黄盧子者姓葛名越年二百八十嵗行及走馬王真者上黨人也年七八十乃學道服食胎息之術行及走馬力兼數人河上公者莫知其姓名也又能行及走馬頭上常有五色氣髙丈餘孔安者魯人也行氣服鈆丹有陳和者樂安人也重之求事安遂受其方合藥服之二百餘年頭色轉黒氣力百倍行及走馬也列仙傳曰沈建者丹陽人也世為長史建獨好道為服食之術一日行五百里能舉千斤髙仙公别傳曰孫堅欲害仙公馳馬徃逐見仙公徐行逐之不及歩}
