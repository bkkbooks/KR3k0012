  - {type: variant, offset: 18, length: 0, content: '', SBCK: 除鄢陵長家貧無單車疋馬歩行之官莊子曰壽陵餘子學歩於邯鄲未得其能失其故歩匍匐而歸以此効彼兩失之白虎通曰人踐三尺法天地人也再舉足爲歩備隂陽也郭子曰王丞相拜司空廷尉作兩角髻葛裙柱杖臨路邊窺之歎曰人言阿龍超導}
