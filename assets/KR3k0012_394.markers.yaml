  - {type: variant, offset: 2830, length: 0, content: '', SBCK: 慶忌僚子也勇爲人所聞走及奔馬吴氏春秋曰今與􅂹俱走則人不勝􅂹矣居其車上則􅂹不勝人又曰有莘氏女子採桑得嬰兒於空桑之中獻之其君令養之察其所以然曰其母居伊水之上孕夢神告曰臼出水而東走千里邑盡爲水身化爲空桑故命之曰伊尹戰國䇿曰昔曽參處費魯人有與曽參同姓名者殺人人告其母曰曽參殺人曽參母投杼踰牆而走}
  - {type: variant, offset: 2830, length: 0, content: '', WYG: 慶忌僚子也勇為人所聞走及奔馬吴氏春秋曰今與驥俱走則人不勝驥矣居其車上則驥不勝人又曰有莘氏女子採藥得嬰兒於空桑之中獻之其君令養之察其所以然曰其母居伊水之上孕夢神告曰臼出水而東走千里邑盡為水身化為空桑故命之曰伊尹戰國䇿曰昔曾參處費魯人有與曾參同姓名者殺人人告其母曰曽參殺人曾參母投杼踰墻而走}
