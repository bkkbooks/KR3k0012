  - {type: variant, offset: 644, length: 2, content: 幸譙, SBCK: 降頴陽雖得入意不安門下有擊馬着皷者馬驚硠音郎􅔫音搕鄧晨起走出視之乃馬也魏略曰曹眞字子丹沛郡人夲姓􅁗養曹氏或云其伯父南􅀫與太祖善共平􅀽術部黨與太祖相攻刼太祖出爲寇所追走入􅁗氏伯南開門受之寇問所在荅云我是寇遂害之由此太祖思其功遂變其姓江表傳曰陸遜破劉備於夷陵備捨舡歩走燒皮鎧以斷道}
