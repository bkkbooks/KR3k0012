  - {type: variant, offset: 15, length: 2, content: 挫屈, SBCK: 家貧俸禄數千半以給吏人爲耳目爲司􅀠常歩行續漢書曰李固少有儁才雅志好學爲三公子常躬歩行驅驢負書從師范曄後漢書曰楊震轉􅃰郡太守子孫常􅂼食歩行魏志曰崔林字德儒清河東武城人}
