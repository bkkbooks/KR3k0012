  - {type: variant, offset: 3022, length: 496, content: 十及亡劉尹臨殯以璧柄塵尾著棺中因慟絕世說曰袁紹年少時曾遣人夜以劍擲魏武小不著魏武撥之其後來必高因怙臥床上劍至果高又曰郝隆七月七日出日中仰臥人問何以荅曰我曬書也語林曰王子敬在齋中臥偷入齋取物幞裝一室之內略無不盡子敬臥而不動遂復登床欲有所覔子敬因呼曰偷兒青氈是我家舊物可特置不於是群賊始知其不眠悉置物驚走睡左傳宣上曰趙宣子諫靈公患之使鉏麑賊之鉏麑晉力士也晨往將朝尚早坐而假寐不解衣冠而睡麑退而歎曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死漢書禮樂志曰魏文侯最為好音而謂子夏曰聽古樂則欲寐及聞鄭衛之音子不知倦焉又曰陳咸字子康父萬年嘗病召咸教戒於床下語至夜半咸睡頭觸屏風萬年大怒欲杖之咸叩頭謝曰具曉所言大人教咸諂也萬年乃不復言晏子曰景公田於梧丘夜猶早公坐睡而夢有五大夫北面稱無罪公覺召晏子晏子對曰昔君靈公田五大夫駭獸故斷其頭而葬之命之曰五大夫之丘命人掘而葬之世說曰魏武云我眠中不可妄近近便斫人亦不覺左右宜深慎此後佯睡所幸人竊以被覆之因便斫殺自後安眠人莫敢近者郭子曰許侍中顧司空入王丞相帳中事具帳部益部耆舊傳曰何袨為成都令嘗眠睡其覺悟便得姦詐咸畏袨之發摘或以為有術得知之無敢復欺者, SBCK: ''}
