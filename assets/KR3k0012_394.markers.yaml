  - {type: variant, offset: 2833, length: 1, content: 遣, SBCK: 反上自擊之張良居守上躰不安卧輼車中行三四里留侯走東追上簮墮􅀍髮及輼車排户曰陛下即弃天下欲以王葬乎以布衣葬乎上罵曰􅀂翁天子也何故以王及布衣葬乎良曰淮南反於東淮隂害於西恐陛下􅀝溝壑而終也莊子曰藏舟於壑藏山於澤謂之固矣然則夜半有力者􅀒之走而昧者不知荀卿子曰伯禽將歸國周公謂之曰君子力如牛不與牛爭力走如馬不與馬争走智如士不與士争智淮南子曰漁者走淵木者走山又曰躄者見虎不走非勇也又曰飛不以尾挫尾則飛不能逺走不以手縳手則走不能疾抱朴子曰柠木實之赤者餌之一年老者少昔道士梁湏年七十服之年百三十􅀊能夜讀書走及馬柠丁吕切又音楮丗􅀃曰鍾㑹撰四夲論始畢甚欲使嵇公見一置懷中旣詣定畏其有難不敢相示因出户遥擲靣便走俗􅀃曰桓公豹奴善􅀐乗亦有極快馬時有一諸葛郎自云能走與馬等桓車􅀐以百疋布置埒頭令豹奴乗與諸葛竟走先至者得布便俱走諸􅁑常與馬齊欲至垀頭去布三丈許諸葛一跳坐布上遂得之魯女生別傳曰魯女生長樂人也少好學道􅀄服餌胡麻乃永絶榖八十餘年日更少壯面如桃花日行三百里走及麞鹿跳釋名曰跳條也如草木枝條務上行也左傳僖下曰魏犫束􅇩見}
