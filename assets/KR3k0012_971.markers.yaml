  - {type: variant, offset: 1708, length: 143, content: 安若曼延蒙籠應吉甫安石榴賦曰余往日為中書直廬上有安石榴枝葉甚茂故為之賦傅玄安石榴賦曰虎宿中而纖條結龍辰升而丹華繁其在晨也灼若九日栖扶桑其在夕也爽若燭龍吐潛光庾儵若石榴賦曰遠而望之粲若摛績被山阿迫而察之赫若龍輝耀淥波夏侯孝若石榴賦曰接翠萼於綠蔕冒紅牙於丹鬚赩然含蕤璀爾散珠雪酲解餚怡神實氣, SBCK: 自零}
