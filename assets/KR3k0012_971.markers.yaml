  - {type: variant, offset: 2810, length: 1, content: 㮏, WYG: 荔枝四月先熟以其地熱故曰火也核大而味酸其髙新州與南海産者最佳五六月方熟形若小鷄子近蔕稍平皮殻微紅肉瑩寒玉又有焦核者性熱液丼食之過度即蜜漿制之又有䗶荔枝黄色味稍劣於紅者廣州記云毎歳進荔枝郵𫝊者疲斃於道漢朝下詔止之今猶修事荔枝煎進焉其樹自經尺至于合抱葉宻如}
