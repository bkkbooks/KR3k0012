  - {type: variant, offset: 365, length: 5, content: 疾病醫工治, SBCK: 者題爲合字蓋一人口也風俗記曰王髙麗年十四五時四月八日在彭城佛寺中謝混見而以㯽榔贈之執王手謂曰王郎謝叔源可與周旋否南中八郡志曰㯽榔大如􅀥色青似蓮子彼人以爲異婚族好客輙先進此物􅀂邂逅不設用相嫌恨林邑記曰㯽榔樹大圍丈餘髙十餘丈皮似青桐節如桂竹下夲不大上末不小調直亭亭千萬􅀂一森秀無柯端頂有葉葉似甘蕉條􅂀開破仰望沙沙如㴙藂蕉於竹杪風至獨動似舉羽扇之掃天葉下繋數房房綴十數子家有數百樹雲踈如墜繩也廣州記曰嶺外㯽榔小如交阯而大如蒳音納子土人亦呼爲㯽榔廣志曰木實曰㯽榔樹無枝略如柱其顚五六尺間穟如黍秀實大如桃李生􅁄針重疊其下剥其皮煑其肉實而貫之堅如乾􅀥食後啖之滑羙消糓下氣彼方珎之以爲口實亦出交阯南方草物狀曰㯽榔􅀣三月開花仍連著實大如雞􅆑十一月熟雲南記曰雲南有大腹㯽榔在枝朶上色猶青每一朶有三二百顆又有剖之爲四片者以竹串穿之隂乾則可乆停其青者亦剖之以一片青葉及蛤粉卷和嚼嚥其汁即似減澁味雲南每食訖則下之又曰雲南多生大腹㯽榔色青猶在枝朶上每朶數百顆云是彌臣國來又曰雲南有㯽榔花糝極羙又曰平琴州有㯽榔五月熟以海螺殻燒作􅁅名爲奔蛤􅁅共扶留藤葉和而嚼之香羙羅浮山䟽曰山㯽榔一名蒳子幹似蔗葉􅀋柞一藂十餘幹每幹生十房房底數百子四月采樹似栟音并櫚生日南者與㯽榔同狀五月子熟長寸餘楊衒之洛陽伽藍記曰南方歌營國㝡爲強大民戸殷多出明珠金玉及水精珎異饒㯽榔異物志曰㯽榔若筍竹生竿種之精硬引莖直上末五六尺間洪洪腫起若瘣木焉因折裂出若􅁰穗無華而爲實大如桃李又生􅁄針重累其下以禦衛其實剖其上皮空其膚熟而貫之硬如乾􅀥以扶留藤古賁􅁅并食下氣及􅀫食消穀飲設以爲口實嶺表録異曰㯽榔交廣生者非舶㯽榔皆大腹子也彼中悉呼爲㯽榔交阯豪士皆家園植之其樹莖葉根幹與桄榔椰子小異也安南人自嫰及老採實啖之以不婁藤兼之瓦屋子􅁅競咀嚼之自云交州地温不食此無以祛其瘴癘廣州亦噉㯽榔然不甚於安南也府郭内亦無㯽榔樹周成􅄂字曰㯽榔菓也似螺可食李當之}
