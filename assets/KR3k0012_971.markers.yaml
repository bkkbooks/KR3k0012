  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 八柿橙林擒椑枇杷㯽榔豆䓻胡桃荔支杮義熈起居注曰二年正月吴令顧脩期言西郷有柿樹殊夲合條依舊集賀詔停晉宮閣名曰徽章殿前柿一株廣志曰柿有小者如杏壬逸荔支賦曰宛中朱柿潘岳閑居賦曰張公大谷之梨梁侯烏椑之柿王廙洛都賦曰豹祠赤杏胡並丹柿甘液滋脆不絓牙齒李尢}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 八柿橙林檎椑枇杷㯽榔豆㓂胡桃荔枝柿義熈起居注曰二年正月呉令顧修期上言西鄉有柿樹殊本合條依舊集賀詔停之晉宫閣名曰徽章殿前柿一株廣志曰柿有小者如杏王逸荔枝賦曰宛中朱柿潘岳閒居賦曰張公大谷之棃梁侯烏椑之柿王廙洛都賦曰豹祠赤杏胡丘丹柿丼液滋脆不經牙齒李尤}
