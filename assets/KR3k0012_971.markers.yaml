  - {type: variant, offset: 971, length: 255, content: 焉方千里中有橫公魚夜化為人剌之不入煮之不死以烏梅二七煮之即熟可已邪病述異記曰嘉興縣睪陶村朱休之有弟朱元元嘉二十五年十月清旦兄弟對坐家中有一犬來向休蹲遍視二人而笑遂搖頭歌曰言我不能歌聽我歌梅花今年故復可柰汝明年何其家驚懼斬犬榜音滂首路側至歲末梅花時兄弟相忿奮戟傷兄官收治並被囚繫經歲得免至夏舉家時疾母及兄弟皆卒任昉述異記曰邯鄲有故邯鄲宮基存焉中有趙王果園梅李至冬而花春得食嶺南異物志曰同方梅繁如北杏十二月開語林曰范汪至能啖梅人嘗致一斛奩須臾啖盡潘岳閑居賦曰梅杏郁棣之屬左思蜀都賦曰梅杏羅生柏梁臺太官令曰柤梨橘栗李, SBCK: ''}
