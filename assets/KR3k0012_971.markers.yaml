  - {type: variant, offset: 2083, length: 548, content: 薦清廟之靈下羞玉堂之客張協安石榴賦曰乃剖乃折金房緗隔范堅安石榴賦曰紅鬚肉艷頳牙外摽似華燈之映翠幕若丹瓊之廁碧瑤殷元安石榴賦曰余以暇日散愁翰林覩潘張若榴二賦雖有其美猶不盡善客復措辭故聊為之賦曰或珠離於琁琬或玉碎於雕觴璘彬洒暎曄紫嬰緗璀若瑤英之攢鍾巘粲若靈蚌之含珠璫徐藻妻陳氏石榴賦曰惟木之珍莫美石榴擢鮮葩於青春結芳實於素秋王倫妻羊氏安石榴賦曰振綠葉於柔柯垂彤子之累衰張載詩曰大谷石榴木滋之冣膚如凝脂汁如清瀨渴者所思銘之裳帶曹植棄妻詩曰石榴植前庭綠葉搖縹青翠烏飛來集拊翼以悲鳴麋元詩曰蒼蒼陵上柏參差列成行童童安石榴列生神道傍㮏晉書曰成帝杜皇后崩先是三吳女子相與簪白花望之如素㮏傳言天公織女死為之著服至是而后崩三國典略曰楊愔一門四世同居家甚隆盛昆弟就學三十餘人庭有㮏樹實落于地群兒咸爭愔獨坐不顧季父暐見之謂賓客曰此兒恬裕有我風蕭廣濟孝子傳曰王祥後母庭有㮏樹始著子使守視祥晝驅鳥雀夜則驚鼠時雨忽至祥抱樹至曙母見惻然紫虛南岳夫人傳曰夫人姓魏名華存性樂神仙季冬夜半有四真人並年可二十降夫人靖室因設酒饌陳玄雲紫㮏夫人還王屋山王子喬等並降時夫人與真人為賓主設三玄紫㮏玄晏春秋曰衛倫過予論及於時味倫因命僕取糗進予予曰夌也有杏李㮏味具杏部杜恕篤論曰日給之華與㮏相似也㮏結實而日給零落虛偽之然與真實相似也虛偽敗而真實成, krp: ''}
