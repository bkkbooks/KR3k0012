  - {type: variant, offset: 55, length: 2, content: 墮落, WYG: 黄丼朱橙胡道安丼賦曰襄隂大橙江陽巨橘林檎廣志曰林檎似赤柰亦名黒檎劉禎京口記曰南國多林檎述征記曰林檎果實可佳比榅桲實㣲大其狀醜其味香輔関有之江淮南少晉宫闕記曰華林園有林檎十二株榅勃六株左思蜀都賦曰林檎枇杷橙柿梬楟謝靈運山居賦曰枇杷林檎帶谷暎渚椑廣州記曰荔枝壺橘南珍之上菱蓮椑柿為其次地理記曰梁侯園有烏椑八稜大如酒盞荆州地土記曰宜都出大椑晉宫閣名曰華林園椑子二株范汪祠制曰孟冬祭用椑柿異苑曰傅亮永初中為䕶軍兄珍住府西齋忽見北窻外椑樹下物面廣三尺状若方相乆乃自㓕􅅊燿靈陽賦曰丼蔗椑柿榛栗木𤓰潘安仁閒居賦曰梁侯烏椑之柿謝靈運山居賦曰椑柿被實於長浦潘岳金谷詩曰前庭樹沙丼後園植烏椑魏武帝為兖州牧上書謹上椑棗二箱枇杷范汪祠制曰孟夏祭用枇杷唐書曰建中元年詔山南之枇杷江南之丼橘嵗為次第貢}
