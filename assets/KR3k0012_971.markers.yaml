  - {type: variant, offset: 1661, length: 3, content: 安石榴, SBCK: 胡桃}
  - {type: variant, offset: 1661, length: 0, content: '', WYG: 胡桃廣五行記曰後蜀李雄玉衡十二年扶風人韓豹為太史令雄卒子期立以豹為太傅猶領侯職豹嘗言於期曰臣今老志在田園欲植胡桃願賜其種期不悟俄而李壽自涪率衆南向襲尅成都廢期自立嶺表録異曰大胡桃皮厚而堅大於北府底平如㯽榔多肉少穰非與北中者相似以斧磓之方破或取之自底磨平以為印子其隔屈曲類篆文也馬融西第頌云胡桃自零潘岳閒居賦曰三桃表櫻胡之别孔融與諸鄉書曰先日多惠胡桃多知篤意劉滔母答呉國書曰咸和中避蘇峻亂於臨}
