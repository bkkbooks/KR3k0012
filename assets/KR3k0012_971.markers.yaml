  - {type: variant, offset: 2636, length: 15, content: 上林苑有白㮏紫㮏花紫綠㮏花綠廣, WYG: 南越王尉􅀈獻髙祖鮫魚荔枝髙祖報以蒲桃錦四疋竺法真登羅山疏曰荔枝冬青夏至日子始赤六七日可食丼酸宜人其細核者謂之焦核荔枝之最珍也異物}
  - {type: variant, offset: 2636, length: 15, content: 上林苑有白㮏紫㮏花紫綠㮏花綠廣, krp: 南越王尉他獻髙祖鮫魚荔支髙祖報以蒲桃錦四疋笁法真登羅山䟽曰荔支冬青夏至日子始赤六七日可食甘酸冝人其細核者謂之焦核荔支之㝡珎也異物}
