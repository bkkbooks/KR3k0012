  - {type: variant, offset: 1857, length: 2, content: 若榴, SBCK: 三桃表櫻胡之別孔融與諸郷書曰先日多惠胡桃深知篤意劉滔母荅虞吴國書曰咸和中避􅂫峻亂於臨安山吴國遣使餉饋乃荅書曰此菓有胡桃飛欀飛禳岀自南州胡桃夲生西􅏔外剛内柔質似賢欲以奉貢荔支東觀漢記曰單于來朝賜橙橘龍眼荔支謝承後漢書曰汝南唐羗爲臨武縣長接交州舊獻荔支羗上書諌乃止魏文帝詔羣臣曰南方有龍眼荔支寜比西國}
