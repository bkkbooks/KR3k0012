  - {type: variant, offset: 594, length: 150, content: 南陵有梅根治風俗通曰夏禹廟中有梅梁忽一春生枝葉又曰五月有落梅風江淮以為信風又有霖霪號為梅雨沾衣服皆敗黦桂陽先賢傳曰有人謂蘇統後園梅樹下種藥可治百病吳氏本草曰梅核明目益氣不飢東方朔別傳曰朔與三門生俱行見一鳩占皆不同一生曰今日當得酒一生曰其酒必酸一生曰雖得酒不得飲也三生皆到主人須臾主人出酒樽中即安於地羸, SBCK: 陳倉胡桃皮薄多肌隂平胡桃大}
