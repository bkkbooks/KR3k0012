  - {type: variant, offset: 2653, length: 1, content: 㮏, WYG: 荔支為異多汁味丼絶口又小酸所以成其味可飽食不可使厭生時大如鷄子其膚光澤皮中食乾則醮小則肌核不如生時竒四月始熟也嶺表録異曰荔枝南中之珍果也梧州江前}
