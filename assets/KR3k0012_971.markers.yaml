  - {type: variant, offset: 1227, length: 424, content: 梅張協七命曰燀音闡以秋橙酢以春梅接以商王之箸承以帝辛之盃石榴廣雅曰若榴石榴也晉隆安起居注曰武陵臨沅縣安石榴子大如椀其味不酸一蔕六實宋書曰元嘉末魏太武征彭城遣使求甘蔗安石榴張暢曰石榴出自鄴下亦當非彼所乏北史曰齊安德王延宗納趙郡李祖收女為妃後帝幸李宅宴而妃母宋氏薦二石榴於帝前問諸人莫知其意帝投之問魏收曰此竟何意收曰石榴房中多子王新婚妃母欲子孫眾多帝大喜詔收卿還將來仍賜美錦二疋唐書曰孔紹安大業末為監察御史時高祖為隋討賊於河東詔紹安監高祖之軍深見接遇及高祖受禪紹安自洛陽間行奔高祖見之甚悅拜內史舍人時夏侯端亦嘗為御史監高祖軍先紹安歸朝授祕書監紹安因侍宴應詔詠石榴詩曰秪為來朝晚開花不及春時人稱之神仙傳曰劉馮者沛人也封桑鄉侯學道於樓丘子常服石桂英及中岳石榴垂四百年如十五幼童瀨鄉記曰老子祠堂北有石榴二株鄴中記曰石虎苑中有安石榴子大如椀盞其味不酸廬山記曰香爐峰頭有大盤石可坐數百人石垂生山石榴三月中作花色似石榴而小淡紅敷紫萼輝曄可愛襄國記曰龍崗縣有好石榴博, SBCK: 􅀶}
