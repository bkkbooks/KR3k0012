  - {type: variant, offset: 2812, length: 0, content: '', WYG: 青木性堅重其根工人多取為阮咸槽彈弓碁局仲長統昌言曰今人主不思神芝朱草而患枇杷荔枝之腐亦鄙甚矣王逸荔枝賦曰乃觀荔枝之樹其形也曖若朝雲之興森如横天之彗湛若大厦之容鬱如峻嶽之勢灼灼若朝霞之吐日離離如繁星之着天劉淵呉都注曰荔枝樹}
