  - {type: variant, offset: 2653, length: 1, content: 㮏, krp: 荔支爲異多汁味甘絶口又小酸所以成其味可飽食不可使厭生時大如雞子其膚光澤皮中食乾則醮小則肌核不如生時竒四月始熟也嶺表録異曰荔支南中之珎果也梧州江前}
  - {type: variant, offset: 2655, length: 152, content: 白赤青三種張掖有白㮏酒泉有赤㮏西方例多㮏家以為脯數十百斛以為蓄積如收藏棗栗若㮏汁黑其方作羹以為豉用也漢武故事曰上握蘭園之金精摘圓丘之紫㮏釋名曰㮏油擣㮏實也和以塗繒上燥而發之形似油也㮏脯切㮏曝乾之如脯也盧諶祭法曰夏祠法用白㮏秋祠用赤㮏晉太始起居注曰太始二年六月嘉㮏一蔕十五實或七實生於酒泉王子年拾遺記曰崑崙, WYG: 火}
