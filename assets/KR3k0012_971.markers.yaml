  - {type: variant, offset: 1876, length: 1, content: 實, SBCK: 焦核小次曰春花次曰朝偈此三種爲羙次鼈􅆑大而酸以爲醢和率生稻田間又曰荔支壷橘南珎之上西京􅄂記曰南越王尉他獻髙祖鮫魚荔支髙祖報以蒲桃錦四疋笁法真登羅山䟽曰荔支冬青夏至日子始赤六七日可食甘酸冝人其細核者謂之焦核荔支之㝡珎也異物志曰荔支爲異多汁味甘絶口又小酸所以成其味可飽食不可使厭生時大如雞子其膚光澤皮中食乾則醮小則肌核不如生時竒四月始熟也嶺表録異曰荔支南中之珎果也梧州江前}
