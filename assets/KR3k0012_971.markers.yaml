  - {type: variant, offset: 2379, length: 397, content: 服至是而后崩三國典略曰楊愔一門四世同居家甚隆盛昆弟就學三十餘人庭有㮏樹實落于地群兒咸爭愔獨坐不顧季父暐見之謂賓客曰此兒恬裕有我風蕭廣濟孝子傳曰王祥後母庭有㮏樹始著子使守視祥晝驅鳥雀夜則驚鼠時雨忽至祥抱樹至曙母見惻然紫虛南岳夫人傳曰夫人姓魏名華存性樂神仙季冬夜半有四真人並年可二十降夫人靖室因設酒饌陳玄雲紫㮏夫人還王屋山王子喬等並降時夫人與真人為賓主設三玄紫㮏玄晏春秋曰衛倫過予論及於時味倫因命僕取糗進予予曰夌也有杏李㮏味具杏部杜恕篤論曰日給之華與㮏相似也㮏結實而日給零落虛偽之然與真實相似也虛偽敗而真實成西京雜記曰上林苑有白㮏紫㮏花紫綠㮏花綠廣志曰㮏有白赤青三種張掖有白㮏酒泉有赤㮏西方例多㮏家以為脯數十百斛以為蓄積如收藏棗栗若㮏汁黑其方作羹以為豉用也漢武故事曰上握蘭園之金精摘圓丘之紫㮏釋名曰㮏油擣㮏實也和以塗繒上燥而發之形似油也㮏脯切㮏曝乾之如脯也盧諶祭法曰夏祠法用白㮏秋祠用赤㮏晉太始起居, SBCK: 天劉淵吴郡}
