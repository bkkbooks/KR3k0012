  - {type: variant, offset: 55, length: 2, content: 墮落, SBCK: 黄甘朱橙胡道安甘賦曰襄隂大橙江陽巨橘林檎廣志曰黒琴以赤㮏亦名黒琴劉禎京記曰園多林檎述征記曰林檎菓實可佳其榅勃實微大其狀醜其味香輔関有之江淮南少晉宫闕記曰華林園有林檎十二株榅勃六株左思蜀都賦曰林檎枇杷橙柿梬楟謝靈運山居賦曰枇杷林檎帶谷映渚椑廣州記曰荔支壷橘南珎之上菱蓮椑柿爲其次地理記曰梁侯園有烏椑八稜大如醬盞荆州土地記曰冝都出大椑晉宫閣名曰華林園椑子二株范汪祠制曰孟冬􅀕用椑柿異苑曰傅亮永􅀄中爲護軍兄珎住府西齋忽見北䆫外椑樹下物靣廣三尺狀若方相乆乃自滅韋耀靈陽賦曰甘蔗椑柿榛栗木􅀲潘安仁閑居賦曰梁俟烏椑之柿謝靈運山居賦曰椑柿􅀍實於長浦潘岳金谷詩曰前庭樹沙甘後園植烏椑魏武帝爲兖州牧上書曰謹上椑􅀥二箱枇杷范汪祠制曰孟夏􅀕用枇杷唐書曰建中元年詔山南之枇杷江南之甘橘藕歳爲次第貢}
  - {type: page-break, offset: 55, content: '', id: KR3k0012_SBCK_971-2b}
