  - {type: variant, offset: 1868, length: 0, content: '', SBCK: 蜀好荔支南海荔支勝蜀者故每歳飛馳以進然方暑而熟經􅀫輙敗又曰白居易爲忠州刺史在郡爲木蓮荔支圖􅀉朝中親友各記}
  - {type: variant, offset: 1868, length: 0, content: '', krp: 蜀好荔支南海荔支勝蜀者故每歳飛馳以進然方暑而熟經宿輙敗又曰白居易爲忠州刺史在郡爲木蓮荔支圖寄朝中親友各記}
  - {type: variant, offset: 1869, length: 2, content: 側又, SBCK: 狀曰荔支生巴峽間形圎如帷蓋葉如桂冬青華如橘春榮實如丹夏熟朶如蒲萄核如枇杷殻如紅繒膜如紫綃瓤肉瑩白如氷雪漿液甘酸如醴如酪大抵如此其實過若離本枝一日而色變二日而香變三日而味變四五日外色香味盡去矣廣志曰荔支髙五六丈如桂樹緑葉蓬蓬然冬夏欎茂青華朱實實大如雞子核黄黒似熟蓮子實白如肪甘而多汁似}
