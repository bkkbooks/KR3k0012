  - {type: variant, offset: 1662, length: 0, content: '', WYG: 山呉國遣使餉饋乃答書曰此果有胡桃飛穰飛穰出自南州胡桃本生西羗外國外剛内柔質似古賢欲以奉貢荔枝東觀漢記曰單于來朝賜橙橘龍眼荔枝謝承後漢書曰汝南唐羌為臨武縣長接交州舊獻荔枝羌上書諫乃止魏文帝詔羣臣曰南方有龍眼荔枝寜比西國蒲陶}
  - {type: page-break, offset: 1662, content: '', id: KR3k0012_WYG_971-13a, image: WYG0901/WYG0901-0546c.png}
  - {type: variant, offset: 1663, length: 1, content: 榴, WYG: 蜜乎今以荔枝賜将吏噞之則知其味薄矣呉録曰蒼梧多荔枝生山中人家亦有種之唐書曰楊貴妃生於蜀好荔枝海南荔枝勝蜀者故毎歳飛馳以進然方暑而熟經㝛輙敗又曰白居易為忠州刺史在郡為木蓮荔枝圖寄朝中親友各記其状曰荔枝生巴峽間形圓如帷盖葉如桂冬青華如橘春榮實如丹夏熟朶如蒲萄核如枇杷殻如紅繒膜如紫綃瓤肉瑩白如氷雪漿液丼酸如醴酪大抵如此其實若離本枝一日而色變二日而香變三日而味變四五日外色香味盡去矣}
