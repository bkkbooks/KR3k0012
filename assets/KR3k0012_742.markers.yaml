  - {type: variant, offset: 1014, length: 238, content: 弟子云吾氣絕之後便可開吾胸喉視有何物欲知其根本言終而卒弟子依其言開視胸中得一物形似魚而有兩頭遍體悉是肉鱗弟子致鉢中跳躍不止戲以諸味致鉢中雖不見食須臾悉化成水又以諸毒藥內之皆隨銷化時夏中藍熟寺眾於水次作淀有一僧往因以少淀致鉢中此虫怖懼遶鉢馳走須臾化成水世傳以淀水療噎煩懣方言曰朝鮮洌水之間煩懣謂之漠漫魏志陳登得胸中煩懣華佗謂診曰府君胃中有虫數升欲成肉疽即為作湯治之吐三升許虫赤頭而動半猶是鱠事具醫門勞悸漢書曰太師王舜自奔篡位後病喘悸浸劇遂死宋書曰文帝有虛勞疾意有所想便覺心中痛裂, WYG: 臂流涕}
