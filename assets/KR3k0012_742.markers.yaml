  - {type: variant, offset: 1303, length: 4, content: 仲堪流涕, WYG: 得誅死後髙漸離復以擊筑見秦王王知燕之客乃膠其眼使之擊筑漸離置􅖳於筑中以為重}
  - {type: variant, offset: 1308, length: 1, content: 起, WYG: 擊秦王秦王病瘡三月而死夫言髙漸離以筑擊秦王實也言中秦王病瘡三月而死虗也嵇康髙士傳曰孔休元嘗被人斫之至見王莽以其面有瘡瘢乃碎其玉劍琨與之華佗别傳曰瑯琊有女子左脚膝上瘡癢而不痛愈復發佗曰當得稻穅色犬繫馬牽走五十里斷犬後脚向瘡口湏㬰有蛇在瘡中出以鐵椎横貫引出長三尺許七日便愈異苑曰陳郡謝石少患面瘡諸治莫愈乃自匿逺山卧於巖下中宵有物䑛其瘡隨䑛隨除而䑛處悉白故世呼為謝白面}
