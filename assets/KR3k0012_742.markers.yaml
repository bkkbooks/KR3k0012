  - {type: variant, offset: 1684, length: 3, content: 氣必暑, SBCK: 不疽又曰半石之山合水出焉多鰧魚蒼文赤尾食之不癰譙明之山譙水注焉多阿羅魚一首十身食之巳癰辛氏三􅁗記曰大魚如羊在長池中丗人食之生癰瘡論衡曰儒書云齊桓公􅀒婦人朝諸侯管仲告諸侯曰吾君}
