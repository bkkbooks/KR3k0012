  - {type: variant, offset: 777, length: 236, content: 醫門咽痛并噎易說曰大寒氣當至而不至則多咽痛漢書曰昌邑王被徵至長安左右令哭王曰吾嗌痛不肯哭魏志曰有人病咽塞嗜食而不下華佗令取餅家䔉虀頓飲三升即吐一虵便差事具醫門山海經曰單張之山有鳥曰鴉食之已嗌郭曰嗌咽也戰國策曰噎而後穿井何及於急續漢書禮儀志曰三老五更仲秋之月賜以玉杖端以鳩為飾鳩者不噎之鳥欲老人不噎也晏子曰夫愚人多悔不肖者自賢猶臨難而遽鑄兵臨噎而遽掘井雖速無及淮南子曰有以噎死者而禁天下之食有以車為敗者而禁天下之乘不亦悖哉廣五行記曰永徽中絳州有一僧病噎都不下食如此數年臨終命, WYG: 對權把}
