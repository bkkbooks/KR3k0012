  - {type: variant, offset: 1701, length: 7, content: 九夷順武王蔭暍, SBCK: 齊魯以爲憂事夫齊譬諸疾疥癬也豈能涉江湖而與我争此地哉山海經曰石跪之山其草多條其狀如韭而白花黒實食之巳疥宋玉登徒子賦曰登徒子之妻旣疥且痔登徒恱之使有五子又曰竹山有草名曰黄藿枝如樗葉如麻白華赤實浴之巳疥惡疾韓詩外傳曰芣苢傷夫有惡疾也采采芣苢薄言捋之芣苢澤㵼也芣苢臭惡之菜猶捋之不巳君子雖有惡疾我猶不能去離也論語雍也曰伯牛有疾子問之自牖執其手包曰牛有惡疾不欲見}
