  - {type: variant, offset: 289, length: 101, content: 楚惠王食寒菹中有水蛭雖欲發之恐宰夫得罪當死遂吞之因得心疾甚乃言所中令尹賀曰陰德必須陽報是夜惠王欬而蛭出心腹之病皆除俗說曰阮光祿大兒喪哀過遂得病心服除後經年病瘳續搜神記曰李子豫少善醫方當代稱其通靈許永為豫, WYG: 孫觀遷青}
