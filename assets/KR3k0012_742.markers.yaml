  - {type: variant, offset: 1311, length: 0, content: '', WYG: 有田父耕地見傷蛇在焉有一蛇銜草著瘡上而傷者差田父收其餘葉治瘡皆驗又曰晉時長山趙宣母姙身如常而髀上癢搔之成瘡二兒從瘡出母子平安幽明録曰漢武在甘泉宫有玉女降與帝圍棋女風姿端正帝乃欲通之女因唾帝面遂成瘡帝避跪謝神女為出温水洗之事其温泉部西京雜記曰廣川王好發冡後發欒書冡爾夕王夢一丈夫鬢眉盡白以杖扣王左脚王覺左脚腫痛因生瘡至死不差三輔故事曰}
