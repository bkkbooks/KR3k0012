  - {type: variant, offset: 1423, length: 42, content: 如此自強從公而便疾愈於是車駕行數里病差又曰建武五年上風眩發甚以陰興為侍中受詔雲臺廟室, SBCK: 癰樊至吮􅎳}
  - {type: variant, offset: 1423, length: 1, content: 如, WYG: 亡畧盡疽癰廣雅曰痤疽癰也說文曰癰腫也痤小腫也釋名曰癰壅也氣壅不通結𠂻而潰也左傳襄公十九年傳曰晉荀偃癉疽生􅅑於頭濟河及著癰病目出史記曰卒有病癰者呉起為吮之卒母哭之曰徃年呉公吮其父父遂戰死今又吮}
