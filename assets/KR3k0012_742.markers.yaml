  - {type: variant, offset: 1718, length: 0, content: '', WYG: 朗書言人生有七尺之形死為一棺之土惟立徳揚名可以不朽魏志曰司馬朗遷兖州刺史征呉到居巢軍中有疫即躬親廵視致藥於疾卒焉王隠晉書曰郭文舉得疫病危困不肯伏藥曰命在天不在藥鍾離意别傳曰黄讜為㑹稽太守呉大疫疾黄君轉署意中部得郵意乃露車不冠身循行病者賜與醫藥其所臨䕶日十餘人劉根别傳曰頴川太守到官民大疫掾吏死者過半夫人郎君悉病府君從根求消除疫氣之術根曰寅戌歲泄在亥今年太歲在寅於㕔事之亥地穿地深三尺方與深同取沙三斛著中以淳酒三升沃在地府君即從之病者即愈疫疾遂絶山海經曰復州之山有企踵之鳥如雞一足􅇾毛見則其國中大疫三輔}
