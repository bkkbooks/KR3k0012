  - {type: variant, offset: 1714, length: 3, content: 下懷越, SBCK: 閹崔諶調之曰教弟種􅁂以錐遍刺作孔挣以馬尾庶曰先以此方廻施貴族藝眉有效然後樹􅁂丗傳諶門有惡疾以呼沲爲墓田故庶言及之列女傳曰蔡夫之妻者宋人之女也旣嫁於蔡夫有惡疾其母將改嫁之女曰夫之不幸乃妾之不幸將何去之終不聽其母而作芣苢之詩疫癘􅀃文曰疫皆民之疾也釋名曰疫役也言有􅀑行疾也禮記月令曰孟夏行秋令則民多大疫續漢書曰元􅀄中㑹稽大疫使光禄大夫將醫廵行魏書曰文帝在東宫氛癘大起時人彫傷帝深感歎與素所敬者大理}
