  - {type: variant, offset: 1684, length: 6, content: 氣必暑有暍死, WYG: 不疽又曰半石之山合水出焉多鰧魚蒼文赤尾食之不癰譙明之山譙水出焉多何羅魚一首十身食之已癰辛氏三秦記曰大魚如羊在長池中世人食之生癰瘡論衡曰儒書云齊桓公負婦人朝諸侯管仲告諸侯曰吾君疽瘡不得婦人瘡惡不愈諸侯信管仲故無叛者瘻說文曰瘻頸腫也山海經曰脫扈之山植猪之草可以已䑕郭璞注曰䑕瘻}
