  - {type: variant, offset: 978, length: 114, content: 禁天下之乘不亦悖哉廣五行記曰永徽中絳州有一僧病噎都不下食如此數年臨終命其弟子云吾氣絕之後便可開吾胸喉視有何物欲知其根本言終而卒弟子依其言開視胸中得一物形似魚而有兩頭遍體悉是肉鱗弟子致鉢中跳躍不止戲以諸味致鉢中雖不見食須臾悉化成水, SBCK: 死}
