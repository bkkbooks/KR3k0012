  - {type: variant, offset: 1696, length: 0, content: '', WYG: 曰癬乾瘡也山海經曰渠猪之山多豪魚赤啄赤尾食之可以已癬又曰槖山槖水出焉修郡之魚其音如鴟食之已癬􅏿說文曰􅏿中塞腫漢書曰趙充國討先零帝詔充國曰欲至冬擊虜將軍士寒手足皸􅏿豈有利哉皸拆裂也􅏿寒瘡也疥說文曰瘡瘙也周禮天官疾醫曰夏時有癢疥病禮記月令曰仲冬行春令民多疥癘左傳昭五曰齊侯疥遂痁朞而不瘳諸侯之賔問疾者多在焉國語呉語曰夫差既許越成乃大戒師徒將以伐齊子胥入諌曰越之在呉也猶人之有心腹之疾也今}
