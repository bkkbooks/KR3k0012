  - {type: variant, offset: 1399, length: 8, content: 避正殿讀圖讖坐廉, WYG: 門複道上詔曰􅃨道多風寒左右老人且病痱多取帷帳東西完塞窓皆令緻宻螫毒魏志曰彭城夫人夜之厠䘍螫其手呻吟無賴華佗令温湯漬手數易湯常令煖其旦即愈捜神記曰阮瑀傷於虺齅其瘡而雙虺出鼻中孔叢子曰宰我使齊反見夫子曰梁丘據遇毒三旬而瘳齊㑹大夫衆賔賀焉大夫並復獻攻毒之方弟子謂曰梁丘子瘳矣方安所施夫子曰三折肱而知為醫治梁丘遇虺害而獲瘳假有與之同疾者必問所以已之方衆人為具故各言其方也抱朴子曰蝮蛇中人不曉方術者但以刀割肉投地其肉沸如火炙須㬰焦盡嵇含遇䘍賦曰元康二年七月七日中夜遇䘍客有戯余者曰諺云過滿百為䘍所螫斯言信哉蠱周禮秋官曰庻氏掌除毒蠱以嘉草攻之左傳宣上曰晉克有蠱疾沈約宋書曰沛郡相縣唐賜徃此村飲酒還因得病吐蠱䖝十枚臨死語妻張曰死後刳腹中病張手破之臟悉糜碎捜神記曰蠱有怪物若鬼其妖形變化雜類殊種或為狗豕或為䖝蛇其人皆自知其形狀常行之於百姓所中皆死續捜神記曰曇逰道人清苦沙門也剡縣有一家事蠱人噉其食飲無不吐血死遊詣之主人}
