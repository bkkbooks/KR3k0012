  - {type: variant, offset: 283, length: 0, content: '', SBCK: 平安幽明録曰漢武在甘泉宮有玉女降與帝圍棊女風姿端正帝乃欲通之女因唾帝面遂成瘡帝避跪謝神女爲出温水洗之事具温泉部西京雜記曰廣川王好發冢後發欒書冢是夕王夢一丈大􅁂眉盡白以杖扣王左脚王􅁴左脚腫痛因生瘡至死不差三輔故事曰衛太子嶽鼻武帝疾避暑甘泉宮江充謂太子曰陛下惡太子鼻當持􅁓蔽其鼻及入充言曰太子不欲聞陛下膿臰蔽鼻}
