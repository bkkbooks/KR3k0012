  - {type: variant, offset: 1695, length: 0, content: '', SBCK: 狸頭巳䑕鷄頭巳瘻洞林曰栁祖休婦病䑕瘻積年不差及困令兒就吾卦之語之曰當得賤師姓石者治之事具䑕部癬􅀃}
  - {type: variant, offset: 1695, length: 0, content: '', WYG: 貍頭已䑕雞頭已瘻洞林曰栁祖休婦病䑕瘻積年不差及困令兒就外卜之語之曰當得賤師姓石者治之事具䑕部癬說}
  - {type: variant, offset: 1695, length: 0, content: '', krp: 狸頭巳䑕鷄頭巳瘻洞林曰栁祖休婦病䑕瘻積年不差及困令兒就吾卦之語之曰當得賤師姓石者治之事具䑕部癬說}
  - {type: variant, offset: 1696, length: 0, content: '', SBCK: 曰癬乾瘡也山海經曰渠猪之山多豪魚赤喙赤尾食之可巳白癬又曰橐山槖水出焉脩郡之魚其音如鴟食之巳癬􅏿􅀃文曰􅏿中塞腫漢書曰趙充國討先零帝詔充國曰欲至冬擊虜將軍士寒手足􅏿豈有利哉皸坼裂也􅏿寒瘡也疥􅀃文曰疥瘙也周禮天官疾醫曰夏時有癢疥病禮記月令曰仲冬行春令民多疥癘左傳昭五曰齊侯疥遂痁朞而不瘳諸侯之賔問疾者多在焉國語吴語曰夫差旣許越成乃大戒師徒將以伐齊子胥諌曰越之在吴也猶人之有心腹之疾也今}
