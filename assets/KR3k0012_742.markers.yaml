  - {type: variant, offset: 1302, length: 0, content: '', WYG: 惡疾世無良醫吾其死矣嘗聞惡疾蝮蛇螫之痛試為求之當令兄弟知我乃於南山得蛇以股觸之痛楚號呌俄而腫死抱朴子曰治金瘡以氣吹之立即斷痛登山論衡曰儒書言燕太子丹使荆軻刺秦王}
