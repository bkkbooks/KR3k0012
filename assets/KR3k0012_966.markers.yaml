  - {type: variant, offset: 7, length: 3, content: 棗壺棗, SBCK: 東方朔云東南外有建春山其上多羙甘樹京口記曰京城東門射堂前柑樹十餘株盧諶􅀕法曰冬祠用柑襄陽記曰李衡字叔平爲丹陽太守衡每欲治家妻輙不聽後密遣十人於武陵龍陽洲上作宅種柑千樹臨死勑兒曰汝母􅁖吾治家故窮如是吾州里有千頭木奴不責汝衣食歳上一疋絹亦足用矣及衡甘成歳得絹數千疋荆州記曰枝江有名甘冝都郡舊江北有甘園名冝都甘湘州記曰州故大城内有陶􅋲廟地是賈􅁩故宅􅁩時種甘猶有存者崔豹古今注曰甘實形如石榴者謂爲壷甘}
  - {type: variant, offset: 7, length: 1, content: 棗, WYG: 東方朔云東南外有建春山其上多美甘樹京口記曰京城東門射堂前甘樹十餘株盧諶祭法曰冬祠用甘㐮陽記曰李衡字叔平為丹陽太守衡素不治家妻諫不聽後宻遣十人於武陵龍陽洲上作宅種柑千樹臨死勑兒曰汝母惡吾不治家故窮如是吾洲内有千頭木奴不責汝衣食嵗上一疋絹亦足用矣及衡甘成嵗得絹數千疋荆州記曰枝甘江以甘得名宜都郡江北舊有甘園名宜都甘湘州記曰州故大城内有陶侃廟地是賈誼故宅誼時種甘猶有存者崔豹古今注曰甘實形如石榴者謂為}
