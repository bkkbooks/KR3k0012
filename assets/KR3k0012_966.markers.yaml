  - {type: 'tls:seg', offset: 11, content: '', id: KR3k0012_CHANT_966-1a.6}
  - {type: variant, offset: 11, length: 0, content: '', SBCK: 唐新語曰益州每歳進甘子皆以紙裏之他時長吏嫌􅁓不敬代之細布旣而恐甘子爲布所損每懷憂懼俄有御史甘子布至長吏以爲推布裹甘子事懼曰果爲所推及子布到驛長吏但叙以布裹甘子爲敬子布􅀄不之知乆而方晤聞者莫不大􅀏又曰安禄山將反宰臣韋見素請以平章事追之玄宗許焉草詔訖中留之遣中使輔璆琳送甘子且觀其變璆琳受賂而還因言無反狀玄宗謂宰臣曰禄山必無二心詔夲朕巳焚矣異􅁐曰河内司馬元㣧元嘉中爲新淦令䘮官月旦設􅀕甘化而爲鳶又曰南康皈羙山石城内有甘橘橙柚就食其實任意取足脫持歸者便遇大虺或顚仆失俓家人啖之亦病述異記曰南康郡有東望山營民入山頂有湖清深又有菓林周四里許衆菓畢植間無雜木行列整齊如人功也甘子熟三人共食致飽訖懷二枚欲以示外人便還㝷覔向逕迴旋半日迷不能得即聞空中語云放􅀟甘乃聽汝去懷甘者恐怖放甘於地轉眄即見歸逕乃相與俱却返廣古今五行記曰唐髙宗調露中連州見一甘樹四月中有子如拳大剖之有兩頭虵又曰唐光宅中李崇真任益州刺史􅆹事前有甘樹有子大如雞子晚熟微小有孔如針郡官咸異之方欲將進乆而方罷因剖之得一赤班虵長尺餘崇真後爲兵所殺王廙洛都賦曰􅀂夫黄甘荔支殊逺之珎雖非方土之所産重九譯而來臻潘安仁笙賦曰披黄苞以授甘傾縹瓷以酌醽張載詩曰三巴黄甘􅀲州素禁渇者所思銘之裳帶}
