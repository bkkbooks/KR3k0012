  - {type: variant, offset: 2201, length: 2, content: 棗六, SBCK: 橘}
  - {type: variant, offset: 2201, length: 2, content: 棗六, krp: 橘}
  - {type: variant, offset: 2204, length: 0, content: '', SBCK: 一株宋書曰孝武大明中芳香琴堂東西有􅀟橘連理改芳香琴堂爲連理堂齊書曰豫章王嶷薨忽見形於第後園乗腰輿指摩處分呼直兵直兵無手板左右授一玉手板與之曰橘樹一株死可覔􅀘之因出後園閤直兵倒地仍失手板南史曰虞愿始數歳家中橘樹冬熟諸兒競來取之愿獨不取家人皆異之三國典略曰梁侯景未平王僧辯獻嘉橘一帶}
  - {type: page-break, offset: 2204, content: '', id: KR3k0012_SBCK_966-5a}
  - {type: variant, offset: 2204, length: 0, content: '', krp: 一株宋書曰孝武大明中芳香琴堂東西有雙橘連理改芳香琴堂爲連理堂齊書曰豫章王嶷薨忽見形於第後園乗腰輿指摩處分呼直兵直兵無手板左右授一玉手板與之曰橘樹一株死可覔𥙷之因出後園閤直兵倒地仍失手板南史曰虞愿始數歳家中橘樹冬熟諸兒競來取之愿獨不取家人皆異之三國典略曰梁侯景未平王僧辯獻嘉橘一帶}
  - {type: variant, offset: 2205, length: 1, content: 株, SBCK: 十五子于湘東}
  - {type: variant, offset: 2205, length: 1, content: 株, krp: 十五子于湘東}
  - {type: punctuation, offset: 2206, content: ，, id: KR3k0012_CHANT_966-bkkpn773}
  - {type: 'tls:seg', offset: 2206, content: '', id: KR3k0012_CHANT_966-32a.5}
  - {type: variant, offset: 2207, length: 0, content: '', SBCK: 王荅之曰昔文康獻橘十有二子用今方古彼有慙色今景之兇􅁖旣稔凱歌之聲巳及嘉瑞逺臻但増鯁慰晏子曰晏子使楚楚王謂其左右曰晏嬰習辤者也吾欲傷之坐定而縳一人至問何爲曰齊人坐盗王視晏子曰齊人善盗乎晏子對曰嬰聞橘生於淮北則爲枳枝葉徒似其實味不同水土異也今民生於齊不盗入楚得無俲楚民善盗耶王􅀏曰寡人取病焉又曰晏子使楚楚王進橘置削晏子并食不剖王曰橘當云剖對曰臣聞之賜人主前者􅀲桃不削橘柚不剖今者萬乗無教故不敢剖臣非不知也荘子曰三王五帝之禮義法度譬猶樝梨橘柚其味相反而皆可適於口淮南子曰夫橘樹之江北化而爲橙吕氏春秋曰常山之北投淵之上有百菓焉羣鳥所食箕山之東靑馬之所有甘櫨焉箕山許由隱所青馬崑崙山東矣江浦之橘雲夢之柚漢上之菤所以致之菤菤且也音卷山海經曰洞庭之山其木多橘正論曰橘柚之貢堯舜不甞山龍華虫帝王不以爲䙝服而命臣餘黄甘厭文繡者蓋以萬數者也鹽鐵論曰孝武皇帝平百越以爲園圃而民皆厭橘柚宋躬孝子傳曰王靈之廬陵西昌人䘮父}
  - {type: page-break, offset: 2207, content: '', id: KR3k0012_SBCK_966-5b}
