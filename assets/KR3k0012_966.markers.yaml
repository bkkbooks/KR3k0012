  - {type: variant, offset: 11, length: 0, content: '', WYG: 唐新語曰益州每嵗進甘子皆以紙褁之他時長吏嫌紙不敬代之細布既而恐甘子為布所損每懐憂惧俄有御史甘子布至長吏以為推布褁甘子事俱曰果為所推及子布到驛長吏但叙以布褁甘子為敬子布初不知之久而方悟聞者莫不大笑又曰安禄山將反宰臣韋見素請以平章事追之𤣥宗許焉草詔訖中留之遣中使輔璆琳送甘子且觀其變璆琳受賂而還因言無反狀𤣥宗謂宰臣曰禄山必無二心詔本朕已焚矣異苑曰河内司馬元允元嘉中為新淦令䘮官月旦設祭甘化而為鳶又曰南康皈美山石城内有甘橘橙柚就食其實任意取足脫持歸者便遇大虵或顛仆失徑家人啖之亦病述異記曰南康郡有東望山山頂有湖清深又有果林周四里許衆果畢植間無雜木行列整齊如人功也甘子熟時有三人共食致飽訖懷二枚欲以示外人便共尋覔向逕廻旋半日迷不能得即聞空中語云放雙甘乃聽汝去懐甘者恐怖放甘於地轉盻即見歸逕乃相與俱返廣古今五行記曰唐髙宗調露中連州見一甘樹四月中有子如拳大剖之有兩頭蛇又曰唐光宅中季崇貞任益州刺史㕔事前有甘樹有子大如雞子晩熟微有小孔如針郡官咸異之方欲將進久而方罷因剖之得一赤斑蛇長尺餘崇貞後為兵所殺洛都賦曰若夫黃甘荔支殊逺之珎雖非方土之所産重九譯而來臻潘安仁笙賦曰披黃苞以授甘傾縹瓷以酌酃張載詩曰三巴黃甘𤓰州素奈渴者所思銘之裳帶}
