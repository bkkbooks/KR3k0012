  - {type: variant, offset: 2975, length: 3, content: 寧比西, WYG: 園夏至則熟二千石常設厨膳命大夫共㑹樹下食之南夷志曰日橘大釐城有之其味甚酸穹􅀈有大橘如覆杯湘州記曰泉陵縣有焦山山上多橘裴淵廣州記曰羅浮山有橘夏熟實大如李雲南記曰雲南出甘橘甘蔗橙柚梨蒲桃李梅杏桃糖酪之類悉有魏王花木志曰盧橘蜀生有給客橙似橘而非若柚而香冬夏華實相繼或如弹丸或如拳通嵗食之亦名盧橘異物志曰橘為樹白華而赤實皮既馨香又有善味江南則有之不生他所交阯有橘置長官一人秩三百石主嵗貢御橘續捜神記曰晉孝武帝世宣城秦精嘗入武昌山中採藥忽見一人身長一丈遍體皆毛從山北來乃探懐中二十枚橘與精甘美異常異苑曰南康歸美山石城有橘就食任意取足脱持歸者便道遇大蛇任昉述異記曰越多橘柚園越人嵗多橘税謂之橙橘越中有王氏橘園胡氏梅山賀氏之𤓰廣五行記曰陳後主夢黃衣人圍城繞城橘樹盡伐去之及隋兵至上下通服黃衣未幾為隋滅之嶺表記異曰山橘子大者冬熟如土𤓰次者如弹丸其實金色而葉緑皮薄而味酸偏能破氣客廣之人帶枝葉藏之入膾醋尤加香美楚辭曰后皇嘉樹橘來服皇天也后土也服習也言皇天后土生美橘樹異於衆受命不遷生南}
