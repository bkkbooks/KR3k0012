  - {type: variant, offset: 2972, length: 1, content: 眼, WYG: 之華帝王不以為䙝服而命臣餘黃甘厭文繡者盖以萬數者也鹽鐵論曰孝武皇帝平百越以為園圃而民皆厭橘柚宋躬孝子傳曰王虗之廬陵西昌人䘮父母二十年鹽酢不入其口所住屋夜有光庭中橘樹隆冬三實㑹稽先賢傳曰嚴遵從光武遇蜀郡獻橘栗上持付公卿遵獨不取水經曰劉備時巴郡結舫水居者五百家縣有甘橘官}
