  - {type: variant, offset: 2971, length: 0, content: '', WYG: 有橘酢正裂人牙時有甜耳建武故事曰咸和六年平西將軍庾亮送橘十二實共同一蒂以為瑞異百官畢賀中興書曰王者徳盛則嘉禾生橘亦嘉味之流晉中閣名曰華林園橘十二株宋書曰孝武大明中芳香琴堂東西有雙橘連理改芳香琴堂為連理堂齊書曰豫章王嶷夣忽見形於第後園乗腰輿指麾處分呼直兵直兵無手板左右授一玉手與之曰橘樹一株死可覔補之因出後園閣直兵倒地仍失手板南史曰虞愿始數嵗家中橘樹冬熟諸兒競取之愿獨不取家人皆異之三國典略曰梁侯景未平王僧辯獻嘉橘一蔕二十五子于湘東王王答之曰昔文康獻橘十有二子用今方古彼有慙色今景之兇惡既稔凱歌之聲已及嘉瑞之橘逺臻但增歡慰晏子曰晏子使楚楚王謂其左右曰晏嬰齊之智辨士也吾欲傷之坐定而縳一人至問何為曰齊人坐盗王視晏子曰齊人善盗乎晏子對曰嬰聞橘生於淮北則為枳枝葉徒似其實味不同水土異也今民生於齊不盗入於楚得無效楚民之善盗耶王笑曰寡人取病焉又曰晏子使楚楚王進橘置削晏子并食不剖王曰橘當云割對曰臣開之賜人主前者𤓰桃不削橘柚不剖今者萬乗無教故不敢割臣非不知也莊子曰三皇五帝之禮義法度譬猶楂梨橘柚其味相反而皆可適於口淮南子曰夫橘樹之江北化而為橙吕氏春秋曰常山之北投淵之上有百菓焉群鳥所食箕山之東青馬之所有甘櫨焉箕山許由隐所青馬崑崙山東江浦之橘雲夣之柚漢上之卷所以致之山海經曰洞庭之山其木多橘正論曰橘柚之貢堯舜不嘗山}
