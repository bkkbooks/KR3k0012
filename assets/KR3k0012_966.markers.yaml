  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 三甘橘甘謝承後漢書曰丹陽張磐字子石爲廬江太守㝷陽令甞餉一奩甘其小男年七歳就取一枚磐奪取付外卒以兩枚與之磐奪兒甘鞭卒曰何故行賂於吾子宋書曰彭城王義康時四方獻饋皆以上品薦義康而以次者供御上甞冬月啖甘歎其味並劣義康在坐曰今年甘殊有佳者遣人還東府取甘大三寸又曰元嘉末魏太武征彭城遣使送九種塩并胡皷仍求黄甘梁書曰吕僧珎旣有大勲任惣心膂性甚恭慎當直禁中盛暑不敢解衣每侍御座屏氣鞠躬果食未甞舉筯甞醉後取一甘食武帝􅀏謂曰卿今日便是大有所進禄外令月給錢十萬唐書曰羅浮甘子開元中始有山僧種於南樓寺其後常資進獻幸蜀幸奉天之歳皆不結實又曰天寳中中書門下奏曰臣等今日因奏事承徳音聞江南爲橘江北爲枳蓋以地氣有殊物性因變朕近於宮内種甘子樹數株今秋巳來結實一百五十顆乃與江南及蜀道所進無別亦可謂稍異也晉今曰閬中縣置守黄甘吏一人風土記曰甘橘之属滋味甜羙特異者也有黄者有赬者赬者謂之壷甘廣志曰甘有}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_SBCK_966-1b}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 三甘橘甘謝承後漢書曰丹陽張磐字子石為廬江太守尋陽令嘗餉一奩甘其小男年七嵗就取一枚磐奪取付還卒以兩枚與之磐奪兒甘鞭卒曰何故行賂於吾子宋書曰彭城王義康時四方獻饋皆以上品薦義康而以次者供御上嘗以冬月啖甘嘆其味並劣義康在坐曰今年甘殊有佳者遣人還東府取甘大三寸又曰元嘉末魏太武征彭城遣使送九種鹽并胡皷仍求黃甘梁書曰吕僧珎既有大勲任總心膂性甚恭慎當直禁中盛暑不敢解衣每侍御座屏氣鞠躬飲食未嘗舉筯醉後取一甘食武帝笑曰卿今日便是大有所進禄外令月給錢十萬唐書曰羅浮甘子開元中始有山僧種於南樓寺其後嘗資進獻幸蜀奉天之嵗皆不結實又曰天寳中中書門下奏曰臣等今日因奏事承徳音聞江南為橘江北為枳盖以地氣有殊物性因變朕近於宫内種甘子樹數株今秋已來結實一百五十顆乃與江南及蜀道所進無别亦可謂稍異也晉令曰閬中縣置守黃甘吏一人風土記曰甘橘之屬滋味甜美時異者也有黃者有頳者頳者謂之壺甘廣志曰甘有}
