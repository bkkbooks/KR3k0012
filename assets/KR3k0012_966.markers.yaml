  - {type: variant, offset: 815, length: 1378, content: 晉史曰光祿卿李郁因晝寢夢食巨棗覺而有疾謂其親友曰嘗聞棗字重來呼魂之象今子神氣逼抑將不免乎未幾而卒孟子曰曾晳嗜羊棗而曾子不忍食公孫丑問曰鱠炙與羊棗孰美曰膾炙哉曰曾子何為食膾炙孟子曰膾炙同也羊棗獨也韓子曰秦飢應侯謂王曰五苑之果蔬橡棗栗足以活民請發之又曰子產治鄭桃棗之蔭於衛者莫援也鄒子曰夏取棗杏之火淮南子曰十一月官都尉其樹棗晏子春秋曰景公謂晏子曰東海之中有水而赤水中有棗花而不實何也晏子曰昔者秦穆公乘龍治天下以黃布蒸棗至海而投其布故水赤蒸棗故花而不實公曰吾佯問子對曰嬰聞佯問者佯對之盧毓冀州論曰安平好棗地產不為無珍杜氏新書曰杜畿為河東太守平虎將軍劉勳為太祖所親貴震朝廷常從畿求大棗畿拒以他故後勳伏法太祖得其書歎曰杜畿可謂不媚竈也英雄記曰孔文舉為東萊賊所攻城欲破其治中左承祖以官棗賦與戰士蔡邕奏事曰程末年十四時祖父叔病物故未抱伏叔尸號泣悲哀舅哀其羸劣嚼棗肉以哺之未見食歔欷不能吞咽漢武內傳曰七月七日西王母當下為帝設玉門之棗東方朔傳曰武帝時上林獻棗上以所持杖擊未央前殿檻呼朔曰叱叱先生來來先生知此筐中何等物也朔曰上林獻棗四十九枚上曰何以知之朔曰呼朔者上也以杖擊檻兩木兩木林也來來者棗也叱叱者四十九枚上大笑賜帛十疋王子年拾遺記曰北極有岐峰之陰多棗樹百尋其枝莖皆空其實長尺核細而柔百歲一實真人關令尹喜內傳曰老子西遊省太真王母共食玉文之棗其實如瓶神仙傳曰吳郡沈羲為仙人所迎上天云天上見老君老君賜羲棗二枚大如雞子又曰李意期於成都角中作一土窟居其中冬夏單衣長髮剪去之但使長五寸許多飲酒食脯及棗栗或百日二百日不出窟是時無可所食也魯女生別傳曰李少君曰冥海之棗大如瓜鍾山之李大如瓶臣已食之遂有奇光劉根別傳曰有道之士不可識往者有陳孜如癡人江夏袁仲陽知事之孜謂仲陽曰今年春當有疾可服棗核中仁二十七枚後果大病又曰能常服棗核中仁百邪病不復干也仲陽服之有效馮明生別傳曰明生為縣吏捕賊為賊所傷殆死道間見女人年可十六七姿容絕世以肘後管中一丸如小豆與服即愈隨神女還岱宗見安期生曰共與女郎遊於安息西母之際食棗異美此間棗小不及憶此棗未久已二千年矣神女云昔與君共食一枚乃不盡此間小棗郍可相比也高士傳曰胡昭字孔明晉宣帝為麻衣時與昭有舊昭同郡周士等謀帝昭聞而步險邀士於肴澠之間止士士不肯昭泣以示誠士感其義乃止昭斫棗樹共士盟而別昭雖有陰德於帝口終不言時人莫知風俗通曰鮑焦耕田而食穿井而飲於山中食棗或曰此棗子所植也遂強吐立枯死水經注曰酸棗縣故城南古韓國昔天子建國名都或以山林故豫章以樹氏都酸棗以棘名邦故曰酸棗也水經曰高唐縣大河右溢世謂之甘棗溝水側多棗故俗取名焉廣志曰東郡榖城紫棗長二寸西王母棗大如李核三月熟眾果之先熟者也種洛陽宮後園河內伋郡棗一名墟棗一名安邑棗東海蒸棗洛陽夏白棗安平信都大棗單父棗梁園國夫人棗大白棗一名曰慼咨小核多肌三星棗駢白棗灌棗此四者官園所種棗有狗雞心牛頭羊矢彌候細腰之名又有玄棗大棗崎廉棗桂棗鄴中記曰石虎園中有西王母棗冬夏有葉九月生花十二月乃熟三子一尺又有羊角棗亦三子一尺東陽記曰信安縣有懸室坂晉中朝時有民王質伐木至石室中見童子四人彈琴而歌質因留倚柯聽之童子以一物如棗核與質含之便不復飢俄頃童子令其歸質承聲而去斧柯漼然盡爛既歸質去家已數十年親舊凋落無復此時矣楊衒之洛陽伽藍記曰景陽山南有百果園果別作一林林名有一堂有仙人棗長五寸把之兩頭俱出核細如針霜降乃熟食之甚美俗傳云出崑崙山一曰西王母棗, SBCK: 流}
