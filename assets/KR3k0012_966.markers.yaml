  - {type: variant, offset: 7, length: 3, content: 棗壺棗, krp: 東方朔云東南外有建春山其上多羙甘樹京口記曰京城東門射堂前柑樹十餘株盧諶祭法曰冬祠用柑襄陽記曰李衡字叔平爲丹陽太守衡每欲治家妻輙不聽後密遣十人於武陵龍陽洲上作宅種柑千樹臨死勑兒曰汝母悪吾治家故窮如是吾州里有千頭木奴不責汝衣食歳上一疋絹亦足用矣及衡甘成歳得絹數千疋荆州記曰枝江有名甘冝都郡舊江北有甘園名冝都甘湘州記曰州故大城内有陶侃廟地是賈誼故宅誼時種甘猶有存者崔豹古今注曰甘實形如石榴者謂爲壷甘}
