  - {type: variant, offset: 2868, length: 136, content: 亦似此中青棗但小耳自青及黃撲已盡又朵著子每朵約三二十顆劉珣曾於番酋家食本國將來者色類沙糖皮肉軟爛餌之乃永樂天蒸之味也其核與北中棗殊異兩頭不尖雙卷而圓如小塊紫礦珣亦收而種之久無萌芽疑是蒸熟也魏文帝詔群臣曰南方龍眼荔枝寧比西國蒲陶石蜜乎酢且不如中國凡棗味莫言安邑御棗也曹植鷂雀, SBCK: 虚}
