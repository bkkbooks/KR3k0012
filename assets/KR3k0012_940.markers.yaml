  - {type: variant, offset: 180, length: 0, content: '', SBCK: 鳶魚臨海異物志曰鳶魚􅃺如鳶唯無尾足隂雨日亦飛髙數丈赤魚魚豢魏略曰文帝欲受禪赤魚逰於露鑊玄魚王子年拾遺録曰夏鮌理水無功沉於羽川化爲玄魚大千尺後遂死横於河海之間後世聖人以玄魚爲神化之物以玄字合於魚字爲鮌字邵魚臨海水􅁟記曰邵魚狀如鳶魚鱬而朱切鰗魚臨海水􅁟記曰鱬鰗魚狀如鳶魚形井魚臨海異物志曰井魚}
  - {type: page-break, offset: 180, content: '', id: KR3k0012_SBCK_940-4a}
  - {type: variant, offset: 180, length: 0, content: '', krp: 鳶魚臨海異物志曰鳶魚狀如鳶唯無尾足隂雨日亦飛髙數丈赤魚魚豢魏略曰文帝欲受禪赤魚逰於露鑊玄魚王子年拾遺録曰夏鮌理水無功沉於羽川化爲玄魚大千尺後遂死横於河海之間後世聖人以玄魚爲神化之物以玄字合於魚字爲鮌字邵魚臨海水土記曰邵魚狀如鳶魚鱬而朱切鰗魚臨海水土記曰鱬鰗魚狀如鳶魚形井魚臨海異物志曰井魚}
  - {type: variant, offset: 181, length: 0, content: '', SBCK: 有兩角鏡魚臨海異物志曰鏡魚如鏡形體薄少􅁏含光魚臨海異物志曰含光魚一名臈魚黃而羙故謂之臈有光照燭沈懐逺南越志曰含光謂臈魚正黄而羙故謂爲臈魚夜則有光嶺表録異曰黃臈魚即江湖之横魚頭觜長而鱗背金色南人臠爲炙雖羙而毒或煎􅘤或乾夜即有光如燭􅬻魚臨海異物志曰􅬻魚如指長七八寸但有脊骨好作羹大者如竹竿曝作燭極有光明􅰛魚臨海異物志曰􅰛魚三月生溪中裁長一寸至十月中東還死於海香氣聞於水上到時月輙復更生永嘉地記曰石堂水口多􅰛魚吹沙魚臨海異物志曰吹沙長三寸背}
