  - {type: variant, offset: 179, length: 0, content: '', SBCK: 形似琵琶故因以爲名任昉述異記曰海魚千歳爲劒魚樂魚一名琵琶魚形似琵琶而喜鳴因以爲名左思吴都賦曰鮫鯔琵琶曹毗掦都賦曰魚則琵琶烏賊䟽齒魚魏武四時食制曰䟽齒魚味如猪魚出東海潘岳滄海賦曰比目䟽齒班魚魏武四時食制曰班魚頭中有石如珠出北郭義恭廣志曰班魚頭中有玉石如珠璣黄雀魚臨海異物志曰黄雀魚常以八月化爲黃雀到十月入海爲魚風􅁟記曰六月東南長風俗名黃雀風時海魚化爲黄雀因爲名也鷰魚臨海異物志曰鷰魚長五寸隂􅀨起飛髙丈}
