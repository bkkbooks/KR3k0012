  - {type: variant, offset: 1896, length: 490, content: 日夜伺之魚夜浮水側有赤光割取血以塗足可以步行水上䖶魚廣志曰䖶魚一名鮦直壟切𩹴魚劉敬叔異苑曰𩹴魚凡諸魚欲產𩹴輒以頭衝其腹𩹴魚自欲生者亦更相撞觸故世人謂為眾魚之生母也嶺表錄異曰𩹴南人云魚之欲產子者須此魚以頭觸其腹而產俗呼為生母魚望魚魏武四時食制曰望魚側如刀可以刈草出豫章明都澤云云滏澤班文魚魚豢魏略曰濊國出班魚皮漢時恒獻之郭義恭廣志曰班文魚出東夷濊獻其皮蕭拆魚魏武四時食制曰蕭拆魚海之乾魚也䱐䰽魚魏武四時食制曰䱐䰽魚黑色大如百斤豬黃肥不可食數枚相隨一浮一沉一名敷常見首出淮及五湖三十六國春秋曰吳人夏丞為孝廉高士夏仲御以母疾將市藥于京師隨丞入洛時值禊飲賈充見而放之仲曰我會稽夏仲御也充問卿居海濱能獻舩不仲曰能之充因命焉仲御即登舩鼓拽容止可觀為䱐䰽之形俄然雲霧杳冥白魚躍入其舟充甚異之蕃踰魚魏武四時食制曰蕃踰魚如鼈大如箕甲上邊有髯無頭口在腹下尾長數尺有節有毒螫人龍魚山海經曰龍魚陵居其狀如狸或曰龍魚似狸一角也一曰鰕魚音遐即有神聖乘此以行九野一曰鼈魚郭璞山海經圖讚曰龍魚一角似狸居陵俟時而出神聖攸乘飛鶩九域乘雲上升括地圖曰龍魚一名鰕魚狀如龍而有神聖乘此以行九野郭璞江賦曰或虎狀龍顏龍魚亦似魚, SBCK: ''}
