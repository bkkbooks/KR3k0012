  - {type: variant, offset: 1222, length: 342, content: 翼魚尾其聲如磬是生珠玉珠母蚌類山海經圖讚曰形如覆銚苞玉含珠有而不積泄以尾閭闇與道會可謂奇魚蠃魚山海經曰邽音圭山濛水出焉其中多蠃魚魚身而鳥翼聲如鴛鴦見其國大水䰽䰽魚山海經曰少咸之山鴈門之水其中多䰽䰽之魚音沛食之殺人魮魚山海經曰懸甕之山晉水出焉其中多魮魚音紫其狀如儵而赤鱗其音如吒食之不驕或作慅山海經圖讚曰微哉魮魚食則不驕物有所感其用無摽𩹴父魚山海經曰陽山流水出焉其中有𩹴音瑫父之魚其狀如鮒魚首如彘食之已歐山海經圖讚曰𩹴父魚首厥體如豚師魚山海經曰饒山歷號之水出焉中有師魚食之殺人文魚山海經曰景山睢音蛆水出焉中多丹粟文魚有班彩也鯩魚山海經曰半石之山來需音須之水出焉其中多鯩魚音綸黑文狀如鮒食者不腫鰧魚山海經曰半石之山合水出其陰是多鰧音騰魚其狀如鱖居逵逵水中之穴相交通蒼文赤尾食者不雍可以已瘻, SBCK: ''}
