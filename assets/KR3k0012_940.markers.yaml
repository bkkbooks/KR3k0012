  - {type: variant, offset: 448, length: 3, content: 六足目, WYG: 細文多膏肥美形如大蘆管本出地中隨泉浮出俗名蘆䱐沈懐逺南越志曰蘆䱐魚生山曲水間穴地為泉泉踊則此魚出今廬陵以南至于南州}
