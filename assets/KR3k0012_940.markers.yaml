  - {type: variant, offset: 452, length: 1, content: 珠, WYG: 焉俗以為醬鼉風魚異物志曰冬天此魚數千萬頭共處大窟中藏上有白氣或在鼉穴中皮黑如漆能潛知數里中空木所在因風而入空木化為蝙蝠}
