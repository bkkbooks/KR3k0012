  - {type: variant, offset: 496, length: 344, content: 名曰珠鼈六足有珠灃水在蒼梧九疑之西赤𩹓魚山海經曰青丘之山英水出焉中多赤𩹓音需其狀如魚而人面其音如鴛鴦食之疥經圖讚曰赤𩹓之狀魚身人頭何羅魚山海經曰譙明之山譙水出焉其中多何羅之魚一首十身其音如吠犬食之已癰鰼鰼魚山海經曰涿光之山囂水出焉而西流其中多鰼鰼之魚音鰼其狀如鵲而十翼鱗皆在羽端其音如鵲可以御火又經圖讚曰鼓翮一運十翼翩翻厥鳴如鵲鱗在羽端雒書曰鰼鰼魚狀如鵲食之不瘴出涿光山䲃魚山海經曰獄法之山瀤澤之水出焉音懷其中多䲃魚音藻狀如鯉鷄足食之已疣又經圖讚曰䲃之為狀半鳥半鱗鮨魚山海經曰北獄之山諸懷之水出焉其中多鮨魚音詣魚身犬首音如嬰兒食之已狂鱅鱅魚山海經曰樕蛛之山速株食水出焉中多鱅鱅之魚音容狀如犁牛其音如彘山海經圖讚曰魚號鱅鱅如牛虎駮葴魚山海經曰狗狀之山𣲵音枳水出焉中多葴魚狀如儵喙如葴食者無疫, SBCK: 沈懐逺}
