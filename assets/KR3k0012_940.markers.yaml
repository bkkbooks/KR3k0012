  - {type: variant, offset: 176, length: 0, content: '', SBCK: 無鱗形似䱜形音錯額上四方如印有文章諸大魚應死者印魚先封之郭延之述征記曰城陽縣􅀯六里堯母慶都墓廟前一池魚額間有印文名頰魚非告祠者捕不可得左思吴都賦曰印􅀛鱕音藩䱜黄魚吴書曰薛綜上䟽交州刺史朱符多以郷人分作長史強賦民黄魚一枚稻一斛劉欣期交州記曰武寜縣秋九月黄魚上化作鶉鳥南方草物􅃺曰短細黃魚九月中因秋風而變成鶉上􅇛吏捕取炙食滋味肥羙南中八郡志曰江岀黄魚魚形頗似鱣骨如葱可食郭義恭廣志曰揵爲郡􅈎道縣出臑骨黃魚􅀉魚沈懐逺􅀯越志曰􅀉魚長三寸似白魚常附海舩以濟洪波一曰􅀉載魚臨海水􅁟記曰􅀉度魚長三寸似白魚君魚沈懷逺南越志曰君魚長三寸背上骨如筆管大者似矛逢諸細魚及黿腹皆斷之琵琶魚臨海異物志曰琵琶魚無鱗形如琵琶沈懷逺南越志曰琵琶魚無鱗}
