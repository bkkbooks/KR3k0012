  - {type: variant, offset: 1570, length: 1, content: 鰧, SBCK: 魚俗謂之猶魚鷄子魚嶺表録異曰鷄子魚口有觜如鷂􅁏翅無鱗尾尖而長有風濤即乗風飛於海上舩稍􅀋鮐鯣魚竹魚嶺表録異曰竹魚産江溪間形如鱧魚大而少骨青黒色鱗下間以朱􅀧鬛可翫或烹以爲羮臛而羙乳穴魚嶺表録異曰全義嶺之西南有盤龍山山有乳洞斜貫一溪號爲靈水溪今桂州靈川縣也溪内有魚皆脩尾四足丹其腹游泳自􅀂漁人不敢捕之爾雅云鯢似鮉四足聲如小兒今啇州山溪内亦有此魚謂之納魚􅸓魚臨海水􅁟記曰􅸓}
  - {type: page-break, offset: 1570, content: '', id: KR3k0012_SBCK_940-9b}
  - {type: variant, offset: 1570, length: 1, content: 鰧, WYG: 􅀈魚俗謂之猶魚鷄子魚嶺表録異曰鷄子魚口有嘴如鷄肉趐無鱗尾尖而長有風濤即乗風飛於海上稍類鮐鯣魚竹魚嶺表録異曰竹魚出溪間形如鱧魚大而少骨青黑色鱗下間以朱㸃鬛可翫或烹以為羮臛肥而美乳穴魚嶺表録異曰全義嶺之西南有盤龍山山有乳洞又有一溪號為靈水溪今桂州靈川縣也溪内有魚皆脩尾四足丹其腹游泳自若漁人不敢捕之爾雅云鯢似駘四足聲如小兒今商州山溪内皆有此魚謂之魶魚􅸓魚臨海水土記曰􅸓}
