  - {type: variant, offset: 842, length: 224, content: 記長針魚口四寸縳魚山海經曰鷄山暴水出焉其中有縳魚音團狀如鮒彘毛其音如豚見則天大旱又圖縳魚并顒鳥讚曰顒鳥栖林魚處川俱為旱徵災延普天測之無象厥數惟玄呂氏春秋曰魚之美者洞庭之縳鯥魚山海經曰柩音帶山多水有魚出焉狀如牛陵居虵尾有翼在魼祛榻二音下其音如留牛其名曰鯥音六冬死夏生蟄類也食之無腫疾山海經圖讚曰魚號曰鯥處不在水厥狀如牛鳥翼虵尾𩶐魚山海經曰英山愚水出焉北流注于招音詔水其中多𩶐魚狀如鼈其音如羊𩹂魚山海經曰樂遊之山桃水出焉其中多𩹂魚其狀如虵而四足漢書地理, SBCK: ''}
