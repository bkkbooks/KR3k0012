  - {type: variant, offset: 623, length: 0, content: '', SBCK: 數失皇子鄧后憂繼嗣不廣數選進才人以愽帝意魏志曰明帝遊後園召才人以上曲宴極樂明日帝見毛后后曰昨遊宴北園樂乎帝以左右泄之所殺十餘人魏略曰明帝青龍三年於別殿之北立八坊諸才人以上轉南附焉其秩石擬百官之數王隱晉書曰太康七年出後宫才人妓女巳下百七十人歸家又曰􅀄惠帝㓜丗祖遣才人謝􅅼給惠帝因是有娠臨娶賈妃迎􅅼西宫遂生愍懷臧榮緒晉書曰懷帝王太后諱媛􅁎􅀄入武帝拜中才人早卒懷帝即位追尊曰皇太后也晉中興書曰謝夫人名􅅼家夲貧賤又以屠羊爲業􅅼清惠貞正有淑姿選入後宫爲才人後魏書曰髙祖置女職中才人視五品沈約宋書曰晉武帝採漢魏之}
  - {type: page-break, offset: 623, content: '', id: KR3k0012_SBCK_145-7b}
  - {type: variant, offset: 623, length: 3, content: 制昭儀, WYG: 數失皇子鄧后憂繼嗣不廣數選進才人以博帝意魏志曰明帝逰北園召才人以上曲宴極樂明日帝見王后后曰昨逰宴北園樂乎帝以左右泄之殺十餘人魏略曰明帝青龍三年於别殿之北置美人六人方諸才人以上王隠晉書曰太康七年出後宫才人妓女已下百七十人歸家又曰初恵帝幼時}
