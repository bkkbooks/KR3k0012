  - {type: variant, offset: 22, length: 0, content: '', WYG: 華為九嬪比九卿假銀青晉起居注曰泰始三年使使持節兼五官中郎將宗正丞司馬恢拜崇陽采女李琰為淑儀王宣為脩容徐琰為修儀吴淑為媫妤趙琰為充華九年有司奏禮為皇后聘以糓圭無妾媵拜授之制詔曰拜授可依魏氏故事十年上臨軒使持節兼太常洛陽令司馬啓拜采女胡芳為貴嬪又使使持莭兼御史中丞太子舍人馬誕拜采女劉媛為淑妃臧曜為淑媛芳為淑儀趙粲為修華陳琇為修容咸寧三年拜美人左嬪為修儀邢國為媫妤朱華為容華又曰恵帝元康二年詔曰才人謝玖進為淑妃有司奏當與三夫人以下同拜詔宜在後也永寧元年詔拜為貴人後魏書曰髙祖改定内宫三嬪視九卿六嬪視六卿山海經曰鮒隅山顓頊葬扵其陽九嬪葬扵其隂左貴嬪集有離思賦相風賦孔雀賦松栢賦泣漚賦有納皇后頌楊皇后登祚頌􅆚藥花頌鬰金頌菊花頌神武頌四言詩四首武元皇后誄萬年公主誄世婦周禮曰世婦掌祭祀賔客䘮紀之事帥女官而灌概為齍盛及祭之日蒞陳女官之具凡内羞之物蒞臨也内羞房中之羞周禮曰世婦每宫卿二人下大夫四人中士八人女府二人女史二人奚十有六人禮記月令篇曰仲春之月后親率九嬪御祠于髙禖之前又曰季春之月后齋戒親東嚮躬桑禮記㛰義曰古者天子二十七世婦以聽天下之内治以明章婦順故天下内治而家理蔡邕月令章句曰仲春之月以太牢祀于髙禖髙禖祀名髙猶尊也吉事先見之象也葢為人所以祈子孫之祀也𤣥鳥感陽而至故於其至日因以用事簡狄以𤣥鳥至之日有事髙禖而生契焉故詩云天命𤣥鳥降而生商后率九嬪御后者天子適妻也妃命也嬪婦也御妾也周禮天子一后三妃九嬪二十七世婦八十一御妻以應外朝公卿大夫之數也世婦不見卑者文畧御妻皆行世婦可知也后妃將九嬪女御皆為禖以祈孕姙也乃禮天子所御帶以弓韣天子所御謂后妃以下至妾姙有萌芽者也韣弓}
