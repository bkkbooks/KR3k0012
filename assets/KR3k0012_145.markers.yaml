  - {type: variant, offset: 14, length: 0, content: '', SBCK: 采諸􅁑沖等女五十餘人入殿賜采女食皆憂不食帝使縵鄣楊后曰可但入鄣其中者以絳繫臂胡芳泣左右止之曰陛下聞之芳曰死不畏何畏陛下帝壯其言故遂敬之芳父奮聞女中亦哭曰老奴不死唯有二兒男在九地之下女在九天之上拜芳爲貴嬪晉書曰胡貴嬪名芳父奮㤗始九年簡良家子以充内職拜芳爲貴嬪毎有顧問不飾言詞率尓而荅進退方雅最蒙愛幸侍御服飾亞于皇后常與樗蒲傷上指帝怒曰此固將種也芳對曰北伐公孫西拒諸􅁑非將種而何芳生武安公主王隱晉書曰又採侍御史齊國左維女爲脩儀有文才晉書曰左貴嬪名芬兄思芬少好學善綴文名亞於思武帝聞而納之拜脩儀後爲貴嬪以才德見禮體羸多患常居薄室每遊華林􅂺廻輦過之語及文義辭對清華左右侍聽莫不稱美及楊皇后崩芬獻誄咸寜二年納悼后芬受詔作頌及帝女萬年公主薨帝痛悼不巳詔芬爲誄其文甚麗帝重芬辭藻毎有方物異寳必詔爲賦頌以是屢獲恩賜焉晉諸公讃曰舊}
  - {type: page-break, offset: 14, content: '', id: KR3k0012_SBCK_145-2b}
  - {type: variant, offset: 14, length: 0, content: '', WYG: 采諸葛冲等女五十餘人入殿賜采女食皆憂不食楊后使設障謂曰可俱入障其中選者以綘繫臂胡芳泣左右止之曰陛下聞之芳曰死不畏何畏陛下帝壮其言故遂敬之芳父奮聞女中亦哭曰老奴不死唯有二兒男在九地之下女在九天之上拜芳為貴嬪晉書曰胡貴嬪名芳父奮泰始九年簡良家子女充扵内拜芳為貴嬪毎有顧問不飾言詞率爾而答進退方雅最蒙愛侍御服飾亞扵皇后帝與樗蒱傷上指帝怒曰此固將種也芳對曰北征公孫西拒諸葛非將種而何芳生平安公主王隠晉書曰又採侍御史齊國左維女為修儀有文才晉書曰左貴嬪名芬兄思芬少好學善綴文名亞扵思武帝聞而納之拜修儀後為貴嬪以才德見禮體羸多患常居别室每逰華林輒回輦逰之語及文義辭對清華左右侍聽莫不稱美及楊皇后崩芬敬獻誄咸寧三年納悼后芬受詔作頌及帝女萬年公主薨帝痛悼不已詔芬為誄甚獲恩賜焉重芬辭藻每有方物異寳必詔為賦頌以是屢獲賜焉晉諸公讚曰舊}
