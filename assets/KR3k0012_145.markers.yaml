  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_145-1a.2}
  - {type: variant, offset: 4, length: 2, content: 昭儀, SBCK: 一嬪丗婦御女美人才人保林女侍中女尚書女史嬪尚書堯典曰􅁵降二女于嬀汭嬪于虞降下嬪婦也舜爲匹夫能以義理下帝女之心於所居嬀水之汭使行婦道於虞氏詩推度灾曰􅀜睢知原兾得賢妃正八嬪嬪婦也八婦正於内則可以化四方矣周禮天官内宰曰以隂禮教九嬪不言教夫人丗婦舉中言省文也又曰九嬪掌婦學之法以教九御婦德婦言婦容婦功各帥其屬而以時御叙于王所嬪婦也婦德謂貞愼也婦言謂辭令也婦容謂婉娩也婦功謂􅁝枲也自九嬪以下而御各帥其屬者使亦九九相與從王所息之燕寢也羣妃御見之法卑者冝先尊者冝後御女八十一人當九夕也婦二十七常三夕嬪九人當一夕夫人三當一夕后當一夕亦十五日而遍云自望後足之凡􅀕祀賛玉齍賛后薦徹豆籩玉齍玉敦􅁰稷器也􅀂有賔客則從后當賛后事大喪則帥叙哭者亦如之亦從后也周禮冬官匠人曰内有九室九嬪居之外有九室九卿朝焉禮記曰仲春之月􅀇鳥至之日以太牢祀於髙禖天子親徃后妃親帥九嬪御乃禮天子所御帶以弓䪅授以弓矢于髙禖之前又曰古者天子后立六宫三夫人九嬪二十七丗婦八十一御妻國語曰齊襄公卑聖侮士而唯女是崇九妃六嬪陳妾數百}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_145-1b}
  - {type: variant, offset: 4, length: 2, content: 昭儀, WYG: 一嬪世婦女御美人才人保林女侍中女尚書女史嬪尚書堯典曰釐降二女于媯汭嬪于虞詩推度災曰關雎有原冀得賢妃正八嬪周禮天官内宰曰以隂禮教九嬪又曰九嬪掌婦學之灋以教九御婦徳婦言婦容婦功各帥其屬而以時御叙于王所婦嬪也婦徳謂貞順也婦言謂詞令也婦容謂婉娩也婦功謂絲枲也自九嬪以下而御各帥其屬者使亦九九相與從王于所息之燕寢也羣妃御見之法卑者宜先尊者宜後女御八十一人當九夕世婦二十七人當三夕九嬪九人當一夕夫人三人當一夕后當一夕十五日而徧自望後反之凡祭祀贊玉齍贊后薦徹豆籩玉齍玉敦黍稷器也若有賓客則從后當贊后行事大䘮帥叙哭者亦如之亦從后也周禮冬官匠人曰内有九室九嬪居之外有九室九卿朝焉禮記曰仲春之月𤣥鳥至以太牢祀于髙禖天子親往后妃帥九嬪御乃禮天子所御帶以弧䪅授以弓矢于髙禖之前又曰古者天子后立六宫三夫人九嬪二十七世婦八十一御妾國語曰齊㐮公卑聖侮士而唯女是崇九妃六嬪陳妾數百}
