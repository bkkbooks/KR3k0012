  - {type: variant, offset: 23, length: 0, content: '', WYG: 也祀以髙禖之命飲之醴酒帶以弓韣尚使得男也授以弓矢扵髙禖之前弓矢者男子之事也又曰季春之月后妃齋戒親東嚮躬桑齋戒者事扵先蠶也東嚮盛德在木也躬桑手三繰猶天子親耕三推也古者天子諸侯必有公桑蠶室近川而為之築宫仭有三尺棘墻而外閉之卜夫人世婦之吉者使之蠶室奉種浴于川公桑食之蠶事既升升成也分繭稱絲效功絲以斤兩故曰稱知其多少旌其成功也事在孟夏於是終言之也以供郊廟之服天子諸侯所服以致祭者必后夫人所親蠶也禮世婦卒蠶獻繭於夫人夫人親受之繅三盆手朱綠之𤣥黄之以為黼黻文章君服之以祀先王先公敬之至也故曰無敢怠承又曰孟夏之月蠶事既畢后妃獻繭扵天子進其成功也乃收蠶税以桑為均十而取一曰税乃收世婦以下所蠶之税也以桑為均者用桑多則繭多少則繭少也貴賤長少如一貴謂世婦賤謂妾御長謂力壯者也年無尊卑老壯各自以桑為均不得髙下為差也史記曰中宫天極星後勾陳四星末大星正妃餘三星後宫之属也漢書曰軒轅前大星女主象旁小星御者後宫属也范曄後漢書曰世婦主知䘮祭賓客後魏書曰髙祖改定内宫世婦視中大夫又曰宣武靈皇帝胡氏初召入掖庭為承華世婦生肅宗明皇后宋書宋武帝建德中詔曰正位扵中有聖通典質文相革損益不同五帝則四星之象三王立六宫之數劉曹已降等級彌繁選擇遍扵生民命秩方扵庻職椒房丹地有衆如雲本由嗜欲之情非闗風化之義朕運當澆季思復古始無容廣集子女屯聚宫掖𢎞贊後庭事從約簡可置妃二人世婦三人御妾三人自兹以來宜悉减省女御周禮天官冡宰曰女御昏義所謂御妻御猶進也侍也范蔚宗後漢書曰八十一御妻序扵王之燕寢頒官分務各有典司後漢書曰髙祖定内宫御女視元士淮南子曰孟春之月東宫女御青色衣青綵鼓琴孟夏之月南宫女御赤色衣赤綵吹笙竽孟秋之月西宫女御白色衣白綵撞白鐘孟冬之月北宫女御黑色衣黑綵擊磬石美人漢書曰漢興因秦之稱號正適稱皇后妾皆稱夫人及有美人之號焉至武帝}
