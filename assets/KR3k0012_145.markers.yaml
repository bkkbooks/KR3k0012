  - {type: variant, offset: 23, length: 0, content: '', SBCK: 也祝以髙禖之命飲以醴酒帶以弓韣尚使得男也授以弓矢于髙禖之前弓矢者男子之事也孕姙者於髙禖登位之前也又曰季春之月后妃齋戒親東嚮躬桑齊戒者事於先􅁞也東嚮盛德也躬桑者手三繰猶天子親耕三推也古者天子諸侯必有公桑􅁞室近川而爲之築宫仞有三尺􅁄牆而外閉之卜夫人丗婦之􅁻者使入􅁞室奉種浴于川公桑以食之􅁞事旣􅂛外成也分蠒稱􅁝􅁝以斤兩故曰稱知其多少所以旌其成功也在孟夏於此終言之也以供郊廟之服天子諸侯所服以􅀕者必后夫人所親􅁞也禮丗婦卒􅁞獻蠒于夫人受之親繰三盆手朱緑之􅀇黃之以爲黼黻文章君服之以祀先王先公敬之至也故曰無或敢怠又曰孟夏之月􅁞事旣畢后妃獻蠒於天子進其成功也乃脩蠒稅以桑爲均十而取一曰稅乃收丗婦以下所􅁞之稅也以桑爲平者用桑多則蠒多少則蠒少也貴賤長少如一貴謂丗婦賤謂妾御長謂力壯者也言無尊卑老壯各自以桑爲平不得以髙下爲差也史記曰中宫天極星後勾四星末星正妃餘三星後宫之屬也漢書曰軒轅前大星女主象旁小星御者後宫屬也范曄後漢書曰丗婦主知喪􅀕賔客後魏書曰髙祖改定內官丗婦視中大夫又曰宣武靈皇后胡氏􅀄召入掖庭爲承華丗婦生肅宗明皇帝後周書武帝建德中詔曰正位於中有聖通典質文相華損益不同五帝則四星之象三王立六宫之數劉曹巳降等級彌繁選擇遍於生民命秩方於庶職椒房丹地有衆如雲夲由嗜欲之情非關風化之義朕運當澆季思復古始無容廣集子女屯聚宫掖􅀪賛後庭事從約簡可置妃二人丗婦三人御妻三人自兹以外冝悉减省御女周禮天官家宰曰女御婚義所謂御妻御猶進也侍也范曄漢書曰八十一御女序于王之燕寢頒官分務各有典司後漢書曰髙祖改定內官御女視元士淮南子曰孟春之月東宫御女青色衣青綵皷琴孟夏之月南宫御女赤色衣赤綵吹笙竽孟秋之月西宫御女白色衣白彩撞白鍾孟冬之月北宫御女黒色衣黒彩擊磬石美人漢書曰漢興因􅁗之稱號正􅃴稱皇后妾皆稱夫人及有美人之號焉至武帝}
