  - {type: variant, offset: 3422, length: 225, content: 古圖書賢聖之君皆有名臣在側三代末主迺有嬖女今欲同輦得無近似之乎上善其言而止太后聞之喜曰古有樊姬今有班姬世說曰漢成帝幸趙飛鷰讒班婕妤呪詛帝乃考問婕妤對曰妾聞死生有命富貴在天修善尚不蒙福為邪欲以何望若鬼神有知不受邪佞之訴如其無知訴之何益故不為也漢書曰成帝隆於內寵班婕妤進侍者李平得幸立為婕妤上曰始衛皇后亦從微起乃賜平姓曰衛所謂衛婕妤又曰中山衛姬平帝母也父子豪中山盧奴人官至衛尉子豪女弟為宣帝婕妤生楚孝王長女又為元帝婕妤生平陽公主成帝時中山孝王無子以衛氏吉, SBCK: 灾}
