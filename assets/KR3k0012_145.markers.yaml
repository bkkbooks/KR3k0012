  - {type: variant, offset: 47, length: 7, content: 上卿比列侯漢書, SBCK: 二千石又曰萬石君奮其父趙人也姓石氏趙亡徙居温過河内時奮年十五爲小吏侍髙祖髙祖與語愛其恭敬問曰􅀂何有對曰有姊能皷琴髙祖曰􅀂能從我乎曰願盡力於是髙祖詔其姊爲美人徙其家長安中戚里以姊爲美人故也又}
