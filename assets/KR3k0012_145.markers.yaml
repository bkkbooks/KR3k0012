  - {type: variant, offset: 2149, length: 401, content: 奏今月九日當拜鄭夫人后婕妤桉儀注應服雀釵袿襈列仙傳曰鉤弋夫人右手拳姿色甚偉帝披其手得一鉤而手尋伸生昭帝既而帝害之殯尸不臭而香數月昭帝既即位更葬之棺空但有系履故名其宮曰鉤翼後避諱改為弋廟有神祠焉西京雜記曰高帝戚夫人善鼓瑟擊筑帝擁夫人倚瑟而絃歌畢泣下流連夫人善為翹袖折腰之舞歌出塞望歸之曲侍婢數百人皆為之後宮齊唱常入雲霄又曰戚夫人以百煉金為彄環照見指骨上惡之以賜侍兒鳴王曜光等各四枚又曰戚夫人侍兒賈佩蘭後出為扶風人叚儒妻說在內時戚夫人侍高祖常以趙王如意為言高祖思之或半日不言歎息悽愴而未知其術輒倚夫人夫人擊筑高祖自歌大風詩以和之又曰武帝以象牙為簟賜李夫人又曰武帝遇李夫人就取玉簪搔頭自此宮人搔頭皆用玉貴人東觀漢記曰光烈陰皇后上即位立為貴人上以后性賢仁宜母天下欲授以尊位后輒退讓自陳不足以當大位又曰章帝宋貴人時竇皇后內寵方盛以貴人名族節操高妙心內害之欲為萬世長計陰設方略讒毀貴人由是母子見踈數月誣奏貴人使婢為, SBCK: 過身戒夕}
