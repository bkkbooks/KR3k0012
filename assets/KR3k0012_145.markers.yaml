  - {type: variant, offset: 3680, length: 339, content: 等晉服制令曰婕妤銀印青綬佩朱瓄玉婦人集曰漢元帝賜婕妤書曰問飛鷰趙婕妤夫上有誠必應以實憤懣充中必形於色詩云鼓鍾于宮聲聞于外猶此言之真偽之效難以欺矣夫君子貴素文足通殷勤而已亦何必華辭哉自以親婕妤異於他人故不能無言亦不以深相過望前數以顏色不平應對舒遲為譴卒不能自改婕妤方見親幸之時老母在堂兩弟皆簪金貂並侍於側同列比舍豈不謂婕妤妹弟尊幸哉今過蒙譴獨謂老親兩弟何班婕妤報諸姪曰記言屬見元帝所賜趙婕妤書以相比元帝被病無悰但鍜鍊後宮貴人書也類多華辭至如成帝則推誠寫實若家人夫婦相與書矣何可比也故略陳其長短今汝曹自評之後魏書曰御史中尉李彪有女幼而聰令彪每奇之教書學讀誦經傳曾謂所親曰此女當興我家卿曹各得其力彪亡後世宗聞名納為婕妤在宮常教帝妹書誦授經史世宗崩婕妤為比丘尼通習經義法座講說諸僧歎重之, SBCK: ''}
