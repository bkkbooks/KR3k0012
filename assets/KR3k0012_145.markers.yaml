  - {type: variant, offset: 22, length: 0, content: '', krp: 華爲九嬪比九卿假銀青晉起居注曰㤗始三年使使持節兼五官中郎將宗正丞司馬恢拜崇陽園妾李琰爲脩華王宣爲脩容徐琰爲脩儀吴淑爲婕妤趙􅓨爲充華九年有司奏禮唯皇后聘以榖圭無妾媵設玉之制詔曰拜授可依魏氏故事十年上臨軒使持節兼太常洛陽令司馬啓拜采女胡芳爲貴嬪又使使持節兼御史中丞太子舎人司馬誕拜采女劉媛爲淑妃臧曜爲淑媛芳爲淑儀趙粲爲脩華陳琇爲脩容咸寜三年拜美人左嬪爲脩儀刑蘭爲婕妤朱姜爲容華又曰惠帝元康二年詔曰才人謝玫進爲淑妃有司奏當與三夫人以下同拜詔冝在後也永寕元年詔曰峻陽園淑妃公孫明識貞粹今進位爲貴人後魏書曰髙祖改定内官三嬪視三卿六嬪視六卿山海經曰鮒隅山顓頊塟于其陽九嬪塟其隂左貴嬪集有離思賦相風賦孔雀賦松栢賦泣漚頌賦納皇后頌楊皇后登祚讃芍藥花頌鬱金頌菊華頌神武頌四言詩四首武元皇后誄萬年公主誄丗婦周禮曰丗婦掌祭祀賔客喪紀之事帥女宫而濯槪爲齍盛及祭之日涖陳女宫之具凡内羞之物涖臨也內羞房中之羞周禮天官冢宰曰丗婦不言數者君子不茍於色有婦德者乃充之死則有闕周禮春官曰丗婦每宫二人女史二人丗婦居宫王者六宫女史有才智也禮記月令仲春之月后親帥九嬪御御謂從徃祀也禮天子有丗婦女御獨出帥九嬪者舉中言祠于髙禖之前太祝酌飲髙禖之庭又曰季春之月后齋戒親東嚮躬桑后妃親採桑示師先天下也東嚮者向時氣也是時明其不常留養𧖟者所卜夫人與丗婦及諸臣之妻也禮記婚義曰古者天子二十七丗婦以聽天下之内治以明章婦順故天下內和而家理蔡邕月令章句曰仲春之月以太牢祀于髙禖髙謀祀名髙猶尊也吉事先見之象盖謂之人見所以祈子孫之祀也玄鳥感陽而至故重至日因以用之簡娀以玄鳥至之日有事髙禖而生契焉故詩云天命玄鳥降而生商后妃率九嬪御后者天子適妻也妃命也嬪婦也御妾也周禮天子一后三妃九嬪二十七丗婦八十一御妾以應外朝公卿大夫之數也丗婦不見卑者文略御妾皆行丗婦可知也后妃將九嬪女御皆㑹禖以祈孕姙也乃醴天子所御帶以弓韣天子所御謂后妃以下至妾任有萌牙者也韣弓}
