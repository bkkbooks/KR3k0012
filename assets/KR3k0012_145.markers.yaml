  - {type: variant, offset: 2445, length: 516, content: 用玉貴人東觀漢記曰光烈陰皇后上即位立為貴人上以后性賢仁宜母天下欲授以尊位后輒退讓自陳不足以當大位又曰章帝宋貴人時竇皇后內寵方盛以貴人名族節操高妙心內害之欲為萬世長計陰設方略讒毀貴人由是母子見踈數月誣奏貴人使婢為蠱道祝詛七年遂被譖暴卒又曰孝和陰皇后聰慧敏達有才能善史書永元二年選入掖庭為貴人託以先后近屬故有寵後漢書曰順烈梁后永建三年與妬俱入掖庭時年十三太史卜兆得封房又筮得坤之比遂以為貴人常時被引御從容辭曰願陛下思雲雨之均澤識貫魚之次序使小妾得免罪謗之累由是帝加敬焉又曰桓思竇后延熹八年選入掖庭為貴人其冬立為皇后而御見甚稀帝所寵唯采女田聖等永康元年冬帝寢疾遂以聖等九女皆為貴人東觀漢記曰申貴人生孝穆皇帝趙夫人為穆皇后匽夫人生桓帝帝既立追謚趙夫人為穆皇后匽夫人為愽園貴人和平元年桓帝詔曰愽園匽貴人履高明之懿德咨淑美之嘉會與天合靈篤生朕躬欲報之德詩所感歎今以貴人為孝崇皇后又曰孝桓帝鄧后字猛父香早死猛母宣改嫁為掖庭民梁紀妻紀者襄城君孫壽之男也壽引進令入掖庭得寵為貴人故冒姓為梁氏續漢書曰光武郭皇后聖通世祖至真定納聖通有寵世祖即位以為貴人魏志曰文帝納甄后於鄴有寵生明帝郭后李貴人並愛幸后愈失意有怨言王隱晉書曰武帝臨軒拜諸葛婉為夫人李曄為貴人, WYG: 苐四}
