  - {type: variant, offset: 3066, length: 355, content: 后得幸於齋庫中遂有娠守庫者亦私書壁記之後驗問皆相符同生顯祖拜貴人沈約宋書曰貴嬪文帝所制貴人漢光武制泰始二年又省貴人置貴姬婕妤漢書曰婕妤視上卿比列侯又曰孝宣皇帝之為曾孫也暴室嗇夫許廣漢有女平君年十四五配曾孫數月曾孫立為帝平君為婕妤是時霍將軍有小女與皇太后公卿議更立皇后皆心議霍將軍女亦未有言上乃詔求微時故劍大臣知旨白立許婕妤為皇后又曰孝宣王皇后父奉光少時鬭雞宣帝在民間數與奉光會相識奉光有女年十餘歲每當適人所當適者輒死故久不行及宣帝即位召入後宮為婕妤是時館陶公主母婕妤及淮陽憲王母張婕妤楚孝王母衛婕妤皆愛幸皇后廢後上憐許太子早失母幾為霍氏所害於是乃選後宮素謹慎而無子者遂立王婕妤為皇后令母養太子又曰孝成班婕妤成帝初即位選入後宮始為少使俄而大幸為婕妤居增城合歡宮再就館有男數月失之成帝遊於後庭嘗欲婕妤同輦載婕妤辭曰, WYG: 仰}
