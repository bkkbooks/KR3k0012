  - {type: variant, offset: 1201, length: 430, content: 漢興因秦之稱號妾皆稱夫人有美人良人八子七子長使之號焉又曰漢王得定陶戚姬愛幸生趙隱王如意高祖崩惠帝立呂后為皇太后乃令永巷囚戚夫人髡鉗衣赭衣令舂戚夫人舂歌曰子為王母為虜終日舂薄暮常與死為伍相離三千里當誰使告汝太后遂斷戚夫人手足去眼熏耳飲以瘖藥使居鞠域中名曰人彘又曰高帝薄姬文帝母也少時與管夫人趙子兒相愛約曰先貴無相忘也而管先幸漢王四年坐河南成皋靈臺此兩美人相與笑問其故兩人俱以實告王心悽然憐薄姬是日召而幸之又曰孝武李夫人本以倡進初夫人兄延年性知音善歌舞武帝愛之每為新聲變曲聞者莫不感動延年侍上起舞歌曰北方有隹人絕世而獨立一顧傾人城再顧傾人國寧不知傾城與傾國隹人不可得上嘆息曰善世豈有此人乎平陽主因言延年有女弟上乃召見之實妙麗善舞由是幸生一男是為昌邑哀王李天人少而蚤卒上憐閔焉圖畫其形甘泉宮齊人少翁能致其神迺夜張燈燭帷帳陳酒肉而令上居他帳望見好女如李夫人之貌不得就視上愈益感為作詩曰是耶非耶立而望之偏何姍姍其來何遲令樂府諸音家絃歌之上自為作賦以傷悼夫人又曰孝武鉤弋趙, SBCK: 班}
  - {type: variant, offset: 1201, length: 27, content: 漢興因秦之稱號妾皆稱夫人有美人良人八子七子長使之號焉又, WYG: 班媫妤自傷賦}
