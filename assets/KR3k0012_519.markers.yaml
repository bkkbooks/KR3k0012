  - {type: variant, offset: 2570, length: 439, content: 又曰石崇字季倫渤海南皮人苞之少子也生於青州故小名齊奴少敏惠勇而有謀父苞臨終分財與諸子獨不及倫其母為言之苞曰此兒雖小後自能致又曰郄超字景興一字嘉賓父愔為司徒愔事道超奉佛愔又好藂積錢數千萬嘗開庫任超所取超性好施一日之中散與親故都盡桓溫辟為征西大將軍掾溫懷不軌超為之謀轉司徒左長史而卒初雖黨桓氏以愔忠於王室不軌之事不令愔知將亡出一箱書付門生曰本欲焚之恐公年老老必傷愍為獘我亡後若大損寢食可呈此箱不爾即便焚之愔後果哀悼成病門生依旨呈之則悉與溫往反密計悉見愔於是大怒曰小子死恨晚矣更不復哭又曰庾冰字季堅都督江荊七郡軍事子襲常貸官絹一疋冰怒棰之市絹十疋還官又曰王濛字仲祖父汭字文開為淦令美容姿嘗覽鏡自照稱其父字曰王文開生如此兒又曰王導字茂弘子悅字長豫弱冠有高名事親色養導甚愛之常與悅弈碁爭道導笑曰想與有瓜葛那得爾耶導性儉悵下甘果爛敗令棄之云勿使大郎知悅為中書郎先導卒導先夢人以百萬錢買悅潛為祈禱者備矣尋掘地得錢百萬意甚惡之一一皆藏閉及悅疾篤導憂念時至不食積日忽見一人形狀甚偉被甲持刀導問是何, WYG: 乃戯媒}
