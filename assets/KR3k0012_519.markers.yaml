  - {type: variant, offset: 2133, length: 1, content: 鯤, krp: 爲杜曽所圍力弱食盡欲投於故吏平南將軍石覽計無所出灌時年十三乃率勇士數十人踰城突圍夜出賊追甚急灌督厲將士且戰且前後得入曽陽山獲免得向覧乞師又爲崧書與南中郎將周訪仍結弟兄訪即遣子撫率三千人㑹石覽俱救崧賊聞兵至散走灌}
  - {type: variant, offset: 2135, length: 216, content: 子也八歲神晤夙成鯤嘗攜之或曰此兒一座顏回也尚應聲曰座無尼父誰識顏回一席之賓莫不驚異又曰王述字懷祖遷尚書僕射述每受職不為虛讓其子坦之諫曰故事應讓述曰汝為我不堪也坦之曰非也克讓自美耳述曰既云堪何為復讓也坦之為柏溫府長史溫子欲求婚于王因坦之言其父坦之乃還家省父而述愛坦之雖長大猶抱之於膝上坦之乃言婚事於述大怒遽推坦之於膝下曰汝竟癡也詎可視面以妻兵乃止又曰阮籍謂王渾曰濬仲清賞非卿倫也共卿言不如共阿戎談及戎子邁有美名少而肥大戎曰令食糠轉益肥, SBCK: 力}
