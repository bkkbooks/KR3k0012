  - {type: variant, offset: 2425, length: 185, content: 勝簡曰孩抱中物何至於此衍曰聖人忘情下人不及情情之所鍾正在吾輩也簡服其言更為之慟又曰魏舒字陽元為司徒子混字延廣有才行為太子舍人年二十七卒朝野咸為舒惜舒每哀慟退而歎曰吾不及莊生遠矣豈以無益自損更不復哭又曰胡母輔之字彥國嗜酒子謙之字子光才學不及父而傲縱過之至酣醉時嘗自呼其父字輔之不以介意世以為狂又曰石崇字季倫渤海南皮人苞之少子也生於青州故小名齊奴少敏惠勇而有謀父苞臨終分財與, SBCK: 東廂徧觀}
