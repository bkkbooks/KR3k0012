  - {type: variant, offset: 1123, length: 1, content: 勰, WYG: 男入九地之下女登九天之上嘗謂后父楊駿曰卿恃女更豪耶見前代與帝家婚未有不滅門者見君舉措益速禍耳駿曰卿女不在天子家乎奮曰我女為卿女妾耳又曰羊耽妻辛氏}
