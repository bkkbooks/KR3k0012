  - {type: variant, offset: 2676, length: 520, content: 中散與親故都盡桓溫辟為征西大將軍掾溫懷不軌超為之謀轉司徒左長史而卒初雖黨桓氏以愔忠於王室不軌之事不令愔知將亡出一箱書付門生曰本欲焚之恐公年老老必傷愍為獘我亡後若大損寢食可呈此箱不爾即便焚之愔後果哀悼成病門生依旨呈之則悉與溫往反密計悉見愔於是大怒曰小子死恨晚矣更不復哭又曰庾冰字季堅都督江荊七郡軍事子襲常貸官絹一疋冰怒棰之市絹十疋還官又曰王濛字仲祖父汭字文開為淦令美容姿嘗覽鏡自照稱其父字曰王文開生如此兒又曰王導字茂弘子悅字長豫弱冠有高名事親色養導甚愛之常與悅弈碁爭道導笑曰想與有瓜葛那得爾耶導性儉悵下甘果爛敗令棄之云勿使大郎知悅為中書郎先導卒導先夢人以百萬錢買悅潛為祈禱者備矣尋掘地得錢百萬意甚惡之一一皆藏閉及悅疾篤導憂念時至不食積日忽見一人形狀甚偉被甲持刀導問是何人曰僕蔣侯也公兒不佳欲為請命故來耳導因求之食至數斗食畢謂導曰中書命盡非可救也言訖不見悅亦殞絕又曰劉殷字長盛新興人有子七人五人各授一經其一子授太史公記一子授漢書一門之內七業俱興北州之學殷最為盛門又曰索靖子琳字巨秀少有逸群之才靖每曰琳宗廟之器非簡札之用州縣之任不足污吾兒也又曰戴若思廣陵人父昌會稽太守若思往武陵時郡人潘京素有理筌識鑒父遣若思與語潘稱若思有公輔之才又曰王獻之字子敬, SBCK: 乃}
