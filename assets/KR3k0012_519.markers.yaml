  - {type: variant, offset: 2395, length: 1, content: 仁, WYG: 楊豐為虎所噬女香年十四手無寸刃直搤虎頭父遂得免子壻爾雅曰女之夫為壻壻之父為姻兩壻相謂為婭儀禮曰婿女子之夫傳曰何以服緦報之}
