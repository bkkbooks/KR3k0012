  - {type: variant, offset: 42, length: 219, content: 父為長子服三年何也正禮乎上又所重也禮記內則曰由命士以上父子皆異宮又祭義曰身也者父母之遺體也行父母之遺體敢不敬乎左傳隱公曰衛莊公之子州吁有寵而好兵公弗禁石碏諫曰臣聞愛子教之以義方不納於邪又宣上曰楚司馬子良生子越椒子文曰必殺之是子也熊虎之狀而豺狼之聲不殺必滅若敖氏矣論語曰陳亢問於伯魚曰子亦有異聞乎對曰未也嘗獨立鯉趍而過庭曰學詩乎對曰未也曰不學詩無以言他日又獨立鯉趍而過庭曰學禮乎對曰未也不學禮無以立鯉退而學禮陳亢退而喜曰問一得三聞詩聞禮又聞, WYG: ''}
