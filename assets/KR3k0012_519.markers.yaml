  - {type: variant, offset: 1114, length: 0, content: '', SBCK: 舜問乎丞曰道可得而有夫道性命非汝有也是天地之委順也子孫非汝有也是天地之委蛻也陳留志曰范喬字伯孫年二歲祖父馨臨終執其手曰恨不見汝成人因以所用硯留與之後家人告喬喬執其硯涕泣孝子傳曰原榖者不知何許人祖年老父母厭患之意欲棄之榖年十五涕泣苦諌父母不從乃作輿舁棄之榖乃隨収輿歸父謂之曰爾焉用此㐫具榖云後父老不能更作得是以取之耳父感悟愧懼乃載祖歸侍飬尅巳自責更成純孝榖爲純孫又曰吴郡陸仲元者晋太尉玩曽孫自玩至仲四丗爲侍郎時人方之全張二族幽明録曰許遜少􅀌不識祖墓傾心所感忽見祖語曰我死三十餘年於今得正葬是汝孝悌之至因舉標牓曰可以此下求我於是迎䘮葬者曰此墓中當出一侯及小縣長女禮記内則曰女子出門必擁蔽其面夜行以燭無燭則止又曰女子十年不出􅁪居内也姆教婉娩聽從婉謂言語也言語婉之言媚也媚謂容㒵也執麻枲治􅁝繭織紝組紃學女事以共衣服觀於􅀕祀納酒漿籩豆􅉁醢醴相助奠當乃女時而知十有五年而笄二十而嫁凡女拜上右手右隂也左傳襄五曰􅀄宋芮司徒生女子赤而毛棄諸堤下恭􅁎之妾取以入長而美名之曰棄榖梁傳曰禮送女父不下堂母不出門父誡之曰謹慎從汝舅之言母誡之曰謹愼從汝姑之言諸母鞶紳誡之曰謹愼從汝父母之言無違宫事史記曰齊太倉令淳于公有罪當刑詔徙繫長安獄公無男有女五人將行罵曰生子不生男緩急非有益小女緹縈隨父至長安上書曰妾父爲吏齊中皆稱其廉平今坐法當刑妾願入官没爲婢贖父之罪書奏天子悲憐其意遂爲除肉刑漢書曰王章爲京兆尹爲大將軍王鳯所䧟下廷尉獄妻子皆收章小女年十二夜起號􅂘曰每旦獄上呼囚常至九今八而止我家君素剛烈先死者必我君也及明問之果章死矣東觀漢記曰孝女郁字叔異五歳母不能食郁亦不肯食故字曰異也後漢書曰孔融􅀍誅女年七歳㓜弱遂得全􅀉住佗舎王人有遺肉汁男飲之女曰今日之禍豈得乆活何賴肉味乎或有言於曹操収之將殺女謂兄曰􅀂死而有知得見父母豈非志願乃延頸就刑􅀳書曰}
