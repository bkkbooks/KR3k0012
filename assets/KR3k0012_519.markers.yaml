  - {type: variant, offset: 1373, length: 978, content: 事父也小杖受大杖走此恐陷父於不義非不孝也烈慚而讓官魏志曰張廣字嗣宗魯第二子也魯雅為魏武所寵諸子未勝纓並遣中使拜授官爵南鄭城碑曰位尊上將體極人臣五子十室榮並爵均童年嬰稚抱拜王人命婚帝族或尚或嬪又曰胡威字伯庸父質操厲清白為荊州太守威至荊州省之十餘日歸質賜絹一疋威跪問曰大人清高何得此物質曰俸祿之餘耳武帝問威曰卿清何如父清威曰臣不如父遠矣帝曰何對曰父清畏人知臣清畏人不知是以不如也又曰賈充字公閭父逵晚生充言充後當有充閭之度故名充字公閭又曰羊祜字叔子年數歲令乳母取所棄金環乳母曰汝先無此物祜即指鄰人李氏東垣桑樹中探得之主人驚曰此吾亡兒所失物色時人謂祜前身為李氏之子又曰華嶠字叔駿才學深博為祕書監性嗜酒率常沉醉撰漢記九十七卷其十典未成而終祕書監何邵奏嶠子徹為佐著作續成之亦未竟而卒又曰王隱字處叔陳人世寒素父銓歷陽令有著述志每私錄晉事及功臣行狀未就而卒隱儒素自守不交權貴博學多聞受遺業為著作郎令撰晉史又曰孫盛字安國次子放字齊莊幼稱令惠年七八歲在荊州與父俱從庾亮出獵亮謂曰君亦來耶放應聲荅曰無小無大從公于邁亮白欲齊何莊放曰齊莊周亮曰不慕仲尼耶放曰仲尼生而知之者非所企及亮大奇之曰王輔嗣不過也又曰庾翼字稚恭孫盛字安國翼子愛客常候孫盛盛不在見盛子放謂之曰安國何在放曰往庾稚恭家愛客曰孫氏大盛有兒如此放曰不如諸庾之翼翼既而語人曰我固得重呼奴公字又曰袁宏為東征賦並列過江諸名德獨不載桓彝其子溫怒焉宏一時之文宗為文不欲令人顯問時並遊青山飲歸溫命宏同載因問曰君作東征賦何獨不及家君宏對曰尊公稱謂非下官敢專既未遑啟不敢顯之溫疑其不實乃曰欲謂何宏曰風鑒散朗或搜或引身雖可亡道則不殞宣城之節信而為允也溫泫然而止又不及陶侃子胡奴嘗於曲室抽刀逼問宏曰家君勳績如此云何相忘宏急荅曰精明百鍊在割能斷功以濟時職以靜亂長沙之勳為史所譖胡奴乃止又曰謝尚字祖仁豫章太守鯤之子也八歲神晤夙成鯤嘗攜之或曰此兒一座顏回也尚應聲曰座無尼父誰識顏回一席之賓莫不驚異又曰王述字懷祖遷尚書僕射述每受職不為虛讓其子坦之諫曰故事應讓述曰汝為我不堪也坦之曰非也克讓自美耳述曰既云堪何為復讓也坦之為柏溫府長史溫子欲求婚于王因坦之言其父坦之乃還家省父而述愛坦之雖長大猶抱之於膝上坦之乃言婚事於述大怒遽推坦之於膝下曰汝竟癡也詎可視面以妻兵乃止又曰阮籍謂王渾曰濬仲清賞非卿倫也共卿言不如共阿戎談及戎子邁有美名少而肥大戎曰令食糠轉益肥, WYG: 力}
