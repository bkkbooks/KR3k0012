  - {type: variant, offset: 3370, length: 342, content: 歲能屬文莊多遊山水賦詩使朏命篇覽筆便就王京文謂莊曰賢子足稱神童莊笑曰真吾家千金又曰王僧孺父延年加為常侍孺五歲父友饋延年柰者先與僧孺孺曰大人未見不敢先嘗不受之又曰柳惲字文暢父世隆善彈琴為士流第一惲每奏其聲嘗感傷憂思後因之變體寫古曲家語曰吳延陵季子聘于上國其長子死葬於嬴博之間歛以時服其坎深不至泉其高可隱孔子曰延陵季子之合於禮者也列子曰魏人有東門吳者年四十有一子喪之而不憂其相室曰公之愛子也天下無有今子死不憂何也東門吳曰吾嘗無子之時不憂今子死乃與向無子同又奚憂焉呂氏春秋曰晉平公問祈黃羊曰國無尉其誰可乃云其子年君子聞之曰祁黃羊可謂至公矣三輔要錄曰韋康字元將京兆人孔融與康父端書曰前見元將來淵才亮茂雅度弘毅偉世之器也昨日又見仲將來懿性貞實文敏志篤誠保家之主也不意雙珠出于老蚌郭子曰楊脩字德祖, WYG: ''}
