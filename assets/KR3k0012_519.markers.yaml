  - {type: variant, offset: 1084, length: 1, content: 曾, SBCK: 蔡邕見而竒之時邕顯貴車馬填門粲在門邕倒屣迎之粲年㓜皃弱短小座皆驚邕曰此王公之孫有異才吾不如也吾家所有書籍當悉與之晉書曰張慿字長宗}
