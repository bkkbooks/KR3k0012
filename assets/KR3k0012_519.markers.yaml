  - {type: variant, offset: 493, length: 180, content: 肉劾鼠掠治訊鞠鞫論報取鼠磔堂下父忽視其文辭如老吏大驚異遂使書獄焉又曰王遵字子貢涿人遷益州刺史先是王陽為益州至邛崍九折阪歎曰奉先人遺體奈何數乘此險後以疾去及遵至此阪問吏曰此非王陽所畏道耶吏曰是遵叱其馭曰驅之王陽為孝子王遵為忠臣又曰曹參代蕭何為相國日夜飲酒子窋為中大夫惠帝怪之令窋言曰無以請事何以憂天下窋洗沐歸具言參怒之乃笞二百曰趣入侍天下事非汝所當言又曰路溫舒字, SBCK: 孫􅀋}
