  - {type: 'tls:seg', offset: 2397, content: '', id: KR3k0012_CHANT_519-31a.12}
  - {type: variant, offset: 2397, length: 0, content: '', SBCK: 左傳桓公曰􅀕仲專使其壻雍糾殺之雍􅁎知之謂其母曰父與夫孰親其母曰人盡夫也父一而巳胡可比焉遂告􅀕仲曰雍氏舎其室而將享子于郊吾惑之以告􅀕仲殺雍紏尸諸周氏之汪公載以出曰謀及婦人冝其死也又文下曰趙穿􅀳君之壻也論語曰子謂公治長可妻也雖在縲紲之中非其罪也以其子妻之南容三復白圭孔子以其兄之子妻之史記曰陳餘者大梁人好儒術數遊趙冨人公乗氏以其女妻之知餘非庸人漢書曰京房字君明東郡人習易淮陽憲王舅張􅀶從京房受學以女妻房房與相親後漢書曰馬融扶風人爲人美辝貌有俊才􅀄京兆摯恂以儒術教授隠于南山}
  - {type: page-break, offset: 2397, content: '', id: KR3k0012_SBCK_519-7a}
  - {type: variant, offset: 2397, length: 0, content: '', WYG: 左傳桓公曰祭仲專鄭伯使其婿雍紏殺之雍姬知之謂其母曰父與夫孰親其母曰人盡夫也父一而已何可比焉遂告祭仲曰雍氏舎其室而将享子于郊吾惑之以告祭仲殺雍紏尸諸周氏之汪公載以出曰謀及婦人宜其死也又文公下曰趙穿晉君之婿也論語曰子謂公冶長可妻也雖在縲絏之中非其罪也以其子妻之南容三復白圭孔子以其兄之子妻之史記曰陳餘者大梁人好儒術數逰趙富人公乗氏以其女妻之知餘非庸人漢書曰京房字君明東郡人習易淮陽憲王舅張博從京房受學以女妻房房與相親後漢書曰馬融扶風人為人美辭貌有俊才初京兆摯恂以儒術教授隐于南山}
