  - {type: variant, offset: 1212, length: 133, content: 若成即載之而歸昔馬援以薏苡興謗王陽以衣囊徼名嫌疑之間先賢所慎恢奇之乃撫其首曰吳氏世不乏季子矣又曰崔烈涿郡人靈帝開鴻都門榜賣官爵烈入錢五百萬得為司徒及拜日天子臨軒百寮畢會帝欣謂親幸曰悔不至三公後聲譽日滅烈不自安問子鈞曰吾為三公於議何如鈞曰嫌大人銅臭烈舉杖擊之鈞時為虎賁, WYG: 與南}
