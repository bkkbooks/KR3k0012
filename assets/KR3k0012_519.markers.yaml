  - {type: variant, offset: 3074, length: 295, content: 經其一子授太史公記一子授漢書一門之內七業俱興北州之學殷最為盛門又曰索靖子琳字巨秀少有逸群之才靖每曰琳宗廟之器非簡札之用州縣之任不足污吾兒也又曰戴若思廣陵人父昌會稽太守若思往武陵時郡人潘京素有理筌識鑒父遣若思與語潘稱若思有公輔之才又曰王獻之字子敬羲之子也謝安甚欽之請為長史因問獻之曰君書何如家君荅曰固不同安曰外論不爾對曰人郍得知獻之嘗書羲之自後掣其筆不得歎曰此兒當有大名又以掃箒霑泥書大字方一丈甚以為工宋書曰戴顒字仲若淮南人父逵喜琴顒及兄勃並受琴於父父歿所傳之聲不忍復奏各造新弄五部顒又製長弄一部並傳於世齊書曰世祖常問王儉當今誰能作五言詩對曰謝朏得父之膏腴梁書曰謝朏祖弘微宋太常卿父莊齊光祿朏, WYG: ''}
