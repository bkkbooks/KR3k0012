  - {type: variant, offset: 1076, length: 0, content: '', SBCK: 龐叅字仲連緱氏人拜漢陽太守郡民任棠有竒節隱教叅到先候之棠不與言但拔薤一大本水一盆致于屏前自抱孫兒伏于户下見逸民部又曰虞詡字􅂛卿陳國人孝飬祖母縣舉爲順孫又曰馮氏兄弟形皆偉壯唯}
