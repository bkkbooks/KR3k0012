  - {type: variant, offset: 674, length: 398, content: 君鉅鹿人父為里門監使溫舒牧羊因取澤中蒲截為牒編之寫書又曰揚雄蜀人自楊季至雄五代一子也又曰韋賢字長孺魯人質樸少欲篤志於學通詩書易以教授號鄒魯大儒為丞相薨少子玄成字少翁以明經歷位丞相故鄒魯諺曰遺子黃金滿籯不如教之一經又曰張禹字子文河內軹人父徙家蓮勺禹為小兒數至市卜相者奇其面貌謂禹父曰此兒多智可令經學矣又曰疏廣字仲翁東海蘭陵人也明春秋為太子太傅知止足與兄子受上䟽乞骸骨上賜黃金二十斤太子贈五十斤歸鄉里請故舊賓客為樂歲餘子孫竊謂昆弟老人勸說買田宅廣曰吾豈不念子孫哉顧有田廬足供衣食令更增益以為盈餘教子孫怠惰耳賢而多財損其志愚而多財益以為其過富者眾人怨也吾既無教化於子孫不欲益生於怨也又曰朱邑字仲卿廬江人少時為桐鄉嗇夫病且死囑其子曰我為桐鄉吏其民愛我死必葬之後世子孫奉祀我不如桐鄉死且葬之民為起冢祠又曰石奮從高祖至景帝時為九卿子等四人官至二千石景帝尊寵號為萬石君以上大夫祿歸老子家子孫有過不誚讓便對按不食, SBCK: 六尺}
