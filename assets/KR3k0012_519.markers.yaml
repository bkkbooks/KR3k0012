  - {type: variant, offset: 2402, length: 0, content: '', WYG: 父夀字徳真南陽人美貌充辟為司空掾充讌賔僚女從青璅中窺見夀悦焉感想發於寤寐有婢往夀家説其光彩艶逸夀聞動心令通慇懃夀勁捷過人至夕踰垣而入家人莫知惟充覺女恱暢異於常日時西域有貢香著人衣一月不歇帝甚貴之}
