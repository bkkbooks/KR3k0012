  - {type: variant, offset: 1139, length: 3, content: 皆知名, WYG: 妃太尉王衍之女字惠風太子廢衍請絶婚而歸恵風號泣行路流涕後劉曜陷洛陽以恵風賜其下将妻之恵風㧞劍拒曰吾太尉之女太子之妃誓不為逆胡所辱遂害之又曰韋逞母宋氏世家儒學母早喪父躬養之及長授以周官音義謂曰世𫝊儒業無男可傳汝宜授之勿令絶世}
