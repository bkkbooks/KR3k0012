  - {type: variant, offset: 1152, length: 0, content: '', WYG: 謝石請為将軍主簿隐之将嫁女石知其素儉令移尉厨帳就其家經營使者至方見賣犬此外蕭然無辦又曰靳康女不知何許人美姿容有志操劉曜誅靳氏訖将納其女為妾女曰陛下既誅其}
