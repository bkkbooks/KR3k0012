  - {type: variant, offset: 3713, length: 257, content: 歲聰惠孔文舉詣其父父不在乃呼脩脩為設果果有楊梅融指示兒曰此君之家果耶脩應聲曰未聞孔雀是夫子之家禽獸姓氏英賢錄曰宋顏竣字士遜少有令名太祖問其父延之曰諸子誰有卿風延之曰峻得臣筆測得臣文敻得巨義濯得巨酒世說曰豫章太守顧邵雍之子也在郡卒雍時盛集賓客自與客碁而信至無兒書雖神色不變而心了其故以瓜搯掌流血沾襟客散方歎己無延陵之高豈有喪明之痛於是豁然神氣自若又曰客有問陳季方曰足下家君有何功德而荷天下重名季方曰吾家君譬如桂樹生於太山之阿上有萬仞之高下有不測之淵上為甘露所沾下有淵泉所潤當此之時焉知太山之高淵泉之深不知有功德與無也, WYG: ''}
