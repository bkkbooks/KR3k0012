  - {type: variant, offset: 1095, length: 0, content: '', SBCK: 慿年數歳鎮謂其父曰我不如汝汝有佳兒慿曰阿翁詎冝以子戯父乎又曰李宻字令伯父早亡母改醮祖母劉氏躬撫飬宻奉事以孝謹聞有暇即講學志疲師事譙周周門人方之游夏太始􅀄徴爲洗馬宻以祖母年老上表自陳曰母孫二人更相爲命巳具祖門中又曰李胤字伯祖敏爲公孫度所迫浮海莫知所終子娶妻生㣧遂絶房内以憂卒㣧以祖不知所亡設木主以事之由是顯名宋齊語録曰虞愿字士恭㑹稽人祖爲給事中中庭有橘􅀣冬熟子孫争取愿獨不取祖及家人並異之又曰張元字孝始祖䘮明三年元每憂涕讀佛書以求福祐後見藥師經云盲者得視遂請七僧燃燈七日七夜轉藥師經行道毎自責曰爲孫不孝使祖䘮明今以燈施普照法界願祖目見明元求代暗其夜夢一老人以金鎞治其祖目謂之曰勿悲三日之後必差元于夢中喜躍驚覺乃遍告家人居三日祖目果漸見明從此遂差後周書曰薛登字景猷汾隂人早䘮父家貧以飬祖母暇則覽文籍躬耕以孝見稱列子曰北山愚公者年且九十面山而居懲山北之寒出入之迂也遂率子孫荷檐叩石墾壌箕畚運於北海之尾河曲智叟􅀏而止之愚公長息曰雖我之死}
