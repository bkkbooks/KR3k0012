  - {type: variant, offset: 2506, length: 0, content: '', WYG: 天道其不可昧乎我不殺王公王公因我而死三十國春秋曰前趙殷州刺史杜廣初為劉景廐卒以馬肥良引為直士侍立通夜未曾休倦景因問之廣流涕申欵曲有章條景執其手曰}
  - {type: variant, offset: 2507, length: 0, content: '', WYG: 罪人也乆負賢者謂妻曰為女求夫三年}
  - {type: variant, offset: 2508, length: 2, content: 及莊, WYG: 覺廐中有麒麟於是妻之捜神記曰楊公字雍伯洛陽人至情篤孝父母殁塟無終山楊公常為人補履終不取價無終山上無水楊公乃行車汲水為義漿居三年有一人就楊公飲出一升石子與之使向好平地有石處種之玊當}
