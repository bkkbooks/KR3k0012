  - {type: variant, offset: 1122, length: 9, content: 子勰字巨勝自曾祖楊, SBCK: 少時在室顗父俊爲安東將軍時甞出獵遇雨}
  - {type: variant, offset: 1122, length: 0, content: '', WYG: 少時在室顗父俊為安東将軍時嘗出獵遇雨而至絡秀之家㑹秀父兄不在絡秀見周俊至與一婢於内宰猪具數十人􅄿盛精而不聞人聲俊恠使覘之獨見一女甚美因求為妾其父兄不許絡秀曰門户殄瘁何惜一女若連貴族将来庶有大益父兄遂許之生顗嵩謨而顗等才長絡秀謂之曰我屈節為汝家妾門户計耳汝不與我家為親吾亦何惜餘年顗等從命由是李氏遂得為方雅之族又曰胡奮字元威安定人為䕶軍泰始末武帝怠於政事而躭於顔色大採公卿女以為六宫奮女𨕖為貴人奮唯有一男為南陽王友早亡及聞女為貴人哭曰老奴不死惟有二}
