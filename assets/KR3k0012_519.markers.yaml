  - {type: variant, offset: 1217, length: 246, content: 而歸昔馬援以薏苡興謗王陽以衣囊徼名嫌疑之間先賢所慎恢奇之乃撫其首曰吳氏世不乏季子矣又曰崔烈涿郡人靈帝開鴻都門榜賣官爵烈入錢五百萬得為司徒及拜日天子臨軒百寮畢會帝欣謂親幸曰悔不至三公後聲譽日滅烈不自安問子鈞曰吾為三公於議何如鈞曰嫌大人銅臭烈舉杖擊之鈞時為虎賁中郎服虎并載鶡尾狼狽而走烈罵曰死卒父撾而走豈孝乎鈞曰舜之事父也小杖受大杖走此恐陷父於不義非不孝也烈慚而讓官魏志曰張廣字嗣宗魯第二子也魯雅為魏武所寵諸子未勝纓並遣中使拜授官爵南鄭城碑曰位尊上將體極人臣五子十室榮並爵均童年嬰稚抱拜王人命婚帝, SBCK: ''}
