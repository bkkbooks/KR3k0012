  - {type: variant, offset: 1114, length: 0, content: '', WYG: 舜問乎丞曰道可得而有乎夫道性命非汝有也是天地之委順也子孫非汝有也是天地之委蛻也陳留志曰范喬字伯孫年二嵗祖父馨臨終執其手曰恨不見汝成人因以所用硯留與之後家人告喬喬執其硯涕泣孝子𫝊曰原榖者不知何許人祖年老父母厭患之意欲棄之榖年十五涕泣苦諌父母不從乃作輿舁棄之榖乃随収輿歸父謂之曰爾焉用此凶具榖乃曰恐後父老不能更作是以􅂑之耳父感悟愧懼乃載祖歸侍養克己自責更成純孝榖為純孫又曰吳郡陸仲元者晉太尉玩曽孫自玩至仲四世為侍中時人方之金張二族幽明録曰許遜少孤不識祖墓傾心所感忽見祖語曰我死三十餘年於今得正𦵏是汝孝悌之至因舉標牓曰可以此下求我於是迎喪𦵏者曰此墓中當出一侯及小孫長遂封女禮記内則曰女子出門必擁蔽其面夜行以燭無燭則止女子十年不出恒居内也姆教婉娩聴從婉謂言語也言婉之言媚也媚謂容貌也執麻枲治絲繭織紝組紃學女事以供衣服觀於祭祀納酒漿籩豆爼醢醴相􅂇奠當乃女時而知十有五年而笄二十而嫁凡女拜尚右手右隂也左傳㐮五年曰初宋芮司徒生女子赤而毛棄諸堤下恭姬之妾取以入長而美名之曰棄榖梁傳曰禮送女父不下堂母不出門父戒之曰謹慎從汝舅之言母誡之曰謹慎從汝姑之言諸母鞶紳誡之曰謹慎從汝父母之言無違宫事史記曰齊太倉令淳于公有罪當刑詔徙繋長安獄公無男有五女将行罵曰生女不生男緩急非有益小女緹縈随父至長安上書曰妾父為吏齊中皆稱其亷平今坐法當刑妾悲夫死者不可復生㫁者不可復續願入官沒為婢贖父之罪書奏天子悲憐其意遂為除肉刑漢書曰王章為京兆尹為大将軍王鳯所陥下廷尉獄妻子皆收章小女年十二夜起號哭曰每旦獄上呼囚常至九今八而止家君素剛烈先死者必我家君也及明問之果章死矣東觀漢記曰孝女郁字叔異五嵗母不能食郁亦不肯食故字曰異也後漢書曰孔融被誅女年七嵗幼弱遂得全寄住他舎主人有遺肉汁男飲之女曰今日之過豈得乆活何賴肉味乎或有言於曹操收之将殺女謂兄曰若死而有知得見父母豈非志願乃延頸就刑晉書曰}
