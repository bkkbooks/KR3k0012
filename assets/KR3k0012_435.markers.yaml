  - {type: variant, offset: 873, length: 2, content: 以假, SBCK: 有西域徤胡趫捷無敵晉人莫敢與校帝募勇士唯東應選遂撲殺之名震殊俗又曰王弥多權略凡有所掠必預圖成敗舉無遺䇿弓馬迅捷膐力過人靑土號爲飛豹又曰周處爲人勇􅁀不可當之嘗居義興水中有蛟龍山上有白額虎郷里有周處時人謂之三撗有里人􅀃處請殺虎虎死入水擊蚊龍没行數十里處與之俱經三日三夜人謂巳死矣皆相慶賀處殺蛟龍廻聞郷里相賀始知身之患人也於是仄身脩巳至洛陽惠帝拜爲將軍累遷爲建威將軍後西征没于陣贈西平將軍又曰郭黙殺江州太守自稱刺史爲人勇捷常身􅀍重甲跳三丈矛時人莫不憚之後陶􅋲及􅁃亮率軍滅之又曰蔡裔仕僞趙爲振武將軍少有勇力呼聲若雷嘗有盗入室裔撫机一呼賊衆皆殞時人憚之又曰李特巴西人少仕州郡雄勇善􅀐射沉毅有大度嘗至劔閣箕踞太息顧眄險阻曰劉禪有如此之地靣􅅞於人豈非庸才􅁘後聚流人衆至數萬遂攻城自稱大將軍爲益州刺史後稱蜀爲羅尚所殺子孫六丗至􅀔爲大}
