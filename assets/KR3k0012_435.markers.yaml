  - {type: variant, offset: 138, length: 2, content: 齊哀, SBCK: 甘寜字興霸性奢靡甞以繒錦維舟去或割弃勸權襲黃祖擒之隨魯肅至益陽拒􅀜羽羽擇銳士五千人從上流淺瀬夜渡寧曰請以五百人徃對之羽聞吾咳唾聲必不敢渉渉即成擒矣又曰陸統字公績從征合肥爲右部都督時權徹軍還前部巳發魏將張遼等奄至津北統率親近三百人䧟圍拔權出敵巳毀橋權䇿馬駈馳統復還戰左右盡死所殺數十人度權巳免乃還橋敗道絶􅀍甲潜行權旣御舩見之驚喜統痛親近無返者悲不自勝權引􅃑拭之謂曰公績亡者巳矣茍使卿在何患無人蜀志曰􅀜羽字雲長河東人也先主入益州留羽督荆州軍事嘗爲流矢所中貫左臂羽令鑿骨劈之時與諸將飲食血流􅄹器言􅀏自􅀂及破曹仁於樊城威振華夏曹公議遷都以避其銳司馬宣}
  - {type: page-break, offset: 138, content: '', id: KR3k0012_SBCK_435-2a}
  - {type: variant, offset: 138, length: 2, content: 齊哀, WYG: 甘寧字興覇性奢靡嘗以繒錦維舟去或割棄勸權襲黄祖擒之隨魯肅至益陽拒關公公擇鋭士五千人從上流淺瀨夜渡寧曰請以五百人往對之彼聞吾咳唾聲必不敢渉渉即成擒矣又曰凌統字公績從征合肥為右部都督時權徹軍還前部已發魏将張遼等奄至津北統率親近三百人䧟圍拔權出敵已毁橋權䇿馬馳驅統復還戰左右盡死所殺數十人度權已免乃還橋敗道絶被甲潜行權既御船見之驚喜統痛親近無返者悲不自勝權引袂拭之謂曰公潰亡者已矣苟使卿在何患无人蜀志曰闗雲長本字長生河東解人先主入益州令其督荆州軍事嘗為流矢所中貫左臂遂令鑿骨醫之時與諸将飲食血流盈器言笑自若及破曹仁於樊城威振華夏曹公議都遼以避其鋭司馬宣}
