  - {type: variant, offset: 347, length: 263, content: 景帝賜非將軍印擊吳吳破徙王江都治故吳國以功賜天子旌旗又曰李廣為上谷太守數與匈奴戰典屬國公孫昆耶為上泣曰李廣才氣天下無雙自負其能數與虜确恐亡之或曰确音角上乃徙廣為上郡太守廣以郎中令將四千騎出右北平博望侯張騫將萬騎與廣俱異道行數百里匈奴將四萬騎圍廣軍士皆恐廣乃使其子敢往馳之敢從數十騎直貫胡騎出其左右而還謂廣曰胡虜易與耳軍士乃安為圜陳外鄉胡急擊矢下如兩漢王兵死者過半漢矢且盡廣乃令持滿毋發而廣身自以大黃射其裨將服虔曰黃聞弩殺數人胡虜益解會暮吏以無人色而廣意氣自若益治軍軍中服其勇也明日復力戰而博望侯軍亦至匈奴乃解去又曰王尊字子贛涿, WYG: ''}
