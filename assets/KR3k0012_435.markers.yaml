  - {type: variant, offset: 3610, length: 0, content: '', SBCK: 夏侯穆擢爲隊主蠻有爲㓂盗者常使越討伐徃輙有功家貧無以市馬常刀楯歩出單身挺戰衆莫能當毎一揵郡將輒賞錢五千因此得買馬又曰宗慤爲江夏王國上將軍十五年不徙官元嘉二十二年伐林邑慤自􅁬願行義恭舉慤有膽勇乃降除振威將軍又曰薛安都與副將譚金追魯爽於小峴爽自與腹心壯􅀐斷後譚金先薄之不能入安都望見爽便躍馬大呼直徃刺之應手而倒左右范􅀟斬爽首爽累丗驍猛生習戰陣咸云萬人敵安都單􅀐直入斬之而反時人皆云􅀜羽之斬顔良不過也徐爰宋書曰栁元景字孝仁河東解人也良家子少便弓馬慕尚將師數隨父伐蠻夙以勇稱孫巖宋書曰拓跋燾字佛貍壯徤有筋力勇於戰闘忍虐好殺夷旅畏之攻城臨敵皆親貫甲胄又曰宗慤字元幹南陽沮人兄泌娶妻始入門夜􅀍刼慤年十四挺身與刼相拒十餘人皆披散不得入室時天下無事士人並以文義爲業而慤任氣好勇故不爲郷曲}
  - {type: page-break, offset: 3610, content: '', id: KR3k0012_SBCK_435-6b}
  - {type: variant, offset: 3610, length: 0, content: '', WYG: 夏侯穆擢為隊主郡有為冦盗者常使越討伐往輙有功家貧無以市馬常刀楯歩出單身挺戰衆莫能當每一捷郡将輙賞錢五千因此得買馬又曰宋慤為江夏王國上将軍十五年不徙官元嘉二十二年伐林邑慤自奮願行義恭舉慤有膽勇乃降除振威将軍又曰薛安都與副将譚金追魯爽于小峴爽自與腹心壮騎斷後譚金先薄之不能入安都望見爽便躍馬大呼直徃刺之應手而倒左右范雙斬爽首爽累世驍猛生習戰陣咸云萬人敵安都單騎直入斬之而反時人皆云雲長之斬顔良不過也徐爰宋書曰桞元景字孝仁河東解人也良家子少便弓馬慕尚将師數隨父伐蠻夙以勇稱孫巖宋書曰拓䟦燾字佛貍壯健有筋力勇於戰鬭忍虐好殺部衆畏之攻城臨敵皆親貫甲胄又曰宗慤字元幹南陽湼人也兄泌娶妻始入門夜被刼慤年十四挺身與刼相拒十餘人皆披散不得入室時天下無事士人並以文義為業而慤任氣好勇故不為鄉曲}
