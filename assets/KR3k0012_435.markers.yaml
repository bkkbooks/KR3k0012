  - {type: variant, offset: 612, length: 195, content: 為東平相時王素驕不奉法尊謂王曰天下皆言王勇但負貴安能勇如尊乃勇耳王變色欲格殺之遷東郡太守河水盛溢泛浸瓠子金堤老弱奔走至恐水大決為害尊躬率吏民投沉白馬祀水神河伯尊親執圭璧使巫策祝請以身填金堤因止宿廬居隄上吏民數千萬人爭叩頭救止尊終不肯去及水盛隄壞吏民皆走唯一主簿泣在尊旁尊立不動而水波稍卻迴還吏民嘉壯尊之勇節白三毛朱英等奏其狀詔秩尊中二千石賜黃金二十斤又曰朱雲字游魯人徙平陵少時通輕俠借客報仇, SBCK: 出自寒微有文武才幹}
