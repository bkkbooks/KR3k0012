  - {type: variant, offset: 2638, length: 500, content: 首虜固又遣與從事郭恂俱使西域鄯善王廣禮敬甚備後更踈懈超謂其官屬曰寧覺廣志意薄乎此必有北虜使來也召侍胡詐之曰匈奴使來數日安在侍胡具服超悉會其吏士三十六人酒酣激怒曰不探虎穴不得虎子當今之計獨有因夜以火攻虜使彼不知我多少必大震怖可殄盡鄯善破膽功成事立也眾曰善遂將吏士往奔虜營超手格殺三人斬其使明日乃還告郭恂恂大驚既而色動超知其意舉手曰掾雖不行班超何心獨擅之乎恂乃悅鄯善一國震怖竇固具上超功并求更選彼西域帝壯超詔固曰吏如班超何故不遣而選乎今以超為軍司馬令遂前功固欲益其兵超曰願得本所從三十餘人足以備有虞多益為重煩又曰楊政字子行京兆人嘗過楊虛侯馬武武稱疾見政去對機邊床臥欲令政拜床下政入戶前排武徑上床坐武恨語言不懌政把武手責之曰卿蒙國恩備位蕃臣不思求賢助國而驕天下英俊今日搖者刀入脅左右大驚以為見劫操兵滿側政顏色自若會信陽侯至責數武令為朋友其果勇敢折皆此類也又曰賈復以偏將軍從上拔邯鄲擊青犢大戰至日中賊陣堅不卻傅召復曰吏士飢且朝飯復曰先破之後食耳於是被羽先登所向皆靡諸將咸服其勇上以復敢深入希令遠征而壯其勇節常自從之故復少方面之勳諸將每論功復未曾有言上輒曰賈君之功我自知之又曰張步攻耿弇營合戰飛矢中弇股以偑刀截, SBCK: ''}
