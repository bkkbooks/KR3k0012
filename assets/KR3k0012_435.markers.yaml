  - {type: variant, offset: 7, length: 0, content: '', SBCK: 三吴志曰孫堅年十七與父共載舩至錢塘㑹海賊胡王等從匏里上掠賈人財物方於岸上分之行旅皆住舩不敢進堅謂父曰此賊可擊請討之父曰非爾所圗也堅行操刀上岸以手東西指麾􅀂分部兵以羅遮賊􅃺賊望見以爲官兵捕之即委財物散走堅追斬得一級以還父大驚由是顯聞又曰曹公出濡湏甘寧爲前部督受勑斫敵前營權特賜米酒衆肴寜乃賜手下百兵食食畢寧先以銀椀酌酒自飲兩椀乃酌與都督伏不肯持寧引白削置􅂰上呵謂之曰卿見知於至尊孰與甘寧甘寧尚不惜死卿何得獨惜死乎都督見寜色厲即起拜持酒次通酌兵各一銀椀至}
