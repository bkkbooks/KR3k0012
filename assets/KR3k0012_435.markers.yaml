  - {type: variant, offset: 3611, length: 1, content: 欲, SBCK: 知齊書曰桓崇祖在淮隂見上便自比韓信白起咸不信唯上獨許之崇祖再拜奉旨及破虜啓上謂朝臣曰崇祖許爲我制虜果如其言恒自擬韓白今真其人也又曰張敬兒年少便馬有膽氣好射虎發無不中南陽新野風俗出􅀐射而敬兒尤多膐力又曰魚復侯子響勇力絶人開弓四斛力數在園池中帖􅀐馳走竹樹下身無􅃜傷又曰周山圖鎮軍將軍張永征薛安都於彭城山圖領二千人迎軍至武原爲虜􅀐所追合戰多所傷}
