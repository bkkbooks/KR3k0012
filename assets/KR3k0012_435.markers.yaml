  - {type: variant, offset: 1140, length: 371, content: 六國楚最無罪自懷王入秦不返楚人憐之至今若立楚後亡楚必也梁然之梁於是立懷王孫心為楚王是為義帝從民望也都盱眙梁自號武信君師次定陶有驕色宋義諫曰戰勝而驕卒墮者敗今卒墮矣秦兵日益為君危之梁不聽秦將章邯兵至擊楚大破梁戰死義帝以宋義有先見征為上將軍羽為次將范增為末將北救趙至安陽留不進籍謂義曰今秦軍圍鉅鹿疾引兵渡河楚擊其外趙應其內破秦軍必矣義曰不然夫搏牛之䖟不可以破虱蝨蟣今秦攻趙戰勝則兵疲我乘其弊不勝則我引兵鼓行而西必舉秦矣夫擊敵輕銳我不如公坐運籌策公不如我因下令曰猛如虎狠如羊貪如狼強不可令者斬之乃置酒高會留四十六日不進是時天寒士卒飢凍籍曰且國家兵新破王坐不安席掃境內屬將軍國家安危在此一舉今不恤士卒而徇私非社稷之臣也籍乃斬宋義於帳中左右懾伏莫敢枝梧悉發兵渡河沉舟敗釜燒廬舍持三日糧示必死乃大破秦兵虜王離諸將入轅門𣍿行而前莫敢仰視師次鉅鹿會戰夜坑秦卒, SBCK: 合}
