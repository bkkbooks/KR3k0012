  - {type: variant, offset: 822, length: 0, content: '', WYG: 王殄多權畧凡有所掠必預圗成敗舉無遺䇿弓馬迅捷膂力過人青土號為飛豹又曰周處為人勇暴不可當處嘗居義興水中有蛟龍山上有白額虎鄉里有周處時人謂之三横有里人説處請殺虎虎死入水擊蛟龍沒行數十里處與之俱經三日三夜人謂已死矣皆相慶賀處殺蛟龍廽聞鄉里相賀始知身之患人也於是反身脩已至洛陽惠帝拜為将軍累遷為建威将軍後征西沒於陣贈西平将軍又曰郭黙殺江州太守自稱刺史為人勇健常身披重甲操三丈矛時人莫不憚之後陶侃及庾亮率軍滅之又曰蔡裔仕偽}
  - {type: page-break, offset: 822, content: '', id: KR3k0012_WYG_435-5a, image: WYG0897/WYG0897-0029c.png}
  - {type: variant, offset: 822, length: 0, content: '', krp: 王弥多權略凡有所掠必預圖成敗舉無遺䇿弓馬迅捷膐力過人靑土號爲飛豹又曰周處爲人勇暴不可當之嘗居義興水中有蛟龍山上有白額虎郷里有周處時人謂之三撗有里人說處請殺虎虎死入水擊蚊龍没行數十里處與之俱經三日三夜人謂巳死矣皆相慶賀處殺蛟龍廻聞郷里相賀始知身之患人也於是仄身脩巳至洛陽惠帝拜爲將軍累遷爲建威將軍後西征没于陣贈西平將軍又曰郭黙殺江州太守自稱刺史爲人勇捷常身𬒳重甲跳三丈矛時人莫不憚之後陶侃及庾亮率軍滅之又曰蔡裔仕僞}
