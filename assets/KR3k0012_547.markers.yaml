  - {type: variant, offset: 564, length: 241, content: 孔子與門人立拱而尚右二三亦皆尚右效孔子也孔子曰二三子之嗜學也我則有姊之喪故也二三子皆尚左又曰孟獻子禫縣而不樂比御而不入可以御婦人矣尚未復寢孟獻子魯大夫仲孫蔑也夫子曰獻子加於人一等矣加猶踰也又檀弓卞曰樂正子春之母死五日而食曰吾悔之勉強過禮子春曾子弟子自吾母死不得吾情我惡乎用吾情惡乎猶於何也又王制曰三年之喪自天子達下通庶人父母同也天子諸侯降其也於庶人喪從死者祭從生者又曾子問曰父母之喪弗除可乎以其有終身之憂也孔子曰先王制禮過時不舉非禮也非不能勿除也患其過制也故君子過時不祭禮也又雜記曰, SBCK: ''}
