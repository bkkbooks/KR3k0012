  - {type: variant, offset: 1206, length: 1, content: 言, SBCK: 雖貴遂服自天子逹而漢文除之毀禮傷義常以爲歎今上天縱至孝有曽閔之性雖奪其服而實行喪禮喪禮行除服何爲耶􅀂因此革魏之薄而興先王之法以敦厚風俗垂之百代不亦美乎玄曰漢文以來丗乃淺薄不能行國君之喪因而除之數百年一旦復古恐難行也祜曰就不能使天下如禮且使主上遂服不猶善乎玄曰􅀂主上不除而下除此爲但有父子無君臣三綱之道虧矣君子曰􅀓玄知無君臣之傷教}
  - {type: variant, offset: 1206, length: 1, content: 言, krp: 雖貴遂服自天子逹而漢文除之毀禮傷義常以爲歎今上天縱至孝有曽閔之性雖奪其服而實行喪禮喪禮行除服何爲耶若因此革魏之薄而興先王之法以敦厚風俗垂之百代不亦美乎玄曰漢文以來丗乃淺薄不能行國君之喪因而除之數百年一旦復古恐難行也祜曰就不能使天下如禮且使主上遂服不猶善乎玄曰若主上不除而下除此爲但有父子無君臣三綱之道虧矣君子曰傳玄知無君臣之傷教}
  - {type: variant, offset: 1209, length: 2, content: 語對, SBCK: 知兼無父子之爲重豈不蔽惑哉漢廢君臣之喪不降父子之服故四海􅀺庶莫不盡於其新三綱之道二服􅁪用於􅀻室}
