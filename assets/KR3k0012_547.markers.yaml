  - {type: variant, offset: 13, length: 525, content: 居喪未葬讀喪禮既葬讀祭禮喪復常讀樂章為禮各於其時居喪不言樂又曲禮曰居喪之禮頭有瘡則沐身有瘍則浴有疾則飲酒食肉疾止復初不勝喪乃比於不慈不孝勝任也又檀弓上曰穆公之母卒使人問於曾子曰如之何對曰申也聞諸申之父曰哭泣之哀齊斬之情麋粥之食自天子達又曰始死充充如有窮既殯瞿瞿如有求而弗得既葬皇皇如有望而弗至練而慨然祥而廓然子路有姊之喪可以除之矣而弗除也孔子曰何弗除也子路曰吾寡兄弟而不忍也孔子曰先王制禮行道之人皆弗忍也子路聞之遂除之子思哭嫂也為位禮雖無服為位而哭夫子善之曾子曰小功不稅追服為稅則是遠兄弟終無服也而可乎曾子曰喪有疾食肉飲酒必有草木之滋焉以為薑桂之謂曾子曰所云草木之滋者薑桂也又檀弓下曰子張問曰書云高宗三年不言言乃歡有諸時人君無行三年之喪禮者歡喜悅也言乃喜悅則民臣望其言久也仲尼曰胡為其不然也古者天子崩王世子聽於冢宰三年冢宰大官又曰顏丁善居喪顏丁魯人始死皇皇焉如有求而弗得及殯望望焉如有從而弗及既葬慨焉如不及其返而息此三者孝子哀慕之情也又檀弓曰孔子在衛有送葬者而夫子觀之曰善哉為喪乎足以為法矣小子識之子貢曰夫子何善爾也曰其往也如慕其反也如疑慕謂小兒隨父母啼呼疑者哀親之在後如不欲還然又檀弓上曰孔子既祥五日彈琴而不成聲哀未忘也十日而成笙歌踰月且異旬也祥者, SBCK: 凡}
