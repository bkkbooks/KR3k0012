  - {type: variant, offset: 870, length: 0, content: '', SBCK: 君爲臣服也疑衰十四升疑之擬擬於吉也儀禮䘮服曰䘮服斬衰裳苴絰杖絞帶冠繩纓菅屨者爲父諸侯天子君父爲長子爲人後者妻爲夫女子子在室爲父女子子嫁及在父之室爲父公士}
  - {type: variant, offset: 870, length: 0, content: '', WYG: 君為臣服也疑衰十四升疑之言擬擬于吉也儀禮喪服曰喪服斬衰裳苴絰杖絞帶冠繩纓菅屨者為父諸侯為天子君父為長子為人後者妻為夫女子子在室為父子嫁反在父之室為父公士}
