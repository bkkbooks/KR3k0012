  - {type: variant, offset: 883, length: 0, content: '', SBCK: 子猶子也盖引而進之㛐叔之無服盖推而逺之姑姊妹之薄也盖有受我而厚之者欲其一心厚之者姑姊妹嫁大功夫爲妻期又檀弓曰成人有兄死而不爲衰者聞子臯將爲成宰遂爲衰成人曰蠶則績而蟹有匡范則冠而蟬有緌兄則死而子臯爲之衰􅃖兄死者言其衰之不爲兄死如蟹有匡蟬有緌不爲􅁞之績范之冠也范蜂也蟬蜩也緌謂蜩喙長在賜下又䘮服小記曰近臣君服斯服矣其餘從而服不從而稅除䘮者先重者易服者易}
  - {type: variant, offset: 883, length: 1, content: 輕, WYG: 子猶子也蓋引而進之也嫂叔之無服也蓋推而逺之也姑姊妹之薄也蓋有受我而厚之者也欲其一心厚之者姑姊妹大功夫妻為期又檀弓下曰成人有其兄死而不為衰者聞子臯將為成宰遂為衰成人曰蠶則績而蟹有匡范則冠而蟬有緌兄則死而子臯為之衰蚩尤死者言其衰之不為兄死如蟹有匡蟬有緌不為􅅙之績范之冠也范蜂也蟬蜩也緌謂蜩喙長在腹下又}
