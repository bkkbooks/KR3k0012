  - {type: variant, offset: 1461, length: 1, content: 反, SBCK: 巳也大功其布加麄大之功不善治之也小功精細之小功轉有飾也緦絲也錫也治其麻使滑易也繐繐如流如繐也絰帶周禮夏官曰弁師王之弁經弁而加環絰弁絰王吊所服也其弁如爵弁而素所謂素冠也而加環絰環者大如緦之麻絰纒而不紏司服識曰凡弔事弁絰事儀禮䘮服曰苴絰者麻之有蕡者也苴絰大搹搹手搹圍九寸左夲在下去五分一以爲帶齊衰之絰斬良之帶也去五分一以爲帶絞者垂帶也鄭玄注曰凡服上曰衰下曰裳在首在􅆎皆曰絰絰之言實也首絰象幘布冠之幘􅆎絰象大帶又有絞帶革帶也壯麻者枲麻也壯麻絰右本在上又曰斬衰絞帶七寸三分齊之帶五寸六分}
