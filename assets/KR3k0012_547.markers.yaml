  - {type: variant, offset: 1053, length: 902, content: 問喪問居父母之喪也喪常哀言敬為上者疾時尚不能敬也容威儀也孝經曰容止可觀請問兄弟之喪子曰兄弟之喪則存乎書策矣言䟽者如禮行之未有和也齊斬之喪哀容之體經不能載矣君子不奪人之喪重喪禮也亦不可奪喪也不可以輕之於己也孔子曰少連大連善居喪三日不怠三月不懈其悲哀三年憂東夷之子也言其生於夷狄而知禮也怠惰也解倦也又曰三年之喪言而不語對而不問廬堊室之中不與人坐焉在堊室之中非時見乎母也不入門言己事也為人說為語在堊室之中以時事見乎母乃後入門則居廬時不入門䟽哀皆居堊室不廬廬嚴者也言廬哀敬之處非有其實則不居又雜記曰懸子曰三年之喪如斬朞之喪如剡言其痛之惻怛有淺深也期之喪十一月而練十三月而祥十五月而禫曾申問於曾子曰哭父母有常聲乎曰中路嬰兒失其母焉何常聲之有又間傳曰斬襄何以服苴惡貌也所以首其內而見諸外也斬襄貌若苴齊襄貌若枲大功貌若止小功緦麻容貌可也此哀之發於容體者也有大憂者面必黎黑止謂不動於喜樂之事也枲或為似斬襄之哭若往而不反齊襄之哭若往而反大功之哭三曲而偯小功緦麻哀容可也此哀之發於聲音者也三曲聲而二折斬襄唯而不對齊襄對而不言大功言而不議小功緦麻議而不及樂此哀之發於言語者也議謂陳說非時事也斬襄三日不食齊襄二日不食大功三不食小功緦麻再不食三不食為明旦朝也再不食謂如死一不食始歛時一不食也故父母之喪既殯食粥朝一溢米暮一溢米齊襄之喪蔬食水飲不食菜果大功之喪不食醯醬小功緦麻不飲醴酒此哀之發於飲食者也父母之喪既虞卒哭蔬食水飲不食菜果期而小祥食菜果又朞而大祥有醯醬中月而禫禫而飲酒始飲酒者先飲醴酒始食肉者先食乾肉父母之喪居倚廬寢苫枕塊不脫經帶齊襄之喪居堊室芐翦不納大功之喪寢有席小功緦麻床可也此哀之發於居處者也又奔喪曰聞遠兄弟之喪既除喪而后聞喪免𥘵成踊拜賓則尚左手小功緦麻下稅者也雖不服猶免祖尚左手吉拜也又問喪曰親始死雞斯徒跣扱上袵交手哭惻怛之心痛疾之意傷腎乾肝焦胰水漿不入口三日不舉火故鄰里為之糜粥以飲食之親父母也雞斯當為笄笄聲之謨也親始死去冠二日乃去笄纚括髮也今時始喪者邪中貊頭笄纚之存象也又喪服四制曰父母之喪襄冠繩纓管屨履三日而食粥三月而沐期十三月而練冠三年而祥比終茲三節者仁者可以觀其愛焉知者可以觀其理焉強者可以觀其志焉又三年, WYG: ''}
