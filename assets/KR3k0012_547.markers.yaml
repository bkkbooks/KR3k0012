  - {type: variant, offset: 890, length: 73, content: 有父之喪如未沒喪而母死其除父之喪也服卒事反喪服沒猶竟也除服謂詳祭之服也卒事既祭反喪服服後死者之服雖諸父昆弟之喪如當父母之喪其除諸父昆弟之喪也皆服其, WYG: ''}
