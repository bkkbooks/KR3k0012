  - {type: variant, offset: 1934, length: 321, content: 愛焉知者可以觀其理焉強者可以觀其志焉又三年問曰三年之喪何也稱情而立文因以飾群別親踈貴賤之節而弗可損益也故曰無易之道稱情而立文者稱人情輕重而制其禮也創鉅者其日久痛甚者其愈遲三年者稱情而立文所以為至痛極也斬襄苴杖居倚廬食粥寢苫枕塊所以為至痛飾也三年之喪二十五月而畢哀痛未盡思慕未忘然而服以是斷之者豈不送死有已復生有節也哉凡生天地之間者有血氣之屬必有知有知之屬莫不知愛其類今是大鳥獸則失喪其群匹越月踰時則必返巡過其故鄉廻翔焉鳴號焉躑䠱焉踟躊焉然後乃能去之小者至於鷰雀猶有啁噍之頃焉然後乃能去之故有血氣之屬者莫知於人於其親也至死不窮則三年之喪二十五月而畢若駟之過隙然而遂之則是無窮也故先王為之立中制節壹使足以成文理則釋之矣立中制節謂服紀使有年月之限者, SBCK: 數}
