  - {type: variant, offset: 3340, length: 272, content: 瑞珪為信今死矣嗣子諒闇歸之者讓之義也天子聞諸侯薨哭之何慘怛發中哀痛之至也使大夫弔之追遠重終之義又曰臣死亦訃告君何此君哀痛於臣子也君欲聞之當加賻賵之禮故春秋曰蔡侯考父卒卒訃而葬不告諸侯薨訃告鄰國何緣鄰國欲有禮也奪情禮記曾子問曰子夏問三年之喪卒哭金革之事無避也禮與初有司與疑有司使之然孔子曰夏后氏三年之喪既殯而致事殷人既葬而致事致事還其職位於君記曰君子不奪人之親亦不可奪親也此之謂乎子夏曰金革之事無避也者非與孔子曰吾聞諸老聃曰昔魯公伯禽則有為為之今以三年之喪從其利者吾不知也東觀漢記曰桓焉為大傳以母憂自乞聽以大夫行踰年詔賜牛酒奪服即拜光祿大夫遷太常, SBCK: 如固宮}
