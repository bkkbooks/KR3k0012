  - {type: variant, offset: 1963, length: 2, content: 稱情, WYG: 無變於大功齊衰之服不用輕累重麻之有本者變三年之葛有本謂大功以上也小功以下絲麻㫁本既練遇麻㫁本者于免絰之既免去絰每可以絰必絰既絰則去之禮統曰天子諸侯皆為貴臣妾服三月適夫人為八妾服三月八妾為夫人服與舅姑同家語曰門人疑所以服夫子者子貢曰昔夫子之喪顔淵若喪子}
  - {type: variant, offset: 1966, length: 9, content: 立文因以飾群別親踈, WYG: 無服喪子路亦然請喪夫子若喪父而無服于是弟子皆入而加麻出有所之則猶絰孔叢子曰秦莊子死孟武伯問于孔子曰古同僚有服乎曰然同僚有相友之義}
