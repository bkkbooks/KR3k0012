  - {type: variant, offset: 989, length: 212, content: 唯君之喪不除私服言當者期大功之喪或終始皆在三年之中小功緦麻則不除殤長中乃除又曰子貢問喪子曰敬為上哀次之瘠為下顏色稱其情戚容稱其服問喪問居父母之喪也喪常哀言敬為上者疾時尚不能敬也容威儀也孝經曰容止可觀請問兄弟之喪子曰兄弟之喪則存乎書策矣言䟽者如禮行之未有和也齊斬之喪哀容之體經不能載矣君子不奪人之喪重喪禮也亦不可奪喪也不可以輕之於己也孔子曰少連大連善居喪三日不怠三月不懈其悲哀三年憂東夷之子也言其生於夷狄而知禮也怠惰也解倦也又, SBCK: 羊祜謂􅀓玄}
