  - {type: variant, offset: 2358, length: 0, content: '', WYG: 冠其衰也帶緣各視其冠又曰緦者十五升抽其半有事其縷無事其布曰緦也錫衰何也麻之有枲者也十五升有其半無事其縷有事其布曰錫又曰凡衰外削幅裳内削幅幅三拘削殺也若齊裳内衰外員廣出于適寸員在背上適辟領也負也出于辟領外傍一寸適博四寸出于衰麻長六寸博四寸禮記檀弓曰衰與其不當物也寧無衰惡其亂禮不當物謂精麤廣狹不應法制齊衰不以邊坐大功不以服勤又曰古者冠縮縫今也衡縫縮從也今禮制衡讀為横今冠縫横以其辟積多故喪冠之反吉非古也解時人之惑喪冠縮縫古冠耳又間傳曰斬衰三升齊衰四升五升六升大功七升八升九升小功十升十一升十二升緦麻十五升去其半有事其縷無事其布曰緦此哀之發于衣服者也禮記外傳曰凡言斬衰者以六寸之布廣四寸為衰帖于心前而不緝也衰者言悲摧也緝者縫綆之名齊之言齊也加針縷其裳下之縫使齊平也凡言有事其縷者先加灰錫治其麻縷為布則不治絰帶周禮夏官弁師曰王之弁絰弁而加環絰弁絰王弔所服也其弁如爵弁而素所謂素冠也而加環絰環絰者大如緦之麻絰纒而不糾司服職曰凡弔事弁絰服儀禮喪服曰苴絰者麻之有蕡者也苴絰大搹搹手搹圍九寸左本在下去五分一}
