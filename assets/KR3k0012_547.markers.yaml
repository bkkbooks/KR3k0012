  - {type: variant, offset: 3704, length: 247, content: 六日起視事曰不敢踰國家也吳志曰孫權詔曰夫三年之喪天下達制人情之極痛也賢者制哀以從禮不肖勉而致之也治道已泰上下無事君子不奪人情故三年逮孝子之間至於有事則殺禮以從宜要絰而處事故聖人制法有禮無時不行喪不奔非古也蓋隨時之宜以義斷恩也前故設科長吏在官當須交代而故犯之雖隨糺坐猶以廢曠方事之殷國家多難凡在官司宜各盡節先公後私而不恭承甚非謂也中外群僚其更平議務令得中節度丞相顧雍奏從大辟其後吳令孟宗喪母奔赴已而自拘於武昌以聽刑戮陸遜陳其素行因為之請減宗等後不得以為比自此遂絕風俗通曰謹案禮臣有大喪三年不呼其門, SBCK: 七}
