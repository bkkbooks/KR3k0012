  - {type: variant, offset: 2897, length: 408, content: 奔喪升自東階殯東西面坐哭盡哀東髽即位與主人拾踊拾更也主人與之更踊盡哀而哭者賓客待之也又曰奔喪者不及殯先之墓北面哭盡哀主人之待之也即位於墓左婦人墓右成踊盡哀括髮柬即主人位絰絞帶哭成踊拜賓及位成踊又曰若所為位家遠則成服而往齊襄望鄉而哭大功望門而哭小功至門而哭緦麻即位而哭奔喪哭親䟽遠近之差也訃告禮記雜記上曰凡訃於其君曰君之臣某死訃或作赴赴至也臣死其子使人至君所告也父母妻長子曰君之臣某之某死此臣於其家喪所主者君訃於他國之君曰寡君不祿敢告於執事夫人曰寡小君不祿太子之喪曰寡君之適子某死君夫人不稱薨告也國君謙也大夫訃於同國敵者曰某不祿訃於士亦曰某不祿訃於他國之君曰君之外臣寡大夫某死訃於敵者曰吾子之外私寡大夫某不祿使某實敵謂有爵者實當為至也士訃於同國大夫曰某死訃於士亦曰某死訃於他國之君曰君之外臣某死訃於大夫曰吾子之外私某死於士亦曰吾子之外私某死白虎通曰天子崩訃告諸侯者何緣臣子哀痛憤蒲無能不告諸人者也諸侯欲聞之當持土地所出, SBCK: 輦}
