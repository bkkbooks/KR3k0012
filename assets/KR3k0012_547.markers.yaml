  - {type: variant, offset: 2392, length: 503, content: 隨情輕重處之上取象於天下取法於地中取則於人人之所以群居和壹之理盡矣取象於天地所謂法其變易也自三年以至緦麻皆歲時之數左氏傳襄上曰晏桓子卒晏纓麤縗斬斬不緝也麤三升布苴經帶杖菅屨苴麻之有子者菅草履也食粥居倚廬寢苫枕草此禮與士禮略同此異唯枕草其老曰非大夫之禮時之所行土及大夫纕服各有不同晏子時為大夫行士禮其家臣不解故機曰唯卿為大夫家語曰子夏問曰居君子之母與妻之喪如之何孔子曰居處言語飲食侃爾於喪所則稱其服而已敢問伯叔母如之何曰伯母叔母䟽襄朞踊不絕地姑姊妹之功踊絕於地若知此者由文矣哉由文矣哉言知禮之意也南史曰王秀字伯奮幼時祖父敬弘愛其風采仕宋為太子舍人父卒廬於墓側服闋復職梁書曰到溉遭母憂居喪盡禮所處廬開方四尺毀瘠過人服闋猶蔬食布衣者累載又曰孔奐為儀曹侍郎遭母憂時天下喪亂皆不能終三年喪唯奐及吳國張種在寇亂中守法度並以孝聞奔喪禮記奔喪曰奔喪之禮始聞親喪以哭荅使者盡哀問故又哭盡哀遂行日行百里不以夜行唯父母之喪見星而行見星而舍侵晨冒昏行者蓋欲從速若未得行則成服而後行過國至境哭盡哀而止哭避市朝望其國境哭至於家入門左升自西階殯東西面坐哭盡哀括髮祖奔母之喪西面哭盡哀括髮祖降堂東即位西卿哭皆如奔父之禮下堂東至孝子堂所住處, SBCK: 二}
