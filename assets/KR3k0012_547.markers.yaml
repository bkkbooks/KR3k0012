  - {type: variant, offset: 1334, length: 1, content: 祥, SBCK: 不爲吏者弔服加麻衰冠毛詩羔裘曰素冠刺不能三年也庶見素冠兮􅁄人欒欒兮箋云時無三年之恩於父母廢其喪禮故兾幸一見素冠急於哀慼也周禮春官小宗伯曰王崩懸衰冠之式于路門之外肆師之職大喪禁外内男女之衰不中法者又夏官太僕曰大喪懸首服之法于宫首服之法謂免髽笄緫長短之數於宫門示四方也又天官内司服曰共后之衣服及九殯丗婦凡命婦共其服共喪衰亦如之儀禮喪服曰斬衰者不緝也冠繩纓條屬冠六􅂛外畢鍜而勿􅁅齊衰者緝也又曰䟽衰裳齊傳曰問者曰何冠也曰齊衰大功冠其衰也緦麻小功冠其衰也帶縁各視其冠又曰緦者}
