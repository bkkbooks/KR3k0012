  - {type: variant, offset: 1455, length: 0, content: '', SBCK: 之言齊也加針縷其裳下之縫使齊半也凡言有事其縷者先加􅁅錫治其麻縷爲布則不治也哀在外故有事其布者則不治其縷哀在内也爲布之後即先治也緦者如絲也錫衰者先緝􅃬白之謂也疑衰者疑其布是絲也疑衰錫衰二者君之弔服也又曰吉冠之布倍於衣也朝服十五􅂛則冠三十􅂛是也今喪冠􅂛數少喪禮簡斬衰三􅂛冠六􅂛升者登也轉祖訓耳凡麻八十縷爲十􅂛至六􅂛即爲成布也凡言受以成布者旣葬之後漸去麄受細齊衰四􅂛冠七􅂛又有䟽衰即三􅂛半之衰也䟽亦麄也其布在齊斬之間左傳僖上曰許僖公見楚子於武城許男面􅅞衘壁大夫衰絰士輿櫬櫬棺楚子問諸逢伯對曰武王克殷微子啓如是又}
  - {type: variant, offset: 1455, length: 0, content: '', krp: 之言齊也加針縷其裳下之縫使齊半也凡言有事其縷者先加灰錫治其麻縷爲布則不治也哀在外故有事其布者則不治其縷哀在内也爲布之後即先治也緦者如絲也錫衰者先緝錫白之謂也疑衰者疑其布是絲也疑衰錫衰二者君之弔服也又曰吉冠之布倍於衣也朝服十五升則冠三十升是也今喪冠升數少喪禮簡斬衰三升冠六升升者登也轉祖訓耳凡麻八十縷爲十升至六升即爲成布也凡言受以成布者旣葬之後漸去麄受細齊衰四升冠七升又有䟽衰即三升半之衰也䟽亦麄也其布在齊斬之間左傳僖上曰許僖公見楚子於武城許男面縛衘壁大夫衰絰士輿櫬櫬棺楚子問諸逢伯對曰武王克殷微子啓如是又}
  - {type: variant, offset: 1456, length: 0, content: '', SBCK: 六曰魯昭公立十九年矣猶有童心比及葬三昜衰衰袵如故衰言其嬉戲無度呉録曰諸􅁑恪將誅有着衰衣入其閣令人詰荅曰不自知入時外内守備亦不見也鄭玄别傳曰玄卒受業者衰絰于餘人郭子曰劉王共在􅟘南酣宴謝鎭西徃尚書墓還是葬後三日諸人欲要}
