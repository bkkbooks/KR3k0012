  - {type: variant, offset: 872, length: 1, content: 有, SBCK: 之衆臣爲君布帶繩屨又曰䟽衰裳齊壯麻絰冠布纓削杖布帶䟽屨三年者父卒則爲母繼母慈母如母母爲長又曰䟽衰裳齋壯麻絰冠布纓削杖布帶䟽屨朞者父在爲其母妻出妻之子爲母卒繼母嫁從爲之服報不杖麻屨者祖父母世父母叔父母又曰䟽衰裳齋壯麻絰無受者無受者服足而除不以經服而受也􅀉公爲所寓丈夫婦人爲宗子宗子之母妻爲舊君之母妻庶人爲國君大夫在外其長子爲舊國又曰大功布衰裳壯麻絰無受者子女子子之長殤中殤叔父之長殤中殤姑姊妺之長殤中殤昆弟之長殤中殤夫之昆弟之子女子子之長殤中殤嫡孫之長殤中殤大夫之庶子爲嫡昆弟之長殤中殤公爲嫡子之長殤中大夫爲嫡子之長殤中殤其長殤皆九月纓絰其中殤七月不纓絰大功布衰裳壯麻絰纓布帶三月受以小功衰即􅁑九月者姑姊妹女子子適人者又曰繐衰裳壯麻絰旣葬除之者傳曰繐衰者何以小功之繐也諸侯之大夫爲大子傳曰何以繐衰也諸侯之大夫以時接見乎天子小功布衰裳澡麻帶絰五月者叔父嫡孫昆弟之下殤又曰小功布衰裳壯麻絰即􅁑五月者從祖祖父母從祖父母報從祖昆弟從父姊妺孫適人者爲人後者爲姊妹適人者爲外祖父母又曰緦麻三月者族曽祖父母族祖父母族父母族昆弟庶孫之婦庶孫之中殤又曰公子爲其母練冠麻麻衣縓縁爲其妻縓冠􅁑絰帶麻衣縓皆旣葬除之又曰凡妾爲}
