  - {type: variant, offset: 13, length: 2, content: 諫議, SBCK: 唐貞觀􅀄置散􅀐常侍二貟􅀠門下省明慶二年又置二貟􅀠中書省始有左右之號並金蟬眊貂左散􅀐與侍中爲左貂右散􅀐與中書令爲右貂謂之八貂又曰散􅀐常侍晉代此官選望甚重時與黃門侍郎謂之黄散漢書百官表曰散􅀐中常侍皆加官所加或列侯將軍卿}
  - {type: variant, offset: 13, length: 2, content: 諫議, WYG: 唐貞觀初置散騎常侍二員𨽻門下省顯慶三年又置二員𨽻中書省始有左右之號並金蟬眊貂左散騎與侍中爲左貂右散騎與中書令爲右貂謂之八貂又曰散騎常侍晉代此官選望甚重時與黄門侍郎謂之黄散漢書百官表曰散騎常侍皆加官所加或列侯將軍卿}
  - {type: variant, offset: 13, length: 2, content: 諫議, krp: 唐貞觀𥘉置散騎常侍二貟隷門下省明慶二年又置二貟隷中書省始有左右之號並金蟬眊貂左散騎與侍中爲左貂右散騎與中書令爲右貂謂之八貂又曰散騎常侍晉代此官選望甚重時與黃門侍郎謂之黄散漢書百官表曰散騎中常侍皆加官所加或列侯將軍卿}
  - {type: variant, offset: 17, length: 0, content: '', SBCK: 正貟多至數十人應劭漢官儀曰􅁗及前漢置散􅀐及中常侍各一人散􅀐􅀐馬並乗輿車獻可替否魏志曰文帝延康元年置散􅀐常侍爲一官省中置四人與侍中同}
  - {type: page-break, offset: 17, content: '', id: KR3k0012_SBCK_224-1b}
