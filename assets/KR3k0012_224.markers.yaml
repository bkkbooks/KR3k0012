  - {type: variant, offset: 1144, length: 0, content: '', WYG: 初高祖以李彪爲散騎常侍郭祚因入見高祖謂祚曰朕誤授一人官禄對曰豈容聖詔一行而有差異高祖曰朕昨誤沉吟曰此自應有讓朕欲别授一官須臾彪有啓曰伯有辭卿子産所惡臣欲之已乆故不敢讓高祖歎謂祚曰卿之忠諫李彪正辭使朕遲逥不能復决遂不移官又曰明亮爲常侍加武勇將軍進曰臣本官常侍是第三清今授武勇其號至濁又曰茍頽承明元年文明太后令百官舉才堪幹事人足委仗者於是公卿咸以頽應選徴拜散騎常侍又曰孝文謂散騎常侍元景曰卿等自在集書合省逋墮致使王言遺漏起居不修北齊書曰宋弁爲散騎常侍遷右将軍領黄門弁屢讓高祖曰散騎位在中書之右常侍者黄門之庻兄領軍者二衞之假攝不足空存推讓而棄大委任又曰朝貴多假常侍以取貂蟬之飾高隆之自表解侍中并陳請假侍服者亦請罷之詔皆如表三國典畧曰齊遣散騎常侍梁瞻聘於陳瞻辭韻温雅南人欽服乃謂之曰常侍前期何竟不來今年誰相對者又曰賀琛爲梁散騎常侍梁主與語常移晷刻故省中語曰上殿不下有賀雅琛容止都雅故人呼之隋書曰案漢官侍内金蟬左貂金取剛固蟬取高㓗也董巴志曰内常侍右貂金璫銀附蟬内書今亦同此今宦者去貂内史金蟬右貂納言金蟬右貂開皇時特加散騎常侍在門下者貂蟬至是罷之唯加常侍聘外國者特給貂蟬還則輸納於内省環濟要略曰散騎常侍入侍左右岀則常侍事於廊廟之下華嶠集云詔曰散騎以從容侍從承荅顧問掌讚詔命平處文籍故前世多叅用文學之士議郎華嶠有論議著述之才其以嶠爲散騎常侍兼與中書共叅著作事嶠表謝云非臣典筆申辭所能陳表員外散騎常侍晉書曰吏部郎李重啓東莞太守曹嘉之才翰學義先代之右宜補員外常侍晉起居注曰咸康八年司徒王導表員外常侍孫朝八年告老棄身茨宇永絶榮禄宜給本官秩俸以終餘年梁書曰賀琛字國寳遷員外散騎常侍舊尚書南座無貂貂自琛始也通直散騎常侍陶氏職官要録曰晉太始十年詔東平王楙爲員外常侍通直殿中與散騎常侍通直通直之號蓋自此始也朱鳯晉書曰左軍陳與謇之子以父老求去職宿衛不宜曠詔以爲通直常侍宋書曰通直散騎常侍員四人魏末散騎常侍又有在員外晉武帝使二人與散騎常侍通員直故謂之通直散騎常侍晉江左置四人梁書曰鮑泉嘗乗高􅎻車從數十左右繖蓋服玩甚精道逢國子祭酒王承承疑非舊貫遣訪之泉從者荅曰鮑通直承怪焉復欲辱之遣逼車問鮑通直復是何許人而得如此都下少年遂爲口實見尚豪華人相戱曰鮑通直復是何許人而得如此以之爲笑謔北齊書曰}
