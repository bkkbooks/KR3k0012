  - {type: variant, offset: 861, length: 0, content: '', SBCK: 盤龍自平北將軍爲散􅀐常侍武帝戯之曰卿著貂蟬何如兠鍪對曰此貂蟬從兠鍪中出耳齊職儀曰魏氏侍中皆􅀐從御登殿與散􅀐常侍對挾帝侍中居左常侍居右後魏書曰􅀄髙祖以李彪爲散􅀐常侍郭祚因入見髙祖謂祚曰朕誤受一人官禄對曰豈容聖詔一行而有差異髙祖曰朕昨誤沉吟曰此自應有讓朕欲别授一官湏􅁷彪有啓云伯石辭卿子産所惡臣欲之巳乆故不敢讓髙祖歎謂祚曰卿之忠諌李彪正辭使朕遲廻不能復决遂不移官又曰明亮爲常侍加武勇將軍進曰臣本官常侍是第三清今授武勇其號至濁又曰荀頽承明元年文明太后令百官}
  - {type: page-break, offset: 861, content: '', id: KR3k0012_SBCK_224-3a}
  - {type: variant, offset: 861, length: 15, content: 舉字宣光梁啇表為從事中郎啇疾甚, WYG: 盤龍自平北將軍爲散騎常侍武}
  - {type: variant, offset: 861, length: 0, content: '', krp: 盤龍自平北將軍爲散騎常侍武帝戯之曰卿著貂蟬何如兠鍪對曰此貂蟬從兠鍪中出耳齊職儀曰魏氏侍中皆騎從御登殿與散騎常侍對挾帝侍中居左常侍居右後魏書曰𥘉髙祖以李彪爲散騎常侍郭祚因入見髙祖謂祚曰朕誤受一人官禄對曰豈容聖詔一行而有差異髙祖曰朕昨誤沉吟曰此自應有讓朕欲别授一官湏臾彪有啓云伯石辭卿子産所惡臣欲之巳乆故不敢讓髙祖歎謂祚曰卿之忠諌李彪正辭使朕遲廻不能復决遂不移官又曰明亮爲常侍加武勇將軍進曰臣本官常侍是第三清今授武勇其號至濁又曰荀頽承明元年文明太后令百官}
  - {type: punctuation, offset: 862, content: ，, id: KR3k0012_CHANT_224-bkkpn229}
  - {type: 'tls:seg', offset: 862, content: '', id: KR3k0012_CHANT_224-11a.4}
  - {type: variant, offset: 862, length: 0, content: '', SBCK: 才堪幹事人足委仗者於是公卿咸以頽應選徴拜散􅀐常侍又曰孝文謂散􅀐常侍元景曰卿等自在集書合省逋墯致使王言遺滯起居不修北齊書曰宋弁爲散􅀐常侍遷右將軍領黄門弁屢讓髙祖曰散􅀐位在中書之右常侍者黄門之庶兄領軍者二衛之假攝不足空存推讓而棄大委又曰朝貴多假常侍以取貂蟬之飾髙隆之自表解侍中并陳請假侍服者亦請罷之詔皆如表三國典略曰齊遣散􅀐常侍崔瞻聘于陳瞻辭韻温雅南人欽服力謂之曰常侍前朝何竟不來今日誰相對者又曰賀琛爲梁散􅀐常侍梁主與語常移晷刻故省中語曰上殿不下有賀雅琛容止都雅故人呼之隋書曰案漢官侍内金蟬左貂金取剛固蟬取髙㓗也董巴志曰内常侍右貂金璫銀附蟬内書今亦同此今宦者去貂内史金蟬右貂納言金蟬左貂開皇時特加散􅀐常待在門下者貂蟬至是罷之唯加常侍聘外國者特給貂蟬還則輸納於内省環濟要略曰散􅀐常侍入侍左右出則侍事於廊廡之下華嶠集云詔曰散􅀐以從容侍從承荅頋問掌讃詔命平處文籍故前世多叅用文學之士義郎華嶠有論義著述之才其以嶠爲散􅀐常侍兼與中書共叅著作事􅱻表謝云非臣典筆申辭所能陳謝貟外散􅀐常侍晉書曰吏部郎李重啓東莞太守曹嘉之才翰學義先代之後冝􅀘貟外常侍晉起居注曰咸康八年司徒王導表貟外常侍孫朝八年告老弃身茨宇永絶榮禄冝給夲官秩俸以終餘年梁書曰賀琛}
