  - {type: variant, offset: 2976, length: 84, content: 文宗以魏謨為補闕上嘗言於宰臣曰太宗皇帝得魏徵採拾闕失弼成聖政今我得魏謨於疑似之間必極匡諫雖不敢希及貞觀之政庶幾處於無過之地命授謨左補闕於內狀備述諫䟽激切詔申書善為之詞唐, WYG: 置通直散騎侍郎四人沈約宋}
  - {type: variant, offset: 2980, length: 365, content: 謨為補闕上嘗言於宰臣曰太宗皇帝得魏徵採拾闕失弼成聖政今我得魏謨於疑似之間必極匡諫雖不敢希及貞觀之政庶幾處於無過之地命授謨左補闕於內狀備述諫䟽激切詔申書善為之詞唐書曰貞元中韋渠牟為右補闕內供奉僚列初輕之上在延英既對宰相多使中貴人召渠牟於官次同輩始注目矣歲中遷左諫議大夫時延英對秉政財賦之臣晝漏率下二三刻為常渠牟奏御率下五六刻上笑語款洽往往外聞又曰韋溫為右補闕忠鯁救時宋申錫被誣溫昌言曰宋公履行有素身居台輔不當有此是姦人䧟害也吾輩諫官豈避一時之雷電而致聖君賢相蒙蔽惑之咎耶因率同列伏閤切爭之由是知名拾遺六典曰拾遺唐垂拱中創立四員左右各二天授初左右各加二員通前為十員才可則登不拘階敘言國家有遺事拾而論之故以名官焉又曰左右拾遺掌供奉諷諫扈從乘輿凡發今舉事有不便於時不合於道大則廷議小則上封若賢良之遺滯於下忠孝之不聞於上則條其事狀而薦言之唐, SBCK: ''}
