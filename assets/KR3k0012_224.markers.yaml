  - {type: variant, offset: 1151, length: 1, content: 山, WYG: 侍也隋書曰許善心加通直散騎常侍聘於隋遇高祖伐陳禮成而不獲反命累表請辭上不許畱縶賔舘及陳亡高祖遣使吿之善心素服號哭於西階之下藉草東向經三日勅書唁焉明日有詔就舘拜通直散騎常侍賜衣一襲善心哭盡哀入房改服復岀北面立垂涕再拜受詔明日乃朝伏泣於殿下悲不能興上顧左右曰我平陳國唯獲此人旣能懷其舊君即是我誠臣也勅以本官直門下省賜物千叚馬二十疋散騎侍郎魏志曰文帝延康元年置散騎常侍侍郎各四人又曰鍾毓字稚叔年十四爲散騎侍郎機㨗談笑有父之風魏略曰孟康字公休安平人黄初中以於郭后有外屬并受}
