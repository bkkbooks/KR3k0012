  - {type: variant, offset: 2468, length: 144, content: 舊制昇為從四品分為左右以備兩省四品之闕向後與丞郎出入迭用以重其選從之五代史周書曰顯德五年勑諫議大夫宜依舊正五品上仍班位在給事中之下按唐六典諫議大夫四員正五品上皆隸門下省班在給事中之下會昌二年十一月中書門下奏升為正四品下仍分為左右以備兩省四品之闕故其班亦升在給事中之上近朝自諫議大夫拜給事中, WYG: ''}
