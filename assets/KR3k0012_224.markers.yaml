  - {type: variant, offset: 4395, length: 581, content: 日左補闕李虞與溫造街中相逢造怒不廻避遂捉李虞祇承人禁身一宿決眷杖十下者臣等謹案國朝政故事供奉官街中除宰相外無所廻避今溫造蔑朝廷典故凌陛下近臣恣行胸臆曾無畏忌伏以事有雖小而關分理者即不可失也分理一失亂由之生遺補官秩雖卑乃陛下侍臣也中丞雖高乃法吏也侍臣見凌是不廣敬法吏壞法何以持繩前時中書舍人李虞仲與造相逢造乃曳去引馬知制誥崔咸與造相逢又捉其從人當時緣不上聞所以強暴益甚臣等又聞元和長慶中中丞行李不過半坊今乃遠至兩坊謂之籠街喝道但以尊崇自處不思僣擬之嫌陛下若不因此特有懲革伏恐從此供奉官輩便須廻避中丞累朝制度失自陛下臣等官忝諫列實為陛下惜之奉勑憲官之職在指佞觸邪不在行李自大侍臣之職在獻可替否不在道途相高並列通班合知名分如聞喧競亦以再三既招人言甚損朝體其臺官與供奉官同道聽先後而行道途任祗揖而過其參從人則各隨本官之後少相僻避勿信衝突又聞近日巳來應合有導從官手力多者街衢之中行李太過自今傳呼前後不過三百步唐書曰歸登為右拾遺裴延齡以姦佞有恩欲為相諫議大夫陽城上䟽切直德宗赫怒右補闕熊執易等亦以危言忤旨初執易草䟽成示登登慘然曰願寄一名雷電之下安忍令足下獨當自是同列切諫登每聯署其奏無所廻避時人稱重又曰王仲舒字弘中貞元十年策試賢良方正能直言極諫等科仲舒登乙第超拜右拾遺裴延齡領度支矯誕大言中傷良善仲舒上䟽極論之又曰趙宗儒拜右拾遺翰林學士父驊改祕書少監與父並命出於中旨當時榮之, SBCK: ''}
