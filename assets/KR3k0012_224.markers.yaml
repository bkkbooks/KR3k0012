  - {type: variant, offset: 3363, length: 284, content: 史張廷珪並薦邕詞高行直堪為諫諍之官由是召拜左拾遺又曰李邕為左拾遺御史中丞宋璟奏侍臣張昌宗兄弟有不順之言請付法推斷則天初不應邕在陛下進曰臣觀宋璟之言事關社稷望陛下可其奏則天色稍解始允宋璟所請既出或謂邕曰吾子名位尚卑若不稱旨禍將不測何為造次如是邕曰不顛不狂其名不彰若不如此後代何以稱也又曰李邕為左拾遺及中宗即位以沃人鄭普思為祕書監邕上書諫曰蓋人感一飱之惠殞七尺之身况臣為陛下官受陛下祿而得目有所見口不言之是負恩矣自陛下親政日近復在九重所以未聞在外群下竊議道路籍籍皆云普思多行詭惑妄說妖祥唯陛下不知尚見驅使此道若行必撓亂朝政臣至愚至賤不敢以胸臆對揚天庭請以古事明證孔丘云詩三, SBCK: 覽卷第二}
