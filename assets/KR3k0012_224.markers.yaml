  - {type: variant, offset: 710, length: 148, content: 相曰諫議大夫江革前以病歸今起居何如夫孝者百行之冠眾善之始也縣以見榖千斛賜巨孝常以八月長吏存問致羊酒以終厥身又曰劉陶字子奇拜諫議大夫靈帝世天下日危陶上䟽言天下亂皆由於宦豎官豎見事急共讒陶詔收黃門北寺獄陶自知必死對使者曰讒邪相求考掠日深臣恨不列稷卨伊周之蹤而與比干龍逢為儔事敗乃悔復何可及閉氣而死續漢, SBCK: ''}
