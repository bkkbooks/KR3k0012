  - {type: variant, offset: 3779, length: 615, content: 王得之永為天下亦非陛下今日可得而求此皆事涉虛妄歷代無効臣愚不願陛下復行之於明時唯堯舜二帝自古稱聖臣觀所行故在人事敦睦九族平章百姓不聞以鬼神之道聽理天下伏願陛下察之則天下幸甚䟽奏不納又曰許景先常州義興人後徙家洛陽少舉進士授夏陽尉神龍初東都起聖善寺報慈閣景先詣闕獻大像閣賦詞甚美麗擢拜左拾遺又曰蕭昕為左拾遺昕常與布衣張鎬為友館而禮之表薦曰如鎬者用之為王者師不用則幽谷一叟爾玄宗擢鎬拾遺不數年出入將相又曰元和中以左拾遺杜從郁為祕書丞從郁司徒佑之子也初自司議郎為左補闕崔群韋貫之左拾遺獨孤郁等上䟽以為宰相之子不合為諫諍之官於是降為左拾遺群等又奏云拾遺與補闕雖資品不同而皆是諫官父為宰相而子為諫官若政有得失不可使子論父於是改授之又曰元和中延英宰臣對訖左拾遺楊歸厚次請對時上坐久宣令後坐日對來歸厚堅詞固請宰相諭之不退上乃召見歸厚首論中官許遂振次歷詆宰輔皆過激切然而自衒求試其詞甚繁逾刻而罷又曰元稹除左拾遺稹性鋒銳見事風生既居諫垣不欲碌碌自滯事無不言即日上䟽論諫職又曰寶曆中左拾遺李漢右拾遺舒元褒薛廷老等五人於閤內諫曰臣伏見近日除授往往不由中書進擬或是宣出臣恐自此紀綱寖壞姦邪恣行伏乞聖恩詳察上厲聲曰更有何事舒元褒進曰陛下近日修造亦太多上色變曰何處修造元褒俛首不能對薛廷老奏曰臣等是諫臣有所聞即合論奏亦豈知陛下修造之所但見般輦瓦木絕多即知修造不巳伏乞稍留聖慮上曰所奏知然後各復位議者以為不廢其職又曰大和三年左拾遺舒元褒等論中丞溫造凌供奉官事今月, SBCK: 十}
