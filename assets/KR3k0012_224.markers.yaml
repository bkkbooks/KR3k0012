  - {type: variant, offset: 866, length: 1, content: 啇, SBCK: 書曰鮑泉嘗乗髙幰車從數十左右繖盖服玩甚精道逢國子􅀕酒王承承疑非舊貫遣訪之泉從者荅曰鮑通直承恠焉復欲辱之遣逼車問鮑通直復是何許人而得如此都下少年遂爲口實見尚豪華人相戯曰鮑通直復是何許人而得如此以之爲􅀏謔北齊書曰張景仁除通直散􅀐常侍及奏御筆􅀧通直字遂爲正常侍也隋書曰許善心加通直散􅀐常侍聘於隋遇髙祖伐陳禮成而不􅀗反命累}
