  - {type: variant, offset: 863, length: 2, content: 宣光, SBCK: 國寳遷貟外散􅀐常侍舊尚書南座無貂貂自琛始也通直散􅀐常侍陶氏職官要録曰晉太始十年詔東平王楙爲貟外常侍通直殿中與散􅀐常侍通直通直之號盖自此始也朱鳯晉書曰左軍陳與騫之子以父老求去職宿衛不冝曠詔以爲通直常侍宋書曰通直散􅀐常侍貟四人魏末散􅀐常侍又有在貟外晉武帝使二人與散􅀐常侍通貟直故謂之通直散􅀐常侍晉江左置四人}
  - {type: variant, offset: 863, length: 2, content: 宣光, krp: 國寳遷貟外散騎常侍舊尚書南座無貂貂自琛始也通直散騎常侍陶氏職官要録曰晉太始十年詔東平王楙爲貟外常侍通直殿中與散騎常侍通直通直之號盖自此始也朱鳯晉書曰左軍陳與騫之子以父老求去職宿衛不冝曠詔以爲通直常侍宋書曰通直散騎常侍貟四人魏末散騎常侍又有在貟外晉武帝使二人與散騎常侍通貟直故謂之通直散騎常侍晉江左置四人}
