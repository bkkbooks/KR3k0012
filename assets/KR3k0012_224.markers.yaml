  - {type: variant, offset: 1312, length: 331, content: 滿十旬未為大樂高祖色變既而笑曰狂態發耶世長曰為臣私計則狂為陛下國計則忠矣又曰王珪為諫議大夫嘗有論諫太宗稱善遂詔每宰相入內平章大計必使諫官隨入與聞政事又曰太宗問諫議大夫褚遂良曰舜造漆器禹雕其俎當時諫舜十有餘人食器之間苦諫何也遂良對曰雕琢害農事綦組傷女工首創奢淫危亡之漸漆器不巳必金為之金器不巳必玉為之所以諫臣必諫其漸及其滿盈無所復諫上然之又曰蕭鈞遷諫議大夫時有左武候引駕盧文操踰垣盜左藏庫物高宗以引駕職在糺繩身行盜竊命有司殺之鈞進諫曰文操所犯情實難原然恐天下聞之必謂陛下輕法律賤人命任喜怒貴財物臣之所職以諫為名愚衷所懷不敢不奏帝謂曰卿職在司諫能盡忠規遂特免其死罪顧謂侍臣曰此乃真諫議也又曰武后臨朝置匭四區共為一室列於朝堂東方春色青有能告以養人及勸農可投書於青匭銘之, WYG: 納桓氏家傳}
