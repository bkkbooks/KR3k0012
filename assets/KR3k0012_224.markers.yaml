  - {type: variant, offset: 927, length: 178, content: 又曰虞承字叔明拜諫議大夫雅性忠謇在朝堂犯顏諫爭終不曲撓散祿賑給諸生言德無比魏志曰賈逵字梁道河東襄陵人也自為兒童戲常設部伍祖父習異之曰汝大必為將帥口授兵法數萬言為丞相主簿太祖善之拜諫議大夫與夏侯尚並掌軍計又曰賈逵字梁道太祖征劉備先遣逵至斜谷觀形勢道逢水衡載囚數十逵以軍事急輒竟重者一人皆放其餘太祖善之拜諫議大夫蜀志曰尹默字思潛以左氏傳教授後主踐阼拜諫議大夫晉, SBCK: 宋}
