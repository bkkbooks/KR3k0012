  - {type: variant, offset: 1182, length: 195, content: 高祖嘗嘲蘇世長曰名長意短口正心邪棄忠貞於鄭國忘信義於吾家世長對曰名長意短實如聖旨口正心邪未敢奉詔昔竇融以河西降漢十世封侯臣以山南歸國唯蒙屯監於是拜為諫議大夫又曰蘇世長擢拜諫議大夫從幸涇陽校獵大獲禽獸於旌門高祖入御營顧謂朝臣曰今日畋樂乎世長進曰陛下遊獵薄廢萬機不滿十旬未為大樂高祖色變既而笑曰狂態發耶世長曰為臣私計則狂為陛下國計則忠矣又曰王珪為諫議大夫嘗有論諫太宗稱善遂詔每宰相入內平章大計必, SBCK: 晉元帝}
