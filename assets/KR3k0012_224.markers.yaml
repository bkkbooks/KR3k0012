  - {type: variant, offset: 866, length: 1, content: 啇, krp: 書曰鮑泉嘗乗髙幰車從數十左右繖盖服玩甚精道逢國子祭酒王承承疑非舊貫遣訪之泉從者荅曰鮑通直承恠焉復欲辱之遣逼車問鮑通直復是何許人而得如此都下少年遂爲口實見尚豪華人相戯曰鮑通直復是何許人而得如此以之爲笑謔北齊書曰張景仁除通直散騎常侍及奏御筆點通直字遂爲正常侍也隋書曰許善心加通直散騎常侍聘於隋遇髙祖伐陳禮成而不獲反命累}
  - {type: variant, offset: 868, length: 1, content: 為, SBCK: 請辭上不許留縶賔館及陳亡髙祖遣使告之善心素服號􅂘於西階之下藉草東向經三日勑書唁焉明日有詔就館拜通直散􅀐常侍賜衣一襲善心􅂘盡哀入房改服復出北面立垂涕再拜受詔明日乃朝伏泣於殿下悲不能興上頋左右曰我平陳國唯復此人旣能懷其舊君即是我誠臣也勑以夲官直門下省賜物千叚馬二十疋散􅀐侍郎魏志曰文帝延康元年置散􅀐常侍侍郎各四人又曰鍾敏字雅叔每十四爲散􅀐侍郎機捷談􅀏有父之風魏略曰孟康字公休安平人黄􅀄中以於郭后有外属并受九親賜拜遂轉爲散􅀐常侍是時散􅀐皆以髙才英儒充其選而康獨縁妃嬙雜在其間故于時皆共輕之號爲阿九康旣才敏因在冗官􅀶讀書傳後遂有所彈駮其文義雅而切要衆人乃更加意晉陽秋曰荀顗字景倩帝見而竒之曰荀令君子也擢拜散􅀐侍郎于寳晉紀曰處士馮恢志行過人以爲散􅀐侍郎張華曰臣請觀之􅀂不見臣上也見而有慠丗之容次也敬而爲賔主者固俗士也及華至恢待之恭於是時人少之唐書曰髙祖􅀄平長安拜舞人安叱奴爲散􅀐侍郎旣在朝列咸陪遊宴禮部尚書李綱諌曰臣案周禮均工樂胥不得預於士伍雖復才如子野妙等師襄皆終身繼世不易其業故魏武帝欲使禰衡擊鼓先解朝服露體而擊之問其故對曰不敢以先王法服而爲伶人之衣也唯齊末髙緯封曹妙逹爲王安馬駒爲開府有國家者以爲殷監今新定天下開太平之基起義功臣行賞未遍髙才碩學猶滯草萊而先令舞胡致位五品鳴玉曵組趍馳廊廟故非創規模貽子孫之道也髙祖不納􅁊氏家傳曰延康元年􅀄置散􅀐之官皆選親舊文武之才以爲賔宴之臣遷􅁊範爲散􅀐侍郎陶氏職官要録曰案漢􅀄有􅀐郎常侍有資者得爲􅀐郎資滿五萬爲常侍郎張釋之以資爲常侍郎盖此官也華嶠譜叙曰華歆有三子表字偉咎年二十餘爲散􅀐侍郎時同寮諸郎共平尚書事少並厲鋒氣要名譽尚書事至或有不便故遺漏不視及傳書者去即深文論駮唯表不然事有不便輙與尚書共論盡其意主者固執不得巳然後共奏司空陳恭等以此稱之貟外散􅀐侍郎晉起居注曰大興四年詔曰今以前司空}
