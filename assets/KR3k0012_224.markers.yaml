  - {type: variant, offset: 2078, length: 283, content: 自此名重天下又曰崔郾遷諫議大夫穆宗即位荒於禽酒坐朝恒晚郾與同列鄭覃等延英切諫穆宗甚喜之畋遊稍簡又曰文宗嘗於便殿召柳公權周墀對公權論事切直忤旨周墀為之惴慓公權詞氣益堅上徐謂公權曰朕知舍人不合卻作諫議以卿論事有爭臣之風今授卿諫議大夫又曰孔戣為諫議上䟽以事四條陳諷後有李涉投匭上言吐突承璀公忠戣為匭使覽副狀大怒逐之因上䟽苦諫遂貶涉倖臣聞之側目人皆為危之高步公卿間以方嚴見憚又曰馮定為諫議大夫李訓事敗伏誅衣冠撗罹其禍中外危疑及改元御殿中尉仇士良請用神策仗衛在殿門定抗䟽論罷人情危之又請許左右史隨宰臣入延英記事又曰會昌元年中書門下奏據六典隋置諫議大夫七人從四品上大曆二年昇門下, WYG: 爲散騎}
