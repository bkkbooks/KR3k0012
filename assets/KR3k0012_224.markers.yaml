  - {type: variant, offset: 2489, length: 490, content: 與丞郎出入迭用以重其選從之五代史周書曰顯德五年勑諫議大夫宜依舊正五品上仍班位在給事中之下按唐六典諫議大夫四員正五品上皆隸門下省班在給事中之下會昌二年十一月中書門下奏升為正四品下仍分為左右以備兩省四品之闕故其班亦升在給事中之上近朝自諫議大夫拜給事中者官雖序遷位則降等至是以其遷次不倫故改正焉三輔決錄曰第五頡字子陵為諫議大夫洛陽無主人鄉里無田宅寄止靈臺中或十日不炊補闕六典曰補闕唐垂拱中創立四員左右各二天授年初左右各加三員通前為十員其或才職相當不待闕而授言國家有過闕而補正之故以名官焉又曰左右補闕掌供奉諷諫扈從乘輿凡發令舉事有不便於時不合於道大則廷議小則上封若賢良之遺滯於下忠孝之不聞於上則條其事狀而薦言之唐書曰王源中字正蒙早以文學知名升進士第宏詞科累遷至左補闕時典禁軍者不循法度至有臺府人吏皆為追擒源中上䟽其略曰夫臺憲者紀綱之地府縣者責成之所設有罪犯宜歸司存安有北軍勢重於南衙輦下權傾於仗內乞還法司庶守職分憲宗可其請又曰裴垍在中書有獨孤郁李正辭嚴休復自拾遺轉補闕及參謝之際垍廷語之曰獨孤與李二補闕孜孜獻納今之遷轉可謂酬勞無愧矣嚴補闕宮業或異於斯昨者進擬不無疑緩休復悚恧而退又曰文宗以, SBCK: ''}
