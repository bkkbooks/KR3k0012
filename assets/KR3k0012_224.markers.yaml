  - {type: variant, offset: 1378, length: 905, content: 諫官隨入與聞政事又曰太宗問諫議大夫褚遂良曰舜造漆器禹雕其俎當時諫舜十有餘人食器之間苦諫何也遂良對曰雕琢害農事綦組傷女工首創奢淫危亡之漸漆器不巳必金為之金器不巳必玉為之所以諫臣必諫其漸及其滿盈無所復諫上然之又曰蕭鈞遷諫議大夫時有左武候引駕盧文操踰垣盜左藏庫物高宗以引駕職在糺繩身行盜竊命有司殺之鈞進諫曰文操所犯情實難原然恐天下聞之必謂陛下輕法律賤人命任喜怒貴財物臣之所職以諫為名愚衷所懷不敢不奏帝謂曰卿職在司諫能盡忠規遂特免其死罪顧謂侍臣曰此乃真諫議也又曰武后臨朝置匭四區共為一室列於朝堂東方春色青有能告以養人及勸農可投書於青匭銘之曰延恩南方夏色赤有能正諫論時政之得失可投書於丹匭銘之曰招諫西方秋色白有能自陳抑屈可投書於素匭銘之曰申冤北方水色玄有謀智者可投書於玄匭銘之曰通玄宜令正諫大夫補闕拾遺等一人充使知匭事每日所有投書至暮即進天寶九載三月改匭為獻納又曰李景伯遷諫議大夫中宗嘗宴侍臣及朝集使酒酣令各為廻波詞眾皆為謟佞之詞及自要榮位次至景伯曰廻波爾時酒巵微臣職在箴規侍宴既過三爵諠譁竊恐非儀中宗不悅中書令蕭至忠稱之曰此真諫官也又曰至德元年制諫議大夫論事自今巳後不須令宰相先知又曰乾元二年四月兩省諫官十日一上封事直論得失無假文言既成殿最用存沮勸又曰陽城為諫議大夫裴延齡讒譖陸贄等坐貶黜德宗怒不解在朝無救者城聞而起曰吾諫官也不可天子煞無罪人而信用姦臣即率拾遺王仲舒等數人守延英門上䟽論延齡姦佞贄等無罪狀德宗大怒召宰相入語將加城等罪良久乃解令宰相論遣之於是金吾將軍張萬福聞諫官伏閤諫趍往至延英門大言賀曰朝廷有直臣天下必太平矣遂遍拜城及王仲舒等曰諸諫議能如此言事天下安得不太平巳而連呼太平太平萬福武人時年八十餘自此名重天下又曰崔郾遷諫議大夫穆宗即位荒於禽酒坐朝恒晚郾與同列鄭覃等延英切諫穆宗甚喜之畋遊稍簡又曰文宗嘗於便殿召柳公權周墀對公權論事切直忤旨周墀為之惴慓公權詞氣益堅上徐謂公權曰朕知舍人不合卻作諫議以卿論事有爭臣之風今授卿諫議大夫又曰孔戣為諫議上䟽以事四條陳諷後有李涉投匭上言吐突承璀公忠戣為匭使覽副狀大怒逐之因上䟽苦諫遂貶涉倖臣聞之側目人皆為危之高步公卿間以方嚴見憚又曰馮定為諫議大夫李訓事敗伏誅衣冠撗罹其禍中, SBCK: 貟}
