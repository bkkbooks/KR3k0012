  - {type: variant, offset: 74, length: 2, content: 明東, WYG: 元中杜暹為監察御史西往覆屯蕃人齎金以遺暹固辭不受左右以不可失蕃人之情暹受而埋於幕下既出境乃移牒令收取之又曰徳宗詔曰朕聞王者不貴逺物所寳惟賢故堯設茅茨禹卑宫室光武捨去寳劒順帝封還大珠朕仰企前王思齊太素邕州所奏金坑誠徳其物豈尚兹難得之貨生其可欲之心耶其金坑任人採􅓯官不得占又曰真元元年四月南詔王異牟尋與其酋長定計遣使趙羅眉由南安使凡三軰致書於韋臯各齎生金丹沙為贄三分前臯所與年尋書各持其一為信嵗中三至京師且曰牟尋請帥大國永為藩臣所獻生金以喻向化之意堅如金也丹沙示其心赤耳上嘉之乃賜牟尋南詔王又曰韋執誼時為翰林學士受賕為人求科第夏卿不應執誼乃探懐中出金以内夏卿䄂夏卿驚曰吾與若頼先人徳致名位幸各已逹豈可如此自毁壊擺䄂而去執誼慙又曰路随為翰林學士乃兼金紫}
