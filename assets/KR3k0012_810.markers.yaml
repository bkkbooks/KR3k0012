  - {type: variant, offset: 643, length: 10, content: 毛詩衛淇澳木瓜曰投我, SBCK: 中央數五故五百歳一化澒音胡貢反澒黄金水銀也􅁗}
  - {type: variant, offset: 643, length: 94, content: 毛詩衛淇澳木瓜曰投我以木桃報之以瓊瑤周禮天官下曰內宰以婦職教九御大祭祀后裸獻則贊瑤爵亦如之左傳昭二曰燕人歸燕姬賂以瑤甕說文曰瑤石之美者山海經曰章義之山是多瑤瑤玉屬劉公幹清慮賦曰憑文瑤之几對, WYG: 中央數五故五百嵗一化澒音胡貢反澒黄}
