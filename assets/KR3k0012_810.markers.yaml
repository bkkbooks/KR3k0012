  - {type: variant, offset: 1455, length: 884, content: 錫居一謂之鍾鼎之齊五分其釜而錫居一謂之斧斤之齊四分其金而錫居一謂之戈戟之齊三分其金而錫居一謂之大刃之齊五分其金而錫居二謂之制殺之齊金錫半謂之鑒燧之齊鄭玄曰鑒鏡也金多錫則刃白且明毛詩魯頌泮水曰憬彼淮夷來獻其琛元龜象齒大賂南金周易噬嗑卦曰六五噬乾肉得黃金又鼎卦曰六五鼎黃耳金鉉利貞又上繫曰二人同心其利斷金又說卦曰乾為金爾雅曰黃金謂之璗其美者謂之鏐鉼金謂之鈑絕澤謂之銑美金最有光澤西南之美者有華山之金石焉史記秦本紀曰獻公十八年雨金櫟陽公自以得金瑞故作鄜畤於櫟陽祀白帝又曰秦始皇葬驪山以黃金為鳧鴈又曰衛鞅入秦孝公以鞅為左庶子長卒定變法令乃立三丈之木於國都市南門募民有能徙置北門者子五十金有一人徙之輒予五十金以明不欺又曰呂不韋乃使其客人人著所文號呂氏春秋布咸陽市門懸千金其上有能增損一字者予千金又曰項羽以陳平為信武君擊殷而還拜平為都尉賜金三十鎰居無何漢攻下殷項王怒將誅定殷者平懼迺封其金與印使歸間行杖劍亡渡河又曰漢王與陳平金四萬斤以間䟽楚君臣不問其出入也又曰吳楚反孝景以竇嬰為大將軍賜金千斤嬰陳之廊廡下軍吏過輒令財取為用金無入家者漢書曰文帝初立以陳平為丞相位第二賜平金千鎰封三千戶又曰梁孝王未死時金以巨萬計不可勝數及死藏府余黃金尚三十餘萬斤又曰季布為任俠有名楚人諺曰得黃金百不如得季布諾又曰董偃見寵館陶長公主安陵袁叔謂偃曰顧成廟遠無宿宮何不白主獻長門園於上董君入白主主獻之上大悅更名為長門宮主大喜董君以黃金百斤為袁叔壽又曰武帝即位欒大曰臣之師曰黃金可成而河決可塞又曰衛青北伐將十餘萬眾擊破斬首虜之士受賜黃金三十餘萬斤又曰劉向字子政本名更生宣帝時更生言黃金可成上令典尚方鑄作事費甚多方不驗又曰直不疑為郎其同舍郎有告歸誤持同舍郎金去主意不疑不疑買金償之而告歸者來歸金亡者大慚又曰韋賢少子玄成復以明經歷任至丞相故鄒魯諺曰遺子黃金滿籯不如一經如淳曰籯作器受三升今陳留俗有此器淳以為滿籯言甚多耳非器名謂陳留之俗則吾陳留人也不聞有此器又曰尹翁歸卒家無餘財天子賢之賜翁歸子黃金百斤以奉其祭祠又曰踈廣徙為太傅兄子受為少傅父子並為師傅俱乞骸骨皆許之加賜黃金二十斤皇太子賜以五十斤又曰秦幣黃金方寸而, SBCK: ''}
