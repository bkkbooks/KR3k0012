  - {type: variant, offset: 7, length: 2, content: 經援, SBCK: 子呉奉爲孝㢘奉賫金爲禮載閇門不受奉以囊盛投載園中而逝載追不及賫金至廣陵還奉又曰雷義字仲公常濟人死罪者後以金二斤謝之義不受金主候義不在嘿投金於承塵上後葺治屋得金主巳死義乃以付縣曹張璠漢記曰永昌太守鑄黄金之虵献之梁兾益州刺史种暠發其事後漢書曰中興􅀄有應嫗者生四子而寡見}
