  - {type: variant, offset: 2462, length: 22, content: 楊震為東萊太守道經昌邑初震為茂才王密時為昌邑, SBCK: 子極溺者金玉不􅀂得㝷常纆傳子曰懸千金於市人不敢取者分定矣委一錢於路童子争者分不定矣抱朴子曰合金液用古稱黄金一斤都合用四十萬而成一劑可}
  - {type: variant, offset: 2462, length: 2, content: 楊震, WYG: 予拯溺者金玉不若得尋常纒𫝊子曰懸千金於市人不敢取者分定矣委一錢於路童子爭者分不定矣抱朴子曰合金液用古稱黄金一斤都合用四十萬而成一劑可令八仙人也其次餌黄金一斤可得地仙又内篇曰山中亥日稱人字者金玉知其物則不能}
  - {type: variant, offset: 2462, length: 22, content: 楊震為東萊太守道經昌邑初震為茂才王密時為昌邑, krp: 子極溺者金玉不若得㝷常纆傳子曰懸千金於市人不敢取者分定矣委一錢於路童子争者分不定矣抱朴子曰合金液用古稱黄金一斤都合用四十萬而成一劑可}
