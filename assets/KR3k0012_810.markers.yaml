  - {type: variant, offset: 654, length: 799, content: 木桃報之以瓊瑤周禮天官下曰內宰以婦職教九御大祭祀后裸獻則贊瑤爵亦如之左傳昭二曰燕人歸燕姬賂以瑤甕說文曰瑤石之美者山海經曰章義之山是多瑤瑤玉屬劉公幹清慮賦曰憑文瑤之几對金精之盤馬融廣成賦曰鎮以瑤臺純以金提張衡四愁詩曰美人贈我金錯刀何以報之美瓊瑤瑊廣雅曰瑊石次玉也山海經曰葛山之下多瑊石郭璞注曰瑊𤨙似玉之名司馬相如子虛賦曰其石則瑊𤨙玄厲𤨙音力也珉禮記聘義曰子貢問於孔子曰敢問君子貴玉而賤珉者何也為玉之寡而珉之多與孔子曰非為珉之多故賤之也玉之寡故貴之也夫昔者君子比德於玉焉說文曰珉石之次玉也司馬相如子虛賦曰其玉則琳珉昆吾木難玄中記曰木難出大秦廣志曰木難珠其色黃生東夷南越志曰木難金翅鳥口結沬所成碧色珠也大秦土人珍之曹植樂府詩曰珊瑚間木難瓀石禮記玉藻曰士珮瓀玫而縕組綬廣雅曰鴈門出石白也郭璞曰今鴈門出碝石白也如冰亦有赤者也山海經曰北渚之山其上多碝石司馬相如子虛賦曰碝石武夫璿瑰山海經曰沃民之國爰有璿瑰瑤碧玫瑰廣雅曰神靈滋液百寶用則玫瑰出魏略曰大秦國出玫瑰班彪上事曰吏民葬埋有馬被毛鬣角蹄玫瑰目眥以法禁之司馬相如子虛賦曰其石則赤玉玫瑰武夫廣雅曰武夫石次玉也戰國策曰西門豹為鄴令魏文侯曰夫物多相類而非白骨疑象武夫類玉漢書曰董仲舒曰五怕其比三王猶武夫之與美玉也山海經曰會稽之山其上多砆石郭璞注曰今武夫石也似玉長沙臨湘縣出之赤地白文色葱蘢不分也廣志曰武夫有白黑以為枋碁杜萬年相風賦曰太僕傅侯命余賦之誠知武夫非荊寶之倫長庾啟明非曜靈之疋金上說文曰金五色金也黃金為之長久埋不生衣百淘不輕從革不違西方之行也生於土從土左右注象金在土中形釋名曰金禁也氣剛毅能禁制物也尚書舜典曰金作贖刑孔安國曰金黃金誤而入刑出金以贖刑也又禹貢曰淮海惟揚州厥貢惟金三品孔安國曰金銀銅也又洪範曰五行四曰金從革作辛孔安國曰金可以改更周禮考工記曰攻金之工築氏執下齊冶氏執上齊鳧氏為聲栗氏為量叚氏為鑄器桃氏為刃鄭玄注曰多錫為下齊少錫為上齊金有六齊六分其, SBCK: 一鎰爲一}
