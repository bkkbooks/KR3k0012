  - {type: variant, offset: 64, length: 1, content: 秦, SBCK: 􅁗}
  - {type: variant, offset: 67, length: 2, content: 琅玕, SBCK: 金織成帳也魏志曰繁昌縣授禪石碑中生金表送上羣臣盡賀蜀志曰先主平蜀賜諸􅁑亮等金數百斤王隱􅀳書曰永嘉􅀄陳國項縣賈逵石碑中生金人盗鑿取賣賣巳復生此江東之瑞也又曰咸寜三年起居注載燉煌郡上釜銅生金中百陶不消可以切玉又曰鄱陽樂安出黄金鑿土十餘丈披沙之中所得者大如豆小者如􅆝米南郡象林南有四國皆稱漢人貢金供稅􅀳後略曰載賈后以鹿車詣金墉城飡金屑而死晉書曰清河王覃􅀄爲清河丗子所佩金鈴歘生隱起如麻粟者祖母夲陳太妃以爲不祥毀而賣之占者以金是􅀳行大興之祥覃爲皇胤是其瑞也毀而賣之象覃見廢不終之驗也晉永和起居注曰廬江太守路永表言於􅂖城北見水岸邊紫赤光得金一枚文如印齒宋書曰禇彦回爲吏部尚書有人求官宻䄂中將一餅金因求清閑出金示之曰人無知者彦回曰卿自應得官無假此物􅀂必見與不得不相啓此人大懼収金而去彦回叙其事而不言其名時人莫之知也南史曰南海扶南國王諸農死子陽邁立陽邁􅀄在孕其母夢生兒有人以金蓆籍之其色光麗夷人謂金之精者爲陽邁中國云紫磨者因以爲名宋永􅀄二年遣使貢献以陽邁爲林邑王宋書曰齊武帝常至劉悛宅晝卧􅁴悛自捧金澡灌受四􅂛以沃盥因以與帝齊書曰金車王者至孝則出金人王者有盛德則游於後池林邑有金}
  - {type: page-break, offset: 67, content: '', id: KR3k0012_SBCK_810-2a}
  - {type: page-break, offset: 67, content: '', id: KR3k0012_SBCK_810-2b}
  - {type: variant, offset: 67, length: 2, content: 琅玕, WYG: 金織成帳也魏志曰繁昌縣授禪石碑中生金表送上群臣盡賀蜀志曰先主平蜀賜諸葛亮等金數百斤王隱晉書曰永嘉初陳國項縣賈逵石碑中生金人盗鑿取賣賣已復生此江東之瑞也又曰咸寕三年起居注載燉煌郡上金洞中生金百陶不消可以切玉又曰鄱陽樂安出黄金鑿土十餘丈披沙之中所得者大如豆小如粱米南郡象林南有四國皆稱漢人貢金供稅晉後略載賈后以鹿車詣金墉城飡金屑而死晉書曰清河王覃初為清河世子所佩金鈴歘生隱起如麻粟者祖母陳太妃以為不祥毁而賣之占者以金是晉行大興之祥覃為皇𦙍是其瑞也毁而賣之象覃見廢不終之驗也晉永和起居注曰廬江太守路永表言於榖城北見水岸邊紫赤光得金一枚文如印齒宋書曰彦回為吏部尚書有人求官宻䄂中將一餅金因求間出金示之曰人無知者彦回曰卿自應得官無假此物若必見與不得不相啓此人大懼收金而去彦回叙其事而不言其名時人莫之知也南史曰南海扶南國王諸農死子陽邁立陽邁初在孕其母夣生兒有人以金蓆藉之其色光麗夷人謂金之精者為陽邁中國云紫磨者因以為名宋初二年遣使貢獻以陽邁為林邑王宋書曰齊武帝常至劉俊宅晝卧覺俊自奉金澡灌受四升以沃盥因以與帝齊書曰金車王者至孝則出金汁王者有盛徳則游於後池林邑有金}
