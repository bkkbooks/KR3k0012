  - {type: variant, offset: 89, length: 3, content: 崑崙墟, SBCK: 玉起於禺氏山金起於汝漢珠起於赤野此寶相去各七千里湯以杜山之金以贖民之賣子者禹以歴山之金贖賣子者江陽之珠天下一美上有丹砂下有黄金上有慈石下有銅金上有陵石下有鈆錫上有赭下有鐡􅁑盧山發而出金􅃖尤取以爲劒鎧雍狐山發而出金􅃖尤取以爲㦸楚有汝漢之黄金晏子曰景公爲履黄金之綦僅能舉之列子曰齊人有鬻金者清旦衣冠之市適鬻金者之所因攫其金而去吏捕得之問曰人皆在焉子攫人之金何故對曰取金之時}
  - {type: page-break, offset: 89, content: '', id: KR3k0012_SBCK_810-6a}
  - {type: variant, offset: 89, length: 3, content: 崑崙墟, WYG: 玉起於禺氏山金起於汝漢珠起於赤野此相寳去七十里湯以杜山之金以贖民之賣子者禹以歴山之金贖賣子者江陽之珠天下一美上有丹沙下有黄金上有慈石下有銅金上有陵石下有鈆錫上有赭下有鐡葛盧山發而出金蚩尤取以為鎧雍狐山發而出金蚩尤取以為㦸楚有汝漢之黄金晏子曰景公為履黄金之綦僅能舉之列子曰齊人有欲金者清旦衣冠之市適鬻金者之所因攫其金而去吏捕得之問曰人皆在焉子攫人之金何故對曰取金之時}
  - {type: page-break, offset: 89, content: '', id: KR3k0012_WYG_810-9b, image: WYG0900/WYG0900-0188b.png}
  - {type: variant, offset: 89, length: 3, content: 崑崙墟, krp: 玉起於禺氏山金起於汝漢珠起於赤野此寶相去各七千里湯以杜山之金以贖民之賣子者禹以歴山之金贖賣子者江陽之珠天下一美上有丹砂下有黄金上有慈石下有銅金上有陵石下有鈆錫上有赭下有鐡葛盧山發而出金蚩尤取以爲劒鎧雍狐山發而出金蚩尤取以爲㦸楚有汝漢之黄金晏子曰景公爲履黄金之綦僅能舉之列子曰齊人有鬻金者清旦衣冠之市適鬻金者之所因攫其金而去吏捕得之問曰人皆在焉子攫人之金何故對曰取金之時}
  - {type: variant, offset: 93, length: 1, content: 朝, SBCK: 見人徒見金魯連子曰􅁗圍趙邯鄲魏使將軍新垣衍入邯鄲令趙尊􅁗爲帝魯連子􅀃罷之􅁗軍退平原君以千金爲先生壽􅀏曰􅀂即有取啇賈之事連不忍爲也莊子曰今大冶鑄金金踊躍曰我且必爲鏌鎁大冶必以爲不祥之金又曰以瓦注者巧以黄金注者昏所要重則心矜又曰至仁無親至信辟金金玉小信之質耳至信則隆又曰金石有聲不考不鳴也韓子曰荆南麗水之中生金又曰魯丹三􅀃中山之君而不受也因散五十金事其左右復見未語而君與之食魯丹出不及舎遂去中山其御曰交乃始善我何故去之魯丹曰夫以人言善我必以人言罪我未出境而公子惡之曰爲趙來間中山君因索而罪之又曰張譴相韓病將死公乗無正懷三十金而問之其疾居一月公自問張譴曰君子死將誰使代子荅曰無正法而畏上雖然不如公子食我之得民也張譴死因相公乗無正又曰荆王弟在􅁗􅁗不出也中尉之士曰資臣百金臣能出之因載百金之􅀳見叔向曰荆王弟在􅁗􅁗不出也}
  - {type: page-break, offset: 93, content: '', id: KR3k0012_SBCK_810-6b}
  - {type: variant, offset: 93, length: 1, content: 朝, WYG: 見人徒見金魯連子曰秦圍趙邯鄲魏使將軍新垣衍入邯鄲令趙尊秦為帝魯連子說罷之秦軍退平原君以千金為先生夀笑曰若即有取商賈之事連不忍為也莊子曰今大冶鑄金金踴躍曰我且必為鏌鎁大冶必以為不詳之物又曰以瓦注曰巧以黄金注者昏所要重則心矜又曰至仁無親至信碎金金玉小信之貝耳至信則隆又曰金石有聲不考不鳴也韓子曰荆南麗水之中生金又曰魯丹三說中山之君而不受也因散五十金事其左右復見未語而君與之食魯丹出不及舍遂去中山其御曰交乃始善我何故去之魯丹曰夫以人言善我必以其人言罪我未至境而公子惡之曰為趙來間中山君因索之又曰張譴相韓病將死公乘無正懐三十金而問之其病居一月公自問張譴曰君子死將誰使代子答曰無正法而畏上雖然不如公子食我之得民也張譴死因相公乘無正又曰荆王弟在秦秦不出也中尉之士曰資臣百金臣能出之因載百金之晉見叔向曰荆王弟秦秦不出也}
