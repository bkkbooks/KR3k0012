  - {type: variant, offset: 70, length: 2, content: 海經, SBCK: 金汁流於浦又曰梁武帝於襄陽起兵蕭頴胄以荆州應焉時長沙寺僧鑄黄金爲龍數千兩埋土中歴相傳付稱爲下方黄鐵頴胄因取此龍以充軍實梁書曰武陵王紀鎭蜀旣東下黄金一斤爲一餅百餅爲簉至百簉銀五倍之其他錦􅄢稱是每戰則懸金以示將士終不賞賜又曰廬陵王續之子應不惠王薨至庫内閱珎物見金鋌問左右曰此可食不荅曰不可應曰旣不可食並㹅乞汝南史曰林邑國有山皆赤色其中生金金夜則出飛狀如螢火又曰甄法崇之孫彬有行業郷黨稱善甞以一束䇡就州長沙寺庫質錢後贖䇡還於䇡束中得五兩金以手巾裹之彬得送還寺庫道人大驚云近有人以此金質錢時有事不得舉而失擅越乃能見還輙以金半仰酬徃復十餘彬堅然不受詠曰五月披羊裘而􅀒薪豈拾遺金者耶卒還金梁武帝布衣而聞之及踐祚以西昌侯藻爲益州刺史乃以彬爲府録事叅軍帶郫縣令將行同列五人帝誡以㢘愼至彬獨曰卿昔有還金之美故不復以此言相屬由此名德益彰陳書曰歐陽頠在嶺南交州刺史􅀽曇綬密以金五百兩􅀉頠令以百兩還合浦太守龔爲四百兩付兒智矩餘人弗之知頠㝷爲蕭㪍所破貲財並盡唯所􅀉金獨存曇緩亦㝷卒至是頠並依信還之時人莫不歎伏之崔鴻十六國春秋後趙録曰建武元年十一月不􅀨雪至二年八月􅂖價湧貴金一斤直米二􅂛又前燕録曰汜昭字嗣先燉煌人辟州主簿志在理枉申滯人有於夜中報昭黄金者昭責而遣之後魏書曰趙柔字元順甞在路得人所遺金珠一貫價直百縑柔呼主還之又曰孫􅁤字元慶爲諸軍司馬太武平赫連昌引諸帥入其府藏各令任意取金玉諸將取之􅄹懷􅁤獨不取帝把手親探金賜之謂之曰卿臨財廉朕所以増賜者欲顯廉於衆人又曰叚揮自慕容璝歸魏太武至長安人告暉欲南奔云置金於馬韀中帝宻遣視之果如告者斬之於市又曰李安丗爲主客令毎有江南使至多出藏内珎寳令都下冨室好容服者貨之令使任情交易時齊劉纉至金玉肆問價纉曰北方金玉太賤當是山川所出安丗曰聖朝不貴金玉所以同於瓦礫又皇上德通神明地不愛寳故川無金山無玉纉􅀄將大市得安丗言慙而罷又曰副貨國城周匝七十里國王有黄金殿殿下有駞七頭髙三尺又曰拔豆國出金銀河鈎羗國出金珠北史齊李㓜㢘少寡欲爲兒童時􅀄不從家人所求請故甞以金寳授之終不取強付輙擲之地後爲南青州刺史主簿徐乾富而􅁀横歴政不能禁㓜㢘􅀄至因其有犯収繫之乾宻通䟽奉黄金百挺奴婢二十人㓜㢘不受遂殺之北史隋獻皇后山陵後帝賜楊素金鉢一實以金銀鉢一實以珠隋書曰上賜王公巳下射楊素箭爲第一上手以外國所献金精盤價直鉅萬以賜之唐書曰太宗謂侍臣曰水旱不調皆爲人君失德朕德不修天當責朕百姓何罪而尚多窮困聞有鬻男女者朕甚愍焉於是遣御史大夫杜淹廵􅀜内諸州出御府金寳贖還父母又}
