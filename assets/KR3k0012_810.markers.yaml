  - {type: variant, offset: 74, length: 2, content: 明東, SBCK: 元中杜暹爲監察御史徃西覆屯蕃人賫金以遺暹因辭不受左右以不可失蕃人之情暹受而埋於幕下旣出境乃移牒令収取之又曰德宗詔曰朕聞王者不責逺物所寳惟賢故堯設茅茨禹卑宫室光武捨去寳劒順帝封還大珠朕仰企前王思齊太素邕州所奏金坈誠爲潤國語人於利非朕素懷方以不貪爲寳惟德其物豈尚兹難得之貨生其可欲之心耶其金坈任人採斸官不得占又曰貞元元年四月南詔王異牟㝷與其酋長定計遣使趙莫羅眉由南安使凡三軰致書於韋臯各賫生金丹砂爲贄三分前臯所與牟㝷書各持其一爲信歳中三至京師且曰牟㝷請歸大國永爲藩巨所献生金以喻向化之意堅如金也丹沙示其赤心耳上嘉之乃賜牟㝷詔書又曰韋執􅁩時爲翰林學士受賕爲人求科第夏卿不應執􅁩乃􅊥懐中出金以内夏卿䄂夏卿驚曰吾與􅀂頼先人德致名位幸各已達豈可如此自毀壞擺䄂而去執􅁩大慙又曰路隨爲翰林學士乃兼金紫}
