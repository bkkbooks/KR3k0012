  - {type: variant, offset: 163, length: 478, content: 脂本草經曰青琅玕一名珠圭張衡南都賦曰珍羞琅玕充溢員方注曰飾樂用金銀及琅玕王延壽魯靈光殿賦曰駢密石與琅玕齊玉璫與璧瑛盧湛朝霞賦曰想神芝於瀛洲若琅玕於層城火齊說文曰火齊玫瑰也韻集曰琉璃火齊珠也漢武故事曰上起神屋綴以火齊吳錄曰南西倦縣有火齊如雲母重沓可開色黃似金南州異物志曰火齊出天笁狀如雲母色如紫金離別之如蟬翼積之如紗縠重沓張衡西京賦曰翡翠火齊絡以美玉碧孝經援神契曰神靈滋液則碧出廣雅曰碧有縹碧綠有碧出越嶲雲南說文曰碧石之美者漢書曰宣帝時或言益州有金馬碧雞之神可醮而致之於是遣王褒持節求焉如淳曰金形似馬碧形似雞紀年曰惠成王七年雨碧于郢漢武故事曰帝起神屋基及戶悉以碧石魏略曰大秦國出碧晉太康地記曰雲南青蛉縣出碧異苑曰越嶲會元縣元馬河畔有祠河中有碧珠若不祭祀取之不祥莊子曰萇弘死于蜀藏其血三年化為碧司馬彪曰萇弘忠而流故其血不朽而化為碧也矯世論曰碧似玉唯猗頓別之張衡羽獵賦曰乘瑤碧之雕軒建輝天之華旗左思吳都賦曰紫貝流黃縹碧素玉也又蜀都賦曰其中則有青珠黃環碧弩芒消張衡南都賦曰綠碧紫英青艧丹粟劉琨與兄子書曰單于但欲得碧汝不可不撿送之瑤尚書禹貢曰楊州厥貢瑤琨孔安國曰皆美, WYG: 黄龍玦}
