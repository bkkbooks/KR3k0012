  body:
  - {type: variant, offset: 3, length: 203, content: 十二銅左傳僖中曰鄭伯朝楚楚子與之金既而悔之與之盟曰無以鑄兵故以鑄三鍾金銅史記曰秦使徐福入海還偽辭曰臣見海中大神曰汝秦王之神薄得觀而不得取即從臣往蓬萊山見芝城宮闕有使者銅色而龍形光上照天又曰秦始皇收天下兵聚之咸陽為銅鑄金人十二各千石置庭中又曰張孟談董安于之治晉陽也公室之堂皆以練銅為柱又曰趙襄子使廚人以銅斗擊代王殺之而取其地又曰上使善相相鄧通當貧餓死文帝於是賜通蜀嚴道銅山得自鑄錢景帝立有告通盜出徼鑄錢盡沒入, SBCK: ''}
