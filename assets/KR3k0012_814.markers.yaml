  - {type: variant, offset: 2375, length: 1, content: 張, SBCK: 少儀曰國家靡幣則君子不履􅁝幣賦稅亟也左傳隱公曰公問於衆仲曰衛州吁其濟乎對曰臣聞以德和民不聞以亂以亂猶治􅁝而棼之也􅁝見棼緼益所以乱春秋考異郵曰四月蚕餌􅁝毛詩鵲巢羔羊曰羔羊之皮素絲五紽羔羊之革素􅁝五緎羔羊之縫素􅁝五総又􅍎巢何彼穠矣曰其釣惟何惟􅁝伊緍又柏舟緑衣曰緑兮􅁝兮女所治兮又鄘柏舟干旄曰子孑干旄在浚之郊素􅁝紕之}
  - {type: variant, offset: 2375, length: 159, content: 張良以家財求客㓨秦王得力士為鐵椎重一百二十斤秦始皇至愽浪沙中良與客俱擊秦皇帝又曰張敞弟武拜為梁相武曰當以柱後惠文冠彈治之耳應劭曰柱後以鐵為柱本法官冠也又曰成帝河平二年沛郡鐵官冶鐵飛又曰李尋說王根曰政感陰陽猶鐵炭之低仰見效可信者天文志曰懸土炭也以鐵易土耳先冬夏至懸鐵炭於衡各一端冬陽氣至炭仰而鐵低夏至炭低而鐵仰又曰婼羌國, WYG: 雖}
  - {type: variant, offset: 2375, length: 1, content: 張, krp: 少儀曰國家靡幣則君子不履絲幣賦稅亟也左傳隱公曰公問於衆仲曰衛州吁其濟乎對曰臣聞以德和民不聞以亂以亂猶治絲而棼之也絲見棼緼益所以乱春秋考異郵曰四月蚕餌絲毛詩鵲巢羔羊曰羔羊之皮素絲五紽羔羊之革素絲五緎羔羊之縫素絲五総又鵲巢何彼穠矣曰其釣惟何惟絲伊緍又柏舟緑衣曰緑兮絲兮女所治兮又鄘柏舟干旄曰子孑干旄在浚之郊素絲紕之}
