  - {type: variant, offset: 3634, length: 0, content: '', SBCK: 不着宋書曰朱百陽居山隂有時出山隂爲妻買繒綵三五事好飲酒遇醉或失之後周書曰梁主蕭巋朝於鄴髙祖與之宴大恱賜􅄂繒万叚良馬數千疋并賜齊後主妓妾及常所乗五百里駿馬以遺之纈西河記曰西河無蚕桑婦女着碧纈裙上加細布裳且爲戎狄性着紫纈􅃭袴以外國色錦爲袴褶後魏書曰封回爲都官尚書兾州大中正滎陽鄭雲諂事長秋卿劉騰貨紫纈四百疋得爲安州刺史除書旦出晚徃詣回㘴未定問安州興生何事便回曰卿荷國寵恩位至方伯雖不能㧞園葵去織婦冝思方略以濟百姓如何見造問興生乎封回不爲商賈何以相示雲慙失色綵尚書禹貢曰徐州厥篚玄纎縞荆州厥篚玄纁玄黑繒縞白繒纎細也纎在中明物皆當細禮記玉藻曰無君者不貳綵非列綵不入公門列綵正服史記曰通邑大都采千疋比千乗家漢書曰孝文六年遺單于赤綈緑繒各四十疋東觀漢記曰光武起拜朱和建義大將軍賜絳八百疋又曰光武􅀄起義與諸李市弓弩絳衣赤幘謝承後漢書曰陳重同舎郎有歸寜者誤持隣舎郎絳去嫌重取重不申曲直置絳還之去郎還得絳甚愧於重􅀽山松後漢書曰劉盆子拜竟復從劉仲卿居仲卿爲盆子制絳單衣張璠漢記曰朱儁少􅀌母以販繒綵爲事同郡周起􅀒官債百萬縣催責之儁竊母帛爲起解債魏志曰景􅀄中賜倭女王蒨絳五十疋紺青五十疋呉書曰陸遜破曹休當還西陵上賜遜繒綵丹􅃮梁書曰張譏㓜䘮母有錯綵經帕母之遺製及有所識家人具以告之毎歳時輙對帕哽噎不能自巳唐書曰武德中太宗平并州悉復故地上恱置酒含章殿宴羣臣極歡遣入御府賜繒綵皆盡重而出韓子曰齊桓公好服紫一國盡服紫五素不得一紫公患之管仲曰君勿衣紫也謂左右曰吾惡紫臭公曰諾三日境内莫有衣紫風俗通曰夏至着五綵辟兵題綵曰游光厲􅀑知其名無温疾五采辟五兵也桉取新断織繫户亦此􅀋也丗語曰王經彦偉􅀄爲江夏太守大將軍曹爽附絳二十疋令交市於呉經不納書弃官歸崔寔四民月令日八月清風戒寒趣染綵也摯虞决疑曰古者男子皆衣綵有故乃素服􅁗漢以來服色轉變令唯朝廷五服}
