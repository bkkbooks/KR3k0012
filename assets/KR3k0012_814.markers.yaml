  - {type: variant, offset: 3626, length: 3, content: 石虎為, SBCK: 成王時因祗國致女工一人善織新輕素以五色􅁝内口中手引而結之則成文錦神仙傳曰園客者濟隂人皃美而良邑人多欲以女妻之客終不娶常種五色香草積數十年服食其實忽有五色蛾集香草之上客収而薦之以布生華蚕焉至蚕時有一女自來助客養蚕亦以香草食之蚕収得蠒百二十枚蠒大如甕每一蠒繰六七日􅁝乃盡繰訖此女與園客俱去梁}
  - {type: variant, offset: 3626, length: 2, content: 石虎, WYG: 成王時因祇國致女工一人善織新輕素以五色絲内口中手引而結之則成文神仙傳曰園客者濟隂人貌美而良邑人多欲以女妻之客終不娶常種五色香草積數十年服食其實忽有五色蛾集香草之上客收而薦之以布生花蠶焉至蠶時有一女自來助客養蠶亦以香草食之蠶收得蠒百二十枚蠒大如甕每一繭繰六七日絲乃盡繰訖此女與園客俱去梁四公記曰扶桑國使貢方物有黃絲三百斤即扶桑蠶所吐桑灰汁所煮之絲也帝有金鑪重五十斤繫六絲以縣鑪絲有餘力楚辭曰茅絲兮同綜冠履兮共䖍宋玉鈞賦曰夫𤣥淵之鈎也以三尋之芉八絲之綸荀卿琴賦曰絃以園客之絲徽以鍾山之玉枚乘七發曰龍門之桐髙百尺而無枝斬以}
  - {type: page-break, offset: 3626, content: '', id: KR3k0012_WYG_814-6b, image: WYG0900/WYG0900-0214b.png}
  - {type: page-break, offset: 3626, content: '', id: KR3k0012_WYG_814-7a, image: WYG0900/WYG0900-0214c.png}
  - {type: variant, offset: 3626, length: 3, content: 石虎為, krp: 成王時因祗國致女工一人善織新輕素以五色絲内口中手引而結之則成文錦神仙傳曰園客者濟隂人皃美而良邑人多欲以女妻之客終不娶常種五色香草積數十年服食其實忽有五色蛾集香草之上客収而薦之以布生華蚕焉至蚕時有一女自來助客養蚕亦以香草食之蚕収得蠒百二十枚蠒大如甕每一蠒繰六七日絲乃盡繰訖此女與園客俱去梁}
  - {type: variant, offset: 3629, length: 0, content: '', WYG: 琴繭之絲以為絃稽康蠶賦曰食桑而吐絲前亂而後治古樂府歌詩曰羅敷善蠶桑採桑城南隅青絲為籠繩柱柱為籠鈎何用識夫婿白馬紫驪駒青絲繫馬尾黃金籠馬頭蔡邕廣連珠曰參絲之絞以絃琴緩張則撓急張則絶陸凱奏事曰諸暨永安出御絲素釋名曰素樸素也已織則工用不復加功餙也史記曰蘇氏遺燕王書云齊紫敗素而買十部東觀漢記曰鄭據建初五年辟司徒府拜侍御史上䟽詔書示官府賜據六十疋漢書儀曰天地鬼神璽皆以武都紫泥封都布紫曰素裹漢官儀曰印綬盛以篋篋以緑綈表曰素裹魏志曰學者資於人猶藍之染素范子計然曰白素出三輔疋八百孟子曰陳相道許行之言孟子曰許子必種粟而後食乎曰然許子冠乎曰冠曰奚冠曰冠素曰自織之與曰否以粟易之曰許子奚為不自織曰害於耕韓子曰齊桓公好衣紫國人皆好服之至五素不槈不紫其綵門鹽鐵論曰縞素不能自分於緇黑賢聖不能自治於亂世班固與弟書云今賫白素三百疋欲以市月支馬宋玉美人賦曰腰如束素徐幹團扇賦曰惟合懽之奇扇肇伊洛之素古詩曰新人能織繡故人工織素織縑日一疋織素五丈餘以縑持比素新人不知故班媫妤詩曰新裂齊紈素鮮潔如霜雪裁為合懽扇團圓象明月揚雄答劉歆書曰天下上計孝亷又内郡衛卒㑹者椎常把三十弱翰筆齎油素}
