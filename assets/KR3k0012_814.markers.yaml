  - {type: variant, offset: 3634, length: 0, content: '', WYG: 不着宋書曰朱陽百居山陽有時出山陽為妻買繒綵三五事好飲酒遇醉或失之後周書曰梁王蕭歸朝於鄴髙祖與之宴大悦賜雜繒萬段良馬數千疋并賜齊後主被妾及常所乘五百里駿馬以遣之纈西河記曰西河無蠶桑婦女着碧纈裙上加細布裳且為戎狄姓着紫纈襦襖以外國色錦為袴褶後魏書曰封回為都官尚書冀州大中正榮陽鄭雲事長秋鄉劉騰貨紫纈四百疋得為安州刺史除書旦出曉往詣回坐未定問安州興生何事便回曰卿荷國寵恩位至方伯雖不能㧞園葵去織婦宜思方畧以濟百姓如何見造問興生乎封囬不為商賈何以相示雲慙失色綵尚書禹貢曰徐州厥篚𤣥織荆州厥篚𤣥纁禮記玉藻曰無君者不貳采非列采不入公門史記曰通邑大都采千疋比千乘家漢書曰孝文六年遺單于赤綈緑縁各四十疋東觀漢記曰光武起義與朱季市弓弩絳衣赤幘謝承後書曰陳重同舎郎有歸寧者誤持同舎郎絳去嫌重取重不申曲直置絳還之去即還得絳甚愧於重袁山松後漢書曰劉盆子拜竟復從劉仲卿居仲卿為盆子制絳單衣張璠漢記曰朱雋少孤母以販繒綵為事同郡周起負官債百萬縣催責之雋竊母帛為起償債魏志曰景初中賜倭女王蒨絳五十疋綵青五十疋吳書曰陸遜破曹休當還西降上賜遜繒丹漆梁書曰張譏㓜喪母有錯綵經帕母之遺製及自所識家人具以告之每歲時輙封帕哽噎不能自已唐書曰武德中太宗平并州悉復故地上悅置酒含章殿宴羣臣極懽遣入御府賜繒綵皆負重而出韓子曰齊桓公好服紫一國盡服紫五素不得一紫公想之管仲曰君勿衣紫也謂左右曰吾惡紫臭公曰諾三日境内莫有衣紫風俗通曰夏至着五綵辟兵題綵曰遊光厲鬼知其名無溫疾五采辟五兵也按取新斷織繫户亦此類也世語曰王經彥偉初為江夏太守大將軍曹爽附絳二十疋令交市於吳經不納書棄官歸崔實四民月令四八月清風戒寒趣染綵色摯虞決疑曰古者男子皆衣綵有故乃素服秦漢以來服色轉變今惟朝廷五服}
