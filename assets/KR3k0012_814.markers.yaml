  - {type: variant, offset: 207, length: 1397, content: 簪不得著身寄死人家又曰龍門碣石多銅鐵漢書曰武帝即位好鬼神之事李少君以卻老方見上上有故銅器問少君少君曰此器齊桓公十年陳於桓寢已而案其刻果齊桓公器又曰黃帝采首陽山銅鑄鼎於荊山之下又曰王莽夢長樂宮銅人五枚並起立莽惡之使尚方鐫滅銅人應之又曰吳有豫章郡銅山招致天下人民亡命者盜鑄錢又曰凡律度量衡用銅者所以同天下齊風俗也銅為物至精不為燥濕寒暑變其節不為風雨暴露改其形介然有常似於士君子之行是以用銅也又曰王莽天鳳四年八月莽親之南郊鑄作威斗威斗者以五色銅為之又曰無雷國有銅華嶠後漢書曰靈帝時使掖庭令畢嵐鑄銅人四列於蒼龍玄武闕外又曰脩玉堂殿鑄銅人四黃鍾四其音中黃鍾也子為黃鍾及天祿蝦蟆又鑄四出文錢天祿獸也范曄後漢書曰馬援善別名馬於交阯得駱越銅鼓乃鑄為馬式又曰馬援征南海鑄銅柱於林邑國以極漢南界又曰崔烈納錢為司徒久之不自安從容問其子鈞曰吾居三公於議者何如釣曰大人少有英稱歷位卿守論者不謂當為三公而今登其位天下失望烈曰何為然也鈞曰論者嫌其銅臭烈怒舉杖擊之又曰薊子訓遁去不知所止後人復於長安東霸城見之與老翁共磨娑銅人相謂曰適見鑄此而已近五百歲矣魏略曰明帝徒長安諸鍾虡駱駞銅人承露盤折銅人不可致住霸城又鑄作銅人列坐於司馬門外吳志朱異口賦弩曰南岳之幹鍾山之銅應機命中獲隼高墉晉書曰南陽王模督秦雍時關中飢荒百姓相噉加以疾癘盜賊公行模力不能制乃鑄銅人鍾鼎為釜器以易穀議者非之崔鴻十六國春秋後趙錄曰石勒徙洛陽銅馬翁仲二于襄國列之永豐門北史曰後魏明帝初爾朱榮與從弟世隆密議廢立乃以銅鑄孝文及咸陽王禧等五王子像成當奉為主唯莊帝獨就唐書曰開元中許昌縣之唐祠掘地得古銅罇又隱起雙鯉篆書文曰宜子孫又曰開元十三年宋州獻古銅鼎十九及鍾磬甑釜罇杓盤瓶各數四時宋城尉晉日休因板築獲而獻之又曰初天寶中天下州郡皆鑄銅為玄宗擬其形容首冠環焰足承菡萏與尊佛之像間列於殿堂號為真容及山東陷率被鎔毀而恒州獨存又曰文宗問宰臣曰幣輕錢重如何宰臣楊嗣復曰此事已久但且禁銅不可遽變其法法變即必擾人李玨曰今請加鑪鑄錢他法不可先有格令州府禁銅為器當今以銅為器而不知禁所病者制勑一下曾不經年而州縣因循所以制令相次而視之為常今自淮而南至於江嶺鼓鑄銅器列而為肆州縣不禁市井之人逐錐刀之利以緍範為他器鬻之售利不啻數倍是則禁銅之令必在嚴切斯其要也又曰五臺山有金閣寺鑄銅為瓦塗金其上照燿山谷計錢巨億萬淮南子曰銅英青又曰銅不可以為弩抱朴子曰吳時發廣陵大冡中有銅為人數十頭皆長五尺又曰金簡記云以五月丙子日中時鑄五石下其銅五石雄黃丹砂雌黃礬石曾青也皆鑄粉之以金華池漆之內太一神鼎中下以桂薪燒之銅成以銅炭冶之取牡銅以為雄劍取牝銅為雌劍帶之以入河則蛟龍巨魚水神不敢進也欲知銅之牝牡當令童男童女俱以水灌銅以其在火中尚赤時也則銅自分為兩叚有凸起者則牡銅也凹陷者則牝銅也又曰山中夜見胡人銅之精也山海經曰昆吾之山其上多赤銅此山出金色赤如火以切玉如泥周穆王持西戎為兵獻汲冡中得銅金劍一枚長三尺五寸故通以錫雜為兵器帝王世紀曰紂作銅柱令男女裸形緣之落則妲己笑國語管仲曰美金以鑄戟劍鑄冶試諸狗馬狗馬難為利者惡金以鑄鉏夷斤欘惡麤夷平也所以削草平地也斤形似鉏而小𢺡斫也廣雅曰白銅謂之鋈赤銅謂之錫漢武內傳曰上起神屋臺以銅為柱黃金塗之神異經曰入金山下四丈得丹楊銅張華曰此銅與金相似典術曰陶丹銅以為金也賈誼書曰下不得鑄錢則民反耕田矣西京雜記曰高祖初入咸陽宮周行庫藏見銅人十一枚坐皆高三尺列在一筵上琴筑笙竽皆有所執皆綴花, SBCK: 􅁝素繒纈}
