  - {type: variant, offset: 3640, length: 2, content: 陡岸, WYG: 之四面黃居中央名曰襞方綴之於複以示婦人養蠶之功也傳聲書誤以辟兵李陵與蘇武詩曰有鳥西南飛熠熠似蒼蠅朝發天地隅暮寄日南陵欲寄一言書託之箋綵繒張載擬四愁詩曰佳人贈我筒中布何以報之流黃素蔡邕女誡曰禮女始行服纁七絳也上正色也紅紫不以為䙝服緗緑不以為上繒貴厚而色尚深為其堅紐也母邱儉報弟書曰今别致絳二百疋可以供送葬之事染周禮天官下曰染人掌染絲帛凡染春暴練夏纁𤣥秋染夏冬獻功地官下曰掌染草掌以春秋斂染草之物以權量受之以待時而頒之冬官考工記曰鐘氏染羽以朱湛毋林三月而熾之鄭司農云湛漬也丹林赤粟𤣥湛讀如斬車帷裳之漸熾燭也羽所以釋旌七及王后之車淳而漬之淳沃也三日為曛五日為緅七日為緇染纁者三入而成又用染以黑則為緅禮記月令曰季夏命婦官染采黼黻文章必以法故無或差貸黑黃蒼赤莫不質良無敢詐偽以給郊廟祭祀之服以為旗章以别貴賤等服之度質正也良善也所用染者當得其真采正善爾雅曰一染謂之縓彫絹反再染謂之頳三染謂之纁青謂之􅀢黑謂之黝漢書王莾傳曰更始元年拜置百官莾聞之愈恐欲外示目安乃染其鬚髮吳録曰九貞移風縣有赤絮膠人䂓土知蟻發以木枝挿其中則蟻縁而生漆折漆以染絮其色正赤宋書曰陶季直五歲喪母哀若成人初母未病令於外染衣卒後家人始贖季直抱之號慟聞者莫不酸戚呂氏春秋曰素染於青染於黃五入而五色堯舜三王染於賢聖而治桀紂幽厲染於㓙佞而亡愽物志曰蕪蘇子染法蕪蘇子一升可染一疋直以水浸之耳釋名曰緗桑葉初生色也廣志曰鳥丸與匈奴同俗丈夫婦人為木幘朱染之如杆盆以香頭神仙傳曰昌容者商王女也修道於常山食蓬虆根二百餘年能致紫草賣與染家得錢以與貧病者環濟要畧曰正色有五謂青赤黃白黑也間色五謂紺紅縹紫流黃也太平御覽卷八百一十四}
