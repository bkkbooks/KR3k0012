  - {type: variant, offset: 3631, length: 2, content: 浴臺, SBCK: 新遷都宫人多亡衣服帝欲發御府繒以作之李􅔸不欲曰宫中有衣服胡爲復作耶詔賣廐馬百餘疋御府大司農出􅄂繒二萬疋與所賣廐馬直賜公卿巳下及貧民不能自存者李􅔸曰我邸閣儲跱少乃悉載置其營賈詡曰此上意不可距也􅔸終不從又曰李􅔸時合羌胡數千人先以御物繒綵與之􅀳書曰單道開燉煌人常衣麤􅄄或贈以繒服}
  - {type: variant, offset: 3631, length: 2, content: 浴臺, WYG: 新廷都宮人多亡衣服帝彼發御府繒以作之李催不欲曰宮中有衣服胡為復作也詔賣廐馬百餘疋御府大司農出雜繒二萬疋與所賣廐馬直賜公卿已下及貧民不能自存者李催曰我邸閣儲峙少乃悉載置其營賈詡曰此上意不可距也催中不從又曰李僱特合羌胡數十人先以御物繒綵與之晉書曰單道關燉煌人常衣麤褐或贈以繒服}
