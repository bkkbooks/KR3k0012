  - {type: variant, offset: 1605, length: 539, content: 儼然若生人筵下有銅管上口高數尺出筵後其一管內空一管有繩大如指使一人吹管一人紐繩則琴筑笙竽皆作聲音與真樂不異虞喜志林曰建武中南郡男子獻銅鼓背有銘及吳時江水中鍾上有百餘字人莫有識者地鏡圖曰草莖黃秀下有銅器士緯曰銅出於石為鈴則小鑄鍾則大南中八郡志曰雲南舊有銀窟數十劉禪時歲常納貢亡破以來時往採取銀化為銅不復中用世語曰元康八年陵雲臺上生銅賈誼鵬鳥賦曰陰陽為炭萬物為銅張瑩漢南記曰安帝見銅人以問侍中張陵對曰昔秦始皇時有大人十二身長五丈履六尺皆夷狄之服見於臨洮此天將亡秦之證而始皇誤喜以為瑞乃鑄銅人以為像上曰何以知之對曰臣見傳載亦其人胸上有銘林邑記曰林邑王范文鑄銅為牛銅屋行宮荊州記曰衡陽重安縣有岩苦歷反塘故老相傳云此塘中有銅神今猶時聞銅聲水轉變綠魚為之死武當山記曰山有石室中有銅杖長七尺越絕書曰赤堇之山破而出錫若耶之谷涸而出銅歐冶因為純鈞之劍玄中記曰銅之精為童奴嶺表異錄曰蠻夷之樂有銅鼓焉形如腰鼓而一頭有面鼓面圓二尺許面與身連全用銅鑄其身遍有䖝魚花草之狀通體均勻厚二分已來鑪鑄之妙實為奇巧擊之響亮不下鳴鼉貞元年中驃國進樂有玉螺銅鼓玉螺蓋螺之白者非琢玉所為即知南蠻酋首之家皆有此鼓也咸通末幽州張直方貶龔州刺史到任後修葺州城緣掘土得一銅鼓牽復載以歸京到襄漢以為無用之物遂捨于延慶禪院用代木魚鐵, SBCK: 染􅁝}
