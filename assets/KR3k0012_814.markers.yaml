  - {type: variant, offset: 2971, length: 0, content: '', SBCK: 野有一女子跪樹而歐􅁝郭璞注曰蚕􅀋也吕氏春秋惠子曰使女工化爲􅁝不能治􅁝大匠化爲木不能治木家語曰子張問入官子曰脩身返道故夫女工必自擇􅁝麻良匠完材賢君選左右論衡曰蚕含􅁝而商弦絶桉子生而父氣衰新􅁝旣登故體者自壞耳桓譚新論曰昔神農始削桐爲琴繩􅁝爲絃以逋神明之徳合天地之叙風俗通曰五月五日色續命􅁝俗􅀃益人命正部曰皎皎練􅁝爲藍則青得丹則赤得蘖則黄得泥則黒士緯曰􅁝俱生於蚕爲繒則賤爲錦則貴神仙傳曰仙人用五色􅁝作續命幡幡安五色竹林七賢論曰鬲令􅀽毅爲政貪濁賂遺朝廷以營虚譽遺}
  - {type: page-break, offset: 2971, content: '', id: KR3k0012_SBCK_814-3b}
  - {type: variant, offset: 2971, length: 0, content: '', WYG: 野有一女子跪樹而歐絲郭璞注曰蠶類也呂氏春秋惠子曰使女工化為絲不能治絲大匠化為木不能治木家語曰子張問入官子曰修身返道故夫女工必自擇絲麻良匠完材賢君選左右論衡曰蠶合絲而商弦絶按子生而父氣衰新絲既登故休者自壞耳桓譚新論曰昔神農始削桐為琴繩絲為絃以通神明之德合天地之序風俗通曰五月五日賜五色續命絲俗説益人命正部曰皎皎練絲得藍則青得丹則赤得蘖則黃得泥則黑士緯曰絲俱坐於蠶為繒則賤為錦則貴神仙傳曰仙人用五色絲作續命幡七安五色竹林七賢論曰髙令袁毅為政貪濁賂遺朝廷以警虛譽遺}
