  - {type: variant, offset: 3630, length: 0, content: '', SBCK: 公記曰扶桑國使貢方物有黄􅁝三百斤即扶桑蚕所吐桑􅁅汁所煑之􅁝也帝有金鑪重五十斤係六􅁝以懸鑪􅁝有餘力楚辭曰茅􅁝兮同綜冠履􅀆共處宋玉釣賦曰夫玄淵之釣也以三尋之竿八􅁝之綸荀卿蚕賦曰食桑而吐􅁝前亂而後治嵇康琴賦曰絃以園客之􅁝徽以鍾山之玉枚乗七發曰龍門之桐高百尺而無枝斬以爲琴野繭之􅁝以爲絃古樂府歌詩曰羅敷善蚕桑採桑城南隅青􅁝爲籠繩桂枝爲籠鈎何用識夫壻白馬紫驪駒青􅁝繫馬尾黄金絡馬頭蔡扈廣連珠曰叅􅁝之絞以絃琴緩張則撓急張則絶陸凱奏事曰諸曁永安出御􅁝素釋名曰素樸素也巳織則供用不復加功飾也史記曰􅂫代遺燕王書云齊紫敗素而賈十部敗素染以爲紫也東􅀚漢記曰鄭據建􅀄五年辟司徒府拜侍御史上疏詔書下官府賜據素六十疋漢書儀曰天地􅀑神璽皆以武都紫泥封都布囊白素裹漢官儀曰印綬盛以篋篋以緑綈表白素裹魏志曰學者資於人猶藍之染素范子計然曰白素出三輔疋八百孟子曰陳相道許行之言孟子曰許子必種粟而後食乎曰然許子冠乎曰冠曰奚冠曰冠素曰自織之與曰否以粟易之日許子奚爲不自織曰害於耕也韓子曰齊桓公好衣紫國人皆好服之至五素不得一紫事具綵門鹽鐵論曰縞素不能自分於緇墨賢聖不能自治於亂丗班固與弟書云今賷白素三百疋欲以市月支焉宋玉美人賦曰腰如束素徐幹􅇛扇賦曰惟合歡之竒扇肇伊洛之纎素古詩曰新人能織縑故人工織素織縑日一疋織素五丈餘以縑特比素新人不如故班婕妤詩曰新裂齊紈素鮮潔如霜雪裁爲合歡扇􅇛􅇛象明月楊雄荅劉歆書曰天下上計孝㢘及内郡衛卒㑹者雄常把三寸弱翰筆齎油素四尺以問其異方語歸即以鈆㰅次之於鈆槧七念反三十七􅀊於今矣繒史記曰烏氏倮以繒遺戎王戎王十倍報之帝王丗紀曰末喜好聞裂繒之聲桀爲發繒裂之漢書曰灌嬰睢陽販繒者又曰廣川王去立昭信爲后幸􅁎陶望卿爲脩美人主繒帛昭信譛望卿日與我無禮衣服常鮮於我盡取善繒丐諸宫人獻帝紀曰是}
