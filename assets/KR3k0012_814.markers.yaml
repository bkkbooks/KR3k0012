  - {type: variant, offset: 3635, length: 7, content: 鍮石珷玞為陡岸, SBCK: 綵裴玄新言曰五月五日集五綵繒謂之辟兵不解以問伏君伏君曰青赤白黒爲之四面黄居中央名曰襞方綴之於􅃨以示婦人養蚕之工也傳聲者誤以爲辟兵李陵與􅂫武詩曰有鳥西南飛熠熠似蒼鷹朝發天地隅暮􅀫曰南陵欲􅀉一言書託之箋綵繒張載擬四愁詩曰佳人贈我筒中布何以報之流黄素蔡邕女誡曰禮女始行服纁纁絳也上正色也紅紫不以爲䙝服緗緑不以爲上繒貴厚而色尚深爲其堅紐也母丘儉報弟書曰令別致絳二百疋可以供送葬之事染周禮天官下曰染人掌染􅁝帛凡染春􅁀練夏纁玄秋染夏官獻功又地官下曰掌染草掌以春秋歛染草之物染草茅蒐橐蘆豕首紫茢之屬以權量受之以待時而頒之權量以知輕重多少時染夏之時又冬官考工記曰鍾氏染羽以朱湛丹秫三月而熾之鄭司農云湛漬也丹秫赤粟玄謂湛讀如斬車帷裳之漸熾也羽所以飾旌旌及王后之車淳而漬之淳沃也以炊下湯沃其熾烝之以漬羽漬猶染也三入爲纁五入爲緅七入爲緇染纁者三入而成又再染以黒則爲緅今禮俗文作爵言如爵頭色也又復再染以黒乃成緇矣禮記月令曰季夏命有司染綵黼黻文章必以法故無或􅏔貸黒黄蒼赤莫不質良無敢詐僞以給郊廟􅀕祀之服以爲旗章以別貴賤等級之度質正也良善也所用染者當得其眞綵正善爾雅曰一染謂之縓彫絹反再染謂之頳三染謂之纁青謂之䓗黒謂之􅉳漢書王莽傳曰更始元年拜置百官莽聞之愈恐欲外示自安乃染其􅂡髪吴録曰九眞移風縣有赤絮膠人規土知蟻穴墾發以木枝挿其中則蟻縁而生􅃮折􅃮以染絮其色正赤宋書曰陶季直五歳喪母哀􅀂成人􅀄母未病令於外染衣卒後家人始贖季直抱之號慟聞者莫不酸感吕氏春秋曰素染於青染於黄五入而五色堯舜三王染於賢聖而治桀紂幽厲染於凶佞而亡􅀶物志曰蕪􅂫子染法蕪􅂫子一􅂛可染一疋直以水浸之耳釋名曰緗桑葉􅀄生色也廣志曰烏丸與匈奴同俗丈夫婦人爲木幘朱染之如杆盆以沓頭神仙傳曰昌容者啇王女也脩道於常山食逢蔂根二百餘年能致紫草賣與染家得錢以與貧病者環濟要略曰正色有五謂青赤黄白黒也間色有五謂}
