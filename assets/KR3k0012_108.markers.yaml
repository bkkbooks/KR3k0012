  - {type: variant, offset: 19, length: 5, content: 德太子之子, SBCK: 皇帝廟號丗祖髙祖以周天和元年生於長安七年襲唐國公及長倜儻豁逹任性真率寛仁容衆無貴賤咸得其歡心隋受禪􅀘千牛備身文帝獨狐皇后即髙祖從母}
