  - {type: variant, offset: 5678, length: 0, content: '', SBCK: 改隋義寧二年爲唐武德元年官人百姓賜爵一級義師所行之處給復三年罷郡置州改太守爲刺史丁夘宴百官于太極殿賜帛有差東都留守共立隋越王侗音同爲帝壬申命相國長史裴寂等修律令六月甲戍太宗爲尚}
