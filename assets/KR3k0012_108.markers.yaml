  - {type: variant, offset: 17, length: 1, content: 侑, SBCK: 淵其先隴西狄道人涼武昭王暠七代孫也暠生歆歆生重耳仕魏爲弘農太守重耳生熈爲金門鎮將領豪族鎮武川因家焉儀鳯中追尊宣皇帝熈生天賜仕魏爲幢主儀鳯中追尊光皇帝生皇祖諱虎後魏左僕射封隴西郡公與周文帝及太保李弼大司馬獨狐信等以功叅佐命當時稱爲八柱國家仍賜姓大野氏周受禪追封唐國公至隋文帝作相還復夲姓武德􅀄追尊景皇帝廟號太祖皇考諱昞音丙周安州㹅管柱國大將軍襲唐國公謚曰仁武德􅀄追尊}
  - {type: variant, offset: 17, length: 1, content: 侑, WYG: 淵其先隴西狄道人凉武昭王暠七代孫也暠生歆歆生重耳仕魏為𢎞農郡太守重耳生熙為金門鎮將領豪旗鎮武川因家焉儀鳳中追尊宣皇帝熙生天賜仕魏為憧主儀鳳中追尊光皇帝生皇祖諱虎後魏左僕射封隴西郡公與周文帝及太保李弼大司馬獨孤信等以功㕘佐命當時稱為八柱國家乃賜姓大野氏周受禪追封唐國公至隋文帝作相還復本姓武徳初追尊景皇帝廟號太祖皇考諱昞音丙周安州總管柱國大將軍襲唐國公諡曰仁武徳初追尊}
