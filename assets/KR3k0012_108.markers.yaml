  - {type: variant, offset: 5889, length: 319, content: 入武牢進薄其營多所傷殺并擒其將殷秋石瓚時世充弟世辯為徐州行臺遣其將郭士衡領兵千人從之合眾十餘號為三十萬次城皋筑宮于板堵以示必戰又遣間使約世充共為表裏秦王遣將軍王君廓領輕騎千餘抄其糧運獲其大將張青特虜獲其眾建德數不利人情危駭將帥已下破孟海公皆有所獲思歸洺州凌敬進說曰宜悉兵濟河攻取懷州河陽使重將居守更率眾鳴鼓建旗踰太行入上黨先聲後實傳檄而定漸趨壺口稍駭蒲津收河東之地此策之上也行此必有三利一則入無人之境師有萬全二則拓土得兵三則鄭圍自解建德將從之而世充之使長孫安世陰齎金王啗其諸將以亂其謀眾咸進諫曰凌敬書生耳豈可與言戰乎建德從之敬固爭建德怒扶出焉於是悉眾進逼武牢官軍按甲挫其銳建德結陣於汜水秦王遣騎挑之建德進軍而戰竇抗當之建德少卻秦王馳騎深入, SBCK: 孝恭}
