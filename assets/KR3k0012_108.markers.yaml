  - {type: variant, offset: 74, length: 1, content: 拜, SBCK: 令劉文靜及門下客長孫順德劉弘基各募兵旬日間衆且一萬宻遣使召丗子建成及元吉于河東威與君雅見兵大集恐髙祖爲變相與疑懼請髙祖祈雨於晉祠將爲不利晉陽郷長劉丗龍知之以告髙祖隂爲之備五月甲子髙祖與威君雅視事太宗宻嚴兵於外以備非常遣開陽府司馬劉政㑹告威等謀反即斬之以徇遂起義兵遣劉文靜使於突厥始畢可汗令率兵相應六月甲申命太宗將兵徇西河下之癸巳建大將軍府并置三軍分爲左右開倉庫以賑窮乏逺近響應秋七月髙祖率兵西圖􅀜中以元吉爲鎮北將軍}
  - {type: variant, offset: 74, length: 1, content: 拜, krp: 令劉文靜及門下客長孫順德劉弘基各募兵旬日間衆且一萬宻遣使召丗子建成及元吉于河東威與君雅見兵大集恐髙祖爲變相與疑懼請髙祖祈雨於晉祠將爲不利晉陽郷長劉丗龍知之以告髙祖隂爲之備五月甲子髙祖與威君雅視事太宗宻嚴兵於外以備非常遣開陽府司馬劉政㑹告威等謀反即斬之以徇遂起義兵遣劉文靜使於突厥始畢可汗令率兵相應六月甲申命太宗將兵徇西河下之癸巳建大將軍府并置三軍分爲左右開倉庫以賑窮乏逺近響應秋七月髙祖率兵西圖關中以元吉爲鎮北將軍}
  - {type: variant, offset: 77, length: 0, content: '', SBCK: 留守癸丑發自太原有兵三萬景辰師次靈石縣營於賈胡堡隋武牙郎將宋老生屯霍邑以拒義師㑹霖雨積旬餽運不給髙祖命旋師太宗切諌乃止有白衣老父詣軍門曰余爲霍山神使謁唐皇帝曰八月雨止路出霍邑東南吾當濟師髙祖曰此神不欺趙無䘏豈􅀒我哉八月辛巳髙祖引師趨霍邑斬宋老生平霍邑景戍進下臨汾郡及綘郡癸巳至龍門突厥始畢可汗遣康稍利率兵與劉文静㑹于麾下隋驍衛大將軍屈突通鎮河東津梁斷絶􅀜中向義者頗以爲阻於是水濱居人競進舟檝不謀而至者前後數百人九月壬寅馮翊賊帥孫華土門賊帥白玄度各率其衆送欵并具舟檝以待義師髙祖令華與統軍王長諧劉弘基引兵渡河屈突通遣其武牙郎將桑顯和率兵數千夜襲長諧義師不利太宗以遊􅀐數百掩其後顯和潰散義軍復振景辰馮翊}
  - {type: page-break, offset: 77, content: '', id: KR3k0012_SBCK_108-2b}
