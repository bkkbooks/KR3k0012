  - {type: variant, offset: 79, length: 2, content: 尋鎮, SBCK: 蕭造以郡來降戊午髙祖親率衆圍河東屈突通自守不出乃命攻城不利而還文武將吏請髙祖領太尉加置僚佐從之華隂令李孝常以永豐倉來降庚申髙祖率軍濟河舎于長春宫三􅁗士庻至者日以千數髙祖禮之咸過所望人皆喜恱景寅遣隴西公建成司馬劉文静屯兵永豐倉兼守潼􅀜以備他盗太宗率劉􅀪基長孫順德等前後數萬人自渭北徇三輔所至皆下髙祖從父弟神通起兵鄠縣柴氏婦舉兵於司竹至是並與太宗㑹乙亥命太宗自渭汭屯兵阿城隴西公建成自新豐趣覇上髙祖率大軍自下邽西上經焬帝行宫園苑悉罷之宫女放還親屬冬十月辛巳至長樂宫有衆二十萬}
