  - {type: variant, offset: 43, length: 0, content: '', WYG: 威武牙郎將髙君雅為副將羣賊蠭起江都阻絶太宗以晉陽令劉文静及門下客長孫順徳劉𢎞基各募兵旬日間衆具一萬宻遣使召世子建成及元吉於河東威與君雅見兵大集恐髙祖為變相與疑懼請髙祖祈雨於晉祠将為不利晉陽卿劉世龍知之以吿髙祖隂為之備五月甲子髙祖與威君雅視事太宗宻嚴兵於外以備非常遣開陽府司馬劉政㑹告威等謀反即斬之以徇遂起義兵遣劉文静為使於突厥始畢可汗令率兵相應六月甲申命太宗將兵向西河下之癸巳建大將軍府并置三軍分為左右開倉以賑窮乏逺近響應秋七月髙祖率兵西圖闗中以元吉為鎮北將軍太原留守癸丑發自太原有兵三萬餘丙辰師次靈石營於賈胡堡隋武牙郎將宋老生屯霍邑以拒義師㑹霖雨積旬餽運不給髙祖命旋師太宗切諌乃止有白衣老父詣軍門曰余為霍山神使謁唐皇帝曰八月雨止路出霍邑東南吾當濟師髙祖曰此神不欺趙無䘏豈負我哉八月辛巳髙祖引師趨霍邑斬宋老生平霍邑丙戌進下臨汾郡及絳郡癸巳至龍門突厥始畢可汗遣康稍利率兵與劉文静㑹于麾下隋驍衛大將軍屈突通鎮河東津梁斷絶闗中向義者頗以為阻於是水濵居人競進舟檝不謀而至者前}
