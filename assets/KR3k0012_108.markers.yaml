  - {type: variant, offset: 243, length: 690, content: 戊午詔曰天禍隋國大行太上皇過盜江都酷甚望夷釁深驪北惘予小子奄逮不愆哀號永感心情麋潰仰惟荼毒仇復靡申形影相吊罔知啟處相國唐王膺期命世扶危拯溺自北徂南東征西怨總九合於一匡決百勝於千里糾率夷夏大庇氓黎保乂朕躬繄王是賴德侔造化工格蒼旻兆庶歸心曆數斯在屈為人臣載違天命在昔虞夏揖讓相推茍非重華誰堪命禹當今九服崩離三靈改卜大運去矣請避賢路兆謀布德顧已莫能私僮命駕須歸蕃國子本代王及子而代天之所廢豈其如是庶憑稽古之聖以誅四凶幸值惟新之恩預充三恪雪冤恥於皇祖守禋祀於孝孫朝聞夕殞及泉旡恨今遵故事遜于舊邸庶官群辟改事唐朝宜依前典趣上尊號若釋重負感泰兼懷假手真人俾除醜逆濟濟多士明知朕意仍勑有司凡有表奏皆不得以聞是日上遜位于大唐唐以上為酅國公武德二年夏五月崩時年十五史臣曰恭帝年在幼冲遭家多難一人失德四海土崩群盜蜂起豺狼塞路南巢遂往流彘不歸既鍾百六之期躬踐數終之運謳歌有屬笙鏞變響雖欲不遵堯舜之跡其庸可得乎李密唐書曰李密字玄邃本遼東襄平人也父寬隋上柱國蒲山公密以父蔭為左親侍常在仗下煬帝顧見之退謂許公宇文述曰向者左仗下黑色小兒為誰許公對曰故蒲山公李寬子密也帝曰箇小兒視瞻異常勿令宿衛他日述謂密曰弟聰今如此當以才學取官三衛叢脞非養賢之所密大喜因謝病專以讀書為事時人希見其面嘗欲尋包愷乘一黃牛被以蒲韉仍將漢書一帙掛於角上一手捉牛靷一手翻卷書讀之尚書令越國公楊素見於道從後按轡躡之既及問曰何處書生躭學若此密識越公乃下再拜自言姓名又問所讀書荅曰項羽傳越公奇之與語大悅謂其子玄感等曰吾觀李密識度汝等不及於是玄感傾心結託大業九年煬帝伐高麗使玄感於麗陽監運時天下騷動玄感將謀舉兵潛遣人入關迎密以為謀主密至謂玄感曰今, SBCK: 乙巳}
