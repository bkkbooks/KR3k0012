山時右翊衛將軍史万寶留鎮熊州遣副將盛彥師率步騎數千追躡至陸渾縣南七十里與密相及彥師伏兵山谷密軍半渡橫出擊敗之遂斬密時年三十七王世充又曰王世充字行滿本姓支西域胡人也世充頗涉經史尤好兵法及龜筴推步之術開皇中以軍功拜儀同善敷奏明習法律然舞弄文法高下其心或有駮難之者世充利口飾非辭議鋒起眾雖知其不可而莫能屈大業中累遷江都郡丞兼領江都宮監時煬帝數幸江都世充善候人主顏色阿諛順旨每入言事帝必稱善乃雕飾池臺陰奏遠方珍物以媚於帝由是益昵之十年齊郡賊帥孟讓自長白山寇掠諸郡至旴𣅿有眾十餘萬世充以兵拒大破之煬帝以世充有將帥才略復遣領兵討諸小盜所向盡平十一年突厥圍煬帝於鴈門世充盡發江都人將往赴難在軍中蓬首垢面悲泣無度曉夜不解甲藉草而臥煬帝聞之以為忠益信任之十二年遷江都通守及李密攻陷洛口倉進逼東都煬帝特詔世充大發兵於洛口以拒密又遣就軍拜世充為將軍趣令破賊世充引軍渡洛水與李密戰世充軍敗績乃率餘眾歸河陽時天寒大雪北至河陽才以千數世充自繫獄請罪越王侗遣使赦之徵還洛陽置營於含嘉倉城收合亡散復得萬餘人俄而宇文化及作難越王侗嗣位於東都拜世充為吏部尚書封鄭國公進拜尚書左僕射揔督內外諸軍事世充去含嘉城移居尚書省專宰朝政以其兄世惲為內史令入居禁中子弟咸擁兵馬鎮諸城邑未幾李密破宇文化及還其勁兵良馬多戰死士卒疲倦世充欲乘其弊而擊之恐人心不一乃假託鬼神言夢見周公乃立祠於洛水遣巫宣言周公欲令僕射急討李密當有大功不音否則兵皆疫死充兵多楚人俗信妖言眾皆請戰世充簡練精勇得二萬餘人馬二千餘疋軍於洛水南密軍偃師北山上世充令軍人秣馬蓐食遟明而薄密密軍潰以數十騎走河陽率餘眾入朝世充盡收其眾振旅而還侗進世充太尉以尚書省為府備置官屬世充嘗於侗前賜食還家遂大嘔吐疑遇毒所致自是不復朝請與侗絕矣遣雲定興叚達入奏於侗請加九錫之禮二年三月遂策授相國總百揆封鄭王加九錫備物叚達雲定興等入見於侗曰天命不常鄭王功德甚盛願陛下揖讓告禪遵唐虞之跡侗怒四月假為侗詔策禪位遣兄世惲廢侗於含涼殿僣即皇帝位建元曰開明國號鄭立子玄應為皇太子世充每聽朝必殷勤誨諭言詞重複千端萬緒或輕騎遊歷街衢亦不請道百姓但避路而已按轡徐行謂百姓曰昔時天子深唑九重下情無由聞徹世充非貪寶位本欲救時今當如一州刺史每事親覽當與士庶共評朝政今止於順天門外置座聽朝又令西朝當受抑屈東朝堂受直諫於是獻書上事日有數百條流既煩省覽難遍數日後不復更出世充遣其姪行本鴆殺侗謚曰恭皇帝十月世充率東眾徇地至于滑州仍以兵臨黎陽世充屯兵不散倉粟日盡城中人相食七月秦王率兵攻之陳兵於青城宮世充悉兵來拒隔澗而言曰隋末喪亂天下分崩長安洛陽各有分地世充唯願自守不敢西侵王乃盛相侵軼遠入吾地三崤之道千里饋糧以此出師未見其可太宗謂曰四海之內皆承正朔唯公執迷獨阻聲教東都士庶亟請王師關中義勇咸思致力至尊重違眾願有斯吊伐若轉禍來降則富貴可保如欲相抗無假多言世充無以報太宗分遣諸將攻其城鎮所至輒下九月王君廓攻拔世充之轘轅縣於是河南州縣相次降附十一月竇建德遣人結好并陳救援之意世充乃遣其兄子琬及內史令長孫安世報聘且乞師四年二月世充率兵出方諸門與王師相抗世充軍敗因乘勝追之屯其城門世充不復敢出但嬰城自守以待建德之援三月秦王擒建德并王琬長孫安世等于武牢廻至東都城下以示之且遣安世入城使言敗狀世充惶惑不知所為將潰圍而出南走襄陽問於諸將皆不荅乃率其將吏詣軍門請降秦王以世充至長安高祖數其罪世充對曰計臣之罪誠不容誅但陛下愛子秦王許臣不死高祖乃釋之與兄芮妻子同徒于蜀將行為讎人獨孤修德所殺世充自篡位凡三歲而滅竇建德又曰竇建德貝州漳南人也少時頗以然諾為事初里長犯法亡去會赦得歸父卒送葬者千餘人有所贈皆讓而不受大業七年募人討高麗本郡遂補建德為二百長時山東大水人多流散同縣有孫安祖家為水所漂妻子餒死縣以安祖驍勇亦選在行中安祖辭貧自言于漳南令令怒笞之安祖刺殺令亡投建德建德舍之是歲山東大饑建德謂安祖曰丈夫不死當立大功豈可為逃亡之虜也我知高雞泊中廣大數百里莞蒲阻深可以逃難承間而出虜掠足以自資既得聚人且觀時變必有大功於天下矣安祖然其計建德招誘逃兵及無產者得數百人令安祖率之入泊中為群盜安祖自稱將軍時鄃人張金稱亦結聚得万人在河阻中蓨人高士達又起兵得千餘人在清河界中時諸盜往來漳南者所過皆殺掠居人焚燒舍宅獨不入建德之閭由是郡縣意建德與賊徒交結收繫家屬無少長皆殺之建德聞其家被屠滅率麾下二百人亡歸士達士達自稱東海公以建德為司兵後安祖為張金稱所殺其兵數千人又盡歸于建德自此漸盛兵至萬餘人猶往來高雞泊中十二年涿郡通守郭絢卒兵萬餘人來討士達士達自以智略不及建德乃推為軍司馬咸以兵受焉建德既初統眾欲立奇功以威群賊請士達守輜重自簡精兵七千人以拒絢大破絢軍絢以數十騎遁走遣將追及於平原斬其首以獻士達由是建德之勢益振隋遣太僕卿楊義臣率兵萬餘人討張金稱破之於清河所獲賊眾皆屠滅餘散在草澤間者復相聚而投建德義臣乘勝至平原欲入高雞泊建德謂士達曰歷觀隋將善用兵者唯義臣耳新破金稱遠來襲我其鋒不可當請引兵避之令其欲戰不得空延歲月必將疲倦乘便襲擊可有大功今與爭鋒恐公不能敵也士達不從其言因留建德守壁自率精兵逆擊義臣義臣果大破士達於陣前斬之乘勢追奔將圍建德守兵既少聞士達敗眾皆潰散建德率百餘騎亡去義臣既殺士達以為建德不足憂建德復還平原招集亡卒得數千人軍復大振始自稱將軍此後隋郡縣長吏稍以城降之軍容益盛勝兵十餘萬人十三年正月築壇場於河間樂壽界中自稱長樂王年號丁丑署官屬於是建德進攻河間頻戰不下其後城中食盡又聞煬帝被殺郡丞王琮率士吏發喪建德遣使吊之琮因使者請降始都樂壽號曰金城宮自是郡縣多下之武德二年宇文化及僣號於魏縣建德即日引兵討化及連戰大破之化及保聊城建德四面攻城陷之建德入城先謁隋蕭皇后與語稱臣悉收弒煬帝元謀者斬之梟首轅門之外囚化及并其二子同攻以檻車至大陸縣斬之攻陷洺州虜刺史袁子幹遷都于洺州號萬春宮又與王世充結好遣使朝隋越王侗於洛陽後世充廢侗自立乃絕之始自尊大, krp: 旒}
