  - {type: variant, offset: 935, length: 23, content: 出征遠在遼外今公擁兵出其不意長驅入蘇直扼其喉前, SBCK: 詔髙祖冕十}
  - {type: variant, offset: 935, length: 1395, content: 出征遠在遼外今公擁兵出其不意長驅入蘇直扼其喉前有高麗退無歸路不過旬朔齎糧必盡舉麾一召其眾自降不戰而擒此計之上也關中四塞天府之國若西入長安掩其無備天子雖還失其襟帶據險臨之故當必剋万全之勢此計之中也若隨近逐便先向東都頓堅城之下勝負殊未可知此計之下也玄感曰公之下計乃上策也密計遂不行及玄感敗密乃間行入關為捕者所獲時煬帝在高麗密與其黨俱送帝所及出關外防禁漸弛密請通市酒食每夜醼飲喧譁竟夕使者不以為意行至邯鄲密等七人夜穿墻而遁詣淮陽隱姓名自稱劉智遠聚徒教授經數月蜜鬱鬱不得志為詩曰金風蕩初節玉露凋晚林此夕窮塗士鬱陶傷寸心野平葭葦合村落藿䔧深眺聽良多感徙倚獨霑襟霑襟何所為悵然懷古意秦俗猶末平漢道將何冀樊噲市井屠蕭何刀筆吏一朝時運會萬古傳名謚寄言世上英虛生真可愧詩成而泣下數行會東郡賊帥翟讓聚黨萬餘人密往歸之密因王伯當以策干讓曰當今主昏於上人怨於下銳兵盡於遼東和親絕於突厥方乃巡遊楊越委棄京都此亦劉項奮起之會以足下雄才大略席卷二京誅滅暴虐則隋氏之不足亡也讓深加敬異遣說諸小賊所至皆降密又說讓曰今兵眾既多糧無所出若直取滎陽休兵館穀待士馬肥充然可與人爭利讓以為然於是破金堤關掠滎陽諸縣城堡多下之滎陽太守楊慶及通守張須陁以兵討讓讓大懼將遠避之密曰須陁勇而無謀兵又驟勝既驕且佷可一戰而擒之公但列陣以待為公破之將戰密分兵千餘人於林木間設伏讓與戰不利稍卻密發伏自後掩之須陁眾潰與讓合擊大破之遂斬須陁於陣讓於是令密別統所部密尋復說讓曰昏主蒙塵播蕩吳越群兵竟起海內飢荒明公以英傑之才統驍雄之旅宜當廓清天下誅剪群凶豈可求食草間常為小盜而已今東都士庶中外離心留守諸官政令不一明公親率大眾直掩興洛倉發粟以賑窮乏遠近孰不歸附百万之眾一朝可集先發制人此機不可失也讓曰請君先發僕領諸軍便為後殿得倉之日當別議之大業十三年春密與讓領精兵七千人出陽城北踰方山自羅口襲興洛倉破之開倉恣人所取老弱襁負道路不絕眾至數千萬隋越王侗遣虎賁郎將劉長恭率步騎二萬五千討密密一戰破之長恭僅以身免讓於是推密為主號為魏公二月於鞏南設壇場即位稱元年其文書行下稱行軍元帥魏公府拜翟讓為司徒封東郡公於是城洛口以居之隋虎賁郎將裴仁基率其子行儼以武牢歸密因遣仁基與孟讓率兵二万餘人襲興洛倉破之入東都郛郭掠居人燒天津橋東都出兵乘之仁基等大敗密復親率兵三万逼東都將軍叚達等出兵七万拒之戰於故都城隋軍敗走密復下興洛倉而據之大修營塹以逼東都仍作書數煬帝十罪以移郡縣密兵鋒甚銳每入苑與隋軍連戰會密為流矢所中臥於營內東都復出兵乘之密眾大潰棄興洛倉歸于洛口煬帝遣王世充率勁卒五万擊之與戰不利世充營於洛西與密相拒百餘日大小六十餘戰武陽郡丞元寶藏黎陽賊帥李文相平原賊帥郝孝德等並歸於密共襲破黎陽倉據之翟讓部將王儒信勸讓為大冢宰總統眾務以奪密之權讓兄寬復謂讓曰天子止可自作安得與人若汝不能作我當為之密聞其言陰有圖讓之計會世充列陣而至讓出拒之為世充所擊讓軍少失利密率精銳赴之世充敗走明日讓至密所欲為宴樂具饌以待之密引讓而坐以良弓示讓讓方引滿密遣壯士自後斬之并殺其兄寬及王儒信讓部將徐世勣單雄信等頓首永哀密並釋而慰諭之乃命徐世勣單雄信王伯當分統其眾末幾世充襲倉城密復破之世充復移營洛北造浮橋悉眾以擊密密與千餘騎拒之不利而退世充因薄其城下密簡銳卒數百人以邀之世充大潰乘勝陷偃師於是修金墉城居之有眾三十餘萬將作大匠宇文愷叛東都降于密東至海岱南至江淮郡縣莫不遣使歸密竇建德朱粲楊士林孟海公徐圖朗盧, WYG: 詔髙}
