  - {type: variant, offset: 5679, length: 2, content: 言詔, SBCK: 令廢隋大業律令頒新格巳夘備法駕迎皇髙祖宣簡公巳下神主祔于太廟追謚妃竇氏爲穆皇后庚辰立丗子建成爲皇太子封太宗爲􅁗王齊國公元吉爲齊王諸州揔管加號使持節癸未封隋帝爲􅈶國公薛舉寇涇州命􅁗王爲西討元帥征之改封永康王神通爲淮安王壬辰加􅁗王雍州牧餘官如故秋七月􅁗王與薛舉大戰於涇州我師敗績八月壬午薛舉死其子仁杲復僣稱帝命􅁗王爲元帥以討之凉州賊帥李䡄以其地來降拜凉州㹅管封涼王九月乙巳親録囚徒辛未}
