  - {type: variant, offset: 5677, length: 0, content: '', SBCK: 王后王子王女爵命之號一遵舊典戊午隋帝詔遣使持節兼太保刑部尚書光禄大夫梁郡公蕭造兼太尉司農少卿裴之隠奉皇帝璽紱于髙祖髙祖辭讓百寮上表勸進至于三乃從之隋帝遜于舊邸改大興殿爲太極殿甲子髙祖即皇帝位於太極殿命刑部尚書蕭造兼太尉告於南郊大赦天}
