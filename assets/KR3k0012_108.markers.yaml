  - {type: variant, offset: 6393, length: 0, content: '', WYG: 丙寅王世充舉東郡降河南平秋七月甲子秦王凱旋獻㨗太廟丁夘大赦天下廢五銖錢行開元通寳斬竇建德於市流王世充於蜀甲戌建徳餘黨劉黒闥據漳南反置山東道行臺尚書省於洛州秋八月兖州捴管徐圓朗舉兵反以應劉黒闥僣稱魯王冬十月乙丑加秦王天䇿上將軍位在王公上領司徒陜東道大行臺尚書令齊王元吉為司空乙巳趙郡王李恭平荆州獲蕭銑五年春正月丙申劉黒闥據洺州僣稱漢東王三月丁未秦王破劉黒闥於洺水上盡復所陷州縣黑闥亡奔突厥蔚州總管北平王髙開道叛冦易州夏四月庚戌秦王還京師髙祖迎勞於長樂宫壬申代州總管定襄郡王大思為虜所敗戰死六月劉黑闥引突厥冦山東置諫議大夫官貟七月隋漢陽太守馮益以南越之地来降嶺表悉定八月辛亥以洛荆并幽交五州為大總管府改封恒山王承乾為中山王塟隋煬帝於揚州丙辰突厥頡利冦雁門乙未進㓂朔州遣皇太子及秦王討擊大敗之冬十月己酉遣齊王元吉撃劉黑闥於洺州時山東州縣多為黑闥所守所在殺良吏以應之行軍總管淮陽王道𤣥與黑闥戰於下博道𤣥敗沒十一月甲申命皇太子率兵討劉黑闥丙申幸冝州簡閱將士十二月庚辰校獵於華池庚申至自冝州皇太子破劉黑闥於魏州斬之山東平六年春二月辛夘校獵於驪山三月乙未幸昆明池宴百官夏四月己未幸舊宅改為通義宫曲赦京城繫囚於是置酒為㑹賜從官帛各有差癸酉以尚書右僕射魏國公裴寂為左僕射中書令宋國公蕭瑀為右僕射秋七月突厥頡利㓂朔州遣皇太子及秦王屯并州以備之八月東南道行臺左僕射輔公祏據丹陽反僣稱宋王遣趙郡王孝恭及嶺南道大使永康縣公李靖討之丙寅吐谷渾内附九月丙子突厥退皇太子班師七年二月丁巳幸國子學親臨釋奠改大總管府為大都督府三月戊寅廢尚書省六司侍郎增吏部郎中秩正四品掌選事戊戌趙郡王孝恭大破輔公祏擒之丹陽乃平四月庚子大赦天下頒行新律令以天下大定詔遭父母喪者許終制五月造仁智宫於冝州之冝君縣李世勣討徐圓朗平之六月辛丑幸仁智宫秋七月巂音髓州地震山崩江水咽流八月戊辰突厥㓂并州京師戒嚴壬午突厥退京師觧嚴八年夏六月甲子幸太和宫突厥㓂定州命皇太子往幽州秦王往并州以備突厥八月并州道總管張公謹與突厥戰於大谷王師敗績中書令温彦博沒於賊九月突厥退冬十月辛巳幸周氏陂校獵因幸龍躍宫九年春正月丙申命州縣修城隍備突厥尚書左僕射魏國裴寂為司空二月庚申加齊王元吉為司徒戊寅親祀社稷三月辛夘幸昆明池六月庚申秦王以皇太子建成與齊王元吉同謀害已率兵誅之詔立秦王為皇太子總統萬幾大赦天下八月癸亥詔傳位於皇太子尊帝為太上皇徙居𢎞義宫改名太安宫貞觀二年三月戊申髙祖讌西突厥使者於兩儀殿顧謂長孫無忌曰當今蠻夷率服古未嘗有無忌上萬嵗夀髙祖大恱以酒賜太宗太宗又奉觴上夀流涕而言曰百姓獲安四夷咸附皆尊奉聖旨豈臣之力於是太宗與文徳皇后立進御膳并上服御衣物一同家人常禮是嵗閱武於城西髙祖親自臨視勞將士而還置酒於未央宫三品已上咸侍髙祖命突厥頡利可汗起舞又遣南越部長馮智戴詠詩既而笑曰胡越一家自古未之有也太宗奉觴上夀曰臣早䝉慈訓教以文道爰從義旗平定京邑重以薛舉武周世充建徳等皆上禀筭籌幸而尅定三數年間混一區宇天慈崇寵遂蒙重任上天垂祐時和嵗阜被髪左衽並為臣妾此豈臣智力皆由上禀聖算髙祖大恱羣臣皆呼萬嵗九年五月庚子髙祖大漸下詔從漢制以日易月園陵制度務從儉約是日崩於太安宫之垂拱前殿年七十諡曰大武皇帝廟號髙祖葬獻陵上元元年敬上尊號曰神堯皇帝天寳十三年上尊號曰神堯大聖大光孝皇帝太平御覽卷一百八}
