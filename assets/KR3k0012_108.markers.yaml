  - {type: variant, offset: 37, length: 1, content: 三, SBCK: 􅀄受滎陽樓煩二郡太守徴爲殿内少􅁥九}
  - {type: variant, offset: 37, length: 0, content: '', WYG: 初為滎陽樓煩二郡太守徵為殿内少監九年遷衛尉少卿遼東之役督運於懐逺鎮及楊𤣥感反詔髙祖馳驛鎮𢎞化郡兼知闗右諸軍事髙祖厯試中外素樹恩徳及是招納豪傑衆多款附時煬帝多所猜忌人懐疑懼㑹有詔徵髙祖詣行在所遇疾未謁時甥王氏在後宫帝問曰汝舅何遲王氏以疾對曰可得死不髙祖聞之益懼因縱酒沉湎納賄以混其迹焉十一月煬帝幸汾陽宫命髙祖徃山西河東黜陟討捕師次龍門賊帥馬端兒帥數千薄於城下髙祖從十餘騎撃之所射七十發皆應弦而倒賊乃大潰十}
