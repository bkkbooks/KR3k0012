  - {type: variant, offset: 2331, length: 1273, content: 尚周法明等並隨使通表於密勸進於是密下官屬咸勸密即尊號密曰東都未平不可議此及義旗建密負其強盛欲自為盟主乃致書于高祖為請兄合從以滅隋高祖覽書笑曰李密陸梁於肆不可以折簡致之吾方安輯京師末遑東討即相阻絕便是更生一秦密今適所以為吾南幸恐同永嘉之勢顧此中原鞠為茂草興言感嘆實疚于懷脫知動靜遟數貽報未面虛襟用增勞軫名利之地鋒鏑縱橫深慎垂堂勉茲鴻業密得書甚悅示其部下曰唐公見推天下不足可定於是不虞義師而專意於世充俄而宇文化及率眾自江都北指黎陽兵十餘萬密乃自將步騎二萬拒之隋越王侗稱尊號遣使者授密太尉尚書令東南道大行臺行軍元帥魏國公令先平化及然後入朝輔政密將與化及相抗恐前後授敵因卑辭以報謝焉化及至黎陽與密相遇密遣徐世勣守倉城化及攻之不能下密知化及糧且盡因偽與和以弊其眾化及弗之悟大喜恣其兵食冀密饋之後知其計化及怒與密大戰于衛州之童山下密為流矢所中頓於汲縣化及力竭糧盡眾多叛之掠汲縣北趣魏縣密引兵而西遣使朝于東都執弒煬帝者于弘達以獻越王侗侗召密入朝至溫縣聞世充作難而止乃歸金墉城密雖據倉而無府庫兵數戰皆不獲賞又厚撫初附之兵由是眾心漸怨武德元年九月世充以其眾五千來決戰密留王伯當守金墉自引精兵就偃師北阻邙山以待之世充軍至密遂敗績於萬餘人馳向洛密將入洛口倉城邴元真以遣人潛引世充密陰知之不發其事欲待世充兵半渡洛水然後擊之及世充軍至密候騎不時覺比將出戰世充軍已濟矣密自度不能支引騎而遁徑赴武牢元真以城降於世充密將如黎陽或謂密曰殺翟讓之際徐世勣幾至於死今向其所安可保乎時王伯當棄金墉保河陽密以輕騎自武牢歸之謂伯當曰兵敗矣久苦諸君我今自刎請以謝眾伯當抱密號叫慟絕眾皆泣莫能仰視密復曰諸軍幸不相棄當共歸關中密身雖媿無功諸君必保富貴於是從入關者尚二萬人高祖遣使迎勞相望於道密大喜謂其徒曰我有眾百萬一朝至此命也今事敗歸國幸蒙殊遇當思竭忠以事所奉耳且山東連城數百知吾至此遣使招之盡當歸國比於竇融勳亦不細豈不以一台司見處乎及至京師禮數益薄尋拜光祿卿封邢國公未幾聞其所部將師皆不附世充高祖使密領本兵往黎陽招集故時將仕經略世充時王伯當為左武衛將軍亦令為副密行至桃林高祖復徵之密大懼謀將叛伯當頗止之密不從因謂密曰義士之立志也不以存亡易心伯當荷公恩禮期以性命相報乃簡驍勇數十人著婦人衣戴羃䍦藏刀裙下詐為妻妾自率之入桃林縣舍須臾變服突出因據縣城驅掠畜產直趣南山時右翊衛將軍史万寶留鎮熊州遣副將盛彥師率步騎數千追躡至陸渾縣南七十里與密相及彥師伏兵山谷密軍半渡橫出擊敗之遂斬密時年三十七王世充又曰王世充字行滿本姓支西域胡人也世充頗涉經史尤好兵法及龜筴推步之術開皇中以軍功拜儀同善敷奏明習法律然舞弄文法高下其心或有駮難之者世充利口飾非辭議鋒起眾雖知其不可而莫能屈大業中累遷江都郡丞兼領江都宮監時煬帝數幸江都世充善候人主顏色阿諛順旨每入言事帝必稱善乃雕飾池臺陰奏遠方珍物以媚於帝由是益昵之十年齊郡賊帥孟讓自長白山寇掠諸郡至旴𣅿有眾十餘萬世充以兵拒大破之煬帝以世充有將帥才略復遣領兵討諸小盜所向盡平十一年突厥圍煬帝於鴈門世充盡發江都人將往赴難在軍中蓬首垢面悲泣無度曉夜不解甲藉草而臥煬帝聞之以為忠益信任之, WYG: 冕}
