  - {type: variant, offset: 45, length: 3, content: 載徙為, WYG: 百人九月壬寅馮翊賊帥孫華土門賊帥白𤣥度各率其衆送欵并具舟檝以待義師髙祖令華與統軍王長諧劉𢎞基引兵渡河屈突通遣其虎牙郎將桑顯和率兵數千夜襲長諧義師不利太宗以逰騎數百掩其後顯和潰散義師復振丙辰馮翊太守萬造以郡來降戊午髙祖親率衆圍河東屈突通自守不出乃命攻城不利而還文武將吏請髙祖領太尉加置僚佐從之華隂令李孝常以永豐倉來降庚申唐髙祖率軍濟河舎長春宫三秦士庶至者以千數髙祖禮之咸過所望人皆喜恱丙寅遣隴西公建成司馬劉文静屯兵永豐倉兼守潼闗以備他盗太宗率劉𢎞基長孫順徳等前後數萬人自渭北徇三輔所至皆下髙祖從父弟神通起兵鄠縣柴氏婦起兵於司竹至是並與太宗㑹乙亥命太宗自渭汭屯兵阿城隴西公建成自新豐趣覇上髙祖率大軍自下邽西所經煬帝行宫園苑悉罷之宫女放還親屬冬十月己巳至長樂宫有衆二十萬隋京師留守刑部尚書衛文昇右翊將軍隂世時京兆郡丞滑儀挾}
