  - {type: variant, offset: 1973, length: 458, content: 魯詩章帝重之數進見論難於前特受賞賜劍玦衣服先賢行狀曰王烈字彥考通識達道時國中有盜牛者牛主得之盜者曰我邂逅迷惑從今已後將改過子既已赦宥幸無使王烈聞之人有以告烈者烈以布一端遺之或問此人既有盜畏君聞之反與布何也烈曰昔秦穆公人盜其駿馬食之已而賜之酒盜者不愛其死以救穆公之難今此盜人能悔其過懼聞之知是恥惡則善心將生故與布勸為善也一年之中行路老父檐重人代檐行數十里欲至家置而去問姓字不以告頃之老父復行失劍於路有人行而遇之欲置而去懼後人得之劍主永失所取而購募或能差錯遂守之至暮劍主還見之前者代檐人也老父欖其袂曰子前者代吾檐不得姓名今子復守吾劍于路未有若子之仁子請告吾姓名將以告王烈乃語之而去老父告烈烈曰世有仁人吾未見之使人見之乃昔時盜牛人也雷煥別傳曰煥字孔章鄱陽人善星曆卜占晉司空張華夜見異氣起斗牛華問煥見之乎煥曰此謂寶劍氣華曰時有相吾者云君當貴遶身佩寶劍此言欲效矣乃以煥為豐城令煥至縣移獄掘入三十餘尺得青石亟一枚中有雙劍文采未甚明煥取南昌西山黃白土用拭劍光艷照曜乃送一劍并少黃土與華自留一劍華得劍并土曰此干將也莫耶已復不至然天生, SBCK: ''}
