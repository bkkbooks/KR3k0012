  - {type: variant, offset: 483, length: 0, content: '', SBCK: 勾踐使工人以白牛白馬祀昆吾山神以成八劒一名掩日以之指日則日光晝暗金者隂物也隂盛則陽滅二曰断水畫水開即不合三曰轉魄指月蟾免爲之倒轉四曰懸剪飛鳥遊遇觸其刃如斬截焉五曰驚鯢以之沈海鯨鯢爲之深入六曰滅魂扶以之夜行不遇魑魅七曰却邪有妖魅見之則止八日真剛以之切玉断金如刻削土木矣以應八方之氣也雷次宗豫章記曰吴未亡恒有紫氣見於牛斗之間占者以爲吴方興唯張華以爲不然及平此氣逾明張華聞雷孔章妙逹緯象乃要􅀫屏人}
  - {type: variant, offset: 483, length: 0, content: '', WYG: 句踐使工人以白牛白馬祀昆吾山神以成八劒一名掩日以之指日則日光晝暗金者隂也隂盛則陽减二曰斷水畫水開即不合三曰轉魄指月蟾兎為之倒轉四曰懸剪飛鳥逰遇觸其刃如斬截焉五曰驚鯢以之沈海鯨鯢為之深入六曰滅魂仗之以夜行不遇魑魅七曰却邪有妖魅見之則止八曰真剛以之切玉斷金如刻削土木矣以應八方之氣也雷次宗豫章記曰吳未亡恒有紫氣見於牛斗之間占者以為吳方興唯張華以為不然及平紫氣愈明張華聞雷孔章妙達緯象乃要宿屏人}
