  - {type: variant, offset: 12, length: 1, content: 越, SBCK: 伍貟如吴過於荆至江上欲渉見一丈人刺小舡方將漁從而請焉丈人刺度之巳絶江問其名族則不肯告解其劒以與丈人曰千金劒也願獻之丈人丈人不受曰荆國之法得伍貟者爵執圭禄萬石金千鎰昔者子胥過呉尚猶不取今我何用子之千金劒爲乎伍貟過於呉使人求之江上則不從得毎食必􅀕之祝曰江上之丈人天地至大矣將奚不有名不可得而聞身不可得而見又曰相劒者曰白所以爲堅也黄所以爲紐也黄白􅄂則堅且紐良劒也難者曰白所以不爲紐也黄所以爲不堅也黄白􅄂則不堅且不紐又柔則錈堅則折劒折且錈焉得爲利劒劒之精未革而或以爲良或以為惡􅀃使之也故有以聦明聽􅀃則妄􅀃者止无以聦明聽􅀃則堯桀无別矣此忠臣之所患賢者之所以廢也又曰荆有次非者一作佽得寳劒于干遂干遂邑名還反渉江至於中流有兩蛟夾繞其舩次非謂舟人曰汝嘗見兩蛟夾舟而舟中之人有全活者乎舟人曰未之見也次非曰􅀂如是吾固江中腐肉朽骨耳棄劒而巳余何愛焉遂攘臂祛衣抜劒赴江刺蛟殺之而復上舟中之人皆獲全荆}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_SBCK_344-1b}
  - {type: variant, offset: 12, length: 1, content: 越, WYG: 伍員如吳過於荆至江上欲渉見一丈人刺小船方將漁從而請焉丈人刺度之已絶江問其名族則不肯告解其劒以與丈人曰千金劒也願獻之丈人丈人不受曰荆國之法得伍員者爵執圭禄萬石金千鎰昔者子胥過吳尚猶不取今我何用子之千金劒為乎伍員遇於吳使人求之江上則不能得毎食必祭之祝曰江上之丈人天地至大矣將奚不有名不可得而聞身不可得而見又曰相劒者曰白所以為堅也黄所以為靱也黄白雜則堅且靱良劒也難者曰白所以不為靱也黄所以不為堅也黄白雜則不堅且不靱又柔則錈堅則折劒折且錈焉得為利劒劒之精未革而或以為良或以為惡説使之也故有以聰明聼説則妄説者止無以聰明聼説則堯桀無别矣此忠臣之所患賢者之所廢也又曰荆有次非者一得攸得寳劒扵干遂干遂邑名還反渉江至於中流有兩蛟夾繞其船次非謂舟人曰汝常見兩蛟夾舟而舟中之人有全活者乎舟人曰未之見也次非曰若如是吾固江中腐肉朽骨耳棄劒而已余何愛焉遂攘臂祛衣拔劒赴江刺蛟殺之而復上舟中之人皆獲全荆}
