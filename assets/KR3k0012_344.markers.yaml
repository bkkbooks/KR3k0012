  - {type: variant, offset: 1531, length: 3, content: 為晉君, SBCK: 巨闕辟閭皆古之良劒也尉繚子曰呉越臨戰左右進劒呉子曰夫提皷揮捊臨難決疑接兵用刃此將軍也一劒之任非將軍事也又曰一賊鋏劒擊於市萬人無不觸辟者臣以爲非一人獨勇一市萬人皆不肖尸子曰水試断鵠鴈陸試断牛馬所以觀良劒也燕丹子曰荆軻左手把􅁗王䄂右手椹音砧其􅅐􅁗王曰今日之事從子計耳乞聽琴聲而死召􅁎人皷琴聲曰羅􅜄單衣可裂司德狀拜二而絶八尺屏風可超而越鹿盧之劒可􅀒而抜王於是􅁬䄂超屏風而走荆軻擲劒中銅柱焉淮南萬畢術曰拔劒􅀝户兒不夜驚又曰夫淳劒魚膓之始下夫擊則不能断刺則不能入髙誘注曰魚膓文繞屈譬􅀂魚膓又曰劒工或劒之似莫耶者唯歐治能名其種歐治良工也玉工眩玉之似碧盧者唯猗頓不失其情碧盧或}
