  - {type: variant, offset: 19, length: 0, content: '', SBCK: 其石爲鐵作劒光明照洞如水精以割玉如土又曰劒名飛􅀭山海經曰鮫魚皮有珠文而堅可以飾刀劒口又曰汲郡冡中得銅劒一枚長三尺五寸今所名干將劒明古者通以錫銅爲兵噐又曰有君}
