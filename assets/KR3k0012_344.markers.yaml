  - {type: variant, offset: 533, length: 3, content: 為劍願, SBCK: 爲劒太子曰吾王所好劒士也蓬頭突􅁂垂冠縵胡之纓短後之衣瞋目而語難王見􅀃之今夫子必儒服見王事必大逆莊子請治劒服三日太子乃見王王脫白刃待之莊子入殿門不趍見王不拜王曰子欲何以教寡人使太子先焉曰臣聞大王喜劒故以劒見王王曰子之劒何能禁制曰臣之劒十歩}
