  - {type: variant, offset: 487, length: 0, content: '', SBCK: 九女季誕有小女名􅀉應慕而行乃請好劒咋蛇大作數斛深宻灌之以置穴口蛇出頭大如囤目如二尺鏡先啖深宻􅀉便放犬咋蛇以劒斫殺得九女髑髏越王乃娉􅀉爲后又曰㑹稽賀瑀字彦琚得疾不知人唯心下温二日蘇云吏巳將上天入曲房旁中有層架其上層有印中層有劒使瑀唯意所取而短不及上層取劒而出門吏曰恨不得印可䇿百神劒唯得使社公耳異苑曰晉惠帝元康三年武庫火燒孔子􅄚髙祖斬白蛇劒王莽頭等三物中書監張茂先懼難作列}
