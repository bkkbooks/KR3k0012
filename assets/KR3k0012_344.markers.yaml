  - {type: variant, offset: 613, length: 0, content: '', SBCK: 無前舉之無上按之無下運之無旁上决浮雲下絶地紀此劒一用匡諸侯天下服矣此天子之劒也文王芒然自失曰諸侯之劒如何曰諸侯之劒以智勇士爲鋒以清廉士爲鍔以賢良士爲脊以忠聖士爲鐔以豪傑士爲鋏此劒直之以無前舉之亦無上按之亦無下運之亦無旁上法圎天以順三光下法方地以順四}
  - {type: page-break, offset: 613, content: '', id: KR3k0012_SBCK_344-5b}
  - {type: variant, offset: 613, length: 0, content: '', WYG: 無前舉之無上按之無下運之無旁上决浮雲下絶地紀此劍一用匡諸侯天下服矣此天子之劒也文王茫然自失曰諸侯之劒何如曰諸侯之劒以智勇士為鋒以清亷士為鍔以賢良士為脊以忠聖士為鐔以豪傑士為鋏此劒直之亦無前舉之亦無上按之亦無下運之亦無旁上法圓天以順三光下法方地以順四}
  - {type: page-break, offset: 613, content: '', id: KR3k0012_WYG_344-8b, image: WYG0896/WYG0896-0090d.png}
