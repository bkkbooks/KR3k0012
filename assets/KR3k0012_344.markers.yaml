  - {type: variant, offset: 1531, length: 0, content: '', WYG: 巨闕辟閭皆古之良劒也尉繚子曰吳越臨戰左右進劒吳子曰夫提鼓揮桴臨難决疑接兵用刃此將軍也一劒之任非將軍事也又曰一賊鋏劒擊於市萬人無不觸辟者臣以}
  - {type: variant, offset: 1531, length: 3, content: 為晉君, krp: 巨闕辟閭皆古之良劒也尉繚子曰呉越臨戰左右進劒呉子曰夫提皷揮捊臨難決疑接兵用刃此將軍也一劒之任非將軍事也又曰一賊鋏劒擊於市萬人無不觸辟者臣以爲非一人獨勇一市萬人皆不肖尸子曰水試断鵠鴈陸試断牛馬所以觀良劒也燕丹子曰荆軻左手把秦王䄂右手椹音砧其胸秦王曰今日之事從子計耳乞聽琴聲而死召姬人皷琴聲曰羅縠單衣可裂司德狀拜二而絶八尺屏風可超而越鹿盧之劒可負而抜王於是奮䄂超屏風而走荆軻擲劒中銅柱焉淮南萬畢術曰拔劒倚户兒不夜驚又曰夫淳劒魚膓之始下夫擊則不能断刺則不能入髙誘注曰魚膓文繞屈譬若魚膓又曰劒工或劒之似莫耶者唯歐治能名其種歐治良工也玉工眩玉之似碧盧者唯猗頓不失其情碧盧或}
  - {type: variant, offset: 1532, length: 2, content: 晉君, WYG: 非一人獨勇一市萬人皆不肖尸子曰水試斷鵠鴈陸試斷牛馬所以觀良劒也燕丹子曰荆軻左手把秦王袖右手椹音砧其胷秦王曰今日之事從子計耳乞聼琴聲而死召姬人鼓琴姬人乃歌曰羅縠單衣可裂而絶八尺屏風可超而越鹿盧之劒可負而拔王於是奮袖超屏風而走荆軻擲劒中銅柱焉淮南萬畢術曰拔劒倚戸兒不夜驚又曰夫淳劒魚腸之始下夫擊則不能㫁刺則不能入髙誘注曰魚膓繞屈譬若魚膓又曰劒工惑劒之似莫耶者唯歐冶能名其種歐冶良工也玉工炫玉之似碧盧者唯猗頓不失其情碧盧或}
