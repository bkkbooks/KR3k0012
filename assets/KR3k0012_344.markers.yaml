  - {type: variant, offset: 3141, length: 1476, content: 尺一寸又曰太田在位三十二年以四年歲次甲子鑄一劍長二尺九寸文曰定光古文篆書又曰武丁在位五十九年歲次戊午鑄一劍長三尺銘曰照膽大篆書又曰周昭王瑕在位五十一年二年歲次壬午鑄五劍各投五岳鎮方岳大篆書長五尺又曰簡王夷在位十四年歲次癸酉鑄一劍銘曰日駿長三尺大篆書又曰秦昭王在位五年元年丙午鑄一劍長三尺銘曰誡大篆書又曰始皇在位三十七年三年丁巳採北祇銅鑄二劍銘曰定秦李斯小篆書李斯刻一口埋在阿房闕下一口埋在日觀臺長六尺又曰前漢劉季在位十二年季以始皇三十四年於南山得一鐵劍長三尺小篆書銘曰赤霄及貴常服之此即斬白蛇之劍也又曰文帝恒在位二十三年以初元十九年庚午鑄三劍各長三尺三寸銘曰神龜形以應大撗之兆帝崩命入玄宮又曰武帝徹在位五十四年以元光五年乙巳鑄八劍各長三尺六寸銘曰八服小篆書嵩霍衡華太山皆埋之又曰宣帝詢在位二十五年太始四年鑄兩劍各長三尺一曰毛二曰貴以應足下毛之祥皆小篆書又曰平帝衍在位五年元始元年辛酉掘得一劍上有帝名因服之大篆書又曰新室王莽在位十八年建國五年庚午造威㪷及神劍皆鍊五石為之銘曰神勝萬國伏小篆書長三尺六寸又曰劉更始聖公在位二年自造一劍銘曰更國小篆書又曰後漢光武劉秀在位三十三年未貴時在南陽鄂水中得一劍文曰秀霸小篆書帝服之又曰漢明帝在位十八年元和元年戊午鑄一劍上作龍形沉之于洛水洛水清往往有人見又曰章帝烜在位十三年建初八年鑄一金劍投之伊水中以厭𣍿人之怪弘景按水經伊水有一物如人𣍿頭有人浴輒引之投水又曰安帝祐在位十九年永初七年鑄一劍藏峨嵋山擬山王也又曰順帝寶在位十九年永建元年鑄一劍長三尺四寸小篆書銘曰安漢後遂為年號又曰靈帝宏在位二十二年以建和三年鑄四劍銘曰中興一劍無故而失又曰魏武帝曹操以建安二十年於谷中得一劍三尺六寸上有金字銘曰孟德王常服之又曰齊王芳正始六年造一劍常服之無故失其刃但有空匣又曰吳主孫權黃武五年採武昌山銅鐵作十口劍萬口刀各長三尺九寸刀頭方皆是南鋼越炭作之上有大吳篆字又曰吳孫權赤烏中有人得淮陰侯韓信劍帝賜周瑜又曰孫亮建興二年鑄一劍銘曰流光小篆書又曰孫皓建初元年鑄一劍銘曰皇帝吳主小篆書又曰蜀後主劉禪延熙二年造大金劍長一丈二尺鎮劍口山往往人見輝光後人處處求覔不得又曰宋劉昱元徽二年於蔣山頂造一劍銘曰永蜀小篆書又曰蜀主劉備章武元年辛丑棌金牛山鐵鑄八鐵劍各長三尺六寸一備自佩一與太子一與梁王理一與魯王永一與諸葛亮二與張飛關羽一與趙雲並是亮書作風角處所又曰晉懷帝名熾永嘉元年造一劍長五尺銘曰步光篆字又曰東晉司馬衍咸和元年造劍十三口銘曰興國又曰東晉司馬昌明太元十年於金華山頂埋一劍銘曰神劍又曰後魏道武帝登國元年於阿理鑄二劍一銘曰鎮山一銘曰沈水並隸書又曰明元帝以太常元年造一劍長四尺銘背曰太常又曰太武帝至真君元年有道士繼天師自為帝造劍因改元為真君劍長三尺六寸隸書又曰梁武帝蕭衍天監元年即位至普通中歲在庚申命弘景造神劍十三口用金銀銅鐵錫五色合為此劍長短各依劍洞術法一曰凝霜道家三洞九真劍上刻真人玉女名字二曰宮儀備齋六宮有劍神名無刃刻宮宿星皇后服之三曰摛光備非常御斬刺長三尺六寸上刻風伯雨師形名四曰九天出軍行師君執授將長五尺金鏤作𧈪尤神形五曰伐形刻符籙道家登真圖口決六甲神長五尺六曰四目突宮闈茵被臥止小室幄帳中長三尺五寸七曰五威靈光長二尺許半身有刃上刻星辰北斗天市天魁二十八宿服此除百邪魑魅去厭即伏用之八曰風烏有惡鳥鳴起鎮之上有黃帝呪法禹步形勢用之九曰司命行刑煞罰者執之賜萬姓自裁者十曰禮劍生畜男子弧矢縠劍則用之十二曰永昌鎮國安社用之長七尺十三曰閏劍長六尺所以作十三口象閏月故也取上元甲子時加斗魁加歲正月旦合合之取風雷雨震日止環偏長八寸文曰服之者永治四方小篆文, SBCK: ''}
