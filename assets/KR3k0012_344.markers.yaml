  - {type: variant, offset: 610, length: 1, content: 當, SBCK: 得五六人使捧劒於殿下乃召莊子王曰今日使劒士交劒莊子曰望之以乆矣王曰夫子御杖長短如何莊子曰臣之所奉皆可臣有三劒唯王所用請先言而後試王曰願聞三劒曰有天子之劒有諸侯之劒有庶人之劒王曰天子之劒何如曰天子之劒以燕谿石城爲鋒齊岱爲鍔晉衛爲脊周宋爲鐔韓魏爲鋏苞以四夷褁以四時統以渤海帶以常山制以五行論以刑德開以隂陽持以春夏行以秋冬}
  - {type: variant, offset: 610, length: 1, content: 當, WYG: 得五六人使捧劒於殿下乃召莊子王曰今日試使士敦劒莊子曰望之以乆矣王曰夫子御杖長短如何莊子曰臣之所奉皆可臣有三劒唯王所用請先言而後試王曰願聞三劒曰有天子之劒有諸侯之劒有庶人之劒王曰天子之劒何如曰天子之劒以無谿石城為鋒齊岱為鍔晋衛為春周宋為鐔韓魏為鋏苞以四夷裹以四時統以渤海帶以常山制以五行論以刑徳開以隂陽持以春夏行以秋冬}
