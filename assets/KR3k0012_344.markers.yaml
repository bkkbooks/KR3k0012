  - {type: variant, offset: 1312, length: 214, content: 胥走吳至江上見漁者曰來渡我漁者知其非恒人即載入舡子胥即解其劍以與漁者曰吾先人之劍直百金請以與子也漁者曰吾聞荊王有令曰能得伍子胥者購之千金吾欲得荊王之千金何以子百金之劍為漁者渡千斧之津曰亟飡而去無令遣追者及子也子胥行即覆舡伏匕首自刎而死琴操曰聶政父為韓王冶劍過期不成王殺之時政未生壯問母知之乃上太山遇仙人學鼓琴漆身為厲吞炭變音七年琴成入韓逢其妻從置櫛對妻而笑妻泣曰君何似政齒政曰天下人齒相似反入山援石擊落其齒以刀內琴中刺韓王列士傳, SBCK: ''}
