  - {type: variant, offset: 302, length: 177, content: 捧爐天帝壯炭太一下觀於是歐冶子曰天地之精悉其伎巧造為此劍吉者宜王凶者可以遺人凶者尚直萬金况純鈞者耶取湛盧薛燭曰善哉衘金鐵之英吐銀錫之精奇氣託靈有遊出之神服此劍者可以折衝伐敵人君有逆謀則去之他國允常乃以湛盧獻吳吳公子光殺吳王僚湛盧去如楚昭王寤而得之召風胡子問之此劍直幾何對曰赤董之山已合若耶之溪深而不測群神上天歐冶已死雖有傾城量金珠玉不可與况駿馬萬戶之都乎, SBCK: 虎吟}
