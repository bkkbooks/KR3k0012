  - {type: variant, offset: 2434, length: 0, content: '', WYG: 不隔千祀儻還并梁吳鈞詠寳劒詩曰我有一寳劒出自昆吾溪照人如照水切玉如切泥鍔邊霜凛凛匣上風凄凄寄語張公子何}
  - {type: variant, offset: 2434, length: 0, content: '', krp: 不隔千祀儻還并梁吴均詠寳劒詩曰我有一寳劒出自昆吾溪照人如照水切玉如切泥鍔邊霜凛凛匣上風凄凄寄語張公子何}
  - {type: variant, offset: 2435, length: 2, content: 合耳, SBCK: 來見携梁崔鴻詠劒詩曰寳劒出昆吾􅀛龍夾采珠五精􅀄獻術千戸竟論都匣氣衝牛斗山形轉鹿盧欲知天下貴持此問風胡曹植七啓曰歩光之劒越劒名華藻繁縟飾以文犀彫以翠緑綴以驪龍之珠錯以荆山之玉陸断犀象未足稱雋隨波截鴻水不漸刃張景陽七命曰楚之陽劒歐冶所營陽劒名也耶谿之挺赤山之精銷踰羊頭羊頭骨銷之也鏷以鍜成}
  - {type: variant, offset: 2435, length: 2, content: 合耳, WYG: 來見攜梁崔鴻詠劒詩曰寳劒出昆吾龜龍夾采珠五精初獻術千戸竟論都匣氣衝牛斗山形轉鹿盧欲知天下貴持此問風胡曹植七啓曰歩光之劒越劒名華藻繁縟飾以文犀彫以翡翠縁以驪龍之珠錯以荆山之玉陸斷犀象未足稱雋隨波截鴻水不漸刃張景陽七命曰楚之陽劒歐冶所營陽劒名也耶谿之鋌赤山之精銷踰羊頭羊頭骨銷之也鏷以鍜成}
