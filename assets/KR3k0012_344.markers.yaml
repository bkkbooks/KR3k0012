  - {type: variant, offset: 614, length: 0, content: '', SBCK: 中和人意以安四郷此劒一用如雷電之震也四封之内無不賔服而聽從君命者此諸侯之劒也王曰庶人之劒如何曰庶人之劒蓬頭突􅁂垂冠縵胡之纓短後之衣瞋目而語難相擊於前上斬頸頷下决肝肺此无異􅋐雞一旦命已絶矣无所用於國事今大王有天子之位而好庶人之劒臣竊爲大王薄之王乃牽而上殿􅌠人上食王三環之莊子曰王安坐定氣劒事畢矣於是文王不出宮三月劒士}
  - {type: variant, offset: 614, length: 0, content: '', WYG: 中和人意以安四鄉此劒一用如雷電之震也四封之内無不賔服而聼從君命者此諸侯之劒也王曰庶人之劒何如曰庶人之劒蓬頭突鬢垂冠縵胡之纓短後之衣瞋目而語難相擊於前上斬頸頷下次肝肺此無異鬭雞一旦命已絶矣無所用於國事今大王有天子之位而好庶人之劒臣竊為大王薄之王乃牽而上殿宰人上食王三環之莊子曰王安坐定氣劒事畢矣於是文王不出宫三月劒士}
