  - {type: variant, offset: 483, length: 0, content: '', krp: 勾踐使工人以白牛白馬祀昆吾山神以成八劒一名掩日以之指日則日光晝暗金者隂物也隂盛則陽滅二曰断水畫水開即不合三曰轉魄指月蟾免爲之倒轉四曰懸剪飛鳥遊遇觸其刃如斬截焉五曰驚鯢以之沈海鯨鯢爲之深入六曰滅魂扶以之夜行不遇魑魅七曰却邪有妖魅見之則止八日真剛以之切玉断金如刻削土木矣以應八方之氣也雷次宗豫章記曰吴未亡恒有紫氣見於牛斗之間占者以爲吴方興唯張華以爲不然及平此氣逾明張華聞雷孔章妙逹緯象乃要宿屏人}
  - {type: variant, offset: 484, length: 2, content: 范蠡, SBCK: 天文將來􅁻凶孔章曰無他象唯牛斗之間有異氣是寳物之精上徹於天耳此氣自正始嘉平至今日衆咸謂孫氏之祥唯吾識其不然今聞子言乃玄與吾同今在何郡曰在豫章豐城張遂以孔章爲豐城令至縣移獄掘􅀷二丈得玉匣長八九尺開之得二劒一龍淵二即太阿其夕牛斗氣不復見孔章乃留其一匣龍淵而進之劒至張公於宻發之光熖鞾韡煥􅀂電發後張遇害此劒飛入襄城水中孔章臨亡誡其子􅁪以劒自隨後其子爲建安從事經淺瀬劒忽於腰中躍出􅀄出猶是劒入水乃變爲龍逐而視之見二龍相隨而逝焉孔章曽孫穆之猶有張公與其祖書反覆桒根紙古字縣後有掘劒窟方廣七八尺捜神記曰東越門中有嶺髙數十里下北隰中有大蛇長七八丈大十餘圍常病都尉及長吏下夢巫覡欲得童女常八月朝􅀕送蛇輙吞之巳}
  - {type: page-break, offset: 484, content: '', id: KR3k0012_SBCK_344-3b}
  - {type: variant, offset: 484, length: 2, content: 范蠡, WYG: 天文將來吉凶孔章曰無他象唯牛斗之間有異氣是寳物之精上徹於天耳此氣自正始嘉平至今日衆咸謂孫氏之祥唯吾識其不然今聞子言乃𤣥與吾同今在何郡曰在豫章豐城張遂以孔章為豐城令至縣移獄掘深二丈得玉匣長八九尺開之得二劒一龍淵二即太阿其夕牛斗氣不復見孔章乃留其一匣龍淵而進之劒至張公於密室發之其光照室煥若電發後張遇害此劒飛入襄城水中孔章臨亡誡其子爽曰恒以劒自隨後其子為建安從事經淺瀨劒忽於腰中躍出初出猶是劒入水乃變為龍逐而視之見二龍相隨而逝焉孔章曾孫穆之猶有張公與其祖書反覆有根據豐城縣後有掘劒窟方廣七八尺搜神記曰東越閩中有嶺髙數十里下北隰中有大蛇長七八丈大十餘圍常病都尉及長吏下夢巫覡欲得童女常八月朝祭送蛇輙吞之已}
