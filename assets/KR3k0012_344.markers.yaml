  - {type: variant, offset: 622, length: 0, content: '', SBCK: 越之劒匣而藏之不敢輕用寳之至也又曰大冶鑄金金踊躍曰我必爲鏌鎁烈子曰魏黒夘以匿嫌殺兵邴章匿嫌私恨也邴章之子來丹謀復父讎而丹氣甚猛其形甚露露羸耻假力於人誓以手劒而黒夘力抗百人非人􅀋也其視來丹猶鄒鷇也來丹之友申抱曰子怨黒夘至矣黒夘之易子過矣}
