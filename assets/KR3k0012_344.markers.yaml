  - {type: variant, offset: 2658, length: 103, content: 劍也以道德為城以仁義為郭莫之敢攻莫之敢入文王是也以道德為冑仁義為劍莫之敢當莫之敢禦湯武是也今不建不攻之城不可當之兵而任匹夫之役而行三尺之刃亦細矣魏文帝典論曰余好擊劍善以短乘長選茲良金命彼國工精而鍊之至于百辟, SBCK: 劒丗載}
