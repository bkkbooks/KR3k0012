  - {type: variant, offset: 1737, length: 214, content: 楚王作劍餘悉同也孝子傳曰眉間赤名赤鼻父干將母莫耶父為晉王作劍藏雄送雌母孕尺父曰男當告之曰出戶望南山松上石上劍在其巔及產果男母以告尺尺破柱得劍欲報晉君客有為報者將尺首及劍見晉君君怒烹之首不爛王臨之客以擬王王首墜湯中客因自擬之三首盡麋不分乃為三冢曰三王冢也文士傳曰魏文帝愛楊脩才脩誅後追憶脩脩曾以寶劍與文帝文帝後佩之告左右曰此楊脩劍也周斐先賢傳曰許嘉給縣功曹儀小吏常持劍侍臣功曹月朔晨朝并持炬火嘉於是忿然歎曰男兒為吏不免賤役即投火於, WYG: 天}
