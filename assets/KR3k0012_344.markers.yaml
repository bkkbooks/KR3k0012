  - {type: variant, offset: 524, length: 5, content: 稱袁公袁公, SBCK: 泉而出捧水心劒曰令君制有西夏老子曰服文彩帶利劒又曰善攝生者兵無所容其刃莊子􅀃劒篇曰昔趙文王喜劒劒士俠門而客三千餘人日夜相擊於前死傷者歳百餘人好之不厭如是三年國衰諸侯謀之太子悝患之募左右曰孰能􅀃王之意止劒士者奉千金左右曰莊折子當能太子使人奉千金莊子弗受與使者皆往見太子}
