  - {type: variant, offset: 14, length: 4, content: 允常聘歐, SBCK: 聞之仕以執圭周禮侯執信圭楚以次非爲勇武侯孔子聞之曰腐肉朽骨猶能除害見幾哉又曰劒不徒断車不自行或使之也又曰楚王有渉江者其劒自舟中墜於水遽契其舟曰是吾劒之所從墜也舟止從其所契者入水求之舟巳行矣而劒不行求劒􅀂此不亦惑乎龍魚河圖曰流洲在西海中地方三千里上多山川積石名爲昆吾石}
