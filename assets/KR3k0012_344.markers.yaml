  - {type: variant, offset: 789, length: 479, content: 中莫邪曰先師親爍身以成物妾何難也於是干將夫妻乃斷髮揃音剪指投之鑪中使僮女一作子三百鼓橐裝炭金鐵乃濡遂以成劍陽曰干將而作龜文陰曰莫邪而作漫理干將匿其陽出其陰而獻之闔閭闔閭甚惜之又曰伍子胥過江解劍與漁父曰此劍中有七星北斗文其直千金越絕書曰楚王召風胡子而問之曰寡人聞吳有干將越有歐冶子此二人寡人願齎邦之重寶皆以奉子因吳王請此二人為鐵劍可乎風胡子曰善於是乃令風胡子之吳見歐冶子干將使之為鐵劍歐冶子干將鑿茨山洩其溪取其鐵英為劍三枚一曰龍淵二曰太阿三曰工市劍成風胡子奏之楚王楚王見之精神太悅見風胡子問之曰此三劍其名為何風胡子曰一曰龍淵二曰太阿三曰工市楚王曰何為龍淵太阿工市風胡子對曰欲知龍淵觀其狀如登高山臨深淵欲知太阿觀其鍔巍巍翼翼如流水之波欲知工市觀其鍔從文間起至脊而止如珠而不可枉文若流而不絕晉鄭聞此三劍而求之不得興師圍楚之城三年不解倉穀盡庫無兵革於是引太阿之劍登城而麾之三軍破敗士卒迷惑流血千里晉鄭之頭畢白楚王於是大悅曰此劍威耶寡人力也風胡子對曰劍之威也因大王之神楚王曰夫劍鐵耳固能有精神如此乎風胡子曰神農以石為兵黃帝以玉為兵禹以銅鐵為兵天下皆服此亦鐵之神也王之德, SBCK: 始}
