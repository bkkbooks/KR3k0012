  - {type: variant, offset: 119, length: 182, content: 雲煙今其光已離矣王復取魚腸示之薛燭曰夫寶劍者金精從理至本不逆今魚腸倒本從末逆理之劍也服此者臣弒其君子弒其父王取純鈞示之薛燭矍然而望之曰光乎如屈陽之華沈沈如芙蓉始生於湘觀其文如列星之芒觀其光如水之溢塘觀其色渙如冰將釋見日之光此純鈞者也王曰是也客有買此劍者市之鄉三十駿馬千疋千戶之都二其可與乎薛燭曰不可臣聞王之初造此劍赤董之山破而出錫若耶之溪涸而出銅雨師灑道雷公發鼓蛟, SBCK: ''}
