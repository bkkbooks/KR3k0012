  - {type: variant, offset: 2241, length: 177, content: 呂氏春秋曰倕作鞞鼓鄭緝之東陽記曰晉隆安中孫恩遣偏師謝咸攻東陽東陽岑山下民聞嶺上有鼓鞞聲若數萬人咸破潰而山上鼓鞞亦絕鞀鬻子曰禹之治天下也懸五聲以聽之曰語寡人以獄訟者揮鞀音挑呂氏春秋曰倕作鞀又曰武王有誡慎之鞀欲誡者捶鞀鼓鐃說文曰鐃小鉦也鐃女交切周禮曰六鼓四金以金錞和鼓以金鐲節鼓以金鐸通鼓鐲音濁鉦也軍行鳴之以為鼓節鈴說文曰鈴丁也從金令聲左傳曰揚鑾和鈴昭其聲也, SBCK: ''}
