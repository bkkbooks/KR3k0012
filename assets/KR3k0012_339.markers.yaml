  - {type: variant, offset: 2076, length: 0, content: '', SBCK: 拂日蔽天應璩書曰左執屈盧之勁矛右秉于將之雄㦸髙冠拂雲長劒耿介簫管振音厥聲載路馮軾虎視清風震疊可謂堂堂乎難與並爲仁也太白隂經曰工欲善其事必先利其器器之於事如影之隨形嚮之應聲其相須如左右手故曰器械不精不可言兵五兵不利不可舉事上古庖犧氏之時􅁌木爲弓剡木爲矢神農氏之時以石爲兵故砮石中矢鏃黄帝之時以玉爲兵􅃖尤之時爍金爲兵割革爲甲始制五兵建旗幟樹䕫鼓又曰鼓以佐軍威又曰纛六口大將中營建出引六軍右者天子六軍諸侯三軍今天子十二諸侯六軍故纛有六以主之又曰門旗二口色紅八幅大將牙門之旗出引將軍}
