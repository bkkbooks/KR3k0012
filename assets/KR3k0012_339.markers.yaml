  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 七十叙兵器牙叙兵器禮記曰冕弁兵革藏於私家是謂脅君周禮曰司兵掌五兵五兵者戈殳㦸矛牟夷左傳曰孔文子將攻太叔訪于仲尼仲尼曰胡簋之事則嘗聞之矣兵甲之事未之學也春秋佐期曰太尉主甲卒神名辯㑹曰庫兵動鼓自鳴諸侯得衆也漢書曰兵不銳利與空手同甲不堅宻與􅃝裼同弩不及逺與短兵同射不能中與亡矢同中不能入與亡鏃同此將不省兵之禍也又曰韓延壽在東郡試􅀐士治飾兵車􅀞龍虎建幢棨植羽葆鼓車又取官銅候月蝕鑄作刀劒倣効尚方蕭望之以爲僣上不道弃市又曰李陵至浚稽山與單于相值圍陵陵軍居兩山間以車爲營陵引士營外爲陳前行持㦸楯後行持弓弩東觀漢記曰盆子降鎧甲兵弩積城西門髙與熊耳山等又曰王莾之遣王㝷王邑也欲盛威以震山東甲衝輣干戈旌旗甚盛又曰鄧遵永􅀄中遷度遼將軍討擊羗虜斬首八百餘級得鎧弩刀矛㦸楯匕首二三千枚又曰呉漢性忠厚篤於事上自􅀄從征伐常在左右兵有不利軍營不如意漢常獨繕激􅀭吏士呉志曰賀齊性奢侈尤好軍事兵甲器械極爲精好干櫓戈矛葩􅀲文􅀞弓弩矢箭咸取上材王隱晉書曰羊祜表伐呉曰勁弩長弓不如中國長矛楯㦸不如中國馬􅀐淩厲又不如中國呉唯便水戰一入其地則長江非復呉有晉起居注曰成帝咸和元年四月乙丑詔曰作琅邪王大車斧}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_SBCK_339-1b}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_SBCK_339-2a}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 七十叙兵噐牙叙兵噐禮記曰冕弁兵革藏於私家是謂脅君周禮曰司兵掌五兵五兵者戈殳㦸矛牟夷左傳曰孔文子將攻太叔訪于仲尼仲尼曰簠簋之事則嘗聞之矣兵甲之事未之學也春秋佐助期曰太尉主甲卒神名辦㑹曰庫兵動鼓自鳴諸侯得衆也漢書曰兵不鋭利與空手同甲不堅宻與袒裼同弩不及逺與短兵同射不能中與亡矢同中不能入與亡鏃同此將不省兵之禍也又曰韓延夀在東郡試騎士治飾兵車畵龍虎建幢棨植羽葆古車又取官銅候月蝕鑄作刀劒倣効尚方蕭望之以為僣上不道棄市又曰李陵至浚稽山與單于相值圍陵陵軍居兩山間以車為營陵引士營外為陳前行持㦸楯后行持弓弩東觀漢記曰盆子䧏鎧甲兵弩積城西門髙與熊耳山等又曰王莽之遣王尋王邑也欲盛威以震山東甲衝輣干戈旌旗甚盛又曰鄧遵永初中遷度遼將軍討擊羗虜斬首八百餘級得鎧弩刀矛㦸楯楯首二三千枚又曰吳漢性忠厚篤於事上自初從征伐常在左右兵有不利軍營不如意漢常獨膳激揚吏士吳志曰賀齊性奢侈尤好軍事兵甲噐械極為精好干櫓戈矛葩爪文畫弓弩矢箭咸取上材王隠晋書曰羊祜表伐吳曰勁弩長弓不如中國長矛楯㦸不如中國馬騎陵厲又不如中國吳唯便水戰一入其地則長江非復吳有晋起居注曰成帝咸和元年四月乙丑詔曰作瑯琊王大車斧}
