  - {type: variant, offset: 1852, length: 45, content: 周宅酆鄗近戎人與諸侯約為高堡置鼓其上遠近相聞戎寇至傳鼓相告諸侯之兵皆至救天子褒姒大悅笑之王, SBCK: 齊桓公將}
  - {type: variant, offset: 1852, length: 0, content: '', WYG: 所謂兼國有地者伏尸數十萬破車以千百數傷弓弩矛㦸矢石之創者扶輿於路故世至枕人頭食人肉葅人肝飲人血甘之於猫豢牛羊猶牛肉豢豕肉故自三代以後者天下未嘗得安其情性而樂習俗保其修命而不夭於人虐也所以然者何諸侯力政天下不合而為一家也又曰齊桓公將欲征伐甲兵不足令有重罪者出犀甲一㦸犀甲收其堅也㦸車也長丈六尺犀或作三有出三甲也有輕罪者贖以金分輕小以金分出金匱道罪至重有分兩也説而不勝者出一束箭不勝猶不直也箭十二為束也百姓皆説乃矯箭為矢矢箭之竿好者也鑄金而為刃刃五刃也劒矛矢也以伐不義而征無道遂覇天下崔寔政曰論兵噐精利有蔡太僕之弩龍亭之劒至今擅名天下陸機要覽曰東弓南矛西劒北㦸北中鼓亦曰四兵鹽鐵論曰强楚勁鄭有犀兕之甲堂谿之揵内據金城外任利兵是以威行諸夏强伏敵國故孟賁畜臂衆人輕之怯夫有備其氣倍以吳楚之士舞利劒蹶强弩以與狢虜騁扵中原一人當有百不足道之也邯鄲五經折疑駮曰矢絶扵弦不可追止執㦸在手制之在人山海經曰天地東西二萬八千里南北二萬六千里出銅之山四百六十七出鐵之山三千六百九十此天下之所分壤樹榖也戈㦸之所發也刀鎩之所起也能者有餘拙者不足干寳搜神記曰晉元康中婦人以金銀象角瑇瑁為斧鉞戈㦸而戴之以當笄蓋妖之大者也樊文淵七經義綱格論曰車上五兵戈殳車㦸酋矛牟夷歩卒五兵戈殳車㦸酋矛㦸魏文典略曰昔}
