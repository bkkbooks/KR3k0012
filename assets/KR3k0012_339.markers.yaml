  - {type: variant, offset: 2088, length: 1, content: 決, SBCK: 以􅇛牌代四分支又曰弩二分絃三副箭一百分二千五百張弩七千五百條弦二十五萬􅃗箭又曰弓十分弦三副箭一百五十分一萬二千五百張弓三萬七千五百條弦三十七萬五千􅃗箭射甲箭五萬􅃗又曰生箭二萬五千􅃗長箭垜箭疋栔切又曰弓袋胡鹿張弓袋並一萬二千五百副又曰佩刀八分一萬口又曰陌刀二分二千五百口又曰棓二分二千五百張馬軍及陌刀並以啄錐􅃏代各四支分又曰搭索二分二千五百條馬軍用也牙兵書}
  - {type: page-break, offset: 2088, content: '', id: KR3k0012_SBCK_339-6b}
  - {type: variant, offset: 2088, length: 152, content: 決曰牙旗者將軍之精金鼓者將軍之氣一軍之形候也唐子曰將勿離鼓旗鼓旗將之耳目也徐幹齊都賦曰王乃垂華玉之路駕玄駮之駿翠幄浮遊金光皓旰公旦切戎車雲布武騎星散鉦鼓雷動旌旗虹亂陸雲南征賦曰戎士肅而啟行三軍分而雜遝長角哀吟以命旅金鼓訇隱而砰礚孫惠祭金鼓文曰赫矣皇威用伐不庭金鼓麾旗以昭其聲鞞釋名曰鞞禆也禆助鼓節也鞞補彌, WYG: 有}
  - {type: variant, offset: 2088, length: 1, content: 決, krp: 以團牌代四分支又曰弩二分絃三副箭一百分二千五百張弩七千五百條弦二十五萬隻箭又曰弓十分弦三副箭一百五十分一萬二千五百張弓三萬七千五百條弦三十七萬五千隻箭射甲箭五萬隻又曰生箭二萬五千隻長箭垜箭疋栔切又曰弓袋胡鹿張弓袋並一萬二千五百副又曰佩刀八分一萬口又曰陌刀二分二千五百口又曰棓二分二千五百張馬軍及陌刀並以啄錐鉞代各四支分又曰搭索二分二千五百條馬軍用也牙兵書}
