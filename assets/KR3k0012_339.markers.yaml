  - {type: variant, offset: 4, length: 149, content: 九角徐廣車服儀制曰角前世書記所不載或云本出羗胡吹以驚中國之馬或云本出吳越晉書安帝記曰桓玄製龍頭角或曰所謂亢龍角者也晉中興書曰大司馬桓溫屯中堂夜吹警角御史中丞司馬恬奏劾大不敬請治罪明日溫見奏事歎曰此兒乃敢彈我真可畏也又庾翼與燕王書曰今致畫長鳴角一雙幡毦副毦音餌宋書曰張興世父仲子由興世致位給事中興世欲, SBCK: 枚侍臣劒八枚}
