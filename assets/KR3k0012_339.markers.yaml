  - {type: variant, offset: 2064, length: 0, content: '', SBCK: 劒㦸不皆於縫佳饌不可擊斷牛馬又曰陳呉之徒奮劒而大呼劉項之倫揮戈而飈駭又曰或問辟五兵之道抱朴子荅曰呉大皇帝曽從介先生受要道云但知北斗姓字及日月名字便不畏白刄大皇帝以試告左右數十人常爲先登䧟陳皆不傷也鄭君云但誦五兵名亦驗矣刀名大房虚星主之矢名防徨熒惑王之弓名曲張角星主之弩名逺望張星主之㦸名大將參星主之臨戰時嘗細祝之或以五月五日作赤靈符着心前或丙午日日中作燕}
  - {type: variant, offset: 2064, length: 0, content: '', krp: 劒㦸不皆於縫佳饌不可擊斷牛馬又曰陳呉之徒奮劒而大呼劉項之倫揮戈而飈駭又曰或問辟五兵之道抱朴子荅曰呉大皇帝曽從介先生受要道云但知北斗姓字及日月名字便不畏白刄大皇帝以試告左右數十人常爲先登䧟陳皆不傷也鄭君云但誦五兵名亦驗矣刀名大房虚星主之矢名防徨熒惑王之弓名曲張角星主之弩名逺望張星主之㦸名大將參星主之臨戰時嘗細祝之或以五月五日作赤靈符着心前或丙午日日中作燕}
  - {type: variant, offset: 2065, length: 2, content: 始發, SBCK: 龍虎三囊符歳易之歳符歳易月符月易日符日易或佩西毒兵信符或佩南極鑠金符或取牡荆以作六隂神將符指敵人或以月蝕時刻三歳蟾蜍候下之有八字者血以書所將之刀劒或交鋒之際乗魁履㓻呼四方之長亦有明効也魏文帝校獵賦曰抗冲天之素旄􅀆靡格擇之脩循旃雄㦸趪音皇而躍厲􅀆黄􅃏扈而楊鮮又曰千乘亂擾万􅀐奔走經營原隰騰越峻岨􅊮弓斯彀戈鋋具舉徐幹齊都賦曰矢流鏑絓胡卦切張羅作合切飛鋋抱雄戈繆襲籍田賦曰靈旂蔚以燾奡􅀆雄㦸偈以嵯峨彎枉矢於狼狐􅀆建黄􅃏於匏爪繁欽征天山賦曰有漢丞相武平侯曹公杖節東征觀六軍於三江浮五湖以曜武左駢雄㦸右攅干將彤弧朱矰舟羽絳房望之如火映奪朝陽應璩詩曰放戈釋甲胄乗軒入紫微從容待帷幄光輔日月暉崔駰安豊侯詩曰􅀍兕甲􅀆跨良馬擇長㦸􅀆彍強弩彍音霍曹植詩曰皇考建世業余從征四方櫛風而沐雨萬里蒙露霜劒㦸不離手鎧甲爲衣裳魏文帝董桃行曰晨背}
