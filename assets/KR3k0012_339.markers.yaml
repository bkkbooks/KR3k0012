  - {type: variant, offset: 1521, length: 311, content: 鐸之聲未聞矢石未交長兵未接子何務死焉後漢書曰光武徇河內韓歆議欲城守岑彭止不聽既而光武至懷歆迫急迎降光武知其謀大怒收歆置鼓下將斬之中將軍最尊自執旗鼓若置營則立旗以為軍門并設鼓戮人必於其下召見彭彭因進說俱獲免東觀漢記曰叚潁起於徒中為并州刺史有功徵還京師潁乘輕車介士鼓吹曲盖朱旗騎馬殷天蔽日錚鐸金鼓雷振動地連騎繼跡彌數十里齊地記曰城東有上祠山上有石鼓舊說云將有寇難則鼓自鳴所以豫驚備也吳興記曰長城縣有夏架山石鼓盤石為足長老云鳴聲如金鼓鳴則三吳有兵東方朔傳曰朔初上書曰臣朔少失父母長養兄㛐年十三而學三冬文史足用十五學擊劍十六學詩書誦二十二萬言十九學孫吳兵法戰陣之事鉦鼓之教周髀曰十人之長執銅百人之師執鐸千人之師執鼙萬人之將執大鼓吳, SBCK: 角違令者髠吕}
