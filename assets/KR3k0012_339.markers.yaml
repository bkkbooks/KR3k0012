  - {type: variant, offset: 2100, length: 0, content: '', SBCK: 謂上尅下日也立牙之日􅁻氣來應大勝之徴凶氣先應破軍殺將黄帝出軍决曰始立牙之日喜氣來應旗幟指敵或從風舉暉暉終日不繞竿勇氣奔逸是謂堂堂之陣此大勝之徴又曰有所攻伐作五采牙旗青牙旗引住東赤牙旗引住南白牙旗引住西黒牙旗引住北黄牙旗引住中又曰始立牙之日凶氣先應旗幟皆垂或逆風滂浡牙竿摧折旗幡絶烈還繞繳竿如此終日􅀔弱又曰}
