  - {type: variant, offset: 2077, length: 1, content: 指, SBCK: 列又曰門搶二根以豹尾爲刄搕出居紅旗後止居帳門前左右安立又日五方旗五口各具方色大將中營建出六纛後在營亦於纛後隨方而建又曰嚴警鼓一十二靣大將營前左右行列各六靣在纛後又曰角十二具於鼓左右後列各六具以代}
