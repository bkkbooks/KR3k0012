  - {type: variant, offset: 1859, length: 0, content: '', WYG: 常為先登䧟陳皆不傷也鄭君云但誦五兵名亦驗矣刀名大房虛星主之矢名防隍熒惑主之弓名曲張角星主之弩名逺望張星主之㦸名大將參星主之臨戰時嘗細祝之或以五月五日作赤靈符着心前或丙午日日中作燕軍龍虎三囊符嵗易之嵗符嵗易月符月易日符日易或佩西毒兵信符或佩南極爍金符或取牡荆以作六隂神將符指敵人或以月蝕時刻三嵗蟾蜍喉下之有八字者血以書所將之刃劒或交鋒之際乗魁履岡呼四方之長亦有明效也魏文帝校獵賦曰扽冲天之素旄兮靡格澤之修旃雄㦸趪音皇而躍厲兮黄越扈而揚鮮又曰千乗亂擾萬騎奔走經營原隰騰越峻岨彤弓斯彀戈鋋具舉徐幹齊都賦曰矢流鏑絓胡卦切張羅攅飛鋋抱雄戈繆襲藉田賦曰靈旂蔚以燾奡兮雄㦸偈以嵯峨彎枉矢扵狼狐兮建黄鉞於匏𤓰繁欽征天山賦曰有漢丞相武平侯曹公仗節東征觀六軍扵三江浮五湖以耀武左駢雄馬右攅干將彤弧朱矰丹羽綘房望之如火映奪朝陽應璩詩曰放戈釋甲胄乗軒入紫微從容侍帷幄光輔日月暉崔駰安豐侯詩曰被兕甲兮跨良馬揮長㦸兮彍强弩曹植詩曰皇考建世業余從征四方櫛風而沐雨萬里蒙露霜劒㦸不離手鎧甲為衣裳魏元帝董逃行曰曩背大河南轅跋渉遐路澷澷師徒百萬譁諠戈矛若林成山旌旗拂日蔽天應璩書曰左執屈盧之勁矛右秉干將之雄㦸髙冠拂雲長劒耿介簫管振音厥聲載路馮軾虎視清風震疊可謂堂堂乎難與並為仁也太白隂經曰工欲善其事必先利其噐噐之於事如影之隨形響之應聲其相湏如左右手故曰噐械不精不可言兵五兵不利不可舉事上古庖犧氏之時弦木為弓剡木為矢神農氏之時以石為兵尚書曰砮石中矢鏃黄帝之時以玉為兵蚩尤之時爍金為兵割革為甲始制五兵建旗幟樹䕫鼓又曰鼓以佐軍威又曰纛六口大將中營建出引六軍古者天子六軍諸侯三軍今天子十二諸侯六軍故纛有六以主之又曰門旗二口色紅八幅大將牙門之旗出引將軍前列又曰門槍二根以豹尾為刃榼出居紅旗後止居帳門前左右安立又曰五方旗五口各具方色大將中營建出六纛後在營亦於纛後隨方而建又曰嚴警鼓一十二面大將營前左右行列各六面在纛後又曰角十二具於鼓左右後列各六具以代金又曰隊旗二百五十面尚色圗禽與本陣同五幅又曰刃二百五十口尚色圗禽}
