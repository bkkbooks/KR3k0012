  - {type: variant, offset: 2421, length: 8, content: 安平太守宅老鈴下, SBCK: 典韋􅀄爲張邈士屬司馬趙寵牙門長大其能勝韋一手建之寵異其才力呉志曰陸遜爲右部督會丹陽賊帥費棧扇動山越權遣遜討棧棧支黨多所往兵少遜乃益施牙幢分布鼓角夜潜出谷間鼓譟而前應即破散又曰黄武八年夏黄龍見樊口於是權稱尊號因瑞改元又}
  - {type: variant, offset: 2421, length: 2, content: 安平, WYG: 典韋初為張邈士屬司馬趙寵牙門長大莫能勝韋一手建之寵異有才力吳志曰陸遜為右部督㑹丹陽賊帥費棧扇動山越權遣遜討棧棧支黨多所徃兵少遜乃益施牙幢分布鼔角夜潜山谷間鼓譟而前應即破散又曰黄武八年夏黄龍見樊口於是權稱尊號因瑞改元又作黄龍大牙常在中軍諸軍進退視其所向命胡綜作賦吳書曰賀齊從上討合肥時城中出戰徐盛失牙齊别拒擊得盛所失牙晋書曰陸機始臨戎而牙旗折意甚惡之後戰軍果大敗魏書曰奚斤代人也魏初大將行師唯長孫嵩拒劉裕及斤征河南獨給漏刻及二十牙旗吳胡綜大牙賦曰狼弧垂曜實惟兵精聖人觀法是效是營始作噐械爰求厥成明明大吳實天生徳乃律天時制其神軍取象}
