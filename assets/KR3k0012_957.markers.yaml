  - {type: variant, offset: 3207, length: 2, content: 甘棠, WYG: 名至晉永嘉年尚茂廣志曰豫章生七年外始辨凡木似豫章故待七年當分别神異經曰東方有豫章千丈有士操斧行斫行合新語曰賢者之處世猶金石穴於沙中豫章産於幽谷水經曰豫章城之南西門曰松陽門門内有樟樹高七丈五尺大二十五圍枝葉扶疏垂隂數畝應劭漢官儀曰豫章郡樹生庭中故以名郡而此樹常中枯逮晋永嘉中一旦更茂豐蔚如初咸以為中宗之徴祥也豫章記曰新塗縣封谿有攝友所用樟樹木戕柯者遂生任昉述異記曰豫章之為木也生七年而後可知漢武寳鼎二年立豫樟宫於昆明池中作豫樟木殿太平御覽卷九百五十七}
