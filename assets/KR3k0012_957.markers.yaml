  - {type: variant, offset: 1375, length: 214, content: 所不足故桐不可以為弩又曰夫以巨斧擊桐薪不待利時良日而後破之加巨斧桐薪之上而無人力之奉雖順招搖挾刑德招搖斗杓也刑十二辰德十日也而弗能破者以其無勢也淮南萬畢術曰桐木成雲取十石瓦甖滿中水置桐甖中蓋之三四日氣如雲作董仲舒請雨書曰秋以桐魚九枚風俗通曰梧桐生於嶧山陽巖石之上採東南孫枝為琴聲甚清雅遁甲經曰梧桐不生則九州異梧桐以知日月正閏生十二葉一邊有六葉從下數一葉為一月至上十二葉有閏十三葉小餘者視之則知閏何月也不生九州各異君天下不同也王逸, SBCK: 桂樹郭}
  - {type: variant, offset: 1375, length: 0, content: '', WYG: 桂樹郭子横洞㝠記曰武帝使董謁乘琅霞之輦以升壇至三更西王母駕𤣥鑾之輿至壇之四面列種軟條青桂風至枝自拂階上逰塵㝷陽記曰廬山上有三石梁長數十丈廣不盈尺杳然無底呉猛將弟子登山過北梁見一翁坐桂下以玉杯盛甘露漿與猛廣志曰桂出合浦而生必以高山之巔冬夏常青類自為林間無雜樹交趾置桂園列仙傳曰范蠡好食桂賣藥世人往往見之神仙傳曰離公婁服竹汁餌桂得仙許由巢父箕山得石丹沙石桂英服之闞子曰魯人有好釣者以桂為餌黄金為鈎拾遺記曰岱嶽一名浮折北有玉梁千丈駕𤣥流之上岸旁有丹桂可為舟世説曰客問陳季方曰君家有何功徳而荷天下重名曰吾家君譬如桂樹生泰山之阿上有萬仞之高下有不測之深上為甘露}
  - {type: page-break, offset: 1375, content: '', id: KR3k0012_WYG_957-8b, image: WYG0901/WYG0901-0453d.png}
  - {type: page-break, offset: 1375, content: '', id: KR3k0012_WYG_957-9a, image: WYG0901/WYG0901-0454a.png}
  - {type: variant, offset: 1375, length: 214, content: 所不足故桐不可以為弩又曰夫以巨斧擊桐薪不待利時良日而後破之加巨斧桐薪之上而無人力之奉雖順招搖挾刑德招搖斗杓也刑十二辰德十日也而弗能破者以其無勢也淮南萬畢術曰桐木成雲取十石瓦甖滿中水置桐甖中蓋之三四日氣如雲作董仲舒請雨書曰秋以桐魚九枚風俗通曰梧桐生於嶧山陽巖石之上採東南孫枝為琴聲甚清雅遁甲經曰梧桐不生則九州異梧桐以知日月正閏生十二葉一邊有六葉從下數一葉為一月至上十二葉有閏十三葉小餘者視之則知閏何月也不生九州各異君天下不同也王逸, krp: 桂樹郭}
  - {type: variant, offset: 1376, length: 0, content: '', WYG: 霑下為川泉所潤當斯之時樹焉知太山之高川泉之深}
  - {type: page-break, offset: 1376, content: '', id: KR3k0012_WYG_957-9b, image: WYG0901/WYG0901-0454b.png}
  - {type: variant, offset: 1377, length: 4, content: 足故桐不, WYG: 知有功徳也金樓子曰夫翠飾羽而體分象美牙而身䘮蚌懐珠而致剖蘭含香而遭焚膏以明而遂煎桂以蠧而成疾羅浮山記曰羅山頂有桂山海經所謂賁隅之桂賁隅畨禺也臨海記曰白石之山望之如雪山有湖傳云金鵞之所集桂樹之所植説文曰桂江南之木百藥之長地理記曰桂陽郡有桂嶺放花遍白林嶺盡香又曰台山有八桂嶺漢武帝悼李夫人賦曰氣沉潛以悽戾兮桂枝落而銷亡楚詞注曰淮南王安好道與八公共登山攀桂樹安作詩曰攀桂樹兮淹留唐景龍文館記曰薰風殿其材木皆用青桂白檀香氣氛氲盈於四逺杉爾雅曰被煔音占或作杉似松生江南}
