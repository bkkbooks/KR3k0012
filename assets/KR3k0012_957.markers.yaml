  - {type: variant, offset: 3128, length: 1, content: 白, SBCK: 豫章之木生於髙山工雖巧而不能得子避世何不藏􅀷地理志曰豫章郡城南有樟樹長數十丈立郡因以爲名至晉永嘉年間尚茂廣志曰豫章生七年外始辨凢木似豫章故待七年當分别神異經曰東方有豫章樹髙千丈有士操斧行斫行合新語曰賢者之處丗猶金石生於沙中豫章産於幽谷水經曰豫章城之南西門曰松}
