  - {type: variant, offset: 471, length: 0, content: '', SBCK: 展禽之家有柳樹身行恵德因號柳下惠一曰邑名抱朴子曰夫木槿楊柳斷殖之更生倒之亦生横之亦生生之易者莫􅀂斯木山海經曰廆山之西有谷焉名均雚谷其木多柳鳯伯之山熊山直陵之山木多柳平丘山爰有楊柳沃民之國有白柳崔豹古今注曰白楊葉圎青楊葉長柳葉亦長細栘時題切楊圎葉弱帶微風則大揺一名髙飛一曰獨摇蒲柳生水邊葉似青楊亦曰蒲楊亦曰栘柳亦曰蒲栘焉水楊即蒲楊也枝勁韌音刃任矢用又有赤楊霜降則葉赤林理亦赤也􅀃文曰楊蒲栁也從木易聲檉河柳也從木聖聲柳小楊也從木夘聲續捜神記曰上虞魏全家在縣北忽有一人着孝服皂笠手巾掩口來詣全家語云君有錢一千萬銅器亦如之大栁樹錢在其下取錢當得耳於君家大不吉僕㝷爲君取於此便去自你出三十年遂不復來全亦不取錢盛弘之荆州記曰縁城堤邊悉植細柳絲條散風清隂交陌三齊略記曰鬲城東南有蒲臺髙八丈始皇所頓處在臺下縈馬至今蒲生猶榮似水楊而堪爲箭孔氏志恠曰㑹稽盛逸甞晨興路未有行人見門内栁樹上有一人長二尺餘朱衣冠冕俯}
