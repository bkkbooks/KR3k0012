  - {type: variant, offset: 1951, length: 269, content: 上有謠歌之聲平惡而斫殺平隨軍北征首尾三載死桐欻自還立於故根之上又聞樹巔空中歌曰死樹今更青吳平尋當歸適聞殺此樹已復有光輝平尋歸如鬼謠祖台之志怪曰鶱保至檀立塢上北樓宿暮鼓二中有人著黃練單衣白帢將人持炬火上樓保懼藏壁中須臾有二婢上使婢迎一女子上與白帢人入帳中宿未明白帢人輒先去如是四五宿後向晨白帢人纔去保因入帳中持女子問向去者誰荅曰桐侯郎道東桐樹廟是至暮鼓二中桐郎來保乃斫取之縛著樓柱明日視之形如人長三尺餘檻送詣丞相渡江未半風浪起桐郎得投入水風波乃息齊民要術曰梧桐山石間生者為樂器則鳴瑞應圖曰王者任用賢良則梧桐生於東廂桓譚新論曰神農黃帝削桐為琴, SBCK: 下}
