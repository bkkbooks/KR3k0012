  - {type: variant, offset: 1660, length: 2, content: 梧桐, SBCK: 桂出合浦而生必以髙山之顚冬夏常青􅀋自爲林間無雜樹交阯置桂園列仙傳曰范蠡好食桂賣藥世人徃徃見之神仙傳曰離婁公服竹汁餌桂得仙許由巢父箕山得石丹沙石桂英服之闞子曰魯人}
  - {type: variant, offset: 1660, length: 2, content: 梧桐, krp: 桂出合浦而生必以髙山之顚冬夏常青類自爲林間無雜樹交阯置桂園列仙傳曰范蠡好食桂賣藥世人徃徃見之神仙傳曰離婁公服竹汁餌桂得仙許由巢父箕山得石丹沙石桂英服之闞子曰魯人}
  - {type: variant, offset: 1663, length: 0, content: '', SBCK: 好釣者以桂爲餌黄金爲鈎拾遺記曰岱輿一名浮折北有玉梁千丈駕玄流之上岸旁有丹桂黒紫}
  - {type: variant, offset: 1663, length: 0, content: '', krp: 好釣者以桂爲餌黄金爲鈎拾遺記曰岱輿一名浮折北有玉梁千丈駕玄流之上岸旁有丹桂黒紫}
  - {type: variant, offset: 1664, length: 0, content: '', SBCK: 可爲舟丗􅀃曰客問陳季方曰君家有何功德而荷天下重名曰吾家君譬如桂樹生泰山之阿上有萬仞之髙下有不測之深上爲甘露所霑下爲川泉所潤當斯之時樹焉知太山之髙川泉之􅀷不知有功德歟金樓子曰夫翠飾羽而體分象羙牙而身䘮􅑕懷珠而致剖蘭含香而遭焚膏以明而遂煎桂以蠧而成疾羅浮山記曰羅山頂有桂山海經所謂賁隅之桂賁隅番隅也臨海記曰白石之山望之如雪山有湖傳云金鵝之所集八桂之所植􅀃文曰桂江南之木百藥之長地理記曰桂陽郡有桂嶺放花遍白林嶺盡香又曰天台山有八桂嶺􅁭漢武帝悼李夫人賦曰氣沉潜以悽戾􅀆桂枝落而銷亡漢淮南王安好道感八公共登山攀桂樹安作詩曰攀桂樹兮聊淹留唐景龍文館記曰薫風殿其材木皆用青桂白檀香氣氛氲盈於四逺杉爾雅曰披音彼煔煔或作杉似松生江南可以爲舡及棺材作桂理之不腐也晉咸康起居注曰侍御史􅁗武奏平陵前道東杉樹一株萎死以栢栽􅀘之請収陵令推劾西京雜記曰太液池中有小池名􅀌樹池池中有一洲洲上有煔樹一株十餘圍望之如車蓋故取名之鄧德明南康記曰巘山有漢太傳陳蕃墓遥望兩杉樹聳柯出嶺垂隂覆谷劉欣期交州記曰合浦東二百里有一杉樹葉落隨風入洛陽城内漢時善相}
  - {type: page-break, offset: 1664, content: '', id: KR3k0012_SBCK_957-6a}
