  - {type: variant, offset: 1084, length: 1, content: 常, WYG: 諸侯今乃鳴是乃成聲名於下土之祥也山海經曰招揺之山臨乎四海其上多桂桂長丈餘味辛臯塗之山上多桂木桂林八樹在賁隅東八樹成林言其大也春秋後語曰蘇秦在楚三年乃得見談卒辭行威王曰寡人聞先}
