  - {type: variant, offset: 178, length: 223, content: 葉圓而厚剝皮合漬之其味辛香所謂蕪荑也說文曰榆白枌也梗山枌榆有刺莢可以為蕪荑史記曰凡望雲氣平望在榆上下千餘二千里也漢書曰高祖禱豐枌榆社張晏曰枌榆社在豊東北三十里或曰枌榆鄉名也高祖里社也又天文志曰成帝河平元年旱傷麥民食榆皮又循吏傳曰龔遂為渤海太守勸民務農桑令口種榆一樹魏志曰鄭澤為魏郡太守百姓乏材木乃課種榆為籬後魏書曰太祖道武皇帝諱珪七月七日生三合陂北明年有榆生於埋胎處遂成林又曰桓帝曾中蠱歐吐之地乃生榆木趙書曰從幽州大道滹沱造浮橋植行榆五十里置行宮, SBCK: ''}
