  - {type: variant, offset: 415, length: 1, content: 鵲, WYG: 支離叔觀於㝠伯之邱崑崙之墟黄帝之所休俄而柳生其左肘孟子告子曰性猶把柳義猶杯棬邱負切許慎淮南子注曰展禽之家有柳樹身行惠徳因號柳下惠一曰邑名抱朴子曰夫木槿楊柳斷植之更生倒之亦生横之亦生生之易者莫若斯矣山海經曰廆山之西有谷焉名曰雚谷其木多柳鳳伯之山熊山真陵之山木多柳平邱山爰有楊柳沃民之國有白柳崔豹古今注曰白楊葉圓楊葉長柳葉亦長細栘時題切楊圓葉弱帶微風則大揺一名高飛一名獨揺蒲柳生水邉葉似青楊亦曰蒲楊亦曰栘柳亦曰蒲栘焉水楊即蒲楊也枝勁韌音刃任矢用又有赤楊霜降則葉赤樹理亦赤也説文曰楊蒲柳也從木昜聲檉河柳也從木聖聲柳小楊也從木卯聲續搜神記曰}
