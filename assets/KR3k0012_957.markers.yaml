  - {type: variant, offset: 3130, length: 3, content: 丘墓間, SBCK: 門門内有樟樹髙七丈五尺大二十五圍枝葉扶䟽垂䕃數畒應劭漢官儀曰豫章郡樹生庭中故以名郡矣此樹常中枯逮晉永嘉中一旦更茂豐蔚如􅀄咸以爲中宗之徴祥也豫章記曰新塗懸封谿有聶友}
