  - {type: variant, offset: 417, length: 0, content: '', WYG: 虞魏金家在縣北忽有一人著孝服皂笠手巾掩口來詣金家語云有錢一千萬銅器亦如之在大柳樹之下取錢當得而於君家大不吉僕㝷為君取便去自三十年遂不復來金亦不取錢盛𢎞之荆州記曰縁城堤邉悉植細柳綠條散風清隂交陌三齊略記曰}
