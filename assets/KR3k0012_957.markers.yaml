  - {type: variant, offset: 2262, length: 179, content: 可食古樂府云梧宮秋吳王愁是也崔琦七蠲曰爰有梧桐生于玄谿傳根朽壤託險生危枚乘七發曰龍門之桐高百尺而無枝中鬱結而輪菌根扶踈以分離魏明帝猛虎行曰雙桐生空井枝葉自相如通泉溉其根玄雨潤其柯綠葉何蓩蓩青條視曲阿張協七命曰寒山之桐出自大冥含黃鍾以吐幹據蒼岑而孤生古詩曰井桐棲靈鳳楊柳上易大過九二曰枯楊生稊老夫得其女妻焦贛易林豫之晉曰鵲巢柳樹鳩奪其處任力劣薄天命不祐毛詩采薇, SBCK: 西子期子期}
