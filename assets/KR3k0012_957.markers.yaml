  - {type: variant, offset: 1081, length: 2, content: 梧桐, WYG: 芳桂常長春秋運斗樞曰椒桂合剛陽椒桂陽星之精所生也合猶連體而生也春秋潛潭巴曰宫桂鳴下土諸侯號有聲桂好木植於宫中猶天子封有聲譽者}
