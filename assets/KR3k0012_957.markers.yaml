  - {type: variant, offset: 915, length: 153, content: 論曰豆令人重榆令人瞑愚智所知也桐易緯曰桐枝濡毳而又空中難成易傷須成氣而後華尚書禹貢曰嶧陽孤桐嶧山之陽特生桐中為琴瑟毛詩卷阿曰梧桐生矣于彼高崗梧桐柔木也又定之方中曰樹之榛栗椅桐梓漆爰伐琴瑟詩義䟽曰梓實桐皮曰椅今民云梧桐也有青桐白桐赤桐白桐宜琴瑟今雲南牂牁人績以為布禮記月令曰清明之日桐始華周書曰不始華歲有大寒, WYG: 岩嶺間}
