  - {type: variant, offset: 2717, length: 277, content: 柳郭璞曰河旁赤莖小楊也旄澤柳生澤中者楊蒲柳詩云楊柳依依傳曰董澤之蒲也漢書曰上林苑中大柳樹斷臥地一朝起生枝葉有蟲食其葉為字曰公孫病已立眭孟以為木下民之象當有廢故之家孫氏從民間受命為天子者及昭帝崩無嗣大臣迎立昌邑王王即位淫亂失道霍光廢之更立昭帝兄衛太子之孫為宣帝帝本名病已晉書曰王恭字孝伯美姿容人多悅之或目之曰濯濯如春月柳又曰嵇康性絕巧而好鍜宅中有一柳樹甚茂乃激水圜之每夏月居其下以鍜東平呂安服康高致每一相思輒千里命駕又曰太康末京洛為析楊柳之歌其曲始有兵革苦辛之歎終以禽獲斬截之事是時三陽貴盛而被族滅太后廢黜幽死宮中折楊柳之應也又桓溫傳曰溫自江陵北伐行經金城, SBCK: 巢父}
