  - {type: variant, offset: 123, length: 1, content: 枌, SBCK: 楊樹頭金雞鳴秪有阿舅無外甥静帝隋氏之甥旣遜位而崩諸舅強盛又曰渤海公髙潁少明敏有器局多渉書史尤善詞令􅀄孩孺時家有栁樹髙百許尺亭亭如蓋里中父老曰此家當出貴人唐書曰司稼卿梁孝仁髙宗時監造蓬萊宫於諸庭院列種白楊將軍契苾何力鐵勒之渠率也於宫内縱觀孝仁指白楊云此木易長三數年間宫中可得䕃映何力一無所應但誦古詩白楊多悲風蕭蕭愁殺人意謂此是塚墓間木非宫中所冝種孝仁遽令柭去更樹梧桐又曰乾元中􅉑州刺史王竒光奏閿郷縣界女媧墳天寳十三載大雨晦暝失所在至今河上側近忽聞雷風聲暁見墳踴出上有􅀟柳樹下有巨石柳各髙丈餘􅀞圖進上以示百官又曰吕渭爲禮部侍郎中書省有柳樹建中末枯死興元元年車駕還京其樹再榮人謂之瑞栁以爲賦題上聞而惡之渭因入閣遺失請託文記遂出爲潭州刺史又曰吐蕃土風寒苦物産貧薄所部邏婆川唯有楊柳人以爲資更無草木又曰范希朝鎮振武單于城中舊少樹希朝於他處市柳子命軍人種之至今成林居人頼之}
  - {type: page-break, offset: 123, content: '', id: KR3k0012_SBCK_957-2a}
  - {type: variant, offset: 123, length: 1, content: 枌, WYG: 楊樹頭金雞鳴祗有阿舅無外甥静帝隋氏之甥既遜位而崩諸舅强盛又曰渤海公高熲少明敏有器局畧渉書史尤善詞令初孩孺時家有柳樹高百尺許亭亭如葢里中父老曰此家當出貴人唐書曰司稼卿梁孝仁高宗時監造蓬萊宫於諸庭院列種白楊將軍契苾何力鐵勒之渠率也於宫内縱觀孝仁指白楊云此木易長三數年間宫中可得隂映何力一無所應但誦古詩白楊多悲風蕭蕭愁殺人意謂此是塚墓間木非宫中所宜種孝仁遽令㧞去更樹梧桐又曰乾元中虢州刺史王竒光奏閿鄉縣界女媧墳天寳十三載大雨晦暝失所在至今河上側近忽聞雷風聲曉見其墳湧出上有雙楊柳樹下有巨石各高丈餘畫圖進上以示百官又曰吕渭為禮部侍郎中書省有柳樹建中末枯死興元元年車駕還京其樹再榮人謂之瑞柳以為賦題上聞而惡之渭因入閣遺失請託文紀遂出為潭州刺史又曰吐蕃土風寒苦物産貧薄所部邏婆川唯有楊柳人以為資更無草木又曰范希朝鎮振武單于城中舊少樹希朝於他處市柳子命軍人種之至今成林居人賴之}
