  - {type: variant, offset: 2796, length: 195, content: 年及唐初並為左右武侯至龍朔二年復為左右金吾詔曰念功襃善哲王彝訓紀德親賢有國通典黎州惣管曹國公世勣本自黎陽擁徒歸順任以藩岳誠効克彰節義不渝夷險無變信同金石操擬松筠宜加寵命用超恒序可賜姓李氏又曰趙道興真觀初歷遷左武候中郎將明閑宿衛號為稱職太宗嘗謂之曰卿父為隋武候將軍甚有當官之譽卿今克傳弓冶可謂不墜家聲因授右武候將軍其父時廨宇仍舊不改時人以為榮又曰裴諝為右金吾將軍建中初上以刑名理天下百吏震悚時, SBCK: ''}
