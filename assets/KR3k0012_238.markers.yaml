  - {type: variant, offset: 67, length: 119, content: 司馬曰凡制軍萬有二千五百人一鄉之民也凡起從役家一人也王六軍六鄉之數也卿始文教軍定武功其道皆兼三才而兩之故數俱六也大國三軍公侯之封也成國不過半天子之一軍次國二軍諸伯之封小國一軍子男之封軍將皆命卿位視六事之人司於六卿之大夫春秋之時列國有正卿為, SBCK: ''}
