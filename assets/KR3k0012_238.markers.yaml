  - {type: variant, offset: 2629, length: 4, content: 歲朝託疾, SBCK: 緹􅀐况復任惣皇畿位重連率何則驃􅀐之號歷選爲重元狩之中始自去病永平之建特授劉蒼齊獻爲公主所申呉漢因群臣之舉驍􅀐將軍漢書曰李廣爲驍􅀐將軍後出鴈門擊匈奴匈奴生得廣廣時傷陽死睨傍胡兒善馬漸騰而上南馳得脫廣亡失多當斬贖爲庶人東觀漢記曰光武以劉桓爲驍􅀐將軍攻中山又曰建武九年以劉喜爲驍􅀐將軍攻􅃰郡華嶠後漢書曰馬成字君遷拜驍􅀐將軍北屯常山積數年上以其勤勞徵歸京師邊民多上書請之上復以成鎭撫之魏志曰任城威王彰字子文性勇而􅂡黃爲驍􅀐將軍北出塞爲㓂所要彰獨與麾下數百􅀐突虜王聞之曰我黄􅂡兒定可用也又曰董卓立獻帝表太祖爲驍􅀐將軍與計事太祖乃變姓名間行東歸齊書曰江斆爲侍中轉都官尚書領驍􅀐將軍王晏啓武帝曰江斆今重登禮閣兼􅀉六軍慈渥所覃實有優忝但語其事任殆同閑軰天旨旣欲􅂛其名位愚謂以侍中領驍􅀐望實清顯有殊納言上曰斆常啓吾爲其鼻中惡今旣以何胤王瑩還門下故有此㢠換耳衛將軍漢書曰文帝至渭橋群臣奉天子法駕迎代邸皇帝即日夕入未央宫夜拜宋昌爲衛將軍領南北軍又曰文帝三年遣灌嬰擊匈奴發中尉材官兵屬衛將軍軍長安晉書曰虞潜字思奥爲衛將軍貌如}
