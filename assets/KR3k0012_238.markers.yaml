  - {type: variant, offset: 1065, length: 204, content: 隋書曰獨孤盛為左屯衛將軍宇文化及之作亂也裴虔通引兵至成象殿宿衛者皆釋仗而走盛謂虔通曰何物兵形勢太異也虔通曰事勢已然不預將軍事慎無動盛大罵曰老賊是何物語不及被甲與左右十餘人逆拒之為亂兵所殺唐書曰咸通中以伶官李可及為威衛將軍曹確執奏曰臣覽貞觀故事太宗初定官品令文武官共六百四十三員顧謂房玄齡曰朕設此官員以待賢士工啇雜色之流假令術踰儕類止可厚給財物必不可超授官秩與朝賢君子比肩而立同坐而食大和中文宗欲以樂官尉遲璋為, SBCK: 遷景}
