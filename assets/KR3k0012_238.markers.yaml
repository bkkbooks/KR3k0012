  - {type: variant, offset: 2625, length: 2, content: 冀執, SBCK: 簡文帝讓驃􅀐楊州刺史表曰常願侯服就列希同特進之班角巾還第不競龍驤之貴而天澤無涯名器惣集竊以驃􅀐之官旣爲上將神州之重實號土中故以彈壓六戎冠冕九牧豈止司􅀠絳節}
  - {type: variant, offset: 2625, length: 2, content: 冀執, WYG: 簡文帝讓驃騎揚州刺史表曰常願侯服就列希同特進之班角巾還第不競龍驤之賞而天澤無涯名器總集竊以驃騎之官既為上將神州之重實號中土故以彈壓六戎冠冕九牧豈止司隸綘節}
