  - {type: variant, offset: 2634, length: 1, content: 朝, SBCK: 武内實堅明前將軍漢書曰前後左右將軍皆周末官秦因之位亞上卿金印紫綬又曰武帝征西夷有前後左右將軍宣元以後􅄂錯更置或爲前或爲後或爲左或爲右雖不出征猶有其官在諸卿上爲國爪牙所以揚示威靈於四逺折衝萬人如虎如羆又曰左右前後將軍皆周官也秦漢因置以征四夷後雖不征伐其官常存又曰􅀓喜爲右將軍􅀓太后與政喜數諌后不恱上印綬病在家上䟽固請乃拜前將軍又曰張遼字文逺鴈門馬邑人也聶壹之後以避􅁈變姓少爲郡吏武力過人文帝即位轉前將軍又黃初二年遼至洛陽宫文帝引遼㑹建始殿親問破呉意狀帝歎息顧左右曰此亦古之邵虎也蜀志曰先主爲漢中王遣費詩拜􅀜羽爲前將軍羽聞黄忠爲後將軍怒曰大丈夫終不與老兵同列不肯拜受詩謂羽曰夫立王業者所用非一昔蕭曹與髙祖少小親舊而陳韓亡命後至論在班列韓最居上未聞蕭曹以爲怨也今漢中王以一時之功隆崇於漢叔然意之輕重寜當與君侯齊乎王與君譬猶一體同休等戚禍福共之愚謂君侯不冝計官號之髙下爵位之多少也僕一介之使銜命之臣君侯不受拜如是便還但相謂惜此舉動恐有後悔耳羽太感悟即受拜漢叔黃忠字也後魏書曰谷楷昌􅀺人濮陽公渾曽孫也稱有幹局遷前軍將軍楷􅆌一目而性甚嚴忍時人號爲瞎虎後將軍漢書曰趙充國爲後將軍西羗反上使御史大夫邴􅁻問誰可將者充國時年巳七十餘對曰無踰於老臣者矣遣問焉曰將軍度羗虜何如當用幾人充國曰百聞不如一見兵難踰度踰逺也臣願馳至金城圖上方略然羗戎小夷逆天背叛滅亡不乆願陛下以屬老臣勿以爲憂東觀漢記曰郅􅊮字瑋君信都人也爲曲陽卒正更始即位上以大}
