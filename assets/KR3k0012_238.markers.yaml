  - {type: variant, offset: 2629, length: 4, content: 歲朝託疾, WYG: 緹騎況復任總皇畿位重連率何則驃騎之號歴選為重元狩之中始自去病永平之建特授劉蒼齊獻為公主所申吳漢因羣臣之舉驍騎將軍漢書曰李廣為驍騎將軍後出鴈門擊匈奴匈奴生得廣廣時傷陽死睨傍胡兒善馬暫騰而上南馳得脫廣亡失多當斬贖為庶人東觀漢記曰光武以劉桓為驍騎將軍攻中山又曰建武九年以劉喜為驍騎將軍攻涿郡華嶠後漢書曰馬成字軍遷拜驍騎將軍北屯常山積數年上以其勤勞徵歸京師邉民多上書請之上復以成鎭撫之魏志曰任城威王彰字子文性勇而鬚黄為驍騎將軍北出塞為寇所要彰獨與麾下數百騎突虜王聞之曰我黄鬚兒定可用也又曰董卓立獻帝表太祖為驍騎將軍與計事太祖乃變姓名間行東歸齊書曰江斆為侍中轉都官尚書領驍騎將軍王晏啓武帝曰江斆今重登禮閣兼寄六軍慈渥所覃實有優忝但語其事任殆同閒輩天㫖既欲升其名位愚謂以侍中領驍騎望實清顯有殊納言上曰斆常啟吾為其鼻中惡今既以何𦙍王瑩還門下故有此迴换耳衛將軍漢書曰文帝至渭橋羣臣奉天子法駕迎代邸皇帝即日夕入未央宫夜拜宋昌為衛將軍領南北軍又曰文帝三年遣灌嬰擊匈奴發中尉材官兵屬衛將軍長安晉書曰虞濳字思奥為衛將軍貎如}
