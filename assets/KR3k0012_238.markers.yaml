  - {type: variant, offset: 1684, length: 339, content: 辟不祥天子出職主先導以備非常故執此鳥之象因以名官也緹騎二百人輿服導從車騎滿路群僚之中斯最壯矣舊掌京師盜賊考按疑事漢郅都甯成王溫舒滅宣等皆截理橫噬虎而冠者也止切理辨亦旋誅黜又置執金吾丞後漢掌宮外戒司非常水火之事衛尉巡行宮中金吾徼循宮外為表裏以擒姦討猾日三繞行宮外及主兵器自中興但專徼循不與他政又有執金吾吏文學執金吾佐執金吾員吏魏武秉政復為中尉晉初罷直至後周置武環率武候率下大夫各二人隋置左右武候府大將軍一人將軍三人掌車駕出入先驅後殿晝夜巡察執捕姦非烽候道路水草所宜巡狩田師則掌其營禁煬帝大業三年改為左右武候衛所領軍事名佽飛漢官表曰漢有左戈令武帝太初元年更名佽飛掌戈射屬少府光武省之隋氏採舊名唐初又為左右武候府貞觀十年十二月馬周奏京城諸街置鼓罷傳呼龍朔二年改為左右金吾衛置大將軍一人, SBCK: 簿上}
