  - {type: variant, offset: 2992, length: 346, content: 月禁屠殺以甫近山陵禁益嚴尚父汾陽王郭子儀隸人殺羊以門者覺之諝列奏狀上以為不畏強禦累遣宣喻或謂諝曰郭公有社稷功豈不為蓋之諝笑曰非爾所解且郭公威儀權太盛上新即位必謂黨附者眾今發其細過以明不弄權耳吾上以盡事君之道下以安大臣不亦可乎又曰臧希讓為金吾大將軍骯髒好談時政屢以理體上于公卿詔令集賢院待制希讓無學術及處近地從容公卿間強引文言以自賢而所聞知多道途得之發必差謬頗為士子所笑諸衛上將軍唐通典曰魏黃初中始有上大將軍以曹真為之吳亦以陸遜為上大將軍後周建德四年增置上大將軍隋並以為武散官不理事上大將軍從二品又曰唐武德初秦王既平王世充及竇建德高祖以秦王功殊古今自昔位號不足以為稱乃特置天策上將軍以拜焉位在王公上又曰貞元二年九月詔曰六軍先已各置統軍一人今十六衛宜各置上將軍一人秩從其品繇是上將軍之官始列於品位, SBCK: 八}
