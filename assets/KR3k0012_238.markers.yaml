  - {type: variant, offset: 83, length: 273, content: 民也凡起從役家一人也王六軍六鄉之數也卿始文教軍定武功其道皆兼三才而兩之故數俱六也大國三軍公侯之封也成國不過半天子之一軍次國二軍諸伯之封小國一軍子男之封軍將皆命卿位視六事之人司於六卿之大夫春秋之時列國有正卿為將軍又以亞卿一人為佐猶執政者貪其權遂以陵遲皆非周公之舊也左傳襄二年曰晉蒐于綿上以治兵使士丐將中軍辭曰伯游長昔臣習於知氏以佐之非能賢也請從伯游使荀偃將中軍士丐佐之使韓起將上軍辭以趙武孝經左契曰將軍順虎衘珠大夫正海出魚史記曰齊景公召穰苴與語大悅以為將軍將兵扞燕又曰孝文後六年匈奴入上郡周亞夫為將軍居灞上祝茲侯徐廣曰表作松茲姓徐名悍也軍棘門以備胡, WYG: 愈重黯}
