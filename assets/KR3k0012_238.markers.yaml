  - {type: variant, offset: 2624, length: 0, content: '', WYG: 馬融字季長為大將軍鄧隲舎人晉陽秋曰義興周延為左率轉尚書遷大將軍諮議叅軍車騎將軍漢書曰元光元年以中尉程不識為車騎將軍屯鴈門應劭漢官儀曰帝以元舅馬防為車騎將軍銀印青綬吳志曰孫壹奔魏以壹為車騎將軍儀同三司封吳侯以故王芳貴人邢氏妻之邢美色妬忌下不堪命遂共殺壹及邢氏蜀志曰鄧芝字伯苗義陽新野人益州從事張裕善相芝徃從之謂芝曰君年過七十位至大將軍封侯為車騎將軍賞罰明斷善䘏卒伍身之衣食資仰於官不苟素儉然終不治私産妻子不免飢寒死之日家無餘財後魏書曰王衍字文舒為散騎常侍出為征東將軍西兖州刺史衍屇治未幾屬爾朱仲逺稱兵内向州既路衝為其攻逼衍不能守為仲逺所擒以其名望不害也令騎牛從軍久乃見釋還洛陽為車騎將軍隋書曰長孫覽周武帝在藩與覽親善及即位彌加禮焉超拜車騎大將軍毎公卿上奏必令省讀覽有口辯聲氣雄壯凡所宣傳百僚屬目帝毎嘉歎之覽初名善帝謂之曰朕以萬幾委卿先覽遂賜名焉驃騎將軍漢書曰武帝以霍去病為嫖姚校尉征匈奴累有功寵冠羣臣置驃騎將軍秩與大將軍同百官表注曰明帝即位以東平王蒼為驃騎輔政開東閣延英雄及蒼歸國有驃騎時吏丁牧周栩以蒼敬賢下士不忍去之遂為王家大夫數十年事祖及孫帝聞襃美又曰驃騎將軍漢官也長史司馬各一人金章紫綬五時朝服武冠佩山𤣥玉光武中興諸將皆稱大後天下既定武官悉省東觀漢記明帝詔曰東平王蒼寛博有謀可以託六尺之孤臨大節而不可奪其以蒼為驃騎將軍又曰張意拜驃騎將軍討東甌備水戰之具一戰大破所向無前又曰其將軍不常置比公者又有驃騎將軍建武二十年復置驃騎將軍位次公有長史一人後漢書曰劉隆為驃騎將軍行大司馬事隆奉法自守視事八嵗上將軍印綬罷賜養牛上罇酒十斛應劭漢官儀曰漢興置驃騎將軍次相隋書曰崔彭轉驃騎將軍宿衛性謹宻在省闥二十餘年毎當上在仗危坐終日未嘗有怠惰之容上甚嘉之上毎謂彭曰卿當上日我寢處自安又嘗曰卿弓馬固以絶人頗知學不彭曰臣少愛周禮尚書毎於休沐之暇不敢廢也上曰試為我言之彭因說君臣戒愼之義上稱善韋昭辨釋名曰驃騎將軍車騎將軍秩比三公辨云此二將軍秩本二千石世說曰何驃騎弟第五以髙情遜避而驃騎令仕對曰然第五之稱何必減於驃騎陳思王輔臣論曰魁傑雄特秉心平直威嚴足憚風行草靡戎昭果毅折衝厭難者司馬驃騎}
