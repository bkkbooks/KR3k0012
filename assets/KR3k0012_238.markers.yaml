  - {type: variant, offset: 2624, length: 0, content: '', SBCK: 馬融字季長爲大將軍鄧騭舎人晉陽秋曰義興周延爲左率轉尚書遷大將軍諮議叅軍車􅀐將軍漢書曰元光元年以中尉程不識爲車􅀐將軍屯鴈門應劭漢官儀曰帝以元舅馬防爲車􅀐將軍銀印青綬呉志曰孫壹奔魏以壹爲車􅀐將軍儀同三司封呉侯以故王芳貴人邢氏妻之邢美色妬忌下不堪命遂共殺壹及邢氏蜀志曰鄧芝字伯苗義陽新野人益州從事張􅁉相芝徃從芝謂芝曰君年過七十位至大將軍封侯爲車􅀐將軍賞罰明善䘏卒伍身之衣食資仰於官不茍素儉然終不治私産妻子不免飢寒死之日家無餘財後魏書曰王衍字文舒出爲散􅀐常侍征東將軍西兖州刺史衍届治未幾屬尓朱仲逺稱兵内向州旣路衝爲其攻逼衍不能守爲仲逺所擒以其名望不害也令􅀐牛從車乆乃見釋還洛除車􅀐將軍隋書曰長孫覽周武帝在藩與覽親善及即位彌加禮焉超拜車􅀐大將軍毎公卿上奏必令省讀覽有口辯聲氣雄壯凢所宣􅀓百寮屬目帝毎嘉歎之覽􅀄名善帝謂之曰朕以万機委卿先覽遂賜名焉驃􅀐將軍漢書曰武帝以霍去病爲嫖姚校尉征匈奴累有功寵冠群臣置驃􅀐將軍秩與大將軍同又曰明帝即位以東平王蒼爲驃􅀐輔政開東閣延英雄及蒼歸國有驃􅀐時吏丁牧周相以蒼敬賢下士不忍去之遂爲王家大夫數十年事祖及孫帝聞襃美又曰驃􅀐將軍漢官也長史司馬各一人金璋紫綬五時朝服武冠佩山􅀇玉光武中興諸將皆稱大後天下旣定武官悉省東觀漢記明帝詔曰東平王蒼寛􅀶有謀可以託六尺之孤臨大節而不可奪其名以蒼爲驃􅀐將軍又曰張意拜驃􅀐將軍討東甌備水戰之具一戰大破所向無前又曰其將軍不常置比公者又有驃􅀐將軍建武二十年復置驃􅀐將軍位次公有長史一人後漢書曰劉隆爲驃􅀐將軍行大司馬事隆奉法自守視事八歳上將軍印綬罷賜養牛上樽酒十斛應劭漢官儀曰漢興置驃􅀐將軍位次丞相隋書曰崔彭轉驃􅀐􅁪典􅀫衛性謹宻在省闥二十餘年毎當上在仗危坐終日末嘗有怠惰之容上甚嘉之上毎謂彭曰卿當上日我寢處自安又甞曰卿弓馬固以絶人頗知學不彭曰臣少愛周禮尚書毎於休沭之暇不敢廢也上曰試爲我言之彭因說君臣戒愼之義上稱善韋昭辯釋名曰驃􅀐將軍􅀐將軍秩比三公辯云此二將軍秩夲二千石世說曰何驃􅀐弟第五以髙情遜避而驃􅀐令仕對曰然第五之稱何必减之驃􅀐陳思王輔臣論曰魁傑雄特秉心平直威嚴足憚風行草靡戎昭果毅折衝厭難者司馬驃􅀐}
