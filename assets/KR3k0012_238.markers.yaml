  - {type: variant, offset: 2028, length: 507, content: 將軍二人副其事領官屬並隋置大唐因之後漢書曰初光武適新野聞陰后美心悅之後至長安見執金吾車騎甚盛因歎曰仕官當作執金吾娶妻當得陰麗華漢官宰尹下曰吾禦也常執金革以禦非常緹騎二百人輿馬導從充滿於路世祖微時歎曰仕官當作執金吾是也漢書百官公卿表曰秦名曰中尉掌徼循京師有兩丞候司馬兵千人武帝太初元年更名執金吾又曰母將隆為執金吾時侍中董賢方貴上使中黃門發武庫兵前後十輩送賢及上乳母王阿金隆奏武庫兵器天下公用國家武備繕治造作皆度大司農錢蘇林曰用度皆出大司農大司農錢自非乘輿不以給供養勞賜一出少府蓋不以本藏給未用不以民力供浮費別公私示正路也又曰郅都為中尉丞相條候至貴倨也而都揖丞相是時民樸畏罪自重而都獨先嚴酷行法不避貴戚列侯宗室見都側目而視號曰蒼鷹也東觀漢記曰馬防字孝孫拜執金吾性矜嚴公正上事處議多見用續漢書曰陰識拜執金吾位特進入則極言正諫至與賓客語不及國事常慕仲山甫匪躬之節所用掾史皆得天下俊哲虞詡傅賢等是也又曰朱浮字叔元為執金吾帝以二千石長吏不堪任時有纖微之過者必見斥罷交易紛擾百姓不寧六年有日蝕之異浮因上䟽切諫自是州郡奏長吏二千石不任位者事皆先下三公遣掾史案然後黜退又曰秩中二千石掌外司非常水火之事旦三繞行宮外及主兵器丞一人比千石, SBCK: ''}
