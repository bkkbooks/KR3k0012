  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第七十六皇王部一叙皇王上尚書緯曰帝者天號王者人稱天有五帝以立名人有三王以正度天子爵稱也皇者煌煌也洛書曰皇道缺故帝者興易坤靈圖曰在政不私公位稱之曰帝易緯曰帝者天號也徳配天}
  body:
  - {type: variant, offset: 1, length: 0, content: '', SBCK: 不私公位稱之曰帝天子者繼天治物改政一統各得其冝父天母地以養生人至尊之號也大君者君人之盛也易乹鑿度曰帝王興亡必察八}
  - {type: variant, offset: 1, length: 0, content: '', WYG: 不私公位稱之曰帝天子者繼天治物改正一統各得其宜父天母地以養生人至尊之號也大君者君人之盛也易坤鑿度曰帝王興亡必察八}
