  - {type: variant, offset: 289, length: 2, content: 鴻溝, SBCK: 書曰堯舜禹稷與之爲善則行驩兠欲與爲􅁖則誅可與爲善不可與爲􅁖是謂上智桀紂龍逢比干欲與爲善則誅子華崇侯與之爲惡則行不可與爲善可與爲惡是爲下愚應劭漢官儀曰皇者大帝言其煌煌盛美帝者徳象天地言其能行天道舉措審諦父天母地爲天下主漢􅄂事曰漢有天下號曰皇帝自稱朕人臣稱之曰陛下其命令制詔衣冠車馬器械百物曰乗輿所在曰行在所至曰幸所居曰禁中所進曰御天子至尊不敢䙝瀆之故託於乗輿天子以天下爲家不以京師宫室爲常處則當乗輿以行天下猶調之車駕今雖在京師京師言行在所廵狩天下所奏事處皆爲宫在長安則曰長安宫在泰山則曰奉商宫唯當時所至帝王世紀曰天子至尊之定名也應神受命爲天所子故謂之天子故孔子曰天子之徳感天地洞八方是以功合神者稱皇徳合天地稱帝義名曰稱王韋曜洞紀曰自天地剖判君世宰人可得}
