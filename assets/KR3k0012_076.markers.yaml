  - {type: variant, offset: 423, length: 2, content: 饑饉, krp: 心爲心善者吾善之不善者吾亦善之得善矣信者吾信之不信者吾亦信之得信矣聖人在天下慃然爲天下渾其心百姓皆注其耳目聖人皆孩之又曰聖人之言云我無爲而民自化我無事而民自冨我好静而民自正我無欲而民自樸又曰聖人執左契而不責於人故有徳司契無徳司徹聖人之心與百姓心猶左右契耳契來則合故上下相親怨用不作後世不能執左契以應物而守常徹以軌民用此來和必有餘怨矣又曰江海所以能爲百谷王者以其善下之也是以聖人欲上人也必以其言下之欲先人也必以其身後之故處上弗害是以天下樂推而不厭也董子曰爲天子不可不承天意必順其道然後爲安又曰古之造文字者三畫而謂之王三畫者天地人也連其中者通其道也孟子曰人皆有不忍人之心言人人皆有不忍加惡於人之心也先王有不忍人之心斯有不忍人之政矣以不忍人之心行不忍人之政治天下可運之掌上也又曰五霸者三王之罪人也趙臺卿章句曰五霸大國康政以率諸侯也齊桓晉文秦襄楚莊是也三王夏禹啇湯周文王也今之諸侯五霸之罪人也天子討而不伐諸侯伐而不討孫卿子曰人}
