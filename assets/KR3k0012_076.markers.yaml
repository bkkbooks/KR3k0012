  - {type: variant, offset: 423, length: 10, content: 饑饉君乃穿渠入河四十, WYG: 心為心善者吾善之不善者吾亦善之得善矣信者吾信之不信者吾亦信之得信矣聖人在天下翕然為天下渾其心百姓皆注其耳目聖人皆孩之又曰聖人之言云我無為而民自化我無事而民自富我好静而民自正我無欲而民自樸又曰聖人執左契而不責於人故有德司契無德司轍聖人之心與百姓心猶左右契耳契合則和故上下相親怨誹不作後世不能執左契以應物而守常轍以軌民此求合必有}
