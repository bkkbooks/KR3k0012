  - {type: variant, offset: 107, length: 171, content: 眾從之如樊遲約乃踰溝又哀元年吳城邗溝通江淮杜預曰於邘江築城穿溝東北通謝陽湖西北至末口入淮通糧道也今廣陵邘江是國語曰吳王夫差既殺申胥不稔於歲稔熟稱歲也乃起師北征開為深溝通於商魯之間開掘地商宋也北屬之沂西屬之濟以會晉定公于黃池論語曰禹盡力於溝洫史記曰漢王四年王軍廣武關中兵益出當此時彭越將兵居梁地往來弱楚兵絕其糧道齊王信又進擊楚項羽恐乃與漢王約中, SBCK: ''}
