  - {type: variant, offset: 1375, length: 10, content: 景善能治水顯宗詔與謁, SBCK: 聖人休焉唐子曰君人者秉南面之尊操殺生之柄威如秋霜恩如春養何求而不得何化而不從君人者當以江海爲腹山林爲面當使觀者不知江河藏山何有􅂫子曰天子坐九重之内樹塞其門旒以翳明衡以隱聽鸞以柳馳陸子曰三皇垂筞而五帝繁手唐虞按轡禹湯馳轅雖使周公御衡仲尼促節固不已也孫綽子曰道一者帝德充}
