  - {type: variant, offset: 501, length: 860, content: 楊子圖經曰六合縣東三十里從岱石湖入四里至溝中心與陵分界案後漢書張綱為廣陵太守濟惠於百姓勸課農桑於東陵村東開此溝引湖水灌田以此號為張綱溝阮勝之記曰吳王濞開茱萸溝通運至海陵倉北有茱萸村以村立名故史記云邘溝即吳王夫差所開漕運以通上國崔豹古今注曰羊溝者言羊喜牴觸垣牆故為溝以隔之一曰植高楊於其上故謂之楊溝古詩曰今日斗酒別明日溝水頭蹀躞御溝上溝水東西流瀆禮記月令曰季春之月道達溝瀆開通道路爾雅曰溝注澮曰瀆水流不絕曰瀆漢舊儀曰祭四瀆用牲崔鴻十六國春秋前秦錄曰建元十二年堅以關中水旱不時議依鄭白故事發王侯以下及豪強富民僮隸三萬人開涇水上源鑿山起堤通渠引瀆以溉田民賴其利伏滔北征記曰姑熟西北有甘寧墓孫皓時占者云墓有王氣皓鑿其後十許里曰直瀆越絕書曰銅沽瀆長一百五十步去縣二十里渠史記河渠書曰禹以為河所從來者高難以行平地數為敗乃釃二渠漢書音義曰釃分也以引其河載之高地過降水至于大陸播為九河也鄭國間說秦令鑿涇自中山南西交瓠口為渠溉斥鹵之地四萬餘頃收皆畝一鐘於是關中為沃野無凶年秦以為富強卒併諸侯因命曰鄭國渠漢書曰禹作二渠以引河武帝時穿渠水岸若崩乃鑿井深四十丈井下相通井渠自此始得龍骨名龍首渠起谷口入櫟陽注渭中因名渠民得其饒歌曰田於何所池陽谷口鄭國在前白公起後舉鍾為雲決渠為雨又曰張掖郡有千金渠范曄後漢書曰樊密所起廬舍皆有深堂高閣陂渠灌注又池魚牧畜有求必給魏志曰遼西單于蹋頓尤強公將征之鑿渠自滹沱入泒水名平虜渠又從泃河口鑿入潞河名泉州渠以通海又曰建安十八年九月鑿渠引漳水入白溝以通河又曰賈逵為豫州刺史通運渠二百餘里所謂賈侯渠北史曰郭衍為開漕渠大監部率水工鑿渠引渭水經大與城北東至于潼關漕運四百餘里關中賴之名曰富人渠隋書薛冑為兗州刺史先是兗州城東沂泗二水合而南流汎濫大澤中冑遂積石堰之使決令西注陂澤盡為良田又通轉運利盡淮海百姓賴之號為薛公豐兗渠唐書曰溫造為朗州刺史在任開後鄉渠九十七里溉田二千頃郡人獲利乃名為右史造自起居舍人出郡水經注曰漢司空漁陽王梁之為河南也將引穀水以溉京師渠成而水不流故以坐免後張純堰洛以通漕洛中公私懷贍是以渠今引穀水蓋純之創, WYG: ''}
