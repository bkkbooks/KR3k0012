  - {type: variant, offset: 1364, length: 1, content: 漢, SBCK: 夫帝王之德以天地爲宗以道德爲主以無爲爲常無爲也則用天下而有餘又曰天道運而無所積故万物成帝道運而無所積故天下歸聖道運而無所積故海內服此三者恣物之性而無所牽滯}
  - {type: variant, offset: 1364, length: 2, content: 漢明, WYG: 粹而王駮而霸無一焉而亡又曰國者天下之利用也人主者天下之利勢也得道以持之則大安也大榮也積善之源也不得道以持之則大危也大累也義立而王信立而霸權謀立而亡行一不義殺一無罪而得天下仁者不為也莊子盜跖篇曰古之禽獸多而人民少於是人皆巢居以避之晝拾橡栗暮栖木上故命之曰有巢氏古者人不知衣服夏則多積薪冬則煬之故命之曰生知之民神農之代卧則居居起則于于知其母不知其父與麋鹿同處耕而食織而衣無有相害之心此至德之隆也又曰夫}
  - {type: page-break, offset: 1364, content: '', id: KR3k0012_WYG_076-12a, image: WYG0893/WYG0893-0609a.png}
  - {type: page-break, offset: 1364, content: '', id: KR3k0012_WYG_076-12b, image: WYG0893/WYG0893-0609b.png}
  - {type: variant, offset: 1364, length: 1, content: 漢, krp: 夫帝王之德以天地爲宗以道德爲主以無爲爲常無爲也則用天下而有餘又曰天道運而無所積故万物成帝道運而無所積故天下歸聖道運而無所積故海內服此三者恣物之性而無所牽滯}
  - {type: variant, offset: 1366, length: 0, content: '', SBCK: 於天道於聖六通四辟}
  - {type: variant, offset: 1366, length: 0, content: '', krp: 於天道於聖六通四辟}
  - {type: variant, offset: 1367, length: 0, content: '', SBCK: 王之德者夫靈静恬淡寂寞無爲者萬物之本以此處上帝王天子之德又曰廣成子曰得吾道者上爲皇而下爲王郭璞曰皇王之稱隨世之上下耳其於得通變之道以應無窮一也失吾道者上見光而下爲􅁟失無窮之道則自信於一變而不能均同上下矣故俯仰異心也又曰赫胥氏之時民居不知所爲行不知所之含哺而熈皷腹而遊民能以此矣又曰昔容成氏大庭氏柏皇氏中央氏栗陸氏驪連氏軒轅氏赫胥氏尊盧氏祝融氏伏犧神農氏當是時也民結繩而用之郭象曰足以紀要而已也甘其食美其服適故常甘當故常美􅀂思夫侈靡則無時慊矣樂其俗安其隣國相望雞狗之音相聞民至老死而相徃來無求之至也􅀂此時則至治也巳又曰古之王天下者知雖落天下不自慮也辯雖彫萬物不自􅀃也能雖窮海內不自爲也天不産而萬物化地不長而萬物育帝王無爲天下功故曰莫神於天莫冨於地莫大於帝王故曰帝王之德配天地此乗天地馳萬物而用人君之道也又曰至德}
  - {type: page-break, offset: 1367, content: '', id: KR3k0012_SBCK_076-8a}
  - {type: page-break, offset: 1367, content: '', id: KR3k0012_SBCK_076-8b}
  - {type: variant, offset: 1367, length: 0, content: '', WYG: 王之德以天地為宗以道德為主以無為為常無為也則為天下用而不足又曰天道運而無所積故萬物成帝道運而無所積故天下歸聖道運而無所積故海内服此三者恣物之性而無所牽滯於天通於聖六通四辟於帝王之德者其自為也夫虚静恬淡寂寞無為者萬物之本也以此處上帝王天子之德也又曰廣成子曰得吾道者上為皇而下為王郭璞曰皇王之稱隨世之上下耳其於得通變之道以應無窮一也失吾道者上見光而下為土失無窮之道則自信於一變而不能均同上下矣故俯仰異心也又曰赫胥氏之時民居不知所為行不知所之含哺而熙鼔腹而遊又曰昔容成氏大庭氏柏皇氏中央氏栗陸氏驪連氏軒轅氏赫胥氏尊盧氏祝融氏伏羲神農氏當是時也結繩而用之郭象曰足以紀要而已也甘其食美其服適故常甘當故常美若思侈靡則無時慊矣樂其俗安其居隣國相望雞狗之音相聞民至老死不相往來無求之至也若此者則至治也又曰古之王天下者知雖落天下不自慮也辯雖彫萬物不自說也能雖窮海内不自為也天不產而萬物化地不長而萬物育帝王無為而天下功故曰莫神於天莫富於地莫大於帝王故曰帝王之德配天地乘天地馳萬物而用人君之道也又曰至德}
