  - {type: variant, offset: 287, length: 1, content: 為, SBCK: 天下所歸天子者繼天理物改一統政大君者人君之盛稱大化行於萬人冝處王者施大化爲大君也周書曰三王之統􅀂循連環周則復始窮則反夲尚書大傳曰三王之治如環之無端如水之勝火又曰古者天子有四隣前曰疑後曰丞左曰輔右曰弼有問無以對責之疑可志而不志責之丞可正而不正責之輔􅀭而不􅀭責之弼韓詩外傳曰明王有三懼一曰處尊位而恐不聞其過二曰得志而恐驕三曰聞天下之至道而恐不能行又曰君者群也群天下萬民而除其害者謂之君王者徃也天下徃之善養生人者也故人尊之善辯治人者也故人安之善顯設人者也故人親之善粉飾人者也故人恱之四徳具而天下徃之四徳無一而天下去之徃之之謂王去之之謂亡故曰道存則國存道亡則國亡大戴禮曰古者天子常以季冬考德以􅀚治亂得失又曰昔堯取人以狀舜取人以言湯取人以聲文王取人以度禮曰君天下曰天子又曰天子以徳爲車以樂爲御又曰昔先王尚有徳尊有道任有能舉賢而置之聚衆以誓之是故因天事天因地事地又曰帝嚳能序星辰以著衆堯能賞均刑法以義終舜勤衆事而野死鯀鄣洪水而殛死禹能脩鯀之功黄帝正名百物以明民共財顓頊能脩之湯以寛治民而除其虐文王以文治武王以武功去人之災此皆有功烈於人者也又曰王天下有三重其寡過矣乎三重三王之禮也又曰孔子曰大道之行也與三代之英丘未之逮也而有志焉大道謂五帝時也大道之行也天下爲公選賢與能講信脩睦故人不獨親其親不獨子其子使老有所終壯有所用㓜有所長是故謀閉而不興盗􅀼亂賊而不作故外户而不閉是謂大同同猶和平也又曰故聖人作則必以天地爲夲以隂陽爲端以四時爲柄以日星爲紀以月爲量􅀑神以爲徒五行以爲質禮義以爲器人情以爲田四靈以爲畜又曰故聖王脩義之柄禮之序以治人情故人情者聖人之田也禮斗威儀曰帝者得其英華王者得其根核霸者得其附支故帝道不行不能王王道不行不能霸霸道不行不能守其身禮含文嘉曰山澤者三皇五帝之感應也春秋演孔圗曰正氣爲帝間氣爲臣宫商爲姓秀氣爲人正氣爲􅀂木則人得蒼龍之形靈威仰之氣史則得朱鳥之形赤熛怒之氣以生之又曰天子皆五帝精寳各有題序次運相據起必有神靈符紀諸神扶助使開階立遂遂當作燧燧道也又曰王者常置圖籙坐旁以自正春秋元命苞曰皇者煌煌也道爛然顯明帝者諦也春秋文耀鈎曰王者徃也神所向徃人所歸樂春秋運斗樞曰宓犧女媧神農是謂三皇也皇者合元履中開隂布綱指天畫地神化潜通春秋合誠圖曰大帝之精起三河之州中土之􅃾又曰大帝冠五彩衣青衣黒下裳抱日月日在上月在下黃色正方居曰間名曰五光正黄而名之曰五光者盖以黄爲質而衆彩就飾之故曰五色此大帝人象旁文也春秋保乹圖曰天子至尊也神精與天地通血氣含五帝精人愛天地氣而主故神精與天地通天愛之子之也春秋佐助期曰天子法斗諸侯應宿春秋潜潭巴曰天子有三寳謂璿璣玉衡得其度也春秋繁露曰徳侔天地者稱皇帝天佑而子之號稱天子孝經授神契曰王徳珎文備象連表萬精曲飾題􅀋設術脩經躬仁尚義祖禮行信握􅁠仁智順道形人俱在至徳孝經鈎命决曰三皇歩五帝驟三王馳五霸騖或稱帝王接上稱天子明以爵事天接下稱帝王明以號令臣下論語􅎥褰聖承進曰帝不先義任道徳王不先力尚仁義霸不先正尚武力論語撰考䜟曰考靈差徳知堯歩舜驟禹馳湯騖徳有優劣故曰行轉疾也家語曰孔子􅀚乎明堂覩四門之墉有堯舜桀紂之象又有周公相成王之圖孔子謂從者曰夫明鏡所以察形徃古所以知今又曰季康子問於孔子曰舊聞五帝之名而不知其實請問何謂孔子曰昔丘也聞諸老􅡭天有五行木金火水及􅁟分時化育以成萬物其神謂之五帝古之王者易代改號取法五行五行更王終始相生亦象其義也故其生爲明王者而死配五行白虎通曰帝王者號也號者古之表也所以表功明徳號令臣下徳合天者稱帝仁義合者稱王別優劣也又曰皇君也美也大也天人之揔美大之稱也時質惣稱之}
