  - {type: variant, offset: 1779, length: 850, content: 輔渠以大溉灌民極獲利因曰倪公渠甽說文曰甽水流也周禮曰倍洫曰甽稽康養生論曰或益之以甽澮澮說文曰澮水流澮澮也廣二尋深二仞書曰予決九川岠四海浚畎澮爾雅曰谷注溝曰澮釋名曰澮會也小溝之所會也汎續述征記曰齊人謂湖為汎汎中有九十九臺皆生結蒲因此蒲生自結風俗通曰汎莽也言其平望汎莽無崖際也灣酈善長注水經曰沅水又東歷臨沅縣西為明月池白壁灣灣狀半月清潭鏡澈上則風籟空傳下則泉響不斷行者莫不擁楫嬉游徘徊愛翫江夏記曰敗舶灣在縣西北七里案吳志云孫權與群臣泛觴於大舩江中西上逢惡風權遣柂上張頡取𤄷洲谷利拔劍擬柂工急取樊口未及至口灣中船破因名敗舶灣權至岸謂谷利曰何怯於水也谷利曰大王萬乘之主欲涉不測之淵一旦傾危社禝何寄因登陸路而歸尋陽記曰蠡湖西灣夏秋水渺漲商徒縈紆牽舟循繞人力疲勞號為西疲灣亦云西灣又有白溝灣亦在湖西汎漲驚波似雪洶涌溝澮因是名焉又有落星灣灣內有落星石周廻百步許又有神林下有廟祈福而獲前進由是名焉又有女兒廟禱祈亦有靈應即不許所置永嘉郡記曰樂城縣三原亭去郡百二十里溪水清如鏡曩昔有得一死鮎者鰭大五六圍一鰭輒得數十斛鮓此灣無所不容有大能食者常自譬腹如三原灣無所不容水經注曰渭水東南與神澗水合開山圖所謂靈泉池也俗名之為萬石灣泉深不測實為靈異先後慢遊者多罹其斃鄱陽記曰清灣在縣東南七里隋開皇中太守梁文謙蒞官清絜取此灣水以自供人思其德號為清灣浦說文曰浦水濱也詩曰率彼淮浦省此徐土郡國志曰夏曰浦有龍魚昔禹南濟黃龍夾舟之處楚詞曰望涔陽之極浦述異記曰上虞縣有石駞步水際謂之步也瓜步在吳中吳人賣瓜於江畔因以名也江中有魚步龜步湘中有靈妃步按吳楚間謂浦為步蓋語訛耳吳錄曰富陽浦漢末為吳縣於津吳大帝時有浦通浙江至廬溪及桐溪故曰桐廬縣東有大溪注廬口淥波青巖昔晉徵士散騎侍郎戴勃遊此自言山水之極致也郡國志曰金陵西浦亦云項口即張碩捕魚遇杜蘭香處也江夏記曰南浦在縣南三里離騷曰送美人兮南浦其源出京首山流入大江春冬涸竭秋夏泛漲商旅從來皆於浦停泊以其在郭之南故稱南浦續搜神記曰廬江箏笛浦浦中昔有大舶覆水內漁人宿旁聞箏笛之聲及香氣氤氳云是曹公載妓舡覆於此, SBCK: ''}
