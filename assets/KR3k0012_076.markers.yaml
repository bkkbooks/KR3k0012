  - {type: variant, offset: 1369, length: 5, content: 司徒伏恭薦, SBCK: 不尚賢不使能民如野鹿正而不知以爲義相愛而不知以爲義實而不知以爲忠當而不知以爲信又曰聖人之静也非曰其静者善故静也萬物無足以橈心者故静也郭象曰撓亂也夫靈静恬淡寂寞無爲者天地之平而道德之至也故帝}
