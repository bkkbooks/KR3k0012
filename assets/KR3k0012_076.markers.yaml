markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 太平御覽卷第七十六皇王部一叙皇王上尚書緯曰帝者天號王者人稱天有五帝以立名人有三王以正度天子爵稱也皇者煌煌也洛書曰皇道􅆙故帝者興易坤靈圖曰在政不私公位稱之曰帝易緯曰帝者天號也徳配天}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_076-1a}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書太平御覽卷七十六宋李昉等撰皇王部一敘皇王上叙皇王上尚書緯曰帝者天號王者人稱天有五帝以立名人有三王以正度天子爵稱也皇者煌煌也洛書曰皇道􅆙故帝者興易坤靈圖曰在政不私公位稱之曰帝易緯曰帝者天號也德配天}
