  - {type: variant, offset: 301, length: 1, content: 父, SBCK: 者之道如龍之首髙居而逺望􅀷視而審聽神其形而散其精􅀂天髙而不可極􅀂淵􅀷而不可測故可怒而不怒臣乃爲虎不可殺而不殺大賊乃發又曰昔栢皇氏栗陸氏驪連氏軒轅氏赫胥氏尊盧氏祝融氏此古之王者也未使民民化未賞民民勸此皆古之善爲政者也至於伏犧氏神農氏教民而不誅黄帝堯舜誅而不怒古之不變者有苗有之堯化而取之堯徳衰舜化而受之舜德禹化而取之太公伏符隂謀曰武王曰三皇之治}
