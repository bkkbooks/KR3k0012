  - {type: variant, offset: 616, length: 0, content: '', WYG: 謝𤣥故宅戴元西征記曰東陽門外道北吳蜀二主第宅去城二里墟基猶存又曰潼關北去蒲坂城六十里城中有舜廟城外有宅井及二妃壇南去城二十里有田舜所耕山上亦有宅述征記曰豐水九十里有漢髙祖宅又曰山陽縣城東北二十里魏中散大夫嵇康園宅今悉為田墟而父老猶謂嵇公竹林地以時有遺竹也成都記曰成都縣南百步有嚴君平司馬相如揚雄宅今草𤣥亭餘跡尚存陳留耆舊傳曰董宣為北海太守大姓公孫舟造起大宅工占之云宅成當出一喪舟使子取行人殺之以塞咎宣收舟拷殺之世説曰鍾㑹荀濟二人情好不協荀有寳劒可直百萬常在母鍾太夫人處㑹善書學荀手跡作書與母取劎仍竊去不還荀後知是鍾而無由得求思所以報之於是潜往畫鍾門堂並作太傅形象衣冠狀貌如平生之容鍾來入門便感慟宅遂空廢徐邈别傳曰邈字仙民舊疑嵗辰在卯舉世認承傳為定範此宅之左即彼宅之右地何得俱忌邈以為太歳之屬自是遊神譬如日出之時向東皆逆非為藏體地中水經注曰齊城門外有晏嬰宅盛宏之荆州記曰新野郡西七里有揚溪源出紫山南流入涓故耆老傳云溪西有百里奚宅又曰新野郡南有越相范蠡祠宅三户人傳云祠處即是宅又曰襄陽范蠡祠南有晉河南尹樂廣宅周廻十餘畆曩舊井猶未頹檀道濟置邏其中即名為樂宅又曰襄陽西北十餘里名為隆中有諸葛孔明宅又曰宛有伍子胥宅范汪荆州記曰義陽六安縣有光武宅枕白水所謂飛龍白水也蘇州記曰周文學孔子弟子言偃宅在常熟縣西史記云言偃吳人也字子游又吳地記云宅有井井邊有洗石周四尺輿地志云梁蕭正德為郡太守為蕭將去莫知所在吳地記曰陸氏宅在長谷谷在吳縣東北谷名華亭谷水下通松江昔陸遜陸凱居此谷吳志云漢廬江太守陸康與袁術有隙使侄遜與其子績率宗族逃此避難居于是谷谷東有崑山祖墓在焉故陸機思鄉詩髣髴谷水陽婉孌崑山隂列仙傳云厯陽有彭祖宅禱祠風雨應期而至襄沔記曰晉永興中鎭南將軍襄陽郡守劉宏于隆中諸葛故宅立碑表廬使太傅掾犍為李興為文又曰繁欽宅王粲宅并在襄陽井臺猶存又曰長流廨西有梁曹儀同景宗柳儀同慶逺韋儀同叡諸宅並相隣次郭城西門韋叡少時有南陽人蔡那善相叡宅應出三公刺史貴不可言時叡宅有草房十間那宅在城南悉是瓦屋求叡換宅疑而不許叡}
