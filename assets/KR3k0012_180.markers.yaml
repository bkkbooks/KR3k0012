  - {type: variant, offset: 340, length: 3, content: 瀛洲此, WYG: 公欲弛孟文子之宅文公魯僖公之子弛毁也孟文子魯大夫公孫敖之子文伯穀也宅有司所居公欲毁之以益宫也使人謂之曰吾欲利子於外之寛者對曰夫位政之建也署位之表也車服表之章也宅章之次也祿食之次也君議五者以建政為不易之故也今有司來命易臣之署與其車服而曰將易而次為寛利也夫署所以朝夕䖍君命也臣立先臣之署服其車服為利故而易其次是辱君命也不敢聞命若罪也則請納禄與車服而違署唯里人之所命次公弗取臧文仲聞之曰孟孫善守矣其可以蓋穆伯而守後於魯乎穆伯文子之父公孫敖也滛乎魯姬出奔而死於齊今文子守官不失禮故可掩蓋其父惡守其後嗣也公欲弛郈敬子之宅亦如之公文公也郈敬子魯大夫郈惠伯之後𤣥孫敬伯同也亦如之者亦謂之欲利子於外之寛者也對曰先臣惠伯以命於里嘗禘烝享之所致君胙者無乃違乎請有數矣出入受事之幣以致君之命者亦有數矣今命臣更次於外從司徒以班徙次亦弗取孟子曰五畆之宅樹墻下以桑匹婦蠶之則老者足以衣帛矣韓子曰有與猛者隣欲賣宅避之人曰是其貫將滿矣子姑待之答曰吾恐以我滿貫也遂去之淮南子曰任一人之能不足以治}
