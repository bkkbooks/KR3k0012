  - {type: variant, offset: 339, length: 0, content: '', WYG: 建無窮之業臣意在與魏升降寧容不務永年之宅帝謂司空穆亮僕射李冲曰巒之此言其意不小五代史晉史曰羅紹威前唐時嘗建第洛陽福善里莊宗同光中始賜明宗梁租庸使趙巖宅雖華以趨内逺乃召紹威子周敬易第後明宗即位一日夢中見一人儀形瓌秀若素識者上夢中曰此得非前宅主羅氏乎及寤訪其子孫左右對曰周敬見列明廷召至果符夢中所見上謂侍臣曰朕不欲使大勲之後乆無土地因授左馮翊非承家為善何以至此五代史周書曰漢初以晉入蕃將相第宅賜隨駕大臣以趙榮第賜太祖太祖召榮子前刑部郎中易則告之曰所賜第除素屬版籍外如别有契券已所置者可歸本直即以千餘緡遺易則易則惶恐辭讓太祖堅與之乃受孔子家語曰魯哀公問於孔子曰寡人聞東益宅不祥信有之乎孔子曰不祥有五而東益宅不與焉夫損人而自益身之不祥也棄老而取幼家之不祥也釋賢而任不肖國之不祥也老者不敎㓜者不學俗之不祥也聖人伏匿愚者擅權天下之不祥也不祥有五而東益宅不與焉淮南子曰魯哀公欲西益宅史爭之以為西益宅不祥哀公作色怒左右數諫不聽乃以問其傅曼折曜對曰天下三不祥而西益宅不與焉哀公大悦復問何為三不祥對曰不行禮義一不祥嗜欲無止二不祥不聽正諫三不祥哀公喟然自反不益宅風俗通曰宅不西益俗説西者為上上益宅者妨家長也原其所以西益者禮記曰南向北向西方為上爾雅曰西南隅謂之隩尊長之處也不西益者恐動揺之耳審西益有害增廣三面豈能獨吉乎國語魯}
