  - {type: variant, offset: 415, length: 194, content: 何以知之曰妾聞禮下公門軾路馬今蘧伯玉賢者也必不以暗昧廢禮公令人視之果如所言神異經曰東南有石井其方百丈上有二石闕俠東南面上有蹲熊有榜著闕題曰地戶西北荒中有金闕高百丈上有明月珠徑三丈光照千里中有金階西北入兩闕中名天門十洲記曰崑崙山有水精闕水經曰秦孝公築冀闕臨渭水在咸陽西四十里闕中記曰未央宮東有青龍闕北有玄武闕漢書所謂北闕者也建章宮圓闕臨北道鳳在上故號曰鳳闕也閶闔門內東出有折風闕一名別風瀨鄉, SBCK: 長史宅瀬郷}
