  - {type: variant, offset: 336, length: 2, content: 蓬萊, SBCK: 魯恭王餘好治宫室苑囿壊孔子舊宅以廣其宫聞鍾磬琴瑟之聲遂不敢復壞於其壁中得古文經傳吴志曰周瑜與孫䇿同年相友善瑜推道南大宅以舎䇿􅂛堂拜母有無通共晉書曰裴楷性寛厚與物無忤不持儉素每遊榮貴輙取其珎玩雖車馬器服宿昔之間便以施諸窮乏甞營别宅基構甚麗與兄共遊行床帳儼然櫺軒踈㓪兄心甚願之而口不言也楷心知其意便使住又曰杜后母裴氏爲廣徳縣君裴氏名穆長水校尉綽孫太傅主簿遐女太尉王夷甫外孫中表之美髙於當世遐隨東海王越遇害無子唯穆渡江遂享榮慶立第南掖門外世所謂杜姥宅云又曰有奏王公國家京城不冝有田宅未暇作諸國邸當使有徃來之處今限京師得有宅一所又書曰劉繪字士彰彭城人也太常悛弟父勔宋末權貴門多客繪解􅄄爲著作郎太祖見歎曰劉公爲不亡矣繪聦警善􅀠書爲竟陵王後進賔客時張融周顒並有五言融音旨緩韻顒辭致綺捷繪之言吐又頓挫風氣時人謂語曰劉繪貼宅别開一門言在二家之中也又朝野爲語曰三人共宅夾清漳張南北劉中央言處二人間王隱晉書曰魏舒字陽元㓜䘮父母爲外􅇞氏所養􅇞氏起宅相者云當出貴外甥外祖父母以寗氏甥小而慧謂應相也舒荅當爲外家成此宅相又曰上黨鮑瑗家多䘮禍貧苦淳于智卜之卦成謂曰爲君安宅者女子工耶曰是也又曰此人巳死耶曰然智曰此人安宅失冝旣害其身又令君不利君舎東北有大桑樹君徑入市門數十歩當有一人折新馬鞭者便就請買還懸此樹三年當得物瑗承言詣市果得馬鞭懸之三年後浚井中得數十萬銅錢􅄂器復可二十餘萬於是家業用展病者亦愈晉書曰孔愉營山隂湖南侯山下數􅅿地爲宅草屋數間便弃官居之送資數百萬悉無所取又曰桓􅀇得志常欲以謝安宅爲營謝混曰邵伯之仁猶惠及甘棠文静之徳更不保五􅅿宅耶􅀇聞慙而止宋書曰􅀄太社西空地一區吴時丁奉宅孫皓流徙其家晉有江左􅀄爲周顗􅂫峻宅其後爲􅀽真宅又爲章武王司馬秀宅皆㓙敗後給臧燾亦頻遇䘮禍故世稱惡地王僧綽常以正逹自居謂宅無􅁻凶請爲第始就築未居而敗又顔延之傳曰竣旣貴重權傾一朝凡所資供延之無所受器服不改宅宇如舊見竣起宅謂曰善爲之無令人􅀏汝拙也齊書曰齊世祖武皇帝諱􅄨字宣逺太祖長子也小字龍兒生於建康青溪宅其夜陳孝后劉昭后同夢龍據屋上故字上焉梁書曰髙祖宋大明八年甲辰生于秣陵縣同夏里三橋宅後魏書曰徳興反於營州使尚書盧同往討之大敗而反屬侍中穆紹與元順侍坐因論同之罪同先有近宅借紹頗欲爲言順勃然曰盧同終將無罪太后曰何得如侍中之言順曰有好宅與要􅀔侍中豈慮罪也紹慙不敢復言又􅀖巒傳曰孝文因行樂至司空府南見巒宅謂巒曰朝行樂至此見卿宅乃佳東望徳館情有依然巒對曰陛下移構中原}
