  - {type: variant, offset: 344, length: 0, content: '', SBCK: 􅅿之宅循道里之數因天地之固然則六合不足均也抱朴子曰􅁑盧佐光武有大功受爵立宅舎於􅀶望里于今基址石礎存焉郡國誌曰􅉑州楊震宅西有龍望原南崖有太尉公藏書窟太元初人逐獸入穴見古書二千餘卷又曰洛陽董卓宅在永和里掘地輙得金玉寳玩後魏邢欒掘得丹沙及錢銘曰董太􅀓之物後夢見卓索欒不與經年而卒又曰洛陽石崇宅有緑珠樓今謂之狄泉又曰洛陽􅂫􅁗宅在利仁里後魏髙顯業毎夜見赤光於光處掘得金百斤銘曰􅂫家金業爲之造寺又曰幹}
