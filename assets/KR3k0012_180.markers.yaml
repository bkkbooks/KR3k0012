  - {type: variant, offset: 613, length: 0, content: '', WYG: 祠在瀨鄉曲仁里譙城西出十里老子平生時敎化學堂故處也漢桓帝修建屋宇為老子}
  - {type: page-break, offset: 613, content: '', id: KR3k0012_WYG_180-10b, image: WYG0894/WYG0894-0612b.png}
  - {type: variant, offset: 613, length: 0, content: '', krp: 祠在瀬郷曲仁里譙城西岀十里老子平生時教化學堂故處也漢桓帝修建屋宇爲老子}
  - {type: variant, offset: 614, length: 1, content: 前, SBCK: 廟北二里李夫人祠是老子所生舊宅也劉楨京口記曰糖頺山山周廻二里餘山南隔路得郗鑒故宅五十餘􅅿又曰長村東太瀆瀆北}
  - {type: page-break, offset: 614, content: '', id: KR3k0012_SBCK_180-6b}
  - {type: variant, offset: 614, length: 1, content: 前, WYG: 廟北二里李夫人祠老子所生舊宅劉禎京口記曰唐頽山週廻二里餘山南得路得郄鑒故宅五十餘畆又曰長村東大瀆瀆北}
  - {type: variant, offset: 614, length: 1, content: 前, krp: 廟北二里李夫人祠是老子所生舊宅也劉楨京口記曰糖頺山山周廻二里餘山南隔路得郗鑒故宅五十餘畝又曰長村東太瀆瀆北}
  - {type: variant, offset: 616, length: 0, content: '', SBCK: 謝􅀇故宅戴延之西征記曰東陽門外道北吴蜀二主第宅去城二里墟基猶存又曰潼􅀜北去蒲坂城六十里城中有舜廟城外有宅井及二妃壇南去城二十里有山舜所耕山也述征記曰豐水西九十里有漢髙祖宅又曰山陽縣城東北二十里魏中散大夫嵆康園宅今悉爲田墟而父老猶謂嵆公竹林地以時有遺竹也成都記曰成都縣南百歩有嚴君司馬相如􅀭雄宅今草􅀇亭餘跡尚存陳留􅂄舊傳曰董宣爲北海太守大姓公孫舟造起大宅卜工占之云宅成當出一喪舟使其子取行人殺之以塞咎宣收舟考殺之世􅀃曰鍾㑹荀濟二人情好不恊荀有寳劒可直百萬常在母鍾太夫人許㑹善書學荀手跡作書與母取劒仍竊去不還荀後知是鍾而無由得永思所以報之㑹鍾兄弟共以千萬起新宅始成甚精麗未得移住荀善􅀞於是潜徃􅀞鍾門堂並作太傳形像衣冠􅃺貌如平生之容鍾來入門便感慟於是宅遂空廢徐邈别傳曰邈字仙民舉世􅖴承傳爲定範舊疑歳神在夘此宅之左即彼宅之右地何得俱忌邈以爲太歳之属自是遊神譬如日出之時向東皆逆非爲定體水經注曰齊城門外有晏嬰宅盛􅀪之荆州記曰新野郡西七里有楊溪源出紫山南流入淯故􅂄老傳云溪西有百里奚宅又曰新野郡南有越相范蠡祠蠡宅三户人傳云祠處即是宅又曰襄陽范蠡祠南有晉河南尹樂廣宅周廻十餘􅅿曩舊井猶未頺檀道濟置邏其中即名爲樂宅又曰襄陽西北十許里名爲隆中有諸葛孔明宅又曰宛城有伍子胥宅范注荆州記曰義陽六安縣有光武宅枕白水所謂龍飛白水蘇州記曰周文學科孔子弟子言偃宅在常熟縣西史記云言偃吴人也字子游又吴地記云宅有井井邊有監洗石周四尺輿地志云梁蕭正德爲郡太守爲蕭將去莫知所在吴地記曰云陸氏宅在長谷谷在吴縣東北谷名華亭谷水下通松江昔陸遜陸凱居此谷吴志云漢廬江太守陸康與􅀽術有􅂩使姪遜與其子績率宗族逺此避難居于是谷谷東有崑山父祖墓焉故陸機思郷詩曰髣髴谷水陽婉孌崑山隂列仙傳云歷陽有彭祖宅禱祠風雨應期而至襄􅃆記曰郡南晉永興中鎮南將軍襄陽郡守劉􅀪至隆中觀亮故宅立碣表閭使太􅀓􅁺犍爲李興爲文又曰繁欽宅王粲宅並在襄陽井臺猶存又曰長流解西有梁曹儀同景宋栁儀同慶逺韋儀同叡諸宅並相隣次郭城西門韋叡少時有南陽人蔡郍善相相叡宅應出三公刺史貴不可言時叡宅上有草屋十間郍宅在城南悉是瓦屋求叡換宅疑而不許叡}
