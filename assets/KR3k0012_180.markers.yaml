  - {type: variant, offset: 2376, length: 201, content: 百尺樓魏都水使者陳熙造建康宮闕簿云啇飆觀在東北十三里籬門亭後亭墩上齊武帝築九日登以晏群臣又曰曾城觀在縣東北七里景雲樓東齊武帝起七月日夜令宮人登以穿針因曰穿針樓又曰通天觀在縣東北五里一百步舊臺城內宋元喜中築蔬圃二十三年更修廣之築池汨天泉造景陽樓大壯觀花光殿設射堋又立鳳光殿醴泉堂又曰洛陽宮中有玄覽觀東汜觀清覽觀高平觀廣望觀聽松觀見親觀高樂觀陵雲總章宣曲萬年等觀又云建業宮有迎風觀在縣南十五里宋武大明中起於, WYG: 女嬃廟擣衣}
