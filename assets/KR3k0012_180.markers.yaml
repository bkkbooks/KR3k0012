  - {type: variant, offset: 340, length: 3, content: 瀛洲此, SBCK: 公欲㢮孟文子之宅文公魯僖公之子㢮毁也孟文子魯大夫公孫敖之子文伯榖也宅有司所居公欲毁之以益宫也使人謂之曰吾欲利子於外之寛者對曰夫位政之建也署位之表也車服表之章也宅章之次也禄次之食也君議五者以建政爲不昜之政也今有司未命昜臣之署與其車服而曰將昜而次爲寛利也夫署所以朝夕䖍君命也臣立先臣之署服其車服爲利故而昜其次是辱君命也不敢聞命􅀂罪也則請納禄與車服而違署唯里人之所命次公弗取臧文仲聞之曰孟孫善守矣其可以蓋穆伯而守其後於魯乎穆伯文子之父公孫敖也淫乎魯出奔而死折於齊今文子守官不失禮故可掩蓋其父惡守其後嗣也公欲㢮郈敬子之宅亦如之公文公郈敬子魯大夫郈惠伯􅀇孫之孫敬伯回也亦如之者亦謂之欲利子於外之寛者也對曰先臣惠伯以命於同里甞禘烝享之所致君昨者世有數矣出入受事之幣以致君之命者亦有數矣今命臣更次於外無乃違乎請從司徒以班從次亦弗取孟子曰五畒之宅樹牆下以桑匹婦蠶之則老者足以衣帛韓子曰有與猛者鄰欲賣宅避之人曰是其貫將滿矣子姑待之荅曰吾恐以我滿貫也遂去之淮南子曰任一人之能不足以治}
