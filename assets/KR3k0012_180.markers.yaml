  - {type: variant, offset: 2918, length: 0, content: '', SBCK: 南隅開府宋璟宅南門之東國子司業崔融宅璟造宅悉東西相對不爲斜曲以避惡名融爲則天哀䇿用思精苦不直馬過其門不覺文就而卒又曰尚善坊東南隅歧王範宅宅有薛稷􅀞鶴世稱妙絶又曰勸善坊東北隅太子太師鄭公魏徴宅山池院有進士鄭光乂􅀞山水爲時所重又曰宣風坊北街之西中書令􅂫味道宅宅有三十六柱亭子時稱巧絶禄山事跡曰禄山舊宅在道政坊􅀇宗以其隘陋更於親仁坊選寛爽之地出内庫錢更造宅焉勑所司窮其華麗不限功力財物堂皇院宇重復窈窱周匝誥曲戸牖交䟽髙臺臨池苑若天造帷帳幔幕充剏其中至九年八月禄山獻俘至京方命入此新宅春秋内事曰隂宅以日竒陽宅以月偶隂宅先内男子當令竒陽宅先内女子當令偶乃􅁻隂宅内男子三人陽宅内女子二人地鏡圖曰人}
