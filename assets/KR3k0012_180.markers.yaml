  - {type: variant, offset: 703, length: 1630, content: 美山去縣七百里下有石城高數丈遠望嵯峨靈闕騰空故老謂之神闕莊子中山公子牟謂瞻子曰身在滄海之上心居魏闕之下祭何瞻子曰重生重生則輕利中山公子曰雖知之未能自勝也瞻子曰不能自勝則從神無惡乎不能自勝而強不從者此之謂重陽重陽人無壽類矣魏文帝歌曰長安城西有雙員闕上有雙銅雀一鳴五穀生載鳴五谷熟王子年拾遺記曰崑崙第九層山形漸狹小下有芝田蕙囿皆有數百頃群仙種耨焉傍有瑤臺十二名廣千步皆五色玉為臺基最下層有流精闕直上四十丈有風雲雨師闕觀漢書成紀云孝成帝元太子也母曰王皇后帝在太子家生甲觀畫堂應劭注云甲觀在太子宮甲地主用乳生也顏師古曰畫堂但畫飾室中宮殿通有綵畫也又曰甘露二年幸萯陽宮在鄠屬玉觀屬玉水鳥似鵁鶄以名觀也後漢書曰丁鴻字孝公肅宗詔鴻與廣平王羨及諸儒樓望成封桓郁賈逵等論定五經同異於北宮白虎觀廣平王羨明帝子東觀記曰與太常樓望少府成封屯騎校尉桓郁衛士令賈逵等集義白虎門名於門立觀因以名焉使五官中郎將魏應主承制問難侍中淳于恭奏上帝親制臨決鴻以才論最明儒者稱之帝數嗟美焉時人歎曰殿中無雙丁孝公又章帝紀曰永平元年長水校尉儵奏言先帝大業當以時施行欲使諸儒共正經義頗令學者得以自助於是下太常將軍大夫愽士議郎郎官及諸王諸儒會白虎觀講議五經同異又曰時謂東觀為老氏藏室注老子為柱下史四方所記文書皆歸于柱下言東觀多經籍又曰高彪除郎中校書東觀後遷外黃令畫彪形像以勸學者又曰靈帝起四百尺觀於河帝道造萬金堂於西園又造南宮玉堂築廣城苑魏志曰明帝作凌霄觀始構有鵠巢其上侍中高堂隆曰起闕而鵠巢不得居之象又曰明帝置崇文觀徵善屬文者以充之吳志孫和傳云和為太子被廢驃騎將軍朱據尚書僕射屈晃率諸將吏泥首自縛連日詣闕請和權登白爵觀見甚惡之蜀志云李輔字玄政為牙門討破羗虜築平羗觀于秦亭晉書元紀曰太興元年十一月乙卯日夜出高三丈中有赤青珥詔曰天災譴誡所以彰朕之不德也群公卿士各上封事具陳得失無所諱將親覽焉新作聽訟觀又劉曜載記曰曜立太學於長樂宮東簡百姓年二十五已下十三已上五百人選朝賢宿儒明經篤學以教之命起酆明觀西宮建凌霄臺於滈池又曰石李龍載記云太子宣出時季龍於其後宮昇凌霄觀望之笑曰我家父子如是自非天崩地陷當復何愁但抱子弄孫日為樂耳又張駿傳云駿境內漸平使其將楊宣帥眾越流沙伐龜茲鄯善於是西域並降鄯善王元孟獻女號曰美人立賓遐觀以處之齊書王儉傳云宋明帝太始六年置總明觀以集學士或謂之東觀置東觀祭酒一人總明訪舉二人儒玄史四科科置學士十人其餘吏下各有差是歲省總明觀於儉宅開學士館以總明簿書充之陳書後主紀云帝令采木湘州擬造正寢栰至牛渚機盡沒既而漁人見栰於海上復起齊雲觀國人歌曰齊雲觀寇來無際畔後魏書高祖紀下云十五年五月議改律令於東明觀親折疑獄又道武帝紀云天興三年起紫極殿玄武樓風涼觀石池鹿苑臺又匈奴劉聰傳云平陽地震崇明觀陷為池水赤如血赤氣至天赤龍奮迅而去輿地志云丹陽郡建康縣臺城齊文惠太子治玄圃有明月觀婉轉橋俳徊廊囿內作淨名精舍又曰丹陽郡枺陵縣新亭隴有遠望樓又名勞勞樓末改為臨滄觀行人分別之所又曰洛陽有廣望觀閬風觀萬世觀脩靈觀臨啇觀百葉抄魏築總章觀建翔鳳於其上使八方才人六宮女尚書居之引穀水過九龍殿前玉井綺欄水轉百戲又曰石虎起靈臺九殿女官十有八等又女妓一千為鹵簿皆著紫綸巾熟錦袴金銀鏤帶五文織成靴遊於戲馬觀漢封禪儀泰山東南有山名日觀雞一鳴時見日始出長三丈秦觀者望見長安吳觀者望見會稽周觀者望見齊三輔黃圖云漢武帝起鳷鵲觀又起神明觀馺娑觀甘泉苑起仙人觀緣山谷行至雲陽三百八十里入右扶風周廻五百四十里又曰武帝起鳷鵲觀神明觀弩法觀集靈觀仙門觀陽祿觀漢宮殿名曰長安有臨山觀渭橋觀仙人觀霸昌觀蘭池觀平樂觀九華觀豫章觀鴻雀觀昆明觀走馬觀華光觀封巒觀走狗觀天梯觀瑤臺觀流渠觀相思觀長平觀宜春觀華池觀射熊觀迎風觀露寒觀當市觀石闕觀白渠觀鼎郊觀潘丘山闕中記云鼎郊觀在上林苑白虎觀懷德觀三雀觀林木觀溫德觀長平觀華延雋洛陽記曰洛陽城十八觀皆施玄檻鐵籠䟽雲母愰華山記曰南嶺東巖北面有二小山一山有雙石豎立號曰石門一山孤崖特秀上有客觀陟之者遠眺千里阮勝之楊州記云楊子, SBCK: ''}
