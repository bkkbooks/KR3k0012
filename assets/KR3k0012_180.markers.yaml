  - {type: variant, offset: 336, length: 2, content: 蓬萊, WYG: 魯恭王餘好治宫室苑囿壞孔子舊宅以廣其宫聞鍾磬琴瑟之聲遂不敢復壞於其壁中得古文經傳吳志曰周瑜與孫策同年相友善瑜推道南大宅以舍策升堂拜母有無通共晉書曰裴楷性寛厚與物無忤不持儉素每遊榮貴輒取其珍玩雖車馬器服宿昔之間便以施諸窮乏嘗營别宅基搆甚麗與兄共遊行牀帳儼然櫺軒疎朗兄心甚願之而口不言也楷心知其意便使住之又曰杜后母裴氏為廣德縣君裴氏名穆長水校尉綽孫太傅主簿遐女太尉王夷甫外孫中表之美髙於當世遐隨東海王越遇害無子唯穆渡江遂享榮慶立第南掖門外民所謂杜老宅云又曰有奏王公國家京城不宜有田宅未暇作諸國邸當使有往來之處今限京師得有宅一所齊書曰劉繪字士章彭城人也太常峻弟父勔宋末權貴門多人客解褐著作郎太祖每歎曰劉公為不亡矣繪聰警善𨽻書為竟陵王後進賓客時張融周顒並有言工融音㫖緩韻顒辭致綺健繪之言吐頓挫有風氣時人為語曰劉繪貼宅别開一門言在二家之中也又朝野為語曰三人共宅夾清漳張南周北劉中央言處二人間王隠晉書曰魏舒字陽元幼喪父母為外家寗氏所養寗氏起宅相者云當出貴外甥外祖父母以盛氏甥小而魏為應相也舒曰當為外家成此宅相後為司徒又曰上黨鮑瑗家多喪禍貧苦淳于智卜之卦成謂曰為君安宅者女子工耶曰是也又曰此人已死耶曰然智曰此人安宅失宜既害其身又令君不利君舍東北有大桑樹君徑入市門數十步當有一人折新馬鞭者便就請買還懸此樹三年當得物瑗承言詣市果得馬鞭懸之三年後浚井中得十萬銅錢雜器復可二十餘萬於是家業用展病者亦愈晉書曰孔愉營山隂湖南侯山下數畆地為宅草屋數間便棄官居之俸資數百萬悉無所取又曰桓𤣥得志常欲以謝安宅為營謝混曰召伯之仁猶惠及甘棠文靜之德更不保五畆宅耶𤣥聞慚而止宋書曰初大杜西空地吳時丁奉宅孫皓流徙其家晉有江左初為周顗蘇峻宅其後為袁眞宅又為章武王司馬秀宅皆㓙敗後給臧壽亦頻遇喪禍故世稱惡地王僧綽常以正達自居謂宅無吉凶請為第始築未居而敗又顔延之傳曰子峻既貴重權傾一朝凡所資供延之無所受器服不改宅宇如舊見峻起宅謂曰善為之無令人笑汝拙也齊書曰齊世祖武皇帝諱􅄨字龍逺太祖長子也小字龍兒生於建康清溪宅其夜陳孝后劉昭后夢龍據屋上故字之焉梁書曰髙祖宋大明八年甲辰生於秣陵縣同夏里三橋宅後魏書曰就德興反於營州使尚書盧同往討之大敗而返屬侍中穆紹與元順侍坐因論同之罪同先有近宅借紹頗欲焉元順勃然曰盧同終將無罪太后曰何得如侍中之言順曰有好宅與要勢侍中豈慮罪也紹慚不復敢言又邢巒傳曰孝文因行藥至司空府南見巒宅謂巒曰朝行藥至此見卿宅乃住東望德館情有依然巒對曰陛下移構中京}
