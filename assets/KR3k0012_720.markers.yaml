  - {type: variant, offset: 50, length: 3, content: 粉漢書, SBCK: 疾㝷常飲食每令得所多飡今人彭亨短氣或致􅁀疾夏至秋分少食肥膩餅臛之屬此物與酒食􅀲果相妨當時不必習病入秋節變陽消隂息寒氣惣至多諸􅁀卒良由渉夏取冷大過飲食不節故也而不逹者皆以病至之日便謂是受病之始而不知其所由來者漸矣豈不惑哉養生要}
