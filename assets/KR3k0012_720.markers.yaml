  - {type: variant, offset: 23, length: 1, content: 粉, SBCK: 底音止以露其體湫集也底滯也露羸也宣之則血氣集滯而躰嬴露兹心不爽而昏亂百度兹此也爽明也百度百事之節老子養生要訣曰一人之身一國之象􅎍臆之設猶宫室也支體之位猶郊境也骨節之分猶百川也腠七搆切理之間猶四衢也神猶君也血猶臣也氣猶民也故志人能理其身亦猶明君能治其國夫愛其民所以安其國愛其氣所以全其身民弊即國亡氣衰即身謝是以志人上士當施醫於未病之間不追修施於旣敗之後故知國難保而易䘮氣難清而易濁審機權可以安社稷制嗜慾可以保性命若能攝生}
  - {type: page-break, offset: 23, content: '', id: KR3k0012_SBCK_720-1b}
  - {type: variant, offset: 23, length: 1, content: 粉, WYG: 底音止以露其體湫集也底滯也露嬴也宣之則血氣集滯而體嬴露兹心不爽而昏亂百度兹此也爽明也百度事物之節老子養生要訣曰一人之身一國之象胷臆之設猶宫室也肢體之位猶郊境也骨節之分猶百川也腠理之間猶四衢也神猶君也血猶臣也氣猶民也故至人能理其身亦猶人君能治其國夫愛其民所以安其國愛其氣所以全其身民弊即國亡氣衰即身謝是以志人上士當施醫於未病之先不追修施於既敗之後故知國難保而易喪氣難清而易濁審機權可以安社稷制嗜慾可以保性命若能攝生}
