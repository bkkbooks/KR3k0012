  - {type: variant, offset: 38, length: 3, content: 禹造粉, WYG: 善養生若牧羊視其後者而鞭之周威公曰何謂曰魯有單豹者巖居而谷飲不與民共利行年七十而猶有嬰兒之色不幸遇餓虎殺而食之有張毅者髙門懸薄無不走也行年四十而有内熱之病以死豹養其内而虎食其外毅養其外而病攻其内此二子者皆不鞭其後者也夫守一方之事至於過理者不及於㑹通之適也鞭其後者去其不及也又曰養形必先之以物物有餘而形不養者有之矣有生必先無離形形不離而生亡者有之矣其來不能却其去不能止也悲夫世之人以為養形足以存生而養形果不足以存生則世奚足為哉文子曰太上養神其次養形神清意平百節皆寧養生之本也肥肌膚充腹腸開嗜欲養生之末也韓子曰神不注於外則身全身全之謂得得者得身也吕氏春秋曰凡生之長也順之也使生不順者欲也故聖人必先適欲室大則多隂臺髙則多陽多隂則蹷多陽則痿蹷也逆寒病也痿蹷不能行此隂陽不適之患也是故先王不處大室不為高臺味不衆珎衣不燀熱燀熱則理塞理塞則氣不達味衆珎則胃充胃充則中大鞔中大鞔則氣不逹以此求長生其可得乎昔先王之為苑囿園池也足以觀望勞形而已矣其為宫室臺榭也足以辟燥備濕而已矣其為輿馬衣裘也足以逸身煖骸而已矣其為飲食酏醴也足以適味充虛而已矣其為聲色音樂也足以安性自娱而已矣此五者之所以養性也非好儉而惡費也節于性也又曰天生隂陽濕燥寒暑四時之化萬物之變莫不爲利莫不為害聖人察之以便生故精神安乎形而年夀長焉長也者非短而續也畢其數也畢數之務在去乎害何謂去害大甘大酸大苦大辛大醎五者充形則生害矣大喜大怒大憂大恐大哀五者接神則生害矣大寒大熱大燥大濕大風大霧六者動精則生害矣諸言大皆謂過制故凡養生莫若知本則疾無由至矣又曰湯問伊尹曰欲取天下若何伊尹曰欲取天下天下可取身将先取身先為天下所取也凡事之本必先治身嗇其大寳大寳身也用其新棄其陳湊理遂通精氣日新邪氣盡去反其天年此之謂真人昔先聖王成其身而天下成治其身而天下治故善響者不於響於聲善景者不於景於形為天下者不於天下而於身詩曰淑人君子其儀不忒其儀不忒正是四國言正諸身也淮南子曰君子行正氣不行邪氣内便於性外合於義循理而動不繫於物者正氣也溺於滋味淫於聲色發於喜怒不顧後患者邪氣也邪與正相傷欲與性相害不可兩立一植一廢故聖人損欲而從事於性凢治身養性節寢處適飲食和喜怒便動静而邪氣自不生豈若憂瘕疵之興痤疽之發而豫之哉又曰今萬物之來擢拔吾性􅠡取吾精勢若泉源雖欲勿受庸可得乎今夫樹木灌以潦水疇以肥壤十人養之一人拔之則必無餘蘖况以一國同伐雖欲久生豈可得哉今盆水在廷清之終日未能見眉睫濁之不過一撓而不能察方員人神易濁而難清猶盆之類也又曰夫水之性清而沙土汨之人之性安而嗜慾亂之夫人之所受於性者耳目之於聲色也鼻口之於芳臭也肌膚之於寒煖也其情一也或通於神明或不免於癡狂者何也其所以為制者異也是故神智之淵也神清則智明智心之府也智公則心平人莫鑒於沬雨而鑒於止水者以其静也莫窺於生鐵而窺於明鏡者以其易也夫惟易且静故能形物之情性由此觀之神智之為用大矣是故虛室生白吉祥呈焉又曰至人守度循軌不變其宜不易其常直惟修繩曲因其當喜怒者道之邪悲憂者徳之失好憎者心之過愛惡者性之累夫大怒破隂大喜墜陽薄氣發揚驚怖為狂悲憂多病乃積成好憎繁禍乃相隨愛惡深偏乃自至故心無喜怒道之正也心無悲憂徳之至也好憎不形虛之至也無所愛惡平之至也能此數者則通於神明通於神明者得其内者也抱朴子内篇曰夫大元之山難知易求不髙不下不伸不沉絶險綿邈崔巍﨑嶇和氣絪緼童叟並遊玉井泓瑩灌溉莫休百二十官曹府相由艮坎列位𤣥芝萬採綘樹特生其實如珠金玉嵯峨醴泉出隅還年之玉井其清流子能脩之松喬同儔此一山也長谷之山杳杳巍巍𤣥靈飄飄玉屑霏霏金池紫房在手其隈愚人競往至則皆歸有道志士登之不哀抹服黄精以至天飛此二山也古賢之所為深於思也又曰凡養生者欲令多聞而博見而擇善徧修一事不足頼也又患好事之徒各矜其所長知𤣥素之術者則曰帷房中可以度世矣明吐納之道者則曰惟行氣還以延夀矣知屈伸之法者則曰惟導引可以老矣知草木之方者則曰惟田宅可以無窮矣學道之不能成就至偏枯之若此也又曰余祖鴻臚少時當為臨淄令云此縣有民家世夀者或出百嵗或八九十後其子孫轉多夭折他人居其故宅後亦累世夀考由此乃覺是宅之所為而不知者疑其井水殊乎乃試掘井左右得古人埋丹砂數十斛去井數尺此丹砂汁因泉漸入井是以飲其水而得夀况乃煉丹砂而服之乎又曰人亦有不病者各有所制攝生食不欲飽眠不欲扇星下不卧里語曰人在世間失一日如牽牛以詣屠所每進一歩死轉近也夫人九泉之下長夜㒺極始為螻蟻之根終與塵埃合體令人怛然心熱求生之心何可不至新論曰曲陽王根方七嵗欲與君惠從其學養生却老二術君惠曰龜鶴補三千嵗以人之才何乃不如蟲鳥耶白虎通曰男子乆閉房户所以常輔性命也㑹稽典録曰王充年漸七十嵗作養生之書凡十六篇養氣自守閉明塞聽愛精自輔服藥道引庶㡬復道劉根别傳曰取七嵗男齒女髪與已頭垢合燒復之一嵗則不知老常為之始老有以容也嵇康養生論曰養生有五難名利不㓕此一難也喜怒不除此二難也聲色不去此三難也滋味不絶此四難也神虛精散此五難也五者必存雖心希難老口誦至言咀嚼英華呼吸太陽不能不夭其年也五者無於胸中則信順日深𤣥徳日全不祈喜而自福不求夀而自延此養生大理所歸也又曰夫為稼於湯世偏有一溉之功者雖終歸於焦爛必一溉者後枯然則一溉之益固不可誣也而世常謂一怒不足以侵性一哀不足以傷身輕而肆之是猶不識一溉之益而望嘉穀於早苗者也是以君子知形恃神以立神須形以存悟生理之易失知一過之害生故修性以保神安心以全身愛憎不悽於情憂喜不留於心泊然無感而體氣和平又呼吸吐納服食輔養使形神相親表裏俱濟也夫種田者一畆十斛謂之良田此天下通稱也不知區種可百餘斛田種一也至於樹養不同則功収相懸謂商無十倍之價農無百斛之望此守常而不變者也且豆令人重榆令人瞑合歡蠲忿萱草忘憂愚智所知也薑辛害目豚魚不養世所識也虱處頭而黒麝食栢而香頸處險而癭齒居晉而黄推此而言凡所食之氣蒸性染身莫不相應豈惟蒸之使重而無使輕害之使闇而無使明薫之使黄而無使堅芬之使香而無使延哉神農曰上藥養命中藥養性者誠知性命之理因輔養以通也而世人不察惟五穀是嗜聲色是躭目惑𤣥黄耳務淫哇滋味煎其腑臟醴醪煮其腸胃香芳腐其骨髓喜怒悖其正氣思慮消其精神哀樂殃其平粹夫以蕞爾之軀攻之者非一途易竭之身而内外受敵身非木石其能久乎神仙傳曰彭祖云養夀之道但莫傷之而已夫冬温夏凉不失四時之和所以適身也美色淑姿安閑性樂不欣思慾之感所以通神也車服威儀知足無求所以一志也八音五色以養視聽之懽所以導心也凡此皆以養夀而不能斟酌之者反以速患古之智人恐不才之子不識事宜流遁不還破絶其源故經有上士别牀中士異被服藥百過不如獨卧色使目盲聲使耳聾味令口爽若能節其宜適抑揚其通塞者不减年算而得其益凡此之類譬猶水火可否失適反為害耳人不知其經脈損傷血氣不足肉骨空疎髓腦不實體已先病故為外物所犯因風寒酒色以發之耳若本充實豈有病乎凡逺思强健傷人憂過悲哀傷人喜樂過量傷人忿怒不解傷人汲汲所願傷人戚戚所患傷人寒煖失節傷人隂陽不交傷人人所傷者甚衆而獨責房室不亦惑哉男女相成猶天地相生也所以道養神氣使人不失其和天地得交接之道故無終竟之限人失交接之道故有殘折之期能避衆傷之事得隂陽之術則不死之道也天地晝離而夜合一嵗三百六十交精氣和合者有四時故能生育萬物不知窮極人能則之可以長存次則有服氣得其道則邪氣不能入治身之本要也其餘厯藏導引之術及念體中萬神有含影中形之事不干心志也人能愛精養體服氣錬神則萬神自守其不然者營衛枯疲萬神自逝非思念所留者也魏志曰吴普常問道於華佗佗謂普曰體欲勞動但不當使極耳如搖動則穀氣易消血脈流通病不得生譬猶戸樞不蠧流水不腐以其常動故也是以仙者及漢時有君士倩為導引之事熊經鳥顧引挽腰體動諸闗節以求難老吾有術一名五禽之戱汝可行之一曰虎二曰鹿三曰熊四曰猨五曰鳥亦以除疾並利蹄足以當導引體中不快起作一禽之戯普施行之遂年九十餘}
