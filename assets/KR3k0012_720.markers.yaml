  - {type: variant, offset: 38, length: 3, content: 禹造粉, krp: 善養生若收羊視其後者而鞭之周威公曰何謂曰魯有單豹者巖居而谷飲不與民共利行年七十而猶有嬰兒之色不幸遇餓虎殺而食之有張毅者髙門懸薄無不走也行年四十而有内熱之病以死豹養其内而虎食其外毅養其外而病攻其内此二子者皆不鞭其後者夫守一方之事至於過理者不及於㑹通之適者鞭其後者去其不及耳又曰養形必先無物物有餘而形不養者有之矣有生必先無離形形離而生亡者有之矣其來不能却其去不能止也悲夫丗之人以爲養形足以存養形神清果不足以存生文子曰太上養神其次養形神清意平百節皆寕養生之本也肥肌膚充腹膓開嗜欲養生之末也淮南子同韓子曰神不注於外則身全身全之謂得得者得身也吕氏春秋曰凢生之長也順之也使生不順者欲也故聖人必先適欲適節也室大則多隂臺髙則多陽多隂則蹷多陽則痿蹷也逆寒疾也痿不能行此隂陽不適之患也是故先王不處大室不爲髙臺味不衆珎衣不燀之演切熱燀熱則理塞脉則閉結理塞則氣不逹味衆珎則胃充胃充則中大鞔音墜憊也中大鞔則氣不逹以此求長生其可得乎昔先聖王之爲苑囿園池也足以觀望勞形而己矣其爲宫室臺榭也足以辟燥備濕而巳矣其爲輿馬衣裘也足以逸身煖骸而巳矣其爲飲食􅋳音移醴也足以適味充虚而巳矣其爲聲色音樂也足以安性自娯而巳矣此五者之所以養性也非好儉而惡費也節于性也又曰天生隂陽寒暑燥濕四時之化萬物之變莫不爲利莫不爲害聖人察之以便生故精神安乎形而年壽長焉長也者非短而續之者也畢其數也畢數之務在去乎害何謂去害大甘大酸大苦大辛大醎五者充形則生害矣大喜大怒大憂大恐大哀五者接神則生害矣大寒大熱大燥大濕大風大霧六者動精則生害矣諸言大者皆謂過制故凢養生莫若知本知本則疾無由至矣又曰湯問伊尹曰欲取天下若何伊尹曰欲取天下天下可取身將先取身先爲天下所取也凢事之本必先治身嗇其大寳大寳身也用新弃其陳湊理遂通精氣日新邪氣盡去反其天年此之謂眞人昔先聖王成其身而天下成治其身而天下治故善響者不於響於聲善景者不於景於形爲天下者不於天下於身詩曰淑人君子其儀不忒其儀不忒正是四國言正諸身也故反道而身善矣行義而人善矣淮南子曰君子行正氣不行邪氣内便於性外合於義循理而動不繫於物而者正氣也推於滋味淫於聲色發於喜怒不頋後患者邪氣也邪與正相傷欲與性相害不可兩立一植一廢故聖人損欲而從事於性凡治身養性節寢處適飲食和喜怒便動静而邪氣自不生豈若憂瘕疪之興痤疽之廢而豫備之哉又曰今萬物之來擢抜吾性􅠡取吾精勢若泉原雖欲勿廪庸可得乎今夫樹木灌以潦水疇以肥壤十人養之一人拔之則必無餘蘖况以一國同伐之雖欲乆生豈可得哉今盆水在廷清之終日未能見眉睫濁之不過撓而不能察方貟人神易濁而難清猶盆水之類也又曰夫水之性清而沙土汩之人之性安而嗜慾亂之夫人之所受於性者耳目之於聲色也鼻口之於芳臭也肌膚之於寒煖也其情一也或通於神明或不免於癡狂者也其所以爲制者異也是故神者智之淵也神清則智明矣智心之府也智公則心平矣人莫鑒於洙泗而鑒於止水者以其静也莫窺於生鐵而窺於明鏡者以其易也夫惟易且静故能形物之情性由此觀之用者也是故虚室生白吉祥止焉又曰聖人不變其冝不易其常放准修䋲曲因其當夫喜怒者道之邪悲憂者德之失好憎者心之過嗜慾者性之累夫大怒破隂大喜墜陽薄氣發瘖驚怖爲狂憂悲多悉病乃成積好憎繁多禍乃相隨故心不憂樂德之至也性而不變静之至也嗜欲不載虚之至也無所愛憎平之至也不與物散粹之至也能此五者則通於神明通於神明者得其内者也抱朴子内篇曰夫太元之山難知易求不天不地不沉不浮絶險𬗟邈崔巍﨑嶇和氣烟煴神童並遊玉井泓窈灌漑延休百二十官曹府相由离坎列位玄芝萬株絳樹特生其實如珠金玉嵯峨醴泉出隅還年之土甘其清流于能修之松喬同儔此一山也長谷之山杳杳巍巍玄靈飄飄玉液霏霏金紫之房在乎其隈愚人競徃至皆歸有道至士登之不衰採服黃精以致天飛此二山也古賢之所祕子思之又曰凢養生者欲令多聞而貴要博見而擇善偏修一事不足必頼也又患好事之徒各伏其所長知玄素之術者則曰唯房中之術可以度丗矣明吐納之道者則曰唯行氣足以延壽矣知屈伸之法者則曰唯導引可以難老矣知草木之方者則曰唯竒藥可以無窮矣學道之不能成就由乎偏枯之若此也又曰余祖鴻臚少時嘗爲臨沇令云此縣有民家丗壽考或出百歳或八九十後徙去子孫轉多夭折他人居其故宅後亦累丗壽考由此乃覺是宅之所爲而不知何疑其井水殊赤乃試掘井左右得古人理丹砂數十斛去井數尺此丹沙汁因泉漸入井是以飲其水而得壽况乃錬丹沙而服之乎又曰人亦有不病者各有所制攝生食不欲飽眠不欲扇星下不卧里語曰人在人間日失一日如牽牛以詣屠所毎進一歩去死轉近也夫入九泉之下長夜罔極始爲螻蟻之粮終與塵埃合體令人怛然心熱求生之志何可不營新論曰曲陽侯王根迎方士西門君惠從其學養生却老之術君惠曰龜鶴稱三千歳以人之才何乃不如蟲鳥耶白虎通曰男子六十閉房户所以輔衰故重性命也㑹稽典録曰王充年漸七十乃作養生之書凢十六篇養氣自守閉明塞聦愛精自輔服藥道引庶幾獲道劉根别傳曰取七歳男齒女髮與已頸垢合燒服之一歳則不知老常爲之使老有少容也嵇康養生論曰養生有五難名利不滅此一難也喜怒不除此二難也聲色不去此三難也滋味不絶此四難也神慮精散此五難也五者必存雖心希難老口誦至言咀嚼英華呼吸太陽不能不夭其年也五者無於胷中則信順日深玄德日全不祈喜而自福不求壽而自延此飬生大理所歸也又曰夫爲稼於陽丗偏有一漑之功者雖終歸於樵爛必一漑者後枯然則一漑之益固不可誣也而丗常謂一怒不足以侵性一哀不足以傷身輕而肆之是猶不識一漑之益而望嘉榖於旱苗者也是以君子知形恃神以立神湏形以存悟生理之易失知一過之害生故脩性以保神安心以全身受憎不捿於情憂喜不留於心泊然無感而體氣和平又呼吸吐納服食養身使形神相親表裏俱濟也夫種田者一畝十斛謂之良田此天下通稱也不知區種可百餘斛田種一也至於樹養不同則功収相懸謂啇無十倍之價農無百斛之望此守常而不變者也且豆令人重榆令人瞑合歡蠲忿萱草忘憂愚智所知也薫辛害同豚魚不養丗所識也虱處頭而黒麝食栢而香頸處險而癭齒居晉而黄推此而言凢所食之氣蒸性染身莫不相應豈惟蒸之使重而無使輕害之使闇而無使明薫之使黄而無使堅芬之使香而無使延哉故神農曰上藥飬命中藥養性者誠知性命之理因輔養以通也而丗人不察唯五糓是嗜聲色是躭目惑玄黄耳務淫哇滋味煎其腑臓醴醪煑其膓胃香芳腐其骨髓喜怒悖其正氣思慮消其精神哀樂殃其平粹夫以蕞尔之軀攻之者非一途易竭之身而内外受敵身非木石其能乆乎神仙傳曰彭祖云養壽之道但莫傷之而巳夫冬温夏凉不失四時之和所以適身也美色淑姿安閑性樂不致思欲之感所以通神也車服威儀知足無求所以一志也八音五色以養視聽之懽所以導心也凢此皆以養壽而不能斟酌之者反以速患古之智人恐下才之子不識事冝流遁不還故絶其源故經有上士别牀中士異𬒳服藥百過不如獨卧色使目盲聲使耳聾味令口爽言若能節宣其冝適抑楊其通塞者不减年筭而得其益凢此之類譬猶水火可否失適反爲害耳人不知其經脉損傷血氣不足肉理空踈髓腦不實體巳先病故爲外物所犯因風寒酒色以發之耳若本充實豈有病乎凢逺思強徤傷人憂愁悲哀傷人喜樂過量傷人忿怒不解傷人汲汲所願傷人戚戚所患傷人寒煖失節傷人隂陽不交傷人人所傷者甚衆而獨責房室不亦惑哉男女相成猶天地相生也所以道養神氣使人不失其和天地得交接之道故無終竟之限人失交接之道故有殘折之期能避衆傷之事得隂陽之術則不死之道也天地晝離而夜合一歳三百六十交精氣和合者有四故能生育萬物不知窮極人能則之可以長存次則有服氣得其道則邪氣不能入治身之夲要也其餘歷藏導引之術及念體中萬神有含影中形之事不然干心志也人能愛精養體服氣錬神則萬神自守其不然者營衛枯疲萬神自逝非思念所留者也魏志曰呉普嘗問道於華佗佗謂普曰人體欲得勞動但不當使極耳如揺動則糓氣易消血脉通流病不得生譬猶户樞不蠧流水不腐以其常動故也是以仙者及漢時有士君舊爲導引之事熊經鵄頋引挽腰體動諸關節以求難老吾有一術名五禽之戯汝可行之一曰虎二曰鹿三曰熊四曰猨五曰鳥亦以除疾並利蹄足以當導引體中不快起作一禽之戯普施行之遂年九十餘}
