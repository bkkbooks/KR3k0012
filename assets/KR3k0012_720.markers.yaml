  - {type: variant, offset: 32, length: 4, content: 著頰也墨, SBCK: 保和全眞當湏少思少念少􅀏少言少喜少怒少樂少愁少惡少好少事少機夫多思則神散多念則心勞多􅀏則臟腑上飜多言則氣海虚脫多喜則膀胱納客風多怒則腠理奔浮血多樂則心神邪蕩多愁則頭靣燋枯多好則氣智潰溢多惡則精爽奔騰多事則䈥脉乾急多機則智慮沉迷兹乃伐人之生甚於斤斧蝕人之性猛於犲狼無乆行無乆坐無乆立無乆卧無乆視無乆聽不飢強食則脾勞不渇強飲則胃脹體欲少勞食欲常少勞則勿過少勿令虚冬則朝勿虚夏則夜勿飽早起不在雞鳴前晚起不過日出後心内澄則眞人守其位氣内定則邪物去其身行欺詐則神悲行争競則神沮輕侮於人當減筭殺害於物必傷年行一善則䰟神歡搆一惡則魄神喜䰟神欲人生魄神欲人死常欲寛泰自居恬惔自守則神形安静災病不生仙録必書其名死籍必消其咎養生之理盡在此矣至於錬瓊丹而􅀘腦化金液以留神此上眞之妙道非食􅂖㗖血越分而修之萬人之中得者殊少􅀷可誡焉莊}
  - {type: page-break, offset: 32, content: '', id: KR3k0012_SBCK_720-2a}
  - {type: variant, offset: 32, length: 4, content: 著頰也墨, WYG: 保和全真當須少思少念少笑少言少喜少怒少樂少愁少惡少好少事少機夫多思則神散多念則心勞多笑則臟腑上翻多言則氣海虛脱多喜則膀胱納客風多怒則腠理奔浮血多樂則心神邪蕩多愁則頭面焦枯多好則氣智潰溢多惡則精爽奔騰多事則筋脈乾急多機則智慮沉迷兹乃伐人之生甚於斤斧蝕人之性猛於豺狼無久行無久坐無久立無久卧無久視無久聽不饑强食則脾勞不渇强飲則胃脹體欲常勞食欲常少勞勿令過少勿令虛冬則朝勿虛夏則夜勿飽早起不在雞鳴前晚起不過日出後心内澄則真人守其位氣内定則邪物去其身行欺詐則神悲行争競則神沮輕侮於人當减算殺害於物必傷年修一善則魂神歡除一惡則魄神喜魂神欲人生魄神欲人死常欲寛泰自居恬淡自守則神形安静災病不生仙録必書其名死籍必消其咎養生之理盡在此矣至於錬瓊丹而補腦化金液以留神此上真之妙道非食穀啗血越分而修之萬人之中得者殊少深可誡焉莊}
