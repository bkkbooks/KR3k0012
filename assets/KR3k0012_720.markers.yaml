  - {type: variant, offset: 276, length: 2, content: 問涉, SBCK: 俛或仰儉素亦聞􅀛能導引乃試隨􅀛所爲遂不復飢百餘日後人有偶窺塚中見儉而出之後竟能咽氣斷榖魏王拘置􅁟室中閑試之一年不食顔色恱澤氣力自若又曰尔乃咀吸寳華谷神太清外珎五耀内守九精修養雜訣曰老子云玄北之門是謂天地根綿綿若存用之不勤言口􅈹也天地之門以吐納隂陽生死之氣毎至旦靣向午展兩手於􅂰之上徐按􅎄百節口吐濁氣􅈹引清氣所以吐故納新是蹙氣良乆徐徐吐之仍以左右手上下前後柘取氣之時意想太和元氣下入毛際流於五臟四支皆受其潤如山納雲如地受澤若氣通則竟腹中咽咽轉動若得十通即竟身體潤澤而色光渙耳目聦明飲食有味氣力倍加諸疾去矣守九精法言曰生氣時牀鋪厚軟枕與身平仰卧展脚握固去身四五寸兩手亦去身四五寸微微􅈹引大陽清氣入意送此氣遍身體即閉氣至極然後細從口吐之勿令耳聞吐氣之聲也著生論曰大凢著生先調元氣身有四氣人多不明四氣之中各主生死一日乾元之氣化爲精精反爲氣精者連於神精益則神明精固則神暢神暢則生徤若精散則神疲精竭則神去神去則死二曰坤元之氣化爲血血復爲氣氣血者通於内血壯則體豐血固則顔盛顔盛則生合若血衰即髮變血敗則腦空腦空則死三曰庻氣庻氣者二元交氣氣化爲津津復爲氣氣運於生生託於氣隂陽動息滋潤形骸氣通即生氣乏則死四曰衆氣衆氣者榖氣也榖濟於生終誤於命食榖味雖生藴榖氣還死精能附血氣能附生常使循環即身永固乾元之陽陽居隂位臍下氣海是也坤元之隂隂居陽位腦中血海是也生者屬陽陽貫五臟喘息之氣是也死者屬隂隂納五味穢惡之氣是也氣}
