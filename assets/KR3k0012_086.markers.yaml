  - {type: variant, offset: 1675, length: 1996, content: 年以邵穆公為相秦仲為大夫誅西戎是時天大旱王以不雨遇災而懼整身修行欲以消去之祈于群神六月乃得雨大夫仍叔美而歌之今雲漢之詩是也是歲西戎殺秦仲王於是進用賢良樊仲山父尹吉父程伯休父虢文公申伯韓侯顯父南仲方叔仍叔邵穆公張仲之屬並為卿佐自厲王失政獫狁荊蠻交侵中國官政隳廢百姓離散王乃脩復宮室納規諫安集兆民命南仲邵虎方叔吉父並征定之復先王境土繕車徒興畋狩禮天下喜王化復行號稱中興墨子曰周宣王殺杜伯不辜杜伯曰死若有知三年必使君知之宣王田於圃田從人滿野日中杜伯乘白馬素車朱衣朱冠手執朱弓挾朱矢射王而中其心折脊伏弢而死從者莫不聞見幽王國語曰幽王之二年西周三川皆震伯陽父曰周將亡矣夫天地之氣不失其序若過其序民亂之也陽伏而不能出陰迫而不能蒸於是有地震今三川寔震陽失其所而鎮於陰也史記曰幽王得褒姒而篤愛之乃欲廢后并太子用褒姒為后以其子伯服為太子褒姒為人不好笑悅之萬方猶不笑幽王為烽燧火鼓寇至則舉烽火於是諸侯悉至至而無寇褒姒乃大笑幽王悅之為數舉烽火其後諸侯不信並不至幽王以虢石父為卿用事國人皆怨之石父為人佞巧善諛好利今王用之幽王之廢后去太子也申侯怒乃與繒西夷大戎共攻幽王王舉烽火徵兵兵莫至遂殺幽王驪山之下虜褒姒盡取周之財而去於是諸侯乃即申侯而共立故太子宜臼是為平王以奉周祀平王乃東徙洛邑避戎寇也幽王在位凡一十一年紀年曰幽王立褒姒之子伯盤以為太子瑣語曰宣王之元妃獻后生子不恒朞月而生后弗敢舉天子召問群王之元史史皆荅曰若男子也身體有不全諸骨節有不備者則可身體全骨節備不利於天子也將必喪邦天子曰若而不利余一人命棄之仲山父曰天子年長矣而未有子或者天將以是棄周雖棄之何益天子弗棄之平王史記曰平王之時王室微弱而諸侯以強并弱齊楚秦晉始大政由方伯五十一年平王崩太子泄父早死立其子林是為桓王桓王平王孫也帝王世紀曰平王元年鄭武公為司徒與晉文侯股肱周室夾輔平王率諸侯戮力一心東遷洛邑桓王史記曰桓王在位二十三年崩子莊王他立帝王世紀曰桓王既失於信禮義陵遲男子淫奔讒偽並作諸侯背叛構怨連禍九族不親故詩人刺之莊王史記曰莊王四年周公黑肩欲殺莊王而立王子克辛伯告王王殺周公王子克奔燕十五年莊王崩子僖王胡齊立僖王史記曰僖王三年齊桓公始霸五年僖王崩子惠王閬立帝王世紀曰僖王自即位以來變文武之制作玄黃華麗之飾宮室峻而奢侈故孔子譏焉五年王崩子涼洪代立惠王傳曰有神降於莘惠王問內史過曰是何故也對曰國興明神降之監其德也將亡神又降之觀其惡也故有得神以興亦有以亡虞夏商周皆有之史記曰初莊王嬖姬姚生子頹有寵及惠王即位奪其大臣蒍國之田以為囿故大夫邊伯等五人作亂謀召燕衛之師伐惠王惠王奔溫居鄭之櫟立僖王弟子頹為王遂享諸大夫樂及徧儛虢君怒四年鄭與虢君伐殺子頹復立惠王惠王在位二十五年崩子襄王鄭立襄王史記曰襄王母蚤死後母曰惠后后生叔帶有寵襄王畏之三年叔帶與戎翟謀伐襄王襄王欲誅叔帶叔帶奔齊齊桓公使管仲平戎于王十五年王以翟師伐鄭王德翟人將以其女為后富辰諫不聽十六年王絀翟后翟人來誅殺譚伯富辰曰吾數諫不從乃以其屬死之初惠后欲立王子帶故以其黨開翟翟人遂入周襄王出奔於鄭鄭居於汜子帶立為王取襄王所絀翟后與居溫十七年襄王乃告急於晉晉文納王而誅叔帶襄王於是賜晉文公秬鬯弓矢為伯以河內地與晉二十年晉文公又召襄王襄王會之河陽書曰天王狩于河陽三十二年襄王崩子頃王壬臣立頃王史記曰頃王六年崩子匡王班立匡王史記曰匡王六年崩弟瑜代立是為定王定王史記曰定王元年楚伐陸渾之戎次於洛使人問九鼎之重輕王使王孫滿應設以辭楚兵乃去二十一年定王崩子簡王夷代立簡王史記曰簡王十三年晉殺其君厲公迎子周於周立之為悼公十四年簡王崩子靈王泄心立靈王傳曰王子朝使告于諸侯曰定王六年秦人降祓曰周其有髭王亦克能脩其職至于靈王生而有髭王甚神聖無惡於諸侯國語曰靈王二十年穀雒鬥將毀王宮賈逵注曰穀雒二水合有似鬥洛在王城南穀在城北者王欲壅之太子晉諫曰不可晉聞古之長民者不隳山不崇藪不竇澤竇決也夫山土之聚也藪物之歸也川氣之導也澤水之鍾也天地成聚於高歸物於下䟽為川谷以導其氣陂塘汙原以鍾其美聚萬物合之美大也伯屬封崇九山決汨九川陂障九澤豐殖九原故天無伏陰地無散陽觀之詩書與民之憲言則皆亡王之為也王其圖之王卒壅之亂於是始史記曰靈王在位二十七年崩子景王貴立景王傳曰天王將鑄無射周景王也無射鍾名泠州鳩曰王其以心疾死乎泠樂官州鳩其名也夫樂天子之職職主也夫音樂之輿也樂因音而行而鍾音之器也音由器以發天子省風以作樂省風俗作樂以移之器以鍾之鍾聚之與以行之樂須音而行小者不窕窕細也他彫切大者不槬槬橫大不入也音畫則和於物物和則嘉成喜樂成也故和聲入於耳而和於心心僖則樂僖安也窕則不咸不充滿人心大則不容心不堪容心是以感感實生疾今鍾摦矣王心弗堪其能久父乎史記曰景王太子聖而早卒王愛子朝欲立之會崩子丐之黨與爭立國人立長子猛為王子朝攻殺猛猛為悼王晉人攻子朝而立丐是為敬王