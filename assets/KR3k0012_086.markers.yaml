  - {type: variant, offset: 3764, length: 720, content: 年三晉滅智伯分其地二十八年崩子去疾立是為哀王皇甫謐曰貞定王哀王帝王世紀曰哀王即位三月弟叔襲殺王而立是為思王思王帝王世紀曰思王即位五月弟隗攻殺王而代立是為考哲王考王史記曰考王十五年崩子威烈王午立威烈王帝王世紀曰威烈王崩子躭立是為元安王安王史記曰安王立二十六年而崩子烈王喜代立帝王世紀曰安王子喜立是為烈王烈王史記曰烈王十年崩弟扁立是為顯王顯王史記曰顯王三十五年致文武昨於秦惠王四十四年秦惠王稱王其後諸侯皆為王四十八年顯王崩子慎王定立帝王世紀曰顯王元年趙成侯韓哀侯來攻周二年西周威公之嗣曰惠公始封惠公少子班於鞏以奉王是為東周惠公周於是始分為東西王微弱政在西周慎靚王帝王世紀曰慎靚王六年崩子延代立是為𧹞王赧王史記曰東西周分治赧王徙都西周五十九年秦攻西周王奔秦頓首受罪盡獻其邑三十六口三十萬秦受其獻而歸其君於周周王赧卒周民遂東亡秦取九鼎寶器而遷西周公於𢠸音憚狐後七歲秦莊襄王滅東西周皆入於秦周既不祀既盡也漢書曰幽平之後日以陵夷至乎崎嶇河洛之間分為二周然天下謂之共主雖後微弱猶云以為主強大弗之敢傾歷載八百餘年數極德盡暨於𧹞王降為庶人號位以絕於天下尚枝葉相持莫得居其虛位四海亡主三十餘年帝王世紀曰𧹞王二十七年冬十月秦昭襄王仍僣號西帝齊閔王稱東帝十一月齊各復去帝號為王四十五年王如秦得罪於秦秦攻周或說秦王乃止王雖居天子之位為諸侯之所侵逼與家人無異多貰於民無以歸之乃上臺以避之故周人因名其臺曰逃債之臺洛陽南宮謻臺謻音夷又音尸移切是也五十九年秦攻韓魏趙大破之王懼乃背秦與諸侯合從將天下銳師出伊門攻秦秦昭襄王大怒使將軍摎音虬攻周王王恐乃入秦頓首受罪盡獻其邑秦盡納其獻使赧王歸于周降為庶人以壽終王逸正部曰幽厲禮樂崩壞諸侯力政轉相吞滅德不能懷威不能制至於王赧遂喪王計, SBCK: ''}
