  - {type: variant, offset: 22, length: 0, content: '', krp: 九年以歲所在紀之孝文王史記曰孝文王元年赦罪人脩先王功臣褒厚親戚文王除䘮十月己亥即位三日辛丑卒子莊襄王立莊襄王史記曰莊襄王元年大赦罪人脩先王之功臣施德厚骨肉而布惠於民東周君與諸侯謀秦秦使相國吕不韋誅之盡入其國以陽人之地賜周君奉其祭祀四年莊襄王卒子政立始皇帝河圖曰秦帝名政虎口日角大目隆鼻長八尺六寸大七圍手握兵執矢名祖龍尚書考靈耀曰秦失金鏡宋均注曰金鏡喻明道也魚目入珠言僞亂眞也莊襄王納吕不韋之妻生始皇也古文竒字曰秦改古文以爲大篆及隷字國人多誹謗怨恨秦苦天下不從而召諸生到者拜爲郎凡七百人又宻冬月種瓜於驪山硎谷之中温處瓜實成乃使人上書曰瓜冬有實有詔下博士諸生說之人人各異說則皆使往視之而爲伏機諸生賢儒皆至焉方相難不能决因發機從上填之以土皆壓死史記曰莊襄王爲秦質子於趙見吕不韋姬恱而取之生始皇帝始皇以秦昭王四十八年正月生於邯鄲及生名爲政姓趙氏年十三歳莊襄王死政代立爲秦王十年大梁人尉繚來說秦王曰以秦之強視諸侯譬如郡縣之君臣但恐諸侯合從而岀不意此乃智伯夫差湣王所以亡也願大王無愛財物賂其豪臣以乱其謀不過亡四十萬金則諸侯可盡王從其計見尉繚抗禮衣服食飲與繚同繚曰秦王爲人蜂凖長目鷙鳥膺豺聲少恩而虎狼心居約易出人下得志亦輕食人我布衣然見我常身自下我使秦王得志於天下天下皆爲虜矣不可與乆遊乃亡去秦王覺固止爲秦國尉卒用其計䇿二十六年秦𥘉并天下廷尉斯等與博士議曰有天皇有地皇有人皇人皇最貴臣等昧死上尊號王爲秦皇命爲制令爲詔天子自稱爲朕王曰去秦著皇採上古帝王位號號曰皇帝他如議制曰朕聞太古有號死而以行爲謚如此則子議父臣議君甚無謂朕弗取自今以來除謚法朕爲始皇帝後丗以計數二丗三丗至於萬丗傳之無窮始皇推終始五徳之傳音亭傳之傳也以爲周得火德秦代周德從所不勝方今水德之始改年始朝賀皆自十月朔衣服旄旌節旗皆上黒數以六爲紀符法冠皆六寸而轝六尺六尺爲歩乗六馬更名河曰德水以爲水德之始剛毅戾深事皆決於法分天下之國以爲三十六郡郡置守尉監更命民曰黔首大酺收天下兵聚之於咸陽銷以爲鍾鐻鑄爲金人十二重各千石置宫庭中一法度衡石丈尺車同軌書同文字地東至海暨朝鮮西至臨洮羌中南至北向戸北據河爲塞並隂山至遼東徙天下豪冨於咸陽十二萬戸諸廟及章臺上林皆在渭南秦毎破諸侯冩放其宫室作之咸陽北阪二曰臨渭自雍門以東至涇渭殿屋複道周閤相屬所得諸美人鍾鼓以充入之二十七年始皇廵隴西北地出雞頭山過回中作長信宫渭南巳來更命宫爲極廟象天極廟道通驪山上作甘泉前殿築甬道自咸陽屬之二十八年始皇東行郡縣上鄒嶧山立石與魯諸儒生刻石頌秦徳議封禪望祭山川之事乃遂上太山立石封祠祀禪梁父刻所立石乃並渤海以東過黄腄窮成山登之罘立石頌素徳而去南登琅邪大樂之留三月徙黔首三萬戸琅邪臺下復十二歲作琅邪臺立石頌秦徳二十九年始皇東遊至陽武博浪沙中爲盗所驚求弗得乃令天下大索十日三十一年始皇爲微行咸陽與武士四人俱夜出逢盗蘭池見窘武士擊殺盗三十二年始皇之碣石使燕人盧生求羡門髙誓刻碣石門盧生使入海還以鬼神事因奏録圖書曰亡秦者胡也始皇乃使將軍蒙恬發兵三十萬人北擊胡略取河南地三十三年略取陸梁地爲桂林象郡南海西北斥逐匈奴自榆中並河以東屬之隂山以爲三十四縣城河上爲塞又使䝉恬渡河取髙闕陶山北假中北假地名築亭鄣以逐戎人三十四年丞相斯議曰臣請史官非秦記燒之天下敢有藏詩書百家語者悉詣守尉雜燒之有敢偶語詩書棄市以古非今者族吏見不舉與之同罪諸有文學之書蠲除之令下三十日不燒黥爲城旦所不去者醫藥卜筮種樹之書若有學法令以吏爲師三十五年乃營作朝宮渭南北上林苑中先作前殿阿房東西五百歩南北五十丈上可坐萬人下可建五丈旌旗周馳爲閣道自殿下直抵南山表南山之巔以爲闕爲複道自阿房渡渭屬之咸陽以象天極閣道絶漢抵營室也立石東海上朐界中以爲秦東門因徙三萬家驪邑五萬家雲陽皆復不事乃令咸陽之旁二百里内宫觀二百七十複道甬道相連帷帳鍾鼔羙人充之各寒暑不移徙所幸有言其處者罪死始皇帝幸梁山宫從山上見丞相車騎衆不善也中人或告丞相丞相後損車騎始皇怒曰此中人泄吾語案問莫服當是時詔捕諸時在旁者皆殺之自是後莫知行之所在聽事群臣受決事悉於咸陽宫長子扶蘇諌曰天下𥘉定逺方黔首未集諸生皆誦法孔子今皆重法繩之臣恐天下不安唯上察之始皇怒使扶蘇北監蒙恬於上郡三十七年始皇出遊左丞相斯從右丞相去疾守少子胡亥愛慕請從始皇許之十一月行至雲夢望祀虞舜於九疑浮江下觀蘇柯渡梅渚過丹陽至錢塘浙江水波惡乃西百二十里從狹中渡上㑹稽祭大禹望于南海而立石刻頌秦德還過吴從江乗渡並海上北至琅邪方士徐福等入海求神藥數歲不得費多恐譴乃詐曰蓬萊藥可得然常爲大鮫魚之所害故不得至願請善射與俱見則以連弩射之始皇夢與海神戰如人狀以問占夢博士曰水神不可見以大魚蛟龍爲候今上禱祠備謹而有此惡神當除去而善神可致乃命入海者賫捕巨魚具而自以連弩候大魚出射之自琅邪北至營成山弗見至之罦見巨魚遂並海至平津而病始皇惡言死群臣莫敢言死事上病益甚乃爲璽書賜公子扶蘇曰與䘮㑹咸陽而葬書巳封在中車府令趙髙行符璽事所未授使者七月丙寅始皇崩於沙丘平臺時年五十在位三十七年丞相斯爲上崩在外恐諸公子及天下有變乃祕之不發䘮棺載輼輬車中故幸宦者叅乗所至上食百官奏事如故宦者輙從輼輬車中可其奏事獨子胡亥趙髙及幸宦者五六人知上死趙髙故嘗教胡亥書及獄律令法事胡亥私幸之髙乃與胡亥丞相斯隂謀破去始皇所封書賜公子扶蘇者而更詐爲丞相斯受始皇遺詔沙丘立子胡亥以爲太子乃更爲書賜公子扶蘇蒙恬數以罪賜死遂從井陘抵九原㑹暑上輼輬車臭乃詔從官令車載一石鮑魚以亂其臭行從直道至咸陽發䘮太子胡亥襲位漢書曰秦據勢勝之地騁狙詐之兵蠶食山東一切取勝因矜其所習自任私智姍笑三代蕩滅古法竊自號爲皇帝而子弟爲疋夫内亡骨肉夲根之輔外亡尺土蕃翼之衛吴陳奮其白挺劉項隨而斃之又曰秦始皇即位三十九年内平六國外攘四夷死人如麻暴骨長城之下頭顱相屬於道不一日而無兵又曰賈山借秦爲諭名曰至言其辭曰始皇貴爲天子冨有天下賦歛重數百姓罷弊赭衣半道群盗滿山使天下之人載目而視傾耳而聽離宫三百鍾鼓不移而具爲宫室之麗如此使其後世曽不得聚廬而託處焉爲馳道於天下東窮燕齊南極吴楚厚築其外隠以金椎樹以青松爲馳道之麗如此使其後世曽不得邪徑而託足焉葬乎驪山銅錮其内漆塗其外中城遊觀上成山林爲葬埋之侈如此使其後世曽不得蓬顆蔽塚而託葬焉秦以熊羆之力虎狼之心蠶食諸侯并吞海内而不篤禮義故天殃巳加矣異苑曰秦世有謡云秦始皇奄僵開吾户據吾牀飲吾酒唾吾漿飡吾飲以爲糧張吾弓射東牆前至沙丘當滅亡始皇旣坑儒焚典乃發孔子墓欲取諸經傳壙旣啓於是悉如謡者之言又言謡文刋在塚壁政甚惡之及逹沙丘而脩別路見一群小兒輦沙爲阜問云沙丘從此得病淮南子曰秦之時髙爲臺榭大爲苑囿造馳道數千里鑄金人發邊戍入芻藁頭㑹箕歛輸於少府丁壯丈夫西至臨洮狄道東至㑹稽浮石南至象郡桂林北至飛狐陽原道路死人以溝量當此之時有忠諌者謂之不祥道仁義者謂之狂桓譚新語曰秦始皇見周室失統自以當保有九州見萬民碌碌猶群羊聚猪皆可以竿而駈之故遂以敗也二世皇帝史記曰二世皇帝元年年二十一趙髙爲郎中令任用事徴材士五萬人爲屯衛咸陽令教射狗馬禽獸用法益刻深七月戍卒陳勝等反二年冬陳渉所遣周章等西至戯兵數十萬二世大驚夢白虎齧其左驂馬殺之心不樂恠問占夢卜曰涇水爲祟二世乃齋於望夷宮欲祠涇水沉四白馬使使責讓髙以盗賊事髙懼乃隂與其壻咸陽令閻樂其第趙成謀使郎中令爲内應詐爲有大賊遣樂將吏卒千餘人至望夷宫郎中令與樂俱入射上幄坐幃二世怒召左右左右皆惶擾不闘旁有宦者一人侍不敢去二世入內謂曰何不早告我宦者曰臣不敢言故得全使臣早言皆巳誅安得至今閻樂前即二世數曰足下驕恣誅殺無道天下共叛足下其自爲計二世曰丞相可得見不樂曰不可二世曰吾願得一郡爲王弗許又曰願爲萬户侯弗許又日願與妻子爲黔首比諸公子樂曰臣受命於丞相爲天下誅足下足下雖多言臣不敢報麾其兵進二世自殺閻樂歸報趙髙趙髙乃悉召諸大臣公子告以誅二世之狀曰秦故王國始皇君天下故稱帝今六國復自立秦地益小乃以空名爲帝不可冝爲王如故便立二世之兄子公子嬰爲秦王以黔首葬二世杜南冝春苑中在位三年秦王子嬰史記曰趙髙令子嬰齋當廟見受玉璽齋五日子嬰與其子二人謀稱疾不行髙果自往曰宗廟重事王奈何不行子嬰遂刺殺趙髙於齋宫夷三族以狥咸陽子嬰爲秦王四十六日楚將沛公破秦軍入武關遂至霸上使人約降子嬰子嬰即係頸以組白馬素車奉天子之璽符降軹道旁項籍爲從長殺子嬰及秦諸公子宗族史記太史公曰始皇自以爲功過五帝地廣三皇而羞與之侔善哉賈生推言之曰秦并兼諸侯繕津關據險塞脩甲兵而守之陳渉以戍卒散亂之衆數百奮臂大呼不用弓㦸之兵鉏櫌白挺擾田噐也音憂望屋而食横行天下秦人阻險不守關梁不闔長㦸不刺強弩不射楚師深入戰於鴻門曽無藩籬之艱當此時也世非無深慮知化之士也然不敢盡忠拂過者秦俗多忌諱之禁忠言未卒於口而身爲戮殁矣故天下之士傾耳而聽重足而立拑口而不言是以三主失道忠臣不敢諌智士不敢謀天下巳亂姦不上聞豈不哀哉秦王纉六世之餘烈振長筴而御宇内吞二周而亡諸侯履至尊而制六合執捶拊拊拍音府以鞭笞天下威振四海南取百越之地以爲桂林象郡乃使蒙恬北築長城而守藩籬却匈奴七百餘里胡人不敢南下而牧馬士不敢彎弓而報怨於是廢先王之道焚百家之言以愚黔首墮名城殺豪俊收天下之兵聚之咸陽銷鋒鏑鑄以爲金人十二以弱黔首之民然後塹華爲城因河爲津據億丈之城臨不測之谿以爲固良將勁弩守要害之處信臣精卒陳利兵而誰何何問之也天下巳定秦王之心自以爲關中之固金城千里子孫帝王萬丗之業也秦王旣没陳渉斬木爲兵掲竿爲旗天下雲集而響應羸糧而影從山東豪俊遂並起而亡秦族矣然秦以區區之地千乗之權招八州而朝同列百有}
