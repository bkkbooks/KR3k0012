  - {type: variant, offset: 16, length: 4, content: 安寧刑措, SBCK: 無主}
  - {type: variant, offset: 16, length: 4, content: 安寧刑措, WYG: 不從而召諸生到者拜為郎凡七百人又宻令冬月種𤓰於驪山硎谷之中温處𤓰實成乃使人上書曰𤓰冬有實有詔天下博士諸生說之人人各異說則皆使徃視之而為伏機諸生賢儒皆至焉方相難不能决因發機從上填之以土史記曰莊襄王為秦質子於趙見吕不韋姬悅而取之生始皇帝以秦昭王}
