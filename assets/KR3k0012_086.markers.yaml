  - {type: variant, offset: 10, length: 1, content: 成, SBCK: 王}
  - {type: variant, offset: 10, length: 2, content: 成康, WYG: 孝文王元年赦罪人脩先王功臣褒厚親戚弛苑囿孝文王除喪十月己亥即位三日辛丑卒莊襄王立莊襄王史記曰莊襄王元年大赦罪人修先王功臣施德厚骨肉而布惠於民東周公與諸侯謀秦秦使相國吕不韋誅}
  - {type: variant, offset: 10, length: 1, content: 成, krp: 王}
  - {type: variant, offset: 11, length: 1, content: 康, SBCK: 赧}
  - {type: variant, offset: 11, length: 1, content: 康, krp: 赧}
  - {type: variant, offset: 12, length: 1, content: 之, SBCK: 卒}
  - {type: variant, offset: 12, length: 1, content: 之, krp: 卒}
  - {type: variant, offset: 13, length: 1, content: 際, SBCK: 後}
  - {type: variant, offset: 13, length: 1, content: 際, WYG: 盡入其國以陽人之地賜周君奉其祭祀四年莊襄王卒子政立始皇帝河圖曰秦始皇帝名政虎口日角大目隆鼻長八尺六寸大七圍手握兵執矢名祖龍尚書考靈耀曰秦失金鏡宋均注曰金鏡喻明道也魚目入珠言偽亂直也莊襄王納吕不韋之妻生始皇也古文竒字曰秦改古文以為大篆及𨽻字國人多誹謗怨恨秦苦}
