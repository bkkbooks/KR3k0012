  - {type: variant, offset: 541, length: 928, content: 道衰微王將征犬戎祭公謀父諫不可王遂征之得四白狼四白鹿以歸自是荒服者不至諸侯有不睦者甫候言於王作脩刑辟命曰甫刑穆王立五十五年年一百五歲而崩子恭王翳扈立穆天子傳曰天子北征乃絕漳水郭璞注曰絕猶截也水今在鄴縣也於是即井鈃山之下即井鈃山也今在常山石邑縣鈃音刑癸未雨雪天子獵于鈃山之西河河山足坡乃至于崑崙之丘以觀春山之寶乃披圖視典用觀天子之寶器肖河所出禮圖玉果石似美玉所謂如果者也璿珠璿玉類也音琁燭銀有精光如燭也黃金之膏金膏亦猶玉膏皆其精汋宿於崑崙之阿赤水之陽崑崙山有赤水東北流見山海經也升于崑崙之丘以觀黃帝之宮黃帝巡遊四海登崑崙山而起宮室其上見新涪也天子北征舍乎珠澤此澤出珠乃因名之今越舊乎舊出青海北昇于舂山之上以望四野曰春山是惟天下之高山者也癸丑天子乃遂西征吉日甲子天子賓于西王母西王母如人虎齒蓬髮載勝善嘯紀年曰穆王十七年西征于崑崙之丘見西王母其年辛丑來賓于昭宮乃執白珪玄璧以見西王母執贄者致敬也獻錦組百純乙丑天子觴西王母于瑤池之上西王母為天子謠謠徒歌也曰白雲在天山陵自出道里悠遠山川間之將子無死將請尚能復來尚庶幾也己酉天子飲于溽水之上音汙溽也六師之人畢至于曠原乃奏廣樂六師之人翔畋于曠原翔猶遊也得獲無疆無疆猶無限也鳥獸絕群言取盡也帝王世紀曰穆王修德教會諸侯於塗山命呂侯為相或謂之甫侯五十一年王已百歲老耄以呂侯有賢能之德於是乃命呂侯作呂刑之書五十五年王年百歲崩于祗宮楊子法言曰周穆王少不好學至乎耄長抱朴子曰周穆王南征一軍盡化君子為猨為鵠小人為蟲為沙恭王帝王世紀曰恭王能庇昭穆之闕故春秋稱之周自恭至夷王四世年紀不明是以曆依魯為正王在位二十年崩子堅代立懿王史記曰懿王時王室遂衰懿王在位二十五年崩恭王弟辟方立是為孝王帝王世紀曰懿王二年徙都犬丘孝王史記曰孝王在位十五年崩諸侯復立懿王太子變是為夷王夷王禮曰禮天子不下堂而見諸侯下堂而見諸侯天子之失禮也由夷王已下也史記曰夷王崩子厲王胡立紀年曰夷王二年蜀人呂人來獻瓊賓于河用介珪三年王致諸侯烹齊哀公于鼎帝王世紀曰夷王即位諸侯來朝王降與抗禮諸侯德之三年王有惡疾愆于厥身諸侯莫不並走群望以祈王身十六年王崩厲王史記曰厲王即位三十年好利近榮夷公大夫芮良諫王不聽卒以榮為卿士用事王行暴虐侈傲國人謗王召公諫曰民不堪命王怒得衛巫使監謗以告則殺, SBCK: ''}
