  - {type: variant, offset: 35, length: 156, content: 釋喪冕作誥申諸侯命畢公作策分民之居里于成周之郊王在位二十六年崩子瑕代立是謂昭王述異記曰廬山上有康王谷巔有一城號為劉城天每欲雨輒聞山上鼓角笳簫之聲聲漸至城而風雨晦合時人以為常候傳云此周康王之城康王愛奇好異巡歷名山不遠而至城中每得古器大鼎及弓弩金之屬知非常人之所處也而山有康王之號城又以釗為稱斯言將有徵昭王傳曰齊侯伐, WYG: ''}
