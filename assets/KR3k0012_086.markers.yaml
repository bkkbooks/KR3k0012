  - {type: variant, offset: 70, length: 456, content: 是謂昭王述異記曰廬山上有康王谷巔有一城號為劉城天每欲雨輒聞山上鼓角笳簫之聲聲漸至城而風雨晦合時人以為常候傳云此周康王之城康王愛奇好異巡歷名山不遠而至城中每得古器大鼎及弓弩金之屬知非常人之所處也而山有康王之號城又以釗為稱斯言將有徵昭王傳曰齊侯伐楚楚子使與師言管仲對曰爾貢苞茅不入王祭不供無以縮酒寡人是徵昭王南征不復寡人是問對曰貢之不入寡君之罪也敢不供給昭王之不復君其問諸水濱昭王時漢水非楚境故不受罪也帝王世紀曰昭王在位五十一年以德衰南征及濟于漢舡人惡之乃膠船進王王御船至中流膠液解王及祭公俱沒水而崩其右辛游靡長臂且多力拯得王周人諱之王室於是乎大微王娶於房曰房后生太子滿代立是謂穆王漢上記曰咋額至橫桑三十里桑字本作喪辛游靡取昭王喪處呂氏春秋曰周昭王親征荊高誘注曰秦莊王名楚故曰荊還及涉漢梁敗王杜於漢中杜尤粉切訓墜也辛餘靡振王北濟穆王歸藏曰昔穆王天子筮出於西征不吉曰龍降於天而道里脩遠飛而中天蒼蒼其羽傳曰穆王有塗山之會周穆王會諸侯於塗山又曰昔穆王欲肆其心周行天下將必皆有車轍馬跡焉祭父作祈招之詩以止王心王是以獲歿於祗宮, SBCK: ''}
