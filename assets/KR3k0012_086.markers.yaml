  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_086-1a.2}
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 一􅁗昭襄王孝文王莊襄王始皇帝二世皇帝􅁗王子嬰楚義帝附􅁗史紀曰􅁗之先帝顓頊之苗裔孫曰女脩女脩織􅀇鳥隕􅆑女脩吞之生子大業大業娶少典之子曰女華生大費與禹平水土巳成帝錫􅀇珪禹受曰非予能成亦大費與禹平水土巳爲輔帝舜曰咨爾費賛禹功其賜爾皂游爾後嗣將大出遂妻之姚姓之玉女大費拜受佐舜調馴鳥獸是爲栢翳舜賜姓嬴氏大費生子二人一曰大廉實鳥俗氏二曰􅀂木實費氏其􅀇孫曰費昌子孫或在中國或在夷狄費昌當夏桀之時去夏歸商爲湯御以敗桀於鳴條大廉􅀇孫曰孟戯中衍鳥身人言帝太戊聞而卜之使御吉遂致使御而妻之自太戊以下中􅄛之後丗有功以佐殷國故嬴姓多顯遂爲諸侯其􅀇孫曰中潏在西戎生蜚廉蜚廉生惡來惡來有力蜚廉善走父子俱以材力事紂}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_086-1b}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 一秦昭襄王孝文王莊襄王始皇帝二世皇帝秦王子嬰楚義帝附秦史記曰秦之先帝顓頊之苖裔孫女曰女脩適𤣥鳥隕卵女脩吞之生子大業大業娶少典之子曰女華生大費與禹平水土已成帝錫𤣥圭禹受曰非予能成亦大費為輔帝舜曰咨爾費賛禹功其賜爾皂游爾後將大出乃妻之姚姓之王女大費拜受佐舜調馴鳥獸鳥獸多馴服是為栢翳舜賜姓嬴氏大費生子二人一曰大亷實鳥俗氏二曰若木實費氏其𤣥孫曰費昌子孫或在中國或在夷狄費昌當夏桀時去夏歸商為湯御以敗桀於鳴條大亷𤣥孫曰孟戲中衍鳥身人言帝太戊聞而卜之使御吉遂致使御而妻之自太戊以下中衍之後世有功以佐殷國故嬴姓多顯遂為諸侯其𤣥孫曰中潏在西戎生蜚廉蜚廉生惡來惡來有力蜚亷善走父子俱以材力事紂}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_086-1b, image: WYG0893/WYG0893-0688d.png}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_086-2a, image: WYG0893/WYG0893-0689a.png}
  - {type: variant, offset: 4, length: 0, content: '', krp: 一秦昭襄王孝文王莊襄王始皇帝二世皇帝秦王子嬰楚義帝附秦史紀曰秦之先帝顓頊之苗裔孫曰女脩女脩織玄鳥隕卵女脩吞之生子大業大業娶少典之子曰女華生大費與禹平水土巳成帝錫玄珪禹受曰非予能成亦大費與禹平水土巳爲輔帝舜曰咨爾費賛禹功其賜爾皂游爾後嗣將大出遂妻之姚姓之玉女大費拜受佐舜調馴鳥獸是爲栢翳舜賜姓嬴氏大費生子二人一曰大廉實鳥俗氏二曰若木實費氏其玄孫曰費昌子孫或在中國或在夷狄費昌當夏桀之時去夏歸商爲湯御以敗桀於鳴條大廉玄孫曰孟戯中衍鳥身人言帝太戊聞而卜之使御吉遂致使御而妻之自太戊以下中衍之後丗有功以佐殷國故嬴姓多顯遂爲諸侯其玄孫曰中潏在西戎生蜚廉蜚廉生惡來惡來有力蜚廉善走父子俱以材力事紂}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 武王伐紂并殺惡來蜚廉死葬於霍太山蜚廉復有子曰季勝􅀇孫曰造父以善御幸於周繆王繆王以趙城封造父造父族由此爲趙氏趙衰其後也惡來革者蜚廉子也早死有子曰女防女防四丗生非子以造父之寵皆姓趙氏非子居犬丘周孝王分土爲附庸邑之􅁗今天水隴西縣􅁗亭也使復續嬴氏祀號曰􅁗嬴三世至􅁗仲始大其孫襄公時周平王避犬戎之難東徙洛邑襄公以兵送平王平王封襄公爲諸侯賜之歧以西之地襄公於是始與諸侯通使聘享之禮至繆公}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_086-2a}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 武王伐紂并殺惡來蜚亷死葬於霍山蜚亷復有子曰季勝季勝生孟增是為宅臯狼臯狼生衡父衡父生造父造父以善御幸於周繆王繆王以趙城封造父造父族由此為趙氏蜚廉以下五世别居趙趙衰其後也惡來革者蜚廉子也早死有子曰女防女防生旁臯旁臯生太几太几生大駱大駱生非子以造父之寵皆姓趙氏非子居大丘周孝王分土為附庸邑之秦今天水隴西縣秦亭也使復續嬴氏祀號曰秦嬴秦嬴生秦侯秦侯生公伯公伯生秦仲秦仲死於戎子莊公伐戎破之莊公卒子襄公立七年戎伐周襄公救周有功周避犬戎之難東徙洛邑襄公以兵送平王平王封襄公為諸侯賜之岐以西之地襄公於是始與諸侯通使聘享之禮至繆公}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_086-2b, image: WYG0893/WYG0893-0689b.png}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_086-3a, image: WYG0893/WYG0893-0689c.png}
  - {type: variant, offset: 5, length: 0, content: '', krp: 武王伐紂并殺惡來蜚廉死葬於霍太山蜚廉復有子曰季勝玄孫曰造父以善御幸於周繆王繆王以趙城封造父造父族由此爲趙氏趙衰其後也惡來革者蜚廉子也早死有子曰女防女防四丗生非子以造父之寵皆姓趙氏非子居犬丘周孝王分土爲附庸邑之秦今天水隴西縣秦亭也使復續嬴氏祀號曰秦嬴三世至秦仲始大其孫襄公時周平王避犬戎之難東徙洛邑襄公以兵送平王平王封襄公爲諸侯賜之歧以西之地襄公於是始與諸侯通使聘享之禮至繆公}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 公之世漸爲強霸與齊􅀳爭爲諸侯盟主􅁗仲巳下二十八世曰武}
