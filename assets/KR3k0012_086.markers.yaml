  - {type: variant, offset: 9, length: 0, content: '', SBCK: 王爲西帝齊爲東帝皆復去之五十二年周九鼎入􅁗周􅀄亡五十四年王郊見上帝於雍丘五十六年昭襄王卒子孝文王立古史考}
