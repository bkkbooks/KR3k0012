  - {type: variant, offset: 643, length: 392, content: 也魏略曰大秦國多馬腦涼州記曰呂纂咸和二年盜發張駿陵得馬腦鍾榼北齊書曰武平中除傅伏為東雍州刺史會周克并州遣韋孝寬來招伏曰并州已平故遣公兒來報便宜急下授上大將軍武鄉郡開國公即給告身以金馬腦二酒鍾為信伏不受北史曰梁主蕭詧曾獻馬腦鍾周文帝執之顧丞郎曰能擲樗蒲頭盧者便與鍾已經數人不得頃至薛端乃執樗蒲頭而言曰非為此鍾可貴但思露其誠耳擲之五子皆黑文帝大悅即以賜之古今注曰魏武帝以馬腦石為馬勒拾遺記曰帝顓頊時有丹丘國獻馬腦甕以盛甘露充於廚丹丘之地有夜叉駒跋之鬼能以赤馬腦為瓶盂及樂器皆精妙於中國用者一云馬腦者惡鬼之血凝成此物也黃帝時有馬腦甕至堯時猶有甘露在其中盈而不竭玄中記曰馬腦出月氐魏文帝馬腦勒賦曰玉屬也出自西域文理交錯有似馬腦故其方人因以名之陳琳馬腦勒賦曰託瑤溪之寶岸臨赤水之珠波陸機靈龜賦曰若車渠繞理馬腦縟文龜甲錯黿龍鱗王粲馬腦勒賦曰遊大國以廣觀兮覽希世之偉寶揔眾材而課美兮信莫臧於馬腦琉璃, SBCK: 碧}
