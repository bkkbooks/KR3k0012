  - {type: page-break, offset: 3125, content: '', id: KR3k0012_SBCK_809-5b}
  - {type: variant, offset: 3125, length: 0, content: '', WYG: 非曜靈之匹金上說文曰金五色金也黄金為之長久埋不生衣百陶不輕從革不違西方之行也生于土從土左右注象金在土中形釋名曰金禁也氣剛毅能禁制物也舜典曰金作贖刑禹貢曰淮海惟揚州厥貢惟金三品金銀銅也洪範曰五行四曰金從革作辛周禮考功記曰攻金之工築氏執下齊冶氏執上齊鳬氏為聲㮚氏為量叚氏鑄器桃氏為刃鄭𤣥注曰多錫為下齊少錫為上齊金有六齊六分其金而錫居一謂之鍾鼎之齊五分其金而錫居一謂之斧斤之齊四分其金而錫居一謂之戈㦸之齊三分其金而錫居一謂之大刃之齊五分其金而錫居一謂之制殺之齊金錫半謂之鍳燧之齊鍳鏡也金多錫刃白且明毛詩魯頌泮水曰憬彼淮夷來獻其琛元龜象齒大賂南金周易噬嗑卦曰六五噬乾肉得黄金鼎卦曰六五鼎黄耳金鉉利貞上繫曰二人同心其利斷金又說卦曰乾為金爾雅曰黄金謂之盪其美者謂之鏐餅金謂之鈑純澤謂之銑美金最有光澤西南之美者有華山之金石焉史記秦本記曰獻公十八年雨金櫟陽公自以得金瑞故作鄜畤於櫟陽祀白帝又曰秦始皇帝葬驪山以黄金為鳬鴈又曰衛鞅入秦孝公以鞅為左庶長卒定變法令乃立三丈之木於國都市南門募民有能徙置}
