  - {type: variant, offset: 1143, length: 171, content: 赤白黑黃青綠紺縹紅紫十種琉璃魏書曰天笁國人商販至京自云能鑄石為五色琉璃於是採礪山石於京師鑄之既成光澤美於西方來者乃詔為行殿容百餘人光色映徹觀者見之莫不驚駭以為神明所作自此國中琉璃遂賤人不復珍之吳曆曰黃龍扶南諸外國來獻琉璃晉書曰王濟豪侈帝常幸濟宅供饌甚豐悉貯琉璃器中帝甚美又曰汝南王醼公卿以琉璃鍾行酒酒及崔洪洪不肯執問其故曰慮有執玉不趍之義洞冥, SBCK: 碧􅀳太康地}
