  - {type: variant, offset: 3125, length: 0, content: '', SBCK: 非曜靈之疋金上􅀃文曰金五色金也黄金爲之長乆埋不生衣百淘不輕從革不違西方之行也生於土從土左右注象金在土中形釋名曰金禁也氣剛毅能禁制物也尚書舜典曰金作贖刑孔安囯曰金黄金誤而入刑出金以贖刑也又禹貢曰淮海惟楊州厥貢惟金三品孔安囯曰金銀銅也又洪範曰五行四曰金從革作辛孔安囯曰金可以政更周禮考工記曰攻金之工築氏執下齊冶氏執上齊鳬氏爲聲㮚氏爲量叚氏爲鑄器桃氏爲刃鄭玄注曰多錫為下齊少錫爲上齊金有六齊六分其金而錫居一謂之鍾鼎之齊五分其金而錫居一謂之斧斤之齊四分其金而錫居一謂之戈㦸之齊三分其金而錫居一謂之大刃之齊五分其金而錫居二謂之制殺之齊金錫半謂之鑒燧之齊鄭玄曰鑒鏡也金多錫則刃白且明毛詩魯頌泮水曰憬彼淮夷來獻其琛元􅀛象齒大賂南金周易噬嗑卦曰六五噬乾肉得黄金又鼎卦曰六五鼎黄耳金鉉利貞又上擊曰二人同心其利斷金又􅀃卦曰乾爲金爾雅曰黄金謂之其美者謂之鏐鉼金謂之鈑絶澤謂之銑美金最有光澤西南之美者有華山之金石焉史記􅁗夲紀曰獻公十八年雨金櫟陽公自以得金瑞故作鄜畤於櫟陽祀白帝又曰􅁗始皇塟驪山以黄金爲鳬鴈又曰衛鞅入􅁗孝公以鞅爲左庶子長卒定變法令乃立三丈之木於國都市南門募民有能徙置}
