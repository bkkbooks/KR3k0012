  - {type: variant, offset: 3127, length: 7, content: 玗琪樹玗琪玉屬, WYG: 一人徙之輙予五十金以明不欺又曰吕不􅅊乃使其客人人著所聞號吕氏春秋布咸陽市門懸千金其上有能增損一字者予千金又曰項羽以陳平為信武君擊殷而還拜為平都尉賜金三十鎰居無何漢攻下殷項王怒將誅定殷者平懼廼封其金與印使歸間行仗劒亡渡河又曰漢王與陳平金四萬斤以間疎楚君臣不問其出入也又曰吳楚反孝景以竇嬰為大將軍賜金千斤嬰陳之廊廡下軍吏過輙令材取為用無入家者漢書曰文帝初立以陳平為丞相位第二賜平金千鎰封三千戶又曰梁孝王未死時金以巨萬計不可勝數及死藏府餘黄金尚三十萬斤又曰季布為任俠有名楚人諺曰得黄金百不如季布諾又曰董偃見寵館陶長公主安陵袁叔謂偃曰顧成廟逺無宿宫何不白主獻長門園於上董君入言主獻之上大悦更名為長門宫公主大喜使董君以黄金百斤為袁叔夀又曰武帝即位欒大曰臣之師曰黄金可成而河可塞又曰衛青北伐將十餘萬衆擊破斬首虜之士為賜黄金三十萬斤又曰劉尚字子政本名更生宣帝時更生言黄金可成上令典尚方鑄作事費多方不驗又曰直不疑為即其同舍郎有告歸誤持同舍郎金主意不疑不疑買金償之而告歸者來歸金亡者大慙又曰韋賢少子𤣥成復以明經歴任至丞相故鄒魯諺曰遺子黄金滿籯不如一經又曰尹翁歸卒家無餘財天子賢之賜歸子黄金百斤尸奉其祭祀又曰疎廣徙為太傅兄子受為少傅父子並為師傅俱乞骸骨皆許之加賜黄金二十斤皇太子賜以五十斤又曰秦幣黄金方寸而重一斤以鎰為名金為貨夏殷無問周黄金方寸而重一斤故貨寳於金武帝時衛青擊匈奴斬捕首虜賜黄金二十餘斤又曰王莾敗省中黄金萬斤者一匱尚六十匱續漢書曰扶風人有孫奮居富而性恡梁兾認􅁬母為其守藏婢云盗紫金千斤又曰楊震為東萊太守道經昌邑初震舉荗才王宻時為昌邑令謁見至夜懐金十斤以遺震震曰故人知君君不知故人何也宻曰暮夜無知者震曰天知神知子知我知何謂不知宻愧而去又曰張奐遷安定属國都尉羗豪帥感奐恩徳上馬二十疋先零酋長遺金渠八枚奐受之而召主簿於諸羗前以酒酧地曰使馬如羊不以入廐使金如粟不以入懐悉以金馬還之太平御覽卷八百九}
