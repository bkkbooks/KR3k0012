  - {type: variant, offset: 3123, length: 1, content: 開, SBCK: 􅁑山之下多瑊石郭璞注曰瑊玏似玉之名司馬相如子虚賦曰其石則瑊玏玄厲玏音力也珉禮記聘義曰子貢問於孔子曰敢問君子貴玉而賤珉者何也爲玊之寡而珉之多與孔子曰非爲珉之多故賤之也玉之寡故貴之也夫昔者君子比德於玉焉􅀃文曰珉石之次玉也司馬相如子虚賦曰其玉則琳珉昆吾木難玄中記曰木難出大􅁗廣志曰木難珠其色黄生東夷南越志曰木難金翅鳥口結沬所成碧色珠也大􅁗土人珎之曹植樂府詩曰􅃢瑚間木難瑌石音儒兖禮記玉藻曰士瑌玫而緼組綬廣雅曰鴈門出石白也郭璞曰仐鴈門出碝石白也如氷亦有赤者也山海經曰北渚之山其上多碝石司馬相如子虚賦曰碝石武夫璿瑰山海經曰沃民之國爰有璿瑰瑶碧玫瑰廣雅曰神靈滋液百寳用則玫瑰出魏略曰大􅁗國出玫瑰班彪上事曰吏民塟埋有馬􅀍毛鬣角蹄玫瑰目眥以法禁之司馬相如子虚賦曰其石則赤玉玫瑰武夫廣雅曰武夫石次玉也戰國䇿曰西門豹爲鄴令魏文侯曰夫物多相􅀋而非白骨疑象武夫􅀋玉漢書曰董仲舒曰五伯其比三王猶武夫之與美玉也山海經曰㑹稽之山其上多砆石郭璞注曰今武夫石也似玉長沙臨湘縣出之赤地白文色䓗蘢不分也廣志曰武夫有白黒以爲枋碁杜萬年相風賦曰太僕􅀓侯命余賦之誠知武夫非荆寳之倫長􅁃啓}
