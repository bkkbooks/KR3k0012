  - {type: variant, offset: 115, length: 36, content: 五尺深者八九尺大如斛削去皮成琥魄初時如桃膠凝堅乃成其方人以為枕出愽南縣典, SBCK: 魏}
  - {type: variant, offset: 115, length: 529, content: 五尺深者八九尺大如斛削去皮成琥魄初時如桃膠凝堅乃成其方人以為枕出愽南縣典略曰大秦國多琥魄續漢書曰哀牢夷出光珠琥魄吳書曰虞翻少好學有高氣年十二客有候其兄者不遇遇翻翻追書與曰僕聞虎珀不取腐芥慈石不受曲針過而不存不亦宜乎客得書奇之由是見稱沈約宋書曰武帝時寧州常獻虎珀枕甚光麗時將北征以虎珀治金瘡上大悅命擣碎分付諸將西京雜記曰宣帝有身毒寶鏡一枚大如八銖錢常以虎珀笥盛之異物志曰虎珀之本成松膠也或以作杯瓶華陽國志曰珠穴出光珠虎珀能吸芥西域諸國志曰珠穴出麋盧水邊沙中有短腰蜂窠燒治以為虎珀玄中記曰楓脂輪入地中千秋為虎珀愽物志曰松脂淪入地中千年化為茯苓千年化為琥珀虎珀一名紅珠今太山有茯苓而無虎珀益州永昌出虎珀而無茯苓或復云燒蜂窠所作未詳此二說拾遺記曰昔漢武寶鼎元年西方貢珍怪青虎珀鷰置之靜室自於室內鳴翔又曰吳主聞潘夫人有色令進其圖圖成吳主見之驚喜以琥珀如意撫案即折曰此神女也因納之又曰江引悅鄧夫人月下舞水精如意誤傷其頰令太醫醫之以白獺髓和琥珀末塗之遂差神農本草經曰取鷄卵黃白渾雜者熟煮及尚軟隨意刻作物以苦酒漬數宿既堅內著杓中佳者亂真矣此世所常用作無不成左思蜀都賦曰虎珀丹青珠江瑕英潘尼詩曰駕言遊西岳寓目二華山金樓虎珀階象榻瑇琩筵中有神秀士不知幾何年馬腦廣雅曰馬腦石次玉也, WYG: ''}
