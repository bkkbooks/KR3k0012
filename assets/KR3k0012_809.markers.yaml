  - {type: variant, offset: 2195, length: 148, content: 樞星散為雲母漢書曰王莽侍中待詔有說莽鴟自虎吻豺狼聲者莽誅待詔而封告者後常翳雲母屏風非親近莫得見范曄後漢書曰鄭弘為太尉弟五倫為司空初倫為會稽召弘署督郵每朝弘曲躬自卑帝聽置雲母屏風分隔其間晉陽秋曰孫秀降賜雲母車梁書曰南岳鄧先生名郁荊州建平人也少而不仕隱居衡山極峻之嶺立小板屋兩間足不下山斷穀三十餘載唯, SBCK: 鎭}
