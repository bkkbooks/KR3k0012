  - {type: variant, offset: 328, length: 261, content: 域諸國志曰珠穴出麋盧水邊沙中有短腰蜂窠燒治以為虎珀玄中記曰楓脂輪入地中千秋為虎珀愽物志曰松脂淪入地中千年化為茯苓千年化為琥珀虎珀一名紅珠今太山有茯苓而無虎珀益州永昌出虎珀而無茯苓或復云燒蜂窠所作未詳此二說拾遺記曰昔漢武寶鼎元年西方貢珍怪青虎珀鷰置之靜室自於室內鳴翔又曰吳主聞潘夫人有色令進其圖圖成吳主見之驚喜以琥珀如意撫案即折曰此神女也因納之又曰江引悅鄧夫人月下舞水精如意誤傷其頰令太醫醫之以白獺髓和琥珀末塗之遂差神農本草經曰取鷄卵黃白渾雜者熟煮及尚軟隨意刻作物以苦酒漬數宿既堅內著杓中佳者亂真矣此世所常用作無不成左思蜀都, SBCK: 京}
