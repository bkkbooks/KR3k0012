  - {type: variant, offset: 2520, length: 523, content: 白者名磷石可四時長服又曰吳景帝戍將於廣陵掘冢有人如生棺中雲母厚尺許西京雜記曰晉幽公冢甚高美門關皆是石坐橃除深入乃得雲母深處見百餘尸縱橫相枕籍皆不朽唯一男子餘皆女子或坐或立或臥衣服形色不異生人又曰成帝設雲母帳雲幄雲幕於甘泉紫殿世謂之三雲殿晉公卿禮族曰賜太牢安平王治雲母輦晉宮闕名曰含元池中有雲母舡洛陽宮殿記曰宮中有林商等觀皆雲母置䆫裏日照之煒煒有光列仙傳曰方面堯時隱人練食雲母三齊記曰東武城有雲母山山有雲母因以為名安期先生常所遊餌東園祕記曰以雲母壅尸則亡人不朽帝馮貴人素國色亡已十餘年冢為賊所發形貌如故但冷耳盜共奸通之後捕得之此賊言貴人棺有數斛雲母石虎鄴中記曰虎作雲母五明金薄扇裴淵廣州記曰增城縣有雲母向日出照之晃曜地理志曰瑯琊定山出雲母王建平典術曰雲母有五名其色青黑五色亂文者名曰雲母白而微青名曰雲英如水露黃白名曰雲沙青赤雜者名曰雲珠黃白而赤重厚名陽起石雲母根也其中黑文班如錢名雲膽傷人不可服第一鄰石第二雲母第三雲珠第四雲英第五雲光服鄰石壽五千年服雲母壽三百年服雲英千年服雲光與天地同保瑟瑟明皇雜錄曰上於華清宮置長湯數十間屋又為銀鏤漆舡至於楫棹皆飾以珠玉又於湯中壘瑟瑟及沉香為山以狀瀛洲方丈又曰虢國夫人奪韋氏宅造中堂既成召匠圬墁授二百萬賞其直而復, SBCK: ''}
