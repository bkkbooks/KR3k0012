  - {type: variant, offset: 3127, length: 6, content: 玗琪樹玗琪玉, SBCK: 一人徙之輙子五十金以明不欺又曰吕不韋乃使其客人人著所文號吕氏春秋布咸陽市門懸千金其上有能増損一字者予千金又曰項羽以陳平爲信武君擊殷而還拜平爲都尉賜金三十鎰居無何漢攻下殷項王怒將誅定殷者平懼迺封其金與印使歸間行杖劒亡渡河又曰漢王與陳平金四萬斤以間䟽楚君臣不問其出入也又曰呉楚反孝景以竇嬰爲大將軍賜金千斤嬰陳之廊廡下軍吏過輙令財取爲用金無入家者漢書曰文帝􅀄立以陳平爲丞相位第二賜平金千鎰封三千户又曰梁孝王未死時金以巨萬計不可勝數及死藏府餘黃金尚三十餘萬斤又曰季布爲任俠有名楚人諺曰得黄金百不如得季布諾又曰董偃見寵舘陶長公主安陵􅀽叔謂偃曰顧成廟逺無􅀫宫何不白主獻長門園於上董君入白主主獻之上大恱更名爲長門宫主大喜董君以黄金百斤爲􅀽叔夀又曰武帝即位欒大曰臣之師曰黄金可成而河决可塞又曰衛青北伐將十餘萬衆擊破斬首虜之士受賜黄金三十餘萬斤又曰劉向字子政夲名更生宣帝時更生言黄金可成上令典尚方鑄作事費甚多方不驗又曰直不疑爲郎其同舎郎有告歸誤持同舎郎金去主意不疑不疑買金償之而告歸者來歸金亡者大慙又曰韋賢少子玄成復以明經歴任至丞相故鄒魯諺曰遺子黄金滿籝不如一經如淳曰籯作器受三􅂛今陳留俗有此器淳以爲滿籝言甚多耳非器名謂陳留之俗則吾陳留人也不聞有此器又曰尹翁歸卒家無餘財天子賢之賜翁歸子黄金百斤以奉其􅀕祠又曰踈廣徙爲太傅兄子受爲少傳父子並爲師傅俱乞骸骨皆許之加賜黄金二十斤皇太子賜以五十斤又曰􅁗幣黄金方寸而重一斤以溢爲名孟康子二十兩爲溢臣瓉曰􅁗以一溢爲一斤漢以一斤爲一金金爲貨夏殷無聞周黄金方寸而重一斤故貨寳於金武帝時衛青擊匈奴斬捕首虜賜黄金二十餘斤又曰王莽敗省中黃金萬斤者一匱尚六十匱續漢書曰扶風人士孫奮居冨而性恡梁兾認奮母爲其守藏婢云盗紫金千斤又曰楊震爲東萊太守道經昌邑􅀄震爲茂才王宻時爲昌邑令謁見至夜懷金十斤以遺震震曰故人知君君不知故人何也宻曰暮夜無知者震曰天知神知子知我知何謂不知宻愧而出又曰張奐遷安定}
