  - {type: variant, offset: 2344, length: 175, content: 澗水服雲母屑日夜誦大洞經唐書曰吳王杜伏威性好左道因合金丹求長生之術常服雲母散又曰尉遲敬德遂飛練金石閑居服雲母粉淮南萬畢術曰雲母入地千歲不朽雲母在足無踐棘注曰取大雲母塗足下踐棘不能刺淮南子曰雲母來水雲母石可致水抱朴子曰雲母五色其多青者名雲英宜以春服之多赤者名雲珠宜以夏服之多白者名雲液宜以秋服之多黑者名雲母宜以冬服之但有青黃二色者名雲沙宜以季夏服之皛皛, SBCK: 瑶臺}
