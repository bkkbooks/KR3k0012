  - {type: variant, offset: 3, length: 2, content: 七琥, SBCK: 八琅玕火齊碧瑤瑊珉木難碝石璿瑰玟瑰武夫金上琅玕孝經援神契曰神靈滋則琅玗景宋均注曰事神明得理則琅玉有光爾雅曰西北之美者則崑崙之璆琳琅玕焉}
