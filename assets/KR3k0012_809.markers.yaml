  - {type: variant, offset: 13, length: 101, content: 為琥文周禮春官上大宗伯曰白琥禮西方周禮秋官下小行人曰合六幣琥以繡也左傳昭七曰魯昭公疾徧賜大夫大夫不受賜子家子雙琥一環一璧受之大夫皆受其賜事見璧門呂氏春秋曰戰鬭用琥琥魄廣雅曰琥魄珠也生地中其上及旁不生草淺, SBCK: ''}
