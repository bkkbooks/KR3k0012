  - {type: variant, offset: 3123, length: 1, content: 開, WYG: 葛山之下多瑊石郭璞注曰瑊玏似玉之石司馬相如子虛賦曰其石則瑊玏𤣥厲玏音力也珉禮記聘義曰子貢問於孔子曰敢問君子貴玉而賤珉者何也為玉之寡而珉之多與孔子曰非為珉之多故賤之也玉之寡故貴之也夫昔者君子比徳於玉焉説文曰珉石之次玉也司馬相如子虛賦曰其玉則琳珉昆吾木難𤣥中記曰木難出於大秦廣志曰木難珠其色黄生東夷南越志曰木難金翅鳥口結沬所成碧色珠也大秦土人珍之曹植樂府詩曰珊瑚間木難碝石禮記玉藻曰士珮碝而緼組綬璿瑰山海經曰沃民之國爰有璿瑰瑶碧玟瑰廣雅曰神靈滋液百寳用則玫瑰出魏略曰大秦國出玟瑰班彪上事曰吏民葬埋有馬被毛鬛角蹄玟瑰宜皆以法禁之司馬相如子虛賦曰其石則赤玉玟瑰武夫廣雅曰武夫石次玉也戰國策曰西門豹為鄴令魏文侯曰夫物多相類而非白骨疑象武夫類玉漢書曰董仲舒曰五霸之比三王猶武夫之與羙玉也山海經曰㑹稽之山其上多砆石廣志曰武夫有白黒以為枋碁杜年相風賦曰太僕𫝊侯命余賦之誠知武夫非付寳之倫長庚啟}
