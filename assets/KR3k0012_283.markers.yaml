  - {type: variant, offset: 2569, length: 3, content: 因銜枚, WYG: 虛實吾深入敵地後無轉輸旬月之間不戰而困諸軍之言未見其宜遂攻臨淄半日㧞之入據其城又曰髙峻據髙平猶不下帝議遣使降之乃謂冦恂曰為吾行也若峻不降引耿弇等}
  - {type: punctuation, offset: 2574, content: ，, id: KR3k0012_CHANT_283-bkkpn653}
