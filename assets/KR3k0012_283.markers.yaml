  - {type: variant, offset: 536, length: 291, content: 未既濟也請擊之公曰不可既濟而未成列又以告公曰未可既陣而後擊之宋師敗績公傷股門官殲焉國人皆咎公公曰君子不重傷不擒二毛二毛頭白有二色者也古之為軍也不以阻隘也不因阻隘以求勝寡人雖亡國之餘宋商紂之後也不鼓不成列子魚曰君未知戰勍敵之人隘而不成列天贊我也勍強也言楚在險隘不得陳列天所以佐宋也阻而鼓之不亦可乎猶有懼焉雖因阻擊之猶恐不勝也且今之勍者皆吾敵也雖及胡耇獲則取之何有於二毛今之勍者謂與吾競者也胡耇元老之稱也耇音茍明恥教戰求殺敵也明設刑戮以恥不果也傷未及死如何勿重言尚能害己也若愛重傷則如勿傷愛其二毛則如服焉言茍不欲傷殺敵人則本可不須鬭也三軍以利用也為利興也金鼓以聲氣也鼓以佐士眾之聲氣也利, SBCK: 鋒}
