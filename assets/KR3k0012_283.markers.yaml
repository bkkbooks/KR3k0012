  - {type: variant, offset: 2574, length: 0, content: '', WYG: 恂奉璽書與峻峻遣軍帥皇甫文出謁辭禮不屈恂怒將誅文諸將諫曰髙峻精兵萬人率多强弩西遮隴道連年不下今欲降之}
  - {type: page-break, offset: 2574, content: '', id: KR3k0012_WYG_283-9b, image: WYG0895/WYG0895-0497b.png}
  - {type: variant, offset: 2575, length: 0, content: '', WYG: 反戮其使無乃不可乎恂不聽遂斬之遣其副歸告峻曰軍帥無禮已戮之矣欲降急降不欲降湏固守峻惶恐即日開城門降諸將皆賀因曰敢問殺其使而降其城何也恂曰皇甫文峻之腹心其所取計者也今來辭意不屈必無降心全之則文得其計殺之則峻亡其膽是以降耳諸將皆曰非所及也又曰吴漢在河北時鬲縣五姓共逐守長據城而反鬲縣名属平原郡故城在今徳州西北五姓盖當時强宗豪室也鬲音革諸將争欲攻之漢不聴曰使鬲反者守長罪也敢輕冐進兵者斬乃移檄告郡使收守長而使人謝}
  - {type: page-break, offset: 2575, content: '', id: KR3k0012_WYG_283-10a, image: WYG0895/WYG0895-0497c.png}
  - {type: variant, offset: 2577, length: 423, content: 鼓譟從之老弱者皆擊銅器為聲聲動天地燕軍大駭敗走而齊七十餘城皆復為齊又曰燕將騎劫攻齊即墨齊將田單拒守乃宣言曰吾唯懼燕軍之劓所得齊卒置之前行與我戰即墨敗矣燕人聞之如其言城中人見齊降者盡劓皆怒堅守唯恐見得田單又縱反間曰吾懼燕人掘吾城外冢墓戮先人可為寒心燕軍盡掘龍墓燒死人即墨人從城上遙見皆涕泣其欲出戰怒皆十倍因大敗燕又曰魏趙相攻齊將田忌引兵救趙孫臏曰夫解雜亂紛糺者不控捲丘員切救鬭者不搏撠音戟批亢擣虛形格勢禁則自為解耳今魏趙相攻輕兵銳卒必竭於外老弱罷於內君不若引兵疾走大梁據其街路衝其方虛彼必釋趙而自收弊於魏也田忌從之直走大梁魏師遂退又曰齊孫臏謂齊王曰凡伐國之道攻心為上務先伏其心今秦之所恃為心者燕趙也當收燕趙之權今說燕趙之君勿虛言空辭必將以實利以回其心所謂攻其心者也史記曰秦伐韓軍於閼與趙王召趙奢而問可救不對曰道遠險狹譬兩鼠鬭於穴中將勇者勝王乃命救之秦軍武安西鼓譟勒兵武安屋瓦盡震趙奢堅壁留二十八日不行秦間來入奢善食而遣之間還報曰去國三十里而不行秦將, WYG: 五姓}
