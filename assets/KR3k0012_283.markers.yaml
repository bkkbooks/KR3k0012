  - {type: variant, offset: 1253, length: 388, content: 動使敢死之士往輒為吳師所擒欲使吳師亂取之而吳不動使罪人三行屬劍於頸以劍注頸行戶郎切而辭曰二君有理理軍旅也臣干旗鼓犯軍令也不敏於君之行前不敢逃刑將歸死遂自剄也師屬之目越子因而伐之大敗吳師又曰楚子圍宋晉侯將救之大夫先軫曰報施救患取威定霸於是乎在矣狐偃曰楚始得曹而新婚於衛若伐曹衛楚必救之則宋免矣從之而解又曰晉楚戰于城濮楚將子玉從晉師晉師陣于莘北胥臣以下軍之佐當陳蔡子玉以若敖之六卒將中軍曰今日必無晉矣鬭宜申將左鬭勃將右晉禆將胥臣蒙馬以虎皮先犯陳蔡陳蔡奔楚右師潰陳蔡屬楚右師狐毛設二斾而退之斾大斾也又建一斾而退使若大將稍却也欒枝使輿曳柴而偽遁曳柴起塵詐為眾走楚師馳之原軫郄溱以中軍公族橫擊之公族公所師之軍狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績子玉收其卒而止故不敗晉師三日館穀館舍也食楚軍穀三日也又曰楚將鬭廉帥師及巴師圍鄾音憂鄧養甥𨈭甥音男帥師救鄾三逐巴師不克鬭廉衡陣其師於巴師之中以, SBCK: ''}
