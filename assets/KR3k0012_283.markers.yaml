  - {type: variant, offset: 950, length: 1, content: 擊, SBCK: 攻之申令軍中恣聽射獵兵士喜恱大小皆相與從禽尚乃密使所親客潜焚其營積皆盡獵者來還莫不泣涕尚人人慰勞􅀷自咎責因曰􅁲陽等財寳足冨數代諸卿但不并力耳所亡少少何足介意衆聞咸憤踊尚勑令秣馬蓐食明旦徑赴賊屯陽鴻等自以􅀷固不復設備吏士乗銳遂大破平之尚出兵三年羣宼悉定又曰廉范爲雲中太守㑹匈奴大入塞烽火日通故事虜入過五千人移書傍郡吏欲傳檄求救范不聽自率士卒拒之虜衆盛而范兵不敵㑹日暮令軍士各交􅅞兩炬三頭􅅡火營中星列用兩炬交縳如十字􅋹其頭手持一端使敵人望之疑兵士之多虜遥望火多謂漢兵救至大驚待旦將退范乃令軍中蓐食晨往赴之蓐食早起食於寢蓐中也斬首數百級虜自相轔藉死者千餘人轔轢也藉相蹈藉也由此不敢復向雲中又曰耿恭與匈奴戰恭以毒藥傳矢傳語匈奴曰漢家箭神}
