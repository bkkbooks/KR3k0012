  - {type: variant, offset: 2486, length: 4, content: 得千餘牛, WYG: 望見笑而不出操令一夜濬之廣深二丈决漳水以灌之自五月至八月城中餓死者過半又曰朱穆舉度尚自右校令擢荆州刺史擊桂陽蒼梧盜賊尚躬率部曲與同勞逸廣募雜種諸蠻夷明設購賞進擊大破之降者數萬人桂陽宿賊渠帥卜陽潘鴻等畏尚威烈徙入山谷尚窮追數百里遂入南海破其三屯多獲珍寳而陽鴻等黨衆猶盛尚欲擊之而士卒驕富莫有鬭志尚計緩之則不戰逼之則逃亡乃宣言卜陽潘鴻作賊十年習於攻守今兵寡少未易可進當湏諸部所發悉至乃可并力攻之申令軍中恣聴射獵兵士喜恱大小皆相與從禽尚乃密使所親客潛焚其營積皆盡獵者來還莫不涕泣尚人人慰勞深自咎責因曰卜陽等財實富足数代諸卿但不并力耳所亡少少何足介意衆聞咸奮踴尚勅令秣馬蓐食眀旦徑赴賊屯陽鴻等自以深固不復設備吏士乗銳遂大破平之尚出兵三年羣冦悉定又曰㢘范}
