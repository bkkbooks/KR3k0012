  - {type: variant, offset: 854, length: 2, content: 宋公, SBCK: 斯亦攻心之機也又曰漢王遣將韓信擊魏魏王盛兵蒲坂塞臨晉信乃益爲疑兵陳舩欲度臨晉而伏兵從夏陽以木罌缻度軍以木爲器如罌缻以度軍無舡且尚密也缻缶同襲安邑虜魏王豹又曰呉王濞反濞疋備反漢將周亞夫率師禦之壁於下邑呉師奔壁東南亞夫備西北呉師果以精兵奔西北不得入大敗漢書曰先零音憐罕开音汧二種羌皆解仇合黨爲宼漢將趙充國討之守便冝上書曰先零羌虜欲爲背叛故與罕开解仇然其私心恐漢兵至而罕开背之也臣愚以爲其計請擊先零若先擊罕羌零必助之今虜馬肥饒粮擊之恐不能傷害適使先零施德於罕羌也堅其約合其黨虜交堅黨合誅之用力數倍臣恐國家憂累猶十數年不一二􅀊而巳先誅先零則罕开之屬不煩兵服矣宣帝從之果如其䇿又曰王莾未光武起兵據昆陽城時唯有八九千人莽遣將王邑嚴尤討之軍到城下者十萬光武留王鳯等守城與李軼等十餘騎夜出旣至郾定陵悉發諸營兵嚴尤􅀃王邑曰昆陽城小而堅今假號者宛亟進大兵亟急也紀力切彼必奔走則昆陽自服邑曰吾昔以武牙將軍圍翟義坐不生得以見責今將百萬之衆過城而不能下何謂耶遂圍之數十里列營百所雲車十餘瞰臨城中旗幟蔽野埃塵連天鉦鼓之聲聞數十里或爲地道或輣撞城輣蒲萌切積弩亂發矢下如􅀨城中􅀒楯而汲王鳯等乞降不許光武遂與諸營部俱進自將部􅀐千餘人前去大軍四五里而陣㝷邑亦遣兵千餘合戰光武奔之斬首數十級諸部喜曰劉將軍平生見小敵怯今見大敵勇甚可怪也且復居前請助將軍光武復進㝷邑兵却諸部兵乗之斬首數百千級連勝遂因而大敗通典曰王邑}
