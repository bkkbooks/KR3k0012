  - {type: variant, offset: 201, length: 16, content: 不可亂旌旗亂也示敵者若亂以金鼓齊, krp: 用}
  - {type: variant, offset: 203, length: 463, content: 亂旌旗亂也示敵者若亂以金鼓齊之渾渾沌沌形圓而不可敗也車騎轉形圓者出入有道齊整左傳曰齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而䟽陣之使乘車者左實右偽以斾先輿曳柴而從之以揚塵齊侯見之畏其眾也乃脫歸齊師夜遁師曠告晉侯曰鳥烏之聲樂齊師其遁邢伯告中行伯曰有班馬之聲齊師其遁邢伯楚中行伯也又曰吳從楚師及清發將擊之夫概謂王曰困獸猶鬭况人乎若知不免而致死必敗我使先濟者知免後者慕之蔑有鬭心半濟而後可擊也從之又敗之楚人為食吳人及之奔食而從之又曰鄭人侵衛牧以報東門之役衛人以燕師伐鄭鄭將祭足原繁泄駕以三軍軍其前使曼伯子元潛軍軍其後燕人畏鄭三軍而不虞制人鄭二公子以制人敗燕師于北制君子曰不備不虞不可以師又曰宋襄公及楚人戰于泓宋人既成列楚人未既濟未盡度弘水也司馬子魚曰彼眾我寡及其未既濟也請擊之公曰不可既濟而未成列又以告公曰未可既陣而後擊之宋師敗績公傷股門官殲焉國人皆咎公公曰君子不重傷不擒二毛二毛頭白有二色者也古之為軍也不以阻隘也不因阻隘以求勝寡人雖亡國之餘宋商紂之後也不鼓不成列子魚曰君未知戰勍敵之人隘而不成列天贊我也勍強也言楚在險隘不, WYG: ''}
