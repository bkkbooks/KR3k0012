  - {type: variant, offset: 500, length: 3, content: 宋襄公, SBCK: 項籍圍漢王於滎陽漢將紀信詐降以故漢王得岀走入関收兵欲復東􅀽生􅀃漢王曰漢與楚相距滎陽數歳漢常中困願君王出武関項羽必引兵南走王􅀷壁令滎陽成臯間且得休息使韓信等平河北趙地連燕齊君王乃復走滎陽未晚如此則楚所備者多力分漢得休息復與之戰破楚必矣漢王從其計出軍宛葉間與黥布行收兵項羽聞漢王在宛果引兵南漢王􅀷壁不與戰終以此弊楚又曰漢王至南鄭諸將}
  - {type: variant, offset: 500, length: 3, content: 宋襄公, krp: 項籍圍漢王於滎陽漢將紀信詐降以故漢王得岀走入関收兵欲復東袁生說漢王曰漢與楚相距滎陽數歳漢常中困願君王出武関項羽必引兵南走王深壁令滎陽成臯間且得休息使韓信等平河北趙地連燕齊君王乃復走滎陽未晚如此則楚所備者多力分漢得休息復與之戰破楚必矣漢王從其計出軍宛葉間與黥布行收兵項羽聞漢王在宛果引兵南漢王深壁不與戰終以此弊楚又曰漢王至南鄭諸將}
  - {type: variant, offset: 504, length: 1, content: 楚, SBCK: 士卒皆歌思㱕韓信􅀃漢王曰項羽王諸將之有功者而獨居南鄭是迁也軍吏士卒皆山東之}
