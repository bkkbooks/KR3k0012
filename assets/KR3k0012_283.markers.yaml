  - {type: variant, offset: 863, length: 42, content: 越伐吳吳子禦于笠澤夾水而陣越為左右勾卒勾卒伍伍相著別為左右屯也勾音鉤使夜或左或右鼓譟, SBCK: 王郎起河北郎鉅鹿郡太守王饒據城光武圍數十日連攻不尅耿純􅀃曰乆守王饒士衆疲弊不如及大兵精銳進攻邯鄆若王郎巳誅王饒不戰自服矣從之乃留兵守鉅鹿}
  - {type: variant, offset: 863, length: 42, content: 越伐吳吳子禦于笠澤夾水而陣越為左右勾卒勾卒伍伍相著別為左右屯也勾音鉤使夜或左或右鼓譟, krp: 王郎起河北郎鉅鹿郡太守王饒據城光武圍數十日連攻不尅耿純說曰乆守王饒士衆疲弊不如及大兵精銳進攻邯鄆若王郎巳誅王饒不戰自服矣從之乃留兵守鉅鹿}
