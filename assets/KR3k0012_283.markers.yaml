  - {type: variant, offset: 868, length: 1, content: 禦, WYG: 賈䜿易動以利願且留壁使人先行為五萬人具食益張旗幟諸山之上為疑兵令酈食其持重寳㗖秦將貪而忽名可貨以賂秦將果畔欲連和俱西襲咸陽沛公欲許之良曰此獨其将欲叛恐士卒不從不如因其懈怠擊之沛公乃引兵擊之秦兵大敗又曰項籍圍漢王於滎陽漢将紀信詐降以故漢王得走入関收其兵欲復東袁生說漢王曰漢與楚相距滎陽数嵗漢常受困願君王出武関項羽必引兵南走王深壁令滎陽城臯間且得休息而韓信等平河北趙地連燕齊君王乃復走滎陽未晚如是則楚所備者多力分漢得休息復與之戰破楚必矣漢王從其計出軍宛葉間與黥布行收兵項羽聞漢王在宛果引兵南漢深壁不與戰又曰漢王至南鄭諸將及士卒皆歌思歸韓信說漢王曰項羽王諸将之有功者而王獨居南鄭是遷也軍吏士卒皆山東之人日夜跂而思歸及其鋒而用之可以成大功天下已定人皆自寜不可復用不如决䇿東向争權天下漢王從之終滅項籍又曰漢楚相持項羽自擊漢将彭越}
