  - {type: variant, offset: 2558, length: 3, content: 皆龍文, WYG: 以為宜速攻西安弇曰不然西安聞吾欲攻之日夜為備然臨淄出不意而至必驚擾吾攻之一日必㧞臨淄破即西安孤張蘭勢已隔絶必復亾去}
