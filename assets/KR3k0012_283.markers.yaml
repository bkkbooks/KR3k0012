  - {type: variant, offset: 2546, length: 5, content: 牛尾炬火光, WYG: 待旦將退范乃令軍中蓐食晨徃赴之蓐食早起食於寝蓐中也斬首數百級敵自相轔籍死者千餘人轔轢也籍相蹈籍也由此不敢復向雲中又曰耿恭與匈奴戰恭以毒藥傅矢傳語匈奴曰漢家箭神其中瘡者必有異因發强弩射之敵中矢者視瘡皆沸遂大驚㑹天暴風雨随而擊之殺傷甚衆匈奴震怖相謂曰漢兵神真可畏也遂解去又曰耿弇敕諸校㑹㑹猶集㑹也五日攻西安張蘭聞之晨夜儆守至期夜半弇敕諸將皆蓐食㑹}
