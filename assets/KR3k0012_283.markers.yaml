  - {type: variant, offset: 1644, length: 545, content: 衡橫也分巴師為二部鬭廉橫陣於其間以與鄧師戰而偽北北走鄧人逐之背巴師而夾攻之楚師偽走鄧師逐之背巴師巴師攻之楚師自前與戰也鄧師大敗鄾人宵潰宵夜又曰晉師伐秦秦人毒涇上流師人多死又曰楚師伐吳鍼音針尹固與王同舟王使執燧象以奔吳師燒火燧繫象尾使赴吳師驚之鉞職深切又曰時邾人城翼翼邾邑也還將自離姑離姑邾邑也從離姑則道經魯之武城也大夫公孫鉏曰魯將禦我欲自武城還循山而南至武城而還依山南行不欲過武城鉏助魚切大夫徐鉏丘弱茅地二子邾大夫曰道下遇雨而將不出是不歸也謂此道下山濕遂自離姑遂過武城武城人塞其前以兵塞其前道斷其後之木而弗殊邾師過之乃推而蹶之遂取邾師推士追切蹶其月切又曰晉將陽處父侵蔡父音甫楚將子上救之與晉師夾泜而軍泜直利切處父患之使謂子上曰吾聞之文不犯順武不違敵子若欲戰則吾退舍子濟而陣欲避楚使度成陣而後戰遲速唯命不然紓我紓緩老師費財亦無益也乃駕以待子上欲涉大孫伯曰不可晉人無信半涉而薄我悔敗何及不如紓之乃退舍楚退欲使晉度陽子宣言曰楚師遁矣遂歸楚師亦歸太子啇臣譖子上曰受晉賂而避之楚之恥也罪莫大焉王殺子上戰國策曰秦伐趙趙以趙奢之子代廉頗為將拒秦將王齕於長平齕音恨勿切秦王聞之乃陰使武安君白起為上將軍而王齕為禆將軍令軍中有敢泄武安君者斬馬服子至則出兵擊秦軍秦軍佯敗而走張二奇兵以劫之趙軍逐勝追造秦壁秦壁堅距, WYG: ''}
