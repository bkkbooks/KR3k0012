  - {type: variant, offset: 12, length: 0, content: '', SBCK: 良乆於是信張耳弃旗鼓走水上軍水上軍開入之復疾戰趙果空壁爭漢旗鼓逐韓信張耳韓信張耳巳入水上軍軍皆殊死戰信岀竒兵二千􅀐候趙空壁逐利則馳入趙壁皆抜趙旗立漢赤幟二千趙軍不能得信等欲歸還壁壁皆漢赤幟而大驚以謂漢皆巳得趙王將矣兵遂亂遁走於是漢兵夾擊大破虜趙軍斬成安君泜水上徐廣曰泜音遲擒趙王歇信諸將問信曰兵法右背山陵前左水澤今}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_SBCK_283-1b}
