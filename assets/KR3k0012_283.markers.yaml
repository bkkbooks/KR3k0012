  - {type: variant, offset: 33, length: 231, content: 奇者無窮如天地不竭如江海終而復始日月是也死而更生四時是也故聲不過五五聲之變不可勝聞色不過五五色之變不可勝觀味不過五五味之變不可勝嘗以喻奇正無窮也戰數不過奇正之變不可勝窮也奇正相生如循環之無端孰能窮之哉故水之疾至於漂石者勢也鷙鳥之擊至於毀折者節也發起討擊敵之是以善戰者其勢險險猶疾也其節短短近勢如彍弩節如發機在疾不遠發則中也紛紛紜紜鬭亂而不可亂旌旗亂也示敵者若亂以金鼓齊之渾渾沌沌形圓而不可敗也車騎轉形圓者出入有道齊整左傳曰齊侯登巫山以望晉師晉人使司馬斥山澤之險雖, SBCK: 非}
