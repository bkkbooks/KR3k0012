  - {type: variant, offset: 2264, length: 728, content: 五以上悉詣長平遮絕趙救及糧食至九月趙卒不得食四十六日皆內陰相殺食來攻秦壘欲出為四隊四五復之不能出其時馬服子卒自相搏戰秦軍射殺之軍大敗卒二十餘萬人降皆坑之又曰燕軍大破齊國齊將田單守即墨知士卒可用乃身操板插與士卒分功妻妾編行伍之間盡散飯食饗士令甲卒皆伏使老弱女子乘城遣約降於燕燕軍皆呼萬歲田單又牧人金得千鎰令即墨富豪遺燕將書曰即墨即降願無掠虜吾族家妻妾令安堵燕將大喜許之燕軍由此益懈田單出軍擊大敗之又曰燕師伐齊已下七十餘城圍即墨未下齊將田單乃收城中得千餘牛為縫繒衣畫以五綵龍文束兵刃於其中角而灌脂束葦於尾燒其端鑿城數十穴夜縱牛壯士五千人隨其後牛尾熱怒而奔燕軍燕軍夜大驚牛尾炬火光明炫燿燕軍視之皆龍文所觸盡死傷五千人因銜枚擊之而城中鼓譟從之老弱者皆擊銅器為聲聲動天地燕軍大駭敗走而齊七十餘城皆復為齊又曰燕將騎劫攻齊即墨齊將田單拒守乃宣言曰吾唯懼燕軍之劓所得齊卒置之前行與我戰即墨敗矣燕人聞之如其言城中人見齊降者盡劓皆怒堅守唯恐見得田單又縱反間曰吾懼燕人掘吾城外冢墓戮先人可為寒心燕軍盡掘龍墓燒死人即墨人從城上遙見皆涕泣其欲出戰怒皆十倍因大敗燕又曰魏趙相攻齊將田忌引兵救趙孫臏曰夫解雜亂紛糺者不控捲丘員切救鬭者不搏撠音戟批亢擣虛形格勢禁則自為解耳今魏趙相攻輕兵銳卒必竭於外老弱罷於內君不若引兵疾走大梁據其街路衝其方虛彼必釋趙而自收弊於魏也田忌從之直走大梁魏師遂退又曰齊孫臏謂齊王曰凡伐國之道攻心為上務先伏其心今秦之所恃為心者燕趙也當收燕趙之權今說燕趙之君勿虛言空辭必將以實利以回其心所謂攻其心者也史記曰秦伐韓軍於閼與趙王召趙奢而問可救不對曰道遠險狹譬兩鼠鬭於穴中將勇者勝王乃命救之秦軍武安西鼓譟勒兵武安屋瓦盡震趙奢堅壁留二十八日不行秦間來入奢善食而遣之間還報曰去國, SBCK: ''}
