  - {type: variant, offset: 2461, length: 0, content: '', WYG: 漢書曰先零音憐䍐幵音􅊈二種羗皆解仇合黨為冦漢将趙充國討之守便宜上書曰先零羗虜欲背叛故與䍐幵解仇然其私心恐漢兵至而䍐幵背之也臣愚以為其計請擊先零若先擊䍐羗零必助之今虜馬肥粮饒擊之恐不能勝適使先零於罕羗益堅其約合其黨虜交堅黨合誅之用力数倍臣恐國家憂累猶十數年不一二嵗而已先誅先零則罕幵之屬不煩兵而服矣宣帝從之果如其䇿後漢書曰光武起義兵據昆陽城時唯有八九千人莽遣將王邑嚴尤討之軍到城下者十萬光武留王鳯等守城與李軼等十餘騎夜出既至郾定陵悉發諸營兵嚴尤說王邑曰昆陽城小而堅今假號者在宛亟進大兵彼必奔走宛敗昆陽自服也邑曰吾昔以虎牙軍圍翟義坐不生得以見責今将百萬之衆遇城而不能下何謂耶遂圍之数十重列營百雲車十餘丈瞰臨城中旗幟蔽野埃塵連天鉦鼓之聲聞数百里或為地道衝輣橦城輣蒲萌切積弩亂發矢下如雨城中負楯而汲王鳯等乞降不許光武遂與諸營部俱進自將部騎千餘人前去大軍四五里而陣尋邑亦遣千餘人合戰光武奔之斬首数千級諸部喜曰劉将軍平生見小敵怯今見大敵勇甚可怪也旦復居前請助將軍光武復進尋邑兵却諸部兵乗之斬首数百千級連勝邑遂因而大敗}
