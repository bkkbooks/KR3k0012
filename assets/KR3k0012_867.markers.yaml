  - {type: variant, offset: 298, length: 2, content: 龍肉, SBCK: 茗苦茶味甘苦微寒無毒主瘻瘡利小便少睡去痰渇消􅀫食冬生益州川谷山陵道傍凌冬不死三月二月採乾華佗食論曰苦茶乆食益意思壷居士食志曰苦茶乆食羽化與菲同食令人身重陶弘景新録曰茗茶輕身換骨丹丘子黄山君服之王浮神異記曰餘姚人虞洪入山采茗遇一道士牽三青牛引洪至瀑布山曰吾丹丘子也聞子善具飯常思見惠山中有大茗可}
  - {type: variant, offset: 298, length: 2, content: 龍肉, WYG: 桓宣武有一督将因時行病后虛熱更能飲複茗必一斛二斗乃飽裁减升合便}
  - {type: variant, offset: 298, length: 2, content: 龍肉, krp: 茗苦茶味甘苦微寒無毒主瘻瘡利小便少睡去痰渇消宿食冬生益州川谷山陵道傍凌冬不死三月二月採乾華佗食論曰苦茶乆食益意思壷居士食志曰苦茶乆食羽化與菲同食令人身重陶弘景新録曰茗茶輕身換骨丹丘子黄山君服之王浮神異記曰餘姚人虞洪入山采茗遇一道士牽三青牛引洪至瀑布山曰吾丹丘子也聞子善具飯常思見惠山中有大茗可}
  - {type: variant, offset: 301, length: 0, content: '', SBCK: 相給祈子他日有甌蟻之餘不相遺也因立奠祀後令家人入山􅀗大茗焉廣陵􅂄老傳曰晉元帝時有老姥每旦擎一器茗徃市鬻之市人競買自旦至暮其器不减茗所得錢散路傍􅀌貧乞人人或異之執而繫之於獄夜擎所賣茗器自牖飛去廣志曰茶叢生直煑飲爲茗茶茱茰檄子之属膏煎之或以茱茰煑脯冐汁爲之曰茶有赤色者亦米和膏煎曰無酒茶晉書蓺術傳曰燉煌人單道開不畏寒暑常服小石子所服者有心氣兼服茶酥而巳續捜神記曰晉孝武世宣城人􅁗精入武昌山中採茗忽見一人身長一丈通體毛精見之大怖自謂必死毛人牽其臂將至山中大叢茗處放之便去精因留採滇􅁷復來乃採懷中橘與精精甚怖􅀒茗而歸又曰桓宣武有一督將因時行病後虚熱更能飲􅃨茗必一斛二斗乃飽裁减􅂛合便以爲大不足非復一日家貧後有客造之正遇其飲􅃨茗亦先聞世有此病仍令更進五􅂛乃大吐有一物出如􅂛大有口形質縮縐狀似牛肚客乃令置之於盆中以一斛二斗􅃨茗澆之此物噏之都盡而止覺小腹又増五􅂛便悉混然從口中涌出旣吐此物病遂差苦問之此何病荅云此病名斛茗瘕異􅁐曰剡縣陳矜妻少寡與二子同居奸飲茶家有古􅊘毎飲輙先祠之二子欲掘之母止之夜夢人云吾止此􅊘三百餘年今二子􅁪欲見毀頼相保護又享吾佳茗雖潜朽壤豈忘翳桑之報及曉於庭中獲錢十萬似乆埋者唯貫新母告二子禱祠愈切世􅀃曰任瞻少時有令名自過江失志旣不飲茗問人云此爲茶爲茗覺人有怪色乃自申明之曰向問飲爲熱爲冷又曰晉司徒長史王濛好飲茶人至輙命飲之士大夫皆患之毎欲徃候必云今日有水厄江氏􅀓曰統遷􅉖懷太子洗馬甞上䟽諌云今西園賣}
