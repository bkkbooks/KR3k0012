  - {type: variant, offset: 25, length: 9, content: 掌共五齊七菹凡醯物, SBCK: 要畧委所由定二等時估每十稅一價錢充所放兩稅其明年巳後所得稅外収貯􅀂諸州遭水旱賦稅不辦}
  - {type: variant, offset: 25, length: 97, content: 掌共五齊七菹凡醯物以共祭祀之齊菹凡醯醬之物賓客亦如之齊菹醬屬醯人者皆酒醯成味王舉則共齊菹醯物六十罋共後及世子之醬齊菹賓客之禮共醯五十罋凡事共醯儀禮曰醯醢百罋夾碑十以為列禮曰宋襄公葬其大人醯醢百甕, WYG: 求茶}
