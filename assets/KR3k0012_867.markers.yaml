  - {type: variant, offset: 9, length: 0, content: '', SBCK: 品益衆劒南有􅀩頂石花或散牙號爲第一湖州顧渚之紫笋東川有神泉昌明硤州有碧澗明月房茱茰寮福州有方山之生牙䕫州有香山江陵有南木湖南有衡山岳州有㴩湖之舎膏常州有義興之紫笋婺州有東白睦州有鳩坈洪州有西山之白露壽州有霍山之黄芽蘄門之啇貨不在焉又}
  - {type: variant, offset: 9, length: 0, content: '', krp: 品益衆劒南有蒙頂石花或散牙號爲第一湖州顧渚之紫笋東川有神泉昌明硤州有碧澗明月房茱茰寮福州有方山之生牙䕫州有香山江陵有南木湖南有衡山岳州有㴩湖之舎膏常州有義興之紫笋婺州有東白睦州有鳩坈洪州有西山之白露壽州有霍山之黄芽蘄門之啇貨不在焉又}
