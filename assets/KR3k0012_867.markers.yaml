  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_867-1a, image: WYG0900/WYG0900-0569a.png}
  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第八百六十七}
  body:
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 五茗爾雅曰檟苦茶樹小似梔子冬至生葉可煑作羮飯今早採者爲茶晚採者爲茗一名􅈋蜀人名爲苦茶吴志曰孫皓每宴席無不能酒率以七􅂛爲限雖不悉入口澆灌取盡韋曜飲酒不過二􅂛􅀄見禮異宻賜茶茗以當酒晉中興書曰陸納爲呉興太守時衛將軍謝安甞欲詣納納兄子俶恠納無所備不敢問之乃􅀻蓄十數人饌安旣至納所設唯茶果而巳俶遂陳盛饌珎羞必具及安去納杖俶}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 五茗爾雅曰檟苦茶樹小似梔子冬生葉可煑作羮食今呼早採者為茶晩採者為茗一名荈蜀人名為苦茶吳志曰孫皓每宴坐席無能否毎率以七升為限雖不能入口澆灌取盡韋曜飲食不過三升初見禮異密賜茶茗以當酒晉中興書曰陸納為吳興太守時衛將軍謝安嘗欲詣納納兄子俶怪納無所備不敢問之乃私蓄十數人饌安既至納所設唯茶果而已俶陳盛饌珍羞畢具及安去納杖俶}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_867-1b, image: WYG0900/WYG0900-0569b.png}
  - {type: variant, offset: 5, length: 0, content: '', krp: 五茗爾雅曰檟苦茶樹小似梔子冬至生葉可煑作羮飯今早採者爲茶晚採者爲茗一名苑蜀人名爲苦茶吴志曰孫皓每宴席無不能酒率以七升爲限雖不悉入口澆灌取盡韋曜飲酒不過二升𥘉見禮異宻賜茶茗以當酒晉中興書曰陸納爲呉興太守時衛將軍謝安甞欲詣納納兄子俶恠納無所備不敢問之乃私蓄十數人饌安旣至納所設唯茶果而巳俶遂陳盛饌珎羞必具及安去納杖俶}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_867-bkkxmlele1}
