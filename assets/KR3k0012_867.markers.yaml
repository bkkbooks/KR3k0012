  - {type: variant, offset: 334, length: 4, content: 磔於猛火, WYG: 不眠又曰茶花状似梔子其色稍白永嘉圖經曰縣東有白茶山吴興記曰烏程縣西温山出御荈淮隂圖經曰山陽縣南首二十里有茶坡茶陵縣圖經曰茶陵者謂山谷生茶茗本草拾遺曰臯盧苦平作飲止渇除疫不睡利水道明目生南海諸山中南人極重之廣州記曰酉平縣出臯盧茗之别名葉大而澁南人以為飲南越志曰茗苦澁亦謂之過羅陸羽茶經曰茶者南方嘉木自一尺二尺至數十尺其巴川峽山有兩人合抱者伐而掇之其樹如𤓰蘆葉如梔子花如白薔薇實如栟櫚蒂如丁香根如胡桃其名一曰茶二曰檟三曰蔎四曰茗五曰荈檟苦茶蜀西南人謂茶曰蔎早取為茶晩取為茗其上者生爛石中者生礫壤下者生黄土凡藝而不實植而不茂法如種􅆶三嵗可採陽崖隂林紫者上緑者次笋者上牙者次葉卷者上葉舒者次凡採茶在二月三月四月間茶之笋者生爛石沃土長四五寸若蕨薇始抽凌露采焉茶之牙發扵藂薄}
