  - {type: variant, offset: 522, length: 347, content: 醢七菹三臡實之齊當為齏五齏昌本脾析蜃豚拍深蒲也十醢醓蠃蠯蚳魚兔鴈醢七菹韭菁茆葵芹箈筍三菹臡麋鹿麋臡也凡醢醬所和細切為齏全物若䐑為菹也賓客之禮共醢五十罋致罋餼時凡事共醢禮曰孔子哭子路於中庭寢中庭也與哭師同親之有人吊者夫子拜之為之主也既哭進使者而問故使者自衛來計者故謂死之意狀使者曰醢之矣時衛世子蒯聵纂輒而立子路死之醢之者爾欲啖食以悕眾遂命覆醢覆棄之不忍食禮記外傳曰祭祀賓客菹醢之用醢肉醬之通名醢汁也湆亦汁也此等皆在豆以其濕故也籩竹器何盛乾也豆木也皆跌足取其去地高潔醢有陸產畜之所生在陸者有水物天地陰陽之炁所生水草之品非人力所種自然潔臡者骨肉相雜為之有麋鹿麇之臡麇大獐也字或作䴦兔醢蚔醢皆陸產也砥蟻卵也有魚鴈蠃蜱之醢蜃蛤之類也蜃似蚌而長也五者水物崔寔四民月令曰五月一日可作醢弘君舉食檄曰東里獨姥之醢, SBCK: ''}
