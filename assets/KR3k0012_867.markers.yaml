  - {type: variant, offset: 23, length: 1, content: 醯, SBCK: 貞元九年春􅀄稅茶先是諸道塩鐵使張滂奏曰伏以去秋水災詔令减稅今之國用湏有供備伏請出茶州縣及茶山外啇}
  - {type: variant, offset: 23, length: 1, content: 醯, krp: 貞元九年春𥘉稅茶先是諸道塩鐵使張滂奏曰伏以去秋水災詔令减稅今之國用湏有供備伏請出茶州縣及茶山外啇}
