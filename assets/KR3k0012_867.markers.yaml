  - {type: variant, offset: 286, length: 10, content: 酒暴熟者酢醢酸者易臭, SBCK: 飲真茶令少眠睡神農食經曰茶茗冝乆服令人有力恱志}
  - {type: variant, offset: 286, length: 0, content: '', WYG: 飲真茶令少眠睡神農食經曰茶茗宜久服令人有功悦志本草曰茗苦茶味甘苦微寒無毒生瘻瘡利小便少睡去痰渇消宿食冬生益州川谷山陵道旁凌冬不死三月二日捋乾華佗食論曰苦茶久食益意思壺居士食忌曰苦茶久食羽化與韮同食令人身重陶𢎞景新録曰茗茶輕身換骨古丹邱子黄山君服之王浮神異記曰餘姚人虞洪入山采茗遇一道士牽三青牛引洪至瀑布山曰吾丹邱子也聞子善具飯常思見惠山中有大茗可以相給祈子他日有鷗蟻之餘不相遺也因立奠祀后令家人入山獲大茗焉廣陵耆老傳曰晉元帝時有老姥每旦擎一器茗往市易之市人競買自旦至暮其器不減茗所得錢散路傍孤貧乞人人或異之執而繋之於獄夜擎所賣茗器自牖飛去廣志曰茶叢生真煮飲為茗茶茱萸檄子之屬膏煎之或以茱萸煮脯胃汁為之曰茶有赤色者亦米和膏煎曰無}
