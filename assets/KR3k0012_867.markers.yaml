  - {type: variant, offset: 301, length: 0, content: '', WYG: 為大不足非復一日家貧后有客造之正遇其飲複茗客嘗聞世有此病仍令更進五升乃大吐有一物出如升大有口形質縮縐状如牛肚客乃令置之於盆中以一斛二斗複茗澆之此物噏之都盡而止覺小脹又増五升便悉混然從口中涌出既吐此物病遂差問此何病答云此病名斛茗瘕異苑曰剡縣陳矜妻少寡與二子同居好飲茶家有古􅊘每飲輒先祠之二子欲掘之母止之夜夢人云吾止此􅊘三百餘年今二子恒欲見毁頼相保䕶又享吾佳茗雖潜朽壤豈忘翳桑之報及曉於庭中獲錢十萬似乆埋者惟貫新母告二子祠禱愈切世説曰任瞻少時有令名自過江失志既不飲茗問人云此為茶為茗覺人有怪色自申明之曰向問飲為熱為冷又曰晉司徒長史王濛好飲茶人至輒命飲之士大夫皆患之每欲往候必云今日有水厄江氏傳曰統遷愍懹太子洗馬嘗上疏諫云今西國賣}
