  - {type: variant, offset: 16, length: 3, content: 酢且苦, SBCK: 育爲弟子稍長自筮遇蹇之漸繇曰鴻漸于陸羽可用爲儀乃姓陸氏字鴻漸名羽羽有文學多意思耻一物不盡其妙茶術最著鞏縣爲瓷偶人號陸鴻漸買十器得一鴻漸市人沽茗不利輙灌之羽於江湖稱竟陵人於南越稱桑苧翁貞元末卒又曰韓滉聞奉夭之難以采練囊緘茶末徤歩其以進}
