  - {type: variant, offset: 331, length: 2, content: 召富, krp: 乾茶二斤薑一斤桂一斤皆所湏也吾體中煩悶恒假負茶汝可信信致之傳咸司隷教曰聞南方有蜀嫗作茶粥賣廉事歐其器具無爲又賣餅於市而禁茶粥以囷蜀姥何哉坤元録曰辰州溆浦縣山上多茶樹括地圖曰臨城縣東北一百四十里有茶山茶溪天台記曰丹丘出大茗服之生羽翼夷陵圖經曰黄木女觀望州等山茶茗出焉楊衒之洛陽伽籃記曰彭城王勰戲謂王肅曰卿不重齊魯大邦而愛邾莒小國肅對曰郷曲所羙不得不好勰復謂曰卿明日顧我爲卿設邾莒之飡亦有酪奴因此復號茗取飲爲酪奴時給事中劉縞慕肅之風専習茗飲彭城王謂縞曰卿不慕王侯八珎如好蒼頭水厄海上有逐臰之夫里内有學嚬之婦以卿言之是也其彭城王家有呉嫗以此言戲之自是朝貴讌㑹雖設茗飲皆耻不復食雖江表殘民逺來降者侍中元义欲爲之設茗先問卿於水厄多少蕭正德不暁}
