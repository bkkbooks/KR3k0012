  - {type: variant, offset: 290, length: 6, content: 酢醢酸者易臭, WYG: 有桂花氣兼服茶酥而已續搜神記曰晉孝武世宣城人秦精入武昌山中採茗忽見一人身長一丈通體皆毛精見之大怖自謂必死毛人牽其臂将至山曲大叢茗䖏放之便去精因留採須臾復來乃探懐中橘與精精甚怖負茗而歸}
