  - {type: variant, offset: 334, length: 1, content: 磔, SBCK: 意荅下官雖生水郷立身巳來不遭陽侯之難舉坐􅀏焉桐君録曰西陽武昌晉陵皆出好茗巴東別有真香茗煎飲令人不眠又曰茶花狀如梔子其色稍白永嘉圖經曰縣東有白茶山呉興記曰烏程縣西有温山出御􅈋淮隂圖經曰山陽縣南二十里有茶坡茶陵縣圖經曰茶陵者謂陵谷生茶茗本草拾遺曰皐盧茗作飲止渇除疫不睡利水道明目生南海諸山中南人極重之廣州記曰酉平縣出臯盧茗之利茗葉大而澁南人以爲飲南越志曰茗苦澁亦謂之過羅陸羽茶經曰茶者南方嘉木自尺二尺至數十尺其巴川峽山有兩合抱者伐而掇之其樹如􅀲蘆葉如梔子花如白薔薇實如栟櫚蔕如丁香根如胡桃其名一曰茶二曰檟三曰蔎四曰茗五曰荈周公云檟苦茶楊執戟云蜀西􅀯人謂茶曰蔎郭弘農云早取爲茶晚取爲茗一曰荈蔎音設荈音昌兖切其上者生爛石中者生櫟壤下者生黄土凢藝而不茂法如種􅋎三歳可採陽岸隂林紫者上緑者次笋者上牙者次葉卷者上葉舒者次凢採茶在二月三月四月之間茶之笋者生爛石沃土長四五寸􅀂薇蕨始抽陵露采爲茶之牙發}
