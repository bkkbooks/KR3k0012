  - {type: variant, offset: 6, length: 2, content: 醯釋, SBCK: 十云汝旣不能光益叔父柰何穢吾素業晉書曰夏侯愷亡後形見就家人求茶又曰桓温爲楊州牧性儉素毎讌唯下􅃮萯扑茶果而巳宋録曰新安王子鸞豫章王子尚詣曇濟道人於八公山道人設茶茗尚味之曰此甘露也何言茶茗焉南齊書曰武帝遺詁靈坐勿以牲爲􅀕唯設餅果茶飯酒脯而巳唐史曰風俗貴茶之}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_867-1b}
  - {type: variant, offset: 6, length: 3, content: 醯釋名, WYG: 十云汝既不能光益叔父奈何穢吾素業晉書}
  - {type: variant, offset: 6, length: 2, content: 醯釋, krp: 十云汝旣不能光益叔父柰何穢吾素業晉書曰夏侯愷亡後形見就家人求茶又曰桓温爲楊州牧性儉素毎讌唯下􅃮萯扑茶果而巳宋録曰新安王子鸞豫章王子尚詣曇濟道人於八公山道人設茶茗尚味之曰此甘露也何言茶茗焉南齊書曰武帝遺詁靈坐勿以牲爲祭唯設餅果茶飯酒脯而巳唐史曰風俗貴茶之}
