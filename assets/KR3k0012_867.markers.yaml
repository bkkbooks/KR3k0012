  - {type: variant, offset: 331, length: 2, content: 召富, SBCK: 乾茶二斤薑一斤桂一斤皆所湏也吾體中煩悶􅁪假􅀒茶汝可信信致之傳咸司􅈻教曰聞南方有蜀嫗作茶粥賣廉事歐其器具無爲又賣餅於市而禁茶粥以囷蜀姥何哉坤元録曰辰州溆浦縣山上多茶樹括地圖曰臨城縣東北一百四十里有茶山茶溪天台記曰丹丘出大茗服之生羽翼夷陵圖經曰黄木女觀望州等山茶茗出焉楊衒之洛陽伽籃記曰彭城王􅎰戲謂王肅曰卿不重齊魯大􅀖而愛邾莒小國肅對曰郷曲所羙不得不好􅎰復謂曰卿明日顧我爲卿設邾莒之飡亦有酪奴因此復號茗取飲爲酪奴時給事中劉縞慕肅之風専習茗飲彭城王謂縞曰卿不慕王侯八珎如好蒼頭水厄海上有逐臰之夫里内有學嚬之婦以卿言之是也其彭城王家有呉嫗以此言戲之自是朝貴讌㑹雖設茗飲皆耻不復食雖江表殘民逺來降者侍中元义欲爲之設茗先問卿於水厄多少蕭正德不暁}
  - {type: page-break, offset: 331, content: '', id: KR3k0012_SBCK_867-5a}
  - {type: variant, offset: 331, length: 2, content: 召富, WYG: 乾茶二斤薑一斤桂一斤皆所須也吾體中煩悶恒仰真茶汝可信致之𫝊咸司𨽻教曰聞南方有蜀嫗作茶粥賣亷事毆其器具使無為賣餅於市而禁茶粥以困蜀姥何哉坤元録曰辰州溆浦縣山上多茶樹括地圖曰臨城縣東北一百四十里有茶山茶溪天台記曰丹邱出大茗服之生羽翼夷陵圖經曰木女觀望州等山茶茗出焉楊􅃷之洛陽伽藍記曰彭城王勰戯謂王肅曰卿不重齊魯大邦而愛邾莒小國肅對曰鄉曲所美不得不好勰復謂曰卿明日顧我為卿設邾莒之食亦有酪奴因此復號茗飲為酪奴時給事中劉縞慕肅之風專習茗飲彭城王謂縞曰卿不慕王侯八珍而好蒼頭水厄海上有逐臭之夫里内有學顰之即婦以卿言之是也其彭城王家有吳奴以此言戲之自是朝貴讌會雖設茗飲皆恥不復食惟江表殘民逺來降者好之時侍中元义欲為之設茗先問卿於水厄多少正徳不曉义意答曰下官雖生水鄉立身已来不遭陽侯之厄舉坐笑焉桐君録曰西陽武昌晉陵皆出好茗巴東别有真香茗煎飲令}
  - {type: page-break, offset: 331, content: '', id: KR3k0012_WYG_867-8a, image: WYG0900/WYG0900-0572c.png}
