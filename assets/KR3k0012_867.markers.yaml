  - {type: variant, offset: 351, length: 5, content: 任迪簡萬年, WYG: 右補闕綦母景博學有著述才性不飲茶著代茶飲序其畧曰釋滯消壅一日之利蹔佳瘠氣侵精終身之累斯大獲益則歸功茶力貽患則不謂茶災豈非福近易知禍逺難見者乎雲南記曰名山縣出茶有山曰䝉山聨延數十里在縣西南按拾遺志尚書所謂蔡蒙旅平者䝉山也在雅州凡蜀茶盡出此魏王花木志曰茶葉似梔子可煮為飲其老葉謂之荈嫩葉謂之茗杜育荈賦曰調神和内倦解慵除張孟陽登成都樓詩云芳茶冠六清溢味播九區}
