  - {type: variant, offset: 4636, length: 4, content: 雅有度量, SBCK: 寳不許二月魏攻中山其夜尚書慕容皓謀殺寳立趙王麟寳與太子榮等萬􅀐就清河王㑹于薊以開封公慕容詳守中山五月詳遂僣稱尊號九月趙王麟率衆入中山殺詳麟復僣尊號中山飢麟出據新市與魏師戰于}
