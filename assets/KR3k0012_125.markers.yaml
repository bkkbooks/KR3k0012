  - {type: variant, offset: 999, length: 75, content: 毗及劉胤等率眾奔上邦六年二月石勒稱天王遣使拜駿征西大將軍涼州牧加五錫之禮八年群寮勸稱涼王置百官駿曰此非人臣所言敢有此言罪不在赦又請立世子乃立重華為世子, WYG: ''}
  - {type: substitution, offset: 1005, original: 眾, replacement: 衆, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19653}}
  - {type: variant, offset: 1008, length: 403, content: 邦六年二月石勒稱天王遣使拜駿征西大將軍涼州牧加五錫之禮八年群寮勸稱涼王置百官駿曰此非人臣所言敢有此言罪不在赦又請立世子乃立重華為世子十二月鄯善王元孟獻女殊好號曰美人立賓遐觀以處之十四年五月雨雪降霜駿避正殿素服命群寮極言得失十五年以右長史任處領國子祭酒立辟雍明堂而行禮焉命西曹掾集閤內外事付索綏以著涼春秋十一月以世子重華行涼州事十九年八月田于建西踰玉石縣九月改玉石縣為金澤縣二十一年始置百官官號皆擬天朝車服旌旗一如王者酒泉太守馬岌上言酒泉南山既崑崙之體周穆王見西王母樂而忘歸即謂此山有石室王母堂珠璣鏤飾煥若神宮禹貢崑崙在臨羗之西即此明矣宜立西王母祠以禆朝廷無疆之福駿從之二十二年六月薨于正德前殿年四十晉遣策贈大司馬謚忠成公七月葬大陵張祚僣號追尊文王廟號世祖張重華崔鴻十六國春秋前梁錄曰張重華字泰臨駿第二子寬和懿重沉毅少言駿薨右長史任處上華為使持節大都督太尉涼州牧護羗校尉西平公假涼王大赦境內三年九月晉遣使者拜, SBCK: 光爲}
