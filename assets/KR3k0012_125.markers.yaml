  - {type: variant, offset: 4644, length: 0, content: '', SBCK: 二月寳發龍城以撫軍慕容騰爲前軍歩􅀐三萬將南伐次于乙連長上叚速骨宋赤眉因民之憚逺役殺司空樂浪王宙衆旣幸亂投伏奔走寳馳還龍城又與長樂王盛等南奔尚書蘭汗殺速骨等十餘人奉太子榮承制大赦遣迎寳還于薊寳欲北還盛等咸以汙忠􅅃虚實未明宜就范陽王德寳從之乃自薊而南四月寳至鄴鄴中遺民固請留之寳不從南至􅀺陽城西聞范陽王德稱制懼而退乃還龍城次于廣都蘭汗又遣左將軍蘇超迎寳具申􅅃誠忠節無差寳於是命發汗遣弟難率五百􅀐逆寳至龍城難引寳入于外邸殺之年四十四殺太子榮及王公卿士百餘人汗自稱大將軍大單于昌􅀺王號年青龍七月長樂王盛襲誅汗盛即位僞謚寳惠愍皇帝廟號列宗慕容盛崔鴻十六國春秋後燕録曰慕容盛字道運寳之庶長子秦建元十年生于長安二十年符堅誅慕容氏盛奔東歸至垂問以西事􅀞地成圖垂􅀏謂之曰昔魏撫明帝之首遂乃侯之祖之愛孫有由來矣於是封長樂公建興六年領北中郎鎭薊進爵爲王及寳爲蘭難所殺盛馳赴哀盛潜結大衆謀討難及汗等斬之建平元年七月告成宗廟大赦改青龍元年謙揖自卑不稱尊號以長樂王稱制諸王貶爵爲公東陽公慕容根等九十八人上尊號盛不許十月根等又請盛許之丙子僣即皇帝位正月朝羣臣于承乾殿大赦改建平元年爲長樂元年二年正月大赦盛去皇帝之號稱庶民天王三年八月右將軍慕容國謀率禁兵襲盛前將軍叚璣等因衆心阻動潜於禁中鼔譟大呼盛聞變率左右出戰衆皆披潰一賊從闇中擊盛傷足遂取輦昇前殿召叔父河間公熈囑以後事熈未至而薨年二十九僞謚昭武皇帝廟號中宗晉書曰盛㓜而羈賤流漂長則遭家多難夷險安危備甞之矣懲寳闇而不斷遂峻極威刑纎介之嫌莫不裁之於未萌防之於未兆於是上下震恐人不自安雖推忠誠親戚亦皆離貳舊臣靡不夷㓕安忍無親所以卒於不免是歳隆安五年也慕容熈崔鴻十六國春秋後燕録曰慕容熈字道文一名長生垂之少子燕元二年生于常山建興八年封河間王永康初隨寳奔龍城拜司􅀠校尉長樂元年遷僕射中外督領昌􅀺尹盛薨遂僭即皇帝位大赦改長樂三年爲光始元年二年正月熈引見州郡􅂄舊于東宫問以民所疾苦司􅀠部民劉瓉對問稱旨拜帶方太守是春大治宫室四月}
