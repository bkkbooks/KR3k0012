  - {type: variant, offset: 4634, length: 1, content: 學, SBCK: 人倿巳叚后謂垂曰太子姿質雍容柔而不断非濟丗之雄遼西髙陽陛下兒之賢者宜擇一樹之垂不納謂曰汝謂我爲晉獻公乎建興十一年四月僭即皇帝位大赦改爲永康元年寳遣將軍趙王麟逼叚后曰常謂主上不能嗣守大統今竟能不冝早自裁以全叚氏后怒曰汝兄弟尚逼殺母豈能保守社稷吾豈惜死念國㓕不乆遂自殺八月立妃叚氏爲皇后濮陽公榮爲皇太子二年正月魏使脩}
