  - {type: variant, offset: 455, length: 138, content: 固辭驍騎將軍請還涼州帝許之改授議郎西中郎將建興元年長史張璽等表寔嗣位十月帝遣使授西中郎將涼州刺史西平公二年十一月帝將降劉曜進寔侍中司空涼州牧三年始知劉曜逼遷天子平陽大臨三日五年南陽王寶聞愍帝崩自稱晉王號年建康置百官遣拜寔征西大將軍開府儀同三司增邑三千戶六年六月京兆人劉弘使左道, SBCK: 符丕}
  - {type: variant, offset: 455, length: 2, content: 固辭, WYG: 至于姑臧光臨薨執手戒之曰汝性麤武深爲吾憂開基既難守成不易善輔永業勿聽讒言光薨紹祕不發喪纂排閣入哭盡哀而出紹懼以位讓之曰兄功高年長宜承大綂纂曰臣雖長陛下國家之適不可以私愛而亂大倫}
  - {type: variant, offset: 455, length: 3, content: 固辭驍, krp: 符丕以光爲車}
  - {type: variant, offset: 459, length: 8, content: 將軍請還涼州帝許, WYG: 吕超謂紹曰纂臨喪不哀步高視逺觀其舉止恐成大變宜早除}
  - {type: variant, offset: 459, length: 499, content: 將軍請還涼州帝許之改授議郎西中郎將建興元年長史張璽等表寔嗣位十月帝遣使授西中郎將涼州刺史西平公二年十一月帝將降劉曜進寔侍中司空涼州牧三年始知劉曜逼遷天子平陽大臨三日五年南陽王寶聞愍帝崩自稱晉王號年建康置百官遣拜寔征西大將軍開府儀同三司增邑三千戶六年六月京兆人劉弘使左道以眩惑百姓密與寔左右十餘人謀殺寔皆懷刀入內斬寔於外寢時年五十葬寧陵晉王寶冊贈寔大司馬涼州牧謚元公張祚僣號追尊曰明王廟號高祖張茂崔鴻十六國春秋前梁錄曰張茂字成遜寔之母弟虛靖好學不以勢利為心建興元年相國南陽王寶辟從事中郎又薦為給事黃門侍郎皆不就二年徵為侍中以父疾固辭四年拜秦州刺史加散騎常侍領雍州皆不受寔左司馬陰元等以寔既初害于駿冲幼宜立長君乃推茂為大都督太尉涼州牧茂不從以平西將軍行都督涼州諸軍事護羌校尉涼州牧西平公大赦境內九月立寔子駿為世子三年劉曜遣鴻臚拜茂太師涼王四年茂寢疾執駿手泣曰吾先人以孝友見稱自漢以來世康忠順汝謹守忠節無或失墮薨于正寢年四十八劉曜遣使贈太宰謚成烈王張祚僣號追尊曰成王廟號太宗張駿崔鴻十六國春秋前涼錄曰張駿字公庭寔之世子永嘉元年生幼而奇偉十歲能屬文茂之四年拜使持節大都督大將軍梁州牧西平公大赦境內劉曜遣使拜, krp: ''}
