  - {type: variant, offset: 922, length: 2, content: 奇偉, WYG: 取之垂曰彼悉心投命若何害之乃以兵屬垂垂至澠池言于堅曰王師不利北境之民或因此輕重請奉詔輯寧朔裔且龍鄴舊都陵廟所在乞過展拜以申罔極堅許之權翼諌曰垂爪牙名将今之韓白且世豪東夏志不為人下頃以避禍歸誠非慕徳而至恐冠軍之號不飽其志列地百里未滿其心且垂猶鷹也飢則附人飽便髙颺遇風塵之會必有凌霄之志堅曰卿言是也但朕已許之匹夫猶重信况萬乗之主乎翼曰陛下重小信而忽社稷臣見其往不見其還關東之變垂其首乎垂自凉馬臺結草筏而渡至安陽修箋于長樂公丕垂至館之于鄴西會苻暉告丁零翟斌聚衆四千謀逼洛陽丕于是配垂兵二千遣廣武将軍苻飛龍率氐騎一千為垂之副丕戒飛龍曰垂為三軍之統卿為謀垂之主苻暉告急簡書相尋垂方圖飛龍停河内不進悉誅氐兵命左右殺飛龍濟河焚橋衆至三萬及洛陽苻暉閉關門拒守不與交通翟斌率衆會垂勸稱尊號垂曰新興侯國之正統孤之君也若以諸軍之力得平関東當以大義喻秦奉迎反正誣上自尊非孤心也乃自稱大将軍燕王承制行事翟斌為建義将軍封河南王弟德為范陽王衆至二}
