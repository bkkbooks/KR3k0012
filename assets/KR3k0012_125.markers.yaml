  - {type: variant, offset: 3744, length: 518, content: 司領護西戎校尉沙州牧燉煌公承制玉門以西寶寬雅有度量甚著威惠於西土在燉煌三年徙并州刺史薨謚宣公自暠元年歲在庚子至為蒙遜所滅二十一年北涼沮渠蒙遜崔鴻十六國春秋北涼錄曰沮渠蒙遜臨松盧水胡人其先世為匈奴左沮渠遂以官為氏遜好學涉群史雄烈有英略後涼龍飛二年遜伯父羅仇麴粥從呂光征河南光前軍大敗皆為光所煞宗部會葬者萬餘人遜哭謂眾曰昔漢祚中微吾之乃祖翼獎竇融保寧河右呂王耄荒虐民無道豈可坐觀成敗不上繼先祖安民之志下使二父有恨黃泉眾咸稱萬歲遂立盟約一旬之間眾至萬餘與從兄男成推建康太守叚業為涼州牧康公改龍飛二年為神璽元年業以遜為張掖太守男成為輔國大將軍委以軍國之任永安元年三月遜以為業所憚內不自安請為安西太守四月業收男成賜死遜聞男成死泣告眾曰男成忠於叚公枉見屠害諸君能為報仇乎成素有恩信眾皆憤泣從之北至氐地眾餘一萬業遣右將軍田昴武衛將軍梁中庸等攻侯塢遜自氐地救之昴率騎五百歸遜軍遂大潰中庸來奔五月遜至張掖田昴兄子承愛斬關內遜業左右散走遜大呼曰鎮西何在軍人曰在此業曰孤單飄一巳為貴門所推可見乞餘命投身嶺南庶得東西與妻子相見遜遂斬之六月右長史梁中庸等推遜為大將軍涼州牧張掖公大赦改元四年秦遣鴻臚梁斐拜遜鎮西大將軍開府儀同三司沙州牧西海公九年二月兩月並出正始元, WYG: ''}
