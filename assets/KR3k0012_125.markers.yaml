  - {type: variant, offset: 3259, length: 466, content: 之序文寫諸葛亮訓厲以誡諸子十三年正月寢疾顧命長史宋繇曰吾終之後嗣子猶卿子也善相輔導二月薨于恭德殿年六十七葬建世陵謚昭武王廟號太祖初暠為群雄所推定千里之地謂張氏之業不足成河西十郡歲月而一既而傉檀入據姑臧蒙遜基宇稍廣於是慨然著述志賦初河右不生楸槐張駿之世取秦隴植之皆死至是而酒泉宮西北有槐生焉乃作槐樹賦又作婦辛氏誄自餘賦數十篇李歆崔鴻十六國春秋西涼錄曰李歆字士業暠弟二子暠薨左長史宋謠等上為大將軍涼公領涼州牧護羗校尉大赦改年為嘉興元年七月歆聞蒙遜南伐西秦命中外戒嚴將攻張掖尹太后以為不可宋繇亦諫歆怒不從遂率步騎三萬東伐次于都瀆澗蒙遜自浩舋來戰于懷城歆敗左右勸還歆曰吾違太后明誨遠取敗辱不煞此胡復何面目以見母也勒眾復戰敗于蓼泉為遜所煞歆弟驍騎將軍翻擊虜將軍豫等西奔燉煌遜遂入酒泉翻及燉煌太守恂與諸子等棄燉煌奔於北山郡人宋承弘等以恂在郡有惠政密信招恂恂率數千騎入於燉煌宋承推恂為涼州刺史遜率眾二萬攻恂宋承等開門出降恂自煞恂暠之第六子也遜獲翻子寶徙于姑臧歲餘北奔伊吾後二十餘年至魏太平三年寶自伊吾率流人及虜騎南壟燉煌據之遣使降魏魏以寶為使持節, WYG: ''}
