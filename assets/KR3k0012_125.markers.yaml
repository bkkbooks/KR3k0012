  - {type: variant, offset: 3175, length: 136, content: 明王忠臣孝子烈士貞女親為序頌以作鑒戒五年正月立泮宮增高門學生百人四月燉煌有葛緣木而生作黃烏之形世子譚卒九月立好歆為世子正月大赦改年為建初元年三月讌于曲水命群寮賦詩暠規為之序文寫諸葛亮訓厲以誡諸子十三年正月寢疾顧命長史宋繇曰吾終之後嗣子猶卿子也善相輔導二月薨于恭德殿年六十七, SBCK: ''}
