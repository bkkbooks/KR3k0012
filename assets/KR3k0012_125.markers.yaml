  - {type: variant, offset: 2173, length: 0, content: '', WYG: 慕容雲為主發尚方徒五千人分屯四門入宫授甲閉門拒守中黄門趙洛生奔告熈熈曰此鼠盗耳朕還當誅之乃收髮貫甲馳還赴難夜就城攻北門不尅遂入龍騰苑左右潰散熈微服逃于林中為人執送雲等殺之年二十三雲葬之徽平陵諡曰昭文皇帝晉書曰垂以孝武帝太元八年僣立至熈四世凡二十}
