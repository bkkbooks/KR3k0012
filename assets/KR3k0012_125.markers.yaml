  - {type: variant, offset: 2704, length: 428, content: 為左夫人七月大水地震西平五十日中地十動土樓崩天錫疾美人閻姬薛姬皆自殺二姬國色並有殊寵天錫每謂之曰汝二人將何以報我我死之後豈可更為人妻皆曰尊若不諱妾請效死於前洒掃於地下無他志十月天錫疾瘳大赦境內追悼二姬葬以夫人禮十三年五月符堅遣武衛將軍茍長等率眾十萬來伐天錫遣中衛將軍史景等拒戰赤岸為秦所敗天錫納左長史馬芮之言面縛降秦東徙長安拜歸義侯北部尚書遷右僕射隨符堅敗於淮南又入晉為員外散騎常侍復本封薨贈鎮西將軍謚悼公張軌以晉永寧九年辛酉之歲牧涼州至天錫敗亡之歲歲在丙午八主七十六年西涼李暠崔鴻十六國春秋西涼錄曰李暠字玄盛隴西狄道人也漢前將軍廣十六世孫廣子侍中敢之後世李為為西州右姓祖父弇音掩前涼武衛將軍天水太守安世亭侯父昶字中堅幼有令名世子侍講年十八卒暠昶之遺腹子少而好學沉敏有器度後涼龍飛二年建康太守叚業自稱涼牧號神璽元年拜暠郊穀令二年燉煌索仙等以暠溫毅有惠政推暠為燉煌太守叚業復暠鎮西將軍領護西夷校尉庚子元年十一月晉昌太守唐瑤移檄六郡推暠為大將軍涼公領秦涼二州牧, WYG: ''}
