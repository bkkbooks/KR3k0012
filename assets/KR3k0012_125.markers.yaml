  - {type: variant, offset: 2159, length: 2, content: 外諸, WYG: 占之曰月臣也龍君也月化為龍當有臣為君寤而告人曰國符其将盡乎是月為苻后起承華殿髙承光一倍負土於北門土與穀同價典}
  - {type: variant, offset: 2162, length: 1, content: 事, WYG: 杜静載棺詣闕上書諫大怒斬之后嘗季夏思凍魚鱠冬須生地黄皆下有司切青不得加以大辟四月苻后崩熈悲號躃踊若喪考妣擁其尸而撫之曰體已就冷命遂斷矣于是僵仆氣絶乆而乃蘇服斬縗食粥百寮于宫内設位哭臨使有司按檢哭者有涙以為忠孝無淚則加罪羣臣震懼莫不含辛以為淚髙陽王妃張氏熈之嫂也美姿容熈欲以為殉乃毁其禭鞾中有弊氈遂賜死三女叩頭求哀熈弗許營陵周輪數里下固三泉内圖畫}
