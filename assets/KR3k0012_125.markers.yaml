  - {type: variant, offset: 903, length: 9, content: 涼錄曰張駿字公庭寔, WYG: 二齒慕容雋即王位因改名􅆙外以慕郤􅆙為名内惡而改之尋以讖記之文去夬以垂為名及雋僣稱尊號封吳王建熙十年以車騎大将軍敗桓温于枋頭威名大震太𫝊上庸王評深忌之垂遂出奔秦苻堅聞垂至大悦郊迎執手禮之甚重王猛惡垂雄畧勸堅殺之堅不從以為冠軍将軍封賔都侯厯京兆尹苻堅敗于淮南垂軍獨全堅以千餘騎奔}
