  - {type: variant, offset: 4645, length: 2, content: 為世, krp: 符貴人爲昭儀五月築龍騰苑廣十里餘役徒二萬起景雲山于苑内又起逍遙宮甘露殿連房數百觀閣相交鑿天河渠引水入宫又爲符昭儀鑿曲光海淸涼池季夏暑熱士卒不得休息􅠽死者半四年二月昭儀符氏卒符貴嬪爲皇后九月符后遊畋熈從之北登白鹿山東過青嶺南臨滄海冬十一月乃還百姓苦之士卒爲虎狼所害及凍死者五十餘人五年十月擬鄴之鳳陽作弘光門累級三層建始元年正月大赦天下三月太史丞梁延年夢月化爲五白龍夢中占之曰月臣也龍君也月化爲龍當有臣爲君寤而告人曰國祚其將盡乎是日符后起承華殿髙承光一倍負土於北門土與榖同價典軍杜静載棺詣闕上書諌熈大怒斬之后嘗季夏思凍魚繪冬須生地黃皆下有司切責不得加以大辟四月符后卒熈悲號躃踊若喪考妣擁其尸而撫之曰體巳就冷命遂斷矣於是僵仆絶息乆而乃蘇服斬縗食粥百寮宮内設位哭臨有司桉檢哭者有淚則不無淚則加罪羣臣振懼莫不含辛以爲淚髙陽王妃張氏熈之嫂也美姿容熈欲以爲殉乃毀其禭鞾中有弊氊遂賜死三女叩頭求哀熈弗許營陵周輪數里下固三泉内圖畫尚書八座之像熈曰善爲之朕將隨后入此陵轜車髙大毀北門而出中衛將軍馮跃左衛將軍張興先皆㘴事亡奔以熈政之虐也與跃從兄萬泥等三十二人結盟推夕陽公慕容雲爲主發尚方徒五千人分屯四門入宮授甲閉門拒守中黃門趙洛生奔告熈熈曰此䑕盗耳朕還當誅之乃収髮貫甲馳還赴難夜至龍城攻北門不尅遂入龍騰苑左右潰散熈微服逃于林中爲人執送雲等殺之年二十三雲葬之徽平陵謚曰昭文皇帝晉書曰垂以孝武帝太元八年僭立至熈四丗凡二十四年以安帝伐熈二年㓕慕容雲崔鴻十六國春秋後燕録曰慕容雲字}
