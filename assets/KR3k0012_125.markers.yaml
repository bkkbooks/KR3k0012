  - {type: variant, offset: 1418, length: 1197, content: 諸軍事大將軍涼州刺史領護羗校尉西平公重華以位號未稱怒不授詔群寮上重華為丞相涼王雍秦涼三州牧五年重華讌群寮于閑預庭講論經義顧問索綏曰孔子婦誰家女老聃父字為何四皓既安大子住乎還山乎綏曰孔子婦姓并官氏女聃父名乾字元杲胎則無耳一目不明孤單年七十二無妻與鄰人益壽氏老女野合懷胎十年乃生老子四皓還否臣所未悉重華曰卿不知乎四皓死于長安有四皓冢為不還山也七年十月重華寢疾臨春坊遣左長史馬岌策拜子靈曜為世子大赦境內十一月薨于平章殿年二十七葬顯陵張祚僭號追謚桓王廟號世祖張祚崔鴻十六國春秋前涼錄曰張祚字太伯駿之長庶子博學雄武有政治之才駿之二十一年拜延興太守封寧侯重華薨子靈曜嗣七年十一月右長史趙長等矯稱遺令以祚為使持節都督中外諸軍事撫軍大將軍輔政十二月趙長等議以靈曜冲幼世難未夷宜立長君廢曜為涼寧侯立祚為大將軍護羗校尉涼州牧涼公趙長等議僭即王位于謙光殿大赦改年為和平元年立叱千氏為皇后子太和為太子封弟夫錫為長寧侯重華少子玄靖為涼武侯置百官二月尊祖父郊祀天地二年有神降於玄武殿自稱玄冥與人交語祚日夜祈之神言與福利祚甚信之征東張瓘遣兵傳檄廢祚以侯還弟復立靈曜八月祚收瓘弟琚及其子嵩等驍騎將軍宋混兄脩素與祚有隙祚疑之混西奔招合夷晉眾至萬餘人還向姑臧祚大懼遣楊秋胡將靈曜於菀拉音獵其腰而殺之埋於沙坑九月宋混次于武始大澤為靈曜發哀閏月混至姑臧祚登神雀觀張琚張嵩煞祚守卒死者四百餘人斬西門關內混領軍趙長開宮門以應琚長馳入殿中大呼稱萬歲祚以長敗賊下觀勞之長奮槊音朔刺祚中額奔入萬秋閣為廚士徐里所殺以庶人禮葬之天錫即位備禮改葬于愍陵追謚威王封子廷堅為金澤侯張玄靖崔鴻十六國春秋前涼錄曰張玄靖字元安重華少子母郭夫人和平二年宋混張琚等上玄靖為大將軍涼州牧護羗校尉西平公時年七歲張瓘至姑臧推立玄靖為大將軍涼王自為使持節都督中外諸軍事尚書令涼州牧張掖郡公四年五月東菀大冢上忽有池東天澤地燃廣袤豪數大執法御史杜逸言於瓘曰此皆變之大者可移之佗族瓘徵兵數萬集於姑臧謀討宋氏混與弟澄及左右壯士楊和等四十餘騎奄入南城申令諸營曰張瓘謀逆被太后詔誅之俄而眾至二千瓘率眾出戰混擊敗之眾悉去瓘自殺混入見玄靖以混為使持節都督中外諸軍事驃騎大將軍酒泉郡侯輔政五年六月大旱令諸祈雨之官皆詠雲漢詩儒林祭酒索綏曰雲漢陳周宣之美非旱之文昔神鼎之出漢虞丘不賀今辭與事違恐非致澤之意也綏字士艾燉煌人父戢晉司徒綏家貧好學舉孝廉為記室祭酒母喪去官又舉秀才著涼春秋五十卷又作六夷頌符命傳十餘篇以著述之功封平樂亭侯六年宋混卒天錫以使持節都督中外諸軍輔政八月右將軍齊肅等議以靖多難務殷須立長君勸天錫自立閏月天錫遣肅等夜害玄靖時年十四葬平陵謚冲王張天錫崔鴻十六國春秋前涼錄曰張天錫字純嘏駿之少子母曰劉美人玄靖八年即位年十八謁于太廟尊母劉氏為太后元年四月秦遣鴻臚回國拜天錫大將軍涼州牧西平公三年姑臧北山楊樹生松葉西苑牝鹿生角東苑銅佛生毛延興地震陷裂水出天錫避正殿引咎責躬晉遣使拜隴右關中, SBCK: ''}
