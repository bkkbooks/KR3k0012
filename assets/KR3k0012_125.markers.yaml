  - {type: variant, offset: 19, length: 3, content: 張軌字, SBCK: 此非常人言之符堅舉賢良除美陽令民夷憚愛隣境肅淸遷鷹揚將軍以功賜爵􅀜內侯建元十九年以光爲使持節西討諸軍率將軍姜飛彭晃杜進等歩􅀐七萬討西域十二月至􅀛兹􅀛兹王帛純捍命不降光軍其城南五里爲一營深溝髙壘廣設疑兵爲木被甲羅之壘上以爲持乆之計二十年五月帛純乃傾財寶請救於獪胡獪胡王遣弟率二十餘萬救之胡便弓馬善矛槊鎧如連鏁射不可入乃以革索爲骨䇿馬擲人多有中者衆甚憚之姑默宿尉頭等國及諸胡外內七十萬人光遷營相接陣爲勾鏁之法精􅀐爲遊軍彌縫其闕秋七月戰于城西大敗之帛純逃奔王侯降者三十餘國進入其城城有三重廣輪與長安地等城中塔廟千數帛純宫室壯麗煥􅀂神居胡人奢侈富於生養家有蒲桃酒至千斛經十年不敗}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_SBCK_125-2a}
  - {type: variant, offset: 19, length: 3, content: 張軌字, WYG: 此非常人言之苻堅舉賢良除美陽令民夷憚愛隣境肅清遷鷹揚将軍以功賜爵關内侯建元十九年以光為使持節都督西討諸軍事率将軍姜飛彭晃杜進康盛等率歩騎七萬討西域十二月至龜兹龜兹王帛純捍命不降光軍其城南五里為一營深渠髙壘廣設疑兵為木人被甲羅之壘上以為持乆之計二十年五月帛純乃傾國財寶請救于徻胡王遣弟呐龍侯将馗率騎二十餘萬救之胡便弓馬善矛槊鎧如連鏁射不可入及以革索為羂策馬擲人多有中者衆甚憚之從征諸將咸欲每營結陣按兵以拒諸胡光遷營相接陣為勾鏁之法精騎為遊軍彌縫其闕秋七月戰于城西大敗之帛純逃奔王侯降者三十餘國進入其城城有三重廣輪與長安城等城中塔廟千數帛純宫室壮麗煥若神居胡人奢侈富于生養家有蒲桃酒至千斛經十年不敗}
