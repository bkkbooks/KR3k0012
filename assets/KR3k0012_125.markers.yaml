  - {type: variant, offset: 2158, length: 0, content: '', WYG: 領昌黎尹盛薨僣即皇帝位大赦改長樂三年為光始元年二年正月熈引見州郡耆舊于宫問以民間疾苦司𨽻部民劉瓉對問稱㫖拜帶方太守是春大治宫室至四月立苻貴人為昭儀五月築龍騰苑廣十里餘役徒二萬起景雲山于苑内又起逍遥宫甘露殿連房數百觀閣相交鑿天河渠引水入宫又為苻昭儀鑿曲光海清凉池季夏暑熱士卒不得休息暍死者大半四年二月昭儀苻氏卒立苻貴嬪為皇后九月苻后遊畋熈從之北登白鹿山東過青嶺南臨滄海冬十一月乃還百姓苦之卒為狼虎所害及凍死者五千餘人五年十月擬鄴之鳯陽作𢎞光門累級三層建始元年正月大赦天下三月太史丞梁延年夢月化為五白龍夢}
  - {type: page-break, offset: 2158, content: '', id: KR3k0012_WYG_125-13a, image: WYG0894/WYG0894-0175a.png}
