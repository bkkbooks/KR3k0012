  - {type: variant, offset: 4014, length: 0, content: '', SBCK: 將軍封賔都侯歷京兆尹符堅敗於淮南垂軍獨全堅以千餘􅀐奔之丗子言於垂曰家國傾䘮皇綱廢㢮當隆中興之業建少康之功宜恭承皇天之意因而取之垂曰彼悉心投命􅀂何害之乃以兵屬垂垂至澠池言於堅曰王師不利北境之民或因此輕動臣請奉詔輯寧朔裔且龍鄴舊都陵廟所在乞過展拜以申罔極堅許之權翼諌曰垂􅀲牙名將今之韓白且丗豪東夏志不爲人下頃避禍歸誠非慕義也而恐冠軍之號不飽其志列地百里未滿其心且垂猶鷹也飢則附人飽便髙颺遇風塵之㑹必有凌霄之志堅曰卿言是也但朕巳許之匹夫猶重信況萬乗之主乎翼曰陛下重小信而輕忽社稷臣見其往不見其還􅀜東之變垂其首乎自涼馬臺結草筏而渡至安陽脩牋於長樂公丕垂至館之於鄴西㑹符暉告丁零翟斌聚衆四千謀逼洛陽丕於是配垂兵二千遣廣武將軍符飛龍率氏􅀐一千爲垂之副貳戒飛龍曰垂爲三軍之統卿爲垂之謀主符暉告急簡書相㝷垂方圖飛龍停河內不進悉誅氐兵命左右殺飛龍濟河焚橋衆三萬至洛陽符暉閇門拒守不與交通翟斌率衆㑹垂勸稱尊號垂曰新興侯}
