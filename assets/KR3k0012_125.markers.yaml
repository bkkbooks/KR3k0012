  - {type: variant, offset: 4714, length: 291, content: 日有一老父見於郡城東門投書於地忽然不見其書一紙八字滿之文曰涼王三十年若七年虔訪於奉常張慎慎曰昔虢將亡神降于莘深願陛下剋念脩政以副三十之慶若盤于遊田荒于酒色臣恐七年將有大變虔不悅七年正月朝群臣于謙光殿有狐在于東序門者不見其入左右以告命射之不獲二月端門崩初虔為酒泉太守起浮圖於中街有石像在焉是月目流血五月太廟基陷六月當陽門崩魏常山王赤堅率眾至姑臧虔嬰城拒守九月面縛出降魏釋其縛徙虔及宗室士民十萬戶于平城拜虔征西大將軍王如故八年賜死謚哀王自遜永安元年歲在辛丑至是歲庚寅三十九載晉書曰蒙遜以安帝隆安元年自稱牧義熙八年僭立後八年而宋氏受禪以元嘉十年死時年六十六在位三十二年子茂虔立六年為魏所滅, SBCK: ''}
