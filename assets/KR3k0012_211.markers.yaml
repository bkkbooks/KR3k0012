  - {type: variant, offset: 2265, length: 242, content: 裴秀為尚書令秀創制朝儀廣陳刑政朝廷多遵用之以為故事在位四載為當世名公又曰李胤為尚書令雖歷職內外而在公退食在家貧儉兒病無以市藥上賜錢十萬又曰荀勗守尚書令課試令史以下覈其才能有闇於文法不能決疑處事者即時遣出帝嘗謂曰魏武帝言荀文若之進善不進不止荀公達之退惡不退不休二令君之美亦望於君也又曰會稽王道子嘗集朝士置酒於東府尚書令謝石因醉為委巷之歌王恭正色曰居端右之重集藩王之第而肆淫聲欲令群下何所取則石深銜之又曰王彪之字叔虎為尚書令與謝安共掌朝政安每稱曰朝之大事眾不能決者諮之王公無不得判又曰太熙, WYG: 永昌}
