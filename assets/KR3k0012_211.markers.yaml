  - {type: variant, offset: 1744, length: 281, content: 奇策密謀不得盡聞又非正道不用心名重天下莫不以為儀表海內英俊咸宗焉魏氏春秋曰荀攸字公達為尚書令從太祖征伐常謀謨帷幄時人及子弟莫知其所言太祖每稱之曰公達外愚內智外怯內勇外弱內強不伐善無施勞知可及愚不可及雖顏回甯武子不能過文帝在東宮太祖謂曰荀公達人之師表也汝當盡禮敬之攸曾病世子問疾獨拜床下其見尊異如此始攸入尚書太祖聞名與語大悅謂荀彧鍾繇曰公達非常人也吾得與之計事天下當何憂哉蜀志曰費禕代蔣琬為尚書令于時戰軍多事眾務煩猥禕識寤過人每省讀書記粗舉目暫視究其意旨其速數倍於人終亦不忘常以朝晡聽事其間接賓客飲食嬉戲加之愽弈每盡人之歡事後遷大將軍錄尚書事董允代禕為尚書令旬日之, SBCK: 遣}
