  - {type: variant, offset: 2686, length: 0, content: '', SBCK: 古者重武事貴射御取其捷御如僕各置一人尚書六人謂之八座叅攝百揆出納王命古元凱之任也于寳晉紀曰武帝詔曰散􅀐常侍中軍將軍羊祜秉德清勁經緯文武雖處腹心之任不揔樞機之重非垂拱無爲委任責成之意也以祐爲尚書左僕射衛將軍晉諸公賛曰司馬珪少時有令望早歷顯職晉受禪爲尚書左僕射時年三十七衆論以爲美晉書}
