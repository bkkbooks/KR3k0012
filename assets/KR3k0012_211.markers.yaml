  - {type: variant, offset: 476, length: 529, content: 劍履上殿給羽葆鼓吹班劍六十人又曰元興元年八月庚子尚書下舍火是時桓玄用事出鎮姑熟名雖在外實遙錄尚書故天火示不復用也又曰明帝后庚氏為皇太后九月癸卯皇太后臨朝稱制司徒王導錄尚書事傅暢晉故事曰何劭王戎張華裴楷楊濟和嶠為愍懷太傅通省尚書事張華為光祿大夫尚書七條事皆諮而後行惠帝之世太保衛瓘太宰河間王顒太傅東海王越皆錄三省尚書秘書事沈約宋書曰高武永初三年尚書令楊州刺史徐羨之為司空錄尚書事又曰孝武帝即位以大將軍江夏王義恭為太尉錄尚書事又曰諸公錄尚書事古制也王肅解尚書納于大麓曰堯納舜於尊顯之官使大錄萬機之政案漢氏諸吏平尚書奏事後霍光以大司馬大將軍平尚書事齊書曰明帝為宣城王錄尚書事廢帝昭業思蒸魚太官以無錄公命不與後魏書曰比海王祥初遷大將軍錄尚書事祥之命其夜暴風雲電拔其庭中桐樹大十圍倒立本處天威如此識者知其不終三國典略曰齊以并省尚書令高阿郍肱為錄尚書事郍肱才伎庸劣不涉文史尚書郎中源師常白郍肱云龍見當雩郍肱問曰何處龍見作何顏色師荅曰此是龍星須雩祭也非是真有龍見郍肱曰漢兒多事強知星宿唐書官品志曰錄尚書一人位在令上掌與令同但不糾察今則糾彈見事與御史中丞更相廉察陶氏職官要錄曰後漢章帝以太傅趙喜太尉牟融並錄尚書事尚書有六名自此始也因斯以來每帝幼即位輒置太傅錄尚書事尚書令六典, SBCK: ''}
