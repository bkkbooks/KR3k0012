  - {type: variant, offset: 3065, length: 3, content: 貪恡為, SBCK: 史徐仵仵起曰此榻曽經先王坐順即哽塞涕泗交流乆而不能言遂令換之又曰陽平王新成之子欽字思􅀂累遷尚書右僕射欽色黒故}
  - {type: variant, offset: 3065, length: 2, content: 貪恡, WYG: 史徐仵仵起曰此榻曾經先王坐順即哽咽涕泗交流而不能言遂令換之又曰陽平王新成之子欽字思若累遷尚書右僕射欽色黒故時人號}
  - {type: variant, offset: 3065, length: 3, content: 貪恡為, krp: 史徐仵仵起曰此榻曽經先王坐順即哽塞涕泗交流乆而不能言遂令換之又曰陽平王新成之子欽字思若累遷尚書右僕射欽色黒故}
  - {type: variant, offset: 3068, length: 0, content: '', WYG: 黒面僕射三國典畧曰東魏以孫騰兼尚書左僕射府庫闗鑰一以委之又曰北齊王晉明豪侈有氣俠留心經史招引賔客甞為尚書右僕射百餘日便謝病而退告人云廢人飲酒安能作刀筆吏按故紙乎北齊書曰髙隆之為尚書右僕射}
  - {type: page-break, offset: 3068, content: '', id: KR3k0012_WYG_211-8a, image: WYG0894/WYG0894-0831a.png}
  - {type: variant, offset: 3069, length: 0, content: '', SBCK: 人號爲黒面僕射三國典略曰東魏以孫騰兼尚書左僕射府庫􅀜鑰一以委之又曰北齊王晉明豪侈有氣俠留心經史招引賔客嘗爲尚書右僕射百餘日便謝病而退告人云廢人飲酒安能作刀筆吏披故􅁓乎北齊書曰髙隆之爲尚書右僕射時初給民田貴勢皆占良羙貧弱咸受塉薄隆之啓髙祖悉更反易乃得均平後周書曰周惠逹爲右僕射自􅀜右草創禮樂􅆙然惠逹與禮官損益舊章至是儀軌稍備魏文帝因朝奏樂顧謂惠逹曰此卿之功也又曰李逺除尚書左僕射逺白太祖曰逺􅁗隴匹夫才藝俱闕平生念望不過一郡守耳遭逢際㑹得奉聖明主貴臣遷以至於此今位居上列爵邁通侯受委方面生殺在手非直榮寵一時亦足光華身丗但尚書僕射任居端揆今以賜授適}
  - {type: page-break, offset: 3069, content: '', id: KR3k0012_SBCK_211-5a}
  - {type: page-break, offset: 3069, content: '', id: KR3k0012_SBCK_211-5b}
