  - {type: variant, offset: 2753, length: 1, content: 令, SBCK: 僕射魏晉以來或置左右或不置晉中興書曰顧和康帝即位爲尚書僕射以母老固辭詔勑特諭暮出朝還其優遇如此又曰紀瞻字士逺爲右僕射肅祖甞内殿􅁣然憂天下曰社稷之臣欲無十人如何因數之云君便是一人瞻謝曰臣不敢聞命肅祖曰方欲善語云何復崇謙讓耶瞻以年在懸車自陳告老詔曰豈朕德薄不足以爲治乎又曰王珣}
  - {type: variant, offset: 2753, length: 18, content: 令拜受命皆策命薨則於朝堂發哀古之冢宰, WYG: 僕射魏晋}
  - {type: variant, offset: 2753, length: 1, content: 令, krp: 僕射魏晉以來或置左右或不置晉中興書曰顧和康帝即位爲尚書僕射以母老固辭詔勑特諭暮出朝還其優遇如此又曰紀瞻字士逺爲右僕射肅祖甞内殿慨然憂天下曰社稷之臣欲無十人如何因數之云君便是一人瞻謝曰臣不敢聞命肅祖曰方欲善語云何復崇謙讓耶瞻以年在懸車自陳告老詔曰豈朕德薄不足以爲治乎又曰王珣}
  - {type: variant, offset: 2755, length: 7, content: 受命皆策命薨則, SBCK: 尚書左僕射領吏部時烈宗雅好典籍􅀷欽愛之與殷仲堪徐邈並以才學文章爲上所昵桓􅀇荅道子牋云王珣明悟踈徹風流之羙雖逼}
