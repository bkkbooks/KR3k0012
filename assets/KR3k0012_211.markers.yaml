  - {type: variant, offset: 3203, length: 1, content: 令, SBCK: 郎爲之文三品巳上官升堦列坐四品五品及郎官御史拜於㕔下然後召御史中丞左右丞升堦荅拜初開元中張􅀃爲右丞相因製儀注自極尊大自非中書門下及諸三品巳上官是曰皆坐受拜或徴其所從來荅曰聖曆中王及善豆盧欽望同日拜文昌左右丞亦同此儀當時以􅀃方承恩寵不敢復詰因爲故}
  - {type: page-break, offset: 3203, content: '', id: KR3k0012_SBCK_211-6b}
  - {type: variant, offset: 3203, length: 1, content: 令, WYG: 郎為之又三品以上官外階列坐四品五品及郎官御史拜於㕔下然後召御史中丞左右丞於外皆答拜初開元中張説為丞相因製儀注自極尊大自非中書門下及諸三品已上官是日皆坐受拜或徴其所從来荅曰聖厯中王及善豆盧欽望同日拜文昌左右丞相亦同此儀當時以説方承恩寵不敢復詰因而欲爭非舊典也均交結權幸而得貴位在班列甞踰位而立御史中丞盧坦請退之均不受坦曰姚南仲為僕射例如此曰南仲何人坦曰南仲是守政而不交權幸者也尋罷坦為右庶子時人歸咎於均又曰寳厯中左僕射李絳與御史中丞王璠相遇於道璠車不為之却因上言故}
  - {type: page-break, offset: 3203, content: '', id: KR3k0012_WYG_211-10b, image: WYG0894/WYG0894-0832b.png}
  - {type: page-break, offset: 3203, content: '', id: KR3k0012_WYG_211-11a, image: WYG0894/WYG0894-0832c.png}
