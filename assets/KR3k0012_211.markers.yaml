  - {type: variant, offset: 2247, length: 0, content: '', WYG: 僕射吏部四辭而後受又曰泰康元年以山濤清虛恬簡轉為左僕射又曰魏舒太康初拜右僕射舒與衛瓘山濤張華以六合混一宜同古典封禪東岳前後累陳其事帝謙讓不許晉起居注曰武帝太康四年詔曰吏部掌叙人倫治化之本也冝得忠正舊徳}
