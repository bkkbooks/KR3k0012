  - {type: variant, offset: 16, length: 459, content: 事職典樞機以謹慎周密自著每言大政巳決輒移病出聞有詔令乃驚使吏之丞相府問焉自朝廷大臣莫知其與議也又曰孔光字子夏領尚書事凡典樞機十餘年守法度修政事不希茍合或問溫室省中樹皆何木也光荅以他語其慎密也如此應劭漢官曰章帝詔曰司空牟融曲職六年勤勞不怠其以融為太尉錄尚書事又曰和帝策書曰故太尉鄧彪元公之族三讓彌高海內歸仁為群賢首其以彪為太傅錄尚書事百官揔巳以聽又曰靈帝策書曰故太尉陳蕃忠亮謇諤有不吐茹之節司徒胡廣敦德允元五世從政今以蕃為太傅與廣參錄尚書事又曰沖帝策書曰太尉趙峻二世掌典機衡有匪石不二之心大司農李固公族之苗忠直不回余以峻為太傅固為太尉參錄尚書事晉書曰元康元年誅楊駿詔曰司徒王渾秉德忠正器量弘遠歷位內外文武勳庸著在方策宜參弼機衡以亮天工其令錄尚書事又曰賈充為太尉錄尚書事及伐吳為大都督吳平遣侍中程咸犒勞增邑八千戶又曰會稽王道子元顯並錄尚書事時謂道子為東錄元顯為西錄晉中興書曰泰和元年詔會稽王體道冲虛理識明允阿衡孝文有保乂之規輔弼哀皇盡翼亮之道朕承洪緒仍聞善誘慎徽五教儀形具瞻登賢顯親國之典也其以為丞相錄尚書事入朝不趨讚拜不, SBCK: 則}
