  - {type: variant, offset: 2838, length: 4, content: 龍肝瓜長, SBCK: 石駱駞腹下出水以金䥫器取便即漏下唯匏盧盛之則不漏飲之令人體滑香浄其國神秘不可數遇嶺表録異曰胡盧笙交趾人多取無柄之瓠割而爲笙上安十三簧吹之音韻清響雅合律吕蓼爾雅曰薔虞蓼虞蓼澤蓼也薔音即力切詩曰閔子小子未堪家多難子又集于蓼言辛苦也禮曰膾秋用蓼鶉羮雞羮鴽釀之蓼醸謂切雜之也吴越春秋曰越王欲復怨非}
