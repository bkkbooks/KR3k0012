  - {type: variant, offset: 3905, length: 12, content: 族頭數則括樓定桃黃扁白搏, WYG: 荳崧與諸将圍棊以示閒暇齊書曰武陵王􅁮性清簡尚書令王儉詣􅁮留儉設食盤中崧菜鮑魚而已儉重其眞率為飽食盡歡而去又曰周顒清貧寡欲終日蔬食雖有妻子獨處山舍甚機辨文惠太子問顒菜食何味最勝顒曰初春早韭秋末晩菘梁書曰范元琰家清貧以園蔬為業嘗出行見人盗其菘元琰遽退走母問其故乃以實答問盗者為誰答曰向所以退畏其愧耻今啓其名願不泄也於是母子秘之或有渉溝盗其筍者元琰因伐木為橋以度之自是盗大慙之一鄉皆不復草竊北史曰孟信為趙郡太守政尚寛和而權豪無犯山中老人曾以醇酒餽之信和顔接引殷勤勞問乃自出酒以鐡鐺温之素木盤盛蕪菁而已呂氏春秋曰菜之美者具區之菁浸淵之草名曰土英荆楚嵗時記曰仲冬是月也菜結霜蕪菁葵等雜菜乾之並為鹹葅有得其和者並作}
