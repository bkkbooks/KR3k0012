  - {type: variant, offset: 183, length: 156, content: 為天子削瓜者副之巾以絺副拆也既削四祁之乃橫斷而巾覆焉為國君華之巾以綌華中製之不四折也為大夫累之果倮也倮不巾覆也士疐之不中裂橫斷去疐而已音帝庶人齕之不橫斷又月令曰仲冬之月行秋令則天時雨汁瓜瓠不成雨汁者水雪雜下左傳曰齊侯使連稱管至父戊葵丘瓜時而往曰及瓜而代朞戍公問不至請代不許故謀作亂春秋運斗樞曰遠雅頌著倡優則李生瓜, WYG: 苦葉}
