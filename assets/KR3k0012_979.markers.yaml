  - {type: variant, offset: 1609, length: 1062, content: 上以其奢縱免官以王就弟唐書曰杜如晦薨後太宗食瓜美愴然思之遂輟其半使置之於靈座又曰高宗子八人武后所出者自為行第長曰孝敬皇帝監國仁明為后所忌而鴆之次曰雍王賢為太子次曰中宗次曰睿宗及孝敬遇害諸第嘗所不安晨夕懷懼雖父母之前無由敢言乃作黃台臺瓜詞令樂人歌之欲微悟上意歌曰種瓜黃臺下瓜熟子離離一摘使瓜好再摘令瓜稀三摘尚由可四摘抱蔓歸然太子竟亦流竄於黔州又曰德宗建中初誤以高力士養女楊氏婦為沈太后是時沈氏故老已盡無識太后者上密使中人就洛陽視高氏年狀頗同曩時太后嘗削瓜哺上刃傷左拇指高氏嘗剖瓜亦傷左拇指中人皆閹官女子且非審識太后見上仁孝有殊喜莫敢沮者高氏辭曰實非太后具陳族姓內外以自明又曰貞元四年夏右神策軍獻瑞瓜三蔓各為一蔕而生三瓜莊子曰朽瓜化為魚物之變也墨子曰今有入人場園取人瓜者得罰今之諸侯攻伐踰竊人瓜者數千萬而自曰義也秦子曰食瓜者雖去蔕何以連其根孫鄉子曰皋陶之色如削瓜抱朴子曰五原蔡誕入山而還欺家人云至崑崙山有玉瓜其形如世間瓜但為光明洞徹而堅須以玉井水洗之便軟而可食又曰曾參鋤瓜三足烏集其冠孝故也家語曰曾子芸瓜而誤斷其根曾晢怒以大杖擊其背曾子仆地有頃乃蘇孔子聞之告門弟子曰參來勿內也曾子使人請孔子孔子曰舜之事瞽瞍小捶則受大捶則走參委身以待暴怒既身死陷父於不義不孝孰大焉古文奇字曰秦改古文為大篆及隸字周人多誹謗怨恨秦苦天下不從而諸生到者拜為郎凡七百人蜜種瓜於驪山硎谷中溫處瓜實成使上書曰瓜冬有實有詔下博士諸生說之人人各異說則皆使往視之而為伏機諸生賢儒皆至焉方相難不泱因發機從上填之以土皆壓終古文璅語曰初刑史子臣謂宋景公從今已往五月五日臣死後五年五月丁巳吳亡以後五祀八月辛巳君薨刑史子臣至死日朝見景公夕死後吳亡景公懼思刑史子臣之言將至死日乃逃於瓜圃遂死之求得已蟲矣賈誼新書曰昔梁大夫宋就為邊縣令與楚鄰界梁亭楚亭皆種瓜梁亭劬力數灌其瓜美楚人窳而稀灌其瓜惡楚令以梁瓜之美怒其瓜之惡因往夜竊搔梁瓜皆有焦者矣梁亭覺請其尉欲執搔楚瓜宋就曰是搆怨分禍之道也令人竊為楚亭夜灌其瓜令勿知也楚亭旦而往瓜則已灌瓜日以美楚亭往而察之則梁亭之為也楚令大悅因以聞楚王楚王聞之悅梁之陰讓也乃謝以重幣而友於梁王新序同裴淵廣州記有瓜冬熟號為金敘味乃甜美廣志曰瓜之所出以遼東廬江燉煌之種為美有鳥瓜貍頭瓜蜜筩瓜女臂瓜龍蹄瓜羊髓瓜又有魚瓜犬瓜如斛出涼州陽城有青登瓜大如三升魁有桂枝瓜長二尺餘蜀地溫食瓜至冬熟有春日瓜細小小瓣宜藏正月種三月成有秋泉瓜秋種十月熟形如羊角色蒼黑列仙傳曰溪人者南郡編人居山間有仙人常止其家從之買瓜教之練瓜與附子桂實服之一年能飛登山入水往來海邊又曰服閭者, SBCK: ''}
