  - {type: variant, offset: 3713, length: 1, content: 七, WYG: 烹葵及菽爾雅曰莃菟葵菺戎葵荍蚍衃韓詩外傳曰魯監門女從績中夜而泣其偶問其故曰宋司馬得罪于宋食吾園葵是嵗吾園亡葵越攻吳諸侯畏其威魯徃獻女吾姊預焉兄徃視之道畏而死由此觀之禍福相及也陸機毛詩疏義曰荍一名蚍􅗶音孚一名楚葵似蕪菁華紫緑色可食㣲苦也左傳曰齊慶克通于聲孟子鮑牽見之告國武子武子召慶克讓之夫人訴之乃刖鮑牽仲尼曰鮑荘子之智不如葵葵猶能衛其足葵傾葉向}
