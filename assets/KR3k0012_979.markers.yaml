  - {type: variant, offset: 1015, length: 356, content: 之水以通運瓜之舡乃步他道往錢塘貨賣沈約齊紀曰韓靈敏早喪父兄靈珍至孝母亡家貧無以葬與靈珍種瓜靈敏朝採暮還復生未嘗減耗葬事由此舉孝子傳同梁書曰任昉卒武帝間問方食西菀綠沉瓜投之於盤悲不自勝因屈指曰昉少時常恐不滿五十今四十九可謂知命又曰郭祖深清儉常服故布衣素木按食不過一肉有姥餉一青瓜祖深報以疋帛有富人效之以貨鞭而徇眾朝野憚之又曰鄭灼字茂昭勵志好學多苦心熱若瓜時輒偃臥以瓜鎮心起便讀誦其篤志如此北齊書曰蘭欽為廣州刺史前刺史新渝侯映之夢南安侯恬權行州事冀得即真及聞欽至嶺厚貨廚人塗刀以毒削瓜進之欽及愛妾俱死帝聞大怒檻車收恬削爵土後魏書曰楊愔典選多以言皃取人時謗詞云尚書典選似貧人買瓜唯取大者又曰郭祚以本官領太子少師祚曾從世宗幸東宮肅宗幼弱祚懷一黃㼐出奉肅宗時應詔左右趙挑弓深為世宗所信祚私事之時人謗祚者號為挑弓僕射黃㼐少師, SBCK: 居}
