  - {type: variant, offset: 3591, length: 2, content: 漢章, SBCK: 長沙定王故宫有蓼園云定王故園也菜之辛者謂之蓼吴氏夲草曰蓼實一名野蓼一名澤蓼葵廣雅曰蘬丘􅁤切葵也詩曰七月烹葵及菽爾雅曰莃音希莬葵似葵而小葉狀如藜有毛汋啖之滑菺音肩戎葵今蜀葵也似葵華如木槿華荍音翹蚍音毗阝房无切今荆葵也似葵紫色也韓詩外傳曰魯􅁥門女相從績中夜而泣其偶問其故曰宋司馬得罪於宋出於魯馬佚食吾園葵是歳吾園亡一半越攻吴諸侯畏其威魯徃獻女吾姉預焉兄徃視之道畏而死由此觀之禍福相及也陸機毛詩䟽義曰荍音翹一名比不一名楚葵似蕪菁英華紫緑色可食微苦也左傳曰齊慶克通于聲孟子鮑牽見之告國武子武子召慶克謂之夫人訴之乃刖鮑牽仲尼曰鮑莊子之智不如葵猶能衛其足葵葉葉向日以蔽其根也史記曰公儀休爲魯相食茹而美抜去園葵也􅀳書曰江統上太子書曰今西園賣葵菜藍子雞麫之属􅃜門敗國體貶損令北齊書曰王攸字子􅀷少􅀌獨種葵三􅅿數􅀍人盗之王攸宻令人書葵葉下明旦市中看之遂得偷者管子曰桓公北伐山戎出冬葵布之天下桓公憂北郭民貧管子請禁去市三百歩者不得樹葵菜此則空有以相給淮􅀯子曰聖人之於道猶葵之與日雖不能與終始其郷之誠也郷仰誠實也繆襲􅀕儀曰夏祀和羹芼以葵列仙傳曰丁次都不知何許人也爲遼東丁氏作人丁氏甞使買葵冬得生葵問冬何得有葵云從日􅀯買來列女傳曰魯􅃮室有女過時未適人􅀝柱而嘆鄰婦謂曰何悲也欲嫁乎女曰吾憂魯君老而太子少也婦曰此魯大夫憂焉女曰昔有晉客舎吾家繫馬於園馬佚踐吾園葵使吾終􅀊不猒葵味鄰女奔亡借吾兄追霧出以求溺流而死使吾終身無兄吾聞河潤九里漸洳三百歩今魯國微弱亂將及人三年魯果亂師曠占曰黄}
