  - {type: variant, offset: 3594, length: 2, content: 元年, SBCK: 問師曠曰欲知牛馬貴賤秋葵下小葵生牛馬貴大葵不虫牛馬賤􅀶物志曰陳葵子微火炒令爆咤散着熟地中遍踏朝種暮生逺不過宿陳葵子秋種覆盖令經冬不死至春有子是也潘岳閑居賦曰緑葵含露白薤負霜鮑明逺葵賦曰別有鴨脚肫耳言葵似之古歌辭曰採葵莫傷根傷根葵不生結交莫羞貧羞貧交不成蕪菁爾雅曰湏葑蓯音揔也湏未聞江東呼蕪菁爲􅺁菘湏音相近故也湏即蕪菁也尚書曰荆州厥貢苞匭菁茅菁似爲􅉁也詩曰採葑採菲無以下體葑蕦也菲芴也下體根莖也箋云葑蔓菁與葍之􅀋皆}
