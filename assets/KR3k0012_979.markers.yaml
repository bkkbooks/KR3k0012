  - {type: variant, offset: 3715, length: 8, content: 採可作面脂劉禎瓜, WYG: 以庇其根也史記曰公儀休為魯相食葵而美拔其園葵棄之晉書曰江綂上太子書曰今西園賣葵菜藍子鷄麵之屬則虧敗國體貶損令門北齊書曰有王姓孤獨種葵三畝數被人盗之彭城王浟宻令人書葵葉下明日市中㸔遂得偷者管子曰桓公北伐山戎出冬葵布之天下桓公憂北郭氏貧管子請禁出市三百歩者不得樹葵菜此則亦有以相及也淮南子曰聖人之于道猶葵之于日雖不能與終始其嚮之者誠也繆襲祭儀曰夏祀和羮芼以葵列仙傳曰丁次都者不知何許人也遼東丁氏僕人丁氏嘗使買葵冬得生葵問冬何有葵云從日南買來列女傳曰魯漆室有女過時未適人倚柱而嘆鄰婦謂曰何悲也欲嫁乎女曰吾憂魯君老而太子少也婦曰此魯夫人憂焉女曰昔有晉客舍吾家繫馬于園馬逸踐吾園葵使吾終嵗不厭葵味鄰女奔亡使吾兄追霧出以求溺流而死使吾終身無兄吾聞河流九里漸三百歩今魯㣲弱亂将及人三年魯果亂師曠占曰黄帝問師曠曰欲知牛馬貴賤秋葵下小葵生牛馬貴小葵不生牛馬賤博物志曰陳葵子㣲火炒令爆乾散着熟地中遍踏朝種暮生遠不過宿陳葵子秋種覆蓋令經冬不死至春有子是也潘岳閒居}
