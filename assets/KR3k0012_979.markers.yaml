  - {type: variant, offset: 3632, length: 3, content: 梁吏部, SBCK: 桓帝永興二年詔司􅈻蝗水爲灾五榖不登令所傷郡國皆種蕪菁以助民食吴暦曰劉備歸曹公曹公使親近覘視諸將有賔客酒食者輙因事害之俻時閉門將人種蕪菁公使人窺門即去俻謂張飛曰吾豈種菜者乎曹公必有疑意不可復留其夜輕馬而去吴録曰陸遜諸葛瑾攻襄陽遜遣親人韓扁抄掠瑾聞之欲急去遜方催人種豆菘與諸將圍碁以示閑暇齊書曰武陵王曄性清簡}
  - {type: page-break, offset: 3632, content: '', id: KR3k0012_SBCK_979-6a}
  - {type: variant, offset: 3632, length: 3, content: 梁吏部, krp: 桓帝永興二年詔司隷蝗水爲灾五榖不登令所傷郡國皆種蕪菁以助民食吴暦曰劉備歸曹公曹公使親近覘視諸將有賔客酒食者輙因事害之俻時閉門將人種蕪菁公使人窺門即去俻謂張飛曰吾豈種菜者乎曹公必有疑意不可復留其夜輕馬而去吴録曰陸遜諸葛瑾攻襄陽遜遣親人韓扁抄掠瑾聞之欲急去遜方催人種豆菘與諸將圍碁以示閑暇齊書曰武陵王曄性清簡}
  - {type: variant, offset: 3637, length: 0, content: '', SBCK: 令王儉詣曄留儉設食盤中菘菜鮑魚而巳儉重其眞率爲飽食盡歡而去又曰周顒清貧寡欲終日􅂼食雖有妻子獨處山舎甚機辨文惠太子問顒菜食}
  - {type: variant, offset: 3637, length: 0, content: '', krp: 令王儉詣曄留儉設食盤中菘菜鮑魚而巳儉重其眞率爲飽食盡歡而去又曰周顒清貧寡欲終日𬞞食雖有妻子獨處山舎甚機辨文惠太子問顒菜食}
