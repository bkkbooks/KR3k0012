  - {type: variant, offset: 3119, length: 466, content: 左右曰盛夏之時人食生瓜起居道傍瓜子復生故人惡食夏侯曾先會稽記曰曹娥父溺死娥見瓜浮其豦即得父屍博物志曰人以冷水自漬至𣍿可頓啖數十枚瓜漬至腰啖轉多至頸可啖百餘枚所漬水皆作瓜氣瓜味搜神記曰吳時有徐光常行幻術於市里從人乞瓜其主弗與便從索瓣種之俄而瓜蔓延生花實乃取食之因賜觀者及視所齎皆亡耗矣幽明錄曰安定人周敬種瓜時亢旱鬼為槤音輦水澆瓜瓜大滋繁問姓名不荅還白父嘗有惠於人否父曰西郭樊營先作郡吏償官數百斛米我時以百斛助之其人已死又曰孫鍾富春人堅父也與母居至孝篤信種瓜為業有三少年容服妍麗詣鍾乞瓜愛樂無已為設食出瓜禮敬殷勤臨去曰我等司命感郎見接之厚送出門三人曰山中可作塚復言欲連世封侯為數世天子鍾曰數世天子言訖悉化成白鵠列異傳曰遼東丁伯昭自說其有客字次節既死感見待恩常為本家致奇異物試臈月中從索瓜得美瓜數枚來在前不見形也述異記曰豫章郡有盧松村羅根生於此村側墾荒種瓜又於外立一神壇瓜始引蔓清晨行之忽見壇上有新板墨書曰此是神地所遊處不得停止種殖可速去根生拜謝跪呪曰竊疑村人利此熟地生苗容或假託神旨以見驅斥審是神教願更朱書賜報明早往看向板猶存悉以朱代墨, SBCK: ''}
