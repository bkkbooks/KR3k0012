  - {type: variant, offset: 2676, length: 2, content: 常往, SBCK: 所至之處人皆敬而信之晉公護未誅之前曽手持一大瓠到護弟門外抵而破之乃大言曰瓠破子苦未幾而護誅諸子並伏法管子曰一年之計莫􅀂樹榖十年之計莫􅀂樹木終身之計莫􅀂樹人􅀲瓠葷菜不俻國之貧也莊子曰惠子曰魏王貽我大瓠之種我樹之而成實五石以盛水漿其堅不能自舉剖之以爲則廓落無所容非不大也吾爲其無用剖之莊子曰夫子固拙於用大也國語曰諸侯伐􅁗及涇莫濟叔向見叔孫穆子穆子曰豹之業業乃瓠有苦葉矣不知其他叔向退召舟虞與司馬曰夫苦瓠不材於人共濟而巳是行魯人與莒人先濟新序曰魏文侯見萁李墻壞不治問其故曰不時也又進瓠羮文侯曰墻壞不築教我無奪民農功飴我瓠羹教我無多歛百姓王充論衡曰千將之刃未磨􅀲瓠不能傷又曰婦人踈孕者子活乳數者子死譬􅀂瓠華多實少也風俗通曰燒穰殺瓠俗􅀃家人燒􅁰穰則使田中瓠枯死也水經曰今豫州汝南郡城西北汝水左出西北流又屈而東轉又西南㑹汝形􅀂垂瓠􅂄老云城取名焉太康地記曰朱崖儋耳無水唯種大瓠藤斷其汁用之亦足嶺南異物志曰儋崖種瓠成實率皆石餘壷盧蜀志曰張􅒨字君嗣如瓠壷外澤而内麤三國典略曰齊武成帝皇后胡氏安定人魏宁書令兖州刺史延之女也母盧氏懷孕廷之􅀄有胡僧}
  - {type: page-break, offset: 2676, content: '', id: KR3k0012_SBCK_979-2a}
  - {type: page-break, offset: 2676, content: '', id: KR3k0012_SBCK_979-2b}
  - {type: variant, offset: 2676, length: 2, content: 常往, WYG: 所至之處人皆敬而信之晉公䕶未誅之前曾手持一大瓠到䕶第門外抵而破之乃大言曰瓠破子苦未幾而護誅諸子並伏法管子曰一年之計莫若樹穀十年之計莫若樹木終身之計莫若樹人瓜瓠葷菜不備國之貧也荘子曰惠子曰魏王貽我大瓠之種我樹之而成實五石以盛水漿其堅不能自舉剖之以為瓢則廓落無所存非不大也吾為其無用剖之荘子曰夫子固拙于用大也國語曰諸侯伐秦將濟叔向見叔孫穆子穆子曰豹之業乃瓠有苦葉矣不知其他叔向退召舟虞與司馬曰夫苦瓠不材於人共濟而已遂行魯人與莒人先濟新序曰魏文侯見箕季牆壊不治問其故曰不時也又進瓠羮文侯曰牆壊不築教我無奪民農功貽我瓠羮教我無多求百姓王充論衡曰干將之刃未磨瓜瓠不能傷又曰婦人疎孕者子活乳數者子死譬苦瓠華多實少也風俗通曰燒穰殺瓠俗説家人燒黍穰則使田中瓠枯死也水經曰今豫州汝南郡城西北汝水左右出西北流又屈而轉東又西南㑹汝州若垂瓠耆老云城取名焉大康地志曰朱崖儋耳無水惟種大瓠藤㫁其汁用之亦足嶺南異物志曰儋崖種瓠成實率皆石餘葫蘆蜀志曰張裔字君嗣如瓠壺外澤而内麄三國典畧曰齊武成帝皇后胡氏安定人魏中書令兖州刺史延之女也母盧氏懐孕之初有胡僧}
