  - {type: variant, offset: 3682, length: 256, content: 見後數月敬容以罪免官本草經云瓜一名土芝吳氏本草曰瓜子一名瓣七月七日採可作面脂劉禎瓜賦曰禎在曹植坐廚人進瓜禎為立成辭曰含金精之芳流冠眾瓜而作珍設諸清流一浮一藏片以金刀四剖三離承之雕盤幕以纖絺甘侔蜜房冷甚冰圭嵇含甘瓜賦序曰世云三芝瓜處一焉謂之土芝張載瓜賦曰羊骹虎掌桂枝蜜筩玄表丹裏呈素含紅豊敷外偉綠瓤內醲傅玄瓜賦曰白者如素黑者如漆黃踰金箱青侔含翠舊有蜜筩及青括樓嘉味溢異鮮類寡疇一齧之頃至三搖頸細飢蜜理多瓤少瓣豐旨絕異食之不䬼音烏懸切陸機瓜賦曰夫其種族頭數則括樓定桃黃扁白搏金釵蜜筩小青大班玄骭音幹素腕貍首虎磻東陵出, SBCK: 泄也}
