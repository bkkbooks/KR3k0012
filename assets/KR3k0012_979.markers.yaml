  - {type: punctuation, offset: 1375, content: 「, id: KR3k0012_CHANT_979-bkkpn488}
  - {type: variant, offset: 1375, length: 233, content: 王羆性儉率嘗有客與羆食瓜客削瓜侵膚稍厚羆意嫌之及瓜皮落地乃引手就地取而食之客甚有愧色又曰趙王招知隋文欲遷周鼎密欲圖之藏兵刃於帷席之間後院亦伏壯士文帝從者多在閣外唯楊弘元胄坐於戶側招以佩刀割瓜啗隋文未之疑元胄覺變扣刀而入招乃以大觴親飲胄酒北史曰宋瓊字普賢以孝稱母曾病季秋月思瓜瓊夢想見之求而遂獲時人異之隋書曰文帝用法定制行署取一錢已上聞見不告言者坐至死自此四人共盜一榱桶三人同竊一瓜事發即時行決又曰秦孝王俊奢侈過甚頗好於內妃崔氏性妒甚不平之遂於瓜中進毒俊由是遇疾徵還京, SBCK: 強練}
