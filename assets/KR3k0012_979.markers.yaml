  - {type: variant, offset: 36, length: 137, content: 瓜有兩鼻者煞人詩曰文王之興本由太王也綿綿瓜瓞民之初生自土沮漆興也箋云瓜之本實繼先歲之瓜必小狀似瓞故謂之瓞綿綿然若將無長大時興者喻后稷乃帝礜之曹封於部其後公劉失職遷于幽居沮漆之地歷世亦綿綿然至太王而得其民心而生王業故本周之興云于沮漆也大戴禮曰五月乃瓜乃者治瓜之辭也瓜也者始食瓜, WYG: ''}
