  - {type: variant, offset: 3638, length: 9, content: 敬容夏患瘧疾寄在蔣, krp: 味㝡勝顒曰春𥘉早韭秋末晚菘梁書曰范元琰家貧唯以園𬞞爲業甞出行見人盗其菘元琰遽退走母問其故乃以實荅問盗者爲誰荅曰向所以退畏其愧耻今啓其名願不泄也於是母子祕之或有渉溝盗其筍者元琰因伐木爲橋以渡之自是盗大慙一郷無復草竊北史曰孟信爲趙郡太守政尚寛和權豪無犯}
