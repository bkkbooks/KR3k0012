  - {type: variant, offset: 246, length: 0, content: '', WYG: 夕安知夏節長立夏禮記月令曰四月之節日在昴立夏為四月昏翼中曉牽牛中斗建巳位之初其日丙丁立夏之日螻蟈鳴太史以先立夏三日謁於天子曰某日立夏盛德在火天子乃齊立夏之日天子親率三公九卿大夫迎夏於南郊還乃賞公卿諸侯大夫於朝慶賜遂行無不欣恱命相贊傑俊遂賢良舉長大贊猶揚也遂猶逹也傑俊謂才兼於人者行爵出禄必當其位無虛授也易說曰立夏}
