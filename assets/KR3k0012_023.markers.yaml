  - {type: variant, offset: 776, length: 0, content: '', WYG: 至極二以助隂氣之始至三以明日之北故謂之至又夏至之時祭崑崙之神於澤之中配於后孝經説曰夏至之日日在内衡又斗指午為夏至續漢書禮儀志曰夏至日浚井改水冬至鑽燧改火可去温病也宋書元嘉四年斷夏至日五絲縷之屬南史曰沈林子祖父穆夫為沈預所䧟死林子與兄田子還東報讐五月夏至節日至預家正大集㑹子弟盈堂林子兄弟挺身直入斬預首男女無論長㓜悉屠之以預首祭祖父墓荆楚歲時記曰夏至日取菊為灰以止小麥蠧按干寳變化論乃云稻成蟲麥為蛺蝶其驗乎輿地志曰郭宏常夏至於射的釣魚供母將餌聞笳角聲魚躍而出管子曰夏而麥熟天子祈天宗其}
