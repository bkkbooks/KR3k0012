  - {type: variant, offset: 3324, length: 2, content: 壬子, WYG: 内夏至之日風從離來為順其年大熟夏至前六日夏至後十日十六日為窮日月令占候圖曰夏至朔日夏至并二日三日至六日夏至五穀熟二十二日二十四日夏至不熟二十五日三十日夏至時價平和晦日夏至五穀貴天文録曰大寒在冬至後二氣積寒而未温也大暑在夏至後二氣積暑而未歇也寒暑和乃在春秋分後二氣寒暑未即平也譬如火始入室未甚温弗事加薪久而愈熾既遷之猶有餘熱也冬至之日日出辰入申晝行地上百四十六度强}
