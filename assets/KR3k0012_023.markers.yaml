  - {type: variant, offset: 896, length: 2, content: 月午, SBCK: 刻夜三十五刻酈道兀注水經日丹水出丹魚先夏至前十夜伺之魚浮水側赤光上照如火神異經曰北方荒中有石湖方千里無凸徒結切凹校交反平滿無髙下岸深五丈餘御名冰維夏至左右五六十日解其暦䟽曰芒種謂榖芽始出故曰芒種夏至其}
