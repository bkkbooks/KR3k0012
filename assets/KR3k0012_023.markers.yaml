  - {type: variant, offset: 1305, length: 201, content: 能自活者救之無固蘊蓄而忍人之貧貪貨殖之宜忌種福之利君子弗取也陸機纂要曰夏樹名連陰夏雨名綿雨攝生月令曰四月為乾生氣卯死氣酉是月也萬物以成天地化生勿冒極熱勿大汗後當風勿暴露星宿皆成惡病勿食大䔉勿含生薤勿食雞肉勿食虵鱔是月肝藏以病神氣不行火氣漸臨水力漸衰稍補腎助肺調和元氣無失其時是月八日不遠行宜安心靜念沐浴齋戒必得福慶齊人月令曰四月八日不宜殺草木始服生衣宜進溫酒服溫藥是月也無壞麛卯無伐大樹是月也宜以夙興如, SBCK: 知所由}
