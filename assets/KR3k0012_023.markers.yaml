  - {type: variant, offset: 907, length: 261, content: 六月日月會于鶉火嶺表錄異云枹木其輕如通草夏月著之隔卑濕地氣如杉木今廣州諸郡牧守初到任下檐皆有油畫枹履又曰南中夏秋多惡風彼人謂之颶南越志云風起則人心恐懼或云風來則四面具足二義皆有理也壞屋折樹不足喻也甚則吹屋瓦如飛蝶或三二年不一風或二年兩三風亦系廉帥政德之否臧者然發則自午及酉夜半必止此乃飄風不終朝之義也南荒錄曰新州男子婦人皆縝髮如雲每沐以灰投水中遂就水而沐之以彘膏塗其髮五六月杭杭秫未獲時民饑盡髡取髮鬻於市既髮即復以彘膏塗之至來年五六月又可鬻矣投荒錄曰嶺南方盛夏率一日十餘陰十餘霽雖大雨傾注頃即赫日已復驟雨大凡嶺表夏之炎熱甚, SBCK: 行極}
