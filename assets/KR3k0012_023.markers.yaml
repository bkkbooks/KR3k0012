  - {type: variant, offset: 238, length: 0, content: '', WYG: 中央土其帝黄帝黄帝以土德王天下號曰軒轅氏死紀祀於中央之帝其佐后土執繩而制四方其神為鎮星其獸黄龍土色黄也其音宫其日戊己土音也戊己土日也又孟夏之月南宫御女赤色衣赤采吹竽笙火生南方故處南宫也竽笙空中象陽故吹之其兵㦸㦸有枝榦象陽布散也四月官田其樹桃四月勉農事故官田也桃説與杏同五月官相其樹榆是月養氣長養故官相佐也榆説文枋也季夏之月中宫御女黄色衣黄采其兵劍季夏中央也劍有兩刃喻無所不主也又貧人則夏被褐帶素含菽飲水止暑熱冬則羊裘不蔽體短褐不掩形而煬又曰鄒衍事燕惠王盡忠左右譛之王繫之仰天而哭夏五月天為之降霜又陽氣為火隂氣為水水勝故夏氣濕火勝故冬至燥八尺之表影脩尺有五寸影脩則隂氣勝短則陽氣勝隂氣勝則為水陽氣勝則為旱又南方之極自北户孫之外北户孫國名也日所在其處皆為北向之户者也貫顓項之國南至季火炎風之野又夏赤帝祝融之所司者萬二千里赤帝炎帝少典之子號為神農南方火徳之帝也祝融顓頊之孫一名黎為髙辛氏火正號為祝融死為火帝也其令曰爵有功賞有徳恵賢良救飢渴舉力農振貧窘恵孤寡憂罷音疲疾出水火起毁宗立無後建賢輔應陽施也又夏行春令則多風春象木氣多風又孟夏招揺指已盛德在火又六月失政十二月草木不脱不脱葉著樹不零落也又景風至則施爵位賞有功夏至隂氣在下陽勝於上象陽佈故賞有功封建諸侯又夏治以衡衡者所以平萬物也衡之為度也緩而不後平而不怨施而不德匝而不責常平民禄以繼不足㪍㪍揚揚惟德是行長養化育萬物蕃昌以成五穀以實封疆其政不失天地乃}
