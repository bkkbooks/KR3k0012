  - {type: variant, offset: 3328, length: 222, content: 鑄為陰燧言丙午日鑄為陽燧可取火壬子日鑄為陰燧可取水又曰吳猛性至孝小兒時在父母邊臥時夏月多蚊䖟而不搖扇懼蚊䖟去我及父母王子年拾遺記曰洞庭之山浮於水上其下有金堂數百間帝女居之四時聞金石絲竹之音徹於山頂楚懷王時舉群才賦詩於水湄故云瀟湘洞庭之樂聽者令人難去雖咸池簫韶不能比焉每四仲之節王常繞山以遊宴各舉四仲之氣以為樂章推仲夏律中夾鍾乃作輕風流水之詩讌於山南時中蕤賓乃作皓露秋霜之曲武昌記曰樊山東有小溪盛夏時凜然常有寒氣故謂之寒溪洽聞記云驩州安遠縣西百六, SBCK: 強晝夜長短同也太平御覽卷第二}
