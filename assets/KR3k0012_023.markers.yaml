  - {type: variant, offset: 1693, length: 602, content: 有霜雪者君父治政大殿都匈切大殺天以示之何以言之霜威殺萬草坐大殺也見變如此宜損威殺重人之命也焦贛易林曰仲春孟夏和氣所在生我嘉福國無殘賊又曰六月採芑征伐無道張仲方叔剋勝飲酒又曰六月種黍歲晚不雨秋不縮酒神失其所趙自勉造化權輿云潮者陰陽氣所激五月無潮陰氣微也八月最大則陰盛也陸機要覽曰昔羽山有神人焉逍遙於中岳與左元放共遊子訓所坐欲起子訓應欲留之一日之中三雨今呼五月三時雨亦為留客雨桓譚新論曰漢中送王仲都時夏大暑使曝日坐又瓌以十鑪火不言熱而身不汗出五行大義論曰未者昧也陰氣已長萬物稍衰其體薆昧於未又時物向成皆有氣味也五行體性論云土在四時之中處季夏之末陽衰陰長居位之中㧾於四德謂金水木水火積塵成實積則有間有間故水火成實所能持也故土以含散持實為體稼穡為性又曰土苞四德故其體能兼虛實也論衡曰夫虎出有時猶龍見有期也陰物以冬見陽虫以夏出出應其氣氣動其類參伐以冬出心尾以夏見參伐則虎星心尾則龍象星出而物見氣至而類動天地之性也又曰盛夏之時當風而立隆冬之月響日而坐其夏欲得寒冬欲得溫也或當風鼓翣翣響日燃爐然而天終不為冬夏易氣者寒暑有節不為人變改也又曰陽燧取火於五月丙午日中之時消鍊五石鑄以為氣摩勵生光仰以向日則火來至此真取火之道也又曰陽燧取火於天消鍊五石五月盛夏鑄以為器乃能得火今又但取刀劍銅鉤之屬摩以向日亦得火焉又曰以夏進爐以冬奏奏亦進也扇此無益人君不遇災患幸矣又曰方今盛夏雷雨時至龍多登雲雲雨與龍相應乘雲雨而行物類相致非有為也, SBCK: ''}
  - {type: variant, offset: 1693, length: 118, content: 有霜雪者君父治政大殿都匈切大殺天以示之何以言之霜威殺萬草坐大殺也見變如此宜損威殺重人之命也焦贛易林曰仲春孟夏和氣所在生我嘉福國無殘賊又曰六月採芑征伐無道張仲方叔剋勝飲酒又曰六月種黍歲晚不雨秋不縮酒神失其所趙自勉造化權輿云潮者陰陽氣所激五, WYG: ''}
