  - {type: variant, offset: 776, length: 0, content: '', SBCK: 至極二以明隂氣之始至三以見日行之北至故謂之至又曰夏至之時􅀕崑崙之神於澤之中配以后土孝經􅀃曰夏至之日在内衡又曰斗指午爲夏至續漢書禮儀志曰夏至日浚井改水冬至鑚燧改火可去温病也又曰夏至隂氣萌作恐物不成以朱索連以桃印文以施門户代世所以尚爲飾也故漢以五月五日朱索五色印爲門户飾以止惡氣宋書元嘉四年斷夏至日五絲縷之屬南史曰沈林子父穆夫爲沈預所䧟死林子與兄田子還東報讎五月夏至節日至預家正大集㑹子弟盈堂林子兄弟挺身直入斬預首男女無論老㓜悉屠之以預首􅀕祖父墓周處曰風土記曰夏至之日􅀨名曰黄梅􅀨荆楚歳時記曰夏至日取菊爲􅁅以止小麥䖝蠹按于寳變化論乃云稻成蛩麥爲蛺蝶其驗乎輿地志曰郭􅀪常夏至於射的釣魚供母將餌聞笳角聲魚躍而去管子曰夏而麥熟天子祈天宗其}
