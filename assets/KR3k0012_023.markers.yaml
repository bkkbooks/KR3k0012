  - {type: variant, offset: 1954, length: 1367, content: 四時之中處季夏之末陽衰陰長居位之中㧾於四德謂金水木水火積塵成實積則有間有間故水火成實所能持也故土以含散持實為體稼穡為性又曰土苞四德故其體能兼虛實也論衡曰夫虎出有時猶龍見有期也陰物以冬見陽虫以夏出出應其氣氣動其類參伐以冬出心尾以夏見參伐則虎星心尾則龍象星出而物見氣至而類動天地之性也又曰盛夏之時當風而立隆冬之月響日而坐其夏欲得寒冬欲得溫也或當風鼓翣翣響日燃爐然而天終不為冬夏易氣者寒暑有節不為人變改也又曰陽燧取火於五月丙午日中之時消鍊五石鑄以為氣摩勵生光仰以向日則火來至此真取火之道也又曰陽燧取火於天消鍊五石五月盛夏鑄以為器乃能得火今又但取刀劍銅鉤之屬摩以向日亦得火焉又曰以夏進爐以冬奏奏亦進也扇此無益人君不遇災患幸矣又曰方今盛夏雷雨時至龍多登雲雲雨與龍相應乘雲雨而行物類相致非有為也又曰夏末蜻蛚蟋蟀也鳴寒螿啼感陰氣也雷動而雉驚啟蟄而虵出感陽氣也又曰世俗之事亦有緣也夫正月歲始五月陽盛子以此月生精盛熾熱烈厭勝父母父母不堪將受其患相倣俲莫謂不然有空諱之言無實凶之效世俗惑之誤非之甚也諱舉正月五月子以為正月五月子殺父與母不得舉也以舉之父母偶死則信而謂之真矣夫正月五月子何故殺父與母人之含氣在腹之內其生十月而產共元氣也正月與二月何殊五月與六月何異而謂之凶世傳此言久矣又曰實說雷者太陽之微氣也何以明之正月始雷五月陽盛故五月雷迅冬乃雷潛盛夏之時太陽用事陰氣乘之陰陽分爭則相激射為毒毒中人輒死中木木折中屋屋壞諸葛亮出軍表曰五月渡瀘深入不毛之地陶潛集曰潛常言五月六月中北窗下臥涼風暫至自謂羲皇上人穆天子傳曰季夏丁卯天子北斗升于舂山之上以望四野曰舂山是惟天下之高山也孳木華不畏雪天子乃取孳木華之實持歸種之又曰天子四月休于濩澤今平陽濩澤縣是也濩音獲於是射鳥獲獸宋躬孝子傳曰何子平事母至孝母喪年六十有孺子之慕夏避清涼永昌郡傳曰朱提郡有堂狼山山多毒草盛夏之月飛鳥過之不能得去嵇康高士傳曰被裘公者吳人延陵季子出遊見道中有遺金顧而謂公曰取彼金公投鎌瞋目拂手而言曰何子之高而視之卑五月被裘而負薪豈取金者哉季子大驚既謝而問姓名公曰吾子皮相之士而安足語姓名也襄陽耆舊傳曰黃穆字伯開愽學為山陽守有德政弟奐字仲開為武陵太守貪穢無行武陵人諺曰天有冬夏人有二黃言不同也周處風土記曰仲夏雨濯枝盪川注云此節常有大雨名濯枝又曰梅熟時雨謂之梅雨又曰仲夏長風扇暑注云此節東南常有風至俗名黃雀長風盛引之荊州記曰宜都銀山縣有風穴穴口大數尺名為風井夏則風出冬則風入樵人有冬過者置笠穴口風吸之經日還涉長陽溪而得其笠又曰橘洲在郡南四里對南津常看如下及至夏水懷山諸洲皆沒橘洲獨在荊楚歲時記曰四月也有鳥名穫穀其鳴自呼農人候此鳥鳴則云梨根岸爾雅云鳴鳩鴶鶵郭璞云今布穀也江東呼獲穀崔寔正論云夏扈趣耘鋤即竊脂玄鳥呼穫穀則其夏扈也又曰俗忌五月曝床薦席異苑云新野庾寔嘗以五月曝席忽見一小兒死在席上俄失之其後寔子遂亡或起於此或問董勛曰俗五月不上屋云五月人脫上屋見影魂便亡勛答云蓋秦時王自為之禁夏不得行漢魏未攻案月令仲夏可以居高明可以遠眺望可以升外山陵可以處台榭鄭玄云順陽在上也今云不得上屋正與禮反敬升云見死小兒而禁曝荐席何以與於此乎俗人月諱何代無之但當矯之歸於正洞冥記曰東方朔母田氏寡夢太白星臨其上因有娠田氏歎曰無夫而孕人得棄我乃移向代郡之東方里五月生朔仍以所居為姓搜神記曰夫金錫之姓一也以五月丙午日中鑄為陽燧以, WYG: ''}
