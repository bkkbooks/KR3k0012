  - {type: 'tls:seg', offset: 613, content: '', id: KR3k0012_CHANT_023-12a.7}
  - {type: variant, offset: 613, length: 2, content: 董勛, SBCK: 五帝之位諸宮皆有之此五方之帝非三十六天帝限也亦主學道者故詣太極紫微宮奉見四真人論扷其功罪之多少夏至周易復卦曰雷在地中復先王以至日閉􅀜啇旅不行后不省方冬至隂之復也夏至陽之復也左傳曰昭二十一年秋七月壬午朔日有食之公}
  - {type: page-break, offset: 613, content: '', id: KR3k0012_SBCK_023-4a}
  - {type: variant, offset: 613, length: 2, content: 董勛, WYG: 五方之帝亦主道者詣太極紫微宫見四真人論按其功罪之多少夏至周易復卦曰雷在地中復先王以至日閉關商旅不行后不省方冬至隂至復也夏至陽至復也左傳曰昭二十一年秋七月壬午朔日有食之公}
  - {type: page-break, offset: 613, content: '', id: KR3k0012_WYG_023-6a, image: WYG0893/WYG0893-0208c.png}
  - {type: variant, offset: 613, length: 2, content: 董勛, krp: 五帝之位諸宮皆有之此五方之帝非三十六天帝限也亦主學道者故詣太極紫微宮奉見四真人論扷其功罪之多少夏至周易復卦曰雷在地中復先王以至日閉關啇旅不行后不省方冬至隂之復也夏至陽之復也左傳曰昭二十一年秋七月壬午朔日有食之公}
  - {type: punctuation, offset: 615, content: 《, id: KR3k0012_CHANT_023-bkkpn212}
  - {type: variant, offset: 616, length: 0, content: '', SBCK: 於梓愼曰是何物也禍福何爲物事也對曰二至二分二至冬至夏至二分春分秋分日有食之不爲災日月之行也分同道也至相過也二分日夜等故言同道二至長短極故相遇其他月則爲災陽不克也故常爲水隂侵陽是陽不勝隂傳曰少昊氏鳥名官伯趙氏司至者也伯趙伯勞也以夏至鳴冬至止周}
  - {type: variant, offset: 616, length: 0, content: '', WYG: 於梓慎曰是何物也禍福何為物事也對曰二至二分二至冬至夏至二分春分秋分日有食之不為灾日月之行也分同道也至相過也二分日夜等故言同道二至長短極故相過其他月則為灾陽不克也故常為水隂侵陽是陽不勝隂傳曰少昊氏以鳥名官伯趙氏司至者也伯趙伯勞也以夏至鳴冬至止周}
  - {type: variant, offset: 616, length: 0, content: '', krp: 於梓愼曰是何物也禍福何爲物事也對曰二至二分二至冬至夏至二分春分秋分日有食之不爲災日月之行也分同道也至相過也二分日夜等故言同道二至長短極故相遇其他月則爲災陽不克也故常爲水隂侵陽是陽不勝隂傳曰少昊氏鳥名官伯趙氏司至者也伯趙伯勞也以夏至鳴冬至止周}
  - {type: variant, offset: 617, length: 1, content: 俗, SBCK: 地官曰夏至日影尺有五寸鄭氏云土圭之長也尺有五寸夏至日立八尺表其影適與土圭等謂之地中今潁川陽城地爲然又春官大司樂曰􅀌竹之管雲和之琴瑟冬至日於地上圎丘奏之孫竹之管空桑之琴瑟夏至日於澤中方丘奏之隂竹之管龍門之琴瑟於宗廟奏之雲和空桑龍門皆山名又曰宗伯以夏至致地祗物鬽音魅以禬國之凶荒民之禮喪禬除也又曰柞氏夏至令刋陽木而火之冬至令剥隂木而水之又曰薙氏掌殺草夏日至而夷之易通卦驗曰夏至景風生蟬始鳴螳蜋生鹿角解木槿滎又曰夏至小暑蝦蟇無聲又曰鹿者獸中隂也貴臣之象鹿應隂解角也夏至大陽始屈隂氣始昇隂陽相向君之象也今失節不解臣不承君之象故爲貴臣作姦也又曰離南方也夏夏日中赤氣出直離此正氣也氣出右萬物半死氣出左赤地千里又曰夏至之日清明風至易稽覽圖曰夏至後三十日極温易稽覽圖曰夏至景風至蟬始鳴螗螂生京房占易曰夏至离王去聲景風用事人君當爵有德封有功春秋感精符曰冬日至成天文夏日至成地理春秋考異郵曰夏至井水躍五經通義曰夏至隂始動而未達故寢兵鼔不設政事所以􅂇微氣之養也三禮義宗}
