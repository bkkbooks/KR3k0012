  - {type: variant, offset: 2331, length: 191, content: 事亦有緣也夫正月歲始五月陽盛子以此月生精盛熾熱烈厭勝父母父母不堪將受其患相倣俲莫謂不然有空諱之言無實凶之效世俗惑之誤非之甚也諱舉正月五月子以為正月五月子殺父與母不得舉也以舉之父母偶死則信而謂之真矣夫正月五月子何故殺父與母人之含氣在腹之內其生十月而產共元氣也正月與二月何殊五月與六月何異而謂之凶世傳此言久矣又曰實說雷者太陽之微氣也何以明之正月始雷五月陽盛故五月雷迅冬乃雷潛盛夏之時太陽, SBCK: 日离卦}
