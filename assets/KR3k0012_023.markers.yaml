  - {type: variant, offset: 239, length: 3, content: 庶風後, WYG: 明理也吕氏春秋曰杜厲叔事莒閔公以為不知去居海上夏食菱芡冬食橡栗續晉陽秋曰季夏之月令漁師伐蛟升龜漁師掌魚官有蛟能害人難得故言伐龜神可以決吉凶入宗廟尊之故言升蛟則害龜則神也傅𤣥述夏曰}
