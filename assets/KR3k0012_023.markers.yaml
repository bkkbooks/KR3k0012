  - {type: variant, offset: 889, length: 1, content: 大, WYG: 人情愁怖復増題之冀以脫禍今家人織新縑皆取著後縑絹二寸許繫户上此其驗也抱朴子曰予祖彬為汲令以夏至日請主簿杜宣賜酒比壁上有懸赤弩照於杯中形如蛇宣惡之及飲得疾後彬知之使於宣舊處設酒於杯中猶見有蛇因謂宣曰此弩影耳宣遂意觧古今厯}
