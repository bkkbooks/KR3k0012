  - {type: variant, offset: 2524, length: 790, content: 陰氣乘之陰陽分爭則相激射為毒毒中人輒死中木木折中屋屋壞諸葛亮出軍表曰五月渡瀘深入不毛之地陶潛集曰潛常言五月六月中北窗下臥涼風暫至自謂羲皇上人穆天子傳曰季夏丁卯天子北斗升于舂山之上以望四野曰舂山是惟天下之高山也孳木華不畏雪天子乃取孳木華之實持歸種之又曰天子四月休于濩澤今平陽濩澤縣是也濩音獲於是射鳥獲獸宋躬孝子傳曰何子平事母至孝母喪年六十有孺子之慕夏避清涼永昌郡傳曰朱提郡有堂狼山山多毒草盛夏之月飛鳥過之不能得去嵇康高士傳曰被裘公者吳人延陵季子出遊見道中有遺金顧而謂公曰取彼金公投鎌瞋目拂手而言曰何子之高而視之卑五月被裘而負薪豈取金者哉季子大驚既謝而問姓名公曰吾子皮相之士而安足語姓名也襄陽耆舊傳曰黃穆字伯開愽學為山陽守有德政弟奐字仲開為武陵太守貪穢無行武陵人諺曰天有冬夏人有二黃言不同也周處風土記曰仲夏雨濯枝盪川注云此節常有大雨名濯枝又曰梅熟時雨謂之梅雨又曰仲夏長風扇暑注云此節東南常有風至俗名黃雀長風盛引之荊州記曰宜都銀山縣有風穴穴口大數尺名為風井夏則風出冬則風入樵人有冬過者置笠穴口風吸之經日還涉長陽溪而得其笠又曰橘洲在郡南四里對南津常看如下及至夏水懷山諸洲皆沒橘洲獨在荊楚歲時記曰四月也有鳥名穫穀其鳴自呼農人候此鳥鳴則云梨根岸爾雅云鳴鳩鴶鶵郭璞云今布穀也江東呼獲穀崔寔正論云夏扈趣耘鋤即竊脂玄鳥呼穫穀則其夏扈也又曰俗忌五月曝床薦席異苑云新野庾寔嘗以五月曝席忽見一小兒死在席上俄失之其後寔子遂亡或起於此或問董勛曰俗五月不上屋云五月人脫上屋見影魂便亡勛答云蓋秦時王自為之禁夏不得行漢魏未攻案月令仲夏可以居高明可以遠眺望可以升外山陵可以處台榭鄭玄云順陽在上也今云不得上屋正與禮反敬升云見死小兒而禁曝荐席何以與於此乎俗人月諱何代無之但當矯之歸於正洞冥記曰東方朔母田氏寡夢太白星臨其上因有娠田氏歎曰無夫而孕人得棄我乃移向代郡之東方里五月生朔仍以所居為姓搜神記曰夫金錫之姓一也以五月丙午, SBCK: ''}
