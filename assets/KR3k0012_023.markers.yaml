  - {type: variant, offset: 884, length: 3, content: 陰盛必, SBCK: 日鹿角解又曰夏至加十五日指丁斗杓指丁則小暑音比大吕加十五日指未則大暑音比太蔟加十五日指庚背陽之維則夏節盡風俗通曰夏至著五綵辟兵題曰游光厲􅀑知其名者無温疾五綵辟五兵也按人取新斷織繫户亦此􅀋也謹案織取始斷二三寸帛綴着衣衿以巳織絍告成於諸姑也後世弥乆易以五綵又永建中京師大疫云厲􅀑字野}
