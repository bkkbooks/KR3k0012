  - {type: variant, offset: 4256, length: 3, content: 陳留周, SBCK: 陽平宋堇善解夢有孫}
  - {type: variant, offset: 4256, length: 12, content: 陳留周氏婢民與入山取樵忽, WYG: 陶繼之為秣陵令殺刼其中一人是大樂伎不為刼而陶逼殺之將死曰我實不作刼遂見枉殺若見鬼必自訴理少時陶}
  - {type: variant, offset: 4256, length: 12, content: 陳留周氏婢民與入山取樵忽, krp: 陶繼之爲秣陵令殺劫其中一人是大樂伎不爲劫而陶逼殺之將死曰我實不作劫遂見枉殺若有鬼必自訴理少時陶}
  - {type: variant, offset: 4260, length: 3, content: 婢民與, SBCK: 求官睡得夢􅀟鳯集其兩拳以問堇堇曰鳳皇非梧桐不栖非竹實不食卿當大凶非苴杖即削杖也後孫氏果遭母䘮又曰張天錫在凉州夢一緑色狗形甚長從城東南欲齚張張牀上避一匝乃墮地後符堅遣狗長徃破張着緑地錦􅂁從東南門}
  - {type: variant, offset: 4264, length: 4, content: 山取樵忽, SBCK: 皆如}
  - {type: punctuation, offset: 4267, content: ，, id: KR3k0012_CHANT_400-bkkpn1205}
  - {type: 'tls:seg', offset: 4267, content: '', id: KR3k0012_CHANT_400-48a.4}
  - {type: variant, offset: 4269, length: 158, content: 見一女子曰吾目中有剌煩為拔之當有厚報此婢乃見朽棺髑髏草生眼中便為拔草即於某處得一雙金指環靈魂志曰濡須口有一大舶船覆在水中水小時便出見嘗有漁人夜宿其傍以船繫但聞箏笛絃管之音夢人驅遣云勿近官妓此人驚覺即移船去傳云是曹公載妓舡覆于此于今存在智瓊傳曰弦超字義超夢神女從之自稱天上玉女姓成字智瓊早喪父母天帝愍之遣令得下嫁如此三, SBCK: 焉太平御覽卷第}
  - {type: variant, offset: 4270, length: 2, content: 一女, WYG: 此妓來云訴天得雪今來見取遂跳入陶口中仍落腹而倒俄而陶遂病死又曰姚萇既殺苻堅與苻登相拒於隴東萇夜夢堅將天帝使者勒兵馳入萇營以矛刺萇正中其隂萇驚覺隂腫痛明日遂死幽明録曰魏武帝猜忌晉宣帝}
  - {type: page-break, offset: 4270, content: '', id: KR3k0012_WYG_400-14b, image: WYG0896/WYG0896-0530d.png}
  - {type: variant, offset: 4270, length: 0, content: '', krp: 此伎來云訴天得雪今來相取遂跳入陶口中仍落腹而倒俄而陶遂病死又曰姚萇旣殺符堅與符登相拒於隴東萇夜夢堅將天帝使者勒兵馳入萇營以予刺萇正中其隂萇驚覺隂腫痛明日遂死又曰張駿有疾夢岀遊觀不識其處甘泉涌出有}
  - {type: variant, offset: 4271, length: 2, content: 女子, krp: 玄龜向駿張口言}
  - {type: variant, offset: 4273, length: 0, content: '', WYG: 非曹氏純臣又嘗夢三疋馬在槽中共食意尤憎之因召文明二帝告以所見並云防理自多無為横慮帝然之後果害族移器􅊖如夢焉又}
