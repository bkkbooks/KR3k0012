  - {type: variant, offset: 37, length: 79, content: 文王曰汝以為何也武王曰西方有九國君王其終撫諸文王曰非也古者謂年為齡齒亦齡也我百爾九十吾與爾三焉九齡九十年之祥也文王以憂勤損壽武王以安樂延年與汝三者明傳業於汝受, SBCK: 盖寢疾七日}
