  - {type: variant, offset: 1733, length: 707, content: 遇疾不肯療普通七年卒於郡梁後略曰初賀革之往江陵也意甚不悅過別御史中丞江革以情告之荅曰吾嘗夢主上遍見諸子唯至湘東王所手脫帽以與之此人後必當辟卿其行乎革因頷之遂往荊州三國典略曰江陵平梁御史中丞沈炯遷長安太祖授儀同三司甚禮待之炯恐太祖愛其文才桓閉門卻掃無所交遊時有文章隨即毀棄不令流布嘗獨行經漢武通天臺為表奏之陳己思歸之意奏訖其夜炯夢見有宮禁之所兵衛甚嚴炯便以情事陳訴聞有人言甚不惜放卿幾日可至若一月內見關出此恐不復由我寤而異之當時以為怳忽十餘日便有命放還遂與王克等並得東歸又曰陰子春嘗為東莞太守時青州刺史三神念毀壞臨海神廟當座楝上有一大虵役夫下擒入於海水爾夜子春夢見一人詣其府云有人見苦被壞宅舍既無所託欲憩此境子春心密記之經二日方知神念毀廟因辦牲醑立宇祠之數日夢一朱衣人謝曰得君厚惠當以州相報經月餘魏軍欲襲朐山子春預知設伏摧破梁武以為南青州刺史陳書曰武帝初受禪之日其夜有會稽人傅史普直省夢人自天而下著朱衣武冠導從數十手持板板上有字傅視之其文曰陳氏五主三十四年遂凌空而上旦白黃門侍郎孔宗範歎曰吾事去矣其為子孫憂乎自武帝已後并廢帝五主自永定初迄禎明末共三十四年晏子春秋曰景公舉兵將伐宋過太山公夢見二丈夫意怒甚盛公問占夢曰師過太山不用事太山神怒也公問晏子晏子曰非太山之神也宋之先湯與伊尹也湯修以長髯兌上而豐下倨身高聲伊尹黑矩蓬頭而髯豐上兌下僂身下聲公曰然又曰景公田於梧宮夜猶早公坐睡夢有五丈夫北面稱無罪公覺召晏子告所夢公曰我其嘗殺無罪歟晏子對曰昔先君靈公田五丈夫駭獸故并斷其頭葬之命曰五丈夫之丘豈此耶命人掘其葬處求之則五頭同穴而存馬公嘉之命吏葬之莊子曰宋元君夜半夢人披髮而窺阿門曰予自宰之淵為清江使河北之所漁者豫且得子元君覺, SBCK: ''}
