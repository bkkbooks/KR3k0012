  - {type: variant, offset: 1037, length: 297, content: 寢夢日環其城驚起曰此必黃鬚鮮卑奴來何以不縛之又曰簡文見讖云晉氏祚盡昌明及孝武之在孕也李太后夢神人謂之曰汝生男以昌明為字及生東方始明因以名焉簡文后後悟為之流涕後魏書曰高祖遷洛謂任城王澄曰朕昨夜夢一老公頭鬢皓白正理冠服拜立路左朕怪而問之自云晉侍中嵇紹故此奉迎神爽卑懼似有求焉澄對曰晉世之亂紹以身衛主殞命御側亦是晉之忠臣於是求其兆域遣使吊祭焉又曰莊帝在藩任城王順夢一段黑雲從西北直來觸東南上日月俱破復翳諸星天地晝闇俄雲消霧解日出莊帝復閶闔門入登太極殿呼萬歲者三百官咸加朝服既覺占之曰黑雲氣之惡者北方之色必有北敵亂京師日君象月后象星百官象以此言之京邑其當禍乎後如其夢又曰盧元明為中書侍郎友人王由寓居潁川, SBCK: 卧}
