  - {type: variant, offset: 1681, length: 286, content: 梁書曰吉士瞻少時夢得一積鹿皮而數之有十一領及覺喜曰鹿者祿也吾當居十一祿乎自其後仕進所蒞者九及除二郡心惡之遇疾不肯療普通七年卒於郡梁後略曰初賀革之往江陵也意甚不悅過別御史中丞江革以情告之荅曰吾嘗夢主上遍見諸子唯至湘東王所手脫帽以與之此人後必當辟卿其行乎革因頷之遂往荊州三國典略曰江陵平梁御史中丞沈炯遷長安太祖授儀同三司甚禮待之炯恐太祖愛其文才桓閉門卻掃無所交遊時有文章隨即毀棄不令流布嘗獨行經漢武通天臺為表奏之陳己思歸之意奏訖其夜炯夢見有宮禁之所兵衛甚嚴炯便以情事陳訴聞有人言甚不惜放卿幾日可至若一月內見關出此恐不復由我寤而異之當時以為怳忽十餘日便有命放還遂與王克等並得東歸, WYG: ''}
