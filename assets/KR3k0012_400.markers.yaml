  - {type: variant, offset: 252, length: 1, content: 寡, WYG: 我死爾聞公孫疆為政必去之及曹伯陽即位好田弋曹鄙人公孫疆好弋獲白雁獻之且言田弋之說因訪政事大悅之有寵使為司城以聴政夢者之子乃行疆言霸說於曹伯從之乃背晉而攻宋宋人伐曹晉人不救而曹亡又哀下曰衛侯夢於北宫見人登昆吾之觀衛有觀在古昆吾氏之墟被髪北靣而譟曰登此昆吾之虛綿綿生之𤓰綿綿𤓰初生也余為渾良夫呌天無辜公親筮之胥彌赦占之赦衛筮史曰不害與之邑寘之而逃奔宋國語曰晉獻公伐虢虢公夢在廟有神人靣目白毛虎爪執鉞立於西阿之下公懼而走神曰无走帝命使晉襲於爾門公拜稽首覺召史嚚占之對曰如}
  - {type: page-break, offset: 252, content: '', id: KR3k0012_WYG_400-4a, image: WYG0896/WYG0896-0524c.png}
  - {type: variant, offset: 254, length: 0, content: '', WYG: 之言則蓐收也天之刑神也公使囚之且使國人賀夢舟之僑吿其族曰衆謂虢亡不久矣吾今乃知之外内無親其誰救之吾不忍俟將其族適于晋六年虢乃亡史記曰始皇夢與海神戰如人状乃令人入海賫捕鉅魚具而自以連弩候大魚出射之遂並海西至平原津而病又曰秦二世夢白虎齧其左􅆖馬殺之問占夢人曰涇水為祟二世乃齋望夷宫閻樂殺之更立子嬰為王又曰初趙盾在夢見叔𢃄持要而哭甚悲已而笑拊手而歌盾卜之兆絶而後好趙史援占曰此甚惡非君之身乃君之子然亦君之咎至趙朔被殺下宫及趙武還故位漢書曰昌邑王夢見青蠅之矢積殿東西階王乃問龔遂對曰詩云營營青蠅止於樊愷悌君子無信讒言陛下察之王終不改續漢書曰鄭𤣥夢孔子造曰起今年嵗在辰明年嵗在已既悟以䜟占之知命當終有頃}
