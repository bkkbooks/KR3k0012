  - {type: variant, offset: 3836, length: 416, content: 浮喪飄江中明日當至君有濟物之仁豈能見移著高燥處則恩及枯骨殷明日與諸人共江上看果見一棺逐水流下飄飄至殷坐處令人牽取題如夢所即移著崗上酹以酒飯其夕又夢此人來謝恩又曰嘉興徐泰幼喪父母叔又隗養之甚於所生隗病侍甚謹三更中夢二人乘舡持箱上泰床頭發箱出簿書示曰汝叔應死泰即於夢中下地叩頭良久曰汝縣有同姓名人不泰思得語鬼云有張隗不姓徐此人云亦可強逼念汝能事叔父當為汝受之遂不復見異苑曰高平檀茂崇以義熙中喪亡其母沛郡劉氏晝眠夢見崇手捉圃扇云崇年命未盡橫被災厲方永違離今以此扇奉別母涕驚覺果於屏風門得扇上皆如踟跦網絡撫執悲慟又曰海陵如睪縣東城村邊海岸崩見一古墓有方頭漆棺以朱題云七百年墮水元熹二十年墜於縣巘和蓋從潮漂沉輒泝流還依本處村人朱護等異而啟之見老姥年可七十許璠頭著袿古攜切鬢髮皓白不殊生人釵髻衣服粲然若新送終器物枕履悉存護乃齋酒酺施于柩側爾夜護婦夢見姥云向獲名貺感至無已但我牆屋毀廢骸形飄露今以直一千託為治護也置錢便去明覺果得即用改殮移于高阜焉, WYG: ''}
  - {type: variant, offset: 3836, length: 417, content: 浮喪飄江中明日當至君有濟物之仁豈能見移著高燥處則恩及枯骨殷明日與諸人共江上看果見一棺逐水流下飄飄至殷坐處令人牽取題如夢所即移著崗上酹以酒飯其夕又夢此人來謝恩又曰嘉興徐泰幼喪父母叔又隗養之甚於所生隗病侍甚謹三更中夢二人乘舡持箱上泰床頭發箱出簿書示曰汝叔應死泰即於夢中下地叩頭良久曰汝縣有同姓名人不泰思得語鬼云有張隗不姓徐此人云亦可強逼念汝能事叔父當為汝受之遂不復見異苑曰高平檀茂崇以義熙中喪亡其母沛郡劉氏晝眠夢見崇手捉圃扇云崇年命未盡橫被災厲方永違離今以此扇奉別母涕驚覺果於屏風門得扇上皆如踟跦網絡撫執悲慟又曰海陵如睪縣東城村邊海岸崩見一古墓有方頭漆棺以朱題云七百年墮水元熹二十年墜於縣巘和蓋從潮漂沉輒泝流還依本處村人朱護等異而啟之見老姥年可七十許璠頭著袿古攜切鬢髮皓白不殊生人釵髻衣服粲然若新送終器物枕履悉存護乃齋酒酺施于柩側爾夜護婦夢見姥云向獲名貺感至無已但我牆屋毀廢骸形飄露今以直一千託為治護也置錢便去明覺果得即用改殮移于高阜焉述, krp: 𫐠}
