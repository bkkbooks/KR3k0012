  - {type: variant, offset: 4274, length: 6, content: 吾目中有剌煩, WYG: 王丞相茂宏夢人欲以百萬錢買大兒長豫丞相甚惡之潛}
  - {type: variant, offset: 4274, length: 9, content: 吾目中有剌煩為拔之, krp: 更九日}
