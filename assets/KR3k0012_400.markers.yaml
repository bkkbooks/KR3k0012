  - {type: variant, offset: 2446, length: 0, content: '', WYG: 曰行路窮道盡也不可行孔子名丘八以配丘此兵字路必有伏兵深宜慎之于是垂遂别路而進翼伏兵遂不擒之前凉録曰張駿十二年五月駿有疾夢出遊不識其處見一元龜向之張口而言更九日當有加問遂經九日而卒前趙録曰劉曜末年夢三人金靣丹脣東向逡廵不言而退曜拜履其跡太史令任義曰三者厯運之極東為震王者之始次也金為兊物衰落也脣丹不言事之畢也逡廵揖讓舍之道也為之拜者屈伏於人履跡而行慎不出疆兵必大起逺在三年曜為石勒所擒前燕録曰慕容雋夜夢石虎齧其臂覺遂痛惡之曰死胡安敢夢生天子伐掘之數其罪鞭其尸投之障水俄寢疾而死沈約宋書曰少帝凶暴日甚沈慶之猶盡言諫諍遣􅂟之從子攸之齎藥賜慶之於時年八十初慶之夢有人以両疋絹與之謂曰此絹足度慶之語人曰老子今年不免两疋八十尺也度無盈餘矣後魏書曰元熙于任城王澄薨前夢有人告之曰任城當死死後二百日外君亦不免若其不信試看任城家熙夢中顧瞻任城第舍四靣墻崩無遺堵焉熙惡之覺而吿所親及熙之死果如所夢又曰崔浩搆害李順基萌已成夜夢秉火􅅡順寢室火作而順死浩與室家羣立而觀之俄而順弟息號哭而出曰此輩吾賊也以戈擊之􅊖投於河寤而惡之以告館客馮景仁景仁曰此真不善也非復虛事人以火􅅡人暴之極也且兆始惡者終殃積不善者無餘慶厲階成矣公其圖之浩曰吾方思之而不能悛至後而族三國典畧曰齊李鉉字寳鼎渤海南皮人也春夏務農秋冬入學經疏之多發自於鉉嬰疾在體夜夢孔子忿其廣為疏例繫而捶之既寤之後焚其疏例尋而病愈齊書曰武帝初登位夢金翅鳥下殿食小龍子無數乃飛上天及明帝即位誅高武子孫並盡明帝名鸞故也又曰武帝時雍州刺史張敬兒未貴夢所居村社樹歘髙數千丈為雍州又夢社樹直上至天俄反伏誅梁書曰武帝初沈約齊末建議廢齊和帝後夢和帝以刃斷其舌約大懼召巫言與夢同竟憂卒唐書曰太宗時徐慶為征遼判官有一典不得姓名慶在軍忽夢已化為羊為典所殺覺懼流汗至曉典判案慶問曰汝夜有夢否典云夢公為羊某屠之由是慶不食羊則天時慶至司農少卿雍州司馬時典已任大理獄丞後慶被誣與内史令裴炎通謀應接英公徐敬業揚州反被執送大理忽見丞押獄慶流涕謂曰征遼之夢今當應之及被戮竟是丞引之又曰杜牧知命年得病自為墓志祭文又嘗夢告曰爾改名畢踰月奴自家來吿曰炊將熟而甑裂牧曰皆不祥也俄又夢書片紙曰皎皎白駒在彼空谷寤而嘆曰此過隙也吾生於角昴畢於角為第八宫吾之甚厄也予自湖守遷舍人木還於角足矣其年以疾終又曰韋温為宣歙觀察使明年瘍生於首謂愛聓張復魯曰予任書郎時夢二黄衣人齎符來􅇷及滻將渡一人續至曰彼墳至大功湏萬日遂不涉而寤計今萬日矣與公訣矣明日卒又曰崔湜與尚書右丞盧藏用同配流俱行湜謂蔵用曰家弟承恩或冀寛宥因遲畱不速進行至荆州夢於講堂照鏡曰鏡者明象吾當為人主所明也以告}
