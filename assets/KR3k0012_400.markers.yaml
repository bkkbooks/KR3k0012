  - {type: variant, offset: 3227, length: 459, content: 曰我帝之季女也名曰瑤姬未行而亡封巫山之臺精魂依草寔為莖之媚而服焉則與夢期所謂巫山之女高唐之姬聞君遊於高唐願薦枕席王因而幸之漢武故事曰上自封禪後夢高祖坐明堂群臣亦夢於是祀高祖於明堂列異傳曰吳選曹令史長沙劉卓得病夢一人以白越單衫與之語曰汝著此衫汗即火燒便潔也覺果有衫在側後汗便火燒之搜神記曰有周掔力感切嘖音責者貧而好道夫婦夜耕息臥夢天公過而哀之勑有以給與司命案錄籍此人相貧限不過此唯有張車子應賜錢千萬車子未生請以借之天公曰善曙覺言之於是所為輒得貲至千萬先時有張嫗者常往掔嘖家傭賃合有身月滿當孕便遣出生車屋下產得兒主人往視問言當名汝兒作何嫗曰今在車下夢天告之名為車子掔嘖乃悟自是居日衰減車子長大富於周家續搜神記曰承儉者東莞人葬後十年忽夜與其縣令夢云沒故民承儉今見劫明府急見救令便勑外內裝束往冢上日已向出天忽大霧對面不相見但聞冢中㕳㕳破棺聲有二人墳上望但霧冥不見人往令既至收得冢內三人墳上二人遂得逸走棺未壞令即使人脩復之即其夜又夢儉云二人雖得走民悉誌之一人面上有青誌如藿葉一人㧻其前兩齒折明府但案此尋覔自得也令從其言追捕皆擒獲, SBCK: ''}
