  - {type: variant, offset: 2446, length: 0, content: '', SBCK: 曰行路窮道盡也不可行孔子名丘八以配丘此兵字路必有伏兵深冝慎之於是垂遂別路而進翼伏兵遂不擒之前凉録曰張駿十二年五月駿有疾夢出遊不識其處見一玄􅀛向之張口而言更九日當有嘉問遂經九日而卒前趙録曰劉曜末年夢三人金靣丹脣東向逡廵不言而退曜拜履其跡太史令任義曰三者歴運之極東爲震王者之始次也金爲兊物衰落也脣丹不言事之畢也逡廵揖讓舎之道也爲之拜者屈伏於人履跡而行慎不岀疆兵必大起逺志三年曜爲石勒所擒前燕録曰慕容儁夜夢石虎齧其臂覺遂痛惡之曰死胡安敢夢生天子使掘之數其罪鞭其尸投之漳水俄寢疾而死沈約宋書曰少帝凶􅁀日甚沈慶之猶盡言諌争遣慶之從子攸之賫藥賜慶之死時年八十􅀄慶之夢有人以兩疋絹與之謂曰此絹足度慶之語人曰老子今年不免兩疋八十尺也度無盈餘矣後魏書曰元熈於任城王澄薨前夢有人告之曰任城當死死後二百日外君亦不免􅀂其不信試看任城家熈夢中頋瞻任城第舎四靣牆崩無遺堵焉熈惡之覺而告所親及熈之死果如所夢又曰崔浩搆害李順基萌巳成夜夢秉火􅅡順寢室火作而順死浩與室家羣立而觀之俄而順弟息號哭而岀曰此軰吾賊也以戈擊之悉投於河悟而惡之以告館客馮景仁景仁曰此真不善也非復虚事夫以火􅅡人􅁀之極也且兆始堊者終殃積不善者無餘慶厲階成矣公其圖之浩曰吾方思之而不能悛至後而族三國典略曰齊李鉉字寳鼎渤海南皮人也春夏務農秋冬入學經䟽之多發自於鉉嬰疾在牀夜夢孔子忿其廣爲䟽例繫而捶之旣寤之後其䟽例焚尋而病愈齊書曰武帝􅀄登位夢金翅鳥下殿食小龍子無數乃飛上天及明帝即位誅髙武子孫並盡明帝名鸞故也又曰武帝時雍州刺史張敬兒未貴夢所居村社樹歘髙數十丈爲雍州又夢社樹直上至天俄反伏誅梁書曰武帝􅀄沈紂齊末建議廢齊和帝後夢和帝以刀斷其舌約大懼召巫言與夢同竟憂卒唐書曰太宗時徐慶爲征遼判官有一典不得姓名慶在軍忽夢巳化爲羊爲典所殺覺懼流汗至暁典判案慶問曰汝夜有夢否典云夢公爲羊某屠之由是慶不食羊則天時慶至司農少卿雍州司馬時典巳任大理獄丞後慶􅀍誣與内史令裴炎通謀應接英公徐敬業楊州反􅀍執送大理忽見丞押獄慶流涕謂曰征遼之夢今當應之及􅀍戮竟是丞引之又曰杜牧知命年得病自爲墓志􅀕文又甞夢告曰尔改名畢踰月奴自家來告曰炊將熟而甑裂牧曰皆不祥也俄又夢書片􅁓曰皎皎白駒在彼空谷寤而歎曰此過􅂩也吾生於角昴畢於角爲第八宫吾之甚厄也予自湖守迁舎人木還於角足矣其年以疾終又曰韋温爲宣歙觀察使明年瘍生於首謂愛􅡾張復魯曰予任校書郎時夢二黄衣人賫符來追及滻將渡一人續至曰彼墳至大功湏萬日遂不涉而寤計今萬日矣與公訣矣明日卒又曰崔湜與尚書右丞盧藏用同配流俱行湜謂藏用曰家弟承恩或兾寛宥因遟留不速進行至荆州夢於講堂照鏡鏡者明象吾當爲人主所明也以告}
