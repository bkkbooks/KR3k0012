  - {type: variant, offset: 349, length: 154, content: 曰鑄刑書之歲二月或夢伯有介而行介甲也曰壬子餘殺帶也明年壬寅餘又將殺段也及壬子駟帶卒國人益懼齊燕平之月壬寅公孫段卒國人愈懼又昭四曰晉荀吳帥師滅陸渾韓宣子夢文公攜荀吳而授之陸渾宣子韓起文公晉文公荀吳仲行穆子也故使穆子帥師獻俘於文宮欲以應夢又昭七曰十二月辛亥朔日有蝕之是夜也趙簡子夢童子臝而轉以歌轉婉轉也旦占諸史墨, SBCK: ''}
