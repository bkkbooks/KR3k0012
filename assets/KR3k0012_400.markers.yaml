  - {type: variant, offset: 240, length: 2, content: 產聘, SBCK: 去叔孫氏及庚宗成十六年避僑如之難奔齊庚宗魯地遇婦人使􅀻爲食而􅀫焉適齊夢天壓已弗勝穆子夢也顧而見人黒而上僂深目而猳喙號之曰牛助余乃勝之及反魯所􅀫庚宗之婦人獻以雉獻穆子問其姓問有子不對曰余子長矣能奉雉而從我矣召而見之則所夢也未問其名號之曰牛曰唯皆召其徒使視之遂使爲竪竪官傳言從夢未必􅁻又哀上曰􅀄曹人或夢衆君子立於社宫而謀亡曹曹叔張鐸請待公孫疆許之振鐸曹始祖也旦而求之曹無之戒其子曰我死爾聞公孫疆爲政必去之及曹伯陽即位好田弋曹鄙人公孫疆好弋獲白鴈獻之且言田弋之􅀃因訪政事大恱之有寵使爲司城以聽政夢者之子乃行疆言覇􅀃於曹伯從之乃背晉而攻宋宋人伐曹晉人不救而曹亡又哀下曰衛侯夢于北宫見人登昆吾之觀衛有􅀚在古昆吾氏之虚􅀍髮北靣而譟曰登此昆吾之虚綿綿生之􅀲綿綿􅀲􅀄生也余爲渾良夫叫天無辜公親筮之胥弥赦占之赦衛筮史曰不害與之邑寘之而逃奔宋言衛侯無道卜人不敢以實對懼難而逃國語曰晉獻公伐􅉑􅉑公夢在廟有神人靣白毛虎爪執􅃏立於西河之下公懼而走神曰無走帝命使晉襲于爾門公拜稽首覺召使囂占之對曰如君之言則蓐收也天之形神也公使囚之且使國人賀夢舟之僑告其族曰衆謂􅉑亡不乆矣吾今乃知之外内無親其誰救之吾不忍俟將其族適}
