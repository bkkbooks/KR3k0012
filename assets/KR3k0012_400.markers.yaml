  - {type: variant, offset: 2262, length: 178, content: 神也宋之先湯與伊尹也湯修以長髯兌上而豐下倨身高聲伊尹黑矩蓬頭而髯豐上兌下僂身下聲公曰然又曰景公田於梧宮夜猶早公坐睡夢有五丈夫北面稱無罪公覺召晏子告所夢公曰我其嘗殺無罪歟晏子對曰昔先君靈公田五丈夫駭獸故并斷其頭葬之命曰五丈夫之丘豈此耶命人掘其葬處求之則五頭同穴而存馬公嘉之命吏葬之莊子曰宋元君夜半夢人披髮而窺阿門曰予自宰之淵為清江使河北之所漁者豫且得子元君覺, WYG: ''}
