  - {type: variant, offset: 2734, length: 2, content: 雲亦, SBCK: 韓生連三夜有惡夢以問人人教晨起厠中祝之三旦人告以爲祝詛捕治數日死玄晏春秋曰十二月乙丑夕夢至京師自廟出見車􅀐甚衆以物呈廟云誅大將軍曹爽寤以告梁析析曰君欲曹人之夢乎朝無公孫疆子曰爽無叔振之請苟失天機則籬矣何待於疆益部􅂄舊記曰何􅕼甞夢井中生桑以問占夢趙直直曰桑非井中之物然桑字四十下有八君夀恐不過此後果如直}
  - {type: page-break, offset: 2734, content: '', id: KR3k0012_SBCK_400-8a}
  - {type: variant, offset: 2734, length: 11, content: 雲亦言成帝時上甘泉召使, WYG: 韓生連三夜有惡夢以問人人教晨起厠中祝之三旦人告以為祝詛捕治數日死元晏春秋曰十二月乙丑夕夢至京師自廟出見車騎甚衆以物呈廟云誅大將軍曹爽寤以吿梁析析曰君欲}
  - {type: page-break, offset: 2734, content: '', id: KR3k0012_WYG_400-12b, image: WYG0896/WYG0896-0529d.png}
  - {type: variant, offset: 2734, length: 13, content: 雲亦言成帝時上甘泉召使作賦, krp: 韓生連三夜有惡夢以問人人教晨起厠中祝之三旦人告以爲祝詛捕治數日死玄晏春秋曰十二月乙丑夕夢至京師自廟出見車騎甚衆以物呈廟云誅大將軍曹爽寤以告梁析析曰君欲曹人之夢乎朝無公孫疆}
  - {type: punctuation, offset: 2737, content: ：, id: KR3k0012_CHANT_400-bkkpn787}
  - {type: 'tls:seg', offset: 2737, content: '', id: KR3k0012_CHANT_400-33a.4}
  - {type: variant, offset: 2737, length: 1, content: 成, SBCK: 管輅別傳曰輅見何尚書何曰頃連夢青蠅數十來在鼻上驅之不肯去何也輅曰夫鼻者艮也天中之山而蝇集之位峻者危輕豪者亡後遂􅀍誅捜神記曰吴時嘉興徐伯始病使道士吕石安神座石有弟子戴夲王思二人居在海鹽伯始迎之以助石晝卧夢上天北斗門下見外鞍馬三疋云明日當以一迎石一迎夲一迎思石夢覺語本思如此死期至可急還與家別不卒事而去伯始恠而留之曰懼不見家也間一日三人同日死續捜神記曰㑹稽謝奉與永嘉太守郭伯猷善謝忽夢郭與人於浙江上争樗蒲錢爲水神所責墮水死巳營理郭凶事旣覺便徃郭許共圍碁良乆謝云卿知吾來意不因􅀃所夢郭聞之悵然云信與人争如卿所夢何期太的也湏􅁷如厠便倒氣絶謝斷理之如所夢異苑曰符堅將欲南師也夢葵生城内明以問婦婦曰若征軍逺行出難爲將也堅又夢地東南傾復以問云江左不可平也君無南行必敗之應也堅不從卒敗又曰陳郡殷靈均義熈中爲桂陽太守夢人􅅞將去形神乖散復有一人云且置在作衡陽當取之殷驚寤惆悵永􅀄三年除衡陽郡知􅁳理難避辞不免尋寢疾而亡􅄒異記曰陶繼之爲秣陵令殺劫其中一人是大樂􅇊不爲劫而陶逼殺之將死曰我實不作劫遂見枉殺􅀂有􅀑必自訴理少時陶夢見此􅇊來云訴天得雪今來相取遂跳入陶口中仍落腹而倒俄而陶遂病死又曰姚萇旣殺符堅與符登相拒於隴東萇夜夢堅將天}
