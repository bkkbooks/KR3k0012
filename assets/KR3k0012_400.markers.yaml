  - {type: variant, offset: 244, length: 2, content: 晉侯, krp: 六年􅉑乃亡史記曰始皇夢與海神闘如人狀乃令人入海賫捕鉅魚具而自以連弩候大魚岀射之遂並音旁海西至平原津而病又曰秦二丗夢白虎齧其左驂馬殺之問占夢人曰涇水爲崇二丗乃齋望夷宫閻樂殺之更立子嬰爲王又曰𥘉趙盾在時夢見叔帶持要而哭甚悲巳而笑拊手而歌盾卜之兆絶而後好趙史援占曰此甚惡非君之身乃君之子然亦君之咎至趙翔𬒳殺下宫及趙武還故位漢書曰昌邑王夢見青蠅之矢積殿東西階王乃問龔遂對曰詩云營營青蠅止于蕃愷悌君子無信䜛言陛下察之王終不改續漢書曰鄭玄夢孔子造曰起今年歳在辰來年歳在巳旣悟以䜟占之知命當終}
