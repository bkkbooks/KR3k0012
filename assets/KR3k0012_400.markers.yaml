  - {type: variant, offset: 14, length: 1, content: 文, SBCK: 賜爾來何遟也夏后氏殯於東階之上則猶在阼也殷人殯於兩楹之間則與賔主夾之也周人殯於西階之上則猶賔之也而丘也殷人也子疇昔之夜夢坐奠於兩楹之間夫明}
  - {type: variant, offset: 14, length: 1, content: 文, WYG: 賜爾來何遲也夏后氏殯於東階之上則猶在阼也殷人殯於两楹之間則與賔主夾之也周人殯於西階之上則猶賔之也而丘也殷人也予疇昔之夜夢坐奠於两楹之間夫明}
