  - {type: variant, offset: 174, length: 1, content: 鞍, WYG: 晉侯夢大厲被髪及地搏膺而踊呼曰殺余孫不義厲鬼趙氏}
  - {type: variant, offset: 174, length: 1, content: 鞍, krp: 晉侯夢大厲𬒳髮及地搏膺而踊呼曰殺余孫不義厲鬼趙氏}
  - {type: variant, offset: 176, length: 0, content: '', SBCK: 先祖也餘得請於帝矣壞大門及寢門而入公懼入于室又壞户公覺召桑田巫巫言如夢巫言􅀑怒如公所夢公曰何如曰不食新矣六月丙午公欲麦使甸人獻麦將食張如厠䧟而卒小臣有晨夢􅀒公以登天及日中􅀒􅀳侯出諸厠遂以爲殉又成公下曰晉楚將}
  - {type: page-break, offset: 176, content: '', id: KR3k0012_SBCK_400-1b}
  - {type: variant, offset: 176, length: 0, content: '', WYG: 先祖也余得請於帝矣壞大門及寢門而入公懼入於室又壞戸公覺召桑田巫巫言如夢巫言鬼怒如公所夢公曰何如曰不食新矣六月丙午公欲麥使甸人獻麥将食張如厠陷而卒小臣有晨夢負公以登天及日中負晉侯出諸厠遂以為狥又成公下曰晉楚将}
  - {type: page-break, offset: 176, content: '', id: KR3k0012_WYG_400-2a, image: WYG0896/WYG0896-0523c.png}
  - {type: variant, offset: 176, length: 0, content: '', krp: 先祖也餘得請於帝矣壞大門及寢門而入公懼入于室又壞户公覺召桑田巫巫言如夢巫言鬼怒如公所夢公曰何如曰不食新矣六月丙午公欲麦使甸人獻麦將食張如厠䧟而卒小臣有晨夢負公以登天及日中負晉侯出諸厠遂以爲殉又成公下曰晉楚將}
  - {type: punctuation, offset: 177, content: ，, id: KR3k0012_CHANT_400-bkkpn61}
  - {type: 'tls:seg', offset: 177, content: '', id: KR3k0012_CHANT_400-2a.11}
  - {type: variant, offset: 177, length: 3, content: 晉韓厥, SBCK: 吕錡}
  - {type: variant, offset: 177, length: 3, content: 晉韓厥, WYG: 吕錡}
  - {type: variant, offset: 177, length: 0, content: '', krp: 吕錡夢射月中之退入於泥占之曰姬姓日也異姓月也必楚王也射而中之退入於泥亦必死矣及戰射恭王中目王召養由基與之兩矢使射吕錡中項伏弢以一矢復命言一發而中之又成下曰𥘉聲伯夢渉洹洹水岀汲縣林慮縣東北至魏郡長樂縣入清水也或與己瓊瑰瓊王瑰珠也食之泣而爲瓊瑰盈其懐淚下化爲珠玉蒲懷從而歌曰濟洹之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懐乎懼不敢占也還自鄭至于貍脤而占之曰余恐死故不敢占也今衆繁而從余三年矣而無傷也言之至暮而卒繁多也傳誡數占夢又襄王曰齊侯伐我北鄙中行獻子將伐齊夢與厲公說弗勝厲公獻子所殺者公以戈擊之首墜於前跪而戴之奉之以走見梗陽之巫臯梗陽}
  - {type: variant, offset: 178, length: 2, content: 韓厥, krp: 邑也在太原臯巫名也}
  - {type: variant, offset: 181, length: 0, content: '', SBCK: 射月中之退入於泥占之曰􅁎姓日也異姓月也必楚王也射而中之退入於泥亦必死矣及戰射恭王中目王召養由基與之兩矢使射吕錡中項伏弢以一矢復命言一發而中之又成下曰􅀄聲伯夢渉洹洹水岀汲縣林慮縣東北至魏郡長樂縣入清水也或與己瓊瑰瓊王瑰珠也食之泣而爲瓊瑰盈其懐淚下化爲珠玉蒲懷從而歌曰濟洹之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懐乎懼不敢占也還自鄭至于貍脤而占之曰余恐死故不敢占也今衆繁而從余三年矣而無傷也言之至暮而卒繁多也傳誡數占夢又襄王曰齊侯伐我北鄙中行獻子將伐齊夢與厲公􅀃弗勝厲公獻子所殺者公以戈擊之首墜於前跪而戴之奉之以走見梗陽之巫臯梗陽􅀳邑也在太原臯巫名也夢并見之他日見諸道與之言同巫亦夢見獻}
