  body:
  - {type: variant, offset: 4, length: 2, content: 二戶, SBCK: 三㕔事齋房庭階陛墀序廊塾壇屏扆宁㕔事郡國志曰廣州呉孫皓時以滕脩爲刺史未至州有五仙人􅀐五色羊􅀒五榖來迎而去今州㕔事梁上􅀞五仙人􅀐五色羊爲瑞裴淵廣州記曰州㕔事梁上􅀞五羊像又作五榖囊隨像懸之云昔髙固爲楚相五年衘榖莖于楚庭於是圖其像廣州則楚分野故因圖象其瑞焉臨海記曰章安縣南門有赤蘭橋世傳成公綏作縣此橋上製㕔縣令年常􅀕㕔事神用生鹿其年活得白鹿還於㕔事上生以􅀕神仍遂食之歳時用焉自是以後白鹿不可復得而必須生鹿歴代相承迄今不絶世說曰􅁃太尉兄弟􅀄渡江行路人有避􅀨者悉聚諸㕔事上征西車􅀐自譬遣之不肯去太尉新沐頭散髮髙詠從閤内出避􅀨者退莫有留者王㓪與許靖書曰武皇帝於江陵劉景􅂛㕔事上共論道足下至于通夜不寐忘倦飢渇無巳盧諶􅀕法曰凡􅀕法有廟者置之於座未遑立廟􅀕於㕔事可也兩京記曰考功貟外㕔有薛稷􅀞鶴宋之問爲讃工部尚書㕔有薛稷􅀞樹石並爲時所重齊王安成記曰大和中陳郡殷府君引水入城穿池殷仲堪又於池北立小屋讀書百姓于今呼曰讀書齋晉徴祥說曰桓􅀇鎮姑熟屋壁先􅀞作黄盤龍號盤龍齋俄而玄敗將軍劉毅居之毅小名盤襄􅃆記曰金城内刺史院有髙齋梁昭明太子於此齋造文選鮑至云簡文爲晉安王鎮襄陽日又引劉孝威􅁃肩吾徐防江伯操孔敬通惠子恱徐陵王囿孔鑠等於此齋綜覆詩集于時鮑至亦在數凡十人資給豐厚曰設肴饌于時號爲髙齋學士雍州記云髙齋其泥色甚鮮浄故此名焉南平丗子恪臨州有甘露降此齋前竹林昭明太子於齋營集道義以時相繼又曰白土齋南道有一齋以栗爲屋梁武帝臨州寢卧於此齋中常有五色雲廻轉􅃺如盤龍屋上恒紫雲騰起形似繖蓋逺近望者莫不異焉梁武帝于此龍飛又曰髙齋東北有一齋名曰下齋次於髙齋制度壯麗極爽塏刺史辯决獄訟舊出此齋國史􅀘曰梁武造寺令蕭子雲飛白大書一蕭字在焉李約自江淮竭産買歸洛中置於小亭號曰蕭齋房說文曰房室在旁也}
