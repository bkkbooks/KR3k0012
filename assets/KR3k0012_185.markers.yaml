  - {type: variant, offset: 173, length: 0, content: '', SBCK: 陽陽左執簧右招我由房漢書曰哀帝􅀄即位躬行儉約省減諸用政事由已出朝廷翕然望焉有詔問丞相大司空定陶恭王太后冝當何居孔光不欲令帝旦夕相近即議以爲定陶王太后冝改築宫大司空何武曰可居北宫有紫房􅃨道通未央宫太后果從􅃨道朝夕至帝所求欲稱尊号貴􅃂其屬使上以不得直道而行應劭漢官儀曰皇后稱椒房以椒􅂗室圭温暖除惡氣也酈善長注水經曰􅉮水出南山芒水谷北流遥玉女房水側山際有石室世謂}
  - {type: page-break, offset: 173, content: '', id: KR3k0012_SBCK_185-3a}
  - {type: variant, offset: 173, length: 0, content: '', krp: 陽陽左執簧右招我由房漢書曰哀帝𥘉即位躬行儉約省減諸用政事由已出朝廷翕然望焉有詔問丞相大司空定陶恭王太后冝當何居孔光不欲令帝旦夕相近即議以爲定陶王太后冝改築宫大司空何武曰可居北宫有紫房複道通未央宫太后果從複道朝夕至帝所求欲稱尊号貴寵其屬使上以不得直道而行應劭漢官儀曰皇后稱椒房以椒塗室圭温暖除惡氣也酈善長注水經曰芭水出南山芒水谷北流遥玉女房水側山際有石室世謂}
