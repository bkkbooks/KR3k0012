  - {type: variant, offset: 2158, length: 698, content: 而閣天子之閤左達五右達五鄭玄注曰閤以板為之藏食物也王者三牲肉及魚臘廣雅曰棧閣也漢書曰甘露中五經諸儒雜論於石渠閣又揚雄傳曰王莽時雄校書天祿閣上治獄使者來欲收雄雄恐不免乃從閣上自投幾死莽聞之曰雄素不與事何故在此間請問其故迺劉愔子棻嘗從雄學作奇字雄不知情有詔勿問然京師為語曰惟寂惟寞自投于閣後漢楊級上言宣帝博徵群儒論定五經於石渠閣方今天下少事學者得成其業而章句之徒破壞大體宜如石渠故事永為後世法於是詔諸儒於白虎觀論考同異焉陳書曰至德二年後主於光昭殿起臨春結綺望仙等三閣長數丈並數十間其䆫牖戶壁皆以懸柏橍檻之類並以沉檀香木為之又飾以金玉間以珠翠外施珠簾內有寶帳其服玩之屬瑰寶珍異皆近古所未有每微風暫動香聞數里朝日初照光映後庭其下積石為山引水為池植以奇樹雜以花藥後主自居臨春閣貴妃居結綺閣龔孔二貴嬪居望仙閣並複道交相往來五代史朱梁傳曰宰相柳璨奏西京舊有凌煙閣圖畫國初功臣今遷幸東都比未崇建四鎮副元帥梁王勳業冠古請近新凌煙閣別創一閣圖畫梁王以旌德業詔曰魏賞彭陽之功別創紀勳之觀齊旌泗水之績乃崇嘉德之樓式示新規爰從舊典宜令所司於皇城內擇善地別造凌煙閣圖寫賜名曰天祐旌功之閣戰國策曰田單棧道木閣以迎齊襄王及后於城陽山反之國楚漢春秋曰項王為高閣置太公於上告漢王曰今不急下吾烹太公漢王曰吾與項王約為兄弟吾翁即汝翁若烹汝翁幸分我一杯羹三輔舊事曰秦二世欲起凌雲閣與南山齊漢宮殿䟽曰天祿閣騏驎閣蕭何造以藏祕書畫賢臣凌雲閣秦二世造洛陽宮殿簿曰高平觀南行至清覽觀高閣六十四間脩齡觀南行至臨商觀高閣五十五間太極殿前南行仰閣三百二十八間南上惣章觀閣十三間東上凌雲臺閣十一間永寧宮連閣二百八十六間十二間連閣上下數見親觀差閣九間洛陽地, SBCK: 洲}
