  - {type: variant, offset: 3348, length: 4, content: 崇陽闥延, SBCK: 第以自障蔽也示臣臨見自整屏氣處也呉越春秋曰越將伐呉越王命於夫人王背屏夫人向屏而立王曰自今日之後内政無岀外政無入各守其職巳盡其信内中辱者則是子境外千里辱者則是予也吾見子於是巳}
