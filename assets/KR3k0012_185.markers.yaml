  - {type: variant, offset: 12, length: 6, content: 所以謹護閉塞, SBCK: 室之兩旁}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 室之兩旁也尚書大傳曰古后夫人將侍於君前息燭後舉燭至于房中釋朝服襲燕服然後入御於君毛詩黍離曰君子陽陽左執簧右招我由房漢書曰哀帝初即位躬行儉約省减諸用政事由已出朝廷翕然望治焉有詔問丞相大司空定陶恭王太后宜當何居孔光不欲命令帝旦夕相迎即議以為定陶王太后宜改築宫大司空何武曰可居北宫有紫房複道通未央宫後太后果從複道朝夕至帝}
