  - {type: variant, offset: 242, length: 284, content: 舉之及嬰見文怒曰五月之子長與戶齊不利其父母文頓首曰人生受命于天乎受命于戶乎如受命于戶則高其戶誰能至者嬰歎曰子休矣後漢龐參為漢陽太守郡人任棠者有奇節隱居教授參到先候之棠不與言但以薤一大本水一盞致於屏前自抱孫兒伏於戶下主簿白以為琚參思其微意良久曰棠是欲曉太守也水者欲吾清也拔大薤本欲吾擊強宗也抱兒當戶欲吾開門恤孤也於是歎息而還參在職果能抑強扶弱以惠政得人又曰魏應字君伯任城人也少好學建武初詣博士受業習魯詩閉戶誦習不交僚友京師稱之又曰魯恭十五及弟丕俱居大學習魯詩魯申公詩閉戶講誦絕人間事兄弟俱為諸儒所稱學士爭歸之晉書羊祜傳襄陽百姓於峴山祜平生遊憩之所建碑立廟歲時饗祭焉望其碑, SBCK: 窺}
