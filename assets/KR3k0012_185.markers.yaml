  - {type: variant, offset: 529, length: 525, content: 流涕杜預因名為墯淚碑荊州人為祜諱名屋室皆以門為稱改戶曹為詞曹也老子曰不出戶知天下莊子曰原憲居魯蓬戶不完桑以為樞也慎子曰天明不憂人之闇雖不憂闇也闕戶牖必取以明焉淮南子曰使鬼神玄化則不待戶牖而行若循虛而出入則亦無履也夫戶牖者風氣所從往來也而風氣者陰陽之戶牖者也離者必病離遭故託鬼神以戒之又曰百星之明不若一月之光十牖畢開不若一戶之明楊子法言曰山徑之蹊不可勝由矣向墻之戶不可勝入矣曰惡由入曰孔氏孔氏者戶也曰子戶乎曰我戶哉吾獨有不戶者矣惡大不由聖人之道者也三輔黃圖曰明堂有三十六戶法極陰之變數束晢發蒙記曰治戶傷孕婦楚國先賢傳曰孫敬入學閉戶牖精力過人太學號曰閉戶先生語林曰大將軍丞相諸人在此時閉戶共為謀身之計王曠世弘來在戶外諸人不容之曠乃剔壁闚之曰天下大亂諸君欲何所圖謀將欲告官遽而內之遂建江左之策神異經曰東南有石井焉上二石闕東南面上有榜著闕題曰地戶列士傳曰吳王闔閭畏王僚之子慶忌作石室銅戶以備之太公金匱戶之書曰出畏之入懼之也解道虎齊記曰巢父城北十五里石戶聖人去轉欲閉今裁廣數寸窺屋裏方二丈論衡曰燕王生明光宮所臥處三戶盡閉使二十人開不得越地傳曰勾踐宮有百戶列仙傳曰方回堯時隱人食雲母夏桀時為人所閉於宮中從求道因化得去印封其戶時人曰得方回一丸泥閉戶不可開樞爾雅曰樞, SBCK: 動心驚魂}
