  - {type: variant, offset: 13, length: 0, content: '', WYG: 求欲尊稱貴寵其属使上}
  - {type: variant, offset: 14, length: 4, content: 謹護閉塞, WYG: 不得直道而行應劭漢官儀曰皇后稱椒房以椒塗壁主温煖除惡氣}
