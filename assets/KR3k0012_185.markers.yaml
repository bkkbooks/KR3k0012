  - {type: variant, offset: 1261, length: 640, content: 固三秦記曰明光殿以金為戺關易復卦曰先王以至日閉關商旅不行后不省方焦貢易林曰大畜之乾金柱鐵關堅固衛災君子居之居當憂居左傳襄四年季孫攻臧紇斬鹿門之關以出奔邾杜預曰魯南城東門方言曰關而東陳楚之間戶籥老子曰善閉無關鍵史記曰侯嬴謂魏公子曰嬴乃夷門抱關者又漢書王仲翁謂蕭望之曰不肯錄錄反抱關為錄錄循常也魯連子曰魯連先王見孟嘗君於杏堂之門孟嘗君曰吾聞先生有勢數可得聞乎連曰勢數者譬若門關舉之而便則可以一指持中而舉之非便則兩手不關非益加重兩手非加罷也彼所起者非舉勢也彼可舉然后舉之所謂勢數鑰周禮地官曰司門掌授管鍵以啟閉國門鄭司農云鍵為壯也方言曰關西謂之鑰何承天纂文曰牡出鑰者也人作鑰子鑰母非也東宮舊事曰守鑰四人對番上下東宮門鑰在中庶子坊太公金匱鑰之書曰昏慎守深察訛也風俗通曰鑰施懸魚翳伏淵源欲令楗閉如此闈爾雅曰宮中門謂之闈周禮考工記曰闈門容小扃蔡邕明堂月令語曰明堂之門北門稱闈閨爾雅曰闈小者謂之閨說文曰閨持主戶也上圓下方有似於圭文選曰閨中風暖閤說文曰閤門傍戶也爾雅曰小閨謂之閤史記曰汲黯為東海太守以清靜為政黯多病臥閤內不出歲餘東海大治漢書曰公孫弘為丞相起客館開東閤以延賢人又曰田延年盜三千萬即閉閤獨居偏袒持刀東西步數日使者召延年詣廷尉聞鼓聲自刎死漢書曰左馮翊韓延壽行縣之高陵有昆弟相與訟田延壽恥不能明教化因入傳舍閉閤思過訟者自髡肉袒謝之宋書曰孝武宴朝賢張暢何偃並在坐偃因醉曰張暢固是奇才同義宣作賊亦能無咎非才何以致此暢乃厲聲曰太初之時誰黃其閤帝曰何事相苦初元凶時偃父尚之為元凶司空義師至新林門生皆, SBCK: ''}
