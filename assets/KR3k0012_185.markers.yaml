  - {type: variant, offset: 19, length: 2, content: 說文, SBCK: 尚書大傳}
  - {type: variant, offset: 19, length: 0, content: '', WYG: 酈善長水經注曰芑水出南山芒谷北流逕玉女房水側山際有石室世謂之玉女房郡國志曰葭萌縣玉女房昔有玉女入石穴空有竹數莖下有青石壇每因風恒自掃壇王子年拾遺記曰越欲滅吳蓄天下竒寳美人異味以進于吳殺三牲以祈天地殺龍以祀川海以江南億户民輸為傭保又選美女二人一名夷光一名脩明以貢於呉呉處之以椒華之房貫細珠為簾幌幌内竊窺者莫不動心驚魂謂之神人呉王妖惑怠於國政及越兵入乃抱二女逃於呉苑晉宫閤名曰洛陽宫内有義和温房十洲記曰崑崙山有紫翠丹房拾遺錄曰崑崙丹宻雲房東西千歩望之如丹霞尸子曰太山之中有神房阿閣楚辭曰姱容修態絙洞房又九歌曰桂棟兮蘭橑新夷楣兮葯房宋玉風賦曰主人女子乃更有蘭房奥室止臣其中庭}
