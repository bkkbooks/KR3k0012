  - {type: variant, offset: 1401, length: 204, content: 錄錄循常也魯連子曰魯連先王見孟嘗君於杏堂之門孟嘗君曰吾聞先生有勢數可得聞乎連曰勢數者譬若門關舉之而便則可以一指持中而舉之非便則兩手不關非益加重兩手非加罷也彼所起者非舉勢也彼可舉然后舉之所謂勢數鑰周禮地官曰司門掌授管鍵以啟閉國門鄭司農云鍵為壯也方言曰關西謂之鑰何承天纂文曰牡出鑰者也人作鑰子鑰母非也東宮舊事曰守鑰四人對番上下東宮門鑰在中庶子坊太公金匱鑰之書曰昏慎守深察訛也風俗通曰鑰施懸魚翳伏淵源欲令楗閉如此闈, WYG: 墀序}
