  - {type: variant, offset: 4, length: 2, content: 二戶, WYG: 三㕔事齋房庭階陛墀序廊塾壇屏扆宁㕔事郡國志曰廣州吳孫皓時以滕修為廣州刺史未至州有五僊人騎五色羊負五穀來迎而去今州㕔事梁上畫五僊人騎五色羊為瑞裴淵廣州記曰㕔事梁上畫五羊像又作五穀囊隨像懸之云昔髙固為楚相五年銜榖莖於楚庭於是圖其像廣州則楚分野故固圖像其瑞焉臨海記曰章安縣南門有赤蘭橋世傳成公綏作縣此橋上置㕔事縣令年長解㕔事神用生鹿其年活得白鹿還於㕔事上生以祭神仍遂食之歲時用焉自是以後白鹿不可復得而必須生鹿歴代相承迄今不絶世說曰庾太尉初渡江行路人有避雨者悉聚諸㕔事上征西車騎自譬遣之不肯去太尉新沐頭散髪髙詠從閣内出避雨者退莫有留者王郎與許靖書曰武皇帝於江陵劉景升㕔事上共論道足下至通夜不寐忘倦飢渴無已盧湛祭法曰凢祭法有廟者置之於座未遑立廟祭於㕔事也兩京記曰考功員外㕔有薛稷畫宋之問為讃工部尚書㕔有薛稷樹石為時所重齋王安成記曰太和中陳郡殷府君引水入城穿池殷仲堪又於池北小屋讀書百姓于今呼為讀書齋晉徵祥説曰桓𤣥鎮姑熟屋壁先畫作黄盤龍號為盤龍齋俄而𤣥敗將軍劉毅居之毅小名盤龍襄沔記曰金城内刺史院有髙齋梁昭明太子於此齋造文選焉鮑至云簡文為晉安王鎮襄陽日又引劉孝威庾肩吾徐防江伯操孔敬通惠子悦徐陵王囿孔鑠等於此齋綜覈詩集于時鮑至亦在數凡十人資給豐厚日設肴饌于時號為髙齋學士雍州記云髙齋其泥色甚鮮浄故此名焉南平世子恪臨川記云有甘露降此齋前竹林昭明太子於齋營集道義以時相繼又曰白土齋南道又一齋以栗為屋梁武帝臨州寢卧於此齋中常有五色雲迴轉狀如盤龍屋上恒紫雲騰起形似繖葢逺近望者莫不異焉梁武於此龍飛又曰髙齋東北有一齋名曰下齋次於髙齋制度壯麗極爽塏刺史辨決獄訟舊出此齋國史補曰梁武造寺命蕭子雲飛白大書一蕭字在焉李約自江淮竭産買歸於洛中匣於小亭號曰蕭齋房說文曰房室在旁也}
