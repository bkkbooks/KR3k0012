  - {type: variant, offset: 3283, length: 2, content: 連閣, krp: 東西廂}
  - {type: variant, offset: 3287, length: 1, content: 簃, SBCK: 序郭璞曰所以序别外内也犍為舎人日殿東西堂序尊卑處廣雅曰反坫謂之序說文曰序東西牆也尚書顧命曰大訓在西序河圖在東序孔安國曰大訓唐虞書典謨也河圖八卦也王延壽魯靈光殿賦曰東序重深而奥祕廊周書作雒曰凢五宫明堂咸有重廊史記紂有䛕臣曰左強夸而目巧教紂爲象廊漢書曰武帝筞茂才曰盖聞虞舜之時逰巖廊之上文頴注曰殿下外屋也􅀳灼注曰堂邊曰巖峻之廊也鄭緝之東陽記曰石歩廊去歌山十里臨流虚構高可數丈長三十丈可容百人坐韓子曰師曠爲晉平公請角一奏有雲從西北方起再奏大風而隨之裂幃幕破俎豆墯廊瓦平公懼伏于廊室兩京記曰隋煬帝從東都至西京御道並作長廊枚乗七發曰連廊四注臺城増光陸機與弟雲書曰聽頌觀東作百丈許廊屋塾爾雅曰門側之堂謂之塾}
