  - {type: variant, offset: 2945, length: 2, content: 物理, SBCK: 楚辭曰姱容脩態絙洞房又九歌曰桂棟􅀆蘭橑新夷楣􅀆葯房宋玉風賦曰主人女子乃更有蘭房奥室止臣其中庭說文曰庭朝中也尚書曰咸造勿褻在王庭周易曰揚于王庭孚號有厲造自邑不利即戎利有攸徃禮記曰諸侯之庭毛詩曰洒掃庭内又曰俟我于庭乎而又曰殖殖其庭又曰子有庭内弗洒弗掃又曰有瞽有瞽在周之庭左傳曰庭實旅百}
