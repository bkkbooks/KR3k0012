  - {type: variant, offset: 761, length: 501, content: 十六戶法極陰之變數束晢發蒙記曰治戶傷孕婦楚國先賢傳曰孫敬入學閉戶牖精力過人太學號曰閉戶先生語林曰大將軍丞相諸人在此時閉戶共為謀身之計王曠世弘來在戶外諸人不容之曠乃剔壁闚之曰天下大亂諸君欲何所圖謀將欲告官遽而內之遂建江左之策神異經曰東南有石井焉上二石闕東南面上有榜著闕題曰地戶列士傳曰吳王闔閭畏王僚之子慶忌作石室銅戶以備之太公金匱戶之書曰出畏之入懼之也解道虎齊記曰巢父城北十五里石戶聖人去轉欲閉今裁廣數寸窺屋裏方二丈論衡曰燕王生明光宮所臥處三戶盡閉使二十人開不得越地傳曰勾踐宮有百戶列仙傳曰方回堯時隱人食雲母夏桀時為人所閉於宮中從求道因化得去印封其戶時人曰得方回一丸泥閉戶不可開樞爾雅曰樞謂之椳郭璞注曰門戶扉樞也孫炎曰門戶扇樞間可依蔽為椳也說文曰門樞謂之椳魏志華佗曰戶樞不朽潛夫論曰貴戚懼家之不吉而聚為令名懼之不堅而為作鐵樞卒其所敗者非禁忌少門樞朽也苦崇貨財而行驕僣失民心耳事具門部傅子曰漢武世王侯觀殿重階金樞紫墀李陵詩曰明月照戶樞想見餘光輝文選詩曰秦地天下樞八方溱賢才尚書顧命曰四人綦弁執弋上刃夾兩階戺孔安國曰綦文鹿子皮弁亦土也堂廉曰戺土所立處爾雅曰樞達北方謂之落時落時謂之戺郭璞曰門特樞者或達北隱以固, WYG: 尺}
