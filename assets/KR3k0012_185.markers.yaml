  - {type: variant, offset: 3319, length: 0, content: '', SBCK: 趙孝爲郎每告歸往來常白衣歩檐過道上郵亭但稱書生􅀉止於亭門塾魏武制度奏曰三公列侯門施内外塾方三十􅅿壇左傳曰子産相鄭伯以如楚舎不爲壇漢書曰蕭何薦韓信於髙祖髙祖擇日齋戒設壇拜爲將軍莊子曰孔子遊乎緇帷之林休坐乎杏壇之上弟子讀書孔子􅃶歌皷琴奏曲未終有漁父者下船而來左手據膝右手柱頥以聽曲終而招子貢子路二人俱對客指孔子曰彼何爲者也子路曰魯之君子也徐靈期南岳記曰南岳山上有飛流壇懸水激石飛湍百仞即孫温伯所䘮身處也又有曲水壇水行石上成溝瀆如世人臨河壇也三月三日時來逍遥梁州記曰􅃆陽城先􅃆陽縣所治也在漢水南舊蕭何所築劉備爲漢王權住此城盟於城下今門外有盟壇猶存}
