  - {type: variant, offset: 209, length: 2, content: 由戶, WYG: 庭漢書曰王商為人多質有威重師古曰多質言不為文飾長八尺餘身體鴻大容貌絶人河平四年單于來朝引見白虎殿見丞相商坐未央庭中單于前拜謁商師古曰單于将見天子前經未央庭中過商起離席與言單于仰視商貌大畏之遷延却退天子聞言而歎曰真漢相矣晉書曰謝元字幼度少頴悟與從兄朗俱為叔父安所噐重安嘗戒約子姪曰子弟亦何豫人事而正欲使其佳諸人莫有言}
