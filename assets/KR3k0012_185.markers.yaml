  - {type: variant, offset: 3344, length: 3, content: 洛陽宮, SBCK: 屏自鄣屏也蕭牆在門内蕭肅也臣將入於此自肅警之處也罘罳在門外罘復也臣將入請事於此復重思也禮記禮器曰康王䟽屏天子之廟飾也鄭玄注云屏樹也今謂之果罳論語八佾曰或問管氏知禮乎曰􅀖君樹塞門管氏亦樹塞門管氏而知禮孰不知禮鄭玄注曰樹屏也又季氏曰吾恐季孫之憂不在顓􅁷而在蕭牆之内蕭牆謂之屏也漢書佞幸傳曰哀帝令將作爲董賢起􅃁營義陵旁内爲便房剛栢題湊外徼道周垣數里門闢罘罳甚盛又曰王莽傳曰莽性好時日小數及事迫急但爲厭勝遣使壞渭陵園門罘罳曰無使民復思漢也漢官典職曰省閣下大屏稱曰丹屏尚書郎含雞舌香伏其下奏事晉書曰阮籍爲東平相􅜂去屏障使内外相對孫卿子曰天子外屏諸侯内屏禮也外屏不欲見於外内屏不欲見於内也風俗通曰屏卿大夫以帷士以簾稍}
  - {type: page-break, offset: 3344, content: '', id: KR3k0012_SBCK_185-8a}
  - {type: variant, offset: 3344, length: 3, content: 洛陽宮, WYG: 屏自障屏也蕭牆在門内蕭蕭也臣将入于此肅警之處也罘罳在門外罘復也臣将入請事于此復重思也禮記禮噐曰康圭䟽屏天子之廟飾也鄭𤣥注云屏樹也今謂之罘罳論語八佾曰或問管氏知禮乎曰邦君樹塞門管氏亦樹塞門管氏而知禮孰不知禮鄭𤣥注曰樹屏也又論語曰吾恐季孫之憂不在顓㬰而在蕭牆之内也蕭牆屏也漢書佞倖傳曰哀帝令将作為董賢起冢營義陵旁内為便房剛柏題湊外徼道周垣數里門闢罘罳甚盛又曰王莽傳曰莽性好時日小數及事逼急俱為厭勝遣使壊渭陵園門罘罳曰無使民復思漢也漢官典職曰省閣下大屏稱曰丹屏尚書郎含鷄舌香伏其下奏事晉書曰阮籍為東平相徹去屏障使内外相對孫卿子曰天子外屏諸侯内屏禮也外屏不欲見於外内屏不欲見于内也風俗通曰屏卿大夫以帷士以簾稍}
