  - {type: variant, offset: 511, length: 391, content: 親與士卒同食久之王翦使人問軍中戲乎對曰方投石超距於是王翦曰士卒可用矣楚又數挑戰而秦不出乃引而東翦因舉兵追之大破楚軍蘄南因滅其國又曰漢景帝初吳王濞反惣兵度淮與楚王戰遂敗棘壁乘勝前銳甚梁孝王恐六將軍擊吳又敗梁將士卒皆還走梁數使使報漢大將周亞夫求救亞夫不許又使使惡亞夫於上上使人告之救梁惡烏路切亞夫復守便宜不行梁使韓安國及楚死事相弟張羽為將軍楚相張尚諫吳王而死乃得頗敗吳兵西梁城守堅不敢西即走亞夫軍會下邑矣師欲戰亞夫壁不肯戰吳糧絕卒飢數挑遂死奔亞夫壁亞夫終不出中夜驚內相擾亂至帳下亞夫臥不起頃之復定吳士卒多飢死遂以叛散漢書曰傅喜以光祿大夫養病大司空何武尚書唐林皆上書言喜行義曰忠臣社稷之衛魯以季友治亂師古曰謂季氏亡則魯不昌楚以子玉輕重師古曰謂楚殺子玉而晉侯喜可知也魏以無知折衡師古曰信陵君也項以范增存亡故楚跨有南土帶甲百万鄰國不以為難子玉為將則文公側席而坐及其老也君臣相慶百萬之眾不如一賢, SBCK: 常道}
