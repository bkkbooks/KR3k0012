  - {type: variant, offset: 2432, length: 389, content: 陣盡俘其眾又曰北燕馮跋據遼東其弟万泥阻兵以叛跋遣將馮弘與將軍張興討之弘遣使諭之曰昔者兄弟乘風雲之運撫翼而起群公天意所鍾逼奉主上先踐寶位裂土䟽爵當與兄弟共之奈何欲尋干戈於蕭墻棄友于而為閼伯過貴能改善莫大焉宜舍茲嫌同獎王室万泥不從剋期出戰興謂弘曰賊明曰出戰今夜必來驚營宜備不虞弘乃各嚴備仍人課草十束束火伏兵以待之是夜萬泥果遣壯士十餘人斫營眾火俱起伏兵邀擊俘斬無遺遂平万泥等宋書曰桂楊王休範舉兵於尋陽已發東下朝廷惶駭宋相齊高祖議曰昔上流謀逆皆因淹緩至於覆敗休範必遠懲前失輕兵急下乘我無備今應變之術不宜在遠若偏師失律則大沮眾心請頓新亭堅守宮掖東府石頭以待賊至千里孤軍後無委積求戰不得自然瓦解請頓新亭以當其鋒休範果敗又高祖紀曰時議者欲分兵屯守諸津帝曰賊眾我寡分兵測人虛實一處失利則沮三軍之心若聚眾石頭則力不分也三國典略曰梁武陸王蕭紀在蜀一十七年開拓土宇器甲殷積有馬八千疋既便騎射尤工舞矟後, SBCK: ''}
