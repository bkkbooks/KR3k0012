  - {type: variant, offset: 907, length: 0, content: '', SBCK: 馬援奏言西于縣户有三萬二千西干縣交阯郡故城在今交州龍編縣東逺界去庭千餘里庭縣庭也請分爲封溪望海二縣許之又曰馬援在隴西帝詔武威太守東􅀚漢記曰梁統也令悉還金城客民金城人客在武威者歸者三千餘口使各反舊邑援奏爲置長吏繕城郭起塢候字林曰塢小障一曰小城字或作塢開導水田勸以耕牧郡中樂業又曰社茂引兵屯晉陽上遣謁者叚忠將衆配茂鎮守北邊因發邊卒築亭候脩烽火又發委輸金帛繒弩供給軍士并賜邊民冠蓋相望茂亦建屯田驢車轉運也晉書杜預傳曰匈奴帥劉猛舉兵反自并州西及河東平陽詔預以散侯定計省闥俄拜度支尚書預乃奏立籍田建安邊論處軍之要又作人排新器興常平倉定􅂖價較塩運制課調内以利國外以救邊者五十餘條皆納焉宋書曰文帝元嘉中每歳爲後魏侵境令朝臣􅀶議何承天陳備邊之要其大略一曰移逺就近以實内地二曰浚復城隍以増岨防三曰纂偶車牛以飭戎械四曰計丁課役勿使有闕唐書曰髙祖與羣臣言備邊之事將作大匠于筠進曰未􅀂多造舡艦於五原靈武置舟師於黄河之中足以断其入㓂之中路中書侍郎温彦􅀶又進曰昔魏文帝掘長壍以遏匈奴亦田因循其事髙祖並從之於是遣將軍桑顯和壍断北邊要路又徴江南習水之士}
  - {type: page-break, offset: 907, content: '', id: KR3k0012_SBCK_331-8a}
  - {type: variant, offset: 907, length: 0, content: '', WYG: 馬援奏言西干縣户有三萬二西干縣交趾郡故城在今交州龍編縣東逺界去庭千餘里庭縣庭也請封為封溪望海二縣許之又曰馬援在隴西帝詔武威太守東觀漢記曰梁統也令悉還金城客民金城人客在武威歸者三千餘口使各反舊邑援奏為置長吏繕城郭起塢候字林曰塢小障一曰小城字或作塢開導水田勸以耕牧郡中樂業又曰杜茂引兵屯晉陽上遣謁者叚忠將衆配茂鎮守北邊因發邊卒築亭候修烽火又發委輸金帛繒絮供給軍士并賜邊民冠蓋相望茂亦建屯田驢車轉運也晉書杜預傳曰匈奴率劉猛舉兵反自并州西及河東平陽詔預以散侯定計省闥俄拜度支尚書預乃奏立藉田建安邊論處軍國之要又作人排新噐興常平倉定榖價較鹽運制課調内以利國外以救邊者五十餘條皆納焉宋書曰文帝元嘉中每嵗為後魏侵境令朝臣愽議何承天陳備邊要其大畧一曰移逺就近以實内地二曰浚復城隍以増阻防三曰纂偶車牛以飭戎械四曰計丁課役勿使有闕唐書曰髙祖與羣臣言備邊之事將作大匠于筠進曰未若多造船艦於五原靈武致舟師於黃河之中足以斷其入冦之中路中書侍郎温彦愽又進曰昔魏文帝掘長壍以遏匈奴亦因循其事髙祖並從之於是遣將軍葉是和壍斷北邊要路又徴江南習水之士}
