  - {type: variant, offset: 907, length: 0, content: '', krp: 馬援奏言西于縣户有三萬二千西干縣交阯郡故城在今交州龍編縣東逺界去庭千餘里庭縣庭也請分爲封溪望海二縣許之又曰馬援在隴西帝詔武威太守東觀漢記曰梁統也令悉還金城客民金城人客在武威者歸者三千餘口使各反舊邑援奏爲置長吏繕城郭起塢候字林曰塢小障一曰小城字或作塢開導水田勸以耕牧郡中樂業又曰社茂引兵屯晉陽上遣謁者叚忠將衆配茂鎮守北邊因發邊卒築亭候脩烽火又發委輸金帛繒弩供給軍士并賜邊民冠蓋相望茂亦建屯田驢車轉運也晉書杜預傳曰匈奴帥劉猛舉兵反自并州西及河東平陽詔預以散侯定計省闥俄拜度支尚書預乃奏立籍田建安邊論處軍之要又作人排新器興常平倉定糓價較塩運制課調内以利國外以救邊者五十餘條皆納焉宋書曰文帝元嘉中每歳爲後魏侵境令朝臣博議何承天陳備邊之要其大略一曰移逺就近以實内地二曰浚復城隍以増岨防三曰纂偶車牛以飭戎械四曰計丁課役勿使有闕唐書曰髙祖與羣臣言備邊之事將作大匠于筠進曰未若多造舡艦於五原靈武置舟師於黄河之中足以断其入㓂之中路中書侍郎温彦博又進曰昔魏文帝掘長壍以遏匈奴亦田因循其事髙祖並從之於是遣將軍桑顯和壍断北邊要路又徴江南習水之士}
  - {type: variant, offset: 908, length: 3, content: 始初光, SBCK: 發卒於靈州造戰舡塞險左傳曰蔡侯呉子唐侯伐楚舎舟于淮汭自豫章與楚夾漢章漢東江地北名楚左司馬沈尹戍謂楚將子常曰子㳂漢而與之上下㳂縁也縁漢上上遮使勿度也我悉方城外以毀其舟以方城外人毀呉所舎舟也還塞大隧直轅􅁳阨三者漢東三隘路阨烏革切子濟漢而伐之我自後擊之必大敗之旣謀而行楚大夫}
  - {type: page-break, offset: 908, content: '', id: KR3k0012_SBCK_331-8b}
