  - {type: variant, offset: 912, length: 0, content: '', SBCK: 成黒謂子常曰呉用木也我用革也用軍器也不可乆也不如速戰大夫史皇謂子常曰楚人惡子而好司馬􅀂司馬毀呉舟于淮塞城口而入城口三隘道之㧾名是獨克也子必速戰不然不免乃濟漢而陳自小別至于大別禹貢漢水至大別南入江然則此二別}
  - {type: variant, offset: 912, length: 2, content: 在河, WYG: 成黑謂子常曰吳用水也我用革也用軍噐也不可久也不如速戰大夫史皇謂子常曰楚人惡子而好司馬若司馬毁吳舟於淮塞城口而入城口三隘近之總名是獨克也子必速戰不然不免乃濟漢而陳自小别至於大别禹貢漢水至太别南入江然則此二别有江夏界也三戰子常知不可欲奔吳知不可勝也史皇曰安求其事求知政事難而逃之將何所入必死之子常違左司馬成之言故敗也戰國䇿曰吳子問孫武曰敵人保山據險擅利而處糧食又足挑之則不出乗間則侵掠為之柰何武曰分兵守要謹備勿懈潛探其情密候其怠以利誘之禁其牧採久無所得自然變改待離其故奪其所愛漢書曰匈奴呼韓耶單于來朝元帝以後宫良家子王嬙音墻字昭君賜單于單于歡喜上書願保塞上谷以西至燉煌請罷邊備以休天子人民帝下有司議郎中侯應上言以為不可其畧曰自周秦漢以來匈奴冦侵甚矣其}
