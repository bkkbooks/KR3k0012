  - {type: variant, offset: 446, length: 0, content: '', WYG: 外東西南北皆響見於胡禄中名曰地聽則先防備又曰諸兵馬既逼賊庭探候事須明深詣營住及營行前後及左右廂助上五里著馬兩騎十里更加兩騎十五里更加兩騎至三十里一道用人馬十二騎若兵多發引稍長助上即是更量加一兩道使令相見其乗馬人每令遥相見常接髙行各只一方面異旗無賊此旗常卷見賊即速展軍營見旗展即知賊至須覔穏處既知賊來得設機伏整齊部伍迎前戰其最逺及次逺人須與好馬乗騎不然被賊搶掠備邊漢書曰晁錯上言守邊備塞曰胡人衣食之業不著於地勢易以擾亂邊境何以明之胡人食肉飲酪衣皮毛非有城郭田宅之歸居如飛鳥走獸於曠野美草甘水則止草盡水竭則移以是觀之往來轉徙時至時去此胡人之生業而中國所以離南畆也今使胡人數處轉牧行獵於塞下或當燕代或當上郡北地隴西以候備塞之卒卒少則入陛下不救則邊民絶望而有降敵之心如救之少發則不足多發逺縣纔至則胡人已去聚而不罷為費甚大罷之則胡復入如此連年則中國貧苦而民不安矣陛下幸憂邊境遣將吏發卒以治塞甚大惠也然令逺方之卒守塞一嵗而更不知胡人之能不如選常居者家室田作且以備之其要害之處通川之道調立城邑無下千家為居中周虎落先為室屋具田噐乃募罪人及免徒復作令居之不足募以丁奴婢贖罪及輸奴婢欲以拜爵者不足乃募民之欲往者皆賜髙爵復其家於冬夏衣廪食能自給而止其人若無妻者縣官買與之人情非有匹敵不能久安其處塞下之民禄利不厚不可使久居危難之地胡人入驅而能止其所驅者以其半與之縣官為贖其民如是則邑里相救赴胡不避死非以徳上也欲全親戚而利其財也此與東方之戍卒不習地勢而心畏胡者功相萬也以陛下之時徙民實邊使逺方亡屯戍之憂塞下之民父子相保亡係虜之患利施後世名稱聖明其與秦之行怨民相去逺矣上從其言募民徙實塞下錯復言陛下幸募人以實塞下使屯戍之事益省輸將之費益寡甚大惠也下吏誠能稱厚惠奉明法存䘏所徙之老弱善遇其壯士和弭其心而勿侵刻使先至者安樂而不思故鄉則貧民相慕而勸往矣臣聞古之徙逺方以實廣虛也相其隂陽之和嘗其水泉之味審其土地之宜觀其草木之饒然後營邑立城制里割宅通田宅之道正阡陌之界先為立室家有一堂二内門户之閑置噐物焉民有所居作有所用此民所以輕去故鄉而勸之新邑也為置醫巫以救疾病以修祭祀男女有昏生死相恤墳墓相從種樹畜長室屋完安此所以使民樂其樂處而有長居之心也臣又聞古之制邊縣以備敵也使五家為伍伍有長十長一里里有假士四里一連連有假五百十連一邑邑有假候皆擇其邑之賢才有禮讓習地形悉知民心者居則習民以射法出則教民於應敵故卒伍成於内則軍政定於外服習已成勿令遷徙㓜則同遊長則共事夜戰聲相知則足以相救晝戰目相見則足以相識懽愛之心足以相死如此而勸以厚賞威以重罰則前死不旋踵矣所徙之民非壯有材力但費衣糧不可用也雖有材力不得良吏猶亡功也又王莽將嚴尤上言曰匈奴為害久矣周秦漢征之然皆未有得上䇿者也周得中䇿漢得下䇿秦無䇿焉當周宣王時獫狁内侵至於涇陽命將征之盡境而還其視戎狄之内侵譬蚊䖟之螫驅之而已故天下稱明是為中䇿漢武帝選將鍊兵令齎糧深入逺戍每有克獲之功胡輙報之兵連禍結二十餘年中國罷敝匈奴亦衂而天下稱武是為下䇿秦始皇不忍小恥而輕民力築長城之固延袤萬里轉輸之行起於負海疆境既完中國内竭以喪社稷是為無䇿今天下遭陽九之阨比年飢饉西北邊尤甚發三十萬衆具三百日糧東援海岱南取江淮然後能備計其道里二年尚未集合兵先至者聚居暴露師老械弊勢不可用此一難也邊既空虛不能奉軍糧内調郡國不相及屬此二難也計一人三百日糧用備十八斛非牛力不能勝也牛又當齎食加二十斛重地胡沙鹵多乏水草以往事揆之軍出未滿不百日牛必物故且盡其餘糧人不勝此三難也胡地秋冬甚寒春夏甚風釡鑊音富薪炭重不可炊食糒音備飲水以立四時師有疾病之憂勢不能久此四難也輜重自隨則輕銳者少不得疾行虜徐遁不能及幸而逢虜要遮前後危殆不測此五難也大用民力功不可必臣伏憂之又班固論曰書云蠻夷猾夏詩稱戎狄是膺春秋有道守在四夷久矣夷狄之為患也故自漢興忠信嘉謀之臣曷嘗不運籌䇿相與爭於廟堂之上乎髙祖時劉敬吕后時樊噲季布孝文時賈誼晁錯孝武時王恢韓安國朱買臣公孫𢎞董仲舒人持所見各有同異然總其要歸兩科而已縉紳之儒則守和親介胄之士則言征伐皆偏見一時之利害而未究匈奴之終始自漢興以至於今曠世歴年詘伸異變強弱相反是故其詳可得而言也昔和親之論發於劉敬是時天下初定新遭平城之難故從其言約法和親賂遺單于冀以救安邊境孝惠髙后遵而不免匈奴冦盜不為衰止而單于反以驕倨逮至孝文與通關市妻以漢女増厚其賂嵗以千金而匈奴數背約束邊境屢被其害是以文帝中年赫然發憤遂貯戎服親御鞍馬徙六郡良家材力之士馳射上林講習戰陣聚天下精兵軍於廣武顧問馮唐與論將帥喟然歎息思古名臣此則和親無益已然之明効矣仲舒親見四世之事猶復欲守舊文頗増其約以為義動君子利動貪人如匈奴者非可以仁義說也獨可説以厚利結之於天耳故與之復利以說其意與盟於天以牢其約質其愛子以累其心匈奴雖欲展轉柰失重利柰殺愛子何夫賦歛行賂不足以當三軍之費城郭之固無異於真士之約而使邊臣守境之民父兄緩帶稚子咽哺胡馬不窺於長城而羽檄不行於中國不亦便於天下乎察仲舒之論考諸行事乃知未合於當時而有關於後世也當孝武時雖征伐尅獲而士馬亦畧相當雖開河南之野建朔方之郡亦棄造陽之北九百餘里匈奴人民每來降漢單于亦輙拘留漢使以相報復其桀驁尚如斯安肯以愛子為質此不合當時之言也若不置質定約和親是雖襲孝文既往之悔而長匈奴無已之詐也夫邊城不選守境武畧之臣修障隊備塞之具厲長㦸勁弩之械恃吾所以待邊冦而務賦歛於民逺行貨賂割剥百姓以奉冦讐信甘言守空約而冀胡馬之不窺不已過乎至孝宣之世承武帝奮}
