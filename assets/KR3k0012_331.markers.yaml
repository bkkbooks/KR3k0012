  - {type: variant, offset: 1147, length: 172, content: 非常乃告於高京以鐵為門斥去左右男人七歲以上不得入門專侍姬妾其文簿書皆及而上之令婦人習為大言聲使聞數百步以傳宣教令踈遠賓客無所親信故謀臣猛將稍有乖散自此之後希復攻戰九州春秋曰公孫瓚曰始天下兵起我謂唾掌而決至於今日兵革方始觀此非我所決不如休兵力耕以救凶年兵法百樓不攻今吾諸營樓櫓千里櫓即魯字見說文釋名曰擼露也上元覆屋也積穀三百萬斛食此足以待天下慶也, SBCK: 漢中}
