  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第三百三十一}
  body:
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 二斥候備邊塞險斥候後周書曰韓果性強記兼有權略所行之處山川形勢輙能記憶兼善伺敵虚實揣知情􅃺有潜匿溪谷欲爲間偵者果登髙望之所疑處徃必有􅀗太祖由是以果爲虞候都督每從征行常領候􅀐晝夜廵察略不眠寢又曰逹奚武大統􅀄爲􅁗州刺史齊神武趣沙苑太祖復遣武覘之武從三􅀐皆衣敵人衣服至日暮云營數百歩下馬潜聽得其軍號因上馬歴營􅀂警夜者不如法者徃徃撻之具知敵之情􅃺以告太祖太祖􅀷嘉焉遂從破之諸􅁑亮兵要曰軍巳近敵羅落常平明以先發絶軍前十里内各案左右下道亦十里之内數里之外五人爲部人持}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_331-1b}
  - {type: variant, offset: 4, length: 0, content: '', krp: 二斥候備邊塞險斥候後周書曰韓果性強記兼有權略所行之處山川形勢輙能記憶兼善伺敵虚實揣知情狀有潜匿溪谷欲爲間偵者果登髙望之所疑處徃必有獲太祖由是以果爲虞候都督每從征行常領候騎晝夜廵察略不眠寢又曰逹奚武大統𥘉爲秦州刺史齊神武趣沙苑太祖復遣武覘之武從三騎皆衣敵人衣服至日暮云營數百歩下馬潜聽得其軍號因上馬歴營若警夜者不如法者徃徃撻之具知敵之情狀以告太祖太祖深嘉焉遂從破之諸葛亮兵要曰軍巳近敵羅落常平明以先發絶軍前十里内各案左右下道亦十里之内數里之外五人爲部人持}
  - {type: xml-element, offset: 5, content: '', id: KR3k0012_CHANT_331-bkkxmlele1}
  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0012_CHANT_331-1a.1}
  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0012_CHANT_331-1a.2}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 白幡登髙外向明隱蔽之處軍至轉㝷髙而前弟一見賊轉語後第二第三詣主者白之凢候見賊百人以下但舉幡指百人以上便舉幡大呼主者遣疾馬徃視察之又曰凢軍行營壘先使腹心及郷導前覘審知各令候吏先行定得營地壁立軍分數立四表候視然後移營又先使候􅀐前行持五色旗見溝坈掲黄揭去列切衢路掲白水澗掲黒林藪掲靑野火掲赤以夲鼔應之立旗鼔令相聞見􅀂渡水踰山􅀷􅃉林藪精驍勇􅀐捜索數里無聲四周絶迹髙山樹頂令人逺視精兵四向要處防禦然後分兵前後以爲鎮拓乃令輜重老小次歩後馬切在整肅防敵至人馬無聲不失行列險地狹逕亦以部曲鱗次或須環廽旋轉以後爲前以左爲右行則魚貫立則鴈行到前止處遊􅀐精銳四向散列而立各依夲方下營一人一歩隨師多少咸表十二辰竪六旍長二丈八尺審子午夘酉地勿令邪僻以朱雀旍竪午地白獸旍竪酉地玄武旍竪子地青龍旍竪夘地招揺旍竪中央其樵牧飲不得出表外也衛公兵法曰諸營下定事湏防禦於營外二十歩列隊仗如臨陣對㓂法晝夜嚴}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_331-2a}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 斥候備邊塞險斥候後周書曰韓果性強記兼有權畧所行之處山川形勢輙能記憶兼善伺敵虛實揣知情狀有潛匿溪谷欲為間諜者果登髙望之所疑處往必有獲太祖由是以果為虞候都督每從征行嘗令候騎晝夜巡察略不眠寢又曰逹奚武大統初為秦州刺史齊神武趣沙苑太祖復遣武覘之武從三騎皆衣敵人衣服至日暮去營數百步下馬潛聽得其軍號因上馬歴營若}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_331-1b, image: WYG0895/WYG0895-0830d.png}
  - {type: variant, offset: 5, length: 0, content: '', krp: 白幡登髙外向明隱蔽之處軍至轉㝷髙而前弟一見賊轉語後第二第三詣主者白之凢候見賊百人以下但舉幡指百人以上便舉幡大呼主者遣疾馬徃視察之又曰凢軍行營壘先使腹心及郷導前覘審知各令候吏先行定得營地壁立軍分數立四表候視然後移營又先使候騎前行持五色旗見溝坈掲黄揭去列切衢路掲白水澗掲黒林藪掲靑野火掲赤以夲鼔應之立旗鼔令相聞見若渡水踰山深邃林藪精驍勇騎捜索數里無聲四周絶迹髙山樹頂令人逺視精兵四向要處防禦然後分兵前後以爲鎮拓乃令輜重老小次歩後馬切在整肅防敵至人馬無聲不失行列險地狹逕亦以部曲鱗次或須環廽旋轉以後爲前以左爲右行則魚貫立則鴈行到前止處遊騎精銳四向散列而立各依夲方下營一人一歩隨師多少咸表十二辰竪六旍長二丈八尺審子午夘酉地勿令邪僻以朱雀旍竪午地白獸旍竪酉地玄武旍竪子地青龍旍竪夘地招揺旍竪中央其樵牧飲不得出表外也衛公兵法曰諸營下定事湏防禦於營外二十歩列隊仗如臨陣對㓂法晝夜嚴}
  - {type: variant, offset: 6, length: 2, content: 備孫, SBCK: 縱逢雨雪并押隊官並不得離隊每營留五疋馬并鞍轡放飼防有警急即令馳告至夜每陣前百歩外着聽}
  - {type: variant, offset: 6, length: 2, content: 備孫, WYG: 夜者不如法者往往撻之俱知敵之情狀以告太祖太祖深嘉焉遂破敵人諸葛亮兵要曰軍已近敵籬落當以平明先發絶軍前十里内各按左右下道亦十里之内數里之外五人為部人持一白幡登髙外向明隠蔽之處軍至轉尋髙而前第一見賊轉語後第三第二詣主者白之凡候見賊百人以下但舉幡指百人以上便舉幡大呼主者遣疾馬往視察之又曰凡軍行營壘先使腹心及鄉導前覘審知各令候吏先行定得營地壁立軍分數立四表候視然後移營旍右先使候騎前行持五色旍見溝坑揭黃揭去列切衢路揭白水澗揭黑林藪揭青野火揭赤以本鼔應之立旗鼔令相聞見若渡水踰山深􅃉林藪精遣勇騎捜索數里無聲四顧無人然後徐行令人逺視精兵四向留後防禦勿争疾趨中軍魚貫以進乃令輜重老小次步後馬次在整人不得譁人馬無聲不失行列險地狹逕亦以部曲鱗次或須環向迴轉以後為前以左為右行則魚貫立則鴈行到前止後候騎精銳四向散列而立各依本方下營一人一步隨軍多少咸表十二辰豎六旍長二丈八尺審}
