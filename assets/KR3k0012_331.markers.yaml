  - {type: variant, offset: 2211, length: 43, content: 足遣冀州農丁五千屯於上邽秋冬習戰春夏脩田桑由是關中軍國有備矣崔鴻十六國春秋曰前趙劉曜遣, krp: 尅進據博陵魯口諸}
  - {type: punctuation, offset: 2212, content: ，, id: KR3k0012_CHANT_331-bkkpn583}
  - {type: 'tls:seg', offset: 2212, content: '', id: KR3k0012_CHANT_331-21a.14}
  - {type: variant, offset: 2221, length: 600, content: 上邽秋冬習戰春夏脩田桑由是關中軍國有備矣崔鴻十六國春秋曰前趙劉曜遣將討氐羌大酋權渠率眾保險阻曜將游子遠頻敗之權渠欲降其子伊餘大言於眾中往日劉曜自來猶無若我何况此偏師自欲降乎遂率勁卒五萬人晨壓子遠壘門左右勸出戰子遠曰吾聞伊餘有專諸之勇慶忌之捷士馬之強人百匪敵其父新敗怒氣甚盛且西戎勁捍其鋒不可擬也不如緩之使氣竭而擊之此曹劌之勝也乃堅壁不戰伊餘有彊驕色子遠候其無備夜分誓眾秣馬蓐食先晨具甲掃壘而出遟明設覆而戰遟直吏切生擒餘伊于陣盡俘其眾又曰北燕馮跋據遼東其弟万泥阻兵以叛跋遣將馮弘與將軍張興討之弘遣使諭之曰昔者兄弟乘風雲之運撫翼而起群公天意所鍾逼奉主上先踐寶位裂土䟽爵當與兄弟共之奈何欲尋干戈於蕭墻棄友于而為閼伯過貴能改善莫大焉宜舍茲嫌同獎王室万泥不從剋期出戰興謂弘曰賊明曰出戰今夜必來驚營宜備不虞弘乃各嚴備仍人課草十束束火伏兵以待之是夜萬泥果遣壯士十餘人斫營眾火俱起伏兵邀擊俘斬無遺遂平万泥等宋書曰桂楊王休範舉兵於尋陽已發東下朝廷惶駭宋相齊高祖議曰昔上流謀逆皆因淹緩至於覆敗休範必遠懲前失輕兵急下乘我無備今應變之術不宜在遠若偏師失律則大沮眾心請頓新亭堅守宮掖東府石頭以待賊至千里孤軍後無委積求戰不得自然瓦解請頓新亭以當其鋒休範果敗又高祖紀曰時議者欲分兵屯守諸津帝曰賊眾我寡分兵測人虛實一處失利則沮三軍之心若聚眾石頭則力不分也三國典略曰梁武陸王蕭紀在蜀一十七年開拓土宇器甲殷積有馬八千疋既便騎射尤工舞矟後, WYG: ''}
