  - {type: variant, offset: 2929, length: 3, content: 領兵征, SBCK: 不許曰丗充糧盡内外離心我當不勞攻擊坐収其弊耳建徳新破海公將驕卒惰今我據武牢扼其􅁭要􅀂賊恃勝冒險争鋒吾當破賊􅀂不戰旬月之間丗充自潰彼敗我振足以臨之一行兩定在於斯舉􅀂不速進賊入武牢諸城新附必不能守二賊并力將􅀂之何􅁗府記室}
  - {type: variant, offset: 2929, length: 3, content: 領兵征, WYG: 圍王世充於東都世充勢窮竇建徳自北來救諸將及蕭瑀等咸請且退師避之太宗不許曰世充糧盡内外離心我當不勞攻擊坐收其弊而建徳新破海公將驕卒惰今據無勞阨其𦂳要若賊恃勝冐險爭鋒吾當破賊若不戰旬月之間世充自潰彼敗我振足以臨之一行兩定在於斯舉若不速進賊入武牢諸城新附必不能守二賊并力將若之何秦府記室}
