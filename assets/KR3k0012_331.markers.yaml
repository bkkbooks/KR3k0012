  - {type: variant, offset: 1770, length: 0, content: '', WYG: 用馬便宜出峴逆戰戰而不勝猶可退守不宜縱敵入峴自貽窘迫昔成安君不守井陘之險終屈於韓信諸葛瞻不據束馬之險卒擒於鄧艾臣以為天時不如地利阻守大峴䇿之上也超不從乃合攝莒梁父二戍修城隍簡士馬蓄銳以待之其夏晉師次東莞超遣其左軍段暉等步騎五萬進據臨朐俄而晉師度峴慕容超懼率四萬騎就段暉等於臨胊戰敗超奔還}
