  - {type: variant, offset: 466, length: 0, content: '', SBCK: 餘載之間遭王莽篡位始開邊􅂩單于由是歸怨自絶莽遂斬其侍子邊境之禍搆矣故呼韓耶始朝於漢漢議其禮蕭望之曰戎狄荒服言其慌忽無常至亦冝待以客禮讓而不臣如後嗣遁逃竄伏使於中國不爲叛臣及孝元時議罷守塞之備應以爲不可云盛不忘衰安必思危逺見識微之明矣單于咸棄其愛子昧利不顧侵掠所􅀗歳巨計而和親賂遺不過千金安在其不棄質而失重利也仲舒之言漏於是矣夫規事建議不圖}
