  - {type: variant, offset: 3341, length: 686, content: 戰破之又曰薛萬均從李靖等擊吐谷渾軍次青海與弟万徹率軍先路道遇虜於赤海萬均將十數騎擊走之追奔至積石山南道大風折旗拔木万均謂左右曰虜將至矣宜各設備俄而虜至万均直前斬一賊將於是大潰殺傷略盡又曰廣德中安史故將分據河北吐蕃數犯京畿故郭子儀魚朝恩常統重兵守河中以備倉卒欲兵權在京師乃以魚朝恩元載王縉建議請於河中府置中都創置積兵五萬以為禁旅取關輔河東等十州稅物以奉京師車駕常以秋杪行幸春首還京即河北西蕃無憂越軼代宗以為然載已潛遣人於河中料度創造宮殿及營私第既而言事者以為無故示賊以怯國計非便事竟不行又曰李晟討朱泚德宗幸奉天日詔以晟為左僕射平章事晟拜哭受命且曰長安宗廟所在為天下本若皆扈蹕誰復京師乃浚隍壁繕兵粟馬以誅泚興復為己任初軍無蒭蒿乃令檢校戶部郎中張彧假京兆少尹擇官吏以賦渭北畿縣不數日蒭糧皆足乃陳說三軍曰今國步多艱亂逆繼興屬車西幸關中無主吾等皆受國恩見危死節臣子之分况當此時不能清寇以取富貴非士也渭橋跨大川吾與公等戮力一心擇利而進復大業建不世之功能從我乎軍士皆泣下曰唯公所命晟亦歔欷流涕是時朱泚盜天邑懷光反咸陽河北偽稱國者三希烈李納交逼陳宋晟內無貨財外無疆土以孤軍守危城為秉節嚮義者所歸於是戴休顏舉奉天之兵韓遊瓌悉邠寧之師尚可孤守藍田駱元光固華州皆歸款於晟軍大振又曰李元諒貞元初將本軍與侍中渾瑊會吐蕃盟於平源元諒謂瑊曰戎狄多詐不可無備公奉國命輕重宜有以防之瑊不從且不設備及會元諒令軍中皆衣甲持兵整部隊以俟變去壇十里虜果衷甲乘瑊無備伏精騎以圍瑊士大夫皆衣朝服就執及軍士死者不可勝數所脫者百無一二瑊挺身走虜騎逐瑊至元諒軍士皆堅陣持滿虜騎望見之乃引去是日無元諒軍瑊幾不免元諒乃徐引軍而歸, SBCK: ''}
