  - {type: variant, offset: 920, length: 2, content: 鄔吳, SBCK: 漠北建塞徼起亭隧築外城設屯戍以守之然後邊境少安夫夷狄之情困則卑順強則驕逆天性也前巳罷外城省亭隧今􅂊足以候視通烽火而巳安不忘危不可復罷且中國尚建關梁以制諸侯所以絶臣下之覬慾起塞以來百有餘年非皆以土垣或因山巖石木柴疆落溪水卒徙築理功費乆逺不可勝計今欲以一切省繇戍十年之外卒有他變鄣塞破壞亭隧滅絶當更發屯繕理累代之功不可卒復非所以永持至安威制百蠻之長䇿也帝納之蜀志曰曹公使夏侯妙才張郃屯}
