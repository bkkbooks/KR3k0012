  - {type: variant, offset: 3190, length: 0, content: '', SBCK: 援徃觀之援素與􅄒同郷里相善以爲至當握手迎如平生而􅄒方盛陳陛衛以延援入交拜禮畢就館更爲援製都布單衣交譲冠㑹百官於宗廟立舊交之位􅄒鸞旗旄􅀐警􅵖就車禮甚盛欲以援封侯食大將軍位賔客皆樂}
  - {type: variant, offset: 3190, length: 3, content: 留在漢, WYG: 彼不知我多少必大震怖可殄盡也滅此虜則鄯善破膽功成事立矣衆曰當與從事議之超怒曰吉凶決於今日從事文俗吏聞此必恐而謀泄死而無所名非壮士也衆曰善初夜遂将吏士往奔虜營㑹天大風超令十人持鼔藏虜舎後約曰見火燃}
  - {type: variant, offset: 3190, length: 0, content: '', krp: 援徃觀之援素與𫐠同郷里相善以爲至當握手迎如平生而𫐠方盛陳陛衛以延援入交拜禮畢就館更爲援製都布單衣交譲冠㑹百官於宗廟立舊交之位𫐠鸞旗旄騎警􅵖就車禮甚盛欲以援封侯食大將軍位賔客皆樂}
  - {type: variant, offset: 3191, length: 0, content: '', SBCK: 援暁之因而辭歸謂囂曰子陽井底鼃耳不如專意東方囂乃便援奉書洛陽援至引見於宣德殿上迎􅀏謂之曰卿遨遊二帝間見卿使人慙援頓首謝曰當今之丗非獨君擇臣臣亦擇君臣與公孫述少相善臣前至蜀述陛㦸而後進臣今逺來陛下何知非刺客而簡易如此於是上復􅀏曰卿非刺客顧􅀃客耳援乃曰天下反覆目盗名字者不可勝數今見陛下恢廓大度同符髙祖乃知帝王自有眞也又曰郭丹從師於長安買傳入凾谷關乃􅁣然歎曰丹不乗使者車終不出關後三公舉丹賢能徴諌議大夫丹自去家十有二年果乗高車出關如其志也何賢之有伊曰以地言尉佗不}
  - {type: page-break, offset: 3191, content: '', id: KR3k0012_SBCK_778-4a}
  - {type: variant, offset: 3191, length: 0, content: '', krp: 援暁之因而辭歸謂囂曰子陽井底鼃耳不如專意東方囂乃便援奉書洛陽援至引見於宣德殿上迎笑謂之曰卿遨遊二帝間見卿使人慙援頓首謝曰當今之丗非獨君擇臣臣亦擇君臣與公孫述少相善臣前至蜀述陛㦸而後進臣今逺來陛下何知非刺客而簡易如此於是上復笑曰卿非刺客顧說客耳援乃曰天下反覆目盗名字者不可勝數今見陛下恢廓大度同符髙祖乃知帝王自有眞也又曰郭丹從師於長安買傳入凾谷關乃慨然歎曰丹不乗使者車終不出關後三公舉丹賢能徴諌議大夫丹自去家十有二年果乗高車出關如其志也何賢之有伊曰以地言尉佗不}
  - {type: variant, offset: 3192, length: 5, content: 漢者武與副, SBCK: 弊邑馮弘聞而大恱還封都亭侯後魏書曰燕鳯字子章代人也拜代王左長史叅决國事常使符堅堅問鳯曰代王何如人也對曰寛和仁愛經略髙逺一時雄主也常有并吞天下之志堅曰卿軰北人無剛甲利器敵弱則進敵強則退安能兼并也鳯曰北人壯掉上馬持三仗驅使􅀂飛主人雄雋率服北土控弦百萬號令􅀂一軍粮輕重樵㸑自􅀂輕行速捷因敵取資此南方所以疲弊北方所以常勝也堅曰彼國人馬多少鳯曰控弦之士數十萬見馬一百萬疋堅曰卿言人衆則可􅀃馬太多鳯曰雲}
