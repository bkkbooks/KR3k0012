  - {type: variant, offset: 4037, length: 202, content: 斬郅支單于以歸又曰蓋寬饒字次公魏郡人也明經為郡文學以孝廉為郎舉方正對策高第遷諫議大夫寬饒為衛司馬有厚德宣帝嘉之以寬饒為太中大夫使行風俗多所稱舉貶黜奉使稱旨擢為司隸校尉刺舉無所迴避小大輒舉所劾奏眾多廷尉處其法半用半不用以其峻刻故有不用者公卿貴戚及郡國吏繇使至長安皆恐懼莫敢犯禁京師為之清平又曰終軍從濟南當詣愽士步入關關吏予軍繻軍問以此何為吏曰為復傳還當以合符軍曰大丈夫西遊終不復傳還棄繻而去軍後為謁者使行郡, SBCK: 晝開}
