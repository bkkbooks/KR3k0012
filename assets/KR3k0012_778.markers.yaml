  - {type: variant, offset: 1882, length: 667, content: 其俗不足以辱天子之使河內失火燒千餘家上使黯往視之還報曰家人失火屋比延燒不足憂也臣過河南貧人傷水旱萬餘家或父子相食臣謹以便宜持節發河南倉粟以賑貧民臣請歸節伏矯制之罪上賢而釋之又曰司馬相如為郎數歲會唐蒙使略通夜郎西棘中發巴蜀吏卒千人郡又多為發轉漕萬餘人用興法誅其渠而巴蜀民大驚恐上聞之乃使相如責唐蒙等因喻告巴蜀民以非上意還報天子乃拜相如為中郎將建節持四乘之傳因巴蜀弊物以賂西夷至蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵於是卓王孫臨卭諸公皆因門下而獻牛酒又曰淳于髡者齊之贅壻也壻也者女之夫比於子餘剩故曰贅壻長不滿七尺滑稽音骨亂也稽者同也多辨數使諸侯未嘗詘辱威王八年楚大發兵加齊齊王使淳于髡之趙請兵齎金百斤馬千駟淳于髡仰天大笑冠纓索絕王曰先生少之乎髡曰何敢王曰先生笑豈有說乎髡曰今者臣從東來見道旁有穰田者操一肫蹄酒一盃而呪曰甌窶滿篝篝籠也音構甌窶猶柸樓也言豐年菜樹易可滿篝污耶滿車行耶下地田也則下地田之中有薪菜可滿車也五穀蕃熟穰穰滿家臣見所持者狹而欲者大奢故笑之於是齊王乃益齎黃金千鎰白璧十雙車馬百駟髡辭而行至趙趙與之精兵十萬革車千乘楚聞之夜引兵而去威王大悅漢書曰漢王曰孰能為我使淮南使之發兵背楚留項王於齊數月我之取天下可萬全隨何曰臣請使之乃與二十人俱使淮南至太宰主之淮南太宰作內主也三日不得見隨何因說太宰曰王之不見何必以楚為強以漢為弱使何得見言之而是耶是大王所欲聞言之而非耶使何等二十人伏斧質淮南市以明背漢而與楚也太宰乃言之王王見之隨何說淮南王王曰請奉命陰許叛楚與漢未敢泄楚使者在方急責布發兵隨何直入曰九江王歸漢楚何以得發兵布驚曰何至是楚使者, SBCK: ''}
