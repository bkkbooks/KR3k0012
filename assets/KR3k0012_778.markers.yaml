  - {type: variant, offset: 4079, length: 2, content: 寬饒, WYG: 丹自去家十有二年果乗髙車出闗如其志也後魏書曰燕鳳字子章代人也拜代王左長史參決國事常使苻堅堅問鳳曰代王何如人也對曰寛和仁愛經畧髙逺一時雄主也常有并吞天下之志堅曰卿輩北人無剛甲利器敵弱則進敵强則退安能兼并也鳳曰北人壮悍上馬持三仗驅使若飛主上雄雋率服北土控弦百萬號令若一軍無輜重樵㸑之苦輕行速捷因敵取資南方所以疲弊北方所以常勝也堅曰彼國人馬多少鳳曰控弦之士數十萬馬百萬匹堅曰卿言人衆猶可何説馬太多鳳曰雲中川自東山至西河二百餘里北至南山百餘里毎嵗自孟秋馬常大集略}
  - {type: page-break, offset: 4079, content: '', id: KR3k0012_WYG_778-7a, image: WYG0899/WYG0899-0786c.png}
  - {type: page-break, offset: 4079, content: '', id: KR3k0012_WYG_778-7b, image: WYG0899/WYG0899-0786d.png}
  - {type: variant, offset: 4082, length: 3, content: 衛司馬, WYG: 滿川以此推之使人言猶未盡鳳還堅厚加贈遺又曰朱長生岱人孝文時為散騎常侍使髙車其王阿伏至羅國乃不以禮待長生長生責至羅王既稱臣内附何得口云再拜而實不拜乃呼出帳令衆中拜至羅慙其臣下大怒乃以兵脇之曰不降則殺之長生厲聲曰我寜作魏鬼不為汝臣留三年放還孝文比之蘇武也又曰李彪使齊將還蕭頤親謂彪曰卿前使還日賦阮詩云但願長閒暇後嵗復來遊果如言今日卿此還也復}
  - {type: page-break, offset: 4082, content: '', id: KR3k0012_WYG_778-8a, image: WYG0899/WYG0899-0787a.png}
