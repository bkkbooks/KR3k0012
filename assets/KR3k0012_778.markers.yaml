  - {type: variant, offset: 13, length: 92, content: 使適四方恊九儀賓客之禮朝覲宗遇會同君之禮也存頫省聘問臣之禮也又掌邦國之禮籍以待四方之使者凡四方之使者大客則擯小客則受其弊而聽其辤凡使為旌節禮曰凡為君使者已受命君言不宿於家君言至則主人出, WYG: 伏湛子隆字伯文少有莭操立名當時張歩兄弟各擁强兵據有齊地}
