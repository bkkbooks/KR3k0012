  - {type: variant, offset: 4086, length: 3, content: 厚德宣, WYG: 來理否彪答曰使臣請重賦阮詩曰晏衍清都中一去永矣哉頥惘然曰清都可爾一去何事觀卿此言似成長濶隋書曰許善心字務本髙陽北新城人也家有書萬卷皆悉遍涉禎明二年加通直散騎常侍聘隋遇文}
  - {type: punctuation, offset: 4088, content: 。, id: KR3k0012_CHANT_778-bkkpn1095}
  - {type: 'tls:seg', offset: 4088, content: '', id: KR3k0012_CHANT_778-27a.14}
  - {type: variant, offset: 4090, length: 1, content: 嘉, WYG: 伐陳禮成而不獲反命留縶賔館陳亡衰服號泣於西階下藉草三日有詔就館拜通直散騎常侍善心哭盡哀北面立垂涕再拜受詔明日朝伏泣於殿下悲不能勝帝顧左右曰我平陳唯獲此人既懐其舊君則我誠臣也勑以本官直門下省賜物千叚唐書曰大歴初以綬歸崇敬倉部郎中兼御史中丞賜金紫充弔祭册立新羅王使至海中流波濤迅急舟漏衆咸驚駭舟人請以小艇載崇敬避禍崇敬曰舟人凡數百我何獨濟逡廵波濤稍息故事使新羅者至海東多有所求或携資帛而往貿易規利崇敬一皆絶}
