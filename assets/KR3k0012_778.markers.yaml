  - {type: variant, offset: 2905, length: 2, content: 嘗邀, SBCK: 國也後改為鄯善去陽􅀜一千六百里去長安六千一百里鄯善王廣奉迎超禮敬甚備後忽更踈懈超謂其官屬曰寧􅁴廣禮意薄乎此必有北虜使來狐疑未知所從故也明者覩其未萌况己著耶乃召侍胡詐之曰匈奴使來數日今安在乎侍胡惶恐具服其􅃺超乃閉侍胡悉㑹其吏三十六人與共飲酒酣因激怒之曰卿曹與我俱在絶域欲立大功以求冨貴今虜使到裁數日而王廣禮敬即廢如今鄯善収吾屬送匈奴骸骨長爲豺狼食矣爲之柰何官屬皆曰今在危亡之地死生從司馬超曰不入虎穴不得虎子當今計獨有因夜以火攻虜使彼不知我多少必大震怖可殄盡也滅此虜則鄯善破膽功成事立矣衆曰當與從事議之超怒曰􅁻凶决於今日從事文俗吏聞此必恐而謀泄死而無所名非壯士也衆曰善􅀄夜遂將吏士徃奔虜營㑹天大風超令十人特鼓藏虜舎後約曰見火燃者當鳴鼓大呼餘人悉持弓弩夾門而伏超乃順風縱火前後鼓噪虜衆驚亂超手格殺三人吏兵斬其使及從士三十餘級衆百許人悉焼死明日乃還告郭恂恂大驚旣而色動超知其意舉手曰􅁺雖不行班超何心獨擅之乎恂乃恱超於是召鄯善王廣以虜使首示之一國震怖超暁告撫慰遂納子爲質還奏於竇固固大善具上超功効并求更選使使西域帝壯超節詔報曰吏如班超何故不遣而更選乎今以超爲軍司馬令遂前功又曰鄭衆字伯師拜越􅀐校尉使匈奴至北庭虜欲令拜衆不屈單于大怒不與水火欲脅伏衆拔劒自誓單于乃止又曰張網字文紀爲侍御史}
