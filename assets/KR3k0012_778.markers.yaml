  - {type: variant, offset: 106, length: 1679, content: 君言之辱使者歸則必拜送於門外若使人於君所則必朝服而命之使者反則必下堂而受命詩曰四牡勞使臣之來也有功而見知則說矣四牡騑騑周道逶遟豈不懷歸王事靡盬我心傷悲又曰皇皇者華君遣使臣也送之以禮樂言遠而有光華也皇皇者華于彼原隰駪駪征夫每懷靡及左傳曰齊使仲孫湫來省難仲孫歸曰不去慶父魯難未已公曰若之何而去之對曰難不已將自斃君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以為本也臣聞之國將亡本必先顛而后枝葉從之魯不棄周禮未可動也君其務寧魯難而親有禮因重固能重固者因而成之間攜貳覆昏亂霸王之器也又曰齊孝公伐我北鄙公使展喜犒師使受命于展禽柳下惠也齊侯未入境展喜從之曰寡君聞君親舉玉趾將辱弊邑使下臣犒執事又曰晉侯及秦伯圍鄭以其無禮於晉且貳於楚也晉軍函陵秦軍汜南佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退公從之又文下曰秦伯使西乞術來聘且言將伐晉襄仲辭王曰君不忘先君之好照臨魯國鎮撫其社稷重之以大器寡君敢辭玉賓荅曰不腆先君之敝器而使下臣結二國之好是以敢致之襄仲曰不有君子其能國乎國無陋矣厚賂之又宣十五年曰楚子圍宋宋人使樂嬰齊告急于晉晉侯使解楊如宋使無降楚曰晉師悉起將至矣鄭人囚之而獻於楚楚子厚賂之使反其言不許三而許之登諸樓車使呼宋人而告之遂致君命楚子將殺之使與之言曰爾既許不穀而反之何故非我無信汝則棄之速即爾刑對曰臣聞之君能制命為義臣能承命為信信載義而行之為利謀不失利以衛社稷民之主也義無二信信無二命義不行兩信不受二命也君之賂臣不知命也奉命以出有死無霣音殞又可賂乎臣之許君以成命也成其君命也死而成命臣之祿也寡君有信臣矣下臣獲考死又何求楚子舍之以歸考城又曰晉侯使郄克徵會于齊齊頃公惟婦人使觀之郄子登婦人笑於房獻子怒出而誓曰所不此報無能涉河郤克請伐齊晉侯弗許至成公三年衛孫桓子臧宣叔亦乞師以伐齊晉侯許之又曰齊叔老為季武子介自是晉人輕魯弊而益敬其使又曰吳公子札來聘見叔孫穆子說之謂穆子曰子其不得死乎好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不慎所舉何以堪之禍必及子聘于齊說晏平仲謂之曰子速納邑與政無邑無政乃免於難齊國之政將有所歸未狨所歸難未歇也故晏子因陳桓子以納政與邑是以免於欒高之難難在昭八年聘於鄭見子產如舊相識與之縞帶子產獻紵衣焉大帶也吳地貴縞鄭地貴紵故各獻己所貴示損己而不為被貨利謂子產曰鄭之執政侈難將至矣政必及子為政慎以禮不然鄭國必敗敗謂伯有也又曰韓宣于如楚送女叔向為介鄭子皮子太叔勞諸索氏太叔謂叔向曰楚王汰侈已甚子其戒之叔向曰汰侈已甚身之災也焉能及人若奉吾幣帛慎吾威儀守之以信行之以禮敬始而思終終無不復行而不失儀敬而不失禮導之以訓詞奉之以舊法考之以先王度之以二國雖汰侈若我何又曰費楚無極譖太子建王使城父司馬奮楊殺太子建未至而使遣之太子奔宋王召奮楊使城父人執己以至王曰言出於余口入於耳爾誰告建也對曰臣告之君王命臣也事建如事余臣不佞不能茍貳奉初以還不忍後命故遣之既而悔之亦無及也已王曰而敢來何也對曰使而失命召而不來是再奸也逃無所入王曰歸從政如他日奸犯也論語曰使於四方不辱君命可謂士矣又曰遽伯玉使人於孔子孔子與之坐而問焉曰夫子欲寡其過而未能也使者出子曰使乎使乎史記曰吳季札之為使北過徐君徐君初好札劍口雖弗言季札知之為使上國未獻還至徐徐君已死乃解其寶劍繫徐君塚樹而去從者曰徐君已死當誰與乎曰不然始吾心已許之豈以死背吾心哉又曰趙平原君使人於春申君趙使欲夸楚為瑇瑁簪刀劍室悉以珠飾之春申君三千餘人上客皆鑷珠履以見趙使大慚又曰陸賈楚人以客從高祖定天下名為有口辨士居左右常使諸侯時中國初定尉佗平南越因王之高祖使賈賜佗印為南越王佗魋結箕倨見賈賈因說佗曰足下欲以區區之越與天子杭衡為敵國禍且及身矣佗迺蹶然起坐謝賈曰生長蠻夷中久殊失禮義因問賈曰我與蕭何曹參韓信孰賢賈曰王似賢之復問曰我與皇帝孰賢賈曰皇帝起豐沛討暴秦誅強楚為天下興利除害繼五帝三王之業統理中國中國之人以億計地方萬里居天下之膏腴人眾車轝萬物殷富政由一家自天地剖判未始有也今王眾不過數十萬皆蠻夷崎嶇山海間譬若漢一郡王何乃比於漢佗笑曰吾不起中國故王此使我居中國何遽不若漢迺大說至孝文帝元年詔丞相陳平舉可使南越者平言陸賈先帝時曾使南越乃召為, SBCK: 隆爲}
