  - {type: variant, offset: 3187, length: 2, content: 匈奴, SBCK: 馬援奉璽書於隗囂囂遣子恂隨入侍時山東略定帝謀西牧囂兵與俱伐蜀囂將三元􅀃囂故不决歙素剛直遂發憤責之曰國家以公知臧否暁廢興故以手書暢至意足下擁忠誠眷委質是君臣父子信也今乃欲從佞惑之言爲族滅之計叛主􅀒子違背忠信􅁻凶之决在於今日因欲前刺囂囂起入部勒兵將殺歙歙徐杖節就車而去又曰隗囂甚重馬援以爲綏德將軍時公孫述稱帝囂}
