  - {type: variant, offset: 3713, length: 295, content: 都護都護之置自吉始焉又曰陳湯為人沉勇有大慮多謀策喜奇功所過城邑山川常登望遠以觀形勢常患位卑權輕不決胸臆之謀時西方郅支單于常殺漢使侵撗諸國朝廷患之谷吉上書願往諭王遇害乃遣湯與甘延壽使于西域陽謂延壽曰郅支單于結怨諸夷屈辱漢使朝廷患之久矣雖然蠻夷無金城湯池之固堅弩之器恩義不行彼可取也若舉屯田吏士并發烏孫兵直抵城下彼亡無所保千載之功可致也延壽然之請奏湯曰不可不如矯詔而發之延壽不從會延壽疾臥湯因矯制發城郭諸國兵胡漢四萬餘騎置官吏而發也已行延壽聞而驚起止之湯按劍叱之曰大眾已集豎子胡敢沮眾耶乃上䟽自劾矯制之狀因分兵葱領赤谷兩道鼓行而西去單于城三十里止而營單于怪之使人問之曰漢兵何來湯曰見單于亡國本屈, SBCK: ''}
