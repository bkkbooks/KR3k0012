  - {type: variant, offset: 2550, length: 248, content: 何曰事已搆可殺楚使無使歸而疾走漢併力布從之遂歸漢又曰張騫漢中人建元中為郎時匈奴降者言匈奴破月支氏擒其王以其頭為飲器月支遁而怨匈奴無與共擊之漢方欲滅胡聞之乃募使者騫應募與堂邑氏奴甘父俱往匈奴不聽去乃留騫十餘歲娶胡妻有子然騫持漢節不失居匈奴西騫因與其屬亡嚮月氏西走數十日至大宛後單于死國亂騫與胡妻及堂邑父俱亡歸漢拜騫太中大夫騫為人寬信蠻夷愛之騫曰臣在大夏時見卭竹杖蜀布問安得此國人曰吾賈人往市之身毒國一名天竺國在大夏東南數千里人乘象以戰臣度大夏去漢萬二千里有蜀物其去蜀不遠矣於是漢復事西南夷騫從大將軍, SBCK: ''}
