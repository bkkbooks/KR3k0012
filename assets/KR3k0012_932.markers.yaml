  - {type: variant, offset: 165, length: 231, content: 遺我大寶龜五曰文龜甲者文彩者河圖曰靈龜負書丹甲青文六曰筮常在著藂下潛伏見龜榮傳七曰山龜八曰澤龜九曰水龜十曰火龜此者說龜生之處所火龜猶火鼠耳物有含異氣者不可以常理推然亦無所怪周易曰或益之十朋之龜又說卦曰離為龜京房易緯曰靈蓍四十九莖下有千歲神龜守之焦贛易林曰龜猒江海陸行不止自令枯藁失其都市尚書皋陶謨曰昆命于元龜又禹貢曰九江納錫大龜又曰寧王遺我大寶龜文王也遺我大寶龜疑則卜之尚書中候曰堯沉璧於洛玄龜負書出背甲赤文朱字止壇場沉璧於河黑龜出赤文題又曰周公攝政七年制禮作樂, SBCK: ''}
