  - {type: variant, offset: 2375, length: 842, content: 歷歲久也抱朴子曰千歲靈龜五色具焉其雄額上兩骨起似角解人言浮於蓮葉之上或在叢蓍之下以來朱浴之乃剔取其甲火炙擣服方寸匕日三盡一具壽千歲又曰山中辰曰稱兩師者龍也巳曰稱寡人者社中虵也稱時君者龜也又曰郄儉少時行獵墮空冢中饑餓見冢中有大龜數數迴轉所向無常張口吞氣或俛或仰素聞龜能導引乃試隨龜所為遂不復饑百餘日後竟能咽氣斷穀魏王棄置土室中閉試之一年不食顏色悅懌氣力自若符子曰邦人獻燕昭王以大豖者曰於今百二十歲邦人謂之豕仙其群臣言乎昭王曰是豕無用王命宰夫而膳之豕既死乃見夢於燕相曰今杖君之靈而化吾生也始得為魯津之伯而浮舟者食我以稉糧之珍而欣君之惠將報子焉後燕相遊於魯津有赤龜衘夜光而獻金樓子曰黃金滿笥不以投龜明珠徑寸豈勞彈雀又曰巨龜在沙嶼間背上生樹木如淵島嘗有商人依其採薪及作食龜被灼熱便還海於是死者數千人又曰陽郡山中有巨龜長八尺腹下有文字前後足下各躡一龜有時踰山越水咸觀異之說苑曰靈龜五色色似玉背陰向陽上隆象天下平法地轉運應四時虵頭龍脰左精象日右精象月知存亡吉凶之變又曰城濮之戰文公謂咎犯曰吾卜戰而龜𤏖音潛我迎歲彼背歲彗星見彼操其柄我操其標吾又夢與荊王搏彼在上我在下吾以無戰子以為何如咎犯對曰卜戰龜𤏖是荊人也我迎歲彼背歲彼去我從之也又曰晉屠岸賈欲追趙氏趙盾夢見叔帶持龜而哭甚悲已而笑拊手且歌謂趙盾卜之占兆絕而後好趙史援占曰此甚惡非君之身國語曰夫服心之文也如龜焉灼其中必文於外若楚公子不為君必死不合諸侯矣家語曰孔子問漆彫馮曰子事臧文仲武仲及孺子容此三大夫者孰為賢乎對曰臧氏家有守龜焉文仲三年而為一兆武仲三年而為二兆孺子容三年而為三兆馮從此見之若夫三人之賢與不賢所未敢識也孔子曰君子哉漆彫氏之子其言人之美也隱而顯言之過也微而著智不能及明不能見孰克如之論衡曰龜三百歲大如錢游華葉上三千歲則青邊有距山海經曰大苦山陽狂水出焉注于伊水中多三足龜星經曰天龜五星在南漢中廣志曰觜茲維切𧓈夷焦切形如龜出交州山龜在山上食草長尺餘柳氏龜經曰龜一千二百歲可卜天地之終始何以言之三千四十二占於天地千歲之龜甲黑龜有五色時用之神, SBCK: 豹冠列}
