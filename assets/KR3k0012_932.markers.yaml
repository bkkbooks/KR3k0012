  - {type: variant, offset: 3525, length: 2, content: 崑崙, SBCK: 有道乎丈夫曰吾長於性成乎命從水之道而無􅀻焉吕氏春秋曰帝顓頊令飛龍作八風之音以􅀕上帝乃會爲樂昌鼉乃偃寢以其尾擊腹其音美也捜神記曰榮陽張福舡行夜有女子乗小舟來投福云日暮畏虎不敢夜行福戯調之遂就福寢中夜月照乃見一白鼉枕福臂而卧福驚起鼉便去乗之舡乃枯槎也郭義恭廣志曰鼉魚長三尺有四足髙尺餘尾加蝘蜓而大南方嫁娶必得食之魏武赤壁還所掘得之是也支僧載外國事曰私訶條國全道遼}
