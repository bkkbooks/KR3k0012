  - {type: variant, offset: 3328, length: 173, content: 儀司馬錯破蜀克之儀因築城城終頹壞後有一大龜從硎而出周行旋走乃依龜行所築之乃成古史考曰伏羲時靈龜負河圖八卦是也洛陽記曰禹時有神龜於洛水負文列於背以受禹文即治水文也南越志曰龜甲名神屋出南海生池澤中吳越謂之元佇神龜大如拳而色如金上甲兩邊如鋸齒爪利而能緣大木捕鳴蟬至美可食不中於卜以其小故也嵩高山記曰千歲松或化為伏龜義興記曰君山廟其下有池池中有三足六眼龜, SBCK: 鳥雀}
