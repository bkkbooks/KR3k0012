  - {type: variant, offset: 3507, length: 1, content: 龜, SBCK: 黿爲河伯使者捜神記曰齊景公渡于江沅之河黿衘左􅆖没之衆皆􅅥懼古冶子於是拔劒從邪行五里逆三里至于砥柱之下乃黿也左手持黿頭右手俠左􅆖鷰躍鵠踴而出仰天大呼水逆流三百歩觀者皆以爲河伯也淮南万畢術曰黿暗得火可以燃鐵取黿殺之燒鐵如炭狀以卒其脂中鐵自燃燒黿致鼈取黿燒之鼈自至楚辭曰乗白黿兮逐漁言河伯遊鈸近則乗黿也宋玉髙唐賦曰黿鼉鱣鮪交積縱橫鼉毛詩文王靈臺曰鼉皷逢逢禮記月令曰季秋之月伐蛟取鼉說文曰鼉水蟲似蜥蝎長丈所從􅀛單聲汲􅃁周書王㑹曰㑹稽似鼉注其皮可以冠鼔呉志曰孫亮􅀄公安有白鼉鳴瑶曰鼉鳴􅀛背平南郡城中可求生守死不去來無成明年諸􅁑恪敗弟融鎮公安􅀍収融刮金印􅀛背}
  - {type: page-break, offset: 3507, content: '', id: KR3k0012_SBCK_932-6a}
  - {type: variant, offset: 3507, length: 208, content: 龜一名玄衣督郵一名元緒王子年拾遺錄曰崑崙山第五層有神龜長一尺九寸四翼萬歲則升木而居也亦能言矣郭子橫洞冥記曰黃安代郡人也常去自云卑猥不敢處人間執鞭懷而欲書畫地以記其數一夕地成池矣明腹移亦復成池時人謂言黃安舌耕年可八十餘視若童子常服朱砂舉體皆赤冬不著衣坐一大神龜時人問子坐此龜幾年對曰昔伏羲氏始造網罟有此龜以授吾龜背已平此蟲畏日月之光二千歲而一出頭我坐此龜已來五遇出頭矣行則負龜而移世人謂黃安萬歲博物志曰人有出行墜深泉澗, WYG: 黿為河伯使}
  - {type: variant, offset: 3507, length: 0, content: '', krp: 黿爲河伯使者捜神記曰齊景公渡于江沅之河黿衘左驂没之衆皆惕懼古冶子於是拔劒從邪行五里逆三里至于砥柱之下乃黿也左手持黿頭右手俠左驂鷰躍鵠踴而出仰天大呼水逆流三百歩觀者皆以爲河伯也淮南万畢術曰黿暗得火可以燃鐵取黿殺之燒鐵如炭狀以卒其脂中鐵自燃燒黿致鼈取黿燒之鼈自至楚辭曰乗白黿兮逐漁言河伯遊鈸近則乗黿也宋玉髙唐賦曰黿鼉鱣鮪交積縱橫鼉毛詩文王靈臺曰鼉皷逢逢禮記月令曰季秋之月伐蛟取鼉說文曰鼉水蟲似蜥蝎長丈所從}
