  - {type: variant, offset: 510, length: 4, content: 春官下龜, SBCK: 曰大􅆎無雄􅀛鼉􅀋也無雄與虵通氣則孕又曰鼈剉令如棊擣赤莧汁和合厚以茅苞五六月中作投於池澤中經旬臠臠成鼈志恠曰昔有}
