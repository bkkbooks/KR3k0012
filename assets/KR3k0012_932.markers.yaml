  - {type: variant, offset: 505, length: 0, content: '', SBCK: 禮記曲禮上曰水潦降不獻魚鼈不饒多也又樂記曰土敝則草木不長水煩則魚鼈不大魏略舊志曰昔北方有槖離之國者其王侍婢有身王欲殺之婢云有氣如鷄子來下我故有娠後生子王􅂢之於溷中猪以氣嘘之徙馬欄馬以氣嘘之王疑之以天子乃命其母収畜之名曰東明常令牧馬東明善射王恐奪其國欲殺之東明走南至淹水以弓擊水魚鼈浮爲橋東明得渡而魚鼈解散追兵不得渡東明因都王夫餘之地後魏書曰夫餘之臣以朱蒙善射欲殺之朱蒙母以告朱蒙與烏連二棄之夫餘東南走遇一大水欲濟無梁蒙告水曰我是河伯外孫今逃追兵垂及如何於是魚鼈並浮爲成橋朱蒙得渡追􅀐不得渡蒙至絶􅂛骨城遂居焉隋書曰崔弘度毎誡其寮吏曰人當誠恕無得欺誑皆曰諾後嘗食鼈侍者八九人弘度一一問之曰鼈美乎人懼之皆云鼈美弘度於是大罵曰傭奴何敢誑我汝􅀄未食鼈安知其美俱杖之八十官屬百工見之莫不流汗無敢欺隱孫卿子曰跬歩不休跛鼈千里淮南子同莊子曰塪井之跬謂東海鼈曰吾跳梁井幹之上入沐鈌甃之岸樂亦至矣子奚不時來入觀乎海鼈左足未入而右􅂰巳墊矣於是逡廵而却告之曰夫海千里之逺不足舉其大千仞之髙不足極其深禹時十年九潦而水不爲加益湯時八年七旱而岸不加損夫不爲湏􅁷推移不以多少進退者此亦東海之大樂也於是蛙聞之適適然驚規然自失韓子曰鄭縣人卜子毒妻之市買鼈以歸潁水以爲渇因縱而飲之遂失鼈淮南子曰鼈無耳而目不可以瞥精於明也不可以瞥瞥則見又曰王子慶忌足躡麋鹿手􅅞兕虎置之􅁳室之中不能摶􅀛鼈􅀔不便也慶忌呉王僚之子也又曰大生小多生少天之道也故立阜不能生雲雨縈水不能生魚鼈者小也又曰殺戎馬而求狐狸援兩鼈而失靈􅀛斷右臂而爭一毛折鏌鎁而爭鷄刀用智如此豈足髙乎髙猶貴也又曰忠信形於内感動應於外故禹執干戚儛於階之間而三苗服三苗畔禹禹風以禮樂而服也鷹翔川魚鼈沉禹以徳服三苗猶鷹翔川上魚鼈恐皆深飛鳥揚鳥見鷹而揚去必逺實也鷹懷欲害之心故鳥魚知其情實故逺之說苑曰曾子有疾曽元抱首曽華抱足曽子曰吾無顔氏之才何以告汝雖無能君子務益夫華多實少者天也言多行少者人也夫飛鳥以山爲卑而層巢其巔魚鼈以淵爲淺而穿穴其中然所以得者餌也君子苟能無以利害身辱安從至乎國語曰公父文伯飲南宫敬叔酒以露賭父爲客賭父曾大夫客上客也羞鼈焉小賭父怒相延食鼈辭曰將使鼈長而後食之遂岀文伯之母聞之怒曰吾聞之先子曰􅀕養尸饗飬上賔言􅀕祀之禮尊養尸饗宴之禮養上賔鼈於何有而使夫人怒曰遂逐之五日吕氏春}
