  - {type: variant, offset: 3, length: 156, content: 三龜爾雅曰龜三尺賁今吳興陽羨縣君山上有池池中有六眼龜龜俯者靈行頭低仰者謝行頭仰前弇諸果甲前長後弇諸獵左倪不類行頭今江東所謂者以甲卜審右倪不若行頭右庳為右食甲形皆爾一曰神龜龜之最神明二曰靈龜涪陵郡出大龜甲可以卜緣中文似瑇瑁俗呼為靈龜即今觜𧓈龜一名靈𧓈能鳴𧓈以規切三曰攝龜小龜也腹甲曲折解能自張閉好食虵江東呼為靈龜也, WYG: ''}
