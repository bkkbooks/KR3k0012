  - {type: variant, offset: 4472, length: 3, content: 元緒孔, WYG: 樂倡鼉乃偃寝以其尾擊腹志其美也捜神記曰榮陽張福船行夜有女子乗小舟來投福云日暮畏虎不敢夜行福戲調之遂就福寢中夜月照乃見一白鼉枕福臂而卧福驚起鼉便去所乗之船乃枯槎郭義恭廣志曰鼉長三尺有四高尺餘美似蝘蜓南方嫁娶必得食之魏武赤壁還所掘得之是也支僧載外國事曰私可條國全道遼山有毗呵羅寺寺中有石鼉至有神靈衆僧餘食欲盡寺奴輒向石鼉作禮於是食具許}
