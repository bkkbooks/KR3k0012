  - {type: variant, offset: 3533, length: 15, content: 龜長一尺九寸四翼萬歲則升木而居, SBCK: 靈衆僧飲食欲盡寺奴輙向石鼉作禮於是食具許氏志恠曰沙門竺僧瑶得神符尤能治邪廣陵王家女病邪召瑶治之瑶入門便瞋目大罵老魅不守道敢干犯人女在内大喚云人殺我夫􅀑在側曰吾命盡於今可爲痛心因歔欷悲啼又曰此神}
