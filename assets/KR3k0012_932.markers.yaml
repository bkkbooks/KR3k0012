  - {type: variant, offset: 3508, length: 0, content: '', krp: 單聲汲冡周書王㑹曰㑹稽似鼉注其皮可以冠鼔呉志曰孫亮𥘉公安有白鼉鳴瑶曰鼉鳴龜背平南郡城中可求生守死不去來無成明年諸葛恪敗弟融鎮公安𬒳収融刮金印龜背}
