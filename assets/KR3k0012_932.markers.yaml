  - {type: variant, offset: 521, length: 0, content: '', WYG: 鼈黿此諸類皆卵生而影伏又曰大腰無雄龜鼉類也無雄與虵通氣則孕又曰鼈剉令如棊𢷬赤莧汁和合厚以毛苞五六月中作投於池澤中經旬臠匕成鼈志怪志昔有人與奴俱得心腹病治不能愈奴死乃刳腹視}
  - {type: variant, offset: 522, length: 2, content: 屬各, WYG: 得一白鼈赤眼甚鮮净以諸藥内鼈口中終不死后}
