  - {type: variant, offset: 515, length: 0, content: '', SBCK: 與奴俱得心腹病治不能愈奴死乃刳腹視之得一白鼈赤眼甚鮮淨以諸藥内鼈口中終不死後有人乗白馬來者馬溺濺鼈縮頭藏脚乃試取馬溺灌之豁然消成水病者頓飲一􅂛即愈淮南萬畢術}
