  - {type: variant, offset: 3920, length: 639, content: 問蒙何故厭荅云眠輒夢人倒懸己公容慮向龜乃令人視龜所在果倒懸著屋公嘆曰果如所度命下龜於地於是蒙即得安寢龜乃去又曰晉咸康中豫州刺史毛寶戍邾城有一軍人於武昌市見人賣一白龜子長四五寸潔白可愛寶便買取持歸著甕中養之日日大近欲尺許其人憐之持至江邊放水中視其去後邾城遭石勒敗毛寶棄豫州既越江莫不沉溺寶于時被鎧持刀亦同自投既入水中覺如隨一石上水裁至腰須臾游去中流視之乃是先所養白龜甲六七尺既送至東岸出頭視此人徐游而去中江猶廻首數焉又曰鄱陽縣民黃赭入山採荊楊子遂迷不知道數日饑餓忽見一大龜赭便呪曰汝是靈物吾迷路不知道今騎汝背示吾路龜即回右膊赭即從行去十餘里便至溪水見賈客行舡赭即往乞食便語舡人云我向者於溪邊見一龜甚大可共往取之言訖面即生瘡既往亦復不見龜還家數日病瘡而死劉敬叔異苑曰餘姚縣倉封印完全而開之覺大損耗後伺之乃是富陽縣桓王陵上雙石龜所食即密令毀龜口於是不復損耗又曰孫權時永康有人入山遇一大龜即束之歸龜便言曰遊不良為時君所得人甚怪之載出欲上吳王夜洎越里纜舡於大桑樹霄中樹呼龜曰勞乎元緒奚事爾耶龜曰我被拘縶方見烹臛雖盡南山之樵不能潰我樹曰諸葛元遜博識必致相苦令求如我之從計從安出龜曰子明無多辭禍將及爾樹寂而止既至權命煮之焚柴萬車語猶如故諸葛恪曰燃以老葉乃熟獻人仍說龜樹共言權登使伐取煮龜立爛今烹龜猶多用葉薪野人故呼龜為元緒孔氏志怪曰會稽吏謝宗赴假吳中獨在舡忽有女子姿性妖婉來入舡問宗有佳絲否欲市之宗因與戲女漸相容留在舡宿歡宴繼曉因求宗寄載宗便許之自爾舡人恒夕但聞言笑兼芬馥氣至一年往來同宿密伺, SBCK: 唯鷄􅆑盛}
