  - {type: variant, offset: 514, length: 0, content: '', krp: 鼉類也無雄與虵通氣則孕又曰鼈剉令如棊擣赤莧汁和合厚以茅苞五六月中作投於池澤中經旬臠臠成鼈志恠曰昔有}
