  - {type: variant, offset: 610, length: 3, content: 甲類秋, SBCK: 左傳宣上曰楚人獻黿於鄭靈公公子宋與子家將見子公之食指動以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而􅀏公問之子家以告及食大夫黿召子公而弗與也子公怒染指於鼎嘗之而岀廣雅曰海黿大􅩔重千鈞續漢書曰靈帝時江夏黃氏之母浴而化爲黿入于深淵其後時時出見初浴簮一銀􅁫及見猶在其首唐史曰韋丹少在東洛嘗至中橋見數百人喧集水濵}
  - {type: page-break, offset: 610, content: '', id: KR3k0012_SBCK_932-4b}
  - {type: variant, offset: 610, length: 3, content: 甲類秋, WYG: 左傳宣上曰楚人獻黿於鄭靈公公子宋食指動謂子家曰他日如此必嘗異味及入宰夫將解黿相視而笑公問之子家以告及食大夫召公子宋弗與也公子怒染指於鼎嘗之而出廣雅曰海黿大一畆重千鈞續漢書曰靈帝時江夏黄氏之母浴而化為黿入於深淵其後時時出見初浴時簪與銀釵及見猶在其首唐史曰韋丹少在東洛常在中橋見數百人喧集水濵}
