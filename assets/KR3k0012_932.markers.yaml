  - {type: variant, offset: 4586, length: 279, content: 物並小如拳以火視之乃是三龜宗悲思數日方悟自說此女子一歲生二男大者名道愍小者名道興既為龜送之於江廣五行記曰晉孝武太元中吳郡岑泉為司農造碑於江畔湖西之村見石龜載碑從田中出還其先處萍藻猶在腹下其月泉暴亡任昉述異記曰陶唐之世越裳國獻千歲神龜方三尺餘背上有文背科斗書記開闢已來命錄之龜曆伏滔述帝功德銘曰胡書龜曆之文又曰周時城陽雨錢終日方絕王莽時未央宮雨五銖錢既至地悉為龜兒又曰龜一千年生毛壽五千歲謂之神龜壽萬年曰靈龜孫惠龜賦曰有緇衣之大夫兮衣玄繡之衣裳乘輜車之岌兮駕雲霧而翱翔風雨為之電奮兮五色赫以焜煌李顒龜賦曰質應離象位定坎居賤彼孕頤賁我靈符浮洛川見緯書洞祕賾通玄虛, SBCK: ''}
