  - {type: variant, offset: 519, length: 0, content: '', WYG: 取亙物以時簎魚鼈龜蜃鄭司農元簎謂以杖刺泥中摶取之禮記曲禮上曰水潦降不獻魚鼈又樂記曰土敝則草木長水煩則魚鼈不大魏畧舊志曰昔東方有髙麗之國者其王侍婢有身王欲殺之婢云有氣如鷄子來下我故娠後生子王捐之於溷中猪以氣噓之徙馬欄馬以氣噓之王疑之乃命其母収畜之名曰東明常令牧馬東明善射王恐奪其國欲殺之東明走南至淹水以弓擊水魚鼈浮為橋東明得渡而魚鼈解散追兵不得渡東明因都王夫餘之地後魏書曰夫餘之君以朱蒙善射欲殺之朱䝉母以告朱蒙與烏連二棄之夫餘東南走遇一大水欲濟無梁蒙告水曰我是日子河伯外孫今逃追兵垂及如何於是魚鼈並浮為成橋朱䝉得渡追騎不得渡蒙至絶升骨城遂居焉隋書曰崔宏度每誡其寮吏曰人當誠恕無得欺誑皆曰諾後嘗食鼈侍者八九人宏度一一問之曰鼈美乎人懼之皆云鼈美宏度於是大罵傭奴何敢誑我汝初未食鼈安知其美俱杖之八十官屬百工見之莫不流汗無敢欺隠孫卿子曰跬步不休跛鼈千里莊子曰塪井之蛙謂東海鼈曰吾跳梁井幹之上入沐缺甃之岸樂亦至矣子奚不時來入觀乎海鼈左足未入而右膝已墊矣於是逡廵而却告之曰夫海千里之逺不足舉其大千仞之髙不足極其深禹時九年十潦而水不為加益湯時八年七旱而岸不加損夫不為須臾推移不以多少進退者此亦東海之大樂也於是蛙聞之適適然驚規然自失韓子曰鄭縣人乙之妻之市買鼈以歸過潁水以為渴因縱而飲之遂失鼈淮南子曰鼈無耳而目不可以瞥精於明也又曰王子慶忌足躡麋鹿手縛虎兕置之冥室之中不能摶龜鼈勢不便也又曰大生小多生少天之道也故立阜不能生雲雨縈水不能生魚鼈者小也又曰殺戎馬而求狐貍受兩鼈而失靈龜斷右臂而争一手折鏌鎁而争雞刀用智如此豈足高乎又曰忠信形於内感動應於外故禹執干戚儛兩階之間而三苗服三苗畔禹土修以禮樂而服也鷹翔川魚鼈沉禹以徳下三苗猶鷹翔川上魚鼈恐皆沉飛鳥揚鳥見鷹而揚去必逺實也說苑曰曽子有疾曽元抱首曽華抱足曽子曰吾無顔氏之才何以告汝雖無能君子務益夫華多實少者天也多行少言者人也夫飛鳥以山為卑而層巣其巔魚鼈以淵為淺而穿穴其中然所以得者餌君子苟能無以利害身辱安從至乎國語曰公父文伯飲南宫敬叔酒以露賭父為客賭父單大夫客上客也羞鼈焉小賭父怒相延食鼈辭曰將使鼈長而後食之遂出文伯之母聞之怒曰吾聞之先子曰祭養尸嚮養上賔言祭祀之禮尊養尸間宴之禮養上賔鼈於何有而使夫人怒也遂杖之五百吕氏春秋曰水之深則魚鼈歸之樹之盛則飛鳥歸之庶草美則禽獸歸之人主賢則豪傑歸之晏子春秋曰齊大旱景公召羣臣問曰寡人欲祀河伯可乎晏子曰不可河伯以水為國以魚鼈為民彼獨不欲雨乎祝之何益山海經曰從山多三足鼈顧譚新語曰呉之翫水若魚鼈蜀之便山若禽獸神仙傳曰汝南郡中常有鬼怪來輒數船過時𨗳從威儀如太守入府打鼔周行内外乃還去甚以為患后費長房詣府君而正值此鬼來到府君門常徑入獨此來至門而已不敢前欲去長房厲聲呼便促前來鬼化作老公乃下車把板伏庭中叩頭乞得自改長房曰汝死老鬼不念良善無故𨗳從盪􅊳官府知當死不復汝真形此鬼須臾即成大鼈如車輪頸長一文許長房復令還就人形以一札符付之令送與葛陂君鬼叩頭流涕持一札符去使人追視之至陂以頸繞札而死王子年拾遺記曰容山下有水多鼈魚皆能飛躍星經曰天鼈十三星在南斗主水蟲南越志曰海中有朱鼈狀如肺有眼}
