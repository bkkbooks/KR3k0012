  - {type: variant, offset: 614, length: 1, content: 堅, SBCK: 漁者網得大黿繫之橋柱引頸四顧有求救之意丹問曰幾錢可贖曰五千丹曰吾驢直三千可乎曰可於是與之放黿於水徒歩而歸淮南子曰桀之力别觡伸釣洛骨也索鐵操金椎移大戯大戯軍之大旗水殺黿鼉陸捕熊羆又曰積力之所舉則無不勝也衆智之所爲則無不}
