  - {type: variant, offset: 516, length: 83, content: 龜人掌六龜之屬各有名物天龜曰靈屬地龜曰緯屬東龜曰果屬西龜曰雷屬南龜曰獵屬北龜曰若屬凡取龜用秋時攻龜用春時各以其物入于龜室六龜各異室也大戴禮曰甲之蟲三百六十而神龜為之長, SBCK: 青泥殺鼈得莧復生黿}
