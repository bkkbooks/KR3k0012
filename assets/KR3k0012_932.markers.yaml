  - {type: variant, offset: 827, length: 1375, content: 以大蔡納請其可請為先人立後其必可也賈曰聞命矣再拜受龜公羊傳定公曰弓繡質質祔龜青純純緣春秋運斗樞曰瑤光星散為龜史記龜策傳曰余至江南觀其行事問其長老云龜於歲乃遊蓮葉之上江傍家人嘗畜龜飲食之以為能導引致氣有益於助衰養老豈不偉哉史記褚先生曰能得名龜者財物歸之家必大富至千萬一曰北斗龜二曰南辰龜三曰五星龜四曰八風龜五曰二十八宿龜六曰日月龜七曰九州龜八曰王龜凡八名龜龜各有文在腹下此龜不必滿尺二寸民人得長七八寸可寶矣神龜出於江中廬江郡常歲時出龜長尺二寸者二十枚輸太卜官太卜官因以吉日剔取其腹下甲龜千歲乃滿尺二寸有神龜在江南嘉林中嘉林者獸無虎狼鳥無鴟梟草無毒螫野火不及斧斤不至是謂嘉林龜在其中嘗巢於芳蓮之上左脅書文曰甲子重光得我者匹夫為人君有土正諸侯得我為帝王南方老人用龜支床足行二十餘歲老人死後移床龜尚生能行氣導引又曰宋元王二年江使神龜使於河至於泉陽漁者豫且舉網得而囚之置之籠中夜半龜來見夢於宋元王曰我為江使於河而網當吾路泉陽漁者豫且得我我不能去身在患中王有德義故來告愬元王惕然乃召博士衛平而問之平曰龜也王求之泉陽豫且曰夜半舉網得龜使者載行入端門見王延頸而前三步而止縮頸而卻復其故處於是元王擇日齋戒以刀剝之元王之時衛平相宋宋國最強龜之力也魏略曰文帝時神龜出於靈芝池晉書曰懷帝永嘉元年有玉龜出於霸水也崔鴻十六國春秋前燕錄曰海出大龜枯死於平墩遼東送之侍郎王弘以為宇文允得龜滅亡之徵也晉書曰符堅末高陸人穿井得龜大三尺背上有文象八卦堅命太卜池養之食以粟及死藏其骨於太廟是夜廟丞高虜夢龜謂之曰我本出將歸江南遭時不遇殞命秦庭又有人夢於虜曰龜三千六百歲終必妖興亡國之象也其後竟驗又載記曰乞伏國仁隴西鮮卑人也昔有如弗斯出連叱盧三部自漠北南出太陰山遇一巨蟲於路狀若神龜大如阜乃殺馬而祭之祝曰若善神也便開路惡神也遂塞不通俄而不見乃有一小兒在焉南齊書曰永明年唐潛獻青毛神龜一頭梁書曰元帝為江州刺史時有安成望族劉敬躬者田間得白蛆化為金龜將銷之龜生光照室敬躬以為神而禱之所請多驗也三國典略曰梁陸法和至襄陽城北大樹下畫地方二尺令弟子掘得一龜長一尺五寸杖叩之曰汝欲出此已數百歲若不遇我豈見天子日為授三歸龜乃入草去陳書曰武宣章皇后母常遇道士以小龜遺己光采五色曰三年有徵及朞后生紫光照室因失龜所在隋書曰開皇中掖庭宮每有人來挑宮人宮司以聞帝曰門衛甚嚴人何從而入當是妖精耳因戒宮人曰若逢但斫之其後有物如人夜來登床宮人抽刀斫之若中枯骨其將落床而走宮人逐之因入池而沒明日帝令涸池得一龜徑尺餘其上有刀跡煞之遂絕唐書曰先天二年丁未江州獻靈龜六眸腹下有玄文象卦文梁記曰朱友貞末年許州獻綠毛龜以為瑞因宮中造室以居之目為龜堂晉史曰安州李金全之將叛也郡樓有介蟲如龜而巨鱗銳首能陷堅出於金全足下金金惡而焚之列子曰渤海之東有大叡焉其中有山無所連著常隨潮波上下往還不得暫峙焉仙聖毒之訴於上帝帝恐流於西極失群聖之居使巨龜十五舉首而戴之迭為三番六萬歲一交焉五山始峙而不動龍伯之國有大人舉足而不盈數十步而暨五山之所一釣而連六龜合負而趣歸其國灼其骨以數焉莊子曰莊釣於濮水楚王使大夫往先白焉曰願以境內累子莊子持竿不顧曰吾聞楚有神龜死已二千歲矣巾笥而藏之廟堂之上此龜者寧其死留骨而貴乎寧其生而曳尾塗中乎大夫曰寧生而曳尾塗中莊子曰往矣吾將曳尾於塗中又曰宋元君夜半而夢人被髮窺阿門曰予自宰露之淵予為清江使河伯之所漁者余且得予元君覺召占夢者, SBCK: 獵}
