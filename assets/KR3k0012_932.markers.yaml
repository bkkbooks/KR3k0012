  - {type: variant, offset: 506, length: 2, content: 獻龜, SBCK: 曰水之深則}
  - {type: variant, offset: 506, length: 1, content: 獻, krp: 曰水之深則魚鼈歸之樹之盛則飛鳥歸之庶草美則禽獸歸之人主賢則豪傑歸之晏子春秋曰齊大旱景公召羣臣問曰寡人欲祀河伯可乎晏子曰不可河伯以水爲國以魚鼈爲民彼獨不欲雨乎祀之何益山海經曰從山多三足鼈顧譚新言曰呉之翫水若魚鼈蜀之便山若禽獸神仙傳曰汝南郡中常有鬼恠歳輙數出過時導從威儀如太守入府打鼓周行内外乃還去甚以爲患後費長房詣府君而正值此鬼來到府君門常徑入獨此來至門而巳不敢前欲去長房厲聲呼使促前來鬼化作老公乃下車把板伏庭中叩頭乞得自改長房曰汝死老鬼不念良善無故導從盪突官府知當死不復汝真形此鬼湏臾即成大鼈如車輪頸長一丈許長房復令還就人形以一札符付之令送與葛陂君鬼叩頭流涕持一札符去使人追視之至陂邊以頸繞株而死王子年拾遺記曰容山下有水多丹鼈魚皆能飛躍星經曰天鼈十三星在南斗主水蟲南越志曰海中有朱鼈狀如肺有眼六脚而常吐珠見則天下大旱崔豹古今注曰鼈一名河伯從事愽物志曰九竅者胎化八竅者卵生}
  - {type: variant, offset: 508, length: 1, content: 魚, krp: 鼈黿此諸類皆卵生而影伏}
