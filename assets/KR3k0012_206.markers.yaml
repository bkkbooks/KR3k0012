  - {type: variant, offset: 894, length: 6, content: 延賞怙權矜巳, WYG: 晉武依周置職以尊安平非避諱也元興中恭帝為太宰桓元都督中外博士徐豁議太宰非武官不應都督遂從豁議後周書曰文帝依周禮建六官遂置天官大冢宰卿一人掌邦理以建六典佐皇帝理邦國通典曰太宰於殷為六太於周為六卿亦曰冢宰周武王時周公始居之掌建邦之治秦漢魏並不置晉初依周禮備三公三公之職居太師首景帝名師故置太宰以代之}
