  - {type: variant, offset: 824, length: 730, content: 郎同中書門下平章事宰臣不於政事堂邀客時海內多務宰相元載等見中官宣傳恩詔至中書者引之政事堂上仍置榻坐焉峴至叱左右去其榻又曰柳渾與張延賞同在相位延賞怙權矜巳而嫉渾守正俾其所厚謂渾曰相公舊德但節言於廟堂則重位可久荅曰為吾謝張相公柳渾頭可斷也言不可絕自是竟為延賞所擠尋除右散騎常侍罷知政事又曰柳渾為相而韓滉自浙西入覲朝廷委政待之至於調兵食籠鹽鐵勾官吏贓罰鉏豪強兼并上委仗焉每奏事或日旰他相充位而巳公卿救過不能暇無敢枝梧者滉於省中榜吏至死渾雖滉所引心惡其專政正色讓之曰先相公狷察為相不滿歲而罷今相公榜吏於省中至死况省闥且非刑人之地相公奈何蹈前非行於今朝專立威福豈尊主卑臣之義也滉感悟愧悔為霽威焉又曰李晟之在鳳翔也謂賓介曰魏徵能直言極諫致太宗於堯舜之上真忠臣也僕所慕之行軍司馬李叔度對曰此搢紳儒者之事非勳德所宜晟歛容曰行軍失言傳稱邦有道危言危行今休明之期晟幸得備位將相心有不可忍而不言豈所謂有犯無隱知而不為者耶是非在人主所擇耳叔度慚而退故晟為相每當上所顧問必極言匪躬盡大臣之節性沈默未嘗泄於所親又曰閻立本為右相與左相姜恪對掌樞密恪既歷任將軍立功塞外立本惟善於圖畫非宰輔之器故時人以千字文為之語曰左相宣威沙漠右相馳譽丹青又曰皇甫鎛陰結權倖以求宰相崔群累䟽其奸邪嘗因對面論語及天寶開元中事群曰安危在出令存亡繫所任玄宗用姚崇宋璟張九齡韓休李元紘杜暹則理用李林甫楊國忠則亂人皆以天寶十五年祿山自范陽起兵是理亂分時臣以為開元二十年罷賢相張九齡專任奸臣李林甫理亂自此巳分矣用人得失所繫非小詞意激切左右為之感動鎛深御之而憲宗終用鎛為宰相又曰李絳為相同列李吉甫便僻善逢迎上意絳梗直多所規諫故與吉甫不協時議者以吉甫通於承璀故絳尢惡之絳性剛訐每與吉甫爭論人多直絳憲宗察絳忠正自立故絳論奏多所允, SBCK: ''}
  - {type: variant, offset: 824, length: 58, content: 郎同中書門下平章事宰臣不於政事堂邀客時海內多務宰相元載等見中官宣傳恩詔至中書者引之政事堂上仍置榻坐焉峴至叱左右去其榻, WYG: ''}
