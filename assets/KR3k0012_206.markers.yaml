  - {type: variant, offset: 892, length: 1, content: 相, WYG: 酆為太宰召公又居之秦漢魏無其職晉武以從祖安平王孚為太宰安平薨省咸寧四年又置或謂本太師之職避景皇諱改為太宰周之卿}
  - {type: page-break, offset: 892, content: '', id: KR3k0012_WYG_206-11a, image: WYG0894/WYG0894-0799a.png}
