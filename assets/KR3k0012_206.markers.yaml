  - {type: variant, offset: 683, length: 20, content: 令郭子儀在邠州行營聞綰拜相座內音樂咸散五, WYG: 伊訓曰百官總已以聴冢宰伊尹乃明言烈祖之成徳以訓于王湯有功烈之祖故稱言功訓太甲也又曰冢宰統百官均四海家語曰官属不治}
