  - {type: variant, offset: 1654, length: 3, content: 原用錢, SBCK: 宰安平薨省咸寜四年又置或謂夲太師之職避景皇諱改爲太宰或謂太宰周之卿位晉武依周置職以尊安平非避諱也元興中恭帝爲太宰桓􅀇都督中外􅀶士徐豁議太宰非武官不應都督遂從豁議後周書曰文帝依周禮建六官遂置天官大冢宰卿一人掌􅀖理以建􅀖之六典佐皇帝理􅀖國通典曰太宰於殷爲六太於周爲六卿亦曰冢宰周武王時周公始居之掌建􅀖之理􅁗漢魏並不置晉􅀄依周禮備三公三公之職太師居首景帝名師故置太宰以代之而以安平獻王孚居焉仲長統昌言曰冢宰堯官也尚書曰冢宰一曰掌􅀖治官府以紀万民二曰教典以安􅀖國以教官府以擾万民三曰禮典以統百官以和􅀖國以諧万民四曰政典以平􅀖國以正百官以均万民五曰刑典以詰􅀖國以任百官以生万民魏温子昇爲上黨王穆讓太宰表曰臣聞筞蹇長途終慙一日之致懸縷層臺難任}
