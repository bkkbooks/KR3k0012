  - {type: variant, offset: 971, length: 0, content: '', WYG: 𢎞為之則丞相為三公矣漢書曰六符孟康曰泰階三台也凡六星也六符星之符騐也晉書曰文帝為晉王何曽與高柔鄭沖俱為三公将入見曽獨致拜盡敬二人猶揖而已晉官品令曰三公緑綟綬也宋志曰三公黄閤前史無其義按禮記曰士韠與天子同公侯大夫則異鄭元注云士賤與君同不嫌也夫朱門洞啓當陽之正色也三公之與天子禮秩相亞故黄其閣以示謙不敢斥天子宜是漢来制也通典曰隋置太尉司徒司空以為三公叅議國之大事依北齊置府僚無其人則闕祭祀則太尉亞獻司徒奉俎司空行掃除其位多曠行事則攝天文録曰三台星一名三能一名天柱三公之位也在人曰三公天曰三台陶氏職官要録曰三台擬三公黄帝以風后配上台天老配中台五聖配下台}
