  - {type: variant, offset: 1982, length: 896, content: 姓不至流散上無淫虐下無怨讟私室無強家公議無壅滯雖未及至理亦謂小康陛下若別求太平非臣等所及既退至中書謂同列曰吾輩為宰相天子責成如是安可久處茲地邪旬日間三上章請退不許又曰韋處厚為相時文宗勤於聽政然浮於決斷宰臣奏事得請往往中變處厚常獨論奏曰陛下不以臣等不肖用為宰相參議大政凡有奏請初蒙聽納尋易聖懷若出自宸衷即示臣等不信若出於橫議臣等何名鼎司且裴度元勳宿德歷輔四朝孜孜竭誠人望所屬陛下固宜親重竇易直良厚忠事先朝陛下固當委信微臣才薄首蒙陛下擢用非出他門言既不從臣宜先退即趍下再拜陳乞上矍然曰何至此耶卿之志業朕素自知登庸作輔百職斯舉縱朕有所失安可遽辭以彰吾薄德處厚謝之而去出延英門復令召還謂曰凡卿所欲言並宜啟諭處厚因對彰善癉惡歸之法制凡數百言又言裴度勳高望重為人盡心切直宜久任可以壯國威帝皆聽納自是宰臣敷奏人不敢橫議又曰文宗朝宰臣楊嗣復因對奏曰使府判官今人數猥多徒有糜費臣欲條䟽上曰莫限及才人否嗣復曰有才人自別但澄去滓弊者菁華自出上曰蕭復為相難言者必言貞元之名相也卿其志之又曰宋申錫為相尤以公廉為巳任四方問遺悉無受者既被罪為有司驗劾多獲其四方受領所還問遺之狀朝野為之歎息又曰宋申錫以障王事申錫既被罪怡然不以為意自中書歸私第止于外廳素服以俟命其妻出謂之曰公為宰相人臣位極於此何負天子反乎申錫對曰吾自書生被厚恩擢相位不能鋤去奸亂反為所羅網夫人察申錫豈反者乎因相與泣下數行又曰李德裕父吉甫年五十一出鎮淮南五十四自淮南復相今德裕自鎮南復入相一如父之年又曰會昌元年中書奏請依姚璹故事宰臣每月修時政記送史館從之又曰宣宗時魏謨為相奏曰臣無夔契之才驟叨夔契之任將何以仰報鴻私今邊戍粗安海內寧息臣愚所切陛下未立東宮俾正人傳導以存副貳之重因泣下上感而聽之先是累朝人君不欲人言立儲貳若非人主己欲臣下不敢獻言宣宗春秋高嫡嗣未辦謨作相之日率先啟奏人士重之又曰曹礭與畢諴俱以儒術進用並居相位廉潔貞苦君子多之稱為曹畢又曰蕭遘與王鐸並居相位帝常召宰相鐸年高昇階足跌踣勾陳中遘旁掖起帝目之喜曰輔弼之臣和予之幸也謂遘曰適見卿扶王鐸子喜卿善事長矣遘對曰臣扶王鐸不獨司長臣應舉歲鐸為主司以臣中選門生也上笑曰王鐸選進士朕選宰相於卿無負矣遘謝之而退, SBCK: 六}
