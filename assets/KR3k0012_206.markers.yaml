  - {type: variant, offset: 4, length: 1, content: 丞, SBCK: 師太師太傅太保太宰揔叙三公揔叙三師六典曰三師訓導之官也蓋天子所師法大抵無所統職然非道徳崇重則不居其位無其人則闕之尚書云成王黜殷滅淮夷歸酆作周官立太師太傅太保兹惟三公論道經􅀖爕理隂陽孔安國曰師天子所師法傳傳}
  - {type: variant, offset: 4, length: 1, content: 丞, WYG: 師太師太傅太保太宰縂叙三公縂叙三師六典曰三師訓導之官也盖天子所法師大抵無所統職然非道徳崇重則不居其位無其人則闕之尚書云成王黜殷滅淮夷歸豐作周官立太師太傅太保兹惟三公論道經邦燮理隂陽孔安國曰師天子所師法傅上}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_206-1b, image: WYG0894/WYG0894-0794b.png}
  - {type: variant, offset: 4, length: 1, content: 丞, krp: 師太師太傅太保太宰揔叙三公揔叙三師六典曰三師訓導之官也蓋天子所師法大抵無所統職然非道徳崇重則不居其位無其人則闕之尚書云成王黜殷滅淮夷歸酆作周官立太師太傅太保兹惟三公論道經邦爕理隂陽孔安國曰師天子所師法傳傳}
  - {type: variant, offset: 6, length: 2, content: 下唐, SBCK: 天子保保安天子於德義禮記云設四輔及三公不必備唯其人語使能也六典云漢承秦制不置三公漢末以大司馬大司徒大司空爲三公師傅之官位在三公上後漢因之師傅尊號曰上公置府僚魏晉江左皆然後魏太師太傅太保尊號曰三師後周又爲三公隋氏又爲三師太師毛詩曰尹氏太師維周之氐秉國之均四方是維天子是毗俾民不迷箋云毗輔也言尹氏居太師之官持國政之平維制四方又曰維師尚父時惟鷹揚諒彼武王肆伐大啇大戴禮曰天子不論於先聖王之德不知君國畜民之道不見禮義之正不察應事之理不􅀶古之典傳不閑威儀之數禮樂無經學業不法凡是其屬太師之任也逸禮曰太公爲太師周公爲太傅召公爲太保史記曰周文王得吕尚於磻溪以爲師謂之太公武王嗣位號曰師尚父成王即政尊爲太師漢書音義曰師訓也應劭漢官儀曰孝平皇帝元始元年太后詔曰太師光今年老有疾俊乂大臣惟國之重}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_206-1b}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_206-2a}
  - {type: variant, offset: 6, length: 2, content: 下唐, WYG: 天子保者安天子於徳義禮記云設四輔及三公不必備唯其人語使能也六典云漢承秦制不置三公漢末以大司馬大司徒大司空為三公師傅之官位在三公上後漢因之師傅尊號曰上公置府僚魏晉江左亦然後魏太師太傅太保尊號曰三師後周又為三公隋氏又為三師太師毛詩曰尹氏太師維周之氐秉國之均四方是維天子是毗俾民不迷箋云毗輔也言尹氏居太師之官持國政之平維制四方又曰維師尚父時惟鷹揚諒彼武王肆伐大商大戴禮曰天子不論於先聖王之徳不知君國畜民之道不見禮儀之正不察應事之理不博古之典𫝊不嫻威儀之數禮樂無經學業不法凡是之属太師之任也逸禮曰太公為太師周公為太傅召公為太保史記曰周文王得吕尚于磻溪以為師謂之太公武王嗣位號曰師尚父成王即政尊為太師漢書音義曰師訓也應劭漢官儀曰孝平皇帝元始元年太后詔曰太師光今年老有疾俊乂大臣惟國之重}
