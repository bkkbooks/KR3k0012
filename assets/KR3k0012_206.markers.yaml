  - {type: variant, offset: 1642, length: 7, content: 李藩拜門下侍郎, SBCK: 安帝以太宰瑯瑘王徳文不冝嬰拂事務以紆論道之重可衮冕之服緑盭綬羽葆鼓吹盭音戻盭緑也以線爲質又曰盭草名也出瑯瑘平昌縣似艾可樂綬因以爲綬名也晉公卿禮秩曰安平王孚朗陵公何曽汝南王亮皆爲太宰齊職儀曰太宰品第一金章紫綬佩山􅀇玉堯命羲和使主隂陽之職羲伯司天即天官也后稷伏事虞夏敬授民}
