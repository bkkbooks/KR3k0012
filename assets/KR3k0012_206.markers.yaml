  - {type: variant, offset: 1200, length: 742, content: 將相心有不可忍而不言豈所謂有犯無隱知而不為者耶是非在人主所擇耳叔度慚而退故晟為相每當上所顧問必極言匪躬盡大臣之節性沈默未嘗泄於所親又曰閻立本為右相與左相姜恪對掌樞密恪既歷任將軍立功塞外立本惟善於圖畫非宰輔之器故時人以千字文為之語曰左相宣威沙漠右相馳譽丹青又曰皇甫鎛陰結權倖以求宰相崔群累䟽其奸邪嘗因對面論語及天寶開元中事群曰安危在出令存亡繫所任玄宗用姚崇宋璟張九齡韓休李元紘杜暹則理用李林甫楊國忠則亂人皆以天寶十五年祿山自范陽起兵是理亂分時臣以為開元二十年罷賢相張九齡專任奸臣李林甫理亂自此巳分矣用人得失所繫非小詞意激切左右為之感動鎛深御之而憲宗終用鎛為宰相又曰李絳為相同列李吉甫便僻善逢迎上意絳梗直多所規諫故與吉甫不協時議者以吉甫通於承璀故絳尢惡之絳性剛訐每與吉甫爭論人多直絳憲宗察絳忠正自立故絳論奏多所允從又曰貞元九年詔宰相以旬秉筆決事初至德中宰相迭秉筆處斷每十月一易及賈耽趙憬陸贄盧邁同平章政事百寮有所關白更相讓不言於是奏議請旬秉筆者出應之其後又請每日更秉其筆迭以應事皆從之又曰李藩拜門下侍郎時王鍔領太原用錢千萬賂貴倖求兼相藩與權德輿在中書有密旨曰王鍔可兼宰相宜即擬來藩遂以筆塗兼相字卻奏上云不可德輿失色曰縱不可宜別作奏豈有以筆塗詔耶曰勢迫矣出今日便不可止日又暮何暇別作奏事果寢又曰韓弘入朝以宣武舊事人多流言其子公武以家財厚賂權幸及多言者班列之中悉受其遺俄而父子俱卒孤孫幼小穆宗恐為厮養竊盜乃令中使至其家閱其宅簿以付家老而簿上具有納賂之所唯於牛僧孺官側朱書曰某月日送牛侍郎物若干不受即付訖穆宗按簿甚悅居無何議命相帝首可僧孺之名又曰李程為相敬宗冲幼好治宮室畋遊無度欲於宮中營新殿程諫曰自古聖帝明王以慈儉化天下陛下在諒闇之中不宜興作願以瓦木迴奉園陵上忻然從之又曰文宗問宰相曰天下何由, WYG: ''}
