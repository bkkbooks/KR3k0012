  - {type: variant, offset: 672, length: 1, content: 第, WYG: 無比唐書曰太宗降手詔曰朕觀前代明王聖主曷常無師傅哉况朕鍾百王之末智不周物其無師傅何以匡朕之不逮詩不云乎不愆不忘率由舊章宜依古道置三師位也通典曰太師古官殷紂時箕子周武王時太公成王時周公並為太師周公薨畢公代之秦及漢初並無至平帝元始元年初置以孔光居焉金印紫綬位在太傅上太傅大戴禮曰傅傅之徳義也天子無恩於父母不惠於庶人無禮於臣不中於折獄不哀於喪不敬於祭不信於諸侯不議於戎事不厚於徳不强於行不從太師之言凡是之属太傅之任也漢書曰王莽權日盛孔光憂懼不知所出上書乞骸骨莽白太后曰帝幼小宜師傅領宿衞明年徙為太師莽為太傅光嘗稱疾不敢與莽並漢書音義曰傅覆也東觀漢記曰詔云行太尉事趙喜三葉在位為國元老其以喜為太傅又曰胡廣為太傅搃録尚書事時年八十而心力克壮繼母在堂朝夕瞻省傍無几杖言不稱老練達事體明解朝章雖無謇直之風屢有補闕之益又曰鄧禹字仲華以元功拜太傅進見東向甚見尊寵後漢書曰張禹遷為太傅鄧太后以殤帝初育育生也欲令重臣居禁内乃詔禹舍宫中給帷帳牀褥大官朝夕進食五日}
