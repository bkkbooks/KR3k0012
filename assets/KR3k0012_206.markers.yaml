  - {type: variant, offset: 672, length: 1, content: 第, SBCK: 無比唐書曰太宗降手詔曰朕觀前代明王聖主曷常無師傅哉况朕鍾百王之末智不周物其無師􅀓何以臣朕之不逮詩不云乎不愆不忘率由舊章冝依古道置三師位也通典曰太師古官殷紂時箕子周武王時太公成王時周公並爲太師周公薨畢公代之􅁗及漢初並無至平帝元始元年初置以孔光居焉金印紫綬位在太􅀓上太傅大戴禮曰傅傅之德義也天子無恩於父母不惠於庶人無禮於大臣不中於折獄不哀於喪不敬於􅀕不信於諸侯不議於戎事不厚於德不強於行不從太師之言凡是之屬太傅之任也漢書曰王莽權曰盛孔光憂懼不知所出上書乞骸骨莽白太后帝㓜小冝師傅領􅀫衛明年徙爲太師莽爲太傅光常稱疾不敢與莽並漢書音義曰􅀓覆也東觀漢記曰詔云行太尉事趙喜三葉在位爲國元老其以喜爲太􅀓又曰胡廣爲太􅀓緫録尚書事時年八十而心力克壯繼母在堂朝夕瞻省傍無几杖言不稱老逹練事體明解朝章雖無謇直之風屢有􅀘闕之益又曰卓茂字子康丗祖即位求茂謁見年七十餘拜太傅封宣德侯賜几杖又曰鄧禹字仲華以元功拜太傅進見東向甚見尊寵後漢書曰張禹遷爲太傅鄧太后以殤帝初育育生也欲令重臣居禁内乃詔禹舎宫中給帷帳牀褥太官朝夕進食五曰}
