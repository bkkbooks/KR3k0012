  - {type: variant, offset: 682, length: 10, content: 書令郭子儀在邠州行營, SBCK: 爲太傅文帝謂欣曰王三爲太傅再爲太師自古人臣未}
  - {type: variant, offset: 682, length: 0, content: '', WYG: 丞侯史光上言祥乆以疾病闕廢朝㑹應免官詔曰太保耆艾元老高行清粹朕所毗倚以隆道𢎞治者也前後遜讓不從所執此非百司所得議也其寝光奏晉起居注曰太保衛瓘明允篤誠有匪躬之志其給千兵騎百人齊職儀殷太甲時伊尹為太保周成王時召公為太保崔鴻十六國春秋蜀李雄録曰雄異母兄始字伯敬為太保善撫士衆衆多歸之時人為之語曰欲養老属太保吕氏春秋曰荆文王得如黄之狗宛路之矰以田於雲夢三月不反得丹陽之姬朞年不聴朝保申曰先王卜以臣為保吉今王朞年不聴朝王之罪當笞王大臣将笞王王曰不糓免於襁褓而齒於諸侯願請變更而無笞保申曰臣承先王之令不敢廢也王不受笞是廢先王之令也臣寧抵罪於先王王曰敬諾引席王伏保申束細箭五十跪而加之于背如此者再謂曰王起王乃變更召保申殺如黄之狗折宛路之矰放丹陽之姬兼國三十九保申之力也太宰周禮天官上曰太宰之職掌建邦之六典佐王治邦國又曰太宰以九兩繫邦國之民兩竊合之言繫者以維持其性情使不離散也尚}
