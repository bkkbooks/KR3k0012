  - {type: variant, offset: 676, length: 5, content: 日潛遣毀坼, SBCK: 位輙置一人録尚書事薨輙省之華嶠後漢書曰鄧彪字智伯爲太傅賜爵􅀜内侯百官揔己以聽於彪恩寵之異莫與爲比焉應劭漢官曰太傅古官也周成王時康叔爲之髙后元年初用王陵金印紫綬又曰和帝􅁽故太尉鄧彪曰元功之族三讓弥髙今以彪爲太傅魏志曰鍾繇遷太傅繇有􅂰疾拜起不便時華歆亦以髙年疾病朝見皆使載輿車虎賁舁上殿就坐是後三公有疾遂以爲故事晉書曰何曽爲太傅乞遜位詔㑹朝劒履乗輿上殿如漢相國蕭何田千秋魏太傅鍾繇故事宋書曰晉宣帝爲魏太傅誅曹爽後置左右長史􅁺屬舎人各十人事旣非常加又領兵非准例也齊職儀曰太傅品秩冠服同太宰成王即位周公爲太傅遷太師􅁗無其職漢惠帝崩吕后以丞相王陵爲少帝太傅位在三公上後魏書淮陽王欣大統}
  - {type: page-break, offset: 676, content: '', id: KR3k0012_SBCK_206-4a}
  - {type: variant, offset: 676, length: 0, content: '', WYG: 位輙置一人録尚書事薨輙省之華嶠後漢書曰鄧彪字智伯為太傅賜爵闗内侯百官搃已以聼於彪恩寵之異莫與為比焉應劭漢官儀曰太傅古官也周成王時康叔為之高后元年初用王陵金印紫綬又曰和帝冊故太尉鄧彪曰元功之族三讓彌高今以彪為太傅魏志曰鍾繇遷太傅繇有膝疾拜起不便時華歆亦以高年疾病朝見皆使載輿車虎賁舁上殿就坐是後三公有疾遂以為故事晉書曰何曽為太傅乞遜位詔㑹朝劒履乘輿上殿如漢相國蕭何田千秋魏太傅鍾繇故事宋書曰晉宣帝為魏太傅誅曹爽後置左右長史掾属舍人各十人事既非常加又領兵非准例也齊職儀曰太傅品秩冠服同太宰成王即位周公為太傅遷太師秦無其職漢惠帝崩吕后以丞相王陵為少帝太傅位在三公上後魏書淮陽王欣大統中為太傅文帝謂欣曰王三為太傅再為太師自古人臣不聞此例欣遜謝而已北齊書曰高歸彦作亂冀州詔段韶與東安王婁叡率衆討平之遷太傅賜女樂十人并歸彦果園一千畆後周書曰王盟為太傅盟姿度𢎞雅仁而汎愛雖位居師傅禮冠羣侯而謙恭自處未常以勢位驕人魏文帝甚尊重之賈誼新書曰昔周文王使太公望傅太子發嗜鮀大河反魚而公弗予文王曰發嗜鮀魚何為弗予太公曰禮鮀魚不登于俎豆豈有非禮而可以養太子哉説林曰太傅府有三才裴邈清才潘陽中大才劉慶孫長才曹植輔臣論曰盖精微聴察理析毫分規矩可則阿保不傾羣言系于口而研覈是非典誥搃于心而唯所用之者鍾太傅也王廙之保傅箴曰保傅之賢明宗國寧輔弼之不忠禍及于躬無曰父子無間昔有潘崇無曰至親無二容江充太保周禮曰保氏掌諫王惡諫者以禮義正之也大戴禮曰天子處位不端受業不敬言語不序聲音不中律進退升降不以禮俯仰周旋不以節凡此之属太保之任也尚書大𫝊曰成王在豐欲宅洛邑使召公来相宅六}
