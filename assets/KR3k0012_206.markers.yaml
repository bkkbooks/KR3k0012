  - {type: variant, offset: 374, length: 264, content: 后嘗召陸元方問以外事對曰臣備位宰相有大事即奏人間碎務不敢以煩聖覽又曰蘇味道遷鳳閣侍郎同鳳閣鸞臺三品味道善敷奏多識臺閣故事然而前後居相位數載竟不能有所發明但脂韋其間茍度取容而巳故時人號為摸稜手以為口實又曰宇文融既居相位欲以天下為巳任謂人曰使吾居此數月庶令海內無事矣於是薦宋璟為右丞相裴耀卿為戶部侍郎許景先為工部侍郎甚允朝廷之望又曰牛仙客既居相位獨潔其身唯諾而巳所有錫賚皆緘封不敢費之百司或有所諮決輒對曰但依令式即可若不依文非所知也又曰開元二十二年十一月制宰相兼官者並兩給俸祿又曰楊綰素以德行著聞質性貞廉車服儉朴居廟堂未數日人心自化, SBCK: 師}
