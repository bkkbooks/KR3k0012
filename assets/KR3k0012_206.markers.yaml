  - {type: variant, offset: 901, length: 3, content: 嫉渾守, WYG: 以安平獻王孚居焉仲長綂昌言曰冢宰堯官也尚書曰冢宰一曰治典以治官府以紀萬民二曰教典以安邦國以教官府以擾萬民三曰禮典以統百官以和邦國以諧萬民四曰政典以平邦國以}
