  - {type: variant, offset: 891, length: 0, content: '', WYG: 受顧命輔成帝時帝幼冲詔羕依安平獻王孚故事設牀帳於殿上帝親迎拜又曰安帝以太宰瑯琊王徳文不宜嬰拂事務以紆論道之重可袞冕紱服緑盭音戾綬羽葆鼓吹盭緑也以緑為質又曰盭草名也出瑯琊平昌縣似艾可染綬因以為綬名也晉公卿禮秩曰安平王孚朗陵公何曽汝南王亮皆為太宰齊職儀曰太宰品第一金章紫綬佩山𤣥玉堯命羲和使主隂陽之職羲和司天即天官也后稷伏事虞夏敬授民時尊稷為天官夏衰稷後不窋失官由是廢稷殷以其官為冢宰周公}
