  - {type: variant, offset: 3095, length: 197, content: 聞兵攻聲恐懼入室閉戶牽被覆頭相攻半日稍敢出面英雄記曰尚栩先人尚子平有道術為縣功曹休歸自入山擔薪賣以食飲會稽典錄曰孫策功曹魏勝以忤意見遣將殺之吳太夫人乃倚大井而語策曰汝新造江南其事未集方當優賢禮士捨過錄功魏功曹在公盡規汝今日殺之則人明日叛汝吾不忍見禍及當先投此井中耳策大驚遽釋勝又曰魏朗字少英上虞人從太守行春寢於閤外感時志激中夜長歎府君朝問昨歎息者誰主簿曰書佐魏朗也府君由是知朗有凌雲之志轉功曹佐, SBCK: ''}
