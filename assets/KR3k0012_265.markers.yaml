  - {type: variant, offset: 987, length: 187, content: 疾不能聽政稜陰代興視事出入二年令無違者又曰廉范永平初隴西太守鄧融備禮謁范為功曹謁請會融為州所舉案舉其罪案驗之范知事譴難解欲以權相濟乃託病求去融不達其意大恨之范於是東至洛陽變名姓求代廷尉獄卒居無幾融果徵下獄范遂得衛侍左右盡心勤勞融怪其貌類范而殊不意乃謂曰卿何以我故功曹耶范訶之曰君困戹瞀亂耶鄭玄注禮記曰瞀目不明之皃語遂絕融繫出困病范隨而養視及死竟不言身自將車送喪致南陽葬畢乃去, SBCK: 朱伯厚}
