  - {type: punctuation, offset: 2762, content: 》, id: KR3k0012_CHANT_265-bkkpn784}
  - {type: variant, offset: 2762, length: 0, content: '', SBCK: 曰山濤字巨源河内人年四十始爲州郡部河南從事又曰劉毅辟爲司州都官從事京邑肅然彈河南尹事司􅀠徐不過曰躩虎之犬鼷䑕蹈其背毅曰旣能躩虎又能殺䑕何損於犬投傳而去晉中興書曰華譚字令思生未朞而父殁母年十八執節養譚弱冠知名􅀭州刺史周俊禮辟署從事史愛其才器以爲賔友陳留􅂄舊傳曰髙愼字孝甫敦質少華口不能劇談嘿而好沉深之謀爲從事號曰卧虎故人謂之嶷然不語名髙孝甫益部􅂄舊傳曰李􅀪字仲元爲州從事楊雄稱之曰不屈其志不累其身不夷不惠可否之間見其貌肅如也觀其行穆如也聞其言戚如也又曰巴郡任文公有道術爲州從事時越嶲欲反州遣五從事案虚實止傳舎食未半有風發案文公起曰當有逆變因促駕去諸從事未能發爲郡兵所殺鍾離意别傳曰楊州刺史夏君三辟意九江從事三府側席夏君見意曰刺史得京師書聞從事有令問刺史何惜王家之爵不貢賢者乃表上尚書李固别傳曰益州及司􅀠辟皆不就門徒或稱從事􅁺固曰未曽受其位不冝獲其号孟嘉别傳曰􅁃亮辟嘉爲勸學從事亮盛脩學斆髙選儒官正旦大㑹禇襃問亮嘉何在亮曰但自覓之褒歴觀之指嘉曰將無是乎亮欣然羅含别傳曰含字君章刺史􅁃􅘙以親賢之重作鎮方岳捜􅀭楚楚匪蘭弗刈仍辟含荆州部從事潜夫論曰孝明帝時荆州舉茂才過闕謝恩賜食旣訖問何異聞對曰巫地有劇賊九人刺史不能得帝曰汝非部郡從事耶對曰是也帝乃振怒曰賊發部中而不能擒何以爲茂才乃捶數百而切讓州郡十日之間賊即伏誅由此觀之擒盗賊在明法不在數赦世􅀃曰顧和爲州從事月旦朝未入停車周侯歴和車邊過和風皃夷然不動周指頋心曰此中何有徐應曰此中最是難測地周人遇丞相曰卿州吏中有令僕才又曰羅含爲宣武從事謝鎮西作江夏使往檢校之羅旣至􅀄不問郡家事乃遥就謝數日飲酒而還桓公問何事羅云未審公謂謝尚是何似人桓公荅仁祖是勝我許人羅云豈有勝公人而有行非者故一無所問桓公竒其意而不責王丞相集教曰丹陽從事陳耽器局弘正可轉主簿吴興從事謝鸞才幹正直可轉西曹中正魏略曰時苗字德胄鉅鹿人也爲太官令領其郡中正定九品至於叙人才不能寛大然紀人之短雖在乆逺衘之不置吴志曰習温爲荆州太平公太平公即州都也後潘秘爲尚書僕射代温爲太平公甚得其譽晉書曰楊晫陶􅋲共載詣顧榮州大中正温雅責晫與小人共載晫曰江州名少風俗卿巳不能養進寒儁且可不毀之楊晫代雅爲大中正舉􅋲爲鄱陽小中正又曰諸􅁑瞻領丹陽宣城新安三郡大中正時中州人士多寓焉又}
