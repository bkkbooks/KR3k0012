  - {type: 'tls:seg', offset: 1343, content: '', id: KR3k0012_CHANT_265-15a.19}
  - {type: variant, offset: 1350, length: 489, content: 資勑曹召署文學史滂不肯聽資怒召功曹書佐朱零問不召頌意狀零以告滂滂曰荅教當言頌則滂之姉子豈不樂其升進但頌洿穢小人不宜染汙朝廷不敢以位私人是以不召零具荅教如此零入聞資使五伯亂捶困杖言辭不懾仰疾言曰范滂清議猶利刃截腐肉願為明府所笞殺不為滂所廢絕今日之死當受忠名為滂所廢永成惡人滂正直謇諤皆此類也又曰許劭仕郡為功曹抗忠舉義進善黜惡正機執衡允齊風俗所稱如龍之升所貶如墮干淵清論風行所吹草偃為眾所服又曰李壽聰明智達有俊才太守黃讜高其名德召署功曹每進見常薦達郡中善人有異行者讜輒序用壽雖見優禮愈隆壽意益下其所致達未嘗伐其功美又曰羊定字世德為郡功曹病困被不覆軀衣不周身郡將賜大布被及襦袴皆不受執志而終又曰鍾皓字季明潁川長社人同郡陳寔年不及皓引與為友皓為郡功曹會辟司徒府臨辭太守問誰可代卿者皓曰明府必欲得其人西門亭長陳寔聞之曰鍾君似不察人不知何猶識我又曰彭脩會稽人仕郡為功曹時西部都尉宰晁行太守事以徵過收吳縣獄吏將殺之主簿鍾離意爭諫甚切晁怒使收縛意脩排閤直入拜於庭曰明府發雷霆於主簿請聞其過晁曰受殺三日初不奉行廢命不忠豈非過耶脩因拜曰昔任座面折文侯朱雲攀毀欄檻自非賢君焉得忠臣遂原意罰貸獄吏袁山松, WYG: 華嶠}
