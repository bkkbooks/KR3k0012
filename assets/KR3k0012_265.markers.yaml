  - {type: variant, offset: 1866, length: 2, content: 功曹, WYG: 貪放刺史第五種欲取之聞羽素抗厲乃召羽問曰聞公不畏強禦今欲相委以重事若何對曰願庶幾於一割羽出遂馳至定陶閉城門収匡賓客親吏四十餘人七日中起發其贓五六千萬即舉奏一州震慄魏志曰賈洪字叔業家貧好學應州辟其}
