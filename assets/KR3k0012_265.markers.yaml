  - {type: 'tls:seg', offset: 1906, content: '', id: KR3k0012_CHANT_265-22a.6}
  - {type: variant, offset: 1907, length: 0, content: '', WYG: 時荆州舉茂才過闕謝恩賜食既訖}
  - {type: variant, offset: 1908, length: 0, content: '', WYG: 何異聞對曰巫地有劇賊九人刺史不能得帝曰汝非部郡從事耶對曰是也帝乃振怒曰賊發部中而不能擒}
  - {type: variant, offset: 1911, length: 2, content: 治寵, WYG: 茂才乃捶數百而切讓州郡十日之間賊即伏誅由此觀之擒賊在明法不在數赦也世說}
  - {type: punctuation, offset: 1912, content: ，, id: KR3k0012_CHANT_265-bkkpn530}
