  - {type: variant, offset: 4090, length: 4, content: 張軌入關, SBCK: 陳以孔奐爲御史中丞領􅀭州大中正晉令宋齊以來爲大都奐清白自守妻子並不之官所得秩俸隨即分贍􅀌寡郡中大恱號曰神君襄陽􅂄舊傳曰晉朝以江表始通人物未悉使江南別立大中正通典曰魏司空陳群以天臺選用不盡人才擇州之才優有昭鑒者除爲中正自較人才銓定九品州郡皆置吴有太平公亦其任也郭子曰孫子荆應上品}
  - {type: page-break, offset: 4090, content: '', id: KR3k0012_SBCK_265-9b}
  - {type: variant, offset: 4090, length: 6, content: 張軌入關拔岳, WYG: 陳以孔奐為御史中丞領揚州大中正晉陵自宋齊以來為大郡奐清白自守妻子並不之官所得秩俸隨即分贍孤寡郡中大恱號曰神君襄陽耆舊傳曰晉朝以江表始通人物未悉使江南别立大中正通典曰魏司空陳羣以天臺選用不盡人才擇州之才優有昭鑒者除為中正自抜人才銓定九品州郡皆置吳有大公平亦其任也郭子曰孫子荆應上品㧞王武子時為大中正謂訪問址人非卿莫能㧞可自為之目曰天才英雄亮㧞不羣傅子曰魏司空陳羣始立九品之制郡置中正平次人才之髙下各為階目州置州都而總其察議晉宣帝除九品州置大中正議曰案九品之状諸中正既未能料䆒人才}
  - {type: page-break, offset: 4090, content: '', id: KR3k0012_WYG_265-15b, image: WYG0895/WYG0895-0379d.png}
