  - {type: variant, offset: 3293, length: 636, content: 旦與掾史上朝時功曹吏顧翕披裘以加朝服朗以裘非臣服非翕不敬勑卒撤去翕恚而不聽以手歐卒朗右手鳴鼓左手撤裘以聞府君曰朗當朝正色有不撓之節遂退翕以朗代之朗辭病不就又曰魏徽字孔章仕郡為功曹史府君貴其名重徽每拜謁常跪而待之華陽國志曰公孫述入蜀蜀郡拒守述功之功曹朱尊絆馬死戰光武帝嘉之又曰李業字臣遊廣漢梓橦人少執志清白太守到咸慕其名召為功曹十命不詣又曰朱倉字雲卿下邳人少受學於蜀郡張寧飡豆屑飲水同業憐其貧資給米肉不受家貧常以步行為郡功曹鍾岏良吏傳曰桓虞字仲春馮翊萬年人也為南陽郡守下車聞葉縣雍昱及新野令不遵法度選督郵不能正乃署趙勤為督郵到葉昱即解印綬入新野新野令聞昱已去遣吏奉記陳罪亦即棄官虞乃歎曰善吏如良膺下韝即中擢為功曹委以郡事豫章列士傳曰華茂為功曹病被不覆軀布衣不周身郡將與大布被袴皆不受汝南先賢傳曰袁閬字奉高為功曹辟太尉掾太守唐珍曰今君當應宰府宜選功曹以自代因薦陳仲舉珍即請蕃為功曹又曰新蔡鄭敬字次都為郡功曹都尉高懿廳事前槐樹有露類甘露者懿問掾屬皆言是甘露敬獨曰明府政未能致甘露但樹汁耳懿不悅託疾而去又曰許慎為功曹奉上以篤義率下以恭寬荊州先德傳曰周瑜領南郡以龐士元名重州里所信乃逼為功曹任以大事瑜垂拱而已鍾離意別傳曰意字子阿會稽山陰人也太守竇翔召意署功曹史意乃為府立條式威儀嚴肅莫不靖恭後日竇君與意相見曰功曹須立嚴科太守觀察朝晡吏無大小莫不畏威陳寔別傳曰寔字仲弓頴川許人也為郡功曹時中常侍侯覽託太守高倫用吏倫教署文學掾寔知非其人乃懷撽請見乞從外署倫從之於是卿論怪其非舉倫後被徵為, SBCK: 􅀜}
