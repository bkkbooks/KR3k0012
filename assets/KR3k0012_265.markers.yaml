  - {type: variant, offset: 138, length: 3, content: 趙勤南, SBCK: 周喜仕郡爲主簿王莽末群賊入汝陽城喜從太守何敞討賊爲流矢所中謂賊衆曰卿曹皆民􅀠也豈有還害其君者耶喜請以死贖君命因仰天號泣賊於是相視曰此義士也給其車馬遣送之後漢書曰朱儁㑹稽人也太守尹端以儁爲主簿熹平二年端坐討賊許昭失利爲州所奏罪應弃市儁乃羸服閒行輕賫數百金到京師賂主章吏還得刋定州奏故端得輸作左校端喜於降免而不知其由儁亦終無所言魏志曰盧毓字子家涿郡人也崔琰舉爲兾州主簿時天下草創多逋逃故重士亡法罪及妻子亡士妻白等始適夫家數日皆未與夫相見大理奏弃市毓駮之曰夫女子之情以接見而恩生成婦而義重故詩曰未見君子我心傷悲亦旣見止我心則夷又禮未廟見之婦而死即葬女氏之黨以未成婦也今白等生有未見之悲死有非婦之痛而吏議欲肆之大辟􅀂同牢合􅈟之後罪何所加卺音謹且記曰附從輕言附人之罪以輕者爲比也又書云與其殺不辜寧失不經恐過重也茍以白等皆受禮聘巳入門庭刑之爲可殺之爲重太祖曰毓之所執是也又引經典有意使􅀌歎息又曰龐㳙字子異太守徐揖請爲主簿後郡人黄昂反圍城㳙弃妻子夜踰城圍告急於張掖燉煌二郡􅀄疑未發兵㳙欲伏劒二郡感其義遂興兵軍未至而郡邑以䧟陣死㳙乃收歛揖喪送還本郡行服三年乃還又曰崔林字德孺清河人少時晚成宗族莫知唯從兄琰異之太祖定兾州擢爲州主薄蜀志曰杜微字國輔梓潼涪人丞相領益州牧以微爲主簿微固辭輿而致之旣至亮引而微自陳謝亮以微不聞人言於座上作書與之吴録曰苞咸字子良爲郡主簿太守黄君行春留咸守郡君縁棲採雀􅆑咸責數以春月不冝破􅆑杖之三十王隱晉書曰陶􅋲字士衡鄱}
