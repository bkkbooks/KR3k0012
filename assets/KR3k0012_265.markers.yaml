  - {type: variant, offset: 1914, length: 3, content: 臣任功, WYG: 顧和為州從事月旦朝未入停車周侯厯和車邊過和風貌夷然不動周指顧心曰此中何有徐應曰此中最是難測地周入遇丞相曰卿州吏中有令僕才又曰羅含為宣武從事謝鎮西作江夏使往檢校之羅既至初不問郡家事乃遙就謝數日飲酒而還桓公問何事羅云未審公謂謝尚是何似人桓公答仁祖是勝我許人羅云豈有勝公人而有行非者故一無所問桓公竒其意而不責王丞相集教曰丹陽從事陳耽器局𢎞正可轉主簿吳興從事謝鸞才幹正直可轉西}
