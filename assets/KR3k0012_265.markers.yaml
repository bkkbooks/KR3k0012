  - {type: variant, offset: 206, length: 0, content: '', WYG: 韋朏字尊顯少有志業年十八辟州主簿時屬嵗儉朏以家粟造粥以餌飢人所活甚衆又曰杜暹補婺州叅軍秩滿将歸州吏以紙萬餘張以贈之暹唯受一紙餘者悉還之時州寮别者見而歎曰昔清吏受一大錢復何異也唐書曰顔杲卿以廕授官性剛直有吏幹開元中為魏州録事叅軍振舉綱目政稱第一三輔决録曰韋元将年十五身長八尺五寸為郡主簿}
  - {type: page-break, offset: 206, content: '', id: KR3k0012_WYG_265-6a, image: WYG0895/WYG0895-0375a.png}
  - {type: variant, offset: 207, length: 0, content: '', WYG: 彪稱曰韋主簿年雖少有老成之風昻昻千里之駒陳留耆舊𫝊曰戴斌為郡主簿送故將䘮歸鄉里蠡吾里人距之孝子臣吏脫絰叩頭求哀終不見聴斌乃投絰放縗操手劍瞋目厲聲距踊而前曰哭不哀者郎君也䘮車不前者戴斌也里人服其義乃内之廣陵列士𫝊曰劉雋為郡主簿郡将為賊所得雋知言辭不能動賊因叩頭流血乞得代之賊不聴前砍府君雋因投身䕶之}
  - {type: page-break, offset: 207, content: '', id: KR3k0012_WYG_265-6b, image: WYG0895/WYG0895-0375b.png}
  - {type: variant, offset: 208, length: 0, content: '', WYG: 與刃㑹斫左肩瘡尺餘賊又欲更下刃雋號呼抱持不置賊因相謂曰此義士殺之不祥遂俱縱遣黄義仲交廣二州記曰合浦之士有尹牙}
