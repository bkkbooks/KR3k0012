  - {type: variant, offset: 1890, length: 35, content: 陳寵為廣漢太守風聲大行徵為大司農帝問何以為治寵曰臣任功曹王渙渙由是知名, SBCK: 願庻幾於一割羽出遂馳至定陶閉城門收匡賔客親吏四十餘人七日中起發其贓五六千萬種即舉奏一州震慄}
  - {type: variant, offset: 1890, length: 35, content: 陳寵為廣漢太守風聲大行徵為大司農帝問何以為治寵曰臣任功曹王渙渙由是知名, krp: 願庻幾於一割羽出遂馳至定陶閉城門收匡賔客親吏四十餘人七日中起發其贓五六千萬種即舉奏一州震慄}
  - {type: variant, offset: 1895, length: 2, content: 太守, WYG: 王累自倒懸於門以諫璋無所納又曰馬謖字幼常以荆州從事隨先主入蜀材力過人好論軍計又曰譙周字允南身長八尺體貎素朴推誠不飾無造次辨論之方然潜識内明建興中丞相亮領益州牧命周為建學從事王隐晉書曰山濤字巨源河内人年四十始為州郡部河南從事又曰劉毅辟為司州都官從事京邑肅然彈河南尹事司𨽻不許曰躩虎之犬鼷䑕蹈其背毅曰既能躩虎又能殺䑕何損於犬投傳而去晉中興書曰華譚字令思生未期而父殁母年十八執節養譚弱冠知名揚州刺史周俊禮辟署從事史愛其才器以為賓友益都耆舊傳曰李𢎞字仲元為州從事揚雄稱之曰不屈其志不累其身不夷不恵可否之間見其貌肅如也觀其行穆如也聞其言戚如也陳留耆舊傳曰髙慎字孝甫敦質少華口不能劇譚嘿而好深沉之謀為從事號曰卧虎故人謂之嶷然不語高孝甫又曰巴郡任文公有道術為州從事時越嶲欲反州遣五從事案虛實止𫝊舍食未半有}
