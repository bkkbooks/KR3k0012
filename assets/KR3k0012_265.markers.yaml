  - {type: variant, offset: 4404, length: 372, content: 子皆至刺史太守兩漢有決曹賊曹掾主刑法歷代皆有或謂之賊曹或為法曹又曰郭弘為潁川郡決曹掾治獄至四十年用法平正郡內比之東海于公隋書曰陳孝意為會郡司法書佐太守蘇威欲殺一囚固諫不許乃解衣請先受死乃止後至侍御史汝州刺史五官掾後魏書曰王尊字子贛涿郡人為安定太守出教曰五官掾張輔懷虎狼之心貪汙不軌一郡之錢盡入輔家適足以葬矣遂將輔送獄直府史詣閤下從太守受其事輔繫獄數日死東觀漢記曰黃香江夏安陵人也父况為郡五官舉孝廉貧無奴僕香躬勤左右苦暑乃扇床枕冬以身溫席又曰桓帝時白馬令李雲坐直諫繫獄弘農五官掾杜眾傷其忠直獲罪上書願與雲俱得死遂俱死獄中後漢書曰諒輔字漢儒仕郡為五官掾夏大旱太守自祈禱無應輔乃自曝庭中祝曰輔為股肱不能進諫納忠薦賢退惡和調陰陽承順天意乃積薪以自環構火其旁曰若日中不雨將自焚未日中而澍雨也臧榮緒晉書曰范略字彥長南陽順陽人少遊學清河遂徙家僑居郡命為五官掾, SBCK: ''}
