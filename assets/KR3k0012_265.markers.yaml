  - {type: variant, offset: 1898, length: 1, content: 聲, WYG: 發案文公起曰當有逆變因卒駕去諸從事未能發為郡兵所殺鍾離意别𫝊曰揚州刺史夏君三辟意九江從事三府側席夏君見意曰刺史得京師書聞從事有令聞刺史何惜王家之爵不貢賢者乃表上尚書李固别傳曰益州及司𨽻辟皆不就門徒或稱從事掾固曰未曽受其位不宜獲其號孟嘉别傳曰庾亮辟嘉為勸學從事亮盛修學斆髙選儒官正旦}
  - {type: page-break, offset: 1898, content: '', id: KR3k0012_WYG_265-11a, image: WYG0895/WYG0895-0377c.png}
  - {type: variant, offset: 1900, length: 6, content: 行徵為大司農, WYG: 㑹褚裒問亮嘉何在亮曰但自覓之裒厯觀之指嘉曰將無是乎亮欣然羅含别𫝊曰含字君章刺史庾廙以親賢之重作鎮方岳搜揚荆楚匪蘭弗刈仍辟含荆州部從事潜夫論曰孝明}
  - {type: page-break, offset: 1900, content: '', id: KR3k0012_WYG_265-11b, image: WYG0895/WYG0895-0377d.png}
