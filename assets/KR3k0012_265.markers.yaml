  - {type: variant, offset: 145, length: 0, content: '', WYG: 趙廞甚噐之嘗問京貴郡何以名武陵京曰鄙郡本名義陵在辰陽縣界與夷相接數為所攻光武時移東出遂得全完共議易號𫝊曰止戈為武詩稱高平曰陵於是名焉為州所辟因謁見問筞探得不孝字刺史戲京曰辟士為不孝耶舉板答曰今為忠臣不得復為孝子其機辯皆如此類又曰易雄長沙瀏陽人也仕郡為主簿張昌之亂執太守萬嗣欲斬之雄與賊争論曲直賊怒叱使牽雄斬之雄顔色自若賊人又呼之雄論如初如此者三賊乃並嗣捨之又曰潘京武陵人也郡辟為主簿後太廟立州郡皆遣使賀京白太守曰夫太廟立移神主應問訊不應賀遂遣京作文使詣京師以為永式又曰習鑿齒字彦威為}
  - {type: page-break, offset: 145, content: '', id: KR3k0012_WYG_265-4b, image: WYG0895/WYG0895-0374b.png}
  - {type: variant, offset: 146, length: 2, content: 虞召, WYG: 温荆州主簿親遇隆宻時語曰徒三十年看儒書不如一詣習主簿也宋書曰王思遠宋建平王景素辟南徐州主簿深見禮遇景素被誅左右離散思遠親視殯𦵏手種松栢與廬江昌寓上表理之事感朝廷景素女廢}
