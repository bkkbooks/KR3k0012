  - {type: variant, offset: 369, length: 0, content: '', SBCK: 彦威爲桓温荆州主簿親遇隆宻時語曰徒三十年看儒書不如一詣習主簿也宋書曰王思逺宋建平王景素辟南徐州主簿深見禮遇景素􅀍誅左右離散思逺親視殯葬手種松栢與廬江何昌㝢上表理之事感朝廷景素女廢爲庶人思逺分衣食以相資贍年長爲備笄緫訪求偶對傾家送遣三國典略曰梁李膺字公胤廣漢人也西昌侯藻爲益州以爲主簿使至建康梁武恱之謂曰卿何如昔日李膺對曰勝問其故對曰昔事桓靈之主今逢堯舜之君梁武嘉其對以如意擊席者乆之後魏書曰裴安祖弱冠州辟主簿民有兄弟争財詣州相訟安祖召其弟兄以禮義責讓之此人兄弟明日相率謝罪郡内欽服之又曰韋朏字尊顯少有志業年十八辟州主簿時属歳儉朏以家粟造粥以餌飢人所活甚衆唐書曰顔杲卿以䕃受官性剛直有吏幹開元中爲魏州録事參軍振舉綱目政稱第一又曰杜暹􅀘婺州參軍秩滿將歸州吏以􅁓萬餘張以贈之暹唯受一百畨餘悉還之時州寮別者見而嘆曰昔清吏受一}
  - {type: page-break, offset: 369, content: '', id: KR3k0012_SBCK_265-3b}
