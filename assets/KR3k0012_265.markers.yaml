  - {type: variant, offset: 4147, length: 6, content: 陸績李郃皆仕, SBCK: 臣聞用治理者以官才爲夲官才有三難而治亂之所由人物難知一也愛憎難防二也情僞難明三也今立中正定九品操人主之威福奪天朝之權柄上品無寒門下品無勢族今職名中正實爲姦府事名九品而有八損冝罷中正除九品弃魏弊法更立一代之美制荀勗集曰􅀽讓豫州大中正曰􅀍勑以臣爲豫州大中正臣與州閭郷黨􅀄不相接臣本州十}
  - {type: variant, offset: 4147, length: 6, content: 陸績李郃皆仕, WYG: 臣聞用治理者以官才為本官才有三難而治亂之所由人物難知一也愛憎難訪二也情偽難明三也今立中正定九品操人主之威福奪天朝之權柄上品無寒門下品無勢族今職名中正實為姦府事名九品而有八損宜罷中正除九品棄魏弊法更立一代之美制荀朂集表讓豫州大中正曰被勅以臣為豫州大中正臣與州閭鄉黨初不相接臣本州十}
