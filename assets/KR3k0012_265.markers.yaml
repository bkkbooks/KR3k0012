  - {type: variant, offset: 138, length: 3, content: 趙勤南, WYG: 周喜仕郡為主簿王莽末羣賊入汝陽城喜從太守何敞討賊為流矢所中謂賊衆曰卿曺皆民𨽻也豈有還害其君者耶喜請以死贖君命因仰天號泣賊於是相視曰此義士也給其車馬遣送之後漢書曰朱儁㑹稽人也太守尹端以儁為主簿熹平二年端坐討賊許昭失利為州所奏罪應棄市儁乃羸服間行私齎數百金到京師賂主章吏還得刋定州奏故端得輸作左校端喜於降免而不知其由儁亦終無所言魏志曰盧毓字子家涿郡人也崔琰舉為冀州主簿時天下草創多逋逃故重士亡法罪及妻子亡士妻白等始適夫家數日皆未與夫相見大理奏棄市毓駮之曰夫女子之情以接見而恩生成婦而義重故詩曰未見君子我心傷悲亦既見止我心則夷又禮未廟見之婦而死歸葬女氏之黨以未成婦也今白等生有未見之悲死有非婦之痛而吏議欲肆之大辟若同牢合卺之後罪何所加􅈟音謹且記曰附從輕言附人之罪以輕者為比也又書云與其殺不辜寧失不經恐過重也苟以白等皆受禮聘已入門庭刑之為可殺之為重太祖曰毓之所執是又引經典有意使孤歎息又曰龎淯字子異太守徐楫請為主簿後郡人黄昻反圍城淯棄妻子夜踰城圍告急於張掖燉煌二郡初疑未發兵淯欲伏劍二郡感其義遂興兵軍未至而郡邑已䧟楫死淯乃收斂楫喪送還夲郡行服三年乃還又曰崔林字德儒清河人少時晚成宗族莫知唯從兄琰異之太祖定冀州擢為州主簿蜀志曰杜微字國輔梓潼涪人丞相領益州牧以㣲為主簿㣲固辭輿而致之既至亮引見而㣲自陳謝亮以微不聞人言於座上作書與之吴録曰荀咸字子良為郡主簿太守黄君行春留咸守郡郡掾吏採雀卵咸責数以春月不宜破卵杖之三十王隐晉書曰陶侃字士行鄱}
