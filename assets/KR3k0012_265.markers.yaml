  - {type: variant, offset: 143, length: 4, content: 太守桓虞, SBCK: 爲郡主簿夫人病欲使主簿迎醫於數百里天大寒雪各辭疾}
  - {type: page-break, offset: 143, content: '', id: KR3k0012_SBCK_265-2b}
  - {type: variant, offset: 143, length: 0, content: '', WYG: 為郡主簿夫人病欲使主簿迎醫于数百里天大雪人各辭疾召侃使行侃曰資於事父以事君夫人亦當父母安有父母病而不急迎醫者乎晉書曰潘京字世長武陵漢夀人也弱冠郡辟主簿}
