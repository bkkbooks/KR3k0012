  - {type: variant, offset: 9, length: 2, content: 周書, WYG: 足四翼蜚翔乎天地之間求蚊䖟而食之待甘露而飲之自以為無患不知五尺童子以竹竿加之乎四仞之上而下為蟲蟻食青蛉猶其小者黄雀俛啄白粒仰棲茂樹鼓其翼奮其翅自以為無患與民無爭不知公子王孫左抱彈右攝丸晝遊乎茂樹而夕和乎酸鹹黄雀猶其小者鴻鵠嬉游乎江湖修其六翮一舉千里自以為無患與民無爭不知弋者撰其弓矢修其防翳故朝遊乎江湖而暮調乎鼎爼鴻鵠猶其小者蔡侯之事又是也蔡侯南遊乎髙陵北經乎巫山嬉遊乎商蔡之囿不以國家為事不知子發受命靈王繼以朱絲也蔡侯之事猶其小者今君王之事又是也君王左州侯右夏侯從新安君與夀陵君滛行康樂遊娯馳騁不知穰侯方與秦王謀投之乎黽塞之外襄王大懼形體掉慄}
