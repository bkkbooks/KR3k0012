  - {type: punctuation, offset: 2082, content: 「, id: KR3k0012_CHANT_457-bkkpn598}
  - {type: variant, offset: 2082, length: 268, content: 齊景公遊於海上而樂之六月不歸令左右曰敢有先言歸者致死不赦顏燭趍進諫曰君樂治海上而六月不歸彼儻有治國者君且安得樂此海也景公援戟將斬之顏燭進撫衣待之曰君奚不斫也昔者桀殺關龍逢紂殺王子比干君之賢非比二主也臣之材亦非比二子也君奚不斫以臣參此二人者不亦可乎景公說遂歸中道聞國人謀不內矣又曰吳王欲伐荊舍人少孺子欲諫不敢則懷丸操彈遊於後囿露沾其衣王曰何沾衣如此對曰榆上有蟬高居而鳴不知螳蜋在其後螳蜋欲取蟬不知黃雀在其傍黃雀延頸欲啄螳蜋而不知彈丸在其下臣欲彈雀不知露沾衣如此三者皆務欲得其利而不顧其後患也王曰善哉乃罷兵又曰晉平公好樂多其賦歛不治城郭敢有, SBCK: 七}
