  - {type: variant, offset: 2352, length: 981, content: 死國人憂之有咎犯者見門大夫曰臣聞主君好樂故以樂見門大夫入言晉人咎犯欲以樂見平公曰內之止坐殿上則出鍾磬竽瑟坐有頃平公曰客子為樂咎犯對曰臣不能為樂臣善隱平公召隱士十二人咎犯曰隱臣竊願昧死御平公曰諾咎犯申其左臂而詘五指平公問於隱官曰占之為何隱官皆曰不知平公歸之咎犯則申其一指曰是一也便游赭畫而後城門二也柱梁衣繡士民無褐三也侏儒有餘酒而死士渴四也民有饑色而馬有粟秣五也近臣不敢諫遠臣不得達平公曰善乃屏鍾鼓除竽瑟遂與咎犯治國又曰枚乘上書諫吳王曰福生有基禍生有胎納其基絕其胎禍何從來哉泰山之溜穿石殫極之綆斷幹水非石之鑽繩非木之鋸也漸摩使之然夫銖銖而稱之至石必差寸寸而度之至丈必過石稱丈量徑而寡失十圍之木始生於孽可分而絕可擢而拔據其未生先其未形磨礲砥礪不見其損有時而盡種樹畜長不見其益有時而大積德循行不知其善有時而用棄義背理不知其惡有時而亡臣乘願大王熟計而身行之此百王不易之道吳王不聽卒死丹徒又曰晉靈公造九層臺費用千億謂左右曰敢有諫者斬荀息聞之上書求見靈公張弩持矢見之謂曰子欲諫耶息曰不敢諫也臣能累十二博碁加九雞子其上公曰子為寡人作之息即正顏色定志意以碁子置下加九雞子其上左右慴息靈公扶伏氣息不續公曰危哉危哉息曰是不危也復有危於此者公曰願復見之息曰九層之臺三年不成男不得耕女不得織國有空虛鄰國謀議將欲興兵社稷亡滅君欲何望靈公曰寡人之過乃止於此即壞九層之臺又曰秦始皇時侯生諫始皇望見侯生大怒侯生曰陛下之淫萬萬丹朱而千千桀紂臣恐陛下之千亡曾不一存始皇嘿然久之曰汝何不蚤言侯生曰陛下之自賢自健上侮五帝下陵三王棄毒撲就末伎陛下徵見久矣臣等恐言之無益而自為取死也故逃而不敢言又曰楚莊王伐陽夏師久而不罷群臣欲諫而不敢莊王獵於雲夢椒舉諫曰所以多得獸者馬也而廢王國亡王之馬豈可哉王曰善不穀之屈強國之可以長諸侯也知得地可以為富也亡其民之不用也明日飲諸大夫酒椒舉為上客罷陽夏之師晏子春秋曰景公為長庲音來舍也將欲美之有風雨作公與晏子入坐飲酒致堂上之樂酒酣晏子作歌曰穗兮不得穫秋風至兮草零落風雨之拂煞之靡弊之歌終顧而流涕張掖而儛公止之曰今日夫子有賜譏寡人之罪遂廢酒罷役又曰齊景公使人養所愛馬暴病死景公怒令人持刀欲煞養馬者是時晏子侍前左右執刀而進晏子止之而問古者堯舜支解人從何體始公懼然曰從寡人始遂止不支解公曰以屬獄晏子曰請數之使自知其罪然後煞之獄公曰可晏子數之曰爾有罪三公使汝養馬汝煞之當死罪一又煞公, SBCK: 東方朔}
