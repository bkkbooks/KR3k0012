  - {type: variant, offset: 3720, length: 436, content: 年矣事未大濟者神明未至也請致五帝以明君德景公再拜稽首楚巫曰請巡國郊以觀帝位至於牛山而不敢登曰五帝之位在於國南請齊齊具而後登之公命百官供齊具裔款視事晏子聞之而見於公曰古者不慢行而繁祭不輕身而恃巫今政亂而行辟棄賢而用巫帝王之在身也而求帝王不亦難乎又曰景公射鳥野人駭之公怒令吏誅之晏子曰野人不知也臣聞之賞無功謂之亂罪不知謂之虐兩者先王之禁也公曰善自爾以來未有鳥獸之禁又曰景公為巨冠長衣以聽朝日晏不罷晏子進曰日晏矣君脫服就晏公曰諾寡人受令退朝遂去衣冠不復服也蕭方等三十國春秋曰秦王符堅懸珠簾於正殿以朝群臣宮宇服御物極珍飾之奇尚書金部郎裴元略諫曰願陛下遵采椽之不斲鄙瓊室而不居堅笑曰非卿之忠朕何由聞過乎趙曄吳越春秋曰吳王既煞子胥問太宰曰子胥數以越諫遂以喪身從死以來若有所亡今欲祠之何日可也曰三月癸未可也及夫差出國祠子胥江水之濱乃言曰寡人昔日不聽相國之言至令相國遠投江海自亡司馬彪九州春秋曰曹公征孫權參軍傅幹諫曰今未承王命者吳與蜀也唯明公思虞舜舞干戚之義全威養德以道制勝公不從軍遂無功, SBCK: ''}
