  - {type: variant, offset: 3344, length: 219, content: 一馬之故而煞人百姓聞之必怨吾君諸侯聞之必輕吾國汝煞公馬使公怨積於百姓兵弱於鄰國汝當死罪三令以屬獄公喟然曰赦之又曰景公築路寢之臺三年未息而又為鄒之長塗晏子諫公斬板而去之又曰景公有愛槐令吏謹守之令犯槐者刑傷槐者死有不聞令過而犯之者將加罪焉晏子諫曰嬰聞窮人財力以從嗜欲謂之暴崇玩好威嚴謂之逆形煞不稱謂之賊三者守國之大殃也君饗國德行未見於民而三辟著於國嬰恐其不可以蒞國子人也公曰善出犯槐之囚晏子曰景公畋於署梁十有八日而不返晏子伯自往見公比至衣冠不, SBCK: ''}
