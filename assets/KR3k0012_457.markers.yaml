  - {type: variant, offset: 1958, length: 1, content: 民, SBCK: 今元正御節是萬物萌育之始豈可亡温養之德而爲逆害之道乎呉主省板即爲迴駕虞溥江表傳曰孫權以鄭衆爲郎中甞與之言卿好於衆中面諫或失禮敬寧不畏龍鱗乎對曰君明臣直朝廷與下無諱實恃洪恩不畏龍鱗諌木頋子曰昔梁丘據之諫景公也於房晏嬰之諫景公也於朝然晏嬰之忠著於竹素梁丘之佞于今不絶亦爲公平正直者聖賢之所先矣宫殿甲漢書楊雄甘泉賦曰甘泉夲因􅁗離宫旣奢泰而武帝復増通天髙光迎風觀且其爲巳乆矣非成帝所造欲諫則非時欲嘿則不能巳故遂推而隆之乃上比於帝室紫宫􅀂曰此非人力之所爲儻􅄦神可也何晏表諫魏齊王曰臣晏言臣聞善爲國者必先治其身慎其所習季末闇主不知損益亂生近昵譬之社䑕崔駰與竇憲牋曰主簿崔駰言今旦漢陽太守積吏卒數十人皆臂鷹牽狗陳於道側云欲上幕府駰聞傳曰禽獸之皮不足以備器用其肉}
