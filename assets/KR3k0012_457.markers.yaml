  - {type: variant, offset: 3564, length: 148, content: 不革衣冠望游而馳公望見晏子曰何其遽國家得無故乎晏子對曰國人皆以君安於野不安於國好獸而惡民公曰寡人之有子猶心之有四支也心有四支故心得佚焉豈不可哉晏子對曰嬰聞之與君言異乃若心之有四支而心得佚焉則可今四支無心也十有八日矣不亦久乎公于是罷田歸又曰楚巫徵道裔款以見景公侍坐三日景公說之楚巫曰公明神之主帝王之, SBCK: ''}
