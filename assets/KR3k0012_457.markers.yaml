  - {type: variant, offset: 1645, length: 0, content: '', SBCK: 必喪呉􅀂燕􅁗齊晉山處陸居豈能踰五湖九江越十地以有呉哉今將輸之粟是長仇讎財匱民怨悔無及也殺諌􅁃符子曰龍逢進諌桀曰臣甞觀君之冕非其冕也而冕危石君之履非其屨也而屨春冰未有冠危石而不壓踰春冰而不䧟者也桀乃􅀏而應之曰子且就炮烙之刑龍逢布武而趨赴火而死桓氏要論曰易曰}
