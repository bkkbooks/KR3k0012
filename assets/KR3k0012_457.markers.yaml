  - {type: variant, offset: 8, length: 3, content: 六周書, SBCK: 七白虎通}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 七白虎通曰諫間也更也是非相間革更其行也又曰闚諫者禮也視君顔色不悅且却悅者復前以禮進退之又曰士不得諫者士賤不得豫政諫及之得因盡其禮傳曰大夫進諫士傳民語妻得諫夫者夫妻一體榮辱共之詩曰相䑕有皮人而無儀人而無儀不死胡為此妻諫夫之詩子諫父父不從不得去者父子一體無相離之性猶火去木而滅劉向新序曰魯哀公為室而大公儀子諫哀公毁室而止又曰莊辛諫楚襄王曰君王左州侯右夏侯從新安君與夀陵君同軒淫衍侈靡而亡國政郢其危矣王曰先生者惽歟妄為楚國祓歟對曰臣非敢為楚祓誠見之也不出十月十月王果亡失江漢鄢郢之地新序曰楚王亡失江漢鄢郢之地乃使召莊辛辛曰庻人有稱曰亡羊而補牢不為遲見兔而呼狗不為晩湯武以百里王桀紂以天下亡今國雖小絶長繼短以千里數且君王獨不見夫青蛉乎}
