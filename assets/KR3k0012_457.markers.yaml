  - {type: variant, offset: 1362, length: 1, content: 任, SBCK: 夢見日夫竈一人􅌆焉則後人無從見矣今或者一人􅌆君乎則臣雖夢見竈不亦可乎公曰善遂去雍鉏退子瑕而用司空狗臺甲孔叢子曰陳惠侯大城因起陵陽之臺未終而坐法死者數千人欲坑三􅁥吏煞之夫子適見陳侯與登臺而觀焉夫子曰美哉斯臺自古聖王爲城未見不戮一人而能功􅀂此者也陳侯黙然而退遽竊赦所坑吏旣而見夫子問曰昔周作靈臺亦戮人乎荅曰文王之興附者六州六州之衆各以子來區區之臺未及期月而旣成矣何戮之有夫以少少之衆能立矣大大之功唯君耳又曰齊王行車裂之刑羣臣諫爭之弗聽子髙見齊王曰車裂之刑無道之刑也而君行之臣竊以爲下吏之過也齊王曰謹聞命遂除車裂又曰智伯欲伐仇由而道難不通乃鑄大鍾遺仇由仇由君恱除道將内之赤章㬅支諫曰不可此小之所以}
  - {type: page-break, offset: 1362, content: '', id: KR3k0012_SBCK_457-5a}
  - {type: variant, offset: 1362, length: 1, content: 任, WYG: 夣見竈夫竈一人煬焉則後人不能見矣今者一人煬君乎則臣雖夣見竈不亦可乎公曰善遂去癰疽退子瑕而用司空狗臺甲孔叢子曰陳恵侯大城因起陵陽之䑓未終而坐法死者數十人欲坑三監吏殺之夫子適見陳侯與登臺而觀焉夫子曰美哉斯臺自古聖王之為城臺未有不戮一人而能致功若此者也陳侯黙然而退遽竊赦所坑吏既而見夫子問曰昔周作靈臺亦戮人乎答曰文王之興附者六州六州之衆各以子道來故區區之臺未及期日而已成矣何戮之有乎夫以少少之衆能立大大之功惟君爾又曰齊王行車裂之刑羣臣諫争之弗聽子髙見齊王曰車裂之刑無道之刑而君用之臣竊以為下吏之過也齊王曰謹聞命遂除車裂又曰智伯欲伐􅄷由而道難不通乃鑄大鍾遺􅄷由􅄷由君悦除道將内之章晏謂曰不可此小之所以}
