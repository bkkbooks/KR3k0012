  - {type: variant, offset: 2600, length: 1, content: 寒, SBCK: 石季龍於氷井臺藏冰三伏之月以冰賜大臣荆楚歳時記曰六月伏日並作湯餅名爲辟惡宋玊􅀇謨壽陽記曰明義井三伏之日炎暑赫曦男女行來其氣短急望見義井則喜不可言未至而憂旣至而樂號爲歡樂井世􅀃曰郗嘉賔三伏之日詣謝公炎暑熏赫復當風交扇猶沾汗流離謝著故絹衣}
  - {type: page-break, offset: 2600, content: '', id: KR3k0012_SBCK_031-5b}
  - {type: variant, offset: 2600, length: 64, content: 寒食三日作醴酪又煮粳米及夌為酪擣杏仁煮作粥案玉燭寶典今日悉為大夌粥研杏仁為酪別餳沃之又孫楚祭子推文云黍飯一盤醴酪二盂是其事也又曰, WYG: ''}
  - {type: variant, offset: 2600, length: 1, content: 寒, krp: 石季龍於氷井臺藏冰三伏之月以冰賜大臣荆楚歳時記曰六月伏日並作湯餅名爲辟惡宋玊玄謨壽陽記曰明義井三伏之日炎暑赫曦男女行來其氣短急望見義井則喜不可言未至而憂旣至而樂號爲歡樂井世說曰郗嘉賔三伏之日詣謝公炎暑熏赫復當風交扇猶沾汗流離謝著故絹衣}
  - {type: variant, offset: 2602, length: 0, content: '', SBCK: 熱白粥晏然無異郗謂謝公曰非君幾不堪此崔寔四民月令曰􅀄伏薦麥􅀲於祖禰也風俗通曰漢中巴蜀自擇伏日俗􅀃漢中巴蜀廣漢土地温暑草木蚤生晚枯氣異中國夷狄畜之故令自擇伏日也謹案漢書髙帝分四都之衆用良平之䇿還定三秦席卷天下盖君子所因者夲也論㓛定封加以金帛重復寵異令自擇伏日不同於風俗也書儀曰六月}
  - {type: page-break, offset: 2602, content: '', id: KR3k0012_SBCK_031-6a}
  - {type: variant, offset: 2602, length: 0, content: '', krp: 熱白粥晏然無異郗謂謝公曰非君幾不堪此崔寔四民月令曰𥘉伏薦麥瓜於祖禰也風俗通曰漢中巴蜀自擇伏日俗說漢中巴蜀廣漢土地温暑草木蚤生晚枯氣異中國夷狄畜之故令自擇伏日也謹案漢書髙帝分四都之衆用良平之䇿還定三秦席卷天下盖君子所因者夲也論㓛定封加以金帛重復寵異令自擇伏日不同於風俗也書儀曰六月}
  - {type: variant, offset: 2604, length: 22, content: 作醴酪又煮粳米及夌為酪擣杏仁煮作粥案玉燭寶典, SBCK: 伏日昔賈􅁩在湘南六月三庚日有􅨱鳥來時以南方毒惡以助太陽銷爍萬物故損人因避之稽含因熱賦序曰三伏之節始奏啇秋之辰未期余下俚貧生居室卑陋狹巷不來清風短廡不足増䕃歎彼夏屋之士體逸髙廊並天而寒暑殊同世而憂樂異矣程曉詩曰平生三伏時道路無行車閉門避暑卧出入不相過}
