  - {type: variant, offset: 3041, length: 2, content: 左傳, WYG: 處追尋宿眷髣髴玉儀心實悲矣國史補曰揚州舊貢江心鏡五月五日揚子江中所鑄也或言中}
  - {type: punctuation, offset: 3043, content: 》, id: KR3k0012_CHANT_031-bkkpn809}
  - {type: variant, offset: 3044, length: 4, content: 季郈斗雞, WYG: 百鍊者六七十煉則已易破難成徃徃有自鳴者酈道元水經註曰深水有異魚按正光元年五月五日天氣清爽聞池中鏘鏘若鉦鼓聲池水驚而沸湏㬰雷電晦㝠有五色蛇自池上屬于天久乃滅波上水定惟見一魚在}
  - {type: variant, offset: 3049, length: 7, content: 來遠矣周書時訓, WYG: 一變為龍伏日厯忌釋}
