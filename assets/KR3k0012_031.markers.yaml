  - {type: variant, offset: 2763, length: 3, content: 聞太原, SBCK: 牽牛星荆州呼爲河鼓主開梁織女星主􅀲果甞見道書云牽牛娶織女取天帝錢二萬備禮乆而不還􅀍驅在營室是也言雖不經有是爲怪也西京雜記曰戚夫人侍兒賈佩蘭云在宫時見戚夫人侍髙祖至七月七日於臨百子池作于滇樂畢以五色縷相覇謂爲連受又曰漢彩女常以七月七日穿針於開􅁭樓俱以習俗也輿地志曰齊武帝起層城觀七月七日宫人多登之穿針世謂之穿針樓淮南子曰七月七日午時取生􅀲葉七枚直入北堂中向南立以拭靣靨即當滅矣又萬畢術曰七月七日採守宫隂去聲乾之合以井華水和塗女身有文章即以丹塗之不去者不􅁋去者有姦晉周處風士記曰七月􅀄七日其夜灑掃於庭露施几筵設酒脯時果散香粉於筵}
