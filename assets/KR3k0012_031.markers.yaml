  - {type: variant, offset: 705, length: 4, content: 當令蠶桑, krp: 甚善但常年所患蛟龍所竊今若有惠可以練樹葉塞其上以五綵絲約之此二物蛟龍所憚也回依言後乃復見感之今人五日作糭子帶五色絲及練葉皆是汨羅之遺風也西京雜記曰王鳯以五月五日生其父欲不舉其叔曰昔田嬰勑其母勿舉田文文後爲孟嘗君以古事推之非不祥遂舉之鄴中記曰并州俗以介子推五月五日燒死世人爲其忌故不舉食飼非也北方五月五日自作飲食飼神及作五色縷五色辛盤相問遺不爲介子推也荆楚歳時記曰五月五日西人並蹋}
  - {type: variant, offset: 710, length: 3, content: 倍疑非, krp: 草今人又有闘百草之戯又曰五月五日競渡俗爲屈原投汨羅日傷}
