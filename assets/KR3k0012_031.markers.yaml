  - {type: variant, offset: 166, length: 185, content: 人皆符人日之意與正旦鏤雞於戶同北人亦有至人日諱食故歲菜唯食新菜者又餘日不刻牛羊狗豬馬之像而二日獨施人雞此則未喻郭緣生述征記云壽張縣安民山魏東平王鑿山頂為會望處刻銘於壁文字猶在所載銘辭即此處老子云眾人熙熙如登春臺如享大牢楚詞云目極千里傷春心則春日登臨自古為適但不知七日竟起何代晉代桓溫參軍張望亦有正月七日登高詩近代巳來南北同耳北人此日食煎餅於庭中作之云薰大未知所出也雜五行, WYG: 名唐}
