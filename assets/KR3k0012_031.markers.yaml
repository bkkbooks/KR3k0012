  - {type: variant, offset: 1973, length: 623, content: 節自茲始也又曰其月二十八日中書侍郎李泌奏伏以仲春初吉制嘉節以徵之更晦日於往月之終揆明辰於來月之始請令文武百辟以是日進農書司農獻穜稑之穜三公戚里上春服士庶以刀尺相遺村社作中和酒祭勾芒神聚會宴樂名為饗勾芒祈年穀仍望各下州府所在頒行從之又云貞元六年上以中和節宴百寮於曲江上賦詩以賜之百官皆和焉是歲戴叔倫為容州刺史素有詩名上乃令錄其詩以賜之社孝經緯曰社土地之主也土地闊不可盡祭故封土為社以報功也禮記月令曰二月之節是月也擇元日命人社為祀社稷也春事興故祭之以祈農祥元日謂近春分前後戊日元吉也又曰王為群姓立社曰太社王自立社曰皇社諸侯為百姓立社曰國社自立社曰侯社大夫已下立社曰置社尚書曰用命則賞于祖不用命則戮于社社主陰陰主殺論語曰魯哀公問社於宰我對曰夏后氏以松殷人以柏周人以栗曰使民戰史記曰共工氏之子為后土能平水土故祀以為社故天子曰大社必受霜露風雨以達天地之氣也社所以親地也地載萬物天垂象取法於天所以尊天而親地也社共粢盛所以報本反始也漢書曰陳平為里中社宰分肉甚均父老善之平曰使平得宰天下亦如此肉又曰高祖天下定詔御史令治榆社春用羊彘祠之魏志曰王脩年七歲喪母母以社日亡來年鄰里社脩感念母悲哀其鄰里聞為之罷社晉書曰阮脩字宣子伐社樹或止之籍曰或社為樹伐樹則社移樹而為社伐樹則社亡也荊楚歲時記曰社日四鄰並結綜會社牲醪為屋於樹下先祭神然後饗其昨鄭氏云百家共一社今百家所社綜即共立之社也寒食荊楚歲時記曰去冬節一百五日即有疾風甚雨謂之寒食據曆合在清明前二日亦有去冬至一百六日陸翽, WYG: ''}
