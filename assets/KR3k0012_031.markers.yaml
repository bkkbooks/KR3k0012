  - {type: variant, offset: 3339, length: 1100, content: 也續漢志曰上已大會賓從於薄落津後漢書曰梁啇上已日會賓客於洛水酒酣繼以薤露坐者聞之皆為掩泣曰此所謂哀樂失時非其所也殃將及乎啇至秋果薨魏志曰袁紹三月上已大會賓從於簿落津聞魏郡兵及黑山賊于毒等數萬人共覆鄴城殺守坐中客家在鄴者皆憂怖失色或起而立紹容貌自若不改常度又晉中興書曰王導謂從兄敦曰王仁德未著而名位猶輕兄名已振宜有以共相匡舉會三月三日中宗出禊乘肩輦敦導並騎從紀瞻使人覘之既聞敦導騎從乃大驚自出拜於道左中宗從容謂導曰卿吾之蕭何也宋書曰武帝三月三日登八公山劉安故臺望日城郭如疋帛之繞藂花也崔鴻十六國春秋曰李暠三日讌于曲水命群僚賦詩暠為之序韓詩曰溱與洧方洹洹兮洹洹盛貌也謂三月桃花水下之時至盛也惟士與女方秉蕳兮秉執也蕳蘭也當此盛流之時眾士與眾女方執蘭拂除邪惡鄭國之俗三月上巳之辰此雨水之上招魂續魄拂除不祥故詩人願與所悅者俱往觀之荊楚歲時記曰三月三日四人並出江渚池沼間為流杯曲水宴續齊諧記曰晉武帝問尚書郎摯虞曰三日曲水其義何指荅曰漢章帝時平原徐肇以三月初生三女至三日而俱亡一村以為怪乃相攜之水濱盥洗因水以泛觴曲水之義起於此也帝曰若如所談便非好事尚書郎束晢曰摯虞小生不足以知之臣請說其始昔周公城洛邑因流水以泛酒故逸詩云羽觴隨波又秦昭王三日置酒河曲見有金人出捧水心劍曰令君制有西夏及秦霸諸侯乃因此處立為曲水二漢相緣皆為盛集帝曰善賜金五十斤左遷摯虞為陽城令夏仲御別傳曰夏仲御詣洛到三月三日洛中公王以下莫不方軌連軫並南浮橋邊禊男則朱服耀路女則錦綺綺燦爛仲御時在舡中曝所市藥雖見此輩穩坐不搖賈充望見深奇其節顧相與語此人有心膽有似冀缺走往問舡中安坐者為誰仲御不應重問徐乃荅曰會稽北海間民夏仲御夏統字仲御風土記曰漢末有郭虞者有三女一女以三月上辰一以上巳二日而三女產乳並亡迄今時俗以為大忌故到是月是日婦女忌諱不復止家皆適東流水上就通遠地祈祓自潔濯也丘淵之征齊道里記曰城北十五里有柳泉符朗常以為解禊處鄴中記曰石虎三月三日臨水會公主妃主名家婦女無不畢出臨水施張幔車服燦爛走馬步射飲宴終日陸翽鄴中記曰華林園中千金堤上作兩銅龍相向吐水以注天泉池通御溝中三月三日石季龍及皇后百官臨池會賞續搜神記曰盧充獦見麞便射中之隨逐不覺遠忽見一黑門如府舍問鈴下鈴下對曰崔少府宅也進見少府語充云尊府君為索小女婚故相迎耳三日畢車送充至家母問之具以狀對與崔別正四年而三月三日臨水戲遙見傍水有犢車充往開車戶見崔女與三男共載情意如初抱兒還充又與金鋺乃別戴延之西征記曰天泉之南有東西溝承御溝水水之北有積石壇云三月三日御坐流杯之處雜五行書曰欲知蚕善惡常三月三日天陰而無日不雨蚕大善風俗通曰謹案周禮女巫掌歲時以祓除疾病禊者潔也故於水上盥潔之也巳者祉也邪疾已去祈介祉也, SBCK: 瑞}
