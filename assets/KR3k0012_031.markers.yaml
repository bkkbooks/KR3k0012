  - {type: variant, offset: 3057, length: 2, content: 清明, WYG: 伏者何也金氣伏藏}
  - {type: variant, offset: 3061, length: 1, content: 桐, WYG: 也四時代謝皆以相生立春木代水水生木立夏火代木木生火立冬水代金金生水至於立秋以金代火金畏火故至庚日必伏庚者金也史記曰張子房始所見下邳圯上老父與太公書者後十三年從髙帝過濟北果見榖城山下黄石取而葆祠之留侯死并葬黄石冢每上冢伏臘祠黄石又秦穆公始為伏祠漢書曰東方朔為郎伏日詔賜諸從官肉朔獨拔劍割肉謂其同官曰伏日當早歸請受賜即懐肉而去上問朔曰賜肉}
  - {type: page-break, offset: 3061, content: '', id: KR3k0012_WYG_031-7b, image: WYG0893/WYG0893-0270d.png}
  - {type: variant, offset: 3063, length: 0, content: '', WYG: 待詔而去何也令自責朔曰受賜不待詔何無禮也拔劍割肉一何壯也割之不多又何亷也歸遺細君又何仁也上笑曰令先生自責而反自譽復賜酒一巵肉百觔遺細君又楊惲報孫㑹宗書曰田家作苦嵗時伏臘烹羊炰羔斗酒自勞去聲漢官儀曰伏日厲鬼所行故伏漢魏有飲食之㑹故潘岳閒居賦有曰養羊治酪供伏臘之費魏典畧曰大駕都許使光禄大夫劉松北鎮袁紹軍與紹子弟日共宴飲常以三伏之際晝夜酣飲極醉至於無知云以避一時之暑故河朔有避暑飲荆楚嵗時記曰六月伏日並作湯餅名為辟惡宋王𤣥謨夀陽記曰明義井三伏之日炎暑赫曦男女行來其氣短急望見義井則喜不可言未至而憂既至而樂號為歡樂井世說曰郄嘉賔三伏之日詣謝公炎暑熏赫復當風交扇猶沾汗流離謝著故絹衣食熱白粥宴然無異郄謂謝公曰非君幾不堪此崔寔四民月令曰初伏薦麥瓜於祖禰也風俗通曰漢中巴蜀自擇伏日俗說漢中巴蜀廣漢土地温暑草木早生晩枯氣異中國夷狄畜之故令自擇伏日也謹按漢書髙帝分四部之衆用良平之䇿還定三秦席卷天下蓋君子所因者本也論功定封加以金帛重復寵異令自擇伏日不同於凡俗也書儀曰六月三日伏日昔賈誼在湘南六月三庚日有鵩鳥來時南方毒惡以助太陽銷鑠萬物故避之又晋稽含困熱賦序曰三伏之節始奏商秋之辰未期余下里貧生居室卑陋狹巷不來清風短廡不足増䕃歎彼夏屋之士體逸髙廊並天而寒暑殊同世而憂樂異矣程曉詩曰平生三伏時道路無行車閉門避炎暑出入不相過今世褦襶子觸熱到人家主人聞客來顰蹙柰此何揺扇臂中疼流汗正滂沱傳戒諸髙明熱行宜見呵晉潘岳懐縣詩曰南陸迎修景朱明送末垂初伏啟新節隆暑方赫曦七月七日漢武帝故事曰景帝嘗夢髙祖謂己曰王美人生子可名為彘以乙酉年七月七日旦生武帝于猗蘭殿謹按洞㝠記漢武帝未生之時景帝夢有赤彘從雲中直下崇芳閣帝覺而坐于閣果見赤氣從雲中直下如林木蔽戸牖望閣上有丹霞蓊􅉱既而乃改崇芳閣為猗蘭殿後王夫人生武帝也又七月七日上於承}
