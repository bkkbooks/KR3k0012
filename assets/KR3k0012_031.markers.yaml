  - {type: variant, offset: 689, length: 1, content: 半, SBCK: 五日投汨羅而死楚人哀之毎至此日竹筒貯米投水祭之漢建武年長沙歐回見人自稱三閭大夫謂回曰甞見􅀕甚善但常年所患蛟龍所竊今􅀂}
  - {type: page-break, offset: 689, content: '', id: KR3k0012_SBCK_031-2a}
  - {type: variant, offset: 689, length: 6, content: 半有神降陳氏, WYG: 五日投汨羅而死楚人哀}
  - {type: variant, offset: 689, length: 6, content: 半有神降陳氏, krp: 五日投汨羅而死楚人哀}
  - {type: variant, offset: 691, length: 0, content: '', SBCK: 惠可以練樹葉塞其上以五綵絲約之此二物蛟龍所憚也回依言後乃復見感之今人五日作糭子帶五色絲及練葉皆是汨羅之遺風也西京雜記曰王鳯以五月五日生其父欲不舉其叔曰昔田嬰勑其母勿舉田文文後爲孟嘗君以古事推之非不祥遂舉之鄴中記曰并州俗以介子推五月五日燒死世人爲其忌故不舉食飼非也北方五月五日自作飲食飼}
  - {type: variant, offset: 692, length: 3, content: 降陳氏, SBCK: 及作五色縷五色辛盤相問遺不爲介子推也荆楚歳時記曰五月五日西人並蹋百草今人又有闘百草}
  - {type: variant, offset: 696, length: 2, content: 宅云, SBCK: 戯又曰五月五日競渡俗爲屈原投汨羅日傷其死所並命舟檝以拯之舸舟取其輕利謂之飛鳬一自以爲水軍一自以爲水馬州將及土人悉臨水而觀之又曰}
  - {type: page-break, offset: 696, content: '', id: KR3k0012_SBCK_031-2b}
  - {type: variant, offset: 696, length: 7, content: 宅云是蠶室若能, WYG: 每至此日竹筒貯米投水祭之漢建武中長沙歐回見人自稱三閭大夫謂回曰嘗}
