  - {type: variant, offset: 2759, length: 0, content: '', SBCK: 辟髙祖以漢祚將終不欲屈節於曹氏辭以風痺不能起居魏武遣親信令史微服於髙祖門下樹䕃下息時七月七日髙祖方曝書令史􅀼知還具以告乃重遣辟之勑行者曰􅀂復不動便可収之髙祖懼而應命後魏書曰太祖道武皇帝韓珪七月七日生於叅合陂又曰任城王澄爲雍州功縗在身故以七月七日集文武馬射張普惠字洪賑爲録事參軍奏記請停列仙傳曰陶安公者六安鑄治師也一朝火散上紫色衝天安公伏治下求哀須􅁷朱雀止治上曰安公治與天通七月七日迎汝以赤龍至日龍來安公􅀐之東南而去邑中數萬人預共送之皆與辭訣又曰王子喬周靈王太子晉也好吹笙作鳯鳴遊伊洛之間浮丘公椄以上嵩髙山二十餘年後於山中謂桓良曰告我家七月七日待我緱氏山頭是日果乗白鶴駐山嶺望之不得到舉手謝時人數日而去又曰吴蔡經去家時巳老及還更少壯頭髮皆黒語家中言七月七日王君當來可作數百斛飲擬之至期日王方平果來乗羽車駕五龍聞金鼓簫管人馬之聲荆楚歳時記曰七夕婦人結綵縷穿七孔針或以金銀鍮石爲針宋孝武七夕詩曰迎風披綵縷向月貫􅀇針陳􅀲果於中庭以乞巧有喜子網於􅀲上以爲符應周處風土記云七月􅀄七日重此日其夜灑掃中庭然則中庭乞願其舊俗乎又曰魏時人或問董勛云七月七日爲良日飲食不同於古何也勛云七月􅁰熟七日爲陽數故以麋爲珎今北人唯設湯餅無復有麋矣又曰陸雲與兄平原書曰機爲平原相一日按行曹公器物書刀五板瑠璃筆一枚景􅀄二年七月七日劉婕妤云見此使人恨然案魏武帝於漢爲相不得有婕妤又景􅀄是魏}
