  - {type: variant, offset: 1343, length: 613, content: 家德言遂以正月望日訪於都市有蒼頭賣半鏡者大高其價人皆笑之德言直引至其居出半鏡以合之仍題詩曰鏡與人俱去鏡歸人不歸無復姮娥影空餘明月輝陳氏得詩涕泣不食素知之還其妻仍厚遺之與德言歸江南竟以終老玉燭寶典曰正月十五日作膏粥以祠門戶西域記曰摩竭陁國正月十五日僧徒俗眾雲集觀佛舍利放光雨花唐蘇味道正月十五日夜詩曰火樹銀花合星橋鐵鏁開暗塵隨馬去明月逐人來游騎皆穠李行歌盡落梅金吾不惜夜玉漏莫相催崔液正月望夜游詩曰玉漏銅壺且莫催鐵關金鏁徹明開誰家見月能閑坐何處聞燈不看來又曰神燈佛火百輪張刻像圖形七寶裝影裏如聞金口說空中似散玉毫光又曰金勒銀鞍控紫騮玉輪朱幰駕青牛驂驔始散東城曲倏忽還逢南陌頭晦日荊楚歲時記曰元日至于月晦並為酺聚飲食每月皆有弦望晦朔以正月初年時俗重以為節士女汎舟或臨水宴樂玉燭寶典曰元日至月晦人並為酺食渡水士女悉湔裳酹酒於水湄以為度厄今世人唯晦日臨河解除婦人或湔裙後魏盧元明晦日泛舟應詔詩曰輕灰吹上管落蓂飄下蔕遲遲春色華晼晼年光麗北齊魏收晦日泛舟應詔詩曰裊裊春枝弱關關新鳥呼棹唱忽逶迤菱歌詩顧慕睿賞方月色宴言忘日暮猶豫慰人心照臨康國步唐太宗月晦詩晦魄移中律凝暄起麗城罩雲朝蓋上穿露曉珠呈笑樹花分色啼枝鳥合聲披襟勤眺望極目暢春情中和節唐書云貞元五年正月十一日詔曰四序嘉辰歷代增置漢宗上巳晉紀重陽或說穰除雖因舊俗與眾宴樂誠洽當時朕以春方發生候維仲月勾萌畢達天地同和俾其昭蘇宜均暢茂自今已後以二月一日為中和節內外官司並休假一日先勑百寮以, SBCK: ''}
