  - {type: variant, offset: 4526, length: 0, content: '', SBCK: 昊恊素藏織女思北征牽牛歎南陽時來嘉慶集整駕巾玉箱瓊佩垂藻㽔霧裙結雲裳金翠耀華輜軿軒散流芳釋轡紫微庭解􅁭碧琳堂忻燕未及究晨暉照扶桑仙童唱道情盤螭起騰驤悵悵一霄促遲遲別日}
  - {type: page-break, offset: 4526, content: '', id: KR3k0012_SBCK_031-11a}
  - {type: variant, offset: 4526, length: 0, content: '', WYG: 昊潔素藏織女思北征牽牛嘆南陽時來嘉慶集整駕巾玉箱璚珮垂藻蕤霧裙結雲裳金翠耀華輜軿軒散流芳釋轡紫㣲庭解襟碧琳堂忻燕未及究晨暉照扶桑仙童唱道情盤螭起騰驤悵悵一宵促遲遲别日}
  - {type: variant, offset: 4526, length: 0, content: '', krp: 昊恊素藏織女思北征牽牛歎南陽時來嘉慶集整駕巾玉箱瓊佩垂藻㽔霧裙結雲裳金翠耀華輜軿軒散流芳釋轡紫微庭解襟碧琳堂忻燕未及究晨暉照扶桑仙童唱道情盤螭起騰驤悵悵一霄促遲遲別日}
  - {type: variant, offset: 4527, length: 321, content: 咸集此地有崇山峻嶺茂林脩竹又有清流激湍映帶左右引以為流觴曲水列坐其次雖無絲竹管絃之盛一觴一吟亦足以暢敘幽情是日也天朗氣清惠風和暢仰觀宇宙之大俯察品類之盛所以遊目騁懷足以極視聽之娛信可樂也宋顏延之三日曲水詩序曰日纏胃維月軌青陸皇祗發生之始后土布和之辰思對上靈之心以荅庶萌之願有詔掌故爰命司曆獻洛飲之禮具上巳之儀南徐輦道北清禁林略亭皋跨芝田菀太液懷層山山居峻垝蔥翠幽煙於是離宮衛設別殿周徼然後昇秘駕引緹騎搖玉鸞發流吹天動神移淵渟雲委以降于行所禮也梁沈約三日率爾成篇曰麗日屬元已年芳具在斯開花巳匝樹流鸎復滿枝洛陽繁華子長安輕薄兒東出千金堰西臨鴈鶩陂遊絲映空轉高柳拂地垂絲萍文照曜紫鷰光陸離清晨戲伊水薄暮宿蘭池象筵排寶瑟金瓶泛羽巵寧憶春蠶起日暮桑欲萎, SBCK: ''}
