  - {type: variant, offset: 2714, length: 228, content: 焚骸有龍忌之禁至其月咸言神靈不樂舉火舉移書於子推廟云春中寒食一月老小不堪今則三日而已魏武帝明罰令曰聞太原上黨西河鴈門冬至後百有五日皆沍寒之地老少羸弱將有不堪之患令人不得寒食若犯者家長半歲刑主吏百日刑令長奪一月俸周斐汝南先賢傳曰太原舊俗以介子推焚骸一月寒食莫敢煙爨劉向別錄曰寒食蹋蹴黃帝所造本兵勢也或云起於戰國案鞠與毬同古人蹋蹴以為戲古今藝術圖云寒食鞦韆本北方山戎之戲以習輕趫者也又按周舉移書及魏武明罰令陸翽鄴中記並云寒食斷火起於子推琴操所云子綏綏即推也又云, WYG: ''}
