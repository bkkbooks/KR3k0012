  - {type: variant, offset: 3029, length: 2, content: 寒食, WYG: 五月五日採艾懸於户上以禳毒氣按荆楚嵗時記云宗則字文度常以五月五日雞未鳴時採艾見似人處攬而取之用灸有驗是日競渡採雜藥夏小正曰}
  - {type: variant, offset: 3032, length: 7, content: 節城市尤多鬥雞, WYG: 月畜藥以蠲除毒氣也異苑曰五月五日剪鴝鵒舌亦能學人語又田文母嬖五月五日生文父勅令勿舉}
  - {type: punctuation, offset: 3033, content: ，, id: KR3k0012_CHANT_031-bkkpn806}
  - {type: 'tls:seg', offset: 3033, content: '', id: KR3k0012_CHANT_031-34a.4}
  - {type: variant, offset: 3040, length: 0, content: '', WYG: 後母私舉文長成童以實告之文遂啓父曰不舉五日子何父云生及户損父文曰受命于天豈受命于户若受命于户何不髙其戸誰能至其户耶父說以為嗣齊封為孟嘗君㑹稽典録曰女子曹娥者會稽上虞人父能弦歌為巫漢安帝二年五月五日於縣江泝濤迎波流溺死不得屍娥年十四沿江號哭晝夜不絶遂投江而死抱父屍出習鑿齒與禇常侍書曰想徃日與足下及江州五月五日共澡浴}
  - {type: page-break, offset: 3040, content: '', id: KR3k0012_WYG_031-6a, image: WYG0893/WYG0893-0270a.png}
