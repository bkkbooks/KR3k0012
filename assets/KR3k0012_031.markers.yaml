  - {type: variant, offset: 2967, length: 2, content: 被焚, WYG: 也荆楚嵗時記曰五月五日西人並蹋百草今人又有鬪百草之戲又五月五日競渡俗為屈原投汨羅日傷其死所並命舟檝以拯之舟舸取其輕利謂之飛鳧一目以為水軍一目以為水馬州將及土人悉臨水而觀之又曰是月俗忌蓋屋及曝薦席風俗通云五月蓋屋令人頭秃又異苑云新野庾寔家嘗以五月暴席忽有一小兒死于席下俄失所在其後寔女子遂亡相傳彌以為忌此二條通五月}
