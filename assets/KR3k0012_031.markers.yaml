  - {type: variant, offset: 1153, length: 8, content: 禰衡嘗被魏武謫為, SBCK: 生父母惡之置瓮中投於江胡翁聞瓮中有兒啼往取之養爲子遂七登三司㑹稽典録曰女子曹娥者㑹稽上虞人父能絃歌爲巫漢安二年五月五日於縣江泝濤迎波沉溺死不得尸娥年十四㳂江號哭晝夜不絶聲七日遂投江而死習鑿齒與禇常侍書曰想往日與足下及江州五月五日共澡浴戯處追㝷􅀫眷髣髴王儀心實悲矣國史􅀘曰􅀭州舊貢江心鏡五月五日楊子江中所鑄也或言中有百錬者六七十錬則已易破難成往往有自鳴者酈元注水經曰如深水有異魚按正光元年五月五日天氣清爽聞池中鎗鎗􅀂鉦}
