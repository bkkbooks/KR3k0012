  - {type: variant, offset: 817, length: 627, content: 正月半作粥禱之加以肉覆其上登屋食之咒云登膏麋挾鼠腦欲來不來待我三蚕老則以為蚕襄鼠與齊諧記相符又覆肉亦是覆膋之理石虎鄴中記正月十五日有登高之會則登高又非今世而然者也其夕則迎紫姑以卜劉敬叔異苑云紫姑本人家妾為大婦所妬正月十五日感激而死故世人作其形迎之云子壻不在曹夫人巳行紫姑可出異苑又云於廁間或豬欄邊迎之捉之覺重是神來也平昌孟氏嘗以此日迎之遂穿室而自爾正著以敗衣蓋為此也洞覽云帝嚳女將死云生平好樂至正月可以見迎又其事也俗云溷廁之間必須凈然後能致紫姑異苑曰世人以十五日迎紫姑捉者覺重便是神來奠設酒果亦覺貌輝輝有色即跳躁不住能占眾事卜將來蚕桑又善射鉤好即大舞惡則仰眠平昌孟氏恒不信躬試往捉便自躍穿頂永失所在也唐兩京新記云正月十五日夜勑金吾弛禁前後各一日以看燈光若晝日世說正月十五日禰衡嘗被魏武謫為鼓吏於此日試鼓漁陽桴作魚陽參淵淵有金石聲後漢書注曰文士傳曰衡擊鼓為漁陽參撾蹋地來躡足跂腳容態不常鼓節甚悲易衣單復擊鼓參撾而去至今有漁陽撾自衡始也參音七甘切陳太子舍人徐德言之妻叔寶之妹封樂昌公主才色冠絕時陳政方亂德言知不相保謂其妻曰以君之容國亡必入權豪之家儻情緣未斷猶冀相見宜有以信之乃破一鏡人執其半約曰他日必以正月望日賣於都市我當在即以是日訪之及陳亡其妻果入楊素之家德言遂以正月望日訪於都市有蒼頭賣半鏡者大高其價人皆笑之德言直引至其居出半鏡以合之仍題詩曰鏡與人俱去鏡歸人不歸無復姮娥影空餘明月輝陳氏得詩涕泣不食素知之還其妻仍厚遺之與德言歸江南竟以終老玉燭寶典曰正月十, WYG: ''}
