  - {type: variant, offset: 3100, length: 1, content: 普, WYG: 迎風披綵縷向月貫𤣥針陳瓜果于中庭以乞巧有喜子網于瓜上以為符應周處風土記曰七月七日其夜灑掃中庭然則中庭乞願其舊俗乎又曰魏時人問董勛云七月七日為良日飲食不同於古何也勛云七月黍熟七日為陽數故以糜為珍今北人唯設湯餅無復有糜矣又曰陸雲與兄平原相書云機為平原相一日按視曹公器物有書刀五枚又琉璃筆一枝景初二年七月七日劉媫妤折之見此使人悵然按魏武帝於漢為相不得有媫妤又景初是魏明帝年號如此則文帝物也與曹公器玩同處故致舛雜耳日緯書曰牽牛星荆州呼為河鼓主關梁織女星主瓜果嘗見道書云牽牛娶織女}
