  - {type: variant, offset: 928, length: 0, content: '', SBCK: 與夏至同先節一日又以菰葉褁粘米以粟􅀥􅁅汁煑令熟節日啖煑肥􅀛令極熟去骨加鹽豉蓼名曰􅉁􅀛黏米一名糭一曰角􅁰盖取隂陽尚包褁未之象也􅀛表肉裏陽内隂外之形所以賛時也抱朴子曰或問辟五兵之道荅以五月五日作赤靈符着心前又曰蟾蜍萬歳者頭上有角頷下丹書八字再重五月五日中時取之隂乾百日以其足􅀞地即爲流水風俗通曰五月五日以五彩絲繫臂者辟兵及􅀑令人不病温又曰亦因屈原一名長命縷一名續命縷一名辟兵繒一名五色絲一名朱索又有條逹等織組雜物以相贈遺孝經援神契云仲夏始出婦人染練或有作務玉燭寳典云此節備擬甚多其尚矣又曰日月星辰鳥獸之狀文繡金縷帖􅀞貢獻所尊古詩云繞臂􅀟條逹是也又曰五月五日集五色繒辟兵余問服君服君曰青赤白黒以爲四方黄爲中央襞方綴於􅅐前以示婦人蠶功也織麥􆁔懸於門以示農工成傳聲以襞爲辟兵耳音清麥莖也養生要集曰木味苦小温生漢中南鄭山谷五月五日採之琴操曰介子綏國語曰介子推割腓股以啖重耳重耳復國子綏獨無所得綏甚怨恨乃作龍虵之歌以}
