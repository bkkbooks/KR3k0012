  - {type: 'tls:seg', offset: 3068, content: '', id: KR3k0012_CHANT_031-34a.9}
  - {type: variant, offset: 3069, length: 1, content: 鼠, WYG: 此西王母欲來也有頃王母至有二青鳥如鳯夾侍王母旁也又王母遣謂帝七月七日我當暫來帝至日掃宫内燃九華之燈又漢武帝内傳曰帝登尋真之臺齋至七月七日夜忽見天西南如白雲起鬱鬱直來趨宫有頃王母至乘紫雲之輦又七月七日乃掃除宫掖之内張雲錦之帷燃九微之燈夜二更後西王母駕九色之斑龍上殿又七月七日西王母降武帝戴太真晨纓之冠履𤣥瓊鳳文之舄宋卜子楊園苑疏曰太液池西有武帝曝衣閣常至七月七日宫女出登樓曬衣晉書曰魏武帝辟髙祖以漢祚將終}
