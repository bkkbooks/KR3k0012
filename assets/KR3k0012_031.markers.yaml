  - {type: variant, offset: 2980, length: 7, content: 木鐸脩火禁于國, WYG: 菰葉裹粘米栗棗以灰汁煑令熟節日又煑肥龜令極熟去骨加鹽䜴麻蓼名曰􅀢龜粘米一名糭一曰角黍盖取隂陽包裹之象也龜甲表肉裏陽外隂内之形所以賛時也抱朴子曰或問辟五兵之道答以五月五日作赤靈符著心前又蟾蜍萬嵗者頭上有角頷下丹書八字再重五月五日}
