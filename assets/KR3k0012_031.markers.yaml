  - {type: variant, offset: 5467, length: 393, content: 已禊堂開畫鷁中川動青龍上苑來野花飄御座河柳拂天杯日晚迎祥處笙鏞下帝臺後漢張衡南都賦曰於是暮春之禊元巳之辰方軓齊軫祓于陽濱朱帷連綱曜野暎雲男女妖袨服絡繹何繽紛晉成公綏洛禊賦曰考吉日簡良辰祓除鮮禊同會洛濱妖童媛女嬉遊河曲或漁纖手或濯素足臨清流坐沙場列罍樽飛羽觴又張協禊賦曰夫何三春之令月嘉天氣之絪縕流水清冷以汪濊原隰蔥翠以龍鱗於是縉紳先嘯疇命友攜接黨童冠者八九主希孔墨賓慕顏柳若夫權戚之家豪侈之誒乘騎齊鑣華輪方轂青蓋雲浮參差相屬集于長洲之浦曜乎泠川之曲遂乃停輿蕙渚息駕蘭田朱幔虹舒翠幕蜺連浮素卵以蔽水洒玄醪於中河水禽為之駭踴陽侯為之動波又阮瞻上巳會賦曰臨清川而嘉讌聊暇日以遊娛蔭朝雲而為蓋託茂樹以為盧又王廙洛都賦曰若乃暮春嘉禊三已之辰貴賤同遊方驥齊輪麗服靚粧祓乎洛濱流芳塞路炫日暎雲又禇爽禊賦曰伊暮春之令月將解禊於通川川廻瀾以澄暎嶺峭崿以霏煙輕霞舒於翠崖白雲暎於青天風透林而自清氣扶嶺而載鮮, SBCK: 十一}
