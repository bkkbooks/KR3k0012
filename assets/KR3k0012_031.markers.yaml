  - {type: variant, offset: 4453, length: 0, content: '', SBCK: 送夏少昊迎秋嘉木茂園芳草􅀍疇於時我后以豫以游宋孝武七夕詩曰開庭鏡天路餘光不可臨㳂風披弱縷迎曜貫􅀇鍼薄藝誠無取時務􅂓可㝷宋謝惠連詠牛女詩曰落}
  - {type: variant, offset: 4453, length: 0, content: '', WYG: 送夏少昊迎秋芳草茂園嘉禾被疇于時我后以豫以㳺宋孝武七夕詩曰開庭鏡天路餘光不可臨迎風披綵縷向月貫𤣥針薄藝誠無取時務聊可尋宋謝惠連詠牛女詩曰落}
