  - {type: variant, offset: 3078, length: 1, content: 見, WYG: 能起居魏武遣親信令史㣲服於髙祖門下樹䕃下息時七月七日髙祖方曝書令史竊知還具以告乃重遣辟之勅行者曰若復不動便可收之髙祖懼而應命魏書曰太祖道武皇帝諱珪七月七日生于㕘合陂又任城王澄為雍州功縗在身故以七月七日集文武騎射張普惠字洪賑為録事㕘軍奏記請停列仙傳曰陶安公者六安鑄冶師也一朝火散冶上紫色衝天安公伏冶下求哀須㬰朱雀止冶上曰安公冶與天通七月七日迎女以赤龍至日龍來安公騎之東南而去邑中數萬人預共送之皆與辭訣又王子喬周靈王太子晉也好吹笙作鳳鳴逰伊洛之間浮丘公接以上嵩髙山二十餘年後于山中謂桓良曰告我家七月七日待我緱氏山頭是日果乘白鶴駐山嶺望之不得到舉手謝時人數日而去又吳蔡經去家時已老及還更少壯頭髪皆黒語家中言七月七日麻姑當來可取數百斛酒飲之至期王方平偕來乘羽車駕五龍聞金鼓簫管人馬之聲荆楚嵗時記曰七夕}
