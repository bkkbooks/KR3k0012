  - {type: variant, offset: 3026, length: 1, content: 寶, WYG: 寳典云此節備擬甚多其來尚矣又有日月星辰鳥獸之狀文繡金縷帖畫貢獻所尊古詩云繞臂雙條達是也又五月五日集五色繒辟兵余問服君服君曰青赤白黒以為四方黄為中央襞方綴於胷前以示婦人蠶功也織麥􅀈懸於門以示農工成轉聲以襞為辟兵耳養生要集曰术味苦小温生漢中南鄭山谷五月五日採之琴操曰介子綏國語曰介子推割腓股以啖重耳重耳復國子綏獨無所得綏甚怨恨乃作龍蛇之歌以感之遂遁入山文公驚悟迎之終不肯出文公令燔山求之遂抱木而燒死文公令民五月五日不得𤼵火玉燭寳}
