  - {type: variant, offset: 4445, length: 6, content: 王濟嘗解禊浴, SBCK: 阮咸字仲容籍兄子也諸阮前世儒學善屋室内足於財唯籍一巷尚道業好酒而貧舊俗七月七日法當曝衣諸阮庭中爛然莫非綈錦咸時揔角乃堅長竿摽大布犢􅈹禈於庭中曰未能免俗􅂓復共爾酉陽雜俎曰魏僕射收臨代七月登舜山徘􅆦顧眺謂主簿崔撫曰吾所經多矣於山川沃壤􅁭帶形勝天下名州不能過此唯未審東陽何如撫對曰青得古名齊得舊號二處山川形勢相似曽聽所論不能踰越公遂命筆爲詩雜異書曰時有女子尚㓜七夕見家人出庭望􅀱天門開獨在室中不出曰􅀂合當見者雖暗室中亦應見之至夜深忽見天上門開雲物赫弈因求冨及長嫁而冨旣寡衆累鉅萬有賈客貨其絹百匹去而舩覆溺資貨皆没其女子偶開後房見絹在其中但濕耳後賈客歸而自首女子曰絹歸矣驗之而信亦出夷堅每亦是開元巳後事國史􅀘曰興元元年七月七日斬僞官喬琳將臨刑嘆曰琳以七月七日生亦以此日死豈非命也夫古詩曰迢迢牽牛星皎皎河漢女纎纎擢素手軋軋弄機杼終日不成章泣涕零如􅀨河漢清且淺相去復幾許盈盈一}
  - {type: page-break, offset: 4445, content: '', id: KR3k0012_SBCK_031-10a}
  - {type: variant, offset: 4445, length: 6, content: 王濟嘗解禊浴, WYG: 阮咸字仲容籍兄子也諸阮俱世儒學善居室内足於財唯籍一巷尚道業好酒而貧舊俗七月七日法當曝衣諸阮庭中爛然莫非綈錦咸時總角乃竪長竿標大布犢鼻褌於庭中云未能免俗聊復爾耳雜異書曰時有女子尚幼七夕見家人出庭望候天門開獨在室中不出曰若合當見者雖暗室中赤應見之至夜深忽見天上門開雲氣赫奕因求富及長嫁而富既寡家累鉅萬有賈客貨其絹百疋去而船覆溺資皆沒其女子偶開後房見絹在其中但濕耳賈客歸而自首女子曰絹歸矣驗之而信亦出夷堅録乃是開元以後事國史補曰興元元年七月七日斬偽官喬林將臨刑書曰林以七月七日生亦以此日死豈非命也古詩曰迢迢牽牛星皎皎河漢女纎纎濯素手軋軋弄機杼終日不成章泣淚零如雨河漢清且淺相去復幾許盈盈一}
