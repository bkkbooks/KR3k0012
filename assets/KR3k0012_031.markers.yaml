  - {type: variant, offset: 1164, length: 137, content: 此日試鼓漁陽桴作魚陽參淵淵有金石聲後漢書注曰文士傳曰衡擊鼓為漁陽參撾蹋地來躡足跂腳容態不常鼓節甚悲易衣單復擊鼓參撾而去至今有漁陽撾自衡始也參音七甘切陳太子舍人徐德言之妻叔寶之妹封樂昌公主才色冠絕時陳政方亂德言知不相保謂其妻曰以君之容國亡必入權豪之家儻情緣未斷猶冀相見宜有以信, SBCK: 天乆}
