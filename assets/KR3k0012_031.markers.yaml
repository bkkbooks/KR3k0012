  - {type: variant, offset: 2946, length: 235, content: 與今有異皆因流俗所傳據左傳及史記並無介子推被焚之事案周禮司烜氏仲春以木鐸脩火禁于國中注云為季春將出火也今寒食准節氣是仲春之末清明是三月之初然即禁火蓋周之舊制玉燭寶典曰寒食此節城市尤多鬥雞之戲左傳有季郈斗雞其來遠矣周書時訓曰清明之日桐不華歲有大寒曰鼠不化國多貪殘虹不見婦人亂色戴勝不降桑政教不平唐李崇嗣寒食詩曰普天皆滅熖匝地盡藏煙不知何處火來就客心燃又宋之問途中寒食詩曰馬上逢寒食途中屬暮春可憐江浦望不見洛橋人又沈佺期嶺表逢寒食詩曰嶺外逢寒食春來不見餳洛陽新甲子何日是清明, SBCK: 取烏鷄血和}
  - {type: variant, offset: 2946, length: 13, content: 與今有異皆因流俗所傳據左傳, WYG: 燒死世人為其忌故不舉火食非也北方五月五日自作飲食祠神}
