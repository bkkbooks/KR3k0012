  - {type: variant, offset: 3051, length: 315, content: 青曰貴人也官至封侯青笑曰人奴之生得無笞罵即幸矣何得封侯漢書曰陳平陽武戶牖人也少時家貧好讀書有田三十畝與兄伯居伯常耕田縱平游學又曰何武字君公蜀郡郫人武兄弟五人皆為郡吏郡縣敬憚之又曰田蚡封武安侯為丞相召客飲坐其兄蓋侯北鄉自坐東鄉以為漢相尊不可以兄故私撓由此滋驕又曰丞相韋賢封扶陽侯長子方山早終次子弘少子玄成初弘為太常丞職奉宗廟典諸陵邑煩劇多罪過父賢以弘當為嗣故勑令自免弘懷嫌不去官及賢病篤弘竟坐宗廟事繫獄罪未決室家問賢當為後者賢恚不肯言於是賢門生博士等與宗室計議共矯賢令以玄成為後賢薨玄成在官聞喪又言當為嗣玄成深知其非賢雅意即陽為病狂妄笑語士大夫多疑其欲讓爵遜兄者丞相御史劾奏之不得已受侯爵又曰左馮翊韓延壽行縣至高陵有昆仲相訟田延壽恥, SBCK: 戀}
