  - {type: variant, offset: 2594, length: 156, content: 有罪大人不遣乃遣少弟是吾不肖欲自殺其母為言公從之長男竟持其弟喪歸至其母及邑人盡哀之唯朱公獨笑曰吾固知必殺其弟也彼非不愛其弟也顧有所不能忘者也是少與我俱見苦為生難故重棄財至如少弟者生而見我富乘堅驅良逐狡兔豈知財所從來故輕棄之前日吾所以為欲遣少子固為其能棄財而長者不能故卒以殺其弟事之理也無足悲者吾日固已望其喪之來也, SBCK: ''}
