  - {type: variant, offset: 2752, length: 202, content: 蒙恬弟毅仕至上卿出則參乘入則御前蒙恬任外事而毅常為內謀名為忠信故雖諸將相莫敢與之爭焉又曰漢王滅項籍立為皇帝田橫懼誅與其徒屬五百餘人入海居島中高帝聞之以為田橫兄弟本定齊齊人賢者多附焉乃使赦田橫罪而召之田橫與其客二人乘傳詣雒陽謂其客曰橫始與漢王俱南面稱孤今漢王為天子而橫乃為亡虜北面事之其恥固已甚矣且吾烹人之兄與弟併肩而事王縱彼畏天子詔不敢動我獨不愧於心乎遂自剄令客奉其頭從使者馳奏之高帝曰嗟乎有以也夫起布衣, SBCK: 姜肱字伯淮}
