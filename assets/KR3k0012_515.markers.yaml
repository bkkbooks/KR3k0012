  - {type: variant, offset: 704, length: 5, content: 至聰兄弟之, SBCK: 報旣葬乃挂衰絰於家廬而去留書與盛曰鴻貪經書}
  - {type: variant, offset: 704, length: 388, content: 至聰兄弟之不固者也黃鳥黃鳥無集于桑無啄我梁此邦之人不可與明言旋言歸復我諸兄又斯干曰兄及弟矣式相好矣無相猶矣似續妣祖又行葦曰戚戚兄弟莫遠具爾或肆之筵或授之几又角弓曰角弓父兄剌幽王也不親九族而信讒佞骨肉相怨故作是詩也騂騂角弓翩其反矣兄弟婚姻無胥遠矣此今兄弟綽綽有裕不令兄弟交相為瘉又將仲子曰將仲子剌莊公也不勝其母以害其弟弟叔失道而公不制祭仲諫而公弗聽小不忍而致大亂焉將仲子兮無踰我牆無折我樹桑豈敢愛之畏我諸兄仲可懷也諸兄之言亦可畏也又揚之水曰揚之水不流束楚終鮮兄弟維予與汝無信人之言人實廷女揚之水不流束薪終鮮兄弟維予二人無信人之言人莫不信又皇矣曰維此王季因心則友則友其兄則篤其慶載錫之光又蓼蕭曰蓼彼蕭斯零露泥泥既見君子孔燕愷悌宜兄宜弟令德壽考為兄亦宜為弟亦宜禮記王制曰兄之齒鴈行朋友不相踰又檀弓曰子柳之母死子碩請具子柳曰何以哉子碩曰請粥庶弟之母子柳曰如之何其粥人之母以葬其母也不可, WYG: 報}
