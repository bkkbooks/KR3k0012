  - {type: variant, offset: 1592, length: 463, content: 仲聲己不視帷堂而哭襄仲欲勿哭惠伯曰喪親之終也惠伯叔彭生也雖不能始善終可也史佚有言曰兄弟致美救乏賀善弔災祭敬喪哀情雖不同母絕其愛親之道也子無失道何怨於人襄仲說帥兄弟以哭之又昭元曰秦后子有寵於桓如二君於景后子秦桓公子景公母地鍼也其權寵如兩君也其母曰弗去懼選鍼適晉具車千乘曰秦伯之弟鍼出奔晉罪秦伯也后子享晉侯造舟于河十里舍車自雍及絳歸取酬幣終事八反司馬侯問曰子之車盡於此而已乎對曰此之謂多矣若能少此吾何以得見焉又隱公曰鄭莊公弟共叔段居京謂之京城太叔祭仲諫曰都城過百雉國之害也無使滋蔓蔓難圖也蔓草猶不可除況君之寵弟乎又襄二曰吳諸樊既除喪將立季札杜預曰札諸樊弟也辭曰曹宣公之卒也諸侯與曹人不義曹君將立子臧子臧去之遂弗為也以成曹君君子曰能守節君義嗣也諸樊適子故曰義嗣誰敢干君有國非吾節也札雖不才願附於子臧以無失節固立之棄其室而耕乃舍之傳言季札之讓且明吳兄弟相傳又曰兄弟天倫兄先弟後天之倫次論語曰周有八士伯達伯適仲突仲忽叔夜叔夏季隨季騧包氏曰周時仲乳生八子皆為顯士故記之也又曰子路問曰何如斯可謂之士矣子曰切切偲偲怡怡如也可謂士矣朋友切切偲偲, SBCK: 􅂼食}
