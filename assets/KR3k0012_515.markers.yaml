  - {type: variant, offset: 3738, length: 1, content: 孤, SBCK: 巳旣出客問安王氏兄弟優劣安曰小者佳客問其故安曰􅁻人之辭寡察其言故知之甞與徽之共在一室忽然火發徽之遽走不遑取履獻之神色恬然徐呼左右扶出又曰散􅀐常侍祖納􅀄與弟約不睦中宗甚任約踈納納乃言於中宗曰約爲人外有國士之形内懷凌上之性抑而使之可也􅀂假其權必爲亂階中宗弗納納遂以兄弟相謗免官及後約爲逆論者始知納忠誠又曰顔含}
