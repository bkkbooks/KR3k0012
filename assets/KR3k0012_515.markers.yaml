  - {type: variant, offset: 855, length: 263, content: 勝其母以害其弟弟叔失道而公不制祭仲諫而公弗聽小不忍而致大亂焉將仲子兮無踰我牆無折我樹桑豈敢愛之畏我諸兄仲可懷也諸兄之言亦可畏也又揚之水曰揚之水不流束楚終鮮兄弟維予與汝無信人之言人實廷女揚之水不流束薪終鮮兄弟維予二人無信人之言人莫不信又皇矣曰維此王季因心則友則友其兄則篤其慶載錫之光又蓼蕭曰蓼彼蕭斯零露泥泥既見君子孔燕愷悌宜兄宜弟令德壽考為兄亦宜為弟亦宜禮記王制曰兄之齒鴈行朋友不相踰又檀弓曰子柳之母死子碩請具子柳曰何以哉子碩曰請粥庶弟之母子柳曰如之何其粥人之母以葬其母也不可既葬子碩欲以賻布之餘具祭器子柳曰不可吾聞之也君子不家, SBCK: 報迫}
