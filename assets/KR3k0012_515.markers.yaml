  - {type: variant, offset: 3388, length: 286, content: 罪又曰嚴延年兄弟五人有吏才至大官東海號其母曰萬石嚴嫗又曰金日磾兩子賞建俱為侍中與昭帝略同年共臥起賞為奉車建駙馬都尉及賞賜佩兩綬上謂霍將軍曰金氏兄弟兩人不可使俱兩綬耶霍光對曰賞自嗣父為侯耳上笑曰侯不在我與將軍乎光曰先帝之約有功乃得封侯又曰張延壽已歷位九卿既嗣侯國在陳留別邑在魏郡租入歲千餘萬延壽自以身無功德何以能久堪先人大國數上書讓減戶邑又因弟陽都侯彭祖口陳至誠天子以為有讓乃徙封平原并一國戶口如故而租稅減半又曰王商字子威涿郡蠡吳人商少為太子中庶子以肅敬敦厚稱父薨商嗣為侯推財以分異母諸弟身無所受居喪哀戚於是大臣薦商行可以勵群臣義足以厚風俗宜備近臣繇是擢為諸曹侍郎中郎將范曄, SBCK: 承}
