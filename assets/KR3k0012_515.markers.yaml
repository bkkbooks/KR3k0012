  - {type: variant, offset: 3678, length: 0, content: '', WYG: 郭賀字惠公潁川陽翟人也父鎮廷尉以功封定疑侯薨賀當襲爵上書讓與弟時詔書不聽遂竄逃匿三年孝順皇帝下大鴻臚切責州郡求賀強使就封國魏志曰袁術與紹有隙又與劉表不平而北連公孫瓚紹與瓚不和而南連劉表其兄弟攜貳舍近交逺如此魏略曰夏侯楙在西征時多蓄衆妾公主由此與楙不和其後羣弟不遵禮度楙數切責弟懼見治乃共搆楙帝意欲殺之以問長水校尉京兆叚黙黙以為誹謗之言不與實相應此清河公主與楙不睦出於䜛搆冀不待實耳且伏波與先帝有定天下功宜加三思帝意解曰吾亦以為然乃發詔問本為公主作表者果其羣弟子臧子佐欲搆疏楙使不見信又曰太傅司馬宣王久病曹爽擅政李豐依違時有謗書曰曹爽之勢熱如湯太傅父子冷如漿李豐兄弟如游}
