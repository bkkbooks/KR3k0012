  - {type: variant, offset: 2349, length: 5, content: 表求致仕優, WYG: 餘石而百姓皆以為陛下不憂憐之咸有怨言以今所營為者頗多不急之務故也又曰太宗初即位風聞諸曹案典受賂乃遣左右試以財物遺之有司聞令史受餽絹一疋上將殺之裴矩進諫曰此人受賂誠合重誅但陛下以物試人則行極法所謂䧟入其罪恐非道德齊禮之義上善之又曰髙宗朝}
  - {type: page-break, offset: 2349, content: '', id: KR3k0012_WYG_817-12b, image: WYG0900/WYG0900-0244b.png}
  - {type: variant, offset: 2349, length: 5, content: 表求致仕優, krp: 餘石而百姓皆以爲陛下不憂憐之咸有怨言又今所營爲樂多不急之務故也又曰太宗初即位風聞諸曹案典受賂乃遣左右試以財物遺之有司聞令史受餽絹一疋上將殺之裴短進諌曰此人受賂誠合重誅但陛下以物試人則行極法所謂固入其罪恐非導德齊禮之義上善之又曰髙宗朝}
