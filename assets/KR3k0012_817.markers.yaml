  - {type: variant, offset: 788, length: 0, content: '', SBCK: 不足矣隋書曰庫狄士文嘗入朝遇上置酒高㑹賜公卿入左藏任取多少人皆極重士文獨口衘絹一疋兩手各持一疋上問其故士文曰臣口手俱滿餘無所須上異之别加賞物勞而遣之唐書曰侍御史馬周上䟽云徃者貞觀之􅀄一疋絹纔得一斗米而天下怗然百姓知陛下甚憂憐之故人人自安曽無怨讟自五}
