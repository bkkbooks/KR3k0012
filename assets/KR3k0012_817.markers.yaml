  - {type: variant, offset: 1026, length: 666, content: 曰緗綺為下裳紫綺為上襦曹植詩曰西北有織婦綺縞何繽紛清晨秉機杼日暮不成文織成廣雅曰天笁出細織成續漢書輿服志曰虎賁武騎皆鶡冠虎文單衣襄邑歲獻織成虎文魏略曰大秦國用水羊毛木皮野繭絲作織成皆好色魏略曰大秦國出金織成帳吳時魏國傳曰大秦國天笁國皆出金縷織成晉後略曰張方兵入洛諸官府大劫掠御寶織成流蘇皆分割為馬棧矣晉令曰織成衣為禁物搜神記曰陳節謁諸神東海君以織成青襦一領遺之西京雜記曰宣帝被收繫郡岳臂上猶帶史良娣合采婉轉絲繩係身毒國寶鏡一枚大如八銖錢及即位常以琥珀笥盛之緘以戚里織成一曰斜文織成西京雜記曰趙飛鷰為皇后其女弟昭儀在昭陽殿遺飛鷰書曰今日嘉辰貴姉懋膺洪冊上襚三十五條以陳踊躍之志內有織成下裾杜蘭香傳曰蘭香降南郡張碩與碩織成袴衫鄴中記曰石虎冬月施流蘇斗帳懸金薄織成腕囊又曰石虎皇后出女妓二千為鹵簿冬月皆著紫綸巾熟錦袴腳著五文織成靴又曰石虎獵著金縷織成合歡袴高柔婦與柔書曰今奉織成袜一量綾釋名曰綾者其文望之似冰凌之理也漢官典職儀曰尚書郎直供青縑白綾被魏略曰大秦國有金縷繡雜色綾其色利得中國絲素解以為胡綾魏志曰楊阜字義山為城門校尉常見明帝著帽被縹綾半袖阜問帝曰此於禮何法服也帝默然晉咸康起居注曰詔臨邑使主范柳所貢物多絳綾是其所珍可籌量增賜晉安帝紀曰桓玄幼時會于西堂設伎樂上施絳綾帳縷金以為飾晉脩復山陵故事曰帝改服著白綾帽荀勗為晉文王與孫皓書曰餉雜色綾十端後魏書曰辛穆字叔宗舉茂才為雍州別駕初隨父在下邳與彭城陳敬文友善敬文弟敬武少為沙門從師遠學經久不返敬文病臨卒以雜綾二十疋託穆與敬武穆久不得見經一十年始於洛陽見敬武以物還之封題如故世稱廉信唐書, SBCK: ''}
