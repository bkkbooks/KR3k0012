  - {type: variant, offset: 572, length: 1, content: 躋, SBCK: 陳留章武傷腰折股貪人敗􅀋穢我明主又曰爾朱榮之奉莊帝召百官悉至河隂素聞元順數諫諍惜其諒直謂朱端曰可語元僕射但在省不須來順不達其旨聞害衣冠遂便出走馬爲鮮}
  - {type: variant, offset: 574, length: 11, content: 羅帷經于洞房司馬相如美, SBCK: 康奴所害家徒四壁無物歛尸令史王才逹裂裳覆之帝勑侍中元祉曰宗室䘮亡非一不可周贍元僕射清苦之節死乃益彰特贈絹百疋又曰楊津除歧州刺史巨細躬親孜孜不倦有武功}
