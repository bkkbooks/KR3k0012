  - {type: variant, offset: 1696, length: 0, content: '', SBCK: 即位風聞諸曹案典受賂乃遣左右試以財物遺之有司聞令史受餽絹一疋上將殺之裴短進諌曰此人受賂誠合重誅但陛下以物試人則行極法所謂固入其罪恐非導德齊禮之義上善之又曰髙宗朝詔自今巳後天下嫁女受財三品巳上之家不得過絹三百疋四品不過二百疋六品}
