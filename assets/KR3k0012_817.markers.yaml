  - {type: variant, offset: 2365, length: 0, content: '', WYG: 女於懷中抽兩疋絹與崔曰近自織此絹欲為君作禪衫未得裁縫今以贈離崔以錦八尺答之女取錦曰從此絶矣言畢倐然而滅至旦吿其家女父曰女昨夜忽然病夜亡崔曰君家絹帛無零失耶答云此女舊織餘絹兩疋在箱中女亡之始婦出絹欲裁為送終衣轉盻失之崔因此具説事狀先賢行状曰范郃字孝悌少時曽省外家逢掠者驅其牛取衣物去郃還車知賊不得席後三疋絹乃追呼令取之賊知長者悉還所取而辭謝焉三輔决録曰平陵士孫奮貲至一億七十萬富聞京師而性儉恡從子端辟梁冀掾奮送絹五疋食以乾魚鄴中記云石虎以辰日臘子日祀祖於殿庭立五仙人髙數丈五采幢葢大㑹羣臣於太武殿上命探其所得有得絹百疋有得數十疋者有得一二疋者虎輙大笑以為樂孔舒元在窮記曰大安二年六月賊變入門時見家有絹布三千餘疋及衣被器物皆令婢使輦出着庭中恣其所取魏武}
