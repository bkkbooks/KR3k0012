  - {type: variant, offset: 755, length: 1, content: 班, SBCK: 韓麒麟爲齊州刺史立性恭愼􅁪置律令於㘴傍臨終之日唯有俸絹數十疋清貧如是又曰陽平王子􅄛轉徐州刺史至州病重帝勑徐成}
  - {type: variant, offset: 757, length: 10, content: 侍講金華殿在織襦紈袴, SBCK: 乗傳療疾差成伯還帝曰卿定名醫賚絹三千疋成伯辭請受一千帝曰詩云人}
