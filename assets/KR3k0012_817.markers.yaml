  - {type: 'tls:seg', offset: 16, content: '', id: KR3k0012_CHANT_817-1a.8}
  - {type: variant, offset: 16, length: 1, content: 麤, SBCK: 盗驚自投地寔徐譬之曰視君狀皃不似惡人冝􅀷克巳反善然當由貧今遺絹二疋自是一縣無復盗竊魏略曰文帝在東宫嘗從曹洪貸絹百疋洪不及洪犯法自分必死後遂得原魏志曰趙儼爲朗陵長時􅀽紹舉兵南侵遣招誘䂊州諸郡多受其命唯陽安郡不動而都尉李通急録户調儼見通曰方今天下未集諸郡並叛懷附者復収其緜絹小人樂亂能無遺恨且逺近多虞不可不詳也通曰紹與大軍相持甚急左右郡縣皆叛乃爾􅀂緜絹不調送􅀚聽者必謂我顧望有所須待也儼曰誠亦如君慮然當權其輕重小緩調當爲君釋此患乃書與荀彧又曰孫禮爲楊州刺史呉大將全琮帥數萬衆來侵冦時州兵在者無幾禮躬勤禦之戰於芍陂禮犯䧟白刃馬􅀍數創手秉桴鼔􅁬不顧身賊衆乃退詔書慰勞賜絹七百疋魏略曰鮮卑素利等數來多以牛馬遺田䂊䂊輙送官胡以爲所䂊物顯露不如持金乃宻懷金三十斤謂䂊曰願辟左右我物有所遺豫從之胡因跪曰我見公貧故前後遺公牛馬公輙送官今宻以此上公}
  - {type: page-break, offset: 16, content: '', id: KR3k0012_SBCK_817-2a}
  - {type: variant, offset: 16, length: 1, content: 麤, WYG: 儼曰誠亦如君慮然當權其輕重小緩調當為君釋此患乃書與荀彧又曰孫禮為揚州刺史吳大將全琮帥數萬衆來侵冦時州兵使休在者無幾禮躬勒禦之戰於芍陂禮身蹈白刃馬被數鎗手秉桴鼓奮不顧身賊衆乃退詔書慰勞賜絹七百疋魏畧曰鮮卑素利等數來客見多以牛馬遺田豫豫輙送官胡以為所遺豫物顯露不如持金乃宻懐金三十斤謂豫曰願辟左右勿看所遺豫從之胡因跪曰我見公貧故前後遺公牛馬公輙送官今宻以此上公}
  - {type: page-break, offset: 16, content: '', id: KR3k0012_WYG_817-3a, image: WYG0900/WYG0900-0239c.png}
  - {type: variant, offset: 16, length: 1, content: 麤, krp: 盗驚自投地寔徐譬之曰視君狀皃不似惡人冝深克巳反善然當由貧今遺絹二疋自是一縣無復盗竊魏略曰文帝在東宫嘗從曹洪貸絹百疋洪不及洪犯法自分必死後遂得原魏志曰趙儼爲朗陵長時袁紹舉兵南侵遣招誘䂊州諸郡多受其命唯陽安郡不動而都尉李通急録户調儼見通曰方今天下未集諸郡並叛懷附者復収其緜絹小人樂亂能無遺恨且逺近多虞不可不詳也通曰紹與大軍相持甚急左右郡縣皆叛乃爾若緜絹不調送觀聽者必謂我顧望有所須待也儼曰誠亦如君慮然當權其輕重小緩調當爲君釋此患乃書與荀彧又曰孫禮爲楊州刺史呉大將全琮帥數萬衆來侵冦時州兵在者無幾禮躬勤禦之戰於芍陂禮犯䧟白刃馬𬒳數創手秉桴鼔奮不顧身賊衆乃退詔書慰勞賜絹七百疋魏略曰鮮卑素利等數來多以牛馬遺田䂊䂊輙送官胡以爲所䂊物顯露不如持金乃宻懷金三十斤謂䂊曰願辟左右我物有所遺豫從之胡因跪曰我見公貧故前後遺公牛馬公輙送官今宻以此上公}
  - {type: variant, offset: 19, length: 3, content: 𥱰物也, SBCK: 爲家資豫張䄂受之荅其厚意胡去後悉皆付外具以狀聞於是詔褒之曰昔魏絳開懷以納戎今卿舉䄂以受狄朕甚嘉焉乃即賜絹五百疋豫得賜分以其半藏小府後胡復來以半與之又曰田豫罷官歸居魏縣會汝南遣徤歩詣征北感豫宿恩過拜之豫爲殺雞炊黍送詣陌頭謂之曰罷老苦汝來過無能有益􅀂何徤歩愍其貧羸涕流而去還爲故吏民􅀃之汝南爲具資絹數千疋遣人餉豫豫一不受魏志曰景初中賜倭士王白絹五十疋}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_SBCK_817-2b}
  - {type: variant, offset: 19, length: 3, content: 𥱰物也, WYG: 為家資豫張袖受之答其厚意胡去後皆悉付外具以狀聞於是詔褒之曰昔魏絳開懐以納戎今卿舉袖以受狄朕甚嘉焉乃即賜絹五百疋豫得賜分以其半藏小府後胡復來以半與之又曰田豫罷官歸居魏縣㑹汝南遣健步詣征北感豫宿恩過拜之豫為殺雞炊黍送詣陌頭謂之曰罷老苦汝來過無能有益若何健步愍其貧羸流涕而去還為故吏民説之汝南為具資絹數千疋遣人餉豫豫一不受魏志曰景初中賜倭土王白絹五十疋}
