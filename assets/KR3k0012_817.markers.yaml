  - {type: variant, offset: 775, length: 1, content: 賈, SBCK: 王靈字羅漢爲南兖州刺史取官絹因染遂有割易御史糺劾㑹赦免又曰宋鴻貴爲定州北平府叅軍送戍兵於荆坐取兵絹四百疋兵欲告之乃斬兵十}
  - {type: variant, offset: 777, length: 7, content: 不得衣錦繡綺縠, SBCK: 又曰公孫􅁤爲武牢鎮將初太武將北征發驢以運粮使􅁤部調雍州䡄令驢主皆加絹一疋乃與受之百姓語曰驢無強弱􅀒絹自壯衆共嗤之北齊書曰崔暹遷尚書左僕射儀同三司時調絹以七尺爲丈暹言之乃依舊焉}
