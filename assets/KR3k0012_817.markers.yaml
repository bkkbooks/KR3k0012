  - {type: variant, offset: 2761, length: 813, content: 人姓沈名蹤與父同入山至夜二更中忽見一人著紗帽披絳綾袍云是鬭山王鬭山在餘杭縣秦記曰符堅以太常韋逞母宋氏傳其父業周官音義乃就宋家立講堂書生百人隔絳紗幔而受業焉綃毛詩義䟽曰楊之水素衣朱繡繡當為綃綃綺也禮記玉藻曰君子狐青裘豹襃玄綃衣以裼之君子大夫士也綃綺屬也染之於玄以狐青裘相宜也廣雅曰綃謂之緗晉令曰第六品已下不得服羅綃王子年拾遺記曰燕昭王二年廣延國來獻善舞者二人昭王處以單綃華幄又曰吳主孫權居昭陽宮倦暑乃褰紫綃之帷曹植洛神賦曰踐遠遊之文履曳霧綃之輕裾綈說文曰綈赤黃色也釋名曰綈似𧋘虫之色綠而澤也史記曰范睢改名為張祿相秦秦伐魏魏使須賈於秦睢為微行獘衣徒步入邸見須賈賈驚曰范叔無恙乎今叔何事睢曰為人賃賈意哀之留坐飲食曰叔寒如此哉乃取其綈袍以賜之後睢見賈賈頓首言死罪睢曰公所以得不死者以綈袍戀戀有故人之意故釋公漢書曰文帝身衣弋綈如淳曰弋帛也漢書儀曰太官湯官奴婢各三千人大置酒日皆綈褠蔽膝漢書儀曰印綬盛以篋篋以綠綈白表裏西京雜記曰漢制天子玉几冬則加綈錦其上謂之綈几諸侯皆以竹木為之不得加綈錦之飾王子年拾遺記曰漢成帝於太液池傍起宵遊宮以漆為柱鋪黑綈之幕又造飛行殿所幸之宮咸以氈綈籍地惡車轍馬跡之喧也竹林七賢論曰舊俗七月七日法當曬衣諸阮庭中爛然莫非錦綈阮咸時總角乃豎長竿摽大布犢鼻於庭中曰未能免俗爾鄴中記曰石虎尚方御府中巧工作錦織成署皆數百人有青綈或白綈或緋綈或黃綈或綠綈或紫綈范子計然曰綈出河東鹽鐵論曰鼲貂狢不益錦綈之寶是以王者不珍張衡西京賦曰木衣綈錦土被朱紫罽韋輝光毛詩問曰七月之時無褐箋云褐毛布也賤者之所服也今罽亦用為之爾雅曰氂罽也郭璞注曰毛氂所以為罽也犍捷為舍人注曰氂毛也罽胡人績羊毛作衣說文曰罽西胡毳布也吳曆曰魏文帝賜吳王太子罽二張吳志曰孫堅為董卓軍所攻堅與數十騎潰圍而出堅常著赤罽幘令親近將祖茂著之卓騎爭逐茂故堅從間道得免干寶晉紀曰孫皓遣使詔書賜班罽五十張絳罽二十張紫青罽各十五張崔鴻十六國春秋西秦錄曰沮渠蒙遜尚書郎王朽送戎罽千疋銀, SBCK: 旬}
  - {type: variant, offset: 2761, length: 813, content: 人姓沈名蹤與父同入山至夜二更中忽見一人著紗帽披絳綾袍云是鬭山王鬭山在餘杭縣秦記曰符堅以太常韋逞母宋氏傳其父業周官音義乃就宋家立講堂書生百人隔絳紗幔而受業焉綃毛詩義䟽曰楊之水素衣朱繡繡當為綃綃綺也禮記玉藻曰君子狐青裘豹襃玄綃衣以裼之君子大夫士也綃綺屬也染之於玄以狐青裘相宜也廣雅曰綃謂之緗晉令曰第六品已下不得服羅綃王子年拾遺記曰燕昭王二年廣延國來獻善舞者二人昭王處以單綃華幄又曰吳主孫權居昭陽宮倦暑乃褰紫綃之帷曹植洛神賦曰踐遠遊之文履曳霧綃之輕裾綈說文曰綈赤黃色也釋名曰綈似𧋘虫之色綠而澤也史記曰范睢改名為張祿相秦秦伐魏魏使須賈於秦睢為微行獘衣徒步入邸見須賈賈驚曰范叔無恙乎今叔何事睢曰為人賃賈意哀之留坐飲食曰叔寒如此哉乃取其綈袍以賜之後睢見賈賈頓首言死罪睢曰公所以得不死者以綈袍戀戀有故人之意故釋公漢書曰文帝身衣弋綈如淳曰弋帛也漢書儀曰太官湯官奴婢各三千人大置酒日皆綈褠蔽膝漢書儀曰印綬盛以篋篋以綠綈白表裏西京雜記曰漢制天子玉几冬則加綈錦其上謂之綈几諸侯皆以竹木為之不得加綈錦之飾王子年拾遺記曰漢成帝於太液池傍起宵遊宮以漆為柱鋪黑綈之幕又造飛行殿所幸之宮咸以氈綈籍地惡車轍馬跡之喧也竹林七賢論曰舊俗七月七日法當曬衣諸阮庭中爛然莫非錦綈阮咸時總角乃豎長竿摽大布犢鼻於庭中曰未能免俗爾鄴中記曰石虎尚方御府中巧工作錦織成署皆數百人有青綈或白綈或緋綈或黃綈或綠綈或紫綈范子計然曰綈出河東鹽鐵論曰鼲貂狢不益錦綈之寶是以王者不珍張衡西京賦曰木衣綈錦土被朱紫罽韋輝光毛詩問曰七月之時無褐箋云褐毛布也賤者之所服也今罽亦用為之爾雅曰氂罽也郭璞注曰毛氂所以為罽也犍捷為舍人注曰氂毛也罽胡人績羊毛作衣說文曰罽西胡毳布也吳曆曰魏文帝賜吳王太子罽二張吳志曰孫堅為董卓軍所攻堅與數十騎潰圍而出堅常著赤罽幘令親近將祖茂著之卓騎爭逐茂故堅從間道得免干寶晉紀曰孫皓遣使詔書賜班罽五十張絳罽二十張紫青罽各十五張崔鴻十六國春秋西秦錄曰沮渠蒙遜尚書郎王朽送戎罽千疋銀, WYG: 旬}
