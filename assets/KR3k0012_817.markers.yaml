  - {type: variant, offset: 735, length: 0, content: '', SBCK: 者到州以狀白津津乃下教云有}
  - {type: variant, offset: 736, length: 1, content: 命, SBCK: 着某色衣乗某馬在城東十里􅀍殺不知姓名􅀂有家人可速収視有一老母行哭而出云是巳子於是遣􅀐追収并絹具獲自是闔境畏服又曰楊津爲華州刺史先是受調絹度尺特}
  - {type: page-break, offset: 736, content: '', id: KR3k0012_SBCK_817-6a}
