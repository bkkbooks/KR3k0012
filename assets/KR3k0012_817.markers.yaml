  - {type: variant, offset: 2291, length: 3, content: 泰始九, krp: 論平呉功唯羊祐王濬張華三人各賜絹万疋其餘莫得比此于寳晉紀曰華譚依周馥及琅邪王遣甘卓攻馥譚先於卓有恩卓募人入城求譚入者至舎問華侯在不吾甘楊威使也譚曰不知華侯所在抽絹二疋授之使人還以告卓曰是華侯也晉陽秋曰有司奏依舊調編絹武帝不許又曰荆州刺史庾氷中子襲嘗貸官曹絹十疋氷怒撻之市絹還官又曰胡威字伯虎父質之爲荆州也威自京都省之停中十餘日告歸臨辭質賜其絹一疋爲道路粮威跪曰大人清髙不審於何得此絹質曰是吾俸之餘故以與汝耳又曰桓温入蜀聞有善星人招致之獨執其手於星下問國祚脩短星人曰太微紫微文昌三宫氣候决無憂虞五十}
