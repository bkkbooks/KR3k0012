  - {type: variant, offset: 8, length: 1, content: 羅, WYG: 絹䋌也其絲䋌厚而疏也東觀漢記曰南陽太守杜謂坐遣客為弟報仇被徵㑹病卒喪無所歸詔使持喪郡國邸賻絹七千疋謝承後漢書曰陳留夏馥避黨事遁迹黑山弟靖載絹往餉之於深陽縣客舍見馥顔色毁不復識聞其聲乃覺之華嶠後漢書曰李傕等大戰𢎞農百官士卒死者不可勝數董承宻招白波帥李岳等率衆來共擊傕等大破之乗輿乃得進承夜潜過曰先具舟船為應帝步出營臨河岸髙不得下時中官伏德扶中宫一手持十疋絹乃取德絹連續挽而下餘人匍匐岸側或自投水亡又曰陳寔居鄉閭平心率物有盜夜入其室止於梁上寔命子孫訓之曰不善之夫未必本不善習與性成如梁上君子是也盜驚自投地寔徐譬之曰視君狀貌不似惡人宜深克己反善然當由貧今遺絹二疋自是一縣無復盜竊魏畧曰}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_WYG_817-1b, image: WYG0900/WYG0900-0238d.png}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_WYG_817-2a, image: WYG0900/WYG0900-0239a.png}
  - {type: variant, offset: 8, length: 3, content: 羅文羅, krp: 絹䋌也其絲䋌厚而}
  - {type: punctuation, offset: 9, content: ，, id: KR3k0012_CHANT_817-bkkpn5}
  - {type: 'tls:seg', offset: 9, content: '', id: KR3k0012_CHANT_817-1a.5}
  - {type: variant, offset: 10, length: 2, content: 羅䟽, WYG: 帝在東宫嘗從曹洪貸絹百疋洪不稱意及洪犯法自分必死後遂得原魏志曰趙儼為朗陵長時袁紹舉兵南侵遣人招誘豫州諸郡多受其命惟安陽郡不動而都尉李通急斂户調儼見通曰方今天下未集諸郡並叛懷附者復收其緜絹小人樂亂能無遺恨且逺近多虞不可不詳}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_WYG_817-2b, image: WYG0900/WYG0900-0239b.png}
  - {type: punctuation, offset: 13, content: 。, id: KR3k0012_CHANT_817-bkkpn6}
  - {type: 'tls:seg', offset: 13, content: '', id: KR3k0012_CHANT_817-1a.6}
  - {type: variant, offset: 13, length: 2, content: 纚𥱰, SBCK: 東觀漢記曰南陽太守杜謂㘴遣客爲弟報仇􅀍徴㑹病卒䘮無所歸詔使持䘮郡國邸􅉠絹絹千疋謝承後漢書曰陳留夏馥避黨事遁迹黒山弟靖載絹徃餉之於深陽縣客舎見馥顔色衰毀不復識聞其聲乃覺之華嶠後漢書曰李􅔸等大戰弘農百官士卒死者不可勝數董承宻招白波帥李樂等率衆來共擊􅔸等大破之乗輿乃得進承夜潜過曰先具舟舩爲應帝歩出營臨河岸高不得下時中官伏徳扶中宫一手持十疋絹乃取德絹連續挽而下餘人匍匐岸側或自投死亡又曰陳寔在郷閭平心率物有盗夜入其室止於梁上寔見呼命子孫訓之曰不善之人未必本不慈習與性成如梁上君子是}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_SBCK_817-1b}
  - {type: variant, offset: 13, length: 2, content: 纚𥱰, WYG: 通曰紹與大軍相持甚急左右郡縣背叛乃爾若絲絹不調送觀聴者必謂我顧望有所湏待}
  - {type: variant, offset: 13, length: 2, content: 纚𥱰, krp: 東觀漢記曰南陽太守杜謂㘴遣客爲弟報仇𬒳徴㑹病卒䘮無所歸詔使持䘮郡國邸􅉠絹絹千疋謝承後漢書曰陳留夏馥避黨事遁迹黒山弟靖載絹徃餉之於深陽縣客舎見馥顔色衰毀不復識聞其聲乃覺之華嶠後漢書曰李􅔸等大戰弘農百官士卒死者不可勝數董承宻招白波帥李樂等率衆來共擊􅔸等大破之乗輿乃得進承夜潜過曰先具舟舩爲應帝歩出營臨河岸高不得下時中官伏徳扶中宫一手持十疋絹乃取德絹連續挽而下餘人匍匐岸側或自投死亡又曰陳寔在郷閭平心率物有盗夜入其室止於梁上寔見呼命子孫訓之曰不善之人未必本不慈習與性成如梁上君子是}
