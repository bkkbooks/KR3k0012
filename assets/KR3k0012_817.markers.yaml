  - {type: variant, offset: 2357, length: 1, content: 引, WYG: 家不得過絹三百疋四品不過二百疋六品七品不得過百疋皆充所嫁女之資装等用其夫家不得受陪門之財又曰文宗太和六年賜故衞國公李靖五代孫前鳳翔司録參軍彦芳絹二百疋衣笏一副并還先奏髙祖太宗書詔及官誥衣物等後唐史曰賜宰相李愚絹百疋錢百緡鋪陳物十三件時愚病上令中使宣問愚所居寢室蕭然四壁卧敝氈而已中使具言其事上曰嘻宰相月俸錢幾何而委頓如此故有是賜四王起事曰張方移惠帝於長安兵}
  - {type: page-break, offset: 2357, content: '', id: KR3k0012_WYG_817-13a, image: WYG0900/WYG0900-0244c.png}
