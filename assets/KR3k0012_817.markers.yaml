  - {type: variant, offset: 3708, length: 153, content: 萬市得雜罽十餘張紬說文曰紬大絲繒也釋名曰紬抽也抽引絲端細緒也又謂之絲掛也掛於杖端振舉之也北史曰袁韋脩為太常少卿出使巡省仍令考校官人得失經兗州時邢劭為刺史別後送白紬為別信聿脩不受與劭書云今日仰遇有異常行瓜田李下古人所慎願得此心不貽厚責劭亦欣然頓解報書云老夫忽忽意不及此敬承來旨吾無間然弟昔為清郎今日復作清卿矣, SBCK: 七}
