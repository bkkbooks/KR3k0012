  - {type: variant, offset: 729, length: 1557, content: 長之者服之使人命長本造者之意也有棋文方文如棋也漢書曰班伯侍講金華殿在織襦紈袴之間非其好也又曰賈人不得衣錦繡綺縠又曰孝文六年遺匈奴書使者言單于服繡祫綺衣東觀東記曰馬后袍極麤䟽諸主朝望見反以為綺后曰此繒染色好故直用之漢書儀曰祭天用六綵綺席六重長一丈干寶晉紀曰初洛中名服有白石綺織者尤之曰石非繒綵之稱晉令曰第三品已下得服雜杯之綺第六品已下得服七綵綺東宮舊事曰太子納妃有七綵杯文綺被一絳石杯文綺被一七綵杯文絳袴長命杯文綺袴司馬相如長文賦曰張羅綺之幔帷垂楚組之連綱班固西都賦曰紅羅颯纚綺組繽紛潘岳秋興賦序曰余兼虎賁中郎將寓直散騎之省珥蟬冕襲綺紈之士此馬遊處古詩曰客從遠方來贈我一端綺文作雙鴛鴦裁為合歡被又曰緗綺為下裳紫綺為上襦曹植詩曰西北有織婦綺縞何繽紛清晨秉機杼日暮不成文織成廣雅曰天笁出細織成續漢書輿服志曰虎賁武騎皆鶡冠虎文單衣襄邑歲獻織成虎文魏略曰大秦國用水羊毛木皮野繭絲作織成皆好色魏略曰大秦國出金織成帳吳時魏國傳曰大秦國天笁國皆出金縷織成晉後略曰張方兵入洛諸官府大劫掠御寶織成流蘇皆分割為馬棧矣晉令曰織成衣為禁物搜神記曰陳節謁諸神東海君以織成青襦一領遺之西京雜記曰宣帝被收繫郡岳臂上猶帶史良娣合采婉轉絲繩係身毒國寶鏡一枚大如八銖錢及即位常以琥珀笥盛之緘以戚里織成一曰斜文織成西京雜記曰趙飛鷰為皇后其女弟昭儀在昭陽殿遺飛鷰書曰今日嘉辰貴姉懋膺洪冊上襚三十五條以陳踊躍之志內有織成下裾杜蘭香傳曰蘭香降南郡張碩與碩織成袴衫鄴中記曰石虎冬月施流蘇斗帳懸金薄織成腕囊又曰石虎皇后出女妓二千為鹵簿冬月皆著紫綸巾熟錦袴腳著五文織成靴又曰石虎獵著金縷織成合歡袴高柔婦與柔書曰今奉織成袜一量綾釋名曰綾者其文望之似冰凌之理也漢官典職儀曰尚書郎直供青縑白綾被魏略曰大秦國有金縷繡雜色綾其色利得中國絲素解以為胡綾魏志曰楊阜字義山為城門校尉常見明帝著帽被縹綾半袖阜問帝曰此於禮何法服也帝默然晉咸康起居注曰詔臨邑使主范柳所貢物多絳綾是其所珍可籌量增賜晉安帝紀曰桓玄幼時會于西堂設伎樂上施絳綾帳縷金以為飾晉脩復山陵故事曰帝改服著白綾帽荀勗為晉文王與孫皓書曰餉雜色綾十端後魏書曰辛穆字叔宗舉茂才為雍州別駕初隨父在下邳與彭城陳敬文友善敬文弟敬武少為沙門從師遠學經久不返敬文病臨卒以雜綾二十疋託穆與敬武穆久不得見經一十年始於洛陽見敬武以物還之封題如故世稱廉信唐書曰太宗初七品以上服龜甲雙具十花綾其色綠九品已上服絲布及雜小綾其色青又曰長慶中淅西觀察使季德裕上表曰臣當道奉詔更令織定羅絲袍叚及盤絛綾一千疋況立鵝天馬豹盤絛文彩珍奇只合聖躬自服今所織千疋費用至多在臣愚誠亦所未諭乞酌臣當道物力所宜更賜節減即海隅蒼生無不受賜詔許罷進盤絛綾一千疋漢武內傳曰西王母侍女服紺綾之袍西京雜記曰霍光妻遺淳于衍散花綾二十五疋綾出鉅鹿陳寶光妻傳其法霍顯召入其弟使作之一疋直錢一萬又與綠綾七百端直錢百萬符丕荅謝玄書曰今往大文羅大絞綾各五疋縠三禮圖曰五綵方山冠以綵縠為之說文曰縠細繒也釋名曰穀粟也其形戚戚如也戰國策曰計見齊宣王宣王曰願聞先生直方正諫計曰王之憂國愛民不如王之愛一尺之縠王使人為冠不使左右便僻而使工者以為能也今治齊國非左右便僻無使也故王之愛民不如一尺之縠事具冠門漢書曰江充召見太一宮自請願以所常被服衣冠見上上許之充衣紗縠單衣東觀漢記曰建初二年詔齊相其止物復送冰紈方空縠董巴輿服志曰羽林左右監左右虎賁皆冠鶡紗縠單衣魏志曰袁術遂僣號荒侈滋甚後宮數百服綺縠餘梁肉楊子法言曰或曰霧縠之麗曰女工之蠹潛夫論曰小民或刻剝綺縠以成榆葉水波文抱朴子曰勁弩之餘力不能洞霧縠宋玉風賦曰主人女翳承日之華更被丹縠之單衣司馬相如子虛賦曰雜羅綃垂霧縠言細好如霧出以復須也劉楨魯都賦曰其女工則絳綺縠荀勗為晉文王與孫皓書曰餉縠三端紗東觀漢記曰馬融愽洽通儒教養諸生千數融好侈飾常施絳紗帳前授生徒後列女樂, WYG: 虞預}
