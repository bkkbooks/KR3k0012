  - {type: variant, offset: 747, length: 2, content: 方文, SBCK: 不許謂羣臣曰馥之著政雖古人何以加之賜絹五百疋又曰李元忠去任歸李魚川孝莊時盜賊蠭起清河有五百人西戎還經南趙郡以路梗共投元忠奉絹千餘疋元忠唯受一疋殺五牛以食之遣奴爲導曰􅀂逢賊但道李元忠遣}
  - {type: variant, offset: 750, length: 4, content: 棋也漢書, SBCK: 言賊皆舎避又}
