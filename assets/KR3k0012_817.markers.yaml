  - {type: variant, offset: 590, length: 143, content: 玉釵挂臣冠羅袖指臣衣張衡南都賦曰羅襪懾惵而容與古詩曰明月何皎皎照我羅床帷古歌詩曰大婦織綺羅中婦織流黃小婦無所作挾瑟上高堂阮籍詩曰西方有佳人皎皎如日光被服纖羅衣左右佩雙璫綺廣雅曰鬱金流黃綦綺說文曰綺文繒也釋名曰綺踦也其文欹邪不順經緯之縱橫也有杯文形似杯也有長命其采色相間皆橫也福言長之者服, SBCK: 告}
