  - {type: variant, offset: 2346, length: 1, content: 踰, krp: 家至貧約徴爲散騎常侍百姓乞留馥千餘人獻文不許謂羣臣曰馥之著政雖古人何以加之賜絹五百疋又曰李元忠去任歸李魚川孝莊時盜賊蠭起清河有五百人西戎還經南趙郡以路梗共投元忠奉絹千餘疋元忠唯受一疋殺五牛以食之遣奴爲導曰若逢賊但道李元忠遣如言賊皆舎避又曰韓麒麟爲齊州刺史立性恭愼恒置律令於㘴傍臨終之日唯有俸絹數十疋清貧如是又曰陽平王子衍轉徐州刺史至州病重帝勑徐成伯乗傳療疾差成伯還帝曰卿定名醫賚絹三千疋成伯辭請受一千帝曰詩云人之云亡邦國殄瘁以是而言豈惟三千疋乎又曰穆再轉汝陽太守遇水澇人飢上表請輕租賦帝從之遂勑汝陽一郡聽以小絹爲調又曰髙允卒詔給絹一千疋布二千疋綿五百斤錦五十疋雜綵百疋榖千斛以助喪用也又曰王靈字羅漢爲南兖州刺史取官絹因染遂有割易御史糺劾㑹赦免又曰宋鴻貴爲定州北平府叅軍送戍兵於荆坐取兵絹四百疋兵欲告之乃斬兵十人又曰公孫軌爲武牢鎮將初太武將北征發驢以運粮使軌部調雍州䡄令驢主皆加絹一疋乃與受之百姓語曰驢無強弱負絹自壯衆共嗤之北齊書曰崔暹遷尚書左僕射儀同三司時調絹以}
  - {type: variant, offset: 2348, length: 0, content: '', WYG: 尺為缺暹言之乃依舊焉又曰孝昭常賜百官射王晞中的當得絹為不書箭有司不與晞陶陶然曰我今可謂武有餘文不足矣隋書曰庫狄士文嘗入朝遇上置酒髙㑹賜公卿入左藏任取多少人皆極重士文獨口啣絹一疋両手各持一疋上問其故士文曰臣口手俱滿餘無所湏上異之别加賞物勞而遣之唐書曰侍御史馬周上䟽云徃者貞觀之初一疋絹纔得一斗米而天下帖然百姓知陛下甚憂憐之故人人自安曽無怨讟自五六年來頻嵗豐稔一疋絹得粟}
  - {type: page-break, offset: 2348, content: '', id: KR3k0012_WYG_817-12a, image: WYG0900/WYG0900-0244a.png}
  - {type: variant, offset: 2348, length: 0, content: '', krp: 尺爲丈暹言之乃依舊焉又曰孝昭常賜百官射王晞中的當得絹爲不書箭有司不與晞陶陶然曰我今可謂武有餘文不足矣隋書曰庫狄士文嘗入朝遇上置酒高㑹賜公卿入左藏任取多少人皆極重士文獨口衘絹一疋兩手各持一疋上問其故士文曰臣口手俱滿餘無所須上異之别加賞物勞而遣之唐書曰侍御史馬周上䟽云徃者貞觀之𥘉一疋絹纔得一斗米而天下怗然百姓知陛下甚憂憐之故人人自安曽無怨讟自五六年來頻歳豐稔一疋絹得粟}
