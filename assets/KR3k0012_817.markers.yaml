  - {type: variant, offset: 2365, length: 0, content: '', SBCK: 女於懷中抽兩疋絹與崔曰近自織此絹欲爲君作禪衫未得裁縫今以贈離崔以錦八尺荅之女取錦曰從此絶矣言畢豁然而滅至旦告其家女父曰女昨夜忽心痛夜亡崔曰君家絹帛無零失耶荅云此女舊織餘兩疋絹在箱中女云之始婦出絹欲裁爲送終衣轉眄失之崔因此具􅀃事狀先賢行狀曰范郃字孝悌少時㑹省外家逢掠者駈其牛取衣物去郃還車知賊不得席後三疋絹乃追呼令取之賊知長者悉還所取而辭謝焉三輔决録曰平陵士孫􅁬貲至一億七十萬冨聞京師而性儉􅪟從子瑞辟梁兾掾奮送絹五疋食以乾魚鄴中記云石虎以辰曰臘子曰祖祖於殿庭立五仙人高數丈五綵幢蓋大㑹羣臣於太武殿上祖曰探三探乃有得絹百疋者有得數十疋者有得土者虎輙大􅀏以爲樂孔舒元在窮記曰太安二年六月賊遂來入門時家見有絹布三千餘疋及衣􅀍器物皆令婢使輦出著庭中恣其所取魏武}
  - {type: page-break, offset: 2365, content: '', id: KR3k0012_SBCK_817-9a}
