  - {type: variant, offset: 2319, length: 0, content: '', WYG: 吉士瞻少時嘗於南蠻國中擲塼無褲褰露為儕輩所侮及平魯休烈軍得絹三萬疋乃作百褲其外並賜軍士不以入室又曰劉孝綽為吏部郎坐受人絹一束為餉者所訟左遷信威臨賀}
  - {type: variant, offset: 2319, length: 0, content: '', krp: 吉士瞻少時嘗於南蠻國中擲塼無禈褰露爲儕軰所侮及平魯休烈軍得絹三萬疋乃作百禈於外並賜軍土不以入室又曰劉孝綽爲吏部郎坐受人絹一束爲餉者所訟左遷信威臨賀}
  - {type: variant, offset: 2320, length: 4, content: 僧孺幼貧, WYG: 長史又曰任昉為義興太守及被代登舟止有絹七疋米五石至都無衣鎮軍將軍沈約遺裙衫迎之又曰費昶善為樂府嘗作鼓吹曲武帝重之勑曰才意新拔有足嘉異昔邯鄲博物卞蘭巧辭束帛之賜實為勸善可賜絹十疋又曰周石珍建康之廨𨽻也世以販絹為業又曰傅昭為臨海太守縣令嘗餉粟寘絹於簿下昭笑而還之又曰裴䆳為北梁秦二州刺史復開創屯田數千頃倉廩盈實省息邊運人吏獲安乃相率餉絹千餘疋䆳從曰汝等不應爾吾又不可逆汝納}
