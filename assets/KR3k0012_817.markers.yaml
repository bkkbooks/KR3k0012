  - {type: variant, offset: 768, length: 4, content: 間非其好, SBCK: 云亡􅀖國殄瘁以是而言豈惟三千疋乎又曰穆再轉汝陽太守遇水澇人飢上表請輕租賦帝從之遂勑汝陽一郡聽以小絹爲調又曰髙允卒詔給絹一千疋布二千疋綿五百斤錦五十疋雜綵百疋榖千斛以助喪用}
