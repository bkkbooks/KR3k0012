  - {type: variant, offset: 1882, length: 186, content: 一疋直錢一萬又與綠綾七百端直錢百萬符丕荅謝玄書曰今往大文羅大絞綾各五疋縠三禮圖曰五綵方山冠以綵縠為之說文曰縠細繒也釋名曰穀粟也其形戚戚如也戰國策曰計見齊宣王宣王曰願聞先生直方正諫計曰王之憂國愛民不如王之愛一尺之縠王使人為冠不使左右便僻而使工者以為能也今治齊國非左右便僻無使也故王之愛民不如一尺之縠事具冠門漢書曰江充召見太一宮自請願以所常被服衣冠見上上許之充衣紗縠單衣東觀漢, SBCK: 述異}
