  - {type: variant, offset: 544, length: 0, content: '', SBCK: 濬張華三人各賜絹万疋其餘莫得比此于寳􅀳紀曰華譚依周馥及琅邪王遣甘卓攻馥譚先於卓有恩卓募人入城求譚入者至舎問華侯在不吾甘楊威使也譚曰不知華侯所在抽絹二疋授之使人還以告卓曰是華侯也􅀳陽秋曰有司奏依舊調編絹}
  - {type: variant, offset: 545, length: 0, content: '', SBCK: 帝不許又曰荆州刺史􅁃氷中}
  - {type: punctuation, offset: 546, content: ，, id: KR3k0012_CHANT_817-bkkpn186}
  - {type: 'tls:seg', offset: 546, content: '', id: KR3k0012_CHANT_817-10a.4}
  - {type: variant, offset: 546, length: 8, content: 供饌悉用琉璃器婢, SBCK: 襲嘗貸官曹絹十疋氷怒撻之市絹還官又曰胡威字伯虎父質之爲荆州也威自京都省之停中十餘日告歸臨辭質賜其絹一疋爲道路粮威跪曰大人清髙不審於何得此絹質曰是吾俸之餘故以與汝耳又曰􅁊温入蜀聞有善星人招致之獨執其手於星下問國祚脩短星人曰太微紫微文昌三宫氣候决無憂虞五十年外不論耳温不悅送絹一疋錢五千與之􅀳中興書曰翟楊字道淵㝷陽人太守于寳遣船餉之勑吏曰翟公廉讓卿致書訖便委船還楊無人送致乃更貨易絹物因􅀉還寳宋書曰沈慶之年八十夢有人以兩疋絹與之謂曰此絹足度寤而謂人曰老}
  - {type: page-break, offset: 546, content: '', id: KR3k0012_SBCK_817-4a}
  - {type: punctuation, offset: 553, content: 。, id: KR3k0012_CHANT_817-bkkpn187}
  - {type: 'tls:seg', offset: 553, content: '', id: KR3k0012_CHANT_817-10a.5}
  - {type: variant, offset: 555, length: 0, content: '', SBCK: 今年不免矣兩疋八十尺也足度無盈餘矣是歳果卒又曰李安人行南徐州事叅軍王廻素爲安人所親盗絹二疋安人流涕謂曰我與卿契闊備甞今日犯王法乃卿􅀒我也於軍門斬之又曰孝武時齊庫上絹年調鉅万疋綿亦稱此期嚴限峻人間買絹一疋至二三千緜一兩三四百貧者賣妻子甚者或自縊死沈懷文具陳人困由是緜絹薄有所減又曰阮佃夫佞幸專權有人餉絹二百疋嫌少不荅書齊書曰䂊章王嶷拜陵還過延陵季子廟觀沸井有水牛突部伍直兵執牛推問嶷不許取絹一疋撫繫牛角放歸其家又曰蕭赤斧遷給事中太子詹事卒於家貧無絹衾衣梁書曰吉士瞻少時嘗於南蠻國中擲塼無禈褰露爲儕軰所侮及平魯休烈軍得絹三萬疋乃作百禈於外並賜軍土不以入室又曰劉孝綽爲吏部郎坐受人絹一束爲餉者所訟左遷信威臨賀王長史又曰任昉爲義興太守及􅀍代登舟止有絹七疋米五石至都無衣鎭軍將軍沈約遺裠衫迎之又曰費昶善爲樂府甞作皷吹曲武帝重之勑曰才意新拔有足嘉異昔邯鄲􅀶物卞蘭巧辭束帛之賜實惟勸善可賜絹十疋又曰周石珎建康之廨􅊢也世以販絹爲業又曰傅昭爲臨海太守縣令甞餉栗寘絹于簿下昭􅀏而還之又曰裴邃爲北梁􅁗二州刺史復開創屯田數千頃倉􅅒盈實省息邊運人吏獲安乃相率餉絹千餘疋邃從曰汝等不應爾吾又不可逆汝納其二疋而巳後魏書曰李崇在官和厚明於决斷然性在財賄販肆聚歛上令王公巳下從者}
