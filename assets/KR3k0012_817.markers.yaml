  - {type: variant, offset: 2357, length: 1, content: 引, krp: 家不得過絹三百疋四品不過二百疋六品七品不得過百疋皆充所嫁女之資裝等用其夫家不得受陪門之財又曰文宗大和六年賜故衛國公李靖五代孫前鳯翔司録叅軍芳絹二百疋衣笏一副并還先奏髙祖太宗書詔及官告衣物等後唐史曰賜宰相李愚絹百疋錢百緡鋪陳物一十三什時愚病上令中使宣問愚所居寢室蕭然四壁卧弊氊而巳中使具言其事上曰嘻宰相月俸錢幾何而委頓如此故有是賜四王起事曰張方移惠帝於長安兵人}
  - {type: variant, offset: 2359, length: 2, content: 陳謝, WYG: 内殿取物人持調御絹二疋幅自魏晉之積將百餘萬疋三日揵之尚不缺角四王起事曰惠帝於鄴與成都王還洛陽出城倉卒上下無持資食乏調道中有驅羊二百餘口者便將之洛得以為糧至洛盧志啓以古藏絹倍還羊主搜神記曰永嘉中有天竺胡人能取絹與人各執一頭剪㫁之已而取兩段合持之則復還連絲可練無異故體也又曰吳先主病遣人於門觀不祥巫啓見一鬼着絹布似是大臣將相其夜先主夢見魯肅來入衣巾如之述異記曰清河崔基寓居青州朱氏女姿容絶倫崔傾懷招攬約女為妾後三更中忽聞扣門外崔披衣出迎女雨淚嗚咽云適得暴疾喪亡忻愛永奪}
  - {type: page-break, offset: 2359, content: '', id: KR3k0012_WYG_817-14a, image: WYG0900/WYG0900-0245a.png}
  - {type: variant, offset: 2359, length: 2, content: 陳謝, krp: 殿取物特調御絹二尺幅自魏晉之積將百餘萬疋三日取之尚不缺角四王起事曰惠帝於鄴與成都王還洛陽出城倉卒上下無持資食之調道中有駈羊二百餘口者便勒將至洛得以爲糧至洛盧志啓以右藏絹倍還羊主捜神記曰永嘉中有天笁胡人能取絹與人各執一頭剪斷之巳而取兩叚合持之則復還連緜可練無異故體也又曰呉先主病遣人於門觀不祥巫啓見一鬼著絹巾似是大臣將相其夜先主夢見魯肅來入衣巾如之述異記曰清河崔基寓居青州朱氏女姿容絶倫崔頃懷招賢約女爲妾後三更中忽聞扣門外崔披衣出迎女雨淚嗚咽云適得暴疾䘮亡忻愛永奪}
