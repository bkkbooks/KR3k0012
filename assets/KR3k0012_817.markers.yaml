  - {type: 'tls:seg', offset: 738, content: '', id: KR3k0012_CHANT_817-14a.13}
  - {type: variant, offset: 738, length: 2, content: 本造, SBCK: 在事因縁共相進退百姓苦之津乃令依公尺其輸物尤好}
  - {type: variant, offset: 741, length: 0, content: '', SBCK: 賜以杯酒而出其所輸少劣者爲受}
  - {type: variant, offset: 742, length: 2, content: 意也, SBCK: 但無酒以示其耻於是競相勸勵官調更勝又曰趙柔}
  - {type: punctuation, offset: 744, content: 。, id: KR3k0012_CHANT_817-bkkpn268}
  - {type: 'tls:seg', offset: 744, content: '', id: KR3k0012_CHANT_817-14a.14}
  - {type: variant, offset: 745, length: 1, content: 棋, SBCK: 人遺柔鏵數百枚者柔與子善明鬻之市有人從柔買索絹二十疋有啇人知其賤與柔三十疋善明欲取之柔曰與人交易一言便定豈可以利動心遂與之搢紳之流聞而敬服又曰陸馥爲相州刺史發姦擿伏事無不驗百姓以爲神明無敢刼盜者在州七年家至貧約徴爲散􅀐常侍百姓乞留馥千餘人獻}
  - {type: page-break, offset: 745, content: '', id: KR3k0012_SBCK_817-6b}
