  - {type: variant, offset: 2345, length: 0, content: '', krp: 賜之多者過二百疋少者百餘唯長樂公兩手持絹二十疋而出亦不異衆而當世稱其廉儉尚書令任城王澄疾不起賜絹百疋崇與章武王融以所負過多顛仆於地崇乃復腰融至損脚時人爲之語曰陳留章武傷腰折股貪人敗類穢我明主又曰爾朱榮之奉莊帝召百官悉至河隂素聞元順數諫諍惜其諒直謂朱端曰可語元僕射但在省不須來順不達其旨聞害衣冠遂便出走馬爲鮮于康奴所害家徒四壁無物歛尸令史王才逹裂裳覆之帝勑侍中元祉曰宗室䘮亡非一不可周贍元僕射清苦之節死乃益彰特贈絹百疋又曰楊津除歧州刺史巨細躬親孜孜不倦有武功人賞絹三疋去城十里爲賊所刼時有使者馳馹而至𬒳刼人因以告之使者到州以狀白津津乃下教云有人着某色衣乗某馬在城東十里𬒳殺不知姓名若有家人可速収視有一老母行哭而出云是巳子於是遣騎追収并絹具獲自是闔境畏服又曰楊津爲華州刺史先是受調絹度尺特長在事因縁共相進退百姓苦之津乃令依公尺其輸物尤好者賜以杯酒而出其所輸少劣者爲受之但無酒以示其耻於是競相勸勵官調更勝又曰趙柔有人遺柔鏵數百枚者柔與子善明鬻之市有人從柔買索絹二十疋有啇人知其賤與柔三十疋善明欲取之柔曰與人交易一言便定豈可以利動心遂與之搢紳之流聞而敬服又曰陸馥爲相州刺史發姦擿伏事無不驗百姓以爲神明無敢刼盜者在州七}
  - {type: variant, offset: 2346, length: 1, content: 踰, WYG: 家至貧約徵為散騎常侍百姓乞留馥千餘人獻文不許謂羣臣曰馥之著政雖古人何以加之賜絹五百疋又曰李元忠去任歸魚川孝莊時盜賊蠭起清河有五百人西戎還經南趙郡以路梗共投元忠奉絹千餘疋元忠惟受一疋殺五牛以食之遣奴為導曰若逢賊但道李元忠遣如言賊皆舍避又曰韓麒麟為齊州刺史立性恭慎恒置律令於坐傍臨終之日惟有俸絹數十疋清貧如是又曰平陽王子衍轉徐州刺史至州病重帝𠡠徐成伯乘傳療疾徐成伯還帝曰卿定名醫賚絹三千疋成伯辭請受一千帝曰詩云人之云亡邦國殄瘁以是而言豈惟三千疋乎又曰辛穆再轉汝陽太守遇水澇人飢上表請輕租賦帝從之遂勅汝陽一縣聴以小絹為調又曰髙允卒詔給絹一千疋布二千疋錦五百斤錦五十疋雜綵百疋榖千斛以周喪用也又曰王靈字羅漢為南兖州刺史取官絹因染遂有割易御史糾劾㑹赦免又曰宋鴻貴為定州北平府恭軍送戍兵于荆坐取兵絹四百疋兵欲吿之乃斬兵十人又曰公孫軌為武牢鎮將初太武將北征發驢以運糧使軌部調雍州軌令驢主皆加絹一疋乃與受之百姓語曰驢無强弱負絹自壯衆共嗤之北齊書曰崔暹遷尚書左僕射儀同三司時調絹以}
