  - {type: variant, offset: 40, length: 1, content: 自, SBCK: 丹陽太守李衡每欲治家妻輙止之衡宻遣客十人於武陵龍陽洲上作宅種甘千株臨死勑兒曰汝母惡吾治家故窮如是然吾州里有千頭木奴不責汝衣食歳止一疋絹亦足用耳衡亡後二十餘日以問母曰此當是種甘也汝家失十戸客七八年必汝父遣爲宅汝父嘗稱太史}
