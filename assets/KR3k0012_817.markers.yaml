  - {type: variant, offset: 2343, length: 1, content: 根, krp: 於决斷然性在財賄販肆聚歛上令王公巳下從者百餘人皆令任負布絹即}
  - {type: variant, offset: 2345, length: 0, content: '', WYG: 下從者百餘人皆令任負布絹即以賜之多者過二百疋少者百餘惟長樂公兩手持絹二十疋而出亦不異衆而當世稱其亷儉尚書令任城王澄疾不起賜絹百疋崇與章武王融以所負過多顛仆於地崇乃傷腰融至損脚時人為之語曰陳留章武傷腰折股貪人敗類穢我明主又曰爾朱榮之奉荘帝召百官悉至河隂素聞元順類諌諍惜其諒直謂朱端曰可語元僕射但在省不湏來順不達其㫖聞言不及衣冠遂便出走為鮮子康奴所害家徒四壁無物歛尸令史王才達裂裳覆之帝􅃯侍中元祉曰宗室喪亡非一不可周贍元僕射清苦之節死乃益彰特贈絹百疋又曰楊津除岐州刺史巨細躬親孜孜不倦有武功人賫絹三疋去城十里為賊所刼時有使者馳驛而至被刼人因以告之使者到州以狀白津乃下教云有人着某色衣乗某色馬在城東十里被殺不知姓名若有家人可速收視有一老母行哭而出云是己子於是遣騎追收并絹俱獲自是闔境懾服又曰楊津為華州刺史先是受調絹度尺特長從事因縁共相進退百姓苦之津乃令依公尺其輸物尤好者賜以盃酒而出其所輸少劣者為受之但無酒以示其耻於是競相勸勵官調更勝又曰趙柔有人與柔鞾數百枚者柔與子善明鬻之于市有從柔買索絹二十疋有商人知其賤與柔三十疋善明欲取之柔曰與人交易一言便定豈可以利動心遂與之搢紳之流聞而敬服又曰陸馥為相州刺史發姦摘伏事無不驗百姓以為神明無敢刼盜者在州七}
