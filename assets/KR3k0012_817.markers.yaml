  - {type: variant, offset: 2295, length: 4, content: 帝多簡良, WYG: 外不論耳温不悦送絹一疋錢五千與之晉中興書曰翟湯字道淵潯陽人太守干寳遣船餉之𠡠吏曰翟公亷讓卿致書訖便委船還湯無人送致乃更貨易絹物因寄還寳宋書曰沈慶之年八十夢有人以兩疋絹與之謂曰此絹足度寤而謂人曰老子今年不免矣兩疋八十尺也足度無盈餘矣是嵗果卒又曰李安民行南齊州事城局參軍王迥素為安民所親盜絹二疋安民流涕謂曰我與卿契濶備常今日犯王法乃卿負我也於軍門斬之又曰孝武時齊庫上絹年調鉅萬疋綿亦稱此期嚴限峻民間買絹一疋至二三千綿一兩三四百貧者賣妻子甚者或自縊死沈懷文具陳民困由是緜絹薄有所减又曰阮佃夫佞幸專權有人餉絹二百疋嫌少不答書齊書曰豫章王嶷拜陵還過延陵季子廟觀沸井有水牛突部伍直兵執牛推問嶷不許取絹一疋横繫牛角放歸其}
