  - {type: variant, offset: 194, length: 74, content: 可掣而絕淮南子曰齊俗有繁繡羅紈漢武內傳曰帝以七月七日掃除宮掖之內設大床於殿上以紫羅薦地燔百和香燃九微燈以待西王母西京雜記曰趙飛鷰為皇后女弟在昭陽殿遺, SBCK: 來與節言虞預􅀳}
  - {type: variant, offset: 194, length: 314, content: 可掣而絕淮南子曰齊俗有繁繡羅紈漢武內傳曰帝以七月七日掃除宮掖之內設大床於殿上以紫羅薦地燔百和香燃九微燈以待西王母西京雜記曰趙飛鷰為皇后女弟在昭陽殿遺書曰今日嘉辰貴姉懋膺洪冊上襚三十條以陳踊躍金花紫羅面衣織成襦羅帷羅幌羅帳羅幬黃庭經曰黃庭為不死之道受者先齋九日然後受之結盟立誓期以勿渫古者盟以玄雲之錦九十尺金簡鳳文羅四十尺徐延年別傳曰道士姓徐名延年仙人以新黃羅衣衣之王子年拾遺記曰周氏王五年因祗國獻女工一人善於工巧體貌輕潔被纖羅新繡之衣又曰吳主孫權居昭陽宮趙夫人乃織羅縠累月而成裁之為幔內外視之飄飄如煙氣輕動而房內自涼異苑曰張仲舒為司空廣陵城北元嘉年七月中輒見門側有赤氣赫然後空中忽雨絳羅於其庭內廣七八分長五六寸皆以箋紙繼之廣長亦, WYG: 來}
