  - {type: variant, offset: 564, length: 7, content: 擎飲食宋玉風賦, SBCK: 持絹二十疋而出亦不異衆而當世稱其廉儉尚書令任城王澄疾不起賜絹百疋崇與章武王融以所􅀒過多顛仆於地崇乃復腰融至損脚時人爲之語}
