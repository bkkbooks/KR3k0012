  - {type: variant, offset: 1727, length: 0, content: '', SBCK: 文宗大和六年賜故衛國公李靖五代孫前鳯翔司録叅軍芳絹二百疋衣笏一副并還先奏髙祖太宗書詔及官告衣物等後唐史曰賜宰相李愚絹百疋錢百緡鋪陳物一十三什時愚病上令中使宣問愚所居寢室蕭然四壁卧弊氊而巳中使具言其事上曰嘻宰相月俸錢幾何而委頓如此故有是賜四王起事曰張方移惠帝於}
