  - {type: variant, offset: 2320, length: 4, content: 僧孺幼貧, krp: 長史又曰任昉爲義興太守及𬒳代登舟止有絹七疋米五石至都無衣鎭軍將軍沈約遺裠衫迎之又曰費昶善爲樂府甞作皷吹曲武帝重之勑曰才意新拔有足嘉異昔邯鄲博物卞蘭巧辭束帛之賜實惟勸善可賜絹十疋又曰周石珎建康之廨􅊢也世以販絹爲業又曰傅昭爲臨海太守縣令甞餉栗寘絹于簿下昭笑而還之又曰裴邃爲北梁秦二州刺史復開創屯田數千頃倉廩盈實省息邊運人吏獲安乃相率餉絹千餘疋邃從曰汝等不應爾吾又不可逆汝納}
