  - {type: variant, offset: 2496, length: 207, content: 道虔從弟元明隔紗帷以聽焉唐書曰太宗幸蒲州刺史趙元揩服黃紗單衣迎謁路左東宮舊事曰皇太子初拜有絳紗單衣王子年拾遺記曰漢武帝思李夫人不可復得詔董仲君曰朕思李氏其可得乎仲君曰可遙見而不可同帷幄有潛英石色青輕如毛羽寒盛則石溫暑盛則石冷刻之人像不異真人使此像往則夫人至矣乃遣人至海經年而還得此石命工衣李夫人彩刻成置於輕紗幕裏宛若生時帝大悅又曰江漢之民至暮春上巳之日禊集之祠或結五色紗囊盛食沉於波中以言蛟龍水虫畏之不侵食也蔡克別, SBCK: ''}
