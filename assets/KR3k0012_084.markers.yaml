  - {type: variant, offset: 4534, length: 0, content: '', SBCK: 渡於盟津陽侯之波逆流而擊疾風晦暝人馬不見於是武王左操黄􅃏右執白旄瞋目而麾之曰余在天下誰敢害吾意者於是風濟而波罷又曰武王克殷欲築宫於五行之山五行山今太行山也河內野王縣北上黨間周公曰不可夫五行之山固塞險阻之地也使我德能覆之則天下納其貢職者迴也迴迃難也使我有暴亂之行則天下之伐我難周公言我有暴乱之行則天下當來伐我無爲於五行之山使天下來伐我者難也言其依徳不恃嶮也此所以三十六世而不奪也􅀃苑曰武王伐}
