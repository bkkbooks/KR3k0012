  - {type: variant, offset: 4287, length: 0, content: '', SBCK: 作牧誓尚書中􅀱曰太子發以紂存三仁附三仁箕子比干微子也即位不稱王渡于盟津中流受文命待天謀白魚躍入王舟王俯取魚長三尺赤文有字題目下名授右右助也天吿以伐紂之意是其助也有火自天出于王屋流爲赤烏五至以榖俱來流行也五至猶五來赤烏成文雀書之福文王得赤雀丹書今武王致赤烏俱應}
