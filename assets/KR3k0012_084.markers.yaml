  - {type: variant, offset: 5521, length: 0, content: '', SBCK: 且傷之以公禮葬之天乃大暴風疾雨禾稼皆偃木折傷成王懼發金縢之書見周公所爲武王禱命以身贖之書成王執書而泣曰誰言周公欲危社稷者取所䜛公者而誅之戮於國天乃反風霽􅀨禾稼復起成王作思慕之歌太平御覽卷第八十四按本卷有錯簡五處玆據日本學訓堂倣宋聚珍版曁鮑崇城本訂正並於銜接處加爲識其原式如左今第一葉後十一行次曰虞仲止次行原爲今第二葉前十三行尙書帝命驗曰今第二葉前十二行太子發立止次行原爲今第三葉前九行帝王世紀曰今第三葉前一行山林不昇下原接今第一葉後十一行太姜生少子季歷今第三葉前八行乃可以有國焉止次行原爲今同葉後十行詩曰文王在上今第三葉後九行身長八尺二寸下原接今同葉前一行以成草木之長但今第三葉前一行山林不昇句聚珍版鮑刻昇均作升下有斧斤二字今檢逸周書皆同併記}
