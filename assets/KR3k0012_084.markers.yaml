  - {type: variant, offset: 3470, length: 197, content: 丁祭成湯有飛雉升鼎耳而雊武丁問祖乙祖乙曰野鳥不當升鼎欲為用也則遠方將有來朝者乎三年編髮重譯來朝者六國孔子曰吾於高宗肜日見德有報之疾肜日尚書篇名史記曰帝武丁即位思復興殷而未得其佐三年不言政事事決定於冢宰以觀國風武丁夜夢得聖人名曰說以夢所見視群臣百吏皆非也於是使百工營求之野得說於傅巖中是時說為胥靡築於傅巖見於武丁武丁曰是也得而與之語果聖人舉以為相殷國大治武丁祭成湯明日有飛雉登鼎耳而雊武丁懼祖己曰, SBCK: ''}
