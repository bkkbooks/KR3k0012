  - {type: variant, offset: 774, length: 2, content: 悉合, SBCK: 同心而苦之文王四世累善大王王季文王武王凡四世也修徳行義處岐周之間地方不過百里天下二分歸之文王欲以卑弱制強暴以爲天下去殘除賊而成王道故太公之謀主也太公爲周陳隂符兵謀也賈􅁩書曰文王晝卧夢人登城而呼巳曰我東北陬之腐骨也速以人君葬我文王曰諾􅁴召吏視之信有焉文王曰速以人君葬之吏曰此無主請以五大夫文王曰吾夢中巳許之矣奈何其背也士民聞之曰我君不以夢之故背腐骨况於生人乎桓子新論曰文王操者文王之時紂無道爛金爲格溢酒爲池宫中相殘骨􅁏成泥琁室瑶臺藹雲翳風鍾聲雷起疾動天地文王躬􅀍法度隂行仁義援琴作操故其聲紛以擾駭角震商琴操曰受命者謂文王受天命文王以紂時爲岐侯躬修道德執行仁義百姓附親是時紂爲無道刳胎斬渉廢壤三仁天統易運}
