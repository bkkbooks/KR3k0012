  - {type: variant, offset: 859, length: 3, content: 自契至, SBCK: 文王處岐事紂􅁈侮雅孫朝夕必時雅正孫順紂雖􅁈柱而侮慢之而文王猶正順諸侯之禮而不失其時也止貢必適􅀕祀必敬紂喜命文王稱西伯賜之千里之地文王再拜稽首而辭曰願爲民請去炮烙之刑紂見熨斗爛人手因作銅柱布火於其下令人走其上墮火而死以之爲樂以之爲方之􅞷炮故名爲炮烙也文王非惡千里之地也以爲民請去炮烙之刑必得民心得民心則賢於千里之地矣吕氏春秋曰文王修德百姓親附是時崇侯虎與文王同列爲諸侯德不能及文王常嫉妬之乃譛文王於紂曰西伯昌聖人也長子發中子旦皆聖合謀君其慮之紂乃囚文王於姜里將欲殺之於是文王四臣散冝生等乃周流海内經歷豊土得羙女二人水中文貝白馬朱鬛以獻於紂陳於中庭紂立出西伯文王在羑里時演易八卦爲六十四作鬱厄之辭困}
