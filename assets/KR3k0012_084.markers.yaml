  - {type: variant, offset: 937, length: 257, content: 伊尹仕桀更曰覺兮較兮吾大命格兮覺兮為先知者較兮謂直道者也格至也去不善而就善何樂兮伊尹入告于桀曰大命之亡有日矣桀啞然笑曰天之有日猶吾之有民也日亡吾亦亡矣是以伊尹遂去夏適湯又曰湯放桀也居中野士民皆奔湯桀與其屬五百人南徙千里止於不齊不齊民往奔湯桀與其屬五百人徙於魯魯士民復奔湯桀曰國君之有也吾聞海外有人與五百人俱去又曰湯放桀而歸於亳三千諸侯大會湯取天子之璽置之於天子之坐左復而再拜從諸侯之位湯曰此天子之位有道者可以處之矣夫天下非一家之有也唯有道者之有也唯有道者宜處之湯以此三讓三千諸侯莫敢即位然後湯即天子之位韓詩內傳曰湯, WYG: 紂}
