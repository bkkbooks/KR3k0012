  - {type: variant, offset: 554, length: 4, content: 湯臂二肘, SBCK: 文王龍顔柔肩望羊柔肩言象龍膺曲起又曰伐殷者爲􅁎昌􅁎昌之言基始也昌两日重見言明象生於岐立於豐􅄮雍州之山最大者也豐亦大精翼日爲日精所月翼故遂以爲名也衣青光木神以其方色表衣遷造而十刻消遷造西蓋文王爲西伯時西方造意東入討紂十刻之間則消滅之言聖人所向無前也又曰文王四乳}
