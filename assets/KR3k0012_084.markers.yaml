  - {type: variant, offset: 116, length: 2, content: 昭明, SBCK: 國於邠九世至古公亶父復修后稷公劉之業積德行義國人皆戴之獯音勲鬻音育戎狄攻之欲得地與民民皆怒欲戰古公曰有民立君將以利之今戎狄所攻戰以吾地與民民之在我與在彼何異以我故戰殺人父子而君之子不忍爲乃以私屬去邠渡漆沮踰梁山止於歧下邠人舉國老弱盡歸歧下及他旁國聞古公仁亦多歸之於是古公貶戎狄之俗營築城郭室屋而邑別居之民皆歌頌其德古公有長子曰太伯次曰虞仲太姜生少子季歷季歷娶大任皆賢婦人生昌有聖瑞古公曰我世當有興者其在昌乎長子太伯虞仲知父欲立季歷古公}
  - {type: variant, offset: 116, length: 2, content: 昭明, WYG: 國於豳九世至古公亶父復修后稷公劉之業積德行義國人皆戴之獯音勲鬻音育戎狄攻之欲得地與民民皆怒欲戰古公曰有民立君将以利之今戎狄所為攻戰以吾地與民民之在我與在彼何異民欲以我故戰殺人父子而君之予不忍為乃與私屬去豳渡漆沮踰梁山止於岐山豳人舉國扶老擕弱盡歸於岐下及他旁國聞古公仁亦多歸之於是古公乃貶戎狄之俗營築城郭室屋而邑别居之民皆歌頌其德古公有長子曰泰伯次曰虞仲尚書帝命驗曰季秋之月甲子赤雀銜丹書入豐止昌户拜稽首稽首頭至地也至于磻谿之水吕尚釣涯吕氏尚名王下趣拜急見也曰公望七年曰公望我相望七年言乆也乃今見光景于斯尊之辭斯此也答曰望釣得玉璜半璧曰璜釣得魚中有璜刻曰姬受命吕佐旌受天命為天子吕佐旌理之也遂置車左王躬執驅下賢也車尊曰左王身執轡而驅焉號曰師尚父周書曰文王昌曰吾聞之無變古無易常無隂謀無擅制無更創為此則不祥太公曰夫天下非常一人之天下也天下之國非常一人之國也莫常有之惟有道者取之古之王者未使民民化未賞民民勸不知怒不知喜愉愉然其如赤子此古善為政也又曰文王在鎬召太子發曰嗚呼我身老矣吾語汝我所保與我所守傳之子孫吾厚徳而廣惠忠信而志愛吾不為驕侈不為泰靡不淫於美吾栝柱而茅茨吾為民愛費也太姜生少子季厯季厯娶太任皆賢婦人生昌有聖瑞古公云我世當有興者其在昌乎長子太伯虞仲知父欲立季厯古公}
