  - {type: variant, offset: 1738, length: 1713, content: 之夫人置四面未必得鳥湯去三面以網四十國非徒網鳥也又曰成湯之時有穀生於庭夜而生比旦而大拱史請卜其故湯曰吾聞祥者福之先也見祥而為不善則福不至妖者禍之先也見妖而為善則禍不至於是早朝晏退問疾吊喪鎮撫百姓三日而穀亡又曰湯誅桀功名大成乃命伊尹作為大護歌晨露脩九韶六列以見其善淮南子曰湯夙興夜寐以致聰明輕賦薄歛以寬民泯布德施惠以賑困窮吊死問疾以養孤霜百姓親附政令流行帝外丙史記曰帝外丙即位三年崩立外丙之弟是為帝仲壬紀年曰外丙勝居亳帝仲壬史記曰帝仲壬即位四年崩伊尹乃立太丁之子太甲成湯嫡長孫也璅語曰仲壬崩伊尹放太甲乃自立四年帝太甲史記曰帝太甲立三年不明暴虐不遵湯法伊尹放之桐宮伊尹攝行政當國以朝諸侯太甲居桐宮三年悔過自責反善於是伊尹乃迎帝太甲而授之政帝太甲脩德諸侯咸歸殷百姓以寧伊尹嘉之乃作太甲三篇褒帝太甲稱太宗尚書曰太甲既立不明伊尹放諸桐三年復歸于亳思庸念帝道也帝王世紀曰太甲反位又不怨故更尊伊尹曰保衡即春秋傳所謂伊尹放太甲卒為明王是也太田脩政殷道中興號曰太宗孔藂所謂憂思三年追悔前愆起而即政謂之明王者也一名祖甲享國三十三年帝王紀曰桐宮蓋殷之墓地有離宮可居在鄴西南杜預春秋後序曰紀年稱殷仲壬即位居亳其卿士伊尹仲壬崩伊尹放太甲于桐乃自立也伊尹即位於太甲十年太甲潛出自桐殺伊尹帝沃丁史記曰帝沃丁之時伊尹卒既葬伊尹於亳咎單遂訓伊尹事作沃丁紀年曰沃丁絢即位居亳帝王世紀曰伊尹卒大霧三日沃丁葬以天子禮資之三年以報大德帝太庚史記曰帝太庚在位二十五年崩子帝小甲立紀年曰小庚辯即位居亳即大庚也帝小甲史記曰帝小甲在位十七年崩弟雍己立紀年曰小甲高即位居亳帝雍己史記曰帝雍己在位十二年崩弟太戊立紀年曰雍己伷即位居亳帝太戊書敘傳曰伊陟相太戊伊陟伊尹子也亳有祥桑穀共生于朝祥妖怪也二木合生七曰供不恭之罰詩序曰烈祖祀中宗也祀中宗殷王太戊湯之玄孫也嗟嗟烈祖有秩斯祜秩常也嗟嗟歎美之深也史記曰帝太戊立亳有祥桑穀共生於朝一暮大拱帝太戊懼問伊陟伊陟曰臣聞妖不勝德帝之政其有闕歟帝其脩德太戊從之而祥桑枯死殷復興諸侯歸之故稱中宗中宗在位七十五年帝仲丁史記曰帝仲丁遷于敖河亶甲居相值祖乙遷于刑帝仲丁在位十一年紀年曰仲丁即位元年自亳遷于囂帝王世紀曰仲丁徙囂或曰敖今河南之敖倉是也帝外壬史記曰帝外壬在位五年崩弟河亶甲立紀年曰外壬居囂帝河亶甲書敘傳曰河亶甲居相孔安國曰相地在河北史記曰帝河亶甲時殷復衰河亶甲在位九年崩子帝乙立紀年曰河亶甲整即位自囂遷于相征藍夷再征班方帝祖乙書敘傳曰祖乙圯于耿曰圯於祖遷于耿也河水所毀曰圯也帝王世紀曰今河東皮氏有卿史記曰帝祖乙立殷復興巫賢任職祖乙在位十九年紀年曰祖乙勝即位是為中宗帝王世紀曰帝祖乙以乙日生故謂之帝乙孔子所謂五世之外天之錫命䟽可同名者也是以祖乙不為諱蓋殷禮也帝祖辛史記曰帝祖辛在位十六年崩弟沃甲立帝沃甲史記曰帝沃甲在位二十五年崩立祖辛之子祖丁紀年曰帝開甲踰即位居庇帝祖丁史記曰帝祖丁在位三十二年崩立沃甲之子是為南庚紀年曰祖丁即位居庇帝南庚史記曰帝南庚在位二十九年崩立祖丁之子陽甲紀年曰南庚自庇遷于奄帝陽甲史記曰帝陽甲之時殷衰自仲丁以來廢嫡而更立諸弟子弟子或爭相代立比九世亂諸侯莫朝帝陽甲在位十七年紀年曰陽甲即位居奄帝盤庚書曰盤庚五遷將治亳殷自湯至盤庚凡五遷都治亳殷也民咨胥怨胥怨相也民不欲徙乃咨嗟憂愁相與怨其上也史記曰帝盤庚之時殷已都河北盤庚渡河南復居成湯之故國乃五遷無定處殷民咨胥皆怨不欲徙遂涉河南治毫行湯之政然後百姓由寧殷道復興諸侯來朝以其遵成湯之德也在位十八年紀年曰盤庚旬自奄遷于北蒙曰殷帝王世紀曰帝盤庚徙都殷始改商曰殷又曰亳殷今偃師是也然則殷有三亳二亳在梁國一亳在河南穀熟為南亳即今都也蒙為北亳即景亳湯所盟地偃師為西亳即盤庚所徙者帝小辛史記曰帝小辛殷道復衰百姓思盤庚乃作盤庚三篇小辛在位二十一年紀年曰小辛頌位居殷帝小乙史記曰帝小乙在位二十年崩子武丁立紀年曰小乙歛居殷帝武丁書敘傳曰高宗夢得說盤庚弟小乙子也名武丁夢得賢相其名說使百工營求諸野得諸傅巖書大傳曰桑穀俱生于朝一日而大拱兩手撿之曰拱武丁召其相而問焉其相曰吾雖知之吾不能言也問諸祖乙曰桑穀野草也此木也而云草未聞劉民以為屬草妖野草生于朝亡乎武丁側身修行思昔先王之政興滅國繼絕世舉逸民明, SBCK: ''}
