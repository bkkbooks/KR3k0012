  - {type: variant, offset: 4811, length: 622, content: 謂其私人曰為天下主而一國皆失日天下危矣一國不知而我其危矣亦亂以醉熊蹯不熟紂怒殺宰人斮朝涉之脛而視其髓刳孕婦之腹而觀其胎又殺人以食虎諸侯或叛妲己以罰輕紂欲重刑乃先為大熨斗以火爇之使人舉輒爛手不能勝紂怒乃更為銅柱以膏塗之加于爇炭之上使有罪者緣焉足滑跌墮火中紂與妲己笑為樂名曰炮烙之刑武王乃率諸侯來伐紂紂有億兆夷人起師自容閭至浦水與同惡諸侯五十國凡十七萬人距周于商郊之牧野紂師皆倒戈而戰紂即位三十三年正月甲子敗績赴宮登鹿臺蒙寶衣玉席自投于火而死周武王封其子武庚為殷後六韜曰武王伐殷得二大夫而問之曰殷國將亡亦有妖乎一人曰殷國常雨血雨血雨石小者如雞子大者如箕嘗六月而雨雪深尺餘武王曰大哉妖也一人對曰非殷國之大妖也殷國大妖三十七章殷君喜射人喜以人食餒虎喜剖人心喜殺孕婦以信者為不信以誣者為真以忠者為不忠忠諫者死阿諛者賞以君子為下以小人為上以佞辯為相以女子為政急令暴取萬民愁苦喜田弋走狗試馬出入不時不避大風甚雨不避寒暑喜修治池臺日夜無已喜為酒池糟丘牛飲者三千飲人為輩坐起之以金鼓無長幼之序貴賤之禮聽讒用譽無功者賞無德者富所愛專制擅令無禮義無聖人無賢士無衡概無升斛無尺寸無錙銖有罪放無罪誅此殷國之大妖者其餘不可勝數臣言不能盡墨子曰昔殷王紂貴為天子富有天下上訶天侮鬼神不殃傲天下萬民武王遂奔入王宮誓紂而出擊之赤瓌載之白旗以為天下諸侯僇又曰紂之時十日雨土于亳有鬼霄吟有男女為孟子曰桀紂逆天暴萬物故天棄之故民去之湯武從天理萬物故天下欲之故民歸之紂昏昏以亡武王諤諤以昌, SBCK: 釗代立}
