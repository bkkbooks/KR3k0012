  - {type: variant, offset: 2579, length: 660, content: 七十五年帝仲丁史記曰帝仲丁遷于敖河亶甲居相值祖乙遷于刑帝仲丁在位十一年紀年曰仲丁即位元年自亳遷于囂帝王世紀曰仲丁徙囂或曰敖今河南之敖倉是也帝外壬史記曰帝外壬在位五年崩弟河亶甲立紀年曰外壬居囂帝河亶甲書敘傳曰河亶甲居相孔安國曰相地在河北史記曰帝河亶甲時殷復衰河亶甲在位九年崩子帝乙立紀年曰河亶甲整即位自囂遷于相征藍夷再征班方帝祖乙書敘傳曰祖乙圯于耿曰圯於祖遷于耿也河水所毀曰圯也帝王世紀曰今河東皮氏有卿史記曰帝祖乙立殷復興巫賢任職祖乙在位十九年紀年曰祖乙勝即位是為中宗帝王世紀曰帝祖乙以乙日生故謂之帝乙孔子所謂五世之外天之錫命䟽可同名者也是以祖乙不為諱蓋殷禮也帝祖辛史記曰帝祖辛在位十六年崩弟沃甲立帝沃甲史記曰帝沃甲在位二十五年崩立祖辛之子祖丁紀年曰帝開甲踰即位居庇帝祖丁史記曰帝祖丁在位三十二年崩立沃甲之子是為南庚紀年曰祖丁即位居庇帝南庚史記曰帝南庚在位二十九年崩立祖丁之子陽甲紀年曰南庚自庇遷于奄帝陽甲史記曰帝陽甲之時殷衰自仲丁以來廢嫡而更立諸弟子弟子或爭相代立比九世亂諸侯莫朝帝陽甲在位十七年紀年曰陽甲即位居奄帝盤庚書曰盤庚五遷將治亳殷自湯至盤庚凡五遷都治亳殷也民咨胥怨胥怨相也民不欲徙乃咨嗟憂愁相與怨其上也史記曰帝盤庚之時殷已都河北盤庚渡河南復居成湯之故國乃五遷無定處殷民咨胥皆怨不欲徙遂涉河南治毫行湯之政然後百姓由寧殷道復興諸侯來朝以其遵成湯之德也在位十八年紀年曰盤庚旬自奄遷于北蒙曰殷帝王世紀曰帝盤庚徙都殷始改商曰殷又曰亳殷今偃師是也然則殷有三亳二亳在梁國一亳在河南穀熟為南亳即今都也蒙為北亳即景亳湯所盟地偃師, WYG: 襲}
