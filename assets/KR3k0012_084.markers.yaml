  - {type: variant, offset: 1775, length: 3, content: 生比旦, WYG: 死以之為樂方之􅞷炮故名為炮烙也文王非惡千里之地也以為民請去炮烙之刑必得民心得民心則賢於千里之地矣又曰周文王立八年嵗六月文王寢疾五日}
