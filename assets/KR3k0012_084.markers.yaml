  - {type: variant, offset: 3668, length: 599, content: 勿憂先修政事祖己乃訓王武丁崩祖己嘉其德立其廟為高宗帝王世紀曰武丁即位諒闇居凶廬百官揔己聽於冢宰三年不言既免喪猶不言群臣諫武丁於是思建良輔夢天賜賢人姓傅名說乃使百工寫其像求諸天下見築者胥靡衣禢帶索執役于虞虢之間傅巖之野名說登以為相享國五十有九年年百歲初高宗有賢子孝己其母早死高宗惑后妻之言放而死天下哀之帝祖庚史記曰帝祖庚在位七年崩弟祖甲立紀年曰祖庚躍居殷帝祖甲史記曰帝祖甲淫亂殷復衰在位十六年崩子廩辛紀年曰帝甲載居殷帝王世紀曰春秋外傳所謂玄王勤商十有四世帝甲亂之七世而隕是也帝廩辛史記曰帝廩辛在位六年崩弟庚丁立紀年曰馮辛先君殷帝庚丁史記曰帝庚丁在位三十一年崩子武乙立殷復去亳徙河北紀年曰庚丁居殷帝武乙史記曰帝武乙無道為偶人謂之天神與之愽令人為行天神不勝乃戮辱之為革囊盛血仰而射之命曰射天武乙獵於河渭之間暴雷震死子太丁立紀年曰武乙即位居殷三十四年周王季歷來朝武乙賜地三十里玉十瑴馬八疋帝王世紀曰帝武乙復濟河北徙朝歌帝太丁史記曰帝太丁在位三年崩子帝乙立紀年曰太丁三年洹水一日三絕帝王世紀曰帝文丁一日大丁帝乙史記曰帝乙立殷益衰帝乙長子曰微子啟母賤不得嗣少于辛辛母正后辛為嗣帝乙崩子辛立天下謂之紂紀年曰帝乙處殷二年周人伐商帝王世紀曰帝乙有二妃正妃生三子長曰微子啟中曰微仲行小曰受庶妃生箕子年次啟皆賢初啟母之生啟及行也尚為妾及立為后乃生辛帝乙以啟賢且長欲以啟為太子史據法爭之帝乙乃立辛為太子帝乙即位三十七年帝紂, SBCK: ''}
