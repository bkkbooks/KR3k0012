  - {type: variant, offset: 199, length: 1, content: 湯, SBCK: 草木之長而慎天時水澤不内舟檝以成魚鱉之長不麛不卵以成鳥獸之長畋獵唯時不殺童羊不夭胎童牛不服童馬不馳不騖澤不行害士不失其冝萬物不失其性天下不失其時又曰文王獨坐屏去左右深念逺慮召太公望曰帝王猛暴無文強梁好武侵凌諸侯苦勞天下百姓之怨心生矣其灾予奚行而得免於無道乎太公曰因其所爲且興其化上知天道中知人事下知地理乃可以有國焉}
