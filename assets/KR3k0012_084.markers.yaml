  - {type: variant, offset: 4453, length: 1, content: 盈, SBCK: 死王遂入至紂死所自射紂三發而後下車以黄鉞斷紂頭懸大白之旗紂嬖妾妲己二女皆自殺王又射三發斬以􅀇􅃏懸其頭小白之旗出復于軍其眀日遂除紂宫誓殷民即帝位帝王丗紀曰武王自盟津還返于周見暍人王自在擁而右扇之四年起師至鮪水甲子至于商郊牧野王韈係解五人侍於前莫肯爲王係韈皆曰臣所以事君王非爲係韈也王乃釋旄而係之與紂戰紂師敗績擒費仲惡來紂赴于京自燔于宣室而死乃以大旗麾諸侯入殷都百姓咸行于郊王使告曰上天降休商人皆拜王亦荅拜以兵人造紂及妲己王親射射之三發然後下車以劒擊之周公爲司徒使以黄􅃏斬紂頭召公爲司空又使以􅀇鉞斬妲己明日天雨王命除道脩社入商宫朝成湯之廟登堂見羙玉入室見羙女王皆取而歸之諸侯天下聞之以廉于財色矣置旌於商容之閭釋箕子之囚散鹿臺之財發}
