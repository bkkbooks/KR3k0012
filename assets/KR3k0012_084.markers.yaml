  - {type: variant, offset: 4564, length: 2, content: 帝紂, SBCK: 周公居􅃁􅌠攝政成王年少未}
  - {type: variant, offset: 4564, length: 386, content: 帝紂能倒曳九牛撫梁易柱有蘇氏叛紂因伐蘇蘇人以美女妲己奉紂紂大悅赦蘇而納妲己為妃常與沉醉于酒所譽者貴所憎者誅淫縱愈甚始作象著箕子為父師歎曰象著不必更於土匭必將犀玉之柸食能蹯豹胎必不衣短褐處茅屋之下必將衣文繡之衣遊於九層之臺居於廣室之中矣居五年紂果造傾宮作瓊室瑤臺飾以美玉七年乃成其大三里其高千丈其大宮百其小宮七十三處宮中九市車行酒馬行炙以百二十日為一夜六月發民獵於西山居朞年天下大風雨飄牛馬壞屋樹天火燒其宮兩日並或鬼哭或山鳴紂不懼愈慢神誅諫士為長夜之飲七日七夜失忘曆數不知甲乙問於左右莫知使問箕子謂其私人曰為天下主而一國皆失日天下危矣一國不知而我其危矣亦亂以醉熊蹯不熟紂怒殺宰人斮朝涉之脛而視其髓刳孕婦之腹而觀其胎又殺人以食虎諸侯或叛妲己以罰輕紂欲重刑乃先為大熨斗以火爇之使人舉輒爛手不能勝紂怒乃更為銅柱以膏塗之加于爇炭之上使有罪者緣焉足滑跌墮火中紂與妲己笑為樂名曰炮烙之刑, WYG: ''}
