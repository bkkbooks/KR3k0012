  - {type: variant, offset: 197, length: 1, content: 為, SBCK: 爲西伯西伯曰文王遵后稷公劉之業則古公王季之法篤仁敬老慈少禮下賢者日中不暇食以待士伯夷叔齊太顛閎夭散冝生鬻子辛甲之徒皆歸之崇侯虎譛於紂曰西伯積德諸侯嚮之將不利於帝紂囚西伯於姜里閎夭之徒乃求有莘氏羙女驪戎文馬因殷嬖臣費仲獻之紂乃赦之紂喜賜之弓矢斧􅃏使得征伐謂西伯曰愬汝者崇侯虎也西伯乃獻洛西之地以請除炮烙之刑西伯遂爲諸侯决平虞芮人有訟不能决詣周入其界見耕者皆讓畔未見西伯而慙相謂曰吾所爭者周所恥也遂還明年伐犬夷又明年伐宻湏又明年伐崇侯虎而徙都於酆諸侯多歸之都酆明年而薨太子發立尚書帝命驗曰季秋之月甲子赤雀銜丹書入酆止昌户拜稽首稽首頭至地也至于磻谿之水吕尚釣涯吕氏尚名王下趣拜急見也曰公望七年日公乎我相望七年言乆也乃今見光景于斯尊之辭斯此也荅曰望釣得玉璜半壁曰璜釣得魚中有璜刻曰􅁎受命吕佐旌受天命爲天子吕佐旌理之也遂置車左王躬執驅下賢也車尊曰左王身執轡而驅焉號曰師尚父周書曰文王昌曰吾聞之無變古無易常無隂謀無擅制無更創爲此則不祥太公曰夫天下非常一人之天下也天下之國非常一人之國也莫常有之唯有道者取之古之王者未使民民化未賞民民勸不知怒不知喜愉愉然其如赤子此古善爲政也又曰文王在鎬召太子發曰嗚呼我身老矣吾語汝我所保與我所守傳之子孫吾厚德而廣惠忠信而志愛吾不爲驕侈不爲太靡不滛於羙吾栝柱而茅茨吾爲民愛費也春夏育山林不昇以}
