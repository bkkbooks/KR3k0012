  - {type: variant, offset: 4786, length: 2, content: 綠綬, SBCK: 府呉志曰劉禪襲位諸􅁑亮秉政與權連和時事所冝權輙輙令陸遜報語并刻權印以置其所權毎與禪亮書常過示遜輕重可否有所不安便令改以封行之晉書曰孔愉封餘不亭侯愉曽行經餘不亭見籠􅀛於路者買而放之溪中流左顧者數四及是鑄侯印而左顧}
