  - {type: variant, offset: 2185, length: 843, content: 思賢以璽投景南兗州剌史郭元建送于術故術以進焉又曰元暉業天保二年從駕至晉陽於宮門外罵元韶曰爾不及一老嫗背負璽與人何不打碎之我出此言知即死然爾詎得幾時文宣聞而殺之後周書曰宇文氏其先曰普廻因狩得玉璽三鈕有文曰皇帝璽普迴異之以為天授其俗謂天曰宇因號宇文國并以為氏唐書曰貞元二年神策將溫嘉順得白玉印其文曰天子之寶獻之即傳國八寶之一上幸奉天後失之及是方獲玉璽譜曰傳國璽是秦始皇所刻其玉出藍田山是丞相李斯所書其文曰受命于天既壽永昌漢高祖定三秦秦王子嬰獻此璽及漢高即位仍佩之因以相傳故號曰傳國璽漢昭帝時殿中一夜相驚霍光即召持節郎取璽郎不與光欲奪之郎案劍曰頭可得璽不可得光善之明日遷郎秩二等光後廢昌邑王賀立宣帝光自手解取賀璽扶令下殿至漢平帝王莽篡位就元后求璽乃出璽投之於地璽上螭一角𡙇及莽敗時帶璽綬避火於漸臺商人杜吳殺莽取綬不知取璽及莽頭公賓就見綬問綬主所在乃斬莽首并璽與王憲憲得無所送又自乘天子車輦李松入長安斬憲送璽詣宛上更始赤眉大司馬謝祿至高陵更始奉璽赤眉赤眉立劉盆子建武三年盆子敗於宜陽璽還光武孫堅從桂陽入討董卓卓時已焚燒洛邑徒都長安堅軍於城南見井中旦旦有光軍人莫敢汲堅乃探得璽初卓作亂掌璽者投于井中故堅得之袁紹有僣盜意乃拘堅妻逼求之紹得璽見魏舉以向肘魏武惡之紹敗得璽還漢以禪魏魏以禪晉趙王倫篡立使義陽王威就惠帝取璽帝不與強奪之晉懷帝永嘉五年王彌入洛陽執懷帝及傳國六璽詣劉曜後為石勒所井璽復屬勒勒刻一邊云天命石氏此題今不復存勒為冉閔所滅此璽屬閔閔敗璽存閔大將軍蔣幹晉鎮西將軍謝尚遣督護何融至購賞得之以晉穆帝永和八年還江南晉元帝東度歷數帝無玉璽北人皆云司馬家是白板天子又曰雍州璽者晉泰光十九年雍州剌史郗恢表慕容永稱藩奉璽方六寸厚七分上蟠螭為鼻合高四寸六分四邊龜文下有八字其文曰受天之命皇帝壽昌烏篆隱起巧麗驚絕是慕容所制源其所由未詳厥始也呂氏春秋曰民之於上若璽於塗印方則方印圓則圓山陽公載記曰袁術將僣號聞孫堅得傳國璽乃拘堅夫人而奪之玉璽譜云袁紹拘堅夫人奪之應劭漢官儀曰孔子稱封泰山禪梁父可得而數七十有二, SBCK: 堯}
