  - {type: variant, offset: 3951, length: 584, content: 青綬已上縌音逆皆長三尺二寸與綬同采而首半之縌者古佩禭也佩禭相迎受故曰縌紫綬之間得施玉環玦千石六百黑綬三采青赤紺淳青圭長丈六尺八十首漢官儀云墨綬白羽青地絳二採長丈七尺四百丞尉三百長相二百石皆黃綬一采淳黃圭長丈五尺六十首又漢官儀云黃綬絲八十首長文七尺自黑綬以下縌長三尺綬同采而首半之百石青紺綬一采宛轉繆織圭長丈二尺凡先合單紡為一絲四絲為一扶五扶為一首五首成一文文采淳為一圭首多者絲細少者麤皆廣六寸史記曰武帝召東郭先生出拜為郡都尉先生久待詔公車行雪中履有上無下及其拜為二千石佩青緺之綬也漢書曰諸侯王高帝初置金璽盭綬如淳曰盭音戾綠也晉灼曰盭草也出琅耶平昌縣又曰朱買臣字翁子拜會稽太守上謂之曰富貴不歸故鄉如衣錦夜行買臣頓首謝乃微行懷其印綬步歸郡邸邸吏方與群飲不視買臣買臣共飲醉飽少間守邸微見其綬而引之即會稽太守章也守邸驚出相語掾吏皆云妄誕守邸曰試觀之素輕買臣者入見皆驚走大呼曰實然乃推排庭中拜謁又曰蕭育字次君與朱博友善人稱曰蕭朱結綬又曰南越反楊僕拜樓舩將軍東越反上復欲使為將僕甚伐前勞勑責之曰士卒暴露連歲將軍不念其懃勞而造佞巧請乘傳行塞因用歸家懷銀黃垂三組誇鄉里是三過也又曰金日磾兩子賞建俱侍中與昭帝同共臥起賞為奉車都尉建附馬都尉及賞嗣侯佩侯綬上謂霍將軍曰金氏兄弟兩人不可使俱兩綬耶霍光曰賞自嗣為侯耳上笑曰侯不在我與將軍乎光曰高帝之約有功乃得封侯時年俱八九歲又曰莽上漸臺商人杜吳, krp: ''}
