  - {type: variant, offset: 412, length: 314, content: 族滅也又王莽傳曰梓橦人哀章素無行好為大言見莽居攝即作銅匱為兩檢署其一曰天帝行璽金匱其二署曰赤帝行璽莽至高廟拜授又曰王閎王莽叔父哀帝世為中常侍時董賢為大司馬帝臨崩以璽綬付賢曰無妄以與人時國無嗣主內外恐懼閎白元后請奪之即帶劍至宣德闥謂賢曰宮車晏駕國嗣未立君受恩深重當俯伏號泣何事久持璽綬以待禍至耶賢不敢拒乃跪授璽綬後漢書曰𣵠郡太守張豐執使者舉兵反自稱無上大將軍與彭寵連兵四年祭遵朱祐破之初豐好方術有道士言豐當為天子以五綵囊裹石繫豐肘云石中有玉璽豐信之遂反及執當斬猶曰肘石有玉璽遵為椎破之豐乃知被詐仰天歎曰當死無所恨又曰延嘉八年渤海妖賊蓋登等稱太上皇帝有玉印珪璧鐵券相署置皆伏誅續漢書曰時登等有玉印五皆如白石文曰皇帝信璽皇帝行璽其三無, SBCK: ''}
