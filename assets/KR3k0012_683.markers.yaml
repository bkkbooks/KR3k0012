  - {type: variant, offset: 4800, length: 9, content: 紫綬二彩紫白純紫圭, SBCK: 印工鑄其印六鑄而􅀛六毁旣成鎭空不實􅀘而用之居職六日􅁀卒後魏書曰祖瑩爲散􅀐侍郎孝昌中於廣干王第掘得古玉印勑召瑩與黄門侍郎李琰之令辨何世之物瑩云此是于闐國王晉太康中所獻乃以墨塗字觀之果如瑩言時人稱爲慱物又曰髙祖詔軍警給雀印傳符次給馬印又曰髙祖承明元年上谷郡人獻玉印有蛟龍之文唐書曰朱泚遣其將韓旻領兵三千趣奉天時奉天未有武備泚召叚秀實與謀秀實詐從之乃與將吏謀殺泚且欲追韓旻兵廻竊姚令言印不遂乃以司農寺印倒印符牒旻莫辨其印遑遽而廻應劭漢官儀曰印者因也正所以虎紐者陽􅀋虎獸之長取其威猛以執伏群下􅀛者隂物隨時蟄藏以示臣道功成而退也孝武皇帝元狩四年令通官印五分王}
  - {type: page-break, offset: 4800, content: '', id: KR3k0012_SBCK_683-6a}
