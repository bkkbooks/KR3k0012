  - {type: punctuation, offset: 4784, content: 、, id: KR3k0012_CHANT_683-bkkpn1388}
  - {type: variant, offset: 4784, length: 0, content: '', SBCK: 所親今易之得賢則造次未安不賢祗更生亂爲使君計莫􅀂復之以安百姓使者不應恂叱左右以使者命召况至恂進印綬帶於况使者不得巳乃承制誥之况受而歸又曰獻帝遷許徐璆以廷尉徴當詣京道爲􅀽術所刼術死軍破璆送前所假汝南東海二郡印綬司徒趙温謂璆曰君遭大難猶存此邪璆曰昔蘇武困於匈奴不墜七尺之節况此方寸印乎又曰延熹八年沛國戴異得黄金印無文字遂與廣陵人龍尚等共􅀕井作符書稱太上皇伏誅又曰張魯在漢中民有地中得玉印者羣下欲尊魯爲漢寧王功曹閻諌以必爲禍先魯從而止魏志曰􅀽紹欲立幽州牧劉虞爲帝太祖拒之紹又嘗得一玉印於太祖坐中舉向其肘太祖􅀏而惡焉又曰楊奉以天子都安邑醫師走卒皆爲校尉御史刻印不供乃以錐畫示有文字或不時得又曰許允善相印出爲鎭北將軍將拜以印不善使更刻之如此者三允曰印雖始成而巳􅀍辱問送印者果懷之而墜于厠又曰平原太守劉邠取印囊及山鷄毛着器中使管輅筮之輅曰内方外圎五色成文合寳守信出則有章此印囊也又曰咸熈元年鎮西將軍衛瓘上雍州兵於成都縣得璧玉印各一印文似成信字依周成王歸禾之義宣示百官}
