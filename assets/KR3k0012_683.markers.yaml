  - {type: variant, offset: 4781, length: 2, content: 簿貴, SBCK: 後漢書曰㓂恂􅀄爲功曹太守耿况甚重之王莽敗更始立使使者徇郡國曰先降者復爵位恂從耿况迎使者於界上况上印綬使者納之宿無還意恂勒兵入見使者就請之使者不與曰天王使者功曹欲脅之邪恂曰非敢脅使君君者尊之之稱也竊傷計之不詳也今天下􅀄定國信未宣使君建節衘命以臨四方郡國莫不延頸傾耳望風歸命今始至上谷而先隳大信隳毀也沮向化之心生離叛之隙將復何以號令它郡乎且耿府君在上谷乆爲吏}
  - {type: page-break, offset: 4781, content: '', id: KR3k0012_SBCK_683-4a}
  - {type: variant, offset: 4781, length: 2, content: 簿貴, WYG: 後漢書曰冦恂初為功曹太守耿况甚重之王莽敗更始立使使者狥郡國曰先降者復爵位恂從耿况迎使者於界上况上印綬使者納之一宿無還意恂勒兵入見使者就請之使者不與曰天王使者功曹欲脅之邪恂曰非敢脅使君君者尊之之稱也竊傷計之不祥也今天下初定國信未宣使君建節䘖命以臨四方郡國莫不延頸傾耳望風歸命今始至上谷而先隳大信隳毁也阻向化之心生離叛之隙將復何以號令他郡乎且耿府君在上谷久為吏}
  - {type: page-break, offset: 4781, content: '', id: KR3k0012_WYG_683-6a, image: WYG0899/WYG0899-0142a.png}
  - {type: variant, offset: 4781, length: 2, content: 簿貴, krp: 後漢書曰㓂恂𥘉爲功曹太守耿况甚重之王莽敗更始立使使者徇郡國曰先降者復爵位恂從耿况迎使者於界上况上印綬使者納之宿無還意恂勒兵入見使者就請之使者不與曰天王使者功曹欲脅之邪恂曰非敢脅使君君者尊之之稱也竊傷計之不詳也今天下𥘉定國信未宣使君建節衘命以臨四方郡國莫不延頸傾耳望風歸命今始至上谷而先隳大信隳毀也沮向化之心生離叛之隙將復何以號令它郡乎且耿府君在上谷乆爲吏}
