  - {type: variant, offset: 2767, length: 434, content: 為石勒所井璽復屬勒勒刻一邊云天命石氏此題今不復存勒為冉閔所滅此璽屬閔閔敗璽存閔大將軍蔣幹晉鎮西將軍謝尚遣督護何融至購賞得之以晉穆帝永和八年還江南晉元帝東度歷數帝無玉璽北人皆云司馬家是白板天子又曰雍州璽者晉泰光十九年雍州剌史郗恢表慕容永稱藩奉璽方六寸厚七分上蟠螭為鼻合高四寸六分四邊龜文下有八字其文曰受天之命皇帝壽昌烏篆隱起巧麗驚絕是慕容所制源其所由未詳厥始也呂氏春秋曰民之於上若璽於塗印方則方印圓則圓山陽公載記曰袁術將僣號聞孫堅得傳國璽乃拘堅夫人而奪之玉璽譜云袁紹拘堅夫人奪之應劭漢官儀曰孔子稱封泰山禪梁父可得而數七十有二傳曰封者以金泥銀繩印之以璽璽施也信也古者尊卑共之月令曰固封璽春秋傳襄公在楚武子使季冶問璽書而與之是也秦漢以來尊者以為名乃始避又曰天子有傳國璽文曰受命於天既壽且康漢舊儀曰秦已前民皆以金玉銀銅犀象為方寸璽各服所好漢已來天子獨稱璽又以玉群臣莫敢用也又曰皇帝六璽皆白玉螭虎劍文曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽凡六璽皇帝行璽賜諸侯王書信璽, krp: 事}
