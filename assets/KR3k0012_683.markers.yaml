  - {type: variant, offset: 669, length: 1827, content: 延嘉八年渤海妖賊蓋登等稱太上皇帝有玉印珪璧鐵券相署置皆伏誅續漢書曰時登等有玉印五皆如白石文曰皇帝信璽皇帝行璽其三無文字續漢書曰獻穆曹后曹操之女也魏受禪遣使求璽綬后怒以璽綬抵軒下因涕泣橫流曰天不祚此璽魏志曰太祖崩洛陽時隱陵侯彰行越騎將軍從長安來赴問賈逵先王璽綬所在逵正色曰太子在鄴國有儲副先君璽綬非君所宜問也又曰太和元年以中山魏昌之安城鄉追封甄逸謚曰敬俟孫豫襲爵初營宗廟掘地得玉璽方一寸九分其文曰天子羨思慈親明帝為之改容魏略曰司馬景王廢齊王芳使郭芝入白太后取璽綬太后取璽綬置坐側及迎高貴鄉公又請璽綬太后曰我見高貴鄉公小時識之明白我欲自以璽綬手付之吳書曰漢大亂天子北詣河上六璽不自隨掌璽者以投井孫堅討董卓頓軍洛南其井每有五色氣從井中出堅使人浚之得漢傳國玉璽其文曰受命于天既壽永昌方圓四寸上綏交蟠五龍龍上一角缺蜀志曰太傅許靖等上言先主曰前關羽圍于禁襄陽襄陽子張嘉王休獻玉璽潛漢水伏於淵泉暉影燭耀靈光徹天夫漢者高祖本所起定天下之國號也大王襲先帝軌跡興於漢中也今天子玉璽神光見璽出襄陽漢水之未明大王承其下流授與以天子位瑞命符應非人力所致鄧粲晉紀曰江寧民虞迪墾地得白玉驎璽一鈿以獻文曰長壽萬年晉書曰義陽王威無操行諂附趙王倫倫將篡使威與黃門郎駱休逼帝奪璽綬倫敗惠帝反正曰阿皮捩吾指奪吾璽綬不可不殺阿皮威小字也於是誅威又曰冉閔子智以鄴來降安西將軍謝尚使濮陽太守戴施應之進據枋頭會冉智行人劉猗至施乃止使猗求傳國璽猗歸以告智智猶豫不許施因遣參軍何融率壯士百人入鄴登三臺助戍譎之曰今且出璽付我凶寇在外道路梗澀亦未敢即送當遣單使馳告天子天子聞璽已在吾邊知卿至誠當遣重兵相援智信之乃出璽付融融詣施施使齎璽馳還璽自秦傳漢漢入魏魏入西晉永嘉末洛京不守璽為劉聰所得及石勒滅劉氏璽入偽趙冉閔誅石氏又入閔及是四十二年而璽復歸於晉晉中興書曰義熙十二年左衛兵陳陽於府前淮水中得璽王者不隱其過則玉壁見璽亦璧也崔鴻十六國春秋前趙錄曰河瑞元年汾水中得玉璽高一寸二分方四寸文曰有新保之蓋王莽時璽也獻者因增深海光三字淵以為己瑞大赦又前趙錄曰光初五年并州牧安定王策獻玉璽一文曰趙盛又前涼錄曰張寔元年蘭池趙嬰上言於青澗水中得一玉璽鉗鈕光照水外文曰皇帝璽群寮上賀寔曰何忽有此言乃送之於京師晉書載記曰石季龍剋上邽遣主簿趙封送傳國玉璽太子玉璽各一于勒又曰符堅奔五將山姚萇遣將軍吳忠圍之堅眾奔散獨侍御十數人而已神色自若坐而待之召宰人進食俄而忠至執堅以歸新平幽之于別室萇求傳國璽於堅曰萇次膺符曆可以為惠堅瞋目叱之曰小羗乃敢干逼天子豈以傳國璽授汝羗也圖緯符命何所依據五胡次序無汝羗名違天不祥其能久乎璽已送晉不可得也又曰冉閔殺石祇僣大號遣其使人常煒聘慕容儁儁便記室封𥙿詰之曰石祇去歲使張舉請援云璽在襄國其言信不煒曰誅胡之日在鄴者略無所遺璽何從而向襄國此求救之辭耳又曰冉閔敗蔣幹以傳國璽送于建鄴慕容儁欲神其事業言曆運在己乃詐云閔妻得之以獻賜號曰奉璽君因以永和八年僣即皇帝位大赦境內建元曰元璽宋書曰元凶劭既敗時不見傳國璽問劭云在嚴道育處就取得之又曰蔡興宗拜侍中每正言得失無所顧憚孝武新拜陵興宗負璽陪乘齊書曰謝朏為宋侍郎領祕書監及高帝受禪朏當日在直百僚陪位侍中當解璽朏陽不知曰有何公事傳詔云解璽授齊王朏曰齊自應有侍中乃引枕臥傳詔懼乃使稱疾欲取兼人朏曰我無疾何所道遂朝服步出東掖門乃得車仍還宅是日遂以王儉為侍中解璽既而武帝請誅朏高帝曰殺之則成其名正應容之度外北史后妃傳典琮三人掌琮璽翫器北齊書曰辛術鎮廣陵獲傳國璽送鄴文宣以璽告於太廟此璽即秦所制方四寸上紐交盤龍其文曰受命于天既壽永昌二漢相傳又應魏晉晉懷帝敗設於劉聰聰敗沒於石氏石氏敗晉穆帝永和中濮陽太守戴僧施得之遣督護何融送于建鄴歷宋齊梁敗侯景得之景敗侍中趙思賢以璽投景南兗州剌史郭元建送于術故術以進焉又曰元暉業天保二年從駕至晉陽於宮門外罵元韶曰爾不及一老嫗背負璽與人何不打碎之我出此言知即死然爾詎得幾時文宣聞而殺之後周書曰宇文氏其先曰普廻因狩得玉璽三鈕有文曰皇帝璽普迴異之以為天授其俗謂天曰宇因號宇文國并以為氏唐書曰貞元二年神策將溫嘉順得白玉印其文曰天子之寶獻之即傳國八寶之一上幸奉天後失之及是方獲玉璽譜曰傳國璽是秦始皇所刻其玉出藍田山是丞相李斯所書其文曰受命于天既壽永昌漢高祖定三秦秦王子嬰獻此璽及漢高即位仍佩之因以相傳故號曰傳國璽漢昭帝時殿中一夜相驚霍光即召持節郎取璽郎不與光欲奪之郎案劍曰頭可得璽不可得光善之明日遷郎秩二等光後廢昌邑王賀立宣帝光自手解取賀璽扶令下殿至漢平帝, krp: ''}
