  - {type: variant, offset: 3030, length: 857, content: 封者以金泥銀繩印之以璽璽施也信也古者尊卑共之月令曰固封璽春秋傳襄公在楚武子使季冶問璽書而與之是也秦漢以來尊者以為名乃始避又曰天子有傳國璽文曰受命於天既壽且康漢舊儀曰秦已前民皆以金玉銀銅犀象為方寸璽各服所好漢已來天子獨稱璽又以玉群臣莫敢用也又曰皇帝六璽皆白玉螭虎劍文曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽凡六璽皇帝行璽賜諸侯王書信璽發兵徵大臣天子行璽外國事天子之璽事天地鬼神璽皆以武都紫泥封青布囊白表裏兩端尺一櫃中約署崔浩漢紀音義曰傳國璽是和氏璧作之趙書曰劉曜於龍門河水中得玉璽文融剋昌曜以為天錫神璽齋而受之石虎別傳曰武鄉長城縣民韓強在長城西山巖石間得玄璽一方四寸厚二寸與璽同文曰受命于天既壽永昌虎以為瑞燕書曰元璽六年蔣幹遣太子詹事劉猗齎傳國璽詣晉求救猗負璽行數里天黃霧四塞不得進易取行璽始得去段龜龍涼州記曰呂光時州人陳冲得玉璽廣三寸長四寸直看無文字向曰視之字在腹裏言光當王王彪之議曰未詳傳國璽造創之始歷代以來揖讓禪位以茲相授故是傳國之守器也拾遺錄曰武王滅紂樵夫牧豎探鳥巢得赤玉璽文曰水德方滅火祚方盛文皆大篆故三分天下而二分歸周又曰晉太康元年孫皓送六金璽云時無玉工故以金為印璽漢武內傳曰西王母佩金剛靈璽鄧析書曰為之符璽以信之則并與符璽而竊之綬爾雅曰繸綬也即佩玉之組也所以連繫瑞玉者因通謂之繸也禮記玉藻曰天子佩白玉而玄組綬公侯佩山玄玉而朱組綬大夫佩水倉玉而純組綬世子佩瑜玉而綦組綬士佩瓀玟縕組綬說文曰緺紫青色綬也應劭漢官儀云綬者有所受以別尊卑彰有德也又云綬長一丈二尺法十二月闊三尺法天地人董巴輿服志曰戰國解去紱珮留其絲以為章表秦乃以采組連結於禭光明章表轉相結綬故謂之綬乘輿黃赤綬四采黃赤縹紺淳黃圭長二丈九尺五百首太皇太后皇太后皇后皆同又漢官儀云乘輿綬黃地骨白羽青絳綠五采四百首長二丈三尺王赤綬四采赤黃縹紺淳赤圭長二丈八尺三百首公主大貴人諸侯皆同又漢官儀云四采絳地骨白羽青黃赤緣二丈一尺二百六首諸國貴人相國綠綬三采綠紫白淳綠圭長二丈一尺百四十首將軍紫綬二采紫白淳紫圭長一丈七尺百八十首公主封君同又漢官儀云丞相, SBCK: ''}
