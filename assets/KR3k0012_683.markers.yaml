  - {type: variant, offset: 946, length: 274, content: 亂天子北詣河上六璽不自隨掌璽者以投井孫堅討董卓頓軍洛南其井每有五色氣從井中出堅使人浚之得漢傳國玉璽其文曰受命于天既壽永昌方圓四寸上綏交蟠五龍龍上一角缺蜀志曰太傅許靖等上言先主曰前關羽圍于禁襄陽襄陽子張嘉王休獻玉璽潛漢水伏於淵泉暉影燭耀靈光徹天夫漢者高祖本所起定天下之國號也大王襲先帝軌跡興於漢中也今天子玉璽神光見璽出襄陽漢水之未明大王承其下流授與以天子位瑞命符應非人力所致鄧粲晉紀曰江寧民虞迪墾地得白玉驎璽一鈿以獻文曰長壽萬年晉書曰義陽王威無操行諂附趙王倫倫將篡使威與黃門郎駱休逼帝奪璽綬倫敗惠帝反正曰阿皮捩吾指奪吾璽綬不可不殺阿皮威小字也於是誅威, WYG: 隙}
