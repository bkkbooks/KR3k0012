  - {type: punctuation, offset: 4798, content: 、, id: KR3k0012_CHANT_683-bkkpn1392}
  - {type: variant, offset: 4798, length: 0, content: '', SBCK: 而傳國之璽歷代遞用襲封之印弈世相傳貴在仍舊無取改作今丗唯尉一職獨用一印至内外羣官每遷悉改討㝷其義􅀻所未逹􅀂謂官各異姓與傳襲不同則未􅀂異代之爲殊也若論其名器雖有公卿之貴未􅀂帝王之重􅀂以或有誅夷之臣忌其㐫穢則漢用秦璽延祚四百未聞以子嬰身戮國亡而棄之不佩帝王公侯之尊不疑於傳璽人臣衆僚之卑何嫌於即印載籍未聞其􅀃推别自乖其准而終年刻鑄䘮功消實金銀銅炭之費不可稱言非所以因循舊貫昜簡之道愚請衆官即用一印無煩改作􅀂新置官官多印少又或零失然後乃鑄則仰禆天府非唯小益齊書曰巴西人趙續伯反奉其郷人李弘爲聖王弘乗佛輿以五綵裹青石誑百姓云天與巳玉印當王蜀後敗梁書曰何思澄自廷尉正遷治書侍御史宋齊巳來此職甚輕天監􅀄始重其選車前依尚書二丞給三騶執盛印青囊舊事糺彈印綬在前故也又曰王瑩拜}
  - {type: page-break, offset: 4798, content: '', id: KR3k0012_SBCK_683-5b}
  - {type: variant, offset: 4798, length: 0, content: '', WYG: 而𫝊國之璽厯代遞用襲封之印奕世相𫝊貴在仍舊無取改作今世唯尉一職獨用一印至内外羣官每遷悉改討尋其義私所未達若謂官各異姓與𫝊襲不同則未若異代之為殊也若論其名器雖有公卿之貴未若帝王之重若以或有誅夷之臣忌其凶穢則漢用秦璽延祚四百未聞以子嬰身戮國亡而棄之不佩帝王公侯之尊不疑於傳璽人臣衆僚之卑何嫌於即印載籍未聞其說推例自乖其准而終年刻鑄喪功消實金銀銅炭之費不可稱言非所以因循舊貫易簡之道愚請衆官即用一印無煩改作若新置官官多印少文或零失然後乃鑄則仰禆天府非唯小益齊書曰巴西人趙續伯反秦其鄉人李𢎞為聖王𢎞乗佛輿以五綵裹青石誑百姓云天與己玉印當王蜀後敗梁書曰何思澄自廷尉正遷治書侍御使宋齊以來此職甚輕天監初始重其選車前依尚書二丞給三騶執盛印青囊舊事糺彈在前故也又曰王瑩拜}
  - {type: page-break, offset: 4798, content: '', id: KR3k0012_WYG_683-8b, image: WYG0899/WYG0899-0143b.png}
