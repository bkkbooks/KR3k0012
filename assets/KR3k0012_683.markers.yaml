  - {type: variant, offset: 5004, length: 6, content: 事加綠緣綬履, SBCK: 周顗始入丞相呼顗曰伯仁以百口頼卿顗直過不應旣入苦相申救甚至旣釋顗大恱飲酒致醉而出導等猶在門又呼顗顗不與言顧左右曰今年殺諸賊奴當取一金印如斗大繫肘也列仙傳曰方囬者堯時人至夏桀末爲官士爲人所刼閇之宫中從求道因化而得去更以方囬印封其户時人言得方囬一丸泥門户不可開拾遺録曰禹治水黄龍曵尾於前玄􅀛􅀒青泥於後玄􅀛河精之使者􅀛頷下有印文皆古文作九州山水之字禹所穿鑿之處皆使青泥封記其所使玄􅀛印其}
