  - {type: variant, offset: 4793, length: 3, content: 純綠圭, SBCK: 板之侯君子耻服其章宋書曰孔琳之爲尚書左丞楊州中從事史所居著績時責衆官獻便冝琳建言曰夫璽印者所以辨章官爵立契符信官莫大於皇帝爵莫尊於}
