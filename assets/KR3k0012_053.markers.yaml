  - {type: variant, offset: 6, length: 0, content: '', krp: 廣平六十歩水深丈五尺銅槨三重玉鳬之流扁諸之劒在焉卒十万人治之取土臨湖葬三曰白虎居上故號曰虎丘東方朔十洲記曰長洲一名青丘在南辰巳地地五千里去岸二十五萬里上饒山川又多大樹樹有二千圍者一洲之上專是林木故一名青丘仙草靈藥甘液玉英靡所不有齊地記曰營丘在臨淄小城内古以爲齊室也丘下周三百餘歩髙九丈北廂下隆丈五造井水深七丈餘井與地平伏韜北征記曰博望城内有成湯伊尹箕子冢今皆爲丘𫐠異記曰南海中有軒轅丘鸞自歌鳯自舞古云天之樂也郡國志曰濮陽縣本顓頊之城今謂之帝丘夏后之代昆吾居之春秋衞遷于帝丘夢人登昆吾之墟是也又曰濮州初徒陶於乗丘故縣掘得􅃮盃二厎内有朱書曰乗丘旣見風日糜然爛碎矣陶今定陶外國圖曰貟丘之上有不死樹食之乃壽有赤泉飲之不老蕭丘多大風無人民群犬居之青丘之民食榖衣野絲去琅瑘萬三千里神丘有火穴其光照千里去琅瑘三萬里陳留風俗傳曰雍丘縣有五陵之丘以故名縣酈善長注水經曰沮水西逕楚昭王墓東對江陵城故王仲宣之賦登樓云西接昭丘是也又曰隋縣有断虵丘隋侯岀見大虵中断因舉而藥之故謂之断虵丘又曰鞏縣北有山臨河謂之岑原丘下有穴謂之鞏穴言山潜通淮濟北逹于河直穴有渚謂之鮪渚十道志云岑原丘在縣西北三十三里陵釋名曰陵隆也體隆髙也易曰天險不可升地險山川丘陵又曰躋於髙陵三歳不覿詩曰鴪彼飛隼率彼中陵又曰髙岸爲谷深谷爲陵禮曰五月可以居髙明可以遠眺望可以處臺榭傳曰蹇叔送其子曰殽有二陵其南陵夏后臯之墓其北陵文王之所避風雨也春秋說題辭曰陵之爲言稜也輔山成其廣層稜扶推益厥長也孝經援神契曰德至山川丘陵則景雲岀宋均注曰景雲應間澤不偏也爾雅曰大阜曰陵又曰東陵阠所陳切南陵息愼西陵威夷中陵朱勝北陵西隃鴈門是也音戍陵莫大於加陵梁莫大於溴梁墳莫大於河墳謂之八陵穆天子傳曰天子東遊次于崔梁曝蠹書于羽陵莊子曰盗跖死於東陵之上又曰歩仞之丘陵巨獸無所隱其軀而孽狐天子東征釣于隰水祭淑人是日祭丘爲之降吕氏春秋曰凢葬必於髙陵之上以避狐狸之患水泉之濕此則善矣楊子法言曰百川學海而至於海丘陵學山而不至山是故惡夫住者住止魏子曰堯入百仞之溪則不照三里非矇闇位卑勢下故也桀紂昇百丈之陵能見四海非照明位髙勢尊故也十洲記曰崑崙陵即崑崙山也西海之戍地北海之亥地去中國十萬里有弱水周匝繞山呉録曰張紘言於孫權曰秣陵楚武王所置名爲金陵秦始皇時望氣故掘断連崗改名秣陵物理論曰地者鎭之以五岳積之以丘陵阪詩曰阪有􅃮隰有栗爾雅曰坡者曰阪郭璞注曰阪地不平也史記曰漢文帝嘗從覇陵西馳下峻坂表盎攬轡上曰將軍怯也盎曰臣聞千金之子坐不垂堂百金之子立不倚衡今聖主乗危馳不側之淵如馬警車敗柰髙廟何上乃止漢書地理志曰河東蒲坂縣故曰蒲泰更名應劭曰秦始皇東廵見有長坂孟康曰本属晉文公以賂秦秦人還蒲魏人喜曰蒲反矣漢書曰王陽爲益州至卭僰蒲北切坂九折歎曰柰何以先人之遺體乗此險乎遂以病去及王遵爲刺史至此坂問吏曰此非王陽所畏道耶叱其馭駈之曰王陽爲孝子王遵爲忠臣應劭注曰坂在嚴道縣界漢書西域傳曰西域有赤玉身熱之坂上即今人身熱無色頭痛嘔吐續漢書地理志曰河東大陽縣有顛軨坂蜀志曰先主至當陽之長坂爲曹公所追敗王隱晉書曰孫登楊駿逼迎之與語不荅賜布𫀆登借刀截断棄門中大呼云刺斫刺斫卒病死後人見在貴馬坂穆天子傳曰天子南還昇于長松之坂郭僕注曰坂有長松酈善長注水經曰洛水東逕九曲其地千里有九坂之曲穆天子傳所謂天子西征升九阿是也又曰河水東逕旋門坂北今城臯西大坂是也昇陟此坂而東趣成臯城列女後傳曰吕榮者呉郡許昇之妻也昇爲賊所害榮貞固自守黄巾賊陳寳欲干穢之榮執節不聽寳遂殺榮是日疾風暴雨雷電晦冥寳恐懼叩頭謝葬之而去䴢府君聞榮髙行遣主簿祭之又岀錢助縣爲冢於嘉興郭里墟北名曰義婦坂華陽國志曰有牛叩頭坂馬搏頰坂其嶮如此晋太康地記曰常山曲陽縣有恒山坂號飛狐口上壺関縣有羊膓坂地理志曰凾谷東坂謂之八特坂述征記曰黄卷坂者傍絶澗以昇潼関長坂十餘里九坂皆迤邐長坂東京賦曰所謂西阻九阿者也戴延之}
