  - {type: variant, offset: 3, length: 0, content: '', WYG: 八丘陵阪陘峽岡丘説文曰丘土之髙非人所為丘字從一一地也一曰四方髙中央下象形也詩曰送子涉淇至於頓丘又曰子之蕩兮宛丘之上兮又曰楊園之道猗于畝丘又曰綿蠻黄鳥止于丘隅又曰丘中有麻彼留子嗟禮曰太公封于營丘比及五世皆反葬於周君子曰樂樂其所自生禮不忘其本古之人有言曰狐死正丘首仁也又曰公叔文子升於瑕丘蘧伯玉從二子衞大夫文子曰樂哉斯丘也死則我欲葬馬蘧伯玉曰吾子欲之則瑗請前刺其欲害人良田也瑗伯玉名也又曰為髙必因丘陵為下必因川澤周禮曰丘陵其動物宜羽物其植物宜覈物其民專而長傳曰車脱其輹火焚其旗不利行師敗于崇丘春秋元命苞曰堯為天子季秋中旬夢白帝遺以烏喙子其母為扶始昇髙丘睹白帝上有雲虎之狀感已生臯陶春秋説題辭曰丘者墓也又曰丘谷輔氣元士扶化爾雅曰丘一成為敦丘成猶重周禮曰為塗三成今江東呼地之矩者為敦再成鋭上為融丘三成為崑崙丘崑崙山三重形如累三盂如乘者乘丘形如車乘如渚者渚丘水中小洲為渚水潦所止泥丘頂上洿下丘方胡丘形四方絶髙為之京人力所作非人為之曰丘地自然生水潦所還曰將丘將者謂丘邊有界將水繞環之上正章丘頂平澤中有丘都丘在水澤内當塗梧丘塗道塗出其右而還之畫丘言為道所規畫塗出其前載丘道出丘南塗出其後昌丘道出丘北水出其前消丘水出其後沮丘水出其右正丘水出其左營丘今齊之營丘淄水過其南及東如覆敦者敦丘邐迤沙丘左髙咸丘右髙臨丘前髙旄丘後髙陵丘偏髙阿丘丘背有丘為負丘中央隆峻狀如負一丘於背上右澤定丘右陵秦丘宋有秦丘見史記如畝畝丘丘有壟界如田如陵陵丘丘上有丘為宛丘陳有宛丘今在陳留郡淮晉有潜丘今在太原晉陽縣淮南有州黎丘今在壽春天下有名丘五其三在河南二在河北説者多以州黎宛營為河南者潜敦為河北者案北方稱天下之名丘恐此諸丘碌碌未足用當之殆别有魁梧桀大者五但未詳其名號所在耳廣雅曰小陵曰丘又曰丘上有木為秘丘家語曰丘陵為牡谿谷為牝方言曰冢大者謂之丘穆天子傳曰天子昇于崑崙之丘以觀黄帝之宫郭璞注曰黄帝巡狩四海登崑崙山起宫室於其上又曰為盛姬曰哀淑之丘天子名之為丘作名是曰淑人之丘乙丑天子東征舍乎五鹿叔㛗}
