  - {type: variant, offset: 280, length: 2, content: 歸美, SBCK: 雩都峽其水常自激通奔如轉輪郡國志曰南郷峽峽西八十里有巴郷村善釀酒故俗稱巴郷酒也村傍有溪溪中多靈壽木焉水經注曰湞陽觀峽下有廟丗人以爲河伯晉時縣人有使至洛者使訖將還忽有一人􅀉其書云吾家在觀前石間石間懸藤即其處也但扣藤自當有人取之使者依其言果有二人岀外取書并延入水府衣不霑濡又曰續漢書云虞詡爲武都太守下辯東三十餘里有峽峽中白水生大石鄣塞水流春夏輙濆溢敗壞城郭詡使人燒石以醋灌之石皆淬裂因鐫去焉遂無泛溺之害又曰涇水東南逕都盧}
