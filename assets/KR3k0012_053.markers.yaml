  - {type: variant, offset: 18, length: 0, content: '', SBCK: 􅆉覆地赤如生肝問東方朔朔曰秦獄地􅁈氣也臣聞酒能銷愁以酒澆之果銷矣陘爾雅曰山絶曰陘郭璞注曰連山中断者也漢書曰趙王成安君陳餘聞漢且襲之聚兵井陘口號稱二十萬穆天子傳曰天子北征乃絶漳水至于鈃山之下郭璞注曰即井鈃山今在常山石邑郷述征記曰燕趙間凢厥山路名之曰陘井陘在常山峽水經注曰丹山在丹陽属巴丹山西即巫山者也帝女居焉宋玉所謂我帝之季女名曰瑶􅁎未行而亡封于巫山之陽髙唐之岨且爲雲暮爲􅀨朝朝暮暮陽臺之下旦朝視之果如其言故爲立廟號朝雲焉其間首尾一百六十里謂之巫峽盖因山爲名也盛弘之荆州記曰舊云自二峽取蜀數千里中􅁪是一山此盖好大之言也唯三峽七百里中兩岸連山略無闕處重巖疊嶂隱天蔽日自非停午夜分不見日月至於夏水襄陵㳂泝阻絶或王命急宜有時云朝發}
