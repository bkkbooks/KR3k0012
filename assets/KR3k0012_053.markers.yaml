  - {type: variant, offset: 4, length: 0, content: '', SBCK: 和切且哭思盛􅁎也㛗穆王女也是曰女㛗之丘困以名五鹿也丁夘山海經曰崑崙之丘實惟帝之下都莊子曰衛靈公死卜葬於故墓不􅁻卜葬於沙丘而􅁻掘之數仞得}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 和切且哭思盛姬也㛗穆王女也是曰女㛗之丘因以名五鹿也丁卯天子東征釣于漯水以祭淑人是曰祭丘東征山海曰崑崙之丘實惟帝之下都莊子曰衞靈公死卜葬於故墓不吉卜葬於沙丘而吉掘之數仞得}
