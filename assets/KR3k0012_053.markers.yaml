  - {type: variant, offset: 1540, length: 675, content: 頭云夷人昔牧於此豬化為石今夷人不敢於此牧又曰儋州昌化湖明山山有二石如人形云有兄弟二人向海捕魚因化為石號曰兄弟石也又曰桂州興安縣有臥石一枚其形似人而舉體青黃隱起而謂之石人可以析雨小舉則雨小大舉則雨大又曰貴州有洞池周十數丈下有石牛時出池間歲旱民殺牛祈雨以血和泥塗牛即雨盡即晴以為恒馬嶺山嶠多虺蛇毒殺人有冷石可以解之屑著瘡內即活又曰梁州女郎山張魯女浣衣石上女便懷孕魯謂邪淫乃放之後生二龍及女死將殯柩車忽騰躍昇此山遂葬焉其水旁浣衣石猶在謂之女郎山又曰郴州城北七十里有話石山孤石特竦仙人於此處談話輿地志曰南陵縣有女觀山俗傳云昔有婦人夫官於蜀屢愆秋期憂思感傷登此騁望因化為石如人之形所牽狗亦為石今狗形猶存愽物志曰鸛水鳥也卵時數入水卵冷取礜周圍繞卵以助暖氣華陽國志汶山有鹹石煎之得塩異苑曰勝滕放太元初枕文石枕臥忽暴雨震其所枕傍人莫不懾而放微覺有聲又曰永康王曠井上有一洗石時見赤氣後有二胡人寄宿忽求買之曠怪所以未及度錢子婦孫氏覩二黃鳥鬥於石上疾往掩取變成黃金胡人不知索市逾急既得橦破內止有二鳥處劉敬叔異苑曰晉武帝時吳郡臨平岸崩出一石鼓打之無聲以問張華華曰可取蜀中桐材刻作魚形扣之則鳴於是如言之聲聞數十里異物志曰夷州土無銅鐵磨礪青石以作弓矢此石砮楛矢之類物理論曰土精為石石氣之核也氣之生石猶人筋絡之生爪牙也博物志曰桃林在弘農湖縣休牛之山有石焉曰帝臺之棊也五色而文狀鶉卵焉遊名山志曰芙蓉渚有聳石頭如初生芙蓉色皆青白山海經曰燕山多嬰石言似玉有采嬰帶所謂燕石也又曰錢來之山多洗石若澡洗可以硤去垢也水經注曰象林郡功曹姓區有子名連攻縣殺令自號為王值世亂離林邑遂立後乃襲代傳位子孫, SBCK: ''}
