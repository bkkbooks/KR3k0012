  - {type: variant, offset: 1128, length: 189, content: 如斫明可以鑒人相傳以為殞星縣西有孤石挺出其下臨潭曠有見根者如竹根又曰樊重母畏雷為石室避之悉以石為階砌今猶存又曰臨賀馮乘縣東五里有故縣廟相傳漢淮南王安被誅其子奔迸來至一夜忽化為石人當縣門而立百姓怪而觀之其迫察者手足無不瘡爛述異記曰鏡湖俗傳軒轅氏鑄鏡於湖邊今有軒轅磨鏡石石上常潔不生蔓草輿地志曰會稽秦望山始皇刻石前有石廣數丈云是始皇坐之石兩邊有方坐八所云是丞相已下坐石故今有丞相石之, SBCK: 天雨即降因}
