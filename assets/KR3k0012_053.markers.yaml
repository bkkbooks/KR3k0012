  - {type: variant, offset: 2471, length: 706, content: 十丈周四十丈古老相傳言昔充縣尉與零陽尉共論封境因相傷害化而為石劉義慶幽明錄曰陽羨縣小吏吳龕有主人在溪南嘗以一日掘頭舡過水溪內見一五色浮石取內床頭至夜化成一女子也又曰宜都建平二郡之界有五六峰參差玄出上有倚石如二人像攘袂相對俗謂二郡督郵爭界於此揚雄蜀本紀曰秦王獻五美女於蜀王蜀王遣五丁迎五女見大虵入山空中五丁引虵山崩五女上山化為石又曰武都丈夫化為女子顏色美好蓋山之精也王娶以為妻無幾物故於成都郭中葬之以石鏡一枚徑一丈高五尺鄧析書曰譬猶拯溺而硾之以石救火而投之以薪世說曰武昌陽新縣北山上有望夫石狀若人立者傳云昔有貞婦其夫從役遠赴國難攜弱子餞送此山立望而化為石兵書曰軍中地生石將可以久居史記曰以石投水莫之逆也雜五行書曰婦姑鬥諍取石重六十斤埋門外即罷荀伯子臨川記云石原狀似倉廩其內可容千斛廩口開則歲儉閉則年豊又曰石龍山有巖其下有石形隱起似龍頭尾長一丈二尺地理記云有鱗甲因號為石龍又曰石鼓在宜黃水邊狀如鼓形闊九尺長一丈四尺四寸又云圓淨如鼓因以鼓為名焉又曰破石高五尺在宜黃水邊又云有女人水次浣濯為蛟所牽入石中經數日雷擊石破見死蛟及女人屍浮出因號為破石又曰浮石其石居汝水中心或水汎漲高岸皆沒此石居然不沒因以為名之又曰落峭石去飛猿館一百一十五里在飛猿水巍峨嵌空數里可望即謝靈運詩云朝發悲猿嶠暮宿落峭石是其處也始興記云營口東岸有石四方而可高百仞其狀若臺故名臺石又林水出焉其臺旁有石室室前盤石上行列十甕皆蓋以青盆悉是銀製有人過者但得開觀而不可取之則悶絕若死封丘之奴竊二枚為大虵所害即不知其自永嘉元云永嘉南岸有帖石乃堯之神人以破石推將入惡溪道次置之溪側遙望有似張帆今俗號為張汎溪與天台山相接又郡國志曰東海信郎神破石為帆今陳海有信郎祠即是, WYG: ''}
