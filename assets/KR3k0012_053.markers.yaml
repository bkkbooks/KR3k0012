  - {type: variant, offset: 4, length: 0, content: '', krp: 和切且哭思盛姬也㛗穆王女也是曰女㛗之丘困以名五鹿也丁夘山海經曰崑崙之丘實惟帝之下都莊子曰衛靈公死卜葬於故墓不吉卜葬於沙丘而吉掘之數仞得}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 槨焉洗而視之有銘曰不慿其子靈公奪而埋之夫靈公之爲靈乆矣淮南子曰堯時有大風爲民害乃繳大風於青丘之野許愼注曰大風大鷙鳥也文子曰川竭而谷虛丘夷而泉塞越絶書曰闔閭冢在呉縣昌門外名曰虎丘}
