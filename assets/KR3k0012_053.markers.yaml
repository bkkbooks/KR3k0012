  - {type: variant, offset: 15, length: 2, content: 家嘗, SBCK: 郡東北三十里古今地名曰􅁳軨坂在塩池東呉城之北今之呉坂新序曰趙簡子上羊腸之坂群臣皆推車宗㑹獨當㦸行歌簡子曰人臣而侮其主其罪􅀂何宗㑹曰其罪死君亦聞人君而侮其臣乎則智者不爲謀辯者不爲闘則其國危乎簡子曰善以宗㑹爲上客郡國志曰雍州咸陽縣北十五里長平坂漢武帝幸甘泉馳道}
