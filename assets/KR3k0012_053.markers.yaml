  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 八丘陵阪陘峽岡丘說文曰丘土之髙非人所爲丘字從一一地也人居在丘南從北中拜之居在崑崙一曰四方髙中央下象形也詩曰送子渉淇至于頓丘又曰子之蕩􅀆苑丘之上􅀆又曰崇丘萬物得極其髙大也又曰楊園之道猗于畝丘又曰綿蠻黄鳥止于丘隅又曰丘中有麻彼留子嗟禮曰太公封於營丘比及五世皆反葬於周君子曰樂樂其所自生禮不忘其本古之人有言曰狐死正丘首仁也正丘首正首丘也仁恩也又曰公叔文子升於瑕丘蘧伯玉從二子衛大夫文子曰樂哉斯丘也死則我欲葬焉蘧伯玉曰吾子欲之則瑗請前利其欲害人良田也瑗伯玉名也又曰爲髙必因丘陵爲下必因川澤周禮曰丘陵其動物冝羽物其植物冝覆物其民專而長傳曰車脫其輹火焚其旗不利行師敗于宗丘春秋元命包曰堯爲天子季秋下旬夢曰帝遺吾馬喙子其母爲扶始昇髙丘賭白帝上有雲虎之狀感巳生臯陶春秋􅀃題辭曰丘者墓也又曰丘谷輔氣元士扶化爾雅曰丘一成爲敦丘成猶重周禮曰爲壇三成今江東呼地高堆者敦舊音頓再成銳上爲融丘三成爲崑崙丘崑崙山三重􅄱如累三盂如乗者乗丘􅄱似車乗如渚者渚丘水中小洲爲渚水潦所止泥丘頂上洿下丘方胡丘形四方絶髙爲之京人力所作非人爲之曰丘地自然生水潦所還曰將丘宦音謂丘邊有界埓水繞環之上正章丘頂平澤中有丘都丘在水澤内當塗梧丘塗道塗岀其右而還之重丘言爲道所䂓畫途岀其前戴丘道岀丘南途岀其後昌丘道岀丘北水岀其前渻丘水岀其後沮丘水出其右正丘水岀其左營丘今齊之營丘淄水過其南及東如覆敦者敦丘邐迤沙丘左髙咸丘右髙臨丘前髙旄丘後髙陵丘偏髙阿丘丘背有丘爲負丘中央隆峻狀如負一丘於背上右澤定丘右陵泰丘宋有泰丘見史記如畒畒丘丘有壟界如田如陵陵丘丘上有丘爲宛丘陳有宛丘今在陳郡陳縣淮晉有潜丘今在太原晉楊陽縣淮南有州􅀺丘今在壽春天下有名丘五其三在河南二在河北說者多以州􅀺宛營爲河南者潜敦爲河北者案北方稱天下之名丘恐此諸丘碌碌未足用當之殆别有魁梧桀大者五但未詳其名號所在耳廣雅曰小陵曰丘又曰丘上有木爲祕丘家語曰丘陵爲牡谿谷爲牝方言曰冢大者謂之丘穆天子傳曰天子昇于崑崙之丘以觀黃帝之宫郭璞注曰黄帝廵狩四海登崑崙山起宫室於其上又曰爲盛􅁎謚曰哀淑人之丘天子名之爲丘作名是曰淑人之丘乙丑天子東征舎乎五鹿叔㛗}
