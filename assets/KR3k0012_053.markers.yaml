  - {type: variant, offset: 1405, length: 26, content: 饒州西一百里石形如倉囷昔漁人夜宿石下忽見石開窺其石中, SBCK: 縣東北後漢雷義字仲公所居又}
  - {type: variant, offset: 1405, length: 1040, content: 饒州西一百里石形如倉囷昔漁人夜宿石下忽見石開窺其石中有錢取之盈艇而去因為名郡國志云乞子石在馬湖南岸東石腹中出一小石西石腹中懷一小石故僰人乞子於此有驗因號乞子石又曰思州金雞石每有雞金色鳴於石上又曰仙人石曾有仙人飛下此石一曰仙人床又曰協州弄棟縣蜻蛉水下有石豬峰有石豬母子數十頭云夷人昔牧於此豬化為石今夷人不敢於此牧又曰儋州昌化湖明山山有二石如人形云有兄弟二人向海捕魚因化為石號曰兄弟石也又曰桂州興安縣有臥石一枚其形似人而舉體青黃隱起而謂之石人可以析雨小舉則雨小大舉則雨大又曰貴州有洞池周十數丈下有石牛時出池間歲旱民殺牛祈雨以血和泥塗牛即雨盡即晴以為恒馬嶺山嶠多虺蛇毒殺人有冷石可以解之屑著瘡內即活又曰梁州女郎山張魯女浣衣石上女便懷孕魯謂邪淫乃放之後生二龍及女死將殯柩車忽騰躍昇此山遂葬焉其水旁浣衣石猶在謂之女郎山又曰郴州城北七十里有話石山孤石特竦仙人於此處談話輿地志曰南陵縣有女觀山俗傳云昔有婦人夫官於蜀屢愆秋期憂思感傷登此騁望因化為石如人之形所牽狗亦為石今狗形猶存愽物志曰鸛水鳥也卵時數入水卵冷取礜周圍繞卵以助暖氣華陽國志汶山有鹹石煎之得塩異苑曰勝滕放太元初枕文石枕臥忽暴雨震其所枕傍人莫不懾而放微覺有聲又曰永康王曠井上有一洗石時見赤氣後有二胡人寄宿忽求買之曠怪所以未及度錢子婦孫氏覩二黃鳥鬥於石上疾往掩取變成黃金胡人不知索市逾急既得橦破內止有二鳥處劉敬叔異苑曰晉武帝時吳郡臨平岸崩出一石鼓打之無聲以問張華華曰可取蜀中桐材刻作魚形扣之則鳴於是如言之聲聞數十里異物志曰夷州土無銅鐵磨礪青石以作弓矢此石砮楛矢之類物理論曰土精為石石氣之核也氣之生石猶人筋絡之生爪牙也博物志曰桃林在弘農湖縣休牛之山有石焉曰帝臺之棊也五色而文狀鶉卵焉遊名山志曰芙蓉渚有聳石頭如初生芙蓉色皆青白山海經曰燕山多嬰石言似玉有采嬰帶所謂燕石也又曰錢來之山多洗石若澡洗可以硤去垢也水經注曰象林郡功曹姓區有子名連攻縣殺令自號為王值世亂離林邑遂立後乃襲代傳位子孫三國鼎爭未有所附吳有交土與之鄰接進侵壽泠以為壃界自區連以後國無文史先其纂代世數難詳宗胤滅絕無復種裔外孫范熊代立人情樂推後熊死子逸立有范文曰南西捲縣夷帥稚夷奴也文為奴時山邊牧羊於澗水中得兩鯉魚隱藏持歸規欲私食郎知檢其魚大慚懼詐云將礪石還非為魚也郎至魚所見是兩石信之而去文始異之石有鐵文入山中就石治鐵鍜作兩刀舉刃向鄣因呪曰鯉魚變化治石成刀斫石鄣破者是有靈神文當治此為國君王斫不入者是無神靈進斫石鄣如龍淵干將之斬蘆藁由是人情漸附今斫石尚在魚刀猶傳子孫又曰澧水出武陵充, WYG: ''}
