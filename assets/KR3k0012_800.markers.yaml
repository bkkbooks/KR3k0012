  - {type: variant, offset: 31, length: 8, content: 言僻易無別風俗通, SBCK: 春秋作菆宇發矢次射故中則同的則匈奴之革笥木薦弗能支也革笥以皮作如鎧春夜薦以木枚作如楯又}
