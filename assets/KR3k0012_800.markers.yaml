  - {type: variant, offset: 41, length: 0, content: '', krp: 貉之地積隂之處也木皮三寸冰厚六尺食肉而飲酪其人蜜理鳥獸毳毛蜜理謂其肥肉也毳細毛也其性耐寒又曰胡人衣食之業不著於地著直略反其勢易以擾亂邊境何以明之胡人如飛鳥走獸廣壄美草甘水則止草盡水竭則移以是觀之往來轉徙時至時去此胡人之生業而中國之所以不可離南畝又曰匈奴欲立威}
