  - {type: variant, offset: 46, length: 1, content: 山, SBCK: 曰耿秉上言曰今北虜分爭以夷伐夷國家之利又曰間匈奴傳論曰并兵窮討掩其宻穴躡北追奔三千餘里破龍祠焚􅄢幕銘功封石偈呼而旋又曰王莽時盧芳詐稱武帝之後奔匈奴十二年芳與賈覽共攻雲中乆不下其將隨昱得芳之衆昱詣闕拜昱爲五原太守封鐫胡侯鐫謂鑿鑿之也晉書曰前漢末匈奴大亂五單于争立而呼韓邪單于失其國携率部落入臣於漢嘉其意剖并州北界以安之於是匈奴五千餘落入居朔方諸郡與漢人雜處後漢末群臣競言胡入猥多冝先爲其所建安中魏武帝始分其中衆爲五部部立其中貴者爲師復改帥爲都尉其左部都尉所統可萬餘落居於太原右部都尉可六千餘落居於祁縣􅀯部都尉可三千餘落居於蒲子縣北部都尉可四千餘落居興縣中部都尉可六千餘落居太陵縣又曰晉武帝踐祚後匈奴二萬餘落歸化帝復納之使居河西故冝陽城下後復與晉人雜居由是平陽西河新興上黨樂平靡不有焉又侍御史郭欽上䟽曰}
