  - {type: variant, offset: 27, length: 1, content: 狄, SBCK: 晁錯上書曰戰勝之威民氣百倍敗兵之卒没丗不復自髙后以來隴西三困於匈奴矣民氣破傷亡有勝意又曰以蠻夷攻蠻夷中國之形也今匈奴地形技藝與中國異上下山阪出入溪澗中國之馬弗與與如也險道傾仄且馳且射中國之􅀐弗與也風雨罷勞飢渇不困中國之人不與也此匈奴之長技也又曰材官騶發矢道同的騶謂矢之善}
