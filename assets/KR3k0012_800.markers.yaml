  - {type: variant, offset: 65, length: 0, content: '', SBCK: 不輕都此矣令匈奴降者時時得此而賜之一國聞之見之者希心而相告人人兾幸以爲吾至可以得此將以懷}
  - {type: variant, offset: 65, length: 0, content: '', WYG: 不輕都此矣今匈奴降者時時得此而賜之一國聞之見之者希心而相告人人冀倖以為吾至可以得此將以壞}
  - {type: variant, offset: 65, length: 0, content: '', krp: 不輕都此矣令匈奴降者時時得此而賜之一國聞之見之者希心而相告人人兾幸以爲吾至可以得此將以懷}
  - {type: variant, offset: 66, length: 11, content: 被髮左袵言語贄幣事殊互, SBCK: 目一餌也匈奴之使至者􅀂大降者也大衆之聚也上必有所召賜食焉飯物盛美胾炙醯醢方數尺於前令一人坐此胡人欲觀者固百數在旁得賜者之喜也且􅀏且飯味皆所􅄝而所未當得也今來者時時得此而饗之一國聞之者見之者垂涎而相告人自以吾至亦將得此將此懷其口一餌也降者􅀂使者至也必使人有所召客焉胡人之欲觀者勿禁令婦􅀓白黒繡衣而侍其堂者二三十人或薄或掩爲其胡戯使樂府吹簫鼓鞀令使降者時得此而樂一國聞之者見之者人人唯恐其後至也以此懷其耳一餌也凡降者陛下必有所冨令有髙堂􅃉宇善厨大囷廐有編馬庫有陣車時時大具召胡客饗胡令其居處樂皆過其慮出其單于或時時賜此匈奴一國傾心而兾人人汲汲其時將以此懷其腹一餌也於來降者上必時時有所召幸拊循而後得入官於胡嬰兒貴人子好可愛有數十人爲繡衣出則從出入則從入則更侍胡嬰兒得近侍胡貴人得佐酒上前使付酒錢出繡衣具帶服時以賜之令數人得此而居之一國聞者見者人人唯恐後至也以此懷其心一餌}
  - {type: page-break, offset: 66, content: '', id: KR3k0012_SBCK_800-6b}
  - {type: variant, offset: 66, length: 11, content: 被髮左袵言語贄幣事殊互, WYG: 目一餌也匈奴之使至者若天降者也大衆之聚也上必將召賜食焉飯物盛美胾炙醯醢方數尺扵前令一人坐此胡人觀者數在旁得賜者之喜也且笑且飯味皆所嗜而謂未嘗得也令來者時時得此而饗之一國聞之者見之者涎而相告人自以吾至亦將得此以此壞其口一餌也降者若使者至也必使人有所召客焉胡人之欲觀者勿禁令婦傳白黒繡衣而侍其堂者三二十人或薄或掩為其故戱使樂府吹簫皷鞀令使降者時得此而樂一國聞之者見之者人人唯恐其後至也以此壞其耳一餌也凡降者陛下必有所居令有髙堂􅃉宇善厨大囷廐有編馬庫有陣車時時大具召胡客饗胡令其居處樂皆過其慮其單于或出時時賜此匈奴一國傾心而冀人人汲汲其時將以此壞其腹一餌也扵來降者上必時時所召幸拊循而後得入官扵胡嬰兒貴人子好可愛有數十人爲繡衣出則更從入則更侍胡嬰兒得近侍胡貴人得佐酒上前使付酒錢出繡衣具帯衣服時以賜之令數人得此而居之一國聞者見者人人唯恐後至也以此壞其心一餌}
