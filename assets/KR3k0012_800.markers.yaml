  - {type: variant, offset: 2434, length: 145, content: 亡也國語曰鄭人伐滑王使游孫伯請滑鄭人執之王怒將以狄伐鄭狄隗姓之國也富辰諫曰不可夫狄無列於王室列位次也豺狼之德也王不忍小忿而棄鄭又登叔隗以階狄階狄禍狄封豕豺狼不可厭也厭足也王弗聽十八年王黜狄后於王子帶故也狄人來誅殺譚伯狄人奉子帶攻王而殺譚伯初惠后欲立王子帶故以其黨啟狄人狄人遂入周王乃出居於鄭, SBCK: 俗}
