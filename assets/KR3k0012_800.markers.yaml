  - {type: variant, offset: 2581, length: 198, content: 晉侯使隨會聘于周王饗之餚蒸原公相禮范子私於原公曰吾聞王室之禮無毀折今此何禮也原公以告于王王召士季范子字也曰親戚宴饗則有餚蒸蒸升也升折俎之餚也唯戎狄則有體薦夫戎狄冒沒輕儳貪而不讓冒抵觸也沒入也儳進退無列其血氣不治若禽獸焉其適來班貢不俟馨香嘉味適往也班賦也故坐諸門外而使舌人體委與之舌人能達異方之志象咠之宮汝今我王室之一二兄弟以時相見於是乎有折俎加豆加豆謂既食之後所加之豆也其實芹俎菟醢之屬以示容合好, WYG: ''}
