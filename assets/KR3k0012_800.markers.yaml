  - {type: variant, offset: 877, length: 1458, content: 漸之石下國刺幽王也戎狄叛之山石漸漸然高峻不可登而上喻戎狄眾強而無禮義不可得而復也又曰何草不黃下國刺幽王也四夷交侵中國背叛用兵不息視民如禽獸用兵不息自歲始至晚歲何草不黃禮曰北方曰狄衣羽毛穴居有不粒食者周禮曰職方氏掌天下之圖以掌天下之地辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人民與其財用九穀六畜之數要周知其利害北方曰貉狄四八七九五六周之所服國數也利金錫竹箭之屬害神奸鑄鼎所象百物也又曰司隸掌五隸之法辨其物而掌其政令五隸謂罪隸四狄之屬也物衣服兵器之屬夷隸掌養牛馬與鳥言鄭司農云東夷狄之人或曉鳥獸之言故春秋傳曰介葛盧聞牛鳴曰是生二犧皆用矣是以夷隸職掌與獸言傳曰北戎侵鄭鄭伯禦之公子突曰戎輕而不整貪而無親勝不相讓敗不相救又曰晉里克帥師梁由靡御以敗狄于采桑平陽北屈縣西南有采桑津梁由靡曰狄無恥從之必大克不恥走也里克曰懼之而已無速眾狄又曰晉侯敗狄于箕卻缺獲白狄子白狄狄之別種也故西河郡有白部胡又曰鄋䐽侵齊鄋䐽狄國名遂伐魯魯使叔孫得臣敗狄于鹹獲長狄僑如富父終甥摏其喉以戈殺之埋其首於子駒之門又曰赤狄侵齊又侵晉取向陰之禾晉滅赤狄潞氏以潞子嬰兒歸潞赤狄之別種氏又曰成下潞子嬰兒之夫人晉景公之姉也酆舒為政而殺之又傷潞子之目晉侯將伐之諸大夫皆曰不可酆舒有三俊才伯宗曰狄有五罪不祀一也嗜酒二也棄仲章而奪黎氏地三也虐我伯姬四也傷其君目五也天反時為災地反物為妖民反德為亂亂則妖災生故文反正為乏盡在狄矣晉侯從之晉荀林父敗赤狄于曲梁晉侯賞桓子狄臣千室又曰無終子嘉父使孟樂如晉無終山戎國名孟樂其使臣因魏莊子納虎豹之皮以請和諸戎晉侯曰戎狄無親而貪不如伐之魏綘曰勞師於戎諸華必叛戎禽獸也獲戎失華無乃不可乎公曰然則莫如和戎乎對曰和戎有五利焉戎狄荐居貴貨易土可賈焉一也邊鄙不聳民狎其野穡人成功二也戎狄事晉四鄰振動諸侯威懷三也以德綏戎師徒不勤甲兵不頓四也鑒于后羿而用德度遠至邇安五也又曰鄭人賂晉侯歌鍾二肆肆列也懸鍾十六為一肆及其鍾磬女樂二八晉侯以樂之半賜魏綘曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之辭曰夫和戎狄國之福也臣何力之有焉公曰微子無以待戎夫賞國之典也子其受之魏綘疑於是乎始有金石之樂禮也又曰魯襄公十八年白狄始來白狄狄之別各未嘗與魯掠故曰始來也又曰晉荀吳帥師敗狄于大鹵大鹵太原晉陽縣也又曰晉中行穆子敗無終及群狄于太原即大鹵也無終山戎也將戰魏舒曰彼徒我車所遇又阨地險不便車以什共車不克更增十人以當一車之用乃毀車以為行毀車為步陣為五陣以相離兩於前伍於後專為右角參為左角偏為前拒皆臨時處能用善謀以誘之狄人笑之笑其失常未陣而薄之大敗之傳言荀吳能用善謀又曰晉梁丙率陰戎伐潁潁周邑王使詹桓伯辭於晉曰我在伯父猶衣服之有冠冕木水之有本原民人之有謀主也民人謀主宗族之師長伯父若裂冠毀冕拔本塞源專棄謀主雖戎狄其何有余一人伯父猶然則難戎狄無所可責又曰晉荀吳偽會齊師者假道于鮮虞遂入晉陽鮮虞白狄別種晉陽肥國滅肥以肥子縣皋歸肥白狄也縣皋其君名鉅鹿下曲陽西南有肥累城又曰晉荀吳帥師伐鮮虞圍鼓三日鼓人告食竭力盡而後取之克鼓而反不戮一人以鼓子鳶鞮歸鳶鞮鼓名也又曰晉荀躒如周葬穆后籍談為介王求彝器籍談曰晉居深山戎狄之與鄰而遠於王室王靈不及拜戎不暇其何以獻器王曰叔父唐叔成王之母弟也密須之鼓與其大路文所以蒐也密須始姓國也文王伐之得其路鼓以蒐闕鞏之甲武所以克商也闕鞏國所出鎧唐叔受之處參虛撫有戎狄參實沈之次晉之分野又曰晉侯訓兵於稷以略狄土穀梁傳曰中國夷狄曰大鹵爾雅曰北至于祝栗左極遠之國又曰觚竹北戶西王母曰下謂之四荒觚竹在北地戶在南西王母在西日下在東西方昏荒之國又曰, SBCK: ''}
