  - {type: punctuation, offset: 10, content: 》, id: KR3k0012_CHANT_800-bkkpn2}
  - {type: variant, offset: 10, length: 0, content: '', SBCK: 公攘戎翟居于西河圁洛之間圁音嚚號曰赤翟白翟師古曰春秋所書晉師滅赤狄潞氏郄缺獲白狄又曰晉北有林胡樓煩之戎燕北有東胡山戎服䖍曰烏桓之先也後爲鮮卑又曰晉悼公使魏絳和戎翟戎翟朝晉後百餘年趙襄子踰句注而破之并代以臨胡貉貉音莫伯反後與韓魏共滅智伯分晉地而有之則趙有代句注以北而魏有西河上郡以與戎界邊又曰秦滅六國而始皇帝使蒙恬將數十萬衆北擊胡悉收河南地因河爲塞築四十四縣城臨河徙讁戍以充之有罪謫令戍之徙讁者令居之而通直道自九原至雲陽因邊山險壍谿谷可繕者繕之繕􅀘也起臨洮至遼東萬餘里又渡河據陽山北假中北假地名當是時東胡強而月氐盛又曰􅄧曰旄頭胡星也􅄧畢間爲天街胡貉月支旃喪引􅀆之民􅄧之主又曰楊雄上書北地之狄五帝所不能臣三王所不能制又曰前丗豈樂傾無量之費役無罪之人快心於狼望之北哉匈奴中地名以爲不一勞者不佚不暫費者不永寧是以忍百萬之師以摧餓虎之喙運府庫之財填盧山之壑而不悔也盧山匈奴中山也又}
