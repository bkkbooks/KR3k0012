  - {type: variant, offset: 52, length: 1, content: 貊, SBCK: 冝以厚德懷四夷孰敢不承帝意陛下爲臣建三表設五餌以此與單于爭則下匈奴猶振槁也臣且以事􅀔諭天子之言使匈奴大衆信陛下也􅀂日出之灼灼故聞君一言雖有㣲逺其志不疑仇讎之人其心不殆􅀂此則信諭矣一表也臣又且以事􅀔諭陛下之愛令匈奴之自視也茍胡面而戎狀}
