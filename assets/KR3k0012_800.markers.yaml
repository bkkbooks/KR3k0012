  - {type: variant, offset: 20, length: 1, content: 淫, WYG: 嘉謀之臣曷嘗不運籌策相與争扵廟堂之上乎髙祖時則文敬吕后時有樊噲王恢韓安國季布孝文時賈誼晁錯孝武時有朱買臣公孫𢎞董仲舒人持所見各有異同然揔其要歸兩科而已搢紳之儒則守和親介胄之士則言征伐皆偏見一時之利害也又曰文帝徙六郡良家材力之士聚天下精兵軍扵廣武顧問馮唐與論將帥喟然歎息思古名臣此和親無益之明効也又曰董仲舒以匈奴可恱以厚利結之以盟誓故與之厚利以没其意與盟扵天以堅其約質其愛子以累其心使邊城守境之民父兄緩帯稚子咽哺胡馬不窺扵長城而羽檄不行扵中國不亦便扵天下乎又曰孝武時雖征伐克獲而士馬物故亦各相當雖開河南之野建朔方之郡亦棄晉陽之北九百餘里匈奴人民每年來降漢單于亦輙拘當漢使以相報復其桀鷔尚如斯又曰孝宣之世單于臣服三世稱藩賔扵漢庭是時邊城晏閉牛馬布野又曰王莾簒位始開邊隙單于由是歸怨自絶莾斬其侍子邊境之禍搆矣又曰蕭望之曰戎狄荒服言其來服荒忽無常時至時去宜待以客禮又曰夷狄之人飲食不同言語不通}
