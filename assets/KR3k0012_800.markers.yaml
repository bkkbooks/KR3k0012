  - {type: variant, offset: 41, length: 0, content: '', SBCK: 貉之地積隂之處也木皮三寸冰厚六尺食肉而飲酪其人􅁡理鳥獸毳毛􅁡理謂其肥肉也毳細毛也其性耐寒又曰胡人衣食之業不著於地著直略反其勢易以擾亂邊境何以明之胡人如飛鳥走獸廣壄美草甘水則止草盡水竭則移以是觀之往來轉徙時至時去此胡人之生業而中國之所以不可離􅀯􅅿又曰匈奴欲立威}
  - {type: variant, offset: 41, length: 0, content: '', WYG: 貉之地積隂之處也木皮三寸凍厚六尺食肉而飲酪其人宻理鳥獸毳毛其性耐寒又曰胡人衣食之業不著扵地其勢易以擾亂邊境何以明之其俗如飛鳥走獸廣野美草甘水則止草盡水竭則移以是觀之往來轉徙時至時去此矯捷之生業也又曰匈奴欲立威}
