  - {type: variant, offset: 49, length: 1, content: 別, SBCK: 後有風塵之警胡􅀐自平陽上黨不三日而至孟津北地西河太原馮翊安定上郡盡爲狄庭矣冝及平吴之威謀臣猛將之略出北地西河安定復上郡實馮翊於平陽以北諸縣募取死罪徙三河三魏四萬家以充之裔不亂華漸徙平陽􅁪農魏郡京兆上黨雜胡峻四夷出入之防明先王荒服之制萬丗之長䇿也又曰太康七年有萎莎胡率部落來降又曰北狄以部落爲􅀋其入居塞者有鮮支}
