  - {type: variant, offset: 2979, length: 182, content: 王曰與之每與而狄人之至不止太王問耆老曰狄人又何欲耆老曰又欲土地太王曰與之耆老曰君不為社稷乎太王曰社稷所以為民也不可以所為亡民也耆老曰君縱不為社稷不為宗廟乎太王曰宗廟者私也不可以吾私害民也遂杖策而去過梁山止乎岐山周氏之民奔而從之者三千乘詩含神霧曰四方蠻貊制作器物多與中國反書則撗行食則合和伏則交腳鼓則細腰知此類甚眾中國之所効者貂蟬胡床胡飯春秋考異記曰北狄之氣主生幽都, SBCK: 平御覽卷第八百}
