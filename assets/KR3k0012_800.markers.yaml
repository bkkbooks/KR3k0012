  - {type: variant, offset: 110, length: 766, content: 有玁狁之難以天子之命命將帥遣戍役以守衛中國故歌采薇以遣之出車以勞還枤杜以勤歸也采薇采薇薇亦作止薇菜作生也西伯將遣戍役先與之期以采薇之時今薇生矣可以行矣重言采薇丁寧行期也曰歸曰歸歲亦暮止又丁寧歸期定其心也靡室靡家玁狁之故不遑啟居玁狁之故玁狁北狄也古者師出不踰時今薇生而行歲晚乃歸使汝無室家夫婦之道不暇跪居者有玁狁之難也又曰我戍未定靡使歸聘聘問也定止也我方守於北狄未得止息無所使歸問言所以憂又曰戎車歸駕四牡業業豈敢定居一月三捷一月之中三有勝功謂侵也伐也戰也又曰豈不日戒玁狁孔棘戒警勑軍事也孔甚棘急也言君子小人豈不日相警戒乎玁狁之難甚急預述其苦以勸之又曰王命南仲往城于方出車彭彭旂旐央央王殷王也南仲文王之屬方朔方近獫狁之國也彭彭駟馬貌王使南仲為將率往築城於朔方為軍壘以禦北狄之難天子命我城彼朔方赫赫南仲玁狁于襄襄除也又曰昔我往矣黍稷方華今我來思雨雪載塗王事多難不遑啟居塗凍釋也黍稷方華朔方之地六月時也以此出征至春凍始釋而來反又曰執訊獲醜薄言還歸訊言醜眾也執其可言問所獲之眾以歸者當獻之赫赫南仲玁狁于夷夷平也又曰六月宣王北伐也六月言周室微而復興美宣王之北伐也六月棲棲戎車既飭四牡騤騤載是常服悽悽簡閱皃飭正也日月為常服戎服也記六月者盛夏出兵明其急也玁狁孔熾我是用急熾盛也此序吉甫之意也北狄來侵甚熾故王以急遣我又曰玁狁匪茹整居焦穫侵鎬及方至于涇陽焦穫周地名也接于獫狁者也匪非也茹度也鎬與方皆北方地名言獫狁之來侵非其所當度為也乃自整齊而處周之焦穫來侵至涇水之北言其太恣也又曰薄伐玁狁至于太原言遂出之而已又曰文武吉甫萬邦為憲吉甫尹吉甫也有文有武憲法也吉甫此時大將也吉甫燕喜既多受祉吉甫尹吉甫也有文祉福也吉甫既伐獫狁而歸天子以燕禮樂之則歡喜矣又多受賞賜也又曰顯允方叔征伐玁狁方叔先與吉甫征伐獫狁又曰車攻宣王復古也宣王能內脩政事外攘夷狄復文武之境土又曰, SBCK: 沙漠東}
