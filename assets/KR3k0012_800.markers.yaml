  - {type: punctuation, offset: 8, content: 《, id: KR3k0012_CHANT_800-bkkpn1}
  - {type: variant, offset: 8, length: 1, content: 說, SBCK: 有山戎獫狁葷粥晉灼曰堯時葷粥周曰獫狁秦曰匈奴又曰武王伐紂而營雒邑復居於豊鎬放逐戎狄涇洛之北時入貢命曰荒服又曰趙武靈王北破林胡樓煩築長城自代傍隂山下至髙闕在朔方爲塞而置雲中鴈門代郡漢書曰山戎伐燕告急子齊桓公北伐山戎山戎走又曰晉}
  - {type: variant, offset: 8, length: 1, content: 說, WYG: 有山戎獫狁葷粥又曰武王伐紂而營雒邑復居扵豐鎬遂放戎狄涇浴之北乃入貢命曰荒服又曰趙武靈王北破林胡樓煩築長城自代傍隂山下至髙闕為塞而置雲中鴈門代都漢書曰山戎伐燕告急扵齊桓公北伐山戎山戎走又曰晉}
