  - {type: variant, offset: 12, length: 5, content: 犬種字從犬, SBCK: 不服中國未得髙枕安寢也又曰外國天性忿鷙鷙佷也音竹二反形容魁徤􅀒力怙氣難化以善易􅀠以惡􅀠謂附属之惡謂威也其強難詘其和難得故未服之時勞師逺攻又曰狄眞中國之堅敵也又曰王莽征匈奴嚴尤諌曰周秦漢征之皆未得上䇿者也周得中䇿漢得下䇿秦無䇿焉周宣王時獫狁内侵至于涇陽命將征之盡境而還其視戎}
  - {type: variant, offset: 12, length: 5, content: 犬種字從犬, WYG: 不服中國未得髙枕安寝也又曰外國天性忿鷙形容魁徤負力怙氣難化以為善易𨽻以惡其強難詘其和難得故未服之時勞師逺攻又曰狄真中國之堅敵也又曰王莾征匈奴嚴尤諫曰周秦漢征之皆未得上策者也周得中策漢得下策秦無策焉周宣王時獫狁内侵至扵涇陽命將征之盡境而還其視戎}
  - {type: variant, offset: 12, length: 5, content: 犬種字從犬, krp: 不服中國未得髙枕安寢也又曰外國天性忿鷙鷙佷也音竹二反形容魁徤負力怙氣難化以善易隷以惡隷謂附属之惡謂威也其強難詘其和難得故未服之時勞師逺攻又曰狄眞中國之堅敵也又曰王莽征匈奴嚴尤諌曰周秦漢征之皆未得上䇿者也周得中䇿漢得下䇿秦無䇿焉周宣王時獫狁内侵至于涇陽命將征之盡境而還其視戎}
