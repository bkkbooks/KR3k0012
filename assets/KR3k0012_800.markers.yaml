  - {type: variant, offset: 62, length: 0, content: '', SBCK: 人之自視也茍其校之所長與其所工可以當天子之意􅀂此則好諭矣一表也愛人之狀好人之役愛有實以諾可期十死一生彼必將至此謂三表匈奴好之來}
