  - {type: 'tls:seg', offset: 17, content: '', id: KR3k0012_CHANT_800-1a.7}
  - {type: variant, offset: 19, length: 0, content: '', SBCK: 侵境而譬猶蚊蝱之螫歐之而巳故天下稱明是爲中䇿漢武帝選將練兵約齎輕糧深入逺戍約少也少齎裝雖有克獲之功胡輙報之兵連禍結三十餘年中國疲耗匈奴亦創艾創音􅀄向反艾讀日乂而天下稱武是爲下䇿秦始皇不忍小耻而輕民力築長城之固延袤萬里袤長也音茂轉輸之行起於􅀒海疆墳旣完中國内竭以喪社稷是爲無䇿今天下比年飢饉發三十萬衆具三百日糧兵先至者聚居􅁀露勢不可用一難也邊旣空虚内調郡國不相及屬此二難也計一人三百日食用糒十八斛非牛力不能勝胡也沙鹵多乏水草軍出未滿百日牛必物故此三難也胡地秋冬甚寒春夏甚風食糒飲水師有疾疫此四難也輜重自隨則輕銳者少幸而逢虜危殆不測此五難也莽不聽又曰夷狄之爲患也故自漢興忠}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_SBCK_800-2b}
  - {type: variant, offset: 19, length: 0, content: '', WYG: 侵境譬猶蛟蟲之螫敺之而已故天下稱明是為中策漢武帝選將練兵約齎輕糧深入逺戍雖有克獲之功胡輙報之兵連禍結三十年中國疲耗匈奴亦創艾而天下稱武是為下策秦始皇不忍小耻而輕民力築長城之固延袤萬里轉輪之行起扵負海疆場既完中國内竭以喪社稷是為無策今天下比年饑饉三十萬衆具三百日糧兵先至者聚居暴露勢不可用一難也邊既空虛内調郡國不相属及此二難也計一人三百日食用糧十八斛非牛力不能勝胡地沙鹵多乏水草軍出未滿百日牛必物故此三難也胡地秋冬甚寒春夏甚風食糒飲水師有疾疫此四難也輜重自隨則輕鋭者少幸而逄虜危殆不測此五難也莾不聽又曰夷狄之為患也考自漢興忠}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_WYG_800-3b, image: WYG0900/WYG0900-0107b.png}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_WYG_800-4a, image: WYG0900/WYG0900-0107c.png}
  - {type: variant, offset: 19, length: 0, content: '', krp: 侵境而譬猶蚊蝱之螫歐之而巳故天下稱明是爲中䇿漢武帝選將練兵約齎輕糧深入逺戍約少也少齎裝雖有克獲之功胡輙報之兵連禍結三十餘年中國疲耗匈奴亦創艾創音𥘉向反艾讀日乂而天下稱武是爲下䇿秦始皇不忍小耻而輕民力築長城之固延袤萬里袤長也音茂轉輸之行起於負海疆墳旣完中國内竭以喪社稷是爲無䇿今天下比年飢饉發三十萬衆具三百日糧兵先至者聚居暴露勢不可用一難也邊旣空虚内調郡國不相及屬此二難也計一人三百日食用糒十八斛非牛力不能勝胡也沙鹵多乏水草軍出未滿百日牛必物故此三難也胡地秋冬甚寒春夏甚風食糒飲水師有疾疫此四難也輜重自隨則輕銳者少幸而逢虜危殆不測此五難也莽不聽又曰夷狄之爲患也故自漢興忠}
  - {type: variant, offset: 20, length: 1, content: 淫, SBCK: 嘉謀之臣􅂚甞不運籌䇿相與爭於廟堂之上乎髙祖時則劉敬吕后時樊噲季布孝文時賈􅁩朝錯孝武時有王恢韓安國朱買臣公縣引董仲舒人持所見各有異同然揔其要歸兩科而巳搢紳之儒則守和親介胄之士則言征伐皆偏見一時之利害也又曰文帝徙六郡良家材力之士六邵謂隴西天水安定北地上郡西河也其日定天水西河武帝所置耳史夲其土地而追言之也聚天下精兵軍於廣武顧問馮唐與論將帥喟然歎息思古名臣此和親無益之明効也又曰董仲舒以匈奴可恱以厚利結之於天耳故與之厚利以没其意與盟於天以堅其約質其愛子以累其心使邊城守境之民父兄緩帶稚子咽哺胡馬不窺於長城而羽檄不行於中國不亦便於天下乎又曰孝武時雖征伐克獲而士馬物故亦略相當雖開河􅀯之野建朔方之郡亦弃造陽之北九百餘里匈奴人民每來降漢單于亦輙拘留漢使以相報復其桀鷔尚如斯又曰孝宣之丗單于臣服三丗稱藩賔於漢庭是時邊城晏閉牛焉布野又曰王莽􅆲位始開邊􅂩單于由是歸怨自絶莽斬其侍子邊境之禍搆矣又曰蕭望之曰戎狄荒服言其來服荒忽無常時至時去冝待以客禮又曰夷狄之人飲食不同言語不通}
