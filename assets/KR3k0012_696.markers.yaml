  - {type: variant, offset: 1177, length: 487, content: 宮得幸於平文生昭成平文崩昭成在襁褓時國有內難將害帝子后匿帝於袴中呪曰若天祚未終者汝無聲遂良久不啼得免於難又曰淮陰屠中少年有侮韓信者眾辱之曰信能死剌我不能出我袴徐廣曰袴服也袴亦作跨於是視之俛出袴下蒲伏一市皆笑信以為怯又曰周仁為人陰重不泄嘗衣獘補衣溺袴張晏曰陰重不泄下不潔故溺袴甚為不潔清以是得幸景帝漢書曰昌邑王賀衣短衣大袴又曰朱博瑯琊郡功曹官屬多褒衣大祒孟康曰祒音紹謂大袴也又曰昭帝上官后霍光外孫光欲后擅寵有子帝體不安左右及醫皆阿意言宜內宮人使令皆為窮袴多其帶後宮無進者張晏曰窮袴前後有襠使不得交通東觀漢記曰更始所爵多群小被服威儀不以衣冠或繡面衣錦袴後漢書曰馬援田牧至有牛馬羊數千頭盡散昆弟故舊身衣羊裘皮袴又曰祭遵賞賜與士共之家無私財身衣韋袴又曰吳良字大儀齊國臨淄人以清白守正稱為郡議曹掾正旦掾吏入賀門下掾王望舉觴上壽曰齊郡遭離盜賊今明府視事五年家給人足良跪曰門下掾佞諂明府勿受其觴盜賊未盡人庶困乏今良曹掾尚無袴望曰議曹惰窳自無袴寧足為不家給人足耶太守曰此生言是賜良鰒魚百枚謝承後漢書曰秦護清廉不受禮賂家貧衣服單露鄉人歌之曰冬無袴有秦護魏略曰賈逵居貧無袴過其妻兄柳孚家宿其明無, WYG: ''}
