  - {type: variant, offset: 2818, length: 205, content: 昏侯拜愛姬潘氏為貴妃乘臥與侯騎馬為從著織成袴褶後魏書曰傳靈根及弟靈越南走靈根叔乾愛先在南遣舡迎之得免靈根差期不得俱渡臨濟人知剉斬殺之乾愛出郡迎靈越問靈根愆期狀靈越殘不應荅乾愛不以為惡勑左右取匣中烏皮袴褶令靈越代所常服虛越言不須乾愛云汝可著體上衣服見桓公耶桓公護之為剌史靈越竟不肯著唐書曰玄宗時御史大夫李適之秦每大禮六品官並服朱衣自是以下許通著袴褶如有慘故不合著朱衣袴褶者聽不入自餘應著而不著者請奪俸以懲不恪西河, SBCK: ''}
