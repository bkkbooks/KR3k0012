  - {type: variant, offset: 354, length: 138, content: 憚其清嚴不敢發口謂人曰我願解身上𥜗與顧郎難衣食者竟不敢以遺之又曰郭祖深清儉常服故布𥜗又曰索君正為豫章內史性不信巫邪有師世榮稱道術為一郡巫長君正在郡小疾主簿熊丘問巫師云須疾者衣為信命君正以所著𥜗與之事竟取𥜗云神將送與北斗君君正使檢諸身於衣裏獲之以為亂政即刑於市而焚神一郡無敢行巫, WYG: 名}
