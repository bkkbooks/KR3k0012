  - {type: variant, offset: 1162, length: 163, content: 魏書云平文皇后王氏年十三因事入宮得幸於平文生昭成平文崩昭成在襁褓時國有內難將害帝子后匿帝於袴中呪曰若天祚未終者汝無聲遂良久不啼得免於難又曰淮陰屠中少年有侮韓信者眾辱之曰信能死剌我不能出我袴徐廣曰袴服也袴亦作跨於是視之俛出袴下蒲伏一市皆笑信以為怯又曰周仁為人陰重不泄嘗衣獘補衣溺袴張晏曰陰重不泄下不潔故溺袴甚為不潔清以是得幸景帝, SBCK: ''}
