  - {type: variant, offset: 3100, length: 0, content: '', SBCK: 齊書曰鬰林王常祼􅃝着紅􅜄緄梁書曰周弘正善􅀇理爲當丗所宗藏法師於開善寺講􅀃門徒數百弘正年少未知名着紅禈錦紋髻踞􅀜而聽衆人蔑之弗譴也旣而乗間進難舉坐盡傾法師疑非丗人覘知相賞狎弘正後爲左民尚書夏月着犢􅈹裩衣朱衣爲有司所奏彈其放逹如此又曰􅁻士瞻少時嘗於南蠻國中擲摶無禈褰露於儕軰所侮及平魯休烈軍得絹三萬疋乃作百裩其外並賜軍士不以入室又曰謝幾卿性通脫在省署夜着犢􅈹裩與門生登閣道飲酒酣呼爲有司糺奏坐免西京雜記曰司馬相如􅀄與卓文君至成都遂相謀還成都賣酒相如自着犢􅈹裩滌器以恥王孫也丗􅀃曰范宣㓗行廉約韓伯字康伯爲豫章太守遺百疋絹不受減五十疋復不受如是减半遂至一疋旣終不受韓後與范載就車中裂二丈與范云人寧可使婦無裩耶范􅀏而受之阮籍大人先生傳曰羣虱之處禈逃于􅀷縫自以爲􅁻宅君子之處城中何異虱處禈中乎竹林七賢論曰諸阮皆儒學富財唯阮咸好酒家貧俗七月七日曬衣諸阮庭中並列綈錦咸以長竿掛牘􅈹布裩人問之曰未能免俗聊復爾耳}
