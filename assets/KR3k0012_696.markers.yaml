  - {type: variant, offset: 2555, length: 262, content: 手擎飲食袴褶釋名曰褶襲也覆上之言也晉書曰楊濟字文通歷位鎮南征北將軍遷太子太傅濟有才蓺嘗從武帝校獵北邙下與侍中王濟俱著布袴褶騎馬執角弓在輦前晉中興書曰郭文舉上餘杭大辟山令顧颺以文山行與韋袴褶一具文不納使者置衣室中而去文亦無言袴褶爛于戶內趙書曰中書令徐光奏耕服介幘青縑袴褶宋書曰元凶邵弒逆袁淑止之劭因起賜淑等袴褶又就主衣取錦裁三尺為一段又中裂之與淑及左右使以縛袴褶又曰張暢為南譙王義宣司空長史南郡太守元凶弒逆義宣發哀之日即便兵暢為元佐位居僚首哀容俯仰蔭映當時舉哀改服著黃韋袴褶出射堂簡人音姿容止莫不囑目見者皆願為盡命蕭子顯齊書曰, SBCK: 爲幃河}
