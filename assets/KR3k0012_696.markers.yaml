  - {type: variant, offset: 1433, length: 5, content: 爵多群小被, SBCK: 以當言皆裳祼國今呉即是也􅀍髮文身祼以爲飾盖正朔所不及也猥見大聖之君恱禹文德欣然皆着衣裳矣郭子横洞􅁳記曰東方朔生三日而母死隣母得而飬之經􅀊母忽失朔累月暫歸後復去家萬里見一枯樹脫白布裳掛樹裳化爲龍􅄞康集自録曰孫登字公和於汲郡北山中爲土窟夏則編草爲裳冬則以髮自覆崔駰逹㫖曰有事則褰裳濡足劉梁七舉曰黼黻之}
  - {type: page-break, offset: 1433, content: '', id: KR3k0012_SBCK_696-5a}
  - {type: variant, offset: 1433, length: 5, content: 爵多群小被, krp: 以當言皆裳祼國今呉即是也𬒳髮文身祼以爲飾盖正朔所不及也猥見大聖之君恱禹文德欣然皆着衣裳矣郭子横洞冥記曰東方朔生三日而母死隣母得而飬之經歲母忽失朔累月暫歸後復去家萬里見一枯樹脫白布裳掛樹裳化爲龍嵇康集自録曰孫登字公和於汲郡北山中爲土窟夏則編草爲裳冬則以髮自覆崔駰逹㫖曰有事則褰裳濡足劉梁七舉曰黼黻之}
