  - {type: variant, offset: 153, length: 2, content: 叔慶, WYG: 少君宣嘗就少君父學父竒其清苦以女妻之装送甚盛宣謂妻曰少君生富驕習美飾而吾貧賤不敢當禮妻乃悉歸侍御服飾更着短布之裳續漢書輿服志曰樊噲常持鉄楯聞項羽有意殺漢王噲裂裳以褁楯冠之入軍門立漢王旁管子曰桀之時女樂三千人無服文繡衣裳者鄧析子曰責疲者以舉千鈞督跛者以及走兎走騏驥於廷求猨揵於檻斯逆理而求之猶倒裳以索領也晏子春秋曰景公飲酒數日衣縠繡之裳一衣而五采具焉又曰景公飲酒数日去冠披裳自鼔盆甕而已淮南子曰楚欲攻宋墨子聞之自魯趨而徃十日十夜足重繭而不休息裂裳而裹之至于郢見楚王風俗通曰禹入裸國欣起而觧裳俗說禹治洪水乃遂入裸國君子入俗不改其恒於是欣焉而觧裳也原其所以當言皆裳裸國今呉即是也被髪文身裸以}
