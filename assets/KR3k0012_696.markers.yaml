  - {type: variant, offset: 150, length: 2, content: 廉范, WYG: 楊賜拜太常詔賜自所服冠幘綬玊兼革帶又曰鄧遵破匈奴上賜金剛鮮卑緄𢃄一具典畧曰文帝賞賜劉楨廓落帶其後将死欲取以為殉因與楨書云夫物因人而貴故在賤者之所不御至尊之側禎荅曰荆山之璞耀元后之寳随侯之珠燭衆女之妍南垠之金登窈窕之首鼲鼯之尾綴侍臣之幘此皆伏朽壞之下潜汚泥之中而揚光千載之上發采疇昔之外禎所帶無他妙餙若實殊異尚可納也魏畧曰踈勒王獻大秦赤石帶一枚又曰漢陽嘉三年踈勒王獻海西青石金帶呉書曰陸遜破曹休於石亭上脫御金校帶以賜遜又親以帶之為鈎絡帶呉録曰鈎絡者鞍餙革帶也世名為鈎絡帶齊書曰張融形貌短醜精神清徹王敬則見融革帯寛洽将至骼謂曰革帶太急融曰既非歩吏急何為後周書曰随文作相李穆曰周徳既衰愚智共悉天時若此豈能違天乃遣使謁随文帝並上十三鐶金帶盖天子服也戰國䇿曰魯仲連謂田單曰将軍黄金横帶而馳乎淄澠之間有生之樂無死之心楚漢春秋曰北郭先生獻帶於淮陰侯曰牛為人任用力盡猶不置其革呉時外國傳曰大秦國皆着袴褶絡帶又曰扶南人悉着鈎絡帶穆天子傳曰天子北征舎于珠澤獻白玉酒食天子賜黄金之環三十朱帶貝餙三十西征至赤烏氏先出自周宗乃賜赤烏之人貝帯五十鄴中記曰石虎皇后女騎腰中着金環恭􅍢帶述異記曰夏侯祖忻為兖州刺史䘮於官沈僧榮代之祖忻見形詣僧榮沈床上有一織成寳飾絡帯夏侯曰此帶殊好豈能見與沈曰甚善夏侯曰卿直許中不見關必以為施可命焚與沈對前燒之視此帶已在夏腰矣應璩新詩曰革帶䋲為􅃨履舄穿無底大帶論語衛靈公曰子張問行子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉子張書諸紳紳大帶詩芄蘭曰容兮遂兮垂𢃄悸兮容兮可觀佩玊遂遂然垂其紳𢃄悸悸焉有節度又野有死麕曰無感我帨兮無使尨也吠又彼都人士曰彼都人士垂帶而厲彼君子女卷髪如蠆匪伊垂之帶則有餘匪伊卷之髪則有旟旟揚也又鳴鳩曰淑人君子其帶伊絲其帶伊絲其弁伊騏騏文也弁皮弁其帶伊絲為大帶也大帶用素絲以雜色飾焉其當作琪以玉為之禮記玊藻曰凢侍於君紳垂足如履齊紳垂則磬折齊裳下緝又曰紳長制士三尺有司二尺有五寸子游曰三分帶下紳居二焉紳韠結三齊又曰素帶終辟大夫素帶垂辟士練帶率下辟居士錦帶弟子縞帶素帶終辟謂諸侯也辟讀如辟冕之禆謂以繒采餙其側也裳釋名曰上曰衣下曰裳裳障也自障蔽也易坤卦六五曰黄裳元吉象曰黄裳元吉文在中也又下繫曰黄帝尭舜垂裳而天下治尚書大傳曰舜曰精華已竭褰裳去之詩緇衣曰子惠思我蹇裳渉洧又雞鳴曰東方未明顛倒衣裳又葛履曰摻摻女手可以縫裳掺掺猶纎纎也要之襋之好人服之又七月曰載𤣥載黄我朱孔陽為公子裳又鴻鴈曰乃生男子載衣之裳載弄之璋禮玊藻曰衣正色裳間色又曲禮上曰諸母不潄裳左傳曰華登以呉師救華氏齊烏枝明曰用少莫如齊致死齊致死莫如去修補多兵矣請皆用劍從之華氏北復即之厨人濮以裳褁首而荷以走曰得華登矣遂敗華氏于新里春秋演孔圖曰駈除名政衣裳坐吾曲林濫長九州滅六王至于沙丘亡後漢書曰祭遵為人亷約夫人裳不加縁東觀漢記曰鮑宣妻桓氏女}
