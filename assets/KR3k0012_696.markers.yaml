  - {type: variant, offset: 1439, length: 2, content: 威儀, SBCK: 紗􅜄之裳繁飾參差微鮮若霜古樂府陌上桑曰􅁗氏有好女自名爲羅敷緗綺爲下裳紫綺爲上􅃭傅􅀇裳銘曰上衣下裳天地則也服從其冝君子德也楚辭曰青雲衣􅀆白蜺裳又曰採薜荔以爲裳又曰披綵裳之芬芳又曰制芰荷以爲衣􅀆集芙蓉以爲裳楊雄反騷曰􅀍芙蓉之朱裳裙釋名曰裙下裳也連接裙幅也緝下撗縫緝其下也縁裙之柂縁也又曰裙裏衣也古服裙}
  - {type: variant, offset: 1439, length: 2, content: 威儀, krp: 紗縠之裳繁飾參差微鮮若霜古樂府陌上桑曰秦氏有好女自名爲羅敷緗綺爲下裳紫綺爲上𥜗傅玄裳銘曰上衣下裳天地則也服從其冝君子德也楚辭曰青雲衣兮白蜺裳又曰採薜荔以爲裳又曰披綵裳之芬芳又曰制芰荷以爲衣兮集芙蓉以爲裳楊雄反騷曰𬒳芙蓉之朱裳裙釋名曰裙下裳也連接裙幅也緝下撗縫緝其下也縁裙之柂縁也又曰裙裏衣也古服裙}
