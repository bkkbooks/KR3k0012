  - {type: variant, offset: 158, length: 0, content: '', WYG: 北山中為土窟夏則編草為裳冬則以髮自覆崔駰逹㫖曰有事則褰裳濡足劉梁七舉曰黼黻之服紗縠之裳繁飾參差㣲鮮若霜古樂府陌上桑曰秦氏有好女自名為羅敷緗綺為下裳紫綺為上􅃭傳𤣥裳銘曰上衣下裳天地則也服從其宜君子徳也楚辭曰青雲衣兮白蜺裳又曰採薜荔以為裳又曰披採裳兮芬芳又曰制芰荷以為衣兮集芙蓉以為裳楊雄反騷曰披芙蓉之朱裳裙釋名曰裙下裳也連接裙幅也緝下横縫緝其下也縁裙裙施縁也又曰裙裏衣也古服裙不居外皆有衣籠也揚雄方言曰陳魏之間謂裙為帔音披繞衿謂之裙東觀漢記曰王良為司徒司直妻布裙徒跣曵柴續漢書曰漢明徳太后秃裙不縁又五行志曰獻帝時女子好為長裙而上甚短魏畧曰燉煌俗婦人作裙攣縮如羊腸用布一疋皇甫隆為}
