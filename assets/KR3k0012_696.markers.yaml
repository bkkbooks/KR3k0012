  - {type: variant, offset: 384, length: 199, content: 又曰郭祖深清儉常服故布𥜗又曰索君正為豫章內史性不信巫邪有師世榮稱道術為一郡巫長君正在郡小疾主簿熊丘問巫師云須疾者衣為信命君正以所著𥜗與之事竟取𥜗云神將送與北斗君君正使檢諸身於衣裏獲之以為亂政即刑於市而焚神一郡無敢行巫後魏書曰高祖復至鄴見公卿曰朕昨日入城見車上婦人冠帽而著小𥜗襖者尚書何為不察任城王澄曰著者猶少帝曰任城意欲全著乎一言可以喪邦其斯之謂可命史官書之東宮舊事曰太子納妃有紫縠𥜗絳紗繡縠𥜗吳越, SBCK: 心楚漢}
