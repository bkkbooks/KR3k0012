  - {type: variant, offset: 1430, length: 0, content: '', SBCK: 鮑宣妻桓氏女字少君宣嘗就少君父學父竒其精苦以女妻之裝送甚盛宣謂妻曰少君生富驕習美飾而吾貧賤不敢當禮妻乃悉歸侍御服飾}
  - {type: variant, offset: 1430, length: 0, content: '', krp: 鮑宣妻桓氏女字少君宣嘗就少君父學父竒其精苦以女妻之裝送甚盛宣謂妻曰少君生富驕習美飾而吾貧賤不敢當禮妻乃悉歸侍御服飾}
  - {type: variant, offset: 1431, length: 1, content: 始, SBCK: 着短布之裳續漢書輿服志曰樊噲常持䥫揗聞項羽有意殺漢王噲裂裳以褁楯冠之入軍門立漢王旁管子曰桀之時女樂三千人無不服文繡衣裳者鄧析子曰責疲者以舉千鈞督跛者以及走兎駈騏􅂹於廷求猨猴於檻斯逆理而求之猶倒裳以索領也晏子春秋曰景公飲酒數士衣􅜄繡之裳一衣而五采具焉又曰景公飲酒數日去冠披裳自鼓盆甕而巳淮南子曰楚欲攻宋墨子聞之自魯趍而徃十日十夜足重繭而不休息裂裳而褁之至于郢見楚王風俗通曰禹入祼國欣起而解裳俗說禹治洪水乃播入祼國君子入俗不改其恒於是欣然而解裳也原其}
  - {type: page-break, offset: 1431, content: '', id: KR3k0012_SBCK_696-4b}
