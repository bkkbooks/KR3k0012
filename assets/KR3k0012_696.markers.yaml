  - {type: variant, offset: 156, length: 1, content: 蜀, WYG: 餙盖正朔所不及也猥見大聖之君恱禹文徳欣然皆着衣裳矣郭子横洞冥記曰東方朔生三日而母死隣母得而養之經嵗母忽失朔累月暫歸後復去家萬里見一枯樹脫白布裳掛樹化為龍嵇康集目録曰孫登字公和於汲}
