  - {type: variant, offset: 1354, length: 725, content: 十日並出堯命羿仰射十日中其九烏皆死墮其羽翼抱朴子曰石先生丹法取烏之未生毛羽者以真丹和牛肉以吞之至長其毛羽皆赤乃殺陰乾百日并禱服百日得壽五百歲說苑曰孔子曰存亡禍福皆在己而已天災地妖亦不能殺也昔者殷王帝辛之時爵生烏於城之隅工人占之曰凡小以生巨國家必祉王名必倍帝辛喜爵之德不治國家凶暴無極外寇乃至遂亡殷國此逆天之時說福反為禍也楚辤曰羿焉畢日烏焉解羽焦氏易林曰城上有烏自名破家風俗通曰案明帝起居注上東巡泰山到滎陽有烏飛鳴乘輿上虎賁王吉射之中而祝曰烏烏啞啞引弓射洞左掖陛下壽萬年臣為二千石帝賜錢二百萬令亭壁悉畫為烏又曰烏號弓者柘桑枝條暢荗烏登其上垂下著地烏適飛去從後撥殺取以為弓因名曰烏號說文曰烏孝鳥也異苑曰陽顏以純孝著聞後有群烏衘鼓集顏所居村烏口皆傷一境以為顏至孝故慈烏來萃衘鼓之興故令聾者遠聞即於鼓處立縣而名為烏傷王莽改為烏孝以章其行跡云崔豹古今注曰烏一名鷙鳥述征記曰相風烏在靈臺上遇千里風則動成公緩烏賦序曰有孝鳥集余之廬乃喟爾歎曰無仁惠之德祥禽曷為而至哉夫烏為瑞久矣以其反哺識養故為吉鳥是以周書神其流變詩人瞻其所集國有道則見國無道則隱斯鳳鳥之德何以加焉服惡鳥而賈生懼之烏善禽而吾嘉焉懼惡而作歌嘉善而賦之不亦可乎洞林曰寧遠參軍弘景則其姊適吳病四十餘年暫來歸在其家令卦之得明夷之小過然病每欲動時輒有烏來鳴即便發作案卦中當時得獨蹄豬畜之江東名之為獨足猪後婦人如欲眠而見一丈夫衣服盡黑在戶前立遙呼婦人語其來前不肯言有所畏遂泣而去病如小間吾與殷侯共論此事曰烏日之禽豬月畜水火相忌自然之數故取玄陰之伏物用消太陽之飛精日中三腳故以獨足者當之南越記曰烏賊魚常自浮水上烏見以為死便啄之乃卷取烏故謂烏賊魚今匹烏化為之魚地理志曰孤山正在江中有烏飛入舡人以飯與之烏且飛且啖譙子法, SBCK: ''}
