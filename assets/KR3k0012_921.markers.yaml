  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 八􅍎山􅍎鳩鷃䳚鴠􅍎禮記月令曰季冬之月鵲始巢詩曰􅍎巢夫人之德也國君積行累功以致爵位夫人起家而居有之又曰鵲之疆疆鶉之奔奔又曰防有􅍎巢卭有旨苕誰侜予美心焉忉忉爾雅曰􅍎鵙鵙醜其飛􅭙郭璞注曰醜􅀋也􅭙竦翅上下􅭙也易通卦驗曰􅍎者陽鳥先物而動先事而應見於木風之象今失節不巢陽氣不通故言春不東風也周書曰小寒之曰鵲始巢漢書曰梅福傳云今陛下旣不納天下之言又加戮焉夫鳶鵲遭害則仁鳥増逝魏志曰管輅至安德令劉長仁忽有鳴鵲來在閤屋上其聲甚急輅曰鵲言東北一婦昨殺夫牽引西家太離婁􅀱不過日在虞淵之際告者至矣到時果有東北同伍民來告隣婦手殺其夫詐言西家人與夫有嫌殺我壻也吴志曰赤烏十二年有兩烏衘鵲墮東觀權使領丞相朱據燎鵲以􅀕又曰孫和爲南陽王之長沙行過蕪湖有鵲巢於㠶牆故官僚皆憂􅃤以爲牆木傾危之象晉書曰王澄爲荆州將之鎭送者傾朝澄見樹上鵲巢便脫衣上樹探􅑹而弄之神氣肅然傍􅀂無人又曰凉李歆時通街大樹上有烏鵲争巢鵲爲烏所殺宋書曰徐羡之拜司空有􅀟鵲於太極殿東鴟尾鳴喚後魏書曰李崇爲楊州刺史時有泉水湧於八公山頂壽春城中有魚無數從地湧出野鴨羣飛入城與鵲争巢北齊書曰武衛奚永洛與河内人張子信對坐有鵲鳴於庭樹闘而墮焉子信曰鵲言不善向夕若有風從西南來􅊗樹拂堂角則有口舌事今夜有人喚必不得徃子信去後果有風來至夜髙儼使召永洛且云勑喚永洛欲赴其妻苦留稱墮馬脚折遂免於難又曰李孝貞字元操信州刺史希禮之子也甞詠鵲其隹句云東立朝雨霽南飛夜月明爲知音所賞隋書曰郭携字弘文太原人家門雍睦}
