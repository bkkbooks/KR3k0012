  - {type: variant, offset: 319, length: 482, content: 道旁烏攫其肉民有欲詣府言事適見之霸與語道此後日吏還見霸迎勞之曰甚苦食於道旁乃為烏所盜肉吏大驚以霸具知其起居所問毫釐不敢有所隱後漢書曰馬援曰當吾在西黑浪泊間詔書每到腹如湯火下潦上霧毒氣上蒸仰視鳥鳶跕跕墮水中謝承後漢書曰廣漢儒叔林為東郡太守烏巢於廳事屋梁兔產於床下司馬彪續漢書曰桓帝時童謠曰城上烏尾畢逋一年生九鶵公為吏子為徒一徒死百乘車吳曆曰吳王為神主來立廟蒼龍門時有烏巢朱雀門上晉書載記曰慕容冲之亂有群烏數萬翔鳴于長安城上其聲甚悲占者以為鬭羽不中年有甲兵入城之象梁書曰高國有烏旦旦集王殿前為行列不畏人日出後然後散去陳書曰司馬申短毛喜於後主使其廢錮又與施文慶李脫兒北周譖殺傅縡奪任忠部曲以配蔡徵申嘗書寢於尚書下省有烏啄其口流血及地時論以為譖賢之效也北史曰西魏裴俠年七歲不能言後於洛城西見群烏蔽天從西來舉手指之而言遂志識聰慧甚異常童又曰齊蕭放居喪以孝聞居廬門室前有二慈烏來集各據一樹為巢自午以前馴庭前飲啄午後更不下樹每臨時舒翅悲鳴全似哀泣家人伺之未嘗有闕又曰齊世辯性怯武平末為開府周師入鄴令辯以千餘騎覘候出險口登高阜西望遙見群烏飛起謂是西軍旗幟即馳還比至紫陌橋不敢返顧後, SBCK: 明}
