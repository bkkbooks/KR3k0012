  - {type: variant, offset: 23, length: 5, content: 車六百乘伐, SBCK: 飛䳚鴠方言曰周魏宋楚之間謂䳚鴠或謂之獨春自􅀜而東謂之城旦或謂之倒懸或謂之自􅀜而西􅁗隴之内謂之䳚鴠郭璞注曰鳥似䳚五色各無毛赤祼晝夜鳴獨春好俯仰也倒懸好似懸於樹也廣志曰侃旦冬毛希夏毛盛禮記曰月令曰仲冬之月䳚鴠不鳴}
  - {type: variant, offset: 23, length: 170, content: 車六百乘伐鄭諸侯救鄭楚師夜遁鄭人將奔桐丘諜告曰楚幕有烏乃止又曰晉侯伐齊齊師夜遁師曠告晉侯曰鳥烏之聲樂齊師其遁鳥烏得空營故樂也叔向告晉侯曰城上有烏齊師其遁毛詩曰莫赤匪狐莫黑匪烏又曰瞻烏爰止于誰之屋具曰予聖誰知烏之雌雄又曰弁彼鸒斯歸飛提提爾雅曰鸒斯鴨鶋楚烏也又曰雅烏小而多聲腹下白又曰烏鵲醜其掌縮飛縮腳復下又曰有燕白脰烏鸀山烏鸀似烏而小赤觜穴乳, WYG: 為行節}
  - {type: variant, offset: 23, length: 5, content: 車六百乘伐, krp: 飛䳚鴠方言曰周魏宋楚之間謂䳚鴠或謂之獨春自關而東謂之城旦或謂之倒懸或謂之自關而西秦隴之内謂之䳚鴠郭璞注曰鳥似䳚五色各無毛赤祼晝夜鳴獨春好俯仰也倒懸好似懸於樹也廣志曰侃旦冬毛希夏毛盛禮記曰月令曰仲冬之月䳚鴠不鳴}
