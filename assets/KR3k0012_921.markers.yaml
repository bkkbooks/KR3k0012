  - {type: variant, offset: 15, length: 3, content: 為烏左, SBCK: 爲鷃德義少殘百家則鷃無頭易通卦驗曰立春􅀨水鶬鷃鳴鄭玄云鷃蒼狀也廣志曰鷃常晨鳴如鷄道路賈車以爲行節岀西方莊子曰窮髮之北有鳥焉其名曰鵬翼若垂天之雲搏扶揺羊角而上者九万里斥鷃􅀏之曰我騰躍上不過數仞下翔蓬蒿之間此亦飛之至也而彼且奚適又曰載鼷以車馬樂鷃以鍾皷國語曰晉平公射鷃使竪襄搏之失公怒將殺之叔向聞之夕公告叔向曰君必殺之昔吾先君唐叔射兕於徒林殪以大甲以封于晉今君射鷃鷃不死摶而不得是楊君恥也勿令逺聞公忸怩顔乃趣舎之注賈逵解曰徒林園中地也言唐叔有才藝封於晉吕氏春秋曰亂國之妖有雉生鷃車浚別}
