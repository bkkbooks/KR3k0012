  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_921-2a}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 八鵲山鵲鳩鷃鶡鴠鵲禮記月令曰季冬月鵲始巢詩曰鵲巢夫人之德也國君積行累功以致爵位夫人起家而居有之又曰鵲之疆疆鶉之奔奔又曰防有鵲巢卭有旨苕誰舟予羙心焉忉忉爾雅曰鵲鵙醜其飛也翪郭璞注曰醜婁也翪羽竦上下切易通卦騐曰鵲者陽烏先物而動先事而應見於未風之象令失節不巢漢書曰梅福傳云今陛下既不納天下之言又加戮焉夫鳶鵲遭害則仁鳥增逝魏志曰管輅至安德令劉長仁家有鳴鵲飛來閣上其聲甚急輅曰鵲言東北一婦昨殺其夫牽引西家侯不過日在虞淵之際告者至矣到時果有東比同伍民來告隣婦手殺其夫詐言西家人與夫有嫌殺我婿也吳志曰烏赤十二年有兩烏衘鵲堕東觀權使領丞相朱據燎鵲以祭又曰孫和為南陽王之長沙行過蕪湖有鵲巢于帆檣官僚皆憂􅃤以為墻木傾危之象晉書曰王澄為荆州将之鎮送者傾朝澄見樹上鵲巢便脫衣上樹探鷇而弄之神氣蕭然旁若無人又曰梁州李歆時通街大樹上有烏鵲爭巢為烏所殺宋書曰徐羡之拜司空有䨇鵲於太極殿東鴟尾鳴喚後魏書曰李崇為揚州刺史時有泉水湧於八公山頂壽春城中有魚無數從地湧出野鴨羣飛入城與鵲爭巢北齊書曰武衛奚永洛與河内人張子信對坐有鵲鳴于庭樹鬭而墮焉子信曰鵲言不善向夕若有風從西南來歴樹拂堂角則有口舌事今夜有喚必不得往子信去後果有風來至夜髙儼使召永洛且云勅喚永洛欲赴其妻苦留稱墮馬腰折遂免于難又曰李元貞字元操信州刺史希禮之子也嘗詠鵲其佳句云東立朝兩君南飛夜月明為時所賞隋書曰郭雋字𢎞文太原人家門雍睦}
