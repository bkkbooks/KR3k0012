  - {type: punctuation, offset: 2471, content: 《, id: KR3k0012_CHANT_921-bkkpn808}
  - {type: variant, offset: 2471, length: 932, content: 唐書曰天授元年有進三足烏者天后以為周室嘉應睿宗時為皇嗣言曰烏前足偽也天后不悅須臾一足墮地果如其言又曰寶應元年秋七月巳卯京兆府萬年縣獲三足烏獻之淮南子曰日中有踆烏月有蟾蜍踆獨蹲止不行謂三足也抱朴子曰青冷傳云熒火精生朱鳥古今注所謂赤烏者朱鳥也其所居高遠日中三足烏之精三足烏何以三足陽數奇也以是有虞至孝三足集其庭曾參鋤苽三足萃其冠司馬相如大人賦曰吾乃覩西王母皜然白母首戴勝而穴處有三足烏為之使論衡曰儒者言日中有三足烏日火也烏入火中燋爛安得立然烏日氣也張衡靈憲曰日陽精之宗積而成烏烏有三趾陽之類數奇括地圖曰崑崙之弱水中非乘龍不得至有三足神烏為西王母取食孫氏瑞應圖曰三足烏生王者慈孝天地則至晉諸公贊曰世祖時西域獻三足烏遂累有赤烏來集此昌陵後縣案昌字重曰烏者日中之鳥有託體陽精應期曜質以顯至德者也尚書中候曰周太子發渡孟津有火自天止於王屋為赤烏又曰有火自上復於王屋流為烏其色赤其聲魄瑞應圖曰赤烏武王時銜穀米至屋上兵不血刃而殷服一本曰王者不貪天下而重民命則至墨子曰赤烏衘珪降周之歧社日命周文王伐殷河出圖地出乘黃天錫武王黃鳥之旗帝王世紀曰豐公家于沛之豐邑中陽里其妻夢赤烏若龍戲已而生執嘉是為公即太上皇吳志曰赤烏元年八月武昌言赤烏見集於殿前朕所親見若神靈以為嘉祥者改年宜以赤烏又曰孫休永安三年春三月西陵言赤烏見常璩華陽國志曰𤏡道縣孝子吳順養母赤烏巢其門孝子傳曰吳叔和犍為人母沒負土成墳有赤烏巢門甘露降戶薛綜赤烏頌曰赫赫赤烏惟日之精朱羽丹質希代而生孝經援神契曰王者德至鳥獸則白烏下漢書曰孝昭元鳳三年有白烏數千下集泰山萊蕪山南古今注曰成帝河平四年白烏集孝文廟殿下黑烏從之和帝元興元年白烏一見廬江足皆赤王隱晉書曰虞溥為鄱陽內史觀勵學業為政嚴而不猛寬裕簡素白烏集郡庭止于棗樹就執不動宋起居注曰元嘉十三年戚羨縣民談含送白烏皓質潔映有若輝璧爰稽瑞圖寔惟嘉祥齊書曰高帝時有獻白烏帝問此何瑞范雲位卑最後荅曰臣聞王者敬宗廟則白烏至時謁廟始畢帝曰卿言是也感應之理一至此乎薛綜烏頌曰粲焉白烏皓體如素宗廟致敬乃胥來顧禮斗威儀曰江海不揚鴻波東海輸之蒼烏又曰君乘木而王其政升平南海輸以蒼烏孫氏瑞應圖曰文王時見蒼烏王者孝悌則至一本曰賢君帝王修行孝慈被於萬姓不好殺生則來隋書曰高祖授禪之年三月辛巳高平獲赤雀太原獲蒼烏, SBCK: ''}
