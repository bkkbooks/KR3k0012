  - {type: variant, offset: 1799, length: 280, content: 神其流變詩人瞻其所集國有道則見國無道則隱斯鳳鳥之德何以加焉服惡鳥而賈生懼之烏善禽而吾嘉焉懼惡而作歌嘉善而賦之不亦可乎洞林曰寧遠參軍弘景則其姊適吳病四十餘年暫來歸在其家令卦之得明夷之小過然病每欲動時輒有烏來鳴即便發作案卦中當時得獨蹄豬畜之江東名之為獨足猪後婦人如欲眠而見一丈夫衣服盡黑在戶前立遙呼婦人語其來前不肯言有所畏遂泣而去病如小間吾與殷侯共論此事曰烏日之禽豬月畜水火相忌自然之數故取玄陰之伏物用消太陽之飛精日中三腳故以獨足者當之南越記曰烏賊魚常自浮水上烏見以為死便啄之乃卷取烏故謂烏賊魚今匹烏化為之魚地理志曰孤山正在江中有烏飛入舡人以飯與之烏且飛且啖譙子法, WYG: 旹}
