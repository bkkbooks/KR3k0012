  - {type: variant, offset: 5, length: 0, content: '', SBCK: 鵲通巢時人以爲義感州縣上其事上遣平昌公宇文㢸房密切詣其家勞問之御史枊彧廵省河北表其門閭又曰翟普林父母俱終哀毀殆將滅性廬於墓側有二鵲巢其廬前樹毎入其廬馴狎無所驚懼唐書曰髙祖圍堯君素於蒲州粮盡人相食有烏鵲巢其發石車之上人心遂離爲李楚客斬首傳之京師又曰大暦八年夏四月乹陵上仙觀天尊殿有􅀟鵲衘柴及泥􅀘葺殿之隟壞凡一十五處宰臣等上賀曰臣聞孝至於天則祥發陵邑德􅀍於物則化及鳥獸伏惟陛下因心廣教弘道極和時殷霜露之恩流行雲雨之澤故前聖垂􅁉歆於明誠皇天報貺錫以嘉應異鵲來感翔集可窺跡比人謀事歸神化望宣示中外編諸史冊又曰貞元四年中書省梧樹止有鵲以泥爲巢又曰竇申宰相叅之族子叅特愛申毎議除授多詢於申申或泄之以招權受賂毎所至人謂之喜􅍎又曰開成二年三月眞興門外􅍎巢於古冢莊子曰至德之丗烏􅍎之巢可攀援而窺之又曰􅍎上髙城之絶而巢於髙樹之顛城壞巢折陵風而起故君子之居丗也得時則義行失時則鵲起也又曰莊周遊乎雕陵之樊樊藩也遊於栗園籬之内覩一異鵲自南方來翼廣七尺目大運寸可曲一寸感周之顙而進於栗林感觸孫卿子曰古之王者其政好生惡殺烏􅍎之巢可俯而窺淮南子曰鵲巢知風之所起言鵲作巢向風之所起爲户一􅀃云背風所起也又曰乹鵠知來而不知徃此脩短之分也乹鵠鵲也見人有吉事之微則翛翛然凶事之徴則鳴啼是知來􅀊多風則巢於下枝而童子乃採其夘是不知各有所能故曰長短之分也又曰鴈北向􅍎始加巢鴈在彭蠡背北面徴陽將來北過鵲感陽而動乃上加巢又曰赤􅁏懸則烏􅍎集鷹隼鷙則衆鳥散物之散聚交感以然淮南萬畢術曰􅍎腦令人相思取􅍎一雄一雌頭中腦燒之於道中以與人酒中飲則相思穆天子傳曰西王母還歸丗民謡憂以吟曰徂彼西土爰居于野豹虎爲羣於􅍎與處於讀爲烏嘉命不還我惟帝女東方朔別傳曰孝武皇帝時間居無事燕坐未央前殿天新􅀨止當此時東方朔執㦸在殿階傍屈指獨語上從殿上見朔呼問之生獨所語者何也朔對曰殿後栢樹上有􅍎立枯枝上東嚮而鳴也帝使視之果然問朔何以知之對曰以人事言之風從東方來􅍎尾長傍風則傾背風則蹷必當順風而立是以知也西京􅄂記曰樊將軍噲問陸賈曰自古人君皆云有瑞應豈有是乎賈曰有之乹􅍎噪而行人至蜘蛛集而百事喜况人君重位乎五行傳曰昭帝元鳯中有烏􅍎闘於燕王池上烏墮地烏􅀋君之象􅀃文曰鵲知太歳之所在鹽鐵論曰中國所鮮外國賤之崑山之旁以玉璞抵烏鵲魏太祖詩曰月明星稀烏􅍎南飛繞樹三匝何枝可依􅀶物忘曰􅍎巢開口背太歳此非才知任自然也崔豹古今注曰􅍎一名神女王子年拾遺録曰圎嶠之山名環丘上有方湖千里多大􅍎髙一丈羣飛於湖際衘不周之粟於環丘之上郭子横㓊􅁳記曰帝解鳩鴻之刀以賜東方朔刀長三尺朔曰此刀採首山之金鑄爲此刀雄者以飛雌者獨在金出九陽清溪有鵲衘火於清溪之上廣異記曰南方赤帝女學道得仙居南陽愕山桑樹上正月一日衘柴作巢至十五日成或作白􅍎或女人赤帝見之悲慟誘之不得以火焚之女即昇天因名帝女桑今人至十五日焚􅍎巢作􅁅汁浴􅁞子招絲象此也式經三十六禽變曰酉爲烏􅍎五行書曰燒鵲置酒中令家無盗賊山鵲爾雅曰鸒山鵲郭璞注曰似􅍎而有文彩長尾觜脚皆赤鸒胡礭切􅀃文曰鸒山􅍎知來事也搜神記曰常山張顥爲梁相天新􅀨後有鳥如山􅍎稍下墮地民爭取即化爲一貟石顥椎破之得一金印文曰忠孝侯印顥以上聞藏之秘府顥後官至太尉鳩左傳曰郯子云少皥時祝鳩氏司徒者也鶻鳩氏司事者也五鳩鳩民者也杜預注曰祝鳩鷦也鷦鳩孝故爲司徒主教民鶻鳩春來冬去故爲司事治民欲聚故以鳩爲名也禮記月令曰仲春之月鷹化爲鳩又曰季春之月鳴鳩拂其羽鄭玄云鳥鳩飛旦翼相擊趣農意也詩曰翩翩者騅毛云夫不也詩義䟽曰令小鳩也一名取夫一名鶨鳩幽州謂之佳或謂雕梁宋佳陽謂之佳也又曰宛彼鳴鳩毛云鶻折也詩義䟽曰班鳩也月令鳴鳩拂其羽是也佳陽人謂之班佳也爾雅曰佳其鳺鶌鳩鶻鵃鵈鳩王雎郭璞注曰折䲽令鳩似山鵲短尾青黒色多聲江東亦名曰鶻鵃雎鳩王雎雕􅀋江東呼鴞好在江渚山邊食魚毛詩傳曰鳥驚而有則孫炎曰鳺一名祝鳩鶻鳩一名鳴鳩犍爲舎人曰鳺楚鳩今梁謂之班鳩也鵲音鶻周書時訓曰榖雨之日又五日鳴鳩拂其羽鳴鳩不拂其羽國不治兵後漢書曰楊由從人飲勑諸生酒三行嚴車去請問其趣由曰向社中木上有鳩鳥闘兵之象由去後舎中有􅋐者果殺二人也魏志曰管輅至郭恩家有飛鳩來在梁頭鳴甚急輅曰當有老公從東方來􅀱肫一頭酒一壷主人雖喜當有小故明日果有客如所占而射鷄作食箭從樹間激中數歳女子流血驚怖梁書曰􅁃子與父域爲巴西守卒於郡子與奉䘮還郷􅀄發蜀有􅀟鳩巢舟中及至又栖廬側毎聞􅂘泣之聲必飛翔簷宇悲鳴激切隋書曰李得饒性至孝父寢疾輙終日不食及丁憂水漿不入口五日後甘露降其庭樹有鳩巢其廬孔叢子曰邯鄲人正旦獻鳩於趙簡子厚賞之客曰正旦放鳩厚恩也得賞競捕之不如勿賞簡子曰善搜神記曰長安有張氏者晝獨處空室有鳩自外入止乎床張氏惡之披懷而祝之日鳩今來爲我禍耶飛上承塵爲福耶來入我懷鳩飛入懷以手探之則不知鳩之所在而得一金帶鈎焉遂寳之自是之後子孫昌盛有爲必偶資財萬倍蜀客至長安中聞之乃厚賂婢婢􅀼鈎以與蜀客張氏旣失鈎漸漸衰耗而蜀客亦數罹窮厄不爲巳利或告之曰天命也不可以力求於是賚鈎以反張氏復昌故閞西稱張氏鈎􅀃苑曰梟逢鳩鳩曰子安之梟曰我將東徙鳩曰何之梟旦郷人惡吾鳴鳩曰子改鳴則可不能改鳴徙猶惡子之聲論衡曰夫令鳩雀施氣於鴈鵠終不成子者何也鳩雀之身小鴈鵠之形大廣雅曰良臯鳩也骨鵃鳻鳩也役鳩蔡鳩辟皐浮鳩也琴操曰舜耕歴山思慕父母見鳩與母俱飛鳴相哺食益以感思乃作歌地理志曰滎陽有井漢王避項羽於中􅀟鳩飛集井上羽以爲無人故沛公得免因以爲名故漢丗正旦放鳩爲此也焦贑易林無妄之明夷曰千雀万鳩與鷂爲仇威􅀔不敵雖衆無益益部􅂄舊傳曰廣漢景毅爲益州太守鳩巢於㕔事鶵􅆑孕育阮籍鳩賦序曰嘉平中得兩鳩子常食以􅁰稷後卒爲狗所殺故爲作賦傅咸鳩賦序曰余舎下種楸蔚然成林閑居無爲有時遊之頋見班鳩音聲可恱於是捕而畜之旣而馴擾偶出之籠無何失之其後時時一來飛翔低徊似有獓焉故􅂓爲之賦摯虞槐賦曰春栖教農童鳩孫氏瑞應圖曰白鳩成湯時來王者養􅂄老尊道德不以新失舊則至崔豹古今注曰平帝元始二年濟南鳩生白子吴録曰赤烏十二年八月白鳩見章安魏畧曰文帝欲授禪郡國奏白鳩十九見張升白鳩頌序曰陳留郡有白鳩出於郡界太守命門下賦曹史張升作白鳩頌曰厥名梟鳩貌甚雍容丹青緑目耳象重重㑹稽典録曰皮延字叔然㑹稽山隂人養母至孝居䘮有白鳩巢廬側遂以終䘮又曰鄭弘遷臨淮太守郡民徐憲在䘮致哀白鳩巢户側弘舉爲孝廉朝廷稱白鳩郎晉録曰大始八年白鳩二集太廟南門左左九嬪白鳩賦序曰太始八年鳩巢於廟闕而孕白鳩一􅀟毛色甚鮮晉金行之應也晉太康起居注曰白鳩見華林令孫邵以聞廣州先賢傳曰頓􅄾字孝異蒼梧人至孝母䘮􅄾獨身立墳歴年乃成居䘮踰制感物通靈白鳩栖息廬側見人輙去見􅄾而留又曰沛國戴文謀居陽城山有神降焉其妻疑是妖魅神巳知之便去作一五色鳥白鳩數十從有雲覆之遂不見南史曰姚察丁後母杜氏䘮解職在服制之中有白鳩巢于户上方言曰䳕鳩自􅀜而東周鄭之郊韓魏之都謂之即睪其後鳩謂之郡睪其􅀜西􅁗漢之間謂之鳩郭璞注云音匊其大者謂之頒音班鳩其小者謂之鳩今荆鳩也或謂之鳥蔡音蔡鳩或謂之鷄鳩或謂之鶻鳩梁宋之間謂之佳鳩傳曰鳲鳩氏司空者也毛詩義䟽曰今江􅀯鳥大如鳩而黄啼鳴相呼而不同集謂金鳥或云黄當爲鳩聲轉故名移也又云鳲鳩一名爽鳩又云是鸇周禮夏官上羅氏曰仲春羅鳥獻鳩以養老因行羽物鄭玄曰春鷹爲鳩與春鳥變舊爲新冝以養老􅂇生氣也爾雅曰鳲鳩鵠鳩郭璞注曰今之布榖江東呼􅀗榖千戴勝或云鸇謝氏曰布榖近也續漢書禮儀志曰仲秋之月縣道皆案户民年始七十者授之以玉杖餔之以糜粥八十九十禮有加賜玉杖長九尺端以鳩爲飾鳩者不噎之鳥也欲老人不噎所以愛民也魏書曰烏丸俗耕種常以榖鳥爲􅀱淮南子曰孟夏之月以熟榖米熟亦長也雄鳩長鳴為帝􅀱歳鳩布穀也風俗通曰俗􅀃髙祖與項羽戰敗於京索遁藂薄中羽追求之時鳩正鳴其上追者以鳥在無人遂得脫後及即位異此鳥故作鳩杖以賜老者案少皥五鳩鳩民者聚民也周禮羅氏獻鳩養老漢無羅氏故作鳩杖以扶老楚辭曰進雄鳩之耿耿兮耿耿小節皃䜛分分而蔽之言欲如進其耿雄鳩節之誠䜛人尚復分耿小分髙蔽而障之也又曰鳴鳩棲於桑榆言鳲鳩於桑榆之上奮翼得其所馮敬通與任武逹書曰婦口如布榖孫卿子曰南方有鳥焉名曰􅂪鳩以羽爲巢而編之以髮繫之葦苕風至苕折子死􅆑破巢非不完也而繫者然南方草物狀曰番鳩生海邊土穴中里民常以臘月正月捕食味如蟹得過十餘不可復食合浦交阯九真有之鷃左傳曰郯子云少皡鷙以鳥名官青鳥氏司啓者也杜預注曰青鳥鶬鷃也立春鳴立冬去爾雅曰鳸鷃也郭璞注曰今鷃雀也犍爲舎人曰主趨民収麥不得晏起也􅀃文曰鷃鳸也從鳥聲春秋考異郵曰水滅火故䖟螫鷃安均注曰鷃柔良之鳥鷃於水也}
