  - {type: variant, offset: 803, length: 550, content: 曰宗懍遭母憂去職哭歐血兩旬之內絕而復蘇者三每旦有群烏數千集于廬舍候哭而來哭止而去又曰皇甫遐字永賢少喪父事母以孝聞後母亡廬於墓側負土為墳乃有鴟烏各一徘徊悲鳴不離墓側若助遐者隋書曰焬帝起宮丹陽將遊于江左有烏鵲來巢幄帳驅不能止唐書曰武德中張志寬純孝丁母憂於墓側負土成墳有烏巢於廬前樹上志寬哭臨烏輒悲鳴高祖聞之遣使弔賜帛三十段表其門閭又曰李義府召見太宗試令詠烏其末云上林多許樹不借一枝栖帝曰吾將全樹借汝豈唯一枝又曰貞元四年夏鄭汴二州烏群皆去分入田緒李納境內銜木為城高二三尺方十餘里緒納惡而命焚之信宿如故烏口多流血又曰柳仲郢為尚書左僕射東都留守盜發先人墓棄官歸華原除華州刺史不拜後以本官為天平軍節度受節鉞於華原別墅卒於鎮初仲郢自拜諫議後每遷官群烏大集於昇平里第庭樹戟架皆滿凡五日而散詔下不復集家人以為候唯除天平烏不集又曰長慶中濮州雷澤縣百姓張憲莊榆樹有烏巢因風墜三鶵有鵲巢於東南樹引所墜二鶵於其巢哺之太公六韜曰武王登憂臺以臨殷民周公旦曰臣聞之愛其人者愛其屋上烏憎其人者憎其余胥燕丹子曰燕太子丹質於秦秦王遇之無禮不得意欲歸秦王不聽謬言令烏白頭馬生角乃可丹仰天歎之烏即白頭馬為生角秦王不得已而遣之韓子曰夫馴鳥者斷其下翎則必恃人而食焉得不馴乎夫明主之畜臣亦然全臣不得全利夫利君之祿不得無服上之名君焉得不復祿淮南子曰堯, SBCK: ''}
