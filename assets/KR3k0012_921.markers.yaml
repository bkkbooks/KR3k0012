  - {type: variant, offset: 150, length: 1493, content: 又曰雅烏小而多聲腹下白又曰烏鵲醜其掌縮飛縮腳復下又曰有燕白脰烏鸀山烏鸀似烏而小赤觜穴乳出西方春秋運斗樞曰飛翔羽翮為陽陽氣仁故烏反哺春秋元命苞曰火流為烏烏孝鳥陽精天意烏在日中從天以照孝也尚書緯曰火者陽也烏有孝名武王卒大業故烏瑞臻漢書曰成帝時御史府中列柏樹常有野烏數千栖宿其上晨去暮來號曰朝夕烏又曰黃霸為頴川太守遣吏有所伺察吏出不敢舍郵亭食於道旁烏攫其肉民有欲詣府言事適見之霸與語道此後日吏還見霸迎勞之曰甚苦食於道旁乃為烏所盜肉吏大驚以霸具知其起居所問毫釐不敢有所隱後漢書曰馬援曰當吾在西黑浪泊間詔書每到腹如湯火下潦上霧毒氣上蒸仰視鳥鳶跕跕墮水中謝承後漢書曰廣漢儒叔林為東郡太守烏巢於廳事屋梁兔產於床下司馬彪續漢書曰桓帝時童謠曰城上烏尾畢逋一年生九鶵公為吏子為徒一徒死百乘車吳曆曰吳王為神主來立廟蒼龍門時有烏巢朱雀門上晉書載記曰慕容冲之亂有群烏數萬翔鳴于長安城上其聲甚悲占者以為鬭羽不中年有甲兵入城之象梁書曰高國有烏旦旦集王殿前為行列不畏人日出後然後散去陳書曰司馬申短毛喜於後主使其廢錮又與施文慶李脫兒北周譖殺傅縡奪任忠部曲以配蔡徵申嘗書寢於尚書下省有烏啄其口流血及地時論以為譖賢之效也北史曰西魏裴俠年七歲不能言後於洛城西見群烏蔽天從西來舉手指之而言遂志識聰慧甚異常童又曰齊蕭放居喪以孝聞居廬門室前有二慈烏來集各據一樹為巢自午以前馴庭前飲啄午後更不下樹每臨時舒翅悲鳴全似哀泣家人伺之未嘗有闕又曰齊世辯性怯武平末為開府周師入鄴令辯以千餘騎覘候出險口登高阜西望遙見群烏飛起謂是西軍旗幟即馳還比至紫陌橋不敢返顧後周書曰宗懍遭母憂去職哭歐血兩旬之內絕而復蘇者三每旦有群烏數千集于廬舍候哭而來哭止而去又曰皇甫遐字永賢少喪父事母以孝聞後母亡廬於墓側負土為墳乃有鴟烏各一徘徊悲鳴不離墓側若助遐者隋書曰焬帝起宮丹陽將遊于江左有烏鵲來巢幄帳驅不能止唐書曰武德中張志寬純孝丁母憂於墓側負土成墳有烏巢於廬前樹上志寬哭臨烏輒悲鳴高祖聞之遣使弔賜帛三十段表其門閭又曰李義府召見太宗試令詠烏其末云上林多許樹不借一枝栖帝曰吾將全樹借汝豈唯一枝又曰貞元四年夏鄭汴二州烏群皆去分入田緒李納境內銜木為城高二三尺方十餘里緒納惡而命焚之信宿如故烏口多流血又曰柳仲郢為尚書左僕射東都留守盜發先人墓棄官歸華原除華州刺史不拜後以本官為天平軍節度受節鉞於華原別墅卒於鎮初仲郢自拜諫議後每遷官群烏大集於昇平里第庭樹戟架皆滿凡五日而散詔下不復集家人以為候唯除天平烏不集又曰長慶中濮州雷澤縣百姓張憲莊榆樹有烏巢因風墜三鶵有鵲巢於東南樹引所墜二鶵於其巢哺之太公六韜曰武王登憂臺以臨殷民周公旦曰臣聞之愛其人者愛其屋上烏憎其人者憎其余胥燕丹子曰燕太子丹質於秦秦王遇之無禮不得意欲歸秦王不聽謬言令烏白頭馬生角乃可丹仰天歎之烏即白頭馬為生角秦王不得已而遣之韓子曰夫馴鳥者斷其下翎則必恃人而食焉得不馴乎夫明主之畜臣亦然全臣不得全利夫利君之祿不得無服上之名君焉得不復祿淮南子曰堯時十日並出堯命羿仰射十日中其九烏皆死墮其羽翼抱朴子曰石先生丹法取烏之未生毛羽者以真丹和牛肉以吞之至長其毛羽皆赤乃殺陰乾百日并禱服百日得壽五百歲說苑曰孔子曰存亡禍福皆在己而已天災地妖亦不能殺也昔者殷王帝辛之時爵生烏於城之隅工人占之曰凡小以生巨國家必祉王名必倍帝辛喜爵之德不治國家凶暴無極外寇乃至遂亡殷國此逆天之時說福反為禍也楚辤曰羿焉畢日烏焉解羽焦氏易林曰城上有烏自名破家風俗通曰案明帝起居注上東巡泰山到滎陽有烏飛鳴乘輿上虎賁王吉射之中而祝曰烏烏啞啞引弓射洞左掖陛下壽萬年臣為二千石帝賜錢二百萬令亭壁悉畫為烏又曰烏號弓者柘桑枝條暢荗烏登其上垂下著地烏適飛去從後撥殺取以為弓因名曰烏號, krp: ''}
