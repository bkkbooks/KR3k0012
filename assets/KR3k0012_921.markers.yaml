  - {type: variant, offset: 2262, length: 208, content: 年三足烏集沛國三年代郡高柳烏子生三足大如雞色赤頭上有角長寸餘後漢書曰明帝三年秋七月景申順陽獻三足烏八月甲子群臣上表稱慶詔曰夫天不愛淫地稱表瑞莫不威鳳巢閣圖龍躍沼豈直日月珠連風雨玉燭是以鉤命決曰王者至孝則出元命苞曰人君至治所有虞舜蒸蒸來茲異祉周文翼翼翔此靈禽文考至德下覃遺仁爰被遠符千載降斯三足將使三方歸本九州翕定惟此大禮景福在民予安敢攘宗廟之善弗宣大惠可大赦天下文武官並遣進三級隋書曰大業四年蜀郡獲三足烏張掖獲玄狐各, SBCK: 十}
