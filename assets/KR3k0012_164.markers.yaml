  - {type: variant, offset: 0, length: 0, content: '', SBCK: 太平御覽卷第一百六十四州郡部卞􅀜西道雍華同歧耀乾隴邠涇寜慶原靈鹽鄜坊延丹綏銀麟夏豐勝雍州尚書禹貢曰黒水西}
