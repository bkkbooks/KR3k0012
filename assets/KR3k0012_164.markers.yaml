  - {type: variant, offset: 771, length: 2, content: 平陽, WYG: 靈武屬北地郡莽曰威成惠帝四年置靈州有河竒苑號非苑師古曰水中可居曰州此地在河之洲随水髙下未嘗淪沒故號靈州河竒二苑皆在北十道志曰靈州有赫連勃勃所置果園水經云河水北有薄骨律鎮城在渚上舊赫連城也桑果榆林列植其上故謂之果州圖經曰周宣政二年破陳將吳明徹遷其人於靈州江左之人崇禮好學習俗皆化因謂之塞北江南鹽州元和郡}
