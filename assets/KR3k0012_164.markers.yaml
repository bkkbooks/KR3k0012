  - {type: variant, offset: 1820, length: 146, content: 公曰蒲與屈君之疆也不可以無主若太子主蒲與屈乃可以威民而懼戎太子申生也二子重耳夷吾也蒲陽平蒲子縣郡國志曰以州前二里有泉下濕故取下濕之義為名十道志曰永和縣本漢狐讘縣也漢志曰狐讘屬河東郡讘音之涉反慈州元和郡縣志曰慈州文成郡禹貢冀州之域春秋時晉之屈邑獻公子夷吾所居也秦併天下即河東郡之北屈縣漢志曰北屈, SBCK: ''}
