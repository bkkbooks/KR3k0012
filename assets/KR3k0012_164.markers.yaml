  - {type: variant, offset: 987, length: 825, content: 濩澤為名漢志曰濩屬河東郡禹貢析城山在其西南濩音胡虢反墨子曰舜漁於濩澤十道志曰晉城縣本漢高都縣也漢志曰高都屬上黨郡有天井關元和郡縣志曰高平縣本漢泫氏縣也泫音胡玄反漢志曰泫氏屬上黨泫水所出也竹書紀年曰梁惠王九年晉取泫氏史記曰趙成侯十六年與韓魏分晉封晉君于端氏也潞州元和郡縣志曰潞州上黨郡禹貢冀州之域殷為黎國春秋時屬晉又曰兼有潞子之國秦為上黨郡地左傳宣十五年曰潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目酆舒潞相晉侯伐之滅潞酆舒奔衛衛人歸諸晉晉人殺之戰國策曰秦有安邑則韓必無上黨以遠韓近趙故卒歸趙隋圖記曰上黨南陽古以為縣實都也漢志曰上黨郡秦置屬并州有上黨關又曰壼關屬上黨郡黎侯國今有黎亭釋名曰上黨黨所也在山上其所最高故曰上黨上黨記曰高平赤壞其地山阻百姓不居即此郡也圖經曰後周建德七年於襄垣縣立潞州以其浸汾潞為名漢志曰長子縣屬上黨郡周史辛甲所封師古曰長讀長短之長竹書紀平曰梁惠王十二年鄭取屯留尚子即長子之地也左傳襄十九年曰晉人執衛行人石買于長子執孫蒯于屯留長子屬上黨又曰鄭伯如晉晉人執諸銅鞮晉太康地記曰銅鞮故晉大夫羊舌赤邑時號赤為銅鞮伯華漢以為縣遼州圖經曰遼州樂平郡禹貢冀州之域春秋時其地屬晉戰國屬韓後屬趙秦漢為上黨郡貞觀中避諱改為儀州後又為箕州復為遼十道志曰和順縣本漢沾縣地即諱閼與邑史記曰秦昭襄三十八年攻趙閼與趙奢曰其道遠險扼譬如兩鼠鬥於穴中將勇者勝乃使趙奢將大破秦軍乃解閼與之圍漢書高帝紀曰韓信破代相夏說於閼與漢志曰沾縣屬上黨郡有沾水出壼關沾音他兼反沁州十道志曰沁千浸切州陽城郡本漢穀遠縣地元和郡縣志曰禹貢冀州之域春秋時其地屬晉戰國時屬韓在秦為上黨郡地今州即漢上黨之穀遠屬地漢志曰穀遠屬上黨郡王莽曰穀近晉地記曰穀遠今名孤遠後代語訛耳十道志曰綿上縣亦穀遠縣之地以縣西有綿上地因名之舊屬介休縣隋分置綿上焉蓋晉介子推之地隰州圖經曰隰州大寧郡夏殷已前其地與箕沁同在周為晉之北鄙元和郡縣志曰禹貢冀州之域春秋時為晉地七國時屬魏秦為河東郡地漢為蒲子縣屬河東郡, SBCK: 馳射爲事}
