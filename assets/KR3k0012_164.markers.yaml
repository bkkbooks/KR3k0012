  - {type: variant, offset: 195, length: 255, content: 韓獻子曰不可郇暇氏土薄水淺其惡易覯易覯則民愁民愁則音墊居隘於是乎有沈溺重膇直偽切之疾不如新田土厚水深居之不疾有汾澮以流其惡夫山澤林盬國之寶也國饒則民驕佚近寶則公室乃貧近寶則民不務本也不可謂樂公說從之郡國志曰猗氏縣猗頓所居之地猗頓魯窮士也問術於陶朱公公教之畜五牸遂富漢因之名縣史記曰魏都安邑惠王三十一年秦用商君東侵地至河而齊趙數破我我安邑近秦於是徙居大梁漢志曰河東郡秦置王莽曰兆陽領縣二十四又曰蒲坂故曰蒲秦更名王莽曰蒲城應劭曰秦始皇東巡見長坂故因加反孟康云晉文公以賂秦後秦人還蒲魏人喜曰蒲反矣遂名之師古曰應說是絳, SBCK: 同}
