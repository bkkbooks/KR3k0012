  - {type: variant, offset: 1967, length: 304, content: 莽曰朕北應劭曰有南屈故稱北瓚曰汲郡古文翟章救鄭次于南屈左傳僖二年曰晉荀息請以屈產之乘與垂棘之壁假道於虞以伐虢屈地生良馬元和郡縣圖曰吉昌縣有姚襄城西臨黃河控帶龍門孟門之險周齊交爭之地齊後主武平二年遣斛律明月破周兵於此城下郡國縣道記曰呂香本漢之北屈有騏縣漢志曰騏屬河東郡侯國汾州十道志曰汾州西河郡禹貢冀州之域其在虞夏及周屬并州春秋時晉地六國時屬趙秦併天下屬太原郡左傳昭元年曰昔金天氏有裔子曰昧為玄冥師生允格臺駘臺駘能業其官宣汾洮障大澤汾洮二水以處太原太原晉陽也帝用嘉之封諸汾川又曰昔高辛氏有二子長曰閼伯次曰實沈居于曠林不相能也后帝不臧遷閼伯于商丘主辰啇人是因遷實沈于大夏主參唐人是因大夏今晉陽縣其季世曰唐叔虞及成, SBCK: ''}
