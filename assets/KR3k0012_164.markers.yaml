  - {type: variant, offset: 4140, length: 0, content: '', WYG: 志曰鄜州洛交郡禹貢雍州之域春秋時秦地始皇時為上郡漢為上郡雕隂道地史記秦文公畋于汧渭之間夢黄蛇其口止於鄜衍以為上帝之徴遂於鄜立畤祭白帝焉漢書云匈奴南侵至朝郍膚施即此地漢志曰雕隂屬上郡彫山在西南坊州元和郡縣圖曰坊州中部郡禹貢雍州之域春秋時翟國秦屬内史漢為右馮翊翟道縣之地姚興時置杏城周置馬坊唐髙祖因置坊州取馬坊為名漢書曰朔方為西部都尉休屠為北部都尉搜渠為中部都尉郡志曰城本三秦髙奴之地翟道故城即今郡城是也俗謂之髙樓城穆天子傳曰癸酉天子命駕八駿之駟造父為御翔行經翟道升於太行元和郡縣圖曰宜君縣前秦苻堅於祋祤縣故城置延州元和郡縣圖曰延州延安郡禹貢雍州之域春秋時白狄所居秦漢屬上郡髙奴之地項羽以董翳為翟王居髙奴即其地也漢志曰膚施屬上郡有五龍山水經曰渭水東經髙奴水漢志髙奴水合豐林水謂之清水丹州元和郡縣圖曰丹州咸寧郡禹貢雍州之域春秋時為白翟所居秦漢為上郡地隋圖經集記曰義州孟春秋時白翟也其俗語云丹州白窒即白翟語訛耳綏州元和郡縣圖曰綏州上郡禹貢雍州之域春秋白翟所居七國時屬秦秦併天下為上郡漢初屬翟國復改為上郡有疏屬之山山海經曰貳負之臣曰危危與貳負殺窫窳帝梏之疏屬之山桎其右足反縛兩手與髪繫之山上木即此銀州元和郡縣圖曰銀州銀川郡禹貢雍州之域春秋時白翟地秦為上郡漢為河西郡圁隂縣地前漢志曰圜隂屬西河莽曰方隂師古曰圜字本作圁縣縣在圁水之隂因以為名也今有銀州銀水即是舊名猶存但字變耳耆舊傳驄馬城即銀州城也苻秦建元元年自驄馬城巡撫夷狄麟州元和郡縣圖曰禹貢雍州之域秦漢為雲中郡隋為勝州天寳中分勝州地置麟州晉太康地志曰自北地郡北行九百里五原塞即此地後漢光禄徐自為出五原塞數百里築城障列亭至盧朐山即今縣北光禄塞是也夏州元和郡縣圖曰夏州朔方郡禹貢雍州之域春秋及戰國時屬魏秦併天下屬上郡漢}
