  - {type: variant, offset: 753, length: 2, content: 為河, krp: 文公作鄜畤靈公作吴陽上畤又作下畤今郡内有三畤原又曰皇始二十九年廵隴西北地出笄頭山過回中回中在扶風郡漢書曰文帝十四年匈奴入蕭關殺北地都尉回中宮候騎至雍水經曰郿縣有積石原魏青龍二年諸葛亮出斜谷與司馬宣王屯渭南郭洎筭亮必爭比原遂先據之亮至果不得上又魏氏春秋曰亮據渭南宣王謂諸將曰亮若出武功依山}
