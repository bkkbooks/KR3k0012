  - {type: variant, offset: 4140, length: 0, content: '', SBCK: 志曰鄜州洛交郡禹貢雍州之域春秋時􅁗地始皇時爲上郡漢爲上郡雕隂縣地史記曰􅁗文公畋于汧渭之間夢黄蛇首上鄜以爲上帝之徴遂以鄜立鄜畤祠白帝也漢書云匈奴南侵至朝郍膚施即此地也漢志曰雕隂屬上郡有雕隂山坊州元和郡縣圖曰坊州中部郡禹貢雍州之域春秋時翟國􅁗屬内史漢爲右馮翊翟道縣之地符姚時時置杏城周置馬坊唐髙祖因置坊州取馬坊爲名漢書曰朔方爲西部都尉休屠爲北部都尉捜渠爲中部都尉郡國志曰鄜城本三􅁗髙奴之地翟道故城即今郡城是也俗謂之髙樓城穆天子傳曰癸酉天子命駕八駿之駟造父爲御翔行經翟道昇於太行元和郡縣圖曰冝君縣前􅁗符堅於祋祤縣故城置之延州元和郡縣圖曰延州延安郡禹貢雍州之域春秋時白狄所居􅁗漢屬上郡髙奴之地項羽以董翳爲翟王居髙奴即其地也漢志曰膚施屬上郡有五龍山水經曰渭水東經髙奴水漢志髙奴水合豐林水謂之清水丹州元和郡縣圖曰丹州咸寜郡禹貢雍州之域春秋時爲白翟所居􅁗漢爲上郡地隋圖經集記曰義川蓋春秋時白翟也其俗語云丹州白窒即白翟語訛耳綏州元和郡縣圖曰綏州上郡禹貢雍州之域春秋白翟所居七國時屬􅁗􅁗併天下爲上郡漢􅀄屬翟國復改爲上郡山海經曰上郡有䟽屬二􅀒之臣曰危與二􅀒殺窫寙帝梏之䟽屬之山即此也銀州元和郡縣圖曰銀州銀川郡禹貢雍州之域春秋時白翟地􅁗爲上郡漢爲河西郡圁隂縣地前漢志曰圜隂屬西河郡莽曰方隂師古曰圜字本作圁縣在圁水之隂因以爲名也今有銀川銀水即是舊名猶存但字變耳耆舊傳騘馬城即銀川城也符􅁗建元元年自騘馬城廵撫夷狄麟州元和郡縣圖曰禹貢雍州之域􅁗漢爲雲中郡隋爲勝州天寳中分勝州地置麟州晉太康地志曰自北地郡北行九百里得五原塞即此地後漢光禄徐自爲出五原塞數百里築城鄣列亭至盧朐山即今縣北光禄塞是也夏州元和郡縣圖曰夏州朔方郡禹貢雍州之域春秋及戰國時屬魏􅁗併天下屬上郡漢}
