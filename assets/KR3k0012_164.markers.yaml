  - {type: variant, offset: 4113, length: 18, content: 遂至平城為匈奴所圍七日用陳平祕計得出, SBCK: 江南鹽州元和郡縣圖曰鹽州五原郡禹貢雍州之域春秋時戎狄地􅁗屬梁州漢置五原郡地有原五因而名之史記曰梁山􅃮沮之北有義渠胊衍之戎即此地漢志曰馬嶺屬北地郡以川形似馬領故以爲名十道志曰馬嶺今鹽州地}
