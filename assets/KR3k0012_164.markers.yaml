  - {type: variant, offset: 876, length: 3255, content: 漢志曰彘屬河東郡周厲所奔也王莽曰黃城澤州元和郡縣志曰澤州高平郡禹貢冀州之域春秋時屬晉戰國時屬韓魏後屬韓秦兼天下今州即上黨郡高都縣之地也史記曰秦使武安君白起攻趙趙發兵拒秦秦大破趙於長平長平在高平縣西北有長平故城十道志曰澤州以濩澤為名漢志曰濩屬河東郡禹貢析城山在其西南濩音胡虢反墨子曰舜漁於濩澤十道志曰晉城縣本漢高都縣也漢志曰高都屬上黨郡有天井關元和郡縣志曰高平縣本漢泫氏縣也泫音胡玄反漢志曰泫氏屬上黨泫水所出也竹書紀年曰梁惠王九年晉取泫氏史記曰趙成侯十六年與韓魏分晉封晉君于端氏也潞州元和郡縣志曰潞州上黨郡禹貢冀州之域殷為黎國春秋時屬晉又曰兼有潞子之國秦為上黨郡地左傳宣十五年曰潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目酆舒潞相晉侯伐之滅潞酆舒奔衛衛人歸諸晉晉人殺之戰國策曰秦有安邑則韓必無上黨以遠韓近趙故卒歸趙隋圖記曰上黨南陽古以為縣實都也漢志曰上黨郡秦置屬并州有上黨關又曰壼關屬上黨郡黎侯國今有黎亭釋名曰上黨黨所也在山上其所最高故曰上黨上黨記曰高平赤壞其地山阻百姓不居即此郡也圖經曰後周建德七年於襄垣縣立潞州以其浸汾潞為名漢志曰長子縣屬上黨郡周史辛甲所封師古曰長讀長短之長竹書紀平曰梁惠王十二年鄭取屯留尚子即長子之地也左傳襄十九年曰晉人執衛行人石買于長子執孫蒯于屯留長子屬上黨又曰鄭伯如晉晉人執諸銅鞮晉太康地記曰銅鞮故晉大夫羊舌赤邑時號赤為銅鞮伯華漢以為縣遼州圖經曰遼州樂平郡禹貢冀州之域春秋時其地屬晉戰國屬韓後屬趙秦漢為上黨郡貞觀中避諱改為儀州後又為箕州復為遼十道志曰和順縣本漢沾縣地即諱閼與邑史記曰秦昭襄三十八年攻趙閼與趙奢曰其道遠險扼譬如兩鼠鬥於穴中將勇者勝乃使趙奢將大破秦軍乃解閼與之圍漢書高帝紀曰韓信破代相夏說於閼與漢志曰沾縣屬上黨郡有沾水出壼關沾音他兼反沁州十道志曰沁千浸切州陽城郡本漢穀遠縣地元和郡縣志曰禹貢冀州之域春秋時其地屬晉戰國時屬韓在秦為上黨郡地今州即漢上黨之穀遠屬地漢志曰穀遠屬上黨郡王莽曰穀近晉地記曰穀遠今名孤遠後代語訛耳十道志曰綿上縣亦穀遠縣之地以縣西有綿上地因名之舊屬介休縣隋分置綿上焉蓋晉介子推之地隰州圖經曰隰州大寧郡夏殷已前其地與箕沁同在周為晉之北鄙元和郡縣志曰禹貢冀州之域春秋時為晉地七國時屬魏秦為河東郡地漢為蒲子縣屬河東郡國語曰驪姬謂晉獻公曰蒲與屈君之疆也不可以無主若太子主蒲與屈乃可以威民而懼戎太子申生也二子重耳夷吾也蒲陽平蒲子縣郡國志曰以州前二里有泉下濕故取下濕之義為名十道志曰永和縣本漢狐讘縣也漢志曰狐讘屬河東郡讘音之涉反慈州元和郡縣志曰慈州文成郡禹貢冀州之域春秋時晉之屈邑獻公子夷吾所居也秦併天下即河東郡之北屈縣漢志曰北屈王莽曰朕北應劭曰有南屈故稱北瓚曰汲郡古文翟章救鄭次于南屈左傳僖二年曰晉荀息請以屈產之乘與垂棘之壁假道於虞以伐虢屈地生良馬元和郡縣圖曰吉昌縣有姚襄城西臨黃河控帶龍門孟門之險周齊交爭之地齊後主武平二年遣斛律明月破周兵於此城下郡國縣道記曰呂香本漢之北屈有騏縣漢志曰騏屬河東郡侯國汾州十道志曰汾州西河郡禹貢冀州之域其在虞夏及周屬并州春秋時晉地六國時屬趙秦併天下屬太原郡左傳昭元年曰昔金天氏有裔子曰昧為玄冥師生允格臺駘臺駘能業其官宣汾洮障大澤汾洮二水以處太原太原晉陽也帝用嘉之封諸汾川又曰昔高辛氏有二子長曰閼伯次曰實沈居于曠林不相能也后帝不臧遷閼伯于商丘主辰啇人是因遷實沈于大夏主參唐人是因大夏今晉陽縣其季世曰唐叔虞及成王滅唐而封太叔焉故參為晉星叔虞封唐是為晉侯又昭二年曰齊陳無宇送女晉侯謂之少齊謂陳無宇非卿執諸中都中都晉邑在河西介休縣又僖二十四年曰晉侯賞從亡者介之推不言祿祿亦弗及遂隱而死晉侯求之不獲以緜上為之田曰以志吾過且旌善人元和郡縣志曰子夏居西河吳起守西河皆為此也禮記檀弓曰子夏喪其子而喪其明曾子弔之子夏哭曰天乎予之無罪也曾子怒曰商汝何無罪也吾與汝事夫子於洙泗之間退而老於西河之上使西河之民疑汝於夫子爾罪一也唐書曰高祖初起兵師次霍邑隋將宋金剛拒不得進屯軍賈胡堡會霖神語曰若向霍邑當東南傍山取路八日雨止我當助破之賈胡堡在靈石縣并州元和郡縣圖志曰并州太原府禹貢冀州之域春秋時晉國戰國時為趙地秦併天下置太原郡尚書禹貢曰既脩太原至于岳陽春秋元命苞曰并之為言精合交并釋名曰并者兼并也言或并或設元和郡縣志曰中國曰太原夷狄曰大鹵按晉大鹵太原大夏夏墟晉陽六名其實一也左傳曰晉荀吳敗狄於大鹵釋名曰地不生物曰鹵太康地記曰并州不以衛水為號不以恒山為稱而云并者蓋以在兩谷之間乎帝王世紀曰帝堯始封於唐又徙晉陽及為天子都平陽平陽即今晉陽即太原也又曰禹自安邑都晉陽至桀徙都安邑至周成王以封弟叔虞是為晉侯史記曰成王與叔虞戲削桐葉為珪曰以是封汝周公請封於唐王曰吾戲耳周公曰天子無戲言遂以封之魏志曰高祖圍袁尚於鄴時袁紹外生高幹為并州刺史牽招說幹曰并州左有恒山之險右有大河之固北有強胡宜速迎尚併力觀變幹不從故敗史記曰智伯率韓魏攻趙襄子于晉陽引汾水灌其城不沒者三板春秋後語曰張孟談謂趙襄子曰董安于之在晉陽公呂之垣皆荻蒿隋圖經曰并州其氣勇抗誠信韓趙魏謂之三晉剽疋妙反悍盜賊常為他郡劇漢志曰太原郡秦置有鹽官在晉陽屬并州領縣二十一又曰榆次屬太原郡王莽曰太原亭史記秦本紀曰莊襄王使蒙敖攻趙榆次漢志曰陽曲屬太原應劭曰黃河千里一曲當其陽故曰陽曲石州元和郡縣志曰石州昌化郡禹貢冀州之域虞及周屬并州春秋時屬趙亦為白狄之地在秦為西河郡之離石地史記曰秦伐趙取離石前趙錄曰今離石在國單于所徙庭是也十六國春秋曰晉惠帝以劉元海為離石將兵都尉嵐州元和郡縣志曰嵐州樓煩郡禹貢冀州之域春秋時為晉國後屬趙本樓煩故地秦為太原郡漢為太原郡之汾陽地史記曰趙惠文王王父行地遂出伐西遇樓煩王於西河而破其兵取其地為縣漢志曰汾陽屬太原郡汾水所出漢書項羽傳曰漢有善射者曰樓煩楚挑戰樓煩輒射殺之使射羽羽大怒瞋目叱之樓煩目不能視手不能發樓煩縣屬鴈門北縣人善騎射莊子曰堯治天下之民平海內之政往見四子藐姑射之山汾水之陽窅然喪其天下代州元和郡縣圖曰代州鴈門郡古并州之域春秋時晉地戰國時屬趙秦置三十六郡鴈門是其一焉漢因之河東記曰代句住在州西北鴈門界西陘山是也史記曰趙襄子與韓魏共滅智伯分晉地則趙有句注之地爾雅曰北陵西踰鴈門是也郭璞注曰西踰鴈門山也地理志曰自代傍陰山至高闕代王以為塞漢志曰鴈門郡秦置句注山在陰館王莽曰填狄屬并州領縣十四山海經曰鴈門出其間在高柳代中史記曰趙襄子與代王會於夏屋以銅斗擊殺代王而取其地十道志曰五臺縣本漢慮虒縣漢志曰慮虒屬太原郡師古曰慮虒音廬夷又曰崞縣屬鴈門王莽曰崞張又曰繁畤屬鴈門王莽曰當要忻州元和郡縣志曰忻州定襄郡古并州之域春秋時為晉國戰國時為趙地秦漢為太原郡地今州即漢太原郡之陽曲縣也十道志曰忻州置在秀容縣本漢曲陽縣後漢末於此置九原縣十三州志曰漢末大亂匈奴侵邊自定襄已西盡雲中鴈門之間遂控建安中丞相曹公集荒郡之戶以為縣聚之九原縣界新興郡領九原等縣屬并州元和郡縣志曰秀容城劉元海新築元海感神而生姿容秀美因以為名蔚州元和郡縣志曰蔚州安邊郡禹貢冀州之域虞及周屬并州春秋時地屬晉戰國時屬趙秦漢為代郡漢志曰靈丘屬代郡瓚曰靈丘之號在趙武靈王之前也漢書曰酈食其說漢王曰杜白馬之津距飛狐之口晉書曰建興中劉琨自代出飛狐口奔於安次朔州元和郡縣志曰朔州馬邑郡屬禹貢冀州之域虞及周為并州地春秋時為北狄地戰國時屬趙秦為鴈門郡漢為鴈門郡之馬邑也漢志曰馬邑屬鴈門郡王莽曰章昭晉太康地記曰秦時建此城輒崩不成有馬周旋馳走反覆父老異之因依以築城遂為馬邑後魏書曰道武天興元年遷都平城孝文遷都之後於此置朔州冀州圖云趙武靈王胡服而征遂有獫猶之地漢高帝以韓王信壯武乃以太原郡為韓國徙信以備胡信以晉陽去塞遠請理馬邑上乃許之後匈奴圍信信數求救上賜書責信信懼以馬邑降胡雲州元和郡縣圖曰雲州雲中郡禹貢冀州之域虞及周為并州之地春秋時為北狄地戰國時其地屬趙其後屬秦鴈門郡地漢鴈門郡之平城縣也漢志曰平城東部都尉治王莽曰平順郡國志曰雲中五原唾出口成冰言苦寒也漢書曰七年上自將擊韓王信于銅鞮縣名信亡走匈奴與匈奴共距漢上從連戰乘勝逐北遂至平城為匈奴所圍七日用陳平祕計得出, WYG: ''}
