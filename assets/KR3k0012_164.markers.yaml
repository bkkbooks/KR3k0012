  - {type: variant, offset: 909, length: 1, content: 冀, SBCK: 雍州之域公劉所居之地􅁗爲内史地漢爲右扶風本作􅃎字開元中以豳與幽字相渉改爲邠漢志曰栒邑屬右扶風有􅃎郷詩􅃎國公劉所都也左傳曰畢原豐邭文之昭也十六國春秋曰符堅時新平人王雕陳圖䜟王猛以爲左道惑衆勸堅誅之雕臨刑上䟽曰臣師劉湛明於圖記謂臣曰新平應出帝王寳器願陛下志之後果獲玉器焉十道志曰冝禄縣本漢鶉觚縣後魏又分置東隂盤縣周地圖記曰􅁗使􅂪恬北築長城又於北原築城以觚奠酒而􅀕有鶉飛止觚上因以名縣今有鶉觚原元和郡縣圖曰新平本漢漆縣後漢書曰建武八年隗嚚攻略陽上至漆進止未定㑹馬援夜至上喜問之援聚米以爲山谷於上前指軍所從入上􅀏曰虜在吾目中矣涇州元和郡縣圖曰涇州安定郡禹貢雍}
