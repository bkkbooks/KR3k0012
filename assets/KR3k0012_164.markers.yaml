  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第一百六十四州郡部卞關西道雍華同歧耀乾隴邠涇寜慶原靈鹽鄜坊延丹綏銀麟夏豐勝雍州尚書禹貢曰黒水西}
  body:
  - {type: variant, offset: 1, length: 0, content: '', SBCK: 惟雍州厥土惟黄壤厥田惟上上厥賦中下田苐一賦第六人功少厥貢惟球琳瑯玕球琳皆玉名瑯玕石而似珠文耀鈎曰歧華巳北龍門積石南至三危雍州也春秋􅀃題辭曰􅁗金精堅故􅁗俗亦堅春秋元命苞曰雍壅也}
  - {type: variant, offset: 1, length: 0, content: '', WYG: 惟雍州厥土惟黄壤厥田惟上上厥賦中下厥貢惟球琳瑯玕文耀鉤曰岐華已北龍門積石南至三危雍州也春秋說題辭曰秦金精堅故秦俗亦堅春秋元命苞曰雍壅也}
  - {type: variant, offset: 1, length: 0, content: '', krp: 惟雍州厥土惟黄壤厥田惟上上厥賦中下田苐一賦第六人功少厥貢惟球琳瑯玕球琳皆玉名瑯玕石而似珠文耀鈎曰歧華巳北龍門積石南至三危雍州也春秋說題辭曰秦金精堅故秦俗亦堅春秋元命苞曰雍壅也}
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 距坂西有漢中南含髙山阻居庸是釋名曰雍州在西山之内壅翳也應劭注漢書曰四靣積髙曰壅李廵注爾雅曰河西其氣蔽壅也晉太康地志曰雍州西北之地陽所不及隂氣壅遏故以爲名呂氏春秋曰西方爲壅州三輔黄圖曰始皇表河以爲􅁗東門表汧以爲􅁗西門地理通􅀃曰東自同華略河西北西自歧隴㑹原極于此盡其地挾灃灞據函崤方千里得百二之固史記蘇􅁗􅀃蘇孝公曰􅁗四塞之國􅀍山帶河外有洪河之險西有漢中巴蜀北有代馬之利此天府也又曰獻公徙居櫟陽孝公用商鞅作咸陽築冀闕徙都之貨殖傳曰􅀜中由汧雍以東至河華膏壤沃野千里自虞夏之貢以爲上田漢書曰􅁗形勝之國也帶河阻山懸隔千里持㦸百万􅁗得百二焉言秦地險固二万人足敵諸侯百万人也地􅀔便利以其下兵於諸侯譬猶居髙屋之上建瓴水也瓴盛水瓶也居髙屋之上而播瓴水言其向下之􅀔易也又婁敬􅀃髙祖曰陛下都洛陽豈欲與周室比隆哉周之都洛以爲天下之中四方納貢}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_SBCK_164-1b}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_SBCK_164-2a}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 距蒲坂西有漢中南含髙山北阻居庸應劭注漢志曰四靣積髙曰壅李廵注爾雅曰河西其氣蔽壅也晉太康地志曰雍州西北之位隂氣壅遏故以為名三輔黄圖曰始皇表河以為秦東門表汧以為秦西川史記蘇秦說秦孝公曰秦四塞之國被山帶河外有洪河之險西有漢中巴蜀北有代馬之利此天府也又曰獻公徙居櫟楊孝公作咸陽築冀闕徙都之貨殖傳曰闗中由汧雍以東至河華膏壤沃野千里自虞夏之貢以為上田漢書曰秦形勝之國也帶河阻山縣隔千里持㦸百萬秦得二百焉言秦地險固二萬人可敵諸侯百萬人也地勢便利其以下兵於諸侯譬猶居髙屋之上建瓴水也瓴盛水瓶也居髙屋之上而傾瓴水言其自上之勢易也又婁敬説髙祖曰陛下都洛陽豈欲與周室比隆哉周之都洛陽為天下之中四方納貢}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_WYG_164-2b, image: WYG0894/WYG0894-0485d.png}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_WYG_164-3a, image: WYG0894/WYG0894-0486a.png}
  - {type: variant, offset: 2, length: 0, content: '', krp: 距坂西有漢中南含髙山阻居庸是釋名曰雍州在西山之内壅翳也應劭注漢書曰四靣積髙曰壅李廵注爾雅曰河西其氣蔽壅也晉太康地志曰雍州西北之地陽所不及隂氣壅遏故以爲名呂氏春秋曰西方爲壅州三輔黄圖曰始皇表河以爲秦東門表汧以爲秦西門地理通說曰東自同華略河西北西自歧隴㑹原極于此盡其地挾灃灞據函崤方千里得百二之固史記蘇秦說蘇孝公曰秦四塞之國𬒳山帶河外有洪河之險西有漢中巴蜀北有代馬之利此天府也又曰獻公徙居櫟陽孝公用商鞅作咸陽築冀闕徙都之貨殖傳曰關中由汧雍以東至河華膏壤沃野千里自虞夏之貢以爲上田漢書曰秦形勝之國也帶河阻山懸隔千里持㦸百万秦得百二焉言秦地險固二万人足敵諸侯百万人也地勢便利以其下兵於諸侯譬猶居髙屋之上建瓴水也瓴盛水瓶也居髙屋之上而播瓴水言其向下之勢易也又婁敬說髙祖曰陛下都洛陽豈欲與周室比隆哉周之都洛以爲天下之中四方納貢}
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 里均有德則易以王無德則易以亡今陛}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 里均有徳則易以王無徳則易以亡今陛}
  - {type: variant, offset: 3, length: 0, content: '', krp: 里均有德則易以王無德則易以亡今陛}
  - {type: xml-element, offset: 4, content: '', id: KR3k0012_CHANT_164-bkkxmlele1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_164-1a.1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_164-1a.2}
  - {type: variant, offset: 4, length: 1, content: 蒲, SBCK: 欲比隆成康之時爲不侔矣且秦地􅀍山帶河四塞以爲固卒然有變急百万之衆可具故􅁗膏膄之地以爲天府陛下入􅀜而都之山東雖亂􅁗故地可全而有也夫與人闘不搤其吭而拊其背未能全勝今陛下入􅀜而都之此亦搤天下之吭而拊其背也髙祖以問群臣群臣皆山東人争言周王數百年􅁗二世而亡髙祖疑未能决及留侯明言入􅀜便即日車駕西都􅀜中又百官表曰内史周官􅁗因之掌治京師景帝二年分置左内史右内史太􅀄元年更爲京兆尹又東方朔曰三輔之地南有江淮北有河渭汧隴以東商雒以西厥壤肥饒此所謂天府陸海之地也後漢書曰董卓徙都長安謂陳紀曰三輔平敞四靣險固土地肥美號曰陸海三輔黄圖曰太􅀄元年以渭城以西屬右扶風長安以東屬京兆尹長陵以北屬左馮翊以輔京師謂之三輔􅀜中記曰􅁗西以隴􅀜爲限東以函谷爲界二􅀜之間謂之中地地東西方千餘里十道志曰雍州京兆郡禹貢九州之一舜置十二牧雍亦在焉周武王都酆鎬平王東遷以歧酆之地賜􅁗孝公始都咸陽􅁗兼天下置内史以領􅀜中項籍滅􅁗分其地爲三以章邯爲雍王都廢丘司馬欣爲塞王都櫟陽董翳爲翟王都髙奴謂之三􅁗髙祖入􅀜定三􅁗復爲内史武帝改爲京兆尹華}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_164-2b}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_164-3a}
  - {type: variant, offset: 4, length: 1, content: 蒲, WYG: 欲比隆成康之時為不侔矣且秦地被山帶河四塞以為固卒然有變急百萬之衆可當其固秦膏腴之地以為天府陛下入闗而都之山東雖亂秦故地可全而有也夫與人鬬不搤其吭而拊其背未能相勝今陛下入闗而都之此亦搤天下之吭而拊其背也髙祖以問羣臣羣臣皆山東人争言周王數百年秦二世而亡髙祖疑而未能决及留侯言入闗便即日車駕西都闗中又百官表曰内史周官秦因之掌治京師景帝二年分置左内史右内史太初元年更為京兆尹東方朔傳曰三輔之地南有江淮北有河渭汧隴以東商雒以西厥壌肥饒此所謂天府陸海之地也後漢書曰董卓徙都長安謂陳紀曰三輔平敞四面險固土地肥美號曰陸海三輔黄圗曰太初元年以渭城以西屬右扶風長安以東屬京兆尹長陵以北屬左馮翊以輔京師謂之三輔闗中記曰秦西以闗隴為限東以函谷為界二關之間謂之闗中地東西方千餘里十道志曰雍州京兆郡禹貢九州之一爵置十二等雍州亦在焉武王都豐鎬平王東遷以岐豐之地賜秦孝公始尹咸陽秦兼天下置内史以領關中項籍滅秦分其地為三以章邯為雍王都廢丘司馬欣為塞王都櫟陽董翳為翟王都髙奴謂之三秦髙祖入關定三秦復為内史武帝改為京兆尹華}
