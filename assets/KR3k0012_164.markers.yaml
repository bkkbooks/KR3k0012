  - {type: variant, offset: 2621, length: 661, content: 鹵按晉大鹵太原大夏夏墟晉陽六名其實一也左傳曰晉荀吳敗狄於大鹵釋名曰地不生物曰鹵太康地記曰并州不以衛水為號不以恒山為稱而云并者蓋以在兩谷之間乎帝王世紀曰帝堯始封於唐又徙晉陽及為天子都平陽平陽即今晉陽即太原也又曰禹自安邑都晉陽至桀徙都安邑至周成王以封弟叔虞是為晉侯史記曰成王與叔虞戲削桐葉為珪曰以是封汝周公請封於唐王曰吾戲耳周公曰天子無戲言遂以封之魏志曰高祖圍袁尚於鄴時袁紹外生高幹為并州刺史牽招說幹曰并州左有恒山之險右有大河之固北有強胡宜速迎尚併力觀變幹不從故敗史記曰智伯率韓魏攻趙襄子于晉陽引汾水灌其城不沒者三板春秋後語曰張孟談謂趙襄子曰董安于之在晉陽公呂之垣皆荻蒿隋圖經曰并州其氣勇抗誠信韓趙魏謂之三晉剽疋妙反悍盜賊常為他郡劇漢志曰太原郡秦置有鹽官在晉陽屬并州領縣二十一又曰榆次屬太原郡王莽曰太原亭史記秦本紀曰莊襄王使蒙敖攻趙榆次漢志曰陽曲屬太原應劭曰黃河千里一曲當其陽故曰陽曲石州元和郡縣志曰石州昌化郡禹貢冀州之域虞及周屬并州春秋時屬趙亦為白狄之地在秦為西河郡之離石地史記曰秦伐趙取離石前趙錄曰今離石在國單于所徙庭是也十六國春秋曰晉惠帝以劉元海為離石將兵都尉嵐州元和郡縣志曰嵐州樓煩郡禹貢冀州之域春秋時為晉國後屬趙本樓煩故地秦為太原郡漢為太原郡之汾陽地史記曰趙惠文王王父行地遂出伐西遇樓煩王於西河而破其兵取其地為縣漢志曰汾陽屬太原郡汾水所出漢書項羽傳曰漢有善射者曰樓煩楚挑戰樓煩輒射殺之使射羽羽大怒瞋目叱之樓煩目不能視手不能發樓煩縣屬鴈門北縣人善騎射莊子曰堯治天下之民平海內之政往見四子藐姑射之山汾水之陽窅然喪其天下代, SBCK: 􅀖寜}
