  - {type: variant, offset: 54, length: 220, content: 季布為河東太守文帝謂布曰河東吾股肱郡也愽物志曰河東有山澤近監沃土之人不才漢興少有名人魏志杜畿傳曰畿為河東太守開置學官親執經教郡中化之自後河東多儒者閭閻之間習於程法春秋左氏傳曰晉人謀去故絳諸大夫皆曰必居郇音荀瑕氏之地郇暇故國名河東解縣西北郇城沃饒而近盬盬鹽猗氏縣鹽池是國利君樂不可失也韓獻子曰不可郇暇氏土薄水淺其惡易覯易覯則民愁民愁則音墊居隘於是乎有沈溺重膇直偽切之疾不如新田土厚水深居之不疾有汾澮以流其惡夫山澤林盬國之寶也國饒則民驕佚近寶則, WYG: 秦武}
