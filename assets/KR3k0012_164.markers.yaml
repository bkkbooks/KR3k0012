  - {type: variant, offset: 766, length: 0, content: '', WYG: 上至漆進止未定會馬援夜至上喜問之援聚米以為山谷於上指軍所從入上笑曰虜在吾目中矣涇州元和郡縣圖曰涇州安定郡禹貢雍州之域春秋時屬秦始皇時屬北地郡漢置安定郡宋永初山川記曰安定處山谷之間昆戎舊壌迫近夷狄修習武備人皆以馳射為事國語曰周共王遊於涇上宻康公從有三女奔之其母曰必致之於王夫獸三為羣人三為粲粲美之物也衆以美物歸汝而何徳以堪王猶不堪况汝小醜小醜備物終必亡康公不獻王王滅宻地有隂宻城詩大雅曰宻人不恭敢距大邦寧州元和郡縣圖曰寧州彭原郡禹貢雍州之域當夏之衰公劉邑焉周時為義渠戎王國至秦昭王殺義渠戎王并其地始皇時為北地郡漢因之漢志曰泥陽屬北平郡王莽曰泥隂應劭曰泥水出郁郅北蠻中十道志後漢改泥陽為富平後魏又改定平又曰義渠道屬北地郡莽曰義蒲漢書曰夏道衰而公劉失其稷官變於西戎邑于邠至秦繆公得由余西戎八國服秦岐梁涇漆之北有義渠烏氏朐衍之戎築城郭以居秦稍蠶食之惠王遂取義渠二十五城秦昭王殺義渠戎王於是秦遂有隴西上郡之地慶州元和郡縣圖曰慶州順化郡禹貢雍州之域古西戎地后稷子不窋居之今不窋故城在焉春秋時義渠戎王國始皇時為北地郡漢志曰郁郅屬北地郡有牧師苑官莽曰功著周地圖記曰郁郅城今則名尉季城在白馬嶺兩川交口水經曰尉季亦曰不窋疑郁郅之訛也十道志曰樂蟠縣本漢略畔道也漢志曰略畔道莽曰延年道有略畔山俗呼曰洛盤音訛耳原州元和郡縣圖曰原州平凉郡禹貢雍州之域春秋時地屬秦始皇時屬北地郡漢為安定郡漢志曰髙平屬安定郡莽曰鋪睦班固安豐戴侯頌曰髙平第一帝臨我師漢書曰漢文十四年匈奴入蕭闗殺北地都尉十道志曰蕭闗在原州後漢曰隗囂使牛邯守瓦亭闗十道志曰蕭關瓦亭在平凉郡靈州元和郡縣圖曰靈州靈武郡禹貢雍州之域春秋戰國屬秦秦併天下為北地郡漢髙為平富}
