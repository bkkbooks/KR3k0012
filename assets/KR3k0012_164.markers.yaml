  - {type: variant, offset: 722, length: 1, content: 平, WYG: 扶風郡今為鳯翔府禹貢雍州之域春秋時戰國時為秦都屬内史髙帝更名中地郡復屬内史景帝更名主爵都尉武帝改右扶風所以扶助京師行風化也史記曰秦文公作鄜畤靈公作吳陽上畤又作下畤今郡内有三畤原又曰始皇二十七年巡隴西北地出雞頭山過囘中囘中在扶風郡漢書曰文帝十四年匈奴入蕭闗殺北地都尉囘中宫候騎至雍水經曰郿縣有積石原魏青龍二年諸葛亮出斜谷與司馬宣王屯渭南郭洎算亮必争北原遂先據之亮至果不得上又魏氏春秋曰亮據渭南宣王謂諸將曰亮若出武功上依東轉是其勇也若西上五丈原即諸君無事矣亮果屯北原國語曰周之興也鸑鷟鳴於岐山今岐山縣是三秦記曰陳倉山上有石鷄與山鷄不别趙髙燒山鷄飛去而石鷄不去晨鳴山頭聲聞二十里或云玉鷄耀州五代史曰耀州本京兆府華原縣唐末李茂貞據鳯翔僣行墨制建為耀州以義勝為軍額命温韜為節度使乾州又曰本唐之奉天縣也唐末李茂貞建之為留後唐因之不改隴州元和郡縣圖曰隴州汧}
