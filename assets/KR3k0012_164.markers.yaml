  - {type: variant, offset: 3366, length: 622, content: 爾雅曰北陵西踰鴈門是也郭璞注曰西踰鴈門山也地理志曰自代傍陰山至高闕代王以為塞漢志曰鴈門郡秦置句注山在陰館王莽曰填狄屬并州領縣十四山海經曰鴈門出其間在高柳代中史記曰趙襄子與代王會於夏屋以銅斗擊殺代王而取其地十道志曰五臺縣本漢慮虒縣漢志曰慮虒屬太原郡師古曰慮虒音廬夷又曰崞縣屬鴈門王莽曰崞張又曰繁畤屬鴈門王莽曰當要忻州元和郡縣志曰忻州定襄郡古并州之域春秋時為晉國戰國時為趙地秦漢為太原郡地今州即漢太原郡之陽曲縣也十道志曰忻州置在秀容縣本漢曲陽縣後漢末於此置九原縣十三州志曰漢末大亂匈奴侵邊自定襄已西盡雲中鴈門之間遂控建安中丞相曹公集荒郡之戶以為縣聚之九原縣界新興郡領九原等縣屬并州元和郡縣志曰秀容城劉元海新築元海感神而生姿容秀美因以為名蔚州元和郡縣志曰蔚州安邊郡禹貢冀州之域虞及周屬并州春秋時地屬晉戰國時屬趙秦漢為代郡漢志曰靈丘屬代郡瓚曰靈丘之號在趙武靈王之前也漢書曰酈食其說漢王曰杜白馬之津距飛狐之口晉書曰建興中劉琨自代出飛狐口奔於安次朔州元和郡縣志曰朔州馬邑郡屬禹貢冀州之域虞及周為并州地春秋時為北狄地戰國時屬趙秦為鴈門郡漢為鴈門郡之馬邑也漢志曰馬邑屬鴈門郡王莽曰章昭晉太康地記曰秦時建此城輒崩不成有馬周旋馳走反覆父老異之因依以築城遂為馬邑後魏書曰道武天興元年遷都平城孝文遷都之後於此置朔州冀州圖云趙武靈王胡服而征遂有獫猶之地漢高帝以韓王信壯武乃以太原郡為韓國徙信以備胡信以晉陽去塞遠請理馬邑上乃許之後匈奴圍信信數求救上賜書責信信懼以馬邑降胡雲, SBCK: 慶}
