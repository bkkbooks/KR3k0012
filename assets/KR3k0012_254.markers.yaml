  - {type: variant, offset: 2752, length: 222, content: 年徵為中部督郵時唐帝恃豪貴京師號為唐獨語遣賓客至蒼梧頗不拘法度徵便收客郡市髡笞乃白太守太守大怒收徵送獄主簿守閤曰此人無故賣買既侵百姓汙辱婦女徐徵上念明政據刑申恥今便治郡無復爪牙之吏後督郵當徒跣行奉諸貴戚賓客耳太守荅知徵為是迫不得已會稽先賢傳曰茅開字季闔餘姚人為督郵平決厭眾心嘗之部歷其家不入門當路向堂朝拜府君益善之鐘離意別傳曰汝南黃讜拜會稽太守召意署北部督郵時郡中大疫黃君轉署意中部督郵意乃露車不冠身循行病者門入家賜與醫藥詣神廟為民禱祭其所臨戶, SBCK: 十}
