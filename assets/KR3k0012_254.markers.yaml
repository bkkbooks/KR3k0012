  - {type: variant, offset: 2462, length: 7, content: 尼歷階趙彈秦箏, SBCK: 舉蔡薳王臺卿􅁃仲容四人俱􅀍接遇並有蓄積故樊鄧謌之云江千萬蔡五百正新車􅁃大宅梁武聞而接之曰主人憒憒不如客及恪還梁武問之恪甚慙恧後魏書曰髙陽王雍爲}
  - {type: variant, offset: 2462, length: 7, content: 尼歷階趙彈秦箏, WYG: 舉蔡逺王臺卿庾仲容四人俱被接並有蓄積故樊鄧謌之云江千萬蔡五百王新車庾大宅梁武聞而接之曰主人憒憒不如客及恪還梁武問之恪甚慙恧後魏書曰髙陽王雍為湘州刺史帝誡曰為牧之道亦易亦難其身正不令而行故曰是易其身不正雖令不從故曰是難又曰髙允為懐州刺史允秋巡境問民疾苦至郡縣見邵公廟廢毁不立乃曰邵公之德闕而不禮為善者何望乃表修葺之又曰李崇為并州刺史多劫盜崇乃村置一樓樓懸一鼓盜發則擊之俄頃之間聲布百里遂多擒獲諸州鼓樓自崇始也又曰南安王楨出為}
