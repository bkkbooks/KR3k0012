  - {type: variant, offset: 1148, length: 155, content: 恒山郡丞有一人豪猾每持長吏短前後守令咸憚之同下車聞其名召而數之因令左右剡木為大撅埋於廷出尺餘四角各埋小撅令其露心於木撅上縛四支於小撅以捧毆其背應時潰爛郡中大駭吏人相視懾氣唐書官品志曰丹陽會稽吳郡吳興及萬戶郡丞並六百石汝南先賢傳曰周防字偉公年十六任郡小吏世祖巡狩汝南召椽史試經防尤能誦讀拜為守丞防以未冠請去師事徐, WYG: 并}
