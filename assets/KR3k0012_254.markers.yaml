  - {type: variant, offset: 1614, length: 413, content: 人次到尹翁歸獨伏不肯起對曰翁歸文武兼備唯所施設延年召上辭問甚奇其對使歸府案事發姦窮竟事情延年大重之徙署督郵河東二十縣分為兩部閱孺部汾北翁歸部汾南又曰孫寶為京兆尹以立秋日署故吏侯文為東部督郵入見勑曰鷹隼始擊常順天氣取姦惡以成嚴霜之誅椽部拒有人乎文曰無其人不敢空受職寶曰誰文曰霸陵杜穉秀寶曰更言其次文曰豺狼方橫道不宜復問狐狸徲秀聞之杜門不通水火穿後牆為小戶不敢犯法東觀漢記曰趙勤字孟卿南陽棘人明達好學介然特立太守駱珍召署曹吏至掾督郵太守桓虞下車葉令雍霸及新野令皆不遵法乃復勤督郵到葉見霸不問縣事但高談清論以激厲之霸即陳責解印綬去勤還入新野界令聞霸已去遣吏奏記陳罪復還印綬去虞乃歎曰善吏加良鷹矣下韝即中又曰虞延陳留人光武東巡過小黃高帝母昭靈后園陵在焉延為部督郵詔呼引見問園陵之事延占拜可觀其園陵樹蘗皆諳其數俎豆犧牲頗曉其禮帝善之勑延從駕到魯還經封丘城門下小不容羽蓋上怒使撻侍御史延因陛見引咎以為罪在督郵上詔曰以陳留督郵虞延故貸御史罪, SBCK: 里}
