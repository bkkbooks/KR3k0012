  - {type: variant, offset: 313, length: 264, content: 出公祿使綱紀營護之又土俗山民有病輒云先祖為禍皆開冢剖棺水洗枯骨名為除祟憲之曉諭為陳生死之別事不相由風俗遂改時刺史王奐新至唯衡陽獨無訟者乃歎曰顧衡陽之化至矣又曰傅昭為安成內史郡自宋已來兵亂相接郡府舍稱凶每昏旦聞人鬼相觸在任者鮮以吉終及昭至有人夜見甲兵出曰傅公善人不可侵犯乃騰虛而去有頃風雨忽至飄郡廳事入隍中自是郡遂無患咸以昭貞正所致又曰傅昭為安成內史郡多猛獸為害常乃命去檻穽猛獸竟不為害又曰殷鈞字季和陳郡長平人也為臨川內史鈞體多疾閉閤臥理而百姓化其德劫盜皆奔出境又曰伏𣈶為永陽內史在郡清潔政務安靜郡人何貞秀等一百五十四人詣州言狀湘, WYG: 益}
