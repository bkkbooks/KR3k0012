  - {type: variant, offset: 2460, length: 1, content: 侮, SBCK: 父停十餘日臨歸質賜絹一疋爲道粮威跪拜曰大人清髙不審安得此質曰吾俸禄之餘故以爲汝粮耳又曰晉武嘗問威曰卿清孰與卿父淸威曰臣不如也帝曰何以爲不如威曰臣父清畏人知之臣清畏人不知陸機晉武紀曰王濬之在巴郡也夢懸四刀於其上甚惡之璿主簿李毅拜賀曰三刀爲州而見益一明府其臨益州乎濬果爲益州刺史晉中興書曰荀羡字令則爲徐州刺史時年二十中興方伯未有如羡少者梁書曰夏侯詳遷湘州刺史詳善吏事在州四載爲百姓所稱州城南臨水有峻峯舊傳云刺史登此山輙代是山歷政莫敢至詳於其地起臺榭延僚屬以表損揖之志三國典略曰梁太祖制以南汾州刺史韋孝寛爲雍州刺史先是路側一里置一土堠經雨頽毀毎湏修􅀘孝寛臨州乃勒部内當土堆之處植樹以代之旣免修復之勞旋又得庇䕃太祖後見之恠而問焉人以狀對太祖嘉之豈得一州獨尓當令天下同之於是令諸州夾道一里種一樹十里種二樹百里五樹焉又曰梁蕭恪字敬則南平元襄王偉之子也􅀄恪爲雍州刺史賔客有江}
