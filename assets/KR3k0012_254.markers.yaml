  - {type: variant, offset: 1356, length: 153, content: 名譽其年時舊比多歷郡守唯暢陵遲自首末齒而佐下藩遂蹈碎濁於暢名實居之為劇前後未始有此愚以為宜解舉試以近縣詔暢既為是人所稱便差代郡參軍晉書曰阮子避亂渡江元帝以為安東參軍蓬髮飲酒不以王務縈心北史曰盧文偉少孤有志尚頗涉經史年三十八始舉秀才除本州平北府流參軍說刺史裴攜案舊迹脩督冗陂溉田萬頃人賴其利晉劉弘教曰太康以來, SBCK: 功徴還京師熲乗車介士鼓吹曲盖朱旗􅀐馬殷}
