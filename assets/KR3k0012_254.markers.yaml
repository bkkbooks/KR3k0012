  - {type: variant, offset: 2457, length: 1, content: 魯, SBCK: 蘇武不失其節前史以爲羙談此節天朝所假義不相與自可遣兵取之機慙而止又曰石苞爲徐州刺史文帝之敗於東􅀜也苞獨全軍而退帝指所持節謂苞曰恨不以此付卿晉陽春秋云胡質爲荆州刺史子威自洛陽至荆州}
