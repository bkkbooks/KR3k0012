  - {type: variant, offset: 2495, length: 1, content: 南, SBCK: 隂王子修義字壽安渉獵書傳髙才爲髙祖所知除右將軍齊州刺史修義以齊州頻䘮刺史累表固辭詔曰脩短有命吉凶由人何過致憂憚以乖維城之􅀉違凶就吉時亦有之可聽更正廨宇修義於是移治東城又曰畢終敬父子相代爲夲州當丗榮之時終敬以老還郷常呼其子元賔爲史君毎於元賔聽政之時與出元賔所先遣左右勑不聽起觀其斷决忻忻然喜見顔色又曰邢巒征梁漢諸郡之民相継而至遂平漢中詔曰巒至彼有以懷和附衆髙下品第可依義陽都督之格也拜巒西安梁􅁗州刺史}
  - {type: variant, offset: 2495, length: 1, content: 南, WYG: 隂王子修義字壽安涉獵書𫝊髙才為髙祖所知除右將軍齊州刺史修義以齊州頻喪刺史累表固辭詔曰修短有命吉㓙由人何過致憂憚以乖維城之寄違㓙就吉時亦有之可聽更立廨宇修義於是移治東城又曰畢終敬父子相代為本州當世榮之時終敬以老還鄉常呼其子元賔為使君每於元賔聽政之時輿出元賔所先遣左右勑不聽起觀其斷决忻忻然喜見顔色又曰邢蠻征梁漢諸郡之民相繼而至遂平漢中詔曰蠻至彼有以懐和附衆髙下品第可依義陽都督之格也拜蠻西案梁秦州刺史}
  - {type: page-break, offset: 2495, content: '', id: KR3k0012_WYG_254-7b, image: WYG0895/WYG0895-0300d.png}
