  - {type: variant, offset: 2495, length: 1, content: 南, krp: 隂王子修義字壽安渉獵書傳髙才爲髙祖所知除右將軍齊州刺史修義以齊州頻䘮刺史累表固辭詔曰脩短有命吉凶由人何過致憂憚以乖維城之寄違凶就吉時亦有之可聽更正廨宇修義於是移治東城又曰畢終敬父子相代爲夲州當丗榮之時終敬以老還郷常呼其子元賔爲史君毎於元賔聽政之時與出元賔所先遣左右勑不聽起觀其斷决忻忻然喜見顔色又曰邢巒征梁漢諸郡之民相継而至遂平漢中詔曰巒至彼有以懷和附衆髙下品第可依義陽都督之格也拜巒西安梁秦州刺史}
  - {type: page-break, offset: 2496, content: '', id: KR3k0012_SBCK_254-5a}
  - {type: variant, offset: 2497, length: 3, content: 部督郵, SBCK: 齊書曰張亮武定􅀄拜太中大夫薛琡甞夢亮於山上挂􅁝以告亮旦占之曰山上􅁝幽字也君其爲幽州乎數曰亮出爲幽州刺史北史曰齊平鑒爲楊州刺史其妻生男鑒因喜飲醉擅免境内囚誤免􅀜中細作二人醒而知之上表自劾文宣原其罪賜牛羊酒令作樂又曰慕容三藏爲郭州刺史州界連雲山響稱萬年者三詔頒郡國仍遣使醮山所其日景雲浮於上雉􅇠馴壇側使還以聞上大恱後周書曰蘇亮出爲􅄮州刺史朝廷以其牧夲州特給路車皷吹先還其宅并給􅀐士三千列羽儀逰郷黨經過故人歡飲旬日然後入州世以爲榮又曰獨孤信爲􅁗州刺史甞因獵日暮馳入城其帽微側詰旦而更人有戴帽者咸慕信而側帽焉其爲隣境及士庶所重如此又曰劉雄字猛雀髙祖甞從容謂雄曰古人云冨貴不歸故郷猶衣錦夜遊今以卿爲夲州何如雄稽首拜謝於是詔以雄爲河州刺史雄先巳爲夲縣令復有此授鄉里榮之又曰史寜爲涼州刺史遣使詣太祖請事太祖即以所服冠履衣􅀍及弓箭甲矟等賜寧謂其使人曰爲我謝涼州孤解衣以衣公推心以委公公其善始令終無損功名也又曰長孫儉爲荆州刺史時梁岳陽王蕭􅊫内附􅀄遣使入朝至荆州儉於㕔事列軍儀具戎服與使人以賔主禮相見儉容貌魁偉音聲如鍾大爲鮮卑語遣人傳譯以問客客惶恐不敢仰視日晚儉乃著裙􅃭紗帽引客宴於別齋因序梁國喪亂朝廷招携之意發言可觀使人大恱出曰吾所不能測也三國典略曰周陸逞字季明甞爲冝州刺史故事刺史奉辭例備鹵簿逞以時屬農要奏請停之制曰逞雖未臨人巳存優恤冝遂所請彰其雅操又曰周帝制於玉璧置勲州以孝寛爲刺史爲其立勲於此因以名之又曰賀抜岳引軍}
  - {type: page-break, offset: 2497, content: '', id: KR3k0012_SBCK_254-5b}
  - {type: page-break, offset: 2497, content: '', id: KR3k0012_SBCK_254-6a}
  - {type: variant, offset: 2497, length: 3, content: 部督郵, WYG: 齊書曰張亮武定初拜太中大夫薛琡嘗夢亮於山上挂絲以告亮占之曰山上絲幽字也君其為幽州乎數日亮出為幽州刺史北史曰齊平鑒為揚州刺史其妻生男鑒因喜飲醉擅免境内誤免闗中細作二人醒而知之上表自劾文宣原其罪賜牛羊酒令作樂又曰慕容三藏為郭州刺史州界連雲山響稱萬年者三詔頒郡國仍遣使山所其日景雲浮於上雉兎馴壇側使還以聞上大悦後周書曰蘇亮出為岐州刺史朝廷以其牧本州特給路車鼔吹先還其宅并給騎士三千列羽儀遊鄉黨經過故人歡飲旬日然後入州世以為榮又曰獨孤信為秦州刺史嘗因臘日暮馳入城其㡌㣲側詰旦而吏人有戴㡌者咸慕信而側焉其為隣境及士庻所重如此又曰劉雄字猛雀髙祖嘗從容謂雄曰古人云富貴不歸故鄉猶衣錦夜遊今以卿為本州何如雄稽首拜謝於是詔以雄為河州刺史雄先已為本縣今復有此授鄉里榮之又曰史寧為凉州刺史遣使詣太祖請事太祖即以所服冠履衣被及弓箭甲矟等賜寧謂其使人曰為我謝凉州孤解衣以衣公推心以委公公其善始令終無損公名也又曰長孫儉為荆州刺史時梁岳陽王蕭詧内附初遣使入朝至荆州儉於㕔事列軍儀具戎服與使人以賔主禮相見儉容貌魁偉聲音如鐘大為鮮卑語遣人𫝊譯以問客惶恐不敢仰視日晩儉乃着裙襦紗㡌引客宴於别齋因序梁國䘮亂朝廷招擕之意發言可觀使人大悦出曰吾所不能測也三國典畧曰周陸逞字季明嘗為宜州刺史故事刺史奉辭例備鹵簿逞以時屬農要表請停之制曰逞雖未臨人已存優䘏宜遂所請彰其雅操又曰周帝制於玉壁置勲州以孝寛為刺史為其立勲於此因以名之又曰賀拔岳引軍}
