  - {type: variant, offset: 4164, length: 9, content: 賢豈能領師徒授業至, WYG: 古者有姑布子卿今世之梁有唐舉相人也狀顔色而知其吉凶世俗稱之相形不}
  - {type: punctuation, offset: 4172, content: ，, id: KR3k0012_CHANT_731-bkkpn1146}
  - {type: 'tls:seg', offset: 4172, content: '', id: KR3k0012_CHANT_731-44a.19}
  - {type: variant, offset: 4173, length: 0, content: '', krp: 其年末靜惠王薨及昭明入朝又云必無嗣立之相俄而昭明薨孫卿子日古者有姑布子卿今世之梁有唐舉相人形狀顔色而知其吉凶世俗稱之相形不}
  - {type: variant, offset: 4174, length: 2, content: 忠孝, WYG: 論心論心不如擇術形不勝心心不勝術術正而心從}
  - {type: variant, offset: 4174, length: 2, content: 忠孝, krp: 論心論心不如擇術形不勝心心不勝術術正而心從}
  - {type: variant, offset: 4177, length: 3, content: 道實銘, WYG: 則形相惡無害為君子也形相雖善而心術惡無害為小人荀子曰楚成王生太子啇臣乃召楚之善相者相之楚巫相之已而言}
  - {type: variant, offset: 4177, length: 4, content: 道實銘於, krp: 則形相惡無害爲君子也形相雖善而}
