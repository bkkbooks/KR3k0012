  - {type: variant, offset: 4182, length: 13, content: 問者慚服又曰牛弘初在繈褓有, krp: 術惡無害為小人符子日楚成王生太子商臣乃召楚之善}
  - {type: page-break, offset: 4183, content: '', id: KR3k0012_WYG_731-10b, image: WYG0899/WYG0899-0456b.png}
  - {type: variant, offset: 4184, length: 2, content: 慚服, WYG: 食母而飛非其子之不吉但其母為之災今太子非子之不吉但其王為之災耳楚王怒而殺之論衡曰世人固有身􅇤而志立體小而名髙者於聖則否是以堯眉八采舜目重瞳禹耳參漏文王四乳然則世亦有四乳者此則駑馬一毛似􅂹耳}
