  - {type: variant, offset: 3228, length: 1, content: 府, WYG: 子中允韋挺隋末與隱太子友善後太子引以為率至武德六年俱配流嶲州淹等至益州見天綱曰袁公洛邑之言則信矣未知今日之後何如天綱曰公等骨法大勝往時終當俱受榮貴至九年被召入京共造天綱天綱謂松公曰當即得三品要職年壽非天綱所知王韋兩公在後當得三品者兼有年壽然晚途皆不稱惬韋公尤甚淹至京拜御史大夫檢校吏部尚書王珪尋授侍中出為同州刺史韋挺歴御史大夫太常}
