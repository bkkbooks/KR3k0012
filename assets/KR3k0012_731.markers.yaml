  - {type: variant, offset: 1378, length: 723, content: 將還餞送者五十餘人別於渭北有相者扶風人王伯達曰諸君皆不如此廬郎雖位不副實然德聲甚威望踰公輔後二十餘年當制命關右願不相忘此行也相者年過八十詣軍門請見言敘平生南史曰梁元帝初從劉景授相術因訊以年荅曰未至五十當有小厄禳之可免帝曰茍有期會禳之何益及四十七為魏所滅崔鴻十六國春秋後趙錄曰石勒東至平原賣與荏平人師懽為奴有一老父謂勒曰君龍角髮際上四道已成當貴為人主甲戌之歲王彭祖可圖勒曰若如公言不敢忘德忽然不見又曰張秀字文伯羌渠部人也頗曉相法常謂石虎曰明公之相非人臣骨虎掩其口曰君勿妄言族吾父子又南燕錄曰慕容德年十八身長八尺二寸姿貌雄異額上有日月兩角足下有偃月重文太史公黃泓善相謂德曰殿下相法當先為人臣然後為人君但恐下官入地不見殿下昇天耳德拜范陽王建元年即帝位又前涼錄曰況瑗與同郡陳琠他典反宗配遇相者於路相者曰三人皆二千石封然況瑗腹有逆毛當兵死無後北齊書曰房豹遷侍御史王思敬入據頴川隨慕容紹宗出討乃為紹宗開府主簿兼行臺郎中紹宗自云有水厄遂於戰艦中浴并自投於水中冀以厭當之豹謂紹宗曰夫命也在天豈人理所能延公若實有災厄非禳避所免若其實無何禳之有今三軍之事在於明公唯應達命任理以保之元吉未幾而紹宗遇溺死又曰慕容顯時幼見一沙門指之曰此郎子有好相表大必為良將貴極人臣語終失僧莫知所在後累遷特進驃騎大將軍封定陽王又曰尉瑾為聘梁使人陳昭善相謂瑾曰二十年後當為宰相瑾出昭謂人曰此公為宰相後不過三年當死昭後為陳後主兼散騎常侍至齊瑾時兼右僕射鳴騶鐃吹昭復謂人曰二年當死果如言焉又曰廬潛陷陳時李騊駼將逃歸并要潛潛曰我此頭面何可誑人吾少時相者云沒在吳越死生已定弟其行也因寄書與弟士邃曰吾夢汝以其日得患某月某日漸損皆如其言既而歎曰壽陽陷吾以頸血湔城而死佛教不聽自殺故荏苒偷生今可死矣於是閉, SBCK: 紫}
