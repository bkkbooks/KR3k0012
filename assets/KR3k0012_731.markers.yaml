  - {type: variant, offset: 4041, length: 0, content: '', SBCK: 公等並至淸望官那得云無官揆允以實對梁鳳遣二人行謂揆日公從舎人卽入相一年內事謂允日公好卽是吏部郞中及尅復兩亰揆自中書舎人知吏部侍郎事入爲中書侍郎平章事乃以允爲吏部郞中其驗多此􅀋佯聾以自晦}
  - {type: page-break, offset: 4041, content: '', id: KR3k0012_SBCK_731-5b}
  - {type: variant, offset: 4041, length: 5, content: 後四五當大, WYG: 公等並至清望}
  - {type: variant, offset: 4041, length: 5, content: 後四五當大, krp: 公等並至淸望}
  - {type: variant, offset: 4042, length: 0, content: '', SBCK: 冕爲右僕射兼御史大夫成都尹劒南節度使有進止令將梁鳳行後病卒後周史日周􅀇豹者本鄴人少爲僧其師有知人之鑑從遊十餘年苦辛無憚師知其可教遂傳其祕旨旣長還歸俗盧程寄􅄄嘗遊于燕與同志二人謁焉􅀇豹退謂鄉人張殷衮日適二君子眀年花發俱爲故人唯彼道士他年甚貴來歲二子果零落於趙魏閒又二十年程登庸於鄴下周書日師曠見太子晉日汝聲淸浮汝色赤火色不壽王子日後三年上賔於帝所汝愼母言殃將及汝師曠歸未及三年吿死者至孔叢子日魏安釐王問子順日馬回之爲人雖少文鯁亮直有丈夫大節也吾欲以爲相可乎荅日知臣莫若君何有不可至於亮直之節臣未明也聞諸孫􅀸其爲人也長目而豕視者必體方而心員毎以其法相人千百不失臣見回然甚疑其目王卒用之三月果詐得罪金樓子日宜脩容善許􅀒之術曾正㑹登樓還語人日太尉今年必當不濟時靜惠王尙康勝或以爲不然日行步向前氣韻殊下若其不尓不復言相至其年末靜惠王薨及昭明入朝又云必無嗣立之相俄而昭明薨孫􅀸子日古者有姑布子􅀸今世之梁有唐舉相人形狀顔色而知其吉凶世俗稱之相形不如論心論心不如擇術形不勝心心不勝術術正而心從之則形相惡無害爲君子也形相雖善而心術惡無害為小人符子日楚成王生太子商臣乃召楚之善相者相之楚巫相之巳而言於楚王日子吉矣而王不吉臣聞鴟裊者食母而飛非其子之不吉但其母爲之災今太子非子之不吉伹其王爲之災耳楚王怒而殺之論衡日世人固有身瘠而志立體小而名髙者於聖則否是以堯眉八采舜目重瞳禹耳參漏文王}
  - {type: page-break, offset: 4042, content: '', id: KR3k0012_SBCK_731-6a}
  - {type: page-break, offset: 4042, content: '', id: KR3k0012_SBCK_731-6b}
  - {type: variant, offset: 4043, length: 6, content: 五當大官人初, SBCK: 乳然則世亦有四乳者此則駑馬一毛似􅂹耳又日宋臣有公孫吕者長七尺而長三尺廣三寸名震天下若此之狀蓋遠代而求非一世之異也使形殊於外道合其中名震天下不亦冝乎語云無愛而戚憂必及之無慶而歡樂必還之此心有先動而神有先知則色有先見也故扁鵲見􅁊公知其將亡申叔見巫臣知其竊妻而逃也荀子以爲天}
