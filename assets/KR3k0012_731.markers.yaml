  - {type: variant, offset: 4054, length: 8, content: 至開皇十五年五月, SBCK: 周公有風雷之災宋景有三次之福知人事乎則楚昭有弗榮之應邾文無延期之報由是言之則天道之與相占可知}
  - {type: page-break, offset: 4054, content: '', id: KR3k0012_SBCK_731-7a}
  - {type: variant, offset: 4063, length: 218, content: 終人間其故和曰十五年為三五加以五月為四五大官槨也和言多此類著相經四十卷北史曰李賢幼有志節不妄舉動常出遊逢一老人鬚眉皎白謂曰我年八十觀士多矣未有如卿卿必為台牧努力勉之九歲從師受業略觀大指而已或議其不精荅曰賢豈能領師徒授業至如忠孝之道實銘於心問者慚服又曰牛弘初在繈褓有相者見之謂其父曰此兒當貴善愛養之及長鬢皃甚偉性寬裕好學博聞又曰隋齊王暕妃早卒遂與妃姊元氏婦通生一女外人皆不得知陰引喬令則於第內宴召相工遍視後庭相工指妃姊曰此產子者當為皇后貴, SBCK: 疑}
