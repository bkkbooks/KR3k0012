  - {type: variant, offset: 3850, length: 0, content: '', SBCK: 韋兩公在後當得三品官兼有年壽然晚途皆不稱愜韋公尢甚淹至京拜御史大夫撿校吏部尚書王珪尋授侍中岀爲同州刺史韋挺厯御史大夫大常􅀸貶授象州刺史皆如天綱之言大業末竇軌客遊德陽嘗求問天綱天綱謂日君額上伏犀貫玉枕輔角又成必於梁益州大樹功業武德初􅁤爲益州行臺僕射引天綱深禮之天綱又謂􅁤日骨法成就不異往時之言然目氣赤脉貫瞳子語則赤氣浮面如爲將軍恐多殺人願深自誡愼武德九年軌坐事被徵􅀅赴京謂天綱日更得何官日面上家人坐仍未見動輔􅊁右畔光澤更有喜色至京必承恩還來此任其年果重授益州都督貞觀八年太宗聞其名召至九成宮時中書舎人岑文本令視之天綱日舎人學堂成就}
