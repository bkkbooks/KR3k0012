  - {type: variant, offset: 3846, length: 1, content: 和, SBCK: 令天綱相之見元慶元爽日此二子皆保家之主官可至三品見韓國夫人日此女亦大貴然不利其夫乳母時抱則天衣男子之服天綱日此郞君子神形爽徹不易可知試令行看於是步於牀前仍令舉目天綱大驚日龍晴鳳頸貴人之極也更轉側視之日若是女後當爲天下之主也又日乙拂弘禮善占相初泗州刺史薛大鼎隋時嘗坐事没爲奴貞觀初與數人詣弘禮次至大鼎日君奴也欲何所相咸日何以知之弘禮日觀其頭目眞是賊人但不知餘處何如耳大鼎有慙色乃解衣視之弘禮日看面不異前言占君自腰巳下當為方岳之任其占相皆此􅀋也貞觀末卒焉又日袁天綱成都人也尢工相術以大業元年至洛陽時杜淹王珪韋挺就之相天綱謂淹日公蘭臺成就學堂寛愽必得親糺察之官以文藻見知謂王日公三亭成就天地相臨從今十年巳外必得五品要職謂韋日公面似大獸之面交友極誠必得士友攜接初為武職復語淹等二十年外終恐三賢同被責黜暫去即還淹尋遷侍御史武德中爲天策府兵曹文學館學士王珪爲太子中允韋挺隋末與隱太子友善後太子引以爲率至武德六年俱配流嶲州淹等至益州見天綱日袁公洛邑之言則信矣未知今日之後何如天綱日公等骨法大勝往時終當俱受榮貴至九年􅀍召入京共造天綱天綱謂杜公}
