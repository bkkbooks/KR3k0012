  - {type: variant, offset: 3024, length: 6, content: 但恨其壽不足, WYG: 頓異昔時勿忘鄙言願深自愛髙祖心益自負又曰隋尚食奉御郭𢎞道字大寳𢎞農華陰人也性寛厚如愚而内敏仕隋歴通事舍人滄州長史煬帝時徵為奉御時髙祖為殿内少監深善之亟相往來情契愈昵𢎞道善相因言曰公天庭伏犀下接於眉此非人臣之相願深自愛髙祖取𢎞道銀盆置之於地引弓射之謂𢎞道曰倘言有驗當一發中之既發應弦而中𢎞道曰願公事驗之後賜賞金盆髙祖大悅又曰太宗年四嵗時忽有書生自言善相詣髙祖門曰公是貴人有大貴子因目太宗曰龍鳯之姿天日之表也公之貴}
