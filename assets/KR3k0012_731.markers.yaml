  - {type: variant, offset: 6, length: 185, content: 中宋書高帝紀曰晉陵人韋叟善相術桓脩令相帝當得州不叟曰當得邊州剌史退而私於帝曰君相貴不可言帝笑曰若相中當用為司馬至是叟謂帝曰成王不負桐葉之信公亦應不忘司馬之言然不敢希鎮軍司馬願得領軍佐於是用焉又曰初桓玄篡位遷晉帝於尋陽桓循入朝高祖從至建業玄見高祖謂司徒王謐曰昨見劉裕其風骨不恒蓋人傑也每遊集贈賜甚厚玄妻劉氏尚書令躭之女也聰明有智鑒嘗見帝因謂玄曰劉裕龍行虎步瞻視不凡恐不為人, WYG: ''}
