  - {type: variant, offset: 3945, length: 9, content: 朕於卿無所愛惜但卿, WYG: 𤣥象有變半年間有兵起郎中此時當得中丞不拜中丞即得宰相不離天子左右大富貴冕曰公乃狂言冕何至此梁鳯曰有一日向東京一日入蜀川一日來朔方此時公得相冕懼其言深謝絶之其後安禄山反南犯洛陽僣稱偽位哥舒翰東守潼闗累月奏冕為御史中丞追赴京梁鳯告曰事驗矣冕又問三日之兆梁鳯曰東京日即自磨滅蜀川日亦不能久此間日何轉分明不可說冕志之及潼關失守𤣥宗幸蜀肅宗北如靈武冕為之勸成策正改元為至德元年冕果為中書侍郎平章事冕奏之肅宗召拜都水使者梁鳯在河隴謂吕諲曰判官}
