  - {type: variant, offset: 3703, length: 0, content: '', SBCK: 之相願深自愛高祖取弘道銀盆置之於地引弓射之謂弘道曰向言有驗當一發中之旣發應弦而中弘道曰願公事驗之後賜償金盆髙祖大恱又曰太宗年四歲時忽有書生自言善相詣高祖門日公是貴人有大貴子因目太宗曰龍鳯之姿天日之表也公之貴以此兒後必由之而創功業年將二十必能濟世安民高祖聞其言甚懼及書生辭出使人捕欲殺之以滅口而不知所在髙祖以爲神隂採濟世安民之義遂以名焉又曰乙弗弘禮貝州高唐人也隋煬}
