  - {type: variant, offset: 1024, length: 352, content: 指僧珍曰此有奇聲封侯相也後隨武帝起義平東昏封平固侯南兗州剌史後魏書曰李訢字元盛訢母賤為諸兄所輕父崇曰此子相者言貴吾每觀察或未可知遂使入都為中書學生世祖幸中書學見而異之謂從者曰此小兒終効用於朕之子孫矣目識眄之世祖舅陽平王杜超有女將許貴戚世祖聞之謂超曰李訢後必官達益人門戶可以女妻之遂勸成婚南人李哲嘗言訢必當貴達杜超之死也世祖親哭三日訢以超婚得在喪位出入帝目而指之謂左右觀此人舉動豈不有異於眾必為朕家幹事之臣又曰寇讚字奉國上谷人嘗從相者唐文相曰君額上黑子入幘位當方伯封公及為上谷太守文以百姓禮拜謁文曰明公憶疇昔言乎爾日伹知公當貴不知得為州人讚曰往時卿言社瓊不得官人威謂不然後瓊得盭屋令卿猶言相中不見而瓊未拜果暴終昔魏舒見主兒死自知己必至三公吾恒以卿言瓊之驗亦復不息此望也又曰廬淵出鎮關右詔兼侍中初淵年十四嘗詣, SBCK: ''}
