  - {type: variant, offset: 484, length: 539, content: 羨之拜此人汝曰有貴相而有大厄宜以錢二十八文埋宅四角可以免災過此可位極人臣後羨之隨親之縣內嘗暫出而賊自後破縣縣內人無免者雞犬亦盡唯羨之在外獲全齊書曰太祖初為建康令有能名少府蕭惠開雅有知人鑒謂人曰昔魏武為洛陽北部人服其英今看蕭建康但當過之耳又曰張欣泰少時有人相當得三公而年纔三十後屋瓦墜傷額又問相者云無復公相年壽可更增亦可得方伯之任耳後為剌史年三十六卒又曰曹武雖武士頗有知人之鑒性儉嗇無所餉遺獨餉梁武謂曰卿必大貴我當不及見今以弱子相託每密遺錢物并好馬時帝在戎多乏就武換借未嘗不得遂至十七萬又曰明帝體上有赤誌常祕不言既而江祐勸帝出以示人晉壽陽太守王洪軌罷任還上祖示之曰皆謂此是日月相卿幸無泄軌曰公日月在軀如何可隱輒當言之公卿上大悅梁書曰梁武帝初為衛軍王儉東閣祭酒儉一見深相器異請為戶曹屬謂廬江何憲曰此蕭郎三十內當作侍中出此則貴不可言又曰梁武帝遷隋王鎮西諮議參軍行經牛渚逢風入泊龍瀆有一老人謂帝曰君龍行虎步相不可言天下將亂安之者其在君乎問其名氏忽然不見又曰梁武帝初為司州剌史有沙門自稱僧惲謂帝曰君頂有伏龍非人臣也復求莫知所之又曰武帝起兵時呂僧珍一夜忽頭痛壯熱及明而顙骨益大其骨法蓋有異焉又嘗語親舊曰吾昔在蒙縣熱病發黃時必謂不濟主上見卿有富貴相必當不死俄而果愈又僧珍童兒時從學有相工歷觀諸, WYG: ''}
