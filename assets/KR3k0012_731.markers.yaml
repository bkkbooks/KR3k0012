  - {type: punctuation, offset: 4194, content: ，, id: KR3k0012_CHANT_731-bkkpn1154}
  - {type: 'tls:seg', offset: 4194, content: '', id: KR3k0012_CHANT_731-45a.4}
  - {type: variant, offset: 4195, length: 0, content: '', WYG: 公孫吕者長七尺面長三尺廣三寸名震天下若此之狀盖逺代而求非一世之異也使形殊於外道合其中名震天下不亦宜乎語云無憂而戚憂必及之無慶而歡樂必還之此心有先動而神有先知則色有先見也故扁鵲見桓公知其將亡申叔見巫臣知其竊妻而逃也苟子以為天不知人事邪則周公有風雷之災宋景有三次之福知人事乎則楚昭有弗禜之應荀文無延期之報由是言之則天道之與}
  - {type: page-break, offset: 4195, content: '', id: KR3k0012_WYG_731-11a, image: WYG0899/WYG0899-0456c.png}
  - {type: variant, offset: 4196, length: 53, content: 者見之謂其父曰此兒當貴善愛養之及長鬢皃甚偉性寬裕好學博聞又曰隋齊王暕妃早卒遂與妃姊元氏婦通生一女外人皆不得, WYG: 占可}
  - {type: variant, offset: 4197, length: 0, content: '', krp: 相之楚巫相之巳而言於楚王日子吉矣而王不吉臣聞鴟裊者食母而飛非其子之不吉但其母爲之災今太子非子之不吉伹其王爲之災耳楚王怒而殺之論衡日世人固有身瘠而志立體小而名髙者於聖則否是以堯眉八采舜目重瞳禹耳參漏文王四乳然則世亦有四乳者此則駑馬一毛似驥耳又日宋臣有公孫吕者長七尺而長三尺廣三寸名震天下若此之狀蓋遠代而求非一世之異也使形殊於外道合其中名震天下不亦冝乎語云無愛而戚憂必及之無慶而歡樂必還之此心有先動而神有先知則色有先}
  - {type: variant, offset: 4198, length: 0, content: '', krp: 也故扁鵲見桓公知其將亡申叔見巫臣知其竊妻而逃也荀子以爲天不知人事邪則周公有風雷}
