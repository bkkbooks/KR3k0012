  - {type: variant, offset: 4106, length: 0, content: '', WYG: 二人謁焉𤣥豹退謂鄉人張殷衮曰適二君子明年花發俱為故人唯彼道士他年甚貴來嵗二子果零落於趙魏間又二十年程登庸於鄴下周書曰師曠見太子晉曰汝聲清浮汝赤火色主不夀王子曰後三年上賔於帝所汝慎母謹殃將及汝師曠歸未及三年告死者至孔叢子曰魏安釐王問子順曰馬囘之為人雖少文梗梗亮直有大丈夫}
