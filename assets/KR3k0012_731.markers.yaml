  - {type: variant, offset: 2434, length: 540, content: 鱗身重踝瞻視審定不好戲弄深沈有大度晉陽有沙門乍愚乍智時人不測呼為阿禿師婁后見其諸子歷問祿位至文宣再三舉手指天而己口無所言見者異之又曰梁宣豐侯脩參軍陳晃善相人脩因法會將晃自隨令相簡文有天下否晃言簡文九州骨成必踐帝位而地部過弱非但王畿蹙侵兼恐不得善終又曰東魏御史賈子儒善相太常卿崔暹私引子儒潛觀齊王儒曰人有七尺之形不如一尺之面一尺之面不如一寸之眼大將軍臉薄顧速非帝王相也皇甫玉又竊觀王於道曰此不作物會是垂洟者垂洟者謂太原公洋又曰齊高歸彥嘗令皇甫玉相己玉曰公位極人臣必可反歸彥曰我為何須反玉曰公有反骨又曰周王軌以隋公楊堅相表殊異因入侍讌陽醉撥去堅帽言曰是何物頭額帝謂之雖大而卻無所至也皇甫后見堅又舉手自拍其額帝謂堅曰皇后道公額也帝乃密使來和相堅和詭對曰堅相貌是守節忠臣宜作揔管大將作揔管則能靜肅一方作大將則能全軍破敵陳書曰長沙王叔堅母本吳中酒家婢相者言當生貴子宣帝微時因飲通焉生叔堅及即位召拜淑儀又曰章昭達字伯通少時遇相者謂曰卿容貌甚善須少虧則當富貴梁大司中昭達為東宮直後因醉墮馬鬢角小傷昭達喜之相者曰未也侯景之亂昭達率鄉人援臺城為流失所中眇其目相者見曰卿相善矣不久當貴後還鄉里與陳文帝遊因結君臣之分以功進位司空後周書曰太祖身長八尺方顙廣額美鬢髯長至委地垂手過膝皆有黑子宛轉若龍盤之形面, SBCK: ''}
