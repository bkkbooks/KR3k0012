  - {type: variant, offset: 2102, length: 270, content: 而絕其家購屍歸葬又曰遼西段長太原龐倉鷹俱有先知之監長為魏懷朔鎮將見高祖甚異之謂高祖云君有康世之才終不徒然也請以子孫為託興和中啟贈司空公子寧相府從事中郎天祿初兼南中郎將倉鷹交遊豪俠厚待賓旅居於州城高祖客其舍初居處於蝸牛盧中倉鷹母數見廬上赤氣屬天倉鷹亦知高祖有霸王之相每私加敬割其宅半以奉高祖由此遂蒙親識三國典略曰高澄嗣渤海王朝於鄴時有吳士目盲而妙於聲相王使試之聞劉桃桃板之聲曰有所繫屬當大富貴王侯將相多死於其手譬如鷹犬為人所使聞趙道德之聲曰亦繫屬人聞太原公之聲曰當為人主聞王之聲崔暹私稱之謬曰亦國主也曰我家群奴猶當極貴況吾身也又日齊文宣字子進, SBCK: 充庭}
