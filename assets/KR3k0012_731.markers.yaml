  - {type: variant, offset: 3041, length: 159, content: 馮翊波若寺紫氣充庭有尼來自河東謂皇妣曰此兒所從來甚異不可俗閒處之尼將高祖舍於別館躬自撫養皇妣嘗抱高祖忽見頭上角出遍體鱗起皇妣大駭墜高祖於地尼自外入見曰已驚我兒致令晚得天下為人龍顏額有五柱八頂目光外射有文在手曰王長上短下沉深嚴重又高曰祖在周明帝即位授右小官伯進封大興郡公帝嘗遣善相者趙照視之照詭對曰不過作柱國耳既而陰謂高, SBCK: 髙}
