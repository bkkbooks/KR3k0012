  - {type: variant, offset: 4092, length: 1, content: 著, krp: 佯聾以自晦後冕爲右僕射兼御史大夫成都尹劒南節度使有進止令將梁鳳行後病卒後周史日周玄豹者本鄴人少爲僧其師有知人之鑑從遊十餘年苦辛無憚師知其可教遂傳其祕旨旣長還歸俗盧程寄褐嘗遊于燕與同志二人謁焉玄豹退謂鄉人張殷衮日適二君子眀年花發俱爲故人唯彼道士他年甚貴來歲二子果零落於趙魏閒又二十年程登庸於鄴下周書日師曠見太子晉日汝聲淸浮汝色赤火色不壽王子日後三年上賔於帝所汝愼母言殃將及汝師曠歸未及三年吿死者至孔叢子日魏安釐王問子順日馬回之爲人雖少文鯁亮直有丈夫大節也吾欲以爲}
