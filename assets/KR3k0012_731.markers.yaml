  - {type: variant, offset: 3222, length: 0, content: '', WYG: 乙弗𢎞禮善占相初泗州刺史薛大鼎隋時當坐事没為奴貞觀初與數人詣𢎞禮次至大鼎曰君奴也欲何所相咸曰何以知之𢎞禮曰觀其頭目真是賤人但不知餘處何如耳大鼎有慙色乃解衣視之𢎞禮曰看面不異前言占君自腰已下當為方岳之任其占相皆此類也貞觀末卒焉又曰袁天綱成都人也尤工相術以大業元年至洛陽時杜淹王珪}
  - {type: page-break, offset: 3222, content: '', id: KR3k0012_WYG_731-3b, image: WYG0899/WYG0899-0452d.png}
  - {type: variant, offset: 3223, length: 3, content: 鼎仕梁, WYG: 挺就之相天綱謂淹曰公蘭臺成就學堂寛愽必得親糾察官以文藻見知謂王曰公三亭成就天地相臨從今十年以外必得五品要職謂韋曰公面似大獸之面交友極成必得大友攜接初為武職復語淹等二十年外終恐三賢同被責黜暫去即還淹尋遷侍御史武德中為天䇿府兵曹文學館學士王珪}
  - {type: page-break, offset: 3223, content: '', id: KR3k0012_WYG_731-4a, image: WYG0899/WYG0899-0453a.png}
