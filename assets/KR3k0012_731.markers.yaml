  - {type: variant, offset: 3395, length: 461, content: 貴之日特以為驗晃既射而中高祖撫掌大笑曰此是天意公能感之而中也又曰來和好相術高祖微時來詣和相和待人去私謂高祖曰公當王有四海及為丞相拜儀同既受禪進爵為子開皇末和上表自陳曰臣早奉龍顏自周代天和三年已來數蒙陛下顧問當時具言至尊膺圖受命光宅區宇此乃天授非由人事所及臣無勞効坐致五品二十餘年臣是何人敢不慚懼愚臣不任區區之至謹錄陛下龍潛之時臣有所言一得書之祕府死無所恨昔陛下在周嘗與永富公竇榮之語臣曰我聞有行聲即識其人臣當時即言公眼如曙星無所不照當王有天下願忍誅殺建德四年五月周武帝在雲陽宮謂臣曰諸公皆汝所識隋公相祿何如臣報武帝曰隋公止是守節人可鎮一方若為將領陣無不破臣即於宮東南奏聞陛下謂臣此語不忘明年烏丸軌言於武帝曰隋公非人臣帝尋以問臣臣知帝有疑臣詭報曰是節臣更無異相於時王諠梁彥光等知臣此語大象二年五月至尊從永巷東門入臣在永巷東門北面陛下問臣曰我得無災鄣不臣奏陛下曰骨法氣色相應天命已有付屬未幾遂揔百揆上覽之大悅進位開府賜物五百段米三百石地十頃又曰煬帝在藩時好學善屬文沉深嚴重朝野屬望高祖密令善相者來和遍視諸子和曰晉王眉上雙骨隆起, WYG: ''}
