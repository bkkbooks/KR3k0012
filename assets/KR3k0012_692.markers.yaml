  - {type: variant, offset: 2844, length: 0, content: '', WYG: 武王不閑外門以示無懼去劒搢笏以示無仇後漢書曰陳蕃為光禄勲范滂為主事以公儀詣蕃執板入閤至坐不奪投板振衣而去郭泰責蕃曰以階級言滂宜有敬以類數推之至閤宜省}
