  - {type: punctuation, offset: 2801, content: 》, id: KR3k0012_CHANT_692-bkkpn961}
  - {type: variant, offset: 2801, length: 0, content: '', WYG: 直諌賜以玉玦續漢書曰桓帝永興二年光禄勲史舍壁下有青氣視之得玉鈎玦各一魏氏春秋曰明帝張掖郡金山𤣥川溢涌寳石負圖有玉匣開盖於前上有玉玦二璜一魏略曰太祖征漢中太子在孟津聞鍾繇有玉玦使臨淄侯曹子建也因人説之繇遂送焉太子與繇書曰南陽宗惠叔稱君侯昔有美玦聞之驚喜笑與作㑹當自白書恐傳言未審以是令舍弟子建因荀仲茂時從容喻圖指鄴騎既到寳玦初至捧柙跪發五内震駭䋲窮柙開爛然滿目猥以䝉鄙之姿得覩希世之寳不煩一介之使不損連城之價既有秦昭章臺之觀而無藺生詭奪之誑嘉貺益腆敢不欽承謹奉賦一篇王隠晋書曰禮能使决疑者珮玦故遺其臣亦授之以玦晉受命有二玦其一當魏厯數既終當禪大晋故與之玦凡受命居天子之位皆衆人之所疑以武皇帝能斷决應天順人受曹氏禪而無疑得應珮玦故以賜焉是以有二玦蕭子顯齊書曰太祖在淮隂治城得錫玦大數尺下有篆字人莫識記僧眞曰何須辦文此自乆逺之物即九錫之徵也太祖曰卿勿妄言北齊書曰樂陵王百年傳慱陵人賈德胄教百年嘗作數勅字德胄封以奏帝帝怒召百年百年知不免割帶玦留與妃斛律氏及百年被誅妃把玦哀號不食而死玦猶在手拳不可開其父自擘之乃開白虎通曰能决嫌疑則佩玦瑞應圖曰舜時西王母獻白環玦隋果子曰召人以環䋲人以玦莊子曰儒者受佩玦者事至而斷西京雜記曰趙飛鷰為皇后女弟昭儀上珊瑚玦孟達與諸葛亮書}
