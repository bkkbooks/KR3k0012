  - {type: variant, offset: 2272, length: 0, content: '', SBCK: 桓温秉政謝安王坦之徃􅃸之坦之倒持手板宋書曰建平王宏文帝子也元㐫劭弑立孝武入討劭録宏殿内自抜莫由孝武先甞以一手板於宏遣左右親信周法道齎手板詣孝武事以爲尚書左僕射又曰􅁃道愍尤精相板宋明帝時山陽王休祐屢以言語忤顔見道􅉖託以巳板爲他物令道􅉖占之道􅉖曰此乃甚貴然使人多􅄽忤祐以禇彦同祥宻求換其板他日彦回侍明帝自稱下官帝多忌甚不恱休祐具以􅃺言帝乃意解又曰綦母珎之在西州時有一手板相者云當貴每以此言動帝又圖黄門郎帝嘗問之曰西州時手板何在珎之曰此是黄門手板官何湏問帝大􅀏齊書曰䂊章王嶷薨見形於第居第也後園乗腰輿指麾處分呼直兵直兵無手板左右授一玉手板與之謂曰橘樹一株死可覔􅀘之因出後園閣直兵倒地仍失手板宋書曰明帝起事諸方並舉兵帝謂蔡興宗曰頃日人情言何事當濟不興宗曰今米甚豊賤而人情更安以此論之清蕩可必伹臣之所憂更在事後猶羊公言旣平之後方當勞聖慮耳尚書禇彦回以手板築興宗不巳上曰如卿言北齊書曰尓朱榮旣誅得其手板上有數牒啓皆左右去留人名非其腹心在出限帝曰竪子􅀂過今日便不可制又曰文襄疑文宣佯愚慮其有後變將隂圖之以問崔暹暹曰嘗與二郞俱在行位試以手板柏其背而不瞋乃將犀手板換暹竹者自揩拭而翫視之以是知其實癡不足慮也帝旣鏁暹責其徃昔打背暹自陳所對文襄之言巳功以贖死帝悟曰我免禍乃暹之力釋而勞之唐書曰髙宗欲立武昭儀禇遂良諌不從置笏殿街曰還陛下此笏乃解巾叩頭流血又曰崔滌玄宗時嘗朝夕宫掖出入無間慮有所漏􅂥乃於滌笏上親札愼宻二字以誡之又曰玄宗以張九齡體弱簮笏不勝命置笏囊又曰李絳靣論吐突承瓘用兵無功合從顯責又論承瓘於軍中立聖政碑事不可許上􅀄怒色變絳語不巳詞旨懇切因泣下上察其意乃大開忤拜絳爲中書舎人即命曵去所立碑曰微降言吾不知爲損又面賜絳紫親爲絳擇笏以賜之因謂之曰爾他時勿易此心又曰朱泚盗據宫闕乃遣將韓旻領兵疾趨奉天召叚秀實與之謀議秀實從欲圖之隂􅀃大將劉海賔何明禮等同謀殺泚明日泚召秀實議事秀實勃然而起奪源休笏以擊泚傷額流血海賔等不至秀實遂被害又曰魏謩文宗時爲起居舎人上謂之曰卿家有何舊書詔對曰比多失墜唯簮笏獨存輙令進之鄭覃曰在人不在笏上曰覃不解我意乃此甘棠之義非在笏而巳三禮圖曰士竹笏飾以象骨大夫飾以魚須輿服􅄂事曰古者貴賤皆執笏主書君上之政令有事則搢之於要帶中近代以來唯八座尚書執笏者白筆綴手板頭以紫囊褁之其餘王公卿士但執手板主于敬不執笏亦非記事官也周遷車服雜事曰應仲逺云昔荆軻逐􅁗王其後謁者持匕首以備不虞從此侍官執刀劒漢髙祖偃武脩文始制以手板代焉江表傳曰孫權旣即尊位請㑹百官歸功周瑜􅀄張昭勸迎曹公權不從而周瑜敗之及是昭舉笏欲褒賛功德未及言權曰如張公之計今巳乞食矣昭大慙伏地流汗又曰獻帝嘗見郗慮及少府孔融問融曰鴻䂊慮字鴻䂊何所優長融曰可與適道未可與權慮舉笏曰融昔宰北海政散民流其權安在遂與融㸦相長短穆天子傳曰天子大服冕禕㤇帶搢笏夾佩郭璞注云沃韠也夾佩左右兩偑也奉壁南面立于塞下受何也郭子撗洞􅁳記曰孟歧清河之逸人也年可七百歳語及周􅀄時事如目前歧時侍周公􅂛壇上政以手摩成王之足周公以玉笏與之郡國志曰晉明爲}
