  - {type: variant, offset: 2880, length: 0, content: '', WYG: 損又靣賜絳紫袍親為絳擇笏以賜之因謂之曰爾他時勿易此心又曰朱泚盜據宫闕乃遣将軍韓旻領兵疾趍奉天召叚秀實與之謀議秀實從實欲圖之隂説大将劉海賔}
  - {type: page-break, offset: 2880, content: '', id: KR3k0012_WYG_692-17a, image: WYG0899/WYG0899-0208c.png}
  - {type: variant, offset: 2881, length: 0, content: '', WYG: 明禮等同謀殺泚明日泚召秀實議事秀實勃然而起奪源休笏以擊之泚傷額流血海賔等不至秀實遂被害又曰魏謩文宗時為起居舍人上謂之曰卿家有何舊書詔對曰比多失墜唯簮笏獨存輙令進之鄭覃曰在人不在笏上曰覃不觧我意此乃甘棠之義非在笏而已三禮圖曰士竹笏帥以象骨大夫莭以魚須輿服雜事曰古者貴賤皆執笏圭書君上之政令有事則搢之於腰帶中近代以來唯八座尚書執笏者白筆綴手板頭以紫嚢裹之其餘王公卿士但執手板主于敬不執笏示非記事官也周遷車服雜事曰應仲逺云昔荆軻逐秦王其後謁者持匕首以備不虞從此侍官執刀劍漢髙祖偃武修文始制以手板代焉江表傳曰孫權既即尊位請㑹百官歸功周瑜張昭勸迎曹公權不從而周瑜敗之及是昭舉笏欲褒贊功德未及言權曰如張公之計今已乞食矣昭大慚伏地流汗又曰獻帝嘗見郗慮及少府孔融問融曰鴻豫何所優長融曰可與適道未可與權慮舉笏曰融昔宰北海政散民流其權安在遂與融互相長短穆天子傳曰天子大服冕禕帗帶搢笏夾佩郭璞云帗韠也夾佩左右両佩也奉璧南靣立于寒下受河宗也郭子横洞冥記曰孟岐清河之逸人也年可七百嵗語及周初時事如目前岐時侍周公升壇上岐以手摩成王之足周公以玉笏與之郡國志曰晋明為太子時嘗戯殿前以玉手板摩弄銅蟠螭口手傾溜入螭服中不能出人後見一白䑕出入螭口世説曰王子猷作桓車騎騎兵恭軍桓曰卿在府乆此當相料理初}
