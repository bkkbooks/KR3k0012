  - {type: variant, offset: 2666, length: 136, content: 曰鄧遵破諸羗詔賜遵金剛鮮卑緄帶一具虎頭鞶囊一晉書曰鄧攸祖殷亮直強正為淮南太守夢行水邊見一女子猛獸自後斷其鞶囊占者以為水邊有女汝字也斷鞶囊新虎頭代故虎頭也若不作汝陰當作汝南後為汝南太守曹暪傳曰太祖為人坦易無威重身佩小鞶囊以盛手巾細物鄴中記曰石虎改虎頭鞶囊為龍頭鞶囊楊子法言曰, SBCK: 善刺過}
