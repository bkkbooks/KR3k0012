  - {type: variant, offset: 2845, length: 17, content: 在近北無它異物裁奉織成虎頭綬囊可以, krp: 冝}
  - {type: variant, offset: 2846, length: 1, content: 近, WYG: 西州時有一手板相者云當貴每以此言動帝又圖黄門即帝嘗問之曰西州時手板何在珍之曰此是黄門手板官何須問帝大笑齊書曰豫章王嶷薨見形於第居地也後園乘腰輿指麾處分呼直兵直兵無手板左右授一玉手板與之謂曰橘樹一株死可覔補之因出後園閤直兵倒地仍失手板宋書曰明帝起事諸方並舉兵帝謂蔡興宗曰頃日人情言何事當濟否興宗曰今米直豐賤而人情更安以此籌之清蕩可必但臣之所憂更在事後猶羊公言既平之後方當勞聖慮耳尚書禇彦回以手板築興宗不已上曰如卿言}
