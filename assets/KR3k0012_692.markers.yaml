  - {type: variant, offset: 2845, length: 17, content: 在近北無它異物裁奉織成虎頭綬囊可以, SBCK: 冝}
  - {type: variant, offset: 2845, length: 0, content: '', WYG: 景切吳志曰朱治領吳郡舉孫權為孝亷後權為吳王治每見權常執板交拜板即笏也晉書曰王敦表温嶠為丹陽尹因餞㑹錢鳳自起行酒至鳳未飲嶠偽醉以手板擊鳳幘墜作色曰錢鳳何人温太眞行酒敦不恱兩釋之又曰桓温秉政謝安王坦之往候之坦倒持手板宋書曰建平王𢎞文帝子也元㐫劭弑立孝武入討劭録宏殿内自㧞莫由孝武先嘗以一手板與宏遣左右親信周法道賫手板詣孝武事平以為尚書左僕射又曰庾道愍尤精相板宋明帝時山陽王休祐屢以言語忤顔見道愍託以已板為他物令道愍占之道愍曰此乃甚貴然使人多憎忤祐以禇彦回詳宻求换其板他日彦回侍明帝自稱下官帝多忌甚不悦休祐具状以言帝意乃觧又曰綦母珍之}
