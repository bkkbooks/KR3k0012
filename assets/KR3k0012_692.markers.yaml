  - {type: punctuation, offset: 19, content: 「, id: KR3k0012_CHANT_692-bkkpn11}
  - {type: variant, offset: 19, length: 247, content: 單衣江淮南楚之間謂之㲲音牒關之東西謂之單趙魏之間謂之左衣古謂之深衣是也禮王制曰有虞氏深衣而養老又深衣曰古者深衣蓋有制度以應規矩繩權衡短毋見膚長毋被土帶下毋厭髀上毋厭脅制十有二幅以應十二月袂圓以應規曲祫如矩以應方負繩及踝以應直下齊如權衡以應平齊縃故規者行舉手以為容負繩抱方者以直其政方其義也故易曰坤六二之動直以方也下齊如權衡者以安其志而平其心也五法以施故聖人服之故規矩取其無私繩取其直權衡取其平故先王貴之故可以為文可以為武可以擯相可以治軍旅又儒行曰丘少居魯衣縫掖之衣鄭玄曰縫猶大也大掖衣大袂單衣君, SBCK: 青青}
