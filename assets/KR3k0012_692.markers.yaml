  - {type: variant, offset: 2787, length: 1, content: 改, WYG: 岀行有女鼓吹尚書官属皆着錦袴佩玉晉令曰皇太子妃佩瑜玉諸王郡公太宰太傅太保司空諸長公主諸王世子大司馬大將軍太尉佩𤣥玉晋宋舊事曰太后皇后白玉佩穆天子傳曰七萃之士天子賜以左佩玉華玉華之佩佩之精者又曰天子渴於沙中沙中無水七萃之士高奔戎刺其左驂之頰取其清血而飲天子天子美之乃賜奔戎佩玉一雙列仙傳曰江濵二女者不知何許人歩逰江濵逢鄭交甫挑之不知神人也女遂解珮與之交甫悦乃受珮而去數十歩空懐無珮女亦不見拾遺記曰燕昭王時西王母降與昭王遊乎燧林之下説炎皇鑚火之術取緑桂之膏燃以照夜忽有飛娥衘火状如丹雀來拂桂膏之上此娥出員丘之穴穴洞達於九天中有細珠如流沙可穿而結因用為珮又曰漢成帝時乘輿服皆尚黑宫中美女服皂班姬以下皆𤣥綬䃜佩又曰漢昭帝元始元年穿淋池廣千歩中植分枝荷一莖四葉状如駢盖日照則葉低廕根莖若葵之衛足也名曰低光荷實如𤣥珠可以飾珮漢武内傳曰上元夫人帶六出火玉之佩捜神記曰元康中婦人之飾有五兵佩楚辭曰扈江離與薜荔扈被也紉秋蘭以為佩紉蘭素香草也又曰雲衣兮披披披披長貌玉佩兮陸離又曰連蕙若以為佩兮過鮑肆而失香又曰盍吾逰此春宫春宮東方青帝宮折瓊枝以繼珮潘岳西征賦曰飛翠綏拖鳴玉出入禁門者衆矣想佩聲之遺響若鏗鎗之在耳曹植七啓曰佩則結緑懸黎之妙㣲符彩照爛流景揚輝曹植與陳琳書曰帶蛇虹以為紳連日月以為佩殷仲堪與相王牋曰所致玉佩光潤清越傅𤣥大言賦曰腰佩六氣首戴天文環説文曰好倍肉謂之瑗肉好若一謂之環禮曰孔子佩象環五寸而綦組綬謙不比德亦不事也象環有文者也環者取可修無窮左傳曰穆叔之子仲壬與公御萊書觀於公宫公予之環使豎牛入不示岀命佩之又曰宣子有玉環其一在鄭商玉環同工共朴自共為雙宣子謁諸鄭伯謁請也宋書曰江夏王義恭孝武即位以在藩所服玉環大綬賜之梁書曰桞惔武帝之鎮㐮陽惔祖道帝觧玉環贈之天監二年元㑹帝謂曰卿佩玉環是新亭所贈耶對曰既瑞感神衷臣謹服之無斁白}
