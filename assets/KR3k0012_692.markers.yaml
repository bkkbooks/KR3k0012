  - {type: variant, offset: 1687, length: 201, content: 屬也徐廣輿服雜注曰今皇后謁廟服袿䙱大衣後漢書曰和憙鄧后性儉約每有讌會諸姬貴人競自脩整簪珥光采袿裳鮮明說文曰簪竿也珥瑣也以玉充耳后獨省素無飾其衣有與陰后同色即時解易南史曰南岳鄧先生名郁隱居不仕魏夫人忽來臨降乘雲而至從少嫗三十並著絳紫羅繡袿䙱年皆可十七八許傅毅舞賦曰珠翠的皪而炤耀華袿飛䘯而雜纖羅婦人集張君平與妹憲書曰念諸里舍皆富財賄袿䙱襲蔽紛華照曜於是之際想汝懷愧韍釋名曰韍韠所以蔽前也婦人蔽膝亦如之齊人, WYG: 結}
