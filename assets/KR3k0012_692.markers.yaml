  - {type: variant, offset: 1463, length: 136, content: 祀宗廟初玄絳領袖為中衣絳袴袜示其赤心奉神五郊各從其色徐廣輿服雜注曰天子郊禮釋奠中衣以絳緣其領袖其朝皁緣魏官儀曰皁緣領袖中單衣會稽典錄曰鄭弘為縣嗇夫民有弟斥兄錢者未還之㛐領詣弘賣中單為叔還錢兄聞之慚遣婦齎錢還弘不受曲領釋名曰曲領上橫壅頸其狀曲也禮深衣曰曲祫如矩以應方祫曲領也, WYG: ''}
