  - {type: punctuation, offset: 362, content: 「, id: KR3k0012_CHANT_692-bkkpn103}
  - {type: variant, offset: 362, length: 3, content: 蓋寬饒, SBCK: 彼留之子貽我珮􅅼又曰我送舅氏悠悠我思何以贈之瓊瑰玉佩又曰巧􅀏之瑳珮玉之儺又曰鞙鞙音蠲珮璲不以其長鞙鞙玉貌璲瑞也以瑞玉爲佩珮之鞙然周禮曰玉府掌王之金玉玩好共王之服玉佩玉禮曰主珮􅀝則臣珮垂主佩垂則臣珮委又曰石駘仲卒無適子有庶子六人卜所以爲後者曰沭浴珮玉則兆五人者皆沭浴珮玉石祁子曰孰有執親之䘮而沐浴珮玉者乎不沭浴佩玉石祁子兆又曰古之君子必珮玉右徴角}
  - {type: page-break, offset: 362, content: '', id: KR3k0012_SBCK_692-1b}
  - {type: variant, offset: 362, length: 3, content: 蓋寬饒, WYG: 彼留之子貽我佩玖又曰我送舅氏悠悠我思何以贈之瓊瑰玉佩又曰巧笑之瑳佩玉之儺又曰鞙鞙珮璲不以其長鞙鞙玉貌璲瑞也以瑞玉為偑珮之鞙然周禮曰王府掌王之金玉玩好共王之服玉佩玉禮曰主佩倚則臣佩垂主佩垂則臣佩委又曰石駘仲卒無適子有庻子六人卜所以為後者曰沐浴佩玉則兆五人者皆沐浴佩玉石祁子曰孰有執親之䘮而沐浴佩玉者乎不沐浴佩玉石祁子兆又曰古之君子必佩玉}
  - {type: page-break, offset: 362, content: '', id: KR3k0012_WYG_692-2a, image: WYG0899/WYG0899-0200c.png}
  - {type: variant, offset: 362, length: 3, content: 蓋寬饒, krp: 彼留之子貽我珮玖又曰我送舅氏悠悠我思何以贈之瓊瑰玉佩又曰巧笑之瑳珮玉之儺又曰鞙鞙音蠲珮璲不以其長鞙鞙玉貌璲瑞也以瑞玉爲佩珮之鞙然周禮曰玉府掌王之金玉玩好共王之服玉佩玉禮曰主珮倚則臣珮垂主佩垂則臣珮委又曰石駘仲卒無適子有庶子六人卜所以爲後者曰沭浴珮玉則兆五人者皆沭浴珮玉石祁子曰孰有執親之䘮而沐浴珮玉者乎不沭浴佩玉石祁子兆又曰古之君子必珮玉右徴角}
  - {type: variant, offset: 366, length: 8, content: 遷為衛司馬未出殿, SBCK: 宫羽趨以采齊路}
  - {type: variant, offset: 366, length: 1, content: 遷, WYG: 徵角右宫羽趨以采齊路門之外樂莭也行以肆夏登堂之樂莭也周旋中䂓折旋中矩進則揖之退則揚之然後玉鏘鳴也故君子在車則聞鸞和之聲行則鳴佩玉是以非辟之心無自而入也君在不佩玉左結佩右設佩朝於君亦結左齊則綪結佩而爵韠凡帶必有佩玉唯䘮否佩三有衡牙居中央以前後觸君子無故玉不去身君子於玉比德焉天子佩白玉而𤣥組綬公佩山𤣥玉而朱組綬大夫佩水蒼玉而純組綬世子佩瑜玉而綦組綬士佩瓀玫而緼組綬孔子佩象環五寸而綦組綬大戴禮曰上車以和鸞}
  - {type: page-break, offset: 366, content: '', id: KR3k0012_WYG_692-2b, image: WYG0899/WYG0899-0200d.png}
  - {type: page-break, offset: 366, content: '', id: KR3k0012_WYG_692-3a, image: WYG0899/WYG0899-0201a.png}
