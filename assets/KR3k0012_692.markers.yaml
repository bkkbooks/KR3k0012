  - {type: variant, offset: 2894, length: 1, content: 遺, WYG: 不卒方留為田宅財物牛馬猪羊雞犬之属以五行十二時分若其處崩毁傷踢破裂弔節蝎穿兆隨所属物必損失死亡板兩邉左為城右為社寛博文彩班班光澤清净必得封邑仲長子曰以笏書君教令記善刺過今之板以}
