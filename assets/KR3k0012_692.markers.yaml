  - {type: punctuation, offset: 1500, content: ，, id: KR3k0012_CHANT_692-bkkpn490}
  - {type: 'tls:seg', offset: 1500, content: '', id: KR3k0012_CHANT_692-22a.9}
  - {type: variant, offset: 1500, length: 3, content: 釋奠中, SBCK: 曰孔子佩象環五寸而綦組綬謙不比德亦不事也象有文環者也環者取其脩無窮左傳曰穆叔之子仲壬與公御萊書觀於公宫公予之環使才人入示之不示出命佩之又曰宣子有玉環其一在鄭啇玉環同工共朴自共爲􅀟宣子謁諸鄭伯謁請也子産弗與事具玉部宋書曰江夏王義恭孝武即位以其藩所服玉環大綬賜之梁書曰栁惔武帝之鎭襄陽惔祖道帝解玉環贈之天􅁥二年元㑹帝謂曰卿珮玉環是新亭所贈耶對曰旣瑞感神􅂨臣謹服之無斁白虎通曰修道無窮即珮環也瑞應圖曰黄帝時西王母乗白鹿來獻白環舜時復來獻白環王子年拾遺録曰顓頊時濵海之北有勒題國皆衣毛無翼而飛帝乃更}
