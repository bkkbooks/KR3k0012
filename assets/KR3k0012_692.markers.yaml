  - {type: variant, offset: 2803, length: 0, content: '', WYG: 送綸㡌玉玦各一以徵意焉笏釋名曰笏忽也君有教命及所啓白則書其上備忽忘也或曰笏可以薄疏物禮曰笏天子以球玉諸侯以象大夫以魚須與鬚同文竹士竹本象可也見於天子與射無説音脱笏入太廟説笏非古也小功不説笏當事免則脱}
