  - {type: variant, offset: 937, length: 326, content: 曰元帝召陳郡王隱待詔著作單衣幘朝望於著作之省又曰天子郊禮釋奠中單衣絳緣其領袖其朝服皂緣也燕丹子曰荊軻抱秦王乞聽琴聲而死召姬人鼓琴聲曰羅縠單衣可製而絕八尺屏風可超而越齊桓公夜出迎客甯戚叩牛角而歌曰短布單衣適至骭終朝飲牛至夜半仲長統昌言曰薊子訓不知何郡人到陳公舍自云今日當死陳公與之一著單衣於是入室寢日中果死傅子曰梁冀作火浣布衣會賓客行酒失盃而污之偽怒解衣而燒之垢盡火滅粲然潔白世說曰王戎性儉為其從子婚與一單衣後更責償之陳留耆舊傳曰吳祐為膠東相嗇夫孫性盜富民錢五百為父市單衣父恐便以單衣詣門自謝祐以單衣遺其父梁冀別傳曰冀作狐尾單衣上短下長邊讓別傳曰讓才辯俊逸孔融薦讓於武帝曰邊讓為九州之被則不足為單衣䄡䄖則有餘楊彪別傳曰魏文帝令彪著布單衣待以賓客之禮拾遺記, SBCK: ''}
