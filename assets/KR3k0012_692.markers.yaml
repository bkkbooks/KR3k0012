  - {type: variant, offset: 1498, length: 1, content: 郊, SBCK: 渇於沙中沙中無水七萃之士髙奔戎刺其左􅆖之頰取其清血而飲天子天子美之乃賜奔戎珮玉一􅀟列仙傳曰江濵二女者不知何許人歩游江濵逢鄭交甫挑之不知神人也女遂解珮與之交甫恱乃受珮而去數十歩空懷無珮女亦不見拾遺録曰燕昭王時西王母降與昭王遊乎燧林之下說炎皇鑚火之術取緑桂之膏然以照夜忽有飛蛾衘火狀如丹雀來拂桂膏之上此蛾出貟丘之穴穴洞逹於九天中有細珠流沙可穿而結因用爲珮又曰漢成帝時乗輿服皆尚黒宮中美女服皂班􅁎以下皆玄綬珮又曰漢昭帝元始元年穿林池廣千歩中植分枝荷一莖四葉狀如駢蓋日照則葉低􅄻根莖􅀂葵之衛足也名曰低光荷實如玄珠可以飾珮漢武内傳曰上元夫人帶六出火玉之珮搜神記曰元康中婦人之飾有五兵珮楚辭曰扈江離與薜荔扈􅀍也紉秋蘭以爲珮紉蘭索香草也又曰雲衣兮披披披披長㒵玉珮兮陸離陸離光彩皃又曰連蕙􅀂以爲珮兮過鮑肆而失香又曰盍吾遊此春宫春宫東方青帝宫折瓊枝以繼珮潘岳西征賦曰飛翠緌拖鳴玉出入禁門者衆矣想珮聲之遺響􅀂鏗鎗之在耳劉梁七舉曰珮則結緑懸􅀺寳之妙微荷彩昭爛流景楊暉曹植與陳琳書曰帶蜿虹以爲紳連日月以爲珮殷仲堪與相王牋曰所致玉佩光潤清越􅀓玄大言賦曰􅆎珮六氣首戴天文環說文曰好倍􅁏謂之瑗􅁏好􅀂一謂之環}
