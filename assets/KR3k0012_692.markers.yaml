  - {type: variant, offset: 1599, length: 1, content: 古, SBCK: 無是非}
  - {type: variant, offset: 1599, length: 1, content: 古, krp: 無是非}
  - {type: variant, offset: 1601, length: 2, content: 方領, SBCK: 也無是非故能夫是非無窮故應亦無窮玦􅀃文曰玦玉珮珮如環而有玦故云玦詩曰芃蘭之葉僮子佩韡韡玦也左傳曰狄人伐衛將戰衛懿公與石祁子玦與寗莊子矢使守莊子寗逺也玦玉玦曰以此賛國擇利而爲之賛助也玦示以當決斷矢示以禦難又曰晉侯使申生伐山臯落氏珮之金玦狐穾曰金寒玦離胡可恃也罕夷曰金玦不復雖復何爲君有心矣國語曰獻公使申生伐東山衣偏裻音篤之衣佩之金玦太子見理克曰君賜我以偏衣金玦何也克曰孺子懼乎衣金之偏而握金不偷矣太子遂行狐突御戎先友爲右告先友曰君與我此衣何也先友曰中分而金玦之權在此行也狐突歎曰以厖衣純尨􅄂色純德謂太子而玦之以金銑者寒甚矣胡可恃也典略曰項羽與沛公飲范増數目羽舉所佩玉以示之者三羽黙然}
  - {type: page-break, offset: 1601, content: '', id: KR3k0012_SBCK_692-6a}
  - {type: variant, offset: 1601, length: 44, content: 方領後漢書曰朱勃字叔陽年十二能誦詩書嘗候馬援兄況勃衣方領能短步前書音義曰頸下施領正方學者, WYG: 君臣佩玉三代同}
  - {type: variant, offset: 1601, length: 2, content: 方領, krp: 也無是非故能夫是非無窮故應亦無窮玦說文曰玦玉珮珮如環而有玦故云玦詩曰芃蘭之葉僮子佩韡韡玦也左傳曰狄人伐衛將戰衛懿公與石祁子玦與寗莊子矢使守莊子寗逺也玦玉玦曰以此賛國擇利而爲之賛助也玦示以當決斷矢示以禦難又曰晉侯使申生伐山臯落氏珮之金玦狐穾曰金寒玦離胡可恃也罕夷曰金玦不復雖復何爲君有心矣國語曰獻公使申生伐東山衣偏裻音篤之衣佩之金玦太子見理克曰君賜我以偏衣金玦何也克曰孺子懼乎衣金之偏而握金不偷矣太子遂行狐突御戎先友爲右告先友曰君與我此衣何也先友曰中分而金玦之權在此行也狐突歎曰以厖衣純尨雜色純德謂太子而玦之以金銑者寒甚矣胡可恃也典略曰項羽與沛公飲范増數目羽舉所佩玉以示之者三羽黙然}
