  - {type: variant, offset: 1505, length: 2, content: 絳緣, SBCK: 文豹爲飾獻黒玉之環色如淳􅃮荀卿子曰大夫待放于境君賜以環即返以玦即去西京􅄂記曰趙飛鷰爲后女弟昭儀上五色玉環春秋後語曰秦始皇聞齊王后賢嘗使遺之連環曰齊人多智能解此乎后以示群臣莫能解乃引椎破之謝秦使曰謹以解矣以報始皇壯}
