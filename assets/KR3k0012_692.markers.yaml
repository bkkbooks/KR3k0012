  - {type: variant, offset: 1960, length: 389, content: 服謂之帶其他服謂之韠以韋為之禮曰一命縕韍黝衡再命赤韍葱衡韍之言蔽也縕赤黃之色所謂韍也又曰韠君朱大夫索士爵韋韠以言蔽也以為之象裳也圜殺直曰韠制天子直公侯前後方大夫前方後剉角士前後正韠下廣二尺上廣一尺長三尺又明堂位曰有虞氏服韍夏后氏山殷火周龍章鄭玄曰韍韍也舜始作之以尊祭服禹湯至周增以盡文後王彌飾也漢書東方朔傳曰館陶公主迎武帝蔽膝登階也又曰王莽妻著布蔽膝見客魏志曰武帝內誡令云今貴人位為貴人金印藍紱女人爵位之極又文帝與于禁詔曰昔漢高祖脫衣以衣韓信光武解綬以帶李忠誠皆人主當時貴敬功勞勤心之至也封賜將軍以魏王時自所佩朱韍及遠遊冠吳志曰孫權潘夫人有娠夢人以龍頭授己以蔽膝受之生亮五經要義曰韠者舜所制也又云天子朱紱諸侯赤紱赤盛色也又曰太古之時未有布帛人食禽獸肉而衣其皮知蔽前未知蔽後至舜冕服既備故復制之示不忘古韠名有三朝廷則謂之韠宗廟謂之韍韐上音昧下音閤五經異義曰韍者大帶之飾非韠也董巴漢, WYG: 旒蔡邕}
