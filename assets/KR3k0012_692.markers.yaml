  - {type: variant, offset: 2799, length: 1, content: 法, WYG: 曰大夫待放于境君賜以環即返以玦即去西京雜記曰趙飛鷰為后女弟昭儀上五色玉環春秋後語曰秦始皇聞齊王后賢嘗使遺之連環曰齊人多知能解此乎后以羣臣莫能解乃引椎破之謝秦使曰謹以解矣以報始皇壮其志益不敢謀齊劉向列女傳曰齊桓公行覇諸侯朝之衛獨不至公謀伐衛衛姬脱簮珥解環珮再拜請衛之罪荘子内篇云彼是莫得其偶謂之道樞樞得其環中以應於無窮夫是非反覆相尋無窮故謂之環中空矣今以是非為環而得其中者也無是非者也無是非故能夫是非無窮故應亦無窮玦説文曰玦玉珮珮如環而有缺故云玦詩曰芄蘭之葉童子佩韘韘玦也左傳曰狄人伐衛將戰衛懿公與石祁子玦與寗莊子矢使守莊子寗速也玦玉玦曰以此賛國擇利而為之賛助也玦示以當决斷矢示以禦難又曰晉侯使申生伐東山皋落氏佩之玦狐突曰金寒玦離胡可恃也罕夷曰金玦不復雖復何為君有心矣國語曰獻公使申生伐東山衣偏裻音篤之衣佩之金玦太子見里克曰君賜我以偏衣金玦何也克曰孺子懼乎衣金之偏而掘金不偷矣太子遂行狐突御戎先友為右告先友曰君賜與我此衣何也先友曰中分而合玦之權在此行也狐突歎曰以龎衣純龎雜色純純德謂太子而玦之以金銑者寒甚矣胡可恃也典略曰項羽與沛公飲范増數目羽舉所佩玉玦以示者三羽黙然後漢書曰更始謀殺升伯升伯光武之兄乃㑹諸侯以成其計繡衣御史申徒建隨獻玉玦更始竟不能殺東觀漢記曰明帝詔曰馮魴以忠孝出入八年數進忠}
