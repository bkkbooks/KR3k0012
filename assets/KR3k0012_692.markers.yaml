  - {type: variant, offset: 2806, length: 2, content: 非獨, WYG: 因飾焉畢畫也笏度二尺有六寸其中愽三寸其殺六分而去一殺猶抒也天子抒上終葵首諸侯不終葵首又曰将適公所書思對命思所思念将以告君書之於笏}
