  - {type: variant, offset: 2848, length: 0, content: '', WYG: 齊書曰爾朱榮既誅得其手板上有數牒啓皆左右去留人名非其腹心在出限帝曰竪子若􅂈今日便不可制又曰文㐮疑文宣佯愚慮其有後變将隂圖之以問崔暹暹曰嘗與二郎俱在行位試以手板拍其背而不瞋乃将犀手板换暹竹者自揩拭而翫視之以是知其實痴不足慮也帝既鏁暹責其往昔打背暹自陳所對文㐮之言已功以贖死帝悟曰我免祸乃暹之力釋而勞之唐書曰髙宗欲立武昭儀禇遂良諌不從致笏殿階曰還陛下此笏乃觧巾叩頭流血又曰崔滌𤣥宗時嘗朝夕宫掖出入}
