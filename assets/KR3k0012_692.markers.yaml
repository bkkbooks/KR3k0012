  - {type: variant, offset: 2804, length: 1, content: 學, WYG: 免悲哀哭踊之時凡有指畫於君用笏造受命於君必書笏笏畢用}
  - {type: variant, offset: 2804, length: 2, content: 學也, krp: 板以象焉劉義恭啓事曰聖恩優重猥賜華纓玉笏珎冠飾首琛板耀握}
