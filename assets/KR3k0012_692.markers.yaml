  - {type: variant, offset: 2273, length: 1, content: 古, SBCK: 子時嘗戲殿前以玉手板弄銅蟠螭口手傾溜入螭腹中不能出人後見一白䑕出入螭口世􅀃曰王子猷作梪車􅀐􅀐兵叅軍桓曰卿在府乆此當相料理􅀄不荅髙視以手板柱頰云西山朝來致有爽氣相手板經曰相手板法出蕭何或曰四皓初出殆不行世東方朔見而善之曰此非庸人所解至魏司空陳長史見此書歎伏以示許士宗韋仲將管輅見而推歎郭景純以夜兼晝方得其妙理相手板將以閑太}
