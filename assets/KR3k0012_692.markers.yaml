  - {type: 'tls:seg', offset: 2884, content: '', id: KR3k0012_CHANT_692-47a.6}
  - {type: variant, offset: 2884, length: 0, content: '', WYG: 相手板法出蕭何或曰四皓初出殆不行世東方朔見而喜之曰此非庸人所至衛司空陳長史見此書歎服以示許士宗韋仲将管輅見而推歎郭景純以夜兼晝方得其妙理相手板以閑太之時取五行}
  - {type: variant, offset: 2885, length: 3, content: 此鞶囊, WYG: 四時定八節明二十四氣百不失一板長一尺五寸廣一寸五分上狹而薄下廣而厚八角十二芒並欲端正平板形皆完净板㐫少吉多者可用吉少㐫多者不可用服也舊用白直檀刺榆桑拓四材也畨當令理通直從上至下直如弦不得出邉絶理板頭}
