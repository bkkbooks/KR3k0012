  - {type: variant, offset: 1493, length: 2, content: 雜注, SBCK: 志曰孝明帝作蠙珠之珮以郊祀天地白虎通曰所以必有珮者表意見所能故脩道無窮即珮環能大道德即珮琨能决嫌疑即珮玦是以其所佩即知其所能􅀂農夫佩其耒耜工匠珮其斧斤婦人珮其針縷諸長公主諸王世子大司馬大將軍太尉珮玄玉晉宋舊事曰太后皇后白玉佩穆天子傳曰七萃之士天子賜以左佩玉華玉華之珮珮之精者又}
