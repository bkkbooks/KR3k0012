  - {type: variant, offset: 1607, length: 2, content: 朱勃, SBCK: 更始謀殺升伯伯升光武兄乃㑹諸將以成其計繡衣御史申徒建隨獻玉玦更始竟不能殺東觀漢記曰明帝詔曰馮魴以忠孝出入八年數進忠言正諌賜以玉玦續漢書曰桓帝永興二年光禄勲吏舎壁下夜有青氣視之得玉鈎玦各一魏氏春秋曰明帝張掖郡金山玄川溢涌寳石􅀒圖有玉匣開盖於前上有玉玦二璜一魏略曰太祖征漢中太子在孟津聞鍾繇有玉玦使臨淄侯曹子建也因人􅀃之繇遂送焉太子與繇書曰南陽宗惠叔稱君侯昔有美玦聞之驚喜􅀏與抃㑹當自白書恐傳言未審是以令舎弟子建因荀仲茂時從容喻鄙指鄴􅀐旣到寳玦􅀄至捧押跪發五内震駭繩窮押開爛然滿目偎以蒙鄙之姿得覩希丗之寳不煩一介之使不􅂢連成之價旣有秦昭章臺之觀而無藺生詭奪之誑嘉貺益腆敢不欽承謹奉賦一篇王隱晉書曰禮能使决疑者珮玦故遣其臣亦授之以玦今靈命有二玦其一當魏曆數旣終當禪大晉故與之玦凡受命將即天子之位皆衆人之所疑以武皇帝能断决應天順民受曹氏禪而無疑德應珮玦故以賜焉是以有二玦蕭子顯齊書曰太祖在淮隂治城得錫玦大數尺下有􅂐}
