  - {type: variant, offset: 3673, length: 137, content: 韜左傳國語及史孔子曰吾嘗終日不食終夜不寢以思無益不如學也蒙等感悟遂學所愽覽儒者不勝魯肅見呂蒙謂曰今者見卿學識英博非復吳下阿蒙權常歎曰人長而進益如呂蒙蔣欽蓋不可及世說曰褚褒字季野語孫盛曰北人學問淵揔博瞻孫荅曰南人學問清通簡要支道林聞之曰余謂北人看書如顯處見月南人學聞如牖中窺日, SBCK: 百八}
