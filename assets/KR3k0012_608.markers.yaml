  - {type: variant, offset: 3446, length: 226, content: 焉故曰物生而蒙事屯而養造昧利有攸適猶金之消鑪水之從器也是以聖人實之於文鑄之於學夫文學也者人倫之首大教之本也趙子聲書詣鄭康成學曰夫學之於人猶土地之有山川也珍寶於是乎出猶樹木之有枝葉也本根於是乎庇也虞傅厲學篇曰學之染人甚於丹青丹青吾見其久而渝也不見久而渝於學也傅子曰人之學者猶渴而飲河海也大飲則大盈小飲則小盈江表傳曰孫權謂呂蒙及蔣欽曰卿今並當途掌事宜學問以自開益蒙曰軍中常苦多務權曰孤豈欲卿治經為愽士耶但令涉獵見往事耳如卿二人意性朗悟學必得之宜急讀孫子兵法, SBCK: 御覽卷第}
