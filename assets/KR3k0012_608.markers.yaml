  - {type: variant, offset: 2482, length: 0, content: '', SBCK: 隠士以三墳爲金玉五典爲琴筝講肆爲鍾鼓百家爲笙簧孔融與諸卿書曰鄭康成多臆􅀃人見其名學謂有所出也證案大較要在五經四部書如非此文近爲妄矣􅀂子所執以爲郊天鼓必當騏驎之皮冩孝經本當曽子家䇿乎顔延之庭誥曰觀書貴要觀要貴􅀶􅀶而知要萬流可一詠歌之書取其連􅀋合章比物集句採風謡以逹民志詩爲之祖褒貶之書取其正言晦義轉制衰王微辭豐旨貽意盛聖春秋爲上易首體備能事之淵馬陸得其象數而失其成理荀王舉其正宗而略其數象四家之則雖各有所志揔而論之情理出於微明氣數生於形分然則荀王得之於心馬陸取之於物其蕪惡迄可知矣}
