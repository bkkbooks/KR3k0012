  - {type: variant, offset: 1153, length: 536, content: 足今吾來也猶有尊足者存焉吾是以務全之也無趾出孔子曰弟子勉之無趾兀者也猶務學以復補其前行之惡況全德之人乎韓子曰如脂粉則嫫母進御家不潔則西施棄野學之為脂粉亦厚矣又桓範世要云學者人之脂粉也又曰夫耕之用力也勞而民為之者可得而富之也戰之為事也危而民為之者可得以貴也今脩文學習談論則無耕之勞而有富之實無戰之危而有貴之尊則人孰不為也管子曰明主不厭人故能成其眾士不厭其學故能成其身也曾子曰君子愛人以學及時而行難者弗避易者弗從年四十無藝則無藝矣五十不以善聞則無聞矣墨子曰墨子謂門人曰汝何不學對曰吾族無學者墨子曰不然豈有好美者而曰吾族無此不欲耶富貴者而曰吾族無此不用也新序曰齊王問墨子曰古之學者何如對曰古之學得一善言以附其身今之學得一善言務以說人也屍子曰未有不因學而鑒道不假學而光身者也又曰今人皆知砥礪其劍而弗知砥礪其身夫學身之砥礪也又曰水積則生吞舟之魚土積則生楩楠豫樟學積亦有生焉慎子曰孔子曰丘少而好學晚而聞道此以博矣孫卿子曰不登高山不知天之高不聞先王之遺言不知學問之大也又曰君子之學入乎耳著乎心布乎四支形乎動靜小人之學出乎口入乎耳口耳之間四寸耳曷足以美七尺之軀又曰不學不成堯學於君疇舜學於務成昭禹學於西王國文子曰上學以神聽中學以心聽下學以耳聽耳聽者學在皮膚心聽者學在肌肉神聽者學在骨髓呂氏, SBCK: ''}
