  - {type: variant, offset: 2783, length: 1, content: 尚, SBCK: 陳皆同取道德仁義以爲竒論異文而俱善可觀猶人食皆用魚􅁏菜茹以爲生熟異和而復俱美也􅀶物志曰聖人制作曰經賢曰著述曰記曰章句曰解曰論曰讀文心雕龍曰自夫子刪述而大寳啓耀於是易張十翼書摽七觀詩列四始禮正五經春秋五例義旣埏乎性情辭亦匠乎文理故能開學養政昭明有融然而道心惟微聖謨卓絶墟宇重峻吐納}
