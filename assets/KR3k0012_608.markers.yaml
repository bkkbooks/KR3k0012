  - {type: variant, offset: 130, length: 0, content: '', SBCK: 桓榮受朱普學章句四十萬言榮入授顯宗减爲二十二萬言却復刪省定成十二萬言由是有桓君大小學後漢書曰許愼字叔重性淳篤少􅀶學馬融常推敬之時人謂之語曰五經無􅀟許叔重􅀄愼以五經傳􅀃臧否不同於是撰五經異義傳於丗晉書曰劉殷有七子五子各授一經一子授太史一子授漢書一門之内七業俱興齊書曰臧榮緒常以宣尼庚子日生其日陳五經拜之自號􅀍􅄄先生唐書曰長慶中上謂兵部侍郎薛放曰爲學經史何先放對曰經者古先聖之至言多仲尼所發明皆天人之極致誠萬代不刋之典也史則歴紀成敗雜書}
