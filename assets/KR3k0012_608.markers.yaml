  - {type: variant, offset: 1822, length: 389, content: 長以補其短故假而又假遂有天下蘇子曰不食八珍何以知味之奇不為文學何以知世之資孔叢子曰人之進退唯問其志取必以漸勤則得多山溜至軟石為之穿蝎蟲至弱木為之弊夫溜非石之鑿蝎非木之鑿然而能以微脆之形陷堅剛之體非積漸之致乎故學者所以飾百行也說苑曰晉平公問師曠曰吾年七十欲學恐已暮矣對曰暮何不炳燭乎臣聞少而學者如日出之陽壯而學者如日中之光老而學者如炳燭之明炳燈之明孰與夜行公曰善哉又曰子貢謂子石曰汝不學詩子石曰父母求吾孝兄弟求吾悌朋友求吾信吾暇乎哉子貢曰請捐吾詩以學詩於子又曰公明宣學於曾子三年不學書曾子曰汝居參門三年不學何也對曰安敢不學乎見夫子居家庭親在叱吒之聲未至於犬馬宣說之見夫子應賓客恭儉而不懈宣說之見夫子居朝廷嚴臨下而不毀傷宣說之此三者學之而未能安敢不學乎曾子避席謝之曰參不及宣其學也賈誼書曰湯曰學聖王之道譬其如日靜居而獨思譬其若火夫舍聖王之道而靜居而獨思譬其去日之明於庭而就火之光於室, SBCK: 春秋一}
