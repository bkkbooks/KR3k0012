  - {type: variant, offset: 3008, length: 222, content: 火之耀也非目之光也而目假之則為明矣天地之道神明之為不可見也學問聖典心思道術則皆覩矣此則非心之明而人假之則為己知風俗通曰武帝廣開獻書之路立五經愽士開弟子員設科射策勸以官祿訖於元始百有餘年書積如丘山傳業浸眾枝葉繁滋經說百萬言蓋祿利之路然也徐偉長中論曰學者踈神達思治情理性也初學則如夜在玄室所求不得白日照焉則群物斯辯矯首而徇飛不如脩翼之必獲孤居而願知不如務學之必達蔣子萬機論曰諺曰學如牛毛成如麟角言其少也譙周法訓曰為國者不患學之害農患治民者之不學玄晏, SBCK: 暢}
