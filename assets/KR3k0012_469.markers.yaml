  - {type: page-break, offset: 2921, content: '', id: KR3k0012_SBCK_469-5b}
  - {type: variant, offset: 2921, length: 0, content: '', WYG: 動之節吾甚美之夜聞急少能若是蜀志曰初孫權}
  - {type: variant, offset: 2921, length: 0, content: '', krp: 動之節吾甚羙之夜聞急少能若是蜀志曰𥘉孫權}
  - {type: variant, offset: 2922, length: 1, content: 懷, SBCK: 妹妻先主妹才捷剛猛有諸兄風侍婢百餘人皆親執刀侍立先主毎入心常懔懔國語曰驪姫告優施曰君旣許我殺太子立奚齊吾懼里克柰何優施曰爲我具特羊從之飲酒中飲優施起儛謂里克妻曰主盍㗖我}
  - {type: variant, offset: 2922, length: 1, content: 懷, WYG: 妹妻先主妹才㨗剛猛有諸兄風侍婢百餘人皆親執刀侍立先主每入心常凛凛國語曰驪姬告優施曰君既許我殺太子立奚齊吾懼里克奈何優施曰為我具特羊從之飲酒中飲優施起舞謂里克妻曰主盍啗我}
  - {type: page-break, offset: 2922, content: '', id: KR3k0012_WYG_469-9a, image: WYG0897/WYG0897-0284a.png}
  - {type: variant, offset: 2922, length: 1, content: 懷, krp: 妹妻先主妹才捷剛猛有諸兄風侍婢百餘人皆親執刀侍立先主毎入心常懔懔國語曰驪姫告優施曰君旣許我殺太子立奚齊吾懼里克柰何優施曰爲我具特羊從之飲酒中飲優施起儛謂里克妻曰主盍㗖我}
  - {type: punctuation, offset: 2924, content: ，, id: KR3k0012_CHANT_469-bkkpn987}
  - {type: 'tls:seg', offset: 2924, content: '', id: KR3k0012_CHANT_469-44a.16}
  - {type: variant, offset: 2924, length: 2, content: 綆短, SBCK: 夫稱主妻亦如之蓋㗖我}
  - {type: variant, offset: 2924, length: 2, content: 綆短, WYG: 夫稱主妻亦如之盍啗我}
  - {type: variant, offset: 2924, length: 2, content: 綆短, krp: 夫稱主妻亦如之蓋㗖我}
  - {type: variant, offset: 2927, length: 0, content: '', SBCK: 􅁏也我教嗞兹暇豫事君言我教里克暇安樂事君乃歌曰暇豫之俉俉不􅀂鳥烏俉俉踈遠之貌言其智魯不如烏烏人皆集於蔚巳獨集於枯蔚喻茂盛枯喻衰落里克􅀏曰何謂蔚何謂枯對曰其母爲夫人其子爲君可不謂蔚乎其母旣死其子又謗可不謂枯乎言申生無母又􅀍謗可不謂之枯乎呉志曰劉備詣京口見孫權求都荆州權借之共拒曹公漢晉春秋曰吕範勸孫權曰將軍雖神武命世然操食有威力􅀄併荆州恩信未著冝以借備使撫安之多操之敵而爲樹黨計之上也權從之也曹公聞以土地借備方作書落筆於地石勒別傳曰勒治門閣至峻時有醉胡乗馬徑入府門勒問門吏馮翥門閣有限走向馬入門爲是何人而不彈白時號胡曰國人翥見問懼設對忘諱稱向有醉胡乗馬馳來向即呵制}
  - {type: page-break, offset: 2927, content: '', id: KR3k0012_SBCK_469-6a}
  - {type: variant, offset: 2927, length: 0, content: '', WYG: 肉也我敎兹此也暇豫事君言我教里克暇安樂事君乃歌曰暇豫之俁俁}
  - {type: variant, offset: 2927, length: 0, content: '', krp: 肉也我教嗞兹暇豫事君言我教里克暇安樂事君乃歌曰暇豫之俉俉不若鳥烏俉俉踈遠之貌言其智魯不如烏烏人皆集於蔚巳獨集於枯蔚喻茂盛枯喻衰落里克笑曰何謂蔚何謂枯對曰其母爲夫人其子爲君可不謂蔚乎其母旣死其子又謗可不謂枯乎言申生無母又𬒳謗可不謂之枯乎呉志曰劉備詣京口見孫權求都荆州權借之共拒曹公漢晉春秋曰吕範勸孫權曰將軍雖神武命世然操食有威力𥘉併荆州恩信未著冝以借備使撫安之多操之敵而爲樹黨計之上也權從之也曹公聞以土地借備方作書落筆於地石勒別傳曰勒治門閣至峻時有醉胡乗馬徑入府門勒問門吏馮翥門閣有限走向馬入門爲是何人而不彈白時號胡曰國人翥見問懼設對忘諱稱向有醉胡乗馬馳來向即呵制}
  - {type: variant, offset: 2928, length: 0, content: '', WYG: 如鳥烏俁俁疎遠之意言其智魯不如鳥烏人皆集於菀已獨集於枯菀喻茂盛枯喻衰落里克笑曰何謂菀何謂枯對曰其母為夫人其子為君}
  - {type: variant, offset: 2929, length: 0, content: '', SBCK: 與語胡人難與言非小吏所制勒歎曰故正自難與言恕翥不問鞭犯門者没所乗新序曰白公之難楚人有莊善者辭其母將徃死之其母曰弃其親而死其君可謂義乎莊善曰吾聞事君者内其禄而外其身今所}
  - {type: variant, offset: 2929, length: 0, content: '', WYG: 不謂菀乎其母既死其子又謗可不謂枯乎言申生無母又被謗可不謂之枯乎呉志曰𤣥徳詣京口見孫權求都督荆州權借之共拒曹公漢晉春秋曰吕範勸孫權曰將軍雖神武命世然操實有威力初併荆州恩信未著宜借𤣥徳使撫安之多操之敵而為樹黨計之上也權從之曹公聞}
  - {type: page-break, offset: 2929, content: '', id: KR3k0012_WYG_469-9b, image: WYG0897/WYG0897-0284b.png}
  - {type: variant, offset: 2929, length: 0, content: '', krp: 與語胡人難與言非小吏所制勒歎曰故正自難與言恕翥不問鞭犯門者没所乗新序曰白公之難楚人有莊善者辭其母將徃死之其母曰弃其親而死其君可謂義乎莊善曰吾聞事君者内其禄而外其身今所}
  - {type: variant, offset: 2930, length: 8, content: 汲深是為命有所成, SBCK: 養母臣之禄也身安得無死遂辭}
  - {type: variant, offset: 2930, length: 5, content: 汲深是為命, WYG: 州借𤣥徳方作書落筆於地新序曰白公之難楚人}
