  - {type: variant, offset: 803, length: 378, content: 又曰孔子遊太山見榮啟期行乎郕之野鹿裘帶索鼓琴而歌孔子曰先生所為樂何也對曰吾樂甚多天生萬物人為貴吾既得為人一樂也男女之別男尊女卑吾既得為男二樂也人生有不見日月不免襁褓吾行年九十是三樂也貧者人之常死者命之終處常待終當何憂哉孔子曰自寬者也又曰林類年且百歲晨春被裘拾遺穗於故畦並歌並進孔子適衛望之謂子貢曰彼叟可與言子貢逆之壠端面之歎曰先生曾不悔乎乃仰而應曰吾何悔邪吾所以為樂人皆有之而反以為憂少不勤行長不競時故能壽若此老無妻子死期將至故能樂若此莊子曰古之得道者窮亦樂通亦樂所樂非窮通也道德於此則窮通為寒暑風雨之序矣又曰與人和者謂之人樂與天和者謂之天樂又曰莊子與惠子遊濠梁水上莊子曰備魚出遊從容是魚樂也惠子曰子非魚安知魚之樂也莊子曰子非我安知我不知魚之樂又曰孔子謂顏回曰回來家貧居卑不仕乎對曰不願仕回有郭外之田五十畝足以給饘粥郭內之田十畝足以為絲麻以道自樂回不願仕也, SBCK: ''}
