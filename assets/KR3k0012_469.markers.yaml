  - {type: variant, offset: 1705, length: 1, content: 盛, SBCK: 時郗超爲中書郎在直引超入曰天命脩短故非所計當無復近日事不超曰大司馬方將外固封疆内鎮社稷必無􅀂斯之慮臣爲陛}
  - {type: variant, offset: 1705, length: 1, content: 盛, WYG: 時郗超為中書郎在直引超入曰天命修短故非所計當無復近日事不超曰大司馬方將外固封疆内鎭社稷必無若斯之慮臣為陛}
