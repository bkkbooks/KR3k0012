  - {type: variant, offset: 2080, length: 164, content: 治國者且安得樂此海也譙周法訓曰或曰君子處陋巷之中奚樂也曰樂得其親樂得其友樂聖人之道也劉向列女傳曰楚昭越姬者越王勾踐之女也昭王燕遊蔡姬在左越姬驂乘駟以馳逐登附莊之臺以望雲夢之囿乃顧謂二姬曰樂乎吾願與子生死若此蔡姬曰故願生俱樂死同時顧謂史書之楚辭曰樂莫樂於新相知劉伶酒德頌曰先生乃捧甕承槽衘杯漱醪無思無慮其樂陶陶曹子建箜篌引曰樂飲過, SBCK: ''}
