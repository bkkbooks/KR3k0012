  - {type: variant, offset: 2262, length: 524, content: 上說文曰憂愁也易曰作易者其有憂患乎又曰當其憂悔吝之時纖介不可慢也毛詩曰踧踧周道鞠為茂草我心憂傷惄焉如檮假寐永歎惟憂用老又曰知我者謂我心憂不知我者謂我何求又曰未見君子我心則憂左傳曰有喜而憂如有憂而喜乎又曰吳公子札來聘請觀周樂為之歌邶鄘衛曰美哉淵乎憂而不困史記曰秦昭王臨朝歎息應侯進曰臣聞主憂臣辱主辱臣死今大王中朝而憂臣敢請其罪昭王曰吾聞楚之鐵劍利則士勇倡優拙則思慮遠矣以遠思慮而御勇士恐楚之圖秦也今武安君死鄭安平叛內無良將外多敵國吾是以憂又曰懷王使屈原造為憲令草藁未定上官大夫見而欲奪之不與因讒之曰王使平為令眾莫不知每一令出平伐其功王怒而踈平平疾讒謟蔽明也邪曲之害公也方正之不容也故憂愁幽思而作離騷蜀志曰曹公征孫權呼先主自救先主遣使告劉璋曰曹公征吳吳憂危急孫氏與孤本為脣齒又曰進在青泥與關羽相距今不往救進必剋轉侵州界其憂有甚於魯魯自守之賊不足慮沈約宋書曰武帝起桓玄聞便憂懼無復為計或曰劉裕等眾力甚弱豈能有成陛下何慮之甚玄曰劉裕自足為一世之雄劉毅家無檐石之儲樗蒲一擲百萬何無忌劉牢之甥酷似其舅共舉大事何謂無成吳越春秋曰越王欲復怨於吳冬寒則抱冰夏熱則握火憂苦其志懸瞻於戶出入嘗之不絕於口華陽國志曰蜀中傳相告曰井中有人學士靳普言客星入東井益州之分憂剌客入耳, SBCK: ''}
