  - {type: 'tls:seg', offset: 1706, content: '', id: KR3k0012_CHANT_469-26a.9}
  - {type: variant, offset: 1707, length: 2, content: 述百, SBCK: 保之簡文因頌席仲􅀄詩曰士痛朝危臣哀主辱臣聲甚悽愴郗受假還東帝曰致意尊公超父愔字方回家國之事遂至於此由身不能以道匡衡思患豫防愧歎之􅀷言何能譬因泣下語林曰陸士衡爲河北都督巳􅀍間搆内懷憂懣聞衆軍驚角鼓吹謂其司馬孫拯曰我聞此不如華亭鶴鳴俗􅀃曰王孝伯起事王東亭殊憂懼時住在募士橋下持藥酒置左側諸其所念小人俞翼令在門前􅀂見人􅀐儐從來汝便可取酒藥與我俄有行人乗過馬翼便進酒王語翼汝更看定非官人王語翼汝幾誤殺我楚辭曰心不怡之且乆怡樂憂與憂其相接接續惟郢路之遼逺兮江與憂之不可渉又曰望孟夏之短夜何晦明其􅀂歳惟郢路之逺兮魂一夕而九逝又白屈原放逐憂心愁悴防徨山澤仰天歎息楚有先}
  - {type: page-break, offset: 1707, content: '', id: KR3k0012_SBCK_469-4b}
  - {type: variant, offset: 1707, length: 2, content: 述百, WYG: 保之簡文因頌席仲初詩曰士痛朝危臣哀主辱其聲甚悽隂郗受假還東帝曰致意尊公超父愔字方回家國之事遂至於此由身不能以道匡衡思患豫防愧歎之深言何能譬因泣下語林曰陸士衡為河北都督已被間構内懐憂懣聞衆軍警角鼓吹謂其司馬孫極曰我聞此不如華亭鶴鳴俗説曰王孝伯起事王東亭殊憂懼時住在募士橋下持藥酒置左側詣其所念小人俞翼令在門前若見人騎儐從來汝便可取藥酒與我俄有行人乗馬過翼便進酒王語翼汝更看定非官人王語翼汝幾誤殺我楚辭曰心不怡之且久怡樂憂與憂其相接接續惟郢路之遼遠兮江與憂之不可涉又曰望孟夏之短夜何晦明其若嵗惟郢路之遠兮魂一夕而九逝又曰屈原放逐憂心愁悴彷徨山澤仰天歎息楚有先}
  - {type: page-break, offset: 1707, content: '', id: KR3k0012_WYG_469-7a, image: WYG0897/WYG0897-0283a.png}
