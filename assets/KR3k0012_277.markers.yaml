  - {type: variant, offset: 2642, length: 1, content: 擁, WYG: 度蔡申光觀察等使仍淮西行營宣慰處置使其年八月一日度發京師仍賜禁軍三百為衞兵憲宗御通化門餞軍度銜涕辭天以郾城為蔡州應度得慰勞之㫖躬督戰陣卒以立功即時論賞諸将奮勵無敢退留至十月十一日㧞蔡州擒吴元濟仗節而還又曰元和中以裴度征淮西詔曰輔弼之臣軍國是賴興化致理秉鈞以居取威定功則分閫而出所以同君臣之體一中外之任焉属者問罪汝南致誅淮右葢欲刷其汙俗弔彼頑人雖挈地求生者實繁有徒而嬰城執迷者未剪其類何獸困而猶鬬豈鳥窮之無歸歟由是遥聼鼓鼙更張琴瑟煩我台席董兹戎旃朝議大夫中章侍郎同平章事飛騎尉賜金魚袋裴度為時}
