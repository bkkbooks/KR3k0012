  - {type: variant, offset: 10, length: 0, content: '', SBCK: 馮奉丗以艮家子選爲將年四十餘乃學春秋渉大義讀史書後漢書曰馬援閑於進對尤善述前丗行事每言及三輔長者下至閭里少年皆可觀聽自皇太子諸}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 馮奉世以良家子選為將年四十餘乃學春秋渉大義讀史書後漢書曰馬援嫺於進退尤善述前世行事每言及三輔長者下至閭里少年皆可觀聴自皇太子諸}
