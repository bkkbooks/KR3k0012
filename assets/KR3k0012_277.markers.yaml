  - {type: variant, offset: 2351, length: 0, content: '', SBCK: 宰相張􅀃出爲并州大都督府長史兼天兵軍大使開元九年胡賊康待賔據長泉鎮叛與党項連結攻䧟蘭池等六胡州詔􅀃與朔方軍大使王晙合􅀔進討賊攻銀城連谷以據倉粮􅀃統馬歩万人出合河􅀜掩擊大破之追至駱駞堰胡及党項自相疑貳乃散􅀃招集党項復其居業副使史憲請盡誅党項􅀃曰先王之道推亡固存如盡誅之是逆天道因奏置麟州安置党項餘衆其年􅀃自兵部尚書同平章事十年又勑􅀃爲朔方軍節度大使往廵五城處置兵馬時降胡康願子自立爲可汗舉兵掠􅁥牧馬西河渉出塞􅀃収兵討而擒之以獻徙其家屬於木盤山其黨悉平􅀗男女三千人於是移河曲六胡州殘胡五万餘口配之於許汝唐鄧仙豫等州始空河南朔方地先是縁邊鎮兵常六十万􅀃以邊寇漸平奏罷二十餘萬勒還農畒􅀇宗頗以爲疑􅀃奏曰臣乆在疆􅂣具悉邊事禦敵制勝不在多驅閑冗陛下􅀂以爲疑臣請闔門百口保之以陛下之明四夷畏服必不慮减兵而招寇也􅀇宗從之時當蕃衛士寖以貧弱逃亡略盡􅀃建䇿請一切罷之別召募強壯令其􅀫衛不簡色役優爲條例逋逃者必爭來應募上從之旬日得精兵十三万人分繫諸衛彍􅀐是也又曰呉元濟據蔡州叛王師討伐詔栁公綽以鄂兵五千􅀠安州刺史}
  - {type: page-break, offset: 2351, content: '', id: KR3k0012_SBCK_277-5b}
  - {type: page-break, offset: 2351, content: '', id: KR3k0012_SBCK_277-6a}
  - {type: variant, offset: 2351, length: 0, content: '', WYG: 宰相張說出為并州大都督府長史兼天平軍大使開元九年邊敵康大賔據長泉鎮叛與党項連結攻䧟蘭池等六胡州詔說與朔方軍大使王晙合勢進討賊攻銀城連谷以據倉糧說統馬歩萬人出合河関掩擊大破之追至駱駝堰敵及党項自相疑貳乃散說招集党項復其居業副使史憲請盡誅党項說曰先王之道推亡固存如盡誅之是逆天道因奏置麟川安置党項餘衆其年說自兵部尚書進同平章事十年又勅說為朔方軍節度大使徃廵五城䖏置兵馬時降敵康願子自立為可汗舉兵掠監牧馬西河渉出塞說勒兵討而擒之以獻徙其家属於七盤山其黨悉平獲男女三千人於是移河曲六胡州敵兵五萬餘口配之於許汝唐鄧仙豫等州始空河南朔方地先是緣邊鎮兵常六十萬說以邊冦漸平奏罷二十餘萬勒還農畝𤣥宗頗以為疑說奏曰臣乆在疆場具悉邊事禦敵制勝不在多驅閒冗陛下若以為疑臣請闔門百口保之以陛下之明遠方畏服必不慮減兵而招冦也𤣥宗從之時當蕃衞士浸以貧弱逃亡畧盡說建䇿請一切罷之別召募强壯令其宿衞不簡色役優為條例逋逃者必爭來應募上從之旬日得精兵十三萬人分擊諸衞彍騎是也又曰吴元濟據蔡州叛王師討伐詔柳公綽以鄂兵五千𨽻安州刺史}
