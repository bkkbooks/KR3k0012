  - {type: variant, offset: 2020, length: 0, content: '', WYG: 征虜將軍劉藻渉獵羣籍美談笑善與人交飲酒至一石不亂後周書曰宇文顯和性矜嚴頗渉經史膂力絶人彎弓數百斤能左右馳射又曰賀㧞勝長於䘮亂之中尤工武藝走馬射飛鳥十中其五六太祖每云諸將對敵神色皆動唯賀㧞公臨陣如平常真大勇也自居任始愛墳籍乃招引文儒討論義理性又通率重義輕財身死之日唯随兵仗及書千餘卷隋書曰髙祖有平南之志訪可任者髙熲曰朝臣之内文武才幹無出賀若弼者髙祖曰得之矣於是拜弼為吴郡總管委以平陳之事弼欣然以為己任與夀州總管源雄並為重鎮弼雄詩曰交河驃騎幕合浦伏波營勿使麒麟上無我二人名獻取陳十䇿上稱善賜以寳刀周羅㬋初仕陳為太子左衞率信任逾重時叅宴席陳主曰周左率武將詩每前成文士何為後也都官尚書孔範對曰周羅㬋執筆製詩還如上馬入陣不在人後自是益見親禮又曰于仲文討髙䴡大破之至鴨緑水髙䴡將乙支文德詐降來入其營仲文先奉宻㫖若遇髙元及文德者必擒之至是文德來仲文將執之時尚書左丞劉士龍為慰撫使固止之仲文遂捨文德尋悔遣人紿文德曰更有言議可復來也文德不從遂濟仲文選騎渡水追之每戰破敵文德遺仲文詩曰神策究天文妙算窮地理戰勝功既髙知足願云止仲文答書辭之文德燒柵而遯唐書曰調露元年突厥阿史德溫𫝊叛單于管内之二十四府皆叛應之單于都䕶蕭嗣業率兵討之突厥分兵掠其糧車兵多餓死由是大敗朝廷憂之遣禮部尚書裴行儉為定襄道行軍大總管率諸軍三十萬進討行儉至朔州知賊掠嗣業糧運得勝乃詐為糧車三百乘每車伏壯士五人持陌刀勁弩又以羸兵數百援之兼伏精兵以待之敵見糧車果大至羸兵纔鬭棄車而走賊驅車就泉水解鞍牧馬方擬取糧車車中壯士齊發敵衆大驚奔潰伏兵俱發敵騎擒戮殆盡自是續遣糧車敵望之不敢近既而諸道進兵屡㨗行儉終擒温傅再平突厥又曰婁師德弱冠進士擢第累補監察御史於時吐蕃方犯塞有詔募勇士以討之師徳抗表應募請為猛士擊賊髙宗大恱特假朝散大夫從軍西討頻立戰功天授初遷金吾将軍豐州都督則天勞書勞之曰卿受委北陲總司軍任徃還靈夏校檢屯田收率既多京坻遽積不煩和糴之費無復轉輸之勞兩軍鎮兵咸得支給覽以嘉尚欣恱良深召為夏官侍郎俄拜鳯閣侍郎同平章事又曰婁師德頗有學術噐量寛厚喜怒不形於色自專綜邊任三十餘年恭勤接下孜孜不怠當危亂之際族滅者相繼師徳出将入相能以功名始終識者多之又曰永徽中}
