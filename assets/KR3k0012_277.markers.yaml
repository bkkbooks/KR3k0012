  - {type: variant, offset: 2352, length: 17, content: 晟臨洮人也祖思恭父欽代居隴右嘗為禪, SBCK: 聽率赴行營公綽曰朝廷以吾儒生不知兵􅁘即日上奏願自征行許之公綽自鄂濟溳江直抵安州李聽以廉使之禮事之公綽謂之曰公所以屬鞬􅀒弩者豈非爲兵事􅁘􅀂去戎容􅀍公服兩郡守耳何所統攝乎以公名家暁兵􅀂吾不足以指麾則當赴闕不然吾且署職名以兵法從事矣聽曰唯公所命即署聽爲鄂岳都知兵馬使中軍先鋒行營馬歩都虞候三牒授之乃選卒六千屬聽戒其部校曰行營之事一决都}
