  - {type: variant, offset: 311, length: 1704, content: 左大都督從擒竇泰復弘農與沙苑之後並力戰有功遷車騎大將軍開封府長廣公亮以勇敢見知為當時名將并屢陳謀策多合機宜太祖謂之曰卿文武兼資即孤之孔明也乃賜名亮并賜姓侯莫陳氏出為東州刺史卒喪還京師太祖親臨之泣而謂人曰股肱喪矣腹心何寄又曰王傑本名文達太祖奇其才擢授楊烈將軍羽林監尋加都督太祖嘗謂諸將曰王文達萬人敵也但恐勇決太過耳復潼關破沙苑爭河橋戰邙山皆以勇敢聞親待日隆賞賜加於倫等於是賜姓宇文氏又曰于謹平江陵還太祖親至其第宴語極歡賞謹奴婢一千口及寶物并金石絲竹樂一部謹自以久當權望隆位功名既立願保優閑乃上先所乘駿馬及所著鎧甲等太祖識其意乃曰今巨猾未平公豈得便爾獨善遂不受又曰蔡祏字承先有膂力便騎射從征伐常潰圍陷陣為士卒先軍還之日諸將爭功祏終無所競太祖每歎之嘗謂諸將曰承先口不言勳孤當代其論敘其見知如此三國典略曰周高琳每征伐勇冠諸軍太祖謂之曰公即我之韓白也又曰胡僧祐為梁名將常以鼓吹置于齋中恒坐對之以自娛玩或諫之曰公名望隆重朝野具瞻此是羽儀可自居外僧祐曰我性愛之恒須見耳又曰北齊斛律金字阿六敦朔州勑部人光祿大夫郍瓌之子世敦直善騎射行兵用匈奴法望塵識馬步多少嗅地知軍度遠近神武戒文襄曰有讒此人者勿信之文宣嘗與金宴射親持矟走馬以擬金胸者三金堅不動賜帛千疋因過其宅置酒作樂北史曰隋文帝嘗從容命高頴與賀若弼言及平陳事頴曰賀若弼先獻十策後於蔣山苦戰破賊臣文吏耳焉敢與將論功帝大笑時論嘉其有讓又曰周將王思政久經軍旅每戰唯著破衣弊甲敵人疑非將帥故得免又曰韓果從平竇泰於潼關周文依其規畫軍以勝返賞真珠金帶一腰隋書曰李密父寬驍勇善戰幹略過人自周及隋數經將領至柱國蒲山郡公號為名將又曰史萬歲少英武善騎射驍捷若飛好讀兵書兼精占候又曰宇文忻每參帷幄出入臥內禪代之際忻有力焉後拜右領軍大將軍恩賜彌重忻妙解兵法馭戎齊整當時六軍有一善事雖非忻所建在下輒相謂曰此必忻法也其見推服如此又曰薛世雄性廉謹凡所行軍破敵之處秋毫無犯帝由是嘉之帝嘗從容謂群臣曰我欲舉好人未知諸君識不群臣咸曰臣等何能測聖心帝曰我欲舉者薛世雄群臣皆稱善帝復曰世雄廉正節概有古人之風於是超拜右翊衛將軍又曰楊玄感欲立名陰求將領謂兵部尚書叚文振曰玄感世荷國恩寵踰涯分自非立効邊裔何以塞責若方隅有風塵之警庶得執鞭行陣少展絲髮之功明公兵革是司敢布心腹文振因言於帝帝嘉之顧謂群臣曰將門必有將相門必有相故不虛也於是賚物千叚禮遇益隆又曰突厥入朝上賜之射突厥一發中的上曰非賀若弼無能當此於是命弼弼再拜而呪曰若赤誠奉國者當一發破的如其不然發不中也既射一發而中上大悅顧謂突厥曰此人天賜我也唐書曰劉黑闥為竇建德將奇兵東西揜襲多所剋獲每臨危難而色不變軍中號為神勇又曰屈突通平薛仁果之際寶物山積諸將爭取通一無所犯高祖聞之曰通清正奉國著於終始名下定不虛也賜金銀六百兩雜綵千叚又曰右武候將軍張士貴破反獠而還太宗勞之曰聞公親蒙矢石為士卒先雖古名將無以加也朕嘗聞以身報國者不顧性命嘗聞其語未覩其實於公方見之矣又曰文德皇后之葬也叚志玄與宇文化及分統士馬出宿於章武門太宗夜使宮官至三將軍處宇文士及營內使者志玄閉門不內曰軍門不可夜開使者曰此有手勑志玄曰夜中不辯真偽竟停使者至曉太宗聞而歎曰此真將軍也周亞夫何以加焉又曰霍王元範高祖第十四子也母曰張美人元範少善騎射初為吳王時嘗從太宗遊獵遇群獸命射之矢不虛發獸無遺者太宗撫其背曰汝才藝過人恨今無所施耳當天下未定我得汝豈不安乎又曰王君廓統兵經略東都王世充將郭士行許羅漢前後入掠君廓輒擊退之拜右武衛將軍詔勞之曰卿以十三人破賊一萬自古以少擊眾未之前聞非唯驍勇絕人亦足以顯卿忠節也又曰突厥入寇王君廓邀擊破之俘斬二千餘人獲馬十五疋高祖聞而大悅徵之入朝賜與御馬令殿廷乘之而出又謂侍臣曰吾聞藺相如叱秦王目皆出血君廓往擊建德將出戰徐勣遏之君廓憤發大呼目及鼻耳一時流血此之壯氣何謝古人不可以常例賞之復賜錦袍金帶還領幽州又曰高宗時吐蕃陷安西四鎮長壽初蕃軍逼安西府則天令武威軍總管王孝傑將軍阿史那忠節等率師拒之孝傑至安西合戰屢捷大破蕃軍收復龜茲于闐踈勒碎葉四鎮而還則天大悅謂侍臣曰昔貞觀年中俱統得此蕃域其後西陲不守並陷吐蕃今既復舊邊境自然無事孝傑建茲功効竭盡款誠遂能裹足徒行身與士卒齊力如此忠懇深足可嘉遷左衛, SBCK: ''}
