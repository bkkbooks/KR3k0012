  - {type: variant, offset: 3017, length: 147, content: 萬馳沙漠驅戎狄立功建號耳何能作愽士耶荊州記曰鄧遐襄陽人也勇力絕人歷位冠軍將軍數郡太守號名將袁子世說曰呂布之破也太祖給眾官車乘使取軍中物唯所欲眾人皆重載唯袁渙取書數百卷資糧而已眾人聞之大慚劉向新序曰孫武樂毅之徒皆前世之賢將也久遠深奧其事難知至於吳漢近時人耳起於販馬立為良將乘名竹帛天下歸德此可慕也, SBCK: 七}
