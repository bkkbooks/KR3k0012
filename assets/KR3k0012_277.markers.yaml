  - {type: variant, offset: 2020, length: 0, content: '', SBCK: 征虜將軍劉藻渉獵羣籍美談􅀏善與人交飲酒至一石不亂後周書曰宇文顯和性矜嚴頗渉經史膂力絶人彎弓數百斤能左右馳射又曰賀拔勝長於喪亂之中尤攻武藝走馬射飛鳥十中其五六太祖每云諸將對敵神色皆動唯賀拔公臨陣如平常眞大勇也自居任始愛墳籍乃招引文儒討論義理性又通率重義輕財身死之日唯隨身兵仗及書千餘卷隋書曰髙祖有平南之志訪可任者髙頴曰朝臣之内文武才幹無出賀􅀂弼者髙祖曰得之矣於是拜弼爲呉郡㹅管委以平陳之事弼忻然以爲己任與壽州㹅管源雄並爲重鎮弼遺雄詩曰交河驃􅀐幕合浦伏波營勿使騏驎上無我二人名獻取陳十䇿上稱善賜以寳刀又曰周羅㬋􅀄仕陳爲太子左衛率信任逾重時叅宴席陳王曰周左率武將詩毎前成文士何爲後也都官尚書孔範對曰周羅㬋執筆製詩還如上馬入陣不在人後自是益見親禮又曰于仲文討髙麗大破之至鴨渌水髙麗將乙支文德詐降來入其營仲文先奉宻旨􅀂遇髙一支文德者必擒之至是文德來仲文將執之時尚書右丞劉士龍爲慰撫使固止之仲文遂捨文德㝷悔遣人紿文德曰更有言議可復求也文德不從遂濟仲文選􅀐渡水追之每戰破賊文德遺仲文詩曰神䇿究天文妙筭窮地理戰勝功旣髙知足願云止仲文荅書諭之文德燒柵而遁唐書曰調露元年突厥阿史德温傳叛單于府所管二十四州皆叛應之單于都護蕭嗣業率兵討之􅀍阿史德掠其粮車兵多餓死由是大敗朝廷憂之遣禮部尚書裴行儉爲定襄道行軍大惣管率諸軍三十万進討行儉至朔州知賊掠嗣業粮運得勝乃爲粮車三百乗毎車伏猛士五人持陌刀勁弩又以羸兵數百援之兼伏精兵於險阨處虜見粮車果大至羸兵􅂊闘棄車而走賊驅車就泉井解鞍牧馬方擬取粮車中壯士齊發虜衆大駭奔散伏兵險發虜􅀐擒戮殆盡自是續遣粮車虜望之不敢逼粮餉旣通進兵屢捷行儉終擒温傳再平突厥又曰婁師德弱冠進士擢第累􅀘監察御史上元􅀄吐蕃犯塞有詔募猛士以討之師德抗表應募請爲猛士擊虜髙宗太恱特假朝散大夫從軍西討頻立戰功遷殿中改授金吾將軍豊州都督則天降書勞之曰卿受委北垂㹅司軍任往還靈夏撿校屯田収率旣多京抵遽積不煩和糴之費無復轉輸之勞兩軍鎮兵咸得攴給覽之嘉尚忻恱良􅀷召爲夏官侍郎俄拜鳯閣侍郎同平章事改納言又曰婁師德頗有學術器量寛厚喜怒不形於色專綜邊任三十餘年恭勤接下孜孜不怠當危亂之時族滅者相繼師德出將入相能以功名始終識者多之又曰永徽中}
