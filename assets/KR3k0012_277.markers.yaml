  - {type: variant, offset: 2723, length: 0, content: '', krp: 元和中以裴度征淮西詔曰輔弼之臣軍國是頼興化致理秉鈞以居取威定功則分閫而出所以同君臣之體一中外之任焉屬者問罪汝南致誅淮右盖欲刷其汚俗弔彼頑人雖挈地求生者實繁有徒而嬰城執迷者未翦其類何獸困而猶闘豈鳥窮之無歸歟由是遥聽鼓鼙更張琴瑟煩我台席董兹戎旃朝議大夫守中書侍郎同平章事飛騎尉賜金魚袋裴度爲時降生恊朕夢卜精辦宣力堅明納忠當軸而才謀老成運籌而智略有定司其樞務備知四方之事付以兵要必得万人之心是用禱於上玄練此吉日帶丞相之印綬所以尊其名賜諸侯之斧鉞所以重其命尓冝布清問恢壯猷感勵連營蕩乎多壘招懷孤疾字撫夷傷况淮西一軍素効忠節過海赴難史冊書勲建中𥘉攻破襄陽擒滅崇義比者脅於凶逆歸命無由每念前勞常思安撫所以内輟輔臣俾爲帥率實欲保全慰諭各使得冝往欽哉無越唐書曰太尉}
