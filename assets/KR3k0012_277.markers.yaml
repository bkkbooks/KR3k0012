  - {type: variant, offset: 10, length: 0, content: '', krp: 馮奉丗以艮家子選爲將年四十餘乃學春秋渉大義讀史書後漢書曰馬援閑於進對尤善述前丗行事每言及三輔長者下至閭里少年皆可觀聽自皇太子諸}
  - {type: variant, offset: 11, length: 3, content: 思政初, SBCK: 侍聞者莫不屬耳忘倦又善兵䇿帝常言伏波論兵與我意合毎有所謀未嘗不用又曰􅀕遵爲將軍取士皆用儒術對酒設樂必雅歌投壷雖在軍旅不忘爼豆又曰賈復少好學習尚書事舞隂李生李生竒之謂門人曰賈君之容皃志氣如此而勤於學將相之器也又曰賈復知帝欲偃干戈修文德不欲功臣擁衆京師乃與髙宻侯鄧禹並剽甲兵敦儒學廣雅曰剽削也謂除甲兵東觀漢記曰復闔門養威重授易經起大義帝􅀷然之遂罷左右將軍復以侯就第加位特進呉書曰魯肅爲人方嚴寡於玩飾内外節儉不務俗好治軍整頓禁令必行雖在軍陣手不釋書又善談論能屬文辭逺有過人之明周瑜之後肅爲之冠也晉書曰杜預身不跨馬射不穿札而毎有大事輙居將帥之列又曰劉毅征盧循敗歸帝大宴於西池有詔賦詩毅詩云六國多雄士正始出風流毅自以武功不競故示文雅有餘也又載記曰石勒雅好文學雖軍旅常令儒生讀史書而聽之每以其意論古帝王善惡朝賢儒士聽者莫不美焉嘗使人讀漢書聞酈食其勸立六國後大驚曰此法當失何得遂成天下至留侯諌乃曰頼有此耳宋書曰沈慶之嘗對上爲詩令僕射顔師伯執筆慶之口占曰微生值多幸得逢時運昌老朽䈥力盡徒歩還南崗辭榮此聖代何愧張子房並歎其辭意之美梁書曰曹景宗大破魏軍振旅凱}
