  - {type: variant, offset: 12, length: 2, content: 政初, WYG: 𢎞逺有過人之明周瑜之後肅為之冠也晉書曰杜預身不跨馬手不穿札而每在大事輒居將帥之列又曰劉毅征盧循敗歸帝大宴于西池有詔賦詩毅詩云六國多雄士正始出風流毅自以武功不競故示文雅有餘也又載記曰石勒雅好文學雖軍旅中常令儒生讀史書而聴之每以其意論古帝王善惡朝賢儒士聴者莫不美焉嘗使人讀漢史書聞酈食其勸立六國後大驚曰此法當失何得遂成天下至留侯諌乃曰頼有此耳宋書曰沈慶之嘗對上為詩令僕射顔師伯執筆慶之口占曰㣲生值多幸得逢時運昌老朽筋力盡徒歩還南岡辭榮此聖代何愧張子房並歎其辭意之美梁書曰曹景宗大破魏軍振旅凱}
