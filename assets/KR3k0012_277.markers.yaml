  - {type: variant, offset: 2033, length: 118, content: 發高宗出甲令仁貴射之射穿五重九姓眾十餘萬令驍健十人逆來挑戰仁貴發三箭中三人其餘下馬請降並坑之更就磧北安撫餘眾而還軍中歌曰將軍三箭定天山將士長歌入漢關又曰劉仁軌顯慶四年出為青州刺史五年大軍征遼令仁軌監統水軍以後期免特令以白衣隨軍自効尋撿校, SBCK: 攝}
