  - {type: variant, offset: 976, length: 1, content: 稱, WYG: 丞相乙渾謀逆顯祖年十三居于諒闇太后宻定大策誅渾遂臨朝聽政及高祖生太后躬親撫養是後罷令不聽政事太后行不正内寵李奕顯祖因事誅之太后不得意顯祖暴崩時言太后為之也承眀元年尊號曰太皇太后復臨朝聽政事太后性聰逹自入宫掖粗學書計及登尊極省决萬機高祖詔曰朕以虛寡㓜纂寳厯仰恃慈明緝寕四海欲報之德正覺是憑諸鷙鳥傷生之類宜放山林其以此地為太皇太后經始靈塔於是罷鷹師曹以其地為報徳佛寺太后與高祖㳺於方山顧瞻川阜有終焉之志謂羣臣曰舜塟蒼梧二妃不從豈必逺祔山陵然後為貴哉吾百年之後神其安此高祖乃詔有司營建壽陵於方山又起}
  - {type: page-break, offset: 976, content: '', id: KR3k0012_WYG_139-8a, image: WYG0894/WYG0894-0289a.png}
  - {type: page-break, offset: 976, content: '', id: KR3k0012_WYG_139-8b, image: WYG0894/WYG0894-0289b.png}
  - {type: variant, offset: 978, length: 5, content: 安宮明帝毛, WYG: 固石室将終為清廟焉刋石立碑頌太后功徳太后以高祖富於春秋乃作勸戒歌三百餘章又作皇誥十八篇太后又制内屬五廟孫外戚六親緦麻皆受復除性儉素不好華飾御縵繒而已太后多智畧猜忌能行大事是以威福兼作震動内外故王遇張祐符承祖等拔自微閹嵗終而至王公王叡出入卧内數年之間便為宰輔賞賚財帛以千萬億計金書鐡劵許以不死之誓李冲雖以器能受任亦由見寵帷幄宻加賞賚不可勝數太后與髙祖幸靈泉池燕羣臣及藩國使臣諸方渠師各令為其方舞高祖率羣臣上壽太后忻然作歌高祖亦和歌遂命羣臣各言其志於是和歌者九十人太后外禮民望元丕㳺眀根等頒賜金帛輿馬毎至褒美叡等皆引丕等而叅之以示無私也十四年崩於太和殿年四十九其日有雄雉集於太華殿高祖酌飲不入口五日毁慕過禮諡曰文眀太皇太后葬於永固陵高祖毁瘠絶酒肉不御内者三年初高祖孝於太后乃於永固陵東北里餘營壽宫有終焉瞻望之志及遷洛陽乃自表瀍西以為山園之所而方山虗宫石室至今猶存號曰千年堂文成李}
