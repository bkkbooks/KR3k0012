  - {type: variant, offset: 997, length: 1, content: 以, WYG: 母頓丘王峻之妹也后之生也有異於常父方叔恒云此女當大貴及長姿質美麗世祖征永昌王仁出壽春軍至后宅因得后及仁鎮長安遇事誅后與其家人送平成宫高祖登白樓望見之謂左右曰此婦人佳乎左右咸曰然乃下臺后得幸於齋庫中遂有娠常太后後問后后云為帝所幸仍有娠時守庫者亦私書壁記之别加騐問皆相符同生顯祖拜貴人薨後諡曰元皇后葬金陵配饗太廟獻文李皇后後魏書曰獻文思皇后李氏中山安喜人南郡王惠之女也姿徳婉淑年十八}
