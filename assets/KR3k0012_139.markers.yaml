  - {type: variant, offset: 1016, length: 2, content: 同輦, WYG: 北平公夙文明太皇太后欲家世貴寵乃簡熈二女俱入掖庭時年十四其一早卒后有姿媚偏見愛幸未幾疾病文明太后下詔遣還家為尼髙祖獨留念焉嵗餘而文明太后崩髙祖服終後頗存訪之聞后素疾痊除遣璽書勞問遂迎赴洛陽}
