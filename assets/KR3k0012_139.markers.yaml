  - {type: variant, offset: 3683, length: 2, content: 憂逼, SBCK: 髙祖富於春秋乃作勸戒歌三百餘章又作皇誥十八篇太后又制内屬五廟之孫外戚夲親緦麻皆受復除素儉性不好華飾躬御縵繒而太后多智略猜忌能行大事是以威福兼作震動内外故王遇張祐符丞祖等拔自微閹􅀊中而至王公王叡出入卧内數年之間便爲宰輔賞賚財帛以千萬億計金書鐵劵許以不死之誓李冲雖以器能受任亦由見寵帷幄宻加賜賚不可勝數太后曽與髙祖幸靈泉池醼羣臣及蕃國使人諸方渠帥各令爲其方舞髙祖率羣臣上壽於太后忻然自歌髙祖亦和歌遂命羣官各言其志於是和歌者九十人太后外禮民望元丕游明根等頒賜金帛輿馬每至褒羙叡等皆引丕等而參之以示無􅀻也十四年}
