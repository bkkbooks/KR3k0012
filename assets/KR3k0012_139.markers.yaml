  - {type: variant, offset: 257, length: 106, content: 后以漢延熹三年生齊郡白亭有黃氣滿室移日父敬侯怪之以問卜者王旦旦曰此吉祥也為太后見外親不假以顏色常言居處當務節儉不當妄賞賜念自勉也帝為太后弟秉起第及成太后幸弟請諸家外親設下廚無異膳太后左右菜食粟飯無魚肉其儉如此文甄, SBCK: 道武}
  - {type: variant, offset: 257, length: 0, content: '', WYG: 道武皇后慕容氏寳之季女也中山平後入充掖庭得幸左丞相衛王儀等奏請立后帝從羣臣后鑄金人成乃立之告於廟封后母孟為溧陽君後崩道武劉皇后後魏書曰道武宣穆皇后劉眷女也登國初納為夫人生華隂公主後生明元后專理内事寵待有加鑄金人不成故不得登后位魏故事後宫産子将為儲貳其母皆賜死道武末年}
