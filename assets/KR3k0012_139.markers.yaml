  - {type: page-break, offset: 39, content: '', id: KR3k0012_SBCK_139-2b}
  - {type: variant, offset: 40, length: 1, content: 隨, SBCK: 魏書曰昭成皇后慕容氏慕容天眞之女也有寵生獻明帝及秦明王后性聦敏多智沉厚善決斷專理内每事多從建國二十三年崩太祖即位配饗太廟獻明賀皇后後魏書曰獻明皇后賀氏父野干東部大人后少以容儀選入東宫生太祖符洛之内侮也后與太祖及故臣民避難北徙俄而髙車奄來抄掠后乗車與太祖避賊而南輅失轄后懼仰天告曰國家㣧胄豈正爾絶滅也唯神靈扶􅂇遂馳輪正不傾而免難其後劉顯使人將害太祖帝姑爲顯弟亢埿妻知之宻以告后后乃令太祖去之后夜飲顯使醉之向晨故驚廐中羣馬使起視馬后泣而謂曰吾諸子始皆在此今盡亡失汝等誰殺之也故顯不使急追}
  - {type: variant, offset: 40, length: 1, content: 隨, WYG: 魏書曰昭成皇后慕容氏慕容皝之女也有寵生獻眀帝秦明皇后性聰敏多智沉厚善决㫁專理内事每事多從建國二十三年崩}
  - {type: variant, offset: 40, length: 1, content: 隨, krp: 魏書曰昭成皇后慕容氏慕容天眞之女也有寵生獻明帝及秦明王后性聦敏多智沉厚善決斷專理内每事多從建國二十三年崩太祖即位配饗太廟獻明賀皇后後魏書曰獻明皇后賀氏父野干東部大人后少以容儀選入東宫生太祖符洛之内侮也后與太祖及故臣民避難北徙俄而髙車奄來抄掠后乗車與太祖避賊而南輅失轄后懼仰天告曰國家㣧胄豈正爾絶滅也唯神靈扶助遂馳輪正不傾而免難其後劉顯使人將害太祖帝姑爲顯弟亢埿妻知之宻以告后后乃令太祖去之后夜飲顯使醉之向晨故驚廐中羣馬使起視馬后泣而謂曰吾諸子始皆在此今盡亡失汝等誰殺之也故顯不使急追}
