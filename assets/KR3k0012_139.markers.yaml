  - {type: variant, offset: 1455, length: 619, content: 后景懷夏侯皇后晉書曰景懷夏侯皇后沛國譙人也父尚魏征南大將軍母曹氏魏德陽鄉主后雅有識度帝每有所為必預籌畫魏世宣帝居上將之重諸子並有雄才大略后知帝非魏之純臣而后既魏氏之甥帝深忌之青龍三年以鴆崩武帝登祚始加號謚文明王皇后王隱晉書曰文明皇后王肅女秉德清貞體行純和八歲誦詩論特精喪服茍有文義過目則識祖司徒朗異之曰興吾家者必此女矣惜不為男每居大喪常身不勝衣及鍾會見任言於文帝曰會好為事端寵過必獘太始元年尊曰皇后宮曰崇禮自即尊位眷戀素業忽棄華麗四年薨晉書曰后諱元姬年十二祖朗薨后哀慼哭泣發於自然其父益加敬異既笄歸于文帝生武帝武元楊皇后晉書曰楊元后父炳言后相貴故文帝為武帝娶之生惠帝武帝疑惠帝不堪奉大統密以語后后曰立嫡以長不以賢豈可動乎帝採諸葛冲等五十人入殿呈露面常衣令后選取后不取端正唯取長白時卞藩女有美色帝舉扇鄣面語后曰藩女可后曰藩三世皇后不宜枉以卑位其中者以絳紗繫臂遂取胡芳芳啼哭左右曰陛下聞聲芳曰死且不畏何畏陛下帝壯其言父奪聞女中亦哭曰老奴不死唯有二兒男在九地之下女在九天之上帝拜芳為貴嬪元后疾甚見上素敬胡夫人恐立之又慮太子不安臨終枕帝膝曰從妹男涓有德色不足復娶異姓帝許之崩于光明殿武悼楊皇后晉氏后妃列傳曰后諱芷字季蘭小字男涓武帝繼室也太傅楊駿女咸寧二年即后位婉嫕音翳才色映椒房寵禮尤隆后無子賈庶人為太子妃時數以肆情忌嫉失帝意帝慮始終之事欲廢焉后為妃陳請曰賈公有勳於王府猶將數世宥之況賈妃親則其子夫妬忌亦婦人之常事不足以一眚而忘大德帝納焉晏駕尊曰, WYG: ''}
