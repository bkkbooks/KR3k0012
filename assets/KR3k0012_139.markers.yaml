  - {type: variant, offset: 1003, length: 2, content: 帝時, WYG: 元年追崇號諡配饗太廟孝文林皇后後魏書曰孝文貞皇后林氏平凉人叔父金閭起自閹宦有寵於常太后位至尚書封平凉公金閭兄勝}
  - {type: variant, offset: 1007, length: 2, content: 原王, WYG: 凉太守金閭顯祖初為定州刺史未幾為乙渾所誅兄弟皆死勝無子有二女入掖庭后容色美麗得幸於高祖生皇子恂音荀将為儲貳太和七年后依舊制薨諡曰貞皇后葬金陵及恂以罪賜死有司奏廢后為庻人孝文廢馮皇后後魏書曰孝文廢皇后馮氏太師熈之女太和十七年立為后高祖遵經典禮后及夫人嬪妃以下妾御皆以次}
