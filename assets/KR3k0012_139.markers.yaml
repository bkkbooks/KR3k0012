  - {type: variant, offset: 1168, length: 0, content: '', WYG: 乘輕車冐霖雨赴懸瓠奉謁髙祖自陳本意因言后與菩薩亂状髙祖聞之因駭愕未之全信而秘匿之惟彭城王侍疾於左右具知其事後后漸憂懼與母常氏求託女巫禱厭無所不至願髙祖疾不起一旦得如文明太后輔少主稱令者賞報不貲乃取三牲宫中妖祠假言祈福専為左道髙祖自豫州北幸鄴后慮還見治檢彌懐危怖驟令閹人託參起居皆賜之衣服慇懃寄託勿使泄漏亦令雙蒙參行皆其信者也惟小黄門蘇興夀宻陳委曲髙祖問其本末勑以勿泄至洛執問菩薩雙􅂪等六人迭相証舉具得情状髙祖以疾卧含温室夜引后并列菩薩等於戸外臨入令捜衣中稍有寸刄便斬后頓首泣謝乃賜坐東楹去御筵二丈餘髙祖令菩薩等陳状又讓后曰汝母有妖術可具言之后乞屏左右有所宻啓髙祖勑中常侍悉出唯令長秋卿白整在側后猶不言髙祖乃令以綿堅塞整耳小語呼整再三無所應乃命后言隱事人莫知之髙祖乃呼彭城北海二王令入坐言昔是汝嫂今乃他人但入勿避二王固辭不獲命及入髙祖云此老嫗乃欲白刃挿我肋上汝可窮問本末勿有所難髙祖深自引過致愧二王又曰馮家女不得復相廢逐且使在宫中空坐有心乃能自死汝等勿謂吾猶有情也髙祖素至孝猶以文明太后故未便行廢良乆二王乃出}
