  - {type: variant, offset: 21, length: 0, content: '', SBCK: 以成者爲􅁻不成則不得立也又丗祖髙宗縁報母劬勞之恩極尊崇之義雖事乖典禮而觀過知仁魏神元竇皇后後魏書曰神元竇皇后没鹿回部大人賔之女賔臨終誡其二子速侯回題令其善事帝及賔卒速侯等欲因帝㑹喪爲變語頗漏泄帝聞之知其終不奉順乃先圖之於是使勇士於中營晨起以佩刀殺后馳使告速侯等言曰后􅁀崩速侯等驚走赴因執而殺之文封皇后後魏書曰}
  - {type: variant, offset: 21, length: 0, content: '', WYG: 以成者為吉不成則不得立也又世祖高宗縁保母劬勞之恩極尊崇之意雖事乖典禮而觀過知仁魏神元竇皇后後魏書曰神元竇皇后沒鹿回部大人賔之女賔臨終誡其二子速侯回題令其善事帝及賔卒速侯等欲因帝會喪為變語頗漏泄帝聞之知其終不順奉乃先圗之於是使勇士於中宫晨起以佩刀殺后馳使告速侯等言曰后暴崩速侯等驚走赴因執而殺之文封皇后後魏書曰}
