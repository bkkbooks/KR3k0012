  - {type: variant, offset: 614, length: 680, content: 甄后每寢寐家中髣髴見人持玉衣覆其上者常共怪之相工劉良相后曰此女貴乃不可言后自少至長不好戲弄年八歲外有立騎戲馬者家人諸姊皆上閣觀之后獨不行年九歲喜書視字輒識數用諸兄筆硯兄謂后言汝當作女愽士耶后荅言聞古者賢女未有不覽前世成敗以為己誡不知書何由見之及為皇后寵愈隆而彌挹損每因閑宴常言昔黃帝子孫蕃育蓋由妾媵眾多獲斯可願廣求淑媛以豐繼嗣帝心喜焉文郭皇后魏志曰文德郭皇后安平廣宗人也祖世長吏后少而父永奇之曰此乃吾女中王也遂以女王為字早失二親喪亂流離沒在銅鞮侯家太祖為魏公時得入東宮后有智數時有所獻納文帝定為嗣后有謀焉太子即王位后為夫人及踐祚為貴嬪甄后之死由后之寵也遂立為后黃初五年帝東征后留許昌永始臺時霖雨百餘日城樓多壞有司奏請移止后曰昔楚昭王出遊貞姜留漸臺江水至使者迎而無符不去卒沒今帝在遠吾幸未有是患而便移止奈何明帝即位尊后為皇太后稱永安宮明帝毛皇后魏志曰明帝悼毛皇后河內人以選入東宮明帝時為平原王進御有寵出入與同輦及即位立為皇后初明帝為王始納河內虞氏為妃帝即位虞氏不得立卞太后慰勉焉虞氏曰曹氏好立賤未有能以義舉者也嘉本典車工卒暴富貴舉動甚𧈪駭侯楷切語輒自稱侯身人以為笑帝之幸郭皇后也后愛寵日衰景初元年帝遊後園召才人以上宴樂左右宜延皇后帝不許乃禁左右使不得宣后知之明日帝見后后曰昨日遊宴北園樂乎帝以左右泄之所殺十餘人賜后死然猶加謚葬愍陵明帝郭皇后魏志曰明帝郭皇后西平人也世河右大族黃初中本部反叛遂沒入宮明帝即位甚見愛幸拜為夫人帝疾因遂立為皇后齊王即位尊后曰皇太后稱永寧宮值三主幼弱宰輔親政與奪大事皆先啟太后然後施行母丘儉鍾會等假其命以為亂焉景元四年崩晉宣穆張皇后晉書曰, SBCK: 道武}
