  - {type: variant, offset: 1744, length: 235, content: 堪奉大統密以語后后曰立嫡以長不以賢豈可動乎帝採諸葛冲等五十人入殿呈露面常衣令后選取后不取端正唯取長白時卞藩女有美色帝舉扇鄣面語后曰藩女可后曰藩三世皇后不宜枉以卑位其中者以絳紗繫臂遂取胡芳芳啼哭左右曰陛下聞聲芳曰死且不畏何畏陛下帝壯其言父奪聞女中亦哭曰老奴不死唯有二兒男在九地之下女在九天之上帝拜芳為貴嬪元后疾甚見上素敬胡夫人恐立之又慮太子不安臨終枕帝膝曰從妹男涓有德色不足復娶異姓帝許之崩于光明殿武悼楊皇后晉氏后妃列傳曰后諱芷字季蘭小字男涓武帝繼室也太傅楊駿女咸寧二年即, SBCK: 得登}
