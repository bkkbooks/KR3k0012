  - {type: variant, offset: 3911, length: 652, content: 年崩于顯陽殿簡文鄭皇后晉中興書曰簡文宣太后鄭氏諱阿春滎陽人先適田氏生一男夫又亡后依於舅吳氏中宗為丞相敬后先崩將納吳氏女為夫人后及吳氏女並遊後園有見之者言於中宗曰鄭氏女雖嫠居賢於吳氏遠矣遂以德色納為夫人甚有寵后雖貴幸而恒有憂色中宗問其故對曰妾有妹中者適長沙王襃餘二妹未出恐姉既為人妾無復求者中宗從容謂劉隗曰鄭氏有二妹卿可求佳對使不失舊隗舉其從子傭娶第三者以小者適漢中李氏皆得舊門帝稱尊號后雖為夫人詔太子及東海武陵王皆母事之帝崩后稱建平園夫人咸和元年薨孝武李太后晉書曰孝武李太后諱陵容本出微賤始簡文帝為會稽王有三子廢黜早夭其後諸姬絕孕將十年帝令卜者扈謙筮之曰後房中有一女當育二貴男其一終盛晉室乃令善相者召諸愛妾而示之皆云非其人又悉以諸婢媵示焉時后為宮人在織坊中形長而色黑宮人皆謂之崑崙既至相者驚云此其人也帝以大計召之侍寢后數夢兩龍枕膝日月入懷帝聞異焉遂生孝武帝王皇后晉中興書曰孝武定皇后王氏字法惠寧康三年中軍將軍柏冲侍中臣康奏晉陵太守王蘊女天性柔順惠心塞淵儀度既同四業允備且盛德之兆美善先積參議可以配德乾元恭承宗廟貞進六宮母儀天下故烈宗納焉后性嗜酒驕妬帝深患之乃召蘊於東堂具說后過狀令加訓誡蘊免冠謝焉后於是少自改飾太元五年崩安帝陳太后晉中興書曰安德太后陳氏松滋人也諱歸女父廣以倡進仕至平昌太守后以美色能歌彈入宮初為淑媛生安恭二帝太元十五年薨贈夫人追崇曰皇太后恭帝褚皇后晉書曰恭思褚皇后諱靈媛河南陽翟人義興太守爽之女也后初為琅邪王妃元熙元年立為皇后生海鹽富陽公主及帝禪位于宋降為零陵王妃宋元嘉十三年崩祔葬冲平陵, WYG: ''}
