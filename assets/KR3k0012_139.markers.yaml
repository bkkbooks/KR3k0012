  - {type: variant, offset: 31, length: 0, content: '', SBCK: 餘萬人有司以聞命藏之太廟次妃蘭氏生二子長子曰藍早卒次子思帝也桓維皇后後魏書曰桓帝后維氏生三子長曰普根次惠帝次煬帝平文崩后攝國事時人謂之曰女國后性猛忌平文之崩后所爲也平文王皇后後魏書曰平文皇后王氏廣寗人平十三因事入宫得幸於平文生昭成平文崩昭成在襁褓時國有内難將害諸皇子后匿帝於袴中懼人知祝曰􅀂天祚未終者汝便無聲遂良乆不啼得免於難烈帝之崩國祚殆危興復大業后之力也十八年崩葬雲中金陵}
