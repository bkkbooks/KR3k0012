  - {type: variant, offset: 66, length: 116, content: 太祖左右在洛者皆歸后止之曰曹君吉凶未定未可知今日還家明日若在何面目復相見也正使禍至共死何苦遂從后言太祖聞而善之建安初丁夫人廢遂以后為繼室諸子無母者太祖皆命后養之文帝為太子左右長御賀后曰將軍拜太子天下莫不忻喜后當傾府藏賞賜后曰王自以丕, SBCK: ''}
