  - {type: variant, offset: 3846, length: 4, content: 為琅邪王, SBCK: 掖庭后容色美麗得幸於髙祖生皇子恂音荀將爲儲貳太和七年后依舊制薨謚曰貞皇后葬金陵及恂以罪賜死有司奏廢后爲庶人孝文廢皇后後魏書曰孝文廢后馮氏太師熈之女太和十七年立爲后髙祖遵經典禮后及夫人嬪巳下接御皆以次進車駕南伐后留京師髙祖又南伐后率六宫遷洛陽及后父熈兄誕薨髙祖爲書慰以叙哀情及車駕還洛恩遇甚厚髙祖後重引后姉昭儀至洛稍有寵后禮愛漸衰昭儀自以年長且前入宫掖素見待念輕后而不率妾禮后雖性不妬忌時有愧恨之色昭儀規爲内主讃搆百端尋詔廢爲庶人后貞謹有德操遂爲練行尼孝文馮皇后後魏書曰孝文幽皇后亦馮熈女也母曰常氏本微賤得幸於熈元}
