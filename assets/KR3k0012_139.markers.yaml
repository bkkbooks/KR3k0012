  - {type: variant, offset: 1013, length: 1, content: 出, WYG: 后禮愛漸衰昭儀自以年長且前}
  - {type: variant, offset: 1015, length: 0, content: '', WYG: 宫掖素見待念輕后而不率妾禮后雖性不妬忌時有愧恨之色昭儀規為内主譛搆百端尋詔廢后為庻人后貞謹有徳操遂為練行尼後終於瑶光佛寺孝文馮皇后後魏書曰孝文幽皇后亦馮熈女也母曰常氏本㣲賤得幸於熈熈元妃公主薨後遂主家事生后}
