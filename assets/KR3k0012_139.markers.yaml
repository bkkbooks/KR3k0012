  - {type: variant, offset: 2223, length: 1687, content: 有四謚曰武悼皇后晉後略曰賈后既殺楊庶人於金墉城又信妖巫謂人既死必訴怨於先帝乃覆而殯之施諸厭劾符書藥物以合瘞之惠帝賈皇后王隱晉書曰后諱南風武帝謀太子婚久不決上欲娶衛瓘女元后欲娶賈充女上曰衛女有五可賈女有五不可衛家種賢而多子端正長白賈女種妬少子丑而短黑郭槐多輸寶物於后遂娶南風八年將納妃帝知太子不慧故試之盡召東宮官屬作飲食而密封詔使太子決停信待之賈妃大懼召人荅詔草給使張泓曰太子不學而荅詔引義必責草主更益譴負不如直以意荅妃大喜語泓便為我好荅得富貴與汝共之泓素有小才具草令太子自寫武帝大喜賈妃酷妬手擊數人或以刀戟擲孕妾子乃墮地上大怒治金墉城將殺之趙粲荀勗深救之故得不廢洛陽尉部小吏忽有好物尉疑為盜召詰之賈后踈親欲求盜物往聽對辭云先行逢一老嫗說家有疾師卜當得城南年少厭塞蹔相煩尋重報小吏從之上車下帷內著簾箱中行十餘里過六七門限開簾忽見樓閣好屋問此何處云天上即以香湯見浴好衣美食將入見一婦人年三十五六短小青黑色眉後有疵見留數日共宿得此眾物賈氏親踈聞其形狀如是賈后慚而去尉亦解意云時他人多殺之不出唯此小吏以愛得出賈后詐有身內藁物為產遂取妹夫韓壽兒託之諒闇所生故弗顯賈庶人臨廢遙喚帝曰陛下有婦使人廢之亦當自廢詔賜死沈約宋書曰齊王入廢后后驚曰卿何為來曰有詔收后后曰詔當從我出何詔也又問曰誰起事曰梁趙后歎曰繫狗當繫其頸今反繫其尾何得不然晉後略曰載賈后以廉車出承明東掖東門詣金墉城食金屑而死惠羊皇后臧氏晉書曰惠羊皇后諱獻容太山南城人也父玄之字弘猷永康元年立為皇后將入宮衣中有火永興元年河間王顒使將張方廢后於金墉城七月陳旿等唱伐成都王復后位八月張方又廢后十一月張方逼遷大駕幸長安留臺復后位永興二年張方又廢后河間王顒矯詔賜后死劉暾他昆切等上表后得免帝還洛迎復后位後洛陽令何喬又廢后懷帝即位尊后為惠皇后居弘訓宮洛陽敗沒于劉曜曜僣位以為皇后因問曰朕何如司馬家兒后曰胡可並焉陛下開基之聖主彼亡國之暗夫有一婦一子及身三耳不能庇之貴為帝王而妻子辱於凡庶之手妾爾時實不思生何圖復有今日妾生於高門嘗謂世間男子皆然自奉巾櫛已來始知天下有丈夫耳曜甚愛寵之生二子而死偽謚獻文皇后謝夫人附晉書曰謝夫人名玖本貧賤父以屠羊為業玖清惠貞正而有淑姿選入後庭為才人惠帝在東宮將納妃武帝慮太子未知帷房之事乃遣玖往東宮侍寢由是得幸有身賈后忌之求還西宮遂生愍懷乃立為大子拜玖為淑媛及愍懷遇酖玖亦被害焉永康初詔改葬太子因贈玖夫人印綬葬顯平陵懷王太后臧氏晉書曰懷王皇太后諱姬初入武帝宮拜中才人早崩懷帝即位追尊曰皇太后梁皇后臧氏晉書曰梁皇后諱蘭壁安定人也祖鴻季儀同三司父芬司徒后初為豫章王妃懷帝即位為皇后永嘉中沒胡賊元帝夏侯太妃晉書曰夏侯太妃名光姬沛國譙人也父莊淮南太守妃生自華宗幼而明慧琅耶武王為世子覲納焉生元帝元帝立稱王妃永嘉元年薨于江左葬琅耶國初有讖云銅馬入海建業期太妃小字銅環而元帝中興於江左矣元敬虞皇后晉書元敬虞皇后諱孟母濟陽外黃人父豫元帝為琅耶王納后為妃無子永嘉六年薨太興三年冊贈皇后璽綬柎于太廟晉書曰豫章君荀氏元帝宮人也初有寵生明帝及琅邪王伷音宙由是虞后所忌漸見踈薄明帝即位封建安君別立第宅太寧元年帝迎還臺內供奉隆厚及成帝立尊同於太后咸康元年薨詔曰朕少遭憫凶慈訓無稟撫育之勤建安君之仁也一旦薨殂實思報復永懷平昔感痛哀摧其贈豫章郡君別立廟于京都明帝庾皇后晉中興書曰明穆皇后庾氏諱文君左將軍琛第三女也后少以珪璋特異令儀淑美故中宗為肅祖納焉初為世子妃仁和有禮深見敬重后生顯宗成皇帝顯宗即位尊后曰皇太后群臣奏天子幼冲宜依漢和熹皇后故事后辭讓數四不得已遂臨朝攝萬機蘇峻作逆王師敗績后以憂逼崩時年三十三成恭杜皇后晉書曰成恭杜皇后諱陵陽鎮南將軍預之曾孫也成帝以后弈世名德咸康二年備禮拜為后后少有姿色然長猶無齒有來求昏者輒中止及納采之日一夜齒盡生七年三月后崩年二十一后在位六年無子先是三吳女子相與簪白花望之如素㮏傳言天公織女死為之著服至是而后崩康帝褚皇后晉中興書曰康獻皇后褚氏字蘇子太傅襃之女也后聰明有器識以名家女入為琅邪王妃生孝宗穆皇帝孝宗即位尊后曰皇太后泰元元年太后詔曰皇帝婚冠禮備遐邇宅心宜當陽親覽緝熙惟始今歸政事率由舊典於是復稱崇德太后, WYG: ''}
