  - {type: variant, offset: 2111, length: 610, content: 家不利殿中典兵中郎孟觀等遂進勸庶人有先唱者有福後發者受禍庶人遂陷誅后父駿三族及內外新屬遷后於永寧宮賈庶人尋諷百僚奏太后廢為庶人母龐付廷尉行刑詔初欲宥之卒不可事奏太后截髮稽顙稱以請母於賈庶人而龐遂見刑后不勝憂哀崩於幽宮春秋三十有四謚曰武悼皇后晉後略曰賈后既殺楊庶人於金墉城又信妖巫謂人既死必訴怨於先帝乃覆而殯之施諸厭劾符書藥物以合瘞之惠帝賈皇后王隱晉書曰后諱南風武帝謀太子婚久不決上欲娶衛瓘女元后欲娶賈充女上曰衛女有五可賈女有五不可衛家種賢而多子端正長白賈女種妬少子丑而短黑郭槐多輸寶物於后遂娶南風八年將納妃帝知太子不慧故試之盡召東宮官屬作飲食而密封詔使太子決停信待之賈妃大懼召人荅詔草給使張泓曰太子不學而荅詔引義必責草主更益譴負不如直以意荅妃大喜語泓便為我好荅得富貴與汝共之泓素有小才具草令太子自寫武帝大喜賈妃酷妬手擊數人或以刀戟擲孕妾子乃墮地上大怒治金墉城將殺之趙粲荀勗深救之故得不廢洛陽尉部小吏忽有好物尉疑為盜召詰之賈后踈親欲求盜物往聽對辭云先行逢一老嫗說家有疾師卜當得城南年少厭塞蹔相煩尋重報小吏從之上車下帷內著簾箱中行十餘里過六七門限開簾忽見樓閣好屋問此何處云天上即以香湯見浴好衣美食將入見一婦人年三十五六短小青黑色眉後有疵見留數日共宿得此眾物賈氏親踈聞其形狀如是賈后慚而去尉亦解意云時他人多殺之不出唯此小吏以愛得出賈后詐有身內藁物為產遂取妹夫韓壽兒託之諒闇所生故弗顯賈庶人臨廢遙喚帝曰陛下有婦使人廢之亦當自廢詔, SBCK: 皆}
