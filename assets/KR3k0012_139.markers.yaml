  - {type: variant, offset: 2825, length: 415, content: 山南城人也父玄之字弘猷永康元年立為皇后將入宮衣中有火永興元年河間王顒使將張方廢后於金墉城七月陳旿等唱伐成都王復后位八月張方又廢后十一月張方逼遷大駕幸長安留臺復后位永興二年張方又廢后河間王顒矯詔賜后死劉暾他昆切等上表后得免帝還洛迎復后位後洛陽令何喬又廢后懷帝即位尊后為惠皇后居弘訓宮洛陽敗沒于劉曜曜僣位以為皇后因問曰朕何如司馬家兒后曰胡可並焉陛下開基之聖主彼亡國之暗夫有一婦一子及身三耳不能庇之貴為帝王而妻子辱於凡庶之手妾爾時實不思生何圖復有今日妾生於高門嘗謂世間男子皆然自奉巾櫛已來始知天下有丈夫耳曜甚愛寵之生二子而死偽謚獻文皇后謝夫人附晉書曰謝夫人名玖本貧賤父以屠羊為業玖清惠貞正而有淑姿選入後庭為才人惠帝在東宮將納妃武帝慮太子未知帷房之事乃遣玖往東宮侍寢由是得幸有身賈后忌之求還西宮遂生愍懷乃立為大子拜玖為淑媛及愍懷遇酖玖亦被害焉永康初詔改葬太子因贈玖夫人印綬葬顯平陵懷王太后臧氏晉書曰懷王皇太后諱姬初入武帝宮拜中才人早崩懷帝, SBCK: 宗}
