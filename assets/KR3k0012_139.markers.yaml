  - {type: variant, offset: 4188, length: 297, content: 後房中有一女當育二貴男其一終盛晉室乃令善相者召諸愛妾而示之皆云非其人又悉以諸婢媵示焉時后為宮人在織坊中形長而色黑宮人皆謂之崑崙既至相者驚云此其人也帝以大計召之侍寢后數夢兩龍枕膝日月入懷帝聞異焉遂生孝武帝王皇后晉中興書曰孝武定皇后王氏字法惠寧康三年中軍將軍柏冲侍中臣康奏晉陵太守王蘊女天性柔順惠心塞淵儀度既同四業允備且盛德之兆美善先積參議可以配德乾元恭承宗廟貞進六宮母儀天下故烈宗納焉后性嗜酒驕妬帝深患之乃召蘊於東堂具說后過狀令加訓誡蘊免冠謝焉后於是少自改飾太元五年崩安帝陳太后晉中興書曰安德太后陳氏松滋人也諱歸女父廣以倡進仕至平昌太守后以美色能歌彈入宮初為淑媛生安恭二帝太元十五年薨贈夫人追崇曰, SBCK: 文昭}
