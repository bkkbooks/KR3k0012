  - {type: variant, offset: 875, length: 1, content: 及, WYG: 生恭宗神䴥音加元年薨追贈貴嬪塟雲中金陵後追加號諡配饗太廟景穆閭皇后後魏書曰景穆恭皇后郁久閭氏河東王毗妹也少以選入東宫有寵真君元年生高宗世祖末年薨高宗即位追尊號諡塟雲中金陵配饗太廟高宗乳母常氏本遼西人太延中以事入宫世祖選乳高宗慈和履順有劬勞保護之功高宗即位為保太后尋尊為皇太后謁於郊廟和平元年崩諡曰昭塟於廣寗磨笄山俗謂之鳴雞山太后遺志也文成馮皇后後魏書曰文成文明皇后馮氏父朗秦雍二州刺史西城郡公母樂浪王氏生后於長安有神光之異朗坐事誅后遂入宫世祖昭儀后之姑也雅有母徳撫飬教訓年十四高宗}
