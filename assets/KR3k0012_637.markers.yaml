  - {type: variant, offset: 2387, length: 0, content: '', SBCK: 業及廷尉杜友河南尹杜預散􅀐都尉成公綏尚書郎柳􅁤等典正其事朕每􅁥其用心常􅁣然嘉之今法律旣成始班天下刑寛禁簡足以克當先旨昔蕭何以定律受封叔孫通以制儀爲奉常賜金五百斤子弟皆爲郎夫立功立事古之所重自太􅀓車􅀐以下皆加禄賞其詳依故典又曰杜預與車􅀐將軍賈充等定律令旣成預爲之注解乃奏之曰法者盖繩墨之断例非窮理盡性之書曰故文約}
  - {type: variant, offset: 2387, length: 0, content: '', WYG: 業及廷尉杜友河南杜預散騎都尉成公綏栁軌等典正其事毎鑒其用心常慨然嘉之今法律既成始班天下刑寛禁簡足以克當先㫖昔蕭何以定律受封叔孫通以制儀為奉常賜金五百斤子弟皆為郎夫立功立事古之所重自太傅車騎以下皆加禄賞其詳依古典又曰杜預與車騎将軍賈充等定律令既成預為之注觧乃奏之曰法者蓋繩墨之斷例非窮理盡性之書也故文約}
