  - {type: variant, offset: 767, length: 348, content: 貞觀中制古者行刑君為徹樂減膳今庭無恒設之樂莫知何徹然對食即不啖酒肉自今己後刑人日勿進酒肉內教及太常並宜停教又曰永徽中高宗謂侍臣曰獄訟繁多皆由刑罰枉濫故禮曰刑者成也一成而不可變末代斷獄之吏皆以苛刻為明是以秦氏網密秋荼而獲罪者眾今天下無事四海乂安欲與公等共行寬政今日刑罰得無枉濫乎太尉無忌對曰陛下欲致刑網寬平臣下猶不識聖意此法獘來已久非止今日若情存體國即共號癡人意在深文便為能吏所以罪雖合杖必致遣徒理有可生務入於死非憎前人陷於死刑務取名耳陛下矜而令放法司亦肯固請但陛下喜怒不妄加於人刑罰自然適中高宗曰卿言是矣又曰神功初天后謂侍臣曰近者朝臣多被周興來俊臣等推勘相牽引咸自承服國家有法朕豈能違中間疑有枉濫更使近者就獄親問皆自承引不虛朕不以為疑即可其奏自周興俊臣死後更無聞有反逆者然則已前就戮者不有冤濫耶姚, SBCK: ''}
