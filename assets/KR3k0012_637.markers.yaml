  - {type: variant, offset: 1116, length: 753, content: 崇對曰自垂拱已後被告身死破家者皆是枉酷自誣而死告者持以為功天下號為羅織甚於漢之黨錮陛下令近臣就獄問者近臣亦不保何敢輒有動搖被問者若翻言懼遭其毒手賴上天降靈聖情發寤誅鋤兇豎朝廷乂安今日已後臣以微驅及一門百口保見在內外官更無反逆者若後有徵驗反逆有實臣請受知而不告之罪上大悅曰前宰相皆順成其事陷朕為淫刑之主聞卿所說甚合朕心又曰陸象先為益州長史在官務以寬仁為政司馬韋抱貞言望明公稍行杖罰以立威名不然恐下人怠惰無所懼也象先曰為政者理則可矣何必嚴刑樹威損人益己恐非仁恕之道又曰開元二十五年刑部斷獄天下死罪惟有五十八人大理少卿徐嶠上言大理獄院由來相傳殺氣大盛鳥雀不栖槱至是鵲巢其樹於是百寮上表賀以為幾至刑措又曰大宗性仁恕言事者諫曰陛下為政傷於太寬朝典由是不肅上笑而荅曰今時運艱難凡人臣事朕者窺少祿利耳今府庫空竭無俸入俾之優足但峻刑科是君上有威無恩朕所不忍行也管子曰夫爭強之國先爭刑令國之輕重者刑也文子曰道狹然後任智德薄然後任刑明淺然後任察任智者心亂任刑者上下恐任察者下求善以事其上莊子曰賞罰利害五刑之辟教之末禮法度數刑名比詳治之末也又曰民為外刑者金與木也為內刑者動與過也霄人之離外刑也金木訊之離內刑也陰陽食之免內外之刑者唯真人能之司馬法曰先王之治從天之道設地之宜乃作五刑以禁民僻乃興甲兵以討不義制瑞節以通使巡狩省方以會諸侯考不同正禮月正時歷考不同者正法度齊於天子法度也正禮者上下之禮也月正時歷者月正朔名也時歷時氣正月相應也名文章車服名月爵稱文章車服所以顯有德異尊卑使不踰制度也天子法度不從命為亂常法也比德逆天之時比敗德不行也不順時生殺之敘也乃徵師於諸侯征之不會朝過聘則劉劉殺也諸侯背數不會朝過聘則殺之廢貢職擅稱兵相侵削廢天子之命則黜不從王者法度則征其罪而黜之也改曆史衣服文章易禮變刑則放若奉王法則不之遠方娶同姓以妾為妻變, SBCK: 帝爲}
