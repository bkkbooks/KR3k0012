  - {type: variant, offset: 2338, length: 0, content: '', krp: 腰斬帝問郭躬躬曰法今有故誤章傳命之謬於事爲誤誤者其文則輕當罰金帝曰章與囚同縣疑其故躬曰周道如砥其直如矢詩小雅如砥貢賦平如矢賞罰中君子不逆詐君王法天}
