  - {type: variant, offset: 2341, length: 0, content: '', SBCK: 刑多依矜恕乃條諸重又可從輕者四十一事奏之事皆施行著于令又曰陳寵鈎校律令條法溢於甫刑者奏除之鈎猶勘也前書曰鈎校得其姦賊鈎音工侯切溢出也孔安國注尚書曰吕侯後爲甫侯故或稱甫刑也曰臣聞禮經三百威儀三千故甫刑太辟二百五刑之屬三千禮之所去刑之所取去禮之人刑以加之故曰取也失禮則入刑相爲表裏者也今律令死刑六百一十耐罪千六百九十八耐者輕刑之名也贖罪以下二千六百八十一溢於甫刑者千九百八十九其四百一十大辟千五百耐罪七十九贖罪春秋保乹圖曰王者三百年一蠲法漢興以來三百二年憲令稍増科條無限又律有三家其說各異冝令三公廷尉平定律令應經合義者可使大辟二百而耐罪贖罪二千八百并爲三千悉刪除其餘令與禮相應又曰卓茂爲宻令人常有言部亭長受其米肉遺者部謂所部也茂辟左右問之曰亭長爲從汝求乎爲汝有事嘱之而受乎將平居自以恩意遺之乎人曰徃遺之耳茂曰遺之而受何故言邪人曰竊聞賢明之君使人不畏吏吏不取人今我畏吏是以遺之吏旣卒受故來言耳􅌗曰汝爲弊人矣凢人所以貴於禽獸者以有仁愛知相敬事也今鄰里長老尚致饋遺此乃人道所以相親况吏與民乎吏顧不當乗威力強請求耳凢人之生群居􅄂處故有經紀禮義以相交接汝獨不欲修之寧能髙飛逺走不在人間邪亭長素善吏歳時遺之禮也人曰苟如此律何故禁之茂􅀏曰律設大法禮順人情今我以禮教汝汝必無怨惡以律治汝何所措其手足乎一門之内小者可}
