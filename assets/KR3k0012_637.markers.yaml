  - {type: variant, offset: 2329, length: 0, content: '', SBCK: 朱􅀶遷瑯瑘太守文學儒吏時有奏稱說云云愽見謂曰如太守漢吏奉三尺律令以從事耳亡柰生所言聖人道何也言不能用也且持此道歸尭舜君岀爲陳說之遷廷尉職典决疑當讞平天下獄愽恐爲官屬所誣視事召見正監典法􅁺史謂曰廷尉夲起於武吏不通法律幸有衆賢亦何憂然廷尉治郡斷獄以來且二十年三尺律令人事出其中言可以人情知人􅁺史試與正􅁥共撰前丗决事吏議難知者數十事持以問廷尉得爲諸覆意之如淳曰但欲用意覆之也正􅁥以爲愽苟強意未必能然即共條白焉愽皆召􅁺史並坐而問爲平處其輕重十中八九官属咸服愽之踈略才過人也後漢書曰光武蕭王時在河北􅀕遵爲軍市令帝舎中兒犯法遵格殺之帝怒収遵主簿陳副諌曰明公常欲衆整齊今遵奉法不避是故令行也帝乃賞之以爲刺姦將軍謂諸將曰當避􅀕遵吾舎中兒犯法尚殺之必不􅀻公等又曰桓譚上書言法令决事輕重不齊或一事殊法同罪異論姦吏得因縁爲市欲活則岀生議所欲䧟則與死比是爲刑開二門也命可令通義理明習法律者校定科比科謂事條比謂􅀋例一其法度班下郡國蠲除故條如此天下知方而獄無怨濫矣又曰馬援在南條越律與漢律駮者十餘事駮乖事也與越人申明舊制以約束之自後南越奏行馬􅀅軍故事又曰王符論明帝時公車反支日不受章奏凢反支日用月朔爲正戌亥朔四日反支申酉朔二日反支午未朔三日反支辰巳朔四日反支寅夘朔五日反支}
