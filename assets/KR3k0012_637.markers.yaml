  - {type: variant, offset: 163, length: 0, content: '', SBCK: 吿公令醫守之醫乳醫也生男二壷酒一犬生女二壷酒一豚生三人與之乳母生二人與之餼三子力不能獨養故與乳母家語曰孔子􅀄仕爲中都宰制爲養生送死之節長㓜異食強弱共任男女別塗路不拾遺器不彫僞市不二價行之一年而四方諸侯皆則焉定公謂孔子曰學子之}
