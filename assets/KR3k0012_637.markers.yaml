  - {type: variant, offset: 506, length: 203, content: 三奏而後行刑唐書曰貞觀五年詔京師諸司比來奏決死囚雖立五覆一日即了未暇審思五奏何益縱有追悔又無所及自今後宜二日中五覆奏下諸州三覆奏又手勑曰比來斷獄多據律文雖情有可矜而不敢違法守文定罪或恐有冤今後門下省覆奏有據法合死而情可矜者宜錄狀以聞又曰太宗嘗錄囚徒憫其將死為之動容顧謂侍臣曰刑典仍用蓋風化未洽之咎愚人何罪而肆重刑乎更彰朕之不德也用刑之道當審事理之輕重然後加之以刑罰何有不察其本而一概加誅非所以恤刑重人命之謂, SBCK: 俱爲城旦}
