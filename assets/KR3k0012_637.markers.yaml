  - {type: variant, offset: 2698, length: 295, content: 王也刑多德少者五霸也純用刑而亡者秦也又曰夫刑辟之作所從來尚矣聖人以治亂人以亡是以古屬帝王莫不詳慎之者以為人命至重一死不生一斷不屬故堯舜之明猶惟刑之恤是以後聖制法設三槐九棘之吏肺石嘉石之訴然由復三剌僉曰可煞然後殺之罪若有疑即從其輕此蓋詳慎之至也杜恕篤論曰聖王之制刑也非以害民也將以利民也故民從而安之非以陷民也將以導民也故民從而化之斷一人之獄而天下義之是安之也斷一人之獄而天下伏之是化之也當於民心合於道理所斷於民者不行於身公之也君臣正論曰書稱欽哉惟刑之恤又曰宥過無大刑故無小此前王明德慎罰之意也昔漢文感緹縈之孝遂去肉刑近則太宗明堂之圖欲寬背罰于公以陰德救物袁安恥職罪鞫人此前代聖主賢臣欽卹之志也, SBCK: 十七}
