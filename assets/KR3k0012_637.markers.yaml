  - {type: variant, offset: 2337, length: 0, content: '', SBCK: 生有殺􅀂開相容恕著爲定法者則是故設姦萌生長罪􅂩又輕侮之比浸以䌓滋至有四五百科轉相顧望弥復堪甚難以垂之万載臣聞師言救文莫如質故髙帝去煩苛之法爲三章之約建􅀄詔書有改於古者可下三公廷尉蠲除其弊又曰有兄弟共殺人者明帝以兄不訓弟故報兄重報論也重死制而減弟死中常侍孫章宣詔言兩報重尚書奏章矯制罪}
  - {type: variant, offset: 2337, length: 0, content: '', WYG: 故誤章傳命之謬於事為誤誤者其文則輕}
  - {type: variant, offset: 2337, length: 0, content: '', krp: 生有殺若開相容恕著爲定法者則是故設姦萌生長罪隙又輕侮之比浸以䌓滋至有四五百科轉相顧望弥復堪甚難以垂之万載臣聞師言救文莫如質故髙帝去煩苛之法爲三章之約建𥘉詔書有改於古者可下三公廷尉蠲除其弊又曰有兄弟共殺人者明帝以兄不訓弟故報兄重報論也重死制而減弟死中常侍孫章宣詔言兩報重尚書奏章矯制罪}
  - {type: variant, offset: 2338, length: 0, content: '', SBCK: 腰斬帝問郭躬躬曰法今有故誤章傳命之謬於事爲誤誤者其文則輕當罰金帝曰章與囚同縣疑其故躬曰周道如砥其直如矢詩小雅如砥貢賦平如矢賞罰中君子不逆詐君王法天}
