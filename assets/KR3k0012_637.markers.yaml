  - {type: variant, offset: 2385, length: 1, content: 威, SBCK: 他族而女獨嬰戮於二門臣以爲在室冝從父之誅旣醮可隨夫之罰於是有詔改定律令魏志曰公軍進令曰吾起義兵爲天下除􅁀亂舊土人民死䘮略盡國中終日行不見所識使吾悽愴傷懐其舉義兵已來將士絶無後者求親戚以後之授上田官給耕牛置學師教之爲立廟使記其先人魂而有靈吾百年之後何恨哉吴志曰孫權下令諸􅀅曰夫存不忘亡安必慮危古之善教昔雋不疑漢之名臣於安平之丗而刀劒不離於身盖君子之於武備不可以已今處身壃畔狄虜交接而輕忽不豫思變難哉頃聞諸將出入各尚謹多不從人甚非備虜愛身之謂夫保巳遺名安君親孰與危辱冝深警戒副􅀌意焉晉書曰賈充所定新律旣班天下百姓安之詔曰漢氏以來法令嚴峻故自元成之丗及建平嘉平之間咸欲辯章舊典刪革刑書述作體大歷年無成先帝愍元元之命䧟於密網親發德音釐正名實車􅀐將軍賈充將大用聖意諮詢太愽鄭冲又與司空荀顗中書􅁥荀朂中軍將軍羊祜中護軍}
  - {type: page-break, offset: 2385, content: '', id: KR3k0012_SBCK_637-7b}
  - {type: page-break, offset: 2385, content: '', id: KR3k0012_SBCK_637-8a}
  - {type: variant, offset: 2385, length: 1, content: 威, WYG: 他族而女獨嬰戮于二門臣以為在室宜從父之誅既醮可隨夫之罰於是有詔改定律令魏志曰公軍進令曰吾起義兵為天下除暴亂舊土人臣死喪畧盡國中終日行不見所識使吾悽愴傷懐其舉義兵已来将士絶無後者求親戚以後之授土田官給耕牛置學師教之為立廟使繼其先人魂而有靈吾百年之後何恨哉吴志曰孫權下令諸将曰夫存不忘亡安必慮危古之善教昔雋不疑漢之名臣於安平之世而刀劒不離於身蓋君子之於武備不可以已况今處身疆畔豺狼交接而可輕忽不思變難哉頃聞諸將出入各相謙約不從人兵甚非備慮愛身之謂夫保己遺名以安君親孰與危辱宜深警戒副孤意焉晉書曰賈充所定新律既成班天下百姓詔曰漢氏以来法令嚴峻故自元成之世及嘉平建平之間咸欲辨章舊典刪革刑書述作體大歴年無成先帝愍元人命陷於宻網親發徳音釐正名實車騎将軍賈充将順聖意諮詢太傅鄭沖又與司空荀顗中書監荀朂中軍将軍羊祜中䕶軍}
