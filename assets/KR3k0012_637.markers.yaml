  - {type: variant, offset: 2352, length: 2, content: 慘恤, SBCK: 百金之利無與人重故丗謂陳氏持法寛魏書曰司馬景王輔政時犯大逆者其法誅乃巳出之女母立儉之誅其子甸妻荀氏應坐死其族兄顗通表魏帝以乞其命詔聽離婚荀氏所生女芝爲頴川太守劉子元妻亦坐死以懷姙繫獄荀氏辭詣司􅈻校尉何曽乞恩求没爲官婢以贖之命曽哀之使主簿程盛上議曰臣以爲女人有三從之義無自專之道岀適他族降父母之服所以明外成之節也而父母有罪則追刑夫黨見誅又隨戮一人之身内外受辟女旣産育則它族之母無辜受戮傷孝子}
