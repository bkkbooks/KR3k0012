  - {type: variant, offset: 2333, length: 1, content: 蔡, WYG: 下猶天之四時有生有殺若開相容恕著為定法者則是故設姦萌生長罪隙又輕侮之比寖以繁滋至有四五百科轉相顧望彌復增甚難以垂之萬載臣聞師言救文莫如質故髙帝去煩苛之法為三章之約建初詔書有改於古者可下三公廷尉蠲除其弊又曰有兄弟共殺人者明帝以兄不訓弟故報兄重報論也而弟減死中常侍孫章宣詔誤言兩報重尚書奏章矯制罪當腰斬帝問郭躬躬曰法}
