  - {type: variant, offset: 2330, length: 2, content: 發為, SBCK: 丑朔六日反支見隂陽書也帝聞而怪曰人廢農桑逺來詣闕而復拘以禁忌豈爲政之意乎於是遂蠲其制令又曰建􅀄中有人侮辱人父者而其子殺之肅宗貰其死刑而降宥之自後因以爲比是時遂定其議以爲輕侮法張敏駮議曰夫輕侮之法先帝一切之恩不有成科班之律令也夫死生之决冝從}
