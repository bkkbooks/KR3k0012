  - {type: variant, offset: 1395, length: 203, content: 敬賢殿講老子僕射王褒執經百僚皆預講席中宗談折摙辯間以嘲謔在座者相顧解頤又曰沈峻字士嵩武康人也博通五經尤長周禮時吏部郎中陸倕與僕射徐勉書薦峻曰凡聖可講之書必以周官立義然則周官一書實為群經源本此學不傳多歷年所唯助教沈峻特精此書比日開講群儒劉喦沈熊之徒皆執經下座北面受業莫不歎服人無間言也又伏曼傳曰宋明帝好周易常集朝臣於清暑殿講詔曼容執經曼容素美風采明帝恒以方嵇叔夜使吳人陸探微畫叔夜像以賜之為尚書外兵郎嘗與袁粲, SBCK: 是遂爲}
