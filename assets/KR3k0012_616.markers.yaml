  - {type: variant, offset: 1977, length: 0, content: '', SBCK: 暉業領中書􅁥録尚書事齊文襄甞問之曰比何所披覽對曰數㝷伊霍之傳不讀曹馬之書暉業以時運漸謝不復圖全唯事飲㗖一日三羊三日一犢又甞賦詩云昔居王道㤗濟濟冨群英今逢丗路阻狐􅇠鬱縱横梁書曰武帝每讀孝子傳未曽終軸輙輟書悲慟由是家門愛重探賾索隱窮理盡性究覽墳籍神悟知機讀書不待温故一閱皆能誦憶又曰范雲傳􅀄竟陵王子良爲㑹稽太子雲爲府主簿王未之知後尅日登秦望山乃命雲雲以山上有秦始皇刻石此文三句一韻人多作兩句讀之並不得韻又皆大􅂐人多不識乃夜取史記讀之令上知明日登山子良命賔僚讀之皆茫然不識末問雲雲曰下官甞讀史記見此刻石文進乃讀之如流水子良大恱因以爲上賔又曰昭明太子統字德施美姿皃}
  - {type: page-break, offset: 1977, content: '', id: KR3k0012_SBCK_616-4a}
  - {type: variant, offset: 1977, length: 0, content: '', WYG: 暉業領中書監録尚書事齊文襄嘗問之曰比何所披覽對曰數尋伊霍之傳不讀曹馬之書暉業以時運漸謝不復圖全唯事飲啗一日一羊三日一犢又嘗賦詩云昔居王道泰濟濟富羣英今逢世路阻狐兔鬱縱横梁書曰武帝每讀孝子傳未曾終軸輒輟書悲慟由是家門愛重探賾索隠窮理盡性究覽墳籍神悟知機讀書不待温故一過目皆通憶又曰范雲傳初竟陵王子良為會稽太守雲為府主簿王未之知後尅日登秦望山乃命雲雲以山上有秦始皇刻石此文三句一韻人多作兩句讀之並不得韻又大篆人多不識乃夜取史記讀之令上口明日登山子良命賓僚讀之皆茫然不識末問雲雲曰下官嘗讀史記見此刻石文進乃讀之如流水子良大恱因以為上賓又曰昭明太子統字徳施美姿貎}
