  - {type: variant, offset: 2120, length: 0, content: '', SBCK: 至孝自然䘮親哀毀毎讀詩見素冠􅁄人未甞不掩泗焉列女傳曰班婕好况之女賢才通辯選入後宫毎讀詩及窈窕淑女之篇必三復之晉潘岳閑居賦序曰岳讀汲黯傳見司馬安四至九卿而良史書之題以巧宦之目未甞不􅁣然廢書而歎金樓子曰有人讀書握卷而輙睡者梁朝有名士呼書卷爲黄妳此蓋言其怡神飬}
  - {type: variant, offset: 2120, length: 0, content: '', WYG: 至孝自然䘮親哀毀每讀詩見素冠棘人未嘗不掩泗焉列女傳曰班婕妤况之女賢才通辨選入後宫每讀詩及窈窕淑女之篇必三復之晉潘岳閒居賦序曰岳讀汲黯傳見司馬安四至九卿而良史書之題以巧宦之目未嘗不慨然廢書而歎金樓子曰有人讀書握卷而輒睡者梁朝有名士呼書卷為黄嬭此葢言其怡神養}
  - {type: variant, offset: 2120, length: 0, content: '', krp: 至孝自然䘮親哀毀毎讀詩見素冠棘人未甞不掩泗焉列女傳曰班婕好况之女賢才通辯選入後宫毎讀詩及窈窕淑女之篇必三復之晉潘岳閑居賦序曰岳讀汲黯傳見司馬安四至九卿而良史書之題以巧宦之目未甞不慨然廢書而歎金樓子曰有人讀書握卷而輙睡者梁朝有名士呼書卷爲黄妳此蓋言其怡神飬}
  - {type: variant, offset: 2121, length: 2, content: 溫潤, SBCK: 妳媪也又曰凢讀書必以五經爲夲所謂非聖人之書勿讀讀之百遍其義自見此外衆書自可汎而觀耳正史旣見得失成敗此經國之所急五經之外冝以正史爲先譜諜所以別貴賤明是非尤冝留意或復中表親踈或復通塞昇降百丗衣冠}
  - {type: page-break, offset: 2121, content: '', id: KR3k0012_SBCK_616-8a}
  - {type: variant, offset: 2121, length: 2, content: 溫潤, WYG: 如黄嬭也又曰凡讀書必以五經為本所謂非聖人之書勿讀讀之百遍其義自見此外衆書自可汎而觀耳正史既見得失成敗此經國之所急五經之外宜以正史為先譜牒所以別貴賤明是非自宜留意或復中表親疎或復通塞升降百世衣冠}
