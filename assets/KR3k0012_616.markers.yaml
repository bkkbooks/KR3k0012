  - {type: variant, offset: 1277, length: 1, content: 鄭, krp: 陶潜字元亮好讀書不求甚解毎有㑹意欣然忘食又曰殷仲堪能清言善屬文毎云三日不讀道德論便覺舌本間強其談理與韓康伯齊名士咸愛慕之又曰王恭抗直深存節義讀左傳至奉王命討不庭毎輟卷而歎又曰劉敏元字道光北海人也厲己修學不以嶮難改心好星暦隂陽術數潜心易太}
  - {type: variant, offset: 1279, length: 3, content: 為散騎, krp: 不好讀史}
