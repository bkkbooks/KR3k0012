  - {type: variant, offset: 2124, length: 3, content: 雜交遊, SBCK: 可不悉又曰自叙云吾時夏夕中下綘紗中有銀甌一枚貯山隂甜酒卧讀有時至曉率以爲常又經病瘡肘􅂰爛盡此以來三十餘載泛玩衆書萬餘矣曰余}
  - {type: variant, offset: 2124, length: 3, content: 雜交遊, WYG: 可不悉又自叙云吾夏時終夜下絳紗帷中有銀甌一枚貯山隂甜酒卧讀有時至曉率以為常又經病瘡肘膝爛盡比來三十餘載泛玩衆書萬餘矣又曰余}
