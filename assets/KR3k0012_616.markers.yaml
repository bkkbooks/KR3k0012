  - {type: variant, offset: 1277, length: 5, content: 鄭玄為散騎, SBCK: 陶潜字元亮好讀書不求甚解毎有㑹意欣然忘食又曰殷仲堪能清言善屬文毎云三日不讀道德論便覺舌本間強其談理與韓康伯齊名士咸愛慕之又曰王恭抗直深存節義讀左傳至奉王命討不庭毎輟卷而歎又曰劉敏元字道光北海人也厲己修學不以嶮難改心好星暦隂陽術數潜心易太􅀇不好讀史}
  - {type: page-break, offset: 1277, content: '', id: KR3k0012_SBCK_616-3a}
  - {type: variant, offset: 1277, length: 2, content: 鄭玄, WYG: 陶潛字元亮好讀書不求甚解每有會意欣然忘食又曰殷仲堪能清言善屬文每云三日不讀道徳論便覺舌本間強其談理與韓康伯齊名士咸愛慕之又曰王恭抗直深存節義讀左傳至奉王命討不庭輒輟卷而歎又曰劉敏元字道光北海人也厲己修學不以險難改心好星厯隂陽術數潛心易太𤣥不好讀史常謂同志曰誦書當味義理何}
