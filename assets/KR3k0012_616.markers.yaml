  - {type: variant, offset: 2473, length: 332, content: 宗幸國子學視釋奠祭酒孔頴達講孝經右庶子趙弘智問之曰夫子門人曾閔俱稱大孝而今獨為曾說不為閔說何耶荅曰曾孝特優門人不能逮也制旨駮之曰朕聞家語云昔曾晢使曾參鋤瓜而誤斷其本晳怒授大杖以擊其背參手扑地絕而後蘇孔子聞之告門人曰參來勿內既而曾子請焉孔子曰舜之事父也使之常在側欲殺乃不可得小箠則受大杖則走今參誤於父委身以待暴怒陷父於不義不孝莫大焉由斯而言孰愈於閔子騫也頴達不能對太宗又謂侍臣曰諸儒各生異意皆非聖人論孝之本旨也夫孝者善事父母自家刑國忠於其君戰陣勇朋友信揚名顯親此之謂孝具在經典而論者多離其文逈出事外以此為教勞而非法何謂孝之道耶語林曰劉真長與桓公宣武共聽講禮記桓公云時有入心處便覺咫尺玄門殷氏世傳曰殷亮建武中徵拜博士諸儒講論勝者賜席亮重至八九三國典略曰東魏崔暹子達挐年, WYG: 平御覽卷六百}
