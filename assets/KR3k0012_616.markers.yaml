  - {type: variant, offset: 2190, length: 674, content: 人奉經二人講之旦皇帝服通天冠玄紗袍乘象略至學坐廟堂上講訖還便殿改服綘紗袍乘象輅還宮講畢以一太牢釋奠孔父配以顏回列軒懸樂六佾舞行三獻禮畢皇帝服通天冠綘紗袍升阼即座宴畢還宮皇太子每通一經亦釋奠又曰馬光為太子愽士嘗因釋奠高祖親幸國子學主公已下畢集光升座講禮啟發章句已而諸儒生以次論難者十餘人皆當時碩學光剖析凝滯雖辭非俊辯而理義引贍論者莫測其淺深咸共推服上嘉而勞焉又曰元善通博在何妥之下然以風流醞藉俯仰可觀音韻清明聽者忘倦由是為後進所歸妥每懷不平心欲屈善因善講春秋初發題諸儒畢集善私謂妥曰名望已定幸無相苦妥然之及就講肆妥遂引古今滯義以難善多不能對善深衘之二人由是有隙唐書曰太宗幸國子學視釋奠祭酒孔頴達講孝經右庶子趙弘智問之曰夫子門人曾閔俱稱大孝而今獨為曾說不為閔說何耶荅曰曾孝特優門人不能逮也制旨駮之曰朕聞家語云昔曾晢使曾參鋤瓜而誤斷其本晳怒授大杖以擊其背參手扑地絕而後蘇孔子聞之告門人曰參來勿內既而曾子請焉孔子曰舜之事父也使之常在側欲殺乃不可得小箠則受大杖則走今參誤於父委身以待暴怒陷父於不義不孝莫大焉由斯而言孰愈於閔子騫也頴達不能對太宗又謂侍臣曰諸儒各生異意皆非聖人論孝之本旨也夫孝者善事父母自家刑國忠於其君戰陣勇朋友信揚名顯親此之謂孝具在經典而論者多離其文逈出事外以此為教勞而非法何謂孝之道耶語林曰劉真長與桓公宣武共聽講禮記桓公云時有入心處便覺咫尺玄門殷氏世傳曰殷亮建武中徵拜博士諸儒講論勝者賜席亮重至八九三國典略曰東魏崔暹子達挐年十三暹令儒者教其說周易兩字乃集朝貴名流達挐升高坐開講趙郡睦仲讓陽屈服之暹大悅擢仲讓為司徒中郎鄴下為之語曰解義兩行得中郎, SBCK: ''}
