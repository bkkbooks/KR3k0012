  - {type: variant, offset: 1977, length: 0, content: '', krp: 暉業領中書監録尚書事齊文襄甞問之曰比何所披覽對曰數㝷伊霍之傳不讀曹馬之書暉業以時運漸謝不復圖全唯事飲㗖一日三羊三日一犢又甞賦詩云昔居王道㤗濟濟冨群英今逢丗路阻狐兔鬱縱横梁書曰武帝每讀孝子傳未曽終軸輙輟書悲慟由是家門愛重探賾索隱窮理盡性究覽墳籍神悟知機讀書不待温故一閱皆能誦憶又曰范雲傳𥘉竟陵王子良爲㑹稽太子雲爲府主簿王未之知後尅日登秦望山乃命雲雲以山上有秦始皇刻石此文三句一韻人多作兩句讀之並不得韻又皆大篆人多不識乃夜取史記讀之令上知明日登山子良命賔僚讀之皆茫然不識末問雲雲曰下官甞讀史記見此刻石文進乃讀之如流水子良大恱因以爲上賔又曰昭明太子統字德施美姿皃}
  - {type: variant, offset: 1978, length: 0, content: '', SBCK: 舉止讀書數行並下過目皆憶陳書曰始興王叔陵脩飾虚名每入朝常於車中馬上執卷讀書髙聲長誦陽陽自􅀂朝坐齋中或自執斧斤爲沭猴百戲隋書曰崔儦字歧叔以讀書爲務頗自􅀒而忽人甞大署其門曰不讀五千卷書無得入我室又曰來護兒字崇㓜而慕詭好立竒節􅀄讀詩至擊鼓其鏜踊躍用兵羔裘豹飾孔武有力捨書而歎曰大丈夫其丗當如是爲國滅賊以取功名安能區區乆事隴􅅿群軰嘉其言而壯其志又曰韋師字公頴少沉謹有慧性􅀄就學始讀孝經捨書而歎曰名教之極其在兹乎唐書曰章懷太子賢上深所嗟賞之謂司空李勣曰此兒巳讀得尚書禮記曽遺讀論語至賢賢易色再三覆誦之乃云性愛此言固知夙成聦敏出自天性也又曰蕭徳言晚年尤篤志於學自晝逹夜略無厭倦毎欲開五經必盥濯束帶危坐對之妻子候間請曰終日如是無乃勞乎徳言曰敬先聖之言豈憚如此又曰郭山惲蒲州河東人少通三禮景龍中累}
  - {type: page-break, offset: 1978, content: '', id: KR3k0012_SBCK_616-4b}
