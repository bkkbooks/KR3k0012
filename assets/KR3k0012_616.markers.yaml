  - {type: variant, offset: 1978, length: 0, content: '', WYG: 舉止讀書數行俱下過目皆憶陳書曰始興王叔陵修飾虛名每入朝常於車中馬上執卷讀書髙聲長誦陽陽自若歸坐齋中或自執斧斤為沐猴百戯隋書曰崔儦字岐叔以讀書為務頗自負而忽人嘗大署其門曰不讀五千卷書無得入我室又曰來䕶兒字崇善㓜而卓詭好立竒節幼讀書至擊鼓其鏜踴躍用兵羔裘豹飾孔武有力捨書而歎曰大丈夫在世當如是為國滅賊以建功名安能區區久事隴畞羣輩驚其言而壯其志又曰韋師字公穎少沉謹有至性初就學始讀孝經捨書而歎曰名教之極其在兹乎唐書章懐太子賢容止端雅上深所嗟賞謂司空李勣曰此兒已讀得尚書禮記曽遣讀論語賢賢易色􅄪三覆誦之乃云性愛此言因知夙成聰敏出自天性也又曰蕭徳言晚年尤篤志於學自晝達夜畧無厭倦每視閱五經必盥濯束帯危坐對之妻子候間請曰終日如是無乃勞乎徳言曰敬先聖之言豈憚如此又曰郭山惲蒲州河東人少通三禮景龍中累}
