  - {type: variant, offset: 2111, length: 6, content: 呂思禮東平壽, SBCK: 此可以􅀃當丗之君矣幽明録曰襄陽城南有秦民墓爲性至孝親殁泣血三年人有爲其詠蓼莪詩者民聞其義涕泗不自勝桓子新論曰劉子政子駿伯玉三人尤珎重左氏教子孫下至婦女無不讀誦俗􅀃曰劉栁爲僕射􅀓迪爲左丞􅀓好讀書而不解其義劉唯讀莊老而巳􅀓道劉云正讀十二卷何足夲人劉道􅀓云讀書雖多而無所解可謂書簏物理論曰語曰能理亂􅁝乃可讀詩余雖無治􅁝之能而悟問詩之義華陽國志曰徐誦字子産少讀書日不過五十字誦千遍乃得終成儒學先賢傳曰延篤從唐季度受左氏欲冩傳本無紙乃借本誦之及辭歸季度曰卿欲冩傳何辭歸荅曰巳誦之矣孝德傳曰}
  - {type: page-break, offset: 2111, content: '', id: KR3k0012_SBCK_616-7b}
  - {type: variant, offset: 2111, length: 6, content: 呂思禮東平壽, WYG: 此可以說當世之君矣幽明録曰襄陽城南有秦民墓為性至孝親殁泣血三年人有為其詠蓼莪詩者民聞其義涕泗不自勝桓子新論曰劉子政子駿伯玉三人尤珍重左氏教子孫下至婦女無不讀誦俗說曰劉抑為僕射傅迪為左丞傅大讀書而不解其義劉唯讀老莊而已傅道劉云正讀十二卷何足本人劉道傅云讀書雖多而無所解可謂書簏物理論曰語云能理亂絲乃可讀書余雖無治絲之能而悟聞詩之義華陽國志曰徐誦字子産少讀書日不過五十字誦千遍乃傳終成儒學先賢傳曰延篤從唐季度受左氏欲寫傳本無紙乃借本誦之及辭歸季度曰卿欲寫傳何故辭歸答曰已誦之矣孝徳傳曰}
  - {type: page-break, offset: 2111, content: '', id: KR3k0012_WYG_616-11b, image: WYG0898/WYG0898-0564d.png}
  - {type: page-break, offset: 2111, content: '', id: KR3k0012_WYG_616-12a, image: WYG0898/WYG0898-0565a.png}
  - {type: variant, offset: 2111, length: 6, content: 呂思禮東平壽, krp: 此可以說當丗之君矣幽明録曰襄陽城南有秦民墓爲性至孝親殁泣血三年人有爲其詠蓼莪詩者民聞其義涕泗不自勝桓子新論曰劉子政子駿伯玉三人尤珎重左氏教子孫下至婦女無不讀誦俗說曰劉栁爲僕射傳迪爲左丞傳好讀書而不解其義劉唯讀莊老而巳傳道劉云正讀十二卷何足夲人劉道傳云讀書雖多而無所解可謂書簏物理論曰語曰能理亂絲乃可讀詩余雖無治絲之能而悟問詩之義華陽國志曰徐誦字子産少讀書日不過五十字誦千遍乃得終成儒學先賢傳曰延篤從唐季度受左氏欲冩傳本無紙乃借本誦之及辭歸季度曰卿欲冩傳何辭歸荅曰巳誦之矣孝德傳曰}
