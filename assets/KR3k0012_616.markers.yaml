  - {type: variant, offset: 2027, length: 6, content: 盧景裕博通經, SBCK: 臧與榖相與牧羊而俱亡其羊問臧奚事挾䇿讀書問榖奚事􅀶塞以遊又曰桓公讀書於堂上輪扁斵輪於堂下釋椎鑿而問曰敢問公所讀之書何言也公曰聖人之言曰聖人在乎公曰巳死矣曰然則公所讀者古人之糟粕也公曰寡人讀書輪人安得議乎有􅀃則可無􅀃則死扁曰以臣之事觀之斵輪徐則甘而不固疾則苦而不入不徐不疾得於手而應於心口不能言也有數存焉於其間臣不能以喻臣之子臣之子亦不能受之於臣是以行年七十而老斵輪古人物各有信教學之無益也古人與其不可傳者死矣然則君之所讀者古人之糟粕而巳尚書大傳曰子夏讀書畢見夫子夫子問子何爲於書子夏曰書之論事皎皎如日月之代明離離如參辰之錯行啇所受於夫子者忠之於心弗敢忘也尸子曰孔子曰誦詩讀書與古人居􅀃苑曰孔子讀易至於損益則喟然而歎子夏避席而問曰夫子何爲歎孔子曰夫自損者益自益者缺吾是以歎也子夏曰然則學者不可以益乎孔子曰否天之道成而必變未甞得乆也夫學者以虚受之昔堯履天子之位允恭以持之虚静以待下故百載而逾盛迄今而益章昆吾自臧而滿意窮髙而不衰故當時􅃜敗迄今而逾惡是非益損之徴歟日中則􅉴月盈則食天地盈虚與時消息是以聖人不敢當盛升輿而遇三人則下二人則軾調其盈虚故能長乆也子夏曰善請終身誦之神仙傳曰孔子讀書老子見而問曰是何書也曰禮也聖人亦讀之老子云聖人可也汝􅂚爲復讀之洞􅁳記曰李充者馮翊人也自言三百歳從秦始皇登㑹稽山以望江漢之流也少而好學爲秦愽士門徒萬人伏生時十歳乃就充石壁山中受尚書乃以口傳受伏子四代之事略無遺脫伏子因而誦之常以細繩十餘㝷以􅅞腰誦一遍則結繩一結十㝷之繩皆成結矣計誦尚書可數萬遍但食􅂖損人精意有遺失伏子今所傳百卷得其一二耳故堯舜二}
