  - {type: variant, offset: 2130, length: 11, content: 受學於徐遵明長於論難諸, SBCK: 苦眼疾沉痼此來轉暗不復能自讀書三十六年來􅁪令左右唱之曽}
  - {type: variant, offset: 2130, length: 307, content: 受學於徐遵明長於論難諸生為之語曰講書論易鋒難敵隋書曰後齊將講於天子先定經於孔父廟置執經一人侍講二人執讀一人擿句二人錄義六人奉經二人講之旦皇帝服通天冠玄紗袍乘象略至學坐廟堂上講訖還便殿改服綘紗袍乘象輅還宮講畢以一太牢釋奠孔父配以顏回列軒懸樂六佾舞行三獻禮畢皇帝服通天冠綘紗袍升阼即座宴畢還宮皇太子每通一經亦釋奠又曰馬光為太子愽士嘗因釋奠高祖親幸國子學主公已下畢集光升座講禮啟發章句已而諸儒生以次論難者十餘人皆當時碩學光剖析凝滯雖辭非俊辯而理義引贍論者莫測其淺深咸共推服上嘉而勞焉又曰元善通博在何妥之下然以風流醞藉俯仰可觀音韻清明聽者忘倦由是為後進所歸妥每懷不平心欲屈善因善講春秋初發題諸儒畢集善私謂妥曰名望已定幸無相, WYG: ''}
