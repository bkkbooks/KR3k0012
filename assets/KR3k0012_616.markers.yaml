  - {type: variant, offset: 35, length: 0, content: '', SBCK: 子妻之周禮春官下曰太史掌建􅀖之六典大􅀕祀與執事卜日執事太卜之屬及􅀫之日與群執事讀禮書而恊事恊合也合禮謂習録所當共之事也又曰小史掌􅀖國之志大􅀕祀讀禮法史以書叙昭穆之俎簋讀禮法者大史舉群執事史此小史也史記曰太史公曰子讀孟子書至梁惠王問何以利吾國未甞}
