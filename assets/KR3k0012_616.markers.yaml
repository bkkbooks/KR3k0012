  - {type: variant, offset: 1599, length: 372, content: 朝會言玄理時論以為一臺絕又曰盧黃范陽𣵠人少明經有儒術天監中歸梁位步兵校尉兼國子博士遍講五經時北來人儒學者有崔靈恩孫詳蔣顯並聚徒講說而音辭鄙拙唯廣言論清雅不類北人僕射徐勉兼通經術深相賞好後為尋陽太守武陵王長史卒官又曰賀琛字國寶幼孤伯父瑒授其經業一聞便通義理瑒異之常曰此兒當以明經致貴瑒卒後琛家貧常往還諸暨敗栗以養母雖自執舟楫閑則習業尤精三禮年二十餘瑒之門徒稍從問道初瑒於鄉里聚徒教授四方受業者三千餘人瑒天監中亡至是復集琛矣琛乃築室郊郭之際茅茨數間年將三十便事講授既世習禮學究其微精占術先儒吐言辯潔坐之聽受終日不疲後周書梁晉熙郡王蕭大圜當元帝時以世多忌恐讒愬生焉乃屏絕人事門客左右不過三兩人不妄遊狎恒以講詩書易為事梁元帝嘗自問五經要事數十條大圜辭約指明應荅無滯梁元帝甚歎美之因曰昔河間好學爾既有之臨淄好文爾亦兼之然東平為善彌高前載吾重之愛之爾當傚焉, SBCK: 酒}
