  - {type: variant, offset: 739, length: 228, content: 休賈長頭後漢書曰鄭玄西入關因𣵠郡盧植事扶風馬融融門徒四百餘人升堂者五十餘生融素驕貴玄在門下三年不得見乃使高業弟子傳授於玄玄日夜尋誦未嘗怠倦會融集諸生考論圖緯聞玄善筭乃召見於樓下玄因質諸疑義問畢辭歸融喟然謂門人曰鄭生今去吾道東矣又盧植於馬融受學融列女樂於前植侍講積年未曾轉眄馬融是以敬之又曰大將軍袁紹總兵冀州造使要鄭玄大會賓客玄最後至乃延升上座玄身八尺飲酒一斛秀眉明目容儀溫偉紹客多豪俊見玄儒者未以通人許之競設異端百家互起玄依方辯對咸出問表皆得所未聞莫不嗟服, SBCK: 視麥漂}
