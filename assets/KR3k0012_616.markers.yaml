  - {type: variant, offset: 2027, length: 3, content: 盧景裕, krp: 臧與榖相與牧羊而俱亡其羊問臧奚事挾䇿讀書問榖奚事}
  - {type: variant, offset: 2031, length: 2, content: 通經, WYG: 塞以遊又曰桓公讀書於堂上輪扁斵輪於堂下釋椎鑿而問曰敢問公所讀者何言也公曰聖人之言也曰聖人在乎公曰已死矣曰然則公所讀者古人之糟粕也公曰寡人讀書輪人安得議乎有說則可無說則死扁曰以臣之事觀之斵輪徐則甘而不固疾則苦而不入不徐不疾得於手而應于心口不能言也有數存於其間臣不能以喻臣之子臣之子亦不能受之於臣是以行年七十而老斵輪古人與其不可傳者死矣然則君之所讀者古人之糟粕而已尚書大傳曰子夏讀書畢見夫子夫子問子何為於書乎子夏曰書之論事皎皎如日月之代明離離如參辰之錯行商所受於夫子者志於心弗敢忘也尸子曰孔子曰誦詩讀書與古人居說苑曰孔子讀易至於損益則喟然而歎子夏避席而問曰夫子何為歎也孔子曰夫自損者益自益者缺吾是以歎也子夏曰然則學者不可以益乎孔子曰否天之道成而必變未嘗得久也夫學者以虛受之昔堯履天子之位猶允恭以持之虛静以待下故百載而逾盛迄今而益章昆吾自臧而滿意窮髙而不衰故當時虧敗迄今而逾惡是非損益之徴歟日中則昃月盈則食天地盈虛與時消息是以聖人不敢當盛升輿而遇三人則下二人則軾調其盈虛故能長盛也子夏曰善請終身誦之神仙傳曰孔子讀書老子見而問曰是何書也曰易也聖人亦讀之老子曰聖人可也汝曷為讀之洞㝠記曰李充者馮翊人也自言三百嵗從始皇登會稽山以望江漢之流也少而好學為嬴秦博士門徒萬人伏生時十嵗乃就充石壁山中受尚書乃以口傳授伏子四代之事畧無遺脫伏子因而誦之常以細䋲十餘尋以縛腰誦一遍則結繩一結十尋之繩皆成結矣計誦尚書可數萬遍但食榖損人精會有遺失伏子今所傳百卷得其一二耳故堯舜二}
