  - {type: variant, offset: 995, length: 321, content: 有識以此非之三國典略曰齊崔謙遷鉅鹿太守恩信大行改鞭用熟皮為之不忍見血示恥而已有貧弱未理者皆曰我自造白鬢公不慮不決在郡七載獄無停囚齊春秋曰齊景真為晉乎太守有惠政常懸一蒲鞭未嘗用之齊書曰薛安都從弟道生以軍功為大司馬參軍犯罪為秣陵令庾淑之所鞭安都大怒乃乘馬從數十人令左右執矟欲往殺淑之行至朱雀航逢柳元景遙問曰薛公何之安都躍馬至車後曰小子庾淑之鞭我從弟今往剌殺之元景慮其不可駐紿之曰小子無宜適卿往與手甚快安都既廻馬元景復呼之令下馬入車因讓之曰卿從弟服章言論與寒細不異且人身犯罪理應加罰卿朝廷勳臣云何放恣輒於都邑殺人非唯科律所不容主上亦無辭相宥因載俱歸安都乃止南史曰禇玠為山陰令時舍人曹義達為宣帝寵縣人陳信家富謟事義達信父顯文恃勢撗恣玠乃遣使執顯文鞭之, WYG: ''}
