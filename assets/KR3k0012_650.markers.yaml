  - {type: punctuation, offset: 6, content: 《, id: KR3k0012_CHANT_650-bkkpn1}
  - {type: variant, offset: 7, length: 2, content: 禮秋, WYG: 書曰宣帝自公卿以下皆被楚撻其間誅戮黜免者不可勝言每笞箠人以百二十為度名曰天杖宫人内職亦如之后妃嬪御雖被寵嬖亦多被杖背於是内外恐懼人不自安北史曰盧潛為黄門鄭子黙奏潛從清河至岳南討岳令潛說梁將侯瑱大納瑱賂遺還不奏聞文宣杖潛一百仍截其鬚鬢潛顏色不變三國典畧曰齊義寧太守荀仲舉字士髙頴川汝隂人也在郡清簡亦工詩詠嘗與長樂王尉粲劇飲齧粲指至骨齊文宣知之賜杖一百或問其故云我那許當時止疑是麈尾耳又曰齊馮翊王潤字子澤神武第十四子也亷慎方雅習於吏職神武嘗稱之曰此是吾家千里駒也初為定州刺史開府王廻洛闗督獨孤秡侵竊}
