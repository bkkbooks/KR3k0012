  - {type: variant, offset: 2735, length: 154, content: 正當上前曰陛下不以臣不肖置臣左右臣言若是陛下安得不聽臣言若非當致之於理以明國法豈得輕臣而不顧也臣所言非私因置笏於地而退上歛容謝之遂原所笞者管子曰棟橈不勝任則屋覆而人不怒者其理然也弱子慈母所愛也不以其理不瓦則慈母笞之說苑曰韓伯瑜有過其母笞之泣其母問曰他日笞之未嘗泣今何泣對曰他日瑜得笞常痛今母力之衰笞不痛是以泣, SBCK: 尚爲坐受杖一百時論美}
