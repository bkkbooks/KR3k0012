  - {type: variant, offset: 95, length: 0, content: '', WYG: 輕決罰上然其言嘉真不悦退而謂説曰何言事之深也説曰宰相者時來耳君豈能長據若貴臣盡當可杖但恐吾等行當及之此言非為伷先乃為天下士君子也又曰王遂為浙西觀察使每有笞撻其杖率過常制既遇禍監軍使封其杖來獻命}
