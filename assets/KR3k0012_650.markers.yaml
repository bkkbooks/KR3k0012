  - {type: variant, offset: 79, length: 110, content: 尚書郎張龕書屬郎中馬融宜在臺閣又中郎將任尚遺鳳馬後尚坐斷盜軍糧檻車徵詣廷尉鳳懼事洩先自首於騭騭畏太后遂髡妻以謝曹暪別傳曰太祖常行經麥中令士卒犯麥者死騎士皆下馬持夌以相付時太祖馬騰入夌中主簿對以春秋之義罰不加於尊太祖曰制法, SBCK: 九卿爲宻乃與小吏爲宻乎帝聞}
