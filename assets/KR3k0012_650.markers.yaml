  - {type: variant, offset: 2713, length: 0, content: '', SBCK: 臣聞刑不上大夫以其近於君也故曰士可殺不可辱臣今秋廵邊中途聞姜皎朝堂决杖流皎是三品亦有微功不冝决廷辱以卒伍待之且律有八議勲貴在焉今伷先不可輕行决罰上然其言嘉貞不恱退而謂恱曰何言事之深也􅀃曰宰相者時來即爲豈能長據􅀂貴臣盡當可杖但恐吾等行當及之}
