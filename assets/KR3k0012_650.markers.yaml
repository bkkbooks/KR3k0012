  - {type: variant, offset: 2692, length: 4, content: 未幾遷黃, SBCK: 柳或等諌以爲朝堂非殺人之所殿庭非决罰之地帝不納熲等乃盡詣朝堂請罪曰陛下子育群生務在去弊而百姓無知犯者不息致陛下决罰過嚴皆臣等不能有所禆益請自退屏以避賢路帝於是顧謂領左右都督田元曰吾杖重乎元曰重帝問其狀元舉手曰陛下杖大如指捶楚人三十者比常杖數百故多致死帝不懌乃令殿内去杖欲有决罰各付所由又曰庫狄士文拜具州刺史性清苦不受公料家無餘財其子嘗噉官厨餅士文枷之於獄累曰杖一百歩送還京僮􅈻無敢出門又曰燕榮爲幽州緫管按部道次見藂荆堪爲笞捶命取之輒以試人人或自陳無咎榮曰後􅀂有罪當免尓及後犯細過將撾之人曰前日􅀍杖使君許有罪宥之榮曰無過尚尔况有過耶搒捶如舊唐書曰開元二年監察御史蔣挺有所犯勑朝堂杖之黄}
