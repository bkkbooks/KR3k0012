  - {type: variant, offset: 190, length: 388, content: 自犯之何以率下然孤為軍師不可殺請自刑因拔劍割髮以置地會稽典錄曰吳範與鄱陽太守魏騰少相友善騰嘗有罪吳主怒甚敢有諫者死範謂騰曰與汝皆死騰曰死無益何死為範曰安能慮此坐汝耶乃髡頭自縛詣閣下使鈴下以聞鈴下不敢曰必死不可範曰汝有子曰有使汝為吳範死汝子屬我鈴下曰諾乃排閤入吳主大怒欲投以戟逡巡走出範因突入叩頭流血言與涕并良久吳主意釋乃免騰晉律曰髡鉗五歲刑張斐律序曰髡者刑之威秋彫落之像後魏書曰李訢負罪得降免有旨鞭髡刑配為廝役訢之廢也平壽侯張讜見與語奇之謂人曰此佳士也終不久屈未幾而復為太倉尚書風俗通曰秦始皇遣蒙恬築長城徒士犯罪亡依鮮卑山後遂繁息今皆髡頭衣赭亡徒之明効也鞭書曰鞭作官刑為辦治官事之刑也傳曰齊襄公田于貝丘見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼墜于車傷足喪屨反誅屨於徒人費弗得鞭之見血又曰重耳過衛衛文公不禮焉出於五鹿乞食於野人與之塊公子欲鞭之子犯曰天賜也稽首受而載, SBCK: 愈敬禪}
