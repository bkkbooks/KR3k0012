  - {type: variant, offset: 14, length: 8, content: 髡者使守積鄭司農, SBCK: 檟楚二物収其威也家語}
  - {type: variant, offset: 14, length: 2, content: 髡者, WYG: 馮翊王少小謹慎内外所知不為非法朕信之矣登髙逺望人之常情何足可道䑕輩輕相間搆理應從斬猶以舊人未忍致法廻洛決鞭二百秡宜決杖一百隋書曰髙祖性猜忌素不悦學既任智而獲大位因以文法自矜明察臨下恒令左右覘視内外有小過失則加以重罪又患令史贜汚因私}
  - {type: page-break, offset: 14, content: '', id: KR3k0012_WYG_650-4a, image: WYG0898/WYG0898-0780c.png}
  - {type: variant, offset: 14, length: 8, content: 髡者使守積鄭司農, krp: 檟楚二物収其威也家語}
  - {type: variant, offset: 17, length: 24, content: 守積鄭司農曰髡當為完謂但居作三年不虧其體者也五刑, WYG: 人以錢帛遺之得犯立斬每於殿廷打人一日}
