  body:
  - {type: variant, offset: 4, length: 3, content: 五髡周, SBCK: 六杖督流徒杖尚書堯典曰朴作教刑撲檟楚也不勤道業則撻之}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 六杖督流徒杖尚書堯典曰朴作教刑朴榎楚也不勤道業則撻之禮記學記曰榎楚二物收其威也家語曰舜之事父小杖則受大杖則走後漢紀曰明帝時政事嚴峻九卿皆鞭杖左雄上言九卿位次三事班在大臣行有佩玉之節動有庠序之儀加以鞭杖誠非古典上即除之魏志曰楊阜字義山為大臣卿上疏欲省宫人諸不見幸者乃召御府吏問後宫人數吏守舊令對曰禁密不得宣露阜怒杖百數之曰國家不與九卿為宻乃與小吏為宻乎帝聞之愈敬憚之又曰周宣字孔和樂安人為郡吏太守楊沛夢八月一日曹公當至必與君杖飲以藥酒使宣占之對曰夫杖起弱藥治人病八月一日賊必除滅至期賊果破蜀志曰劉琰妻胡入賀太后太后令特留胡經月乃歸胡有美色琰疑其與後主有私呼卒伍撾胡至於以杖搏面而後棄遣胡具以吿琰坐下獄有司議卒非撾妻之人面非受杖之地琰竟棄市王隱晉書曰武帝以山濤為司徒頻讓不許出而徑歸家左丞白裦又奏濤違詔杖裦}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_650-1b, image: WYG0898/WYG0898-0779b.png}
