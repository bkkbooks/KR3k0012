  - {type: variant, offset: 428, length: 514, content: 書風俗通曰秦始皇遣蒙恬築長城徒士犯罪亡依鮮卑山後遂繁息今皆髡頭衣赭亡徒之明効也鞭書曰鞭作官刑為辦治官事之刑也傳曰齊襄公田于貝丘見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼墜于車傷足喪屨反誅屨於徒人費弗得鞭之見血又曰重耳過衛衛文公不禮焉出於五鹿乞食於野人與之塊公子欲鞭之子犯曰天賜也稽首受而載之又曰楚子將圍宋使子文治兵於睽終朝而畢不戮一人子玉復治兵於蒍終日而畢鞭七人貫三人耳又曰衛獻公初有嬖妾使師曹誨之琴誨教也師曹鞭之公怒鞭師曹三百穀梁傳成公曰梁山崩壅河三日不流晉君召伯遵而問焉伯遵來遇輦者不辟使車右下而鞭之輦者曰所以鞭我者取道遠矣伯遵下車問焉曰子有聞乎對曰梁山崩伯遵曰君為此召我如之何輦者曰天有山天崩之天壅之雖召伯遵其若之何伯遵由悉問焉悉至疑欲重問之也輦者曰君親素縞帥臣而哭之既祀焉後漢書曰劉寬遷南陽太守典歷三郡溫仁多恕雖在倉卒未嘗疾言遽色常以為齊之以刑民免而無恥吏人有過但用蒲鞭罰之示辱而已漢晉春秋曰明帝勤於吏事苛察踰甚或於殿前鞭殺尚書郎晉中興書曰謝鯤字幼與弱冠知名值中朝大亂長沙王乂輔政親媚小人忌害君子時疾鯤名譖之乂遂執欲鞭之鯤解衣伏鑕神無遽容乂異而釋之文無喜色又曰皇帝詔飛督王饒忽上吾鴆鳥口云以辟惡此凶物豈宜妄進, WYG: ''}
