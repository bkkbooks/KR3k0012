  - {type: variant, offset: 5, length: 1, content: 髡, WYG: 十晉陽秋曰諸葛武侯杖二十以上親決宣王聞之喜曰吾無患矣後}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_650-bkkxmlele2}
