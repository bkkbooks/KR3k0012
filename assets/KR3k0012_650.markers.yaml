  - {type: variant, offset: 3397, length: 228, content: 弟娶羆妹以報其恩又曰尉古真代人也道武之在賀蘭部賀梁于遣侯引乞突等將肆逆古真知之密馳以告染于疑古真泄其謀乃執持之以兩車軸捍其頭傷其目不服乃免之梁書曰梁代舊律測囚之法曰一上起自晡鼓盡于二更及比部郎中泉刪定律令以舊法測立持久非人所堪分其刻數曰再上廷尉以為新制過輕請集八座議之尚書周弘正議曰凡小大之獄必應以情豈可恣考掠以制刑罪且測人時節本非古制近代以來方有此法起自晡鼓迄于二更豈是常人所能堪忍所以重械之下誣枉者多朝晚二時同等刻進退而求於事為哀會稽典錄曰梁宏句章人也, SBCK: ''}
