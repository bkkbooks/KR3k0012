  - {type: variant, offset: 1742, length: 945, content: 時匈奴有降者詔賜縑三百疋尚書郎暨酆誤以三千疋賜之上大怒鞭酆殿下重痛將死意直排閣入諫曰陛下德被四表恩及夷狄是以左袵之徒稽首來服愚聞刑疑從輕賞疑從重今陛下以酆賞誤發雷霆之威海內謂陛下貴微財而賤士命也又曰謝夷吾為郡功曹吏太守第五倫妻車馬入府無所關啟夷吾鞭功曹佐吏門闌卒牽車馬出之收其人從倫為解之良久乃已汝南先賢傳曰許嘉年十三父給亭治道坐不竟當得鞭嘉叩頭流血請得免由是感激讀書梅陶自敘曰余居中丞曾以鞭皇太子傅親友莫不致諫余笑而應之曰堂高由階皇太子所以得崇於上由吾奉王憲於下也豈其枉道取媚後皇太子特見延賜以清讌笞史記曰張儀嘗從楚相亡璧意疑盜執掠笞數百不服釋之漢書曰曹參子窋為中大夫惠帝怪相國不治事謂窋曰汝歸私從容問乃父曰高帝新棄群臣帝富於春秋君為相國日飲無所請何事以憂天下然無言吾告汝也窋既洗沐歸時間自從帝所陳參怒而笞之二百曰趍入侍天下事非乃所當言也又曰景帝元年下詔曰加笞與重罪無異重罪謂死刑幸而不死不可為人謂不能自起居也其定律笞五百曰三百笞三百曰二百猶尚不存至中六年又下詔曰加笞者或至死而笞未畢朕甚憐之其減笞三百曰二百笞二百曰一百又曰笞者所以教之也其定箠令箠策也所以擊者也丞相劉舍御史大夫衛綰請笞者箠長五尺其本大一寸其竹也末薄半寸皆平其節當笞者笞臀母得更人畢一罪乃更人自是笞者得全又曰車千秋為高廟寢郎會衛太子為江充所譖敗之千秋上急言訟太子冤曰子弄父兵罪當笞耳天子之子過誤殺人當何罪哉臣嘗夢見一白頭翁教臣之言是時上頗知太子惶恐無他意乃大感悟焉又曰孝平后有節操自劉氏廢常稱疾不朝會莽敬憚傷哀欲嫁之迺更號為皇新室主令立國將軍成新公孫建世子豫成飾也音象飭醫往問后疾后大怒笞鞭其傍侍御因發疾不肯起莽遂不敢強也及漢兵誅莽燔燒未央宮后曰何面目以見漢家自投火而死楚漢春秋曰上敗彭城丁固追上上被髮而顧曰丁公何相逼之甚乃廻馬而去上即位欲陳功上曰使項氏失天下是子也為人臣用兩心非忠也使下吏笞殺之東觀漢記曰鄧禹攻赤眉曰無穀食自當來吾折箠笞之非諸將憂也後漢書曰汝南太守宗資署范滂功曹委任政事滂外甥西平李頌公族子孫而為鄉曲所棄中常侍唐衡以頌請資資用為吏滂以非其人寢而不召資遷怒捶書佐朱零零仰曰范滂清裁猶以利刃斷腐朽今日寧受笞死而滂不可違資乃止又曰橋玄再遷上谷太守又為漢陽太守時上邽令皇甫禎有贓罪玄收考髡笞死于冀市隋書曰劉行本為, SBCK: 髙熲}
