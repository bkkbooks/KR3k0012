  - {type: variant, offset: 1127, length: 230, content: 執矟欲往殺淑之行至朱雀航逢柳元景遙問曰薛公何之安都躍馬至車後曰小子庾淑之鞭我從弟今往剌殺之元景慮其不可駐紿之曰小子無宜適卿往與手甚快安都既廻馬元景復呼之令下馬入車因讓之曰卿從弟服章言論與寒細不異且人身犯罪理應加罰卿朝廷勳臣云何放恣輒於都邑殺人非唯科律所不容主上亦無辭相宥因載俱歸安都乃止南史曰禇玠為山陰令時舍人曹義達為宣帝寵縣人陳信家富謟事義達信父顯文恃勢撗恣玠乃遣使執顯文鞭之一百於是吏人股慄唐書曰太宗以暇日遍閱群書因讀明堂孔穴云人五藏之系咸附背脊針炙失所皆, SBCK: 覘視内外}
