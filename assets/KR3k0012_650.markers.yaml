  - {type: variant, offset: 71, length: 3, content: 鄧騭子, WYG: 開元二年監察御史蔣挺有所犯勑朝堂杖之黄門}
  - {type: variant, offset: 71, length: 7, content: 鄧騭子侍中鳳嘗, krp: 明帝時政事嚴峻九卿皆鞭杖左雄上言九卿位次三事班在大臣行有佩玉之節動有庠序之儀加以鞭杖誠非古典上即除之魏志曰楊阜字義山爲大匠卿上䟽欲省宫人諸不見幸者乃召卿府史問後宮人數吏崔令對曰禁宻不得宣露阜怒杖百數之曰國家不}
  - {type: variant, offset: 75, length: 0, content: '', WYG: 郞張廷珪曰御史憲司清望耳目之官有犯當殺即殺當流即流不可決杖可殺不可辱也又曰開元前廣州都督裴伷先下獄}
  - {type: variant, offset: 76, length: 3, content: 鳳嘗與, WYG: 書令張嘉真奏請決杖兵部}
