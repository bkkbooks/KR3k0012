  - {type: variant, offset: 43, length: 0, content: '', WYG: 或至數四嘗怒門事捶楚不甚即命斬之于朝尚書左僕射髙熲治尚書御史柳彧等諫以為朝堂非殺人之所殿廷非決罰之地帝怒熲等乃盡詣朝堂請罪曰陛下子育羣生務在去弊}
  - {type: variant, offset: 44, length: 1, content: 髡, WYG: 百姓無知犯}
  - {type: variant, offset: 46, length: 2, content: 必王, WYG: 不息致陛下決罰過嚴皆臣等不能有所禆益請自退屏以避賢路帝於是顧謂領左右都督田元曰吾杖重乎元曰重帝問其狀元舉手曰陛下杖大如指捶楚人三十者比常杖數百故多致死帝不懌乃令殿内去杖欲有決罰各付所司又曰庫狄士文拜真州刺史性清苦不受公料家無餘財其子嘗噉官厨餅士文枷}
