  - {type: variant, offset: 1318, length: 424, content: 於是吏人股慄唐書曰太宗以暇日遍閱群書因讀明堂孔穴云人五藏之系咸附背脊針炙失所皆有損害乃廢書而歎曰今律決笞者皆六髀背分受乃有邂逅致死之義撻人之背理則宜然夫箠五刑之最輕者死者人生之至重者也豈容犯最輕之刑而或鞭笞致死自古帝王由來未悟不亦悲夫即頒制決罪人不得鞭背晉令曰應得法鞭者即執以鞭過五十稱行之有所督罪皆隨過大小大過五十小過二十鞭皆用牛皮革廉成法鞭生葦去四廉常鞭用熟靻之列反柔革也不去廉作鵠頭紉長一尺一寸鞘長二尺二寸廣三分厚一分柄皆長二尺五寸搜神記曰神農以赭鞭鞭百草盡知其毒寒溫臭味所主故天下號曰神農也異苑曰河內司馬惟之奴天雄死死後還其婦來善聞體有鞭瘡而卻著鏁問云有何遇至如此曰曾因醉竊罵大家今受此罪列女傳曰楚野辯女者昭氏妻也鄭簡公使大夫聘於荊至於狹路有一婦人乘車與大夫遇擊折大夫車之軸大夫怒將執而鞭之女曰妾聞君子不遷怒不貳過今狹路之中妾之避已極矣而子大夫之僕不肯少伺是以廢于大夫之車而反執妾豈非遷怒哉不怒僕而反怒妾豈不貳過哉會稽典錄曰鍾離意為尚書僕射, WYG: ''}
