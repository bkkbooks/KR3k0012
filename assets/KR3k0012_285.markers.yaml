  - {type: variant, offset: 2766, length: 11, content: 兇懼兇許拱切費悉眾亡歸, SBCK: 乏糧諸將並請攻之景王曰誕聚糧完守外結呉人自謂足據淮南必不便走今􅀂急之損逰軍之力外宼卒至表裏受敵此危道也且堅守三靣􅀂賊陸道而來軍糧必少吾以逰兵輕􅀐絶其轉輸可不戰而破外賊欽等必爲擒矣誕欽等出攻長圍諸軍逆擊走之􅀄誕欽内不相恊乃至窮蹙轉相疑貳誕殺欽子鴦踰城以爲將軍封侯使廵城而呼景王見城上持弓者不發因令攻而抜之}
