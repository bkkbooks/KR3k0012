  - {type: variant, offset: 2751, length: 9, content: 臨陣斬邑既而收首級, SBCK: 三戰皆捷又曰田豫字國讓率擊鮮卑軻比能單將銳卒􅀷入虜庭胡人衆多鈔軍前後斷截歸路國讓乃進軍去虜十餘里結屯營多聚牛馬糞燃之從他道引去胡見煙火不絶以爲尚在去行數十里乃知之又曰諸葛誕文欽反據壽春司馬景王揔兵討之謂諸將曰彼當突圍決一朝之命或謂大軍不能乆省食減口兾有他變料賊之情不出此二者今當多方以亂之備其越逸此勝計也因命合圍分遣羸疾就糓淮北廪軍士大豆人三勝欽聞之果喜景王愈羸形}
