  - {type: variant, offset: 14, length: 4, content: 趙弘據宛, WYG: 曹公與袁紹相持官渡曹公循河而西紹於是渡河追公軍至延津南公勒兵駐營南坂下使登壘視之曰可五六百騎有頃復白騎稍多歩兵不勝数公曰勿復白乃令騎放馬解鞍是時車馬輜重就道諸將以為敵騎多不如還保營荀攸曰此所以餌敵也如何去之紹騎将文醜與𤣥徳將五六千騎前後至諸將復白可上馬公曰未也有頃騎至稍多或分輜重公曰可矣乃皆上馬時騎不滿六百遂縱兵擊之大破又曰曹公既尅鄴袁尚熈遂奔遼東衆百数十初遼東太守公孫康恃逺不服曹公破烏丸或說公遂征之尚熈可擒公曰吾乃使康斬送其首不煩兵矣公引兵還康果斬送尚熈𫝊其首諸將或問曰公還而康斬尚熈何也公曰彼素畏尚熈其急之則并力緩之則相圖其勢然也又曰曹公討烏丸出盧龍塞外道絶不通乃塹山堙谷五百餘里經白檀厯平岡渉鮮卑庭東指栁}
