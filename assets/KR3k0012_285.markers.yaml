  - {type: variant, offset: 10, length: 0, content: '', SBCK: 曰曹公西征馬超與超夾關爲軍公急持之而潜遣徐晃朱靈等夜度蒲坂津據河西爲營公自潼􅀜北度未濟超赴舡急戰公放馬牛以餌賊賊亂取牛馬公得度循河爲甬道而南賊退距渭口公乃多設疑兵潜以舟載兵入渭爲浮橋夜分兵結營於渭南賊夜攻營伏兵擊破之又曰曹公與􅀽紹相持官渡曹公循河而西紹於是渡河追公軍至延津南公勒兵駐營南坂下使登壘視之曰可五六百騎有頃復白􅀐稍多歩兵不勝數公曰勿復白乃令騎放馬解鞅是時白馬輜重就道諸將以爲敵􅀐多不如還保營荀攸曰此所以餌敵也如何去之紹􅀐將文醜與劉備將五六千􅀐前後至諸將復白可上馬公曰未也有頃􅀐至稍多或分輜重公曰可矣乃皆上馬時􅀐不滿六百遂縱兵擊之大破又曰曹公旣尅鄴􅀽尚熈遂奔遼東衆有數千􅀄遼東太守公孫康恃逺不服曹公破烏丸或􅀃公遂征之尚熈可擒公曰吾方使康斬送其首不煩兵矣公引兵還康果斬送尚熈傳其首諸將或問曰公選而康斬尚熈何也公曰彼素畏尚熈其急之則并力緩之則相圖其􅀔然也又曰曹公討鮮卑出盧龍塞外道絶不通乃塹山堙谷五百餘里經白擅歴㓻平渉鮮卑庭東䧟柳城未至二百里虜乃知之將數萬􅀐逆軍登白狼山卒與虜遇衆甚盛公登髙觀虜陣不整縱兵擊之使張遼爲先鋒虜大敗又曰黄巾賊起命將}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_SBCK_285-1b}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_SBCK_285-2a}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 曰曹公西征馬超與超夾関為營公急持之而􅇓遣徐晃}
  - {type: variant, offset: 10, length: 0, content: '', krp: 曰曹公西征馬超與超夾關爲軍公急持之而潜遣徐晃朱靈等夜度蒲坂津據河西爲營公自潼關北度未濟超赴舡急戰公放馬牛以餌賊賊亂取牛馬公得度循河爲甬道而南賊退距渭口公乃多設疑兵潜以舟載兵入渭爲浮橋夜分兵結營於渭南賊夜攻營伏兵擊破之又曰曹公與袁紹相持官渡曹公循河而西紹於是渡河追公軍至延津南公勒兵駐營南坂下使登壘視之曰可五六百騎有頃復白騎稍多歩兵不勝數公曰勿復白乃令騎放馬解鞅是時白馬輜重就道諸將以爲敵騎多不如還保營荀攸曰此所以餌敵也如何去之紹騎將文醜與劉備將五六千騎前後至諸將復白可上馬公曰未也有頃騎至稍多或分輜重公曰可矣乃皆上馬時騎不滿六百遂縱兵擊之大破又曰曹公旣尅鄴袁尚熈遂奔遼東衆有數千𥘉遼東太守公孫康恃逺不服曹公破烏丸或說公遂征之尚熈可擒公曰吾方使康斬送其首不煩兵矣公引兵還康果斬送尚熈傳其首諸將或問曰公選而康斬尚熈何也公曰彼素畏尚熈其急之則并力緩之則相圖其勢然也又曰曹公討鮮卑出盧龍塞外道絶不通乃塹山堙谷五百餘里經白擅歴㓻平渉鮮卑庭東䧟柳城未至二百里虜乃知之將數萬騎逆軍登白狼山卒與虜遇衆甚盛公登髙觀虜陣不整縱兵擊之使張遼爲先鋒虜大敗又曰黄巾賊起命將}
  - {type: variant, offset: 11, length: 2, content: 儁傳, WYG: 靈等夜渡蒲坂津據河西為營公由潼關北渡未濟超赴舡急戰因放馬牛以餌賊賊亂取牛馬公得渡循河為甬道而南賊退距渭口公乃多設疑兵潜以舟載兵入渭為浮橋夜分兵結營渭南賊夜攻營伏兵擊破之魏志}
