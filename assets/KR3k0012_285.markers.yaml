  - {type: variant, offset: 2162, length: 1, content: 莫, SBCK: 分其􅀔乃可公到延津若將度兵向其後紹必西應之然輕兵襲白馬掩其不備顔良可擒也公從之紹聞兵度即留分兵西􅀿之乃引軍兼行趣白馬未至十餘里良大驚來逆戰使張遼關羽前登擊破斬良遂解白馬圍又曰曹公擊破馬超超走涼州􅀜中平諸將或問曹公曰􅀄賊守潼􅀜渭北道􅆙不從河東擊馮而反守潼􅀜引曰而後北度何也公曰賊守潼􅀜􅀂吾入河東賊必引守諸津則西河未可度也吾欲盛兵向潼關賊悉衆南守西河之備虚故徐晃等得擅取西河然後引軍北度賊不能與吾爭西河者以有二將之軍也連車樹柵爲甬道而南旣爲不可勝且以示弱度渭爲堅壘虜至不出所以驕之也故賊不爲營壘而永割地吾順僞言許之所以縱逸其意使自安而不爲備因蓄士卒之力一朝擊之所謂疾雷不及掩耳兵之變化固非一道也又曰蜀將􅀜羽圍曹公將曹仁於樊又圍將軍吕布於襄陽曹公遣將徐晃救仁以羽難與爭鋒遂前至偃城晃詭道作都壍示欲截其後賊燒屯走晃得偃城兩靣連營稍前去賊圍三丈所未攻賊圍頭有屯又別屯四􅃁晃揚聲當攻圍頭屯而密攻四冢羽見四冢欲壞自將歩兵五千出戰晃擊之退走遂追蹈與俱入圍破之或自投􅃆水死曹公令曰賊圍塹鹿角十重將軍致戰勝今䧟賊圍多斬首虜吾用兵三十餘年及所聞古之善用兵未有長驅徑入敵圍者又曰曹公征􅀜中進軍度渭馬超及韓遂數請戰不許因請割地公用賈詡計僞許之韓遂請與公相見公與遂交馬語移時不及軍事但􅀃京都故舊拊手懽􅀏旣罷超等問遂公何言遂曰無所言也超等疑之他日公又與遂書多所點竄}
