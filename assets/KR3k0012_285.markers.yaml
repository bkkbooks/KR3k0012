  - {type: variant, offset: 334, length: 927, content: 水中偽立𨻳以為捕魚而潛從𨻳下過軍續漢書𨻳字作堰北賊追之決水已深不得渡時眾軍敗退唯卓全師而還又曰臧宮將兵屯駱越越人謀叛從蜀宮兵少力不能制會屬縣送委輸車數百乘至宮夜使鋸斷城門限令車廻轉出入至旦即越人候伺者聞車聲不絕而門限斷相告以漢兵大至其渠帥乃奉牛酒以勞軍營宮陳兵大會擊牛釃酒饗賜慰納之又曰蜀有妖巫維汜弟子單臣傅鎮等復妖言相聚入原武城維或作侯劫吏人自稱將軍於是遣臧宮將北軍及黎陽營數千人圍之賊穀食多數攻不下士卒死傷帝召公卿諸侯王問方略皆曰宜重其購賞時顯宗為東海王獨對曰妖巫相劫勢無久立其中必有悔欲亡者但外圍急不得走耳宜小挺緩挺解也令得逃亡逃亡則一亭長足以禽矣帝然之即勑宮撤圍緩賊賊眾分散遂斬臣鎮等又曰岑彭南擊秦豐與其大將蔡宏拒彭等於鄧數月不得進帝怪以讓彭彭懼於是夜勒兵馬申令軍中使明旦西擊山都山都縣名屬南陽郡乃緩所獲虜令得逃亡歸以告豐豐即悉其軍西邀彭彭乃潛兵渡沔水擊其將張楊於阿頭山大破之沔水源出武都東狼谷中即漢水之上源也阿頭山在襄陽從川谷間伐木開道直襲黎丘擊破諸屯兵豐聞大驚馳歸救之彭與諸將依東山為營豐與蔡宏夜攻彭彭預為之備出兵逆擊之豐敗走追斬蔡宏又皇甫嵩傳曰梁州賊王國圍陳倉復拜嵩為左將軍督前將軍董卓各率二萬人拒之卓欲速進赴陳倉嵩不聽卓曰智者不後時勇者不留決速救則城全不救則城滅全滅之勢在於此也嵩曰不然百戰百勝不如不戰而屈人之兵是以先為不可勝以待敵之可勝不可勝在我可勝在彼彼守不足我攻有餘孫子之文有餘者動於九天之上不足者陷於九地之下玄女三宮戰法曰行兵之道天地之寶九天九地各有表裏九天之上六甲子也九地之下六癸酉也子能順之萬全可保今陳倉雖小城守固備非九地之陷也王國雖強而攻我之所不救非九天之勢也夫勢非九天攻者受苦害陷非九地守者不拔國今已陷受害之地而陳倉保不拔之城我可不煩兵動眾而取全勝之功將何救焉遂不聽王國圍陳倉自冬迄春八十餘日城堅守固竟不能拔賊眾疲弊果自解去嵩進兵擊之卓曰不可兵法窮寇勿迫歸眾勿追司馬兵法之言今我追國是迫歸眾追窮寇也困獸猶鬭蜂蠆有毒况大眾乎嵩曰不然前吾不擊避其銳也今而擊之待其衰也所擊疲師非歸眾也且走者莫有鬭志以整擊亂非窮寇也遂獨進擊之使卓為後拒連戰大破斬首萬餘級國走而死卓大慚恨由是忌嵩又曰吳漢岑彭討公孫述述使其將延岑等悉兵拒廣漢及資中又, SBCK: 紹}
