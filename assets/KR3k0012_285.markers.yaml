  - {type: variant, offset: 90, length: 204, content: 司馬張超及徐璆秦頡皆欲聽之儁曰兵有形同而勢異者秦項之際人無定主也故賞附以勸來耳今海內一統唯黃巾造寇納降無以勸善討之足以懲惡今若受之更開逆意賊利則進戰鈍則乞降縱敵長寇非良計也因急攻連戰不剋儁登土山望之顧謂張超曰吾知之矣賊今外圍周固內營逼急乞降不受欲出不得所以死戰也萬人一心猶不可當況十萬乎其害甚矣不如徹圍并兵入城忠見圍解勢必自出自出則意散易破之道也既而解圍忠果出戰儁因擊之大破之乘勝逐北數十里斬首萬餘級忠等遂降, SBCK: ''}
