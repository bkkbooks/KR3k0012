  - {type: variant, offset: 2983, length: 4, content: 公征河北, SBCK: 仁圍寧吕蒙往救之仍分遣三百人柴斷嶮道賊走可得其馬軍到夷陵即日交戰所殺過半敵夜遁去行過此道騎皆捨馬歩走蒙兵追蹙􅀗馬三百疋方舡載還又曰賀齊討黟歙賊帥黟音伊切歙音攝陳㒒祖山等二萬户屯歴林山四靣壁立髙數十丈逕路危狹下容方楯賊臨髙下石不可得攻軍住經日將吏患之齊身出周行觀視形便隂募輕捷士爲作鐡戈密於隱嶮賊所不備處以戈柘山爲縁道道成夜令潜上乃多懸布以受不人得上百數十人四靣流布俱鳴鼓角齊勒兵待之賊夜聞鼔聲四合謂大軍悉巳得上驚懼惑亂不知所爲守路備險者皆走還依衆大軍因是得上其中有善禁術呉}
