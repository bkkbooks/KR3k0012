  - {type: variant, offset: 1529, length: 629, content: 使諸將屯澠池要其東而異擊其西一舉取之此萬成計也禹弘不從弘遂大戰移日赤眉佯敗棄輜重而走車皆載土以豆覆其上兵士飢爭之赤眉引還擊弘弘軍大亂異與禹合兵救之赤眉小却異以士卒飢倦可且休禹不聽復戰大為所敗又曰河南賊張步據地漢將耿弇討之壁於臨淄步與其三第藍弘壽及故大彤渠帥重異等兵重姓異名也號二十萬至臨淄大城東將攻弇弇先出淄水上與重異遇突騎欲縱弇恐挫其鋒令步不敢進固示弱以盛其氣乃引歸小城陳兵於內步氣盛直攻弇營與弇禆將劉歆等合戰弇升王宮壞臺望之臨淄本齊國所都即齊王宮中壞臺也視歆等鋒交乃自引精兵橫交突步陣於東城下破之又曰赤眉青犢十餘萬眾並在射犬光武引兵將擊之耿純軍在前去眾營數里賊忽夜攻純雨射營中士多傷純勒部曲堅不動選敢死千人俱持強弩各傅三矢使銜枚間行傅著繞出賊後齊聲呼譟強弩並發賊眾驚走追擊之遂破又曰光武遣將王霸馬武擊河南賊周建於垂惠賊帥蘇茂將五校兵四千餘人救建而先遣精騎遮擊馬武軍糧武往救之建從城中出兵夾擊武武恃霸之援戰不甚力為茂建所敗武軍奔過霸營大呼求救霸曰賊兵盛出必敗努力而已閉營堅壁軍吏皆爭之霸曰茂兵精銳其眾又多吾吏士心恐而馬武與吾相恃兩軍不一此敗道也今閉營固守示不相援賊必乘勝輕進馬武無救其戰自倍如此茂建眾疲勞吾承其弊乃可剋也茂建果悉出兵攻武合戰良久霸軍中壯士路潤等數十人斷髮請戰霸知士心銳乃開營後出精騎襲其背茂建前後受敵驚亂敗之又曰西域莎車國王不供將兵長史班超發于闐䟽勒諸國二萬五千人擊之莎車求救龜茲龜茲王遣將發溫宿姑墨尉頭合五萬人助之超召諸將及于闐䟽勒王議曰, SBCK: ''}
