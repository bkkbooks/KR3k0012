  - {type: variant, offset: 976, length: 96, content: 上六甲子也九地之下六癸酉也子能順之萬全可保今陳倉雖小城守固備非九地之陷也王國雖強而攻我之所不救非九天之勢也夫勢非九天攻者受苦害陷非九地守者不拔國今已陷受害之地而陳倉保不拔之城我可不煩兵動眾而取, WYG: 或自投沔水死曹公令曰賊圍塹鹿角十重將軍致戰}
