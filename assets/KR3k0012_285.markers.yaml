  - {type: variant, offset: 2586, length: 1, content: 豐, WYG: 三戰皆㨗又曰田豫字國讓率兵擊鮮卑軻比能單將銳卒深入敵庭敵人衆多鈔軍前後㫁截歸路國讓乃進軍去敵十餘里結屯營多聚牛馬糞然之從他道引去敵見煙火不絶以為尚在去行数十里乃知之又曰諸葛誕文欽反據夀春司馬景王總兵討之謂諸將曰彼當突圍决一朝之命或謂大軍不能乆省食減口冀有他變料敵之情不出此二者今當多方以防之偹其越逸此勝計也因命合圍分遣羸疾就榖淮北廪軍士大豆人三升欽聞之果喜景王愈羸形以示之多縱反間揚言吴救方至誕等益寛恣食俄而城中乏粮諸將並請攻之景王曰誕聚粮固守外結吴人自謂足據淮南必不便走今若急之損逰軍之力外冦卒至表裏受敵此危道也且堅守三靣若賊六道而來軍粮必少吾以遊兵輕騎絶其轉輸不戰而破欽等必為擒矣誕欽等出攻長圍諸軍逆擊走之初誕欽内不相恊乃至窮蹙轉相疑貳誕殺欽欽子鴦踰城降以為將軍封侯使廵城而呼景王見城上持弓者不發因令攻而㧞之又曰諸葛誕據夀春反遣將王基討之吴遣朱異來救誕於安城詔王基引諸軍轉據北山基謂諸將曰今圍壘轉固兵馬向集但當精修守備以待越逸而更移兵守險使得放縱雖有智者不能善其後矣遂守便宜上䟽曰今與賊交利對敵當不動如山若遷移依險人心搖蕩於勢大損諸軍並據深溝髙壘衆心皆定不可傾動此御兵之要也書奏報聽之夀春竟破司馬文王與基書曰初議者云云求移者甚衆時未臨履亦謂宜然將軍深筭利害獨秉國忠上違詔命下拒衆議終至制敵擒冦雖古人所述不是過也又曰郭淮在漢中時蜀先主欲渡漢水來攻諸將議衆寡不敵依水為陣以距之淮曰此示弱而不足挫敵非筭也不如逺水為陣引而致之半渡而後擊彼可破也既陣蜀主不敢渡通典曰蜀主悟之不敢渡又曰文帝初北國强盛侵擾邊塞乃使田豫持節䕶烏桓校尉時鮮卑数十部比能彌加素利等割地統御各有分界乃共要盟不得以馬與中國市豫以外境為一非中國之利乃先搆離之使自為讐敵互相攻伐素利違盟出馬千疋與官為比能所擊求救于豫豫深入北庭敵追豫到馬城圍之十重豫密使司馬建旌旗鳴鼓吹從南門出敵人皆徃赴之豫將精銳自北門中鼓譟而起兩頭俱發出敵不意敵衆亂棄馬歩走追討二十餘里僵屍蔽地北兵破膽威振沙漠又曰諸葛亮出斜谷司馬宣王屯北原亮盛兵西行諸將皆欲攻西圍郭淮獨以為此見形於西欲使吾重兵應之吴志曰曹公入荆州𤣥徳為曹公所破與魯肅遇于當陽遂共圖討遣諸葛亮詣孫權權遣周瑜程普與之并力逆曹公遇於赤壁瑜部將黄盖曰今冦衆我寡難與持乆觀曹操舩艦相接可燒而走也乃取艨艟数十實以薪柴上建牙旗盖先報書欺以欲降曹公軍延頸指言盖降盖収諸舡同時發火火烈風猛延燒岸上營落煙熖漲天人馬燒溺死者甚衆軍遂}
