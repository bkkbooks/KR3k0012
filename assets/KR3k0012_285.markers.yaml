  - {type: variant, offset: 551, length: 446, content: 宜重其購賞時顯宗為東海王獨對曰妖巫相劫勢無久立其中必有悔欲亡者但外圍急不得走耳宜小挺緩挺解也令得逃亡逃亡則一亭長足以禽矣帝然之即勑宮撤圍緩賊賊眾分散遂斬臣鎮等又曰岑彭南擊秦豐與其大將蔡宏拒彭等於鄧數月不得進帝怪以讓彭彭懼於是夜勒兵馬申令軍中使明旦西擊山都山都縣名屬南陽郡乃緩所獲虜令得逃亡歸以告豐豐即悉其軍西邀彭彭乃潛兵渡沔水擊其將張楊於阿頭山大破之沔水源出武都東狼谷中即漢水之上源也阿頭山在襄陽從川谷間伐木開道直襲黎丘擊破諸屯兵豐聞大驚馳歸救之彭與諸將依東山為營豐與蔡宏夜攻彭彭預為之備出兵逆擊之豐敗走追斬蔡宏又皇甫嵩傳曰梁州賊王國圍陳倉復拜嵩為左將軍督前將軍董卓各率二萬人拒之卓欲速進赴陳倉嵩不聽卓曰智者不後時勇者不留決速救則城全不救則城滅全滅之勢在於此也嵩曰不然百戰百勝不如不戰而屈人之兵是以先為不可勝以待敵之可勝不可勝在我可勝在彼彼守不足我攻有餘孫子之文有餘者動於九天之上不足者陷於九地之下玄女三宮戰法曰行兵之道天地之寶九天九地各有表裏九天之上六甲子也九地之下六癸酉也子能順之萬全可保, krp: ''}
