  - {type: variant, offset: 2864, length: 283, content: 餘萬頭後王安得震怖從數百騎出迎秉降又曰袁紹曹公相持於官渡俎授說紹俎側居切可遣蔣奇別為支軍於外以絕曹公之路紹不從許攸進曰曹公兵少而悉師拒我許下餘守勢必空弱若分遣輕軍星行掩襲許伏則操為成擒如其未潰可令首尾奔命破之必也紹又不用竟為曹公所敗又曰曹公征河北師次頓兵黑山賊于毒等攻東武陽曹公引丘西入山攻毒等本屯毒聞之棄武陽還魏武要擊於內黃大破之又曰曹公征張繡於穰荀攸曰繡仰食於劉表於久而勢必離今緩之可誘致急之則相救公不從與繡戰表果救之公敗歸又曰青徐黃巾三十萬眾入渤海界欲與黑山合公孫瓚率步騎二萬人逆擊於東光南大破之斬首二萬餘級賊棄輜重數萬兩奔走度河瓚因其半濟薄之賊復大破死者數萬, WYG: 五}
