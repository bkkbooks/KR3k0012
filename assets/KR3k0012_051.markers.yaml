  - {type: variant, offset: 645, length: 3, content: 使貳師, WYG: 記曰涿郡太守張豐舉兵反初豐好方術有道士言豐當為天子以五采囊盛石繫肘云石中有玉璽豐信之遂以反既當斬猶曰肘有玉璽椎破之豐乃知被詐仰天歎曰當死所無恨又曰吳郡陸續為鬱林太守歸過洞庭湖舟輕載黄石壓之謂之㢘石魏略曰梁州抑谷有石無故自崩石中有犬如馬之狀後司馬氏得天下之應又曰大秦國石為城郭山出九色玉石魏志曰魏明帝增崇宫殿雕飾觀閣鑿太行之石英採榖城之文石起景陽山於芳林園建昭陽殿於太極之北又曰辰韓在馬韓之東兒生便以石壓頭欲其匾今辰韓人頭皆匾又曰公孫度為遼東太守時坐大石長丈餘下有三小石為足魏武帝末年鄴中雨五色石王隱晉書曰永康元年襄陽郡上言得鳴石鐘聞七八里石勒傳曰初勒鄉里所居原上地中石生日長類鐵之象又曰陳總遷殿中侍御史詔遣詣終南山請雨總先除小石祠惟存大石一所而祈之上文曰峩峩大石佐岳通理含滋吐潤惠我四海又曰孫子荆謂王武子曰當枕流潄石曰石非可潄流非可枕孫荅曰枕流洗其耳潄石礪其齒晉陽秋曰董威輦遁去莫知所之於其寢所得一石及竹子并詩二首齊書曰虞愿為晉平太守海邊有越王石常隱雲霧相傳云清廉太守乃得見愿往觀視清澈無隱蔽南史曰到溉山池有竒礓石長一丈六尺梁武愛之輸焉即迎置華林園居殿前移石之日都下傾城縱觀所謂到公石趙書曰劉曜築建徳殿取土城西得圓石狀若水碓其銘曰律權石重四鈞同律度量衡有辛氏造議者未之詳或以為瑞叅軍續咸曰王莽時物後周書曰髙琳母嘗袚泗濵遇見一石光彩朗潤遂持以歸是夜夢見一人衣冠有若仙者謂其母曰夫人適所將來之石是浮磬之精能寳持必生令子其母驚寢便舉體流汗俄而姙及生子因名琳字季珉也隋書曰帝令江都郡丞王世充發淮南兵擊劉元進有大流星墜於江都未及地而南逝磨拂竹木皆有聲至吳郡而落于地元進惡之令掘地入二丈得一石徑丈餘後數日失石所在唐書曰車騎}
