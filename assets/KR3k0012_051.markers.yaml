  - {type: variant, offset: 2765, length: 408, content: 其光如日月其音如雷名曰夔黃帝得之以其皮作鼓橛以雷獸之骨雷獸則雷神獸龍身鼓其腹者撅挽擊也聲聞五百里以威天下鉤吾山山海經曰鉤吾之山其上多金其下多銅有獸焉羊身人面而目在腋下虎齒人爪其音如嬰兒名曰𧲼鴞食人為物貪焚食人未盡還害其身像在夏后鼎左傳所謂饕餮也天臺山山海經曰大荒之中有山名曰天臺海水入焉鵲山山海經曰鵲山其首曰招搔臨于西海之上在南山之西頭濱西海也多桂桂葉似杜杞長尺餘味辛白花叢生生間無雜木呂氏春秋曰招搖之桂是也多金玉有草焉其狀如韭而青花其名曰祝荼或作程茶食之不飢有木焉其狀如穀而黑理穀楮也皮作紙其華四照言有光炎也若木華也見赤光照下見亦比類也見離騷其名曰迷穀佩之不遠小次山山海經曰小次山山上多白玉下多銅有獸如猿白首赤足名曰未厭見則大兵長古山山海經曰長古之山無草多水有獸焉狀如禺而四耳名長古以山出此獸因以名之音如吟如人呻吟聲見則郡縣大水基山山海經曰基山其陽多玉其陰多金多怪木有獸焉其狀如羊九尾四耳其目在背其名曰縛訑搏他二音, SBCK: 後}
