  - {type: variant, offset: 3389, length: 344, content: 歲五色乃清言鮮光也五味乃馨言滋香也黃帝取密山之玉榮謂玉華也而投之鍾山之陰以為玉鍾瑾瑜之玉為良言善玉也堅粟精密禮記鎮玉以粟或作栗玉有栗文所謂㯏壁濁澤有光濁謂潤澤也五色發作以知柔剛天地鬼神是食是饗玉所以祈祭者言能動天地感鬼神也君子服之以衛不祥今徼外出金剛石金剛石似金有光彩可以刻玉外國人帶之云辟惡氣也亶受山山海經曰亶受之山亶音蟬多水無草木不可以上言崇峭也有獸焉其狀如狸而有髮其名曰類類或作師自為牝牡食者不妬莊子亦曰類自為雌雄而化今狟豬亦自雄雌也耆闍窟山法顯記曰耆闍崛山未至頂三里有石窟佛本於此坐禪天魔波句化作鵰鷲住窟前以恐阿難佛以神力隔石舒手摩阿難頂怖即得止鳥跡手孔今悉在故名雕鷲窟山窟前有四佛坐處靈鳥山支曇嘗諦靈鳥山銘序曰昔如來遊王舍城憩靈鳥山舊云其山峰似鳥而威靈故以為名焉眾美咸歸壯麗畢備, SBCK: 十一}
