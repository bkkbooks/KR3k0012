  - {type: variant, offset: 836, length: 340, content: 神鳥狀如黃囊赤如丹火六沌四翼渾沌無面目是識歌舞實惟帝江天山今名折羅漫山在縣北一百里九州要記曰涼州古武成郡有天山黃帝受金液神丹於此山山近崆峒山山頂有魏太祖馬埒焉祁連山漢書曰霍去病擊匈奴至祁連山濟居延水遂臻小月氏西河舊事曰祁連山在張掖酒泉二界焉支山在刪丹故縣東西百餘里南北二十里亦宜畜匈奴失二山乃歌曰亡我祁連山使我六畜不蕃息失我焉支山使我婦女無顏色涼州記曰祁連山張掖酒泉二界之上東西二百里南北百餘里山中冬溫夏涼宜牧牛乳酪濃好夏寫酪不用器物刈草著其上不散酥特好酪一斛得升餘酥又有仙人樹行人山中飢渴者輒食之飽不得持去平居不可見焉支山漢書曰霍去病將萬騎出隴西涉狐奴水過焉支山千有餘里執渾邪王收休屠祭天金人涼州記曰焉支山在西郡界東西百餘里南北二十里有松柏五木其水草茂美宜畜牧與祁連同一刪丹山勿, SBCK: ''}
