  - {type: variant, offset: 1483, length: 0, content: '', SBCK: 如雞子象取二枚見一美女􅀍服五采象叩頭乞長生女曰急送汝手中物還着故處象送石還女授以還丹方一首列異傳曰豫寧女子戴氏乆疾出見小石曰尓}
  - {type: variant, offset: 1483, length: 0, content: '', WYG: 如鷄子象取二枚見一美女被服五采象叩頭乞長生女曰急送汝手中物還著故處象送石還女授以丹方一首列異傳曰汝寧女子戴氏久疾出見小石曰爾}
  - {type: variant, offset: 1483, length: 0, content: '', krp: 如雞子象取二枚見一美女𬒳服五采象叩頭乞長生女曰急送汝手中物還着故處象送石還女授以還丹方一首列異傳曰豫寧女子戴氏乆疾出見小石曰尓}
  - {type: variant, offset: 1485, length: 3, content: 驗江水, SBCK: 能差我疾者當事汝夜夢人告之吾將祐汝後漸差遂爲立祠名石侯祠益部􅂄舊傳曰公孫述時蜀武檐山石折任文公曰西州智士死我將死矣後三月果卒韓詩外傳曰楚渠子夜行見寢石以爲伏虎彎弓而射之没金飲羽下視知其石也因復射之矢摧無迹漢書載李廣亦如之文士傳曰魏文帝之在東宫也宴諸文學酒酣命甄后拜坐者坐者咸伏惟劉楨平仰觀之太祖以爲不敬送徙􅀠簿後太祖乗歩牽車乗城降閲簿作諸徒咸敬而楨坐磨石不動太祖曰此非劉楨也石如何性楨曰石}
