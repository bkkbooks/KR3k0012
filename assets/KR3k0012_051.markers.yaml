  - {type: variant, offset: 645, length: 3, content: 使貳師, SBCK: 記曰􅃰郡太守張豐舉兵反􅀄豐好方術有道士言豐當爲天子以五綵囊盛石繫豐肘云石中有玉璽豐信之遂以反旣當斬猶曰肘有玉璽椎破之豐乃知􅀍詐仰天歎曰當死無所恨魏略曰梁州柳谷有石無故自崩石有丈如率馬之狀後司馬氏得天下之應又曰太秦國石爲城郭山出九色玉石魏志曰魏明帝増崇宫殿雕鏤觀閣鑿太行之石英採榖城之文石起景陽山於芳林園建昭陽殿於太極之北又曰辰韓在馬韓之東兒生便以石押頭欲其扁今辰韓人頭皆扁又曰公孫度爲遼東太守時生大石長丈餘下有三小石爲足魏武帝末年鄴中雨五色石王隱晋書曰永康元年襄陽郡上言得鳴石鍾聞七八里又石勒傳曰初勒郷里所居原上地中石生日長􅀋鐵之象又曰陳緫遷殿中侍御史詔遣詣終南山請石緫先除小石祠唯有大石一所而祁之上文曰峩峩大石佐岳通理合滋吐潤惠我四海又曰孫子荆謂王武子曰當枕流漱石曰石非可嗽流非可枕孫曰所以枕流洗其耳漱石礪其齒晉陽秋曰董威輦遁去莫知所之於其寢所得一石及竹子并詩二首齊書曰虞愿爲晉平太守海邊有越王石常隱雲霧相傳云清廉太守乃得見愿往觀視清澈無隱蔽南史曰到漑山池有竒礓石長一丈六尺梁武覩之輸焉即迎置華林宴居殿前移石之日都下傾城縱觀所謂到公石趙書曰劉耀築建德殿取土城西得圎石狀􅀂水碓其銘曰律推石重四釗同律度量衡有辛氏造議者未之詳或以爲瑞叅軍續咸曰王莽時物後周書曰髙琳母嘗祓禊泗濵遇見一石光彩朗潤遂持以歸是夜夢見一人衣冠有􅀂仙者謂其母曰夫人向所將來之石是浮磬之精能寳持必生令子其母驚寤便舉體流汗俄而有姙及生子因名琳字季珉也隋書曰帝令江都郡丞王世充發淮南兵擊劉元進有大流星墜於江都未及地而南逝磨拂竹木皆有聲至呉郡而落于地元進惡之令掘地入二丈得一石徑丈餘後數日失石所在唐書曰車騎}
