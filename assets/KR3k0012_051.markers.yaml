  - {type: variant, offset: 822, length: 3, content: 雄黃莢, SBCK: 巧拙以桀詐堯􅀂􅆑投石又曰􅀒石而走赴河行之難爲者也而申徒狄能之闕子曰宋之愚人得燕石於梧臺之東歸西藏之以爲大寳周客聞而觀焉主人端冕玄服以發寳華匱十重緹巾十襲客見之盧胡而􅀏曰此燕石也與瓦甓不異主人大怒藏之愈固符子曰}
