  - {type: variant, offset: 1470, length: 2, content: 甘松, SBCK: 禹案黄帝中經見聖人所記曰在乎九疑上東南號曰宛委承以文玉覆以盤石其書金簡玉字禹乃退齋三日發石取書荆楚歳時記曰張騫㝷河源得一石示東方朔朔曰此石是天上織女支機石何至於此神仙傳曰壷公内費長房於石室中頭上有大石方數丈以茅縄懸之諸虵競齧且斷長房不移公撫之曰子可教矣又曰介象字元則㑹稽人入}
