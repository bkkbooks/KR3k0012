  - {type: variant, offset: 2501, length: 244, content: 金玉下多青雘有木狀如穀而赤理其汁如漆其味如飴食者不飢可以釋勞其名曰白若或非皋蘇皋蘇一名白若見廣雅可以血玉血謂可用染玉作光彩也蛇山山海經曰北海之內有虵山者虵水出焉東入于海有五采之鳥飛蔽一鄉漢宣帝元康元年五色鳥以萬數飛屬縣即此鳥五采之鳥名曰翳鳥鳳屬也離騷曰駟玉風而乘翳鳥東口山山海經曰東口之山有君子之國其人衣寇帶劍役使虎豹好謙讓有司幽之民帝俊生星龍星龍生司幽思士不妻思女不夫言其人直思而氣通魄合而生子此莊子所謂白鶴相視眸子不運而風化之類也食黍食獸是使四鳥流波山山海經曰東海中有流波山入海七十里, SBCK: 平石}
