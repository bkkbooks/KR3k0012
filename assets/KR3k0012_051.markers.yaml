  - {type: variant, offset: 1780, length: 639, content: 葱嶺山一出于寘國于寘國在南山下其河北流與葱嶺河合廣志曰葱嶺其山嶺生葱茂於常葱西域諸國志曰葱嶺高行十二日可至頂巫咸山西域志曰巫咸山一曰覆莫山注水經云塩水西北經巫咸山北山海經云巫咸之神以右手操青虵左手操赤虵在葆登群巫所從上下也又大荒西經云大荒之中有靈洲巫咸即朌巫彭巫姑巫直巫抵巫謝巫羅十里巫從此昇降百藥爰在郭璞云群巫上下靈山採藥往來也蓋神巫所遊故山得名懸度山漢書曰烏秺國有懸度者石山也谷磎不通以繩索相引而度又大頭痛山度則頭痛嘔吐驢畜皆然頭痛山漢書曰杜欽說大將軍王鳳曰罽國自知絕遠兵不可至道又歷大頭痛山小頭痛山赤土身熱之阪道使者尺六寸長往三十里漢書曰罽賓國歷大頭痛山有三池盤石坂道狹者尺六七寸繩索相引乃度廣志曰大頭痛山小頭痛山皆在罽賓東鐵山漢書曰莎車國有鐵山出青玉穆天子傳曰天子西征至剞居蟻切閭氏乃命剞閭氏供養六師之人于鐵山之下天子祭鐵山青山水經注曰北地富平縣西河則有兩山相對水出其間即上河峽也世謂之青山河水歷峽北注枝分東出石崖山水經注曰塞外歷域有石崖山西去北城五百里山石上自然有文畫獸馬之狀粲然成著類似圖焉故亦謂之畫石山䟽屬山山海經曰貳負之臣曰危與貳負殺窫窳帝乃梏之䟽屬之山梏猶擊縛也桎其右足桎械也反縛兩手與髮約髮合縛之也繫之山上磐石之下在開題西北漢宣帝時使人鑿上郡發磐石石室中得一人徒倮被髮反縛械一足時人不識乃載之於長安帝以問群臣群臣莫能知劉子政案此言之宣帝大驚於是時人爭學山海經矣論者多以為是其尸象非真體也意識者以為靈怪化論難以理測物稟異氣出於不然不可以常理推之可以近較察之矣魏, WYG: 處}
