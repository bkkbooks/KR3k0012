  - {type: variant, offset: 64, length: 0, content: '', SBCK: 石可以攻玉禮曰昔者夫子居於宋見桓司馬自爲石槨三年而不成桓司馬宋向戍孫也名魋也夫子曰若是其靡也死不如速朽之愈也又曰今夫山一拳石之多及其廣大草木生之禽獸居之寳藏興焉周禮曰王行洗乗石乗石王所登上居之石也又曰石有時而􅘧音勒石解散也又曰大司宼以嘉石平罷民有罪者坐諸嘉石以肺石達窮民凢焭獨老㓜欲復於上而未達者立於肺石注曰嘉石文石地肺石赤石也傳曰隕石于宋五隕星也注曰但直言星則嫌星使石隕故重言隕星又曰齊髙固入于晉師磔石以投人又曰昭三年石言於晋魏榆晉侯問於師曠曰石何故言對曰石不能言或慿焉不然民聽濫也抑臣又聞之曰作事不時怨讟動於民則有非言之物而言今宫室崇侈民力彫盡怨讟並作莫保其性石言不亦冝乎春秋􅀃題辭曰周易艮爲山爲}
