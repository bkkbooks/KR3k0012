  - {type: variant, offset: 3071, length: 8, content: 周穆王馭黃金碧玉, WYG: 古封禪用蒲輪惡傷土石草木續漢書曰張綱字文紀與杜喬䓁八人受詔行天下號為八俊七人皆奉命唯綱獨埋輪於洛陽都亭不去也或問}
