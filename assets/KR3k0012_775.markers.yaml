  - {type: variant, offset: 2158, length: 405, content: 日而至又曰齊慶克通于聲孟子與婦人蒙衣乘輦而入于於閎巷門又曰孟氏之臣秦莒父輦重如役莒父孟獻子家臣步挽重車以從師穀梁傳曰晉君召伯尊而問焉伯尊來遇輦者輦者不辟使車右下而鞭之凡車將左御在中有力之人在右所以備非常爾雅曰徒禦不驚輦名也漢書曰淮南王長早失母常附呂后孝惠然常心怨辟陽侯孝文初即位自以為最親驕蹇數不奉法上寬赦之三年入朝從上入苑獵與上同輦帝謂為太兄又曰傅昭儀有寵於上生定陶恭王多伎藝上甚愛之坐則同席行須同輦又曰班婕妤班況之女孝成帝婕妤也賢才通辨帝遊於後庭嘗欲與同輦婕妤辤曰觀古賢聖之君皆有名臣在側三代末主乃有嬖妾今欲同輦無乃似之乎上善其言而止太后聞之喜曰古有樊姬今有班婕妤漢武故事曰又起明光宮發燕趙美女二千人充之常從行國載之後車與上同輦者十六人員數恒滿又曰上嘗輦至郎署見一老郎鬢眉皓白上顏名駟江都人上問公何時為郎何其老也對曰臣文帝時為郎上曰何其不遇也駟曰文帝好文而臣好武景帝好老而臣尚少陛下好少而臣已老是以三世不遇, WYG: 乗}
