  - {type: variant, offset: 3032, length: 15, content: 安徘徊曲蓋坐處轉關床若射鳥獸宜, WYG: 田上宅民争上一朝而拔之夢書曰賈人夢車轅折敗者憂亡衣物何以言之轅字丢衣故知亡衣物方言曰楚衛之間轅謂之輈司馬長卿諫獵書曰車不及還轅人不暇施巧潘正叔迎大駕傳云狐狸夾兩轅豺狼當路立輪釋名曰輪彌綸也周匝之言也易曰既濟初九曳其輪濡其尾无咎禮曰古者貴賤皆杖叔孫武叔朝見輪人以其杖闗轂而輠輪者於是}
