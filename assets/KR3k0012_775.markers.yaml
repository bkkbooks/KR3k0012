  - {type: variant, offset: 679, length: 1, content: 千, SBCK: 洪範五行傳曰􅀂晉獻公雖與指南車終不覺矣齊桓公中才矣指南得悟失之則惑管仲桓公指南車也魏書馬鈞曰馬先生與髙堂隆􅁗朗爭言及指南車二子謂古典無記言之虚也先生曰古有之明帝乃召先生作之指南車成也崔鴻後趙録曰尚方令解飛機巧言􅀂神妙思竒發造指南車就賜爵􅀜内侯􅀑谷子曰肅愼氏獻白雉於文王還恐迷路問周公作指南車以送之又曰鄭人之取王也必載司南之車爲其不惑也述征記曰去端門百餘歩道南得方尚北門中有指南車車上有木仙人持信幡車東西人􅁪指南左思呉都賦曰俞􅀐騁路指南司方岀車檻檻􅀍練鏘鏘軺車釋名曰軺遥逺也四向逺望之車也說文曰軺車小車也謝承漢書曰許慶字子伯家貧爲督郵乗}
