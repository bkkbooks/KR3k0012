  - {type: variant, offset: 2598, length: 629, content: 十人帝嘗講武于宣武場濤時有疾詔乘步輦從因與盧欽論用兵之本以為不宜去州郡武備其論甚精于時咸以濤不學孫吳而闇與之合帝稱之曰天下名言也而不能用及永寧之後屢有變難寇賊歘起郡國皆以無備不能制天下遂以大亂如濤言焉又曰張敞東宮舊事太子有臥輦步輿王韶晉紀曰義軍起桓玄問眾曰朕其敗乎曹靖之對曰神怒民怨臣實憂懼玄曰神何為怒民何為怨對曰移晉宗廟飄零落薄無所祭之不及於祖此其所以怒也玄曰卿何不諫對曰輦上諸君皆以為堯舜之世臣何敢諫又曰梁冀與妻孫壽共乘輦張羽蓋飾以金銀以騁娛樂晉公卿禮祑曰太宰平王給雲母輦晉太康起居注曰齊王歸蕃詔賜香衣輦一乘後魏書禮志曰大樓輦輈十二加以玉飾衡輪雕采與輅同駕牛十二又曰乾象輦羽葆圓蓋畫日月五星二十八宿天階雲漢山林雲氣仙聖賢明忠孝節義遊龍飛鳳朱雀玄武白虎青龍奇禽異獸可為飾者皆亦圖焉太皇太后助祭郊廟則乘之鄴中記曰石虎大駕有金銀輦雲母輦武剛輦數百乘虎皇后出乘嵩路輦文或玉路輦或朱漆臥輦純以雲母代紗中外四望皆通徹又曰石虎少遊獵體轉壯大不復乘馬作獵輦使二十人擔之如今之步輦上安徘徊曲蓋坐處轉關床若射鳥獸宜有所向關隨身而轉王君內傳曰神人乘三雲之輦拾遺記曰周穆王馭黃金碧玉之輦從朝至暮而窮宇宙之內潘岳籍田賦曰天子御玉輦蔭華蓋金銀照曜以𤈍晃龍驥騰驤而沛艾鄒陽上吳王書曰鬭城不休救兵不至死者相隨輦車相屬轉象流輸千里不絕枚叔七發曰出輿入輦命曰蹶痿之機又云輦道斜交隄池紆曲曹子建公讌詩云輕輦隨風移劉公幹公讌詩云輦車飛素質從者盈路傍丘希範應詔詩云輕荑承玉輦細草籍龍騎漢草輦從上行, SBCK: ''}
