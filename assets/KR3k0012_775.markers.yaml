  - {type: page-break, offset: 776, content: '', id: KR3k0012_SBCK_775-3b}
  - {type: variant, offset: 776, length: 0, content: '', krp: 𥘉拜有盡輪四望車四望車魏漢與楊彪書曰今贈足下四望通幰七香車二乗青牸牛二頭晉陽秋曰魏舒子亡詔曰唯有一息足堪負荷思所以散其哀懷給陽遂車四望晉諸公讃曰文淑破虜之後名聞天下當爲東夷校尉入辭丗祖見而惡之恐居邊不信宻諷監司奏淑作陽遂四望車僣飾過制免官畫雲車漢書曰武帝作畫雲車曹子建洛神賦曰六龍儼其齊首載雲車之容裔雲母車呉百官名曰劉蜀主得賜雲母車一乗晉書曰惠帝自鄴還洛殿中官屬備雲母輦及雲母車奉迎晉太康起居注曰齊王岀鎮詔贈清油雲母犢車傅子曰以雲母飾車謂之雲母車臣下不得乗時賜王公貴臣通幰車傅子曰有追鋒車施通幰車幰許偃切象車晉諸公讃曰平呉後南越獻馴象作大車駕之載黄門鼔吹數十人晉中朝散大駕鹵簿曰象車鼔吹一部十三人騾車蜀志曰後主劉禪乗騾車降鄧艾晉令曰乗傳出使曹朞䘮以上即自表聞聽德白服騾車副使攝事犢車釋名曰祥車祥善也善飾之車也犢車是也謝承後漢書曰潁陽劉詡好賑貧乏陳國張季扎吊師䘮值氷寒車毁牛病不能進詡逢之推所乗車強牛與之季札後知是詡還其車閉門不受頋譚别傳曰譚時爲太常録尚書事後徙交阯𥘉呉以罪徙者皆収家財入官及君下獄簿其資唯有犢車一乗牛數頭奴婢不滿十人無尺帛珠}
  - {type: variant, offset: 777, length: 1, content: 輅, SBCK: 之寳上聞而嘉之皆以君財付叔父穆晉書曰武帝賜汝南王亮追鋒皂車犢車又曰太傅王導妻曹氏導甚憚之乃宻營别館以處衆妾曹氏知將徃焉道恐妾􅀍辱遽令命駕猶遟之以所執麈尾柄驅牛以進司徒蔡謨聞之戯導曰朝廷欲加公九錫導弗之􅁴但謙退而已謨曰不聞餘物唯有短轅犢車長柄麈尾導大怒晉令曰百工不得服大綘紫􅙦音異假髻真珠璫珥文犀瑇瑁越疊以飾路張乗犢車羊車釋名曰羊車以羊所駕名車也晉書曰武帝平呉之後復納孫皓宫人數千自此掖庭殆將萬人而並寵者甚衆帝莫知所􅃴常乗羊車恣其所之至便宴寢宫人乃取竹葉挿户以塩汁洒地以引帝車又曰衛玠字叔寳五􅀊風神秀異惣角乗羊車入市見者以爲玉人觀者傾都晉太元起居注曰司􅀠校尉劉毅􅁗護軍羊琇私角弩四張又乗羊車請免官罪詔曰羊雖無制非素所乗者可如所奏鹿車後漢書曰更始拜趙憙爲五威偏將軍使諸將於昆陽憙􅀍瘡有戰勞還拜中郎將更始敗憙爲赤眉所圍迫急乃踰屋亡走與所友善韓仲伯等數十人携小弱越山阻僅出武􅀜仲伯以婦色羙慮爲強暴者所欲弃之於道憙責怒不聽因以泥塗仲伯婦靣載以鹿車身推之或前逢賊憙輒言其病狀以得免東觀漢記曰杜林􅀉隗囂終不降志辱身乃岀令曰杜伯山天子所不能臣至簮蒿蓆草不食其粟諸侯所不能支盖伯夷叔齊耻食周粟令且從師友之位湏道開通使順其志林雖拘於􅅝而終不屈節建武六年第成物故􅅝乃聽林持喪東歸旣遣而悔追令刺客楊賢於隴厎􅃒殺之覧見林身推鹿車載致弟䘮乃歎曰當今之丗誰能行義我雖小人何忍殺義士因亡去列女傳曰渤海鮑宣妻者桓氏之女也字少君宣嘗就少君父學父竒其清苦故以女妻之裝送資賄甚盛宣不說謂妻曰少君生尊寵習羙飾而吾貧賤不敢當禮妻曰大人以先生修德守約故使妾侍執巾櫛唯命是從宣􅀏曰然如是吾志也妻乃悉歸車馬侍御服飾更着短衣裳挽鹿車歸郷里拜姑禮畢提瓶出汲循行婦道禮節恭備郷􅀖稱之宣哀帝時爲司􅀠挍尉子永中興􅀄爲魯郡太守永之子昱嘗從容問曰太夫人寜復識挽車時不曰先姑有言存不亡安安不忘危吾焉敢忘乎晉書曰劉伶不以家産有無介意常乗鹿車携一壼酒使人荷鍤而隨之謂曰死便埋我其遺形骸如此風俗通曰鹿車窄小裁容一鹿也或云樂車乗牛馬者剉軒飲飼逹曙今乗此雖爲勞極然入傳舎偃卧無憂故曰樂車無牛馬而能行者獨一人所致耳露車晉陽秋曰平原幹隂雨則犢車而内露車或問其故曰露者宜内也晉中興書曰王尼洛陽傾覆避亂江夏王澄時爲荆州刺史見尼欣然厚供給之尼常歎滄海横流無安處早喪婦止有一息不用居宅唯畜露車牛一乗毎行輒使􅄦御詣人暮則􅀫車上無有定處少時澄卒荆土飢荒居求食不能得乃殺車牛煑之遂父子餧死晉王公百官志曰蜀劉主得賜露車七十乗孫主賜露車三十乗道元與天公牋曰有露車一乗轅復摧折以犁續之左﨑右􅝝五結切彊弱相􅀒傍行斫轅乗輿雜車鹵簿令曰記里曰白鷺鸞旗等三車並}
