  - {type: variant, offset: 31, length: 620, content: 也象輅革輅木輅各隨所名也書曰大輅在賓階面綴輅在阼階面大路王綴輅金面前皆南饗先輅在左塾之前先輅象以輅木金王象皆以飾車木則無飾朞以在路寢門內左右塾北面凡陳列皆象成王生時禮曰大輅者天子之車也又曰鸞車有虞氏之輅也軥音鉤車夏后氏之輅也又曰天子居青陽左个乘青輅駕蒼龍天子居明堂左个乘朱輅駕岑騮天子居太廟太室乘黃輅駕黃龍天子居總章左个乘白輅駕白駱天子居玄堂左个乘玄輅駕鐵驪周禮曰有虞氏上陶夏后上匠殷人上梓周人上輅又曰王之五路一曰玉路錫樊纓十月再就建太常十有二斿以祀金路鉤樊纓九就建大旂以賓同姓以封象路朱樊纓七就建大赤以朝異姓以封革路龍勒條纓五就建大帛以即戎以封四衛木輅前樊鵠纓建大麾以田以封蕃國又曰王后之五路重翟錫面朱總厭翟勒面績總安車雕面鷖總皆有容蓋翟車皃面組總有握輦車組輓有翣羽蓋左傳曰清廟茅屋大路越音活席大羹不致粢食音寺鑿昭其儉也又曰賜之大輅之服戎輅之服論語曰行夏之時乘殷之輅服周之冕說苑曰晏子朝乘弊車駕駑馬景公見之曰嘻天子之祿寡耶何乘不佼古巧切之甚也晏子對曰賴君之賜得以壽三族及國交遊皆得生焉臣得煖衣飽食弊車駑馬以奉其身於世足矣晏子出公使梁立據遺之輅車乘馬三反不受公不悅趣音促召晏子曰夫子不受寡人亦不受晏子對曰君使臣臨百官之吏節其衣服食飲之養以先齊國之民然猶恐其侈靡而不顧其行也今輅車乘馬君乘之上臣亦乘之下民之無義侈其衣食而不顧其行者臣無以禁之遂讓不受也董巴輿服志曰殷瑞山車金根之色殷人以為大輅於是秦皇作金根之車漢承秦制為乘輿即孔子所謂乘殷之輅也, SBCK: ''}
