  - {type: variant, offset: 1184, length: 0, content: '', SBCK: 公孫閼與潁考叔爭車潁考叔挾輈以走子都拔􅁄以逐之弗及又曰師及齊師戰于次臯齊子淵捷從洩聲子射之中楯瓦繇朐汰輈七入者三寸東觀漢記曰江革母年八十革不欲摇動之常自居轅輓車不用牛馬晉儀注曰}
  - {type: page-break, offset: 1184, content: '', id: KR3k0012_SBCK_775-7a}
  - {type: variant, offset: 1184, length: 44, content: 皇太子金輅赤質以金飾諸末重輅箱畫苣丈鳥獸黃屋伏鹿軾龍輈金鳳一在軾前設鄣塵朱蓋黃裏輪畫朱牙, WYG: 鄭人之取玉也必載司南之車為其不惑也述征記曰去端門百餘歩道南得尚方北門中有指南車車上有仙人持信旛車轉而人恒指南}
  - {type: variant, offset: 1184, length: 0, content: '', krp: 公孫閼與潁考叔爭車潁考叔挾輈以走子都拔棘以逐之弗及又曰師及齊師戰于次臯齊子淵捷從洩聲子射之中楯瓦繇朐汰輈七入者三寸東觀漢記曰江革母年八十革不欲摇動之常自居轅輓車不用牛馬晉儀注曰}
  - {type: variant, offset: 1185, length: 0, content: '', SBCK: 后乗油􅀞雲母安車駕􅆖馬油􅀞雲母安兩轅趙書曰後石造獵車千乗轅長三丈韓子曰呉起爲西河守􅁗有小亭臨境欲攻之不足以徴卒乃取車轅􅀝於北門外令曰有能徙至南門外者賜上宅民莫之徙也有徙者賜之如令又置一石亦令曰有能徙者賜之如􅀄民爭徙之乃令曰明旦攻城有先登者賜之上田上宅民争上一朝而拔之夢書曰賈人夢車轅折敗者憂亡遺衣物何以言之轅字去衣故知亡衣物方言曰楚衛之間轅謂之輈司馬長卿諫曰獵書曰轝不及還轅人不暇施功潘正叔迎大駕傳云狐狸夾兩轅豺狼當路立輪釋名曰輪彌綸也周匠之言或曰較言揔入輻中也易曰旣濟􅀄九曵其輪濡其尾無咎禮曰古者貴賤皆杖叔孫武叔朝見輪人以其杖􅀜轂而輠音禍輪者於是有爵而后杖也記庻人失禮所由始也叔孫武叔魯大夫叔孫州仇也輪人作車輪之官也又曰御婦車而壻授綏御輪三周先俟于門外周禮曰凢察車之道必自載於地者始也是故察車自輪始凢察車之道欲其樸音朴屬而微至不樸屬無以爲完乆也又曰輪人爲輪斬三材必以其時三材可以爲轂折牙也斬之時以材在陽則中冬斬之在隂則中夏斬之三材旣具巧者和之凢爲輪行澤者欲杼行山者欲侔杼謂削薄其賤地者侔上下等杼以行澤則是力以割塗也是故塗不附侔以行山則是搏以行石也是故輪雖敞不甐於鑿搏園厚也鄭司農云不甐於鑿謂不動於鑿中也􅀇謂甐亦敞也以輪之厚石錐鑿齧之不能敞其鑿傍使之動又曰軫之方也以象地也蓋之圎也以象天也輪輻三十以象日月也左傳曰余折以御左輪朱殷豈敢言病吾子忍之􅂖梁傳曰晉人與姜戎要而擊之殺疋馬竒輪無反者史記曰古封禪爲蒲輪惡傷土石草木續漢書曰張綱文紀與杜喬等八人受詔行天下號曰八俊七人皆奉命唯綱獨埋車於洛陽都亭不去也或問之曰豺狼當路安問狐狸遂奏梁兾等罪京師震悚莊子曰桓公讀書輪扁斵輪釋槌鑿問曰公所讀者何言曰聖人之言曰在乎曰已死矣然讀之者古人之糟粕也公曰寡人讀書輪人安得議有說則可無說則死輪扁曰以臣之事觀之斵輪徐則甘而不固疾則苦而不入不徐不疾得之於手應之於心口不能言有數在間而不能諭臣之子子亦不能受之於臣是以行年七十而老斵輪古之人與其不傳者死矣君之所讀者是古人之糟粕今士不同變化異時故冝絶學任惟之張衡思􅀇賦曰魂眷眷而屢頋􅀆馬􅀝輈而俳􅆦雲霏霏􅀆繞余輪風眇眇􅀆振余旟張恊洛禊賦曰權戚之家豪侈之族綵綺停鏕華輪方轂集乎長州之浦曜乎洛川之曲曹子建七啓曰飛軒電遊獸隨輪轉又應制詩云輪不輟運鸞無廢聲應吉甫華林集曰備言􅃬命羽蓋朱輪銘曰失名氏奚氏夲造後裔飾雍輪以代歩屏以從容輪軿并合出入道同追仁赴義惟禮是恭梁昭明}
