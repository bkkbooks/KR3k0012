  - {type: variant, offset: 872, length: 309, content: 玉飾諸末重輿左青龍右白虎金鳳翅畫莒文鳥獸黃屋左纛金鳳一在軾前十二鑾在衡正輅耕根鑾數皆准此其副則八二鈴在式龍輈設鄣塵青蓋繡飾黃裏愽山鏡子樹羽輪金根朱班重牙左建旂十有二旒旒皆畫升龍其長曳地右載闟許及切戟長四尺廣三尺黻文旂首金龍頭𠾑結綬及鈴緌駕蒼龍金緵亡黯切方釳許乞切插翟尾五焦鏤錫鞶纓十有二就錫馬當顱金為之鞶馬大帶纓馬決皆以五彩罽飾之就成也祭祀納后則供之金輅赤質以金飾諸末餘與玉輅同駕赤騮饗射祀還飲至則供之象輅黃質以象飾諸末餘同玉輅駕黃騮行道則供之革輅白質輓莫官切之以革餘同玉輅駕白駱巡狩臨兵事則供之木輅黑質以漆飾諸末餘與玉輅同駕黑騮田獵則供之諸蓋旌旗及鞶纓皆從輅色黃裏俱用黃其鏤錫與五輅同耕根車青質蓋三重餘同玉輅籍田則供, WYG: 送}
