  - {type: variant, offset: 3054, length: 4, content: 轉王君內, WYG: 壻授綏御輪三周先俟于門外周禮曰凡察車之道必自載於地者始也是故察車自輪始凡察車之道欲其樸屬而㣲至不樸屬無以為完久也不微至無以為戚速也又曰輪人為輪斬三材必以其時三材既具巧者和之凡為輪行澤者欲杼行山者欲侔杼以行澤則是刀以割塗也是故塗不附侔以行山則是摶以行石也是故輪雖敝不甐於鑿又曰軫之方也以象地也盖之圎也以象天也輪輻三十以象日月也左}
