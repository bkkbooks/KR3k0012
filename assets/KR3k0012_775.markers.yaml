  - {type: variant, offset: 2996, length: 1, content: 外, WYG: 朝散大駕鹵簿曰象車鼓吹一部十三人騾車蜀志曰後主劉禪乗騾車降鄧艾晋令曰乗傳曰出使朝暮裘以上即自表聞聼闕白眼騾車副使攝事犢車釋名曰祥車祥善也善飾之車也犢車是也謝承後漢書曰頴陽劉詡好賑貧乏陳國張季禮吊師喪值氷寒車毁牛病不能進詡逢之推所乗車强牛與之季禮後知是詡還其車閉門不受桓譚别傳曰譚時為太常録尚書事後徙交趾初呉以罪徙者皆収家財入官及君下獄簿其資唯有犢車一乗牛數頭奴婢不滿十人無尺帛珠金之寳上聞而嘉之皆以君財付叔文後晉書曰武帝賜汝南王亮追鋒車皂輪犢車又曰太傅王導妻曹氏妬導憚之乃宻營别館以處衆妾曹氏知之将往焉導恐妾被辱乃命短轅犢車猶恐遲之以所執麈尾柄驅牛而進晉令曰百工不得服大絳紫襈假髻真珠璫珥文犀瑇瑁越疊以飾路張乗犢車羊車釋名曰羊車以羊所駕名車也晉書曰武帝平呉之後復納孫皓宫人數千自此掖庭殆將萬人而並寵者甚衆帝莫知所適常乗羊車恣其所之至便宴寢宫人乃取竹葉插戸以鹽汁洒地以引帝車又曰衛玠字叔寳五嵗風神秀異摠角乗羊車入市見者以為玉人觀者傾都晉太元起居注曰司𨽻校尉劉毅奏䕶軍羊琇私角弩四張又乗羊車請免官罪詔曰羊雖無制非素乗者可如所奏鹿車後漢書曰更始拜趙憙為五威偏将軍助諸将於昆陽憙被瘡有戰勞還拜中郎将更始敗憙為赤眉所圍迫憙乃踰屋走與所友善韓仲伯等數十人携小弱越山阻近出武闗仲伯以婦色美慮强暴者害欲棄之於道熹責怒不聼因以泥塗仲伯婦面載以鹿車身推之毎前逢賊或逼略熹輙言其病状以得免東觀漢記曰杜林寄隗囂終不能降志辱身乃出令曰杜伯山天子所不能臣至簪蒿蓆草不食其粟諸侯所不能友盖伯夷叔齊耻食周粟今且從師友之位須道開通使順所志林雖居於囂而終不屈莭建武六年弟成物故囂乃聴林持喪東歸既遣而悔之令刺客楊賢於隴坻遮殺之賢見林身推鹿車載致弟喪乃歎曰當今之世誰能行義我雖小人何忍殺義因亡去列女傳曰東海鮑宣妻者桓氏之女也字少君宣常就少君父學父竒其清苦故以女妻之装送資賄甚盛宣不恱謂妻曰少君生尊寵習美飾而吾貧賤不敢當禮妻曰大人以先生修徳守約故使妾侍執巾櫛唯命是從宣笑曰然是吾志也妻乃悉歸車馬侍御服飾更着短衣裳挽鹿車歸鄉里拜姑禮畢提瓮出汲循行婦道禮莭恭備鄉邦稱之宣哀帝時為司𨽻校尉子永中興初為魯郡太守永之子顯嘗從容問曰太夫人寜復識挽車時不曰先姑有言存不忘亡安不忘危吾焉敢忘乎晉書曰劉伶不以家産有無介意常乗鹿車擕一壺酒使人荷鍤而隨之謂曰死便埋我其遺形體如此通曰鹿車窄小裁容鹿也或云樂車乗牛馬者剉軒飲酌逹曙令乗此雖為勞極然入傳舍偃卧無憂故曰樂車無牛馬而能行者獨一人所致耳露車晉陽秋曰平原王幹隂雨則出犢車而内露車或問其故曰露者宜内也晉中興書曰王尼洛陽傾覆避亂江夏王澄時為荆州刺史見尼欣然願共給之尼常歎滄海横流無安處早喪婦止有一息不用居宅惟畜露車牛一乗毎行輙使兒御詣人暮則宿車上無有定處少時澄卒荆土飢荒尼求食不能得乃殺車牛煮食之遂父子餒死晉王公百官志曰蜀劉主得賜露車七十乗孫主賜露車三十乗道與元缺公牋曰有露車一乗轅復摧折以犂轅續之左﨑右􅝝强弱相負傍行斫轅乗輿雜車鹵簿令曰記里車白鷺鸞旗等三車並駕四馬正道匠各一人駕士各十四人皆平巾幘緋衫大口褲又曰辟惡車太僕令一人在車執弩箭平巾幘緋裲襠大口袴皮軒左右金吾隊正一人在車執弩服同太僕令其行正道駕馬行數駕士服色人數儀並同記里等車又曰安車}
