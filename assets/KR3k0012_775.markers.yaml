  - {type: variant, offset: 776, length: 0, content: '', SBCK: 􅀄拜有盡輪四望車四望車魏漢與楊彪書曰今贈足下四望通幰七香車二乗青牸牛二頭晉陽秋曰魏舒子亡詔曰唯有一息足堪負荷思所以散其哀懷給陽遂車四望晉諸公讃曰文淑破虜之後名聞天下當爲東夷校尉入辭丗祖見而惡之恐居邊不信宻諷監司奏淑作陽遂四望車僣飾過制免官􅀞雲車漢書曰武帝作􅀞雲車曹子建洛神賦曰六龍儼其齊首載雲車之容􅒨雲母車呉百官名曰劉蜀主得賜雲母車一乗晉書曰惠帝自鄴還洛殿中官屬備雲母輦及雲母車奉迎晉太康起居注曰齊王岀鎮詔贈清油雲母犢車傅子曰以雲母飾車謂之雲母車臣下不得乗時賜王公貴臣通幰車傅子曰有追鋒車施通幰車幰許偃切象車晉諸公讃曰平呉後南越獻馴象作大車駕之載黄門鼔吹數十人晉中朝散大駕鹵簿曰象車鼔吹一部十三人騾車蜀志曰後主劉禪乗騾車降鄧艾晉令曰乗傳出使曹朞䘮以上即自表聞聽德白服騾車副使攝事犢車釋名曰祥車祥善也善飾之車也犢車是也謝承後漢書曰潁陽劉詡好賑貧乏陳國張季扎吊師䘮值氷寒車毁牛病不能進詡逢之推所乗車強牛與之季札後知是詡還其車􅐬門不受頋譚别傳曰譚時爲太常録尚書事後徙交阯􅀄呉以罪徙者皆収家財入官及君下獄簿其資唯有犢車一乗牛數頭奴婢不滿十人無尺帛珠}
