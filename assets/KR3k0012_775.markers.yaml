  - {type: variant, offset: 1635, length: 342, content: 而與之飲酌語林曰武侯與宣王在渭濱將戰宣王戎服莅事使人視武侯乘輿葛巾持白羽扇指麾三軍皆隨其進止宣皇聞而嘆曰可謂名士世說曰孟旭未達時家貧在京常見王恭乘高輿服鶴氅裘于時微雪旭於籬間窺之歎曰此真神仙中人也陳留耆舊傳曰洛陽令董宣死後詔使視之有蘭輿一乘白馬一疋帝曰宣之清死乃知之幽明錄曰謝安石當桓溫之世恒懼不全夜忽夢乘桓輿行十六里見一白雞而止莫有解此夢者及溫死後代居宰相歷十六年而得病安方悟云乘桓輿者代君其位也十六里者得十六年也見白雞生者今太歲在酉吾病殆不起乎少日而卒淮南子曰以天為蓋以地為輿四時為馬韓子曰輿人成輿則欲人富貴也非輿人仁不貴則不售也潘安仁閑居賦曰太夫人乃御板輿升輕軒遠覽王畿近周家國左太冲蜀都賦曰車輿雜沓冠帶混弁張子平東京賦曰乘輿巡乎岱岳勸稼穡於原陸又曰皇輿夙駕𨌅仕佳切於東階𨌅腳也, SBCK: ''}
