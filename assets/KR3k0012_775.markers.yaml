  - {type: variant, offset: 3090, length: 5, content: 內潘岳籍田, WYG: 言曰在乎曰已死矣曰然則君之所讀者古人之糟粕也公曰寡人讀書輪人安得議乎有說則可無說則死輪扁曰以臣之事觀之斵輪徐則甘而不固疾則苦而不入不徐不疾得之於手而應於心口不能言有數存焉臣不能以喻臣之子臣之子亦不能受之於臣是以行年七十而老斵輪古之人與其不可傳也死矣然則君之所讀者古人之糟粕也夫今古不同變化異時故宜􅅸學任性張衡思𤣥}
