  - {type: variant, offset: 3004, length: 0, content: '', WYG: 羊車駕果下馬一小吏十四人並青絲布裙紫碧腰襟青耳屩辮髪又曰屬車十二乗並駕牛駕士各八人服同記里等車又曰黄鉞車或曰金鉞車左武衛隊正一人在車次豹尾車右武衛隊正一人在車皆執武弁朱衣革帶並駕三馬駕士各十二人服同上轅周禮曰輈人為輈輈有三度國馬之輈深四尺有七寸田馬之輈深四尺駑馬之輈深三尺有三寸唯轅直且無橈也左傳宣下曰軍行右轅左追蓐又曰改乗轅而北之又曰公孫閼與頴考叔争車頴考叔挾輈以走子都拔棘以逐之弗及又曰師及齊師戰于炊鼻齊子淵捷從洩聲子射之中楯瓦繇朐汰輈匕入者三寸東觀漢記曰江革母年八十革不欲揺動之常自居轅輓車不用牛馬晉儀注曰皇后乗油畫雲母安車駕驂馬油畫雲母安兩轅趙書曰後}
