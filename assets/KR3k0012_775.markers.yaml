  - {type: variant, offset: 2012, length: 17, content: 太祖軍摩陂召夏侯惇常與同輿載諸將無, WYG: 劉蜀主}
  - {type: variant, offset: 2013, length: 232, content: 祖軍摩陂召夏侯惇常與同輿載諸將無得比者蜀志曰曹公東征呂布於下邳先王從曹公還表先主為左將軍禮之愈重出則同輿吳志曰大子登字子高善待僚屬略同布衣之禮諸葛恪顧譚等或同轝而載晉中興書曰紀膽字士遠為鎮東左長史丹陽宣城新安三郡中正上常幸瞻家同乘輿還府瞻甚見遇鄉郡榮之輦傳曰猛獲奔衛南宮萬奔陳以乘車輦其母一日而至又曰齊慶克通于聲孟子與婦人蒙衣乘輦而入于於閎巷門又曰孟氏之臣秦莒父輦重如役莒父孟獻子家臣步挽重車以從師穀梁傳曰晉君召伯尊而問焉伯尊來遇輦者輦者不辟使車右下而鞭之凡車將左, SBCK: 平}
