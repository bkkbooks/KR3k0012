  - {type: variant, offset: 2541, length: 523, content: 搢紳之流聞而敬服又曰陸馥為相州刺史發姦擿伏事無不驗百姓以為神明無敢劫盜者在州七年家至貧約徵為散騎常侍百姓乞留馥千餘人獻文不許謂群臣曰馥之著政雖古人何以加之賜絹五百疋又曰李元忠去任歸李魚川孝莊時盜賊蠭起清河有五百人西戎還經南趙郡以路梗共投元忠奉絹千餘疋元忠唯受一疋殺五牛以食之遣奴為導曰若逢賊但道李元忠遣如言賊皆舍避又曰韓麒麟為齊州刺史立性恭慎恒置律令於坐傍臨終之日唯有俸絹數十疋清貧如是又曰陽平王子衍轉徐州刺史至州病重帝勑徐成伯乘傳療疾差成伯還帝曰卿定名醫賚絹三千疋成伯辭請受一千帝曰詩云人之云亡邦國殄瘁以是而言豈惟三千疋乎又曰辛穆再轉汝陽太守遇水澇人飢上表請輕租賦帝從之遂勑汝陽一郡聽以小絹為調又曰高允卒詔給絹一千疋布二千疋綿五百斤錦五十疋雜綵百疋穀千斛以助喪用也又曰王靈字羅漢為南兗州刺史取官絹因染遂有割易御史糺劾會赦免又曰宋鴻貴為定州北平府參軍送戍兵於荊坐取兵絹四百疋兵欲告之乃斬兵十人又曰公孫軌為武牢鎮將初太武將北征發驢以運糧使軌部調雍州軌令驢主皆加絹一疋乃與受之百姓語曰驢無強弱負絹自壯眾共嗤之北齊書曰崔暹遷尚書左僕射儀同三司時調絹以七尺為丈暹言之乃依舊焉又曰孝昭常賜百官射王晞中的當得絹為不書箭有司不與晞陶陶然曰我今可謂武有餘文不足矣, WYG: ''}
