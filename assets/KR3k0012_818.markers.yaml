  - {type: 'tls:seg', offset: 3112, content: '', id: KR3k0012_CHANT_818-40a.10}
  - {type: variant, offset: 3112, length: 0, content: '', SBCK: 言自毛詩鹿鳴曰鹿鳴醼羣臣嘉賔也旣飲食之又實幣帛筐篚以將其厚意周易賁卦曰賁于丘園束帛戔戔春秋元命苞曰須女四星十二度主布帛史記曰武帝使使束帛加璧安車駟馬迎申公又曰子貢結駟連􅀐束帛之幣以聘享諸侯所至國君無不界迎與抗禮者夫使孔子名布􅀭於天下者子貢先後之也又曰帛千鈞比千乗家又曰陳勝乃多書帛言陳勝王置人所􅊻魚腹中卒買魚得書恠之漢書曰武帝使東方朔射中上曰善賜帛十疋郭舎人曰朔齊人多變更致他物射之中則臣榜百不中賜臣帛朔又中乃榜舎人又曰舘陶公主乃命私府曰董君所發一日金蒲百斤錢蒲百萬帛蒲千疋乃白之又曰婁護爲諌議大夫使郡國護假貸多持幣帛過齊上書求上先人冡因㑹宗族故人各以親䟽遺以束帛一日散百金之費東觀漢記曰耿純於邯鄲見上遂自結納獻馬及縑帛數百疋又曰長安語云城中好廣䄂四方用疋帛范曄後漢書曰明帝出諸貴人當徙居南宫馬太后感析別之懷賜越帛三千端雜帛二千疋又曰永平六年雒山出寳鼎廬江太守獻之於廟賜三公帛五十疋九卿二千石半之續漢書曰宋秉字巨公拜御史中丞布􅀍瓦器居不粟馬出無從車車駕幸其府舎歎曰雖楚國二龔不如雲陽宣巨公賜布帛帳帷什器後漢書曰公孫述造十層赤樓帛蘭船蓋以帛飾其欄檻也魏略曰陳留邯鄲淳奏投壷賦文帝以爲尚書郎賜帛十疋魏志曰張伯英專精於書凡家之衣帛必書而後練􅀳陽秋曰董威常􅀫社中時乞於市得殘碎繒結以自覆金帛桂綿則不肯受沉約宋書曰文帝􅀽皇后毎就上求錢帛贍家上性節儉所得不過錢三五萬帛三五十疋南史曰宋鮑昭嘗謁臨川王義慶未見知欲貢詩言志人止之曰卿位尚卑不可輕忤大王昭勃然曰千載上有英才異}
