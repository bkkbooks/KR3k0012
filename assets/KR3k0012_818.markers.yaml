  - {type: variant, offset: 920, length: 848, content: 責汝衣食歲止一疋絹亦足用耳衡亡後二十餘日以問母曰此當是種甘也汝家失十戶客七八年必汝父遣為宅汝父嘗稱太史公言江陵千樹橘當封君吾荅人患無德貧方好耳用此何為吳末衡甘成歲得絹數千疋家道殷足吳錄曰袁愽為太守黃君舉為孝廉為業令以俸祿市縑絹餉黃君家黃氏負鄉里債債家到門輒應云待葉令家餉王隱晉書曰王尼見太傅越曰公負尼物越荅初不識此事尼曰昔楚人失布謂令尹盜者以令尹執政不能奉禮率法至使盜賊公行是與自盜無異也尼舍資財軍寇輒略公為宰輔未能禁賊令尼窮困是亦明公負物也越意解大笑與尼絹五十疋王隱晉書曰劉實為伐蜀人作爭功得千疋絹又曰蘇節從兄韶亡後著青黃絹單衣來與節言虞預晉書曰武帝論平吳功唯羊𧙖王濬張華三人各賜絹万疋其餘莫得比此干寶晉紀曰華譚依周馥及琅邪王遣甘卓攻馥譚先於卓有恩卓募人入城求譚入者至舍問華侯在不吾甘楊威使也譚曰不知華侯所在抽絹二疋授之使人還以告卓曰是華侯也晉陽秋曰有司奏依舊調編絹武帝不許又曰荊州刺史庾冰中子襲嘗貸官曹絹十疋冰怒撻之市絹還官又曰胡威字伯虎父質之為荊州也威自京都省之停中十餘日告歸臨辭質賜其絹一疋為道路糧威跪曰大人清高不審於何得此絹質曰是吾俸之餘故以與汝耳又曰桓溫入蜀聞有善星人招致之獨執其手於星下問國祚脩短星人曰太微紫微文昌三宮氣候決無憂虞五十年外不論耳溫不悅送絹一疋錢五千與之晉中興書曰翟楊字道淵尋陽人太守干寶遣船餉之勑吏曰翟公廉讓卿致書訖便委船還楊無人送致乃更貨易絹物因寄還寶宋書曰沈慶之年八十夢有人以兩疋絹與之謂曰此絹足度寤而謂人曰老子今年不免矣兩疋八十尺也足度無盈餘矣是歲果卒又曰李安人行南徐州事參軍王廻素為安人所親盜絹二疋安人流涕謂曰我與卿契闊備嘗今日犯王法乃卿負我也於軍門斬之又曰孝武時齊庫上絹年調鉅万疋綿亦稱此期嚴限峻人間買絹一疋至二三千緜一兩三四百貧者賣妻子甚者或自縊死沈懷文具陳人困由是緜絹薄有所減又曰阮佃夫佞幸專權有人餉絹二百疋嫌少不荅書齊書曰豫章王嶷拜陵還過延陵季子廟觀沸井有水牛突部伍直兵執牛推問嶷不許取絹一疋撫繫牛角放歸其家又曰蕭赤斧遷給事中太子詹事卒於家貧無絹衾衣, SBCK: 受}
