  - {type: variant, offset: 514, length: 280, content: 者無幾禮躬勤禦之戰於芍陂禮犯陷白刃馬被數創手秉桴鼓奮不顧身賊眾乃退詔書慰勞賜絹七百疋魏略曰鮮卑素利等數來多以牛馬遺田豫豫輒送官胡以為所豫物顯露不如持金乃密懷金三十斤謂豫曰願辟左右我物有所遺豫從之胡因跪曰我見公貧故前後遺公牛馬公輒送官今密以此上公可以為家資豫張袖受之荅其厚意胡去後悉皆付外具以狀聞於是詔褒之曰昔魏絳開懷以納戎今卿舉袖以受狄朕甚嘉焉乃即賜絹五百疋豫得賜分以其半藏小府後胡復來以半與之又曰田豫罷官歸居魏縣會汝南遣健步詣征北感豫宿恩過拜之豫為殺雞炊黍送詣陌頭謂之曰罷老苦汝來過無能有益若何健步愍其貧羸涕流而去還為故吏民說之汝南為具資絹數千疋遣人餉豫豫一, SBCK: 職}
