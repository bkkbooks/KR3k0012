  - {type: variant, offset: 3385, length: 183, content: 衛國公李靖五代孫前鳳翔司錄參軍晨芳絹二百疋衣笏一副并還先奏高祖太宗書詔及官告衣物等後唐史曰賜宰相李愚絹百疋錢百緡鋪陳物一十三什時愚病上令中使宣問愚所居寢室蕭然四壁臥弊氈而已中使具言其事上曰嘻宰相月俸錢幾何而委頓如此故有是賜四王起事曰張方移惠帝於長安兵人入殿取物特調御絹二尺幅自魏晉之積將百餘萬疋三日取之尚不缺角四王起事曰惠帝於鄴與成都王還洛陽出城倉卒上下無持資食之調, WYG: ''}
