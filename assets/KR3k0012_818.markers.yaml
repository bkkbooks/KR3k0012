  - {type: variant, offset: 2286, length: 4, content: 楊津除歧, WYG: 長安語云城中好廣䄂四方用疋帛范􅁮後漢書曰明帝出諸貴人當徙居馬太后感祈别之懐賜越帛二千端雜帛二千疋又曰永平六年雄山出寶鼎廬江太守獻之於朝賜三公帛五十疋九卿二千石半之續漢書曰宋秉字巨公拜御史中丞布被瓦器居不粟馬出無從車車駕幸其府舍歎曰雖楚王二龔不如雲陽缺巨公賜布帛帳幃十器後漢書曰公孫述造十層赤樓帛欄船蓋以帛飾其欄檻也魏畧曰陳留邯鄲淳奏投壺賦文帝以為尚書郎賜帛十疋魏志曰張伯英専精於書凡家之衣帛必書而後練晉陽秋曰董威輦常宿白社中時乞於市得殘碎絹結以自覆金帛挂錦則不肯受沈約宋書曰文帝袁皇后毎就尚求錢帛贍家上性節儉所得不過錢三五萬帛三五千疋南史曰宋鮑照嘗謁臨川王義慶未見知欲貢詩言志止之曰卿位尚卑不可輕慢大王照勃然曰千載上有英才異士没沉而不聞者安可數哉大丈夫豈可遂藴知能使蘭艾不辨終日碌碌與燕雀相隨乎於是奏詩義慶可之賜帛二十疋齊書曰劉顯將之尋陽朝賢畢祖道顯懸帛十疋約曰儉衣来者以賞之衆人競改常服不過長短之間顯曰將有甚於此矣既而周𢎞正縁絲布袴繡假種軒昻而至折標取帛梁書曰郭祖深清儉常服故布儒素木案食不過一肉有老餉一早青𤓰祖深報以疋帛後有冨人効之以貨鞭而狥衆朝野憚之後魏書曰髙允拜中書令帝幸允第惟草屋數間布被緼袍厨中鹽菜而已帝歎息曰古人之清貧豈有此乎即賜帛五百疋粟千斛又曰韋珍字靈智累遷顯武將軍郢}
