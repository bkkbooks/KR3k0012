  - {type: variant, offset: 3108, length: 0, content: '', SBCK: 帛尚書堯典曰舜脩五禮五玉三帛周禮地官曰媒氏凡嫁子娶妻入幣純帛無過五兩又春官曰肆師之職常立國祀之禮以佐太宗伯佐助也立大祀用玉帛牲牷又春官典命曰凡諸侯之適子誓於天子攝其君則下其君之禮一等未誓則以皮帛繼子男又夏官下職方氏曰并州其利布帛又冬官考工記曰繼子男執皮帛謂公之􅀌也見禮次子男贄用束帛而以豹皮表之爲飾又曰涷帛以欄爲􅁅渥淳其帛實諸澤器􅁋之以􅜹渥讀如繒人渥管之渥以欄木之􅁅漸釋其帛出鄭司農云澤器謂滑澤之器􅜹謂炭也士冠礼曰素積白屨以魁柎之􅀃曰魁蛤也周官亦有白盛之􅜹􅜹蛤也玄謂􅁋薄粉之令帛白蛤今海旁有焉清其􅁅而盝之而擇之清澄也於􅁅澄而出盝晞之晞而揮去其􅜹而沃之而盝之而塗之而􅀫之更渥淳之眀日沃而盝之朝更沃至夕盝之又更沃至旦盝之亦七日如漚絲也晝􅁀諸日夜􅀫諸井七日七夜是謂水涷禮記月令曰季春之月開府庫出幣帛周天下勉諸侯聘名士禮賢者又檀弓}
