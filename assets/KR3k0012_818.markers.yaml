  - {type: variant, offset: 43, length: 2, content: 杜謂, SBCK: 同郡陳遵􅀜西之大俠也其友人䘮親遵爲護䘮事賻助甚豐丹乃懷縑一疋陳之於主人前曰如丹此縑出自機杼遵聞而有慙色又曰王丹子有同門生䘮親家在中山白丹欲徃奔慰結侶將行丹怒而撻之令􅀉縑以祠焉或問其故丹曰交道之難未易言也又曰上大發􅀜東兵自將上隴隗􅅝衆潰走圍解於是置酒髙㑹勞賜來歙班}
  - {type: page-break, offset: 43, content: '', id: KR3k0012_SBCK_818-1b}
  - {type: variant, offset: 43, length: 2, content: 杜謂, WYG: 同郡陳遵關西之大俠也其友人喪親遵為䕶䘮事賻助甚豊丹乃懐縑一疋陳之於主人前曰如丹此縑出自機杼遵聞而有慙色又曰王丹子有同門生䘮親家在中山白丹欲徃奔慰結佀將行丹怒而撻之令寄縑以祠焉或問其故丹曰交道之難未易言也又曰上發闗東兵自將上隴討隗囂囂衆潰走圍解於是置酒髙㑹勞賜來歙班}
