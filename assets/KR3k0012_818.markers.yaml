  - {type: variant, offset: 1816, length: 218, content: 入室又曰劉孝綽為吏部郎坐受人絹一束為餉者所訟左遷信威臨賀王長史又曰任昉為義興太守及被代登舟止有絹七疋米五石至都無衣鎮軍將軍沈約遺裙衫迎之又曰費昶善為樂府嘗作鼓吹曲武帝重之勑曰才意新拔有足嘉異昔邯鄲慱物卞蘭巧辭束帛之賜實惟勸善可賜絹十疋又曰周石珍建康之廨隸也世以販絹為業又曰傅昭為臨海太守縣令嘗餉栗寘絹于簿下昭笑而還之又曰裴邃為北梁秦二州刺史復開創屯田數千頃倉廩盈實省息邊運人吏獲安乃相率餉絹千餘疋邃從曰汝等不應爾吾又不可逆汝納其二疋而已, SBCK: 東郊親耕改服青縑袴褶}
