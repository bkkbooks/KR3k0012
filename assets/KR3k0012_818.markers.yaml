  - {type: variant, offset: 2177, length: 2, content: 奉莊, WYG: 遂還值雨因共披戴後有人求庇䕃一頭之地雨霽因共爭之各云我縑丞相薛宣决曰縑值數百錢何足紛紛呼騎吏中斷縑各與半後人曰受恩矣前撮之縑主稱怒不已宣考乃歎服傅子曰漢末魏太祖以天下㓙荒資財乏匱擬古皮并裁縑帛以為候何晏九州論曰清河縑緫房子好綿荀朂為晉文王與孫皓書曰餉細縑十疋帛尚書堯典曰舜修五禮五玉三帛周禮地官曰媒氏凡嫁女娶妻入幣純帛無過五兩又春官曰肆師之職掌立國祀之禮以佐太宗伯佐助也太祀用玉帛牲牷又春官典命曰凡諸侯之適子誓於天子攝其君則下其君之禮一等未誓則皮帛繼子男又夏官下職方氏曰并州其利布帛又冬官考工記曰繼子男執皮帛又曰練帛以欄為灰渥淳其帛實諸澤器滛之以蜃渥讀如繒人渥管之渥以欄木之灰漸釋其帛也鄭司農云澤器謂澤之器蜃謂炭也清其灰而盝之而揮之清澄也於灰澄而出盝晞之晞而揮去其蜃而沃之而盝之而塗之而宿之明日沃而盝之晝暴諸日夜宿諸井七日夜是謂水練禮記月令曰季春之月開府庫出幣帛周天下勉諸侯聘名士禮賢者又禮檀弓上曰伯髙之䘮孔氏之使者未至冉子攝束帛乗馬而將之孔子曰異哉徒使我不得成禮於伯髙又王制曰布帛精麤不中數廣狹不中量不鬻於市又曰七十非帛不暖又禮運曰後聖有作治其絲麻以為布帛又内則曰國君世子生三日卜士負之告廟宿齋朝衣寢門外保受乃負之宰禮負賜之束帛又曰婦人或賜之飲食衣服布帛則受而獻之舅姑又坊記曰子云禮之先幣帛也欲民之先事而後禄也左傳桓上曰季文子卒大夫入歛公在位宰他家器為塟備無衣幣之妾無粟食之馬有藏金玉之重器備又哀上曰邾茅夷鴻以束帛乗韋自請救於呉无君命故言自毛詩鹿鳴曰鹿鳴燕群臣嘉賔也既飲食之又實幣帛筐篚以將其厚意周易賁曰賁于丘園束帛戔戔春秋元命苞曰湏女四星十二度主布帛史記曰武}
