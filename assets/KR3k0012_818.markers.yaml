  - {type: variant, offset: 346, length: 11, content: 趙儼為朗陵長時袁紹舉兵, SBCK: 漢桓帝末董卓爲軍司馬從中郎張奐征并涼州有功賜縑九千疋卓悉以分與吏士}
  - {type: variant, offset: 346, length: 0, content: '', WYG: 漢桓帝末董卓為軍司馬從中郎張奐征并凉州有宫陽縑九千疋卓悉以分與吏士南史曰孫謙濟初為錢塘令御煩以簡獄無繫囚及去官百姓以謙在職不受餉遺追載縑帛以送謙辭不受梁書曰何逺輕財好義周人之急言不虛妄蓋天性也每戲語人云卿能得我一妄語則謝以一縑衆共伺之不能記也}
