  - {type: variant, offset: 648, length: 274, content: 厚意胡去後悉皆付外具以狀聞於是詔褒之曰昔魏絳開懷以納戎今卿舉袖以受狄朕甚嘉焉乃即賜絹五百疋豫得賜分以其半藏小府後胡復來以半與之又曰田豫罷官歸居魏縣會汝南遣健步詣征北感豫宿恩過拜之豫為殺雞炊黍送詣陌頭謂之曰罷老苦汝來過無能有益若何健步愍其貧羸涕流而去還為故吏民說之汝南為具資絹數千疋遣人餉豫豫一不受魏志曰景初中賜倭士王白絹五十疋魏文帝詔曰今與孫驃騎和通商旅當日月而至而百賈偷利喜賤其物平價又與其絹故官逆為平準耳官豈少比物輩耶吳志曰丹陽太守李衡每欲治家妻輒止之衡密遣客十人於武陵龍陽洲上作宅種甘千株臨死勑兒曰汝母惡吾治家故窮如是然吾州里有千頭木奴不責汝, WYG: ''}
