  - {type: variant, offset: 4032, length: 151, content: 安二年六月賊遂來入門時家見有絹布三千餘疋及衣被器物皆令婢使輦出著庭中恣其所取魏武帝令曰今清時但當盡忠於國効力王事雖私結好於他人用千疋絹萬石穀猶無所益又曰東曹掾田疇言前以無功橫被封賞之賜以實自歸教從所執昨到下車見絹三千疋穀五千斛驚愕怪懼未敢自寧乞還藏府以為軍儲世語曰王經字彥律初為江夏太守大將軍曹爽附絹二, SBCK: 平御覽卷第八百一}
