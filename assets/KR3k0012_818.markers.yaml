  - {type: page-break, offset: 3108, content: '', id: KR3k0012_SBCK_818-5a}
  - {type: variant, offset: 3108, length: 0, content: '', krp: 帛尚書堯典曰舜脩五禮五玉三帛周禮地官曰媒氏凡嫁子娶妻入幣純帛無過五兩又春官曰肆師之職常立國祀之禮以佐太宗伯佐助也立大祀用玉帛牲牷又春官典命曰凡諸侯之適子誓於天子攝其君則下其君之禮一等未誓則以皮帛繼子男又夏官下職方氏曰并州其利布帛又冬官考工記曰繼子男執皮帛謂公之孤也見禮次子男贄用束帛而以豹皮表之爲飾又曰涷帛以欄爲灰渥淳其帛實諸澤器淫之以􅜹渥讀如繒人渥管之渥以欄木之灰漸釋其帛出鄭司農云澤器謂滑澤之器􅜹謂炭也士冠礼曰素積白屨以魁柎之說曰魁蛤也周官亦有白盛之􅜹􅜹蛤也玄謂淫薄粉之令帛白蛤今海旁有焉清其灰而盝之而擇之清澄也於灰澄而出盝晞之晞而揮去其􅜹而沃之而盝之而塗之而宿之更渥淳之眀日沃而盝之朝更沃至夕盝之又更沃至旦盝之亦七日如漚絲也晝暴諸日夜宿諸井七日七夜是謂水涷禮記月令曰季春之月開府庫出幣帛周天下勉諸侯聘名士禮賢者又檀弓}
  - {type: variant, offset: 3109, length: 1, content: 問, SBCK: 曰伯高之䘮孔氏之使者未至冉子攝束帛乗馬而將之孔子曰異哉徒使我不得成禮於伯髙又王制曰布帛精麤不中數廣狹不中量不鬻於市又曰七十非帛不暖又禮運曰後聖有作治}
  - {type: variant, offset: 3109, length: 1, content: 問, krp: 曰伯高之䘮孔氏之使者未至冉子攝束帛乗馬而將之孔子曰異哉徒使我不得成禮於伯髙又王制曰布帛精麤不中數廣狹不中量不鬻於市又曰七十非帛不暖又禮運曰後聖有作治}
  - {type: variant, offset: 3111, length: 0, content: '', SBCK: 絲麻以爲布帛又内則曰國君丗子生三日卜士􅀒之告者􅀫齋朝服寢門外保受乃􅀒之宰禮􅀒子賜之束帛又曰婦人或賜之飲食衣服布帛則受而獻諸舅姑又坊記曰子云禮之先幣帛也欲民之先事而後禄也此禮謂所執之贄以見者也旣相見乃奉幣帛以脩好也或云禮之光辭而後幣帛左傳襄上曰季文子卒大夫入歛公在位宰庀家器爲葬備無衣帛之妾無粟食之馬無藏金玉無重器備又哀上曰邾茅夷鴻以束帛乗韋自請救於呉無君命}
  - {type: page-break, offset: 3111, content: '', id: KR3k0012_SBCK_818-5b}
  - {type: variant, offset: 3111, length: 24, content: 故士文曰臣口手俱滿餘無所須上異之別加賞物勞而遣之, WYG: 妻}
  - {type: variant, offset: 3111, length: 0, content: '', krp: 絲麻以爲布帛又内則曰國君丗子生三日卜士負之告者宿齋朝服寢門外保受乃負之宰禮負子賜之束帛又曰婦人或賜之飲食衣服布帛則受而獻諸舅姑又坊記曰子云禮之先幣帛也欲民之先事而後禄也此禮謂所執之贄以見者也旣相見乃奉幣帛以脩好也或云禮之光辭而後幣帛左傳襄上曰季文子卒大夫入歛公在位宰庀家器爲葬備無衣帛之妾無粟食之馬無藏金玉無重器備又哀上曰邾茅夷鴻以束帛乗韋自請救於呉無君命}
