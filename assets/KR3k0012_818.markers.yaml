  - {type: variant, offset: 358, length: 132, content: 侵遣招誘豫州諸郡多受其命唯陽安郡不動而都尉李通急錄戶調儼見通曰方今天下未集諸郡並叛懷附者復收其緜絹小人樂亂能無遺恨且遠近多虞不可不詳也通曰紹與大軍相持甚急左右郡縣皆叛乃爾若緜絹不調送觀聽者必謂我顧望有所須待也儼曰誠亦如君慮然當權其輕重小緩調當為君釋此患乃書與荀彧又, SBCK: 史}
