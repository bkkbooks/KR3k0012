  - {type: variant, offset: 2076, length: 208, content: 賜之多者過二百疋少者百餘唯長樂公兩手持絹二十疋而出亦不異眾而當世稱其廉儉尚書令任城王澄疾不起賜絹百疋崇與章武王融以所負過多顛仆於地崇乃復腰融至損腳時人為之語曰陳留章武傷腰折股貪人敗類穢我明主又曰爾朱榮之奉莊帝召百官悉至河陰素聞元順數諫諍惜其諒直謂朱端曰可語元僕射但在省不須來順不達其旨聞害衣冠遂便出走馬為鮮于康奴所害家徒四壁無物歛尸令史王才達裂裳覆之帝勑侍中元祉曰宗室喪亡非一不可周贍元僕射清苦之節死乃益彰特贈絹百疋, SBCK: 頗振}
