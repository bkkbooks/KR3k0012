  - {type: variant, offset: 73, length: 0, content: '', SBCK: 又曰馬援行亭鄣到右北平詔書賜援鉅鹿縑三百疋又曰蔡彤爲襄賁令是時盗賊尚未悉平而襄賁清靜詔書増秩一等賜縑百疋䇿書勉勵後漢書曰趙熹避赤眉難入丹水遇更始親屬皆祼跣塗炭飢困不能前塗炭者􅀂䧟泥墜火喻窮困之極也熹見之悲感所裝縑帛資糧悉以與之將護歸郷里東觀漢記曰顯宗時詔賜降胡縑尚書案事誤以十爲百上見司農上簿大怒召郎將笞之鍾離意因叩頭曰過誤之失常人所容􅀂以懈慢爲愆則臣位大罪重郎位小罪輕咎皆在臣臣當先坐乃解衣就笞帝意乃解}
