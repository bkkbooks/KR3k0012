  - {type: variant, offset: 3113, length: 0, content: '', SBCK: 沉没而不聞者安可數哉大丈夫豈可遂藴智能使蘭艾不辯終日碌碌與鷰雀相隨乎於是奏詩義變竒之賜帛二十疋齊書曰劉顯將之㝷陽顯懸帛十疋約曰衣來者以賞之衆人竟改常服不過長短之間顯曰將有甚於此矣旣而周弘正緑絲布袴繡軒昂而至折標取帛梁書曰郭祖深清儉常服故布􅃭素木按食不過一􅁏有姥餉一早青􅀲祖深報以疋帛後有冨人効之以貨鞭而徇衆朝野憚之後魏書曰髙允拜中書令帝幸允第唯草屋數間布􅀍緼􅂁厨中塩菜而巳帝歎息曰古人之清貧豈有此乎即賜帛五百疋粟千斛又曰韋珎字靈智累遷顯武將軍郢州刺史所在有聲績朝廷嘉之遷龍騎將軍賜驊騮二疋帛五十疋􅂖三百斛珎乃召集州内􅀌貧者謂曰天子謂我能撫綏卿等故賜以􅂖帛吾何敢獨當遂以所賜悉分與之隋書曰}
