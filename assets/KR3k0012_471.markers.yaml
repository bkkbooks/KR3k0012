  - {type: variant, offset: 819, length: 193, content: 史丹男九人皆以丹任為侍中自宣元成哀外戚興者許史三王丁傅之家皆重侯累將窮富極貴又曰劉向上封事曰今王氏一姓乘朱輪轂者二十三人青紫貂蟬充盈幄內大將軍執事用權五侯驕奢並作威福又曰天子見欒大說乃拜為五利將軍居月餘得四印天士將軍地士將軍大通將軍印賜列侯甲第僮千人乘輿車馬帷帳又以衛長公主妻之齎金十萬斤數月佩六印貴震天下范曄後漢書曰楊震傳曰自震至彪四葉太尉德業相繼與袁氏俱為東京名族司馬彪續漢書曰袁安, SBCK: 刁逹}
