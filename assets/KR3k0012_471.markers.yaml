  - {type: variant, offset: 1854, length: 669, content: 次弟遂為衡州刺史合門顯貴威振南土又多致銅鼓生口獻珍異前後委積頗有助於軍國焉隋書曰觀德王雄傳或奏高潁朋黨者上詰雄於朝雄對曰臣忝衛宮闈朝夕左右若有朋附豈容不知至尊欽明眷哲萬機親覽潁用心平允奉法而行此乃愛憎之理惟陛下察之高祖深然其言雄時貴寵冠絕一時與高潁虞慶則蘇威稱為四貴又曰楊素貴寵日降其弟約從父文思弟紀及族父异並尚書列卿諸子無汗馬之勞位至柱國刺史家僮千數後庭妓妾曳綺羅者以千數第宅華侈制擬宮禁有鮑享者善屬文謝胄者工草隸並江南士人因高智慧沒為家奴親戚故吏布列清顯素之貴盛近古未聞唐書曰竇威拜內史令威奏議雍容多引古為證高祖甚親重之或引入臥內帝為前席又嘗謂曰昔周朝有八柱國之貴吾與公家咸登此職今我為天子公為內史令本同末異乃不平矣威謝曰臣家昔在漢朝內為外戚至於後魏三處外家陛下龍興復出皇后臣又階緣戚里位忝鳳池自惟叨濫曉夕兢懼高祖笑曰比見關中人與崔盧為婚猶自矜伐公代為帝戚不以貴乎又曰竇氏自武德至今再為外戚一品三人三品已上三十餘人尚主者八人女為王妃六人唐世貴盛莫與為比又曰姜皎長安中累遷尚衣奉御時玄宗在藩見而悅之皎察玄宗有非常之度尤委心焉尋出為潤州長史玄宗即位召拜殿中少監召入臥內命之捨敬曲侍宴私以后妃連榻以擊毬鬭雞常呼之為姜七而不名也兼賜以宮女名馬及諸珍物不可勝數玄宗又嘗與皎在殿庭翫一嘉樹皎稱其美玄宗令徙植於其家又曰崔神慶子琳等皆至大官郡群從數十趍奏省闥每歲時家宴組珮輝映以一榻置笏疊於其上開元天寶間中外族屬無緦麻之喪其福履昌盛如此東都私第門琳與弟太子詹事珪光祿卿瑤俱列棨戟時號三戟崔家又曰楊汝士有時名遂歷清貴其後諸子皆至卿鬱為皇族所居靜恭里知溫, SBCK: ''}
