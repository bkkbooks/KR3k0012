  - {type: variant, offset: 176, length: 1, content: 衛, SBCK: 吕不韋徃來販賤賣貴家累千金又曰齊俗賤奴虜而刁間獨貴人之桀􅃛奴人所患也惟刁間収使之逐漁塩啇賈之利或連􅀐交守相然愈益任終得其力起冨數千萬又曰范蠡浮海出齊變名姓自謂䲭夷}
