  - {type: variant, offset: 34, length: 0, content: '', SBCK: 富有之謂大業兼濟萬物故有曰冨有尚書曰五福二曰富毛詩曰瞻烏爰止于誰之屋冨人之屋烏所集禮記曰儒有不保金玉而忠信以爲寳不祈􅁟地立義以爲􅁟地不祈多積多文以爲富也又曰富潤屋德潤身又曰問國君之冨數地以對山澤所出問大夫之冨曰有宰食刀􅀕器衣服不假問士之冨以車對問庶人之冨數畜以對周禮曰太宰掌建􅀖之六典以佐王平􅀖國六曰事典以冨􅀖國左傳曰􅁗后子有寵於桓后子􅁗桓公子也景公之母弟公子鍼如二君於景其母曰不去懼選選數也君子奢冨弗去君將數其罪而加也又曰齊慶氏亡分其邑與晏子晏子不受人問曰富者人之所欲也何爲不受對曰我非惡富恐失富也又曰􅀄衛公叔文子朝而請享靈公退見史鰌而告之史鰌曰子必禍矣子冨君貪罪其及子乎文子曰君旣許我矣其􅀂之何史鰌曰無害也子臣可以免子雖冨禮恭不失臣禮富而能臣必免於難戍也驕戌子之才公救戍也其亡乎又曰鄭駟秦富而侈嬖大夫也而常陳卿之車服於其庭鄭人惡而殺之論語曰孔子曰富而可求也雖執鞭之士吾亦爲之如不可求從吾所好又曰季氏富於周公而求也爲之聚歛而附益之子曰非吾徒也小子鳴鼓而攻之可也求冉有名也季氏富矣而求聚民財以增之又曰富與}
