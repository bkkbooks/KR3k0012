  - {type: variant, offset: 266, length: 0, content: '', WYG: 寶間行以去止于陶以為此天下之中交易有無之路通為生可致富矣於是自謂陶朱公復約身又耕畜勞居候時轉物逐什一之利居無何則致貲累巨萬天下稱陶朱公也又曰子貢既學於仲尼退而仕於衞廢著鬻財於曹魯之間徐廣曰子貢𫝊云廢居著猶居也讀音如貯七十子徒賜最為饒原憲不厭糟糠匿於窮巷子貢結駟連騎束帛之幣以聘}
