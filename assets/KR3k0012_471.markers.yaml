  - {type: variant, offset: 1037, length: 432, content: 周陽亦至司徒太傅封都鄉侯四葉五公謝承後漢書曰梁不疑為潁陰侯胤子為城父侯冀一門前後七封三皇后六貴人二大將軍夫人女侯邑稱君七人尚公主三人其餘卿將尹校五十七人梁氏在位二十餘年窮極滿盛威行內外百寮側目莫敢違命東觀漢記曰馮異潁川人建武中征賊還過陽翟詔異上冢別下潁川太守都尉及三百里內長吏皆會使中大夫致牛酒宗族會郡縣給費又曰中元年以竇固為中郎將監羽林左騎破西羗還是時竇氏公侯二千石並在朝廷門內尚三公主賞賜恩寵榮於當世親戚功臣無與為等也又曰鄧訓五子及女弟為貴人立為皇后騭三遷虎賁中郎將軍車騎將軍儀同三司同三封始自隲也鄧氏自中興後累世寵貴凡侯者二十九人公二人大將軍以下十三人中二千石十四人州牧郡守四十八人其餘侍中大夫郎謁者不可勝數東京莫與為比又曰耿氏自中興以後訖建安之末大將軍九人卿十三人尚公主三人列侯十九人郎將護羗校尉及刺史二千石數十百人遂與漢興衰又曰章帝崩竇太后臨政竇憲為大將軍食邑二萬戶弟景執金吾懷將作大匠光祿勳又曰馬防車騎將軍城門校尉加置掾令史位在九卿上絕席詔封防兄弟三人, SBCK: 叔仁}
