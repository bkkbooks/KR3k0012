  - {type: variant, offset: 222, length: 3, content: 蘇秦師, SBCK: 夫用貧求冨農不如工二不如啇刺繡文不如􅀝市門此言末業貧者之資也冨者人之情性所不學而俱顯也今有無祑禄之俸爵邑之人而與之比者命曰素封又曰蜀卓氏之先趙人用鐡冶冨􅁗破趙遷卓氏見虜畧獨夫妻推輦行諸遷虜少有餘財争干吏求近卜處葭萌唯卓氏曰此地挾薄吾聞岷山之下沃野下有蹲䲭至死不飢民工}
  - {type: variant, offset: 224, length: 1, content: 師, WYG: 説齊王曰臨淄富而實其人無不鬭雞走狗六博蹋踘者又曰范蠡之陶乃治産積居與時馳逐十九年之中三致千金又曰君子富好行其德小人富以適其力又曰白圭曰吾治生業猶伊尹呂尚之謀又曰穰侯魏冉之富富}
  - {type: variant, offset: 224, length: 1, content: 師, krp: 說齊王曰臨淄富而實其人無不闘雞走狗六博蹴踘者又曰范蠡之陶乃營生積居與時馳逐十九年之中三致千金又曰君子富好行其德小人富以適其力又曰白圭曰吾營生猶伊尹吕尚之謀又曰穰侯魏冉之冨冨}
  - {type: variant, offset: 226, length: 11, content: 鬼谷先生後得周書陰符讀, SBCK: 市亦乃求逺遷致}
  - {type: variant, offset: 226, length: 11, content: 鬼谷先生後得周書陰符讀, WYG: 王家出闗輜車千乗有餘又曰白圭樂觀時變歲熟取榖與}
  - {type: page-break, offset: 226, content: '', id: KR3k0012_WYG_471-4a, image: WYG0897/WYG0897-0292a.png}
  - {type: variant, offset: 226, length: 3, content: 鬼谷先, krp: 王家出閞輜車千乗有餘又曰白圭樂觀時變歲熟取糓與之絲􅃮繭出取帛絮與之食趍時若猛獸鷙鳥之發又曰卓氏用鐡冶冨又曰程鄭冨埒卓氏又曰呉楚七國兵起時長安中列侯封軍從軍旅齎貸于錢子家以爲侯邑國在閞東成敗未决莫肯與唯無塩氏捐千金貸息什之三月呉楚平一歲中則無塩氏息十倍用此冨埒閞中又曰關中冨啇大賈盡諸田田韋家粟氏安陵杜氏亦巨萬此其章章尤異者也皆非有爵邑奉禄弄法犯姧而冨也盡推理去就與時俯仰獲其羸利以來致財用也又曰吕不韋徃來販賤賣貴家累千金又曰齊俗賤奴虜而刁間獨貴人之桀黠奴人所患也惟刁間収使之逐漁塩啇賈之利或連騎交守相然愈益任終得其力起冨數千萬又曰范蠡浮海出齊變名姓自謂䲭夷子及耕於海畔苦身務力父子治}
  - {type: punctuation, offset: 230, content: ，, id: KR3k0012_CHANT_471-bkkpn67}
  - {type: 'tls:seg', offset: 230, content: '', id: KR3k0012_CHANT_471-4a.4}
  - {type: variant, offset: 230, length: 6, content: 後得周書陰符, krp: 無幾何致錢數千萬齊人聞賢以爲相范蠡嘆曰居致千金官則至卿相此布衣極又受尊名不祥乃歸相印盡散財以分于知交郷黨懷其重寳間行以去止于陶以爲此天下之中交易有無之路通爲生可致冨矣於是自謂陶朱公復約身又耕畜勞居候時轉物逐什一之利居無何則致貲累巨萬天下稱陶朱公也又曰子貢旣學於仲尼退而仕於衛廢著鬻財曹魯之門徐廣曰子貢傳云廢居著猶居也}
