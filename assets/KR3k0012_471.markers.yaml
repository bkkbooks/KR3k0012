  - {type: variant, offset: 790, length: 0, content: '', krp: 貨殖性温厚有法度三丗共財子孫朝夕禮敬常若父家其營理産業物無所棄課役童隷各得其冝故能上下戮力財利歳倍至及廣開田土三百餘頃其所起廬舎皆有重堂髙閣陂渠灌注池魚畜牧有求必給貲至巨萬而賑贍宗族恩加郷閭又曰宣帝時隂子方者至孝有仁恩當臘日晨炊而竈神形見子方再拜受福家有黄羊因以祠之自是以後暴至巨冨有田七百餘頃輿馬僕隷比於封君方常言我子孫必將強大至識三丗而遂繁昌故後常以臘日祠竈而以黄羊又曰王丹字仲因京兆人哀平時仕州郡家累千金隱居養志好施周給毎歲農時輙載酒肴於田間候勤勞者而勞之其墮嬾者耻不致丹皆兼功自厲邑長相師以致冨殷其輕黠游薄廢業爲患者輙䁱其父兄使黜責之没則賵給親自將護其有遭䘮憂者輙待丹爲辦也又曰馬防以病乞骸骨詔賜故中山王田廬以特進就第防弟貴盛奴婢各千人巳上寳貨巨億皆買京師膏腴美業又大起第複觀連閣臨道弥貨曰街路多聚聲樂曲度比諸郊廟賔容畢至京兆杜篤之徒數百人常爲食客居門下刺史守令多出其家謝承後漢書曰戴遵字子髙富於貲産輕財好義賔客常三四百人時人名之關東大豪戴子高魏典畧曰公沙穆字文人北海膠東人也體履清直兼學多文嶾居東萊山中桓帝時有冨人王仲者謂穆曰今多以貸仕吾奉子以百萬唯子所用穆荅曰斯意厚矣夫冨貴在天得之有命以賄求爵姦莫大焉郡舉孝廉除郎中以髙第爲光禄主事吴書曰劉表亡曹公向荆州表子琮降以節迎曹公諸將皆疑其詐曹公以問婁子伯子伯曰天下擾攘各貪王命以自重今以節來是必至誠曹公大喜遂進近寵祑子伯家累千金公曰婁子伯冨樂於孤但勢不如孤耳從破馬超等子伯功爲多曹公常歎曰子伯之計孤不及也蜀志曰董和字㓜宰南郡人益州牧劉璋以爲牛鞞江原長成都令蜀土冨貴時俗奢侈貨殖之家侯服玉食婚姻葬送傾家竭産和躬率之以儉惡之𬞞防過踰僣爲之䡄制所在皆移風變善又曰麋笁字仲祖業貨殖僮客萬人貲産巨億王隱晉書曰石崇雖有人財而性麄強貪而好利冨擬王者有司簿閱崇田宅財物及水碓有三十餘區倉頭八百人他珍寳竒異}
