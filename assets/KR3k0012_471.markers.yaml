  - {type: variant, offset: 89, length: 2, content: 百官, SBCK: 出閞輜車千乗有餘又曰白圭樂觀時變􅀊熟取􅂖與之􅁝􅃮繭出取帛絮與之食趍時􅀂猛獸鷙鳥之發又曰卓氏用鐡冶冨又曰程鄭冨埒卓氏又曰呉楚七國兵起時}
  - {type: variant, offset: 92, length: 1, content: 令, SBCK: 安中列侯封軍從軍旅齎貸于錢子家以爲侯邑國在閞東成敗未决莫肯與唯無塩氏􅂢千金貸息什之三月呉楚平一􅀊中則無塩氏息十倍用此冨埒閞中又曰關中冨啇大賈盡諸田田韋家粟氏安陵杜氏亦巨萬此其章章尤異者也}
