  - {type: variant, offset: 272, length: 2, content: 甚眾, WYG: 也又曰猗頓用盬鹽起而邯鄲郭縱以鐵冶成業與王者埓富烏氏倮韋昭曰烏氏縣名屬安定倮名也畜牧及衆斥賣求繒物間獻遺戎王戎王倍與之蓄至用谷量牛馬秦始皇命倮比封君寡婦清其先得丹穴而擅其利數世家亦不貲清寡婦也能守其業用財自衞不見侵犯秦皇帝以為貞婦而客之為築女懷清臺夫倮鄙人牧長清窮鄉寡婦禮抗萬乗名顯天下豈非以富耶又曰夫用貧求富農不如工工不如商刺繡文不如倚市門此言末業貧者之資也富者人之情性所不學而俱欲也今有無秩禄之奉爵邑之入而樂與之比者命曰素封又曰蜀卓氏之先趙人用鐵冶富秦破趙遷卓氏卓氏見虜略獨夫妻推輦行詣遷處諸遷虜少有餘財爭與吏求近處葭萌唯卓氏曰此地狹薄吾聞汶山之下沃野下有蹲鴟至死不饑民工於市易乃求遠遷致之臨卭大喜即鐵山鼓鑄運籌策傾滇蜀之民富至僮千人田池射􅀈之樂}
