  - {type: variant, offset: 904, length: 274, content: 天子見欒大說乃拜為五利將軍居月餘得四印天士將軍地士將軍大通將軍印賜列侯甲第僮千人乘輿車馬帷帳又以衛長公主妻之齎金十萬斤數月佩六印貴震天下范曄後漢書曰楊震傳曰自震至彪四葉太尉德業相繼與袁氏俱為東京名族司馬彪續漢書曰袁安字召公桓帝初遷太尉有子逢成隗字周陽靈帝時為司空隗字周陽亦至司徒太傅封都鄉侯四葉五公謝承後漢書曰梁不疑為潁陰侯胤子為城父侯冀一門前後七封三皇后六貴人二大將軍夫人女侯邑稱君七人尚公主三人其餘卿將尹校五十七人梁氏在位二十餘年窮極滿盛威行內外百寮側目莫敢違命東觀漢記曰馮異潁川人建武中征賊還過陽翟詔異上冢別下潁川太守都尉及三百里內長吏皆會使, WYG: ''}
