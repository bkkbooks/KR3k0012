  - {type: variant, offset: 83, length: 4, content: 李斯置酒, SBCK: 行賈盡法孔氏之雍容又曰計然曰貴出如糞土賤取如珠玉財幣欲其行如流水脩之十年國富又曰􅂫􅁗􅀃齊王曰臨淄富而實其人無不闘雞走狗六博蹴踘者又曰范蠡之陶乃營生積居與時馳逐十九年之中三致千金又曰君子富好行其德小人富以適其力又曰白圭曰吾營生猶伊尹吕尚之謀又曰穰侯魏冉之冨冨}
