  - {type: variant, offset: 1470, length: 381, content: 三千戶防為潁陽侯身帶三綬防子鉅為黃門侍郎肅宗親御章臺下殿陳鼎俎自臨冠之兄弟奴婢各千人已上又曰竇融嗣子穆尚內黃公主而融弟顯親侯竇友嗣子固尚涇陽公主穆長子勳尚東海恭王女竇氏一公二侯三公主四千石自祖至孫官符廄茅相望奴婢千數於親戚功臣莫與為比吳志曰士爕兄弟並為列郡雄長一州偏在萬里威尊無上出入鳴鍾鼓備威儀笳簫鼓吹車騎滿道胡人夾轂焚香者常有數十妻妾乘輜軿子弟從兵騎當時貴重震服百蠻又曰孫權拜諸葛恪撫越將軍領丹陽太守授棨戟武騎三百拜畢令恪備威儀作鼓吹導引歸家時年三十二何法盛晉中興書曰諸葛氏之先出自葛國漢司隸校尉諸葛豊以忠強立名子孫代居二千石三國之典蜀有丞相亮吳有大將軍瑾魏有司空誕名並蓋海內為天下盛族又曰何比干字長卿武帝時為丹陽都尉有陰德嘗獨坐天大雨有一老母詣比干而衣不濡比厈怪而敬焉臨去懷中出金冊九百九十枚以授比干曰爾子孫當佩印綬如此冊數陳書曰征南將軍歐陽頠時頠弟盛為交, SBCK: 歷職}
