  - {type: variant, offset: 206, length: 2, content: 生男, SBCK: 子貢傳云廢居著猶居也讀音如貯七十子徒賜最爲饒原憲不饜糟糠匿於窮巷子貢結駟車􅀐束帛之幣以聘諸侯所至國君}
  - {type: variant, offset: 209, length: 6, content: 喜生女無怨獨, SBCK: 不界迎與杭禮者夫使孔子名布􅀭於天下者子貢先後之也又曰猗頓用盬起而邯鄲郭縱以鑄冶成業與王者埒冨烏氏倮韋昭曰烏氏縣名屬安定倮名也畜牧及衆賣求繒物問遺戎王戎王倍與之蓄至用谷量牛馬􅁗始皇令倮比封君寡婦清其先得丹穴而擅其利數丗家足不貲清寡婦也能守其業用財自衛}
