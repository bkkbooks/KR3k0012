  - {type: variant, offset: 783, length: 3, content: 諸珍物, SBCK: 後房妾數十人内奢􅁋好飲食極滋味聲色之樂又曰冨者土木􅀍文錦犬馬餘􅁏粟又曰中大夫張匡上書言王啇宗族權勢合貲巨萬計私奴以千數又曰郡國富人兼利顓業以貨賂自行取重於郷里者不可勝數又曰師史轉轂百數賈郡國無所不至能致千萬又曰京師冨人杜楊樊嘉茂陵􅀔綱爲天下髙貲又曰所忠言貴家子弟冨人或闘雞走}
