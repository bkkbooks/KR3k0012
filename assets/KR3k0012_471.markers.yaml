  - {type: variant, offset: 1514, length: 0, content: '', WYG: 寶貨巨億皆買京師膏腴美業又大起第觀連閣臨道彌亘街道多聚聲樂曲度比諸郊廟賓客畢至京兆杜篤之徒數百人常為食客居門下刺史守令多出其家謝承後漢書曰戴遵字子高富於貲産輕財好義賓客常三四百人時人名之闗東大豪戴子高魏典畧曰公沙穆字文乂北海膠東人也體履清直兼學多文隱居東萊山中桓帝時有富人王仲者謂穆曰今多以貲仕吾奉子以百萬唯子所用穆荅曰斯意厚矣夫富貴在天得之有命以賄求爵姦莫大焉郡舉孝亷除郎中以高第為光禄主簿吳書曰劉表亡曹公向荆州表子琮降以節迎曹公諸將皆疑其詐曹公以問婁子伯子伯曰天下擾攘各貪王命以自重今以節來是必至誠曹公曰大善遂進兵寵秩子伯家累千金公曰婁子伯富樂於孤但勢不如孤耳從破馬超等子伯功為多曹公常歎曰子伯之計孤不及也蜀志曰董和字㓜宰南郡人益州牧劉璋以為牛鞞江原長成都令蜀土富貴時俗奢侈貨殖之家侯服玉食婚姻葬送傾家竭産和躬率以儉惡衣蔬食防遏踰僭為之軌制所在皆移風變善}
