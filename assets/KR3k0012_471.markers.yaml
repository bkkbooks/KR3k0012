  - {type: variant, offset: 1352, length: 2, content: 耿氏, WYG: 師史轉轂百數賈郡國無所不至能致千萬又曰京師富人杜陽樊嘉茂陵摯綱為天下高貲又曰許忠言貴家子弟富人或鬭雞走狗馬弋獵博戱亂齊人又曰成都羅裒貲至鉅萬後漢書曰郭况遷大鴻臚上數幸其宅賞金帛甚盛京師號況家為金穴言其富貴也又曰樊重字君雲世善農稼好貨殖性溫厚有法度三世共財子孫朝夕禮敬常若公家其營理産業物無所棄課役童𨽻各得其宜故能上下戮力財利歲倍至乃廣開田土三百餘頃其所起廬舎皆有重堂高閣陂渠灌注池魚畜牧有求必給貲至巨萬而賑贍宗族恩加鄉閭又曰宣帝時陰子方者至孝有仁恩當臘日晨炊而竈神形見方再拜受福家有黄羊因以祠之}
