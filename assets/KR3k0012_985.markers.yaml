  - {type: variant, offset: 2613, length: 630, content: 色鳳腦太真虹芝天漢臣草南宮大碧西卿扶老三梁龍華生子大道有得食之後天而老此太上之所服非中山之所寶也又曰武帝崩遺詔以雜道書四十卷置棺中到延康二年河東工曹李及入上黨抱犢山採藥於巖室中得此書盛以金箱其書後題臣姓名記日月是武帝時物也河東太守張純以箱及書奏宣帝宣帝示武帝時左右侍臣有典書中郎見書流涕曰此是帝崩時殯殮物也東方朔別傳曰孝武皇帝好方士敬鬼神使人求神僊不死之藥甚至初無所得天下方士四面蜂至不可勝言東方朔睹方士虛語以求尊顯即云上天欲以喻之其辭曰陛下所使取神藥者皆天地之間藥也不能使人不死獨天上藥能使人不死耳上曰然天何可上也朔對曰臣能上天上知其謾託陁後二音欲極其語即使朔上天取不死之藥朔既辭去出殿門復還曰今臣上天似謾詫者願得一人為信驗上即遣方士與朔俱往期三十日而反朔等既辭而行日日過諸侯傳飲往往留十餘日期又且盡無上天意方士謂之曰期且盡日日飲酒為奈何朔曰鬼神之事難豫言當有神來迎我者於是方士晝臥良久朔遽覺之曰呼君極久不應我今者屬從天上來方士大驚還具以聞上上以為面欺詔下朔獄朔啼對曰朔須幾死者再上曰何也朔對曰天公問臣下方人何衣臣朔曰衣蟲蟲何若臣朔曰蟲喙髯髯類馬邠邠類虎天公大怒以臣為謾言繫臣使下問還報有之名蠶天公乃出臣今陛下茍以臣為詐願使人上問之天上大驚曰善齊人多詐欲以喻我止方士也罷諸方士弗復用也由此朔日以親近列僊傳曰樂子長者齊人也少好道真到霍林山遭僊人受服巨勝赤松散方僊人告之曰虵服此藥化為龍人服此藥老翁成童能昇雲上下改易形容崇氣益精起死養生子能服之可以度世子長服之年, WYG: ''}
