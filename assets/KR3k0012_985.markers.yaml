  - {type: variant, offset: 1978, length: 2, content: 注引, WYG: 曰德至草木則芝草生出爾雅曰􅌲芝也漢書曰武帝時芝生殿内房中九莖上赦詔天下作芝房歌又曰宣帝神爵元年三月詔曰金芝草九莖產于涵德殿銅池東觀漢記曰明帝永平七年公卿以芝生前殿表賀奉觴上夀又曰桓帝建和元年芝生中黄藏府又曰光和四年郡國上芝草英續漢書曰建初五年零陵女子酆寜宅内生紫芝五株長者尺四寸短者七八寸太守沈博使功曹齎芝以聞帝吿示天下宋書曰順帝昇明二年臨城縣生紫蓋黄裏芝歴時質色不變唐書曰貞觀中皇太子寢室中產素芝十四莖並為龍興鳳翥之形又曰天寶中有玉芝產于大同殿之柱礎一本兩莖神光照于殿又曰上元中延英殿御座生玉芝一莖三花御製三靈芝詩淮南子曰巫山之上從風縱火紫芝與蕭艾俱死又曰稻生于水而不能生于湍瀬之間芝生于山而不能生于盤石之上}
