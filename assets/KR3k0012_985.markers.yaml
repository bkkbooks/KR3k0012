  - {type: variant, offset: 308, length: 265, content: 知譏止不舍藥物所以加殺君之名論語曰康子饋藥拜而受之曰丘未達不敢嘗饋遺史記曰長桑君與扁鵲藥服之三十日見人五藏漢書曰灌夫擊吳身中大創十餘適有萬金良藥故得不死又曰王嘉為丞相數上封事言不宜封董賢上怒有詔假謁者節召丞相詣廷尉詔獄使者既到府掾史涕泣共和藥進嘉嘉引藥盃以擊地謂官屬曰丞相幸得備位三公奉職有罪當伏刑都市以示萬眾丞相豈兒女耶何為咀藥而死東觀漢記曰上嘗與朱祐共買蜜合藥上追念之即賜祐白蜜一石問何如長安時共買蜜乎又曰鄧訓為護烏桓校尉吏士常大病瘧轉易至數十人訓身煮湯藥咸得平愈其無妻者為適配偶又曰王閎者王莽叔父平阿侯譚子也王莽篡位潛忌閎乃, WYG: ''}
