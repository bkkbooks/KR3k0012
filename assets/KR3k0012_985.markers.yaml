  - {type: variant, offset: 3586, length: 0, content: '', SBCK: 之即起少君求隨安期奉給奴役廣志曰丹朱沙之朴也大者如米生山中出牂牁與古僂國裴淵廣州記曰鄣平縣有朱沙塘水如絳又曰鄣平縣有石膏山望之􅀂霜雪又一嶺東爲銀石南是䥫石西則丹沙北乃銅石本章曰丹砂味甘微寒生山谷養精神益氣明目鈆丹味辛微寒生平澤治吐逆胃反乆服成仙生蜀都吴氏本草曰丹砂神農甘黄帝歧伯苦有毒扁鵲苦李氏大寒或生武陵採無時能化朱成水銀畏礠石惡鹹水武陵太守謝承表曰新宫成上丹砂五百斤上億萬􅀊壽芝上春秋運斗樞曰摇光得陵出黒芝孝經援神契曰德至草木則芝草生尓雅曰苬似由反芝也郭璞曰芝一歳三華瑞草漢書曰武帝時芝生殿内房中九莖詔赦天下作芝房歌又曰宣帝神爵元年三月詔曰金芝草九莖服䖍曰色象金産于函德殿銅池中如淳曰函亦含也銅池承霤也晉灼曰以銅作池韋昭曰以銅􅅚池邊也東觀漢記曰明帝永平七年公卿以芝生前殿奉觴上壽桓帝建和元年芝草生中黄藏府又曰光和四年郡國上芝草英續漢書曰建􅀄五年零陵女子傅寧宅内生紫芝五株長者尺四寸短者七八寸太守沈豐使功曹齎芝以聞帝告示天下宋書曰順帝升明二年臨城縣生紫盖}
