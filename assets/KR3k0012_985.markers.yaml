  - {type: 'tls:seg', offset: 1960, content: '', id: KR3k0012_CHANT_985-29a.7}
  - {type: variant, offset: 1961, length: 1, content: 皆, WYG: 九天太一所以白日昇天又曰馬明王從道人受太清神丹經三卷入山合藥服之不老昇天但服半劑為地仙展轉九州百餘年乃白日昇天也又曰淮南王安從仙公受金丹及三十六水方又曰李少君從安期先生受神丹爐火之方家貧不得藥乃以方干漢武帝云又曰葛𤣥字孝先從左元放受丸丹金液仙經又曰劉元鳳南陽人服芙蓉丹及雞子丹魯女生别傳曰李少君字雲翼齊國臨淄人也少好道入山採藥修全身之術道未成而病困于山林中遇安期先生經過見少君少君叩首求乞生活安期愍其有志乃以神樓散方與之服即起少君求隨安期奉給奴役廣志曰丹者朱砂之朴也大者如米生山中出牂牁與古倭國裴淵廣州記曰鄣平縣有朱砂塘水如絳又曰鄣平縣有石膏山望之若霜雪蓋嶺東為銀石南是鐡石西則丹砂北乃銅石本草曰丹砂味甘㣲寒生山谷養精神益氣明目鉛丹味㣲寒生平石治吐逆反胃乆服成仙生蜀都吳氏本草曰丹砂神農甘黄帝岐伯苦有毒扁鵲苦李氏大寒或生武陵採無時能化朱成水銀畏磁石惡鹹水武陵太守謝承表曰新宮成}
