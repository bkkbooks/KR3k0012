  - {type: variant, offset: 3584, length: 1, content: 初, SBCK: 入山採藥修全身之術道未成而病困於山林中遇安期先生經過見少君少君叩頭求乞生活安期愍其有志乃以神樓散方與}
  - {type: variant, offset: 3584, length: 1, content: 初, krp: 入山採藥修全身之術道未成而病困於山林中遇安期先生經過見少君少君叩頭求乞生活安期愍其有志乃以神樓散方與}
