  - {type: 'tls:seg', offset: 1952, content: '', id: KR3k0012_CHANT_985-29a.5}
  - {type: variant, offset: 1954, length: 0, content: '', WYG: 之法取金液及水銀合煑之三十日出以黄土甌盛封以太一泥置之猛火上炊之卒時皆化為丹服如小荳便仙以此丹一刀圭粉和水銀一斤即成銀又取此丹一斤置猛火上扇之化為赤金而流名曰丹金以塗刀劍去萬里以此丹金為盤碗食其中令長生以成日月得神液如方諸之得水也飲之令人不死又曰九丹成為仙藥之上然合作之所用雜藥甚多若四方清通者市之可得取若九域分攝則其物或不可得也又曰葛稚川云其祖鴻臚少時曾為臨流令云此縣有廖氏家世壽考或出百嵗或八九十嵗後徙去子孫多夭折他人入居其故宅者復累長夀由此乃覺是宅所為而不知其何故疑其井水殊赤乃試掘井左右得古人埋丹砂數十斤山海經曰拒山英水出焉其中多丹粟又曰始州國有丹山論衡曰太公隂謀書武王伐紂令小兒以丹塗身純赤常大呌云殷王亡民見兒身赤以為天神説文曰丹巴越之赤石也雘善丹也神仙傳曰采女請問彭祖}
