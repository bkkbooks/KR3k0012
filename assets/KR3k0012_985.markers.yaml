  - {type: variant, offset: 3587, length: 3, content: 連丸五, SBCK: 裏芝芝歷時質色不變唐書曰貞觀中皇太子寢室中産素芝十四莖並爲龍興鳯翥之刑又曰天寳中有玉芝産于大同殿之柱礎一夲兩莖神光照於殿又曰上元中延英殿御座生玉芝一莖三花御製玉靈芝詩淮南子曰巫山之上從風縱火紫芝與蕭艾俱死又曰稻生水而不能生於湍瀬之流芝生於山而不能生於盤石之上抱朴子曰芝者有石芝有木芝有草芝有􅁏芝有􅌲芝名有百許種也石芝者石象生於海隅石山及島嶼之涯肉芝者狀如肉頭尾四足良似生物也附於大石盖在高岫嶮峻之地或却着仰綴也赤者如珊瑚白者如截肪黒者如澤􅃮青者如翠羽黄者如紫金而皆光明洞徹如堅氷也晦夜去之一二百歩便望見其光矣大者}
  - {type: page-break, offset: 3587, content: '', id: KR3k0012_SBCK_985-5b}
  - {type: variant, offset: 3587, length: 3, content: 連丸五, krp: 裏芝芝歷時質色不變唐書曰貞觀中皇太子寢室中産素芝十四莖並爲龍興鳯翥之刑又曰天寳中有玉芝産于大同殿之柱礎一夲兩莖神光照於殿又曰上元中延英殿御座生玉芝一莖三花御製玉靈芝詩淮南子曰巫山之上從風縱火紫芝與蕭艾俱死又曰稻生水而不能生於湍瀬之流芝生於山而不能生於盤石之上抱朴子曰芝者有石芝有木芝有草芝有肉芝有􅌲芝名有百許種也石芝者石象生於海隅石山及島嶼之涯肉芝者狀如肉頭尾四足良似生物也附於大石盖在高岫嶮峻之地或却着仰綴也赤者如珊瑚白者如截肪黒者如澤􅃮青者如翠羽黄者如紫金而皆光明洞徹如堅氷也晦夜去之一二百歩便望見其光矣大者}
  - {type: variant, offset: 3590, length: 1262, content: 十餘年乃入鳥鼠山又於山中服水銀百餘年還鄉里年如二十者常乘青牛故號為青牛道士桂陽先賢畫讚曰蘇耽嘗除門庭有眾賓來耽告母曰人招耽去已種藥著後園梅樹下可治百病一葉愈一人賣此藥過足供養便隨賓去母走牽之四體如醉足不能舉邴原別傳曰魏太子為五官中郎將原為長史太子讌會眾賓百數十人太子建議曰君父各有篤疾有藥一丸可救一人當救君耶父耶眾人紛然或君或父時原在坐不與此論太子諮之於原原悖然對曰父太子亦不復難曹毗杜蘭香傳曰神女蘭香降張碩碩問壽如何香曰消磨自可愈疾淫祀無益香以藥消磨王子年拾遺錄曰燕昭王坐祇明之室晝而假寐忽夢西方有白雲蓊蔚而起俄而闇於庭間有人衣服皆毛羽駕蒼螭之車從雲中而出直詣王所王夢中與語問以上僊之術羽人曰大王精智未開欲求恒生不可得也王請受絕慾之教羽人指畫王心應手而裂王乃驚悟因患心疾久之乃昇於泉照之館復見前所夢人於前曰本欲易王之心乃出方寸綠囊囊中有續脈名丸哺四精散其細若灰以手摩王之臆俄而既愈王因請其方曰其用物也有九明神芝煎以蒼鷹之血黑河鱗膽煮以琨璵之脂貯以玉缶緘以金繩封以玉印王得服之後天而死若溺於淫嗜於欲求者祇苦心焉語畢化為青鳧入天際王求合藥終不能成黑河北極也其水濃黑不流上有濃雲生焉有黑鯤千尺如鯨常飛遊於南海博物志曰夫性之所以和病之所以愈是當其藥應其病則生違其藥失其應則死本草經曰太一子曰凡藥上者養命中藥養性下藥養病神農乃作赭鞭鉤𨨪尺制切從六陰陽與太一升五岳四瀆土地所生草石骨肉心皮毛羽萬千類皆鞭問之得其所能主治當其五味百七十餘毒異苑曰魏武北征蹋頓升嶺眺矚見一崗不生百草王粲曰如是古冢此人在世服生礜石死而石上熱蒸出外故卉木燋滅即令鑿之果得大墓有礜石滿塋仲宣博識強記皆類此也一說粲在荊州從劉表登鄣山見此異任昉述異記曰漢世古諺云雖有神藥不如少年雖有珠玉不如金錢太原神釜崗中有神農嘗藥之鼎在焉成陽山中有神農鞭藥處一名神農原一名藥草山山中有紫陽觀世傳神農於此辨百藥也養生略要曰神農經曰五味養精神強魂魄五石養髓肌肉肥澤諸藥其味酸者補肝養心除腎病其味苦者補心養痺除肝病其味甘者補脾養肺除心病其味辛者補肺飬腎除脾病其味鹹者補腎飬肺除肝病故五味應五行四應四時夫人性生於四時然後命於五行以一補身不死命神以母養子長生延年以子守母除病究年嶺表錄異曰廣之屬郡及鄉里之間多蓄蠱彼之人悉能驗之以草藥治之十得其七八藥則金釵服形如石斛古漏子女票恨食之即吐人肝藤濃汁煎喫陳家白藥子一名吉利本梧州陳氏有此藥善解蟲每有中者即求之前後救人多矣遂以為名今封康州有得其種者廣府每歲常為土貢焉諸解毒藥功力皆不及陳家白藥王彪之閩中賦曰藥草則青珠黃連拳柏決明蓯蓉鹿茸漏蘆松榮痊痾則年永練質則翰生謝靈運山居賦曰本草所載山澤不一雷桐是別和緩是悉三枝六根五華九實樂府歌詩曰仙人騎白鹿髮短耳何長道我奉上藥覽之獲無疆來到主人門奉藥一玉箱主人服此藥身體日康強髮白復還黑延年壽命長魏文帝詩曰西山何如高高高殊無極上有兩仙童不飲亦不食與我一丸藥光耀有五色服藥四五日身體生羽翼應劭表曰臣劭言郡舊因計吏獻藥闕而不修慚悸交集無辭自文今道少通謹遣五官孫艾貢茯苓十斤紫芝六枝鹿茸五斤五味一升計吏發行輒復表貢, WYG: ''}
  - {type: variant, offset: 3592, length: 0, content: '', SBCK: 斤小者三四斤非乆齋至精及佩老子入山靈寳五符亦不能得見此凢見諸芝且先以開山􅁍害符置其上則不得復隱蔽化去矣徐徐擇王相之日設醮然後取之皆從日下禹歩閉氣而徃也又得石象擣之三萬六千杵服方寸匕日盡一斤則得千歳十斤則萬歳亦可分人服之玉脂芝生於有玉之山常居懸危之處玉膏流出萬}
