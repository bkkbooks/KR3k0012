  - {type: punctuation, offset: 1984, content: 「, id: KR3k0012_CHANT_985-bkkpn654}
  - {type: variant, offset: 1984, length: 0, content: '', SBCK: 余考覽飬生之書究集乆視之方曽所披渉篇以千計矣莫不以還丹金液爲大要焉然則二事盖仙道之極也服此而不仙則古無仙矣昔左元放於天注山中精思神人授以丹經仙公從元放受之凡受太清丹經三卷及九鼎丹經一卷金液經一卷子師鄭君者子從祖仙公之弟子乃於馬迹山中立墠盟受之并具諸口訣之不書者又曰太清神丹其法出元君元君者老子之師也太清觀天經有十四篇云其上七篇不可以教授其中四篇無足傳甞沉之三泉下篇者正是丹經上中下三卷其經曰上下得道長生丗間又曰漢末新野隂君合此太清丹得仙其人本儒生有才思著詩及丹經讃并序述初學道凌師本末引已所知識之得仙者四十餘人甚分明也又曰有九光丹與九轉異法大都相似耳作之之法當先以諸藥合水火以轉五石五石者丹砂雄黄礜石曽青磁石也一石轉五轉而各成五色五石合爲二十五色色各一兩而異器盛之欲起死人未滿三日取清丹一刀圭和以水浴死人之身又以一刀圭發其口内之死人立生欲致行厨取黒丹和以􅂗左手所求如所道皆自致可致天下萬物也欲隠形及先知未然方來之事及住年不老服黄丹一刀圭即便長生不復老坐見千里之外吉凶皆如在目前也人生相命盛衰壽夭貴賤貧冨皆知之矣其法具在太清中卷又曰五帝雲丹方一卷其法五也用丹砂雄黄石流黄曽青礐石磁石礬石戎鹽太一禹餘粮亦同用太一泥及神室祭醮之三十六日成又曰以金液爲威喜巨勝之法取金液及水銀合煑之三十日岀以黄土甌盛封以太一泥置之猛火上炊之卒時皆化爲丹服如小豆便仙以此丹一刀圭粉和水銀一斤即成銀又取此丹一斤置猛火上扇之化爲赤金而流名曰丹金以塗刀劒兵去萬里以此丹金爲盤椀食其中令長生以承日月得神液如方諸之得水也飲之令人不死又曰九丹誠爲}
