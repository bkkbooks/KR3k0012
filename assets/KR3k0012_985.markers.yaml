  - {type: variant, offset: 3993, length: 172, content: 明神芝煎以蒼鷹之血黑河鱗膽煮以琨璵之脂貯以玉缶緘以金繩封以玉印王得服之後天而死若溺於淫嗜於欲求者祇苦心焉語畢化為青鳧入天際王求合藥終不能成黑河北極也其水濃黑不流上有濃雲生焉有黑鯤千尺如鯨常飛遊於南海博物志曰夫性之所以和病之所以愈是當其藥應其病則生違其藥失其應則死本草經曰太一子曰凡藥上者養命中藥養性下藥養病神農乃作赭鞭鉤𨨪尺制切從六陰陽與太一升, SBCK: 百八十}
