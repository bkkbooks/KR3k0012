  - {type: variant, offset: 438, length: 352, content: 謂官屬曰丞相幸得備位三公奉職有罪當伏刑都市以示萬眾丞相豈兒女耶何為咀藥而死東觀漢記曰上嘗與朱祐共買蜜合藥上追念之即賜祐白蜜一石問何如長安時共買蜜乎又曰鄧訓為護烏桓校尉吏士常大病瘧轉易至數十人訓身煮湯藥咸得平愈其無妻者為適配偶又曰王閎者王莽叔父平阿侯譚子也王莽篡位潛忌閎乃出為東郡太守閎懼誅常繫藥手內莽敗漢兵起閎獨完全華嶠後漢書曰張楷字公超家貧無以為業常乘驢車至縣賣藥九州春秋曰青州刺史焦和多作陷水丸沉河望寇不得渡吳書曰合肥之役凌統身被六七瘡有卓氏良藥故得不死魏志曰太祖性嚴掾屬公事往往杖之何夔常畜毒藥誓死無辱是以終不見及晉書曰餘杭隱士郭文字文舉王導聞召之永昌中大疫父病亦殆導遺藥文曰命在天不在藥也王隱晉書曰李涓為尚書令家至貧兒病無錢買藥上賜錢十萬李涓一作李鳳又曰程咸字延休其母夢白頭公授藥曰服此當得貴子後, SBCK: ''}
