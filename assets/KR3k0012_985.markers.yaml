  - {type: variant, offset: 115, length: 215, content: 有疾飲藥臣先嘗之親有疾飲藥子先嘗之嘗者度所堪也醫不三世不服其藥又曰季春餧獸之藥無出九門為鳥獸方孚乳傷之為逆天時天子九門者路門應門雉門畢門庫門皋門國門近郊門遠郊門孟夏之月藂蓄百藥蕃蕪之時毒氣盛也左傳曰臧孫曰季孫之愛我也疾疹也孟孫之惡我也藥石也常志相違戾猶藥石之療疾也美疹不如惡石孟孫死吾亡無日矣又曰許悼公疾飲太子止之藥卒太子奔晉書曰殺其君君子曰盡心力以事君舍藥物可也藥物有毒當由醫非凡人所知譏止不舍藥物所以加殺君之名論語曰康子饋藥拜, SBCK: 乗木}
