  - {type: variant, offset: 4166, length: 686, content: 岳四瀆土地所生草石骨肉心皮毛羽萬千類皆鞭問之得其所能主治當其五味百七十餘毒異苑曰魏武北征蹋頓升嶺眺矚見一崗不生百草王粲曰如是古冢此人在世服生礜石死而石上熱蒸出外故卉木燋滅即令鑿之果得大墓有礜石滿塋仲宣博識強記皆類此也一說粲在荊州從劉表登鄣山見此異任昉述異記曰漢世古諺云雖有神藥不如少年雖有珠玉不如金錢太原神釜崗中有神農嘗藥之鼎在焉成陽山中有神農鞭藥處一名神農原一名藥草山山中有紫陽觀世傳神農於此辨百藥也養生略要曰神農經曰五味養精神強魂魄五石養髓肌肉肥澤諸藥其味酸者補肝養心除腎病其味苦者補心養痺除肝病其味甘者補脾養肺除心病其味辛者補肺飬腎除脾病其味鹹者補腎飬肺除肝病故五味應五行四應四時夫人性生於四時然後命於五行以一補身不死命神以母養子長生延年以子守母除病究年嶺表錄異曰廣之屬郡及鄉里之間多蓄蠱彼之人悉能驗之以草藥治之十得其七八藥則金釵服形如石斛古漏子女票恨食之即吐人肝藤濃汁煎喫陳家白藥子一名吉利本梧州陳氏有此藥善解蟲每有中者即求之前後救人多矣遂以為名今封康州有得其種者廣府每歲常為土貢焉諸解毒藥功力皆不及陳家白藥王彪之閩中賦曰藥草則青珠黃連拳柏決明蓯蓉鹿茸漏蘆松榮痊痾則年永練質則翰生謝靈運山居賦曰本草所載山澤不一雷桐是別和緩是悉三枝六根五華九實樂府歌詩曰仙人騎白鹿髮短耳何長道我奉上藥覽之獲無疆來到主人門奉藥一玉箱主人服此藥身體日康強髮白復還黑延年壽命長魏文帝詩曰西山何如高高高殊無極上有兩仙童不飲亦不食與我一丸藥光耀有五色服藥四五日身體生羽翼應劭表曰臣劭言郡舊因計吏獻藥闕而不修慚悸交集無辭自文今道少通謹遣五官孫艾貢茯苓十斤紫芝六枝鹿茸五斤五味一升計吏發行輒復表貢, SBCK: ''}
