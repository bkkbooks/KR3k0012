  - {type: variant, offset: 791, length: 1092, content: 咸至侍中又曰符生常使太醫令程延合安胎藥問人參好惡并藥分多少延曰雖小小不具自可堪用生以為譏己遂斬之又曰陸抗與羊祜推喬扎之好抗嘗遺酒祜飲之不疑抗有疾祜饋之藥杭亦推心服之宋書曰高祖微時伐狄新洲見大虵長數丈射傷之明日洲中聞杵臼聲往視之見童子數人皆青衣於榛中禱藥問其故荅曰我王為劉寄奴所射合藥傳之帝曰神何不殺之童子曰寄奴王者不死不可殺帝叱之皆散仍收藥而反又客經下邳逆旅會一沙門謂帝曰江表當亂能安之者其在君乎帝先患手瘡經年不愈沙門有黃藥因留與帝既而忽亡帝以黃散傅瘡一傅而愈寶其餘及所得童子藥每遇金瘡傅之並愈齊書曰隨郡王子隆年二十一而體過充壯常使徐嗣伯合蘆茹丸服以自銷損又曰豫章王嶷薨後見形於沈文季曰我未應死皇太子加膏中十一種藥使我癰不差湯中復加藥一種使利不斷吾已訴先帝先帝許還東邸當判此事因胸中出青紙文書示文季曰與卿少舊因卿呈主上俄失所在文季祕而不傳甚懼此事少時太子薨矣魏書曰邢巒為侍郎甚見親遇高祖因行藥園至司空府南見巒宅遣使謂巒曰朝行藥園至此見卿第宅乃佳東望德館情有依然又曰天竺烏長國婆羅門為上族解天文人有爭訟服之藥曲者發狂直者無恙隋書曰隋大舉伐陳王頒力戰被傷恐不堪復斗悲感嗚咽夜中睡夢有人授藥比寤而瘡不痛時人以為忠感又曰楊素寢疾帝每令醫診候賜以上藥然蜜問醫人恒恐不死素又自知名位已極不肯服藥亦不將慎每語弟約曰我豈須臾活耶唐書曰太宗幸襄城宮登子邏坂見暍者僵於路駐馬命左右取藥飲之乃蘇又曰天竺方士郍羅邇婆娑寐自言壽二百歲云有長生之術太宗信之深加禮敬館之金飆門內造延年之藥令崔敦禮監主之發使天下採諸奇藥異石不可稱數後竟不就又曰元和中山人柳泌言靈藥可得上信之乃以為台州刺史賜紫令採靈藥又曰柳公綽有道士獻藥試之有驗問所從來曰合此藥於薊門時朱克融方叛公綽遽謂曰惜哉至藥來於賊臣之境雖驗何益乃沉之于江而逐道士莊子曰宋人有善為不龜手之藥者龜手裂若龜文世世以洴音萍澼音僻絖音曠為事洴澼漂也絖絮也冬漂絮則手拘能為藥以自治客聞之請買其方百金以說吳王說可以戰吳王使之將冬與越人水戰大敗越人列地而封之能不龜手一也或以封或不免於洴澼絖則所用之異也唐子曰仙人韓終即韓馮之兄為宋王採藥王不肯服之終因服之遂得仙淮南子曰羿請不死之藥於西王母姮娥竊而奔月姮娥羿妻也羿從西母請不死之藥於西王母未及服之姮娥盜服得仙奔入月中為月精又曰今夫地黃主屬骨而甘草食肉之藥也以其屬骨而責其生肉以其生肉而責其屬骨是王孫綽之欲倍偏枯之藥而欲以生殊死之人亦謂失論矣王孫綽魯人也又曰崑崙墟旁有九井玉橫維其西北之隅橫猶光也橫或作彭盛不死藥器也四水者帝之神泉以和百藥以潤萬民抱朴子曰神農經曰上藥令人身安命延昇天神仙遨遊上下役使萬靈體生毛羽行廚立至又曰五芝及餌, SBCK: ''}
