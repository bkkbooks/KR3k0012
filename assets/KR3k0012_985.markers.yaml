  - {type: variant, offset: 40, length: 9, content: 若藥弗瞑眩厥疾弗瘳, SBCK: 荆及衡陽惟荆州杶幹栝栢礪砥砮丹砥細於礪皆磨石也砮石中矢鏃丹朱􅀋汲冢}
  - {type: variant, offset: 40, length: 193, content: 若藥弗瞑眩厥疾弗瘳周禮曰醫師掌藂藥供醫事疾醫以五藥養病凡藥以酸養骨以辛養筯以鹹養脈以苦養氣以甘養肉以滑養竅鄭玄注曰毒藥之辛苦者也五藥草木蟲石穀禮記曰君有疾飲藥臣先嘗之親有疾飲藥子先嘗之嘗者度所堪也醫不三世不服其藥又曰季春餧獸之藥無出九門為鳥獸方孚乳傷之為逆天時天子九門者路門應門雉門畢門庫門皋門國門近郊門遠郊門孟夏之月藂蓄百藥蕃蕪之時毒氣盛也左傳曰臧孫曰季孫之愛我也疾疹也孟孫之惡我也藥, WYG: 荆及衡陽惟荆州杶幹栝栢礪砥砮丹砥細于礪皆磨}
