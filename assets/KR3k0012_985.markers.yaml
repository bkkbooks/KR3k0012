  - {type: variant, offset: 1944, length: 6, content: 椒薑禦濕菖蒲, SBCK: 德至山陵則陵出黒丹宋均注曰丹應五典備五色也春秋斗運樞曰揺光得陵出黑芝亦令人長生以金投中則名爲金漿以玉投中則名爲玉澧服之皆長生又有取伏丹法云天下諸水有石丹者其水中皆有丹魚先夏至十日夜伺之丹魚必浮於岸側赤光上照赫然如火網而取之雖多勿盡取之也割取血以塗足下則可歩行水上長居水中史記曰寡婦清先得丹穴而擅其利清寡婦能守其業始皇爲女築懐清䑓梁書曰陶弘景旣得神符祕訣以爲神丹可成而苦無藥物帝給黄金朱沙曽青雄黄等後合飛丹色如霜雪服之體輕及帝服飛丹有驗}
  - {type: page-break, offset: 1944, content: '', id: KR3k0012_SBCK_985-1b}
  - {type: variant, offset: 1944, length: 6, content: 椒薑禦濕菖蒲, WYG: 德至山陵則陵出黑丹朱均注丹應五典備五色也春秋運斗樞曰揺光得陵出黑芝亦令人長生以金投中則名為金漿以玊投中則名為玊液服之皆長生又有取伏丹法云天下諸水有石丹者其水中皆有丹魚先夏至十日夜丹魚必浮于岸側赤光上照赫然如火網而取之雖多勿盡取之也割取血以塗足下則可歩行水上常居水中史記曰寡婦清其先得丹穴而擅其利清寡婦能守其業始皇為築女懐清臺梁書曰陶𢎞景既得神符秘訣以為神丹可成而苦無藥物帝乃給黄金朱砂曾青雄黄等後合飛丹色如霜雪服之體輕及帝服飛丹有驗}
