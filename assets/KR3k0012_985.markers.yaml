  - {type: variant, offset: 3231, length: 337, content: 能服之可以度世子長服之年百八十色如少女妻子九人皆服此藥老者還少少者不復老又曰燕王遣韓終採藥王先使韓終服之面如金色又曰安期生賣藥海邊時人以為千歲公又曰瑕丘仲賣藥於甯後地動舍壞仲死人取屍棄水收其藥賣之仲被裘誚之後為夫余使者又曰崔文子太山人賣藥都市後有疫死者萬計文子擁朱幡持黃散循問民服其散愈者萬計後在蜀賣黃散赤丸世故寶之又曰負局先生者語似燕代間人也負磨鏡局循吳帝市中磨一鏡一錢因磨輒問主得無人疾苦者有輒出紫丸藥以與之得莫不愈後上吳山絕崖頭世世懸藥與下人曰吾欲還蓬萊山與汝曹神水崖頭一旦有水白色從石間來下服之病多愈高士傳曰韓康字伯休京兆霸陵人採藥名山賣於長安市口不二價三十餘年時有女子從康買藥康價不移女子怒曰公是韓伯休郍乃不二價也康歎曰我本避名今女子皆知有我何用藥為乃遯入霸陵山中, SBCK: 丹}
