  - {type: variant, offset: 1951, length: 11, content: 聰巨勝延年威喜辟兵此皆, SBCK: 敬重之唐書曰道士劉道合者宛丘人髙宗令合還丹丹成而}
  - {type: variant, offset: 1951, length: 1, content: 聰, WYG: 敬重其事唐書曰道士劉道合者宛丘人髙宗令合還丹丹成而上之咸亨中卒惟有空皮而背上開拆有似蟬蜕髙宗聞之曰劉師為我合丹自服仙去其所進者亦無異典略曰白丹者山陵之精也淮南子曰赤水宜丹黄水宜金清水宜龜抱朴子曰余考覽養生之書究集乆視之方曾所披渉篇以千計矣莫不以還丹金液為大要焉然則二事蓋仙道之極也服此而不仙則古無仙矣昔左元放于天柱山中精思神人授以丹經仙公從元放受之凡受太清丹經三卷及九昇丹經一卷金液經一卷予師鄭君者予從祖仙公之弟子乃于馬迹山丘墠盟受之并其諸口中訣之不書者又曰太清神丹其法出元君元君老子之師也太師觀天經有十四篇云其上七篇不可以教授其中四篇無足傳沉之三泉下篇者正是丹經上中下三卷其經曰上不得道長生世間又曰漢末新野隂君合此太清丹得仙其人本儒生有才思著書及丹經贊并序述初學道隨師本末引已所知識之得仙者四十餘人甚分明也又曰有九光丹與九轉異法大都相似耳作之法當先以諸藥合水火以轉五石五石者丹砂䧺黄礜石曾青磁石也一石轉五轉而各成五色五石合為二十五色各一兩而異噐盛之欲起死人未滿三日取青丹一刀圭和以水浴死人之身又以一刀圭發其口内死人立生欲至行厨取黑丹和以塗左手所求皆得此道可致天下萬物也欲隐形及先知末然方來之事及延年不老服黄丹一刀圭即便長生不復老坐見千里之外吉凶皆如在目前也人生相命盛衰壽夭貴賤貧富皆知之矣其法具在太清中卷又曰五帝云丹方一卷其法五也用丹砂雄黄石流黄石青礜石磁礬石戎鹽太一禹餘粮亦同太一泥及神室祭醮之三十六日成又曰以金液為威起}
