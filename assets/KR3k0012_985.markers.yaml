  - {type: variant, offset: 2555, length: 106, content: 曰太上之藥乃有玄光黎角風實雲子帝園王族昌城王蘂夜河天骨崆峒靈瓜四劫一實寘陵驎膽仰掇扶桑之丹椹俯採長河之文藻紫虬童子九色鳳腦太真虹芝天漢臣草南宮大碧西卿扶老三梁龍華生子大道有得食之後天而老此太上之所服非中山之所寶也, SBCK: 云}
