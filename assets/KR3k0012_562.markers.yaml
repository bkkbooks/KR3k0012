  - {type: variant, offset: 3686, length: 1, content: 國, SBCK: 親以此日忘其哀心如喪時續漢書曰申徒與屠字同蟠字子龍父母卒蟠思慕不飲酒食肉十餘年忌日哀戚輙三日不食晉書曰穆帝納后欲用九月九日是忌月范汪問王彪之荅云禮無忌月不敢以所不見便謂無之􅀶士曹耽荀訥等並謂無忌月之文不應有妨王洽曰􅀂有忌月當復有忌􅀊唐書曰萬􅀊通天中建安王攸冝平契丹凱旋欲詣闕獻俘内史王及善以爲將軍將入城例有軍樂今属孝明髙皇帝忌月請備而不奏鸞臺侍郎王方慶奏案禮經但有忌日而無忌月晉穆帝納后用九月九日是康帝忌月于疑不定下太常禮官荀納議稱禮只有忌日無忌月語􅀂有忌月即有忌時忌􅀊軍樂是軍容與常不同請振作於事無嫌孔䕺子曰季節見於子順子順賜之酒辝問其故對曰今家之忌日也故子順曰飲也禮雖衰麻見於}
