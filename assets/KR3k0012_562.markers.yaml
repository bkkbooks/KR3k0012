  - {type: variant, offset: 3626, length: 0, content: '', WYG: 者失言而變自新與君之諱同則稱字謂人臣之名也又曰卒哭而諱自此而鬼神事之尊而諱其名王父母兄弟世父叔母姑姊妹子與父同諱父為其親諱則子不敢不從諱也諸王父母以不知親言是謂世也天子諸侯諱郡祖母之諱公中諱妻之諱不舉諸其例與従祖昆弟同名則諱之傳曰周人以諱事神名終將諱之君父之名固非臣子所斥然禮記卒哭而諱荀曰舎故而諱新謂舎親盡之祖而諱新死者故周人以本諱事神名終將諱之自父至髙禮皆不敢斥言蕭子顯齊書曰始安吴王道生字孝伯太祖次兄也子鳯字景慈卒}
