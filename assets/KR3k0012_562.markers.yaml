  - {type: variant, offset: 748, length: 1188, content: 禮館人使專之若其自有然曾子北面而弔焉又曰五十無車者不越疆而弔人氣力始勷又曰婦人不越疆而弔人不通於外行弔之日不飲酒食肉焉以全哀也弔於葬者必執引若從柩及壙皆執紼示助之以力車曰引棺曰紼喪公弔之必有拜者往謝之雖朋友州里舍人可也謂旡主後弔曰寡君承事示亦為執事來主人曰臨君辱臨其臣之喪君遇柩於路必使人弔之君於民臣有父母之恩大夫之喪庶子不受弔不以賤者為有爵者主又曰子張死曾子有母之喪齊襄而往哭之或曰齊襄不以弔以其無服非之曾子曰我弔也與哉於朋友哀痛甚而往哭之非若凡弔又曰晉獻公之喪秦穆公使人弔公子重耳獻公殺其子申生重耳避難出奔是時在翟就弔之且曰寡人聞之亡國恒於斯得國恒於斯言在喪代之際雖吾子儼然在憂服之中喪亦不可久也時亦不可失也孺子其圖之勸其反國意欲納之喪亡失位孺徲也以告舅犯舅犯是重耳之舅狐偃也字子犯舅犯曰孺子其辭焉喪人無寶仁親以為寶寶謂善道可守者仁親親行仁義父死之謂何又因以為利欲反國求為後是利父死而天下其孰能說之孺子其辭焉說猶解也又曰羔裘玄冠夫子不以弔不以吉服弔喪也又曰衛司徒敬子死子夏弔焉主人未小歛絰而往子游弔焉主人既小斂出絰反哭子夏曰聞之也與曰聞諸夫子主人未改服則不絰又曰曾子問曰三年之喪弔乎孔子曰三年之喪練不群立不旅行君子禮以飾情三年之喪而弔哭不亦虛乎為彼哀不專於其親也為親哀則是妄弔又曰諸侯非問疾弔喪而入諸臣之家是謂君臣為謔又曰弔者即位于門西東面其介在其東南北面西上於西門賓立門外不當門主孤西面立於阼階下相者受命曰孤某使某請事客曰寡君使某如何不淑受命受主人命必出也不言殯者喪無接賓淑善也如何不善言君痛之甚使某弔相者入告出曰孤某須矣稱其君名者君薨稱子某使人知通嗣也須矣不出逆也弔者入主人升堂西面弔者升自西階東面致命曰寡君聞君之喪寡君使某如何不淑子拜稽顙弔者降反位子孤子也降反位者出反門外位又曰婦人非三年之喪不踰封而弔踰封越竟也或為越疆又曰諸侯弔於異國之君則其君為主君為之主弔臣恩為己也子不敢當主中庭北面哭不拜諸侯弔必皮弁錫襄所弔雖已葬主人必免主人未喪服則君亦不錫襄必免者尊人君為之變也未喪服未成服也既殯成服又曰殷人弔於壙周人弔於家示民不偝也既葬哀而哭踊於是弔之傳曰宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱臧文仲曰宋其興乎禹湯罪己其興也勃焉桀紂罪人其亡也忽焉又曰齊侯歸遇𣏌梁之妻於郊梁戰死妻行迎喪使弔之辭曰殖之有罪何辱命焉言若有罪不足弔若免於罪則有先人之敝廬在下妾不得與郊弔婦人無外事故下猶賤也齊侯弔諸其室傳善婦人有禮又曰游吉相鄭伯以如晉亦賀虒祁也史趙見子太叔曰甚哉其相蒙也蒙欺也可弔也而又賀之子太叔曰若何弔也豈特唯我賀將天下實賀又曰琴張間宗魯死琴張孔子弟子字子開名牢將往弔之仲尼曰齊豹之盜而孟縶之賊女何弔焉言齊豹所以為盜孟縶所以見賊皆由宗魯又曰晉頃公卒秋八月葬鄭游吉弔且送葬魏獻子使士景伯詰之曰悼公之喪子西弔子蟜送葬在家十五年今吾子無二何故, SBCK: ''}
