  - {type: variant, offset: 205, length: 309, content: 畏人或時以非罪攻己不能有以說之死之者孔子畏於國是也猒行止危險之下溺不乘橋舡又曰曾子弔於負夏負夏衛也主人既祖填池祖謂移柩車去載處為行始也填池當為奠徹聲之誤奠徹遣奠設祖奠推柩而反之反於載處榮曾子弔欲更始降婦人而后行禮禮既祖而婦人降今反柩婦人辟之復升堂矣柩無反而反之又降婦人蓋欲矜賓於此婦人皆非也從者曰禮與怪之曾子曰夫祖者且也且未定之辭且胡為其不可以反宿也曾子襲裘而弔子游裼裘而弔曾子指子游而示人曰夫夫也為習於禮者如之何其裼裘而弔也又曰哀公使人弔簣尚遇諸道辟於路畫宮而受弔焉哀公魯君也畫地為宮象曾子曰蕢尚不如𣏌梁之妻知禮也齊莊公襲莒于奪𣏌梁死焉其妻迎其柩於路而哭之哀莊公使人弔之對曰君之臣不免於罪則將肆諸市朝而妻妾執肆陳尸地, SBCK: ''}
