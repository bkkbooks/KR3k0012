  - {type: variant, offset: 3626, length: 0, content: '', SBCK: 者失言而變自新與君之諱同則稱字謂諸臣之名也又曰卒􅂘而諱自此而􅀑神事之尊而諱其名王父母兄弟丗父叔父姑姉妹子與父母諱父爲其親諱則子不敢不從諱也諸王父母以不之親諱是謂士也天子諸侯諱群祖母之諱宫中諱妻之諱不舉諸其側與從祖昆弟同名則諱之傳曰周人以諱事神名終將諱之君父之臣固非臣子所斥然禮旣辛􅂘以大澤徇曰舎故而諱新曰舎親盡乏祖而諱新死者故言以本諱事神名􅁝將諱之自父至髙祖皆不敢斥言蕭子顯齊書曰始安貞王道生字孝伯太祖次兄也子鳯字景慈卒}
