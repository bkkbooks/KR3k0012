  - {type: variant, offset: 2306, length: 0, content: '', SBCK: 中宗即尊號也時賜謚多由封爵不考徳行王遵上䟽曰臣聞大行受大名小行受小名名則實稱不誣而巳近代以來惟爵得謚武官牙門有爵必謚卿校常伯無爵悉不賜謚甚失制謚之夲今中興肇建勲徳兼􅀍冝􅀷體前訓使行以謚彰豈可限以有爵中宗納焉自後公卿無爵而謚自遵始也沈約宋書曰江智淵出爲北中郎長史􅀄上寵􅁎宣貴妃殷氏卒使群臣議謚智淵上謚曰懷上以不盡嘉號甚銜之後車駕幸南山乗馬至殷氏墓群臣皆􅀐從上以馬鞭指石柱謂智淵曰此柱上不容有懷字智淵益懼宋書曰劉康祖出軍至壽陽數十里㑹魏永昌王以長安之衆八萬􅀐與康祖相及於尉康祖有八千人乃結車營而進魏軍四靣來攻衆分爲三且休且戰康祖率厲士將無不一當百魏軍死者太半流血没踝矢中頭而死於是大敗舉軍淪覆免者􅂊數十人魏人傳康祖首示彭城百姓王贈益州刺史謚曰壯又曰蕭音􅎮素爲諸曁令到縣十餘日掛衣冠於縣門而去獨居屏事非親戚不得至其籬門妻齊太尉王儉女乆與別居遂無子卒親故迹其事行謚曰貞文先生又曰曇首卒文帝臨慟歎曰王􅉟事所疾不救國之衰也中書舎人}
  - {type: page-break, offset: 2306, content: '', id: KR3k0012_SBCK_562-3b}
  - {type: page-break, offset: 2306, content: '', id: KR3k0012_SBCK_562-4a}
  - {type: variant, offset: 2306, length: 5, content: 周嵩兄顗既, WYG: 中宗旣即尊號時賜諡多由封爵不考徳行王遵上䟽曰臣聞大行受大名小行受小名則實稱不誣而已近代以来惟爵得諡武官牙門有爵必諡鄉校常伯無爵悉不賜諡甚失制謚之本今中興肇建勲徳兼}
  - {type: variant, offset: 2306, length: 0, content: '', krp: 中宗即尊號也時賜謚多由封爵不考徳行王遵上䟽曰臣聞大行受大名小行受小名名則實稱不誣而巳近代以來惟爵得謚武官牙門有爵必謚卿校常伯無爵悉不賜謚甚失制謚之夲今中興肇建勲徳兼𬒳冝深體前訓使行以謚彰豈可限以有爵中宗納焉自後公卿無爵而謚自遵始也沈約宋書曰江智淵出爲北中郎長史𥘉上寵姬宣貴妃殷氏卒使群臣議謚智淵上謚曰懷上以不盡嘉號甚銜之後車駕幸南山乗馬至殷氏墓群臣皆騎從上以馬鞭指石柱謂智淵曰此柱上不容有懷字智淵益懼宋書曰劉康祖出軍至壽陽數十里㑹魏永昌王以長安之衆八萬騎與康祖相及於尉康祖有八千人乃結車營而進魏軍四靣來攻衆分爲三且休且戰康祖率厲士將無不一當百魏軍死者太半流血没踝矢中頭而死於是大敗舉軍淪覆免者纔數十人魏人傳康祖首示彭城百姓王贈益州刺史謚曰壯又曰蕭音􅎮素爲諸曁令到縣十餘日掛衣冠於縣門而去獨居屏事非親戚不得至其籬門妻齊太尉王儉女乆與別居遂無子卒親故迹其事行謚曰貞文先生又曰曇首卒文帝臨慟歎曰王詹事所疾不救國之衰也中書舎人}
  - {type: variant, offset: 2307, length: 5, content: 嵩兄顗既被, SBCK: 赴侍側曰王家欲衰賢者先殯上曰直是我家衰耳以預誅羡之等謀追封預寧縣侯謚曰文又曰王晏爲吏部尚書令王儉雖貴而踈晏旣領選權行臺閣與儉頗不平儉卒禮官欲依王遵謚爲文獻晏啓上曰遵乃得此謚但宋來不加素族出謂人曰平頭憲事巳行矣後魏書曰孝文太和十六年改謚宣尼曰大聖尼父告謚孔廟齊書曰長沙威王晃武帝嘗幸鍾山晃從駕以馬矟刺道邊枯蘖上令左右數人引之銀􅆞皆卷聚而矟不出乃令晃復馳馬抜之應手便去毎逺州獻駿馬上輙令晃於華林中調試之髙帝常曰此我家任城也武帝縁此意故謚曰威任城即魏任城王彰也梁書曰蕭子顯卒請謚手勑曰恃才傲物冝謚曰驕又曰徐勉卒武帝聞而流涕即車駕臨殯皇太后亦舉哀朝堂有司奏謚居敬行簡曰簡執心決斷曰肅因謚簡肅公又曰蕭機字智通位湘州刺史美姿容善吐納家旣多書􅀶學強記然而好弄尚力逺士子近小人爲州專意聚歛無政績頻􅀍案劾將葬有司請謚詔曰王好内怠政冝謚曰􅌆又曰蕭曄爲晉陵太守曄􅀄至郡屬旱躬自祈禱果􅀗甘潤郡多猛獸爲}
