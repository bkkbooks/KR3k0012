  - {type: variant, offset: 3621, length: 1, content: 隱, SBCK: 曰何以爲謚其妻曰以康爲謚昔先君甞賜之粟三十鍾先生辭而不受是其餘冨也君嘗欲授之以國相先生辭而弗爲是其餘貴也彼先生者甘天下之淡味安天下之卑位不戚戚於貧賤不汲汲於冨貴求仁而得仁求義而得義其謚爲康不亦冝乎崔駰章帝謚議曰臣聞號者功之表謚者行之迹據徳録功各當其實孝經曰天地明察神明章矣唐書數堯之德曰平章百姓言天之常德也詩曰追琢其章金玉其相亹亹文王綱紀四方又曰倬彼雲漢爲章於天喻文王聖徳有金玉之質猶雲漢之在天也舉表拆義四方德附矣易曰先天而天弗違後天而奉天時臣愚以冝上尊号曰章唐獨􅀌及謚吕諲曰肅嚴郢駮曰國家故事宰臣之謚有二字以彰善旌徳焉夫以吕公文能無害武能禁暴貞則幹事忠則利人盛烈宏規不可備舉傳叙八元之德曰忠肅㳟懿􅀂以美謚擬於形容請曰忠肅及重議曰謚法在懲􅁖勸善不在字多必稱其大而畧其細故言文不言武言武不言文三代以下朴散禮壞乃有二字之謚非古也其源生於衰周漢興簫何張良霍去病霍光俱以文武大畧佐漢致太平其事業不一謂一文不足以紀其善於是有文成景􅁊成之謚雖黷禮甚矣然猶褒不失人唐興叅用周􅁗之制以魏徴爲文貞簫瑀爲貞􅄶其杜如晦封彛陳叔逹温彦慱岑文夲唐休璟魏知古崔日用並當時赫赫以功名居宰相者謚不過一字不聞子孫佐吏有以字火稱屈由此言之二字不必爲褒一字不必爲貶􅀂褒貶果在乎字數則是堯舜禹湯文武成康不如周威烈愼靖也齊桓晉文不如趙武靈魏安釐也杜如晦王珪以下或成或明或懿或憲不如蕭瑀之貞􅄶也然肅者威德克就之名以諲之從政威能閑邪德可濟衆故以肅易名而忠在其中矣亦猶隨㑹寗俞之不稱文豈必因而重之然後爲美魏晉巳來賈許之籌筭賈逵之忠莊張旣之政能程普之智勇顧雍之宻重王渾之噐量劉恢之鑒裁􅁃翼之志畧彼八君子者方之東平冝無慙德死之日並謚曰肅當代不以爲貶何嘗徴一字二字以爲之升降乎諱周禮曰小史掌􅀖國之志奠繫丗辨昭穆􅀂有事則詔王之忌諱志謂記也先王死爲忌名爲諱禮曰禮不諱嫌名二名不偏諱逮事父母則諱王父母不逮事父母則不諱王父母逺不及也謂㓜孤不及識父母不至於祖名也孝子聞名心瞿諱之由心也此謂庶人也適士以廣事祖雖不建父母猶諱祖也大夫之所有公諱避君諱也詩書不諱臨文不諱廟中不諱謂有事於髙祖則不諱曽祖以下尊無二也大夫之諱雖質君之前臣不諱也臣於夫人之家恩逺也質獨對也婦諱不不出門婦親近於宮中言避之耳大功小功不諱入境而問禁入國而問俗入}
