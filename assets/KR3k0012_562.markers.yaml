  - {type: variant, offset: 2514, length: 3, content: 檀弓記, SBCK: 謚者何謂也謚之爲言引也引列行之跡也所以進勸威德使上務禮節死乃謚之詩云靡不有􅀄鮮克有終始終不能􅀂一故據其終後可知也今丗所以臨葬而謚之何因衆㑹欲顯􅀭之也謚或一言或兩言何文者一言爲謚質者兩言爲謚故湯死後稱成湯是明二言爲謚也謚七十二品禮謚法}
