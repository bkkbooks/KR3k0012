  - {type: variant, offset: 2392, length: 0, content: '', WYG: 廟齊書曰長沙威王晃武帝嘗幸鍾山晃從駕以馬矟刺道邊枯蘖上令左右數人引之銀纒皆卷聚而矟不出乃令晃復馳馬拔之應手便去毎逺州獻駿馬上輙令晃於華林中調試之髙帝嘗曰此我家任城也武帝縁此意故諡曰威任城即魏任城王彰也梁書曰蕭}
  - {type: variant, offset: 2393, length: 0, content: '', WYG: 顯卒請諡手勅曰恃才傲物宜諡曰驕又曰徐勉卒武帝聞而流涕即車駕臨殯皇太后亦舉哀朝堂}
