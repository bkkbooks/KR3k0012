  - {type: variant, offset: 3350, length: 140, content: 雖世有冠冕而性險害邑里患之林宗遭母憂淑來弔之而鉅鹿孫咸直亦至咸直以林宗賢而受惡人弔心怪之不進而去林宗遽追而謝曰賈子厚誠凶德然洗心同善仲尼不逆互鄉故許其進也淑聞之改過自厲終成善士又林宗有母喪徐稚往弔置生芻一束於廬前而去林宗曰此必南州徐孺子也詩不云乎生芻一束其人如玉吾無德以堪之裴楷別, SBCK: 荀氏家}
