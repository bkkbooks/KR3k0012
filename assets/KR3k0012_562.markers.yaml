  - {type: variant, offset: 2780, length: 389, content: 倍情忘其所受淮南子曰北塞上之人有喜遊者其馬無故亡入胡中人皆弔之其父曰此何知乃不為福居數月其馬將胡駿馬而歸人皆賀之其父曰此何知乃不為禍家富良馬其子好騎隨馬而折髀人皆弔之其父曰此何知乃不為福居一年胡夷大出丁壯者控弦而戰塞上之人死者十九此獨以跛之故子父相保符子曰陶之富者朱公喪其中子鄰人往弔之朱公方擁膝蹲踞捧頭而笑鄰人曰聞有喪將唁子之哀朱公曰生不致哀死而唁何鄰人之不通也說苑曰孫叔敖為楚令尹一國吏民皆來賀有老父衣麤衣冠白冠後來弔曰身已貴而驕人者民去之位已高檀權者君惡之祿已尊厚而不知足者患處之叔敖再拜敬受命願聞餘教父曰位已高意益下官益高而心益小祿已厚而慎不敢取君謹守此三者足以治楚矣世說曰顧彥先性好琴及喪家人常以琴置靈床上張季鷹往哭顧不勝其慟徑上床鼓琴作數曲意撫琴曰彥先頗復賞此不因又慟哭下執孝子手而去賀循喪服要記曰始弔朝玄端之服也皮弁絰素弁而加環絰也始死而往朝服者主人未變賓未可以變, SBCK: ''}
