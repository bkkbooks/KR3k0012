  - {type: variant, offset: 2391, length: 0, content: '', WYG: 蕭􅀈音􅎮素為諸暨令到縣十日掛衣冠於縣門而去獨居屏事非親戚不得至其籬門妻即齊太尉王儉女乆與别居遂無子卒親故迹其事行諡曰貞文先生又曰王曇首卒文帝臨慟嘆曰王詹事􅀁疾不救國之衰也中書舍人周赴侍側曰王家欲衰賢者先殞上曰直是我家衰耳以預誅羡之等謀追封預寕縣侯諡曰文又曰王晏為吏部尚書令王儉雖貴而䟽晏既令典選權行臺閣與儉頗不平儉卒禮官欲依王遵諡為文獻晏啓上曰遵乃得此諡但宋来不加素族出謂人曰平頭憲事已行矣後魏書曰孝文太和十六年改諡宣尼曰大聖尼父告諡}
