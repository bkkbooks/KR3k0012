  - {type: variant, offset: 693, length: 1295, content: 忽有一青牛從河中出人驚走太尉何公時為中尉將軍有勇力走逆牛見公走還河公以左手挽牛足右手持斧斫牛頭而殺之此青牛者萬年之木也嵩高記云山有大松或千歲其精變為青牛蜀王本紀曰秦惠王欲伐蜀乃刻五石牛置金其後蜀人見之以為牛能大便金蜀王以為然即發卒千人使五丁力士柂牛成道致三枚於成都秦道得石牛力也後遣丞相張儀等隨石牛道伐蜀也楊龍驤洛陽記曰石牛在城西石虎當衰石牛夜喚聲聞三十里事奏虎虎遣人打落牛兩耳尾以鐵釘釘四腳今具存劉道真錢塘記曰明聖湖有金牛嘗有見者神化莫測遂以名湖涼州異物志曰有水牛育於河中鬱林異物志曰周留者其實水牛蒼毛豕身角若擔矛衛護其犢與虎為讎又曰周留牛毛青大腹銳頭青尾其狀似豬齊地記曰東萊牛島上嘗以五月海牛產乳海牛形似牛而無角騂色虎聲爪牙亦如虎腳似鼉魚尾似鮎魚尾長尺餘其皮甚軟可供百用牛見人奔入水以杖擊鼻則得之史苓武昌郡記曰武昌牛崗古老相傳云有金牛出此今半已崩破坑大數十丈牛因躍出踐崗邊石遺跡尚在常璩華陽國志曰牛飲水者昔程鄭於此飲牛江為之竭因以為名劉欣期交州記曰九真居風山夷人有一嫗向田見金牛出食斫得鼻鎖長丈餘後人往往見牛夜出光曜數十里也盛弘之荊州記曰鷰尾洲南有龍寵二洲二洲之間舊云多異魚而投罟揮網輒便桂絕有水客沉而視之見有石牛二頭常為網害故網絕焉酈道元注水經曰陽城東八十里有牧牛山下有九十九泉即滄河之上源也耆舊云山下本有百泉競發有一神牛駭身自山而降下飲泉竭故山得其名裴氏廣州記曰有石牛每旱殺牛以血和泥泥石牛背既畢則雨洗牛背泥盡方止顧微廣州記曰陽縣里民有一兒年十五六牧牛牛忽舐此兒隨所䑛處肉悉白淨而甚快遂聽牛日日䑛之兒俄而病死其家葬兒殺此牛以供賓客凡食此牛肉者男女二十餘人悉變為虎笁法真登羅山䟽曰增成縣南有烈清洲洲南又有牛潭漁人見金牛常出水盤石上義熙中縣民張安釣此潭於石上躡得金鏁大如指長數十尋尋之不已俄有物從水中引之力不能禁以刀斫斷唯得數尺遂致大富後義興周靈分亦好釣嘗見此牛寢伏石上旁有金鎖往掩之得二丈許遂以財雄為南江都尉祖台之志怪曰茍晞為兗州鎮去京師五百里有貢晞珍異食者欲貽都邑親貴慮經信宿之間不復鮮美募有牛能日行數百里者當厚賞之有人進一牛云此一日行千里晞乃命具丁車善馭書䟽發遣旦發日中到京師取荅書還至一更始竟便達晞以其駿快筋骨必將有異遂殺而觀之亦無靈異唯見雙筋如小竹大自頭挾脊著肉裏故外不覺也又曰陶太尉微時喪當葬家貧親自營作塼有一班牸牛載塼已致忽然失去便自尋覔忽於道中逢一老翁問云君欲何所覓太尉具答更舉手指云向於山崗上見一牛眠山圩中必是君牛此牛所眠處便好作墓安墳當之致之極貴小復不當位極人臣世為方嶽矣又指一山云此山亦好但不如向耳亦當世出刺史也言訖便不復見太尉墓之皆如其言劉敬叔異苑曰余以義熙十三年為長沙景王驃騎參軍在西州得一黃牛時將貨之便晝夜銜草不食流淚瘦瘠又曰即墨有古冢或發之有金牛塞埏門不可移動犯之則殉也異物志曰合浦牛如橐駞案項上有特骨大如覆斗足揵疾其行如馬日行三百里列仙傳曰陽都女者市上酤酒家女也生而眉連耳細而長眾以為異皆言此天人也會犢子牽一黃犢來過都女悅之遂留相奉侍都女隨犢子出取桃一宿而反郭季產集異記曰兗州人舡行忽見水上有浮鎖牽取得數十許丈乃得一白牛與常牛無異而形甚光鮮可愛人知是神物, SBCK: ''}
