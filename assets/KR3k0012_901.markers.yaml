  - {type: variant, offset: 76, length: 0, content: '', WYG: 乃三軍陸遇粮運艱難謀臣停算武夫吟歎爾乃長鳴上黨忼慨應官﨑嶇千里荷囊致飱用棲大勲力世不刋斯實爾之功也音隨時興晨夜不黙仰契𤣥像俯叶漏刻應更長鳴毫分不却雖挈壺著稱未足比德斯復爾之智也若乃六合昏晦三辰幽㝠猶憶天時用不應聲斯爾之鳴也青脊絳身長頰廣額脩尾後垂巨耳雙礫斯又爾之形也嘉麥既熟實須精麵負磨迴衡迅若轉電惠我衆庶神祇獲薦斯又爾之能也爾}
