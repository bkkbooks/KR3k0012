  - {type: variant, offset: 315, length: 377, content: 諸豪帥有來從之者卓乃為殺耕牛與之共宴樂皇甫謐高士傳曰民有牛暴管寧田者寧為牽著涼處自飲食還牛主主得牛大慚先賢行狀曰王烈字彥老通識達人時國中有盜牛者牛主得之盜者曰我邂逅迷惑從今已後將改過子既已赦宥幸無使王烈知之人有以告烈烈以布一端遺之間年中行路老父擔重有人代擔行數十里欲至家置之而去問姓名不以告老父復行失劍於路有人行而遇之欲置而去懼後人得之遂守之至暮劍主還見之即前擔人也老父攬其袂曰子前代吾擔不得姓名今子復守吾劍未若子之仁者請告吾姓名吾將以告王烈乃語之而去老父以告烈烈曰世有仁人吾未之見使人推之乃昔時盜牛人也廣州先賢傳曰羅威字德仁南海番禺人鄰家牛數入食其禾既不可逐又為斷芻多著牛家門中不令人知數數如此牛主驚怪不知為誰陰廣求乃覺是威自後更相約率檢犢不敢復侵威田玄中記曰大月支及西胡有牛名曰反牛今日割取其肉三四斤明日其肉已後創即愈也又曰萬歲樹精為青牛漠桓嘗出遊河, SBCK: ''}
