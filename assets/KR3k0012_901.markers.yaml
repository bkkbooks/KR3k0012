  - {type: variant, offset: 77, length: 1, content: 老, krp: 濟師旅之勲而加之以衆能是用遣中大夫廬丘加廬尓使銜勒大鴻臚班脚大將軍宫亭侯以楊州之廬江江州之廬陵呉國之桐廬冷浦之朱盧封爾爲中驢}
  - {type: variant, offset: 79, length: 1, content: 從, WYG: 騾廣志云騾北方或曰罔説文曰騾驢父焉母也崔豹古今注曰驢為牡馬為牝即生騾馬為牡驢為牝即生騰􅀢史記曰大將軍衞青圍匈奴薄暮乘六騾壮騎可數百冐圍去追之不及漢書曰髙昌性難伏乃作歌曰驢非驢馬非馬言髙昌似騾也三國典畧曰齊楊浦之嘗乘騾逰於公卿畧無慚色又曰侯莫陳悦既敗其子弟及麾下數十騎遁走至牽屯山不知所趣乃棄馬山谷乘騾而去唐書曰呉元濟叛其將有董重質者守洄與其部下乘騾即戰號騾子都最為勁悍官軍恒警備之吕氏春秋曰趙簡子有兩白騾而甚愛之陽城胥渠處廣門之官夜欵門而謁曰主君之臣胥有疾醫教之曰得白騾肝病則止不得則死謁者入通董安于御側愠曰嘻胥渠也欺君請即刑焉簡子曰夫殺人以活畜不亦不仁乎殺畜以活人不亦仁乎於是召庖人殺白騾取其肝以與陽城胥渠無幾何趙興兵而攻翟廣門之左七百人右七百人皆先登而獲甲首人主胡可以不好士抱朴子曰世不信騾乃驢馬所生云各自有種况乎仙者難知之事哉魯女生别傳曰李少君死後百餘日後人有見少君在河}
