  - {type: variant, offset: 10, length: 2, content: 堯讓, krp: 烏桓國有驢無牛後漢書曰薊子訓漢末入市投主人家停其驢忽死時夏月蛆從驢口中出主人見之白訓訓曰無苦遂徃驢邊舉杖驢忽走起又曰永平中更用驢輦歲省億萬計全活徒士數千人又曰戴良字叔鸞其母喜驢鳴常學之以娯樂晉書曰王濟卒將葬時賢無不畢至孫楚雅敬濟而後來哭之甚悲客莫不垂涕哭畢向靈牀曰卿嘗好我作驢鳴我爲卿作之體似聲真賔客皆笑楚頋曰諸君不死而令王濟死乎丗說曰王仲宣好驢鳴旣葬魏文帝臨其喪頋語同遊曰王好驢鳴可各作一聲以送之赴客皆作驢鳴呉志曰諸葛恪父瑾長面似驢孫權大㑹群臣使人牽一驢入長檢其面題曰諸葛子瑜也恪對跪乞請筆益兩字續其下曰之驢舉坐欣笑以驢賜恪晉陽春秋曰晉文帝親阮籍恒與譚戯任其所欲不迫以職事籍從容嘗言曰平生曽遊東平樂其士風願得爲東平太守文帝大恱即從其意籍便騎驢徑到郡至皆壞府舎諸壁鄣使内外相望然籍教令清整常留十餘曰便乗驢去又曰胡威字伯虎父質爲荆州威自京都省之家貧無車馬僮僕威自駈驢單行拜見告歸每至客舎自放驢取樵㸑食畢復隨侣而進晉書曰石苞旣定夀春以威惠服物淮南監軍王環輕苞素微又聞童謡曰官中大馬幾作驢大石壓之不得舒因是宻表苞與呉人交通又曰王導諸葛恢曰人言王葛不言葛王恢曰人言驢馬不言馬驢豈驢勝馬也沈約宋書曰後廢帝昱於耀靈殿上飬驢數十又曰吏部尚書庾仲文荀萬秋嘗詣仲文逢一客姓夏侯主人問有好牛不言無問有好馬不又言無正有佳驢耳仲文便荅云甚是所欲客出門遂與相問索之齊書曰劉祥傳才慠物常謂一驢曰汝弩力如汝人才俱爲令僕矣又曰謝超宗爲人仗才使酒齊髙帝問以北方事超宗對失儀出爲南郡王中軍司馬人或問曰聞有朝命定是何府荅曰不知是司馬爲復是司驢旣是驢府正應是司驢爲有司所奏以怨望免後魏書曰元坦慠很凶麁安豊王延明每切責之曰昔宋有東海王禕志性凡劣人號曰驢王我熟觀汝所作亦恐不免驢當時聞者號爲驢王三國典略曰東魏静帝遷都鄴尚書郎巳下盡令乗驢又曰齊蕭慤爲太子洗馬慤字仁祖常患腰痛昡不堪馳馬齊主令乗驢以從見者笑之北史曰公孫䡄拜尚書賜爵郡公出爲武牢鎮將𥘉太武將北征發驢以運粮使䡄部調雍州䡄令驢主皆加絹一百疋乃與受之百姓語曰驢無弱負絹自壯衆共嗤之又曰後魏車駕徃征蠕蠕司馬楚之與濟隂公盧中山等督運以繼大軍時鎭北將軍封沓亡入蠕蠕說令擊之以絶運蠕蠕乃潜遣覘楚之軍截驢耳而去有告失驢耳者楚之曰必覘賊截之爲驗耳賊將至矣乃伐栁爲城水灌令凍城立而賊至不可攻逼乃走散太武聞而嘉之唐書曰郭英乂鎮劒南取女人令乗驢擊毬以寳鈿爲驢鞌賞賜巨萬以爲笑樂風俗通曰靈帝於宫中西園駕四白驢躬自操轡駈馳周旋以爲大樂於是公卿貴戚轉相倣至乗軿以爲騎從價與馬齊又曰凢人相罵曰死驢醜惡之稱也董卓陵虐王室執政皆如死驢漢志曰靈帝駕四驢親自操轡驢者服重征逺上下山谷野人之所用耳何有帝王君子而驂駕之乎天意若曰國且大亂賢愚倒植凡執政者皆如驢焉金樓子云漢靈帝飬驢數百頭常自騎之駈馳遍京師有時駕四驢入市符子曰有驢仙者享五百嵗負乗而不輟歴無定主大驛於}
