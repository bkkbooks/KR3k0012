  - {type: variant, offset: 140, length: 4, content: 帝拜少翁, SBCK: 后􅀄稱周恐下心不安乃令人自舉供奉官正貟外多置裏行拾遺􅀘闕御史至有車載㪷量之詠有御史臺令史將入室值裏行御史數人聚立門内令吏不下驢衝過其間諸御史大怒將杖之令史云今日之過實在此驢乞先數之然後受罰御史許之謂驢曰汝􅇊藝可知精神極鈍何物驢畜敢於御史裏行於是羞􅎼而止楚辭曰􅂹垂兩耳中阪蹉􅋸蹇驢服駕無用日多又曰駕蹇驢而無䇿又何路之能極臧彦吊驢文曰爰有竒人西州之馳驅者體質強直禀性沉難聦敏寛詳髙音逺暢真驢氏之名駒也宋􅀽淑俳諧文曰驢山公九􅃬曰􅀂乃三軍陸邁粮運艱難謀臣停筭武夫吟歎尓乃長鳴上黨忼􅁣應官﨑嶇千里荷囊致飱用捷大勲万丗不刋斯實爾之功也音隨時興晨夜不黙仰契􅀇象俯叶漏刻應更長鳴毫分不却雖挈壷著稱未足比德斯復爾之智也若乃六合昏晦三辰幽􅁳猶憶天時用不應聲斯又爾之鳴也青脊綘身長頰廣額脩尾後垂巨耳􅀟礫斯又爾之形也嘉麥旣熟寔湏精麺􅀒磨廻衡迅若轉電惠我衆庶神祇獲薦斯又爾之能也爾有濟師旅之勲而加之以衆能是用遣中大夫廬丘加廬尓使銜勒大鴻臚班脚大將軍宫亭侯以楊州之廬江江州之廬陵呉國之桐廬冷浦之朱盧封爾爲中驢公騾廣志云騾北方或曰罔􅀃文曰騾驢父馬母也崔豹古今注曰驢}
