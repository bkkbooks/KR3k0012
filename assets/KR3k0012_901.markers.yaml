  - {type: variant, offset: 76, length: 0, content: '', krp: 乃三軍陸邁粮運艱難謀臣停筭武夫吟歎尓乃長鳴上黨忼慨應官﨑嶇千里荷囊致飱用捷大勲万丗不刋斯實爾之功也音隨時興晨夜不黙仰契玄象俯叶漏刻應更長鳴毫分不却雖挈壷著稱未足比德斯復爾之智也若乃六合昏晦三辰幽冥猶憶天時用不應聲斯又爾之鳴也青脊綘身長頰廣額脩尾後垂巨耳雙礫斯又爾之形也嘉麥旣熟寔湏精麺負磨廻衡迅若轉電惠我衆庶神祇獲薦斯又爾之能也爾}
  - {type: variant, offset: 77, length: 30, content: 老公從東來乘青牛薄板車者勿聽過關其日果見老公乘青牛車求度關吏, SBCK: 一胡道人知呪術乗驢作賈客於外國深山中行下有絶澗窅然無底忽有惡􅀑偷牽此道人驢下}
  - {type: variant, offset: 77, length: 1, content: 老, WYG: 濟師旅之勲而加之以衆能是用遣中大夫廬丘加廬使銜勒大鴻臚班脚大將軍宮亭侯以揚州之廬江江州之廬陵吳國之桐廬泠浦之朱廬封爾為中驢}
