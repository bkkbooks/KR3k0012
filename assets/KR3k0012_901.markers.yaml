  - {type: variant, offset: 2347, length: 294, content: 殷荊州於鵠穴逢一老公驅青牛形色怪異桓即以所乘馬易牛乘至零陵駃非常因思息駕飲牛牛逕入水不出桓遣人覘守經日絕跡也又曰元嘉中益州刺史吉翰遷為南徐州先於蜀中載一青牛每常自乘恒於目前養視翰遘疾多日牛亦不肯食及亡牛流涕滂沱吉氏喪未還都先遣驅牛向宅牛不肯行知其異即待喪喪既下舡便隨去又曰桓冲鎮江陵正會夕當烹牛牛忽孰視帳下都督甚久目中泣下都督呪之曰汝若能向我跪者當啟活也牛應聲而拜眾甚異之都督復謂曰汝若須活遍拜眾人者直往牛涕殞如雨遂拜不止值冲醉不得啟遂殺牛冲醉止得啟冲聞之歎息都督痛加鞭罰又曰護軍琅邪王華有一牛甚快常乘之齒已長華後夢牛語之曰衰老不復堪苦載載二人尚可過此必死華謂偶爾夢與三人同載還府此牛果死, SBCK: 鄧艾}
