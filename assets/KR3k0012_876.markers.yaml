  - {type: variant, offset: 676, length: 220, content: 客星左傳曰昭十年春王正月有星出于婺女客星也鄭裨竈言於子產曰七月戊子晉君將死今茲歲在顓頊之虛歲歲星也顓頊之虛謂玄枵姜氏任氏實守其地姜齊姓任薛姓齊二國守玄枵之地居其維首而有妖星焉告邑姜也客星玄枵之維首姜邑齊大公安晉唐叔之母星占婺女為既嫁之女織女為處女邑姜齊之翫嫁女妖星在婺女齊得歲故知禍歸邑姜邑姜晉之妣也天以七紀二十八宿面七戊子逢公以登星斯於是乎出逢公殷諸侯君齊地者逢公將死妖星出婺女時非歲星所在故齊自當禍而以戊子曰卒吾是以譏之至時晉平公卒漢書, SBCK: 又}
  - {type: variant, offset: 676, length: 9, content: 客星左傳曰昭十年春, WYG: 軍人皆散走}
