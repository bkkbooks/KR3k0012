  - {type: variant, offset: 3492, length: 0, content: '', SBCK: 三年又􅁀風折木發屋時符堅強盛又曰安帝元興􅀄夜大風雨大舡門飛落明年桓玄􅆲位沈約宋書曰前廢帝義符時正月朔朝􅁀風發殿前㑹席翻楊數十丈至五月帝廢爲榮陽王梁書曰昭明太子孫㨂簡文大寳二年八月爲侯景廢㨂時與妃張氏鋤菜而法駕至驚懼而泣昇輦及即位昇武徳殿備陳文物於庭有􅁀風自東來吹旌旗悉倒又有廻風從地踊起折竿翻飛華蓋經出端門不見陪列者驚駭時人知其不終十一月景廢㨂景乃􅆲立崔鴻十六國春秋曰南燕慕容超僣位祠南郊將登壇大風暴起天地晝昏行宫羽儀皆壞裂後超爲晉將劉􅁉所滅斬於建康市又曰慕容盛建平元年八月􅁀風抜闕前七大樹其月歩兵校尉馬}
  - {type: page-break, offset: 3492, content: '', id: KR3k0012_SBCK_876-8a}
  - {type: variant, offset: 3492, length: 0, content: '', WYG: 三年又暴風折木發屋時苻堅强盛又曰安帝元興初夜大風雨大航門飛落明年桓𤣥􅆲位沈約宋書曰前廢帝義符時正月朔朝暴風發殿前㑹席翻揚數十丈至五月帝廢爲榮陽王梁書曰昭明太子孫棟簡文大寳二年八月爲候景廢棟時與妃張氏鋤菜而法駕至驚懼而泣升輦及即位升武徳殿備陳文物於庭有暴風自東來吹旌旗悉倒又有廻風從地踊起折竿翻飛華蓋經出端門不見陪列者驚駭時人知其不終十一月景廢棟景乃􅆲立崔鴻十六國春秋曰南燕慕容超僭位祀南郊將登壇大風暴起天地晝昏行宫羽儀皆壊裂後超爲晉將劉裕所滅斬於建康市又曰慕容盛建平元年八月暴風㧞闕前大樹七其月歩兵校尉馬}
