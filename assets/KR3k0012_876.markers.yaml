  - {type: variant, offset: 1721, length: 363, content: 牽牛日月五星所從起曆數之元三正之始彗而出之改更之象也其後卒有王莽篡國之禍後漢書曰獻帝建安二十三年正月孛星晨見東方二十餘日夕出西方紀歷五車東并五諸侯文昌軒轅入太微指帝座占曰除舊布新之象續漢書天文志曰王莽地皇三年十一月有孛星干張東南行五日不見孛星者惡氣所生為亂兵又參然雲焉兵之類也故名之曰孛孛之為名猶有所傷害有所妨蔽或謂之彗星所以除穢而布新也張為周地星孛于張東南行即翼軫之分翼為楚楚地將有兵亂後一年正月光武起兵舂陵都雒居周地除穢布新之象也又曰孝明永平三年六月丁卯彗星出天舡北長二尺所稍北行百三十五日去天舡為水彗星出之為大水是歲伊雒水溢到津城門壞伊橋郡七縣三十二皆大水又曰永和六年二月丁巳彗星見東方長六七尺色青白西南指營室及墳墓營室者天子常官墳墓主死彗星起而向營室至墳墓不出五六年天下有大喪又曰光和元年八日彗星出亢池入天市中長數尺稍, WYG: 狀如疋練}
