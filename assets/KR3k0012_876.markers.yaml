  - {type: variant, offset: 656, length: 2, content: 綏和, krp: 東昏侯寳卷永元元年始安王遥光知政入城有飄風飄儀繖岀城外少日而反𬒳殺又曰崔惠景圍臺城有一五色幡風吹飛翔在雲中半日乃下衆見皆驚恠相謂曰幡者事當飜覆數曰恵景敗隋書曰梁武帝太清}
  - {type: variant, offset: 660, length: 15, content: 春熒惑守心丞相翟方進欲塞災異自, SBCK: 九月邵陵王綸岀頓丘下其日天色隂􅃤風塵蕭瑟咸以出軍不祥十一月綸至江遇風亟溺人馬多損又曰大寳元年邵陵携王綸出鎮南浦僣擬施幄帳無何風起吹投於江後爲侯景將任約所襲綸敗走保汝南爲魏將侯萬通所攻城䧟􅀍}
