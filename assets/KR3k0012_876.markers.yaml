  - {type: variant, offset: 1266, length: 442, content: 為五月夏數得天若火作其四國當之六物之占在宋衛陳鄭乎宋大辰之虛也陳大皞之虛也鄭祝融之虛也皆火房也星孛及漢漢水祥也衛顓頊之虛也故為帝丘其星為大水水火之壯也其以丙子若壬午作乎水火所以合也若火入而伏必以壬午不過其見之月鄭裨竈言於子產曰宋衛陳鄭將同日火若我用瓘斝玉瓚鄭必不火子產弗與後四國皆火春秋孔演圖曰海精死彗星出宋均注曰海精鯨魚彗星出則國樞橛春秋考異郵曰鯨魚死彗星合宋均注曰鯨魚陰物生於水今出而死是時有兵相殺之祥也故天應之以妖彗也春秋合誠圖曰赤彗火精如火曜長七尺孝經鉤命決曰周襄王不能事其母弟彗入斗亡其度孝經內記曰彗星北斗禍大起在三台臣害君在太微君害臣在天獄諸侯作禍彗行所指其國大惡四彗在月中者君有德天下欣心大豊盛爾雅曰彗星為攙楚緘切搶楚庚切河圖帝通紀曰彗星者天之旗河圖稽耀鉤曰五星散為五色之彗戰國策曰唐睢謂秦王曰專諸刺王僚彗星襲月史記曰秦始皇十五年彗星四見大者八十日長或竟天其後秦遂滅六王并中國外攘四夷死人如麻漢書曰建元六年彗星見淮南王心怪之以為上無太子天下有變諸侯並爭愈益治攻戰具遂謀反, WYG: 顗等}
