  - {type: variant, offset: 3475, length: 0, content: '', SBCK: 歩松栢衆木植巳成林至是悉枯死曜竟爲石勒所擒又曰劉曜末年與石季龍對軍不撫士衆專與嬖臣􅀶飲左右諌之以爲妖言斬之大風拔木昏霧四塞湏􅁷見擒又曰前凉張玄静四年六月大風震雷晦􅁳宫中雨水深四尺時宋混兄弟擅權玄静虚坐而巳後魏書曰孝文太和中安定王禎出爲湘州刺史至日暴風大雨凍死者數十是月禎發背死後宣武延昌三年章武王熈除湘州刺史七月入理其日大風雨凍死者二十餘人驢馬凍死數十熈聞祖父禎前事心甚惡之俄而舉兵反伏誅齊書曰後主天統年大風晝晦發屋抜木和士開譛趙王叡生坐死士開岀入宫掖胡太后幸之琅邪王儼矯詔殺士開於􅀯臺儼伏誅又曰後主末年安德王延宗鄴下宅􅀍風吹其㕔棟榱相連置外數百歩後主敗爲王二日􅀍擒入周賜死陳書曰陳文帝天嘉三年梁永嘉王將司空王琳與陳將侯禎對軍其日東西風吹琳舟艦琳軍大敗又曰天嘉六年大風西南吹靈臺候樓倒又曰後主至德年風吹朱雀門倒又禎明年大􅀨風自西北激濤水入石頭城時後主昏誅諌臣沈客卿明年陳亡又曰隋文帝開皇中宫都大風發屋抜木時獨狐皇后干預政事後宫多有濫死又楊素邪佞又曰開皇末泰州啇胡乗騾遇暴風飄上空數百}
