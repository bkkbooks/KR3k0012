  - {type: variant, offset: 4524, length: 464, content: 常十月祠之有赤氣出如降名為蚩尤旗獄漢河圖稽耀鉤曰填星散為獄漢春秋合誠圖曰獄漢主逐王獄漢填星精所為史記天官書曰獄漢星孟康曰青中赤下有三彗蹤橫亦鎮星之精一名咸漢也出正北北方之野星去地可六丈而赤數動察之中有青所出非其方其下有兵衡不利五殘河圖稽燿鉤曰鎮星散為五殘主奔亡春秋合誠圖曰五殘主出亡春秋考異郵曰五殘類辰星有角見則政在伯史記天官書曰五殘星出正東東方之野星狀類辰星去地可五六七丈所出非其方其下有兵衡不利山海經曰西王母是司天之五殘國皇河圖稽耀鉤曰歲星之精流為國皇主內難春秋考異郵曰國皇大而赤類南極見則兵起天下急宋極均注曰南老人星也續漢書天文志曰靈帝光和中國皇見東南角去地一二丈如炬火十餘日占曰國皇為內亂外兵喪其後黃巾張角何進袁紹董卓亂燔燒宮室遷西京格澤廣雅曰格澤妖氣史記天官書曰格澤星者如炎火之狀黃白起地而上下太上兗其見不種而穫不有土功必有大咎旬始河圖稽耀鉤曰填星散為旬始主招橫春秋合誠圖曰旬始主爭兵春秋考異郵曰旬始照其下必有滅主廣雅曰旬始妖氣也史記天官書曰旬始出於北斗旁狀如雄雞其色青黑象伏鼈楚辭遠遊集曰重陽入帝宮造句始而觀清都司馬, WYG: ''}
