  - {type: variant, offset: 3475, length: 0, content: '', WYG: 歩松栢衆木植已成林至是悉枯死曜竟爲石勒所擒又曰劉曜末年與石季龍對軍不撫士衆專與嬖臣博飲左右諫之以爲妖言斬之大風㧞木昏霧四塞須臾見擒又曰前凉張𤣥靚四年六月大風震雷晦冥宫中雨水深四尺時宋昆兄弟擅權𤣥靚虛坐而已後魏書曰孝文太和中安定王禎出爲相州刺史至日暴風大雨凍死者數十人是月禎發背死後宣武延昌三年章武王熈除相州刺史七月入治其日大風雨凍死者二十餘人驢馬凍死數十匹熈聞祖父楨前事心惡之俄而舉兵反伏誅北齊書曰後主天統年大風晝晦發屋拔木和士開譖趙郡王叡坐死士開出入宫掖胡太后幸之瑯瑘王儼矯詔殺士開於南臺儼伏誅又曰後主末年安徳王延宗鄴下宅被風吹其㕔棟榱相連置數百步外後主敗王亦被擒入周賜死陳書曰陳文帝天嘉三年梁永嘉王將司空王琳與陳將侯禎對軍其日東北風吹琳舟檻琳軍大敗又曰天嘉六年大風西南吹靈臺後樓倒又曰後主至徳年風吹朱雀門倒又明年大風自西北激濤水入石頭城時後主昏誅諫臣沈客卿明年大雨風又曰隋文帝開皇中東都大風發屋折木時獨孤皇后干預政事後宫多有濫死又楊素邪侫隂氣盛之象也又曰開皇末秦州商胡乘騾遇暴風飄上空數百}
