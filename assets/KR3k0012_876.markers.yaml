  - {type: variant, offset: 3851, length: 0, content: '', SBCK: 月雷震憲陵寢屋先是太后聽兄梁兾桓殺李固杜喬魏志曰魏明帝景􅀄中洛陽水橋同日俱震時勞役大起古今五行記曰吴孫權赤烏八年夏雷震宫門柱又擊南津橋至十三年廢太子和立子亮又曰晉惠帝永康􅀄六月震崇陽陵標西南五百歩標破時賈后䧟害大臣終見殺晉中興書徴祥說曰元興三年永安王皇后至自巴防將設威儀入宫天大雷震人馬多死沈約宋書曰元嘉}
  - {type: page-break, offset: 3851, content: '', id: KR3k0012_SBCK_876-10a}
  - {type: variant, offset: 3851, length: 0, content: '', WYG: 月雷震憲陵寢屋先是太后聽兄梁冀擅殺李固杜喬魏志曰魏明帝景初中洛陽水橋同日俱震時勞役大起古今五行記曰吳孫權赤烏八年夏雷震宫門柱又撃南津橋至十三年廢太子和立子亮又曰晉惠帝永康初六月震崇陽陵標西南五百步標破時賈后䧟害大臣終見殺晉中興書徴祥説曰元興三年永安皇后至自巴防將設威儀入宫天大雷震人馬多死沈約宋書曰元嘉}
  - {type: page-break, offset: 3851, content: '', id: KR3k0012_WYG_876-16a, image: WYG0900/WYG0900-0647c.png}
  - {type: page-break, offset: 3851, content: '', id: KR3k0012_WYG_876-16b, image: WYG0900/WYG0900-0647d.png}
  - {type: variant, offset: 3851, length: 0, content: '', krp: 月雷震憲陵寢屋先是太后聽兄梁兾桓殺李固杜喬魏志曰魏明帝景𥘉中洛陽水橋同日俱震時勞役大起古今五行記曰吴孫權赤烏八年夏雷震宫門柱又擊南津橋至十三年廢太子和立子亮又曰晉惠帝永康𥘉六月震崇陽陵標西南五百歩標破時賈后䧟害大臣終見殺晉中興書徴祥說曰元興三年永安王皇后至自巴防將設威儀入宫天大雷震人馬多死沈約宋書曰元嘉}
  - {type: variant, offset: 3853, length: 1, content: 世, SBCK: 年震􅀄寜陵標四破至地十七年廢大將軍彭城王義康後魏書曰太祖天賜六年震天安殿東序帝惡之令佐校以衝車攻殿東西兩序屋毀之唐書曰太宗貞觀十一年四月震乾元殿前槐樹冬雷京房易妖占曰天冬雷地必震教令撓則冬雷民飢漢書曰昭帝五年十一月大雷震十二月丞相王訢薨後漢書曰安帝永􅀄六年十月郡國大雷延光四年十月郡國凢三十雷時鄧太后專政帝不親萬機晉書曰吴孫亮建興􅀄十二月大風雷亮見廢又曰􅉖帝建興􅀄十一月大雨雷震劉向以雷二月岀八月入於此月雷電者陽不閉藏失節之異是時九州幅裂至四年帝降劉曜害之晉中興書徵祥􅀃曰太興元年十一月京都雷震凢未應雷而雷皆恒燠也又曰升平二年十一月雷時皇太后臨朝政舒緩也崔鴻十六國春秋後趙録曰建武十三年十二月雷大雨霖石虎問佛圖澄此何災也澄曰}
  - {type: page-break, offset: 3853, content: '', id: KR3k0012_SBCK_876-10b}
  - {type: variant, offset: 3853, length: 1, content: 世, WYG: 年震初寧陵標四破至地十七年廢大將軍彭城王義康後魏書曰太祖天賜六年震天安殿東序帝惡之令左校以衝車攻殿東西兩序屋毁之唐書曰太宗貞觀十四年四月雷震乾元殿前槐樹冬雷京房易妖占曰天冬雷地必震教令撓則冬雷民饑漢書曰昭帝五年十一月大雷震十二月丞相王訢薨後漢書曰安帝永初六年十月郡國火雷延光四年十月郡國凡三十雷時鄧太后專政帝不親萬機晉書曰吳孫亮建興初十二月大風雷亮見廢又曰愍帝建興初十一月大雨雷震劉向以雷二月出八月入今此月雷電者陽不閉藏失節之異是時九州幅裂至四年帝降劉曜害之晉中興書徴祥説曰太興元年十一月京都雷震時未應雷而恒燠也又曰昇平二年十一月雷時皇太后朝舒緩也崔鴻十六國春秋後趙録曰建武十三年十二月雷大雨霖石虎問佛圖澄此何災也澄曰}
