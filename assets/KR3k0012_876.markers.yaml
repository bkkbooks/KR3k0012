  - {type: variant, offset: 1467, length: 1975, content: 之祥也故天應之以妖彗也春秋合誠圖曰赤彗火精如火曜長七尺孝經鉤命決曰周襄王不能事其母弟彗入斗亡其度孝經內記曰彗星北斗禍大起在三台臣害君在太微君害臣在天獄諸侯作禍彗行所指其國大惡四彗在月中者君有德天下欣心大豊盛爾雅曰彗星為攙楚緘切搶楚庚切河圖帝通紀曰彗星者天之旗河圖稽耀鉤曰五星散為五色之彗戰國策曰唐睢謂秦王曰專諸刺王僚彗星襲月史記曰秦始皇十五年彗星四見大者八十日長或竟天其後秦遂滅六王并中國外攘四夷死人如麻漢書曰建元六年彗星見淮南王心怪之以為上無太子天下有變諸侯並爭愈益治攻戰具遂謀反又曰哀帝建平二年二月彗星出牽牛日月五星所從起曆數之元三正之始彗而出之改更之象也其後卒有王莽篡國之禍後漢書曰獻帝建安二十三年正月孛星晨見東方二十餘日夕出西方紀歷五車東并五諸侯文昌軒轅入太微指帝座占曰除舊布新之象續漢書天文志曰王莽地皇三年十一月有孛星干張東南行五日不見孛星者惡氣所生為亂兵又參然雲焉兵之類也故名之曰孛孛之為名猶有所傷害有所妨蔽或謂之彗星所以除穢而布新也張為周地星孛于張東南行即翼軫之分翼為楚楚地將有兵亂後一年正月光武起兵舂陵都雒居周地除穢布新之象也又曰孝明永平三年六月丁卯彗星出天舡北長二尺所稍北行百三十五日去天舡為水彗星出之為大水是歲伊雒水溢到津城門壞伊橋郡七縣三十二皆大水又曰永和六年二月丁巳彗星見東方長六七尺色青白西南指營室及墳墓營室者天子常官墳墓主死彗星起而向營室至墳墓不出五六年天下有大喪又曰光和元年八日彗星出亢池入天市中長數尺稍長五六丈赤色經歷十餘宿八十餘日乃消於天苑中彗除天市將徙帝將易都至初平元年獻帝遷都長安又曰孝獻初平九年十月有星孛于東井與鬼魁入軒轅太微十一年正月有孛于斗首在斗中尾貫紫宮及北辰占曰彗掃太微紫宮人主易位其後魏文帝受禪十二月辛卯有星孛于鶉尾荊州分也時荊州牧劉表專據荊州從事周群以為荊州牧將死而失士明年秋表卒以小子琮以代曹公將攻荊州琮懼舉軍詣公降晏子春秋曰景公謂晏子曰彗星向吾國我是以悲晏子曰居穿池欲深廣為臺欲高大誅戮如仇讎孛又將至彗星容可拒乎懼緩刑罰三十七日彗去尉繚子曰昔楚將軍子心與齊人戰未合夜彗星出柄在齊所在勝不可擊子心曰彗星何知明日與齊人戰大破之淮南子曰鯨魚死而彗星出天狗占曰狗者守禦之類天狗所降以戒守禦也出入無時下則有伏屍流血其流星墮地有聲野雉皆鳴或群狗皆吠或流散化為雲一曰流星有聲如雷下地中一曰無雲而雷一曰星赤白有光下地為狗狗無足一曰如火光炎衡天其上甕下地如數頃田一曰大流星其有光見人面墜無音有足一曰星狀如奔星有聲望之如火一曰其色白其熒熒如遺火狀皆曰天狗天狗所下之處萬人伏屍狗食血所下之邑大兵起國易政人相食千里流血四方相射破軍殺將兵喪並起國破滅已河圖稽耀鉤曰太白散為天狗主候兵洪範五行傳曰七國之兵戰於梁地故天狗先降梁壘見以其象也狗者守禦之類也所降以惑守禦也史記曰秦孝公十二年星晝墜有聲至十七年秦韓大戰擒晉惠王又天官書曰天狗狀大如奔星有聲其止地類狗地望之如火光炎炎衝天其下圓如數頃田處上甕見則有黃色千里破軍殺將洪範五行傳同漢書天文志曰孝昭元年二月乙酉祥雲如狗赤色星三枚夾漢書西行占曰太白散為天狗為卒起卒起見禍無時四月昌邑王賀行淫僻大將軍霍光白皇太后廢賀又曰成帝綏和元年四月日晡時天有星殷如雷聲有流星如缶長十餘丈皎然赤白從日下東南云或如盂或如雞子熠熠如雨下至地止郡國皆言星隕為王者失勢諸侯起伯之異其後王莽專政篡位又曰哀帝建平元年正月日出時有物著天白廣如一疋布長四丈餘西南行聲如雷一刻止名曰天狗又曰後漢光武建武十一年春有流星大如日從太微出入北斗魁中第六星色白傍有小星射者十餘枚後有聲如雷頃止斗魁主殺伐是年吳漢臧宮破公孫述於成都十二年春有大星如缶出柳西南行入孤將滅時分為十餘叚如遺火狀須臾有聲殷殷如雷柳為周狐為秦蜀是年使大司馬吳漢從洛陽發南陽卒泝江而上擊蜀白帝公孫述數萬人又曰中元元年冬有大流星從西南向東北行有聲如雷其年中郎將竇固將西征又曰順帝永和三年有流星大如斗從西北東行長八九尺赤黃有聲隆隆如雷是時大將軍梁商與常侍張逵達曹騰孟賁等爭權矯制收騰順帝寤逵等奔走或自刺或解貂蟬投草中逃亡之應漢獻帝春秋曰初平四年六月流星起織女東南行天市中虵行有尾長七八丈色赤照地又流星如斛長六七丈小者六七枚隨之光照地又流星西北行有聲如雷望之如火又照地是曰天狗晉書曰惠帝永興元年七月流星有聲二年又有星隕有聲後二年懷帝愍帝蒙塵劉元海石勒攻掠遂亡中夏又曰懷帝永嘉元年有大流星如日自南流于東北小者如斗相隨天盡赤有聲如雷是年汳桑煞東燕王騰明年劉元海僣號又曰穆帝永和十年流星大如斗色赤黃出織女沒造父有聲如雷其年慕容雋據臨漳諸將奔散又曰海西公大和四年十月有大流星西下有聲如雷明年廣漢妖賊李弘反自稱聖王又慕容暐剋鄴盡有地明年桓溫廢帝又曰孝武太元十三年天狗東北下有聲占曰此交戰流血是後慕容垂翟遼姚萇符登慕容永並阻兵爭強宋書曰後廢帝元徽五年四月星隕于東南有聲如雷, SBCK: ''}
