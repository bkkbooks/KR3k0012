  - {type: variant, offset: 3481, length: 0, content: '', SBCK: 下人騾俱碎時晉王廣矯詐取媚謀危太子勇勇竟廢死立廣爲太子淮南子曰人主之精通}
  - {type: variant, offset: 3481, length: 7, content: 于河聲聞九百餘, WYG: 下人騾俱碎時晉王廣矯詐取媚謀危太子勇勇竟廢死立廣爲太子淮南子曰人主之精通於天故誅暴則多飄風暴風京房易妖占曰獄吏暴害人臣專政暴風折木又曰暴風折柱大邑憂暴風折木次草上屋且有急令獨禄風入宫人主死飄數相從入殿門有㓙疾憂以此亡飄留君門一日一夜不去亂兵在門獨禄風者回轉風也京房别對災異曰狂風發何人君政教無法爲下所逆則致狂風發泄其救也修政教聘賢士風消矣又曰人君賊罰良善政教無常使命數變則致暴風折木發屋鳴瓦或害殺人其救也修舊典任忠臣思過自改則風災消六韜曰人主好田獵畢弋則嵗多大風飄牛馬發屋㧞木民人飛揚數十}
