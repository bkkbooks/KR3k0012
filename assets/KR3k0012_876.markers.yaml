  - {type: variant, offset: 146, length: 5, content: 鎮星失度何, SBCK: 春秋潜潭巴曰疾風㧞木䜛臣恣忠臣辱史記曰殷紂末年大風飄牛馬壊屋拔樹飛颺數十里周滅之又曰􅁗始皇二十八年渡淮至衡山浮江至湘遇大風􅀶士云堯女舜妻葬於此始皇怒使刑}
  - {type: page-break, offset: 146, content: '', id: KR3k0012_SBCK_876-1b}
  - {type: variant, offset: 146, length: 94, content: 鎮星失度何人君內無仁義外多華飾則鎮星失度其救也治社稷修明堂近方直之人此災自消也辰星失度何人君內無仁義外多華飭則辰星失度其救也明刑慎罰審法必中尚書考靈耀曰白經天水決江白大白也金為水宗故多水也, WYG: ''}
  - {type: variant, offset: 146, length: 5, content: 鎮星失度何, krp: 春秋潜潭巴曰疾風㧞木䜛臣恣忠臣辱史記曰殷紂末年大風飄牛馬壊屋拔樹飛颺數十里周滅之又曰秦始皇二十八年渡淮至衡山浮江至湘遇大風博士云堯女舜妻葬於此始皇怒使刑}
  - {type: punctuation, offset: 151, content: ？, id: KR3k0012_CHANT_876-bkkpn37}
  - {type: 'tls:seg', offset: 151, content: '', id: KR3k0012_CHANT_876-1a.37}
  - {type: variant, offset: 152, length: 7, content: 君內無仁義外多, SBCK: 三千人伐湘山樹明年東遊至􅀶浪沙中爲盗所驚乃令天下大索焉又曰項羽背約都彭城漢祖伐之圍漢三重大風從西北起折木發屋楚軍大亂漢書曰吕后崩後吕産執北軍朱虚侯劉章入宫衛帝見産廷中遂擊産走大風起從官莫敢􅋐章逐産殺之又曰昭帝時燕王旦都葪大風拔宫樹十六吹壞城樓王反伏誅又曰濟北王興居反始舉兵太風從東吹其旌旗飛上墮城西井中馬皆悲鳴不進李廓切諌王不聽俄而兵敗自殺又曰平帝元始四年冬大風吹長安城門屋瓦盡又曰王莽天鳯年大風抜樹飛北闕城門屋瓦縁邊大飢人相食又曰地皇四年大風毀王路其年司徒王㝷司空王邑守昆陽光武起兵南陽至昆陽攻之大風雷屋瓦皆飛􅀨下如注滍川盛溢㝷邑乗死人而渡王㝷見殺軍人皆散走王邑還長安莽敗俱殺之後漢書曰安帝時京師大風拔南郊梓樹九十六後海賊張伯路略九郡魏畧曰正始元年啇風大起數十日發屋拔樹動太極殿東閤正大㑹風又甚傾盃按曹爽將誅之徴母丘儉反景王率衆征之晉書曰吴孫權太元􅀄大風江海湧溢平地水深八尺拔髙陵樹二千株動吴城兩門瓦飛落是時賦役繁重明年權死又曰孫休永安元年十二月孫綝岀屯武昌衛士施朔告綝欲反綝聞之大懼是夜大風四轉五復發屋折木揚沙石綝益恐明日臈㑹稱疾休強起之不得巳乃至㑹張布丁奉自左右縳之綝叩頭請爲奴不許乃斬之又曰孫皓末年狂􅁀丞相陸抗與大司馬大丁奉謀欲廢皓太史令陳苗奏乆隂不雨風氣廻逆將有隂謀皓􅀷驚懼抗遂寢其事又曰晉武帝咸寜三年八月大風拔木􅁀寒且氷其年吴將孫慎入江夏太康末京都風發屋拔木又曰惠帝永康中六月飄風吹賈謐朝衣飛數百丈明年謐誅其年十一月京都大風發屋折木十二月􅉖懷太子幽于金墉又曰永康元年四月張}
