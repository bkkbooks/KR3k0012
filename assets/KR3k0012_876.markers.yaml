  - {type: variant, offset: 1078, length: 388, content: 消占曰客星入天市為貴人喪謝承後漢書曰吳郡周敞師事京房為趙顯所譖謂敞曰吾死後三十日客星必出天市即吾無辜也死後果如言孛左傳曰文十四年有星孛入于北斗周內史叔服曰不出七年宋齊晉之君皆將死亂又曰昭十七年冬有星孛于大辰西及漢申須曰彗所以除舊布新也天事象今除於火火出必布焉諸候其有火災乎梓慎曰往年吾見之是其徵也火出而見今茲火出而章必火入而伏其居火也久矣其與不然乎火出於夏為三月於商為四月於周為五月夏數得天若火作其四國當之六物之占在宋衛陳鄭乎宋大辰之虛也陳大皞之虛也鄭祝融之虛也皆火房也星孛及漢漢水祥也衛顓頊之虛也故為帝丘其星為大水水火之壯也其以丙子若壬午作乎水火所以合也若火入而伏必以壬午不過其見之月鄭裨竈言於子產曰宋衛陳鄭將同日火若我用瓘斝玉瓚鄭必不火子產弗與後四國皆火春秋孔演圖曰海精死彗星出宋均注曰海精鯨魚彗星出則國樞橛春秋考異郵曰鯨魚死彗星合宋均注曰鯨魚陰物生於水今出而死是時有兵相, SBCK: 景􅀍}
