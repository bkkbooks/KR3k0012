  - {type: variant, offset: 3462, length: 10, content: 如尾足形自北極西南流, SBCK: 風抜樹發屋四月爲季壽所殺又曰蜀李壽漢興三年二月大風􅁀􅀨震端門至六年壽死子􅀔立三年爲晉將桓温所滅又曰前趙劉曜葬其父母費用億計發掘古􅃁􅁀骸原野􅂘聲盈衢大霖雨震曜父墓門屋大風飄發其父寢堂于外垣}
