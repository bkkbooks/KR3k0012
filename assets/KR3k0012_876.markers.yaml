  - {type: variant, offset: 897, length: 0, content: '', WYG: 安帝時京師大風㧞南郊梓樹九十六後海賊張伯路畧九郡魏畧曰正始}
  - {type: page-break, offset: 897, content: '', id: KR3k0012_WYG_876-3b, image: WYG0900/WYG0900-0641b.png}
  - {type: variant, offset: 898, length: 0, content: '', WYG: 年商風大起數十日發屋㧞樹動太極殿東閣正㑹又大風雨傾盆按曹爽將誅之徴毌丘儉反景王率衆征之晉書曰吳孫權太元初大風江海湧溢平地水深八尺拔髙陵樹二千株吳城兩門飛落是時賦役繁重明年權死又曰孫休永安元年十二月孫綝出屯武昌衛士施朔告綝欲反聞之大懼是夜大風四轉五復發屋折木揚沙石綝益恐明日臈㑹稱疾休强起之不得已乃至㑹張布丁奉自左右縛之綝叩頭請爲奴不許乃斬之又曰孫皓末年狂暴丞相陸抗與大司馬丁奉謀欲廢皓太史令陳苗奏乆隂不雨風氣廻逆將有隂謀皓深驚懼抗遂寢其事又曰晉武}
  - {type: page-break, offset: 898, content: '', id: KR3k0012_WYG_876-4a, image: WYG0900/WYG0900-0641c.png}
  - {type: variant, offset: 899, length: 1, content: 初, SBCK: 承聖三年帝觀講武于津陽門風􅀨惣集普天昏暗旗幟飄亂帝趍駕而廻無復次序還宫至城風􅀨隨息竊驚俄爲魏軍所執送岳陽殺之又曰}
  - {type: variant, offset: 899, length: 2, content: 初元, WYG: 咸寧三年八月大風㧞木暴寒且氷其年吳將孫慎入江夏太康末京都風大㧞木又曰惠帝永康中六月飄風吹賈謐朝衣飛數百尺明年謐誅其年十一月京都大風發屋折木十二月愍懐太子幽於金墉又曰永康}
