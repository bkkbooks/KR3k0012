  - {type: variant, offset: 3053, length: 0, content: '', WYG: 昇明二年飄風起建康縣吹帛一疋入雲風止下於御道上俄宋授禪其君爲匹夫之象齊書曰明帝建武末大風㧞東宫門外楊樹齊徳行東木位其衰乎至東昏侯立狂亂被害又曰東昏侯寳卷}
