  - {type: variant, offset: 3450, length: 4, content: 後趙石勒, SBCK: 北燕馮跋太平二十一年二月飄風入征南大將軍上黨公姚昭宅至于司徒中山公宅而散上黨公家人問太史閔尚曰風者天之號令所以吹塵去穢除姦慝之禍至二十二年跋弟弘􅆲立以姚昭爲大司馬昭貪暴其子肇諌曰大人不聞飄風之怪昭不納明年馮弘殺昭并諸子姪四十餘人又曰前􅁗符生壽光元年長安大風發屋抜樹行人顚頓官中奔擾或稱賊至門晝閉五日乃止生推告賊者殺之刳出其心左光禄大夫強平諌曰元正盛曉日有蝕之正陽神朔風昏大起願陛下務養元元生大怒鑿其頂而殺之又曰符堅}
