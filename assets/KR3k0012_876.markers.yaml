  - {type: variant, offset: 3855, length: 1, content: 亡, WYG: 爲我耳至戊子而葬霹靂春秋合誠圖曰霹靂擊於宫殿者妃后爭政春秋潛潭巴曰霹靂擊宫失君精池下有謀起春秋繁露曰王者言不從則金不從革而秋多霹靂霹靂者金氣}
