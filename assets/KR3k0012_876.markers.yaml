  - {type: variant, offset: 656, length: 2, content: 綏和, SBCK: 東昏侯寳卷永元元年始安王遥光知政入城有飄風飄儀繖岀城外少日而反􅀍殺又曰崔惠景圍臺城有一五色幡風吹飛翔在雲中半日乃下衆見皆驚恠相謂曰幡者事當飜覆數曰恵景敗隋書曰梁武帝太清}
