  - {type: variant, offset: 4095, length: 1086, content: 太熙元年有枉矢西南流懷帝永嘉四年劉聰嘉平三年星起牽牛委曲虵形入紫宮其光照地其年帝為劉聰所害後三年聰死國亡又曰愍帝建興三年枉矢自文昌北流至斗東如一疋布綘虵行有手足因變為雲氣如人象二臂一足至五年北平人吳𧙓聚眾千人立沙門為天子四年帝降劉曜又曰元帝大興三年枉矢出虛危沒翼大寧二年王敦殺譙王承及甘卓又曰穆帝昇平二年枉矢自東南流於西北其長半天時所在擁兵政非己出隋書曰齊昏侯永光三年春枉矢晝見西方長十餘丈其年梁武舉兵東昏遇害又曰隋煬帝大業十二年枉失二出北斗魁委曲虵形注於南斗後二年宇文化及於江都僣號許王世充於東都殺將恭帝僣號鄭蚩尤旗河圖稽燿鉤曰熒惑散為蚩尤旗主惑亂河圖提劉子曰帝將怒蚩尤出乎四野史記天官書曰蚩尤之旗類彗而後曲象旗見則王者征伐四方魏志曰嘉平四年六持節奉法駕迎高貴鄉公元城是歲白氣經天大將軍司馬景王問王蕭其故肅曰此蚩尤之旗也東南其有亂乎君若修己以安百姓則天下樂安者歸德倡亂者先亡矣明年鎮東將軍母丘儉楊州刺史文欽果反皇覽冢墓記曰蚩尤冢在東郡壽張縣闕鄉城中高七丈民常十月祠之有赤氣出如降名為蚩尤旗獄漢河圖稽耀鉤曰填星散為獄漢春秋合誠圖曰獄漢主逐王獄漢填星精所為史記天官書曰獄漢星孟康曰青中赤下有三彗蹤橫亦鎮星之精一名咸漢也出正北北方之野星去地可六丈而赤數動察之中有青所出非其方其下有兵衡不利五殘河圖稽燿鉤曰鎮星散為五殘主奔亡春秋合誠圖曰五殘主出亡春秋考異郵曰五殘類辰星有角見則政在伯史記天官書曰五殘星出正東東方之野星狀類辰星去地可五六七丈所出非其方其下有兵衡不利山海經曰西王母是司天之五殘國皇河圖稽耀鉤曰歲星之精流為國皇主內難春秋考異郵曰國皇大而赤類南極見則兵起天下急宋極均注曰南老人星也續漢書天文志曰靈帝光和中國皇見東南角去地一二丈如炬火十餘日占曰國皇為內亂外兵喪其後黃巾張角何進袁紹董卓亂燔燒宮室遷西京格澤廣雅曰格澤妖氣史記天官書曰格澤星者如炎火之狀黃白起地而上下太上兗其見不種而穫不有土功必有大咎旬始河圖稽耀鉤曰填星散為旬始主招橫春秋合誠圖曰旬始主爭兵春秋考異郵曰旬始照其下必有滅主廣雅曰旬始妖氣也史記天官書曰旬始出於北斗旁狀如雄雞其色青黑象伏鼈楚辭遠遊集曰重陽入帝宮造句始而觀清都司馬相如大人賦曰垂旬始以為慘孟康曰旬始氣如雄雞在北斗傍懸於葆卜以為十二旒慘音所銜切營頭占曰流星晝行亡君之戒一曰流星晝名營頭營頭而下流血滂滂一曰有雲如懷山墮所謂營頭之星其所墮覆軍流血續漢書天文志曰王莽地皇四年遣王尋王邑將兵至昆陽圍城數重晝有雲氣如懷山墮軍上軍人皆厭所謂營頭之星也占曰營頭之所墮其下覆軍流血三千里是時光武將兵數千人赴救昆陽擊二公會天大風飛屋瓦雨如注水二公亂敗死者數萬人晉書曰惠帝, SBCK: ''}
