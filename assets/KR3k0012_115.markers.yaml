  - {type: variant, offset: 2474, length: 0, content: '', SBCK: 百寮稱賀三月太和公主至京師百官班于章敬寺迎謁仍令所司告憲宗穆宗二室四月昭義節度使劉從諌率三軍以從諌姪稹爲兵馬留後上表請授節􅃏尋遣中使賫詔潞府令稹護從諌之䘮歸洛陽稹拒朝旨尋以成德軍節度使王元逵魏􅀶節度使何􅀪敬並以本官充招討澤潞使四年三月以道士趙歸真爲左右街道門教授先生時帝志學神仙師歸真歸真乗寵每排毀釋氏言非中國之教蠧耗生靈盡冝除去帝頗信之七月王元逵奏邢州刺史裴問別將髙元武以城降洺州刺史王釗磁州刺史安玉皆以城降何􅀪敬山東三州平潞州大將郭􅁩張谷陳掦廷遣人至王宰軍請殺劉稹以自贖王宰以聞乃詔石雄率軍三千入潞州郭􅁩斬劉稹首以迎雄澤潞五州平八月王宰傳稹首與大將郭􅁩等一百五十人露布獻於京師上御安福門}
  - {type: page-break, offset: 2474, content: '', id: KR3k0012_SBCK_115-7a}
  - {type: variant, offset: 2474, length: 0, content: '', WYG: 百寮稱賀三月太和公主至京師百官班於章敬寺迎謁仍令所司告憲宗穆宗二室四月昭義節度使劉從諫卒軍中以從諫姪稹為兵馬留後上表請授節度使遣中使賫詔路府令稹䕶從諫之喪歸洛陽稹拒朝㫖尋以成徳軍節度使王元逵魏博節度使何𢎞敬並以本官充招討澤潞使四年三月以道士趙歸真為左右街道門教授先生時帝志學神仙師歸真歸真乗寵毎排毁釋氏言非中國之教蠧耗生靈宜盡除去帝頗信之七月王元逵奏邢州刺史裴問别將髙元武以城降潞州刺史王釗磁州刺史安玉皆以城降何𢎞敬山東三州平潞州大將郭誼張谷陳湯廷遣人至王宰軍請殺劉稹以自贖王宰以聞乃詔雄率軍三千入潞州郭誼斬劉稹首以迎雄澤潞五州平八月王宰傳稹首與大將郭誼等一百五十露布獻扵京師上御安福門}
