  - {type: variant, offset: 448, length: 248, content: 宜令興元嚴礪東川李康掎音巳角應接神策行營節度使高崇文神策兵馬使李元弈率步騎之師與東州興元之師類會進討甲午高崇文由斜谷路李元弈由谷路俱會幹梓潼關辛卯群臣請聽政戊戍上謂宰臣曰前代帝王或怠於聽政或躬覽繁務其道何如杜黃裳對曰帝王之務在於修己簡易擇賢委任不宜怠肆安逸然事有綱領小大常務其遠者大者至如簿書獄訟百吏能否本非人主所自任也但擇人委任責其成效賞罰必信誰不盡心傳稱帝舜之德曰夫何為哉恭己正南面而已誠以能舉十六相去四凶也豈與勞神疲體自任耳目之主同年而語哉但人主常勢患在不能推誠人臣之弊患在不能自竭由是上疑, SBCK: ''}
