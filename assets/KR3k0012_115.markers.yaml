  - {type: variant, offset: 4576, length: 0, content: '', SBCK: 迎之或兾有少保理也朕每觀前史見秦皇漢武爲方士所惑常以之爲誡卿等位當論列職在諌司閱示來章􅀷納誠意仍謂崔愼由曰爲吾言於諌官雖少翁欒大復生不能相惑如聞軒轅生髙士欲與之一言耳十二年春正月羅浮山人軒轅集至京師上召入禁中謂曰先生遐壽而長生可致乎曰徹聲色去滋味哀樂如一德施周給自然與天地合德日月齊明何必別求長生耶留之月餘堅求還山十三年五月上不豫月餘不能視}
  - {type: variant, offset: 4576, length: 0, content: '', WYG: 迎之或冀有少保理也朕每觀前史見秦皇漢武為方士所惑常以之為誡卿等位當補闕職在諫司閲示來章深納誠意仍謂崔慎由曰為吾言於諫官雖少翁欒大復生不能相惑如聞軒轅生髙士欲與之一言耳十二年春正月羅浮山人軒轅集至京師上召入禁中謂曰先生遐壽而長生可致乎曰徹聲色去滋味哀樂如一徳施周給自然與天地合徳日月齊明何必别求長生耶畱之月餘堅求還山十三年五月上不豫月餘不能視}
