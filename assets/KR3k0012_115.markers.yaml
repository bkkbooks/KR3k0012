  - {type: variant, offset: 258, length: 0, content: '', SBCK: 左常侍崔􅀇亮及諌官等十四人伏奏玉陛北軍所告事請不於内中鞫問乞付法司帝曰吾謀於公卿矣卿等且退崔􅀇亮泣涕陳諌乆之帝改容勞之曰朕即與宰臣啇議􅀇亮等方退癸夘詔漳王庭湊可降爲巢縣公宋申錫開州司馬同正􅀄京師恟恟以宰相實聮親王謀逆三四日後方知誣搆人士側目於守澄鄭注故諌官號泣論之申錫方免其禍四年春正月乙未}
  - {type: variant, offset: 258, length: 0, content: '', WYG: 左侍崔𤣥亮及諫官王質等四十人伏奏玉階北軍所告事請不於内中鞫問乞付法司帝曰吾謀於公卿矣卿等且退崔𤣥亮泣涕陳諫久之帝改容勞之曰朕即與宰臣商議𤣥亮等方退癸卯詔漳王可降為巢縣公宋申錫開州司馬同正初京師恟恟以宰相實聨親王謀反三四日後方知誣搆人士側目於守澄鄭注諫官號泣論之申錫方免其禍六年春正月乙未}
