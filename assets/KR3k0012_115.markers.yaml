  - {type: variant, offset: 284, length: 6, content: 禮畢御丹鳳樓, SBCK: 遂宣詔}
  - {type: variant, offset: 284, length: 0, content: '', WYG: 遂宣詔大赦天下改元乙巳上御紫宸對宰臣李石奏曰陛下改元御殿人情大悦全放京兆一年租賦又停四節奏奉恩澤所該實當要切帝曰朕務行其實不欲崇長空文石曰赦書須内留一本陛下時看之又十道黜陟使發日更付與公事根本令向外與長吏詳擇施行方盡利害之要矣二年三月戊辰夜彗長八丈有餘西北行東指在張十四度壬申詔曰朕嗣守丕構對越上天􅐚恭寅畏於今一紀何嘗不宵衣念道昃食思術師周文之小心慕易乾之夕惕懼德不類貽列聖羞將欲俗致和平時無殃咎然誠未格物謫見於天仰愧三靈俯慚庶彚思獲攸濟浩無津涯昔宋景發言星因退舍魯僖納諫饑不害人取鑒往賢深惟自勵載軫在予之責宜降恤辜之恩式表殷憂冀荅昭誡天下死罪降從流流已下並釋放三年九月上以皇太子慢逰敗度欲廢之中丞狄兼謨垂涕切諫是夜移太子於少陽院殺太子宫人左右數十人十月皇太子薨於少陽院諡曰莊恪十一月乙卯夜彗孛東西竟天壬戌詔曰上天葢髙感應必由乎人事寰宇雖廣理亂盡繫乎君心從古以來必然之義朕嗣膺寳位十有三年常克己以處恭每推誠於衆庶將以導迎休應漸致緝熈期克荷於宗祧思保寧於華夏而德有所未至信有所未孚灾氣上騰天文謫見再周朞月重擾星躔當始復之時覩垂象之變兢懼惕厲若䧟泉谷是用舉成湯之六事念宋景之一言詳求遣咎之端采聽銷禳之術必有精理藴於衆情冀屈法以安人爰恤刑而厚下應犯死罪並降從流流已下遞降一等五年春正月戊寅上不康不受朝賀辛巳崩於大明宫之太和殿諡曰元聖昭獻皇帝廟號文宗葬章陵武宗昭肅皇帝唐書曰武宗昭肅皇帝諱炎穆宗第五子也母曰宣懿皇后韋氏元和九年六月十三日生扵東宫長慶元年三月封潁王本名瀍初文宗追悔莊恪太子殂不由道乃以敬宗子成王陳美為皇太子開成四年冬十月宣制未遑冊禮五年正月文宗暴疾宰相李珏樞密劉𢎞逸奉密㫖以皇太子監國兩軍中尉仇士良魚𢎞志矯詔迎潁王於十六宅曰朕自嬰疾疹有加無瘳懼不能躬總萬機日釐庶政稽于古訓謀及大臣用建親賢以貳神器親弟潁王瀍昔在藩邸與朕常同師訓動成儀矩性稟寛仁俾奉昌圗必諧人欲可立為太弟一應軍國政事便令權勾當百辟卿士中外庶臣宜竭乃心輔成予志成王陳美先立為皇太子以其年尚㓜冲未漸師資比日重難不遑冊命回踐藩邸式協至公可復封陳王四日文宗崩宣遺詔皇太弟宜扵柩前即皇帝位宰臣楊嗣復攝冡宰十四日受册扵正殿年二十七二月制穆宗妃韋氏追諡宣懿皇太后帝之母也上御正殿宣降徳音以開府右軍中尉仇士良封楚國公左軍中尉魚志𢎞為韓國公太常卿崔鄲户部尚書判度支崔珙並本官同中書門下平章事帝在藩邸時頗好道術脩攝之事是秋召道士趙歸真八十一人於禁中三殿脩金籙道場乃幸三殿於九天壇親受法籙左拾遺王哲上疏言王業之初不宜崇信異端疏奏不省㑹昌元年正月庚戌有事於南郊}
