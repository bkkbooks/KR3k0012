  - {type: variant, offset: 1200, length: 84, content: 癸巳群臣上尊號曰睿聖文武皇帝御宣政殿受冊禮畢御丹鳳樓大赦天下庚子涇原叚祐請修臨涇城在涇州北九十里扼犬戎之衝要詔從之四年秋七月御製前代君臣事跡十四篇書於六扇屏風是月出書屏, SBCK: ''}
  - {type: variant, offset: 1200, length: 3, content: 癸巳群, krp: 以宿師于野罷元㑹二月太原劉沔奏至大同軍遣石雄襲廻鶻牙帳大敗廻鶻於殺胡山其烏介可汗𬒳瘡而走已迎得太和公主至雲州是日御宣政殿百寮稱賀三月太和公主至京師百官班于章敬寺迎謁仍令所司告憲宗穆宗二室四月昭義節度使劉從諌率三軍以從諌姪稹爲兵馬留後上表請授節鉞尋遣中使賫詔潞府令稹護從諌之䘮歸洛陽稹拒朝旨尋以成德軍節度使王元逵魏博節度使何弘敬並以本官充招討澤潞使四年三月以道士趙歸真爲左右街道門教授先生時帝志學神仙師歸真歸真乗寵每排毀釋氏言非中國之教蠧耗生靈盡冝除去帝頗信之七月王元逵奏邢州刺史裴問別將髙元武以城降洺州刺史王釗磁州刺史安玉皆以城降何弘敬山東三州平潞州大將郭誼張谷陳掦廷遣人至王宰軍請殺劉稹以自贖王宰以聞乃詔石雄率軍三千入潞州郭誼斬劉稹首以迎雄澤潞五州平八月王宰傳稹首與大將郭誼等一百五十人露布獻於京師上御安福門受俘百寮樓前稱賀十月車駕幸鄠縣十一月幸雲陽五年正月宰}
