  - {type: variant, offset: 1740, length: 525, content: 月辛未上以久旱親於禁中祈雨是夜澍雨霑足六月景寅京師大風雨毀屋飄瓦人多壓死所在川瀆暴漲行人不通辛丑出宮人二百車任從所適以水災故也九年十月甲子制朕嗣膺寶位于茲十年每推至誠以御方夏庶以仁化臻於大和宵衣旰食意屬於此今淮西一道未達朝經擅自繼襲肆行寇掠將士等迫於受制非是本心思去三面之羅庶遵兩階之義宜以山南東道節度使嚴綬兼充申光蔡等州招撫使十年正月嚴綬帥師次蔡州界己亥制削奪吳元濟官爵六月鎮州節師度使王承宗遣盜夜伏於靖安坊刺宰相武元衡死之刺御史中丞裴度傷首而免十二年五月隨唐節度使李愬奏敗賊於吳房獲賊將李祐七月以裴度守門下侍郎同平章事充彰義軍節度申光蔡觀察處置等使仍充淮西宣慰使十月李愬率師入蔡州執吳元濟以獻淮西平十三年正月御含元殿受朝賀禮畢御丹鳳樓大赦天下七月詔削奪淄青節度使李師道官爵仍令宣武魏愽義成等五鎮之師分路進討十二月上謂宰臣曰人臣事君但力行善事自致公望何乃好樹朋黨朕甚惡之裴度對曰君子小人未有無徒者君子之徒則同心同德小人之徒是朋是黨上曰他人之言亦與卿等相似豈易辯之哉度曰君子小人觀其所行當自區別矣上曰凡好事口說則易躬行則難卿等既言之須行之勿空言說度等謝曰陛下處分可謂至矣臣等敢不激厲然天下之人從陛下所行不從陛下所言臣等亦願陛下每言之則行之上頗忻納十四, WYG: ''}
