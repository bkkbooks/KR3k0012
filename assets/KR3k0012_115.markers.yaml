  - {type: variant, offset: 1212, length: 0, content: '', krp: 章天神功神德明道皇帝辛亥有事於郊廟禮畢御承天門大赦天下秋七月庚子勑併省天下佛寺所拆寺四千六百餘所還俗僧尼二十六萬五百人收充兩稅戸拆招提蘭若四萬餘所收膏腴上田數千萬頃收奴婢爲兩稅戸十五萬人六年三月壬寅上不豫制改御名曰炎帝重方士頗服食修攝親授法籙至是藥躁喜怒失常旣篤旬日不能言宰相李德𥙿等請見不許中外莫知安否人情危懼是月二十三日宣遺詔以皇太叔光王柩前即位是日崩年三十三謚曰至道昭肅孝皇帝廟號武宗葬端陵宣宗獻文皇帝唐書曰宣宗獻文皇帝諱忱憲宗第十三子母曰孝明皇后鄭氏元和五年六月生於大明宫長慶元年三月封光王名怡㑹昌六年三月武宗疾篤宣遺詔立爲皇太叔權勾當軍國政事翌日即帝位改今名時年三十七帝外晦而内㓪嚴重寡言視瞻特異㓜時宫中以爲不惠十餘歳時遇重疾沉綴忽有光輝燭身蹶然而興正身拱揖如對臣寮乳媪以爲心疾穆宗往視之撫其背曰此吾家英物非心憊也賜以玉如意御馬金帶甞夢乗龍昇天言之於鄭太后乃曰此不冝人知母幸勿復言歴大和㑹昌朝愈事韜晦羣居游處未嘗有言文宗武宗幸十六宅宴集彊誘其言以爲戯劇謂之光叔武宗氣豪尤不爲禮及監國之日哀毀滿容接待羣寮决斷庻務人方見其隱德焉四月辛未釋服尊母鄭氏曰皇太后以兵部侍郎翰林學士承旨白敏中同中書門下平章事大中元年正月有事於郊廟禮畢御丹鳯門大赦改元帝雅好儒士留心貢舉有時微行人間採聽輿論以觀選士之得失每山池曲宴與學士詩什屬和公卿出鎮亦賦詩餞行凡對臣寮肅然拱揖鮮有輕易之言大臣或獻章䟽即燒香盥手受而覽之當時以大中之政有貞觀之風焉閏三月勑㑹昌季年併省寺宇雖云異方之教無損爲理之源中國之人乆行其道釐革過當事體未弘其靈山勝境天下州府應㑹昌五年四月所廢寺宇如有宿舊名僧復能修創一任住持所由不得禁止七月太子少保分司東都衛國公李德𥙿爲人所訟貶潮州司馬貟外置二年春正月宰相率文武百寮上徽號曰聖敬文思和武光孝}
