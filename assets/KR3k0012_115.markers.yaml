  - {type: variant, offset: 3111, length: 512, content: 之制猶服心喪夫遏密施禁蓋為齊人合樂內庭事將未可不聽十月鎮州王承元以所部四命請命以魏博節度等使田弘正為鎮州節度使以承元為滑州節度使長慶元年正月己亥朔上親薦獻太清宮太廟是日法駕赴南郊日抱珥宰臣賀於前辛丑祀昊天上帝於圓丘即日還宮御丹鳳樓大赦天下改元長慶內外文武及致仕官三品已上賜爵一級二月景子上觀親雜伎樂於麟德殿歡甚謂給事中丁公著曰比聞外間公卿士庶時為歡宴蓋時和民安甚慰予心公著對曰誠有此事然臣之愚見風俗如此亦不足嘉百司庶務漸恐勞煩聖慮上曰何至於是對曰夫賓宴之禮務達誠敬不繼以淫故詩人美樂且有儀璘異屢舞前代名士良辰宴聚或清談賦詩投蠹雅歌雖以盃酌獻酬不至於亂國家自天寶已後風俗奢靡宴席以諠譁沉湎為樂而居重位秉大權者優雜倨肆於公吏之間曾無愧恥公私相效漸以成俗由是物務多廢獨聖心求理安得不勞宸慮乎陛下宜頒訓令禁其過差則天下幸甚時上荒于酒樂公著因對諷之頗深嘉納三月幽州劉總請分割地土入朝公卿皆疑獨上推誠納之以宣武節度使張引靖為幽州節度使以總為鄆州節度使秋七月壬子群臣上尊號曰文武孝德皇帝上受冊於宣政殿禮畢御丹鳳樓大赦天下甲寅幽州監軍使奏軍亂囚節度使張弘靖於別館害判官韋雍張宗元崔仲卿鄭殞軍人取朱滔子洄為留後洄自以年老令軍人立其子克融為留後, krp: ''}
