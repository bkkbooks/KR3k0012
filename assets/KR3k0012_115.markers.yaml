  - {type: variant, offset: 4646, length: 0, content: '', WYG: 睿文明聖孝徳皇帝四年春正月庚午有事于圜丘禮畢御丹鳯門大赦五年四月南蠻冦邕管以秦州經畧使高駢率禁軍五千赴邕管會諸道之師禦之五月制曰朕以寡昧獲承高祖太宗之丕構六載於兹矣罔畋遊是娛罔聲色是縱罔刑戮是濫罔邪佞是惑蚤夜悚惕以憂以勤庶幾乎八表用康兆人以泰而西戎欵附北狄懐柔獨唯南蠻奸宄不率侵陷交阯突犯邊陲爰及嶲州亦用攘冦勞我士卒興吾甲兵騷動黎元役力飛輓每一軫念憫然疚懐顧惟生人罹此愁苦宜布自天之澤俾垂及物之仁如聞湖廣桂州是嶺路係口諸道兵馬綱運無不經過頓遞供承動多差配彫傷轉甚宜有特恩應澤桂兩道各賜錢三萬貫以助軍錢以充館驛息利本錢其江陵江西鄂州三道比於澤桂徭配稍簡宜令本道觀察使詳其間劇准此例與直本錢黎嶲等州因蠻冦殺傷宜令本道收拾埋瘞六年秋髙駢自海門進軍破蠻軍收復安南府自李琢失利交趾陷没十年蠻軍北冦邕界人不聊生至是方復故地七年十月安南都䕶高駢奏蠻冦悉平十一月御宣政殿大赦以復安南故地九年七月徐州赴桂林戍卒五百人官軍許佶趙可立殺其主將王仲甫以糧料判官龎勛爲都頭剽掠湘潭衡山兩縣有衆千人擅還本鎮九月甲午龎勛陷宿州知州判官焦璐奔歸于徐乙未龎勛陷徐州十年九月賊宿州守將張𤣥稔以城降有兵萬人馬舉率兵赴之龎勛聞之以其衆將攻𤣥稔𤣥稔賊之勁將也遂與舉合勢急圍徐州許佶登城拒守者三日佶敗出走稔收復徐州龎勛方來赴援聞城已破欲南趨濠州馬舉追及渙河擊敗之勛溺水而死蕭縣主將又斬許佶首來降徐冦悉平十一月南詔蠻驃信坦綽酋龍率衆二萬冦嶲州十二月勅荆南節度使杜崇禦之據司天奏有小孛星氣經厯分野恐有外夷兵水之患緣邉藩鎮最要隄防宜訓習師徒増築城堡凡闗制置以其事聞十一年八月同昌公主薨追贈衛國公主諡曰文懿主郭淑妃所生上尤鍾念悲惜異常以待詔韓宗紹等醫藥不効殺之收捕其親族三百餘人繫京兆府宰相劉瞻京兆尹温璋上疏論諫行法太過上怒十二年春正月宰相路巖率}
