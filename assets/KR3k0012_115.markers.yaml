  - {type: variant, offset: 836, length: 3, content: 造新曆, SBCK: 德至􅂎頭烽北俘掠雲朔北川詔劉􅃆出師守鴈門諸􅀜廻鶻首領屈武降幽王授左武衛將軍詔以廻鶻犯邊漸侵内地或攻或守於理何安令少師牛僧孺陳夷行與公卿集議可否以聞僧孺曰今百寮議􅃺以固守􅀜防俟其可擊則用兵宰相李徳􅁉議以廻鶻所恃者嗢没赤心耳今巳離叛其彊弱之勢可見戎人獷悍不頋}
