  - {type: variant, offset: 4307, length: 273, content: 翼家屬悉為王庭湊所害上惜其冤橫傷悼久之仍歎宰執非才縱姦臣跋扈翰林學士韋處厚奏曰理亂之本非有他術順人則理違人則亂陛下當食歎息恨無蕭曹今有一裴度尚不能用此馮唐所以感悟漢文雖有頗牧不能用也戊辰群臣入閤日高猶未坐有不任立而踣者諫議大夫李渤出次白宰相俄而始坐班退左拾遺劉棲楚極諫頭叩龍墀血流上為之動容景申賊張韶等百餘人至右銀臺門殺閽者揮兵大呼進至清思殿登御榻而食攻弓箭庫右神策軍兵馬使康藝全率兵入宮討平之是日上聞變急幸左軍丁酉上還宮群臣稱慶諫議大夫李渤以上輕易致盜言甚激切五月制以吏部侍郎李程戶部侍郎竇易直並同中書門下平章事十二月廻鶻吐蕃奚契丹遣使朝貢寶曆, krp: 昭咸通}
