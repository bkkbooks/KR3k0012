  - {type: variant, offset: 252, length: 0, content: '', SBCK: 和巳來制敕參詳刪定訖送中書門下議定聞奏甲戍以旱放繫囚七月李同捷除兖海不受詔結幽鎮謀叛徐州王智興請全軍討之帝自撰集尚書中君臣事迹命􅀞工圖冩於太液亭朝夕觀覽三年五月巳夘栢􅂄斬李同捷於將陵滄景平丁亥御興安樓受滄州所獻俘九月敕兩軍諸司内官不得着紗縠綾羅等衣服帝性儉素不喜華侈駙馬韋處仁載夾羅巾帝謂之曰比慕卿門地清素以之選尚如此巾服從他諸戚爲之唯卿非所冝也十一月甲午帝親祀昊天上帝於南郊禮畢御丹鳯門大赦禁止竒貢四方不得以雜様織成非常之物爲獻十二月蠻䧟卭雅等州戊午以右領軍衛大將軍董重質充神䇿西川行營都知兵馬使蠻䧟成都府入梓州西郭門下營又詔促諸鎮兵救援兩川乙巳郭釗奏蠻退遣使賜蠻帥蒙􅓕㒹國信四年四月詔曰儉以足用令出唯行著在前經斯爲理本朕自臨四海􅉖元元之乆困日􅉴忘食宵興疚懷雖絶文繡之飾尚愧茅茨之儉示喻卿士形于詔條如聞積習流􅁦餘風未革車服第室相髙以華靡之制資用貨寳固啓於貪冒之源有司不禁侈俗滋扇盖朕教條之未敷使兆庻昧於恥尚也其何以足用行令臻于致理歟永念慙歎迨兹申敕自今内外班列職位之士各務素朴􅀪兹國風有僣差尤甚者御史糾上主者宣示知朕意焉上承長慶寳暦奔靡之風銳意懲革躬行儉素以率厲之五}
  - {type: page-break, offset: 252, content: '', id: KR3k0012_SBCK_115-2a}
  - {type: variant, offset: 252, length: 0, content: '', WYG: 和以來制勅叅詳刪定訖送中書門下議定聞奏甲戌以旱放繫囚七月李同㨗除兗海不受詔結幽鎮謀叛徐州王智興請全軍討之帝自撰集尚書中君臣事迹命畫工圗冩於太液亭朝夕觀覽三年五月己卯柏耆斬李同㨗扵將陵滄景平丁亥御興安樓受滄州所獻俘九月命諸司宦官不得著紗縠綾羅等衣裳帝性儉素不喜奢侈駙馬韋處仁著夾羅巾帝謂之曰朕慕卿門地清潔以之選尚如此巾服聽其他貴戚為之卿不湏爾十一月甲子帝親祀昊天上帝於南郊禮畢御丹鳯樓大赦天下禁止竒貢四方不得以雜様織成非常之物為獻十二月南詔蠻䧟卭巂等州戊午以右領軍衛大將軍董重質充神䇿西川行營都知兵馬使蠻䧟成都府入梓州西郭門下營又詔促諸鎮兵馬救援兩川乙巳郭釗奏蠻抽退遣使賜蠻帥蒙􅓕巔國信四年四月詔曰儉以足用令出唯行著在前經斯為理本朕自臨四海愍元元之困日昃忘食宵興疚懐雖絶文繡之飾尚愧茅茨之儉示諭卿士形於詔條朕聞積習流弊餘風未革車服第室相尚以華靡之制資用貨寳因唘乎貪冐之源有司不禁侈俗滋扇葢朕教導之未敷使兆庶昧於恥尚也其何以足用行令臻於上理與永念慚嘆迨兹申勅自今内外班列職位之士各務朴素𢎞兹國化有僣差甚者御史糾上主者宣示知朕意焉上承長慶寳厯奢靡之風鋭意懲革躬行儉素以率厲之五}
