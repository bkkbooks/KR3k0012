  - {type: variant, offset: 4577, length: 3, content: 貢寶曆, SBCK: 八月宣遺詔立鄆王爲皇太子勾當軍國事是日崩于大明宫聖壽五十謚曰聖武獻文孝皇帝廟號宣宗葬貞陵懿宗恭惠皇帝唐書曰㦤宗恭恵皇帝諱漼宣宗長子母曰元昭皇太后晁氏大和七年十一月生於藩邸㑹昌六年十月封鄆王本名温大中十三年八月遺詔立爲皇太子􅁥國改今名十三日即帝位時年二十七帝姿貌瑰傑有異稠人藩邸時甞經重疾郭淑妃侍醫藥見黄龍出入於卧内旣間妃以異告帝曰愼勿復言又甞大雪數尺而帝寢室之上獨無人皆異之宣宗製㤗邊陲樂曲詞有海嶽晏咸通之句又大中末京城小兒疊布漬水紐之向日謂之拔暈帝果以鄆王即大位以咸通爲年號九月釋服追尊母后晁氏爲太后謚曰元昭咸通}
  - {type: page-break, offset: 4577, content: '', id: KR3k0012_SBCK_115-10b}
  - {type: variant, offset: 4577, length: 3, content: 貢寶曆, WYG: 八月宣遺詔立鄆王爲皇太子勾當軍國事是日崩于大明宫聖壽五十諡曰聖武獻文孝皇帝廟號宣宗𦵏貞陵懿宗恭惠皇帝唐書曰懿宗恭惠皇帝諱漼宣宗長子母曰元昭皇太后晁氏大和七年十一月生於藩邸㑹昌六年十月封鄆王本名温大中十三年八月遺詔立爲皇太子監國改今名十三日即帝位時年二十七帝姿貎魁傑有異稠人藩邸時嘗經重疾郭淑妃侍醫藥見黄龍出入於卧内既間妃以異告帝曰愼勿復言又嘗大雪數尺而帝寢室之上獨無人皆異之宣宗製秦邉陲樂曲詞有海嶽晏咸通之句又大中末京城小兒疊布漬水紐之向日謂之投暈帝果以鄆王即大位以咸通爲年號九月釋服追尊母后晁氏爲太后諡曰元昭咸通}
