  - {type: variant, offset: 776, length: 0, content: '', SBCK: 不康不受朝賀辛巳崩于大明宫之太和殿謚曰元聖昭獻皇帝廟號文宗葬章陵武宗昭肅皇帝唐書曰武宗昭肅皇帝諱炎穆宗第五子母曰宣懿皇后韋氏元和九年六月十三日生於東宫長慶元年三月封潁王本名􅈆􅀄文宗追悔莊恪太子殂不由道乃以敬宗子陳王成美爲皇太子開成四年冬十月宣制未遑􅁽禮五年正月文宗􅁀疾宰相李􅑻樞宻劉􅀪季奉宻旨以皇太子􅁥國兩軍中尉仇士良魚􅀪志矯詔迎頴王於十六宅曰朕自嬰疾􅐄有加無瘳懼不能躬揔萬機日􅁵庻政稽于古訓謀及大臣用建}
  - {type: page-break, offset: 776, content: '', id: KR3k0012_SBCK_115-5b}
  - {type: variant, offset: 776, length: 0, content: '', krp: 不康不受朝賀辛巳崩于大明宫之太和殿謚曰元聖昭獻皇帝廟號文宗葬章陵武宗昭肅皇帝唐書曰武宗昭肅皇帝諱炎穆宗第五子母曰宣懿皇后韋氏元和九年六月十三日生於東宫長慶元年三月封潁王本名瀍𥘉文宗追悔莊恪太子殂不由道乃以敬宗子陳王成美爲皇太子開成四年冬十月宣制未遑冊禮五年正月文宗暴疾宰相李與樞宻劉弘季奉宻旨以皇太子監國兩軍中尉仇士良魚弘志矯詔迎頴王於十六宅曰朕自嬰疾疹有加無瘳懼不能躬揔萬機日釐庻政稽于古訓謀及大臣用建}
  - {type: variant, offset: 777, length: 2, content: 朝獻, SBCK: 賢以貳神器親弟潁王􅈆昔在藩邸與朕嘗同師訓動成儀矩性禀寛仁俾奉昌圗必諧人欲可立爲皇}
  - {type: variant, offset: 777, length: 2, content: 朝獻, krp: 賢以貳神器親弟潁王瀍昔在藩邸與朕嘗同師訓動成儀矩性禀寛仁俾奉昌圗必諧人欲可立爲皇}
  - {type: variant, offset: 780, length: 2, content: 清宮, SBCK: 弟應軍國政事便令權勾當百辟卿士中外庻臣冝竭乃心輔成子志陳王成美先立爲皇太子以其年尚冲㓜未漸師資比日重難不遑􅁽命廻踐諸邸式恊至公可復封陳王四日文宗崩宣遺詔皇太弟冝於柩前即皇帝位宰相楊嗣復攝冢宰十四日受􅁽於正殿年二十七二月制穆宗妃韋氏追謚宣懿皇太后帝之母也上御正殿降徳音以開府右軍中尉仇士良封楚國公右軍中尉魚志􅀪爲韓國公太常卿崔鄲户部尚書判度支崔珙並本官同中書門下平章事帝在藩邸時頗好道術修攝之事是秋召道士趙歸眞八十一人入禁中於三殿修金籙道埸乃幸三殿於九天壇親受法籙右拾遺王哲上䟽言王業之􅀄不冝崇信過當䟽奏不省㑹昌元年正月庚戍有事于郊禮畢}
