  - {type: variant, offset: 4668, length: 0, content: '', SBCK: 五月庚申勑愼恤刑獄大易格言語曰如得其情則哀矜而勿喜而獄吏苛刻務在舞文守臣因循罕聞視事以此械繫之輩溢於狴牢追捕之徒繁於簡牘實傷和氣用致沴氛况時属熇蒸化先茂育並赦罪戾式順生成應}
