  - {type: variant, offset: 4646, length: 0, content: '', SBCK: 睿文明聖孝德皇帝四年春正月庚午有事于圎丘禮畢御丹鳯門大赦五年四月南蠻㓂邕管以􅁗州經略使髙駢率禁軍五千赴邕管㑹諸道之師禦之五月制朕以寡昧獲承髙祖太宗之丕搆六載於兹矣罔畋遊是娱罔聲色是縱罔刑戮是濫罔邪侫是惑蚤夜悚惕以憂以勤庻幾乎八表用康兆人以㤗而西戎􅅃附北狄懷柔獨唯南蠻姧宄不率侵䧟交阯突犯㓪寧爰及嶲州亦用攘㓂勞我士卒興吾甲兵騷動􅀺元役力飛輓每一軫念憫然疚懷顧惟生人罹此愁苦冝布自天之澤俾垂及物之仁如聞湖南桂州是嶺路係口諸道兵馬綱運無不經過頓遞供承動多差配凋傷轉甚冝有特恩應潭桂兩路各賜錢三萬貫以助軍錢以充館驛息利本錢其江陵江西鄂州三道比於潭桂徭配稍簡冝令本道觀察使詳其間劇准此例與置本錢􅀺嶲等州因蠻㓂煞傷冝令本道收拾埋瘞六年秋髙駢自海門進軍破蠻軍收復安南府自李􅅣失政交阯䧟没十年蠻軍北㓂邕容界人不􅂓生至是方復故地七年十月安南都護髙駢奏蠻㓂悉平十一月御宣政殿大赦以復安南故也九年七月徐州赴桂林戌卒五百人官健許結趙可立殺其主將王仲甫以粮料判官龐勛爲都頭剽掠湘潭衡山兩縣有衆千人擅還本鎮九月甲午龐勛䧟􅀫州知州判官焦璐奔歸于徐乙未龐塤䧟徐州十年九月賊􅀫州守將張玄稔以城降有兵萬人馬舉率師赴之龐勛聞之以其衆將攻玄稔玄稔賊之勁將也遂與舉合勢急圍徐州許佶登城拒守者三日佶敗出走稔收復徐州龐勛方來赴援聞城巳拔欲南趨濠州馬舉追及渙河擊敗之勛溺水而死蕭縣主蔣又斬許佶首來降徐㓂悉平十一月南詔蠻驃信坦綽酋龍率衆二萬冦嶲州十二月勑荆南節度使杜悰據司天奏有小孛星氣經歴分野恐有外夷兵水之患縁邊藩鎮最要隄防冝訓習師徒増築城堡凡関制置以其事聞十一年八月同昌公主薨追贈衛國公主謚曰丈懿主郭淑妃所生上尤鍾念悲惜異常以待詔韓宗紹等醫藥不効殺之收捕其親族三百餘人繫京兆府宰相劉贍京兆尹温璋上䟽論諌行法太過上怒十二年春正月宰相路巖率}
