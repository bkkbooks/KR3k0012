  - {type: variant, offset: 457, length: 364, content: 康掎音巳角應接神策行營節度使高崇文神策兵馬使李元弈率步騎之師與東州興元之師類會進討甲午高崇文由斜谷路李元弈由谷路俱會幹梓潼關辛卯群臣請聽政戊戍上謂宰臣曰前代帝王或怠於聽政或躬覽繁務其道何如杜黃裳對曰帝王之務在於修己簡易擇賢委任不宜怠肆安逸然事有綱領小大常務其遠者大者至如簿書獄訟百吏能否本非人主所自任也但擇人委任責其成效賞罰必信誰不盡心傳稱帝舜之德曰夫何為哉恭己正南面而已誠以能舉十六相去四凶也豈與勞神疲體自任耳目之主同年而語哉但人主常勢患在不能推誠人臣之弊患在不能自竭由是上疑下詐禮貌或虧欲求致理自然難致茍無此弊何患不至於理上稱善久之五月辛卯冊太上皇后王氏為皇太后九月辛亥高崇文奏收成都擒劉闢以獻癸丑以山人李渤為左拾遺徵不至二年春正月上親朝獻太清宮御丹鳳樓大赦天下己酉以戶部侍郎武元衡為門下侍郎同平章事以中書舍人翰林學士李吉甫, WYG: 紳}
