  - {type: variant, offset: 1901, length: 567, content: 招撫使十年正月嚴綬帥師次蔡州界己亥制削奪吳元濟官爵六月鎮州節師度使王承宗遣盜夜伏於靖安坊刺宰相武元衡死之刺御史中丞裴度傷首而免十二年五月隨唐節度使李愬奏敗賊於吳房獲賊將李祐七月以裴度守門下侍郎同平章事充彰義軍節度申光蔡觀察處置等使仍充淮西宣慰使十月李愬率師入蔡州執吳元濟以獻淮西平十三年正月御含元殿受朝賀禮畢御丹鳳樓大赦天下七月詔削奪淄青節度使李師道官爵仍令宣武魏愽義成等五鎮之師分路進討十二月上謂宰臣曰人臣事君但力行善事自致公望何乃好樹朋黨朕甚惡之裴度對曰君子小人未有無徒者君子之徒則同心同德小人之徒是朋是黨上曰他人之言亦與卿等相似豈易辯之哉度曰君子小人觀其所行當自區別矣上曰凡好事口說則易躬行則難卿等既言之須行之勿空言說度等謝曰陛下處分可謂至矣臣等敢不激厲然天下之人從陛下所行不從陛下所言臣等亦願陛下每言之則行之上頗忻納十四年春正月以東師宿野不受朝賀三月上謂宰臣曰聽受之間大是難事推誠選任所謂委寄必合盡心及至所行臨事不無偏黨朕臨御已來歲月斯久雖不明不敏然漸見物情每於行為務欲詳審比令學士集前代昧政之事為辯謗略每欲披閱以為鑒戒耳崔群對曰無情曲直辯之至易稍懷欺詐審之實難故孔子有眾好眾惡之論浸潤膚受之說蓋以曖昧難辯故也若擇賢而任之待之以誠糾之以法則人自歸公孰敢行偽陛下詳觀載籍以廣聰明實天下幸甚七月群臣上尊號曰元和聖文神武法天應道皇帝, SBCK: ''}
