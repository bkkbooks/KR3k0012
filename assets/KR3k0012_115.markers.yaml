  - {type: 'tls:seg', offset: 259, content: '', id: KR3k0012_CHANT_115-1a.54}
  - {type: variant, offset: 259, length: 0, content: '', SBCK: 以乆雪廢元㑹壬子詔朕聞天聽自我人聽天視自我人視朕之菲德渉道未明不能調序四時導迎和氣自去冬已來踰月雨雪寒氣尤甚頗傷于和念兹庻民或罹凍餒無所假貸莫能自存中宵載懷旰食興歎怵惕􅀂厲時子之辜思􅀪惠澤以順時令天下死罪囚除官典犯贓故意殺人外並降從流流巳下遞降一等七年正月詔曰朕承上天之睠佑荷列聖之丕圖宵旰憂勞不敢暇逸思致康乂八年于兹而水旱流行疾疫作沴兆庻艱食扎瘥相仍盖德未動天誠未感物一􅀋失所其過在予載懷罪巳之心深軫納惶之慮如聞􅀜輔河東去年亢旱秋稼不登今春作之時農務尤切􅀂不能賑救懼至流亡京兆府賑粟十萬石河中府綘州各賜七萬石同華陜􅉑晉等州各賜十萬石並以常平義倉物充七月以旱命京城諸司䟽决繫囚閏七月乙夘詔曰朕嗣守丕圖覆嫗生􅀋兢業夤畏上承天休而隂陽失和膏澤􅄽候害我稼穡災于黔􅀺有過在予敢忘咎責從今避正殿减供膳停教坊樂廐馬量减蒭粟百司厨饌亦冝權减隂陽鬱堙有傷和氣冝出宫女千人五坊鷹犬量湏减放内外修造事非急務者並停八月甲申御宣政殿􅁽}
  - {type: page-break, offset: 259, content: '', id: KR3k0012_SBCK_115-3a}
  - {type: page-break, offset: 259, content: '', id: KR3k0012_SBCK_115-3b}
  - {type: variant, offset: 259, length: 0, content: '', WYG: 以大雪廢元會壬子詔曰朕聞天聽自我人聽天視自我人視朕之菲德涉道未明不能調序四時導迎和氣自去冬以來踰月雨雪寒氣尤甚頗傷於和念兹庶氓或罹凍餒無所假貸莫能自存中宵載懐旰食興嘆怵惕若厲實予之辜思𢎞惠澤以順時令天下死罪囚除官典犯贓故意殺人外並降從流流以下遞降一等七年正月詔曰朕承上天之眷佑荷列聖之丕圖宵旰憂勞不敢暇逸思致康乂八年於兹而水旱流行疾疫作沴兆庶艱食札瘥相仍葢德未動天誠未感物一夫失所其過在予載懐罪己之心深軫納溝之慮比聞闗輔河東去年亢旱秋稼不登今春作之時農務尤切若不能賑救懼至流亡京兆府賑粟十萬石河中府絳州各賜七萬石同華陜虢晉州各賜十萬石並以常平義倉物充給七月旱命京城諸司疏决繋囚閏七月乙卯詔曰朕嗣守丕圗覆嫗生類兢業寅畏上承天休而隂陽失和膏澤替候害我稼穡灾我黔黎有過在予敢忘咎責從今避正殿減供膳停教坊樂廐馬量減蒭粟百司厨饌亦宜權減隂陽湮欝有傷和氣宜出宫女千人五坊鷹犬量須減放内外脩造事非急務者並停八月甲申御宣政殿冊}
  - {type: page-break, offset: 259, content: '', id: KR3k0012_WYG_115-4b, image: WYG0894/WYG0894-0090b.png}
