  - {type: variant, offset: 4571, length: 3, content: 奚契丹, SBCK: 百餘年至是悉復隴右故地八年正月陜州黄河清二月南蠻進犀牛詔還之十一年九月右􅀘闕陳嘏左拾遺王譜右拾遺薛廷傑上䟽諌遣中使往羅浮山迎軒轅先生上曰朕以萬機事繁躬親庻務訪聞羅浮山處士軒轅集善能攝生年齡亦壽乃}
  - {type: page-break, offset: 4571, content: '', id: KR3k0012_SBCK_115-10a}
  - {type: variant, offset: 4571, length: 3, content: 奚契丹, WYG: 百餘年至是悉復隴右故地八年正月陜州黄河清二月南蠻進犀牛詔還之十一年九月右補闕陳瑕左拾遺王譜右拾遺薛廷傑上疏諫遣中使往羅浮山迎軒轅先生上曰朕以萬㡬事繁躬親庶務訪聞羅浮山處士軒轅集善能攝生延齡益夀乃}
