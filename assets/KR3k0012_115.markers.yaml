  - {type: variant, offset: 3616, length: 186, content: 其子克融為留後八月己巳鎮州監軍宋惟澄奏軍亂節度使田弘正并家屬將佐三百餘口並遇害軍人推衙將王庭湊為留後二年二月甲子詔雪王庭湊仍授鎮州大都督府長史充成德軍節度等使三軍將士待之如初仍令韓愈往彼宣諭十月詔江淮諸州旱損田苗頗多所在米價不免踴貴眷言疲瘵須議優矜宜委淮南浙東浙西宣歙江西福建等道觀察使各於當道有水旱處取常平義倉斛斗據時估減半價出糶以惠貧民十一月庚午命景王率禁軍五百騎侍從, SBCK: 爲}
