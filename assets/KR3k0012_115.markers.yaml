  - {type: variant, offset: 923, length: 223, content: 謂宰臣曰朕覽國書見文皇帝行事少有過差諫臣論諍往復數日況朕之寡昧涉道未明今後事或未當卿當每事十論不可一二而止己卯史官李吉甫撰元和國計簿揔計天下方鎮凡四十八管州府二百九十五縣一千四百五十三戶二百四十四萬二百五十四其鳳翔鄜坊邠寧振武涇原銀夏靈鹽河東易定魏愽鎮冀范陽滄景淮西淄青十五道凡七十一州不申戶口每歲賊入倚辦止於浙江東西宣歙淮南江西鄂嶽福建湖南等八道合四十九州一百四十四萬戶比量天寶供稅之戶則四分有一天下兵戎仰給縣官者八十三萬餘人比量天寶士馬則三分, WYG: 章請}
