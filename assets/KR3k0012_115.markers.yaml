  - {type: variant, offset: 4564, length: 0, content: '', SBCK: 大中元年正月有事於郊廟禮畢御丹鳯門大赦改元帝雅好儒士留心貢舉有時微行人間採聽輿論以觀選士之得失每山池曲宴與學士詩什屬和公卿出鎮亦賦詩餞行凡對臣寮肅然拱揖鮮有輕易之言大臣或獻章䟽即燒香盥手受而覽之當時以大中之政有貞觀之風焉閏三月勑㑹昌季年併省寺宇雖云異方之教無損爲理之源中國之人乆行其道􅁵革過當事體未􅀪其靈山勝境天下州府應㑹昌五年四月所廢寺宇如有􅀫舊名僧復能修創一任住持所由不得禁止七月太子少保分司東都衛國公李德􅁉爲人所訟貶潮州司馬貟外置二年春正月宰相率文武百寮上徽號曰聖敬文思和武光孝皇帝御宣政殿受􅁽三年春正月涇原節度康季榮奏吐蕃宰相論恐􅀬以秦原安樂三州及石門等七􅀜之兵民歸國詔太僕卿陸躭往喻旨仍令靈武節度使朱叔明邠寧節度使張景緒各出本道兵馬應接六月康季榮奏收復原州城及石門驛藏木峽制勝六盤石峽等六􅀜訖邠寧張景緒奏收復蕭􅀜勑於蕭􅀜置武州改樂安爲威州七月三日七􅀜軍人百姓皆河隴遺􅀺數千人見于􅀜下上御延喜門撫慰令其解辮賜之冠帶共賜絹十五萬疋八月鳯翔節度使李玼奏收復秦州制曰自昔皇王之有國也何甞不文以守成武以集事叅諸二柄歸于大寧朕猥荷丕圖思􅀪景運憂勤戒惕四載于兹每念河湟土疆綿亘遐闊洎天寳末犬戎乗我多難無方禦姦遂縱腥羶不逺京邑事更十葉時近百年進士試能靡不竭其長䇿朝廷下議皆亦聽其直詞盡以不生邊事爲永圖且守舊地爲明理荏苒於是收復無由今者天地儲祥祖宗垂祐左祍輸欵邊壘連降刷恥建功所謀必尅實頼樞衡妙筭將帥雄稜副玄元不爭之文絶漢武逺征之悔甌脫頓空於内地斥候全據於新封莫大之休指期而就况將士等擳沐風雨􅁀露郊原披荆榛而刀斗夜嚴逐豺狼而穹廬曉破動皆如意古無與京念此誠勤冝加寵賞涇原冝賜絹六萬疋靈武五萬疋鳯翔邠寧各四萬疋嗚呼七􅀜要害三都膏􅃾候館之殘趾可尋唐人之遺風尚在追懷往事良用興嗟夫取不在廣貴保其金湯得必有時詎計於遲速今則便務修築不進干戈必使足食足兵有備無患載洽亭育之道永置生靈之安中外臣寮冝體朕意}
