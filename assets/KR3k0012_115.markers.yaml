  - {type: variant, offset: 2568, length: 223, content: 六年已後稍似懈倦開元末又不及中年何也崔群對曰玄宗少歷民間身經迍難故即位之初知民疾苦躬勤庶政加之姚崇宋璟蘇頲盧懷慎等守正之輔孜孜獻納故致治平及後承平日久安於逸樂漸遠端士而近小人宇文融以聚歛媚上心李林甫以姦邪惑上意加之以國忠故及於亂願陛下以開元初為法以天寶末為戒即社稷無疆之福也時皇甫鎛以謟刻欺蔽在相位故群因奏以諷之上服方士柳泌金丹藥起居舍人裴鄰上表切諫以金石含酷烈之性加燒鍊則火毒難制若金丹已成且令方士自服一年觀其效用則進御可也上怒貶鄰為江陵令十五, krp: 二}
