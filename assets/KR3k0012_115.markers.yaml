  - {type: variant, offset: 259, length: 0, content: '', krp: 以乆雪廢元㑹壬子詔朕聞天聽自我人聽天視自我人視朕之菲德渉道未明不能調序四時導迎和氣自去冬已來踰月雨雪寒氣尤甚頗傷于和念兹庻民或罹凍餒無所假貸莫能自存中宵載懷旰食興歎怵惕若厲時子之辜思弘惠澤以順時令天下死罪囚除官典犯贓故意殺人外並降從流流巳下遞降一等七年正月詔曰朕承上天之睠佑荷列聖之丕圖宵旰憂勞不敢暇逸思致康乂八年于兹而水旱流行疾疫作沴兆庻艱食扎瘥相仍盖德未動天誠未感物一類失所其過在予載懷罪巳之心深軫納惶之慮如聞關輔河東去年亢旱秋稼不登今春作之時農務尤切若不能賑救懼至流亡京兆府賑粟十萬石河中府綘州各賜七萬石同華陜􅉑晉等州各賜十萬石並以常平義倉物充七月以旱命京城諸司䟽决繫囚閏七月乙夘詔曰朕嗣守丕圖覆嫗生類兢業夤畏上承天休而隂陽失和膏澤愆候害我稼穡災于黔黎有過在予敢忘咎責從今避正殿减供膳停教坊樂廐馬量减蒭粟百司厨饌亦冝權减隂陽鬱堙有傷和氣冝出宫女千人五坊鷹犬量湏减放内外修造事非急務者並停八月甲申御宣政殿冊}
  - {type: variant, offset: 260, length: 0, content: '', SBCK: 太子永是日降詔應犯死罪降從流流巳下遞减一等九年冬十月内出曲江新造紫雲樓彩霞亭額左軍中尉仇士良以百戯於銀臺門迎之時鄭注言秦中有災冝興土功以猒之乃濬昆明曲江二池上好爲詩每誦杜甫曲江行云江頭宫殿鏁千門細栁新蒲爲誰緑乃知天寳巳前曲江四岸皆有行宫臺殿百司􅅟署思復昇平故事故爲樓殿以壯之王涯獻搉茶之利乃以涯爲搉茶使茶之有稅自涯始十一月壬戍中尉仇士良率兵誅宰相王涯賈餗舒元輿李訓王璠郭行餘鄭注羅立言李孝本韓約等十餘家皆族誅時李訓鄭注謀内官詐言金吾仗舎石榴樹有甘露請上往觀之内官先至金吾仗見幕下伏甲遽扶}
  - {type: variant, offset: 260, length: 0, content: '', WYG: 太子永是日降詔應犯死罪降從流流以下遞減一等九年冬十月内出曲江新造紫雲樓綵霞亭額左軍中尉仇士良以百戲於銀臺迎之時鄭注言秦中有灾宜興土功以厭之乃濬昆明曲江二池上好為詩每誦杜甫曲江行云江頭宫殿鎖千門細栁新蒲為誰緑乃知天寳已前曲江四岸皆有行宫臺殿百司廨署思復昇平故事故為樓殿以壯之王涯獻𣙜茶之利乃以涯為𣙜茶使茶之有税自涯始十一月壬戌中尉仇士良率兵誅宰相王涯賈餗舒元輿李訓王藩郭行餘鄭注羅立言李孝本韓約等十餘家皆族誅時李訓鄭注謀殺内官詐言金吾仗舎榴樹有甘露請上往觀之内官先至金吾仗見幕下伏甲遽扶}
