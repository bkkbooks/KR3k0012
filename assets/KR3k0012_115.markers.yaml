  - {type: variant, offset: 4564, length: 0, content: '', WYG: 大中元年正月有事扵郊廟禮畢御丹鳯樓大赦改元帝雅好儒士留心貢舉有時微行人間採聽輿論以觀選士之得失每山池曲宴與學士詩屬和公卿出鎮亦賦詩餞行凡對臣寮肅然拱揖鮮有輕易之意大臣獻章䟽必燒香盥手受而覽之故當時以大中之政有貞觀之風焉閏三月勑㑹昌季年併省寺宇雖云異方之教無損為理之原中國之人久行其道釐革過當事體未𢎞其靈山勝境天下州府應㑹昌五年四月所廢寺宇如有宿舊名僧復能脩創一任住持所由不得禁止七月太子少保分司東都衞國公李徳裕為人所訟貶潮州司馬外置二年春正月宰相率文武百寮上徽號曰聖敬文思和武光孝皇帝御宣政殿受册三年春正月涇原節度康季榮奏吐蕃宰相倫恐熱以秦原樂安三州及石門等七關之兵民歸國詔太僕卿陸躭往喻㫖仍令靈武節度使朱叔明邠寧節度使張景緒各出本道兵馬應接六月康季榮奏收復原州城及石門驛蔵木峽制勝六盤石峽等六關訖邠寧張景緒奏收復蕭闗勑於蕭闗置武州改樂安為威州七月三州七闗軍人百姓皆河隴遺黎數千人見于闕下御延喜門撫慰令其解辮賜之冠帶共賜絹十五萬疋八月鳯翔節度使李玭奏收復秦州制曰自昔皇王之有國也何嘗不文以守成武以集事叅諸二柄歸于大寧朕猥荷丕圖思𢎞景運憂勤戒惕四載于兹每念河湟土疆綿亘遐闊洎天寳末犬戎乗我多難無方禦姦遂從腥羶不逺京邑事更十葉時近百年進士試能靡不竭其長䇿朝廷下議皆亦聽其直詞盡以不生邉事為永圖且守舊地為明理荏苒於是收復無由今者天地儲祥祖宗垂祐左袵輸欵邉壘連降刷恥建功所謀必克實賴樞衡妙筭將師雄威副元𤣥不爭之文絶漢武逺征之悔甌脱頓空於内地斥堠全據於新封莫大之休指期而就况將士等櫛沐風雨暴露郊原披荆榛而刁斗夜嚴逐豺狼而穹廬曉破動皆如意古無與京念此誠勤宜加寵賞涇原宜賜絹六萬疋靈武五萬疋鳯翔邠寧各賜四萬疋嗚呼七關要害三都膏腴候館之殘恥可尋唐人之遺風尚在追懐往事良用興嗟夫取不在廣貴保其金湯得必有時詎計於遲速今則便務脩築不進干戈必使足食足兵有備無患載洽愛育之道永置生靈之安中外臣寮宜體朕意}
