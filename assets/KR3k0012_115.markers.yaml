  - {type: variant, offset: 4567, length: 3, content: 廻鶻吐, SBCK: 追謚順宗曰至德大聖大安孝皇帝憲宗曰昭文章武大聖孝皇帝􅀄以河湟收復百寮請加徽號帝曰河湟收復繼成先志朕欲追尊祖宗以昭功烈白敏中等對曰非臣等愚昧所能及至是上御宣政殿行事及􅁽出上俯僂目送流涕嗚咽四年春正月以追尊二聖御正殿大赦天下五年八月汝州刺史張義潮遣兄義潭以􅀲沙伊肅等十一州戸口來獻自河隴䧟}
  - {type: variant, offset: 4567, length: 3, content: 廻鶻吐, WYG: 追諡順宗曰至德大聖大安孝皇帝憲宗曰昭文章武大聖孝皇帝初以河湟收復百寮請加徽號帝曰河湟收復繼成先志朕欲追尊祖宗以昭功烈白敏中等對曰非臣等愚昧所能及至是上御宣政殿行事及冊出上俯僂自送流涕嗚咽四年春正月以追尊二聖御正殿大赦天下五年八月河州刺史張義潮遣兄義澤以𤓰沙伊肅等十一州户口來獻自河隴陷}
