  - {type: variant, offset: 1416, length: 226, content: 乎先主曰君與俱來庶曰此人可就見不可屈致將軍宜枉駕顧之由是先主遂造亮凡三於是情好日密關羽張飛等不悅先主解之曰孤有孔明猶魚之有水也願諸君勿復言羽飛乃止吳志曰劉繇字正禮東來人兄岱字公山平原陶洪薦繇欲令舉茂才剌史曰前年舉公山奈何復舉正禮乎洪曰若使君用公山於前擢正禮於後所謂御二龍於長衢騁騏驥於千里不亦可乎又曰周瑜薦魯肅才宜佐時當廣求其比以成功業不可令去也權即召肅與語甚悅之眾賓罷退獨引肅還合榻對食又曰凌統字公績吳郡人為孫權將甚見親重時有薦同郡盛暹於權者以為梗概, SBCK: ''}
