  - {type: variant, offset: 103, length: 142, content: 又曰東平王蒼薦吏吳良上以章示公卿曰蕭何薦韓信設壇即拜不復考試以良為議郎又曰王丹字仲回初有薦士於丹者丹選舉之而後所舉者陷罪丹免客暫自絕俄而徵丹復為太子太傅乃呼客見之謂曰何量丹之薄不為設食以罰之相待如舊又曰南陽太守杜詩上䟽薦伏惠公曰竊見故大司徒陽都侯伏惠公自行束脩訖無毀玷篤信好死守死善道, SBCK: 必欲}
