  - {type: punctuation, offset: 3098, content: 「, id: KR3k0012_CHANT_632-bkkpn822}
  - {type: variant, offset: 3098, length: 0, content: '', SBCK: 張華薦成公綏曰􅀼見處士東郡成公緩年二十五字子安體珪璋之質資不器之量知深慮明足以妙見研恩篤好則仲舒之精引之丗貞幹足以敦風篤俗淵才逹學足以弘導丗教固逸倫之殊俊搢抻之檢式也荀爽與郭叔都書曰陳季方才德秀出超丗逸羣金相玉質文章席美終軍賈􅁩誠無以加冝遂貢之宰朝盛其龍光塩車之􅂹自非伯樂無以顯名採光剖璞以獨見寳實爲足下利之孔融薦祢衡表曰伏見處士平原祢衡淑質貞亮英才卓犖􅀄涉蓺文登堂覩奥目所一見輙傳於口耳所一聞不忘於心性與道合思􅀂有神􅀂得龍躍天衢􅁬翼雲漢足以明近署之多士増四門之穆穆應璩薦賁伯偉文詣曹公曰璩聞景雲浮則應龍翔治道明則儁乂臻是故良哉之歌興於唐堯之丗多士之頌形於周文之朝竊見太子舎人賁琳字伯偉禀性純和體素清慤冝授以千里之塗任以列曹之職}
  - {type: page-break, offset: 3098, content: '', id: KR3k0012_SBCK_632-7b}
  - {type: variant, offset: 3098, length: 0, content: '', WYG: 張華薦成公綏曰竊見處士東郡成公綏年二十五字子安體珪璋之質資不器之量知深慮明足以妙見研思篤好足以致精貞幹勁操足以敦風篤俗淵才逹學足以𢎞遵世教固逸倫之殊俊縉紳之檢式也荀爽與郭叔都書曰陳季方才徳秀出超世逸郡金相玉質文章茂美終軍賈誼誠無以加宜遂貢之朝宁盛其龍光塩車之驥自非伯樂無以顯名採光剖璞自爾見寳實為足下利之孔融薦禰衡表曰伏見處士平原禰衡淑質貞亮英才卓犖初渉藝文登堂覩奥目所一見輙傳於口耳所一聞不忘於心性與道合思若有神若得龍躍天衢奮翼雲漢足以明近署之多士増四門之穆穆應璩薦賁伯偉文詣曹公曰璩聞景雲浮則龍翔應治道明則雋乂臻是故良哉之歌興於唐堯之世多士之頌形於周文之朝竊見太子舍人賁琳字伯偉稟性純和體素清峻宜授以千里之塗任以列曹之職}
  - {type: page-break, offset: 3098, content: '', id: KR3k0012_WYG_632-12b, image: WYG0898/WYG0898-0660b.png}
  - {type: page-break, offset: 3098, content: '', id: KR3k0012_WYG_632-13a, image: WYG0898/WYG0898-0660c.png}
