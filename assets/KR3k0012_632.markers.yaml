  - {type: variant, offset: 3111, length: 2, content: 范岫, SBCK: 郎訥可太子洗馬又陸機薦戴􅀂思文曰蓋聞䌓若登御然後髙墉之功顯􅀌竹在肆然後降神之曲成伏見處士廣陵戴淵年三十字􅀂思心智足以研幽才鑒足以辨物固窮樂志無風塵之慕砥節立行有渫井之㓗誠東南之貴寳聖朝之竒璞也楊方爲虞領軍薦張道順文曰盖聞驪龍之珠必沉紫泉之裏垂天之翼必翔青冥之}
  - {type: variant, offset: 3111, length: 2, content: 范岫, WYG: 郎納可太子洗馬又陸機薦戴若思文曰盖聞繁弱登御然後髙墉之功顯孤竹在西然後降神之曲成伏見處士廣陵戴淵年三十字若思心智足以研幽才鑒足以辨物固窮樂志無風塵之慕砥節立行有渫井之㓗誠東南之貴寳聖朝之奇璞也楊方為虞領軍薦張道順文曰盖聞驪龍之珠必沈紫泉之裏垂天之翼必翔青冥之}
