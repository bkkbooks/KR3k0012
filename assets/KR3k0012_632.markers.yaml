  - {type: variant, offset: 1621, length: 1093, content: 孫權將甚見親重時有薦同郡盛暹於權者以為梗概大節有過於公績權曰但令如公績足矣後召暹夜至公續已臥聞攝衣出門執其手以入其愛善不害如此晉書曰桓尋字茂倫性通朗早有盛名有人倫識鑒拔才取士或出於無聞或得之孩抱時人方之許郭又曰劉恢嘗薦吳郡張憑卒為美士眾以此服其人又曰華譚字令恩廣陵人除甄城令過漢水作莊子讚以示功曹後見教不常譚疑不能為私問是廷掾張延所作譚即拔延薦達於部遂得升擢比譚為廬江延亦已為郡譚至廬江舉寒族周訪為孝廉訪果立功名時以譚為知人又曰江統為司徒左長史東海王越為袞州牧以統為別駕委以州事與統書曰昔王子師為豫州未下車辟荀慈明下車辟孔文舉貴州人士有堪應者否統舉高平郗鑒為賢良陳留阮脩為直言濟北程收為方正時以為知人徐廣晉紀曰張華少自牧羊而篤志好學初為縣史盧欽奇其才數稱薦之晉中興書曰賀循會稽人郡鈴下有楊方者字公迴世為郡威儀少好學有奇才以門役在閤下公事之暇輒讀五經鄉邑未之別也內史諸葛恢聞方學召為給使見而異之謂有殊常之才即解役散置左右以門人待焉由是邦壤敬異方始得周旋鄉貴虞喜兄弟以儒學立名並知拔之後恢欲薦郡功曹於中宗使方具其事主簿虞預以薦為美送示太常賀循遂向京師稱美之司徒王導辟以為椽方始出都交遊人間縉紳咸厚遇之傅暢晉諸公讚序曰魏舒雖有宇量眾望未能悉歸侍中任愷為世祖所委任秦始中啟舒散騎常侍侍中尚書令又為吏部遷僕射舒雖體度弘雅而才鈍無所創設遷光祿大夫開府領司徒世祖臨軒使太常任愷拜授朝廷以愷前啟拔舒而為王人人為愷怨之也宋書曰劉穆之為丹陽尹凡所薦達不納不止常云我雖不及荀文若之舉善然不舉不善又曰王鎮惡頗讀諸子兵書喜論軍國大事騎射非長而縱橫善果斷武帝伐廣固鎮惡時為臨灃令人或薦之武帝召與語異焉因留宿且謂參佐曰鎮惡王猛孫所謂將門有將即署前部賊曹破賊有功封博陸縣五等子又曰謝晦字宣明初為昶建威府中兵參軍孟昶死帝問劉穆之昶府誰堪入府穆之舉晦即命為太尉參軍武帝嘗訊獄其旦刑獄參軍有疾晦代之晦車中一覽訊牒隨問酬對無失即日署刑獄賊曹又曰張邵元嘉五年為征虜將軍領寧蠻校尉雍州剌史加都督初王華與邵不和及華參要親舊為之危心邵曰子陵子陵華字方弘至公豈以私隙害正義是任也華實舉之又曰晉平王休祐為南徐州帝就禇彥回求幹事人為上佐彥回舉沈文季轉騎長史東海太守又曰劉道產在雍州有惠化遂蠻歸懷皆出緣征為村落戶口殷盛及產死群蠻大為寇暴孝武西鎮襄陽江夏王羲恭薦柳元景乃以為武威將軍隨郡太守至廣設方略斬獲數百郡境肅然又曰荀伯子好學博覽經傳解褐奉朝請員外散騎侍郎著作郎徐廣重其才學舉伯子及王韶之並為佐郎同撰晉史齊書曰博昭字茂遠御史中丞劉俅薦於武帝永明初以為南郡王侍讀又曰孔休源字慶緒州舉秀才太尉徐孝嗣省其策深善之謂同坐曰觀此足稱王佐之才瑯琊王融雅, WYG: ''}
