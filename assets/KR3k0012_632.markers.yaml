  - {type: variant, offset: 3072, length: 1, content: 朱, SBCK: 此人儀形莊肅􅀋蕭至忠朕故用之左右曰至忠以犯逆死陛下何故比之􅀇宗曰我爲社稷計所以誅之然其人信美才也又曰李勣少與郷人翟讓聚衆爲盗推李宻爲主言於宻曰天下大亂夲爲飢苦􅀂得􅀺陽一倉大事濟矣遂襲取之時在飢餓就食者數十萬人魏徴髙季輔杜正倫郭孝恪軰客遊勣一見便加禮敬引之卧内談論忘疲及虎牢獲戴胄亟相推薦咸至大官時稱勣有知人之鑒又曰李義府僑居于蜀􅀽天綱見而竒之曰此郎貴極人臣但壽不長耳因請舎之託其子曰此子有七品相願提拔之義府許諾因問天綱壽幾何對曰五十二此外非所知也安撫使李大亮侍中劉洎等連薦之召見拜􅁥察御史後位至宰相白虎通曰諸侯所以貢士於天子者進賢稱善者也天子躬求之者貪義也治國之道夲在得賢得賢即治失賢即亂孔叢子曰子髙見齊王王問誰可臨淄􅌠稱管穆焉王曰穆也容皃陋民不敬者子髙荅曰夫見敬在德且臣所稱其才也君王聞晏子趙文子乎晏子長不過六尺面狀醜惡齊國之上下莫不宗焉趙文子其身如不勝衣其言如不岀口非但體陋辭氣又訥其相晉國以寧諸侯敬服皆德故也以穆軀形方諸二子猶悉賢之昔臣甞行臨淄市見屠啇焉身長八尺􅂡髯如㦸面正紅白市之男女未有敬者無德之故也王曰是所謂祖龍始者也誠如先生之言於是乃以管穆爲臨淄宰韓子曰趙武薦四十六人於其君及武之死也四十六人皆就賔位無私德􅀂此武薦曰屋之士六十餘家戰國䇿曰淳于髠見七人於宣王王曰子來也寡人聞千里一士是比肩相望百丗一聖􅀂隨踵而至者也今子一日而見七士不亦衆乎髠曰不然夫鳥同翼者聚居獸同足者俱行今求茈葫桔梗於沮澤則累丗不得一焉􅀂求之梁甫之隂則連目夫物有等今髠賢者之儔王求士於髠譬如挹水於河而求火於燧也言易得也國語曰文公使原季爲卿原季趙襄文公二年爲原大夫辭曰夫三德者偃之岀也三德先披先斬咠臣也偃狐偃也三子皆偃所進以德紀民其章大矣不可廢也使狐偃爲卿辭曰毛之智賢於臣其齒又長毛偃之兄齒年毛也不在位不敢聞命乃使狐毛將上軍狐偃佐之又曰趙宣子言韓獻子於靈公以爲司馬河曲之役趙孟使人以其車乗于行􅁗與晉戰在魯文十二年獻子執而戮之衆咸曰韓厥必不没矣其主朝􅂛之而暮戮其車其誰安之宣子召而禮之曰吾聞事君者比而不黨夫周以舉義比也舉以其私黨也夫軍事無犯犯而不隱義也吾言汝於君懼汝不能也舉之而不能黨孰大焉勉之長臨晉國者非其誰勉之告諸大夫曰司賀我矣吾舉厥也而中吾乃今知免於罪矣免失舉之罪韓詩外傳曰魏文侯之時子質仕而獲罪焉去而北遊謂簡主曰吾所樹朝廷之大夫半所樹邊境之人亦半今堂之士惡我於明君朝廷大夫中我於法邊境之人劫我以兵是以不復樹德於人簡主曰噫子言過矣春樹桃李夏得䕃其下秋得食其實春樹蒺䔧夏不得採其葉秋得其刺焉由此觀之在所樹也今子之所樹非其人耳吕氏春秋曰管仲病桓公徃問之曰仲父之病矣言其病困如漬甚國人弗諱寡人將誰屬國管仲對曰昔者臣盡力竭智猶未足以知之也今病在於朝夕之中臣奚能言桓公曰此大事願仲文教之寡人也管仲敬諾曰誰欲相欲用誰相公曰鮑叔牙可乎管仲對曰不可夷吾善鮑叔牙牙之爲人也清廉㓗直視不已􅀂者不比於人一聞人之過終身不志勿已則隰朋其可乎隰朋之爲人也上志而下求醜不􅀂黄帝而哀下巳􅀂者自醜其徳不如黄帝又恐不􅀂巳也其於國也有不聞不求聞而善求在利國而已矣其於物也有不知也物事也非事職不求知知其於人也有不見也務在齊民不求見也勿巳則隰朋可矣夫相大官也處大官者不欲小察不欲小智故曰大匠不斵但規模而已不復自斵削大庖不豆調和五味不復自列大虜不聞又曰魏公叔座疾惠王徃問之曰公叔之病甚矣將柰社稷何對曰臣之庶子鞅者願王以國聽之􅀂不能聽勿使岀境王不應岀謂左右曰豈不悲哉夫以公叔之賢今謂寡人必以國聽鞅悖也公叔死公孫鞅西遊􅁗􅁗孝公聽之􅁗果強魏果弱又曰百里奚之未遇時至虢而虜飯牛於􅁗練以鬻五叛之皮公孫披得恱之獻諸繆公三日請屬事焉公曰買之五羊皮而臣之無乃爲天下􅀏乎披曰倍賢而任之君之明也讓賢而下之臣之忠也君爲明臣爲忠彼信賢也境内將服敬國且畏夫誰暇􅀏哉用之謀無不當舉必有功􅀃苑曰田子方渡西河遇翟黄乗􅎮車子方曰子何以致此乎曰昔西河無守臣進吴起鄴無令臣進西門豹酌無令臣進北門可君欲攻中山臣進樂羊魏於天下難治臣進李克進此五大夫爵位於此又曰子貢問孔子曰今之臣孰賢孔子曰齊有鮑叔鄭有子皮子貢曰齊無管仲鄭無子産者乎孔子曰吾聞鮑叔之進管仲子皮之進子産未聞管仲子産有所進也又曰孟嘗君進客於齊王三年不見用故客反見曰不知臣之罪耶君之過耶孟甞君曰寡人聞縷因鍼而入不因針而急女因媒而嫁不因媒而畜夫子之才必薄矣當怨寡人哉客曰臣聞韓盧天下疾狗也見􅇠而指屬則不失􅇠望見而放狗非不能屬者罪於是孟嘗復屬齊王王遂使爲相又曰蘧伯玉使之楚逢公子哲濮水之上接草而侍曰聞上士可以託邑中士可以託辭下士可以託才三言固可得託也伯玉曰謹受命伯玉見楚王使事畢坐從容言士王曰何國最多士伯玉曰楚多士而楚不能用王曰是何言也伯玉曰子胥生於楚而吴善用之賁皇生於楚而晉善用之今者臣之來逢子哲曰上士可以託邑中士可以託言下士可以託才三言者固可得託於是楚王發使追公子哲濮水之上子哲還重於楚伯玉之功也劉向新序曰楚莊王罷朝而晏樊􅁎問其故莊王曰與賢相語不知晏者也樊􅁎曰賢相爲誰王曰虞丘子樊􅁎掩口而􅀏王乃問其故曰虞丘子爲相數年未嘗進一賢不知賢是不智知而不進是不忠不忠不智安得爲賢明日朝王以樊􅁎之言告虞丘子虞丘子稽首曰如􅁎之言於是辭位而進孫叔敖叔敖相楚而莊王覇樊􅁎之力海内先賢傳曰潁川鍾皓字季和爲郡功曹太丘長陳寔爲西門亭長皓深獨敬}
