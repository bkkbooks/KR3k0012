  - {type: variant, offset: 637, length: 693, content: 顛倒衣裳將軍宜效唐殷之舉審伊皋之薦令遠近無偏幽隱必達光名宣於當世貴烈著於無窮竊見故司空掾桓梁京兆祭酒馮晉扶風掾李育京兆督郵郭基涼州從事王雍恒農功曹殷肅此六子者皆有殊行絕才德隆當世如蒙徵納以輔高明此山梁之秋夫子所為嘆也蒼納之又曰曹騰加位特進其所進達皆海內名陳留虞放邊韶南陽延固張溫恒農張冀頴川堂谿等皆所舉也漢雜事曰傅喜為右將軍傅太后與政事喜數諫之后不悅喜上印綬病在家司空何武尚書唐林上書曰魯以季友治亂楚以子玉輕重魏以無忌折衝項以范增存亡故楚跨有南土帶甲百萬鄰國不以為難子玉為將文公仄席而坐及其死君臣相慶百萬之眾不及一賢於是上拜喜為大司馬封高武侯又曰谷永為尚書薦薛宣竊見少府宣材茂行潔達於從政有退食自公之節寡移賞遊說之助臣恐陛下忽於羔羊之詩捨功實之臣任虛華之譽是以越陳宣行能唯留神考察上然之遂以宣為御史大夫魏志曰太祖既定河北而高幹舉并州叛衛固與范先通謀太祖謂荀彧曰河東被山帶河當今天下之要地也君為我舉蕭何寇恂以鎮之彧曰杜幾可於是拜幾為河東太守固等卒伏又曰頴川戲志才籌畫之士太祖甚器之早卒太祖與荀彧書曰自志才亡後莫可與計事者汝潁固多奇士誰可以繼之彧薦郭喜召見與語天下事太祖曰使孤成大業者必此人也喜亦喜曰真吾君矣又曰張郃字儁乂河間人也郃雖武將而愛儒士嘗薦同郡畢諶經修行明詔曰昔祭遵為將常置五經大夫居軍中與諸生雅歌投壺今將軍外勤戎旅內存國朝朕嘉將軍之意擢諶為博士又曰桓範薦徐宣曰臣聞帝王之用當世俊才爭奪之時以策略為先分定之後以忠義為首故晉文行子犯之計而賞曰季之言高祖用陳平之智而託後於周勃竊見尚書徐宣體忠厚之行秉直亮之性清雅特立不隨世俗確然難動社稷之節今僕射𡙇宣行掌後事腹心任重莫如宣者帝遂以宣為, SBCK: 貞觀􅀄爲}
