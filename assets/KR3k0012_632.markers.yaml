  - {type: variant, offset: 2715, length: 353, content: 友善薦之於司徒竟陵王為西邸學士又曰江革字休映弱冠舉南徐州秀才時胡諧之行州事王融與諧之書令薦舉諧之方貢瑯琊王沉便以革代之又曰武帝將下都劉懷珍白帝曰夏口是兵衝要地宜得其人高帝納之與武帝書曰汝既入朝當須文武兼資人委以後事武帝乃舉柳世隆自代轉為武陵王前軍長史江夏內史行郢州事又曰明帝詔求異士始安王遙光表薦王暕及東海王僧孺除暕散騎從事中郎將又曰梁武帝之臨雍州問京兆人杜惲求州綱紀惲言柳慶遠武帝曰文和吾已知所問未知者耳因辟為別駕又曰陸厥字韓卿少好屬文永明元年詔百官舉士同郡司徒左曹掾顧暠之表薦厥堪舉秀才梁書曰何遜字伯言八歲能賦沈約嘗謂遜曰吾每讀卿詩一日三復猶不已其為名流所稱如此天監中兼尚書水部員外郎南平王引為賓客後薦之於武帝與吳均伹進倖又曰朱異字彥和吳郡人也有詔求異能之士五經博士明山賓表異高祖召見使說孝經周易甚說之, SBCK: ''}
