  - {type: variant, offset: 1335, length: 4, content: 陳群薦廣, SBCK: 李大亮隋末爲賊所􅀗同軰百餘人皆死賊帥張弼見而異之獨釋與語遂定交於幕下大亮旣貴毎懷張弼之恩貞觀末弼爲將作丞自匿不言大亮遇諸途識之持弼手而泣悉推家産以遺弼弼辭不受大亮言於太宗曰臣有今日榮貴乃張弼之恩力也乞廻臣之官爵以授之太宗即日以弼爲中郎將俄迁代州都督又曰岑文本􅀄事蕭銑江}
