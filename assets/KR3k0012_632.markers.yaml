  - {type: variant, offset: 1354, length: 0, content: '', SBCK: 文本爲中書侍郎專典樞宻又曰狄仁傑授汴州判佐工部尚書閻立本黜陟河南仁傑爲人誣告立本驚謝曰仲尼觀過知人足下可謂海曲之明珠東南之遺寳特薦之遷并州法曹又曰張柬之進士擢第爲清源丞年且七十餘永昌􅀄自免復應判䇿試畢有傳柬之考入下科柬之歎曰余之命也乃委歸襄陽時中書舎人劉允濟重考䇿自下昇甲科爲天下第一擢拜􅁥察御史累遷荆州長史長安中則天問狄仁傑曰朕要一好人任使有乎仁傑對曰陛下則何任使則天曰朕方待以將相仁傑曰料陛下􅀂求文章資歴則今之宰相李嶠􅂫味道亦足爲文吏矣豈非文士齷齪思得大才以用之以成天下之務者乎則天恱曰此心也仁傑曰荆州長史張柬之其人雖老眞宰相材也且乆不遇􅀂用之必盡}
  - {type: page-break, offset: 1354, content: '', id: KR3k0012_SBCK_632-2a}
  - {type: variant, offset: 1354, length: 0, content: '', WYG: 文本為中書侍郎專典樞宻又曰狄仁傑授汴州判佐工部尚書閻立本黜陟河南仁傑為人誣告立本驚謝曰仲尼觀過知仁足下可謂海曲之明珠東南之遺寳特薦之遷并州法曹又曰張柬之進士擢第為清源丞年且七十餘永昌初自免復應判策試畢有傳柬之考入下科柬之嘆曰余之命也乃委歸襄陽時中書舎人劉允濟重考策自下昇甲科為天下第一擢拜監察御史累遷荆州長史長安中則天問狄仁傑曰朕要一好人任使有乎仁傑對曰陛下作何任使則天曰朕方待以將相仁傑曰料陛下若求文章資厯則今之將相李嶠蘇味道亦足為文吏矣豈非文士齪齪思得大才以用之以成天下之務者乎則天悦曰此心也仁傑曰荆州長史張柬之其人雖老真宰相材也且久不遇若用之必盡}
