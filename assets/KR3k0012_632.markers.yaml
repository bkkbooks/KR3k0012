  - {type: variant, offset: 1361, length: 1, content: 蜀, SBCK: 前言張柬之猶未用也則天曰巳遷之矣仁傑曰臣薦之請爲相也今爲洛州司馬非用之也乃遷秋官侍郎及姚崇將赴靈武則天令舉内外堪爲宰相者崇曰張柬之沉厚有謀能斷大事且其人年老惟陛下急用之登時召見爲同鳯閣鸞臺平章事年巳八十與桓彦範敬暉等誅二張興復社稷忠冠千古功格皇天又曰張嘉貞落拓有大}
