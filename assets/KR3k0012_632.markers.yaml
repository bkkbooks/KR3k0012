  - {type: variant, offset: 3090, length: 1, content: 仍, SBCK: 西門亭長可用寔卒爲海内髙名之臣歸以公相之位三輔决録曰頴陽游殷爲郡功曹有童子張旣爲書佐殷察畏之具設賔饌以子楚託之後魏王以問旣稱楚文武兼學王遂以爲漢興郡管輅别傳曰趙孔耀至冀州見裴使君問顔色何以清减孔耀曰體本無藥石之疾然見清河内有一騏􅂹拘繫後厩歴年去王良伯樂百八十里不得聘其足以起風塵以此憔悴耳使君言騏􅂹今何所在孔耀言平原管輅字公明年三十六雅性寛大與丗無忌觀天則能同妙甘公石申俯覽同異則能齊司馬季主遊歩道術開神無窮抱荆山之璞懷衣光之寳而爲清河郡所録北黌文學可爲痛心疾首者裴使君聞言恱􅁣曰如此便相爲取之即檄}
  - {type: page-break, offset: 3090, content: '', id: KR3k0012_SBCK_632-7a}
  - {type: variant, offset: 3090, length: 1, content: 仍, WYG: 西門亭長可用寔卒為海内髙名之臣歸以公相之位三輔決録曰潁陽遊殷為郡功曹有童子張既書佐殷察異之具設賔饌以子楚託之後魏王以問既既稱楚文武兼才王遂以為漢興郡守管輅别傳曰趙孔耀至冀州見裴使君悲問顔色何以清减孔耀曰體本無藥石之疾然見清河郡有一騏驥拘繫後廐厯年去王良伯樂百八十里不得騁其足以起風塵以此憔悴耳使君言騏驥今何所在孔耀言平原管輅字公明年三十六雅性寛大與世無忌仰觀天文則能同妙甘公石申俯覧周易則能思齊季主遊歩道術開神無窮抱荆山之璞懐夜光之寳而為清河郡所録北黌文學可為痛心疾首者裴使君聞言慷慨曰如此便相為取之既檄}
