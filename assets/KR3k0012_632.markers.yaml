  - {type: variant, offset: 3072, length: 1, content: 朱, WYG: 此人儀形壯肅類蕭至忠朕故用之左右曰至忠以犯逆死何故念之𤣥宗曰我為社稷計所以誅之然其人信美才也又曰李勣少與鄉人翟讓聚衆為盜推李宻為主言於宻曰天下大亂本為饑苦若得陽黎一倉大事濟矣遂襲取之時在饑餓就食者數十萬人魏徴髙季輔杜正倫郭孝恪皆客遊勣一見便加禮敬引之卧内談論忘疲及虎牢獲戴胄亟相推薦咸至大官時稱勣有知人之鑒又曰李義府僑居於蜀袁天綱見而奇之曰此郎貴極人臣但夀不長耳因請舍之託其子曰此子有七品願提㧞之義府許諾因問天綱夀幾何對曰五十二此外非所知也安撫使李大亮侍中劉洎等交薦之召見拜監察御史後位至宰相白虎通曰諸侯所以貢士於天子者進賢稱善者也天躬求之者貪義也治國之道本在得賢得賢則治失賢則亂孔叢子曰子高見齊王齊王問誰可臨淄宰稱管穆焉王曰穆也容貌陋民不敬子高答曰夫見敬在德日臣所稱其才也君王聞晏子趙文子乎晏子長不過六尺面貎醜惡齊國上下莫不宗焉趙文子其身如不勝衣其言如不出口非但體陋辭氣又訥其相晉國晉國以寧諸侯敬服皆有德故也以穆軀形方諸二子猶悉賢之昔臣嘗行臨淄市見屠商焉身脩八尺鬚髪如㦸面正紅白市之男女未有敬之者無德故也王曰是所謂祖龍始者也誠如先生之言於是乃以管穆為臨淄宰韓子曰趙武薦四十六人於其君及武之死四十六人皆就賓位無其私德若此又曰武薦曰屋之士六十餘家戰國䇿曰淳于髠見七人於宣王王曰子來矣寡人聞千里一賢是比肩相望百世一聖若随踵而至者也今子一日而見七士不亦衆乎髠曰不然夫鳥同翼者而聚居獸同足者而俱行今求柴胡桔梗於沮澤則世不得一焉若求之梁父之隂則郤車而載耳夫物有儔等今髠賢者之儔王求士於髠譬如挹水於河而取火於燧也言易得也國語曰文公使原季為卿原季趙衰文公二年為原大夫辭曰夫三徳者偃之出也三徳欒枝先軫胥臣也偃狐偃也三子皆偃所進以徳紀民其章大矣不可廢也使狐偃為卿辭曰毛之智賢於臣其齒又長毛偃之兄也毛也不在位不敢聞命乃使狐毛将上軍狐偃佐之又曰趙宣子言韓獻子於靈公以為司馬河曲之役趙孟使人以其車乗干行秦與晉戰在晉文十一年獻子執而戮之衆咸曰韓厥必不沒矣其主朝升之而暮戮其車其誰安之宣子召而禮之曰吾聞事君者比而不黨夫周以舉義比也舉以其私黨也夫軍事無犯犯而不隠義也吾言汝於君懼汝不能也舉之而不能黨孰大焉勉之長臨晉國者非汝其誰勉之告諸大夫曰可賀我矣吾舉厥也而中吾乃今知免於罪矣免失舉之罪韓詩外傳曰魏文侯之時子質仕而獲罪焉去而北遊謂簡主曰吾所樹堂上之士半吾所樹朝廷之大夫半吾所樹邊境之人亦半今堂上之士惡我於明君朝廷大夫中我於法邊境之人刼我以兵是以不復樹徳於人簡主曰噫子言過矣春樹桃李夏得隂其下秋得食其實春樹蒺藜夏不得採其葉秋得其刺焉由此觀之在所樹也今子之所樹其非人耳吕氏春秋曰管仲病桓公徃問之曰仲父之病矣言其病困漬甚國人弗諱寡人將誰屬國管仲對曰昔者臣盡力竭智猶未足以知之也今病在於朝夕之中臣奚能言桓公曰此大事願仲父教寡人也管仲敬諾曰公誰欲相欲用誰相公曰鮑叔牙可乎管仲對曰不可夷吾善鮑叔牙牙之為人也清亷㓗直視不己若者不比於人一聞人之過終身不忘無己則隰朋其可乎隰朋之為人也上志而下求愧不若黄帝而哀不己若者自愧其徳不如黄帝又恐不若己也其於國也有不聞也不求聞其善志在利國而已其於物也有不知也物事也非是物不求知之其於人也有不見也務在濟民不求見也無己則隰朋可矣夫相大官也處大官者不欲小察不欲小智故曰大匠不斵但規模而已不自削大庖不豆和調五味不復自列大勇不鬬大兵不冦又曰魏公叔座疾恵王徃問之曰公叔之病甚矣将奈社稷何對曰臣之庶子鞅者願王以國聴之若不能聴勿使出境王不應出謂左右曰豈不悲哉夫以公叔之賢今謂寡人必以國聴鞅悖也公叔死公孫鞅西遊秦孝公聽之秦果强魏果弱又曰百里奚之未遇時至虢而虜飯牛於秦練以鬻五羊之皮公孫枝得而悦之獻諸穆公三日請屬事焉公曰貢之五羊之皮而臣之無乃為天下笑乎枝曰信賢而任之君之明也讓而下之臣之忠也君為明臣為忠彼信賢也境内将服敵國且畏夫誰暇笑我用之謀無不當舉必有功説苑曰田子方渡西河遇翟璜乗軒車子方曰子何以致此乎曰昔西河無守臣進呉起鄴無令臣進西門豹酸棗無令臣進屈侯鮒君欲攻中山臣進樂羊中山已㧞無使守之臣臣進李克進此五大夫爵倍於此又曰子貢問孔子曰今之臣孰賢孔子曰齊有鮑叔鄭有子皮子貢曰齊無管仲鄭無子産者乎孔子曰吾聞鮑叔之進管仲子皮之進子産未聞管仲子産有所進也又曰孟嘗君進客於齊王三年不見用故客反見曰不知臣之罪耶君之過耶孟嘗君曰寡人聞縷因鍼而入不因針而急女因媒而嫁不因媒而畜夫子之才必薄矣尚怨寡人哉客曰臣聞韓盧天下疾狗也見兎而指屬則不失兎望兎而放狗則累世不能得兎矣非不能屬者罪也於是孟嘗君復屬齊王王遂使為相又曰蘧伯玉使之楚逢公子晳濮水之上接草而待曰聞上士可以託邑中士可以託辭下士可以託才三言固可得託耶伯玉曰謹受命伯玉見楚王使事畢坐従容言士王曰何國最多士伯玉曰楚國多士而楚不能用王曰是何言也伯玉曰子胥生於楚而呉善用之賁皇生於楚而晉善用之今者臣之来逢子晳曰上士可以託邑中士可以託言下士可以託才三言者固可得託於是楚王發使追公子晳濮水之上子晳還重於楚伯玉之功也劉向新序曰楚莊王罷朝而晏樊姬問其故莊王曰與賢相語不知晏者也樊姬曰賢相為誰王曰虞丘子樊姬掩口而笑王乃問其故曰虞丘子為相數年未嘗進一賢不知賢是不智知而不進是不忠不忠不智安得為賢明日朝王以樊姫之言告虞丘子虞丘子稽首曰如姬之言於是辭位而進孫叔敖叔敖相楚而莊王霸樊姬之力也汝南先賢傳曰潁川鍾皓字季和為郡功曹太丘長陳寔為西門亭長皓深獨敬}
