  - {type: variant, offset: 2203, length: 511, content: 授朝廷以愷前啟拔舒而為王人人為愷怨之也宋書曰劉穆之為丹陽尹凡所薦達不納不止常云我雖不及荀文若之舉善然不舉不善又曰王鎮惡頗讀諸子兵書喜論軍國大事騎射非長而縱橫善果斷武帝伐廣固鎮惡時為臨灃令人或薦之武帝召與語異焉因留宿且謂參佐曰鎮惡王猛孫所謂將門有將即署前部賊曹破賊有功封博陸縣五等子又曰謝晦字宣明初為昶建威府中兵參軍孟昶死帝問劉穆之昶府誰堪入府穆之舉晦即命為太尉參軍武帝嘗訊獄其旦刑獄參軍有疾晦代之晦車中一覽訊牒隨問酬對無失即日署刑獄賊曹又曰張邵元嘉五年為征虜將軍領寧蠻校尉雍州剌史加都督初王華與邵不和及華參要親舊為之危心邵曰子陵子陵華字方弘至公豈以私隙害正義是任也華實舉之又曰晉平王休祐為南徐州帝就禇彥回求幹事人為上佐彥回舉沈文季轉騎長史東海太守又曰劉道產在雍州有惠化遂蠻歸懷皆出緣征為村落戶口殷盛及產死群蠻大為寇暴孝武西鎮襄陽江夏王羲恭薦柳元景乃以為武威將軍隨郡太守至廣設方略斬獲數百郡境肅然又曰荀伯子好學博覽經傳解褐奉朝請員外散騎侍郎著作郎徐廣重其才學舉伯子及王韶之並為佐郎同撰晉史齊書曰博昭字茂遠御史中丞劉俅薦於武帝永明初以為南郡王侍讀又曰孔休源字慶緒州舉秀才太尉徐孝嗣省其策深善之謂同坐曰觀此足稱王佐之才瑯琊王融雅, SBCK: 爲}
