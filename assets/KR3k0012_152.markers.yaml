  - {type: variant, offset: 62, length: 446, content: 置象大舡之上而刻其水痕所至稱物以載之則校可知矣太祖大悅時軍國多事用刑嚴重太祖馬鞍在庫而為鼠所齧庫吏懼必死欲面縛首罪猶懼不免冲謂曰待三日然後自歸冲於是以刃穿單衣如鼠齧者謬為失意貌有愁色太祖問之冲對曰世俗以為鼠齧衣者其主不吉今單衣見齧是以憂慼太祖曰此妄言耳無所苦也俄而庫吏以齧鞍聞太祖笑曰兒衣在側尚齧況鞍懸柱乎一無所問冲仁愛識達皆此類也太祖數對群臣稱述有欲傳後意年十三病卒太祖親為請命及亡哀甚文帝寬喻太祖太祖曰此我之不幸而汝曹之幸也又曰中山王衮建安二十一年封平鄉侯少好學年十餘歲能屬文每讀書文學左右常恐以精力為病數諫止之然性所樂不能廢也又曰樂陵王茂性傲很少無寵於太祖及文帝世又獨不王太和元年徙封聊城公其年為王詔曰昔象之為虐至甚而舜猶侯之有庳近漢氏淮南阜陵皆為亂臣逆子而錫土有虞建之於上古漢文明帝行之于前代斯皆敦敘親親之厚義也聊城公茂少不閑禮教長不務善道先帝以為古之立諸侯也皆命賢者故姬姓未有不為侯者是以獨不王茂太皇太后數以為言如聞茂頃來小知悔昔之非今封茂為聊城王以慰太皇太后下流之念又曰任城威王彰, SBCK: 朱據}
