  - {type: variant, offset: 7, length: 0, content: '', SBCK: 女皆封縣亭公主儀服同郷亭侯肅宗唯特封東平憲王蒼瑯瑘孝王京女爲縣公主其後安帝桓帝妹亦封長公主同之皇女皇女封公主者所生之子襲母封爲列侯皆傳國于後郷亭之封則不傳襲又曰光武姊湖陽公主新寡帝與共論朝臣微觀其意主曰宋公威容德器羣臣莫及帝曰方且圖之後宋􅀪􅀍引見帝令主坐屏風後因謂􅀪曰喭言貴易交冨易妻人情乎􅀪曰臣聞貧賊之交不可忘糟糠之妻不}
  - {type: variant, offset: 7, length: 1, content: 下, WYG: 死}
  - {type: variant, offset: 7, length: 0, content: '', krp: 女皆封縣亭公主儀服同郷亭侯肅宗唯特封東平憲王蒼瑯瑘孝王京女爲縣公主其後安帝桓帝妹亦封長公主同之皇女皇女封公主者所生之子襲母封爲列侯皆傳國于後郷亭之封則不傳襲又曰光武姊湖陽公主新寡帝與共論朝臣微觀其意主曰宋公威容德器羣臣莫及帝曰方且圖之後宋弘𬒳引見帝令主坐屏風後因謂弘曰喭言貴易交冨易妻人情乎弘曰臣聞貧賊之交不可忘糟糠之妻不}
