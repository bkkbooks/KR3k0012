  - {type: variant, offset: 4232, length: 2, content: 皇后, SBCK: 第三女徐淑媛所生適桓濟重適王獻之晉讃曰初衛瓘子宣尚世祖女繁昌公主宣遇黄門不厚致有讒構楊駿欲專朝政諷内外奪宣公主瓘由此去位上㑹諸妃主議問主宣待汝薄今欲離汝意云何主素訥不能自申但泣泣是不欲離諸主因言泣是婦人重於再出故泣耳於是遂離與姑妹書稱故新婦宋書曰公主納徴虎豹皮各一又曰王偃字子游母晉孝武帝女弟鄱陽公主宋受禪封永成君偃尚宋武帝第二女呉興長公主諱榮男常倮偃􅅞諸庭樹時天夜雪噤凍乆之偃兄恢排閤告主乃免偃謙虚恭謹不以世事􅀜懷位右光禄大夫贈開府儀同三司子藻位東陽太守尚文帝第六女臨川長公主諱英媛公主性妬而藻別愛左右人呉崇祖景和中主讒之於廢帝藻下獄死主與}
  - {type: page-break, offset: 4232, content: '', id: KR3k0012_SBCK_152-8a}
