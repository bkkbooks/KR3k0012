  - {type: variant, offset: 2041, length: 240, content: 十人崇飾綺麗費用殷廣又曰江夏王義恭性嗜不恒與時移變自始至終屢遷弟宅與人遊款意好亦多不終而奢侈無度不受財寶前廢帝狂勃無道義恭元景等謀欲廢立永光元年八月廢帝親率羽林兵於第害之并其四子時年五十三斷折義恭支體分裂腸胃挑取眼睛以蜜漬之謂之為鬼目粽又曰衡陽王義季為荊州刺史先是臨川王義慶在任巴蜀亂擾師旅應接府庫空虛義季躬行節儉蓄財省用數年間還復充實隊主續豐母老家貧無以充養遂斷不食肉義季哀其志給豐母月白米二斛錢一千并制豐噉肉義季素拙書上聽使餘人書啟事唯自署名而已二十一年徵為都督南徐兗青冀幽六, SBCK: ''}
