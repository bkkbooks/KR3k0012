  - {type: variant, offset: 32, length: 143, content: 若成人之智孫權曾致巨象太祖欲知其斤重訪之群下咸莫能出其理冲曰置象大舡之上而刻其水痕所至稱物以載之則校可知矣太祖大悅時軍國多事用刑嚴重太祖馬鞍在庫而為鼠所齧庫吏懼必死欲面縛首罪猶懼不免冲謂曰待三日然後自歸冲於是以刃穿單衣如鼠齧者謬為失意貌有愁色太祖問之冲對曰世俗以為鼠齧衣者其主不吉今單衣, WYG: 先}
