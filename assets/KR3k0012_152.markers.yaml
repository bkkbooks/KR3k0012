  - {type: variant, offset: 3805, length: 282, content: 王者妃勢不復為吏臣妻自愛從此長辭遂飲藥而死時年十八唐姬潁川人也王薨歸鄉里父欲嫁之姬誓不許及李𠐶破長安遣兵抄關東略得姬𠐶因欲妻之不聽而終不自名尚書賈詡知之以狀白獻帝帝聞感愴乃下詔迎姬置園中使侍中持節拜為弘農王妃魏志曰中山恭王袞得病詔遣太醫視疾又遣太妃沛王林並就省疾又曰彭城王據建安十六年封范陽侯以環太妃彭城人徙封彭城吳志曰吳主孫權謝夫人會稽山陰人也父煚權聘以為妃愛幸有寵後權納姑孫徐氏欲令謝下之不肯由是失志早卒又曰吳主孫權徐夫人吳郡富春人也祖父真與權父堅相親堅以妹妻真生琨琨生夫人初適同郡陸尚尚卒權為討虜將軍在吳娉以為妃後母養子登後權遷移以夫人妬忌廢處吳積十餘年尋卒, SBCK: 莫近禁臠}
