  - {type: punctuation, offset: 8, content: 《, id: KR3k0012_CHANT_152-bkkpn1}
  - {type: variant, offset: 8, length: 0, content: '', SBCK: 堂帝顧主曰事不諧矣又曰董宣爲洛陽令時湖陽公主蒼頭白日殺人因匿主家吏不能得及主出行而以奴驂乗宣於夏門候之乃駐車叩馬以刀畫地大言數主之失叱奴下車因杖殺之主即還宫訴帝帝大怒召宣欲箠殺之宣叩頭曰願乞一言而死帝曰欲何言宣曰陛下聖德中興而縱奴殺良民將何以治天下乎臣不須箠請得自殺即以頭擊楹血􅀍靣帝令小黃門持之使宣叩頭謝主宣不從帝強使頓之宣兩手據地終不肯俯主曰文叔爲白衣時藏亡匿死吏不敢至門今爲天子威不能行一令乎帝􅀏曰天子不與白衣同又曰鄧晨初娶丗祖姊元及漢兵起晨將賔客㑹􅁄陽兵敗丗祖即位封晨房子侯帝又感悼姊没於亂兵追封謚元爲新野節義長公主立廟于縣西封晨長子汎爲呉房侯以奉公主之祀又曰竇憲字伯度女弟立爲皇后憲恃宫掖聲勢遂以賤直請奪沁水公主園田主逼畏不敢計後肅宗駕出過園指以問憲憲喑嗚不能對又曰班始尚清河孝王女隂城公主順帝之姑貴驕􅁋亂與所嬖人居帷中召始入使伏牀下始積怒永建五年遂抜刀殺主帝大怒腰斬始同産皆弃市又曰竇融長子䄓尚内黄公主子勲尚東海恭王彊女比陽公主又子固亦尚世祖女􅄺陽公主竇氏一公兩侯三主親戚功臣中莫與爲比又曰皇女義王建武十五年封舞陽公主適延陵郷侯大僕梁松舞陽縣屬潁川郡松梁統之子其傳云尚光武女舞隂公主又鄧訓傳舞隂公主子梁扈有罪與交通此云舞陽誤松坐誹謗誅又曰皇女中禮十五年封􅄺陽公主適顯親侯大鴻臚竇固􅄺陽屬南陽郡顯親縣屬漢陽郡固竇融子肅宗尊爲長公主皇女紅夫十五年封館陶公主適駙馬都尉韓光光坐與淮陽王延謀反誅又曰館陶公主爲子求郎明帝不許而賜錢千萬謂羣臣曰郎官上應列宿出宰百里有非其人則民受其殃是以難之也又曰明帝永平二年少府隂就子豐殺妻酈邑公主就坐自殺續漢書曰印璽綬王公玉匣銀縷夫人貴人長公主絧縷謝承後漢書曰楊喬爲尚書容儀偉麗數上書言政事桓帝愛其才貌詔妻以公主喬固讓不聽遂閇口不食七日而死}
