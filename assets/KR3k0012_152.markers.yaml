  - {type: variant, offset: 14, length: 10, content: 冲字倉舒少聰察歧嶷生, SBCK: 植到􅀜自念有過冝當謝帝乃留其從官着􅀜東將兩三人微行見清河公主欲因主以謝而􅀜吏以聞帝使人逆之不得太后以爲自殺也對帝泣下魏末傳曰何晏婦金郷公主即晏同母妹公主賢明謂其母沛王太妃曰晏爲惡日甚將不保身母􅀏曰汝得無妬晏耶俄而晏死有一男年}
