  - {type: variant, offset: 176, length: 640, content: 齧是以憂慼太祖曰此妄言耳無所苦也俄而庫吏以齧鞍聞太祖笑曰兒衣在側尚齧況鞍懸柱乎一無所問冲仁愛識達皆此類也太祖數對群臣稱述有欲傳後意年十三病卒太祖親為請命及亡哀甚文帝寬喻太祖太祖曰此我之不幸而汝曹之幸也又曰中山王衮建安二十一年封平鄉侯少好學年十餘歲能屬文每讀書文學左右常恐以精力為病數諫止之然性所樂不能廢也又曰樂陵王茂性傲很少無寵於太祖及文帝世又獨不王太和元年徙封聊城公其年為王詔曰昔象之為虐至甚而舜猶侯之有庳近漢氏淮南阜陵皆為亂臣逆子而錫土有虞建之於上古漢文明帝行之于前代斯皆敦敘親親之厚義也聊城公茂少不閑禮教長不務善道先帝以為古之立諸侯也皆命賢者故姬姓未有不為侯者是以獨不王茂太皇太后數以為言如聞茂頃來小知悔昔之非今封茂為聊城王以慰太皇太后下流之念又曰任城威王彰字子文少善射御膂力過人手格猛獸不避險阻數從征伐志意慷慨太祖常抑之曰汝不念讀書慕聖道而好乘汗馬擊劍此一夫之用何足貴也或諫彰讀書彰謂左右曰大丈夫一為衛霍將十萬騎馳沙漠驅戎狄立功建號耳何能為愽士耶又曰陳思王植字子建年十餘歲讀誦時論及辭賦數十萬言善屬文太祖嘗視其文謂植曰汝情人耳植跪曰言出為論下筆成章顧當面試奈何倩人時鄴銅爵臺新成太祖悉將諸子登臺使各為賦植援筆立成可觀太祖甚異之性簡易不治威儀輿馬服飾不尚華麗每進見難問應聲而對特見寵愛蜀志曰魯王永字公初永憎官人黃皓皓既信任用事構永於後主稍䟽外永至不得朝見者十餘年吳書曰南陽王和字子孝被譴之長沙行過蕪湖有鵲巢于帆檣故官僚聞之皆憂慘以為檣非久安之象或言鵲巢之詩有積行累功以致爵位, WYG: ''}
