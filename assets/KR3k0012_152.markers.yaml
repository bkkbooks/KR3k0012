  - {type: variant, offset: 2514, length: 1289, content: 地傾意賓客天下才學皆遊集焉後魏書曰河南王平原拜齊州刺史善於懷撫邊民歸附者千有餘家時歲頻不登齊民飢饉平原以私米三千餘斛為粥以全民命北州戍卒一千餘人還者皆給路糧百姓咸稱詠之州民韓凝之等千餘人詣闕訟之高祖覽而嘉歎又曰任城王澄字道鏡少好學文明太后引見誡厲之顧謂中書令李冲曰此兒風神秀發德音閑婉當為宗室領袖後為中書令改授尚書蕭顧使庾蓽來朝蓽見澄音韻遒雅風儀秀逸謂主客郎張彝曰往魏任城乃以文見美也又曰安定王休少而聰慧治斷有稱車駕南伐領大司馬高祖親行軍遇休以三盜人徇於軍將斬之有詔赦之休執曰陛下親御六師跋涉野次軍行始爾已有奸切如其不斬何以息盜請必行刑以肅奸匿詔曰大司馬執憲誠應如是但因緣會朕聞王者之體亦應有非常之澤雖違軍法可特原之休乃奉詔高祖謂司徒馮誕曰大司馬嚴而秉法諸君不可不慎於是六軍肅然又曰永昌王健姿貌魁壯善弓馬達兵法所征戰常有大功才藝比陳留桓王而智略過人又曰臨淮王彧字文若少有才學時譽甚美侍中崔光見彧退而謂人曰黑頭三公當此人也瑯琊王誦有名人也見之未嘗不心醉忘疲又曰東平王匡字建扶性耿介有氣節高祖器之謂曰叔父必能儀刑社稷匡輔朕躬今可改名為匡世宗即位時茹皓始有寵百寮微憚之世宗曾於山陵還詔匡陪乘又命皓登車皓褰裳將上匡諫上世宗推之令下當時壯其忠謇又曰廣陵王羽字叔飜少而聰惠有斷獄之稱領廷尉高祖幸羽第與諸弟言曰朕昨親受民訟始知廣陵之明了咸陽王禧對曰臣年為廣陵兄明為廣陵弟高祖曰我為汝兄汝為羽昆汝復何恨又曰彭城王勰字產和小而歧嶷姿性不群勰生而母潘氏卒及有所知啟求追服文明太后不許乃毀瘠三年不參吉慶高祖大奇之敏而躭學不捨晝夜愽綜經史雅好屬文從征河北破新野南陽高祖令勰為露布勰辭曰臣聞露布者布於四海露之耳目必須威示天下以臣小才豈是大用高祖曰但可為之及就尤類帝文有不見者咸謂御筆高祖曰汝所為者人謂吾制非兄則弟誰能辯之北史齊書曰安德王延宗文襄第五子母陳氏廣寧王伎也延宗幼為文宣所養年十二猶騎置腹上令溺已齊中抱之曰可憐止有此一箇問欲作何王對曰欲衝天王文宣問楊愔愔曰天下無此郡名願使安於德於是封安德焉隋書曰楊雄高祖族子也初封清漳王仁壽初高祖曰清漳之名未允聲望命職方進地圖上指安德郡以示群臣曰此號足為名德相稱於是改封安德王唐書曰紀王慎為貝州刺史慎少好學長於文吏皇族中與越王貞齊名時人號為紀越賈誼書曰高皇帝分天下以封有功之臣反者如蝟毛而起高皇帝以為不可是故去不義諸侯空其國擇良日立諸子雒陽上東門之外諸子畢王而天下乃安蔡邕獨斷曰漢制皇子封為王其實諸侯也周末諸侯或稱故以王號加之總名諸侯王法律家皆曰列侯天子大社以五色土為壇皇子封為王者受天子太社之土以所封之方色東方受青南方受赤他以其方色藉以白茅歸國以立社稷謂之茅土王妃史記曰趙王友以諸呂女為后弗愛愛他姬諸呂女妬怒讒之太后誣以罪太后怒以故召趙王趙王至置邸不見命衛士圍守之弗與食趙王餓迺歌曰諸呂用事兮劉氏危迫脅王侯兮強授我妃我妃既妬兮誣我以惡讒女亂國兮上曾不寤續漢書曰樂安陳夫人孝質皇帝母也家本魏郡少以伎入孝王家得幸生質帝梁冀欲專國權令帝母不得至京都又帝短祚是以外家無他寵帝拜夫人為王妃范曄後漢書曰董卓置弘農王於閣上使郎中令李儒進酖王乃與妻唐姬及宮人別坐者皆歔欷王謂姬, SBCK: 珣}
