  - {type: variant, offset: 1509, length: 16, content: 子拜大將軍領西戎校尉因大會語王銓, SBCK: ''}
  - {type: variant, offset: 1509, length: 357, content: 子拜大將軍領西戎校尉因大會語王銓曰我從兄為尚書令不能啖大臠銓知肜求為尚書令荅曰下邳王為令與天下共嚼啖大臠故難公在此獨嚼肜曰長安大臠誰耶詮荅盧播是肜曰是吾家吏隱忍之耳詮曰天下皆王家吏王法可不復行之耶又曰齊王攸好學不倦借人書皆為治護時還有水旱則出租秩加賤以賑國人須豐年乃收入本直太康三年詔齊王攸當出方嶽遂撫其國加都督青州增封濟南郡備物典策軒懸之樂六佾之舞賜黃鉞朝車乘輿之副晉陽秋曰齊王輔政士以牛酒郊勞平原王幹獨齎百錢于懷賀之晉中興書曰譙王丞鎮湘州至武昌釋軍備見王敦敦因宴集謂丞曰大王雅素佳士非將御才也丞曰公未盡耳安知鈆刀不能一割丞以敦欲測其情故發此言敦果謂錢鳳曰彼不知懼而學壯語此之不武何能為聽丞之鎮又曰武陵威王晞為桓溫所收忠敬王少子也被廢後新安王遵初封新寧王年十二受拜流涕哀慼左右將軍桓伊當造遵遵恕門人曰何通桓氏門人, WYG: ''}
