  - {type: variant, offset: 551, length: 439, content: 乘汗馬擊劍此一夫之用何足貴也或諫彰讀書彰謂左右曰大丈夫一為衛霍將十萬騎馳沙漠驅戎狄立功建號耳何能為愽士耶又曰陳思王植字子建年十餘歲讀誦時論及辭賦數十萬言善屬文太祖嘗視其文謂植曰汝情人耳植跪曰言出為論下筆成章顧當面試奈何倩人時鄴銅爵臺新成太祖悉將諸子登臺使各為賦植援筆立成可觀太祖甚異之性簡易不治威儀輿馬服飾不尚華麗每進見難問應聲而對特見寵愛蜀志曰魯王永字公初永憎官人黃皓皓既信任用事構永於後主稍䟽外永至不得朝見者十餘年吳書曰南陽王和字子孝被譴之長沙行過蕪湖有鵲巢于帆檣故官僚聞之皆憂慘以為檣非久安之象或言鵲巢之詩有積行累功以致爵位之言今王至德茂行當復國儻神靈以此告寤人意乎吳志曰魯王霸字子威和同母弟也和為太子霸為魯王寵愛崇特與和無殊頃之和霸不穆之聲聞於權耳權禁斷往來假以精學又曰齊王奮字子揚居武昌權薨太愽諸葛恪不欲諸王處江濱兵馬之地徙奮於豫章奮怒不從命又數越法度恪上牋諫曰帝王之尊與天同位是以家天下臣父兄大王宜上惟太伯順父之志中念河間獻王東海王彊恭敬之節下當存抑驕恣荒亂以為警戒, SBCK: 施}
