  - {type: variant, offset: 1079, length: 155, content: 德屬尊當宣化樹教為群后作則遂備置官屬焉又以孚內有親戚外有交遊惠下之費而經用不豐奉絹二千疋及元會詔孚輿車上殿帝於階迎拜既坐帝親奉觴上壽如家人禮帝每拜孚跪而止之又給以雲母輦青蓋車孚雖見尊寵不以為榮常有憂色又曰安平獻王孚性通和以貞白自立未嘗有怨於人陳留殷武有名於海內嘗罹罪譴孚性省之遂與同處分食談者稱焉又曰平原王幹字, SBCK: 終無}
