  - {type: variant, offset: 1665, length: 375, content: 青州增封濟南郡備物典策軒懸之樂六佾之舞賜黃鉞朝車乘輿之副晉陽秋曰齊王輔政士以牛酒郊勞平原王幹獨齎百錢于懷賀之晉中興書曰譙王丞鎮湘州至武昌釋軍備見王敦敦因宴集謂丞曰大王雅素佳士非將御才也丞曰公未盡耳安知鈆刀不能一割丞以敦欲測其情故發此言敦果謂錢鳳曰彼不知懼而學壯語此之不武何能為聽丞之鎮又曰武陵威王晞為桓溫所收忠敬王少子也被廢後新安王遵初封新寧王年十二受拜流涕哀慼左右將軍桓伊當造遵遵恕門人曰何通桓氏門人曰桓伊與桓溫踈宗相見無嫌遵曰我聞人姓木邊便欲殺之況諸桓乎由是少稱聰察及長輒凡退無復名望晉百官表曰王古號也夏殷周稱王金璽龜釰纁朱綬五時朝服遠遊冠佩山玄玉沈約宋書曰彭城王義康性好吏職銳意文案糺剔是非凡所陳奏入無不可方伯並委義康授用由是朝野輻湊勢傾天下義康亦自彊不息無有懈倦又曰南郡王義宣為荊州刺史白晳美鬚眉長七尺五寸腰帶十圍多畜嬪媵後房千餘尼媼數百男女, SBCK: 荆梁}
