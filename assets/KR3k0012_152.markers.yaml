  body:
  - {type: variant, offset: 4, length: 1, content: 七, SBCK: 八公主易㤗卦曰帝乙歸妹以祉元􅁻婦人謂嫁曰歸㤗者隂陽交秦之時女隨尊位履中居順帝乙歸妹誠合斯義尚書堯典曰􅁵降二女于嬀汭嬪于虞注云降下也嬪婦也楚辭曰帝子降兮北渚目渺渺兮愁予王逸注曰黄子堯子也毛詩曰何彼穠矣美王􅁎也雖則王􅁎亦下嫁於諸侯車服不繫其夫下王后一等猶執婦道以成肅雍之德也何彼穠矣棠棣之華􅂚不肅雝王􅁎之車何彼穠矣華如桃李平王之孫齊侯之子春秋左傳曰襄四年曰昔虞閼父爲周陶正以服事我先王閼父舜之後當周之興閼父爲武王陶正我先王頼其利器用也與其神明之後也舜聖故謂之神明庸以元女大􅁎配胡公庸用也元女武王之長女胡公閼父之子滿也而封諸陳以備三恪周得天下封夏殷二王後又封舜後謂之恪并二王後爲三國其禮轉降示敬而巳故曰三恪又莊元年曰單伯送王􅁎王將嫁女于齊命魯爲主故單伯送天子嫁女於諸侯使同姓諸侯主之不親昏尊卑不敵築王􅁎之館于外公羊傳曰天子嫁女于諸侯天子至尊不自主婚必使諸侯同姓者主之史記曰婺女天孫也又曰公叔相魏尚魏公主而害呉起公叔之僕曰易去也魏相曰奈何其僕曰呉起爲人節廉而自喜也君因先與武侯言曰夫呉起賢人也而侯之國小又與強􅁗壤界竊恐呉越之無留心也侯即曰奈何因謂侯曰恐試近以公主起有留心則必愛無留心則必辭侯以此卜之君因召呉起而與歸即令公主怒而輕君起見公主之輕君也則必辭於是呉起見公主之賤魏相果辭魏武侯魏武侯疑之而不信也又曰李斯長男由爲三川守諸男皆尚􅁗公主諸女悉嫁諸公子由告歸咸陽斯置酒于家百官長皆前爲壽門庭車􅀐以千數漢書曰單于兵強數苦北邊上問婁敬敬曰陛下誠能以嫡公主妻單于厚奉遺之彼知漢女送厚蠻夷必慕以爲閼氏生子必爲太子豈曾聞外孫與大父抗禮哉又曰周勃下廷尉吏侵辱之勃以千金與獄吏獄吏迺書牘背示之曰以公主爲證公主孝文女也勃子勝尚之故獄吏敎引爲證又曰宣平侯張敖尚惠帝姊魯元公主有女惠帝即位吕太后欲爲重親以公主女配帝又曰孝武衛皇后字子夫爲平陽主謳者武帝即位數年無子過平陽主旣飲謳者進帝獨􅀃子夫帝起更衣子夫侍尚衣軒中得幸還坐甚忻賜平陽主金千斤子夫上車主拊其背曰行矣強飯勉之即貴願無相忘又曰烏孫以馬千疋娉女漢元封中遣江都王建女細君爲公主以妻焉賜乗輿服御物爲備官屬侍御數百人贈送甚盛烏孫昆莫以爲右夫人公主至其國自治宫室昆莫年老言語不通公主悲愁自爲作歌天子聞而憐之遣使持帷帳錦繡給遺焉又曰林慮公主子昭平君尚武帝女夷安公主林慮病困以金千斤錢千萬爲昭平君豫贖死罪帝許之林慮公主卒昭平日驕醉殺主傅母繫獄廷尉上請左右爲言前入贖陛下許之帝曰吾弟老有是一子死以囑我故於是爲之垂涕良乆曰法令先帝所造因弟故而誣先帝之法吾何靣目入髙廟乎遂可其奏又曰昭帝始立年八歳帝長姊鄂邑盖長公主居禁中共養帝盖公主私通客河間丁外人上與大將軍聞之不絶主懽有詔外人侍長公主又曰初帝姑館陶公主號竇大主堂邑侯陳午尚之午死主寡居年五十餘矣董偃始與母以賣珠爲事年十三隨母出入主家左右言其姣好召見曰吾爲母養之因留第中敎書計相馬御射頗讀傳記至年十八冠出則執轡入則侍內爲人温柔愛人以故諸公接之名稱城中號曰董君又曰梁王以至親故得自置相二千石出入遊戲僭於天子天子聞之心不善太后知帝弗善迺怒梁使者弗見按責王所爲梁使見太長公主如淳曰景帝姊也而泣曰何梁王爲人子之孝爲人臣之忠太后曾不省也長公主具以告太后太后喜爲帝言之帝心迺解又曰烏孫公主遣女來至京師學鼔琴漢遣侍郎樂奉送主女過􅀛兹􅀛兹前遣人至烏孫求公主女未還㑹女過􅀛兹􅀛兹王器留不遣復使使報公主公主許之後公主上書願令女比宗室入朝而􅀛兹王絳賔亦愛其夫人上書言得尚漢外孫爲昆弟願與公主女俱入朝後數来朝賀樂漢衣服制度歸其國治宫室作徼道周衛出入傳呼如漢家儀外國胡人皆曰驢非驢馬非馬􅀂􅀛兹王所謂騾也又曰薛宣封爲侯時妻死而敬武馬公主寡居上令宣尚焉及宣免歸故郡公主留京師後宣卒公主上書願還宣葬延陵奏可其子況私從燉煌歸長安㑹赦因留與主私亂後漢書曰漢制皇女皆封縣公主儀服同列侯其尊崇者加號長公主儀服同蕃王}
