  - {type: variant, offset: 1419, length: 408, content: 一說魚二千斤鮫也一捿不兩雄一則定兩則爭以喻日月不得並明一國不可兩君也又曰流源千里深淵百仞非為蛟龍也又曰山致其高而雲雨起焉水致其深而蛟龍生焉君子致其道而福祿歸焉又曰君子之居民上若以腐索御奔馬雍容恐失民意若展足薄冰蛟在其下蛟龍屬皮有珠能害人故曰蛟在其下孫卿子曰積水成川蛟龍生焉呂氏春秋曰前有佽飛者得寶劍於干將遂還及涉江至於中流有兩蛟夾繞其舩佽飛仗寶劍曰此中腐骨朽肉也赴江剌蛟殺之荊王聞之仕以執珪馬明生別傳曰明生捕賊為賊所傷道間見神女以肘後管中一丸藥與服即愈隨女入岱宗山石室金床玉几安期生從六七仙人見神女稱下官請陽九百六之數神女曰自頃四海水減溟湖成山連城之鯨萬丈之蛟不達斯運之度唯叩天索水辭訟紛紜有於上府三反煩於省察司陰亦疲於謹案矣西京雜記曰瓠子河決有蛟龍從九子自決中逆上人河濆沫流波凡數十里又曰董仲舒夢蛟龍入懷乃作春秋繁露裴淵廣州記曰新寧郡東溪甚饒蛟及時害人曾於魚梁上得之其長丈餘形廣如楯脩頸小頭胸前赭背上青班脇邊若錦尋, SBCK: 洛}
