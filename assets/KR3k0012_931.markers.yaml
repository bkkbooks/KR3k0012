  - {type: variant, offset: 1336, length: 1, content: 蛟, SBCK: 大苦山陽狂水出焉注于伊水中多三足􅀛星經曰天􅀛五星在南漢中廣志曰觜兹維切􅏲夷焦切形如􅀛出交州山􅀛在山上食草長尺餘栁氏􅀛經曰􅀛一千二百嵗可卜天地之終始何以言之三千四十二占於天地千􅀊之􅀛甲黒􅀛有五色時用之神仙傳曰南極子融即柸呪之即成􅀛煑之可食腹藏皆具柸成􅀛殻煑取􅁏還成柸㑹稽後賢傳曰孔愉字敬康甞至呉興餘不亭見人籠􅀛於路愉求買而放於溪中􅀛行至水反顧視愉及封此亭而鑄印􅀛首廻屈三鑄不正有}
  - {type: variant, offset: 1336, length: 4, content: 蛟似虵而, WYG: 大苦山陽狂水出焉注於伊水中多三足龜星經曰天龜二百五星在南漢中廣志曰觜􅏲形如龜出在交州山龜在上食草長尺餘柳氏龜經曰龜一千二百歳可卜天地之終始何以言之三千}
