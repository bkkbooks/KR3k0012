  - {type: variant, offset: 1135, length: 3, content: 周處字, krp: 開皇中掖庭宫毎有人來挑宫人宫司以聞帝曰門衛甚嚴人何從而入當是妖精耳因戒宫人曰若逢但斫之其後有物如人夜來登床宫人抽刀斫之若中枯骨其將落牀而走宮人逐之因入池而没明日帝令涸池得一龜徑尺餘其上有刀迹煞之遂絶唐書曰先天二年丁未江州獻靈龜六眸腹下有玄文象卦文梁記曰朱友貞末年許州獻緑毛龜以爲瑞因宮中造室以居之目爲龜堂晉史曰安州李金全之將叛也郡樓有介蟲如龜而巨鱗銳首能䧟堅出於金全足下金金惡而焚之列}
