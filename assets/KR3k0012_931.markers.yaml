  - {type: variant, offset: 2051, length: 15, content: 漢昭帝常遊渭水使群臣漁釣為樂時, SBCK: 崑崙山第五層}
  - {type: variant, offset: 2051, length: 3, content: 漢昭帝, WYG: 崑崙山第五層有神龜長一尺九寸四翼萬歳則無水而居也亦能言矣郭子横洞溟記曰黄安代郡人也嘗辭家逺去自云不敢處人間執鞭有懐欲書畫地以記其數一夕地成池矣後更移亦復成池時人謂言黄安舌耕年可八十餘視若童子}
  - {type: variant, offset: 2051, length: 15, content: 漢昭帝常遊渭水使群臣漁釣為樂時, krp: 崑崙山第五層}
  - {type: variant, offset: 2055, length: 8, content: 遊渭水使群臣漁釣, WYG: 服硃砂舉體皆赤冬不着衣坐一大神龜時人問子坐此龜幾年對曰昔伏羲氏始造網罟有此龜以授吾龜背已平此蟲畏日月之光二千歳而一出頭我坐此龜以來五遇出頭矣行則負龜而移世人謂黄安萬歳博物志曰人有出行墜深澗中者無出路飢餓分死左右見龜虵甚多朝暮引頸向東方人因伏地學之遂不復飢體殊輕便能登巖㟁經數年後試竦身舉背遂超出澗上即得還家顔色恱懌頗更黠慧其後還食穀啖滋味百餘日中復其本質又曰龜三千歳猶旋卷耳之上蓍千歳三百莖同本以老故知吉凶神異經曰西方大荒中有人焉長文其腹圍九尺踐龜虵戴朱鳥知河海升斛識山石多少知天下鳥獸言語續捜神記曰司徒蔡謨親友王䝉者單獨常}
