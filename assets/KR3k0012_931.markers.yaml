  - {type: variant, offset: 2747, length: 203, content: 三蛟子至其墓所哭之經日乃去聞其哭聲狀如狗號又曰安城平都縣尹氏居在郡東十里曰黃屯尹佃舍在焉元嘉二十三年六月中尹兒年十三守舍見一人可年二十許騎白馬張繖及從者四人衣並黃色從東方而來於門呼尹兒來暫寄息因入舍中庭下坐床一人捉繖覆之尹兒看其衣悉無縫馬五色班似鱗甲而毛有頃雨氣至此人上馬去顧遇尹兒曰明日當更來尹兒觀其去西行躡虛而漸升須臾雲四合白晝為之晦暝明日大水暴出山谷沸涌丘壑淼漫將掩尹舍忽見大蛟長三丈餘盤屈庇其舍頭焉, SBCK: ''}
