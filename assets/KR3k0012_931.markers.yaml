  - {type: variant, offset: 1322, length: 2, content: 竭澤, SBCK: 孔子問􅃮彫馮曰子事臧文仲武仲及孺子容此三大夫者孰爲賢乎對曰臧氏家有守􅀛焉文仲三年}
  - {type: variant, offset: 1322, length: 2, content: 竭澤, WYG: 孔子問漆彫馮子曰臧文仲及孺子容三大夫者孰為賢乎對曰臧氏家有守龜焉文仲三年}
  - {type: variant, offset: 1322, length: 2, content: 竭澤, krp: 孔子問􅃮彫馮曰子事臧文仲武仲及孺子容此三大夫者孰爲賢乎對曰臧氏家有守龜焉文仲三年}
  - {type: variant, offset: 1325, length: 1, content: 漁, SBCK: 爲一兆武仲三年而爲二兆孺子容三年而爲三兆馮從此見之􅀂夫三人之賢與不賢所未敢識也孔子曰君子哉􅃮彫氏之子其言人之美也隱而顯言之過也微而著智不能及明不能見孰克如之論衡曰􅀛三百歳大如錢游華葉上三千嵗}
  - {type: page-break, offset: 1325, content: '', id: KR3k0012_SBCK_931-7b}
  - {type: variant, offset: 1325, length: 1, content: 漁, WYG: 為一兆武仲三年而為二兆孺子容三年而為三兆馮從此見之若夫三人之賢與不賢所未敢識也孔子曰君子哉漆彫氏之子其言人之美也隠而顯言人之過也㣲而著智不能及明不能見孰克如之論衡曰龜二百歳大如錢游草葉上三千歳}
