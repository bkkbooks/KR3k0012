  - {type: variant, offset: 1069, length: 1, content: 鼉, SBCK: 黿甲􅀋秋乃堅成故是月登取又學記曰青黒縁者天子之寳􅀛也又禮運曰麟鳯􅀛龍謂之四靈逸禮曰天子􅀛尺二寸諸侯八寸大夫六寸士民四寸􅀛者隂蟲之老也􅀛三千歳上游於卷耳之上老者先知故君子舉事必考之禮統曰神􅀛之象上貟法天下方法地背上有盤法丘山玄文交錯以成列宿五光昭􅀂玄錦文運轉應四時長尺二寸明􅁻凶不言而信左傳襄二十三年曰臧武仲自邾使告臧賈且致犬蔡焉大蔡臧文仲所居大􅀛也曰紇不佞失守宗祧祧廟敢告不吊言我爲人後不至於道而失守紇之罪不及不祀不祀絶也言冝有後也子以大蔡納請其可請爲先人立後其必可也賈曰聞命矣再拜受􅀛公羊傳定公曰弓繡質質祔􅀛青純純縁春秋運斗樞曰瑶光星散爲􅀛}
  - {type: page-break, offset: 1069, content: '', id: KR3k0012_SBCK_931-2b}
  - {type: variant, offset: 1069, length: 1, content: 鼉, WYG: 黿又學記曰青黑者天子之寶龜也禮運曰麟鳳龜龍謂之四靈逸禮曰天子龜尺二寸諸侯八寸大夫六寸民士四寸龜者隂蟲之老也龜三千歳游於卷耳之上老者先知故君子舉事必考之禮統曰神龜之象上員法天下方法地背上有盤法邱山黝文交錯以成列宿五光昭若黝錦文運轉應四時長尺二寸明吉凶不言而信左傳襄四月臧武仲自邾使告臧賈且致大蔡焉大蔡即文仲所居也紇不佞失守宗祧敢告不弔言我為人後不至于道而失守紇之罪不及不祀不祀絶也言不當絶祀也子以大蔡納請其可請為先人立後其必可也賈曰聞命矣再拜受龜公羊傳定公曰弓繡質弓柎龜青純春秋運斗樞曰瑶光星㪚為龜}
