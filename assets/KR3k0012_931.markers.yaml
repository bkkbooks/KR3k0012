  - {type: variant, offset: 1620, length: 6, content: 明生捕賊為賊, WYG: 南極子融執杯呪之即成龜煮之可食腹臟皆具杯成龜穀煮取肉還成杯㑹稽後賢傳曰孔愉字敬康嘗至吳興餘不亭見人籠龜於路愉求買而放於溪中龜行至水反顧視及愉封此亭而鑄印龜首廻屈三鑄不正有似昔龜之顧靈徳感應如此華陽國志曰秦惠王十二年張儀司馬錯破蜀克之儀因築城城終頺壊後有一大龜從硎而出周行旋走乃依龜行}
