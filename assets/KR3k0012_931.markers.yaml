  - {type: variant, offset: 2064, length: 8, content: 樂時有大夫任緒釣, WYG: 蔡公所憐公嘗令人捕魚獲龜如車輪公付厨帳下倒懸龜着屋蒙其夕纔眠即厭如此累夜公聞而問蒙何故厭荅云眠輙夢人倒懸已公因慮向龜乃令人視龜所在果倒懸着屋公歎曰果如所度命下龜於地於是䝉即}
