  - {type: variant, offset: 2481, length: 138, content: 何用問為若是君箭便以相還授矢而滅增惡而驟返未達家暴死於路劉義慶幽明錄曰晉安帝隆安初曲阿民謝盛乘舩入湖採菱見一蛟來向舩舩廻避蛟又從其後盛便以義殺之懼而還家經年無患至元興中普天亢旱盛與同旅數人步至湖中見先義在地拾取之云是我義人問其故具以實對行數步乃得心痛還家一宿便死續搜神記曰長沙, SBCK: 孫權時永康}
