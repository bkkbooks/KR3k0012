  - {type: variant, offset: 2621, length: 8, content: 忘其姓名家住邊江, SBCK: 入山遇一大􅀛即束之歸􅀛便言曰遊不良爲時君所得人甚恠之載岀欲上呉王夜洎越里纜舡於大桑樹霄中樹呼􅀛曰勞乎元緒奚事爾耶􅀛曰我􅀍拘縶方見烹臛雖盡南山之樵不能潰我樹曰諸􅁑元遜􅀶識必致相苦令求如我之從計從安岀􅀛曰子明無多辭禍將及爾樹寂而止旣至權命煑之焚柴萬車語猶如故諸􅁑恪曰燃以老葉乃熟獻人仍說􅀛樹共言權登使伐取煑􅀛立爛今烹􅀛猶多用葉薪野人故呼􅀛爲元緒孔氏志恠曰㑹稽吏謝宗赴假呉中獨在舡忽}
