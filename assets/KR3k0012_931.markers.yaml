  - {type: variant, offset: 1073, length: 0, content: '', WYG: 余至江南觀其行事問其長老云龜千歳乃遊蓮葉之上江旁人家嘗畜龜飲食之以為能導引致氣有益於助衰養老豈不偉哉史記禇先生曰能得名龜者財物歸之家必大富至千萬一曰北斗龜二曰南辰龜三曰五星龜四曰八風龜五曰二十八宿龜六曰曰月龜七曰九州龜八曰玉龜凡八名龜龜各有文在腹下此龜不必滿尺二寸民人得長七八寸可寶矣神龜出於江中廬江郡每歳常出龜長尺二寸者二十枚輸太卜官太卜官因以吉日剔取其腹下甲龜千歳乃滿尺二寸有神龜在江南嘉林之中嘉林者獸無狼鳥無鴟梟草無毒螫野火不及斧斤不至是謂嘉林龜在其中嘗巢於蓮葉之上左脇書文曰甲子重光得我者匹夫為人君有土正諸侯得我為帝王南方老人用龜支牀足經二十歳餘老人死後移牀龜尚生能行氣𨗳引又曰宋元王二年江使神龜使於河至泉陽漁者豫且舉網得而囚之置之籠中夜半龜來見夢於宋元王曰我為江使於河而網當吾路泉陽漁者豫且得我而不能去身在患中王有德義故來告愬元王惕然乃召博士衛平而問之平曰龜也王求之泉陽豫且曰夜半舉網得龜使者載行入端門見王延頸而前三步而止縮頸而却復其故處於是元王擇日齋戒以刀剥之元王之時衛平相宋宋國最强龜之力也魏略曰文帝時神龜出於靈芝池晉書曰懐帝永嘉元年有玊龜出於覇水也崔鴻十六國春秋前燕録曰海出大龜枯死於平墩遼東送之侍郎王宏以為字文允得龜滅亡之徴也晉書曰符堅末高陸人穿井得龜大三尺背上有文象八卦堅命為石池養之食以粟及死藏其骨於太廟是夜廟丞高虜夢龜謂之曰我本出將歸江南遭時不遇殯命秦庭虜于夢中自解曰龜三千六百歳終必妖興亡國之象也其後竟騐又載紀曰乞伏國仁隴西鮮卑人也昔有如弗斯出連叱盧三部自漢北南出太隂山遇一巨蟲於路状若神龜大如阜乃殺馬而祭之祝曰若喜神也便開路惡神也遂塞不通俄而不見乃有一小兒在焉南齊書曰永明唐潜獻青毛神龜一頭梁書曰元帝為江州刺史時有安成望族}
