  - {type: variant, offset: 1404, length: 214, content: 長其皮有珠今世以為刀劍之口是也一說魚二千斤鮫也一捿不兩雄一則定兩則爭以喻日月不得並明一國不可兩君也又曰流源千里深淵百仞非為蛟龍也又曰山致其高而雲雨起焉水致其深而蛟龍生焉君子致其道而福祿歸焉又曰君子之居民上若以腐索御奔馬雍容恐失民意若展足薄冰蛟在其下蛟龍屬皮有珠能害人故曰蛟在其下孫卿子曰積水成川蛟龍生焉呂氏春秋曰前有佽飛者得寶劍於干將遂還及涉江至於中流有兩蛟夾繞其舩佽飛仗寶劍曰此中腐骨朽肉也赴江剌蛟殺之荊王聞之仕以執珪馬明生別, WYG: 神仙}
