  - {type: variant, offset: 2147, length: 1, content: 長, SBCK: 自云卑猥不敢處人間執鞭懷而欲書􅀞地以記其數一夕地成池矣明腹移亦復成池時人謂言黃安舌耕年可八十餘視􅀂童子常服朱砂舉體皆赤冬不着衣坐一大神􅀛時人問子坐此􅀛幾年對曰昔伏羲氏始造網􅅈有此􅀛以授吾􅀛背巳平此蟲畏日月之光二千嵗而一岀頭我坐此􅀛巳來五遇岀頭矣行則􅀒􅀛而移世人謂黃}
  - {type: page-break, offset: 2147, content: '', id: KR3k0012_SBCK_931-8b}
  - {type: variant, offset: 2147, length: 1, content: 長, krp: 自云卑猥不敢處人間執鞭懷而欲書畫地以記其數一夕地成池矣明腹移亦復成池時人謂言黃安舌耕年可八十餘視若童子常服朱砂舉體皆赤冬不着衣坐一大神龜時人問子坐此龜幾年對曰昔伏羲氏始造網罟有此龜以授吾龜背巳平此蟲畏日月之光二千嵗而一岀頭我坐此龜巳來五遇岀頭矣行則負龜而移世人謂黃}
  - {type: variant, offset: 2150, length: 1, content: 里, SBCK: 歲􅀶物志曰人有出行墜深泉澗者無出路饑餓分死左右見􅀛虵甚多朝暮引頸向東方人因伏地學之遂不復饑體殊輕便能巖岸經數年後試竦身舉臂遂超出澗上即得還家顔色恱懌頗更􅃛慧勝故還食榖啖滋味百餘日中復其本質又曰􅀛三千歳猶旋卷耳之上􅆱千嵗三百莖同本以老知􅁻㓙神異經曰西方大荒中有人焉長丈其腹圍九尺踐􅀛虵載朱鳥知河海􅂛斛識山石多少知天下鳥獸言語續捜神記曰司徒蔡謨親友王蒙者單獨常爲蔡公所怜公嘗令曰捕魚獲􅀛如車輪公付厨帳下倒懸􅀛着屋蒙其夕纔眠巳厭如此累夜公聞而問蒙何故厭荅云眠輙夢人倒懸巳公容慮向􅀛乃令人視􅀛所}
  - {type: page-break, offset: 2150, content: '', id: KR3k0012_SBCK_931-9a}
  - {type: variant, offset: 2150, length: 1, content: 里, krp: 歲博物志曰人有出行墜深泉澗者無出路饑餓分死左右見龜虵甚多朝暮引頸向東方人因伏地學之遂不復饑體殊輕便能巖岸經數年後試竦身舉臂遂超出澗上即得還家顔色恱懌頗更黠慧勝故還食榖啖滋味百餘日中復其本質又曰龜三千歳猶旋卷耳之上蓍千嵗三百莖同本以老知吉㓙神異經曰西方大荒中有人焉長丈其腹圍九尺踐龜虵載朱鳥知河海升斛識山石多少知天下鳥獸言語續捜神記曰司徒蔡謨親友王蒙者單獨常爲蔡公所怜公嘗令曰捕魚獲龜如車輪公付厨帳下倒懸龜着屋蒙其夕纔眠巳厭如此累夜公聞而問蒙何故厭荅云眠輙夢人倒懸巳公容慮向龜乃令人視龜所}
