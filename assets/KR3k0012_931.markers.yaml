  - {type: variant, offset: 1318, length: 1, content: 反, WYG: 化吾生也始得為魯津之伯而浮舟者食我以粳粮之珍而欣君之惠将報子焉後燕相遊於魯津有赤龜啣夜光而獻金樓子曰黄金滿笥不以投龜明珠徑寸豈勞彈雀又曰巨龜伏沙嶼間其上生樹木如淵島嘗有商人依以採薪及作食龜被灼熱便還海於是死者數千人又曰陽郡山中有巨龜長八尺腹下有文字前後足下各躡一龜有時踰山越水咸觀異之說苑曰靈龜五色色似玉背隂向陽上隆象天下平法地轉運應四時蛇頭龍頸左精象日右精象月知存亡吉凶之變又曰城濮之戰文公謂子犯曰吾十戰而龜􅑒我迎歳彼背歳彗星見彼操其柄我操其摽吾又夢與楚王摶彼在上我在下吾欲旡戰子以為何如子犯對曰卜戰龜􅑒是荆人也我迎歳彼背歳彼去我從之也又曰晉屠㟁賈欲誅趙氏趙盾夢見叔帶持龜而哭甚悲已而笑拊手且歌謂趙盾卜之占兆絶而后好趙史援占曰此甚惡非君之身國語曰夫服心之文也如龜焉灼其中必文於外若楚公子不為君必死不合諸侯矣}
