  - {type: variant, offset: 1073, length: 0, content: '', SBCK: 余至江南觀其行事問其長老云􅀛于歳乃游蓮葉之上江傍家人嘗畜􅀛飲食之以爲能導引致氣有益於助衰飬老豈不偉哉史記禇先生曰能得名􅀛者財物歸之家必大冨至千萬一曰北斗􅀛二曰南辰􅀛三曰五星􅀛四曰八風􅀛五曰二十八宿􅀛六曰日月􅀛七曰九州􅀛八曰王􅀛凢八名􅀛􅀛各有文在腹下此􅀛不必滿尺二寸民人得長七八寸可寳矣神􅀛岀於江中廬江郡常歳時出􅀛長尺二寸者二十枚輸太卜官太卜官因以吉日剔取其腹下甲􅀛千歳乃滿尺二寸有神􅀛在江南嘉林中嘉林者獸無虎狼鳥無鴟梟草無毒螫野火不及斧斤不至是謂嘉林􅀛在其中嘗巢於芳蓮之上左脅書文曰甲子重光得我者匹夫爲人君有土正諸侯得我爲帝王南方老人用􅀛支牀足行二十餘歳老人死後移床􅀛尚生能行氣導引又曰宋元王二年江使神􅀛使於河至於泉陽漁者豫且舉網得而囚之置之籠中夜半􅀛來見夢於宋元王曰我爲江使於河而網當吾路泉陽漁者豫且得我我不能去身在患中王有德義故來告愬元王􅅥然乃召􅀶士衛平而問之平曰􅀛也王求之泉陽豫且曰夜半舉網得􅀛使者載行入端門見王延頸而前三歩而止縮頸而却復其故處於是元王擇日齋戒以刀剥之元王之時衛平相宋宋國最強􅀛之力也魏略曰文帝時神􅀛岀於靈芝池晉書曰懷帝永嘉元年有玉􅀛出於覇水也崔鴻十六國春秋前燕録曰海出大􅀛枯死於平墩遼東送之侍郎王弘以爲宇文允得􅀛滅亡之徴也晉書曰符堅末髙陸人穿井得􅀛大三尺背上有文象八卦堅命太卜池飬之食以粟及死藏其骨於太廟是夜廟丞髙虜夢􅀛謂之曰我本岀將歸江南遭時不遇殞命秦庭又有人夢於虜曰􅀛三千六百歳終必妖興亡國之象也其後竟驗又載記曰乞伏國仁隴西鮮卑人也昔有如弗斯出連叱盧三部自漠北南岀太隂山遇一巨蟲於路狀􅀂神􅀛大如阜乃殺馬而􅀕之祝曰􅀂善神也便開路惡神也遂塞不通俄而不見乃有一小兒在焉南齊書曰永明年唐濳獻青毛神􅀛一頭梁書曰元帝爲江州刺史時有安成望族}
