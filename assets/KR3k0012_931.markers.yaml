  - {type: variant, offset: 1303, length: 0, content: '', WYG: 以蜉蝣而為龜憂養生之具人必笑之又曰牛􅀈􅇾顱亦骨也而弗灼必問凶吉於龜者以其歴久也抱朴子曰千歳靈龜五色具焉其雄額上兩骨起似角解人言浮於蓮葉之上或在叢蓍之下以來朱浴之乃剔取其甲火炙𢷬服方寸七}
  - {type: page-break, offset: 1303, content: '', id: KR3k0012_WYG_931-9a, image: WYG0901/WYG0901-0284c.png}
  - {type: variant, offset: 1304, length: 1, content: 夜, WYG: 盡一具夀千歳又曰山中辰日稱雨師者龍也巳日稱寡人者社中蛇也稱時君者龜也又曰㕁倫少時行獵墮空冢中飢餓見冡中有大龜數數廻轉所向無常張目吞氣或俯或仰素聞龜能導引乃試隨其所為遂不復飢百餘日後竟能咽氣斷穀魏王棄置土室中試之一年不食顔色恱懌氣力自若符子曰邦人獻燕昭王以大豕者曰於今百二十歳邦}
