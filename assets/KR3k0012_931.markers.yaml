  - {type: punctuation, offset: 12, content: 「, id: KR3k0012_CHANT_931-bkkpn4}
  - {type: variant, offset: 12, length: 2, content: 黃龍, SBCK: 靈􅀛􅀒書丹甲青文六曰筮常在著藂下潜伏見􅀛榮傳七曰山􅀛八曰澤􅀛九曰水􅀛十曰火􅀛此}
  - {type: variant, offset: 12, length: 2, content: 黃龍, WYG: 山龜八曰澤龜九曰水龜十曰火龜一皆曰龜生之處火龜猶火鼠牛耳物有含異氣}
  - {type: variant, offset: 12, length: 2, content: 黃龍, krp: 靈龜負書丹甲青文六曰筮常在著藂下潜伏見龜榮傳七曰山龜八曰澤龜九曰水龜十曰火龜此}
  - {type: punctuation, offset: 15, content: ，, id: KR3k0012_CHANT_931-bkkpn5}
  - {type: 'tls:seg', offset: 15, content: '', id: KR3k0012_CHANT_931-1a.5}
  - {type: variant, offset: 15, length: 0, content: '', SBCK: 說􅀛生之處所火􅀛猶火䑕午耳物有含異氣者不可以常理推然亦無所恠周易曰或益之十朋之􅀛又說卦曰離爲􅀛京房易緯曰靈􅆱四十九莖下有千歳}
  - {type: page-break, offset: 15, content: '', id: KR3k0012_SBCK_931-1b}
  - {type: variant, offset: 15, length: 0, content: '', WYG: 不可以常理推然亦無所怪周易曰或益之十朋之龜又說卦曰離為龜京房易緯曰靈蓍四十九莖下有千歳龜守之焦贛易林曰龜厭江海陸行不止自令枯藁失其都市尚書皋陶謨曰昆命于元龜又禹貢曰九江納錫大龜又曰寧王遺我大寶龜尚書中侯曰堯沈璧於洛元龜負書出背甲赤文朱字上壇場沈璧於河黑龜出赤文題又曰周公攝政七年制禮作樂成王觀於雒沉璧禮畢王退有元龜青純蒼光背甲刻書上躋於壇赤文成字周公寫之雒書曰靈龜者元文五色}
  - {type: page-break, offset: 15, content: '', id: KR3k0012_WYG_931-2a, image: WYG0901/WYG0901-0281a.png}
  - {type: variant, offset: 15, length: 0, content: '', krp: 說龜生之處所火龜猶火䑕午耳物有含異氣者不可以常理推然亦無所恠周易曰或益之十朋之龜又說卦曰離爲龜京房易緯曰靈蓍四十九莖下有千歳}
  - {type: variant, offset: 16, length: 0, content: '', SBCK: 􅀛守之焦贑易林曰􅀛猒江海陸行不止自今枯藁失其都市尚書臯陶謨曰昆命于元􅀛又禹貢曰九江納錫大􅀛又曰寜王遺我大寳􅀛文王也遺我大寳􅀛疑則卜之尚書中􅀱曰堯沉璧於洛玄􅀛􅀒書出於背中赤文朱字止壇塲沉璧於河黒􅀛出赤文題又曰周公攝政七年制禮作樂成王觀於洛沉壁禮畢王退有玄􅀛青純蒼光背甲刻書上躋于壇赤文成字周公冩之雒書曰靈􅀛者玄文五色神靈}
  - {type: variant, offset: 16, length: 0, content: '', WYG: 靈}
  - {type: variant, offset: 16, length: 0, content: '', krp: 龜守之焦贑易林曰龜猒江海陸行不止自今枯藁失其都市尚書臯陶謨曰昆命于元龜又禹貢曰九江納錫大龜又曰寜王遺我大寳龜文王也遺我大寳龜疑則卜之尚書中候曰堯沉璧於洛玄龜負書出於背中赤文朱字止壇塲沉璧於河黒龜出赤文題又曰周公攝政七年制禮作樂成王觀於洛沉壁禮畢王退有玄龜青純蒼光背甲刻書上躋于壇赤文成字周公冩之雒書曰靈龜者玄文五色神靈}
