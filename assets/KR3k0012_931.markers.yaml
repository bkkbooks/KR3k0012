  - {type: variant, offset: 469, length: 590, content: 房憂不能到家公與所用竹杖騎之忽然如睡已到家以所騎竹投葛陂中顧之乃青龍也管輅別傳曰龍者陽精以潛于陰幽靈上通和氣感神二物相扶故能興楚國先賢傳曰宋玉對楚王曰神龍朝發崑崙之墟暮宿於孟諸超騰雲漢之表婉轉四瀆之裏夫尺澤之鯢豈能料江海之大哉王子年拾遺錄曰方文山一名蠻雉山東有龍場方千里有龍皮骨如山阜膚血如流水燕昭王時以龍膏為燈光清澄若水光燄五色人以為瑞沈懷遠南越志曰蟠龍身長四丈青黑色赤帶如錦文常隨水而下入于海有毒傷人即死人物志曰龍神不處罔罟之水鳳凰不翔罻羅之鄉博物志曰昔禹平天下會群臣於會稽之野防風氏後至殺之夏德之盛二龍降之禹使范成光御之以行域外既周而還至南海經防風防風之神見禹使怒而使射之有迅雷風雨二龍昇去二臣恐以刃自貫其心而死禹哀之乃拔其刃療以不死之草而皆活是為穿匈民又曰龍肉以醢漬之則文章生異苑曰陶侃嘗捕魚得一織梭還挂於壁有頃雷雨梭變成赤龍從屋騰躍而去任昉述異記曰漢和帝元年大雨有一青龍墯於宮中帝命烹之賜群臣龍羹各一柸故李尤七命曰味兼龍羹楊衒之洛陽伽藍記曰西方烏場國西有池龍王居之池邊有一寺五十餘僧龍王每作神變國王祈請以金玉珍寶投之池中在後涌出令僧取之北寺衣食恃龍而濟世人名曰龍王寺又曰西方不可依山甚寒冬夏積雪山中有池毒龍居之昔五百商人止宿池側值龍忿怒汎殺商人槃陁王聞之捨位與子向烏場國學婆羅門呪四年之中善得其術還復王位就池呪龍龍變為人悔過向王王乃捨之楚辭曰神龍失水而陸居為螻蟻之所裁蛟, SBCK: ''}
