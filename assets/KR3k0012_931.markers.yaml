  - {type: variant, offset: 1139, length: 5, content: 隱義興陽羨, SBCK: 曰渤海之東有大壑焉其中有山無所連著常隨潮波上下徃還不得暫峙焉仙聖毒之訴於上帝帝恐流於西極失羣聖之居使巨􅀛十五舉首而戴之迭爲三番六萬歳一交焉五山始峙而不動龍伯之國有大人舉足而不盈數十歩而曁五山之所一釣而連六􅀛合􅀒而趣歸其國灼其骨以數焉莊子曰莊釣於濮水楚王使大夫徃先白焉曰願以境内累子莊子持竿不顧曰吾聞楚有神􅀛死已二千歳矣巾笥而藏之廟堂之上此􅀛者寧其死留骨而貴乎寧其生而曳尾塗中乎大夫曰寕生而曳尾塗中莊子曰徃矣吾將曵尾於塗中又曰宋元君夜半而夢人􅀍髮窺阿門曰予自宰露之淵予爲清江使河伯之所漁者余且得予元君覺召占夢者占之曰此神􅀛也君曰漁者有余且乎左右曰有君曰令余且㑹朝明日余且朝君曰若漁何得荅曰且之網得白􅀛五尺君曰獻若之􅀛􅀛至君再欲殺之再欲活之心疑卜之曰殺􅀛以卜吉乃刳􅀛以卜七十二鑚而無遺筴仲尼曰神􅀛能見夢於元君而不能避豫且之網智能七十二鑚而無遺筴不能避刳膓之患淮南予曰􅀛三千歳蜉蝣不過三日以蜉蝣而爲􅀛憂飬生之具人必􅀏之又曰牛􅇾顱亦骨也而弗灼必問吉凶於􅀛者以其歷歳乆也抱朴子曰千歳靈􅀛五色具焉其雄額上兩骨起似角解人言浮於蓮葉之上或在䕺􅆱之下以來朱浴之乃剔取其甲火炙擣服方寸匕日三盡一具壽千歳又曰山中辰曰稱雨師者龍也巳曰稱寡人者社中虵也稱時君者􅀛也又曰郄儉少時行獵墮空冢中饑餓見冢中先大􅀛數數迴轉所向無常張口吞氣或俛或仰素聞􅀛能導引乃試隨􅀛所爲遂不復饑百餘日後竟能咽氣斷榖魏王弃置土室中􅐬試之一年不食顔色恱懌氣力自􅀂符子曰􅀖人獻燕昭王以大豖者曰於今百二十歳􅀖人彼背歲彗星見彼操其柄我操其標吾又夢與荆上􅅮彼在上我在下吾以無戰子以爲何如咎犯對曰卜戰􅀛􅑒是荆}
