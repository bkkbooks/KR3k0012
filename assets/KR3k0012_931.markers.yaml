  - {type: variant, offset: 2217, length: 211, content: 楚人哀之每至此日以竹筒貯粉米祭之漢武建中長沙區回白日忽見一士人自稱三閭大夫謂曰聞君常見祭甚善但常年所遺為蛟龍所竊若今有惠可以練葉塞其上五色絲縛之此二物是蛟龍所憚說文曰蛟龍屬也魚滿三千六百歲蛟為之長率魚而飛去幼童傳曰魏太祖年十歲浴於譙水蛟來逼自奮水擊蛟乃退畢浴而還王韶之始興記曰雲水源有湯泉下流多蛟害厲濟者遇之必笑而沒盛弘之荊州記曰襄城北污水極深有蛟為害太守鄧遐勇果時人方樊噲拔劍入水蛟遶其足遐自揮劍截蛟數段流血丹水自此無害, SBCK: ''}
