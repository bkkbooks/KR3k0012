  - {type: variant, offset: 48, length: 5, content: 浮圖澄別傳, SBCK: 春獻鼈蜃秋獻􅀛魚又春官下􅀛人}
  - {type: variant, offset: 48, length: 5, content: 浮圖澄別傳, WYG: 春獻龜蜃秋獻鼈魚又春官下龜人}
  - {type: variant, offset: 48, length: 201, content: 浮圖澄別傳曰石虎時自正月不雨至六月澄詣滏口祠稽首曝露即日二白龍降於祠下於是雨遍千里又曰石勒時天旱沙門佛圖澄於石井崗掘得死龍長尺餘漬之以水良久乃蘇呪而祭之龍騰空而上天即雨降因名龍崗又曰交州丹淵有神龍每旱村人以𦱌草置淵上流魚則多死龍怒當時大雨豫章記曰吳猛坐郭璞事被收寄載往南令舩勾開戶船主聞船下有聲如在樹杪試窺之有二龍負舩一宿至宮亭湖還豫章三秦記曰河津一名龍門巨靈跡猶存去長安九百里水懸船而行旁有山水陸不通, krp: 春獻鼈蜃秋獻}
