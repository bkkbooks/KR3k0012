  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 三􅀛爾雅曰􅀛三尺賁今呉興陽羡縣君山上有池池中有六眼􅀛􅀛俯者靈行頭低仰者謝行頭仰前弇諸果甲前長左倪不􅀋行頭今江東所謂者以甲卜審右倪不􅀂行頭右庳爲右食甲形皆爾一曰神􅀛龜之最神明}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 三龜爾雅曰龜三尺賁今吳興陽羨縣君山上池中有六眼龜龜俯者靈行頭低仰者謝行頭高前弇諸果甲長前後弇諸獵甲后長左倪不類行頭左痺今江東所謂左食者以甲卜審右倪不若行頭右痺為右食一曰神龜龜之最神明}
  - {type: variant, offset: 3, length: 0, content: '', krp: 三龜爾雅曰龜三尺賁今呉興陽羡縣君山上有池池中有六眼龜龜俯者靈行頭低仰者謝行頭仰前弇諸果甲前長左倪不類行頭今江東所謂者以甲卜審右倪不若行頭右庳爲右食甲形皆爾一曰神龜龜之最神明}
  - {type: xml-element, offset: 4, content: '', id: KR3k0012_CHANT_931-bkkxmlele1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_931-1a.1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_931-1a.2}
  - {type: variant, offset: 4, length: 6, content: 龍下孫氏瑞應, SBCK: 曰靈􅀛涪陵郡出大􅀛甲可以卜縁中文似瑇瑁俗呼爲靈􅀛即今觜􅏲􅀛一名靈􅏲能鳴􅏲以規切三曰攝􅀛小􅀛也腹甲曲折解能自張閉好食虵江東呼爲靈􅀛也四曰寳􅀛書曰遺我大寳􅀛五曰文􅀛甲者文彩者河}
  - {type: variant, offset: 4, length: 1, content: 龍, WYG: 曰靈龜涪陵郡中出大龜甲可卜有緑文篆字俗呼為靈龜三曰攝龜小龜也腹甲屈折鮮能自張閉好食蛇江東呼為靈龜四曰寶龜書曰遺我大寳龜五曰文龜甲文采者河圖負書用甲青足六曰筮龜常在藂}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_931-1b, image: WYG0901/WYG0901-0280b.png}
  - {type: variant, offset: 4, length: 6, content: 龍下孫氏瑞應, krp: 曰靈龜涪陵郡出大龜甲可以卜縁中文似瑇瑁俗呼爲靈龜即今觜􅏲龜一名靈􅏲能鳴􅏲以規切三曰攝龜小龜也腹甲曲折解能自張閉好食虵江東呼爲靈龜也四曰寳龜書曰遺我大寳龜五曰文龜甲者文彩者河}
