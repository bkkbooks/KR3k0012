  - {type: variant, offset: 4762, length: 5, content: 晉書陶璜自, SBCK: 又曰伍貟奔吴至昭􅀜􅀜吏欲執之伍貟曰上所以索我者以我有美珠也今執我將言爾取之􅀜吏因捨焉邴原別傳曰原逺遊學詣安丘孫崧崧辭曰君郷里鄭君知之乎原荅曰然崧曰鄭君學覽古今學者之師模君乃舎之似不知也而曰然何原曰故有登山而採玉者有入海而採珠者不知山之髙海之深哉􅀶物志曰鮫人從水出寓人家積曰賣絹將去從主人索一器泣而成珠滿盤以與主人又曰五月五日取青蛉頭正中埋皆成青珠王朗雜事曰焦生乞恩辭生未有婦從烏桓贖李娥爲妻與耳中金璫一􅀟珠四枚璫二􅀟珠三十􅀟合中真珠一􅂛盧綝四王起事曰張方刼帝西遷國家有寳物詔石將軍載之於是放軍人八千餘人三日輦之尚有缺角真珠百餘斛又曰惠帝遷長安時洛陽御府有大珠璫百餘斛衛玠別傳曰驃􅀐王武子君之舅也常與君同語語人曰昨日與吾外甥並坐冏􅀂明珠之在我側朗然來暎人搜神記曰吴王夫差女名玉童子韓重有道術王恱之結氣死葬于昌門之外重至􅃁前􅂘祭女見形將重入􅃁臨去取徑寸明珠以送重又曰隋侯行見大虵傷救而治之其後虵衘珠以報之徑盈寸純白而夜光可燭堂故歴丗稱隋珠焉又曰澮參養母至孝曽有􅀇鶴爲戎人所射窮而歸參收養療治瘡愈放之後鶴夜到門外參秉燭視之鶴雌雄􅀟至各御明月珠報參焉又曰南海之外有鮫人水居如魚不廢緝績其人能泣珠幽明録曰洛下有洞穴婦欲殺夫推下經多時至底仍得一穴行數十里見人皆長三丈披羽衣如此九處最晚所至告飢長人指中庭栢樹下有一羊令跪捋羊􅀄捋得一珠後得始令其噉之即得療飢復㝷穴行出}
  - {type: page-break, offset: 4762, content: '', id: KR3k0012_SBCK_803-7a}
