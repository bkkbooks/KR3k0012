  - {type: variant, offset: 4770, length: 1, content: 表, WYG: 問東方朔朔曰河底有穴沉數百丈中有赤蜯生此珠也又曰王敦召吳猛猛至江口入水中命船人進舡至大雷見猛行水中從東北還逆船弟子問其故猛云水神數興波浪賊害行旅暫約勒以真珠一握為信三秦記曰始皇冢中以夜光珠為日月殿懸明月珠晝夜光明三輔夾録曰昆明池中有神池通白鹿原人釣魚綸絶而去夣扵漢武帝求去鈎帝明日戲扵池見大魚啣索帝曰豈夢所見耶取而放之後三日池邊得明珠一雙帝曰豈魚之報耶沈懷逺南越志曰珠有九品大五分以上至一寸八分分爲八品有光彩一邊小平似覆釡者名璫珠璫珠之次為走珠走珠之次為滑珠滑珠之次為磥砢珠磥砢珠之次為官兩珠官兩珠之次為税珠税珠之次為􅀢符珠孫柔之瑞應圖曰晉平公鼔琴有𤣥鶴自天而下啣明珠舞扵庭一鶴失珠覔得而走師曠掩口而笑廣志曰莫難珠其色黄生東夷又有明珠稱光大徑寸或圍二寸以上出黄支有至圓珠置平地終日不得停今上方名以甲乙為次第石珠鑄石為珠廣志曰夫餘地美珠如酸􅀥又曰班魚頭中有白石如璣珠出北海梁四公記曰震澤中洞庭山南有洞穴深百餘尺旁行五十餘里至龍宫杰公謂是東海龍王第七女掌龍王珠藏小龍千户衛䕶此珠龍畏蠟愛美玊及空青而嗜燒鷰使通信可得寳珠帝聞大喜乃詔有能使者厚賞之扵是羅子春兄弟三人應募帝敕百工以于闐舒河中美玊造小函二以桐木灰發其光求宣州空青汰取其精者用海魚膠調之成二凾火堅之龍腦香尋以繼之杰公曰以蠟塗子春等身及衣佩石乃燒鷰五百枚入洞穴至龍宫守門小蛟聞蠟氣俯伏不敢動乃以燒鷰五百賂之令其通以其上上者獻龍女龍女食之大喜又上玊凾青缶具陳帝㫖洞中有龍五千餘嵗能變化出入人間善譯時俗之言龍女知帝禮之以大珠三小珠七雜珠一石以報帝命春等乘龍載珠還國食頃之間使至龍去而子春薦珎帝大喜得聘通靈異獲天人之寳以珠示杰公公曰三珠者其一是天地如意珠之下者其二是驪龍珠之中者七珠二是蟲珠五是海蚌珠人間之上雜珠是蚌蛤蛇鶴等之珠不如大珠之貴帝示百寮朝廷咸謂杰公虛誕莫不詰之杰公曰如意珠之上者夜光照四十餘里中者十里下者一里光之所及無風雨雷電水火刀兵諸毒厲驪珠九色夜光百歩中者十歩下者一室光之所及無蛇蚖蟲豸之毒蟲珠七色多赤六足二目目當其陷處有臼如鐵蟻臯蚌珠五色皆有夜光及數尺無瑕者為上有瑕者為下蚌珠生扵其腹與月盈虧蛇珠所致隨侯噲叅即其是也又問蛇鶴之辨對曰使其自識帝命杰公記蛇鶴二斗珠餘雜珠散扵殿前取大黃蛇𤣥鶴各十數處布珠中間扵是鶴啣其珠鳴舞徘徊蛇啣其珠盤曲宛轉群公觀者莫不歎服帝復出如意龍蛇等珠校光之逺近七九之數皆如杰公之言盛𢎞之荆州記曰石藴玉以潤其塸漢含珠而清其域闞駰十二州志曰僧彊疊國在天竺南佛寺三千餘所今地有神珠非石玉晝夜扵國中光明扵日珠徑一尺五寸其色正碧南方草木狀曰凡採珠一旁小平形似覆釡第一珠母肉正白人民以薑虀食之常璩華陽土志曰廣陽縣山出青珠永昌郡博南縣有光珠宂出光珠珠有黄珠白珠青珠碧珠徐哀南方物狀曰凡採珠常三月用五牲祈禱若祠祭有失則風攪海水或有大魚在蚌左右自蚌珠長二寸半在漲海中其一寸三分其光色一旁小平形似覆釡為第一璫珠凡三品其一寸三分雖有光色形不圓正為第三滑珠凡三品萬震南州異物志}
