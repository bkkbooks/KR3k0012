  - {type: page-break, offset: 4762, content: '', id: KR3k0012_SBCK_803-8a}
  - {type: variant, offset: 4762, length: 5, content: 晉書陶璜自, WYG: 又曰伍貟奔呉至昭關關吏欲執之伍員曰上所索我者以我有明珠也今執我將言爾取之闗吏因舎焉邴原别𫝊曰原逺逰學詣安邱孫崧崧辭曰君鄉里鄭君知之乎原答曰然崧曰鄭君學覽古今學者之師模君乃舎之似不知也而曰然何原曰故有登山而採玉者有入海而採珠者不知山之髙海之深哉博物志曰鮫人從水出寓人家積日賣絹將去從主人索一器泣而成珠滿盤以與主人又曰五月五日取青蛉頭土中埋皆成青珠王朗雜事曰焦生乞恩辭生未有婦從烏桓贖李娥為妻與耳中金璫一雙珠四枚璫二雙珠三十雙合中真珠一升盧綝四王起事曰張方刼帝西遷國家有寳物詔張將軍載之扵是放軍人八千餘人三日輦之尚不缺角真珠百餘斛又曰惠帝遷長安時洛陽御府有大珠璫百餘斛衛玠别𫝊曰驃騎王武子君之舅也常與君同逰語人曰昨日與吾外甥並坐冏若明珠之在我側朗然來映人搜神記曰呉王夫差女名玊童子韓重有道術玊悦之結氣死𦵏扵昌門之外重至冡前哭祭女見形將重入冡臨去取徑寸珠以送重又曰隨侯行見大蛇傷救而治之其後蛇啣珠以報之徑盈寸純白而夜光可燭堂故歴世稱隨珠焉又曰噲叅養母至孝曽有𤣥鶴為戍人所射窮而歸叅収養療治瘡愈放之後鶴夜到門外叅秉燭視之鶴雌雄雙至各啣明月珠報焉又曰南海之外有鮫人水居如魚不廢緝績其人能泣珠幽明録曰洛下有洞穴婦欲殺夫推下經多時至底仍得一穴行數十里見人皆長三丈披羽衣如此九處最晚所至告饑長人指中庭柏樹下有一羊令跪捋羊鬚捋得三珠後得始令其噉之即得療饑復尋穴行出}
