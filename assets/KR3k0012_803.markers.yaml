  - {type: variant, offset: 3380, length: 1290, content: 百仞之水不能奄其耀也韓詩內傳曰漢女所弄珠如荊鷄卵孝經援神契曰神靈滋液百寶用則珠母見珠母璣鏡宋均曰事神明得則大珠有光可以為鏡德至淵則海出名珠史記曰樂毅遺燕王書曰齊王遁走莒僅以身免珠玉財寶盡收入於燕又曰魏王與齊威王會田於郊魏王曰若寡人國小尚有徑寸之珠照車前後各十二乘者十枚柰何以萬乘國而無寶乎事具寶門又曰漢王賜張良金百溢白珠二升良具以獻項伯又曰鄒陽上書曰臣聞明月之珠夜光之璧以闇投人於道路人無不案劍相盻者何則無因而至前也漢書景帝詔曰黃金珠玉飢不可食寒不可衣吏發民若取黃金者坐贓為盜又曰董偃與母賣珠為事偃十三隨母養館陶公主家左右言其姣好召見曰吾為養之得幸又地理志曰武帝時使使入海市明珠到國圍二寸已下又曰霍光廢昌邑王太后被珠襦坐武帳召王伏前聽詔又曰成帝時王章死妻子皆徙合浦王商輔政曰還章妻子故鄉其家屬皆採珠致產數百萬范曄後漢書曰光武耳不聽鄭衛之音手不持珠玉之玩又曰董卓擅朝政呂布斬之長安中民悉賣珠玉市酒肉相慶填滿街肆又曰馬援在交阯常餌薏苡實及軍還載之一車後有上書譖之者以為前所載還皆明珠文犀也司馬彪續漢書曰天笁國一名身毒出琉璃珠璣又曰扶風人士孫奮居富而性恡梁冀認奮母為其守藏婢云盜白珠十斛也後漢書曰珠蚌中陰精也玓瓅明珠色也璣珠不圓也夫餘出珠大如酸棗東觀漢記曰永建四年漢陽太守文礱獻大珠詔曰海內頗有災異而礱不推忠竭誠而喻明珠之瑞求媚今封珠卻還又曰顯宗時鍾離意為尚書時交阯太守坐贓千金徵還伏法以其資物頒賜群臣意得珠璣悉以委地而不拜賜上怪而問其故對曰臣聞孔子忍渴於盜泉之水曾參廻車於勝母之閭惡名也此贓穢之物誠不敢拜帝嗟嘆曰清乎尚書之言乃更以庫錢三十萬賜意又曰和熹后時新遭大憂法禁未設宮中亡大珠一篋主名不立太后乃親自臨見宮人一一間鬩察其顏色開示恩信宮人盜者即時首服謝承後漢書曰孟嘗為合浦太守郡俗舊採珠以易采先時二千石貪穢使人採珠積以自入珠忽徙去合浦無珠餓死者盈路孟嘗化行一年之間去珠復還又曰汝南李敬少時遷趙相奴於鼠穴中得繫珠及璫珥相連以問主簿主簿曰前相夫人昔亡珠不知所在疑其子婦竊之因去婦敬送珠付前相慚乃還去婦又曰豫章黃向辰步路中得珠琪一囊可直三百餘萬求主還之主欲以半物謝向向委去不顧也魏書曰卞皇后性儉約不尚華麗無文繡珠玉器皆黑漆太祖嘗得名璫數具命后自選一具后取其中者太祖問其故對曰取其上者為貪取其下者為偽故取其中者魏志曰文帝問蘇則曰前西域通使燉煌獻徑寸大珠可復求市得不則曰若陛下德流沙漠不求自至求而得之不足貴也帝默然又曰公孫淵以遼東叛遣田豫以本官督青州刺史程喜喜內懷不服軍事之際多相違錯喜知帝寶愛明珠乃密上豫雖有戰功而禁令寬弛所得器仗珠銀甚多放散不皆簿管由是功不見列又曰文帝作終制曰飯含無以珠玉無施珠襦玉押典略曰臨淄侯曹植與楊脩書曰今世作者可略而言人人自謂握靈虵之珠魏略曰大秦國出夜光珠真白珠夫餘出珠大如酸棗魏志曰東夷俗以瓔珠為財寶或以綴衣為飾或以懸頸垂耳至於袂不以金銀錦罽為珍又曰倭國女王壹與遣大夫率善等獻真白珠五十孔青大勾珠二枚也蜀志曰秦密奏記益州牧劉焉薦儒士任定祖曰甫欲剖蚌求蛛今乃隨和炳然復何歎哉又曰宗預復東聘吳孫權握預手曰今君年長孤亦衰老恐不復相見遺預大珠一斛吳錄地理志曰朱崖珠宮縣出, SBCK: ''}
