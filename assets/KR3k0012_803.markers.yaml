  - {type: variant, offset: 1579, length: 385, content: 屬皆將還都吾意嘗不同乃遣功曹何佇之為起墳諸寶物一不得犯梁書曰羊侃大同中魏使陽斐與侃在比嘗同學有詔令侃延斐同賞賓客三百餘人食器皆金玉雜寶奏三部女樂至夕侍婢百餘人俱執金花燭崔鴻十六國春秋前趙錄曰曜平陳安長驅至于西河張茂懼遣使稱蕃獻諸珍寶珠玉不可勝紀後魏書曰元乂既專政乃於禁中自別作庫掌握之寶充牣其中北史曰齊神武後以孝武帝后配彭城王孫韶魏室奇寶多隨后入韶家有二玉鉢相盛轉而不可出馬瑙榼三斗玉縫之皆稱西域鬼作也北齊書曰高德正嘗辭疾除冀州刺史即起顯祖怒禁門下其妻出寶物滿四床欲以寄人帝掩見大怒曰我府藏無此物詰其得由皆諸元賂之帝乃斬德正并妻子伯堅隋書曰開皇十二年突厥遣使獻七寶碗唐書曰師子國在西海之中出奇寶商賈到則不見人但置寶物價直於洲上寶依價質之而去以能養師子故以為國名又曰天寶中師子國遣婆羅門僧灌頂三藏來獻金寶瓔珞老子曰我有三寶保而持之一曰慈二曰儉三曰不敢為天下先輕敵則幾喪吾寶, WYG: ''}
