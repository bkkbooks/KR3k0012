  - {type: variant, offset: 3241, length: 138, content: 出軫握命孔符赤用藏龍吐珠也鄭玄注曰藏祕也珠寶物俞道也赤漢將用天之秘道尚書考靈曜曰甲子冬至日月五緯俱起牽牛日月若編珠春秋保乾圖曰吐珠於澤誰能不含宋均注曰珠出於野澤之中誰能不含取以為寶也禮斗威儀曰王者政平德至淵泉則江海出明珠又戴禮曰玉居山而木能潤淵生珠而岸不枯韓詩外傳曰良珠度寸雖, SBCK: 闕上}
