  - {type: variant, offset: 4759, length: 0, content: '', SBCK: 五百金魯元公主私以七百金從仲求仲獻四寸珠送闕下旣去景帝時復獻三寸珠數十􅋞去不知所之列女傳曰珠崖令卒官妻息送喪歸漢法内珠入関者死妻弃其係臂珠男年九歳好而取之置其母鏡奩中母不知也至関吏搜索得珠問誰當坐者前妻子􅀄曰􅀄當坐之継母請吏曰幸無劾兒誠不知也妾當坐􅀄又曰夫人哀􅀄之􅀌欲以活􅀄耳因號泣傍人莫不酸鼻隕涕関吏執筆不能就一字乃曰母子有義如此吾寧坐之不忍加文又且相譲安知孰是乃弃珠而遣之神仙傳曰麻姑欲見蔡經母及經弟婦弟婦新産十數日麻姑望見之曰噫且止勿前即求少許米便以擲地視米墮地皆成珠方平􅀏曰姑故年少吾老矣不喜復作此變化也列仙傳曰鄭交甫將往楚道至漢臯臺下見二女佩兩珠大如荆難夘交甫與之言曰欲子之佩二女解與之旣行返顧二女不見佩亦失矣吴越春秋曰越}
