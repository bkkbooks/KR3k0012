  - {type: variant, offset: 2402, length: 3, content: 至陽紆, krp: 舎于珠澤此澤出珠故名也珠澤之藪方四十里山海經曰開明山北有珠樹又曰三珠樹生赤水山其爲樹如栢葉皆爲珠一曰其狀若彗如彗星狀又曰鳥䑕同穴}
