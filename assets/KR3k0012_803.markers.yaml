  - {type: 'tls:seg', offset: 4756, content: '', id: KR3k0012_CHANT_803-70a.5}
  - {type: variant, offset: 4756, length: 0, content: '', SBCK: 非寳之重者太玄經曰明珠彈於飛肉其得不復論衡曰天地之間物氣相􅀋實非者多海外西南有珠樹焉察之是珠然非魚中之珠也夫十日之日猶珠樹也珠樹非真珠十日似日非實日也又曰隨侯以藥作珠精曜如真又曰人審知有冨貴之命則幽居俟之不湏勞形求索也猶珠在山不求貴價於人人自貴之命冨之人筋力自輕命貴之人才智自髙白虎通曰德至淵泉即江出大貝海岀明珠釋名曰王后首飾曰副副覆也上有垂珠歩則揺也蔡邕勸學曰明珠不􅉷焉發其光寳玉不􅅣不成珪璋古今注曰章帝元和元年明珠岀館陶大如李有明曜三年明月珠出豫章海昏大如雞子圍四寸八分章和元年鬰林大珠圍三寸和帝永元十五年鬱林降民得大珠圍五寸徑寸七分郭子横􅁳記曰帝起甘泉望風臺臺上得白珠如花一枝帝以飾九華之蓋望之􅀂照月王子年拾遺記曰黄帝之子名青陽是曰少昊一名摯有白雲之瑞號爲白帝有鳯衘明珠致於庭少昊乃拾珠懷之使照服於天下又曰燕昭王時有黒鳥白頭集王之所衘洞光之珠圎徑一尺此珠色黒如􅃮而懸室内百神不能隱其精靈又曰石季倫所愛婢數十人季倫甞屑沈水香如塵末布象床上使所愛者踐之無跡則賜真珠百琲􅀂有迹者即節其飲食令體輕故閨中相戲曰尓非細骨輕軀郍得百琲真珠琲蒲愷切珠貫之名也又曰舜葬蒼梧之野有鳥如雀自丹州而來􅄍五色之氣如雲名曰慿宵鳥時來蒼梧之野衘者沙珠積成壟阜名曰珠丘今蒼梧之外採藥時得青石㓗如珠服之不死帶者身輕又曰瀛洲有鳥如鳯身紺翼丹名藏珠毎鳴翔而􅄍雜珠累斛仙人常以其餘飾仙裳輕而耀於日月也西京􅄂記曰髙祖斬白蛇劒上有七采珠九華玉爲飾􅄂厠五色琉璃爲匣劒在室光影猶照於水也又曰漢諸陵寢}
  - {type: page-break, offset: 4756, content: '', id: KR3k0012_SBCK_803-5a}
  - {type: page-break, offset: 4756, content: '', id: KR3k0012_SBCK_803-5b}
  - {type: page-break, offset: 4756, content: '', id: KR3k0012_SBCK_803-6a}
  - {type: variant, offset: 4756, length: 0, content: '', WYG: 非寳之重者太𤣥經曰明珠彈扵飛鳥其得不復論衡曰天地之間物氣相類實非者多海外西南有珠樹焉察之是珠然非魚中之珠也夫十日之日猶珠樹也珠樹非真珠十日似日非實日也又曰隨侯以藥作珠精耀如真又曰今審知有富貴之命則幽居候之不須勞形求索也猶珠在山不求貴價扵人人自貴之命富之人筋力自輕命貴之人才智自髙白虎通曰徳至淵泉即江出大貝海出明珠釋名曰王后首飾曰副副覆也上有垂珠歩則揺也蔡邕勸學曰明珠不瑩焉發其光寳玊不琢不成珪璋古今注曰章帝元和元年明珠出舘陶大如李有明曜三年明月珠出豫章海員大如雞子圍四寸八分章和元年欝林大珠圍三寸和帝永元十五年欝林降民得大珠圍五寸徑七分郭子横冥記曰帝起甘泉望風臺臺上得一白珠花一枝帝以飾九華之蓋望之若照月王子年拾遺記曰黄帝之子名青陽是曰少昊一名摯有白雲之瑞號爲白帝有鳳啣明珠致扵庭少昊乃拾珠懷之使照服扵天下又曰燕昭王時有黒鳥白頭集王之所啣洞光之珠圓徑一尺此珠色黒如􅃮而懸室内百神不能隐其精靈又曰石季倫所愛婢數十人季倫嘗屑沉木香塵末布象床上使所愛者踐之無跡則賜真珠百琲若有跡者即節其飲食令體輕故閨中相戲曰爾非細骨輕軀那得百琲真珠琲貫之名也又曰舜𦵏蒼梧之野有鳥如雀自丹州而來吐五色之氣如雲名曰憑宵鳥時來蒼梧之野銜青沙珠積成壟阜名曰珠邱今蒼梧之外採藥時得青石潔如珠服之不死帶者身輕又曰瀛洲有鳥如鳳身紺翼丹名藏珠每鳴翔而吐雜珠累斛仙人常以其餘飾仙裳輕而曜扵日月也西京雜記曰髙祖斬白蛇劔上有七采珠九華玊爲飾雜厠五色琉璃為匣劔在室光影猶照扵水也又曰漢諸陵寢}
