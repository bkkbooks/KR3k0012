  - {type: variant, offset: 2010, length: 11, content: 楚王成章華臺酌諸侯酒魯, SBCK: 夫唾大者如珠小者如霧又曰黄帝遊於赤水之北登于崑崙之丘遺其􅀇珠使知索之而弗得使離朱索之而弗得使罔象索之乃得又曰河上有貧窮待織蕭綃而食者其子投淵得千金之珠謂其子曰取石來鍜之夫千金之珠必在九重之淵驪龍頷下子能得珠者遭其睡也使驪龍悟子尚奚有哉又曰脩其道之謂備不以物挫志之謂完}
