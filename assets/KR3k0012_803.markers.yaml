  - {type: variant, offset: 2811, length: 184, content: 凡有金寶常變作積蛇見此輦便脫隻履若衣以擲之溺之即得凡藏寶忘不知處以大銅盤盛水著所疑地行照之見人影者物在下也又曰視屋上瓦獨無霜其下有寶藏蔡氏化清論曰經云寶者眾之所利也茍利其利害必存焉郭璞奏曰臣以為珍奇靡麗之物誠是玩弄之所寶然非經國之至寶張衡東京賦曰所貴惟賢所寶惟穀明皇雜錄曰楊國忠驕奢僣侈之態復紛然未滿持盈公主玉葉冠虢國夫人夜光枕楊國忠鏁子帳皆希代之寶莫能計其直珠上說文, SBCK: 朔記}
