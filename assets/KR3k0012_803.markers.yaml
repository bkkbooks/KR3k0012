  - {type: variant, offset: 3002, length: 205, content: 尚書禹貢曰徐州厥貢淮夷蠙蛛淮夷二水出蠙蛛也周禮天官玉府曰若王合諸侯則共珠盤玉敦鄭玄曰敦盤類珠玉以為飾左傳哀公曰衛太叔疾出奔宋臣向為宋向魋臣納美珠焉與之城鉏城鉏宋邑宋公求珠魋不與由是得罪又哀下曰越圍吳晉趙鞅使楚隆告于吳王曰寡君之老無恤使陪臣隆敢展謝其不共展陳也黃池之役君之先臣志父得承齊盟曰好惡同之今君在難無恤不敢憚勞非晉國之所能及也使陪臣敢展布之王拜稽首曰寡人不佞不能事越以為大夫憂拜命之辱與之一簞珠簞小笥爾雅, SBCK: 東方朔神異經}
