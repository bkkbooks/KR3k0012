  - {type: variant, offset: 2469, length: 257, content: 也鹽鐵論曰汝漢之合鐵誘外國鉤羗胡之寶也說文曰琛寶也犍為舍人曰美寶為琛說苑曰經侯過魏左帶玉具劍右帶環佩左光照右右光照左太子不視又不問經曰魏國亦有寶乎太子曰主信臣忠百姓戴上此魏國之寶也經左解玉具右解佩委之而起阮子曰雖金玉滿堂明珠滿室飢不為寶非國之用新序曰晉平公浮西河中流而歎曰嗟乎安得賢士大夫與共此憂樂乎船人固桑對曰夫劍產於越珠產江漢玉產崑崗此三寶者皆無足而致今君茍好士則賢士至矣西京雜記曰武帝以七寶床雜寶案廁寶屏風列寶帳設於桂宮時人謂之四寶宮也又曰高祖入咸陽宮行庫藏見有琴長六尺十三絃二十六微皆用七寶飾之銘曰渥璵之樂, SBCK: ''}
