  - {type: variant, offset: 828, length: 573, content: 萬乘之國而無寶乎威王曰寡人以為寶與王異吾臣有檀子者使守南城則楚人不敢為寇東取泗上十二諸侯皆來朝吾臣有檀子者使守高堂則趙人不敢東漁於河吾更有黔夫者使守徐州則燕人祭北門趙人祭西門齊之北門也言燕趙之人畏其侵伐故祭以求福徙而從者七千餘家吾臣有種首者使備盜賊則道不拾遺將以照千里豈特十二乘哉梁惠王慚不懌而去梁或作魏字漢書曰沛公西入武關欲擊秦嶢下軍張良曰臣聞其將者賈豎子易動以利令酈食其持重寶啗秦將秦將果欲連和沛公乃擊秦軍大破之謝承後漢書曰鄭弘為鄒令縣人王逢得路遺寶物懸於衢道求主還之後漢書曰世祖遣衛尉銚期持珍寶繒帛賜隗嚚期至鄭被盜張璠漢記曰朱雋為郡吏太守尹端有罪應死雋為買珍寶賂主章吏端得免死范曄後漢書曰帝常召見諸郡計吏問其風俗及前後守令能不蜀郡計掾樊顯進曰漁陽太守張堪昔在蜀其仁以惠下威能討姦前公孫述破時珍寶山積捲握之物足富十世而堪去職之日乘折轅車布被而已帝聞良久歎息魏氏春秋載袁紹檄州郡文曰曹操父嵩乞丐攜養因贓假位輿金輦寶輸貨權門魏志曰陳泰為匈奴中郎將京邑貴人多寄寶貨因市奴婢泰皆掛於壁及徵為尚書悉以還吳志曰士燮為交阯太守每遣使詣權致雜香細葛輒以千數明珠大貝琉璃翡翠瑇瑁犀象之珍奇物異果蕉耶龍眼之屬無歲不至晉中興書曰姚萇試諸子謂曰吾有一寶物萬金不易汝等伎藝勝者吾以與之諸子皆索好馬欲於父前試之唯略不動萇以為賢故越諸兄立為嗣子晉安帝記曰桓玄尤愛珍寶常玩弄, SBCK: ''}
