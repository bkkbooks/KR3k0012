  - {type: variant, offset: 411, length: 298, content: 又莊公曰王及鄭伯入于鄭遂入成周取其寶器而還又文下曰宋昭公盡以寶行又襄公曰宋人得玉獻諸子罕子罕不受曰我以不貪為寶爾以玉為寶若與我皆喪寶也不若人有其寶也又昭六曰吳太子諸樊入鄖諸樊吳王僚之太子取楚夫人與其寶器以歸公羊傳僖公曰虞公貪而好寶及為晉所滅抱寶牽馬而去又定公曰盜竊寶玉大弓盜者何陽虎也史記曰趙簡子告諸子曰吾藏寶符於常山之上先得者賞諸子馳之常山上求無所得母卹還曰已得符矣登常山而臨代代可取也又曰晉使郄克以車八百乘伐齊陳于鞍於是晉軍追齊至馬陵齊侯請以寶器謝不聽必得笑克者蕭同叔子又曰魯昭公八年楚靈王就章華臺召昭公往焉賜昭公寶器已悔復詐取之又曰衛叔名封成王長用事舉康叔為周司冠賜衛寶祭器又曰秦逐客李斯書, SBCK: 魏徴諌}
