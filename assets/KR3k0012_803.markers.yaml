  - {type: variant, offset: 2407, length: 2, content: 河伯, SBCK: 滋水出焉西注于漢水多如魚魮之魚是生珠玉亦珠玉蚌􅀋又曰數暦之山楚水出焉其中多白珠今蜀郡平澤岀青珠戰國䇿曰張丑爲質於燕王欲殺之走出國境境吏得丑丑曰燕所爲將殺我者人有言我有寳珠也王欲得之我失巳乆矣如燕不信今子但欲致我我且言子之奪我珠而吞之燕王必且殺之刳子之腹矣吾要且死子之腹亦且寸絶境吏恐而放之又曰􅂫秦􅀃李兊不能聽送秦以明月之珠和氏之璧黒貂之裘又曰有人操隨侯之珠露野}
  - {type: page-break, offset: 2407, content: '', id: KR3k0012_SBCK_803-4a}
  - {type: variant, offset: 2407, length: 2, content: 河伯, WYG: 滋水出焉西注如漢水多如魚魮之魚是生珠玊亦母蚌類又曰數厯之山楚水出焉其中多白珠戰國策曰張丑質扵燕王欲殺之走出國境境吏得丑丑曰燕所謂將殺我者人有言我有寳珠也王欲得之我已失之矣如燕不信今子但欲致我我且言子之奪我珠而吞之燕王必且殺子刳子之腹矣吾要且死子之腹亦且寸絶境吏恐而放之又曰蘇秦説李兊不能聽送秦以明月之珠和氏之璧黒貂之裘又曰有人採隋侯之珠露野}
