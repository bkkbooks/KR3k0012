  - {type: variant, offset: 2199, length: 3, content: 類夜光, SBCK: 纇又曰楚王亡其猨而林木爲之殘楚莊王猨捷躁衣木而處故殘林以求之也宋玉亡珠而池中魚爲之殫又曰珠玉尊則天下爭禮樂飾則純朴散又曰禹填鴻水以爲山堙崑崙以爲土中立曽城九重其髙萬一千里上有木禾禾長五丈五尺珠樹玉樹不死樹沙棠琅玕綘樹並在曽城沙棠琅玕珠􅀋矣玉璜在西北隅任子曰丹淵}
