  - {type: variant, offset: 1763, length: 201, content: 可出馬瑙榼三斗玉縫之皆稱西域鬼作也北齊書曰高德正嘗辭疾除冀州刺史即起顯祖怒禁門下其妻出寶物滿四床欲以寄人帝掩見大怒曰我府藏無此物詰其得由皆諸元賂之帝乃斬德正并妻子伯堅隋書曰開皇十二年突厥遣使獻七寶碗唐書曰師子國在西海之中出奇寶商賈到則不見人但置寶物價直於洲上寶依價質之而去以能養師子故以為國名又曰天寶中師子國遣婆羅門僧灌頂三藏來獻金寶瓔珞老子曰我有三寶保而持之一曰慈二曰儉三曰不敢為天下先輕敵則幾喪吾寶, SBCK: 知乎}
