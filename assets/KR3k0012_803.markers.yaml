  - {type: variant, offset: 4769, length: 0, content: '', SBCK: 還洛問張華云九處地仙名九館大夫羊爲癡龍􅀄一珠食之天地等壽次者延年後者充飢而巳事具嵩山又曰漢武帝幸河渚聞􅃶歌之音而有老公及年少數人出皆長八九寸爲帝奏樂飲酒樂老公顧命洞穴之寳一人受命下没川底得一大珠徑數寸明耀絶丗}
  - {type: variant, offset: 4769, length: 0, content: '', WYG: 還洛問張華云九處地仙名九館大夫羊為癡龍初一珠食之天地等夀次者延年後者充饑而已又曰漢武帝幸河渚聞絃歌之音而有老公及年少數人出皆長八九寸為帝奏樂飲酒樂老公顧命取洞穴之寳一人受命下没川底得一大珠徑數寸明耀絶世}
  - {type: variant, offset: 4769, length: 0, content: '', krp: 還洛問張華云九處地仙名九館大夫羊爲癡龍𥘉一珠食之天地等壽次者延年後者充飢而巳事具嵩山又曰漢武帝幸河渚聞絃歌之音而有老公及年少數人出皆長八九寸爲帝奏樂飲酒樂老公顧命洞穴之寳一人受命下没川底得一大珠徑數寸明耀絶丗}
  - {type: variant, offset: 4770, length: 1, content: 表, SBCK: 問東方朔朔曰河底有穴沉數百丈中有赤蜯生此珠也事具樂部又曰王敦召王猛猛至江口入水中命舡人進舡至大電見猛行水中從東北還逆舡弟子問其故猛云水神數興波浪賊害行旅暫約勒以真珠一握爲信三秦記曰始皇􅃁中以夜光珠爲日月殿懸明月珠晝夜光明三輔决録曰昆明池中有神池通白鹿原人釣魚綸絶而去夢於漢武帝求去鈎帝明日戲於池見大魚衘索帝曰豈夢所見耶取而放之後三日池邊得明珠一􅀟帝曰豈魚之報耶沈懷逺南越志曰珠有九品大五分以上至一寸八分分爲八品有光彩一邊小平似覆釡者名璫珠璫珠之次爲走珠走珠之次爲滑珠滑珠之次爲磥砢珠磥砢珠之次爲官兩珠官兩珠之次爲税珠税珠之次爲符珠孫柔之瑞應圖曰晉平公鼓琴有􅀇鶴二八而下衘明珠舞於庭一鶴失珠覔得而走師曠掩口而􅀏廣志曰莫難珠其色黄生東夷又有明珠稱光大徑寸或圍二寸以上出黄支有至貟珠置平地終日不得停今上方名以甲乙爲次第石珠鑄石爲珠廣志曰夫餘地美珠如酸􅀥又曰班魚頭中有白石如珠璣出北海梁四公記曰震澤中洞庭山南有洞穴深百餘尺旁行五十餘里至龍宫杰公謂是東海龍王第七女掌龍王珠藏小龍千户衛護此珠龍畏蠟愛美玉及空靑而􅄝燒鷰使通信可得寳珠帝聞大喜乃詔有能使者厚賞之於是羅子春兄弟三人應募帝勑百工以于闐舒河中美玉造小函二以桐木􅁅發其光求宣州空青汰取其精者用海魚膠調之成二函火堅之龍腦香㝷亦繼之杰公曰以蠟塗子春等身及衣佩石乃燒鷰五百枚入洞穴至龍宫守門小蛟聞蠟氣俯伏不敢動乃以燒鷰百事賂之令其通以其上上者獻龍女龍女食之大喜又上玉函青􅇲具陳帝旨洞中有龍五千餘歳能變化出入人間善譯時俗之言龍女知帝禮之以大珠三小珠七雜珠一石以報帝命子春等乗龍載珠還國食頃之間便至龍去而子春薦珎帝大喜喜得聘通靈異獲天人之寳以珠示杰公公曰三珠其一是天帝如意珠之下者其二是驪龍珠之中者七珠二是虫珠五是海蚌珠人間之上者雜珠是蚌蛤虵鶴等珠不如大珠之貴帝遍示百竂朝廷咸謂杰公虚誕莫不詰之杰公曰如意珠之上者夜光照四十餘里中者十里下者一里光之所及無風􅀨雷雹水火刀兵諸毒癘驪珠九色夜光百歩中者十歩下者一室光之所及無虵虺虫豸之毒虫珠七色多赤六足二目目當其處有曰如鐡蟻臯蚌珠五色皆有夜光及數尺無瑕者爲上有瑕者爲下蚌珠生於其腹與月盈􅃜虵珠所致隋侯噲參即其事也又問虵鶴之辯對曰使其自識帝命杰公記虵鶴二珠斗餘雜珠散於殿前取大黄虵􅀇鶴各十數處布珠中間於是鶴御其珠鳴舞徘􅆦虵衘其珠盤屈宛轉羣公觀者莫不歎服帝復出如意龍虫等珠校光之逺近七元之數皆如杰公之言盛引之荆州記曰石藴玉以潤其區漢含珠而清其域闞駰十三州志曰僧彊疊國在天笁南佛寺三千餘所其地有神珠非玉石晝夜於國中光明於日珠徑一尺五寸其色正碧草方草木狀曰凡採珠一旁小平形似覆釡第一珠母肉玉白人民以薑韲食之常璩華陽國志曰廣陽縣山出青珠永昌郡愽南縣有光珠穴出光珠珠有黄珠白珠青珠碧珠徐哀南方草物狀曰凡採珠常三月用五牲祈禱􅀂祠􅀕有失則風攪海水或有大魚在蚌左右自蚌珠長二寸半在漲海中其一寸五分其光色一旁小平形似覆釡爲第一璫珠凡三品其一寸三分雖有光色形不貟正爲第二滑珠凡三品萬震南州異物志}
