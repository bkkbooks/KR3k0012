  - {type: variant, offset: 721, length: 4, content: 寶乘明月, SBCK: 今􅀪節爲國立功前後大蒙賞賚居官終殁不言貪殘妻子賣珠未爲有罪審其清者無所存問疑其濁者傍罪舉人雖疾惡情深實以好善不篤臣􅀼思度未見其可恐有識聞之必生撗議伏惟再思上撫掌曰造文不思遂有此語方知談不容易又曰婆利東有羅刹國其人極陋朱髮黒身獸牙鷹􅀲時與林邑人作市以夜而來自掩其面其國出火珠狀如水精日午時以珠承影取艾依之即火出管子曰桓公問管子曰昔者周人有天下諸侯賔復名教通於天下而奪於其下何數也管子對曰君分壤而貢入市朝同流黄金一篋也江陽}
  - {type: page-break, offset: 721, content: '', id: KR3k0012_SBCK_803-1b}
  - {type: variant, offset: 721, length: 4, content: 寶乘明月, WYG: 今𢎞節為國立功前後大䝉賞賚居官終殁不見貪殘妻子賣珠未為有罪審其清者無所存問疑其濁者傍舉罪人雖疾惡情深實以好善不篤臣竊思度未見其可恐有識聞之必生橫議伏惟再思上撫掌曰造次不思遂有此語方知談不容易又曰婆利東有羅刹國其人極陋朱髪黒身獸牙鷹𤓰時與林邑人作市以夜而來自掩其面其國出火珠狀如水晶日午時以珠承影取艾依之即火出管子曰桓公問管仲曰昔者周人有天下而奪扵其下何數也管子對曰君分壤而貢入市朝同流黄金一篋也江陽}
