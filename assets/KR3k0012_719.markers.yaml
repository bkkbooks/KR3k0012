  - {type: variant, offset: 440, length: 319, content: 瑇瑁釵三十隻沈約宋書曰泰始三年以皇后已下六宮金釵千枚班賜北征將士列女傳曰梁鴻妻孟光荊釵布裙洞冥記曰元鼎元年起招靈閣有神女留一玉釵與帝帝以賜趙婕妤至昭帝元鳳中宮人猶見此釵共謀欲碎之明旦視之匣唯見白鷰直升天去故宮人作玉釵因改名玉鷰釵言其吉祥拾遺錄曰漢獻帝為李𠐶所敗帝傷指伏后以繡紱拭血刮玉釵以拂於創應手則愈又曰魏文帝納美女薛靈芸有獻火珠龍鸞釵帝曰珠翠尚不能勝況龍鸞之重乎又曰魏明帝時昆明國貢嗽金鳥鳥常吐金屑如粟用飾釵珮謂之辟寒金宮人相嘲曰不服辟寒金那得帝王心又曰石季倫愛婢翔風別玉聲金色為倒龍之佩瑩金為鳳冠之釵言刻玉如倒龍之勢鑄金象鳳皇之狀結袖繞楹舞於晝夜使聲聲相接謂之恒舞欲有所召者不呼姓名悉聽珮聲視釵色玉輕聲者居前金色艷者居後以為行次而進, SBCK: 少粉}
