  - {type: variant, offset: 765, length: 2, content: 涪陽, SBCK: 巳郡江西縣有清水穴巴人以此水爲粉則皜曜鮮芳嘗貢京師名爲粉水扶南傳曰頓遜國有磨夷花末之爲粉}
  - {type: variant, offset: 765, length: 2, content: 涪陽, WYG: 巴郡江西縣有清水穴巴人以此水為粉則皜曜鮮芳嘗貢京師名為粉水扶南𫝊曰頓遜國有磨夷花末之為粉}
