  - {type: variant, offset: 765, length: 2, content: 涪陽, krp: 巳郡江西縣有清水穴巴人以此水爲粉則皜曜鮮芳嘗貢京師名爲粉水扶南傳曰頓遜國有磨夷花末之爲粉}
  - {type: variant, offset: 768, length: 1, content: 龜, SBCK: 香夢書曰婦人夢粉飾爲懷姙神農夲草曰粉錫一名鮮錫語林曰石崇厠置甲煎粉沉香汁之屬漢官儀曰省中以胡粉塗壁鄴中記云石虎以胡粉和椒塗壁曰椒房宋玉登徒子賦曰着粉太白施朱太赤蔡邕女誡曰弘粉則思}
  - {type: variant, offset: 768, length: 1, content: 龜, WYG: 香夢書曰婦人夢粉飾為懐姙神農本草曰粉飾一名鮮錫語林曰石崇厠置甲􅋩粉沉香汁之屬漢官儀曰省中以胡粉塗壁鄴中記云石虎以胡粉和椒塗壁曰椒房宋玉登徒子賦曰着粉太白施宋太赤蔡邕女誡曰加粉則思}
  - {type: variant, offset: 768, length: 1, content: 龜, krp: 香夢書曰婦人夢粉飾爲懷姙神農夲草曰粉錫一名鮮錫語林曰石崇厠置甲煎粉沉香汁之屬漢官儀曰省中以胡粉塗壁鄴中記云石虎以胡粉和椒塗壁曰椒房宋玉登徒子賦曰着粉太白施朱太赤蔡邕女誡曰弘粉則思}
