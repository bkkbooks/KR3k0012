  - {type: punctuation, offset: 1064, content: 《, id: KR3k0012_CHANT_719-bkkpn364}
  - {type: variant, offset: 1064, length: 395, content: 美人賦曰玉釵掛臣冠羅袖拂臣衣黃香九宮賦曰剝駭雞以為釵駭雞犀也古歌辭曰頭上金釵十二行足下絲履五文章陳司馬美女篇曰頭戴金雀釵腰珮翠琅玕崔瑗三子釵銘曰元正上日百福孔靈鬢髮如雲乃象眾星三珠橫釵攝㜎讚靈魏陳思王美女篇曰頭戴合歡釵梁陽濟泄井得金釵詩曰昔日倡家女摘華露井邊摘華還自比插映還自憐窺窺終不已笑笑自成妍寶釵於此落從來非一年翠羽成泥去金色尚如先此人今不在此物今空傳秦嘉與婦淑書曰今致寶釵一雙價直千金可以耀首淑荅曰未奉光儀則寶釵不設靈怪曰吳興妖童贈謝府君詩曰玉釵空中墜金鈿色已歇獨泣謝春風良夜辜明月鑷齊書曰文安王后為皇太子妃無寵太子為宮人製新麗衣裳及首飾而右床惟陳故古舊釵鑷數枚又曰周盤龍為右將軍建元元年魏攻壽春以盤龍為軍主假節助豫州剌史桓崇祖拒魏大破之上聞之喜下詔美稱送金釵鑷二十枚與其愛妾杜氏王仲宣七釋曰載明中之羽雀雜華鑷之威蕤孔偉七別曰長袖隨腕而遺耀紫鑷承鬢而騁輝璫珥說文曰珥瑱也瑱以玉充耳也, SBCK: 燕支的}
