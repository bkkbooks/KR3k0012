  - {type: variant, offset: 2425, length: 653, content: 人立順帝有功各賜金指釧環晉書曰羊祐年五歲令乳母取所弄玉環乳母曰汝先無物祐乃於鄰人李氏東墻桑樹中探得之李氏見驚曰余亡兒所失物也乳母具言前事李氏悲惋時人異之李氏之子即羊祐前身也又曰傳暢年五歲父友見而戲解暢衣取其金環與左右暢不惜以此賞之後選入侍講東宮宋書曰西南夷元嘉七年遣使獻金剛指環梁書曰武丁貴嬪武帝鎮樊城嘗登樓以望見漢濱五彩如龍丁有女子擘絖則貴嬪也帝贈以金環納之時年十四後魏書曰咸陽王禧弟樹字秀和位宗正卿後奔梁武帝尤器之後復歸魏初辭梁其愛妹玉兒以金指環與樹常著之寄以還梁表必還之意朝廷知之俄而賜死拾遺錄曰吳王潘夫人以火齊指環桂石榴枝上因其處臺名曰環榴臺時有諫者云今吳蜀爭雄還劉之名將為妖乎權乃翻其名為榴還臺也西京雜記曰戚姬以百鍊金為彄照見指上骨惡之以賜侍兒益部耆舊傳曰劉寵喪母時危亂墳墓發傷寵乃矯母令家貧無財唯有手上金環賣造墓供送免發掘西戎傳曰大宛國人深目多鬢娶婦人以金同心指環為聘外國雜俗曰諸問婦許婚下全同心指環保同志不改林道記曰林邑王獻金指環於吳主胡俗傳曰始結婚姻相然許便下金同心指環扶南傳曰扶南有訟者煮水令沸以金指環投湯中然後以手探湯其直者手不爛有罪者入湯即燋茅君傳曰勾曲山上有神芝五種求之法當以三月登山齎金環二雙啟以奉誓如此者三以為盟也必得芝草投環於石間忘顧念集靈記曰王諿琅耶人也仕梁為南康王記室亡後數年妻子困於衣食歲暮諿見形謂婦曰卿困乏衣食妻因與之酒別而去諿曰我若得財物當以相寄後月小女探得金指環一隻甄異傳曰沛郡秦拊義熙中至曲阿村日暮失路遠見火光投之屋有少女因寄宿曉臨別女以指環與拊拊去廻顧乃是冢焉, SBCK: ''}
