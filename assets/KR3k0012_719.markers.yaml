  - {type: 'tls:seg', offset: 769, content: '', id: KR3k0012_CHANT_719-12a.21}
  - {type: variant, offset: 770, length: 3, content: 甲可卜, SBCK: 心之鮮曹植樂府曰御巾粉於君傍中有藿納都梁􅀓長虞感凉賦曰珠汗隕於王躬粉附身而沽凝黛􅀃文作黱􅀞眉也黱與黛同釋名曰黛代也滅去眉毛以此代}
  - {type: page-break, offset: 770, content: '', id: KR3k0012_SBCK_719-2b}
  - {type: variant, offset: 770, length: 3, content: 甲可卜, WYG: 心之鮮曹植樂府曰御巾粉於君傍中有藿納及都梁傅長虞感凉賦曰珠汗隕於王躬粉附身而沾凝黛説文作黱畫眉也釋名曰黛代也㓕去眉毛以此代}
  - {type: page-break, offset: 770, content: '', id: KR3k0012_WYG_719-3b, image: WYG0899/WYG0899-0359d.png}
  - {type: variant, offset: 770, length: 3, content: 甲可卜, krp: 心之鮮曹植樂府曰御巾粉於君傍中有藿納都梁傳長虞感凉賦曰珠汗隕於王躬粉附身而沽凝黛說文作黱畫眉也黱與黛同釋名曰黛代也滅去眉毛以此代}
  - {type: punctuation, offset: 773, content: ，, id: KR3k0012_CHANT_719-bkkpn268}
  - {type: 'tls:seg', offset: 773, content: '', id: KR3k0012_CHANT_719-12a.22}
  - {type: variant, offset: 774, length: 2, content: 緣可, SBCK: 處也通俗文云染青石謂之􅀧黛後漢書曰明德馬后眉不施黛獨左眉角小缺􅀘之如粟宋起居注曰河西王沮渠䝉遜獻青雀頭黛百斤楚詞曰粉白黛黒施芳澤長􅃑拂靣善留客脂澤釋名曰澤人髮恒枯瘁以此濡澤之脣脂以丹}
  - {type: variant, offset: 774, length: 2, content: 緣可, WYG: 處也通俗文云染青石謂之㸃黛後漢書曰明徳馬后眉不施黛獨左眉角小缺補之如粟宋起居注曰河西王沮渠䝉遜獻青雀頭黛百斤楚詞曰粉白黛黒施芳澤長袂拂面善留客脂澤釋名曰澤人髪恒枯瘁以此濡澤之脣脂以丹}
  - {type: page-break, offset: 774, content: '', id: KR3k0012_WYG_719-4a, image: WYG0899/WYG0899-0360a.png}
  - {type: variant, offset: 774, length: 2, content: 緣可, krp: 處也通俗文云染青石謂之點黛後漢書曰明德馬后眉不施黛獨左眉角小缺𥙷之如粟宋起居注曰河西王沮渠䝉遜獻青雀頭黛百斤楚詞曰粉白黛黒施芳澤長𬒮拂靣善留客脂澤釋名曰澤人髮恒枯瘁以此濡澤之脣脂以丹}
  - {type: variant, offset: 777, length: 7, content: 釵世號靈釵裴淵, SBCK: 象脣赤也}
  - {type: variant, offset: 777, length: 0, content: '', WYG: 象脣赤也廣志曰面脂魏興已來始有之漢書曰翁伯販脂而富傾縣邑又曰孔奮為姑藏長清儉人或譏之以詐身處脂膏不能自潤北史后妃𫝊曰晉舊儀典櫛三人掌宫中櫛膏沭世説曰江淮以北謂面脂為面澤蔡邕女誡曰傅脂則思其心之和澤髪則思其心之潤馮衍集曰衍與婦弟任武逹書曰惟一婢武所見頭無}
  - {type: page-break, offset: 777, content: '', id: KR3k0012_WYG_719-4b, image: WYG0899/WYG0899-0360b.png}
  - {type: variant, offset: 777, length: 0, content: '', krp: 象脣赤也廣志曰靣脂魏興巳來始有之漢書曰翁伯販脂而傾縣邑又曰孔奮爲姑臧長清儉人或譏之以身處脂膏不能自潤北史后妃傳曰晉舊儀典櫛三人掌宫中櫛膏沐丗說曰江淮以北謂靣脂爲靣澤蔡邕女誡曰傳脂則思其心之和澤髪則思其心之潤馮衍集曰衍與婦弟任武逹書曰惟一婢武所見頭無}
