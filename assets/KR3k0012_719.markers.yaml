  - {type: variant, offset: 2021, length: 323, content: 守劉照夫人卒於府後太守至夢見一好婦人就為室家持一雙金鏆古喚切與太守不能名婦人乃曰此錗竹志切鏆錗鏆者其狀如紐珠大如指屈伸在人太守得置枕中前太守迎喪言有錗鏆開棺視夫人臂果無復有錗鏆焉甄異記曰樂安章沉病死未殯而蘇云被錄到天曹主者是其外兄斷理得免見一女同時被錄乃說金釧二雙記沉以與主者亦得還遂共讌接女云家在吳姓徐名秋英沉後尋問遂得之女父母因以女妻沉高文惠與婦書曰今致金鏆一雙交州記曰波斯王以金釧聘斯調王女也唐書曰交河王麴崇𥙿兄昭少好學嘗有鬻異事書於市者其母將為買之搜索家財不足其價唯篋中有金釧數枚既而歎曰何愛此物令吾子不有異聞乎促令貨易此書昭後歷位司膳卿頗以詩詠流譽繁欽定情詩曰何以致契闊繞臂金跳脫指環春秋繁露曰紂刑鬼侯之女取其環五經要義曰古者后妃群妾禮, SBCK: 平}
