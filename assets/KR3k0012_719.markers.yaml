  - {type: variant, offset: 306, length: 5, content: 江夏黃氏母, SBCK: 所除官多不次李固奏免百餘人此等旣怨共作飛章誣固曰大行在殯路人掩涕固獨胡粉飾貌搔頭弄姿盤旋偃仰曽無􅃤怛之心魏書曰何晏自喜動静粉白不去手行歩頋影魏略曰邯鄲淳詣臨淄侯植時天暑植取水}
  - {type: page-break, offset: 306, content: '', id: KR3k0012_SBCK_719-1b}
  - {type: variant, offset: 306, length: 5, content: 江夏黃氏母, WYG: 所除官多不次李固奏免百餘人等既怨共作飛章誣固曰大行在殯路人掩涕固獨糊粉飾貎搔頭弄姿盤旋偃仰曽無慘怛之意魏書曰何晏自喜動静粉白不去手行歩顧影魏畧曰邯鄲淳詣臨淄侯植時大暑植取水}
