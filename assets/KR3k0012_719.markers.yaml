  - {type: variant, offset: 1737, length: 267, content: 枚於是封上之詔以賜博也晉令曰士卒百工不得服真珠璫又諸葛恪別傳曰范慎不馬耳璫恪荅曰母之於女天下至親穿耳附珠何傷於仁戰國策曰齊王夫人有七美珥韓子曰齊威王夫人死有十孺子所窺者凡十人薛公欲知所立人為十王珥而美其一獻於王以付十孺子明曰視美珥所在乃立之西京雜記曰趙飛鷰為皇后其女弟上遺合浦圓珠珥夢書曰珠珥為人子之所貴夢得珠珥得子也魏陳思王洛神賦曰不江南之明璫劉禎魯都賦曰含丹吮素巧笑妍詳插曜日之笄珥明月之璫繁欽定情詩曰何以致區區耳中雙明珠王粲七釋曰抭照夜之明璫煥煜爚以垂暉傅玄七謀曰佩崑山之美玉珥南海之明璫釧通文俗曰環臂謂之釧東宮舊事曰皇太子納妃, SBCK: 珎寳用}
