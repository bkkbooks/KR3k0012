  - {type: variant, offset: 306, length: 5, content: 江夏黃氏母, krp: 所除官多不次李固奏免百餘人此等旣怨共作飛章誣固曰大行在殯路人掩涕固獨胡粉飾貌搔頭弄姿盤旋偃仰曽無慘怛之心魏書曰何晏自喜動静粉白不去手行歩頋影魏略曰邯鄲淳詣臨淄侯植時天暑植取水}
  - {type: variant, offset: 312, length: 1, content: 而, SBCK: 以粉自傅科頭胡舞擊劒誦小說頋謂淳曰邯鄲生何如也韓子曰若毛嬙西施之羙麗無益吾靣用脂澤粉黛則倍其􅀄言先王仁義無益於治明法度必賞罰則國之脂澤粉黛淮南子曰漆不厭墨粉不厭白􅂁朴子曰或問渉海之法荅曰先於川次破雞子一枚以少粉雜香末合攪水中則不畏風波又曰民不信黄丹及胡粉是}
  - {type: variant, offset: 312, length: 8, content: 而化為黿入于深淵, WYG: 以粉自傅科頭胡舞擊劒誦小説顧謂淳曰邯生何如也韓子曰若毛嬙西施之美麗無益吾面用脂澤粉黛則倍}
  - {type: variant, offset: 312, length: 1, content: 而, krp: 以粉自傅科頭胡舞擊劒誦小說頋謂淳曰邯鄲生何如也韓子曰若毛嬙西施之羙麗無益吾靣用脂澤粉黛則倍其𥘉言先王仁義無益於治明法度必賞罰則國之脂澤粉黛淮南子曰漆不厭墨粉不厭白𫀆朴子曰或問渉海之法荅曰先於川次破雞子一枚以少粉雜香末合攪水中則不畏風波又曰民不信黄丹及胡粉是}
  - {type: variant, offset: 314, length: 35, content: 為黿入于深淵其後人時見出浴簪一銀釵猶在其首又輿服志曰貴人助蠶瑇瑁釵江表, SBCK: 鈆所作神仙}
