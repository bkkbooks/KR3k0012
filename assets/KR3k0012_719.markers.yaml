  - {type: variant, offset: 1556, length: 180, content: 玉之瑱也象之揥也瑱塞耳也又曰有匪君子充耳琇瑩琇瑩美玉傳曰夏齊侯將納公魯昭公也命無受魯貨申豐從女買以幣錦二兩縛一如瑱史記曰淳于髡謂齊威王曰前有墮珥後有遺簪此可飲八斗又曰武帝譴責鉤弋夫人夫人脫簪珥叩頭魏書曰卞太后性約儉不尚華麗無文繡珠玉器皆黑漆太祖嘗得名璫數具命后自選一具后取其中者太祖問其故對曰取其上者為貪取其下者為詐故取其中者耳吳錄曰袁博出遊其女策得壞墟齊璫珥, SBCK: 神靈滋液}
