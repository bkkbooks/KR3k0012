  - {type: 'tls:seg', offset: 2233, content: '', id: KR3k0012_CHANT_571-29a.9}
  - {type: variant, offset: 2234, length: 7, content: 日舂薄暮常與死, WYG: 不肯止遂委而去到江海之涯吟咏優游仰覽俯觀求膏腴之處適于呉率以仁義化}
  - {type: punctuation, offset: 2238, content: ，, id: KR3k0012_CHANT_571-bkkpn754}
  - {type: 'tls:seg', offset: 2238, content: '', id: KR3k0012_CHANT_571-29a.10}
  - {type: variant, offset: 2242, length: 2, content: 伍相, WYG: 道徳荆越之人移風易俗咸集韶夏取象中國乃太伯之化也是後季厯作哀慕之歌章曰先王既徂長賢異都哀喪腹心未寫中懷追念伯仲季我何如栝桐萋萋生於道周宫館徘徊臺閣既除何為逺去使此空虛支骨}
