  - {type: variant, offset: 1795, length: 2, content: 楚乎, SBCK: 此珍玩且解大患兮倉遑迄命遺後昆兮作此象變兆在昌兮欽承祖命天不䘮兮遂臨下􅁟在聖明兮討􅁀除乱誅逆王兮又曰莊周者齊人也明篤學術多所愽逹進准見方來却覩未發}
