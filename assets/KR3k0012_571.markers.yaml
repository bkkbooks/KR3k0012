  - {type: punctuation, offset: 2227, content: 『, id: KR3k0012_CHANT_571-bkkpn751}
  - {type: variant, offset: 2227, length: 0, content: '', WYG: 登彼箕山兮瞻望天下山川麗﨑萬物還普日月運照靡不記睹游放其間何所却慮嘆彼唐堯獨自愁苦勞心九州憂勤后土謂余欽明傳禪易祖我樂如何葢不盻顧河水流兮縁髙山甘𤓰施兮棄綿蠻髙林肅兮相錯連居此之處傲堯君其後許由死遂𦵏于箕山又曰周太伯者周太王古公之長}
  - {type: page-break, offset: 2227, content: '', id: KR3k0012_WYG_571-9b, image: WYG0898/WYG0898-0260d.png}
  - {type: variant, offset: 2228, length: 0, content: '', WYG: 也古公有子三人長者太伯次者虞仲少者季厯季厯之子昌昌即文王也古公寝疾将死國當有傳心欲以傳季厯乃呼三子謂曰我不起此病繼體興者其在昌乎太伯見太王傳季厯於是太伯與虞仲俱去被髮文身以變形託}
  - {type: punctuation, offset: 2230, content: ，, id: KR3k0012_CHANT_571-bkkpn752}
  - {type: 'tls:seg', offset: 2230, content: '', id: KR3k0012_CHANT_571-29a.8}
  - {type: variant, offset: 2230, length: 1, content: 母, WYG: 採藥後聞古公卒乃還奔䘮哭於門外示夷狄之人不得入王庭於是季厯謂太伯長子也伯當立何不就太伯曰吾生不供養死不飯含哭不臨棺不孝之子焉得繼父乎㫁髪文身刑餘之人也戎狄之民也三者除焉何可}
  - {type: page-break, offset: 2230, content: '', id: KR3k0012_WYG_571-10a, image: WYG0898/WYG0898-0261a.png}
  - {type: variant, offset: 2232, length: 1, content: 虜, WYG: 君矣季厯垂涕而留之}
