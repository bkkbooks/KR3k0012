  - {type: punctuation, offset: 2605, content: 《, id: KR3k0012_CHANT_571-bkkpn843}
  - {type: variant, offset: 2606, length: 344, content: 漢書曰祭遵為將取士皆用儒術對酒設樂必雅歌投壺東觀漢記曰朱酺明帝時為益州剌史移書屬郡喻以聖德白狼王等百餘國重譯來庭歌詩三章酺獻之後魏書曰鄭道昭字僖伯兼中書侍郎從征河北高祖饗侍臣於懸匏於大竹堂道昭兄懿俱侍坐樂作酒酣高祖乃歌曰日月光天兮無不曜江左一隅兮獨未混彭城王勰續歌曰願從聖王兮登衡會萬國馳誠混日外鄭懿歌曰雲雷大振兮天地闢率土來賓一正曆邢巒歌曰舜舞干戈兮天下歸文德遠被莫不思道昭歌曰皇風一鼓兮九地匝戴日依天清六合高祖又歌曰遵彼汝墳兮昔化貞未若今日道風明宋弁歌曰文王政教兮暉江沼寧知大化光四表吳書曰留贊初為將臨敵必先被髮叫天因抗音而歌左右應之乃進戰晉書曰三月上巳日會稽夏統字仲御入洛陽市藥太尉賈充問曰卿能土地曲乎統曰百姓懷君恩作慕歌為孝女曹娥作河女之章為伍子胥作小海唱今欲之充曰善乃以足扣舷舡, SBCK: ''}
