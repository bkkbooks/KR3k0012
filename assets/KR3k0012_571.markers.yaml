  - {type: variant, offset: 2287, length: 1, content: 漢, WYG: 拘羑里者謂紂拘文王於羑里也文王未得政時循修道徳百民親附文王有子其二子皆聖於是時崇侯虎與文王列為諸侯徳不及文王常疾之乃譖文王於紂曰西伯昌聖人也長子發仲子旦皆聖三聖合謀将不利於君君宜慮之紂曰冠雖敝宜加於上履雖新宜處於下文王雖聖安可尅我崇侯􅉲文王至十紂用其言乃徙文王於羑里欲殺之於是文王四臣太顛宏夭散宜生南宫适之屬往見文王文王為矉反目者紂之好色也拊桴其腹者言欲得竒寶也蹀􅉜其足者使疾迅也於是乃周流海内經厯風土得美女二人水中大寶白馬朱鬛}
