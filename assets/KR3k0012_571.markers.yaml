  - {type: punctuation, offset: 1671, content: 』, id: KR3k0012_CHANT_571-bkkpn595}
  - {type: 'tls:seg', offset: 1671, content: '', id: KR3k0012_CHANT_571-20a.10}
  - {type: variant, offset: 1672, length: 0, content: '', SBCK: 石城樂和中有忘愁聲因有此歌又}
  - {type: variant, offset: 1672, length: 0, content: '', krp: 石城樂和中有忘愁聲因有此歌又}
  - {type: punctuation, offset: 1673, content: ，, id: KR3k0012_CHANT_571-bkkpn596}
  - {type: 'tls:seg', offset: 1673, content: '', id: KR3k0012_CHANT_571-20a.11}
  - {type: variant, offset: 1673, length: 0, content: '', SBCK: 􅁗始皇祠水群有黒頭公從河中出呼始皇曰來受天寳乃與群臣作歌又曰昔炎帝時有娥之覆以玉筐少選視之䴏遺二􅆑五色北飛逐之不及二女作歌始作北音夏孔甲田於東陽迷入民室主人方乳曰后來大􅁻或曰不勝之子必有殃孔甲取其子歸曰爲余子誰敢殃之及成人幕動折斧􅀍斬足孔甲爲作斧斤之歌始爲東音周昭}
  - {type: page-break, offset: 1673, content: '', id: KR3k0012_SBCK_571-5a}
  - {type: variant, offset: 1673, length: 0, content: '', krp: 秦始皇祠水群有黒頭公從河中出呼始皇曰來受天寳乃與群臣作歌又曰昔炎帝時有娥之覆以玉筐少選視之䴏遺二卵五色北飛逐之不及二女作歌始作北音夏孔甲田於東陽迷入民室主人方乳曰后來大吉或曰不勝之子必有殃孔甲取其子歸曰爲余子誰敢殃之及成人幕動折斧𬒳斬足孔甲爲作斧斤之歌始爲東音周昭}
  - {type: variant, offset: 1674, length: 0, content: '', SBCK: 征荆辛餘靡長且多力爲王右渉漢梁敗王及􅀕公殞于漢中辛餘靡振王北濟又反振􅀕公周公􅀱之于西翟實爲長公殷愸甲從宅西河追思故處始作西音長公繼是音以處西山此盖四方之歌也又曰許由者古之貞固之士也堯時爲布衣徒歩不與方逺交通衣食財得自足夏則巢居冬則穴處無杯杅毎以手捧水而}
  - {type: variant, offset: 1674, length: 0, content: '', krp: 征荆辛餘靡長且多力爲王右渉漢梁敗王及祭公殞于漢中辛餘靡振王北濟又反振祭公周公候之于西翟實爲長公殷愸甲從宅西河追思故處始作西音長公繼是音以處西山此盖四方之歌也又曰許由者古之貞固之士也堯時爲布衣徒歩不與方逺交通衣食財得自足夏則巢居冬則穴處無杯杅毎以手捧水而}
  - {type: variant, offset: 1675, length: 7, content: 酒樂數言所夢想, SBCK: 之人有}
