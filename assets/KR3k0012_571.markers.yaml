  - {type: variant, offset: 1653, length: 1, content: 美, SBCK: 孔子窮於陳蔡之間七日不火食羹不糝顔色甚憊歌於室不輟又曰子桑户孟子反禽張三}
  - {type: variant, offset: 1653, length: 1, content: 美, krp: 孔子窮於陳蔡之間七日不火食羹不糝顔色甚憊歌於室不輟又曰子桑户孟子反禽張三}
  - {type: variant, offset: 1655, length: 8, content: 焭兮顏若舜華若苕, SBCK: 相與友有間而子桑户死相和而歌子貢曰敢問臨尸而歌禮乎二子相視而􅀏是􅁖知乎禮意也又曰莊子妻死惠子弔}
  - {type: variant, offset: 1655, length: 3, content: 焭兮顏, krp: 相與友有間而子桑户死相和而歌子貢曰敢問臨尸而歌禮乎二子相視而笑是悪知乎禮意也又曰莊子妻死惠子弔之箕踞鼓盆而歌惠子曰不哭亦足矣歌不亦甚乎莊子曰人且偃然寢乎巨室而我哭之是不通乎命故止之又曰曽子居衛捉衿而肘見納履而踵决曵履而歌啇頌聲滿天地}
  - {type: punctuation, offset: 1657, content: ，, id: KR3k0012_CHANT_571-bkkpn589}
  - {type: 'tls:seg', offset: 1657, content: '', id: KR3k0012_CHANT_571-20a.5}
  - {type: variant, offset: 1659, length: 4, content: 舜華若苕, krp: 岀金石夏侯玄辨樂論曰昔伏羲氏因時興利教民田漁天下歸}
  - {type: punctuation, offset: 1660, content: ，, id: KR3k0012_CHANT_571-bkkpn590}
  - {type: 'tls:seg', offset: 1660, content: '', id: KR3k0012_CHANT_571-20a.6}
  - {type: punctuation, offset: 1663, content: 。, id: KR3k0012_CHANT_571-bkkpn591}
  - {type: 'tls:seg', offset: 1663, content: '', id: KR3k0012_CHANT_571-20a.7}
  - {type: variant, offset: 1664, length: 1, content: 榮, SBCK: 箕踞鼓盆而歌惠子曰不哭亦足矣歌不亦甚乎莊子曰人且偃然寢乎巨室而我哭之是不通乎}
  - {type: variant, offset: 1664, length: 1, content: 榮, krp: 時則有網罟之歌神農繼之教民食糓時則豊年之詠黄帝俻物始垂衣裳時則有龍衮之頌古今樂録曰周文王時鳯凰衘書而至文王乃作歌又曰堯郊天地祭神在座上有響誨堯曰水方至爲宫}
  - {type: punctuation, offset: 1665, content: 。, id: KR3k0012_CHANT_571-bkkpn592}
  - {type: 'tls:seg', offset: 1665, content: '', id: KR3k0012_CHANT_571-20a.8}
  - {type: variant, offset: 1666, length: 2, content: 兮曾, SBCK: 故止之又曰曽子居衛捉衿而肘見納履而踵决曵履而歌啇頌聲滿天地􅀂岀金石夏侯玄辨樂論曰昔伏羲氏因時興利教民田漁天下歸之時則有網罟之歌神農繼之教民食􅂖時則豊年之詠黄帝俻物始垂衣裳時則有龍衮之頌古今樂録曰周文王時鳯凰衘書而至文王乃作歌又曰堯郊天地􅀕神在座上有響誨堯曰水方至爲宫命子救之堯乃作歌又黄帝堯之丗民樂}
  - {type: page-break, offset: 1666, content: '', id: KR3k0012_SBCK_571-4b}
  - {type: variant, offset: 1666, length: 2, content: 兮曾, krp: 子救之堯乃作歌又黄帝堯之丗民樂}
  - {type: punctuation, offset: 1667, content: ，, id: KR3k0012_CHANT_571-bkkpn593}
  - {type: 'tls:seg', offset: 1667, content: '', id: KR3k0012_CHANT_571-20a.9}
  - {type: variant, offset: 1669, length: 2, content: 我羸, SBCK: 事擊壤之歡慶雲之瑞因以作歌又曰白日落西山歌者沈攸之發荆州未敗之前思歸京師所作歌也又曰莫愁樂者亦因石城樂而有此歌石城西有女子名莫愁善歌謡}
  - {type: variant, offset: 1669, length: 2, content: 我羸, krp: 事擊壤之歡慶雲之瑞因以作歌又曰白日落西山歌者沈攸之發荆州未敗之前思歸京師所作歌也又曰莫愁樂者亦因石城樂而有此歌石城西有女子名莫愁善歌謡}
