  - {type: variant, offset: 1684, length: 0, content: '', SBCK: 飲無杯以瓢遺之許由受以操飲畢輙掛於樹枝風吹樹瓢揺動歴歴有聲許由尚以爲繁擾取而棄之以清節約聞於堯堯大其志乃遣使以符璽禪爲天子於是許由喟然歎曰疋夫結志固如盤石采山飲河所以養性非以求禄位也放髮一優㳺所以安巳不懼非以貪天下也使者有愧還以}
