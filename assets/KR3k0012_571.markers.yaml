  - {type: variant, offset: 51, length: 1, content: 勑, SBCK: 彼婦人之口可以出走彼婦之請可以死敗優哉游哉聊以卒歳吕氏春秋曰管子得於魯魯束􅅞而㩜之使􅃥人載而送之齊皆謳歌而引管子恐魯之止而殺巳也欲速至齊因謂􅃥人曰我爲汝歌汝爲我和其和適冝走􅃥人不倦而取道甚逺管子可謂能因矣􅃥人得其所欲巳亦得其所欲以此術也是用萬乗之國其覇猶少又曰周申喜亡其母聞乞人歌於門下而悲之動於顔色自見而問焉何故而乞與之語乃是其母也故父母之於子也子之於父母也一躰而分得同血氣與而異息􅀂莽草之華實樹木之有根心離處而通憂思相感也又曰禹年三十未娶有行塗山恐時日暮吾娶必有應也乃有白狐九尾而造禹禹曰白者吾服也九尾其證也塗山人歌曰綏綏白狐九尾龐龐成家成室我都彼昌禹因娶塗山女吴越春秋曰採􅁑越之婦人傷越王用心乃作􅀂何之歌辭曰甞膽不苦味􅀂飴今我採􅁑以作􅁝又曰越王入吴與諸大夫別於浙江遂登舡俓去終不反頋越王夫人乃授舡而哭復見啄江涯之蝦飛去者復來哭訖即承之以歌其辭曰兩飛烏兮䳒作載何居食兮江湖水中虫子曰蝦去復反兮嗚呼始事君兮去家終我命兮君都中年過兮何􅇳離我國兮入呉妻爲婢兮夫爲奴歳昭昭兮難極􅁈痛悲兮心惻嗚呼哀兮不食越絶書曰伍子胥走至吴江上見漁者曰來渡我漁者知其非􅁪人也欲徃渡之恐衆人知之即歌而徃過之曰炤炤侵巳施於子期甫蘆之子胥從復歌曰心中悲曰巳施子可渡河不岀爲舡到即載入舡而伏戰國䇿曰齊人馮煖属孟甞君願􅀉食門下孟甞君􅀏而受之有頃􅀝柱彈其劒鋏歌曰長鋏歸來兮食無魚左右以告孟甞君曰食之比門下之客復彈其劒鋏歌曰長鋏歸來兮出無車又彈其劒鋏歌曰長鋏歸來兮無以爲家魏氏春秋曰阮藉少時遊􅂫門山有隠者藉對之長嘯􅂫門生莞尓而􅀏藉旣降􅂫門生亦嘯􅀂鸞風之音藉乃假蘇門生之論以􅀉所懷歌曰日􅃿不周西月出丹淵中陽精蔽不見隂光代爲雄冨貴俯仰間貧賤何必終又曰歌天地解兮六合開星辰霣兮日月頽我騰而上將何懷帝王丗記曰舜恭巳無爲歌南風之詩詩曰南風之時兮可以阜吾人之財兮南風之薫兮可以解吾人之愠兮尚書大傳曰維五紀奏鍾石論人聲始欲改堯樂及乃鳥獸咸變於前百獸率舞之属秋養􅂄老而春食􅀌子乃浡然招樂興於大麓之野報事還歸二年􅨳然乃作大唐之歌􅨳猶灼也大唐之歌美堯之禪也歌者三年昭然乃知乎王丗明有不丗之義招爲賔客而雍爲主人招雍皆樂章名也賔入奏招主人入奏雍也始奏肆夏納以孝成始謂尺入時也納謂薦賢時也肆夏孝成皆樂章名也舜爲賔客而禹爲主人舜旣使禹攝天子之事於􅀕祀避之居賔客之位献之位酒則爲亞賢也矣樂正道賛曰尚考犬室之義唐爲虞賔尚考猶言古考謂徃時也太室明堂之中央室也義當爲儀儀禮也謂􅀕大室禮先爲舜賔之也至今衍於四海衍猶溢也言堯之禪天下至於今其德義溢滿四海也成禹之變垂於萬丗之後帝乃唱之曰卿雲爛兮和氣之明者也禮縵縵兮教化廣逺日月光華旦咸且兮言明明相代八佾咸進稽首曰明明上天爛然星陳日月光華弘予一人帝乃再歌曰日月有常星辰有行四時從經萬姓􅁢誠施子論樂配}
