  - {type: variant, offset: 3424, length: 518, content: 雌與一雄雙飛入紫宮咸懼為亂王猛切諫乃出冲冲卒為堅賊又前燕錄日慕容廆父涉歸分戶以封長庶子吐谷渾分馬以給之及廆嗣翮位而二部馬鬥廆怒遣使讓渾曰先公分建有別奈何不相遠離而令馬有鬥傷渾曰馬飲食水草鬥其常性何故怒及於人兄弟至親而鬥起於馬當去汝萬里於是遂西移八十里廆後悔之遣乙那樓追渾謝之乃擁廻渾馬馬東行數百步輒悲鳴西奔衝突山谷如是者十餘日此非人事遂附陰山面黃河晉永嘉之亂南遷隴右廆以孔懷之思作吐谷渾阿於歌歲暮窮思常歌之及雋垂僣號以為輦後大曲孟嘉別傳桓溫問嘉曰聽伎絲不如竹竹不如肉何謂也荅曰漸近自然一坐咨嗟晉書曰孝武太元中琅邪王軻之家有鬼歌子夜殷允為章郡僑人庾僧度家亦有鬼歌子夜殷允為章郡亦是太元乎則子夜是此時以前人也齊書曰蕭惠基解音律尤好魏三祖曲及相和歌每奏輒賞悅不能已也梁書曰羊侃有妓孫荊玉能反腰怗地衘得席上玉簪初賚歌人王娥兒東宮亦賚歌者屈偶之並妙盡奇曲一時無對唐書曰劉禹錫泛朗州司馬鑾俗好巫每祠鼓舞必歌俚辭禹錫或從事於其間乃依騷人之作為新辭以教巫祝故武陵谿洞間夷歌率多禹錫之辭也又曰開元中歌工長孫元忠元忠之祖受於侯將軍貴昌并州人也亦代習北歌貞觀中有詔令貴昌以其聲教樂府元忠之家代相傳習如此雖譯者亦不能通知其辭蓋年歲久遠失其真矣絲桐唯琴曲有胡笳聲, SBCK: ''}
