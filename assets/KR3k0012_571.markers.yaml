  - {type: variant, offset: 1797, length: 0, content: '', WYG: 退屏鼔琴而歌欲令曽晳聽其歌聲知其平也荘子曰孔子窮於陳蔡之間七日不火食藜羮不糝顔色甚憊歌於室不輟又曰子桑户孟子反琴張三人相與友有間而子桑户死相和而歌子貢曰臨尸而歌禮乎二子相視而笑曰}
