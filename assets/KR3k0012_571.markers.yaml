  - {type: variant, offset: 2209, length: 1, content: 崩, WYG: 堯之世民樂無事擊壤之歡慶雲之瑞因以作歌又曰白日落西山歌者沈攸之發荆州未敗之前思歸京師所作歌也又曰莫愁樂者亦因石城樂而有此歌石城西有女子名莫愁善歌謠且石城樂和中有忘愁聲因作此歌又曰秦始}
  - {type: page-break, offset: 2209, content: '', id: KR3k0012_WYG_571-7b, image: WYG0898/WYG0898-0259d.png}
