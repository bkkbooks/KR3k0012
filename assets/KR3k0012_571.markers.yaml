  - {type: variant, offset: 1806, length: 272, content: 悲歌忼愾曰力拔山兮氣蓋世時不利兮騅不逝騅不逝兮可奈何虞兮虞兮奈若何漢書曰李延年善歌武帝幸之時人語曰一雌復一雄雙飛入紫宮又曰孝惠帝所教歌兒百二十人有鈌輒補又曰田橫齊玉建之親族也秦滅六國田氏悉為庶人高祖遣韓信破齊後定天下田橫乃與五百人深居海島高祖即位遣使者徵之橫與將士俱至尸鄉亭頓止橫乃奮躍自刎而死從者不敢哭遂歌以寄之今之挽歌起於此矣又曰張釋之為中郎將從行至霸俊是時慎夫人從上指視慎夫人新豐道曰此是邯鄲道也使慎夫人鼓瑟上自倚瑟而歌又班固頌論功歌詩靈芝歌曰因露寐兮產靈芝象三德兮瑞應圖延壽命兮光此都緣上帝兮象太微參日月兮揚光輝又曰武帝幸雍祠五畤獲曰麟, WYG: ''}
