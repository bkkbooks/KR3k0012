  - {type: variant, offset: 1274, length: 450, content: 而後和之又曰楚狂接輿歌而過孔子曰鳳兮鳳兮何德之襄往者不可諫來者猶可追已而已而今之從政者殆而又曰子於是日哭則不歌史記曰古詩三千餘篇孔子曰其重句施於禮上採契后稷中述殷周之盛至幽厲之缺始於衽席故曰閞睢以為風始鹿鳴為小雅始文王為大雅始清廣為頌始三百五篇皆絃歌之以求合韶武雅頌之音禮樂自此可得而述又曰漢家常以正月上辛祠太一甘泉夜到明忽有流星至於祠壇上使童男女七十人俱歌又得神馬渥洼水中為太一歌曰太一貺兮天馬下沾赤汗兮洙流赭今安疋兮龍為友後伐大宛得千里馬蒲桃為歌曰天馬來兮從西極經萬里兮歸有德承靈威兮降外國涉流沙兮四夷服又曰箕子朝周故殷墟咸生禾忝箕子傷之欲哭則不可欲泣為近婦人乃作麥秀之詩以歌詠之曰麥秀漸漸兮禾黍油油彼狡童兮不我好仇所狡童者紂也民為流涕又曰淳于髡見梁惠王王屏左右見之終無言王讓之髡曰王志在音吾是以默也王曰會有獻歌者未及言之也又曰趙武靈王夢見處女鼓琴而歌曰美人焭兮顏若舜華若苕之榮命兮曾無我羸且曰王飲酒樂數言所夢想見其狀吳廣聞之內其女姓嬴孟姚也甚有寵立為后又曰文王克殷伯夷叔齊恥之不食周粟隱首陽山作, WYG: ''}
