  - {type: variant, offset: 2951, length: 302, content: 聲囀喉清激慷慨大風應至含水激天雲雨響集充曰聽慕歌之聲便髣髴見大禹之容聞河女之音不覺涕泣交下即謂伯姬高行在目前聆小海之唱謂子胥屈平立吾之左右又曰袁山松善音樂舊歌有行路難曲詞頗踈質山松乃文其辭句婉其節制因酣歌之聞者流涕又曰應詹督南平天門武陵三郡事時政令不一諸蠻怨望並謀背叛詹召蠻酋破銅券與盟由是懷詹數郡無虞其後天下大亂詹境獨全百姓歌之曰亂離既普殆為灰朽僥倖之運賴茲應后歲寒不彫孤境獨守拯我塗炭惠隆丘阜潤同江海恩猶父母又曰山簡慠誕好酒嘗止襄陽習公池日晚醉歸自歌曰山公時一醉遙造高陽池日暮倒載歸酩酊無所知時復能騎馬倒著白接籬舉頭問葛強何如并州兒晉陽秋曰高祖伐公孫淵過本縣賜牛酒穀帛郡守典農會暮次父老故舊讌飲高祖作, SBCK: 声}
