  - {type: variant, offset: 552, length: 326, content: 我歌且謠又谷風四月曰君子作歌唯以告哀禮記曰子貢問師乙曰賜也聞聲歌各有宜也如賜者宜何歌也師乙曰乙賤工也何足以問其所宜請誦其所聞而吾子自執焉寬而靜柔而正者宜歌頌廣大而靜䟽達而信者宜歌大雅恭儉而好禮者宜歌小雅正直而靜廉而謙者宜歌風肆直而慈愛者宜歌商溫良而能斷者宜歌齊夫歌者直己而陳德也動己而天地應焉四時和焉星辰理焉萬物育焉故商者五帝之遺聲也商人識之故謂之商齊者三代之遺聲也齊人識之故謂之齊明乎商之音者臨事而屢斷明乎齊之音者見利而能讓臨事而屢斷勇也見利而能讓義也有勇有義非歌孰能保此故歌者上如抗下如隊曲如折止如槁木倨中矩句中鉤纍纍乎端如貫珠故歌之為言也長言之也說之故言之言之不足故長言之長言之不足故嗟歎之嗟歎之不足故不知手之舞之足之蹈之也又檀弓曰原壤之母死登木, WYG: ''}
