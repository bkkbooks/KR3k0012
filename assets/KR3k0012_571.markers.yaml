  - {type: variant, offset: 2245, length: 5, content: 三千里當使, WYG: 别垂恩南隅瞻望荆越涕泗交流伯兮仲兮逝彼來遊自非二人}
  - {type: page-break, offset: 2245, content: '', id: KR3k0012_WYG_571-10b, image: WYG0898/WYG0898-0261b.png}
