  - {type: variant, offset: 2211, length: 0, content: '', WYG: 祠水神有黒頭公從河中出呼始皇曰來受天寶乃與羣臣作歌又曰昔炎帝時有娀之女覆以玉筐少選視之燕遺二卵五色北飛逐之不及二女作歌始作北音夏孔甲田於東陽迷入民室主人方乳曰后來}
  - {type: variant, offset: 2212, length: 4, content: 后迺令戚, WYG: 吉或曰不勝之子必有殃孔甲取其子歸曰為余子誰敢殃之及成人幕動折橑斧破斬足孔甲為作破斧之歌始為東音周昭王征荆辛余靡長且多力為王右渉漢梁敗王及祭公殞於漢中辛余靡振王北濟又反振祭公周公封之于西翟實為長公殷慗甲從宅西河追思故處始作西音長公繼是音以處西山葢四方之歌也又曰許由者古之貞固之士也堯時為布衣徒歩不與逺方交通衣食財得自足夏則巢居冬則穴處無杯杅每以手捧水而飲之人有見其飲無杯以瓢遺之許由受以操飲畢輒掛於樹枝風吹樹瓢揺動厯厯有聲許由尚以為繁擾取而棄之以清節約聞於堯堯大其志乃遣使以符璽禪為天子於是許由喟然嘆曰匹}
  - {type: page-break, offset: 2212, content: '', id: KR3k0012_WYG_571-8a, image: WYG0898/WYG0898-0260a.png}
  - {type: page-break, offset: 2212, content: '', id: KR3k0012_WYG_571-8b, image: WYG0898/WYG0898-0260b.png}
  - {type: substitution, offset: 2213, original: 迺, replacement: 乃, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-16166}}
  - {type: variant, offset: 2217, length: 7, content: 人髡鉗衣赭舂舂, WYG: 結志固如盤石采山飲河所以養性非以求禄位也放髪以優游所以安已不懼非以貪天下也使者有愧還以状報堯堯知由不可動亦已矣於是許由以使者言為不善乃臨河洗耳樊堅見由方}
  - {type: punctuation, offset: 2220, content: ，, id: KR3k0012_CHANT_571-bkkpn748}
  - {type: 'tls:seg', offset: 2220, content: '', id: KR3k0012_CHANT_571-29a.5}
  - {type: punctuation, offset: 2223, content: ，, id: KR3k0012_CHANT_571-bkkpn749}
  - {type: 'tls:seg', offset: 2223, content: '', id: KR3k0012_CHANT_571-29a.6}
  - {type: variant, offset: 2225, length: 0, content: '', WYG: 洗耳問之耳有何垢乎由曰無垢聞惡語耳堅曰何等語者由曰堯聘吾為天子堅曰尊位何為惡之由曰吾志在青雲何乃劣劣當作九州伍長乎於是樊堅方且飲牛聞其言而去耻飲於下流於是許由名布四海堯既殂落乃作箕山之}
  - {type: page-break, offset: 2225, content: '', id: KR3k0012_WYG_571-9a, image: WYG0898/WYG0898-0260c.png}
  - {type: punctuation, offset: 2227, content: ：, id: KR3k0012_CHANT_571-bkkpn750}
