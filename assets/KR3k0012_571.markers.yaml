  - {type: variant, offset: 1932, length: 585, content: 徵之橫與將士俱至尸鄉亭頓止橫乃奮躍自刎而死從者不敢哭遂歌以寄之今之挽歌起於此矣又曰張釋之為中郎將從行至霸俊是時慎夫人從上指視慎夫人新豐道曰此是邯鄲道也使慎夫人鼓瑟上自倚瑟而歌又班固頌論功歌詩靈芝歌曰因露寐兮產靈芝象三德兮瑞應圖延壽命兮光此都緣上帝兮象太微參日月兮揚光輝又曰武帝幸雍祠五畤獲曰麟作白麟之歌又曰上幸行河東祠后土顧視帝京忻然中流歌曰秋風起兮白雲飛草木黃落兮鴈南歸蘭有秀兮菊有芳懷佳人兮不能忘汎樓舡兮濟汾河橫中流兮揚素波蕭鼓鳴兮發擢歌忻樂極兮哀情多少壯幾時兮奈老何又曰孝武南巡狩至于盛唐尋陽浮江親射蛟江中獲之舳艫千里薄樅陽而出作盛樅陽之歌又曰高帝崩皇大后迺令戚夫人髡鉗衣赭舂舂且歌曰子為王母為虜終日舂薄暮常與死為伍相離三千里當使誰告汝太后聞之大怒曰乃欲倚汝子耶遂鴆殺趙王斷戚夫人手足去眼熏耳名曰人彘又曰漢以江都王女昭君妻烏孫悲愁自作歌曰吾家嫁我兮天一方遠託絕國兮鳥孫王穹廬為室兮氈為牆以肉為食兮酪為漿居常悲思兮內感傷願為黃鵠兮歸故鄉又曰燕王旦謀反事敗王憂懣置酒方載宮會賓客群臣妾坐飲王自歌曰歸空城兮狗不吠鷄不鳴橫術何廣兮固知中國之無人華容夫人起舞歌曰髮紛紛兮不暇梳骨籍籍兮枕丘墟母求子兮妻求夫俳佪兩渠問兮君子獨安居又廣陵王胥祝詛事發覺有司按驗有實使者反及置酒顯陽殿召太子霸及子女董訾胡生等夜飲使所幸八子郭昭君家人子趙左君等王自歌曰空久生兮無終長不樂兮安窮奉天期兮, SBCK: ''}
