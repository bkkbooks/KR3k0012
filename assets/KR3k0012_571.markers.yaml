  - {type: variant, offset: 814, length: 790, content: 端如貫珠故歌之為言也長言之也說之故言之言之不足故長言之長言之不足故嗟歎之嗟歎之不足故不知手之舞之足之蹈之也又檀弓曰原壤之母死登木歌曰貍首之班然執女手之卷然又樂記曰昔者舜作五絃之琴以歌南風又檀弓上曰孔子蚤作負手曳杖逍遙於門歌曰太山其頹乎梁木其壞乎哲人其萎乎又曰魯人有朝祥而暮歌者子路笑之又曰歌者在上匏竹在下貴人聲也又曰奠酬而工升歌發德音也歌者在上匏竹在下貴人聲也周禮春秋太師大祭祀師瞽登歌小師掌教絃歌教謂教瞽矇出音絃謂琴瑟歌依詠詩也左傳哀二十一年八月公乃齊侯邾子盟齊人責稽首因歌之曰魯人之皋數年不覺使我高蹈言魯人皋緩數年不知荅齊稽首故使我高蹈來為此會唯其儒書以為二國憂又曰昭十三年南蒯將適費飲鄉人酒鄉人或歌之曰我有圃生之杞乎從我者子乎去我者鄙乎倍其鄰者恥乎已乎已乎非吾黨之士乎已乎已乎言自遂不改又曰哀五年秋齊景公卒冬十月公子嘉公子駒公子黔奔衛公子鉏公子陽生來奔皆景公子在萊者萊人歌之景公死乎不與埋三軍之事乎不與謀師乎師乎何黨之乎又曰襄四年崔子稱疾不視事公問崔子遂從姜氏入于室公拊楹而歌歌以命姜氏論語曰夫子與人歌而善必使反之而後和之又曰楚狂接輿歌而過孔子曰鳳兮鳳兮何德之襄往者不可諫來者猶可追已而已而今之從政者殆而又曰子於是日哭則不歌史記曰古詩三千餘篇孔子曰其重句施於禮上採契后稷中述殷周之盛至幽厲之缺始於衽席故曰閞睢以為風始鹿鳴為小雅始文王為大雅始清廣為頌始三百五篇皆絃歌之以求合韶武雅頌之音禮樂自此可得而述又曰漢家常以正月上辛祠太一甘泉夜到明忽有流星至於祠壇上使童男女七十人俱歌又得神馬渥洼水中為太一歌曰太一貺兮天馬下沾赤汗兮洙流赭今安疋兮龍為友後伐大宛得千里馬蒲桃為歌曰天馬來兮從西極經萬里兮歸有德承靈威兮降外國涉流沙兮四夷服又曰箕子朝周故殷墟咸生禾忝箕子傷之欲哭則不可欲泣為近婦人乃作麥秀之詩以歌詠之曰麥秀漸漸兮禾黍油油彼狡童兮不我好仇所狡童者紂也民為流涕又曰淳于髡見梁惠王王, SBCK: 退}
