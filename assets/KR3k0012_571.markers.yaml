  - {type: variant, offset: 1759, length: 5, content: 項羽軍壁垓, SBCK: 周太伯者周太王古公之長子也古公有子三人長者太伯次者虞仲少者季厯季厯之子名昌昌即文王也古公寢疾將死國當有傳心欲以傳季厯乃呼三子謂日我不起此病繼體興者其在昌乎太伯見太王傳季厯於是太伯與虞仲俱去􅀍髮文身以變形託爲王採藥後聞古公卒乃還犇喪哭於門外示夷狄之人不得入王庭於是季厯謂太伯長子也伯當立何不就太伯日吾生不供養死不飯含哭不臨棺不孝之子焉得繼父乎斷髮文身刑餘之人也戎狄之民也三者除焉何可爲君矣季厯垂涕而留之終不肯止遂委而去到江海之涯吟詠優游仰覽俯觀求膏􅃾之處遂適于吳率以仁義化以道德荆越之人移風易俗成集韶夏取象中國乃太伯之化也是後季厯作哀慕之歌章日先王旣徂長霣異都哀喪腹心未寫中懷追念伯仲季我如何栝桐萋萋生于道周宫館徘徊臺閣旣除何爲逺去使此空虚支骨離別垂思南隅瞻望荆越涕淚交流伯兮仲兮逝肯來遊自非二人誰訴此憂又日拘羑里者謂紂拘文王於羑里也文王未能政候時修道德百姓親附文王有子其二子皆賢是時崇侯虎與文王列爲諸侯德不及文王常疾之乃譛文王於紂日西伯昌聖人也長子發仲子旦皆聖三聖合謀將不利於君君冝慮之紂日冠雖弊冝加於上屨雖新冝處於}
  - {type: page-break, offset: 1759, content: '', id: KR3k0012_SBCK_571-6a}
  - {type: page-break, offset: 1759, content: '', id: KR3k0012_SBCK_571-6b}
