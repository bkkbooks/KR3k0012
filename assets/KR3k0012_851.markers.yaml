  - {type: variant, offset: 2946, length: 1193, content: 啜而散桓麟七說曰香箕為飯雜以粳菰散如細蚳摶似凝膚應璩薪詩曰竈下炊牛矢甑中莊豆飯孫子楚祀介子推祝文曰棗飯一盤王粲七釋曰西旅遊梁御宿素祭瓜州紅麴參糅相半軟滑膏潤入口流散傅選七誨曰孟冬香秔上秋膏梁彫胡菰子丹貝東牆濡潤細滑流澤芬芳飧釋名曰飧散也投飯於水中各散也通俗文曰水澆飯曰飧音孫春秋左氏傳曰晉公子重耳及曹曹共公聞其駢脅欲觀其裸薄而觀之薄迫也駢脅合幹僖負羈之妻曰吾觀晉公子之從者皆足以相國若以相若遂以為傅相夫子必反其國反其國必得志於諸侯得志於諸侯而誅無禮曹其首也子盍早自貳焉自貳自別異於曹乃饋盤飧寘璧焉臣無境外之交故用盤載璧飧中不欲令人見也公子受飧反璧又曰晉侯問原守於寺人勃鞮對曰昔趙衰以壺飧從徑餧而不食遂使處原韓子曰晉文出亡箕鄭挈壺飧而從迷失道與公相失飢而道泣不敢食及公反國克原而使為原之守曰夫經飢餧之患而必全壺飧是將不以原畔也渾軒聞而非曰以不動壺飧之故其不以原畔不亦無術乎夫明主不恃其不我畔吾不可畔也不恃其不我畔恃吾不可欺也戰國策曰中山君走有二人隨其後曰臣父嘗戲君下壺飧餔臣父故來死君也國語曰越王召范蠡而問焉曰諺有之諺俗之善語曰觥飯不及壺飧觥大也大飯盛饌也盛饌未具不徒以虛待之不及壺飧之救飢疾也己欲滅吳取快意得之而已不能待有餘力又曰敵國賓至關尹以告膳宰致飧熟食曰飧廩人獻餼沈約宋書曰文帝為王玄謨作四時詩曰粟飧充夏飡顧和與蔡謨書曰夏侯家言食漿酪飧猶勝於羹飯耳黍釋名曰黍汝也相黏汝也禮記曲禮上曰飯黍無以箸又曲禮下曰祭宗廟黍曰薌合論語微子曰文人止子路宿殺雞為黍食之家語曰孔子侍坐於哀公賜之桃與黍孔子先食黍而後食桃左右皆掩口而笑公曰黍者所以雪桃非為食之也孔子對曰丘知之矣夫黍者五穀之長也郊祀宗廟以為上盛果屬有六而桃為其下祭祀不登郊廟丘聞之也君子以賤雪貴不聞以貴雪賤今以五穀之長雪果之下者是從上雪下也臣以為妨於教害於義故不敢公曰善謝承後漢書曰范式與張元伯為友春別京師以秋為期至九月十五日殺雞為黍言未絕而巨卿至魏略曰沐並字德信名有志介嘗過姉姉為殺雞為黍而不留北齊書曰李士謙自以少孤未嘗飲酒食肉口無殺害之言親賓至輒陳罇俎對之危坐終日不倦李氏宗族豪盛每春秋二社必高會極宴無不沉醉誼亂嘗集士謙所盛饌盈前而先為設黍謂群從曰孔子稱黍為五穀之長荀卿亦云食先黍稷古人所尚寧可違乎少長肅然無敢弛惰退而相謂曰既見君子方覺吾徒之不德也又曰盧道虔為尚書會同寮於草屋下設雞黍之膳談者以為高幽明錄曰漢武帝與近臣宴于未央殿噉黍臛也襄陽記曰司馬德操嘗造龐德公值其渡沔上先人墓徑入上堂呼德公妻子使速作黍禰衡別傳曰黃祖在蒙衝舟賓客作黍臛衡得便自飽食不顧左右復搏弄以戲竹林七賢論曰阮咸兄子簡亦曠達自居大喪行過大雪寒凍遂詣浚儀令令為他賓設黍臛簡又食之以致清議廢頓三十年孟子曰葛伯率其民要其有酒肉黍稻者而奪之有一童子以黍肉餉又殺而奪之淮南萬畢術曰取冢墓黍啖兒不思母取新冢前祠黍用啖兒則不思母也風俗通曰今宴飲大會皆先黍臛盧諶祭法曰祠用白黍黃黍, SBCK: ''}
