  - {type: variant, offset: 1980, length: 800, content: 也其後妻向其所之乃就郊外乞人祭飯韓子曰堯糲蒸之飯又曰孫叔敖為令尹糲飯菜羹枯魚之膳又曰嬰兒之相與戲以塵為飯以水為飲以泥為羹以木為胾淮南子曰為客治飯而自食藜名尊於實仁義之名重於治飯之實也六韜曰堯王天下滋味重累弗食溫飯煖羹不酸餒不易也家語曰孔子厄於陳蔡從者七日不食飯子貢以所齎貨竊犯圍出告糴於野人得米一石焉顏回仲由炊之于壞屋之下有埃塵墮飯中顏回取而食之呂氏春秋曰飯之美者玄山之禾不周之粟陽山之穄南海之稻吳越春秋曰勾踐載飯與羹以遊國中行子戲之遇孤孤即脯而啜之神異經曰東南有人名黃父以鬼為飯以霧為漿說苑曰呂望行年五十賣飯棘津論衡曰鼠涉飯中捐而不食風俗通曰俗說不大餓不在車飯謂正得一車飯不復活也或曰輔車上飯小小不足濟也案吳郡名酒杯為𥂸音章言大餓人得一𥂸飯無所益也寧相六不守熟案蒸飯更泥謂之餾音與六相似也潛夫論曰夫梁飯食肉有好於面目不若糲粢藜蒸之可食於口也物理論曰忿之未熟覆甑而棄之所害亦多矣西京雜記曰公孫弘起家徒步為丞相故人齊賀從之弘食以脫粟覆以布被賀怨曰何用故人富貴乎脫粟布被我自有之弘大慚賀乃告人曰公孫弘內服貂蟬外衣麻枲內廚五鼎外膳二肴豈可以示天下哉於是朝廷自此疑矯焉弘聞之歎曰寧逢惡賓不逢故人風土記曰精浙米十取七八浙使香蒸而飯色乃紫紺於東流水飯食而洗除不祥通俗文曰飯臭曰饐沙入飯曰慘錄異傳曰袁公路年十八常飯乳食蜜飯異苑曰衛士度苦行居士也其母常誦經曾出自齋空中下大鉢蒲中香飯母分賦齊人皆七日不飢禰衡別傳曰劉表嘗作上事極以為快衡見之便滅投地曰作此筆者為食飯不孟宗別傳曰宗為光祿勳大會醉吐麥飯察者以聞詔問食麥飯意宗荅臣家足有米麥飯直愚臣所安是以食之孔衍在窮記曰彭城王送橡飯十斛葛仙公傳曰仙公與客對食吐口中飯盡成飛蜂良久乃張口蜂皆飛還入口中成飯安成記曰安成郡毛亭二十里田疇膏腴厥稻馨香飯若凝脂四王起事曰惠帝還洛陽路中作飲食宮人有持升餘米飯者澆以供至尊世說曰葛公曾在武帝坐上食進飯曰此是勞薪炊也帝密遣問外云實是故車腳, SBCK: ''}
