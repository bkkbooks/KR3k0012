  - {type: variant, offset: 2819, length: 126, content: 二則棄於街衢以為去故取新除貧取富陶朱公猗頓此事無輟又留此飯須驚蟄雷鳴擲之屋上令雷聲遠焦贛易林曰南箕無舌飯多沙糖離騷曰精瓊靡以為飯精鑿玉屑以為飯也宋玉風賦曰主人之女為臣炊彫胡之飯潘尼釣賦曰紅麵之飯精以菰梁五味道洽餘氣芬芳枚乘七發曰楚苗之食安胡之飯搏之不解, SBCK: ''}
