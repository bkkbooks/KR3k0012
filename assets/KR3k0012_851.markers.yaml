  - {type: variant, offset: 726, length: 183, content: 効君昔在會稽折粳米飯朗曰宜適難值如朗者未可折而折明公今日可折而不折也吳書曰袁術在壽春百姓飢窮以桑椹蝗蟲為乾飯又曰是儀服不精細食不重膳家無儲蓄孫權聞之幸儀舍求視蔬飯親嘗之歎息即增俸賜晉書曰石崇家稻米飯在地經宿皆化為螺時人以為族滅之應又曰衛瓘家人炊飯墮地盡化為螺歲餘而及禍也又曰殷仲堪自在荊州連年水旱百姓飢饉仲堪食常五椀盤餘肴飯粒落席間輒拾以噉之雖欲率物亦緣其性真素也宋, SBCK: 報恩私心感慟耳齊}
