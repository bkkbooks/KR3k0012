  - {type: variant, offset: 702, length: 3, content: 后左右, SBCK: 武至彭城求酒及甘橘張暢宣孝武帝旨致螺盃雜粽南􅁟所珎齊書曰范雲永明十年使魏魏人李彪宣命至雲所甚見稱美彪爲設甘蔗黄粽隨盡復益彪謂曰范散􅀐小儉之一盡不可復得梁書曰張纉􅀄徃雍州資産悉留江陵性旣貪婪南中貲賄填積及死湘東王皆使收之書二萬卷並摙還齊摙音珎寳財貨悉付庫以粽宻之屬還其家風􅁟記曰俗以菰葉褁􅁰米以淳濃􅁅汁煑之令爛熟於五月五日及夏至啖之一名糭一名角􅁰盖取隂陽尚相裏未分散之時像也續齊諧記曰屈原以五月五日投汨羅而死楚人哀之毎至此日取竹筒貯米投水以􅀕之漢建武中長沙區廻白日忽見士人自稱三閭大夫謂廻曰君常見􅀕甚誠但常年所遺俱爲蛟龍所竊今君惠可以練樹葉塞其上以綵絲􅆞縳之此二物蛟龍所憚也廻謹依旨今丗人五日作糭并帶練葉及五綵絲皆汨羅之遺風異苑云糭屈原婦所作也䉽宋書曰文帝崩郭原平號慟日}
