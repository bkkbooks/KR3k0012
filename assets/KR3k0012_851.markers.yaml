  - {type: variant, offset: 1137, length: 334, content: 父亡未食乳媼欲令飯蘭終不進舅阮孝緒聞之歎曰此兒在家則曾子之流事君則藺生之疋因名曰藺稍授以經史過日便能諷誦孝緒每曰吾家陽元也袁淑家陽元又曰齊荀兒之役臨汝侯嘲羅研之曰卿蜀人樂禍貪亂一至於此對曰蜀中積弊實非一朝百家為村不過數家有食窮迫之人十有八九縛束之使旬有二三貪亂樂禍無足多怪若令家畜五母之雞一母之豕床上有百錢布被甑中有數升麥飯雖蘇張巧說於前韓白按劍於後將不能使一夫為盜況貪亂乎又曰魚弘為湘東王鎮西司馬述職西上道中乏食緣路採麥米飯給所部弘度之所後人覔一麥不得又於窮洲之上捕得數百獼猴以為脯以供酒食又曰傅翽代劉玄明為山陰令問玄明曰願以舊政造新令尹荅曰我有奇術卿家譜所不載臨別當相示既而曰作縣唯日食一升飯而莫飲酒此第一策也又曰裴元禮為西豫州刺史母憂居喪唯食麥飯又曰沈眾永定二年, SBCK: ''}
