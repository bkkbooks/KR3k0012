  - {type: variant, offset: 488, length: 123, content: 公孫弘為丞相食脫粟之飯又曰王莽使中黃門王葉領長安莽聞城中飢饉以問葉葉業取市所賣梁飯肉羹持入視莽曰民食咸如此莽信之續漢書曰羊陟拜河南尹常食乾飯後漢書曰王郎起光武至南宮遇大風雨引車入道傍空舍馮異抱薪鄧禹熱火光武對竈燎衣異進麥飯兔肩謝丞後漢書曰左雄為冀, SBCK: 廣}
