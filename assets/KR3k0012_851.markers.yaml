  - {type: variant, offset: 1715, length: 176, content: 其將飯告稼穡艱難不奪農時乃可常有又曰蔣沅乾元後授陸渾盩厔咸陽高陵西令當軍旋之後瘡痍未平沅竭心撫勞所至安輯副元帥郭子儀每統兵由其縣必誡軍吏曰蔣令清嚴幹辦供億固當有素士眾得蔬飯見饋則已無撓清政其為時人所知如此墨子守備曰乾飯人二升以備陰雨晏子春秋曰晏子相齊食脫粟之飯尹文子曰晉國俗奢文公儉以矯之因食脫粟之飯莊子曰子輿與子桑友而霖雨十日子輿曰子桑殆病矣裹飯而往, SBCK: 馬屎便}
