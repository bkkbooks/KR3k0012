  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書太平御覽卷八百五十一宋李昉等撰}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_851-1a, image: WYG0900/WYG0900-0504c.png}
  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第八百五十一}
  body:
  - {type: variant, offset: 3, length: 384, content: 八飯周禮曰黃帝始蒸穀為飯周禮天官食醫曰食齊眡春時飯宜溫也禮記曰飯曰諸飯也黍稷稻梁白黍黃梁稰穛熟獲曰稰生獲曰穛黍黃黍也又曰文王有疾武王不脫冠帶而養言常在側文王一飯亦一飯文王再飯亦再飯欲知氣力箴藥所勝又曰燕侍食於君子則先飯而後已所以勸也母放飯母流歠小飯而亟之亟疾也備噦噎若見問也數噍母為口容口容弄口論語曰子曰飯蔬食飲水曲肱而枕之樂亦在其中矣爾雅曰饙餾稔也今呼飯為饙熟為餾稔或作飪也饙音甫云切餾力又切音脩食饙謂之餲飯穢臭博者謂之爛爛飯相著也米者謂之檗飯中有未熟者春秋運斗樞曰粟五變而以陽化生為苗秀為禾三變而祭謂之粟四變入臼米出甲五變而蒸飯可食說文曰饙飯也餾飯氣蒸也饡音贊以羹澆飯也饖一月切飯傷熟也饐一煎切飯傷濕也釋名曰飯分也使其粒各自分也乾飯而暴乾之也史記曰廉頗之奔魏也魏不能用而趙數困於秦趙人思復得廉頗廉頗亦思復為趙用趙王因使使魏視頗尚可用不郭開怨頗郭開頗之仇也不欲令還多, SBCK: 九糭䉽讀}
  - {type: variant, offset: 3, length: 4, content: 八飯周禮, WYG: 九糉䉽䭔糉晉書}
