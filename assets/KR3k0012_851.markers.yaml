  - {type: variant, offset: 1545, length: 169, content: 食訖盡棄其餘崔鴻前秦錄曰符堅以乞活夏點為左鎮郎胡人護磨那為右鎮郎奄人申香為拂蓋郎點等身長一丈八尺並多力善射三人每食飯一石肉三十斤後魏書曰楊播兄弟雍睦播每出或日斜不至不先飯待還然後食又曰盧義僖為都官尚書性清儉不營財利雖居顯位每至困乏麥飯蔬食然亦甘之也又曰闞因甚貧弊不免飢寒性能多食一飯至三㪷乃飽卒無後唐書曰太宗謂侍臣曰朕自皇太子立也遇物必誨, SBCK: 入門内}
