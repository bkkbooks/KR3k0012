  - {type: variant, offset: 696, length: 0, content: '', SBCK: 㥽緋褶白舞一人方舞四人白舞令闕方舞四人假髻玉支釵紫􅁝布褶白大口袴五彩接䄂烏皮鞾後魏道武帝天興六年冬詔太樂㧾章鼓吹増修雜戲造五兵角抵麒麟鳯凰仙人長蛇白象武及諸畏獸魚龍辟邪鹿馬仙車髙絙百尺長趫幢跳丸以備百戲大饗設之於殿前明元帝􅀄又増修之撰合大曲更爲鍾皷之節北齊神武平中山有魚龍爛熳俳優侏儒山車巨象拔井種􅀲殺馬剥驢等竒怪異端百有餘物名爲百戲隋書曰文帝開皇􅀄周齊百戲並放遣之焬帝大業二年突厥染干來朝帝欲誇之㧾追四方散樂大集東都􅀄於華}
