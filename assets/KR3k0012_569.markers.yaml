  - {type: variant, offset: 4575, length: 5, content: 禪語笑自若, WYG: 少徴商亂而加暴夫宫者君也商者臣也宫不勝則君體卑商有餘則臣事僣臣恐異日臣有悖亂之事陛下有播越之禍莫不兆於斯曲也洎禄山南犯𤣥宗西幸方明寜王審音之妙也大業記曰安公子是隋煬帝將幸江都宫中所撰時樂工笛中吹此曲其父疾廢於卧内聞泫然流涕問其子何得此曲對曰宫中新翻也}
