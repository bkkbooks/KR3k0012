  - {type: variant, offset: 4575, length: 5, content: 禪語笑自若, SBCK: 少徴啇亂而加􅁀夫宮者君也啇者臣也宮不勝則君躰卑啇有餘則臣事僣臣恐異曰臣下有悖亂之事陛下有播越之禍莫不兆於斯曲也洎禄山南犯玄宗西幸方明寕王審音之妙也大業記曰安公子是隋焬帝將幸江都宮中所撰時樂工笛中吹此曲其父疾廢於卧内聞泫然流涕問其子何得此曲對曰宮中新翻也}
