  - {type: variant, offset: 8, length: 2, content: 壽陽, WYG: 魯定公與齊侯㑹於郏谷孔子攝相事齊奏宫中之}
  - {type: variant, offset: 8, length: 0, content: '', krp: 魯定公與齊侯㑹於夾谷孔子攝相事齊奏宮中之樂優倡侏儒戲于前孔子趍進曰疋夫而熒侮諸侯有罪應誅於是斬侏儒手足異處齊俟懼有慙色史記曰優旃者秦侏儒也善爲笑言然合於道秦始皇時置酒而天雨陛楯者沾寒優旃見而哀之謂之曰汝欲休乎陛揗者曰幸甚優旃曰我即呼汝汝疾應曰諾居殿上上}
  - {type: variant, offset: 9, length: 6, content: 陽樂宋南平穆, SBCK: 呼萬歳旃大呼曰陛楯郎郎曰諾優旃曰汝雖長何益故雨中立我雖短也故休居於是乎使得半相代史記曰􅁗昭}
  - {type: variant, offset: 9, length: 6, content: 陽樂宋南平穆, krp: 呼萬歳旃大呼曰陛楯郎郎曰諾優旃曰汝雖長何益故雨中立我雖短也故休居於是乎使得半相代史記曰秦昭}
