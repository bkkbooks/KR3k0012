  - {type: variant, offset: 4550, length: 0, content: '', SBCK: 有額上縁橦至上鳥飛左囬右轉又以撞着口齒上亦如之誤馬車立木橦其車上長二丈橦頭安橦木兩􅇊兒各坐木一頭或鳥飛或倒掛又衣􅇊兒作猕候之形走馬上或在脇或在馬頭或在馬尾馬走如故名爲猨􅀐樂府雜録曰弄叅軍始因後}
  - {type: variant, offset: 4550, length: 0, content: '', krp: 有額上縁橦至上鳥飛左囬右轉又以撞着口齒上亦如之誤馬車立木橦其車上長二丈橦頭安橦木兩伎兒各坐木一頭或鳥飛或倒掛又衣伎兒作猕候之形走馬上或在脇或在馬頭或在馬尾馬走如故名爲猨騎樂府雜録曰弄叅軍始因後}
  - {type: variant, offset: 4551, length: 0, content: '', SBCK: 舘陶令石躭有􅂍犯和帝惜其才免罪每宴樂即令衣白夾衫命優伶戲弄辱之經年乃放後爲叅軍誤也開元中有李仙鶴善此戯明皇特授韶州同正叅軍以食其禄是以陸鴻漸撰詞云韶州盖由此大周正樂曰漢武帝通西域始以善幻人至中國安帝時天笁獻􅇊能自斷手足刳腹胃自是歴丗有之唐髙宗􅁖其驚俗勑西域開津不令入中國唐書樂志曰睿宗時婆羅門樂人倒行而足舞極銛刀鋒植於地低因就刃以歴臉中又植於背下吹篳篥立其腹上終曲而無傷又伏伸其手足躡之旋身遶手百轉無已漢世有橦末􅇊又有盤舞}
  - {type: page-break, offset: 4551, content: '', id: KR3k0012_SBCK_569-5a}
  - {type: variant, offset: 4551, length: 0, content: '', krp: 舘陶令石躭有贓犯和帝惜其才免罪每宴樂即令衣白夾衫命優伶戲弄辱之經年乃放後爲叅軍誤也開元中有李仙鶴善此戯明皇特授韶州同正叅軍以食其禄是以陸鴻漸撰詞云韶州盖由此大周正樂曰漢武帝通西域始以善幻人至中國安帝時天笁獻伎能自斷手足刳腹胃自是歴丗有之唐髙宗悪其驚俗勑西域開津不令入中國唐書樂志曰睿宗時婆羅門樂人倒行而足舞極銛刀鋒植於地低因就刃以歴臉中又植於背下吹篳篥立其腹上終曲而無傷又伏伸其手足躡之旋身遶手百轉無已漢世有橦末伎又有盤舞}
  - {type: variant, offset: 4552, length: 1, content: 陽, SBCK: 世如之以柸盤舞詩云妍妯凌七盤言舞用盤七枚也梁謂之盤舞􅇊梁又有長蹻􅇊跳鈴􅇊擲倒跳劒􅇊吞劒􅇊今並存又有舞輪􅇊盖今之戯車輪者透三峽􅇊盖今之透飛梯之􅀋髙絙􅇊盖今之戯䋲者是也梁有猕猴幢戯今有縁竿􅇊又猕猴縁竽未審何者爲是今又有弄椀珠􅇊弄丹珠􅇊歌舞戯有大面撥頭蹋揺娘窟儡子等戯置教坊於禁中以處之又曰散樂非部伍之聲俳優歌舞􅄂奏漢天子臨軒設樂舎利獸從西方來戯於殿前激水成比自魚跳躍漱水作霧翳日此成黄龍脩丈八出水遊戯煇熠曰光䋲繫兩柱相去數丈二倡女對舞䋲上切肩而不傾如是􅄂變㧾名百戯江東猶有髙絙紫鹿􅉥行鱉食齊王卷衣笮䑕夏育杠鼎臣象行乳神􅀛抃足背􅀒靈嶽柱樹曰雪􅀞地成川之􅇊明皇􅄂録曰上御勤政樓大張聲樂羅列百􅇊時教坊有王大娘善戰百尺竿竿上施木山狀瀛洲方丈仍令小兒持鋒節出入其間而舞不輟時劉晏爲祕書省正字年方小形狀獰劣而惠悟過人上召於樓上簾下貴妃置於􅂰爲施粉黛與之巾櫛上令詠王大娘戴竿晏應聲曰樓前百戯競爭新唯有長竿妙入神誰爲綺羅翻有力猶自嫌輕更着人因命牙笏及黄紋􅂁以賜晏時有公孫大娘者善劒舞能爲鄰里曲及裴將軍士謂之春秋設大張􅇊樂雖小大優劣不同而劇其華侈遐方僻郡歡縱亦然樂府􅄂録曰大面出於北齊齊蘭陵王長恭才武而皃美常着假面以對敵常擊周師金墉下勇冠三軍齊人壯之爲此聲以効其指撝擊刺之容俗爲之蘭陵王入陣曲􅁋樂左傳曰煩手􅁋聲慆堙心耳乃忘和平謂之鄭聲許真五經異義曰鄭囯有溱洧之水男女聚㑹謳歌相感今鄭詩二十一篇婦人者十九故鄭聲􅁋也又云鄭重之音使人􅁋過也又曰惠王三年邊伯石遬蔿國出王立王頽王處千鄭三年子頽飲三大夫酒子國爲客子囯蔿囯客上客樂及偏聲偏舞六代之樂一日諸大夫偏釋鄭厲公見􅉑叔厲公鄭莊公之子厲公突也􅉑叔王卿士􅉑公林父也曰吾聞之司冦行戮君爲之不舉不舉樂也而况敢樂禍乎今吾聞子頽歌舞不思憂夫出王而代其位禍孰大焉臨禍忘憂是謂樂禍禍必及之盍納王乎􅉑叔許諾鄭伯將王自圉門入􅉑叔自北門入二門王城門殺子頽及五木夫王乃入禮記曰姦聲乱色不留聦明􅁋樂慝禮不接心術又曰姦聲感人而逆氣應之逆氣成象而􅁋樂興焉又曰作竒􅇊􅁋巧以蕩上心者殺無赦又曰鄭音好濫􅁋志宋音燕女溺志衛音趍數煩志齊音傲僻驕志此四者􅁋於色而害於德論語曰􅁖紫之奪朱􅁖鄭聲之乱雅樂包曰鄭聲􅁋聲之哀者漢書曰王莽􅀄獻新樂於明堂太廟群臣始冠麟韋之弁或聞其樂聲曰厲而哀非興國之聲也宋書曰廢帝元徽五年太樂雅鄭共千有餘人後堂􅄂􅇊不在其數裴子野宋略日先王作樂崇德以格神人通天下之至和節群生之流放故天子逹於士庶未曽去其樂而無非僻之心及周道衰微日失其序亂俗先之以怨怒國亡從之以哀思擾􅄂子女蕩恱􅁋志充庭廣奏則以魚龍靡漫爲瓌瑋㑹同享覲則以吴趍楚舞爲妖妍纎羅霧縠侈其衣踈金鏤玉砥其器在上班􅀭寵臣群下亦從風而靡王侯將相歌妓填室鴻啇冨賈舞女成群競相誇大互有争奪如恐不及莫爲禁令傷物敗俗莫不在此隋書曰裴藴􅌆帝徴爲太常少卿􅀄髙祖不好聲妓遣牛弘定樂非正聲清啇及孔部四舞之色皆罷遣從臣至是揣知帝意奏括天下周齊梁陳樂家子弟皆爲樂戸其六品巳下至於民庶有善音樂及倡優百戯者皆直太常是後異􅇊􅁋聲咸萃樂府皆置􅀶士弟子逓相教傳増益樂人至三萬餘國語曰平公旣作新聲新聲師㳙新聽者也師曠曰公室其將卑乎君之萌兆衰矣樂以間山川之風輝德於廣逺也風徳以廣風德者德各有風類也作樂各象其德韶夏護武之謂也風山川以逺之所樂以通山川之風􅀋也逺其德也風物以聽之修詩以詠之修禮以節之夫德廣逺而有節是以逺服而迩不遷迩近􅀃苑曰子路鼓瑟有北都之聲孔子聞之曰信矣由之不才也冉有侍孔子曰求來尓奚不謂由夫先王之制音也奏中聲爲中節彼小人則不然執末以論夲務剛以爲基故其音湫厲而微末以象殺伐之氣夫殺者乃亂亡之風也冉有以告子路子路曰由之罪也後果不得其死焉淮南子曰􅀭鄭衛之浩樂結激楚之遺風此齊人之所以􅁋泳流􅊺列女傳曰夏桀旣棄禮義􅁋於婦人求四方美人積之後宫造爛漫之樂吕氏春}
