  - {type: variant, offset: 3370, length: 206, content: 問其得失要務舒遟眾工多笑之忽忿然作色奏曰曲雖妙其間有不可者上驚問之即指一琵琶云此人逆而忍兼即抵法不宜在至尊前又指一笙云此人神魂已遊墟墓不可更令供奉上令主者潛伺察之旋而琵琶者為同儕告訐稱六七年前其父自縊不得端由即令按鞫遂伏其罪笙者憂恐不食旬日而卒上益加知遇面賜章綬累累召對每令察樂樂工見之悉喘恐脅不敢正視沇懼禍辭病而退女樂部左傳襄二曰鄭人賂晉侯以女樂晉侯以樂之半賜魏絳史記曰孔子為政齊人懼梨鉏乃選齊國中女樂好音八十, SBCK: 􅇊}
