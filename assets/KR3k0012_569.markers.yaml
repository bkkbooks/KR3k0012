  - {type: variant, offset: 4502, length: 0, content: '', WYG: 慝禮不接心術又曰姦聲感人而逆氣應之逆氣成象而淫樂興焉又曰作竒伎滛巧以蕩上心者殺無赦又曰鄭音好濫滛志宋音燕女溺志衛音趨數煩志齊音傲僻驕志此四者滛於色而害於徳論語曰惡紫之奪朱也惡鄭聲之亂雅樂也包曰鄭聲滛聲之哀者漢書曰王莽初獻新樂於明堂太廟羣臣始冠麟韋之弁或聞其樂聲曰厲而哀非興國之聲也宋書曰廢帝元徽五年太樂雅鄭共千有餘人后堂雜伎不在其數裴子野宋畧曰先王作樂崇徳以格神人通天下之至和節羣生之流放於天子達於士庶未曽去其樂而無非僻之心及周道衰㣲日失其序亂俗先之以怨怒國亡從之以哀思擾雜子女蕩悦滛心充庭廣奏則以魚龍靡漫為環瑋㑹同享覲則以吴趨椘舞為妖妍纎羅霧縠侈其衣踈金縷玉砥其器在上班揚寵臣羣下亦從風而靡王侯將相歌妓填室鴻商富賈舞女成羣競相誇大致有争奪如恐不及莫為禁令傷風敗俗莫不在此隋書曰裴藴煬帝徴為太常少卿初髙祖不好聲妓遣牛𢎞定樂非正聲清商及七部四舞之色皆罷遣從臣至是揣知帝意奏括天下周齊梁陳樂家子弟皆為樂户其六品已下至於民庶有善音樂及倡優百戯者皆直太常是後異伎滛聲咸萃樂府皆置􅀶士弟子逓相教傳増益樂人至三萬餘國語曰平公}
