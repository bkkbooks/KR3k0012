骨咄憂懼一夕而殞又曰望江南者因朱崖李太尉鎮浙西日為亡姬謝秋娘所撰後進入教坊遂改名一名夢江南曲也又曰康老子者本長安富室家子酷好聲樂落托不事生計常與國樂遊處一旦家產蕩盡因詣西鄽遇一媼持舊錦茵貨鬻次康乃酬半千獲得之尋有波斯見大驚謂康老曰何處得此至寶此是冰蠶所織若暑月陳於榻上可致一室清涼因酬價千萬鬻之康老獲此厚價復與國樂追歡不三數年間費用又盡康老尋歿樂嗟歎之乃撰此曲也又曰大郎神者天后朝有一士人陷冤獄仍籍沒家族其妻配入掖庭本初善吹觱篥因撰此曲寄其哀情始名大郎神蓋取其良人行第也畏人知遂三易其名悲切子離別難終名怨廻鶻羯鼓錄曰宋開府孫沇有音律之學貞元中進樂書三卷德宗覽而嘉之知是開府之孫遂召對命坐與論音樂甚喜數曰又召至宣徽張樂使觀焉曰有舛誤乖濫悉可言沇曰容臣與樂官商摧講論具狀條奏上宣教坊使與樂官參議數日二使奏樂多言沇曾不解聲調不審節拍又聵疾不可議樂上頗異之又召沇對沇曰臣老年多病耳實失聰若迫於聲律不至無業上又使作樂曲罷問其得失要務舒遟眾工多笑之忽忿然作色奏曰曲雖妙其間有不可者上驚問之即指一琵琶云此人逆而忍兼即抵法不宜在至尊前又指一笙云此人神魂已遊墟墓不可更令供奉上令主者潛伺察之旋而琵琶者為同儕告訐稱六七年前其父自縊不得端由即令按鞫遂伏其罪笙者憂恐不食旬日而卒上益加知遇面賜章綬累累召對每令察樂樂工見之悉喘恐脅不敢正視沇懼禍辭病而退女樂部左傳襄二曰鄭人賂晉侯以女樂晉侯以樂之半賜魏絳史記曰孔子為政齊人懼梨鉏乃選齊國中女樂好音八十, WYG: ''}
