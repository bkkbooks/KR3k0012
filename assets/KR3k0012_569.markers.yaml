  - {type: variant, offset: 8, length: 0, content: '', SBCK: 魯定公與齊侯㑹於夾谷孔子攝相事齊奏宮中之樂優倡侏儒戲于前孔子趍進曰疋夫而熒侮諸侯有罪應誅於是斬侏儒手足異處齊俟懼有慙色史記曰優旃者秦侏儒也善爲􅀏言然合於道􅁗始皇時置酒而天雨陛楯者沾寒優旃見而哀之謂之曰汝欲休乎陛揗者曰幸甚優旃曰我即呼汝汝疾應曰諾居殿上上}
