  - {type: variant, offset: 4559, length: 0, content: '', SBCK: 言樂乎亡國戮民非無樂也其樂不樂溺者非不􅀏也溺人必􅀏雖􅀏不樂罪人非不歌也當死強歌歌不樂也亂世之樂有似於此夫樂有適心亦有過人之情欲壽而􅁖夭欲安而􅁖危欲榮而􅁖辱欲逸而􅁖勞四欲得四􅁖除則心適矣又曰楚之衰也作爲巫音髙誘注曰男曰鵛女曰巫華桓譚新論曰夫不剪之室不如阿房之宫不琢之椽不如磨龍石之桶玄酒不如蒼梧之醇控楬不如流鄭之樂樂􅀃曰聲放散則政荒崔氏云由君上驕逸則萬物荒散啇聲欹散邪官不理政壞刑罰不法而威令不行角聲憂愁爲政虐民民怨故也民不安業猶君失政徴聲哀苦事煩民勞君􅁋佚崔氏云由君邪民苦於役羽聲傾危則國不安崖氏云賦徭重其民困財物匱梁元帝纂要云古艶曲有北里靡靡激楚流風陽阿之曲皆非正聲之樂也流風亦日結鳳也唐㑹要曰調露元年太子使樂工於東宫新作寳慶之曲成命工者奏于太清觀始平縣令李嗣真謂道士}
  - {type: page-break, offset: 4559, content: '', id: KR3k0012_SBCK_569-8b}
  - {type: variant, offset: 4559, length: 0, content: '', WYG: 言樂乎亡國戮民非無樂也其樂不樂溺水者非不笑也溺人必笑雖笑不樂罪人非不歌也當死强歌歌不樂也亂世之樂有似於此夫樂有適心亦有過人之情欲夀而惡夭欲安而惡危欲榮而惡辱欲逸而惡勞四欲得四惡除除則心適矣又曰楚之衰也作為巫音髙誘注曰男曰雞女曰巫桓譚新論曰夫不剪之茨不如阿房之宫不琢之椽不如磨礱之桷𤣥酒不如蒼梧之醇控掲不如流鄭之樂樂説曰聲放散則政荒崔氏云由君上驕逸則萬物荒散商聲歌散邪官不理政壞刑罰不法而威令不行角聲憂愁為政虐民民怨故也民不安業猶君失政徴聲哀苦事煩民勞君滛佚崔氏云由君邪民苦於役羽聲傾危則國不安崔氏賦徭重其民困財物匱梁元帝纂要云古艶曲有比里靡靡激楚流風陽阿之曲皆非正聲之樂也流風亦曰結風也唐㑹要曰調露元年太子使樂工於東宫新作寳慶之曲成命工者奏於太清觀始平縣令李嗣真謂道士}
