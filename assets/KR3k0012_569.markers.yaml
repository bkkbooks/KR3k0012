  - {type: variant, offset: 4564, length: 5, content: 作蜀伎樂傍, SBCK: 徴也角徴失位父子不恊之兆也殺聲旣多哀調又苦􅀂國家無事太子受其咎矣數月太子廢又曰咸通中伶官李可乆善音律尤能轉喉爲新聲音辝曲折聽者忘倦京師屠沽少年効之謂之拍彈時同昌公主除䘮懿宗與郭淑妃悼念不巳可乆爲歎百年舞曲舞}
