  - {type: variant, offset: 742, length: 241, content: 江左諸曲哇淫然而從容雅緩猶有士君子之風焉自長安年以後朝廷不重古典工伎漸缺能合于管絃者唯明君楊叛兒驍壺春歌白雲堂堂春江花月夜八曲舊樂多或數百言明君尚能四十言今所傳二十六言漸訛失與吳音轉遠宜取於吳人使之傳習開元中有歌工李郎子北人也調聲已失云學於前才生郎子亡後清樂唯歌一曲詞典詞典而音雅自周隋已來多用西涼樂鼓舞曲多用龜茲樂其曲度皆時俗所知也唯琴家獨傳楚漢聲及清諷瑟調蔡邕五弄謂之九筭雅樂尚存非朝廷郊廟所用故不載自唐虞迄三代舞用國子樂用瞽師漢魏已後皆以賤隸為之唯雅樂尚又曰高麗百濟樂宋朝初得, SBCK: 縱觀}
