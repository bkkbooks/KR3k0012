  - {type: variant, offset: 4552, length: 1, content: 陽, krp: 世如之以柸盤舞詩云妍妯凌七盤言舞用盤七枚也梁謂之盤舞伎梁又有長蹻伎跳鈴伎擲倒跳劒伎吞劒伎今並存又有舞輪伎盖今之戯車輪者透三峽伎盖今之透飛梯之類髙絙伎盖今之戯䋲者是也梁有猕猴幢戯今有縁竿伎又猕猴縁竽未審何者爲是今又有弄椀珠伎弄丹珠伎歌舞戯有大面撥頭蹋揺娘窟儡子等戯置教坊於禁中以處之又曰散樂非部伍之聲俳優歌舞雜奏漢天子臨軒設樂舎利獸從西方來戯於殿前激水成比自魚跳躍漱水作霧翳日此成黄龍脩丈八出水遊戯煇熠曰光䋲繫兩柱相去數丈二倡女對舞䋲上切肩而不傾如是雜變㧾名百戯江東猶有髙絙紫鹿跋行鱉食齊王卷衣笮䑕夏育杠鼎臣象行乳神龜抃足背負靈嶽柱樹曰雪畫地成川之伎明皇雜録曰上御勤政樓大張聲樂羅列百伎時教坊有王大娘善戰百尺竿竿上施木山狀瀛洲方丈仍令小兒持鋒節出入其間而舞不輟時劉晏爲祕書省正字年方小形狀獰劣而惠悟過人上召於樓上簾下貴妃置於膝爲施粉黛與之巾櫛上令詠王大娘戴竿晏應聲曰樓前百戯競爭新唯有長竿妙入神誰爲綺羅翻有力猶自嫌輕更着人因命牙笏及黄紋𫀆以賜晏時有公孫大娘者善劒舞能爲鄰里曲及裴將軍士謂之春秋設大張伎樂雖小大優劣不同而劇其華侈遐方僻郡歡縱亦然樂府雜録曰大面出於北齊齊蘭陵王長恭才武而皃美常着假面以對敵常擊周師金墉下勇冠三軍齊人壯之爲此聲以効其指撝擊刺之容俗爲之蘭陵王入陣曲淫樂左傳曰煩手淫聲慆堙心耳乃忘和平謂之鄭聲許真五經異義曰鄭囯有溱洧之水男女聚㑹謳歌相感今鄭詩二十一篇婦人者十九故鄭聲淫也又云鄭重之音使人淫過也又曰惠王三年邊伯石遬蔿國出王立王頽王處千鄭三年子頽飲三大夫酒子國爲客子囯蔿囯客上客樂及偏聲偏舞六代之樂一日諸大夫偏釋鄭厲公見􅉑叔厲公鄭莊公之子厲公突也􅉑叔王卿士􅉑公林父也曰吾聞之司冦行戮君爲之不舉不舉樂也而况敢樂禍乎今吾聞子頽歌舞不思憂夫出王而代其位禍孰大焉臨禍忘憂是謂樂禍禍必及之盍納王乎􅉑叔許諾鄭伯將王自圉門入􅉑叔自北門入二門王城門殺子頽及五木夫王乃入禮記曰姦聲乱色不留聦明淫樂慝禮不接心術又曰姦聲感人而逆氣應之逆氣成象而淫樂興焉又曰作竒伎淫巧以蕩上心者殺無赦又曰鄭音好濫淫志宋音燕女溺志衛音趍數煩志齊音傲僻驕志此四者淫於色而害於德論語曰悪紫之奪朱悪鄭聲之乱雅樂包曰鄭聲淫聲之哀者漢書曰王莽𥘉獻新樂於明堂太廟群臣始冠麟韋之弁或聞其樂聲曰厲而哀非興國之聲也宋書曰廢帝元徽五年太樂雅鄭共千有餘人後堂雜伎不在其數裴子野宋略日先王作樂崇德以格神人通天下之至和節群生之流放故天子逹於士庶未曽去其樂而無非僻之心及周道衰微日失其序亂俗先之以怨怒國亡從之以哀思擾雜子女蕩恱淫志充庭廣奏則以魚龍靡漫爲瓌瑋㑹同享覲則以吴趍楚舞爲妖妍纎羅霧縠侈其衣踈金鏤玉砥其器在上班揚寵臣群下亦從風而靡王侯將相歌妓填室鴻啇冨賈舞女成群競相誇大互有争奪如恐不及莫爲禁令傷物敗俗莫不在此隋書曰裴藴煬帝徴爲太常少卿𥘉髙祖不好聲妓遣牛弘定樂非正聲清啇及孔部四舞之色皆罷遣從臣至是揣知帝意奏括天下周齊梁陳樂家子弟皆爲樂戸其六品巳下至於民庶有善音樂及倡優百戯者皆直太常是後異伎淫聲咸萃樂府皆置博士弟子逓相教傳増益樂人至三萬餘國語曰平公旣作新聲新聲師㳙新聽者也師曠曰公室其將卑乎君之萌兆衰矣樂以間山川之風輝德於廣逺也風徳以廣風德者德各有風類也作樂各象其德韶夏護武之謂也風山川以逺之所樂以通山川之風類也逺其德也風物以聽之修詩以詠之修禮以節之夫德廣逺而有節是以逺服而迩不遷迩近說苑曰子路鼓瑟有北都之聲孔子聞之曰信矣由之不才也冉有侍孔子曰求來尓奚不謂由夫先王之制音也奏中聲爲中節彼小人則不然執末以論夲務剛以爲基故其音湫厲而微末以象殺伐之氣夫殺者乃亂亡之風也冉有以告子路子路曰由之罪也後果不得其死焉淮南子曰揚鄭衛之浩樂結激楚之遺風此齊人之所以淫泳流湎列女傳曰夏桀旣棄禮義淫於婦人求四方美人積之後宫造爛漫之樂吕氏春}
