  - {type: variant, offset: 4796, length: 392, content: 人一時俱教少時百人中果有一人聲及之便殺向惡性者俗說曰宋椲是石崇伎綠朱弟子有國色善吹笛後在晉明帝聞帝疾患危篤群臣進諫請出宋禕時朝賢悉見帝曰卿諸人誰欲得之者眾人無言阮遙集時為吏部尚書對曰願以賜臣即與之鹽鐵論曰貴人之家中山素女撫流徵於堂上鳴鼓巴俞交作於堂下婦人被羅紈婢妾曳絺紵賢良曰古者彈箏鼓而已無妙要之音今富者鳴箏調琴鄭舞趙謳續搜神記曰袁真在豫州遣女伎紀陵阿薛阿郭阿馬三妓與桓宣武既至經時三人共出庭前觀忽有一流星直墮盆池冏然明淨薛郭二人更以瓢酌取皆不得阿馬最後取正入瓢中便飲之即覺有娠遂生桓溫世說曰王導作女伎蔡謨在坐不悅而去導知亦不止之笑林曰某甲者為霸府佐為人都不解每至集會有聲樂之事己輒豫焉而恥不解妓人奏讚之己亦學人仰讚和同時人士令己作主人并使喚妓客妓客未集召妓具問曲吹一一䟽著手巾箱下先有藥方客既集因問命曲先取所䟽者誤得藥方便言是䟽方有附子三分當歸四分己云且作附子當歸以送客舍滿座絕倒, SBCK: 六十九}
