  - {type: variant, offset: 16, length: 7, content: 為豫州剌史所作, SBCK: 臨朝嘆息應侯進曰臣聞主憂臣辱主辱臣死今王中朝而憂臣敢請其罪王曰吾聞楚之鐵劒利而倡優拙夫鐡劒利則士勇倡優拙則思慮逺夫以逺思慮而衘勇土恐楚國之圖􅁗}
