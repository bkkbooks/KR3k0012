  - {type: variant, offset: 4571, length: 3, content: 代禪感, SBCK: 盛飾珠翠仍􅀞魚龍地衣以列之曲終樂闋珠翠覆地詞語悽惻聞者流涕又常於安樂寺作菩薩蠻舞上益憐之可乆常爲子娶婦帝賜酒二銀鐏啓之乃金翠也時宰相曹磪中尉西門季玄屢論之懿宗不納至僖宗即位宰相崔彦昭奏遂死於嶺表開元傳信記曰唐開元末年涼州進新曲上命諸王於便殿觀之曲終諸王皆稱萬歳獨寕王不賀玄宗徴其故憲曰此曲雖嘉臣有聞焉夫曲者始於宮散於啇武於角徴羽莫不根柢囊括在於宫啇也臣見此曲宮離}
