  - {type: variant, offset: 11, length: 4, content: 宋南平穆, WYG: 優倡侏儒戱於前孔子趨進曰匹夫而熒侮諸侯有罪應誅於是斬侏儒手足異處齊侯懼有慙色史記曰優旃者秦侏儒也善為笑言然合於道秦始皇時置酒而天雨陛楯者沾寒優旃見而哀之謂之曰汝欲休乎陛楯者曰幸甚優旃曰吾即呼汝汝即應曰諾殿上上夀呼萬嵗旃大呼曰陛楯郎郎曰諾優旃曰汝雖長何益故雨中立我雖短也故休居於是乎使得半相代史記曰秦昭}
