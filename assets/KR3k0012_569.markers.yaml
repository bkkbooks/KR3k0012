  - {type: variant, offset: 419, length: 271, content: 豐等凡樂以聲徐者為本聲疾者為解唐會要曰清樂者凡代之遺聲其始即清商三調是也並漢氏已來舊典樂器製度并諸歌章古調與魏三祖作者皆被史籍自晉氏播遷其音分散不復存於內地符堅滅梁得之于前後二秦及宋武定關中收之入江南及隋平陳後獲之隋文聽之善其節奏曰此華夏正聲也因更損益去其哀怨考而補之乃置清署商揔謂之清樂西倞等為九部隋室喪亂日益淪缺矣后朝猶有六十三曲今其詞存者有白雲公莫巴渝明君之君鐸舞曰鳩子夜吳聲四時歌前溪阿子歡聞團扇懊惱白紵玉樹後庭花春江花春江月夜長史變丁督護讀曲烏夜啼石城莫愁襄陽栖烏夜飛估客楊叛兒雅歌龍舟等三十二曲明君雅歌各二首四時四首合三十七首又七, SBCK: 豊}
