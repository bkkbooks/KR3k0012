  - {type: variant, offset: 4597, length: 172, content: 不能輔之久全況姜維耶充曰不如是何由併之哉夏仲御別傳曰仲御從父家女巫章丹陳珠二女妍姿冶媚清歌妙舞狀若飛仙又曰仲御當正會宗弟承問御曰黃帳之裏西施之孫鄭袖之子膚如凝脂顏如桃李徘徊容與載進載止彈琴而奏清角翔風至而玄雲起若乃攜手交舞流盻頡頑足踰鞞鼓口銜笙黃丹裙赫以四序素耀煥以楊光赴急絃而折倒應緩節以相佯遠望而雲近視而雪舒紅顏而微笑啟朱唇而揚聲世說曰魏武, SBCK: 羽調後}
