  - {type: variant, offset: 3704, length: 593, content: 女樂弟子以次相傳鮮有入其室者盧植字子幹侍講數年未嘗融以是嘉之也魏志曰夏侯惇從太祖征孫權還使惇都督二十六軍留居巢賜妓樂名倡令曰魏絳以和戎之功猶受金石之樂況將軍乎又曰曹爽飲食車服擬於乘輿又私取先帝才人七八將吏師工鼓吹良家子女三十三人皆以為妓詐作詔書發才人五十七送鄴臺使先帝婕妤教習為妓擅取太樂樂器武庫禁兵作窟室綺䟽四周數與何晏等會其中縱酒作樂又曰楊阜為武都太守會馬超來寇曹洪置酒大會女倡著羅縠衣蹋鼓一座皆笑楊阜厲聲責洪曰男女有別遂奮衣出洪立罷女樂請阜還座肅然憚之陳書章昭達每飲會必盛設女伎雜樂備羗胡之聲音律姿容並一時之妙雖臨敵弗之廢也隋書房暉遠傳高祖嘗謂群臣曰自古天子有女樂乎楊素以莫知所出遂言無女樂暉遠進曰臣聞窈宨淑女鍾鼓樂之此即王者房中之樂著於雅頌不得言無高祖大說又曰牛弘修皇后房內之樂文帝龍潛時頗好音樂嘗倚琵琶作歌二首名曰地厚天高託言夫妻之義因即取之為房內曲命婦人並登歌上壽並用之職在宮內女人教習之唐書曰先天元年正月皇太子令宮臣就率更寺閱女樂太子舍之賈曾諫曰臣聞作樂崇德以感神人韶夏有容威英有節婦人媟黷無廁其間昔魯用孔子幾致於霸齊人懼之饋以女樂魯君既受孔子遂行戎有由余兵強國富秦人反間遺之女妓戎王躭悅由余乃奔斯則大聖名賢疾之已久矣良以婦人為樂必務冶容哇咬動心蠱惑喪志上行下效淫俗將成敗國亂人實由茲起殿下監撫餘閑宴私多適後庭妓樂古或有之至於所司教習彰示群僚慢妓淫聲實虧眷化伏願並令禁斷墨, SBCK: ''}
