  - {type: variant, offset: 3579, length: 1, content: 文, WYG: 錦綉繒綵其歌者多為婦人服鳴環珮飾以花髦者殆三萬人初課京兆河南製此服}
  - {type: variant, offset: 3579, length: 1, content: 文, krp: 錦繍繒綵其歌者多爲婦人服鳴環珮飾以花髦者殆三萬人初課京兆河南製此服}
  - {type: variant, offset: 3581, length: 0, content: '', SBCK: 西京繒錦爲之中虚六年諸夷大獻方物突厥啓人以下皆國主親來朝乃賀於天津街盛陳百戯自海内凡有􅇊藝無不㧾萃崇侈器翫盛飾衣服皆用珠翠金銀錦􅄢絺繍其營費鉅萬閞西以安德王雄揔之東都以齊王􅌔㧾之金石匏革之聲聞數十里外彈弦㩎管以上萬八千人大列炬火光燭天地百戲之盛振古無比自是毎年以爲常焉大抵散樂􅄂戲多幻術皆出西域始以善幻人至中國漢安帝時天笁獻􅇊能自斷手足刳剔膓胄自是歴代有之趙書曰石勒叅軍周延爲館陶令斷官絹數百疋下獄以八議宥之後毎大㑹使俳優着介㥽黄絹單衣優問汝爲何官在我軰中曰我夲爲館陶令斗數單衣曰政坐取是故入汝軰中以爲􅀏列女傳曰夏桀旣棄禮義滛於婦人求四方美人積之後宫於俳優侏儒而爲竒偉戲者取之於房造爛熳之樂漢官典職曰正旦天子幸德陽殿作九賔樂舎利從東來戯於庭畢入殿門激水化成比目魚跳躍漱水作霧鄣日畢化成黄龍髙丈八出水遨戲於庭炫燿日光以二丈􅁝繫兩柱中頭間相去數丈兩倡女對}
  - {type: page-break, offset: 3581, content: '', id: KR3k0012_SBCK_569-3b}
  - {type: variant, offset: 3581, length: 0, content: '', WYG: 西京繒錦為之中虛六年諸夷大獻方物突厥􅀈人以下皆國主親来朝乃賀於天津街盛陳百戯自海内凡有伎藝無不總萃崇侈器翫盛飾衣服皆用珠翠金銀錦羅絺繡其營費鉅萬闗西以安徳王雄總之東都以齊王􅌔總之金石匏革之聲聞數十里外彈弦擫管以上萬八千人大列炬火光燭天地百戯之盛振古無比自是每年以為常焉大抵散樂雜戯多幻術皆出西域始以善幻人至中國漢安帝時天竺獻伎能自㫁手足刳剔腸胃自是歴代有之趙書曰石勒叅軍周延為舘陶令㫁官絹數百疋下獄以八議宥之後每大㑹使俳優着介幘黄絹單衣優問汝為何官在我輩中曰我本為舘陶令抖擻單衣曰政坐取是故入汝輩中以為笑列女傳曰夏桀既棄禮義滛於婦人求四方美人積之後宫於俳優侏儒而為竒偉戯者取之於房造爛熳之樂漢宫典職曰正旦天子幸徳陽殿作九賔樂舍利從東来戯於庭畢入殿門激水化成比目魚跳躍潄水作霧障日畢化成黄龍髙丈八出水遊戯於庭炫燿日光以二丈絲繫兩柱中頭間相去數丈兩倡女對}
