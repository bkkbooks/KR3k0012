  - {type: variant, offset: 4498, length: 3, content: 大會禮, SBCK: 正㑹殿前作}
  - {type: variant, offset: 4498, length: 0, content: '', WYG: 正㑹殿前作樂高絙龍魚鳳凰安息五案之屬莫不畢偹有額上縁橦至上鳥飛左迴右轉又以橦着口齒上亦如之設馬車立木橦其車上長二丈橦頭安橦木兩伎兒各坐木一頭或鳥飛或倒掛又衣伎兒作獼猴之形走馬上或在脇或在馬頭或在馬尾馬走如故名為猨騎樂府雜録曰㺯叅軍始因後漢舘陶令石躭有贜穢和帝惜其才免罪每宴樂即令衣白夹衫命優伶戯㺯辱之經年乃放後為叅軍誤也開元中有李仙鶴善此戯明皇特授韶州同正叅軍以食其幹是以陸鴻漸撰詞云韶州盖由此}
  - {type: page-break, offset: 4498, content: '', id: KR3k0012_WYG_569-7b, image: WYG0898/WYG0898-0245b.png}
  - {type: variant, offset: 4498, length: 3, content: 大會禮, krp: 正㑹殿前作}
  - {type: variant, offset: 4499, length: 1, content: 會, WYG: 周正樂曰漢武帝通西域始以善幻人至中國安帝時天竺獻伎能自㫁手足刳腹胸自是歴世有之唐髙宗惡其驚俗勅西域闗津不令入中國唐書樂志曰睿宗時婆羅門樂人倒行而足舞乃仰植刀鋒於地低因就刄厯臉下復植于背吹觱篥立其腹上終曲而無傷又伏伸其手人躡之旋身遶手百轉無已漢世有橦木伎又有盤舞晉世加之以杯盤舞舞詩云妍細􅇒七盤言舞用盤七枚也梁謂之盤舞伎梁又有長蹻伎跳鈴伎擲倒跳劍伎吞劍伎今並存又有舞輪伎盖今之戯車輪者透三峡伎盖今之透飛梯之類高絙伎盖今之戯繩者是也梁有獼猴幢戯今有縁竿伎又獼猴縁竿未審何者為是今又有㺯椀珠伎㺯丹朱伎歌舞戯有大面撥頭蹋揺娘傀儡子等戯置教坊於禁中以處之又曰散樂非部伍之聲俳優歌舞雜奏漢天子臨軒設樂舎利獸從西方来戯於殿前激水成比目魚跳躍潄水作霧障日化成黄龍修丈八風出水遊戯煇熠日光繩繫兩柱相去數丈二倡女對舞繩上切肩而不傾如是雜變總名百戯江東猶有髙絙紫鹿跂行鱉食齊王卷衣笮䑕夏育扛鼎巨象行乳神龜抃足背負靈嶽桂樹白雪畫地成川之伎明皇雜録曰上御勤政樓大張聲樂羅列百伎時教坊有王大娘善戴百尺竿竿上施木山狀瀛洲方丈仍令小兒持絳節出入其間而舞不輟時劉晏為秘書省正字年方幼小形狀獰劣而惠悟過人上召於樓上簾下貴妃置於膝為施粉黛與之巾櫛上令詠王大娘戴竿晏應聲曰樓前百戯競争新惟有長竿妙入神誰謂綺羅翻有力猶是嫌輕更着人因命牙笏及黄紋袍以賜晏時有公孫大娘者善劍舞能為隣里曲及裴將軍士謂之春秋設大張伎樂雖小大優劣不同而極其華侈遐方僻郡歡縱亦然樂府雜録曰大曲出於北齊齊蘭陵王長恭才武而貎美嘗着假面以對敵常擊周師金墉下勇冠三軍齊人壯之為此聲以効其指撝擊刺之容俗為之蘭陵王入陣曲滛樂左傳曰煩手滛聲惂堙心耳乃忘和平謂之鄭聲許慎五經異義曰鄭國有溱洧之水男女聚㑹謳歌相感今詩二十一篇婦人者一十九故鄭聲滛也又云鄭重之音使人滛過也又曰惠王三年邉伯石遫蒍國出王立子頺王處於鄭三年子頺飲三大夫酒子國為客子國蒍國客上客樂及徧舞徧舞六代之樂一曰諸大夫徧舞鄭厲公見虢叔厲公鄭莊公之子厲公突也虢叔王卿士虢林父也曰吾聞之司冦行戮君為之不舉不舉樂也而况敢樂禍乎今吾聞子頺歌舞不思憂夫出王而代其位禍孰大焉臨禍忘憂是謂樂禍禍必及之盍納王乎虢叔許諾鄭伯將王自圉門入虢叔自北門入二門王城門殺子頺及大夫王乃入}
