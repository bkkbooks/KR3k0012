  - {type: variant, offset: 4503, length: 9, content: 陳虎繳兩閣上窗幌宮, WYG: 作新聲新聲師涓所聽者也師曠曰公室其將卑乎君之萌兆衰矣樂以開山川之風輝德於廣逺也風德以廣之風德者德各有風類也作樂各象其德韶夏濩武之謂也風山川以逺之所樂以通山川之風類以逺其德也風物以聽之修詩以詠之修禮以節之夫德廣逺而有節是以逺服而邇不遷説苑曰子路鼓瑟有北鄙之聲孔子聞之曰信矣由之不才也冉有侍孔子曰求来爾奚不謂由夫先王之制音也奏中聲為中節彼小}
