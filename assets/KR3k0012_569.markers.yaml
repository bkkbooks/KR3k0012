  - {type: variant, offset: 996, length: 2373, content: 未具周武滅齊威振海外二國各獻其樂周人列於樂部謂之國伎隋文平陳及文康禮俱得之又曰貞觀十四年景雲見河水清恊律郎張文收採古朱鴈天馬之義制景雲河清歌名曰讌樂奏之管絃為諸樂之首今元會第一奏者是也又曰武德初未暇改作每讌享因隋制奏九部樂一讌樂二清商三西涼四扶南五高儷六龜茲七安國八踈勒九康國貞觀十六年十一月宴百僚奏十部先是伐高昌收其樂付太常乃增九部為十部伎今通典所載十部之樂無扶南樂祇有天竺樂事見南蠻樂其後分為立坐二部立部伎有八部一安樂後用平齊所作二太平樂亦謂之五方師子舞三破陣樂四慶善樂五大定樂亦謂之八紘同軌樂太宗平遼時作也六上元樂高宗所作七賢壽樂武太后所在舞時行列成字有聖超千古道冠百王皇帝萬年寶祚彌昌八光聖樂玄宗所在自安樂已下每奏皆雷大鼓同用龜茲樂並立奏之其大定樂加以金鉦唯慶善樂獨用西京樂㝡為閑雅其破陣上元慶善三舞皆易其衣冠合其鍾磐以享郊廟自天后臨朝此禮遂廢神龍三年八月勑立部伎舞人以後更不得改補入諸色役坐部伎有六部一讌樂張文收所作也又分為四部有景雲慶善破陣承天等樂二長壽樂武太后長壽年所作三天授樂武太后天壽年所作四烏歌方歲故為樂以像之五龍池樂玄宗所作也帝在藩邸時居崇慶坊宅中經兩地忽為池及即位以宅為宮故為樂以歌其祥六小破陣樂玄宗所在生於舞用四人被之金甲自長壽已下皆用龜茲樂人皆著靴唯龍池用雅樂而無鍾磬舞人盡躡履而行其樂章又有陣樂詞七首中和樂詞五首五方師子詞五首南詔奉聖樂詞五首聖壽荷皇恩詞四首聖壽樂詞四首大定樂詞六首上元樂詞一十五首文武順聖樂詞九首貞觀未有裴神符有妙解琵琶唯作璽蠻奴大鳳傾盃樂三曲聲度清美太宗深愛之高宗未真伎遂盛於時泊天后至神龍之際大增加立坐部伎諸舞尋亦廢之而已又曰高宗御含元殿東翔鸞閣大酺當時京城四縣及太宗音樂分為東西朋雍王賢為東朋周王顯為西朋務以角勝為樂禮畢曲者本自晉太尉庾亮家卒其容取其謚以號之謂文康樂每奏九部樂終則陳之故以禮畢為名其曲有散花樂等隋平陳得之入九部器有笙笛簫箎鈴盤鞞腰鼓等七種三懸為一部工二十人今亡太平樂亦謂之五分師子舞師子縶獸出於西南夷天笁師子等國綴毛為之象其俛仰馴狎之容二人持繩拂為習弄之狀五師子各位其方色百四十人歌太平樂舞抃以從之服飾皆作崑崙象上元樂高宗所造舞者百八十一人起雲衣備五色以象元氣故曰上元烏歌萬歲樂武太后所造時宮中養鳥能人言又常稱萬歲為樂以象之舞三人緋大袖並畫鸜鵒冠作鳥象今嶺南有鳥似鸜鵒養之久則能言名吉了了音料光聖樂玄宗所造也舞八十人鳥冠五綵畫衣兼似上元聖壽之容以歌王業所興自安樂以後皆雷大鼓雜以龜茲樂聲震百里並立奏之其大定樂加金鉦唯慶善樂獨用西涼樂㝡為閑雅舊破陣上元慶善三舞皆易其衣冠合之鍾磬以享郊廟自武太后革命此禮遂廢自安樂部謂之立部伎也大唐平高昌盡收其樂又造讌樂而去禮畢曲令著令者唯十部龜茲䟽勒安國康國高麗西涼高昌燕清樂伎天笁凡十部南蠻北狄國俗皆隨髮際斷其髮今舞者咸用繩圍首反約髮抄內於繩下又有新聲自河西至者號胡音聲與龜茲樂散樂俱為時重諸樂咸之小寢大定樂高宗所造出自破陣樂舞者四十人被五綵文甲持槊歌和云八紘同軌樂以象平遼東而邊隅大定也唐會要曰貞元三年四月河東節度使馬燧定難曲御麟德殿閱試之又曰汴州節度使韓弘進聖朝萬歲樂曲譜凡三百首又曰延載元年正月二十三日制越古長年樂一曲又曰十二年十二月昭義節度使王虔休獻繼天誕聖樂表曰臣伏見開元中天長節度日四海歡娛萬年獻壽竊以陛下降誕之日有惟新之曲適過之音臣遣成繼天誕聖樂一曲天抵宮為調表五音之奉君也以上為德知五運之居中也凡二十四遍法二十四氣西成一歲之功也不聞沾懘之音以作中和之樂其曲譜同進上先太常人劉玠流落至潞州虔休因令造此曲以進今中和樂起於此中又曰顯慶二年上以琴中雅曲古人歌之近代已來此聲頓絕令所司修習舊典至三年十月八日太常丞呂才奏按張華博物志白雪是天帝使素女鼓五絃曲名以其調高人和遂寡自宋王已來迄今千祀未有能歌白雪曲者臣今准勑依琴中舊曲定為宮商然後教習並合於歌輒以御製雪詩為白雪歌詞又樂府奏正典之後皆有送聲君唱臣和事彰前史觀取侍中許敬宗等奉和雪詩十六首以為送聲各十六節上善之仍付太常編於樂府樂府雜錄曰雨淋鈴者因唐明皇駕廻至駱谷聞雨淋鑾鈴因令張野狐撰為曲名又曰夜半樂者因唐玄宗自潞州入定內難進軍斬長樂門閞時正當夜半平韋庶人後乃命樂人撰此曲又曰黃驄疊者唐太宗初定中原時所策黃驄馬後因征遼北馬忽斃上嘆惜久之因命樂人製此曲又曰得寶子者唐明皇初納太真妃喜甚謂諸嬪御云朕得楊氏如獲至寶也因撰此曲又曰文淑子者唐長慶初有俗講僧文淑善吟經兼念四聲觀世音菩薩其音諧暢感動時人樂工黃米飯依其念菩薩四聲乃撰成曲也又曰楊柳枝曲者白傳典杭州時所撰尋進入教坊也又曰還京樂者唐明皇自蜀返正樂官張野孤撰此曲又曰道調子曲者因唐懿皇后樂工史敬約吹觱篥初吹道調懿皇后謂是曲子誤拍敬約乃隨拍便撰此曲也又曰新傾盃樂唐宣宗善吹籚管自撰此曲內有數拍不均上初捻管命樂工辛骨咄拍不中上瞋目視之骨咄憂懼一夕而殞又曰望江南者因朱崖李太尉鎮浙西日為亡姬謝秋娘所撰後進入教坊遂改名一名夢江南曲也又曰康老子者本長安富室家子酷好聲樂落托不事生計常與國樂遊處一旦家產蕩盡因詣西鄽遇一媼持舊錦茵貨鬻次康乃酬半千獲得之尋有波斯見大驚謂康老曰何處得此至寶此是冰蠶所織若暑月陳於榻上可致一室清涼因酬價千萬鬻之康老獲此厚價復與國樂追歡不三數年間費用又盡康老尋歿樂嗟歎之乃撰此曲也又曰大郎神者天后朝有一士人陷冤獄仍籍沒家族其妻配入掖庭本初善吹觱篥因撰此曲寄其哀情始名大郎神蓋取其良人行第也畏人知遂三易其名悲切子離別難終名怨廻鶻羯鼓錄曰宋開府孫沇有音律之學貞元中進樂書三卷德宗覽而嘉之知是開府之孫遂召對命坐與論音樂甚喜數曰又召至宣徽張樂使觀焉曰有舛誤乖濫悉可言沇曰容臣與樂官商摧講論具狀條奏上宣教坊使與樂官參議數日二使奏樂多言沇曾不解聲調不審節拍又聵疾不可議樂上頗異之又召沇對沇曰臣老年多病耳實失聰若迫於聲律不至無業上又使作樂曲, SBCK: ''}
