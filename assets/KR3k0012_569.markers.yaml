  - {type: variant, offset: 4311, length: 179, content: 女樂二八與良宰戎王大喜以其故數飲食日夜不休左右有言秦寇之至者因扞弓而射之扞引秦寇果至戎王醉而臥於尊下卒生縛之未禽則不知登山而視牛若羊視羊若豚牛之性不若羊羊之性不若豚所自視之勢逆也而因怒於牛羊之性也此狂者也狂而以行賞罰此戴氏之所以絕韓子曰晉韓公欲伐虞虢乃遺之屈產之乘垂棘之璧女樂二八以熒其心亂其政郭子曰謝公在東山畜妓簡文曰安石必出與人同樂不與人同憂注曰謝以安石, SBCK: 鷰戯􅀂絶倒投}
