  - {type: variant, offset: 3381, length: 5, content: 豈欲使靈氏, SBCK: 不義曹君將立子臧子臧去之遂弗爲也札雖不才願附於子臧以無失節固立之弃其室而耕乃舎之傳言季札之讓月明呉兄弟相傳又襄五年曰鄭伯賞入陳之功饗子展賜之先輅三命之服先輅次輅皆王所賜車侯伯之上卿三命先八邑賜子産次輅再命之服先六邑子産辭邑曰自上巳下降殺以兩禮也臣之位在四且子展之功也臣不敢及賞請辭邑公固與之乃}
