  - {type: variant, offset: 4141, length: 0, content: '', SBCK: 父欲立叔齊乃譲伯夷伯夷曰父命也遂逃去漢書曰文帝􅀄立以陳平爲相太尉勃親以兵誅吕氏功多平欲譲勃位廼謝病文帝恠平病問之平曰髙帝時勃功不如臣及誅諸吕臣切亦不如勃願以相譲勃又曰􅀽盎謂文帝曰陛下至代邸西郷讓天子者三東譲天子者再夫許由一譲而陛下五以天下譲過許由四矣又曰龔遂爲渤海太守數年上遣使者徴遂議曹王生願從太守㑹遂引入宫王生醉從呼曰願有所白遂問其故王生曰天子即問君何以治渤海君不可有所陳冝曰皆聖主之德非小臣之力也上果問以治狀遂對如王生言天子恠其有讓嘆曰君安得}
