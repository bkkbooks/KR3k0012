  - {type: variant, offset: 3647, length: 491, content: 人也為大夫莊公襲莒約車五乘載士殖不與歸而不食母曰汝生有義死有名五乘盡汝下也殖遂至莒獲甲首公止之曰共同齊國殖曰不與五乘少吾勇也臨敵止吾以利汙吾行也遂進至莒城下殺二十七人而死莒人築尸城為京觀妻往迎喪向之哭土為之崩得喪於是公使弔葬之葬畢曰婦人有三從之義令吾外無夫以立節內無子以見志吾何歸乎乃赴水而死又曰梁節姑姊者梁之婦人其室失火兄子與其子三人在內中欲取兄子輒得其子火盛不得復入婦人將自赴火其夫止之婦人曰梁國豈可戶告人曉也被不義之名何面目以見兄弟國人哉吾欲復投吾子為失母之恩吾勢不可以生遂赴火而死又曰會稽右師安妻者同郡呂氏之女也名軍少寡無子守義不遷其兄遂犯法軍匿之知不能免乃泣曰少遭家不造兄弟單少門宗唯兄為主而復罹此禍我有一計猶足免難將詣縣陳之兄曰其計若何軍曰臨時從宜不可先言也乃請智者為辭乞代兄遂之命因自剄縣門官嘉其義乃捨遂罪又曰齊義繼母者齊二子之母也當宣王時有人鬭死於道者吏視之被一瘡二子立其傍吏問之兄曰我殺之弟曰非兄也我殺之朞年不決吏言之於相相不能決言於王王曰皆赦之是縱有罪皆殺之是誅無辜也其母必知其子之善惡聽所欲殺活相召而問之其母泣而對曰殺少子相曰少子人之所愛今欲殺之何也對曰少者妾, SBCK: 􅀌竹君}
