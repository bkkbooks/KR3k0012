  - {type: variant, offset: 3379, length: 1, content: 夫, SBCK: 譲禮之主也范宣子譲其下皆譲欒黶爲汱弗敢違也又襄二曰呉子諸樊旣除喪將立季札札諸樊少弟季札辭曰曹宣公之卒也諸侯與曹}
