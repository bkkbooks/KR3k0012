  - {type: variant, offset: 3362, length: 1, content: 祭, krp: 之以主社稷對曰群臣願奉馮也馮穆公子莊公公曰不可先君以寡人賢使主社稷若弃德不譲是廢先君之舉也又僖上曰齊侯使管夷吾平戎于王使隰朋平戎于晉王以上卿之禮饗管仲管仲辭曰臣賤有司也有天子之二守國髙在若節春秋來承王命何以禮焉陪臣敢辭王曰舅氏余嘉乃勲應乃懿德謂督不忘徃踐乃職管仲卒受下卿之禮而還君子曰管氏之丗}
  - {type: variant, offset: 3364, length: 0, content: '', SBCK: 也冝哉譲不忘其上又曰宋桓公疾太子兹父固請曰目夷長且仁君其立之兹父㐮公也目夷兹父庶兄子魚也公命子魚子魚辭曰能以國讓仁孰大焉臣不及也且又不順立庶不順禮遂走}
  - {type: variant, offset: 3364, length: 0, content: '', krp: 也冝哉譲不忘其上又曰宋桓公疾太子兹父固請曰目夷長且仁君其立之兹父㐮公也目夷兹父庶兄子魚也公命子魚子魚辭曰能以國讓仁孰大焉臣不及也且又不順立庶不順禮遂走}
