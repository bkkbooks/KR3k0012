  - {type: variant, offset: 2632, length: 647, content: 田夜便紡緝數年間葬舅姑及夫并夫之叔姪兄弟七喪深為遠近所嗟尚太宗聞而異之賜帛二百段遣州縣恤存之又曰鄭義宗妻盧氏幽州范陽人也盧彥衡之女也略涉書史事舅姑甚得婦道嘗夜有強盜數十人持扙鼓譟踰垣而入家人悉逃竄唯有姑獨在堂盧冒白刃往至姑側為賊捶擊之幾至於死賊去後家人問曰群凶擾橫人盡奔逃何獨不懼荅曰人所以異於鳥獸者以其有仁義也昔宋伯姬守義赴火流稱至今吾雖不敏安敢忘義且比鄰有急尚相赴救況在姑而可棄委若萬一危禍豈宜獨生其姑每云古稱歲寒然後知松柏之後凋吾今乃見盧新婦之心矣貞觀中卒又曰冀州鹿城女子王阿足者早孤無兄弟唯姊一人阿足初適同縣李氏未有子而夫亡時年尚少又多娉之為姊年老孤寡不能捨去遂誓不嫁以養其姊每晝營田業夜便紡績衣食所須無非阿足出者如此二十餘年及姊亡葬送以禮鄉莫不稱其義行竟令妻女求與相識後數歲竟終于家又曰楚王靈龜妃上官氏上邽人也父懷仁右金吾將軍上官氏年十八歸於靈龜繼楚哀王後本生具存朝夕侍奉恭謹彌甚凡有新味非舅姑噉訖未曾先嘗經數載靈龜薨及將葬其前妃閻氏嫁不踰年而卒又無近族眾議欲不舉之上官氏曰夫神而有靈寧可使孤魂無記於是備禮同葬聞者莫不嘉歎服終諸兄弟姊謂曰妃年尚少又無所生改醮異門禮儀恒範妃思之掩泣對曰丈夫以義烈摽名婦人以守節為行未能即先犬馬殉溝壑寧可復飾粧袨服有他志乎遽將截鼻割耳以自誓諸兄姊知其志不奪歎息而止尋卒說苑曰齊遣兵攻魯見一婦人將兩小兒走抱小而挈大顧見大軍且至抱大而挈小使者甚怪問之婦人曰大者妾夫兄之子小者妾之子夫兄子者公義也妾之子者私義也寧濟公而廢私耶使者帳然賢其辭即罷軍還對齊王說之曰魯, SBCK: ''}
