  - {type: variant, offset: 3295, length: 4, content: 臣乎列女, SBCK: 位譲而就賤民猶犯君子云君子貴人而賤巳先人而後已則民作譲又􅀕義曰天子有善譲德於天諸侯有善歸諸天子卿大夫有善薦於諸侯士庶人有善夲諸父母又儒行曰儒有衣冠中動作愼其大譲如慢小譲如僞又郷飲酒曰三揖至于階三譲以賔升月者三日則成魄三月則成時是禮有三讓左}
  - {type: variant, offset: 3295, length: 0, content: '', WYG: 位讓而就賤民猶犯君子云君子貴人而賤已先人而後已則民作讓又祭義曰天子有善讓德于天諸侯有善歸諸天子卿大夫有善薦於諸侯士庶人有善本諸父母又儒行曰儒有衣冠中動作慎其大讓如慢小讓如偽又鄉飲酒曰三讓至于階三讓以賔升月者三日則成魄三月則成時是以禮有三讓左傳隠公曰宋穆公疾召大司馬孔父而屬殤公焉曰先君舍與夷而立寡人先君穆公兄宣公也與夷宣公子即所屬殤公也若以大夫之靈得保首領以歿先君若問與夷其將何辭以對請子奉之以主社稷對曰羣}
