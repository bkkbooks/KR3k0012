  - {type: variant, offset: 3392, length: 0, content: '', SBCK: 曰趙衰三讓其所譲皆社稷之衛也廢譲是廢德也以趙衰之故蒐于清原作五軍清原之蒐在魯僖三十年也使趙衰將新上軍箕鄭佐之胥臣將新下軍先都佐之又曰君子急病讓夷又曰齊桓公自莒反於齊使鮑叔牙爲宰辭曰臣}
  - {type: variant, offset: 3392, length: 0, content: '', WYG: 曰趙衰三讓其所讓皆社稷之衛也廢讓是廢德也以趙衰之故蒐于清源作五軍青原之蒐左魯僖三十年也使趙衰將新上軍箕鄭佐之胥臣將新下軍先都佐之又曰君子急病讓夷又曰齊桓公自莒反於齊使鮑叔牙為宰辭曰臣}
  - {type: variant, offset: 3392, length: 0, content: '', krp: 曰趙衰三讓其所譲皆社稷之衛也廢譲是廢德也以趙衰之故蒐于清原作五軍清原之蒐在魯僖三十年也使趙衰將新上軍箕鄭佐之胥臣將新下軍先都佐之又曰君子急病讓夷又曰齊桓公自莒反於齊使鮑叔牙爲宰辭曰臣}
  - {type: variant, offset: 3393, length: 3, content: 幸蚤終, SBCK: 􅀂夷吾者有五寛惠愛民臣不􅀂也治國家不失其柄臣不􅀂也忠信可結於百姓臣不􅀂也制禮義可法於四方臣不􅀂也執枹鼔立於軍門使百姓皆加勇臣不􅀂也又曰晉悼公使張老爲卿辭曰臣不如魏絳乃使魏絳佐新軍家語曰虞芮二國爭田而訟連年不决相謂曰西伯仁人文王盖往質焉入其境則耕者讓畔行者讓路入其朝則士譲於大夫大夫譲於卿虞芮之君曰吾儕小人不可以入君子之朝遂自相與成以其所争爲閑田史記曰呉太伯弟仲雍皆大王之子季歴之兄也季歴賢又生聖子曰太王欲立季歴以及昌於}
