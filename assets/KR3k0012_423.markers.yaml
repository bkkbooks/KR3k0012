  - {type: variant, offset: 281, length: 255, content: 也其子仕秦秦以為管守魏信陵君攻之不下乃使人謂鄢陵君曰遣縮高來吾將仕之使為持國尉鄢陵君曰小國不能必其民使者自往請使吏導使者至縮高曰君之命高也將使攻管也夫父攻子守人之大笑也見臣而下是背主也父殺子背亦非君善敢再辭使者以報信陵君大怒遣使謂鄢陵君曰鄢陵之地亦猶魏也今吾攻管而不下則秦兵不返社稷必危矣願君生束縮高而致之若君弗致吾將十萬之師以造君城下鄢陵君曰吾先君成侯受詔襄王以守此地受太府之憲曰子殺父臣殺君有常不赦國雖大赦降城亡子不得預焉今縮高不受大利以全父子之義而君曰生致之是使我負襄王之詔而廢太府之憲雖死終不敢行也縮高, SBCK: ''}
