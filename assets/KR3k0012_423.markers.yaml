  body:
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 四謙讓上謙易謙卦曰謙亨君子有終􅁻􅂏曰天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙􅀑神害􅄹而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也象曰地中有山謙君子以裒多益寡稱物平施􅀄六謙謙君子用渉大川吉六二鳴謙貞吉九}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 四謙譲上謙易謙卦曰謙亨君子有終彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也象曰地中有山謙君子以裒多益寡稱物平施初六謙謙君子用涉大川吉六二鳴謙貞吉九}
