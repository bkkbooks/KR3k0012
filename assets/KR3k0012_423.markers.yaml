  - {type: variant, offset: 901, length: 1730, content: 日生遂復見殺在紹坐者無不歎息又曰袁譚既死弟熙尚為其將焦觸張南所攻奔遼西烏桓觸自號幽州刺史陳兵數萬殺白馬盟曰違命者斬各以次歃至別駕代郡韓珩曰吾受袁公父子厚恩今其破亡智不能救勇不能死北面曹氏所不能為也一坐為珩失色觸曰舉大事當立大義事之濟否不待一人可卒珩志以厲事君曹操聞珩節甚高之屢辟不至又曰公孫瓚字伯珪為上計吏部太守劉基為事被徵伯珪御重到洛陽身執徒飬基將徙日南伯珪具豚米於北邙上祭先人觴醊祝曰昔為人子今為人臣當詣日南多障氣恐或不還與先人辭於此再拜慷慨而起觀者莫不歔欷在道得赦俱還魏略曰郭憲字幼簡西平人以仁篤為一郡所歸韓約失眾從羗中還依憲眾人多欲取約以邀功而憲責之言人窮來歸我云何欲危之遂擁護厚遇之其後約病死而田樂楊達等就斬約頭當送之逵等欲條䟽著憲名憲不肯在名中言我常不忍生圖之豈忍取死人以要功乎逵等乃止時太祖方攻漢中在武都而逵等送約首到太祖宿聞憲名及視條䟽怪不在中以問逵逵等具以情對太祖歎其至義乃表例與逵等並賜爵關內侯列士傳曰羊角哀左伯桃二人相與為死友欲仕於楚道遙山阻遇雨雪不得行飢寒無計自度不俱生也伯桃謂角哀曰天不我與深山窮困併在一人可得生官俱死之後骸骨莫收內手捫心知不如子生恐無益而棄子之器能我樂在樹中角哀聽伯桃入樹中而死得衣糧前至楚楚平王愛角哀之賢嘉其義以上卿禮葬之竟角哀夢見伯桃曰蒙子之恩而獲厚葬然正苦荊將軍家相此欲役使吾吾不能聽也與連戰不勝今月十五日當大戰以決勝負得子則勝否則負矣角哀至期日陳兵馬詣其冢上作三桐人自殺下而從之君子曰執義可為世規唐新語曰陸南金博涉經史言行修謹開元初太常少卿盧崇道犯罪自嶺南逃歸匿于南金家俄為讎人所發詔侍御史王旭按之崇道辭引南金旭處以極法南金弟趙壁請代兄死南金執稱弟實自誣身請當罪兄弟爭死旭問其故趙壁曰兄且是嫡又能幹家亡母未葬小妹未嫁自惟幼劣生無所益身自請死旭列上其狀玄宗嘉而宥之張說陸象先等咸相欽重累遷庫部員外郎南金祖士季為隋越王侗記室兼侍讀侗稱制授著作郎時王世充將行篡奪侗謂士季曰隋有天下三十餘載朝廷文武豈無忠烈者乎士季對曰見危授命臣之宿心今請因其啟事便加手刃後事洩充遂停士季侍講貞觀初為太學博士而卒矣又曰畢構性至孝丁繼母憂有兩妹皆在繈褓構乳飬嫁遣之及其亡也二妹初聞哀慟氣絕者久之言曰雖兄弟無三年之禮吾倚鞠飬豈同常人遂行三年服朝野聞之莫不稱歎構弟栩任太府主簿留司東都聞構疾星馳赴京侍毉藥者累月既而哀毀骨立變服視事踰年未嘗言笑深為朝野所重構嘗為益州長史兼按察使多所舉正風俗一變玄宗降璽書慰之曰卿孤潔獨行有古人之風自臨蜀川弊化頓易覽卿前後執奏何異破枉求姦諸使之中在卿為㝡終戶部尚書又曰李愻為貝州刺史甘露徧於庭樹邑人曰美政所致請以聞愻謙退寢其事歷官十七政俸祿先兄弟嫂姪謂其子曰吾厚汝曹以衣食不如厚之以仁義勿辭獘也天下莫不嗟尚之又曰姚崇少不慕學年踰弱冠嘗過所親見修文殿御覽閱之甚喜遂躭墳史以文華著名歷牧常楊吏人並建碑紀德再秉衡軸天下欽其公直外生任并任異少孤長於崇家乃與之立家產謂之曰汝與吾無間然矣惜殊宗而代踈命與其子連名冀無以別也時人美之又曰孟景休事親以孝聞丁母憂毀瘠踰禮殆至滅性弟景偉年在襁褓景休親乳之乳為之豊及葬時屬祁寒跣履雪霜腳指墮而復生如初景休進士擢第歷監察御史鴻臚丞為來俊臣構陷遇害時人傷焉義婦南史孝義傳吳興秉公濟妻姚氏生二男而公濟及兄願公乾伯並卒各有一子姚飬育之賣田宅為取婦自與二男寄止鄰家明帝詔為其二子婚表閭復徭役又會稽永興吳翼之母丁氏少喪夫性仁愛遭年荒分衣食以飴里中飢餓者鄰里求借未嘗違同里陳攘父母死孤單無親戚丁收飬之及長為營婚娶又同里王禮妻徐荒年客死丁陰為買棺器自往殮葬元徽末大雪商旅斷行村里比室飢餓丁自出鹽米計口分賦同里任僑家露四喪無以葬丁為辦冢槨有三調不登者代為遂丁長子婦王氏守寡執志不再醮州郡上言詔表門閭租稅崔鴻十六國春秋前趙錄曰冠軍喬晞攻界休剋之其令賈潭抗節不降晞怒殺之其妻宗氏年二十餘有姿色晞欲納之宗罵曰屠各奴何有害人之夫而欲加無禮于爾母乎何不促殺我遂仰天大哭亦殺之唐書獨孤武都謀叛王世充歸于我其子師仁方三歲世充以其幼不殺乳母王英蘭髡鉗求入保養世充許之英蘭扶乞所得與師仁唯自啖土飲水而竟為採拾竊師仁至京師高祖嘉之封永壽鄉君又曰陽三安妻李氏雍州涇陽人也事舅姑以孝聞及舅姑亡沒三安亦死二子孩童家至貧窶李晝則, SBCK: ''}
