  - {type: variant, offset: 12, length: 4, content: 孟嘗君出, SBCK: 吾知免矣知其不益巳禍漢書曰張安丗兄賀爲掖庭令而宣帝以皇曽孫収飬掖庭賀視飬拊循恩甚宻焉上追思賀恩欲封其塚爲恩徳侯置守塚户二百家安丗􅀷辭賀封又求損守塚户上曰吾自爲掖庭令非爲將軍安丗乃止又曰于定國爲人謙恭尤重經術士雖卑賤徒歩定國皆與均禮又曰元帝即位徴孔霸爲師賜爵􅀜内侯霸爲人謙退不好權􅀔常爵位泰過何德以堪之霸讓位自陳上深知其志誠乃弗用東觀漢}
