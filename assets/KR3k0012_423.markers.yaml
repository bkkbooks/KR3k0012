  - {type: variant, offset: 3362, length: 1, content: 祭, SBCK: 之以主社稷對曰群臣願奉馮也馮穆公子莊公公曰不可先君以寡人賢使主社稷􅀂弃德不譲是廢先君之舉也又僖上曰齊侯使管夷吾平戎于王使隰朋平戎于晉王以上卿之禮饗管仲管仲辭曰臣賤有司也有天子之二守國髙在若節春秋來承王命何以禮焉陪臣敢辭王曰舅氏余嘉乃勲應乃懿德謂督不忘徃踐乃職管仲卒受下卿之禮而還君子曰管氏之丗}
