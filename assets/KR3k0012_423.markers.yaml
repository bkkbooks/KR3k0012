  - {type: variant, offset: 3312, length: 2, content: 夫人, WYG: 功饗子展賜之先輅三命之服先輅次輅皆王所賜車侯伯之上卿三命先八邑賜子産次輅再命之服先六邑子産辭邑曰自上以下降殺以兩禮也臣之位在四且子展之功也臣不敢}
  - {type: variant, offset: 3315, length: 71, content: 傅妾也秦滅衛君角封靈主世家使奉其祀靈主死夫人無子而守寡傅妾有子代後夫人謂傅妾曰孺子養我甚謹子奉祭祀而妾事我我不聊願出居外傅妾泣曰夫人豈欲使靈氏, WYG: 賞禮請辭邑公固予之乃}
