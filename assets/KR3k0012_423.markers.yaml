  - {type: variant, offset: 3370, length: 1, content: 聊, SBCK: 足去疾子良之名以順則公子堅長乃立襄公又成下曰諸侯將見子臧於王而立之子臧曰前志有之曰聖逹節次守節下失節爲君非吾節也雖不能聖敢失守乎遂逃奔宋又襄上曰晉韓獻子告老公族穆子有廢疾將立之辭曰詩曰豈不夙夜謂行多露無忌不才讓其可乎請立起也無忌穆子名起無忌弟宣子也又襄二曰晉侯使士丐將中軍辭曰伯游長伯游荀偃昔臣習於智伯是以佐之非能賢也請從伯游使荀偃將中軍士丐佐之使韓起將上軍辭以趙武又使欒黶辭曰臣不如韓起}
