  - {type: variant, offset: 3389, length: 2, content: 祥耶, SBCK: 失禮也論語曰能以禮譲爲國乎何有不能以禮讓爲國如禮何又曰子曰太伯其可謂至德也巳矣三以天下讓民無得而稱焉孝經曰先之以敬譲而民不爭國語曰狐毛卒使趙衰代之辭曰城濮之役先且居之佐軍也善先且居晉大夫先子也軍伐有賞善君有賞能其官有賞且居有三賞不可廢也且臣之倫箕鄭胥臣先都在倫軰也三子皆晉大夫也乃使先且居佐上軍}
  - {type: page-break, offset: 3389, content: '', id: KR3k0012_SBCK_423-6b}
  - {type: variant, offset: 3389, length: 2, content: 祥耶, WYG: 失禮也論語曰能以禮讓為國乎何有不能以禮讓為國如禮何又曰子曰泰伯其可謂至德也已矣三以天下讓民無得而稱焉孝經曰先之以敬讓而民不争國語曰狐毛卒使趙衰代之辭曰城濮之役先且居之佐軍也善先且居晉大夫先軫子也軍伐有賞善君有賞能其官有賞且居有三賞不可廢也且臣之倫箕鄭胥臣先都在倫輩也三子皆晉大夫也乃使先且居佐上軍}
