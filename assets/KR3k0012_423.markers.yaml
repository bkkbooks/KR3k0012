  - {type: variant, offset: 44, length: 5, content: 收債畢何市, SBCK: 李通娶寜平公主爲大司空通性謙恭常避權􅀔謝病不視事又曰馮異字公孫爲人謙退與諸將相逢輙引車避道毎止頓諸將共論功伐異常屏止樹下軍中號大樹將軍又曰鄧騭兄常居禁中騭謙退不欲乆在内連求還第太后乃許又曰樊宏爲人謙愼常誡其子曰冨貴盈溢未有能終者及病困車駕臨問其所欲言宏頓首自陳無功享食大國願還壽張食小郷亭上悲傷其言}
