  - {type: variant, offset: 3301, length: 8, content: 衛宗二順者衛宗室, SBCK: 宋穆公疾召大司馬孔父而屬殤公焉曰先君舎與夷而立寡人先君穆公兄宣公也與夷宣公子即所屬殤公也􅀂以大夫之}
  - {type: variant, offset: 3301, length: 0, content: '', WYG: 齊侯使管夷吾平戎于王使隰朋平戎于晉王以上卿之禮饗管仲管仲辭曰臣賤有司也有天子之二守國髙在若節春秋來承王命何以禮焉陪臣敢辭王曰舅氏余嘉乃勲應乃懿德謂督不忘徃踐乃職管仲卒受下卿之禮而還君子曰管仲之世祀也宜哉讓不忘其上又曰宋桓公疾太子兹父固請曰目夷長且仁君其立之兹父襄公也目夷兹父庶兄子魚也公命子魚子魚辭曰能以國讓仁孰大焉臣不及也且又不順立庶不順禮遂走而退又左傳曰穆伯如齊始聘禮也凡君即位卿出並聘踐修舊好要結外援好事隣國以}
  - {type: page-break, offset: 3301, content: '', id: KR3k0012_WYG_423-8a, image: WYG0896/WYG0896-0699a.png}
  - {type: variant, offset: 3301, length: 8, content: 衛宗二順者衛宗室, krp: 宋穆公疾召大司馬孔父而屬殤公焉曰先君舎與夷而立寡人先君穆公兄宣公也與夷宣公子即所屬殤公也若以大夫之}
  - {type: variant, offset: 3302, length: 1, content: 宗, WYG: 社稷忠信卑讓之道也忠德之正也信德之固也卑讓德之基也又左傳曰鄭人立子良辭曰以賢則去疾不足去疾子良之名以順則公子堅長乃立襄公又左傳曰諸侯將見子臧於王而立之子臧曰前志有之曰聖達節次守節下失節為君非吾節也雖不能聖敢失守乎遂逃奔宋又左傳曰晉韓獻子告老公族穆子有廢疾將立之辭曰詩曰豈不夙夜謂行多露無忌不才讓其可乎請立起也無忌穆子名起無忌弟宣子也又襄十三年曰晉侯使士匄將中軍辭曰伯游長伯游荀偃昔臣習於智伯是以佐之非能賢也請從伯游荀偃將中軍士匄佐之使韓起將上軍辭以趙武又使欒黶辭曰臣不如韓起願上趙武君其聴之使趙武將上軍韓起佐之欒黶將下軍魏絳佐之晉國之民是以大和諸侯遂睦君子曰讓禮之主也范宣子讓其下皆讓欒黶為汰弗敢違也又襄十四年曰呉子諸樊既除喪將立季札札諸樊少弟季札辭曰曹宣公之卒也諸侯與曹人不義曹君將立子臧子臧去之遂弗為也札雖不才願附于子臧以無失節固立之棄其室而耕乃舍之傳言季札之讓且明呉兄弟相傳又襄}
