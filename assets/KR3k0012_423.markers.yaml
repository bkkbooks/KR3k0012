  - {type: variant, offset: 3283, length: 2, content: 匹婦, SBCK: 還師而歸􅀽彦伯明謙曰賢人君子推誠以存禮非降巳以應丗率心以成謙非匿情以同物故侯王以􅀌寡饗天下江海以卑下朝百川易曰天道下濟而光明地道卑而上行老子曰髙以下爲基貴以賤爲夲此}
  - {type: variant, offset: 3283, length: 2, content: 匹婦, WYG: 還師而歸袁彦伯明謙曰賢人君子推誠以存禮非降已以應世率心以成謙非匿情以同物故侯王以孤寡饗天下江海以卑下朝百川易曰天道下濟而光明地道卑而上行老子曰高以下為基貴以賤為本此}
  - {type: variant, offset: 3283, length: 2, content: 匹婦, krp: 還師而歸袁彦伯明謙曰賢人君子推誠以存禮非降巳以應丗率心以成謙非匿情以同物故侯王以孤寡饗天下江海以卑下朝百川易曰天道下濟而光明地道卑而上行老子曰髙以下爲基貴以賤爲夲此}
