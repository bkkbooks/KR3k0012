  - {type: variant, offset: 3288, length: 4, content: 如此何況, SBCK: 書舜典曰咨四岳有能奮庸熈帝之載使宅百揆亮采惠疇僉曰伯禹作司空帝曰俞咨禹汝平水土惟時懋哉禹拜稽首譲于稷契曁臯陶帝曰疇􅀂予工工百工也僉曰垂哉垂臣名也帝曰俞咨垂汝作共工垂拜稽首譲于殳斨曁伯與帝曰俞往哉汝諧帝曰疇􅀂予上下草木鳥獸僉曰益哉帝曰俞咨益汝作朕虞虞掌山澤官名益拜稽首讓于朱虎熊羆朱虎熊羆二臣也帝曰俞往哉汝諧帝曰咨四岳有能典朕三禮僉曰伯夷伯夷臣名帝曰俞咨伯汝作秩宗秋宗主郊庿之官伯拜稽首譲于夔龍毛詩魚藻角弓曰民之無良相怨一方受爵不讓至于巳斯亡周禮地官上大司徒曰以陽禮教譲則民不爭禮記曲禮曰博聞強識而讓尊善行而不怠謂之君子又曲禮曰君子恭敬樽節退讓以明禮又坊記曰故貴賤有等衣服有別朝廷有位則民有所讓子云君子辭貴不辭賤辭富不辭貧則亂益亡子云觴酒豆肉讓而受惡民猶犯齒祍席之上譲而坐下民猶犯貴}
