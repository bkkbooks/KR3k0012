  - {type: variant, offset: 12, length: 1, content: 從, SBCK: 楊方五經鈎沉曰東夷之人以}
  - {type: variant, offset: 12, length: 198, content: 從牛土聲犅古郎切特牛父也牝畜母也從牛匕聲犢牛子也牬普外切二歲牛也犙山耽切三歲牛也牭思貳切四歲牛也犗戒又音加騬牛也牻莫江切白黑雜毛牛也掠力強切牻牛也犡力制切牛白脊也𤙛達胡切黃牛虎文也犖駮牛也㸹力拙切牛白脊也𤘾巴耕切牛文駮如星也犥普表切牛黃白色也犉而純切黃牛黑脣也攉音岳白牛也㹔居羊切牛長脊也𤘸音牛徐行也犨牛息聲也一曰牛名牷音全牛純色也𤛾牛音遶柔謹也廣志曰有靡犘牛馬象切出巴中重千斤犦滿角切牛一曰犎牛, WYG: 爰}
