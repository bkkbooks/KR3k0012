  - {type: variant, offset: 374, length: 2, content: 犛牛, SBCK: 白脉貫童子最快頸骨長且大駃壁堂欲得闊壁堂病股間也􅀝欲得如絆馬聚而正也膺廷欲得廣膺廷胷前天􅀜欲得成天関背接骨雋骨欲得垂眷也央欲得下蘭株欲得大尾株豐岳欲得大􅂰株骨垂星欲得有怒肉垂星蹄上也肉覆蹄間名怒肉力柱欲得大而成當車骨也懸蹄欲得如八字陽鹽欲得廣陽塩者夾尾株前兩膁上常有似鳴者有黄也洞胡無壽珠淵無壽遊毛當目下也上池有亂毛妨主凶上池角中央也身欲得如卷大臁踈肋難飴龍頭突目好跳豪筋欲得成就豪筋脚後横筋也毛欲得短密􅀂長踈不耐寒氣尾不用至地尾毛少骨多者有力膝上肉欲得竪角欲得細鼻如鏡鼻難牽口方易飴漦府方易飴}
