  - {type: variant, offset: 2491, length: 998, content: 以譏焉暉曰前阮府君有求於我所以不敢聞命誠恐以財貨污君今而相送明吾非有愛也魏略曰鉅鹿時苗字胃為壽春令始之官乘牸牛歲餘生一犢子及代留其犢而去晉書曰羊篇祜之姪也為鉅平侯奉祜嗣篇歷官清慎有私牛於官舍產犢及還而留之張勃吳錄地理志曰合浦徐聞縣多牛其項上有持骨大如覆斗日行三百里蜀志曰蔣琰曾夢門前有一牛頭血流問於趙直直曰牛角及口公字也血者事明也夢吉矣晉朝雜事曰泰康九年三月幽州上言塞北有死牛頭語干寶晉記曰南安朱冲其鄰人失犢與冲犢相類來認取之冲不與爭後得之於堅冰之下慚謝冲冲不受王隱晉書曰朱冲字巨融少有德行鄰人牛犯冲苗冲乃擔芻送牛牛主大慚不敢復暴又曰潘岳出為河陽令以仕次宜為郎不得意出山濤領選岳內非之密作謠曰閣道東有大牛王濟鞅裴楷鞦和嶠㓨促不得休又曰郭洗牛生犢兩頭八足晉陽秋曰武帝時有司奏御牛青絲紖斷詔可以青麻代之晉書曰郭舒嘗有鄉人盜食舒牛事覺來謝舒曰卿飢所以食牛耳餘肉可共啖之世以此服其弘量又曰夫餘國若有軍事殺牛祭天以其蹄占吉凶蹄解者為凶合者為吉也又曰石崇與貴戚王愷奢靡相尚嘗與愷出遊爭入洛城崇牛迅若飛禽愷絕不能及乃密貸其帳下問其所以對曰牛奔不迅良由御者逐之不及而反制之可聽蹁轅則駃矣因從之遂爭長崇後知之殺所告者又曰王濟被斥外於是乃移第北芒山下性豪侈麗服玉食時王愷以帝舅奢豪有牛名八百里駮嘗瑩其蹄角濟請以錢千萬與牛對射而賭之愷亦自恃其能令濟先射一發破的因據胡床叱左右速探牛心來須臾而至一割便去又曰何曾性奢豪都官從事劉亨嘗奏曾以銅鉤黻紖車瑩牛蹄角後曾辟亨為掾勸勿應亨謂至公之體不以私憾遂應又曰桓溫北伐過淮泗踐北境與諸寮屬登平乘樓矚中原慨然曰遂使神州陸沉百年丘墟王夷甫諸人不得不任其責袁宏曰運有廢興豈必諸人之過溫作色謂四座曰頗聞劉景升有千斤大牛噉芻豆十倍於常牛負重致遠曾不若一羸牸魏武入荊州以享軍志意以況宏坐中皆失色又曰王延家中生一犢他人認之延牽與之初無吝色其人後知其妄認送犢還延叩頭謝罪延以與之不取也又曰肅慎國武帝時及元帝中興皆來貢獻成帝時又通貢於石季龍四年方達季龍問之荅曰每候牛馬向西南眠者三年矣是知大國所在故來南史四夷傳曰扶乘國有牛角甚長以角載物至勝二十斛宋書曰褚湛之有一牛至所受無故墮廳事前井湛之率左右躬自營救郡中喧擾彥回下簾不視又曰江湛為吏部尚書性廉儉牛餓御人求草湛良久曰可與飲又曰顧憲之元徽中為建康令時有盜牛者與本主爭牛各稱己物二家辭證等前後令莫能決憲之至覆其狀乃令解牛任其所去牛徑還本宅盜者伏其罪時人, WYG: 遮捕即霹靂}
