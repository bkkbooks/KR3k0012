  - {type: variant, offset: 404, length: 1, content: 六, SBCK: 季春之月乃合騾牛騰馬游牝于牧又曰取牛膽塗熱釡即鳴矣又曰牛膽塗目莫知其誰注曰取八歲黃牛膽桂二寸着膽中百日以成因使巧工刻象人丈夫着目下爲女子着頭上爲小児着頥下盛以五綵囊先􅀫齋無令人知也尹文子曰語曰好牛不可察也好則物之通稱牛則物之定形以通稱隨定形不可不察也重白而憎黒嗜甘而逆苦能定名則萬事不亂也卞子曰郭林宗謂仇季智曰子嘗有過否季智曰吾嘗飯牛牛不食搏牛一下􅀃􅁐曰􅁗穆公使賈人載鹽徴諸賈人百里奚以五羖羊之皮將車之􅁗􅁗穆公觀鹽見百里奚牛肥也對曰臣飲食以時使之不以􅁀有險先後之以身是以肥也穆公知其君子也乃以爲上卿張温自表曰昔百里奚賢􅁗繆公欲干之繆公好牛奚因賃官以養牛蹄上乗肉}
