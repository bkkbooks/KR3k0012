  - {type: 'tls:seg', offset: 406, content: '', id: KR3k0012_CHANT_899-3a.8}
  - {type: variant, offset: 406, length: 0, content: '', SBCK: 寸公使禽息行牛息入言之公不信怒息復言之公又怒吏曰再怒其主罪當刖使守門公出禽息跪而請之曰夫養牛者願君勿忘也公乃問百里曰臣之長非養牛者也乃養民也公視牛察之則賢人也遂與同車而出謝禽息息曰所以不死者君未知客也今巳知之矣乃觸門而死抱扑子曰南方水牛}
  - {type: variant, offset: 406, length: 0, content: '', WYG: 寸著膽中百日已成因使巧工刻象人丈夫著目下為女子著頭上為小兒著頥下盛以五采囊先宿齋}
  - {type: variant, offset: 406, length: 0, content: '', krp: 寸公使禽息行牛息入言之公不信怒息復言之公又怒吏曰再怒其主罪當刖使守門公出禽息跪而請之曰夫養牛者願君勿忘也公乃問百里曰臣之長非養牛者也乃養民也公視牛察之則賢人也遂與同車而出謝禽息息曰所以不死者君未知客也今巳知之矣乃觸門而死抱扑子曰南方水牛}
  - {type: variant, offset: 407, length: 1, content: 妄, SBCK: 冬夏常卧雪中又曰智禽銜蘆以逆網水牛結陣而却虎矣􅀃􅁐曰齊桓公岀獵逐鹿入山谷中見一老父問曰此何谷也曰愚公}
  - {type: variant, offset: 407, length: 1, content: 妄, WYG: 令人知也文子曰語曰好牛可察也好則物}
