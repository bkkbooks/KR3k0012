  - {type: variant, offset: 2939, length: 228, content: 能及乃密貸其帳下問其所以對曰牛奔不迅良由御者逐之不及而反制之可聽蹁轅則駃矣因從之遂爭長崇後知之殺所告者又曰王濟被斥外於是乃移第北芒山下性豪侈麗服玉食時王愷以帝舅奢豪有牛名八百里駮嘗瑩其蹄角濟請以錢千萬與牛對射而賭之愷亦自恃其能令濟先射一發破的因據胡床叱左右速探牛心來須臾而至一割便去又曰何曾性奢豪都官從事劉亨嘗奏曾以銅鉤黻紖車瑩牛蹄角後曾辟亨為掾勸勿應亨謂至公之體不以私憾遂應又曰桓溫北伐過淮泗踐北境與諸寮屬登平乘樓矚中原慨然曰遂使神州陸沉百年丘墟王夷甫諸, SBCK: 售按恐觸}
