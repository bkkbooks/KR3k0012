  - {type: variant, offset: 387, length: 3, content: 大畜卦, SBCK: 之是見牛而不見羊也晏子春秋}
  - {type: variant, offset: 387, length: 0, content: '', WYG: 之是見牛而不見羊也晏子春秋曰金公之牛老於闌牢不勝服也車蠧於瓦石不勝乘也列子曰宋人有好行義者三世不懈家無故而黒牛生白犢以問孔子孔子曰此吉祥也以享上帝居一年其父無故而盲牛又復生白犢其父令其子問孔子孔子曰吉祥也復以祭居一年中其子又盲其後楚攻宋圍其城民易子而食之析骸而炊之丁壯皆乘城戰死者}
  - {type: page-break, offset: 387, content: '', id: KR3k0012_WYG_899-4b, image: WYG0901/WYG0901-0045d.png}
  - {type: variant, offset: 387, length: 3, content: 大畜卦, krp: 之是見牛而不見羊也晏子春秋}
  - {type: variant, offset: 388, length: 2, content: 畜卦, WYG: 半此人父子有疾皆免也吕氏春秋}
  - {type: page-break, offset: 388, content: '', id: KR3k0012_WYG_899-5a, image: WYG0901/WYG0901-0046a.png}
