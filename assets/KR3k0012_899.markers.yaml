  - {type: variant, offset: 663, length: 2240, content: 及風旅不虞君之涉吾地何故又僖下曰介葛盧來朝聞牛鳴曰是生三犧皆用之矣其音云問之而信又曰秦師入滑鄭商人弦高將市於周遇之以乘韋先牛十二犒師曰寡君聞吾子將步師出於敝邑敢犒從者又宣上曰宋城華元為植巡功植主巡行城也城者謳曰于思于思棄甲復來使驂乘謂之曰牛則有皮犀兕尚多棄甲則郍又宣上曰楚子為陳夏氏亂故伐陳殺夏徵舒因縣陳申叔時使於齊反命而退王使讓之曰夏徵舒為不道弒其君寡人以諸侯討而戮之汝獨不慶寡人何曰夏徵舒弒其君其罪大矣討而戮之君之義也抑人有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣諸侯之從君討其罪也今縣陳貪其富也無乃不可乎王曰善又成公下曰韓厥曰古人有言殺老牛莫之敢尸而況君子乎二三子不能事君焉用厥也尸也又昭四年曰邾人莒人愬于晉曰魯朝夕伐我幾亡矣我之不共魯故之以不共晉貢以魯故也晉侯使叔向來辭曰寡君不得事君矣請君無勤子服惠伯對曰君信蠻夷之訴以絕兄弟之國寡君聞命矣叔向曰寡君有甲車四千乘在雖以無道行之必可畏也況其率道何敵之有牛雖瘠僨加於豚上其畏不死乎禮記曲禮上曰國君下齊牛又曲禮下曰諸侯無故不殺牛又月令曰季春犧牲駒犢舉書其數在牧而書數秋當保內又曰季命有司出土牛以示農耕之早晚又曲禮下曰天子祭天地諸侯祭山川大夫祭五祀士祭其先天子以犧牛諸侯以肥牛大夫以索牛又郊特牲曰郊所以明天道也帝牛不吉以為稷牛帝牛必在滌三月稷牛惟具所以別事天神與人鬼也又曰郊用騂尚赤也用犢貴誠也又禮器曰有以少為貴者天子祭天特牲天子適諸侯諸侯膳以犢又內則曰牛夜鳴則庮庮臭惡也又曰祭天地之牛角繭栗宗廟之牛角握賓客之牛角赤周禮地官封人曰凡祭祀飾其牛牲設其楅衡置其絼供其水藁楅在鼻衡在角言不得觸絼繫牛鼻繩絼本又作紖持忍反又冬官考功記曰稺牛之角直而澤老牛之角終而昔昔讀為交錯之錯謂角捔理錯也角長二尺有五寸三色不失謂之牛戴牛三色本白中清末豐也戴牛角直一牛又地官上曰牛人掌養國之公牛以待國之政令公猶官也凡祭祀共其享牛求牛以授職人而芻之求牛禱於鬼神之牛謂所以祭者也求終也終事之牛謂所以繹者也宗廟有繹者孝子求神非一處職讀為樴樴謂之我可以繫牛樴人者謂牧人凡賓客之事共其牢禮積膳之牛饗食賓射共其膳羞之牛軍事共其犒牛喪事共其奠牛凡會同軍旅行役共其兵車之牛與其牽傍以載公任器牽傍在轅外輓牛也人御之居其前曰牽居其旁曰傍任猶用也凡祭祀共其牛牲之互與其盆簝以待事鄭司農云玄謂福衡之屬盆簝皆器名盆所以盛血簝受肉籠也玄謂互若今屠家縣肉格又秋官上曰罪隸掌役百官府與凡有守者掌使令之小事役給其小役凡封國若家牛助為牽傍鄭司農云凡封國若家謂建諸侯立大夫家也牛助為牽傍此官主為送致之也玄謂牛助國以牛助轉徙也罪隸牽傍之在前曰牽在旁曰傍史記曰騎劫攻即墨田單用牛千頭衣以五綵縛刃其角結火其尾穿城而出牛壯士五千銜枚隨其後牛出火明所觸皆死壯士擊之城上士大譟燕師大敗騎劫死乘勝逐北三戰三克遂收齊城也又曰馬蹄躈千牛千足此亦比千乘之家躈苦吊切又曰甯戚欲仕齊候桓公出牽牛叩角而歌曰南山粲白石爛短布單衣才至骭生不逢堯與舜禪長夜漫漫何時旦桓公用之又曰蘇秦說韓王曰鄙語云寧為雞口無為牛後今西面事秦何異牛後乎漢書曰邴吉嘗出逢群鬥者死傷橫道吉過之不問前行逢人逐牛牛喘吐舌止使騎吏問牛行幾里或譏吉吉曰民鬥殺傷長安令京兆尹職所當禁備逐捕丞相課其殿最不親小事也方春少陽用事未可以熱恐牛近行因暑故喘此時氣失節恐有所傷害者三公典調和陰陽職所當憂也又曰龔遂為渤海太守民有帶持刀劍者使賣劍買牛賣刀買犢可謂帶牛佩犢矣又曰宣帝地節三年求得外祖母王媼男無故弟武皆隨使者詣闕時乘黃牛車故百姓謂之黃牛嫗後漢書曰朱暉為臨淮太守時牛大疫而臨淮獨無疫者鄰郡牽牛入界避災耳范曄後漢書曰漢光武初起騎牛殺新野尉乃得馬又曰劉盆子初與兄茂屬右校卒吏劉俠卿主芻牧牛號曰牛吏及立為帝恐畏欲啼即復還依俠卿又曰更始即位舞陰大姓李氏擁城不下更始遣柱天將軍李寶降之不肯云聞宛之趙氏有孤孫熹信義著名願得降之更始乃徵熹熹年未二十既引見更始笑曰蠒栗犢豈能負重致遠乎犢角如蠒栗言小也禮緯曰天地之牲角蠒栗即除為郎中行偏將軍事使詣舞陰而李氏遂降又曰劉寬嘗行有人失牛者乃就寬車中認之寬無所言下駕步歸有頃認者得牛而送還叩頭謝曰慚負長者隨所刑罪寬曰物有相類事容脫幸勞見歸何為謝之州里服其不校又曰魯恭為中牟令亭長有從民借牛不還者牛主自言恭召亭長教令還牛亭長不還如是者三遂不還恭涕泣曰教化不行也欲解印綬去椽吏亭者固爭亭長即還牛詣獄受罪恭貰出不問於是吏人敬信皆不忍欺謝承後漢書曰朱暉為郡吏太守阮況嘗欲市暉牛暉不從及況卒暉乃厚贈送其家人或以譏焉暉曰前阮府君有求於我所以不敢聞命誠恐以財貨污君今而相送明吾非有愛也魏略曰鉅鹿時苗字胃為壽春令始之官乘牸牛歲餘生一犢子及代留其犢而去晉書曰羊篇祜之姪也為鉅平侯奉祜嗣篇歷官清慎有私牛於官舍產犢及還而留之張勃吳錄地理志曰合浦徐聞縣多