  - {type: variant, offset: 391, length: 3, content: 六四童, SBCK: 今公之牛老於蘭罕不勝服也車蠧於瓦石不服乗也列子曰宋人有好行義者三丗不懈家無故而黒牛生白犢以問孔子孔子曰此􅁻祥也以享上帝居一年其父無故而盲牛又復生白犢其父令其子問孔子孔子曰􅁻祥也復以􅀕居一年中其子又盲其後楚攻宋圍其城民易子而食之折骸而炊之丁壯皆乗城戰死者太半此人父子有疾皆免也吕氏春秋曰昔􅁑天氏之樂三人操牛尾􅄬足以歌八闋注事具樂部又曰使烏獲疾引牛尾尾絶力單而牛不行逆也使五尺竪子引其捲而恣所之順也又曰亂國之妖有牛馬言韓子曰商太宰嘗使庶子行市還云市門多車太宰召市吏問曰市何多牛馬耶吏恠太宰是神知又曰詹何坐弟子侍有牛鳴於門外弟子曰是黒牛也而白在其蹄詹何曰然黒牛也而白在其頭使人視之果黑牛而以布褁其角尸子曰夫龍門魚之難太行}
  - {type: page-break, offset: 391, content: '', id: KR3k0012_SBCK_899-3a}
  - {type: page-break, offset: 391, content: '', id: KR3k0012_SBCK_899-3b}
  - {type: variant, offset: 391, length: 3, content: 六四童, WYG: 昔葛天氏之樂三人操牛尾捉足以歌八闋注事具樂部又曰使烏獲疾引牛尾絶力殚事牛不行逆也使五尺豎子引其鼻而恣所之順也又曰亂國之妖有牛馬言韓子曰商太宰嘗使庶子行市還云市門多車太宰召市吏問曰市何多牛馬耶吏怪太宰是神知又曰詹何坐弟子侍有牛鳴於門外弟子曰是黑牛也而白在其蹄詹何曰然黑牛也而白在其頭使人視之果黑牛以布裹其角尸子曰夫龍門魚之難太行}
