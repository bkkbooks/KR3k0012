  - {type: variant, offset: 1788, length: 701, content: 死壯士擊之城上士大譟燕師大敗騎劫死乘勝逐北三戰三克遂收齊城也又曰馬蹄躈千牛千足此亦比千乘之家躈苦吊切又曰甯戚欲仕齊候桓公出牽牛叩角而歌曰南山粲白石爛短布單衣才至骭生不逢堯與舜禪長夜漫漫何時旦桓公用之又曰蘇秦說韓王曰鄙語云寧為雞口無為牛後今西面事秦何異牛後乎漢書曰邴吉嘗出逢群鬥者死傷橫道吉過之不問前行逢人逐牛牛喘吐舌止使騎吏問牛行幾里或譏吉吉曰民鬥殺傷長安令京兆尹職所當禁備逐捕丞相課其殿最不親小事也方春少陽用事未可以熱恐牛近行因暑故喘此時氣失節恐有所傷害者三公典調和陰陽職所當憂也又曰龔遂為渤海太守民有帶持刀劍者使賣劍買牛賣刀買犢可謂帶牛佩犢矣又曰宣帝地節三年求得外祖母王媼男無故弟武皆隨使者詣闕時乘黃牛車故百姓謂之黃牛嫗後漢書曰朱暉為臨淮太守時牛大疫而臨淮獨無疫者鄰郡牽牛入界避災耳范曄後漢書曰漢光武初起騎牛殺新野尉乃得馬又曰劉盆子初與兄茂屬右校卒吏劉俠卿主芻牧牛號曰牛吏及立為帝恐畏欲啼即復還依俠卿又曰更始即位舞陰大姓李氏擁城不下更始遣柱天將軍李寶降之不肯云聞宛之趙氏有孤孫熹信義著名願得降之更始乃徵熹熹年未二十既引見更始笑曰蠒栗犢豈能負重致遠乎犢角如蠒栗言小也禮緯曰天地之牲角蠒栗即除為郎中行偏將軍事使詣舞陰而李氏遂降又曰劉寬嘗行有人失牛者乃就寬車中認之寬無所言下駕步歸有頃認者得牛而送還叩頭謝曰慚負長者隨所刑罪寬曰物有相類事容脫幸勞見歸何為謝之州里服其不校又曰魯恭為中牟令亭長有從民借牛不還者牛主自言恭召亭長教令還牛亭長不還如是者三遂不還恭涕泣曰教化不行也欲解印綬去椽吏亭者固爭亭長即還牛詣獄受罪恭貰出不問於是吏人敬信皆不忍欺謝承後漢書曰朱暉為郡吏太守阮況嘗欲市暉牛暉不從及況卒暉乃厚贈送其家, WYG: 怖}
