  - {type: variant, offset: 414, length: 148, content: 行人之得邑人之災象曰行人得牛邑人災也又遯卦曰六二執之用黃牛之革莫之勝說象曰執用黃牛固志也又離卦曰離利貞畜牝牛吉又既濟曰九五東鄰殺牛不如西鄰之禴祭又說卦曰坤為牛周書王會曰卜盧紈牛紈牛者牛之小者大夏茲白牛數楚每牛牛之小者也大夏西北戎數楚北戎茲白牛野獸形似白牛詩鴻鴈無羊曰誰謂爾無牛九十其犉黃牛黑脣曰犉, SBCK: 爲牧竪所驅}
