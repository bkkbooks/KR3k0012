  - {type: variant, offset: 3910, length: 459, content: 買牛人嗟異良久呼信曰孟公但見與牛未必須其力也苦請不得乃罷買牛者周文帝帳下人周文深歎異焉隋書曰盧昌衡為徐州揔管嘗行至浚儀所乘馬為他牛所觸因致死牛主陳謝求還價直昌衡謂之曰六畜相觸自關常理此豈人情也君何謝乎拒而不受性寬厚不求皆此類也又曰牛弘有弟曰弼好酒而酗嘗因醉射殺弘車牛弘來還宅其妻迎謂之曰叔射殺牛矣弘聞之無所怪問直荅云作脯坐定其妻又曰叔忽射殺牛大是異事弘曰已知之矣顏色自若讀書不輟其寬和如此又曰于仲文遷安固太守有任杜兩客各失牛後得牛兩家俱認州郡久不能決益州長史韓伯雋曰于安固少聰察可令決之仲文曰此易解耳於是令二家各驅牛群至乃放所認者遂向任氏群中又陰使人微傷其牛任氏嗟惋杜家自若仲文於是訶杜氏杜氏服罪而去又曰盧愷從周武帝在雲陽宮勑諸屯簡老牛欲以享士愷進諫曰昔田子方贖老馬君子以為美談向奉明勑欲以老牛享士有虧仁政帝美其言而止轉禮部大夫唐書曰李密嘗欲尋包愷乘一黃牛被以蒲韉仍將漢書一秩掛於角上一手捉牛靷一手飜書讀之尚書令越公楊素見於道從後按轡躡之既及問曰何處書生躭學若此密識越公乃下車再拜自言姓名又問所讀何書荅曰項羽傳越公奇之, SBCK: 九}
