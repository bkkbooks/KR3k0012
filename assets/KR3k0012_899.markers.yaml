  - {type: variant, offset: 407, length: 1, content: 妄, krp: 冬夏常卧雪中又曰智禽銜蘆以逆網水牛結陣而却虎矣說苑曰齊桓公岀獵逐鹿入山谷中見一老父問曰此何谷也曰愚公}
  - {type: variant, offset: 409, length: 3, content: 災或繫, SBCK: 谷曰何也曰畜牸牛子大賣之買駒少年曰牛不能生馬遂持駒去旁人聞以臣爲愚因以爲谷也管子曰此臣之過也使堯在上臯陶爲大理者安有取人駒乎論衡曰十圍}
  - {type: page-break, offset: 409, content: '', id: KR3k0012_SBCK_899-5a}
  - {type: variant, offset: 409, length: 3, content: 災或繫, WYG: 通稱牛則物之定形而通稱定形不可不察也重白而憎黑嗜甘而逆苦能定名則萬事不亂也卞子曰郭林宗謂仇季智曰子嘗有過否季智曰吾嘗飯牛牛不食一搏牛耳説苑曰秦穆公使賈人載鹽徴諸賈人百里奚以五羖羊之皮將車之秦秦穆公觀鹽見百里奚飯牛肥問何以致也對曰臣飲食以時使之不以暴有險先後之以身是以肥也穆公知其君子也乃以為之師張温自表曰昔百里奚賢秦穆公欲用之穆公好牛奚因賃官以養牛蹄上垂肉三寸公使禽息行牛息入言之公不信怒息復言之公又怒吏曰再怒其主罪當刖使守門公出禽息跪而請之曰夫養牛者願君勿忘也公乃問百里奚奚曰臣之長非養牛者也乃養民也公視牛察之則賢人也遂與同車而出謝息息曰所以不死者君未知客也今已知之矣乃觸門而死抱朴子曰南方水牛無冬夏常卧水中又曰智禽衘蘆以逆綱水牛結陣而却虎矣説苑曰齊桓公出獵逐鹿入山谷中見一老父問曰此何谷曰愚公之谷曰何也曰畜牸牛子大賣之買駒少年曰牛不能生馬遂持駒去旁人聞臣以為愚因以為谷也管子曰此臣之過也使尭在上臯陶為大理者安有取人駒乎論衡曰十圍}
