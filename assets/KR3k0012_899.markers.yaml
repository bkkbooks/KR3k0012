  - {type: punctuation, offset: 386, content: 《, id: KR3k0012_CHANT_899-bkkpn141}
  - {type: variant, offset: 386, length: 0, content: '', SBCK: 此能爲大矣而不能執䑕又曰魯聞顔闔得道之人使幤致焉顔闔守廬麤布之衣而自飯牛魯君之使者問此顔闔家耶闔曰然使者致幤闔對曰恐聽謬而遺使者罪不若審之使者還反復求之則不得也又曰庖丁爲文惠君解牛曰臣之刀十九年所解千牛而刀刄􅀂新彼節者有間而刀刃無厚以無厚入有間而恢恢乎其􅄬刃必有餘地是以十九年刀刃如新管子曰屠牛坦朝解九牛而刀可以剃髮則刃遊於其間也又曰或聘莊子莊子應其使曰子見夫犧牛乎衣以文繍食以芻菽及其牽入於太廟雖欲爲狐犢其可得乎孟子曰臣聞胡齕云王坐於堂上有牽牛而過堂下者王見之曰牛何之對曰將以釁鍾王不忍見其觳觫欲以羊}
  - {type: page-break, offset: 386, content: '', id: KR3k0012_SBCK_899-2b}
  - {type: variant, offset: 386, length: 0, content: '', WYG: 此能為大矣而不能執䑕又曰魯聞顔闔得道之人使幣致焉顔闔守廬粗布之衣而自飯牛魯君之使者問此顔闔家耶闔曰然使者致幣闔對曰恐聽謬而遺使者罪不若審之使者還反復求之則不得也又曰庖丁為文惠君解牛曰臣之刀十九年所解牛數千而刀刃若新發於硎彼節者有間而刀刃無厚以無厚入有間而恢恢乎其游刃必有餘地是以十九年刀刃如新管子曰屠牛長朝解九牛而刀可以剃髪則刃逰於其間也又曰或聘莊子莊子應其使曰子見夫犧牛乎衣以文繡食以芻菽及其牽入於太廟雖欲為狐犢得乎孟子曰臣聞胡齕云王坐於堂上有牽牛而過堂下者王見之曰牛何之對曰將以釁鐘王不忍其觳觫欲以羊}
