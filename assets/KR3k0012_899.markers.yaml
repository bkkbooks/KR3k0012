  - {type: variant, offset: 1230, length: 450, content: 鬼也又曰郊用騂尚赤也用犢貴誠也又禮器曰有以少為貴者天子祭天特牲天子適諸侯諸侯膳以犢又內則曰牛夜鳴則庮庮臭惡也又曰祭天地之牛角繭栗宗廟之牛角握賓客之牛角赤周禮地官封人曰凡祭祀飾其牛牲設其楅衡置其絼供其水藁楅在鼻衡在角言不得觸絼繫牛鼻繩絼本又作紖持忍反又冬官考功記曰稺牛之角直而澤老牛之角終而昔昔讀為交錯之錯謂角捔理錯也角長二尺有五寸三色不失謂之牛戴牛三色本白中清末豐也戴牛角直一牛又地官上曰牛人掌養國之公牛以待國之政令公猶官也凡祭祀共其享牛求牛以授職人而芻之求牛禱於鬼神之牛謂所以祭者也求終也終事之牛謂所以繹者也宗廟有繹者孝子求神非一處職讀為樴樴謂之我可以繫牛樴人者謂牧人凡賓客之事共其牢禮積膳之牛饗食賓射共其膳羞之牛軍事共其犒牛喪事共其奠牛凡會同軍旅行役共其兵車之牛與其牽傍以載公任器牽傍在轅外輓牛也人御之居其前曰牽居其旁曰傍任猶用也凡祭祀共其牛牲之互與其盆簝以待事鄭司農云玄謂福衡之屬盆簝皆器名盆所以盛血簝受肉籠也玄謂互若今屠家縣肉格又秋官上曰罪隸掌役百官府與凡有守者掌使令之小事役給其小役凡封國若, WYG: ''}
