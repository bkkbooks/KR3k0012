  - {type: variant, offset: 194, length: 0, content: '', SBCK: 後林復詣㳙子寢静之室無復之矣留一􅁓書置卧内以與林也其文曰五斗三一大帝所秘精思十二年三一見相授子書矣但有三一長生不滅況復守之乎能守三一名刋玉札况與三一相見乎加存洞房爲}
  - {type: variant, offset: 194, length: 0, content: '', WYG: 耳目為主雜視則目闇廣聽則耳閉裴君内傳曰夫求道者要先令目清耳聦為主也且耳目是尋真之梯級綜靈之門户得失繫之仙經曰養生以不傷為本此要言也太清真經曰一切含氣莫不貴生為天地之大徳德莫過於長生長生者必其外身也不以身害物非惟不害而已乃濟物而忘其身忘其身而身不忘是為善攝生者也真道養神神能飛化太}
  - {type: page-break, offset: 194, content: '', id: KR3k0012_WYG_668-5b, image: WYG0899/WYG0899-0027b.png}
  - {type: variant, offset: 194, length: 0, content: '', krp: 後林復詣㳙子寢静之室無復之矣留一𥿄書置卧内以與林也其文曰五斗三一大帝所秘精思十二年三一見相授子書矣但有三一長生不滅況復守之乎能守三一名刋玉札况與三一相見乎加存洞房爲}
  - {type: variant, offset: 195, length: 7, content: 皇天帝授太微天, SBCK: 清公加知三元爲五}
  - {type: variant, offset: 195, length: 1, content: 皇, WYG: 三元經曰養生之道必愛氣存神不可劇言大呼使神勞氣損是以真人道士常吐納以和六液𤣥示經曰夫形體者持生之具也非所以生生也生生乃以素朴為體以氣為元以神為形此乃生之宫庭也以無為育其神舒釋𤣥妙之門徃來無形之間休息於無隣此所謂得𤣥明之生源又云外想宜絶内注𤣥真然後長生可保妙真經曰道人謀生不謀於名胷中絶欲意無所傾志若流水居若空城積守無為乃能長生衆真戒曰性躁暴者一身之劇賊求道之散梯也用之者真去改之者道來每事觸類皆當柔遲而盡精㓗之理如此㡬乎道也神者}
  - {type: page-break, offset: 195, content: '', id: KR3k0012_WYG_668-6a, image: WYG0899/WYG0899-0027c.png}
  - {type: variant, offset: 195, length: 7, content: 皇天帝授太微天, krp: 清公加知三元爲五}
  - {type: variant, offset: 197, length: 2, content: 帝授, WYG: 地之所馳也頥神養性行道氣以度難也此乃上聖真人逹識也夫為道者當行此以載其身}
