  - {type: variant, offset: 1676, length: 2, content: 東海, SBCK: 一當令心朴神凝體專誠感所以百念不生精意不散但有三月内視注心一神繫念不散專氣致和由朴之至也得之速也自朴散眞離華僞互起争競亂生故一不卒感神不即應非不欲徃存之者不專思之者不審故起積年之功絶有髣髴耳三一之法上清眞書之首篇髙上之玉道神仙之津途衆眞之妙訣子能守一一亦守子子能見一一亦見子一湏身而立身湏一而生守一之戒戒於不專專復不乆乆不能精精不能固固而不恒則三一去矣身爲空宅五符經曰知一者無一不知也不知一者無一能知也一者至貴無偶之號必欲長生三一當明思一至飢一與之粮思一至渴一與之漿一能成隂生陽推行寒暑其大不可以六合隱其}
