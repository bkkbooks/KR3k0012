  - {type: variant, offset: 1676, length: 2, content: 東海, krp: 一當令心朴神凝體專誠感所以百念不生精意不散但有三月内視注心一神繫念不散專氣致和由朴之至也得之速也自朴散眞離華僞互起争競亂生故一不卒感神不即應非不欲徃存之者不專思之者不審故起積年之功絶有髣髴耳三一之法上清眞書之首篇髙上之玉道神仙之津途衆眞之妙訣子能守一一亦守子子能見一一亦見子一湏身而立身湏一而生守一之戒戒於不專專復不乆乆不能精精不能固固而不恒則三一去矣身爲空宅五符經曰知一者無一不知也不知一者無一能知也一者至貴無偶之號必欲長生三一當明思一至飢一與之粮思一至渴一與之漿一能成隂生陽推行寒暑其大不可以六合隱其}
  - {type: variant, offset: 1679, length: 0, content: '', SBCK: 不可以毫芒兆能暇能豫一乃不去存一至勤一能通神少飲約食一乃留息知一不難難在於終知眞不爲與不知同求之不巳登彼玉清又曰養其氣所以全其身又曰食氣者常有少容老子曰道言微深子未能別撮其樞畧愼戒勿失先損諸欲莫令意􅇣閑居静處精細齋室丹書萬卷不如守一當制念以定志静身以安神寳氣以存血思慮兼忘冝想内視則身神並一静思期眞則衆妙感㑹專精積神不與物􅄂謂之清反神服氣安而不動謂之道又曰善攝生者陸行不遇兕虎入軍不􅀍甲兵兕無所投其角虎無所措其􅀲兵無所容其刃太上眞經曰一乃無像求之難得守之易失易失由識劣貪欲滯心廓然無爲惟在守一積而未極皆由漸􅂛當在三元諦識神氣狀皃名字出入有無生鎭三宫尸毒自去聖眞仙經隨因授之八素經曰凢學至道諦定其心除患清身知變革慮正身清然後心定心定則道成道成則眞降凢存一守神要在正化正化由定心心定則識清識清則㑹于道又太極眞人曰古人爲道也玄寂静神念眞存元示漸引末歸識源神知而能見見而能從從而能習習而能堅堅而能成成而不居善人在於天下如橐籥乎非與萬物交争其德常歸焉以其謙虚無欲也欲者㐫害之根也無者天地之元也莫知其根莫知其源聖人者去欲入無以輔其身也太一洞眞經曰兩耳名爲六合之髙牎也又云齊中名曰受命之宫也又曰養生之道耳目爲主􅄂視則目闇廣聽則耳􅐬裴君内傳曰夫求道者要先令目清耳聦爲主也且耳目是尋眞之梯級綜靈之門户得失繫之仙經曰養生以不傷爲夲此要言也太清眞經曰一切含氣莫不貴生生爲天地之大德德莫過於長生長生者必其外身也不以身害物非惟不害而巳乃濟物忘其身忘其身而身不忘是爲善攝生者也眞道養神神能飛化太上三元經曰養生之道必愛氣存神不可􅇵語大呼使神勞氣損是以眞人道士常吐納以和六液􅀇示經曰夫形體者特生之具也非所以生生也生生乃以素朴爲體以氣爲元以神爲形此乃生之宫庭也以無爲育其神舒釋玄妙之門徃來無形之間休息於無隣此所謂得玄明之生源又云外想冝絶内注􅀇真然後長生可保妙眞經曰道人謀生不謀於名􅎍中絶白意無所傾志􅀂流水居􅀂空城積守無爲乃能長生衆眞戒曰性躁􅁀者一身之劇賊求道之散梯也用之者眞去改之者道來每事觸􅀋皆當柔遟而盡精㓗之理如此幾乎道也神者天地之所馳也頥神養性行生道氣以度難也此乃上聖眞人逹識也夫爲道者當行此以載其身太一帝君經曰􅀂能常行九晨照洞房􅅺丸之法者檢䰟魄制萬邪清浄行之以致靈仙之氣降于寢室所謂引三光九星以照百神者也上清列紀曰胎閉静息内保百神吞景咽液飲食自然身必壽考可得陸仙矣太上眞人祕要曰夫氣者神明之器清濁之宗處􅀇則天清在人則身存夫生死虧盈蓋順乎攝御之間也太洞玉經日食玄根之氣者使人體中清朗神明八聦身有日映面有玉澤服餌朝夜懸粮絶粒道要於金醴事妙於水玉所謂吐納自然之太和御九精之靈氣者也抱朴子曰長生之要在乎還年之道也延年除病其次焉有不以自伐􅀂年尚少壯而知還年隂丹以􅀘腦采七益於長谷者不服餌藥亦不失一二百歳凢傷之道有數焉才所不逹而困思之力所不勝而張舉之深憂重怨悲哀喜樂汲汲所欲戚戚所患寢息失時沉醉吐嘔飽食即卧跳走喘息歡呼􅂘泣隂陽不交積傷至盡乖養性之方耳不極聽目不乆視坐不至疲先寒而衣先􅀬而解不欲極飢而食食不過飽極渴而飲飲不過多不欲甚勞不欲多汗及多唾奔車走馬極目逺望多食生冷冬不欲極温夏不欲極凉大寒大􅀬大風大霧不欲昌之五味不可偏多凡言傷者亦不便覺乆則損壽耳是以善攝生者卧起有四時之早晚興居有至和之常制調利筋骨有偃仰之方杜疾閑邪有吞吐之術流衝營胃有􅀘㵼之法節宣勞􅇣有與奪之要忍怒以全隂抑喜以養陽然後先將服草木以救虧鈌後服金丹以定無窮長生之理盡於此矣􅀂有欲决意任懷自謂逹識知命不􅅺異端極情不營乆生者安可告養生之言哉登眞隱訣曰方諸青}
