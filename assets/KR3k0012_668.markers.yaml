  - {type: variant, offset: 1554, length: 265, content: 齋三年竭誠殫思乃能得之神光映身然後受書此真玄之道要而不煩吾常祕寶藏之囊肘故以相示慎密者也好道者欲求神山宜先齋戒登山昔左慈齋戒三月拜禮靈山竭誠三年然後二茅君引前又曰黃庭內景玉經曰扶桑太帝君命賜谷神王傳南岳夫人授受齋戒九日又曰三元真一經金闕帝君所守東海小童以傳涓子涓子傳蘇君蘇君傳周君授受齋百日或五十日或三十日或七日四十年傳一人十人止後聖道君命清靈小有天王修集上仙真籙總名紫元夫人傳王君王君傳南岳魏夫人夫人傳楊君楊君傳許掾授受齋三日或七日鳳真之文大上授太極左真人真人傳東海方諸君青童君此亦眾真相傳授受齋三日佩之九年得見二元君於上清金闕, WYG: 壽}
