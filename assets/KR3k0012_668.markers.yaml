  - {type: variant, offset: 215, length: 1455, content: 以付太上道君以傳金闕李君李君傳太靈真人南岳赤君又紫元夫人以傳清靈王君王君傳南岳魏夫人夫人傳楊君使授許長史及掾授受者齋戒七日又曰眾真授道先齋戒百日或三十日或十日又當先告齋一日以洗素心三千年六傳尋上經齋戒無如此者行之十四年太上迎以玉輪登上清為上真三皇經曰凡齋戒三事以定心口身之業也又曰凡齋戒講讀元譜大經佩服內文以成其道又曰凡齋者佩服三皇內文以成隱顯道登真隱訣曰道齋謂之守靜謂齋定其心潔靜其體在乎澄神遣務檢隔內外心齋者也又曰修道之人須齋戒禮謝七世之愆又曰上清每以吉日會五真凡修道之人當其吉日思存吉事心願飛仙立德施惠振救窮乏此太上之事也當須齋戒遣諸雜念密處靜室真誥曰齋戒不可雜處必亂正道也凡甲寅庚申之日是尸鬼競亂精神躁穢之日當齋戒不寢遣諸可欲凡五卯之曰常當齋戒入室東向心拜在神念氣適意所陳又曰漢建安中左慈聞句曲山在金陵通峨眉羅浮故渡江尋之遂齋戒三月而登此山乃得其門入茅君受以三種神芝宿啟功儀曰捧香仙女下衛齋戒之人又曰太極真人受太上口訣千歲五傳依隱書之制齋戒五日乃授立約珠囊曰凡入五岳以甲子上旬之日沐浴齋戒七日乃行若名山有芝英奇藥者奉之作素奏丹書其文乞登仙度世飛行上清再拜放自鷄犬各一於石上而去然後求芝英奇藥所欲必獲惡鬼老魅不敢試人若學道不知此術入山多厄抱朴子曰家有三皇圖必先齋戒百日乃召致天地五岳社稷之神後聖君命清虛小有真人撰集上仙真籙總名為上真正法以慴萬邪百年再授于人須齋戒方得三元品經曰學道之本當先修中元齋戒之法贖罪謝過於太真則書名玄圖靈寶赤書曰元始五老諸天帝皇帝以歲六齋之月會於上三天靈都宮元陽紫微之臺集筭天元推校運度又云紫微宮舊格丹書白素齋戒百日誦之太素玉籙經曰齋戒存思誦習此經精進無怠神通智達位為太素真人太平經曰真人云人之精神常居空閑之處不居汙濁之間也欲思還神皆當齋戒香室中百病自除不齋戒則精神不肯返人也皆上天共訴人所以人病積多死者不絕八素奔辰訣曰七曜五星審識形色見之早晚於庭伺之若晦冥之夕皆於寢室存念齋戒修行如存奔日月之法日中赤氣紫芒者為曜靈九神華芒也月中黃氣白光八朗之芒是為月華夜精道人皆知服日月之氣而吸九華靈芒能修存奔日月之道安妃授楊君書二卷皆是奇法日是月之道甚多高妙上清金闕靈書曰太上之吉會日者高真集宴慶獻之日也廻元者太上之更始日也甲子陰陽之首氣月晦改度之初萌故為新日也不知此日者不得解罪除過不得刻簡上真當須齋戒於是日思存吉事此廻元訣也又曰黃庭內景經一名太上琴心文又名大帝金書扶葉大帝君宮中盡誦此經金簡刻書之故曰金書又名東華玉篇東華者方諸宮名東海青童君所居也其中仙曹多齋戒誦詠刻玉書之又曰太極左真人曲素訣辭一名九天鳳氣玄丘大真書太上授太極左真人真人傳東海方諸宮青童大君使傳道士宿有名應神仙真人者佩之二十年得見三元君齋戒青金之誓以代盟約八道祕言曰欲行九真之法者齋戒靜室至須專寂心禱飛仙上登紫庭又曰九天鳳氣玄丘真書玄都丈人仙科授佩齋戒三日佩之者得仙道德經序訣曰尹喜知紫氣西邁齋戒想見道真及老子度關授二篇經義靈書經曰十部妙經金字玉簡諸天真仙齋戒月日上詣玉京誦其文威儀經曰齋戒景福度人先為先人後己與志玄同一本行書曰授靈寶赤書者必先齋戒東卿司命經曰先師王君昔見授太上明堂玄真上經齋戒休糧存念日月咽服光芒之液常密行之此上真道也太上玄真經先盟而後行行之然後可聞玉佩金璫之道耳季偉昔長齋三年竭誠殫思乃能得之神光映身然後受書此真玄之道要而不煩吾常祕寶藏之囊肘故以相示慎密者也好道者欲求神山宜先齋戒登山昔左慈齋戒三月拜禮靈山竭誠三年然後二茅君引前又曰黃庭內景玉經曰扶桑太帝君命賜谷神王傳南岳夫人授受齋戒九日又曰三元真一經, SBCK: ''}
