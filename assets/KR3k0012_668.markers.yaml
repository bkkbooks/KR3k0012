  - {type: variant, offset: 1699, length: 1, content: 或, SBCK: 之飢一朝而飽豈復􅁴向者之餒乏耶非道則不可右英真人曰夫内接家業以自羈外綜王事以雜役此亦道之不專也夫抱道不行猶無道也握寳不用猶無寳也紫微元君曰疾之所生生乎念多邪之所兆兆於心散念多則事廣事廣則累繁浮泛莫撿紛竟不息内煎萬慮外勞百役形神弊矣衆病安得不興髙墉重関猶􅂲冦至况闢扉去防自我致冦也智以無涯傷性心以爲惡蕩真形來在眼聲發入聽其爲閞意属想實有増羡魂者正神神貴明信魄者邪􅀑􅀑尚狂悖飛仙之想觸見必念慈護之情遇物斯極以此爲心心即道矣九華經曰眼者身之鏡耳者躰之牖視多則鏡昏聽衆則牖􅐬磨鏡决牖則能徹洞萬靈眇察絶響靣者神之庭髪者腦之華心悲則面焦腦减則髮素所以精氣内䘮丹津損竭精者躰之神明者身之寳勞多則精散營竟則明消所以老隨氣落耄巳及之眞誥曰冨貴者破骨之斧鋸載罪之舟車適足誨愆要辱爲伐命之兵非佳事也是故古之髙人覽罪咎之難豫知冨貴之不可享矣遂肥遯長林栖景名山欲逺此迹自求多福保全至素者也裴君曰三関常調是長生之道也口爲天関手爲人関足爲地関調則}
