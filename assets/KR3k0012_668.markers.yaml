  - {type: variant, offset: 626, length: 294, content: 口訣千歲五傳依隱書之制齋戒五日乃授立約珠囊曰凡入五岳以甲子上旬之日沐浴齋戒七日乃行若名山有芝英奇藥者奉之作素奏丹書其文乞登仙度世飛行上清再拜放自鷄犬各一於石上而去然後求芝英奇藥所欲必獲惡鬼老魅不敢試人若學道不知此術入山多厄抱朴子曰家有三皇圖必先齋戒百日乃召致天地五岳社稷之神後聖君命清虛小有真人撰集上仙真籙總名為上真正法以慴萬邪百年再授于人須齋戒方得三元品經曰學道之本當先修中元齋戒之法贖罪謝過於太真則書名玄圖靈寶赤書曰元始五老諸天帝皇帝以歲六齋之月會於上三天靈都宮元陽紫微之臺集筭天元推校運度又云紫微宮舊格丹書白素齋戒百日誦之太素玉籙經曰齋戒存思誦習此經精進無怠神通智達位為太素真人太平, WYG: ''}
