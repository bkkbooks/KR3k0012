  body:
  - {type: variant, offset: 2, length: 3, content: 九齋戒, SBCK: 十養生太平經曰養生之道安身養氣不欲喜怒也人無憂故自壽也又曰一者數之始也生之道也元氣所起也天之大綱也故守而思一也子欲養老守一最夀平氣徐卧與一相守氣􅀂泉源其身何各是謂眞寳老襄自去又曰古者三皇之時人皆氣清深知天地之至情故悉學眞道乃復得天地之公求道之法静爲基先心神巳明與道爲一開蒙洞白􅀋如晝日不學其道􅀂處暗室而迷方也故聖賢遑駭}
  - {type: variant, offset: 2, length: 3, content: 九齋戒, WYG: 十養生太平經曰養生之道安身養氣不欲喜怒也人無憂故自壽也又曰一者數之始也生之道也元氣所起也天之大綱也故守而思一也子欲養老守一最壽平氣徐卧與一相守氣若泉源其身何咎是謂真寳老衰自去又曰古者三皇之時人皆氣清深知天地之至情故悉學真道乃復得天地之公求道之法靜為基先心神已明與道為一開蒙洞白類如晝日不學其道若䖏暗室而迷方也故聖賢惶駭}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_WYG_668-1b, image: WYG0899/WYG0899-0025b.png}
