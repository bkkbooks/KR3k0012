  - {type: variant, offset: 1956, length: 256, content: 語而注之為施修之法未見真本而事旨不具名山記曰大茅山有小穴口石填之但精心齋戒可得而遊中茅山東亦有小穴穴口如狗竇劣容人入耳愈入愈闊外以盤石掩塞穴口故餘小穿如杯大使山靈守衛之此磐石亦時開發若勤懇齋戒尋之得從而入易於常洞口好道者欲求神仙宜預齋戒則三茅君於句曲見之授以要道入洞門句曲有五門立志齋戒三月尋登此門者可入矣九天經曰玉輔上宰齋戒建節侍於太清法輪經曰仙公齋戒未及歲年而感召天真下降淨室又曰念真齋戒緘口慎言靈寶大戒經曰不受大戒徒為長齋四極明科經曰凡學上清之道奉其宗師入室齋戒太上科曰凡經從師受皆真官侍衛須齋戒講誦雌一五, SBCK: 品黄}
