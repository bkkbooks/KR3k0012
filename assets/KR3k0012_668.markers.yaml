  - {type: variant, offset: 2294, length: 0, content: '', SBCK: 曰眞人所以貴一爲眞者一而巳一之所契元氣造化一之變通天地􅁳合是以上一爲身之天帝中一爲絳宫之丹皇下一爲黄庭之元主而三之一眞並統身内二十四氣以授生生立一於身上應太微二十四氣眞眞氣􅆦和品物流形􅀇}
  - {type: variant, offset: 2294, length: 0, content: '', krp: 曰眞人所以貴一爲眞者一而巳一之所契元氣造化一之變通天地冥合是以上一爲身之天帝中一爲絳宫之丹皇下一爲黄庭之元主而三之一眞並統身内二十四氣以授生生立一於身上應太微二十四氣眞眞氣徊和品物流形玄}
  - {type: variant, offset: 2295, length: 3, content: 先映身, SBCK: 渾分紫房杳􅁳上一眞帝之極也中一眞皇之主也下一眞王之砂也天皇得極故上成皇極地皇得主故上成正一人皇得妙故上成衆妙三皇體眞而守一其眞極也得一而巳}
  - {type: variant, offset: 2295, length: 3, content: 先映身, krp: 渾分紫房杳冥上一眞帝之極也中一眞皇之主也下一眞王之砂也天皇得極故上成皇極地皇得主故上成正一人皇得妙故上成衆妙三皇體眞而守一其眞極也得一而巳}
