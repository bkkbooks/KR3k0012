  - {type: variant, offset: 1680, length: 17, content: 以傳涓子涓子傳蘇君蘇君傳周君授受齋, SBCK: 云人學道亦苦不學亦苦二苦之始乃同爲苦之終則異爲道者縁苦得樂不爲道者從辛苦而已矣惟人自生至老自老至病􅀗身至死其苦甚矣心腦積罪生死不絶其苦難說况復不終其天之年老哉此不爲道之苦也爲道亦苦者清浮存真守玄思靈尋師勞苦歴試數百用志不墮亦苦之至也此爲道之苦數十年中爲苦之理乃有甚於彼得道之日乃頓忘此苦猶}
