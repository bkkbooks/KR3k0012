  - {type: variant, offset: 2311, length: 0, content: '', SBCK: 得道也􅀂血脉枯竭神氣凋敗豈􅀑神念眞而能守之固未知其益矣此由凢人爲道而求其末不務其本也又曰内不養神外勞其形元精漸虚神氣困竭而晝夜服}
  - {type: variant, offset: 2311, length: 0, content: '', krp: 得道也若血脉枯竭神氣凋敗豈鬼神念眞而能守之固未知其益矣此由凢人爲道而求其末不務其本也又曰内不養神外勞其形元精漸虚神氣困竭而晝夜服}
  - {type: variant, offset: 2312, length: 2, content: 苦齋, SBCK: 讀誦經訣此亦無益也諸經萬三千首皆示以始渉之門庭耳啇王具受諸要行彭祖之亦夀但不能}
