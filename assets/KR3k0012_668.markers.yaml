  - {type: variant, offset: 242, length: 0, content: '', WYG: 氣者神明之運清濁之宗處𤣥則天清在}
  - {type: page-break, offset: 242, content: '', id: KR3k0012_WYG_668-7a, image: WYG0899/WYG0899-0028a.png}
  - {type: variant, offset: 243, length: 0, content: '', WYG: 則身存夫生死虧盈盖順乎攝御之間也太洞玉經曰食𤣥根之氣者使人體中清朗神明入聦身有日映面有玉澤服餌朝液懸根絶粒道要於金醴事妙於氷玉所謂吐納自然之和御九精之靈氣者也抱朴子曰長生之要在乎還年之道也延年除病其次焉有不}
  - {type: variant, offset: 244, length: 1, content: 傳, WYG: 自伐若年尚少壯而知還年隂丹以補腦采七益於長谷者不服餌藥亦不失一二百歳凡傷之道有数焉才所不逮而困思之力所不勝而張舉之深憂重怨悲哀喜樂汲汲所欲戚戚所患􅃦息失時沉醉吐嘔飽食即卧跳走喘息歡呼哭泣隂陽不交積傷至盡乖養性之方耳不極聽目不久視坐不至疲先寒而衣先熱而解不欲極饑而食食不過飽不欲極渴而飲飲不過多不欲甚勞不欲多汗及多唾奔車走馬極目逺望多食生冷冬不欲極温夏不欲極凉大寒大風大熱大風大霧不欲冐之五味不可偏多凡言傷者亦不便覺久則損壽耳是以善攝生者卧起有四時之早晚興居有至和之常制調利筋骨有偃仰之法杜疾閑邪有吞吐之術流衝營胃有補㵼之方節宣勞逸有與奪之要忍怒以全隂抑喜以養陽然後先服草木以救虧缺後服金丹以定無窮長生之理盡於此矣若有欲決意任懐自謂逹識知命不泥異端極情不營久生者安可告養生之言哉登真隠訣曰方諸青童云人學道亦苦不學亦苦二苦之始乃同為苦之終則異為道者縁苦得樂不為道者徒辛苦而已矣惟人自生至老自老至病獲身至死其苦甚矣心腦積罪生死不絶其難說况復不終其天之年者哉此不為道之苦也為道亦苦者}
