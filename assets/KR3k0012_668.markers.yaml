  - {type: variant, offset: 9, length: 1, content: 思, SBCK: 守一則諦定心源守静則存}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 守一則諦定心源守靜則存神忘形定氣通無道成真降三元真一經曰體為百神耳者帝君之牎門目者太乙之日月鼻者三元之丘山口者絳宫之朱源眉者真元之華盖髮者明堂之林精舌者元英之龍轅齒者胃宫之威力手者膽神之外援足者腎元之靈闗隂極者洞房之真機也又曰涓子授蘇林守三真一之道後林復詣涓子􅃦静之室無復之矣留一紙書置卧内以與林也其文曰五斗三一大帝所秘精}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_WYG_668-2a, image: WYG0899/WYG0899-0025c.png}
  - {type: variant, offset: 9, length: 1, content: 思, krp: 守一則諦定心源守静則存}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 十二年三一見相授子書矣但有三一長生不㓕况復守之乎能守三一名刋玉札况與三一相見乎如存洞房為上清公加之三元為五帝君後金闕帝君所以乗景迅雲周行十天者實由洞房三元眞一之道也世之學者皆尊守一當令心朴}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_WYG_668-2b, image: WYG0899/WYG0899-0025d.png}
  - {type: punctuation, offset: 11, content: 、, id: KR3k0012_CHANT_668-bkkpn5}
  - {type: variant, offset: 11, length: 1, content: 錄, SBCK: 忘形定}
  - {type: variant, offset: 11, length: 1, content: 錄, WYG: 凝體專誠感所以百念不生精意不散但有三月内視注心一神繫念不散專}
  - {type: variant, offset: 11, length: 1, content: 錄, krp: 忘形定}
  - {type: substitution, offset: 11, original: 錄, replacement: 録, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-4560}}
