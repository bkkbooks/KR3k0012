  - {type: variant, offset: 247, length: 28, content: 王君王君傳南岳魏夫人夫人傳楊君使授許長史及掾授受者齋戒七, WYG: 尋師勞苦歴試數百用志不墮亦苦之至也此為道之苦數十年中為苦之理乃有甚於彼得道之}
