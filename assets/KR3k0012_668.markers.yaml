  - {type: variant, offset: 13, length: 5, content: 習法登階名, SBCK: 通無道成眞降三元眞一經曰體百神者耳爲帝君}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_SBCK_668-1b}
  - {type: variant, offset: 13, length: 1, content: 習, WYG: 致和由朴之至也得之速也自朴散真離華偽並起爭競亂生故一不卒感神不即應非不欲徃存之者不專思之者不審故棄積年之功絶有髣髴耳三一之}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_WYG_668-3a, image: WYG0899/WYG0899-0026a.png}
  - {type: variant, offset: 13, length: 5, content: 習法登階名, krp: 通無道成眞降三元眞一經曰體百神者耳爲帝君}
  - {type: punctuation, offset: 15, content: 、, id: KR3k0012_CHANT_668-bkkpn7}
  - {type: variant, offset: 15, length: 0, content: '', WYG: 上清真書之首篇髙上之至道神仙之津途衆真之妙訣子能守一一亦守子子能見一一亦見子一須身而立身須一而生守一之戒戒於不專專後不久久不能精精不能固固而不恒則三一去矣身為空宅五符經曰知一者無一不知也不知一者無一能知也一者至貴無偶之號必欲長生三一當明思一至饑一與之糧思一至渴一與之漿一能成隂生陽推行寒暑其大不可以六合隠其小不可以毫芒兆能暇能豫一乃不去存一至勤一能通神少飲約食一乃留息知一不難難在於終知真不為與不知同求之不已}
  - {type: page-break, offset: 15, content: '', id: KR3k0012_WYG_668-3b, image: WYG0899/WYG0899-0026b.png}
  - {type: variant, offset: 16, length: 1, content: 階, WYG: 彼玉清也又曰飬其氣所以全其身又曰飬氣者常有少容老子曰道言㣲深子未能别撮其樞略慎戒勿失先損諸欲令人意逸閑居静處精細齋室丹書萬卷不如守一當制念以定志静身以安神寳氣以存血思慮兼忘宜想内視則身神並一静思期真則衆妙感㑹專精積神不與物雜謂之清反神服氣安而不動謂之道又曰善攝生者陸行不遇兕虎入軍不披甲兵兕無所投其角虎無所措其爪兵無所容其刄太上真經曰一乃無像求之難得守之易失易失由識劣貪欲滯心廓然無為惟在守一積而未極皆由漸升當在三元諦識神氣狀貌}
  - {type: page-break, offset: 16, content: '', id: KR3k0012_WYG_668-4a, image: WYG0899/WYG0899-0026c.png}
