  - {type: variant, offset: 924, length: 1, content: 云, WYG: 所以貴一為真者一而已一之所契元氣造化一之變通天地冥合是以上一為身之天帝中一為絳宫之丹皇下一為黄庭之元主而三之一真並繞身内二十四氣以授生生一於身上應太㣲二十四氣真氣徊和品物流形𤣥神渾分紫房杳𠖇上一真帝之極也中一真皇之主也下一真王之妙也天皇得極故上成皇極地皇得主故上成正一人皇得妙故上成衆妙三皇體真而守一其真極也得一而已集仙籙曰凡動作視息飲食語言好惡是非人各有歳月日時隨其所屬以定其分此物理之常數也身有應敗之患神有應散之期命有必盡之勢夫神在則人神去則尸盖由嗜欲亂心不能􅁯色味之適夫修其道者在適而無累和而常通善惡各報報應之理毫釐無失長生之本惟善為基人生天地間各成其性夫氣清者聦明賢逹氣濁者㓙虐癡戅氣剛者髙嚴壯烈氣柔者慈仁淳篤夫明者伏其性以延命暗者恣其欲而傷性性者命之源命者生之根勉而脩之所以營生以飬其性守神以養其命}
  - {type: page-break, offset: 924, content: '', id: KR3k0012_WYG_668-12a, image: WYG0899/WYG0899-0030c.png}
  - {type: page-break, offset: 924, content: '', id: KR3k0012_WYG_668-12b, image: WYG0899/WYG0899-0030d.png}
