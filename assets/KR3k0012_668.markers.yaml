  - {type: variant, offset: 2302, length: 0, content: '', SBCK: 凢動作視息飲食語言好惡是非人各有歳月日時隨其所屬以定其分此物理之常數也身有應敗之患神有應散之期命有必盡之􅀔夫神在則人神去則尸蓋由􅄝慾亂心不能忘色味之適夫修其道者在適而無累和而常通善惡各在報應之理毫􅁵無失長生之夲惟善爲基人生天地間各成其性夫氣清者聦明賢逹氣濁者㓙虐癡戅氣剛者髙嚴壯烈氣柔者慈仁淳䔍夫明者伏其性以延命暗者恣其欲而傷性性者命之原命者生之根勉而修之所以營生以養其性守神以養其命人之生也皆由於神神鎭則生神斷則死所以積氣爲精積精爲神故仙者内求内宻則道來眞者修寂修静則合眞神者湏積感則靈通常能守一則仙近矣則與天地共􅀉於太無中矣又能洞靈體無則太無共􅀉於寂寥中矣能洞寂則聽視不聞見與道􅁳矣道者靈通之至眞也術者變化之􅇊􅀇也道無形因術以濟人人之有靈因修而契道道之要者在深簡易功術之祕者惟藥與氣也上士服之􅂛爲仙官中士服之栖集}
  - {type: page-break, offset: 2302, content: '', id: KR3k0012_SBCK_668-7b}
  - {type: page-break, offset: 2302, content: '', id: KR3k0012_SBCK_668-8a}
  - {type: variant, offset: 2302, length: 0, content: '', krp: 凢動作視息飲食語言好惡是非人各有歳月日時隨其所屬以定其分此物理之常數也身有應敗之患神有應散之期命有必盡之勢夫神在則人神去則尸蓋由嗜慾亂心不能忘色味之適夫修其道者在適而無累和而常通善惡各在報應之理毫釐無失長生之夲惟善爲基人生天地間各成其性夫氣清者聦明賢逹氣濁者㓙虐癡戅氣剛者髙嚴壯烈氣柔者慈仁淳䔍夫明者伏其性以延命暗者恣其欲而傷性性者命之原命者生之根勉而修之所以營生以養其性守神以養其命人之生也皆由於神神鎭則生神斷則死所以積氣爲精積精爲神故仙者内求内宻則道來眞者修寂修静則合眞神者湏積感則靈通常能守一則仙近矣則與天地共寄於太無中矣又能洞靈體無則太無共寄於寂寥中矣能洞寂則聽視不聞見與道冥矣道者靈通之至眞也術者變化之伎玄也道無形因術以濟人人之有靈因修而契道道之要者在深簡易功術之祕者惟藥與氣也上士服之升爲仙官中士服之栖集}
  - {type: variant, offset: 2304, length: 3, content: 玄圃見, SBCK: 下士服之長生人間於是太一元君述還丹金液之要行於世又曰木公金母者二氣之祖宗隂陽之原夲仙眞之主宰造化之元先凝氣成眞與道合體且氣之弥綸天地經營動植在人爲人在物爲物發大藴散無窮性發乎天而命成乎人立之者天行之者道􅀇老云致虚極守静篤萬物將自復復謂歸于道而常存也長乆之要者天保其􅀇地守其物人養其氣又曰啇王聞彭祖有道拜爲大夫毎稱疾閑居不預政事服雲母粉麋鹿角水挂常有少容性深静不自言有道王詣問莫之告王於掖庭立華屋紫閣使祖居之問延年益夀之道荅曰欲登天上􅀘仙官者當服元君太一金丹此道至大其次當愛精養神服食草藥可以長生其次陰陽運氣導養屈伸使百節氣行関機無滯此可以無使病所侵思神念眞坐忌錬液皆可以令人長壽苦泝流􅀘腦之要此甚難行有懷􅁄履刃之危又非王之所爲也吾所聞淺薄道止於此不足宣􅀓人生於丗伹養之得冝可至百餘歳不及此者是皆傷之也大醉大喜大怒大温大寒大勞大極皆傷也至樂至憂至畏至怖至撓至躁至奢至淫皆傷也甚飢甚渴甚思甚慮皆傷也乆坐乆立乆卧乆行皆傷也寒温得節飢飽適冝無思無爲惟清惟静此可與言修身耳巳得其夀復養之得冝則冝長壽但要莫傷也冬温夏凉不失四時之和者所以適身也美色曼態不至思欲之感者所以通神也車服威儀知足不求者所以一其志也八音五色不至躭溺者所以導心也凢此之物本以養人人之不能斟酌得中反以爲患故聖賢垂戒懼下才溺之流遁忘返用之失所故修道之士皆令禁之欲以檢制之易也亦由水火用之過當反爲害耳人不知經脉損血氣不足内理空踈髓腦不實體已先病故爲外物所犯因風寒酒慾以發之􅀂本充實豈有病耶凢逺思羡願傷人也憂恚悲哀人情過樂忿怒不解汲汲所愛戚戚所患寒温失節隂陽不交皆所傷也男女相成猶天地相生也所以導養神氣使人不失其和天地晝離而夜合一歳三百六十交故四時均而萬物生生成不知窮極所以天不失其動地不失其和物不失其生而能長乆也人不能法天地而有常减衣絶食自取死病愚之甚也去此修攝節宣之外則有服元和之氣得其道則邪不能入此理身之本也其餘含景思神歴藏導引吞餌服御之事千七百餘條及四時首月責巳謝過卧起早晏之法可以教􅀄學之士引進向善之門漸}
