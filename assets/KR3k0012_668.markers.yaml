  - {type: variant, offset: 927, length: 0, content: '', WYG: 生也皆由於神神鎮則生神斷則死所以積氣為}
  - {type: variant, offset: 928, length: 0, content: '', WYG: 積精為}
  - {type: punctuation, offset: 929, content: ，, id: KR3k0012_CHANT_668-bkkpn254}
  - {type: 'tls:seg', offset: 929, content: '', id: KR3k0012_CHANT_668-14a.11}
  - {type: variant, offset: 929, length: 0, content: '', WYG: 故仙者内求内宻則道來真者修寂修静則合真神者須積感則虛通}
  - {type: variant, offset: 930, length: 0, content: '', WYG: 能守一則仙近矣則與天地共寄於太無中矣又能洞虛體無則太無共寄於寂寥中矣能洞寂則聽視不聞見與道冥矣道者虛通之至真也術者變化之𤣥伎也道無形因術以濟人人之有虗因修而契道道之要者在深簡易之功術之祕者惟藥與氣也上士服之升為仙官中士服之栖集崑崙下士服之長生人間於是太一元君述還丹金液之要行於世又曰木公金母者二氣之祖宗隂陽之原本仙真之至宰造化之元元凝氣成真與道合體且氣之彌綸天地經營動植在人為人在物為物發大藴散無窮生發乎天而命成乎人立之者天行之者道𤣥老云致虚極守靜篤萬物將自復復謂歸常道而常存也長久之要者天保其𤣥地守其物人養其氣又曰商王聞彭祖有道拜為大夫每稱疾閑}
  - {type: page-break, offset: 930, content: '', id: KR3k0012_WYG_668-13a, image: WYG0899/WYG0899-0031a.png}
  - {type: page-break, offset: 930, content: '', id: KR3k0012_WYG_668-13b, image: WYG0899/WYG0899-0031b.png}
  - {type: variant, offset: 931, length: 0, content: '', WYG: 不預政事服雲母粉麋鹿角水精常有少容性深静不自言有道士詣問莫之告王於掖庭立華屋紫閣使祖居之問延年益壽之道荅曰欲登天上補仙官者當服元君太一金丹此道至大其次當愛精養神服食草藥可以長生其次隂陽運氣導養屈伸使百節氣行闗機無滯此可以無為病所侵思神念真坐忘錬液皆可以令人長壽若泝流補腦之要此甚難行有懐棘履刃之危又非王之所為也吾所聞淺薄道止於此不足宣傳人生於世但養之得冝至百餘歳不及此者皆傷之也大醉大喜大怒大温大寒大勞大極皆傷也至樂至憂至畏至怖至撓至躁至奢至淫皆傷也甚饑甚渴甚思甚慮皆傷也久坐久立久卧久行皆傷也寒温得節饑飽適冝無思無為惟清惟静此可與言修身耳已得其壽復養之得冝則長壽但要莫傷也冬温夏涼不失四時之和者所以適身也美色曼容不至思欲之感者所以通神也車服威儀知足不求者所以一其志也八音五色不至躭溺者所以導其心也凡此之物本以養人人之不能斟酌得中反以為患故聖賢垂戒懼不才者溺之流蕩忘返用之失所故修道之士皆令禁之欲以檢制之也亦猶水火用之過當反為害耳人不知經脉損傷血氣不足内理}
