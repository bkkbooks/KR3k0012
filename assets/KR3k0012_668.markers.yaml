  - {type: variant, offset: 2462, length: 292, content: 人雲牙玉方王君傳南岳魏夫人齋戒五日服之可以絕穀去尸虫王君遊觀天下詣龜山齋三月又齋戒三年詣太素還西城又齋三月受書周君少遇中央黃老君遊丹城乞長生度世之道授以上真之道乃還登常山石室中齋戒念慮久歷歲時後仙去道學傳曰左敦字尚隱雲陽人雲陽山即茅山也敦所居山舍西十五里有一石室西南二里復有一石室皆容數十人西南室父老傳云有銅牛出皆銅靷銅卷相傳號為銅室曲入至深立北通潢池而洞崑崙每三元齋戒之日敦往二室祈禱皆髣髴真形又曰陸脩靜字元德吳興人太始七年率眾建三元露齋太真上倉元上錄經曰凡有生之域清少濁多穢障相纏行善不立邪氣來侵強魔守試上學之人齋戒存思禁隔囂塵非類之物唐突去來皆是穢濁當擇日齋戒佩破淹之符以昇玉清, WYG: 八}
