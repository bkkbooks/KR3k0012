  - {type: variant, offset: 287, length: 1, content: 或, WYG: 之饑一朝而飽豈復覺向者之餒乏耶非道則不可右英真人曰夫内接家業以自覊外綜王事以雜役此亦道之不専也夫抱道不行猶無道也握寳不用猶無寳也紫㣲元君曰疾之所生生乎念多邪之所兆兆於心散念多則事廣事廣則累繁浮泛莫檢紛紜不息内煎萬慮外勞百役形神弊矣衆病安得不興髙墉重闗猶恐冦至况闢扉去防自我致冦也志以無涯傷性心以為惡蕩真形來在眼聲發入聽其為開意属想實有増羡魂者正神神貴明信􅅎者邪鬼鬼尚狂浮飛仙之想觸見必念慈䕶之情遇物斯極以此為心心即道矣九華經曰眼者身之鏡耳者軆之牖視多則鏡昏聽衆則牖閉磨鏡决牖則能徹洞萬虛𦕈察絶響靣者神之庭髮者腦之華心悲則靣焦腦减則髮衰所以精氣内䘮丹津損竭精者躰之神明者身之寳勞多則精散營竟則明消所以老隨氣落耄已及之真誥曰富貴者破骨之斧鋸載罪之舟車適足誨愆要辱為伐命之兵非佳事也是故古之髙人覽罪咎之難豫知富貴之不可享也遂肥遯長林栖景名山欲逺此跡自求多福保全至素者也裴君曰}
