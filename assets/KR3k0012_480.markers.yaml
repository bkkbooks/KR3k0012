  - {type: variant, offset: 2915, length: 206, content: 東陽大水永康人蔡嘉夫避住南壟夜有大鼠形如浮水而來徑伏嘉夫床角奴愍而不犯每食轉以餘飯與之水勢退嘉夫得反居鼠以前腳棒青紙裏三斤許珠著奴前啾啾狀如欲語從此去來不絕也又曰始興楊山縣人行田忽遇一象以鼻卷之遙入深山見一象腳有巨剌此人牽挽得出病者即起相與跼陸狀若懽喜前象復載就一汙濕地以鼻掘出數枝長牙送還本處彼境苗稷常為象所困其象俗呼大客因語云我田稼在此恒為大客所犯若念我者勿見侵便覺躑躅如相訓解於是一家業絕無其患三秦記曰白鹿, SBCK: ''}
