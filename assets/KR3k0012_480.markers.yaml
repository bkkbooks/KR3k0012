  - {type: variant, offset: 4540, length: 3, content: 竊說先, SBCK: 鹿生於山命懸於厨命有所懸矣成節而去黄庭經曰黄庭爲不死之道受者齋九日或七日或三日然後授之者爲師受者奉焉結盟立誓期以勿泄古者􅉀用玄雲之錦九十尺金簡鳯文之羅四十尺竹林七賢論曰劉伶常病酒渇求酒於其妻妻􅂢酒毀器泣而諌曰君酒過非攝}
  - {type: variant, offset: 4540, length: 3, content: 竊說先, WYG: 鹿生於山命懸於厨命有所懸矣成節而去黄庭經曰黄庭為不死之道受者齋九日或七日或三日然後授之者為師受者奉焉結盟立誓期以勿泄古者盟用𤣥雲之錦九十尺今簡鳯文之羅四十尺竹林七賢論曰劉伶嘗病酒渇求酒於其妻妻捐酒毁器泣而諌曰君酒過非攝}
  - {type: variant, offset: 4540, length: 3, content: 竊說先, krp: 鹿生於山命懸於厨命有所懸矣成節而去黄庭經曰黄庭爲不死之道受者齋九日或七日或三日然後授之者爲師受者奉焉結盟立誓期以勿泄古者􅉀用玄雲之錦九十尺金簡鳯文之羅四十尺竹林七賢論曰劉伶常病酒渇求酒於其妻妻捐酒毀器泣而諌曰君酒過非攝}
  - {type: substitution, offset: 4541, original: 說, replacement: 説, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19811}}
  - {type: variant, offset: 4545, length: 1, content: 義, SBCK: 道也必冝断之伶曰善吾不能自禁唯酒當禮􅀑神自誓以断之耳便可具酒肉妻敬聞命供酒肉於前請伶祝誓伶跪而祝曰天生劉伶以酒爲名一飲一斛五斗解酲婦人之言愼不可聽仍引酒御肉隗然而巳復醉矣孫卿子曰盟詛不及五帝誓誥不及三王交質不及五伯榖梁二傳交質不及二伯淮南子曰胡人彈骨胡人之􅉀約置酒人頭骨中飲以相咀也越人㓶臂中國唼盟所由名異其於信一也質左傳曰鄭武公莊公爲平王卿士賈逵曰卿士也有事者六卿也王貳于􅉑鄭伯怨王王曰無之故周鄭交質王子狐爲質於鄭鄭公子忽爲質於周王子狐周平王之子鄭子忽鄭莊公太子忽也王崩周人將􅂌􅉑公政夏鄭􅀕仲帥師取温之麥温周地也蘇氏邑也秋又取成周之禾周鄭交惡君子曰信不由中質無益也又曰楚子圍鄭旬有七日鄭人卜行成不􅁻卜臨于大宮且巷出車􅁻賈逹曰臨􅂘也巷也車陳於巷街示雖困不降必欲戰也國人大臨守陴者皆􅂘陴城堞也楚子退師鄭人脩城進復圍之三月克之入自皇門至於逹路皇門鄭城門也鄭伯肉􅃝牽羊以逆曰􅀌不天不爲天所佑也不能事君使君懷怒以及弊邑􅀌之罪也敢不唯命是聽其俘諸江南以實海濵亦唯命其翦以賜諸侯使臣妾之亦唯命􅀂不泯其社稷使改事君君之惠也􅀌之}
