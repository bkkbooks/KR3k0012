  - {type: variant, offset: 855, length: 359, content: 又曰張蒼陽武人有罪當斬解衣伏鑕身長大肥白如瓠時王陵見而怪其美士乃言沛公赦勿斬以為常山相蒼德王陵及貴父事陵陵死蒼為丞相洗沐常先朝陵夫人上食然後敢歸前列曰蓋寬饒左遷為衛司馬未出殿門斷其單衣令短離地冠大冠帶長劍躬按行士卒廬室視飲食居處有疾病者身自臨問加致毉藥遇之甚有恩及歲交代上臨饗罷衛卒數十人皆叩頭自請復留更一年以報寬饒厚德宣帝嘉之拜寬饒為太中大夫又曰朱買臣為會稽太守悉召見故人與飲食諸嘗有恩者皆報復焉又曰宣帝在長安獄中邴吉保護養視上知吉有舊恩而終不言時賢之詔曰御史大夫與朕有舊恩厥德茂焉詩不云乎無德不報其封吉為博陽侯食邑千三百戶又曰陳平既貴寵封侯乃詔高祖曰臣不因魏無知無以得見陛下請分報又曰張賀幸於衛太子太子敗賀下蠶室後為掖庭令而宣帝收養掖庭賀拊循恩甚密及宣帝即位而賀已死上追思德賀一子早子孺小男彭祖指欲封之先賜爵關內侯, SBCK: ''}
