  - {type: variant, offset: 4545, length: 1, content: 義, WYG: 道也必宜斷之伶曰善吾不能自禁唯當禮於鬼神自誓以斷之耳便可具酒肉妻敬聞命供酒肉於前請伶祝誓伶跪而祝曰天生劉伶以酒為名一飲一斛五斗解酲婦人之言慎不可聴仍引酒御肉頺然而已復醉矣孫卿子曰盟詛不及五帝誓誥不及三王交質不及五伯淮南子曰胡人彈骨胡人之盟約置酒人頭骨中飲以相咀也荆人闕臂中國唼盟所由名異其於信一也質左傳曰鄭武公莊公為平王卿士賈逵曰卿士之有事者六卿也王貳于虢鄭伯怨王王曰無之故周鄭交質王子狐為質於鄭鄭公子忽為質於周王子狐周平王之子鄭公子忽鄭莊公太子忽也王崩周人將畀虢公政夏鄭祭仲帥師取温之麥温周地也蘇氏邑也秋又取成周之禾周鄭交惡君子曰信不由中質無益也又曰楚子圍鄭旬有七日鄭人卜行成不吉卜臨于大宫且巷出車吉賈逵曰臨哭也巷出車陳於巷街示雖困不降必欲戰也國人大臨守陴者皆哭陴城也楚子退師鄭人脩城進復圍之三月克之入自皇門至於逵路皇門鄭城門也鄭伯肉袒牽羊以迎曰孤不天不為天所祐也不能事君使君懐怒以及弊邑孤之罪也敢不唯命是聴其俘諸江南以實海濵亦唯命其翦以賜諸侯臣妾之亦唯命若不泯其社稷使改事君君之惠也孤之}
