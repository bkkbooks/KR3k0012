  - {type: variant, offset: 3009, length: 2, content: 鼻卷, WYG: 其誓苦亦不徴}
  - {type: punctuation, offset: 3012, content: ，, id: KR3k0012_CHANT_480-bkkpn845}
  - {type: 'tls:seg', offset: 3012, content: '', id: KR3k0012_CHANT_480-33a.8}
  - {type: variant, offset: 3012, length: 690, content: 遙入深山見一象腳有巨剌此人牽挽得出病者即起相與跼陸狀若懽喜前象復載就一汙濕地以鼻掘出數枝長牙送還本處彼境苗稷常為象所困其象俗呼大客因語云我田稼在此恒為大客所犯若念我者勿見侵便覺躑躅如相訓解於是一家業絕無其患三秦記曰白鹿原人釣魚於原綸絕而去夢於漢武求去其鉤明日戲於池見大白魚銜索帝曰豈非昨所夢取而去之間三日帝復遊池濱得明珠一雙武帝曰豈非昔魚之報桓沖之述異記曰陳留周氏婢名興進入山取樵夢見一女語之曰近在汝頭前目中有剌煩為拔之當有厚報婢見一朽棺頭穿壞髑髏墮地草生目中便為拔草內著棺中以甓塞穿即於髑髏處得一雙金指環吳均續齊諧記曰弘農楊寶見一黃雀為鴟梟所搏取之以歸置巾箱中養之百餘日毛羽成朝去暮還後寶夕讀書未臥有黃衣童子向寶再拜曰我王母使臣昔使蓬萊不慎為鴟梟所搏蒙君仁愛救拯今當受使南海不得奉侍以白環四枚與寶令君子孫潔白且位登三事當如此環矣東陽元凝齊諧記曰富陽董昭之嘗乘舡過錢塘江中央見有一蟻著一短蘆甚迫遽昭之曰此畏死也便以繩繫此蘆著舡頭蟻緣繩出中夜夢一人烏衣從百許人來謝云僕不慎墮江慚君濟活僕是蟻中王君若急難之日當見告後昭遇事繫獄蟻穴獄昭遂得脫盛弘之荊州記曰隨侯曾得大虵不殺而遣之虵後銜明月珠以報隨侯一名隨侯珠孔靈符會稽記曰射的山南有白鶴山此鶴為仙人取箭漢太尉鄭弘嘗採薪得一遺箭頃有人覔弘還之問何所欲弘曰常患若耶溪載薪為難願旦南風夕北風後果然劉義慶幽明錄曰項縣人姚牛年十餘歲父為鄉人所殺牛手刃之於眾中吏捕得官長深矜孝節為推遷其事會赦得免令後出獵逐鹿入草中有古深穽數處馬將趣之忽見一公舉杖擊馬馬驚僻不得及鹿令怒引弓將射之公曰此中有穽恐君墮耳令曰汝為何人翁跪曰姚牛父也感君活牛故來謝恩遂滅不見, WYG: ''}
