  - {type: variant, offset: 328, length: 0, content: '', SBCK: 呉起東岀衛郭門與其母別齧指而盟起不爲卿相不復入衛也又曰􅁗之圍邯鄲趙使平原君求救於楚門下有毛遂者前自賛於平原君曰遂願備貟而行平原君曰夫賢士之處丗也􅀂錐處囊中其末立見今先生處勝之門下三年於此矣左右未有所稱遂曰臣乃今日請處囊中尔使早處囊必頴脫而出非特其末見而巳平原君與楚合從言其利害日出而言日中不决遂按劒而前曰從之利害兩言而决耳今日出而言日中不决何也楚}
