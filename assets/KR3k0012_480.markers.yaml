  - {type: variant, offset: 342, length: 0, content: '', WYG: 利害兩言而决耳今日出而言日中不决何也楚王叱曰胡不下遂按劍而前曰今十歩之中王不得恃楚國之衆王之命懸於遂今楚地五千里持㦸百萬此霸王資白起小豎子耳率數百萬之衆一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人此百世之怨也楚}
