  - {type: variant, offset: 3840, length: 256, content: 衡農字剽卿為書生窮乏客鍜於勃家勃知其賢禮待顧待眷常去送十里過舅家復貸錢贈之農受曰為馮翊乃相報別七八年果為馮翊勃為門下書佐忘之矣農召問乃寤舉孝廉為尚書郎左右丞魏郡太守河內太守又曰趙歧避難於四方江海岱霍無所不到自匿姓名布衣巾絮賣餅北海市安丘孫嵩年二十餘遊市見趙歸微察知非常人駐車呼與共載曰我北海孫賓碩終不相負歧聞嵩即以實告遂與俱歸嵩先入白母曰今日出得死友在外歧即匿嵩家積年乃出後說劉表時北海孫嵩流離在劉表末座不為表所識歧遙識之表說嵩表甚重之同共表嵩為青州刺史干寶搜神記曰噲參寓居河內虔恭父母忽有單鶴趣之參撫視箭創甚重, WYG: 中原}
