  - {type: variant, offset: 532, length: 169, content: 司馬曰臣故為從吏盜君侍兒者盎乃驚謝之而去又曰蘇秦既貴乃遍報諸所嘗見德者其從者有一人獨未得報乃前自言蘇秦曰我非忘子子之至燕再三欲去我易水上方是時我困故望子深是以後子子今亦得矣又曰項王使召韓信信謝曰臣事項王官不過郎中位不過執戟言不聽畫不用故去而歸漢漢王授我上將軍印與我數萬眾解衣衣我推食食我言聽計用故吾得以至於此夫人深親信我我背之不祥雖死不易, SBCK: 也}
