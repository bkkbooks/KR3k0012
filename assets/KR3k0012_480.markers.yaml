  - {type: variant, offset: 4554, length: 0, content: '', SBCK: 范蠡治國政對曰兵甲之事種不如蠡鎮撫國家親百姓蠡不如種於是舉政屬種而使蠡與大夫柘稽行成爲質於呉也又曰蔡昭侯十年朝楚昭王持善裘二獻其一於昭王而自衣其一楚相子常欲之弗與子常䜛蔡侯留之於楚三年蔡侯知之獻其裘子常受之乃言歸蔡侯蔡侯歸而之晉請與晉伐楚夏晉滅沈楚怒攻蔡昭侯使其子爲質於呉謀共伐楚後與呉王闔閭遂破楚入郢又曰張儀􅀃楚王曰大王誠能聽臣臣請使􅁗太子入質於楚􅁗女爲大王箕箒之妾効萬里之都以爲湯沐之邑戰國䇿曰濮陽}
