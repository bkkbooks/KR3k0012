  - {type: variant, offset: 1894, length: 1099, content: 執炙者皃狀不凡有欲炙之色榮割炙啗之坐者問其故榮曰豈有終日執之而不知其味及倫敗榮被執將誅而執炙者為督救免之干寶晉紀曰王濬在巴郡兵民苦役生男多不舉濬乃嚴其殺子之防而厚卹之所育者數千人於此能稱兵矣父母戒之曰王府君生爾必勉之無愛死宋書王鎮惡嘗寄食澠池人李方家善遇之謂方曰若遭遇英雄主要取萬戶侯當厚相報方荅曰君丞相孫人才如此何患不富貴陳書曰陰鏗釋褐梁湘東王法曹參軍天寒鏗嘗預賓友宴飲見行觴者因迴酒炙以授之眾坐皆笑鏗曰吾儕終日酣飲而執爵者不知其味非人情也及侯景之亂鏗嘗為賊所擒或救之獲免鏗問其故乃前所行觴者唐書曰李晟嘗有恩者厚報之初譚元澄為嵐州刺史有恩於晟後坐貶於岳州比晟貴上䟽理之詔贈元澄甯州刺史元澄三子晟撫侍勤至皆為成就官學人皆義之吳越春秋曰吳師入郢引軍擊鄭定公前既殺楚太子建而困子胥故怨鄭兵將入境定公大懼乃令於鄭邦中曰有能還吳軍者吾與之分邦而治漁者子聞而進之曰臣能還之不用兵戈升糧得一橈行歌道中即還矣定公大悅乃與一橈子胥軍將至漁者子當路叩橈行歌辭曰蘆中人蘆中人子胥聞之大驚曰何等人者即請與語曰吾是漁者子吾國君怖懼令於國中有能還吳軍吾與之分國而治臣念先人與君相遭於途今從君乞鄭之罪也子胥曰吾蒙子先人之恩自致於此上天蒼蒼豈敢忘子之功乎於是乃釋鄭不伐又曰伍子胥伐楚還溧陽瀨水之上長嘆曰吾嘗飢於此乞食而殺一婦人將欲報之金不知其家遂投金瀨水之中而去有頃一嫗行哭而來問曰嫗何哭之悲也嫗曰吾有女守吾年三十不嫁往年擊漂於此遇人窮飯之而恐泄事自投於瀨水中而死今聞伍君來不得其家自傷空而無為報者故行哭之悲也人曰子胥欲報嫗以百金不知嫗所在投金水中而去嫗乃取金以歸也劉向說苑曰吳赤布使於智氏假道於衛甯文子具紵絺三百製送之將歸吳智伯命造舟為梁赤布曰吾聞天子濟於水造舟為梁諸侯方舟大夫維舟臣之職也且敬大其必有故使人視之則用兵在後赤布曰衛假吾道而厚贈我我見難不告是與為謀也稱疾而留使人告衛衛人驚戒智伯乃止又曰楚莊王賜群官酒日暮燈燭滅有引妾衣者妾得其冠纓持之趍火來上視絕纓者王曰賜人酒使醉失禮柰何欲顯婦人節而辱士乎乃令曰夜飲不絕纓者不歡群臣百餘人皆絕纓乃大醉盡忻居二十年晉與楚戰有一臣常在前五合五獲甲首卻敵卒勝怪而問之對曰臣當死往醉失禮王隱不誅也終不敢以陰蔽之德而不顯報常願肝膽塗地用頸血湔敵人矣臣乃絕纓者也遂平晉軍楚得以強又曰陽虎得罪於衛北見簡子曰自今以來不復樹人矣簡子曰唯賢者為能報恩不肖者不能夫春樹桃李者夏得休息秋得食焉樹蒺蔾者夏不得休息秋得其剌焉今所樹者蒺蔾也異苑曰景平中東陽大水永康人蔡嘉夫避住南壟夜有大鼠形如浮水而來徑伏嘉夫床角奴愍而不犯每食轉以餘飯與之水勢退嘉夫得反居鼠以前腳棒青紙裏三斤許珠著奴前啾啾狀如欲語從此去來不絕, WYG: ''}
