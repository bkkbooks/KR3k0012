  - {type: variant, offset: 3704, length: 135, content: 符堅時有射師經嵩山望見松上有一雙白鳥似鵠而大至樹下又見一虵長五丈許上樹取鳥鳥欲飛虵張口翕之鳥不去繽紛一飡頃射師彀弩射三矢虵落鳥得去樹百餘步山邊整理毛羽須臾雲雷發射師懾不得旋踵見向鳥徘徊其上毛落紛紛似如相援如此數陣雲息電滅射師得免鳥亦高飛三輔決錄曰高陵龐智伯名勃為郡小吏東, WYG: 祖逖說中宗以掃}
