  - {type: variant, offset: 3122, length: 974, content: 人釣魚於原綸絕而去夢於漢武求去其鉤明日戲於池見大白魚銜索帝曰豈非昨所夢取而去之間三日帝復遊池濱得明珠一雙武帝曰豈非昔魚之報桓沖之述異記曰陳留周氏婢名興進入山取樵夢見一女語之曰近在汝頭前目中有剌煩為拔之當有厚報婢見一朽棺頭穿壞髑髏墮地草生目中便為拔草內著棺中以甓塞穿即於髑髏處得一雙金指環吳均續齊諧記曰弘農楊寶見一黃雀為鴟梟所搏取之以歸置巾箱中養之百餘日毛羽成朝去暮還後寶夕讀書未臥有黃衣童子向寶再拜曰我王母使臣昔使蓬萊不慎為鴟梟所搏蒙君仁愛救拯今當受使南海不得奉侍以白環四枚與寶令君子孫潔白且位登三事當如此環矣東陽元凝齊諧記曰富陽董昭之嘗乘舡過錢塘江中央見有一蟻著一短蘆甚迫遽昭之曰此畏死也便以繩繫此蘆著舡頭蟻緣繩出中夜夢一人烏衣從百許人來謝云僕不慎墮江慚君濟活僕是蟻中王君若急難之日當見告後昭遇事繫獄蟻穴獄昭遂得脫盛弘之荊州記曰隨侯曾得大虵不殺而遣之虵後銜明月珠以報隨侯一名隨侯珠孔靈符會稽記曰射的山南有白鶴山此鶴為仙人取箭漢太尉鄭弘嘗採薪得一遺箭頃有人覔弘還之問何所欲弘曰常患若耶溪載薪為難願旦南風夕北風後果然劉義慶幽明錄曰項縣人姚牛年十餘歲父為鄉人所殺牛手刃之於眾中吏捕得官長深矜孝節為推遷其事會赦得免令後出獵逐鹿入草中有古深穽數處馬將趣之忽見一公舉杖擊馬馬驚僻不得及鹿令怒引弓將射之公曰此中有穽恐君墮耳令曰汝為何人翁跪曰姚牛父也感君活牛故來謝恩遂滅不見又曰符堅時有射師經嵩山望見松上有一雙白鳥似鵠而大至樹下又見一虵長五丈許上樹取鳥鳥欲飛虵張口翕之鳥不去繽紛一飡頃射師彀弩射三矢虵落鳥得去樹百餘步山邊整理毛羽須臾雲雷發射師懾不得旋踵見向鳥徘徊其上毛落紛紛似如相援如此數陣雲息電滅射師得免鳥亦高飛三輔決錄曰高陵龐智伯名勃為郡小吏東平衡農字剽卿為書生窮乏客鍜於勃家勃知其賢禮待顧待眷常去送十里過舅家復貸錢贈之農受曰為馮翊乃相報別七八年果為馮翊勃為門下書佐忘之矣農召問乃寤舉孝廉為尚書郎左右丞魏郡太守河內太守又曰趙歧避難於四方江海岱霍無所不到自匿姓名布衣巾絮賣餅北海市安丘孫嵩年二十餘遊市見趙歸微察知非常人駐車呼與共載曰我北海孫賓碩終不相負歧聞嵩即以實告遂與俱歸嵩先入白母曰今日出得死友在外歧即匿嵩家積年乃出後說劉表時北海孫嵩流離在劉表末座不為表所識歧遙識之表說嵩表甚重之同共表嵩為青州刺史干寶搜神記曰噲參寓居河內虔恭父母忽有單鶴趣之參撫視箭創甚重, SBCK: ''}
