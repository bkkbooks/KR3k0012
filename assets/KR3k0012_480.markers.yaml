  - {type: variant, offset: 1388, length: 4, content: 太祖平幽, SBCK: 臧洪字子原廣陵射陽人也張邈起兵請洪與計事又致之於劉兖}
  - {type: variant, offset: 1388, length: 81, content: 太祖平幽州召孫禮為司空軍謀掾初荒亂時禮與母相失同郡馬臺求得禮母禮推家財盡以與台又曰楊沛字孔梁為新鄭長謂民益蓄桑椹勞豆積浸得千餘斛後為鄴令賜其生口十人絹百疋又曰曹真, WYG: 臧洪}
