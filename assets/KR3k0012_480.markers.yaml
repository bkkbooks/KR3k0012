  - {type: variant, offset: 45, length: 0, content: '', SBCK: 許孟任以爲夫人割臂以盟又曰子犯以壁授公子曰臣􅀒羈紲從君廵於天下臣之罪多矣請由此亡公子曰所不與舅氏同心者有如白水子犯重耳舅氏言與舅氏同心之􅉀如此白水也投其璧於河又曰王子虎盟諸侯于王庭要言曰皆奬王室無相害也有渝此盟明神殛之俾墜其師無克祚國又曰寗武子與衛人盟于宛濮曰天禍衛國君臣不恊以及此憂今天誘其􅂨使皆降心以相從也不有居者誰守社稷不有行者誰扞牧圉有渝此盟以相及者明神先君是糾是殛國人聞此盟也而後不貳又曰楚師}
