  - {type: variant, offset: 1393, length: 14, content: 召孫禮為司空軍謀掾初荒亂時禮, SBCK: 公山孔豫州公緒乃設壇場方共盟誓諸州郡相讓乃共推洪洪乃升壇操盤血而盟晉中興書曰符洪第三子徤隂圖關中陽使其徒種麥示無西意有微知其計不肯耕種者徤殺之後十餘日師衆西行到孟津作浮橋渡河使弟雄歩􅀐五千人入潼關兄子青軹關入河東誓曰􅀂事不捷汝死河北我死河南爲􅀑無相見也王義之爲㑹稽内史􅁣然稱疾去郡於父母墓前自誓曰維永和十一年二月九日小子羲之敢昭告尊靈義之不天夙遭閔凶不遂過庭之訓母兄鞠育得漸庻幾遂因人之力蒙國寵榮進無忠孝之節退違聖賢量力之義將憂及宗祀豈在微身是用寤寐永嘆􅀂墜淵谷羲之旣去官}
