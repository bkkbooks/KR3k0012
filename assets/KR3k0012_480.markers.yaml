  - {type: variant, offset: 2996, length: 3, content: 始興楊, WYG: 王羲之為㑹稽内史稱疾去郡於父母墓前自誓曰維永和十一年三月九日小子羲之敢昭告尊靈羲之不天夙遭閔㓙不遂過庭之訓母兄鞠育得漸庶幾遂因人乏蒙國寵榮進無忠孝之莭退違推賢之義將憂及宗祀豈在微身是用寤寐永嘆若墜淵谷止足之分定之自今羲之既去官與東土人士盡}
