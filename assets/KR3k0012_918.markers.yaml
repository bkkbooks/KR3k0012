  - {type: variant, offset: 2637, length: 12, content: 不敢以聞又曰梁臨賀王正德, SBCK: 赦建金雞}
  - {type: variant, offset: 2637, length: 0, content: '', WYG: 哉幽明録曰晉兖州刺史沛國宋處宗嘗買得一長鳴雞愛養甚至栖籠著牕間雞遂作人語與宗談論極有𤣥致終日}
  - {type: variant, offset: 2637, length: 12, content: 不敢以聞又曰梁臨賀王正德, krp: 赦建金雞}
  - {type: variant, offset: 2638, length: 1, content: 敢, WYG: 輟處宗因此功業大進越絶書曰雞山勾踐}
  - {type: variant, offset: 2640, length: 1, content: 聞, WYG: 畜雞将伐呉以食死士也呉越春秋曰婁門外雞陂墟者呉王牧雞處西河記曰涼州罪人於市将刑忽有白雄雞飛於人邉請命引頸長鳴伏地向吏驅之去輒來刺史張義免其坐王子年拾遺記曰太初二年月氏貢䨇頭雞四足一尾鳴則俱鳴}
