  - {type: variant, offset: 1604, length: 0, content: '', SBCK: 宣下曰楚子爲乗廣三十乗分爲左右廣雞鳴而駕日中而􅀃又成下曰晉與楚旦而戰見星未已子反命軍吏察夷傷􅀘卒乗繕甲兵展車馬雞鳴而食唯命是聽又襄二荀偃令曰雞鳴而駕塞井夷竈唯余馬首是瞻又襄三齊莊公朝指殖綽郭最曰是寡人之雄也州綽曰君以爲雄誰敢不雄然臣不敏平隂之役先二子鳴晉伐齊及平隂州綽獲殖綽折郭最故自比於難闘勝而先鳴又襄五曰公膳日􅀟雞又}
  - {type: page-break, offset: 1604, content: '', id: KR3k0012_SBCK_918-1b}
  - {type: variant, offset: 1604, length: 0, content: '', WYG: 宣五曰楚子為乗廣三十乗分為左右廣雞鳴而駕月中而說又成五晉與楚旦而戰見星未巳子反命軍吏察夷傷補卒乗繕甲兵展車馬雞鳴而食唯命是聽又襄二荀偃令曰雞鳴而駕塞井夷竈唯余馬首是瞻又襄三齊莊公朝指殖綽郭最曰是寡人之雄也州綽曰君以為雄誰敢不雄然臣不敏平隂之役先二子鳴晉伐齊及平隂州綽獲殖綽郭最故自比於雞鬬勝先鳴又襄五曰公膳日雙雞又}
  - {type: page-break, offset: 1604, content: '', id: KR3k0012_WYG_918-2a, image: WYG0901/WYG0901-0172a.png}
  - {type: variant, offset: 1604, length: 0, content: '', krp: 宣下曰楚子爲乗廣三十乗分爲左右廣雞鳴而駕日中而說又成下曰晉與楚旦而戰見星未已子反命軍吏察夷傷𥙷卒乗繕甲兵展車馬雞鳴而食唯命是聽又襄二荀偃令曰雞鳴而駕塞井夷竈唯余馬首是瞻又襄三齊莊公朝指殖綽郭最曰是寡人之雄也州綽曰君以爲雄誰敢不雄然臣不敏平隂之役先二子鳴晉伐齊及平隂州綽獲殖綽折郭最故自比於難闘勝而先鳴又襄五曰公膳日雙雞又}
