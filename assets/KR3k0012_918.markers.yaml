  - {type: variant, offset: 1607, length: 1, content: 郯, SBCK: 賔孟適郊見雄雞自斷其尾問之侍者曰自憚其犧也又昭六曰季郈之雞闘季平子郈昭伯二家相近故闘雞季氏芥其雞以芥子播其羽郈氏爲之金距平子怒毛詩曰女曰雞鳴刺不􅀃德也陳古義以刺今不􅀃德而好色也女曰雞鳴士曰昧旦子興視夜明星有爛又曰君子于役不知其期􅂚其至哉雞捿于塒日之夕矣又緇衣曰風􅀨思君子也亂丗則思君子不改其度風􅀨凄凄雞鳴喈喈旣見君}
  - {type: variant, offset: 1607, length: 1, content: 郯, WYG: 賔孟適郊見雄雞自斷其尾問之侍者曰自憚其犧也又昭六曰季郈之雞闘季平子郈昭伯二家相近故鬪雞季氏芥其雞以芥子播其羽郈氏為之金距平子怒毛詩曰女曰雞鳴刺不說徳也陳古義以刺今不說徳而好色也女曰雞鳴士曰昧旦子興視夜明星有爛又曰君子于役不知其期曷至哉雞栖于塒日之夕矣牛羊下來君子于役如之何勿思又緇衣曰風雨思君子也亂世則思君子不改其度風雨淒淒雞鳴喈喈既見君}
