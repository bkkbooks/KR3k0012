  - {type: punctuation, offset: 2981, content: 「, id: KR3k0012_CHANT_918-bkkpn1094}
  - {type: variant, offset: 2981, length: 394, content: 秦穆公時陳倉人掘地得物若羊非羊若豬非豬牽以獻諸公道逢二童子童子曰此名為媼常在地食死人腦若欲殺之以柏捶其首媼復曰彼二童名為陳寶得雄者王得雌者霸陳倉人捨媼逐二童子童化為雉飛入乎林陳倉人告穆公穆公發徒大獵果得其雉又化為石置之汧渭之間至文公為立祠名陳寶今南陽雉縣其地也秦欲表其符故以名縣每陳寶祠時有赤光長十餘丈從雉縣來入陳祠中有聲如雄雉揚雄琴清英曰雉朝飛操者衛女傅母所作也衛侯女嫁於齊太子中道太子死問傅母曰何如傅母曰且往當喪喪畢不肯歸終之以死傅母悔之取女所自操琴於冢上鼓之忽有二雉俱出墓中傳母撫雌雉曰女果為雉耶言未卒俱飛而起忽然不見傳母悲痛援琴作操故曰雉朝飛琴操曰齊獨沐子年七十無妻出見飛雉雌雄相隨感之撫琴而歌曰雉朝飛鳴相和雌雄群遊於山阿蕭廣濟孝子傳曰蕭芝忠孝除尚書郎有雉數十頭飲啄宿止當上直送至歧路下直及門飛鳴車側璅語曰有鳥從飛西方來白質五色皆備集平公之庭相見如讓公召叔嚮問之叔嚮曰吾聞師曠曰西, SBCK: 東}
