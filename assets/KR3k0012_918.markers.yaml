  - {type: variant, offset: 2760, length: 1, content: 華, WYG: 兒令生蚘蟲又令消髓萬洪方曰五月七日深井深冢多有毒氣不可入也宜先以雞毛試投其中直下無毒毛迴四邉不可入也師曠曰古長吏乗車出入行步道上有雞飛集車上者雄遷雌去雜五行書曰欲求婦取雄雞兩毛燒煮酒中飲}
