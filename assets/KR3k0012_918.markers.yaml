  - {type: variant, offset: 1607, length: 1, content: 郯, krp: 賔孟適郊見雄雞自斷其尾問之侍者曰自憚其犧也又昭六曰季郈之雞闘季平子郈昭伯二家相近故闘雞季氏芥其雞以芥子播其羽郈氏爲之金距平子怒毛詩曰女曰雞鳴刺不說德也陳古義以刺今不說德而好色也女曰雞鳴士曰昧旦子興視夜明星有爛又曰君子于役不知其期曷其至哉雞捿于塒日之夕矣又緇衣曰風雨思君子也亂丗則思君子不改其度風雨凄凄雞鳴喈喈旣見君}
