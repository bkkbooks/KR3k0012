  - {type: variant, offset: 3469, length: 4, content: 尾扇宣驗, SBCK: 澗埋鍾於其内繡神靈變爲雞鍾魂魄化爲雉清鳴哀響來往不絶故詩曰雞山別飛響雉澗和清音荀恱申鑒曰覩孺子之駈雞而見御民之術孺子之駈雞急則驚緩則滯馴而安之然入門􅄞康宅無􅁻凶論曰天同栖之雞一攔之羊賔至而有死者豈異之哉幽明録曰晉兖州刺史沛國宋處宗甞買得一長鳴雞愛養甚至栖籠着䆫間雞遂作人語與宗談語極有言致終日不輟處宗因此言功大進越絶書曰雞山勾踐以畜雞將伐吴以食死士也吴越春秋曰婁門外雞陂墟者吴王牧雞處西河}
