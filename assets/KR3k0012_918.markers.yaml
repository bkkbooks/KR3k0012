  - {type: variant, offset: 3594, length: 164, content: 德則古之越裳也蓋白雉之所出周成王所以為瑞者貴其所自來之遠明其德化所被廣非謂此為奇楚辭曰昭后成遊南土爰底瑗於也底至也言昭王背成王之制而出遊南至楚楚人沉之南遂不返之厥利惟何逢彼白雉厥其也逢迎也言昭王南遊何利於楚乎也為越裳氏獻白雉昭王德不能致親往迎也漢書曰平帝元始元年春越裳重譯獻白雉一黑雉二詔使三公以薦宗廟魏略曰文帝欲受禪郡國奏白雉, WYG: 百}
