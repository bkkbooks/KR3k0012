  - {type: variant, offset: 2770, length: 2, content: 禦火, WYG: 作虎魄法取茯苓雞腵卵黄白渾雜者熟煮之及尚軟隨意刻作物形以沽酒漬數宿既堅内着粉中假者乃亂真此世所恒用作無不成也干寳搜神記曰安陽城南亭宿者輒死書生明術數入亭宿端坐誦書夜半有皂衣人及赤幘者呼亭主此有宿客耶應曰然喑嗟而去須臾有黄衣問如前生問曰向黒衣者誰荅曰北舍母猪赤幘者誰荅曰西舍老雄雞也汝是誰荅曰我是蝎也明旦掘之得蝎大如琵琶毒長四尺并殺猪雞亭遂安静幽欣期交州記曰長鳴雞出日南白澤圖曰老雞能呼人姓名殺之則止南州異物志曰狼育之雞特禀異聲狼育地名又曰雞有四距重翼者龍也殺之震死夢書曰雞為武吏有冠距也夢見雄雞憂武吏也衆雞入門吏捕也羣鬭舍中驚兵怖也論墓書曰養白雞令識}
