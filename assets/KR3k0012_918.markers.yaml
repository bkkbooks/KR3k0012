  - {type: variant, offset: 3759, length: 798, content: 九見魏志文紀曰延康元年四月饒安縣言白雉見北史曰後魏南安王禎孝文時為雍州刺史性忠謹其母疾篤憂毀異常遂有白雉遊其庭前帝聞其致感賜帛千疋以褒美之三國典略曰渤海王高歡攻鄴時瑞物無歲不有令史焚連里木煮白雉而食之射雉左傳曰賈大夫賈大夫大夫也娶妻而美三年不言不笑御以如皋為妻御也之皋澤也射雉而獲之其妻始笑而言魏書曰太祖才力絕人於南皮一日射雉獲六十三頭江表傳曰孫權數射雉潘濬諫權權白時時暫出耳不復如往日濬曰天下未定萬機務多射雉非急弦絕括破皆能為害濬乃手自徹壞雉翳權由是遂絕不復射雉吳志曰孫休銳意於典籍欲畢覽百家之言大好射雉春夏之間常晨出夜還唯此時捨書宋書曰孝武帝常出射雉值雨侍中沈懷文諫曰非止千乘失容亦乃聖躬櫛沐沈約宋書曰明帝與晉平王休祐於岩山射雉有一雉不肯入場日暮將反留休祐射之語云不得雉勿歸因遣壽寂之等諸壯士追之日已欲闇與休祐相及遂拉殺之又曰到撝與蕭道成同從宋明帝射雉郊野渴倦撝得早青瓜與上對割食之齊書曰武帝好射雉竟陵王子良啟諫先是左衛殿中將軍邯鄲超諫射雉武帝為止久之永明末上將射雉子良復諫又曰蕭景先轉中領軍車駕躬射雉郊外景先常申仗從廉察左右又曰蕭敏為新安太守好射雉未嘗在郡辭說者遷於畋焉後張弩損腰而卒又曰桓僖伯少負氣豪俠妙解射雉尤為武帝所重又曰張欣泰為河東內史召還都屏居家巷置宅南岡下面接鬆山欣泰負弩射雉姿情閑放又曰袁彖為侍中形皃充肥異眾每從射雉郊野數人持扶乃能從步又曰褚炫從宋明帝射雉帝至日中無所得甚羞召問侍臣吾旦來如皋遂從空行可笑座者莫答炫獨曰今節候雖適而雲霧尚疑故斯翬之禽驕心未驚但得神駕猶豫群情便可載懽帝意解乃於雉場置酒南史曰齊東昏侯在位置射雉場二百九十六處翳中惟帳及步障皆祫以緣紅錦金銀鏤弩牙瑇瑁帖箭每出輒以鷹犬隊主徐令孫媒翳隊主俞靈韻齊馬而走左右爭逐之又曰武帝親拜陵蔡興宗負璽陪乘及還上欲因以射雉興宗正色曰今致虔園陵情敬兼重從禽猶有餘日請待他辰陳書曰新安王伯固性好射雉叔陵好發冢出遊田野必與偕行, WYG: 八}
