  - {type: 'tls:seg', offset: 2627, content: '', id: KR3k0012_CHANT_918-42a.6}
  - {type: variant, offset: 2629, length: 2, content: 集于, WYG: 澗埋鍾於其内繡神靈變為雞鍾魂魄化為雉清鳴哀響來往不絶故詩曰雞山别飛響雉澗和清音荀恱申鍳曰覩孺子之驅雞而見}
  - {type: variant, offset: 2632, length: 1, content: 床, WYG: 民之術孺子之驅雞急則驚緩則滯馴而安之然後入門嵇康宅無凶吉論曰夫同棲之雞一欄之羊賔至而}
