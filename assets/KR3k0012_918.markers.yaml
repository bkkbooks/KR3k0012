  - {type: variant, offset: 3544, length: 0, content: '', SBCK: 烏雄雞主􅀘中其血治踒折骨凡雞肉不食小兒令生蚘蟲又令消髓葛洪方曰五月七日深井深冢多有毒氣不可入也冝先以雞毛試投井中直下無毒毛廽四邊不可入也師曠占曰長吏乗車出入行歩道上有雞飛集車上者雄遷雌去雜五行書曰欲求婦取雄雞兩毛燒著酒中飲之所求必得用戊子日此是天地合日必得三往不得女當死龍魚河圖曰􅀇雞白頭食病人雞有六指亦殺人雞有五色殺人焦贑易林旅之爻曰十雉百鶵常與母俱抱雞捕虎誰者爲怙又歸妹之無妄曰雞方啄粟爲狐所逐走不得息惶懼喘息又歸妹之損曰争雞失羊亡其金囊利得不長又巽之遯曰三雞啄粟十鶵從養飢鵝卒擊亡其兩寂廣志曰雞有胡溝五指金骹及翹之種大者蜀小者荆白雞金體者美舊并州所獻吴中送長鳴雞長倍於常雞永昌郡無雞異物記曰伺潮雞潮水上則鳴􅀶物志神農本草經曰雞􅆑可以作虎魄法取茯苓雞㱭􅆑黄白渾雜者熟煑之及尚軟隨意刻作物形以苦酒漬數􅀫旣堅内着粉中假者乃亂真此丗所􅁪用作無不成也于寳搜神記曰安陽城南有亭􅀫者輒死書生明術數入亭􅀫端坐誦書夜半有人着皁衣來户外呼亭主此有􅀫客耶應曰然喑嗟而去湏􅁷有赤衣問如前生問曰向黑衣者誰荅曰北舎母猪赤幘者誰荅曰西舎老雄雞也汝是誰荅曰我是老蝎也明旦掘之得蝎大如琵琶身長四尺并及猪雞亭遂安静劉欣期交州記曰長鳴雞岀日南南州異物志曰狼盲之雞特禀異聲狼盲地名白澤圖曰老雞能呼人姓名殺之則止又曰雞有四距重翼者龍也殺之震死夢書曰雞爲武吏有冠距也夢見雄雞憂武吏也衆雞入門吏所捕也群闘舎中驚兵怖也論墓書曰養白雞令識其主聲形以五月五日九月九日任意用五色綵長五寸係雞頸將雞於名山放雞著山仰頭呪曰必存鳴晨雞心開悟沈懷逺南越志曰雞冠四開如蓮花鳴聲清徹也荆楚歳時記曰正月一日三元之日雞鳴而起先於庭中爆竹帖􅀞雞或斵鏤五彩及雞於户上風土記曰乃有雞子五薫練形正旦皆㑹生吞雞子一个謂之練形又晨噉五辛以助五藏氣吴録曰合浦朱虚縣有山雞黒色樹栖魏志曰平原太守劉邠印囊及山雞毛着器中使管輅筮輅曰内方外圎五色成文含寳寸信出則有章此即囊也髙岳巖巖有鳥朱身羽翼􅀇黄鳴不失晨此山雞毛也異苑曰山雞愛其毛羽映水則儛魏武時南方獻之帝欲其鳴舞而無由公子蒼舒令人取大鏡著其前雞鑑形而儛不知止遂至死韋仲將爲之賦甚美􅀶物志曰山雞有美毛自愛其毛終日映水目眩則溺臨海異物志曰山雞狀如人家雞安陽諸山中多此雞恃距好􅃲當時以家雞置其處取即可得南越志曰曽城縣多鵔䴊鵔䴊山雞也利距善闘丗以家雞闘之可禽也光色鮮明五采􅋑燿辛氏三秦記曰陳倉山在太白之西去長安八百里上有石雞與山雞各別趙髙使燒山山雞飛去石雞不去晨鳴山頭聲聞三十里或云是玉雞陳倉城上有神雞人取不得雄者王雌者覇穆公得雌故覇山海經曰鷩雉一名山雞養之穰火左思吴都賦曰山雞歸飛而來栖顧愷湘中賦曰陽鸞山雞陸機與弟書曰天淵池養山雞甚可嬉}
