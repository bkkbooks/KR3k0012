  - {type: variant, offset: 2764, length: 4, content: 鳥多赤鷩, WYG: 金囊利得不長又巽之遯曰三雞啄粟十雛從食飢鳶卒擊忘其兩叔廣志曰雞有胡髯五指金骹反翅之種大者蜀小者荆白雞金骹者善奮并州所獻呉中送長鳴雞長倍於常雞永昌郡無雞異物記曰伺潮雞潮水上則鳴博物志神農本草經曰雞卵}
