  - {type: variant, offset: 158, length: 1347, content: 禮玉三帛二牲一死贄孔傳曰大夫執鴈爾雅曰鳧鴈醜其足蹼郭璞曰腳指間有幕蹼屬相著春秋說題辭曰鴈之言鴈鴈起聖以招期知晚蚤故鴈南北以陽動也鴈鴈音聲皃也聖王聞鴈鴈有音聲知為時節鴈鳥隨日南以常動春秋繁露曰凡贄大夫用鴈有類長者在民上必有先後鴈有行列故以為贄廣雅曰𪀉鵝會𪀉鴈也周書曰白露之日鴻鴈來鴻鴈不來遠人背畔小寒之日鴈北鄉鴈不北鄉民不懷至史記曰蘇武在匈奴中昭帝遣使通和常惠夜見漢使使謂單于曰天子射上林中得鴈足有係帛書言武等在某澤中使者如其言單于大驚乃使武還漢書曰梁孝主於睢陽園中作鳧鴈池又曰武帝太始三年幸東海獲赤鴈作朱鴈之歌後漢書曰度遼將軍皇甫規解官歸安定鄉人有以貨買鴈門太守者亦去職還家書剌謁臥不迎既入而問卿前在郡食鴈美乎北史曰齊斛律光從文襄出野見雙鴈飛來文襄使明月馳射之以二矢俱落焉又曰尉遟逈之亂也隋將史萬歲從梁士彥擊之軍次馮翊見群鴈飛來萬歲謂士彥曰請射行中第三者射之應弦而落三軍莫不悅服三國典略曰徐思王壽陽人家本寒微以捕鴈為業晉史曰朱漢賓少時善射嘗因與同輩出獵指一飛鴈隨矢而落其鏃正中其臆臆上貫一金錢有篆文示其郡之碩學皆無識者人甚異之由是人皆號之朱落鴈莊子曰莊子行於山中見大木伐木者止其傍而不取問其故曰無所用莊子曰此木以不材得終其天年出於山及邑舍故人家故人喜具酒肉令豎子殺鴈烹之豎子請曰其一鴈能鳴其一不能鳴奚殺主人公曰殺不能鳴者明日弟子問曰昨日山中之木以不材得終其天年主人之鴈以不材而死先生何處焉莊子嘆曰周將處夫材與不材之間淮南子曰夫鴈從風飛以愛氣力衘蘆而翔以備弋𥐊山海經曰鴈門山鴈出其間在高柳北家語曰孔子之衛衛公與孔子語見飛鴈過而仰視之色不在孔子孔子乃逝賈誼書曰鄒穆公令食邊鴈必以秕無敢以粟說苑曰秦穆公得百里奚公孫友歸取鴈以賀曰吾得社稷之臣敢賀社稷之福公不辭再拜而受又曰齊晏子對景公曰君之鳧鴈食以菽粟又曰大夫以鴈為贄鴈者有長幼之禮士以雉雉者取其不可狎服庶人以鶩鶩以其無他心也白虎通曰贄用鴈者取隨時南北不失其節明不奪女子之時揚雄方言曰自關而東謂鴈鵝南楚之外謂之鵝或謂之倉𪀉博物志曰鴈食粟則翼重不能飛會稽典錄曰虞固字季鴻少有孝行為日南太守常有雙鴈止宿廳事上每出行縣輒飛逐車卒官鴈遂哀鳴還至餘姚住墓前歷二年乃去梁州記曰梁州縣界有鴈塞山傳云此山有大池水鴈棲集之固因名曰鴈塞盛弘之荊州記曰鴈塞北接梁州汶陽郡其間東西嶺屬天無際雲飛風翥望崖迴翼鴈達塞矯翼裁度故名鴈塞同於鴈門也鄧德明南康記曰平固縣有覆笥山上有湖周廻十里有一石鴈浮出湖中每至秋天石鴈飛鳴如候時也十三州記曰上虞縣有鴈為民田春衘拔草根秋喙除其穢是以縣官禁民不得妄害此鳥犯則有刑無赦荊州圖記曰沮陽縣西北有鴈浮山是山經所謂景山也高三十餘里周廻三百里脩巖遐亙擢幹干霄鴈南翔北歸偏經其上士人由茲改山名焉五色鴈漢書郊祀志宣帝於西河築世宗廟告祀有五色鴈集殿前唐書曰貞元十年同州獻五色鴈白鴈左傳哀上曹伯陽即位好田弋曹鄙人公孫疆好弋獲白鴈獻之且言田弋之說因訪政事大說之有寵使為司城以聽政新語曰梁君出獵見白鴈而欲自射之道上有驚鴈飛者梁王怒命以射此人其御公孫龍諫曰昔衛文公時大旱三年卜云必須人祀文公曰求雨者為民也今殺之不仁吾自當之言未卒雨下今君重鴈殺人何異虎狼梁君引龍登車入郭呼萬歲曰善哉今日獵得善言晉書載記建元初石季龍饗群臣于太武殿前有白鴈百餘集于馬道南季龍命射之無所獲雉, SBCK: 雞}
