  - {type: variant, offset: 2611, length: 7, content: 高緯如晉陽穆后, SBCK: 長廣王湛即皇帝位於南宮大赦改元其日}
  - {type: variant, offset: 2611, length: 2, content: 高緯, WYG: 長廣王湛即皇帝位於南宫大赦改元其日將赦庫令於殿門外建金雞宋孝王不識其義問於光禄大夫司馬膺之赦建金雞其義何也膺之曰案海中日占曰天雞星動當有赦由是帝王以雞為候唐書曰劉武周父匡徙家馬邑匡嘗與其妻趙氏夜坐庭中忽見一物狀}
  - {type: page-break, offset: 2611, content: '', id: KR3k0012_WYG_918-8b, image: WYG0901/WYG0901-0175b.png}
  - {type: variant, offset: 2611, length: 7, content: 高緯如晉陽穆后, krp: 長廣王湛即皇帝位於南宮大赦改元其日}
  - {type: variant, offset: 2614, length: 1, content: 晉, WYG: 雄雞流光燭地飛入趙懷振衣無所見因而娠遂生武周為人驍勇善騎射莊子曰荘子謂惠子曰羊溝之雞司馬彪注曰羊溝鬭雞處三歳為株株魁師也相者視之則非良雞也然而數以勝人者以狸膏塗其頭也雞畏狸故又曰越雞不能伏鵠卵魯雞固能矣司馬彪曰越雞小雞也魯雞大雞也今蜀雞也列子曰紀渻子為周宣王養鬭雞十日而問雞可鬭乎曰未也方虚矯而恃氣十日又問之曰未也猶疾視而盛氣十日又問之曰㡬矣雞雖有鳴者色無變望之似木雞矣其徳全矣異雞無敢應者燕丹子曰燕太子丹質於秦逃歸到闗丹為雞鳴遂得逃歸尸子曰戰如鬭雞勝者先鳴韓子曰使雞司夜令狸執鼠皆因其能淮南子曰雄雞夜啼庫兵動戎馬驚淮南萬畢術曰桃弧之象令雞夜鳴戰國策曰秦惠王謂寒泉子曰蘇秦欺敝邑欲以一人之智反覆山東之君夫諸侯之不可一猶連雞之不能俱止於棲也吕氏春秋曰善學者若齊王之食雞也食其蹠數千而後足又曰白圭謂魏王曰布丘之鼎以烹雞多泊之則淡而不可食布丘魏邑肉汁曰泊少泊之則焦而不熟然而視之蝺焉羮無所可用蝺音齲韓詩外傳曰田饒謂魯哀公曰君不見夫雞乎頭戴冠者文也足搏距者武也敵在前敢鬭者勇也見食相呼者仁也守夜不失時者信也雞雖有五徳君猶日瀹而食之者何也以其所從來近也夫鵠無此五徳君猶貴之以其所從來者逺也神異經曰東方有人長七丈頭戴雞朝吞惡鬼三千暮吞三百名黄父又名食邪以鬼為飯以露為漿也西京雜記曰成帝時交趾越巂獻長鳴雞即下漏驗之晷刻無差長鳴雞一鳴一食時不絶長距善鬬崔豹古今注曰雞一鳴燭夜列仙傳曰祝雞翁者雒}
