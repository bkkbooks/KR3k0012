  - {type: variant, offset: 2616, length: 6, content: 穆后將從辭胡, WYG: 人也居尸鄉北山下養雞皆有名字千餘頭暮栖樹晝放散食欲取呼名即至販雞及子得千萬錢輒置錢去論衡曰傳言淮南王得道畜産皆仙犬吠天上雞鳴雲中陳子要言曰棄晨雞候犬亦猶棄當世之實才須故人之執政也}
