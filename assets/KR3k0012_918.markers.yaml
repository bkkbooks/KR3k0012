  - {type: variant, offset: 2623, length: 2, content: 后于, WYG: 𤣥經曰雌雞鳴晨雄雞宛頸隨其後風俗通曰呼雞朱朱俗曰雞本朱公化而為之今呼朱朱也謹按說文解喌喌二口為讙州其聲也讀若祝祝者誘致禽畜和順之意喌與朱音相似耳又曰臘除夕以雄雞著門上以和隂陽按今人卒病皆殺雄雞傅其心病賊風者作雞散東門雞頭治蠱信善也異苑曰朱文繡與羅子鍾為友俱仕於梁繡既死羅子鍾哭之其夜俱亡梁南七里有雞山𦵏繡於其中}
  - {type: page-break, offset: 2623, content: '', id: KR3k0012_WYG_918-11b, image: WYG0901/WYG0901-0176d.png}
  - {type: variant, offset: 2626, length: 1, content: 宮, WYG: 九里}
