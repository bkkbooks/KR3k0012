  - {type: variant, offset: 3466, length: 1, content: 云, SBCK: 曰雞一名燭夜列仙傳曰祝雞翁者雒陽人也居尸郷北山下養雞皆有名字千餘頭暮栖樹晝放散食欲取呼名即至販雞及子得千萬錢輙置錢去論衡曰傳書言淮南王得道畜皆仙犬吠天上雞鳴雲中陳子要言弃晨雞犬俟鳯警亦猶弃當丗之實才湏故人之執政也太元經曰雌雞鳴晨雄雞宛頸隋侯墮井河伯除川風俗通曰呼雞朱朱俗􅀃雞本朱公化而爲之今呼雞者朱朱也謹桉􅀃文解喌喌二口爲讙州其聲也讀􅀂祝祝者誘致禽畜和順之意喌與朱音相似耳又曰臘除夕以雄雞着門上以和隂陽按今人卒病皆殺雄雞傅其心病風者雞散治之東門雞頭治蠱信善也異苑曰朱文繡與羅子鍾爲友俱仕於梁繡旣死羅鍾􅂘之其夜俱亡梁南七里有雞山葬繡於其中北九里}
