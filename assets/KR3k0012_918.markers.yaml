  - {type: variant, offset: 2428, length: 0, content: '', SBCK: 使人家養五雞又曰王奉先好闘雞宣帝微時數與奉先㑹後即位以其女爲婕妤立爲皇后奉先封侯又曰方士曰益州有金馬碧雞之寳可祭祀致也宣帝使王褒徃祀焉范曄後漢書曰河南樂羊子妻不知何氏女嘗有他舎雞謬入垣内姑盗殺食之妻對不食而泣怪問之妻曰自傷居貧使食他肉姑竟棄之後漢書曰范式字巨卿與汝南張元伯爲友二人春到京以暮秋爲期元伯以九月十五日殺雞炊􅁰以待巨卿母謂元伯曰相去千里汝何信之審也言末畢而巨卿至相隨升堂再拜母極恱九州春秋曰魏王入漢中討劉備不得進欲守復難意欲弃之乃發令云雞肋官属不知主簿楊脩曰夫雞肋弃之則可惜噉之無所得以比之漢中王欲去也白戒嚴王遂還吴録曰魏文帝遣使於吴求長鳴短鳴雞群臣以非禮欲不與孫權勑付使江表傳曰南郡獻長鳴承露雞南越志曰雞冠四間如蓮花鳴清聲澈也魏志曰馬韓國出細尾雞其尾皆五尺餘郭頒魏}
