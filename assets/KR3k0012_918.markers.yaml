  - {type: variant, offset: 4077, length: 357, content: 雉不肯入場日暮將反留休祐射之語云不得雉勿歸因遣壽寂之等諸壯士追之日已欲闇與休祐相及遂拉殺之又曰到撝與蕭道成同從宋明帝射雉郊野渴倦撝得早青瓜與上對割食之齊書曰武帝好射雉竟陵王子良啟諫先是左衛殿中將軍邯鄲超諫射雉武帝為止久之永明末上將射雉子良復諫又曰蕭景先轉中領軍車駕躬射雉郊外景先常申仗從廉察左右又曰蕭敏為新安太守好射雉未嘗在郡辭說者遷於畋焉後張弩損腰而卒又曰桓僖伯少負氣豪俠妙解射雉尤為武帝所重又曰張欣泰為河東內史召還都屏居家巷置宅南岡下面接鬆山欣泰負弩射雉姿情閑放又曰袁彖為侍中形皃充肥異眾每從射雉郊野數人持扶乃能從步又曰褚炫從宋明帝射雉帝至日中無所得甚羞召問侍臣吾旦來如皋遂從空行可笑座者莫答炫獨曰今節候雖適而雲霧尚疑故斯翬之禽驕心未驚但得神駕猶豫群情便可載懽帝意解乃於雉場置酒南史曰齊東昏侯在位置射雉場二百九, SBCK: ''}
