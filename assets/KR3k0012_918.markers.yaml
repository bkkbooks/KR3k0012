  - {type: variant, offset: 3548, length: 0, content: '', SBCK: 蜀人獻文翰者􅀂皇雞鳥有文采者皇雞似鳬兾州謂之澤時爾雅曰翰天雞也郭璞曰翰雞赤羽見周書􅀃文曰翰天雞也一名晨風􅀇中記曰東南有桃都山上有大樹名曰桃都枝相去三千里上有天雞日􅀄出照此木天雞即鳴天下雞皆隨之鳴臨海異物志曰杉雞黃冠青綏常在杉樹下頭上有長黃毛頭及頰正青如垂緌南}
  - {type: page-break, offset: 3548, content: '', id: KR3k0012_SBCK_918-10b}
  - {type: variant, offset: 3548, length: 0, content: '', krp: 蜀人獻文翰者若皇雞鳥有文采者皇雞似鳬兾州謂之澤時爾雅曰翰天雞也郭璞曰翰雞赤羽見周書說文曰翰天雞也一名晨風玄中記曰東南有桃都山上有大樹名曰桃都枝相去三千里上有天雞日𥘉出照此木天雞即鳴天下雞皆隨之鳴臨海異物志曰杉雞黃冠青綏常在杉樹下頭上有長黃毛頭及頰正青如垂緌南}
