  body:
  - {type: variant, offset: 3, length: 154, content: 四鴈禮記曰孟春之月鴻鴈來季秋之月鴻鴈來賓季冬之月鴈北鄉儀禮婚禮曰下達納采用鴈又士相見曰大夫相見以鴈飾以布維之以索如執雉鴈知時飛翔有別也飾之以布謂裁縫之其身也維謂繫聯其足又聘禮曰私覿出如舒鴈威儀自終而有行列舒鴈鵝左傳曰鄭徐吾犯之妺美公孫楚聘之矣公孫黑又使強委禽焉禽鴈也納采用鴈毛詩曰雍雍鳴鴈旭日始旦尚書舜典曰修, SBCK: ''}
