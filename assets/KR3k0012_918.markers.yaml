  - {type: variant, offset: 2435, length: 10, content: 太醫司馬程據上雉頭裘, SBCK: 桓􅀇旣􅀍殺安帝反正其餘擁衆假号皆平桓氏遂滅元興中衡陽有雌鷄化爲雄八十日而冠萎及􅀇建國於楚衡陽属焉自篡至敗凡八旬矣晉中興書曰殷浩北伐江逌爲長史及丁零反叛浩令逌伐之乃取數百雞以長繩連之脚皆繫火}
