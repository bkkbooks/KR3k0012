  - {type: variant, offset: 3585, length: 407, content: 尤多案地域圖今之九德則古之越裳也蓋白雉之所出周成王所以為瑞者貴其所自來之遠明其德化所被廣非謂此為奇楚辭曰昭后成遊南土爰底瑗於也底至也言昭王背成王之制而出遊南至楚楚人沉之南遂不返之厥利惟何逢彼白雉厥其也逢迎也言昭王南遊何利於楚乎也為越裳氏獻白雉昭王德不能致親往迎也漢書曰平帝元始元年春越裳重譯獻白雉一黑雉二詔使三公以薦宗廟魏略曰文帝欲受禪郡國奏白雉十九見魏志文紀曰延康元年四月饒安縣言白雉見北史曰後魏南安王禎孝文時為雍州刺史性忠謹其母疾篤憂毀異常遂有白雉遊其庭前帝聞其致感賜帛千疋以褒美之三國典略曰渤海王高歡攻鄴時瑞物無歲不有令史焚連里木煮白雉而食之射雉左傳曰賈大夫賈大夫大夫也娶妻而美三年不言不笑御以如皋為妻御也之皋澤也射雉而獲之其妻始笑而言魏書曰太祖才力絕人於南皮一日射雉獲六十三頭江表傳曰孫權數射雉潘濬諫權權白時時暫出耳不復如往日濬曰天下未定萬機務多射雉非急弦絕括破皆能為害濬乃手自徹壞雉翳權由是遂絕不復射雉吳, SBCK: ''}
  - {type: variant, offset: 3585, length: 407, content: 尤多案地域圖今之九德則古之越裳也蓋白雉之所出周成王所以為瑞者貴其所自來之遠明其德化所被廣非謂此為奇楚辭曰昭后成遊南土爰底瑗於也底至也言昭王背成王之制而出遊南至楚楚人沉之南遂不返之厥利惟何逢彼白雉厥其也逢迎也言昭王南遊何利於楚乎也為越裳氏獻白雉昭王德不能致親往迎也漢書曰平帝元始元年春越裳重譯獻白雉一黑雉二詔使三公以薦宗廟魏略曰文帝欲受禪郡國奏白雉十九見魏志文紀曰延康元年四月饒安縣言白雉見北史曰後魏南安王禎孝文時為雍州刺史性忠謹其母疾篤憂毀異常遂有白雉遊其庭前帝聞其致感賜帛千疋以褒美之三國典略曰渤海王高歡攻鄴時瑞物無歲不有令史焚連里木煮白雉而食之射雉左傳曰賈大夫賈大夫大夫也娶妻而美三年不言不笑御以如皋為妻御也之皋澤也射雉而獲之其妻始笑而言魏書曰太祖才力絕人於南皮一日射雉獲六十三頭江表傳曰孫權數射雉潘濬諫權權白時時暫出耳不復如往日濬曰天下未定萬機務多射雉非急弦絕括破皆能為害濬乃手自徹壞雉翳權由是遂絕不復射雉吳, krp: ''}
