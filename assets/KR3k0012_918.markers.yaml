  - {type: variant, offset: 2762, length: 1, content: 山, WYG: 所求必得用戊子日此是天地合日必得三往不得女當死龍魚河圖曰𤣥雞白頭食之病人雞有六指亦殺人雞有五色殺人焦贑易林旅之夬曰十雉百雛常與母俱抱雞捕虎誰者為怙又歸妹之无妄曰雞方啄粟為狐所逐走不得息惶懼喘慄又歸妹之損曰爭雞失羊亡}
