  - {type: variant, offset: 1610, length: 82, content: 丹鳥氏司閉五雉為五工正杜預注曰丹鳥驚雉也立秋來立冬去入水為蜃五雉雉有五種也又曰叔孫豹奔齊齊庾宗婦人獻以雉問其姓曰予子長矣能捧雉而從我矣毛詩邶柏舟曰雄雉剌衛宣公也淫亂, SBCK: 胡}
