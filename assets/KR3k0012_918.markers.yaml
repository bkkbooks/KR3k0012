  - {type: variant, offset: 2773, length: 0, content: '', WYG: 主聲形以五月五日九月九日任意用五色絲長五寸係雞頸將雞於名山放雞著山仰頭呪曰必存鳴晨雞心開悟沈懐逺南越志曰雞冠四開如蓮花鳴聲清徹也荆州歳時記曰正月一日三元之日也雞鳴而起先於庭中爆竹帖畫雞或斲鏤五彩及土雞於户上風土記曰乃有鷄子五薫練形正旦皆㑹生吞雞子一箇謂之練形又晨薦五辛以助五藏氣呉録曰合浦朱虛縣有山雞黒色樹棲魏志曰平原太守劉邠印囊及山雞毛着器中使管輅筮輅曰内方外圓五色成文含寳守信出則有章此印囊也髙岳岩岩有鳥朱身羽翼𤣥黄鳴不失晨此山雞毛也異苑曰山雞愛其毳映水則舞魏武時南方獻之帝欲其鳴舞而無由公子蒼野令人取大鏡著其前雞鑑形而舞不知止遂至死韋仲将為之賦甚美博物志曰雞有美毛自愛其毛終日映水自眩則溺臨海異物志曰山雞状如人家雞安陽諸}
