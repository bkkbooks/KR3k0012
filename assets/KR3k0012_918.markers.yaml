  - {type: variant, offset: 2428, length: 0, content: '', WYG: 使人家養五雞又曰王奉先好鬭雞宣帝㣲時數與奉先㑹後即位以其女為媫好立為皇后奉先封侯又曰方士曰益州有金馬碧雞之神可祭祀致也宣帝使王褒往祀焉范􅁮後漢書曰河南樂羊子妻不知何氏女嘗有他舍雞謬入垣内姑盗殺食之妻對不食而泣怪問之妻曰自傷居貧使食他肉姑竟棄之後漢書曰范式字巨卿與汝南張元伯為友二人春到京以暮秋為期元伯以九月十五日殺雞炊黍以待巨卿母謂元伯曰相去千里汝何信之審也言未畢而巨卿至相隨升堂再拜母極說九州春秋曰魏王入漢中討劉備不得進欲守復難意欲棄之乃發令云雞肋官屬不知主簿楊修曰夫雞肋棄之則可惜噉之無所得以此知漢中王欲去也乃白魏王遂還呉録曰魏文帝遣使於呉求長鳴短鳴雞羣臣以非禮欲不與孫權敇付使江表傳曰南郡獻長鳴承露雞南越志曰雞冠四開如蓮花鳴聲清徹也魏志曰馬韓國出細尾雞其尾皆五尺餘郭頌魏世語曰劉放孫資共典樞要夏侯獻曹肇心不平殿中有雞棲樹二人相謂曰此亦久矣其能復幾指謂中書監劉放中書令孫資王隠}
