  - {type: variant, offset: 1060, length: 1, content: 種, SBCK: 廣陵厲王胥宫園中􅀥樹乃生十餘莖莖正赤葉白如素王㘴祝咀自殺又曰王􅁻少時學問居長安其東家有􅀥樹垂􅁻庭中􅁻婦取􅀥以啖􅁻後知之乃去婦東家聞而欲伐其樹鄰里共止之因固請􅁻令還婦里中爲之語曰東家有樹王陽婦去東家􅀥完去婦復還又曰安邑}
