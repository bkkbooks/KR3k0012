  - {type: variant, offset: 1905, length: 1, content: 宮, SBCK: 中朝時有民王質伐木至石室中見童子四人彈琴而歌質因留􅀝柯聽之童子以一物如􅀥核與質含之便不復飢俄頃童子令其歸質承聲而去斧柯漼然盡爛旣歸質去家巳數十年親舊凋落無復此時矣楊衒之洛陽伽藍記曰景陽山南有百果園果别作一林林名有一堂有仙人􅀥長五寸把之兩頭俱出核細如針霜降乃熟食之甚美俗傳云岀崑崙山一曰西王母􅀥晉宫}
