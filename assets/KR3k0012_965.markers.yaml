  - {type: variant, offset: 1667, length: 0, content: '', krp: 安平好棗地産不爲無珎杜氏新書曰杜畿爲河東太守平虎將軍劉勲爲太祖所親貴震朝廷常從畿求大棗畿拒以他故後勲伏法太祖得其書歎曰杜畿可謂不媚竈也英雄記曰孔文舉爲東萊賊所攻城欲破其治}
  - {type: variant, offset: 1668, length: 5, content: 山好栗地產, SBCK: 左承祖以官􅀥賦與戰士蔡邕奏事曰程末年十四時祖父叔病物故末抱伏叔尸號泣悲哀舅哀其羸劣嚼􅀥肉以哺之末見食歔欷}
  - {type: variant, offset: 1668, length: 1, content: 山, WYG: 平}
  - {type: variant, offset: 1668, length: 0, content: '', krp: 左承祖以官棗賦與戰士蔡邕奏事曰程末年十四時祖父叔病物故末抱伏叔尸號泣悲哀舅哀其羸劣嚼棗肉以哺之末見食歔欷不能呑咽漢武内傳曰七月七日西王母當下爲帝設玉門之棗東方朔傳曰武帝時上林献棗上以所持杖擊未央前殿檻呼朔曰叱叱先生來來先生知此筐中何等物也朔曰上林献棗四十九枚上曰何以知之朔曰呼朔者上也以杖擊檻兩木兩木林也來來者棗也叱叱者四十九枚上大笑賜帛十疋王子年拾遺記曰北極有𡵨峯之隂多棗樹百㝷其枝莖皆空其實長尺核細而柔百歳一實真人關令尹喜内傳曰老子西遊省太真王母共食玉文之棗其實如瓶神仙傳曰吴郡沈羲爲仙人所迎上天云天上見老君老君賜義棗二枚大如雞子又曰李意期於成都角中作一土窟居其中冬夏單衣長髮剪去之但使長五寸許多飲酒食脯及棗栗或百日二百日不岀窟是時無可所食也魯女生别傳曰李少君曰冥海之棗大如瓜鍾}
  - {type: variant, offset: 1669, length: 4, content: 好栗地產, krp: 之李大如瓶臣巳食之遂有竒光劉根别傳曰有道之士}
