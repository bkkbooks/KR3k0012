  - {type: variant, offset: 1949, length: 1, content: 高, SBCK: 􅀥樹旣生女脚亦差又曰沙門笁慧献太元二年夜夢讀詩五首其一篇後曰陌南酸􅀥樹名爲六竒木遣人以伐取載還柱馬屋又曰太元中南郡忻陵縣有􅀥樹一年忽生桃李􅀥三種花子幽明録曰太原王仲徳年少時遭亂避胡賊絶粒三日草中卧忽有人扶其頭呼云可起㗖􅀥王便寤瞥見一小兒長四尺即隱乃有一囊乾􅀥在前噉之小有氣力便起任昉􅄒異記曰魏丗河内冬雨􅀥􅂄舊􅀃周􅁗時河南雨酸􅀥遂生野酸􅀥今酸􅀥縣是也􅀥之甚小者謂之酸􅀥廣五行記曰馮宣上黨人仕爲北平護軍䘮於官時年}
  - {type: variant, offset: 1949, length: 1, content: 高, WYG: 既生女脚亦瘥又曰沙門竺慧猷太元二年夜夣讀詩五首其一篇后曰陌南酸棗樹名為六竒木遣人以伐取載還柱馬屋又曰太元中南郡忻陵縣有棗樹一年忽生桃李棗三種花子幽明録曰太原王仲徳年少時遭亂避其地絶粮三日草中卧忽有人扶其頭呼云可起㗖棗王便寤見一小兒長四尺即隐乃有一嚢乾棗在前噉之小有氣力便起任昉述異記曰魏世河内冬雨棗耆舊説周秦時河南雨酸棗遂生野酸棗今酸棗縣是也棗之甚小者謂之酸棗廣五行記曰馮宣上黨人仕為北平護軍䘮於官時年}
