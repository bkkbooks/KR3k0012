  - {type: variant, offset: 969, length: 554, content: 內則曰栗有撰之左傳曰女贄不過榛栗棗脩以告虔也論語曰哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗曰使民戰栗謂廟主也爾雅曰栵例列二音栭樹似桷樕而卑小子如細栗可食今江東亦呼為栭栗漢書曰種千樹栗其人與千戶侯等謝承後漢書曰豫章宗度拜定陵令縣人杜伯夷清高不仕度與談論致棗栗而已魏略曰太子與鍾繇書曰竊見玉書稱美玉赤擬雞冠黃侔蒸栗魏志曰東夷韓國出大栗如梨宋書曰劉秀之為丹陽尹先是秀之從叔穆之為丹陽與子弟廳事上宴廳事柱有一穿穆之謂子弟及秀之曰汝等試以栗遙擲柱入穿者後必得此郡唯秀之獨入焉其言遂驗又曰王恭幼敏悟年數歲時祖母諸孫姪散栗於床群兒競之泰獨不取問其故對曰不取自當得賜由是中表異之梁書曰沈約嘗侍宴會豫州獻栗俓寸半奇之問眾栗事多少與約各䟽所知約少帝三事約出謂人曰此公護前不讓即羞死帝以其言不遜欲抵其罪徐勉固諫乃止又曰蕭琛嘗預御筵醉伏上以棗投琛琛乃取栗擲上中面御史中丞在席帝動色曰席中有人不得如此豈有說也琛曰陛下投臣以赤心臣敢報之以戰栗莊子曰宋有狙公者好養猴者恐眾狙之不馴於己也先誑之曰與若茅茅栗也朝三而暮四足乎眾狙皆超然而怒范子計然曰栗出三輔莊子曰莊周遊乎調陵之樊樊蕃睹一異鵲感周之顙而集于栗林感觸也又曰古者禽獸多而人民少於是皆巢居以避之晝拾橡栗暮棲木上故命曰有巢氏之民國語曰夫婦贄不過棗栗以告虔也棗取蚤起栗取欲栗虔敬也, krp: ''}
