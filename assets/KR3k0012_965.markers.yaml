  - {type: variant, offset: 1533, length: 0, content: '', krp: 又内則曰棗曰新之又曰棗栗飴宻以甘之春秋繁露曰握棗與錯金以示嬰兒必取棗而不取金故物之於人小者易知史記曰楚莊王之時有所愛馬㗖以棗脯又曰李少君以却老方見上少君言上曰臣曽遊海上見安期生食巨棗大如瓜漢書曰廣陵厲王胥宫園中棗樹乃生十餘莖莖正赤葉白如素王㘴祝咀自殺又曰王吉少時學問居長安其東家有棗樹垂吉庭中吉婦取棗以啖吉後知之乃去婦東家聞而欲伐其樹鄰里共止之因固請吉令還婦里中爲之語曰東家有樹王陽婦去東家棗完去婦復還又曰安邑千樹棗此其人皆與千户侯等東觀漢記曰自馮愔反後鄧禹威稍損又乏食敗走至髙陵軍士飢餓皆食棗葉又曰中黄門孫程謀誅江京後程於盛化門外與馬國等相見詐謂國曰天子與我棗脯與若棗者早成之乃與國等共爲謀立順帝謝承後漢書曰河南陶碩郷曲餉之碩無所受但食棗飲水美談而巳又曰孟節能含棗核不食可至五年應劭漢官儀曰光武封太山上壇見酢梨酸棗上問其故主者曰百官上者所置上曰封禪大禮千歳一㑹衣冠士大夫何故爾也魏志曰杜恕上䟽曰冀州户口最大又有桑棗之饒國家徴求之府丗說曰魏文帝忌弟任城王饒壯因在卞太后側共圍棊並啖棗文帝以毒置諸棗蔕中自選可食者而王弗悟遂雜進之旣中毒太后索水救之帝預勑毀器太后徒跣赴井無器可汲湏臾遂卒又曰王大將軍甞至石崇家如厠見􅃮箱中盛乾棗夲以塞鼻王遂食盡羣婢莫不笑晉書曰賈后將廢太子詐稱上不和呼太子入朝旣至后不見置于別室遣婢陳舞賜以酒棗逼飲醉之晉史曰光禄卿李郁因晝寢夢食巨棗覺而有疾謂其親友曰甞聞棗字重來呼魂之象今子神氣逼抑將不免乎未幾而卒孟子曰曽晳其嗜羊棗而曽子不忍食公孫丑問曰鱠炙與羊棗孰羙曰膾炙哉曰曽子何爲食膾炙孟子曰膾炙同也羊棗獨}
