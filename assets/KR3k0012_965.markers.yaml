  - {type: variant, offset: 1788, length: 2, content: 漢武, SBCK: 李意期於成都角中作一土窟居其中冬夏單衣長髮剪去之但使長五寸許多飲酒食脯及􅀥栗或百日二百日不岀窟是時無可所食也魯女生别傳曰李少君曰􅁳海之􅀥大如􅀲鍾山之李大如瓶臣巳食之遂有竒光劉根别傳曰有道之士不可識徃者有陳孜如癡人江夏􅀽仲陽知事之孜謂仲陽曰今年春當有疾可服􅀥核中仁二十七枚後果大病又曰能常服􅀥核中仁百邪病不復干也仲陽服之有效馮明生別傳曰明生爲縣吏捕賊爲賊所傷殆死道間見女人年可十六七姿容絶丗以肘後管中一丸如小豆與服即愈隨神女還岱宗見安期生曰共與女郎遊於安息西母之際食􅀥異羙此間􅀥小不及憶此􅀥未乆巳二千年矣神女云昔與君共食一枚乃不盡此間小􅀥郍可相比也髙士傳曰胡昭字孔明晉宣}
