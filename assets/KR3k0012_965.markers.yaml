  - {type: variant, offset: 29, length: 1, content: 果, SBCK: 􅀥壷􅀥也郭璞注曰今江東呼􅀥大而銳上者爲壷壷猶􅉚也邊要􅀥細要􅀥也今謂之鹿盧􅀥櫅音齊白􅀥即今􅀥子曰熟樲酸􅀥樹小實酢孟子曰養其樲􅀥遵羊􅀥實小而貟紫黑色今俗呼爲羊矢􅀥孟子曰曽晳嗜羊􅀥洗大􅀥今河東猗氏岀大􅀥子如雞夘泄苦􅀥子味苦也音歳也晳無實􅀥}
  - {type: variant, offset: 29, length: 1, content: 果, WYG: 棗壺棗也壺猶瓠也邊要棗細腰棗也今謂之鹿盧棗擠白棗即今棗子白乃熟樲酸棗樹小實酢孟子曰養其樲棘遵羊棗實小而員紫黒色今俗呼為羊矢棗孟子曰曾晳嗜羊棗洗大棗今河東猗氏出大棗子如鷄卵􅀈泄苦棗子味苦也􅀈音嵗也晢無實棗}
