  - {type: variant, offset: 1794, length: 8, content: 大栗十五枚及一升, SBCK: 舊昭同郡周士等謀帝昭聞而歩險邀士於肴澠之間止士士不肯昭泣以示誠士感其義乃止昭斫􅀥樹共士盟而別昭雖有隂徳於帝口終不言時人莫知風俗通曰鮑焦耕田而食穿井而飲於山中食􅀥或曰此􅀥子所植也遂強吐立枯死}
