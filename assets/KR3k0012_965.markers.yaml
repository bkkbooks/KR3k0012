  - {type: variant, offset: 339, length: 158, content: 在木曰果在草曰蓏郎果切山海經曰不周之山爰有嘉果其實如桃李其葉華赤食之不飢符子曰趙之相者曰林氏有九子皆賢國人美而稱之號曰九德之父十德之門趙王疾之王乃使擇其果之煩者伐之其父曰菓之茂者猶伐之況其人乎吾將以爾為累矣去之則免乃攜老持子逃趙相於白雲之巖終身不返趙人思之郭子曰王丞相儉帳下甘果盈溢涉春敗爛呂氏春秋曰昔古朱襄氏治天下, SBCK: 樲酸􅀥}
