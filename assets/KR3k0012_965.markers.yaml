  - {type: variant, offset: 1674, length: 19, content: 為無珍盧諶祭法曰春秋冬祠皆用栗會稽先賢, SBCK: 能呑咽漢武内}
  - {type: variant, offset: 1674, length: 1, content: 為, krp: 可識徃者有陳孜如癡人江夏袁仲陽知事之孜謂仲陽曰今年春當有疾可服棗核中仁二十七枚後果大病又曰能常服棗核中仁百邪病不復干也仲陽服之有效馮明生別傳曰明生爲縣吏捕賊爲賊所傷殆死道間見女人年可十六七姿容絶丗以肘後管中一丸如小豆與服即愈隨神女還岱宗見安期生曰共與女郎遊於安息西母之際食棗異羙此間棗小不及憶此棗未乆巳二千年矣神女云昔與君共食一枚乃不盡此間小棗郍可相比也髙士傳曰胡昭字孔明晉宣帝爲麻衣時與昭有舊昭同郡周士等謀帝昭聞而歩險邀士於肴澠之間止士士不肯昭泣以示誠士感其義乃止昭斫棗樹共士盟而別昭雖有隂徳於帝口終不言時人莫知風俗通曰鮑焦耕田而食穿井而飲於山中食棗或曰此棗子所植也遂強吐立枯死水經注曰酸棗縣故城南古韓國昔天子建國名都或以山林故豫章以樹氏都酸棗以棘名邦故曰酸棗也水經曰髙唐縣大河右溢丗謂之甘棗溝水側多棗故俗取名焉廣志曰東郡榖城紫棗長二寸西王母棗大如李核三月熟衆果之先熟者也種洛陽宮後園河内伋郡棗一名墟棗一名安邑棗東海蒸棗洛陽夏白棗安平信都大棗單父棗梁園國夫人棗大白棗一名曰慼咨小核多肌三星棗駢白棗灌棗此四者官園所種棗有狗雞心牛頭羊矢彌猴細腰之名又有玄棗大棗﨑廉棗桂棗鄴中記曰石虎園中有西王母棗冬夏有葉九月生花十二月乃熟三子一尺又有羊角棗亦三子一尺東陽記曰信安縣有懸室坂晉中朝時有民王質伐木至石室中見童子四人彈琴而歌質因留倚柯聽之童子以一物如棗核與質含之便不復飢俄頃童子令其歸質承聲而去斧柯漼然盡爛旣歸質去家巳數十年親舊凋落}
  - {type: variant, offset: 1676, length: 1, content: 珍, WYG: 珎杜氏新書曰杜畿為河東太守平虜將軍劉勲為太祖所親貴震朝廷常從畿求大棗畿拒以他故後勲伏法太祖得其書歎曰杜畿可為不媚勢也英雄記曰孔文舉為東萊賊所攻城欲破其治中左丞祖以官棗賦與戰士蔡邕奏事曰程末年十四時祖父叔病故末抱伏叔尸號泣悲哀舅哀其嬴劣嚼棗肉以哺之末見食欷歔不能吞咽漢武内傳曰七月七日西王母當下為帝設玉門之棗東方朔傳曰武帝時上林獻棗上以所持杖擊未央前殿楹呼朔曰叱叱先生來來先生知此筐中何等物也朔曰上林獻棗四十九枚上曰何以知之朔曰呼朔者上也以杖擊檻兩木兩木林也來來者棗也叱叱四十九枚上大笑賜帛十疋王子年拾遺記曰北極有坡峯之陰多棗樹百尋其枝莖皆空其實長尺核細而柔百嵗一實真人闗令尹喜内傳曰老子西遊省太真王母只食玉文之棗其實如瓶神仙傳曰呉郡沈羲為仙人所迎上天云天上見老君老君賜羲棗二枚大如雞子又曰李義期於成都角中作一土窟居其中冬夏单衣長髮剪去之但使長五寸許多飲酒食脯及棗栗或百日二百日不窘是時無所可食也魯女生别傳曰李少君曰宜海之棗大如𤓰鍾山之李大如瓶臣已食之遂有竒光劉根别傳曰有道之士不可識往者有陳孜如癡人江夏袁仲陽知事之孜謂仲陽曰今年春當有疾可服棗核中仁十七枚後果大病又曰能常服棗核中仁百邪病不復干也仲陽服之有效馮明生别傳曰明生為縣吏捕賊為賊所傷殆死道間見女人年可十六七姿容絶世以肘後管中一丸如小豆與服即愈随神女還岱宗見安期生曰前與女郎遊於安息西母之際食棗異美此間棗小不及憶此棗未久已二千年矣神女云昔與君共食一枚乃不盡此間小棗聊可相比也髙士傳曰胡昭字孔明晉宣帝為布衣時與昭有舊昭同郡周士等謀帝昭聞而歩險邀士於肴渑之間止士士不肯昭泣以示誠士感其義乃止昭斫棗樹共士盟而别昭雖有陰徳於帝口終不言時人莫知風俗通曰鮑集耕田而食穿井而飲於山中食棗或曰此棗予所植也遂强吐立枯死水經注曰酸棗縣故城南古韓國昔天子建國名都或以山林故豫章以樹名都酸棗以棘名都故曰酸棗也水經曰髙唐縣大河右溢世謂之甘棗溝水側多棗故俗取名焉廣志曰東都榖城紫棗長二寸西王母棗大如李核三月熟衆果之先熟者也種洛陽宫后園河内汲郡棗一名墟棗一名安邑棗東海蒸棗洛陽夏白棗安平信都大棗单父棗梁園國夫人棗大白棗一名曰慼咨小核多肌三星棗駢白棗灌棗此四者官園所種棗有狗雞心牛頭羊矢彌猴細腰之名又有元棗大棗﨑㢘棗桂棗鄴中記曰石虎園中有西王母棗冬夏有葉九月生花十二月乃熟三子一尺又有羊角棗亦三子一尺東陽記曰信安縣有懸室坂晉中朝時有民王質伐木至石室中見童子四人弹琴而歌質因留倚柯聽之童子以一物如棗核與質含之便不復飢俄頃童子令其歸質承聲而去斧柯漼然盡爛既歸質去家已數十年親舊凋落非復前時矣楊衒之洛陽伽藍記曰景陽山南有百果園果别作一林林各有一堂有仙人棗長五寸把之兩頭俱核細如針霜降乃熟食之甚美俗傳云出崑崙山一曰西王母棗晉中閣名曰華林園棗六十二株王母棗十四株}
