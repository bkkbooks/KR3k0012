  - {type: variant, offset: 498, length: 320, content: 炎帝別號多風陽氣畜積萬物散解果實不成故士達作為五絃之瑟以來陰氣以定群生士達朱襄氏臣杜蘭香傳曰神女姓杜名蘭香降張碩常食粟飯并有非時果碩食之亦不甘然一食可七八日不飢鄴中記曰石虎有華林園種眾果民間有名果虎作蝦蟆車四搏掘根面去一丈深一丈合土載之植之無不生闞駰十三州記曰舍衛國在月氏南萬里果大如三斗坩音杜食經曰種名果法取好直枝內著芋瑰中種之張衡東京賦曰奇樹珍果鉤盾所職左思魏都賦曰馳道周屈於果下劉逵注曰漢廄舊有樂浪所獻果下馬高三尺以駕輦車又蜀都賦曰百果甲坼異色同榮劉楨魯都賦曰芳果萬名攢羅廣庭霜滋露熟時至則零石崇金谷詩序曰雜果幾乎萬株陸機與弟雲書曰天淵池東南角有果各作一林無處不有縱橫成行一果之間輒作一堂郭璞五果讚曰果蓏之品剖噬因宜雖曰微肴貴賤有差栗, SBCK: ''}
