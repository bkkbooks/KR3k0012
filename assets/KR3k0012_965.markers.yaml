  - {type: 'tls:seg', offset: 61, content: '', id: KR3k0012_CHANT_965-2a.7}
  - {type: variant, offset: 63, length: 274, content: 核者懷其核又王藻曰果實未熟不鬻於市凡食果實後君子火熟者先君子春秋元命苞曰織女星主果謝承後漢書曰劉祐字伯祖中山安國人仕郡為主簿郡將小子常出錢付之市買果實祐悉以買筆墨書具與之華嶠後漢書曰桓榮為博士會庭中詔賜奇果受賜者懷之榮獨舉手奉以拜光武笑指之曰此真儒生也陳書曰徐孝克侍宴無所食啖至食散當其前膳羞損減帝密記以問中書舍人管斌斌自是伺之見孝克以珍果內紳帶中斌當時莫識其意後尋訪方知其以遺母斌以啟宣帝嗟嘆良久乃勑自今宴享孝克前饌並遣將還以餉其母時論美之北史曰後魏淮陽王欣好營產業多所樹藝京師名果皆出其園唐書曰李泳為河陽所至以貪殘為務犒宴所陳果實以木刻彩繢之說, SBCK: 􅀥使叔壽考􅀃}
