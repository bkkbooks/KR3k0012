  - {type: variant, offset: 1667, length: 0, content: '', SBCK: 安平好􅀥地産不爲無珎杜氏新書曰杜畿爲河東太守平虎將軍劉勲爲太祖所親貴震朝􅋝常從畿求大􅀥畿拒以他故後勲伏法太祖得其書歎曰杜畿可謂不媚竈也英雄記曰孔文舉爲東萊賊所攻城欲破其治}
