  - {type: variant, offset: 34, length: 0, content: '', WYG: 建國始命王后其下五等有夫人昭儀媫妤容華美人明帝又置淑妃昭華修儀後魏書曰世祖昭儀馮氏文明皇后之姑也后父朗坐事誅后遂入宫昭儀雅有母徳鞠養教誨年十四髙祖踐極選后為貴人皆是昭儀訓撫之力又曰孝文馮昭儀廢后馮氏之姊也髙祖還洛陽恩遇甚厚昭儀先以疾病文明}
