  - {type: variant, offset: 96, length: 0, content: '', SBCK: 女與卿女作婢耳何能増損後魏書曰明元昭哀皇后姚興之女太宗以后禮納之後爲夫人后以鑄金人不成未昇尊位然帝寵幸出入居處禮如后焉晉中興書曰簡文宣皇后鄭氏字阿春榮陽人也先過渤海田氏生一男夫亡后依舅濮陽吴氏中宗爲丞相敬后先崩將納吴氏女爲夫人后及吴氏女並遊後園有見之者言於中宗曰鄭氏雖􅊔居賢於吴氏逺矣遂以德色納爲夫人甚有寵沈約宋書曰晉武採漢魏之制置貴嬪夫人貴人是爲}
  - {type: page-break, offset: 96, content: '', id: KR3k0012_SBCK_144-5b}
  - {type: variant, offset: 96, length: 0, content: '', krp: 女與卿女作婢耳何能増損後魏書曰明元昭哀皇后姚興之女太宗以后禮納之後爲夫人后以鑄金人不成未昇尊位然帝寵幸出入居處禮如后焉晉中興書曰簡文宣皇后鄭氏字阿春榮陽人也先過渤海田氏生一男夫亡后依舅濮陽吴氏中宗爲丞相敬后先崩將納吴氏女爲夫人后及吴氏女並遊後園有見之者言於中宗曰鄭氏雖婺矛牙居賢於吴氏逺矣遂以德色納爲夫人甚有寵沈約宋書曰晉武採漢魏之制置貴嬪夫人貴人是爲}
  - {type: variant, offset: 97, length: 0, content: '', SBCK: 夫人位視三公晉起居注曰有司奏今月九日當拜鄭夫人后婕妤桉儀注應服雀􅁫袿􅙦列仙傳曰鈎弋夫人右手拳姿色甚偉帝披其手得一鈎而手㝷伸生昭帝旣而帝害之殯尸不臰而香數月昭帝旣即位更葬之棺空但有系履故名其宫曰鈎翼後避諱改爲弋廟有神祠焉西京雜記曰髙帝戚夫人善鼓瑟擊筑帝擁夫人􅀝瑟而􅃶歌畢泣下流連夫人善爲翹䄂折腰之舞歌出塞望歸之曲侍婢數百人皆爲之後宫齊唱常入雲霄又曰戚夫人以百煉金爲彄環照見指骨上惡之以賜侍}
  - {type: variant, offset: 97, length: 0, content: '', krp: 夫人位視三公晉起居注曰有司奏今月九日當拜鄭夫人后婕妤桉儀注應服雀釵袿􅙦列仙傳曰鈎弋夫人右手拳姿色甚偉帝披其手得一鈎而手㝷伸生昭帝旣而帝害之殯尸不臰而香數月昭帝旣即位更葬之棺空但有系履故名其宫曰鈎翼後避諱改爲弋廟有神祠焉西京雜記曰髙帝戚夫人善鼓瑟擊筑帝擁夫人倚瑟而絃歌畢泣下流連夫人善爲翹䄂折腰之舞歌出塞望歸之曲侍婢數百人皆爲之後宫齊唱常入雲霄又曰戚夫人以百煉金爲彄環照見指骨上惡之以賜侍}
