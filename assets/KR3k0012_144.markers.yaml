  - {type: variant, offset: 423, length: 1, content: 鏡, WYG: 鄭夫人后媫妤按儀注應服雀釵袿襈列仙傳曰鉤弋夫人右手拳姿色甚偉帝披其手得一鉤而手尋伸生昭帝既而帝害之殯尸不臭而香數月昭帝既即位更葬之棺空但有絲履故名其宫曰鉤翼後避諱改為弋廟有神祠焉西京雜記曰髙帝戚夫人善鼓瑟擊筑帝擁夫人倚瑟而絃歌畢泣下流連夫人善為翹袖折腰之舞歌出塞望歸之曲侍婢數百人皆為之泣後宫齊唱聲入雲霄又曰戚夫人以百煉金為彄環照見指骨上惡之以賜侍兒鳴玉曜光等各四枚又曰戚夫人侍兒賈佩蘭後為扶風人段儒妻説}
  - {type: page-break, offset: 423, content: '', id: KR3k0012_WYG_144-9a, image: WYG0894/WYG0894-0333c.png}
  - {type: variant, offset: 425, length: 5, content: 床無因墮地, WYG: 内時戚夫人侍髙祖常以趙王如意為言髙祖思之或半日不言歎息悽愴而未知其術輙視夫人夫人擊筑髙祖自歌大風詩以和之又曰武帝以象牙為簟賜李夫人又曰武帝遇李夫人就取玉簪搔頭自此宫人搔頭皆用玉貴人東觀漢記曰光烈隂皇后上即位為貴人上以后性寛仁宜母天下欲授以尊位后輒退譲自陳不足以當大位又曰章帝宋貴人時竇皇后内寵方盛以貴人名族節操髙妙心内害之欲為萬世之計隂設方畧䜛毁貴人由是母子見踈數月誣奏貴人使婢為蠱道呪詛七年遂被譛暴卒又曰孝和隂皇后聰慧敏達有才能善書史永元三年選入掖庭為貴人託以先后近屬故有寵後漢書曰順烈梁后永建三年與姑共入掖庭時年十三太史卜兆得夀房又筮得坤之比遂以為貴人常特被引御從容請曰願陛下思雲雨之均澤識貫魚之次序使小妾得免罪謗之累由是帝加敬焉又曰桓思竇后延熹八年選入掖庭為貴人}
