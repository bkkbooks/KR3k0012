  - {type: variant, offset: 314, length: 240, content: 諱寶明琅耶臨沂人建元元年為南陽王妃四年為皇子妃無寵太子為宮人製新麗衣服及首飾而后床帷陳故古舊鑆鑷十餘枚永明十一年為皇太孫太妃鬱林王即位尊為皇太后稱宣德宮蕭昭業何妃蕭子顯齊書曰鬱林王何妃名婧英廬江灊人撫軍將軍戢之女后將拜鏡在床無因墮地其冬與太后同日謁太廟后稟性媱亂為妃時與外姦通左右柳珉之與同寢處如伉儷又與帝相愛褻故帝恣之迎后親戚入宮賞賜人數十萬以世祖耀靈殿處后家屬帝被廢后貶為王妃梁蕭衍母張后梁書曰太祖獻皇后張氏諱尚柔范陽方城人也祖次惠宋濮陽太守后母蕭氏即文帝從姑宋元嘉中嬪於太祖, SBCK: ''}
