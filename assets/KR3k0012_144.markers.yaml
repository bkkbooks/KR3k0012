  - {type: variant, offset: 421, length: 1, content: 將, WYG: 禮納之後為夫人后以鑄金人不成未昇尊位然帝寵幸出入居處禮如后焉晉中興書曰簡文宣皇后鄭氏字阿春滎陽人也先適渤海田氏生一男夫亡后依舅濮陽吴氏中宗為丞相敬后先崩将納吴氏女為夫人后及吴氏女並逰後園有見之者言扵中宗曰鄭氏雖嫠居賢扵吴氏逺矣遂以德色納為夫人甚有寵王隠晉書曰晉武採漢魏之制置貴嬪夫人貴人為三夫人位視三公晉起居注曰有司奏今月九日當}
