  - {type: variant, offset: 29, length: 0, content: '', SBCK: 阿主家學歌舞號曰飛鷰帝微行過陽阿主作樂見飛鷰而恱之召入宫大幸有女弟復召入俱爲婕妤貴傾後宫許后廢立爲皇后後寵小衰而弟更幸爲昭儀居昭陽舎其中庭彤朱殿上髹􅃮砌皆銅呇金塗白玉堦璧帶徃徃爲黃金紅鈆藍田璧明珠翠羽飾之後宫未甞有焉魏志序曰魏因漢法母后之號皆如舊制自夫}
