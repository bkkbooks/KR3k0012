  - {type: variant, offset: 1333, length: 1, content: 簡, WYG: 孝宣王皇后父奉光少時好鬭雞帝在民間數與奉光㑹相識奉光有女年十餘嵗每當適人所當適輙死故不行及宣帝即位召入宫為媫妤是時館陶主母華媫妤及淮陽憲王母張媫妤楚孝王母衛媫妤皆幸皇后廢上憐許太子早失母幾為霍氏所害扵是乃選後宫素謹慎而無子者遂立王媫妤為皇后令母養太子又曰孝成班媫妤成帝初即位選入後宫始為少使俄而}
