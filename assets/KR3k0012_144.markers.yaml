  - {type: variant, offset: 89, length: 0, content: '', krp: 管先幸漢王四年坐河南成臯靈臺此兩美人相與笑問其故兩人俱以實告王心悽然憐薄姬是日召而幸之又曰孝武李夫人夲以倡進𥘉夫人兄延年性知音善歌舞武帝愛之毎爲新聲變曲聞者莫}
