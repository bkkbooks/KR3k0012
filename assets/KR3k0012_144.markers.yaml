  - {type: variant, offset: 34, length: 0, content: '', SBCK: 建國始命王后其下五等有夫人昭儀婕妤容華美人明帝又置淑妃昭華後魏書曰丗祖左昭儀文明皇后馮氏之姑父㓪坐事誅后遂入宫昭儀雅有母德鞠養教誨年十四髙宗踐極選后爲貴人皆是昭儀撫訓之力又曰孝文馮昭儀廢后馮氏姊也髙祖還洛后恩遇甚厚昭儀先以疾病文明}
