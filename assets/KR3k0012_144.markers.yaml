  - {type: variant, offset: 1381, length: 201, content: 妃以天監十六年十二月拜湘東王妃生世子方等益昌公主含貞妃無容質不見禮帝三二年一人房妃以帝眇一目每知帝將至必為半面裝以俟帝見則大怒而出妃性嗜酒多洪醉帝還房必吐衣中既而貞惠世子方諸母王氏寵愛未幾而終元帝歸咎於妃及方等死愈見疾太清三年遂逼令自殺妃知不免乃投井死帝以屍還徐氏謂之出妻葬江陵瓦官寺陳陳霸先章后陳書曰高祖宣皇后章氏諱要兒吳興烏程人也本姓劍父景明為章氏所養因改姓焉景明梁代官至散騎侍郎后母蘇氏嘗遇道士以, SBCK: 有}
