  - {type: variant, offset: 555, length: 406, content: 長沙宣武王懿永陽昭王敷次生高祖初后嘗於室內忽見庭前菖蒲生花光彩照灼非世中所有后驚視謂侍者曰汝見不對曰不見后曰常聞見者當富貴因遽取吞之是月產高祖將產之夜后見庭內若有衣冠陪列焉次生衛陽宣王暢義興昭長公主令嫕宋泰始七年殂於秣陵縣同夏里舍葬武進縣東城里山天監元年五月甲辰追上尊號為皇后謚曰獻蕭衍郗后高祖德皇后郗氏諱徽高平金鄉人也祖紹宋國子祭酒領東海王帥父燁太子舍人早卒初后母尋陽公主方娠夢人云當生貴子及生后有赤光照于室內器物盡明家人皆怪之巫言此女光適有所妨乃於水濱祓除之后幼而明慧善隸書讀史傳女工之事無不閑習宋後廢帝將納為后齊初安陸王緬又欲結婚郗氏並辭以女疾乃止建元末高祖始娉焉生永興公主玉姚永世公主玉婉永康公主玉嬛建武五年高祖為雍州刺史先之鎮後乃迎后至州未幾殂於襄陽官舍時年三十二明年歸葬南徐州武進縣二年齊朝進高祖位相國封梁公詔贈后為梁公妃高祖踐祚追崇為皇后丁貴嬪梁書曰高祖丁貴嬪諱令光譙國人也世居襄陽貴嬪生于樊城初產, SBCK: ''}
