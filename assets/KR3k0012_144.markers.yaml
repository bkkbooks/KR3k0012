  - {type: variant, offset: 88, length: 0, content: '', WYG: 月辰則以金環退之當御者以銀環進之著於左手既御著於右手左手陽也以當就男故著右手隂也既御}
  - {type: variant, offset: 89, length: 0, content: '', SBCK: 管先幸漢王四年坐河南成臯靈臺此兩美人相與􅀏問其故兩人俱以實告王心悽然憐薄􅁎是日召而幸之又曰孝武李夫人夲以倡進􅀄夫人兄延年性知音善歌舞武帝愛之毎爲新聲變曲聞者莫}
  - {type: page-break, offset: 89, content: '', id: KR3k0012_SBCK_144-4a}
  - {type: variant, offset: 89, length: 0, content: '', WYG: 復故此女史之職也史記曰武帝時幸夫人尹媫妤邢夫人號娙徐廣曰五更反娥秩比中二千石尹夫人邢夫人同時並幸有詔}
