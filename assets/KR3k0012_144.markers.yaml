  - {type: variant, offset: 44, length: 1, content: 夢, SBCK: 腰體弱善行歩進止女弟昭儀不能及弱骨豐肌尤工􅀏語爲當時第一皆擅寵後宫西京賦曰增昭儀於婕妤賢旣公而復侯唐書曰髙宗六年將立昭儀武氏爲皇后長孫無忌屢言不可帝後召于志寜等謂曰武昭儀有令德朕欲立爲皇后卿等以爲如何志寜曰自貞觀二十三年後先朝付託遂良望陛下問其可否竟不從無忌等言而立昭儀爲皇后夫}
