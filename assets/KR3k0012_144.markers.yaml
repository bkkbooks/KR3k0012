  - {type: variant, offset: 83, length: 0, content: '', SBCK: 非邢夫人身也帝曰何以言之對曰視其形貌體狀不足以當人主於是有詔使邢夫人衣故衣獨身來前尹夫人望見之曰眞是矣於是乃低頭俛而泣自痛其不如也諺曰美女入室惡女之仇漢書曰漢興因􅁗之稱號妾皆稱}
  - {type: variant, offset: 83, length: 0, content: '', krp: 非邢夫人身也帝曰何以言之對曰視其形貌體狀不足以當人主於是有詔使邢夫人衣故衣獨身來前尹夫人望見之曰眞是矣於是乃低頭俛而泣自痛其不如也諺曰美女入室惡女之仇漢書曰漢興因秦之稱號妾皆稱}
  - {type: variant, offset: 85, length: 0, content: '', WYG: 之於后猶三公之於王坐而論婦禮無官職禮記昏義曰古者天子后立六宫三夫人九嬪二十七世婦八十一御妻以聽天下之内治以明章順故天下内和而家理五經要義曰古者后夫人必}
  - {type: page-break, offset: 85, content: '', id: KR3k0012_WYG_144-4b, image: WYG0894/WYG0894-0331b.png}
  - {type: variant, offset: 86, length: 0, content: '', SBCK: 美人良人八子七子長使之號焉又曰漢王得定陶戚􅁎愛幸生趙隱王如意髙祖崩惠帝立吕后爲皇太后乃令永巷囚戚夫人髠鉗衣赭衣令舂戚夫人舂歌曰子爲王母爲虜終日舂薄暮常與死爲伍相離三千里當誰使告汝太后遂斷戚夫人手足去眼熏耳飲以瘖藥使居鞠域中名曰人彘又曰髙帝薄􅁎文帝母也少時與管夫人趙子兒相愛約曰先}
  - {type: variant, offset: 86, length: 1, content: 貴, WYG: 女史彤管之法后妃羣妾以禮御於君所女史書其日月授其環以進退之生}
  - {type: variant, offset: 86, length: 0, content: '', krp: 美人良人八子七子長使之號焉又曰漢王得定陶戚姬愛幸生趙隱王如意髙祖崩惠帝立吕后爲皇太后乃令永巷囚戚夫人髠鉗衣赭衣令舂戚夫人舂歌曰子爲王母爲虜終日舂薄暮常與死爲伍相離三千里當誰使告汝太后遂斷戚夫人手足去眼熏耳飲以瘖藥使居鞠域中名曰人彘又曰髙帝薄姬文帝母也少時與管夫人趙子兒相愛約曰先}
