  - {type: variant, offset: 93, length: 1, content: 歎, SBCK: 之號皆如舊制自夫人以下丗有増損太祖建國始命王后其下五等有夫人有昭儀有婕妤有容華有美人明帝増淑妃昭華脩儀太和中始復命夫人登其位於淑妃之上自夫人以下爵凢十二等貴嬪夫人位次皇后魏志曰文德郭皇后有智數時有所獻納文帝之爲嗣后有謀焉太子即位后爲夫人王隱晉書曰胡芳以選入宫父奮哭曰老奴不死唯有二兒男入九地之下女上九天之上後拜芳夫人元后臨終有命先來臨者有賞胡夫人自排人徑前辭訣咸寜二年立皇后楊氏封父駿臨晉侯駿漸驕慢奮語駿卿恃女更豪也與天家作婚者未有不滅門駿曰卿女不在天家也奮}
