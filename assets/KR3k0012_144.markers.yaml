  - {type: variant, offset: 2166, length: 832, content: 一年薨于東都時年八十三葬洛陽之芒山陳叔寶沈后陳書曰後主沈皇后諱婺華儀同三司憲侯君之女也母高祖女會稽穆公主主早亡時后尚幼而毀瘠過甚服畢每至歲時朔望恒獨坐泣涕哀慟左右內外咸敬異焉太建三年納為皇太子妃後主即位立為皇后后性端靜寡嗜慾聰敏強記涉獵經史工書翰初後主在東宮而后父君理卒后居憂處別殿哀毀逾禮後主遇后既薄而張貴妃寵傾後宮後宮之政並歸之后澹然未嘗有所忌怨而居處儉約衣服無錦繡之飾左右近侍繞百許人唯尋閱圖史佛經為事陳亡與后主俱入長安及後主薨后自為哀詞文甚酸切隋煬帝每所巡幸恒令從駕及煬帝為宇文化及所害后自廣陵過江還鄉里不知所終張貴妃陳書曰後主張貴妃名麗華兵家女也家貧父兄以織席為業後主為太子選入宮是時龔貴嬪為良娣貴妃年十歲後主見而悅焉因得幸遂有娠生太子深後主即位拜為貴妃妃性聰惠甚被寵遇後主每引見貴妃與賓客遊宴貴妃薦諸宮女預焉後宮等咸德之競言貴妃之善由是愛傾後宮又好厭魅之術假鬼道以惑後主置淫祀於宮中聚諸妖巫使之鼓舞因參訪外事人間有一言一事妃必知之以白後主由此益重妃內外宗族多被引用及隋軍陷臺城妃與後主俱入井隋軍出之晉王廣命斬妃於青溪中橋北齊高歡婁后北齊書武明皇后婁氏諱昭君贈司徒內于之女也少明悟強族多娉之並不肯行及見神武於城上執役驚曰此真吾夫也乃使婢通意又數致私財使以娉己父母不得已而許焉神武既有澄清之志傾產以結英豪密謀秘策后恒參預及拜渤海王妃閫闈之事悉決焉后高明嚴斷雅遵儉約往來外舍侍從不過十人性寬厚不妬忌神武姬侍咸以恩待神武嘗將西討出師后夜生一男一女左右以危急請追告神武后弗聽曰王出統大兵何得以我故輕離軍幕死生命也來復何為神武聞之嗟嘆良久沙苑敗後侯景言請精騎二萬必能取之神武悅以告于后后曰若如其言豈有還理得獺失景亦有何利乃止文襄嗣位進為太妃文宣將受魏禪后固執不許帝所以中止天保初尊為皇太后宮曰宣訓濟南即位尊為太皇太后尚書令楊愔等受遺詔輔政踈忌諸王太后密與李昭及諸大將定策誅之令廢立孝昭即位復為皇太后孝昭帝崩太后又下詔立武成帝大寧二年春太后寢疾衣忽自舉用巫媼言改姓氏, SBCK: ''}
  - {type: variant, offset: 2166, length: 832, content: 一年薨于東都時年八十三葬洛陽之芒山陳叔寶沈后陳書曰後主沈皇后諱婺華儀同三司憲侯君之女也母高祖女會稽穆公主主早亡時后尚幼而毀瘠過甚服畢每至歲時朔望恒獨坐泣涕哀慟左右內外咸敬異焉太建三年納為皇太子妃後主即位立為皇后后性端靜寡嗜慾聰敏強記涉獵經史工書翰初後主在東宮而后父君理卒后居憂處別殿哀毀逾禮後主遇后既薄而張貴妃寵傾後宮後宮之政並歸之后澹然未嘗有所忌怨而居處儉約衣服無錦繡之飾左右近侍繞百許人唯尋閱圖史佛經為事陳亡與后主俱入長安及後主薨后自為哀詞文甚酸切隋煬帝每所巡幸恒令從駕及煬帝為宇文化及所害后自廣陵過江還鄉里不知所終張貴妃陳書曰後主張貴妃名麗華兵家女也家貧父兄以織席為業後主為太子選入宮是時龔貴嬪為良娣貴妃年十歲後主見而悅焉因得幸遂有娠生太子深後主即位拜為貴妃妃性聰惠甚被寵遇後主每引見貴妃與賓客遊宴貴妃薦諸宮女預焉後宮等咸德之競言貴妃之善由是愛傾後宮又好厭魅之術假鬼道以惑後主置淫祀於宮中聚諸妖巫使之鼓舞因參訪外事人間有一言一事妃必知之以白後主由此益重妃內外宗族多被引用及隋軍陷臺城妃與後主俱入井隋軍出之晉王廣命斬妃於青溪中橋北齊高歡婁后北齊書武明皇后婁氏諱昭君贈司徒內于之女也少明悟強族多娉之並不肯行及見神武於城上執役驚曰此真吾夫也乃使婢通意又數致私財使以娉己父母不得已而許焉神武既有澄清之志傾產以結英豪密謀秘策后恒參預及拜渤海王妃閫闈之事悉決焉后高明嚴斷雅遵儉約往來外舍侍從不過十人性寬厚不妬忌神武姬侍咸以恩待神武嘗將西討出師后夜生一男一女左右以危急請追告神武后弗聽曰王出統大兵何得以我故輕離軍幕死生命也來復何為神武聞之嗟嘆良久沙苑敗後侯景言請精騎二萬必能取之神武悅以告于后后曰若如其言豈有還理得獺失景亦有何利乃止文襄嗣位進為太妃文宣將受魏禪后固執不許帝所以中止天保初尊為皇太后宮曰宣訓濟南即位尊為太皇太后尚書令楊愔等受遺詔輔政踈忌諸王太后密與李昭及諸大將定策誅之令廢立孝昭即位復為皇太后孝昭帝崩太后又下詔立武成帝大寧二年春太后寢疾衣忽自舉用巫媼言改姓氏, WYG: ''}
