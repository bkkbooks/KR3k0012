  - {type: variant, offset: 386, length: 5, content: 稱宣德宮蕭, WYG: 乃令永巷囚戚夫人髠鉗衣赭衣令舂戚夫人舂且歌曰子為王母為虜終日舂薄暮常與死為伍相離三千里當誰使告汝太后遂斷戚夫人手足去眼薫耳飲以瘖藥使居鞠域中名曰人彘又曰髙帝薄姬文帝母也少時與管夫人趙子兒相愛約曰先貴無相忘已而管夫人趙子兒先幸漢王漢王四年坐河南成臯靈臺此兩美人侍相與笑薄姬初約漢王問其故兩人具以實對漢王心悽然憐薄姬是日召而幸之又曰孝武李夫人本以倡進初夫人兄延年性知音善歌舞孝武愛之每為新聲變曲聞者莫不感動延年侍上起舞歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國寧不知傾城與傾國佳人難再得上嘆息曰善世豈有此人乎平陽主因言延年有女弟上乃召見之實玅麗善舞由是得幸生一男是為昌邑哀王李夫人少而早卒上憐憫焉圖其形甘泉宫齊人少翁言能致其神廼夜張燈燭帷帳陳酒肉而令上居他帳望見好女如李夫人之貎不得就視上愈益悲感為作詩曰是耶非耶立而望之偏何姗姗其來遲令樂府諸音家絃歌之上自為作賦以傷悼夫人又曰孝武鉤弋趙媫妤}
