  - {type: variant, offset: 2999, length: 684, content: 月辛丑崩於北宮年六十二合葬義平陵爾朱太妃北齊書彭城太妃爾朱榮之女魏孝莊后也神武納為別室敬重踰於婁妃見必束帶自稱下官神武迎蠕蠕公主還爾朱迎於木井北與蠕蠕公主前後別行不相見公主引角弓仰射翔鴟應弦而落妃引長弓邪射飛烏亦一發而中神武喜曰我此二婦並堪擊賊後為尼神武為起佛寺天保初為太妃及文宣狂酒將無禮於太妃太妃不從遂遇禍高澄元后北齊書文襄敬皇后元氏魏孝靜帝之姊也孝武帝時封馮翊公主而歸於文襄容德兼美曲盡和敬初生河間王孝琬時文襄為世子三日而孝靜幸世子第贈錦綵及布帛萬疋世子辭求通受諸貴禮遺於是十屋皆滿次生兩公主文宣受禪尊為文襄皇后高洋李后北齊書曰文宣皇后李氏諱祖娥趙郡李希宗女也容德甚美初為太原公夫人及帝將建中宮高隆之高德正言漢婦人不可為天下母宜更擇美配楊愔固請依漢魏故事不改元妃而德正猶固請廢后而立叚昭儀欲以結勳貴之援帝竟不從而立后焉帝好捶撻嬪御乃至有殺戮者唯后獨蒙禮敬天保十年改為可賀敦皇后孝昭即位降居昭信宮號昭信皇后高演元后北齊書曰孝昭皇后元氏開府元蠻女也初為常山王妃天保末賜姓步六孤孝昭即位立為皇后帝崩梓宮之鄴始渡汾橋武成聞后有奇藥追索之不得使閹人就車頓辱降居順成宮武成既殺樂陵王元被閟隔不得與家相知宮闈內忽有飛語帝令檢推得后父兄書信元蠻由是坐免官后以齊亡人入周氏宮中隨文帝作相放還山東高湛胡后北齊書曰武成皇后胡氏安定胡延之女其母范陽盧道約女初懷孕有胡僧詣門曰此宅瓠蘆中有月既而生后天保初選為長廣王妃產後主日鴞鳴於產帳上武成崩尊為皇太后高緯斛律后北齊書曰後主皇后斛律氏左丞相光之女也初為皇太子妃後主受禪立為皇后武平三年正月生女帝欲悅光詐稱生男為之大赦光誅后廢在別宮後令為尼, SBCK: ''}
