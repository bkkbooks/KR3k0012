  - {type: variant, offset: 92, length: 0, content: '', SBCK: 實妙麗善舞由是幸生一男是爲昌邑哀王李夫人少而蚤卒上憐閔焉圖􅀞其形甘泉宫齊人少翁能致其神迺夜張燈燭帷帳陳酒肉而令上居他帳望見好女如李夫人之貌不得就視上愈益悲感爲作詩曰是耶非耶立而望之偏何姍姍其來何遟令樂府諸音家􅃶歌之上自爲作賦以傷悼夫人又曰孝武鈎弋趙婕妤昭帝母也家在河間武帝廵狩過河間望氣者言此室有竒女天子氣使召之旣至女兩手皆拳上自披之手即時伸是得幸號曰拳夫人後漢書曰陳夫人者家夲魏郡少以聲􅇊入孝王宫得幸生質帝亦以梁氏故榮寵不及焉魏志曰魏因漢法母}
  - {type: page-break, offset: 92, content: '', id: KR3k0012_SBCK_144-4b}
