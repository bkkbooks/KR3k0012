  - {type: variant, offset: 401, length: 2, content: 鬱林, WYG: 陳夫人家本魏郡少以聲伎入孝}
  - {type: variant, offset: 404, length: 0, content: '', WYG: 宫得幸生質帝以梁氏故榮寵不及焉魏志曰魏因漢法母后之號皆如舊制夫人以下世有増損太祖建國始命皇后其下五等有夫人有昭儀有媫妤有容華有美人明帝増淑妃昭華脩儀太和中始復命夫人登其位扵淑妃之上自夫人以下爵凡十二等貴嬪夫人位次皇后魏志曰文徳郭皇后有智數時所獻納文帝之為嗣后有謀焉太子即位后為夫人王隠晉書曰胡芳以選入宫父奮哭曰老奴不死唯有二兒男入九地之下女上九天之上後拜為夫人元后臨終有命先來臨者有賞胡夫人自排人徑前辭訣咸寧二年立皇后楊氏封父駿臨晉侯漸驕慢奮語駿卿恃女更豪也與天家作㛰者未有不㓕門駿曰卿女不在天家也奮曰我女與卿女作婢耳}
