  - {type: variant, offset: 1937, length: 9, content: 后配焉承聖二年后生, SBCK: 實憤懣充中必形於色詩云皷鍾于宫聲聞于外猶此言之眞僞之效難以欺矣夫君子貴素文足通殷勤而巳亦何必華辭哉自以親婕妤異於他人故不能無言亦不以􅀷相過望前數以顔色不平應對舒遟爲譴卒不能自改婕妤方見親幸之時老母在堂兩弟皆􅆪金貂並侍於側同列比舎豈不謂婕妤妹弟尊幸哉今過蒙譴獨謂老親兩弟何班婕妤報諸姪曰記言屬見元帝所賜趙婕妤書以相比元帝􅀍病無悰但鍜錬}
