  - {type: variant, offset: 19, length: 1, content: 陳, SBCK: 元􅀓昭儀哀帝祖母也河内人少爲上官太后才人元帝進幸有寵爲人才略善事人下至宫人左右飲酒酹地皆祝延之産一男一女女爲平都公主男爲定陶恭王漢書曰孝元馮昭儀平帝祖母父奉丗爲執金吾上幸虎圈􅃲獸後宫皆坐熊佚出圈攀檻欲上殿左右貴人昭儀等皆驚走馮婕妤直前當熊而立左右殺熊上問人情驚懼何故前當婕妤曰猛獸得人而止妾恐熊至御座故身當之元帝嗟嘆以此倍敬重焉男立爲信都王尊婕妤爲昭儀元帝崩爲信都太后與王俱居儲元宫宫名在長安城西又曰孝成趙}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_SBCK_144-1b}
  - {type: variant, offset: 19, length: 1, content: 陳, WYG: 元傅昭儀哀帝祖母也河内人少為上官太后才人元帝進幸有寵為人有才畧善事人下至宫人左右飲酒酹地皆祝延之産一男一女為平都公主男為定陶㳟王漢書曰孝元馮昭儀平帝祖母父奉世為執金吾上幸虎圏闘獸後宫皆坐熊佚出圏攀檻欲上殿左右貴人昭儀等皆驚走馮媫妤直前當熊而立左右殺熊上問人情驚懼何故當前媫妤曰猛獸得人而止妾恐熊至御坐故身當之元帝嗟嘆以此倍敬重焉男立為信都王媫妤爲昭儀元帝崩為信都太后與王俱居儲元宫宫名在長安門西又曰孝成趙}
