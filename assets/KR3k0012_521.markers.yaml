  - {type: variant, offset: 3348, length: 601, content: 士不飲盜泉之水廉者不受嗟來之食況拾遺求利以汙其行乎羊子大慚乃捐金於野而遠尋師學一年來歸妻跪問其故羊子曰久行懷思無佗異也妻乃引刀趍機而言此織生自蠶璽成於機杼一絲而累以至於寸累寸不已遂成丈匹今若斷斯織也則損失成功稽廢時月夫子積學當日知所忘以就懿德若中道而歸何異斷斯織乎羊子感其言復還終業遂七年不返又曰魏朗字仲英入為尚書舉動皆有禮序室家相待如賓與子孫如嚴君焉又曰曹世叔妻班彪之姑名昭字惠召入宮號曰大家每有貢獻遣大家作賦頌注列女傳著女誡及詩並行於時魏志曰初司馬宣王勒兵從闕下趣武庫當曹爽門人逼車住爽妻劉氏怖出至廳事謂帳下守督曰公在外今兵起如何督曰夫人勿憂乃上門樓引弩注箭欲發將孫謙在後牽止之曰天下事未可知如此者一二宣王遂過又曰郭淮字伯濟太原河曲人拜車騎將軍封曲陽侯淮妻王陵之妹當從坐侍御史往收羗胡渠師數千人叩頭請淮表留妻淮不從妻之道莫不流涕人人扼腕欲劫留之淮五子叩頭流血請淮淮不忍視乃遣妻還淮以書曰司馬宣王曰五子哀母不惜其身若無其母是無五子亦無淮也書至宣王亦宥之魏氏春秋曰許允為吏部郎選郡守明帝疑其所用非次旨召入將加罪允妻阮氏跣出謂曰明主可以理奪難以情求允之入帝怒詰之對曰某郡太守雖滿文字先至年限在後日限在前帝取事視乃釋遣出望其衣敗曰清吏也賜之衣允之出為鎮北也喜謂其妻曰吾知免矣妻曰禍見於此何免之有魚豢魏略曰桓範字彥則沛郡人也使持節督青徐諸軍鎮下邳與徐州剌史鄒歧爭屋引節欲斬歧為歧所奏不直坐免當轉為冀州剌史統屬, SBCK: ''}
