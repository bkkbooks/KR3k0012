  - {type: variant, offset: 2687, length: 1, content: 婦, SBCK: 舅氏㓜而歧嶷早成十歳能屬文鍾繇曰此兒當及曽祖爽耳又曰殷浩坐徙東陽信安縣外甥韓康伯浩素賞愛之隨至徙所經歳還都浩送至渚側詠曹顔逺詩曰冨貴他人合貧賤親戚離因而下泣又曰衛玠字叔寳驃􅀐將軍王濟玠之舅也雋爽風姿毎見玠輙歎曰珠玉在旁覺我形穢又曰郄愔字方回與姉夫王羲之有邁丗之風獻之兄弟愔子超未亡時献之兄弟甞躡履脩甥舅之禮及超死見愔怠慢履而候之命席便坐愔􅁣然曰嘉賔不死䑕子敢爾又曰武帝楊后諱艶字瓊芝弘農人母天水趙氏早卒依舅家舅母仁愛親乳之使他人乳已子世􅀃曰衛展字}
  - {type: page-break, offset: 2687, content: '', id: KR3k0012_SBCK_521-6a}
  - {type: variant, offset: 2687, length: 1, content: 婦, WYG: 舅氏㓜而岐疑朂十嵗能屬文鍾繇曰此兒當及曽祖爽耳又曰殷浩坐徙東陽信安縣外甥韓康伯浩素賞愛之隨至徙所經嵗還都浩送至渚側詠曹顔逺詩曰富貴他人合貧賤親戚離因而下泣又曰衛玠字叔寶驃騎將軍王濟玠之舅也雋爽風姿每見玠輙歎曰珠玉在傍覺我形穢又曰郄愔字方囘與姊夫王羲之有邁世之風獻之兄弟愔子超未亡時嘗躡履脩甥舅之禮及超死見愔怠慢履而候之命席便坐愔慨然曰嘉賔不死䑕子敢爾又曰武帝楊后諱艶字瓊芝𢎞農人母天水趙氏早卒依於舅家舅母仁愛親乳之使人乳己子世說曰衛展字}
