  - {type: variant, offset: 192, length: 0, content: '', WYG: 臣皆敬重乳母乳母家子孫奴從者横暴長安中當道掣頓人車馬奪人衣服聞於中不忍致之法有司請徙乳母家室處之於邉奏可乳母當入至前面見辭乳母先見郭舎人為下泣舎人曰即入見辭去疾步數還顧乳母如其言謝去郭舎人疾言罵之曰咄老女子何不疾行陛下已壯矣寧尚須汝乳而活耶於是武帝憐之乃下詔止無徙乳母後漢書曰安帝時鄧太后臨朝帝不親政事小黄門李閏與帝乳母王聖讃太后兄執金吾鄧悝等嘗言欲廢帝立平原王徳帝每忿懼及太后崩遂誅鄧氏而王聖女伯榮扇動内外競為侈虐明年帝崩立北鄉侯為天子王聖及黨與皆見徙王隠晉書曰賈充子黎民三嵗乳母抱向閤充入黎民喜踊充就而拊之充}
  - {type: page-break, offset: 192, content: '', id: KR3k0012_WYG_521-3a, image: WYG0897/WYG0897-0641c.png}
  - {type: variant, offset: 193, length: 0, content: '', WYG: 人郭槐遥望疑充即鞭殺乳母兒思母病死槐又生男向嵗乳母抱中庭充過拈兒頰郭又疑之復鞭殺乳母兒又死充遂無嗣譚藪曰宋何承天為著作郎時新著作多貴逰少年或戯承天謂為妳母承天曰鳯凰將九子妳母何言耶妾禮記曲禮曰買妾不知其姓則卜之又内則曰聘則為妻奔則為妾妾之言接也聞彼有禮而往焉以得接見於君子又曰妾雖年老未滿五十必與五日之御雖婢妾衣服飲食不後長者妻不在妾御莫敢當夕辟女君之御日也妾將生子及月辰夫使人日一問之左傳成上曰魯聲伯之母不聘不聘無媒禮穆姜曰吾不以妾為姒兄弟}
  - {type: page-break, offset: 193, content: '', id: KR3k0012_WYG_521-3b, image: WYG0897/WYG0897-0641d.png}
  - {type: page-break, offset: 193, content: '', id: KR3k0012_WYG_521-4a, image: WYG0897/WYG0897-0642a.png}
  - {type: variant, offset: 195, length: 1, content: 待, WYG: 相謂為姒生聲伯而出之又昭二十年晏子對齊景公曰内寵之妾肆奪於市外寵之臣僣令於鄙又哀下曰魯公子荆之母嬖荆哀庶子將以為夫人使宗人釁夏獻其}
  - {type: variant, offset: 197, length: 0, content: '', WYG: 宗人禮官對曰無之公怒曰女為宗司立夫人國之大禮也何故無之對曰周公及武公娶於薛孝恵娶於商自桓以下娶於齊此禮也則有若以妾為夫人則固無其禮也出妻禮記檀弓曰子上之母死}
  - {type: page-break, offset: 197, content: '', id: KR3k0012_WYG_521-4b, image: WYG0897/WYG0897-0642b.png}
