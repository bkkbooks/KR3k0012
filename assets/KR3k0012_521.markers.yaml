  - {type: variant, offset: 14, length: 135, content: 義也又曰士庶人曰妻妻齊也夫賤不足以尊稱故齊等言也易家人卦曰夫夫婦婦而家道正又序卦曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦夫婦之道不可以不久也故受之以恒恒者久也毛詩衡門曰豈其食魚必河之魴豈其取妻必齊之姜豈其食魚必河之鯉豈其取妻必宋之子何必大國之女然後可妻亦取貞順, WYG: ''}
