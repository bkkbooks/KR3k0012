  - {type: variant, offset: 4, length: 41, content: 夫妻釋名曰夫妻匹敵之義也又曰士庶人曰妻妻齊也夫賤不足以尊稱故齊等言也易家人卦曰夫夫, SBCK: 一慈母保母乳母妾出}
  - {type: variant, offset: 4, length: 1, content: 夫, WYG: 一慈母保母乳母妾出婦舅舅母外甥姨慈母保母禮記内則曰子生異為孺子室於宫特掃一室以處之擇於諸母與可者必求其寛裕慈惠温良恭敬慎而寡言者使為子師其次為慈母其次為保母皆居子室此人君養子之禮也諸母衆妾也可者傅御之屬也子師教以善道者慈母知其嗜慾者保母安其居室者士}
