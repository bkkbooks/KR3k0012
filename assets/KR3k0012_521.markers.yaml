  - {type: variant, offset: 1417, length: 425, content: 對曰吾一婦人而事二夫縱不能死其又奚言又成下曰晉三卻害伯宗譖而殺之初伯宗每朝其妻必戒之曰盜憎主人民惡其上子好直言必及於難又襄四曰齊棠公之妻東郭偃之姊也東郭偃臣崔武子棠公死偃御武子以弔焉見棠姜而美之美其色也使偃取之為己取也偃曰男女辨姓今君出自丁臣出自桓不可武子筮之遇困之大過以示陳文子文子曰夫從風風隕妻不可娶也且其繇曰困于石據于蒺藜入于其宮不見其妻凶崔子曰嫠也何害先夫當之矣遂取之又僖下曰初臼季使過冀見冀鈌耨其妻饁之敬相待如賓與之歸言諸文公曰敬德之聚也能敬必有德德以治民請君用之文公以為下軍大夫又昭七曰晉叔向適鄭鬷薎惡欲觀叔向從使之收器者而往立於堂下一言而善叔向聞之曰必鬷明也下執其手以上曰昔賈大夫惡取妻而美三年不言御以如皋射雉獲之其妻始笑而言賈大夫曰才之不可以已也我不能射汝遂不言不笑也今夫子少不揚子若不言吾幾失子矣又哀上曰齊侯伐晉夷儀弊無存之父將室之辭以與其弟無存齊人也室之為取婦也曰此役也不死反必娶於高國高氏國氏齊貴族也無存欲必有功還取卿相之女也又, SBCK: 左傳}
