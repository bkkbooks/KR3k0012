  - {type: variant, offset: 2576, length: 1, content: 宣, SBCK: 子未之言也左傳僖中曰􅁗伯納晉公子重耳及河子犯以璧授公子曰臣􅀒覊紲以從君廵於天下臣之過多矣臣猶知之而况君乎請由此亡公子曰所不與舅氏同心者有如白水投其璧于河又曰􅁃懌甞以毒酒餉江州刺史王允之允之覺其有毒飲犬犬斃乃密奏之}
