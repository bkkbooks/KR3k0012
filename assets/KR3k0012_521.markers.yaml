  - {type: variant, offset: 3953, length: 2, content: 呂昭, WYG: 劉牢之即其舅也時鎮京口每有大事皆叅議之桓𤣥之簒與劉裕劉毅共興義兵桓𤣥聞之甚懼其黨曰烏合之衆勢必無成𤣥曰劉裕勇冠三軍劉毅家無擔石之儲樗蒲一擲百萬何無忌劉牢之甥酷似其舅共舉大事何}
