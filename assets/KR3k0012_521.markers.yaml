  - {type: variant, offset: 2733, length: 1, content: 我, SBCK: 當何名之侍中繆襲曰陛下聖思齊於哲王罔極過於曽閔此館之興情鍾舅氏冝以渭陽名焉上從之妬記曰謝太傅劉夫人不令太傅有別房寵公旣深好聲色不能全節遂頗欲立妓妾兄子及外甥等微逹其旨乃共諌劉夫人方便稱關睢螽斯有不妬忌之德夫人知諷巳乃問誰撰詩荅曰周公夫人曰周公是男子乃相爲耳􅀂使周姥傳應}
