  - {type: variant, offset: 3956, length: 75, content: 其妻仲長曰我寧作諸卿向公長跪耳不能為呂子展屈也其妻曰君前在東坐欲擅斬徐州眾人謂君難為作下今羞為呂屈是復難為作上範怒觸其首乃以刀鐶撞其腹妻其懷孕遂傷胎死, WYG: 無成}
  - {type: variant, offset: 3957, length: 3, content: 妻仲長, SBCK: 舅也時鎮京口每有大事皆叅議之桓玄之􅆲與劉􅁉劉毅共興義兵桓玄聞之甚懼其黨}
