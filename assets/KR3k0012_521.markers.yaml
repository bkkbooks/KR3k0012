  - {type: punctuation, offset: 43, content: 「, id: KR3k0012_CHANT_521-bkkpn20}
  - {type: variant, offset: 46, length: 473, content: 婦而家道正又序卦曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦夫婦之道不可以不久也故受之以恒恒者久也毛詩衡門曰豈其食魚必河之魴豈其取妻必齊之姜豈其食魚必河之鯉豈其取妻必宋之子何必大國之女然後可妻亦取貞順而已又草蟲大夫妻能以禮自防也喓喓草蟲趯趯阜螽興也喓喓聲也草蟲常羊也趯趯躍也阜螽蠜也卿大夫之妻待禮而行隨從君子未見君子憂心忡忡忡忡猶衝衝也婦人雖適人有歸宗之義亦既見止亦覯止我心則降又采蘋曰采蘋大夫妻能循法度也能循法度則可以承先祖共祭祀矣女子十年不出姆教婉娩聽從軌麻枲治絲繭織絍組紃學女事以共衣服觀於祭祀納酒漿籩豆菹醢禮相助奠十有五而笄二十而嫁此言能循法度者今既嫁為大夫妻能循其為女人時所學之事以為法度也于以采蘋南澗之濱于以采藻于彼行潦于以奠之宗室牖下誰其尸之有齊季女尸主也齊敬也季少也又碩人曰碩人其頎衣錦褧衣齊侯之子衛侯之妻又氓曰女也不爽士貳其行士也罔極二三其德三歲為婦靡室勞矣夙興夜寐靡有朝矣又棠棣曰妻子好合如鼓瑟琴好合志意合也合者如琴瑟之聲相應和也兄弟既翕和樂且湛宜爾家室樂爾妻孥是究是圖亶其然乎又南山曰藝麻如之何橫縱其畝取妻如之何必告父, SBCK: 舅舅}
