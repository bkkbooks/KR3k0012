  - {type: variant, offset: 2567, length: 0, content: '', SBCK: 悍忌不得畜媵妾兒女常自探井臼老竟逐之又曰黄允濟隂人也以雋才知名郭林宗見而謂曰卿有絶人之才足成偉器然恐守道不篤將失之矣後司徒􅀽隗欲爲從女求姻見允而歎曰得壻如是足矣允聞而黜遣其妻夏侯氏婦請姑曰今當見棄方與黄氏長辭乞一㑹宗屬以展離訣之情於是大集賔客二百餘人婦中坐攘􅃑數允隱慝􅁾惡十五事言畢登車而去允以此廢於時又曰李充字大遜家貧兄弟六人同衣遞食妻􅀼謂充曰今貧居如此難以乆安願思分異充僞許之曰當醖酒具㑹請呼郷里内外充於坐中前跪白母曰此婦無狀而教充離間母兄罪合遣斥便呵叱其婦遂令出門婦衘涕而去齊書曰劉瓛母孔氏瓛娶王氏縁壁挂履土落孔氏床上孔氏不恱瓛即出其妻梁書曰孔謙從兄靈慶甞病􅀉於謙謙出行還問起居靈慶曰向飲冷􅀬不調即時猶渴謙退遣其妻家語曰婦有七出三不去七出}
  - {type: page-break, offset: 2567, content: '', id: KR3k0012_SBCK_521-4a}
  - {type: variant, offset: 2567, length: 0, content: '', WYG: 悍忌不得畜媵妾兒女常自操井臼衍竟逐之又曰黄允濟隂人也以雋才知名郭林宗見而謂曰卿有絶人之才足成偉器然恐守道不篤將失之矣後司徒袁隗欲為從女求婚見允而歎曰得婿如是足矣允聞而黜遣其妻夏侯氏婦請姑曰今當見棄方與黄氏長辭乞一㑹宗屬以展離决之情於是大集賔客二百餘人婦坐中攘袂數允隐慝穢惡事十五事言畢登車而去允以此廢於時又曰李充字大遜家貧兄弟六人同衣逓食妻竊謂充曰今貧居如此難以久安願思分異充偽許之曰當醖酒具㑹請呼鄉里内外充坐中前跪母曰此婦無狀而教充離間母兄罪合遣斥便呵叱其婦遂令出門婦銜涕而去齊書曰劉瓛母孔氏瓛娶王氏椓壁挂履土落孔氏床上孔氏不恱瓛即出其妻梁書曰孔謙從兄靈慶嘗病寄於謙謙出行還問起居靈慶曰向飲冷熱不調即時猶渴謙退遣其妻家語曰婦有七出三不去}
  - {type: page-break, offset: 2567, content: '', id: KR3k0012_WYG_521-6a, image: WYG0897/WYG0897-0643a.png}
  - {type: page-break, offset: 2567, content: '', id: KR3k0012_WYG_521-6b, image: WYG0897/WYG0897-0643b.png}
