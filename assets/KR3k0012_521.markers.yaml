  - {type: variant, offset: 741, length: 1746, content: 子不宜其妻父母曰是善事我子行夫婦之禮焉沒身不衰又曰女子二十而嫁有故二十三而嫁故謂父母喪聘則為妻聘問也妻之言齊以禮見問則得與夫敵恥奔則為妾又坊記曰取妻不取同姓為其近禽獸也所以附遠厚別也左傳隱公曰鄭公子忽如陳逆婦媯辛亥以媯氏歸甲寅入於鄭陳鍼子送女先配而後祖鍼子曰是不為夫婦誣其祖矣非禮也何以能育禮逆婦必先告祖廟而後行鄭忽逆婦而後告廟故曰先配而後祖又曰桓公曰鄭祭仲專鄭伯患之使其壻雍紏殺之將享諸郊雍姬知之謂其母曰父與夫孰親其母曰人盡夫也父一而已胡可比焉婦人在室則天父出則天夫女以為疑故母以所生為本解之遂告祭仲曰雍氏舍其室而將享子于郊吾惑之以告祭仲殺雍糾尸諸周氏之汪公載以出曰謀及婦人宜其死也又莊公曰初懿氏卜妻敬仲其妻占之曰吉是謂鳳凰于飛和鳴鏘鏘有媯之後將育于姜五世其昌並為正卿八世之後莫之與京又僖中曰狄人伐廧咎如赤狄之別種獲其二女叔隗季隗納諸晉公子公子以叔隗妻趙衰生盾文公取季隗生伯儵後以妻趙衰生原同屏括樓嬰原屏樓三子之邑也趙姬逆盾與其母趙姬文公女也盾狄女叔隗之子也子餘辭子餘趙衰字也姬曰得寵而忘舊何以使人必逆之固請許之來以盾為才固請于公以為嫡子而使其三子下之以叔隗為內子而已下之卿之嫡妻為內子又昭元曰鄭徐吾犯之妹美公孫楚聘之矣楚子南穆公孫也公孫黑又強使委禽焉禽鴈也納采用鴈犯懼告子產子產曰是國無政非子之患也唯所欲與犯請於二子請使女擇焉皆許之子晢盛飾而入布幣而出子晢公孫黑也子南戎服而入左右射超乘而出女自房觀之曰子晢信美矣抑子南夫也夫夫婦婦所謂順也適子南氏又莊公曰宋華父督見孔父之妻于路目逆而送之曰美而豔又曰楚子滅息以息媯歸生堵敖及成王焉未言未與王言楚子問之對曰吾一婦人而事二夫縱不能死其又奚言又成下曰晉三卻害伯宗譖而殺之初伯宗每朝其妻必戒之曰盜憎主人民惡其上子好直言必及於難又襄四曰齊棠公之妻東郭偃之姊也東郭偃臣崔武子棠公死偃御武子以弔焉見棠姜而美之美其色也使偃取之為己取也偃曰男女辨姓今君出自丁臣出自桓不可武子筮之遇困之大過以示陳文子文子曰夫從風風隕妻不可娶也且其繇曰困于石據于蒺藜入于其宮不見其妻凶崔子曰嫠也何害先夫當之矣遂取之又僖下曰初臼季使過冀見冀鈌耨其妻饁之敬相待如賓與之歸言諸文公曰敬德之聚也能敬必有德德以治民請君用之文公以為下軍大夫又昭七曰晉叔向適鄭鬷薎惡欲觀叔向從使之收器者而往立於堂下一言而善叔向聞之曰必鬷明也下執其手以上曰昔賈大夫惡取妻而美三年不言御以如皋射雉獲之其妻始笑而言賈大夫曰才之不可以已也我不能射汝遂不言不笑也今夫子少不揚子若不言吾幾失子矣又哀上曰齊侯伐晉夷儀弊無存之父將室之辭以與其弟無存齊人也室之為取婦也曰此役也不死反必娶於高國高氏國氏齊貴族也無存欲必有功還取卿相之女也又成上曰齊晉戰于鞍齊師敗績齊侯見保者曰勉之齊師敗矣避女子女子曰君免乎曰免矣曰銳司徒免乎曰免矣曰茍君與吾父免矣可若何乃奔侯俟以為有禮既而問之辟司徒之妻也予之石窌又成下曰魯聲伯之母不聘穆姜曰吾不以妾為姒生聲伯而出之嫁于齊管于奚生二子而寡以歸聲伯以其外弟為大夫而嫁其外妹於施孝叔郤犨來聘求婦於聲伯聲伯奪施氏婦以與之婦人曰鳥獸猶不失伉儷子將若何曰吾不能死亡婦人遂行生二子於郤氏郤氏亡晉人歸之施氏逆諸河沈其二子婦人怒曰己不能庇其伉儷而亡之又不能字人之孤而殺之將何以終春秋漢含孳曰水火交感陰陽以設夫婦象也水火則陰陽也陰陽則夫婦也又曰妻象太陰臣法金位金陰中之剛故喻臣位水能純柔純柔妻象也戰國策曰鄒忌長八尺有餘身體逸麗朝服衣冠窺鏡謂其妻曰我孰與城北徐公徐公齊國之美麗者也妻曰愈窺鏡而自視不如遠矣暮寢而思之吾妻之美我私我也史記曰晉重耳謂其妻曰待我二十五年不來乃嫁其妻笑曰犂二十五年吾冢上柏大矣雖然妾待子又曰易基乾坤詩始關睢夫婦之際人道大倫也禮之用唯婚姻為競競又曰張儀已學而遊說諸侯嘗從楚相飲已而楚相亡璧門下意儀曰儀貧無行資必此人盜相璧共執儀掠笞數百不服釋之其妻曰嘻子無讀書遊說安得此辱乎張儀謂妻曰視吾舌尚在不其妻笑曰舌在也儀曰足矣乃遂入秦秦王以為客卿又曰吳起好用兵事魯君齊人攻魯欲將起以起取齊女為妻而疑之起欲就名遂殺其妻以明不與齊魯卒以為將攻齊大破之又曰外黃富人女甚美嫁庸奴其夫徐廣曰一云其夫亡去抵父客如淳曰父時故賓客父客素知張耳乃卒為請決嫁張耳張耳是時脫身游女家厚奉給張耳以故致千里客及官魏為外黃令名由此益賢, WYG: ''}
