  - {type: variant, offset: 1191, length: 224, content: 必逆之固請許之來以盾為才固請于公以為嫡子而使其三子下之以叔隗為內子而已下之卿之嫡妻為內子又昭元曰鄭徐吾犯之妹美公孫楚聘之矣楚子南穆公孫也公孫黑又強使委禽焉禽鴈也納采用鴈犯懼告子產子產曰是國無政非子之患也唯所欲與犯請於二子請使女擇焉皆許之子晢盛飾而入布幣而出子晢公孫黑也子南戎服而入左右射超乘而出女自房觀之曰子晢信美矣抑子南夫也夫夫婦婦所謂順也適子南氏又莊公曰宋華父督見孔父之妻于路目逆而送之曰美而豔又曰楚子滅息以息媯歸生堵敖及成王焉未言未與王言楚子, SBCK: 日一}
