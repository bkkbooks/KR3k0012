  - {type: variant, offset: 2168, length: 319, content: 妻曰愈窺鏡而自視不如遠矣暮寢而思之吾妻之美我私我也史記曰晉重耳謂其妻曰待我二十五年不來乃嫁其妻笑曰犂二十五年吾冢上柏大矣雖然妾待子又曰易基乾坤詩始關睢夫婦之際人道大倫也禮之用唯婚姻為競競又曰張儀已學而遊說諸侯嘗從楚相飲已而楚相亡璧門下意儀曰儀貧無行資必此人盜相璧共執儀掠笞數百不服釋之其妻曰嘻子無讀書遊說安得此辱乎張儀謂妻曰視吾舌尚在不其妻笑曰舌在也儀曰足矣乃遂入秦秦王以為客卿又曰吳起好用兵事魯君齊人攻魯欲將起以起取齊女為妻而疑之起欲就名遂殺其妻以明不與齊魯卒以為將攻齊大破之又曰外黃富人女甚美嫁庸奴其夫徐廣曰一云其夫亡去抵父客如淳曰父時故賓客父客素知張耳乃卒為請決嫁張耳張耳是時脫身游女家厚奉給張耳以故致千里客及官魏為外黃令名由此益賢, SBCK: ''}
