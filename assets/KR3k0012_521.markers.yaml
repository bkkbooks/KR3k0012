  - {type: variant, offset: 152, length: 2, content: 草蟲, WYG: 曽子問子游問曰喪慈母如母禮與如母謂父卒三年也孔子曰非禮也古者男子外有傅内有慈母君命所使教子也何服之有言無服也昔者魯昭公少喪其母有慈母良及其死也公弗忍也欲喪之有司以聞曰古之禮慈母無服今也君為之服是逆古之禮而亂國法也若終行之則有司將書之以遺後世無乃不可乎公曰古者天子練冠以燕居公弗忍也遂練冠以喪慈母喪慈母自魯昭公始也左傳襄九曰宋}
