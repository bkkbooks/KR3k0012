  - {type: variant, offset: 947, length: 242, content: 孰親其母曰人盡夫也父一而已胡可比焉婦人在室則天父出則天夫女以為疑故母以所生為本解之遂告祭仲曰雍氏舍其室而將享子于郊吾惑之以告祭仲殺雍糾尸諸周氏之汪公載以出曰謀及婦人宜其死也又莊公曰初懿氏卜妻敬仲其妻占之曰吉是謂鳳凰于飛和鳴鏘鏘有媯之後將育于姜五世其昌並為正卿八世之後莫之與京又僖中曰狄人伐廧咎如赤狄之別種獲其二女叔隗季隗納諸晉公子公子以叔隗妻趙衰生盾文公取季隗生伯儵後以妻趙衰生原同屏括樓嬰原屏樓三子之邑也趙姬逆盾與其母趙姬文公女也盾狄女叔隗之子也子餘辭子餘趙衰字也姬曰得寵而忘舊何以, SBCK: ''}
