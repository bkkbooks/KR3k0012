  - {type: variant, offset: 2573, length: 2, content: 字少, SBCK: 我見舅氏如母存焉及其即位思之而作是詩也我送舅氏曰至渭陽何以贈之路車乗黄我送舅氏悠悠我思何以贈之瓊瑰玉佩也儀禮曰舅母之昆弟也傳曰何以服緦從服也言從母服也禮記檀弓曰從母之夫舅之妻二夫人相爲服}
