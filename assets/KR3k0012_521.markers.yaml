  - {type: variant, offset: 391, length: 334, content: 碩人曰碩人其頎衣錦褧衣齊侯之子衛侯之妻又氓曰女也不爽士貳其行士也罔極二三其德三歲為婦靡室勞矣夙興夜寐靡有朝矣又棠棣曰妻子好合如鼓瑟琴好合志意合也合者如琴瑟之聲相應和也兄弟既翕和樂且湛宜爾家室樂爾妻孥是究是圖亶其然乎又南山曰藝麻如之何橫縱其畝取妻如之何必告父母取妻之禮議於生者卜於死者此之謂名析薪如之何匪斧不克取妻如之何匪媒不得此言取妻必待媒乃得也又韓弈曰韓侯取妻汾王之甥蹶父之子韓侯迎止于蹶之里百兩彭彭八鸞鏘鏘不顯其光諸娣從之祁祁如雲韓侯顧之爛其盈門如雲言眾多也諸侯一娶九女三國媵之諸娣眾妾也顧之曲顧道義也又思齊曰刑于寡妻至于兄弟以御于家邦言文王以禮法接待其妻至於宗族以此又能為政治於家邦也禮記曰天子之妃曰后諸侯曰夫人大夫曰孺人士曰婦人婦人言服也庶人曰妻妻之言齊也又內, WYG: 内}
