  - {type: variant, offset: 2568, length: 2, content: 桓氏, SBCK: 不順父母無子滛僻嫉妬惡疾多口舌􅀼盗不順父母者爲其逆德也無子者爲其絶丗也􅁋僻者爲其亂族也嫉妬者爲其亂家也惡疾者爲其不可供粢盛也多口舌者爲其離親也􅀼盗者爲其反義也三不去者謂有所取無所歸也與其經三年之䘮也先貧賤後冨貴也凡此皆聖人所以慎男女之際重婚姻之始也又曰曽子妻以炊藜蒸不熟出之古樂府詩曰上山採􅐘蕪下山逢故夫迴首問故夫新人復何如舅舅母釋名曰舅乆也爾雅曰母之昆弟爲舅毛詩􅁗風曰渭陽康公念母也康公之母晉獻公}
