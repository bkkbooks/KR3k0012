  - {type: variant, offset: 840, length: 8, content: 忽如陳逆婦媯辛亥, SBCK: 何不疾行陛下巳壯矣寜尚湏汝乳而活耶於是武帝憐之乃下詔止無徙乳母後漢書曰安帝時鄧太后臨朝帝不親政事小黄門李閏與帝乳母王聖甞共譛太后兄執金吾鄧悝等言欲廢帝立平原王德帝毎忿懼及太后崩遂誅鄧氏而王聖女伯榮扇動内外競爲侈虐明年帝崩立北郷侯爲天子王聖及黨與皆見徙王隠晋書曰賈充子􅀺民三歲乳母抱向閤充入􅀺民喜踊充嗚之充夫人郭槐遥望疑充即鞭殺乳母兒思母病死槐又生男向歳乳母抱中庭充過拈兒頰郭又疑之復鞭殺乳母兒又死充遂無嗣譚藪曰宋何承天爲著作郎時新著作多貴遊少年或戲承天謂爲妳母承天曰鳯凰將九子妳母何言耶妾禮記曲禮曰買妾不知其姓則卜之又内則曰聘則爲妻奔則爲妾妾之言接也聞佼有禮走而徃焉}
