  - {type: variant, offset: 4255, length: 584, content: 妻謝氏字道韞弈之女也初適凝之還甚不樂弈曰王郎逸少子不惡汝何恨也荅曰一門叔父則有阿父中郎群從兄弟則有胡封羯末不意天壤之中乃有王郎又曰王導為丞相妻曹氏性妒導甚憚之乃密營別館以處眾妾曹氏知而將往焉導恐妾被辱遽命駕猶遲之以所執塵尾柄驅牛而進司徒蔡謨聞之戲導曰朝廷欲加公九卿之命弗之覺但謙退而已謨曰不聞餘物唯有短轅犢車長柄塵尾導大怒謂人曰往與群賢共遊洛中何曾聞有蔡克兒也崔鴻前秦錄曰秦州剌史竇滔妻彭城令蘇道之女有才學織錦製廻文詩以贖夫罪劉向列女傳曰魯有秋胡子既納妻五日而官於陳五年乃歸未至其家見路徬有美婦人方採桑葉秋胡子說之下車謂曰苦暴獨採桑吾行道遠願託桑蔭下一飡於是下齎休焉婦人採桑不輟秋胡子謂曰力田不如逢年力桑不如見郎今吾有金願以與夫人婦人曰嘻夫採力作紡績織絍以供衣食奉二親養夫子而已矣吾不願人之金所願願卿事上無有外意妾事夫家亦無淫佚之志子去矣收子之齎與子笥金秋胡子遂去歸至家奉金遺其母母使人呼其婦至乃向採桑者也胡秋子見之而慚婦曰子束髮脩身辭親往仕五年乃還當驩喜乍馳乍驟揚塵疾至思見親今者乃說路旁婦人而下子之裝以金予之是志母也志母不孝好色淫泆是汙行不義夫事親不孝則事君不忠處家不義則治官不理孝義並亡於身必不遂妾不忍見不孝不義之人子改娶矣妾亦不嫁遂去東而走自投於河而死又曰晉宗伯妻者晉大夫伯宗之妻也謂伯宗曰子之性固不可易也且國家多貳其危可立而待也子何不豫結賢大夫以託州黎焉伯宗, SBCK: ''}
