  - {type: variant, offset: 445, length: 0, content: '', WYG: 者人之終處常得終又何憂乎孔子曰善吕氏春秋曰伯牙鼓琴鍾子期聴之方鼓琴志在太山鍾子期曰善哉乎鼓琴巍巍乎如太山志在流水鍾子期曰善哉乎鼓琴茫茫乎若流水鍾子期死伯牙擗琴絶絃終身不復鼓琴列仙傳曰華山毛女獵即見常居岩弹琴桓譚新論曰神農氏繼宓羲而王天下亦上觀法於天下取法於地近取諸身逺取諸物於是始削桐為琴繩絲為絃以通神明之徳合天地之和}
