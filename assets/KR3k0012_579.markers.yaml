  - {type: variant, offset: 1355, length: 224, content: 者也已上自堯神人暢至始皇九十三弄好士二十七人並為上石又曰杞梁妻者齊邑杞梁殖妻之所作也莊公襲莒殖戰而死莊公還遇其妻於路使使者道吊之妻曰今殖有罪君何辱命焉若殖免於罪賤妾有先人之弊廬妾不敢受郊吊也公乃吊諸室成禮而去妻歎曰上則無父中則無夫下則無子外無所依內無所倚將何以立吾節豈能更二哉死而己矣於是乃援琴而鼓之又曰伐檀操者魏國女之所作也傷賢者隱弊素飱在位閔傷怨曠失其嘉會夫聖主之制能治人者食於人不能治人者食於田今賢者隱退伐木小人在位食祿懸珍琦積百穀并包有土德, SBCK: 牧羊巨}
