  - {type: variant, offset: 4183, length: 384, content: 姓巢居不安堯乃徵禹而使治之乃決江河上會稽山顧曰嗚呼洪水滔天下人愁悲上帝俞咨三過吾門不入父子道襄非欲伐功也傷君莫知不欲煩下民嗟乎天非欲數煩下嗟嗟不欲煩下民自是之後百姓降丘黎庶乂安彈琴以自歎故曰禹上會稽又曰箕子吟者箕子之所作也箕子紂之諸父也紂為無道殺比干醢梅伯斮朝涉刳孕婦奢淫驕恣不修道德箕子不可諫乃被髮佯狂痛宗廟之丘墟喟然援琴而鼓之又曰文王思士者文王之所作也文王思得賢士與為治出田迺援蓍而卜之卦得所獲非龍非麟非虎非熊迺帝王之師也至渭之陽果遇呂尚與語大悅之曰吾先人太公有言當有聖人適周子其是邪遂載與之俱歸立以為師號曰太公望文王悅喜乃援琴而鼓之自敘思士之意故曰文王思士又曰武王伐紂者武王之所作也武王興師伐紂伯夷叔齊拔劍扣馬曰父死不葬而爭天下非孝也執贄而事之舉兵而伐之非義也武王以告太公望太公曰循大行者不顧細禮立大功者不恤後愆遂剋殷誅紂於牧野於是天下晏然萬民懽忻武王援琴而鼓之, SBCK: 七十九}
