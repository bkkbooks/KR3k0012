  - {type: variant, offset: 2690, length: 245, content: 所欲誅季氏而力不能於是援琴而歌又曰白駒操者失朋友之所作也其友賢俱仕乎襄亂之世君無道不可匡輔依違微風諒不見受國士詠而思之援琴而長歌又曰越嘗操者周公之所作也周公輔相成王成就文王之道天下太平萬國和會江黃納貢越嘗重九譯而來獻白雉執贄曰吾君在外國也頃無迅風暴雨意者中國有聖人乎故遣臣來周公於是仰天而歎之援琴而歌又曰拘幽操者文王之所作也紂為無道上逆天文下變地理刑無罪殺不辜斮朝涉刳孕婦百姓怨悲海內同心苦之文王為西伯種德修仁布其恩惠天下三分有其二紂大怒其有仁心也召而朝之拘於羑里文王憂愁援琴而鼓之故曰拘幽, SBCK: ''}
