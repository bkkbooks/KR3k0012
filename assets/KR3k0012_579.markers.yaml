  - {type: variant, offset: 965, length: 3, content: 君胡茄, SBCK: 之德合天人之和焉琴書曰師曠晉之樂官也上於琴能易寒暑召風􅀨爲晉平公皷之感玄鶴六下舞西京雜記曰張安丗十五爲成帝侍中善皷琴能爲􅀟鳯離鸞之曲丗􅀃顧彦先平生好琴及䘮家人常以琴置靈牀上張季鷹性哭顧不勝慟遂徑上牀皷琴作數曲而去又曰㑹稽賀思令善彈琴常夜在月中坐臨風鳴絃忽有一人形皃甚偉著械有􅃤色在中庭稱善便與共語自云是嵇中散謂賀云卿手下極快但於古法未備因授以}
