  - {type: variant, offset: 1034, length: 137, content: 師襄子夫子琴師也方子春教成連生鼓琴能化人情者也成連先生教伯牙鼓琴者也鍾子期善聽知音者子期死伯牙終身不鼓琴者也顏淵聽夫子琴知周襄者也涓子操琴心玉篇者也禽高以琴養性求仙於羅浮山中鼓琴於郢中奏陽春白雪者也雍門周以琴感孟嘗君悲者也鄒忌與齊王言琴事以方正定德者也榮啟期對夫子彈琴言三樂, SBCK: 勝}
