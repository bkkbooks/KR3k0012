  - {type: variant, offset: 391, length: 1, content: 別, WYG: 此師延之作紂為靡靡之樂及武王伐紂延東走至於濮水而自投聞此聲者必於濮水之上先聞者其國削不可聽此平公曰此何聲也曰此所謂清商也公曰清商固宜悲乎師曠曰不如清徴公曰清徴可得聞乎師曠曰不可古之聴清徴者皆有徳義之君今主君徳薄不足以聴之平公曰願試聴之師曠不得已援琴一奏之有𤣥}
