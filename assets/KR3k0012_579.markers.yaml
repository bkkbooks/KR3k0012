  - {type: 'tls:seg', offset: 14, content: '', id: KR3k0012_CHANT_579-1a.5}
  - {type: variant, offset: 14, length: 3, content: 伯牙學, SBCK: 琴先作諸弄而聞空中稱善聲中散撫琴而呼之曰君何以不來此人便云身是古人幽没於此數千年矣聞君彈琴音曲清和故來聽耳而就終殘毀不冝以接侍君子向夜髣髴漸見以手持其頭遂與中散共論聲音其辝清辯謂中散君試過}
  - {type: variant, offset: 14, length: 3, content: 伯牙學, WYG: 琴先作諸弄而聞空中稱善聲中散撫琴而呼之曰君何以不来此人便去云身是古人幽没於此數千年矣聞君弹琴音曲清和故来聽耳而就終殘毁不宜以接侍君子向夜髣髴漸見以手持其頭遂與中散共論聲音其辭清辨謂中散君試過}
  - {type: page-break, offset: 14, content: '', id: KR3k0012_WYG_579-3a, image: WYG0898/WYG0898-0310c.png}
  - {type: variant, offset: 14, length: 3, content: 伯牙學, krp: 琴先作諸弄而聞空中稱善聲中散撫琴而呼之曰君何以不來此人便云身是古人幽没於此數千年矣聞君彈琴音曲清和故來聽耳而就終殘毀不冝以接侍君子向夜髣髴漸見以手持其頭遂與中散共論聲音其辝清辯謂中散君試過}
  - {type: variant, offset: 19, length: 2, content: 成連, SBCK: 是中散以琴授之旣彈悉作衆曲亦不出常唯廣陵散絶倫中散纔從受之半夕悉得與中散誓不得教他人又不得言其姓也琴書曰昔者至人伏羲氏王天下也仰觀象於天俯察法於地逺取諸物近取諸身始畫八卦削桐爲琴又曰自堯相傳善琴者八十餘人有八十餘様雖少有差大體相似皆長三尺六寸法朞之數也上圎而歛象天也下方相平法地十三徽配十二律餘一象閏也夲五絃宫啇角徴羽也加二絃文武也至後漢蔡邕又加二絃象九星在人法九竅其様有異傳於代四所象鳯首翅足尾南方朱雀爲樂之主也五分其身以三爲上以二爲下三天兩地之義也上廣下狹尊卑之象也中翅八寸象八風腰廣四寸象四時軫圎象陽轉而不窮也臨樂承露用􅀥脣用梓未逹}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_SBCK_579-2b}
  - {type: variant, offset: 19, length: 2, content: 成連, WYG: 是中散以琴授之既弹悉作衆曲亦不出常唯廣陵散絶倫中散纔從受之半夕悉得與中散誓不得教他人又不得言其姓也琴書曰昔者至人伏羲氏王天下也仰觀象於天俯察法於地逺取諸物近取諸身始畫八卦削桐為琴又曰自堯相傳善琴者八十餘人有八十餘様雖少有差大體相似皆長三尺六寸法朞之數也上圓而歛象天也下方相平法地十三徽配十二律餘一象閏也本五絃宫商角徴羽也加二絃文武也至後蔡邕又加二絃象九星在人法九竅其様有異傳於四代所象鳳首翅足尾南方朱雀為樂之主也五分其身以三為上以二為下三天兩地之義也上廣下狹尊卑之象也中翅八寸象八風腰廣四寸象四時軫圓象陽轉而不窮也臨樂承露用棗唇用梓未逹}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_WYG_579-3b, image: WYG0898/WYG0898-0310d.png}
