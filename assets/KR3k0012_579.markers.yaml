  - {type: variant, offset: 1172, length: 156, content: 事者也禽孟臨巒戶死而琴歌者也應侯鼓賈子對以取牛婦人者也子桑飢寒欲死鼓琴而歌者也師曠為晉平公探微感玄鶴二七下舞者也師涓寫濮上琴聲者也子夏除喪曰琴樂曰不敢不至者也閔子騫除喪曰彈琴不成聲者也宓子賤治單父不下堂彈琴而邑自理者也踞轉鼓琴春秋晉大夫張骼輔轢者也衛師曹衛獻公令師曹教公嬖妾師曹鞭之公怒之鞭師曹三百者又曰冠先生宋, SBCK: 逸}
