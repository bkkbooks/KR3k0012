  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 七琴下三禮圗曰琴第一絃爲宫次爲啇次爲角次爲徴次爲羽次爲少宫次爲少啇廣雅曰伏羲氏琴長七尺二寸上有五絃孫登別傳曰孫登字公和汲郡人清静無爲好讀易彈琴頽然自得觀其風神􅀂遊}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 七琴下三禮圖曰琴第一絃為宫次為商次為角次為徴次為羽次為少宫次為少商廣雅曰伏羲氏琴長七尺上有五絃孫登别傳曰孫登字公和汲郡人清静無為好讀易弹琴頽然自得觀其風神若遊}
