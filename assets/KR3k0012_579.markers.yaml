  - {type: variant, offset: 944, length: 24, content: 送遠幽蘭曰雪長清短清長側清調瑟調大遊小遊明君胡茄, WYG: 鳴絃忽有一人形貌甚偉著械有慘色在中庭稱善便與共語自云是嵇中散謂賀云卿手下極快但於古法未備因授以}
  - {type: variant, offset: 945, length: 1, content: 遠, SBCK: 逺之操淮南子曰孟春東宫御女青色采衣皷琴瑟琴瑟木也春木王桓譚新論曰神農氏爲琴七絃足以通萬物而考理乱也又曰八音之中唯􅁝最爲宻而琴爲之首應邵風俗通曰琴者樂之與八音並行君臣以相御也孔叢子曰孔子晝息於室而皷琴閔子自外聞之以告曽子曰嚮子之音清微而和淪入至道今也更爲}
