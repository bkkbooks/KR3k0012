  - {type: variant, offset: 2107, length: 161, content: 王聞曰子琴音何苦哀也革子推琴離席長跪涕流而下對臣友三人石丈子叔愆子竊慕大王高義欲俱來謁至於磝磽嶔岩之間逢飄風暴雨衣寒糧乏度不能俱活二子俱不以臣為不肖推糧與臣二子逢凍餓死大王雖陳酒餚設樂誠不敢酣樂也楚王曰嗟乎乃如是耶於是賜其思革子黃金百斤命左右棺斂收二子而葬之以其思革子為相故曰三士窮又曰鹿鳴操者周大臣之所作也王道襄君志傾留, SBCK: 氣感發善}
