  - {type: variant, offset: 476, length: 462, content: 雉耶言未卒俱飛而起忽而不見傅母悲痛援琴作操故曰雉朝飛琴操曰古琴曲有歌詩五曲一曰鹿鳴二曰伐檀三曰騶虞四曰鵲巢五曰白駒又有十二操一曰將歸操孔子所作孔子之趙聞殺鳴犢而歸作此曲也二曰倚蘭操孔子所作傷不逢時三曰龜山操孔子作季桓子受齊女樂孔子欲諫不得退而望魯龜山作曲喻季氏若龜山之蔽魯也四曰越裳操周公所作五曰拘幽操文王作文王拘於羑里作此曲六曰歧山操周人為太王所作七曰履霜操尹吉甫子伯奇無罪見逐自傷作此曲八曰雉朝飛操沐犢子所作沐犢子七十無妻見雉雙飛感之作此曲也九曰別鶴操商陵牧子所作娶妻五年無子父母欲改娶其妻聞之中夜悲牧子因之作此曲十曰殘形操曾子夢見一貍不見其足而作曲十一曰水僊操伯牙所作十二曰壞陵操伯牙所作又有九引一曰列女引楚樊姬所作二曰伯姬引魯伯姬所作三曰貞女引魯漆室女所作四曰思歸引衛女所作五曰霹靂引楚商梁出遊九皋之澤遇風雷霹靂畏懼而歸作此引六曰走馬引樗里牧恭所作牧恭為父報冤殺人而亡藏於山林之下有天馬引之感作此引七曰箜篌引霍里子高所作即公無渡河曲八曰琴引秦時屠門高所作九曰楚引楚龍丘子高所作又有河間雜歌二十一章琴歷曰琴曲有蔡氏五弄, WYG: ''}
