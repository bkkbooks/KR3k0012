  - {type: variant, offset: 22, length: 1, content: 生, SBCK: 賢􅀷意也又曰琴髙以琴飬性􅀄學於羅浮山後遊四海或傳禽髙非也又曰舜彈五絃之琴以歌南風之詩豈唯道在思親志兼憂民養萬物故感之又曰穎陽西北界李氏處女年十五六天寳八年二月遘疾七月不食魂飛􅄀􅄀如昇上景在雲霧中女仙人蘆藕苗間受琴清風弄等五十曲至天寳十五載五月留守悲逈御史中丞蔣列馹􅀐上聞玄宗度爲女道士賜琴}
  - {type: page-break, offset: 22, content: '', id: KR3k0012_SBCK_579-3a}
  - {type: variant, offset: 22, length: 1, content: 生, WYG: 賢深意也又曰琴髙以琴養性初學於羅浮山後遊四海或傳禽髙非也又曰舜弹五絃之琴以歌南風之詩豈唯道在思親志兼憂民養萬物故感之又曰潁陽西北界李氏處女年十五六天寳八年二月遘疾七月不食䰟飛㝠㝠而昇上景在雲霧中於女仙人蘆藕苗間受琴清風弄等五十曲天寳十五載五月留守裴廻御史中丞蒋列驛騎上聞𤣥宗度為女道士賜琴}
  - {type: page-break, offset: 22, content: '', id: KR3k0012_WYG_579-4a, image: WYG0898/WYG0898-0311a.png}
  - {type: variant, offset: 22, length: 1, content: 生, krp: 賢深意也又曰琴髙以琴飬性𥘉學於羅浮山後遊四海或傳禽髙非也又曰舜彈五絃之琴以歌南風之詩豈唯道在思親志兼憂民養萬物故感之又曰穎陽西北界李氏處女年十五六天寳八年二月遘疾七月不食魂飛冥冥如昇上景在雲霧中女仙人蘆藕苗間受琴清風弄等五十曲至天寳十五載五月留守悲逈御史中丞蔣列馹騎上聞玄宗度爲女道士賜琴}
