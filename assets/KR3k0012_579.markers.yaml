  - {type: variant, offset: 962, length: 2, content: 小遊, SBCK: 於泰山見榮啓期行郕之野鹿裘帶索抱琴而舞孔子問曰先生爲樂何也對曰天生萬物唯人爲貴吾旣爲人一樂也男尊女卑吾旣爲男二樂也人生有不見日月不免襁褓吾行年九十五歳矣三樂也貧者士之常死者人之終處常得終又何憂乎孔子曰善吕氏春秋曰伯牙皷琴鍾子期聽之方皷琴志在泰山鍾子期曰善哉乎皷琴巍巍乎如泰山志在流水鍾子期曰善哉乎皷琴茫茫乎􅀂流水鍾子期死伯牙擗琴絶絃終身不復皷琴以爲丗無足以皷琴也列仙傳曰華山毛女獵即見常居岩彈琴桓譚新論曰神農氏継宓羲而王天下亦上觀法於天下取法於地近取諸身逺取諸物於是始削桐爲琴䋲􅁝爲絃以通神}
