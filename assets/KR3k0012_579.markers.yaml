  - {type: variant, offset: 11, length: 2, content: 水僊, SBCK: 魏武帝宫人有盧女者故將軍隂叔之姨也七歳入漢宫學皷琴琴特鳴異善爲新聲阮籍樂論曰漢帝聞楚琴􅀝扆而悲慷􅁣長息曰善哉爲聲􅀂此而足矣昔季流向風而皷琴聽之者涙下列仙傳曰稷丘公華山道士漢武帝封禪公乃冠章甫擁琴來迎靈異志曰嵇中散神情髙邁任心遊憇甞行西南出去洛數十里有亭名華陽投􅀫夜了無人獨在亭中此亭由來殺人􅀫者多㓙至一更中}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_SBCK_579-2a}
  - {type: variant, offset: 11, length: 2, content: 水僊, WYG: 魏武帝宫人有盧女者故将軍隂叔之子也七嵗入漢宫學鼓琴琴特鳴異善為新聲阮籍樂論曰漢帝聞楚琴倚扆而悲慷慨長息曰善哉為聲若此而足矣昔季流向風而鼓琴聽之者淚下孤山傳曰稷丘公華山道士漢武帝封禅公乃冠章甫擁琴来迎靈異志曰嵇中散神情髙邁任心遊憇甞行西南出去洛數十里有亭名華陽投宿夜了無人獨在亭中此亭由来殺人宿者多㓙至一更中}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_WYG_579-2b, image: WYG0898/WYG0898-0310b.png}
