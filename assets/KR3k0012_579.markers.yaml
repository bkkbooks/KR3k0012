  - {type: variant, offset: 4, length: 0, content: '', SBCK: 合之外者當魏末居北山中石窟爲宇編草自覆阮嗣宗見登􅀍髪端坐岩下逍遥然皷}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 合之外者當魏末居北山中石窟為宇編草自覆阮嗣宗見登披髪端坐岩下逍遥然鼓}
  - {type: variant, offset: 4, length: 0, content: '', krp: 合之外者當魏末居北山中石窟爲宇編草自覆阮嗣宗見登𬒳髪端坐岩下逍遥然皷}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 嗣宗自下趍進兾得與言嗣宗乃長嘯與琴音諧㑹登因嘯和之妙響動林壑洞􅁳記曰帝􅁪夕望東邊有青雲俄見􅀟白鵠集於䑓上倐忽變爲二神女舞於樓下握鳯管之簫舞落霞之琴歌清吴春波之曲也劉向別録曰雅琴之意事皆出龍德諸琴􅄂事}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_579-1b}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 嗣宗自下趨進莫得與言嗣宗乃長嘯與琴皆諧和登因嘯和之響動林壑洞㝠記曰帝恒夕望東邊有青雲俄見雙白鵠集於䑓上倐忽變為二神女舞於樓下握鳳管之簫拊落霞之琴歌清呉春波之曲也劉向别錄曰雅琴之意事皆出龍徳諸琴雜事}
