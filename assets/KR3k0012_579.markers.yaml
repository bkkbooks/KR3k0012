  - {type: variant, offset: 2426, length: 263, content: 嘉會內無怨女外無曠夫及周道襄微禮義廢弛強陵弱眾暴寡萬民騷動百姓愁苦男怨於外女傷於內內外無主內迫情性外迫禮義歎傷所說而不逢時於是援琴而歌又曰猗蘭操者孔子之所作也孔子周流天下應聘諸侯莫能任用自衛反魯過隱之中見薌蘭之獨茂也喟然而歎曰夫蘭當為王者香今乃獨茂與眾草為伍譬猶賢者不逢時與鄙夫為倫也憑車撫軾援琴而鼓之自傷不逢時也又曰龜山操者孔子之所作也齊人饋女樂季桓子受之魯君閉門不聽朝當此之時季氏專政上僣天子下畔大夫賢聖斥遂讒邪滿朝孔子欲諫而不聽復退而望魯魯有龜山蔽之譬季子於龜山託勢位於斧柯季氏專政道猶龜山之蔽魯也傷政道之不用閔百姓不得, SBCK: ''}
