  - {type: variant, offset: 5, length: 0, content: '', krp: 嗣宗自下趍進兾得與言嗣宗乃長嘯與琴音諧㑹登因嘯和之妙響動林壑洞冥記曰帝恒夕望東邊有青雲俄見雙白鵠集於䑓上倐忽變爲二神女舞於樓下握鳯管之簫舞落霞之琴歌清吴春波之曲也劉向別録曰雅琴之意事皆出龍德諸琴雜事}
