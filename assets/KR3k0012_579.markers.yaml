  - {type: variant, offset: 1580, length: 467, content: 不加百姓傷痛上之不知王道之不施仰天長嘆援琴而鼓之又曰將歸操者孔子之所作也趙簡子循執玉帛以聘孔子孔子將往未至渡狄水聞趙殺其賢大夫竇鳴犢喟然而歎曰夫趙之所以治者鳴犢之力也殺鳴犢而聘余胡丘之往也夫燔林而田則麒麟不至覆巢破卵則鳳皇不翔鳥獸尚惡傷類而況君子哉於是援琴而鼓之又曰歧山操者周大臣之所作也大王居豳狄人攻之仁恩惻隱不忍流血選練珍寶犬馬皮幣束帛與之狄侵不止問其所欲欲得土地大王曰土地者所以養萬民也吾將委國而去矣二三子亦何患無君焉遂杖策而出喻乎梁而邑乎歧山自傷劣不能化夷狄為之所侵喟然歎息援琴而鼓之又曰三士窮操者其思革子之所作也其思革子石文子叔愆子三人相與為友聞楚城子賢而好士三子相與俱往見之至於磝磽嶔岩之間卒逢飄風暴雨相與俱伏空柳之下衣寒乏糧自度不得活三人相視而歎曰與其飢寒俱死也豈若併衣糧於一人哉二人俱以其思革子為賢推衣糧與之革子曰死則共之今二子以賢愚相辭乃以死讓孰賢哉辭而不受二子曰吾自以相與猶左右手也左傷則右救之右傷則左救之子不我受俱死無名於世不亦痛乎於是思革子乃受之二子遂凍餓而死其思革子抱二子尸而埋之號天哭泣竭哀而去往見於楚王楚, SBCK: 漢}
