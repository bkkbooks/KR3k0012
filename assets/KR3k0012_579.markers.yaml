  - {type: variant, offset: 393, length: 3, content: 操揚雄, WYG: 二八南方來集於廊門之扈再奏之成列三奏之延頸而鳴舒翼而舞平公大恱提觴而起為師曠夀曰音莫悲於清徴乎師曠曰不如清角平公曰清角可得聞乎師曠曰不可昔者黄帝合鬼神於西山之上駕象車六蛟龍畢方並舘蚩尤居前風伯進掃雨師洒道虎狼潜形䖝蛇伏地鳳凰覆上大合鬼神作為清角今主君徳薄不足以聴之平公曰願試聴之師曠不得已而鼓之一奏之有雲從西北方起再奏之大風至大雨隨之裂帷幕破爼豆墮廊瓦坐者散走平公恐懼伏於廊室晉國大旱赤地西京雜記曰趙后有寳}
