  - {type: variant, offset: 26, length: 1, content: 成, SBCK: 流所感無􅁪也又曰師㳙紂之樂官也善皷琴感四馬嘘天仰秣或曰師曠傳雖二疑即是一風俗通曰琴者樂之統也君子所常御不離於身非􅀂鍾皷陳於宗廟列於簴懸也以其大小得中而聲音和大聲不諠譁而流漫小聲不湮滅而不聞適足以和人意氣感發善心也琴書曰堯大德堯彈感天神降聽儼然言和之}
  - {type: variant, offset: 26, length: 1, content: 成, WYG: 流所感無恒也又曰師涓紂之樂官也善鼓琴感駟馬嘘天仰秣或曰師曠傳雖二疑即是一風俗通曰琴者樂之統也君子所常御不離於身非若鐘鼓陳於宗廟列於簴懸也以其大小得中而聲音和大聲不諠譁而流漫小聲不湮滅而不聞適足以和人意氣感發善心也琴書曰堯大徳堯弹感天神降聽儼然言和之}
