  - {type: variant, offset: 444, length: 0, content: '', WYG: 告曽子曰嚮子之音清微而和淪入至道今也更為幽沉之聲幽則欲之所為發也沉則貪得之所為施也夫子何所感一若斯乎吾從子入而問焉曽子曰諾二子入問孔子孔子曰然而是也吾有之嚮見狸方取鼠欲其得之故為音汝二人者孰識諸曽子對以閔子夫子曰可以聴音矣家語曰孔子遊於泰山見榮啟期行郕之野鹿裘帶索抱琴而舞孔子問曰先生為樂何也對曰天生萬物唯人為貴吾既為人一樂也男尊女卑吾既為男二樂也人生有不見日月不免襁褓吾行年九十五嵗矣三樂也貧者士之常}
  - {type: page-break, offset: 444, content: '', id: KR3k0012_WYG_579-9b, image: WYG0898/WYG0898-0313d.png}
