  - {type: variant, offset: 6, length: 0, content: '', SBCK: 趙氏者渤海趙定人也宣帝時元康神爵間丞相奏能皷琴者渤海趙定梁國龍德皆召入見温室使皷琴時閑燕爲散操多爲之涕泣者}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 趙氏者渤海人趙定也宣帝時元康神爵間丞相奏能鼓琴者渤海趙定梁國龍徳召入見温室使鼓琴時閑燕為散操多為之涕泣者也}
  - {type: variant, offset: 6, length: 0, content: '', krp: 趙氏者渤海趙定人也宣帝時元康神爵間丞相奏能皷琴者渤海趙定梁國龍德皆召入見温室使皷琴時閑燕爲散操多爲之涕泣者}
