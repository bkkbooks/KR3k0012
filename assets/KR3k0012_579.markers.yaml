  - {type: variant, offset: 3845, length: 337, content: 之瑞同時而應麒麟游苑圃鳳凰翔舞於庭頌聲並作僉然大同於是成王乃援琴而鼓之又曰子安者其門離須之作也其門離須兄弟三人長兄從軍二年不歸離須坐事被刑天下昏亂兵革騷動宗族離散離須當遠往輸持其小弟往寄所知分別相去垂涕而決其弟歔欷謂須曰吾生不賭母長不識父遭顛沛擾攘之世兄從軍不歸子復遠輸未知反期一旦是非使吾無所依吾聞兄在林梨欲往從之離須止之曰兵革交錯道路不通子為我無往往必不還令吾兄弟分別死別不亦痛乎喟然不應啼泣而別離須屬其主人曰子欲往慎為我勿遣也去數日卒夜亡不知其處離須來還分布求之卒不得憂思不樂仰天而歎於是援琴而鼓之又曰力拔山者項羽之所作也項王為漢所圍於垓下諸侯兵悉到圍數重項王夜覺聞漢軍四面楚歌驚起坐仰天而歎曰漢得吾眾是何楚歌之多於是心悲援琴而鼓之又曰禹上會稽者禹之所作也堯時洪水滔天, SBCK: 御覽卷第五}
