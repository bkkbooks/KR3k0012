  - {type: variant, offset: 976, length: 561, content: 送衣下至脂燭每有所食甘美輒分減以遺奇又曰鄧彪字伯智南陽人也父邯世祖中興從征伐以功封鄲侯彪少修孝行厲志清高與同郡宗武伯翟敬伯陳綏伯張弟伯同志好齊名稱南陽五伯彪以嫡長為世子邯薨彪當嗣爵讓國與異母弟鳳明帝高其節詔書聽許鳳襲爵彪仕州郡又曰朱勃字叔陽年十二能誦詩書常候馬援兄況勃衣方領能行步辭言閑雅援裁知書見之自失況知其意酌酒慰援曰朱勃小器速成智盡此耳卒當從汝稟學勿畏也勃未二十右扶風請試守渭城宰及援為將軍封侯而勃位不過縣令援後雖貴常待以舊恩而卑侮之勃愈自親及援遇讒唯勃能終焉又曰梁商字伯夏安定烏氏人常曰多藏厚亡為子孫累每租奉到及兩宮賞賜便置中門外未嘗入藏悉分與昆弟中外又曰吳漢嘗出征妻子在後買田業漢還讓之曰軍師在外吏士不足何多買田宅乎遂以分與昆弟外家又曰劉敞曾祖節侯買以長沙定王子封於陵道之舂陵侯敞父仁嗣侯以舂陵地勢下濕有山林毒氣上書求減邑內徙元帝初平四年徙南陽之白水鄉猶以舂陵為國名仁卒敞謙儉好義推父時金寶財產與昆弟荊州刺史上其義行拜盧江都尉又曰郭況為城門校尉況皇后弟貴重賓客輻湊而況恭儉謙遜遵奉法度不敢驕奢又曰鄭均字仲虞任城人也治尚書好黃老澹泊無欲清靜自守不慕遊宦兄仲為縣游徼頗受禮遺均數諫止不聽即脫身出歲餘得數萬錢歸以與兄曰錢盡可復得為坐吏贓終身捐棄兄感其語遂為廉潔稱清白吏又曰魯恭字仲康扶風人父為武陵太守卒官時恭年十二弟平, SBCK: ''}
