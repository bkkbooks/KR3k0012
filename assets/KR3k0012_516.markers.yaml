  - {type: variant, offset: 1763, length: 0, content: '', krp: 風俗通曰陳留太守㤗山吴文章少與兄伯武相失二十年後相㑹下邳市中爭計共闘伯武毆之文章欲報心悽悵手不能興觀者笑之更相借問乃親兄也相持啼泣觀者復曰兄得校弟不得報兄向者所笑乃其義也典論曰劉表疾病其}
  - {type: variant, offset: 1764, length: 0, content: '', SBCK: 􅄾還省疾􅄾性慈孝其弟恐􅄾見表父子相感更有託後之意謂曰將軍命君撫臨江夏爲國東藩其任至重今釋衆而歸必見譴怒傷歎以増其疾非孝敬也遂遏于戸外使不得見􅄾流涕而去江微陳留志曰李銓字玄機平丘人也少聦惠有志行銓兄全前母子後母甚不愛也而衣食皆使下銓銓始年五􅀊覺巳衣勝兄即脫不着湏兄得與巳}
