  - {type: variant, offset: 2294, length: 195, content: 傅父子冷如漿李豐兄弟如游光吳志曰諸葛瑾字子瑜琅邪陽郡人也為孫權長史建安二十年權遣瑾使蜀與其弟亮但公會相見退無私面又曰虞翻字仲翔會稽餘姚人也翻少好學有高氣年十二客有候其兄者不過翻翻追書與曰僕聞琥珀不取腐芥磁石不受曲針不亦宜乎客得書奇之由是見稱蜀志曰麋竺弟芳為南郡太守與關羽共事而私好攜貳叛迎孫權羽用覆敗芳面縛請罪先主慰喻以兄弟罪不相及崇寵如初晉書曰衛瓘有六男無爵悉讓二弟遠近稱之又曰劉寔字子真, SBCK: ''}
