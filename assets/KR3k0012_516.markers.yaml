  - {type: variant, offset: 2365, length: 442, content: 好學有高氣年十二客有候其兄者不過翻翻追書與曰僕聞琥珀不取腐芥磁石不受曲針不亦宜乎客得書奇之由是見稱蜀志曰麋竺弟芳為南郡太守與關羽共事而私好攜貳叛迎孫權羽用覆敗芳面縛請罪先主慰喻以兄弟罪不相及崇寵如初晉書曰衛瓘有六男無爵悉讓二弟遠近稱之又曰劉寔字子真平原高唐人也弟知字子房貞潔有兄風為頴川太守平原管輅嘗謂人曰吾與劉頴川兄弟語使人神思清發昏不假寐自此之外殆白日欲寤矣又曰何淮字幼道穆章皇后父也高尚寡欲弱冠知名州府交辟並不就兄充為驃騎勸其令仕淮曰第五之名何減驃騎淮兄弟中第五故有此言又曰周顗字伯仁性寬裕而友愛過人弟嵩嘗飲酒瞋目謂顗曰君才不及弟何橫得重名以所燃蠟燭投之顗神色無忤徐曰阿奴火攻固出下策耳又曰戴遯字安丘處士逵之弟逵勵操東山而遯以武勇顯謝安嘗謂遯曰卿兄弟志業何殊遯曰下官不堪其憂家兄不改其樂也又曰王獻之嘗與兄徽之操之俱詣謝安二兄多言俗事獻之寒溫而已既出客問安王氏兄弟優劣安曰小者佳客問其故安曰吉人之辭寡察其言故知之嘗與徽之共在一室忽然火發徽之遽走不遑取履獻之神色恬然徐呼左右扶出又曰, krp: 保}
