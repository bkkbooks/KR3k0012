  - {type: punctuation, offset: 7, content: 《, id: KR3k0012_CHANT_516-bkkpn1}
  - {type: variant, offset: 7, length: 0, content: '', SBCK: 郎將揔藩任之重安雖處衡門其名猶出萬之右自然有公輔之望又曰華悝字道弘少失父事母至孝年十三值年飢榖貴悝􅂼食而母甘肥不絶又撫育􅀌弟友愛甚至稱爲慈兄由是少有聲譽又曰魏徐州刺史任城吕䖍有佩刀工相之以爲必三公可服此刀䖍謂別駕王祥曰苟非其人刀或爲害卿有公輔之量故以相與祥始辭之因強乃受及祥死之日以刀授弟覽曰吾兒凡汝}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_516-1b}
