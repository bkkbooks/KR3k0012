  - {type: variant, offset: 544, length: 0, content: '', SBCK: 蔡廓罷豫章郡還起二宅先成東宅與弟䡄又曰徐湛之年數􅀊時與弟淳之共車行牛奔車環左右人馳來赴之湛之先令取弟衆咸歎其㓜而有識又曰謝弘微寛重有雅量不以喜愠改色有蔡湛之者及見太􅀓兄弟謂人曰弘微㒵􅀋中郎而性似丈靖齊書曰衡陽元}
  - {type: variant, offset: 544, length: 5, content: 王莽以崔篆, WYG: 楊汝士}
  - {type: variant, offset: 544, length: 37, content: 王莽以崔篆為建新大尹篆不得已乃歎曰吾生無妄之世值澆五叫切羿之君上有老母下有, krp: 楊汝士爲劒南東川節度使時宗人嗣復鎮西川}
  - {type: variant, offset: 545, length: 1, content: 莽, SBCK: 道度太祖長兄也與太祖俱受學雷次宗宣帝問二兒學業次宗荅曰其兄外朗其弟内潤皆良璞也又曰劉璡兄瓛夜隔壁呼璡共語璡不荅方下牀着衣立然後應瓛問其乆璡曰向束帶未竟其操如此又曰張岱少與兄太子中舎人寅新安太守鏡征北將軍弟永廣州刺史辨俱知名謂之張氏五龍隋書曰盧昌衡小字龍子風神􅌿雅容止可法􅀶渉經史工草行書從弟思道小字釋奴宗中俱稱英妙故幽州爲之語曰盧家千里釋奴龍子唐書曰温大雅歷遷黄門侍郎弟彦􅀶爲中書侍郎對居近侍議者榮之髙祖從容謂曰我起義晉陽爲卿一門耳大雅將改葬其祖父筮者曰葬於此地害兄而福弟大雅曰􅀂得家弟永康我將含笑入地葬訖􅀊餘而卒又曰張嘉貞爲并州長史爲政嚴肅甚爲人吏所畏開元初因奏事至京師上聞其善政數賞慰嘉貞因奏曰臣少􅀌兄弟相依}
  - {type: page-break, offset: 545, content: '', id: KR3k0012_SBCK_516-3b}
  - {type: page-break, offset: 545, content: '', id: KR3k0012_SBCK_516-4a}
  - {type: variant, offset: 547, length: 8, content: 崔篆為建新大尹篆, SBCK: 至今日臣弟嘉祐今授鄯州別駕與臣各在一方同心離居魂絶萬里乞移就臣側近臣兄弟盡力報國死無所恨上嘉其友愛特改嘉祐爲忻州刺史又曰韋述弟逌學業亦亞於述尤精三禮與述對爲學士迪同爲禮官時人榮之又曰張道源族孫楚金少有志行事親以孝聞􅀄與兄越石同預郷貢進士州司將罷越石而薦楚金楚金辭曰以順則越石長以才則楚金}
