  - {type: variant, offset: 195, length: 3, content: 祖父武, SBCK: 少以強濟自立爲吴郡}
  - {type: page-break, offset: 195, content: '', id: KR3k0012_SBCK_516-2b}
  - {type: variant, offset: 195, length: 0, content: '', WYG: 少以強濟自立為吳郡太守坐事免官弟炳之為臨川内史登之隨弟之郡優遊自適又曰江夷字茂逺濟陽考城人也夷少自操厲為吳郡太守以兄疾去官後遷右僕射又曰陶潛與弟子書以言其志并為訓戒曰汝輩稚小家貧無役柴水之勞何時可免念之在心若何可言然雖不同生當思四海皆兄弟之義鮑叔敬仲分財無猜歸生伍舉班荆道舊遂能以敗為成因䘮立功他人尚爾况共父之人哉潁川韓元長漢末名士身處卿佐八十而終兄弟同居至於没齒濟北紀稚春晉時操行人也七世同財家無怨言詩曰髙山仰止景行行止汝其慎哉又曰孔顗字思逺不尚矯飾服用麤敗終不改易時吳郡顧顗之亦尚儉素衣裘器服皆擇其陋者宋世清約稱此二人顗弟道存從弟微頗營業二弟請假東遷輜重十餘舫皆是絹紙席之屬顗見之命上置岸側命左右取火燒之盡乃去道存代顗為江夏内史時都邑米貴道存慮顗甚乏遣吏載五百斛米餉之顗呼吏載米還彼吏曰都下米貴乞於此貨之不聽吏乃載米而去又曰蔡廓罷豫章郡還起二宅先成東宅與兄軌又曰徐湛之年數嵗時與弟淳之共車行牛奔車壊左右人馳來赴之湛之先令取弟衆咸歎其幼而有識又曰謝𢎞微寛重有雅量不以喜愠改色有蔡湛之者及見太傅兄弟謂人曰𢎞微貌類中郎而性似文靖齊書曰衡陽王道度太祖長兄也與太祖俱受學雷次宗宣帝問二兄學業次宗答曰其兄外朗其弟内潤皆良璞也又曰劉璡兄瓛夜隔壁呼璡不答方下牀著衣立然後應瓛問其久璡曰向束𢃄未竟其操如此又曰張岱少與兄太子中舍人寅新安太守鏡征北將軍永廣州刺史辨俱知名謂之張氏五龍隋書曰盧昌衡小字龍子風神澹雅容止可法博涉經史工草行書從弟思道小字釋奴宗中俱稱英妙故幽州為之語曰盧家千里釋奴龍子唐書曰温大雅厯遷黄門侍郎弟彦博為中書侍郎對居近侍議者榮之髙祖從容謂曰我起義晉陽為卿一門耳大雅將改葬其}
