  - {type: variant, offset: 1779, length: 3, content: 馬防兄, SBCK: 和嶠爲少保散􅀐常侍性至儉恡嶠同母}
  - {type: variant, offset: 1779, length: 534, content: 馬防兄弟二人皆各六千戶又曰張純封武始侯有子根奮及純病勑家丞翕曰無功於國猥蒙大恩爵不當及於後嗣純薨大行移書問嗣翕上奮中元二年詔書封奮奮上書曰不病哀臣小稱疾令翕立後臣時在河南冢廬臣見純前告翕語自以兄弟不當蒙襲爵之恩願下有司詔不聽奮既嗣爵謙儉節約閨門和平續漢書曰張堪字君游南陽宛人為郡族姓堪早孤讓先父餘財數百萬與兄弟又曰姜肱字伯淮兄弟三人皆以孝行著肱年長與二弟仲海季江同被臥甚相親友及長各娶妻兄弟相戀不能相離以繼嗣當立乃更往就室學皆通五經兼明星緯謝承後漢書曰郭賀字惠公頴川陽翟人也父鎮廷尉以功封定頴侯薨賀當襲爵上書讓與弟時詔書不聽遂竄逃匿三年孝順皇帝下大鴻臚切責州郡求賀強使就封國魏志曰袁述與紹有隙又與劉表不平而北連公孫瓚紹與瓚不和而南連劉表其兄弟攜貳舍近交遠如此魏略曰夏侯楙尚太祖女清河公主楙在西征時多畜眾妾公主由此與楙不和其後群弟不遵禮度楙數切責弟懼見治乃共構楙令公主奏之有詔收楙意欲殺之以問長水校尉京兆段默默以為誹謗之言不與實相應此清河公主與楙不睦出於譖構冀不待實耳且伏波與先帝有定天下功宜加三思帝意解曰吾亦以為然乃發詔問本為公主作表者果其群弟子臧子佐欲搆䟽楙使不見信又曰大傅司馬宣王久病曹爽攝政李豐依違時有謗書曰曹爽之勢熱如湯太傅父子冷如漿李豐兄弟如游光吳志曰諸葛瑾, WYG: 鍾牧}
