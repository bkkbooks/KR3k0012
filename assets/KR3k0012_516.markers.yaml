  - {type: variant, offset: 2518, length: 1, content: 吾, WYG: 牧必勝我不可輕也時人皆以為不然三輔决録曰張宇穆之第二子也以父功當封自言兩目失明天子信之乃封弟恭其小弟好戯無度放散家財宇悉以所得千萬}
  - {type: page-break, offset: 2518, content: '', id: KR3k0012_WYG_516-9a, image: WYG0897/WYG0897-0609c.png}
  - {type: variant, offset: 2520, length: 0, content: '', WYG: 之天子聞而嘉之又知其讓封徵拜議郎説苑曰宋襄公兹父為桓公太子桓公有後妻子曰公子目夷公愛之兹父為公愛之也欲立之請於公曰請使目夷立臣為之相以佐之公曰何故也對曰臣自知不足以處目夷之上公不許強以請公許之将立公子目夷目夷辭曰兄立而弟在下是其義也今弟立而兄在下是不義也公使目夷逃之衛兹父從之三年桓公有疾使人召兹父曰若不來是使我以憂死也兹父乃反公復立之為太子然後目夷歸楚國先賢傳曰隂興字君陵南陽新野人也拜衛尉薨明帝封興長子慶為嗣陽侯次子傳為隱强侯傳弟員丹皆為郎慶少脩儒術推所居第宅奴婢財物悉分與員丹但佩印綬而已當世稱之上以慶閨門孝悌行義敦宻褒顯朝廷以勵親戚擢為羽林右監}
  - {type: page-break, offset: 2520, content: '', id: KR3k0012_WYG_516-9b, image: WYG0897/WYG0897-0609d.png}
  - {type: page-break, offset: 2520, content: '', id: KR3k0012_WYG_516-10a, image: WYG0897/WYG0897-0610a.png}
  - {type: variant, offset: 2521, length: 2, content: 頴川, WYG: 向列女傳曰廣漢汝婦者汝敦之妻也居世殷富}
  - {type: variant, offset: 2525, length: 1, content: 語, WYG: 早孤而嫂貪慳敦以所受田宅奴婢三百餘萬悉讓與兄裁留園地數十畆起舍耕作土中得金一器敦以示妻妻曰本言讓先祖所有也此金非其有耶敦曰固吾意也乃俱擔金與兄嫂嫂初謂叔窮乏來欲借貸有不恱之色見金而喜兄乃惻然感悟棄妻還金海内先賢傳曰范丹字史雲讓財千萬與三弟風俗通曰陳留太守泰山吳文章少與兄伯武相失二十年後相㑹下邳市中共計爭鬭伯武歐之文章欲報心悽悵手不能興動觀者笑之更相借問乃親兄也相持啼哭觀者復曰兄校弟不得報兄向者所笑乃其義也典論曰劉表病疾其子琦還省疾病琦性慈孝蔡瑁恐琦見表父子相感更有託後之義謂曰将軍命君撫臨江夏為國東藩其任至重今釋衆而歸必見譴怒傷歎以増其疾非孝敬也遂遏於户外}
  - {type: page-break, offset: 2525, content: '', id: KR3k0012_WYG_516-10b, image: WYG0897/WYG0897-0610b.png}
