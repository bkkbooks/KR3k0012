  - {type: variant, offset: 1720, length: 0, content: '', SBCK: 夷吾之後也丗漸微替仕進不繼至淵兄弟一時俱興兄咨字休度少以質行自立幹局見稱官至海昌都尉淵起於衰末兄弟脩德貧無慼容歴位建威將軍又曰鍾牧字子幹牧兄駰計吏少與同郡謝賛吴郡顧譚齊名牧童齓時號爲遟訥甞謂人曰牧必勝我不可輕也時人皆以爲不然三輔决録曰張宇穆之第二子也以父功當封自言兩目失明天子信之乃封弟恭其小弟好戯無度放散家財宇悉以所得千萬與之天子聞而嘉之又知其讓封徴拜議郎􅀃苑曰宋襄公兹父爲桓公太子桓公有後}
