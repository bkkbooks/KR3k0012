  - {type: variant, offset: 6, length: 0, content: '', SBCK: 下晉書王覽字玄通母朱氏遇前妻子祥無道覽年數􅀊見祥􅀍楚撻輙涕泣抱持至于成童每諌其母母少止􅇯虐祥漸有譽時朱氏宻使鴆祥覽知之徑起取酒祥疑其有毒争而不與朱氏遽奪反之自後朱氏賜祥饌覽輙先甞又曰􅁃冰字季堅兄亮以名德流訓冰以雅素垂風諸弟相率莫不好禮爲丗論所重亮常以爲􅁃氏之寳又曰荀組字大章于時天下巳亂組兄弟貴盛懼不容於丗雖居大官並諷議而巳又曰謝安弟萬爲而}
  - {type: variant, offset: 6, length: 3, content: 中後漢, WYG: 下晉}
  - {type: variant, offset: 6, length: 0, content: '', krp: 下晉書王覽字玄通母朱氏遇前妻子祥無道覽年數歲見祥𬒳楚撻輙涕泣抱持至于成童每諌其母母少止兇虐祥漸有譽時朱氏宻使鴆祥覽知之徑起取酒祥疑其有毒争而不與朱氏遽奪反之自後朱氏賜祥饌覽輙先甞又曰庾冰字季堅兄亮以名德流訓冰以雅素垂風諸弟相率莫不好禮爲丗論所重亮常以爲庾氏之寳又曰荀組字大章于時天下巳亂組兄弟貴盛懼不容於丗雖居大官並諷議而巳又曰謝安弟萬爲而}
