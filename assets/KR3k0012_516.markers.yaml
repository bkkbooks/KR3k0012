  - {type: variant, offset: 47, length: 98, content: 名位未顯恥先受之遂稱風疾喑不能言火起徐出避之忍而不告後數年兄得舉觀乃稍損而仕州郡又曰鍾皓字季明頴川長社人皓少以篤行稱公府連辟為二兄未仕遷隱密山以詩律教授門徒千餘人又曰袁譚欲更攻弟尚問王脩曰計安出曰, SBCK: 如父}
