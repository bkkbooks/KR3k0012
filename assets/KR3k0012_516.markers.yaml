  - {type: variant, offset: 186, length: 2, content: 許荊, SBCK: 蔡廓奉兄䡄如父家事小大皆諮而後行公禄賞賜一皆入䡄有所資湏悉就典者請焉從髙祖在彭城妻郗氏永夏服廓荅曰知湏夏服計給事自應相供無容別􅀉䡄時爲給事中又曰謝景仁愛其弟甝胡甘切而憎弟述甞設饌請髙祖命甝預坐而髙祖召述述知景仁夙意又慮非髙祖命之請急不從髙祖馳遣呼述湏至乃歡及景仁有疾述盡心視湯藥飲食必甞而後進不解帶不盥櫛者累旬景仁深懷悊愧也又曰張暢弟収爲猘音兾犬所傷醫言食蝦蟆鱠即愈収甚難之暢含􅀏先甞収因啖得差又曰􅁃登之}
  - {type: variant, offset: 186, length: 2, content: 許荊, WYG: 蔡廓奉兄軌如父家事小大皆諮而後行公祿賞賜一皆入軌有所資湏悉就所典者請焉從髙祖在彭城妻郗氏求夏服廓答曰知湏夏服計給事自應相供無容别寄軏時為給事中又曰謝景仁愛其弟甝胡甘切而憎弟述嘗設饌請髙祖命甝預坐而髙祖召述述知景仁夙意又慮非髙祖命之請急不從髙祖馳遣呼述湏至乃歡及景仁有疾述盡心視湯藥飲食必嘗而後進不解𢃄不盥櫛者累旬景仁深懐慙愧也又曰張暢弟收為猘音冀犬所傷醫言食蝦蟆鱠即愈收甚難之暢含笑先嘗收因啖得差又曰庾登之}
