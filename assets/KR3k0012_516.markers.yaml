  - {type: variant, offset: 1763, length: 0, content: '', SBCK: 風俗通曰陳留太守㤗山吴文章少與兄伯武相失二十年後相㑹下邳市中爭計共闘伯武毆之文章欲報心悽悵手不能興觀者􅀏之更相借問乃親兄也相持啼泣觀者復曰兄得校弟不得報兄向者所􅀏乃其義也典論曰劉表疾病其}
