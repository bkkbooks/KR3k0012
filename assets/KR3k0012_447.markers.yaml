  - {type: variant, offset: 12, length: 12, content: 韋忠傳云裴頠為僕射數言忠, SBCK: 子髙謂魏王曰臣入魏見君二計臣張叔謀有餘范威智不逮然其功一也王曰叔也有餘威也不逮可得同乎荅曰駑􅂹同轅伯樂爲之咨嗟玉石相糅和氏爲之歎息故賢愚共貫則能士匿謀眞僞相錯則智士結舌雖有餘猶不逮也又曰東里閭空腹而好自賢欲自親}
  - {type: variant, offset: 12, length: 6, content: 韋忠傳云裴頠, WYG: 子髙謂魏王曰臣入魏見君二計臣張叔謀有餘范威智不逮然其功一也王曰叔也有餘威也不逮何得同乎荅曰駑驥同轅伯樂爲之咨嗟玊石相揉和氏爲之嘆息故賢愚共貫則能士匿謀真僞相錯則智士結舌雖有餘猶不逮也又曰東里閭空腹而好自賢欲自親於子順子順弗下曰夫東里閭外質頑拙有似䟱直内懷虛妙非丈夫之節若其度骸稱膚面目鬢眉實美於人也聖人論士不以此爲貴者無益於德故也又曰宫他見子順曰他困於貧賤欲自託富貴之門庶克濟乎子順曰夫富而可以託貧貴而可以寄賤者天下寡矣非信義君子明識通逹則不可所欲託者誰也宫他曰將適趙公子順曰非其人矣雖好養士自奉而已終不能稱也宫他曰將之燕相子順曰彼從兄弟甥舅各濟其私無求賢之志不足歸也宫他曰將之齊田氏子順曰齊大國也其士大夫皆有多黨之心不能容子也他曰然則何向而可子順曰濟子之欲則宜若郈成子可也又曰魏安釐王問子順曰馬回之}
