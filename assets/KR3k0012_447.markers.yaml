  - {type: variant, offset: 539, length: 0, content: '', SBCK: 爲強大戰濟西伏尸流血不足爲仁夫孔明苞文武之德劉􅀇德以知人之明屢造其廬諮以濟丗至如竒䇿泉涌智謀縱横遂東􅀃孫權北抗大魏以乗勝之師翼佐取蜀及􅀇德終禪登大位在擾攘之際立童􅂪之主設官分職班叙衆才文以寧内武以折衝勲業濟而殞觀其遺文謀謨􅀪逺雅規恢廓巳有功則讓於下闕則躬自咎見善則遷納諌則改故烈聲震遐迩者也習鑿齒周魯通諸葛論曰客問曰周瑜魯肅何人也主人曰小人也客曰周瑜竒孫䇿於揔角定大計於一面摧魏武百勝之鋒開孫氏偏王之業威震天下名馳四海魯肅一見孫權建東帝之略子謂之小人何也主人曰此乃眞所以爲小人也夫君子之道故將竭其志直佐扶帝室尊主寧時逺崇名敎􅀂乃力不能合事與志違躬耕南畒遁迹當年何由盡臣禮於孫氏於漢室巳亡之日耶客曰諸葛武侯翼戴􅀇德與瑜肅何異而子重諸葛毀瑜肅何其偏也主人曰夫論古今者故冝先定其所爲之夲迹其致用之源諸葛武侯龍蟠江南託好管}
