  - {type: variant, offset: 77, length: 4, content: 所宜行耶, SBCK: 節􅀂其度骸稱膚面目􅁂眉實羙於人也聖人論士不以此爲貴者無益於德故也}
  - {type: variant, offset: 77, length: 4, content: 所宜行耶, WYG: 節吾欲以為相可乎答曰知臣莫若君何有不可至於亮直之節臣未明也王曰何故答曰聞諸孫卿其爲人也長目而豕視者必體方而心圓每以其法相人千百不失臣見回非不偉其體幹然甚疑其目王卒用之三月果以諂得罪淮南子曰管子文錦也雖醜登廟相桓公以霸功成事衣文錦之服大書在明堂故曰雖醜登廟也子産絹染也美而不尊子産相鄭以乘車濟朝渉者孟子曰惠而不知爲政絹染者以子産每人月令曰命婦宫染絹温暖其民如人之母也袁子正書曰孔子稱蘧伯玉國無道可卷而懷也今李膺居濁世之中皦然與世殊塗此西山餓夫之疇耳卒死於非罪惡得爲雅人}
