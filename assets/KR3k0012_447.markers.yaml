  - {type: variant, offset: 86, length: 35, content: 人倫鑒識嘗目山濤如璞玉渾金人皆欽其寶莫知名其器王衍神姿高徹如瑤林瓊樹自, SBCK: 多黨之心不能容子也他曰}
