  - {type: variant, offset: 1266, length: 2, content: 郄超, WYG: 夫論古今者故宜先定其所爲之本迹其致用之源諸葛武侯龍蟠江南託好管樂有匡漢之望是有崇本之心也今𤣥德漢髙之正胄也信義著於當年將使漢室亡而更立宗廟絶而復繼誰云不可哉袁宏七賢序曰阮公瓌傑之量不移於俗然獲免者豈不以虛中犖節動無過則乎中散遣外之情最爲髙絶不免世禍將舉體秀異直致自髙故傷之者也山公中懷體黙易可因任平施不撓在衆樂同遊刃一世不亦可乎新序曰晉獻公用荀息之謀而禽虞不用宫之竒謀而亡故荀息非霸王之佐乃戰國兼並之臣也若宫之竒則可謂忠臣之謀也蔣子萬機論曰太史遷云顔回雖篤行不遇仲尼不能彰其名也故五尺之童得擬大舜使在他門未或及此也夫甘羅少回六歳獲河東五城萬乘郊迎而佩印雖所𢎞非道義然當秦之時染詐變之風也使羅在孔門治丘之訓亦可聞一知十乎曰未必也昔齊欲伐魯回求說陳常而孔子不許遂使子貢子貢一出破齊强晉亡吳霸越存魯也夫顔子與賜程智比才相校於十至於此事而丘不使也抱朴子曰凡薄之徒雖便辟流俗而懷空抱虛有似蜀人瓠壺之喻胷中無一紙之識不過酒炙所謂冐于貨賄貪于飲食左生所載不才之子}
