  - {type: 'tls:seg', offset: 228, content: '', id: KR3k0012_CHANT_447-4a.4}
  - {type: variant, offset: 229, length: 0, content: '', SBCK: 㓜未能定南面之事是以推巳忠誠稱制假號二弟流言邵公疑之發金縢之匱然以用寤亦未決也至於昭帝所以不疑於霍光亦縁武帝有遺詔於光使光􅀂周公踐天子之位行周公之事吾恐叛者非徒二弟疑者非徒邵公也且賢者固不能知聖賢自其冝耳昭帝固可不疑霍光周王自可疑周公也􅀂以昭帝勝成王霍光當踰周公耶􅀂以堯舜爲成王湯禹作管蔡邵公周公之不見疑必也陳羣汝潁士論曰羣以爲孔氏先汝潁士勝􅀒之評矣孔荅曰汝南戴子髙親止千乗万􅀐與光武帝共揖於道中潁川士雖抗節未有能頡頏天子者也汝南許子伯與友人共􅀃丗俗將壞同夜起舉聲號哭潁川士雖頗憂時未有能􅂘丗者也汝南許椽敎太守劉晨圖開稻陂灌數万頃累丗獲其功韓元長雖好地理未成功見效如許􅁺者也汝南張元伯身死之後見夢於范巨卿頴川雖有竒異未有􅀑神能靈者也汝南應丗叔讀}
  - {type: page-break, offset: 229, content: '', id: KR3k0012_SBCK_447-5b}
  - {type: variant, offset: 229, length: 0, content: '', WYG: 㓜未能定南面之事是以推以忠誠稱制假號二弟流言召公疑之發金縢之匱然後用寤亦未决也至於昭帝所以不疑於霍光亦縁武帝有遺詔於光使光若周公踐天子之位行周公之事吾恐叛者非徒二弟疑者非徒召公也且賢者固不能知聖賢自其宜耳昭帝固可不疑霍光周王自疑周公也若以昭帝勝成王霍光當踰周公耶若以堯舜爲成王湯禹作􅃹蔡召公周公之不見疑必也陳羣汝潁士論曰羣以爲孔氏先汝潁士勝負之評矣孔荅曰汝南戴子髙親止千乗萬騎與光武帝共揖於道中潁川士雖抗節未有能頡頏天子者也汝南許子伯與友人共說世俗將壞同夜起舉聲號哭潁川士雖頗憂時未有能哭世者也汝南許掾教太守劉晨圖開稻陂灌數萬頃累世獲其功韓元長雖好地理未成功見效如許掾者也汝南張伯元身死之後見夢於范巨􅀸潁川雖有竒異未有鬼神能靈者也汝南應世叔讀}
