  - {type: variant, offset: 872, length: 4, content: 命又王湛, krp: 道義然當秦之時染詐變之風也使羅在孔門治丘之訓亦可聞一知十乎曰末必也昔齊欲伐魯回求說陳常而孔子不許遂使子貢子貢一出破齊強晉亡呉霸越存魯也夫顔子與賜程智比才相校於八至於此事而丘不使也抱朴子曰凡薄之徒雖便辟流俗而懷空枹虗有似蜀人瓠壷之喻胷中無一𥿄之識不過酒炙所謂冒于貨賄貪于飲食左生所載不才之子}
