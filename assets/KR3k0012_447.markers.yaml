  - {type: variant, offset: 1261, length: 0, content: '', WYG: 乃真所以爲小人也夫君子之道故將竭其真忠佐扶帝室尊主寧時逺崇名教若乃力不能合事與志違躬耕}
  - {type: variant, offset: 1262, length: 1, content: 金, WYG: 畆遁迹當年何由盡臣禮於孫氏於漢室未亡之日耶客曰諸葛武侯翼戴𤣥德與瑜肅何異而子重諸葛毁瑜肅何其偏}
