  - {type: variant, offset: 1575, length: 182, content: 原王濟甚相器重以方其外祖陳郡袁侃謂侃弟奧曰近見荀監子清虛名理當不及父德性純粹是賢兄輩人也又曰成公簡字宗舒東郡人也世二千石性清素不求榮利潛心味道罔有干其志者默識過人張茂先每言公簡清靜比揚子雲默識擬張安世又曰謝安總角神識沉敏風宇脩暢善行書弱冠詣王濛清言良久既去濛子脩曰向客何如大人濛曰此亹亹而來逼人王導亦深器之由是有重名又曰謝萬善屬文敘漁父屈原季王賈誼楚老龔勝孫登嵇康, SBCK: 平御覽卷第}
