  - {type: variant, offset: 226, length: 0, content: '', SBCK: 汝南陳仲舉體氣髙烈有王臣之節頴川李元禮忠平正直有社稷之能海内論二士有議而未決陳留蔡伯喈云仲舉強於犯上元禮長於接下犯上爲難接下爲易仲舉爲先元禮後矣天下於是爲定愚思􅀼以伯喈未必可從也夫臯繇戒舜犯上之徴也舜治百揆接下之效也故陳平謂王陵言面折廷爭我不如公至安劉氏公不如我而犯上則爲優是王陵當髙於良平朱雲殊乎呉鄧矣陸恭仲荅曰陳李二君德齊於行才等於身無長短之差時人或其先後魏文帝典論曰或有方周成王於漢昭帝者余以爲周氏體聖考之作氣禀賢妣之胎敎周邵爲保傅吕尚爲太師故咳􅀏必含仁義之聲􅀚聽必覿禮義之容􅀪踐祚之義隆太平之化禮}
