  - {type: variant, offset: 230, length: 8, content: 令衛瓘朝之耆舊逮, SBCK: 五行並下頴川士雖多聦明未有能離婁並誦者也汝南李鴻爲太尉􅁺弟殺人當死鴻自􅅞詣門乞代弟命使飲鴆而死弟因得全潁川士雖欲尚節義未有能煞身成仁者也汝南翟文仲爲東郡太守始舉義兵以誅王莽潁川士雖疾惡未有破家爲國者也汝南􅀽公著爲甲科郎中上書欲治梁兾潁川士雖務忠讜未有能没命直言者也何晏兾州論曰略言春秋以來可}
  - {type: variant, offset: 230, length: 9, content: 令衛瓘朝之耆舊逮與, WYG: 五行並下潁川士雖多聰明未有能離婁並誦者也汝南李鴻爲太尉掾弟殺人當死鴻自縛詣門乞代弟命便飲鴆而死弟因得全潁川士雖欲尚節義未有能殺身成仁者也汝南翟文仲爲東郡太守始舉義兵以誅王莽潁川士雖疾惡未有破家爲國者也汝南袁公著爲甲科即中上書欲治梁冀潁川士雖務忠讜未有能没命直言者也何晏冀州論曰略言春秋以來可以海内比而校也恭謹有禮莫賢乎趙襄仁徳忠義莫賢乎趙盾納諫服義莫賢乎韓起決危定國莫賢乎狐偃勇謀經國莫賢乎}
