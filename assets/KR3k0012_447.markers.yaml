  - {type: variant, offset: 227, length: 1, content: 廣, WYG: 興於上頌聲作於下時成王年二十二享國三十年世永治長德與年豐夫孝昭父非武王母非邑姜體不承聖化不胎育保無仁義之徳佐無隆平之治所謂生深宫中長婦人手矣德與體併智與性成孝昭之崩年二十有一承衰弊之世牧彫落之民臣無淑聖之智身有短折之期欲髙隆周豈不謬哉曹植漢二祖論曰髙祖因暴秦而起官由亭長自亡徒招集英雄遂誅強楚光有天下功齊湯武業流後嗣誠帝王之元勲人君之盛事也但寡善人之美稱鮮君子之風采惑秦宫而不出窘項座而不起計失乎酈生忿過乎韓信太公是誥於孝違矣敗古今之大教傷王道之實義然其驍將藎臣皆古今之鮮有而能任其才而用之聽其言而察之故兼天下而有帝位也不然斯不免當世之妄夫世祖體乾靈之休徳韜亞聖之竒才聰逹而多識樂施而愛人神光前驅威風先遊軍未出於南京莽已斃于西都當此時也九州鼎沸四海淵涌言帝者二三稱王者四五咸鴟視狼顧虎超龍驤光武秉炎光之巨越震赫斯之隆怒盪滌凶穢勦除醜類若勁風而縱烈火曬白日而掃朝雲也計功則業殊比隆則事異語徳則靡諐言行則蕪穢卒能立不刋之遐跡建不朽之元功故曰光武其近優也曹植成王論曰周公以天下初定武王既終而成王}
