  - {type: variant, offset: 151, length: 3, content: 禇陶吳, SBCK: 魏安􅁵王問子順曰馬回之爲人雖少文桓桓亮直丈夫之節吾欲以爲相可乎荅曰知臣莫􅀂君何有不可至於亮直之節臣未明也何故荅曰聞諸孫卿其爲人也長目而永視者必體方而心圎毎以其法相人千百不失臣見回非不偉其體幹然甚疑其自王卒用之三月王果以䧟得罪淮南子曰管子文錦也雖醜登廟相桓公以覇功成事衣文錦之服大書在明堂故曰雖醜登廟也子産絹染也羙而不尊子産相鄭以乗車濟朝渉者孟子曰惠而不知爲政絹染者以子産喻母人月令曰命婦宫染絹温䁔其民如人之母也􅀽子正書曰孔子稱蘧伯玉國無道可卷而懷也今李膺居濁丗之中皦然與丗殊塗此西山餓夫之疇耳卒死於非罪惡得爲雅人又曰李膺言出于口人莫得違也有難李君之言者則郷黨非之李君子與人同輿載則名聞天下又曰或云少府楊阜豈非忠哉荅曰然可謂直士忠臣則吾不知也夫爲人臣見人主失道指其非而播楊其惡可謂直士未爲忠臣故司空陳羣則不然其談論終日未甞言人主之非書數十上而外不知君子謂陳羣於是乎長者姚信士緯曰論清髙之士上可如老子莊周下可如君}
