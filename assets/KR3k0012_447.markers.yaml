  - {type: variant, offset: 1222, length: 20, content: 薛兼少與同郡紀瞻廣陵閔鴻吳郡顧榮會稽賀循, WYG: 樂毅諸葛孔明之優劣或以毅爲弱燕合五國之兵以破强}
