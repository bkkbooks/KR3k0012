  - {type: variant, offset: 449, length: 417, content: 曰喬曰髦皆知名於世准使先詣裴頠頠性弘方愛喬有高韻謂准曰喬當及卿髦少減也又使詣廣廣性清淳愛髦有神檢謂准曰喬自及卿然髦亦清出准歎曰我二兒之優劣乃裴樂之優劣也論者以為喬雖有高韻而神檢不足樂為得之矣又曰劉頌守廷尉時尚書令史扈寅非罪下獄詔使考竟頌執據無罪寅遂得免時人以頌比張釋之乎又曰和嶠遷頴川太守為政清簡甚得百姓懽心太傅從事中郎庾顗見而歎曰嶠森森如千丈松雖磥砢多節目施之大廈有棟梁之用又郗鑒傳云王敦嘗謂曰樂彥輔短才耳後生流宕言違名檢考之以實豈勝武秋耶鑒曰擬人必於其倫彥輔道韻平淡體識沖粹處傾危之朝不可得而親踈及愍懷太子之廢柔而有正武秋失節之士何可同日而言敦曰愍懷廢徙之際交有危機之急人何能以死守之乎以此相方其不減明矣又孫登傳云嵇康從之遊三年問其所圖終不荅康每歎息將別謂曰先生竟無言乎登乃曰子識火乎火生而有光而不用其光果在於用光人生而有才不用其才而果在於用才故用光在乎得薪所以保其曜用才在於識真所以全其年今子才多識寡難乎免於今之世去矣子無求手康, WYG: ''}
