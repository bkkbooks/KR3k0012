  - {type: variant, offset: 1243, length: 0, content: '', WYG: 雪君王之耻莫不謂毅爲優余以爲五國之兵共伐一齊不足爲强大戰濟西伏尸流血不足爲仁夫孔明抱文武之德劉𤣥徳以知人之明屢造其廬諮以濟世至如竒策泉涌智謀縱横遂東說孫權北抗大魏以乗勝之師翼佐取蜀及𤣥德終禪登大位在擾攘之際立童蒙之主設官分職班序衆才文以寧内武以折衝勲業未濟而殞觀其遺文謀謨𢎞逺雅規恢廓已有功則譲於下闕則躬自咎見善則遷諫則改故烈聲震遐邇者也習鑿齒側周魯通諸葛論曰客問曰周瑜魯肅何人也主人曰小人也客曰周瑜竒孫策於總角定大好於一面摧魏武百勝之鋒開孫氏偏王之業威震天下}
