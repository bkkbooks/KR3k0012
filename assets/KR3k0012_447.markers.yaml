  - {type: variant, offset: 151, length: 3, content: 禇陶吳, WYG: 或云少府楊阜豈非忠哉答曰然可謂直士忠臣則吾不知也夫爲人臣見人主失道指其非而播揚其惡可謂直士未爲忠臣故司空陳羣則不然其談論終日未嘗言人主之非書數十上而外不知君子謂陳羣於是乎長者姚信士緯曰論清髙之士上可如老子莊周下可如君}
