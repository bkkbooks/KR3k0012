  - {type: variant, offset: 912, length: 395, content: 臣叔殊不癡因稱其美帝曰誰比濟曰山濤以下魏舒以上時人謂湛上方山濤不足下比魏舒有餘湛聞曰欲處我季孟之間乎又曰陸機天才秀逸辭藻宏麗張華嘗謂之曰人常恨才少而子更患其多又曰陸雲刺史周浚召為從事謂人曰陸士龍當今顏子也又曰王衍雋秀有令望虛心玄遠未嘗語利王敦過江常稱之曰夷甫處眾中如珠玉在瓦石間顧愷之作畫贊亦稱衍巖巖清峙壁立千仞又曰杜乂性純和美姿容有盛名於江左王羲之見而目之曰膚若凝脂眼如點漆此神仙中人也桓彝亦曰衛玠神清杜乂形清又郭文傳溫嶠嘗稱曰文有賢人之性而無賢人之才柳下惠梁琦之亞乎又曰羅含謝尚與含為方外之好乃稱曰羅君章可謂湘中之琳琅又曰羅含桓溫嘗與寮屬讌會含後至溫問眾座曰此何如人或曰可謂荊楚之杞梓桓曰此自江左之秀豈唯荊楚而已又曰薛兼少與同郡紀瞻廣陵閔鴻吳郡顧榮會稽賀循齊名號為五俊初入洛司空張華見而奇之曰皆南金也又曰郄超傳云沙門支遁以清談著名于時風流勝貴莫不崇敬以為造微之功足參諸正始而遁常重超以為, SBCK: 夏侯太􅀄}
