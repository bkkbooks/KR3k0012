  - {type: variant, offset: 3188, length: 1531, content: 人衛公慨焉歎涕曰管子聖人之所見豈不遠哉若死者有知我何面目以見仲父乎蒙衣袂而死絕于壽宮又曰吳起謂商文曰事君果有命矣商文曰何謂也吳起曰治四境之內成訓教變習俗使君臣有義父子有序子與我孰賢商文曰吾不若子曰今日置質為臣其主安重今日釋璽辭官其主安輕子與我孰賢商文曰吾不若子曰楥捊一鼓敵人在前使三軍之士樂死若生子與我孰賢商文曰吾不若子吳起曰三者子皆不吾若也位在吾上命矣夫商文曰善子問我我亦問子變世主少群臣相疑黔首不定當此之時屬之我乎屬之子乎吳起默然不對少間曰然商文曰是吾所以加於子之上也崔鴻前涼錄曰張茂謂馬岌曰劉曜自古可誰等輩也岌謂曰曹孟德之流茂默然岌曰孟德公族也劉曜戎狄難易不同曜殆過之茂曰曜可方呂布關羽而云孟德不及豈不過哉岌曰孟德挾天子令諸侯仗大義討不庭曜一卒胡人用烏合之眾而能建威成大逆天下莫之當其不優歟茂曰天生胡以滅中國殆不可以人事論也秦記曰姚萇大破符登置酒高會諸將各曰若值魏武王尋破此賊陛下將軍大過上嘆曰吾不如亡兄者四也長八尺五寸垂臂過膝人望而畏之一也當十萬之眾與天下爭衡望麾直突前無橫陣二也突覽古今講論道藝駕御群賢收羅俊異三也總領大眾經履嶮難大小悅稱人盡死力四不如也又曰魏武王姚襄禮待楊亮亮奔桓溫溫問亮曰襄何如人荅曰天下傑也神明器度故是孫策之疇而雄武過之越絕書曰或問曰子胥范蠡何人也曰子胥勇而智范蠡智而明皆賢人也問曰子胥死范蠡去二人行違皆稱賢何也荅曰論語曰陳力就列不能者止事君以道言耳范蠡單身入越致主於霸有所不合故去也問曰不合何不死曰止去事之義也義無死子胥死者受恩深也傳曰孔子去魯燔俎無肉曾子去妻藜蒸不熟微子去比干死孔子並稱仁行雖違其義同死與生敗與成其同奈何論語曰有殺身以成仁子胥重其信范蠡貴其義信從中出義從外入微子去者痛殷道也比干死者忠於紂也箕子亡者絕也忠信之至相為表裏耳問二子孰逾乎曰以為同耳華陽國志曰廣陵太守下邳陳登字元龍太尉球孫也有俊才較天下士謂功曹陳喬曰閨門雍穆有德有行吾敬陳元方父子冰清玉潔有德有言吾敬華子魚博聞強識奇逸卓犖吾敬孔文舉雄姿傑出有王霸之略吾敬劉玄德零陵先賢傳曰劉備曰子初即劉巴字也才智絕人如孤可用非孤者難獨任也亮亦曰運籌策於帷幄之中不如子初遠矣若提桴鼓會於軍門使百姓喜勇當與議之可陳武別傳曰武時人無察者頓丘閭遐薦之於軍府或問武當今可與誰為輩遐曰方謝道堅不足比徐世璋有餘道堅世璋皆同時知名士也武聞之笑曰乃處我季孟之間乎衛玠別傳曰永和中丹陽尹劉真長鎮西將軍謝仁祖商略中朝士人遂及於玠或問杜弘治得方衛洗馬不謝曰安得相比其間可容數人世說曰嵇中散語趙景真卿瞳子白黑分明有白起之風限量小狹趙荅曰尺表能審琁衡之度寸管能測往復之晷何必在大但問識何如耳又曰諸名士共洛水上戲還樂令問王夷甫曰今日共看樂不王曰裴僕射善談名理混有雅具張茂先論史漢殊靡可聽我王安豐說延陵子房亦超然者又曰劉萬安即道真之子庾公所謂灼然王舉又云千人亦見百人亦見王右軍少時丞相云逸少何緣復減萬安又曰諸葛瑾弟亮及從弟誕並有盛名各在一國于時以為蜀得其龍吳得其虎魏得其狗誕在魏與夏侯玄齊名瑾在吳吳朝服其弘雅又曰卞望之云郄公體中有三反方於事上好下接己一反治身清貞而大脩計校二反自好讀書憎人學問三反也又曰王敦為大將軍鎮豫章衛玠避亂從洛投敦相見欣然談話彌日于時謝鯤為長史敦謂鯤曰不意永嘉之末復聞正始之音阿平若在當復絕倒時人以玠為玉人語林曰謝碣絕重其婦張玄常稱其婦欲以敵之有濟尼者並遊張謝二家人問其二嫗優劣荅曰玄夫人神情散朗故有林下之風碣家婦清心玉映自是閨房之秀也三輔決錄曰弭生字仲叔其父賤故張伯英與李幼才書曰弭仲升高德美名命世之才非弭氏小族所有新豐瘠土所當出也郭泰別傳曰泰字林宗少遊汝南先過袁閬不宿而退往從黃憲累日方還或問林宗林宗曰奉高之器譬諸泛濫雖清而易挹叔度汪汪君子若千頃陂澄之不清撓之不濁不可量也, SBCK: 七}
