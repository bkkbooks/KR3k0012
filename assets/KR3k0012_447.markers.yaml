  - {type: variant, offset: 1758, length: 1428, content: 隱四顯為八賢論其旨以處者為優出者為劣以示孫綽綽與往反以體公識遠者則出處同歸又曰韓康伯傳云庾龢名重一時少所推服常稱康伯及王坦之曰思理倫和我敬韓康伯志力彊正吾愧王文度又曰王獻之嘗與兄徽之俱詣謝安徽之多言俗事獻之寒溫而已既出客問安王氏兄弟優劣安曰小者佳客問其故安曰吉人之辭寡又曰禇裒與杜乂俱有盛名冠于中興譙國桓彝見而目之曰季冶有皮裏陽秋言其外無臧否而內有所褒貶也又曰王恭美姿儀人多愛悅或目云濯濯如春月柳嘗被鶴氅裘涉雪而行孟永窺見之歎曰此真神仙中人也又曰王恭字孝伯少有美譽清辯過人自負才地高華恒有宰輔之望與王忱齊名友善慕劉惔之為人謝安常曰王恭才地可以為將相宋書曰謝弘微叔父混特所敬貴號為微子常云何遠剛躁負氣阿容博而無檢曜恃才而持操不篤晦自知而納善不周設復功濟三才終亦以此為恨至如微子吾無間然又云微子異不傷物同不害正若年造六十必至公輔又曰龔祈不應徵辟祈風姿端雅容止可觀中書郎范述見而歎曰此荊楚仙人也蕭子顯齊書曰王僧祐父遠為光祿勳宋世為之語曰王遠如屏風屈曲能蔽風露陳書周弘正叔父捨每與談論輒異之曰觀汝神情穎晤清理警發後世知名當出吾右又曰高祖在京城嘗與諸將讌杜僧明周文育侯安都為壽各稱功伐高祖曰卿等悉良將也然而並有所短杜公志大而識闇狎下而嬌尊矜功不收其拙周侯交不擇人而推心過差居危履險猜防不設侯郎慠誕而無猒輕佻而肆志並非全身之道耳卒皆如其言隋書曰元善以高頴有宰相之具嘗言於上曰楊素麤踈蘇威怯懦元胃元旻正似鴨耳可以付社稷者唯獨高頴又曰蘇威治書侍御史梁毗以威領五職安繁戀劇無舉賢自代之心抗表劾威上曰蘇威朝夕孜孜志存遠大舉賢不闕何遽迫之顧謂威曰用之則行舍之則藏唯我與爾有是夫因謂朝臣曰蘇威不值我無以措其言我不得蘇威何以行其道楊素才辯無雙至若斟酌古今助我宣化非威之匹也蘇威若逢亂世南山四皓豈易屈哉又曰楊達為人弘厚有局度楊素每言曰有君子之貌兼君子之心者唯達耳唐書曰王珪嘗侍宴太宗謂珪曰鄉識鑒清通尤善談論自房玄齡等咸宜品藻又可自量孰與諸子玄對曰孜孜奉國知無不為臣不如玄齡才兼文武出將入相臣不如李靖敷奏詳明出納惟允臣不如彥博處繁理劇眾務必舉臣不如戴胃以諫諍為心恥君不及於堯舜臣不如魏徵至如激濁楊清嫉惡好善臣於數子亦有一日之長太宗深然其言群公亦各以為盡己所懷謂之磪論又曰馬周有機辯能敷奏深識事端動無不中太宗嘗曰我於馬周暫時不見則便思之中書侍郎岑文本謂所親曰吾見馬君論事多矣援引事類楊摧古今舉要刪蕪會文切理一字不可加一言不可減聽之靡靡令人忘倦昔之蘇張終賈正應此耳然鳶肩火色騰上必速恐不能免耳又曰韋述時趙冬曦孫逖王翰常遊其門趙冬曦兄冬日弟和璧居貞安貞頤貞等六人逖弟迪逌迥起音起巡亦六人並詞學登科張說曰趙韋昆季今之杞梓也又曰馮定字介夫宿之弟也儀貌壯偉與宿俱有文學而定過之貞元中皆舉進士時人比之漢朝二馮君呂氏春秋曰管仲有病桓公往問之曰仲父之病病矣將何以教寡人管仲對曰願君之遠易牙豎刀常之巫衛公子啟方也公曰易牙烹其子以慊寡人慊快也猶尚可疑邪管仲對曰人之情非不愛其子子之忍將何有於君公又曰豎刀自害以近寡人猶尚可疑耶管仲對曰人之情非不愛其身其身之忍又將何有於君公又曰常之巫審於死生能去痾病猶尚可疑耶管仲對曰死生命也痾病本也君不用其命守其本而待常之巫彼將以此無不為也公又曰衛公子啟方事寡人十五年其父死不敢歸哭猶尚可疑耶管仲對曰人之情無不愛其父父之忍將何有於君公曰諾管仲死盡逐之食不甘官不治病不起朝不肅居三年公曰仲父不亦過乎復召而反之明年公有病常之巫從中曰公將以某日薨易牙豎刀相與作亂公令衛公子啟方以書社, SBCK: 百}
