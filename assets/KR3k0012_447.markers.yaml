  - {type: 'tls:seg', offset: 155, content: '', id: KR3k0012_CHANT_447-3a.5}
  - {type: variant, offset: 155, length: 3, content: 召補尚, SBCK: 子貢耳􅀂於陵仲子及嚴遵夏甫子治未可盡以爲師矣平議之士􅀂季札趙武逮于林宗皆可盡爲則也其洩冶伯宗及末丗史雲子將之屬皆羙而未善也聖人考功黜陟猶以三載而子將月旦之處史雲睚眦廢人其觀進者或飾虚其怠沮者皆離叛識誠可謂妙矣然非洙泗之風三千之􅀪化又曰延陵季子際㑹之間衛尉蔡君限之於弱余必以然季子通妙逹道之機假其討光恐増禍亂受光之譲非其夲志􅀂季子之爲君也欲行王道其與周爭治霸術以力與列國爭強則不肯破強楚而并其封疆也國人疾光而心歸季子季子不立社稷將傾恐光憂迷內灼而異圖外生非常之變將加于髙人是以季子相時慮事順以安民而謂其弱未聞厥㫖蔡子荅曰諸兄以賢譲國與之兾能楊文武之遺敎崇仁義之羙化以移風昜俗耳何必當與周爭乎而茍守一節退耕於野使還國無討賊之意反云國家有主社禝有祀乃吾君也蓋開簒弑之路非所謂從忠敎也又曰楊子雲有􅀷才潛知屈伸沉浮從容􅀇黙近于柳下惠朝隱之風智似蘧瑗而髙不及也班固稱之有大度不孜孜於富貴不戚戚於貧賤二者之美蓋亦良矣然楊子之}
  - {type: page-break, offset: 155, content: '', id: KR3k0012_SBCK_447-3a}
  - {type: variant, offset: 155, length: 3, content: 召補尚, WYG: 子貢耳若於陵仲子及嚴遵夏甫子治未可盡以爲師矣平議之士若季札趙武逮于林宗皆可盡爲則也其洩冶伯宗及末世史雲子將之屬皆美而未善也聖人考功黜陟猶以三載而子將月旦之處史雲睚眦廢人其觀進者佳或飾虛其怠沮者皆離叛識誠可謂妙矣然非洙泗之風三千之𢎞化又曰延陵季子際㑹之間衛尉蔡君限之於弱余不以爲然季子通妙逹道之機假其討光恐増禍亂受光之讓非其本志若季子之爲君也欲行王道其與周争治霸術以力與列國争强則不肯破强楚而并其封疆也國人疾光而心歸季子季子不立社稷將傾恐光憂迷内灼而異圖外生非常之變將加於髙人是以季子相時慮事順以安民而謂其弱未聞厥㫖蔡子荅曰諸兄以賢讓國與之異能揚文武之遺敎崇仁義之美化以移風易俗耳何常與周争乎而苟守一節退耕於野使還國無討賊之意反云國家有主社稷有祀乃吾君也蓋開簒殺之路非所謂從忠教也又曰揚子雲有深才潜知屈伸沉浮從容𤣥黙近于柳下惠朝隐之風智似蘧瑗而髙不及也班固稱之有大度不孜孜於富貴不戚戚於貧賤二者之美蓋亦良矣然揚子之}
