  - {type: variant, offset: 424, length: 1, content: 毅, SBCK: 􅀇德爲吕布所襲爲武帝所走舉軍東下爲陸遜所覆未􅀂武帝爲徐榮所敗馬􅀍創之危也􅀇德在荆州劉景􅂛父子不能用其計舉州降魏手下歩􅀐不滿數千爲武帝大衆所走未􅀂武帝爲吕布奔北􅀐所擒勒突火之急也􅀇德爲陸遜所覆未􅀂武帝爲張繡所困挺身逃遁以喪二子也􅀂令髙祖死於彭城丗人}
  - {type: variant, offset: 424, length: 2, content: 毅方, WYG: 𤣥德爲吕布所襲爲武帝所走舉軍東下爲陸遜所覆未若武帝爲徐滎所敗馬被創}
  - {type: variant, offset: 424, length: 1, content: 毅, krp: 玄德爲吕布所襲爲武帝所走舉軍東下爲陸遜所覆未若武帝爲徐榮所敗馬𬒳創之危也玄德在荆州劉景升父子不能用其計舉州降魏手下歩騎不滿數千爲武帝大衆所走未若武帝爲吕布奔北騎所擒勒突火之急也玄德爲陸遜所覆未若武帝爲張繡所困挺身逃遁以喪二子也若令髙祖死於彭城丗人}
  - {type: variant, offset: 427, length: 0, content: '', SBCK: 不及項羽逺矣武帝死於宛下將復謂不及張繡矣而其安忍無親􅀂楊德祖之徒多見賊害孔文舉桓文林等以􅀫恨見殺良將不能任行兵三十餘年無不親征功臣謀士曽無列土之封豈􅀂􅀇德威而有思勇而有義}
  - {type: page-break, offset: 427, content: '', id: KR3k0012_SBCK_447-7a}
  - {type: variant, offset: 427, length: 21, content: 諸葛豐蓋寬饒又曰樂廣少與弘農楊准相善準之二, WYG: 危也𤣥德在荆州劉景升父}
  - {type: variant, offset: 427, length: 0, content: '', krp: 不及項羽逺矣武帝死於宛下將復謂不及張繡矣而其安忍無親若楊德祖之徒多見賊害孔文舉桓文林等以宿恨見殺良將不能任行兵三十餘年無不親征功臣謀士曽無列土之封豈若玄德威而有思勇而有義}
  - {type: variant, offset: 429, length: 4, content: 豐蓋寬饒, SBCK: 孔明張飛􅀜羽曰皆人傑也服而使之夫明闇不相爲用臧否不相爲使武帝雖處強不爲用矣況在危急之間􅀔弱之地乎􅀂令􅀇德據有中州將與周室比隆豈徒三傑而巳}
