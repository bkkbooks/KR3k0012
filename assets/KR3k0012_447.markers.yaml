  - {type: variant, offset: 226, length: 0, content: '', krp: 汝南陳仲舉體氣髙烈有王臣之節頴川李元禮忠平正直有社稷之能海内論二士有議而未決陳留蔡伯喈云仲舉強於犯上元禮長於接下犯上爲難接下爲易仲舉爲先元禮後矣天下於是爲定愚思竊以伯喈未必可從也夫臯繇戒舜犯上之徴也舜治百揆接下之效也故陳平謂王陵言面折廷爭我不如公至安劉氏公不如我而犯上則爲優是王陵當髙於良平朱雲殊乎呉鄧矣陸恭仲荅曰陳李二君德齊於行才等於身無長短之差時人或其先後魏文帝典論曰或有方周成王於漢昭帝者余以爲周氏體聖考之作氣禀賢妣之胎敎周邵爲保傅吕尚爲太師故咳笑必含仁義之聲觀聽必覿禮義之容弘踐祚之義隆太平之化禮}
  - {type: variant, offset: 227, length: 1, content: 廣, SBCK: 興於上頌聲作於下時成王年二十二享國三十年丗永治長德與年豐夫孝昭父非武王母非邑姜體不承聖化不胎育保無仁孝之德佐無隆平之治所謂生􅀷宫中長婦人手矣德與體并智與性成孝昭之崩年二十有一承衰􅁦之丗牧彫落之民臣無淑聖之智身有短折之期欲髙隆周豈不謬哉曹植漢二祖論曰髙祖因􅁀􅁗而起官由亭長自亡徒招集英雄遂誅強楚光有天下功齊湯武業流後嗣誠帝王之元勲人君之盛事也直寡善人之美稱鮮君子之風采惑􅁗宮而不出窘項座而不起計失乎酈生忿過乎韓信太公是誥於孝違矣敗古今之大敎傷王道之實義然其驍將藎臣皆古今之鮮有而能任其才而用之聽其言而察之故兼天下而有帝位也不然斯不免當丗之妄夫丗祖體乾靈之休德韜亞聖之才聦逹而多識樂施而愛人神光前驅威風先逝軍未出於南京莽巳斃于西都當此時也九州鼎沸四海淵涌言帝者二三稱王者四五咸鴟視狼顧虎超龍驤光武秉朱光之臣􅃏震赫斯之隆怒盪滌凶穢勦除醜􅀋􅀂勁風而縱烈火曬白日而掃朝雲也計功則業殊比隆則事異語德則靡諐言行則無穢卒能立不刋之遐跡建不朽之元功故曰光武其近優也曹檀成王論曰周公以天下初定武王旣終而成王}
