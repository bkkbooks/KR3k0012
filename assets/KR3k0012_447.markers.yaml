  - {type: variant, offset: 880, length: 1, content: 亦, WYG: 大衆所走未若武帝爲吕布奔北騎所擒刼突火之急也𤣥德爲陸遜所覆未若武帝爲張繡所困挺身逃遁}
  - {type: variant, offset: 881, length: 9, content: 以湛為癡每見濟輒調, SBCK: 可聞一知十乎曰末必也昔齊欲伐魯回求􅀃陳常而孔子不許遂使子貢子貢一出破齊強晉亡呉霸越存魯也夫顔子與賜程智比才相校於八至於此事而丘不使也抱朴子曰凡薄}
  - {type: variant, offset: 882, length: 4, content: 湛為癡每, WYG: 䘮二子也若令髙祖死於彭城世人方之不及項羽逺矣武帝死宛下將復謂不及張繡矣而其安忍無親若楊德祖之徒多}
