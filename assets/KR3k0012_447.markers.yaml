  - {type: variant, offset: 1311, length: 0, content: '', SBCK: 虗心交子不合則怨至二賢不睦非國之利也嘏荅之曰太􅀄能虗聲而無實才何平叔言逺而情近好辯而無誠鄧玄茂外徇名利内無􅀜鑰此三人者皆敗德也孫子曰譙周勸王降魏何平曰自謂天子而乞降請命何恥之􅀷乎夫爲社稷死則死亡則亡先君正魏之篡不與同天過於其父俛首而事讎可謂苟存豈大君之正道哉郭子曰􅁃道季云藺相如雖千載死人懔懔􅁪如有生氣曹蜍李志雖見在厭厭如九泉下}
