  - {type: variant, offset: 503, length: 171, content: 二箭而下雙鴟太宗嘉之賜御弓矢金帶以旌其能軍中於是號幹為射鴟都尉又曰靈丘南有山高四百餘丈群官仰射無能踰者文成帝彎弧發矢出三十餘丈過山南二百三十步遂刊石勒銘又曰孝武即位諸蕃並遣使朝貢帝臨軒宴之有鴟飛於殿前帝素知竇熾善射因欲矜示遠人乃給熾御覽物隻命射之鴟乃應弦而落諸蕃人咸歎異焉帝大悅又曰南平王渾好弓馬射鳥輒歷飛而中之日射兔得五十頭太武嘗命左右分射, SBCK: 選士夫}
