  - {type: variant, offset: 106, length: 309, content: 射取之晟馳往遇鵰相玃遂一發雙貫焉攝圖喜命諸子弟貴人皆相親友冀昵近之以學彈射又曰爾朱兆萬仁榮從子也少驍猛善騎射蹻捷過人榮曾送臺使見二鹿乃命兆前授之二箭曰可取此鹿供令食也遂停馬搆火以待之俄然兆獲其一榮欲矜誇使人責兆曰何不盡取杖之五十又曰山偉字仲才河南洛陽人其先代人也祖強攻騎射彎弓五石初為駕部郎顯祖出於方山兩狐起於御前詔強射之百步之內二狐俱死顯祖善之除內行長又曰元庫汗為羽林中郎從駕北巡有兔起於乘輿命庫汗射之應弦而斃太祖大悅賜金兔一枚以旌其能又曰楊播字延慶車駕曜威城沔水上已設宴高祖與中軍彭城王勰賭射左衛元遙在勰朋內而播居帝曹遙射侯正中籌限以滿高祖曰左衛籌足右衛不得不解播對曰仰恃聖恩庶幾必爭於是彎弓而發其箭正中高祖笑曰雖, SBCK: ''}
