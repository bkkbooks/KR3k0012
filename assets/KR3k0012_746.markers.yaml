  - {type: variant, offset: 1213, length: 810, content: 而中鏃入寸餘就而視之乃石也太祖聞而異之賜書曰昔李將軍廣親有此事公今復爾可謂世載其德雖熊渠之名不能獨善其美又曰趙文少而修德存忠節便弓馬能左右馳射又曰豆盧寧嘗與梁企定遇於平涼川相與肆射乃於百步懸莎草以射之七發五中企定時以為能贈遺甚厚又曰賀跋勝從太祖宴于昆明池時有雙鳧遊於池上太祖乃授弓矢於勝曰不見公射久矣請以為歡勝射之一發俱中因拜太祖曰使勝得奉神武以討不庭皆如此也太祖大悅自是恩禮尢重又曰齊王憲子貴年十一從憲獵於鹽州圍中手射野馬及鹿一十有五隋書曰突厥入朝隋文賜之射突厥一發中的上曰非賀若弼無能當此乃命弼弼再拜祝曰臣若赤誠奉國當一發破的如其不然發不中也既射一發而中上大悅顧謂突厥曰此人天賜我也又曰韓洪平陳之役授行軍揔管及陳平晉王大獵於蔣山有猛獸在圍中眾皆懼洪馳馬射之應弦而倒陳氏諸將列觀於側莫不歎伏焉王大喜賜縑百疋又曰宇文忻字仲樂年十二能左右馳射驍捷若飛常謂所親曰自古名將唯以韓白衛霍為美談吾察其行事未足多也若使與僕並時不令豎子獨擅高名也其少慷慨若此又曰虞慶則幼雄毅身被鎧帶兩鞬左右馳射本州豪俠皆敬憚之又曰史萬歲京兆杜陵人也見群飛鴈曰請射行中第三者射之應弦而落三軍莫不悅服唐書曰馮盎時羅竇諸洞獠叛詔令盎率部落二萬為諸軍先鋒時有賊數萬屯據險要不可攻逼盎持弓語左右曰盡吾此箭可知勝負連發七矢而中七人又曰薛仁貴領兵擊九姓突厥於天山將行高宗出甲令仁貴試之上曰古之善射有穿七札者卿且射五重仁貴射而洞之高宗大驚更取堅甲以賜之又曰李晟性雄烈有才善騎射年十八從軍身長六尺勇敢絕倫時西河節度使王忠嗣擊吐蕃有驍將乘城拒鬭頗傷士卒忠嗣募軍中能射者射之晟引軍一發而斃三軍皆大呼忠嗣厚賞之因撫其背曰此萬人敵也莊子曰吳王浮乎江登于於狙之山眾狙見之徇然而走逃於深榛有一狙焉見巧於王王射之敏給敏疾也給績也搏捷矢捷速也矢往雖速而狙能搏也王命相者趨而射之狙執死王顧謂其友顏不疑曰是狙也伐其巧恃其便以傲於子以至此殛也戒之哉又曰列禦寇為伯昏瞀人射引之盈貫棤杯水於其肘, SBCK: 道}
