  - {type: punctuation, offset: 2126, content: 「, id: KR3k0012_CHANT_746-bkkpn588}
  - {type: variant, offset: 2126, length: 1, content: 射, SBCK: 子貢問治人於孔子孔子曰懔焉如與腐索御汗馬懔懼也汗突之馬也國語曰䥫之戰簡子曰鄭人擊我吾伏弢他刀切弢弓文流血鼓音不衰今日之事莫我􅀂也衛莊公爲右衛莊公奔晉趙簡子將納之爲右也曰吾九登九下擊人盡殪今日之事莫我加也郵無正御曰吾兩鞅將絶吾能止之郵無正大夫王良也鞅引也今日之事我止之次也駕而乗材材横也兩鞅皆絶史記曰周穆王乗驊騮騄耳使造父爲御日行千里徃見西王母莊子曰東野稷以御見莊公進退中繩周旋中䂓莊公爲造父弗過也顔闔遇之入見曰稷之馬將敗公密而不應少焉果敗而反公曰子何以知之曰其馬力竭矣而猶求焉故曰敗列子曰造父師曰􅁗豆氏造父之始從習御也執禮甚卑􅁗豆氏三年不吿造父執禮愈謹迺告之曰古語曰良弓之子必先爲箕良冶之子必先爲裘汝先觀吾趨趨如吾然後六轡可持六馬可御造父曰唯命所從􅁗豆氏乃立木爲塗僅可容足計步而置之履之而行趨走徃還無缺失也造父學之三日盡其巧􅁗豆歎曰子何敏也得之捷乎御}
  - {type: page-break, offset: 2126, content: '', id: KR3k0012_SBCK_746-4b}
  - {type: variant, offset: 2126, length: 1, content: 射, WYG: 子貢問治人於孔子孔子曰懔焉如與腐索御扞馬懔懼也扞馬扞突之馬也國語曰鐵之戰簡子曰鄭人繫我吾伏弢流血鼓音不衰今日之事莫我若也衛荘公為右衛荘公奔晉趙簡子將納之為右也曰吾九登九下擊人盡殪今日之事莫我加也郵無正御曰吾兩鞁將絶吾能止之郵無正大夫王良也鞅引也今日之事我上之次也駕而乘材材横木也兩鞁皆絶史記曰周穆王乘驊騮騄耳使造父為御日行千里往見西王母荘子曰東里稷以御見荘公進退中繩周旋中規荘公為遺父弗過也顔闔遇之入見曰稷之馬将敗公宻而不應少焉果敗而反公曰子何以知之曰其馬力竭矣而猶求焉故曰敗列子曰造父師曰泰豆氏造父之始從習御也執禮甚卑泰豆氏三年不告造父執禮愈謹廼吿之曰古語曰良弓之子必先為箕良冶之子必先為裘汝先觀吾趨趨如吾然後六轡可持六馬可御造父曰唯命所從泰豆氏乃立木為塗僅可容足計歩而置之履之而行趨走往還无跌失也造父學之三日盡其巧泰豆嘆曰子何敏也得之㨗乎御}
