  - {type: variant, offset: 2126, length: 1, content: 射, krp: 子貢問治人於孔子孔子曰懔焉如與腐索御汗馬懔懼也汗突之馬也國語曰䥫之戰簡子曰鄭人擊我吾伏弢他刀切弢弓文流血鼓音不衰今日之事莫我若也衛莊公爲右衛莊公奔晉趙簡子將納之爲右也曰吾九登九下擊人盡殪今日之事莫我加也郵無正御曰吾兩鞅將絶吾能止之郵無正大夫王良也鞅引也今日之事我止之次也駕而乗材材横也兩鞅皆絶史記曰周穆王乗驊騮騄耳使造父爲御日行千里徃見西王母莊子曰東野稷以御見莊公進退中繩周旋中䂓莊公爲造父弗過也顔闔遇之入見曰稷之馬將敗公密而不應少焉果敗而反公曰子何以知之曰其馬力竭矣而猶求焉故曰敗列子曰造父師曰秦豆氏造父之始從習御也執禮甚卑秦豆氏三年不吿造父執禮愈謹迺告之曰古語曰良弓之子必先爲箕良冶之子必先爲裘汝先觀吾趨趨如吾然後六轡可持六馬可御造父曰唯命所從秦豆氏乃立木爲塗僅可容足計步而置之履之而行趨走徃還無缺失也造父學之三日盡其巧秦豆歎曰子何敏也得之捷乎御}
  - {type: variant, offset: 2128, length: 1, content: 非, SBCK: 亦如此也曩汝行之於足應之於心推於御也齊楫乎轡銜之際急緩乎脣吻之和正度乎胷臆之中節節乎掌握之間内得於中心外合於馬志是故能進退履繩而旋曲中䂓取道致逺而氣力有餘誠得其術矣得之於銜應之於轡得之於轡應之於手得之於手應之於心則不以目視不以䇿驅心閑體正六轡不亂二十四蹄所投無差迴旋進退莫不中節然後車輪之外可使無餘轍馬蹄之外可使無餘地未甞覺山谷之嶮原隰之夷視之一也吾術窮矣汝其識之管子曰造父善御者也善視其馬節其飲食量其馬力故能取逺道而馬不罷音疲明主猶造父也善治其民度量其力也孟子曰昔者趙簡子使王良與嬖奚乗終日而不獲一禽嬖奚反命曰天下之賤工也或以告王良良曰請復之強而後可一朝而獲十嬖奚反命曰天下之良工也韓子曰鈆陵卓子乗蒼龍桃文乗鈎錦在}
  - {type: page-break, offset: 2128, content: '', id: KR3k0012_SBCK_746-5a}
  - {type: variant, offset: 2128, length: 1, content: 非, WYG: 亦如此也曩汝行之於足應之於心推於御也齊輯乎轡銜之際急綏乎脣吻之和正度乎胷臆之中執節乎掌握之間内得於中心外合於馬志是故能進退履繩而旋曲中規取道致逺而氣力有餘誠得其術矣得之於銜應之於轡得之於轡應之於手得之於手應之於心則不以目視不以䇿驅心閑體正六轡不亂二十四蹄所投无差廽旋進退莫不中節然後車輪之外可使无餘轍馬蹄之外可使无餘地未嘗覺山谷之險原隰之夷視之一也吾術窮矣汝其識之管子曰造父善御者也善視其馬節其飲食量其馬力故能取逺道而馬不罷明王猶造父也善治其民度量其力也孟子曰昔者趙簡子使王良與嬖奚乘終日而不獲一禽嬖奚反命曰天下之賤工也或以告王良良曰請復之強而後可一朝而獲十禽嬖奚反命曰天下之良工也韓子曰鈆陵卓子乘蒼龍桃文乘鈎錦在}
