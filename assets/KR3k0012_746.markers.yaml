  - {type: variant, offset: 3242, length: 1, content: 射, SBCK: 舉馬莫使而自走星燿而􅀇運電奔而􅀑駭進退詘伸不見塍余反四毀又曰尹需學御三年而無得焉常寢想}
  - {type: variant, offset: 3242, length: 1, content: 射, krp: 舉馬莫使而自走星燿而玄運電奔而鬼駭進退詘伸不見塍余反四毀又曰尹需學御三年而無得焉常寢想}
