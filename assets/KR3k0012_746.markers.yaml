  - {type: variant, offset: 3235, length: 2, content: 楚王, SBCK: 舟覆乃見善游馬奔乃見良御善游故覆舟不溺良御故馬奔車不敗故見之又曰夫載重而馬羸雖造父不能以追急車輕而馬良雖中工可以致逺又曰良馬不待䇿錣丁刮切䇿端}
  - {type: page-break, offset: 3235, content: '', id: KR3k0012_SBCK_746-6a}
  - {type: variant, offset: 3235, length: 8, content: 楚王有白援王自射, WYG: 舟覆乃見善游馬奔乃見良御善游故覆舟不溺良御故馬奔車不敗又曰夫載重而馬羸雖造父不能以追急車輕而馬良雖中工可以致逺又曰良馬不待䇿錣而行駑馬雖兩錣之不能進為此不用䇿錣而御}
  - {type: variant, offset: 3235, length: 2, content: 楚王, krp: 舟覆乃見善游馬奔乃見良御善游故覆舟不溺良御故馬奔車不敗故見之又曰夫載重而馬羸雖造父不能以追急車輕而馬良雖中工可以致逺又曰良馬不待䇿錣丁刮切䇿端}
  - {type: variant, offset: 3238, length: 3, content: 白援王, SBCK: 鐵也而行駑馬雖兩錣之不能進爲此不用䇿錣而御則愚矣又曰􅀂夫鉗且大丙之御也鉗且大丙太一之御除轡衘棄箠䇿車莫動而}
  - {type: variant, offset: 3238, length: 3, content: 白援王, krp: 鐵也而行駑馬雖兩錣之不能進爲此不用䇿錣而御則愚矣又曰若夫鉗且大丙之御也鉗且大丙太一之御除轡衘棄箠䇿車莫動而}
