  - {type: variant, offset: 3244, length: 0, content: '', SBCK: 寢堅思之中夜夢受秋駕於師秋駕善御之術明日徃朝師望而謂之曰吾非愛道於子也恐子不可予也今日將教子以秋駕尹需反走北面再拜曰臣有天幸今夕固夢受之又曰夫馬之爲草駒之時跳躍揚蹄翹尾而走人不能制馬五尺以下爲駒放在草中故曰爲草駒之時翹舉也制禁也之及至圉人擾之良御教之圉養馬官擾順也掩以衝扼連以轡衘}
