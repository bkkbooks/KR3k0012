  - {type: variant, offset: 2041, length: 0, content: '', WYG: 公以其言為儀儀法而穿七札弓工立得出賜金三鎰英雄記曰袁術遣将紀靈率歩騎三萬攻劉備吕布遣人招備并請靈等饗飲謂靈曰布性不喜合鬭但喜解鬭耳乃令植㦸於營門彎弓曰諸君觀布射㦸小支中者當解兵不中留决鬭布一發中㦸支遂罷兵西亰雜記曰茂陵人周楊本琅邪人善馴野鷄以為媒用以射雉每三春之月茒障自翳用鮭古述切矢以射之日連百數茂陵輕薄者化之皆以雜寳錯厠翳障輕騎妖服追隨於道路以為歡娛楊死其子亦善其事董司馬好之以為上客典論曰文帝自叙曰少好弓馬逐禽輙十里射常出百歩後獩貊貢良弓燕代獻名馬於鄴西獵終日獲獐鹿九雉兔二十後尚書令荀彧聞余曰又君善左右射此實難能余曰執事未覩凡埓有常徑的有定所雖矢發輙中非妙也若夫馳平原赴豐草逐狡獸截輕禽使弓不虛彎矢不虚發此乃妙爾山海經曰軒轅國在窮山之際不敢西射畏軒轅之丘}
