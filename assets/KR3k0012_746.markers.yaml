  - {type: variant, offset: 2123, length: 0, content: '', SBCK: 衆工歸我妍御書曰􅀂朽索之御六馬禮曰君將駕則㒒執䇿立於馬前􅁥駕且爲馬行巳駕僕展軨展軨具視效駕自巳駕矣奮衣由右上取貳綏奮振去塵也貳副也跪乗未敢立散也執䇿分轡驅之五歩而立調成之也君岀就車則㒒并轡授綏車上㒒所主也左右攘辟謂羣臣陪位侍駕者也攘却也或音古讓乎也車騎而騶至于大門君撫㒒之手而顧命車右就車門閭溝渠必歩車右勇力之士備制非常者君行則陪乗君式則下歩行也凡㒒人之禮必授人綏􅀂㒒者降等則撫㒒之手不然則自下拘之撫小止之議也自下取之也㒒與巳下拘之由㒒手同爵則不受又曰魯莊公及宋人戰于乗丘懸奔父御卜國爲右馬驚敗績公墜左車授綏公曰未之卜也懸奔父曰他日不敗績而今敗績是無勇也遂死之圉人浴馬有流矢在白肉公曰非其罪也遂誄之周禮曰教國子以五馭一曰鳴和鑾二曰逐水曲三曰過表四曰儛交衢五曰逐禽在論語曰子謂門弟子曰吾何執執御乎執射乎吾執御矣大戴禮曰善御馬者正衘勒齊轡䇿均馬力和馬心家語曰閔子騫爲費宰問政於孔子孔子曰以德以法夫德法者御民之具猶御馬之有銜勒也君子人也吏者轡也刑者䇿也人君之政執其轡䇿而巳}
