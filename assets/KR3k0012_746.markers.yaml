  - {type: variant, offset: 2123, length: 0, content: '', WYG: 衆工歸我妍御書曰若朽索之御六馬禮曰君將駕則僕執策立於馬前監駕且為馬行已駕僕展軨展軨具視效駕自已駕矣奮衣右上取貳綏奮振去䴢也貳副也跪乘未敢立散也執䇿分轡驅之五歩而立調試之也君出就車則僕并轡授綏車上僕所立也左右攘辟謂羣臣陪位侍駕者也攘却也或音攘古讓字也車驅而騶至于大門君撫僕之手而顧命車右就車門閭溝渠必歩車右勇力之士備制非君行則陪乘君式則下歩常行者也凡僕人之禮必授人綏若僕者降等則受不然則否若僕者降等則撫僕之手不然則自下拘之撫小止之謙也自下拘之由僕手下取之也僕與己同爵則不受又曰魯荘公及宋人戰于乘丘縣賁父御卜國為右馬驚敗績公隊佐車授綏公曰末之卜也縣賁父曰他日不敗績而今敗績是無勇也遂死之圉人浴馬有流矢在白肉公曰非其罪也遂誄之周禮曰教國子以五馭一曰鳴和鑾二曰逐水曲三曰過君表四曰舞交衢五曰逐禽左論語曰子謂門弟子曰吾何執執御乎執射乎曰吾執御矣大戴禮曰善御馬者正銜勒齊轡䇿均馬力和馬心家語曰閔子騫為費宰問政於孔子孔子曰以徳以法夫徳法者御民之具猶御馬之有御勒也君子人也吏者轡也刑者䇿也君子之政執其轡䇿而已}
