  - {type: variant, offset: 2135, length: 0, content: '', SBCK: 曰東野畢之馬佚兩驂引兩服入厩定公越席而起召顔闔曰子言東野畢其馬將佚不識何以知之對曰臣以政知之昔者舜巧於使民而造父巧於使馬舜不窮其民造父不窮其馬是以舜無佚民造父無佚馬今野畢之御上車執轡衘體正矣歩驟馳騁朝禮畢矣歷險致逺其力盡矣然而求馬不巳是以知之公曰}
