  - {type: variant, offset: 2171, length: 876, content: 羿乎言不可矣列子曰列子學射中矣請於關尹子關尹子曰子知子之所以中者乎對曰弗知也關尹子曰未可退而習之三年又以報關尹子關尹子曰子知子之所以中者乎列子曰知之矣關尹子曰可矣而勿失也非獨射為國與身亦皆如之又曰中山公子牟悅趙人公孫龍樂正子輿之徒笑之公子牟曰子何笑牟之悅龍也子輿曰吾笑龍之給孔穿給欺言善射者能令後鏃中前括音闊發發相及矢矢相屬前矢造淮而無絕落後矢之栝猶衘弦視之若一焉孔穿駭之龍曰此未其妙者逢蒙之弟子曰鴻起怒其妻而怖之引鳥號之弓淇衛之箭射其目矢至眸子而眶不睫矢墜地而塵不揚是豈智者之言歟公子牟曰知者之言固非愚者之所曉也後鏃中前括均後於前也矢注眸子而眶不睫盡矢之勢也子何疑焉又曰甘蠅古之善射者彀弓而獸伏鳥下弟子名飛衛學於甘蠅而巧過其師紀昌又學射於飛衛曰爾先學不瞚音舜而後可言射矣紀昌歸偃臥其妻之機下以目承牽挺牽挺機躡也三年之後錐末到眥而不瞚也以告飛衛飛衛曰未也亞學視小如大視微如著而後告我紀昌以氂懸虱於牖南面而望之旬日之間浸大也三年之後如輪焉以覩餘物並丘山也乃以燕角之弧朔蓬之簳射之貫虱之心而懸不絕以告飛衛飛衛高蹈捬膺曰汝得之矣紀昌既盡衛之術計天下之敵己者一人而已乃謀殺飛衛相遇於野二人交射中路矢鋒相觸而墜於地而塵不揚飛衛之矢先射紀昌之矢唯一既發飛衛以棘刺之端扞之而無差焉於是二子泣而投弓相拜於塗請為之父子韓子曰李悝為魏文侯北地之守而欲民之善射也乃下令曰民之有狐疑之說者令人射杓音摽中之者勝不中者不勝令且下而民皆習射日夜不休乃與秦戰大敗之以民之善射故也墨子曰或有於墨子學射墨子曰不可夫學者必量其力國士猶不可及今子非國士豈能我學又成射哉周生烈子善射者不盡弓力善治者不盡下情尸子曰荊莊王命養由基射青蛉王曰吾欲生得之養由基援弓射之拂左翼焉王大喜符子曰晉之相者桓氏世傳于楚善以道假乎射焉常以其所不射而患晝之不足以卒歲故以夜而燭之又曰夏王使羿射於方矢之皮征寸之的乃命羿曰子射之中則賞子以萬金之費不中則削子以十邑之地異容無定色氣戰於胸中乃援弓而射之不中更射之又不中夏王謂傅彌仁曰斯羿也發無不中而與之賞罰則不中的者何也傅彌仁曰若羿也口懼為之災萬金為之患矣人能遺其喜去其萬金, SBCK: ''}
