  - {type: variant, offset: 761, length: 255, content: 猶有餘力觀者以為絕倫西魏書曰文帝在天遊園以金巵置侯上令公卿射中即賜之宇文貴一發而中帝笑曰由基之妙正當此耳進侍中北齊書曰斛律光嘗從文襄洹橋校獵雲表見一大鳥射之正中其頸形如車輪旋轉而下乃鵰也邢子高歎曰此射鵰手也當時號落鵰都督又曰斛律羨及光並工騎射少時好獵父金命子孫會射而觀之泣曰明月豐樂用弓不及我諸孫又不及明月豐樂世衰矣每日令出畋遊即較所獲光獲雖少必麗龜達腋羨獲雖多非要害之所光常蒙賞羨或被箠人問其故云明月必背上著豐樂隨處即下手數雖多去兄遠矣聞者服其言明月光之字豐樂羨之字也又曰元景安善射孝昭嘗與功臣西園宴射侯去堂, SBCK: ''}
