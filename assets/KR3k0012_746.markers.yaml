  - {type: variant, offset: 2041, length: 0, content: '', SBCK: 公以其言爲儀儀法而穿七札弓工立得岀賜金三鎰英雄記曰􅀽術遣將紀靈率歩􅀐三萬攻劉備吕布遣人招備并請靈等饗飲謂靈曰布性不喜合􅋐但喜解􅃲耳乃令植㦸於營門彎弓曰諸君觀布射㦸小支中者當解兵不中留決􅃲布一發中㦸支遂罷兵西京􅄂記曰茂陵人周楊夲瑯耶人善馴野雞以爲媒用以射雉毎三春之月􅈋障自翳用鮭古迷切矢以射之日連百數茂陵輕薄者化之皆以􅄂寳錯厠翳障輕􅀐妖服追隨於道路以爲歡娱楊死其子亦善其事董司馬賢也好之以爲上客典論曰文帝自叙曰少好弓馬逐禽輙十里射常岀百歩後獩㹮貢良弓燕代獻名馬於鄴西獵終日獲麞鹿九雉兎二十後尚書令荀彧問余曰聞君善左右射此實難能余曰執事未覩凡埒有常徑的有定所雖矢發輙中非妙也􅀂夫馳平原赴豐草逐狡獸截輕禽使弓不虚彎矢不虚發此乃妙耳山海經曰軒轅國在窮山之際不敢西射畏軒轅之丘}
