  - {type: variant, offset: 2117, length: 0, content: '', SBCK: 能則辭之以疾懸􅀌之義在焉故曰和容爲上主皮爲次并之者又何加矣乃君子之所爭也雖欲勿用禮其捨諸乎王昶戲論曰禮記有投壷之宴論語稱􅀶弈之賢兹三戯者君子末事不足爲也樗蒲彈碁旣不益人又國有禁皆不得爲也吾見坐圍碁而死近事非逺昔晉侯以投壷丧宋公好􅀶弈亡豈不哀哉諸戲中唯有}
