  - {type: variant, offset: 5060, length: 10, content: 本神無方孝子以主係心, SBCK: 爲天下求福報功人非土不立非榖不食土地廣愽不可遍敬五祀衆多不可一一而􅀕故封土立社祀而之示尊五榖之長立稷而祀之稷者得隂陽和氣而爲用又多故爲長歳再􅀕之}
