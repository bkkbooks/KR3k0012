  - {type: variant, offset: 4393, length: 2, content: 謹按, WYG: 今民位社神為公社為上公非地祗也漢書郊祀志曰髙祖時天下已定詔御史令于豐治枌榆社常春以羊彘祠之也又郊祀志曰稷者百穀之主所以奉宗廟供粢盛人所食以生活也王者莫不尊重親祭自為之主禮如宗廟詩曰乃立冢土又曰㠯御田祖㠯祈甘雨禮記曰唯祭宗廟社稷為越紼而行事至漢興禮稍定已有官社未立官稷遂于官社後立官稷以夏禹配食官社后稷配食官稷稷種榖樹又曰陳平既娶張氏女資用益饒游道日廣里中社平為宰分肉甚均里父老曰陳孺子能為宰平曰使平得宰天下亦如此肉也又曰欒布吴軍時以功封為鄃侯復為燕相齊燕之間皆為立社號曰欒公社續漢書曰每月朔旦太史上其事立有司侍郎尚書見讀其令奉行其正所前後各一口皆牽羊酒至于社下以祭曰變割羊以同社用收曰變執事冠長冠衣单衣降領袖緑中衣絳朱袴以行禮如故事又曰建武一年立太社稷于雒陽在宗廟之左社稷之石皆方壇無屋有牆門而已二月及臘一嵗三祠皆置社稷太守今長侍祠牲用羊豚唯州所治有社無稷古者師行有載社主不載稷也晉書禮志曰前漢但置官社而無官稷王莽置官稷故漢至魏但太社有稷故常二社一稷後魏書曰天平四年四月七日帝神主既遷于太廟太社石主將遷于社宫禮官云應用幣中書侍郎裴伯茂時為祝文伯茂據故事太和中遷社髙祖用特不用幣遂以奏聞于時議者或引大禮遷廟幣令遷社冝不殊伯茂據尚書詔誥應用牲詔從之宋書禮志曰晉元帝建武元年又依洛京立二社一稷其大社之祝曰地徳普施惠存无疆乃建太社保佑萬邦悠悠四海咸賴嘉祥其社之祝曰坤徳厚載王畿是保乃建帝社以神地道明祀惟晨景福來造禮左宗廟右社稷厯代尊之故洛京社稷在廟之右而江左亦然又曰祠大社祭大稷春秋二社日祠之唐書曰天寳中升社稷五星為大祀詔曰祭之為典以陳至敬名或不正是相奪倫況社稷孚祐百代䝉其福日月照臨五星叶其紀兆庶允殖下土式瞻既超言象之外須極尊崇之禮列為中祀頗紊大猷自今以後社稷及日月五星并升為大祀仍以四時致祭六典曰仲春上戊祭大社以后土氏配焉祭大稷以后稷氏配焉家語云孔子曰古之平水土及播植百榖者衆矣然惟勾龍食于社而契為稷易代奉之無敢益者明不可與等也荘子曰㟪􅕲之民相與言曰桑庚子之始來吾洒然異之今吾日計之而不足嵗計之而有餘庶幾其聖人乎子胡不尸而祝之社而稷之乎又曰匠石之齊至乎曲轅見櫟社樹其大蔽牛絜之絜者匝也百圍其髙山臨千􅌇而後有校其可以為舟者旁十數觀者如市淮南子曰夫窮鄉之社扣瓮拊缾相和而歌自以為樂也嘗試為之擊鼓撞巨鐘乃知夫瓮缾之足羞也又曰禹勞力天下死而為社勞于治水公死祀于后土之中周棄作穡死而為稷種曰穡死祀稷宫之神文中子曰子房之智陳平之均絳侯勃之果霍將軍之勇文之以禮樂則可謂社稷之臣矣太公金匱曰武王問太公曰天下精神甚衆恐後復有試余者也何以待之師尚父曰請樹槐于王門内王路之石起面社築垣牆祭以酒脯食以犧牲尊之曰社客有非常先與之語客有益者人無益者距嵗告以水旱與澤流悉行除民所苦捜神記曰中宗初有應嫗者生四子而寡見神先照社試探之得黄金自是諸子官學並有才名劉氏京口記曰虎社村中父老相傳云曽有虎于社中産因以名荆州記曰葉縣東百步有縣故城西南四里名五百村有白榆連理樹異幹合條髙四丈餘士民奉以為社世説曰阮宣子伐樹人有止之宣子曰若樹而為壯伐樹則社移社而為樹伐樹則社亡矣習鑿齒逸民髙士傳曰董威輦不知何許人忽見于洛陽白社中戴延之西征記曰洛陽建春門外道北有白社董威輦所住也去門二里有牛馬市嵇公臨刑處也博物志曰子路與子貢過社社樹有烏子路摶鳥社神牽子路子貢說之乃止又曰周之正月受社牲之首以出種子帝藉蚕又受社雍及祭以沐蚕種上辛乃射黒牲于帝郊以祈來年之豐二月司空開冰射桃弧棘矢五發而御其容述異記曰庾邈與女子郭凝通詣社約不二心俱不婚嫁經二年凝忽暴亡邈出見凝云前北村還遇强梁抽刀見逼懼死従之不能守節為社神所責心痛而絶人鬼異路因下淚涔涔也蔡邕陳留東昏庫上里社碑曰惟斯庫上里古陽武之户牖鄉也秦時有池子華為丞相漢興陳平由此社宰遂相髙祖尅定天下為右丞相孝平之世虞延為太尉延熹中平曽孫放為尚書令以宰相繼踵咸出斯里雖有積徳脩身之政亦斯社所相乃樹碑云魏公九錫文曰錫君𤣥土苴以白茅爰契爾龜用建冡社注言亦如天子社稷也曹植賛社文曰余前封鄄城侯轉雍丘皆故荒土宅宇初造以府庫尚豐志在善公先務完圃而已農桑一無所營經離十載塊然守空飢寒偹嘗聖朝愍之故封此縣田則一州之膏腴桑則天下之甲苐故封此桑以為田社乃作頌云應璩與隂夏書曰従田來見南野之中有徒歩之士推而問之乃知郎君頃有微痾告祀社神將以祈福聞之悵然以増歎息虛社髙樹能有靈應哉張華朽社賦曰髙栢喬南大道傍有古社槐樹葢數百年木也余少居近之後去行路過之則以朽林意有緬燕聊為之言衰盛之理殷仲堪合社文曰夫社之為祀逺哉故}
