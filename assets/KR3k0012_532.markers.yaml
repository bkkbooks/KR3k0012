  - {type: variant, offset: 4178, length: 2, content: 一尺, WYG: 為境内之民立社曰國社有王社侯社有天子諸侯社立社則私有禱禾也地之勢有禮生物各隨所冝九州之人各居其土食有利者各報祭之是位神地之道者籍田之後則告五穀将耕也五穀既登又報功也國以民為大人以食為大故建國君民先命立社也地廣穀多不可徧祭故于國城之内立壇祭之貎之也日用甲尊之也惟天子祭天地諸侯社稷而已又曰社樹各以其土所宜之木河東宜松周地宜栗社主用石石土中豎者天子親征則載社主行有罪者誅之于車前左傳僖公曰宋公使邾文公用鄫子于次雎之社欲以属東夷此水有妖神象夷皆祠之司馬子魚曰古者六畜不相為用小祀不用大牲而況敢用人乎祭祀以為人也民神之主也用人而祭其誰享之哉又襄}
