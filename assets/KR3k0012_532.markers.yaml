  - {type: variant, offset: 427, length: 2410, content: 三士一又文王世子曰五廟之孫祖廟未毀雖及庶人冠娶必告死必赴不忘親也又明堂位曰山節藻梲複廟重檐刮楹達鄉反玷出尊崇坫康珪䟽屏天子廟飾也山節刻欂櫨為山也藻梲謂侏儒柱為藻文複廟重屋也檐承壁材也刮摩也鄉牖屬謂夾戶窗也每室為八窗為四達反坫反爵之坫也出尊當尊南也唯兩君為好既獻反爵其上禮君尊於兩楹之間也嵩高也康讀為元龍之亢屏謂之樹今愚也刻之為雲氣虫獸如今閻上為之又雜記曰成廟則釁之其禮祝宗人宰夫雍人皆爵純衣雍人舉羊升屋中屋南面刲羊血流于前乃降門夾室皆用雞凡宗廟之器其名者成則釁之以猳豚宗廟名器謂罇彝之屬又祭法曰天下有王分地建國置都立邑設廟祧壇墠而祭之乃為親䟽多少之數是故王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之遠廟為祧有二祧享嘗乃止去祧為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠曰鬼諸侯立五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止去祧為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠為鬼大夫立三廟二壇曰考廟曰王考廟曰皇考廟享嘗乃止顯考祖考無廟有禱焉為壇祭之去壇為鬼適士二廟一壇曰考廟曰王考廟享嘗乃止顯考無廟有禱焉為壇祭之去壇為鬼官師一廟曰考廟王考無廟而祭之去王考為鬼庶士庶人無廟死曰鬼廟之言貌也宗廟者先祖之尊貌也祧之言超也超上意也封士曰壇除地曰墠書曰三壇同墠又中庸曰武王纘大王王季文王之緒壹戎衣而有天下身不失天下之顯名尊為天子富有四海之內宗廟饗之子孫保之又祭法曰天下有王分地建國置都立邑設廟祧壇墠而祭之左傳桓公曰宋華父督已殺孔父而殺殤公召莊公於鄭而立之以親鄭以郜大鼎賂公夏四月取郜大鼎于宋戊申納于太廟非禮也又桓公曰清廟茅屋以茅飾屋著儉也清廟肅然清靜之稱又僖上曰震夷伯之廟罪之也於是辰氏有隱慝焉又文公下曰太室之屋壞書不恭也又成公三年曰甲子新宮災三日哭宣公神主新入廟故謂之新宮書三日哭善得禮宗廟親之神靈所憑居而遇災故哀而哭之又襄二曰吳子壽夢卒臨於周廟禮也周廟文王廟也周公出文王故魯立其廟也凡諸侯之喪異姓臨於外同姓臨於廟是故魯為諸姬臨於周廟公羊傳文公曰世室屋壞世室者何魯公之廟也周公稱太廟魯公稱世室群公稱宮穀梁傳成公曰新宮災三日哭新宮者禰宮也禰父也成公之父宣公之害也孝經曰宗廟致敬不忘親也又曰為之宗廟以鬼享之宗者尊也廟者皃也先祖之尊皃所居中宮何以為人死精魂歸乎天形體不藏存之即存不存則亡明先祖神死依人也孝經援神契曰廟所以尊祖也論語八佾曰子入太廟每事問或曰孰謂鄒人之子知禮乎入太廟每事問子聞之曰是禮也家語曰孔子在齊景公造焉左右白曰周使至言先王廟災景公曰何王廟孔子曰此必釐王廟夫釐變文武之制而作玄黃華麗之飾故天殃其廟焉有頃左右報所災者釐王廟景公曰善哉聖人之智過人遠矣又曰孔子曰吾於甘棠見宗廟之敬也甚矣思其人猶愛其樹尊其人必敬其道也史記曰秦始皇巡隴西北地出雞頭山過回中應劭曰回中在安定高平孟康注曰回中在北地作信宮渭南更命信宮為極廟象天極廟道通驪山作甘泉前殿築甬道應劭曰築垣墻如街巷又曰高祖崩群臣皆曰高祖起細撥亂令郡諸侯各立高祖廟以歲時祠及孝惠五年思高祖之悲樂沛宮為高祖原廟徐曰光武紀曰上幸豊相高祖於原廟駰謂原再也先既已立廟今又拜立故謂之原也漢書曰惠帝為東朝長樂宮及問往來數蹕煩民作複道方築武庫南叔孫通奏事因請問曰陛下何自築複道高帝寢衣冠月出遊高廟應劭月出高帝衣冠備法駕名遊衣冠子孫奈何乘宗廟道上行哉惠帝懼曰急壞之通曰人主無過舉今已作百姓皆知之後願陛下為原廟渭北衣冠月出遊之益廣宗廟大孝之本上乃詔有司立原廟惠帝嘗出遊離宮通曰古者嘗果方今櫻桃熟可獻願陛下出因取櫻桃獻宗廟上許之諸果獻由此興又曰文帝作顧城廟服虔曰廟在長安城南文帝作還顧見城故名之應劭曰文帝自為之制度畀狹若顧望而成故曰顧城賈誼曰目顧城之廟為天下太宗與漢無極或曰地名也如淳曰身存而為廟若尚書顧命也高祖廟曰原廟文帝廟曰顧城廟景帝廟曰德陽武帝廟曰龍淵昭帝廟曰徘徊宣帝號樂遊元帝廟曰長壽成帝廟曰成陽又曰梅福上書諫曰武王克殷未下車存五帝之後封殷於宋紹夏於𣏌明著三統示不獨有也是以姬姓半天下遷廟之主出於戶所謂存人自立也又曰宣帝即位尊孝武廟為世宗所行巡狩郡國皆立廟告祠世宗廟有白鶴集後庭以立世宗廟告祠孝昭寢有鴈五色集殿前西河築世宗廟神光興于殿旁有鳥曰鶴前赤後青神光又興於房中如燭狀廣川國世宗廟殿上有鍾音房戶大開夜有光殿上盡明又曰王莽以宗廟未脩張邯說莽曰德盛者文縟宜崇其制度宣示海內宜令萬世之後無以復加也莽乃博徵天下工匠諸圖畫及吏民以義入錢穀助作者駱驛道路壞徹城西苑中建章永光苞陽大臺儲元宮及平樂當路陽祿館凡十餘所取其材瓦以起九廟帝王世紀曰漢景帝廟名德陽宣帝廟名長壽武帝廟名龍淵文帝廟名顧成昭帝廟名徘徊東觀漢記曰中元元年十月甲申使司空馮魴告祠高祖廟呂太后不宜配食以薄太后配遷呂太后於園四時止祭又曰永初六年皇太后入宗廟於世祖廟與皇帝交獻薦如光烈皇后故事又曰建初四年八月上以公卿所奏明德皇后在世祖廟坐位駮議示東平憲王蒼蒼上言文武元祫食高廟皆以后配先帝所制典法設張大雅曰昭哉來御從其祖武又曰不愆不忘率由舊章明德皇后宜配孝明皇帝袁山松後漢書曰天子自雒陽遷都長安初長安遭赤眉亂宮室焚盡唯有高廟遂居之漢雜事曰光武棄天下以再受命復漢祚更起廟稱世祖孝明臨崩遺詔遵儉無起寢廟藏王於世祖廟孝章不敢違是後遵奉藏世祖廟如孝明之禮而園陵皆自起寢孝明廟曰顯宗孝章曰肅宗是後踵前孝和為穆宗孝安曰敬宗孝順曰恭宗孝桓曰威宗今雒陽諸陵皆晦望二十四氣伏社臘及四時上飯太官送用物園令食監典省其親陵一所宮人隨鼓漏理被枕具盥水陳嚴具天子以正月五月供畢後上原陵以次周遍公卿百官皆從四姓小侯諸家婦凡與先君有瓜葛者及諸侯王大夫郡國計吏匈奴朝者西國侍子皆會尚書官屬西除下在先帝神坐後大夫計吏皆當前下占其郡國穀價四方改異欲先帝魂神具聞之也遂於親陵各賜計吏而遣之魏書曰辛酉有司奏造二廟立文皇帝廟與高祖合祭親盡以次毀特立武皇帝廟四時享祀為魏太祖萬載不毀吳錄地理志曰會稽有禹廟始皇配食王朗為太守黜之王隱書曰太康十年太廟成遷神主於新廟賜王公, SBCK: ''}
