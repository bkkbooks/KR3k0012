  - {type: variant, offset: 4508, length: 8, content: 宰我宰我荅夏后氏, SBCK: 雒陽在宗廟之左社稷之右皆方壇無屋有墻門而巳二月八月及臘一歳三祠皆置社稷太守令長侍祠牲用羊豕唯州所治有社無稷古者師行有載社主不載稷也晉書禮志曰前漢但置官社而無官稷王莽置官稷故漢至魏但太社有稷故常二社一稷後魏書曰天平四年四月七帝神主旣遷於太廟太社石主將遷於社宫禮官云應用幣中書侍郎裴伯茂時爲祝文伯茂據故事太和中遷社髙祖用特不用幣遂}
