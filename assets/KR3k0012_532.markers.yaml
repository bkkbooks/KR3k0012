  - {type: variant, offset: 5154, length: 0, content: '', krp: 成羣斯禱里社之興由來尚矣自喪亂流遷舊俗隳廢今二三宗親思桑梓之遺風遵先聖之明誥㓗齊牲牢庶乎自祐以來一日之澤然三人之行必有其師故復選中正立三老者惟公理以御衆稽舊章以作憲卞敬宗櫟社序讃曰余門前有一社樹盤根䟽柯似非近丗所植抗秀路左流䕃庭宇莊周喻道於啇丘之木匠}
  - {type: variant, offset: 5155, length: 2, content: 為主, SBCK: 辯才於曲轅之擽由斯而觀固可以悟微矣王廙春可樂曰􅁻辰兮上戊明靈兮唯社百室兮必集祈􅀕兮樹下濯夘兮􅉁韮齧䔉􅀆擗鮓縹醪􅀆浮蟻交觴兮並坐氣和兮體適心怡兮志可何承天社頌曰社實隂祇稷唯榖元率育萬􅀋恊賛乹坤先農禮記月令曰孟春乃擇元辰天子親載耒耜置之車右率公卿諸侯大夫躬耕籍田辰亥也謂郊後􅁻亥享先農於東郊先農神農也續漢書􅀕祀志曰光武即位於鄗爲壇營於鄗之陽營神五星及中宫星雷公先農風伯雨師四海四瀆名山大川之屬漢舊儀曰春始東耕於籍田官祠先農先農即神農炎帝矣祠以一牢百官皆}
