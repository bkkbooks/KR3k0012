  - {type: variant, offset: 349, length: 0, content: '', SBCK: 又檀弓曰衛獻公岀奔反於衛及郊將班邑於從者而後入栁莊曰如皆守社稷則孰執羈靮而從如皆從則孰守社稷又郊特牲曰社􅀕而主隂氣也君南嚮於北墉下荅隂之義也墻謂之墉北墉社内日用甲用日之始也天子太社必受霜露風雨以逹天地氣也是故喪國之社屋之不受天陽也薄社北牖使隂明也絶其陽通其隂而巳薄社殷之社殷始都薄社所以神地之道也地載萬物天垂象取財於地取法於天是以尊天而親地也故教民美報焉家主中霤而國主社示夲也中霤亦士神也唯爲社事單出里唯爲社田國人畢作唯社兵乗共粢盛所以報夲反始}
