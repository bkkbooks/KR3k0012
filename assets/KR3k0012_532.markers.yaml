  - {type: variant, offset: 5072, length: 0, content: '', SBCK: 􅀕社稷有樂乎禮記曰金石之樂用之於宗廟社稷又曰王者諸侯必有戒社何示存亡也明爲善者得之爲惡者失之春秋公羊傳曰亡國之社奄其上柴其下郊特牲記曰喪國之社屋之示與天地絶也葵邕獨断云天子太社五色土爲壇皇子封爲王者授之太社之土以}
  - {type: variant, offset: 5072, length: 78, content: 所以虞而立主何孝子既葬日中反虞念親已沒棺柩已去悵然失望彷徨哀痛故設桑主以虞所以慰孝子之心虞安其神所以用桑者始與神相接三王俱以桑說文曰又祏宗廟主也禮郊宗石室一, WYG: 邴君行仁洛邑無虎邴君行廉路樹為社列異傳}
  - {type: variant, offset: 5072, length: 0, content: '', krp: 祭社稷有樂乎禮記曰金石之樂用之於宗廟社稷又曰王者諸侯必有戒社何示存亡也明爲善者得之爲惡者失之春秋公羊傳曰亡國之社奄其上柴其下郊特牲記曰喪國之社屋之示與天地絶也葵邕獨断云天子太社五色土爲壇皇子封爲王者授之太社之土以}
  - {type: variant, offset: 5073, length: 0, content: '', SBCK: 封之方色藉}
  - {type: variant, offset: 5073, length: 0, content: '', krp: 封之方色藉}
  - {type: variant, offset: 5074, length: 0, content: '', SBCK: 白茅歸國以立社故爲之茅社也陳留風俗傳曰東昬縣者衛地故陽武之户牖郷也漢相陳平家焉少爲社下宰今民祀其社邴原别傳曰原避也遼東以虎爲患自原之落獨無虎患甞行而得遺錢㭘以繫樹枝比錢不見取繫錢者逾多原問其故荅者謂之社樹原惡其由巳而成妄祀乃辯之於是里中遂歛其錢以爲社供里老爲之誦曰邴君行仁落邑無虎邴君行廉路樹成社列異傳曰大司馬河内陵㽔字聖卿少時病虐逃社中有人呼社邸社邸聖卿應曰諾起至户中人曰取此書去得素書一卷譴劾百􅀑法所劾輙効搜神記曰中興􅀄有應嫗者生四子而寡見神光照社試探之得黄金自是諸子官學並有才名至瑒七丗顯劉楨京口記曰虎社中村老故相傳云昔有虎於社中産因以爲名荆州記曰葉縣東百歩有縣故城西南四里名伍伯村有白榆連李􅀣異幹合條髙四丈餘士民奉以爲社丗􅀃曰阮宣子伐樹人有止之宣子曰􅀂樹而爲社伐樹則社移社而爲樹伐樹則社亡矣習鑿齒逸民髙士傳曰董威輦不知何許人忽見於洛陽白社中戴延之西征記曰洛陽建春門外道北有白社董威輦所住也去門二里有牛馬市嵇公臨刑處也愽物志曰子路與子貢過社社樹有鳥子路􅅮鳥社神牽子路子貢􅀃之乃止又曰周之正月受社牲之首以出種子帝籍蚕又受社雍及􅀕以沐蚕種上辛乃射黒牲于帝郊以祈來年之豐二月司空開冰射桃弧􅁄矢五發以御其災述異記曰􅁃邈與女子郭凝通詣社約不二心俱不㛰娉經二年凝忽􅁀亡邈出見凝云前北村還遇強梁抽刀見逼懼死從之不能守節爲社神所責心痛而絶人鬼異路因下泣矜之也蔡邕陳留東昬庫上里社碑曰惟斯庫上里古陽武之户牖郷也􅁗時有池子華爲丞相漢興陳平由此社宰遂相髙祖剋定天下爲右丞相孝平之丗}
