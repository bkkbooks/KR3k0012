  - {type: variant, offset: 5054, length: 1, content: 祭, SBCK: 王者}
  - {type: variant, offset: 5054, length: 0, content: '', WYG: 所有社稷何為天下求福報功人非土不立非榖不受土地廣博不可遍敬五祀衆多不可一一而}
  - {type: variant, offset: 5054, length: 0, content: '', krp: 王者所有社稷何爲天下求福報功人非土不立非榖不食土地廣愽不可遍敬五祀衆多不可一一而}
  - {type: variant, offset: 5055, length: 0, content: '', WYG: 故封立社而示五尊榖之立稷而祀之祭而得隂陽和氣而為用又多故為長嵗再祭之又曰祭社稷者有樂乎禮記曰金石之樂用之于宗廟社稷又曰王者諸侯必有戒社何示存亡也明為善者得之而惡者失之春秋公羊傳曰亡國之社掩其上柴其下郊特牲記曰喪國之社屋之示與天絶也蔡邕獨㫁云天子大社五色土為壇皇子封為王者受之大社之土}
  - {type: page-break, offset: 5055, content: '', id: KR3k0012_WYG_532-14a, image: WYG0897/WYG0897-0717a.png}
  - {type: variant, offset: 5055, length: 15, content: 所以尸主何本神無方孝子以主係心, krp: 故封土立社祀而之示尊五榖之長立稷而祀之稷者得隂陽和氣而爲用又多故爲長歳再祭之}
