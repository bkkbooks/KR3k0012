  - {type: variant, offset: 3163, length: 235, content: 二王後附祭儀注云執事者列於廟東門之外既有東門明非一門獻武禮數既隆備物殊等唯據今廟宜開四門內院南面開三門餘及外院四面皆一門齊書禮志曰世祖夢太祖曰宋氏諸帝嘗在太廟從我求食可別為吾祠上乃勑豫章王妃庾氏四時還青溪宮舊宅處內舍堂奉祠二帝二后牲牢服章用家人禮晉起居注曰武帝太安中詔曰往者仍魏氏舊廟處立廟既壅翳不顯材木弱小至今中間有跌橈之患今當脩立不宜在故處太僕寺南臨甬道地形顯敞更於此營之主者依典禮施行晉書曰桓玄纂問眾曰朕其敗乎曹靖之對曰神怒人怨臣實懼焉玄曰人或可怨神何為怒對曰移晉, SBCK: 左}
