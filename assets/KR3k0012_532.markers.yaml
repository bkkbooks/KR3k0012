  - {type: variant, offset: 5153, length: 0, content: '', WYG: 躬耕籍田續漢書祭祀志曰光武即位于鄗為壇營于鄗之陽營神五星及中宫星霤公先農風伯雨師四海四瀆名山大川之属漢舊儀志曰春日東耕于籍田官祠先農先農即神農炎帝矣祠}
  - {type: page-break, offset: 5153, content: '', id: KR3k0012_WYG_532-16a, image: WYG0897/WYG0897-toc.png}
  - {type: variant, offset: 5154, length: 0, content: '', SBCK: 成羣斯禱里社之興由來尚矣自喪亂流遷舊俗隳廢今二三宗親思桑梓之遺風遵先聖之明誥㓗齊牲牢庶乎自祐以來一日之澤然三人之行必有其師故復選中正立三老者惟公理以御衆稽舊章以作憲卞敬宗櫟社序讃曰余門前有一社樹盤根䟽柯似非近丗所植抗秀路左流䕃庭宇莊周喻道於啇丘之木匠}
  - {type: page-break, offset: 5154, content: '', id: KR3k0012_SBCK_532-9b}
  - {type: variant, offset: 5154, length: 0, content: '', WYG: 一牢百官皆從大賜三輔二百里孝悌力田三老布帛漢名臣奏曰黄瓊上言先王制典籍田有曰司徒咸戒司空除壇先除有五曰有協風主即齋宫享燕載耒誠重之也先農之禮所宜躬親以迎春和以致時風沈約宋書祭祀志曰元嘉二十一年常親躬乃立無壇于籍田為四丈為田出陛廣五尺外加將方十丈車駕來到司空大司農率方禮及衆執事質眀以一大中祝祭祭器用社稷器祠畢頒餘胙于奉祀者舊典先農皆都列於郊祭靈星周書作雒曰設兆于南郊以祀上帝配以后稷農星先王皆與食毛詩閔子曰絲衣繹賓尸也髙子曰靈星之尸也繹又祭也天子諸侯繹以祭之眀曰卿大夫曰賔尸與祭同漢書郊祀志曰髙祖時或言周興而邰立后稷之祠至今血食天子於是制詔御史其令天下立靈星祠左角曰天用則農祥也星見而祭之常嵗時祀以牢三輔舊紀曰漢靈星祠在長安城東十里淮南子曰人君之道其猶靈星之尸言照嘿端而受福也嵩髙山記曰漢孝武游登五岳遵是靈臺遂移祠置岳南郊上築作殿壇周圍立瓦屋行種松樹前五百步臨大道立兩}
