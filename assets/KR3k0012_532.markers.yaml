  - {type: variant, offset: 2686, length: 151, content: 郡國計吏匈奴朝者西國侍子皆會尚書官屬西除下在先帝神坐後大夫計吏皆當前下占其郡國穀價四方改異欲先帝魂神具聞之也遂於親陵各賜計吏而遣之魏書曰辛酉有司奏造二廟立文皇帝廟與高祖合祭親盡以次毀特立武皇帝廟四時享祀為魏太祖萬載不毀吳錄地理志曰會稽有禹廟始皇配食王朗為太守黜之王隱書曰太康十年太廟成遷神主於新廟賜王公, WYG: ''}
