  - {type: variant, offset: 3400, length: 17, content: 飄泊無所大楚之祭不及於祖此其所以怒, SBCK: 周尚左}
  - {type: variant, offset: 3400, length: 701, content: 飄泊無所大楚之祭不及於祖此其所以怒也白虎通曰禮聖王所以制宗廟何曰生死殊路故敬鬼神而遠之所以有屋何所以象生之居又曰臣侍放於郊君不絕其祿者以其祿三分之一與其妻長子使得祭其宗廟賜之環即還之玦則去又曰王者立宗廟何緣生以事死敬亡若事存欲立宗廟而祭之此孝子之心所以追繼養也釋名曰廟貌也先祖形貌所在寢寢也所寢息也三輔故事曰光武至長安宮闕燒盡徙都洛陽取十二陵合為高廟作十二室太常卿一人別治長安主知齊祠事謂之高廟漢武故事曰宣帝立孝武廟於河東告祠日見一人騎馬馬異於常馬持尺一札賜將作亟文曰汝績克成賜汝金一斤因忽不見札乃變為金一斤蜀王本紀曰禹生於石紐禹母天珠孕禹坼副而生禹於塗山娶妻生子名啟於今塗山有禹廟亦為其母立廟三輔黃圖曰王莽於長安城南作九廟又曰太上皇廟在長安香街南墨子曰昔三苗大亂天命殛之雨血三朝龍生於廟說苑曰衛孫文子問王孫賈曰吾先君之廟小欲更之可乎對曰古之君子以儉為禮今之君子以大易之桓譚新論曰王莽起九廟以銅為柱薨帶金銀錯鏤其上王嬰古今通論曰夏曰世室世世祭祀之也殷曰重屋重夏為屋四霤周曰宗廟尊其生存之貌示不死之故致之於更楚辭天問序曰屈原放逐彷徨山澤仰天歎息楚有先王之廟及公卿祠堂圖畫天地山川神靈琦瑋譎詭及古賢聖怪物行事周流罷倦休息其下仰見圖晝因書其壁呵而問之晉諸公讚曰王淩字彭祖為幽州剌史尋洛陽破後承制建行臺以宗廟焚毀設壇望杞七室及功臣配食神主禮記曲禮曰措之廟立之主曰帝又檀弓下曰愛之斯錄之也敬之斯盡其道焉重主道也殷主綴重焉綴連也殷人作主而連其重懸諸廟也周主撤重焉周人作主撤重悝之又曰曾子問曰喪有二孤廟有二主禮也孔子曰天無二日國無二王嘗禘郊社尊無二上未知其為禮也昔者齊桓公亟舉兵作偽主以行及反藏諸祖廟廟有二主自桓公始, WYG: ''}
  - {type: variant, offset: 3400, length: 17, content: 飄泊無所大楚之祭不及於祖此其所以怒, krp: 周尚左}
