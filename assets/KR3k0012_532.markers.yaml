  - {type: variant, offset: 4107, length: 3, content: 君既葬, krp: 立社曰太社壇方五丈諸侯爲境内之民立社曰國社又有王社侯社者天子諸侯别自立社私有禱求地之勢有禮生物各隨所冝九州之人各居其土食其利者各報祭之是謂神地之道者籍田}
