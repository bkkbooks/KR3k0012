  - {type: variant, offset: 4517, length: 13, content: 松夏人都河東河東宜松也殷人, SBCK: 奏聞于時議者或引大戴禮遷廟用幣今遷社冝不殊伯茂據尚書召誥應用牲詔遂從之宋書禮志曰晉元帝建武元年又依洛京立二社一稷其太社之祝曰地徳普施惠存無疆乃建太社保佑萬􅀖悠悠四海咸頼嘉祥其社之祝曰坤徳厚載王畿是保乃建帝社}
  - {type: variant, offset: 4517, length: 533, content: 松夏人都河東河東宜松也殷人以柏殷人都亳宜柏也周人以栗周人都灃鎬灃鎬宜栗也五經要義曰木主之狀四方穿中央以達四方天子長尺二寸諸侯長尺皆刻謚於背也又曰主者神象也凡虞主用桑桑猶喪也喪禮取其名練王用栗栗者敬也祭禮取其恭五經通議曰諸侯會天子則以方明為主覲禮云明木也其形四方六面上玄下黃東青南赤西白北黑方明者上下四方神明之象也謝承後漢書曰赤眉盆子去長安西入右扶風鄧禹至長安中昆明池率諸將齊戒擇吉日入城謁高帝廟修禮祠祭勞賜吏士因收十二帝神主以故高廟郎來輔守高廟令行京兆尹承事桉行掃除諸園陵為置卒史奉守焉遣輔奉主詣京師王隱晉書曰李裔字宣伯父敏為公孫度所迫浮海莫知所終裔以父母不知存亡設木主以奉之由是發名晉起居注曰孝武太元二十年簡文皇帝宣太后正號神主移廟戊寅口詔移神主可停前後鼓吹摯虞決疑要注曰廟主藏於戶外西墉之中有石亟名曰宗祏古者帝王出征於車載遷廟之主及社主以行秦漢魏不載主也唐書曰祔順宗于廟遷中宗神主于夾室有司以中宗為中興之君當百代不遷宰臣召史官蔣武問之武對曰中宗以弘道元年於高宗柩前即位時春秋已壯矣及母后篡奪神器潛移其後賴張柬之等同謀國祚再復此蓋同於反正恐不得號為中興之君凡非我失之自我復之謂之中興漢光武晉元帝是也自我失之因人復之晉孝惠孝安是也今中宗與惠安二帝事同即不可為不遷主矣, WYG: 作憲}
  - {type: variant, offset: 4517, length: 13, content: 松夏人都河東河東宜松也殷人, krp: 奏聞于時議者或引大戴禮遷廟用幣今遷社冝不殊伯茂據尚書召誥應用牲詔遂從之宋書禮志曰晉元帝建武元年又依洛京立二社一稷其太社之祝曰地徳普施惠存無疆乃建太社保佑萬邦悠悠四海咸頼嘉祥其社之祝曰坤徳厚載王畿是保乃建帝社}
