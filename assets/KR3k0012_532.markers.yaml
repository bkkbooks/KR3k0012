  - {type: variant, offset: 4172, length: 0, content: '', SBCK: 行有罪者誅之於車前左傳僖公曰宋公使邾文公用鄫子於次雎之社欲以屬東夷此水有妖神東夷皆社祠之司馬子魚曰古者六畜不相爲用小事不用大牲而况敢用人乎􅀕祀以爲人也民神之主也用人其誰饗之又曰襄四君民者豈以陵民社稷是主臣君者豈爲其口實社稷是養故君爲社稷死則死之爲社稷亡則亡之又昭七曰魏憲子問於蔡墨曰社稷五祀誰氏之五官也對曰少暭氏有四叔賈逵注曰少暭黄帝之後金天氏也四叔四子皆叔曰重曰該曰脩曰熈實能金木水能順其成性也使重爲勾芒該爲蓐収脩及熈爲玄􅁳此其三祀也顓頊氏有子曰􅀺祝融黎水土官􅀺當髙辛氏之丗故外傳曰􅀺爲髙辛氏火正也共工氏有子曰勾龍爲后土共工大皡之後炎帝之前霸九有者也其􅒨子佐顓頊能平水土此其二祀也后土爲社稷田政也掌田之官}
