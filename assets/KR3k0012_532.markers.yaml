  - {type: variant, offset: 4112, length: 0, content: '', SBCK: 則告爲將耕也五榖旣登又報功也國以民爲夲人以食爲天故建國君民先命立社地廣􅂖多不可徧􅀕故於國城之内立壇􅀕之親之也}
