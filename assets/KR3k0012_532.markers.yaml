  - {type: variant, offset: 5075, length: 0, content: '', SBCK: 延爲太尉延喜中平曽孫放爲尚書令以宰相継踵咸出斯里雖有積徳脩身之政亦斯社所相乃􅀣碑頌云魏公九錫文曰錫君玄土苴以白茅爰契爾􅀛用建冡社注言亦如天子社稷也曹植讃社文曰余前封鄄城侯轉雍丘皆遇荒土宅字􅀄造以府庫尚豊志在繕宫室務園圃}
