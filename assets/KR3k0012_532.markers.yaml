  - {type: punctuation, offset: 4388, content: 《, id: KR3k0012_CHANT_532-bkkpn1338}
  - {type: variant, offset: 4388, length: 0, content: '', SBCK: 曰使民戰栗孔安國注曰凢建􅀖立社各以其土所冝之木宰我不夲其意妄爲之􅀃因周栗便云使民戰栗也孝經􅀃曰社土地之主也地廣不可盡敬故封土爲社以報功稷五榖之長也榖衆不可遍祀故立稷神􅀕之五經通義曰王社籍田中爲千􅅿報功也文家右社稷左宗廟何文家握地而王地道長右得事宗廟以有社稷故右之也質家左社稷右宗廟社皆有壇者飾也有木者土當生萬物莫善於木}
  - {type: page-break, offset: 4388, content: '', id: KR3k0012_SBCK_532-4b}
  - {type: variant, offset: 4388, length: 0, content: '', WYG: 曰使民戰栗孝經説曰社土地之主也地廣不可盡敬故封土為社以報公稷五穀之長也穀衆不可遍祀故主稷神祭之五經通義曰王社藉田中為千畆報公也文家右社稷左宗廟何文家握地而王地道長久得事宗廟以有社稷故右之也質家左社稷右宗廟皆有壇者飾也有木者土也生萬物莫善于木}
  - {type: page-break, offset: 4388, content: '', id: KR3k0012_WYG_532-7a, image: WYG0897/WYG0897-0713c.png}
  - {type: variant, offset: 4388, length: 0, content: '', krp: 曰使民戰栗孔安國注曰凢建邦立社各以其土所冝之木宰我不夲其意妄爲之說因周栗便云使民戰栗也孝經說曰社土地之主也地廣不可盡敬故封土爲社以報功稷五榖之長也榖衆不可遍祀故立稷神祭之五經通義曰王社籍田中爲千畝報功也文家右社稷左宗廟何文家握地而王地道長右得事宗廟以有社稷故右之也質家左社稷右宗廟社皆有壇者飾也有木者土當生萬物莫善於木}
