  - {type: variant, offset: 5057, length: 5, content: 尸主何本神, WYG: 封之方籍以白茅歸國以立社故謂之茅社也陳留風俗傳曰東昏縣者位地故陽武之户牖鄉也漢相陳平家焉少為社下宰令民祀其社邴原别傳曰原避地遼東以虎為患自原之洛獨}
