  - {type: variant, offset: 5152, length: 0, content: '', WYG: 司馬河南陵㽔字聖卿少時病瘧逃社中有人呼社郎聖卿應曰諾起至户中人曰取此書去得素書一卷譴劾百鬼所劾輒効卞敬宗樂社序讃曰余門前有一社樹盤根䟽柯以非近世所植抗秀路左流隂庭宇莊周游道于商丘之木匠石辨才于曲轅之櫟由斯道觀之固可悟以微矣王廙春社櫟頌曰吉辰兮上戊明靈兮惟社百室兮必集祈祭兮樹下濯卵兮葅韮齧䔉兮擗鮓縹醪兮浮蟻交觴兮並坐氣和兮體適心怡兮志可何承天社頌曰社實隂祗稷惟容元率有方類協賛乾坤先農禮記月令曰孟春乃擇元辰天子親載耒耜置之車右率公卿諸侯大}
  - {type: page-break, offset: 5152, content: '', id: KR3k0012_WYG_532-15a, image: WYG0897/WYG0897-0717c.png}
