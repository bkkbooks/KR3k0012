  - {type: variant, offset: 5067, length: 4, content: 主係心又, WYG: 繋樹枝比錢不見取繫錢日愈多原問其故荅者謂之社樹原惡其由已而成望犯乃辯之于是里中遂歛其錢以為社供里老為之誦}
