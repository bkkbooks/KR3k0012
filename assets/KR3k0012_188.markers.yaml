  - {type: variant, offset: 512, length: 777, content: 入不見宗廟之美又曰糞土之牆不可杇也又曰其猶正牆面而立也歟史記曰孝景帝即位晁錯為內史貴幸用事門東出不便乃穿一門出太廟煗垣丞相申屠嘉聞之奏請誅錯上愛之曰錯所穿非真廟垣乃外煗且又我使為之錯謝而出嘉曰吾悔不先斬錯又曰司馬相如家成都貧家徒四壁立漢書曰貫高等欲害高祖置人於複壁中後漢書曰逢萌與同郡徐房平原李子雲王君公相友善並曉達陰陽懷德穢行房與子雲養徒各千人君公遭亂獨不去儈牛自隱儈謂平會兩家買賣之事時人語曰避世牆東王君公又曰史叔賓者陳留人也少有盛名郭林宗見而告人曰牆高基下雖得必失後果以論議阿枉毀名云又曰崔晏仕官歷位邊郡而愈貧薄家徒四壁卒無以殯歛光祿勳楊賜太僕袁逢少府叚熲為備棺槨葬具大將軍袁隗樹碑頌又曰杜安字伯夷少有志節年十三入太學號奇童京師貴戚慕其名或遺之書安不發悉壁藏之及後捕案貴戚賓客安開壁出書印封如故竟不罹患時人貴之位至巴郡太守吳志曰呂蒙病孫權時在江安迎置內廄治護萬方欲數見顏色又恐勞動常穿壁瞻之見其少食則喜不能則咄唶也晉書外國傳大秦國以琉璃為牆壁齊書曰劉璡字子璥方軌正直兄瓛夜隔壁呼璡出不荅方下床著衣立行及簾外然後應瓛問其故璡曰向束帶未竟又曰徐孝嗣初在率府晝臥齋北壁下夢兩童子遽云移公床孝嗣驚起行數步而壁崩莊子曰正考父一命而傴再命而僂三命而俯循牆而走孰敢不軌言人不敢以不軌之事侮之家語曰孔子觀乎明堂覩四門之墉有堯舜桀紂之象各有善惡之狀興廢之誡焉衡山記曰甘泉宮有石壁焉禹所刻文在此洞冥記曰元狩三年帝復起陵霞觀去地九十丈累白玉為壁以八分篆寫羲皇以來迄周成王封禪之事所謂事登壁間蓋帝王之本績也孟子知命者不立乎巖牆之下恐頹也淮南子曰舜作宮築牆始也漢官儀曰省中皆胡粉塗壁畫古烈士新序曰諸侯牆有黑堊之色無丹青之彩神仙傳白和事王君王君語曰我暫往瀛州汝於正北石室熟視北壁當見文字讀之得道矣三年方見壁上有古人所刻太清經讀之得仙魏略曰趙岐避難青州市孫嵩知岐避事置岐於複壁中, SBCK: 喘}
