  - {type: variant, offset: 2778, length: 0, content: '', SBCK: 中堂有甓注一名瓴甋晉書曰陶􅋲字士行在廣州無事輙朝運百甓於外暮運於内人問其故荅曰吾方致力中原過爾優逸恐不堪事宋書范曄母如厠而産額爲塼所傷故以塼爲小字瓦說文曰瓦土器巳燒之惣名也禮記曰有虞氏瓦棺又曰毁方而瓦合史記曰秦軍武安西鼔譟勒兵武安屋瓦盡震漢書曰霍光巷行人見有人在屋上撤瓦投地就視不見而霍氏誅又曰平帝元始四年東風吹長安城東門屋瓦盡落魏志曰魏文帝謂周宣曰朕夢殿上􅀟瓦落地化爲鴛鴦何也宣曰後宫當有􅁀死者須􅁷後宫相害死者呉録曰景帝時戎將於廣陵掘諸冢取版塼以城所壞甚多􅀳書曰張孟陽皃醜甞從潘岳遊洛陽市岳羙皃羣女爭以果擲岳滿車廂孟陽􅀍投之瓦石愽物志曰桀作瓦古史曰昆吾氏作瓦老}
