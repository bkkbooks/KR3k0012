  - {type: variant, offset: 1087, length: 146, content: 記曰甘泉宮有石壁焉禹所刻文在此洞冥記曰元狩三年帝復起陵霞觀去地九十丈累白玉為壁以八分篆寫羲皇以來迄周成王封禪之事所謂事登壁間蓋帝王之本績也孟子知命者不立乎巖牆之下恐頹也淮南子曰舜作宮築牆始也漢官儀曰省中皆胡粉塗壁畫古烈士新序曰諸侯牆有黑堊之色無丹青之彩神仙傳白和事王君王君語曰我暫往瀛州汝於正, WYG: ''}
