  - {type: variant, offset: 1587, length: 704, content: 為室柱吳志曰孫堅為董卓所攻堅與數十騎馳圍而出堅常著赤幘令親近將祖茂著之卓騎爭逐茂急見一柱在草中因脫幘著柱上卓騎望見圍繞數重後覺是柱乃去晉書曰石季龍掘秦始皇冢取其銅柱鑄以為器又曰太始二年秋營太廟致荊山之材採華山之石鑄銅柱十二塗以黃金鏤以百物綴以明珠曹嘉之晉紀曰諸葛誕以氣勵稱常倚柱讀書雷震其柱誕讀書自若陳書曰初梁侯景焚太極殿及景平至陳武帝議欲營之獨闕一柱至是有樟木大十八圍長四丈五尺流泊後渚因得用之漢武內傳曰上起神屋鑄銅為柱金塗大五圍帝王世紀曰桀作金柱三千列女傳曰紂作銅柱以炭火然之有罪者令抱其柱輒墮炭中妲已觀以為笑漢官典職曰德陽殿柱皆金刻鏤作奇禽萬巧間以丹青翡翠竟柱構以水精一柱三帶韜以赤緹應劭漢官曰開陽門始成未有名夜有一柱飛來樓上後琅邪開陽縣上言南門一柱飛去光武使視因刻記其年月以名門焉神異經曰崑崙山有銅柱其高入天所謂天柱也圍三千里周廻如削下有仙人府與天地同休息男女名曰玉人男即玉男女即玉女無為配疋而仙道成也三輔決錄曰長陵田鳳字季宗為尚書郎儀皃端正入奏事靈帝目送之因題殿柱曰堂堂乎張京兆田郎伏滔北征記曰廣陵吳王濞所都脩大城得柏柱三皆柏心蓋吳王濞門柱也華延雋洛陽記曰太極殿有四金銅柱焦贛易林旅之咸曰金梁鐵柱又曰家人之外曰高樓無柱顛僵不久紂失人主身死牧豎盛弘之荊州記曰巴東城西有一柏柱孤殖大可數圍高三丈餘相傳是公孫述時樓柱乃云斫之血出枯而不朽歷代彌固將恐有物憑焉江陵記曰沔城內有赤湖客舍襄陽大道經城中過元嘉十一年連雨城南門沮壞得土中故柟柱長一丈七尺臨川康王取以為大齋西北柱初時色黑一季後不復黑計此千年列子曰共工觸不周山天柱折晏子春秋曰晏子將死鑿楹納書焉謂妻曰楹記日也子壯而示之燕丹曰荊軻以匕首擿決秦王入銅柱火出, krp: 爲舄}
