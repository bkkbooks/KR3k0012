  - {type: variant, offset: 25, length: 1, content: 墉, WYG: 樀郭璞注曰屋梠也棁爾雅曰梁上楹謂之棁漢官解詁曰棁梁上柱也諸侯藻棁為藻文也華延雋洛陽記曰堂皇宫殿皆石玉璫龍桷藻棁禮記禮器曰管仲鏤簋朱紘山節藻棁君子以為濫矣楶爾雅曰栭謂之楶郭璞注曰即櫨也三輔故事曰王莽起九廟為銅欂櫨揚子法言曰吾未見斧藻其徳若藻其楶者也枅爾雅曰枅謂之櫨郭璞注曰柱上薄也亦名枅犍為舎人曰侏儒下小方木}
