  - {type: variant, offset: 323, length: 493, content: 廣其居於壁中得先人所藏古文虞夏商周之書及傳論語孝經皆科斗文字又曰峻宇雕牆禮曰七月坯牆垣六月小暑後五日蟋蟀居壁周禮曰牆厚三尺崇之注云高卑為率足以相為勝也左傳叔孫曰人之有牆以蔽惡也牆之卻壤誰之咎也注咎在牆也又曰巢牛隱於短垣以射吳子諸樊又曰寺人披伐蒲重耳踰垣而走披斬其祛又曰晉靈公不君厚歛以雕牆論語叔孫武叔謂子貢曰仲尼豈賢於子乎對曰譬之宮牆賜之牆及肩窺見室家之好夫子之牆數仞不得其門而入不見宗廟之美又曰糞土之牆不可杇也又曰其猶正牆面而立也歟史記曰孝景帝即位晁錯為內史貴幸用事門東出不便乃穿一門出太廟煗垣丞相申屠嘉聞之奏請誅錯上愛之曰錯所穿非真廟垣乃外煗且又我使為之錯謝而出嘉曰吾悔不先斬錯又曰司馬相如家成都貧家徒四壁立漢書曰貫高等欲害高祖置人於複壁中後漢書曰逢萌與同郡徐房平原李子雲王君公相友善並曉達陰陽懷德穢行房與子雲養徒各千人君公遭亂獨不去儈牛自隱儈謂平會兩家買賣之事時人語曰避世牆東王君公又曰史叔賓者陳留人也少有盛名郭林宗見而告人曰牆高基下雖得必失後果以論議阿枉毀名云又曰崔晏仕官歷位邊郡而愈貧薄家徒四壁卒無以殯歛光祿勳楊賜太僕袁逢少府叚熲為備棺槨葬具大將軍袁隗樹碑頌又曰杜安字伯夷少有, krp: 北山石爲舄異物}
