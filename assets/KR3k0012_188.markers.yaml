  - {type: variant, offset: 16, length: 2, content: 壁垣, WYG: 櫺楯間子也櫳房室之疏也釋名曰牕聰也於内視外謂之聰明大戴禮曰隨武子牖之銘曰隨天之時以地則之敬祀皇天敬以先時禮記郊特牲曰薄社北牖使隂明也又儒行曰蓽門圭竇蓬户甕牖論語曰伯牛有疾子問之自牖執其手曰亡之命矣夫五經典義曰虞主埋之廟北牖下北方無事虞主亦無事也東觀漢記曰明徳馬后不喜出入遊觀希嘗臨御忩望老子曰鑿户牖以為室又曰不窺牖見天道漢官封禪儀曰泰山有天忩三輔黄圖曰明堂有七十二牖孝經注曰明堂之制八窗四闥東宫舊事曰閣内有曲鄣鄣上雀目忩又曰宫有四面忩八所綾綺連錢及青匡郭飛板郭子曰滿奮畏風在武帝坐北窗作琉璃屏實宻似疎奮有寒色帝問之對曰臣若吳牛見月而喘西京雜記曰昭陽殿窗户扇多是緑琉璃皆通照毛髮不得藏焉漢武故事曰西王母降東方朔於朱鳥牖中窺母母謂帝曰此兒無賴乆被斥囘原心無恙尋當得還又曰帝起屋有雲母牕珊瑚牕聖賢冢墓記曰東平思王奢靡及死生塟所幸奴婢著銅忩内令守冢太公金匱牖之書曰闚望審視且念所得可思所忘李尤牖銘曰天設牕牖開光照陰施於明堂以象八風陸機詩曰安寢北堂上明月入我牖照之有餘輝攬之不盈手文選詩曰窗中列逺岫蜀都賦曰列綺窗以瞰江古詩曰盈盈樓上女皎皎當牕牖又曰文疏結綺牕阿閣三重階檻漢書曰朱雲忠諫攀檻檻折及治上曰勿易因而輯之以旌直臣文選曰伏櫺檻而俯聴聞雷霆之相激魯靈光殿賦曰軒檻蔓延楚辭曰坐堂伏檻臨曲池又曰照檻兮扶桑椽説文曰椽榱也橑榱也周謂之榱秦謂之椽齊魯謂之桷通俗文曰屋加椽曰橑來早切漢書解語曰椽桷也諸侯丹桷以丹色也詩曰松桷有梴穀梁傳曰刻桓宫桷禮天子之桷斵之磨礱之加宻石焉諸侯之桷斵之礱之大夫斵之士斵本刻桷非正也左傳曰宋人伐鄭以大宫之椽為盧門之椽續漢書曰蔡邕避難在吳告人曰吾昔經會稽髙遷亭見屋椽竹従東間數第十六可以為籥取用果有異聲張璿漢記曰梁冀起臺殿梁柱椽桷鏤為青龍白虎畫以丹青雲氣戰國䇿曰或謂孟嘗君曰廊廟之椽非一木之枝先王之法非一士之智漢武故事曰上起神屋以金為椽刻玳瑁為龍虎禽獸以飾其上狀若隠起椽首皆作龍首銜鈴流蘇懸之西京雜記曰昭陽殿椽桷皆刻作蛇龍縈繞其間鱗甲分明見者莫不驚慄韓子曰堯舜采椽不刮茅茨不翦檐説文曰檐㮰也又曰楣秦名屋櫋聨也齊謂之檐楚謂之梠釋名曰檐接也接屋前後也梠旅也連旅或謂之槾槾綿也連綿榱頭使平也上入曰雀頭形似雀也禮記明堂位曰復廟重檐天子之廟飾也榖梁傳文公曰壊廟之道易檐可}
