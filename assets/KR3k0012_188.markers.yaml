  - {type: variant, offset: 2070, length: 0, content: '', SBCK: 堂皇宮殿皆石玉璫龍桷藻梲禮記禮器曰管仲鏤簋朱紘山節藻梲君子以爲濫矣楶爾雅曰栭謂之楶郭璞曰注即櫨也三輔故事曰王莽起九廟爲銅鑮櫨楊子法言曰吾未見斧藻其徳若斧藻其楶者也枅爾雅曰笄謂之疾郭璞注曰柱上薄也亦名枅犍爲舎人曰朱儒下小方木廣雅曰薄謂之枅曲枅肩謂之欒說文曰枅屋强也王延壽靈光殿賦曰曲枅夭矯而環勾韋仲將景福殿賦曰於是周覽􅂛降流目詳觀叢楹􅀒極飛櫨承欒枅梧綺錯梲楶鮮攅鋪首通俗文曰門扇飾謂之鋪首說文曰門扇環謂之鋪首風俗通曰門户鋪首百家書云輸般見水上蠡謂之曰開汝頭見汝形蠡適出頭般以足􅀞圖之蠡引閉其户終不可開設之門户欲使閇藏當如此固宻也楊雄甘泉賦曰排玉户而楊金鋪􅀆發蘭蕙與穹窮李尤平樂觀賦曰過洞房之輔闥歴金環之華鋪藻井風俗通曰殿堂象東井形刻作荷蓤水物所以厭火也西都賦曰蔕倒茄於藻井披紅葩之狎獵魏都賦曰綺井列䟽以懸蔕注䟽布也以板爲井形飾以丹青如綺也王延夀魯靈光殿賦曰圎折方井反植荷蕖縁房紫的咄咤垂珠左思魏都賦曰綺井列䟽以懸蔕華蓮重葩以到披曹植七啓曰綺井含葩金壁玉箱顔延之七繹曰木冩雲氣土祕椒芳旣挻天而到井又斵圎而鏤方鴟尾晉中興書曰泰元十年鸛巢}
