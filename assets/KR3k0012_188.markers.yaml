  - {type: variant, offset: 817, length: 763, content: 節年十三入太學號奇童京師貴戚慕其名或遺之書安不發悉壁藏之及後捕案貴戚賓客安開壁出書印封如故竟不罹患時人貴之位至巴郡太守吳志曰呂蒙病孫權時在江安迎置內廄治護萬方欲數見顏色又恐勞動常穿壁瞻之見其少食則喜不能則咄唶也晉書外國傳大秦國以琉璃為牆壁齊書曰劉璡字子璥方軌正直兄瓛夜隔壁呼璡出不荅方下床著衣立行及簾外然後應瓛問其故璡曰向束帶未竟又曰徐孝嗣初在率府晝臥齋北壁下夢兩童子遽云移公床孝嗣驚起行數步而壁崩莊子曰正考父一命而傴再命而僂三命而俯循牆而走孰敢不軌言人不敢以不軌之事侮之家語曰孔子觀乎明堂覩四門之墉有堯舜桀紂之象各有善惡之狀興廢之誡焉衡山記曰甘泉宮有石壁焉禹所刻文在此洞冥記曰元狩三年帝復起陵霞觀去地九十丈累白玉為壁以八分篆寫羲皇以來迄周成王封禪之事所謂事登壁間蓋帝王之本績也孟子知命者不立乎巖牆之下恐頹也淮南子曰舜作宮築牆始也漢官儀曰省中皆胡粉塗壁畫古烈士新序曰諸侯牆有黑堊之色無丹青之彩神仙傳白和事王君王君語曰我暫往瀛州汝於正北石室熟視北壁當見文字讀之得道矣三年方見壁上有古人所刻太清經讀之得仙魏略曰趙岐避難青州市孫嵩知岐避事置岐於複壁中西京雜記云匡衡鑿鄰家壁偷光讀書宋玉賦云東家美女登牆窺玉三年玉猶未許焦贛易林曰千仞之牆禍不入門孟奧北征記曰鄴城避雷室西南石溝北有華林牆牆高九丈方圓一里也柱廣雅曰楹謂之柱釋名曰柱住也楹亭也亭亭然孤立也周書曰文王在鎬召太子發曰吾栝柱而茅茨為民愛費也左傳曰叔孫豹指楹曰雖惡是其可去乎又曰丹桓宮楹穀梁傳曰丹桓宮楹禮天子丹諸侯黝大夫蒼士黈大戴禮曰周時德澤和洽蒿茂以為宮柱名曰蒿宮漢書郊祀志曰武帝鑄柏梁銅柱又曰成帝立趙皇后劉輔諫曰朽木不可為柱卑人不可為主范曄後漢書曰李膺拜司隸校尉時張讓弟為野王令貪殘無道至乃殺孕婦聞膺厲威嚴懼罪逃還京師因匿兄讓弟舍柱中膺知其狀率將吏往破柱付洛陽獄受辭畢即殺之魏略, krp: ''}
