  - {type: variant, offset: 1133, length: 273, content: 加綈錦其上謂之綈几公侯皆以木為几冬則以細罽為囊憑之不得加綈錦之飾於几案會稽典錄曰葛仙公憑白桐几學數十年白日登仙几化為白虎三腳兩頭往往人見之魏武上雜物䟽曰御物三十種有上車漆畫重几大小各一枚語林曰任元褒為光祿勳孫憑翊往詣之見門吏憑几視之孫入語任曰吏几對客為不禮任便推之吏荅云得罰體痛以橫木枎持非憑几也孫曰直木橫施植其兩足便為憑几何必孤蹯鵠膝曲木抱腰姚信士語曰馬援憑几而見梁竇子弟文舉坐榻而受徐文高拜戴勝竹林七賢論曰魏朝封文王固讓公卿皆當喻旨司空鄭冲等馳使從阮籍求其文立待之籍時在袁孝尼家宿枎而起書几板為文無所治定乃寫付信鄴中記曰石虎御座几悉漆雕盡皆為, SBCK: ''}
