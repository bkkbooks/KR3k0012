  - {type: variant, offset: 873, length: 0, content: '', SBCK: 徐稚字孺子公車五徴皆不降志其有䘮􅀒笈赴弔行五里也又曰􅀽閎字夏甫汝南人也博覽群書常􅀒笈㝷師變易姓名又曰髙弘字伯武河内山陽人爲琅瑘相到官自負笈單歩入界聽採風俗又曰蘇章字士成北海人􅀒笈追師不逺万里又曰方儲字聖明􅀒笈到三輔無術不覽又曰郎宗􅀒笈賣卜給食諸公表上􅀶士徴宗宗􅀒笈遁去李固傳曰固父爲三公而固歩行􅀒笈千里從師拾遺録曰漢惠帝時有仙人韓稚東至泥離國遇其人洞室􅀒笈而問其年幾何漢武内傳曰上元夫人語武帝曰阿母令以瓊笈妙藴發紫臺之文賜汝火籠方言曰南楚江􅃆之間籠謂之篣或謂之笯陳楚宋魏之間謂之庸君今薰籠是也齊書曰卞彬性飲酒火籠什物多諸詭異自稱卞田居又曰范述曽爲永嘉太守有善政徴爲游擊將軍郡故舊送錢二十餘萬一無所受唯得白桐皮火籠朴十餘枚而巳梁書曰臨賀}
  - {type: page-break, offset: 873, content: '', id: KR3k0012_SBCK_711-3a}
  - {type: page-break, offset: 873, content: '', id: KR3k0012_SBCK_711-3b}
  - {type: variant, offset: 873, length: 0, content: '', WYG: 徐稚字孺子公車五徵皆不降志某有喪負笈赴弔行五里地又曰袁閎字夏甫汝南人也博覽群書負笈尋師變易姓名又曰髙𢎞字伯武河内山陽人為瑯琊相到官自負笈單歩入界聽採風俗又曰蘇章字士成北海人負笈追師不逺萬里又曰方諸字聖明負笈到三輔無術不覽又曰郎宗負笈賣卜給食諸公表上博士徵宗宗負笈遁去李固𫝊曰固父為三公而固歩行負笈千里從師拾遺録曰漢惠帝時有仙人韓稚東至沈離國遇其人同室負笈而問其年㡬何漢武内傳曰上元夫人語武帝曰阿母令以瓊笈妙藴發紫臺之文賜汝火籠方言曰南楚江沔之間籠謂之篣或謂之笯陳楚宋魏之間謂之庸君今薰籠是也齊書曰卞彬性飲酒火籠什物多諸詭異自稱卞田居又曰范述曽為永嘉太守有善政徵為游擊將軍郡故舊送錢二十餘萬一無所受唯得白銅皮火籠十餘枚而已梁書曰臨賀}
