  - {type: variant, offset: 147, length: 0, content: '', krp: 母曰此五岳眞形圗}
  - {type: variant, offset: 148, length: 0, content: '', SBCK: 青城諸仙就我求今當付之宋書曰元凶劭弑逆南陽公主見女巫嚴道育云天神當賜符應時主夕卧見流光相隨狀若螢火遂入巾箱化爲􅀟珠圎青可愛因是巫蠱而敗齊書曰衡陽王鈞常手自細書冩五經部爲一卷置于巾箱中以備遺忘侍讀賀玠問曰殿下家自有墳素復何須蠅頭細書別藏巾箱中荅曰巾箱中有五經於撿閱易且一更手冩則永不忘諸王聞而争効爲巾箱五經自此始也丗說曰威法濟者義興人其兒年二十得病經年有神來語言牀}
  - {type: variant, offset: 148, length: 0, content: '', WYG: 青城諸仙就我求今當付之宋書曰元㐫劭弑逆南陽公主見女巫嚴道育云天神當賜符應時主夕卧見流光相隨状若螢火遂入巾箱化為雙珠圓青可愛因是巫蠱而敗齊書曰衡陽王鈞常手自細書寫五經部為一卷置於巾箱中以備遺忘侍讀賀玠問曰殿下家自有墳索復何須蠅頭細書别藏巾箱中荅曰巾箱中有五經於檢閲易且一更手寫則永不忘諸王聞而争效為巾箱五經自此始世說曰盛法濟者義興人其兒年二十得病經年有神來語言牀}
  - {type: page-break, offset: 148, content: '', id: KR3k0012_WYG_711-2b, image: WYG0899/WYG0899-0333d.png}
  - {type: variant, offset: 148, length: 0, content: '', krp: 青城諸仙就我求今當付之宋書曰元凶劭弑逆南陽公主見女巫嚴道育云天神當賜符應時主夕卧見流光相隨狀若螢火遂入巾箱化爲雙珠圎青可愛因是巫蠱而敗齊書曰衡陽王鈞常手自細書冩五經部爲一卷置于巾箱中以備遺忘侍讀賀玠問曰殿下家自有墳素復何須蠅頭細書別藏巾箱中荅曰巾箱中有五經於撿閱易且一更手冩則永不忘諸王聞而争効爲巾箱五經自此始也丗說曰威法濟者義興人其兒年二十得病經年有神來語言牀}
