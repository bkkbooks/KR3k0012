  - {type: variant, offset: 902, length: 218, content: 嘗從幸司空徐度宅宴筵之上賜之以几後魏書曰咸陽王僖謀逆誅其宮人為之歌曰可憐咸陽王柰何作事誤金床玉几不能眠夜蹋霜與露莊子曰南郭子綦隱几而坐仰天而噓嗒焉似喪其偶孟子曰孟子去齊宿於晝有欲為王留行者坐而言不應隱几而臥客不悅曰弟子齊宿而後敢言夫子臥而不聽請勿復敢見矣晝齊邑也齊人欲為君留孟子行孟子不以倚几而臥也山海經曰西王母梯几而戴勝梯謂馮也漢書儀曰天子用玉几拾遺錄曰瀛州南有金巒之觀中藏寶几覆以雲紈之素漢武帝內傳曰帝受西王母五岳真形經盛以黃金之几, SBCK: 􅀍薫籠三}
