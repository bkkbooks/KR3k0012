  - {type: variant, offset: 1417, length: 474, content: 石室內有石床石几異苑曰曆陽石秀之欻有一人著平巾袴褶語秀云聞君巧侔班爾刻几尤妙太山府君相召秀之自陳云劉政能造數旬而殞石氏猶存劉作几有名遂以致斃幽明錄曰海中有金臺水出百丈臺其內有金几雕文備制上有百味之食李尤几銘敘曰昔帝軒轅仁智恐事之有闕作几之法張華倚几銘曰倚几之設設而倚作器此成於彼也案說文曰檈似緣切圓案也方言曰陳楚宋魏謂案為寫楚漢春秋曰項王使武涉說淮陰侯淮陰侯曰臣故事項王位不過中郎官不過執戟及去項歸漢漢王賜臣玉案食臣具之劍臣背之內愧於心史記曰高祖過趙趙王張敖自持案進食甚恭上箕踞罵之漢書曰萬石君石奮子孫有過失不誚讓為便坐對案不食又曰貢禹奏曰見賜杯案畫文金銀飾非當所以食臣下也又曰朱博為人廉儉自微賤至富貴不食重味案上不過三杯酒又曰許后五日一朝皇太后於長樂宮親奉案上食東觀漢記曰更始韓夫人嗜酒每侍飲見常侍奏事輒怒曰帝方對我飲正用此時持事來乎起抵破書案又曰魏霸延平元年仕為光祿大夫妻死長兄伯為娶妻送至官舍霸曰年老兒子備具何用空養他家老嫗為即自入拜其妻手奉案前肉跪曰不敢相屈而妻慚求去又曰尹敏字幼季與班彪相友每相與談論輒屏案不食又曰梁鴻常賃舂每歸妻為具舉案, SBCK: 薫籠賦}
