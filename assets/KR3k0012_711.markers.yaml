  - {type: variant, offset: 3036, length: 1806, content: 日曹公當至必與君杖飲以藥酒宣占之曰夫杖起弱藥治人病八月一日黃巾賊必滅至時果敗吳書曰全綜年高賜以御杖晉書曰魏帝嘗賜景帝春服帝以賜山濤又以其母老年并贈藜杖一枚又曰阮宣子出行常以百錢掛杖頭每至酒家輒醉而歸後魏書曰甄琛拜侍中以其衰老詔賜御府杖朝直杖以出入莊子曰子貢乘大馬軒車不容巷往見原憲杖藜應門山海經曰夸父與日競走渴飲河渭不足北走大澤未至道死棄其杖化為鄧林廣志曰九真出靈壽杖呂氏春秋曰孔子弟子從遠方來者孔子荷杖而問曰子之父不有恙乎持杖而揖之問曰子之母不有恙乎置杖而問曰子之兄弟不有恙乎杖步而倚之問子之妻子不有恙乎故孔子以六尺之杖諭貴賤之等辨親踈之義陸賈新語曰夫居高者自處不可以不安履危者任杖不可以不固自處不安則墜任杖不固則顛是聖人居高處上則以仁義為巢乘危履傾則以聖賢為杖也新序曰昌邑王徵為天子到營陽買積竹剌杖二枚龔遂諫曰積竹剌杖者驕蹇少年杖也大王奉大喪當柱竹杖風俗通曰漢高祖與項籍戰京索間遁叢薄中時有鳩鳴其上追者不疑遂得脫及即位異此鳥故作鳩杖賜老人也拾遺錄曰老子當周之末居山與世人絕跡唯有黃髮老叟五人手捉青筇之杖出入室中與老子談又曰縻笁用陶朱計術日益富有寶庫千間笁常賑生恤死家馬廄旁有古冢夜聞泣聲尋之見婦訴云漢末為赤眉所害剖棺見剝乞更深埋并乞弊衣自掩笁從其言後歷一年復見前婦云君財寶可支一世應遭火厄今以青廬杖一枚長九尺報君衣棺之惠笁挾杖而歸而後鄰家常見笁家有一青氣如龍虵之形又有青衣童子數人來云縻笁家當有火賴君能恤歛枯骨天道不孤君德故來攘卻此災使君財物不盡旬日火從庫起燒其珠玉十分遺一火盛之時見青衣童子十數來撲火又有氣如雲覆火上即滅又曰劉向於成帝之末校書天祿閣專精覃思夜有老人著黃衣植藜杖杖扣閣而進向閣中獨坐頌書老人乃吹端火出具以照向具說開闢以前向因受五行鴻範之文恐辭說繁廣向乃裂裳及紳以記其言至曙而去請問姓名荅曰我是太一之精天帝聞金卯之姓有博學者下而觀焉乃出懷中竹牒有天文地圖之書余略授子焉至向子歆從授術亦不語人焉漢武內傳曰帝先有玉箱杖是西湖母所獻帝甚愛之崩後故以入槨其年人有於枎風郿市中買得者帝時左右侍人識之告有司詰問云見市中有一人賣之實不知賣杖主名也神仙傳曰費長房欲求道而顧家夏壺公乃斷一青竹杖與長房身等使懸之舍後家人見以為縊死大小驚號遂殯葬之長房立其傍人無見者後長房歸家人不信是房房曰往日所葬竹杖耳發冢視杖猶存又曰壺公遣費長房歸以一竹杖與之騎此當到家以杖投葛陂中長房騎杖忽然如睡便到家以杖投葛陂中顧之乃青龍也又曰介象令人騎青竹自吳往蜀劉根別傳曰孝武皇帝登少室見一女子以九節杖仰指曰閉左目開右目氣且絕久乃蘇息武帝使問之所行何等女子不荅東方朔曰婦人食日精者劉向別傳曰有騏驎角杖塔寺記曰謝尚夢其父告之曰西南有氣至衝人必死勿當其鋒見塔寺可穰未暇立寺可杖頭刻作塔形見有氣來擬之尚如其言置杖左右果有黑氣衝尚家尚以杖指之氣即廻散闔門獲全氣所經處數里無復孑遺三石偽事曰佛澄死以澄生所服金杖銀鉢內著棺中經後再閔開棺視之不見體骨唯見杖鉢武當山記曰山有石室有板床銅杖長七尺三分交州記曰合浦圍州有石室其裏一石如鼓形見榴木杖倚著石壁採珠人常致祭焉魏文典論曰嘗與平虜將軍劉勳奮威鄧展共食飲宿聞展有手臂曉五兵余與論劍酒酣耳熱方食甘蔗便以為杖下殿交三中其臂談藪曰後魏河間邢巒字山賓遷殿中侍御史嘗有疾策山桃杖帝問此何杖荅曰巨源杖太武諱燾故言焉法顯記曰那竭國有佛鍚杖牛頭旃檀上長丈六七許以筒盛之百千人舉不能移又曰秪坦精舍西北四里有榛林名曰得眼本有五百盲人佛為說法盡得眼開盲人喜刺杖著地頭面作禮杖遂生長成榛鄧德明南康記曰南野縣有漢監匠陳憐其人通靈夜嘗乘龍還家其婦懷身憐母疑與外人通密看乃知是憐乘龍至家輒化成青竹杖憐內致戶前母不知因將杖去須臾光彩滿堂俄爾飛失憐失杖乃御雙鵠還搜神記曰漢文帝微服過魯少千少千柱金杖出應門列異傳曰陳留史均字威明嘗得病臨死謂其母曰我得復生埋我杖豎我瘞上若杖拔出之及死埋杖如其言七日往視杖果柭即掘出之便平復如故神異記曰陳敏孫皓之世為江夏太守自建業赴職聞宮亭廟驗言靈賤過乞在任安穩當上銀杖一枚年限既滿作杖擬以還廟撫捶鐵以為幹以銀塗之尋徵為散騎常侍往宮亭送杖於廟中乞即進路日晚降神巫宣教曰陳敏許我銀杖今以塗杖見與便投杖水中當送以還之欺薎之罪不可容也於是取杖看之剖視眾見鐵幹乃置之湖中杖浮在水上其疾如飛遙到敏舫前敏舟遂覆也魏武帝與楊彪書曰今贈足下銀角桃杖一枚崔瑗杖銘云乘危履險非杖不行年老力竭非杖不強諸蔗雖美猶不可杖佞人悅己亦不可相, SBCK: ''}
