  - {type: variant, offset: 1892, length: 477, content: 眉又曰蔡彤素清在遼東三十年衣無儲副賜錢百萬下至杯案食物大小重沓南史曰江秉之為新安太守在郡作書案一枚去官留以付庫梁書曰郭祖深清儉素木案食不過一肉漢書儀曰丈二旋案以陳三十六肉九穀飲食東宮舊事曰皇太子犯初拜有漆金渡足奏案一枚魏武上雜物䟽曰御物有純銀參鏤帶漆畫案一枚江表傳曰曹公平荊州欲伐吳張昭等皆勸迎曹公唯周瑜魯肅陳距北之計孫權拔刀斫前奏案曰諸將復有言迎北軍與此同也西京雜記曰武帝為七寶床雜寶案於桂宮中漢武故事曰武帝時東郡獻短人長五寸上疑是山精常令在案行東方朔問曰巨靈汝何以叛阿母健否廣陵傳曰吳戒字貴齊性剛直同業生陳升為賊戒見之升為設食戒曰汝已為賊柰何為設食因舉按投江中令其趣降神仙傳曰吳興人沈羲為仙人所迎上見老君玉女以金案玉杯藥賜羲曰此神仙丹不死之藥鄴中記曰石虎以宮人為女官門下通事以玉案行文書燕丹子曰太子常與荊軻同案而食鹽鐵論曰文杯畫案婢妾衣䊵履絲所以亂治也潛夫論曰前羗始叛器械未備虜或以銅鏡以蒙兵或負板案以類楯誠易戰耳異苑曰百丈山上有石房內有案置石書二卷夢書曰夢見杯案賓客到也多客大案少客小案也陸雲與兄機書曰按行曹公器物有奏按五枚又作欹枕以臥視書張衡四愁, SBCK: 謝朓詠竹火籠}
