  - {type: variant, offset: 1395, length: 493, content: 到雒陽整頓官府三輔官府吏東迎雒陽者見更始諸將過者已數十輩皆冠幘衣婦人衣諸于繡擁䘿諸于大掖衣也如婦人之旌衣䘿音屈揚雄方言曰襜褕其矩者自閔目西謂之䘿據此是諸于上加繡䘿如今半臂也大為長安所笑知者或畏其衣犇走入邊郡見司隸官屬皆相指視之極望老吏或垂涕曰復見漢官威儀賢者蟻附更始以上為大司馬遣之河北十月上持節度孟津鎮撫河北安集百姓趙王庶兄胡子立邯鄲卜者王郎為太子移檄購求公十萬戶世祖引兵攻邯鄲連戰郎兵挫折郎遣諫議大夫杜長威見公據地曰實成帝遺體子輿也公曰正使成帝復生天下不可復得也況詐子輿乎長威請降得萬戶侯公曰一戶不可得長威曰邯鄲雖鄙君臣并力城守尚可支一歲終不君臣相率而降但得全身也辤去而郎少傅李立反郎開城門漢兵破邯鄲誅郎入王宮收文書得吏民謗毀公言可擊者數千章公會諸將燒之曰令反側者自安也更始遣使者即立公為蕭王諸將議上尊號上不許上發薊至中山諸將復請上尊號初王莽時上與伯升及姉壻鄧晨穰人蔡少公燕語少公道讖言劉秀當為天子或曰是國師劉子駿也上戲言曰何知非僕耶坐者皆大笑時傳聞不見赤伏符文軍中所上未信到鄗上所與在長安同舍諸生疆華自長安奉赤伏符詣鄗與上會群臣復固請乃命有司設壇于鄗南千秋亭六月己未即皇帝位改元為, WYG: 序}
