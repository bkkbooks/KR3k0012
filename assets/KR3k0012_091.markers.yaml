  - {type: variant, offset: 3662, length: 2, content: 戊戍, SBCK: 丗祖崩皇后太子即位永平二年二月上初臨辟雍行射禮十月上幸辟雍􅀄行養老禮甲子上幸長安祠髙廟遂有事十一陵歴覽館舎邑居舊處㑹郡縣吏勞賜作樂三年十月上與皇太后幸南陽章陵周觀舊廬召見隂鄧故人上在于道所幸見吏勞賜省事畢歩觀行部署不用輦甲夜讀衆書乙夜盡乃寐先五鼔起率常如此五年十月上幸鄴徽趙王㑹鄴賜錢百萬八年十月上臨辟雍養三老五更禮畢上手書赦令尚書僕射待節詔三公十年閠月行幸南陽祠章陵以日至復祠於舊宅禮畢召校官弟子作雅樂奏鹿鳴上自御塤篪和之以娯嘉賔至頃勞饗三老官屬是時天下安平人無徭役歳比登稔百姓殷冨粟斛三十牛􅀍野十三年二月上耕籍田畢賜觀者食有一諸生前舉手曰善哉文王之遇太公也上書板曰生非大公子亦非文王也十五年二月東巡狩三月幸孔子宅祠孔子及七十子御講堂命太子諸王􅀃經幸東平王宫上憐廣陵侯兄弟賜以􅡘御之物又聖皇子輿馬悉賦予之十七年春甘露仍降樹枝内附芝生前殿神雀五色翔集京師是夜上夢見先帝太后夢中喜覺因悲不能寐明旦上陵百官胡客悉㑹太常丞上言陵樹華有甘露上令百官採甘露受賜畢罷上從席前伏御牀視太后鏡奩音廉中物流涕勑昜奩中脂澤粧具自帝即位尊奉建武之政有加而無損􅀄世祖閔傷前世權臣太盛外戚豫政漢家中興唯宣帝取法至於建武朝無權臣外族隂郭之家不過九卿親屬勢位不能及許史王氏之半至永平后妃外家貴者裁家一之備列將校尉在兵馬官充奉􅀫衛闔門而巳無封侯豫朝政者自皇子之封皆減舊制諸王皆當略與楚淮陽相比什減三四曰我子不當與先帝子等又國逺而小於王善節約謙儉如此八月}
