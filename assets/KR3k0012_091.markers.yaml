  - {type: variant, offset: 5311, length: 2, content: 聖公, WYG: 文髙為汝南太守章帝南巡過郡有刻鏤屛風為帝張設詔命侍中黃香銘之曰古典務農雕鏤傷民忠在竭節義在脩身敞懼禮賢命士改脩徳化穆宗孝和皇帝東觀漢紀曰孝和皇帝諱肇章帝之中子也母曰梁貴人早薨上自岐嶷至總角孝順聰明寛和篤仁孝章由是深珎之以為宜承天位年四嵗以皇子立為太子初治尚書遂兼覧書傳好古樂道無所不照章和二年春二月章帝崩太子}
