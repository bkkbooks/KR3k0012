  - {type: variant, offset: 2132, length: 1416, content: 幸舂陵祠園廟大置酒與舂陵父老故人為樂四年五月上幸盧奴為征彭寵故也自王莽末天下旱霜連年百穀不成元年之初耕作者少民飢饉黃金一斤易粟一石至二年秋天下野穀旅生麻菽尤盛或生瓜菜菓實野蠶成繭被山民收其絮採獲穀果以為蓄積至是歲野穀生者稀少而南畝亦益闢矣六年二月吳漢下朐城天下悉定唯獨公孫述隗囂未平上曰取此兩子置度外乃休諸將置酒賞賜之每幸郡國下與見吏輒問以數十百歲能吏次第下掾史簡練臣下之行下無所隱其情道數十歲事若案文書吏民驚惶不知所以人自以見識家自以蒙恩遠臣受顏色之惠坐席之間以要其死力當此之時賊檄日以百數憂不可勝上猶以餘間講經藝發圖讖制告公孫述署曰公孫皇帝囂雖遣子入侍尚持兩心囂故吏馬援謂囂曰到朝廷凡數十見自事主未常見明主如此也材直驚人其勇非人之敵開心見誠與人語好醜無所隱諱圖講天下事極盡下恩兵事方略量敵校勝闊達多大節與高帝等經學愽覽政事文辯前世無比囂曰如卿言勝高帝耶曰不如也高帝大度無可無不可今上好吏事動如節度不飲酒囂大笑曰如卿言反復勝也七年正月詔群臣奏事無得言聖人又舊制上書以青布囊素褁封書中不中式不得上既上詣北軍待執前后相塵連歲月乃決上躬親萬機急於下情乃令上書啟封則用不得刮璽書取具文字而已奏詣闕平旦上其有當見及冤結者常以日日出時騶騎馳出召入其餘以後中使者出報即罷去所見如神遠近不偏幽隱上達民莫敢不用情追念前世園陵至盛王侯外戚葬埋僣侈吏民相效浸以無限詔有誥天下令薄葬八年閏月車駕西征河西大將軍竇融與五部太守步騎二萬迎上隗囂士眾震壞皆降囂走入城吳漢岑彭追守之九年正月隗囂餓出城食糧糗糒腹脹死十二年吳漢引兵擊公孫述入犍為界小縣多城守未下詔書告漢直擁兵到成都據其心腹後城營自解散漢意難前獨言朝廷以為我縛賊手足矣遣輕騎至成都燒市橋武陽以東小城營皆奔走降竟如詔書漢兵乘勝追奔述距守詔書又戒漢曰成都十萬人且堅據廣都城去之五十里待其即營攻城罷倦引去乃首尾擊之勿與爭鋒述兵不敢來轉營即之移徙輒自堅十一月眾軍至城門述自將背城而戰吳漢攻之述軍大破刺傷述扶輿入壁其夜死夷述妻子傳首於洛陽縱兵大掠舉火燔燒上聞之下詔讓吳漢副將劉禹曰城降嬰兒老母口以萬數一旦放兵縱火聞之可為酸鼻禹宗室子孫故嘗更職何忍行此仰視天俯視地觀於放麑啜羹之羹二者孰仁矣失斬將吊民之義又議漢殺述親屬太多是時名都王國有獻名馬寶劍直百金馬以駕鼓車劍以賜騎士苑囿池籞音禦之官廢弋獵之事不御雅性不喜聽音樂手不持珠玉衣服大絹而不重綵征伐嘗乘革輿羸馬公孫述故哀帝時即以數郡備天子用述破益州乃傳送瞽師交廟樂葆車乘輿物是後乃稍備具焉述伏誅之後而事少閑官曹文書減舊過半下縣吏無百里之繇民無出門之役十九年上幸南陽汝南至南頃止令舍大置酒賜吏民復南頓田租一歲吏民叩頭言皇考居此日久陛下識知寺舍每來輒加厚恩但復一歲少薄願復十歲上曰天下重寶大器常恐不任日慎一日安敢自遠期十歲復增一歲二十年六月上風眗癉病發甚以衛尉關內侯陰興為侍中興受詔雲臺廣室二十六年正月詔曰前以用度不足吏祿薄少乃自益其俸自三公下至佐史各有差四月始營陵地於臨平亭南詔曰無為山陵陂池裁令流水而已迭興之後亦無丘壟使合古法今日月已逝當豫自作臣子奉承不得有加乃令陶人作瓦器又曰臨平望平陰河水洋洋舟船泛泛善矣夫周公孔子猶不得存安得松喬與之而共遊乎文帝曉終始之義景帝所謂孝子也故遭反覆霸陵獨完非成法耶上常自細書一札十行報郡縣旦聽朝至日晏夜講經聽誦坐則功臣特進在側論時政畢道古行事次說在家所識鄉里能吏次第比類又道忠臣孝子義夫節士坐者莫不激揚悽愴欣然和悅群臣爭論上前常連日, SBCK: 爲}
