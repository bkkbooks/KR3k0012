  - {type: variant, offset: 4897, length: 404, content: 曰莽不如此當與霍光等更始韓夫人曰莽不如此帝郍為得之更始北都洛陽李松等自長安傳輿服御物及中黃門從官至洛陽關中咸相望天子更始遂西居東宮鍾鼓帷帳宮人數千官府里閭安堵如舊更始上前殿郎吏以次侍更始顧刮席與小常侍語郎吏怪之更始委政於趙萌曰在後庭與婦人躭飲諸將軍言事更始醉不能見韓夫人尤嗜酒每侍飲見常侍奏事輒怒曰帝方對我飲正用此時持事來乎起棓音棒書案破之所置牧守交錯州郡不知所從趙萌以私事捽才骨反侍中侍中曰陛下救我更始言大司馬縱之萌曰臣不受詔遂斬之又所署官爵皆群小被服不似或繡面衣錦袴諸于襜褕為百姓之所賤長安中為之歌曰竈下養中郎將爛羊胃騎都尉爛羊頭關內侯其冬赤眉十餘萬人入關引兵入上林更始騎出廚城門諸婦女皆從後車呼更始當下拜城更始下馬拜謝城乃去至高陵上聞更始失城乃下詔封更始為淮陽王而赤眉劉盆子亦下詔以聖公為長沙王更始仍許赤眉求降上璽綬乃封為畏威侯赤眉謝祿曰三輔兵多欲得更始一旦失之合兵攻公自滅道也遂害更始詔鄧禹牧葬於霸陵, WYG: 圗籍有徵云爾}
