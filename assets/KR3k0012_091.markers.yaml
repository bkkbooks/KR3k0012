  - {type: variant, offset: 1891, length: 237, content: 月帝入雒陽幸南宮三年正月益吳漢鄧禹等封自漢草創德運正朔服色未有所定高祖因秦以十月為正以漢水德立北畤而祠黑帝至孝文賈誼公孫臣以為秦水德漢當為土德至孝武倪寬司馬遷猶從土德自上即位案圖讖推五運漢為火德周蒼漢赤水生火赤代蒼故上都雒陽制郊祀於城南行夏之時犧牲尚黑明火德之運徽熾尚赤四時隨色郊祀帝堯以配天宗高祖以配上帝上遣游擊將軍鄧隆與幽州牧朱浮擊彭寵隆軍潞浮軍雍奴相去百餘里遣吏上奏言寵破在旦暮上讀檄未竟怒曰兵必敗北汝歸可知吏還未至隆軍果為寵兵掩擊破浮軍遠至不能救以兵走幽州咸曰上神三, SBCK: 七}
