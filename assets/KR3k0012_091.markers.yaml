  - {type: variant, offset: 3002, length: 546, content: 酸鼻禹宗室子孫故嘗更職何忍行此仰視天俯視地觀於放麑啜羹之羹二者孰仁矣失斬將吊民之義又議漢殺述親屬太多是時名都王國有獻名馬寶劍直百金馬以駕鼓車劍以賜騎士苑囿池籞音禦之官廢弋獵之事不御雅性不喜聽音樂手不持珠玉衣服大絹而不重綵征伐嘗乘革輿羸馬公孫述故哀帝時即以數郡備天子用述破益州乃傳送瞽師交廟樂葆車乘輿物是後乃稍備具焉述伏誅之後而事少閑官曹文書減舊過半下縣吏無百里之繇民無出門之役十九年上幸南陽汝南至南頃止令舍大置酒賜吏民復南頓田租一歲吏民叩頭言皇考居此日久陛下識知寺舍每來輒加厚恩但復一歲少薄願復十歲上曰天下重寶大器常恐不任日慎一日安敢自遠期十歲復增一歲二十年六月上風眗癉病發甚以衛尉關內侯陰興為侍中興受詔雲臺廣室二十六年正月詔曰前以用度不足吏祿薄少乃自益其俸自三公下至佐史各有差四月始營陵地於臨平亭南詔曰無為山陵陂池裁令流水而已迭興之後亦無丘壟使合古法今日月已逝當豫自作臣子奉承不得有加乃令陶人作瓦器又曰臨平望平陰河水洋洋舟船泛泛善矣夫周公孔子猶不得存安得松喬與之而共遊乎文帝曉終始之義景帝所謂孝子也故遭反覆霸陵獨完非成法耶上常自細書一札十行報郡縣旦聽朝至日晏夜講經聽誦坐則功臣特進在側論時政畢道古行事次說在家所識鄉里能吏次第比類又道忠臣孝子義夫節士坐者莫不激揚悽愴欣然和悅群臣爭論上前常連日, WYG: ''}
