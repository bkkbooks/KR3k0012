  - {type: variant, offset: 3741, length: 5, content: 三月葬原陵, SBCK: 旣以吏事自嬰帝􅀹任文法㹅攬威柄權不借下值天下􅀄定四民樂業户口衣食滋植斷獄號居前世之十二中興巳來追蹤宣帝夫以鍾離意之廉法諌諍懇切以寛和爲首以此推之斯亦難以德言者也薛瑩漢記賛曰明帝自在儲宫而聽允之徳著矣及臨萬機約身率禮恭奉遺業一以貫之雖夏啓周成繼體持統無以加焉是以海内乂安四夷賔服斷獄希少有治平之風號曰顯宗不亦宜乎潜夫論曰明帝時公車以反支日不受章奏帝聞而恠曰民廢農逺來詣闕而復拘以禁忌豈爲政之意乎於是遂蠲其制後漢書曰明帝遵奉建武制度無違者後宫之家不得封侯與政舘陶公主光武之女爲子求郎不許而賜錢千萬謂群臣曰郎官上應列􅀫出宰百里非其人則人受其殃是以難之故吏稱其官民安其業逺近肅服户口滋殖焉後漢書曰帝善刑理法令分明日晏坐朝幽枉必逹外内無倖曲之􅀻在上無矜大之色斷獄得情號居前世之十二故後之言事者莫不先建武永平之政然而鍾離意宋均之徒常以察慧爲言夫豈􅀪人之度未優乎肅宗孝章皇帝}
