  - {type: variant, offset: 160, length: 263, content: 不可言是歲嘉禾生一莖九穗長大於凡禾縣界大豐熟因名上曰秀是歲鳳皇來集濟陽故宮皆畫鳳皇聖瑞萌兆始形於此上為人隆準日角大口美鬚眉長七尺三寸仁智明遠多權略樂施愛人在家重慎畏事懃於稼穡兄伯升好俠非笑上事田作比之高祖兄伯升年九歲而南頓君卒隨其叔父在蕭入小學後之長安受尚書經師事廬江許子威大義略舉因學世事朝政每下必先聞知具為同舍解說南陽大人往來長安為之邸闇稽疑議嘗訟逋租於大司馬嚴尤尤見而奇之宛大姓李伯玉從第軼數遣客求上上欲避之先是時伯玉同母兄公孫臣為醫伯升請呼難伯升殺之上恐其怨故避之使來者言李氏欲相見款誠無他意上乃見之懷刀自備入見因始侯, SBCK: ''}
