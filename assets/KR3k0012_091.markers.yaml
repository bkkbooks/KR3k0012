  - {type: variant, offset: 3662, length: 2, content: 戊戍, WYG: 世祖崩皇太子即位永平二年二月上初臨辟雍行射禮十月上幸辟雍初行養老禮甲子上幸長安祠髙廟遂有事於十一陵厯覧舘舎邑居舊處㑹郡縣吏勞賜作樂三年十月上與皇太后幸南陽祠章陵周觀舊廬召見隂鄧故人上在于道所幸見吏勞賜省事畢歩觀行部署不用輦車夜讀衆書乙更盡乃寐先五鼓起率常如此五年十月上幸鄴用常山三老言復元氏縣田租八年十月上臨辟雍養三老五更禮畢上手書赦令尚書僕射持節詔三公十年閏月行幸南陽祠章陵以日北至復祠於舊宅禮畢召校官弟子作雅樂奏鹿鳴上自御塤箎和之以娛嘉賔至頓勞饗三老官屬是時天下安平人無徭役嵗比登稔百姓殷富粟斛錢三十牛羊被野十三年二月上耕籍田禮畢賜觀者食有諸生前舉手曰善哉文王之遇太公也上書板曰生非太公予亦非文王也十五年二月東巡狩三月幸孔子宅祠孔子及七十二弟子親御講堂命太子諸王說經幸東平王宫上憐廣陵侯兄弟賜以服御之物又以皇子輿馬悉賦予之十七年春甘露仍降樹枝内附芝生前殿神雀五色翔集亰師是夜上夢見先帝太后夢中喜覺因悲不能寐明旦上令百官採甘露客悉㑹太常丞上言陵樹華有甘露上令百官採甘露受賜畢罷上從席前伏御牀視太后鏡奩中物流涕勑易奩中脂澤粧具自帝即位遵奉建武之政有加而無損初世祖閔傷前世權臣太盛外戚預政漢家中興唯宣帝取法至於建武朝無權臣外族隂郭之家不過九卿親屬勢位不能及許史王氏之半至永平后妃外家貴者裁家一人備列將校尉在兵馬官充奉宿衛闔門而已無封侯預朝政者自皇子之封皆减舊制諸王皆當略與楚淮陽相比什減三四曰我子不當與先帝子等又國逺而小於王善節約謙儉如此八月}
