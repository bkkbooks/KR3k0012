  - {type: variant, offset: 5318, length: 0, content: '', WYG: 春正月帝加元服四年六月大將軍竇憲潜圗弑逆庚申幸北宫詔收捕憲黨皆下獄死使謁者收憲大將軍印綬遣憲及第篤景就國到皆自殺五年正月宗祀五帝於明堂遂登靈臺望雲物大赦天下自亰師離宫果園上林廣成囿悉以假貧人恣得捕不收其税十二年春正月上日以五經義異書傳意殊親幸東觀覧書林閲篇籍朝無寵族政如砥矢惠澤沾濡鴻恩茂篤外憂庶績内勤經藝自左右近臣皆誦詩書徳教在寛仁恕並洽是以黎元寧康方國協和貞符瑞應八十餘品帝讓而不宣故靡得而紀元興元年十二月帝崩于章徳前殿在位十七年時年二十七𦵏順陵廟曰穆宗帝王世紀曰穆宗之嗣世正身履道以奉大業賔禮耆艾動式舊典宫無嬪嬙鄭衛之讌囿無槃樂逰畋之豫躬履𤣥徳虚静自損是以屢獲豐年逺近承風云爾後漢書曰自竇憲誅後帝躬親萬幾每有灾異輙延問公卿極言得失舊南海獻龍眼荔枝十里一置五里一堠奔騰險阻死者相繼時臨武長汝南唐羗縣接南海乃上書陳狀帝下詔曰逺國珍羞本以薦奉宗廟茍有傷害豈愛人之本其勑令大官勿復受獻由是遂省焉續漢書曰孝和年十四能折外戚驕横之權即昭帝斃上官之類矣朝政遂一民安職業勤恤本務苑囿希幸逺夷稽服西域開泰郡國言符瑞八十餘品咸懼虛妄抑而不宣云爾范煜後漢書曰自中興以後逮于永元雖頗有弛張而俱存不擾是以齊民嵗増闢土世廣偏師出塞則漢北地空都䕶西指則通驛四方豈其道逺三代術長前世將服叛懐來自有數也孝殤皇帝東觀漢紀曰孝殤皇帝諱隆和帝之少子也和帝皇子數十生者輙夭故殤帝養於民元興元年十二月和帝崩是日倉卒殤帝時生百餘日乃立以為皇太子其夜即位尊皇后鄧氏為皇太后帝在襁褓太后臨朝延光元年八月帝崩于崇徳前殿年二嵗𦵏康陵又曰孝殤襁褓承統寢疾不豫夭命早崩國祚中絶社稷無主天下熬然頼皇太后孔子稱有婦人焉信哉恭宗孝安皇帝東觀漢紀曰孝安皇帝諱祐清和孝王第二子也少聰明敏逹慈仁惠和寛容博愛好樂施予自在邸第數有神光赤蛇嘉應照曜於室内又有赤蛇盤紆殿屋牀笫之間孝王常異之年十嵗善史書喜經籍和帝甚喜重焉號曰諸生數燕見禁中特加賞賜下及玩弄之物諸王子莫得與比殤帝即位鄧后臨朝以帝㓜小詔留於清河邸欲為儲副殤帝崩以王青蓋車迎帝齋于殿中拜為長安侯乃即帝位謙讓恪勤孜孜經學性樂恬澹委政太后永初元年十一月上始講尚書耽於典藝二年春正月帝加元服延光四年三月帝崩于葉帝在位十九年時年三十二御車所止上食百官待漏起居車騎鹵簿如故及還宫皇后與兄顯中常侍江亰樊豐等共興偽詐不容令羣臣知上道崩欲偽道得病遣司徒等分詣郊廟社稷告天請命誣罔靈祗以亡為存其夕發䘮羣寮百姓如䘮考妣塞外蠻夷致祭涕泣葬恭陵范曄後漢書論曰孝安皇帝雖稱尊享御而權歸鄧氏至損徹膳服克念治道然令自房帷威不逮逺始失根統歸成陵敝遂復計金授官移民逃冦推咎台衡以荅天眚既云哲婦亦惟家之索矣薛瑩漢書賛曰安帝之初委政太后十有餘年及親萬幾佞邪始進閹官用事寵加私愛阿母主聖勢傾朝廷遂樹姦黨揺動儲副山陵未乾蕭牆作難兵交禁省社稷殆危典略曰安帝永初元年以灾異免司空尹勤凡以灾冦故輙免三公多以卿為之或再三退而還復其故桓靈又甚自此始也少帝北卿侯續漢書曰安帝崩太子前已廢無餘子皇后與兄閻顯謀以北卿侯續為帝嗣三月立北卿侯皇太后臨朝十月辛亥北卿侯薨顯及江京等徴濟北河間王子欲以為嗣中黃門孫程王康等十九人共討江京等迎立濟隂王皇德傳曰安帝崩北卿侯即尊位十月北卿侯薨以王禮葬未即帝位不成君故以王禮葬太平御覽卷九十一}
