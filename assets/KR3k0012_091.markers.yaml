  - {type: variant, offset: 532, length: 1046, content: 在舂陵亦已聚會客矣上歸舊廬望見廬南若火光以為人持火呼之光遂盛赫然屬天有頃不見異之遂從南郭歸宅乃與伯升相見初伯升之起也諸家子弟皆逃自匿曰伯升殺我及聞上至絳衣大冠將軍服乃驚曰以為獨伯升如此也中謹厚亦如之皆合會共勞饗新市平林兵王鳳王匡等因率舂陵子弟隨之兵合七八千人上騎牛與俱殺進新野尉後乃得馬進圍宛城王莽遣大司徒王尋大司空王邑將兵來征更始立以上為太常偏將軍時無印得定武侯家丞印佩之二公兵到頴川嚴尤陳茂與合尤問城中出者言上不敢取財物但合會諸兵為之計冊尤笑言曰是美眉目者耶欲何為乃如此初莽遣二公欲盛威武以振山東至驅豹犀象奇偉猛獸以長人巨無霸為壘尉自秦漢以來師出未曾有也上邀之於陽關二公兵盛漢兵反走上馳入昆陽諸將惶恐各欲散歸與諸將議城中兵穀少宛城未拔力不能相救今昆陽即破一日之間諸將亦滅不同力救之反欲歸守其妻子財物耶諸將怒曰劉將軍何以敢如此上乃笑且去唯王常是上計會候騎還言大兵已來長數百里望不見其後尾前已至城北矣諸將遽請上上到為陳相救之勢諸將素輕上及迫急上為畫成敗皆從所言二公兵已五六萬到遂環昆陽城營圍之數重雲車七餘丈瞰臨城中旗幟蔽野塵熛連雲金鼓之聲數十里或為地𥥛或為衝車撞城積弩射城中矢下如雨城中負戶而汲二公自以為功成漏刻有流星墜營中正晝有雲氣如壞山直營而霣不及地尺而散吏士皆壓伏時漢兵在定陵郾者聞二公兵盛皆怖上歷說其意為陳大命請為前行諸部堅陳上將步騎千餘前去大軍四五里二公遣步騎數千乘合戰上奔之斬首數級諸部將喜曰劉將軍平生見小敵怯今見大敵勇甚奇怪也上復進二公兵卻諸部乘之斬首數百千級連勝遂令輕足將書與城中諸將言宛下兵復到而陽墜其書二公得書讀之恐上遂選精兵三千人從城西水上奔陣二公兵於是大奔北殺司徒王尋而昆陽城中兵亦出中外並擊會天大雷風暴雨下如注水潦成川滍水盛溢二公大眾遂潰亂奔赴水溺死者以數萬滍水為之不流王邑嚴尤陳茂輕騎乘死人渡滍水逃去漢軍盡獲其珍寶輜重車甲連月不盡五月齊武公拔宛城六月上破二公於昆陽破宛後數日收伯升部將劉稷而伯升強爭之更始遂用譖愬復收伯升即日皆物故上在父城徵詣宛拜上為破虜大將軍封武信侯更始欲北之雒陽以上為司隸校尉先到雒陽整頓官府三輔官府吏東迎雒陽者見更始諸將過者已數十輩皆冠幘衣婦人衣諸于繡擁䘿諸于大掖衣也如婦人之旌衣䘿音屈揚雄方言曰襜褕其矩者自閔目西謂之䘿據此是諸于上加繡䘿如今半臂也大為長安所笑知者或畏其衣犇走入邊郡見司隸官屬皆相指視之極望老吏或垂涕曰復見漢官威儀賢者蟻附更始以上為大司馬遣之河北十月上持節度孟津鎮撫河北安集百姓趙王庶兄胡子立邯鄲卜者王郎為太子移檄購求公十萬戶, SBCK: 周洽}
