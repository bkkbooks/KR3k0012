  - {type: variant, offset: 4012, length: 361, content: 望殆絕世祖以眇眇之胤起於白水之濱身屈無妄之力位與群豎並列于時懷璽者十餘建旗者數百高才者居之南面疾足者為之王公茫茫九州瓜分臠切泯泯蒼生塵消鼎沸我扇之以仁風驅之以大威霜雪被而洪棘枯綱維振而逆鱗掃群才畢湊人思與能數年之間廓清四海雖曰中興與夫始創業者庸有異乎誠馬生之言固以寥廊大度同符高祖又資太宗之仁兼孝宣之明一人之體其殆乎同故能享有神器據乎萬物之上矣會稽典錄曰上在長安中與餘姚嚴遵俱共受學結好建元元年徵遵拜為諫議大夫共上宿遵以足加帝上其夜客星犯帝座太史以聞上曰昨與嚴子陵臥也續漢書曰昔羿浞篡夏數十年少康生為仍牧正能脩德復夏厥勳大矣然尚有慮思及靡有鬲內外之助至於光武承王莽起自疋庶一民尺土靡有憑焉發跡於昆陽以數千屠百萬非膽智之主孰能堪之討賊平亂克復炎漢號稱中興者無以加之矣中國既定柔遠以德愛慎人命下及徭賦武功既備抗文德脩經術勳績弘, SBCK: 賢君}
