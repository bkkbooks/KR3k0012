  - {type: variant, offset: 2589, length: 253, content: 相塵連歲月乃決上躬親萬機急於下情乃令上書啟封則用不得刮璽書取具文字而已奏詣闕平旦上其有當見及冤結者常以日日出時騶騎馳出召入其餘以後中使者出報即罷去所見如神遠近不偏幽隱上達民莫敢不用情追念前世園陵至盛王侯外戚葬埋僣侈吏民相效浸以無限詔有誥天下令薄葬八年閏月車駕西征河西大將軍竇融與五部太守步騎二萬迎上隗囂士眾震壞皆降囂走入城吳漢岑彭追守之九年正月隗囂餓出城食糧糗糒腹脹死十二年吳漢引兵擊公孫述入犍為界小縣多城守未下詔書告漢直擁兵到成都據其心腹後城營自解散漢意難前獨言朝廷以為我縛賊手足矣遣輕騎至成都燒市橋武陽, WYG: ''}
