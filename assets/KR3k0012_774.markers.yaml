  - {type: variant, offset: 31, length: 1, content: 輕, SBCK: 皇輿夙駕䡨仕佳切於東階䡨脚也曹子建七啓云駕超野之駟乗追風之輿宋玉髙唐賦曰王乃乗玉輿駟倉螭同輿魏志曰太祖軍摩陂召夏侯惇常與同輿載諸將無得比者蜀志曰曹公東征吕布於下邳先主從曹公還表先主爲左將軍禮之愈重出則同輿呉志曰大子登字子髙善待僚屬略同布衣之禮諸葛恪頋譚等或同轝而載晉中興書曰紀膽字士逺爲鎮東左長史丹陽宣城新安三郡中正上常幸瞻家同乗輿還府瞻甚見遇郷郡榮之輦傳曰猛獲奔衛南宮萬奔陳以乗}
