  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 三輅輿同輿附輦輅釋名曰天子所乗曰輅輅亦車也謂之輅言行路也金輅以金玉飾車也象輅革輅木輅各隨所名也書曰大輅在賔階面綴輅在阼階面大路王綴輅金靣前皆南饗先輅在左塾之前先輅象以輅木金王象皆以飾車木則無飾背以在路􅆍門内左右塾北面凡陳列皆象成王生時禮曰大輅者天子之車也又曰鸞車有虞氏之輅也􅚗音鈎車夏后氏之輅也又曰天子居青陽左个乗青輅駕蒼龍天子居明堂左个乗朱輅駕芩駵天子居太廟太室乗黄輅駕黄龍天子居緫章左个乗白輅駕白駱天子居􅀇堂左个乗􅀇輅駕鐡驪周禮曰有虞氏上陶夏后上匠殷人上梓周人上輅又曰王之五路一曰玉路錫樊纓十月再就建太常十有}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_SBCK_774-1b}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 三輅輿同輿附輦輅釋名曰天子所乗曰玉輅輅亦車也謂之輅言行路也象輅金輅木輅各隨以為所飾名之也書曰大輅在賔階面綴輅在阼階面大輅玉綴輅金面前皆南嚮先輅在左塾之前先輅象次輅木金玉象皆以飾車木則無飾皆在路寢門内左右塾前北面凡所陳列皆象成王生時禮曰大輅者天子之車也又曰鸞車有虞氏之輅也軥音鈎車夏后氏之輅也又曰天子居青陽左个乗鸞輅駕蒼龍天子居明堂左个乗朱輅駕赤駵天子居太廟太室乗大輅駕黄駵天子居總章左个乗戎輅駕白駱天子居𤣥堂左个乗𤣥輅駕鐵驪周禮曰有虞氏尚陶夏后尚匠殷人尚梓周人尚輅又曰王之五路一曰玉路錫樊纓十有再就建太常十有}
