  - {type: variant, offset: 2, length: 0, content: '', krp: 三輅輿同輿附輦輅釋名曰天子所乗曰輅輅亦車也謂之輅言行路也金輅以金玉飾車也象輅革輅木輅各隨所名也書曰大輅在賔階面綴輅在阼階面大路王綴輅金靣前皆南饗先輅在左塾之前先輅象以輅木金王象皆以飾車木則無飾背以在路寝門内左右塾北面凡陳列皆象成王生時禮曰大輅者天子之車也又曰鸞車有虞氏之輅也軥音鈎車夏后氏之輅也又曰天子居青陽左个乗青輅駕蒼龍天子居明堂左个乗朱輅駕芩駵天子居太廟太室乗黄輅駕黄龍天子居緫章左个乗白輅駕白駱天子居玄堂左个乗玄輅駕鐡驪周禮曰有虞氏上陶夏后上匠殷人上梓周人上輅又曰王之五路一曰玉路錫樊纓十月再就建太常十有}
