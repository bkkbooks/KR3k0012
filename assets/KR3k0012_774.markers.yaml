  - {type: variant, offset: 3, length: 1, content: 敘, krp: 斿以祀金路鈎樊纓九就建大旂以賔同姓以封象路朱樊纓七就建大赤以朝異姓以封革路龍勒條纓五就建大帛以即戎以封四衛木輅前樊鵠纓建大麾以田以封蕃國又曰王后之五路重翟錫靣朱緫厭翟勒靣績緫安}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 雕靣鷖緫皆有容蓋翟車皃靣組緫有握輦車組輓有翣羽蓋左傳曰清廟茅屋大路越音活席大羮不致粢食音寺不鑿昭其儉也又曰賜之大輅之服戎輅之服論語曰行夏之時乗殷之輅服周之冕說􅁐曰晏子朝乗弊車駕駑馬景公見之曰嘻天子之禄寡耶何乗不佼古巧切之甚也晏子對曰頼君之賜得以壽三族及國交遊皆得生焉臣得煖衣飽食弊車駑馬以奉其身於丗足矣晏子出公使梁立據遺之輅車乗馬三反不受公不恱趣音促召晏子曰夫子不受寡人亦不受晏子對曰君使臣臨百官之吏節其衣服食飲之飬以先齊國之民然猶恐其侈靡而不頋其行也仐輅車乗馬君乗之上臣亦乗之}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_774-2a}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 彫面鷖總皆有容盖翟車貝面組總有握輦車組輓有翣羽盖左傳曰清廟茅屋大路越音活席大羮不致粢食音寺不鑿昭其儉也又曰賜之大路之服戎輅之服論語曰行夏之時乗殷之輅服周之冕說苑曰晏子朝乗弊車駕駑馬景公見之曰嘻夫子之禄寡耶何乗不佼古巧切之甚也晏子對曰賴君之賜得以壽三族及國交遊皆得生焉臣得煖衣飽食弊車駑馬以奉其身於是足矣晏子出公使梁丘據遺之輅車乗馬三反不受公不恱趣音促召晏子曰夫子不受寡人亦不乗晏子對曰君使臣臨百官之吏節其衣服飲食之養以先齊國之民然猶恐其侈靡而不顧其行也今輅車乗馬君乘之上臣亦乘之}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_774-3a, image: WYG0899/WYG0899-0756a.png}
