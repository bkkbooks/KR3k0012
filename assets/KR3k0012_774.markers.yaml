  - {type: variant, offset: 33, length: 0, content: '', SBCK: 輦其母一日而至又曰齊慶克通于聲孟子與婦人蒙衣乗輦而入于閎巷門又曰孟氏之臣􅁗莒父輦重如役莒父孟獻子家臣歩挽重車以從師榖梁傳曰晉君召伯尊而問焉伯尊來遇輦者輦者不辟使車右下而鞭之凡車將左右御在中有力之人在右所以備非常爾雅曰徒禦不驚輦名也漢書曰淮南王長早失母常附吕后孝惠然常心怨辟陽侯孝文􅀄即位自以爲最親驕蹇數不奉法上寛赦之三年入朝從上入苑獵與上同輦帝謂爲太兄又曰傅昭儀有寵於上生定陶恭王多􅇊藝上甚愛之㘴則同席行湏同輦又曰班婕妤班况之女孝成帝婕妤也賢才通辨帝遊於後庭嘗欲與同輦婕妤辤曰觀}
  - {type: page-break, offset: 33, content: '', id: KR3k0012_SBCK_774-6a}
  - {type: variant, offset: 33, length: 0, content: '', WYG: 輦其母一日而至又曰齊慶克通于聲孟子與婦人䝉衣乗輦而入于閎巷門又曰孟氏之臣秦莒父輦重如役莒父孟獻子家臣歩挽重車以從師榖梁傳曰晉君召伯尊而問焉伯尊來遇輦者不辟使車右下而鞭之爾雅曰徒御不驚輦者也漢書曰淮南王長早失母常附呂后孝惠然常心怨辟陽侯孝文初即位自以為最親驕蹇數不奉法上寛赦之三年入朝從上入苑獵與上同輦常謂為大兄又曰𫝊昭儀有寵於上生定陶恭王多伎藝上甚愛之坐則側席行須同輦又曰班媫妤班况之女孝成帝妃也賢才通辨帝遊於後苑嘗欲與同輦媫妤辭曰觀}
