  - {type: variant, offset: 1815, length: 209, content: 旋相得成器堅固主猶奚仲也言辭動作皆中術數故眾理相當上下相親巧者奚仲之所以為器也孔藂子曰孔子使宰予于楚昭王以安車象飾遺孔子宰予曰夫子無以為也王曰何對曰臣自侍衛夫子已來竊見其言不離道動不遺仁貴義尚清素好儉妻不服綵妾不衣帛車器不雕馬不食粟若夫觀物之麗靡窈妙之浮音夫子過之弗聽也故臣知夫子之不用車也孟子曰子產聽鄭國之政以其乘輿濟人於溱洧韓子曰商太宰使庶子行市還云西市門多車太宰謂庶子曰汝勿言及市吏至問曰市何多牛屎耶吏怪太宰神智, WYG: ''}
