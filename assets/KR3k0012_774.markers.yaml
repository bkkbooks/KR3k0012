  - {type: variant, offset: 2029, length: 235, content: 瑕有寵於君衛國之法竊駕君車罪刖彌子之母有疾告彌子矯駕君車君曰孝哉為母之故犯刖罪及彌子色衰愛弛得罪於君君曰是嘗矯駕吾車也又曰孫叔敖為令尹棧車牝馬糖飯菜羹枯魚為膳面有飢色淮南子曰夫車之所能轉千里者以其要在三寸轄又曰見飛蓬轉而知為車以類取之也晏子曰齊人好擊轂相犯以為樂禁之不止晏子為新車良馬出與其人相犯曰犯轂者不祥下車而去之然後國人不為又曰晏子衣緇布之衣而頳裏棧軫之車而牝馬以朝子思子曰終年為車無一尺之軨則不可以馳尸子曰文軒六駃題無四寸之鍵則車不行小亡則大者不成也又曰甯戚為桓, WYG: 建}
