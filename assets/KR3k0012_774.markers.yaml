  - {type: variant, offset: 1871, length: 251, content: 飾遺孔子宰予曰夫子無以為也王曰何對曰臣自侍衛夫子已來竊見其言不離道動不遺仁貴義尚清素好儉妻不服綵妾不衣帛車器不雕馬不食粟若夫觀物之麗靡窈妙之浮音夫子過之弗聽也故臣知夫子之不用車也孟子曰子產聽鄭國之政以其乘輿濟人於溱洧韓子曰商太宰使庶子行市還云西市門多車太宰謂庶子曰汝勿言及市吏至問曰市何多牛屎耶吏怪太宰神智又曰昔彌子瑕有寵於君衛國之法竊駕君車罪刖彌子之母有疾告彌子矯駕君車君曰孝哉為母之故犯刖罪及彌子色衰愛弛得罪於君君曰是嘗矯駕吾車也又曰孫叔敖為令尹棧車牝馬糖飯菜羹枯魚為膳面有飢色淮南子曰夫車之所能轉, SBCK: 流輸}
