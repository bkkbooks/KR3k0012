  - {type: variant, offset: 606, length: 113, content: 根車春二月青安車在前秋八月白虎在前又曰天子法駕所乘白金根車駕六龍有五色立車各一皆駕四馬又曰甘泉鹵簿有道車五乘遊車九乘在輿前漢雜事曰古諸侯貳車乘秦滅九國兼其服故大駕屬車八十一乘尚書御史乘之最後一車懸豹尾漢官解詁曰馬有廄車有府皮軒, SBCK: 銀}
