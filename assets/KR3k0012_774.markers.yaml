  - {type: variant, offset: 16, length: 3, content: 奚仲為, SBCK: 上古聖人見轉蓬始知爲輅輅行可載因物生智後爲之輿晉書曰王道有羸疾不堪朝㑹顯宗親幸之置酒作樂又詔自今巳後輿載入殿不得施拜晉諸公讃曰司徒傅以足疾遜位不許板輿上殿晉起居注曰太始四年正門臨軒詔太宰安平生孚載輿昇殿宋書曰陶潜解印後有脚疾使一門生二兒舉藍輿詣王弘旣至欣然而與之飲酌語林曰武侯與宣王在渭濵將戰宣王戎服莅事使人視武侯乗輿葛巾持白羽扇指麾三軍皆隨其進止宣皇聞而嘆曰可謂名士丗說曰孟旭未逹時家貧在京常見王恭乗髙輿服鶴氅裘于時微雪旭於籬間窺之歎曰此真神仙中人也陳留耆舊傳曰洛陽令董宣死後詔使視之有蘭輿一乗白馬一疋帝曰宣之清死乃知之幽明録曰謝安石當桓温之丗恒懼不全夜忽夢乗桓輿行十六里見一白雞而止莫有解此夢者及温死後代居宰相歴十六年而得病安方悟云乗桓輿者代君其位也十六里者得十六年也見白雞生者今太􅀊在酉吾病殆不起乎少日而卒淮南子曰以天爲盖以地爲輿四時爲馬韓子曰輿人成輿則欲人富貴也非輿人仁不貴則不售也潘安仁閑居賦曰太夫人乃御板輿􅂛輕軒逺覽王畿近周家國左太冲蜀都賦曰}
