  - {type: variant, offset: 75, length: 229, content: 大使車立乘駕駟赤帷持節者重道從賊曹皆兩大車伍伯璅弩十二人辟車四人從車四人從車乘元單導減半小使車不立乘有騑赤屏泥油重綘帷導無斧車近小使車蘭與赤轂白蓋赤帷從騶騎四十人此謂追捕考案有所勑取者之所乘也其送葬曰堊已下駟車而後還公卿中二千石郊廟明堂祠陵法出皆大車立乘駕駟他出乘安車大行載車其飾如金根加施組組連壁交結四角金龍首𠾑璧乘五彩折羽流蘇前後雲氣畫裳靈文盡曲轓長輿車等大僕御駕六希者淳白駱馬施色以黑藥灼其身為虎文又曰諸車之文乘輿倚龍伏虎靈文盡輈龍首鸞衡班輪升龍飛輅皇, SBCK: 張敞東宫舊事}
