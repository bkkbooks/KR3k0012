  - {type: variant, offset: 8, length: 1, content: 彪, krp: 太僕卿馭駕士三十二人並平巾幘青衫大口袴千牛衛將軍一人陪乗執金裝長刀御乗輦其輅衫腰輿後行次金輅象輅革輅木輅以次相隨並駕六馬各駕士三十二人並平巾幘大口袴衫色各從輅色次五副輅駕士各二十人衣服同正輅次耕根車駕六馬士三十二人服同玉輅又曰皇太子金輅駕四馬僕寺令馭左右率府卒一人執儀刀陪乗駕士二十二人並平巾幘緋帔衫大口袴又曰王公巳下象輅駕四馬佐二人立侍一人武弁朱衣革帶在左一人緋裲襠大口袴執刀在右駕士十二人平巾幘緋衫大口袴又曰玉輅青質以玉飾諸末重輿左青龍右白虎金鳯翅畫苢文鳥獸黄屋左纛金鳯一在軾前十二鑾在衡輅耕根鑾數皆准此其副則八二鈴在式龍輈設鄣塵青蓋繡飾黄裏愽山鏡子樹羽輪金根朱班重牙左建旂十有二旒旒皆畫升龍其長曵地右載闟許及切㦸長四尺廣三尺黻文旂首金龍頭㗸結綬及鈴緌駕蒼龍金緵亡黯切方釳許乞切揷翟尾五焦鏤錫鞶纓十有二就錫馬當顱金爲之鞶馬大帶纓馬决皆以五彩罽飾之就成也祭祀納后則供之金輅赤質以金飾諸末餘與玉輅同駕赤駵饗射祀還飲至則供之象輅黄質以象飾諸末餘同玉輅駕黄駵行道則供之革輅白質輓莫官切之以革餘同玉輅駕白駱廵狩臨兵事則供之木輅黒質以􅃮飾諸末餘與玉輅同駕黒駵田獵則供之諸盖旌旗及鞶纓皆從輅色黄裏俱用黄其鏤錫與五輅同耕根車青質盖三重餘同玉輅籍田則供之又曰皇太子金輅赤質以金飾諸末重輅箱畫苣文鳥獸黄屋伏鹿軾龍輈金鳯一在軾前設鄣塵朱盖黄裏輪畫朱牙左建旂九旒右載闟㦸旂首金龍頭衘結綬及鈴緌駕赤駵四鑾在衡二鈴在軾金緵方釳挣翟尾五焦鏤錫鞶纓九就從祀享正冬大朝納妃則供之又曰王公以下象輅以象飾諸末朱班輅八鸞在衡左建旗旗畫龍外一降升一右載闟㦸革輅以革飾諸末左建旜通帛爲旜餘同象輅木輅以􅃮飾之餘同革輅諸輅皆朱質朱盖朱旂旜一品九旒二品八旒三品七旒四品六旒其鞶纓就數皆淮此張子平東京賦曰天子乃撫玉輅乗時龍又曰乗鑾輅而駕蒼龍又曰奉引旣睪先輅乃發又曰龍輅充庭雲旗拂霓輿周易曰君子得輿民所載也又曰輿說輻夫妻反目象曰輿說輻中無尤也又曰壯于大輿之輹又曰見輿曵其牛掣其人天且劓無𥘉有終象曰見輿曵位不當也無𥘉有終遇剛也}
