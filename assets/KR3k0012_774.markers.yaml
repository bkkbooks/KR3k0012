  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_774-1a.3}
  - {type: variant, offset: 6, length: 1, content: 司, SBCK: 民之無義侈其衣食而不頋其行者臣無以禁之遂讓不受也董巴輿服志曰殷瑞山車金根之色殷人以爲大輅於是􅁗皇作金根之車漢承􅁗制爲乗輿即孔子所謂乗殷之輅也鹵簿令曰玉輅駕六}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_774-2b}
  - {type: variant, offset: 6, length: 1, content: 司, WYG: 民之無義侈其衣食而不顧其行者臣無以禁之遂讓不受也董巴輿服志曰殷瑞山車金根之色殷人以為大輅於是秦皇作金根之車漢承秦制為乗輿即孔子所謂乗殷之輅也鹵簿令曰玉輅駕六}
