  - {type: variant, offset: 2269, length: 178, content: 無忘在莒管子無忘在魯甯戚無忘車下又曰車輕道近則鞭策不用孫卿子曰三尺之岸虛車不能登百仞之山負車登焉陵遟故也蘇子曰房麗者趙之賢人立東門之外有行商車轄忘麗告之不悟復更告之商人怒曰吾轄自亡何須汝告惠加於己而反怒之吾欲比之草木草木有心矣沈約輿服志曰車服以庸著在唐典夏建旌旂辯其尊卑至于殷瑞山車者金車也故殷人制為大輅金根之色也周人則有玉金象革木五路之制其物致巧備於考工, SBCK: 幹公讌詩云}
