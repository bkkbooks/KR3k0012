  - {type: variant, offset: 3, length: 1, content: 敘, SBCK: 斿以祀金路鈎樊纓九就建大旂以賔同姓以封象路朱樊纓七就建大赤以朝異姓以封革路龍勒條纓五就建大帛以即戎以封四衛木輅前樊鵠纓建大麾以田以封蕃國又曰王后之五路重翟錫靣朱緫厭翟勒靣績緫安}
  - {type: variant, offset: 3, length: 1, content: 敘, WYG: 斿以祀金路鈎樊纓九就建大旂以賓同姓以封象路朱樊纓七就建大赤以朝異姓以封革路龍勒條纓五就建大白以即戎以封四衛木路前樊鵠纓建大麾以田以封蕃國又曰王后之五路重翟錫面朱總厭翟勒面繢總安}
