  - {type: variant, offset: 2723, length: 1195, content: 馬或六馬金箱四輪皆以金鑄正黃兩辟前後剋金作龍虎龜鳥又曰綠車名皇孫車天子有孫乘以從蔡邕車服志曰俗人失其名故名冕為平天冠五時副車曰五帝鸞旗曰雞耕根曰三蓋旗皆非一儀制令曰諸車一品青油纁道幰許偃切朱裏朱絲絡綱三品以上青道幰朱裏五品以上青道幰碧裏六品以下皆不得用幰括地圖曰奇肱民能為飛車從風遠行湯時西風起奇肱車至於豫州湯破其車不以示民十年西風至乃復使作車遣歸其國去玉門四萬里董巴輿服志曰乘輿金根車五乘輪皆朱班重牙貳轂司馬法曰夏曰子車殷曰胡奴車周曰輜車三代之輦語林曰潘安仁皃美每行老嫗以果擲之常滿車中張孟陽至醜每行兒以瓦礫擲之亦滿車傅暢故事曰尚書令軺車黑耳後戶僕射但後戶無黑耳中書監令如僕射譙周法訓曰鸞車璜珮求中道心石崇奴券曰作車當取大良白槐之輻茱萸之輞說苑曰齊景公伐宋至於歧隄之上登高以望大息而歎曰昔我先君桓公長轂八百乘以霸諸侯今我長轂三千乘而不敢久處於此管仲與弦章對曰臣聞之水廣則魚大君明則臣忠昔有桓公乃有管仲今桓公在此則車下之臣盡管仲也又曰趙簡主乘弊車癯音衢馬衣羖羊之裘其宰進諫曰車新則安馬肥則往來便衣狐豹之裘溫且輕簡子曰吾非不知吾聞君子服美則益恭小人服美則益倨今我以自備恐有小人之心又曰晉平公為馳逐之車掛之以犀錯之以羽車成立於殿下群臣得觀焉田差三過而不觀平公作色大怒差對曰臣聞桀以奢亡紂以此敗是以不敢觀也平公曰善令左右去車世說曰王武子乘車著連乾障泥前有水馬不肯渡武子曰此馬惜鄣泥使解之馬乃渡白虎通曰制車以步故立乘天子大路路大也道也正君至尊制度大所以行道德正車也諸侯路車大夫漸子廉切車士飾車山海經曰番禺生奚仲奚仲生吉光始以木為車郭璞曰世本曰奚仲造車此言吉光明其父子共創意首稱也袁子正書曰申屠剛諫光武以頭軔輪馬不得前子正云光武近出未有得失而頭軔輪此方頭也又曰輻車即輦魏晉公卿小出嘗乘馬亦多乘輿車漢諸侯貧者乃乘之其後轉見貴孫權云車中八牛即犢車也江左御出則載儲供之物漢世賤輅車而貴輜軿魏晉賤軿車而貴軺車又有追鋒如軺車而駕馬乂以雲母飾犢車謂之雲母車臣不得乘時以賜王公晉氏之有四望車今制亦存又漢制唯賈人不得乘馬車其餘皆乘之矣除吏赤蓋杠餘則青蓋杠云其非法駕則紫罽軿車案字林軿車有衣蔽無後轅其後有轅者謂之輻賈誼新書曰古之為路輿也蓋圜以象天二十八撩音老以象列星軫方以象地三十輻以象日月故仰則觀天文俯則察地理前視則暏鸞和之響四時之運此輿教之道也後漢崔駰車左銘曰虞夏作車取象機衡君子建左法天之陽正位授綏車不內顧塵不出軌鸞以節步彼言不疾彼指不躬玄覽于道永思厥中又車右銘曰擇御卜右採德用良詢納耆老于我是匡惟賢是師惟道是式箴闕旅賁內顧自勑匪望其度匪愆其則越戒敦儉禮以華國又車後銘曰敬其在路體貌思恭望衡顧轂允填茲容無或好失匪槃于遊顧省厥遺虎尾斯求昭德塞違抑盈以無雖有三晉咸然若虛後漢李尤小車銘曰盆蓋象天方輿則地輪法陰陽動不相離合之嗛苦琰切噓䟽通兩輜彰尊卑從輗之用信義所同梁載暠車馬篇曰朝集類蒸烟晚至如吹雪子雲亦何事門巷無車轍, SBCK: ''}
