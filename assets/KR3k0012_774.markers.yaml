  - {type: variant, offset: 1427, length: 173, content: 則貧賤可以驕人矣夫志不得授履而適秦楚耳安往而不得吾貧賤乎於是太子再拜而後退子方遂不下車漢武內傳曰內外謐寂以候仙官到夜二更之後忽見西南如白雲起蓊鬱直來遙趨宮庭須臾王母或駕龍虎或乘白麟或乘白鶴或乘軿車或乘天馬群仙數千光輝庭宇關令內傳曰尹喜常登樓望見東極有紫氣西邁喜曰應有聖人過京邑果見老君乘青牛車來過神仙傳曰洗義學道於蜀中與妻共載路逢路鹿車一乘王子年, SBCK: 輦}
