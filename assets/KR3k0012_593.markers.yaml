  - {type: variant, offset: 28, length: 0, content: '', WYG: 常奏呉越王錢鏐冊禮按禮文用竹冊上優其禮敕以玉為之者以玉冊帝王愛命之重數不可假之非禮之宜也殷洪小説曰魏國初建潘朂字元茂為䇿命文自漢武以來未有此制朂乃依倣商周憲章唐虞辭義温雅與誥同風于時朝士皆莫能措一字朂亡後王仲宣擅名於當時時人見此䇿或疑是仲宣所為論者紛紛及晉王為太傅臘日大㑹賔客朂}
