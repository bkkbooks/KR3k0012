  - {type: variant, offset: 1258, length: 1095, content: 順人之情欲誠必著清己之慮心無億詐事必忠恕凡將有為靡不三思喜怒以節動靜以時毫釐或差禍害亦隨慢易於初悔其曷追刑不可長武不可恃作威逞力厲階斯起垂旒蔽聰黈䌙塞耳含弘光大是以為美覆之如天愛之如子仁心感人率土自理嗟余寡昧嗣守丕圖寇戎薦興德化未敷業業兢兢其敢以愉俯察物情上稽典謨作斯式言寘于座隅其台衡銘曰天列台星垂象於人聖人則天亦立輔臣以翼以佐為衡為鈞如耳目應心如股肱運身是則同體孰云非親陰陽相推四序成歲君臣相得萬邦作乂感同風雲應若符契以道匡救盡規獻替木必從繩金其用礪帝者之盛時惟陶唐乃聞疇咨仄陋明揚洎乎有虞二八騰芳爰逮伊尹相于成湯載生姜牙諒彼武王道無不臧君聖臣賢運泰時康漢高既興簫曹亦彰昭烈我祖膺期而昌剗滅群凶砥平四方惟衛及英啟闢封壃維綱亦有魏徵忠謇昂昂茲眾材為國棟樑蕩蕩巍巍邦家有光是知道之廢興繫于時主主之得失資乎台輔經之以文緯之以武出為方邵入作申甫絕維載張闕袞斯補惟德是倚惟才是求才不易知德亦難周傳說板築夷吾射鉤任之不疑千載垂休體於至公何鄙何讎其惟哲王必賴良弼矧子不德闇於理術師旅繁起政刑多失遘茲艱屯夙夜祇慄翊我戴我實惟勳賢內熙庶績外揔十連威武載楊謀猷日宣長城壓境巨艦濟川同心同德扶危持顛子嘉爾誠爾相子理惟后失道亦臣之恥自昔格言慎終如始功載鼎彝道冠圖史無俾伊夔克專厥美作鑒勒銘永代是紀尋有詔命勒石於起義堂西偏上為題額又曰貞元二十二年上以聽政之餘深思理本迺著刑政箴并序序曰朕以南面勵精理道雖及和平之際未臻玄古之風夙夜孜孜勤求不怠夫安人以政輔政以刑蓋為之立中非使人從欲也是以務兼聽以酌群情擇庶官以咨共理恒勉不足而遏其過我欲仁矣尚逮夫意哉然萬務是殷必戒其失聽政之暇常志所存聊綴斯文庶乎自儆爾大朴既散利欲是生惟辟御時建極作程導以仁政齊以典刑惠此下人致之和平立政伊何必循道德詳刑伊何必去煩刻不以人從欲不以枉傷直故百度惟貞萬物作式匪陽不生匪陰不成寬則致慢猛亦取怨酌于大猷戒厥偏見罔咈人志罔興人患邇言必察芻蕘必詢奉無私之心以誠其意廣無情之聽思得其真憙怒有節措置有倫是以令肅如秋化行如春無邇憸人無信側言憸人則敗政側言乃惑聽罔攻異端慎乃出令知人不易在觀其行事實求理法乃因時法非生獘聖哲不為導物類之情以通其變相天地之道咸盡其宜教必明於順動必慮於違是以天覆之德日用不知六馬並馳在鈞衘策五音並奏在理金石茍去回邪可行蠻貊因人而理自古不易唐堯赭服夏禹泣辜以弼于理冀遷其愚寧漏吞舟豈求噬膚陷之於過是曰毒痛天監孔明無自無聲罔載爾偽必先爾誠蟻壤不防太山可傾患生所急禍起所輕故作事謀始而戒於未形子臨兆人道存化育祇荷玄貺幸清九服一夫不獲若履深谷思正其源庶登於撲監于往躅書以自勗又曰杜希全將赴靈州獻體要八章多所規諫德宗深納之乃著君臣箴以賜, WYG: ''}
