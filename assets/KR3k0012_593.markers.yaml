  - {type: 'tls:seg', offset: 3, content: '', id: KR3k0012_CHANT_593-1a.2}
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 座通署奏可即出付典名而典以名書召怗鶴頭板整威儀送徃得官之家其有特發詔授官者即宣付詔誥局作詔草奏聞勑可黃􅁓冩出門下門下詔請付外施行又曰周武平齊得李德林嘗謂群臣云我常曰唯聞李德林名及其與齊朝作詔書移檄我正謂其是天上人豈言今日得其驅使復爲我作文書極爲大異神武公紇豆毅荅曰臣聞明王聖主得騏驎鳯凰爲瑞是聖德所感非力能致之瑞物雖來不堪使用如李德林來受驅䇿亦陛下聖德所感致有大才用無所不堪勝於騏驎鳯凰逺矣武帝大􅀏曰誠如公言唐書文苑傳曰徐安貞開元中爲中書舎人集賢學士毎上屬文作手詔多令安貞視草風俗通曰光武中興以來五曹詔書題郷亭壁歳輔正多有關謬永建中衮州刺史過翔箋撰卷別改着板上一勞而九逸崔元始正論曰俚語曰州郡記如霹􅆮得詔書但挂壁永平中詔禁吏卒不得繫馬宫外樹爲傷害其枝葉又詔今雒陽幘工作幘皆二尺五寸圍人頭各有大小不可同度此詔不可從也蔡質漢儀曰延熹中京師遊俠有盗發順帝陵者賣}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_593-4b}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_593-5a}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 座通署奏可即出付典名而典以名帖鶴頭板整威儀送往得官之家其有特發詔授官者即宣付詔誥局作詔章草奏聞勅可黄紙冩出門下門下答詔請付外施行又曰周武平齊得李徳林嘗謂羣臣云我嘗日唯聞李德林名及其與齊朝作詔書移檄我正謂其是天上人豈意今日得其驅使復為我作文書極為大異神武公糺豆陵毅答曰臣聞明王聖主得麒麟鳳凰為瑞是聖德所感非力能致之瑞物雖來不堪使用如李德林來受驅䇿亦陛下聖德感致有大才用無所不堪勝於麒麟鳳凰逺矣武帝大笑曰誠如公言唐文苑傳曰徐安貞開元中為中書舍人集賢學士毎上屬文作手詔多令安貞視草風俗通曰光武中興以來五曹詔書題鄉亭壁嵗補正多有闕謬永建中兖州刺史過翔箋撰卷别改者板上一勞而久逸崔元始政論曰俚語曰州郡記如霹靂得詔書但掛壁永平中詔禁吏卒不得繫馬宫外樹為傷害其枝葉又詔令雒陽幘工作幘皆二尺五寸圍人頭各有大小不可同度此詔不可不從也蔡質漢儀曰延熹中京師遊俠有盜發順帝陵者賣}
