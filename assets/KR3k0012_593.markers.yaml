  - {type: variant, offset: 2, length: 0, content: '', krp: 九詔䇿誥教誡詔釋名曰詔照也人闇不見事則有所犯以此照示使照然知所由也蔡邕獨斷曰制詔制者王者之言必爲法制也詔猶告也告教也三代無其文秦漢有也文心雕龍曰皇帝馭寓其言也神淵嘿負扆而響盈四表其唯詔䇿乎昔軒轅唐虞同稱爲命命之爲義制性之本也其在三王事兼誥誓誓以訓誡誥以敷政降及七國並稱曰命命者使也秦并天下改命曰制漢𥘉定儀則有四品一曰䇿書二曰制書三曰詔書四曰戒勑勑戒州郡詔告百官制施赦令䇿封王侯䇿者簡也制者裁也詔者告也勑者正也觀文景以前詔體浮雜武帝崇儒選言弘奥䇿封三王文同典訓勸戒淵雅垂範後代及光武撥亂留意詞采而造次喜怒時或偏濫曁明章崇學雅詔間出和安政㢮禮閣鮮才每爲詔敕假手外請建安之末文理代興潘朂九錫典雅逸群衛覬禪誥符采炳耀不可加也自魏晉䇿誥職在中書劉放張華管于斯任施令發號洋洋盈耳魏文以下詞義多偉至於作威作福其萬慮之一弊乎晉氏中興唯明帝崇才以温嶠文清故引入中書自斯巳後體憲風流矣夫王言崇祕大觀在上所以百辟其刑萬邦作孚故授官選賢則義炳重離之暉優文封䇿則氣含雲雨之潤勑戒恒誥則筆吐星漢之華啓戎變伐則聲存洊雷之威青災肆赦則文有春露之滋明詔勑法則詞有秋霜之烈此詔䇿之大畧也漢制度曰帝之下書有四一曰䇿書二曰制書三曰詔書四曰誡勑䇿書者編簡也其制書二尺短者半之篆書起年月稱皇帝以命諸侯王三公以罪免亦賜䇿而以隷書用尺一木兩行惟此爲異也制書者帝者制度之命其文曰制詔三公皆璽封尚書令即重封露布州郡者詔書也其文曰告某官云如故事誡勑者謂勑其官他皆類此漢書曰誡勑刺史太守及三邊營官𬒳勑文曰有詔勑某官是爲誡勑世皆名此爲䇿書失之甚也又曰淮南王安傳曰武帝方好藝文以安屬於諸父辨愽善爲文辭甚尊重之每爲報書及賜師古曰書賜之也常召司馬相如等視草迺遣東觀漢記曰第五倫毎見光武詔書常歎曰此聖主也當何由一得見快矣等軰笑之曰汝三皇時人也說將尚不能動萬乗主耶倫曰未遇知巳道不可故耳范曄後漢書曰隗囂賔客掾史多文才士每所有事當世才士大夫皆諷誦之故帝有所荅尤加意焉魏志曰明帝疾欲以燕王字爲大將軍帝引見劉放孫資入卧内問之放資對曰燕實自不堪大任帝曰曹爽可代宇不放資因賛成之又深陳冝速召太尉司馬宣王以網維帝室納其言即以黃𥿄授放作詔放資旣岀帝意復變詔止宣王又曰蔣濟上萬機論帝嘉之入爲散騎常侍時有詔詔征南將軍夏侯尚曰卿腹心重將當使恩施足死惠愛可懷作威作福殺人活人尚以示濟濟旣至帝問曰卿所聞見天下風教何如濟對曰未有它善但見亡國之語耳帝忿然作色而問其故濟具以荅因夫作威作福書之明戒天子無戯古人所愼唯察之於是帝意解追取前詔王隱晉書曰武帝泰始四年班五條詔書于郡國一曰正身二曰勤民三曰撫孤寡四曰敦本息華五曰去人事又曰楚王瑋旣誅汝南王亮㝷又詔云瑋矯詔行斬刑臨死出其懷中青𥿄以示監刑尚書劉頌流涕而言此詔書也受此而行謂爲社稷今更爲罪託體先帝枉受如此幸見申列晉書楊駿傳曰武帝疾篤未有頋命佐命功臣皆巳没矣朝臣惶惑計無所從而駿盡斥群公親侍左右因輙改易公卿樹其心腹㑹帝少間見所用者乃正色謂駿曰何得便尓乃詔中書以汝南王亮與駿夾輔王室駿恐失權寵從中書借詔觀之得便藏匿中書監華廙恐懼自徃索之終不肯與信宿之間上疾遂篤又曰齊王冏入宫稱詔廢賈后后曰詔當從我出何詔也晉中興書曰初顯宗㓜冲見王導恒拜又帝與導手詔則敬白中書作詔則曰敬問於是以爲永制又曰桓玄左右稱玄爲桓詔桓㣧諌曰詔者施於辭令不以爲稱謂也漢魏之主皆無此言願陛下稽古帝則令萬世可法玄曰此詔以行今宣勑罷之後周書曰兾儁善隷書特工摸冩魏文昌𥘉爲賀扷岳墨曹叅軍及岳𬒳害太祖引爲記室時侯莫陳恱阻兵隴右太祖志在平之乃令儁僞作魏帝勑書與費也頭令將兵助太祖討恱儁依舊勑摸冩及代舎人主書等署與眞無異太祖說費也頭巳曾得魏帝勑書及見此勑不以爲疑遂遣歩騎一千受太祖節度隋書後齊正日侍中宣詔慰勞州郡國使詔牘長一尺三寸廣一尺雌黃塗飾上冩詔書三計㑹日侍中依儀勞郡國計吏問刺史大守安不及糓價麥苗善惡人間疾苦又班五條詔書於諸州郡國使人冩以詔牘一枚長二尺五寸廣一尺三寸亦以雌黃塗飾上冩詔書正㑹日依儀宣示使人使人歸以告刺史二千石一曰政在正身在愛人去殘賊擇良吏正决獄平徭賦二曰人生坐勤勤則不匱其勸率田桑無或煩擾三曰六極之人務加寛養必使生有以自救没有以自給四曰長吏華浮奉客以求小譽逐末捨本政之所疾冝謹察之五曰人事意氣干亂奉公内外溷淆綱紀不設所冝糺劾又曰陳梁制諸用官式吏部先爲白牒録數十名吏部常叅掌人共署奏勑或可或不其不用者更銓量奏請隨才𥙷用以黃𥿄録名}
  - {type: xml-element, offset: 3, content: '', id: KR3k0012_CHANT_593-bkkxmlele1}
