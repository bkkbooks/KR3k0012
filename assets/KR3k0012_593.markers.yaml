  - {type: variant, offset: 2397, length: 0, content: '', SBCK: 訓誨有成致令廢黜􅀒文皇帝付囑之意此咎非安定公而誰太祖乃令太常盧辨作誥喻公卿曰嗚呼我群后曁衆士維文皇帝以襁褓之嗣託於予訓之誨之庶厥有成而予罔能弗變厥心庸曁乎廢墜我文皇帝之志嗚呼兹咎予其焉避予實知之矧尔衆人心哉惟予之顔豈惟今厚將恐後世以予爲口實唐書曰孫逖掌誥八年制勑所岀爲時流歎服議者以爲自開元巳來蘇頲齊澣蘇晉賈曾韓休許景先及逖爲王言之最逖尤苦思文理精練晉史曰髙祖令制誥之辭不得虚飾冗長必湏陳其實行以正王言教尚書舜典曰帝曰契汝作司徒敬敷五教在寛春秋元命苞曰天垂文象人行其事謂之教教俲也言上爲而下俲也文心雕龍曰教者俲也言出而民効也故王侯稱教昔鄭弘之宁南陽條教爲後所述乃事緒明也孔融之守北海文教麗而罕施乃治體乖也􅀂諸葛孔明之詳酌􅁃稚㳟之明斷並理得而詞中教之善也漢書曰京非尹王遵岀教令誡文心雕龍曰戒卿爲文實詔之切者魏武稱作勑戒當指事而語勿得依違曉治要矣及晉武勑戒備告百官勑都督以兵要戒州牧以董司警郡守以恤隱勒牙門以禦衛有訓典焉戒者愼也禹稱戒之用休君父至尊在三同極漢髙之勑太子東方朔之戒子亦頋命之作也及馬援以下各貽家戒班􅁎女戒足稱母師矣太公金匱曰武王曰五帝之誡可得聞乎太公曰黃帝曰余君民上揺摇恐夕不至朝故爲金人三緘其口愼言語也東方生傳曰朔誡其子以上容應劭日容身避容也首陽爲拙柱下爲工飽食安歩以仕易農依隱玩世詭時不逢後漢書曰馬援兄子嚴敦並喜譏議而通輕俠客援在交阯還書誡之曰聞人之過失如聞親名耳可得聞而口不得言也好論人長短妄有善惡者寕死不願聞子孫有此行也龍伯髙敦厚周愼謙約節儉吾愛之重之願汝曹效之杜季良豪俠好義憂人之憂樂人之樂有䘮致客數郡畢至吾愛之重之不願汝曹效之效伯髙不得猶爲謹勑士所謂刻鵠不成尚􅀋鶩者也效季良不得䧟爲天下輕薄子所謂盡虎不似反􅀋狗也裴松之以爲援此誡可謂切至之至不刋之訓矣杜恕家事戒曰張子臺視之似鄙樸人然其心中不知天地間何者爲惡毅然如與隂陽合德作人如此冨貴禍害何由而生陶淵明道誡曰夫天地賦命有生必有終自古賢聖誰能}
