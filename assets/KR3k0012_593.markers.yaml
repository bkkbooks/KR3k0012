  - {type: variant, offset: 45, length: 238, content: 於和萬物以生九功乃敘是以中春之首紀為令節布陽和之政暢亭育之功式宴且歡順時而舉蓋取象於交泰之義也今歲華載陽嘉雪呈慶君臣同樂實獲我心近以聽政之餘參比音律播於絲竹韻於歌詩象中和之容作中和之樂教習甫就畢陳于茲於是闢廣庭臨內殿張大會示群臣千載成文威儀有序禮洽歡浹中心是嘉上下之志通乾坤之理得善固未盡和莫甚焉聊復成篇以言其志詩曰芳歲肇佳節物華當仲春乾坤既昭泰煙景含絪縕德淺荷玄貺樂成思治人前庭列鍾鼎廣殿延群臣八卦隨意舞五音傳曲新顧非咸池奏庶叶南風薰式宴禮所重浹歡情必均同和諒在茲萬國希可親, WYG: 誥}
