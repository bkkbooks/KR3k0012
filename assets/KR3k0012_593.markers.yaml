  - {type: variant, offset: 159, length: 276, content: 千載成文威儀有序禮洽歡浹中心是嘉上下之志通乾坤之理得善固未盡和莫甚焉聊復成篇以言其志詩曰芳歲肇佳節物華當仲春乾坤既昭泰煙景含絪縕德淺荷玄貺樂成思治人前庭列鍾鼎廣殿延群臣八卦隨意舞五音傳曲新顧非咸池奏庶叶南風薰式宴禮所重浹歡情必均同和諒在茲萬國希可親又曰貞元六年二月戊辰朔中和節宴百寮於曲江亭上賦詩賜之曰東春變梅柳萬寓生春光中和紀月令方與天地長躭樂豈子尚懿茲時景良庶遂亭育恩同致寰海康君臣永終始交泰符陰陽曲沼水新碧華林桃稍芳勝賞信多歡戒之在無荒又曰貞元六年春三月庚子百寮宴於曲江亭上賦詩以賜之曰歲閏節華晚眾芳繁暮春霽日天地晴元巳風景新禊飲傳舊俗古今歡此辰, SBCK: 畢}
