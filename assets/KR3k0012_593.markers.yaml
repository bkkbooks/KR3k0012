  - {type: variant, offset: 2511, length: 180, content: 甘受惟君無良亦臣之咎聞諸辛毗牽裾魏后則有禽息竭忠碎首勉思獻替以平可否勿謂無傷自微而彰勿謂何害積小成大事有隱而必見令既出而焉悔鼓鍾在宮聲聞于外浩然涉水朕未有艾將貞扆以虛心期盡忠而納誨在昔稷契實匡舜禹近茲魏徵佑我大祖君臣叶德混一區宇肆予寡昧獲纘丕緒臣哉鄰哉爾翼爾輔高秋始肅我武惟揚輟此禁衛殿于大邦戀聞方甚嘉言乃昌是規是諫金玉其相詞高理要入德知方總彼千慮備于八章宣父, SBCK: 損枚叔}
