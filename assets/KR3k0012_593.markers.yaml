  - {type: variant, offset: 2, length: 0, content: '', WYG: 九詔䇿誥教誡詔釋名曰詔照也人闇不見事則有所犯以此照示使昭然知所由也蔡邕獨斷曰制誥制者王者之言必為法制也誥猶告也告教也三代無其文秦漢有也文心雕龍曰皇帝御㝢其言也神淵嘿負扆而響盈四表其唯詔䇿乎昔軒轅唐虞同稱為命命之為義制性之本也其在三代事兼誥誓誓以誡戎誥以敷政降及七國並稱曰令令者使也秦并天下改命曰制漢初定儀則有四品一曰䇿書二曰制書三曰詔書四曰戒勅勅戒州邦詔告百官制施赦命䇿封王侯䇿者簡也制者裁也詔者告也勅者正也觀文景以前詔體浮雜武帝崇儒選言宏奥䇿封三王文同訓典勸戒淵雅垂範後代及光武撥亂留意斯文而造次喜怒時或偏濫暨明帝崇學惟詔間出和安政弛禮閣鮮才每為詔勑假手外請建安之末文理代興潘朂九錫典雅逸羣衞覬禪詔符采炳燿不可加也自魏晉誥䇿職在中書劉放張華互管斯任施命發號洋洋盈耳魏文以下詞義多偉至於作威作福其萬慮之一弊乎晉氏中興唯明帝崇才以温嶠文清故引入中書自斯以後體憲風流矣夫王言崇秘大觀在上所以百辟其刑萬邦作孚故授官選賢則義炳重離之輝優文封䇿則氣含雲雨之潤勑誡恒誥則筆吐星漢之華啓戎燮伐則聲有洊雷之威𤯝灾肆赦則文有春露之茲明罰勑法則詞有秋霜之烈此詔䇿之大畧也漢制度曰帝之下書有四一曰䇿書二曰制書三曰詔書四曰誡勑䇿書者編簡也其制書二尺短者半之篆書起年月稱皇帝以命諸王三公以罪免亦賜䇿而以𨽻書用尺一木兩行惟此為異也制書者制度之命其文曰制詔三公皆璽封尚書令郎重封露布州郡者詔書也其文曰告某官云如故事誡勑者謂勑某官他皆類此漢書曰誡勅刺史太守及三邊營官被勑文曰有詔勑某官是為誡勅世皆名此為策書失之甚也又曰淮南王安傳曰武帝方好藝文以安屬於諸父辨博善為文辭甚尊重之為報書及賜師古曰書賜書也常召司馬相如等視草乃遣東觀漢記曰第五倫毎見光武詔書常歎曰此聖主也當何由一得見快矣等輩笑之曰汝三皇時人也説將尚不下安能動萬乘主耶倫曰不遇知己道不同故耳范曄後漢書曰隗囂賔客掾吏多文學士每所上事當世才士大夫皆諷誦之故帝有所答尤加意焉魏志曰明帝疾欲以燕王宇為大將軍帝引見劉放孫資入卧内問之放資對曰燕王實自知不堪大任帝曰曹爽可代字不放資因贊成之又深陳宜速召太尉司馬宣王以綱維皇室帝納其言即以黄紙授放作詔放資既出帝意復變詔止宣王又曰蔣濟上萬機論帝善之入為散騎常侍時有詔詔征南將軍夏侯尚曰卿腹心重將特當任使恩施足紀惠愛可思作威作福殺人活人尚以示濟濟既至帝問曰卿所聞見天下風教何如濟對曰未有他善但見亡國之語耳帝忿然作色而問其故濟具以答因曰作威作福書之明戒天子無戱古人所慎唯陛下察之於是帝意解追取前詔王隠晉書曰武帝泰始四年班五條詔書于郡國一曰正身二曰勤民三曰撫孤寡四曰敦本息華五曰去妨民事又曰楚王瑋既誅汝南王亮尋又詔云瑋矯詔行斬刑臨死出其懷中青紙以示監刑尚書劉頌流涕而言此詔書也受此而行謂為社稷今更為罪託體先帝受枉如此幸見申列又楊駿傳曰武帝疾病未有顧命佐命功臣皆已没矣朝臣惶惑計無所從而駿盡斥羣公親侍左右因輒改易公卿樹其心腹會帝小間見所用者乃正色謂駿曰何得便爾乃詔中書以汝南王亮與駿夾輔王室駿恐失權寵從中書借詔觀之得便藏匿中書監華廙恐懼自往索之終不肯與信宿之間上疾遂篤又曰齊王冏入宫稱詔廢賈后后曰詔當從我出此何詔也晉中興書曰初顯宗㓜冲見王導恒拜又帝與導手詔則曰敬白中書作詔則曰敬問於是以為永制又曰桓𤣥左右稱𤣥為桓詔桓𦙍諫曰詔者施於辭令不以為稱謂也漢魏之主皆無此言願陛下稽古帝則令萬世可法𤣥曰此事已行必其宜革可待事平也後周書曰冀雋善隸書特工模寫魏太昌初為賀拔岳墨曹參軍及岳被害太祖引為記室時侯莫陳悦阻兵隴右太宗志在平之乃令雋偽為魏帝勑書與費也頭令將兵助太祖討悦雋依舊勑模寫及代舍人主書等署與真無異太祖大説費也頭已曽得魏帝勑書及見此勑不以為疑遂遣步騎一千受太祖節度隋書曰侍中宣詔慰勞州郡國使詔牘長一尺三寸廣一尺雌黄塗飾上寫詔書三計㑹日侍中依儀勞郡國計吏問刺史太守安不及榖價麥苗善惡人間疾苦又班五條詔書於諸州郡國使人寫以詔牘一枚長二尺五寸廣一尺三寸亦以雌黄塗飾上寫詔書正會日依議宣示使人使人歸以告刺史二千石一曰政在正身在愛人去殘賊擇良吏正決獄平徭賦二曰人生在勤勤則不匱其勸率田桑無或煩擾三曰六極之人務加寛養必使生有以自救没有以自給四曰長吏浮華奉客以求小譽逐末捨本政之所疾宜謹察之五曰人事意氣干亂奉公内外溷淆綱維不設所宜糾劾又曰陳依梁制用官式吏部與參掌人共署奏勅或可或不可不用者更銓量奏請若勅可則隨才補用以黄紙録名}
