  - {type: variant, offset: 3258, length: 1245, content: 曰諫畋獵十四曰錄勳賢分為上下卷上自製其目曰前代君臣事跡至是以其書寫於屏風列之御座之右復遣中使程文幹以書屏六扇至中書宣示宰臣李藩裴垍曰朕近撰此屏風常所觀覽故令蹔將示卿藩等上表稱賀又曰文宗嘗夏日與學士聯句帝曰人皆苦炎熱我愛夏日長柳公權續之曰薰風自南來殿閣生微涼帝嘉之又曰裴度臥疾文宗遣中使賜度詩曰注想待元老識君恨不早我家柱石衰憂來學丘禱又曰文宗開成中駕幸龍首池觀內人賽雨自春不雨上孜孜憂勤徧禮群望至是甘澤屢降中外感悅上賦喜雨詩云風雲喜際會雷雨遂流滋薦弊虛陳禮動天實精思漸侵又夏節復在三春時霡深垂朱闕飄颻入綠墀郊埛既霑足黍稷有豐期百辟同憂樂萬方佇雍熙宰臣洎文武百官咸有屬和家語曰昔者舜彈五弦之琴造南風之詩其語曰南風之薰兮可以解吾民之慍兮薰風至之皃也南風之時兮可以阜吾民之財兮時得其時阜盛穆天子傳曰丙辰天子南遊于黃室之丘天子乃休曰中天子北風雨雪有凍人天子作詩三章以哀民哀愍也我徂黃竹員閟塞閟閉也帝收九行九行九道也傳曰經啟九道嗟我公侯百辟冢卿皇我萬民皇正也旦夕勿忘恒念也我徂黃竹員閟寒帝收九行嗟我公侯百辟冢卿皇我萬民旦夕勿窮有皎者鵒鵒鳥名音路翩翩其飛嗟我公侯勿則遷居樂其寡言守一居少樂不如遷土居無求安也禮樂其民言當以禮樂化其民天子曰余一人則淫淫于遊樂不皇萬民漢武帝集曰奉車子侯暴病一日死上甚悼之乃自為歌詩西京雜記曰始元元年黃鶴下太液池上為歌曰黃鶴飛兮下建章羽肅肅兮行蹌蹌金為衣兮菊為裳唼喋荷荇出入蒹葭自顧菲薄媿爾嘉祥漢武帝柏梁詩曰日月星辰和四時梁王曰驂駕駟馬從梁來於是群臣各賦一句魏文帝典論自敘曰初平之元董卓弒主鴆后蕩覆王室是時家家思亂人人自危名豪大俠富宇強族飄揚雲會萬里相赴袞豫之師戰於滎陽河內之甲軍於孟津卓遂遷大駕西都長安而山東大者連郡國中者嬰城邑小者聚阡陌百姓死亡暴骨如莽時余年五歲上以世方擾亂教余學射六歲而知射又教余騎馬八歲而能騎射矣是以少好弓馬于今不衰建安十年始定冀州獩貊貢良弓燕代獻名馬時歲之暮春弓燥手柔草淺獸肥與族兄子丹獵于鄴西終日手獲麞鹿九雉兔三餘又學擊劍桓靈時有虎賁王越善斯術河南史何得其法於越余從何學之甚精嘗與平虜將軍劉勳奮威鄧展共飲展有手臂曉五兵法其能空手入白刃時酒後耳熱方食蔗以蔗為枚下殿數交三中其臂左右大笑展意不平更求為之復正截其顙坐中驚視余還坐笑曰昔陽慶使淳于意去其敵方授以祕術余亦願鄧將軍損棄故伎更受要道也一坐盡歡余於它戲弄之事少所喜唯於彈棊略盡其巧少為之賦上雅好書籍雖在軍旅手不釋卷每定省從容常言人少學則思專長則善忘長大而能勤學者唯吾與袁伯業耳余是以習詩論及此而備歷五經四部史漢諸子百家之言靡不畢覽魏文帝芙蓉池詩曰乘輦夜行遊逍遙步西園雙渠相灌溉佳木遶通川卑枝拂羽蓋修條摩蒼天驚風扶輪轂飛鳥翔我前丹霞夾明月華星出雲間上天垂光彩五色一何鮮壽命非松喬誰能得神仙遨遊快心意保己終百年魏文帝遊宴詩曰置酒坐飛閣逍遙臨華池神飆自遠至左右芙蓉披綠竹映清水秋蘭被幽崖月出照園中冠佩相追隨客從南方來為我吹參差潛魚猶伏浦聽者未云疲高文一何綺小儒安足為肅肅廣殿陰雀聲愁北林眾賓還城邑何以慰吾心, SBCK: ''}
