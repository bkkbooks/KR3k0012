  - {type: variant, offset: 4, length: 1, content: 製, SBCK: 物於市市長追捕不得周景以尺一詔召司􅀠校尉左雄詣臺與三日期擒賊曹植􅀃灌均上事令曰􅀌前令冩灌均所上􅀌章三臺九府所奏事及詔書一通置之座隅􅀌欲朝夕諷詠以自警誡也語林曰明帝函封詔與􅁃公信誤致與王公王公開詔末云勿使冶城公知導旣視表荅曰伏讀明詔似不在臣臣開臣閉無有見者明帝甚愧數月不能見王公石虎鄴中記曰石虎詔書以五色􅁓着鳯鶵口中䇿蔡邕獨斷曰䇿者簡也禮云不備百文不書於䇿其制長二尺短者半之其次一長一短兩編}
