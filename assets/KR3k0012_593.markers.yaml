  - {type: variant, offset: 899, length: 282, content: 非工義又未備垂諸來裔良所恧焉起予者商因之有作庶乎朝夕自儆且俾後代知我有文武殿邦之臣也其宸扆銘曰天生蒸人性本元淳嗜慾交馳利害紏紛無主乃亂樹之以君九域茫茫萬情云云目不備覩耳難徧聞覩之聞之矧又非真事失其源道遠莫親理得其要化行如神失源惟何不正其身得要惟何在能任人正身之方先誠其意罔從爾欲罔載爾偽體道崇德本仁率義必信若寒暑無私象天地感而遂通百慮一致任人之術各當其器捨短從長理難求備多士揔集眾材咸遂知而必任任而勿貳以天下之目為我鑒我鑒斯明以天下之心為我謀我謀則智求賢惟廣辨理惟精逆耳咈心必嘉乃誠順旨茍容亦察其情斥去姦庾全固忠貞先人立言為代作程諤諤者昌唯唯者傾繫以興亡曷云其輕承, WYG: 尸}
