  - {type: variant, offset: 2990, length: 266, content: 月賜宰臣及中書門下兩省官宴于故馬璘池亭御製豐年多慶九日示懷詩以賜群臣曰爽氣肅時令早衣聞朔鴻重陽有佳節具物欣年豐皎潔暮潭色芬敷新菊叢芳罇滿衢室繁吹凝煙空惠洽信吾道保和惟爾同推誠致玄化天下期為公又曰憲宗以天下無事留意典墳每覽前代興亡得失之事皆三復其言又讀貞觀開元實錄見太宗撰金鏡書及帝範上下篇玄宗撰開元訓誡思繼前躅遂採尚書春秋後傳史記班范漢書三國志晉書晏子春秋吳越春秋新序說苑等書君臣行事可為龜鏡者集成十四篇一曰君臣道可合二曰辨邪正三曰戒權倖四曰戒微行五曰任賢臣六曰納忠諫七曰慎征伐八曰慎刑法九曰去奢泰十曰崇節儉十一曰獎忠直十二曰修德政, SBCK: ''}
