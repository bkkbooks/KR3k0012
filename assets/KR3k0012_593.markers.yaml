  - {type: variant, offset: 4, length: 1, content: 製, WYG: 物於市市長追捕不得周景以尺一詔召司𨽻校尉佐雄偕詣臺與三日期擒賊曹植説灌均上事令曰孤前令寫灌均所上孤章三臺九府所奏事及詔書一通置之座隅孤欲朝夕諷詠以自警誡語林曰明帝凾封詔與庾公亮誤致於王公王公開詔末云勿使冶城公知導既視表荅曰伏讀明詔似不在臣臣開臣閉無有見者明帝甚愧數月不能見王公石虎鄴中記曰石虎詔書以五色紙著鳳雛口中䇿蔡邕獨斷曰䇿者簡也禮曰不備百文不書於簡其制長二尺短者半之其次一長一短兩編}
