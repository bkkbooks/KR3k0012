  - {type: variant, offset: 156, length: 1, content: 示, SBCK: 賔客朂子蒲時亦在焉宣王謂之曰尊君作封魏君䇿髙妙信不可及吾曾問仲宣亦以爲不如朝廷之士乃知朂作也誥尚書商書曰湯旣黜夏命復歸于亳作湯誥又周書曰武王崩三監及淮夷叛周公相成王將黜殷作大誥又曰成王旣伐管叔蔡叔以殷餘民封康叔作康誥又曰康王旣尸天子尸主也主天子正號遂誥諸侯作康王之誥李充翰林論曰誡誥施于弼違後周書曰蘇綽自有晉之季文章競爲浮華遂成風俗太祖欲革其弊因魏帝􅀕廟}
