  - {type: variant, offset: 2556, length: 299, content: 害積小成大事有隱而必見令既出而焉悔鼓鍾在宮聲聞于外浩然涉水朕未有艾將貞扆以虛心期盡忠而納誨在昔稷契實匡舜禹近茲魏徵佑我大祖君臣叶德混一區宇肆予寡昧獲纘丕緒臣哉鄰哉爾翼爾輔高秋始肅我武惟揚輟此禁衛殿于大邦戀聞方甚嘉言乃昌是規是諫金玉其相詞高理要入德知方總彼千慮備于八章宣父有言起予者商殷有盤銘周有欹器或誡以詞或警以事披圖演義發于爾志與全鏡而高懸將座右而同置人皆有初鮮慎厥終汝其夙夜明保朕躬無曰爾身在外而爾誠不通一言之應千里攸同導彼遐俗達余四聰華夷仰德時乃之功既往既來懷賢忡忡唱予和汝式示深衷又曰貞元中上賜群臣會宴于曲江上令中使劉希昂宣慰上賜詩曰令節曉澄霽四郊煙靄空天清白露潔菊散黃金叢寡德荷玄貺順時休, WYG: 憂何懼太平御覽卷五}
