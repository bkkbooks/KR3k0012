  - {type: variant, offset: 382, length: 516, content: 貞元六年春三月庚子百寮宴於曲江亭上賦詩以賜之曰歲閏節華晚眾芳繁暮春霽日天地晴元巳風景新禊飲傳舊俗古今歡此辰至樂在同和絲竹奚所陳薰琴是賞心姑射可凝神何必尚躭湎浮觴曲水濱又曰貞元七年秋七月癸酉上幸章敬寺賦詩序皇太子在侍進和兼題干壁百寮畢和以班列焉其後京兆尹薛玨請皇太子書上詩序刻石而填之以金又曰貞元九年春正月庚辰朔上御含元殿受朝賀禮畢上賦退朝觀軍仗歸營詩以示宰臣曰獻歲視元朔萬邦咸在庭端旒揖群后廻輩閱師貞分行左右出轉斾風雲生眷此戍旅節載嘉良士誠順時頒宴賞亦以助文經又曰貞元十年秋九月戊子以重陽日宴餞賜百寮追賞初九日以雨罷宴及是方會宴上賦詩以賜百官曰雨霽霜氣肅天高雲日明繁林已墜葉寒菊仍舒榮懿此秋節晚更延遐賞情池臺列廣宴絲竹傳新聲至樂非外獎浹歡同中誠庶敦朝野意永使風化清又曰德宗至自興元御宣政殿冊拜李晟為司徒上思晟勳力為製紀功碑俾皇太子勒于石立於渭橋與天地悠久方多不載又曰德宗以馬燧平河中詔賜上所撰宸扆台衡二銘并序曰朕每讀上古之事及唐虞之際君臣相得聖賢同時日夕孜孜講論至道或陳其鑒戒或諷以詠歌煥乎典謨百代之式有以見啟沃之道理化之端意甚慕之而未能逮也頃鹽節度杜希全著文上獻多所規陳聊為君臣箴用荅其意河東等道副元帥司徒燧固請勒石貽厥後人朕以文, WYG: 康王}
