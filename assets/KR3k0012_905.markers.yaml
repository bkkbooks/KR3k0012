  - {type: variant, offset: 53, length: 2, content: 四尺, WYG: 也志在麞麋豕鹿不在䑕也欲其取䑕也則桎之其鄰桎其後足狗遂取䑕又曰齊有好獵者不得獸欲須良狗家貧不能得乃還疾耕疾耕則家富家富則有良狗有良狗則數得獸也獵常過人覇王亦然又曰楚文王得如黄之狗宛路之矰以畋雲夢三月不返保申跪而笞王出而自沉於澗而死王乃殺狗折矰又曰鄭子楊之難猘狗潰之子楊鄭相逐猘狗春秋亦云齊髙固之難失牛潰之逐失牛如逐猘狗也當其時狗牛猶可以}
