  - {type: variant, offset: 1250, length: 2, content: 當獨, WYG: 皆為龍形復送符上山犬色更赤有長翰常随䢴子往來百餘年遂留山上時下來䕶其宗族蜀人立祠於穴口常有鼓吹傳呼聲捜神記曰山陽王瑚字孟璉為東海蘭陵令夜半時輙有黑幘白單衣吏詣縣扣閣近之則忽然不見如此數年後令伺之}
