  - {type: variant, offset: 9, length: 0, content: '', SBCK: 楊朱之弟曰布衣素衣而出天雨解素衣衣緇衣而反其狗迎而吠楊布怒將扑狗楊朱曰子無扑矣子亦猶是也向者使汝狗白而徃黒而來豈能無怪哉晏子春秋曰晏子短使楚楚人爲門於大門側延晏子晏子曰使狗國者從狗門入今使楚不當從此門入又曰景公走狗死公命外供之棺内給􅀕晏子諌不可公曰善韓子曰宋有酤者斗槩甚平遇客甚謹爲酒甚羙懸幟甚髙而酒不售遂致於酸問楊長倩長倩曰汝狗惡也孺子懷錢挈壷往酤輙有狗齧之猶大臣齕有道之士尸子曰齊有貧者命其狗爲富命其子爲樂方將􅀕狗入於室叱之曰富出祝曰不祥家果有禍長子死哭之曰樂乎而不息悲也隋巢子曰昔三苗大亂龍生于廟}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_SBCK_905-1b}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 楊朱之弟曰布衣素衣而出天雨解素衣衣緇衣而反其狗迎而吠楊布怒將朴狗楊朱曰子無朴矣子亦猶是也向者使汝狗白而徃黑而來豈能無怪哉晏子春秋曰晏子短使楚楚人為門於}
