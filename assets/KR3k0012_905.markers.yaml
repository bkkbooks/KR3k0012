  - {type: variant, offset: 2618, length: 2, content: 蜪音, SBCK: 鄱陽趙壽有犬蠱有陳岑家有黄犬六七群出吠岑後令伯婦與壽婦食吐血幾死屑桔梗飲之乃愈又曰東越門中有墉下北隰中有大虵長七八丈大十餘圍嘗八月送童女至虵穴輒吞之噉九女時樂縣李誕有小女名竒應募而行乃請好劒咋虵犬詣之至則放犬咋虵以劒擊之越王竒之娉以爲后續搜神記曰林慮山下有亭有過􅀫者或病或死常云有十餘人男女各雜衣或黒或白轉來爲害有劉伯夷者過􅀫明燭而坐誦經至中夜其怪復集伯夷宻以鏡照之乃一群狗也因陽以燭悞灼其衣作燃毛氣乃以刀刺之遂死餘大悉走去又曰晉穆哀之丗領軍司馬濟陽蔡詠家犬夜群相吠伺之見一狗着黄衣戴帢爲衆犬所吠打殺乃是詠家老黄犬又曰晉太和中廣陵人楊生養狗甚怜愛之行止與俱後生飲酒醉行經大澤草中眠不能動時冬月有野火起風又猛狗周章號喚生醉不􅁴前有一坑水狗便走徃眠水中還以身壓生左右草沾濕着地火㝷過去生方醒他日又闇行墮空井中犬呻吟徹曉湏􅁷有人逕過怪犬向井號徃視見生生曰君可出我當厚報君人問以何物見與生云唯君耳人曰以狗見與便相出生曰此狗曽活我於巳死不得相與任君人曰若氽便不成相出狗因下頭目井生知其意乃語路人以狗相與乃出之繫狗而去却後五日狗夜走還又曰㑹稽人張然滯役經年不歸婦遂與奴私通然飬一狗名曰烏龍後歸奴與婦欲謀殺然狗注精䑛脣視奴然烏龍與手應聲盪奴奴失刀仗然取刀殺奴也幽明録曰晉太興二年呉民華隆生獵飬一快犬号曰的尾常將自隨隆後至江邊伐荻犬暫出渚次隆爲大虵所圍繞周身犬還便咋虵虵死隆僵仆無所知犬彷徨涕泣走還舡復反草中伴怪所以隨徃見隆悶絶將歸家二日犬爲不食隆復􅂫乃始進飯隆愈愛惜同於親戚後忽失之二年尋求見在顯山嶺表録異曰嘗有人自青社泛海歸閩爲惡風所飄五日夜不知其幾千里也經一處同舡有新羅人云是狗國逡廵果如人躶形抱狗而出見舡驚走楚辤九辨曰豈不鬱}
