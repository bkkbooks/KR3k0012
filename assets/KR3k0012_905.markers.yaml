  - {type: variant, offset: 59, length: 0, content: '', SBCK: 家嫗死巳歛未葬忽起坐棺前牀上飲酒醉而狗形見殺之風俗通曰殺狗磔邑四門俗云狗别賔善守衛着以辟惡又曰太史公記云􅁗始皇殺狗磔四門以禦凶災今人殺白犬以血題門户曰正月白犬血辟除不祥又曰殺犬磔攘犬者金畜攘者却也抑金使不害也又曰桂陽太守汝南李叔堅少時爲從事在家狗如人立行家人言當殺犬叔堅云犬馬喻君子狗見人行効之何傷叔堅見縣令還解冠搨上狗戴持走家大驚堅復云悞觸冠冠纓挂着之耳狗於竈前畜火家益怪堅復云兒婢皆在田中狗助畜火狗何能作怪遂不肯殺後數日狗自􅁀死卒無纎芥之異叔堅辟太尉􅁺固陵長原武令終享大位金樓子曰入名山牽白犬抱白鶴山神大喜芝草及寳玉等自出又曰王思微性好浄㓗左右提衣悉令白紙裏手指在宅有犬汙柱思微令門生洗之意猶不巳更令刮削復言未足遂令易柱洞林曰楊州從事慎曜伯婦病困經日發作有時如聞物徃來者其兄周彦武令人作卦得蹇身在戊戍與坎􅀑并卦中當有從東北田家市黒狗畜之以代人任患死當有無幾時狗便死復更養如前凡三遇飬輙皆吐血而死婦病亦差雜五行書曰白犬虎文南斗君畜之可致萬石也黒犬白耳大王犬也畜之令冨貴黒犬白前兩足冝子孫白犬黄頭家大􅁻黃犬白尾代有衣冠黄犬白前兩足利人􅀇中記曰昔髙辛氏犬戎爲亂帝言曰有討之者妻以羙女封三百户帝之狗名槃瓠亡三月而殺犬戎以其首來帝以女妻之於㑹稽東南得海中􅁟三百里而封生男爲狗生女爲羙人封爲狗氏國于寳搜神記曰槃瓠者夲髙辛氏宫中老婦人有耳疾醫者挑治之有物大如繭以瓠離盛之以槃覆之有頃化爲犬其文五色因名槃瓠􅁗氏三􅁗記曰有白鹿原周平王時白鹿出此原原有狗枷堡􅁗襄公時有天狗來其下凡有賊天狗吠而護之一堡無患凉州異物志}
