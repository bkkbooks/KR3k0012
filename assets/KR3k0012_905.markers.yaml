  - {type: variant, offset: 1171, length: 1, content: 之, WYG: 思微性好淨潔}
  - {type: variant, offset: 1174, length: 0, content: '', WYG: 提衣悉令白紙裏手指在宅有犬汙柱思微令門生洗之意猶不已更令刮削復言未足遂令易柱洞林曰揚州従事慎曜伯婦病因經日發作有時如聞物徃来者其兄周彦武令吾作卦得蹇身在戊戌與坎鬼并卦中當往従東北田家市黑狗畜之以代人任患如其言無㡬時狗便死復更養如前凡三過養輙}
  - {type: variant, offset: 1175, length: 0, content: '', WYG: 吐血而死婦亦病死雜五行書曰白犬虎文南斗君畜之可致萬石也黑犬白耳大王犬也畜之令富貴黑犬白前兩足宜子孫白犬黄頭家大吉黄犬白尾代有衣冠黄犬白前兩足利人𤣥中記曰昔髙辛氏犬戎為亂帝言曰有討之者妻以美女封三百户帝之}
  - {type: page-break, offset: 1175, content: '', id: KR3k0012_WYG_905-6a, image: WYG0901/WYG0901-0080c.png}
  - {type: variant, offset: 1176, length: 0, content: '', WYG: 名槃瓠亡三月}
  - {type: variant, offset: 1177, length: 2, content: 冠魏, WYG: 殺犬戎以其首来帝妻以女流於會稽東南得海中土三千里封之生男為狗生女為美人封為狗氏國干寳捜神記曰槃瓠者本髙辛氏宫中老婦人有耳病醫者挑治之有物大如繭以瓠離盛之以槃覆之有頃化為犬其文五色因名槃瓠辛氏三秦記曰有白鹿原周平王時白鹿出此原原有狗枷堡秦襄公時有天狗来其上有賊天狗吠而䕶之一堡無患涼州異物}
