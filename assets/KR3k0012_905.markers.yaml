  - {type: variant, offset: 1256, length: 181, content: 而旁人不見也據六十一為侍中直內省歘見白狗問之眾人悉無見者於是遊觀田里飲宴自娛過期一年年六十三卒魏略曰丁溢外似踈濫而內明慧雖與何晏鄧颺等同列而皆少之唯聲勢屈於曹爽爽亦教之言無不從故于時謗書謂臺中三狗啀喍不可當一狗憑點作蛆囊三狗謂何鄧丁也點者爽小字也其意言三狗皆欲囓人而畜蛆也吳志曰孫峻謀誅諸葛恪恪將見之夜精爽擾動通夕不寢嚴畢趍出犬銜引其衣恪曰犬不欲我行乎還坐有頃乃, SBCK: 以供湯用母向子死處跳踊嘷呼倒地}
