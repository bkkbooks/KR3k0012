  - {type: variant, offset: 2610, length: 0, content: '', SBCK: 黃耳機往仕洛常將自隨此犬􅃛惠能解人語又常借人三百里外犬識路自還一日至家機羈官京師乆無家問機戯語犬曰我家絶無書信汝能賫書馳還取消息不犬喜揺尾作聲應之機試爲書盛以竹筒繫之犬頸犬出驛路疾走向呉飢入草噬肉取飽毎經大水輙依渡者弭耳掉尾向之其人怜愛因呼上舡載近岸犬即騰上速去如飛逕至機家口銜竹筒作聲示人機家開筒取書看畢犬又向人作聲如有所求其家作荅内竹筒中復繫犬頸犬旣得荅仍馳還洛計人程五旬而犬往還裁半後犬死殯之遣送還家葬機村南去機家二百歩築土爲墳村人呼爲黄耳冢異􅁐曰東海何澹之隆安􅀄屢入􅀜中後還得一犬壯大非常何每行來輙巳知處澹之後抱疾犬亦疾及其亡犬一噑而斃神仙傳曰李仲甫者能隱形􅀄隱百日一年復見形後遂長隱但聞其聲與人對接飲酒食如常有諸張欲從學甫云卿性急未中教張守之至費用五十疋了無所得張大怒乃懷上手而往先與仲甫語畢因依聲左右斫之甫巳在他牀􅀏云}
