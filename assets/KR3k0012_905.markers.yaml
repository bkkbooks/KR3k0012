  - {type: variant, offset: 1251, length: 3, content: 獨見一, krp: 柰何家殺犬明年並死又曰宋元徽中呉縣中都里石玄度家有黄狗生白雄子母愛其子異於常犬銜食飴之子成大狗子每出獵未反母輙門外望之玄度乆患氣嗽轉就危困毉爲處湯湏白犬胏市索卒不得乃殺所飬}
  - {type: variant, offset: 1254, length: 0, content: '', WYG: 老狗黑頭}
  - {type: variant, offset: 1255, length: 0, content: '', WYG: 軀至閣便為人以白孟璉殺之乃絶又曰鄱陽趙壽有犬蠱時陳岑詣壽忽有大黄犬六七羣出吠岑又曰東越閩中有庸嶺其隙中有大蛇長七八丈大十餘圍嘗八月送童女至蛇穴輙吞之噉九女時樂縣李誕有小女名寄應募而行乃請好劒及咋蛇犬詣之至則放犬咋蛇以劒擊之越王竒之聘以為后續捜神記曰林慮山下有亭每過宿者或病或死常云有十餘人男女合雜衣或黑或白蒲摶相戯有郅伯夷者過宿明燭而坐誦經至中夜其怪復集伯夷以燭照之乃羣狗也因陽以燭悞灼其衣作燃毛氣乃以刀刺之遂死餘犬悉走去又曰晉穆哀之世領軍司馬濟陽蔡詠家犬夜羣相吠伺之見一物着黄衣白帢為衆犬所吠打殺之乃詠家老黄犬又曰晉太和中廣陵楊生養狗甚憐愛之行止與俱後生飲酒醉行經大澤草中眠不能動時冬月有野火起風又猛狗周章號喚生醉不覺前有一坑狗便走徃水中還以身壓生左右草沾濕着地火尋過去生方醒他日又闇行墮空井中犬呻吟徹曉須臾有人遥過怪犬向井號徃視見生生曰君可出我當厚報君人問以何物見與生云唯君耳人曰以狗見與便相出生曰此狗曽活我於已死不得相與他物任君人曰若爾便不能相出狗因下頭目井生知其意乃語路人以狗相與乃出之繫}
