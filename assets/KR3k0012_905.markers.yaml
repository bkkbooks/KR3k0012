  - {type: variant, offset: 2613, length: 0, content: '', SBCK: 地叩頭乃止遂不教之列仙傳曰列子者自稱蜀人好放犬犬走入山穴列子隨十餘宿行度數百里出山頭上有殿屋官府松樹仙人吏使甚嚴見其故妻主江魚與列子一函藥發函魚子也着池中飬之一年皆爲龍列後送函上山犬色更赤有長翰常隨列往來百餘年遂留山上時時下護其宗族蜀人立祠於穴孔常有皷似傳呼聲搜神記曰山陽王瑚字孟璉爲東海蘭陵令夜半時輙有黒幘白單衣吏詣縣扣閣近之}
