  - {type: variant, offset: 1158, length: 1, content: 昌, WYG: 狂馬不觸於木猘狗不自投於河聾蟲不自䧟况人乎聾無知也淮南萬畢術曰取馬毛犬尾置之朋友夫妻衣中自相憎矣抱朴子曰陶犬無守夜之益瓦鷄無伺晨之警又曰甘始以駐年藥餌食新生鷄犬皆不長又以還白藥食白犬百日毛盡黒説苑曰梁相死恵子之梁渡河而遽墮船舡人救之問欲何之曰欲相梁船人曰子居舟楫之間而溺無我則死又安能相梁乎惠子曰居廣艘長􅀈之間我不如子至於安國家定社稷子何比我吾視子蒙蒙若未視之狗耳論衡曰亡獵犬於山林大呼犬名其犬則鳴號而應其主人犬異類聞呼而應者識其主也潛夫論曰一犬吠形百犬吠聲桓譚新論曰占仲子婢死有兒年四歳塟後數來撫循之亦能為兒浴頭其家人惡之以告方士方士有狗效之婢遂不復來又曰楊仲文家嫗死已歛未塟忽起坐棺前牀上飲酒醉而狗形見殺之風俗通曰殺狗磔}
  - {type: page-break, offset: 1158, content: '', id: KR3k0012_WYG_905-3b, image: WYG0901/WYG0901-0079b.png}
