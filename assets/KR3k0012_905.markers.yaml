  - {type: variant, offset: 1245, length: 3, content: 厄先此, WYG: 汝曹愚人學道未得而殺人也我寧可得殺我真得殺汝但癡頑不足問耳使主人呼一犬来着諸張前看能殺之否俄而犬頭在地犬腹已破叱諸張下地叩頭乃止遂不教之列仙傳曰䢴子者自稱蜀人好放犬走入山穴䢴子隨十餘宿行度數百里出山頭上有殿屋官府松樹仙人吏使甚嚴見其故妻主洗魚與䢴子符一函并藥便使還與成都令橋君發函皆魚子也養之}
