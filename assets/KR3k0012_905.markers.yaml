  - {type: variant, offset: 53, length: 0, content: '', SBCK: 也志在麞麋豕鹿不在䑕欲取其䑕也則桎之其鄰桎其後足則狗取䑕又曰齊有好獵者不得獸欲湏良狗家貧不能得乃還疾耕疾耕則家富家富則有良狗有良狗則數得獸也獵常過人霸王亦然又曰荆王得茹黄之狗宛路之繒以畋雲夢三月不返保申跪而笞王出而自沉於澗而死王乃殺狗拆繒又曰鄭子陽之難猘狗潰之子陽鄭伯逐猘狗春秋亦去齊髙固之難失牛潰之逐失牛如逐猘狗也當其時狗牛猶可以爲人倡而况夫以人爲倡乎飢馬􅄹厩嗼然嗼無聲也未見蒭也飢狗􅄹宫嗼然未見骨也見骨與芻動則不可禁淮南子曰削薄其德曽累其形而欲以爲治無以異於執彈而來鳥䄂梲而狎犬也稅仗也又曰馬之死也剥之􅀂橐槖治橐也雖含氣而形不能摇狡狗之死也割之猶蠕狡少也蠕動也又曰狂馬不觸於木猘狗不自􅄬於河聾蟲不自䧟况人乎聾無知也淮南萬畢術曰取馬毛犬尾置朋友夫妻衣中自相憎矣抱朴子曰陶犬無守夜之益瓦鷄無同晨之警又曰甘始以駐年藥餌食新生雞犬皆不長食白犬則毛黒􅀃􅁐曰梁相死惠子之梁渡河而遽墮舡舡人救之問欲何之曰欲相梁舡人曰子居舟擑之間而溺無我則死又安能相梁乎惠子曰居廣長艥之間我不如子至於安國家全社稷子不比我吾視子蒙蒙若未視之狗子耳論衡曰亡獵犬於山林大呼犬名其犬則鳴號而應其主人犬異􅀋聞呼而應者識其主也潜夫論曰一犬吠形百犬吠聲桓譚新論曰占仲子婢死有兒年}
