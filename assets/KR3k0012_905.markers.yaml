  - {type: variant, offset: 2839, length: 331, content: 兔極於前犬疲於後犬兔俱罷各死其處田父見之無勞倦之苦而擅其功今齊魏久相持頓其兵疲甚眾臣恐強秦大楚承其後而有田父之功齊王懼謝將休士說苑同也春秋後語曰貂勃常惡田單曰安平君小人也安平君聞之故為酒而召貂勃曰單何以得罪於先生常見惡貂勃曰然跖之狗吠堯非貴跖而賤堯狗自吠非其主也且公孫子賢而徐子不肖然而公孫子與徐子鬭徐之狗攫公孫子之腓而噬之獸以足曰攫攫音居縛切腓腨腸也音肥噬囓也若乃得去不肖為賢者狗豈特攫而噬之哉安平君曰敬聞命矣明日單住之於王漢武故事曰公孫卿至東萊云見一人長五丈自稱巨公牽一黃犬把一黃雀欲謁天子因忽不見東方朔別傳曰天下之良馬將以捕鼠深宮之中曾不如跛犬也西京雜記曰楊萬年有獵狗名青骹賣直百金又曰茂陵少年李亭好馳駿狗逐獸或以鷹鷂兔皆以為佳名狗則有脩毫釐睫白望青曹之名, SBCK: ''}
