  - {type: variant, offset: 1613, length: 919, content: 然有白龍者凶徵至矣後庾冰子蘊為廣州刺史其妾產犬子不令蘊知狗轉長大蘊入見狗眉目分明而異形於眾後失所在蘊慨然曰殆白龍乎後為桓氏所滅又藝術傳曰嚴卿會稽人也善卜筮鄉人魏序欲暫東行荒年多抄盜令卿筮之卿筮曰君慎勿東行必遭暴害之氣而非劫也宜有以穰之可索西郭外獨母家白雄狗繫著舩前求索正得駮狗卿曰其色不純當有小毒正及六畜爾無復憂序行半路狗忽有聲甚急如被人擊比視已死吐黑血斗餘其夕序墅上白鵝數頭無故自死而家無恙後魏書蠻夷傳云獠性同禽獸若殺其父求得一狗以謝其母不懷嫌恨又以大狗一頭買一生口北史曰齊南陽王綽始十餘歲留守晉陽愛波斯狗尉破胡諫之綽歘然斫殺數狗狼籍在地破胡驚走不敢復言後有婦人抱兒在路走避入草綽奪其兒飼波斯狗婦人號哭綽怒又縱狗使食狗不食塗以兒血乃食焉後周書曰張元琮性仁孝村陌有狗子為人所棄者元見即收而養之其叔父怒曰何用此為將欲更棄之元對曰有生之類莫不重其性命若天生殺自然之理今為人所棄而死非其道也若而不收養無仁心也是以收而養之叔父感其言遂許焉未幾乃有狗母衘一死兔置元前而去三國典略曰齊高緯以波斯狗為赤虎儀同逍遙郡君常於馬上設蹬褥以抱之鬭鷄亦號為開府馬皆籍以氈罽被以金玉號為蛟龍儀同其將合牝壯則設青盧黼帳牢具過於諸王婚禮齊主常親視焉又曰齊廣寧王孝珩嘗畜一犬守外人不得趣近孝珩每射令其取箭亦解呼召左右牽衣而進又曰徐之才嘗與朝士出遊望郡犬並走諸人令目之之才應聲曰為是宋鵲為是韓盧為逐李斯東走為負帝女南徂陳書曰張彪敗後與妻楊氏去唯常所養一犬黃倉在彪前後未曾捨離乃還入若邪山中沈泰說陳文帝遣章昭達領千兵重購之并圖其妻彪眠未覺黃倉驚吠劫來便噬一人中喉即死及彪被害黃倉嗥叫宛轉血中唐書曰貞觀中彌泥孰可汗李思摩部落濟河於故定襄城為牙帳戶三萬勝兵四萬馬九萬疋思摩之初建也詔錫其土南至大河北有白道川而白道收田處龍荒之最突厥咸競其利思摩以北接延陁種落初集其力尚微未敢北徙至是始還其國因上言曰非分蒙恩立為落長實望子孫竭誠奉國作國家一狗北門守吠若延陁侵逼請家口徙入長城詔許之郭頒魏晉世語曰郊天壇下有白狗高三尺光色鮮明恒臥見人則去周書曰渠溲大者露犬也能飛食虎豹春秋考異郵曰七九六一三陽氣通故斗運狗三月而生宋均注曰狗斗精之所生也又曰狗三月而生陽至於三故狗各高三尺穆天子傳曰𪃫韓之人, SBCK: 客}
