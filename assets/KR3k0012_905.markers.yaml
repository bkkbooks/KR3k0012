  - {type: variant, offset: 132, length: 708, content: 不止也獒犬如人心可使也狾居世切狂犬也狄亦犬也又曰狡少狗也匈奴有狡犬巨口而黑身呂忱字林曰獹韓良犬也㹱音鵲宋良犬也𤜵五見切逐虎犬也何承天纂文曰守犬為獖扶本切隴西以犬為猶酉㺜乃切𣭠乃居切㲰乃庾切皆多毛犬也獟五校切猘居例切也䂏音彫屈尾犬也廣雅曰殷虞晉獒楚茹黃韓盧宋鵲並犬屬廣志曰狗有懸蹄短尾之號古今注曰狗一名黃羊易說卦曰艮為狗詩國風盧令曰盧令令其人美且仁盧田犬令令纓環聲盧重環其人美且鬈又國風野有死麕曰無撼我悅兮無使尨也吠尨狗也禮記曲禮曰馬效羊者右牽之效犬者左牽之又曲禮曰凡祭祀犬曰羹獻又內則曰狗赤服而躁臊又檀弓曰仲尼之畜狗死使子貢埋之曰吾聞之獘帷不棄為埋馬也獘蓋不棄為埋狗也丘也貧無蓋於其封也亦與之席無使其首陷焉封當為窆陷謂浸於土尚書洪範曰西旅獻獒西戎遠國貢大犬太保作旅獒召公也左傳宣上曰晉侯飲趙盾酒伏甲將攻之其右提彌明知之趍登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫敖焉明搏而殺之盾曰棄人用犬雖猛何為又襄三曰國人逐瘈狗瘈狗入於華臣氏國人從之華臣懼遂奔陳又昭六曰二十三年遂取邾師獲鉏弱地邾人愬于晉晉人來討叔孫婼如晉乃館諸箕使人與叔孫居於箕者請其吠狗弗與及將歸殺而與之食示下愛公羊宣公曰靈公食趙盾公曰聞子劍利以示我盾將起進劍彌明曰何故拔劍於公所盾知之躇階而走躇猶超遽不暇以次公有周狗可與比周所指如意謂之獒而屬之獒亦躇階從彌明逆而踆之以足逆蹋之曰踆絕頷趙盾顧曰君之獒不若臣之獒也史記淮陰傳云高祖詔齊捕蒯通通至上曰若教淮陰侯反乎對曰然臣固教之跖狗吠堯堯非不仁固吠非其主當是時臣獨知韓信非知陛下也又徐偃王志云徐君宮人任娠而產卵以為不祥棄於水邊孤獨老母有犬名鵠倉獵於水濱得所棄卵銜以來歸獨母以為異覆煖之遂𧉸蝍成小兒生時正偃故以為名徐君宮, SBCK: 雲}
