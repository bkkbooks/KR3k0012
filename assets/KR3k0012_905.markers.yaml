  - {type: variant, offset: 1160, length: 1, content: 王, WYG: 四門俗云罽賔犬善守衛著以辟惡又曰太史公記云秦始殺狗磔四門以禦蟲災今人殺白犬以血題門戸曰正月白犬血辟除不祥又曰殺犬磔禳犬者金畜也禳者却也却金使不害也又曰桂陽太守汝南李叔堅少時為従事在家狗如人立行家人言當殺犬叔堅云犬馬喻君子狗}
  - {type: variant, offset: 1162, length: 0, content: '', WYG: 人行傚之何傷堅見縣令還解冠榻上}
  - {type: page-break, offset: 1162, content: '', id: KR3k0012_WYG_905-5a, image: WYG0901/WYG0901-0080a.png}
  - {type: variant, offset: 1163, length: 0, content: '', WYG: 戴持走家大驚堅復云悞觸}
  - {type: variant, offset: 1164, length: 1, content: 方, WYG: 冠纓挂着之耳狗於灶前助火家益怔營堅復云兒婢皆在田中狗為助火幸可不煩類若此有何惡語相罵不言無狗怪耶狗何能作怪遂不肯殺後數日狗自暴死卒無􅊏芥之異叔堅辟太尉掾固陵長原武令終享大位金樓子曰入名}
  - {type: variant, offset: 1166, length: 3, content: 冠龔遂, WYG: 牽白犬抱白鶴山神大喜芝草及寳玉等自出又}
