  - {type: variant, offset: 1686, length: 0, content: '', WYG: 張然滯役經年不歸婦遂與奴私通然養一狗名曰烏龍後歸奴與婦謀欲殺然狗注精䑛脣視奴咋其隂奴失刀杖倒地然因殺奴以婦付縣殺之幽明録曰晋太興二年呉民華隆生好獵養一快犬號曰的尾常將自隨隆後至江邉伐荻暫出渚次為大蛇圍繞周身犬還便咋蛇蛇死隆僵仆無所知犬徬徨涕泣走還船復反草中同伴怪所以随徃見隆悶絶將歸家二日犬為不食隆復蘇乃始進飯隆逾愛惜之同於親戚後忽失之二年尋見犬在顯山嶺表録異曰常有人自青社泛海歸閩為惡風所飄五日夜不知其㡬千里}
