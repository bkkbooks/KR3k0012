  - {type: variant, offset: 2212, length: 427, content: 與妻楊氏去唯常所養一犬黃倉在彪前後未曾捨離乃還入若邪山中沈泰說陳文帝遣章昭達領千兵重購之并圖其妻彪眠未覺黃倉驚吠劫來便噬一人中喉即死及彪被害黃倉嗥叫宛轉血中唐書曰貞觀中彌泥孰可汗李思摩部落濟河於故定襄城為牙帳戶三萬勝兵四萬馬九萬疋思摩之初建也詔錫其土南至大河北有白道川而白道收田處龍荒之最突厥咸競其利思摩以北接延陁種落初集其力尚微未敢北徙至是始還其國因上言曰非分蒙恩立為落長實望子孫竭誠奉國作國家一狗北門守吠若延陁侵逼請家口徙入長城詔許之郭頒魏晉世語曰郊天壇下有白狗高三尺光色鮮明恒臥見人則去周書曰渠溲大者露犬也能飛食虎豹春秋考異郵曰七九六一三陽氣通故斗運狗三月而生宋均注曰狗斗精之所生也又曰狗三月而生陽至於三故狗各高三尺穆天子傳曰𪃫韓之人獻天子良犬七十𪃫之然切又曰天子之狗走百里執虎豹山海經曰陰山有獸焉其狀如狸白首其名天狗又曰犬戎國黃帝之後弄明生白犬二頭自為牝牡故為此國也又曰金門之山有赤犬名曰天犬下則有兵又曰蜪音陶犬如犬而青食人從首始白澤圖曰黑狗白頭, WYG: 豐顱促}
