  - {type: variant, offset: 1822, length: 271, content: 殺其父求得一狗以謝其母不懷嫌恨又以大狗一頭買一生口北史曰齊南陽王綽始十餘歲留守晉陽愛波斯狗尉破胡諫之綽歘然斫殺數狗狼籍在地破胡驚走不敢復言後有婦人抱兒在路走避入草綽奪其兒飼波斯狗婦人號哭綽怒又縱狗使食狗不食塗以兒血乃食焉後周書曰張元琮性仁孝村陌有狗子為人所棄者元見即收而養之其叔父怒曰何用此為將欲更棄之元對曰有生之類莫不重其性命若天生殺自然之理今為人所棄而死非其道也若而不收養無仁心也是以收而養之叔父感其言遂許焉未幾乃有狗母衘一死兔置元前而去三國典略曰齊高緯以波斯狗為赤虎儀同逍遙郡君常於馬上設蹬褥以抱之鬭鷄亦號為開府馬皆籍以氈罽被以金玉號為, WYG: ''}
