  - {type: variant, offset: 1232, length: 1, content: 璩, WYG: 之機試為書盛以竹筒繫之犬項犬出驛路疾走向吳飢入草噬草取飽每經大水輙依渡者掉尾向之其人憐愛因呼上船裁近岸犬即騰上速去如飛逕至機家口銜竹筒作聲示人機家開筒取書看畢犬又向人作聲如有所求其家作答仍馳還洛計人程五旬而犬往還纔半月後犬死殯之遣送還家葬機村南去機家二百歩築土為墳村人呼為黄耳塜異苑曰東海何澹之隆安初屢入闗中後還得一犬犬壯非常每行来輙已知處澹之後抱疾犬亦疾及其亡也犬一嘷而斃神仙傳曰李仲甫者能隱形初隱百日一年復見形後遂長隱但聞其聲與人對接酒食如常有諸張欲従學甫}
  - {type: page-break, offset: 1232, content: '', id: KR3k0012_WYG_905-8b, image: WYG0901/WYG0901-0081d.png}
