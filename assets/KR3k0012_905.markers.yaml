  - {type: variant, offset: 1225, length: 10, content: 建平善相術謂應璩云君, SBCK: 休之家犬歌曰言我不能歌聽我歌梅花今}
  - {type: variant, offset: 1225, length: 6, content: 建平善相術謂, WYG: 休之家犬歌曰言我不能歌聼我歌梅花今年故復可明年當奈何家殺犬明年並死又曰宋元嘉中吳縣中都里石元度家有黄犬生白雄子母愛其子異於他犬常銜食飼之子成大狗子每出獵未反母輙門外望之元度久患病𠻳轉就危困醫為處湯須白犬肝市索卒不得乃殺所養白狗以供湯用母向子死處跳踊嘷呼倒地不起累日不息其家煮狗肉與客共食投骨於地母輙啣置窟中食畢移入後園大桑樹下掘土埋之日向樹嘷喚月餘乃止元度漸劇臨死屢言湯不救命悔恨殺狗其弟法度従此終身不食狗肉又曰陸機少時頗好遊獵在呉豪盛客獻快犬名曰黄耳機往仕洛常將自隨此犬黠慧能解人語又嘗借人三百里外犬識路自還一日至家機覊官京師久無家問機􅃧語犬曰我家絶無書信汝能賫書馳探消息否犬喜揺尾作聲}
