  - {type: variant, offset: 841, length: 381, content: 聞之乃更錄取收養長而仁知襲君徐國後鵠倉臨死更生角而九尾實黃龍也偃王莽之徐梁界中今見有狗壟云又曰范蠡之齊遺大夫種書蜚鳥盡良弓藏狡兔死走狗烹又曰范睢說秦昭王曰夫以秦而治諸侯譬若縱韓廬而博蹇兔也閉關十五年不敢窺兵於山東者是穰侯不忠而大王之計有所失也漢書五行志曰文帝後五年六月齊雍城門外有狗生角又曰成帝河平元年長安男子石良劉晉相與同居有如人狀在其室中擊之為狗走復至數人被甲持弓至良家擊之或傷皆狗也自二月至六月乃止其於洪範皆犬禍也後漢書曰岑熙為魏太守無為而化視事二年輿人歌之曰我有枳棘岑君伐之我有蝥賊岑君遏之吠狗不驚足下生氂又曰靈帝於西園弄狗著進賢冠帶綬續漢書曰靈帝寵用便嬖弟子轉相汲引賣關內侯直五百萬令長強者貪如豺狼弱者略不類物實狗而冠也又曰昌邑王見狗冠方山冠龔遂曰王之左右皆狗而冠魏志曰太祖云我有丁斐猶人家有盜狗善捕鼠雖小損而完囊儲又曰公孫淵未亡家數有怪犬冠幘綘衣上臺, SBCK: ''}
