  - {type: variant, offset: 2642, length: 196, content: 尾龍也國語曰趙簡子田于螻晉君之囿史黯聞之以犬待於門晉太史史黯也簡子見之何為曰有所得大欲試之茲囿簡子曰何以不告對曰君行臣不從為不順譏簡子曰獵君囿不從君而自行也主將適螻而麓弗聞麓主君苑囿之官傳曰山林之木衡麓守之臣敢煩當日當日謂直日者也主將之君囿不煩麓以告君臣亦不敢煩主之直日以自白也簡子乃還覺所譏也戰國策曰齊欲伐魏淳於髡謂齊王曰韓子盧者天下之壯犬也東郭逡者海內之狡兔也韓子盧逐東郭逡環山者三勝山者, SBCK: 第九百}
