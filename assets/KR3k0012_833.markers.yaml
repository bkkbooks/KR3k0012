  - {type: variant, offset: 3846, length: 9, content: 鳥息隱蔡邕月令章句, SBCK: 致命于先生而委國政焉宋勝子矍然而頋謂使者}
  - {type: variant, offset: 3846, length: 5, content: 鳥息隱蔡邕, WYG: 致命于先生而委國政焉宋勝子矍然而顧謂使者曰是何言歟今漢王待四海之士與十羣之羊其於職司也奚以異乎而大王廢牧羊之任委以四海之政是錯亂天位倒置人倫勝不願為也乃逃於隂山之陽公孫尼子曰舜牧羊於潢陽還堯舉為天子説文曰羌西戎牧羊人也字從羊人列仙𫝊曰商丘子瑕吹笙牧豕七十不娶妻而死呉越春秋曰婁門外雞墟者呉王牧雞處陳武别𫝊曰武休屠呉人也嘗騎驢牧羊諸家牧竪十數人或有和歌者武遂學太山梁父吟及行路難之屬也漁説文曰漁捕魚也周禮天官上曰􅈄人掌以時􅈄為梁}
