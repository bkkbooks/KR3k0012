  - {type: variant, offset: 744, length: 959, content: 趙王獵耳非為寇也復愽如故王恐心不在愽居有頃復從北方傳言趙王獵耳非為寇也王大驚曰公子何以知之對曰臣之客有能探趙王陰謀者趙王所為客輒以報臣臣以此知之六韜曰文王畋于渭陽見呂尚坐弟以漁太公金匱曰紂常以六月獵於西土發人逐禽民諫曰天務覆施地務長養今盛夏發民逐禽而元元命懸於野民踐之百日不食紂以為妖殺之新序曰晉文公出田逐獸碭入大澤迷不知所為漁者送文公出澤漁者曰鴻鵠乃保大海之中厭而徙之小澤則必有矢矰之憂黿保於深淵厭而出之淺渚則必有羅網之憂今君逐獸碭入至此何行之太遠也君歸國臣亦反漁所又曰晉文逐鹿而失之問農夫老者曰吾鹿何在老者以足指曰如是行往公曰寡人問子子以足指何也老者振衣而起曰不意人君至此虎豹之居也厭閑而得近故人得之魚鱉之居也厭深而得淺故人亦得之諸侯厭眾而亡其國唯鵲有巢唯鳩居之今君不歸人將居之於是文公恐而歸新序曰晉文公畋於虢還見一老問曰虢亡何也對曰虢君斷則不能用人也文公輟畋而歸趙襄子曰其人安在公曰吾與來襄子曰君聽其言不用其身文公乃召賞之說苑曰楚莊王獵大夫諫之王曰吾就獵求士也榛薄刺虎知其勇也搏犀獲兕知其勁也罷畋而分所得知其仁也由此道行三士可乎又曰晉平公有馳逐之車錯以羽芝會群臣觀焉田差三過不顧白虎通曰王者諸侯所以田狩者何也為田除害上以供宗廟下以簡集士眾也蔡邕月令章句曰季秋之月天子乃教于田獵閑肆五兵因以順時取禽其禮將軍執晉鼓師率執提旅率執鼙以教坐作進退徐疾之節璅語曰范獻子卜獵占之曰君子得黿小人遺寇獻子獵無所得而遺其冠潛夫論曰昔有司原氏獵於中野鹿東奔司原從而譟之西方之眾有逐狶者聞司原之譟竟舉音而和之司原反覆追之乃得大狶喜以為瑞陸子曰欲水之清則勿涉欲草之茂則勿獵杜夷幽求曰獵者嗜肉不多於不獵及其陵岡巒赴溪嶺而有遺身之志語林曰夏少明在東國不知名聞裴逸民知人乃裹糧寄載入洛從之未至家少許見一人著黃皮袴褶乘馬將獵問曰裴逸民家遠近荅曰君何以問夏曰聞其名知人故從會稽來投之裴曰身是逸民君明可更來明往逸民果知之用為西明門候於此遂知名也石勒別傳曰冬十一月大雪平地三尺勒主簿程朗諫勒不從出獵墜馬顧左右曰不從主簿之言而致墜馬賜朗絹百疋以旌忠亮續搜神記曰晉中興後譙郡周子文家在晉陵少時喜射獵嘗入山忽山岫間見一人長五丈許提弓箭箭鏑頭廣二尺許白如霜雪忽出喚曰阿鼠阿鼠子文小字子文不覺應曰諾此人牽弓滿鏑向子文子文便失魂厭伏又曰吳末臨海人入山射獵為舍住夜, SBCK: ''}
