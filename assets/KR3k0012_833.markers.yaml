  - {type: variant, offset: 3832, length: 0, content: '', WYG: 薛縣人也家貧牧豕海上年四十餘乃學春秋雜説漢書曰衞青字仲卿初為侯家人少時歸其父使牧羊民母之子皆奴畜之又曰卜式河南人也以田畜為事入山牧十餘年羊致千餘頭上召之曰吾有羊在上林中欲令子牧之式乃布衣草屩而牧羊歲餘羊肥息又曰王尊字子貢涿郡高陽人少孤歸諸父使尊牧羊於澤中後漢書曰馬援轉遊隴漢間常謂賔客曰丈夫為志窮當益堅老當益壯因處田牧至有牛馬羊數千頭穀數萬斛既而嘆曰凡殖貨財産貴其能賑施也否則守錢虜耳仍盡數以班昆弟故舊身衣羊裘皮袴又曰承宫年八嵗為人牧豬鄉里徐子盛明春秋授諸生數百人宫過其廬下見諸生講好因亡其豬豬主欲以笞之諸生共禁止因留之謝承後漢書曰孫期字仲式事母至孝牧豕於大澤中賣之以奉供養逺人從其學者皆執經追於澤畔范􅁮後漢書曰梁鴻字伯鸞扶風平陵人也家貧牧豕上林苑中曽誤遺失火延燒及他舍鴻乃尋訪燒者問所失去悉以豕償之其主猶以為少隣家耆老見鴻非常人乃共責讓主人於是始敬異焉悉還豕鴻不受魏志曰楊俊字季才避地幷州同郡王象少孤特為人僕𨽻年十七八見使牧羊而私讀書用獲箠楚俊嘉美其才質即贖象着家聘娶立屋然後與别也晉書曰張華字茂先少家貧常以牧羊為事三十國春秋曰沮渠䝉遜其先世為匃奴在沮渠因以官為氏少牧羊卧息田畔忽見沙}
