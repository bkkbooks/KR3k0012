  - {type: variant, offset: 3997, length: 2, content: 羿繳, WYG: 水處者漁山處者牧事宜其械械宜其人吕氏春秋曰雍季對晉文公曰竭澤而漁豈不獲得而明年無魚矣家語曰宓子賤治單父三年孔子使巫馬期往觀政焉期隂免衣弊裘入界見漁得魚輙捨之期問焉曰凡漁者為得也何以得魚却舍之曰魚之}
  - {type: page-break, offset: 3997, content: '', id: KR3k0012_WYG_833-16a, image: WYG0900/WYG0900-0376c.png}
  - {type: variant, offset: 4000, length: 0, content: '', WYG: 者名為䲖吾大夫愛之其小者名為鱦鱄為鱣新序作鮹鱦者魚之懷任也吾大夫欲長之是以得二者輙捨之期返告孔子曰宓子之德至矣使民暗行若有嚴刑於旁也期問宓子何行而得於此子曰吾嘗與之言曰誠於此者刑於彼宓子盖行此術於單父也又曰孔子之楚有漁者獻魚焉孔子不受漁者曰天暑市逺無處鬻焉思欲棄之糞壤不若獻之君子故取以進之於是夫子再拜而受之使弟子掃地將以祭享焉門人曰彼將棄之矣而夫子祭之何也夫子曰吾聞惜其腐餘欲以務施者仁之偶也惡有受仁人之饋而無祭者乎劉向新序曰楚人有獻餘魚於王者曰今日獲魚食之不盡賣之不售棄之可惜故來獻王也楚王曰漁者仁人也境内多貧寡人聞之未能行漁者知之以此教寡人也乃出倉粟去後宫以妻寡夫郭璞江賦曰蘆人漁子擯落江山衣則羽褐食惟蔬鱻忽忘夕而宵歸詠採菱以扣舷傲自足於一嘔尋}
