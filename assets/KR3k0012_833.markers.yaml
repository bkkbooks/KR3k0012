  - {type: variant, offset: 3856, length: 3, content: 奄飛禽, SBCK: 是何言歟今漢王待四海之士與十羣之羊其於職司也奚以異乎而大王廢牧羊之任委以四海之政是錯亂天位倒置人倫勝不願爲也乃逃于隂山之陽公孫尼子}
  - {type: variant, offset: 3856, length: 3, content: 奄飛禽, WYG: 敝笱在梁春獻王鮪王鮪鮪之大者辨魚物為鱻薧以供王膳羞鮮生也薧乾也凡祭祀賔客喪紀共其魚之鱻薧凡􅈄者掌其政令凡􅈄征入玉府鄭司農云漁征漁者之租稅也漁人主収之而入于玉府禮記月令季冬}
  - {type: variant, offset: 3856, length: 3, content: 奄飛禽, krp: 是何言歟今漢王待四海之士與十羣之羊其於職司也奚以異乎而大王廢牧羊之任委以四海之政是錯亂天位倒置人倫勝不願爲也乃逃于隂山之陽公孫尼子}
