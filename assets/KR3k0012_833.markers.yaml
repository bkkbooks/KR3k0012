  - {type: variant, offset: 3836, length: 3, content: 網小柄, SBCK: 尔後當王此土不乆苦焉言終而滅崔鴻前趙録曰李景字延祐少貧見養叔父常使牧羊景見其叔子講誦羡之後從􅀶士乞得百餘字牧羊之睱折草木書之叔乃誤曰吾家千里駒也而令騏驎乆躓塩坂乃爲娶妻教學又曰姜宇天水兾北人也少孤貧爲河北陳不識家牧羊年十五身}
  - {type: variant, offset: 3836, length: 3, content: 網小柄, WYG: 爾後當王此土不乆苦焉言終而滅崔鴻前趙録曰李景字延祐少貧見養叔父常使牧羊景見其叔子講誦羨之後從博士乞得百餘字牧羊之暇折草木書之叔乃悟曰吾家千里駒也而令麒麟乆躓鹽坂乃為娶妻教學又曰姜宇天水冀北人也少孤貧為河北陳不識家牧羊年十五六身}
  - {type: page-break, offset: 3836, content: '', id: KR3k0012_WYG_833-12b, image: WYG0900/WYG0900-0374d.png}
  - {type: variant, offset: 3836, length: 3, content: 網小柄, krp: 尔後當王此土不乆苦焉言終而滅崔鴻前趙録曰李景字延祐少貧見養叔父常使牧羊景見其叔子講誦羡之後從博士乞得百餘字牧羊之睱折草木書之叔乃誤曰吾家千里駒也而令騏驎乆躓塩坂乃爲娶妻教學又曰姜宇天水兾北人也少孤貧爲河北陳不識家牧羊年十五身}
  - {type: variant, offset: 3840, length: 0, content: '', SBCK: 七尺九寸聦惠美風儀不識竒之妻之以女後魏書曰游明根字志逺㓜年遭亂爲櫟陽王氏奴主使牧羊明根以漿倩人書字路邊書地學之長安鎭將竇瑾見之呼問知其姓名乃告游雅使人贖之列子曰楊朱見梁惠王言治天下猶運諸掌王曰先王有一妻一妾而不能治言天下何也對曰君見夫牧羊者乎百羊爲羣使五尺童子荷箠而隨之欲東而東欲西而西使尭牽一羊舜荷箠而隨之則不能矣符子曰漢王聞宋勝子方牧羊于巨澤鼓而歌南風之詩使者進}
  - {type: page-break, offset: 3840, content: '', id: KR3k0012_SBCK_833-8a}
  - {type: variant, offset: 3840, length: 0, content: '', WYG: 七尺九寸聰惠美風儀不識竒之乃以女妻之後魏書曰游明根字志逺㓜年遭亂為櫟陽王氏奴主使牧羊明根以漿倩人書字路邊書地學之長安鎮將竇瑾見之呼問之其姓名乃告游雅使人續之列子曰楊朱見梁惠王言治天下猶運諸掌王曰先生有一妻一妾而不能治言天下何也對曰君見夫牧羊者乎百羊為羣使五尺童子荷箠而隨之欲東而東欲西而西使堯牽一羊舜荷箠而隨之則不能矣符子曰漢王聞宋勝子方牧牛于巨澤鼓而歌南風之詩使者進}
