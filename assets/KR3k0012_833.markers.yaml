  - {type: variant, offset: 3951, length: 1, content: 赤, SBCK: 啇丘子瑕吹笙牧豕七十不娶妻而死呉越春秋曰婁門外雞墟者呉王牧雞處陳武別傳曰武休屠胡人也常􅀐驢牧羊諸家牧竪十數人或有和歌者武遂學太山梁父吟及行路難之属也漁􅀃文曰漁捕魚也周禮天官上曰􅘋人掌以時􅈄爲梁月令季冬命漁師爲梁鄭司農云梁水偃也偃水爲􅀜空以笱承其空詩日敝笱在梁春獻王鮪王鮪鮪之大者辨魚物爲鱻薧以共王膳羞鮮生也薧乾也凡􅀕祀賔客䘮紀共其魚之鱻薧凡􅈄者掌其政令凡􅈄征入于玉府鄭司農云漁征魚者之租稅漁人主収之入千王府禮記月令季冬曰命有司始漁天子親徃甞魚先薦寢廟天子親徃視魚非常事重之此時魚潔美又坊記曰故君子仕則不稼田則不漁左傳隱公曰公}
