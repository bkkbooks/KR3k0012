  - {type: variant, offset: 2724, length: 356, content: 又曰恒公弋在廩管仲朝公弛弓脫靬音汗而迎之曰今夫鴻鵠春北而秋南而不失其時唯有羽翼以通其意於天下也今孤之不得意於天下皆非二子之憂也二子不對列子曰蒲且子之弋弱弓纖繳乘風振之連雙鶬於青雲之際用心專也韓子曰田子方問唐易鞠曰弋者何慎對曰鳥以數百目視子子以二目御之子謹周子廩田子方曰善子加之弋我家之國鄭長者聞之曰子方知欲為廩而未得所以為廩夫虛無見者廩也一日齊宣王問弋於唐易子曰弋者奚貴唐易子曰在於謹廩王曰何謂謹廩對曰鳥以數十目視人人以二目視鳥柰何其不謹廩也故曰在於謹廩然則為天下何以為此廩今人主以二目視一國一國以萬目視人主將何以自為謹廩乎又曰衛人有佐弋者鳥至因先以捲麾之鳥驚而不可得也又曰夫弩弱而矰高者激於風也身不肖而令行者得助於眾也韓子曰齊宣王問匡倩曰儒者弋乎匡倩對曰不曰何也弋者從下害於上者也是從下傷君也儒者以為害義故不弋, SBCK: ''}
