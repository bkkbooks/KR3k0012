  - {type: variant, offset: 660, length: 0, content: '', SBCK: 夫舜遇堯天也舜耕於歴山陶於河濵釣於雷澤天下恱之列仙傳曰寗封子者黄帝時人爲黄帝陶正有人過之爲其掌火能出入五色煙乆則以教封子積火自燒而隨煙氣上下視其􅁅燼猶有骨時人葬之北山中謂之寗封子焉嶺表異録曰廣州陶家皆作土鍋鑊燒熟以土油之其潔浄則愈於鐡器尤冝煑藥一斗者􅂊直十錢愛護者或得數日􅀂迫以巨熖涸之則立見破烈斯亦濟貧之物冶禮記學記曰良冶之子必學爲裘仍見其家錮􅀘穿鑿之器也􅀘器者其金柔乃合有似於爲裘史記曰邯鄲郭順以鐡冶業與王者埓冨又曰宛丘氏之先梁人也用鐡冶爲業􅁗代魏遷孔氏南陽大鼓鑄規陂池連車􅀐遊諸侯因通啇賈之利有游間公子之名又曰魯人邴氏以鑄冶起冨至巨萬然家自父兄子弟約頫有拾仰有取師古曰頫古俯字也俯仰必有取捨無巨細字惡也張璠漢記曰杜詩爲太守爲冶作水排教化大行魏志曰韓曁字公至辟爲丞相土曹属後遷樂陵太守徙􅁥冶謁者舊時冶作馬排每一熟石用馬百疋更作人排又費功力曁乃因長流爲水排計其利益參倍於前在職七年器用充實詔書襃歎就加司金都尉晉書曰王沉字彦伯作釋時論云融融者皆趨􅀬之士得其爐冶之門者唯挾炭之子苟非斯人不如其巳南史曰}
