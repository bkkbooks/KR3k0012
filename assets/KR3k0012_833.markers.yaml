  - {type: variant, offset: 3830, length: 1, content: 出, SBCK: 羊宣王考牧也厲王之時牧人之職廢宣王始興而復之至此而成謂復先王牛羊之數誰謂爾無羊三百維羣誰謂爾無牛九十其犉黄牛黒唇曰犉箋云爾女也宣王復古之牧法汲汲於其數故歌此詩以解之也爾羊來思其角濈濈聚其角而息濈濈然云此者美冨産得其所爾牛來思其耳濕濕動其耳濕濕然或降于阿或飲于池或􅃦或訛訛動也言此者美其無所驚畏爾牧來思何蘘何笠或􅀒其餱何揭也蘘所以備雨笠所以御暑言此者美牧人寒暑飲食有備三十維物爾牲則具又魯頌曰駉頌僖公也僖公能遵伯禽之法儉以足用寛以愛民務農重榖牧于坰野魯人尊之於是季孫行父請命于周而史克作頌季孫行父季文于也史克魯史也駉駉牧馬在坰之野駉駉良馬腹幹肥張也坰逺野也箋云必牧於坰野者辟知民居與良田者也史記曰卜式河南人少與弟别居脫身岀分獨取畜羊百餘田宅財物盡與弟式入山牧羊十餘􅀊羊致千餘上召之曰吾有羊上林中欲令子牧之乃布衣牧羊歳餘羊悉肥上過見其羊善之式曰非獨羊也治民亦猶是也以時起居惡者輙去無令敗羣上以式爲竒拜爲郎又曰衛青平陽人也其父爲平陽侯家給使與妾通生青爲侯家人少時歸其父父使牧羊民母之子皆奴畜之不以爲兄弟又曰范増􅀃項梁曰以君代爲楚將必能立楚之後梁乃求懷王孫在人間爲人牧羊立以爲楚懷王後從人望也又曰公孫􅀪淄川人家貧牧豕海上年四十餘乃學春秋􅄂記漢書曰蘇武使匈奴欲降之乃徙武北海上無人處使牧羝羊曰羊乳乃得歸武仗漢節牧羊卧起操持節旄盡落又曰路温舒字長君鉅鹿人父爲里􅁥門使温舒牧羊又曰王尊宇子貢􅃰郡髙陽人少孤歸諸父使牧羊澤中後漢書曰馬援轉遊隴漢間常謂賔客曰文夫爲志窮當益堅老當益壯因處田牧至有牛馬羊數千頭榖數萬斛旣而歎曰凡殖貨財産貴其能施賑也否則守錢虜耳仍盡散以班昆弟故舊身衣羊裘皮袴又曰承宫年八歳爲人牧猪郷里徐子威明春秋授諸生數百人宫過其廬下見諸生誦好之因亡其猪猪主欲笞諸生禁乃止之謝承後漢書曰孫期字仲式事母至孝牧豕於大澤中賣之以奉供養逺人從其學者皆執經遣於澤畔范瞱後漢書曰梁鴻字伯鸞扶風平陵人也家貧牧豕上林苑中曽誤遺失火延燒及他舎鴻乃尋訪燒者問所失去悉以豕償之其主者猶以爲少鄰家􅂄老見鴻非常人乃共責讓主人於是始敬異焉悉還豕鴻不受魏志曰楊俊字季才避地并州同郡王象孩少􅀌特爲人僕􅀠年十七八見使牧羊而私讀書用獲箠楚俊嘉美其才質即贖象着家娉娶立屋然後與別也晉書曰張華字茂先少家貧常以牧羊爲事三十}
