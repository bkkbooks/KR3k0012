  - {type: variant, offset: 322, length: 334, content: 與其母孟孫大怒逐之居三月復召為其子傳曰夫子不忍於麑且忍吾子乎又曰魏文侯與虞人期獵明日會天疾風左右止侯侯不聽曰不可疾風失信吾不為遂犯風往而罷虞人也穆天子傳曰天子東田于澤至于重璧之臺盛姬告病又曰天子獵于滲澤於是得白狐玄貉焉以祭于河宗以將事於河宗獲比故用又曰天子大饗王公諸侯王勤七萃之士勤猶勞也于羽陵之上乃奏廣樂六師之人翔畋于曠原得獲無疆鳥獸絕群六師之人大畋九日乃收皮效物是載羽車國語曰晉趙簡子田于螻螻晉君囿史黯聞之以犬侍于門黯晉大夫史墨時為簡子史文田犬門君囿門也簡子見之曰何為曰有所得犬欲試之茲囿茲山簡子曰何為不告對曰君行臣不從不順言從法臣從君主將適螻而麓不聞麓主君苑囿之官傳曰山林之木衡麓守之臣敢煩當日當日直日也言主將之君囿不煩麓以告君臣亦不敢煩主之直日自白也簡子乃還呂, SBCK: 作陶吕}
