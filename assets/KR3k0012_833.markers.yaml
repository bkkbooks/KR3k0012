  - {type: variant, offset: 3830, length: 1, content: 出, WYG: 羊宣王考牧也厲王之時牧人之職廢宣王中興而復之至此而成謂復先王牛羊之數誰謂爾無羊三百維羣誰謂爾無牛九十其犉黄牛黒唇曰犉箋云爾女也宣王復古之牧法汲汲於其數故歌此詩以解之也爾羊来思其角濈濈聚其角而息濈濈然云此者美畜産得其所爾牛来思其耳濕濕動其耳濕濕然或降于阿或飲于池或寢或訛訛動也言此者美其無所驚畏爾牧来思何蓑何笠或負其餱何揭也蓑所以偹雨笠所以御暑言此者美牧人寒暑飲食有備三十維物爾牲則具黒毛色者三十也云牛羊之色異者三十則女之祭祀素則有之爾牧來思以薪以蒸以雌以雄云此牧人有餘力則取薪蒸摶禽獸以來歸也麤曰薪細曰蒸爾羊來思矜矜兢兢不騫不崩矜矜兢兢言堅强也騫虧也崩羣疾也麾之以肱畢來既升肱臂也升升入牢也此言擾馴從人意也牧人乃夢衆維魚矣旐維旟矣大人占之衆維魚矣實維豐年隂陽和則衆魚多矣旐維旟矣室家溱溱又魯頌曰駉頌僖公也僖公能遵伯禽之法儉以足用寛以愛民務農重榖于埛野魯人尊之駉駉牡馬在坰之野云必牧于坰野者避民居與良田也周禮曰以官田牛田賞田牧田任逺郊之地尚書曰今惟淫舎牿牛馬今軍人惟大放舎牿牢之牛馬言軍所在必放牧也杜乃擭敜乃穽無敢傷牿牿之傷汝則有常刑擭機檻也穽穿地䧟獸也史記貨殖傳曰陸地牧馬二百蹄牛蹄角千千足羊澤中千足彘又曰公孫𢎞齊菑川}
