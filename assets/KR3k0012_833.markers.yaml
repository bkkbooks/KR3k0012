  - {type: variant, offset: 1919, length: 725, content: 甚怖便欲走乃見三烏衣人皆長八尺俱張口向之射人即死異苑曰慕容皝出畋見一老父曰此非獵所王且還也皝明晨復去值有白兔馳馬射之墜石而卒世說曰孫盛為庾公記室參軍從獵將其子齊莊行庾公不如忽於獵場見齊莊時七八歲庾謂曰若亦復來耶應聲荅曰所謂無小無大從公于邁又曰桓南郡好獵騁良馬馳擊若飛雙飄所指行陣不整穈兔騰逸參佐無不被擊吳地記曰長洲在姑蘇南大湖北岸闔閭所遊獵處也吳主遣徐詳至魏魏太祖謂詳曰孤比老願濟橫江之津與孫將軍遊姑蘇之上獵長洲之苑吾志足矣詳對曰若越橫江而遊姑蘇是踵亡秦而躡夫差恐天下之事去矣太祖大笑曰徐生無乃逆詐乎鄴中記曰石虎少時好遊獵後體壯大不復乘馬作獵輦二十人擔之如今之步輦上安徘徊曲蓋當坐處安轉關床若射鳥獸直有所向關隨身而轉虎善射矢不虛發矣襄陽耆舊記曰楚王好遊獵之事揚鑣馳逐乎華容之下射鴻乎夏水之濱弋說文曰矰弋射矢也毛詩緇衣女曰雞鳴曰將翱將翔弋鳧與鴈詩義問曰以繳繫矢而射弋言加之與子宜之又大雅桑柔曰嗟爾明友子豈不知而作如彼飛蟲時亦弋獲禮記月令曰季春之月罼弋無出九門蔡邕章句曰繳射曰弋左傳襄公上曰曹伯陽好田弋曹鄙人公孫強好弋獲白鴈而獻之且言田弋之說論語述而曰子曰弋不射宿春秋後語曰楚須襄王時人有好以弱弓微繳加歸鴈之上者王聞之召而問焉對曰外臣之好射騏鴈羅籠小矢之發也何足為大王道哉且楚王之大因大王之賢所弋非直此也昔者三王以弋道德五伯以弋戰國夫秦魏燕趙王之騏鴈也齊魯鄭者青首也鄒費郯邵者羅籠也其餘不足射也見鳥六雙唯王何取王若以聖人為弓勇士為繳時張而射之此六雙者可得而囊載也其樂非特朝夕之樂也韓詩外傳曰齊景公出弋昭華之池使顏涿聚主鳥而亡之景公怒而欲殺之晏子曰夫涿聚有死罪三臣請以其罪數而誅之晉中興書曰桓名秀豁第二子代叔父冲為江州刺史雖公門貴盛不以榮爵嬰心唯以弋釣為事, SBCK: ''}
