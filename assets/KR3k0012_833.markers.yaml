  - {type: variant, offset: 3515, length: 155, content: 得雀闕子曰任公子冬羅鯉於山阿眾人皆以為惑既而鸇鶚擊黃雀觸公子羅者千萬數劉楨魯都賦曰長罼掩壑大羅被睪罝毛詩關睢曰兔罝后妃之化也關睢之化行則莫不好德賢人眾多也肅肅兔罝㭬之丁丁赳赳武夫公侯干城說文曰兔罟謂之罝郭璞注曰罝遮也犍為舍人曰兔自作徑路張罝以捕之顧譚新言曰設罝於淵施網於崗欲民之慎亦如此也終無魚兔矣物理論曰夫欲, SBCK: 剋}
