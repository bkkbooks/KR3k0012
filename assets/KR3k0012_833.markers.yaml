  - {type: variant, offset: 3677, length: 1, content: 猶, SBCK: 於野授余云是殷時物丗丗相傳上有古字記其年月工人視之其鏌耶尚在叶前疑也工人持劒授上皇上皇以賜髙祖又曰漢郭況光武皇后之弟也累金數億家僮四百人黄金爲器功冶之聲震於都鄙時人謂郭氏之室不雨而雷言鑄鍜之聲盛也曹毗詠冶賦曰冶石爲器千爐齊設鍜箋曰鍛石可以爲質魏略曰太祖遣邯鄲淳詣臨淄侯植植得淳喜延入坐不與談先爲五椎鍜鄧粲晉紀曰􅄞康曽鍜於長林之下鍾㑹造焉康坐坐以鹿皮嶷然正容不與之酬對㑹恨而去文士傳曰􅄞康性巧能鍜家有栁樹乃激水以圍之夏月甚清凉居其下傲戯及自鍜禰衡傳曰衡字正平十月朝黃祖在艨衝舟上賔客皆㑹作􅁰臛旣至先在衡前衡得便飽食􅀄不顧左右旣畢復􅅮弄以戯時江夏有張伯雲亦在座調之曰禮教云何而食此正平不荅弄􅁰如故祖曰處士不當荅之也衡謂祖曰君子寜聞車前馬䊧祖呵之衡熟視祖罵曰死鍜錫公祖大怒令五伯將岀}
  - {type: page-break, offset: 3677, content: '', id: KR3k0012_SBCK_833-4b}
  - {type: page-break, offset: 3677, content: '', id: KR3k0012_SBCK_833-5a}
  - {type: variant, offset: 3677, length: 1, content: 猶, WYG: 于野授余云是殷時物世世相𫝊上有古字記其年月工人視之其鏌耶尚在叶前疑也工人持劍授上皇上皇以賜高祖又曰漢郭況武皇后之弟也累金數億家僮四百人黄金為器功冶之聲震於都鄙時人謂郭氏之室不雨而雷言鑄之聲盛也曹毗詠冶賦曰冶石為器千爐齊設鍛箋云鍛石闕為質魏畧曰太祖遣邯鄲淳詣臨淄侯植植得淳喜延入坐不與談先為五椎鍛鄧粲晉紀曰稽康曾鍛於長林之下鍾㑹造焉康自坐以鹿皮嶷然正容不與之酬對㑹恨而去文士𫝊曰稽康性巧能鍛家有柳樹乃激水以圍夏月甚清涼居其下傲戱及自鍛禰衡𫝊曰衡字正平十月朝黄祖在艨衝舟賔客皆㑹作黍􅌜既至先設衡前衡得便飽食初不顧左右既畢復摶弄以戱時江夏有張伯雲亦在座調之曰禮教云何而食此正平不答弄黍如故祖曰處士不當答之也衡謂祖曰君子寧聞車前馬䊧祖呵之衡􅂞視祖罵曰死鍛錫公祖大怒令五伯將出}
