  - {type: variant, offset: 3958, length: 0, content: '', SBCK: 下令禁人二業而吏下檢結多失其實百姓患之劉般上言郡國以官禁二業至有田者不得漁捕今濵江湖郡率少􅁞桑人資漁採以助口實且以冬春閑月不妨農事夫漁獵之利爲田除害有助榖食無􅀜二業也北史曰後周裴俠除河北郡守此郡舊制有漁獵夫三十人以供郡守俠曰以口腹役人吾不爲也乃悉罷之管子曰漁人入海海深百仭就波逆流乗危百里􅀫夜不岀者利水也故利之所在雖千仭之山無不上焉深源之下無不入焉魯連子曰古善漁者􅀫沙瞿子使漁于山則雖十􅀫沙子不得一漁焉􅀫沙非闇於漁道也彼山者非魚之所生尸子曰燧人之丗天下多水故敎人之漁文子曰尭使水處者漁山處者木事冝其械械冝其人吕氏春秋曰雍季對晉文公曰竭澤而漁豈不獲得而明年無魚矣家語曰宻子賤治單父三年孔子使巫馬期徃觀政焉期隂免衣弊裘入界見䰻者得漁輙捨之期問焉曰凡漁者爲得也何以得魚却捨之曰魚之大者名爲鱄䲖吾大夫愛其小者名爲鱦鱄冝爲鱣新序作鱦者魚之懷仁也吾大夫欲長之是以得二者輙捨之期返告孔子曰宓子之德至矣使民暗行􅀂嚴刑之於一方也訪問宓子何行而得於此子曰吾甞與之言曰誠於此者刑於彼宓子志行此術於單父也又曰孔子之楚有漁者獻魚焉孔子不受漁者曰天暑市逺無處鬻焉思欲弃之糞壤不􅀂獻之君子故取以進之於是夫子再拜受之使弟子掃地將以祭享焉門人曰彼將弃之矣而夫子􅀕之何也子曰吾聞惜其腐餘欲以務施者仁人之偶也惡有受仁人之饋而無􅀕者乎劉向新序曰楚人有獻餘魚於王者曰今日獲魚食之不盡賣之不售弃之可惜故來獻王也楚王曰漁者仁}
