  - {type: variant, offset: 387, length: 458, content: 曰無冬無夏值其鷺羽又曰冬之夜夏之日百歲之後歸于其室傳曰龍見而雩龍角亢星也建巳月昏見東方禮曰四月之節日在昴立夏為四月之節昏翼中曉牽午中斗建巳位之初其日丙丁丙丁屬火主夏故云其日丙丁其帝炎帝其神祝融昔炎帝神農氏以火德王繼天而王故為夏帝火正曰祝融為火神佐炎帝於夏其蟲羽南方朱鳥羽蟲之長凡有羽之類皆屬於火故曰其蟲羽其音徵三分宮去一以生徵徵數五十四屬火以其徵清事之象也夏和則徵聲調樂記曰徵亂則哀其事勤律中仲呂四月氣至則仲呂之律應仲呂者無射之所生三分益一管長六寸六分立夏之日螻蟈鳴後五日蚯蚓出後五日王瓜生盛德在火迎夏於南郊迎夏為祀赤帝命樂正習盛樂為將大雩先習盛樂自鞀鞞至祝敔皆作曰盛樂中氣日在畢小滿為四月中氣昏軫中曉須女中斗建巳位之中小滿之日苦菜秀後五日靡草死後五日小暑至挺重囚出輕繫挺猶寬也重囚寬之至秋方決輕繫出而舍之無起土功無發大眾無伐大樹為妨蠶農之事天子初衣暑服論語曰當暑袗絺綌謂暑服無大田獵恐傷生類以含桃先薦寢廟含桃櫻桃也先荐寢廟後乃食之蠶事既登后妃獻繭后妃獻繭進其成功也天子飲酎用禮樂酎之言醉也春酒至此始成與群臣飲之又曰, WYG: 俗忌}
