  - {type: variant, offset: 5, length: 3, content: 上爾雅, SBCK: 中莊子曰井魚不可以語海夏䖝不可以語冰文子曰政失於夏熒惑逆行夏政不失則降時􅀨列子曰鄭師文學琴於師襄當夏而叩羽􅃶以召黄鍾霜雪交下川池暴管子}
  - {type: variant, offset: 5, length: 3, content: 上爾雅, WYG: 中夏中莊子曰井魚不可以語海夏蟲不可以語氷文子曰政失于夏熒惑逆行夏政不失則降時雨列子曰鄭思文學琴于師襄當夏而叩羽弦以召黄鐘霜雪交下川池暴泙管子曰夏日不煬非愛火也冬日不盥非愛水也為不適于身不便于體也夫明王不美宫室非喜小也為傷本也又南方其時曰夏夏氣陽陽生火其徳施舍是謂曰徳又春不收枯骨朽胔伐枯木而去之則旱至矣鄒子曰季夏取桑柘之火尸子}
