  - {type: variant, offset: 842, length: 0, content: '', krp: 酒又曰六月種黍歳晚不雨秋不縮酒神失其所趙自勉造化權輿云潮者隂陽氣所激五月無潮隂氣微也八月最大則隂盛也陸機要覽曰昔羽山有神人焉逍遥於中岳與左元放共遊子訓所坐欲起子訓應欲留之一日之中三雨今呼五月三時雨亦爲留客雨桓譚新論曰漢中送王仲都時夏大暑使曝日坐又環以十鑪火不言熱而身不汗出五行大義論曰未者昧也隂氣巳長萬物稍衰其體薆昧於未又時物向成皆有氣味也五行體性論云土在四時之中處季夏之末陽衰隂長居位之中揔於四德謂金木水火積塵成實積則有間有間故水火成實所能持也故土以含散持實爲體稼穡爲性又曰土苞四德故其體能兼虚實也論衡曰夫虎出有時猶龍見有期也隂物以冬見陽䖝以夏出出應其氣氣動其類參伐以冬出心尾以夏見參伐則虎象星心尾則龍象星出而物見氣至而類動天地之性也又曰盛夏之時當風而立隆冬之月嚮日而坐其夏欲得寒冬欲得温也或當風鼓翣嚮日燃爐然而天終不爲冬夏易氣者寒暑有節不爲人變改也又曰陽燧取火於五月丙午日中之時消錬五石鑄以爲氣摩勵生光仰以嚮日則火來至此真取火之道也又曰陽燧取火於天消錬五石五月盛夏鑄以爲器乃能得火今又但取刀劒銅鈎之属摩以嚮日亦得火焉又曰以夏進爐以冬奏奏亦進也扇此無益人君不遇災患幸矣又曰方今盛夏雷雨時至龍多登雲雲雨與龍相應乗雲雨而行物類相致非有爲也又曰夏末蜻蛚蟋蟀也鳴寒螿啼感隂氣也雷動而雉驚啓蟄而虵出感陽氣也又曰丗俗之事亦有縁也夫正月歳始五月陽盛子以此月生精盛熾熱烈厭勝父母父母不堪將受其患相倣俲莫謂不然有空諱之言無實㓙之効世俗惑之誤非之甚也諱舉正月五月子以爲正月五月子殺父與母不得舉也以舉之父母偶死則信而謂之真矣夫正月五月子何故殺父與母人之含氣在膓腹之内其生十月而産共元氣也正月與二月何殊五月與六月何異而謂之㓙世傳此言乆矣又曰實說雷者太陽之微氣也何以明之正月始雷五月陽盛故五月雷迅冬乃雷潜盛夏之時太陽用事隂氣乗之隂陽分争則相激射爲毒毒中人輒死中木木折中屋屋壞諸葛亮出軍表曰五月渡瀘深入不毛之地陶潜集曰潜常言五月六月中北牎下卧凉風暫至自謂羲皇上人穆天子傳曰季夏丁夘天子北斗升于舂山之上以望四野曰舂山是惟天下之髙山也孳木華不畏雪天子乃取孳木華之實持歸種}
