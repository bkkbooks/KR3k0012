  - {type: variant, offset: 341, length: 0, content: '', WYG: 曰土苞四德故其體兼虛實也論衡曰夫虎出有時猶龍見有期也隂物以冬見陽蟲以夏出出應其氣氣動其類參伐以冬出心尾以夏見參伐則虎星心尾則龍象星出而物見氣至而類動天地之性也又盛夏之時當風而立隆冬之月嚮日而坐其夏欲得寒冬欲温也或當風鼓翣向日燃爐然而天終不為冬夏氣易者寒暑有節不為人變改又陽燧取火于五月丙午日中之時消煉五石鑄以為器摩勵生光仰以向日則火來至此取真火之道也又陽燧取火於天消鍊五石五月盛夏鑄以為噐乃能得火今又但取刀劍銅鈎之屬摩以向日亦得火焉又以夏進爐以冬奏奏亦進也扇此無益人君不遇灾患幸矣又方今盛夏雷雨時至龍多登雨雲雨興龍相應乘雲雨而行物類相致非有為也又夏蜻蛚蟋蟀也鳴寒螿啼感隂氣也雷動而雉驚啟蟄而蛇出感陽氣也又世俗之事亦有縁也夫正月嵗始五月陽盛子以此月生精盛熾熱厭勝父母父母不堪將受其患羣相倣傚莫不謂然然有空諱之言無實凶之效世俗惑之誤謂舉正月五月子者子將殺父與母不得舉也以舉之父母偶死則信而謂之真矣夫正月五月子何故殺父與母人之含氣在腸腹之内其生十月而産共元氣也正月與二月何殊五月與六月何異而謂之凶世傳此言久矣又震雷者乃太陽之微氣也何以明之正月始雷五月陽盛故五月雷迅冬乃雷潛盛夏之時太陽用事隂氣乘之隂陽分爭則相激射為毒毒中人輙死中木木折中屋屋壊諸葛亮出師表曰五月渡瀘深入不毛之地陶潛集曰潛常言五月六月中北牕下卧凉風暫至自謂羲皇上人穆天子傳曰季夏丁卯天子北升于舂山之上以望四野曰舂山是惟天下之髙山也孶木蕃不畏霜天子乃取孶木華之實持歸種之又天子四月休于濩澤今平陽濩縣澤是也濩音獲於是射鳥獲獸宋躬孝子傳曰何子平事母至孝年六十有孺子之慕夏避清凉永昌郡傳曰朱提郡有堂狼山山多毒草盛夏之月飛鳥過之不能得去嵇康髙士傳曰被裘公者吳人延陵季子出遊見道中有遺金顧而謂公曰取彼金公投鎌瞋目拂手而言曰何子之髙而視之卑五月被裘而負薪豈取金者哉季子大驚既謝而問姓名公曰吾子皮相之士而安足語姓名也襄陽耆舊傳曰黄穆字伯開博學為山陽守有德政弟奐字仲開為武陵太守貪穢無行武陵人諺曰天有冬夏人有二黄言不同也周處風土記曰仲夏雨濯枝盪川註云此節常有大雨名濯枝又梅熟時雨謂之梅雨又仲夏長風扇暑注云此節東南常有風至俗名黄雀長風盛𢎞之荆州記曰宜都銀山縣有風穴穴口大數尺名為大風井夏則風出冬則風入樵人有冬過者置笠穴口風吹之經日還涉長陽溪而得其笠又橘洲在郡南四里對南津看常如不及至夏水懷山諸洲皆沒橘洲獨在荆楚歲時記}
