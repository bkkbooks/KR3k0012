  - {type: variant, offset: 2271, length: 134, content: 田嬰有子四十餘人其賤妾有子名文以五月生嬰告其母曰勿舉也其母竊舉生之及長因其兄弟而見其子文於田嬰田嬰怒其母曰吾令若去此子敢生之何也女頓首因曰君所不舉五月子者何故嬰曰五月子者長及戶齊將不利其父母文曰人生受命於天君何憂焉必受命於戶則可高其戶耳誰能至戶者嬰曰子休矣又曰熒惑南方, SBCK: 滔滔孟}
