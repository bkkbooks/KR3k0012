  - {type: variant, offset: 2594, length: 1918, content: 人其能耕者不過百畝百畝之收不過百石春耕夏耘秋穫冬藏采樵治宮給役使春不得避風夏不得避暑熱秋不得避陰雨冬不得避寒凍四時閒無休息漢書魏相上書曰南方之神炎帝乘離執衡司夏張晏曰火為禮禮者齊平故為衡也又曰昔魯昭公十七年六月朔日食說曰正月謂周六月夏四月正陽純乾之月也止慝謂陰爻也冬至陽爻起初故曰復至建巳之月為純乾亡陰爻侵陽為災重故伐鼓用幣責陰之禮劉歆為六月二日魯分也又漢元帝永初元年四月日色青白亡景韋昭曰下無景也景謂惟質見耳正中時有景亡光韋昭曰無光耀也是夏寒至九月日乃有光續漢書律曆志曰日行南陸謂之夏續漢書禮儀志曰五月五日朱索五色桃印為門戶飾以止惡氣又曰仲夏之月陰氣萌作恐物不茂其禮以朱索連葦以施門戶又曰立夏之日夜漏未盡五刻京都百官皆衣赤衣迎夏於南郊後漢書張純奏議禮三年一祫五年一褅禘祭以夏四月夏者陽氣在上陰氣在下四月乾卦用事故言陽氣在上故正尊卑之義也謝承後漢書曰羊茂字季實為東郡守夏處單板榻又曰宋均為九江太守五日一視事夏以平旦晉書曰魏末有孫登字公和汲郡人無家屬時人於汲縣北山上土窟中得之夏則編草為裳又曰肅慎國一名抱樓夏則巢居晉書曰山濤將去選官舉嵇康自代康與濤書告絕且曰性巧而好鍛宅中有一柳樹甚茂乃激水圜之夏月居其下以鍛東平呂安服康高致每一相思千里命駕每鍛而向秀為佐又五行志云晉義熙時桓玄既篡位謠曰草生及馬腹鳥啄桓玄目及玄敗走至江陵時當五月中被誅晉陽秋曰車胤字武子家貧讀書不常得油夏月則練囊盛數十螢以夜繼日沉約宋書云羊欣字敬元父不疑為烏程縣令欣時年十二王獻之為吳興守甚知愛之賞夏月入縣欣著新練裙晝寢獻之書數幅而去欣本工書因此彌善又曰劉敬宜八歲喪母四月八日入寺及下頭上金鏡為母灌佛因泣下悲不自勝北齊書曰僕射魏收字伯起初習武不成改節謮書夏月坐板床隨逐樹陰諷讀累年床為之銳遂工辭令也南史曰梁何遠為武昌太守武昌俗皆汲江水盛夏遠患水溫每以錢買人井寒水不受錢者則以水還之其他事率多此類陸翽鄴中記石季龍於冰井臺藏冰三伏之月以冰賜大臣趙書曰汲桑六月盛暑而垂重裘累茵使十餘人扇之患不得清涼斬扇者軍中為之謠曰奴為將軍何可羞六月重茵被狐裘不識寒暑斷人頭三十國春秋燕王暮容熙后符氏賞季夏思凍魚膾仲冬須生地黃皆下有司切責之不得加之以辟焉隋書曰煬帝大業十二年五月上幸玉華宮徵求螢火得數斛夜出遊於山而放之光遍岩谷續會要曰貞元六年五月朔御紫宸殿受朝先是上以五月一陰生臣子道長君父道衰非善月也因創是月朝見之儀也國語曰魯宣公夏濫於泗淵漬罟於泗水之泉以取魚里革斷其罟而棄之曰古者大寒降土蟄發寒氣下謂季冬建丑之月土蟄發謂孟春建寅之月水虞於是乎講罛罶取名魚登川禽而嘗之寢廟行諸國人助宣氣也水虞漁師也罟魚網罾笱也言陽氣起魚負冰故令國人取之今魚方別孕不教魚長又行網罟貪無藝也公曰吾過矣藝猶極也吳越春秋曰越王念吳之復夏則握火說苑曰趙簡子謂陽虎曰樹李春夏得休息秋得食樹蒺藜者夏不得息秋得刺今子種樹蒺蔾耳太公金匱曰紂常以六月獵於西土發民逐禽民諫曰今六月天務覆施地務長養今盛夏發民逐禽而元元懸於野君殘一日之苗而民百日不食天子失道後必無福紂以為妖言而誅之後數月天暴風雨發屋折木六韜曰武王伐殷得二大夫而問之曰殷國常雨血雨灰雨石小者如雞子大者如箕常六月雨雪深丈餘武王曰大哉妖也其一人曰是非大妖也殷國大妖三十七章雨血雨灰雨石盛夏雨雪臣不為妖災武王踧然而問三十七章之妖對曰殷君好射人以餧虎喜割人心喜殺孕婦喜煞人父孤人之子上數事皆三十七章之事又曰夏不操扇冬不服裘天雨不張蓋名曰禮將又曰冬冰可折夏條可結傅子曰夏令披裘冬令披褐雖有嚴令終不從者逆也世說曰郗嘉賓三伏之月詣謝公炎暑方盛雖復當風交扇猶沾汗流離又曰周鎮罷臨川還都泊清溪時夏暴雨舡舫狹小而漏殆無坐處丞相王導曰胡威之清何以過此又曰劉真長始見王丞相時盛暑之月丞相以腹熨彈棋局曰何如乃渹吳人以冷為渹也音楚敬反劉既出人問見王公如何劉曰未見他異唯作哭語耳又曰胡廣本姓黃五月生父母惡之乃置之瓮投於江胡翁見甕流下聞有小兒啼聲往取因長養之以為子遂七登三司流中庸之號廣後不治其本親服云我本親以己為死人也世以為深譏焉又曰謝遏按謝朗小名遏夏月常仰臥謝公清晨卒來未暇著衣跣出屋外方躡履問訊公曰汝可謂前踞後恭語林曰何平叔美姿儀而絕白魏文帝疑傅以粉夏月與熱湯餅既啖大汗出隨以朱衣自拭色轉皎然又曰陸機夏在洛忽思東頭竹篠飲語劉寶曰吾思鄉轉深矣公孫尼子曰孔子有病哀公使醫視之醫曰子居處飲食何如孔子曰春居葛籠夏居密陽秋不風冬不煬飲食不饋飲酒不勤醫曰是良藥也太玄經曰蒙南方也夏也物之脩長也皆可得而載也謂長出向上也括地圖曰天毒國最暑熱夏草木皆乾白虎通曰六月謂之林鍾林者眾也萬物成熟類眾多也蔡邕月令章句曰百穀各以其初生為春熟為秋故麥以孟夏為秋祠令曰季夏土王日祀黃帝於南郊帝軒轅配后土從之又曰季夏迎氣日祀中霤, SBCK: ''}
