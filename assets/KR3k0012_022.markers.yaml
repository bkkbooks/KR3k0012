  - {type: variant, offset: 10, length: 1, content: 為, SBCK: 日不煬非愛火也冬日不盥非愛水也爲不適於身不便於體也夫明王不美宮室非喜小也爲傷本也又曰􅀯方其時曰夏夏氣陽陽生火其德施舎是謂曰德又曰春不收枯骨杇胔伐枯木而去之則夏旱至矣鄒子曰季夏取桑柘之火尸子曰夏爲樂􅀯方爲夏夏興也􅀯任也是故萬物莫不任興蕃殖充盈樂之至也韓子曰季孫相魯令五月掘長溝子路私秩飲之孔子覆其飲曰魯有民焉汝輙擾之何也淮􅀯子曰明庶風後四十五日清明風至則出幣帛使諸侯立夏長養布恩惠故聘問諸侯巽卦之風抱朴子曰洪從祖仙公每大醉夏輙入源泉底一日許乃出能閉氣胎息故耳又曰謂夏必長而蒜麥枯謂冬必凋而竹栢茂日盛陽冝暑夏天未必無凉日極隂冝寒隆冬未必無暫温也又曰丗之豪士暑夏之日露首􅃝身唯在樗蒲彈碁不離綺紈之側也又曰或問不熱之道荅曰或以立夏日服六壬六癸之符或服􅀇冰之丸或服飛霜之散幽求子曰扇翣微動凉風夏生范子計然曰德取象於春夏刑取象於秋冬周書時訓曰六月節温風至温風不至即時無緩政蟋蟀居壁􅀂不居壁即􅁪急之􅁀又云門户不通鷹乃學習􅀂不學習即㓂戎不備又曰六月中氣後五日腐草化爲螢􅀂不化螢即榖實鮮落土潤溽暑􅀂不溽暑即急應之罰大􅀨時行􅀂不時行即恩不及下又曰夏取􅀥杏之火符瑞圖曰麟夏鳴曰養綏隱訣曰四月戍天地㓙門日不可入山建創四月十一日地破日不可開山動土又曰立夏之日日中五帝㑹諸仙人於紫微宫見四眞人論求道之功罪董勛問禮俗曰五月俗稱惡月俗多六齋放生案月令仲夏隂陽交死生分君子齋戒止聲色節􅄝慾素問曰歧伯曰夏三月此謂蕭秀天地氣交萬物華實夜卧蚤起母厭於日使志母怒使英華成秀使氣得泄􅀂所愛在外此夏氣之應也飬生之道也逆之則傷心秋爲㾬瘧冬至重疾夏三月天地隂陽之氣交合者万物華實故言夏生長於万物成實者也夜卧早起是貪於夏氣不厭於日者也是晚卧早起明於陽氣之盛者也人志氣母怒陽氣成結秀實以成其氣得陽者也万物成結於夏受之因此夏陽氣之所􅀿也能合其氣則是養生之道也逆之則傷損於心心者夏王也故言傷心心傷則秋必病㾬瘧故言夏傷於暑秋病㾬瘧者不從其氣則火爲逆也是故傷逆深背損於陽氣故冬至隂盛必重病大衍星分圖曰五月午日日月㑹于鶉首又曰六月日月㑹于鶉火嶺表録異云枹木其輕如通草夏月着之隔卑濕地氣如杉木今廣州諸郡牧守􅀄到任下檐皆有油􅀞枹履又曰南中夏秋多惡風彼人謂之􅄓南越志云風起則人心恐懼或云風來則四面具足二義皆有理也壞屋折樹不足喻也甚則吹屋瓦如飛蝶或三二年不一風或二年兩三風亦繫廉帥政德之否臧者然發則自午及酉夜半必止此乃飄風不終朝之義也南荒録曰新州男子婦人皆縝髮如雲每沐以􅁅投水中遂就水而沭之以彘膏􅂗其髮五六月秔秫未獲時民飢盡髠取髮鬻於市旣髮即復以彘膏􅂗之至來年五六月又可鬻矣投荒録曰嶺南方盛夏率一日十餘隂十餘霽雖大􅀨傾注頃即赫日巳復驟􅀨大凢嶺表夏之炎熱甚於北土且以時熱多又蒸鬱此爲甚惡自三月至九月皆蒸熱梁元帝纂要曰夏日}
