  - {type: variant, offset: 2016, length: 233, content: 熱未極故以小為名大暑為中者自十一月一陽爻生從地下而出至此之時方始上徹陽氣併出地上大暑既極故大暑為中大戴禮曰夏以教士車甲士執伎論力循四衛強股肱質射御才武聽慧治眾長平可以為儀綴於國出可以為率誘於軍旅四方諸侯之游士國中之賢者閱焉方夏三月養長莠蕃庶物於時有事享于皇考爵士之有慶者七人以成夏事易通統圖曰夏日月行東南赤道曰南陸尚書考靈耀曰火星為夏期專陽相助同精感符詩含神霧曰曹地處季夏之位土地勁急音中徵其聲清以急春秋繁露曰夏樂氣故養也孝經說曰斗指午為夏鶡冠子曰斗柄南指天下皆夏史, WYG: 西京雜}
