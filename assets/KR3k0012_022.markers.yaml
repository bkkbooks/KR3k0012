  - {type: variant, offset: 31, length: 0, content: '', WYG: 乾生氣卯死氣酉是月也萬物已成天地化生勿冒極熱勿大汗後當風勿暴露星宿皆成惡病勿食犬秫勿含生薤勿食雞肉勿食虵蟬是月肝臟少氣不行火氣漸臨水力漸衰稍補腎助肺調和胃氣無失其時是月八日不逺行宜安心静念沐浴齋戒必得福慶齊民月令曰四月八日不宜殺草木始服生衣宜進温酒服温藥是月也無壞麛卵伐大樹是月也宜以夙興酉陽雜俎曰俗忌五月上屋言人五月蛻精神如上屋即自見其形魂魄則不安矣窮神秘苑幽明録曰漢武帝與羣臣宴於未央殿方食棗帝見梁上有一老翁}
