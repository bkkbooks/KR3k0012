  - {type: variant, offset: 1739, length: 213, content: 王以冰頒賜也又曰祚氏掌攻草木及林麓夏日至令刊陽木而火之又曰夏見曰宗大行人云夏宗以陳天下之謨穀梁傳曰四時之田皆為宗廟之事也夏田曰苗因為苗稼除害故曰苗皇覽逸禮曰夏則乘赤輅駕赤騮載赤旗以迎夏於南郊其祭先黍與雞居明堂正廟啟南戶尚書大傳曰南方者何也任方也任方者物之方任何以為之夏夏者假也吁荼萬物養之外者也故曰南方夏也又曰主夏者火火昏中可以種黍菽上告乎天子而下賦之民三禮義宗曰夏大也謂萬物長大也夏謂南者南任也又曰火正曰祝融者祝甚也融明也言, SBCK: ''}
