  - {type: variant, offset: 848, length: 0, content: '', SBCK: 士而安足語姓名也襄陽􅂄舊傳曰黄穆字伯開􅀶學爲山陽守有德政弟奐字仲開爲武陵太守貪穢無行武陵人諺曰天有冬夏人有二黄言不同也周處風土記曰仲夏􅀨濯枝盪川注云此}
  - {type: variant, offset: 848, length: 0, content: '', krp: 士而安足語姓名也襄陽耆舊傳曰黄穆字伯開博學爲山陽守有德政弟奐字仲開爲武陵太守貪穢無行武陵人諺曰天有冬夏人有二黄言不同也周處風土記曰仲夏雨濯枝盪川注云此}
