  - {type: variant, offset: 1539, length: 151, content: 正崇四術立四教春夏教以詩書春夏陽也詩書者聲亦陽也又曰凡學春夏學干戈干盾也戈句子戟也干戈萬舞象武也用動作之時學之又曰春誦夏絃太師詔之誦謂歌樂也絃謂以絲播詩陽用事則學之以聲又曰春作夏長仁也又曰明堂位曰季夏六月以禘禮祀周公於太廟朱干玉戚冕而儛太武皮弁素積禓而舞大夏周禮曰蕤賓午之氣五月建焉而辰在鶉首又曰山虞以, WYG: 章推}
