  - {type: variant, offset: 845, length: 0, content: '', SBCK: 天子四月休于濩澤今平陽􅇴澤縣是也濩音􅀗於是射鳥獲獸宋躬孝子傳曰何子平事母至孝母喪年六十有孺子之慕夏避清涼永昌郡傳曰朱提郡有堂狼山山多毒草盛夏之月飛鳥過之不能得去􅄞康髙士傳曰􅀍裘公者吴人延陵季子出遊見道中有遺金顧而謂公曰取彼金公投鎌瞋目拂手而言曰何子之髙而視之卑}
  - {type: variant, offset: 845, length: 0, content: '', krp: 天子四月休于濩澤今平陽濩澤縣是也濩音獲於是射鳥獲獸宋躬孝子傳曰何子平事母至孝母喪年六十有孺子之慕夏避清涼永昌郡傳曰朱提郡有堂狼山山多毒草盛夏之月飛鳥過之不能得去嵇康髙士傳曰𬒳裘公者吴人延陵季子出遊見道中有遺金顧而謂公曰取彼金公投鎌瞋目拂手而言曰何子之髙而視之卑}
  - {type: variant, offset: 847, length: 0, content: '', SBCK: 􅀍裘而􅀒薪豈取金者哉季子大驚旣謝而問姓名公曰吾子皮相}
