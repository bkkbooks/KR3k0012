  - {type: variant, offset: 849, length: 0, content: '', SBCK: 常有大􅀨名濯枝又曰梅熟時􅀨謂之梅􅀨又曰仲夏長風扇暑注云此節東南常有風至俗名黄雀長風盛引之荆州記曰冝都銀山縣有風穴穴口大數尺名爲風井夏則風出冬則風入樵人有冬過者置笠穴口風吸之經}
  - {type: page-break, offset: 849, content: '', id: KR3k0012_SBCK_022-7a}
  - {type: variant, offset: 849, length: 0, content: '', krp: 常有大雨名濯枝又曰梅熟時雨謂之梅雨又曰仲夏長風扇暑注云此節東南常有風至俗名黄雀長風盛引之荆州記曰冝都銀山縣有風穴穴口大數尺名爲風井夏則風出冬則風入樵人有冬過者置笠穴口風吸之經}
