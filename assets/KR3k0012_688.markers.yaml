  - {type: variant, offset: 1713, length: 1015, content: 僚陪位沈慶之於殿庭戲之曰今日何不著鹿皮冠蕭子顯齊書曰東昏侯自造遊宴之服綴以花采錦繡群小又造四種帽帽因勢為名一曰山鵲歸林者詩曰鵲巢夫人之德東昏寵嬖淫亂故鵲反藪二曰兔度坑天意言天下將有逐兔之事也三曰反縛黃離嘍黃口小鳥也反縛之應也四曰鳳凰度三橋鳳凰者嘉瑞三橋梁王宅處也又曰永明中蕭諶開愽風帽後裙之製又為破後帽世祖崩後建謀廢立誅滅諸王又曰茹法亮吳興武康人也為前軍延昌殿為世祖陰室藏諸御高宗即位開陰室出世祖白紗帽防身刀法亮歔欷流涕又曰徐龍駒常住含章殿著黃綸帽被貂裘南面向案代帝書勑又曰豫章王嶷妃庾氏嘗有疾瘳上幸嶷邸後堂設金石樂宮人畢至登桐臺使嶷著烏紗帽因極宴盡歡梁書曰到溉嘗夢武帝遍見諸子至湘東而脫帽與之於是密敬事焉又曰初賀革之江陵也意甚不悅過別御史中丞江革以情告之荅曰吾常夢主上遍見諸子唯至湘東王所手脫帽以與之此人後必當璧卿其行乎又曰沙門寶誌忽重著三布帽亦不知於何得之俄而武帝崩文惠太子預章文獻王相繼薨又曰鄧至國其俗呼帽曰災何又曰俀國男女皆露髻富貴者以錦繡雜采為帽似中國胡公頭又曰庾弘遠字士操清實有士譽仕齊為江州長史剌史陳顯達舉兵敗斬於朱雀航將刑索帽著之曰子路結纓吾不可以不冠而死又曰垣崇祖為豫州剌史魏攻壽春崇祖著白紗帽肩輿上城決水破之後魏書曰辛紹先有至孝性丁父憂三年口不甘味頭不櫛沐髮遂落盡故常垂裙皂帽又曰高昂轉司徒公好著小帽世因稱司徒帽北齊書曰齊制宮內唯天子紗帽臣下皆戎帽特賜平秦王歸彥紗帽以寵之後周書曰獨孤信在秦州嘗因獵日暮馳馬入城其帽微側詰旦而吏人有戴帽者咸慕信而側帽焉隋書曰後周之時著突騎帽如今胡帽垂裙覆帶蓋索髮之遺象也又文帝項有瘤疾不欲人見每常著焉相魏之時著而謁帝故後周一代將為雅服小朝公宴咸許戴之唐書曰代宗時禁民皂衫厭耳帽以異官健西京雜記曰趙飛燕為皇后其弟在昭陽殿遺飛燕書曰今月嘉辰貴姊懋膺大冊上遺金花紫綸帽以陳踴躍孟嘉別傳曰嘉為桓溫參軍九月九日溫遊龍山參僚悉集時佐吏並戎服有風吹嘉帽墮初不覺良久如廁溫命還之授孫盛紙筆啁之置嘉坐處嘉還見之請筆即荅四坐嗟歎幽明錄曰安開者安成之俗師也善於幻術時王凝之為江州向王當行陽為王刷頭簪荷葉以為帽與王著當時亦不覺帽之有異到座之後荷葉乃見舉坐驚駭王不知魏文帝與劉曄書曰劉生帽裁製微不長有似里父之服孟逵與諸葛亮書曰貢白綸帽一顏以示微意劉謐之下野賦曰頭戴鹿心帽足著狗皮靴面傅黃灰滓髻插蕪菁花男女四五人皆如燒蝦䗫束晳近遊賦曰帽引四角之縫裙有叄條之殺又曰老公戴合歡之帽少年著蕞角之巾巾釋名曰巾謹也二, WYG: 八}
