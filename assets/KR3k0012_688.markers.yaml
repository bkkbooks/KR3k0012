  - {type: variant, offset: 2282, length: 195, content: 曰齊制宮內唯天子紗帽臣下皆戎帽特賜平秦王歸彥紗帽以寵之後周書曰獨孤信在秦州嘗因獵日暮馳馬入城其帽微側詰旦而吏人有戴帽者咸慕信而側帽焉隋書曰後周之時著突騎帽如今胡帽垂裙覆帶蓋索髮之遺象也又文帝項有瘤疾不欲人見每常著焉相魏之時著而謁帝故後周一代將為雅服小朝公宴咸許戴之唐書曰代宗時禁民皂衫厭耳帽以異官健西京雜記曰趙飛燕為皇后其弟在昭陽殿遺飛燕書曰今月嘉辰貴姊懋膺大冊上遺金花紫綸帽以陳踴躍孟嘉別, SBCK: 裴植}
