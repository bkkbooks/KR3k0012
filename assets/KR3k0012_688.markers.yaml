  - {type: variant, offset: 928, length: 0, content: '', SBCK: 太皇太后入朝服紺上皂下簪以瑇􅈘爲樀長一尺端爲華勝上爲鳯凰爵以翡翠爲毛羽下有白珠垂黄金鑷左右各一橫簪之以安幗結諸簪珥又曰公卿列侯中二千石夫人紺繒幗黄金龍首銜白珠魚湏長尺爲簪江表傳曰魏文帝遣使於呉求通犀􅆪群臣曰貢有常典魏所求非法冝勿與孫權曰彼在諒闇之中而所求􅀂此寧可復與言禮皆備以付使韓詩外傳曰孔子遊少原之野有婦人央澤而哭夫子恠之使弟子問焉婦人對曰向看刈蓍薪而忘簪是以哀孔子曰刈蓍而忘簪有何悲焉婦人曰非傷忘簪吾所悲者不忘故也淮南子曰楚將子發好􅇊道之士有善爲偷者徃見子發子發禮之無幾何齊伐楚子發將師當之兵三却齊師逾強於是善偷則夜出取幘明夕取枕明夕又取簪悉歸之齊師大駭謀曰今夕不去楚軍恐取吾首還師而去之故􅇊無細能無薄在人君用之也鹽鐵論曰禹理水過門不入當此之時墮簪不顧郭子横洞􅁳記曰帝好微行於長安城西夜見一玉螭遊於路董謁曰昔桀媚末嬉於膝上以金簪貫玉螭腹爲戯弄今螭腹有金穿痕安知非此耶神仙傳曰左慈能分盃飲酒曹公聞試之慈抜簪以畫盃即斷其間相去數寸幽明録曰孫權時南方遣吏獻簪吏過宮亭湖廬山君廟請福下教求簮吏叩頭曰􅆪獻天子必乞哀念神云臨入石頭當相還吏遂去達石頭有三尺鯉魚跳入舡吏破腹得之呉均續齊諧記曰東海蔣潜嘗至不其縣於林野中見一死人烏來食之輙見一小兒長三尺許來駈烏乃起去潛乃徃看之見有犀導乃㧞取衆鳥争集無復駈者夢書曰簪者爲身簪者巳之尊也夢着好簪身歡喜班固與竇憲牋曰將軍哀憐賜以玉躬所喜駭玳􅈘􅆪絳單衣以魯縞之質􅀍服鸞鳯之彩飾諸􅁑恢集詔荅恢曰今送一犀導小物耳然是情發於中而􅀉乎物班固與弟超書令遺仲叔瑇􅈘黒犀簪西京雜記曰武帝過李夫人就取玉􅆪搔頭宫中爭効之玉價倍貴漢鐃歌有所思曲曰有所思乃在大海南何以爲問遺􅀟珠玳􅈘􅆪白筆魏略曰明帝時嘗大㑹殿中御史簪白筆側階而坐上問左右此何官侍中辛毗對曰此謂御史舊簮筆以奏不法今但備官耳徐廣車服雜注曰}
