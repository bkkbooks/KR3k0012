  - {type: variant, offset: 121, length: 2, content: 劉盆, WYG: 宋遊道與頓丘李奬一面便善奬曰我年位已髙㑹用弟為佐史令弟北面於我足矣遊道曰不能既而奨為河南尹辟遊道為中正使者相屬以衣帢待之握手歡謔潘京别傳曰陳躭初為州主簿司空何次道帢偏岸謿躭頓帢有所蔽也應聲報曰躭頓以蔽有明府岸以示無冝都山川記曰鹽水上有石室民駱都到室邊採蜜見一仙人裙衫白帢坐見都凝瞻不轉𫝊}
