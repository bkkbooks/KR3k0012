  - {type: variant, offset: 1023, length: 509, content: 莽頭禿因施巾故里語曰王莽禿幘施屋傅暢晉公卿禮祑曰中書監令著介幘晉氏要事曰哀帝隆和元年太學博士曹弘之等議立秋應讀令不應著緗幘改為素英雄記曰公孫瓚字伯珪上計吏郡太守劉基以事公車徵伯珪褠衣平幘御車洛陽身執徒養張敞晉東宮舊事曰太子衣冠有空頂幘一擊虞決疑曰凡救日蝕者皆著赤幘以助陽也侍臣皆赤幘帶劍干寶搜神記曰昔魏武軍中無故作白幍此喪徵也初撗縫其前名之曰顏晉永嘉初乃去其縫名無顏幘其後二年四海分崩下人悲歎無顏以生也廣志曰交阯蒼梧俗以翡翠為幘董仲舒止雨書曰執事者赤幘由是言之知不著冠之所服也裴啟語林曰晉明帝年少不倫常微行詔喚人以衣幘迎之涉水過衣幘悉濕元帝已不重明帝忽復有此以為無不廢理既入幘不正元帝自為正之明帝大喜劉楨荅魏文帝書曰南垠之金登窈窕之首貂蟬之尾綴侍臣之幘魏武遺令曰吾有頭病自先著帽幘持大服如存時勿遣陸雲與兄書曰一日案行視曹公器物有一介幘如吳幘帽釋名曰帽冒也釋志曰楊阜字義山拜城門校尉嘗見明帝著帽披縹綾半䄂阜問帝曰此於禮何法服也帝默然不荅自是不法服不以見阜又曰管寧在家恒著皂帽布裙隨時單複魚豢魏略曰夫餘國以金銀飾帽韋昭吳書曰朱然破魏將李典等軍斬首五百級得鼓車三乘拜然左大司馬加錫御織成帽又曰陸遜破曹休於石亭還上脫翠帽以遺遜, SBCK: 隱}
