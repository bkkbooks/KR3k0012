  - {type: variant, offset: 53, length: 6, content: 幘古卑賤執事, SBCK: 侍中金蟬左貂金取堅剛}
  - {type: variant, offset: 53, length: 3, content: 幘古卑, WYG: 侍中金蟬左貂取金堅剛不耗蟬居髙食潔貂内勁悍而外温潤貂蟬不見傳記者因物論義予覽戰國䇿乃知為趙武靈王胡服也其後秦始皇破趙得其冠以賜侍中髙祖滅秦亦復如之後侍中皇權叅乗問貂璫何法不知其說復問地震云不為災還宫左遷議郎又曰中常侍秦官也漢興或用士人銀璫左貂世祖以來專用宦者右貂金璫漢書曰燕刺王旦郎中侍從着貂羽黄金附蟬又曰劉向上封事曰今王氏一姓乗朱輪華轂者二十三人皆青紫貂蟬充盈幄内又曰王莾篡位更漢制黑貂為黄貂又改漢家正臘日太后命去官属黑貂至漢家正臘月獨與其左右相對飲酒食肉晉書曰趙王倫簒位同謀者咸超階越次不可勝紀至於奴卒厮役亦加以爵位每朝㑹貂蟬盈坐故時諺曰貂不足狗尾續又曰劉聦破洛城將懐帝還平陽作赦書以六月十一日破洛羣王十二束手軍門貂蟬羽葆以充王府又曰阮孚字遥集為安東府叅軍蓬髪飲酒不以正務攖心後拜散騎常侍性既嗜酒常以金貂換酒為所司所彈帝宥之蕭子顯齊書曰侍中世為親近職魏晉選用稍増華重宋文帝元嘉中王曇首殷景仁等並為侍中情任親察景仁與帝接膝共話貂拂帝帝手抜貂置案上語畢復手挿之又曰王儉以朝儀草創衣服制則未有定凖議曰漢景六年梁王入朝中郎謁者金貂出入殿門左思魏都賦云藹藹列侍金貂齊光此藩國侍臣有之貂文又曰張敬兒被收敬兒脫冠貂投地曰用此物誤我又曰武陵昭王曄武帝即位歴中書祠部尚書巫覡或言􅁮有非常之相以此自負武帝聞之故無寵未嘗處方岳於御座曲宴醉伏地貂杪肉柈帝笑曰汗貂對曰陛下愛其羽毛而踈其骨肉帝不恱又曰何戢為侍中上欲轉戢領選問尚書令禇彦囬以戢資重欲加散騎常侍彦囬曰宋時王球從侍中中書令作吏部尚書資與戢相似領選職方昔小輕不容頓加常侍聖㫖每以蟬冕不宜過多臣與王儉既已左珥若復加戢則八座便有三貂若帖以驍游亦不為少迺以戢為吏部尚書加驍騎將軍又曰江淹累遷秘書監侍中衛尉卿初淹年十三孤貧常採薪以飬母曽於樵所得貂蟬一具將鬻以供飬其母曰此汝之休徴也汝才行若此豈長}
