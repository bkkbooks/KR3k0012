  - {type: variant, offset: 150, length: 116, content: 履髻也續漢書曰童子幘旡屋示未成人也半頭幘即空頂幘也其上無屋故以為名董仲舒繁露曰以赤統者幘尚赤盆子承漢統故用赤也東宮故事曰太子有空頂幘一枚即半頭幘之制也東觀漢記曰光武初起與諸李市弓弩絳衣赤幘又曰詔賜段熲赤幘大冠一具又曰馬援外類儻蕩簡易, SBCK: 遺髙祖結慇懃}
