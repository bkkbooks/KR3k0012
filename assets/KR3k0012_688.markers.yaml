  - {type: variant, offset: 267, length: 442, content: 內重禮事寡嫂雖在閨內必幘然後見又曰馬援初見帝令中黃門引入上在宣德殿南廡下但幘坐援曰陛下何知臣非剌客姦臣而簡易若是謝承後漢書曰巴祗字敬祖為楊州剌史黑幘毀壞不復改易以水澡墨傅而用之許慎說文曰澡洗也續漢書曰許劭字子將劭知人入幘肆拔樊子昭袁曄漢獻帝春秋曰孫堅屯梁東為董卓所攻眾少而不敵與其驍騎潰圍得出常著赤罽幘卓騎追堅堅脫罽幘令親近將祖茂著之堅從間道得去吳書曰顧悌字子通疾篤妻出省之悌命左右自扶起冠幘加襲令妻還貞潔不黷如此晉書曰庾顗字子嵩性儉家富劉輿說東海王越令就換錢千萬冀其有吝因此可乘越於眾坐中問顗顗頹然已醉幘墮机上以頭就穿取徐荅云下官家故有兩千萬隨公所取矣輿於是乃服越甚悅又曰易雄字興長長沙劉陽人也少為縣吏自念卑賤無由自達乃脫幘挂縣門而去宋書曰檀道濟數拒魏有功及誅憤怒氣盛目光如炬俄爾間引飲一斛乃脫幘投地曰乃壞汝萬里長城齊書曰卞彬字士蔚濟陰宛昫人也祖嗣之中領軍父延之弱冠為上虞令有剛氣會稽太守孟彭以令長裁之積不能容脫幘投地曰我所以屈卿者政為此幘耳今已投之卿以一世勳門而慠天下國士拂衣而去, SBCK: 别}
