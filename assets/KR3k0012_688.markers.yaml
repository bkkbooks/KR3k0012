  - {type: variant, offset: 2727, length: 26, content: 二十成人士冠庶人巾當自謹修四教也方言曰兩複結謂之幘巾, SBCK: 鈔髮使上}
  - {type: variant, offset: 2727, length: 26, content: 二十成人士冠庶人巾當自謹修四教也方言曰兩複結謂之幘巾, krp: 鈔髮使上}
  - {type: variant, offset: 2729, length: 881, content: 成人士冠庶人巾當自謹修四教也方言曰兩複結謂之幘巾或謂之承露巾或謂覆髮巾也續漢書曰鉅鹿張角自稱天師弟子數十萬人始起兵皆著黃巾以相識別故世謂黃巾賊後漢書曰光武徵鮑永永疑不至及更始亡乃發去上將軍列侯印綬悉罷兵但幅巾與諸將詣河內幅巾謂不著冠但幅巾束首也又曰何進袁隗欲特表陳寔以不次之位寔謝曰久絕人事飾巾待終而已又曰曹操既猜嫌忌孔融令丞相軍謀祭酒路粹枉狀奏融云位為九列不遵朝儀禿巾微行唐突宮掖魏志曰諸葛亮出斜谷司馬宣王拒之堅壁不與戰亮致巾幗婦人之飾以怒宣王又曰華歆為豫章太守孫策略地江東歆知策善用兵乃幅巾迎策蜀書曰諸葛武侯與宣王在渭濱將戰宣王戎服涖事使人視武侯乘素輿葛巾毛扇指麾三軍皆隨其進止宣王聞而嘆曰可謂名士矣鄧粲晉書曰王敦欲伐甘卓遣使送大巾又曰謝萬字萬石簡文辟為從事中郎著白綸巾鶴氅裘版而前帝與談移日沈約宋書曰陶潛在家郡將侯潛值其酒熟取頭上葛巾漉酒還暴著之梁書曰武帝賜陶弘景以鹿皮巾後屢加禮聘並不出又曰賀德基少遊學都下積年不歸衣資罄乏又恥服故弊盛冬止衣裌襦袴嘗於白馬寺前逢一婦人容服甚盛呼德基入寺門脫白綸巾以贈之仍謂曰君方為重器不久貧寒故以此相遺耳問姓名不荅而去又曰武帝與何點有舊及踐祚手詔論舊賜以鹿皮巾等召之點以巾褐引入華林園又曰王僧孺遷尚書左丞俄兼御史中丞僧孺幼貧其母鬻紗巾以自業後周書曰宣政元年初服常冠以皂紗為之加簪而不施纓其制若今之折角巾也唐書曰張易之同休嘗請公王大臣宴於司禮寺因謂御史大夫楊再思曰公面似高麗請作高麗舞再思忻然剪紙自帖其巾反紫袍遂作之陸翽鄴中記曰皇后出女騎一千為鹵簿冬月皆著紫綸巾孰錦袴褶郭林宗別傳曰林宗嘗行陳梁間遇雨故其巾一角坫而折二國學士著巾莫不折其角云作林宗巾其見儀則如此傅子曰漢末王公多以幅巾為雅是以袁紹之徒雖為將帥皆著縑巾張華博物志曰魏文帝彈棊能用手巾角時有一書生又能低頭以所冠葛巾角撇棊羊祜與從弟護軍書曰年已朽老既定邊事當角巾東路還歸鄉里接離郭璞注爾雅曰白鷺翅上有長翰毛江東取為接離世說曰山簡為荊州時酣暢人為之歌曰山公時一醉逕造高陽池日暮倒戴歸酩酊無所知時復乘駿馬倒著白接離舉手謝葛強何如并州兒高陽池在襄陽強是其愛將并州人也鄣日晉, WYG: ''}
