  - {type: variant, offset: 2960, length: 293, content: 守孫策略地江東歆知策善用兵乃幅巾迎策蜀書曰諸葛武侯與宣王在渭濱將戰宣王戎服涖事使人視武侯乘素輿葛巾毛扇指麾三軍皆隨其進止宣王聞而嘆曰可謂名士矣鄧粲晉書曰王敦欲伐甘卓遣使送大巾又曰謝萬字萬石簡文辟為從事中郎著白綸巾鶴氅裘版而前帝與談移日沈約宋書曰陶潛在家郡將侯潛值其酒熟取頭上葛巾漉酒還暴著之梁書曰武帝賜陶弘景以鹿皮巾後屢加禮聘並不出又曰賀德基少遊學都下積年不歸衣資罄乏又恥服故弊盛冬止衣裌襦袴嘗於白馬寺前逢一婦人容服甚盛呼德基入寺門脫白綸巾以贈之仍謂曰君方為重器不久貧寒故以此相遺耳問姓名不荅而去又曰武帝與何點有舊及踐祚手詔論舊賜以鹿皮巾等召之點以巾褐引入華林園又曰王僧孺遷尚書左丞俄兼, SBCK: 平}
