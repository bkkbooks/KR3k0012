  - {type: variant, offset: 66, length: 6, content: 徐廣輿服雜注, SBCK: 其後秦始皇破趙得其冠以賜侍中髙祖滅秦亦復如之末侍中皇權叅乗問貂璫何法不知其􅀃復問地震云不爲災還宫左遷議郎又}
  - {type: page-break, offset: 66, content: '', id: KR3k0012_SBCK_688-1b}
  - {type: variant, offset: 66, length: 0, content: '', WYG: 又曰陸雲公善奕棋常夜侍坐武帝冠觸燭火帝笑謂曰燭燒卿貂帝將因為侍中故以此戱之後魏書曰神龜元年詔加女侍中貂蟬同外侍中之飾任城王澄上表諫曰髙祖世宗皆有女侍中官未見綴金蟬於象揥珥鼲貂於鬚髪江南偽晉穆何后有女尚書而加貂璫此乃衰亂之世妖妄之服請依常儀追還前詔帝從之鄴中記曰石虎征討所得婦人美色萬餘選為女侍中着貂璫直皇后劉楨答魏文帝牋曰貂鼲之尾挂侍臣之幘潘岳秋興賦曰登春臺之熙熙珥金貂之烱烱成公綏七唱曰金鐺煌煌貂珥峨峨孫楚㑹王侍中座上詩曰顯允君子時推英邵𤣥貂左移華蟬増曜簮導釋名曰簮兟也以簪連冠於髪也導所以導擽鬢髪使入巾幘之裏也或曰擽鬢以事名之也服䖍通俗文曰幘導曰簮史記曰趙平原君使人於春申君趙使欲誇楚為玳瑁簮春申君客三千餘人上客皆玳簮躡珠履趙使大慙也又曰李斯上書曰宛珠之簮傅璣之珥漢書曰上從館陶公主飲上曰願謁主人公主乃下殿去簮珥徒跣頓首自引董君董君隨主前伏殿下又劉向列女傳曰周宣姜后齊女也宣王常晏起姜后脫簮珥待罪於永巷也又佞幸傳曰景帝没入鄧通家財一簮不得着身燕書曰髙祖慕容廆晉安北將軍張華雅有人鑒鎮薊撫御諸部髙祖童兒往見華甚異之謂髙祖曰君後為濟世之器匡難濟時者也脫所着幘簮以遺髙祖慇懃而别梁書曰羊侃家妓孫荆玉能反腰至地衘得席上玉簮後魏書曰胡太后幸闕口温水登鷄頭山自射象牙簮一發中之董巴漢輿服志曰太皇太后入朝服紺上皂簪以玳瑁為擿長一尺端為華勝上為鳯凰爵以翡翠為毛羽下有白珠垂黄金鑷左右各一横簮之以安幗結諸簮珥皆同又曰公卿列侯中二千石夫人玵繒幗黄金龍首衘白珠魚須擿長一尺為簮江表傳曰魏文帝遣使於吳求通犀簮羣臣曰貢有常典魏所求非法冝勿與孫權曰彼在諒闇之中而所求若此寧可復與言禮皆備以付使韓詩外傳云孔子遊少原之野有婦人中澤而哭夫子怪之使弟子問焉婦人對曰向日刈蓍薪而亡簮是以哀孔子曰刈蓍而亡簪有何悲焉婦人曰非傷亡簮吾所悲者不忘故也淮南子曰楚將子發好伎道之士有善為偷者往見子發子發禮之無幾何齊伐楚子發將軍當之兵三却齊師逾强於是善偷者夜出取幘明夕取枕明夕又取簮悉歸之齊師大駭謀曰今夕不去楚軍恐取吾首還師而去之故伎無細能無簿在人君用之也鹽鉄論曰禹治水過門不入當此之時堕簮不顧郭子横洞冥記曰帝好㣲行於長安城西夜見一玉螭遊於路董謁曰昔桀媚末喜於膝上以金簮貫玉螭腹為戯弄今螭腹有金穿痕安知非此耶神仙傳曰左慈能分盃飲酒曹公聞試之慈拔簮以畵盃即斷其間相去數寸幽明録曰孫權時南方遣使獻簮吏過宫亭湖廬山君廟請福神下教求簪吏叩頭曰簮獻天子必乞哀念神云臨入石頭當相還吏遂去逹石頭有三尺鯉魚跳入船吏破腹得之呉均續齊諧記曰東海蔣潜嘗至不其縣於野林中見一死人鳥来食之輙見一小兒長三尺許来驅鳥乃起去潜乃往視之見有犀導乃拔取衆鳥争集無復驅者夢書曰簮者為身簮者已之尊也夢着投簮身歡喜班固與竇憲牋曰將軍哀憐賜以玉躬所喜駭玳瑁簮絳單衣以魯縞之質被服鸞鳯之彩飾諸葛恢集詔荅恢曰今送一犀導小物耳然是情發於中則寄乎物班固與弟超書令遺仲叔玳瑁黑犀簮西京雜記曰武帝過李夫人就取玉簮搔頭宫人争效之玉價倍貴漢鐃歌有所思曲曰有所思乃在大海南何以為問遺雙珠玳瑁簮白筆魏畧曰明帝時常大㑹殿中御史簮白筆側階而坐上問左右此何官侍中辛毗對曰此謂御史舊簮筆以奏不法今但備官耳}
