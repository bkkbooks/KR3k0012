  - {type: variant, offset: 90, length: 10, content: 主飲董偃綠幘傅韝伏殿, WYG: 夫子䘮議曰今白帢深或當右弟服至尊臨弔謂深𤣥而已崔鴻十六國春秋西凉録曰燉煌父老令孤熾夢白頭公衣帢謂熾曰南風動吹長木胡桐權不中轂言訖忽然不見李歆小字桐權至期而亡南史曰何𦙍夢見神女二十許人並衣帢行列在前俱拜牀}
