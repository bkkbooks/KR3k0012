  - {type: variant, offset: 84, length: 0, content: '', krp: 燕王旦郎中侍從着貂羽黄金附蟬又曰劉向上封事曰今王氏一姓乗朱輪華轂者二十三人皆青紫貂蟬充盈幄内又曰王莽簒位更漢黒貂爲黄貂又改漢正朔臘日太后命其官屬黒貂至漢家正臘日獨與其左右相對飲酒食肉晉書曰趙王倫簒位同謀者咸超階越次不可勝紀至於奴卒厮役亦加以爵位每朝㑹貂蟬盈坐故時喭曰貂不足狗尾續又曰劉聦破洛城將壞帝還平陽作赦書以六月十一日破洛羣王十二束手軍門貂蟬羽葆以充王府又曰阮孚字遥集爲安東府叅軍蓬髮飲酒不以王務嬰心後拜散騎常侍性旣嗜酒常以金貂換酒爲所司所彈帝宥之蕭子顯齊書曰侍中丗爲親近職魏晉選用稍増華重宋文帝元嘉中王曇首殷景仁等並爲侍中情任親宻景仁與帝接膝共語貂拂帝帝手抜貂置案上語畢復手挿之又曰王儉以朝儀草創衣服制則未有定凖議曰漢景六年梁王入朝中郎謁者金貂出入殿門左思魏都賦云藹藹列侍金貂齊光此藩國侍臣有貂明文又曰張敬兒𬒳收敬兒脱冠貂投地曰用此物誤我又曰武陵昭王曄}
  - {type: variant, offset: 86, length: 0, content: '', SBCK: 即位歷中書祠部尚書巫覡或言曄有非常之相以此自􅀒武帝聞之故無寵未嘗處方岳於御座曲宴醉伏地貂抄肉柈帝􅀏曰汙貂對曰陛下愛其順毛而踈其骨肉帝不恱又曰何戢爲侍中上欲轉戢領選問尚書令禇彦回以戢資重欲加散􅀐常侍彦回曰宋時王球從侍中中書令單作吏部尚書資與戢相似領選職方昔小輕不容頓加常侍聖旨毎以蟬冕不冝過多臣與旣巳左珥若復加戢則八座便有三蟬􅀂帖以驍游亦不爲少廼以戢爲吏部尚書加驍􅀐將軍又曰江淹累遷秘書􅁥侍中衛尉卿􅀄淹年十三時􅀌貧嘗採薪以養母曽於樵所得貂蟬一具將鬻以供養其母曰此故汝之休徴也汝才行􅀂此豈長賤耶可留待得侍中著之至是果如母言又曰周盤龍爲東平太守求解職見許還爲散􅀐常侍武帝戯之卿著貂蟬何如兠鍪盤龍曰此貂蟬從兠鍪中生耳梁書朱异除中書郎時秋日始拜有飛蟬正集异武冠上時咸謂蟬珥之兆後果如其言又曰王䂓爲􅀳安王長史王立爲太子仍爲散􅀐常侍太子中庶子侍東宮太子賜以所服貂蟬并降令書恱是舉也又曰陸雲善弈棊常夜侍坐武帝冠觸燭火帝􅀏謂曰燭燒卿貂帝將用爲侍中故以此戯之後魏書曰神􅀛元年詔加女侍中貂蟬同外侍中之飾任城王澄上表諌曰髙祖世宗皆有女侍中官未見綴金蟬於象珥極鼲貂於􅂡髮江南僞晉穆何后有女尚書而加貂璫此乃衰亂之世妭妄之服請依常儀追還前詔帝從之鄴中記曰石虎征討所得婦女美色萬餘選爲女侍中着貂璫直皇后劉楨荅魏文帝牋曰貂鼲之尾挂侍臣之幘潘岳興賦曰登春臺之熈熈珥金貂之熲熲成公綏七唱曰金鐺煌煌貂珥峩峩也孫楚㑹王侍中座上詩曰顯允君子時惟英邵玄貂左移華蟬増曜簮導釋名曰簪連也所以簪冠於髮也導所以導掠鬢髮使入巾幘之裏也或曰掠􅁂以事名之也服䖍通俗文曰幘導曰簪史記曰趙平原君使人於春申君趙使欲夸楚爲玳􅈘簪春申君客三千餘人上客皆玳􅆪躡珠履趙使大慙也又曰李斯上書曰宛珠之􅆪傳璣之珥漢書曰上}
