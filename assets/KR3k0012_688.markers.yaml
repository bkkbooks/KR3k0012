  - {type: variant, offset: 57, length: 3, content: 執事不, WYG: 耶可留待得侍中着之至是果如母言又曰周盤龍為東平太守求觧職見許還為散騎常侍武帝戱曰卿着貂蟬何如兠鍪盤龍曰此貂蟬從兠鍪中生耳梁書朱弁除中書郎時秋日始拜有飛蟬正集弁武}
