  - {type: variant, offset: 211, length: 0, content: '', WYG: 和中文明太后崩齊遣其散騎常侍裴昭明謝峻等弔欲以朝服行事主客不許昭明等執志不移孝文勅尚書李冲選一與識者更與論執冲奏遣成淹昭明曰不聽朝服行禮議出何典淹曰𤣥冠不弔童孺共聞季孫將行請遭䘮之禮千載之下猶共稱之卿方謂議出何典何其異哉昭明曰唯賫袴褶不可以弔幸借衣幍以申國衆敕送衣幍給昭明等明早引入皆令文武盡哀後魏書裴植傳曰植母夏侯道遷姊也性甚剛峻於諸}
