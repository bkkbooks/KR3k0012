  - {type: variant, offset: 84, length: 0, content: '', SBCK: 燕王旦郎中侍從着貂羽黄金附蟬又曰劉向上封事曰今王氏一姓乗朱輪華轂者二十三人皆青紫貂蟬充盈幄内又曰王莽簒位更漢黒貂爲黄貂又改漢正朔臘日太后命其官屬黒貂至漢家正臘日獨與其左右相對飲酒食􅁏晉書曰趙王倫簒位同謀者咸超階越次不可勝紀至於奴卒厮役亦加以爵位每朝㑹貂蟬盈坐故時喭曰貂不足狗尾續又曰劉聦破洛城將壞帝還平陽作赦書以六月十一日破洛羣王十二束手軍門貂蟬羽葆以充王府又曰阮孚字遥集爲安東府叅軍蓬髮飲酒不以王務嬰心後拜散􅀐常侍性旣􅄝酒常以金貂換酒爲所司所彈帝宥之蕭子顯齊書曰侍中丗爲親近職魏晉選用稍増華重宋文帝元嘉中王曇首殷景仁等並爲侍中情任親宻景仁與帝接􅂰共語貂拂帝帝手抜貂置案上語畢復手挿之又曰王儉以朝儀草創衣服制則未有定凖議曰漢景六年梁王入朝中郎謁者金貂出入殿門左思魏都賦云藹藹列侍金貂齊光此藩國侍臣有貂明文又曰張敬兒􅀍收敬兒脱冠貂投地曰用此物誤我又曰武陵昭王曄}
