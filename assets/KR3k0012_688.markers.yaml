  - {type: variant, offset: 525, length: 1148, content: 就穿取徐荅云下官家故有兩千萬隨公所取矣輿於是乃服越甚悅又曰易雄字興長長沙劉陽人也少為縣吏自念卑賤無由自達乃脫幘挂縣門而去宋書曰檀道濟數拒魏有功及誅憤怒氣盛目光如炬俄爾間引飲一斛乃脫幘投地曰乃壞汝萬里長城齊書曰卞彬字士蔚濟陰宛昫人也祖嗣之中領軍父延之弱冠為上虞令有剛氣會稽太守孟彭以令長裁之積不能容脫幘投地曰我所以屈卿者政為此幘耳今已投之卿以一世勳門而慠天下國士拂衣而去梁書曰謝舉臨川始興諸王常所遊踐邵陵王綸於婁湖立園廣讌酒後好聚眾賓冠手自裂破投之唾壺皆莫敢言舉嘗預宴王欲取舉幘舉正色曰裂冠毀冕下官弗敢聞命拂衣而退王屢召不反甚有慚色北齊書曰平秦王歸彥額骨三道著幘不安文宣見之怒使以馬鞭擊其額血被面曰爾反時嘗以此骨嚇漢後歸彥竟反云漢官儀曰謁者著緗幘大冠司馬彪續漢書曰梁冀改易輿服之制作平上軿車庳幘狹冠也衛宏漢舊儀曰凡齋紺幘耕青幘周遷輿服雜事曰漢桓帝延熙中梁冀誅後京師作幘皆顏短耳長短上長下以為服祑董巴漢輿服志曰古者有冠無幘秦加其武將首飾為絳柏以表貴賤後稍作顏題漢興續其顏卻結之施巾連題卻覆之今喪幘是也至孝文乃高顏續為之耳崇其巾為屋貴賤皆服之蔡邕獨斷曰漢元帝額有壯髮不欲使人見始進幘服群臣皆隨焉尚無巾王莽頭禿因施巾故里語曰王莽禿幘施屋傅暢晉公卿禮祑曰中書監令著介幘晉氏要事曰哀帝隆和元年太學博士曹弘之等議立秋應讀令不應著緗幘改為素英雄記曰公孫瓚字伯珪上計吏郡太守劉基以事公車徵伯珪褠衣平幘御車洛陽身執徒養張敞晉東宮舊事曰太子衣冠有空頂幘一擊虞決疑曰凡救日蝕者皆著赤幘以助陽也侍臣皆赤幘帶劍干寶搜神記曰昔魏武軍中無故作白幍此喪徵也初撗縫其前名之曰顏晉永嘉初乃去其縫名無顏幘其後二年四海分崩下人悲歎無顏以生也廣志曰交阯蒼梧俗以翡翠為幘董仲舒止雨書曰執事者赤幘由是言之知不著冠之所服也裴啟語林曰晉明帝年少不倫常微行詔喚人以衣幘迎之涉水過衣幘悉濕元帝已不重明帝忽復有此以為無不廢理既入幘不正元帝自為正之明帝大喜劉楨荅魏文帝書曰南垠之金登窈窕之首貂蟬之尾綴侍臣之幘魏武遺令曰吾有頭病自先著帽幘持大服如存時勿遣陸雲與兄書曰一日案行視曹公器物有一介幘如吳幘帽釋名曰帽冒也釋志曰楊阜字義山拜城門校尉嘗見明帝著帽披縹綾半䄂阜問帝曰此於禮何法服也帝默然不荅自是不法服不以見阜又曰管寧在家恒著皂帽布裙隨時單複魚豢魏略曰夫餘國以金銀飾帽韋昭吳書曰朱然破魏將李典等軍斬首五百級得鼓車三乘拜然左大司馬加錫御織成帽又曰陸遜破曹休於石亭還上脫翠帽以遺遜晉書曰王濛字仲祖美姿容居貧帽敗自入肆買之嫗悅其貌爭遺新帽蕭方等三十國春秋曰石季龍將獵輒冠金縷之帽又陸翽鄴中記云季龍獵著金縷織成合歡帽宋書曰沈慶之隨宗愨等伐沔北諸山蠻大破之威震諸山群蠻皆稽顙慶之患頭風好著狐皮帽群蠻惡之號曰蒼頭公又曰元凶劭始生三日帝往視之簪帽甚堅無風而墜于劭側上不悅又, WYG: 繁欽情詩}
