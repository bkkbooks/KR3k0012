  - {type: variant, offset: 3254, length: 356, content: 史中丞僧孺幼貧其母鬻紗巾以自業後周書曰宣政元年初服常冠以皂紗為之加簪而不施纓其制若今之折角巾也唐書曰張易之同休嘗請公王大臣宴於司禮寺因謂御史大夫楊再思曰公面似高麗請作高麗舞再思忻然剪紙自帖其巾反紫袍遂作之陸翽鄴中記曰皇后出女騎一千為鹵簿冬月皆著紫綸巾孰錦袴褶郭林宗別傳曰林宗嘗行陳梁間遇雨故其巾一角坫而折二國學士著巾莫不折其角云作林宗巾其見儀則如此傅子曰漢末王公多以幅巾為雅是以袁紹之徒雖為將帥皆著縑巾張華博物志曰魏文帝彈棊能用手巾角時有一書生又能低頭以所冠葛巾角撇棊羊祜與從弟護軍書曰年已朽老既定邊事當角巾東路還歸鄉里接離郭璞注爾雅曰白鷺翅上有長翰毛江東取為接離世說曰山簡為荊州時酣暢人為之歌曰山公時一醉逕造高陽池日暮倒戴歸酩酊無所知時復乘駿馬倒著白接離舉手謝葛強何如并州兒高陽池在襄陽強是其愛將并州人也鄣日晉, SBCK: 覽卷第六百}
