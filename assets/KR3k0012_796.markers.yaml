  - {type: variant, offset: 2343, length: 622, content: 上東南與波斯接地方萬餘里列城四百邑連屬其宮宇柱梲多以水精瑠璃為之有貴臣十二人共理國政常使一人將囊隨王車百姓有事即以書投囊中王還宮省發理其枉直其王無常人簡賢者而立之國中災異及風雨不時輒廢而更立王冠形如烏舉翼冠及纓絡皆綴以珠寶著錦繡衣前不開襟坐金花床有一鳥似鵝其毛綠色常在王邊倚枕上坐每進食有毒其鳥輒鳴其都城疊石為之尤絕高峻凡有十萬餘戶南臨大海城東面有一大門其高二十餘丈自上及下飾以黃金光輝昭爛連曜數里自外至王室凡有大門三重列異寶雕飾第二門之樓中懸一大金秤以金九十二枚屬於衡端以候日之十二時焉為一金人其大如人立於側每至一時其金丸輒落鏗然發聲引唱以紀日時毫釐無失其殿以瑟瑟為柱黃金為地象牙為門扇香木為棟梁其俗無瓦擣白石為末羅之塗握上其堅密光潤還如玉石至於盛暑之節人厭囂熱乃引水潛流上遍於屋宇機制巧密人莫之知觀者唯聞屋上泉鳴俄見四簷飛溜懸波如瀑布激氣成涼風其巧妙如此風俗男子剪髮披帔而右袓婦人不開衿錦為頭巾家資滿億封以上位有羊羔生於土中其國人候其欲萌乃築墻以院之防外獸所食也然其臍與地連割之則死唯人著甲走馬及擊鼓以駭之其羔驚鳴而臍絕便逐水草俗皆髡而衣繡乘輜軿白蓋小車出入擊鼓建旌旗幡幟土多金銀奇寶有夜光璧明月珠駭雞犀大貝車渠馬腦孔翠珊瑚虎魄凡西域諸珍異多出其國又曰貞觀十七年佛䔉王波多力遣使獻赤頗黎綠頗黎石綠金精等物太宗降璽書荅慰賜以綾綺又曰開元七年正月其王遣吐火羅大首領獻師子零羊各二不數月又遣大德僧來朝貢吐火羅北史曰吐火羅國都葱嶺西五百里與挹恒雜居, SBCK: 族􅀋}
