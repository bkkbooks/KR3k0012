  - {type: variant, offset: 3386, length: 185, content: 郍陵提婆見之大喜與義表同出觀阿耆婆沴池周廻二十餘步水常沸涌雖流潦暴集爍石焦金未嘗增減以物投之即生煙熖懸釜而炊須臾而熟大食唐書曰大食國本在波斯之西大業中有波斯胡人牧駞於俱紛摩地郍之山忽有師子人語謂之曰此山西有三穴穴中有大兵器汝可取之穴中并有異石白文讀之便作王位胡人依言果見穴中有石及矟刃甚多上有文教其反叛於是糺合亡命渡常曷水劫奪商旅其眾漸盛遂割據波斯西境自立為王永徽二年始, SBCK: ''}
