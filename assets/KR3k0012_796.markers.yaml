  - {type: variant, offset: 59, length: 2, content: 烏孫, SBCK: 波知國在鉢和西南土狹人貧依託山谷其王不能揔攝有大池傳曰大池有龍王次者有龍婦小者有龍子行人經之設􅀕乃得過不􅀕多值風雪之困栗弋通典曰栗弋後魏通焉在葱嶺西大國一名栗特一名拘夢出名馬牛羊珎菓蒲陶酒其土地水美故也有大禾髙丈餘子如胡豆在安息北五千里附庸小國四百餘城太武帝時遣使朝貢悉}
  - {type: variant, offset: 59, length: 2, content: 烏孫, WYG: 波知國在鉢和西南土狭人貧依託山谷其王不能總攝有三池𫝊曰大者有龍王次者有龍婦小者有龍子行人經之設祭乃得過不祭多值風雪之困栗弋通典曰栗弋後魏通焉在葱嶺西大國一名栗特一名指夢出名馬牛羊珎果蒲萄酒其土地水美故也有大禾髙丈餘子如胡豆在安息北五千里附庸小國四百餘城太武帝時遣使朝貢悉}
