  - {type: variant, offset: 433, length: 152, content: 商大將軍王鳳及百寮議數日不決上召陳湯問對曰臣以為此必無可憂夫胡兵五而當漢兵一刃札鈍弓弩不利今聞頗得漢工然而猶三當一又兵法曰客倍而主人半然後料敵今烏孫人眾不足以勝會宗惟陛下勿憂且兵輕行五十里重行三十里今會宗發城郭燉煌兵歷時而至所謂報讎之兵非救急之用也烏孫瓦合不能久攻不過五日當有吉語聞居四日軍書至言已解悅般, SBCK: 死則更鑄蒲山}
