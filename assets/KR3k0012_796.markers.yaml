  - {type: variant, offset: 1862, length: 182, content: 海十餘里有魚鹽蒲葦之饒又曰後魏太武怒之詔成周公万度歸討之鳩尸畢郍以四五萬人出城守險以距度歸募壯勇短兵直往衝鳩尸畢郍眾大潰進屠其城西鄙諸戎皆來降服獲其珍奇異翫殊方譎詭難識之物巨萬時太武幸陰山北宮度歸破焉耆露板至帝省訖賜司徒崔浩書曰万度歸以五千騎經五千里拔焉耆三城獲其珍奇異物及諸委積不可勝數自古帝王雖云西戎即序有如指注不能控引也朕今手把而有之如何浩書上稱美隋書曰焉耆, SBCK: 康}
