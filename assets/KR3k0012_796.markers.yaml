  - {type: variant, offset: 1263, length: 450, content: 或竄山野自周氏滅宕昌鄧至之後党項始強其界東至松州西接葉護南雜舂桑迷桑等羗北連吐谷渾處山谷間延亙三千里其種每姓別為部落一姓之中復為小部落大者萬騎小者千騎不相統一有細封氏費聽氏頗超氏野辭氏采擒氏拓拔氏最為強族俗皆土著居有棟宇其屋織犛毛及羊毛覆之每年一易俗尚武無法令賦役其人多壽年至百五六十歲不事產業好為盜互相凌劫尤重復讎若讎人未得必蓬頭垢面跣足蔬食要斬讎人而後復常男女並衣裘褐仍披大氈養驢羊以供其食不知耕稼土無五穀氣候多風寒五月草始生八月霜雪降求大麥於他界醞以為酒妻其庶母及伯叔母嫂子弟之婦淫穢蒸報諸夷中最為甚自周及隋或叛或朝常為邊患貞觀三年南會州都督鄭元璹遣使招諭其酋長細封步賴舉部內附太宗降璽書慰撫之步賴因即來朝宴賜甚厚列其地為軌州拜步賴為刺史仍請率所部封吐谷渾其後諸姓酋長相次率部落皆來內屬請同編戶太宗厚加撫慰列其地為崌音居奉巖遠四州各拜其首領為刺史又曰有黑党項在於赤水之西李靖之擊吐谷渾也渾主伏允奔于黑党項居以空閑之地及吐谷渾舉國內屬黑党項酋長號敦善王因貢方物又有雪山之下及白狗舂桑白蘭等諸羗焉耆, SBCK: ''}
