  - {type: variant, offset: 2104, length: 3, content: 復請開, SBCK: 漕國北史曰漕國在葱嶺之北漢時􅄢賔國也其王姓昭武字順逹康國王之宗族也都城方四里勝兵萬餘人國法嚴峻俗重􅁋祠葱嶺山順天神者儀制極華以金爲屋以銀爲地祠者曰有千餘人祠前有一魚骨其孔中通馬出入國王戴金牛頭冠坐金烏座土多稻粟豆麥饒象馬封牛金銀􅣱鐵氍㲣朱砂青黛安息青木等香黒塩阿魏東去刼國七百里}
  - {type: variant, offset: 2104, length: 3, content: 復請開, WYG: 漕國北史曰漕國在葱嶺之北漢時􅄢賔國也其王姓昭武字順逹康國王之宗族也都城方四里勝兵萬餘人國法嚴峻俗重淫祠葱嶺山順天神者儀制極華以金爲屋以銀爲地祠者日有千餘人祠前有一魚脊骨有孔中通馬出入國王戴金牛頭冠坐金馬座土多稻粟豆麥饒象馬犎牛金銀鑌鐡氍㲣朱砂青黛安息青木等香黒鹽阿魏東去刼國七百里}
