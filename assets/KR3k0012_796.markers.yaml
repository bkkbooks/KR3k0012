  - {type: variant, offset: 35, length: 1, content: 多, SBCK: 人計欲自託於漢又欲得公孫心即上書請万年爲莎車王漢許之遣使者奚充國送萬年万年􅀄立􅁀惡國人不說莎車王弟呼屠微殺万年并漢使者自立爲王約諸國背漢㑹衛侯馮奉丗使送大宛客即以便冝發諸國兵擊殺之更立他昆弟子爲莎車王又曰馮奉丗至宛宛聞其斬莎車王禮之異於他使得其名}
