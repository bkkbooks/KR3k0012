  - {type: variant, offset: 3039, length: 8, content: 高宗永徽初遣使獻, SBCK: 短人魏時聞焉在康居西北男女皆長三尺人衆甚多去奄蔡諸國甚逺康居長老傳聞嘗有啇旅行北方迷惑失道而到此國國中甚多真珠夜光明月珠其國去康居可萬餘里突厥本末記云自突厥北行一月有短人國長者不踰三尺亦有二尺者頭少毛髮􅀂羊胞之狀突厥呼爲羊胞頭其傍無它種􅀋相侵俗無㓂盗但有}
  - {type: variant, offset: 3039, length: 8, content: 高宗永徽初遣使獻, WYG: 短人魏時聞焉在康居西北男女皆三尺人衆甚去奄蔡諸國甚逺康居長老𫝊聞常有商旅行北方迷惑道而到此國國中甚多珎寳夜光明月之珠其國去康居可萬餘里􅊳厥本末記云自突厥北行一月有短人國長者不踰三尺亦有一尺者頭少毛髮若羊胞之狀突厥呼為羊胞頭其傍無他種類相侵俗無冦盗但有}
