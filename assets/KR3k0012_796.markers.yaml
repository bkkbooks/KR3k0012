  - {type: variant, offset: 710, length: 289, content: 南界有大山山傍石皆燋鎔流地數十里乃凝堅人取以為藥即石流黃也與蠕蠕結好其王嘗將數千人入蠕蠕國欲與大檀相見入界百餘里見其部人不浣衣不絆髮不洗手婦人口舐器物王謂其從臣曰汝曹誑我將我入此狗國中乃馳還大檀遣騎追之不及自是相仇讎數相征討後魏大武真君九年遣使朝獻并送幻人稱能割人喉脈令斷擊人頭令骨陷皆血出數升或盈斗以草藥內其口中令嚼咽之須臾血止養瘡一月復常又無痕瘢世疑其虛乃取死罪囚試之皆驗云中國諸名山皆有此草乃使人受其術而厚遇之又言其國有大術者蠕蠕凍死漂亡者十二三是歲再遣使朝貢求與官軍東西齊契討蠕蠕太武嘉其意命中外諸軍戒嚴以淮南王他為前鋒襲蠕蠕仍詔有司以其鼓儛之節施於樂府自後每使朝貢迷蜜, SBCK: 賖弥}
