  - {type: variant, offset: 595, length: 0, content: '', SBCK: 南三里有凍凌山後役屬于闐刼國通典曰刼國隋時聞焉在葱嶺中南西與俱賖弥國界接西北至悒怛國去長安萬二千里有户數萬氣候熱有稻麥粟豆羊馬出洛沙青黛婚姻同突厥死亡弃於山谷又曰大唐武德二年遣使貢寳帶金鏁頗梨水精盃各一頗梨四百九十枚大小有差獠魏書曰獠之􅀄也出自梁益之間種􅀋甚多散居山谷略無氏族之別依樹積水以居其上名曰干蘭干蘭大小隨其家之口數往往推一長者爲王父死則子継􅀂中國之黨族也僚王各有鼓角一􅀟使其子弟自吹擊之好相殺害多仇怨不敢逺行性同禽獸至於忿怒父子不相避唯手有兵刃者先殺之􅀂殺其父走避於外求得一狗以謝其母然後敢歸母得狗謝不復嫌恨􅀂報死心相攻擊必殺而食之平常刼掠責取猪狗而巳親戚比隣指授相賣土兒女􅂘止便不復追思唯執楯持矛不識弓矢用竹爲簧群聚鼓之以爲音節能爲細布色鮮浄大狗一頭買一生口其俗畏􅀑神尤尚􅁋祀所殺之人美髯髯者剥其面皮籠之於竹及燥號曰􅀑鼓舞祀之以求福也北史曰獠者蓋南蠻之別種自漢中逹于卭笮川洞之間所在皆有種􅀋甚多所生男女無名字唯以長㓜次第呼之其丈夫稱阿謩阿叚婦人阿夷阿等之􅀋皆語之次第稱謂也鑄銅爲器大口寛腹名曰銅㸑旣薄且輕易於熟食建國中李勢在蜀諸獠始出巴西渠川廣漢陽安資中攻破郡縣爲益州大患自桓温破蜀之後蜀人東流山險之地多空獠遂挾山傍谷與夏人叅居者頗輸租賦在深山者不爲編户梁益二州歳伐獠以禆潤公私頗藉爲利正始中夏侯道遷舉漢中内附宣武遣尚書邢蠻爲梁益二州刺史以鎮之近夏人者安堵樂業在山谷者不敢爲㓂其後朝廷以梁益二州控攝嶮逺方乃立巴州以統諸獠後以巴酋嚴始欣爲刺史又立隆城鎮所綰獠二十萬户及周文平梁益令在所撫慰然天性􅁀亂旋致擾動毎歳命隨近州鎮出兵討之獲其生口以充賤􅀠謂之爲厭獠焉永昌郡傳曰獠民喜食人以爲至珎美不自食其種􅀋也怨仇乃相害食耳能水中潜行行數十里能水底持刀刺捕取魚其人以口嚼食並以鼻飲水死人有棺其葬竪棺埋之丁令丁音㒹令音連後魏書曰丁令在康居北勝兵六萬人隨畜牧依處土出貂䑕皮貚子皮西南去康居界二千里又曰丁令北有馬腦國其人音聲似鴈騖從􅂰以上至頭人也􅂰巳下生毛馬腦馬蹄走疾於馬勇徤敢戰且弥北史曰且弥國都天山東臨於大谷在車師}
