  - {type: variant, offset: 66, length: 2, content: 龜茲, SBCK: 于闐西去代萬二千九百七十里後魏大延􅀄遣使來獻自後不絶越底延通典曰越氐延國隋時聞焉治辛頭河北西北去賖弥國千餘里東北至􅀲州五千四百里其婆羅門種􅀋户數萬餘有弓矢刀矟皮甲國法不殺人重罪流輕者杖國無課稅其俗事佛王及庻人剪髮衣錦􅂁不開縫貧者自疊婦人爲髻衣帬衫帔長巾俗清㓗氣候温多稻有羊馬牛鍮石訶梨勒石􅁡折皮細疊等波路北史曰波路國在阿鈎羗}
  - {type: page-break, offset: 66, content: '', id: KR3k0012_SBCK_796-2b}
  - {type: variant, offset: 66, length: 2, content: 龜茲, WYG: 于闐西去代萬二千九百七十里後魏大延初遣使來獻自後不絶越底延通典曰越底延國隋時聞焉治辛頭河北西北去賖彌國千餘里東北至𤓰州五千四百里其王婆羅門種類户數萬餘有弓矢刀鞘皮甲國法不殺人重罪流輕者杖國無課税其俗事佛王及庶人剪髪衣錦􅂁不開縫貧者白疊婦人為髻衣裙衫帔長巾俗清潔氣候温多稻有羊馬牛鍮石訶梨勒波路北史曰波路國在阿鈎羌}
  - {type: page-break, offset: 66, content: '', id: KR3k0012_WYG_796-4b, image: WYG0900/WYG0900-0078d.png}
  - {type: variant, offset: 66, length: 2, content: 龜茲, krp: 于闐西去代萬二千九百七十里後魏大延𥘉遣使來獻自後不絶越底延通典曰越氐延國隋時聞焉治辛頭河北西北去賖弥國千餘里東北至瓜州五千四百里其婆羅門種類户數萬餘有弓矢刀矟皮甲國法不殺人重罪流輕者杖國無課稅其俗事佛王及庻人剪髮衣錦𫀆不開縫貧者自疊婦人爲髻衣帬衫帔長巾俗清㓗氣候温多稻有羊馬牛鍮石訶梨勒石蜜折皮細疊等波路北史曰波路國在阿鈎羗}
