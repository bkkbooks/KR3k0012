  - {type: variant, offset: 3644, length: 14, content: 傅信字子思遭父喪哀慟骨立母憐, SBCK: 劉孝綽與到漑兄弟甚狎漑少􅀌宅近僧寺孝綽往漑宅適見黄卧具孝綽謂僧物色也撫手􅀏漑知其旨奮拳擊}
  - {type: variant, offset: 3644, length: 3, content: 傅信字, WYG: 綦雋佞巧能候當途斛斯椿賀㧞勝皆與友善性多詐賀㧞勝出鎮荆州過雋别因辭雋故見敗氊弊被更遺之錢物廣志曰𦍑女人披大華氊以為盛服拾遺録曰漢武帝以氊綈藉地惡輙之喧也搜神記曰太康中天下以氊為陌頭及帶身袴口於是百姓相戲曰中國其有西北之憂乎夫氊西北之服也而今天下以為陌頭帶身袴口是既三制之矣淮南}
