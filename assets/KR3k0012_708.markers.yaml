  - {type: variant, offset: 3644, length: 14, content: 傅信字子思遭父喪哀慟骨立母憐, krp: 劉孝綽與到漑兄弟甚狎漑少孤宅近僧寺孝綽往漑宅適見黄卧具孝綽謂僧物色也撫手笑漑知其旨奮拳擊}
  - {type: variant, offset: 3648, length: 2, content: 思遭, WYG: 曰夫胡人見麻不知其可以為布越人見毳不知其可以為氊故不通於物者不可與言俗俗說曰桓豹奴病勞冷無氊可卧桓車騎自撤已眠氊與之語林曰王子敬在齋中卧偷人取物一室之内畧盡子敬卧而不動偷遂豋榻欲有所覔子敬因呼曰偷兒石染青氊是我家舊物可特置否於是羣偷置物驚走日南傳曰調斯國有青石染氊綘染氈也王褒聖主得賢臣頌曰夫荷氊被毳者難與道純錦之麗宻陸雲詩曰冬坐比肩氊卧具風俗通曰扶風蘇不違}
