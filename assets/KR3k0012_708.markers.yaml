  - {type: variant, offset: 3193, length: 401, content: 孝同被而寢不入室以慰母心也邊讓別傳曰讓字元禮才辯俊逸孔融薦於魏武曰邊讓為九州之被則不足為單衣襜則有餘益部耆舊傳曰王忳字少林於客舍見諸生疾甚困謂忳曰腰下有金十斤願以相與乞收藏屍骸未及問其姓名呼吸困絕忳賣金一斤以給棺柩餘九斤置生腰下後署大度亭長到亭有白大馬一疋入亭中其日大風有一繡被隨風來而後忳乘馬馬突入金彥父家彥父見曰真得盜矣忳說得馬之狀又取被示之彥父曰卿有何陰德曰念葬諸生事且說形狀彥父曰真我子也忳即以被馬歸之彥父不受遣迎生喪金具存焉列女後傳曰江夏孟宗少遊學與同學共處母為作十二幅被其鄰婦怪問之母曰少兒無異操懼明類之不顧大其被以招貧生之臥庶聞君子之言耳桓任傳曰任後母酷惡常憎任為作二幅箕踵被杜祭酒別傳曰君曾新作被煖眠不覺晏起乃歎煖眠使人忘起異事因命著陌上有寒苦人舉被乞之常眠布被中孫略別傳曰親親有窮老者略或推被以恤之竟寒不解帶而寢郭子曰殷浩好作楊州劉君行曰小欲暮便令左右取被幞人問其故荅云剌史嚴不敢夜行, SBCK: ''}
