  - {type: variant, offset: 3601, length: 0, content: '', SBCK: 伐之今齊人眼中有鐵何可當耶乃還至陘嶺凍滑乃鋪氊以渡之卧而不動偷遂登榻欲有所覔子敬因呼曰偷兒石染青氊是我家舊物可特置否於是羣偷置物驚走南傳曰調斯國有青石染氊絳染氊也王褒聖主得賢臣頌曰夫荷氊􅀍毳者難與道純錦之麗宻陸雲詩曰冬坐比肩氊比肩獸名也取其毛爲氊卧具風俗通曰扶風蘇不違父爲司􅀠李暠所遷司農不違穿府北垣徑上㕔事斫暠卧具暠一􅀫數遷沈約宋書曰朱百年隱居山隂家素貧母以冬月亡衣並無絮自此不衣綿帛嘗寒時就孔顗飲酒醉}
