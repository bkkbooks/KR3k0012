  - {type: variant, offset: 3597, length: 0, content: '', krp: 大將軍収周侯至石頭坐南門石盤上將戮之送巳褥與周司馬相如美人賦曰髙茵重設氊說文曰蛩毛可以爲氊釋名曰氊旃也毛相著旃旃然也韻集曰氊細罽也周禮春官掌次曰王大旅上帝則張氊案大旅上帝祭天於圎丘也張氊案以氊爲林於堀中又曰掌皮供其毳爲氊以待邦用事漢書曰蘇武使匈奴匈奴絶不與食天雨雪武卧齧雪與氊毛裹咽之也漢書曰王吉諌昌邑王遊獵曰夫廣厦之下細氊之上明師居前勸誦在後上論唐虞之際下及殷周之盛其樂豈徒衘撅之間也哉又曰江都王女細君歌云逺適異國烏孫王穹廬爲室氊爲壇魏志曰李勝爲荆州刺史往辭太傳曹爽因察之太傳曰謬問勝曰并州有佳氊可致之勝岀曰太傅耄無能爲也又曰鄧艾伐蜀自隂平行無人之地鑿山通道作橋以氊自裹推轉而下}
  - {type: variant, offset: 3599, length: 1, content: 云, SBCK: 帝與楊彪書曰今贈足下青氊牀褥三具也晉書曰杜預子錫爲􅉖懷太子舎人屢直諌於太子太子患之置針於錫坐處氊中錫上刺足血岀又曰戴記曰慕容熈后符氏卒慕容隆妻張氏熈之㛐也美姿容有巧思熈將以符氏之殉欲以罪殺之乃毀其檖鞾有中弊氊遂賜死三女叩頭求哀熈不許齊書曰孔奐爲晉陵太守清白自守妻子並不之官唯以單舡臨郡所得秩俸隨即分贍􅀌寡郡中號曰神君曲阿冨人殷綺見奐居處儉素乃餉以衣氊一具奐辭不受北齊書曰裴寛與東魏將彭樂戰於新城因傷􅀍擒至河隂見齊文襄寛舉止閑雅善於占對文襄甚賞異之解鏁付館厚加禮遇寛乃裁所卧氊夜縋而出因得遁還又曰清河三年周師及突厥至并州突厥謂周人曰尔言齊亂故}
  - {type: page-break, offset: 3599, content: '', id: KR3k0012_SBCK_708-5a}
