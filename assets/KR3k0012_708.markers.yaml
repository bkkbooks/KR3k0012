  - {type: variant, offset: 3071, length: 6, content: 幅被一綘被羅, SBCK: 枚王廙春可樂曰弱簟平端潘岳悼亡詩曰展轉睇枕席長簟竟床空左思呉都賦曰桃笙象簟韜於筒中王鍳竹簟賦曰楚簟陳於玉房巴箱列於椒臺褥尓雅曰褥謂之兹釋名曰褥人所坐䙝辱也又曰茵車中所坐用虎皮也詩曰文茵暢轂駕我騏馵文茵虎皮漢書曰霍禹廣治第室作乗輿輦加}
