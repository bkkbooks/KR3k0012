  - {type: variant, offset: 1087, length: 1965, content: 宮舊事曰皇太子納妃有龍頭舊髻枕銀鐶鉤副之蔡質漢官儀曰尚書郎直給通中枕西京雜記曰趙飛燕為皇后其女弟上遺虎珀枕龜文枕拾遺錄曰魏咸熙二年宮中夜夜有異或吼呼驚人乃有傷害者詔使官者闇中伺候有白虎毛色淨密以戈投虎即中左目俄而往取虎已隱形更搜覔乃於藏中得一玉虎枕左目有血帝嗟其大異問諸大臣荅云昔誅梁冀得玉虎枕一枚云此枕單池國所獻臆下有題云帝辛九年獻帝辛紂也金玉久而有神神仙傳曰泰山父者漢武帝東巡狩見父頭頂白光高數尺帝呼問之曰有道士教臣作神枕枕有三十二物二十四物以應二十四氣八物應八風臣行之轉少而齒生列異傳曰景初中咸陽縣吏王臣夜倦枕枕臥有頃聞竈下有呼曰文納何不以之頭下應曰我見枕不得動汝來就我至乃飲缶也集異記曰中山劉玄暮忽見一人著烏袴褶取火照之面首無七孔面莽黨然乃請師筮之師曰此是君家先世物久則為魅劉因執縛刀斫數下變為一枕乃是其先祖時枕異苑曰滕放枕文石枕臥忽暴雷震其枕傍人莫不為之怖懾微覺有聲不為驚也楚宋玉高唐賦曰楚王嘗遊高唐怠而晝寢夢見一婦人曰妾巫山之女也願薦椀蓆司馬相如長門賦曰搏芳若以為枕席荃蘭而為香又美人賦曰高茵重設角枕橫施劉向別錄曰向有芳松枕賦後漢張紘瓌林枕賦曰有卓爾之殊瓌超詭異以邈絕且其色也如芸之黃其為香也如蘭之芳其文綵也霜地金莖紫葉而紅榮蔡邕警枕銘曰應龍蟠蟄潛德保靈制器像物示有其形哲人降鑒居安慮傾崔駰六安枕銘曰枕有規矩恭一其德承元寧躬終始不忒六安言六面安也蘇彥楠榴枕銘曰珍木之奇文鬱理鮮廉稜方正密滑貞堅卞敬宗作無患枕讚無患木名也言人枕之無患也江文通詩曰撫枕懷百慮被說文曰衾大被也釋名曰被所以被覆人也衾也其下廣大如岸一受人也論語曰必有寢衣長一身有半詩曰錦衾爛兮又曰肅肅霄征抱衾與裯裯單被也傳曰楚子次于乾谿雨雪楚王皮冠秦復陶翠被豹舄執鞭以出史記曰王章字仲卿疾無被臥牛衣中又曰汲黯曰公孫弘位至三公俸祿甚厚為布被此詐也上問弘弘謝曰有之夫九卿與臣善者無過黯然今日廷詰臣誠中臣之病夫以三公為布被飾詐以釣名且臣聞管仲相齊有三歸侈擬於君桓公亦霸晏嬰相景公食不重肉妾不衣絲齊國亦治今臣位為御史大夫而為布被自九卿以下至小吏無差誠如黯言且無汲黯申之陛下安聞此言天子以為謙讓愈益厚之漢書曰廣川王去妃昭信甚砳王愛姬陶望卿昭信妒之譖於王曰望卿視有姦窺即言郎中令臥錦被王信之擊殺之又曰李夫人病篤上自臨候之夫人蒙被謝曰妾久寢病形貌壞不可以見帝願以王及兄弟為託又曰霍光薨詔賜繡被百領後漢書曰祭遵奉公家無私財布被夫人裳不加綵又曰宣秉性節儉常服布被蔬食華嶠後漢書曰樂崧為郎獨宿真臺上無被帝推被與之袁山松後漢書曰范丹為萊蕪長去官無被空囊自隨也謝承漢書曰京兆朱寵字仲威為太尉家貧臥布被朝廷賜錦被臥兼布被又曰羊續字興祖為南陽太守以清率下唯臥一幅布綯敗糊紙補之綯與裯同東觀漢記曰王良為大司徒在位恭儉妻子不入官舍布被瓦器又曰馮豹字仲文後母惡之嘗因豹夜臥引刀斫之正值其起中被獲免又曰馮豹每奏事未報常服省閣下或從昏至明天子默使小黃門持被覆之曰勿驚之漢官典職曰尚書郎入直供青練白綾被或錦被魏書曰文帝詔朝臣三代大夫知被服五代大夫知飲食此言被服飲食難曉也晉陽春秋曰景帝有目疾文鴦之來攻驚而目出懼六軍恐蒙以被痛甚齧被破晉書曰魏舒為尚書郎或有非其人論者欲有沙汰之言舒乃曰吾即其人也襆被徑出論者咸自愧之也又曰楊駿被誅初駿徵高士孫登遺以布被登截被於門外大呼曰斫㓨旬日託疾死及是其言果驗又曰光逸字孟祖為博昌小吏令使之冒雨還令不在逸解衣臥衾被中令還詰之逸曰衣單冒雨如不易衣衣必致凍死何惜一被而殺一人耶令奇之而不問又曰祖逖字士雅與琨共被寢中夜聞鷄鳴蹴琨覺曰起舞此非惡聲又曰吳納為吳興守徵為尚書去任有被幞而已又曰禿髮烏孤之祖壽闐之在孕母胡掖氏因寢而產於被中鮮卑謂被為禿髮因而氏焉宋書曰虞龢位中書郎廷尉少好學居貧屋漏恐濕墳典乃舒被覆書書獲全而被大濕時人以比高鳳又曰沈麟士以楊王孫皇甫謐深達生死而終禮矯俗乃自為終制遺令氣絕剔被取三幅布以覆屍及斂仍移布於屍下以為斂服反被左右兩際以周上又曰康沙門釋寶志王亮欲以衲被遺之未及有言寶志忽來牽被而去又曰羅研齊茍兒之役臨汝侯嘲之曰卿蜀人樂禍貪亂一至於此對曰蜀中積獘實非一朝百家為林不過數家有食貪亂樂禍無足多怪若令床上有百錢布被甑中有數升麥飯寧肯為亂乎梁書曰裴之橫字如岳少好賓重氣俠不事產業兄之高以其縱誕乃為狹被蔬食以激厲之之橫嘆曰大丈夫富貴必作百幅被後為吳興太守作百幅被以成其志陳書曰高宗時豫州獻織成羅文錦被詔於雲龍門外焚之孫卿子曰天子至尊重無上矣衣被則五彩雜間色重文繡加飾之以珠玉家語曰黔婁先生死被短露足孔子及門人見之謂其妻曰寧使正之不足不可斜之有餘說苑曰鄂君乘青翰之舟張翠華之蓋越人擁楫而歌曰山有木兮木有枝心悅君兮君不知於是鄂君舉繡被而覆之夏侯孝子集曰羊太常辛夫人字憲英性不好華麗從外孫胡母楊上夫人錦被夫人取反臥之晉惠帝起居注曰帝至朝歌無被中黃門以兩幅布被給帝東宮, SBCK: 宫}
