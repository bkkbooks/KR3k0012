  - {type: variant, offset: 3092, length: 4, content: 七彩文綺, WYG: 縁飾又曰王朗上疏曰老臣慺慺願國家同祚於軒轅之伍某少小常苦}
  - {type: variant, offset: 3092, length: 4, content: 七彩文綺, krp: 縁飾又曰王朗上䟽曰老臣慺慺願國家同祚於軒轅之伍某少小常苦𬒳褥泰温則不能使軟膚弱體是以難可防䕶而易用感慨若常全小緼𫀆不至於甚厚則必咸保金石之性而比壽於南山矣呉録曰孟仁字㳟武江夏人也從李肅學其母爲作厚褥大}
