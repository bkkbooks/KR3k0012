  - {type: variant, offset: 3597, length: 0, content: '', SBCK: 大將軍収周侯至石頭坐南門石盤上將戮之送巳褥與周司馬相如美人賦曰髙茵重設氊說文曰蛩毛可以爲氊釋名曰氊旃也毛相著旃旃然也韻集曰氊細􅄢也周禮春官掌次曰王大旅上帝則張氊案大旅上帝􅀕天於圎丘也張氊案以氊爲林於堀中又曰掌皮供其毳爲氊以待􅀖用事漢書曰蘇武使匈奴匈奴絶不與食天􅀨雪武卧齧雪與氊毛裹咽之也漢書曰王􅁻諌昌邑王遊獵曰夫廣厦之下細氊之上明師居前勸誦在後上論唐虞之際下及殷周之盛其樂豈徒衘撅之間也哉又曰江都王女細君歌云逺適異國烏孫王穹廬爲室氊爲壇魏志曰李勝爲荆州刺史往辭太􅀓曹爽因察之太􅀓曰謬問勝曰并州有佳氊可致之勝岀曰太傅耄無能爲也又曰鄧艾伐蜀自隂平行無人之地鑿山通道作橋以氊自裹推轉而下}
  - {type: page-break, offset: 3597, content: '', id: KR3k0012_SBCK_708-4b}
  - {type: variant, offset: 3597, length: 0, content: '', WYG: 大將軍收周侯至石頭坐南門盤石上將戮之送已褥與周司馬相如美人賦曰髙茵重設氊說文曰蛩毛可以為氊釋名曰氊旃也毛相著旃旃然也集韻曰氊細罽也周禮天官掌次曰王大旅上帝則張氊案大旅上帝祭天于圎丘國有故而祭亦曰旅張氊案以氊為床于幄中又曰掌皮供毳毛為氊以待邦事漢書曰蘇武使匈奴絶不與食天雨雪武卧齧雪與氊毛褁咽之漢書曰王吉諫昌邑王遊獵曰夫廣厦之下細氊之上明師居前勸誦在後上論唐虞之際下及殷周之盛其樂豈徒衘橛之間哉又曰江都王女昭君歌云逺適異國烏孫王窮廬為室氊為鄉魏志曰李勝為荆州刺史徃辭太傅曹爽使察之太傅因謬問勝曰并州有佳氊可致之勝出曰太傅耄無能為也又曰鄧艾伐蜀自隂平行無人之地鑿山通道作橋以氊自裹推轉而下}
