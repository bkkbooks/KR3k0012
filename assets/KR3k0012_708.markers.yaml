  - {type: variant, offset: 3651, length: 2, content: 喪哀, WYG: 為司𨽻李暠所遷不違穿府北垣徑上㕔事斫暠卧具暠一宿數遷沈約宋書曰朱百年隱居山隂家素貧母以冬月亡衣並無絮自此不衣錦帛嘗寒時就孔顗飲酒醉眠顗以卧具覆之百年不覺也既覺引卧具去體謂顗曰綿定竒温因流涕悲}
