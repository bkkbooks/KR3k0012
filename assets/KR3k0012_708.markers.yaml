  - {type: variant, offset: 104, length: 210, content: 彷徨於山林之中三日乃見其涓人疇王呼之曰余不食三日矣疇趍而進王枕其股以寢於地王寐疇枕王曰墣而去之墣塊也洞林曰丞相從事中郎王文英家枕自作聲漢書曰淮南王有枕中鴻寶祕苑書言使鬼物為金之術及鄒衍重道延命方世人莫知劉更生父於武帝時治淮南獄得書更生以為奇獻之言黃金可成上命典作方鑄事費甚多不驗後漢書曰樂崧天性朴忠家貧為郎嘗獨直臺上無被枕杫祉音思漬切謂姐九也蜀漢之郊日祉食糟糠帝每夜入臺輒見崧問其故甚嘉之自此詔太常賜尚書以下朝夕飡給幃帳, SBCK: 唐}
