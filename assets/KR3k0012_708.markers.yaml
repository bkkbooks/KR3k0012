  - {type: variant, offset: 3097, length: 0, content: '', SBCK: 人問其故母曰小兒無德客多貧故爲廣􅀍大褥齊書曰宗測髙尚不仕王儉亦雅重之贈以蒲褥筍席}
  - {type: variant, offset: 3097, length: 0, content: '', WYG: 褥泰温則不能便軟膚弱體是以難可防䕶而易用感慨若常全小緼袍不至於甚厚則必咸保金石之性而比壽於南山矣呉録曰孟仁字恭武江夏人也從李肅學其母為作厚褥大被人問其故母曰小兒無徳致客學者多貧故為廣褥大被齊書曰宗測髙尚不仕王儉亦雅重之贈以蒲褥筍席}
  - {type: page-break, offset: 3097, content: '', id: KR3k0012_WYG_708-4b, image: WYG0899/WYG0899-0309b.png}
  - {type: variant, offset: 3097, length: 0, content: '', krp: 人問其故母曰小兒無德客多貧故爲廣𬒳大褥齊書曰宗測髙尚不仕王儉亦雅重之贈以蒲褥筍席}
  - {type: variant, offset: 3098, length: 0, content: '', SBCK: 曰禇彦回弟澄爲左户尚書彦回薨澄以錢一萬一千就招提寺贖髙帝所賜彦回白豹坐褥又栁慶逺爲儀同􅀄慶逺從父兄丗隆嘗謂慶逺曰吾夢太尉以褥席見賜吾遂亞台司適又夢以吾褥席與汝汝必光我門族至是慶逺亦継丗隆焉太尉謂元景也後魏書曰尓朱丗隆將􅀍誅此年正月晦日令僕並不上省西門不開忽}
  - {type: page-break, offset: 3098, content: '', id: KR3k0012_SBCK_708-3b}
  - {type: variant, offset: 3098, length: 0, content: '', WYG: 曰褚彦回弟澄為左民尚書彦回薨澄以錢一萬一千就招提寺贖髙帝所賜彦回白豹坐褥又曰栁慶逺為儀同初慶逺從父兄世隆嘗謂慶逺曰吾夢太尉以褥席見賜吾遂位亞臺司適又夢以吾褥席與汝汝必光我門族至是慶逺亦繼世隆焉太尉為元景也後魏書曰尒朱世隆將被誅此年正月晦日令僕並不上省西門不開忽}
  - {type: page-break, offset: 3098, content: '', id: KR3k0012_WYG_708-5a, image: WYG0899/WYG0899-0309c.png}
  - {type: variant, offset: 3098, length: 0, content: '', krp: 曰禇彦回弟澄爲左户尚書彦回薨澄以錢一萬一千就招提寺贖髙帝所賜彦回白豹坐褥又栁慶逺爲儀同𥘉慶逺從父兄丗隆嘗謂慶逺曰吾夢太尉以褥席見賜吾遂亞台司適又夢以吾褥席與汝汝必光我門族至是慶逺亦継丗隆焉太尉謂元景也後魏書曰尓朱丗隆將𬒳誅此年正月晦日令僕並不上省西門不開忽}
  - {type: variant, offset: 3099, length: 6, content: 綘文羅被京兆, SBCK: 河内太守田帖家奴告省門亭長云今且爲令王借車牛一乗終日於洛濵遊觀至晚王還省將軍自東掖門始覺車上無褥請爲之記識丗􅀃曰晉孝武年十三四時冬天晝日不着衣夜則累茵褥謝公云體冝令常和陛下晝過冷夜過􅀬恐非攝生之術帝曰夜静冝温謝公出歎之也南越傳曰尉佗卧象牀錦茵茵褥也東宫}
