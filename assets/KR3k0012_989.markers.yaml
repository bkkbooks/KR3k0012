  - {type: variant, offset: 1455, length: 1, content: 久, SBCK: 仙傳曰王烈字長能邯鄲人也常服黄精又曰白菟公服黃精而得仙永嘉記曰黄精出松陽永寕縣遊名山志曰名室藥多黄精􅀶物志曰黄帝問天姥曰天地所生豈有食之令人不死者乎姥曰太陽草名黄精餌食之可以長生胡麻廣雅曰狗蝨鉅勝藤苰胡麻也孝經援神契曰鉅勝延年宋均注曰丗以鉅勝爲狗􅂎子晉書安帝紀曰殷仲堪在荆州以胡麻爲廪廣志曰胡麻一名方莖服之不老奈風濕其葉名青襄也淮南子曰汾水濛濁而冝胡麻列仙傳曰關令尹喜與老子俱之流沙西服鉅勝實莫知所終魯女生別傳曰女生長樂人也少好道􅀄服餌胡麻及术絶􅂖八十餘年更少壯色如桃華一日能行三百里走及麞鹿抱朴子曰胡麻好者一石蒸之如炊湏􅁀乾復蒸丸和細篩白􅁡丸如雞子曰二枚一年面色羙身體滑二年白髪黒三年齒落更生四年入水不濡五年入火不燋六年走及奔馬或􅁡水和作餅如糖狀炙食一餅抱朴子内篇曰胡麻服餌不老耐風濕吴氏本草曰胡麻一名方金一名狗蝨神農雷公甘平無毒立秋採青襄一名蔓神農苦雷公甘本草經曰胡麻一名巨勝味甘平生川澤治傷中虛羸􅀘五藏益氣乆}
