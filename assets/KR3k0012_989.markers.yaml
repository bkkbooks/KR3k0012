  - {type: variant, offset: 63, length: 1, content: 洲, SBCK: 經曰女几之山其草多术列仙傳曰㳙子好餌术接食其精三百年神仙傳曰陳子皇得餌术要方服之得仙去霍山其妻姜氏疲病念其婿採术之法服之病自愈至三百七十歳登山取术重擔而歸不息不極顔色氣力如二十時抱朴子内篇曰南陽文氏其先祖漢末大亂飢困欲死遇人教之食术云遂不飢數十年乃來還郷里顔色更少氣力勝故术一名山精神藥經曰必欲長生當服山精茯苓廣雅曰茯神茯苓也史記􅀛䇿傳曰茯苓在兎絲之下之似飛鳥之形新雨巳天淸静無風以夜燒兎􅁝去之即篝燭此地徐廣曰籍籠也盖然火而籠罩其去土也篝音溝火㓕即記其處明即掘取入地四尺至七尺得矣伏苓者千歳松脂食之不死齊書曰陶弘景永明中上表辭禄許之賜以束帛勑所在月給伏苓五斤白􅁡二升以供服餌淮南子曰下有茯苓}
  - {type: page-break, offset: 63, content: '', id: KR3k0012_SBCK_989-2b}
  - {type: page-break, offset: 63, content: '', id: KR3k0012_SBCK_989-3a}
  - {type: variant, offset: 63, length: 1, content: 洲, WYG: 經曰女几之山其草多术列仙傳曰涓子好餌木接食其精至三百年神仙傳曰陳子皇得餌术要方服之得仙去霍山其妻姜氏疾病其壻用餌术之法服之病自愈至一百七十嵗登山取术重擔而歸不息不極顔色氣力如二十時人抱朴子内篇曰南陽文氏其先祖漢末大亂飢困欲死遇人教之食术云遂不飢數十年乃來還鄉里顔色更少氣力轉神藥經曰必欲長生當服山精茯苓廣雅曰茯神茯苓也史記龜策傳曰茯苓在絲之下狀似飛鳥之形新雨已天清静無風以夜捎絲去之即以簼燭此地徐廣曰簼籠也盖然火而籠罩其上也火滅即記其處明則掘取之入地四尺至七尺得矣茯苓者千嵗松根食之不死齊書曰陶𢎞景永明中上表辭禄許之賜以東帛勑所在月給茯苓五斤白蜜二斤以供服餌淮南子曰下有茯苓}
