  - {type: variant, offset: 61, length: 1, content: 扶, SBCK: 天門冬莖間有刺而葉滑者曰郄休一名顛蕀根以浣縑素白越人名爲浣草似天門冬而非也凢服此先試浣衣如法者便非天門冬抱朴子曰杜子服天門冬御十八妾有子百四十人日行三百里又内篇曰天門冬或名地門冬麦門冬潜夫論曰夫理世不得真賢譬猶治疾不得真藥也治疾當得麦門冬及得蒸横麦已不識真合而飲之疾以䆮劇而不知爲人所欺也遊名山志曰泉山竹際及金州多夌門冬盛弘之荆州記曰魚復縣巖崖内生夌門冬廣州記曰鄣平縣偏饒夌門冬建康記曰建康出夌門冬本草經曰麥門冬味甘平生川谷治心腹結氣傷中胃脉絶乆服輕身不飢不老生函谷山吴氏本草曰夌門冬一名羊韮􅁗一名烏韮楚一名馬韮越一名羊薺一名愛韮一名禹韮一名㸑火冬一名忍冬一名忍陵一名不死藥一名禹餘粮一名僕壘一名隨脂神農歧伯甘平黄帝桐君雷公甘無毒季氏甘小温扁鵲無毒生山谷肥地葉如韮肥澤叢生採無時實青黄术尓雅曰术山薊本草云术一名山薊今术似薊而生山中山}
