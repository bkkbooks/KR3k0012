  - {type: variant, offset: 258, length: 1181, content: 禹哀神農歧伯雷公甘平季氏小寒扁鵲甘無毒生太山上有甲甲中有白白中有黃如鷄子黃色九月採或無時消石吳氏本草經曰消石神農苦扁鵲甘范子計然曰消石出隴道芒消本草經曰消石一名芒消味酸苦寒生山谷治五藏積熱生益州朴消本草經曰朴消味苦寒生山谷治百病除寒熱邪氣除六府積藂結廦山谷之陰有鹹苦之水狀如芒消而麤能化七十二種石練餌服之輕身神仙生益州吳氏本草曰朴消石神農歧伯雷公無毒生益州或山陰入土千歲不變練之不成不可服雄黃玄中記曰員丘之上多大虵以雄黃精厭之水經曰黃水出零陽縣西北連巫山溪出雄黃頗有神異採常以冬月祭祀鑿石深數丈方得故溪水取名焉淮南萬畢術曰夜燒雄黃水蟲成列水蟲聞燒雄黃臭氣皆趣火吳氏本草曰雄黃神農苦山陰有丹雄黃生山之陽故曰雄是丹之雄所以名雄黃也雌黃吳越春秋曰太官舍春申君所造殿後殿名逃夏宮春申子假君宮也數失火因塗雌黃故曰黃堂臨海水土物志曰丹山草木赫然盡彤雌黃所產煒煌內含奇寶外發英光昔隸交部今則南康典術曰天地之寶藏於中極命曰雌黃雌黃千年化為雄黃雄黃千年化為黃金本草經曰雌黃石金味辛平生山谷治身癢諸毒磁石王隱晉書曰馬隆擊涼州以磁石累道側賊負鐵鎧不得過以為神呂氏春秋曰磁石召鐵或引之也石鐵之母也石之不怒者亦不能引之也抱朴子曰五石者丹沙雄黃白礬石曾青磁石也一石轉五轉而各成五色五石合為二十五色南州異物志曰漲海崎頭水淺而多磁石外徼人乘大舶皆以鐵鐷鐷之至此關以磁石不得過淮南萬畢術曰磁石拒碁取雞血與作針靡鐵擣之以和磁石日塗碁頭曝乾之置局上即相拒不休又曰磁石懸入井亡人自歸取亡人衣帶裹磁石懸井中亡人自歸本草經曰磁石一名玄石味辛寒生川谷吳氏本草曰磁石一名磁君石膏廣州記曰彰平縣有石膏山望之皎若霜雪本草經曰石膏味辛微寒生山谷治心下逆驚喘口乾焦不能息滑石南越志曰膋音尞城縣是出膋石膋石即滑石也土人以為燒器以用烹魚本草經曰滑石味苦寒生山谷治身熱泄癖生棘陽范子計然曰滑石白滑者善礬石本草經曰礬石一名羽砠泥結切味鹹酸寒生山谷治寒熱泄痢惡瘡目痛堅骨鍊餌久服輕身不老生河西盛弘之荊州記曰建平出礬石范子計然曰礬石出武都吳氏本草曰礬石一名羽砠一名羽澤神農歧伯酸扁鵲鹹雷公酸無毒生河西或隴西或武都石門採無時歧伯久服傷人骨曾青衡山記曰衡山有曾青崗曾青可合仙藥淮南萬畢術曰取曾青十斤燒之以水灌其地雲起如山雲矣曾青為藥令人不老本草經曰曾青生蜀郡名山其山有銅者曾青出其陽青者銅之精能化金銅空青江乘地記曰樵採者嘗於山上得空青此山三朝出雲雨必降民以為常占范子計然曰空青曾青出巴都白青又出巴郡盧青出弘農豫章本草經曰空青味甘寒生山谷明目久服輕身延年能化銅鈆作金生益州吳氏本草曰空青神農甘一經酸久服有神仙玉女來侍使人志高白青本草經曰白青味甘平生山谷明目利九竅耳聾殺諸毒之蟲久服通神明輕身延年出豫章范子計然曰白青出白郡吳氏本草曰神農甘平雷公鹹無毒生豫章可消為銅淮南萬畢術曰白青得鐵即化為銅取礬石白青分等煉治台鐵即成銅矣扁青本草經曰扁青, SBCK: 猳䐗矢}
