  - {type: page-break, offset: 61, content: '', id: KR3k0012_SBCK_989-2a}
  - {type: variant, offset: 61, length: 1, content: 扶, WYG: 天門冬莖間有茨而葉滑曰絺體一名顛棘根以浣縑素越人名為浣草似天門冬而非也凡服此先試浣衣如法者便非天門冬抱朴子曰杜子服天門冬御十八妾有子百四十人日行三百里又内篇曰天門冬或名地門冬麥門冬潜夫論曰夫理世不得真賢譬如治疾不得真藥也治疾當得麥門冬反蒸横麥也不識真合而飲之疾以寖劇而不知為人所欺也遊名山志曰泉山竹際及金州多麥門冬盛宏之荆州記曰魚復縣岩崖内生麥門冬廣州記曰鄣平縣偏饒麥門冬建康記曰建康出麥門冬本草經曰麥門冬味甘平生川谷治心腹結氣傷中胃脈絶久服輕身不飢不老生函谷川谷吳氏本草曰麥門冬一名羊韭秦名烏韭楚名馬韭越名羊韭齊名愛韭一名禹韭一名㸑韭一名忍冬一名忍陵一名不死藥一名禹餘粮一名僕壘一名隨脂神農岐伯甘平黄帝桐君雷公甘無毒李氏甘小温扁鵲無毒生谷中肥地葉如韭肥澤叢生採無時實青黄术爾雅曰术山薊本草選术一名山薊今术似薊而生山中山}
