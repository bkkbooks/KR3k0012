  - {type: variant, offset: 156, length: 2, content: 河東, SBCK: 嵩髙三輔神異經記曰西北荒有人飲甘露食茯苓典論曰頴川郄儉能辟􅂖餌茯苓􅀄儉至市茯苓價暴貴數倍典術曰茯苓者松脂入地千歳爲茯苓望松樹赤者下有之神仙傳曰秀眉公餌茯苓得仙又曰皇􅀄起以弟初平得道乃弃妻子留就初平共服松栢茯苓至五萬日能坐在立亡行日中無影有童子之色及俱還郷里親戚死亡略盡乃復俱去臨去以方教南伯遂易姓爲赤􅀄起字魯班􅀄平字爲松子其後服此藥得仙者數十人列仙傳曰犢子者鄴人也少在黒山上採松子茯苓餌而服之且數百年時壯時老時好時醜時人乃知仙人也廣志曰茯神松汁所作勝茯苓或曰松根茯苓貫着之生朱提濮陽縣􅀶物志曰仙傳云松栢入地中千年化爲茯苓茯苓千年化爲虎魄一名江珠今太山岀茯苓而無虎魄江珠益州永昌郡岀虎魄而無茯苓或云蜂燒窠所作未詳二􅀃嵩髙山記曰取松柏茯苓二斤醇酒漬之和以白蜜日三服乃通靈名山略記曰鬰州山出茯苓吴氏本草曰茯苓通神桐君甘雷公扁鵲甘無毒或生益州大松根下入地三尺一丈二月七月採}
