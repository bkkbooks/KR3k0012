  - {type: variant, offset: 816, length: 3, content: 鐵鐷鐷, WYG: 長生胡麻廣雅曰狗蝨鉅勝藤苰胡麻也孝經搜神契曰鉅勝延年宋均注曰世以鉅勝為枸把子晉書安帝記曰殷仲堪在荆州以胡麻為廩廣志曰胡麻一名方莖服}
