  - {type: variant, offset: 1379, length: 2, content: 白郡, WYG: 三輔廣州記曰鄣平縣出續斷本草經曰續㫁一名龍豆味苦㣲温生山谷治傷寒補不足金瘡癰傷折跌續筋骨婦人乳癰崩中漏血久服益力生常山吴氏本草曰石龍芻一名龍脩一名龍鬚一名續㫁一名龍珠一名草毒一名龍華一名懸莞神農李氏小寒雷公黄帝苦無毒扁鵲辛無毒生梁州七月七日採范注方曰續斷即是馬薊葉相似但大於小薊耳葉似旁翁菜葉但小厚兩邊有刺刺人其花紫色肉蓯蓉本草經曰肉蓯蓉味甘㣲温生山谷治五勞七傷補中除莖中寒熱養五藏強陰益精氣多子婦人癥瘕久服輕身生河西}
