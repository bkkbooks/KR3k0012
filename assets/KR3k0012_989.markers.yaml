  - {type: variant, offset: 1773, length: 445, content: 畏冬華惡青竹水銀廣稚曰水銀謂之汞音紅董切淮南萬畢術曰朱沙為汞本草經曰水銀味辛寒無毒決明本草經曰石決明味酸草決明味鹹理自珠精吳氏本草曰決明子一名草決明一名羊明赭說文曰赭赤土也山海經曰胞山灌水之中有流赭以塗牛馬無病郭璞注曰赭赤土也今多以朱塗牛角云辟惡又曰少陽山之中多美赭南方草物狀曰赤土出踴山下在石中採好色赤者雜丹中朱漆器范子計然曰石赭出齊郡赤色者善蜀赭出蜀郡本草經曰代赭一名血師好者狀如雞肝白堊山海經曰慈聾之山其中有太谷是多白堊黑青黃堊范子計然曰青堊出三輔本草經曰白堊即白善土也生邯鄲鹵鹹本草經曰鹵鹹一名寒石味苦治大熱消渴狂煩戎鹽主明目益氣去毒蟲大鹽一名胡鹽令人吐主腸胃結熱龍骨史記曰穿渠自微引洛水至商顏服虔曰顏音崖應劭曰微在馮翊或曰商顏山名穿梁得龍骨故名龍首渠盛弘之荊州記曰始安駭鹿山室鑿室內輒得龍骨下有伏滔范子計然曰龍骨出河東本草經曰龍骨味甘平山谷治心腹鬼疰生晉地華陽國志曰蜀五城縣其上值天門天門龍升天不達死墜此地故掘取龍骨冬夏無已吳氏本草經曰龍骨生晉地山谷陰大水所過處是死龍骨色青白者善, WYG: 御覽卷九百八}
