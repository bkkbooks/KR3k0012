  - {type: variant, offset: 4146, length: 5, content: 地葬焉皆無, WYG: 有益豈徒然哉又曰劉炫字光伯少以聰敏見稱與信都劉焯閉戸讀書十年不出又曰王邵篤好經史遺落世事用思既專性頗怳忽至對食閉目凝思盤中之肉輙為僕從之所噉邵弗之覺唯責肉少數罰厨人厨人以情白依前閉目伺而獲之厨人方免笞辱其專固如此唐書曰李磎昭宗朝為宰相磎自在臺省聚書至多手不釋卷時人號曰李書樓所撰文章及註解書傳之間疑近百餘卷經亂悉亡世説曰管寧華歆常同席讀書有乗軒冕過門者寧讀書如故歆出觀寧割席分坐曰子非吾友也邴原别傳曰原字根矩家貧早孤隣有書舍原過其傍而泣師問曰童子何悲原曰一則羡其不孤二則羡其得學師亦哀原之言而為之泣曰童子茍有志我徒相教不求資也楚國先賢傳曰孫敬好學時欲寤寐奮志懸頭屋梁}
