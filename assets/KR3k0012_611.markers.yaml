  - {type: variant, offset: 3454, length: 2, content: 關羽, WYG: 張紘事父至孝居貧躬耕稼帶經而鋤孜孜汲汲以夜繼日至於弱冠無不窮覽晉書曰王育少孤貧為人傭牧羊豕近學堂常有暇拾薪以顧書手抄書板截蒲以學書日夜不止亡失羊豕其主笞之育甚有慙色將鬻已以償於是郭子敬聞而嘉之代育還羊豕給其衣食令育與其子同學育博通經史仕偽漢官至太傅又曰車𦙍字武子南平人勤學不倦家貧常不得油夏月則練囊盛數十螢火以照書晉中興書曰孫盛字安國為秘書監}
