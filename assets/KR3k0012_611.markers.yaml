  - {type: variant, offset: 3630, length: 1, content: 孝, WYG: 魏郎弄㦸多少收慙悟乃折節讀書坐板牀積年板亦為之鋭減収常為庭竹賦以自發名伯猷謂之曰卿不值老夫猶當逐兎後周書曰樊深博物性好學老而不怠朝暮往還常據鞍讀書至馬驚墜地損折肢體終亦不改後除國子博士梁史曰沈約十三而遭家難潛竄㑹赦乃免既而流寓孤貧志好學晝夜不釋卷母恐其以勞生疾常遣減油滅火而晝之所讀夜輙誦之遂博通羣籍善屬}
