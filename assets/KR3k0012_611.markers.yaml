  - {type: variant, offset: 4698, length: 3, content: 永徽中, SBCK: 李磎昭宗朝爲宰相磎自在臺省聚書至多手不釋卷時人號曰李書樓所撰文章及注解書傳之闕疑近百餘卷經亂悉亡丗􅀃曰管寧華歆甞同席讀書有乗軒冕過門者寧讀書如故歆出觀寧割席分坐曰子非吾友也邴原别傳曰原字根矩家貧早􅀌隣有書舎原過其傍而泣師問曰童子何悲原曰一則顧其少􅀌二則羡其未學師亦哀原之言而爲之泣曰童子苟有志我從相教不之求費也楚國先賢傳曰孫敬好學時欲寤寐懸頭至屋梁以自課常閉户號爲閉户先生廬江七賢傳曰文黨字翁仲欲之學時與人俱入藂木謂侣人曰吾欲逺學先試投我斧髙木}
