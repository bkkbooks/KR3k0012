  - {type: variant, offset: 4049, length: 2, content: 為縣, SBCK: 悕少􅀌貧隨母長於舅氏令其牧牛悕㓜而好學事母以孝聞毎日必於牧暇採撨二束菜二本一以供母一以雇人書晝則折木葉學書夜則誦所書者宋書曰沈攸之字仲逹晚好讀書史漢事多所諳憶常歎曰早知窮逹有命恨不七年讀書又曰鄭鮮之字道子滎}
  - {type: page-break, offset: 4049, content: '', id: KR3k0012_SBCK_611-4a}
  - {type: variant, offset: 4049, length: 2, content: 為縣, krp: 悕少孤貧隨母長於舅氏令其牧牛悕㓜而好學事母以孝聞毎日必於牧暇採撨二束菜二本一以供母一以雇人書晝則折木葉學書夜則誦所書者宋書曰沈攸之字仲逹晚好讀書史漢事多所諳憶常歎曰早知窮逹有命恨不七年讀書又曰鄭鮮之字道子滎}
