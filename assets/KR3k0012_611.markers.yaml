  - {type: variant, offset: 2414, length: 151, content: 云劉歆為左傳學以左氏丘明好惡與聖人同親見夫子而公羊穀梁在七十之後傳聞與親見其詳略不同嘗共父向校書父為穀梁學數以難其父向向不能報也漢書曰春秋所貶損當時有威權者是以隱其書而不宣及末世口說流行故有公穀鄒夾之傳四家之中公羊穀梁立於學官東觀漢記曰張霸字伯饒以樊鯈刪嚴氏春秋猶多繁辭乃減為二十萬言更名張氏學鄭玄別傳, SBCK: ''}
