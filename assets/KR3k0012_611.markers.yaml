  - {type: variant, offset: 122, length: 218, content: 之治也君子有其事必有其治治國而無禮譬猶瞽之無相與倀倀乎其何之譬如終夜有求於幽室之中非燭何見若無禮則手足無所措耳目無所加進退揖讓無所制倀丑良切又曲禮曰君子恭敬撙節退讓以明禮曰鸚鵡能言不離飛鳥猩猩能言不離禽獸今人而無禮雖能言不亦禽獸之心乎又禮運曰禮之於人也猶酒之有糵也君子以厚小人以薄又樂記曰樂者非謂黃鍾大呂弦歌干楊也樂之末節也故童者舞之鋪筵席陳撙俎列豆籩以升降為禮者禮之末節也故有司掌之又禮器曰君子之行禮也不可不慎也眾之紀也紀散而眾亂又曰, SBCK: 􅀑谷}
