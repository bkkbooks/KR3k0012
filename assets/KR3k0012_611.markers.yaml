  - {type: variant, offset: 3900, length: 145, content: 餘字滅消文其餘飛為赤烏翔摩青雲漢書蓺文志曰孝經者孔子為曾子陳孝道也夫孝天之經也地之義也民之行也舉大者言故曰孝經後漢書曰向栩字輔興張角之亂栩上便宜頗譏剌左右不欲國家興兵但遣人於河上北向讀孝經賊自當消滅中常侍張讀奏栩不欲命將出師疑與角同欲為內應收送黃門北寺獄殺之謝承後漢書曰仇覽字李智一名香陳留, WYG: 休暎}
