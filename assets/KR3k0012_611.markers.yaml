  - {type: variant, offset: 3186, length: 9, content: 精致都下舊儒咸稱重, WYG: 雋才雅志好學為三公子常躬歩驅驢負書隨師魏志曰楊俊同郡王象少孤為人僕𨽻年十七見使牧羊而私讀書因獲捶楚俊美其才即贖著家中聘娶立屋然後與别居官至散騎常侍魏畧曰常林少單貧為諸生帶經耕鋤其妻自擔餉饋}
