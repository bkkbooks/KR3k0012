  - {type: variant, offset: 4373, length: 547, content: 經足為身之本三國典略曰徐陵子份陵嘗遇疾甚篤份燒香泣涕跪誦孝經晝夜不息如此者三陵疾豁然而愈隋書曰鄭譯性輕高祖以其定策功不忍廢而陰踈之譯乃陰呼道士章醮以祈福助其婢奏譯猒蠱左道上謂譯曰我不負公此何意也譯無以對後憲司謐以不孝由是除名下詔曰譯嘉謀良策寂爾無聞鬻獄賣官沸騰盈耳若留之於世在人為不道之臣戮之於朝入地為不孝子鬼有累幽顯無以置之宜賜以孝經令其熟讀後復其爵位又曰韋師字公頴京兆杜陵人也少沉謹有志性初就學始讀孝經捨書而歎曰名教之極其在茲又曰蘇威嘗謂煬帝曰先臣謂臣唯讀孝經一卷可以立身何用多為帝亦然之何安曰蘇威所學非止孝經厥父若信有斯言威不從命是其不孝若無斯言而面欺陛下是其不誠不誠不孝何以事君且夫子曰不學詩無以言不學禮無以立豈容蘇綽教子獨反聖人之旨乎唐書曰永徽中上命陳王師趙弘智於百福殿講孝經召中書門下三品及弘文館學士國子監學官並令預坐弘智演暢微言備陳五孝之義學士等難問連環弘智酬應如響上謂弘智曰宜略陳此經要道以輔不逮對曰昔者天子爰及諸侯卿大夫皆有諍臣願以此言奉獻上甚悅弘智及學士儒官並賚以繒帛漢實錄曰敏使於湖南途出江陵帥高從誨為贄是時諫曰祭酒惠及經書從誨所識不過孝經十八章爾敏曰讀書不在多至德要道十八章足矣敏記諸侯章云在上不驕高而不危制節謹度滿而不溢此一章皆經要言也時從誨兵敗於郢謂敏見諷舉觥以自罰, WYG: ''}
