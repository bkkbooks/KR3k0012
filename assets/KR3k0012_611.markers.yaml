  - {type: variant, offset: 710, length: 457, content: 劉歆獨識其書知周公致太平之跡始奏立學官後鄭玄為之注儀禮周衰當戰國之世其書並亡至漢高堂生所傳十七篇唯士禮存焉後世推士禮以致天子之禮而行之至馬融鄭玄王肅並為之注解禮記正義曰禮記者本孔子門徒共撰所聞也後通儒各有損益子思伋作中庸公孫尼子作緇衣漢文時博士作王制其餘眾篇皆如此例至漢宣帝世東海后蒼善說禮於曲臺殿撰禮一百八十篇號曰后氏曲臺記后蒼傳於梁國戴德及從子聖德乃刪后氏記為八十五篇名大戴禮聖又刪大戴禮為四十六篇名小戴禮其後諸儒又加月令明堂位樂記三篇凡四十九篇則今之禮記也禮記有馬融鄭玄二家注馬注今亡唯鄭玄行於世矣漢書蓺文志曰易曰有夫婦父子君臣上下禮義有所錯而帝王質文世有損益至周曲為之防事為之制言委曲防閑每事為制也故曰禮經三百威儀三千及周衰諸侯將踰法度惡其害己皆滅去其籍自孔子時而不具至秦大壞漢興魯高堂生傳禮十七篇訖孝宣世后蒼最明戴德戴聖慶普皆其弟子三家立於學官禮古經者出於魯淹中應邵曰淹中里名也及孔氏學七十篇文相似多三十九篇及明堂陰陽王史氏記所見多天子諸侯卿大夫之制雖不能備瘉倉等推士禮而致於天子之說師古曰瘉與愈同愈勝也, SBCK: 踝}
