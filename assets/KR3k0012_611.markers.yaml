  - {type: variant, offset: 1422, length: 476, content: 行冲撰類禮義䟽將立學官䟽成右相張說駮奏曰今之禮記是前漢戴德戴聖所編錄歷代傳習已向千年著為經教不可刊削至魏孫炎始改舊本以類相比有同抄書先儒所非竟不行用貞觀中魏徵因炎所修更加整比兼為之注先朝雖厚加賞錫其書竟亦不行今行冲等奉詔修撰勒成一家然與先儒義乖章句隔絕若欲行用竊恐未可上然其奏遂不得立學行冲意諸儒排己退著論以自釋春秋杜預序云春秋者魯史記之名也楚謂之檮杌晉謂之乘而魯謂之春秋其實一也釋名曰言春秋冬夏終以成歲舉春秋則冬夏可知也春秋正義曰孔子授春秋於卜商卜商又授之弟子公羊高穀梁赤又各為之傳則今公羊穀梁二傳是也左氏傳有賈逵訓服虔杜預注公羊傳有何休解詁穀梁有范甯集解春秋握成圖曰孔子作春秋陳天人之際記異考符春秋演孔圖曰作法五經連之天地稽之圖象質於三王施之四海史記太史公曰先人有言自周公卒五百歲而有孔子孔子卒後至於今五百歲有能紹明世正易傳繼春秋本詩書禮樂之際意在斯乎意在斯乎小子何敢讓耶上大夫壺遂曰昔孔子何為而作春秋哉太史公曰余聞董生曰周道衰廢孔子為魯司寇諸侯害之大夫壅之孔子知言之不用道之不行也是非二百四十二年之中以為天下儀表貶天子退諸侯討大夫以達王事而已矣子, SBCK: 卿歎}
  - {type: variant, offset: 1422, length: 9, content: 行冲撰類禮義䟽將立, WYG: 卿嘆曰我本農家子豈意}
