  - {type: variant, offset: 3624, length: 1, content: 曾, WYG: 李鉉字寳鼎家素貧苦常春夏務農秋冬入學三冬不畜枕每至睡時假寐而已後魏書曰李道固衞國頓丘人髙祖賜名焉家寒少孤有大志好學不倦初受業於長樂監伯陽稱美之晩與漁陽髙悦北平陽尼等將隱於名山不果而罷悦兄閭博學髙才家富典籍遂於悦家手抄口讀不暇寝食三國典畧曰齊右僕射富平}
