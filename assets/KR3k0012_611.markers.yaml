  - {type: variant, offset: 3457, length: 1, content: 左, WYG: 學自少及長手常不釋卷既居史官乃著晉陽春秋又曰劉實長不滿三尺績學不倦雖居官職至於皓首手不釋卷崔鴻春秋前燕録曰豫州刺史張怖字文祖清河武城人也怖少孤貧隨母長於舅}
