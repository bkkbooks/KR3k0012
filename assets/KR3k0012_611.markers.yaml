  - {type: variant, offset: 3173, length: 7, content: 性拙朴無風采及, WYG: 宫過息廬下樂其業因就聽經續漢書曰宫過徐子盛好之因棄其豬而留聽經主怪其不還求索得宫欲笞之門下生共禁止因留之為諸生拾薪執苦數年勤學不倦又曰崔琦字子瑋濟北相瑗之宗也引古今成敗以戒梁冀冀不能受乃作外戚箴又作白鵠賦以為諷後除臨濟長不敢之職}
