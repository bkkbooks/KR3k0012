  - {type: variant, offset: 1859, length: 573, content: 用道之不行也是非二百四十二年之中以為天下儀表貶天子退諸侯討大夫以達王事而已矣子曰我欲載之空言不如見之於行事之深切著明也夫春秋上明三王之道下辯人事之紀別嫌疑明是非定猶豫善善惡惡賢賢賤不肖存亡國繼絕世補敝起廢王道之大者也撥亂世反之正莫近於春秋春秋文成數萬其指數千萬物之散聚皆在春秋春秋之中弒君三十六亡國五十二諸侯奔走不得保其社稷者不可勝數察其所以皆失其本已故易曰失之毫釐差以千里故曰臣弒君子弒父非一朝一夕之故也其漸久矣故有國者不可以不知春秋前有讒而不見後有賊而不知為人臣者不可以不知春秋守經事而不知其宜遭變事而不知其權為人君父而不通於春秋之義者必蒙首惡之名為人臣子而不通於春秋之義者必陷篡弒之誅死罪之名其實皆以為善為之不知其義被之空言而不敢亂夫不通禮義之指至於君不君臣不臣父不父子不子夫君不君則犯臣不臣則誅父不父則無道子不子則不孝此四行者天下之大過也以天下之大過子之則受而不敢辭故春秋者禮義之大宗也漢書蓺文志曰古之王者世有史官君舉必書所以慎言行昭法式也左史記言右史記事其事為春秋言為尚書帝王靡不同之周室既微載籍殘缺仲尼思存前聖之業魯周公之國禮文備物史官有法故與左丘明觀其史記據行事仍人道因興以立功就敗以成罰假日月以定曆數籍朝聘以正禮樂有所褒諱貶損不可書見口授弟子退而異言丘明恐失其真故論本意而作傳明夫子不以空言也又云劉歆為左傳學以左氏丘明好惡與聖人同, WYG: 窺園門}
