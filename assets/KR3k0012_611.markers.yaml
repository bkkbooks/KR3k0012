  - {type: variant, offset: 1773, length: 85, content: 於今五百歲有能紹明世正易傳繼春秋本詩書禮樂之際意在斯乎意在斯乎小子何敢讓耶上大夫壺遂曰昔孔子何為而作春秋哉太史公曰余聞董生曰周道衰廢孔子為魯司寇諸侯害之大夫壅之孔子知言之, WYG: 厯年潛思}
