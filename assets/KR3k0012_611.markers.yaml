  - {type: variant, offset: 380, length: 268, content: 猶坊止水之自來也故以舊坊為無所用而去之者必有水敗以舊禮而無所用而去之者必有亂患又禮運曰夫禮先王以承天之道以治人之情故失之者死得之者生詩曰相鼠有體人而無禮人而無禮胡不遄死是故禮必本於天殽於地列於鬼神達於喪祭射御冠昏朝聘聖人以禮示之天下國家可得而正也春秋說題辭曰禮者體也人情有哀樂五行有興滅故立鄉飲之禮終始之哀婚姻之宜朝聘之表尊卑有序上下有體王者行禮得天中和斗居天中而有威儀王者法而備之是亦得天之中和也禮得則天下咸得厥宜陰陽滋液萬物調四時和動靜常用不可須臾惰也三禮正義曰周禮儀禮並周公所作記所謂禮經三百威儀三千禮經則周禮也威儀則儀禮也周禮遭, SBCK: 讀書至睡}
