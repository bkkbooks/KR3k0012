  - {type: variant, offset: 3459, length: 5, content: 略諷皆上口, WYG: 令其牧牛怖幼而好學事母以孝聞每日必於牧牛之暇採樵二束菜二本一以供母一以雇人書晝則折木葉學書夜則以所書者讀之宋書曰沈攸之字仲逹晚好讀書史漢事多所諳憶常嘆曰早知窮達有命恨不十年讀書又曰鄭鮮之字道子滎陽開封人鮮之下帷讀書絶交游之務又曰王歆字體泰瑯琊人家貧好學三日絶糧執書不輟父母家人或謂之曰困窮如此何不耕農為求活乎歆答曰我當以典籍自耕耳武帝以其博學有文才累遷中書侍郎揚州牧後魏甄琛中山人也舉秀才入都累嵗常以奕碁通夜不止手下蒼頭奴常令執燭或時睡則加杖如此非一奴不勝痛楚乃曰郎君辭父母仕宦若為讀書執燭不敢辭罪今博奕是何事也琛惕然大慚遂寫書研習經史聞見日優仕至侍中蕭子顯齊書曰顧歡字景怡呉郡鹽官人也年六七嵗書甲子有簡三篇歡推計遂知六甲家貧父使驅田中雀歡作黄雀賦雀食稻過半父怒欲撻之見賦乃止鄉中有學舍歡貧無以受業於舍壁後倚聽無遺忘者八嵗誦}
