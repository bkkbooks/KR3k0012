  - {type: variant, offset: 4035, length: 1, content: 仇, SBCK: 戴封字平仲年十五詣太學師事東海申君申君卒送䘮到東海道經其家父母以封當還豫爲娶妻封蹔過拜親不􅀫而去又曰髙鳯字文通南陽蔡人家以農􅅿爲業而勤學專精讀誦妻甞之田曝麥於庭令鳯護之懼雞以竿授之時天􅁀雨而鳯持竿讀書不覺潦水大至流其麥矣又曰􅀽閎傳黄巾賊起攻没郡縣百姓驚散閎誦不移賊相約語不入其閭郷人就閎避難皆得全免又曰曹褒􅀶雅踈通尤好禮事常感朝廷制度未備慕叔孫通爲漢禮儀晝夜研精沉吟專思寢則懷抱筆扎行則誦習文書當其念至忘所之適又曰承宫少􅀌年八歳爲人牧豕郷里徐子盛者以春秋經授諸生數百承宮過息廬下樂其業因就聽經遂請留門下續漢書曰宫過徐子盛好之因弃其猪而留聽經主恠其不還求索得宮欲笞之門下生共禁止因留之爲諸生拾薪執苦數年勤學不倦又曰崔􅄾字子瑋濟北相瑗之宗也引古今成敗以誡梁兾兾不能受乃作外戚箴又作鵠賦以爲諷後除臨濟令不敢之職解印而去兾令刺客求之見􅄾耕於陌上懷書一卷息輙偃而詠之刺客賢之以實告􅄾因得脫走又曰荀爽字慈明㓜好學太尉杜喬見而稱曰可爲人師爽遂躭思經籍慶弔不行徴命不應司馬彪續漢書曰杜喬字叔榮累祖二千石以孝稱雖二千石子常歩擔求師又曰李固少有儁才雅志好學爲三公子常躬歩駈驢􅀒書隨師魏志曰楊浚同郡王蒙少􅀌爲人僕􅀠年十七見使牧羊而私讀書因獲捶楚浚美其才即贖着家中聘娶立屋然後與別居官至散􅀐常侍魏略曰常林少單貧爲諸生耕帶經鋤其妻自擔餉餽之相敬如賔又曰賈逵字梁道好春秋左傳及爲牧守常自課讀之月一遍蜀志曰譙周字元南躭古篤學家貧未甞營産業誦讀典籍欣然獨􅀏以忘寢食研精六經頗曉天文而不留意諸子文章非心所存吴志曰魯肅爲人方嚴寡於玩飾治軍整頓禁令必行雖在軍陣手不釋卷又曰闞澤字德潤山隂人常爲人傭書所冩畢誦之亦遍虞􅄎江表傳曰張紘事父至孝居貧躬耕稼帶經而鋤孜孜汲汲以夜繼日至于弱冠無不窮}
