  - {type: variant, offset: 2859, length: 682, content: 三家殊途命世名儒是非之議紛然牙為讎敵乃思三家之異合而通之周禮有和怨調人之官遂作春秋調人七萬餘言又曰杜預大觀群典謂公羊穀梁詭辯之言又非先儒說左氏未究丘明意而橫以二傳亂之乃錯綜微言著春秋左氏經傳集解又參考眾家謂之釋例又作盟會圖春秋長曆備成一家之學至老乃成祕書監摯虞賞之曰左丘明本為春秋作傳而傳遂自孤行釋例本為傳設而所發明何但左傳故亦孤行也三國典略曰張曜好讀春秋每月一遍時人比之賈梁道趙隱嘗謂曜曰君研尋左氏豈求服虔杜預之紕繆耶曜曰何為其然乎左氏之書備敘言事惡者可以自戒善者可以庶幾故厲己溫習非欲詆訶古人之得失也梁書曰崔靈恩清河東武城人也少篤學遍習五經尤精三禮傳仕魏為太常博士天監十三年歸梁累遷步兵校尉兼國子博士靈恩聚徒講授聽者常數百人性拙朴無風采及解析經理甚有精致都下舊儒咸稱重之助教孔僉尤好其學靈恩先習左傳服解不為江東所行乃改說杜義每文句常申服以難杜遂著左氏條義以明之時助教虞僧誕又精杜學因作申杜難服以荅靈恩世並傳之顏延之庭誥曰褒貶之書取其正言晦義輔制衰王春秋為上三輔決錄曰賈逵建初元年受詔列春秋公羊穀梁不如左氏四十事奏之名左氏長義帝大善賜布五百疋又魏略曰逵好左傳及為牧守常課之月一遍桓譚新論曰左氏傳世後百餘年魯穀梁赤為春秋殘略多有遺失又有齊人公羊高緣經文作傳彌離其本事矣左氏經之與傳猶衣之表裏相持而成經而無傳使聖人閉門思之十年不能知也又曰劉子政子駿伯玉三人尤珍重左氏下至婦女無不讀論者江表傳曰關羽好左氏略諷皆上口孝經孝經序曰吾志在春秋行在孝經是知孝者德之本歟春秋說題辭曰孝經者所以明君父之尊人道之素天地開闢皆有孝人非父不生非母不長天地開闢而生人承天地是故親生膝下以養, SBCK: ''}
