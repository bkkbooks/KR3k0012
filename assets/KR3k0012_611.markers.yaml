  - {type: variant, offset: 1253, length: 164, content: 以周官音義謂之曰吾家世學周官傳業相繼此周公所制經紀典誥百官品物備於此矣吾無男汝可授之勿令絕世後符堅幸太學博士盧壺奏曰廢學已久書傳零落比年撰綴唯周官禮注未有其師竊見太常韋逞母宋氏傳其父業得周官晉義今年八十視聽無闕非此母無以傳授後生於是就其家立講堂隔綘紗幔而傳受以宋氏為文宣君賜侍婢十人周官後學傳於世時稱韋氏宋母唐書曰開元十四年上令, SBCK: ''}
