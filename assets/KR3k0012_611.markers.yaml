  - {type: variant, offset: 2660, length: 198, content: 公羊時司隸鍾繇不好公羊而好左氏以左氏為太官廚公羊為賣餅家故嘗數與辯折長短繇機捷善持論而翰訥口時屈無以應繇曰公羊高竟為丘明服矣翰曰直故吏為明公服爾公羊未肯也蜀志曰孟光字孝裕洛陽人博物識古無書不覽尤銳意三長史於漢家舊典好公羊春秋而譏訶左氏每與來敏爭此二義常譊譊讙咋讙許袁切咋音俎格切晉書曰王濟解相馬又甚愛之而和嶠頗聚歙預嘗稱濟有馬癖嶠有錢癖武帝聞謂曰卿有何癖對曰臣有左傳癖王隱晉書曰劉兆字延世以春秋一, SBCK: 復欲進餘}
