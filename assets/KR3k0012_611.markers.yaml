  - {type: variant, offset: 3479, length: 143, content: 是知孝者德之本歟春秋說題辭曰孝經者所以明君父之尊人道之素天地開闢皆有孝人非父不生非母不長天地開闢而生人承天地是故親生膝下以養父母孝經鉤命決曰孝經者篇題就號也所以表指括意序中書名出義見道曰著就成也孝為一篇之目十八章也成號序中心之事使孝義見於外一字苞十八章為天地喉襟道要德本故挺以題符篇冠就, WYG: 從役}
