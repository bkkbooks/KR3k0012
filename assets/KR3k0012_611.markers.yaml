  - {type: variant, offset: 4037, length: 0, content: '', SBCK: 晉書曰王育少􅀌貧爲人傭牧羊豕近學堂育常有暇拾薪以雇書生抄書後截蒲以學書日夜不止亡失羊豕其主笞之育甚有慙色將鬻巳以償於是郭子敬聞而嘉之代育還羊豕給其衣食令育與其子同學育遂􅀶通經史仕僞漢官至太傅又曰車胤}
  - {type: page-break, offset: 4037, content: '', id: KR3k0012_SBCK_611-3b}
  - {type: variant, offset: 4037, length: 0, content: '', krp: 晉書曰王育少孤貧爲人傭牧羊豕近學堂育常有暇拾薪以雇書生抄書後截蒲以學書日夜不止亡失羊豕其主笞之育甚有慙色將鬻巳以償於是郭子敬聞而嘉之代育還羊豕給其衣食令育與其子同學育遂博通經史仕僞漢官至太傅又曰車胤}
  - {type: variant, offset: 4038, length: 8, content: 李智一名香陳留考, SBCK: 武子南平人勤學不倦家貧甞不得油夏月則練囊盛數十螢火虫以照書晉中興書曰孫盛字安國爲祕書􅁥好學自少及長手常不釋卷旣居史官乃著三國晉陽秋又曰劉寔長不滿七尺精學不倦雖居官職至于皓首手不釋卷崔鴻春秋前燕録曰豫州刺史張悕字文祖清河武}
  - {type: variant, offset: 4038, length: 8, content: 李智一名香陳留考, krp: 武子南平人勤學不倦家貧甞不得油夏月則練囊盛數十螢火虫以照書晉中興書曰孫盛字安國爲祕書監好學自少及長手常不釋卷旣居史官乃著三國晉陽秋又曰劉寔長不滿七尺精學不倦雖居官職至于皓首手不釋卷崔鴻春秋前燕録曰豫州刺史張悕字文祖清河武}
