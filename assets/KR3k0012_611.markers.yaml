  - {type: variant, offset: 4052, length: 3, content: 逐亭長, SBCK: 開封人鮮之下帷讀書絶交遊之務又曰王歆字休㤗琅邪人家貧好學甞三日絶粮執書不輟父母家人或謂之曰困窮如此何不耕農爲求活乎歆荅曰我當以典籍自耕耳武帝以其􅀶學}
