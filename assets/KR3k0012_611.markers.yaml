  - {type: variant, offset: 4387, length: 6, content: 份陵嘗遇疾甚, SBCK: 魏収字伯起鉅鹿曲陽人㓜習􅀐射欲以武藝自逹太學􅀶士鄭伯猷調之曰魏郎弄㦸多少收慙悟乃折節讀書坐版床積年版亦爲之銳収甞爲庭竹賦以自發名伯猷謂之曰卿不值老夫猶當逐􅇠後周書曰樊深􅀶物性好學老而不怠朝暮還往常據鞍讀書至馬驚墜地損折支體終亦不改後除國子􅀶士梁史曰沈約十三而遭家難潜竄㑹赦乃免旣而流寓􅀌貧}
