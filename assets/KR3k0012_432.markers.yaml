  - {type: variant, offset: 2117, length: 305, content: 片破之餘充晚食又曰太始已來相承奢侈太祖輔政上表禁民間華偽不得作成繡裙衣道路不得著錦履不得作局腳檉柏牙床箱籠錦緣不得以七寶飾樂器又諸雜漆物不得以金銀為花獸又曰王逡之字宣約瑯邪臨沂人也少好學儉素衣服不浣几案塵墨齊春秋曰王儉字仲寶臨沂人不好聲色衣裘服用取給而已梁書曰到溉字茂灌美風儀善容止所蒞以清白脩性又率儉不好聲色虛室單衣傍無姬侍後周書曰辛慶之位遇雖隆而率性儉素車馬衣服不尚華侈志量溫和有儒者風度特為當時所重唐書曰虞世南隋時世基當朝貴盛妻子被服擬於王者世南雖同居而躬履勤儉不失素業又曰李藩為相憲宗謂曰前代理天下或家給人足或國貧下困其故何也藩對曰古人云儉以足用蓋足用繫於儉約誠使人君不貴珠玉惟務耕桑則人無淫巧俗自敦本, WYG: ''}
