  - {type: variant, offset: 1738, length: 855, content: 澣又前燕錄曰太尉楊驚字士秋右北平無終人也驚母李氏博學有母儀慕容晃常升堂拜敬性尤清儉好施無倦位為台保爵封郡公常乘弊車瘠牛卒無餘財後漢書曰孝文帝性儉素常服澣濯之衣鞍勒鐵木而已宋書曰文帝性存儉約不好奢侈車府令嘗以輦篷故請改易之輦席舊以烏皮緣欲代以紫皮上以篷未至於壞紫色貴並并弗聽也篷音貢又曰孝武大明中壞上所居陰室於其處起王燭殿與群臣觀之床頭有土鄣壁上挂葛燈籠麻繩拂侍中袁顗盛稱己為過矣又曰顏延之性既褊傲兼有酒過肆意直言曾無迴隱故論者多不知之居身清儉不營財利布衣蔬食獨酌郊野當其為適傍若無人蕭子顯齊書曰高帝即位後身不御精細之物勑中書舍人桓景真曰主衣中似有玉瓜導此制始自大明末復太始增其光麗留此著主衣政是興長疾源可即時打破後宮器物欄檻以銅為飾者改用鐵內殿施黃紗帳宮人著紫皮履華蓋除金花瓜以用鐵廻釘每曰使我治天下十年當使黃金與土同價又曰太官進食有裏蒸明帝曰我食此不盡可四片破之餘充晚食又曰太始已來相承奢侈太祖輔政上表禁民間華偽不得作成繡裙衣道路不得著錦履不得作局腳檉柏牙床箱籠錦緣不得以七寶飾樂器又諸雜漆物不得以金銀為花獸又曰王逡之字宣約瑯邪臨沂人也少好學儉素衣服不浣几案塵墨齊春秋曰王儉字仲寶臨沂人不好聲色衣裘服用取給而已梁書曰到溉字茂灌美風儀善容止所蒞以清白脩性又率儉不好聲色虛室單衣傍無姬侍後周書曰辛慶之位遇雖隆而率性儉素車馬衣服不尚華侈志量溫和有儒者風度特為當時所重唐書曰虞世南隋時世基當朝貴盛妻子被服擬於王者世南雖同居而躬履勤儉不失素業又曰李藩為相憲宗謂曰前代理天下或家給人足或國貧下困其故何也藩對曰古人云儉以足用蓋足用繫於儉約誠使人君不貴珠玉惟務耕桑則人無淫巧俗自敦本百姓既足君孰與不足帝曰儉約之事是我誠心唯當上下相勗以保此道又曰于休烈在朝凡三十餘年歷掌清要家無擔石之蓄恭儉深仁未嘗以喜慍形於顏色而親覽下士推轂後進雖位崇年高曾無倦色文子曰量腹而食度身而衣節乎己者貪心不生矣墨子曰晉文公好惡衣臣下皆衣牂羊之裘以韋帶劍呂氏春秋曰周明堂茅茨蒿柱土階三尺以見儉也風俗通曰大禹闕百品之羞而菲庖廚殷湯寐寢黃屋駕而乘露輿魏武, SBCK: 着蔡琰}
