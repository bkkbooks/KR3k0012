  - {type: variant, offset: 3074, length: 162, content: 疋洪不稱意及犯法自分必死晉書曰王戎性好興利廣收八方園田水碓周遍天下積實藂錢不知紀極而又儉嗇不自奉養天下人謂之膏盲之疾女適裴頠貸錢數萬久而未還女後歸寧戎色不悅女遽還直然後乃歡從子將婚戎遺其一單衣婚訖而更責取家有好李常出貨之恐人得種恒鉆其核以此獲譏於世後魏書曰崔光韶家足於財而性儉恡衣弊馬瘦食味麤薄始光韶在都同里王蔓於夜遇盜害其, SBCK: 三十}
