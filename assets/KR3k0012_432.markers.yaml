  - {type: variant, offset: 423, length: 5, content: 杜佑性勤而, krp: 魯恭祖父匡王莽時羲和有權數號曰智囊于寳晉紀曰桓範出赴曹爽宣王謂蔣濟曰智嚢徃矣晉中興書曰王允之字淵猷年在揔角從伯敦深智之甞夜飲允之辭醉先眠時敦將謀作逆因允之醉別牀卧夜中與錢鳯計議允之巳醒悉聞其語恐或疑便於眠處大吐衣靣並汚鳯旣出敦果照視見其眠吐中以爲大醉不復疑之華陽國志曰任文孫字文公閬中人𥘉武檐山石折文公曰噫西方智士死吾其應之遂卒益部爲之諺曰任文公智}
