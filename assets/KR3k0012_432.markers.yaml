  body:
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 三慈愛恭敬智聦敏強記慈愛􅀃文曰慈愛也釋名曰慈字也韓詩外傳曰夫爲人父者心懷慈仁之愛以畜飬之愛子不詈髦子不笞禮記學記曰夫慈者所以使衆也左傳昭五年曰子産卒仲尼聞之出涕曰古之遺愛孝經援神契曰母之於子也鞠養殷勤推􅏫居濕絶少分甘宗均曰少則自絶甘則分家語曰孔子曰明君心寛􅁉以容其民慈愛以優柔之漢書曰翟方進少爲郡小吏號遲鈍因病歸欲遊學後母慜其志而怜其㓜隨之長安織履以給之謝丞後漢書曰楊彪子循爲曹操所殺後見彪問曰公何瘦之甚對曰愧無日磾先見之明猶懷老牛䑛犢之愛操爲之改容列女傳曰魏孟陽之女芒夘之後妻也有三子前妻之子有五人皆不愛慈母前妻中子犯魏王令罪當死慈母憂感悲哀帶因減赤人有謂慈母曰人不愛母何爲憂懼勤勞如此母曰其父爲其􅀌也而使妾爲之繼母如爲人母而不能愛其子何謂慈乎魏王聞之髙其義赦其子而復其家自此之後五子親侍慈母老子曰吾有三寳一曰慈韓子曰愛子者慈於子重生者慈於生䝿功者於事仁淮南子曰堯立孝慈使民如子弟􅀃􅁐曰魏文侯封太子摯於中山三年使不徃來舎人趙倉唐曰爲人子三年不聞父問不可謂孝爲人父三年不聞子問不可謂慈臣願奉使侯何所好太子曰侯􅄝晨鳬好北犬倉唐􅔗北犬奉晨鳬文侯賜太子衣一襲令以鷄鳴時致之太子發筐視衣盡顛倒太子曰趣具駕君侯召我也唐來不受太子曰詩曰東方未明顛倒衣裳顛之倒之自公召之遂西至文侯大喜倉唐一使文侯爲慈父摯爲孝子潘岳西征賦曰夭赤子於西安坎路側而瘞之亭有千秋之號子無七日之期雖逸厲於延呉實潜慟於余慈蔡邕書曰邕薄祐早䘮}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_432-1b}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_432-2a}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 三慈愛恭敬智聰明強記慈愛説文曰慈愛也釋名曰慈字也韓詩外𫝊曰夫為人父者必懐慈仁之愛以畜飬之禮記大學篇曰慈者所以使衆也左傳昭五年曰子産卒仲尼聞之出涕曰古之遺愛也孝經援神契曰母之於子也鞠飬殷勤推燥居濕絶少分甘宋均曰少則自絶甘則分家語曰孔子曰明君必寛裕以容其民慈愛以優柔之漢書曰翟方進少為郡小吏號遲鈍因病歸欲遊學後母憫其志而憐其㓜隨之長安織履以給之謝丞後漢書曰楊彪子修為曹操所殺後見彪曰公何瘦之甚對曰愧無日磾先見之明猶懐老牛䑛犢之愛操為之改容列女傳曰魏孟陽之女芒卯之後妻也有三子前妻之子有五人皆不愛慈母前妻中子犯魏王令罪當死慈母憂感悲哀帶因減尺人有謂慈母曰人不愛母何為憂懼如此母曰其父為其孤也而使妾為之繼母如為人母而不能愛其子何謂慈乎魏王聞之髙其義赦其子而復其家自此之後五子事慈母盡孝老子曰吾有三寶一曰慈韓子曰愛子者慈於子重生者慈於生䝿功者於事仁淮南子曰堯立孝慈使民如子弟說苑曰魏文侯封太子撃於中山}
