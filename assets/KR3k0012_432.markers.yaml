  - {type: variant, offset: 85, length: 1, content: 郄, SBCK: 顔淵將西遊宋問孔子曰何以爲身子曰恭敬而巳矣恭則近於禮忠敬則人愛史記曰子路爲蒲大夫辭孔子孔子曰蒲多壯又難治然則吾語汝恭以敬可以執勇漢書曰萬石君石奮其父趙亡徙温髙祖東擊項籍過河内時奮年十五爲小吏髙祖與語愛其恭敬奮積功勞孝文時太中大夫恭勤過宫闕門必下車趍見路馬必式子孫爲小吏來歸謁萬石君必朝服見之魏略曰常林少單貧帶經耕鋤其妻自擔餉餽之林雖在田野其相敬過於賔客呉書曰顧悌字子通待妻子有禮常夜入晨出希見其靣常疾篤妻出看之悌命左右自扶起冠幘王隱􅀳書曰􅁃衮執事有恪與弟子治藩跪而受條其人曰今在隱屏先生胡不踞衮乃揖而延之正席而坐吿之曰何以幽顯易其操者乎樊英别傳曰英甞病卧便室中英妻遣婢拜問英荅拜或問之英曰妻齊也􅀃􅁐曰魯有恭士名曰机泥行年七十其恭甚益冬日行隂夏日行陽一食之間三起見衣裘􅄄之士則爲之禮魯君問曰机子年甚長矣不可釋恭平泥對曰君子好恭以}
  - {type: page-break, offset: 85, content: '', id: KR3k0012_SBCK_432-4b}
  - {type: variant, offset: 85, length: 1, content: 郄, WYG: 顔淵将西遊宋問孔子曰何以為身子曰恭敬而已矣恭則近於禮忠敬則人愛史記曰子路為蒲大夫辭孔子孔子曰蒲多壮士又難治然吾語汝恭以敬可以執勇漢書曰萬石君石奮其父趙亡徙温髙祖東擊項籍過河内時奮年十五為小吏髙祖與語愛其恭敬奮積功勞孝文時太中大夫恭勤過宫闕門必下車趍見路馬必式子孫為小吏来歸謁萬石君必朝服見之魏畧曰常林單貧𢃄經耕鋤其妻自擔餉餽之林雖在田野其相敬過於賔客吴書曰顧悌字子通待妻妾有禮常夜入晨出希見其面常疾篤妻出看之悌命左右自扶起冠幘王隐晉書曰庾衮執事有恪與子弟治藩跪而授條其人曰今在隐屏先生胡不踞衮乃揖而延之正席而坐告之曰柰何以幽顯易其操乎樊英别𫝊曰英常病卧便室中英妻遣婢拜問英答拜或問之英曰妻齊也說苑曰魯有恭士名曰机泥行年七十其恭甚益冬日行隂夏日行陽一食之間三起見衣裘褐之士則為之禮魯君問曰机子年甚長矣不可釋恭乎泥對曰君子好恭以}
