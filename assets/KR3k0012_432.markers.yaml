  - {type: variant, offset: 83, length: 0, content: '', SBCK: 上曰􅀳靈公不君趙宣子驟諌公患之使鉏麑賊之晨徃寢門闢矣盛服將朝尚早坐而假寐麑退而歎曰不忘恭敬民之主也賊民之主不忠觸槐而死又襄四年曰季氐以公鉏爲馬正賈逵曰馬正家司馬愠而不出閔子馬見之閔子馬曽大夫閔馬父也曰爲人子者患不孝不患無所恭敬父命何常之有公鉏然之敬恭朝夕恪居官次又昭二曰正考父佐戴武宣三人皆宋君也三命滋益恭三命上郷故其鼎銘云一命而僂再命而傴三命而俯俯恭於傴傴恭於僂循墻而走言不敢安行也亦莫余敢侮論語曰恭近於禮逺耻辱也又曰司馬牛憂曰人皆有兄弟我獨亡子夏曰啇聞之矣死生有命冨貴在天君子敬而無失與人恭而有禮四海之内皆兄弟也又曰樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可弃又曰子禽語子貢曰子之爲恭也仲尼豈賢於子乎家語曰孔子曰恭則近禮堯舜篤恭以王天}
