  - {type: variant, offset: 429, length: 123, content: 倦雖位極將相手不釋卷質明視事接對賓客夜則燈下讀書孜孜不怠與賓佐談論人憚其貴而伏其博杜預自敘曰在家則滋味經籍居官則畢力理治公家之事知無不為夏仲御別傳曰夏統字仲御永興人與母兄弟居恒星行夜歸採梠求食母老病不悰家事仲御鼓四起洒掃庭內鑽火炊爨之後徑便入野孟, krp: 雙文}
