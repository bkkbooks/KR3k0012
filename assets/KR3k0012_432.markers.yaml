  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_432-1a.2}
  - {type: variant, offset: 6, length: 1, content: 勤, SBCK: 親年踰三十􅁂髮二色叔父親之猶􅀂㓜童陸則對􅚋食則比豆恭敬􅀃文曰恭肅也釋名曰恭供也自持也亦言供給事人敬警也易小過卦曰山下有雷小過君子以行過於恭取過於禮而不爲害易繫辭曰君子致恭以存其位易文言曰敬以直内義以方外敬義立而德不􅀌}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_432-2b}
  - {type: variant, offset: 6, length: 1, content: 勤, WYG: 年使不徃来舎人趙倉唐曰為人子三年不聞父問不可謂孝為人父三年不聞子問不可謂慈臣願奉使侯何所好太子曰侯嗜晨鴈好北犬倉唐緤北犬奉晨鴈文侯賜太子衣一襲令以鷄鳴時致之太子發筐視衣盡顛倒太子曰趣具駕君侯召我也唐来不受太子曰詩曰東方未明顛倒衣裳顛之倒之自公召之遂西至文侯大喜倉唐一使文侯為慈父擊為孝子潘岳西征賦曰夭赤子於西安坎路側而瘞之亭有千秋之號子無七旬之期雖逸厲於延吴實潜慟於余慈蔡邕書曰邕薄祜早䘮二親年踰三十鬢髪二色叔父親之猶若㓜童陸則對座食則比豆恭敬說文曰恭肅也釋名曰恭供也自持也亦言供給事人恭警也易小過卦曰山下有雷小過君子以行過乎恭取過於禮而不為害易繫辭曰君子致恭以存其位易文言曰敬以直内義以方外敬義立而徳不孤}
