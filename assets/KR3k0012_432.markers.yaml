  - {type: variant, offset: 1047, length: 167, content: 食一肉脫粟之飯故人賓客仰衣食俸祿皆以給之又曰辛慶忌居處恭儉飲食被服尤以節約東觀漢記曰第五倫性節儉雖為二千石常衣布躬莝養馬妻炊爂飲食受俸祿常取赤米又曰王良為大司徒司直在位恭儉妻子不入官舍布被瓦器時司徒吏鮑恢以事到東海候其家而良姜布裙曳柴從田中歸恢告曰我司徒吏也故來授書欲見夫人妻曰妾是也恢乃下拜歎息而還又曰李恂為兗州刺史清約率下食不二味, WYG: 善㑹計}
