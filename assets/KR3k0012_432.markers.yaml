  - {type: variant, offset: 85, length: 2, content: 郄成, krp: 晉靈公不君趙宣子驟諌公患之使鉏麑賊之晨徃寢門闢矣盛服將朝尚早坐而假寐麑退而歎曰不忘恭敬民之主也賊民之主不忠觸槐而死又襄四年曰季氐以公鉏爲馬正賈逵曰馬正家司馬愠而不出閔子馬見之閔子馬曽大夫閔馬父也曰爲人子者患不孝不患無所恭敬父命何常之有公鉏然之敬恭朝夕恪居官次又昭二曰正考父佐戴武宣三人皆宋君也三命滋益恭三命上郷故其鼎銘云一命而僂再命而傴三命而俯俯恭於傴傴恭於僂循墻而走言不敢安行也亦莫余敢侮論語曰恭近於禮逺耻辱也又曰司馬牛憂曰人皆有兄弟我獨亡子夏曰啇聞之矣死生有命冨貴在天君子敬而無失與人恭而有禮四海之内皆兄弟也又曰樊遲問仁}
  - {type: substitution, offset: 85, original: 郄, replacement: 郤, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-4285}}
  - {type: variant, offset: 87, length: 0, content: '', SBCK: 其名小人學恭以除其刑斧鑚加於泥者何釋恭爲又曰趙簡}
  - {type: variant, offset: 87, length: 0, content: '', WYG: 其名小人學恭以除其刑斧鑕加於泥者何釋恭為又曰趙簡子乘弊車瘦馬衣設羊裘其宰諌曰車新則安馬肥則徃来疾狐貉之裘温且輕簡}
  - {type: variant, offset: 88, length: 0, content: '', SBCK: 乗弊車瘦馬衣設羊裘其宰諌曰車新則安馬肥則徃來疾狐格之裘温且輕簡主曰吾非不知吾聞君子服美則益恭小人服美則益倨我以自俻恐有小人之心也智易繋辭曰智周乎萬物而道濟天下禮記中庸曰舜其大智也與舜好問而好察邇言論語公冶長曰寗武子􅀖有道則智􅀖無道則愚其智可及其愚不可及也寗武子衛大夫􅇞俞又雍也曰智者樂水又曰智者動爾雅曰歫齊州以南戴曰爲丹穴丹穴之人智史記􅁗使王稽於魏知范雎賢載入秦至湖穰侯至勞稽曰君得無與諸遊子俱來稽曰不敢即別去睢}
