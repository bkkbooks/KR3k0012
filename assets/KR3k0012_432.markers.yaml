  - {type: variant, offset: 2686, length: 701, content: 人并給媒弩三輔決錄曰前隊大夫有范仲翁鹽豉蒜果共一筩言其麤儉也會稽典錄曰陳脩字奉先遷為豫章守性清潔恭儉十日一炊不燃官薪殷康明慎曰古人云驕奢人之殃恭儉福之場古今善言曰靈帝時欲用羊續為三司而中官求其賂續出黃紙補袍以示使者延篤與李文德書曰吾食赤鳥之麩麥飲化益之玄醴折張騫大苑之蒜歃晉國郇瑕氏之鹽魏武令曰吾衣被皆十歲也歲歲解浣補納之衛顗奏曰武皇帝之時後宮食不重肉衣不錦繡茵席不緣物無丹漆用能平定天下遺福子孫儉嗇毛詩曰汾沮洳剌儉也沮洳漸洳也又葛屨曰剌褊也魏地狹隘其民機巧趨利其君儉嗇褊急又曰蟋蟀剌晉僖公也儉不中禮故作是詩以閔之論語曰如有周公之才之美使驕且吝其餘不足觀也已又曰出納之吝謂之有司史記曰魯人俗儉嗇曹氏邴氏尤甚以鐵冶起富至巨萬然家自父兄子孫納俛有拾仰有取三輔決錄曰平陵士孫奮富聞京師性儉恡嘗宿客舍雇錢直甚少主人曰君惜錢如此欲作士孫景卿耶魏略曰曹洪家富而性嗇文帝前在東宮嘗從洪貸絹百疋洪不稱意及犯法自分必死晉書曰王戎性好興利廣收八方園田水碓周遍天下積實藂錢不知紀極而又儉嗇不自奉養天下人謂之膏盲之疾女適裴頠貸錢數萬久而未還女後歸寧戎色不悅女遽還直然後乃歡從子將婚戎遺其一單衣婚訖而更責取家有好李常出貨之恐人得種恒鉆其核以此獲譏於世後魏書曰崔光韶家足於財而性儉恡衣弊馬瘦食味麤薄始光韶在都同里王蔓於夜遇盜害其二子孝莊詔黃門高道穆令加撿捕一方之人家別搜索至光韶宅綾絹錢布匱篋充積議者譏其矯嗇郭子曰王丞相性儉即帳下甘果盈溢不散涉春爛敗都督白之公令拾去勑云慎不可使大郎知大郎名悅字長豫晉書曰和嶠家產殷富擬於王者然性至恡以是獲譏杜預以為嶠有錢癖後魏書曰和躍清河人也為平昌太守家巨富而性恡嗇理錢數百斛其母季春思堇惜錢不買, WYG: ''}
