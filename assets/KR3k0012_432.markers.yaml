  - {type: variant, offset: 83, length: 0, content: '', WYG: 上曰晉靈公不君趙宣子驟諫公患之使鉏麑賊之晨徃寝門闢矣盛服将朝尚早坐而假寐麑退而嘆曰不忘恭敬民之主也賊民之主不忠觸槐而死又襄四曰季氏以公鉏為馬正賈逵曰馬正家司馬愠而不出閔子馬見之閔子馬魯大夫閔馬父也曰為人子者患不孝不患無所恭敬父命何常之有公鉏然之敬恭朝夕恪居官次又昭三曰正考父佐戴武宣三人皆宋君也三命兹益恭三命上卿故其鼎銘曰一命而僂再命而傴三命而俯俯恭於傴傴恭於僂循墻而走言不敢安行也論語曰恭近於禮逺恥辱也又曰司馬牛憂曰人皆有兄弟我獨亡子夏曰商聞之矣死生有命富貴在天君子敬而無失與人恭而有禮四海之内皆兄弟也又曰樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可棄也又曰陳子禽謂子貢曰子為恭也仲尼豈賢於子乎家語曰孔子曰恭則近禮堯舜篤恭以王天}
