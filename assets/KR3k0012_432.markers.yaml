  - {type: variant, offset: 46, length: 3, content: 勤勞王, SBCK: 將殺其丗子申生公子重耳謂之曰子盍言子之志於公乎丗子曰不可君安驪􅁎是我傷公之心也曰然則盍行乎丗子曰不可謂君謂我欲殺君也天下豈有無父之國哉吾何行如之使人辭於狐突曰君老矣子少國}
