  - {type: variant, offset: 402, length: 3, content: 任愷素, krp: 陳嬰者東陽令史也少年殺其令相聚邑中從之者得二萬人欲立嬰爲王嬰母謂曰吾爲乃家婦聞先故未曽貴今暴得大名不祥不如}
