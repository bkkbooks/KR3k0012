  - {type: variant, offset: 1275, length: 0, content: '', SBCK: 口並酬應不相叅渉益部􅂄舊傳曰何祇􅀘成都令使人投筭祇聽其讀而心計不差升合其精如此費禕别傳曰于時戰國多事衆務煩猥禕識寤過人毎續書記粗舉目蹔視巳充其數接納賔客飲食嬉戯加之􅀶弈毎盡人之歡事不廢也董允代禕爲尚書令欲則禕之所行旬日之中事多紆滯允爲歎曰才力相懸􅀂此之逺􅀃􅁐曰昔鄒忌爲齊相稷下先生淳于髠之屬七十二人皆輕鄒忌爲設妙辭淳于三稱鄒忌三知之如應響淳于等辭詘而去故所以尚干將莫耶者貴於立斷也所以尚騏􅂹爲立至也是以聦明敏捷欲人之入也世􅀃曰魏武嘗過曹娥碑下楊脩從碑背上題曰黃絹㓜婦外孫韲􅍫魏武謂脩卿解不荅曰解魏武帝曰卿未可言待我思之行三十里乃曰巳得令脩别記所知脩曰黃絹色絲也於字爲絶㓜婦少女也於字爲妙外孫女子也於字爲好韲臼受辛也於字爲辤所謂絶妙好辤帝亦記之與脩同乃歎曰不如卿三十里世􅀃曰人餉食魏武帝一杯酪魏武噉少許盖頭題上爲合字以示衆莫之解次至楊脩使噉曰公教人一口何疑強記禮記曲禮曰􅀶聞強識謂之君子漢書曰上行幸河東甞云書一篋}
  - {type: page-break, offset: 1275, content: '', id: KR3k0012_SBCK_432-8a}
  - {type: page-break, offset: 1275, content: '', id: KR3k0012_SBCK_432-8b}
  - {type: variant, offset: 1275, length: 0, content: '', WYG: 口並酬應不相参涉益部耆舊傳曰何祗補成都令使人投筭祗聴其讀而心計不差升合其精如此費禕别傳曰于時戰國多事衆務煩猥禕識窹過人毎讀書記粗舉目蹔視已充其數接納賔客飲食嬉戯加之博奕毎盡人之歡事不廢也董允代禕為尚書令欲則禕之所行旬日之中事多紆滯允為嘆曰才力相懸若此之逺說苑曰昔鄒忌為齊相稷下先生淳于髠之屬七十二人皆輕鄒忌為設妙辭淳于三稱鄒忌三知之如應嚮淳于等辭詘而去故所以尚干将莫邪者貴于立斷也所以尚騏􅂹為立至也是以聰明敏㨗欲人之入也世說曰魏武常過曹娥碑下楊脩從碑背上題曰黄絹㓜婦外孫韲臼魏武謂脩卿解不答曰解魏武帝曰卿未可言待我思之行三十里乃曰已得令脩别記所知脩曰黄絹色絲也於字為絶㓜婦少女也於字為妙外孫女子也於字為好虀臼受辛也於字為辭所謂絶妙好辭帝亦記之與脩同乃歎曰不如卿三十里世說曰人餉食魏武帝一杯酩魏武噉少許盖頭題上為合字以示衆莫之解次至楊脩便噉曰公教人一口又何疑強記禮記曲禮曰博聞強識而讓敦善行而不怠謂之君子漢書曰上行幸河東嘗亡書一箧}
