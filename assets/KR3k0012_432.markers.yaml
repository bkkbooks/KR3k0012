  - {type: variant, offset: 2651, length: 121, content: 成不詔曰光光大魏富有四海棟梁大臣而有蔬食非吾所以禮賢之意也其賜射鹿師二人并給媒弩三輔決錄曰前隊大夫有范仲翁鹽豉蒜果共一筩言其麤儉也會稽典錄曰陳脩字奉先遷為豫章守性清潔恭儉十日一炊不燃官薪殷康明慎曰古人云驕奢人之殃恭儉福之場古今善言曰靈帝時欲用, SBCK: 質}
