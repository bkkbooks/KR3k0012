  - {type: variant, offset: 2461, length: 224, content: 餘年歷掌清要家無擔石之蓄恭儉深仁未嘗以喜慍形於顏色而親覽下士推轂後進雖位崇年高曾無倦色文子曰量腹而食度身而衣節乎己者貪心不生矣墨子曰晉文公好惡衣臣下皆衣牂羊之裘以韋帶劍呂氏春秋曰周明堂茅茨蒿柱土階三尺以見儉也風俗通曰大禹闕百品之羞而菲庖廚殷湯寐寢黃屋駕而乘露輿魏武別傳曰武皇帝子中山恭王袞尚儉約教勑妃妾紡績織紝習為家人之事桓階別傳曰階為趙郡太守時俸盡食醬酻上聞之數戲曰卿家作醬頗得成不詔曰光光大魏富有四海棟梁大臣而有蔬食非吾所以禮賢之意也其賜射鹿師, WYG: ''}
