  - {type: variant, offset: 383, length: 0, content: '', krp: 今在隱屏先生胡不踞衮乃揖而延之正席而坐吿之曰何以幽顯易其操者乎樊英别傳曰英甞病卧便室中英妻遣婢拜問英荅拜或問之英曰妻齊也說苑曰魯有恭士名曰机泥行年七十其恭甚益冬日行隂夏日行陽一食之間三起見衣裘褐之士則爲之禮魯君問曰机子年甚長矣不可釋恭平泥對曰君子好恭以成其名小人學恭以除其刑斧鑚加於泥者何釋恭爲又曰趙簡子乗弊車瘦馬衣設羊裘其宰諌曰車新則安馬肥則徃來疾狐格之裘温且輕簡主曰吾非不知吾聞君子服美則益恭小人服美則益倨我以自俻恐有小人之心也智易繋辭曰智周乎萬物而道濟天下禮記中庸曰舜其}
  - {type: variant, offset: 384, length: 2, content: 禹聖, krp: 智也與舜好問而好察邇言論語公冶長曰寗武子邦有道則智邦無道則愚其智可及其愚不可及也寗武子衛大夫寗俞又雍也曰智}
  - {type: punctuation, offset: 387, content: ，, id: KR3k0012_CHANT_432-bkkpn145}
  - {type: 'tls:seg', offset: 387, content: '', id: KR3k0012_CHANT_432-8a.14}
  - {type: variant, offset: 387, length: 0, content: '', krp: 樂水又曰智者動爾雅曰歫齊州以南戴曰爲丹穴丹穴之人智史記秦使王稽於魏知范雎賢載入秦至湖穰侯至勞稽曰君得無與諸遊子俱來稽曰不敢即別去睢曰吾聞穰侯智士也其見事遲向者疑車中有人忘索之於是下車走行十餘里果使騎還索車中無人}
  - {type: variant, offset: 388, length: 12, content: 惜寸陰至於凡俗當惜分陰晉, krp: 止又曰摴里子名疾秦惠王弟也滑稽多智秦人號曰智囊又曰眺錯以辯得幸太子太子家號曰智嚢又曰項王謂漢王曰天下匈匈數歳者徒以吾兩人耳願與漢王挑戰决雄雌漢王笑謂曰吾寧闘智不闘力漢}
  - {type: punctuation, offset: 391, content: ，, id: KR3k0012_CHANT_432-bkkpn146}
  - {type: 'tls:seg', offset: 391, content: '', id: KR3k0012_CHANT_432-8a.15}
  - {type: variant, offset: 393, length: 173, content: 凡俗當惜分陰晉書曰任愷素有識鑒加以在公勤恪甚得朝野稱譽唐書曰杜佑性勤而無倦雖位極將相手不釋卷質明視事接對賓客夜則燈下讀書孜孜不怠與賓佐談論人憚其貴而伏其博杜預自敘曰在家則滋味經籍居官則畢力理治公家之事知無不為夏仲御別傳曰夏統字仲御永興人與母兄弟居恒星行夜歸採梠求食母老病不悰家事仲御鼓四起洒掃庭內鑽火炊爨之後徑便入野孟子曰雞鳴而起孜孜為善舜之徒也, SBCK: 重}
