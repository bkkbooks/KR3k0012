  - {type: variant, offset: 2761, length: 1, content: 青, WYG: 蜀郡司空張温謂之曰第五伯魚從蜀郡入為司空吾今掃第以待足下矣西京雜記曰朱買臣為會稽太守懐章綬還至舎亭而國人未知也所知錢勃見曝露乃勞之曰無罷乎遺以紈扇買臣至郡引為上客尋遷為掾吏韓子曰李悝為魏文侯上地之守而欲人之善射乃下令曰民有狐疑之訟者令之射的中之者勝不中者負令旦下而人皆習射日夜不休及與秦戰大敗之以民之善射也風俗通曰蜀郡任嘉年三四嵗時父騰為諸生於漢中就師有盜賊道路斷絶蜀亦覆没客轉長沙為州郡吏後嘉為長沙太守騰為奏曹掾黙知嘉實其子一日嘉母語次謂嘉曰奏曹任掾則汝父也但差老耳嘉曰天下豈獨有一任夫人何以老更生邪意母曰咄我守養汝數十年無嫌譏豈以垂没更失計哉顧實真父不可棄捐後嘉問掾聲音何類太守何州里耶掾曰本犍為武陽人蓬轉流宕到此母察審諦又識左耳前贅因出抱持對之流涕嘉自投榻歔欷哽咽世説曰爰綜為新安太守南界有刻石爰至其下醼有人於石下得剪刀者衆咸異之主簿對曰昔長沙恒王嘗飲餞孫洲父老云此洲狹而長君當為長沙事果應夫三刀為州今得交刀君亦當為交州後果作交州世語曰荆}
