  - {type: variant, offset: 165, length: 0, content: '', krp: 劉世智字子房貞素有寔兄風少貧窶毎負薪自給讀書不輟竟以儒行稱歷吏部郎出爲潁川}
  - {type: variant, offset: 166, length: 0, content: '', SBCK: 守平原管輅甞謂人曰吾與劉潁川兄弟語使人神思清發昬不暇􅄰自此之外殆白日欲寢矣又曰劉胤王敦請爲右司馬胤知敦有不臣心枕疾不視事以是悮敦意岀爲豫章太守辭以脚疾詔就家授印綬郡人莫鴻南土豪族因亂殺夲縣令横恣無道百姓患之胤至誅鴻及諸豪右界内肅然晉起居注太康八年詔曰昔先王御俗以興至治未有不先成民事者也漢宣識其如此是以歎息良二千石今欲皆先外郡治民著績然後入爲常伯納言及典兵􅀫衛黄門散􅀐中書郎晉書吕光載記曰吕纂尅金城太守衛鞬鞬瞋目謂光曰我寕守節斷頭不爲降虜也光義而免之沈約宋書曰羊玄保爲黄門郎善弈棊棊品第三太祖亦好棊數蒙引見嘉其温謹與太祖賭郡戲勝以􅀘宣城太守齊書曰王敬則遷吴興太守郡舊多剽掠有十數小兒於路取遺物敬則殺之以徇自此路不拾遺物郡無刼盗又録得一偷召其親屬於前鞭之令偷身長掃街路乆之乃令偷舉舊偷自代諸偷恐爲所識皆逃走境内以清又曰劉善明太祖踐祚以善明勲誠欲與善明禄召謂之曰淮南近畿國之形勝自非親賢不使居之卿爲我卧治也代髙}
