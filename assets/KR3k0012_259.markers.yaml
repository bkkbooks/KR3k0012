  - {type: variant, offset: 2760, length: 2, content: 為青, SBCK: 字稚珪瑶兄弟皆以令德著聞瑶少有公望遷扶風太守徙爲蜀郡司空張温謂之曰弟五伯魚從蜀郡入爲司空吾今掃弟以待足下矣西京􅄂記曰朱買臣爲㑹稽太守懷章綬還至舎亭而國人未知也所知錢勃見曝露乃勞之曰無罷乎遺以紈扇買臣至郡引爲上客㝷遷爲􅁺吏韓子曰李悝爲魏文侯上地之守而欲人之善射乃下令曰民有狐疑之訟者令之射杓中之者勝不中者􅀒令旦下而人皆習射日夜不休及與􅁗戰大敗之以民之善射也風俗通曰蜀郡任嘉年三四歳時父騰爲諸生於漢中就師有盗賊道路斷絶蜀亦覆没客轉長沙爲州郡吏後嘉爲長沙太守騰爲奏曹􅁺黙知嘉實其子曰嘉母語次謂嘉曰奏曹任􅁺則汝父也但差老耳嘉曰天下豈獨有一任夫人何以老更生邪意母曰咄我尚守飬汝數十年無嫌譏豈以垂没更失計哉顧實真父不可棄􅂢後嘉問􅁺聲音何􅀋太守何州里耶􅁺曰夲犍爲武陽人蓬轉流宕到此母察審諦又識左耳前贅因出抱持對之流涕嘉自㧞榻歔欷哽咽世􅀃曰爰綜爲新安太守南界有刻石爰至其下醼有人於石下得剪刀者衆咸異之主簿對曰昔長沙桓王甞飲餞孫洲父老云此洲狹而長君當爲長沙事果應夫三刀爲州今得交刀君亦當爲交州後果作交州世語曰荆}
