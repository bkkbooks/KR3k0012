  - {type: variant, offset: 3100, length: 204, content: 置酒大會坐中耆老相與流涕而歎曰吾等投老更得父母死將何恨又童謠曰幸哉遺民免豺虎三辰既朗遇慈父玄酒清醪甘瓠脯亦何報恩歌且舞陶氏家傳曰基字叔先為交州刺史始夷人不識禮義男女牙相奔隨生子乃不知父君乃敦以婚姻之道訓以父子之恩道之以禮齊之以刑設庠序立學校合境化之莫不悅之語林曰何公為楊州有葬親者乞數萬錢而帳下無有楊州常有糲米以賑孤寡乃有萬餘斛虞存為治中面見道帳下空素求粲此米付帳下何公曰何次道義不與孤寡爭粒酷刺史續漢書曰侯, SBCK: 御}
