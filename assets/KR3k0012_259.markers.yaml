  - {type: variant, offset: 1125, length: 1628, content: 此土而鱷魚悍然安谿潭食民畜熊鹿麞豕以肥其身以繁其卵與刺史爭為長雄刺史雖駑弱安肯為鱷魚低手而下哉今潮州大海在其南鯨鵬之大蝦蟹之細無不容鱷魚朝發而夕至今與鱷魚約三日乃至七日如頑而不徙須為物害則刺史選材伎壯夫操勁弓毒矢與鱷魚從事矣呪之夕有暴風雷起於湫中數日湫水盡涸徙於舊湫西六十里自是潮人無鱷患又曰盧鈞開成元年為廣州刺史御史大夫嶺南節度使南海有蠻舶之利珍貨輻湊舊帥作法興利以致富凡為南海者靡不稇載而還鈞性仁恕為政廉潔請監軍領市舶使己一不干預自貞元已來衣冠得罪流放嶺表者因而物故子孫貧悴雖遇赦不能自還凡在封境者鈞減俸錢為營槥櫝其家疾病死喪則為醫藥殯斂孤兒稚女為之婚嫁凡數百家由是山越之俗服其德義不嚴而人化又曰朱敬則為御史冉祖雍所誣貶授廬州刺史經數月代到還鄉里無淮南一物唯有所乘馬一疋諸子姪徒步而歸又曰許圉師轉相州刺史政寬存惠人吏刊石以頌之嘗有官吏犯贓事露圉師不令推究但賜清白詩以激其犯者愧懼遂改節為廉士其寬如此又曰齊瀚定州義豊人為汴州刺史河南為雄郡自江淮達于河洛舟車輻湊人庶浩繁前後牧守多不稱職唯倪若水與瀚皆以清嚴為治吏民歌之又曰李勉為廣州刺史兼嶺南節度使觀察番禺賊帥馮崇道桂州叛將朱濟時等阻洞為亂前後累歲陷沒十餘州勉至遣將李觀與容州刺史王翃併力招討悉斬之五嶺平前後西域舶泛海者歲纔四五勉性廉潔舶來都不撿閱故末年舶至者四十餘在官累年器用車服無增飾者耆老以為可繼前朝宋璟盧奐李朝隱之徒人吏詣闞請立碑代宗許之又曰楊城為道州刺史在州以家人法待吏人宜罰者罰之宜賞者賞之一不以簿書介意道州土地產民多矮每年常配鄉戶貢其男號為矮奴城不平其以良為賤又憫其編甿歲有離異之苦乃抗䟽論而免之自是乃停其貢民皆賴之無不泣荷又曰尹思貞為青州刺史境內有蠶一年四熟者黜陟使衛州司馬路敬潛八月至州見蠶歎曰非善政孰能至於此乎特表薦之又曰馬璲改懷州刺史乘兵亂之後其夏大旱人吏失耕稼璲乃務修教化將吏有父母者璲輒造之施敬收瘞暴骨去其煩苛至秋界中生穭穀人頗賴之又曰牛心孺為鄂州刺史武昌軍節度使江夏城容土散惡難立垣墉每年加版築賦菁茅以覆之吏緣為奸蠹弊綿歲僧孺至計茅莒板築之費歲十餘萬即賦之以塼以當苫筑之價凡五年墉皆甃蓇蠹弊永除又曰皇甫無逸為同州刺史閉門自守不通賓客左右不得出門凡所貨易皆往他州每桉部樵棌不犯於人嘗夜宿人家遇燈炷盡人主將續之無逸遽抽佩刀斷衣帶以為其炷其廉介如此又曰呂元膺為蘄州刺史頗著恩信嘗歲終閱郡獄囚囚有自告者曰某有父母在明日元正不得相見因泣下元膺憫焉盡脫其械縱之以為期守吏曰賊不可縱元膺曰吾以忠信待之及期無後到者由是群盜感義相引而去又曰柳宗元為柳州刺史土俗以男女質錢過期則沒入宗元革其鄉法其已沒者仍出私錢贖之歸其父母又曰王仲舒為洪州刺史江南西道觀察使江西前例榷酒私釀法深仲舒主鎮奏罷之又出官錢二萬貫代貧戶輸稅又曰令孤楚子緒以蔭授官歷隋壽汝三郡刺史在汝州日有能政郡人請立碑頌緒以弟綯在輔弼上言曰臣先父元和中特承恩顧弟陶官不因人出自宸衷臣伏睹詔書以臣刺壽州日粗立政勞民民求立碑頌尋乞追罷臣任隋州日郡人乞留得上下考此名以聞於日下不必更立碑頌乞賜寢停宣宗嘉其意從之五代史梁書曰韓建為潼關防禦使兼華州刺史河潼經大寇之後戶口流散建披荊棘闢污萊勸課農事樹植蔬果出入閭里親問疾苦不數年流亡畢復軍民充實又曰王檀字眾美為密州刺史郡接淮戎舊無壁壘乃率丁夫修築羅城六旬而畢居民賴之又曰趙克裕河陽人也繼領毫鄭二州刺史時關東藩鎮方為蔡寇所毒黎元流散不能相保克裕妙有農戰之備復善於綏懷民賴而獲安五代史晉史曰相里今自羽林都虞候為忻州刺史凡部曲私屬將吏不遣涖州邑之職皆優其給贍使分掌家事而已其後累典大都皆有聲績又曰澤州奏前刺史史延韜離州為軍民遮圍不放出城兼截下馬鐙其史延韜經三日後夜開城門赴闕又曰安元信歷數任皆名郡也親族謂曰公身俸二千石鬢有白髮家無肥美田園何以為子孫計元信曰吾本無文經武略遭遇先帝風雲之會繼提郡印位在親人平生之望過矣每以衣食豊足為愧安有積貨治產欲為豚犬輩後圖不亦愚乎聞者美之英雄記曰幽州刺史劉虞食不重餚藍縷繩履, SBCK: ''}
