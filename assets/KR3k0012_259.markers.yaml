  - {type: variant, offset: 26, length: 0, content: '', SBCK: 夜行今子何如買臣蝢首辝謝買臣衣故衣懷其印綬歩歸郡邸時㑹稽吏方相與羣飲不視買臣買臣入室中守邸與共食且飽少見其綬守邸怪之前引其綬又視其印㑹稽太守章也守邸驚出相語上計椽吏皆醉大呼曰妄誕耳守邸曰試來視之其故人素輕買臣者入内視之}
  - {type: page-break, offset: 26, content: '', id: KR3k0012_SBCK_259-2a}
  - {type: variant, offset: 26, length: 0, content: '', WYG: 夜行今子何如買臣頓首辭謝買臣衣故衣懐其印綬步歸郡邸時會稽吏方相與羣飲不視買臣買臣入室中守邸與共食且飽少見其綬守邸恠之前引其綬又視其印會稽太守章也守邸驚出相語上計掾吏皆醉大呼曰妄誕耳守邸曰試來視之其故人素輕買臣者入内視之}
  - {type: page-break, offset: 26, content: '', id: KR3k0012_WYG_259-3a, image: WYG0895/WYG0895-0331a.png}
  - {type: variant, offset: 26, length: 0, content: '', krp: 夜行今子何如買臣蝢首辝謝買臣衣故衣懷其印綬歩歸郡邸時㑹稽吏方相與羣飲不視買臣買臣入室中守邸與共食且飽少見其綬守邸怪之前引其綬又視其印㑹稽太守章也守邸驚出相語上計椽吏皆醉大呼曰妄誕耳守邸曰試來視之其故人素輕買臣者入内視之}
  - {type: variant, offset: 27, length: 1, content: 鄉, SBCK: 走疾呼曰實然座中驚駭丞守相推排陳列庭中拜謁又曰龔勝楚人也哀帝以勝守右扶風數月上知勝非撥煩吏遷勝光禄卿東觀漢記曰彭寵字伯通南陽宛人也父容哀帝時爲漁陽太守有名於邊容貌飲食絶衆是時單于來朝當道二千石皆選容貌飲食者故容徙爲雲中太守又曰馮勤字偉伯曽祖􅀭宣帝時爲弘農太守生八男皆典郡趙魏間號爲萬石諸馮至是世至二千石漢􅄂事曰蔣滿爲上黨其子萬爲北地都尉同詔徴見宣帝曰父子剖符耶即詔滿爲淮陽相萬爲弘農守後漢書曰郅惲再遷長沙太守先是長沙有孝子}
  - {type: page-break, offset: 27, content: '', id: KR3k0012_SBCK_259-2b}
  - {type: variant, offset: 27, length: 1, content: 鄉, WYG: 走疾呼曰實然坐中驚駭白丞守相推排陳列庭中拜謁又曰龔勝楚人也哀帝以勝守右扶風數月上知勝非撥煩吏遷勝光禄卿東觀漢記曰彭寵字伯通南陽宛人也父容哀帝時為漁陽太守有名於邊容貌飲食絶衆是時單于來朝當道二千石皆選容貌飲食者故容徙為雲中太守又曰馮勤字偉伯曾祖楊宣帝時為𢎞農太守生八男皆典郡趙魏間號為萬石諸馮至是世至千石漢雜事曰蔣滿為上黨其子萬為北地都尉同詔徵見宣帝曰父子剖符耶即詔滿為淮陽相萬為𢎞農守後漢書曰郅惲再遷長沙太守先是長沙有孝子}
