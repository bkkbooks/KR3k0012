  - {type: variant, offset: 9, length: 0, content: '', SBCK: 記曰萬石君􅁬其父趙人也姓石氏􅁬長子建次子甲次子乙官皆至二千石於是景帝曰石君及四子皆二千石人臣尊寵乃集其門號􅁬爲万石君孝景季年万石君以上大夫禄歸老于家以歳時爲朝臣過宫門闕万石君必}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 記曰萬石君奮其父趙人也姓石氏奮長子建次子甲次子乙次子慶官皆二千石於是景帝曰石君及四子皆二千石人臣尊寵乃集其門號奮為萬石君孝景季年萬石君以上大夫禄歸老於家以嵗時為朝臣過宫門闕萬石君必}
