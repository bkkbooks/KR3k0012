  - {type: variant, offset: 13, length: 2, content: 姜謨, SBCK: 郡守􅁗官也常治其郡袟二千石有丞邊郡又有史掌兵馬祑皆六百石景帝中二年更名太守又曰季布爲河東太守孝文時人有言其賢召欲以爲御史大夫又言其勇使酒難近至留邸一月見罷布進曰臣待罪河東陛下無故召臣此人必有以臣欺陛下者今臣至無所受事罷去此人必有毀臣者夫以一人譽召臣一人毀去臣臣恐天下有識聞之有以窺陛下韋昭曰窺見陛下深淺也上黙然慙曰河東吾股肱郡故特召君耳又曰􅃊助㑹稽人也上問所欲對曰願爲㑹稽太守在郡數年不聞問上賜詔書曰君猒承明之廬石渠門外勞侍從之事懷故土出爲郡間者闊焉乆不聞問助惶恐上書謝曰臣事君猶子事父臣當伏誅願奉二年計最如淳曰舊法當使丞奉􅀊計躬自欲入奉之也最凡要也又曰朱買臣字翁子}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_SBCK_259-1b}
  - {type: variant, offset: 13, length: 2, content: 姜謨, WYG: 郡守秦官也掌治其郡秩二千石有丞邊郡又有史掌兵馬秩皆六百石景帝中二年更名太守又曰季布為河東太守孝文時人有言其賢召欲以為御史大夫又言其勇使酒難近至留邸一月見罷布進曰臣待罪河東陛下無故召臣此人必有以臣欺陛下者今臣至無所受事罷去此人必有毁臣者夫以一人譽召臣一人毁去臣臣恐天下有識聞之有以窺陛下韋昭曰窺見陛下深淺也上黙然慙曰河東吾股肱郡故時召君耳又曰嚴助會稽人也上問所欲對曰願為會稽太守在郡數年不聞問上賜詔書曰君厭承明之廬石渠門外勞侍從之事懐故土出為郡間者闊焉乆不聞問助惶恐上書謝曰臣事君猶子事父臣當伏誅願奉二年計最如淳曰舊法當使丞奉嵗計助自欲入奉之也最月要又曰朱買臣字翁子}
