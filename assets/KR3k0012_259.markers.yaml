  - {type: variant, offset: 270, length: 7, content: 賈敦頤曹州冤句, SBCK: 王敬則爲吴興太守入烏程從市過見屠􅁏枅結賢反歎曰吴興昔無此枅是我少時在此作也召故人飲酒􅀃平生不以屑也南史曰謝超宗有髙名齊髙帝以超宗爲義興太守昇明二年坐公事免詣東府門自通其日風寒髙帝謂四坐曰此客至使人不衣自䁔矣三國典略曰王慶籍爲京兆太守太祖以其精勤賚以紫􅂁及綾裳一襲謂百官曰王慶籍一世清}
