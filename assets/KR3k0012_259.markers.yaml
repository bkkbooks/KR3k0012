  - {type: variant, offset: 5, length: 3, content: 六良刺, SBCK: 七太守論語子路曰善人爲􅀖百年亦可以勝殘去殺矣善人居中不踐迹不入室也此人爲政不能早有成功百年乃能無殘暴之人}
