  - {type: variant, offset: 29, length: 0, content: '', SBCK: 􅀄遭父䘮未葬鄰}
  - {type: variant, offset: 29, length: 0, content: '', WYG: 初遭父䘮未葬隣}
  - {type: variant, offset: 29, length: 0, content: '', krp: 𥘉遭父䘮未葬鄰}
  - {type: variant, offset: 30, length: 1, content: 所, SBCK: 失火􅀄匍匐柩上以身扞火火爲之㓕惲真異之以爲首舉又曰任延爲武威太守帝親見戒之曰善事上官無失名譽延對曰臣聞忠臣不私私臣不忠履正奉公臣子之節上下雷同非陛下之福善事上官臣不敢奉詔帝歎息曰卿言是也又曰橋玄爲上谷太守上邽姜歧守道隱居名聞西州玄召以爲吏稱疾不就玄怒勑督郵尹益逼致之曰歧􅀂不至趣嫁其母趣音促益固争不能得遽暁譬歧歧堅卧不起郡内士大夫亦徃諌玄乃止時頗以爲譏漢官解詁云太守專郡信理庻績勸農賑貧決訟斷辟興利除害檢察詳姧舉善黜惡誅殺􅁀殘者也魏志曰賈逵字梁道太祖征馬超至弘農曰此西道之要以逵領弘農太守召見計事大恱之謂左右曰使天下二千石悉如賈逵吾何憂也又曰劉靖馥之子也黄􅀄中遷廬江太守詔曰卿父昔爲彼州今卿復爲此郡可謂能克􅀒荷者也又曰曹仁字子孝太祖征吕布仁别攻句陽抜之數有功拜廣陽守太祖器其勇略不使之郡蜀志曰法正字孝直先主以正爲蜀郡太守􅀭武將軍外統都畿内爲謀主一飡之德睚䀝之怨無不報覆擅殺毀傷巳者數人或謂諸葛亮曰法正於蜀郡大縱横將軍啓主公抑其威福亮荅曰主公之在公安也北畏曹操之強東憚孫權之逼近則慮孫夫人生變於肘腋當斯之時進退狼跋法孝直爲之輔翼令翻然翺翔不可復制如何禁法正使不得行其意也又曰劉琰字威碩魯國人也先主在豫州辟爲從事以其宗姓有風流善談論厚親待之遂墮從周旋常爲賔客先主定益州以琰爲固陵太守吴志曰士爕爲交阯太守中國士人徃依避難者以百數躭翫春秋爲之注解陳國􅀽徽與}
