  - {type: variant, offset: 3333, length: 607, content: 五倫上䟽襃稱盛美曰前歲誅刺史二千石貪殘者皆明聖所察非臣下所及晉書曰郄隆為楊州刺史僚屬有過輒依臺閣峻制繩之遠近咸怨干寶晉記曰茍晞為兗州刺史姨母寡有一子坐小事姨母向晞叩頭及中外皆乞活不聽死後往哭之甚悲曰殺弟者兗州刺史哭卿者茍道將也後魏書曰于洛侯代人也以勞舊為秦州刺史而貪酷安忍民王富熾奪民呂勝脛無有紀極夜常不臥執燭達曉呼召賓客說人間細事戲謔無不為性不飲酒唯多置餚胾晝夜食噉而已自旦至中方始寢寐又曰齊以斛律武都為兗州刺史塗經衛地受絹千疋黎陽郡守石曜手持一縑而謂之曰此是老石機杼聊以奉贈自此已外並須出於吏人武都知曜清素純儒笑而不責北史曰齊漁陽王紹信文襄第六子歷特進青州刺史行過漁陽與大富人鍾長命同坐太守鄭道蓋來謁長命欲起紹信不聽曰此何物小人主人公為𧺫乃與長命結為義兄弟仍與長命妻為姉妹責其闔家長幼皆有贈賄鍾氏遂貧又曰齊安德王延宗為定州刺史於樓上大便使人在下張口承以豬糝和人糞以飼左右有難色者鞭之隋書曰庫狄士文拜貝州刺史性清苦不受公料家無餘財子嘗噉官廚餅士文枷之於獄累日杖之一百步送還京僮隸無敢出門所買塩菜必於外境凡有出入皆封署其門親舊絕跡慶吊不通法令嚴肅吏人股戰道不拾遺有細過必深文陷害又曰庫狄士文為貝州刺史發摘奸隱長吏尺布斗粟之贓無所寬貸得千餘人而奏之上悉配防嶺南親戚相送哭泣之聲遍於州境至嶺南遇瘴癘死者十八九於是父母妻子唯哭士文士文聞之令人捕捉撾捶盈前而哭者彌甚又曰趙仲卿拜石州刺史法令嚴猛纖微之失無所容捨鞭笞長吏輒至, SBCK: ''}
