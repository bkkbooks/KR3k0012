  - {type: variant, offset: 30, length: 1, content: 所, WYG: 失火初匍匐柩上以身扞火火為之滅惲歎異之以為首舉又曰任延為武威太守帝親見戒之曰善事上官無失名譽延對曰臣聞忠臣不私私臣不忠履正奉公臣子之節上下雷同非陛下之福善事上官臣不敢奉詔帝歎息曰卿言是也又曰橋𤣥為上谷太守上邽姜岐守道隠居名聞西州𤣥召以為吏稱疾不就𤣥怒勅督郵尹益逼致之曰岐若不至趣嫁其母趣音促益固爭不能得遽曉譬岐岐堅卧不起郡中士大夫亦往諫𤣥乃止時頗以為譏漢官解詁云太守專郡信理庶績勸農賑貧决訟斷辟興利除害檢能察奸舉善黜惡誅殺暴殘者也魏志曰賈逵字梁道太祖征馬超至𢎞農曰此西道之要以逵領𢎞農太守召計事見大悦之謂左右曰使天下二千石悉如賈逵吾何憂也又曰劉靖馥之子也黄初中遷廬江太守詔曰卿父昔為彼州今卿為此郡可謂能克負荷者也又曰曹仁字子孝太祖征吕布仁别攻句陽拔之數有功拜廣陽大守太祖器其勇畧不使之郡蜀志曰法正字孝直先主以正為蜀郡太守揚武將軍外統都畿内為謀主一飡之德睚眦之怨無不報復擅殺毁傷己者數人或謂諸葛亮曰法正於蜀郡大縱横將軍啟主公抑其威福亮答曰主公之在公安也北畏曹操之强東憚孫權之逼近則慮孫夫人生變於肘腋當斯之時進退狼跋法孝直為之輔翼令翻然翺翔不可復制如何禁法正使不得行其意也又曰劉琰字威碩魯國人也先主在豫州辟為從事以其宗姓有風流善談論厚親待之遂隨從周旋常為賔客先主定益州以琰為固陵太守吳志曰士爕為交阯太守中國士人往依避難者以百數躭翫春秋為之注解陳國袁徽與}
