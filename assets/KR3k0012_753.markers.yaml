  - {type: variant, offset: 2139, length: 456, content: 目而招王之左右侍妾王怒立便欲誅偃師偃師大懾立剖散倡者以示王皆草木膠漆白黑丹青之所為也自內則肝膽心肺脾腎腸胃外則筋骨支節皮毛齒髮皆假物也無不畢具者合會復如初王誠廢其心則口不能言廢其肝則目不能視廢其腎則足不能步穆王曰人之巧乃與造化同功乎詔貳車載之以歸夫班輸之雲梯墨翟之飛鳶自謂能之極也弟子東賣會滑釐間以偃師之巧告於二子二子終身不敢語藝而時執規矩焉又曰宋人有為其君以玉為楮葉者三年而後成亂之楮葉中而不可別也此人遂以巧食宋國列子聞之曰使天地生物三年而成一葉則物之有葉者寡矣故聖人持道化而不持智巧韓子云象為楮葉又曰考成子學幻於尹文先生三年不告考成子請其過而求退尹文先生曰昔老聃之祖西也顧而告余曰有生之氣有形之狀盡幻也造化之所始陰陽之所變者謂之生謂之死窮數達變因形移易者謂之化謂之幻造物者其巧妙其功深故難終難窮因形者其巧顯其功淺故隨起隨滅知幻化之不異生死也始可學夫幻矣吾與汝亦幻也奚須學哉墨子曰公輸子削竹木為鵲成而飛之三日不下自以為至巧墨子謂曰子之為鵲也不如匠為車轄也須臾逝三寸之木而任五十石之重故利於人謂之巧不利於人謂之拙, WYG: 書信寢疾尋亡}
