  - {type: variant, offset: 2717, length: 490, content: 名而不得咫尺之地猶且攻之乎頓罷剉辱銳精攻無罪之宋故負天下以不義之名猶且必也王曰必不得宋又且為不義曷為攻之墨子曰臣見大王之必傷義而不得宋王曰公輸子天下之巧士作為雲梯設以攻宋曷為弗取公輪魯班號時在楚雲梯攻城具高長上與雲齊故曰雲梯設施也墨子曰今公輸設攻宋之械墨子設守之備公輸九攻而墨子九拒之終弗能入入猶下也於是乃偃兵輟不攻宋輟止也又曰神機陰閉剞劂無跡人巧之妙也而治世不以為民業又曰工人下漆而上丹則可下丹而上漆則不可萬事由此也又曰規矩鉤繩者乃巧之具也而非所以為巧巧存於心也又曰神明之事不可以智巧為也不可以筋力致也天地所包陰陽所嘔雨露所濡以生萬殊悲翠瑇瑁碧玉珠文采明朗澤若濡摩而不玩久而不渝奚仲不能旅魯般弗能造此之謂大巧又曰夫至巧不用劍巧在心手故不用劍又曰大匠不用斲又曰夫物有以自然而後人事有治也故良匠不能斲金巧冶不能鑠木金之勢不可斲而木之性不可鑠也埏埴而為器刳木而為舟爍鐵而為刃鑄金而為鍾因其可也尸子曰古者倕為規矩準繩使天下倣焉慎子曰百工之子不學而能者非生而巧也言有常事傅子曰馬先生鈞天下之巧也有二子謂古無指南車記言之虛也先生曰古有之二子以白明帝詔先生作之而指南車成此一異也從是天下服其巧, SBCK: ''}
