  - {type: variant, offset: 3531, length: 0, content: '', WYG: 言圍碁或言兵法之􅁼上者張置疎遠多得道而勝中者務相遮絶争便求利下者守邉隅趨方罫猶薛公之言黥布反也上計取呉楚廣地中計塞成臯􅃒要争利下計據長江以臨越守邉隅趨方罫者也俗說曰羊𤣥保作吏部郎被召見後}
  - {type: variant, offset: 3532, length: 2, content: 田夫, SBCK: 傳詔來始入門其兒靈孫年十許歳見傳詔語其父云兒知也正當圍碁耳語林曰王中郎以圍碁是坐隱亦以圍碁爲手談又曰王武子與武帝圍碁孫皓在側武子問孫歸命何以好剥人面皮皓曰見無禮於君者則剥之乃舉碁局下故譏之又曰豫章太守顧劭是丞相雍之子在郡卒時雍方盛集僚屬圍碁外信}
  - {type: variant, offset: 3532, length: 2, content: 田夫, WYG: 傳詔來始扣門其兒靈孫年十許歲見傳詔語其父云兒知之去當有圍碁耳語林曰王中郎以圍碁為坐隐亦以圍碁為手談又曰王武子與武帝圍碁孫皓在側武子問孫歸命何以好剥人面皮皓曰見無禮于君者則剥之武子乃舉碁局下又曰豫章太守顧劭是丞相雍之子在郡卒時雍方盛集僚屬圍碁外信}
