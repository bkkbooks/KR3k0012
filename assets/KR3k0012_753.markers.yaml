  - {type: 'tls:seg', offset: 3534, content: '', id: KR3k0012_CHANT_753-37a.9}
  - {type: variant, offset: 3535, length: 1, content: 巧, SBCK: 而無兒書雖神意不變而心料有故賔客旣散方歎曰巳無延州之遺累寧有䘮明之責􅁘於是豁情散哀顔色自􅀂方言曰圍碁者自􅀜東齊魯之間謂之弈班固弈指曰北方之人謂碁爲弈弘而說之舉其大略義亦同矣局必方正象地則也道必正直體明德也其有黄黒隂陽分也駢羅列布效天文也四象旣陳行之在人蓋王政也法則臧否爲仁由巳道之正也夢書曰夢圍碁者欲􅃲也魏粲圍碁賦序曰清靈體道稽謨􅀇神圍碁是也魏應瑒弈勢曰蓋碁弈之制所由來尚矣駱驛雨集魚鱗鴈峙奮維闔翼固衛邊鄙㓂動北疊備在南尾晉劉恢圍碁賦序曰司空從事中郎􅁃仲􅀄性好圍碁終不逹碁旨言文則觸􅀋而至對局則􅁳然而窮何所解如彼之易所礙如此之難哉投壷禮記曰投壷之禮主人奉矢司射奉中使人執壷投壷射之􅁼也主人請曰某有枉矢哨且醮切哨不正貌壷請樂賔賔曰子有旨酒嘉肴旣受賜矣又重以樂敢辭主人曰抂矢哨壷不足辭也敢固以請賔曰某旣賜矣又重以樂敢固辭主人曰枉矢哨壷不足辭也敢固以請賔曰某固辭不得命敢不敬從下得命不以命見許賔再拜受主人般還曰辟賔再拜受受矢也主人阼階上拜送賔般還曰辟拜送送矢也巳拜受矢進即兩楹間退反位揖賔就筵司射進度壷間以二矢半反位設中東面執八筭興設中亦賔也八筭於中横委其餘於中西執筭而立以請賔俟投請賔曰順投爲入比投不釋勝飲不勝者正爵旣行請爲勝者立馬一馬從二馬三馬旣立請慶多馬請主人亦如之請猶告也順投矢夲入也比投不捨也勝飲不勝言以能養不能也禮記曰壷頸脩七寸腹脩五寸口徑二寸半容㪷五􅂛壷中實小豆焉爲其矢之躍而出也壷去席二矢半矢以柘􅀂􅁄母去其皮取其堅且重也或言去其皮節也左傳曰晉侯以齊宴中行穆子相投壷晉侯先穆子曰有酒如濰有肉如坘寡君中此爲諸侯師中之齊侯舉矢曰有酒如澠有肉如陵寡人中此與君代興東􅀚漢記曰􅀕遵薨范淑上䟽曰遵爲將軍取士皆用術對酒設樂必雅歌投壷魏略曰邯鄲淳字元淑作投壷賦千餘言奏之文帝以爲工賜帛十疋又曰游楚好投壷自娯晉書曰石崇有妓善投壷隔屏風投之王弼別傳曰弼性和理樂遊宴解音律善投壷崔寔傳曰投壷者皆以多筭飲少筭西京􅄂記曰武帝時郭舎人善投壷以竹爲矢不用􅁄也古之投壷取中}
