  - {type: variant, offset: 1421, length: 554, content: 五色絲稍內口中兩手引之則成文錦似列燈燭也又曰始皇起遊雲臺窮極四方之珍材搜天下之巧工人皆能騰虛緣木揮斤斧於空中又曰始皇二年騫消國獻善畫之工名裂裔刻白玉為兩虎削玉為毛有如真矣不點兩目睛始皇點之即飛去明年南郡有獻白虎二頭始皇使視之乃是先刻玉者始命去目睛二虎不復能去歷代名畫記曰吳王趙夫人丞相趙達之妹善書畫巧妙無雙能於指間以綵織為龍鳳之錦宮中號為機絕孫權常歎巴蜀未平思得善畫者圖山川地形夫人乃進所寫江湖九州山岳之勢夫人又於方帛之上繡作五岳列國地形宮中號為針絕又以膠續絲髮作為輕慢宮中號為絲絕又曰宋謝莊字希逸性多巧思制木方丈圖天下山川土地各有分理離之則州別郡殊合之則寓內為一老子曰大巧若拙又曰絕巧棄利盜賊無有莊子曰陶者云我善治埴圓者中規方者中矩範土曰陶陶化也埴黏土也匠人曰我善治木曲者中鉤直者應繩曲鉤也繩直也謂匠人機巧善能治木曲直必中鉤繩也夫埴木之性豈欲中規矩鉤繩哉土木之性稟之造物不求曲直豈慕方圓陶者匠人浪為臧否又曰百工有器械之巧則壯又曰巧者勞而智者憂無能者無所求又曰無為也而笑巧巧者有為以傷神又曰覆載天地刻雕眾形而不為巧巧者為之妙耳物皆自爾故無所稱巧也此之謂天樂忘樂而樂足矣又曰以瓦注者巧以鉤注者憚以黃金注者昏所要愈重則其心愈棼也又曰郢人堊堊白土墁其鼻端若蠅翼使匠石斲之匠石運斤成風而斲之盡惡而鼻不傷郢人立而不失容, WYG: ''}
