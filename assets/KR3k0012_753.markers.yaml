  - {type: variant, offset: 75, length: 359, content: 見若掌歛事而年尚幼請代之而欲嘗其技巧將從之時人服般之巧公肩假曰不可般爾以人之母嘗巧則豈不得以以已字言寧有強使女者與借於禮作機巧非也以與已字本同又曰目巧之室則有奧阼周禮曰國有六職百工與居一焉百工司空事官之屬於天地四時之職亦處其一也知者創物謂始開端造器物若世本作者是也巧者述之守之世謂之工父子世以相教百工之事皆聖人之作也事無非聖人所為也爍金以為刃凝土以為器作車以行陸作舟以行水此皆聖人所作也凝堅也天有時地有氣材有美工有巧合此四者然後可以為良時寒溫也氣剛柔也良善也續漢書曰張衡性精微有巧藝作地動儀以精銅鑄其器圜徑八尺形似傾樽其蓋穹隆飾以篆文外有八龍首銜銅丸下有蟾蜍承之其牙發機皆隱在樽中周密無際如一體焉地動機發龍即吐丸蟾蜍張口受丸聲乃振揚司者覺知即省龍機其餘七首不發則知地震所從起來也合契若神觀之莫不服其奇麗自古所來未嘗有也, SBCK: 乎}
