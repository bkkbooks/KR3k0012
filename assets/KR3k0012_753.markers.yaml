  - {type: variant, offset: 3535, length: 1, content: 巧, WYG: 而無見書雖神意不變而知子有故賔客既散放歎曰已無延州之遺累寧有喪明之責耶于是豁情散哀顔色自若方言曰圍碁者自闗東齊魯之間謂之弈班固弈㫖曰北方之人謂碁為弈宏而說之舉其大略義亦同矣局必方正象地則也道必正直體明德也碁有黒白隂陽分也駢羅列布效天文也四象既陳行之在人蓋王政也法則臧否為人由己道之正也夢書曰夢圍碁者欲鬭也魏王粲圍碁賦序曰清寧體道稽謨𤣥神圍碁是也魏應瑒弈勢曰蓋碁弈之制所由來尚矣絡繹雨集魚鱗鴈峙奮維闡翼固衛邊鄙冦動北壘備在南尾晉劉恢圍碁賦序曰司空從事中郎庾仲初性好圍碁終不達碁㫖言文則觸類而生對局則𡨕然而窮何所解如彼之易所礙如此之難哉投壺禮記曰投壺之禮主人奉矢司射奉中使人執壺主人請曰某有枉矢哨壺請以樂賔賔曰子有旨酒嘉肴既受賜矣又重以樂敢辭主人曰枉矢哨壺不足辭也敢固以請賔曰某既賜矣又重以樂敢固辭主人曰枉矢哨壺不足辭也敢固以請賔曰某固辭不得命敢不敬從賔再拜受主人般還曰辟主人阼階上拜送賔般還曰辟已拜受矢進即兩楹間退反位揖賔就筵司射進度壺間以二矢半反位設中東面執八筭興請賔曰順投為入比投不釋勝飲不勝者正爵既行請為勝者立馬一馬從二馬三馬既立請慶多馬請主人亦如之禮記曰壺頸修七寸腹修五寸口徑二寸半容斗五升壺中實小豆焉為其矢之躍而出也壺去席二矢半矢以柘若棘毋去其皮左傳曰晉侯與齊宴中行穆子相投壺晉侯先穆子曰有酒如淮有肉如池寡君中此為諸侯師中之齊侯舉矢曰有酒如澠有肉如陵寡人中此與君代興亦中之東觀漢記曰蔡遵夢范叔上疏曰遵為將軍取土皆用術對酒設樂必雅歌投壺魏畧曰邯鄲惇字元淑作投壺賦千餘言奏之文帝以為工賜帛十疋又曰游楚好投壺自娯晉書曰石崇有妓善投壺隔屏風投之王弼别傳曰弼性和理樂逰宴解音律善投壺崔宴傳曰投壺者皆以多筭飲少筭西京雜記曰武帝時郭舎人善投壺以竹為矢不用棘古之投壺取中}
