  - {type: variant, offset: 3529, length: 2, content: 近世, SBCK: 堯造圍碁丹朱善之新語曰丗言圍碁或言兵法之􅀋上者張置踈逺多得道而勝中者務相遮絶争便求利下者守邊隅趨作罫古買反線間方因也猶薛公之言黥布反也上計取呉楚廣地中計塞成臯遮要争利下計據長江以臨越守邊隅趨作罫者也俗說曰羊玄保作吏部郎數􅀍召見後}
