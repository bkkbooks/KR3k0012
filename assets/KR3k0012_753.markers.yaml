  - {type: variant, offset: 1977, length: 347, content: 君聞之召匠石曰嘗試為寡人為之匠石曰臣則嘗能斲之雖然臣質死之矣列子曰周穆王西巡有獻工人名偃師曰臣唯命所試然臣已有所造願王先觀之穆王曰以若俱來吾與若俱觀之越日偃師謁見王王曰若與階來者何人耶對曰臣之所造能倡者穆王驚視之趨步俯仰言皆人也巧夫頷其頤則歌合律捧其手則舞應節千變百化惟意所造王以為實人也與盛姬內御並觀之伎將終倡者瞚與瞬同其目而招王之左右侍妾王怒立便欲誅偃師偃師大懾立剖散倡者以示王皆草木膠漆白黑丹青之所為也自內則肝膽心肺脾腎腸胃外則筋骨支節皮毛齒髮皆假物也無不畢具者合會復如初王誠廢其心則口不能言廢其肝則目不能視廢其腎則足不能步穆王曰人之巧乃與造化同功乎詔貳車載之以歸夫班輸之雲梯墨翟之飛鳶自謂能之極也弟子東賣會滑釐間以偃師之巧告於二子二子終身不敢語藝而時執規矩焉又曰宋人有為其君以玉為楮葉者, krp: 徽}
