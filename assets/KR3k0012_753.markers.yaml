  - {type: variant, offset: 2700, length: 16, content: 乎志其苦眾勞民頓兵剉銳天下以不義, SBCK: 俱學弗􅀂}
  - {type: variant, offset: 2700, length: 198, content: 乎志其苦眾勞民頓兵剉銳天下以不義之名而不得咫尺之地猶且攻之乎頓罷剉辱銳精攻無罪之宋故負天下以不義之名猶且必也王曰必不得宋又且為不義曷為攻之墨子曰臣見大王之必傷義而不得宋王曰公輸子天下之巧士作為雲梯設以攻宋曷為弗取公輪魯班號時在楚雲梯攻城具高長上與雲齊故曰雲梯設施也墨子曰今公輸設攻宋之械墨子設守之備公輸九攻而墨子九拒之終弗能入入猶下也於是乃偃兵輟不攻宋輟止也又曰神機陰閉剞劂無跡人巧之妙也而治世不, WYG: 一心}
