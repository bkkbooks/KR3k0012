  - {type: variant, offset: 1190, length: 107, content: 西京雜記曰長安巧工人丁緩者為恒滿燈七龍五鳳雜以芙華蓮藕之奇又作臥褥香爐一名被中香爐大出房風至綬更始為之環轉四固而爐體常平可致之被褥故取被褥為名又作九層山鑪鏤為奇禽怪獸諸靈皆自然運動又作七輪扇連以七輪大皆徑尺並相連續, SBCK: 忽見}
