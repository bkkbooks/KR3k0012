  - {type: variant, offset: 3208, length: 244, content: 居京都城內有地可為園患無水以溉之先生乃作飜車令童兒轉之而灌水自覆其巧百倍於常此二異也後人有上百戲者能設而不能動帝以問先生可動否鈞曰可動帝曰其巧可益否對曰可益受詔作之以大木雕構使形若輸平潛以水發焉設為女樂舞象使木人擊鼓吹簫木跳丸擲自出自入百官行署變巧百端此三異也先生見諸葛亮連弩曰巧則巧矣未盡善也言作之可令加五倍嘗試以車輪懸瓴甓數十飛之數百步矣馬先生之巧雖古般輸墨翟王爾漢世張平子不能過也又曰馬先生為機器未成裴世子疑而難之先生口屈不能對傅子謂裴子善乎言而不巧馬氏長於巧而短於言巧者天下之微事, SBCK: ''}
