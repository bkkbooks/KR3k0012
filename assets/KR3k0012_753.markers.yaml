  - {type: variant, offset: 884, length: 282, content: 易以十二躡其奇文異變因感而作猶自然而成形陰陽之無窮葛洪神仙傳曰葛由者蜀人也刻木作羊能行一旦騎羊入山遂云得仙未知指實也鄴中記曰石虎有指南車及司里車又有舂車木人及作行碓於車上動則木人蹋碓行十里成米一斛又有磨車置石磨於車上行十里輒磨一斛凡此車皆以朱彩為飾唯用將軍一人車行則眾巧並發車止則止中御史解飛尚方人魏猛變所造虎至性好佛眾巧奢靡不可紀也嘗作擅車廣丈餘長二丈安四輪作金佛像坐於車上九龍吐水灌之又作一木道人恒以手摩佛心腹之間又十餘木道人長二尺餘皆披袈裟繞佛行當佛前輒揖禮佛又以手撮香投爐中與人無異車行則木人行龍吐水車止則止亦解飛所造也玄中記曰奇肱氏善奇巧能為飛車從風遠行, SBCK: 免}
