  - {type: variant, offset: 1334, length: 234, content: 巧為天下第一涼州記曰呂光時有任射者自匿為王欣家奴發覺應死躬有奇巧王爾魯般之儔也故赦之涼風門及大殿歲久傾敗躬運巧致思土木俱正王子年拾遺記曰嶿音須支國去泥離國八萬里其國婦人善織以五色絲稍內口中兩手引之則成文錦似列燈燭也又曰始皇起遊雲臺窮極四方之珍材搜天下之巧工人皆能騰虛緣木揮斤斧於空中又曰始皇二年騫消國獻善畫之工名裂裔刻白玉為兩虎削玉為毛有如真矣不點兩目睛始皇點之即飛去明年南郡有獻白虎二頭始皇使視之乃是先刻玉者始命去目睛二虎不復能去歷代名畫記曰吳王趙夫人丞相趙達之妹善, SBCK: ''}
