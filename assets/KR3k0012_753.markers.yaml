  - {type: variant, offset: 1569, length: 1026, content: 畫巧妙無雙能於指間以綵織為龍鳳之錦宮中號為機絕孫權常歎巴蜀未平思得善畫者圖山川地形夫人乃進所寫江湖九州山岳之勢夫人又於方帛之上繡作五岳列國地形宮中號為針絕又以膠續絲髮作為輕慢宮中號為絲絕又曰宋謝莊字希逸性多巧思制木方丈圖天下山川土地各有分理離之則州別郡殊合之則寓內為一老子曰大巧若拙又曰絕巧棄利盜賊無有莊子曰陶者云我善治埴圓者中規方者中矩範土曰陶陶化也埴黏土也匠人曰我善治木曲者中鉤直者應繩曲鉤也繩直也謂匠人機巧善能治木曲直必中鉤繩也夫埴木之性豈欲中規矩鉤繩哉土木之性稟之造物不求曲直豈慕方圓陶者匠人浪為臧否又曰百工有器械之巧則壯又曰巧者勞而智者憂無能者無所求又曰無為也而笑巧巧者有為以傷神又曰覆載天地刻雕眾形而不為巧巧者為之妙耳物皆自爾故無所稱巧也此之謂天樂忘樂而樂足矣又曰以瓦注者巧以鉤注者憚以黃金注者昏所要愈重則其心愈棼也又曰郢人堊堊白土墁其鼻端若蠅翼使匠石斲之匠石運斤成風而斲之盡惡而鼻不傷郢人立而不失容宋元君聞之召匠石曰嘗試為寡人為之匠石曰臣則嘗能斲之雖然臣質死之矣列子曰周穆王西巡有獻工人名偃師曰臣唯命所試然臣已有所造願王先觀之穆王曰以若俱來吾與若俱觀之越日偃師謁見王王曰若與階來者何人耶對曰臣之所造能倡者穆王驚視之趨步俯仰言皆人也巧夫頷其頤則歌合律捧其手則舞應節千變百化惟意所造王以為實人也與盛姬內御並觀之伎將終倡者瞚與瞬同其目而招王之左右侍妾王怒立便欲誅偃師偃師大懾立剖散倡者以示王皆草木膠漆白黑丹青之所為也自內則肝膽心肺脾腎腸胃外則筋骨支節皮毛齒髮皆假物也無不畢具者合會復如初王誠廢其心則口不能言廢其肝則目不能視廢其腎則足不能步穆王曰人之巧乃與造化同功乎詔貳車載之以歸夫班輸之雲梯墨翟之飛鳶自謂能之極也弟子東賣會滑釐間以偃師之巧告於二子二子終身不敢語藝而時執規矩焉又曰宋人有為其君以玉為楮葉者三年而後成亂之楮葉中而不可別也此人遂以巧食宋國列子聞之曰使天地生物三年而成一葉則物之有葉者寡矣故聖人持道化而不持智巧韓子云象為楮葉又曰考成子學幻於尹文先生三年不告考成子請其過而求退尹文先生曰昔老聃之祖西也顧而告余曰有生之氣有形之狀盡幻也造化之所始陰陽之所變者謂之生謂之死窮數達變因形移易者謂之化謂之幻造物者其巧妙其功深故難終難窮因形者其巧顯其功淺故隨起隨滅知幻化之不異生死也始可學夫幻矣吾與汝亦幻也奚須學哉墨子曰公輸子削竹木為鵲成而飛之三日不下自以為至巧墨子謂曰子之為鵲也不如匠為車轄也須臾逝三寸之木而任五十石之重故利於人謂之巧不利於人謂之拙, SBCK: 信寢疾尋亡}
