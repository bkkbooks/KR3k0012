  - {type: variant, offset: 173, length: 0, content: '', SBCK: 妻也先生死曽子與門人徃弔之見先生尸在牖下覆以布􅀍手足不盡歛覆頭則足見覆足則頭見曽子曰衺其􅀍則歛矣妻曰衺之有餘不如正之不足且先生以衺故至於此又曰齊女徐吾者在海上貧婦人與隣婦人李吾之属合燭相從績徐吾最貧而燭數不属李吾謂曰徐吾燭數不属請無與夜徐吾曰是何言歟今一}
  - {type: variant, offset: 173, length: 0, content: '', WYG: 妻也先生死曾子與門人徃弔之見先生尸在牖下覆以布被手足不盡斂覆頭則足見覆足則頭見曾子曰衺其被則斂矣妻曰衺之有餘不如正之不足且先生以不衺故至於此又曰齊女徐吾者在海上貧婦人與鄰婦人李吾之屬合燭相従績徐吾最貧而燭數不屬李吾謂曰徐吾燭數不屬請無與夜徐吾曰是何言與今一}
