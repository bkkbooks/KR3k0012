  - {type: variant, offset: 2506, length: 35, content: 自賣給食擔束薪行且誦書其妻亦負載相隨數止買臣無歌謳道中買臣愈益疾歌妻羞, SBCK: 喻}
  - {type: variant, offset: 2506, length: 248, content: 自賣給食擔束薪行且誦書其妻亦負載相隨數止買臣無歌謳道中買臣愈益疾歌妻羞之求去買臣笑曰我年五十當富貴今四十餘矣汝苦日久待我富貴報汝功力妻恚曰如公等終餓死溝中耳何能富貴買臣不能留即聽去又曰蔡義河內溫人以明經給事大將軍幕府家貧常步行資禮不逮眾門下好事者相合為義買犢車令乘之又曰主父偃齊國臨淄人學長短縱橫術晚乃學易春秋百家言遊齊諸子聞諸儒生相與排擯不容齊家貧假貸無所得北遊燕趙中皆莫能厚遇又曰陳湯字子公山陽瑕丘人少好學書博達善屬文家貧取貸無節不為州里所稱又曰貢禹上書曰臣禹年老貧窮家貲不滿萬錢妻子糠豆不贍, krp: 支暑熱冬則羊裘鮮札}
