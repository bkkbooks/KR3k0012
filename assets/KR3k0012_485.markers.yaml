  - {type: variant, offset: 649, length: 821, content: 鋏歸來乎食無魚左右以告孟嘗君食之乃比門下諸客居有頃復歌曰長鋏歸來乎出無車左右以告孟嘗君為之駕比門下客後有頃復歌曰長鋏歸來乎無以為家左右皆惡之以其貪不知足也孟嘗君問驩曰公有親乎對曰有母孟嘗君令人給其食用無使乏驩乃不復歌後孟嘗君出記事問門下諸客有能習計會能為吾收債於薛乎驩獨署曰臣能孟嘗君怪曰此誰乎左右曰歌夫長鋏歸來者也孟嘗君笑曰客果有能吾負之未之見也請而見之謝曰文倦於事憒於憂久開罪於先生先生不羞乃有意欲為收債乎驩對曰願之於是約車治裝載券契將行驩問曰收債畢市何物而返也孟嘗君曰視吾家之寡有者驩遂驅而之薛使吏召諸民當償債者悉來合券券既合驩乃矯君命以所債賜諸民因燒其券民皆呼萬歲驩遂長驅而還見孟嘗君君怪其疾也衣冠而見之曰債畢乎對曰畢何市而返對曰臣竊計宮中珍寶盈室車馬實於外廄美人充下陳君家所寡有者義耳竊為君市義孟嘗君曰市義若何對曰今君有區區之薛不附愛子其民因而賈利之臣竊矯君命盡以賜之而燒其券民時稱萬歲此臣為君市義也孟嘗君不悅曰先生休矣於是朞年人或毀孟嘗君於湣王曰孟嘗君將亂及王出畋忽有劫王者意甚疑之孟嘗君將出奔其舍人魏子初為君收邑三返而不敢入君問之對曰有賢者竊為君教與之以故無入至是魏子所與賢者聞孟嘗君出上書言其不亂請以身盟遂自刎於宮門湣王大驚乃復召孟嘗君孟嘗君謝病歸老於薛未至百里民扶老攜幼迎於道傍孟嘗君顧謂驩曰先生所為文市義者乃今見之矣驩對曰狡兔有三窟僅得免於死矣今君止有一窟未得高枕而臥也請為君復鑿三窟孟嘗君與車五十乘金百斤西遊於梁說魏王曰齊放其大臣孟嘗諸侯先迎之者國富兵強於是魏昭王以其故相為上將軍而虛相位遣謁者齎黃金千斤車乘往聘孟嘗君固辭不往魏使三返湣王聞之君臣恐懼遣太傅齎黃金千斤文馬二駟以謝孟嘗君使返國驩又請曰願得先生祭器立宗廟於薛廟既成還報曰三窟以就君可高會而樂矣孟嘗君乃還為齊相又曰顏無繇字路顏淵父也回死顏路貧請孔子車以葬孔安國曰賣車以作槨也孔子曰才不才亦各言其子鯉也死有棺而無槨吾不徒行以為之槨以吾從大夫之後不可徒行也又曰魏悖, SBCK: ''}
