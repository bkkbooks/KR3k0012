  - {type: variant, offset: 2498, length: 49, content: 治產業常刈薪樵以自賣給食擔束薪行且誦書其妻亦負載相隨數止買臣無歌謳道中買臣愈益疾歌妻羞之求去買臣笑, WYG: 仕}
