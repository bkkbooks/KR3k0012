  - {type: variant, offset: 150, length: 0, content: '', SBCK: 顔延之屏居里巷不預人間者七載中書令王球名公子延之居常罄貧球輙分財贍之齊書曰王延之清貧居宇穿漏禇淵徃􅃸之見其如此具啓明帝帝即勑材官爲起三間齋屋又曰虞玩之太祖鎭東府朝野致敬玩之猶躡履造席太祖取屐視之曰卿此履巳幾載玩之曰着此履巳二十年貧竟不辦易太祖善之又曰􅁃杲字景行新野人􅀄爲駕部郎清貧自業食飡唯有韭􅉁生菜任彦昇甞戯曰誰謂􅁃郎貧食鮭常有二十七種菜至儉用爲長史安陸侯蕭􅃡與儉書曰盛府元僚實難其選􅁃景行泛渌水依芙蓉何其麗也時人以儉府為蓮花池故􅃡書言之官至御史中丞梁書曰阮孝緒家貧無以㸑僮妾􅀼隣人樵以繼火孝緒知之乃不食更令撤屋而炊所居室唯有一林竹樹環繞後魏書曰胡叟居家蓬室草户唯以酒自適常謂人曰我此生活似勝焦光不治産業飢貧不以爲耻飬子字螟蛉以自給養每至貴勝之門􅁪乘一牸牛布囊容三四升飲噉醉飽便盛餘肉餅以付螟蛉見車馬榮華視之蔑如也隋書曰張仁詡州縣以其貧素將加賑恤輙辭不受每閑居從容長歎曰老冉冉而將至恐脩名之不立以如意擊几皆有處所人方之閔子騫原憲又曰虞丗基陳滅歸國爲通直郎直内省無産業毎傭書養親怏怏不乎甞爲五言以見意情理悽切丗以爲工作者莫不吟詠又曰房彦謙居官所得俸禄皆以周恤親友家無餘財車服器用務存素儉自少及長一言一行未甞渉私雖致屢空怡然自得甞從容獨􅀏顧謂其子􅀇齡曰人皆因禄冨我獨以官貧所遺子孫在於清白又曰許康佐擢進士第以家貧母老求爲知院官人或輕怪􅀏而不荅及母亡服除不就侯府之辟}
