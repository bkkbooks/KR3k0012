  - {type: variant, offset: 167, length: 1, content: 畝, SBCK: 盗也收種不時二盗也取婦無能三盗也養女太多四盗也棄事就酒五盗也衣服過度六盗也封藏不謹七盗也井竈不利八盗也舉息就禮九盗也無事燃燈十盗也取}
