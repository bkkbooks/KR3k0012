  - {type: variant, offset: 150, length: 0, content: '', WYG: 顔延之屏居里巷不預人間者七載中書令王球名公子延之居常罄貧球輙分財贍之齊書曰王延之清貧居宇穿漏禇淵徃候之見其如此具啓明帝帝即勑材官為起三間齋屋又曰虞玩之太祖鎮東府朝野致敬玩之猶躡履造席太祖取屐視之曰卿此屐已㡬載玩之曰著此屐已二十年貧竟不辦易太祖善之又曰庾杲字景行新野人初為駕部郎清貧自業食飡唯有韭葅生菜任彦昇嘗戯曰誰謂庾郎貧食鮭常有二十七種菜王儉用為長史安陸侯蕭緬與儉書曰盛府元僚實難其選庾景行泛淥水依芙蓉何其麗也時人以儉府為蓮花池故緬書言之官至御史中丞梁書曰阮孝緒家貧無以爨僮妾竊鄰人樵以繼火孝緒知之乃不食更令撤屋而炊所居室唯有一牀竹樹環繞後魏書曰胡叟居家蓬室草逕唯以酒自適常謂人曰我此生活似勝焦先不治産業即貧不以為恥養子字螟蛉以自給食每至貴勝之門恒乗一牸牛布囊容三四升飲噉醉飽便盛餘肉餅以付螟蛉見車馬榮華視之蔑如也隋書曰張仁詡州縣以其貧素將加賑恤輙辭不受每閒居従容長歎曰老冉冉而將至恐修名之不立以如意擊几皆有處所人方之閔子騫原憲又曰虞世基陳滅歸國為通直郎内史省無産業每傭書養親怏怏不平嘗為五言以見意情理凄切世以為工作者莫不吟詠又曰房彦謙居官所得俸祿皆以周恤親友家無餘財車服器用務存素儉自少及長一言一行未嘗涉私雖至屢空怡然自得嘗従容獨笑顧謂其子𤣥齡曰人皆因祿富我獨以官貧所遺子孫在於清白又曰許康佐擢進士第以家貧母老求為知院官人或輕怪笑而不答及母亡服除不就侯府之辟}
