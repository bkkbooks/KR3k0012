  - {type: variant, offset: 3232, length: 1109, content: 年不窺家又曰閔仲叔居安邑老病家貧不能買肉日買一片豬肝屠者或不肯為斷安邑令候之問諸子何飯食對曰但食豬肝屠者或不肯與之令出勑市吏後買輒得仲叔怪問其子道狀乃歎曰閔仲叔豈以口腹累安邑耶遂去之沛又曰周紆為渤海太守赦令詔書到門不出夜遣吏到屬縣書決罪行刑坐徵詣廷尉繫獄數日免歸家貧無以自賑贍身築壍以給食章帝知憐之復以為郎華嶠後漢書曰范式為荊州刺史友人南陽孔嵩家貧親老乃變名姓傭為新野河里街卒式行部到新野而縣選嵩為導騶迎式式見而識之呼嵩把臂曰子非孔仲山耶對之歎息語及平生曰共與俱曳長裾遊集帝學吾蒙國恩致位牧伯而子懷道隱身處於卒伍不亦惜乎嵩曰昔侯嬴長守於賤業晨掃門肆志於抱關子居九夷不患其陋貧者士之宜豈為鄙哉式勑縣代嵩嵩以為先傭未竟不肯去續漢書曰范丹桓帝時以丹為萊蕪長不到官後辟太尉府自以狷急不能從俗常佩韋於朝徒行獘服賣卜於市遭黨人禁錮遂推鹿車載妻子捃拾自資或依宿樹蔭如此十餘年乃結草室內居焉閭里歌曰甑中生塵范史雲釜裏生魚范範萊蕪又曰吳祐年二十喪父居無擔石而不受贍遺常牧豕於長垣澤中行吟經書遇父故人謂之曰卿二千石子而自業賤事縱子無恥奈先君何祐辭謝而已守志如初也又曰王苑字仲安貧賤茅屋蓬戶藜藿謝承後漢書曰施延字君子沛人家貧母老常鬻力供養種瓜自給位至太尉又曰永平五年班超兄固被召詣校書超與母隨至洛陽家貧常為傭書以供養久傭嘗苦輟業投筆歎曰大丈夫無它志略獨當效傅介子張騫立功異域以取封侯安能久事筆硯乎魏略曰常林少單貧雖貧自非手力不取之於人性好學漢末為諸生帶經耕鋤其妻自擔餉餽之林雖在田野其相敬如賓又曰黃初中儒雅並進而楊沛本以事服能見遂以議郎冗散里巷沛前後宰歷城守不以私計意故身退之後家無餘積治疾於家荒田二項起蝸牛廬居止其中也典略曰程堅字謀甫南陽舞陰人仁孝清潔居貧無資磨鏡自給不受人施諸嫗共漂更相呼食有或不食也相謂曰非程謀甫何為不食人食耶又曰劉陶字子奇川人世祖十八年徙六郡大族陶曾祖自齊來世以儒學安貧樂道故仕不過孝廉又曰裴潛每之官不將妻子妻子貧乏織荊芘以自供群弟之田廬常步行家人小大或并日而食晉中興書曰王猛北海人居魏土少貧賤鬻畚為業嘗至洛陽貨畚有一人於市貴買畚而無直曰可隨我去取直猛隨行不覺遠忽至深山語猛且住樹下當先啟道君來須臾猛進見一公踞胡床頭鬢悉白從十許人一人引猛云大司馬公可進猛因拜公公曰王公何緣拜即十倍酬畚直遣人送猛出顧視乃嵩山又曰劉寔字子真平原高唐人少貧共糠飯繩索作衣賣手繩口誦又曰淳于智字叔平濟北人上黨鮑青家少喪疾貧苦謂曰淳于叔平神人也何不試就卜瑗乃令智作卦卦成曰君謂宅東北有大桑樹君逕至市入門數十步當有一人將新馬鞭者就請還買以懸此桑樹三年當暴得財也瑗承其言詣市果得馬鞭懸之正三年後浚井得錢千萬銅鐵雜器復可二十餘萬於是家業用展病者亦愈, SBCK: ''}
