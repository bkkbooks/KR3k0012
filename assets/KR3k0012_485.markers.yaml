  - {type: variant, offset: 47, length: 2, content: 禮也, SBCK: 車馬單歩之官太祖征壷關擢爲兾州主簿又曰華歆素清貧禄以賑親戚故家無擔石之儲又曰鄧艾字士載義陽人以口吃不得作幹佐爲稻田守草吏同郡吏憐其貧資給甚厚艾􅀄不稍謝每見髙山大澤輙窺度指畫軍營處所時人多􅀏焉呉志曰吕範字子衡汝南人有容觀姿兒邑人劉氏家冨女美範求之母嫌欲勿與劉氏曰吕子衡寧當乆}
