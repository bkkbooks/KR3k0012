  - {type: variant, offset: 238, length: 410, content: 衣敝縕袍與衣狐狢者立而不恥者其由也與縕絮也賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂又曰邦有道貧且賤焉恥也又曰君子憂道不憂貧家語曰端木賜駟馬連騎以從原憲居蓬蒿之中并日而食子貢曰甚矣子之病矣國語曰叔向見韓宣子憂貧叔向賀之宣子曰吾有卿名而無其實無以從二三子家貧則不及人也吾是以憂子賀我何故對曰昔欒武子無一卒之田武子晉正卿欒書也大夫一卒無者不及上大夫其官不備其宗器器祭器也宣其德行慎其憲則諸侯親之戎翟懷之今吾子有欒武子之貧吾亦為能其德也是以賀若憂德之不脩而患貨之不足將弔不暇何賀之有也史記曰叔孫敖知優孟之賢病且死謂其子曰我死汝必貧困其子無立錐之地又曰甯戚衛人也欲仕齊家貧無以自資乃賃為人推車至齊國桓公出戚望見車駕乃於車下飯牛扣牛角而歌桓公聞之撫手曰異哉此人乃非常人也命管仲迎之以為上卿又曰馮驩齊人貧乏不能自存使人屬齊相孟嘗君願寄食門下孟嘗君曰客何能也對曰無能孟嘗君笑而受之左右皆知君賤之食以草具居有頃驩倚柱彈其劍鋏而歌曰, SBCK: 劉眞}
