  - {type: variant, offset: 167, length: 1, content: 畝, WYG: 盗也收種不時二盗也取婦無能三盗也養女太多四盗也棄事就酒五盗也衣服過度六盗也封藏不謹七盗也井竈不利八盗也舉息就禮九盗也無事燃燈十盗也取}
  - {type: variant, offset: 167, length: 0, content: '', krp: 盗也收種不時二盗也取婦無能三盗也養女太多四盗也棄事就酒五盗也衣服過度六盗也封藏不謹七盗也井竈不利八盗也舉息就禮九盗也無事燃燈十盗也取之安得冨哉武王曰善說苑同列女傳曰黔婁妻者魯黔婁先生之妻也先生死曽子與門人徃弔之見先生尸在牖下覆以布𬒳手足不盡歛覆頭則足見覆足則頭見曽子曰衺其𬒳則歛矣妻曰衺之有餘不如正之不足且先生以衺故至於此又曰齊女徐吾者在海上貧婦人與隣婦人李吾之属合燭相從績徐吾最貧而燭數不属李吾謂曰徐吾燭數不属請無與夜徐吾曰是何言歟今一室之中益一人燭不爲益明去一人燭不爲益闇何愛東壁餘光貧妾不蒙見愛之恩長爲妾不亦可乎莫之能應遂復與夜髙士傳曰老萊子楚人耕蒙山之陽以藿葭爲牆蓬蒿爲室枝木爲床蓍艾爲席東方朔別傳曰朔書與公孫弘借書曰朔當從甘泉願借外廐之後乗木槿夕死而朝生者士亦不必長貧也李郃別傳曰公居貧而不好治産有稻田三十}
  - {type: variant, offset: 168, length: 18, content: 之宮環堵之室篳門圭竇蓬戶甕牖易衣而出, krp: 弟宅一區至京學問常以賃書自給爲人沉深弘雅有大度郭林宗别傳曰林宗家貧𥘉欲遊學無資就姉夫貸五千錢乃逺至成臯從師受業}
  - {type: variant, offset: 169, length: 3, content: 宮環堵, SBCK: 安得冨哉武王曰善說苑同列女傳曰黔婁妻者魯黔婁先生}
