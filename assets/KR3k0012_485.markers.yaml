  - {type: variant, offset: 1740, length: 0, content: '', SBCK: 齊君淫亦淫君奢亦奢志合言從道行國覇其後田氏相齊君盈則巳降君斂則巳施民皆歸之因有齊國􅀂實名貧僞名冨也又曰齊有貧者乞於城市患其亟也衆莫之與遂適田氏之廐從馬竪作役而假食郭中人戯之曰從馬竪而食不以辱乎乞見曰天下之辱莫過於乞乞猶不辱豈辱馬竪哉又曰齊之國氏大冨宋之問氏大貧自宋之齊謀術國氏告之曰吾善爲盗始吾爲盗也一年而給二年而定三年大攘自此徃施及州閭問氏大喜喻其爲盗之言而不喻其爲盗之道遂踰垣鑿室手目所及亡不探也未及時以贓罪没其先君之財問氏以國氏之􅍝己也徃而怨之國氏曰嘻􅀂夫爲盗之道天有時地有利吾盗天地之利雲雨之澗吾陸盗禽獸水盗􅀛鱉亡非盗也夫金玉珎寳􅂖帛財貨人之所聚豈天之所與若盗之而獲罪孰怨哉又曰凢爲名者必廉廉斯貧爲名者必讓讓斯賤莊子曰原憲處魯居環堵之室蓬户不完乗木爲樞而甕牖上漏下濕匡坐而弦歌子貢乗大馬中紺而表素軒車不容巷徃見原憲原憲杖藜而應門子貢曰先生何病也原憲應之曰憲聞無財之}
  - {type: page-break, offset: 1740, content: '', id: KR3k0012_SBCK_485-6a}
  - {type: variant, offset: 1740, length: 0, content: '', WYG: 齊君淫亦淫君奢亦奢志合言従道行國霸其後田氏相齊君盈則已降君斂則已施民皆歸之因有齊國若實名貧偽名富也又曰齊有貧者乞於城市患其亟也衆莫之與遂適田氏之厩從馬豎作役而假食郭中人戲之曰従馬豎而食不以辱乎乞兒曰天下之辱莫過於乞乞猶不辱豈辱馬豎哉又曰齊之國氏大富宋之問氏大貧自宋之齊謀術國氏告之曰吾善為盗始吾為盗也一年而給二年而定三年大穰自此徃施及州閭問氏大喜喻其為盗之言而不喻其為盗之道遂踰垣鑿室手目所及亡不探也未及時以贓罪沒其先君之財問氏以國氏之謬己也徃而怨之國氏曰嘻若夫為盗之道天有時地有利吾盗天地之利雲雨之潤吾陸盗禽獸水盗龜鼈亡非盗也夫金玉珍寳榖帛財貨人之所聚豈天之所與若盗之而獲罪孰怨哉又曰凡為名者必㢘㢘斯貧為名者必讓讓斯賤莊子曰原憲處魯居環堵之室蓬户不完乗木為樞而甕牖上漏下濕匡坐而弦歌子貢乗大馬中紺而表素軒車不容巷徃見原憲原憲杖藜而應門子貢曰先生何病也原憲應之曰憲聞無財之}
