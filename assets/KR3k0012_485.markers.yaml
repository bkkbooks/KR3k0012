  - {type: variant, offset: 1482, length: 173, content: 以自通乃常獨早夜掃齊相舍人門外舍人怪之以為物而伺之獨得勃勃曰願見相君無因故為子掃欲以求見於是舍人見之曹參因以為舍人又曰東郭先生拜為都尉先生久待詔公車貧困飢寒衣弊履不完行雪中履有上無下足盡踐地道人笑之又曰甘茂亡秦奔齊逢蘇代為齊使於秦茂曰臣得罪於秦懼而逃無所容跡臣聞富人女會績貧人女曰我無以置燭而子之火光有餘子可分我餘光無損子明今臣困願以餘光振之漢書, SBCK: 裏二旬九食西京􅄂記}
