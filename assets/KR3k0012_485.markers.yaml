  - {type: variant, offset: 205, length: 0, content: '', SBCK: 原字根矩年十一䘮父家貧早􅀌隣有書舎原過其傍而泣師問曰童子何悲原曰孤者易傷貧者易感夫書者必有其父兄一則願其不孤二則羡其得學心中惻然而爲涕零也師亦哀原之言而爲泣曰欲書可書耳桓階别傳曰階貧儉文帝甞幸其第見諸子無禈文帝摶手􅀏曰長者子無禈乃抱與同乘是日拜二子爲郎使黄門賫衣三十囊賜曰卿兒能趍可以禈矣文士傳曰劉梁字曼山一名岑漢宗}
