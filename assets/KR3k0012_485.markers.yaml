  - {type: variant, offset: 1817, length: 293, content: 女文君新寡好音竊窺之相如乃挑之文君夜奔相如相如與馳歸成都家徒四壁立卓王孫大怒曰女不才我不忍赦一錢不分文君久之與相如俱至臨邛買酒舍乃令文君當壚相如與傭保雜作於市卓王孫恥之昆弟諸公謂王孫曰一女所不足者非財也今文君失身於相如相如雖貧其人才足依也柰何相辱如此王孫不得已分與僮僕百人錢百萬文君與相如乃歸成都武帝立蜀人楊德意為狗監侍上讀子虛賦而善之曰朕獨不得與此人同時意曰此臣之邑人司馬相如為此賦上驚乃召問相如相如曰然此乃諸侯之事未足可觀乃作上林賦賦成奏之帝大悅以相如為郎後拜中郎將建節使至蜀蜀太守郊迎縣令負弩先驅於是鄉閭故人及卓王孫諸公因門下獻牛酒以交歡王孫於是喟然歎曰老人所恨得使女事相如乃晚耳, SBCK: 愧色}
