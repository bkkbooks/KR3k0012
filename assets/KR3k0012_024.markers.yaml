  - {type: variant, offset: 3377, length: 207, content: 日夏至五穀不熟二十五日三十日夏至時價平和晦日夏至五穀貴天文錄曰大寒在冬至後二氣積寒而未溫也大暑在夏至後二氣積暑而未歇也寒暑和乃在春秋分後二氣寒暑即未平也譬如火始入室未甚溫弗事加新久而愈熾既遷之猶有餘熱也冬至之日日出辰入申晝行地上百四十六度強夜行地下二百一十九度少弱故晝短夜長也夏至之日日出寅入戍晝行地上二百一十九度少弱夜行地下一百四十六度強故晝長夜短春秋之日日出卯入酉晝行地上夜行地下皆一百八十二度半強晝夜長短同也, SBCK: ''}
