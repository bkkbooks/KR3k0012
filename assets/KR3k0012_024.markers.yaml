  - {type: variant, offset: 2020, length: 1, content: 冬, SBCK: 霜殺伐之表季秋霜始降鷹隼擊王者順天行誅以成肅殺之威穆天子傳曰仲秋甲戍天子東遊次雀梁一􅀫爲舎再􅀫爲信過信爲次蠹書于羽陵謂暴書蠹蟲因曰蠧書也聖賢記曰馮夷􅀪農潼郷隄首里人服八石得道爲水仙河伯又一說華隂人八月上庚}
  - {type: variant, offset: 2020, length: 0, content: '', WYG: 霜殺伐之表季秋霜始降鷹隼擊王者順天行誅以成肅殺之威穆天子傳曰仲秋甲戌天子東遊次雀梁一宿為舍再宿為信過宿為次蠧書于羽陵謂暴書蠧蟲因日蠧書也聖賢記曰馮夷𢎞農潼鄉隄首里人服八石得道為水仙河伯一又説華隂人八月上庚日渡河溺死天帝署為河伯荆楚歲時記曰八月十四日民並以朱水㸃兒頭名為天灸以厭疾也又以綿綵為眼明囊赤松子以八月囊承柏樹露為宜服後世以金箔為之遞相餉遺西京雜記曰賈佩蘭云在宫時八月四日出雕房北方竹林下圍碁勝者終年有福負者終年疾病又漢宗廟八月飲酎用九十日王子年拾遺記曰漢武帝以季秋之月泛靈鶂之舟於臨池之上窮夜逹晝以晝逹夜於桂臺之下以香金為鈎縮紉為綸以丹鯉為餌不踰旬釣一白蛟長三四丈若大蛇無鱗甲帝曰非龍也於是付太官為鮓而肉紫骨清香美無倫詔賜臣下時以上為神感所獲後更不得續齊諧記曰𢎞農鄧紹八月朝入華山見一童子以五色囊承取栢葉下露露皆如珠子亦云赤松先生取以明目今八月朝作眼囊象此也鄧明德南康記曰平固縣有湖中有石鴈浮在湖中每至秋石鴈飛鳴如候時也尚書大傳曰西方者何也鮮方也鮮訊也訊者始入之貎始入者何以謂之秋秋者愁也愁者萬物愁而入也故曰西方者秋也秋收斂貎尚書中候曰周文王為西伯季秋之月甲子赤雀銜丹書入豐都止於昌户乃拜稽首受取曰姬昌蒼帝子亡殺商紂也尚書考靈曜曰虛星為秋候昴星為}
