  - {type: variant, offset: 2550, length: 0, content: '', SBCK: 秋三月青女乃出降霜雪青女乃天神青霄玉女主霜雪又曰一葉落而知天下秋又曰太隂治秋}
  - {type: variant, offset: 2550, length: 0, content: '', WYG: 修仲冬至短夏至北極冬至南極季夏德畢季冬刑畢德畢陽施窮也刑畢隂殺盡也又西方金也其帝少昊其佐蓐收執矩而至秋其神為太白又西方之極自崑崙絶流沙沉羽西至三危之國流沙蓋在崑崙之西南也石城金室飲食之民不死之野少昊蓐收之所司者萬二千里其令曰審用法誅必辜備賊禁姦邪飭羣牧謹積聚修城郭補決竇塞蹊徑遏溝瀆止水壅谿谷守門閭陳兵甲選百官誅不法應金斷也鶡冠子曰斗柄西指天下皆秋尸子曰秋為禮西方為秋秋肅也萬物莫不肅敬禮之至也商子曰螟蛉春生秋死出而民失食今一民耕而百人食為螟蛉也大矣吕氏春秋曰秋早寒冬必暖春多雨夏必旱太𤣥經曰酉西方也秋也物皆成象而就也有形}
