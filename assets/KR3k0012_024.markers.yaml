  - {type: variant, offset: 2419, length: 3, content: 麥熟天, SBCK: 生因秋而殺所生不德所殺不怨即幾於道矣春秋無心生殺有時人主無爲當罰必當逺違其理近合其道又曰唯神化爲貴精至爲神精之所動􅀂春氣之生秋氣之殺其生也暄然如春物得其生死也肅然如秋物終於死故生不祈報死無歸怨生之死之以其無心也幽求}
