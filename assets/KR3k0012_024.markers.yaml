  - {type: variant, offset: 935, length: 2, content: 公卿, WYG: 軍帥武人於朝乃命將帥選士厲兵簡練俊傑專任有功以正不義詰誅暴慢以明好惡順彼逺方又七月中氣日在張昏箕中曉昴中斗建申位之中處暑之日鷹乃祭鳥後五日天地始肅後五日禾乃登修宫室坯垣牆又八月之節日在角昏南斗中曉畢中斗建酉位之初律中南吕白露之日鴻鴈來後五日𤣥鳥歸後五日羣鳥養羞是月也養衰老授几杖行糜粥飲食天子乃儺以達秋氣命樂正習吹又八月中氣日在軫昏南斗中曉東井中斗建酉位之中秋分之日雷乃收聲後五日蟄蟲坯户後五日水始涸是月也祀夕月於西郊命有司享壽星於南郊日夜分則同度量平權衡祭馬社又九月之節日在角昏牽牛中曉東井中斗建戌位之初律中無射寒露之日鴻鴈來賔後五日雀入大水為蛤後五日菊有黄花是月也命有司伐蛟取鼉登龜取黿又九月中氣日在氐昏須女中曉柳中斗建戌位之中霜降之日豺乃祭獸後五日草木黄落後五日蟄蟲咸俯是月也霜降始則百功休天子嘗稻先薦寢廟藏帝籍於中倉祗敬必飭是月也乃伐薪為炭又秋斂冬藏義也又西方者秋秋之為言愁也愁之以時察守義者也周禮曰大司馬之職仲秋教理兵掌建邦之九法以佐王平邦國又司裘掌為大裘以供王祀天之服仲秋獻良裘季秋獻功裘又籥章氏掌仲秋擊土鼓吹豳詩以迎寒氣鄭𤣥注曰迎寒以夜來}
