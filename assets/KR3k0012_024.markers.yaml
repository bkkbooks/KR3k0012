  - {type: variant, offset: 879, length: 2, content: 丙丁, SBCK: 庚辛庚辛属金主秋故云其日庚辛其帝少皡其神蓐収昔少皡氏以金徳繼天而王故爲秋帝金正曰蓐收故蓐収爲金神佐少皡於秋其蟲毛西方白虎毛蟲之長凢有毛之􅀋昔属於金故曰其蟲毛其音啇三分微一益以生啇商數七十二属金以其濁次宫臣之象也秋氣和則啇聲調樂記曰啇乱則陂其官壞律中夷則七月氣至則夷則之律應夷則者大吕之所生三分去一管長五寸六分其數九金生數四成數九但言九者㪯其成數其性義其事言洪範五行傳曰西方金其性義其事言言曰從從作者王者言從義和則神􅀛至其味辛其臭腥凢臭味辛腥者皆属於金其祀門􅀕先肝秋隂氣出祀之於門外隂也祭先肝者秋爲隂中於藏值肝凢祀門爲俎先進肝}
