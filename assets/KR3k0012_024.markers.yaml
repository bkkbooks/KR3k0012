  - {type: variant, offset: 1210, length: 421, content: 曰春分加四十六日而立夏大風濟濟止也音比夾鍾夾鍾二月也萬物去陰夾陽而生也加十五日指巳則小滿滿冒也音比太蔟太蔟正月律也蔟之言陰衰陽發萬物蔟地而生周書時訓曰立夏之日螻蟈不鳴水潦淫漫蚯蚓不出臣奪后命王瓜不生害于百姓小滿之日苦菜不秀仁人潛伏靡草未死國從盜賊小暑不至是謂陰匿劉玄之行軍月令曰立夏日得金五穀不成夏旱多風得木夏寒草生得火多妖言兵戈起得土遠臣不朝國無政令得水上下相和順天下安寧登真隱訣曰立夏之日日中五帝會諸仙人於紫微宮見四真人論求道之功罪五帝之位諸宮皆有之此五方之帝非三十六天帝限也亦主學道者故詣太極紫微宮奉見四真人論扷其功罪之多少夏至周易復卦曰雷在地中復先王以至日閉關啇旅不行后不省方冬至陰之復也夏至陽之復也左傳曰昭二十一年秋七月壬午朔日有食之公問於梓慎曰是何物也禍福何為物事也對曰二至二分二至冬至夏至二分春風秋分日有食之不為災日月之行也分同道也至相過也二分日夜等故言同道二至長短極故相遇其他月則為災陽不克也故常為水陰侵陽是陽不勝陰傳曰少昊氏, SBCK: 云臯陶}
