  - {type: variant, offset: 1523, length: 302, content: 七月壬午朔日有食之公問於梓慎曰是何物也禍福何為物事也對曰二至二分二至冬至夏至二分春風秋分日有食之不為災日月之行也分同道也至相過也二分日夜等故言同道二至長短極故相遇其他月則為災陽不克也故常為水陰侵陽是陽不勝陰傳曰少昊氏鳥名官伯趙氏司至者也伯趙伯勞也以夏至鳴冬至止周禮地官曰夏至日影尺有五寸鄭氏云土圭之長也尺有五寸夏至日立八尺表其影適與土圭等謂之地中今潁川陽城地為然又春官大司樂曰孤竹之管雲和之琴瑟冬至日於地上圓丘奏之孫竹之管空桑之琴瑟夏至日於澤中方丘奏之陰竹之管龍門之琴瑟於宗廟奏之雲和空桑龍門皆山名又曰宗伯以夏至致地祗物鬽音魅以禬國之凶荒民之禮喪禬除也又曰柞氏夏至令刊陽木而火之冬至剝陰木而水之又曰薙氏掌, WYG: ''}
