  - {type: variant, offset: 3062, length: 312, content: 名冰維夏至左右五六十日解耳曆䟽曰芸種謂穀芽始出故曰芒種夏至其日日之行天至於艮維東北角言曰行極於北故曰夏至笁法真羅山䟽曰荔枝以冬青夏至日子始赤六七日可食雜說曰百舌鳥一名反舌春則囀夏至則止唯食蚯蚓正月以後凍開則來蚯蚓出故也十月已後則藏蚯蚓蟄故也物之相感不知所由酉陽雜俎曰貓目睛旦暮圓及午豎歛如綖其鼻端常冷唯夏至一日暖蔡邕獨斷曰夏至陰氣始起鹿角解故寢兵鼓身欲寧志欲靜不聽事送迎五日又曰夏至陰氣起君道衰故不賀又曰夏至之日離卦用事日中時南方有赤雲如馬者离氣至也宜黍离氣不至日月無光五穀不成人病目疼冬中無冰應在十一月內夏至之日風從离來為順其年大熟夏至前一日夏至後十日十六日為窮日月令占候圖曰夏至朔日夏至并二日三日至六日夏至五穀熟二十二日, SBCK: 覽卷第}
