  - {type: variant, offset: 2418, length: 0, content: '', SBCK: 其氣曰陽陽生火西方曰辰其時曰秋其氣曰隂隂生金北方曰月其時曰冬其氣曰寒寒生水管子曰秋三月以庚辛之日發五政一政曰禁􅀶賽二政曰無見五兵之刃三政曰愼旅農趨聚收四政曰􅀘􅆙坼修垣墻謹門閭五政曰徇時五􅂖之皆入也又曰歳有四秋春農事旣成農夫賦耜鐵此春之秋夏至蠶纊之所作此夏之秋秋成五􅂖之所㑹此謂大秋冬營室中女事紡績之所作此謂冬之秋文子曰日月欲明浮雲盖之藂蘭欲茂秋風敗之又曰政失於秋大白出入無常文子曰因春}
