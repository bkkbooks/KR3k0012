  - {type: variant, offset: 2755, length: 296, content: 蔟加十五日指庚背陽之維則夏節盡風俗通曰夏至著五綵辟兵題曰游光厲鬼知其名者無溫疾五綵辟五兵也按人取新斷織繫戶亦此類也謹案織取始斷二三寸帛綴著衣衿以已織絍告成於諸姑也後世彌久易以五綵又永建中京師大疫云厲鬼字野重游光亦但流言無指見之者其後歲歲有病人情愁怖復增題之冀以脫禍今家人織縑新皆取著後嫌絹二寸許繫戶上此其驗也抱朴子曰予祖郴為汲令以夏至日請主簿杜宣賜酒北壁上有懸赤弩照於盃中形如虵宣惡之及飲得疾後郴知之使宣於舊處設酒盃中猶有虵因謂宣曰此弩影耳宣遂意解古今曆術曰夏至之日晝六十五刻夜三十五刻酈道元注水經曰丹水出丹魚先夏至前十夜伺之魚浮水側赤光上照如火神異經曰北方荒中有石湖方千里無凸徒結切凹校交反, SBCK: ''}
