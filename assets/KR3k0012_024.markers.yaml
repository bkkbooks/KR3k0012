  - {type: variant, offset: 956, length: 2, content: 遂賢, SBCK: 專任有功以征不義詰誅􅁀慢以明好惡順彼逺方詰謂問其罪順禉服也又曰七月中氣日在張處暑爲七月中氣昬箕中曉夘中斗建申位之中處暑之日鷹乃􅀕鳥後五日天地始肅後五日禾乃登修宫室坯垣墻爲經夏雨損立秋後修􅀘又曰八月之節日在翼白露爲八月之節昬南斗中曉畢中斗建酉位之􅀄律中南吕八月氣至則南吕之律應南吕者大蔟之所生三分去一管長五寸三分其日其音其數並同孟秋白露之日鴻鴈來後五日􅀇鳥歸後五日羣鳥養羞是月也養衰老授几杖行糜粥飲食行猶鷄也天子乃儺以達秋氣此儺儺陽氣恐陽暑至此不衰害亦將及人故儺以通秋氣方欲助秋故不磔犬命樂正習吹春夏尚舞秋冬尚吹習之爲將釋奠又曰八月中氣日在軫秋分爲八月中氣昬南斗中曉東井中斗建酉位之中秋分之日雷乃收聲後五日蟄蟲坯户後五日水始涸是月也祀夕月於西郊秋分日祭之命有司享壽星於南郊秋分日􅀕壽星於南郊壽星南極老人星日夜分則同度量平權衡因秋分晝夜平則正之􅀕馬社謂仲秋祭馬社於大澤用剛日又曰九月之節日在角寒露爲九月之節昬牽牛中曉東井中斗建戍位之􅀄律中無射九月氣至則無射之律應無射者夾鍾之所生三分去一管長四寸九分其日其音其數並同孟秋寒露之日鴻鴈來賔後五日雀入大水化爲蛤後五日菊有黄花是月也命有司伐蛟取鼍登􅀛取黿四者甲􅁼秋乃堅成故是月登取又曰九月中氣日在氐霜降爲九月中氣昬湏女中曉栁中斗建戍位之中霜降之日豺乃􅀕獸後五日草木黄落後五日蟄蟲咸俯是月也霜始降則百工休謂膠膝之作停天子嘗稻先薦寢廟稻􅀄熟藏帝藉於神倉祗敬必􅅚重􅀕祀之榖是月也乃伐薪爲炭伐必因殺氣又曰秋歛冬藏義也又曰西方者秋秋之爲言愁也周禮曰大司馬之職仲秋教理兵掌建􅀖國之九法以佐王平􅀖國又曰司裘掌爲大裘以供王祀天之服仲秋獻}
