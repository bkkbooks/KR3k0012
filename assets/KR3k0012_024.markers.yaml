  - {type: variant, offset: 1632, length: 382, content: 名官伯趙氏司至者也伯趙伯勞也以夏至鳴冬至止周禮地官曰夏至日影尺有五寸鄭氏云土圭之長也尺有五寸夏至日立八尺表其影適與土圭等謂之地中今潁川陽城地為然又春官大司樂曰孤竹之管雲和之琴瑟冬至日於地上圓丘奏之孫竹之管空桑之琴瑟夏至日於澤中方丘奏之陰竹之管龍門之琴瑟於宗廟奏之雲和空桑龍門皆山名又曰宗伯以夏至致地祗物鬽音魅以禬國之凶荒民之禮喪禬除也又曰柞氏夏至令刊陽木而火之冬至剝陰木而水之又曰薙氏掌殺草夏日至而夷之易通卦驗曰夏至景風生蟬始鳴螳蜋生鹿角解木槿榮又曰夏至小暑蝦蟆無聲又曰鹿者獸中陰也貴臣之象鹿應陰解角也夏至大陽始屈陰氣始昇陰陽相向君之象也今失節不解臣不承君之象故為貴臣作姦也又曰離南方也夏日中赤氣出直離此正氣也氣出右萬物半死氣出左赤地千里又曰夏至之日清明風至易稽覽圖曰夏至後三十日極溫易稽覽圖曰夏至景風至蟬始鳴螗螂生京房占易曰夏至离王去聲景風用事人君當爵有德封有功, SBCK: 􅂏}
