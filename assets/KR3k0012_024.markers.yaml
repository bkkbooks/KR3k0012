  - {type: variant, offset: 1014, length: 0, content: '', SBCK: 伏在戍上使民内傳曰歳云秋矣我落其實而取其材爾雅曰秋爲白藏又曰秋曰收成又曰秋爲旻天李廵日秋万物成熟皆有文章郭璞云旻􅉖也万物凋可􅉖又曰秋獵曰獮獮殺也順秋氣漢書曰太白西方秋金義也言也義􅃜言失逆秋令傷金氣罰見太白又曰秋如淳曰音樵也物歛乃成熟也漢書曰八月賜大臣羊酒以助衰氣後漢書曰范式字巨卿與汝南張元伯爲友二人春别京師以暮秋爲期元伯以九月十五日殺雞以待巨卿母曰相去千里汝何信之也言未卒而巨卿至相隨上堂再拜母極歡恱續漢書曰仲秋祀老人星于國南郊孟康漢書義律曰春曰朝秋曰請如古諸侯朝聘也師古曰請音才性反吴王濞不朝使人爲秋請是也晉書曰􅀽宏􅀌貧運租自業謝尚時鎮牛渚秋夜乗月泛江㑹宏在舫中諷詠遣問即其詠史之作尚迎昇舟與談申旦不寐自此}
