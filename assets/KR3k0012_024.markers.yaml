  - {type: punctuation, offset: 315, content: 「, id: KR3k0012_CHANT_024-bkkpn91}
  - {type: variant, offset: 315, length: 537, content: 南方之極自北戶孫之外北戶孫國名也日在其北皆為北向戶貫顓頊之國南至委火炎風之野夏赤又曰夏赤帝祝融之所司者萬二千里赤帝炎帝少典之子號為神農南方火德之帝也祝融顓頊之孫老童之子吳廻也名黎為高辛氏火王號為祝融死為火神也其令曰爵有功賞有德惠賢良救饑渴舉力農振貧窮惠孤寡憂罷音疲疾出大賞起毀宗立無後封建侯立賢輔應陽施也又曰夏行春令則多風象春木氣多風又曰孟夏招搖指巳盛德在火又曰六月失政十二月草木不脫不脫葉著樹不零落也又景風至則施爵位賞有功夏至陰氣在下陽盛於上象陽布施故賞有功封建諸侯又曰夏治以衡衡者所以平萬物也衡之為度也緩而不後平而不怨施而不德匝而不責常平民祿以繼不足勃勃楊楊唯得是行養長化育萬物蕃昌以成五穀以實封疆其政不失天地乃明明理也呂氏春秋曰杜厲叔事莒閔公以為不知去居海上夏食菱芡冬食橡栗呂氏春秋曰季夏之月令漁師伐蛟升龜漁師掌漁官蛟有能害人難得故言伐龜神可以決吉凶入宗廟尊之故言升蛟則害龜則神也傅玄述夏曰四月維夏運臻正陽和風穆而扇物麥含露而飛芒鳳皇昇而王萯秀王萯草名龍辰中而螢火翔魏文帝詩曰夏時饒溫和避暑就清涼北坐高閣下延賓作名倡嘉餚重疊來珍菓在一傍棊局縱橫陳愽弈合變揚功拙更平聲勝負歡美樂人觴從朝至日夕安知夏節長賈誼鵂鳥賦曰單閼音遏之歲兮四月孟夏庚子日斜兮鵂集予舍立夏禮記月令曰四, SBCK: 七}
  - {type: variant, offset: 315, length: 15, content: 南方之極自北戶孫之外北戶孫國名, WYG: 兌正秋}
