  - {type: variant, offset: 2548, length: 1, content: 夏, SBCK: 春氣發而百草生正得秋而萬物成實又曰春女怨秋士悲感物化矣又曰}
  - {type: variant, offset: 2548, length: 0, content: '', WYG: 春氣𤼵而百草生得秋而萬物成實又春女悲秋士哀知物化矣又至秋三月青女乃出降霜雪青女乃天神青霄玉女主雪霜又太隂治秋則欲脩備繕兵隂德斷割故修兵也又孟秋之月西宫御女白色衣白采撞白鐘其兵鉞其畜狗八月官尉其樹柘九月官候其樹槐又秋為矩者所以方物也又九月失政三月春風秋不濟濟止也又時則曰六合孟春與孟秋為合仲春與仲秋為合季春與季秋為合孟夏與孟冬為合仲夏與仲冬為合季夏與季冬為合孟春始盈孟秋始縮仲春始出仲秋始内出二月播植也内八月收斂也季春大出季秋大内孟夏始緩孟冬始急緩四月陽炎急十月寒肅仲}
