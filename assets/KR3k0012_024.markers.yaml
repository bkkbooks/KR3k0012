  - {type: variant, offset: 1020, length: 6, content: 立夏雨螻蛄鳴, SBCK: 日行西方白道曰西陸尚書太傳曰萬物非秋不収又曰寅餞入日辯秩西成傳曰天子以秋命三公將率選士厲兵以征不義决獄訟斷刑罰趣收歛以順天道以佐秋殺又曰西方者何也鮮方也鮮訊也訊者始入之貌始入者何以謂之秋秋者愁也愁者物方愁而入也故曰西方者秋也秋收歛貌尚書中􅀱曰周文王爲西伯季秋之月甲子赤雀㗸丹書入豊鄗止于昌户乃拜稽首受取曰􅁎昌蒼帝于亡殷者紂也尚書考靈曜曰政失於秋太白出入不常尚書考靈曜曰虚星爲秋候􅄧星爲冬期隂氣相佐德乃弗邪子􅂇母母合子符虗星北方􅀫也􅄧星西方􅀫也隂稱母也毛詩傳曰壯士悲秋感隂氣也詩含神霧曰􅁗地處仲秋之位男懦弱女髙膫膫明也落瀟切白色身音中啇其言舌舉而仰聲清而􅀭}
