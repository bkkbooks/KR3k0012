  - {type: variant, offset: 143, length: 0, content: '', SBCK: 而歌曲終成連廻刺􅂳迎之而還伯牙遂爲天下妙矣又曰雉朝飛操者齊宣王時處士犢沐子所作也年七十無妻出薪於野見雉雌雄相隨則心悲乃仰天歎曰聖王在上恩及草木鳥獸而我獨以不􅀗援琴而歌以自傷又曰思歸引衛有賢女劭王聞其賢請娉之未至王薨太子曰吾聞齊桓得衛􅁎覇今衛女賢者欲留之大夫曰不可􅀂賢必不我聽聽亦不賢不足取太子不聽遂留拘􅀷宫思歸不得歸援琴而歌曲終自縊而死楊雄琴清英曰尹􅁻甫子伯竒至孝後母譛之自投江中衣苔帶藻忽夢見水仙賜其羙樂唯念飬親揚聲悲歌􅂳人聞而學之􅁻甫聞􅂳人之聲疑似伯竒援琴作子安之操琴操曰髙陵牧子娶妻無子父母將改娶牧子援琴皷之痛恩愛乖離故曰別鶴操楊雄琴清英曰雉朝飛操者衛女之作也衛侯女嫁於齊太子至中道聞太子死問傅母何如􅀓母曰旦徃當䘮畢不肯歸終之以死焉􅀓母好琴取女自操琴於冢上皷之忽三雉俱出墓中􅀓母撫雌雉曰女果爲雉耶言未卒俱飛而起忽而不見􅀓母悲痛援琴作操故曰雉朝飛琴操曰古琴曲有歌詩五曲一曰鹿鳴二曰伐檀三曰騶虞四曰鵲巢五曰白駒又有十二操一曰將歸操孔子所作孔子之趙聞殺鳴犢而歸作此曲也二曰􅀝蘭操孔子所作傷不逢時三曰􅀛山操孔子作季桓子受齊女樂孔子欲諌不得退而望魯􅀛山作曲喻季氏􅀂􅀛山之蔽魯也四曰越裳操周公所作五曰拘幽操文王作文王拘於羑里作此曲六曰歧山操周人爲太王所作七曰履霜操尹􅁻甫子伯竒無罪見逐自傷作此曲八曰雉朝飛操沐犢子所作沐犢子七十無妻見雉􅀟飛感之作此曲也九曰別鶴操啇陵牧子所作娶妻五年無子父母欲改娶其妻聞之中夜悲牧子因之作此曲十曰殘形操曽子夢見一狸不見其足而作曲十一曰水僊操伯牙所作十二曰壞陵操伯牙所作又有九引一曰列女引楚樊􅁎所作二曰伯􅁎引魯伯􅁎所作三曰貞女引魯􅃮室女所作四曰思歸引衛女所作五曰霹􅆮引楚啇梁出遊九臯之澤遇風雷霹􅆮畏懼而歸作此引六曰走馬引樗里牧恭所作牧恭爲父報􅁈殺人而亡藏於山林之下有天馬引之感作此引七曰箜篌引霍里子髙所作即公無渡河曲八曰琴引􅁗時屠門髙所作九曰楚引楚龍丘子髙所作又有河間雜歌二十一章琴歴曰琴曲有蔡氏五弄􅀟鳯離鸞歸風送逺幽蘭曰雪長清短清長側清調}
