  - {type: variant, offset: 2176, length: 3, content: 攝拱兩, SBCK: 夫人何故泣妻曰聶出遊七年不歸吾常夢相思見君對妾􅀏齒似政齒故我心悲而泣也政曰天下人齒盡相似耳胡爲泣乎即別去復入山中仰天而歎曰嗟乎變容易身欲爲父報仇而爲妻所識父讎當何時復報援石擊落其齒留山中三年習琴持入韓國人莫知政政皷琴闕下觀者成行馬牛止聽以聞韓王王召政而見之使之彈琴政即援琴而皷之内刀在琴中政於是左}
