  - {type: variant, offset: 144, length: 3, content: 在前坐, SBCK: 調大遊小遊明君胡茄廣陵散白魚歎楚妃歎風入松烏夜啼楚明光石上流泉臨汝侯子安之流漸洄􅀟燕離陽春弄恱弄連弄恱人弄連珠弄中揮清暢志清看客清僻清婉轉清大周正樂曰師襄子夫子琴師也方子春教成連生皷琴能化人情者也成連先生教伯牙皷琴者也鍾子期善聽知音者子期死伯牙終身不皷琴者也顔淵聽夫子琴知周衰者也㳙子操琴心玉篇者也禽髙以琴飬性求仙於羅浮山中皷琴於郢中奏陽春白雪者也雍門周以琴感孟甞君悲者也鄒忌與齊王言琴事以方正定德者也榮啓期對夫子彈琴言三樂之事者也禽孟臨巒户死}
