  - {type: variant, offset: 1034, length: 228, content: 荊軻左把秦王右揕其胸王乞聽琴而死召姬人鼓琴聲曰羅縠單衣可裂而絕八尺屏風可超而越鹿盧之劍可負而拔王奮而去又曰黃帝使素女鼓五十絃琴帝悲不能自禁破為二十五絃又曰萬石君奮年十五為小吏侍高祖與語愛其恭敬問曰若何有對曰獨有母不幸失明有姊能鼓琴高祖乃召其姊為美人以奮為中徙其家長安中戚里東觀漢記曰上嘗問宋弘道通之士弘薦桓譚譚善鼓琴喜鄭聲上數聽悅之弘聞坐府上遣吏召譚責問之譚叩頭良久乃遣後上令譚鼓琴譚為之失次上問之弘言其故故不復令譚給事後漢書曰初蔡邕在陳留鄰人有以酒食召邕, SBCK: 騶虞操}
