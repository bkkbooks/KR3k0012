  - {type: variant, offset: 3407, length: 0, content: '', WYG: 泣下對曰夫人何故泣妻曰聶政出遊七年不歸吾常夢相思見君對妾笑齒似政齒故我心悲而泣也政曰天下人齒盡政若耳胡為泣乎即别去復入山中仰天而嘆曰嗟乎變容易身欲為父報仇而為妻所知父仇當何時復報援石擊落其齒留山中三年習操持入韓國人莫知政政鼓琴闕下觀者成行馬牛止聽以聞韓王王召政而見之使之弹琴政即援琴而歌之内刀在琴中政於是左手持衣右手出刀以刺韓王殺之曰烏有使人生不見其父可得死乎政殺國君知當及母即自犁剥面皮斷其形體人莫能識知乃梟磔政形體市懸金其側有知此人者賜金千斤遂有一婦人往而哭曰嗟乎為父報仇耶顧}
