  - {type: variant, offset: 694, length: 0, content: '', SBCK: 其思革子之}
  - {type: variant, offset: 694, length: 0, content: '', krp: 其思革子之}
  - {type: variant, offset: 695, length: 0, content: '', SBCK: 作也其思革子城石文子叔愆子三人相與爲友聞楚城子賢而好士三子相與俱徃見之至於磝磽嶔岩之間卒逢飄風􅁀雨相與俱伏空柳之下衣寒乏粮自度不得活三人相視而歎曰與其飢寒俱死也豈􅀂併衣粮於一人哉二人俱}
  - {type: variant, offset: 695, length: 0, content: '', krp: 作也其思革子城石文子叔愆子三人相與爲友聞楚城子賢而好士三子相與俱徃見之至於磝磽嶔岩之間卒逢飄風暴雨相與俱伏空柳之下衣寒乏粮自度不得活三人相視而歎曰與其飢寒俱死也豈若併衣粮於一人哉二人俱}
  - {type: variant, offset: 696, length: 2, content: 存亡, SBCK: 其思革子爲賢推衣粮與之革子曰死則共之今二子以賢愚相辝乃以死讓孰賢哉辝而不受二子曰吾自以相與猶左右手也左傷則右救之右傷則左救之子不我受俱死無名於丗不亦痛乎於是思革子乃受之二子遂凍餓而死其思革子抱二子尸而埋之號天哭泣竭哀而去徃見於楚王楚王知其賢者於是旨酒嘉餚設鍾皷樂之其思革子愴然有憂悲之意楚王心動恠而不恱乃推罇罷樂引琴而進其思革子援琴而皷之作相與別散之意王聞曰子琴音何苦哀也革子推琴離席長跪涕流而下對臣友三人石丈子叔愆子􅀼慕大王髙義欲俱來謁至於磝磽嶔岩之間逢飄風􅁀雨衣寒粮乏度不能俱活二子俱不以臣爲不肖推糧與臣二子逢凍餓死大王雖陳酒餚設樂誠不敢酣樂也楚王曰嗟乎乃如是耶於是賜其思革子黄金百斤命左右棺歛収二子而葬之以其思革子爲相}
  - {type: page-break, offset: 696, content: '', id: KR3k0012_SBCK_578-5a}
