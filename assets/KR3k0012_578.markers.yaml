  - {type: variant, offset: 3516, length: 0, content: '', SBCK: 皷之又曰力㧞山者項羽之所作也項王爲漢所圍於垓下諸侯兵悉到圍數重項王夜覺聞漢軍四面楚歌驚起坐仰天而歎曰漢得吾衆是何楚歌之多於是心悲援琴而皷之又曰禹上㑹稽者禹之所作也堯時洪水㴞天百姓巢居不安堯乃徴禹而使治之乃决江河上㑹稽山頋曰嗚呼洪水滔天下人愁悲上帝俞咨三過吾門不入父子道衰非欲伐功也傷君莫知不欲煩下民嗟乎天非欲數煩下嗟嗟不欲煩下民自是之後百姓降丘􅀺庶乂安彈琴以自歎故曰禹上㑹稽又曰箕子吟者箕子之所作也箕子紂之諸父也紂爲}
