  - {type: variant, offset: 1268, length: 1247, content: 酣客有彈琴於屏邕至門潛聽之曰以樂召我而有殺心何也遂返將命者告主人曰蔡君至門而去邕素為邦鄉所宗主人遂自追問其故邕具以告莫不憮然彈琴者曰我向見螳蜋方向鳴蟬蟬將去而未飛螳蜋為之一前一卻吾心聳然唯恐螳蜋之失蟬也此豈為殺心而形於聲乎邕歎曰此足以當之矣又曰蔡邕字伯喈陳留人性沉審志好琴道以嘉平元年入清溪訪鬼谷先生所居山五曲曲有幽居靈跡每一曲制一弄三年曲成出呈馬融王元董卓等異之晉書曰王敬伯會稽餘姚人洲渚中昇亭而宿是夜月華露輕敬伯鼓琴感劉惠明亡女之靈告敬伯就體如平生從婢二人敬伯撫琴而歌曰低露下深幕垂月照孤琴空絃益霄淚誰憐此夜心女乃和之曰歌宛轉情復哀願為煙與霧氛氳同共懷晉書曰阮瞻善彈琴人聞其能多往來聽不問貴賤長幼皆為彈之神氣冲和不知向人所在內兄潘岳每令鼓琴終日達夜無忤色晉中興書曰戴逵字安道少有文藝善鼓琴太宰武陵王晞聞其能琴使人召焉逵對使者破琴曰戴安道不為王門伶人晞怒乃更引其兄述述亦能樂聞命忻然操琴而往逵不樂當世以琴書為娛不遠千里宋書曰蕭思話領左衛將軍嘗從太祖登鍾山北領中道有盤石清泉上使於石上彈琴因賜以銀鍾酒謂曰相賞有松石間意又曰衡陽王義季鎮京口長史張邵與戴顒姻通近來止黃鵠山林澗甚美顒憩於澗義季亟從之遊顒衣野服為義季鼓琴並新聲變曲皆與世異也又曰衡陽王義季鎮京口戴顒為義季鼓琴並新聲曲其三調遊絃廣陵止息之流皆與世異太祖每欲見之嘗謂黃門侍郎張敷曰當讌戴公山也以其好音長給正聲伎一部顒合何當白鵠二聲以為一調號為清曠又曰陶潛不解音聲而畜素琴一張每有酒適輒撫弄以寄其意蕭子顯齊書曰王仲雄善彈琴當時妙絕江左有蔡邕焦尾琴在王衣庫上勑五日一給仲雄又曰尚書令柳世隆少立功名晚專以談義自業善彈琴世稱柳公雙璅為十品第一常自云馬矟第一清談第二彈琴第三在朝不取世務垂簾鼓琴風韻清遠甚獲世譽家語曰孔子學琴於師襄子襄子曰吾雖以擊磬為官然能於琴子琴已習可以益矣孔子曰丘未得其為志也又問曰已習其志可以益矣孔子曰丘未得其為人也又問曰子有所繆然深思焉繆然深思貌也有所皇然高望而遠眺眺見曰丘殆得其為人矣近黮然黑黮黑貌也頎然長頎長皃也曠然如望羊曠然用志曠遠也望遠也望羊視遠奄有四方奄同也文王時三分天下有其二後周有四方文王之功上也非文王其孰能為此師襄子避席攝拱而對曰攝拱兩手薄心君聖人也其傳曰文王操又曰子路鼓琴孔子聞之謂冉有曰甚矣由之不才也夫先王之制音也奏中聲以為節流入於南不歸於北夫南者生育之鄉北者殺伐之域也故君子之音溫和居中以養生育之氣憂愁之感不加乎心暴厲之動不存乎禮夫然者乃所以為治安之風也小人之音則不然亢厲微末以象殺伐之義中和之感不載乎心溫和之動不存於體夫然者乃所以為亂亡之風家語曰伯牙鼓琴鍾子期聽之方鼓而志在太山鍾子期曰善哉乎鼓琴巍巍乎若太山少選之期而志在流水鍾子期復曰善哉乎鼓琴湯湯乎若流水鍾子期死伯牙破琴絕絃終身不復鼓琴以為世無足為鼓琴者莊子曰孔子窮於陳蔡七日不食絃歌鼓琴又曰孔子遊於緇帷之林休坐杏壇之上弟子讀書孔子絃歌鼓琴奏曲未半有父者下船而來孔子推琴而起曰其聖歟列子曰瓠巴鼓琴鳥舞魚躍鄭師文聞之從師襄三年不成無幾見師襄曰久得之, WYG: ''}
