  - {type: variant, offset: 452, length: 150, content: 爾雅云大琴曰離二十絃或傳此是伏羲所制周書曰鄒忌以鼓琴見齊威王威王悅之舍之右室須臾王自鼓琴鄒忌推戶久曰善哉鼓琴也王悖然不悅去琴按劍曰夫子見之未察何以知其善忌曰大絃濁以溫小絃廉折以清推之深而釋之舒均諧以鳴大小相蓋回邪而不相害是知其善忌復曰不獨語音夫治國家弭人民皆在其中王又悖然不悅曰若語五音紀信未有如夫子, WYG: ''}
