  - {type: variant, offset: 3578, length: 1, content: 外, WYG: 所作也項王為漢所圍於垓下諸侯兵悉到圍數重項王夜覺聞四面楚歌驚起坐仰天而歎曰漢得吾衆是何楚歌之多於是心悲援琴而鼓之又曰禹上㑹稽者禹之所作也堯時洪水滔天百姓巢居不安堯乃徴禹而使治之禹乃決江河上㑹稽山顧曰嗚乎洪水滔天下人愁悲上帝俞咨三過吾門不入父子道衰非欲伐功也傷君莫知不欲煩下民自是之後百姓降立黎庶乂安弹琴以自嘆故曰禹上㑹稽又曰箕子吟者箕子之所作也箕子紂之諸父也紂為無道殺比干醢梅伯斮朝涉刳孕婦奢淫驕恣不修道徳箕子知不可諌乃被髪佯狂痛宗廟之坵墟喟然援琴而鼓之又曰文王思士者文王之所作也文思得賢士與為治出游援蓍而卜之卦得所獲非龍非麟非虎非熊乃帝王之師也至渭之陽果遇吕尚與語}
