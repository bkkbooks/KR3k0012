  - {type: variant, offset: 3621, length: 211, content: 女少聰惠秀異年六歲邕夜鼓琴絃絕琰曰第二絃邕故斷一絃而問之琰曰第四絃邕曰偶得之耳琰曰吳札觀化知興亡之國師曠吹律識南風之不競由此言之何不足知也馬明生別傳曰明生隨神女入石室金床玉几時自彈琴有絃五音普奏聞於數里幽明錄曰劉琮善琴忽得困病許遜曰近蔣家女鬼相錄在山石間專使彈琴作樂恐欲致災也琮曰吾常夢見女子將吾宴戲恐必不免遜笑曰蔣姑相愛重恐不能相放耳以為誄之今去當無患也琮漸差文士傳曰嵇康臨死顏色不變謂其兄曰向以琴來不兄曰已至康取調之為, SBCK: ''}
