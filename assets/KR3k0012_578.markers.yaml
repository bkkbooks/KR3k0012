  - {type: variant, offset: 461, length: 4, content: 絃或傳此, SBCK: 七人並爲上石又曰􅂎梁妻者齊邑􅂎梁殖妻之所作也莊公襲莒殖戰而死莊公還遇其妻於路使使者道吊之妻曰今殖有罪君何辱命焉􅀂殖免於罪賤妾有先人之弊廬妾不敢受郟吊也公乃吊諸室成禮而去妻歎曰上則無父中則無夫下則無子外無所依内無所􅀝將何以立吾節豈能更二哉死而已矣於}
