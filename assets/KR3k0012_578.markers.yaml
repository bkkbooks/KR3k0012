  - {type: variant, offset: 3362, length: 0, content: '', WYG: 自傷不􅑮時也又曰龜山操者孔子之所作也齊人饋女樂季桓子受之魯君閉門不聽朝當此之時季氏專政上僣天子下畔大夫賢聖斥逐讒邪滿朝孔子欲諌而不聽復退而望魯魯有龜山蔽之辟季氏於龜山託勢位於斧柯季氏專政道猶龜山之蔽魯也傷政道之不用閔百姓不得其所欲誅季氏而力不能於是援琴而歌又曰白駒操者失朋友之所作也其友賢俱仕乎衰亂之世君無道不}
