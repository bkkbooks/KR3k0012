  - {type: variant, offset: 3317, length: 3, content: 則曲終, WYG: 又曰騶虞操者邵國女之所作也古有聖王在上君子在位役不踰時不失嘉㑹内無怨女外無曠夫及周道衰㣲禮義廢弛强凌弱衆暴寡萬民騷動百姓愁苦男怨於外女傷於内内外無主内迫情性外迫禮義歎傷所說}
