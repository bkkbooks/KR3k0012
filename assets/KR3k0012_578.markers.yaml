  - {type: variant, offset: 2518, length: 696, content: 當春而叩商絃以召南呂涼風惣至草木成實秋而叩角溫風徐廻草木發榮夏而叩羽霜雪交下川池暴涸冬其叩徵陽光熾烈堅冰立散將終而四景風翔慶雲浮甘露降醴泉湧前秦錄曰符堅末年好色寵幸鮮卑有趙整者援琴歌曰昔聞盟津河千里作一曲此水本清白是誰亂使濁又曰北園有棗樹布葉垂重陰外雖多棘剌內實有亦心世說曰王子猷病篤而子敬先亡猷問左右曰何以都不聞消息此以喪矣語時了不悲便索轝臨殯子敬好琴故以置棺中因大慟曰所謂人琴俱亡於是乃絕風俗通曰今琴長四尺五寸者法四時五行七絃者法七星大絃為君小絃為臣文王武王加二絃以合君臣之恩劉向列仙傳曰子主者不知何許人也言甯先生雇我一百餘年不還直詣江都王陳辭先生居龍首彈琴是我鄰家九代孫琴操曰伏羲作琴長三尺六寸六分象三百六十日也廣六寸象六合也文上曰池下曰宕池水平也前廣後狹象尊卑也上圓下方法天地五絃官也大絃君也寬和而溫小絃臣也清廉不亂文王加二絃合君臣恩也宮為君商為臣角為民徵為事羽為物傳玄琴賦敘曰齊桓有鳴琴曰號鍾楚莊王有琴曰繞梁司馬相如有綠綺蔡邕有焦尾皆名器也蔡邕焦尾有證甚多相如故取古名目琴耳無其事也不異號鍾世說曰顧彥先平生好琴死後置琴床上張翰直上床彈琴不與孝子語而去語林曰嵇中散夜燈下彈琴忽有一人面甚小斯須轉大遂長丈餘單衣革帶嵇視之既熟乃吹燈滅之曰恥與魑魅爭光阮籍樂論曰漢桓帝聞楚琴悽愴傷心倚戶而悲慷慨長息曰善哉為琴若此而足矣說苑曰應侯與賈子坐聞鼓琴聲應侯曰今日琴一何悲也賈子曰夫張急調下故使之悲耳因張者良材也調下者官卑也取夫良材而卑之官安能無悲乎應侯曰善揚雄琴清英曰晉王謂孫息曰子鼓琴能令寡人悲乎息曰今處高臺邃宇連屋重戶藿肉漿酒倡樂在前難可使悲者乃謂少失父母長無兄嫂當道獨坐暮無所止如此者乃可悲耳, SBCK: 志得意歡}
