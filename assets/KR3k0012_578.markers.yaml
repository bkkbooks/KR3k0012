  - {type: variant, offset: 3250, length: 2, content: 奏曲, WYG: 鼓之又曰将歸操者孔子之所作也趙簡子循執玉帛以聘孔子孔子将往未至渡狄水聞趙殺其賢大夫竇鳴犢喟然而嘆之曰夫趙之所以治者鳴犢之力也殺鳴犢而聘余胡丘之往也夫燔林而田則麒麟不至覆巢破卵則鳳凰不翔鳥獸尚惡傷類而况君子哉於是援琴而鼓之又曰岐山操者周大臣之所作也太王居幽狄人攻之仁恩惻隐不忍流血選㨂珍寳犬馬皮幣束帛與之狄侵不止問其所欲欲得土地太王曰􅁟地者所以養萬民也吾将委國而去矣二三子亦何患無君焉遂杖䇿而出踰乎梁而邑乎岐山自傷力不能化夷狄為其所侵喟然嘆息援琴而鼔之又曰三子窮操者其思革子之所作也其思革子城石文子叔愆子三人相與為友聞楚成王賢而好士三子相與俱往見之至於磝磽嶔岩之間卒􅑮飄風暴雨相與俱伏空栁之下衣寒乏糧自度不得活三人相視而嘆曰與其饑寒俱死也豈}
