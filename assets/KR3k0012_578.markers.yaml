  - {type: variant, offset: 2213, length: 0, content: '', SBCK: 崔子早無母其後母常以其死母名呼之不應者後母輙笞之崔子惡與其母同名欲自殺恐揚父􅁖又死母名應則逆非義也則以能遊渡河爲辝繫石於腹入水自沉而死衆人但以爲不能游耳莫知其故自沉是以父過不揚閔子騫大其能爲父隠傷痛之故援琴而皷之以羙其意故曰崔渡河又曰屈原自沉者屈原之所作也屈原楚同姓也爲懷王佐愽聞強識䟽通政事入則與王議國計䇿以施号令出則接遇賔客應對諸侯上官大}
