  - {type: variant, offset: 3364, length: 1, content: 鼓, WYG: 周公輔相成王成就文王之道天下太平萬國和㑹四夷納貢越裳重九譯而来獻白雉執贄曰吾君在外國也頃無迅風暴雨意者中國有聖人乎故遣臣來周公於是仰天而嘆之援}
  - {type: variant, offset: 3366, length: 0, content: '', WYG: 而歌又曰拘幽操者文王}
