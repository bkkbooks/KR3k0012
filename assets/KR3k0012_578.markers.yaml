  - {type: variant, offset: 143, length: 0, content: '', WYG: 而歌曲終成連回刺船迎之而還伯牙遂為天下妙矣又曰雉朝飛操者齊宣王時處士沭犢子所作也年七十無妻出薪於野見雉雌雄相隨則心悲乃仰天嘆曰聖王在上恩及草木鳥獸而我獨以不獲援琴而歌以自傷又曰思歸引衛有賢女邵王聞其賢請聘之未至王薨太子曰吾聞齊桓得衛姬覇今衛女賢者欲留之大夫曰不可若賢必不我聽若不賢不足取太子不聽遂拘留深宫思歸不得歸援琴而歌曲終自縊而死揚雄琴清英曰尹吉甫子伯竒至孝後母譛之自投江中衣折帶藻忽夢見水仙賜其美藥唯念養親揚聲悲歌船人聞而學之吉甫聞船人之聲疑似伯竒援琴作子安之操琴操曰商陵牧子娶妻無子父母将改娶牧子援琴鼓之痛恩愛乖離故曰别鶴操揚雄琴清英曰雉朝飛操者衛女之所作也衛侯女嫁於齊太子至中道聞太子死問傅母何如傅母曰且往當䘮畢不肯歸終之以死焉傅母好琴取女自操琴於塜上鼓之忽三雉俱出墓中傅母撫雌雉曰女果為雉耶言未卒俱飛而起忽然不見傅母悲痛援琴作操故曰雉朝飛琴操曰古琴曲有歌詩五曲一曰鹿鳴二曰伐檀三曰騶虞四曰鵲巢五曰白駒又有一十二操一曰将歸操孔子所作孔子之趙聞殺鳴犢而歸作此曲也二曰猗蘭操孔子所作傷不逢時三曰龜山操孔子作季桓子受齊女樂孔子欲諌不得退而望魯龜山作曲喻季氏若龜山之蔽魯也四曰越裳操周公所作五曰拘幽操文王作文王拘於羑里作此曲六曰岐山操周人為太王所作七曰履霜操尹吉甫子伯竒無罪見逐自傷作此曲八曰雉朝飛操沐犢子所作沐犢子七十無妻見雉雙飛感之作此曲也九曰别鶴操商陵牧子所作取妻五年無子父母欲改娶其妻聞之中夜悲牧子因之作此曲十曰殘形操曽子夢見一狸不見其足而作此曲十一曰水仙操伯牙所作十二曰懐陵操伯牙所作又有九引一曰列女引楚樊姬所作二曰伯姬引魯伯姬所作三曰貞女引魯漆室女所作四曰思歸引衛女所作五曰霹靂引楚商梁出逰九臯之澤遇風雷霹靂畏懼而歸作此引六曰走馬引樗里牧恭所作牧恭為父報寃殺人而亡藏於山林之下有天馬引之感作此引七曰箜篌引樗里子髙所作即公無渡河曲八曰琴引秦時屠門髙所作九曰楚引楚龍丘子髙所作又有河間雜歌二十一章琴厯曰琴曲有蔡氏五弄雙鳳離鸞歸風送逺幽蘭白雪長清短清長側清調}
