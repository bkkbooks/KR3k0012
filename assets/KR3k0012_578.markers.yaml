  - {type: variant, offset: 3521, length: 0, content: '', WYG: 厄又霍将軍歌者霍去病之所作也去病為討㓂校尉為人少言勇而有氣使擊匈奴斬首二千後六出斬首十餘萬級益封萬五千户侯祿與大将軍等於是志得意歡乃援琴而歌之又曰鳳凰來儀者周成王之所作也成王即位用周召畢榮之属天下大治殊方絶域莫不蒙化是}
