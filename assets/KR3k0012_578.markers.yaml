  - {type: variant, offset: 3314, length: 2, content: 望視, WYG: 妃后設㫖酒嘉肴不能厚養賢者盡禮極歡形見於色大臣昭然獨見必知賢士幽隐小人在位周道陵遲自以是始故弹琴以風諌歌以感之庶幾可復歌呦呦鹿鳴食野之苹我有嘉賓鼓瑟吹笙吹笙鼓簧承筐是将人之好我示我周行此言禽獸得美甘之食尚知相呼傷時在位之人不能乃援琴以刺之故曰鹿鳴}
