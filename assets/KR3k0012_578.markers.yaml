  - {type: page-break, offset: 602, content: '', id: KR3k0012_WYG_578-5b, image: WYG0898/WYG0898-0303d.png}
  - {type: variant, offset: 603, length: 428, content: 也若治國家弭人民皆在其中又何為絲桐之間忌曰大絃急以溫者君也小絃廉折以清者相也推之深釋之舒者刑罰審也均諧之鳴者政令一也大小相蓋回邪不相害者上下和鳴吏民相親也夫復而不亂者所以治昌連而徑者所以存亡故曰琴音調而天下治治國家弭人民無若乎五音者矣王曰善忌見三月而受相印淳于髡謂忌曰髡有愚志願陳諸前忌曰謹受教髡曰得人者昌失人者亡忌曰謹受命請無觀髡曰狢膏棘軸所以為猾然而不能運方穿忌曰謹受命請事左右髡曰弓膠腊幹所以為勢然而不能傳合踈遠忌曰謹受命請謹自撫附萬民髡曰狐裘雖獘不可補以黃犬之皮忌曰謹受命謹請擇君子無親小人髡曰大車無轂不能載常任琴瑟無軫不能成五音忌曰謹受命請謹修法律而督姦吏髡說畢趍出至門而眄其僕曰是人者吾語之微言其應我如響之應聲是人封不久矣居朞年封於下邳號曰成侯史記曰箕子諫紂不聽而被髮佯狂奴為奴隱而鼓琴以自悲又曰司馬相如素與臨邛令王吉相善臨邛富人卓王孫有女文君新寡好音相如謬與令相重而以琴心挑之相如始之臨邛車騎雍容閑雅甚都及飲卓氏弄琴文君竊從戶窺之心悅恐不得當, WYG: ''}
