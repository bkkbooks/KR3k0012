  - {type: variant, offset: 1263, length: 220, content: 比往而酒已酣客有彈琴於屏邕至門潛聽之曰以樂召我而有殺心何也遂返將命者告主人曰蔡君至門而去邕素為邦鄉所宗主人遂自追問其故邕具以告莫不憮然彈琴者曰我向見螳蜋方向鳴蟬蟬將去而未飛螳蜋為之一前一卻吾心聳然唯恐螳蜋之失蟬也此豈為殺心而形於聲乎邕歎曰此足以當之矣又曰蔡邕字伯喈陳留人性沉審志好琴道以嘉平元年入清溪訪鬼谷先生所居山五曲曲有幽居靈跡每一曲制一弄三年曲成出呈馬融王元董卓等異之晉書曰王敬伯會稽餘姚人洲渚中昇亭而宿是夜月華露輕敬伯鼓琴感劉惠明亡, SBCK: 邵國}
