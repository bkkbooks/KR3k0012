  - {type: variant, offset: 2534, length: 7, content: 二叔唯走一人何, SBCK: 不意以乗其後􅄄飛兵擾亂萇遣將王超等率歩􅀐擊之􅄄飛衆大潰斬􅄄飛惡地請降萇待之如􅀄通典曰後漢末荀攸從曹公征吕布至下邳布敗固守攻之不拔連戰士卒疲曹公欲還攸與郭嘉說公曰吕布勇而無謀今三戰皆北其銳氣衰三軍以氣爲主主衰則軍無奮意且布之謀主陳宫有智而遲今及布氣衰而未復宫謀之未定進急攻之布可拔也乃引沂泗灌城城潰生擒布又曰蜀將諸葛亮伐魏魏將司馬宣王郭淮等禦亮張郃勸宣王分軍住雍郿爲後鎭宣王曰料前軍能獨當之者將軍言是也􅀂不能當而分爲前後此楚之三軍}
