  - {type: variant, offset: 339, length: 313, content: 吾間知之而待於敵也作詐狂之事於外佯漏泄之使吾間知之吾間至敵中為敵所得必以誑事諭敵從而備之吾所行不然問則死矣又一云敵間來間以我誑事而持歸然皆非所圖也二間皆不能知幽隱深密故曰死間也蕭世諴云所獲敵人及己軍土有重罪繫者故為免相勑勿泄佯不祕密令敵間竊聞之吾因縱之亡亡必歸敵必信焉往必死故曰死間也生間者反報者也擇己有賢才智謀能自開通於敵之親貴察其動靜知其事計彼所為已知其實還報故曰生間也故三軍之親莫親於間若不親撫重以祿賞則反為敵用泄吾情實也賞莫厚於間厚賞之賴其用事莫密於間間事不密則為己害非聖智不能用間非仁義不能使間不能得間人之用也非微密者不能得間之實精微用意密不泄漏微哉微哉無所不用間也間事未發而先聞其間者與所告者皆死凡軍之所欲擊所欲擊, SBCK: 奢救}
