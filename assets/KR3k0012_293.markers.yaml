  - {type: variant, offset: 2525, length: 0, content: '', SBCK: 陛下不憂六十里符登乃憂六百里􅄄飛萇曰登非可卒殄吾城亦非登所能卒圖惡地多智非常人也南引􅄄飛東結董咸甘言美說以成姦謀􅀂得杏城李潤惡地據之控制逺近相爲羽翼長安東北非復吾有於是潛軍赴之萇時衆不滿二千􅄄飛惡地衆至數萬互胡赴之者首尾不絶萇毎見一軍至輙有喜色羣下怪而問之萇曰}
