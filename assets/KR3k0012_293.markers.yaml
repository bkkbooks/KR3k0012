  - {type: variant, offset: 1980, length: 14, content: 漢高帝被匈奴單于冒頓圍於白登, SBCK: 武城黒謂常曰呉用木也我用革也不可乆也不如速戰魏志曰夏侯淵性果悍進軍疾速人歌曰夏侯淵三日六百五日千晉書吕光載記曰光行至髙昌聞堅晉光欲更須後命部將杜進曰節下任全方靣赴機冝速何不了而留乎又曰杜預破呉衆議且俟來冬預曰兵威巳振譬如破竹數節之後迎刀而解}
  - {type: variant, offset: 1980, length: 1, content: 漢, WYG: 武城黒謂子常曰吳用木也我用革也不可乆也不如速戰魏志曰夏侯淵性果悍進軍疾速人歌曰夏侯淵三日六百五日千晉書呂光載記曰光行至}
  - {type: variant, offset: 1980, length: 14, content: 漢高帝被匈奴單于冒頓圍於白登, krp: 武城黒謂常曰呉用木也我用革也不可乆也不如速戰魏志曰夏侯淵性果悍進軍疾速人歌曰夏侯淵三日六百五日千晉書吕光載記曰光行至髙昌聞堅晉光欲更須後命部將杜進曰節下任全方靣赴機冝速何不了而留乎又曰杜預破呉衆議且俟來冬預曰兵威巳振譬如破竹數節之後迎刀而解}
  - {type: variant, offset: 1982, length: 23, content: 帝被匈奴單于冒頓圍於白登乃使間厚遺閼氏乃謂冒頓, WYG: 昌聞堅冦晉光欲更湏後命部將杜進}
