  - {type: variant, offset: 1543, length: 3, content: 秦與趙, SBCK: 魏將司馬宣王征公孫文懿賊保襄平宣王進軍圍之㑹霖潦大水平地數尺三軍恐懼欲移營宣王令軍中敢有言徙者斬都督令史張静犯令斬之軍中乃定賊恃水樵牧自􅀂諸將欲取之皆不聽司馬陳珪曰昔攻上庸八部並進晝夜不息故能一旬之半拔堅城塹孟逹今者逺來而更安緩愚竊惑焉宣王曰孟逹衆少而食支一年吾將士四倍於逹而糧不淹一月以一月圖一年安可不速今賊衆我寡賊飢我飽水雨乃􅈛功力不設雖當促之欲何所爲自發京師不憂戰攻但恐賊糧垂盡而圍落未合掠其牛馬抄其樵採此故驅使走也夫}
