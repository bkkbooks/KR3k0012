  - {type: variant, offset: 654, length: 494, content: 城之所欲攻所欲攻之城人之所欲殺所欲殺之人必先知其守將左右謁者舍人之姓名守有官職任者謁告也主告事者也門者守門者也舍人守舍之人也又先知之為親舊有急即呼之則不見何止亦因以知敵之情令吾間必索知之敵間之來間我者因而利之導而舍之舍居止也今吾人遺以重利復遇而舍止之可令詭其辭故反間可得而用也故能取敵之間而用因是而知之故鄉間內間可得而使也因反敵間而知敵情鄉間內間者皆可得使也因是而知之故死間為誑事可使告敵因是可得而攻也因誑事而知敵情生間往反可使知其敵之腹心所在因是而知之故生間可使如期五間之事主必知之人主當知五間之用厚其祿豐其財知之必在於反間故反間不可不厚也反間者五間之本事之要也故當在厚待之殷之興也伊摯在夏伊尹周之興也呂牙在殷呂望故唯明主賢將能以上智為間者必成大功此兵之要三軍所恃而動者也已上注出通典左傳曰楚師伐宋九月不服將去宋楚大夫申叔時曰築室反耕者宋必聽命楚子從之築室於宋分兵於田示無去志王從其言宋人懼使華元夜入楚師登子反之床起之曰寡君使元以病告兵法因其卿人而用之必先知其守將左右謁者門者舍人之姓名因而利導之華元蓋用此術得以自通曰敝邑易子而食析骸而雖然城下之盟有以國敝不能從也寧以國敝不從城下盟去我, SBCK: 邯鄲}
