  - {type: variant, offset: 1588, length: 150, content: 子為將耳趙王信秦之間因以奢子為將終為秦將白起所敗史記曰楚漢相持未決勝負陳平言於漢王曰彼項王有骨鯁之臣以亞父范增鍾離昧龍且周殷之屬昧音妹且于間切不過數人耳大王誠能出捐數萬斤金行反間間其君臣以疑其心項王為人意忌信讒必內相誅漢因舉兵攻之破楚必矣漢王然之乃出黃金四萬斤與平恣所為不問出入平既多以金縱反間於楚軍, SBCK: 自餘柵悉降岳}
