  - {type: variant, offset: 3242, length: 277, content: 故洩虛假令告示焉有因敵之使矯使其事而返之焉有審擇賢能覘彼向背虛實而歸說之焉有佯緩罪戾微漏我偽情浮計使亡報之焉凡此五間皆須隱秘重之以賞密始可行焉若敵有寵嬖任以腹心者我當使間遺其珍玩恣其所欲順而傍誘之敵有重臣失勢不滿其志者我則啗以厚利詭相親附採其情實而致之敵有親貴左右多詞誇誕好論利害者我則使間曲情尊奉厚遺珍寶揣其所間而返間之敵若使聘於我我則稽留其使令人與之共處矯致殷勤偽相親暱朝夕慰論倍供殊味觀其辭色而察之仍旦暮令使獨與己伴居我遣聰耳者潛於複壁中聽所間使既遲違恐彼怪責必是竊論心事我知事計遣而用之旦夫用間以間人人亦用間以間己己以密往人以密來理須獨察於心參會, SBCK: 後}
