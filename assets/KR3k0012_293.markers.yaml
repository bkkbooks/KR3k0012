  - {type: variant, offset: 1040, length: 210, content: 無去志王從其言宋人懼使華元夜入楚師登子反之床起之曰寡君使元以病告兵法因其卿人而用之必先知其守將左右謁者門者舍人之姓名因而利導之華元蓋用此術得以自通曰敝邑易子而食析骸而雖然城下之盟有以國敝不能從也寧以國敝不從城下盟去我三十里唯命是聽子反懼與之盟而告楚子退三十里宋及楚平華元若不因間若不用謀無由得入楚軍也又曰楚師伐鄭鄭人將奔楚師夜遁諜告曰楚幕有烏乃止禮記曰晉人之覘宋者反報於晉侯曰陽門之介夫死而子罕哭之哀而民說殆不可伐也從之, WYG: 緩}
