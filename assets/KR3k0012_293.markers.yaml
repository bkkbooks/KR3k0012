  - {type: variant, offset: 1177, length: 289, content: 因間若不用謀無由得入楚軍也又曰楚師伐鄭鄭人將奔楚師夜遁諜告曰楚幕有烏乃止禮記曰晉人之覘宋者反報於晉侯曰陽門之介夫死而子罕哭之哀而民說殆不可伐也從之戰國策曰鄭武公欲伐胡先以其子妻胡因問群臣曰吾欲用兵誰可伐者大夫關思其曰胡可伐武公怒而戮之曰胡兄弟之國子言伐之何也胡君聞之以鄭為親已而不備鄭鄭襲胡取之此用死間之勢又曰燕昭王以樂毅為將破齊七十餘城及惠王立與毅有隙齊將田單乃縱反間於燕宣言曰齊王已死城不拔者二耳樂毅畏誅而不敢歸以伐齊為名實欲連兵南面王齊齊人未附故且緩即墨殘矣燕王以為然使騎劫代毅燕人士卒離心單又縱反間曰吾懼燕人掘吾城外家墓僇先人燕軍從之即墨人激怒請戰大敗燕師所亡七十餘城悉, SBCK: 行}
