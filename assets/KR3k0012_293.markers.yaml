  - {type: variant, offset: 2638, length: 0, content: '', SBCK: 金輕􅀐餌之兵􅂊接而亮退也又曰蜀將孟逹之降魏也魏朝以逹領新城太守假節逹於是連呉固蜀潛圖中國謀洩將舉兵司馬宣王秉政恐逹速發以書安之逹得書猶與不决宣王乃潛軍進諸將皆言逹與二賊交搆冝審察而後動宣王曰逹無信義此其相疑之時也當及其未定往決之乃倍}
  - {type: variant, offset: 2638, length: 0, content: '', WYG: 金輕騎餌之兵纔接而亮退也又曰蜀將孟達之降魏也魏朝以達領新城太守假節於是連吳固蜀潜圖中國謀洩將舉兵司馬宣王秉政恐達速發以書安之達得書猶豫不决宣王乃潜軍進諸將皆言達與二賊交搆宜審察而後動宣王曰達無信義此其相疑之時也當及其未定徃决之乃倍}
