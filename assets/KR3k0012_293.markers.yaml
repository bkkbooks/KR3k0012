  - {type: variant, offset: 3011, length: 1, content: 黃, SBCK: 隋末髙祖義兵發太原次靈石縣賈胡堡隋將宋老生率精兵二萬屯霍邑以拒之㑹乆雨糧盡與長史裴寂及諸將議曰宋老生頓霍邑屈突通鎭河東二人同心非造次可進欲還太原以圖後舉太宗曰夲興大義以救蒼生當須先入咸陽號令天下今遇小敵便即班師將恐義從之徒一朝解體還守太原一城之地此爲賊耳何以自全髙祖乃止太宗引師赴霍邑遂平老生也又曰武德中太宗征薛仁果其將宗羅侯來拒大破於淺水原因率左右二十餘􅀐追奔直趣折摭以乗之仁果列陣城下太宗據涇水以臨賊賊徒氣沮無敢進戰其􅀐將澤幹等數人臨陣來降請還取馬太宗縱遣之於是各乗良馬須􅁷並至仁果大懼嬰城自守太宗具知賊中虚實將夕大軍繼至四靣合圍因縱辯士諭以禍福仁果遂開門降旣而諸將奉賀因問曰始大王野戰破賊其主尚保堅城王無攻具輕􅀐騰逐不待歩兵徑薄城下咸疑不尅而竟下之何也太宗曰此以權道迫之使其計不暇發以故尅也羅侯恃往前之勝兼復養銳日乆見吾不出意在相輕今喜吾悉出兵來戰吾雖破之擒殺盖少􅀂不急躡還走投城仁果收而撫之則便未可得矣且其兵衆皆隴西人一敗􅀍追不及廻頋散歸隴外則折摭自虚我軍隨而迫之所以懼而降也此乃成筭諸君盡不見耶又曰武后􅀄徐敬業舉兵於江都稱匡復皇家以􅉦厔尉魏思温爲謀主問計於思温對曰明公旣以太后幽縶少主志在於匡復兵貴拙速但冝早度淮北親率大衆直入東都山東將士知公有勤王之舉必以死從此則指日刻期天下必定敬業將從其䇿薛璋又說曰金陵之地王氣巳見冝早應之兼有大江設險足可以自固請且攻取常潤等}
