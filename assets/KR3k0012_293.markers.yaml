  body:
  - {type: variant, offset: 4, length: 5, content: 三用間孫子, SBCK: 四示緩務速示緩戰國䇿}
  - {type: variant, offset: 4, length: 308, content: 三用間孫子曰興師十萬出師千里百姓之費公家之奉日費千金內外騷動不得操事者七十萬家古者八家為鄰一家從軍七家奉之言十萬之師不事不耕者凡七十萬家也相守數年以爭一日之勝是故明王聖主賢君勝將所以動而勝人成功出於眾者先知不可取於神鬼不可禱祈以求不可像於事也不可以事類求不可驗於事度不可以行事度也必取於人知敵之情也因人也故用間有五因間內間反間死間生間五間俱起莫知其道是謂神紀人君之寶也用時任五間也因間者因其鄉人而用之也因敵鄉人知敵表裏虛實之情故就而用之可使伺候內間者因其官人而用之者也因在官失職者若刑戮之子孫與受罰之家也因其有隙就而用之也反間者因其敵間而用之者也敵使間來視我我知之因厚賂重許反使為我間也蕭世諴曰言敵使人來候我佯不知而, WYG: 四}
