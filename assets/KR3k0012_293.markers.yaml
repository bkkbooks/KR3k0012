  - {type: variant, offset: 2016, length: 57, content: 單于終非能居之也且漢王亦有神單于察之冒頓乃解圍之一角於是高帝令士皆持滿傅矢外鄉從解角直出竟與大軍合而冒頓遂引兵而去, WYG: 畱乎}
  - {type: punctuation, offset: 2024, content: 。, id: KR3k0012_CHANT_293-bkkpn460}
  - {type: 'tls:seg', offset: 2024, content: '', id: KR3k0012_CHANT_293-9a.17}
  - {type: variant, offset: 2024, length: 356, content: 且漢王亦有神單于察之冒頓乃解圍之一角於是高帝令士皆持滿傅矢外鄉從解角直出竟與大軍合而冒頓遂引兵而去又曰高祖紀曰上問狶將皆故賈人也上曰吾知所以與之乃以金啗將狶將多降者陳狶也後漢書曰西域將兵長史班超發于闐諸國兵擊莎車龜茲國揚言兵少不敵罷散乃陰緩生口歸以告龜茲王喜而不虞超即潛勒兵馳莎車營大破降之斯亦同死間之勢晉書曰益州牧羅尚遣將隗伯攻蜀賊李雄於郫城牙有勝負雄乃募武都人朴泰鞭之見血使譎羅尚欲為內應以火為期尚信之悉出精兵遣隗伯等率兵從泰擊雄雄將李驤於道設伏泰以長梯倚城而舉火伯軍見火起皆爭緣梯泰又以繩汲上尚軍伯餘人皆斬之雄因放兵內外擊之大破尚軍此用內間之勢又曰劉曜逼長安復圍北城太守麴昌遣使求救於麴允允率步騎赴之去城數十里賊繞城放火煙塵蔽天反縱間詐允曰郡城已陷焚燒向盡軍無及矣允信之眾懼而潰後數日麴昌突圍赴長安北城遂陷, SBCK: ''}
