  - {type: variant, offset: 2813, length: 195, content: 告周文又曰高齊斛律光字明月為當時名將後周將韋孝寬守玉壁今絳郡禝山縣忌光英勇孝寬參軍曲嚴頗知卜筮謂孝寬曰來年齊朝必大相殺戮孝寬因令嚴作謠言令間諜漏其文於鄴曰百升飛上天明月照長安又曰高山不推自崩槲樹不扶自堅祖珽因續之曰盲老公上下斧饒舌老母不得語令小兒歌之於路穆提婆聞之以告其母陸令萱令萱以饒舌斥己也陸令萱即後主乳母盲老公謂祖珽也遂相與恊謀以謠言啟後主誅光周武帝聞之遂大赦境內始有滅齊之志竟平其國, SBCK: 徇城中懾伏}
