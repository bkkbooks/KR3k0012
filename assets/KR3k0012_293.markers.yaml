  - {type: variant, offset: 313, length: 726, content: 以虛事前却期會使師相語是故曰反間也死間者為誑事於外令吾間知之而待於敵也作詐狂之事於外佯漏泄之使吾間知之吾間至敵中為敵所得必以誑事諭敵從而備之吾所行不然問則死矣又一云敵間來間以我誑事而持歸然皆非所圖也二間皆不能知幽隱深密故曰死間也蕭世諴云所獲敵人及己軍土有重罪繫者故為免相勑勿泄佯不祕密令敵間竊聞之吾因縱之亡亡必歸敵必信焉往必死故曰死間也生間者反報者也擇己有賢才智謀能自開通於敵之親貴察其動靜知其事計彼所為已知其實還報故曰生間也故三軍之親莫親於間若不親撫重以祿賞則反為敵用泄吾情實也賞莫厚於間厚賞之賴其用事莫密於間間事不密則為己害非聖智不能用間非仁義不能使間不能得間人之用也非微密者不能得間之實精微用意密不泄漏微哉微哉無所不用間也間事未發而先聞其間者與所告者皆死凡軍之所欲擊所欲擊之軍城之所欲攻所欲攻之城人之所欲殺所欲殺之人必先知其守將左右謁者舍人之姓名守有官職任者謁告也主告事者也門者守門者也舍人守舍之人也又先知之為親舊有急即呼之則不見何止亦因以知敵之情令吾間必索知之敵間之來間我者因而利之導而舍之舍居止也今吾人遺以重利復遇而舍止之可令詭其辭故反間可得而用也故能取敵之間而用因是而知之故鄉間內間可得而使也因反敵間而知敵情鄉間內間者皆可得使也因是而知之故死間為誑事可使告敵因是可得而攻也因誑事而知敵情生間往反可使知其敵之腹心所在因是而知之故生間可使如期五間之事主必知之人主當知五間之用厚其祿豐其財知之必在於反間故反間不可不厚也反間者五間之本事之要也故當在厚待之殷之興也伊摯在夏伊尹周之興也呂牙在殷呂望故唯明主賢將能以上智為間者必成大功此兵之要三軍所恃而動者也已上注出通典左傳曰楚師伐宋九月不服將去宋楚大夫申叔時曰築室反耕者宋必聽命楚子從之築室於宋分兵於田, WYG: 緩務速}
