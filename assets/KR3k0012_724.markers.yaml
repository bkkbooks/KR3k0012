  - {type: variant, offset: 1367, length: 3, content: 無恙循, SBCK: 起死人矣又曰用藥者得良藥則活人得惡藥則殺人楚辭九章曰九折臂而成醫兮吾今而知其信然神仙傳曰李少君與議郎董仲舒相親見仲舒宿有固疾體枯氣少少君乃與其成藥二劑并方用戊已之草后土胎黄良獸沉肪先義之根百卉華釀亥月上旬合煎銅鼎中童男沐浴潔淨調其湯火合藥成服如雞子三劑齒落更生服盡五劑命不復傾又曰鳳綱者漁陽人也常採百藥華以水漬封泥之自正月始盡五月末埋之百日煎丸之卒死者以此藥内口中皆立生綱服此藥得數百歲不老又曰士爕爲交州刺史得毒病死經三日董奉時在南方乃往以三丸藥内死人口中以寒水含之令人舉死人頭揺逍之食頃士爕開目動手足半日能起坐遂活活後四日能語云死時奄然有數十馬卒收之將載輅車上去}
