  - {type: variant, offset: 2028, length: 501, content: 習之遂為良醫至濮陽太守父雄員外散騎侍郎代傳其術號為神明而之才幼而俊發尤為精敏仕梁為豫章王綜鎮東右常侍隨綜鎮彭城綜降魏之才走至呂梁為魏所獲既羈旅以醫自業又諧隱滑稽無方王公貴人爭饋之為貴人居矣稍遷員外散騎常侍加中軍金紫天平中高祖詣晉陽恒居內館所療十全皇建中除兗州剌史未行武明皇太后不豫之才奉藥立愈賞賜巨萬有人腳跟腫痛不堪忍諸醫莫識之才視曰蛤精也當乘舡入海出腳水中得之疾者曰是也之才為割得雨蛤子大如榆莢或以五色骨為佩刀靶之才曰此人瘤也何從得之對曰於古冢見髑髏額骨長數寸試削視文理故用之其通識類此武成酒色過度恍惚不恒曾病發自言初見空中有五色物稍近變成一美婦人去地數丈亭而立之才曰此色慾過多大虛所致即進藥一服稍稍遠變成五色物數服而愈病發輒馳召之針藥所加無不愈者齻音積武成王生齪牙遍召諸醫尚藥典御鄧宣文以實對帝怒而抶之之才拜賀曰此謂智牙生則聖明而壽帝大悅賜帛萬疋加金玉重寶又曰張遠遊齊人以醫藥道術知名尋有詔徵令與術士同合九轉金丹成顯祖置之玉匣曰我貪人間樂不能飛上天待我臨死方可服之後周書曰姚僧坦字法衛吳興武康人也父菩提梁高平令嘗嬰疾歷年乃留心醫藥梁武帝性又好之每召菩提討論方術言多會意由是頗禮之僧坦幼通洽居喪盡禮年, WYG: 七百}
