  - {type: variant, offset: 1014, length: 206, content: 元起欲工素問訪以砭石僧孺荅曰古人當以石為針必不用鐵說文有此砭字許慎雲以石剌病也東山經高氏之山多針石郭璞云可以為砭針春秋美疹不如惡石服子慎注云石砭石也季世無復佳石故以鐵代也後魏書曰王顯字世榮陽平人也頗參士流雖以醫術自達而明敏有決斷才用初聞昭懷后之懷世宗也夢為日所逐化龍而遶后后寤而驚悸遂成心疾勑召諸醫診脈徐謇云是微風入藏宜進湯藥顯云案三部脈非有心疾將是懷孕生男之象後果如顯言乃補御史常在御營進藥出入禁內世宗詔顯撰藥, SBCK: ''}
