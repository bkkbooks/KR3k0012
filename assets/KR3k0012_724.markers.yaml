  - {type: variant, offset: 2532, length: 2048, content: 即傳家業梁武帝召入禁中面加討試僧坦酬對無滯梁武甚奇之時武陵王所生葛脩華宿患積時方術莫効帝令僧坦視之僧坦還說其狀武帝歎曰卿用意綿密乃至於此以此候疾何疾可逃朕每留情頗識治體今聞卿說益開人意十一年帝因發熱欲服大黃僧坦曰大黃乃是快藥然至尊年高不宜輕用帝弗從遂至危篤梁元帝嘗有心腸疾諸醫咸謂宜用平藥可漸宣通僧坦曰脈洪而實此有宿妨非用大黃必無差理帝從而愈及大軍克荊州為燕公于謹所召大相禮接太祖遣使馳驛徵僧坦謹固留不遣謂使人曰吾年時衰暮疢疾嬰沉今得此人望與之偕老太祖以謹勳隆重乃止明年隨至長安伊婁穆以疾還京請僧坦省疾自云自腰至臍似有三縛兩腳緩縱不復自持坦即為診脈處湯三劑穆初服一劑上縛解再服中縛解又服三縛悉除而兩腳疼痺猶自攣弱更為合散稍得屈伸至九月遂能起行大將軍襄樂公賀蘭隆先冇有氣疾加以水腫喘息奔急唑臥不安或有勸其服決命大散者其家疑未能決乃問僧坦僧坦曰意謂此患不與大散相當若欲自服不煩賜問因而委去其子殷勤拜請曰多時仰屈今日始來竟不下治意實未盡僧坦知其可羗即為處方諸患悉愈大將軍樂平公竇集暴感風疾精神瞀亂無所覺知諸醫先視者皆云已不可救僧坦後至曰困矣終當不死若專以見付相為治之其家欣然僧坦為合湯散所患即瘳大將軍永世公叱伏列椿苦痢積時而不廢朝謁燕公于謹嘗問僧坦曰樂平永世俱有痼疾若如僕意永世羗輕對曰夫患有深淺時有克殺樂平雖困終當保全永世雖輕必不免死謹曰君言必死當在何時對曰不出四月果如其言謹歎異之文宣太后寢疾醫巫雜說各有同異高祖引僧坦問曰太后患勢不輕諸醫並云無慮朕人子之情可以意得君臣之義言在無隱公以為何如對曰臣無聽聲視色之妙特以經事已多唯之常人竊已憂懼帝泣曰公既決之矣知復何言尋而太后崩四年高祖親戎東討至河陰遇疾口不能言臉垂覆目不得視一足短縮又不得行僧坦以為諸藏俱病不可並治軍中之事莫先於語乃處方進藥帝遂得言又治目目疾便愈未及治足疾亦瘳比至華州帝已痊復是歲高祖幸雲陽遂寢疾乃召僧坦赴行在所內史柳昂私問曰至尊貶膳日久脈候何如對曰天子上應天心或當非愚所及若凡庶如此萬無一全尋而帝崩宣帝初在東宮嘗若心痛乃令僧坦治之其疾即愈及即位恩禮彌隆大象二年除太醫下大夫帝尋有疾僧坦宿直侍疾帝謂隋公曰今日性命唯委此人僧坦診候知帝危殆乃對曰臣荷恩既重思在効力但恐庸短不逮敢不盡心帝領之及靜帝嗣位遷上開府儀同大將軍隋開皇初卒僧坦撰集驗方十二卷行紀三卷行於世隋書曰許智藏高陽人也祖道幼嘗以母疾覽醫方因而究拯世號名醫誡其諸子曰為人子者嘗膳視藥不知方術豈謂孝乎由是世相傳授仕梁官至員外散騎侍郎父景武竟陵王諮議參軍智藏少以醫術自達仕陳為散騎常侍及陳滅高祖以為員外散騎侍郎使詣楊州會秦孝王俊有疾上馳召之俊夜中夢其妃崔氏泣曰本來相迎如許智藏將至其人若到當必相苦為之奈何明夜俊又夢崔氏曰妾得計矣當入靈府中以避之及智藏至為俊診脈曰疾已入心即當發癇不可救也果如言俊數日而薨上奇其妙齎物百段煬帝即位智藏時致仁于家帝每有所苦輒令中使就詢訪或以轝迎入殿扶登御床智藏為方奏之用無不効唐書曰甄權許州扶溝人也嘗以母疾與弟立言專醫方得其旨趣隋開皇初為祕書省正字後稱疾免隋魯州剌史庫狄嶔若風患手不得引弓諸醫莫能療權謂之曰欽但將弓箭向垛一針可以射矣針其肩偶一穴應時射貞觀十七年權年一百三歲太宗幸其家視其飲食訪以藥性因授朝散大夫賜几杖衣服其年卒撰脈經針方明堂人形圖各一卷弟立言武德中累遷太常丞御史大夫杜淹患風毒發腫太宗令立言視之既而奏曰從今更十一日午時必死果如其言時有尼明律年六十餘患心腹鼓脹身體羸瘦已經二年立言診其脈曰腹內有蟲當是誤食髮為之耳因令服雄黃須臾吐一虵如人手小指唯無眼燒之猶有髮氣其疾乃愈又曰許裔宗常州義興人也初仕陳為新蔡王外兵參軍時柳太后感風不能言名醫療皆不愈脈益沉而噤裔宗曰口不可下藥宜以湯氣薰之令藥入腠理周時可差乃造黃耆防風湯數十斛置於床下氣如煙霧其夜便得語武德初關中多骨蒸病得之必死遞相連染諸醫無能療者裔宗每療無不愈或謂曰公醫術若神何不著書以貽將來裔宗曰醫乃意也在人思慮又脈候幽微若其難別意之所解口莫能宣且古之名手唯是別脈脈既精別然後識病夫病之於藥有正相當者唯須單用一味直攻彼病藥力既純病即立愈今人不能別脈莫識病源以情臆度多安藥味譬之於獵未知兔所多發人馬空地遮圍或冀一人偶然逢也如此療疾不亦踈乎假令一藥偶然當病復共他味相和君臣相制氣勢不行所以難羗諒由於此脈之深趣既不可言虛設經方豈加於舊吾思之久矣故不能著述耳年七十餘卒又曰秦鳴鶴為侍醫高宗苦風眩頭重目不能視武后亦幸災異逞其志至是疾甚召鳴鶴張文仲診之鳴鶴曰風毒上攻若剌頭出少血即愈矣天后自簾中怒曰此可斬也天子頭上豈是試出血處耶上曰醫之議病理不加罪且吾頭重悶殆不能忍出血未必不佳命剌之鳴鶴剌百會及腦戶出血上曰吾眼明也言未畢后自簾中頂禮拜謝之曰此天賜我師也躬負繒寶以遺鳴鶴又曰安金藏為太常工人時睿宗為皇嗣或有誣告皇嗣潛有異謀者則天令來俊臣按之左右不勝楚毒皆欲自誣唯金藏大呼謂俊臣曰公既不信金藏言請剖心以明皇嗣不反即引佩刀自剖其胸五藏並出血流被地氣遂絕則天聞之令舁入宮中遣醫人卻內五藏入以桑白皮縫合之傅藥經宿乃蘇, SBCK: ''}
