  - {type: variant, offset: 1281, length: 1, content: 稱, SBCK: 知名文仲則天初爲侍御醫時特進蘇良嗣於殿庭因拜跪絶倒則天令文仲慈藏隨至宅候之文仲日此因憂憤邪氣激也若痛衝脅則劇難救自朝候之未及食時苦衝脅絞痛文仲曰若入心不可療俄頃心痛不復下藥日旰而卒文仲尢善療風疾其後則天令文仲集當時名醫共撰療風氣諸方仍令麟臺監王方慶監其修撰文仲奏曰風有一百二十種氣有八十種大體醫藥雖同人性各異庸醫不達藥之行使冬夏失節因此殺人唯腳氣頭風上氣常須服藥不絶自餘則隨其發動臨時消息之伹有風氣之人春末夏初及秋暮要得通洩即不困劇於是撰四時常服及輕重大小諸方十八首表上之文仲乆視年終於尚藥奉御􅁧隨身備急方三卷行於代}
