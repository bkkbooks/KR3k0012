  - {type: variant, offset: 247, length: 1, content: 療, SBCK: 愈乃問思邈名醫愈疾其道何如思邈曰吾聞善言天者必質之於人善言人者亦本之於天天有四時五行寒暑迭代其轉運也和而爲雨怒而爲風凝而爲雪霜張而爲虹蜺此天地之常數也人有四肢五藏一覺一寢呼吸吐納精氣往來流而爲榮衛彰而爲氣色發而爲音聲此人之常數也陽用其形陰用其精天人之所同也及其失也蒸則生􅀬否則生寒結而爲瘤贅陷而爲癰疽奔而爲喘乏竭而爲燋枯診發乎面變勲乎形推此}
