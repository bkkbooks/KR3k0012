  - {type: variant, offset: 1332, length: 1, content: 適, SBCK: 知儻醫療失時因致夭撗性命之際寧忘惻隱冝命郡縣長官就廣濟方中逐要者於大板上仵録當村方要路牓示仍委採訪使勾當無令脫錯又曰德宗撰貞元集要廣利方親爲之制序敢題於天下通衢其方惣六千三種五百八十六首莊子曰秦王有病召醫䑛痔者得車五乘也韓子曰醫善吮人腸含人血非有肌骨之親也利之所加也列子曰龍叔謂文摯曰子之術㣲矣吾有疾子能已乎文摯即命龍叔背明而立文摯從向明望之旣而曰嘻吾見子之心矣方寸之地虚矣幾聖人也子心六孔流通一孔不達舊說聖人心七孔今以聖智爲疾者或由此乎矣又曰楊朱之友季梁得疾七日大漸其子請三醫一曰矯氏二曰俞氏三曰廬氏脉其所疾矯氏謂季梁曰汝寒温不節虚實失度疾由飢飽色欲精虚非人非鬼雖漸可攻也季梁曰衆醫也亟屏之俞氏曰汝始則胎氣不足乳湩多貢切有餘病非一朝一夕之故其所由來者漸矣弗可已也季梁曰良醫也且食之盧氏曰汝病不由天亦不由人亦不由鬼稟生受形旣有制之者亦有知之者矣藥石其如汝何季梁曰神醫也重貺遣之俄而季梁病自瘳又曰魯公扈趙齊嬰二人有疾同請扁鵲求治扁鵲治之同愈謂曰汝曩之所疾自外而干腑藏固藥石之所已今有偕生之病與體偕長爲汝攻之何如二人曰願先聞其驗扁鵲謂公扈曰汝志强而氣弱故足於謀而寡於斷齊嬰志弱而氣强故少於慮而傷於專若換汝之心則均於善矣遂飲二人毒酒迷死三日剖胷探心易而置之投以神藥旣寤如初尸子曰有醫音驅主反者秦之良醫也爲宣王割痤音在戈反爲惠王療痔皆愈張子之背腫命治之謂醫曰背非吾背也任子制焉治之遂愈誠善治疾也張子委制焉夫身與國亦}
