  - {type: variant, offset: 1332, length: 1, content: 適, WYG: 知儻醫療失時因致夭横性命之際寕忘惻忍宜命郡縣長官就廣濟方中就要者於大板上件録當村方要路榜示仍委採訪使勾當無令脫錯又曰徳宗撰貞元集要廣利方親為之制序散題於天下通衢其方緫六千三種五百八十六首荘子曰秦王有病召醫䑛痔者得車五乗也韓子曰醫善吮人腸含人血非有肌骨之親也利之所加也列子曰龍叔謂文摯曰子之術善矣吾有疾子能已乎文摯即命龍叔背眀而立文摯從向眀望之既而曰噫吾見子之心矣方寸之地虛矣㡬聖人也子心六孔流通一孔不逹今以聖智為疾者或岀此矣乎又曰楊朱之友季梁得疾七日大漸其子請三醫一曰矯氏二曰俞氏三曰盧氏診其所疾矯氏謂季梁曰汝寒溫不節虛實失度疾由飢飽色欲精虛非人非鬼雖漸可攻也季梁曰衆醫也亟屏之俞氏曰汝始則胎氣不足乳潼有餘病非一朝一夕之故其所有由来者漸矣弗可也已季梁曰良醫也且食之盧氏曰汝病不由天亦不由人亦不由鬼禀生受形既有制之者亦有知之者矣藥石其如汝何季梁曰神醫也重貺遣之俄而季梁病自瘳又曰魯公扈趙齊嬰二人有疾同請扁鵲求治扁鵲治之同愈謂曰汝曩之所疾自外而干腑藏固藥石之所已今有偕生之病與體偕長為汝攻之何如二人曰願先聞其驗扁鵲謂公扈曰汝志強而氣弱故足於謀而寡於㫁齊嬰志弱而氣強故少於慮而傷於專若換汝之心則均善矣遂飲二人毒酒迷死三日剖胸探心易而置之投以神藥既寤如初尸子曰有醫􅀈者秦之良醫也為宣王割痤為恵王療疾皆愈張子之背腫命􅀈治之謂醫􅀈曰背非吾背也任子制焉治之遂愈􅀈誠善治疾也張子委制焉夫身與國亦}
