  - {type: variant, offset: 1327, length: 3, content: 高允微, SBCK: 王方慶太原人也雅有材度愽學多聞篤好經方精於藥性則天令監領尙藥奉御張文仲侍醫李䖍縱光禄韋慈藏等撰諸藥方方慶撰隨身左右白發百中備急方十卷大行於代又曰天寶中詔曰朕頃者所撰廣濟方救人疾患頒行巳乆傳習亦多猶慮單貧之家未能繕寫閭閻之内或}
