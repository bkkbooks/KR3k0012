  - {type: variant, offset: 286, length: 164, content: 石者五升病即差後沈僧翼患眼痛又多見鬼物以問嗣伯嗣伯曰邪氣入肝可覔死人枕煮服之服竟可埋枕於故處如其言又愈王晏問之曰三病不同而皆用死人枕而俱羗何也荅曰尸注者鬼氣伏而未起故令人沉滯得死人枕促之魂氣飛越不得復附體故尸注可差石蚘者久蚘也醫療既僻蚘蟲轉堅世間藥不能遣所以須鬼物驅之然後可散故令煮死人枕也夫邪氣入肝故使眼痛而見魍魎應須邪物以鉤, SBCK: ''}
