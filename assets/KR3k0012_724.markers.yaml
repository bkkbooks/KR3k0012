  - {type: variant, offset: 1365, length: 0, content: '', krp: 醫日居處飲食何如子曰丘春之居葛籠夏居密陽秋不風冬不煬飲食不饋飲酒不勸醫曰是良藥也鶡冠于曰扁鵲兄弟三人並善醫魏文侯問曰子昆弟三人孰最善對曰長兄視色故名不出家仲兄視亳毛故名不出門鵲鍼人血脉投人毒藥故名聞諸侯吕氏春秋曰齊王疾使人之宋迎文摯文摯至視王疾謂太子曰非怒則王疾不可治怒王則文摯死太子曰苟已王疾臣與母以死爭之願先生勿患也文摯曰諾與太子期而將往不當者三齊王固巳怒文摯至不解履登牀履王衣問疾王怒不與言摯因出固辭以重怒王王吐而起疾乃遂已王不恱果以鼎生烹摯太子與母合爭之不得夫忠於平世易忠於濁世難也又曰魯有公孫綽者}
  - {type: variant, offset: 1366, length: 0, content: '', SBCK: 人曰我能治偏枯今吾倍爲偏枯之藥則可}
