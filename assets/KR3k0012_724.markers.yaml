  - {type: variant, offset: 1908, length: 429, content: 又曰崔季舒字叔正博陵安平人少孤明敏有識幹精於醫術經方本草常所披覽天保中於徙所無事更銳意研精後雖位望顯貴亦不懈怠張太素齊書曰徐之才字士茂高平金鄉人五葉祖仲融隱於秦望山有道士過之求飲因留瓠蘆遺之曰習此子孫當以道術救世位至二千石開視乃扁鵲鏡經一卷習之遂為良醫至濮陽太守父雄員外散騎侍郎代傳其術號為神明而之才幼而俊發尤為精敏仕梁為豫章王綜鎮東右常侍隨綜鎮彭城綜降魏之才走至呂梁為魏所獲既羈旅以醫自業又諧隱滑稽無方王公貴人爭饋之為貴人居矣稍遷員外散騎常侍加中軍金紫天平中高祖詣晉陽恒居內館所療十全皇建中除兗州剌史未行武明皇太后不豫之才奉藥立愈賞賜巨萬有人腳跟腫痛不堪忍諸醫莫識之才視曰蛤精也當乘舡入海出腳水中得之疾者曰是也之才為割得雨蛤子大如榆莢或以五色骨為佩刀靶之才曰此人瘤也何從得之對曰於古冢見髑髏額骨長數寸試削視文理故用之其通識類此武成酒色過度恍惚不恒曾病發自言初見空中有五色物稍近變成一美婦人去地數丈亭而立之才曰此色慾過多大虛所致即進藥一服稍稍遠變成五色物數服, SBCK: ''}
