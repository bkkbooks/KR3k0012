  - {type: variant, offset: 119, length: 125, content: 諫者撾之又盡水五斛伯玉始能動而見背上彭彭有氣俄而起唑曰熱不可忍乞冷飲嗣伯以水與之一飲一升病都差自爾恒發熱冬月猶單衣體更肥壯又嘗有傴人患滯冷積年不差嗣伯為診之曰此尸注也當得死人枕煮服之乃愈於是往古冢中取枕枕已一邊腐𡙇服之即差後秣陵人張景年十五腹脹面黃眾, SBCK: 惡疾}
