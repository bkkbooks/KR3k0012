  - {type: variant, offset: 1334, length: 4, content: 不寢臥呼, SBCK: 此必有所委制然後治孔藂子曰宰我使齊皮見夫子曰梁丘據遇虺毒三旬而後瘳朝齊君齊君㑹大夫衆賔而慶焉弟子與在賔列大夫衆賔並復獻攻療之方弟子謂之曰夫所獻方者將爲病也今梁丘子已瘳矣而諸夫子復驟獻方意欲梁丘大夫後有虺害當用之乎衆座默然無辭弟子此言何如孔子曰女說非也夫三折股而後爲}
