  - {type: variant, offset: 886, length: 127, content: 神農本草經三卷為七卷撰真誥十卷集驗方五卷廣肘後為百一之製世所行用多獲異効焉又曰范雲疾召醫徐文伯視之文伯曰緩之一月乃復欲速即時愈正恐二年不復可救雲曰朝聞道夕死可矣而況二年文伯乃下火而壯焉重衣以覆之有頃許汗流於此即起二年果卒又曰王僧孺工屬文善楷隸多識古事侍郎, SBCK: 千}
