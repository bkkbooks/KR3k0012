  - {type: variant, offset: 247, length: 1, content: 療, WYG: 愈乃問思邈名醫愈疾其道如何思邈曰吾聞善言天者必質之於人善言人者必本之於天天有四時五行寒暑迭代其轉運也和而為雨怒而為風凝而為雪霜張而為虹霓此天地之常􅂾也人有四肢五藏一覺一寤呼吸吐納精氣徃来流而為榮衛彰而為氣色發而為音聲此人之常􅂾也陽用其形隂用其精天人之同也及有失也蒸則生熱否則産寒結而為瘤贅陥而為癰疽奔而為喘乏竭而為燋枯診發乎面變動乎形推此}
