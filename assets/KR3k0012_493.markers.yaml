  - {type: variant, offset: 461, length: 4, content: 侯參為益, SBCK: 何曽字頴孝陽夏人其家大冨魏明帝時爲文學武帝踐祚累遷爲太􅀓性甚奢豪毎赴宴不食太官所設帝命取其食蒸餅上不拆作十字不食日食萬錢猶云無下筯之處人以小􅁓書者勑記室勿報又曰石崇字季倫累遷荆}
