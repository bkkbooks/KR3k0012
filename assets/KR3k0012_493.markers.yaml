  - {type: variant, offset: 423, length: 6, content: 援平交趾上言, SBCK: 融才髙􅀶洽爲通儒教養諸生常有千數􅃰郡盧植北海鄭􅀇皆其徒也善鼓瑟好吹笛逹生任性不拘儒者之節居宇器服多存侈飾常坐髙堂施綘紗帳前授生徒後列女樂弟子以次相傳鮮有入其室者吴志曰甘寧好遊俠水行則連軒侍從􅀍文錦繡常以繒帛維舟去或割弃之以示奢侈也又曰將軍賀齊性奢好軍事所乗舡彫刻丹鏤青蓋綘䄡蒙衝闘艦望之若山蜀志曰先主定益州以劉琰爲涪陵}
