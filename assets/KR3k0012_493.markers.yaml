  - {type: variant, offset: 38, length: 4, content: 重歛蠶食, SBCK: 有恭德而君納諸大惡無乃不可乎又曰襄公五年齊慶封來聘其車美叔孫曰豹聞之服美不稱必以惡終美車何爲又曰吴師在陳楚大夫皆懼子西曰今聞夫差次有臺榭陂池焉􅀫有妃嬙嬪御焉一日之行所欲必成玩好必從珎異是聚觀樂是務視民如讎而用之日新夫差先自敗也巳安能敗我禮記曰管仲鏤簋而朱􅃶旅樹而反坫山節而藻梲賢大夫而難爲上也得天子之禮論語曰孔子謂季氏八佾舞}
