  - {type: variant, offset: 1973, length: 298, content: 斤濤不欲異眾受之命懸之梁後毅事露案驗眾官吏至濤於梁上得絲已數年塵埃封印如初會稽典錄曰周規字公圖太守唐鳳命為功曹鳳中常侍衡之從兄恃中官專行貪暴規諫曰明府以負薪之才受剖符之任所謂力弱載重不惟顛蹶方今聖治在上不容紕政明府以教人之職行桀紂之暴鳳怒縛規棰於閤內鳳後果以檻車徵虐釋名曰虐熇也凡疾或寒或熱先寒後熱兩疾似熇虐也說文曰虐殘也尚書曰無若丹朱傲虐是作又曰今商王受弗恭上天降災下民沈湎冒色敢行暴虐毛詩北風剌虐也衛國並為威虐百姓不親莫不相攜持而去焉左傳曰隱公問於眾仲曰衛州吁其濟乎對曰臣聞以德和民不聞以亂夫州吁弒其君而虐用其民不務令德而欲以亂成必不免矣又曰莒犁比公生去疾及展輿既立展輿又廢之犁比公虐國人患之, SBCK: 九}
