  - {type: variant, offset: 469, length: 5, content: 豐富者輒誣, SBCK: 别館在河陽之金谷財産盈積室宇宏麗後房百數皆曵綺紈􅁝竹之妙皆盡一時之選與貴戚惠帝舅王愷奢靡相尚愷}
  - {type: page-break, offset: 469, content: '', id: KR3k0012_SBCK_493-4b}
  - {type: variant, offset: 469, length: 0, content: '', WYG: 别館在河陽之金谷財産盈積室宇宏麗後房百數皆曵綺紈絲竹之妙皆盡一時之選與貴戚惠帝舅王愷奢靡相尚愷以􅏁澳釡崇以蠟代薪愷作紫絲歩障四十里崇作錦歩障五十里愷以赤石脂塗屋崇以椒塗之武帝助愷珊瑚樹一株髙二尺愷以示崇崇以鐡如意擊破愷不恱崇曰無恨令取六七株還之惠帝知富無以誇之時外國進火浣布天下更無帝為衫來幸崇家崇奴僕五十人皆衣火浣布衫祗承帝大慙崇厠屋内置侍婢衣以紈素並以香囊錦袋崇大㑹賔客侍中劉實徃厠見厠内燦爛便出謂崇曰幾悮入公室矣崇曰厠也實更徃見侍婢所逼便㢠廻後趙王倫誅崇兄弟妻子無少長悉皆遇害初崇家稻米屬地化為螺人以為族㓕之應也又曰和嶠字長輿汝南西平人中郎將庾凱見嶠嘆曰森森若千丈松雖磥砢多節目施之大厦有棟梁之用武帝重之為黄門侍郎嶠家産}
