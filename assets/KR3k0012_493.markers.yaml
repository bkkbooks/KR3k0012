  - {type: variant, offset: 461, length: 4, content: 侯參為益, krp: 何曽字頴孝陽夏人其家大冨魏明帝時爲文學武帝踐祚累遷爲太傳性甚奢豪毎赴宴不食太官所設帝命取其食蒸餅上不拆作十字不食日食萬錢猶云無下筯之處人以小𥿄書者勑記室勿報又曰石崇字季倫累遷荆}
  - {type: variant, offset: 464, length: 1, content: 益, WYG: 文學武帝踐祚累遷為太傅性甚奢豪每赴宴不食大官所設帝命取其食蒸餅上不拆作十字不食日食萬錢猶云無下筯之處人以小紙書者勑記室勿報又曰石崇字季倫累遷荆}
