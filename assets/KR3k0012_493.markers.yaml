  - {type: variant, offset: 411, length: 6, content: 穰苴弗能過也, SBCK: 行大將軍事害太尉李固及内外忠臣皆兾爲之於是權震中外四方調發歳計先輸於兾然後入國吏人輸金懷璧求官請罪者道路相望兾又遣客出塞外國大壯棟宇加以丹􅃮圖以雲氣仙靈臺榭交通相望駭雞犀夜光璧充實帑藏鳴馳龍馬秣於内廐兾將妻孫氏乗輦青蓋車張羽葆飾以金玉琥珀每遊觀池亭及弟内多從倡優鳴鍾皷吹竽酣樂竟路日夜相繼及桓帝誅兾收其貲産以實國庫詔減天下一歳租稅之半又曰桓帝時誅梁兾封單超徐璜具瑗左悺唐衡五人超薨後四侯轉撗天下爲之語曰左廻天具獨坐徐卧虎唐兩墮皆競起第宅樓觀壯麗窮極技巧金銀􅄢毦施於犬馬取良民羙女以爲妃妾皆珍飾華侈擬則宫人其僕從皆乗車而從列􅀐}
