  - {type: variant, offset: 2272, length: 352, content: 一月展輿因國人以攻莒子殺之乃自立又曰楚公子圍殺大司馬蒍掩而取其室申無宇曰王子必不免善人國之主也王子相楚國將善是封植而虐之是禍國也又曰莒子展輿虐而好劍茍鑄劍必試諸人又曰楚使椒舉如晉求諸侯晉侯欲勿許司馬侯曰不可楚王方侈天其或者欲盈其心以厚其毒而降之罰未可知也其使能終亦未可知也若歸於德吾猶將事之況諸侯乎若適淫虐楚將棄之吾又誰與爭論語曰慢令致期謂之虐戰國策曰宋康王為無頭之冠以示勇剖傴者之背鑽朝涉之脛國人大駭齊聞而伐之史記曰白起一日坑趙降卒四十二萬又曰呂后斷戚夫人手足居廁中命曰人彘召惠帝觀之孝惠問乃知大呼哭因病歲餘不能起使人謂太后曰此非人所為臣為太后子終不能治天下以此日飲為淫樂不聽政又曰懷王諸老將皆曰項羽為人慓悍禍虐嘗攻襄城襄城無噍類如淳曰噍音作笑反所過無不殘滅漢書曰江都建遊章臺宮人乘小舡以足蹈覆舡四人溺, SBCK: ''}
