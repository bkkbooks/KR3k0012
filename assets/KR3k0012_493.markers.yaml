  - {type: variant, offset: 405, length: 4, content: 色然用兵, SBCK: 車馬衣服其自奉養極鮮明而金銀錦繡之物及遷徙去處所載不過囊衣不畜餘財家居亦布衣􅂼食天下服其廉而恠其奢故傳能作黄金又曰哀帝幸舎人董賢寵之累遷爲太尉前後所賜不可勝計哀帝崩群臣白太后収賢斬之時年二十二其家奢侈過於國耳於是乃收董氏財物估價凢四十二億萬貫皆帝所賜之物後漢書曰梁兾爲大}
