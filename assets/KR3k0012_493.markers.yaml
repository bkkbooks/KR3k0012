  - {type: variant, offset: 2625, length: 1984, content: 人死後遊雷陂大風建使郎二人乘小舡入陂舡覆兩郎溺舡乍見乍沒建臨觀大笑宮人有過輒令倮擊鼓居樹上久者三十日乃衣或髡鉗以鈆杵舂不中程輒縱狼嚙殺之專為淫虐又曰周由武帝即位吏治尚脩謹然由居二千石中最為暴虐驕恣所愛者撓法活之所憎者曲法滅之又曰翟義起兵王莽發義父方進及先祖塚燒其棺槨夷滅三族及種嗣至皆同坑以棘五毒并葬之又曰翟義黨王孫慶至莽使太醫尚方與巧屠共刳剝之量度五臟以竹筳導脈知所終始云可治病魏略曰高陽劉類歷位宰守苛虐尤甚為弘農太守吏二百餘人不與休假專使為不急事過無輕重輒椊其頭亂杖撾之牽出復入也吳志曰孫皓愛妾或使人至市賤奪百姓財物司市中郎將陳聲素皓幸臣也恃皓寵遇繩之以法妾以愬之皓大怒假它事燒鋸斷聲頭投身於四望山又曰初孫皓每宴會群臣無不咸令沈醉置黃門郎十人侍立為伺過之吏客罷奏其闕失大者即加刑小者緝為罪激水入宮宮人不合意者輒殺流之或剝人之面或鑿人之眼江表傳曰孫皓用巫史之言謂建業宮不利乃西巡武昌乃有遷都之意恐群臣不從乃大會將吏問王蕃射不主皮為力不同科其義云蕃思惟未荅即於殿上斬蕃出登袁山使親近將蕃首作虎跳狼爭咋嚙之頭皆碎壞欲以示威使眾不敢犯王隱晉書曰荀晞字道將領兗州牧暴虐殺人流血號曰屠伯人皆怖悚流入他州其弟純領青州刑殺尤甚於晞百姓號小荀酷於大荀也又曰劉淵殘虐所在城邑無不傾敗流離死散殆無孑遺漢晉春秋曰初甄后之誅由郭后之寵及殯令被髮覆面以糠塞口遂立郭后使養明帝帝知之心常懷念數泣問甄后死狀郭后曰先帝自殺何以請問我且汝為人子可追讎死父為前母枉殺後兒耶明帝怒遂逼殺之勑殯者如甄后故事晉中興書曰符健凶淫暴虐露刃張弓椎鉗鋸鑿殺人之具備左右又曰石虎有所平克不復料其善惡或盡坑斬使無孑遺宋書曰竟陵王誕據廣陵反及城陷士庶皆裸身鞭面然後加刑藂所殺人首於石頭南岸謂之髑髏山又曰宋越御眾嚴酷好行刑誅睚眥之間動用軍法時王玄謨御下亦少恩將士為之語曰寧作五年徒不逐王玄謨玄謨尚可宋越殺我又曰奚顯度者東海郯人也官至員外散騎郎世祖常使主領人而苛虐無道動加捶撲暑雨雪寒不聽蹔休人不堪命或有自經死者人役間配顯度加就刑戮又曰文帝元嘉起居注曰汝陽太守王道摽下縣作木人二枚高八尺豎著郡門有犯事者使拳擊木人令倒倒者免罪力弱者手拳傷剝齊書曰江謐字合和濟陽考城人也為長沙內史行湘州事政治苛刻僧道人與謐情款隨蒞部犯小事餓擊獄裂二衣食之後魏書曰汝南王悅孝昌中除司州牧為大剉碓置於州門盜者斬其手姦偷畏之慚息隋書魚贊性暴虐令部下炙肉少不中意以籤盲其目有溫酒不適者斷其舌又曰崔恒度性嚴酷時有屈突蓋為武侯驃騎亦嚴刻長安為之語曰寧飲三升醋不見崔恒度寧茹三升艾不逢屈突蓋唐書曰索元禮為遊擊將軍尋以酷毒轉甚則天收人望而殺之天下之人謂之來索言酷毒之極又曰韓滉在浙右也政令明察末年傷於嚴急巡內有犯令誅及鄰伍死者數百人又俾推覆官分察情涉疑似必寘極法雖令行禁止而冤濫相尋議者以滉幼立貞廉晚途苛慘身未達則飾情以進得其志則本質遂彰又曰竇軌每臨戎對寇經旬月身不解甲其部眾無貴賤少長不恭命即立斬鞭吏士流血滿庭初入蜀將其甥以為心腹常夜出呼之不以時至怒而斬之誡家僮不得出嘗遣奴就官廚取漿而悔之謂奴曰我誠使汝借汝頭以明法耳遣收奴斬之奴稱冤監刑者猶豫未決軌怒俱斬之梁冀別傳曰冀為河南尹居職恣暴多為非法遼東太守侯猛初拜不謁冀託以它事乃腰斬之郎中汝南袁著年十九見冀凶縱不勝其憤乃詣闕上書冀聞而密遣掩捕得笞殺之董卓別傳曰卓知所為不得遠近意欲以力服之遣兵到陽城時適二月社民皆各在其社下祈祀悉就斷頭駕其家車牛載其婦女財物以斷頭繫車轅云大獲賊文子曰令採萬民之力反為殘賊是為虎翼何為不除孫卿子曰不教而責成功虐也韓子曰梁車為鄴令其婦往見之暮而門閉因踰郭而入車刖其足趙成侯以為不慈奪之璽而免令會稽典錄曰吳王使王孫雄謂范蠡曰子先人有言曰無助天為虐助天虐者不祥今吾稻蟹無遺種子將助天為虐不忘其不祥乎吳越春秋曰子胥諫吳王怒子胥伏劍而死王乃取子胥尸盛以鴟夷投之于江斷其頭置百尺之上謂曰日月炙汝肉熛風飄汝眼炎火燒汝骨盡成灰土何有所見涼州記曰郭黁奴昆切略地之際王孫八人年幼悉隨乳母先在東苑黁遂盡投王孫於鋒刃之上或枝分節解飲血盟眾覩者無不掩目寒心而黁意氣脩然趙書曰汲桑清河貝丘人六月盛暑而桑重裘累茵使十餘人扇之悉不清涼斬扇者時軍中為之謠曰士為將軍何可羞六月重茵被狐裘不識寒暑斷人頭鄧析書曰栗陸氏殺東里子宿沙君戮箕文桀誅龍逢紂刳比干此四者常彎弓露刃以見朝臣鉗錘鋸鑿所可為害之具備置左右即位未幾后公卿已下至于僕隸殺五百餘人崔鴻前秦錄曰左光祿大夫強平諫符生曰元正盛旦日有蝕之正陽神昏風災水旱於時未息此皆由陛下不免強於政治乖和氣所致也生怒以為妖言鑿其頂而殺之崔鴻夏錄曰赫連勃勃徵隱士京兆韋思思至而恭懼逭禍勃怒曰吾以國士徵汝汝柰何以非類處吾汝昔不拜姚興何獨拜我我今未死汝猶不以我為帝王吾死之後汝輩弄筆當置我何處遂殺之又曰赫連勃勃凶殘好殺常居城上置矛劍於側有所嫌忿手自戮之群臣忤視者毀目笑者決脣諫者截其舌而斬之, SBCK: ''}
