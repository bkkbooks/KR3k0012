  - {type: variant, offset: 565, length: 7, content: 丁斐字文侯初隨, SBCK: 任愷􅀄何邵以公子奢侈毎食必盡四方珎饌愷乃踰之一食萬錢猶云無可下筯處又曰石崇財産豐積室宇宏麗後房百數皆曵紈繡珥金翠􅁝竹盡當時之選庖厨窮水陸之珍又曰何劭驕奢簡貴亦有父風衣裘服翫新故巨積食必盡四方珎異一日之供以錢二萬爲限時論以爲太官御膳無以加之又曰羊稚舒冬月釀令人抱甕須􅁷復易人酒速成而味好又曰愷失政遂縱酒極滋味􅀄何邵一身一日任之供必錢二萬爲限及愷有踰於邵宋書曰徐湛之善於尺牘音辭流暢貴戚豪家産業甚厚室宇園池貴遊莫及􅇊樂之妙冠絶一時門生千餘人皆三吴冨人之子姿質端妍衣服鮮麗毎出入行遊塗巷盈滿􅅺􅀨日悉以後車載之}
