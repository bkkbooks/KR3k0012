  - {type: page-break, offset: 1527, content: '', id: KR3k0012_WYG_493-14b, image: WYG0897/WYG0897-0459b.png}
  - {type: variant, offset: 1528, length: 444, content: 寧女才拙性剛藂歛無厭夷甫患之又曰王含為廬江含字處恒征東將軍敦之兄貪濁狼籍王敦欲護其兄故於眾中稱家兄在郡廬江人咸稱之時何充為主簿在坐正色曰充廬江人所聞異於此敦默然傍人為之反側充晏然神意自若魯國先賢志東門奐歷吳郡濟陰太守所在貪濁謠曰東門奐取吳半吳不足濟陰續華陽國志曰李盛為太守貪財重賦國人詈之曰盧鵲何諠諠有吏來在門披衣出門應府縣欲得錢語窮乞請期吏怒反見尤南州異物志曰俚人不愛骨肉而貪寶貨見賈人財物牛犢便以子易之襄陽耆舊記曰羅尚貪而不斷付任失所故遂至大敗蜀人不堪其徵求數萬人共連名詣太傅東海王言之曰尚之所愛非邪則佞尚之所憎非忠則直富擬魯衛家成市鄽貪如虎狼無復已極又曰黃穆字伯開博學養門徒為山陽太守有德政致甘露白兔神雀白鳩之瑞弟奐字仲開為武陵太守貪穢無行武陵人謌曰天有冬夏人有兩黃言不同也桓譚新論曰鄙人有得脠音羶生肉醬也醬而美之及飲惡與人共食即小唾其中而共者因涕其醬遂棄而俱不得食焉彼王公利欲取天下時乃樂與人分之及已得而重愛不肯予是皆唾脠之類竹林七賢論曰鬲令袁毅為政貪濁饋遺朝廷以營虛譽嘗遺山濤絲, SBCK: 平御覽卷第四}
