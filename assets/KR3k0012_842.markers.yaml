  - {type: variant, offset: 2387, length: 224, content: 必生者熟挼令有光使煖氣徹豆心先一日不食以冷水頓服三升服訖其魚肉菜果酒醬鹹酢甘苦之物一不得復經口渴則飲水慎不可煖飲初小困極數十日後體力更壯健不復思食大較法服三升為劑亦當隨人先食多少增損之歲豊欲還食者煮葵子及脂蘇肥肉羹漸漸飲之須豆下乃可食豆未卞盡而食實物腸塞則殺人此未試於理或可爾又曰人食豆三斗則身重行止動難恒食小豆令人肌燥麤理本草經曰大豆黃卷味甘平生平澤治濕痺筋攣膝痛生大豆張騫使外國得胡麻豆或曰戎菽塗擁腫煮汁飲之殺鬼毒止痛赤小豆下水排癰腫血生太山吳, SBCK: 名呉}
