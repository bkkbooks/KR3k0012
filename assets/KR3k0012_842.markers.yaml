  - {type: variant, offset: 582, length: 186, content: 世祖自薊東南至饒陽無蔞亭馮異獻豆粥一又曰馮異破延地百姓飢餓人相食黃金一斤易豆五斗道路斷隔委輸不至軍士悉以果實為糧又曰獻帝在長安穀貴豆一斛二十餘萬又曰汝南有舊鴻郄陂成帝時丞相翟方進毀之時人歌曰敗我陂者翟子威飴我大豆烹我芋魁方進字子威芋魁芋根也漢名臣奏曰丞相薛宣曰陛下八月酎祠嘉美上昇皇天報應茂陵寢廟上食日玄鳥來至集吐所含大豆紫黑色食物之象也蜀志曰彭羨與諸葛亮書先民有言左手據, SBCK: 承宫遭}
