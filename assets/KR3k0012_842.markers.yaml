  - {type: variant, offset: 1488, length: 162, content: 何為也對曰君之德及後宮與臺榭君之玩物衣以文繡君之鳧鴈食以菽粟君之營內自樂延及後宮之族何謂其仁德也頃臣願有請於君之意自樂之心推而與百姓同之則何殣之有君不推此而茍營內好私使財貨偏有所聚菽粟幣帛腐於囷府惠不遍加于百姓公心不周乎萬國則桀紂之所以亡也夫士民之所以叛由偏之也君如察臣嬰之言推君之盛德公布之於天下則湯武可為也一殣何足恤哉呂, SBCK: 善吕}
