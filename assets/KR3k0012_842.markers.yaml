  - {type: variant, offset: 2966, length: 2, content: 音汾, WYG: 為徒一徒死百乗車車班班入河間河間姹女工數錢以錢為室金為堂石上慊慊舂黄粱下有懸鼔我欲擊之丞相怒城上烏者處髙獨食不與下共謂人主多聚歛也公為吏子為徒者言蠻夷叛逆父既為軍吏子弟又為卒徒往擊之也一徒死百乗車者言前一人徃討既死矣後又遣百乗車往也車班班者言乗輿班班入河間迎靈帝也姹女數錢言帝既立其母永樂太后好聚金錢以為堂室也石上慊慊者言太后雖積金錢猶慊慊常若不足使人舂黄粱而食之也我欲擊之者言太后教常侍賣官受錢天下忠䔍之士怨望欲擊鼔求見丞相懸鼓者復怒而止我也唐書曰涼州都督計欽明嘗出按部有吐蕃數萬奄至城下欽明拒戰久之力屈被執将欽明至靈州城下欽明大呼曰賊中都無欽城内有美醬乞二升粱米乞二升墨乞一錠是時賊營四靣阻泥河惟有一路得入欽明詐乞此物以喻城中兾有簡兵練將候夜掩襲城中無悟其㫖者尋遇害淮南子曰不能耕而欲黍粱不能織而意衣裳無事而求其功難矣又曰珎怪竒味人之所美也而堯糲粱之飯藜藿之食糲粗也文繡狐白人所好也而堯布衣掩形鹿裘禦寒國語曰欒伯為公族大夫公曰夫膏粱之性惟正}
