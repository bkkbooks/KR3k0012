  - {type: variant, offset: 3107, length: 8, content: 宜麻王子年拾遺記, SBCK: 堯糲􅆝之飯藜藿之羮糲麄也文繡狐白人所好也而堯布衣揜形鹿裘禦寒國語曰欒伯謂公族大夫公曰夫膏􅆝之性難正吕氏春秋曰呉起爲鄴令民歌之曰終古斥鹵生稻􅆝楊泉物理論曰􅆝者􅁰稷之㹅名也神仙傳曰呉孫權時有一人種􅆝在山中患猿猴食之聞介象有道聊從乞辟猿猴法象告之無他法也汝明日徃梁所望見羣猴方徃時便大喚語之言以白介君使猿猴莫復來食梁此人倉卒直謂象欺弄之明日視􅆝遇羣猴適欲下樹試承象語語猴即各還山去遂便絶跡廣志}
