  - {type: variant, offset: 269, length: 234, content: 溫鬼史記曰張儀說韓王曰韓地險惡山居五穀所生非菽而麥民之食大抵飯菽藿羹一歲不收民不饜糟糠又曰棄為兒時好種樹麻菽麻菽美東觀漢記曰閔仲叔太原人也與周黨相友黨每過仲叔共唅菽飲水無菜茹又曰赤眉平後百姓飢餓人相食黃金一斤易豆五升又曰光武二年寇恂為潁川郡大生旅豆收得一萬餘斛以應給諸營又曰鄧禹攻赤眉陽敗棄輜重走車皆載土以豆覆其上兵士飢爭取之又曰劉平嘗為餓賊所得平叩頭曰老母飢少氣待平為命願得還飯母馳來就死賊即遣去母已食平曰向與賊期義不可欺乃復往賊驚怪其信義曰不忍食汝平既免脫乃摭莢得, WYG: 男}
