  - {type: variant, offset: 349, length: 4, content: 字安國為, SBCK: 歷散􅀐常侍}
  - {type: variant, offset: 349, length: 1, content: 字, WYG: 厯散騎常侍秘書監常領著作又曰孫綽為散騎常侍領大著作於時才筆之士綽為其冠又曰李充為大著作於時典籍混亂充刪除煩重以類分作四部秘閣以為永制又曰謝沈為祠部郎何充庾冰以沈有史才遷大著作晉太興起居注曰元帝依故事召陳郡王隱待詔著作單衣介幘朔朢朝著作之省沈約宋書曰何承天除著作郎撰國史承天時年已老而著作郎並名家年少荀伯子嘲之常呼為妳母承天曰卿當云鳯凰將九子妳母何言耶又曰著作郎後漢官後漢已來太史但掌天文律厯而已其國記撰述悉在著作江左王導表著作為史官是也後漢東觀有著作郎後魏書曰崔浩好文學時人莫及天興中給事秘書轉著作郎太祖以其工書常置左右太祖季年威風嚴峻宫省左右多以㣲過莫不逃隱浩獨恭勤不怠或終日不歸太祖知之勅命賜以御粥其砥直任時不為窮通改節皆此類也又曰程駿拜著作郎顯祖屢引與論易老之義顧謂羣臣曰朕與此人言意甚閒暢又問駿曰卿年幾何對曰臣今六十有一顯祖曰昔太公既老而遭文王卿今遇朕豈非早也駿曰臣雖才謝呂望而陛下尊過西伯覬天假餘年竭六韜之效又曰韓顯宗除著作郎髙祖曾謂顯宗及程靈虬曰著作之任國言是司卿等之才朕自委悉中省之品卿等所聞若欲取古人班馬之徒固自遼濶若求之當代文學之能卿等應推崔孝伯又曰趙逸為赫連屈丐著作郎世祖平統萬見逸所書曰此豎無道}
