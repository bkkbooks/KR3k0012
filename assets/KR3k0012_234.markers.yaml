  - {type: variant, offset: 2427, length: 773, content: 人從六品上晉起居注云武帝遣秘書圖書分為甲乙景丁四部使秘書郎各掌其一焉魏志曰王基字伯輿東萊人也時青土初定刺史王凌特表請基為別駕後召為秘書郎凌復請還之司徒王朗辟基凌又不遣朗書却州曰取宿衛之臣留秘閣之吏所希聞也凌猶不遣凌流稱青土蓋亦由基恊和之輔也又曰鍾會字士季敏惠夙成時蔣濟著論謂觀其眸子可以知人會年五歲見濟濟大奇之正始中以賜官郎中為秘書郎蜀志曰郄正字令先安貧好學愽涉墳籍弱冠能屬文入為秘書史轉令史遷秘書郎性澹於榮利尢耽文章自司馬王楊班傅張蔡之儔遺文篇賦及當世美書善論益部有者則鑽鑿推求略皆寓目王隱晉書曰鄭默字思元為秘書郎刪省舊文除其浮穢時陳留虞松為中書令謂默曰而今而後朱紫別矣又曰左思專思三都賦杜絕人事自以所見不愽求為秘書郎虞預晉書曰司馬彪少篤學不倦好色薄行不交人事專精學問大始中為秘書郎後轉為丞晉太康起居注曰秘書丞桓石綏啟校定四部書詔郎中四人各掌一部晉令云秘書郎掌外三閣經書覆省校閱正定脫誤沈約宋書曰秘書郎四人後漢校書郎也又曰蕭惠開雖貴戚而車服簡素初為秘書郎秘書著作並名家年少惠開意趣與之多不同比肩或三年不共語宋書曰王敬弘子恢之為秘書郎使求為奉朝請與恢之書曰秘書有限故有競朝請無限故無競吾欲使汝處無競之地文帝許之梁書曰張纘字伯緒為秘書郎固永不遷欲遍觀閣內圖籍後魏書高謐字安乎有文武才度天安中以功臣子召入禁中除秘書郎典秘閣謐以墳典殘𡙇奏廣訪郡邑大加繕寫由是代京圖籍莫不審正通典曰宋齊秘書郎皆四員尤為美職皆為甲族起家之選待次入補其居職例十月便遷又曰秘書郎自齊梁之末多以貴遊子弟為之無其才實故當時諺曰上車不落則著作體中何如則秘書王肅表曰臣以為秘書職於三臺為近密中書郎在尚書丞郎上秘書丞郎宜次尚書郎下不然則宜次侍御史下秘書丞郎俱四百石遷宜比尚書郎出亦宜為郡此陛下崇儒術之盛旨也尚書郎侍御史皆乘犢車而秘書丞郎獨鹿車不得朝腵又恐非陛下轉臺郎以為秘書丞郎之本意也, WYG: ''}
