  - {type: 'tls:seg', offset: 352, content: '', id: KR3k0012_CHANT_234-6a.4}
  - {type: variant, offset: 352, length: 0, content: '', WYG: 典略曰齊主以其著作郎祖珽數上宻啟命中書門下二省斷珽奏事初珽為秘書郎用芳林遍略質樗蒲錢又陳元康被傷將死憑珽作書屬家累并云祖喜邊有少許物宜早索取珽不通此書喚喜私問得金二十五錠唯與喜二錠餘並自入祖喜告康二弟叔諶季據等叔諶以語楊愔愔顰眉答曰恐不益亡者因此得停其後齊文宣以珽為秘書丞盜遍略事發付平陽王淹令錄珽付禁淹遣使收珽珽便私逃黄門侍郎髙德正謀云但宣命向秘書稱奉幷州進止須經史各部仰丞親自檢校催遣如此則珽意自安夜當還宅然後掩捉之果如德正所圖遂縳送廷尉據犯當死文宣以珽伏事先代除名為民愛其才伎令直中書普選勞舊遷為著作唐書曰著作郎鄧隆上表請編錄御製詩集太宗冲讓不許隆好學多伎王充兄子太之守河陽也引隆為賔客大見親遇太宗攻洛陽遣書諭太隆為太復書言辭不遜洛陽平後隆懼罪變姓名自號隱𤣥先生竄於白鹿山黄冠野服不接人事貞觀初徵授國子主簿與博士崔仁師昌黎慕容善行𢎞農劉顗新野康安禮河東敬播俱為修史學士隆負宿罪猶不自安太宗聞之遣房𤣥齡謂之曰爾之為王太作書誠合重責但各為其主於朕何有惡哉朕今為天子何能追責匹夫之過爾宜怛然勿懷危懼也擢校著作郎及脩史成尋卒撰東都記三十卷為學者所重又曰龍朔二年改著作郎為司文郎中佐郎為司文郎又曰劉允濟傳垂拱四年明堂初成允濟奏上明堂賦以諷則天甚嘉歎之手製褒美拜著作郎陶氏職官要錄曰著作郎舊視通直郎史才富博者為之應亨集讓著作表曰自司隸校尉奉至臣五葉著作不絶鄉族以為美談著作佐郎王隱晉書曰武帝欲以郭琦為著作佐郎問尚書郭彰彰憎琦不附已答詔不識上曰若如卿言烏丸家兒能事卿即堪郎矣及趙王倫簒又欲用琦琦曰我已為武帝吏不能復為今世吏終於家又曰華嶠漢書十典未成秘書監繆徽奏嶠少子暢為著作佐郎卒成十典晉中興書曰郭璞奏南郊賦中宗見賦嘉其才以為著作佐郎又曰華譚}
