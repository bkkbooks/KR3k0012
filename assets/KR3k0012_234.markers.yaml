  - {type: variant, offset: 799, length: 4, content: 魏徵為秘, krp: 著作郎鄧隆上表請編録御製詩集太宗冲讓不許隆好學多伎王充兄子太之守河陽也引隆爲賔客大見親遇及太宗攻洛陽遣}
  - {type: variant, offset: 804, length: 3, content: 監奏引, SBCK: 諭太隆爲太復書言辭不遜洛陽平後隆懼罪變姓名自號隱􅀇先生竄於白鹿山黃冠野服不接人事貞觀􅀄徴授國子主簿與愽陵崔仁師昌􅀺慕容善行􅀪農劉顗新野康安禮河東敬播俱爲修史學士隆􅀒宿罪猶不自安太宗聞之遣房􅀇齡謂之曰爾爲王太作書誠合重責但各爲其主於朕何有惡哉朕今爲天子何能追責疋夫之過爾冝坦然勿懐危懼也擢授著作郎及修史成㝷卒撰東都記三十卷爲}
