  - {type: variant, offset: 471, length: 0, content: '', WYG: 云何不敗遂令謝景仁三十方作著作佐郎後魏書曰宋卞字義和為著作佐郎尋除尚書殿中郎中髙祖曾因朝會之次厯訪治道卞年少官㣲自下而對聲姿清亮進止可觀髙祖稱善者乆之因是大被知遇賜名為卞意取卞和獻玉楚王不知寶之理也後周書曰黎景熙字明正定古今文字於東閤大綂末除安西將軍尋拜著作佐郎於時倫輩皆位兼常伯車服華盛唯季明獨}
