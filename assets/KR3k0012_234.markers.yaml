  - {type: variant, offset: 1481, length: 305, content: 儒素見稱當時朝廷之士咸敬慕之張易之兄弟亦厚之易之伏誅紹宗坐以交往見廢又曰德宗以左諫議大夫史館修撰張薦為秘書少監修撰如故時裴延齡貴欲異同宰府乃言於上曰諫議大夫論朝廷得失之官史館修撰書朝廷得失之事則領史職者不宜為諫官故有斯命秘書丞魏志曰武帝置秘書左右丞以劉放為秘書左丞孫資為秘書右丞魏略曰薛夏字宣聲天水人也愽學有才華天水舊有姜任閻趙四姓常推於郡中而夏為單家不為降屈四姓欲治之夏乃遊逸東詣京師太祖宿聞其名甚禮遇之文帝又嘉其才黃初中為秘書丞帝常與夏推論書傳未嘗不終日也每呼之不名而謂之薛君夏居甚貧帝又顧其衣薄解御袍賜之其後征東將軍曹休來朝時帝方與夏有所諮論而外啟休到帝引入坐定帝顧夏目之於休曰此君秘書丞天水薛宣聲也宜共, SBCK: 爲美}
