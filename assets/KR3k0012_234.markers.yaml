  - {type: variant, offset: 1623, length: 514, content: 薛夏字宣聲天水人也愽學有才華天水舊有姜任閻趙四姓常推於郡中而夏為單家不為降屈四姓欲治之夏乃遊逸東詣京師太祖宿聞其名甚禮遇之文帝又嘉其才黃初中為秘書丞帝常與夏推論書傳未嘗不終日也每呼之不名而謂之薛君夏居甚貧帝又顧其衣薄解御袍賜之其後征東將軍曹休來朝時帝方與夏有所諮論而外啟休到帝引入坐定帝顧夏目之於休曰此君秘書丞天水薛宣聲也宜共談其見遇如此魚豢魏略曰薛夏為秘書丞時秘書嘗公事移蘭臺蘭臺自以臺也秘書丞時為署耳謂夏不得儀當有坐者夏報曰蘭臺為外臺秘書為內閣臺也閣也何不相移之有蘭臺無以折之又曰嚴苞以高才黃初中入為秘書丞數奏文賦帝甚異之晉書嵇紹以父得罪靖居私門山濤領選啟武帝曰康誥有言父子罪不相及嵇紹賢侔郄缺宜加旌命請為秘書郎帝謂濤曰如卿所言乃堪為丞何但郎也乃發詔徵之起家為秘書丞王隱晉書曰庾峻字山甫愽學有才為秘書丞遍觀古今聞見益優虞預晉書曰何禎字元幹廬江人也為尚書郎特詔參祕書丞祕書本有一丞時尚未轉遂以楨為右丞右丞之置自楨始也檀道論晉陽秋曰太元十八年王謐為秘書丞乃表前尚書殷允中書郎張敞太子後率郄儉之故太常桓石秀是多書之家請秘書郎分局採借齊書曰王儉字仲寶為秘書丞上表求校墳籍依七略撰七志四十卷獻之又曰張率字士簡吳郡人遷秘書丞高祖曰秘書丞, WYG: ''}
