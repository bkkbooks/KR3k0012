  - {type: variant, offset: 838, length: 399, content: 之間書積如丘山故外有太常史愽士之藏內則延閣廣內秘室之府魚豢典略曰芸臺香辟紙魚蠶故藏書臺稱芸臺三輔黃圖曰未央宮東有麒麟殿藏秘書即揚雄校書之處也王充論衡曰蘭臺之官監國得失也通典曰秘書省但主書寫勘校而已雖非要刺然好學君子亦多求為之溫嶠舉荀崧為秘書監表曰夫國史之興將以明失得之跡謂之實錄使一代之典煥然可觀散騎常侍崧文質彬彬思義通愽歷位先朝莅事以穆宜掌秘奧宣明史籍王肅表曰青龍之末主者啟選祕書監詔秘書騶吏以上三百餘人非但學問義理當聞有威嚴能檢下者詔肅以常侍領焉又王肅論秘書不應屬少府表曰魏之秘書即漢之東觀郡國稱敢言之上東觀且自大魏分秘書而為中書以來傳緒相繼于今三監未有隸名於少府者也今欲使臣編名於騶隸言事於外府不亦隳朝章而辱國典乎大和中蘭臺秘書爭議三府奏議秘書司先王之載籍掌制書之典謨與中書相亞宜與中書為官聯華嶠集詔曰尚書嶠體素弘簡文雅該通經覽古今愽聞多識屬書實錄有良史之志故轉為秘書監其加散騎常侍使中書散騎, SBCK: 改}
