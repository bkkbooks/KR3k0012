  - {type: variant, offset: 109, length: 0, content: '', WYG: 太守尚書郎悉用文人帝初拓中原畱心慰納諸士大夫詣軍門者無少長皆引入賜見存問周悉人得自盡茍有微能咸蒙叙用冬十月車駕出井陘十一月進軍中山引騎圍之二年春正月饗羣臣於魯口慕容寶遣其左衞將軍慕容騰冦博陵殺中山太守及高陽諸縣令長抄掠租運是時信都未下帝乃進軍引騎圍之寶將軍張讓䕶軍徐超率將吏以下舉城降寶聞帝幸信都乃趣博陵之深澤屯滹沲水遣弟賀麟冦陽城三月車駕次于盧奴寶遣使求和請送元觚割常山以西奉國乞守中山以東帝許之已而寶背約辛亥車駕次中山命諸將圍之是夜寶弟賀麟將妻子出走西山寶見賀麟走恐先據和龍壬子夜遂將其妻子及兄弟親族數千騎北遁城内共立慕容普隣為主麟復入中山殺普隣自立九月賀麟飢窮率三萬餘人出冦新市甲子晦帝進軍討之太史令晁崇奏曰不吉帝曰其義云何對曰昔紂以甲子亡兵家忌之帝曰紂以甲子亡周武不以甲子勝乎崇無以對冬十一月帝進軍新市賀麟退阻𣲖水依漸洳澤以自固甲戌帝臨其營戰於義臺塢大破之斬首九千餘級賀麟單馬走西山遂奔鄴慕容德殺之甲申中山平丁亥遣三萬騎起衞}
