  - {type: variant, offset: 18, length: 3, content: 德宗孝, krp: 屯立聦武明智逺近所推統國三十六大姓九十威振北方莫不率服成帝崩節皇帝諱貸立節帝崩其後四丗宣帝諱推寅立南遷大澤方千餘里厥土昏冥沮洳謀更南徙未行而崩其後六丗獻皇帝諱隣立時有神人言於國曰此土方遐未足以建都邑冝復徙居帝年時襄老乃以授子聖}
  - {type: variant, offset: 19, length: 3, content: 宗孝武, WYG: 何如皆對曰太子才藝非常引空弓而落飛鳥似得晉人異法術亂國害民之兆惟願察之自帝在晉之後諸子愛寵日進始祖年踰期頤頗有所惑聞諸大人語意乃有疑因曰不可容者便當除之於是諸大人乃馳詣塞南害帝後乃追諡焉始祖尋崩凡饗國五十八年一百四歲太祖即位尊為始祖章皇帝諱悉鹿立始祖之子也饗國九年而崩平皇諱綽立章之少弟也享國七年而崩思帝諱弗立文帝少子也即位一年崩昭皇帝諱禄官立始祖神元之子也九年分國為三部帝自以一部居東在上谷北濡源之西東接宇文部以文}
