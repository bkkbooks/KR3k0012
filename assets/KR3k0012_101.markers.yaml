  - {type: variant, offset: 83, length: 1, content: 服, SBCK: 大㑹於牛川復以長孫嵩爲南部大人以叔孫普洛爲北部大人班叙勲舊各有差夏四月改稱魏王是􅀊慕容垂僣稱皇帝位於中山自號大燕姚萇僣稱皇帝於長安自號大秦六年秋七月講武於牛川慕容永使其大鴻臚慕容釣奉表勸進尊號冬十月北征蠕蠕如蠢切追之及於大磧南啇山下大破之班賜從臣各有差十有二月出居于馬邑是􅀊起河南宫七年秋八月行幸漢南仍築廵臺八年春正月帝出南廵二月幸羖羊原起白樓皇始元年春正月大蒐于定襄之虎山三月慕容垂來宼桑乾川陳留公元䖍先鎭平城時帝徴兵未集䖍率麾下邀擊失利死之垂遂至平城西北踰山結營聞帝將至乃築城自守疾甚遂遁走死於上谷子寳迎喪而還至中山乃僣立秋七月左司馬許謙上書勸進尊號帝始建天子旌旗出入警蹕於是}
