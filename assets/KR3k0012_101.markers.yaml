  - {type: 'tls:seg', offset: 1331, content: '', id: KR3k0012_CHANT_101-2a.7}
  - {type: variant, offset: 1333, length: 870, content: 馬溫之孽子也其母馬氏嘗與同輩夜月下坐見流星墜銅盆中忽為二珠璨然明靜競以瓢接取馬氏得而吞之若有感遂有娠及生有光照室占者奇之故小名曰靈寶妳媼每抱詣溫輒易人而後至其重兼常兒溫甚愛異之臨終命以為嗣襲爵年七歲溫服終府州文武辭其叔父冲冲撫玄頭曰此汝家故吏也玄因涕淚被面眾並異之及長形貌瓌奇風神踈朗愽綜藝術善屬文常負其才地以雄豪自處時咸憚之年二十三拜為太子洗馬時議謂溫有不臣之跡故折玄兄弟而為素官後出補義興太守鬱鬱不得志嘗登高望震澤歎曰父為九州伯兒為五湖長棄官歸國自以元勳之門而負謗於世乃上䟽曰臣聞周公大聖而四國流言樂毅王佐而被謗騎劫巷伯有豺獸之慨蘇公興飄風之刺惡直醜正何代無之先臣蒙國殊遇姻婭皇極西平巴蜀北清伊洛使竊號之寇繫頭北闕園陵修復太恥載雪飲馬灞滻懸旌趙魏勤王之師功非一捷泰和末皇基有潛移之懼遂奉順天人翼登聖朝晉室之機危於殷漢先臣之功高於伊霍矣至於先帝龍飛九五陛下之所以繼明南面請問談者誰之由也若陛下忘先臣大造之功信具錦萋斐之說臣等自當奉還三封受戮市朝然後下從先臣歸先帝玄宮耳䟽寢不報玄在荊楚積年優遊無事荊州刺史殷仲堪敬憚之及中書令王國寶用事謀削弱方鎮內外騷動知王恭有憂國之言玄潛有意於功業乃說仲堪宜興晉陽之師以內匡朝廷已當悉荊楚之眾順流而下推王恭為盟主此桓文之舉也俄而王恭信至招仲堪及玄匡正朝廷國寶既死於是罷兵詔以玄為廣州刺史其年王恭又與庾揩起兵討江州刺史王愉及譙王尚之兄弟玄仲堪謂恭事必剋捷一時響應仲堪令玄與楊佺期為前鋒玄至盆口獲王愉詔以玄為江州各西還屯于尋陽共相結約推玄為盟主後荊州大水仲堪振恤飢者倉廩空竭玄乘其虛而伐之至江陵仲堪數道拒之不剋佺期自襄陽來救期敗走殷仲堪亦見害於是平荊雍詔以玄督八州荊州牧玄於是樹腹心兵馬日盛其後孫恩逼京師玄建牙旗聚眾外託勤王實欲觀釁以兄偉為冠軍江州刺史留偉守江陵抗表率眾下至尋陽移檄京邑罪狀元顯玄既興師犯順慮眾不為用恒有廻斾之計既過尋陽不見王師意甚悅將吏亦振先使其將馮該等攻譙王尚之敗之劉牢之遣子敬宣降玄至新亭元顯自潰玄入京師矯詔加已總百揆為丞相加黃鉞羽葆鼓吹府置官屬乃徙太傅道子于安成害元顯于市多戮朝望改易, SBCK: 徒進璽綬}
