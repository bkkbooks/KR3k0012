  - {type: variant, offset: 14, length: 1, content: 安, SBCK: 黄帝有子二十五人或内列諸華或外分荒服昌意少子受封北國有大鮮卑山因以爲號其後丗爲君長統幽都之北廣漠之野畜牧遷徙射獵爲業淳樸爲俗簡易爲化不爲文字刻木紀契而已丗事逺近人相傳授如史官之紀録焉黄帝以土德王北俗爲土爲托謂后爲跋故以爲氏其裔始均入仕堯丗逐女魃於弱水北民頼其勲帝舜嘉之命爲田祖爰歴三代以及於秦熏鬻獫狁山戎匈奴之属累代殘􅁀作害中州而始均之裔不交南夏是以載籍無聞焉積六十七丗至成}
  - {type: variant, offset: 14, length: 1, content: 安, WYG: 黃帝有子二十五人或内列諸華或外分荒服昌意少子受封北國有大鮮卑山因以為號其後世為君長統幽都之北廣漠之野畜牧遷徙射獵為業淳樸為俗簡易為化不為文字刻木契而紀世事逺近人相傳授如史官之紀録焉黃帝以土德王北俗謂土為托謂后為跋故以為氏其裔始均入仕堯世逐女魃於弱水北民賴其勲帝堯嘉之命為田祖爰厯三代以及於秦薰鬻獫狁山戎匈奴之屬累代殘暴作害中州而始均之裔不交南夏是以載籍無聞焉積六十七世至成}
  - {type: page-break, offset: 14, content: '', id: KR3k0012_WYG_101-1b, image: WYG0893/WYG0893-0820d.png}
  - {type: variant, offset: 14, length: 1, content: 安, krp: 黄帝有子二十五人或内列諸華或外分荒服昌意少子受封北國有大鮮卑山因以爲號其後丗爲君長統幽都之北廣漠之野畜牧遷徙射獵爲業淳樸爲俗簡易爲化不爲文字刻木紀契而已丗事逺近人相傳授如史官之紀録焉黄帝以土德王北俗爲土爲托謂后爲跋故以爲氏其裔始均入仕堯丗逐女魃於弱水北民頼其勲帝舜嘉之命爲田祖爰歴三代以及於秦熏鬻獫狁山戎匈奴之属累代殘暴作害中州而始均之裔不交南夏是以載籍無聞焉積六十七丗至成}
  - {type: variant, offset: 18, length: 3, content: 德宗孝, SBCK: 屯立聦武明智逺近所推統國三十六大姓九十威振北方莫不率服成帝崩節皇帝諱貸立節帝崩其後四丗宣帝諱推寅立南遷大澤方千餘里厥土昏􅁳沮洳謀更南徙未行而崩其後六丗獻皇帝諱隣立時有神人言於國曰此土方遐未足以建都邑冝復徙居帝年時襄老乃以授子聖}
  - {type: page-break, offset: 18, content: '', id: KR3k0012_SBCK_101-1b}
  - {type: variant, offset: 18, length: 0, content: '', WYG: 屯立聰武明智逺近所推統國三十六大姓九十威振北方莫不率服成帝崩節皇帝諱貸立節帝其後四世宣帝諱推寅立南遷大澤方千餘里厥土𡨕昏沮洳謀更南徙未行而崩其後六世獻皇帝諱鄰立時有神人言於國曰此土荒遐未足以建都邑宜復徙居帝年時衰老乃以位授子武帝諱詰汾命南移山谷高深九難八阻於是欲止有神獸其形似馬其聲類牛先行導引厯年乃出始居匈奴之故地其遷徙䇿畧多出宣獻二帝故時人並號曰推寅蓋俗云鑽研之義初聖武帝常率數萬騎田於山澤欻見輜軿自天而下既至見美婦人侍衞甚盛帝異而問之對曰我天女也受命相偶遂同宿旦請還曰明年周時復㑹此處言終而别去如風雨及期帝至先所田處果復相見天女以所生男授帝曰此君之子也善視之子孫相承當世為帝王語訖而去即始祖神元皇帝也故時人諺曰詰汾皇帝無婦家力微皇帝無舅家帝崩始祖神元皇帝諱力微立生而英叡元年歲在庚子先是西部内侵國民離散依於没鹿囘部大人竇賓始祖有雄傑之度時人莫測後與賓攻西部賓軍敗失馬步走始祖使人以所乘駿馬給之賓歸令其部内求與馬之人當加重賞始祖隱而不言賓後知大驚將分國之半以奉始祖始祖不受賓臨終戒其二子使謹奉始祖其子不從乃陰謀為逆始祖召殺之盡并其衆部大人悉皆款服控弦士馬二十餘萬三十九年遷於定襄之盛樂始祖乃告諸大人曰我厯觀前世匈奴蹋頓之徒茍貪財利抄掠邊民雖有所得而其死傷不足相補更招冦讎百姓塗炭非長計也於是與魏和親四十二年遣子文帝如魏且觀風土魏景元二年也文皇帝諱沙漠汗以國太子畱洛為魏賔之冠魏晉禪代和好仍密始祖春秋已邁帝以父老求歸晉武帝具禮護送四十八年帝至自晉五十六年帝復如晉其年冬還國晉遺帝錦􅄢繒綵綿絹諸物咸豐厚車牛百乘行達并州晉征北將軍衞瓘以帝為人雄異恐為後患乃密啓晉帝請畱不遣晉帝難為失信不許瓘復請以金帛賂國之大人令致間隙使相厄害晉帝從之於是國之執事及諸部大人皆受瓘貨五十八年方遣帝始祖聞帝歸大悦使諸部大人詣陰館迎之酒酣帝仰視飛鳥謂諸大人曰我為汝曹取之授彈飛丸應弦而落時國俗無彈衆咸大驚並先馳還始祖曰我子既厯他國進}
