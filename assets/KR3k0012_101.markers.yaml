  - {type: variant, offset: 2213, length: 231, content: 為大亨玄將出居姑孰其中書令王謐對曰公羊有言周公何以不之魯欲天下一乎周也願靜根本以公旦為心玄善其對而不從遂大築城府乃出鎮焉大政皆諮之小事則決其僕射桓謙及卞範之後諷朝廷封諸子弟為公自知怨滿天下欲速定纂逆殷仲文卞範之等又共催促之於是先改授郡司其黨皆三公又矯詔封十郡為楚王加九錫備物楚國丞相以下一遵舊典又諷天子御前殿而策授焉玄屬偽讓詔遣百僚敦勸乃就命玄偽上表求歸藩又自作詔留之遣使宣旨玄又上表固請又諷天子作詔固留十一月矯制加其備天子禮服御禮樂皆僣備焉又矯詔使王謐兼太保奉, SBCK: 追尊成}
