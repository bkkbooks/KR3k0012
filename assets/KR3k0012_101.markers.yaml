  - {type: variant, offset: 4176, length: 293, content: 室慮酖毒自煮食於床前高祖將殺之不欲遣人入內令褚淡之兄弟侍褚后出別宮官相見兵人乃踰垣而入進藥於恭帝帝不肯飲曰佛教自殺者不得復人身乃以被掩殺之中興書曰昔中宗以丁丑之歲始稱晉王改筑宗廟使郭璞筮之云載祀二百暨今禪代庚申之歲凡百有二年而天祿永終璞精於數術理無乖二抑以百四期促故謬其嗣為二百乎史臣曰安帝即位之辰鍾無妄之日道子元顯并傾朝政主昏臣亂未有不亡者也雖有手握戎麾心存舊國回首無良忽焉簫散於是桓玄承釁勢踰飆指六師咸泯隻馬徂遷是以宋高非典午之臣孫恩豈金行之寇若乃世遇顛覆則恭皇斯甚於越之民詎燻丹穴會稽之侶寧歎入臣去黃屋而歸來灑丹書而不恨夫五運攸革三微數盡猶高秋凋候理之自然觀其零落人有為之流涕者也, SBCK: ''}
