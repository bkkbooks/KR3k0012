  - {type: variant, offset: 28, length: 0, content: '', SBCK: 年十一月帝即位於繁畤之北時年十九二年始置百官分掌衆職八年張駿私署假凉王十三年魏郡人冉閔殺石鑒僣立十四年氐符健僣稱天王自號大􅁗十五年慕容儁㓕冉閔僣稱尊號二十七年舂車駕還雲中冬十一月討没歌部破之􅀗牛馬羊數百萬頭三十四年春長孫斤謀反伏誅斤之反也拔刃向御座太子獻明皇帝諱寔格之傷脅夏五月薨後追謚焉秋七月皇孫珪生大赦三十九年符堅遣其大司馬符落率衆二十萬朱彤張蚝音刺鄧羌等諸道來㓂侵逼南境冬十一月白部獨􅀌部禦之敗績南部大人劉庫仁走雲中復遣庫仁率􅀐十萬逆戰於石子嶺王師不利帝時不豫}
  - {type: page-break, offset: 28, content: '', id: KR3k0012_SBCK_101-5a}
  - {type: variant, offset: 28, length: 0, content: '', WYG: 年帝即位於繁畤之北時年十九二年春始置百官分掌衆職八年張駿私置假涼王十三年魏郡人冉閔殺石鑒僭立十四年氐苻徤僭稱天王自號大秦十五年慕容雋滅冉閔僭尊號二十七年春車駕還雲中冬十一月討没歌部破之獲牛馬羊數百萬頭三十四年春長孫斤謀反伏誅斤之反也拔刃向御座太子獻明皇帝諱寔格之傷脇夏五月薨後追諡焉秋七月皇孫珪生大赦三十九年苻堅遣其大司馬苻洛率衆}
