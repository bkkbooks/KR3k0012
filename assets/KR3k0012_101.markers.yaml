  - {type: variant, offset: 3991, length: 4, content: 備其禮宋, SBCK: 調或以行歩乖節或以言詞失措帝皆以爲懷惡在心變見於外乃手自毆擊死者皆陳天安殿前於是朝野人情各懐危懼有司廢怠莫敢相督攝百工偷刼盗賊公行巷里之間人爲稀少帝亦聞之曰朕故縱之使然待過灾年當更清治之耳冬十月帝崩於天安殿在位十四年時年三十九先時國内有䜟曰珪厄清河死萬人帝破滅清河郡手殺萬人以厭之夜􅁪變易寢處人莫得知唯愛妾萬人知處帝子清河王紹與萬人通懼罪同害帝帝歎曰清河萬人乃是汝耶元帝立誅紹及萬人}
