  - {type: variant, offset: 2679, length: 955, content: 角作金龍頭銜五色羽葆旒蘇群臣竊相謂曰此頗似轜車亦王莽仙蓋之流也玄以其妻劉氏為皇后更造大輦容三十人坐以二百人舁之性好畋遊以體大不堪乘馬又作徘徊輿施轉關令廻動無滯玄自纂盜之後驕奢荒侈遊獵無度以夜繼晝性又急暴呼召嚴速直官咸繫焉省前禁內雜亂無復朝廷之體於是百姓疲苦朝野勞悴怨怒思亂者十室八九焉劉裕劉毅何無忌等共謀克復裕等斬桓脩于京口斬桓弘于廣陵裕率義軍至竹里玄遣吳甫之皇甫敷北距義軍裕等於江乘與戰臨陣斬敷及甫之玄聞之大懼乃召諸道術人推筭數為厭勝之法乃問眾曰朕其敗乎曹靖之對曰神怒人怨臣實懼焉玄曰人或可怨神何為怒對曰移晉宗廟飄泊無所失楚之祭不及於祖此其所以怒也玄曰卿何不諫對曰輦上君子自以為堯舜之世何敢妄言玄愈忿懼使桓謙何澹之屯東陵卞範之屯覆舟山西眾二萬拒義軍裕至蔣山使羸弱登山分張旗幟數道並前玄偵候還云裕軍四塞不知多少玄益憂惶于時東北風急義兵放火煙塵張天鼓譟之音震駭京邑劉裕執鉞麾而進謙等諸軍一時奔潰玄率親信數千人聲言赴戰遂出南掖門西至石頭使殷仲文具船相與南奔或勸其戰玄不暇荅直以策指天而經日不得食左右進以麤飯咽不能下其子昇時年數歲抱玄胸而撫之玄悲不自勝劉裕以武陵王遵攝萬機立行臺揔百官遣劉道規躡玄玄至尋陽江州刺史郭昶之給其器用殷仲文自後至望見玄舟旌旗輿服備帝者之儀歎息曰敗中復振故可也玄於是逼乘輿西上於道作起居注敘其拒義軍之事自謂經略指授筭無遺策諸將違節度以致虧喪非戰之罪玄至江陵石康納之未三旬眾盛謂其群黨曰卿等並清塗翼從朕躬都下竊位者方應謝罪軍門其觀卿等入石頭並雲霄中人也玄遣何澹之守湓口何無忌劉道規等破之帥舟艦二百發江陵以徐放為常侍遣說無忌等解軍謂放曰諸人不識天命致此妄作遂懼禍屯結卿三州所信可明示朕心若退軍解甲當與之更始授任江水在此朕不食言時道規已至玄與戰於崢嶸州于時義軍數千玄兵甚盛而玄懼敗常漾輕舸於舫側故其眾莫有鬥心義軍乘風縱火盡銳爭先玄眾大潰玄留永安太后及皇后於巴陵殷仲文時在玄艦求出別船收集散軍因叛玄奉二后奔于江陵玄欲出投漢州而制令不行左右於闇中斫之不中前後相殺交橫玄僅免於是荊州別駕王康產奉帝入南郡時益州刺史毛璩使其從孫祐之送帝璠喪葬江陵有眾二百璩弟子脩之先為玄校尉誘玄以入蜀幸枚回洲祐之迎擊玄矢下如雨玄被箭其子昇拔去之益州督馮遷抽刃而前玄拔頭上玉簪與之仍曰是何人邪敢殺天子遷曰欲殺天子之賊耳遂斬首時, SBCK: ''}
  - {type: variant, offset: 2679, length: 955, content: 角作金龍頭銜五色羽葆旒蘇群臣竊相謂曰此頗似轜車亦王莽仙蓋之流也玄以其妻劉氏為皇后更造大輦容三十人坐以二百人舁之性好畋遊以體大不堪乘馬又作徘徊輿施轉關令廻動無滯玄自纂盜之後驕奢荒侈遊獵無度以夜繼晝性又急暴呼召嚴速直官咸繫焉省前禁內雜亂無復朝廷之體於是百姓疲苦朝野勞悴怨怒思亂者十室八九焉劉裕劉毅何無忌等共謀克復裕等斬桓脩于京口斬桓弘于廣陵裕率義軍至竹里玄遣吳甫之皇甫敷北距義軍裕等於江乘與戰臨陣斬敷及甫之玄聞之大懼乃召諸道術人推筭數為厭勝之法乃問眾曰朕其敗乎曹靖之對曰神怒人怨臣實懼焉玄曰人或可怨神何為怒對曰移晉宗廟飄泊無所失楚之祭不及於祖此其所以怒也玄曰卿何不諫對曰輦上君子自以為堯舜之世何敢妄言玄愈忿懼使桓謙何澹之屯東陵卞範之屯覆舟山西眾二萬拒義軍裕至蔣山使羸弱登山分張旗幟數道並前玄偵候還云裕軍四塞不知多少玄益憂惶于時東北風急義兵放火煙塵張天鼓譟之音震駭京邑劉裕執鉞麾而進謙等諸軍一時奔潰玄率親信數千人聲言赴戰遂出南掖門西至石頭使殷仲文具船相與南奔或勸其戰玄不暇荅直以策指天而經日不得食左右進以麤飯咽不能下其子昇時年數歲抱玄胸而撫之玄悲不自勝劉裕以武陵王遵攝萬機立行臺揔百官遣劉道規躡玄玄至尋陽江州刺史郭昶之給其器用殷仲文自後至望見玄舟旌旗輿服備帝者之儀歎息曰敗中復振故可也玄於是逼乘輿西上於道作起居注敘其拒義軍之事自謂經略指授筭無遺策諸將違節度以致虧喪非戰之罪玄至江陵石康納之未三旬眾盛謂其群黨曰卿等並清塗翼從朕躬都下竊位者方應謝罪軍門其觀卿等入石頭並雲霄中人也玄遣何澹之守湓口何無忌劉道規等破之帥舟艦二百發江陵以徐放為常侍遣說無忌等解軍謂放曰諸人不識天命致此妄作遂懼禍屯結卿三州所信可明示朕心若退軍解甲當與之更始授任江水在此朕不食言時道規已至玄與戰於崢嶸州于時義軍數千玄兵甚盛而玄懼敗常漾輕舸於舫側故其眾莫有鬥心義軍乘風縱火盡銳爭先玄眾大潰玄留永安太后及皇后於巴陵殷仲文時在玄艦求出別船收集散軍因叛玄奉二后奔于江陵玄欲出投漢州而制令不行左右於闇中斫之不中前後相殺交橫玄僅免於是荊州別駕王康產奉帝入南郡時益州刺史毛璩使其從孫祐之送帝璠喪葬江陵有眾二百璩弟子脩之先為玄校尉誘玄以入蜀幸枚回洲祐之迎擊玄矢下如雨玄被箭其子昇拔去之益州督馮遷抽刃而前玄拔頭上玉簪與之仍曰是何人邪敢殺天子遷曰欲殺天子之賊耳遂斬首時, krp: ''}
