  - {type: variant, offset: 26, length: 1, content: 泰, SBCK: 石勒遣使來和帝遣弟昭成皇帝如襄國二年石勒僣立自稱大趙王烈皇帝崩昭武皇帝諱什翼犍立平文之次子也生而竒偉寛仁大度喜怒不形于色身長八尺隆凖龍顔立髪委地卧則乳垂至席烈帝崩頋命曰必迎立什翼犍社稷可安烈帝崩帝弟彌乃自詣鄴奉迎與帝俱還建國}
  - {type: variant, offset: 26, length: 1, content: 泰, WYG: 平文皇帝諱鬱立惠帝之子也二年西兼烏孫故地東吞勿吉以西控弦上馬將有百萬劉聰死淵族子曜僭立帝聞晉愍帝為劉曜所害顧謂大臣曰今中原無主天其資我乎劉曜遣使請和帝不納是年司馬叡僭稱大位於江南五年桓帝后以帝得衆心恐不利於己子害帝遂崩大人死者數十人天興初尊曰太祖惠皇帝諱賀傉立桓帝之中子也未親政事太后臨朝遣使與石勒通和時人謂之女國使四年帝始臨朝五年出居於宇文部賀蘭及諸部大人共立烈皇帝烈皇帝諱翳槐立平文之長子也石勒遣使求和帝遣弟昭成皇帝如襄國二年石勒僭立自稱大趙王烈皇帝崩昭武皇帝諱什翼犍立平文之次子也生而竒偉寛仁大度喜怒不形於色身長八尺隆凖龍顔立髮委地卧則乳垂至席烈帝崩顧命曰必迎立什翼犍社稷可安烈帝崩帝弟孤乃自詣鄴奉迎與帝俱還建國}
