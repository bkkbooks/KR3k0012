  - {type: page-break, offset: 378, content: '', id: KR3k0012_WYG_101-13a, image: WYG0893/WYG0893-0826c.png}
  - {type: variant, offset: 382, length: 339, content: 元顯為驃騎大將軍征討大都督鎮北將軍劉牢之為元顯前鋒將軍譙王尚之為後部以討桓玄二月景午帝戎服餞元顯于西河丁巳遣兼侍中齊王柔之以騶虞幡宣告荊江二州丁卯桓玄敗王師于姑孰壬申桓玄自為侍中丞相錄尚書事二年春二月辛丑建威將軍劉裕破徐道覆于東陽乙卯桓玄自稱大將軍丁巳冀州刺史孫無終為桓玄所害秋八月玄又自號相國楚王九月南陽太守庾仄起義兵為玄所敗冬十一月壬午玄遷帝于永安宮癸未移太廟神主于琅耶國十二月壬辰玄纂位以帝為平固王辛亥帝蒙塵于尋陽三年春二月帝在尋陽庚寅夜濤水入石頭漂殺人戶乙卯建武將軍劉裕帥沛國劉毅東海何無忌等舉義兵景辰斬桓玄所署徐州刺史桓脩于京口及青州刺史桓弘于廣陵丁巳義師濟江三月戊午劉裕斬玄將吳甫之于江乘斬皇甫敷於羅落己未桓玄眾潰而逃庚申劉裕置留臺具百官壬戍桓玄司徒王謐推推劉裕行鎮, SBCK: 張讓護}
