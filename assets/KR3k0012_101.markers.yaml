  - {type: variant, offset: 4017, length: 142, content: 陵續晉陽秋曰初安皇不慧起居動止不自己帝每侍左右消息涼溫飢飽之中而恭謹備焉時人稱其順悌又雅信佛法鑄貝貨十萬造丈六金像於瓦官寺外國齊日迎像宮步從十許里安皇帝歸陵有詔當出送八座奏諫以為宜加珍攝乃止沈約宋書曰褚秀之妹為恭帝后兄弟并盡忠孝高祖恭帝每生男轍令方便殺焉或誘賂內人或密加毒害前後如此非, SBCK: 御覽卷第}
