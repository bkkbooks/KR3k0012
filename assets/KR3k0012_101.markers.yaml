  - {type: variant, offset: 23, length: 0, content: '', SBCK: 諱詰汾獻帝命令南移山谷髙深九難八阻於是欲止有神獸其􅄱似馬其聲􅀋牛先行導引歴年乃出始居匈奴之故地其遷徙䇿略多岀宣獻二帝故時人並號曰推寅蓋俗云鑚研之義􅀄聖武帝常率數萬騎田於山澤欻見輜軿自天而下旣至見美婦人侍衛甚盛帝異而問之對曰我天女也受命相偶遂同􅀫旦請還曰明年周時復㑹於此言終而別去如風雨及朞帝至先所遊處果復相見天女以所生男授帝曰此君之子也善視之子孫相承當丗爲帝王語訖而去即始祖神元皇帝也故時人諺曰詰汾皇帝無婦家力微皇帝無舅家帝崩神元皇帝立諱力微生而聦叡元年􅀊在庚子先是西部内侵國民離散依於没鹿廻部大人竇賔始祖有雄傑之度時人莫測後與賔攻西部賔軍敗失馬歩走始祖使人以所乗駿馬給之賔歸令其部内求與馬之人賞當加重賞始祖隠而不言賔後知大驚將分國之半以奉始祖不受賔臨終戒其二子使謹奉始祖其子不從乃隂謀爲逆始祖召而殺之盡并其衆部大人悉皆從服控􅁌士馬二十餘萬三十九年遷於定襄之盛樂始祖乃告諸大人曰我歴觀前丗匈奴蹋頓之徒茍貪財利抄掠邊民雖有所得而多其死傷復不足相􅀘更招㓂讎百姓塗炭非長計也於是與魏和親四十二年遣子文帝如魏且觀風土是歳魏景元二年也文皇帝諱沙漠汗以國太子留洛陽爲魏賔之冠魏晉禪代和好仍密始祖春秋巳邁帝以父老來歸晉武帝具禮護送四十八年帝至自晉五十六年帝復如晉其年冬還國晉遺帝錦􅄢繒綵綿絹諸物豐厚車牛馬百乗行逹并州晋征北將軍衛瓘以帝爲人雄異恐爲後患乃􅁡白晋帝請留不遣晉帝難於失信不許瓘復請以金帛賂國之大人令致間􅂩使相厄害晉帝從之遂留帝於是國之執事及部人皆受瓘貨五十八年方遣帝始祖聞帝歸大恱使諸部大人詣隂舘迎之酒酣帝仰視飛鳥謂諸大人曰我爲女曹取之授彈飛丸應􅁌而落時國俗無彈衆咸大驚並先馳還始祖曰我子旣歴他國進德何如皆對曰太子才㙯非常引空弓而落飛鳥似得晋人異法術亂國害民之兆唯願察之自帝在晋之後諸子愛寵日進始祖年踰期頤頗有所惑聞諸大人語意乃有疑因曰不可容者便當除之於是大人乃馳詣塞南害帝後乃追謚焉始祖㝷崩凢饗國五十八年年一百四􅀊太祖即位尊爲始祖章皇帝諱悉鹿立始祖之子也饗國九年而崩平皇帝諱綽立章帝之少弟也饗國七年而崩惠帝弗立丈帝少子思即位一年崩昭皇帝立諱禄官始祖神元之子也九年分國爲三部帝自以一部居東在上谷北湏源之西東接宇文部以文帝之長子桓皇帝諱猗㐌統一部居代郡之叅合陂北以桓帝之弟穆皇帝諱猗盧統一部居定襄之盛欒故城自始祖以來與晉和好百姓乂安財畜冨實控引􅀐士四十餘萬十年晉惠帝爲城都王頴逼留在鄴匈奴別種劉淵反於離石號漢王并州刺史司馬騰來乞師帝與桓帝同時大舉以助之大破淵衆於西河上黨晋假桓帝大單于金印紫綬是􅀊桓帝崩帝英傑魁岸馬不能勝常乗安車駕大牛牛角容一石帝曽中蠱嘔吐之地仍生榆木叅合陂土無林樹故丗人異之至今傳記十三年昭帝崩是􅀊羯胡石勒與晉馬牧帥汲桑反穆皇帝天姿英峙勇略過人昭帝崩後遂揔攝三部以爲一統元年劉淵僣帝自稱大漢三年晉并州刺史劉琨遣使以子爲質又遣使乞師救洛陽帝遣歩􅀐二萬助之晉太􅀓東海王司馬越辤以洛中飢饉師還是年劉淵死子聦僣立五年劉琨遣使乞師以討劉聦石勒以琨忠義矜而許之㑹聦遣其子粲攻洛陽害琨父母而據其城琨来告難帝大怒遣長子六脩桓帝子普根及衛瓘范班􅁎澹等爲前鋒帝統大衆二十四萬爲後繼粲懼弃輜重突圍遁走縱騎追斬其將劉豐伏尸數百里琨來拜謝帝以禮待之琨固請進軍帝曰吾不早來致卿父母見害誠以後時相愧今卿巳復州境然吾逺來士馬疲弊且侍後期賊豈可盡乎與琨馬牛羊各千餘車牛百乗又留勁銳戍之而還六年城盛樂以爲北郡脩故平城以爲南郡帝登平城西山望觀地勢乃更南百里於灅水之陽黄􅀲堆築新平城晋人謂之小平城使子六脩鎮之統領南部九年帝召六脩不至帝怒討之失利乃微服民間遂崩普根先守外境聞難來赴功六脩㓕之普根立月餘而薨也平文皇帝諱欝律立惠帝之子也二年西兼烏孫故地東吞勿吉以西控胘上馬將有百萬劉聦死焉族子曜僣立帝聞晉愍帝爲曜所害頋謂大臣曰今中原無主天其資我乎劉曜遣使請和帝不納是年司馬叡稱大位於江南四年桓帝后以帝得衆心恐不利於巳子帝遂崩大人死者數十人天興􅀄尊曰太祖惠皇帝諱賀傉立桓帝之中子也未親政事太后臨朝遣使與石勒通和時人謂之女國使四年帝始臨朝五年崩煬皇帝諱紇那立惠帝之弟也五年岀居於宇文部賀蘭及諸部大人共立烈帝烈皇帝諱翳槐六平文之}
