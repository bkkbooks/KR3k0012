  - {type: variant, offset: 53, length: 0, content: '', SBCK: 尊曰髙祖帝雅性寛厚智通仁恕時國中少繒帛代人許謙盗絹二疋守者以告帝匿之謂燕鳯曰吾不忍視謙之面卿勿泄言謙或慙而自殺爲財辱士非也太祖道武皇帝後魏書曰太祖道武皇帝諱珪昭成皇帝之嫡孫獻明皇帝之子也母曰獻明賀皇后􅀄因迁徙遊于雲澤即而􅃦因夢日出室内寤而見光自牖属天欻然有感以建國三十四年七月七日生太祖於叅合陂北其夜復有光明昭成大恱羣臣稱慶}
