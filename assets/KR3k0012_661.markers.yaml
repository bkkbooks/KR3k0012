  - {type: variant, offset: 1906, length: 1184, content: 卿若能行金闕真事則拜為大夫此謂列紀重於紫文也既見之非真受佩而已謂知其中經目之輕重求道之梯級依此尋學故勝於守紫文之單事也上皇玉籙曰二十四真人有佩玉籙以行山川者則河海上神奉迎啟道靈寶隱書曰中極真人主人命籍九華真人主九幽之下宿對生死太元真人受天之符度長夜之魂太極真人治赤城玉洞之府司校太山死生之籙三元真人主紫微行道赤書玉訣經曰凡月十四日上帝真皇敕太一使者下與北酆都伯使者同行天地司察人神功過深淺列言上官又勑太一八神使者下與三官司察天人善惡列言也又遣九部剌姦周行五岳三宮水府條正鬼事司人功過列言上天白羽經曰太真丈人登白鸞之車駕黑鳳於九源自天己下莫不範德又太極真人有仙真相好者要在慈心觸物以輔相好然後得仙矣不能忍性則仙相敗矣故修道會真必以精思為本神為本存神入觀剋以靜念為先大劫經曰上景真人將天下力上元洪水母決逆萬川海空經曰何監者天人之隱名處玉樓之上列真仙之館又高真者體有真氣玉眸詵詵南真傳曰昨與叔甲詣清虛宮校定真仙得失之事近頓除落四十七人復上三人耳內明真正乃良材也九宮真人出入皆從黃闕絳臺中閒為道故以道之左右置臺闕者以伺非之氣真人往來者太上正法經曰九真者九天之真氣凝而成也上中下三真生於太清是元始之澄氣也各置官室次第上清宮衛之官太上大道君萬真之主也居玉殿造上帝之章以為寶經於玉清宮中以度後學得真之士三元品戒經曰紫微宮有延生之儀格又云赤帝玉司君玉景度治南方朱陽之臺揔統上真之士景林真人曰勤感累世念真期靈皇鑒其用思太極注名玉劄於是細書紫虛之宮朱書東華之閣刻名上清丹文錦籍空洞靈章曰真人彈雲璈吹九鳳之簫神州之笙其音逸響流激千尋後聖列紀曰上清金闕後聖君少好道樂真紫微上真天帝玉清宮賜紫蘂剛丹鳳璽得在上清中遊太極下治諸天封掌兆民仙誌曰凡修行太一之事真人之道不得有所拜伹心拜而已不形屈也思真行道通而無窮顯驗應期登真必速也黑籙上篇曰聖真仙者共行道德俱宗太玄戒文經曰太上真人居仙府中世人得仙者皆先過此自然玉字經曰七寶林中有上真之遊圃真人之戲園太霄琅書曰元皇玉靈之胄位登太真理二儀於玄圃掌玉籙於萬仙揔地司於五岳領上真於三關上統無涯下攝洞源自天以下莫不咸隸又曰太素三元君稟靈和玉宸上氣故結生虛無含真秀景機洞妙無神齊廣暉道周九玄呼吸未兆觸物對應太上之凝結也太上四明玉經日真仙之道以耳目為主淫色則目闇廣愛則耳閉此二病從中來而外奔也非復有他今令其聰明益易耳但不為之當洗心絕念放棄淫貪所謂嚴其始矣保利雙闕啟徹九門朝液泥丸列為上真視徹甚遠聽於絕響此真仙之高不伹明耳目而已三洞珠囊曰高上玉清刻石隱銘曰酆都山在北內有空洞洞中有六宮書此銘於宮北壁制檢群凶不使橫暴生民學者得佩此刻石文則北酆落名南宮度命為其真人太平經曰後學得道各有品階至于指極聖真仙人定真玉籙經曰凡欲定心當受上皇民籍定真玉籙此至要為學之先也先能定心仙名乃定是三天正一先生所佩以定得仙之名太上經曰玉清者如玉堅不可毀淨不可污也堅淳無變穢累都盡一而無雜故名, WYG: 去}
