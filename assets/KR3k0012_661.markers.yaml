  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 三眞人下集仙録曰王母者􅀛山金母也西華至精之氣化而生金母生而飛翔處極陰元位配西方母養群品所居宫闕在舂山崑崙之圃閬風之苑有城千里樓十}
  - {type: variant, offset: 2, length: 1, content: 二, WYG: 三}
  - {type: variant, offset: 2, length: 0, content: '', krp: 三眞人下集仙録曰王母者龜山金母也西華至精之氣化而生金母生而飛翔處極陰元位配西方母養群品所居宫闕在舂山崑崙之圃閬風之苑有城千里樓十}
  - {type: xml-element, offset: 3, content: '', id: KR3k0012_CHANT_661-bkkxmlele1}
  - {type: 'tls:seg', offset: 3, content: '', id: KR3k0012_CHANT_661-1a.1}
  - {type: 'tls:seg', offset: 3, content: '', id: KR3k0012_CHANT_661-1a.2}
  - {type: variant, offset: 3, length: 2, content: 真人, SBCK: 非飈車羽輪不可到也蓬髮虎齒非西母之眞形蓋金方之神也元始授以萬天元統􅀛山九光之籙使制召萬靈統括衆眞揔諸天之羽儀天帝朝宴之會}
  - {type: variant, offset: 3, length: 2, content: 真人, krp: 非飈車羽輪不可到也蓬髮虎齒非西母之眞形蓋金方之神也元始授以萬天元統龜山九光之籙使制召萬靈統括衆眞揔諸天之羽儀天帝朝宴之會}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 下集仙録曰王母者龜山金母也西華至妙之氣化而生金母生而飛翔䖏極隂元位配四方母飬羣品所居宫闕在春山崑崙之圃閬風之苑有城千里樓十二飛颷車羽輪不可到也蓬髪虎齒非西母之真形蓋金方之神也元始授以萬天元統龜山九光之籙使制召萬靈統括衆真緫諸天之羽儀天帝朝宴之㑹}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_661-1b, image: WYG0898/WYG0898-0851b.png}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_661-bkkxmlele2}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_661-bkkxmlele3}
  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_661-1a.3}
  - {type: punctuation, offset: 6, content: 《, id: KR3k0012_CHANT_661-bkkpn1}
  - {type: variant, offset: 6, length: 1, content: 太, SBCK: 淸}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 清寳經三洞玉書凢所授度咸所閑衛黄帝在位王母遣使乘白鹿集帝庭授以地圖其後帝舜在位遣使獻白玉環及益地圗黄帝九州為十二州又遣獻舜玉琯吹之以和八風又尚書帝騐期曰王母之國在西荒凢得道授書者皆朝王母於崑崙之闕王褒字子登齋戒三月王母授以瓊花寶曜七晨素經茅盈從西城王君詣白玉龜臺朝謁王母求長生之道王母授以𤣥真之經又授寳書童散四方泊周穆土駕黿鼉魚鼈為梁以濟弱水而升崑崙𤣥圃閬苑之野而㑹于西王母歌白雲之謡刻名紀迹于弇山之上而還漢武帝好長生之道元封元年登嵩嶽築尋真之臺齋戒思道王母于七月七日乗紫雲之輦駕九色斑龍帶天真之䇿佩金剛靈璽黄錦之服金光奕奕結飛雲文綬戴天太真晨纓之冠攝方瓊鳯文之履天姿奄藹真絶世之人也下車二侍女扶之登牀東向而坐命侍女取桃以玉盤盛至七枚四與帝食自食其三帝欲收核種之母曰此桃三千歲一實中土地薄種之不生問長生之道母曰賤榮樂卑自復佳爾飬生之道理身之要不在怎耳欲長生者先取諸身堅守三一保靈根青白分明適泥丸三宫備衛在絳宫黄庭戊已無流源此所謂平太和保守自然真要之道也至若}
