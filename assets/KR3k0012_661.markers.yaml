  - {type: variant, offset: 1264, length: 384, content: 惡夢之法金華真人刻大洞上經於天帝紫微宮玄琳玉殿東壁牖上太虛真人說鴻鳥之經太極真人誦王母之辭典禁真人察人之善惡妙行真人推劫會之數又曰太極真人常以立春日日中會諸仙人於太極宮刻玉簡記仙名至春分之日日中崑崙瑤臺太素真人會諸仙人刊定真經也崑崙瑤臺是西母之宮所謂西瑤上臺天真祕文盡在其中矣太素真人治白水沙洲之上定其真經也至立夏日日中上清五帝會諸仙於紫微宮見四真人論求道之功罪至夏至日日中天上三官會于司命河候校定萬民罪福增減年筭至立秋日日中五岳諸真人詣中央黃房定天下祀圖靈藥至立冬日日中陽臺真人會集列仙定新得道人始入名仙錄至冬至日日中諸仙詣方諸官東海青童君刻其仙籙金書內字凡學道之人常以夕半日中謝罪罪名自除剋身歸善以求長生神仙秋分之節氣處清虛太和正日也眾真諸仙是日聽訟又剌姦吏及部內諸仙官並紏奏在處道士之功過及含生有罪應死生者故仙忌真記曰子欲升天慎秋分罪無大小皆上聞此朱火丹陵宮仲陰, WYG: 後随安期}
