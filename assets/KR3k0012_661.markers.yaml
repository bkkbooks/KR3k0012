  - {type: variant, offset: 33, length: 0, content: '', WYG: 此為善過當致人自斃况為惡乎又曰楚荘王時市長宋萊子長洒掃一市久時有一乞食翁入市經日行歌道中曰天庭發雙華山源彰隂邪清晨案天馬來詣太真家真人無奈隠又以滅百魔常歌此乞食市人無解此者獨萊子悟疑其真人然未全解其歌耳遂師此翁而去積十餘年翁遂授以中仙之道萊子今在中嶽也乞食翁者西城真人馬延夀周宣王時人也天庭在兩眉之上是徹視之津梁亦謂之華亭也山源是鼻下人中之本側在耳下小人入谷中也天馬手也以手按鼻下則杜絶百邪又曰真人尹喜周大夫也為闗令少好學善天文秘緯鬼神無以匿其情状瓌傑不檢榮戚不形於色志懐逍遥天性𤣥湛忽登樓四望見東極有紫氣西邁喜曰夫陽數度盡九星度值合歳月並王應有異人過此乃齋戒掃道以候之及老子到關喜先誡關吏曰若有翁乘青牛薄板車者勿聼過止以白我果至吏曰願少止喜帶印綬設師事之禮老子重辭之喜曰願為我著書説大}
