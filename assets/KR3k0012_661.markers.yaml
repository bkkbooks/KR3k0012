  - {type: variant, offset: 131, length: 0, content: '', SBCK: 帝不能用其道而多所惑焉後三祠王母復下降所授之書置柏梁臺上爲天災所焚李少君解形而去巫蠱事起帝愈悔恨又大茅君盈南治句曲之山元壽二年八月已酉南岳眞人赤君西城王君方諸葛青童並從王母降於茅盈之室又王母命上元夫人授盈二第茅固茅衷太霄隱書其後紫靈元君魏華存齋戒於陽洛山隱元之臺王母與金闕聖君降於臺中乘八景之輿同詣淸虚上宮傳玉淸隱書四卷}
