  - {type: variant, offset: 1003, length: 569, content: 持節下真則太極參軒又曰太微天帝君命太微上真勑使群靈又曰上皇玉帝命玄羽真人出迎太微天帝又命太上真人開瓊珠之篋出玉真隱書玄羽之經以傳太微天帝之君內音玉字經曰真人散香於玉庭又云飛散百和之香流五雲之華以觀飛天真人又曰四極真人主人命常乘蒙真之車校人罪籙又曰九華真人治於南上宮中校人功過善三官列言又曰天真皇人曰諸天內音自然玉字其大梵隱語上帝命天真皇人注解其正音足以開度天人登真隱訣曰崑崙瑤臺刊定真經之所也上品居上清擬帝皇之尊中品處中道皆公卿之位下品居三元之末並大夫之流三真品經各有條次又曰三昧真人乘風雲龍車下衛齋戒之士太素真人辟始學者惡夢之法金華真人刻大洞上經於天帝紫微宮玄琳玉殿東壁牖上太虛真人說鴻鳥之經太極真人誦王母之辭典禁真人察人之善惡妙行真人推劫會之數又曰太極真人常以立春日日中會諸仙人於太極宮刻玉簡記仙名至春分之日日中崑崙瑤臺太素真人會諸仙人刊定真經也崑崙瑤臺是西母之宮所謂西瑤上臺天真祕文盡在其中矣太素真人治白水沙洲之上定其真經也至立夏日日中上清五帝會諸仙於紫微宮見四真人論求道之功罪至夏至日日中天上三官會于司命河候校定萬民罪福增減年筭至立秋日日中五岳諸真人詣中央黃房定天下祀圖靈藥至立冬日日中陽臺真人會集列仙定新得道人始入名仙錄至冬至日日中諸仙詣方諸官東海青童君刻其仙籙金書內字凡學道之人常以夕半日中謝罪罪名自除剋身歸善以求長生神仙秋分, SBCK: ''}
