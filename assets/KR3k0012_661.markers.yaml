  - {type: variant, offset: 78, length: 0, content: '', WYG: 下宴太極封掌吳越司校太山死生籙朝籍衆真定䇿金名領授學道司校羣仙時茅君弟吏二千石當之官鄉人多送之茅君亦在座曰余亦有職某月日當之官賔客曰願奉送茅君言不須有所損費吾有以供帳至期大作宴㑹皆青縑帷幄下鋪皇石氊竒饌異果羅列妓樂合奏數里從者千餘人文吏則朱衣素帶武吏則戎備曜日茅君乃登明葢車以晉興寧三年七月四日初夜下降人家着青錦繡裙紫毛色帔巾芙蓉冠侍從七人入户一人執紫毛節一人執十絶幡一人帶緑章囊一人握流金鈴三人奉白牙箱並朱衣以後數數來弟子迎候仙人李遵撰傳光顯于世間也三洞珠囊曰王褒字子登前漢王陵七世孫服青精䭀飯趍歩峻峰如飛鳥無津梁直度積水又服雲碧晨飛丹腴視見甚逺太上大道君遺遣正一}
