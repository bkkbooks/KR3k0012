  - {type: variant, offset: 964, length: 0, content: '', SBCK: 獨萊子悟疑其眞人然未全解其歌耳遂師此翁而去積十餘年翁遂授以中仙之道萊子今在中岳也乞食翁者西岳眞人馮延壽周宣王時人也天庭任兩眉之下是徹視之津梁亦謂之華庭也山源是鼻下人中之本側在鼻下小入谷中也天馬手也以手按鼻下則杜絶百邪又曰眞人尹喜周大夫也爲關令少好學善天文祕緯􅀑神無以匿其情􅃺瓌傑不檢榮戚不形於色志懷逍遥天性􅀇湛忽登樓四望見東極有紫氣西邁喜日夫陽數度盡九星度值合歲月並正應有異人過此乃齋戒掃道以俟之及老子度關喜先誡關吏曰若有翁乘青牛薄板車者勿聽過止以白之果至吏白願少止喜帶印綬設師事之禮老子重辭之喜曰願爲我著書說大道之意得奉而行焉於是著道德經上下二篇喜於是俱去􅀇洲上􅀸蘇林傳曰林字子􅀇濮陽曲水人也父秀含德隱曜居於􅁪山林少稟異操至趙師琴髙先生授鍊氣益命之道又師華山仇先生授還神之術曰子眞人也當學眞道乃致林於㳙子末遂告林眞訣先生曰必作地上眞人當先去三尸林後授紫陽眞人道訣凡二百餘事至于守􅀇丹洞房三元眞人具標上焉林爲中岳眞人茅君傳曰盈字叔申咸陽人也父祚有三子盈固衷也盈少稟奇操矯俗抗邁不求聞達不交非類入􅁪山讀老易餌术潜影在山中六年精思念道誠感密應夢太􅀇}
