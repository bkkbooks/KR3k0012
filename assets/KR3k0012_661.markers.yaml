  - {type: variant, offset: 10, length: 24, content: 大微天中有二十四氣混黃雜聚結有名無氣變化為真人道, SBCK: 王母}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 黄帝逰靈臺青城山絶巖之下見天皇真人以蒼玉為屋黄玉為牀翠羅之幃侍者皆天人又曰髙丘子商時人也好道人六景山積年但讀黄素道經服餌术後服鴻丹得陸仙逰行五嶽復飲金液為中嶽真人又曰郭崇子商時人也彭真人弟子嘗山行遇盜崇諸子弟欲追擒之崇子曰縱去其盗後仕宦而崇子譽之數數徃崇子謝曰我昔盗也不可受}
