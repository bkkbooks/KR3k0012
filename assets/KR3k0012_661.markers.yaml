  - {type: variant, offset: 130, length: 0, content: '', SBCK: 之所服非中仙之所寶其中品者有得服之後天而遊乃天眞之所服非下仙之所及其次藥有九丹金液紫虹華英太淸九轉五雲之漿􅀇霜絳雪騰躍三黃東瀛白香􅀇洲飛生八石千芝威喜九光西流石膽東滄靑錢髙丘餘粮積石瓊田太靈還丹盛以金蘭長光絳草雲童飛于此飛仙之所服非地仙之所聞也其下藥茯苓昌蒲巨勝黄精之􅀋服之可以延年雖不得長享無期亦以身生光澤得爲地仙求道者要先憑此階漸而能致逺勝也者能呼吸服御保固神氣此上品自然之要道也且夫一人之身天付之以神地付之以形道付之以氣萬物草木亦如之身以道爲本豈可不養神固氣以全爾形也形神俱全上聖所貴王母命上元夫人出八㑹之書五岳眞圗五帝六甲靈飛之符凡十二事以}
