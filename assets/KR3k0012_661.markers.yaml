  - {type: variant, offset: 53, length: 1, content: 八, WYG: 也當學真道乃致林於涓子未遂告林真訣先曰必欲作地上真人當先去三尸林後授紫陽真人道訣凢二百餘事至子守𤣥丹洞房三元真人且標上焉林為中嶽真人茅君傳曰盈字叔申咸陽人也父祚有三子盈固𠂻也盈少禀竒操矯㧞俗情不求聞逹不交非類入恒山讀老易餌术潜景在山中有六年精思念道誠感宻應梦天降玉女持玉醴而授之曰西城王君得真道可為師明發乃尋求至西城齋戒三日果見王君盈乃叩頭再拜勤懇乞長生之術乃得在西城洞臺之中金玉上宫親侍旦夕執巾履之役積十七年專一不懈復二年王君命駕造白玉龜山謁王母於青琳宫将盈同行王君見西王母稽首於前盈乃叩頭再拜自陳於王母前得治身之要道行其事歸家數十年以漢元帝時天使下迎來渡江東治句曲山於是天皇帝復遣授黄金紫玉䇿為太元真人東嶽主卿司命神君伏紫毛之節十絶靈幡巾藕華冠繡羽紫帔於飛羣斑龍輿}
