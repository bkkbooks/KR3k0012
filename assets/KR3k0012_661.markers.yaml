  - {type: variant, offset: 117, length: 0, content: '', SBCK: 道王母授以􅀇眞之經又授寶書童散四方洎周穆王駕黿鼉魚鼈爲梁以濟弱水而升崑崙􅀇圃閬苑之野而會于王母歌白雲之謡刻石紀迹于弇山之下而還漢武帝好長生之道元封元年登嵩岳築尋眞之臺齋戒思道王母於七月七日乘紫雲之輦駕九色斑龍帶天眞之䇿佩金剛靈璽黃錦之服金光奕奕結飛雲文綬戴天太眞晨纓之冠躡方瓊鳯文之履天姿奄藹眞絶世之人也下車扶二侍女登床東向而坐命侍女取桃以玉盤盛至七枚四與帝食母自食三帝欲收核種之母曰此桃三千歲一實中土地薄種之不生問長生之道母曰賤榮樂卑自復佳爾養性之道理身之}
  - {type: page-break, offset: 117, content: '', id: KR3k0012_SBCK_661-2a}
  - {type: variant, offset: 117, length: 0, content: '', krp: 道王母授以玄眞之經又授寶書童散四方洎周穆王駕黿鼉魚鼈爲梁以濟弱水而升崑崙玄圃閬苑之野而會于王母歌白雲之謡刻石紀迹于弇山之下而還漢武帝好長生之道元封元年登嵩岳築尋眞之臺齋戒思道王母於七月七日乘紫雲之輦駕九色斑龍帶天眞之䇿佩金剛靈璽黃錦之服金光奕奕結飛雲文綬戴天太眞晨纓之冠躡方瓊鳯文之履天姿奄藹眞絶世之人也下車扶二侍女登床東向而坐命侍女取桃以玉盤盛至七枚四與帝食母自食三帝欲收核種之母曰此桃三千歲一實中土地薄種之不生問長生之道母曰賤榮樂卑自復佳爾養性之道理身之}
