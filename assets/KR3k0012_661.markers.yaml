  - {type: variant, offset: 2425, length: 4, content: 居玉殿造, SBCK: 漢文帝二年始生焉裴君得道將入室弟子鄧雲亦得道將鄧登太華山入西洞􅀇石室中積三十二年怱見五老人賜裴君神芝之術亦號淸虚眞人又曰中岳眞人王仲甫少好仙道常吸引二景及飡霞法四十餘年都不覺益其子亦服之十八年仙去後南眞人忽降仲甫家而教之曰子朏衆虧減津液不注雖接眞景以飡霞故未爲身益仲甫遂因藥治病兼修眞道又積年方成今在􅀇洲受書爲中岳眞人領九􅀇之司又曰范伯慈桂陽人也家本事俗忽得狂病經年不愈聞沈道士治病多驗乃弃家求療五十日病愈後入天目山餌胡麻精思十七年又服丹砂得道爲􅀇一眞人又曰許謐字思􅀇一名穆晉􅂤文皇帝以爲護軍長史雖外混俗務而内修眞學得爲}
  - {type: page-break, offset: 2425, content: '', id: KR3k0012_SBCK_661-6a}
