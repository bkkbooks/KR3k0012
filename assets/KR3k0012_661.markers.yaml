  - {type: variant, offset: 2420, length: 2, content: 萬真, krp: 遣正一左玄執蓋郎封瑋音賜王君素明瓊玕丹紱綿旌號淸虚眞人眞誥曰赤松子黃帝時雨師號太極眞人又曰九疑眞人韓偉逺昔師中岳宋德玄德玄者周宣王時人也服靈飛六甲得道能逺行數變隱得玄靈}
