  - {type: variant, offset: 415, length: 528, content: 六層玉臺太上真人集宴之處也又曰玉保青宮北殿上有金格格上有金章鳳璽玉札丹青羽蓋升仙法服以給成真之人大有經曰玉華青宮有寶經玉訣應有為真人者授之又曰太上素靈洞玄經上化三真又大洞真經云道有三真不可去身紫霞變景三光映真大洞玉經曰太無山中有洞宮玉戶在峨嵋之上諸得道真仙之名刊列此宮也又曰云上清有宮門有兩闕左金闕右玉闕有羽衣守士內有玉芝流霞之泉刻金題眾真飛仙之號又云玉清中有太暉殿玉真遊宴之所也又曰九真仙伯上帝司禁之君濯纓帝川之池也又曰太一上元君者萬仙之司主方岳真氣太上真人步五星之道以致降于室大洞真經曰赤城朱牎上清絕境乃帝一內宅三真寶堂又曰上清真人揔仙大司馬長生法師登大帝滄浪山洞臺中雙玉穴酣飲紫明芝液又曰長生存神者好山水之人仁知動靜所依也依仁者靜而壽依智者動而樂當投簡送名俾崇仁智朱書白簡移籍太清發爐拜手用青紙青絲裹絡巖石上詣水泛舟中流讀簡以名係之必能降真也上清九真中經內訣曰有玉保公太素遣下迎九真之人也又曰欲行九真之法者齋戒淨室並為天帝君所見記錄也太真科曰羽仙侍郎上都官典格列其職位都統玉真太上真人在五岳華房之內非有仙籍不得聞見丹簡校定名入南宮又曰虛皇金闕玉帝最貴最尊號曰自然莫能使之然莫能使之不然也和光於人似同而異惟得道者乃能知之又曰上清禹餘天有三官真人主治過刑, SBCK: ''}
