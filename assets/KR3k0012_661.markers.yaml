  - {type: variant, offset: 2459, length: 2, content: 有延, SBCK: 九華安眞妃晉興寧三年年十三四着雲錦裙上丹下青腰絲繡帶右帶係十餘小鈴鈴子青色又黃色相閒左帶玉珮指着金鐶白珠約臂作髻在頂中餘髮垂至腰一侍女朱衣帶青章襄長尺餘以盛書書可十餘卷白玉檢囊口上刻字玉淸神虚内眞紫元丹章一侍女赤衣捧白玉箱絳帶絡之年並十七八自此後數數來降授書作詩眞人傳曰馬明生者齊國臨淄人也本姓帛名和字君賢爲縣吏捕賊所傷遇太眞元君與藥卽愈隨至太山石室中金床玉几珎物奇偉人跡所不能及事之勤亦至矣太眞乃授以長}
