  - {type: variant, offset: 2440, length: 1, content: 宮, SBCK: 虚弟子名華存楊司命之師也任城人晉司徒文康公魏舒之女年二十四適南陽劉幼彦幼彦爲汲縣修武夫人齋戒念道入室百日十二月夜半靑童君及王君四眞人同降授上經三十一卷至洛陽亂夫人渡江居豫章隨于璞往江州安城郡因居彼年八十三以成帝咸和九年青童淸虚又降授劒解之道稱疾隱化乘颷車往陽洛山明日有四十七眞人降教道法積十六年西母與金闕南極同降迎夫人北詣上淸宫玉闕下受神鳳章龍衣虎帶丹飛裙十絕華幡流金火鈴九蓋芝軿九色之節雙珠月明神虎之符錦旂虎旌給西華玉女八景飛輿􅀇景九龍又受扶桑大帝君玉劄金文位爲紫虚元君領上眞司命主諸學道死生圗籍攝御三官􅀜校罪考又受金闕聖君青瓊板丹籙文位爲南缶夫人給曲晨飛蓋治天台大霍山洞臺}
