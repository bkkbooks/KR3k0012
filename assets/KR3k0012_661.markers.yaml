  - {type: variant, offset: 2507, length: 186, content: 極注名玉劄於是細書紫虛之宮朱書東華之閣刻名上清丹文錦籍空洞靈章曰真人彈雲璈吹九鳳之簫神州之笙其音逸響流激千尋後聖列紀曰上清金闕後聖君少好道樂真紫微上真天帝玉清宮賜紫蘂剛丹鳳璽得在上清中遊太極下治諸天封掌兆民仙誌曰凡修行太一之事真人之道不得有所拜伹心拜而已不形屈也思真行道通而無窮顯驗應期登真必速也黑籙上篇曰聖真仙者共行道德俱宗太玄戒文經曰太上真人居仙府中世人得仙者皆先過此, SBCK: 和}
