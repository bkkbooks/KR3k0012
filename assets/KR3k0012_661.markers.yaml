  - {type: variant, offset: 7, length: 1, content: 上, krp: 寶}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 靈藥上帝之竒物也下隂生重雲妙草皆仙之藥也得上品後天之老乃太上之所服非中仙之所寳其中品者有得服之後天之逰乃天真之所服非下仙之所及其次藥有九丹金液紫虹華英太清九轉五雲之漿𤣥霜絳雪騰躍三皇東瀛白香𤣥洲飛生八石千之威喜九光西流石膽東滄青錢髙丘餘粮積石瓊田太靈還丹盛以金蘭長光絳草雲童飛于此非地仙之所聞也其下藥茯苓菖蒲巨勝黄精之服類可以延年雖不得長享無期足以身生光澤得為地仙求道者要先慿此階漸而能致逺勝也若能呼吸服御保固神氣此上品自然之要道也且夫一人之身天付之以神地付之以形道付之以氣萬物草木亦如之身以道為本豈可不飬神固氣以全爾形也形神俱全上聖所貴王母命上元夫人出入㑹之書五嶽真圗五帝六早靈飛之符凡十二事以授帝不能用其道而多所惑焉後三祠王母不降其所授之書置栢梁臺上為天災所焚李少君觧形而去巫蟲事起帝愈悔恨又大茅君盈南治句曲之山元夀二年八月己酉南嶽真人赤君西城王君方諸葛青童並從王母降於茅盈之室又王母命上元夫人授盈二弟茅固茅􅇆太霄隐書其後紫雲元君魏華存齋戒於陽落山隠元之臺王母與金闕聖君降於臺中乘八景輿同詣清虛上宫傳玉清隠書數卷以授魏夫人時太虛真人等歌太極歌王母曰逍遥𤣥精際萬流無暫停哀此去留㑹刼盡天地傾當尋無中景不死亦不生體被自然道寂觀合大明南嶽挺真幹玉映耀影精有任靡其事虛心自受靈如㑹絳河曲相與樂未央王母復還龜臺三一}
