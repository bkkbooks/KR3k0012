  - {type: variant, offset: 2684, length: 6, content: 戎菽甘枲莖芹, krp: 之及飲惡與人共食即小唾其中而共者因涕其醬遂棄而俱不得食焉彼王公利欲取天下時乃樂與人分之及巳得而重愛不肯予是皆唾脠之類竹林七賢論曰鬲令袁毅爲政貪濁饋遺朝廷以營虚譽甞遺山濤絲百斤濤不欲異衆受之命懸之梁後毅事露案驗衆官吏至濤於梁上得絲巳數年塵埃封印如𥘉㑹稽典録曰周規字公圖太守唐鳯命爲功曹鳯中常侍衡之從兄恃中官專行貪暴規諌曰明府以負薪之才受剖符之任所謂力弱載重不惟㒹蹶方今聖治在上不容紕政明府以教人之職行桀紂之暴鳯怒縛規棰於閤内鳯後果以檻車徴虐釋名曰虐焅也凢疾或寒或熱先寒後熱兩疾似焅虐也說文曰虐殘也尚書曰無若丹朱傲虐是作又曰今啇王受弗恭上天降災下民沈湎冒色敢行暴虐毛詩北風刺虐也衛國並爲威虐百姓不親莫不相携持而去焉左傳曰隱公問於衆仲曰衛州吁其濟乎對曰臣聞以德和民不聞以亂夫州吁弑其君而虐用其民不務令德而欲以亂成必不免矣又曰莒犁比公生去疾及展輿旣立展輿又廢之犁比公虐國人患之十一月展輿因國人以攻莒}
  - {type: punctuation, offset: 2686, content: 、, id: KR3k0012_CHANT_492-bkkpn808}
  - {type: variant, offset: 2691, length: 0, content: '', SBCK: 殺之乃自立又曰楚公子圍殺大司馬蔿掩而取其室申無宇曰王子必不免善人國之主也王子相楚國將善是封植而虐之是禍國也又曰莒子展輿虐而好劒茍鑄劒必試諸人又曰楚使椒舉如晉求諸侯晉侯欲勿許司馬侯曰不可楚王方侈天其或}
