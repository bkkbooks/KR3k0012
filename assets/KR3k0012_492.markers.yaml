  - {type: variant, offset: 3423, length: 1, content: 食, SBCK: 殺之天下之人謂之來索言酷毒之極又曰韓滉在浙右也政令明察末年傷於嚴急廵内有犯令誅及隣伍死者數百人又俾推覆官分察情渉疑似必寘極法雖令行禁止而􅁈濫相㝷議者以滉㓜立貞廉晚途苛慘身未逹則飾情以進得其志則本質遂彰又曰竇軌毎臨戎對㓂經旬月身}
