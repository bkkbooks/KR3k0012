  - {type: variant, offset: 182, length: 483, content: 漢書曰項羽至烏江亭長艤舡待羽應劭曰艤止也孟康曰艤音蟻附舡著岸如淳曰南方謂整舡向岸曰艤謂羽曰江東雖小地方千里眾數十萬亦足王也願大王急渡今獨臣有舩漢軍至亡以渡羽歎曰乃天亡我何渡為且籍與江東子弟八千人渡而西今亡一人還縱江東父兄憐而王我我何面目見之哉縱彼不言籍獨不愧於心乎又曰文帝嘗病癰鄧通為上嗽吮之上不樂從容問曰天下誰㝡愛我者乎通曰莫若太子太子入問疾上使太子齰癰而難之已而聞通嘗為上齰之太子慚由是心恨通又曰直不疑南陽人也為郎事文帝其同舍有告歸誤持其同舍郎金去已而同舍郎覺亡金意不疑不疑曰有之買金償後告歸者至而歸金亡金郎大慚又曰朱買臣字翁子會稽人家貧好讀書不治產業常刈薪樵負戴相隨婦數止買臣無歌謳道中買臣逾益疾歌妻羞之求去又曰建始三年秋京師民無故相驚言大水至百姓奔走相蹂躪韋昭曰眾踐躪轢也老弱號呼長安中大亂天子親御前殿召公卿議大將軍鳳以為太后與上及後宮可御舟船令吏民上長安城以避水群臣皆從鳳議左將軍王商獨曰自古無道之國水猶不冒城郭今政治平世無兵革上下相安何因當有大水一日暴至此必訛言也不宜令上城重驚百姓上乃止有頃長安中稍定問之果訛言上於是美壯商之固守數稱其議而鳳大慚自恨失言, SBCK: ''}
