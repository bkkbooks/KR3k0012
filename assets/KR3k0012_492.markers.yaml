  - {type: variant, offset: 78, length: 2, content: 吳公, SBCK: 楚莊王欲納夏􅁎巫臣曰不可君召諸侯以討罪今納夏􅁎貪其色也貪色爲滛滛爲大罰又曰穆叔見孟孝伯語之曰趙孟將死矣其語偷大夫多貪求欲無厭齊楚不足與也又曰楚}
