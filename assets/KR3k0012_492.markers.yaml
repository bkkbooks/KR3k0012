  - {type: variant, offset: 2730, length: 0, content: '', SBCK: 能治天下以此日欲爲滛樂不聽政又曰懷王諸老將皆曰項羽爲人慓悍禍虐甞攻襄城襄城無噍􅀋如淳日噍音作􅀏反所過無不殘滅漢書曰江都建遊章臺宫人乗小舡以足蹈覆舡四人溺三人死後遊雷陂大風建使郎二人乗小舡入陂舡覆兩郎溺舡乍見乍没建臨觀大􅀏宫人有過輙令倮擊鼓居樹上乆者三十日乃衣或髠鉗以鈆杵舂不中程輙縱狼嚙殺之專爲滛虐又曰周由武帝即位吏治尚脩謹然由居二千石中最爲暴虐驕恣所愛者撓法活之所憎者曲法滅之又曰翟義起兵王莽發義父方進及先祖塚燒其棺椁夷滅三族及種嗣至皆同坑以􅁄五毒并葬之又曰翟義黨王孫慶至莽使太醫尚方與巧屠共刳剥之量度五臟以竹筳導脉}
  - {type: page-break, offset: 2730, content: '', id: KR3k0012_SBCK_492-7a}
  - {type: variant, offset: 2730, length: 0, content: '', WYG: 能治天下以此日飲為淫樂不聽政又曰懐王諸老将皆曰項羽為人慓悍禍虐甞攻襄城襄城無噍類如淳曰噍音作笑反所過無不殘滅漢書曰江都王建遊章臺宫使人乗小船以足蹈覆船四人溺三人死後逰雷陂大風建使郎二人乗小船入陂船覆兩郎溺船乍見乍没建臨觀大笑宫人有過輙令倮擊鼓居樹上久者三十日乃衣或髠鉗以鈆杵舂不中程輙縱狼嚙殺之專為淫虐又曰周陽由武帝即位吏治尚脩謹然由居二千石中最為暴虐驕恣所愛者撓法活之所憎者曲法滅之又曰翟義起兵王莽發義父方進及先祖塜燒其棺槨夷滅三族及種嗣至皆同􅒤以棘五毒并葬之又曰翟義黨王孫慶至莽使大醫尚方與巧屠共刳剥之量度五臟以竹筳導脉}
