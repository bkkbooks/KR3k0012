  - {type: variant, offset: 2132, length: 0, content: '', WYG: 令薨博士議謚曰萬無他才望直以宰相弟遂居清顯妄自夸擬曽無慙德案謚法因事有功曰襄貪以敗官曰墨宜謚曰襄墨公朝議直曰襄公又曰廣州北界有一水名曰貪水父老曰飲此水者皆使亷士變貪吳書曰薛綜上䟽曰交州刺史朱符多以鄉人虞稟劉彦之徒分作長史侵虐百姓强賦於民黄魚一頭収稻一秤百姓怨叛山賊並起燕書曰章該字宣恒為左長史太祖㑹群寮以該性貪故賜布百餘疋負而歸重不能勝乃至僵頓以媿辱之後魏書曰元脩義為}
