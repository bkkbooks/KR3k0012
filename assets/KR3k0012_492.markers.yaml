  - {type: variant, offset: 2031, length: 217, content: 已為老矣晦有慚色又曰何尚之在家常著鹿皮帽及拜開府天子臨軒百僚陪位沈慶之於殿廷戲之曰今何不著鹿皮冠慶之累辭爵命朝廷敦勸甚切尚之謂曰主上虛懷側席詎宜固辭慶之曰沈公不效何公去而復還也尚之有愧色又曰顧凱之為尚書吏部郎嘗於慶祖坐論江左人言顧榮袁淑謂凱之曰卿南人性怯懦豈作賊凱之正色曰卿反以忠義笑人淑有慚色唐書婁師德初狄仁傑未為宰相時師德嘗薦之及為宰相不知師德薦己數排師德令充外使則天嘗出師德書表示之仁傑大慚謂人曰吾為婁公所含如此方知不逮婁公遠矣, SBCK: 爲兒由是争餽金寳}
