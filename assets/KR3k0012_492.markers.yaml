  - {type: variant, offset: 1438, length: 328, content: 志行閑靜寡欲好學而貧常以耕蓻為事鄰人失犢乃認沖犢以歸後得犢於冰下大慚以犢還沖又曰王羲之傳時劉琰之為丹陽尹許詢嘗就琰之宿床帷新麗飲食豐甘詢曰若此保全殊勝東山劉曰卿若知吉凶由人吾安得保此羲之在坐曰令巢許遇稷契當必無此言二人並有愧色又曰嵇紹嘗詣齊王冏咨事遇冏燕會召董艾葛旟等共論時政艾言於冏曰嵇侍中善於絲竹公可令操之左右進琴紹推不受冏曰今日為歡卿何希此耶紹對曰公匡復社稷當軌物作則垂之於後紹虛鄙忝備常伯腰紱冠冕鳴玉殿省豈有操執絲竹以為伶人之事若釋公服從私宴所不敢辭也冏大慚又曰庾亮傳初亮所乘馬有的顱殷浩以為不利於主勸亮賣之亮曰曷有己之不安而移之於人浩慚而退又曰王羲之傳素與王述不協先是王羲之常謂賓友曰懷祖正當作尚書恥投老可得僕射更求會稽便自邈然及述蒙顯授羲之恥為, SBCK: 忤意者輙彈}
