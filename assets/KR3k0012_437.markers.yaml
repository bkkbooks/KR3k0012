  - {type: punctuation, offset: 2739, content: 『, id: KR3k0012_CHANT_437-bkkpn688}
  - {type: variant, offset: 2739, length: 748, content: 古者亦有徒以勇力立於世者乎晏子對曰嬰聞之輕死以行理謂之勇誅暴不避強謂之力故勇力之立也以行理義也今公自奮乎勇力不顧乎行暴尚勇力之士無忌於國身立威疆行流淫暴貴戚不薦善偪邇不引過反聖王之德而脩滅君之行用此存者嬰未嘗聞有也吳越春秋曰專諸豊邑人伍子胥初去楚如吳時遇之於塗專諸方與人鬭其怒有萬人之氣甚不可當其妻一呼即還子胥怪而問其壯何夫子怒之盛聞一女子之聲而即折道寧有說乎專諸曰子視吾之儀寧類愚者耶何言之鄙也夫屈一人之下必申萬人之上子胥因相決之推顙深目虎口鷹背戾於從難知其勇士也又曰伍子胥見吳王僚王僚望其顏色甚可畏長一丈大十六圍眉間一尺僚與語三日辭無復者賢人也子胥知王好之每入言語侃侃有勇壯之氣也孔演漢魏春秋曰許褚之為人長八尺餘大十圍容貌甚雄勇力絕人漢末賊起禇在汝南與少年相藂及宗族數千家共堅壁相保曹公脩兵汝南褚以其眾歸公公見而壯之曰此樊噲也即日拜都尉引入宿衛諸從褚俠客皆為虎士出入周旋不離左右軍中以褚力如虎癡勇號曰癡虎至今天下稱之皆謂其姓名也吳均齊春秋曰戴僧靜會稽永興人臨湘侯副大祖在淮陰雅有人鑒見而賞之會匈奴卒至僧靜應募出戰單力直前虜騎奔退又斬三級時天盛寒乃脫衣口銜三頭以刀插背拍浮而還臨湘侯大賞之曰殺三人亦可反命矣進之於太祖石頭之役功冠諸將遂至貴顯蕭方等三十國春秋曰符洛雄勇多力猛氣絕人坐制奔牛射洞犁耳符堅深憚之故常為邊守又曰劉陽少驍猛甚有勇力手曳牛尾卻行百步又曰趙將麻秋命黑槊龍騰三千人馳擊謝艾軍艾左右擾動李偉勸艾乘馬艾不從乃下踞胡床而麾眾趙人以為有伏懼而不進韓詩外傳曰衛靈公晝寢而起志氣益衰使人馳召勇士公孫悁道遭行人卜商子夏曰何馳之疾也對曰君晝寢而起使我馳召勇士公孫悁子夏曰微悁而勇若悁者可乎御曰可子夏曰戴我而反至君曰延先生上起召公孫悁俄而悁至入門拔劍疾呼曰商不我取若頭子夏顧叱之曰咄內劍吾將與若言, SBCK: ''}
