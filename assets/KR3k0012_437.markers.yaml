  - {type: variant, offset: 1521, length: 1193, content: 魚俱羅馮翊下邽人也身長八尺膂力絕人聲氣雄壯言聞數百步又曰權武少果勁勇力絕人能重甲上馬嘗倒投於井未及泉復躍而出其拳捷如此又曰長孫晟突厥之內大畏長孫總管聞其弓聲謂為霹靂見其走馬稱為閃電王笑曰將軍震怒威行域外遂與雷霆為比一何壯哉唐書曰丘行恭從討王世充會戰於邙山之上太宗欲知其虛實強弱乃與數十騎衝之直出其後眾皆披靡莫敢當其鋒所殺傷甚眾既而限以長堤與諸騎相失唯行恭獨從尋有勁騎數人追及太宗矢中御馬行恭乃迴騎射之發無不中餘賊不敢復前然後下馬拔箭以其所乘馬進太宗行恭於御馬前步執長刀巨躍大呼斬數人突陣而出得入大陣貞觀中有詔刻石為人馬以象行恭拔箭之狀立於昭陵闕前又曰淮陽王道玄拜洛州總管及府廢改授洛州刺史五年劉黑闥引突厥寇河北復授山東道行軍總管師次下博與賊軍遇道玄帥騎先登命副將史萬寶督軍繼進萬寶與之不協及道玄深入而擁兵不進謂所親曰吾奉手詔言淮陽小兒雖名為將而軍之進止皆委吾今其輕銳越濘交戰大軍道動必滔泥溺莫如結陣以待之雖不利於王而利於國道玄遂為賊所禽全軍盡沒唯萬寶逃歸道玄遇害年十九太宗追悼久之嘗從容謂侍臣曰道玄終始從朕見朕深入賊陣所向必剋意嘗企慕所以每陣先登蓋學朕也惜其年少不遂遠圖因為之流涕又曰王君廓鎮幽州會突厥入寇君廓邀擊破之俘斬二千餘人獲馬五千疋高祖大悅徵入朝賜以御馬令於殿庭乘之而出因謂侍臣曰吾聞藺相如叱秦皇目皆出血君廓往擊竇建德將出戰李勣遏之君廓發憤大呼目及鼻耳一時流血此之壯氣何謝古人不可以常例賞之復賜錦袍金帶還鎮幽州又曰劉世讓為并州總管統兵屯於鴈門突厥處羅可汗與高開道苑君璋合眾攻之甚急鴻臚卿鄭元璹先使在蕃可汗合元璹來說之世讓厲聲曰大夫奈何為夷狄作說客耶經月餘虜乃退及元璹還述世讓忠勇高祖下制褎美之又曰李嗣業賊將李歸仁初以銳師數來挑戰我師攢矢而逐之賊軍大至逼我追騎突入我營我師囂亂嗣業謂郭子儀曰今日之事若不以身啖寇決戰於陣萬死而冀其一生不然則我軍無子遺矣嗣業乃脫衣徒搏執長刀立於陣前大呼當嗣業刀者人馬俱碎殺十數人陣容方駐前軍之士盡執長刀而出如牆而進嗣業先登奮命所向摧靡又曰張濬拜諫議大夫其年冬宰相王鐸至滑臺兼充天下行營都統方徵兵諸侯奏用濬為都統判官時王敬武初破弘霸郎軍大振累詔徵平盧兵敬武獨不赴援鐸遣濬往說之敬武已授偽命復怙強不迎詔使濬至謁見責之曰公為天子守藩王臣齎詔宣諭而侮慢詔使既未識君臣禮分復何顏以御軍民哉敬武愕然謝咎既宣詔軍士按兵默然濬並召將佐集於鞠場面諭之曰人生效忠仗義所冀粗分逆順懸知利害黃巢前日販鹽虜耳公等捨累葉夫子而臣販鹽白丁何利害之可論耶今諸侯勤王天下響應公等獨據一州坐觀成敗賊平之後去就何安若能此際排難解紛陳師鞠旅共誅寇盜迎奉鑾輿則富貴功名指掌可取吾惜公輩捨安而即危也諸將改容引過謂敬武曰諫議之言是也即時出軍從濬入援京師晏子春秋曰昔夏之衰也有推移大戲殷之衰也有費仲惡來足走千里手裂兕虎任之以力凌轢天威專行勇力不顧乎義理是以桀紂以滅殷夏以衰又曰莊公奮乎勇力不顧於行尚, SBCK: ''}
  - {type: variant, offset: 1521, length: 1193, content: 魚俱羅馮翊下邽人也身長八尺膂力絕人聲氣雄壯言聞數百步又曰權武少果勁勇力絕人能重甲上馬嘗倒投於井未及泉復躍而出其拳捷如此又曰長孫晟突厥之內大畏長孫總管聞其弓聲謂為霹靂見其走馬稱為閃電王笑曰將軍震怒威行域外遂與雷霆為比一何壯哉唐書曰丘行恭從討王世充會戰於邙山之上太宗欲知其虛實強弱乃與數十騎衝之直出其後眾皆披靡莫敢當其鋒所殺傷甚眾既而限以長堤與諸騎相失唯行恭獨從尋有勁騎數人追及太宗矢中御馬行恭乃迴騎射之發無不中餘賊不敢復前然後下馬拔箭以其所乘馬進太宗行恭於御馬前步執長刀巨躍大呼斬數人突陣而出得入大陣貞觀中有詔刻石為人馬以象行恭拔箭之狀立於昭陵闕前又曰淮陽王道玄拜洛州總管及府廢改授洛州刺史五年劉黑闥引突厥寇河北復授山東道行軍總管師次下博與賊軍遇道玄帥騎先登命副將史萬寶督軍繼進萬寶與之不協及道玄深入而擁兵不進謂所親曰吾奉手詔言淮陽小兒雖名為將而軍之進止皆委吾今其輕銳越濘交戰大軍道動必滔泥溺莫如結陣以待之雖不利於王而利於國道玄遂為賊所禽全軍盡沒唯萬寶逃歸道玄遇害年十九太宗追悼久之嘗從容謂侍臣曰道玄終始從朕見朕深入賊陣所向必剋意嘗企慕所以每陣先登蓋學朕也惜其年少不遂遠圖因為之流涕又曰王君廓鎮幽州會突厥入寇君廓邀擊破之俘斬二千餘人獲馬五千疋高祖大悅徵入朝賜以御馬令於殿庭乘之而出因謂侍臣曰吾聞藺相如叱秦皇目皆出血君廓往擊竇建德將出戰李勣遏之君廓發憤大呼目及鼻耳一時流血此之壯氣何謝古人不可以常例賞之復賜錦袍金帶還鎮幽州又曰劉世讓為并州總管統兵屯於鴈門突厥處羅可汗與高開道苑君璋合眾攻之甚急鴻臚卿鄭元璹先使在蕃可汗合元璹來說之世讓厲聲曰大夫奈何為夷狄作說客耶經月餘虜乃退及元璹還述世讓忠勇高祖下制褎美之又曰李嗣業賊將李歸仁初以銳師數來挑戰我師攢矢而逐之賊軍大至逼我追騎突入我營我師囂亂嗣業謂郭子儀曰今日之事若不以身啖寇決戰於陣萬死而冀其一生不然則我軍無子遺矣嗣業乃脫衣徒搏執長刀立於陣前大呼當嗣業刀者人馬俱碎殺十數人陣容方駐前軍之士盡執長刀而出如牆而進嗣業先登奮命所向摧靡又曰張濬拜諫議大夫其年冬宰相王鐸至滑臺兼充天下行營都統方徵兵諸侯奏用濬為都統判官時王敬武初破弘霸郎軍大振累詔徵平盧兵敬武獨不赴援鐸遣濬往說之敬武已授偽命復怙強不迎詔使濬至謁見責之曰公為天子守藩王臣齎詔宣諭而侮慢詔使既未識君臣禮分復何顏以御軍民哉敬武愕然謝咎既宣詔軍士按兵默然濬並召將佐集於鞠場面諭之曰人生效忠仗義所冀粗分逆順懸知利害黃巢前日販鹽虜耳公等捨累葉夫子而臣販鹽白丁何利害之可論耶今諸侯勤王天下響應公等獨據一州坐觀成敗賊平之後去就何安若能此際排難解紛陳師鞠旅共誅寇盜迎奉鑾輿則富貴功名指掌可取吾惜公輩捨安而即危也諸將改容引過謂敬武曰諫議之言是也即時出軍從濬入援京師晏子春秋曰昔夏之衰也有推移大戲殷之衰也有費仲惡來足走千里手裂兕虎任之以力凌轢天威專行勇力不顧乎義理是以桀紂以滅殷夏以衰又曰莊公奮乎勇力不顧於行尚, WYG: ''}
