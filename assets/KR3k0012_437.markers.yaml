  body:
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 六勇五盛弘之荆州記曰襄陽城北河水極深先有蛟年常爲害太守鄧遐氣果兼人拔劔入水蛟繞其足遐因揮劔截蛟數叚流血丹水自此無復蛟患于寳搜神記曰東越閩中有虚領髙數十里下北隰中有大虵長}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 六勇五盛𢎞之荆州記曰襄陽城北河水極深先有蛟年常為害太守鄧遐氣果兼人抜劔入水蛟繞其足遐因揮劔截蛟數叚流血丹水自此無復蛟患干寳捜神記曰東越閩中有虛嶺髙數十里下北隰中有大蛇長}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_437-1b, image: WYG0897/WYG0897-0042b.png}
  - {type: variant, offset: 5, length: 0, content: '', krp: 六勇五盛弘之荆州記曰襄陽城北河水極深先有蛟年常爲害太守鄧遐氣果兼人拔劔入水蛟繞其足遐因揮劔截蛟數叚流血丹水自此無復蛟患于寳搜神記曰東越閩中有虚領髙數十里下北隰中有大虵長}
