  - {type: variant, offset: 256, length: 11, content: 謀略治軍清整常以少擊多, SBCK: 大勇􅁀強者聚爲一卒名曰䧟陳之}
  - {type: variant, offset: 256, length: 484, content: 謀略治軍清整常以少擊多士眾服其智勇名冠諸將又曰楊播字延慶自云弘農華陰人也除左將軍尋假前將軍隨車駕南討至鍾離師迴詔播領步卒三千騎五百為眾軍殿時春水初長賊眾大至舟艦塞川播以諸軍渡淮未訖嚴練南岸身自居後諸軍賊眾遂集於是圍播數重播乃為圓陳以禦之身自搏擊斬殺甚多相拒再宿軍人食盡賊圍更急高祖在北而望之既無舟舡不得救援水勢稍減播領精騎三百歷其舩大呼曰今我欲渡能戰者出賊莫敢動遂擁眾而濟高祖甚壯之賜爵華陰子又曰河間公齊烈帝之玄孫也少雄傑魁岸世祖愛其勇壯引侍左右從征赫連昌世祖馬蹶賊眾逼帝齊以身蔽捍決死擊賊賊乃退又曰賈思伯字仕休齊郡益都人也世宗即位加輔國將軍任城王之圍鍾離也以思伯持節為其軍司及失利思伯為後殿以思伯儒者謂之必死及至大喜曰仁者必勇常謂虛談今於軍司見之矣又曰于栗磾代人也少習武藝拜冠軍將軍道武畋于白登山見熊領數子道武顧謂栗磾曰能縛之乎栗磾曰能道武曰若搏之不勝豈不虛斃一壯士耶栗磾曰自可能致御前坐而制之尋而擒之晉將劉裕遺栗磾書曰黑稍將軍磾常好持黑矟故有其號又曰楊大眼武都氐王難當之孫也少驍勇趫捷走如飛電宣武南征尚書李冲典選統校征官大眼往求征焉冲不許大眼曰尚書不見知聽下官出一, WYG: ''}
  - {type: variant, offset: 256, length: 11, content: 謀略治軍清整常以少擊多, krp: 大勇暴強者聚爲一卒名曰䧟陳之}
