  - {type: variant, offset: 4274, length: 2, content: 燕國, SBCK: 得寳劔於江干遂還反渉江至於中流有兩蛟夾繞其舩佽飛曰子嘗見兩蚊繞舩而活者乎舩人曰未之嘗見也佽飛攘臂祛衣拔寳劔曰此江中之腐肉朽骨也持劔赴江刺蛟殺之而復上舩舟中之人皆得活荆王聞之仕以執圭抱朴子曰赴白刄而忘生格兕虎於谷者勇}
  - {type: variant, offset: 4274, length: 2, content: 燕國, krp: 得寳劔於江干遂還反渉江至於中流有兩蛟夾繞其舩佽飛曰子嘗見兩蚊繞舩而活者乎舩人曰未之嘗見也佽飛攘臂祛衣拔寳劔曰此江中之腐肉朽骨也持劔赴江刺蛟殺之而復上舩舟中之人皆得活荆王聞之仕以執圭抱朴子曰赴白刄而忘生格兕虎於谷者勇}
