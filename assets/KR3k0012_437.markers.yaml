  - {type: variant, offset: 3903, length: 341, content: 不知退不量力而輕敵莊公曰以此為人必為天下勇士矣於是迴軍避之勇士歸之虞溥江表傳曰曹公出濡須號步騎四十萬臨江飲馬孫權帥眾七萬應之使甘寧領二千人為前部督權密勑寧使夜入魏軍寧乃選手下健兒百餘人徑詣公營下便拔鹿角踰疊入營斬得數十級北軍驚駭鼓譟舉火如星寧已還入營作鼓吹稱萬歲因見權權曰聊以觀卿膽耳即賜絹千疋刀百口權曰孟德有張遼孤有興霸足相敵也停住月餘北軍乃退劉向列士傳曰秦召公子無忌無忌不行使朱亥奉璧一雙謝秦秦王大怒執朱亥著虎圈中瞋目視虎終不敢動殷氏世傳曰亮字子華少好學年四十舉孝廉到陽城遇兩虎爭一羊馬不敢進於是亮乃按劍直至虎所斬羊腹虎乃各得其半去時人為之謠曰石里之勇殷子華暴虎見之合爪牙劉昭幼童傳曰魏太祖幼而智勇年十歲嘗浴於譙水有蛟來逼自水奮蛟乃潛退於是畢浴而還弗之言也後有人見大虵奔逐太祖笑, SBCK: 吿}
