  - {type: variant, offset: 2718, length: 16, content: 無忌於國貴戚不薦善偪邇不引過故晏, SBCK: 老}
  - {type: variant, offset: 2718, length: 0, content: '', WYG: 老子曰勇於敢則殺勇於不敢則活荘子曰孔子遊於宋匡人圍數匝而弦歌不輟何也子曰由來吾語爾夫水行不避蛟龍者漁父之勇也陸行不避兕虎者獵夫之勇也白刃交於前視死若生者烈士之勇也聖人知窮之有命知勇之有持臨大難而不懼聖人之勇也由處矣吾命有所制矣}
  - {type: variant, offset: 2718, length: 16, content: 無忌於國貴戚不薦善偪邇不引過故晏, krp: 老}
  - {type: variant, offset: 2719, length: 1, content: 忌, WYG: 幾何持甲者進辭曰以為陽虎故圍之今非請辭而退又曰田光答太子曰竊觀太子客無可用者夏扶血冦之人怒而面赤宋臆脉勇之人怒而面青武陽骨勇之人怒而面白光所知荆軻神勇之人怒而色不變又曰闔廬試其民}
