  - {type: variant, offset: 4280, length: 1, content: 二, SBCK: 餘人由此觀之譽足殺人矣孟子曰晉有馮婦者善􅅮虎野有衆搏虎虎􅀒隅莫敢攖馮婦趍而迎之攘臂而下車衆皆恱之趙歧日馮姓婦名也又曰梁惠王曰寡人有疾寡人好勇孟子對曰王請無好小勇撫劔疾視曰彼惡敢當我哉此匹夫之勇敵一人者也詩云王赫斯怒爰整其旅}
  - {type: variant, offset: 4280, length: 1, content: 二, krp: 餘人由此觀之譽足殺人矣孟子曰晉有馮婦者善搏虎野有衆搏虎虎負隅莫敢攖馮婦趍而迎之攘臂而下車衆皆恱之趙歧日馮姓婦名也又曰梁惠王曰寡人有疾寡人好勇孟子對曰王請無好小勇撫劔疾視曰彼惡敢當我哉此匹夫之勇敵一人者也詩云王赫斯怒爰整其旅}
  - {type: punctuation, offset: 4281, content: ，, id: KR3k0012_CHANT_437-bkkpn1116}
  - {type: 'tls:seg', offset: 4281, content: '', id: KR3k0012_CHANT_437-38a.6}
  - {type: variant, offset: 4282, length: 0, content: '', SBCK: 遏徂莒以篤周祜以對于天下此文王之勇也一人衡行於天下武王耻之此武王之勇也武王一怒而安天下之民今王亦一怒而安天下之民民唯恐王之不好勇也楊雄法言曰或問勇曰軻也曰何軻也曰軻也者謂孟軻􅀂荆軻君子盗諸或問孟軻之勇曰勇於義而果於德不以貧冨貴賤死生動其心於勇也其庶乎孫卿子曰有三勇上不脩亂世之君下不脩亂世之民無貧窮富貴天下知之則欲與天下共樂不知之則塊然獨立天地之間而不畏是上勇也禮恭意儉輕貨惟賢有不肖者敢授而廢之是中勇也輕身重貨以斯勝人爲意是下勇也尸子曰孟賁曰生乎勇乎曰勇貴乎勇乎曰勇富乎勇乎曰勇三者人之所難而皆不足以易勇此其所能懾三軍服猛獸者也又曰田成子問勇顔歜聚之荅也不敬田子之僕填劔曰更言則生不更則死歜聚曰以死爲有智今吾生是也是吾所以懼汝而反以懼我又曰聖人畜仁而不主仁畜智而不主智畜勇而不主勇昔者齊桓公脅於魯君而獻地百里勾踐脅於㑹稽而身宦之三年襄子脅於智伯而以顔爲愧其卒桓公臣魯君勾踐滅呉襄子以智伯爲戮此謂勇而能怯者也慎子曰有勇不以怒反與怯均也胡非子曰夫曹劌匹夫徒歩之士布衣柔履之人也唯無怒一怒而刼萬乗之師存千乗之國此謂君子之勇勇之貴者也又曰屈將子好勇見胡非而問曰聞先生非闘有􅀃則可無􅀃則死胡非曰吾聞勇有五等夫􅀒長劔赴蓁薄折兕豹􅅮熊羆獵徒之勇也􅀒長劔赴深泉折蛟龍􅅮黿鼉漁人之勇也登髙危之上鶴立四望顔色不變陶匠之勇也􅀂迕視必殺立刑之勇也昔齊桓公伐魯曹劌聞之觸齊軍見桓公曰臣聞君辱臣死君退師則可不退則臣以血濺君矣桓公懼管仲曰許與之盟而退夫曹劌疋夫一怒而却齊侯之師此君子之勇晏嬰疋夫一怒而沮崔子之亂亦君子之勇也五勇不同公子將何處屈將恱稱善乃解長劔釋危冠而請爲弟子焉淮南子曰桀之力申鈎索䥫揉金椎移大犧水殺黿鼉陸􅅮熊羆然湯革車三百乗困之鳴條禽之焦門由此觀之則勇不足以爲天下矣智不足以恃勇不足爲強張華􅀶物志曰賁育之勇劉義慶徐州先賢讃曰徐盛字文響琅瑘莒人也遭亂客居呉以敦直}
