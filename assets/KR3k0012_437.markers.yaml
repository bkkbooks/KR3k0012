  - {type: variant, offset: 3498, length: 296, content: 夏曰來吾嘗與子從君而北見趙簡子趙簡子被髮仗矛而見我君從十三行之後趍而進曰諸侯相見不宜不朝服君不朝服行人卜商將以頭血濺君之衣矣使反朝服而見吾君者子耶我耶悁曰子也子夏曰子之勇不若我一矣又與子從君而東至海曹齊君重鞇而坐從十三行之後趍進曰諸侯相見不宜相臨以其一鞇而去之者子耶我耶悁曰子也子夏曰子之勇不若我二矣又與子從君於囿中於是兩軍逐我君與拔矛格而還之者子耶我耶悁曰子也子夏曰子之勇不若我三矣所貴為士者上不攝萬乘下不放乎疋夫外立節矜敵而不侵掠內禁殘害而君不危殆是士之所長而君子之所致貴也若夫以長掩短以眾暴寡凌轢無罪之民而威於閭巷之間者是士之甚毒而君子之所致惡也於是靈公避席曰抑乎寡人雖不敏請從先生勇又, SBCK: ''}
