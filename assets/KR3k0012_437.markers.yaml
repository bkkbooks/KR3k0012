  - {type: variant, offset: 2735, length: 0, content: '', WYG: 肉也我肉也尚胡求肉於是飲酒已因抽刀而相㗖至死止勇若此不若無勇又曰齊荘公時有士曰賓卑聚夢有壮士白縞之冠束布之衣素履黒劔從叱之唾其面􅅥然而寤徒夢也明召其伎而告之曰吾少好勇年十六而無所挫辱今夜辱吾将索之得之則可不得将死之每朝立乎衢三日不得退而自殺又曰兵天下之凶器也勇天下之凶徳也舉凶器行凶徳由不得已也吕氏春秋曰荆有攸飛者得寳劔于江干遂還及渉江至于中流有兩蛟夾繞其船攸飛曰子嘗}
