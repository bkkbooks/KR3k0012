  - {type: punctuation, offset: 102, content: 『, id: KR3k0012_CHANT_437-bkkpn26}
  - {type: variant, offset: 102, length: 0, content: '', SBCK: 此乃庸夫庶人之怒耳非布衣韋帶士之怒也夫專諸刺王僚彗星襲月奔星晝出要離刺王子慶忌倉鷹擊於臺上聶政刺韓王白虹貫曰此三者皆布衣怒也與臣將四士無怒則巳一怒伏尸二人流血五歩即案其匕首起視秦王曰今將是矣王色變長跪曰先生就坐寡人喻矣􅋣陵獨以五十里在者徒用先王故乎史記鄒陽上書曰白起長平之謀太白食昴荆軻慕燕丹之義白虹貫日又曰林旣衣韋衣而朝齊景公景公曰此君子之服耶小人之服􅁘林旣作色曰夫服事何足以揣士行乎昔荆爲長劔危冠令尹子西出焉齊桓短衣而遂溝之冠管仲隰朋出焉越文身翦髮范蠡大夫種亦出焉西戎左祍而組結由餘亦出焉如君言衣大裘者}
  - {type: page-break, offset: 102, content: '', id: KR3k0012_SBCK_437-4a}
