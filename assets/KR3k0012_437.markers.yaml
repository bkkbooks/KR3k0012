  - {type: variant, offset: 6, length: 0, content: '', SBCK: 八丈大十餘圍常病都尉及長吏下夢巫覡欲得啖童女常八月朝􅀕送虵穴虵輙吞之巳用九女將樂李誕有小女名􅀉應募而行乃請好劔咋虵犬作數斛餈疾資切􅁡灌之以置穴口虵出頭大如囷目如二尺鏡先啖餈􅀉便放犬虵以劔斫殺得九女髑髏越王乃以􅀉爲后漢末英雄記曰公孫瓉除遼東屬國長史連接邊宼毎有驚輙厲色憤怒如赴讎敵望塵奔繼之夜戰虜識瓉聲憚其}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_437-1b}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 八丈大十餘圍常病都尉及長吏下夢巫覡欲得啖童女常八月朝祭送蛇穴蛇輙吞之已用九女将樂李誕有小女名寄應募而行乃請好劔咋蛇犬作數斛餈疾資切蜜灌之以置穴口蛇出頭大如囷目如二尺鏡先啖餈寄便放犬蛇以劔斫殺得九女髑髏越王乃以寄為后漢末英雄記曰公孫瓉除遼東屬國長史連接邉冦每有警輙厲色慣怒如赴讐敵望塵奔繼之夜戰虜識瓉聲憚其}
