  - {type: variant, offset: 6, length: 0, content: '', krp: 八丈大十餘圍常病都尉及長吏下夢巫覡欲得啖童女常八月朝祭送虵穴虵輙吞之巳用九女將樂李誕有小女名寄應募而行乃請好劔咋虵犬作數斛餈疾資切蜜灌之以置穴口虵出頭大如囷目如二尺鏡先啖餈寄便放犬虵以劔斫殺得九女髑髏越王乃以寄爲后漢末英雄記曰公孫瓉除遼東屬國長史連接邊宼毎有驚輙厲色憤怒如赴讎敵望塵奔繼之夜戰虜識瓉聲憚其}
  - {type: variant, offset: 7, length: 5, content: 四崔鴻十六, SBCK: 莫敢犯之與魏書語别故兩出越絶書曰越王請臣於呉呉王許之子胥大怒目􅀂夜光聲􅀂哮虎曰此越未戰而服天以賜呉其逆天乎臣唯君王急制之呉王不聽遂許之又曰闔閭惡王子慶忌問於伍子胥子胥曰臣有所厚於}
  - {type: variant, offset: 7, length: 5, content: 四崔鴻十六, WYG: 莫敢犯之越絶書曰越王請臣於吳吳王許之子胥大怒目若夜光聲若哮虎曰此越未戰而服天以賜吳其逆天乎臣唯君王急制之吳王不聽遂許之又曰闔閭惡王子慶忌問於伍子胥子胥曰臣有所厚於}
