  - {type: variant, offset: 4285, length: 0, content: '', SBCK: 魏王出濡湏孫權毎選出戰者盛常在前魏甞大出撗江盛與諸將俱赴討時乗艦遇風落岸下諸將恐懼未有出者盛獨將上斫賊賊三披走所傷殺甚衆風止得還權大壯之應璩與許子俊書曰足下以方剛之盛年應不羈之勁勇將發虓虎之威致霜雪之誅擒呉梟蜀定功萬里而劉備不下山孫權不出水武力不􅁬猛氣畜勇其毒如何蔡謨書曰祖士稚昔葬雍丘城内祖約在壽春時賊據雍丘約遣路永將數百}
