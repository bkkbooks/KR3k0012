  - {type: variant, offset: 35, length: 2, content: 機巧, SBCK: 爲齊王使於呉過淮津欲飲馬水神出取菑丘訢大怒偏􅃝操劔入水與戰殺兩蛟一龍連日乃出耿其左目遂之呉㑹於友人之座訢恃其與神戰之勇輕士大夫要離與之對座即謂之曰吾聞勇士之戰也與日戰者不穆表與􅀑戰者不旋踵與人戰者不逹聲生徃死還不受其辱今子與神戰於泉水之中亡馬失御又受耿目之病形殘名辱勇士所恥自驕於友人之旁何其忍􅀒也於是菑丘訢卒於結恨􅀔怒未及}
  - {type: page-break, offset: 35, content: '', id: KR3k0012_SBCK_437-2a}
  - {type: variant, offset: 35, length: 2, content: 機巧, WYG: 為齊王使於吳過淮津欲飲馬水神出取菑丘訴大怒偏袒操劔入水與戰殺兩蛟一龍連日乃出眇其左目遂之吳㑹於友人之座訴恃其與神戰之勇輕士大夫要離與之對座即謂之曰吾聞勇士之戰也與日戰者不移表與鬼戰者不旋踵與人戰者不達聲生往死還不受其辱今子與神戰於泉水之中亡馬失御又受眇目之病形殘名辱勇士所恥自驕於友人之旁何其忍負也於是菑丘訴卒於結恨勢怒未及}
  - {type: page-break, offset: 35, content: '', id: KR3k0012_WYG_437-2b, image: WYG0897/WYG0897-0042d.png}
