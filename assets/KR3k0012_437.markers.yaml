  - {type: variant, offset: 3959, length: 2, content: 帥眾, WYG: 每選出戰者盛常在前魏嘗六出横江盛獨與諸将俱赴討時乘艦遇風落岸下諸将恐懼未有出者盛獨将上斫賊賊三披走所傷殺甚衆風止得還權大壯之應璩與許子俊書曰足下以方剛之盛年應不覊之勁勇将發虓虎之威致霜雪之誅擒吳梟蜀定功萬里而劉備不下山孫權不出水武力不奮猛氣畜氣勇其毒如何蔡謨書曰祖士雅昔𦵏雍丘城内祖約在夀春時賊據雍丘約遣路永将數百人夜縁入雍丘城戰并開墓䄡裘踰城出還夀春永勇如此太平御覽卷四百三十}
