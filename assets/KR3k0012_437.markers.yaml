  - {type: variant, offset: 3031, length: 266, content: 孔演漢魏春秋曰許褚之為人長八尺餘大十圍容貌甚雄勇力絕人漢末賊起禇在汝南與少年相藂及宗族數千家共堅壁相保曹公脩兵汝南褚以其眾歸公公見而壯之曰此樊噲也即日拜都尉引入宿衛諸從褚俠客皆為虎士出入周旋不離左右軍中以褚力如虎癡勇號曰癡虎至今天下稱之皆謂其姓名也吳均齊春秋曰戴僧靜會稽永興人臨湘侯副大祖在淮陰雅有人鑒見而賞之會匈奴卒至僧靜應募出戰單力直前虜騎奔退又斬三級時天盛寒乃脫衣口銜三頭以刀插背拍浮而還臨湘侯大賞之曰殺三人亦可反命矣進之於太祖石頭之役功冠諸將遂至貴顯蕭方等三十國春秋曰符洛雄勇多力猛氣絕人坐制奔牛射洞犁耳符堅深憚之故常為邊守, WYG: ''}
