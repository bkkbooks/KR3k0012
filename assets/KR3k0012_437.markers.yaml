  - {type: 'tls:seg', offset: 40, content: '', id: KR3k0012_CHANT_437-1a.7}
  - {type: variant, offset: 42, length: 2, content: 善騎, SBCK: 士有受不還報荅之怒餘恨忿志􅄀必來矣慎母閉門菑丘訢果徃入門不閉登堂不􅀜入室不守放髪僵卧訢乃手拔劔而捽要離曰子有三當死之過子知之乎要離曰吾不知也菑丘訢曰子辱吾於大座之衆一死也歸不閉門二死也卧不守衛三死也子有三死之過雖欲勿怒其得乎哉要離曰吾無三死之過子有三不肖之媿子知之乎菑丘訢曰吾不知要離曰吾辱子於千人之衆子不報荅是一不肖也入門不駭登堂無聲是二不肖也先拔劔手持頭乃敢有言是三不肖也子有三不肖之媿而欲滅我豈不鄙哉於是菑丘訢仰天歎曰吾之勇也人莫敢有訾吾者􅀂斯要離乃加吾之上此天下壯士也劉彦明敦煌實録曰索苞有文武材舉孝廉除郎中毎征伐尅敵勇冠三軍時人比之􅀜羽宋澄於金城爲歩羗三千人所圍窮守􅀌塠垂當破没苞以完􅀐五千􅁬劔突陣徑入與澄對坐搥頭拊掌大􅀏羌皆佩楯擢刀四面直前苞謂澄曰君但安心觀我擊之乃除彄弓接矢繞搥}
  - {type: page-break, offset: 42, content: '', id: KR3k0012_SBCK_437-2b}
  - {type: variant, offset: 42, length: 1, content: 善, WYG: 士有受不還報答之怒餘恨忿志㝠必來矣慎毋閉門菑丘訴果往入門不閉登堂不關入室不守放髪僵卧訢乃手抜劔而指要離曰子有三當死之過子知之乎要離曰吾不知也菑丘訴曰子辱吾於大座之衆一死也歸不閉門二死也臥不守衛三死也子有三死之過雖欲勿怒其得乎哉要離曰吾無三死之過子有三不肖之媿子知之乎菑丘訴曰吾不知要離曰吾辱子於千人之衆子不報答是一不肖也入門不駭登堂無聲是二不肖也後抜劔手持頭乃敢有言是三不肖也子有三不肖之媿而欲威我豈不鄙哉於是菑丘訴仰天歎曰吾之勇也人莫敢有訾吾者若斯要離乃加吾之上此天下壯士也劉彦明敦煌實録曰索苞有文武才舉孝亷除郎中每征伐剋敵勇冠三軍時人比之關張宋澄於金城為歩羗三千人所圍窮守孤城垂當破沒苞以完}
  - {type: page-break, offset: 42, content: '', id: KR3k0012_WYG_437-3b, image: WYG0897/WYG0897-0043b.png}
