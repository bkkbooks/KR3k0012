  - {type: variant, offset: 2730, length: 4, content: 引過故晏, WYG: 闘大兵不冦又曰齊之好勇者其一人居東郭其一人居西郭卒然相遇於塗曰姑相與飲乎􅜠數行曰姑求肉乎一人曰}
