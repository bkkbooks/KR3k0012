  - {type: variant, offset: 679, length: 560, content: 其號又曰楊大眼武都氐王難當之孫也少驍勇趫捷走如飛電宣武南征尚書李冲典選統校征官大眼往求征焉冲不許大眼曰尚書不見知聽下官出一伎便出長繩三丈繫之於髻而走繩直如矢馬馳不及冲大驚曰千載已來未有此人也遂用為軍主大眼顧謂同寮曰吾之今日所謂蛟龍得水之秋也自此一舉不復與諸君齊列矣所經戰皆武冠六軍大眼妻潘氏善射詣軍省大眼至攻戰遊獵之際潘氏亦戎裝齊鑣並轡乃至還營同坐幕下對諸寮佐言笑自得大眼指謂諸人曰此潘將軍也明帝加光祿大夫淮泗之間童兒啼者恐之云楊大眼至無不立止王秉之初歸國也謂大眼曰吾在南時聞君之名以為眼如車輪及見君乃不異常人大眼曰鼓旗相望瞋眸奮發足使君目不能視何必大如車輪又曰文成帝名濬太武孫晃子也即位後冬大儺曜兵帝有勇力善騎射靈丘南有山高四百餘丈詔群官仰射山峰無能踰者帝彎弧發矢出山四十餘丈過山南二百步遂詔刊石勒銘紀功北齊書曰高昂字敖曹膽力過人姿儀殊異其父次同為求嚴師加鞭撻昂不遵師訓專事馳騁每言男兒當橫行天下自取富貴誰能端坐讀書作老博士也其父曰此兒不滅吾族當大吾門以其昂藏敖曹故以名字北史曰達奚震少驍勇走及奔馬周文嘗渭北校獵時有兔過周文前震與諸將竟射之馬倒而墜震足不傾躓因步射之矢中兔顧馬纔起遂迴身騰上周文喜曰非此父不生此子陳書曰蕭摩訶齊軍戰有西域胡妙於弓矢弦無虛發眾軍尤憚之及將戰明徹謂摩訶曰若殪此胡則彼軍奪氣君有關張之名可斬顏, SBCK: 枝格強}
