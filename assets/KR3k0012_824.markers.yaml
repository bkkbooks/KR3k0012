  - {type: variant, offset: 1175, length: 313, content: 法三犂共一牛一人將之唐書曰天寶初開砥柱之險以通流石中得古鐵犂鏵有平陸縣字因改河北縣名為平陸縣後唐史明宗上顧謂侍臣曰朕昨日出城觀稼見百姓父子三人同曳犂耒者力農如是深軫子懷可賜耕牛二頭耦說文曰耦耕廣五寸為伐二伐為耦周禮地官下曰里宰以歲時合耦于耡以治稼穡趨其耕耨行其秩敘以待有司之政令而徵斂其財賦考工記曰耜廣五寸二耜為耦此言兩人相助耦而耕也鄭司農云耡讀為籍杜子春云耡讀為助謂相佐助又冬官曰匠人為溝洫主通利田間之水道耜廣五寸二耜為耦一耦之伐廣尺深尺謂之畎田首倍之廣二尺深二尺謂之遂古者耜一金兩人併發之其壟中曰畎畎上曰伐伐之言發也畎畝也今之耜岐頭兩金象古之耦也毛詩周頌曰駿發爾私終三十里亦服爾耕十千維耦私民田也言上欲富其民而讓於下欲民之, WYG: 捃拾不失}
