  - {type: variant, offset: 2253, length: 0, content: '', krp: 又曰沈道䖍居武康北石山下有人竊園中菜道䖍自外還見之即自逃隱待竊者去後乃出齊書曰㑹稽孔珪家起園列植桐栁多構山泉殆窮眞趣衡陽王鈞徃遊之珪曰殿下處朱門遊紫闥詎得與山人交耶荅曰身處朱門而情遊江海形入紫闥而意在青雲珪大美之又曰豫章王嶷薨後嘗見形於第後園乗腰輿指麾處分呼直兵直兵無手板左右授一玉手板與之謂曰橘樹一株死可覔𥙷之因出後園梁書曰徐勉爲書式其子崧曰中年聊於東田間營小園者非存播藝以要利正欲穿池種樹少寄情賞尓又以郊除閑曠終可爲宅儻獲懸車致事實欲歌哭於斯又曰劉慧斐隱居東林寺又於山北構園一所號曰離垢園時人仍謂爲離垢先生燕書曰愍帝時有異爵素質緑首集于端門東園樹棲翔二旬而去夏以異爵故大赦名東園曰白爵園後魏書曰胡太后親覽萬機手筆斷決幸西林園法流堂命侍臣射不能者罰之又曰髙聦爲中尉所彈遂廢于家㫁絶人事唯修營園果丗稱髙聦棃以爲珎異又曰元欣好營産業多所樹藝京師名菓皆出其園又曰景穆季年頗親近左右營立田園以収其利北史曰齊盧景𥙿不營丗事居無二業唯在注解其叔父職居顯要而景俗止於園舎情均郊野謙㳟守道貞素自得由是丗號居士北齊書曰河南獻王孝瑜文襄於鄴東起山池遊觀時俗眩之孝瑜遂於第作水堂龍舟植幡矟於舟上數集諸弟宴射爲樂武成幸其第見而恱之故盛興後園之翫於是貴賤慕斆處處營造後周書曰後周文帝在天遊園以金巵置侯上令公卿射中者即以賜之宇文貴一發而中帝笑曰由基之妙正當耳唐書曰何潘仁西域胡人也家富於財潘仁厚自奉養引致賔客煬帝時嘗犯法懼罪遂亡入司竹園鳩集亡命衆至數萬及義兵起永得平陽公主而奉之以應義師莊子曰漢隂丈人爲園畦鑿隧而入井抱甕而灌一日浸百畦子貢教以爲桔橰列子曰楊朱見梁王曰王者詔天下如運諸掌梁王曰先生有一妻一妾不能治三畝之園不能耘言治天下何也韓子曰昔弥子瑕寵於衛君與遊於東園食桃而甘以其半啖君君曰愛我哉淮南子曰夫臨江之鄉其人汲水以漑其園江水弗減也又曰山有猛獸林木爲之不斬園有螫虫藜蓼爲之不採言人畏之說苑曰呉王欲伐荆告左右曰敢諫者死舎人有少孺子者欲諫不敢懷丸操彈於後園露沾其衣如是三旦王曰子來何苦沾衣如此對曰園中有榆其上有蟬蟬高居悲鳴飲露不知螳蜋在其後螳蜋委身曲附欲取蟬而不知黄崔在其傍黄雀方延頸欲啄螳蜋而不知彈丸在其下也此三者皆務得其前利不顧其後之有患也呉王曰善哉乃罷兵風俗通曰園援也從口袁聲四皓園公亦夲園者玄晏春秋曰又好桑農種藏之事且養雞鶩園圃之事懃不舎力焉王子年拾遺記曰漢明帝時常山獻巨桃核此桃霜下結花隆暑方熟亦云仙人所食常使植於霜園此園皆植寒果也又曰魏明帝起靈禽之園方國所獻異鳥獸皆畜此園也丗說曰王子敬入㑹稽經呉聞顧辟彊有名園先不識主人徑徃其家顧方集賔友酣宴園中而王遊歴旣畢指麾好惡傍若無人又曰簡文幸華林園顧謂左右曰㑹心處不必在逺醫然林水便自有濠梁間想覺鳥獸自來親人又曰管寜華歆共園中鋤菜見地片金管不釋鋤與瓦石不異華投而擲之向秀別傳曰向秀常與嵇康偶鍜於洛邑與吕安灌園於山陽収其餘利以供酒食之費桂陽先賢賛曰蘇躭常聞夜有衆賔來躭告母曰人招躭去巳種藥着後園梅樹下治百病一葉愈一人賣此藥過足供養仇池記曰城東有首蓿園園中有三水碓三秦記曰漢武帝名園曰樊川一名御宿有大梨如五升名含消又曰漢武帝菓園有大栗十五枚一升華陽國志曰何隨家養竹園人盗其筍隨過行見恐盗者覺怖走竹傷其足挈履徐歩歸幽明録曰武宣程羈偏生未𬒳舉家常使種葱後連理樹生於園圃殷仲堪遊園賦曰尔乃杖䇿晨遊以詠以吟落葉掩蹊菓下成林曹植詩曰公子敬愛客終宴不知疲清夜遊西園飛盖相追隨劉䛑之天公牋曰昔申酉之際遭湯旱流烟今子歲值尭水滔天火延燒其廬水突壞其園謝玄與姊書曰比二日東行遊歩園中巳極有任家湖形摸也姊想瞩此亦小有所散圃說文曰種菜曰圃毛詩雞鳴曰東方未明折栁樊圃枉夫瞿瞿又七月曰九月築埸圃十月納禾稼周禮地官下曰埸人掌國之場圃而樹之果蓏珍異之物以時斂而藏之果棗李之属蓏瓜瓠之属珍異蒲桃枇杷之属禮記射義曰孔子射於矍相之圃觀者如堵牆左傳莊公曰子穨有寵蔿國爲之師及惠王即位取蔿國之圃以爲囿圃園也囿苑也遂奉子頽以代王又僖公下曰秦師襲鄭鄭使皇武子辭曰鄭之有原圃猶秦之有具圃也又哀公下曰衛侯爲虎幄於籍圃於籍田之圃新造幄幕皆以虎獸爲飾也論語曰樊遲請學爲圃子曰吾不如老圃莊子曰古之人假道於仁託宿於義於遊逍遥之廬食於荀簡之田立於不貸之圃逍遥無爲也茍簡易養也不貸無出也古謂是采眞之遊韓子曰景公欲移晏子家於豫章之圃晏子辭孟子曰今有場師舎其梧檟養其樲棘則爲賤埸師也場師治圃者梧檟皆大名樲棘折棗言此以喻人捨大養小始賤場師}
