  - {type: variant, offset: 372, length: 183, content: 永徽三年高宗親享先農躬御耒耜淮南子曰清英之美始於耒耜清英酒也耜釋名曰耜齒也如齒之斷物也周禮地官下山虞曰凡服耜斬季材以時入之季猶稚也服與耜宜用稚材尚柔刃也服此服車之材又秋官下曰薙氏掌殺草春始生而萌之夏日至而夷之秋繩而芟之冬日至而耜之鄭玄謂萌之者以茲其斫其生者夷之以鉤鎌迫地芟之也若今取茭矣含實曰繩芟其繩則實不成熟耜之以耜測凍土剗之禮記禮運曰治國不以禮猶無耜而耕也無以入, SBCK: 穫刈禾}
