  - {type: variant, offset: 1489, length: 432, content: 發其私田耳終三十里言各極其望也於是民大事耕其私田萬耦同時舉也國語曰吳王還自伐齊乃誶申胥誶吉讓也曰昔吾先王體德聖明達于上帝先王闔廬上帝天也譬如農夫作耦以刈殺四方之蓬蒿為言子胥佐先王猶耕者之有耦以成其事董仲舒云禹見耕者五耦而軾過十室之邑而下見山仰之見谷俯之種殖周禮地官大司徒之職曰辨十有二壤之物而知其種以教稼穡樹藝禮記月令曰孟春行冬令則水潦為敗首種不入舊說云首種謂稷也又仲秋曰是月也勸人種麥無或失時又禮運曰為禮不本於義猶耕而弗種也嘉穀無由生也尚書洪範五行土爰稼穡種曰稼斂曰穡土可以耕可以斂稼穡作甘甘味生於百穀尚書酒誥曰妹土嗣爾股肱純其藝黍稷奔走事厥考厥長今往當使妺土之人繼汝股肱之教為純一之行其當勤種黍稷奔走土其父兄也尚書考靈耀曰春鳥星昏中以種稷鳥朱鳥謂鶉火夏火星昏中以種黍菽火大火也孝經援神契曰土黃白宜種禾黑墳宜黍麥蒼赤宜菽汙泉宜稻說文曰禾之秀實曰稼莖節為禾從禾家聲一曰稼家事也一曰在野曰稼史記曰棄為兒時其游戲好種樹麻菽漢書曰景帝三年春正月詔曰農天下之本也黃金珠玉饑, SBCK: 穗飢}
