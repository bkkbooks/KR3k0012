  - {type: variant, offset: 731, length: 394, content: 貧好學書晝執耒耜夜不廢讀誦後魏書曰趙琰遣人買耜刃得剩利六百即命送還刃主刃主高之義而不受琰命委之而去唐書曰高宗行籍田之禮躬執耒耜而九推焉禮官奏陛下合三推上曰朕以身率下自當過之恨不終於千畝耳初將籍田先止于先農之壇因閱耒耜有雕刻文飾者謂左右曰田器農人執之在於朴素心豈貴文飾乎乃命徹之國語曰周制有曰民無懸耜言常用入土曰耜耜柄曰耒野無奧草皆墾辟與深也呂氏春秋曰六尺之耜所以成畝其愽八寸所以成畎高誘注曰六尺為畝三尺為畎犂釋名曰犂利也利則發土絕草根也魏略曰皇甫隆為燉煌太守民不曉作樓犂用工甚費隆乃教作樓犂省力過半又曰弘農太守劉類多市犂鎋載所部貿絲管子曰距國門以外窮四竟之內丈夫二犂童子五尺一犂以為三日之功令農始作服于公田鹽鐵論曰庶人乘馬者足以代勞而已故行則服軛止則就犂下種軛樓皆取備焉日種一頃至今三輔猶賴其利遼東耕犂轅長四尺迴轉相妨既用兩牛兩人牽之一人耕一人種二人軛樓凡用兩牛六人一日則種二十五畝其懸絕, WYG: 安能豫知}
