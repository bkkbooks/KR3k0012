  - {type: variant, offset: 707, length: 242, content: 百穀其種皆成好含生氣言得其時王隱晉書曰徐苗少孤家貧好學書晝執耒耜夜不廢讀誦後魏書曰趙琰遣人買耜刃得剩利六百即命送還刃主刃主高之義而不受琰命委之而去唐書曰高宗行籍田之禮躬執耒耜而九推焉禮官奏陛下合三推上曰朕以身率下自當過之恨不終於千畝耳初將籍田先止于先農之壇因閱耒耜有雕刻文飾者謂左右曰田器農人執之在於朴素心豈貴文飾乎乃命徹之國語曰周制有曰民無懸耜言常用入土曰耜耜柄曰耒野無奧草皆墾辟與深也呂氏春秋曰六尺之耜所以成畝其愽八寸所以成畎高誘注曰六尺為畝三尺為畎犂釋名曰犂利也利則發土絕草根也, SBCK: ''}
