  - {type: variant, offset: 2090, length: 130, content: 樂為黃門郎令主之東觀漢記曰范充為桂陽太守俗不種桑無蠶織絲麻之利類皆以麻枲頭縕著衣民墮窳少麤履盛冬皆以火燎充令屬縣教民益種桑柘養蠶桑織履復令種紵麻數年之間人刺其利衣履溫煖吳會分地記曰卞山者勾踐於此山鑄銅銅不鑠埋之生馬箠勾踐遣使者取徙於南社種之飾治以為馬箠獻於吳陳, SBCK: 供􅀕祀宋}
