  - {type: 'tls:seg', offset: 1932, content: '', id: KR3k0012_CHANT_824-29a.14}
  - {type: variant, offset: 1932, length: 0, content: '', SBCK: 之或曰以杖轉於頭故名之也廣雅曰拂謂之架說文曰拂架也拂擊禾連架也國語曰權節其用耒耜耞芟耞拂也所以撃草方言曰僉宋魏之間謂攝殳或謂之度自􅀜而西謂之拂僉連架也所以打穀王褒僮約曰刻木爲架屈竹作把架擊禾也園說文曰園所樹菓也易賁卦曰賁于丘園束帛戔戔毛詩車隣駟驖曰駟驖美襄公也始命有田狩之事園囿之樂焉始命命爲諸侯也􅁗始附庸也遊于北園四馬旣閑閑習也又國風將仲子􅀆曰將仲子􅀆無踰我園無折我樹檀園所以樹木也檀強刄之木又小雅鶴鳴曰樂彼之園爰有樹檀其下維蘀何楽於彼園之觀乎擇落也上其樹檀下其蘀周禮天宫太宰九職二曰園囿􅗱草木鄭注云園蕃也史記曰董仲舒廣川人以治春秋當孝景時爲愽士下帷講誦三年}
  - {type: page-break, offset: 1932, content: '', id: KR3k0012_SBCK_824-3a}
  - {type: page-break, offset: 1932, content: '', id: KR3k0012_SBCK_824-3b}
  - {type: variant, offset: 1932, length: 0, content: '', WYG: 之或曰以杖轉於頭故名之也廣雅曰拂謂之架說文曰拂架也拂擊木連架也國語曰權節其用耒耜耞芟耞拂也所以擊草方言曰僉宋魏之間謂攝殳或謂之度自闗而西謂之拂僉連架也所以打榖王褒僮約曰刻木為架屈竹作耙架擊木也園說文曰園以樹菓也易賁卦曰賁于邱園束帛戔戔毛詩車鄰駟鐵曰駟鐵美襄公也始命有田狩之事園囿之樂焉遊於北園四馬既閑又國風将仲子兮曰将仲子兮無踰我園無折我樹檀又小雅雞鳴曰樂彼之園爰有樹檀其下惟籜周禮天官大宰九職二曰園囿毓草木史記曰董仲舒廣州人以治春秋當孝景時為博士下帷講誦三年}
