  - {type: variant, offset: 1929, length: 2, content: 為弊, SBCK: 爲蓑裳􅀍頭徒跣毎出見婦人則隠翳須去乃出王隠晉書曰􅁃衮字叔褒年飢捃者猶殷衮乃引其羣子以退曰待其間旣捃焉從者以爲徒捃也捃無傍掇晉書曰夏統字仲御㓜􅀌貧養親以孝聞毎探捃求食星行夜歸或至海邊拘蟛􅒹以資養宋書曰沈道䖍居武康北石山下常以捃拾自資同捃者或爭穟道䖍諌之不止悉以其所得與之爭者愧惡後毎事輒云勿令居士知􅁃異行別傳曰君妻樂氏生子澤􅀄君與妻捃而産於澤遂以命之架釋名曰架加也加杖於柄頭以撾穗而出榖也或曰羅架三文而}
