  - {type: variant, offset: 3109, length: 1159, content: 民月令曰正月可種葵四月可收冬葵子六月六日可種葵中伏之後可種冬葵八九月可種乾葵物理論曰稼借種也古今之言云余夫稼農之本也耘說言曰耘除田間穢也左傳昭元年曰晉趙文子曰譬如農夫是穮是蔉穮耘也壅苗為蔉毛詩甫田曰或耘或耔黍稷薿薿又周頌曰載芟載旅其耕澤澤千耦其耘徂隰徂畛論語曰子路從而後遇丈人以杖荷蓧色曰丈夫老人也蓧竹器子路問曰子見夫子乎丈人曰四體不勤五穀不分孰為夫子包曰夫丈人云不勤勞四體不分殖五穀誰為夫子而索之邪植其杖而芸孔曰植倚也除草曰芸宋書曰柳元景顏師伯嘗詣沈慶之會其遊田元景等鳴笳列卒滿道慶之獨與左右一人在田見之悄然改容曰夫貧賤不可畢富貴亦難守吾與諸公並出貧賤因時際會榮貴至此唯當共思損挹之事老子八十之年目見成敗者已多諸君炫此車服欲何為於是插杖而耘不為之顧元景等徹侍褰裳從之管子曰萬室之都必有萬鍾之藏藏鏹千萬千室之都必有千鍾之藏藏鏹百萬春以奉耕夏以奉耘孟子曰人病舍其田而芸人之田所求於人者重而所以自任者輕賈誼書曰鄒穆公有令食鳧鴈必以秕吏請以粟公曰夫百姓呴牛而耕曝背而芸勤而不敢惰者豈為鳥獸哉粟養人也何以其養鳥也耔說文曰耔壅禾本也晉書曰陶潛歸去來曰懷良辰以孤往或植杖而耘耔耨釋名曰耨似鋤以耨禾也左傳僖公下曰初臼季使過冀見冀缺耨其妻饁之臼季胥臣也冀晉邑耨鋤也野饋曰饁敬相待如賓與之歸言諸文公曰敬德之聚也能敬必有德德以治民君請用之爾雅曰斪斸謂之定郭璞曰鋤屬也犍為舍人曰拘斸名定廣雅曰定耨纂又曰養苗之道鋤耨如銍柄長三尺刃廣二寸以封地除草也魏書曰公孫淵官屬上書曰七營虎士五部蠻夷各懷素飽不謀同心奮臂大呼排門遁出近郊農民釋其耨鎛淮南子曰耨者剡耜而耕摩蜃蜃大蚌也摩令利用耨除草也又曰茢先稻熟農夫耨之者不以小利害大穫茢稈又曰聖人之用兵若櫛髮耨苗所去者少所利者多呂氏春秋曰先生者美米後生者為秕是故其耨也長其兄而去其弟養大殺小不知稼者其耨也去其兄而養其弟不收其粟而收其秕钃釋名曰钃誅也主以誅除物根株也說文曰钃斫也齊謂茲基一曰斤柄性自曲者也管子曰美金以鑄戈劍矛戟試諸狗馬惡金以鑄斤斧鉏夷屬欘試諸木士夷鋤類也屬欘钁類又曰匠人有感斤欘故繩可得斷也孟子曰齊人有言曰雖有智慧不如乘勢雖有鎡基不如待時茲基田器耰說文曰耰摩田器也論語曰長沮桀溺耦而耕孔子過之使子路問津焉桀溺曰子為誰曰為仲由曰是魯孔丘之徒與對曰然滔滔者天下皆是也誰以易之且而與其從辟人之士也豈若從辟世之士哉耰而不輟賈誼書曰秦民借父耰鋤猶有德色銍廣雅曰銍謂之刈纂文曰江湖以銍為刈也尚書禹貢曰二百里納銍銍刈謂禾穗也說文曰銍穫禾短鎌釋名曰銍穫禾鐵也銍銍斷禾穗聲也銚說文曰錢銚也古田器也世本曰倕作銚管子曰一農之事必有一銚然後成農鎛釋名曰鎛亦鋤類迫也迫地去草也毛詩周頌良耜曰其饟伊黍其笠伊紏其鎛斯趙以薅荼蓼又周頌臣工曰命我眾人庤乃錢鎛奄觀銍艾庤其錢銚鎒銍穫也箋云奄觀多也教我庶民具女田器終久必多銍艾觀之也, SBCK: ''}
