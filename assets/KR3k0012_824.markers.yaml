  - {type: variant, offset: 2258, length: 0, content: '', SBCK: 崑崙山有䟽圃之地滿之潢水三周山海經曰淮江之山實惟帝之平圃風俗通曰圃􅀘也從口甫聲拾遺録曰崑崙山第二層下有芝田蕙圃皆數萬頃羣仙種耨焉曹植籍田賦曰}
