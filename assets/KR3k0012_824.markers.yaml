markers:
  front:
  - {type: variant, offset: 0, length: 356, content: 資產部三耒釋名曰耒耜也古史考曰神農作耒耜世本曰咎繇作耒耜周禮冬官考工下曰車人為耒庇長尺有一寸中直者三尺有三寸上句者二尺有二寸鄭司農云耒謂耜耒庇讀為其顙有庇之庇謂耒下岐玄謂庇讀為棘刺之刺刺耒下前曲接耜自其庇緣其外以至於首以弦其內六尺有六寸與步相中也緣外六尺有六寸內弦六尺應一步之尺數耕者以田器為度宜耜異材不在數中堅地欲直庇柔地欲句庇直庇則利推句庇則利發倨句磬折謂之中地中地之耒其庇與直者如磬折則調矣調則弦六尺禮記月令季冬曰冰已入令告人出五種命農計耦耕事脩耒耜具田器冰既入而令有司告人出五穀之種明大寒氣過農將興修田器韓詩曰三月之時可預取耒耜脩繕之至於四月始可以舉足而耕也魏志曰叚灼上䟽理鄧艾曰昔姜維有斷隴之志艾修治備守積穀彊兵值歲凶旱又為區種身被鳥衣手執耒耜以率將士上下相感莫不盡力梁書曰賀革字文明少以家貧躬耕供養年, SBCK: 太平御覽卷第八百}
