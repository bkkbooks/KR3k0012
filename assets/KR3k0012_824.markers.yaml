  - {type: variant, offset: 1932, length: 0, content: '', krp: 之或曰以杖轉於頭故名之也廣雅曰拂謂之架說文曰拂架也拂擊禾連架也國語曰權節其用耒耜耞芟耞拂也所以撃草方言曰僉宋魏之間謂攝殳或謂之度自關而西謂之拂僉連架也所以打穀王褒僮約曰刻木爲架屈竹作把架擊禾也園說文曰園所樹菓也易賁卦曰賁于丘園束帛戔戔毛詩車隣駟驖曰駟驖美襄公也始命有田狩之事園囿之樂焉始命命爲諸侯也秦始附庸也遊于北園四馬旣閑閑習也又國風將仲子兮曰將仲子兮無踰我園無折我樹檀園所以樹木也檀強刄之木又小雅鶴鳴曰樂彼之園爰有樹檀其下維蘀何楽於彼園之觀乎擇落也上其樹檀下其蘀周禮天宫太宰九職二曰園囿毓草木鄭注云園蕃也史記曰董仲舒廣川人以治春秋當孝景時爲愽士下帷講誦三年}
  - {type: variant, offset: 1933, length: 0, content: '', SBCK: 觀於舎園漢書梁孝王傳曰王有罪入朝乗布車從兩􅀐入匿長公主園張晏日布車喪人乗之也又曰田蚡召客飲坐其兄盖侯北向自坐東向以爲漢相尊不可以兄私撓由此滋驕治宅第田園極膏􅃾市買郡縣器物相屬於道後漢書曰竇憲恃宫掖聲􅀔遂以賤直請奪沁水公主園田沁水公主明帝女主逼畏不敢計後肅宗駕出過園指以問憲憲隂喝不得對隂喝猶壹塞也隂音於禁反喝音一介反或作鳴故反後發􅁴帝大恕召憲切責曰􅀷思前過主田園時何用愈趙髙指鹿爲馬愈猶差也乆念使人驚怖昔永平中常令隂􅀶鄧疊二人更相糾察以隂鄧皆外戚恐其踰多故使更相糾察也􅀶隂興之子也故諸豪戚莫敢犯法者而詔書切切猶以舅氏田宅爲言切切猶勤勤今貴主尚見枉奪何况小人哉國家弃憲如􅀌雛腐䑕鳥子生而啄者日雛也憲大震懼皇后爲毀服􅀷謝良乆乃得解使以田還主雖不繩其罪然亦不授以重任續漢書百官志曰濯龍園在洛陽西北角謝承後漢書曰呉祐遷膠東侯相時戴宏父爲縣丞宏年十六從在承舎祐毎行園常聞諷讀之音竒而􅀱之亦與爲友宏卒成儒宗知名東夏爲河間相因自免歸家不復仕身灌園􅂼以經書教授年九十八卒又曰中平二年造萬金堂於西園獻帝春秋曰吕布問太祖明公何痩太祖曰君何以}
  - {type: page-break, offset: 1933, content: '', id: KR3k0012_SBCK_824-4a}
