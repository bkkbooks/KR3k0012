  - {type: variant, offset: 2282, length: 198, content: 十人拔之林必無餘枿又曰昏弧中則務種穀二月昏時弧星中於南方朱鳥之宿也大火中則種黍菽大火東方蒼龍之宿四月建巳中南方也菽豆也虛中則種粟麥北方玄武之宿也八月建酉中於南方也又曰古者民茹草飲水食樹木之實羸蛘之肉多疹毒傷之患患害於是神農乃始教民播五穀相土地原隰燥濕肥墝高下百草之滋味水泉甘苦令民知避就當此之時一日而七十毒又曰文公種米呂氏春秋曰冰凍方固后稷不種后稷之種必待春論衡曰后稷為兒種藝為戲汜勝之書曰稗水旱, SBCK: 圃}
