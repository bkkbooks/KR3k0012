  - {type: variant, offset: 1929, length: 2, content: 為弊, krp: 爲蓑裳𬒳頭徒跣毎出見婦人則隠翳須去乃出王隠晉書曰庾衮字叔褒年飢捃者猶殷衮乃引其羣子以退曰待其間旣捃焉從者以爲徒捃也捃無傍掇晉書曰夏統字仲御㓜孤貧養親以孝聞毎探捃求食星行夜歸或至海邊拘蟛􅒹以資養宋書曰沈道䖍居武康北石山下常以捃拾自資同捃者或爭穟道䖍諌之不止悉以其所得與之爭者愧惡後毎事輒云勿令居士知庾異行別傳曰君妻樂氏生子澤𥘉君與妻捃而産於澤遂以命之架釋名曰架加也加杖於柄頭以撾穗而出榖也或曰羅架三文而}
  - {type: variant, offset: 1930, length: 1, content: 弊, WYG: 蓘裳被頭徒跣每出見婦人則隱翳湏至乃出王隐晉書曰庾袞字叔褒年飢捃者猶殷袞乃引其群子以退曰待其間既捃焉從者以為徒捃也捃無傍掇晉書夏統字仲御幼孤寡養親以孝聞每採捃求食星行夜歸或至海邉捕蟛􅀈資養宋書曰沈道䖍居武康北石山下以捃拾自資同捃者或爭穟道䖍諫之不止悉以其所得與之爭者愧恧後爭輒云勿令居士知庾異行别傳曰異妻樂氏生子澤初異與妻捃而産於澤遂以命之架釋名曰架加也加杖於柄頭以撾穂而出榖也或曰羅架三杖而}
