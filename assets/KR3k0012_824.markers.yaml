  - {type: variant, offset: 2482, length: 149, content: 熟之時又特滋盛易得蕪穢良田畝得二三十斛宜種之以備凶年又稗中有米熟時一可擣取炊之不減粢米又可釀作酒武帝時令典農種之一頃收二千斛斛得米三升大儉可磨食之又曰三月榆莢雨時高地強土可種禾薄田不能糞者以原蠶矢雜禾種之則禾不蟲又取馬骨莝之一石以水三石煮之三沸漉去滓以汁漬附子五枚漬三四日去附子以汁和蠶矢撓如粥先種, SBCK: 植也太平御覽卷第八百}
