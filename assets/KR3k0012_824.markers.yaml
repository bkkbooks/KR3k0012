  - {type: variant, offset: 1933, length: 0, content: '', WYG: 觀於舍園漢書曰梁孝王𫝊曰王有罪入朝乘布車從兩騎入匿長公主園布車䘮人乗之也又曰田蚡召客飲坐其兄盖侯北向自坐東向以為漢相尊不可以兄私撓由此滋驕治宅第田園極膏腴市買郡縣器物相属於道後漢書曰竇憲恃宫掖聲勢以賤直請奪沁水公主田園主逼畏不敢計後肅宗駕出過園指以問憲憲隂喝不得對隂喝猶噎塞也後發覺帝大怒召憲切責曰深思前過奪主園時何用愈趙髙指鹿為馬久念使人驚怖昔永平中嘗令隂愽鄧疉二人更相糾察故諸豪戚莫敢犯法者而詔書切切猶以舅氏田宅為言今貴主尚見侵奪何况小人哉國家棄憲如孤雛腐䑕憲大震懼皇后為毁服深謝良久乃得解使以田還主雖不繩其罪然亦不授以重任續漢書百官志曰濯龍園在洛陽西北角謝承後漢書曰吴祐遷膠東侯相時戴宏父為縣丞宏年十六從在丞舍祐每行園嘗聞諷讀之音竒而候之亦與為友宏卒成儒宗知名東夏為河間相因自免歸家不復仕身灌園蔬以經書教授年九十八卒又曰中平二年造萬金堂於西園獻帝春秋曰吕布問太祖明公何痩太祖曰君何以}
