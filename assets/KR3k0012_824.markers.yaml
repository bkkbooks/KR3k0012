  - {type: variant, offset: 1935, length: 0, content: '', SBCK: 上捕山禽雜獸置其中又曰馬鈞居京都城内有地可爲園患無水以灌之乃作飜車令童兒轉之而灌水自覆更入更出其巧百倍於常晉書曰華廙免官後栖遲家巷武帝登凌雲䑓望見廙苴蓿園阡陌甚整依然感舊太康􅀄大赦乃得襲封王隱晉書曰王衍字夷甫戎叔父也}
