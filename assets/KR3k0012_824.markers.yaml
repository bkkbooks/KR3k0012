  - {type: variant, offset: 2633, length: 475, content: 日以溲種曝勿令濕至種時以餘汁溲而種之則不蝗蟲無馬骨汁亦可用雪雪者五穀之積也常以冬藏雪汁器盛埋地中治種如此則收萬倍又曰種傷濕鬱熱則生蟲取麥種候熟可穫釋穗大彊者稈束立場之高燥處無令有白魚取乾艾雜藏之欲知歲所宜以布囊盛粟諸物種平量埋陰垣之下冬至後五十日發取量之息最多者歲所宜又曰凡田種麥為首傷於太稠者鋤而稀之秋以鋤以棘柴曳之以壟麥根故曰子將欲富黃金覆士至春凍解棘柴曳之絕其乾葉到榆莢雨時候土白復鋤如此收必倍冬雨雪止掩雪勿令從風飛去後雪復如此麥能旱多實春凍解耕和土種遊麥麥生成茂大鋤如宿麥也又曰黍者暑也未生心天雨灌其心必傷無實初種時天霧令兩人對持長索戛去其露日出乃止種黍覆出鋤治如禾法欲稀於禾又曰大豆保歲易為宜古之所備凶年也大豆生載甲而出種土不可厚厚則折項不能上達屈於土中而死又曰種稻春凍解地氣和時耕冬至後百三十日種大稻時也又曰種麻預軟和田二月下旬三月上旬傍雨種其秕又曰種葈春凍解耕治其土春草生布糞田復耕平摩之又曰種小豆忌卯稻忌辰禾忌丙黍忌丑麻忌辰秫忌未寅小麥忌戍大麥忌子大豆忌甲凡九穀忌日不種之避其忌不可敗傷諸事忌禁日此非空言也其道自然若燒黍穰則害瓠也崔寔, SBCK: ''}
