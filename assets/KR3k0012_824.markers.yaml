  - {type: variant, offset: 1934, length: 0, content: '', SBCK: 孤布曰昔在洛㑹浸氏園太祖曰然􅀌忘之矣所以瘦者不早相得故也魏略曰顔斐爲京兆太守起菜園使民投閑灌治之魏志曰明帝之幸郭元后也毛皇后愛寵日衰景􅀄元年帝遊後園召才人以上曲宴極樂元后曰宜延皇后帝弗許乃禁左右使不得宣后知之明日見帝后曰昨遊宴北園樂乎帝以左右泄之所殺十餘人魏略曰青龍十二年起土山於芳林園西北陬使公卿羣寮皆負土成山樹松竹雜木善草於}
