  - {type: variant, offset: 1609, length: 264, content: 對曰唯仁者能以大事小故湯事葛伯文王事昆夷又曰君行仁政斯民親其上而死其長矣又曰當今之時萬乘之國行仁政民之悅之猶解倒懸也又曰夫仁天之尊爵人之安宅又曰為富不仁矣為仁不富矣又曰為天下得人謂之仁又曰三代之得天下也以仁其失天下也以不仁國之所以廢興存亡者亦然天子不仁不保四海諸侯不仁不報社稷卿大夫不仁不保宗廟士庶人不仁不保四體今惡死亡而樂不仁是猶恐醉而彊酒也又曰仁則榮不仁則辱今惡辱而居不仁是猶惡濕而居下又曰仁之勝不仁猶水之勝火荀卿子曰仁義禮善之於人譬之若貨財粟米之於家也多有之者富少有之者貧無有之者窮尸子曰仁則人親之義則人尊之智則人用之也又, SBCK: 陶丘洪}
