  - {type: variant, offset: 1168, length: 3, content: 仁厚後, SBCK: 吕公無子歸護託身護與吕公及妻吕嫗同食護妻子頗厭吕公護聞之流涕責子曰吕公以窮老託身於我義所當奉遂養吕公終身又曰衛青曰衰而霍去病日貴青故人門下多事去病輙得官爵唯獨任安不去又曰卜式河南人􅀄以田畜爲事弟竒忽請於式欲分財異居式便脫身出唯取羊百頭遂入山放牧經十餘年十倍於􅀄却買田宅居焉弟竒悉破其産矣式輙復分與之續}
