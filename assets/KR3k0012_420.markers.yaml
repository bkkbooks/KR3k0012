  - {type: variant, offset: 2083, length: 199, content: 途抱朴子曰仁者為政之脂粉刑者御世之轡策符子曰春秋華林傳曰不知不言其所以仁延篤仁孝論曰夫仁之有孝猶四體之有心腹枝葉之有本根仁以枝葉扶䟽為大孝猶心體充實為先曹植仁孝論曰且禽獸悉知愛其母知其孝也唯白虎驎騏稱仁獸者以其明盛衰知治亂也孝者施近仁者及遠逸士傳曰高鳳鄰里有爭財鬭者兵刃相加鳳脫衣巾為叩頭曰仁義遜讓不可廢也會稽典錄曰陳囂字子公山陰人也同縣車嫗年八十餘無子慕囂仁義欲求寄命囂以車嫗有財產未敢便許乃諮於, SBCK: 爲}
