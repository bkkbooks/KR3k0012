  - {type: variant, offset: 3273, length: 2, content: 忍委, SBCK: 殺由是以忠烈聞魏略下脂習除大醫令與孔融親善㑹融􅀍誅當時許中與融善者莫敢收恤而習獨徃撫而哭之曰文舉卿捨我而死復當與語者哀歎無巳大祖􅀵習欲理之尋以其事直見原蜀志曰曹公東征擒􅀜羽以歸拜爲偏將軍禮之甚渥曹公壯羽爲人而察其無乆留意謂張遼曰卿試以情問之遼以問羽羽歎曰吾極知曹公待我厚然吾受劉將軍恩誓以共死不可背之吾終不留吾要當立効以報曹公而後乃歸遼以羽言報曹公公曰事君不忘其夲天下義士也度何時}
