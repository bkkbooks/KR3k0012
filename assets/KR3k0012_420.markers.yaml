  - {type: variant, offset: 3585, length: 191, content: 子曰惻隱之心仁之端羞惡之心義之端辭讓之心禮之端是非之心智之端人有四端猶有四體也莊子曰古公亶父居豳狄人攻之事之以皮帛而不受事之以珠玉而不受狄人所求者地古公亶父曰與人兄居而殺其弟與人父居而殺其子吾不忍也子皆免居矣為吾臣與為狄臣奚以異且吾聞之君子不以所用害所養因杖策而去民相連而從之遂成國於歧山之下也尸子曰駙馬共為荊使於巴見擔酖者問之是何以曰所以酖人也於是請買之金不足又益之車馬已得之盡注, SBCK: 􅅼復􅌟}
