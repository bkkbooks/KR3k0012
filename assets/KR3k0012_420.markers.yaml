  - {type: variant, offset: 2633, length: 7, content: 曹褒在射聲營舍, SBCK: 杜林弟成物故隗􅅝乃聽林持䘮東歸旣遣而悔追令刺客楊賢於隴底遮殺之賢見林身推鹿車載致弟䘮乃歎曰當今之丗誰能行義雖小人何忍殺義士乃亡去又曰鮑永字君長爲司􅀠校尉行縣到京兆灞陵過更始冢引車入陌欲下從事諌止之永曰親北靣事人過其墓雖以􅀗罪司􅀠不辭也遂下車􅂘盡哀西至右扶風推牛上茍諌冢上問公卿曰奉使如此何如時太中大夫張堪對曰仁者百行之宗忠者禮義之至也仁不遺舊忠不忘君行之髙者也上恱又曰肅宗崩廉范奔赴敬陵時廬江郡嚴麟奉章弔國俱㑹於路麟乗小車塗深馬死不能自進范見而􅉖然命從􅀐下馬與之不告而去麟事畢不知馬所歸縁路訪之或謂麟曰故蜀郡太守廉叔度好賙人窮今奔國䘮當是耳麟亦素聞范名以爲然即牽馬造門謝而歸之丗伏其好義又曰李善字次孫南陽人夲同縣李元蒼頭建武中疫疾元家相繼死􅃿唯􅀌兒續始生數旬而}
  - {type: page-break, offset: 2633, content: '', id: KR3k0012_SBCK_420-5b}
  - {type: variant, offset: 2633, length: 7, content: 曹褒在射聲營舍, WYG: 杜林弟成物故隗囂乃聽林持喪東歸既遣而悔追令刺客楊賢於隴坻遮殺之賢見林身推鹿車載致弟喪乃歎曰當今之世誰能行義我雖小人何忍殺義士因亡去又曰鮑永字君長為司𨽻校尉行縣到京兆灞陵過更始冡引車入陌欲下從事諫止之曰親北面事過其墓雖以獲罪司𨽻不辭也遂下車哭盡哀西至右扶風推牛上荀諫冡上問公卿曰奉使如此何如時大中大夫張湛對曰仁者百行之宗忠者禮義之至也仁不遺舊忠不忘君行之高者也上悅又曰肅宗崩廉范奔赴敬陵時廬江郡掾嚴麟奉章弔國俱㑹於路麟乘小車塗深馬死不能自進范見而愍然命從騎下馬與之不吿而去麟事畢不知馬所歸緣蹤訪之或謂麟曰故蜀郡太守廉叔度好賙人窮今奔國喪獨當是耳麟亦素聞范名以為然即牽馬造門謝而歸之世伏其好義又曰李善字次孫南陽人本同縣李元蒼頭建武中疫病元家相繼死沒唯孤兒續始生數旬而}
