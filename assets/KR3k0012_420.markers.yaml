  - {type: variant, offset: 2720, length: 1, content: 辟, SBCK: 爲瑕丘令上書薦善行􅃺又曰索盧放字君陽東郡人署門下􅁺更始時使者督行郡國太守有事當斬放前對曰方今天下苦王氏之虐政戴仰漢德傳車所過未聞恩澤而斬郡守恐天下惶懼各自疑也使有功不如使有過遂解衣而前願代太守斬使者義而赦之由是顯名又曰魏譚字少聞王莽末政亂盗賊起人民相食譚爲夷所得等軰數十皆縛束當稍就噉見譚貌謹勑獨放令主炊飬有夷長公哀譚謂曰汝曹皆當以次死哀縱汝急冝去譚不肯去叩頭曰我常爲諸君主炊飬食馨􅁏肌香餘皆菜食羸痩􅁏腥臊不可食願先等軰死長公義之即相謂此兒有義可哀縱也賊遂皆放之數十人皆得脫又曰更始即位舞隂}
