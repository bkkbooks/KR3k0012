  - {type: variant, offset: 3248, length: 1, content: 士, SBCK: 車馬競交射之飛矢雨集修以身障扞太守而爲流矢所中死太守得全賊素聞其恩信即殺弩中修者餘悉皆降散言曰自爲彭君故降不爲太守服也魏志曰閻温字伯儉天水西城人守上邽令馬超奔上邽郡人任養等舉衆迎之温止之不能禁乃馳還州超復圍州甚急乃遣温宻岀告急於夏侯淵賊圍數重温夜從水中潛岀明日賊見其跡遣追逐得之執温還􅍗超解其􅅞謂曰今成敗可見􅀂從吾言反謂城中東方無救此轉禍爲福之計也不然今爲戮矣温僞許之超乃載温􅍗城下温向城}
