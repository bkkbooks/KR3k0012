  - {type: variant, offset: 3265, length: 1, content: 逢, SBCK: 曰董卓遷帝長安幽州牧劉虞署田疇爲從事奉使得報馳還未至虞已爲公孫瓉所害疇至謁􅀕虞墓陳發章表哭泣而去瓉聞之大怒購求􅀗疇謂曰汝何哭劉虞墓而不送章報於我疇荅曰漢室衰頽人懷異心唯劉公不失忠節音報所言於將軍未美恐非所樂聞故不進也且將軍方舉大事以求所欲旣㓕無罪之君又讎守義之臣誠行此事則燕趙之士將皆東海而死豈忍從將軍者瓉壯其對不誅又曰􅀄濟隂王思與梁習俱爲西曹令史思直日白事失太祖㫖太祖大怒教召主者將加重辟時思近出習代徃對巳􅀍收執思乃馳還自陳巳罪罪應受死太祖歎息之不言嗟思之識分曰何意吾軍中有義士二人乎又曰牽招字子經􅀽紹辟招爲督軍從事紹卒又事子尚後遼東送􅀽尚首懸在馬市牽招覩之悲感設􅀕頭下太祖義之又曰龐濟字子異􅀄以涼州刺史從事守破羗長㑹武威太守張猛反殺刺史邯鄲啇猛令敢有臨䘮死不赦濟聞之棄官晝夜奔走號哭䘮所訖誼猛門懷匕首欲因見以殺猛猛}
