  - {type: variant, offset: 1089, length: 0, content: '', SBCK: 趙朔將下軍娶晉成公姉爲夫人景公三年屠岸賈欲誅趙氏賈始有寵於靈公至景公時爲司㓂將作難乃治靈公之賊韓厥告趙朔趨亡朔不肯曰子必不絶趙祀朔死不恨韓厥許諾稱疾不出賈不請而擅攻趙氏於下宫殺趙朔趙同趙括趙嬰齊皆㓕其族趙朔妻成公姉有遺腹走公宫匿趙朔客曰公孫杵臼杵臼謂朔友人程嬰曰胡不死程嬰曰朔之婦有遺腹􅀂幸而男吾奉之即女也吾徐死耳居無何而朔婦免身生男屠岸賈聞之索於宫中夫人置兒袴中祝曰趙宗滅乎􅀂號旣不滅􅀂無聲及索兒竟無聲巳脫程嬰謂公孫杵臼曰今一索不得後必索之奈何杵臼曰立􅀌與死孰難程嬰曰立􅀌難耳杵臼曰趙氏先君遇子厚子爲其難者吾爲其昜者請先死乃謀取他人嬰兒􅀒之衣以文葆匿山中程嬰出􅍝謂諸將曰嬰不肖不能立趙􅀌孰予我千金吾告其處諸將皆喜許之發師隨程嬰攻公孫杵臼殺之諸將以爲趙氏􅀌兒巳死皆喜然趙氏真􅀌乃反在程嬰卒與俱匿山中居十五年晉景公疾卜之大蔡不遂者爲祟景公問韓厥知趙􅀌在乃曰大業之後絶祀者其趙氏乎夫自中衍者皆嬴姓也中衍人面鳥噣降佐殷}
