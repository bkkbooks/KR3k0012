  - {type: variant, offset: 1089, length: 0, content: '', WYG: 趙朔將下軍娶晉成公姊為夫人景公三年屠岸賈欲誅趙氏賈始有寵於靈公至景公時為司寇將作難乃治靈公之賊韓厥告趙朔趨亡朔不肯曰子必不絶趙祀朔死不恨韓厥許諾稱疾不出賈不請而擅與諸將攻趙氏於下宫殺趙朔趙同趙括趙嬰齊皆滅其族趙朔妻成公姊有遺腹走公宫匿趙朔客曰公孫杵􅍫杵􅍫謂朔友人程嬰曰胡不死程嬰曰朔之婦有遺腹若幸而男吾奉之即女也吾徐死耳居無何而朔婦免身生男屠岸賈聞之索於宫中夫人置兒袴中祝曰趙宗滅乎若號即不滅若無聲及索兒竟無聲已脫程嬰謂公孫杵􅍫曰今一索不得后必且復索之奈何杵􅍫曰立孤與死孰難程嬰曰死易立孤難耳杵臼曰趙氏先君遇子厚子彊為其難者吾為其易者請先死乃謀取他人嬰兒負之衣以文葆匿山中程嬰出謬謂諸將曰嬰不肖不能立趙孤予我千金吾告其處諸將皆喜許之發師隨程嬰攻公孫杵􅍫殺之諸將以為趙氏孤兒已死皆喜然趙氏真孤乃反在程嬰卒與俱匿山中居十五年晉景公疾卜之大業之後不遂者為祟景公問韓厥知趙孤在乃曰大業之後在晉絶祀者其趙氏乎夫自中衍者皆嬴姓也中衍人面鳥噣降佐殷}
