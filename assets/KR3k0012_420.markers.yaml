  - {type: variant, offset: 1876, length: 0, content: '', SBCK: 羑里閎散懷金史弼遭患義夫獻寳亦何疑焉議者乃息又曰李爕字德公􅀄李固旣䇿罷知不免禍乃遣三子歸郷里時爕年十三有頃難作下郡收固三子二兄受害爕姉文􅁎乃告父門生王成曰今委君以六尺之孤李氏存㓕其在君矣成乃將爕入徐州界中變名姓爲酒家傭而成賣卜於市隂相徃來梁兾旣誅而灾眚屢見明年史官上言冝有赦令又當存録大臣􅁈死者子孫於是求固後爕乃以夲末告酒家酒家具車重厚遣之後王成卒爕以禮葬之感傷舊恩毎}
  - {type: variant, offset: 1876, length: 0, content: '', WYG: 羑里閎散懷金史弼遭患義夫獻寳亦何疑焉於是議者乃息又李爕字德公初李固既策罷知不免禍乃遣三子歸鄉里時爕年十三有頃難作下郡收固三子二兄受害爕姊文姬乃告父門生王成曰君執義先公有古人之節今委君以六尺之孤李氏存滅其在君矣成感其義乃將爕乘江東下入徐州界内令變名姓為酒家傭而成賣卜於市各為異人隂相徃來爕從受學酒家異之意非恒人以女妻爕爕專精經學十餘年間梁冀既誅而災𤯝屢見明年史官上言宜有赦令又當存錄大臣寃死者子孫於是求固後爕乃以本末告酒家酒家具車重厚遣之皆不受後王成卒爕以禮塟之感傷舊恩每}
