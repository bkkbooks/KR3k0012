  - {type: variant, offset: 27, length: 278, content: 上下相親謂之仁又中庸曰仁者人也親親為大又表記曰子曰仁有三與仁同功而異情與仁同功其仁未可知也與仁同過然後其仁可知也仁者安仁知者利仁畏罪者弘仁子曰仁之為器重其為道遠舉者莫能勝也行者莫能致也取數多者仁也夫勉於仁者不亦難乎子曰中心安仁者天下一人而已矣又緇衣曰子曰禹立三年百姓以仁遂焉豈必盡仁言百姓効禹為仁非本性能仁也又大學曰一家仁一國興仁堯舜率天下以仁而民從之又曰仁者以財發身不仁者以身發財又儒行曰溫良者仁之本敬慎者仁之地寬裕者仁之作遜接者仁之能禮節者仁之貌言談者仁之文歌樂者仁之和分散者仁之施儒皆兼此而有之猶且不敢言仁也又鄉飲酒義曰天地溫厚之氣始於東北盛於東南此, SBCK: 除去}
