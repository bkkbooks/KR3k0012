  - {type: variant, offset: 2289, length: 333, content: 宜囂遂迎嫗朝夕定省如其所親出家財以供餚膳嫗以壽終囂殯殮畢皆勉其奴令守嫗墓財物付與嫗內外宗族衣國不入殯者以置槨中制服三月由是著名流稱上國矣仁惻周公曰文王在鄗召太子發曰吾語汝童牛不服童馬不馳是謂大仁樂嘉耀稽曰仁者有惻隱之心本生於木仁生於木故惻隱出於自然也禮記表記曰中心憯怛愛人之仁也左傳文下曰邾文公卜遷于繹史曰利於民而不利於君公曰茍利於民孤之利也天生民而樹之君以利之也民既利孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之短長時也民茍利矣遷也吉莫如之遂遷於繹邾文公卒君子曰知命也家語曰孔子曰啟蟄不殺方長不折此高柴之行漢書曰汲黯字長孺濮陽人河內失火燒千餘家上使黯往視之還報曰家人失火燒比屋延燒不足憂臣過河內貧人傷水旱萬餘家父子相食臣謹以使持節發河內倉粟以賑貧氏請歸節伏矯制, SBCK: ''}
