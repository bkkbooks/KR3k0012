  - {type: variant, offset: 1094, length: 5, content: 天其知如神, SBCK: 故及趙武冠爲成人程嬰乃辭諸大夫曰昔下宫之難皆能死我非不能死我思立趙氏之後今趙武旣立成人復故位我將下報宣孟與公孫杵臼趙武啼泣頓首固請曰武願苕筋骨以報子至死而子忍去我死乎程嬰曰不可彼以我爲能成事今不報爲不成遂自殺趙武服齊衰三年爲之􅀕邑春秋祠之世世勿絶}
  - {type: variant, offset: 1094, length: 5, content: 天其知如神, WYG: 故及趙武冠為成人程嬰乃辭諸大夫謂趙武曰昔下宫之難皆能死我非不能死我思立趙氏之後今趙武既立成人復故位我將下報趙宣孟與公孫杵臼趙武啼泣頓首固請曰武願苦筋骨以報子至死而子忍去我死乎程嬰曰不可彼以我為能成事故先我死今我不報是以我事為不成遂自殺趙武服齊衰三年為之祭邑春秋祀之世世勿絶}
