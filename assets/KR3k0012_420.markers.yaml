  - {type: variant, offset: 1174, length: 5, content: 王莽末虞延, SBCK: 李固􅀍誅梁兾乃露固屍於四衢令有敢臨者加其罪固弟子汝南郭亮年始成童左提章鉞右秉鈇鑕詣􅏱上書乞收固屍不許因徃臨哭陳辭於其前遂守喪不去夏門亭長呵之亮曰含隂陽氣以生戴乹履坤義之所重豈知生命何爲以死相懼太后聞而不誅乃聽得禭歛歸葬之又曰梁兾諷有司劾杜喬遂執繫之死獄中與李固俱􅁀屍於城北故人莫敢視者喬故􅁺陳留楊匡聞之號哭星行到洛託爲夏門亭吏守衛屍䘮驅護蠅蟲都官}
