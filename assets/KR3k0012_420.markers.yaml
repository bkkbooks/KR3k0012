  - {type: variant, offset: 1090, length: 1, content: 堯, krp: 大戊及周天子皆有明德下及幽厲無道而叔帶去周適晉事先君文侯至于成公世有功德未甞絶祀今吾君獨㓕趙宗國人哀之故見龜䇿唯君圖之景公問趙向有後乎韓厥具以實告景公乃與韓厥謀立趙孤兒召而匿之宫中諸將入問疾景公因韓厥之衆以脅諸見趙孤名武諸將不得巳乃曰昔下宫之難屠岸賈爲之矯以君命非然孰敢作難微君之疾群臣固且請立趙後今君有令群臣之願也於是召趙武程嬰遍拜諸將諸將遂反與趙武程嬰攻屠岸賈㓕}
