  - {type: variant, offset: 3237, length: 3, content: 遷陳留, SBCK: 也張季禮甞弔師䘮大冰寒車毀牛病不能進罷曵道路翊行於汝南界中逢之素與䟽闊下馬與語便推所乗牢車強牛與之供其資糧不告姓名又曰梁國車章爲縣功曹令黄拳爲人所誣章證其無罪當下筆立辭乃以斧斫右手五指閇口死獄中又曰㑹稽戴就爲郡倉曹􅁺}
