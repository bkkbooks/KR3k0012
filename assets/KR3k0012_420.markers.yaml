  - {type: variant, offset: 3386, length: 150, content: 達山陰人拜廷尉吉性多仁恩務在哀矜每至冬月罪當斷夜省刑狀其妻執燭吉手持丹筆夫妻相向垂泣所當平決若無繼嗣吉令其妻妾得入經營使有遺類視事十二年天下稱其有恩列女傳曰雋不疑母仁而善教不疑為尹行縣錄囚徒還其母輒問所平活幾何人即不疑多所平反平其事反死為生也母喜笑為飲食言語異於他時或無出母怒為之不食由是故不疑為吏嚴, SBCK: 遜位}
