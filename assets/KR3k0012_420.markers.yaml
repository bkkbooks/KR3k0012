  - {type: variant, offset: 1357, length: 251, content: 復歸如此再三時以為仁義之心所致又曰江泌字士清性行仁義衣獘虱多以緜褁致之食菜不食心以其有生意也崔鴻後燕錄曰趙秋字子武汲郡朝歌人也輕財好施鄰人李玄度母死家貧無以葬秋謂其兄曰赴死生救不足仁之本也家有二牛以與之玄度得以葬他年秋夜行見一老母遺秋金一餅曰子能葬我是以相報子五十已後當富貴不可言勿忘玄度也老子曰大道廢有仁義文子曰積惠重厚使萬物忻忻樂其性者仁也莊子曰仁義先王之蘧廬蘧廬猶傅舍也可以一宿而不可以久處古人假道於仁託宿於義莊子曰義人利物之謂仁曾子曰伯夷叔齊仁者也鬻子曰除天下之害謂之仁孟子曰齊宣王問交鄰國有道, SBCK: 甚}
