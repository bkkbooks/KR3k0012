  - {type: variant, offset: 3242, length: 2, content: 出關, SBCK: 爲州所奏見收持吏以䥫針刺手爪中使以把土就十爪皆墮地終無撓辭又曰張儉爲東部督郵時中甞侍侯覽殘暴百姓儉舉劾覽遏絶章奏並不得通遂上書告儉與同郡二十四人爲黨儉得亡命止李篤家外黄令毛欽操兵到門篤引欽謂曰張儉知名天下而亡非其罪縱儉可得寧忍執之乎欽因起撫篤曰籧伯玉耻獨爲君子足下如何自專仁義篤曰篤雖好義明延今日載其半矣欽歎息而去又曰彭修州辟從事時賊張子林等}
  - {type: page-break, offset: 3242, content: '', id: KR3k0012_SBCK_420-8a}
  - {type: variant, offset: 3242, length: 2, content: 出關, WYG: 為州所奏見收持吏以鐵針刺手爪中使以把土就十爪皆墮地終無撓辭又曰張儉為東部督郵時中常侍矦覽家在防東殘暴百姓所為不軌儉舉劾覽及其母罪惡請誅之遏絶章表並不得通由是結仇覽等鄉人朱並素性佞邪為儉所棄並懷怨恚遂上書吿儉與同郡二十四人為黨於是刋章討捕儉得亡命困迫遁走望門投止莫不重其名行破家相容復流轉東萊止李篤家外黄令毛欽操兵到門篤引欽謂曰張儉知名天下而亡非其罪縱儉可得寧忍執之乎欽因起撫篤曰蘧伯玉耻獨為君子足下如何自專仁義篤曰篤雖好義明公今日載其半矣欽歎息而去又曰彭修州辟從事時賊張子林等}
