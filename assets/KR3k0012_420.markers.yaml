  - {type: variant, offset: 787, length: 201, content: 干諫而死孔子曰殷有三仁焉此三紂同姓人臣微子知紂惡而去之箕子比干不忍去故或見奴或見殺之家語曰或問孔子曰顏淵何人也曰仁人也丘弗如爾雅曰太平之人仁大戴禮曰君子執仁志先行後言千里之外皆兄弟也尚書考靈耀曰春行仁政順天之常尚書大傳曰子張曰仁者何樂於山也孔子曰夫山者然高然高則何樂焉夫山草木生焉鳥獸蕃焉財用殖焉生財用而無私為四方皆伐焉每無私子焉出雲風以通乎天地之間陰陽和合雨露之澤萬物以成百姓以饗此仁者之所樂於山者也, SBCK: ''}
