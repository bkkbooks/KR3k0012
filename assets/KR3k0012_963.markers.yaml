  - {type: variant, offset: 2375, length: 4, content: 長一二尺, WYG: 間相去局促中實滿堅强可為屋材㫁截之以作棟梁不復加斤斧也弓竹竹譜曰弓竹出東垂諸山簜竹尚書禹貢曰篠簜既敷爾雅曰簜竹竹别名也儀禮曰簜竹在建鼓之間}
