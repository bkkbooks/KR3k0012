  - {type: variant, offset: 1683, length: 0, content: '', SBCK: 以爲黄鍾之宫律之本也竹譜曰種龍竹伶倫所伐雲母竹廣志曰雲母竹大竹也㰚竹廣志曰㰚竹細而多㓨􅓁竹廣志曰􅓁竹任作笛嶺表録異曰􅓁簩竹皮薄而空多大者俓不逾二寸皮上有麤澁文可爲錯子錯甲利勝於鐵􅀂鈍以漿水洗之還復快利廣州記云石麻之竹勁而利削爲刀割象皮如切竿狗竹竹譜曰狗竹節間有毛出臨海篃竹竹譜曰篃竹江漢間謂之箭竿一尺數節葉大如扇可以衣蓬江漢之間謂之􅞴竹音蒯由梧竹南方草木狀曰由梧竹吏民家種之長三四丈圍一尺八九寸作屋柱出交阯林邑記曰由梧堪爲屋梁柱左思吴都賦曰由梧有篁班皮竹愽物志曰洞庭虞帝之二女啼以涕揮竹竹盡班今下雋有班皮竹篔簹音芸當顧微廣州記曰箄竹一名篔簹節長一丈呉録曰始興曲江縣有篔簹竹圍尺五寸節相去六七尺夷人以爲布葛異苑曰建安有篔簹竹節中有人長尺許頭足皆具竹譜曰篔簹竹大者中作甑苦竹永嘉郡記曰樂成縣民張廌者隱居頥志不應辟命家有苦竹數十頃在竹中爲屋恒居其中王右軍聞而造之廌逃避竹中不與相見一郡號爲髙士射筒竹竹譜曰射筒竹薄肌而長中着箭因以爲名沙麻竹南越志曰沙麻竹人削以爲弓弓似弩淮南所謂溪子弩也或曰􅂫麻竹或曰麤麻竹嶺表録異曰沙摩竹廣桂皆植大如茶盌竹厚而空小一人止擎一莖堪爲茅屋之椽梁也其種者即釤其竿毎截二尺許釘入土不逾月而生根葉明年長牙笋不三載而爲林盖土地所冝也南人俺以塩爲笋笴石麻竹裴淵廣州記曰石麻竹勁利削爲刀切象皮如截芋笣竹頋微廣州記曰平鄉縣有笣竹堪作布吴都賦曰笣筍抽節徃徃縈結雞頸竹竹譜曰雞頸竹篁之􅀋纎細大者不過如指踈葉黄皮強脆無所堪施筍美青班色緑江}
