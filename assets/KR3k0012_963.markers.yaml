  - {type: variant, offset: 2769, length: 224, content: 可為器物其土以為槍簳交床述征記曰仙陽縣城東北二十里有中散大夫嵇康宅今悉為田墟而父老猶種竹木崔豹古今注曰牛亨問曰籍者何也荅曰籍者尺二竹牒記人之年名字物色懸之宮門按省相應乃得入也劉敬叔異苑曰吳郡桐廬人嘗伐竹見一竹竿雉頭虵身猶未變此亦竹為虵虵為雉也任昉述異記曰湘水去岸三十許里有相思宮望帝臺舜南巡不返歿葬於蒼梧之野堯之二女娥皇女英追之不及相思慟哭淚下沾竹文悉為之班班然又曰衛有淇園出竹在淇水之上詩云瞻彼淇澳綠竹猗猗又曰南中生子母竹今慈竹是也漢章帝三年子母, SBCK: 食}
