  - {type: variant, offset: 1684, length: 0, content: '', SBCK: 崗所饒也籚􅓁竹竹譜曰此竹當是蘆出楊州東垂諸郡浙江以東可以爲箎䈄竹竹譜曰䈄墮竹大如脚指蟲食其筍皮􅀋綉甚可愛莽竹爾雅曰莽數節節間促也㔂竹爾雅曰㔂音􅈔堅中竹􅀋其中實也簢竹爾雅曰簢音閔筡音徒中其中空也仲竹爾雅曰仲無笐亦竹􅀋未詳音航􅤈竹禮斗威儀曰君乗水而王其政太平􅤈紫脫爲常生壬子年拾遺記曰岑華山在西}
