  - {type: variant, offset: 2370, length: 3, content: 皆七八, WYG: 為墻蠻蛋來侵竟不得入䈏竹竹譜曰䈏與􅀢􅀢厥體俱洪圍或累尺䈏實􅀢空南越之居梁柱是供異物志曰有竹曰䈏其大數}
