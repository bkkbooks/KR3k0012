  - {type: variant, offset: 1737, length: 0, content: '', WYG: 大如脚指虫食其笋皮類繡甚可愛莽竹爾雅曰莽數節節間促也􅦖竹爾雅曰􅦖堅中簢竹爾雅曰簢音閔筡音徒中其中空也仲竹爾雅曰仲無笐亦竹類未詳音杭􅤈竹禮斗威儀曰君乗水而王其政太平􅤈紫脫為常}
