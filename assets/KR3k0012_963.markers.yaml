  - {type: variant, offset: 1040, length: 568, content: 竹誤傷手便流淚而還同作者謂曰此不足損何至涕零荅曰此本不痛但遺體毀傷感而悲耳梁書曰武帝臨雍州命呂僧珍為中兵參軍委以心膂僧珍陰養死士歸之者甚眾武帝頗招武猛士庶饗從會者萬餘人因命按行城西空地將起數千間屋為止舍多伐林竹沉於檀溪積茅蓋若山阜皆未之用僧珍獨悟其旨因私具櫓數百張及兵起悉取檀溪林竹裝為舡艦葺之以茅並立辦眾軍將發患諸將須櫓甚多僧珍乃出先所具每舡付二張爭者乃息隋書曰明克讓字弘道平原鬲人也父山賓梁侍中克讓少好儒善談論博涉書史所覽將萬卷三禮禮論尤所研精龜筴曆象咸得其妙年十四釋褐湘東王法曹參軍時舍人朱异在儀賢堂講老子克讓預焉堂邊有脩竹异令克讓詠之克讓攬筆輒成其卒章曰非君多愛賞誰貴此貞心异甚奇之唐書曰南詔理無刑名桎梏之其罪以竹五本束之伏犯者撻其背又曰開成四年襄陽三縣山竹結實成米百姓採食莊子曰鵷鶵非練實而不食練實竹實也取其潔白淮南子曰太清之治也鳳麟降蓍龜兆甘露下竹實盈竹實鳳皇食又曰瓦以火成不可以得火竹以水生不可以得水瓦得火則破竹得水浸則死也又曰槁竹有火弗鑽不燃音然土中有水弗掘無泉掘猶窮也梅子曰弘農宜陽縣金門山竹為律管河內葭莩以為灰可以候氣取灰實管端置之深宮覆以緹幕勿令見風日節至則灰飛管通矣唐子曰希見食笋歸煮竹根家語曰子路見孔子孔子曰君子不可學子路曰南山有竹不揉自直斬而為用射達於犀革以此言之何學之為孔子曰括而羽之鏃而礪之其入不益深乎呂, SBCK: 笛吕}
