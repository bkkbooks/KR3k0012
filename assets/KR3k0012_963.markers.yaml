  - {type: variant, offset: 2365, length: 3, content: 羅浮山, WYG: 宋昌縣有棘竹長十尋大如甕其間短者輙六七丈也為竹藂薄葉下有鈎刺或有條末如如芒針南州異物志曰棘竹節有棘刺嶺表録異曰南土有刺竹其枝上有刺南人呼為刺勒自根橫}
  - {type: variant, offset: 2369, length: 0, content: '', WYG: 枝條展轉如織雖野火焚燒只燎細枝嫩葉春藂生轉復牢宻邕州舊以刺}
