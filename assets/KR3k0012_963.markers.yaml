  - {type: variant, offset: 2380, length: 331, content: 之鍾龍湘州記曰邵陵高平縣有文竹山上有石床四面綠竹扶踈常隨風委拂此床永嘉記曰陽嶼仙山有平石方十餘丈名仙壇有一筋竹垂壇旁風來輒掃拂壇上東陽記曰崑山去蕪城山十里峰嶺高峻故老傳云嶺上有圓池魚鼈具有池邊有竹極大風至垂屈掃地恒潔如人掃之丹陽記曰江寧縣南二十里慈姥山積石臨江生筲管竹王子淵洞蕭賦所稱即此也其竹圓緻音稚異於他處自伶倫採竹嶰谷其後唯此簳見珍故歷代常給樂府而俗呼曰鼓吹山風土記曰陽羨縣有袁君豚壇邊有數枚大竹高二三丈枝皆兩兩枝下垂如有塵穢則掃拂壇上恒淨潔袁山松宜都山川記曰佷山縣方山上有靈祠祠中有特生一竹擅美高危其妙下垂忽有塵穢起風動竹拂蕩如掃荊州記曰臨賀謝休縣東山有小竹生其旁皆四五寸圍下有盤石俓四五丈極高方正青滑如彈碁局兩竹屈垂掃其上初無塵穢未至數十里聞風吹此竹如, WYG: ''}
