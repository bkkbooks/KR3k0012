  - {type: variant, offset: 1738, length: 559, content: 花其年便枯竹六十年一易根易根必經結實而枯死實落土復生六年還成町穆天子傳曰天子西征至于玄池天子休于玄池之上乃奏廣樂三日而終是曰樂池乃樹之竹是曰竹林吳越春秋曰越王問范蠡用兵對曰越有處女願君王問之處女北見於王道逢老人自稱袁公跪披林杪竹未折墮地處女即捷其未公操其本而剌處女處女舉杖擊之飛上樹變為白猿具猿部三輔舊事曰武帝作延陵及廟竇將軍有青竹田在廟南恐犯蹈之言作陵不便世說曰魏武征袁本初治餘有數十斛竹片咸長數寸眾並謂不堪用正合燒除太祖意甚惜思所以用之謂可為竹甲而未顯其言馳使以問楊主簿德祖德祖意懸同風俗通曰殺青按殺青作簡書之新竹有汁後加於火上故作簡者於火上炙乾之水經曰東陽定縣夾岸緣溪悉生支竹及芳枳木連雜以霜菊金橙說文曰竹冬生草也華陽國志曰有竹王者興於遯水有一女浣於水濱有三節大竹流入女足間推之不去聞有兒聲持歸破竹得男長養有武才遂雄夷狄氏竹為姓所破竹於野成林今王祠竹林是也又曰何隨家養竹園人盜其竹何隨遇行見恐盜者覺怖走竹傷其足挈履徐步而歸文士傳曰蔡邕經會稽高遷亭見屋椽竹從東間數第十六可以為籥取用果有異聲神仙傳曰離婁公服竹汁餌桂得仙又曰壺公欲與費長房俱去長房畏家人覺公乃書一青竹戒曰卿以此竹歸家便稱病以此置卿臥處默便來還長房如言家人見此竹云是屍哭泣行喪荊楚歲時記曰夏至節日食粽周豦謂為角黍人並以新竹為筒粽練葉插五絲繫臂謂為長命縷, WYG: ''}
