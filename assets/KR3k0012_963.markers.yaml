  - {type: variant, offset: 479, length: 560, content: 林南山檀柘號陸海後漢書曰郭伋為并州刺史出行郡童子乘竹馬相待又曰寇恂為河內太守移書屬縣講兵肆射伐淇園之竹為矢百餘萬前書音義曰淇園衛之苑多竹篠也養馬二千疋收租四百萬斛轉以給軍晉書曰杜預討吳州郡多望風歸命眾軍會議或曰百年之寇未可盡剋今向暑水潦方降疾疫將起候來冬更為大舉預曰昔樂毅籍濟西一戰以併強齊今兵威已振譬如破竹數節之後皆迎刃而解無復著手豦也又曰武帝平吳之後復納孫皓宮人數千自此掖庭殆將萬餘人而並寵者甚眾帝莫知所適乘羊車恣其所之至便宴寢宮人乃取竹葉插戶以鹽汁灑地而引帝車又曰王徽之常居空宅中便令種竹聞其聲徽之嘯詠指竹曰不可一日無此君謝靈運晉書曰元康二年巴西界竹花紫色結實如麥晉書載記曰長安謠曰鳳皇鳳皇止阿房符堅以鳳皇非梧桐不棲非竹實不食乃植桐竹數十萬株于阿房宮城以待之慕容冲小字鳳皇至是終為堅賊入止阿城焉宋書曰卜天興弟天生少為隊將十人同火屋後有一坑廣二丈餘十人共跳之皆度唯天生墜天生乃取實中苦竹削其端使利交橫布坑內更呼等類共跳並懼不敢天生乃復跳之往反十餘曾無留礙眾並歎服南史曰南海王子罕字雲華武帝第十一子也頗有學問母尚容華有寵故武帝留心母常寢疾子罕晝夜祈禱于時以竹為燈纘照夜此纘宿昔枝葉大茂母病亦愈咸以為孝感所致又曰徐伯珍少孤貧學書無紙常以竹葉箭箬音若其蔗及地上學書南史隱逸傳曰沈麟士字雲禎居貧織簾誦書鄉里號為織簾先生嘗為人, SBCK: 任}
