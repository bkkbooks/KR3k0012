  - {type: variant, offset: 2156, length: 239, content: 蔡邕經會稽高遷亭見屋椽竹從東間數第十六可以為籥取用果有異聲神仙傳曰離婁公服竹汁餌桂得仙又曰壺公欲與費長房俱去長房畏家人覺公乃書一青竹戒曰卿以此竹歸家便稱病以此置卿臥處默便來還長房如言家人見此竹云是屍哭泣行喪荊楚歲時記曰夏至節日食粽周豦謂為角黍人並以新竹為筒粽練葉插五絲繫臂謂為長命縷王子年拾遺記曰蓬山有浮筠之簳葉青莖紫子如大珠有青鸞集其上下有砂礰細如粉暴風至竹條翻起拂細砂如雪霰仙者來觀戲焉風吹竹折聲如鍾磬之音南越志曰羅浮山生竹皆七八圍節長一二尺謂之鍾龍湘州記曰邵陵高平縣有文竹, SBCK: 茿陽薤}
