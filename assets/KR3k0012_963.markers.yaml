  - {type: variant, offset: 2995, length: 1, content: 生, SBCK: 宗入林中哀號方冬筍爲之出因以供養時人皆以爲孝感所致南史曰沈道䖍有人㧞其屋後笋令人止之曰惜此笋欲令成林更有佳者相與乃令人買大笋送與盗者慙不取道䖍使置其門内而還笋譜曰笋者竹之蒻也竹之醜節種凡草木有}
  - {type: variant, offset: 2995, length: 128, content: 生白虎殿前謂之孝竹群臣作孝竹頌又曰東海畔孤竹生焉斬而復生中為管周武王時孤竹人獻笋一株楊泉物理論曰宜陽金門竹為律管河內葭為灰可謂同氣宜陽洛州西北故縣名本草曰竹花一名華草夢書曰竹為處士田居夢見竹者憂處士也楚詞七諫曰便娟之竹寄生江潭上葳蕤而防露下泠泠而來風江逌竹, WYG: ''}
