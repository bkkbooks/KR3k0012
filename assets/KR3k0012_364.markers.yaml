  - {type: variant, offset: 1928, length: 6, content: 玉札金䇶內經, SBCK: 曹公捕左慈數日得之便斷頭以白曹公公大喜曰果慈頭定視是一束茅耳搜神記曰南方有落頭民呉時將軍朱桓得一婢每夜卧後頭輙飛去或從狗竇或從天䆫中出入以耳爲翼將曉復還數數如此旁人恠之夜照視唯有身無頭其體微冷氣息裁屬乃蒙之以􅀍至時頭還礙􅀍不得安再三墮地噫咤甚愁而體氣急疾􅀂將死者乃去􅀍頭復起􅀓頸得安復如常人時南征大將亦徃徃得之又甞有覆以銅盤者頭不得進遂死􅀶物志同又曰渤海太守史良好一女子許而不果良斷其頭而歸投於竈下曰當令火葬頭語曰使君我相從何圖當耳異苑曰管寧避難遼東還汎海遭風舡垂傾没寧思􅄽曰吾甞一朝科頭三晨晏起今天怒猥集過恐在此又曰晉惠帝元康三年武軍火燒夫子履漢斬白蛇劒􅃮王莽頭等録異傳曰漢武帝時蒼梧賈雍爲豫章太守有神術出界討賊爲賊所殺失頭雍上馬還營營中咸走來視雍雍􅇩中語曰戰不利爲賊所傷諸君視有頭爲佳無頭佳乎吏泣曰有頭佳雍曰不然無頭亦佳言畢遂死幽明録曰河東賈弼小名翳兒具諳究丗譜義熈中爲琅邪府叅軍夜夢有一人面齄甚多大鼻瞷目請之曰愛君之貌欲易頭可乎乃於夢中許易明朝起自不覺而人悉驚走琅邪王大驚遣傳教呼視弼到琅邪遥見起還内弼取鏡自㸔方知恠異因還家家悉驚入内婦女走藏弼坐自陳􅀃良乆并遣人至府檢問方信後能半面啼半面􅀏兩手各捉一筆俱書辭意}
