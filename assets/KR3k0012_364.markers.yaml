  - {type: variant, offset: 3172, length: 210, content: 歲講堂上司馬德操撫其頭曰孺子黃中通理寧自知不蜀志曰秦密使吳吳主問密天有頭乎曰有詩云乃睠西顧以此推之頭在西方又曰魏延字文長義陽人延夢頭上生角以問占夢趙直直告人曰角之為字刀下為用頭上用刀其凶甚矣延後果誅楊儀蹋延頭曰庸能復作惡又曰先主與張飛趙云等泝流而上分定郡縣時巴郡嚴顏率眾守城不降及城陷縛顏至飛呵顏曰汝見大軍至何以不降而敢拒戰顏荅曰我州但有斷頭將軍無降將軍也飛怒命左右牽去斫頭大笑曰斫頭便斫頭何為怒耶於是飛壯而釋之引為上客, SBCK: 四}
