  - {type: variant, offset: 187, length: 255, content: 其幼時知必非常故父彝字曰溫白虎通曰人所以有字何所以冠德明功敬成人也故禮士冠經曰賓北面字之又曰冠而字之敬其名也所以五十乃稱伯仲者五十知天命思慮定也能從四時長幼之序故以伯仲號也荀氏家傳曰荀愷字茂伯小而智外祖晉宣王甚器之字為虎子弟悝為龍子王每謂曰俟汝長大當共天下陳武別傳曰武胡人育於臨水令陳君君奇之起議欲易其故字武長跪自啟曰里語有之都亭鼠數聞長者語今當易字寔有私心嘗聞長卿慕藺相如之行故字相如往在鄉里久聞故老之說稱漢使蘇武執忠守志不服單于流放漠北擁節牧羊寄秋鴈以訴心因行雲而託誠高山仰止意竊慕之陳氏嘉其志遂名之曰武又, SBCK: 堅􅃺貌}
