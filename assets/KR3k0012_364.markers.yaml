  - {type: variant, offset: 3124, length: 11, content: 袁紹辟牽招為督軍從軍紹, SBCK: 􅌆帝令陳稜討杜伏威伏威自出陣前挑戰稜部將射中其額伏威怒指之曰不殺汝我終不拔箭遂馳之􅀗所射者使其拔箭然後斬之鹽鐵論曰古者君子思徳小人思利今人堅額徤舌或以致業抱朴子曰老君額有三理上下徹語林曰賈充問孫皓何以好剥人面皮皓曰憎其顔之厚呉都賦曰雕題之士注曰鏤額也嶺南並鏤額額題也相書占氣􅄂要曰黄氣如帶當額横卿之相也有}
