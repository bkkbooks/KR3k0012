  - {type: variant, offset: 1221, length: 2, content: 產日, WYG: 履漢斬白蛇劒漆王莾頭等録異傳曰漢武帝時蒼梧賈雍為豫章太守有神術出界討賊為賊所殺失頭雍上馬還營營中咸走來視雍雍胷中語曰戰不利為賊所傷諸君視有頭為佳無頭佳乎吏泣曰有頭佳雍曰不然無頭亦佳言畢遂死幽明録曰河東賈弼小名翳兒具諳究世譜義熙中為琅邪府叅軍夜夢有一人面齄􅀈甚多大鼻瞷目請之曰愛君之貌欲易頭可乎乃於夢中許易明朝起自不覺而人悉驚走琅邪王大驚遣傳教呼視弼到琅邪遥見起還内弼取鏡自㸔方知怪異因還家家悉驚入内婦女走藏弼坐自陳説良乆并遣人至府檢問方信後能半面啼半面笑兩手各捉一筆俱書辭意皆羙此為異也餘並如先列女傳曰京師節女長安大昌里人夫有仇仇家執父使要其子為中間女念不聼則殺父殺父不孝聼則殺夫殺夫不義乃許之曰夜在樓上新沐頭東首卧者是還譎其夫使卧他處自沭卧樓上仇家断其頭而去仇悲義之遂不殺其父益部耆舊傳曰叚翳字元章善天文風}
