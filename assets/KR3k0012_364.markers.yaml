  - {type: variant, offset: 693, length: 436, content: 府胃者五穀之府大腸轉輸之府小腸受成之府膽積精之府膀胱精液之府也孝經援神契曰人頭圓象天足方法地五藏象五行四胑法四時九竅法九分目法日月肝仁肺義腎志心禮膽斷脾信膀胱決難髮法星辰節法日歲腸法鈐鈐曲也主鍵閉東觀漢記曰詔書令功臣家各自記功狀不得自增加以變時事或自道先祖形貌表相無益事實復曰齒長一寸龍顏虎口奇毛異骨形容極變亦非詔書之所知也又曰上復以朱祐為護軍常舍止於中祐侍醼從容曰長安政亂云有日角之相從以觀上風采上曰召剌姦收護軍祐由是不復言江表傳曰孫權生而方頤大口目有精光晉起居注曰懷帝琅邪恭王子母曰夏侯氏帝生有白毫生於目左角龍顏隆準眼有精曜蜀李書曰武帝諱雄字仲雋始祖第三子帝身長八尺三寸美容貌相工相之曰此君將貴其相有四目如重雲鼻如龜龍口如方器耳如相望法為貴人位過三公不疑也帝每周旋鄉里有識者皆器重之有劉化者道術士也太康中每語鄉里曰李仲雋有大貴之表終為人主也車頻秦書曰符堅時四夷賓服湊集關中四方種人皆奇貌異色晉人為之題目謂胡人為側鼻東夷為廣面闊頞北狄為匡腳面南蠻為腫蹄方方以類名也吳均齊, SBCK: 呉越}
