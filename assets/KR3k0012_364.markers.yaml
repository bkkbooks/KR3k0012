  - {type: variant, offset: 1220, length: 0, content: '', WYG: 雲将東過扶揺之枝雲将雲之主師也扶揺木名生海東而適遭鴻䝉鴻䝉自然元氣雲将曰天氣不和地氣欝結六氣不調四時不節今我願合六氣之精以育羣生為之柰何鴻蒙拊髀爵躍掉頭曰吾弗知吾弗知又曰亡羊而得牛断指而得頭又曰晋惠帝元康三年武庫火燒夫}
