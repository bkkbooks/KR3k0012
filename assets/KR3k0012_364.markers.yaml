  - {type: variant, offset: 1197, length: 268, content: 孫呂長七尺面居三尺廣三寸鼻目取具名振天下管子曰子產日角晏平仲月角尾生犀角柳下惠史魚反角文子曰人頭之圓以法天足之方以象地天有四時五行九解三百六十日人亦復有四支五藏九竅三百六十節天有風雨寒暑人亦有取與喜怒膽為雲肺為雨脾為風腎為電肝為雷以與天地相類而心為之主耳目者日月也而血氣者風雨也日月失行而薄蝕無光風雨非時毀折生災五星失行州土受其殃天地之道愛其神明人之耳目何能久勤而不愛精神何能久馳而不止是故聖人內而不失也孔叢子曰魏安釐王欲以馬回為相問子順曰回為人便便亮直之丈夫也順曰聞諸孫卿其為人長目而豕視必體方而心圓臣見其面非不偉其體幹而疑其目王卒用, SBCK: 令掘}
  - {type: variant, offset: 1197, length: 2, content: 孫呂, WYG: 令掘之果如其言又曰湯}
