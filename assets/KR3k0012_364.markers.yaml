  - {type: variant, offset: 1969, length: 10, content: 三門足蹈二五手把十丈, WYG: 竒表腦枕如鼎形易洞林曰郭璞為左尉周恭卜云君墮馬傷頭尉後乗馬行黄昏坂下有犢車觸馬馬驚頭打石上流血殆死語林曰魏郡太守陳異嘗詣郡民尹方方被頭以水洗盤抱小兒出更無餘言異曰被頭者欲吾治民如理髮洗盤者欲使吾清如水抱小兒者欲使吾愛民如赤子也世説曰祖廣字淵度行恒縮頭詣桓南郡下車桓曰天甚明朗祖叅軍如從屋漏中來又曰諸葛道明初過江左名亞王庾之下先為臨沂令丞相謂曰明府當為黒頭公楚辭曰魂兮來歸若無上天些一夫九首㧞木九千些頂説文曰頂巔也易大過卦曰過渉㓕頂凶無咎韋曜毛詩問曰旱鬼眼在頂上}
