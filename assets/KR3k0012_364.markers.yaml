  - {type: variant, offset: 1928, length: 0, content: '', WYG: 曹公捕左慈數日得之便㫁頭以白曹公公大喜曰果慈頭定視是一束茅耳捜神記曰南方有落頭民吳時将軍朱桓得一婢毎夜卧後頭輙飛去或從狗竇或從天窓中出入以耳為翼将曉復還數數如此旁人怪之夜照視惟有身無頭其體㣲泠氣息裁属乃蒙之以被至時頭還礙被不得安再三墮地噫咤甚愁而躰氣急急疾若将死者乃去被頭復起轉頸得安復如常人時南征大将亦往往得之又嘗有覆以銅盤者頭不得進遂死愽物志同又曰渤海太守史良好一女子許而不果良㫁其頭而歸投於竈下曰當令火葬頭語曰使君我相從何圖當耳吳苑曰管寧避難遼東還汎海遭風船垂傾没寕思􅄽曰吾嘗一朝科頭三晨晏起今天怒猥集過恐在此三巴記曰巴有将軍曼子請於楚以平巴亂楚使請城曼子曰城不可得乃自刎其頭與楚楚義之以上卿禮葬其頭巴以上卿禮葬其身長沙耆舊傳曰劉夀少時遇相師曰君腦有}
