  - {type: variant, offset: 1683, length: 2, content: 壽南, krp: 果良斷其頭而歸投於竈下曰當令火葬頭語曰使君我相從何圖當耳異苑曰管寧避難遼東還汎海遭風舡垂傾没寧思愆曰吾甞一朝科頭三晨晏起今天怒猥集過恐在此又曰晉惠帝元康三年武軍火燒夫子履漢斬白蛇劒􅃮王莽頭等録異傳曰漢武帝時蒼梧賈雍爲豫章太守有神術出界討賊爲賊所殺失頭雍上馬還營營中咸走來視雍雍匈中語曰戰不利爲賊所傷諸君視有頭爲佳無頭佳乎吏泣曰有頭佳雍曰不然無頭亦佳言畢遂死幽明録曰河東賈弼小名翳兒具諳究丗譜義熈中爲琅邪府叅軍夜夢有一人面齄甚多大鼻瞷目請之曰愛君之貌欲易頭可乎乃於夢中許易明朝起自不覺而人悉驚走琅邪王大驚遣傳教呼視弼到琅邪遥見起還内弼取鏡自㸔}
