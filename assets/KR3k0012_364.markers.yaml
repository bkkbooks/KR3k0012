  - {type: variant, offset: 1657, length: 267, content: 隆鼻大口鳶肩企行竅通於目筋氣屬焉倉色主肝長大早知而不壽南方陽氣之所浹暑溫居之其人墮形銳上大口決眥竅通於耳血脈屬焉赤色主心早壯而夭西方高土川谷出焉日月入焉其人皆方面脩頸卬行竅通於鼻皮革屬焉白色主肺而勇敢不仁北方幽晦不明天之所閉者也寒冰之所積者也其人翕形短頸大肩下尻竅通於陰骨幹屬焉黑色主腎其人惷愚而壽中央四達風氣之所通雨露之所會也其人大面短頤美鬚竅通於口膚肉屬焉黃色主胃而惠聖博物志曰東方少陽日月所出山谷清朗其人姣好西方少陰日月所入其土窈冥其人高鼻深目多毛南方太陽土下水沃其人大口北方太陰土平廣深其人廣面縮頸中央四抄風雨交山谷峻其人端立, SBCK: ''}
