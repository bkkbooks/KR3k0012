  - {type: variant, offset: 4336, length: 641, content: 涇原節度康季榮奏吐蕃宰相論恐熱以秦原安樂三州及石門等七關之兵民歸國詔太僕卿陸躭往喻旨仍令靈武節度使朱叔明邠寧節度使張景緒各出本道兵馬應接六月康季榮奏收復原州城及石門驛藏木峽制勝六盤石峽等六關訖邠寧張景緒奏收復蕭關勑於蕭關置武州改樂安為威州七月三日七關軍人百姓皆河隴遺黎數千人見于關下上御延喜門撫慰令其解辮賜之冠帶共賜絹十五萬疋八月鳳翔節度使李玼奏收復秦州制曰自昔皇王之有國也何嘗不文以守成武以集事參諸二柄歸于大寧朕猥荷丕圖思弘景運憂勤戒惕四載于茲每念河湟土疆綿亙遐闊洎天寶末犬戎乘我多難無方禦姦遂縱腥羶不遠京邑事更十葉時近百年進士試能靡不竭其長策朝廷下議皆亦聽其直詞盡以不生邊事為永圖且守舊地為明理荏苒於是收復無由今者天地儲祥祖宗垂祐左衽輸款邊壘連降刷恥建功所謀必剋實賴樞衡妙筭將帥雄稜副玄元不爭之文絕漢武遠征之悔甌脫頓空於內地斥候全據於新封莫大之休指期而就況將士等櫛沐風雨暴露郊原披荊榛而刁斗夜嚴逐豺狼而穹廬曉破動皆如意古無與京念此誠勤宜加寵賞涇原宜賜絹六萬疋靈武五萬疋鳳翔邠寧各四萬疋嗚呼七關要害三都膏腴候館之殘趾可尋唐人之遺風尚在追懷往事良用興嗟夫取不在廣貴保其金湯得必有時詎計於遲速今則便務修築不進干戈必使足食足兵有備無患載洽亭育之道永置生靈之安中外臣寮宜體朕意十二月追謚順宗曰至德大聖大安孝皇帝憲宗曰昭文章武大聖孝皇帝初以河湟收復百寮請加徽號帝曰河湟收復繼成先志朕欲追尊祖宗以昭功烈白敏中等對曰非臣等愚昧所能及至是上御宣政殿行事及冊出上俯僂目送流涕嗚咽四年春正月以追尊二聖, SBCK: 戊戍朔}
