  - {type: variant, offset: 242, length: 519, content: 兵權以濟事所下制敕難以通行宜令尚書省取元和已來制敕參詳刪定訖送中書門下議定聞奏甲戍以旱放繫囚七月李同捷除兗海不受詔結幽鎮謀叛徐州王智興請全軍討之帝自撰集尚書中君臣事跡命畫工圖寫於太液亭朝夕觀覽三年五月己卯柏耆斬李同捷於將陵滄景平丁亥御興安樓受滄州所獻俘九月敕兩軍諸司內官不得著紗縠綾羅等衣服帝性儉素不喜華侈駙馬韋處仁載夾羅巾帝謂之曰比慕卿門地清素以之選尚如此巾服從他諸戚為之唯卿非所宜也十一月甲午帝親祀昊天上帝於南郊禮畢御丹鳳門大赦禁止奇貢四方不得以雜樣織成非常之物為獻十二月蠻陷邛雅等州戊午以右領軍衛大將軍董重質充神策西川行營都知兵馬使蠻陷成都府入梓州西郭門下營又詔促諸鎮兵救援兩川乙巳郭釗奏蠻退遣使賜蠻帥蒙𥰭顛國信四年四月詔曰儉以足用令出唯行著在前經斯為理本朕自臨四海愍元元之久困日昊忘食宵興疚懷雖絕文繡之節尚愧茅茨之儉示喻卿士形于詔條如聞積習流獘餘風未革車服第室相高以華靡之制資用貨寶固啟於貪冒之源有司不禁侈俗滋扇蓋朕教條之未敷使兆庶昧於恥尚也其何以足用行令臻于致理歟永念慚歎迨茲申敕自今內外班列職位之士各務素朴弘茲國風有僣差尤甚者御史糾上主者宣示知朕意焉上承長慶寶曆奔靡之風銳意懲革躬行儉素以率厲之五年春正月庚子朔以積陰旬浹罷元會, SBCK: 據}
