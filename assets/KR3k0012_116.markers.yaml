  - {type: variant, offset: 2287, length: 478, content: 賀辛巳崩于大明官之太和殿謚曰元聖昭獻皇帝廟號文宗葬章陵武宗昭肅皇帝唐書曰武宗昭肅皇帝諱炎穆宗第五子母曰宣懿皇后韋氏元和九年六月十三日生於東宮長慶元年三月封潁王本名瀍初文宗追悔莊恪太子殂不由道乃以敬宗子陳王成美為皇太子開成四年冬十月宣制未遑冊禮五年正月文宗暴疾宰相李玨樞密劉弘季奉密旨以皇太子監國兩軍中尉仇士良魚弘志矯詔迎穎王於十六宅曰朕自嬰疾疹有加無瘳懼不能躬揔萬機日釐庶政稽于古訓謀及大臣用建親賢以貳神器親弟潁王湹昔在藩邸與朕嘗同師訓動成儀矩性稟寬仁俾奉昌圖必諧人欲可立為皇太弟應軍國政事便令權勾當百辟卿士中外庶臣宜竭乃心輔成子志陳王成美先立為皇太子以其年尚冲幼未漸師資比日重難不遑冊命廻踐諸邸式協至公可復封陳王四日文宗崩宣遺詔皇太弟宜於柩前即皇帝位宰相楊嗣復攝冢宰十四日受冊於正殿年二十七二月制穆宗妃韋氏追謚宣懿皇太后帝之母也上御正殿降德音以開府右軍中尉仇士良封楚國公右軍中尉魚志弘為韓國公太常卿崔鄲戶部尚書判度支崔珙並本官同中書門下平章事帝在藩邸時頗好道術修攝之事是秋召道士趙歸真八十一人入禁中於三殿修金籙道場乃幸三殿於九天壇親受法籙右拾遺王哲上䟽言, SBCK: 廷}
