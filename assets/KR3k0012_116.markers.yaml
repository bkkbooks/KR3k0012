  - {type: variant, offset: 6624, length: 0, content: '', WYG: 僖宗葬靖陵黄巢唐書曰黄巢曹州寃句人本以販鹽為事乾符中仍嵗凶荒人飢為盜河南尤甚初里人王仙芝尚君長聚盜徒於濮陽攻剽城邑䧟曹濮及鄆州詔左金吾衞上將軍齊克譲為兖州節度使以本軍討仙芝仙芝懼引衆厯陳許襄鄧無少長皆虜之衆號三十萬三年七月䧟江陵十月又遣將徐唐昌䧟洪州時仙芝表請符不許以神䇿統軍節度使宋威為荆南節度招討使中使楊復光為監軍復光遣判官呉彦𢎞諭以朝㫖釋罪别加官爵仙芝乃令尚君長詣闕請罪且求恩命時宋威害復光之成功禽送闕斬之賊怒悉衆擊官軍威軍大敗復光收其餘衆以統之朝廷以王鐸代為招討五年八月收復荆州斬仙芝首獻於闕下先是君長弟譲以兄奉使見誅率部衆入查牙山巢弟揆昆弟八人率盜千數依譲月餘衆至數萬䧟汝州大掠關東官軍加討屢為所敗其衆十餘萬尚譲乃與羣盜推巢為主曰衝天大將軍署官屬藩鎮不能制時天下承平日久人不知兵僖宗以㓜主臨朝號令出於臣下巢馳檄四方章奏論列皆指朝政之弊巢徒黨既盛與仙芝為引援及仙芝敗東攻亳州不下乃襲破沂州據之仙芝餘黨悉附焉時王鐸緩於攻取髙駢鎮淮南求請招討賊許之及巢渡淮偽降於駢遣將張璘率兵受降於天長鎮巢禽璘殺之因虜其衆尋南䧟湖湘遂據交廣托越州觀察使崔穆奏乞天平軍節度朝議不允又自求乞安南都䕶廣州節度亦不允是嵗自春及夏其衆大疫死者十三四衆勸請北歸以圖大利廣明元年北踰五嶺犯湖湘江浙進逼廣陵髙駢閉門自固所過鎮戍望風降賊九月渡淮十一月䧟洛陽繼攻陜虢逼潼關䧟華州留將奮鈐守之朝廷以田令孜率神䇿博野等軍十萬守潼闗闗之左有谷可通行人平時禁人出入謂之禁谷及賊至官軍但守潼闗不妨禁谷尚譲林言率前鋒田禁谷而入夾攻潼關官軍大潰博野都徑還京師燔掠西市十二月三日僖宗夜自開逺門出趨駱谷四日賊至昭應五日䧟京師時巢衆累時為盜行伍不勝其冨遇窮民於路爭行施遺既入闠門坊市聚觀尚譲慰曉市人曰黄王為生靈不似李家不惜汝輩但各安家業賊衆競投物遺人十三日巢僭位國號大齊仍御樓赦且陳符命曰唐帝知朕起義改元廣明以文字言之唐已無天分矣唐去丑口而安黄天令黄在唐下乃黄家日月也土生金予以金生宜改年為金統中和元年二月尚譲㓂鳯翔鄭畋出師禦之大敗賊於龍尾坡畋乃馳檄告諭天下藩鎮四月涇原行軍唐𢎞夫之師屯渭北河中王重榮之師屯沙苑易定王處存之師屯渭北橋鄜延拓抜思恭之師屯武功鳯翔鄭畋之師屯盩厔六月邠寧朱玟之師屯興平忠武之師三千屯武功是嵗勤王之師四面俱㑹十二月宰臣王鐸率荆襄之師自行在至鄭畋帳下小校竇玫者驍敢無敵每夜率敢死之士直入京師放火燔諸門斬首級而還賊大悚駭二年王處存合忠武之師敗賊將尚譲乘勝收復京師賊遁去處存不為備是夜復為賊㓂襲官軍不利九月賊將同州刺史朱温降王重榮十二月李克用率代北之師自夏陽渡河屯沙苑三年春正月敗黄揆於沙苑進營乾坑二年尚譲率衆十萬援華州克用合河中易定武之師戰於梁田坡大敗賊軍俘斬數萬乘勝攻華州塹柵以還之黄揆棄華州官軍收城四月八日克用合忠武騎將寵從遇賊於渭南决戰三捷大敗賊軍十月夜巢黨散走詰旦克用收京師巢賊出藍田七盤路東走關東五月巢賊先鋒將孟楷攻蔡州節度使秦宗權稱臣於賊遂攻陳許營於溵水陳州刺史趙犨敗賊前鋒生擒孟楷斬之巢乃悉衆攻陳州於是自唐鄧許汝孟洛鄭汴曹濮徐兖數十州畢罹其毒賊圍陳郡三百日關東仍嵗無耕稼人餓倚墻壁間賊俘人而食趙犨求援於太原四年三月李克用率山西諸軍由蒲陜濟河㑹關東諸侯赴援陳州三月諸侯之師復集四月官軍敗賊於太原俘斬萬計收其四壁又敗賊將黄鄴於華西收其壁巢敗大恐收軍營於故陽里官軍進攻之五月大雨震電平地水深三尺壊賊壘賊自離散復聚於尉氏逼中牟翌日營汴水北是夜復大雨震雷溝塍漲溢賊分㓂汴州李克用自鄭州引軍襲擊大敗之賊衆保胙縣官軍追討賊無所保其將李讜降于大梁尚讓率部下人歸時溥賊自相猜間相殺於營州所殘者千人中夜遁去克用追擊至濟隂而旋賊散於兖鄆界黄巢入太山徐帥時漙遣將張友與尚讓之衆掩捕之至狼虎谷巢將林言斬巢及二弟鄴揆等七人首并其妻子函送徐州昭宗景文皇帝唐書曰昭宗景文皇帝諱曄}
