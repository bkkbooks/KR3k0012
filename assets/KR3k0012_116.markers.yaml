  - {type: variant, offset: 1699, length: 363, content: 上曰我每思貞觀開元之時觀今日之事往往憤氣瑱膺耳開成元年正月辛丑帝常服御宣政殿受賀遂宣詔大赦天下改元乙巳上御紫宸對宰臣李石奏曰陛下改元御殿人情大悅全放京兆一年租賦又停四節進奉恩澤所該實當要切帝曰朕務行其實不欲崇長空文石曰赦書須內留一本陛下時看之又十道黜陟使發日更付與公事根本令向外與長吏詳擇施行方盡利害之要矣二年三月戊辰夜彗長八丈有餘西北行東指在張十四度壬申詔曰朕嗣守丕搆對越上玄虔恭寅畏于今一紀何嘗不宵衣念道昃吳食思愆師周文之小心慕易乾之夕惕懼德不類貽列聖羞將欲俗致和平時無殃咎然誠未格物謫見于天仰愧三靈俯慚庶彙思獲攸濟浩無津涯昔宋景發言星因退舍魯僖納諫飢不害人取鑒往賢深惟自勵載軫在予之責宜降恤辜之恩式表殷憂冀荅昭誡天下死罪降從流流已下並釋放三年九月上以皇太子慢遊敗度欲廢之中丞狄兼謨垂涕切諫是夜移太子於少陽院殺太子宮人左右, SBCK: ''}
