  - {type: variant, offset: 5333, length: 0, content: '', krp: 以㓜主臨朝號令出於臣下巢馳檄四方章奏論列皆指目朝政之弊巢徒黨旣盛與仙芝爲影援及仙芝敗東攻亳州不下乃襲破沂州虜之仙芝餘黨悉附焉時王鐸緩于攻取髙駢鎭淮南表請詔討賊許之巢乃渡淮僞降于駢駢遣將張璘率兵受降于天長鎭巢擒璘殺之因虜其衆尋南䧟湖湘遂據交廣託越州觀察使崔璆奏乞天平軍節度朝議不允又自表乞安南都護廣州節度亦不允是歳自春及夏其衆大疫死者十三四衆勸請北歸以圖大利廣明元年北踰五嶺犯湖湘江浙進逼廣陵髙駢閉門自固所過鎭戍望風降賊九月渡淮十一月䧟洛陽繼攻陜􅉑逼潼關䧟華州留將喬鈐守之朝廷以田令孜率神䇿博野等軍十萬守潼關關之左有谷可通行人平時禁人出入謂之禁谷及賊至官軍但守潼關不坊禁谷尚譲林言率前鋒由禁谷而入夾攻潼關官軍大潰博野都徑還京師燔掠西市十二月三日僖宗夜自開逺門出趍駱谷四日賊至昭應五日䧟京師時巢衆累年爲盗行伍不勝其冨遇窮民於路爭行施遺旣入青門坊市聚觀尚譲慰曉市人曰黄王爲生靈不似李家不惜汝輩但各安家業賊衆競投物遺人十三日巢僣位國號大齊仍御樓宣赦且陳符命曰唐帝知朕起義改元廣明以文字言之唐巳無天分矣唐去丑口而安黄天意令黄在唐下乃黄家日月也土生金予以金王宜改年爲金統中和元年二月尚譲宼鳯翔鄭畋出師禦之大敗賊於龍尾坡畋乃馳檄告諭天下藩鎭四月涇原行軍唐弘夫之師屯渭北河中王重榮之師屯沙苑易定王處存之師屯渭橋鄜延托䟦思}
  - {type: variant, offset: 5334, length: 1, content: 惠, SBCK: 之師屯武功鳯翔鄭畋之師屯盩厔六月邠寕朱玫之師屯興平忠武之師三千屯武功是歳諸侯勤王之師四面俱㑹十二月宰臣王鐸率荆襄之師自行在至鄭畋帳下小校竇玫者驍敢無敵每夜率敢死之士百人直入京師放火燔諸門斬級而還賊人悚駭二年王處存合忠武之師敗賊將尚讓乗勝收京師賊遁去處存不爲備是夜復爲賊宼襲官軍不利九月賊將同州刺史朱温降王重榮十一月李克用率代北之師自夏陽渡河屯沙􅁐三年正月敗黄揆於沙􅁐進營乾坑二月尚讓率衆十萬援華州克用合河中易定忠武之師戰於梁田坡大敗賊軍俘斬數萬乗勝攻華州塹柵以環之黄揆棄華州官軍收城四月八日克用合忠武􅀐將龐從遇賊於渭南决戰三捷大敗賊軍十日夜巢黨散走詰旦克用收京師巢賊出藍田七盤路東走􅀜東五月巢賊先鋒將孟揩攻蔡州節度使秦宗權稱臣於賊遂攻陳許營於溵水陳州刺史趙犨逆戰敗賊前鋒生擒孟揩斬之巢乃悉衆攻陳州營於是自唐鄧許汝孟洛鄭汴曹濮徐兖數十州畢罹其毒賊圍陳郡三百日􅀜東仍歳無耕稼人餓􅀝牆壁間賊俘人而食趙犨求援於太原四年二月李克用率山西諸軍由蒲陜濟河㑹􅀜東諸侯赴援陳州三月諸侯之師復集四月官軍敗賊於太康俘斬萬計收其四壁又敗賊將黄鄴於西華收其壁巢賊大恐收軍營於故陽里官軍進攻之五月大􅀨震電平地水深三尺壞賊壘賊自離散復聚於尉氏逼中牟翌日營汴水北是夜復大􅀨震雷溝塍漲溢賊分㓂汴州李克用自鄭州引軍襲擊大敗之殘衆保胙縣􅁈句官軍追討賊無所保其將李讜張歸霸等各率部下降于大梁尚讓率部下萬人歸時􅄎賊自相猜間相殺於營中所殘者千人中夜遁去克用追擊至濟隂而旋賊散於兖鄆界黄巢入㤗山徐帥時溥遣將張友與尚譲之衆掩捕之至狼虎谷巢將林言斬巢及二弟鄴揆等七人首并其妻子函送徐州昭宗景文}
