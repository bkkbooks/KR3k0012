  - {type: variant, offset: 3030, length: 471, content: 乃徵發許蔡汴滑等六鎮之師以太原節度使劉沔為廻鶻南面招討使以張仲武為幽州盧龍節度使充廻鶻東面招討使以李思忠為廻鶻西南面招討使皆會軍於太原十月幸涇陽校獵白鹿原諫議大夫高少逸鄭朗等於閤內論陛下校獵太頻出城稍遠萬機廢弛晨出夜歸方用兵師且宜停止上優勞之諫官出上謂宰相曰諫官甚要朕時聞其言庶幾減過三年春正月以宿師于野罷元會二月太原劉沔奏至大同軍遣石雄襲廻鶻牙帳大敗廻鶻於殺胡山其烏介可汗被瘡而走已迎得太和公主至雲州是日御宣政殿百寮稱賀三月太和公主至京師百官班于章敬寺迎謁仍令所司告憲宗穆宗二室四月昭義節度使劉從諫率三軍以從諫姪稹為兵馬留後上表請授節鉞尋遣中使齎詔潞府令稹護從諫之喪歸洛陽稹拒朝旨尋以成德軍節度使王元逵魏愽節度使何弘敬並以本官充招討澤潞使四年三月以道士趙歸真為左右街道門教授先生時帝志學神仙師歸真歸真乘寵每排毀釋氏言非中國之教蠹耗生靈盡宜除去帝頗信之七月王元逵奏邢州刺史裴問別將高元武以城降洺州刺史王釗磁州刺史安玉皆以城降何弘敬山東三州平潞州大將郭誼張谷陳揚廷遣人至王宰軍請殺劉稹首以自贖王宰以聞乃詔石雄率軍三千入潞州郭誼斬劉稹首以迎雄澤潞, SBCK: ''}
