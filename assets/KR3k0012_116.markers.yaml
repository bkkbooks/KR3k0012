  - {type: variant, offset: 6626, length: 0, content: '', WYG: 第七子母曰惠安太后王氏以咸通八年三月生於東内十三年封壽王名傑乾符四年授開府儀同三司幽州大都督幽州盧龍等軍節度使帝於僖宗母弟也尤相親睦自艱難播越嘗隨侍左右文徳元年二月僖宗暴不豫初復宫闈人人心傾矚遽聞被疾軍民駭愕及大漸之夕未知所立軍容楊復恭請以壽王監國遺詔立為皇太弟柩前即帝位時年二十二以司空韋昭度攝冡宰己丑見羣臣始聴政帝攻書好文尤重儒術神氣雄俊有㑹昌之遺風以先朝威武不振國命寢微而尊禮大臣詳延道術意在恢張舊業號令天下即位之始中外稱之四月庚午追諡聖母惠安太后曰恭獻龍紀元年春正月上御武徳殿受朝賀大赦改元文武臣寮進秩頒爵有差五月漢州刺史王建䧟城都府遷陳敬瑄於雅州建自稱西川兵馬留後用田令孜為監軍十一月己丑朔將有事於圜兵改名曰曄辛亥上宿齋於武徳殿甲寅圜丘禮畢御承天門大赦大順元年春正月御武徳殿受朝賀宰臣百寮上徽號曰聖文睿徳文武𢎞孝皇帝禮畢大赦改元乾寧元年春正月上御武徳殿受朝賀大赦改元二年五月甲子李茂真王行瑜韓建等各率精甲數千人入覲京師大駭人皆亡竄吏不能止帝御安福門以待之三帥既至拜舞樓下帝臨軒喻之曰卿等藩侯宜存臣節稱兵入朝不申奏請意在何也茂貞行瑜汗流洽背不能對唯韓建陳叙入覲之由上並召昇樓賜巵酒宴於同文殿茂貞行瑜極言南北司相傾深􅗜時政請誅其太甚者乃貶宰相韋昭受李谿尋殺之殺内官數人而去王行瑜留弟行約茂貞留假子閻圭各以兵三千人宿衞時三帥同謀廢帝立吉王聞太原起軍乃止留兵宿衞而還七月李克用舉軍渡河以討王行瑜李茂貞韓建等庚申同州節度使王行實棄郡入京師謂兩軍中尉駱金瓘劉景宣曰沙陁十萬至矣請理車駕幸邠州且有城守時景宣附鳯翔癸亥夜閻圭與劉景宣子繼成同州王文實縱火剽東市脅上出幸上聞亂登承天門遣諸王率禁兵禦之捧日都頭李筠率本軍侍衞樓前閻圭以鳯翔之卒攻李筠矢及御座之樓扉上懼下樓與親王公主内人數百幸永興坊李筠軍扈蹕都頭李君實以兵繼至乃與筠兩都兵士侍衞出啓夏門憇於華嚴寺以俟内人繼至其日晚幸沙城鎮京師士庶從幸者數十萬北至南山谷口渇死三之一至暮為盜冦掠慟哭之聲殷動山谷信宿宰相徐彦若王搏崔𦙍三人至乃移幸石門鎮之佛宫乃令知樞密劉先裕薛王知柔歸京師令置禁軍以備宫禁丙寅李克用遣牙將閻諤奉表奔問奏屯軍河中俟上進發赴邠州丁夘上遣内官張承業傳詔克用軍便令監太原行營兵馬發赴新平又令内官郄廷立傳詔涇州令張璠起涇原之師㑹克用軍上在南山半月餘克用仍在河中未至渭北上懼鳯翔兵士刼遷乃令延王將御服鞍馬玉器至河中宣諭八月李克用遣子存貞奉表行在請車駕還宫辛亥車駕還宫三年六月鳯翔軍犯京畿單王拒之於婁館接戰不利七月岐軍過京師諸王率禁兵奉車駕將幸太原癸巳次渭北華州韓建遣子充奉表起居請駐蹕華州乙未次下邽丙申駐蹕華州時岐軍犯京師宫室􅆵閈鞠為灰燼光化元年八月車駕自華還京師御端門大赦改元三年十一月左右軍中尉劉季述王仲先廢帝幽於東内問安宫請皇太子裕監國是日迎太子裕監國矯宣昭宗命稱上皇甲午宣上皇制太子登皇帝位十二月癸未夜䕶駕孫昭徳周承誨等以兵攻劉季述王仲先㩦其首詣東宫門呼曰逆賊王仲先已斬首訖請陛下出宫慰諭兵士宫人破鑰帝與后方得出天復元年正月昭宗反正登長樂門樓受朝賀四月甲戌有事於宗廟是日御長樂門大赦改元十月戊戌朱全忠引四鎮之師赴河中京師聞之大恐民間亡竄山谷十一月中尉韓全誨與鳯翔獲駕都将李繼徽奉車駕出幸鳯翔三年正月車駕至鳯翔幸全忠軍全忠素服待罪泣下不自勝上親解玉帶賜之乙丑次扶風令朱友倫總兵侍衞丁夘次興平宰臣崔𦙍率百官迎謁戊辰次咸陽己巳入京師天子素服哭於太廟改服冕旒謁九廟禮畢御長樂樓大赦天祐元年正月全忠率師屯河中遣牙将㓂彦卿奉表請車駕還洛陽全忠令長安居人按籍遷居撤屋木自渭浮河而下連甍號哭月餘不息秦人大罵於路曰國賊崔𦙍朱温傾覆社稷俾我及此天乎天乎丁巳車駕發京師癸亥次陜州全忠迎謁於路四月甲辰車駕由徽安門入朱全忠張全義宰相裴樞獨孤損前導是日大風雨上跬步不辨物色日晡稍止上謁太廟禮畢還宫御宣正殿勞從官衛士乙巳上御元正殿大赦八月壬寅夜朱全忠令朱友恭氏叔琮蒋𤣥暉弑帝於椒殿帝自離長安日憂不測與皇后内人惟沉飲薨時年三十八諡曰聖穆景文孝皇帝廟號昭宗}
