  - {type: variant, offset: 3604, length: 496, content: 天下秋七月庚子勑併省天下佛寺所拆寺四千六百餘所還俗僧尼二十六萬五百人收充兩稅戶拆招提蘭若四萬餘所收膏腴上田數千萬頃收奴婢為兩稅戶十五萬人六年三月壬寅上不豫制改御名曰炎帝重方士頗服食修攝親授法籙至是藥躁喜怒失常既篤旬日不能言宰相李德裕等請見不許中外莫知安否人情危懼是月二十三日宣遺詔以皇太叔光王柩前即位是日崩年三十三謚曰至道昭肅孝皇帝廟號武宗葬端陵宣宗獻文皇帝唐書曰宣宗獻文皇帝諱忱憲宗第十三子母曰孝明皇后鄭氏元和五年六月生於大明宮長慶元年三月封光王名怡會昌六年三月武宗疾篤宣遺詔立為皇太叔權勾當軍國政事翌日即帝位改今名時年三十七帝外晦而內朗嚴重寡言視瞻特異幼時宮中以為不惠十餘歲時遇重疾沉綴忽有光輝燭身蹶然而興正身拱揖如對臣寮乳媼以為心疾穆宗往視之撫其背曰此吾家英物非心憊也賜以玉如意御馬金帶嘗夢乘龍昇天言之於鄭太后乃曰此不宜人知母幸勿復言歷大和會昌朝愈事韜晦群居游處未嘗有言文宗武宗幸十六宅宴集彊誘其言以為戲劇謂之光叔武宗氣豪尤不為禮及監國之日哀毀滿容接待群寮決斷庶務人方見其隱德焉四月辛釋服尊母鄭氏曰皇太后以兵部侍郎翰林學士承旨白敏中同中書門下平章事大中元年正月有事於郊廟禮畢御丹鳳門大赦, SBCK: ''}
