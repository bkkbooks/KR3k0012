  - {type: variant, offset: 6303, length: 0, content: '', krp: 聖穆景}
  - {type: variant, offset: 6304, length: 315, content: 懿主郭淑妃所生上尤鍾念悲惜異常以待詔韓宗紹等醫藥不效殺之收捕其親族三百餘人繫京兆府宰相劉贍京兆尹溫璋上䟽論諫行法太過上怒十二年春正月宰相路巖率文武百寮上徽號曰睿文英武明德至仁大聖廣孝皇帝御含元殿冊禮畢大赦五月庚申勑慎恤刑獄大易格言語曰如得其情則哀矜而勿喜而獄吏苛刻務在舞文守臣因循罕聞視事以此械繫之輩溢於狴牢追捕之徒繁於簡牘實傷和氣用致沴氛況時屬熇蒸化先茂育並赦罪戾式順生成應天下所禁繫罪人除十惡五逆故意殺人外餘並宜踈理釋放十四年六月帝不豫七月戊寅疾大漸制立普王儼為皇太子權勾當軍國政事辛巳遺詔曰皇太子儇性稟寬和生知忠孝德苞睿哲聖表徇齊必能揚祖宗之重光荷邦家之不搆宜令所司具禮於柩前即皇帝位是日崩于咸寧殿聖壽四十一謚曰睿文昭聖恭惠, SBCK: ''}
