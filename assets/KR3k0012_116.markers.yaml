  - {type: variant, offset: 5653, length: 2, content: 丹鳳, SBCK: 長樂樓大赦天祐元年正月全忠率師屯河中遣牙將㓂彦卿奉表請車駕遷都洛陽全忠令長安居人按籍遷居徹屋木自渭浮河而下連甍號哭月餘不息秦人大罵於路曰國賊崔胤朱温傾覆社稷俾我及此天乎天乎丁巳車駕發京師癸亥次陜州全忠迎謁于路四月甲辰車駕由徽安門入朱全忠張全義宰相裴樞獨􅀌損前導是日大風雨土跬歩不辨物色日暝稍止上謁太廟禮畢還宫御正殿宣勞從官衛士乙巳上御光政}
  - {type: variant, offset: 5653, length: 2, content: 丹鳳, krp: 長樂樓大赦天祐元年正月全忠率師屯河中遣牙將㓂彦卿奉表請車駕遷都洛陽全忠令長安居人按籍遷居徹屋木自渭浮河而下連甍號哭月餘不息秦人大罵於路曰國賊崔胤朱温傾覆社稷俾我及此天乎天乎丁巳車駕發京師癸亥次陜州全忠迎謁于路四月甲辰車駕由徽安門入朱全忠張全義宰相裴樞獨孤損前導是日大風雨土跬歩不辨物色日暝稍止上謁太廟禮畢還宫御正殿宣勞從官衛士乙巳上御光政}
