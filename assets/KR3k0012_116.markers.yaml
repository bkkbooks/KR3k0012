  - {type: variant, offset: 4152, length: 154, content: 寮肅然拱揖鮮有輕易之言大臣或獻章䟽即燒香盥手受而覽之當時以大中之政有貞觀之風焉閏三月勑會昌季年併省寺宇雖云異方之教無損為理之源中國之人久行其道釐革過當事體未弘其靈山勝境天下州府應會昌五年四月所廢寺宇如有宿舊名僧復能修創一任住持所由不得禁止七月太子少保分司東都衛國公李德裕為人所訟貶潮州司馬員外置二年春正月宰相, SBCK: 韋昭度}
