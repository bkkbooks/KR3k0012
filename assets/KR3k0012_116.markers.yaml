  - {type: variant, offset: 5068, length: 228, content: 上䟽諫遣中使往羅浮山迎軒轅先生上曰朕以萬機事繁躬親庶務訪聞羅浮山處士軒轅集善能攝生年齡亦壽乃遣使迎之或冀有少保理也朕每觀前史見秦皇漢武為方士所惑常以之為誡卿等位當論列職在諫司閱示來章深納誠意仍謂崔慎由曰為吾言於諫官雖少翁欒大復生不能相惑如聞軒轅生高士欲與之一言耳十二年春正月羅浮山人軒轅集至京師上召入禁中謂曰先生遐壽而長生可致乎曰徹聲色去滋味哀樂如一德施周給自然與天地合德日月齊明何必別求長生耶留之月餘堅求還山十三年五月上不豫月餘不能視朝八月宣遺詔立鄆王為, SBCK: 爲}
