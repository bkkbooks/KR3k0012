  - {type: variant, offset: 22, length: 2310, content: 昂穆宗第二子也母曰貞獻皇后蕭氏元和四年十月生長慶元年封江王初名涵寶曆二年十二月敬宗遇弒賊蘇佐明等矯制立綘王勾當軍國事樞密使王守澄中尉梁守謙率禁軍討賊誅綘王迎上于江邸癸卯見宰臣于閤內下教處分軍國事宰臣百寮三上表勸進乙巳即位於宣政殿景午上赴西宮成服丁未宰臣百寮上表請聽政三表許之戊申尊聖母為皇太后己酉敕鳳翔淮南先進女樂二十四人並放歸本道庚戍以兵部侍郎翰林學士韋處厚為中書侍郎同中書門下平章事大和元年二月乙巳御丹鳳樓大赦改元六月詔元和長慶中皆因用兵權以濟事所下制敕難以通行宜令尚書省取元和已來制敕參詳刪定訖送中書門下議定聞奏甲戍以旱放繫囚七月李同捷除兗海不受詔結幽鎮謀叛徐州王智興請全軍討之帝自撰集尚書中君臣事跡命畫工圖寫於太液亭朝夕觀覽三年五月己卯柏耆斬李同捷於將陵滄景平丁亥御興安樓受滄州所獻俘九月敕兩軍諸司內官不得著紗縠綾羅等衣服帝性儉素不喜華侈駙馬韋處仁載夾羅巾帝謂之曰比慕卿門地清素以之選尚如此巾服從他諸戚為之唯卿非所宜也十一月甲午帝親祀昊天上帝於南郊禮畢御丹鳳門大赦禁止奇貢四方不得以雜樣織成非常之物為獻十二月蠻陷邛雅等州戊午以右領軍衛大將軍董重質充神策西川行營都知兵馬使蠻陷成都府入梓州西郭門下營又詔促諸鎮兵救援兩川乙巳郭釗奏蠻退遣使賜蠻帥蒙𥰭顛國信四年四月詔曰儉以足用令出唯行著在前經斯為理本朕自臨四海愍元元之久困日昊忘食宵興疚懷雖絕文繡之節尚愧茅茨之儉示喻卿士形于詔條如聞積習流獘餘風未革車服第室相高以華靡之制資用貨寶固啟於貪冒之源有司不禁侈俗滋扇蓋朕教條之未敷使兆庶昧於恥尚也其何以足用行令臻于致理歟永念慚歎迨茲申敕自今內外班列職位之士各務素朴弘茲國風有僣差尤甚者御史糾上主者宣示知朕意焉上承長慶寶曆奔靡之風銳意懲革躬行儉素以率厲之五年春正月庚子朔以積陰旬浹罷元會太原旱賑粟十萬石二月神策中尉王守澄奏宰相宋申錫與漳王謀反即令追捕庚子詔貶宋申錫為太子右庶子壬寅左常侍崔玄亮及諫官等十四人伏奏玉陛北軍所告事請不於內中鞫問乞付法司帝曰吾謀於公卿矣卿等且退崔玄亮泣涕陳諫久之帝改容勞之曰朕即與宰臣商議玄亮等方退癸卯詔漳王庭湊可降為巢縣公宋申錫開州司馬同正初京師恟恟以宰相實聯親王謀逆三四日後方知誣搆人士側目於守澄鄭注故諫官號泣論之申錫方免其禍四年春正月乙未朔以久雪廢元會壬子詔朕聞天聽自我人聽天視自我人視朕之菲德涉道未明不能調序四時導迎和氣自去冬已來踰月雨雪寒氣尤甚頗傷于和念茲庶民或罹凍餒無所假貸莫能自存中宵載懷旰食興歎怵惕若厲時子之辜思弘惠澤以順時令天下死罪囚除官典犯贓故意殺人外並降從流流已下遞降一等七年正月詔曰朕承上天之睠佑荷列聖之丕圖宵旰憂勞不敢暇逸思致康乂八年于茲而水旱流行疾疫作沴兆庶艱食扎瘥相仍蓋德未動天誠未感物一類失所其過在予載懷罪已之心深軫納惶之慮如聞關輔河東去年亢旱秋稼不登今春作之時農務尤切若不能賑救懼至流亡京兆府賑粟十萬石河中府綘州各賜七萬石同華陜虢晉等州各賜十萬石並以常平義倉物充七月以旱命京城諸司䟽決繫囚閏七月乙卯詔曰朕嗣守丕圖覆嫗生類兢業夤畏上承天休而陰陽失和膏澤愆候害我稼穡災于黔黎有過在予敢忘咎責從今避正殿減供膳停教坊廄馬量減蒭粟百司廚饌亦宜權減陰陽鬱堙有傷和氣宜出宮女千人五坊鷹犬量須減放內外修造事非急務者並停八月甲申御宣政殿冊皇太子永是日降詔應犯死罪降從流流已下遞減一等九年冬十月內出曲江新造紫雲樓彩霞亭額左軍中尉仇士良以百戲於銀臺門迎之時鄭注言秦中有災宜興土功以猒之乃濬昆明曲江二池上好為詩每誦杜甫曲江行云江頭宮殿鏁千門細柳新蒲為誰綠乃知天寶已前曲江四岸皆有行宮臺殿百司廨署思復昇平故事故為樓殿以壯之王涯獻搉茶之利乃以涯為搉茶使茶之有稅自涯始十一月壬戍中尉仇士良率兵誅宰相王涯賈餗舒元輿李訓王璠郭行餘鄭注羅立言李孝本韓約等十餘家皆族誅時李訓鄭注謀內官詐言金吾仗舍石榴樹有甘露請上往觀之內官先至金吾仗見幕下伏甲遽扶帝輦入內故訓等敗流血塗地京師大駭旬日稍安十二月庚辰上御紫宸殿謂宰相曰坊市之間人漸安未李石奏曰人情雖安然刑殺過多致此陰沴又聞鄭注在鳳翔募兵不少今皆被刑戮臣恐乘此生事切宜原赦以安之上曰然鄭覃又陳理道上曰我每思貞觀開元之時觀今日之事往往憤氣瑱膺耳開成元年正月辛丑帝常服御宣政殿受賀遂宣詔大赦天下改元乙巳上御紫宸對宰臣李石奏曰陛下改元御殿人情大悅全放京兆一年租賦又停四節進奉恩澤所該實當要切帝曰朕務行其實不欲崇長空文石曰赦書須內留一本陛下時看之又十道黜陟使發日更付與公事根本令向外與長吏詳擇施行方盡利害之要矣二年三月戊辰夜彗長八丈有餘西北行東指在張十四度壬申詔曰朕嗣守丕搆對越上玄虔恭寅畏于今一紀何嘗不宵衣念道昃吳食思愆師周文之小心慕易乾之夕惕懼德不類貽列聖羞將欲俗致和平時無殃咎然誠未格物謫見于天仰愧三靈俯慚庶彙思獲攸濟浩無津涯昔宋景發言星因退舍魯僖納諫飢不害人取鑒往賢深惟自勵載軫在予之責宜降恤辜之恩式表殷憂冀荅昭誡天下死罪降從流流已下並釋放三年九月上以皇太子慢遊敗度欲廢之中丞狄兼謨垂涕切諫是夜移太子於少陽院殺太子宮人左右數十人十月皇太子薨于少陽院謚曰莊恪十一月乙卯夜彗孛東西竟天壬戍詔曰上天蓋高感應必由乎人事寰宇雖廣理亂盡繫於君心從古已來必然之義朕嗣膺寶位十有三年常剋己以虔恭每推誠於眾庶將以導迎休應漸致輯熙期克荷於宗祧思保寧於華夏而德有所未至信有所未孚災氣上騰天文謫見再周朞月重擾星躔當求衣之時覩垂象之變兢懼惕厲若蹈泉谷是用舉成湯之六事念宋景之一言詳求譴咎之端採聽銷禳之術必有精理蘊於眾情冀屈法以安人爰恤刑而原下應犯死罪並降從流流已下遞減一等五年春正月戊寅上不康不受朝賀辛巳崩于大明官之太和殿謚曰元聖昭獻皇帝廟號文宗葬章陵武宗昭肅皇帝唐書曰武宗昭肅皇帝諱炎穆, WYG: 儼懿}
