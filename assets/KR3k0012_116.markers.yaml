  - {type: variant, offset: 5331, length: 1, content: 懿, SBCK: 黄巢唐書曰黄巢曹州􅁈句人本以販鹽爲事乾符中仍歳凶荒人饑爲盗河南尤甚􅀄里人王仙芝尚君長聚盗起於濮陽攻剽城邑䧟曹濮及鄆州詔左金吾衛上將軍齊克讓爲兖州節度使以本軍討仙芝仙芝懼引衆歷陳許襄鄧無少長皆虜之衆號三十萬三年七月䧟江陵十月又遣將徐唐莒䧟洪州時仙芝表請符不允以神䇿統軍使宋威爲荆南節度招討使中使楊復光爲監軍復光遣判官吴彦宏諭以朝旨釋罪别加官爵仙芝乃令尚君長詣闕請罪且求恩命時宋威害復光之功擒送闕斬之賊怒悉銳擊官軍威軍大敗復光收其餘衆以統之朝廷以王鐸代爲招討五年八月收復荆州斬仙芝首獻於闕下先是君長弟譲以兄奉使見誅率部衆入查牙山黄巢揆昆仲八人率盗數千依譲月餘衆至數萬䧟汝州大掠􅀜東官軍加討屢爲所敗其衆十餘萬尚譲乃與羣盗推巢爲王曰衝天大將軍署官屬藩鎭不能制時天下承平日乆人不知兵僖}
  - {type: page-break, offset: 5331, content: '', id: KR3k0012_SBCK_116-5a}
  - {type: variant, offset: 5331, length: 1, content: 懿, krp: 黄巢唐書曰黄巢曹州冤句人本以販鹽爲事乾符中仍歳凶荒人饑爲盗河南尤甚𥘉里人王仙芝尚君長聚盗起於濮陽攻剽城邑䧟曹濮及鄆州詔左金吾衛上將軍齊克讓爲兖州節度使以本軍討仙芝仙芝懼引衆歷陳許襄鄧無少長皆虜之衆號三十萬三年七月䧟江陵十月又遣將徐唐莒䧟洪州時仙芝表請符不允以神䇿統軍使宋威爲荆南節度招討使中使楊復光爲監軍復光遣判官吴彦宏諭以朝旨釋罪别加官爵仙芝乃令尚君長詣闕請罪且求恩命時宋威害復光之功擒送闕斬之賊怒悉銳擊官軍威軍大敗復光收其餘衆以統之朝廷以王鐸代爲招討五年八月收復荆州斬仙芝首獻於闕下先是君長弟譲以兄奉使見誅率部衆入查牙山黄巢揆昆仲八人率盗數千依譲月餘衆至數萬䧟汝州大掠關東官軍加討屢爲所敗其衆十餘萬尚譲乃與羣盗推巢爲王曰衝天大將軍署官屬藩鎭不能制時天下承平日乆人不知兵僖}
  - {type: variant, offset: 5333, length: 0, content: '', SBCK: 以㓜主臨朝號令出於臣下巢馳檄四方章奏論列皆指目朝政之弊巢徒黨旣盛與仙芝爲影援及仙芝敗東攻亳州不下乃襲破沂州虜之仙芝餘黨悉附焉時王鐸緩于攻取髙駢鎭淮南表請詔討賊許之巢乃渡淮僞降于駢駢遣將張璘率兵受降于天長鎭巢擒璘殺之因虜其衆尋南䧟湖湘遂據交廣託越州觀察使崔璆奏乞天平軍節度朝議不允又自表乞安南都護廣州節度亦不允是歳自春及夏其衆大疫死者十三四衆勸請北歸以圖大利廣明元年北踰五嶺犯湖湘江浙進逼廣陵髙駢閉門自固所過鎭戍望風降賊九月渡淮十一月䧟洛陽繼攻陜􅉑逼潼􅀜䧟華州留將喬鈐守之朝廷以田令孜率神䇿博野等軍十萬守潼􅀜􅀜之左有谷可通行人平時禁人出入謂之禁谷及賊至官軍但守潼􅀜不坊禁谷尚譲林言率前鋒由禁谷而入夾攻潼􅀜官軍大潰博野都徑還京師燔掠西市十二月三日僖宗夜自開逺門出趍駱谷四日賊至昭應五日䧟京師時巢衆累年爲盗行伍不勝其冨遇窮民於路爭行施遺旣入青門坊市聚觀尚譲慰曉市人曰黄王爲生靈不似李家不惜汝輩但各安家業賊衆競投物遺人十三日巢僣位國號大齊仍御樓宣赦且陳符命曰唐帝知朕起義改元廣明以文字言之唐巳無天分矣唐去丑口而安黄天意令黄在唐下乃黄家日月也土生金予以金王宜改年爲金統中和元年二月尚譲宼鳯翔鄭畋出師禦之大敗賊於龍尾坡畋乃馳檄告諭天下藩鎭四月涇原行軍唐弘夫之師屯渭北河中王重榮之師屯沙􅁐易定王處存之師屯渭橋鄜延托䟦思}
