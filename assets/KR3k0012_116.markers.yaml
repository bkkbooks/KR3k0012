  - {type: variant, offset: 3575, length: 2, content: 仁聖, SBCK: 至德光烈孝皇帝御宣政殿受􅁽大赦十二月乙亥沙陁逼京師田令孜奉僖宗出幸鳯翔􅀄黄巢據京師九衢三内宫室宛然及諸道兵破賊争貨相攻縱火焚剽宫室居市里十焚六七賊平之後令京兆尹王徽經年􅀘葺僅獲安堵至是亂兵復焚宫闕蕭條鞠爲茂草矣二年春正月車駕在鳯翔李克用旋師河中與朱玫王重榮同上表請駕駐蹕鳯翔仍數田令孜之罪乃以飛龍使楊復恭知内樞宻事戊子田令孜迫乗輿請幸興元庚寅車駕次寳鷄授刑部尚書孔緯兼御史大夫令率從官赴行在時車駕夜出宰相蕭遘裴徹鄭昌圖及}
