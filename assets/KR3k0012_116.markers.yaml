  - {type: variant, offset: 6599, length: 0, content: '', WYG: 于柩前年十二左軍中尉劉行深右軍中尉韓文約居中執軍政並封國公八月皇帝釋服冊聖母王氏為皇太后河南大水九月守司空門下侍郎平章事韋保衡貶賀州刺史乾符元年十一月庚寅上有事於郊廟禮畢御丹鳯門大赦改元二年春正月己丑宰相崔彦􅇇率文武百官上尊號上御正殿受冊四月海賊王郢攻剽浙西郡邑五月濮州賊首王仙芝聚徒於長垣縣其衆三千進䧟濮州俘丁壯萬人鄆州節度使李種出兵擊之為賊所敗二年七月王仙芝冦掠河南十五州其衆數萬是月賊逼頴許攻汝州下之四年三月寃句賊黄巢衆萬人攻鄆州䧟之七月黄巢泊浙海其徒數萬趨頴蔡入查牙山遂與王仙芝合七月賊䧟隨州五年三月王仙芝餘黨攻江西招討使宋威出軍屢敗之仍宣詔書招之仙芝致書於威求節鉞威偽許之仙芝令其大將尚君長蔡温玉奉表入朝威乃斬君長温玉以徇仙芝怒急攻洪州䧟其郛宋威赴援與賊戰大敗之殺仙芝傳首京師廣明元年春正月乙卯朔上御宣政殿改元二月黄巢自衡永州下頓䧟湖南江西屬郡三月黄巢尚讓等攻鄂州䧟江西饒信等十五州七月渡江㓂淮南十月仍悉衆渡淮巢自號率土大將軍其衆冨足自淮已北整衆而行不剽財貨唯驅丁壯為兵十一月䧟東都畱守劉允章率分司官屬迎謁之賊供頓而去坊市晏然壬申䧟虢州丙子犯潼關守關諸將望風自潰十二月辛巳賊據潼關時左軍中尉田令孜専政宰相盧㩦曲事之相與誤謀以致傾敗令孜恐衆罪加已請貶㩦官命學士王徽裴徹為相甲申宣制以户部侍郎翰林院學士王微裴徹同平章事貶右僕射門下侍郎平章事盧㩦為太子賔客㩦聞賊至仰藥而死}
