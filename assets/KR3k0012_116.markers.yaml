  - {type: variant, offset: 6627, length: 0, content: '', SBCK: 和陵哀帝唐書曰哀帝諱柷昭宗第九子母曰積善太后何氏景福元年九月生乾寧四年封輝王名祚天復三年拜開府儀同三司充諸道兵馬元帥天祐元年八月昭宗遇弑翌日蔣玄暉矯宣遺詔又矯宣皇太后令皇太子柩前即位二年四月甲辰夜彗起北河貫文昌其長三文在西北方十二月戊申全忠令知樞宻王殷害皇太后何氏}
