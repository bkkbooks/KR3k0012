  - {type: variant, offset: 3579, length: 2, content: 章天, SBCK: 百寮不之知扈從不及故令孔緯從之蕭遘惡令孜弄權再亂京國因邠州奏事判官李松年至鳯翔乃令亟召朱玫迎奉癸已朱玫別領歩􅀐五千至鳯翔令孜聞邠州軍至奉帝入大散􅀜令禁軍守靈壁玫至禁軍潰散遂長驅追駕至遵途驛嗣襄王煴疾爲玫所得時興元節度使石君渉聞車駕入􅀜乃毁徹棧道柵絶險要車駕由他道僅逹爲邠州軍踵後﨑嶇危殆者數四四月壬子朱玫李昌言迫宰相蕭遘等於鳯翔驛舎請嗣襄王煴權監軍國事玫自爲大丞相兼左右}
