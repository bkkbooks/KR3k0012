  - {type: variant, offset: 5658, length: 630, content: 五年四月南蠻寇邕管以秦州經略使高駢率禁軍五千赴邕管會諸道之師禦之五月制朕以寡昧獲承高祖太宗之丕搆六載於茲矣罔畋遊是娛罔聲色是縱罔刑戮是濫罔邪佞是惑蚤夜悚惕以憂以勤庶幾乎八表用康兆人以泰而西戎款附北狄懷柔獨唯南蠻奸宄不率侵陷交阯突犯朗寧爰及嶲州亦用攘寇勞我士卒興吾甲兵騷動黎元役力飛輓每一軫念憫然疚懷顧惟生人罹此愁苦宜布自天之澤俾垂及物之仁如聞湖南桂州是嶺路係口諸道兵馬綱運無不經過頓遞供承動多差配凋傷轉甚宜有特恩應潭桂兩路各賜錢三萬貫以助軍錢以充館驛息利本錢其江陵江西鄂州三道比於潭桂徭配稍簡宜令本道觀察使詳其間劇准此例與置本錢黎嶲等州因蠻寇煞傷宜令本道收拾埋瘞六年秋高駢自海門進軍破蠻軍收復安南府自李琢失政交阯陷沒十年蠻軍北寇邕容界人不聊生至是方復故地七年十月安南都護高駢奏蠻寇悉平十一月御宣政殿大赦以復安南故也九年七月徐州赴桂林戌卒五百人官健許結趙可立殺其主將王仲甫以糧料判官龐勛為都頭剽掠湘潭衡山兩縣有眾千人擅還本鎮九月甲午龐勛陷宿州知州判官焦璐奔歸于徐乙未龐塤陷徐州十年九月賊宿州守將張玄稔以城降有兵萬人馬舉率師赴之龐勛聞之以其眾將攻玄稔玄稔賊之勁將也遂與舉合勢急圍徐州許佶登城拒守者三日佶敗出走稔收復徐州龐勛方來赴援聞城已拔欲南趨濠州馬舉追及渙河擊敗之勛溺水而死蕭縣主將又斬許佶首來降徐寇悉平十一月南詔蠻驃信坦綽酋龍率眾二萬寇嶲州十二月勑荊南節度使杜悰據司天奏有小孛星氣經歷分野恐有外夷兵水之患緣邊藩鎮最要隄防宜訓習師徒增築城堡凡關制置以其事聞十一年, SBCK: ''}
