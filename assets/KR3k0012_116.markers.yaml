  - {type: variant, offset: 781, length: 204, content: 宋申錫與漳王謀反即令追捕庚子詔貶宋申錫為太子右庶子壬寅左常侍崔玄亮及諫官等十四人伏奏玉陛北軍所告事請不於內中鞫問乞付法司帝曰吾謀於公卿矣卿等且退崔玄亮泣涕陳諫久之帝改容勞之曰朕即與宰臣商議玄亮等方退癸卯詔漳王庭湊可降為巢縣公宋申錫開州司馬同正初京師恟恟以宰相實聯親王謀逆三四日後方知誣搆人士側目於守澄鄭注故諫官號泣論之申錫方免其禍四年春正月乙未朔以久雪廢元會壬子詔朕聞天聽自我人聽天視自我人視朕之菲德涉道未明, SBCK: 吞噬朝廷}
