  - {type: 'tls:seg', offset: 6601, content: '', id: KR3k0012_CHANT_116-4a.236}
  - {type: variant, offset: 6601, length: 0, content: '', WYG: 上與諸王后妃數百騎自子城由含元殿出金光門幸山南文武百寮並不之知無従行者京城晏然是日晡晩賊入京城時右驍衛大將軍張直方率武官十餘迎黄巢於坡頭壬辰黄巢僣位偽號大齊稱皇帝年號金統悉陳文物據丹鳯門偽赦中和元年春正月車駕在興元六月車駕幸成都府西川節度使陳敬瑄自來迎奉七月乙夘車駕至西蜀丁巳御成都府改廣明二年為中和元年大赦天下二年春正月天下勤王之師雲㑹京師賊食盡食樹皮以金玉買人於行營之中人獲數百萬山谷避亂百姓多為諸軍之所執賣八月庚子賊同州防禦使朱温殺其監軍嚴實大將胡真謝曈等來降王鐸承制拜温華州刺史三年四月庚子沙陁忠武義成義武等軍援長安賊悉衆拒之於渭橋大敗而還李克用乗勝追之己卯黄巢收其殘衆由藍田關而遁庚辰收京城天下行營司馬都監楊復光上章告㨗行在四年七月癸酉賊將林言斬黄巢黄揆黄秉三人首級降時溥初徐將李師恱與賊戰于瑕丘賊殊死戰其衆殆盡林言與巢走至太山狼虎谷之襄王村懼追至併命乃斬賊降師恱壬午捷書至行在十二月丁亥朔大明宫留守王徽與留司百官上表請車駕還宫詔以來年正月還京兆啓元元年春正月車駕在成都府己夘還京二月丁夘車駕至京師御宣政殿大赦改元時李昌符據鳯翔王重榮據蒲陜諸葛爽據河陽洛陽孟方正據邢洺李克用據太原上黨朱全忠據汴滑秦宗權據許蔡時溥據徐泗朱瑄據鄆齊曹濮王敬武據淄青髙駢據淮南八州秦彦據宣歙劉漢宏據浙東皆自擅兵賦遞相吞噬朝廷不能制江漢轉運路絶兩河江淮賦不上供但嵗時獻奉而已國命所能制者河西山南劒南嶺西南道數十州大約郡將自擅常賦殆絶藩侯廢置不自朝廷王業於是蕩然五月宰臣蕭遘率文武百寮上徽號曰至徳光烈孝皇帝御宣政殿受冊大赦十二月乙亥沙陁逼京師田令孜奉僖宗出幸鳯翔初黄巢據京師九衢三内宫室宛然及諸道兵破賊争貨相攻縱火焚剽宫殿居屋市里十焚六七賊平之後令京兆尹王徽經年補葺僅獲安堵至是亂兵復焚宫闕蕭條鞠為茂草矣二年春正月車駕在鳯翔李克用旋師河中與朱玫王重榮同上表請駕駐蹕鳯翔仍數田令孜之罪乃以飛龍使楊復恭知内樞密事戊子田令孜迫乗輿請幸興元庚申車駕幸寳雞授刑部尚書孔緯兼御史大夫令率從官赴行在時車駕夜出宰相蕭遘裴徹鄭昌國及文武官寮不知扈從不及故令孔緯促之蕭遘惡令孜弄權再亂京國因邠州奏事判官李松年至鳯翔乃令亟召朱玫迎奉癸巳朱玫别領步騎五千至鳯翔令孜聞邠州軍至奉帝入大散關令禁軍守靈壁玟至禁軍潰散遂長驅追駕至尊途驛嗣襄王煴疾為玟所得時興元節度使石君涉聞車駕入關乃毁撤棧道柵絶險要車駕由他道僅達為邠州軍踵后﨑嶇危殆者數四月壬子朱玟李昌言迫宰相蕭遘等於鳯翔驛舍請嗣襄王煴權監軍國事玟自為大丞相兼左右神䇿十軍軍容使遂驅率文武百寮奉襄王還京師五月庚辰襄王僣即皇帝位年號建貞十二月朱玟將王行瑜受密詔自鳯州率衆還長安辛酉行瑜斬朱玟及其黨與數百人縱兵大掠是冬苦寒九衢積雪兵入之夜寒冽尤劇民吏剽剝之后僵凍而死者蔽地百官奉襄王奔河中王重榮紿稱迎奉執煴斬之文徳元年春正月車駕發鳯翔蔡賊孫儒斬秦彦畢師鐸於髙郵二月壬午車駕至京師戊子御承天門大赦改元宰臣韋昭度率文武百寮上徽號曰聖文睿徳光武𢎞孝皇帝三月戊戌朔御正殿受冊庚子上暴疾不康壬寅大漸癸卯立親弟壽王傑為皇太弟勾當軍國事是夕}
