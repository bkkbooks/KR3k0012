  - {type: variant, offset: 5584, length: 5, content: 南府遣神策, SBCK: 宫請皇太子􅁉􅁥國是日迎皇太子􅁉􅁥國矯宣昭宗命稱上皇甲午宣上皇制太子登皇帝位十二月癸未夜護駕孫昭德周承誨等以兵攻劉季述王仲先携其首詣東宫門呼曰逆賊王仲先巳斬首訖請陛下出宫慰諭兵士宫人破鑰帝與后方得出天復元年正月昭宗反正登長樂門樓受朝賀四月甲戌有事於宗廟是日御長樂門大赦改元十月戊戍朱全忠引四鎮之師七萬赴河中京師聞之大恐民皆亡􅇡山谷十一月中尉韓全誨與鳯翔護駕都}
