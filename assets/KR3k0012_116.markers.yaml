  - {type: variant, offset: 5568, length: 2, content: 丹鳳, SBCK: 承天門大赦大順元年春正月御武德殿受朝賀宰臣百寮上徽號曰聖文睿德光武􅀪孝皇帝禮畢大赦改元乾寧元年春正月上御武徳殿受朝賀大赦改元二年五月甲子李茂貞王行瑜韓建等各率精甲數千人入覲京師大駭人皆亡􅇡吏不能止帝御安福門以俟之三帥旣至拜舞樓下帝臨軒喻之曰卿等藩侯冝存臣節稱兵入朝不由奏請意在何也茂貞行瑜汗流洽背不能對唯韓建陳叙入覲之日上並召昇樓賜巵酒宴於同文殿茂貞行瑜極言南北司相傾深蠧時政請誅其太甚者乃貶宰相韋昭度李磎尋殺之殺曰官數人而去王行瑜留弟行約茂貞留假子閻圭各以兵二千人􅀫衛時三帥同謀廢帝立􅁻王聞太原起軍乃止留兵􅀫衛而還七月李克用舉軍渡河以討王行瑜李茂貞韓建等庚申同州節度使王行實棄郡入京師謂兩軍中尉駱全瓘劉景宣曰沙陁十萬至矣請奉車駕幸邠州且有城守時景宣對鳯翔癸亥夜閻圭與劉景宣子繼晟同州王行實縱火剽東市脅上出幸上聞亂登承天門遣諸王率禁兵禦之捧日都頭李筠率本軍侍衛樓前閻圭以鳯翔之卒攻李筠矢及御座之樓扉上懼下樓與親王公主内人數百幸永興坊李筠軍扈蹕都頭李君實以兵繼至乃與筠兩都兵士侍衛出啓夏門憩於華嚴寺以俟内人繼至其日晚幸莎城鎮京師士庻從幸者數十萬比至南山谷口暍死三之一至暮爲盗㓂掠慟哭之聲殷動山谷信􅀫宰相徐彦􅀂王􅅮崔胤三人至乃移幸石門鎮之佛宫乃令知樞宻劉光􅁉薛王知柔歸京師制置令禁軍以備宫禁丙寅李克用遣牙將閻諤奉表奔問奏屯軍河中候進止發赴邠州丁夘上遣内官張承業傳詔克用軍便令􅁥太原行營兵馬發赴新平又令内官郄廷立傳詔涇州令張鐇起涇原之師㑹克用軍上在南山半月餘克用仍在河中未至渭北上懼鳯翔兵士刧遷乃令延王將御服鞍馬玉器等至河中宣諭八月李克用遣子存貞奉表行在請車駕還宫辛亥車駕還宫三年六月鳯翔軍犯京畿覃王拒之於婁館接戰不利秋七月􅄮軍逼京師諸王率禁兵奉車駕將幸太原癸巳次渭北華州韓建遣子允奉表起居請駐蹕華州乙未次下邽丙申駐蹕華州時歧軍犯京師宫室􅝬閈鞠爲􅁅燼光化元年八月車駕自華還京御端}
