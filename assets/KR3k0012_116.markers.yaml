  - {type: variant, offset: 1164, length: 534, content: 東去年亢旱秋稼不登今春作之時農務尤切若不能賑救懼至流亡京兆府賑粟十萬石河中府綘州各賜七萬石同華陜虢晉等州各賜十萬石並以常平義倉物充七月以旱命京城諸司䟽決繫囚閏七月乙卯詔曰朕嗣守丕圖覆嫗生類兢業夤畏上承天休而陰陽失和膏澤愆候害我稼穡災于黔黎有過在予敢忘咎責從今避正殿減供膳停教坊廄馬量減蒭粟百司廚饌亦宜權減陰陽鬱堙有傷和氣宜出宮女千人五坊鷹犬量須減放內外修造事非急務者並停八月甲申御宣政殿冊皇太子永是日降詔應犯死罪降從流流已下遞減一等九年冬十月內出曲江新造紫雲樓彩霞亭額左軍中尉仇士良以百戲於銀臺門迎之時鄭注言秦中有災宜興土功以猒之乃濬昆明曲江二池上好為詩每誦杜甫曲江行云江頭宮殿鏁千門細柳新蒲為誰綠乃知天寶已前曲江四岸皆有行宮臺殿百司廨署思復昇平故事故為樓殿以壯之王涯獻搉茶之利乃以涯為搉茶使茶之有稅自涯始十一月壬戍中尉仇士良率兵誅宰相王涯賈餗舒元輿李訓王璠郭行餘鄭注羅立言李孝本韓約等十餘家皆族誅時李訓鄭注謀內官詐言金吾仗舍石榴樹有甘露請上往觀之內官先至金吾仗見幕下伏甲遽扶帝輦入內故訓等敗流血塗地京師大駭旬日稍安十二月庚辰上御紫宸殿謂宰相曰坊市之間人漸安未李石奏曰人情雖安然刑殺過多致此陰沴又聞鄭注在鳳翔募兵不少今皆被刑戮臣恐乘此生事切宜原赦以安之上曰然鄭覃又陳理, SBCK: 西山南劒南嶺南西}
