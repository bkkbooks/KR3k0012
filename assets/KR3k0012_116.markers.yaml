  - {type: variant, offset: 2344, length: 2930, content: 元和九年六月十三日生於東宮長慶元年三月封潁王本名瀍初文宗追悔莊恪太子殂不由道乃以敬宗子陳王成美為皇太子開成四年冬十月宣制未遑冊禮五年正月文宗暴疾宰相李玨樞密劉弘季奉密旨以皇太子監國兩軍中尉仇士良魚弘志矯詔迎穎王於十六宅曰朕自嬰疾疹有加無瘳懼不能躬揔萬機日釐庶政稽于古訓謀及大臣用建親賢以貳神器親弟潁王湹昔在藩邸與朕嘗同師訓動成儀矩性稟寬仁俾奉昌圖必諧人欲可立為皇太弟應軍國政事便令權勾當百辟卿士中外庶臣宜竭乃心輔成子志陳王成美先立為皇太子以其年尚冲幼未漸師資比日重難不遑冊命廻踐諸邸式協至公可復封陳王四日文宗崩宣遺詔皇太弟宜於柩前即皇帝位宰相楊嗣復攝冢宰十四日受冊於正殿年二十七二月制穆宗妃韋氏追謚宣懿皇太后帝之母也上御正殿降德音以開府右軍中尉仇士良封楚國公右軍中尉魚志弘為韓國公太常卿崔鄲戶部尚書判度支崔珙並本官同中書門下平章事帝在藩邸時頗好道術修攝之事是秋召道士趙歸真八十一人入禁中於三殿修金籙道場乃幸三殿於九天壇親受法籙右拾遺王哲上䟽言王業之初不宜崇信過當䟽奏不省會昌元年正月庚戍有事于郊禮畢御丹鳳樓大赦改元二月以淮南節度使李紳為中書侍郎同平章事二年四月司空平章事李德裕等上章請加尊號曰仁聖文武至神大孝皇帝戊寅御宣政殿受冊八月廻鶻烏介可汗過天德至杞頭烽北俘掠雲朔北川詔劉沔出師守鴈門諸關廻鶻首領屈武降幽王授左武衛將軍詔以廻鶻犯邊漸侵內地或攻或守於理何安令少師牛僧孺陳夷行與公卿集議可否以聞僧孺曰今百寮議狀以固守關防俟其可擊則用兵宰相李德裕議以廻鶻所恃者嗢沒赤心耳今已離叛其彊弱之勢可見戎人獷悍不顧成敗以失二將乘忿入侵出師急擊破之必矣守險恃弱虜無由退擊之為便天子以為然乃徵發許蔡汴滑等六鎮之師以太原節度使劉沔為廻鶻南面招討使以張仲武為幽州盧龍節度使充廻鶻東面招討使以李思忠為廻鶻西南面招討使皆會軍於太原十月幸涇陽校獵白鹿原諫議大夫高少逸鄭朗等於閤內論陛下校獵太頻出城稍遠萬機廢弛晨出夜歸方用兵師且宜停止上優勞之諫官出上謂宰相曰諫官甚要朕時聞其言庶幾減過三年春正月以宿師于野罷元會二月太原劉沔奏至大同軍遣石雄襲廻鶻牙帳大敗廻鶻於殺胡山其烏介可汗被瘡而走已迎得太和公主至雲州是日御宣政殿百寮稱賀三月太和公主至京師百官班于章敬寺迎謁仍令所司告憲宗穆宗二室四月昭義節度使劉從諫率三軍以從諫姪稹為兵馬留後上表請授節鉞尋遣中使齎詔潞府令稹護從諫之喪歸洛陽稹拒朝旨尋以成德軍節度使王元逵魏愽節度使何弘敬並以本官充招討澤潞使四年三月以道士趙歸真為左右街道門教授先生時帝志學神仙師歸真歸真乘寵每排毀釋氏言非中國之教蠹耗生靈盡宜除去帝頗信之七月王元逵奏邢州刺史裴問別將高元武以城降洺州刺史王釗磁州刺史安玉皆以城降何弘敬山東三州平潞州大將郭誼張谷陳揚廷遣人至王宰軍請殺劉稹首以自贖王宰以聞乃詔石雄率軍三千入潞州郭誼斬劉稹首以迎雄澤潞五州平八月王宰傳稹首與大將郭誼等一百五十人露布獻於京師上御安福門受俘百寮樓前稱賀十月車駕幸鄠縣十一月幸雲陽五年正月宰臣李德裕杜悰等率文武百寮上徽號曰仁聖文武章天神功神德明道皇帝辛亥有事於郊廟禮畢御承天門大赦天下秋七月庚子勑併省天下佛寺所拆寺四千六百餘所還俗僧尼二十六萬五百人收充兩稅戶拆招提蘭若四萬餘所收膏腴上田數千萬頃收奴婢為兩稅戶十五萬人六年三月壬寅上不豫制改御名曰炎帝重方士頗服食修攝親授法籙至是藥躁喜怒失常既篤旬日不能言宰相李德裕等請見不許中外莫知安否人情危懼是月二十三日宣遺詔以皇太叔光王柩前即位是日崩年三十三謚曰至道昭肅孝皇帝廟號武宗葬端陵宣宗獻文皇帝唐書曰宣宗獻文皇帝諱忱憲宗第十三子母曰孝明皇后鄭氏元和五年六月生於大明宮長慶元年三月封光王名怡會昌六年三月武宗疾篤宣遺詔立為皇太叔權勾當軍國政事翌日即帝位改今名時年三十七帝外晦而內朗嚴重寡言視瞻特異幼時宮中以為不惠十餘歲時遇重疾沉綴忽有光輝燭身蹶然而興正身拱揖如對臣寮乳媼以為心疾穆宗往視之撫其背曰此吾家英物非心憊也賜以玉如意御馬金帶嘗夢乘龍昇天言之於鄭太后乃曰此不宜人知母幸勿復言歷大和會昌朝愈事韜晦群居游處未嘗有言文宗武宗幸十六宅宴集彊誘其言以為戲劇謂之光叔武宗氣豪尤不為禮及監國之日哀毀滿容接待群寮決斷庶務人方見其隱德焉四月辛釋服尊母鄭氏曰皇太后以兵部侍郎翰林學士承旨白敏中同中書門下平章事大中元年正月有事於郊廟禮畢御丹鳳門大赦改元帝雅好儒士留心貢舉有時微行人間採聽輿論以觀選士之得失每山池曲宴與學士詩什屬和公卿出鎮亦賦詩餞行凡對臣寮肅然拱揖鮮有輕易之言大臣或獻章䟽即燒香盥手受而覽之當時以大中之政有貞觀之風焉閏三月勑會昌季年併省寺宇雖云異方之教無損為理之源中國之人久行其道釐革過當事體未弘其靈山勝境天下州府應會昌五年四月所廢寺宇如有宿舊名僧復能修創一任住持所由不得禁止七月太子少保分司東都衛國公李德裕為人所訟貶潮州司馬員外置二年春正月宰相率文武百寮上徽號曰聖敬文思和武光孝皇帝御宣政殿受冊三年春正月涇原節度康季榮奏吐蕃宰相論恐熱以秦原安樂三州及石門等七關之兵民歸國詔太僕卿陸躭往喻旨仍令靈武節度使朱叔明邠寧節度使張景緒各出本道兵馬應接六月康季榮奏收復原州城及石門驛藏木峽制勝六盤石峽等六關訖邠寧張景緒奏收復蕭關勑於蕭關置武州改樂安為威州七月三日七關軍人百姓皆河隴遺黎數千人見于關下上御延喜門撫慰令其解辮賜之冠帶共賜絹十五萬疋八月鳳翔節度使李玼奏收復秦州制曰自昔皇王之有國也何嘗不文以守成武以集事參諸二柄歸于大寧朕猥荷丕圖思弘景運憂勤戒惕四載于茲每念河湟土疆綿亙遐闊洎天寶末犬戎乘我多難無方禦姦遂縱腥羶不遠京邑事更十葉時近百年進士試能靡不竭其長策朝廷下議皆亦聽其直詞盡以不生邊事為永圖且守舊地為明理荏苒於是收復無由今者天地儲祥祖宗垂祐左衽輸款邊壘連降刷恥建功所謀必剋實賴樞衡妙筭將帥雄稜副玄元不爭之文絕漢武遠征之悔甌脫頓空於內地斥候全據於新封莫大之休指期而就況將士等櫛沐風雨暴露郊原披荊榛而刁斗夜嚴逐豺狼而穹廬曉破動皆如意古無與京念此誠勤宜加寵賞涇原宜賜絹六萬疋靈武五萬疋鳳翔邠寧各四萬疋嗚呼七關要害三都膏腴候館之殘趾可尋唐人之遺風尚在追懷往事良用興嗟夫取不在廣貴保其金湯得必有時詎計於遲速今則便務修築不進干戈必使足食足兵有備無患載洽亭育之道永置生靈之安中外臣寮宜體朕意十二月追謚順宗曰至德大聖大安孝皇帝憲宗曰昭文章武大聖孝皇帝初以河湟收復百寮請加徽號帝曰河湟收復繼成先志朕欲追尊祖宗以昭功烈白敏中等對曰非臣等愚昧所能及至是上御宣政殿行事及冊出上俯僂目送流涕嗚咽四年春正月以追尊二聖御正殿大赦天下五年八月汝州刺史張義潮遣兄義潭以爪沙伊肅等十一州戶口來獻自河隴陷蕃百餘年至是悉復隴右故地八年正月陜州黃河清二月南蠻進犀牛詔還之十一年九月右補闕陳嘏左拾遺王譜右拾遺薛廷傑上䟽諫遣中使往羅浮山迎軒轅先生上曰朕以萬機事繁躬親庶務訪聞羅浮山處士軒轅集善能攝生年齡亦壽乃遣使迎之或冀有少保理也朕每觀前史見秦皇漢武為方士所惑常以之為誡卿等位當論列職在諫司閱示來章深納誠意仍謂崔慎由曰為吾言於諫官雖少翁欒大復生不能相惑如聞軒轅生高士欲與之一言耳十二年春正月羅浮山人軒轅集至京師上召入禁中謂曰先生遐壽而長生可致乎曰徹聲色去滋味哀樂如一德施周給自然與天地合德日月齊明何必別求長生耶留之月餘堅求還山十, WYG: 咸通}
