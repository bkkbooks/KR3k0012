  - {type: variant, offset: 904, length: 3, content: 車騎朱, WYG: 朝晡聽事其間接賔客飲食嬉戯加之博奕每盡人之歡後遷大将軍録尚書事董允代禕為尚書令旬日之中事多停滯允歎曰人才力相懸若此非吾所及又曰􅃽琬字公琰諸葛亮每言公琰託志忠雅當與公讃王業可也密表後主臣若不幸後事宜以付琬亮卒琬為尚書令時新喪元帥逺近危悚琬出類㧞萃處群僚之右既無戚容又無喜色神宇舉止有如平常由是衆望漸服又曰劉巴字子初代法正為尚書令躬履清儉不治産業又自以歸附非素懼見猜嫌恭黙守靖退無私交非公事不言又曰董允字季陽為尚書令庶事無留門無停賔又歴職内外治身儉約謙靖少言為政不煩號為清能}
