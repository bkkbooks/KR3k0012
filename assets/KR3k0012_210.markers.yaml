  - {type: variant, offset: 2795, length: 377, content: 光武皇帝得上狀見霸曰所使掾何仁恕為國用心乎誠良吏也司徒屬東觀漢記曰司徒侯霸辟閔仲叔到與相見勞問之不及政事仲叔曰始被明公辟且喜且懼及奉見明公喜懼皆去所望明公問屬何以為政美俗成化以仲叔為不足耶不當辟也如以為任用而不使陳之則為失人是以喜懼皆去便辭而出晉中興書曰殷融字洪遠司徒王導以為左西屬融飲酒善舞終日嘯詠未嘗以事務自嬰導甚相親悅焉司徒從事中郎晉中興書曰頴川荀組字大章司徒王渾表曰左西屬荀組文義貞素清識見稱宜轉從事中郎陶氏家傳曰迴字恭淵為大司徒王導從事中郎為人正直不撓導亦以此重焉每言曰陶中郎有輔佐之才真國器也司徒諮議參軍晉中興書曰廬江何充字次道為司徒王導諮議參軍後魏書曰李系為主客郎齊文襄王攝選以系為司徒諮議參軍因謂之曰自郎署此所謂不次以卿人才故有此舉耳司徒主簿三國典略曰齊許惇護之子也性識敏速達於從政嘗為司徒主簿以能判時人號為入鐵主簿司空掾魏志曰國淵字子尼, SBCK: 門}
