  - {type: variant, offset: 1879, length: 196, content: 授巖谷之士小掾私所以於邑廣州先賢傳曰鄧盛字伯真蒼梧人為太尉諸曹掾彭城相左尚以贓罪三府掾屬栲驗踰科不竟更選盛覆栲盛到獄洗沐尚解械賜席乃謂尚曰君受國重恩而所坐事理如此今遇君子不可以小人道相待尚感盛至意對曰今使君相於如此尚獨何心敢不以死相歸乎即引筆具對衛玠別傳曰玠字叔寶陳留阮千里有令聞當年太尉王君見而問曰老莊與聖教同異阮曰將無同太尉善其言而辟之為掾世號曰三語掾君見而嘲之曰一言可辟何假三阮曰茍是天, WYG: 在則僕射奏}
