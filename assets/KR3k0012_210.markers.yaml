  - {type: xml-element, offset: 4, content: '', id: KR3k0012_CHANT_210-bkkxmlele1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_210-1a.1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_210-1a.2}
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 條事皆諮而後行惠帝之丗太保衛瓘太宰河間王顒太􅀓東海王越皆録三省尚書祕書事沈約宋書曰髙武永初三年尚書令揚州刺史徐羡之爲司空録尚書事又曰孝武帝即位以大將軍江夏王義恭爲太尉録尚書事又曰諸公録尚書事古制也王肅解尚書納于大麓曰堯納舜於尊顯之官使大録万機之政案漢氏諸吏平尚書奏事後霍光以}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_210-2b}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 條事皆諮而後行惠帝之世太保衞瓘太宰河間王顒太傅東海王越皆録三省尚書事沈約宋書曰髙武帝永初三年尚書令揚州刺史徐羨之為司空録尚書事又曰孝武帝即位以大将軍江夏王義恭為太尉録尚書事又曰諸公録尚書事古制也王肅解尚書納于大麓曰堯納舜於尊顯之官使之録萬機之政按漢氏諸吏平尚書奏事後霍光以}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_210-3b, image: WYG0894/WYG0894-0822b.png}
