  - {type: variant, offset: 805, length: 6, content: 疾瘳召見陰興, SBCK: 下平又曰侯霸拜尚書令條撰善政有便於民者除其煩苛時令立春下寛大詔書由霸始建言多施用又曰陳蕃岀爲豫章太守性方峻不接賔客徴爲尚書令送者不出郭門華嶠後漢書曰申屠剛爲尚書令時内外羣官多帝自遷舉加以法理嚴察職事過苦尚書近臣乃至捶撲牽曵於前羣臣莫敢言唯剛每極諫張璠漢記曰左雄爲尚書令在位者各肅清時稱曰左伯豪爲尚書令天下皆愼選舉伯豪雄字也漢官曰尚書令􅁗官銅印墨綬與司􅀠校尉御史中丞皆專席坐京師號曰三獨坐言其尊重如此魏志曰陳矯字季弼尚書令魏明帝卒至尚書門矯跪問何之帝曰}
