  - {type: punctuation, offset: 9, content: 《, id: KR3k0012_CHANT_210-bkkpn1}
  - {type: variant, offset: 9, length: 2, content: 辯釋, SBCK: 業思蒸魚太官以無録公命不與後魏書曰比海王祥􅀄遷大將軍録尚書事祥之命其夜暴風雲電抜其庭中桐樹大十圍倒立夲處天威如此識者知其不終三國典略曰齊以并省尚書令髙阿郍肱爲録尚書事郍肱才伎庸劣不渉文史尚書郎中源師常白郍肱云龍見當雩郍肱問曰何處龍見作何顔色師荅曰此是龍星湏雩祭也非是眞有龍見郍肱曰漢兒多事強知星􅀫唐書官品志曰録尚書一人位在令上掌與令同但不糾察今則紏彈見事與御史中丞更相廉察陶氏職官要録曰後漢章帝以太􅀓趙喜太尉牟融並録尚書事尚書有六}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_SBCK_210-3a}
  - {type: variant, offset: 9, length: 2, content: 辯釋, WYG: 業思蒸魚大官以無録公命不與後魏書曰北海王祥初遷大将軍録尚書事祥受命其夜暴風雲電㧞其庭中桐樹大十圍倒立本䖏天威如此識者知其不終三國典略曰齊以并省尚書令髙阿那肱為録尚書事那肱才伎庸劣不渉文史尚書郎中源師常白那肱云龍見當雩那肱問曰何䖏龍見作何顔色師答曰此是龍星須雩祭也非是真有龍見那肱曰漢兒多事强知星宿唐書官品志曰録尚書一人位在令上掌與令同但不紏察今則紏弹禁事與御史中丞更相亷察陶氏職官要録曰後漢章帝以太傅趙喜太尉牟融並録尚書事尚書有録}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_WYG_210-4b, image: WYG0894/WYG0894-0822d.png}
  - {type: variant, offset: 9, length: 2, content: 辯釋, krp: 業思蒸魚太官以無録公命不與後魏書曰比海王祥𥘉遷大將軍録尚書事祥之命其夜暴風雲電抜其庭中桐樹大十圍倒立夲處天威如此識者知其不終三國典略曰齊以并省尚書令髙阿郍肱爲録尚書事郍肱才伎庸劣不渉文史尚書郎中源師常白郍肱云龍見當雩郍肱問曰何處龍見作何顔色師荅曰此是龍星湏雩祭也非是眞有龍見郍肱曰漢兒多事強知星宿唐書官品志曰録尚書一人位在令上掌與令同但不糾察今則紏彈見事與御史中丞更相廉察陶氏職官要録曰後漢章帝以太傳趙喜太尉牟融並録尚書事尚書有六}
