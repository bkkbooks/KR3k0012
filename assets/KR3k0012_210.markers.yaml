  - {type: variant, offset: 3173, length: 193, content: 祖辟為司空掾屬每於公朝論議常直言正色退無私宴又曰太祖為司空丞相毛玠常為東曹掾與崔琰並典選舉其所舉用皆清正之士雖時有盛名而行不由本者終莫得進務以儉率人由是天下之士莫不以廉節自勵雖貴寵之臣輿服不敢過度太祖歎曰用人如此使天下自治吾復何憂哉邴吉別傳曰原字根矩魏武皇帝初為司空辟署議曹掾請見禮畢上送至門中原辭直去不顧上還語左右孤甚敬此人與其辭遠送之謂其尚顧而終不顧此人誠高士也人謂曰君宜謝公公望君, SBCK: 平御覽卷第二百}
