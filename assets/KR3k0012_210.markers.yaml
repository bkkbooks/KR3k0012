  - {type: variant, offset: 2018, length: 602, content: 聞當年太尉王君見而問曰老莊與聖教同異阮曰將無同太尉善其言而辟之為掾世號曰三語掾君見而嘲之曰一言可辟何假三阮曰茍是天下民望可無言而辟復何假於一言崔寔政論曰且三公天子之股肱掾屬則三公之喉舌天子當恭巳南面於三公三公亦委策掾屬以荅天子太尉從事中郎後魏書曰郭景尚字思和涉歷書傳遷太尉從事中郎善事權寵世呼為郭尖干寶司徒儀曰從事中郎之職各掌其所治之曹而紀綱其事維正大體參輔謀議太尉主簿後魏書曰元慶智性貪鄙為太尉主簿事無大小得物然後判或十錢二十錢得便取之府中號曰十錢主簿廣州先賢傳曰鄧盛字伯直為秭歸令聞母病解印綬決去太尉馬嘉其所履服竟辟之初入府為主簿司徒長史東觀漢記曰吳梁為司徒長史以清白方正稱干寶晉紀曰傅咸為司徒長史多所執正齊書曰到撝為司徒左長史宋世上數遊會撝家同從明帝射雉郊野渴倦撝得早青瓜與上對剖食之上懷其舊德意眄良厚至是一歲三遷梁書曰褚球字仲寶為司徒左長史加貂自球始也干寶司徒儀曰右長史職掌撿其法憲明其分職司徒掾漢書曰武帝時司徒奏州郡農桑未有賞罰制宜遣掾屬循行詔遂使司徒督察州郡播殖有所循者增掾屬十人謝承後漢書曰虞延辟司徒侯霸府正旦百官朝賀上望見延在公府掾屬中馳小黃門問曰故陳留督郵虞延非耶對曰是遂前召見漢雜事曰陳寵為司徒掾先是公府掾多不親事但以交接為務寵常獨親事魏書曰王粲字仲宣年十八司徒掾辟遷黃門不就晉書曰魏舒為司徒時陳留周震累為諸府所辟辟書既下公輒喪亡僉號震曰殺公掾莫有辟者舒固辟之而竟無患識者以此稱其達命, SBCK: ''}
