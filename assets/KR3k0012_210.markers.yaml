  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_210-1a, image: WYG0894/WYG0894-0821a.png}
  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第二百一十}
  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 八録尚書尚書令録尚書漢書曰張安丗領尚書事職典樞機以謹慎周密自著每言大政巳決輙移病出聞有詔令乃驚使吏之丞相府問焉自朝廷大臣莫知其與議也又曰孔光字子夏領尚書事凡典樞機十餘年守法度修政事不希苟合或問温室省中樹皆何木也光荅以他語其愼密也如此應劭漢官曰章帝詔曰司空牟融典職六年勤勞不怠其以融爲太尉録尚書事又曰和帝䇿書曰故太尉鄧彪元公之族三讓弥髙海内歸仁爲羣賢酋其以彪爲太傅録尚書事百官揔巳以聽又曰靈帝䇿書曰故太尉陳蕃忠亮謇諤有不吐茹之節司徒胡廣敦德允元五丗從政今以蕃爲太􅀓與廣叅録尚書事又曰沖帝䇿書曰太尉趙峻二丗掌典機衡有匪石不二之心大司農李固公族之苗忠直不回余以峻爲太􅀓固爲太尉叅録尚書事晉書曰元康元年誅楊駿詔曰司徒王渾秉德忠正器量􅀪逺歷位内外文武勲庸著在方䇿冝叅弼機衡以亮天工其令録尚書事又曰賈充爲太尉録尚書事及伐呉爲大都督呉平遣侍中程咸犒勞増邑八千户又曰㑹稽王道子元顯並録尚書事時謂道子爲東録元顯爲西録晉中興書曰㤗和元年詔㑹稽王體道冲虗理識明允阿衡孝文有保乂之規輔弼哀皇盡翼亮之道朕承洪緒仍聞善誘愼徽五敎儀形具瞻登賢顯親國之典也其以爲丞相録尚書事入朝不趨讃拜不名劒履上殿給羽葆鼓吹班劒六十人又曰元興元年八月庚子尚書下舎火是時桓􅀇用事出鎭姑熟名雖在外實遥録尚書故天火示不復用也又曰明帝后庚氏爲皇太后九月癸卯皇太后臨朝稱制司徒王導録尚書事􅀓暢晉故事曰何劭王戎張華裴楷楊濟和嶠爲愍懐太􅀓通省尚書事張華爲光禄大夫尚書}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_210-1b}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_210-2a}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 八録尚書尚書令録尚書漢書曰張安世領尚書事職典樞機以謹慎周宻自著每言大政已决輙移病出門有詔令乃驚使吏之丞相府問焉自朝廷大臣莫知其與議也又曰孔光字子夏領尚書事凡典樞機十餘年守法度修政事不希苟合或問温室省中樹皆何木也光荅以他語其慎密也如此應劭漢官儀章帝詔曰司空牟融典職六年勤勞不息以融為太尉録尚書事又和帝䇿書曰故太尉鄧彪元公之族三讓彌髙海内歸仁為群賢首以彪為太傅録尚書事百官總已以聽又曰靈帝䇿書曰故太尉陳蕃忠亮謇諤有不吐茹之節司徒胡廣敦徳允正五世從政今以蕃為太傅與廣參録尚書事又曰冲帝䇿書曰太尉趙峻二世掌典機衡有匪石不二之心大司農李固公侯之苖忠直不囬今以峻為太傅固為太尉參録尚書事晉書曰元康元年誅楊駿詔曰司徒王渾秉徳中正器量宏逺厯位内外文武勲庸著在方䇿宜參弼機衡以亮天工其令録尚書事又曰賈充為太尉録尚書事及征吴為大都督吴平遣侍中程咸犒勞增邑八千户又曰㑹稽王道子元顯並録尚書事時道子為東錄元顯為西錄晉中興書曰泰和元年詔㑹稽王體道冲虛理識明允阿衡李文有保乂之規輔弼哀皇盡翼亮之道朕承洪緒仍聞善誘慎徽五教儀形具瞻登賢顯親國之典也其以為丞相録尚書事入朝不趨賛拜不名劍履上殿給羽葆鼓吹班劔六十人又曰元興元年八月庚子尚書下舍火是時桓元用事出鎮姑熟身雖在外實遥録尚書故天火示不復用也又曰明帝后庾氏為太皇后九月癸卯皇太后臨朝稱制司徒王導録尚書事傅咸晉故事曰何劭王戎張華裴楷楊濟和嶠為愍懐太傅通省尚書事張華為光禄大夫尚書}
