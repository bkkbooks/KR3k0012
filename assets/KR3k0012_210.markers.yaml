  - {type: variant, offset: 1434, length: 430, content: 曰安定王休領大司馬高祖親行諸軍遇休以三盜人徇於六軍斬之有詔救之休執曰陛下將遠親衡霍故親御六師跋涉野次軍行始爾巳有奸竊如其不斬何以息盜詔曰大司馬執憲誠如是但因緣會朕王者之體亦時有非常之澤雖違軍法可特原之休乃奉詔高祖謂司徒誕曰大司馬嚴而秉法君不可不慎於是六軍肅然後周書曰夏官謂之大司馬卿掌邦政以建邦國之九法佐皇帝平邦國大祭祀掌其宿衛廟社則奉犧牲管子曰昔黃帝得大封辨乎四方故使為司馬又曰涼風至白露下天子命左右司馬全組甲厲士眾傅子曰曹大司馬之勇賁育弗加也曹仁博物志曰太公望為灌壇令文王夢見婦人當道哭問其故曰吾泰山之神嫁為西海婦灌壇令當吾道夢覺召太公三日果疾風暴雨文王乃拜太公為大司馬班彪上事曰元狩六年罷太尉置司馬時議以北軍中候有千人司馬故加之為大司馬所以別小大司馬之號也太尉長史應劭漢官儀曰太尉司徒司空長史秩比千石號為毗佐三台助和鼎味太尉掾汝南先賢傳曰李宣字公休為太尉黃瓊所辟時寒暑不和瓊見掾屬曰是太尉無德願諸掾有以匡之次及宣宣曰明公被日月之衣居上司之位輔弼天子處諫諍, WYG: ''}
