  - {type: variant, offset: 4, length: 0, content: '', krp: 條事皆諮而後行惠帝之丗太保衛瓘太宰河間王顒太傳東海王越皆録三省尚書祕書事沈約宋書曰髙武永初三年尚書令揚州刺史徐羡之爲司空録尚書事又曰孝武帝即位以大將軍江夏王義恭爲太尉録尚書事又曰諸公録尚書事古制也王肅解尚書納于大麓曰堯納舜於尊顯之官使大録万機之政案漢氏諸吏平尚書奏事後霍光以}
