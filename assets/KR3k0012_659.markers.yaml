  - {type: variant, offset: 534, length: 883, content: 戒義三部七法八法尼律增一開雜部善部如是等八部十作毗尼藏經云五戒一不殺生二不偷盜三不邪婬四不妄語五不飲酒食肉故云五戒布施持戒忍辱精進禪定智惠以法能度生死故云六度色聲香味觸法能坌汙人之淨心故曰六塵禪寶林傳曰佛未涅槃時每告弟子迦葉曰吾以清淨法眼涅槃妙心實相正法將付於汝汝可流布無令斷絕迦葉敬諾唯然受教迦葉傳阿難阿難付商郍和脩自此轉相傳授至般若多羅并佛二十八師般若多羅付菩提達磨菩提達磨者南天竺人也梁普通中泛海至于廣州後過江上嵩山少林寺達磨傳惠可惠可傳僧璨隱於晥山璨傳道信道信傳弘忍弘忍傳惠能惠能住韶州曹溪是為六祖高僧傳日釋道立不知何許人出家事安公為師隱覆舟山岩居獨立不受供養每潛入禪輒七日不起塔宋書曰謝尚嘗夢其父曰西南有氣至衝人必死勿當其鋒家無一全汝宜修福建塔寺可穰之若未暇立寺可杖頭刻作塔形見有氣來可擬之尚悟懼未及造塔寺遂刻小塔施杖頭恒置左右後果有異氛遙見西南從天而下始如車輸漸彌大直衝尚家尚以杖指之氛便迴散闔門獲全氣所經處數里無復孑遺遂於永和四年捨宅造寺名莊嚴寺宋大明中路太后於宣陽門外造莊嚴寺改此為謝鎮西寺又曰阿育王寺塔阿育王即鐵輪王王閻浮提一天下佛滅後一日一夜役鬼神造八萬四千塔此即其一吳時居其地以為精舍孫綝尋除毀之塔亦同滅吳平後諸道人復於舊處建立焉晉元帝初渡江更脩飾之其後有西河離石縣胡人劉薩阿遇疾暴亡七日更蘇說云觀世音語云汝緣未盡當得活可作沙門洛下齋丹陽會稽並有阿育王塔可往禮拜忽然醒寤因此出家名惠達遊行至丹陽未知塔處及登越城四望見長千里氣色因就禮拜果是先阿育王塔所屢放光明由是定知必有舍利集眾就掘得三石碑有鐵函函中有銀函函中又有盛三舍利及爪髮長一丈七尺詔遣沙門釋雲隨使往迎之先是武帝改造阿育王等塔出舊塔下舍利及佛爪髮髮青紺色眾僧以手伸之隨手長短放之則旋屈為蠡形按經云佛髮青而細猶如藕莖絲佛三昧經云我昔在宮沐頭以尺自量髮長一丈二尺放已右旋還成蠡文則與帝所得同也佛圖澄傳曰後趙尚書張離張良家富事佛起大塔澄謂曰事佛在於清淨無欲慈矜為心檀越雖儀奉大法而貪恡未已遊獵無度積聚不窮方受見世之罪何福報之可希也洛陽茄藍記曰永寧寺熙平元年靈太后胡氏所立也在宮前閶闔門南一里中有, SBCK: ''}
