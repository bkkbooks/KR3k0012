  - {type: variant, offset: 440, length: 4, content: 卒毗婆沙, SBCK: 以言者以音相聞譬如知音者識音以􅃶心知其音口不能傳道深微妙知者不言也太上曰知者不言言能以救物又曰上士學道受之以神中士受之以心下士受之以耳以神聽者通無形以心聽者知内情以耳聽者聞外聲又曰知者不言言者不知故聖人云我無爲而民自化我無事而民自富我好靜而民自正我無欲而民自樸脩之於身天下自化深根固蔕長生乆視之道以道蒞天下其􅀑不神道者萬物之奥爲者敗之執者失之是以聖人無爲故無敗無執故無失太上經曰混茫之氣變化爲眞人與時翺翔有名無體仙經曰神仙輕舉謂之天仙列位太清度名祕籍祕要經曰五岳洞府隱處地仙保其神形逺其憂患又曰太清九官皆有僚屬其最髙者稱太皇紫皇玉皇其高揔稱大道君次稱眞人眞卿其閒有御史凡稱太上者一宫之尊也德高無踰故曰太上又曰仙者川也身者舟也濟川得岸何假舟焉太眞科曰玉皇譜録有百八道君羣仙隨業以補其職三善道者聖眞仙也上品曰聖中品曰眞下品曰仙三淸之閒各有正位聖登玉淸眞登上淸仙登太淸玉淸有大帝宫殿皇帝王公􅀸大夫吏民率以聖呼之如聖皇聖帝之􅀋是也男女貴賤各有次第上淸有􅀇都玉京七寶紫微率以眞呼之太淸有太極宫殿率以仙呼之其上淸太淸之品位男女次第之統數與玉淸同大洞經曰從生得道從道得仙從仙得眞從眞得爲上淸君五符經曰二十四眞圗五岳之靈寶也能得之必能仙去飛歩太淸欲得道法先沐浴去穢當得東井圖欲定五帝役山精當得五岳圗欲通神靈法仙訣當得八史眞形圖欲通五行廚當得六甲通靈圗欲存吾身致天神當得九宫紫房圗欲奉道法當得太淸圖欲奉順道當得混成圗欲通道機當得西昇保録圖欲通變化當得靈化圗欲躡大道當得九天圖欲脫身形當得九變圖欲隱存守身神當得養身圖欲定身守神寶當得含影圖欲恬泊守一以存身當得養身圖欲寂黙養志當得精誠守志圖欲淸淨潔白致其芝英當得芝英玉女圖欲騁六丁當得六陰玉女圖欲致仙籙當得九九道仙圖欲食道氣當得導引圖欲治道術當得洞中皇寶圗欲爲變化當得偃息圗欲臨鑪定九丹金液當得太一圖欲登五岳求神仙芝藥當得開山芝藥圗欲保神形別邪精當得明鏡圖上清經曰氣之所守隨神所生神在則氣在神去則氣去氣散則爲雲霧合則爲形影出之爲仙化入之爲眞一上結三元下結萬物靜用爲兆身動用爲兆神洞眞經曰凡讀太丹隱書洞眞􅀇經能研精密感通􅀇達雲廻釋􅀇元味景太淸者得爲􅀇中法師也葛洪神仙傳日自伏羲至三代顯名道士世世有之其老子蓋得道尢精者也内實自然欲正定本末當以史傳爲據并仙經祕文以相參㑹其他俗說文多虚妄其後道士私有増益非眞文也著道德二篇尹喜行其道至漢竇太后好黃老言孝文帝及外戚諸竇皆令讀之故莊周之徒以老子爲宗太上􅀇一眞人經曰衆眞髙仙皆有師也奉受上淸三洞寶經爲學無師則道不成八景龍輿焉可得乘太極玉闕焉可得登凡學上淸之道豈肉飛之舉若慢於師道則失投夜光也以是言之道固難知也至於聖賢皆尊其師所以耐道也太上太霄琅書曰天地布氣師教之眞眞仙登聖非師不成心不可師師心必敗寶􅀇經曰裁制偏邪必歸中正能及流末還至本源道本無形假言立象雖言沖用用實無物道典曰制殺生者天也順性命者人也非逆天者勿殺也非逆人者勿伐也爲政如是蓋道之極也七聖紀曰南岳赤君下教變迹爲道士與六弟子俱顯姓名太一帝君經曰求道者使其心正則天地不能違也捨色累而不顧避榮利而自逺甘寒苦以存思樂靜齋於隱垣則學道之人始可與言矣太上三五順行經曰天者道之應形也應有時漸交以引之􅀇象虚文莫過三五三五順行運周則變通不窮三才合度太一者天也天之受一氣蕩蕩而致清道者天之積靈也昇􅀇經曰道之􅀇妙出於自然生於無生先於無先弥綸無外布神化氣淡然無上制御諸天􅀇妙内篇曰大道起於無爲萬物之祖也正一眞人經曰道之淳眞非有言也借言通意因置􅀇都正一之化去眞近矣寶􅀇經曰正則道合合則言志志言在正正以絕邪齋戒通經仙道自成成仙之大莫過太上太上無言言以應感感應之道表信成經也三皇經曰求索自然脫身當道三光發明天地常然智惠經曰與人君言則惠於國人父言則慈於子人師言則愛於衆人兄言則悌於行人臣言則忠於上人子言則孝於親人友言則信於交人婦言則志於夫人夫言則和於室人弟言則恭於禮野人言則勸於農道士言則止於道異國人言則各守其域奴婢言則愼於事太上經曰親近賢智愽問善道賢者}
