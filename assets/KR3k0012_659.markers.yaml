  - {type: variant, offset: 447, length: 3, content: 分別戒, WYG: 者自賞為惡者自刑故不爭無不勝不言無不應又曰能以至心學道當以道授學者裴君曰我師南岳赤松子為太虛真人者太上以徳敎老子而得道松子以道授我而得仙又曰仙道十二試觀之法試皆過然後授之經此十二事大試也昔太極真人臨見之可不慎焉昔彭祖弟子青鳥公受明師之敎審仙妙之理入華隂山學道積年十二試有三不過後服金丹而昇太極道君以為試三不過但仙人而已不得為真人又曰裴君云學道者有九患若審之則仙不逺矣患人有志無時有時無變有變無志有志不遇其師遇師不學學師不勤勤不守道或志不固一心如此則不湏有而成亦不湏感而動此學仙之廣要也師有憂戚弟子岀入無善為學無師道則不成心存目想見師如經學非師授不可以敎人恐疑悟後學故不得傳求法事師莫擇貴賤勿疑長幼言我年大而彼年小彼是賤而我是貴此是未觧正真平等之要人無貴賤有道則尊所謂長老不必耆年要當多識多見以為先生不得言彼學在我后云何更及師彼作此念者非學道也當謙下推能譲徳惟師是從不得獨是非彼得道度世莫不由師也學之有師亦如樹之有根也大智既成復能成就小智猶樹根生子子復能生根展轉相生種類不絶從師變道道過於師還敎於師所謂道貴人賤義類如此先師並湏尊異所以爾者本師者學之根也譬為山一簣之土漸得高大本師者發蒙之基也後師者稱成也譬如嚴莊服飾衆事已辦惟未加冠不可以行人事也妄生下想所以然者論議言説為人模範師不明道焉能觧疑難也古者賢聖上學得其師}
