  - {type: variant, offset: 55, length: 0, content: '', SBCK: 開謂心無逐境之迷境無起心之累也善結無繩約而}
  - {type: variant, offset: 55, length: 0, content: '', WYG: 開謂心無逐境之迷境無起心之累也善結無䋲約而}
  - {type: variant, offset: 55, length: 0, content: '', krp: 開謂心無逐境之迷境無起心之累也善結無繩約而}
  - {type: variant, offset: 56, length: 8, content: 信革因乞受菩薩戒, SBCK: 可解謂心與道合雖無約束其不可解也是以聖人常善救人故無弃人常善救物故無弃物是謂襲明知其雄守其雌知其白守其黑知其榮守其辱謂含德内融則復歸於朴常德聽用則散而爲器旣渉形器必有精麤聖人用之則爲群材之官長矣故大制不割謂聖人用道大制群生萬物不謝於自然曾不割傷也道之在天下猶川谷之與江海死而不亡者壽謂死者分理之終亡者夭折之數壽者一期之盡夫知足力行者得天常也死而不亡是一期之盡可謂壽矣執大象天下往往而不害安於太平化而欲作吾將鎭之無名之朴謂道也失道而後德失德而後仁失仁而後義失義而後禮天下之物生於有有生於無明道若昧進道若退夷道若􅀋上德若谷謂虚㳂而容物也大白苦辱謂能潔而含垢也廣德若不足謂大成而執謙也建德若渝謂立功而不衒也體眞若渝謂淳一而和光也大方無隅謂不小立圭角也大器晚成謂且無近功也大音希聲謂不飾小說也大象無形謂能應萬􅀋也道隱無名謂功用不彰也道生一一生二二生三三生萬物萬物負陰而抱陽沖氣以爲和爲道日損損之又損以至無爲故塞其兊閉其門終身不勤也謂不縱六根愛恱則禍患之門閉矣終身不勤勞也開其兊濟其事終身不救謂開縱視聽以成其愛恱之事故有禍患不救也無遺自殃是謂襲常謂不爲身災是謂密用眞常之道也}
  - {type: page-break, offset: 56, content: '', id: KR3k0012_SBCK_659-2a}
  - {type: page-break, offset: 56, content: '', id: KR3k0012_SBCK_659-2b}
  - {type: variant, offset: 56, length: 4, content: 信革因乞, WYG: 觧謂心與道合雖無約束而不可觧也是以聖人常善救人故無棄人常善救物故無棄物是謂襲明知其雄守其雌為天下谿為天下谿常徳不離復歸于嬰兒知其白守其黒為天下式為天下式常徳不忒復歸于無極知其榮守其辱為天下谷為天下谷常徳乃足復歸于朴聖人用之則為官長故大制不割謂聖人用大道制羣生萬物不謝於自然曽不傷割也道之在天下猶川谷之與江海死而不亡者夀謂死者分理之終亡者天折之數夀者一期之盡夫知足力行者得天常也死而不亡是一期之盡可謂夀也矣執大象天下徃徃而不害安於太平化而欲作吾將鎮之以無名之朴謂道也失道而後徳失徳而後仁失仁而後義失義而後禮天下萬物生於有有生於無明道若昩進道若退夷道若類上徳若谷謂虛㳂而容物也大白若辱謂能潔而含垢也廣徳若不足謂大成而執謙也建徳若偷謂立功而不􅃷也質真若渝謂淳一而和光也大方無隅謂不小立于角也大噐晚成謂且無近功也大音希聲謂不飾小說也大像無形謂能應萬類也道隠無名謂功用不彰也道生一一生二二生三三生萬物萬物負隂而抱陽冲氣以為和為道日損損之又損以至于無為故塞其兊閉其門終身不勤謂不縱六根}
