  - {type: variant, offset: 446, length: 0, content: '', SBCK: 末世道士講經說法儀軌云何若說五千文者亦依靈寶太上三洞寶經曰三洞傳法之師一人度世勝黃衣道士千人也又曰大茅山有銅鐵鼎可容四五斛刻甚精好在山最髙處入土八尺餘上有盤石掩鼎每吉日逺近道士咸登山瞻視無復草木壘石爲小壇昔有小瓦屋爲風所倒兩􅉗法日月也三足法三才也羽山之銅所作神變隱顯眞誥日大茅山西南有四平山俗謂之方山其下有洞室名曰方臺洞有兩口見於山外與華陽通號爲别宇幽館矣得道者處焉又曰脩於身其德乃眞君子立身道德爲任清淨爲師太和爲友爲􅀇爲默與道窮極治於根本求於未兆爲}
  - {type: page-break, offset: 446, content: '', id: KR3k0012_SBCK_659-6b}
  - {type: variant, offset: 446, length: 0, content: '', WYG: 末世道士講經說法儀軌云何若説五千文者亦依靈寳太上三洞寳經曰三洞傳法之師一人度世勝黄衣道士千人也又曰大茅山有銅鼎可容四五斛刻甚精好在山最高處入土八尺餘上有磐石掩鼎每吉日逺近道士咸登山瞻視無復草木壘石為小壇昔有小瓦屋為風雨所倒兩鉉法日月也三尺法三才也羽山之銅所作神變隠顯真誥曰大茅山西南有四平山谷謂之方山其下有洞室名曰方臺洞有兩口見於山外與華陽通號為别宇幽館也得道者處焉又曰修於其身其徳乃真君子立身道徳為任清凈為師太和為友為𤣥為黙與道窮極治於根夲求於末兆為}
  - {type: page-break, offset: 446, content: '', id: KR3k0012_WYG_659-9b, image: WYG0898/WYG0898-0841b.png}
