  - {type: variant, offset: 106, length: 331, content: 須沐浴以大袈裟覆衾蒙首足弟子遵而行之又曰陸杲素信佛法持戒甚精著沙門傳三十卷又曰蕭昱字子真歷位中書侍郎每求試邊州武帝以其輕脫無威望抑而不許普通五年徙臨海郡行至上虞勑追還令受菩薩戒既至恂恂盡禮改意蹈道持戒又精潔帝甚善之北齊書曰趙隱字彥深專意玄門崇敬佛道雖年期頤常持戒行高僧傳曰弗若多羅此云功德華罽賓人也少出家專精十誦律部偽秦中振錫入關姚興待以上賓之禮先是經法雖傳律藏未闡鳩摩羅什聞多羅既善斯部以秦弘始六年集僧數百餘人延請多羅誦出十誦胡本羅什譯為晉文三分獲二多羅遘疾棄世後有曇摩流支此云法樂西域人棄家入道偏以律藏馳名以弘始七年秋達關中初弗若多羅誦出十誦未竟而亡廬山釋惠遠聞支既善毗尼希得究竟律部乃遣書通好流支既得遠書乃與羅什共譯十誦都畢支曰吾當更行無律教處於是遊化餘方, SBCK: 言言者}
