  - {type: variant, offset: 440, length: 4, content: 卒毗婆沙, WYG: 以言者以音相聞譬如知音者識音以絃心知其音口不能傳道深微妙知者不言也太上曰知者不言言能以救物又曰上士學道受之以神中士受之以心下士受之以耳以神聴者通無形以心聴者知内情以耳聴者聞外聲又曰知者不言言者不知故聖人云我旡為而民自化我旡事而民自富我好靜而民自正我无欲而民自樸修之於身天下自化深根固柢長生乆視之道以道蒞天下其鬼不神道者萬物之奥為者敗之執者失之是以聖人无為故旡敗无執故无失大上經曰混茫之氣變化為真人與時翺翔有名旡體仙經曰神仙輕舉謂之天仙列位太清度名秘籍秘要經曰五岳洞府隠處地仙保其祖形逺其憂患又曰太清九宫皆有僚属其最高者稱太皇紫皇玉皇其高總稱曰道君次稱真人真卿其間有御史凡稱太上者一宫之尊也徳高旡踰故曰太上又曰仙者川也身者舟也濟川得岸何俟舟為太真科曰玉皇諸錄有百八道君羣仙随業以補其職三善道者聖真仙也上品曰聖中品曰真下品曰仙三清之間各有正位聖登玉清真登上清仙登太清玉清有大省宫殿皇帝王公卿大夫吏民率以聖呼之如聖皇聖帝之類是也男女貴賤各有次第上清有𤣥都玉京七寳紫微率以真呼之太清有太極宫殿率以仙呼之其上清太清品位列男女次第之統數與玉清同大洞經曰從生得道從道得仙從仙得真從真得為上清君玉符經曰二十四真圗五岳之靈寳也能得之必能仙去飛渉太清欲得道法先沭浴去穢當得東井圗欲定五常役山精當得五岳圗欲通神靈法仙訣當得八史真形圗欲通五行厨當得六甲通靈圗欲存吾身致天神當得九宫紫房圗欲奉道法當得太清圗欲奉順道當得混成圗欲通道機當得西昇保録圗欲通變化當得靈化圗欲躡大道當得九天圗欲脱身形當得九變圗欲隠存守身當得常存圗欲定身守神當得含影圗欲恬泊守一以存身當得飬身圗欲寂黙飬志當得精誠守志圗欲清凈潔白致其芝英當得芝英玊女圗欲聘六丁當得六隂玊女圗欲致仙籙當得九九道仙圗欲食導氣當得導引圗欲治道術當得洞中皇寳圗欲為變化當得偃息圗欲臨鑪定九丹金液當得太一圗欲登五岳求神仙芝藥當得開山芝藥圗欲保神形别邪精當得明鏡圗上清經曰氣之所守随身所生神在則氣在神去則氣去氣散則為雲霧合則為形影出之為仙化入之為真一上結三元下結萬物靜用為兆身動用為兆神洞真經曰凡讀大丹隠書洞真𤣥經能研精宻感通𤣥達雲廻釋𤣥元味景太清者為𤣥中法師也葛洪神仙傳曰自伏羲至三代顯名道士世世有之其老子盖得道尤精者也内實自然欲正定本末當以史傳為據并仙經秘文以相恭㑹其他俗説文多虛妄其後道士私有増益非真文也著道徳三萹尹喜行其道至漢竇太后好黄老言孝文帝及外戚諸竇皆令讀之故莊周之徒以老子為宗太上𤣥一真人經曰衆真高仙皆有師也奉受上清三同寳經為學無師則道不成人景龍輿焉可得乗太極玉闕焉可得登凡學上清之道豈肉飛之舉若慢於師道則失投夜光也以是言之道固難知也至於聖賢皆尊其師所以耐道也太上太霄琅書曰天地布氣師教之真真仙登聖非師不成心不可師師心必敗寳𤣥經曰裁制偏邪同歸中正能及流末還至本源道夲無形假名立象雖言充用實本無物道典曰制殺生者天也順性命者人也非逆天者勿殺也非逆人者勿伐也為政如是盖道之極也七聖記曰南岳赤君下敎變迹為道士與六弟子俱顯姓名太乙帝君經曰求道者使其心正則天地不能違也捨色累而不願避榮利而自逺甘寒苦以存思樂靜齋於隠垣則學道之人始可與言矣太上三五順行經曰天者道之應形也應有時漸交以引之𤣥象虛文莫過三五三五順行運周則變通不窮三才合度太乙者天也天之受一氣蕩蕩而致清道者天之積靈也昇𤣥經曰道之𤣥妙岀於自然生於無生先於無先彌綸無外有神化氣淡然無上制御諸天𤣥妙内萹曰大道起於無為萬物之祖也正一真人經曰道之淳真非有言也惜言道意因置𤣥都正一之化去真近矣寳𤣥經曰正則道合合則言志志言在正正以絶邪齋戒誦經仙道自成成仙之大莫過太上太上無言言以應感感應之道表信成經也三皇經曰求索自然脱身當道三光發明天地常經智慧經曰與人君言則惠於國與人父言則慈於子與人師言則愛於衆與人兄言則悌於行與人臣言則忠於上與人子言則孝於親與人友言則信於交與人婦言則忠於夫與人夫言則和於室與人弟言則恭於禮與野人言則勸於農與道士言則止於道與國人言則各守其域與奴婢言則慎於事太上經曰親近賢智博問善道賢者}
