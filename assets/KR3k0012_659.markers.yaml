  - {type: variant, offset: 8, length: 2, content: 武帝, SBCK: 道可道非常道虚極之妙也無名天地之始有名萬物之母無名者妙本也道沖而用之或似不盈淵乎似萬物之宗天地之閒其由槖籥乎􅀇牡之門是謂天地根天地所以能長且乆者以其不自生故能長生生而不有爲而不恃長而不宰是謂􅀇德執古之道以御今之有能知古始是謂道紀萬物並作吾以觀其復功成事遂百姓皆謂我自然絕聖弃智民利百倍孔德之容惟道是從以閱衆甫吾何以知衆甫之然哉曲則全謂曲已以應務則全也枉則直謂枉已以伸人則直也窪則盈謂執謙則常盈也弊則新謂守弊薄則日新也少則得謂抱一不離則無夫也多則}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_SBCK_659-1b}
  - {type: variant, offset: 8, length: 2, content: 武帝, WYG: 道可道非常道名可名非常名無名天地之始有名萬物之母無名者妙夲也道冲而用之或不盈淵乎似萬物之宗天地之間其猶槖籥乎𤣥牝之門是謂天地根天地所以能長且乆者以其不自生故能長生生而不有為而不恃長而不宰是謂𤣥徳執古之道以御今之有能知古始是謂道紀萬物並作吾以觀其復功成事遂百姓皆謂我自然絶聖棄智民利百倍孔徳之容惟道是從以閲衆甫吾何以知衆甫之然哉曲則全謂曲已從衆則全其身枉則直謂枉已以伸人乆乆自直窪則盈謂謙執則常盈也幣則新自受弊薄乆乆自新少則得謂抱一不雕則無失也多則}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_WYG_659-1b, image: WYG0898/WYG0898-0837b.png}
  - {type: variant, offset: 8, length: 2, content: 武帝, krp: 道可道非常道虚極之妙也無名天地之始有名萬物之母無名者妙本也道沖而用之或似不盈淵乎似萬物之宗天地之閒其由槖籥乎玄牡之門是謂天地根天地所以能長且乆者以其不自生故能長生生而不有爲而不恃長而不宰是謂玄德執古之道以御今之有能知古始是謂道紀萬物並作吾以觀其復功成事遂百姓皆謂我自然絕聖弃智民利百倍孔德之容惟道是從以閱衆甫吾何以知衆甫之然哉曲則全謂曲已以應務則全也枉則直謂枉已以伸人則直也窪則盈謂執謙則常盈也弊則新謂守弊薄則日新也少則得謂抱一不離則無夫也多則}
