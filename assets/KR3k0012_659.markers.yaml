  - {type: variant, offset: 12, length: 6, content: 佛教朝賢多啟, SBCK: 言合自然也有物混成先天地生寂兮寥兮獨立而不改周行而不殆吾不知其名字之曰道强爲之名日大域中有四大王居其一謂王者人靈之主萬物繫其興亡也人法地地法天天法道道法自然重爲輕根靜爲躁君善行無轍迹謂體了眞性行無行相則心與道冝也善言無瑕摘謂遣象}
  - {type: variant, offset: 12, length: 6, content: 佛教朝賢多啟, WYG: 言合自然也有物混成先天地生寂兮寥兮獨立而不改周行而不殆吾不知其名字之曰道強為之名曰大域中有四大而王居其一焉謂王者人靈之主萬物繫其興亡也人法地地法天天法道道法自然重為輕根靜為躁君善行無轍迹謂體于其性行無迹相則心與道宜也善言無瑕謫謂遺衆}
