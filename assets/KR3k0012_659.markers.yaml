  - {type: variant, offset: 446, length: 0, content: '', krp: 末世道士講經說法儀軌云何若說五千文者亦依靈寶太上三洞寶經曰三洞傳法之師一人度世勝黃衣道士千人也又曰大茅山有銅鐵鼎可容四五斛刻甚精好在山最髙處入土八尺餘上有盤石掩鼎每吉日逺近道士咸登山瞻視無復草木壘石爲小壇昔有小瓦屋爲風所倒兩鉉法日月也三足法三才也羽山之銅所作神變隱顯眞誥日大茅山西南有四平山俗謂之方山其下有洞室名曰方臺洞有兩口見於山外與華陽通號爲别宇幽館矣得道者處焉又曰脩於身其德乃眞君子立身道德爲任清淨爲師太和爲友爲玄爲默與道窮極治於根本求於未兆爲}
  - {type: variant, offset: 447, length: 0, content: '', SBCK: 者自賞爲惡者自刑故不爭無不勝不言無不應又曰能以至心學道當以道授學者裴君曰我師南岳赤松子爲大虚眞人昔太上以德教老子以得道松子以道授我而得仙又曰仙道十二試觀之法試皆過然後授之經此十二事大試也皆太極眞人臨見之可不愼焉昔彭祖弟子青烏公受明師之教審仙妙之理入華陰山學道積年十二試有三不過後服金液而升太極道君以爲試三不過伹仙人而巳不得爲眞人又曰裴君云學道者有九患若審之則仙不逺也患人有志無時有時無友有友無志有志不遇其師遇師不學學師不勤勤不守道或志不固一心如此則不須友而成亦不須感而動此學仙之廣要也師有憂戚弟子出入無善爲學無師道則不成心存目想見師如經學非師授不可以教人恐疑悟後學故不得傳求法事師莫擇貴賤勿疑長幼言我年大而彼年小彼是賤而我是貴此是未解正眞平等之要人無貴賤有道則尊所謂長老不必耆年要當多識多見以爲先生不得言彼學在我後云何更反師彼作此念者非學道也當謙下推能讓德惟善是從不得獨是非彼得道度世莫不由師也學之有師亦如樹之有根也太智旣成復能成就小智由樹根生子子復能生根展轉相生種􅀋不絶從師變道道過於師還教於師所謂道貴人賤義􅀋如此先師並須尊異所以爾者本師者學之根也譬爲山一簣之土漸得髙大本師者發蒙之基也後師者備成也諭如嚴裝服飾衆事已辨惟未加冠不可以行人事也妄生下想所以然者論議言說爲人模範師不明道焉能解疑難也古者賢聖上學得其師名爲更生不得其師名爲亂經無其師道不自生也太平經曰上士學道輔佐帝王好生之德也中士學道欲度其家下士學道才脫其身又曰言則道不成多言則爲害閉口不言萬歲無患又曰人得善師乃使凡賤之人成善人善不止更賢賢不止次聖聖不止乃得深知眞道守道不止乃得仙仙不止乃與天比其神神不止乃得與元氣比其得元氣乃包天地八方莫不受其氣而生是善師之功也不得其善師失路矣故師師相傳廼堅於金石不以師傳之名爲妄作則致邪矣叛去其師是去其眞道自窮之術也道有宗師祖師定眞玉籙曰治心之最不忘須􅁷心神乃定定則入道其􅃺在外愼其言語懼觸物也節其飲食慮貪叨也衣麄而靜在素淡也居陋而隱守靜篤也恭謹一切避凌辱也不敢爲先免嫉謗也始終淳信濳化導也進止和光密行教也挫銳解紛明道有時也出處變化見神應之速也又曰九宫眞人出入皆從黃闕絳臺中閒爲道故以道之左右置臺闕者以司非常之氣伺迎眞人之往來也道基經日服藥食麥爲善麥有甘始道士御氣食麥而度世也又云合道不言得無之眞晝夜不卧日月合光不飢不渴􅀛龍胎息也又云食穀者名之穀仙行之不休則可延乆長也不食穀者可以度世又曰無賣吾道以行求錢無衒吾道强授豪榮無損吾道以與讒佞黃庭經曰仙人道士服氣非有神也養生所致和氣專也若道土恐畏存神可鳴天鼓聲聞太極太眞科曰道士脩經習業以五千文爲先又曰道有寂動氣化之有形智化之有聲又曰皇敎道也帝教德也王教仁也抱朴子曰求師必須深愽猶渉滄海造長洲獨以力劣爲患豈以物少爲憂哉夫虎豹之所餘乃狸䑕之所飲陶朱之所弃乃原憲之所無專心憑師依法行道濟身度世利在永亨事師盡敬得道爲期承閒候色也不盡力眀其師道則罪不可除也學道得師明事之害亂不得發也三無眞一經曰有大洞守一經者則爲師也太淸經云天地以道資聖人以道師也資者持道以養育當生也師者以教人不知而當成也又曰有大洞守一經者則爲師也所以崇建本末盡善明天戒之苦至期神靈之所宗託階級以自始所以師友垣其外三一鑑其内帝君忻其赤子悅其宅老子云天地以道資聖人以道師資者持道以養育當生也師者以教人不知而當成也上清紫宸經曰經不師受竊天之寶受無盟信忽天之道太上八素眞經曰太上􅀇人所以與天地等者貴其能相教導也先覺悟於後覺反流歸於一源也天眞皇人曰此諸君皆積學滅度道業垂成而得受此文以還生人中皆超虚步空上昇金闕受號自然也其並悠逺人世所不能明考其延者羨門子師夜光髙丘子師石公洪崖先生師金母並受靈寶滅度五鍊之法昇天之傳又曰正一法文曰若􅃷法求利不明正典傳非習謬迷誤後生後生縁薄率爾逐易不尋髙德苟貪愛名名而無實望福得禍禍加深也傳授苟非其人道不虚授常恐浮淺之輩亟生誹謗貽災致罪爲累不輕所以立信効心因以爲施授受之中有以}
