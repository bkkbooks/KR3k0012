  - {type: variant, offset: 2906, length: 6, content: 重安而宜竹箭, krp: 入于時水傳曰有酒如澠太平御覽卷第六十三}
  - {type: variant, offset: 2910, length: 2, content: 竹箭, WYG: 麥齊人相承以殖之詩曰汶水湯湯行人彭彭周禮考工記曰狢踰汶則死地氣然也論語曰季氏使閔子騫為費宰閔子騫曰善為我辭焉如有復我者則吾必在汶上矣傳曰齊人歸我汶陽之田沭水水經云沭水出琅琊東莞縣西北山東南經東海厚丘縣梁天監二年三月土人張高等五百餘人相率開鑿此溪引漑水田二百餘頃俗名為紅花水東流入泗州連水界淄水水經曰淄水出泰山萊蕪縣原山注云世謂之原泉淮南子曰淄澠之水合易牙嘗而知之淄澠濟二水也新序曰齊有田巴先生者行修于内智明于外齊君聞其賢聘而問政焉田巴對曰政在正身正身之本在于羣臣大王召臣臣改制前飾將造公門問於臣妾曰奚若妾愛臣曰美將出門問從者從者畏臣曰美及臨淄水而觀影然後自知醜惡也今齊之臣妾諛王者非特二人王如臨淄水見已之惡過而能改斯齊國治矣澠水水經注曰澠水出營丘城東世謂之漢溱水入于時水傳曰有酒如澠太平御覽卷六十三}
