  - {type: variant, offset: 2892, length: 1, content: 以, SBCK: 百餘歩沂水􅀃文曰沂水出東海費東入泗一曰出㤗山蓋青州浸也水經曰沂水出㤗山蓋縣艾山注曰鄭􅀇云出沂山或云臨山水有二源南源所導丗謂之祚泉山北水所發俗謂之魚窮泉俱東南流合成一川論語曰暮春之月春服旣成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸西京雜記曰魯人秋胡娶妻三日而遊宦三年休還}
  - {type: page-break, offset: 2892, content: '', id: KR3k0012_SBCK_063-8a}
  - {type: variant, offset: 2892, length: 0, content: '', WYG: 百餘歩沂水説文曰沂水出東海費縣入泗一曰出泰山青州浸也水經曰沂水出泰山蓋縣艾山注曰鄭康成云出沂山臨山水有二源南導源世謂之祚泉山北水所發俗所謂魚窮泉俱東南流合成一川論語曰莫春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸西京雜記曰魯人秋胡娶妻三日而逰宦三年休還其婦採桑于郊胡至不識而悦之乃遺}
  - {type: page-break, offset: 2892, content: '', id: KR3k0012_WYG_063-13a, image: WYG0893/WYG0893-0522a.png}
  - {type: variant, offset: 2892, length: 1, content: 以, krp: 百餘歩沂水說文曰沂水出東海費東入泗一曰出㤗山蓋青州浸也水經曰沂水出㤗山蓋縣艾山注曰鄭玄云出沂山或云臨山水有二源南源所導丗謂之祚泉山北水所發俗謂之魚窮泉俱東南流合成一川論語曰暮春之月春服旣成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸西京雜記曰魯人秋胡娶妻三日而遊宦三年休還}
  - {type: variant, offset: 2893, length: 2, content: 其初, WYG: 金妻曰妾夫逰宦未返于兹三年未有被辱如今日也不顧胡慙而退至家問妻何在母曰採桑于郊乃是向來挑者也夫妻俱慙遂赴沂水而死尸子曰韓雉見申羊于魯有龍飲于沂韓雉曰吾聞之}
  - {type: page-break, offset: 2893, content: '', id: KR3k0012_WYG_063-13b, image: WYG0893/WYG0893-0522b.png}
  - {type: variant, offset: 2894, length: 1, content: 初, SBCK: 婦採桑于郊胡至不識而恱之乃遺金一鎰妻曰妾夫遊官未返于兹三年未有衱辱如今日也不顧胡慙而退至家問妻何在母曰採桑于郊乃是向來挑者也夫妻俱慙遂赴沂水而死尸子曰韓雉見申羊於魯有龍飲於沂韓雉曰吾聞之岀見虎搏之見龍射之今弗射是不行吾聞也遂射之郡國志云小沂水今號爲長利圯上有橋即張良爲黄石公取履所濰水水經注曰濰水導源濰山許愼吕忛云濰水}
  - {type: variant, offset: 2894, length: 1, content: 初, krp: 婦採桑于郊胡至不識而恱之乃遺金一鎰妻曰妾夫遊官未返于兹三年未有衱辱如今日也不顧胡慙而退至家問妻何在母曰採桑于郊乃是向來挑者也夫妻俱慙遂赴沂水而死尸子曰韓雉見申羊於魯有龍飲於沂韓雉曰吾聞之岀見虎搏之見龍射之今弗射是不行吾聞也遂射之郡國志云小沂水今號爲長利圯上有橋即張良爲黄石公取履所濰水水經注曰濰水導源濰山許愼吕忛云濰水}
