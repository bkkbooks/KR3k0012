  - {type: variant, offset: 1040, length: 346, content: 深十仞而不受塵垢金鐵在中形見於外鎬水經注曰鎬水上承鎬池於昆明池北周武王之所都也故詩云考卜維王宅是鎬京維龜正之武王承之鎬水又北流與滮池合又北經清冷臺西逕慈石門注于渭鄭玄曰豐鎬之間水北流也澇說文曰澇水出扶風鄠北入渭山海經曰牛首之山澇水出焉西注於潏水多飛魚潏字林曰潏水出杜陵縣水經注曰漓水上承皇子陂水逕漸臺東入渭亦名沈水又名高都水漢王氏五侯大治池宅引高都水入長安城故百姓歌之曰五侯初起曲陽最怒決壞高都竟連五杜土山漸臺象西白虎是也伊水經曰伊水出南陽縣西荀渠山左傳僖中曰初平王東遷也辛有適伊川杜預注曰辛有周大夫也見被髮而祭於野者曰不及百年此其戎乎山海經曰獨蘇之山伊水出焉東流注於洛今伊水出上洛廬氏縣熊耳山東女至河南洛陽縣入洛戴延之西征記曰伊水上源經新城陸渾二縣男女無少長皆病癭俗云水土所致伊水不可飲也呂, SBCK: 遂失鼈吕}
  - {type: page-break, offset: 1040, content: '', id: KR3k0012_SBCK_063-3b}
  - {type: variant, offset: 1040, length: 345, content: 深十仞而不受塵垢金鐵在中形見於外鎬水經注曰鎬水上承鎬池於昆明池北周武王之所都也故詩云考卜維王宅是鎬京維龜正之武王承之鎬水又北流與滮池合又北經清冷臺西逕慈石門注于渭鄭玄曰豐鎬之間水北流也澇說文曰澇水出扶風鄠北入渭山海經曰牛首之山澇水出焉西注於潏水多飛魚潏字林曰潏水出杜陵縣水經注曰漓水上承皇子陂水逕漸臺東入渭亦名沈水又名高都水漢王氏五侯大治池宅引高都水入長安城故百姓歌之曰五侯初起曲陽最怒決壞高都竟連五杜土山漸臺象西白虎是也伊水經曰伊水出南陽縣西荀渠山左傳僖中曰初平王東遷也辛有適伊川杜預注曰辛有周大夫也見被髮而祭於野者曰不及百年此其戎乎山海經曰獨蘇之山伊水出焉東流注於洛今伊水出上洛廬氏縣熊耳山東女至河南洛陽縣入洛戴延之西征記曰伊水上源經新城陸渾二縣男女無少長皆病癭俗云水土所致伊水不可飲也, WYG: 遂失鼈}
