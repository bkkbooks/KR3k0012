  - {type: variant, offset: 2870, length: 1, content: 沔, WYG: 曰陶墟舜所陶處也井曰舜井皆為此也墟有漏澤方一十五里其西有阜俗謂之媯亭山蓋有陶墟舜井之言因復有媯亭之名矣阜則有二石穴廣圓三四尺穴有通否水有盈漏漏則數夕之中傾陂竭澤矣左右居民識其將漏豫以木障穴口魚鼈介鱗不可勝載矣自此連岡通阜西北四十里許岡之西際便得泗水之源也又張華博物志曰泗水陪尾蓋斯阜也石穴吐水五泉俱導泉穴各徑尺餘水源南側有一廟松栢成林時人謂之源泉祠非所䆒也又漢景帝三年有白頸烏與黒烏群鬬于呂縣白頸烏不勝墮泗水中死者數千洙}
