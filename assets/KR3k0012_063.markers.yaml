  - {type: variant, offset: 2906, length: 6, content: 重安而宜竹箭, SBCK: 入于時水傳曰有酒如澠太平御覽卷第六十三}
  - {type: variant, offset: 2906, length: 2, content: 重安, WYG: 出覆舟山蓋廣異名也史記曰韓信與楚將龍且夾濰水而陳韓信乃夜令為萬餘囊盛沙以遏濰水引軍擊且偽退且追北信決水水大至且軍半不得渡遂斬龍且汶水說文曰汶水出琅琊泰山朱虚東入濰又云出泰山萊蕪西南入濟從征記曰汶水出萊蕪縣之西南又言自萊蕪谷夾路連山數百里水黒多行石澗中出草藥松柏林葱鬰䝉翳崖壁相望或傾岑岨徑或廽巗絶谷有風鳴條山壑俱響陵髙降深兼惴慄之懼危溪險徑有懸束之艱未出谷十餘里有别谷在狐山下谷有清泉泉上數丈有石穴二口容人平行入穴丈餘髙九尺餘廣四五丈言是昔人居山之處薪爨烟黝猶存谷中林木緻宻行人鮮有能至者又有少許山田引灌之蹤尚存出谷有平丘面山傍水土人悉以種麥云此丘不宜殖稷與黍}
  - {type: page-break, offset: 2906, content: '', id: KR3k0012_WYG_063-14a, image: WYG0893/WYG0893-0522c.png}
