  - {type: variant, offset: 528, length: 0, content: '', SBCK: 布濩漫汗漭􅃞洋溢㹅激急趣箭馳風疾又曰滍水又東南逕昆陽縣故城昔漢光武與王㝷王邑戰于昆陽敗之走者相騰踐奔殪百餘里㑹大雨如注滍川盛溢虎豹皆股戰士卒爭赴溺死者以萬數水爲不流王邑嚴尤陳茂輕􅀐皆乗尸而渡澧水􅀃文曰澧水南陽雉衡}
