  - {type: variant, offset: 1437, length: 0, content: '', SBCK: 至丹水縣入于汋吕氏春秋曰尭有丹水之戰以服南蠻注曰水出丹魚先夏至十日夜伺之魚浮水側赤光上照如火網而取之割其血以塗足可以歩行水上長居淵中尚書逸篇曰堯子不肖舜使居丹淵爲諸侯故號曰丹朱六韜曰尭伐有扈戰於丹水之浦白水水經曰白水岀朝陽縣西東流過其縣南至新野縣東入于㳙東觀漢記曰光武皇考封南陽之白水郷莊子曰兩神女於白水之上禹過之而趍曰治天下奈何女曰股無肢脛不生毛手足胼胝何足以至司馬彪注言憂天下太甚灌水水經注曰灌水經蓼縣禇先生所謂神􅀛出於江灌之間是也潧水􅀃文曰潧水出鄭國水經注曰潧水出鄶城西北雞絡塢下東南流入洧潧字今作溱詩曰子惠思我褰裳渉溱子不我思豈無他人又曰溱與洧方渙渙􅀆士與女方秉簡􅀆溱洧鄭兩水名蘭簡孟子曰子産聽鄭國之政以其乗轝濟人於溱洧洧水􅀃文曰洧出潁川陽城山東南入潁水經云出宻縣馬嶺山注云洧別源也詩曰子惠思我褰裳渉洧子不我思豈無他士傳曰鄭大水龍􅃲于時門之外洧淵時門鄭城門也京水水經注曰京水發源京縣黄堆山東亦名祝東泉勢沸湧􅃺若鼎􅀭湯俗謂之京水也索水水經注曰索水出京縣西南嵩渚山與􅀜水同源分流即古旃然水也左傳謂楚伐鄭次旃然即此水名史記曰漢王敗於彭城韓信擊破楚兵於京索間以故項羽不能西濮水􅀃文曰濮水出東郡濮陽南入鉅野水經曰瓠子河東北過禀丘縣爲濮水史記曰􅀳平公令師㳙皷琴未終師曠止之曰亡國之音也平公曰是何道出荅曰此師延所作也與紂爲靡靡之樂武王伐紂師延東走自投濮水之中故聞此聲必於濮水之上先聞此聲者國削問果於濮上得之莊子曰釣於濮水楚王使大夫二人先焉曰願以境内爲累莊子持竿不顧也隕石水水經注曰睢陽有隕石水一名􅃮溝左傳云隕石於宋五隕星也故老云此水有時竭涸五石存焉故名隕水石墜處爲澤吕梁水述征記曰彭城吕縣有吕梁水則莊子所稱文夫也列子曰孔子􅀚吕梁懸水三十仞流沫三十里黿鼉魚鼈不能游之數百歩而出􅀍髪行歌莊子亦載豪水水經注曰豪水出隂陵縣之陽亭北小屈石穴北注于淮莊子曰莊子與惠子遊於壕梁水上汳水疋万切水經曰汳水岀隂溝至浚儀縣北入睢水注云隂溝即浪蕩渠也亦言汳受旃然水字今作汴又云丹沁亂流於武德絶河南入陽合故汳兼丹水之稱河泲水斷汳承旃然而東目王賁􅈅大梁水出縣南而不逕其北夏水洪泛則是瀆津通故渠即隂溝也於大梁北又曰浚水矣故陳留風俗傳云浚水逕其北者也睢水漢書曰項羽與漢王戰于靈壁東漢軍大敗睢水爲之不流又}
