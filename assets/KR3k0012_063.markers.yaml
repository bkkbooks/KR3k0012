  - {type: punctuation, offset: 2904, content: 「, id: KR3k0012_CHANT_063-bkkpn952}
  - {type: variant, offset: 2904, length: 0, content: '', SBCK: 濰出覆舟山盖廣異名也史記韓信與楚將龍且夾濰水而陳於此信夜令爲萬餘囊盛沙以遏濰水引軍擊且僞退且追北信決水水大至且軍半不得渡遂斬龍且汶水􅀃文曰汶水出琅邪㤗山朱虚東入濰又云出㤗山菜蕪西南入濟從征記曰汶水岀萊蕪縣西南流又言自入萊蕪谷夾路連山數百里水黒多行石澗中出草藥饒松栢林灌綿濛崖壁相望或傾岑岨徑或廻巖絶谷清風鳴條山壑俱響陵髙谷深兼惴慄之懼危溪險徑有懸束之艱未岀谷十餘里有別谷在􅀌山下谷有清泉泉上數丈有石穴二口容人平行入穴丈餘髙九尺餘廣四五丈言是昔人居山之處薪㸑烟黔猶存谷中林木緻宻行人尠有能至矣又有許山田引灌之蹤尚存出谷有平丘靣山傍水土人悉以種麥云此丘不冝殖稷􅁰而冝麥齊人相承以殖之詩曰汶水湯湯行人彭彭周禮考工記曰狢踰汶則死地氣然也論語雍也曰季氏使閔子騫爲費􅌠子騫曰善爲我辭焉如有復我者則吾必在汶上矣傳曰齊人歸我汶陽之田沐水水經云沐水出琅邪東莞縣西北山東南經東海厚丘縣梁天􅁥二年三月土人張髙等五百餘人相率開鑿此溪引水漑田二百餘頃俗名爲紅花水東流入泗州漣水界淄水水經曰淄水出㤗山萊蕪縣原山注云丗謂之原泉淮南子曰淄澠之水合易牙甞而知之淄澠齊二水也新序曰齊有田巴先生者行脩於内智明於外齊君聞其賢聘而問政焉田巴對曰政在正身正身之夲在於羣臣大王召臣臣改制前飾將造公門問於臣妾曰奚􅀂妾愛臣將出門問從者從者畏臣據臨淄水而觀影然後自知醜惡也今齊之臣妾諌王者非特二人王如臨淄水見巳之惡過而能敃斯齊國治矣澠水水經注曰澠水出營丘城東丗謂之}
