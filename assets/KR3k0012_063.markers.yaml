  - {type: variant, offset: 1796, length: 41, content: 昔黃帝之時天大霧三日帝遊洛水之上見大魚殺五牲以醮之天乃甚雨七日七夜魚流始得圖書魏略, krp: 地理志}
  - {type: variant, offset: 1800, length: 0, content: '', WYG: 間是也潧氷說文曰潧水出鄭國水經注曰潧水出鄫城西北鷄絡塢下東南流入于洧潧字今作溱詩曰子惠思我褰裳渉溱子不我思豈無他人又曰溱與洧方渙渙兮士與女方秉蕳兮孟子子産聽鄭國之政以其乘輿濟人於溱洧洧水說文曰洧水出潁川陽城山東南入潁水經云出宻縣馬嶺山注云洧别源也詩曰子惠思我褰裳渉洧子不我思豈無他士傳曰鄭大水龍鬬于}
