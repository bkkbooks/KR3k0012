  - {type: variant, offset: 524, length: 3, content: 鳥鼠同, SBCK: 于其隂北流注于榖丗謂之孝水也潘岳西征賦曰澡孝水以濯纓嘉美名之在兹槖水陜縣圖經曰槖水即魯水也西北入城百姓頼之呼爲利人渠是也又按唐史云武德元年陜東道行臺金部􅀰中長孫操自郡東又引水入城以代井汲百姓頼之與上渠俱利於民涑水十道志曰涑水亦名襄水荆楚之地水駕山而上者皆呼爲襄上也今土人呼爲涑水上流亦呼爲襄名即無定故陸澄地理記曰襄陽無襄水也又按襄􅃆記云中廬有涑水注于􅃆此水中有物如三四􅀊小兒􅂰頭如虎掌􅀲常没水中出􅂰頭示人小兒不知者欲弄之輙便啖人或人有生得者摘其鼻可小小使之名曰水虎菊花源荆州記曰菊花源傍悉生芳菊􅀍徑浸潭流其滋液水極芳馨谷中有三十餘家不穿井仰飲此水上壽二三百中壽百餘其七八十者猶不爲壽夫菊能輕身益氣令人乆壽於此有徴矣又後漢胡廣字伯始爲侍中乆患風羸南歸飲此水遂瘳焉滍水傳曰􅀳陽處父侵蔡楚子上救之與晉夾滍而軍水經曰滍水出南陽魯陽縣西之堯山張衡南都賦曰其川瀆則滍澧􅖐濜發源巖}
  - {type: page-break, offset: 524, content: '', id: KR3k0012_SBCK_063-2a}
  - {type: variant, offset: 524, length: 3, content: 鳥鼠同, WYG: 于其隈北流注于榖世謂之孝水也潘岳西征賦曰澡孝水以濯纓嘉美名之在兹槖水陜縣圖經曰槖水即魯水也西北入城百姓頼之呼為利人渠是也又按唐史云武徳元年陜東道行臺金部郎中長孫操自郡東又引水入城以代井汲百姓頼之與上渠俱利于民涑水十道志曰涑水亦名襄水荆楚之地水駕山而上者皆呼為襄上也今土人呼涑水上流亦為襄名既無定故陸澄地理志曰襄陽無襄水也又按襄沔記曰中廬有涑水注于沔此水中有物如三四嵗小兒膝頭如虎掌爪常沒水中出膝頭示人小兒不知者欲弄之輙欲啖人菊花水荆州記曰菊花源傍悉生芳菊被徑浸潭流其滋液水極芳馨谷中有三十餘家不穿井仰飲此水上夀二三百中夀百餘七八十者猶不為夀夫菊能輕身益氣令人久夀于此有徴矣又後漢胡廣字伯始為侍中久患風羸南歸飲此遂瘳焉滍水傳曰晋陽處父侵蔡楚子上救之與晋夾滍而軍張衡南都賦曰爾其川瀆則滍澧􅖐濜發源巖}
