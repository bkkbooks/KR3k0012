  - {type: variant, offset: 1985, length: 693, content: 記水會尚有故居處斯則澗水也即周書所謂我乃卜澗水東言是水也穀水經曰穀水出弘農澠池縣南嶓冢林穀陽谷也山海經曰愽山之西有林焉曰嶓冢穀水出焉東流注于洛其中多㻒玉今穀水出于崤東馬頭山穀陽谷東北流歷澠池川韋昭國語注曰洛水在城南穀水在王城北東入于瀍靈王時穀水盛出於王城西而南流合於洛兩水相格有似于鬥而毀王城西南也漢沔尚書禹貢曰江漢朝宗于海也詩曰漢廣德廣所及也文王之化被于南國美化行乎江漢之域又曰滔滔江漢南國之紀又曰南有喬木不可休息漢有游女不可求思左傳曰蔡昭侯為兩珮與兩裘以如楚獻一珮一裘於昭王子常欲之不與三年止之蔡侯歸及漢執玉而沉曰余所濟漢而南者有若大川又曰楚國方域以為城漢水以為池又曰吳師伐郢楚子常濟漢而陣自小別至于大別蜀志少府王謀等上言前襄陽男子張嘉王休獻玉璽璽潛漢水於深淵暉景燭曜璽光徹天孫巖宋書曰漢中城固縣漢水岸際有異聲如雷俄頃岸崩有銅鐘十二出自潛壤體制既精扣之清響韓詩曰鄭交甫過漢皋遇二女妖服珮兩珠交甫與之言曰願請子之珮二女解珮與交甫而懷之去十步探之則亡矣廻顧二女亦即亡矣水經注及山海經注云漢水出隴坻道縣嶓冢山初名漾水東流至武都沮縣始為漢水東南至葭萌與羗水合至江夏安陸縣名沔水故有漢沔水之名即周昭王溺於此處又東至竟陵合滄浪之水即屈原遇漁父處又東過三澨水觸大別山南而入江也庾仲雍漢水記曰漢水出廣漢漾水出隴西東流至武都而與漢水合沔水出武都沮縣爾與漢水相合又東為滄浪之水過三澨至于大別南入于江東匯澤為彭蠡東為北江入于海是也匯廻也音胡賄反言漢水合大江廻流入彭蠡澤東北至南徐州名為北江而入海又曰沔水東經萬山北山下有潭中有杜元凱碑元凱好尚後名作兩碑並述己功一碑立峴山一碑沉此潭中曰千載之後何知不深谷為陵, SBCK: 究}
