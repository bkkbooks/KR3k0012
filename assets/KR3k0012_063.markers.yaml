  - {type: variant, offset: 1801, length: 8, content: 天大霧三日帝遊洛, WYG: 門之外洧淵京水水經注曰京水發源京縣黄堆山東亦名祝東泉勢沸湧俗謂之京水也素水水經注曰索水出京縣西南崇渚與山關水同源分流即古旃然水也左傳謂楚伐鄭次旃然即此水也史記曰漢王敗于彭城韓信擊破水兵于京索間以故項羽不能西濮水說文曰濮水出東郡濮陽南入鉅海水經曰瓠子河東北過廩丘縣為濮水史記曰晋平公令師涓鼔琴未終師曠止之曰亡國之音也平公曰是何道出答曰此師延所作與紂為靡靡之樂武王伐紂師延東走自投濮水之中故聞此聲必于濮}
