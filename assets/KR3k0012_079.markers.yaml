  - {type: variant, offset: 31, length: 1, content: 木, krp: 金}
  - {type: variant, offset: 32, length: 0, content: '', WYG: 觀百靈之所登採若㦸之華飲丹巒之水西見中黄子受九品之方過崆峒從廣成子受自然之經北到洪隄上具茨見大隗君黄蓋童子授神芝圖還陟王屋得神丹注說到峨嵋山見皇人於玉堂又曰汲郡冢中竹書言黄帝既仙去其臣有左徹者削木為黄帝之像帥諸侯朝奉之故司空張茂先撰博物志亦云黄帝仙去其臣思戀罔極或刻木立像而朝之或取其衣冠而葬之或立廟而四時祠之孫綽子曰黄帝之遊天衢奏鈞天之鼔建日月之旗乗琱雲之輿駕六翼之龍彭祖前驅松喬俠轂光景流而不見長風逐而不及發軔紫宫不崇朝而匝六合也符子曰黄帝將適昆虞之丘中路逢容成子乗翠華之蓋建日月之旗驂紫虬御雙鳥黄帝命方明避路謂容成子曰吾將釣于一壑栖于一丘又曰黄帝謂其友無為子曰我勞天下矣疲於形役請息駕于𤣥圃子其代之無為子曰焉能棄我之逸而為君之勞哉乃攀龍而俱去晉牽秀黄帝頌曰邈矣軒轅應天載靈通幽逺覽觀象設形誕敷厥訓彞倫攸經德從風流化與雲征皇猷允塞地平天成爰登方岳封禪勒成紛然鳯舉龍騰太清違兹九土陟彼髙㝠民斯攸慕涕泗沾纓遐而不墜式頌德聲帝王世紀曰有巢氏以降至黄帝為三皇號中古少昊金天氏帝王世紀曰少昊帝名摯字青陽姬姓也母曰女節黄帝時有大星如虹下流華渚女節夢接意感生少昊是為𤣥囂降居江水有聖德邑于窮桑以登帝位都曲阜故或謂之窮桑帝以金承土帝圖䜟所謂白帝朱宣者也故稱少昊號金天氏在位百年而崩河圖曰大星如虹下流華渚女節氣感生白帝朱宣宋均注云朱宣少昊氏也古史考曰窮桑氏嬴姓也以金}
