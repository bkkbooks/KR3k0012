  - {type: 'tls:seg', offset: 30, content: '', id: KR3k0012_CHANT_079-1a.8}
  - {type: variant, offset: 31, length: 1, content: 木, SBCK: 金}
  - {type: variant, offset: 31, length: 0, content: '', WYG: 理日月星辰之道治隂陽之氣節四時之度正律厯之數明上下等貴賤使强不得掩弱衆不得暴寡人民保命不夭能安性命不夭折也嵗時熟而不凶百官正而不私上下調而無尤法令明而不闇輔佐公而不阿卿士公正不阿意曲從田者不侵畔漁者不争隈隈曲深處魚所聚也道不拾遺市不預價城郭不閉邑無盜賊商旅之人相讓以財狗彘吐菽粟於道路而無忿爭之心於是日月精明星辰不失其道風雨時節五榖登熟虎豹不妄噬鷙鳥不妄搏鳯凰翔於庭麒麟遊於郊青龍進駕飛黄伏皂飛黄出西方其狀如狐頂上有角乗之壽千嵗皂􅇫也諸北儋耳之國莫不獻其貢職論衡曰諡法靖民則法曰皇德象天地曰帝皇帝者安民之諡非得道之稱也蔣子萬機論曰黄帝之初養性愛民不好戰伐而四帝各以方色稱號交共謀之邊城日驚介胄不釋黄帝歎曰夫君危于上民安于下主失於國其臣再嫁厥疾之由非養冦耶今處民萌之上而四盜亢衡遞震予師於是遂師營壘以滅四帝向令黄帝若不龍驤虎變而與俗同道則其民臣嫁于四帝矣抱朴子曰黄帝生而能言役使百靈可謂天授自然之體者猶復不敢端坐而得道故渉王屋而受丹經到鼎湖而飛流珠至崆峒而問廣成上具茨而事大隗適東岱而奉中黄入金谷而諮老子論道養則質𤣥素二女精推步則訪山稽力牧講占候則詢風后著述作則受雷岐審攻戰則納五音之䇿窮神姦則記四澤之亂相地理則書青鳥之說救傷殘則綴金冶之術故能畢記秘要窮盡道真又曰昔黄帝東到青丘過風山見紫府先受三皇内文以勑召萬神南到負隴䕃連}
