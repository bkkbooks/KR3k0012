  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_079-1a.2}
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 戰而克之力牧常先大鴻神農皇直封鉅人鎮大山稽􅀑􅁷區封胡孔甲等或以爲師或以爲將分掌四方各如巳視故號曰黄帝四目又使歧伯嘗味百草典醫療疾今經方夲草之書咸出焉其史倉頡又取像鳥跡始作文字史官之作蓋自此始記其言行䇿而藏之名曰書契黄帝一號帝鴻氏或曰歸藏氏或曰帝軒吹律定姓有四妃生二十五子在位百年而崩年百一十歳又曰神農氏衰黄帝脩德化民諸侯歸之黄帝於是乃擾馴猛獸與神農氏戰于阪泉之野三戰而克之又徴諸侯使力牧神皇直討􅃖尤氏擒之于􅃰鹿之野使應龍殺之于凶黎之丘凢五十五戰而}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_079-2b}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 戰而克之力牧常先大鴻神農皇鉅封直人鎮火山稽鬼臾區封胡孝甲等或以為師或以為將分掌四方各如已視故號曰黄帝四佐又使岐伯嘗味百草典醫療疾今經方本草之書咸出焉其史倉頡又取像鳥跡始作文字史官之作蓋自此始記其言行䇿而藏之名曰書契黄帝一號帝鴻氏或曰歸藏氏或曰帝軒氏姬姓有四妃生二十五子在位百年而崩年百一十嵗又曰神農氏衰黄帝修德化民諸侯歸之黄帝於是乃擾馴猛獸與神農氏戰于阪泉之野三戰而克之又徵諸侯使力牧神皇直討蚩尤氏擒之于涿鹿之野使應龍殺之于凶黎之丘凡五十五戰而}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_079-3a, image: WYG0893/WYG0893-0626a.png}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_079-3b, image: WYG0893/WYG0893-0626b.png}
  - {type: variant, offset: 4, length: 0, content: '', krp: 戰而克之力牧常先大鴻神農皇直封鉅人鎮大山稽鬼臾區封胡孔甲等或以爲師或以爲將分掌四方各如巳視故號曰黄帝四目又使歧伯嘗味百草典醫療疾今經方夲草之書咸出焉其史倉頡又取像鳥跡始作文字史官之作蓋自此始記其言行䇿而藏之名曰書契黄帝一號帝鴻氏或曰歸藏氏或曰帝軒吹律定姓有四妃生二十五子在位百年而崩年百一十歳又曰神農氏衰黄帝脩德化民諸侯歸之黄帝於是乃擾馴猛獸與神農氏戰于阪泉之野三戰而克之又徴諸侯使力牧神皇直討蚩尤氏擒之于涿鹿之野使應龍殺之于凶黎之丘凢五十五戰而}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 下大服或傳以至仙或言壽三百歳塟于上郡陽周之喬山鬻子曰黄帝年十歳知神農之非而改其政春秋内事曰軒轅氏以􅁟德王天下始有堂室髙棟􅀷宇以避風􅀨孝經鈎命决曰附寳出降大靈生帝軒附寳帝軒母也電黄精軒轅氣也軒黄帝名附或作付也古史考曰有熊氏巳姓或曰姓公孫山海經曰有人衣青名曰黄帝女妖青魅旱魃也􅃖尤作兵伐黄帝黄帝乃令應龍攻之兾州之野兾州中土應龍蓄水􅃖􅀹請風伯􅀨師從大風􅀨黄帝乃下天女曰妖􅀨止遂殺􅃖􅀹歸藏曰昔黄神與炎神爭􅋐􅃰鹿之野將戰筮於巫咸巫咸曰果哉而有咎易下繫曰黃帝垂衣裳而天下治蓋取諸乾坤河圖握拒曰黃帝名軒北斗黃神之精母地祇之女附寶之郊野大電繞斗樞星耀感附寳生軒胷文曰黃帝子河圖挺佐輔曰黃帝修德立義天下大治乃召天老而問焉余夣見兩龍挺日圖即帝以授余於河之都􅁴昧素喜不知其理敢問於子天老曰河出龍圖雒出􅀛書紀帝録州聖人所紀姓號興謀治平然後鳯}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_079-3a}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 下大服或傳以為仙或言壽三百嵗葬于上郡陽周之喬山鬻子曰黄帝年十嵗知神農之非而改其政春秋内事曰軒轅氏以土德王天下始有堂室髙棟深宇以避風雨孝經鈎命訣曰附寶出降大靈生帝軒附寶帝軒母也電黄精軒轅氣也軒}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_079-4a, image: WYG0893/WYG0893-0626c.png}
  - {type: variant, offset: 5, length: 0, content: '', krp: 下大服或傳以至仙或言壽三百歳塟于上郡陽周之喬山鬻子曰黄帝年十歳知神農之非而改其政春秋内事曰軒轅氏以土德王天下始有堂室髙棟深宇以避風雨孝經鈎命决曰附寳出降大靈生帝軒附寳帝軒母也電黄精軒轅氣也軒黄帝名附或作付也古史考曰有熊氏巳姓或曰姓公孫山海經曰有人衣青名曰黄帝女妖青魅旱魃也蚩尤作兵伐黄帝黄帝乃令應龍攻之兾州之野兾州中土應龍蓄水蚩尤請風伯雨師從大風雨黄帝乃下天女曰妖雨止遂殺蚩尤歸藏曰昔黄神與炎神爭鬪涿鹿之野將戰筮於巫咸巫咸曰果哉而有咎易下繫曰黃帝垂衣裳而天下治蓋取諸乾坤河圖握拒曰黃帝名軒北斗黃神之精母地祇之女附寶之郊野大電繞斗樞星耀感附寳生軒胷文曰黃帝子河圖挺佐輔曰黃帝修德立義天下大治乃召天老而問焉余夣見兩龍挺日圖即帝以授余於河之都覺昧素喜不知其理敢問於子天老曰河出龍圖雒出龜書紀帝録州聖人所紀姓號興謀治平然後鳯}
