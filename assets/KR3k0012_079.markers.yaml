  - {type: variant, offset: 1493, length: 247, content: 曰角有骨表取象日所出房所立有星也衡中有骨表而連珠象王衡有星也又曰鈞命決曰華胥履跡怪生皇犧跡靈威仰之跡也履跡而生以為奇怪也遁甲開山圖曰仇夷山四絕孤立太昊之治伏犧生處帝系譜曰伏犧人頭虵身以十月四日人定時生崔寔政論曰太昊之世設九庖之官魏陳王曹植庖犧贊曰木德風姓八卦創焉龍瑞名官法地象天庖廚祭祀罟網漁畋瑟以像時神德通玄女媧氏帝王世紀曰女媧氏亦風姓也承庖犧制度亦虵身人首一號女希是為女皇未有諸侯有共工氏任智刑以強伯而不王以水承木非行次故易不載歸藏曰昔女媧筮張雲幕枚占之曰吉昭昭九州日月代極平均土地和合四國, SBCK: ''}
