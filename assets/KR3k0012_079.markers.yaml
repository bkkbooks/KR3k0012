  - {type: variant, offset: 14, length: 0, content: '', SBCK: 理則書青烏之􅀃救傷殘則綴金冶之術故能畢記祕要窮盡道眞又曰昔黃帝東到青丘過風山見紫府先生受三皇内文以劾召萬神南到􅀒隴䕃建木觀百靈之所登採􅀂㦸之華飲丹巒之水西見中黃子受九品之方過崆峒從廣成子受自然之經北到洪隄上具茨見大隗君黃蓋童子授神芝圖還陟王君居得神丹注􅀃到峨嵋山見皇人於玉堂又曰汲郡􅊘中竹書言黃帝旣仙去其臣有左徹者削木爲黃帝之像帥諸侯朝奉之故司空張茂先撰博物志亦云黃帝仙去其臣思戀罔極或刻木}
  - {type: page-break, offset: 14, content: '', id: KR3k0012_SBCK_079-7b}
  - {type: variant, offset: 14, length: 1, content: 立, WYG: 體通五行期化體美也天地美氣相通行應四時之期而變化河龍圖出龍銜圖而出也洛龜書成龜負書而出成則也赤文像字以授軒轅韓詩外傳曰黄帝召天老而問鳯像何如天老曰夫鳯像鴻前而麟後蛇頭而魚尾龍文而鷄身燕頷而鷄啄黄帝乃齋于中宫鳯蔽日而至黄帝降于東階西面再拜稽首皇天降祉敢不承命鳯乃止帝東園詩含神霧曰大電繞樞照郊野感附寶生黄帝大戴禮曰宰我問於孔子曰昔者予問諸榮君黄帝三百年請問黄帝人也抑非人耶何以至於三百年孔子曰黄帝少典之子也曰軒轅生而神靈弱而能言教熊羆貔貅豹虎以與赤帝大戰于阪泉之野三戰然後得行其志黄帝黼黻衣大帶斧裳乗龍駕雲勞懃心力耳目節用水火財物生而民得其利百年死而民得其神百年亡而民得其教百年故曰三百年傳曰黄帝以雲紀故為雲師而雲名春秋元命苞曰黄帝龍顔得天庭陽上法中宿取象文昌戴天履隂秉數制剛管子曰黄帝得蚩尤而明乎天道得太常而察乎地利得蒼龍而辨乎東方得祝融而辨乎南方得大封而辨乎西方得后土而辨乎北方黄帝得六相而天下治又曰黄帝鑚燧生火以熟葷臊民食之無腸胃之病列子曰黄帝即位十}
