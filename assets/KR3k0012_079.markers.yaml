  - {type: variant, offset: 6, length: 5, content: 項峻始學篇, SBCK: 處之今鳯皇以下三百六十日矣合之圖紀天其授帝圖乎黃帝乃祓齋七日衣黄衣黄冠黃冕駕黃龍之乗戴蛟龍之旗天老五聖皆從以逰河洛之間求所夣見者之處弗得至於翠嬀之淵大盧魚泝流而至乃問天老曰子見天中河流者乎曰見之頋問五聖皆曰莫見乃辭左右獨與天老跪而迎之五色畢具天老以授黃帝帝舒視之名曰録圖龍魚河圖曰黃龍附圖鱗甲成字從河中出付黃帝令侍臣自冩以示天下又曰黄帝攝政前有􅃖􅀹兄弟八十一人並獸身人語銅頭鐵額食沙石子造立兵杖刀㦸大弩威振天下誅殺無道不仁不慈万民欲令黃帝行天子事黃帝仁義不能禁止􅃖􅀹遂不敵乃仰天而歎天遣玄女下授黃帝兵信神符制伏􅃖􅀹以制八方􅃖尤没後天下復擾亂不寜黃帝遂􅀞􅃖􅀹形象以威天下天下咸謂􅃖􅀹不死八方万􅀖皆爲殄伏尚書中候曰帝軒提像配永循機軒軒轅黃帝名永長也循順也黃帝軒轅觀攝提之像配而行之以長爲順升機爲政天地休通五行期化休美也天地美氣相通行應四時之期而變化河龍圖出龍衘圖而出也洛􅀛書威􅀛􅀒書而出威則也赤文像字以授軒轅韓詩外傳曰黃帝召天老而問鳯像何如天老曰夫鳯像鴻前而麟後虵頸而魚尾龍文而鷄身鷰頷而鷄喙黃帝乃齋于中宫鳯蔽日而至黃帝降于東階西面再拜稽首皇天降祉敢不承命鳯乃止帝東園詩含神霧曰大電繞樞炤郊野感附寳生黃帝大戴禮曰宰我問於孔子曰昔者子問諸榮君黃帝三百年請問黃帝者人也抑非人耶何以至於三百年孔子曰黃帝少典之子也曰軒轅生而神靈弱而能言教熊羆􅆛貅豹虎以與赤帝大戰于阪泉之野三戰然後得行其志黃帝斧拂衣大帶斧裳乗龍駕雲勞懃心力耳目節用水火財物生而民得其利百年死而民得其神百年亡而民用其教百年故曰三百年傳曰黃帝以雲紀故爲雲師而雲名春秋元命苞曰黃帝龍顔得天庭陽上法中􅀫取象文昌戴天履隂秉數制剛顔有龍像以軒轅也庭陽太微庭也戴天天文在首履陰隂字在足下也制剛紀也紀正四輔也管子曰黃帝得􅃖尤而明乎天道得太常而察乎地利得蒼龍而辨乎東方得祝融而辨乎南方得大卦而辯乎西方得后土而辯乎北方黃帝得六相天下治又曰黃帝鑚燧生火以熟葷臊民食之無膓胃之病列子曰黃帝即位十有五年竭聦明進智力營百姓燋然肌色皯古厚切黣音妹昏然五情爽惑用聦明未足以致治祗足以乱神也黃帝乃喟然歎曰朕之過􅁋矣􅁋當作深養一巳其患如此治萬物其患如此唯任而不養縱而不治則性命自反天下自安於是放萬機舎宫􅃦去直侍撤鐘懸减厨膳退而閑居大庭之舘齋心服形心無欲則形自服矣三月不親政事晝􅃦而夣將明至理不可以淸求故􅀉之於夢聖人無夢也逰於華胥氏國華胥氏國在弇州之西台州之北不必便有此國也明至理必如此耳淮南子云正西曰弇州西北曰合州不知斯齊國幾千萬里斯離也齊中也蓋非舟車足力之所及神逰而已舟車足力形之貟者耳神道恍惚不行而至也其國無師長其民無嗜慾不知樂生不知惡死故無夭傷不知親已不知踈物故無憎愛不知背逆不知向順故無利害理無生死故無所樂􅁖理無愛憎故無所親疎理無逆順故無所利害也都無所愛憎都無所畏忌入水不溺入火不􅀬斫撻無傷痛至和者無物能傷溺􅀬痛癢實由矜懼也乗空如履實寢虚􅀂處床雲霧不閡其視雷霆不亂其聽羙􅁖不汨其心山谷不躓其歩神行而已黃帝旣悟然自得又二十有八年天下大治幾􅀂華胥氏之國而帝登假假當爲遐莊子曰北門成問於黃帝張咸池之樂於洞庭之野吾所聞之而懼復聞之而惑帝曰吾奏之以人徴之以天行之以義禮建之以太清以人奏之以天徴之天人合折乃知以春爲禮以秋爲義太清乃又曰黃帝將見大隗于具茨之山方明爲御昌寓􅆖乗張􅀂隰明前馬昆閽滑稽後車至於襄城之野七聖皆迷無所問途􅃴遇牧馬童子問途焉曰􅀂知具茨之山乎曰然黃帝曰異哉小童非徒知具茨之山又知大隗之所存乎曰然黄帝曰吾子之事雖然請問爲天下小童辭黄帝又問小童}
