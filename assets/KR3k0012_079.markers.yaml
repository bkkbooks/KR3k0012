  - {type: variant, offset: 1832, length: 315, content: 州裂天不兼覆地不周載火濫焱而不滅水浩溔而不息猛獸食精民高誘注曰精善也鷙鳥攫老弱於是女媧鍊五色石以補蒼天女媧陰事佐伏犧治者也斷鼇足以立四極黑龍水精也故力牧大山稽殺之以止雨也濟猶乾也冀州九州中謂合四海之內積蘆灰以止淫水蘆葦也葦生於水故積聚其灰以止於淫水平地出水為淫水民生皆方州抱周天方州地也和春陽夏殺秋約冬枕方寢繩方矩四寸也寢繩直身而臥也風俗通曰俗說天地開闢未有人民女媧摶黃土作人劇務力不暇供乃引繩於絙泥中舉以為人故富貴者黃土人也貧賤凡庸者絙人也遁甲開山圖曰女媧氏沒大庭氏王有天下五鳳異色次有柏皇氏中央氏栗陸氏驪連氏赫胥氏尊盧氏祝融氏混沌氏昊英氏有巢氏葛天氏陰康氏朱襄氏無懷氏凡十五代皆襲庖犧之號自無懷氏已上經史不載莫知都之所在共工氏, SBCK: 黎}
