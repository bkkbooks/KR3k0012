  - {type: variant, offset: 2618, length: 783, content: 十萬里南北八十一萬里所為如此其教如神農殖樹木使民粒食故天下號曰皇神農也甄紀地形遠近山川林澤所至孝經鉤命決曰任巳感龍生帝魁任巳帝魁之母也魁神農名巳或作似也典略曰武王滅紂封神農之後於譙文子曰赤帝為火災故黃帝禽之越絕書曰神農不貪天下而天下共富之不以其智自貴於人而天下共尊之莊子曰妸荷甘與神農同學於老龍吉神農隱机闔戶晝暝妸荷甘日中奓戶而入曰老龍死矣神農隱几擁杖而起嚗然入仗而笑曰天知予僻陋慢誕故棄予也而死已悟死不足驚故還放杖笑尸子曰神農氏夫負妻戴以治天下堯曰朕之比神農猶旦之與昏也又曰神農氏七十世有天下豈每世賢哉牧民易也淮南子曰古者民茹草飲水採樹木之實食蠃蚌之肉時多疹病毒傷之害於是神農乃始教民播種五穀相土地之宜燥濕肥墝高下嘗百草之滋味泉水之甘苦令民知所避就當此之時一日而七十毒又曰神農之治天下也神農馳於國中知不出於四域懷其仁誠之心甘雨以時五穀蕃殖春生夏長秋收冬藏月省時考終歲獻貢以時嘗穀祀于明堂之制有善而無惡風雨不能襲燥濕不能傷養民以公其民樸重端愨不忿爭而財足不勞形而成功因天地之貢資而與之和同是故威厲而不試刑措而不用法省而不煩教化如神其地南至交阯北至幽都東至陽谷西至三危莫不聽從當此之時法寬刑緩囹圄空虛而天下壹俗莫懷姦心又曰神農皇帝襲九空重九望九空九天也九望九地也神農本草曰神農稽首再拜問於太一小子曰曾聞古之時壽過百歲而殂落之咎獨何氣使然耶太一小子曰天有九門中道最良神農乃從其嘗藥以拯救人命周書曰神農之時天雨粟神農耕而種之作陶冶斤斧為耒耜鉏耨以懇草莽然後五穀興呂氏春秋曰神農教曰士有當年不耕者則天下或受其飢矣女有當年不績者則天下或受其寒矣故夫親耕妻親績賈誼書曰神農以為走禽難以久養民乃求可食之物嘗百草實察鹹苦之味教民食穀陸景典略曰神農嘗百草嘗五穀蒸民乃粒食荊州圖記曰永陽縣西北二百三十里厲鄉山東有石穴昔神農生於厲鄉禮所謂烈山氏也後春秋時為厲國穴高三十丈長二百丈謂之神農穴, SBCK: ''}
