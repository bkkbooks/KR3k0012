  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 四黃帝軒轅氏少昊金天民顓頊髙陽氏黄帝軒轅氏史記曰黃帝者少典之子姓公孫名軒轅諸侯有不順者從而征之未甞寜居東至于海登丸山及岱宗西至崆峒登雞頭山南至江登熊湘北極葷粥合符釡山而邑于􅃰鹿之阿遷徙無常處以師兵爲營衛官名皆以雲置左右大監監于萬國獲寳鼎舉風后力牧常先大鴻以治民有􅁟德之瑞故號曰黃帝有二十五子其得姓者十四人黄帝居軒轅之丘而娶於西陵氏之女是爲嫘音縲祖爲正妃生二子其後皆有天下其一曰􅀇囂是爲青陽降居江水其二曰昌意降居弱水昌意娶蜀山氏女曰昌㒒生髙陽髙陽有聖德焉黄帝崩葬橋山其孫昌意之子髙陽立是爲帝顓頊又封禪書曰黃帝採首山銅鑄鼎於荆山下鼎旣成有龍垂胡髯下迎黃帝黃帝上􅀐龍羣臣後宫從上者七十餘人餘小臣不得上乃悉持龍髯龍髯拔墮墮帝之弓百姓仰望帝旣上乃抱其弓與龍髯而號故後丗因名其處曰鼎湖其弓曰烏號又曰漢武帝北廵狩還􅀕黄帝冢上曰吾聞黄帝不死今有冢何也或對曰黄帝巳僊上天羣臣塟其衣冠耳帝王丗紀曰黄帝有熊氏少典之子􅁎姓也母曰附寳其先即炎帝母家有蟜氏之女丗與少典氏婚故國語兼稱焉及神農氏之末少典氏又取附寳見大電光繞北斗樞星照郊野感附寳孕二十五月生黄帝於壽丘長于􅁎水龍顔有聖德受國於有熊居軒轅之丘故因以爲名又以爲號與神農氏戰于阪泉之野}
