  - {type: variant, offset: 15, length: 0, content: '', SBCK: 像而朝之或取其衣冠而塟之或立廟而四時祠之孫綽子曰黃帝之逰天衢奏鈞天之鼔建日月旗乗琱雲之輿駕八翼之龍彭祖前駈松喬挾轂先景流而不返長風逐而不及發軔紫宫不崇朝而匝六合也符子曰黃帝將􅃴昆虞之丘中路逢容成子乗翠華之蓋建日月之旗􅆖紫虬御􅀟鳥黃帝命方明避路謂容成子曰吾將釣于一壑栖于一丘又曰黃帝謂其友無爲子曰我勞天下矣疲於形役請息駕於玄圃子且代之焉能弃我之逸而爲君之勞哉乃攀龍而俱去晉牽秀黄帝頌曰邈矣軒轅應天載靈通幽逺覽觀象設形誕敷厥訓彛倫攸經德從風流化與雲征皇猷允塞地平天成爰登方岳封禪勒成紛然鳯舉龍騰太清違落九􅁟陟彼髙􅄀民斯攸慕涕泗沽纓遐而不墜式頌德聲}
