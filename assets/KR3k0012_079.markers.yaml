  - {type: variant, offset: 27, length: 0, content: '', WYG: 物其患如此惟任而不養縱而不治則性命自全天下自安於是放萬機舎宫寢去直侍徹鍾懸减厨膳退而閒居大庭之館齋心服形三月不親政事晝寢而夢遊於華胥氏國華胥氏國在弇州之西台州之北不知斯齊國幾千萬里斯離也齊中也蓋非舟車足力之所及神遊而已其國無師長其民無嗜慾不知樂生不知惡死故無夭傷不知親己不知疎物故無憎愛不知背逆不知向順故無利害都無所愛憎都無所畏忌入水不溺入火不熱斫撻無傷痛至和者無物能傷溺熱痛癢寳由矜恤也乗空如履實寢虚若處牀雲霧不閡其視雷霆不亂其聽美惡不汩其心山谷不躓其步神行而已黄帝既悟怡然自得又二十有}
  - {type: page-break, offset: 27, content: '', id: KR3k0012_WYG_079-8a, image: WYG0893/WYG0893-0628c.png}
  - {type: variant, offset: 28, length: 0, content: '', WYG: 年天下大治幾若華胥氏之國而帝登假假當為遐莊子曰北門成問於黄帝張咸池之樂於洞庭之野吾始聞之而懼復聞之而惑帝曰吾奏之以人徴之以天行之以義禮建之以太清又曰黄帝將見大隗于具茨之山方明為御昌寓驂乗張若隰朋前馬昆閽滑稽後車至於襄城之野七聖皆迷無所問途適遇牧馬童子問途焉曰若知具茨之山乎曰然若知大隗之所存乎曰然黄帝曰異哉小童非徒知具茨之山又知大隗之所存請問為天下小童辭黄帝又問小童曰夫為天下者亦奚以異乎牧馬者哉亦去其害馬者而已矣馬以過分為害黄帝再拜稽首稱天師而退又曰黄帝聞廣成子在於崆峒之上故往見之曰敢問至道之精廣成子曰自而治天下雲氣不待簇而雨草木不待黄而落日月之光益以荒矣又奚足以語至道黄帝退捐天下築特室席白茅閒居三月復往邀之廣成子南首而卧黄帝從下風膝行而進再拜稽首而問曰聞吾子達於至道敢問治身奈何而可以長久廣成子蹷然而起曰善哉問乎來吾語汝至道之精窈窈㝠㝠至道之極昏昏黙黙無視無聽抱神以静形將自正我修身}
  - {type: page-break, offset: 28, content: '', id: KR3k0012_WYG_079-8b, image: WYG0893/WYG0893-0628d.png}
