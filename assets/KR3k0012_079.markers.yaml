  - {type: variant, offset: 188, length: 362, content: 天皇兄弟十二人身貌相類不可分別治在柱州崑崙山也地皇項峻始學篇曰地皇十二頭治萬八千歲洞紀曰地皇十二頭帝系譜曰地皇治一萬八千歲以火德王三五曆紀曰有神聖人十二頭號地皇遁甲開山圖曰地皇興於熊耳龍門山榮氏注曰地皇兄弟十人面貌皆如女子貌皆相類虵身獸足生於龍門山中人皇春秋命曆序曰人皇氏九頭駕六羽乘雲車出谷口分九州宋均注曰九頭兄弟九人項峻始學篇曰人皇九頭兄弟各三分人各百歲依山川土地之勢財度為九州各居其一乃因是而區別遁甲開山圖曰人皇起於形馬榮氏注曰人皇兄弟九人生於形馬山身有九也三五曆紀曰有神聖人九頭號人皇馬揔云一百六十五代合四万五千六百年天皇地皇人皇為太古有巢氏禮曰昔先王未有宮室冬則居營窟夏則居橧巢鄭玄注曰冬則居土暑則聚薪柴居其上也項峻始學篇曰上古皆穴處有聖人教之巢居號大巢氏今南方人巢居北方人穴處古之遺俗也皇甫謚以為有巢在女媧之後韓, SBCK: 郯}
  - {type: variant, offset: 188, length: 13, content: 天皇兄弟十二人身貌相類不可, WYG: 吾祖也我髙祖少昊摯之立也鳯鳥適至故紀於鳥為鳥師而鳥名鳯鳥氏厯正也𤣥鳥氏司}
