  - {type: variant, offset: 17, length: 4, content: 皇十二頭, SBCK: 氏帝王世紀曰少昊帝名摯字青陽􅁎姓也母曰女節黃帝時有大星如虹下流華渚女節夣接意感生少昊是爲玄囂降居江水有聖德邑于窮桑以登帝位都曲阜故或謂之窮桑帝以金承􅁟帝圖䜟所謂白帝朱宣者也故稱少昊}
