  - {type: variant, offset: 56, length: 111, content: 溟涬始牙濛鴻滋萌歲起攝提元氣肇啟有神靈人十三號曰天皇洞紀曰古人質以頭為數猶今數鳥獸以頭計也若云十頭鹿非十頭也春秋緯曰天皇地皇人皇兄弟九人分為九州長天下也河圖括地象曰天皇九翼題名旋復帝系譜曰天地初起即生天皇治萬八千歲以木德王, SBCK: 少昊}
