  - {type: variant, offset: 822, length: 27, content: 造作鑽燧出火教人熟食鑄金作刃民人大悅號曰燧人禮曰昔者先, SBCK: 帝}
  - {type: variant, offset: 822, length: 829, content: 造作鑽燧出火教人熟食鑄金作刃民人大悅號曰燧人禮曰昔者先王未有火化食腥也食草木之實鳥獸之肉飲其血茹其毛此上古之時也後聖人有作作起然後脩火之利範金鉢作器用合土瓦瓴甕及大以炮以燔以烹以炙以為醴酪王子年拾遺錄曰遂明國有大樹名燧屈盤万頃後世有聖人遊日月之外至於其國息此樹下有鳥啄樹粲然火出聖人感焉因用小枝鑽火號燧人氏太昊庖犧氏皇王世紀曰太昊帝庖犧氏風姓也虵身人首有聖德都陳作瑟三十六絃燧人氏沒庖犧氏代之繼天而生首德於木為百王先帝出於震未有所因故位在東方主春象日之明是稱太昊制嫁娶之禮取犧牲以充庖廚故號曰庖犧皇後世音謬故或謂之密犧一解云宓古伏字後設以宓為密故號曰密犧一號雄皇氏在位一百一十年易下繫曰古者庖犧氏之王天下仰則觀象於天俯則觀法於地中觀鳥獸之文與天地之宜近取諸身遠取諸物於是始作八卦以通神明之德以類萬物之情結繩而為網罟以畋以漁蓋取諸离河圖曰伏犧禪於伯牛鑽木作火易坤靈圖曰宓犧時立元部民易理易通卦驗曰宓犧方牙蒼精作易無書以畫事鄭玄曰密犧時質樸作易以為政令而不書但以畫其事之形象而已詩含神霧曰大跡出雷澤華胥履之生伏犧宋均注曰雷澤二名華胥伏犧母禮含文嘉曰伏者別也犧者獻也法也伏犧德洽上下天應之以鳥獸文章地應之以龜書伏犧乃則象作易卦傳曰郯子曰太皞氏以龍紀故為龍師而龍名杜預注曰太皞伏犧氏風姓祖也有龍瑞故以龍令官春秋內事曰伏犧氏以木德王天下天下之人未有室宅未有水火之和於是乃仰觀天文俯察地理始畫八卦定天地之位分陰陽之數推列三光建分八節以爻應氣凡二十四氣消息禍福以制吉凶又曰天地開闢五緯各在其方至伏犧乃合故以為元孝經援神契曰伏犧氏曰角衡連珠宋均曰伏犧木精人也曰角有骨表取象日所出房所立有星也衡中有骨表而連珠象王衡有星也又曰鈞命決曰華胥履跡怪生皇犧跡靈威仰之跡也履跡而生以為奇怪也遁甲開山圖曰仇夷山四絕孤立太昊之治伏犧生處帝系譜曰伏犧人頭虵身以十月四日人定時生崔寔政論曰太昊之世設九庖之官魏陳王曹植庖犧贊曰木德風姓八卦創焉龍瑞名官法地象天庖廚祭祀罟網漁畋瑟以像時神德通玄女媧氏, WYG: ''}
