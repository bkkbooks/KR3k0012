  - {type: variant, offset: 2256, length: 361, content: 何德之靈炎帝神農氏帝王世紀曰神農氏姜姓也母曰任姒有喬氏之女名登為少典妃遊於華陽有神龍首感女登於常羊炎帝人身牛首長於姜水有聖德以火承木位在南方主夏故謂之炎帝都於陳作五絃之琴凡八世帝承帝臨帝明帝直帝來帝哀帝揄岡又曰本起烈山或時稱之一號魁隗氏是為農皇或曰帝炎諸侯夙沙氏叛不用命炎帝退而修德夙沙之民自攻其君而歸炎帝營都于魯重八封之數究八八之體為六十四卦在位百二十年而崩崩葬長沙易下繫曰神農氏作斷木為耜楺木為耒耒耜之利以教天下蓋取諸益禮含文嘉曰神者信也農者濃也始作耒耜教民耕其德濃厚若神故為神農也古史考曰炎帝以火應故置官師皆以火為名傳曰郯子曰炎帝以火紀故為火師而火名杜預注曰神農姜姓之祖也有火瑞以火紀事名官也春秋命曆序曰有神人名石耳倉色大眉戴玉理日月清明有次序故神應和氣以生也玉理猶玉英玉勝也駕六龍出地輔號皇神農始立地形甄度四海東西, SBCK: ''}
