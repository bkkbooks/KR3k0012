  - {type: variant, offset: 12, length: 0, content: '', WYG: 有熊氏已姓或曰姓公孫山海經曰有人衣青名曰黄帝女妖青魅旱鬼也蚩尤作兵伐黄帝黄帝乃令應龍攻之冀州之野冀州中土應龍蓄水蚩尤請風伯雨師從大風雨黄帝乃下天女曰妖雨止遂殺蚩尤歸藏曰昔黄帝與炎神爭鬭涿鹿之野將戰筮於巫巫咸曰果哉而有咎易下繫曰黄帝垂衣裳而天下治蓋取諸乾坤河圖握樞曰黄帝名軒北斗黄帝之精母地祗之女附寶之郊野大電繞斗樞星耀感附寶生軒胷文曰黄帝子河圖挺佐輔曰黄帝修德立義天下大治乃召天老而問焉余夢見雨龍挺白圖即帝以授余於河之都覺昧素善不知其理敢問於子天老曰河出龍圖雒出龜書紀帝録列聖人之紀姓號興謀治平然後鳯凰處之今鳯凰已下三百六十日矣古之圖紀天其授帝圖乎黄帝乃祓齋七日衣黄衣冠黄冕駕黄龍之乗戴蛟龍之旗天老五聖皆從以遊河洛之間求所夢見者之處弗得至於翠媯之淵大鱸魚沂流而至乃問天老曰子見夫中河流者乎曰見之顧問五聖皆曰莫見乃辭左右獨與天老跪而迎之五色畢具天老以授黄帝黄帝舒視之名曰録圖龍魚河圖曰黄龍負圖鱗甲成字從河中出付黄帝令侍臣自冩以示天下又曰黄帝攝政時有蚩尤兄弟八十一人並獸身人語銅頭鐵額食沙石子造立兵仗刀㦸大弩威振天下誅殺無道不仁不慈萬民欲令黄帝行天子事黄帝仁義不能禁止蚩尤遂不敵仰天而歎天遣𤣥女下授黄帝兵信神符制伏蚩尤以制八方蚩尤歿後天下復擾亂不寧黄帝遂畫蚩尤形像以威天下天下咸謂蚩尤不死八方萬邦皆為弭伏尚書中候曰帝軒提像配永循機軒轅黄帝名永長也循順也黄帝軒轅觀攝提之像配而行之以長為順升機為政焉}
