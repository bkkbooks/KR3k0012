  - {type: variant, offset: 13, length: 0, content: '', SBCK: 下者亦奚以異乎收馬者㦲亦去其害馬者而巳矣馬以過分爲害黃帝再拜稽首稱天師而退又曰黃帝聞廣成子在於崆峒之上故徃見之曰敢問至道之精廣成子曰自而治天下雲氣不待族而􅀨草木不待黃而落日月之光益以荒矣又奚足以語至道黃帝退􅂢天下築特室席白茅間居三月復往邀之廣成子南首而卧黃帝從下風􅂰行而進再拜稽首而問曰聞吾子逹於至道敢問治身柰何而可而以長乆廣成子蹷然而起曰善哉問乎來吾語汝至道之精窈􅄀􅄀至道之極昏黙黙無視無聽抱神以静形將自正我修身千二百歳矣吾形未嘗衰黃帝再拜稽首曰廣成子之謂天矣尸子曰子貢曰古者黃帝四面信乎孔子曰黄帝取合已者四人使治四方不計而耦不約而成此之謂四靣韓子曰師曠謂晉平公曰黃帝合􅀑神於西太山之上駕象車六交龍畢方並館􅃖􅀹居前風伯進掃􅀨師洒道乃作爲清角之樂淮南子曰黃帝治天下而力牧太山稽輔之力牧太山稽輔則黃帝之師也孟子曰王者師臣也以理日月星辰之治隂陽之氣節四時之度正律曆之數明上下等貴賤使強不得􅁀寡人民保命不夭安能性命不夭逰也歳時熟而不凶不凶無災害也百官正而無私皆在公也上下調而無􅀹君調臣和無􅀹過也法令明而不闇輔佐公而不阿卿土公正不阿意曲從田者不侵畔漁者不爭隈隈曲􅀷處無所聚也道不拾遺市不䂊價城郭不􅀜􅀜閉邑無盗賊商旅之人相讓以財狗彘吐菽粟於道路而無忿爭之心於是日月精明星辰不失其道風􅀨時節五􅂖登熟虎豹不妄噬鷙鳥不妄摶鳯凰翔於庭麒麟擾於郊青龍進駕飛黃伏皂飛黃出西方扶状如狐頂上有角乗之壽千歳皂􅇫也諸北儋耳之國莫不獻其貢職皆北極之夷國論衡曰謚法静民則法曰黃帝者安民之謚非得道之稱也蔣子萬機論曰黃帝之􅀄養性愛民不好戰伐而四帝各以方色稱號交共謀之邊城日驚介胄不釋黃帝歎曰夫君危于上民安于下主失於國其臣再嫁厥病之由非養冦耶今處民萌之上而四盗亢衡逓震于師於是遂即營疊以滅四帝向令黃帝􅀂不龍驤虎變而與俗同道則其民臣亦害于四帝矣抱朴子曰黃帝生而能言役使百靈可謂天授自然之體者猶復不敢端坐而得道故陟王屋而受丹經到鼎湖而飛流珠登崆峒而問廣成上具茨而事大隗適東岱而奉中黃入金谷而諮老子論道養則質􅀇素二女精推歩則訪山稽力牧講占候則詢風著體􅐷則受雷歧審攻戰則納五音之䇿窮神姧則記曰澤之亂相}
