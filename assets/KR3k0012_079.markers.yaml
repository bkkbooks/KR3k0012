  - {type: variant, offset: 29, length: 1, content: 歲, WYG: 百嵗矣吾形未嘗衰黄帝再拜稽首曰廣成子之謂天矣尸子曰子貢曰古者黄帝四面信乎孔子曰黄帝取合已者四人使治四方不計而耕不約而成此之謂四面韓子曰師曠謂晉平公曰黄帝合鬼神於西太山之上駕象車交六龍畢方並館蚩尤居前風伯進掃雨師灑道乃作為清角之樂淮南子曰黄帝治天下力牧太山稽輔之力牧太山稽輔則黄帝之師也}
