  - {type: variant, offset: 2402, length: 0, content: '', WYG: 三官九府書人功過其理甚明隱元内文經曰青童君延萬帝於曲宇講寳訣之妙章洞}
  - {type: variant, offset: 2403, length: 1, content: 形, WYG: 經曰六層玉臺在九天圖之上臺上有金簡玉札及紫鳳丹章十萬篇太上真文玉郎典之玉光八景經曰玉寳臺太空之章封其内飛行羽經曰上皇九轉之道絳簡紫書秘於紫天元臺二十四生}
