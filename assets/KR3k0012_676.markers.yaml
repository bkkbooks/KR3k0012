  - {type: variant, offset: 2406, length: 0, content: '', WYG: 披九光玉藴出金書紫字玉文丹章三部八景二十四生圖置白玉案上靈寳隱書曰玉誕者曇誓天十都名也上有大洞之章紫書玉字煥乎上清玉京山齋曰諸髙仙真人大㑹太上𤣥都披空洞歌章靈書經曰}
  - {type: variant, offset: 2407, length: 0, content: '', SBCK: 方九氣天中靈寳度命品章出自元始東華青童君封之青玉寳凾之中印以元始九氣之章神仙中經曰老子度􅀜時爲尹喜著五千言解五十五章是手所書也能行此道知元氣父母天地之先不知此者徒自苦耳太微天帝君以紫簡注紫度炎光經篇目金簡書其正文玄章在焉玉皇譜籙曰髙上衆眞結自然之章金玄羽章經曰玉清八景隱書金玄内文生於元始之先即天之書也以威百神諸天内音經曰天有飛玄自然之氣合和五音以成天中無量洞章赤書玉訣上曰無始靈寳告水帝削除罪簡上聞九天金龍驛傳在朱書銀木簡以投三河之淵􅀄用金鈕九􅀟連簡沉之於清泠之泉埋本命之}
