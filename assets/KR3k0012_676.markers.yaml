  - {type: variant, offset: 2401, length: 0, content: '', WYG: 千言觧五十五章是手所書也能行此道知元氣父母天地之先不知此者徒自苦耳太微天帝君以紫簡注紫度炎光經篇目金簡書其止文𤣥章在焉玉皇譜籙曰髙上衆真結自然之章金𤣥羽章經曰玉清八景隱書金𤣥内文生於元始之先即天之書也以威百神諸天内音經曰天有飛𤣥自然之氣合和五音以成天中無量洞章赤書玉訣上經曰無始靈寳告水帝削除罪簡上間九天金龍驛傳在朱書銀木簡以投三河之淵初用金鈕九雙連簡沉之於清泠之泉理本命之}
