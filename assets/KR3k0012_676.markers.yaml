  - {type: variant, offset: 3866, length: 202, content: 五色九色師子之履玉光八景經曰東北始陽宮牛元景足躡五色履舄龜山元籙曰領仙王奉元始命使資晨纓玉冠鳳雲之舄給上真仙母又有神雲鳳舄列仙傳曰安期先生賣藥海邊時人言千歲翁秦始皇召見與語三日夕賜金壁數千萬出於峊鄉亭皆置去留書以赤玉舄一量為報曰後千歲求我蓬萊山下始皇即遣使者入海未至蓬萊山輒風波而還上真元籙曰九天元父曳神雲鳳舄帶素雲之綬帷帳神州經曰九河帝君坐玉床五色帷帳內外光明玉珮千垂席玉珮金璫經曰仙人鄭段者坐玉華之席, SBCK: 也太平御覽卷第六百七十六}
