  - {type: variant, offset: 2409, length: 1, content: 服, WYG: 封之青玉寳函之中印以元始九氣之章又南方三氣丹天靈書度命玉章出自元始}
  - {type: variant, offset: 2409, length: 1, content: 服, krp: 延万帝於曲宇講寳訣之妙章洞眞經曰六層玉臺在九天圗之上臺上有金簡玉扎及紫鳯丹章十万篇太上眞文玉郎典之玉光八景經曰玉寳臺太空之章封其内飛行羽經曰上皇九轉之道絳簡紫書祕於紫天元臺二十四生圗曰披九光玉藴出金書紫字玉文丹章三部八景二十四生圗置白玉案上靈寳隠書曰玉誕者曇誓天十都名也上有大洞之章紫書玉字煥乎上清玉京山齋曰諸髙仙眞人人㑹太上玄都披空洞歌章靈書經曰東方九氣天中靈書度命品章出自天元始東華青宫青童君封之青玉寳亟之中印以元始九氣之章又南方三氣丹天靈書度命玉章出自元始}
  - {type: variant, offset: 2411, length: 3, content: 光袍龜, SBCK: 陵上宫南極上元君封之赤玉寳凾之中印以太丹三氣之章又西方七氣天中靈書度命玉章出自元始西華宫中金母封之白玉寳凾之中印以太素七氣之章又云北方五氣天靈書度命玉章出自元始北上宫中玉晨君封之玄玉變之中印以太玄五氣之章三元布經曰髙上三元經者乃三清眞書也上眞玉撿飛空之篇上元檢天大籙中元撿仙眞書下元撿地玉文如是寳篇髙上皆刻金丹書盛以自然雲錦囊封以三元寳神之章藏於九天之上大有之宫金臺玉室九曲丹房靈寳赤書曰元始命太眞按筆玉妃拂筵鑄金爲簡刻書玉篇五老賞籙祕於九天靈都之宫迴天九霄經曰於是大一拂筵天妃持香玉華執巾丹書紫字刻於白金隠起靈顔結於玉篇題以青籙得道之名龍景九文紫鳯赤書經曰太上命太極眞人授以玉簡金書寳洞飛霄絶玄之章玉帝玄記曰中皇元年九月七日七聖齋靈清長宫記其得道之篇刻以白銀之簡藏於雲錦之囊封以啓命之章付以五老仙都左公掌籙瓊宫又曰古空洞之中有廻天上文四司所保五帝所詮七聖定簡舉形合先大有經曰太上玉章刻玉爲簡惣御万眞眞經曰東方歳星青帝勾芒佩通明之印南方熒惑赤帝太昊佩太陽之印西方太白白帝少昊佩通隂之印北方辰星黒帝顓頊佩通神之印中央鎭星大帝文昌佩方神之印夲際經曰有十二法印紫書金根經曰有青精玉璽金房上經曰大帝靈神都宫中有金房度命延年之訣鑄金爲簡刻白銀之編紫筆書文消魔經曰發九天之朱匱望上清之瓊扎玄書旣刻於玉章絳名始刋於靈闕大洞眞經曰八景玉籙藏於太素瑶臺玄雲羽室封以欝森之笈玉清三元之章簡扎品曰青童君曰無金簡者銀木亦可當也無玉扎者桐木亦可當但令精好也眞理無有闇節當取扎於雲錦之囊此上眞之至號玉帝之靈篇也上清九眞中經内訣有玄靈元君寳祕奔日月之玉章神州七變經曰大隂玉晨九天眞妃紫晨君受流精飛景寳章太清中經曰有天一八極璽􅀛}
