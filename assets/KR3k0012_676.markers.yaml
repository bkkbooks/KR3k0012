  - {type: variant, offset: 586, length: 1, content: 蘭, SBCK: 簡緑字千年得傳也又曰五老寳經青緑爲字以書其章又八素眞經太上之隱書也八色采筆金闕帝君自書之爲致貞之法以付太虚眞人南岳赤松子使下授學道􅀫有眞金玉字刻在金閣當爲眞人者不得越傳地仙又五符經一道通書以南和丹繒封以金英之凾印以玄都之章付震水洞室之君又靈寳眞一自然經衆眞佩此経者以黄錦爲地丹金書之永谷道眞享之無期也元始􅀃經}
