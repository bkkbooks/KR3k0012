  - {type: variant, offset: 1484, length: 903, content: 之上又帶九天仙鍊之劍衣九色班文袍常乘十二飛麟帶金虎鳳文之綬金真玉光經曰元景道君曳玄黃之綬建七色玉冠又曰元景道君衣丹錦之綬戴進賢玉冠乘玄景綠與參駕鳳皇又太陽上府紫微宮中道君曳絳錦丹綬戴玉冠躡九色之履執制魔之章又元景太一君曳玄黃素綬戴七寶冠執命神之策乘玉輦五采蓋紫雲車參駕六龍又曰桐柏山真人王子喬年甚少整頓非常建芙蓉冠著朱衣以白珠綴衣縫帶劍多論金庭山中事言於眾真太上素靈經曰太上神仙戴飛晨寶冠又戴青精辰玉冠遊雲寶冠玉精寶冠通天玉寶冠三玄寶冠上清仙公並建扶華沓霞大冠道君冠九德之冠太極左仙公起居注曰太上三天鍚仙公芙蓉晨冠靈飛六甲經曰上清瓊宮東極玉真建九氣通精之冠玉京真人戴通陽玉晨冠少陽真人戴通曜之冠太素三元君建寶琅扶晨羽冠紫素元君建太真晨纓之冠三角髻餘髮散之於腰太極金書曰元始建洞天之冠上君建青精天玉之冠太真丈人建三寶玉冠三天童建三華寶曜洞天玉冠太洞玉經云紫元真人被朱錦之服巾綠霞之冠五岳真形圖曰東岳太山戴倉碧七稱之冠南岳衡山戴九丹日精之冠中岳嵩山冠黃玉太玄之冠西岳華山建太初九流之冠北岳恒山建太冥靈陰之冠青城丈人戴蓋天之冠昇玄經曰昔有仙人豆子明建黃褐玄巾幘紫書金根經曰九天元父戴七稱珠玉之幘敷齊經曰正一功曹冠朱陽之幘帔太極金書曰元始天帝被九色羅帔丹絳之裾珠繡霞帔太極左仙公起居注曰太上三天鍚仙公丹錦繡帔靈書紫文經曰青童大君衣飛青翠羽龍帔雌一五老經曰太素三元君服紫氣浮雲錦帔又紫繡毛帔又鳳文錦帔無上真人內傳曰九色錦繡華文之帔太元真人茅君內傳曰繡羽紫帔九真中經云青玉錦帔絳玉素玉玄玉黃玉錦帔又云青華丹蘂玉白琳四出龍帔玄玉九道雲錦帔黃雲山文錦帔褐仙公請問經曰太極真人曰夫學道當潔淨衣服備巾褐制度名曰道之法服靈寶真一自然經訣曰至真已得道人披九光七色法服靈飛六甲經曰南極玉真著緋羅法服上清紫宸經曰修七轉之道者上皇君以法服飛仙羽章授之仍戴以紫元飛霜七色之冠褵上清經曰高上玉皇衣玉文明光飛雲之褵龜山元籙曰九天玄母衣霜羅九色之褵又衣青羅之褵五岳真形圖曰五岳使者服緋褵三元布經曰紫素元君衣紫錦裌褵曰素元君衣白錦光明之褵龜山元籙曰九色飛雲錦褵九色自然之褵玉文明光飛錦之褵九色珠絳雲光錦褵丹錦七色文光之褵袍太極金書曰元始披霜珠之袍, SBCK: ''}
