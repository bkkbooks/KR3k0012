  - {type: variant, offset: 2411, length: 2, content: 光袍, WYG: 陵上宫南極上元君封之赤玉寳函之中印以太丹三氣之章又西方七氣天中靈書度命玉章出自元始西華宫中金母封之白玉寳函之中印以太素七氣之章又云北方五氣天靈書度命玉章出自元始北上宫中玉晨君封之𤣥玉變之中印以太𤣥五氣之章二元布經曰髙上三元經者乃三清真書也上真玉檢飛空之篇上元檢天人籙中元檢仙真書下元檢地仙文如是寳篇髙上皆刻金丹書盛以自然雲錦嚢封以三元寳神之章藏於九天之上大有之宫金臺玉室九曲丹房靈寳赤書曰元始命太真按筆玉妃拂筵鑄金爲簡刻書玉篇五老賞籙秘於九天靈都之宫廻天九霄經曰於是太一拂筵天妃侍香玉華執巾丹書紫字刻於白金隱起靈顔結於玉篇題以青籙得道之名龍景九文紫鳳赤書經曰太上命太極真人授以玉簡金書寳洞飛霄絶𤣥之章玉帝𤣥記曰中皇元年九月七日七聖齋靈清長宫記其得道之篇刻以白銀之簡藏於雲錦之嚢封以啓命之章付以五老仙都左宫掌籙瓊宫又曰古空洞之中有㢠廻天文四司所保五帝所銓七聖又定簡舉形合先大有經曰太上玉章刻玉爲簡總御萬真真經曰東方嵗星青帝勾芒佩通明之印南方熒惑赤帝太昊佩太陽之印西方太白白帝少昊佩通隂之印北方辰星黒帝顓項佩通神之印中央鎮星大帝文昌佩方神之印本際經曰有十二法印紫書金根經曰有青精玉璽金房上經曰大帝靈神都宫中有金房度命延年之訣鑄金爲簡刻白銀之編紫筆書文消魔經曰發九天之朱匱望上清之瓊劄𤣥書既刻於玉章絳名始列於靈闕大洞真經曰八景玉籙藏於太素瑶臺𤣥雲羽室封以欝森之笈玉清三元之章簡劄品曰青童君曰無金簡者銀木亦可當也無玉札者桐木亦可當但令精好也真理無有闇節當取劄於雲錦之嚢此上真之號玉帝之靈篇也上清九真中經内訣有𤣥靈元君寳秘奔日月之玉章神州七變經曰太隂玉晨九天真妃紫晨君受流精飛景寳章太清中經曰有天一八極璽}
