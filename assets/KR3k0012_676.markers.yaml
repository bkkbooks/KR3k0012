  - {type: variant, offset: 583, length: 1, content: 虛, SBCK: 玉璽鳯函金眞玉光紫文單章在其内九幽經曰帝尊在三元宫中惣校圗籙又曰善功注名黄籙金格王簡陳列三清四極}
  - {type: variant, offset: 583, length: 278, content: 虛明紫蘭中元高嵉君建三華之冠帶流金紫章又曰太素真君建紫晨巾乘青龍紫羽蓋玉珮金璫經曰元始天王披九色離羅之帔帶寶冠又曰太帝建七氣朱冠又曰太岳君建三寶九光夜冠又曰華山君建六元通神飛冠佩交靈之綬又曰嵩高君建中元黃晨玉冠佩黃神中皇之章又曰玉佩帝君建紫冠真誥曰上元夫人服赤霜袍披青毛錦裘頭作三角髻散髮至於腰戴元晨夜月之冠帶六山火玉之佩腰鳳文琳華太綬執流黃揮精之釰上清變化經曰太元真人巾芙蓉冠上清元籙曰九天元父戴寶天之冠太上五帝內真經曰青帝君建九天通天冠又曰赤帝君建三氣玄梁寶冠又曰白帝君建七氣明光寶冠又曰黑帝君建五氣玄晨之冠又曰黃帝建黃晨通天冠佩黃晨越元之策帶靈飛紫綬, WYG: 有}
