  - {type: variant, offset: 3495, length: 324, content: 神女著雲錦褵上丹下青文采相照腰有綠繡帶帶係十餘小鈴鈴青色黃色更相參廁左帶玉珮珮如人間珮珮但幾小耳衣服倏倏有光照映室內如日中視雲母也雲髮鬒鬢整頓絕倫髻在頂中垂餘髮至腰指著金鐶白珠約臂視之年可堪十三四左右兩侍女其一侍女著朱衣帶青章囊手中又持一錦囊囊長尺餘以盛書十餘卷以白玉檢上刻字云玉清神虎內真紫元丹章其一侍女著青衣捧一白箱以絳帶絡之箱似象牙箱形二侍女年可堪十七八整飾非常又曰裴真人從者持青毛之節一童帶繡囊周君從者持黃毛之節無囊二君各有六童又曰東卿大臣見降侍從七人一人執紫毛節一人執華幡一名十絕靈幡一人帶綠章囊三人捧牙箱一人握流金鈴侍者並朱衣東卿形甚少於二弟二弟著青錦繡帬紫毛帔巾芙蓉冠二弟並同來倚立東卿命坐言語良久時乙丑歲晉興寧三年七月四日降於楊君之, SBCK: 張碩}
