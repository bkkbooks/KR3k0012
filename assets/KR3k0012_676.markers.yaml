  - {type: variant, offset: 2409, length: 1, content: 服, SBCK: 延万帝於曲宇講寳訣之妙章洞眞經曰六層玉臺在九天圗之上臺上有金簡玉扎及紫鳯丹章十万篇太上眞文玉郎典之玉光八景經曰玉寳臺太空之章封其内飛行羽經曰上皇九轉之道絳簡紫書祕於紫天元臺二十四生圗曰披九光玉藴出金書紫字玉文丹章三部八景二十四生圗置白玉案上靈寳隠書曰玉誕者曇誓天十都名也上有大洞之章紫書玉字煥乎上清玉京山齋曰諸髙仙眞人人㑹太上玄都披空洞歌章靈書經曰東方九氣天中靈書度命品章出自天元始東華青宫青童君封之青玉寳亟之中印以元始九氣之章又南方三氣丹天靈書度命玉章出自元始}
