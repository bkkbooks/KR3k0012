  - {type: variant, offset: 2445, length: 167, content: 內傳曰有赤霜之袍裘大洞玉經曰司禁真伯乘日月之軿披虎文之裘八表經曰白素元君衣黃緣曜光雲文之裘五帝內真經曰有玄文明光之裘九色班裘龜山元籙曰有雲文丹錦之裘衣三道順行經曰玉景真人衣玄雲錦衣老子歷藏中經曰東父者清陽之氣萬神之先衣五采衣龜山元籙曰有明光錦九朱飛文法衣三素飛文錦衣五色班衣九色龍衣又有青黃紫三色羽衣又有九色鳳衣亦有九天鳳衣珮大戒經曰, SBCK: 命}
