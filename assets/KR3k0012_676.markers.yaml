  - {type: variant, offset: 2395, length: 0, content: '', SBCK: 帶朱精禁天之章髙玉皇佩丹皇玉章又曰紫映九霄眞玉佩金鳯璽又曰太素三元君有雲瓊之板九變虎書又曰髙靈九帝帶元光紫綬流精飛瓊之章又曰三天玉童帶九天之章又曰髙上虚皇君佩丹皇玉章又曰玉眞九天丈人佩九元通眞之䇿又曰紫靈皇上元皇佩封靈召眞玉䇿帶流光鳯章又曰上皇玉虚君佩丹文紫綬又曰三元大明上皇君帶神虎紫章又曰皇上万始先生佩金虎鳯文帶丹皇紫章又曰皇上帝君帶神虎玉章又曰上極紫皇君佩六山玉帶神精交虵之章綬太霄琅書曰太微天帝君以紫簡結紫度經篇目也又曰有帝章之印又曰瓊文帝章當刻書􅀥心之木受於絶巖之中又曰太霄琅書乃九天飛霄之典瓊文帝章乃上文也並以元始生於自然空洞之中靈皇玉帝受於九玄鑄金爲簡刻玉結篇金鏤玉字以明寳文祕於九天之上洞神經曰有三都印三皇印九天印鉅天下又曰有三皇玉劵一名金契又曰受三皇法湏玉簡長一尺二寸廣一寸厚三分無者槿桐准也又曰通謁三皇之簡以青玉作之赤金爲字金根經曰金簡玉札出自大上靈都之宫書以朱文編以朱繩又曰有神華玉門眞人投金簡之處又曰領仙玉郞賫金簡紫籍來於東華青宫校定玉名又曰玉皇刻降丹精玉芝金璽鳯章也玉寳青宫之内有金章鳯璽又曰青宮北殿上有金章鳯璽眞人得之又曰青宫之内北殿上有仙格金架也格上有學仙簿籙及玄名年月􅀷淺金簡玉札有十萬篇領仙王郎之典也又曰青宫無金簡之籙玉格無玄編之名神經亦不可得披大洞玉經曰讀玄一洞經者神臺刋名於福連之簡太上金簡玉札名爲福連之書也又曰眞陽者上清之宫名福連之簡刋其内五符經曰眞一食五牙天文西母刻以黄金之札封以丹芝光草印以太上中章茅君内傳曰茅盈在􅁪山内夢太玄玉女把玉札携之又曰天上道君有玉輿鳯璽又曰太元眞人有一人帶録章囊又一人帶繡章囊一人帶錦囊書金眞玉光經曰有昭靈之章保生玉章又曰此經髙妙衆經之尊緫御萬眞匡御羣仙玄符流映洞明紫晨祕於九天之宫鑄金爲簡以撰靈文刻玉丹書八明其篇也又靈寳自然經曰太上諸仙眞以黄金爲簡丹玉書之又太眞科以玉牒金書七寳爲簡玉帝七聖玄紀曰刻以白銀之簡結以飛青之文又曰廣靈之堂廻天九霄白簡青籙刻其内太眞科曰丹簡者以朱漆簡明火立陽也墨籙者以墨書文明水主隂人學長生故名丹簡墨籙祕不安傳又曰天皇執飛仙玉䇿人皇執上皇保命王䇿地皇執元皇定籙之䇿三華寳曜内眞上經曰太帝靈都宫中有二十四万上眞仙人皆鑄金爲簡白銀結編紫華書文誦詠此篇三天正法曰三天九微玄都大眞靈籙者祕在太上靈都之宫刻以紫玉爲簡黄金爲文付五老上眞仙都左公封以紫蘂玉芨盛以雲錦之囊南岳夫人内傳曰白簡素籙以白玉爲簡以青玉爲字故謂之白簡青籙皆記得道之人名姓道學傳曰金簡有王元規之筆迹太上素經曰凢受太上黄素經者􅀓盟用玉札一枚長一尺五分廣一寸四分又云有三元秀簡眞誥曰清虚眞人詣三元君受玉璽金眞􅀛山元籙曰丹文紫章神虎玉章七元交光之章流金紫章太上命神之章夜光寳章九色離羅之章靈書紫文經曰靈書紫文上經刻以紫玉爲簡青金爲文黄籙簡文經曰投金龍一枚丹書玉札青絲􅆞之以􅀜靈五帝昇度之信封於絶巖之中一依舊法又曰丹書玉札一枚金龍一以青絲繫石沉三河以􅀜水帝昇度之信一依玉訣舊文太洞玉經曰太上經簡玉札名爲福連之書又曰太上書以彤玉之札則玉映之堂可見四明之門可入也後聖道君列紀曰刻以紫玉爲簡青金爲文􅀛母按筆眞童拂筵玉童結編名之曰靈書龍飛尺素隠訣曰太微天帝君命羽仙侍郎奉金按以請飛行羽章太一洞眞玄經曰白元司命五人朱}
