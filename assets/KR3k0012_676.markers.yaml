  - {type: variant, offset: 94, length: 280, content: 環角結或飛雲編結餘髮垂兩肩至腰中也龍冠金精巾虎巾青巾虎文巾金巾此天真冠巾之名不詳其製又曰男真冠真並飛天交結道學傳曰王母二玉女侍王母上殿戴太真晨纓之冠履玄瓊鳳文之舄又曰孟景翼字輔明義嘉構難景翼星夜往赴經行失道時一人黃衣黃冠在其前引路既得道乃失所在海空經曰真仙道士並戴玄冠披翠帔太真科曰解褐披絳綃之衣釋巾著遠遊之冠又曰人皇著七寶珠冠上清經曰元始皇上丈人戴紫曜之冠佩九色自然之綬又曰高靈九天建金華七曜之冠又曰王真九天丈人建飛精百變之冠佩九元道真之策又曰上三天玉童建三華寶曜洞天玉冠四明科曰凡脩上清道經大洞真經入宣之日當身冠法服又曰凡女子學上清之法受寶經玉訣脩行大洞皆, SBCK: ''}
