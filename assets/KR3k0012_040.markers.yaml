  - {type: variant, offset: 495, length: 219, content: 山即中岳嵩山今在陽城縣西也其上有木焉葉狀如梨赤理服者不垢有草焉其狀如禾服者不昧上多美石次玉者也嵩高山記曰漢有道士從外國將貝多子來於嵩岳西腳下種之并立浮圖今有四樹與眾木有異一年三花花白色其香甚佳嵩山最是栖神靈藪也東出一里有自然五穀神芝仙藥東腳下有眾果樹云是漢果園後有小山名牛山多香樹昔有婦女妊身三十月生子五歲便入嵩高學道通神明為母立祠號開母祠又有三臺山漢武東巡過此山見三學仙女遂以為名又一石室有自然經書飲食室前石柱似承露盤有石暗滴下食之一合, SBCK: 壽}
