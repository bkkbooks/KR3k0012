  - {type: variant, offset: 735, length: 1, content: 玉, SBCK: 微道髙祖􅀏曰此神不欺趙襄子豈當􅀒吾邪及八月巳夘雨果霽髙祖大恱以太牢􅀕其山首陽山詩曰采苓采苓首陽之巓采苦采苦首陽之下采葑采葑首陽之東史記曰伯夷叔齊􅀌竹君之子讓國而逃聞西伯善養老往歸焉及至西伯卒武王載木主東伐紂伯夷叔齊扣馬諌左右欲兵之太公曰此義}
  - {type: page-break, offset: 735, content: '', id: KR3k0012_SBCK_040-3b}
  - {type: variant, offset: 735, length: 1, content: 玉, WYG: 㣲道髙祖笑曰此神不欺趙襄子豈當負吾邪及八日雨暴霽髙祖太悦以太牢祭其山首陽山詩曰采苓采苓首陽之巔采苦采苦首陽之下采葑采葑首陽之東史記曰伯夷叔齊孤竹君二子讓國而逃聞西伯善飬老徃歸焉及西伯卒武王載木主東伐紂伯夷叔齊扣馬而諫左右欲兵之太公曰義士也舍之伯夷叔齊恥之義不食周粟隠于首陽山采薇而食之乃至餓死鏁語曰晋平公與齊景公乗至于澮見}
