  - {type: punctuation, offset: 5, content: 《, id: KR3k0012_CHANT_040-bkkpn1}
  - {type: variant, offset: 5, length: 1, content: 釋, SBCK: 太行山霍太山首陽山龍門山􅄮山梁山太白山峨眉山岷山嶓冢山鳥䑕山積石山王屋山列子曰太行王屋二山方七里髙萬仞北山愚公者年且九十面山而居徴山北之寒出入之迃也聚室而謀曰吾與汝畢力平險可乎雜然相許雜猶僉也其妻曰以君之力曽不能損魁父之丘如太行王屋何且焉置􅁟石雜曰投諸渤海之尾隱士之北遂率子孫荷檐者三夫叩石墾壤運於渤海之尾隣人京城之孀妻有遺男始齓往助之寒暑易節始一反焉河曲智􅅱􅀏而止之曰甚矣汝之不慧以殘年餘力曽不能毁山之一毛其如土石何北山愚公長息曰汝之心曽不􅀂孀妻弱子雖我之死有子存焉子又生孫孫又生子子子孫孫無窮匱也而山不加増何苦而不可乎河曲智叟無以應操蛇之神聞之懼其不巳告之於帝帝感其誠命夸蛾氏二子􅀒二山一厝朔東一厝雍南神仙傳曰甘始太原人善行氣不食服天門冬治病不用針艾在人間三百歳乃入王屋山茅君内傳曰王屋山之洞周廽萬里}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_040-1b}
  - {type: variant, offset: 5, length: 1, content: 釋, WYG: 太行山霍太山首陽山龍門山岐山梁山太白山峨眉山岷山嶓􅜗山鳥鼠山積石山王屋山列子曰太行王屋二山方七里髙萬仞北山愚公者年且九十面山而居懲山北之塞出入之迂也聚室而謀曰吾與汝畢力平險可乎雜然相許雜猶僉也其妻曰以君之力曽不能損魁父之丘如太行王屋何且焉置土石雜曰投諸渤海之尾隠士之北遂率子孫荷擔者三夫叩石墾壤運于渤海之尾隣人京城之孀妻有遺男始齔往助之寒暑易節始一反焉河曲智叟笑而止之曰甚矣汝之不慧以殘年餘力曽不能毁山之一毛其如土石何北山愚公長息曰汝之心曽不若孀妻弱子雖我之死有子存焉子又生孫孫又生子子子孫孫無窮匱也而山不加増何苦而不力乎河曲智叟無以應操蛇之神聞知懼其不已告之於帝帝感其誠命夸娥氏二子負二山一厝朔東一厝雍南神仙傳曰甘始太原人善行氣不食服天門冬治病不用針艾在人間三百嵗乃入王屋山茅君内傳曰王屋山之洞週迴萬里}
