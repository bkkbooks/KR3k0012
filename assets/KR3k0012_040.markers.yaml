  - {type: variant, offset: 4148, length: 191, content: 如陣雲沿湘千里九向九背乃不復見有玉牒焉禹按其文以治水也劉敬叔異宛曰湘東姚祖太元中為郡吏經衡山望巖下數少年並執筆作書祖行旅休息乃過之未至百步少年相與飛颺遺一紙書其字皆鳥跡郡國志衡山南嶽也南嶽記云當翼軫度機衡謂之衡山山有錦石斐然成文霍山白虎通曰南方為霍山者何太陽用事護養萬物故為霍山爾雅曰大山宮小山霍郭璞注曰宮謂圍繞也禮記曰君為廬宮是也漢書武帝以衡山敻遠讖記皆以霍山為南岳故祭其神於此宋, SBCK: ''}
