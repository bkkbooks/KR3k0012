  - {type: variant, offset: 1504, length: 1, content: 華, krp: 河津一名龍門巨靈迹猶在去長安九百里江海大魚洎集門下數千不得上土則爲龍故云曝鰓龍門尸子曰古者龍門未鑿吕梁未闢河出於孟門上愼子曰河之下龍門其流駚如竹箭駟馬追弗能及淮南子曰龍門未闢吕梁未鑿河出孟門之上大溢逆流無有丘陵髙阜名曰洪水大禹通之孟門水經注云風山四十里河水南出孟門與龍門相對即龍門之上口也實爲河之巨阨兼孟門津之名也又有黄河自風山西四十里南出孟門山此經禹鑿廣岸崇深傾崖及捍巨石臨危若墜復倚焉歧山易曰王用亨于歧山吉无咎詩曰古公亶父來朝走馬率西水滸至于𡵨下又曰居𡵨之陽在渭之將萬邦之方下民之王孟子曰大王居邠狄人侵之事之以皮幣不得免焉事之以珠玉不得免焉乃屬其耆老而告之曰狄人之所欲者吾土地也君子不以其所養人者害人二三子何患乎无君我將去之去邠踰梁邑於𡵨山而下居焉圖經曰𡵨山亦名天柱山禹貢曰導汧及𡵨河圖括地象云歧}
  - {type: variant, offset: 1507, length: 0, content: '', SBCK: 崑崙山東南爲地乳上多白金周之興也鸑鷟鳴於歧山時人亦謂歧山爲鳯皇堆酈元注水經云天柱山上有鳯皇祠或云其峯髙峻逈出諸山􅃺􅀂柱因爲名焉梁山書曰壺口治梁及􅄮壺口在兾州梁在雍州循山治水在西詩曰弈弈梁山維禹甸之弈弈大皃甸治也禹治梁山除水災也傳曰梁山崩晉侯召伯宗伯宗辟重重人曰待我不如捷之速也問其所曰綘人也問綘事曰梁山崩將召伯宗謀之問將􅀂之何曰山有杇壌而崩可􅀂何國主山川山崩川竭國君爲之不舉降服乗縵徹樂出次祝幣史辭以禮焉其如此而巳雖伯宗􅀂之何􅂖梁傳曰梁山崩壅河三日不流晉君召伯宗而問之伯宗來遇輦者輦者不避使車右下而鞭之輦者曰所以鞭我者其取道逺矣伯宗下車而問焉曰子有聞乎對曰梁山崩壅遏河三日不流伯宗曰君爲此召我也爲之柰何崩之天有河天壅之雖召伯宗如之何爾雅曰梁山晉望也郭璞注曰晉國所望􅀕者也今在馮下陽西北臨河上也漢志注曰梁山有夏陽西北即尚書禹貢治梁及岐詩韓弈篇曰弈弈梁山晉國所望大梁别小梁之號俱在韓城縣界大梁山在今縣西又按三秦記梁山宫城又石名織錦城太白山辛氏三秦記曰太白山在武功縣南去}
