  - {type: variant, offset: 1504, length: 1, content: 華, SBCK: 河津一名龍門巨靈迹猶在去長安九百里江海大魚洎集門下數千不得上土則爲龍故云曝鰓龍門尸子曰古者龍門未鑿吕梁未闢河出於孟門上愼子曰河之下龍門其流駚如竹箭駟馬追弗能及淮南子曰龍門未闢吕梁未鑿河出孟門之上大溢逆流無有丘陵髙阜名曰洪水大禹通之孟門水經注云風山四十里河水南出孟門與龍門相對即龍門之上口也實爲河之巨阨兼孟門津之名也又有黄河自風山西四十里南出孟門山此經禹鑿廣岸崇深傾崖及捍巨石臨危􅀂墜復􅀝焉歧山易曰王用亨于歧山吉无咎詩曰古公亶父來朝走馬率西水滸至于􅄮下又曰居􅄮之陽在渭之將萬􅀖之方下民之王孟子曰大王居邠狄人侵之事之以皮幣不得免焉事之以珠玉不得免焉乃屬其􅂄老而告之曰狄人之所欲者吾土地也君子不以其所養人者害人二三子何患乎无君我將去之去邠踰梁邑於􅄮山而下居焉圖經曰􅄮山亦名天柱山禹貢曰導汧及􅄮河圖括地象云歧}
  - {type: page-break, offset: 1504, content: '', id: KR3k0012_SBCK_040-5a}
  - {type: variant, offset: 1504, length: 1, content: 華, WYG: 河津一名龍門巨靈迹猶在去長安九百里江海大魚俱集門下數千不得上上則為龍故云曝鰓龍門尸子曰古者龍門未鑿吕梁未開河出于孟門上慎子曰河之下龍門其流駛如竹箭駟馬追走弗能及淮南子曰龍門未闢吕梁未鑿河出孟門之上大溢逆流無有丘陵髙阜名曰洪水大禹通之孟門始見水經注云風山四十里河水南出孟門與龍門相對即龍門之上口也實為河水巨阨兼孟門津之名也又有黄河自峯山西四十里南出孟門山北經禹鑿廣㟁崇深傾崖及捍巨石臨危若墜復倚焉岐山易曰王用享于岐山吉無咎詩曰古公亶父來朝走馬率西水滸至于岐下又曰居岐之陽在渭之將萬邦之方下民之王孟子曰大王居邠狄人侵之事之以皮幣不得免焉事之以犬馬不得免焉事之以珠玉不得免焉乃屬其耆老而告之曰狄人之所欲者吾土地也君子不以其所以養人者害人二三子何患乎無君我將去之去邠踰梁山邑于岐山之下居焉圖經曰岐山亦名天柱山禹貢曰導岍及岐河圖括地象曰岐}
