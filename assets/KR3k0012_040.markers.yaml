  - {type: variant, offset: 1507, length: 0, content: '', WYG: 崑崙山東南為地乳上多白金周之興也鸑鷟鳴于岐山時人亦謂岐山為鳯凰堆酈道元水經註天柱山上有鳯凰祠或云其峰髙峻逈出諸山狀若柱因為名焉梁山書曰既載壺口治梁及岐壺口在冀州梁在雍州循山治水在西詩曰奕奕梁山維禹甸之奕奕大貌甸治也禹治梁山除水灾也傳曰梁山崩晋侯傳召伯宗伯宗辟重曰辟傳重人曰待我不如捷之速也問其所曰綘人也問綘事焉曰梁山崩將召伯宗謀之問將若之何曰山有朽壤而崩可若何國主山川故山崩川竭君為之不舉降服乗縵徹樂出次祝幣史辭以禮焉其如此而已雖伯宗若之何穀梁書曰梁山崩雍河三日不流晋君召伯宗而問之伯宗來遇輦者不避使車右下而鞭之輦者曰所以鞭我者其取道逺矣伯宗下車而問焉曰子有聞乎對曰梁山崩雍河竭三日不流伯宗曰君為此召我也為之奈何曰天有山天崩之天有河天壅之雖召伯宗如之何爾雅曰梁山晋望也郭璞注曰晋國所望祭者也今在夏陽西北臨河上也漢志注曰梁山在夏陽西北即尚書禹貢治梁及岐詩韓奕篇曰奕奕梁山晉國所望大梁别小梁之號俱在韓城縣界大梁在今縣西又按三秦記梁山宫城又名織錦城太白山辛氏三秦記曰太白山在武功縣南去}
