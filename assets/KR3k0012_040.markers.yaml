  - {type: variant, offset: 1806, length: 251, content: 禮諸侯祭山川在其封內者今陪臣祭泰山非禮也冉有孔子時仕季氏救猶止也對曰不能子曰嗚呼曾謂泰山不如林放乎孔子意云泰山之神知禮過於林放之賢遠也白虎通曰王者功成封禪必於泰山者何萬物之始交代之處也史記曰漢武帝封泰山白雲起封中漢書曰武帝封泰山禪石閭應劭注曰石閭在泰山下南方土人言仙人閭應劭漢官儀曰泰山東南名日觀者雞一鳴時見日始欲出長三丈所觀者望見長安其高如視浮雲其峻如無道徑望人如盂升或以為小白石或以為冰雪視巖石松樹鬱鬱蒼蒼如雲中晉書曰張忠隱于泰山教授弟子教以形不以言符堅徵之及至堅賜以衣冠辭曰年杇髮落不堪衣冠請以野, SBCK: 􅀄}
