  - {type: variant, offset: 730, length: 2, content: 畫為, SBCK: 廟甚靈鳥雀不棲其林猛虎常守其庭此則禹貢嶽陽也唐書曰義旗􅀄建髙祖自太原起兵西赴闕中途經霍邑時隨將宋老生陳兵拒險義師不得進乃屯於賈胡堡㑹霖雨積旬餽運不給髙祖患之忽有白衣老人詣軍門請見余霍山}
  - {type: variant, offset: 730, length: 2, content: 畫為, WYG: 甚靈鳥雀不棲其林猛虎常守其庭此則禹貢岳陽也唐書曰義旗初建髙祖自太原起兵西赴關中途經霍邑時隋將宋老生陳兵拒險義師不得進乃屯于賈胡堡㑹霖雨積旬餽運不給髙祖患之忽白衣老人詣軍門請見余霍山}
