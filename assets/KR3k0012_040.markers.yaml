  - {type: variant, offset: 722, length: 0, content: '', SBCK: 望太行山白鹿岩王莽嶺冠于衆山之表墨子曰墨子怒耕桂子曰我無愈於子墨子曰將上太行駕􅂹與羊子將誰驅曰將驅􅂹以􅂹足責也墨子曰我亦以子爲足責尸子曰龍門魚之難也太行牛之難也以德報怨人之難也水經注曰仲尼傷道不行欲北從趙鞅聞殺鳴犢遂旋車而反其後晉人思之於太行嶺南爲之立廟盖往時廽轅處也余案諸子書及史籍之文並言仲尼臨河而歎曰丘之不濟命也夫如是非太行廽轅之言也􅀶物志曰按太行山而北去亦不知山所限極處亦如東海不知所窮霍太山史記曰智伯攻趙襄子襄子懼乃奔保晉陽原過後至於王澤見三人自帶以上可見自帶以}
  - {type: page-break, offset: 722, content: '', id: KR3k0012_SBCK_040-2b}
  - {type: variant, offset: 722, length: 0, content: '', WYG: 望太行山白鹿巖王莽嶺冠于衆山之表墨子曰墨子怒耕桂子曰我無喻于子墨子曰將上太行駕驥與羊子將誰驅曰將驅驥足責也墨子曰我亦以子為足責尸子曰龍門魚之難也太行牛之難也以徳報怨人之難也水經注曰仲尼傷道不行欲北從趙鞅聞殺鳴犢遂旋車而返其後晋人思之于太行嶺南為之立廟蓋往時迴轅處也余按諸子書及史籍之文並言仲尼臨河而歎曰丘之不濟命也夫如是非大行迴轅之言也博物志曰按太行山而北去亦不知山所限極處亦如東海不知所窮霍太山史記曰智伯攻趙襄子襄子懼乃奔保晋陽原過後至于王澤見三人自帶以上可見自帶以}
