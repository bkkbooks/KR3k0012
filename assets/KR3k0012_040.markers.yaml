  - {type: variant, offset: 1281, length: 0, content: '', SBCK: 九都是山也五曲九水出焉合流而北注于河其中多蒼王􅁻神泰逢司之是神好居於萯山之陽出入有光吕氏春秋曰夏后氏孔甲田于東陽萯山遇大風雨皇甫謐帝王丗紀以爲}
  - {type: variant, offset: 1281, length: 169, content: 即神仙之道嶮無不通也有虵曰肥遺六足四翼見則天下旱列仙傳曰馬明生從安期先生受金液神丹方乃入華陰山中合金神丹升天也又曰脩羊公者蜀人也止華陰山石室中中有懸石榻臥其上石盡穿陷又曰毛女者在華陰山中獦師世世見之體生毛自言秦始皇宮人也又曰呼子先者漢中闕下卜師也壽百餘歲臨去呼酒家嫗曰急裝當與嫗共應中陵王今夜有仙人持二茅狗來先持一與酒家嫗得俱騎乃龍上華陰, WYG: 九都是}
  - {type: variant, offset: 1281, length: 0, content: '', krp: 九都是山也五曲九水出焉合流而北注于河其中多蒼王吉神泰逢司之是神好居於萯山之陽出入有光吕氏春秋曰夏后氏孔甲田于東陽萯山遇大風雨皇甫謐帝王丗紀以爲}
