  - {type: variant, offset: 2058, length: 429, content: 入覲從之後乞還堅以安車送之行達華山歎曰我東岳道士歿于西岳命也及關而死道書福地記曰泰山多芝草五石下有洞天周廻三千里鬼神之府袁山松後漢書曰光武封泰山雲氣成宮闕風俗通曰古封泰山禪梁甫舊說岱宗上有金篋玉策能知人年壽脩短漢武帝探策得十八因倒讀曰八十其後果壽長八十博物志曰泰山一曰天孫言為天帝孫也主召人魂東方萬物始成故知人生命之長短五經通義云一曰岱宗言王者受命易姓報功告成必於岱宗也東方萬物始交代之處宗長也言於群嶽之長白虎通曰王者受命必封禪封者廣厚也禪除也為壇字本為墠以其祭神故從示皆刻石紀號著己之功績以自效也天以高為尊地以厚為德故增泰山之高以報天禪梁甫之阯以報地也史記曰無懷氏封泰山禪云云伏犧封泰山禪云云神農封氏封泰山禪云云炎帝封泰山禪云云黃帝封泰山禪云云顓頊封泰山禪云云帝嚳封泰山禪云云堯封泰山禪云云禹封泰山禪會稽周成王禪梁甫肅然及蒿里石閭後又凡五脩封泰山後漢書曰光武封泰山禪梁甫凡云云亭亭肅然蒿里社首梁甫皆泰山下小山也石閭在西巖下漢官儀及泰山記曰泰山盤道屈曲而上凡, SBCK: 黄蓮}
