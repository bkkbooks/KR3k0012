  - {type: variant, offset: 2682, length: 1424, content: 武帝時以道術受賜後上東巡泰山稷丘君乃冠章甫衣黃衣擁琴來拜武帝曰陛下勿上也上必傷足必欲上及上數里左右足指果折乃止列仙真人傳曰馬明靈者齊國臨淄人也本姓和字君賢為縣吏捕賊為所傷當時殆死良久忽於道間見一女以時後管中一丸藥大如小豆與明服之於是即愈血絕瘡合隨神女還岱宗石室中上下懸絕重巖深隱去地千餘丈其中金床玉机乃人跡所不能至神仙傳曰劉馮者沛人學道於穆王子服石桂英及中岳石流黃年三百餘歲而有少容後入泰山中又曰秦山下老父者失其姓名漢孝武皇帝巡狩見老父鋤於道間頭上白光高數丈將問之父對曰臣年八十五時衰老垂死頭白齒落有道者教臣絕穀但服飲水并作神枕枕中有三十二物其二十四物以當二十四氣其八物當八風臣行之轉少日行三百里今年九十矣帝受其方賜縑帛去父入岱宗山十年五年時還鄉里三百餘年乃不復還也上黨記曰太行坂東頭即泰山也避世者區種而食或射熊於巖間泰山記曰泰山廟在山南悉種柏樹千株大者十五十六圍長老傳云漢武所種廟及東西房三十餘間并高樓三處春秋饗祀泰山君常在此壇周易是謀類曰泰山失金雞鄭玄注曰金雞泰山之精丘淵之齊記曰泰山東岳也瀛愽二縣共界漢武封禪割此縣以供祀泰山故曰奉高三十里有延陵兒塚伍輯之從征記曰泰山於所經諸山非最高而岑崿軒舉凌跨眾阜雲霞草木藹然靈異苑囿神奇故無螫虫猛獸孟子曰孔子登東山而小魯登泰山而小天下尸子曰泰山之中有神房阿閣帝王錄淮南子曰清之為明杯水而見眸子濁之為闇河水不見泰山新序曰挾泰山以超北海恒山史記曰趙簡子謂諸子曰吾藏寶符於常山往得者立焉諸子竟往無所得無恤曰常山臨岱可取也簡子曰是知符矣遂立之白虎通曰北方為常山者何陰終陽始其道常久故曰常後魏書曰道武立廟於上置侍祀九十九人歲時禱水旱至文成帝東巡親禮其神焉春秋元命苞曰昂畢散為冀州分為趙國立為常山崔鴻前燕錄曰慕容儁壽光三年常山寺大樹根下得壁七十二圭七十光色精奇有異常玉孫子兵法曰常山之虵名曰率然一身而兩頭擊其一頭則一頭至擊其中則兩頭俱至神農本草曰常山有草名神農置之門上每夜叱人常山圖經曰北嶽恒山在縣西北一百四十里尚書禹貢太行恒山至于碣石有恒水出焉其下有祠山記曰高三千九百丈上方三十里周廻三千里上有泰玄之泉神草十九種道者服之成仙又太史公云北岳者有五名一名蘭臺府二名列女宮三名華陽臺四名紫微宮五名太一宮或云太茂山山北四百餘里號飛狐之口有率然虵孫吳諭兵勢管子曰其山北臨代南俯趙東接河海之間早生而晚殺五穀之所蕃熟四種五穫焉陽固北都賦曰茂丘茂山也蓋恒岳之別名泒水從西來甚大至茂山之西沉伏于地過山而復出其大如初世言避恒岳之靈衡山周官曰荊州其山鎮曰衡山徐靈期南岳記曰衡山者五嶽之南嶽也其來尚矣至于軒轅乃以灊音潛霍之山為副焉故爾雅云霍山為南嶽蓋因其副焉或云衡山一名霍山至漢武南巡又以衡山遼遠道隔江漢於是乃徙南嶽岳之祭于廬江灊山亦承軒轅副義也干寶搜神記曰漢武徙南嶽之祭著廬江潛縣之霍山郭璞爾雅注云霍山在廬江郡潛縣別名天柱山漢武以衡山遼遠讖緯以霍山為岳故祭之也晉書曰劉驎之嘗採藥至衡山深入忘返見有一澗水南有二石囷一開一閉水深廣不得過欲還失道遇伐弓人問遙僅得還家或說囷中皆仙靈方藥驎之欲更尋終不復知處羅含湘中記曰衡山九疑皆有舜廟太守至常遣戶曹致祀則如絃歌之聲也吳越春秋曰禹傷父功不成登衡山血白馬以祭之忽然而臥夢赤繡文衣男子稱玄夷蒼水使者謂禹曰欲得我山書者齋於黃帝之嶽禹乃退齋三日登宛委發石得金簡玉字之書得治水之要也盛弘之荊州記曰衡山有三峰其一名紫蓋每見有雙白鶴徊翔其上一峰名石囷下有石室尋山徑聞室中有諷誦聲一曰芙蓉上有泉水飛流如舒一幅白練, SBCK: ''}
