  - {type: variant, offset: 2302, length: 1, content: 內, SBCK: 遣將侯泉率􅀐七百討之泉遂廣張聲􅀔多設供具親以數百􅀐􅀷入樓境欲執行人以問虚實去薊百餘里值賊帥陳周馬歩萬餘泉遂潜伏以乗其背大破之虜其卒五千餘人㝷還其馬伏縱令入城左右諌曰旣􅀗賊衆何爲復資遣之也泉曰我}
