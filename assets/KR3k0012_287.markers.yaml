  - {type: variant, offset: 2867, length: 483, content: 去留將桃豹守譙城住西臺東晉將祖逖遣將韓潛等鎮東臺同一大城賊從南門出入放牧逖軍開東門相守四旬逖以布囊盛土如米狀使千餘人運上臺又令數人擔米偽為疲極而息於道賊果逐之皆棄擔而走賊既獲米謂逖士眾豐飽而胡戎飢久益懼無復膽氣又曰後涼呂光遣將呂延伐西秦乞伏乾歸大敗之乾歸因大泣歎曰死中求生正在今日也乃縱反間稱乾歸東奔成紀呂延信之引師輕進延司馬耿雅諫曰乾歸雄勇過人權略難測破王廣剋楊定皆羸師以誘之雖蕞爾小國蕞左外切亦不可輕也困獸猶鬥况乾歸而可覩風自散乎今宜部陣而前步騎相接徐俟諸軍大集可一舉滅之延不從戰敗死之又曰北涼沮渠蒙遜伐西涼李士業於酒泉先攻浩舋浩音閤舋音門虵盤於帳前蒙遜笑曰前一為騰虵今盤在吾帳天意欲吾廻師燒攻具而還次于川巖聞李士業徵兵欲攻張掖蒙遜曰入吾計矣但恐聞吾廻軍不敢前也兵事尚權乃露布西境稱得浩舋將進軍黃谷士業聞而大悅進入都瀆澗蒙遜潛軍逆之敗士業于懷城遂進剋酒泉又曰南涼禿髮傉檀守姑臧後秦姚興遣將姚弼等至於城下傉檀驅牛羊於野弼眾採掠傉檀分擊大破之又曰前燕慕容儁已剋幽薊至于冀州冉閔帥騎拒之與儁將慕容恪相遇於魏昌閔將董閏言於閔曰鮮卑乘勝勁不可當也請避之以溢其氣然後濟師以擊, SBCK: 圖}
