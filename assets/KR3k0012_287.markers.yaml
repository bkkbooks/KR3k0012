  - {type: variant, offset: 858, length: 1, content: 新, WYG: 不敵不可與戰可勿遥射須至塹裡當并力破之俄而皆越塹㧞柵僧珎分人上城大石俱發自率馬步三百人出其後守隅者復踰城而下内外齊擊居士等應時奔散三國典畧曰侯景叛段韶夾渦而軍潜於上風縱火景衆騎入水出而却走草濕火不復然梁書曰司州刺史陳慶之率圍東魏南荆州東魏將堯雄行臺侯景救之雄曰苟堆梁之北面重鎮因其空虛攻之必尅彼若聞難荆圍自解此所謂機不可失也遂率衆攻之慶之果棄荆州來未至雄陷其城擒梁鎮將苟元廣又曰陳慶之曹仲宗伐後魏之渦陽渦孤和切魏遣將元昭等率兵來援前軍至駞間去渦慶之欲逆戰諸將以賊之前鋒必是輕銳與戰若}
