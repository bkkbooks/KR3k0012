  - {type: variant, offset: 3362, length: 2, content: 出將, SBCK: 恩信於是西部鐡勒酋長也列河等三萬餘户並欵附相率南遷廣陽欲與謹至折敦嶺迎接之謹曰破六汗抜陸兵衆不少聞也列河等歸附必來要擊彼􅀂先據險要則難與爭鋒今以列河等餌之當竟來抄掠然後設伏而待必指掌破之廣陽然其計拔陵果來要擊破也列河於嶺上部衆皆没謹伏兵發賊遂大敗悉收列河之衆也太}
  - {type: variant, offset: 3362, length: 2, content: 出將, WYG: 恩信於是西部鐵勒隊長也列河等萬餘户並欵附相率南遷廣陽欲與謹至折敦嶺迎接之謹曰破六汙㧞陸兵衆不少聞也列河等歸附必來要擊彼若先據險要則難與争鋒今以列河等餌當竟來抄掠然後設伏而待必指掌破之廣陽然其計㧞陵果來邀擊破也列河於嶺上部衆皆没謹伏兵發賊遂大敗悉收列河之衆也太}
