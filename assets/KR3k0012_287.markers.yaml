  - {type: variant, offset: 854, length: 1, content: 七, SBCK: 吕僧珎猶守白坂齊主東昬將李居士密覘知城中衆少率銳卒萬人直來薄城僧珎謂將士曰今力旣不敵不可與戰可勿遥射湏至塹裏當并力破之俄而皆越塹拔柵僧珎分人上城矢石俱發自率馬歩三百人出其後守陴者復踰城而下内外齊擊居士等應時奔散三國典略曰侯景叛叚韶夾渦而軍潜於上風縱火景衆􅀐入水出而却走草濕火不復然梁書曰司州刺史陳慶之率兵圍東魏南荆州東魏將堯雄行臺侯景救之雄曰苟堆梁之北靣重鎭因其空虚攻之必尅彼􅀂聞難荆圍自解此所謂機不可失也遂率衆攻之慶之果弃荆州來未至雄䧟其城擒梁鎮將茍元廣又曰陳慶之曹仲宗伐後魏之渦陽渦􅀌和切魏遣將元昭等率兵來援前軍至駞澗去渦陽四十}
