  - {type: variant, offset: 1455, length: 166, content: 伏兵樂鄉城外歆遣軍出拒王濬大敗而還旨等發伏兵隨歆軍而入歆不覺直至帳下虜歆而還故軍中為之謠曰以計伐戰一當萬又曰劉牢之等討妖賊孫恩恩敗走虜男女二十餘萬口一時入海懼官軍之躡乃緣道多棄寶物子女時東土殷實粲麗盈目牢之等遽收歛故恩復得逃入海通典曰孫恩用此術獲免也又曰李矩守滎陽後趙石勒親率兵襲矩矩遣老弱入山令所在散牛馬因設伏以待之賊爭取牛馬伏發, SBCK: 州髙}
