  - {type: variant, offset: 3365, length: 112, content: 幽州斬慕容儁今遇恪而避之人將侮我矣閔威名素振燕眾咸憚之恪謂諸將曰閔勇而無謀一夫之敵耳雖有甲兵不足擊也吳今分為軍三都掎角以待之閔性輕銳又以吾軍勢非敵必出萬死衝吾中軍吾今貫甲厚陣以俟其至諸軍但勵卒從傍須其戰合夾而擊之必剋閔與恪遇, SBCK: 御覽卷第二百八}
