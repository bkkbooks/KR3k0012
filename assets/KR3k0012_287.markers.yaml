  - {type: variant, offset: 842, length: 0, content: '', WYG: 必重兵守涪音浮城以備内道若回黄武正堕其計今以大衆自外水取成都疑兵出内水此制敵之竒也而慮此聲先馳賊審虛實别有函書全封付齡石署函邊曰至白帝乃開諸軍雖進未知處分所由至白帝發書曰衆軍悉從外水取成都臧熹出於中外漢廣使嬴弱乗髙艦十餘由内水向黄武衆軍乃倍道兼行譙縱果備内水使其大將譙道福以重兵戍涪城遣其將侯耀譙詵等率衆萬餘屯彭模夾水為城齡石至彭模諸將以賊水北城險衆多咸欲先攻其南城齡石曰不然雖冦在北今屠南城不足以破北若盡鋭以㧞北壘南城不麾而自㪚也遂攻北城詰朝戰至日昃焚其樓櫓四面並登斬侯耀譙詵仍回軍以麾南城即時㪚潰又曰劉道濟為益州刺史政刑失中羣盗蜂起攻圍州城道濟將裴方明出東門破賊三營斬首數百級賊雖敗已復還合方明復偽出北門廻擊城東大營殺千餘人時天大霧方明等復揚聲出東門而潜自北門出攻城西諸營賊衆大潰於是奔㪚孔融别𫝊曰孔文舉年四嵗時每與諸兄共食梨引小者人問其故答曰我小兒法當取小自此宗族竒之又曰融十嵗隨父詣京師聞漢中李公清節直諒慕之欲徃觀其為人遂造公門謂門者曰我是公通家子孫也門者白之公曰髙明父祖常與孤遊乎跪而應曰先君孔子與明公先李老君同徳比義而相師友則融與公累世通家坐中數十人莫不歎息咸曰異童子也太中大夫陳煒後至曰人小了了或未能佳少府尋聲答曰君子之幼時豈當惠乎李公撫抃大笑顧少府曰髙明長大必為偉器范曄後漢書云詣李膺也何晏别傳曰晏時小養魏宫七八歲便慧心天悟衆無愚智莫不貴異之魏武帝讀兵書有所未解試以問晏晏分散所疑無不氷釋邴原别傳曰原字根矩十一喪父家貧早孤隣舍有書原過其傍而哭師問曰童子何罪原曰一則願其不孤二則羡其得學師亦哀原之言而為之勸童子苟有志我徒相教不求費也於是遂就書一歲之間誦孝經論語管輅别傳曰輅年八九歲便喜仰視星辰得人輙問其名夜不肯寐自言家雞野鵠猶尚知時况于人乎與比隣兒共戲土壤中輙書地作天及日月星辰每答言說事語皆不常宿學耆人不能折之南史曰齊蕭鸞遣其將魯康祚趙公政衆號一萬侵後魏豫州之太倉口魏將傅永率三千人擊之時康祚等軍於淮南永舍於淮北十有餘里永量吳楚之兵好夜斫營即夜分兵為二部出於營外又以賊若夜來必應於度淮之所以火記其淺處永記設伏乃密令人以瓠盛火度淮南岸當深處置之教云若有火起即亦然之其夜康祚公政等果親領兵來斫永營東西二伏夾擊之康祚等奔趨淮水火既竟起不能記其本濟遂覩永所置之火而争度焉水深溺而死斬首者數千級生擒公政康祚人馬墜淮曉而獲其尸又曰東昏侯以劉山陽為巴西郡太守配精兵三千使過荆州就行事蕭頴胄以襲襄陽梁武帝時為雍州刺史知其謀乃遣參軍王天獸龎慶國詣江陵遍與州府人書及山陽西上梁武謂諸將曰荆州本畏襄陽又加以唇亡齒寒自有傷弦之急寧不闇同耶我若總荆州之兵埽定東夏韓白重出不能為計况以無地之昏主哉我能使山陽至荆州便即授首諸君試觀何如及山陽至巴兵梁武復令天獸賫書與頴胄兄弟去後梁武謂張𢎞䇿曰夫}
