  - {type: variant, offset: 196, length: 451, content: 所留礙賊咸以為神也又曰衛瓘既囚鄧艾諸將圖欲劫艾整仗趨瓘營瓘輕出迎之偽作表草將申明艾事諸將信之而止又曰劉琨少負壯氣有縱橫之才善交勝己而頗浮誇與范陽祖逖為友聞逖被用與親故書曰吾枕戈待用志梟逆虜常恐祖生先吾著鞭其意相期如此在晉陽嘗為胡騎所圍數重城中窘迫無計琨乃乘月登樓清嘯胡賊聞之皆悽然長嘆中夜奏胡笳賊又流涕歔欷有懷土之切向曉復吹之賊棄圍而走又曰盧循自廣州南下戎卒十萬舩艫千艘討敗將軍劉毅于桑落逕至江寧循妹夫徐道覆素有膽決知𥙿已還欲乾沒一戰請於新亭白石焚舟而上數道攻之循多謀少決欲以萬全為討固不聽道覆曰我終為盧公所誤事必不成使我得為英雄主驅馳天下不足定也後循戰敗又曰王敦反敦既死以兄子應為嗣沈充自吳率眾萬餘人至與王含等合充司馬顧颺說充曰今日舉大事而天子已扼其喉情離眾沮鋒挫持疑猶豫必致禍敗今若決破柵塘因湖水灌京邑肆舟艦之勢極水軍之用此所謂不戰而屈人之兵上策也藉初至之銳并東南眾軍之力十道俱進眾寡過倍理必摧陷中策也轉禍為福因敗為成召錢鳳計事因斬之以降下策也充不能用颺逃歸于吳含復率眾渡淮蘇峻等逆擊大敗之充亦燒營, SBCK: 功}
