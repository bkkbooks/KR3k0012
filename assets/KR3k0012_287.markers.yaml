  - {type: variant, offset: 2301, length: 0, content: '', SBCK: 便據石錐壁􅋲乃班告曰今且停軍於此以待歩卒兼觀人情向背然後行􅀂送降名者各自還村候臺軍舉烽火亦舉烽應之以明降疑其無應烽者即是不降之村理須殄戮賞賚軍士民遂傳相告報未實降者亦許舉烽一宿之間火遍數百里内寳寅將時圍河東不測所以各自散歸長安賊平􅋲頗有力又曰河北賊葛榮別帥韓樓郝長等有衆數萬屯據薊}
