  - {type: variant, offset: 651, length: 181, content: 周光斬錢鳳吳儒斬充並傳首京師又載記曰符登攻姚萇萇退還安定登就食新平留其大軍于胡空堡率騎萬餘圍萇營四面大哭哀聲動人萇惡之命三軍哭以應登登乃引退又曰河間王顒在關中遣將張方討長沙王乂方率眾自函谷入屯河南入遣左將軍皇甫啇拒之而敗張方率兵入洛陽又奉惠帝討方于城內方軍遙見乘輿於是引退方止之不得眾遂大敗方退壁于十二里橋人情挫衂無復固志或勸方夜遁方曰兵之利鈍是常貴因敗以為成耳, SBCK: 料}
