  - {type: variant, offset: 2599, length: 205, content: 曰後燕慕容盛據遼東其遼西太守李朗陰引後魏軍上表請發兵以拒寇盛曰此必詐也召其使而詰之果驗盡滅其族遣將李旱率騎討之師次建安召旱旋師朗聞其家被誅也擁二千餘戶以自固及聞旱中路而還謂有內變不復為備留其子養守令又迎魏師于北平旱候知之襲剋令友遣禆將追朗及于無支斬之盛謂群臣曰前以追旱還者朗新為叛逆必忌官威一則鳩合同類劫害良善二則亡竄山澤未可卒平故非意而還以盈怠其志卒然掩之必剋之理也群臣皆曰非所及也又曰前秦符堅陷襄陽晉將桓沖, SBCK: 欲}
