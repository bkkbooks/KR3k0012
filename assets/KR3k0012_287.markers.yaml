  - {type: variant, offset: 842, length: 0, content: '', krp: 必重兵守涪城音浮以備内道若向黄武正墮其計今以大衆自外水取成都疑兵出内水此制敵之竒也而慮此聲先馳賊審虚實別有亟書全封付齡石署其邊曰至白帝乃開諸軍雖進未知處分所由至白帝發書曰衆軍悉從外水取成都臧喜出於中外漢廣使羸弱乗髙艦十餘由内水向黃武衆軍乃倍道兼行譙縱果備内水使其大將譙道福以重兵戍涪城遣其將侯耀譙詵等率衆萬餘屯彭摸夾水爲城齡石至彭摸諸將以賊水北城險衆多咸欲先攻其南城齡石曰不然雖㓂在北今屠南城不足以破北若盡銳以拔北壘南城不麾而自散也遂攻北城詰朝戰至日昊焚其樓櫓四靣並登斬侯耀譙詵仍廻軍以麾南城即時散潰又曰劉道濟爲益州刺史政刑失中羣盗蜂起攻圍州城道濟將裴方明出東門破賊三營斬首數百級賊雖敗巳復還合方明復僞出北門廻擊城東大營殺千餘人時天大霧方明等復揚聲出東門而潜自北門出攻城西諸營賊衆大潰於是奔散又曰栁元景爲隋郡太守旣至而蠻反斷驛道欲攻郡郡内力少粮杖又乏元景設方略得六七百人乃分五百人屯驛道或曰蠻將逼城不冝分衆元景曰蠻聞郡遣重戍豈悟城内兵少且表裏合勢於計爲長㑹蠻垂至乃使驛道兵潜出其後戒曰火舉馳進前後俱發蠻衆驚擾投鄖水死者千餘人斬獲數百郡境肅然無復㓂抄又曰檀祗爲廣陵相亡命司馬國璠兄弟自北徐州界聚衆數百潜過淮因天夜隂闇率百許人縁廣陵城得入呌喚直上㕔事祇驚起出門將處分賊射之傷敗却入祇密語左右曰賊乗闇得入掩我不備但打五鼓懼明謂曉於是奔散追討盡獲之又曰宗慤征林邑圍區粟城林邑王范陽邁遣將范毗沙逹率萬餘人來救慤謂諸將曰㓂衆我寡難與爭鋒乃分軍爲數道偃旗卧鼓慤潜進令曰聽吾鼓噪乃出山路榛深賊了不爲備卒見軍至驚懼退走慤乗勝追討散歸林邑仍攻區粟拔之泛海陵山至八象浦有大渠南來注浦宋師沮渠置陣林邑王傾國來逆沮渠不得渡以具裝𬒳象諸將憚之請待前後軍進然後擊之慤曰不然吾巳屠其堅城破其銳衆我氣方厲彼巳破膽一戰可定何疑焉慤以爲外國有師子威服百獸乃制其形與象相禦象果驚奔衆因此潰亂慤率兵直度渠奮擊陽邁遁走其衆一時奔散遂尅林邑南史曰蕭齊將魯康祚趙公政衆號一萬侵後魏荆河州之太倉口魏將傳永率三千人擊之時康祚等軍於淮南永舎於淮北十有餘里永量呉楚之兵好夜斫營即夜分兵爲二部出於營外又以賊若夜來必應於渡淮之所以火記其淺處永旣設伏乃密令人以瓠盛火度淮南岸當深處置之教云若有火起即亦然之其夜康祚公政等果親領兵來斫永營東西二仗夾擊之康祚等奔趣淮水火旣竟起不能記其本濟遂覩永所置之火而爭度焉水深溺而死斬首者數千級生擒公政康祚人馬墜淮曉而獲其尸又曰東昏侯以劉山陽爲巴西太守配精兵三千使過荆州就行事蕭頴胄以襲襄陽梁武帝時爲雍州刺史知其謀乃遣叅軍王天獸龐慶國詣江陵遍與州府人書及山陽西上梁武謂諸將曰荆州夲畏襄陽又加以脣亡齒寒自有傷弦之急寧不闇同耶我若㹅荆州之兵掃定東夏韓白重出不能爲計況以無笇之昬主哉我能使山陽至荆州便即授首諸君試觀何如及山陽至巴兵梁武復令天獸賫書與頴胄兄弟去後梁武謂張弘䇿曰夫}
