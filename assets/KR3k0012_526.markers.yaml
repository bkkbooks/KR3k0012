  - {type: variant, offset: 4273, length: 11, content: 孔光父霸為關內侯食邑霸, SBCK: 凡􅀕祀之義有二一曰報功二曰循先報切以勉力循先以崇恩也黄帝問玄女兵法曰六甲將及夫人姓名服色曰其將皆着赤幘小冠帶白綬絞夫人足皆各象其禽獸足凡欲治致神當於帛}
