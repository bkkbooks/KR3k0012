  - {type: variant, offset: 4223, length: 2, content: 章為, SBCK: 今爲人臣當詣日南日南多瘴氣恐或不還與先人辭於此再拜慷􅁣而起其時州里人在京師者送行見之及觀者莫不歔欷魏志曰管寜恒着布􅃭袴布裙隨時單􅃨岀入閨庭能自柱杖不湏扶侍四時祠􅀕輙自力強改加衣服着絮巾故在遼東所有白布單衣親薦饌跪拜成禮寕少喪母不識形像常特觸如法􅊄然流涕又曰穢南國常用十月􅀕氏晝夜飲酒歌儛名之爲舞天又􅀕虎以爲神吴志曰赤烏年有兩烏銜鵲墮東館丞相朱據燎鵲以􅀕干寳晉紀曰帝配饗魏太祖廟有奏諸功臣從饗者更以官爲次在荀郭之上後魏書曰胡處少􅀌言及父母則􅀂孺子之號燉煌汜潜家善釀酒毎節常送一壷以給􅀕事也沈約宋書曰羊玄保自少至老謹於􅀕奠四時珎新未得祠薦者口不妄甞齊書曰張冲永明八年爲假節􅁥青兾二州行刺史事冲父􅀄卒遺命曰􅀕我必以郷土所産無用牲物冲在鎮西時還吴國取果菜毎至蒸甞輙流涕薦焉家語曰魯}
  - {type: page-break, offset: 4223, content: '', id: KR3k0012_SBCK_526-4a}
