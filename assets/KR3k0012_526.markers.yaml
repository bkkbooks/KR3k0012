  - {type: variant, offset: 4147, length: 0, content: '', SBCK: 畤祠衣皆上赤趙人新垣平以望氣見上言長安東北有神氣神成五采􅀂人冠冕焉或曰東北神明之舎西方神明之墓也張晏曰神明日也日出東北舎謂陽谷日􅃿於西也故曰墓天瑞下冝立祠上}
  - {type: variant, offset: 4147, length: 0, content: '', WYG: 畤祠衣皆上赤趙人新垣平以望氣見上言長安東北有神氣成五采若人冠冕焉或曰東北神明之舍西方神明之墓也神明日也日出東方舍謂暘谷日沒于西墓謂北谷也天瑞下宜立祠上}
