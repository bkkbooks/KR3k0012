  - {type: variant, offset: 1731, length: 2344, content: 年又長也故鬼閔公死時年小弗忌明言其所見也先大後小順也躋聖賢明也言以僖公為聖賢也明順禮也君子以為失禮禮無不順祀國之大事也而逆之可謂禮乎子雖齊聖不先父食久矣故禹不先鯀湯不不先契鯀禹父契湯十二世祖文武不先不窋不窋后稷子也宋祖帝乙鄭祖厲王猶上祖也仲尼曰臧文仲其不智者三作虛器謂居蔡山節藻梲也縱逆祀聽夏父躋僖公祀爰居三不智也海鳥曰爰居止於魯東門外文仲以為神命國人祀之又昭二曰鄭子產聘于晉韓宣子曰寡君寢疾今夢黃熊入寢門其何厲鬼也對曰昔堯殛鯀于羽山其神化為黃熊以入于羽淵實為夏郊三代祀之晉為盟主其或未之祀乎韓宣子祀夏郊晉侯有間又曰晉侯問於史趙曰陳其遂亡乎對曰陳顓頊之後也舜重之以明德至胡公不淫故周賜之姓使祀虞帝臣聞盛德必百世祀虞之世數未也公羊傳僖公曰曷為或言三卜或言四卜三卜禮也四卜非禮也三卜何以禮求吉之道三禘嘗不卜郊何以卜卜郊何禮也禮天子不卜郊卜郊何以非禮魯郊非禮也以魯郊非禮故卜耳昔武王既沒成王幼小周公居攝行天子事制禮作樂致大平有王功周公夢成王以王禮葬之命魯使郊以彰周公之德非正故卜三吉則用之不吉則免牲也魯郊何以非禮天子祭天諸侯祭土土謂社天子有方望之事方望謂郊時所望祭四方群神日月星辰風伯雨師五嶽四瀆及餘山川三十六所也無所不通諸侯山川有不在其封內者則不祭也曷為或言免牲或言免牛免牲禮也免牛非禮也免牛何以非禮傷者曰牛三望者何望祭也然則曷祭祭泰山河海山川有能潤千百里者天子秩而祭之此皆助天宣氣布功故祭天及之觸石而出膚寸而合不崇朝而徧雨乎天下者唯泰山爾河海潤于千里穀梁傳曰宮室不設不可以祭祭者薦其時也薦其敬也薦其義也非享味也又僖公曰夏四月不郊四卜非禮也免牲者為之緇衣纁裳有司玄端奉送至於南郊免牛亦然乃者亡乎人之辭也猶者可以已之辭也國語楚語曰屈到嗜芰有疾召其宗老而屬之屈到楚卿屈蕩之子也芰菱也宗老宗臣屬託也曰祭我必以芰及祥宗老將薦芰屈建命去之建屈到之子子木也宗老曰夫子屬之子木曰不祭然典有之曰國君有牛享大夫有羊饋士有豚犬之奠庶人有魚炙之薦不羞珍異不陳庶侈夫子不以其私欲干國之典遂不用又楚語曰子期祀平王祭以牛俎於王子其楚平王之子結也牛俎致俎於王也王問於觀射父曰祀牲何及對曰祀加于舉舉人君朔望之盛饌也天子舉以太牢祀以會太牢牛羊豕也會亦太牢舉西方之貢諸侯舉以特牛祀以太牢卿舉以少牢祀以特羊大夫舉以特牲祀以少牢特牲豕也士食魚炙祀以特牲庶人食菜祀以魚上下有序則民不慢王曰其小大何如對曰禘郊不過繭栗烝嘗不過握把王曰何其小也對曰天神以精明臨下民故求備物不求豐大是故先王之祀也以一純二精三牲四時五色六律七事八種九祭十日十二辰以致之純心純一也二精玉帛也三牲牛羊豕也四時春秋冬夏也五色五采服也六律黃鍾太簇姑洗蕤賓夷則無射也七事天地人四時之物也八種八音異種也九祭九州之助祭也十日甲至癸也十二辰子至亥也百姓千品萬官億醜兆民經入垓數以奉之百姓百官受民姓也千品姓有徹品十為千品五物之官陪屬萬為萬官官有十醜為億醜天子之田九垓以養兆民王取經入以食萬官也明德以昭之和聲以聽之以告徧至徧至光被四表格于上下也明無不受休天子禘郊之事必自射其牲王后必自親春其粢諸侯宗廟之事必自射牛羊繫豕夫人必自舂其盛況其下之人其誰敢不戰兢以事百神春秋繁露曰大雩者何旱祭也難者曰大旱乃雩祭而請雨大水鳴鼓而攻社天地之所為陰陽之所起也或請焉或怒焉何也曰大旱者陽滅陰也陰滅陰者尊壓卑也固其義也雖大甚拜請之而已無敢有加也大水者陰滅陽也陰滅陽者卑勝尊也故鳴鼓攻之朱絲而脅之又曰古者歲四祭因四時所生熟而祭先祖父母也春曰祠祠者以正月始食韭也夏曰禴禴者以四月煮麪餅也秋曰嘗嘗者以七月嘗黍稷冬曰烝烝者以十月進初稻也論語季氏曰季氏旅於泰山子謂冉有曰汝不能救與旅祭名也諸侯祭山川在其邦內者今陪臣祭泰山非禮也對曰不能子曰嗚呼曾謂泰山不如林放乎孔子意云泰山之神知禮過林放之賢遠祭如在祭神如神在子曰吾不與祭如不祭孝經云春秋祭祀以時思之鄭玄注曰四時變易物有成熟將欲食之先薦先祖念之若生不忘親也爾雅曰春祭曰祠祠之言食也夏祭曰礿新菜可礿也秋祭曰嘗嘗新穀也冬祭曰烝進品物也祭天曰燔柴既祭積薪燒之祭地曰瘞埋既祭埋藏也祭山曰庪懸或庪或懸置之於山山海經曰懸以吉王是也祭川曰浮沉投祭水中或沉或浮也祭星曰布布散祭於地也祭風曰磔今俗當大道中磔狗云止風此其象也是類是禡師祭也師出征伐類於上帝禡於所征之地既伯既禱馬祭也伯祭馬祖也將用馬力必先祭其先祖也禘大祭也五年一祭也繹又祭也祭之明日尋繹復祭周曰繹春秋經曰壬午猶繹商曰肜融音書曰高宗肜日夏曰復胙未見義所出也五經異義曰夏至天子親祀方澤侍中騎都尉賈逵說魯無圜丘方澤之祭者周兼用六代禮樂魯下周用四代其祭天之禮亦宜損於周故二至之曰不祭天地也又曰今易京說臣動養君其義理也必望利下弗養道厥妖國有被髮於野祭者又曰古尚書說非時祭天謂之類言以事類告也肆類於上帝時舜告攝非常祭又曰古周禮說大宗伯凡禮大神享大鬼祭大祗率執事而卜曰大鬼謂先王也史記曰亳人繆忌奏祠太一方曰天神貴者太一太一佐曰五帝古者天子以春秋祭太一東南郊曰一太牢具七日為壇開八通之鬼道於是天子令太祝立其祠長安城東南郊常奉祀如忌方其後人上書言古者天子三年一用太牢祠三一天一地一太一天子許之令太祝領祠之於忌太一壇上如其方後人復有上書言古者天子常以春解祠祠黃帝用一梟破鏡孟康曰梟鳥名也食母破鏡獸名食父黃帝欲絕其類使百物祠皆用之破鏡如貙而虎眼如淳曰漢使東郡送梟五月五日作梟羹以賜百官以其惡鳥故食之冥羊用羊祠服虔曰神名也馬行用一青壯馬太一畢山山君地長用牛武夷君用乾魚陰陽使者以一牛孟康曰陰陽之神也令祠官領之而祠於忌太一壇旁漢書曰高祖沛公祠黃帝祭蚩尤於沛庭而釁鼓旗幟皆赤又曰高祖微時聞魏公子賢及即位每過大梁常祀公子高祖十二年從擊黥布還為公子置守冢歲四時奉祀公子矣又張子房從高帝過濟北果得穀城山下黃石取而葆祠之及留侯死并葬黃石冢伏臘祠黃石留侯, SBCK: ''}
