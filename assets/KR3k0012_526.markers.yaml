  - {type: variant, offset: 4223, length: 6, content: 章為公車丞亡, krp: 今爲人臣當詣日南日南多瘴氣恐或不還與先人辭於此再拜慷慨而起其時州里人}
  - {type: variant, offset: 4225, length: 0, content: '', WYG: 人臣當詣日南日南多瘴氣恐或不還與先人辭於此再拜慷慨而起其時州里人在京師者送行見之及觀者莫不欷歔魏志曰管寧恒著布襦袴布裙隨時單復出入閨庭能自拄杖不須扶持四時祭祀輒自力强改加衣服著紫巾故在遼東所有白布單衣親薦饌拜跪成禮寧少喪母不知形像常時觸發泫然流涕又曰穢南國常用十月祭祀晝夜飲酒歌舞名之為舞天又祭虎以為神呉志曰赤烏年有南鳥銜鵲墮東館丞相朱據燎鵲以祭干寳晉紀曰帝配饗魏太祖廟有奏諸功臣從饗者更以官為次在荀郭之上沈約宋書曰羊𤣥保自少至老謹于祭奠四時珍新未得薦者口不妄甞齊書曰張沖永明八年為假節監青冀二州行刺史事冲父卒遺命曰祭我必以鄉土所産無用牲物冲在鎮西時還呉國取果菜每至丞甞輒涕薦焉家語曰魯}
