  - {type: variant, offset: 4169, length: 0, content: '', SBCK: 神皆合食設左右坐髙祖南面繡幄帳堂上西北隅曲凡黄金釦器毎太牢中分之右辯上帝左辯上后爼餘委積於前殿千斤名曰堆爼子爲昭孫爲穆昭西曲屏風穆東面皆曲凡如髙祖饌陳其后各配其左坐如祖妣之座法又曰原廟一歳十二祠有閏加皆用太牢又曰唯八月飲酎駕夕牲牛以繡衣之皇帝暮視牲以鑑燧取水於月以陽燧取火於日爲明水火左祖以水沷牛右肩手執鸞刀以切牛毛血薦之而即更衣又曰五儀元年儒術奏施行董仲舒請雨事始令丞相以下求雨雪曝城南舞童女禱天神五帝五年始令諸官止雨朱䋲縈社擊鼔攻之又曰􅀕五嶽祠用三正色牲十月涸凍二月解凍皆􅀕祝乗傳車稱使者􅀕四瀆用三正色牲况珪有馬􅀕人}
  - {type: page-break, offset: 4169, content: '', id: KR3k0012_SBCK_526-3a}
  - {type: variant, offset: 4169, length: 0, content: '', WYG: 皆合食設左右坐髙祖南面繡幄帳堂上西北隅曲几黄金釦器每太牢中分之右辦上帝左辦上后俎餘委空積于前殿千斤名曰推俎子為昭孫為穆西曲屏風穆東面皆曲几如髙祖饌陳其后各分其左右坐如祖妣之坐法又曰原廟一嵗十二祠有閏加用太牢又曰惟八月飲酎駕夕牲牛以綉衣之皇帝暮視牲以方諸取水于月以陽燧取火於日為明水火左􅃝以水沷牛右肩手執鸞刀以殺牛取血薦之而即更衣又曰元封六年諸儒奏請施行董仲舒請雨事始令丞相以下求雨曝城南舞童女禱天神成帝五年始令諸官止雨朱繩乃縈社擊皷攻之又曰祭五嶽祀用三正色牲十月涸凍二月解凍皆祭祀乘傳車稱使者祭四凟用三正色牲祀注有馬祭人}
