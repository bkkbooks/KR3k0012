  - {type: variant, offset: 4268, length: 97, content: 此始也又曰孔光父霸為關內侯食邑霸上書求奉孔子祭祀元帝下詔曰其令師襃成君關內侯霸以所食邑戶八百祀孔子焉故霸遣長子福數於魯奉夫子祠又曰初朱邑且死屬其子曰我故為桐鄉嗇夫其吏民愛我必葬桐鄉後世子孫奉尚我, krp: 柱杖}
