  - {type: variant, offset: 4160, length: 0, content: '', SBCK: 元和中行廵狩至沛令使者祠譚冡鄉里以爲榮又曰李通上大司空印綬以特進奉朝請及有司奏請封諸皇子帝感通首創大謀即日封通少子雄爲邵陵侯毎幸南陽常遣使者以牢祀通父冡又曰顯宗拜馬嚴持兵長史將北軍五校士羽林兵三千人屯西河美稷衛護南單于聽置司馬從事牧守謁敬同之將軍勑嚴過武庫􅀕􅃖尤帝親御阿閣觀其士衆時人榮之又曰永平中詔京兆右扶風以中牢祠蕭何霍光出郡錢􅂖給蕭何子孫在三百里内悉令侍祠又曰桓帝􅀄立黄老祠北宫濯龍中以文􅄢爲壇飾淳金釦器采色眩曜祠用三牲太官設􅈿饌作倡樂以求福祥漢皇徳傳云章帝詔使者奉太牢致祠唐堯於成陽雲臺􅀽山松後漢書曰韓卓字子助陳留人臘日奴竊食􅀕其母卓義其心即日免之漢舊儀曰宗廟}
  - {type: page-break, offset: 4160, content: '', id: KR3k0012_SBCK_526-2b}
  - {type: variant, offset: 4160, length: 0, content: '', WYG: 元和中行廵狩至沛令使者祀譚冢鄉里以為榮又曰李通上大司空印綬以特進奉朝請及有司奏請封諸皇子帝感通首創大謀即日封通少子雄為邵陵侯每幸南陽常遣使以太牢祀通父冢又曰顯宗拜馬嚴持兵長史將北軍五校士羽林兵三千人屯西河美稷衛䕶南單于聽置司馬從事牧守謁敬伺之將行敕嚴過武庫祭蚩􅀹親御阿閣觀其士衆時人榮之又曰永平中詔京兆右扶風以中牢祠蕭何霍光出郡錢榖給蕭何子孫在三百里内悉令祀祠又曰桓帝初立黄老祠北宫濯龍中以文􅄢為壇飾金淳釦砌彩色昡曜祠用三牲大官設珍饌作倡樂以求福祥漢王徳傳云章帝詔使者奉太牢致祠唐堯於陽武雲臺袁山松後漢書曰韓卓字子助陳留人蜡日有奴竊食祭其母卓義其心即日免之漢舊儀曰宗廟}
