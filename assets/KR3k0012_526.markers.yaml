  - {type: variant, offset: 4297, length: 0, content: '', SBCK: 得月二十八日表知侯推情欲􅀕先王於河上覽省上下悲傷感切將欲遣禮以紓侯敬恭之意㑹􅀶士鹿優等奏禮如此故冩以下開國承家頋迫禮制惟侯存心與吾同之殷允􅀕徐孺子文曰惟太元六年龍集荒洛冬十月哉生魄試守豫章太守殷君謹遣左右某甲奉清酌薌合一簋單羞再拜奠故聘士豫章徐先生周祗􅀕梁鴻文曰晉隆和四年十一月陳郡周潁文以藴藻行潦祠梁先生殷闡􅀕王東亭文曰公以少牢之奠敬薦東亭王侯之靈蓋聞㓪鑒不塵精金能照伯玊􅀕孫叔敖文曰謹以豊羞􅀕楚令尹孫君之靈眇眇千載悠悠舒荆理無不通事隔者形尚想清塵承風効誠謝惠連􅀕古冢文曰東府掘城北壍入一丈餘得古冢上無封域不用㙛瓦以木爲槨中有二棺正方兩頭無和明器之屬材瓦銅􅃮有數十種刻木爲人長三尺可有二十餘載開見悉識是人形以物棖撥之應手􅁅㓕棺上有五銖錢百餘枚水中有甘蔗節及梅李核皆浮岀而不甚爛壞銘志不存世代不可得而知之公命城者改埋於東崗􅀕以豚酒旣不知}
