  - {type: variant, offset: 744, length: 706, content: 下之際焉此之謂十倫倫猶義也又祭統曰凡祭有四時春祭曰杓夏祭曰禘秋祭曰嘗冬祭曰烝謂夏殷時禮也礿禘陽義也嘗烝陰義也禘者陽之盛也嘗者陰之盛也故曰莫重於禘嘗夏者尊卑著而秋萬物成又祭統曰周公旦有勳勞於天下成王而欲尊魯故賜之以重祭外祭則郊社是也內祭則大嘗禘是也言此者善周公功也又表記曰祭極敬不繼之以樂朝極辯不繼之以倦極猶盡也辯分別政事也祭義曰祭之日樂與哀半饗之必樂已至必哀又表記曰子曰后稷之祀易富也其辭恭其欲儉其祿及子孫富之言備也以傳世之祿兵倫者之祭易備也禮稽命徵曰天子祭天地宗廟六宗五嶽得其宜則五穀豐雷雨時至四夷貢物青白黃馬黃龍翔黃雀集坤為地得宜則五穀豐矣土精上為軒轅主雷雨得宜故又應時至也士瀆四輔故四夷各貢方色之馬也精為馬不言赤黑義足通也黃龍黃雀皆土精也周易豫象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考又困九五曰利用祭祀祭祀所以受福也象曰利用祭祀受福也又既濟曰九五東鄰殺牛不如西鄰之禴祭實受其福牛際之盛者也禴祭之薄者也居既濟之時而處尊位物皆濟矣將何為焉其所務者祭祀而已祭祀之盛莫盛脩德故沼沚之毛蘋繁之菜可羞於鬼神故黍稷非馨明德惟馨是以東鄰殺牛不如西鄰之禴祭實受其福也又曰觀盥而不薦有孚顒若王道之可觀者莫盛乎宗廟宗廟之可觀者莫盛於盥也至薦簡略不足復觀又萃曰萃亨王假有廟假至也王以聚至有廟也彖曰王假有廟致孝享也全聚乃得致孝之享也左傳桓公曰凡祀啟蟄而郊言凡祀通下三句天地宗廟之事啟蟄夏正建寅之月祀天南郊龍見而雩龍見建巳之月蒼龍宿之體昏見東方萬物始盛時雨而大故祭天遠為百穀祈膏雨始殺而嘗建酉之月陰氣始殺嘉穀始熟故薦嘗於宗廟閉蟄而丞建亥之月昆蟲閉戶萬物皆成可薦者眾故烝祭宗廟又僖上曰五年晉人執虞公而脩虞祀歸其職貢於王虞所命也又僖, SBCK: ''}
