  - {type: variant, offset: 4, length: 1, content: 祭, SBCK: 夷莫不脩之下至禽獸犲􅆩有􅀕應劭曰今孟春􅆩􅀕魚季秋犲􅀕獸是以聖王爲之典}
  - {type: variant, offset: 6, length: 31, content: 中又祭義曰祭不欲數數則煩煩則不敬祭不欲䟽䟽則怠怠則忘是故君子合, SBCK: 焉􅁗襄公攻戎救周列爲}
  - {type: variant, offset: 6, length: 1, content: 中, WYG: 下漢書郊祀志曰洪範八政三曰祀祀所以昭事通神明也旁及四夷莫不修之下至禽獸豺獺有祭應劭曰孟春獺祭魚季秋􅉘祭獸是以聖王為之典禮焉}
  - {type: variant, offset: 6, length: 2, content: 中又, krp: 下漢書郊祀志曰洪範八政三曰祀祀者所以昭孝事祖通神明也旁及四夷莫不脩之下至禽獸犲獺有}
