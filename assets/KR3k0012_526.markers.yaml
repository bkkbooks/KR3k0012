  - {type: variant, offset: 4286, length: 0, content: '', SBCK: 諸神名如法􅀕䕃齊事六曰見形六十日一􅀕合諸神􅀕之􅀕法脯長一九廣三寸白茅爲籍編以青􅁝籍長二尺四寸廣六寸餅􅀥栗并脯置藉上柸皆黒中以丹沙九兩盛米囊九枚置北斗座上中爲九星六甲坐外四面十二座座前一柸受道者壇東北􅀕南向再拜祝軍令曰金皷幢麾隆衡皆以立秋日祠先時一曰主者請祠其主者奉祠􅀂出征有所剋獲還亦祠向敵祠血于鍾鼔秋祠及有所尅獲還但祠不血鍾皷祝文某官使主者某敢告隆衡金皷幢麾夫軍武之器者所以正不義爲民除害也謹以立秋之日㓗牲􅁰稷旨酒而敬薦之又曰常以己丑日祠牛馬先祝文曰某月己丑某甲敢告馬牛先馬者兵之道牛者軍農之用謹㓗牲􅁰稷旨酒敬而薦之又曰軍行濟河主者常先白沉壁文曰某王使者某甲敢告于河賤臣某甲作亂天子使某帥衆濟河征討醜􅀋故以壁沉唯爾有神裁之曹植}
  - {type: page-break, offset: 4286, content: '', id: KR3k0012_SBCK_526-7a}
  - {type: variant, offset: 4286, length: 0, content: '', WYG: 諸神名姓如法祭法事六曰見形六十日一祭合諸神祭之祭法鋪長一九廣三寸白茅為籍編以青絲繫籍長二尺四寸廣六寸餅棗栗并脯置籍上杯皆黑中以丹砂九兩盛米嚢九枚置北斗座上中為九星六甲坐外四面十二坐前一杯受道者壇東北祭南向再拜祝軍令曰金鼓幢麾隆衡皆以立秋日祠先時一日主者請祠其主者奉祠若出征有所尅獲還亦祠向敵祠血于鐘鼓秋祠及有所尅獲還但祠不血鐘鼓祝文某官使主者某敢告隆衡鐘鼓幢麾夫軍武之器者所以正不義為民除害也謹以立秋之日潔牲稷旨酒而敬薦之又曰常以己丑日祠牛馬先祝文曰某月己丑某甲敢告牛馬先馬者用兵之道牛者軍農之用謹潔牲黍稷旨酒敬而薦之又曰軍行濟河主者常先白沉璧文曰某王使者某甲敢告于河賤臣某甲作亂天子使某師衆濟河以討醜類故以沉璧惟爾有神裁之曹植}
