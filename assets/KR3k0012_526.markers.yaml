  - {type: variant, offset: 1151, length: 186, content: 既濟之時而處尊位物皆濟矣將何為焉其所務者祭祀而已祭祀之盛莫盛脩德故沼沚之毛蘋繁之菜可羞於鬼神故黍稷非馨明德惟馨是以東鄰殺牛不如西鄰之禴祭實受其福也又曰觀盥而不薦有孚顒若王道之可觀者莫盛乎宗廟宗廟之可觀者莫盛於盥也至薦簡略不足復觀又萃曰萃亨王假有廟假至也王以聚至有廟也彖曰王假有廟致孝享也全聚乃得致孝之享也左傳桓公曰凡祀啟蟄而郊言凡祀通下三句天地宗廟之事啟蟄夏正建寅之月祀天, WYG: 臨菑}
