  - {type: variant, offset: 8, length: 0, content: '', WYG: 曰秦襄公攻戎救周列為諸侯居西自以為主少昊之神作西畤白帝其牲用駠駒黄牛羝羊各一云其后十四年秦文公東獵汧渭之間卜居之而告文公夢蛇自天下屬地其口止于鄜衍李竒曰鄜音孚文公問於史淳淳曰此上帝之徵君其祀之于是作鄜畤用三牲郊}
