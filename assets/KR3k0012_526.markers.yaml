  - {type: variant, offset: 4390, length: 0, content: '', krp: 輙自力強改加衣服着絮巾故在遼東所有白布單衣親薦饌跪拜成禮寕少喪母不識形像常特觸如法泫然流涕又曰穢南國常用十月祭氏晝夜飲酒歌儛名之爲舞天又祭虎以爲神吴志曰赤烏年有兩烏銜鵲墮東館丞相朱據燎鵲以祭干寳晉紀曰帝配饗魏太祖廟有奏諸功臣從饗者更以官爲次在荀郭之上後魏書曰胡處少孤言及父母則若孺子之號燉煌汜潜家善釀酒毎節常送一壷以給祭事也沈約宋書曰羊玄保自少}
  - {type: variant, offset: 4391, length: 0, content: '', krp: 老謹於祭奠四時珎新未得祠薦者口不妄甞齊書曰張冲永明八年爲假節監青兾二州行刺史事冲父𥘉卒遺命曰祭我必以郷土所産無用牲物冲在鎮西時還吴國取果菜毎至蒸甞輙流涕薦焉家語曰魯公索氏將祭而亡其下牲孔子聞之曰公索氏不及二年必亡矣後一年而亡孔叢于曰元和二年春帝東廵狩還過魯幸闕里以太牢祠孔子及七十二子作六代之樂大㑹孔氏男子二十巳上者六十三人命儒者講論尸子曰先王之祠禮也天子祭四極諸侯祭山川大夫祭五祀士祭其親也白虎通曰王者祭宗廟親自取禽者尊重先祖必欲自射加功力又曰王制曰春薦韮夏薦麥秋薦黍冬薦稻韮以卵麥以魚黍以豚稻以鴈春曰祠者物微故祠名之夏曰礿者麥熟進之秋曰甞者新榖熟冬曰蒸蒸者爲衆冬之時物成者衆益都耆舊傳曰蜀郡張寛字叔文漢武帝時爲侍中從祀甘泉至渭橋有女子浴於渭水乳長七尺上怪其異遣問之女曰帝後第七車知我所來時寛在第七車對曰天星主祭祀者齋戒不嚴則女人星見汝南先賢傳曰薛苞歸先人冢側坊中種稻以祭祀芋以充飢躭詩恱禮玄虚無爲舉孝廉賢良方正皆不就王歆之神境記曰九疑山旣岀林過溪望見舜廟在郡山之下而挿搆水際杳若靈居矣余親負勁䇿致祠靈堂乃躬就齋㓗奉奠其宵水月如鏡焉澗微響乃聞廟裏若有絃歌者聲調如近察復𬗟邈此其五絃之音南風之響乎解道虎齊記曰臨淄城南十五里天齊淵五泉並出有異於常故廟屋以同瓦有天齊字在齊八祠祠天於此故名云越絶書曰越王旣得平吴春祭三江秋祭五湖因以其時爲之立祠垂之來世傳之萬載鄰邦樂德皆來取之吴越春秋曰夫差帥諸羣臣出國東祠子胥江水濵諸臣並在夫差乃言曰寡人蒙先王之遺恩爲千乗之主昔不聽相國之言乃用䜛佞之辭至令相國逺没江海自亡巳來濛濛惑惑如霧蔽日莫誰與言泣下沾衿哀不自勝左右羣僚莫不悲傷十二州記曰昔禹治洪水旣畢乃乗橋車到鍾山祠上帝於北河歸大功于九河也襄陽記曰諸葛亮𥘉亡所在各求爲立廟朝議以不合百姓遂因時節私祭之於道陌也摯虞雜祀議曰故事祀臯陶於廷尉寺祭先聖於大學也桓子新論曰昔楚靈王驕逸輕下簡賢務鬼信巫祝之道齋戒㓗鮮以祀上帝禮羣神躬執羽紱起舞壇前吴人來攻其國人告急而靈王鼔舞自若頋應之曰寡人方祭上帝樂明神當蒙福祐焉不敢赴救而吴兵遂至俘獲其太子及后姬以下甚可傷論衡曰魯文公逆祀去者三人定公順祀叛者五人貫於俗者謂則禮爲非曉禮者寡則知是者稀又曰凡祭祀之義有二一曰報功二曰循先報切以勉力循先以崇恩也黄帝問玄女兵法曰六甲將及夫人姓名服色曰其將皆着赤幘小冠帶白綬絞夫人足皆各象其禽獸足凡欲治致神當於帛上書諸神名如法祭䕃齊事六曰見形六十日一祭合諸神祭之祭法脯長一九廣三寸白茅爲籍編以青絲籍長二尺四寸廣六寸餅棗栗并脯置藉上柸皆黒中以丹沙九兩盛米囊九枚置北斗座上中爲九星六甲坐外四面十二座座前一柸受道者壇東北祭南向再拜祝軍令曰金皷幢麾隆衡皆以立秋日祠先時一曰主者請祠其主者奉祠若出征有所剋獲還亦祠向敵祠血于鍾鼔秋祠及有所尅獲還但祠不血鍾皷祝文某官使主者某敢告隆衡金皷幢麾夫軍武之器者所以正不義爲民除害也謹以立秋之日㓗牲黍稷旨酒而敬薦之又曰常以己丑日祠牛馬先祝文曰某月己丑某甲敢告馬牛先馬者兵之道牛者軍農之用謹㓗牲黍稷旨酒敬而薦之又曰軍行濟河主者常先白沉壁文曰某王使者某甲敢告于河賤臣某甲作亂天子使某帥衆濟河征討醜類故以壁沉唯爾有神裁之曹植求祭先王表臣雖比拜表自計違逺巳來以踰旬日垂竟夏節方到臣悲感有念先王公以夏至日終是以家俗不以夏日祭至於先王自可以令辰告祠臣雖卑鄙實禀體於先王自臣雖貧寠蒙陛下厚賜足供太牢之具臣欲祭先王於北河之上羊猪牛臣自能辦否者臣縣自有先王喜鰒臣前以表得徐州臧霸二鰒百枚足自供事請水瓜五枚計先王崩來未能半歳臣實欲告敬且欲復盡哀博士鹿優韓蓋等以爲禮公子不得禰先君公子之子不得祖諸侯謂不得立其廟而祭之也禮又曰庶子不得祭宗詔曰得月二十八日表知侯推情欲祭先王於河上覽省上下悲傷感切將欲遣禮以紓侯敬恭之意㑹博士鹿優等奏禮如此故冩以下開國承家頋迫禮制惟侯存心與吾同之殷允祭徐孺子文曰惟太元六年龍集荒洛冬十月哉生魄試守豫章太守殷君謹遣左右某甲奉清酌薌合一簋單羞再拜奠故聘士豫章徐先生周祗祭梁鴻文曰晉隆和四年十一月陳郡周潁文以藴藻行潦祠梁先生殷闡祭王東亭文曰公以少牢之奠敬薦東亭王侯之靈蓋聞㓪鑒不塵精金能照伯玊祭孫叔敖文曰謹以豊羞祭楚令尹孫君之靈眇眇千載悠悠舒荆理無不通事隔者形尚想清塵承風効誠謝惠連祭古冢文曰東府掘城北壍入一丈餘得古冢上無封域不用㙛瓦以木爲槨中有二棺正方兩頭無和明器之屬材瓦銅􅃮有數十種刻木爲人長三尺可有二十餘載開見悉識是人形以物棖撥之應手灰㓕棺上有五銖錢百餘枚水中有甘蔗節及梅李核皆浮岀而不甚爛壞銘志不存世代不可得而知之公命城者改埋於東崗祭以豚酒旣不知其名字近逺故假爲之號曰冥寞君云爾揚泉請辭曰古不墓祭葬於中原而廟在大門裏不敢外其親平明出葬曰中反虞不敢一日使神無依也周衰禮廢立寢於廟墓漢因而不改以先帝衣冠四時上盥水進菓實而禘祫祭祀皆於宗廟及其末因寢之在墓咸徃祭焉蓋由京師三輔酋豪大姓力強財冨婦女贍侈車兩相追宿止墓下連日厭飫遂以成俗迄乎}
  - {type: variant, offset: 4392, length: 2, content: 不絕, krp: 日夫死者骨肉歸乎土神而有靈豈其守夫敗壤而繫乎草莽哉唐書曰王義方𥘉爲太子校書魏徴張亮皆厚禮之亮誅坐與交逰貶授儋州吉安丞行至南海舟人將以酒脯致祭義方曰黍稷非馨義在明徳乃酌水而祭太平御覽卷第五百二十六}
