  - {type: variant, offset: 4181, length: 7, content: 刃向乘輿車馬驚, SBCK: 各王封􅀕叅辰星辰於池陽谷曰夾道左右爲壇營覆地各周三十六里又曰􅀕西王母於石室皆在所二千石令長奉祠漢五年脩復周室舊祀祀后稷於東南常以八月􅀕一太牢舞者七十二人冠者五六三十人童于六七四十二人爲民祈農報功又曰凡聖王之法追􅀕天地日月星辰山川萬神皆古之人也能紀天地五行氣奉其功以成人者也故其􅀕祀皆以人事之禮食之所食也非􅀕食天與土地金木水火石也又􅀕三皇五帝九皇六十四民皆古帝王凡八十一姓漢末英雄記曰}
  - {type: page-break, offset: 4181, content: '', id: KR3k0012_SBCK_526-3b}
  - {type: variant, offset: 4181, length: 7, content: 刃向乘輿車馬驚, WYG: 各王封祭參辰三辰于池陽谷口夾道左右為壇營覆地各周三十六里又云祭西王母于石室皆在所二千石令長奉祀漢五年復修周室舊祠祀后稷于東南常以八月祭以太牢舞者七十二人冠者五六三十人童子六七四十二人為民祈農報功又曰聖王之法追祭天地日月星辰山川萬神皆古之人能紀天地五行氣奉成其功以成人者也故其奉祀皆以人事之禮食之非祭祀天與土地金木水火石也又曰祭三皇五帝九皇六十四辰皆古帝王凡八十一姓也漢末英雄記曰}
