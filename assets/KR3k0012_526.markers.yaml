  - {type: variant, offset: 4287, length: 2, content: 奉孔, SBCK: 􅀕先王表臣雖比拜表自計違逺巳來以踰旬日垂竟夏節方到臣悲感有念先王公以夏至日終是以家俗不以夏日􅀕至於先王自可以令辰告祠臣雖卑鄙實禀體於先王自臣雖貧寠蒙陛下厚賜足供太牢之具臣欲􅀕先王於北河之上羊猪牛臣自能辦否者臣縣自有先王喜鰒臣前以表得徐州臧霸二鰒百枚足自供事請水􅀲五枚計先王崩來未能半歳臣實欲告敬且欲復盡哀􅀶士鹿優韓蓋等以爲禮公}
  - {type: page-break, offset: 4287, content: '', id: KR3k0012_SBCK_526-7b}
  - {type: variant, offset: 4287, length: 0, content: '', WYG: 祭先王表臣植百拜表自計違逺以來已踰旬日垂竟夏節方到臣悲傷有思先王公夏至日終是以家俗不以夏日祭至于先王自可以今辰告祠臣雖卑鄙實禀體于先王自臣雖貧窶䝉陛下厚賜足供太牢之具臣欲祭先王于北河之上羊猪牛臣能自辦者臣縣自有先王喜鰒臣前以表得徐州臧霸二鰒百枚足自供事請水𤓰五枚計先王崩來未能半嵗臣實欲告敬且欲復盡哀博士鹿優韓盖等以為禮公子不得稱先君先君公子之子不得祖諸侯謂不得廟而祭之也禮又曰庶子不得祭宗廟詔曰得月二十八日表知侯推情欲祭先王于河上覽省上下悲傷感切將欲遣禮以紓侯恭敬之意㑹博士鹿優等奏禮如此故寫以下開國承家顧廹禮制惟侯存心與吾同之殷允祭徐孺子曰惟太元六年龍集荒落冬十月哉生魄試守豫章太守殷君謹遣左右某甲}
  - {type: page-break, offset: 4287, content: '', id: KR3k0012_WYG_526-11a, image: WYG0897/WYG0897-0675c.png}
  - {type: variant, offset: 4288, length: 2, content: 孔子, WYG: 清酌薌合一簋單羞再拜奠故聘士豫章徐先生周祇祭梁鴻文曰晉隆和四年十一月陳郡周頴文以藴藻行潦祀梁先生殷闡祭王東亭文曰今以少牢之奠敬薦東亭王侯之靈伯王祭孫叔敖文曰謹以豐修祭楚令尹孫君之靈渺渺千載悠悠舒經理無不通事隔者形尚想清塵承風效誠謝惠連祭古塚文曰東府掘城北塹入一丈餘得古塚上無封域不用磚瓦以木為槨中有二棺正方兩頭無和明器之屬材瓦銅漆有數十種刻木為人長三尺可有二十餘頭初開見悉識是人形以物棖撥之應手灰滅棺上有五銖錢百餘枚水中有甘蔗節及梅李核皆浮出而不甚爛壊銘志不存世代不可得而知之公命城者改埋于東崗祭以豚酒既不知其名字逺近故假為之號曰冥寞君云耳楊泉請辭曰古不墓祭𦵏于中原而廟在大門裏不敢外其親平明出𦵏日中反虞不敢一日使神無依也自周衰禮廢立寢于廟墓漢興而不改以先帝衣冠四時上食進果實而禘祫}
  - {type: page-break, offset: 4288, content: '', id: KR3k0012_WYG_526-11b, image: WYG0897/WYG0897-0675d.png}
