  - {type: variant, offset: 4226, length: 0, content: '', SBCK: 索氏將􅀕而亡其下牲孔子聞之曰公索氏不及二年必亡矣後一年而亡孔叢于曰元和二年春帝東廵狩還過魯幸闕里以太牢祠孔子及七十二子作六代之樂大㑹孔氏男子二十巳上者六十三人命儒者講論尸子曰先王之祠禮也天子􅀕四極諸侯􅀕山川大夫􅀕五祀士􅀕其親也白虎通曰王者􅀕宗廟親自取禽者尊重先祖必欲自射加功力又曰王制曰春薦韮夏薦麥秋薦􅁰冬薦稻韮以􅆑麥以魚􅁰以豚稻以鴈春曰祠者物微故祠名之夏曰礿者麥熟進之秋曰甞者新榖熟冬曰蒸蒸者爲衆冬之時物成者衆益都􅂄舊傳曰蜀郡張寛字叔文漢武帝時爲侍中從祀甘泉至渭橋有女子浴於渭水乳長七尺上怪其異遣問之女曰帝後第七}
  - {type: page-break, offset: 4226, content: '', id: KR3k0012_SBCK_526-5a}
  - {type: variant, offset: 4226, length: 0, content: '', WYG: 索氏將祭而亡其下牲孔子聞之曰公索氏不及三年必亡矣後一年而亡孔叢子曰元和二年春帝東巡狩還過魯幸闕里以太牢祠孔子及七十二弟子作六代之樂大㑹孔氏男子二十以上者六十三人命儒者講論益都耆舊傳曰蜀郡張寛字淑文漢武時為侍中從上祀甘泉至渭橋有女子浴于渭水乳長七尺上怪其異遣問之女曰帝後第七}
  - {type: variant, offset: 4227, length: 1, content: 丞, SBCK: 知我所來時寛在第七車對曰天星主􅀕祀者齋戒不嚴則女人星見汝南先賢傳曰薛苞歸先人冢側坊中種稻以􅀕祀芋以充飢躭詩恱禮玄虚無爲舉孝廉賢良方正皆不就王歆之神境記曰九疑山旣岀林過溪望見舜廟在郡山之下而挿搆水際杳􅀂靈居矣余親􅀒勁䇿致祠靈堂乃躬就齋㓗奉奠其宵水月如鏡焉澗微響乃聞廟裏􅀂有絃歌者聲調如近察復􅃡邈此其五􅃶之音南風之響乎解道虎齊記曰臨淄城南十五里天齊淵五泉並出有異於常故廟屋以同瓦有天齊字在齊八祠祠天於此故名云越絶書曰越王旣得平吴春􅀕三江秋􅀕五湖因以其時爲之立祠垂之來世傳之萬載鄰􅀖樂德皆來取之吴越春秋曰夫差帥諸羣臣出國東祠子胥江水濵諸臣並在夫差乃言曰寡人蒙先王之遺恩爲千乗之主昔不聽相國之言乃用䜛佞之辭至令相國逺没江海自}
  - {type: page-break, offset: 4227, content: '', id: KR3k0012_SBCK_526-5b}
