  - {type: variant, offset: 277, length: 692, content: 闔戶若食間則有出戶而聽之又祭義曰孝子將祭慮事不可以不豫比時具物不可以不備虛中以治之此時猶先時也虛中言不兼念餘事宮室既脩牆屋既設百物既備夫婦齋戒沐浴盛服奉承而進之洞洞乎屬屬乎如弗勝如將失之其孝敬之心至也與脩設謂掃除及黝堊薦其薦俎序其禮樂備其百官奉承而進之百官助主人進之於是諭其志意以其慌惚以與神明交庶或饗之庶或饗之孝子之志也又志統曰凡治人之道莫急於禮禮有五經莫重於祭禮有五經謂吉禮凶禮賓禮軍禮嘉禮也莫重於祭謂以吉禮為首也夫祭者非物自外至者也自中出生於心也心怵而奉之以禮是故唯賢者能盡祭之義怵感念親之貌也賢者之祭也必受其福非世所謂福也福者備也備者百順之名也無所不順者之謂備言內盡於己而外順於道也忠臣以事其君孝子以事於親其本一也又祭統曰祭者所以追養繼孝也孝者畜也順於道不逆於倫是之謂畜畜謂順於德教是故孝子之事親也有三道焉生則養歿則喪喪畢則祭養則觀其順也喪則觀其哀也祭則觀其敬而時也盡此三道者孝子之行也歿終也又祭統曰夫祭有十倫焉見事鬼神之道焉見君臣之義焉見父子之倫焉見貴賤之等焉見親踈之殺焉見爵賞之施焉見夫婦之別焉見政事之均焉見長幼之序焉見天下之際焉此之謂十倫倫猶義也又祭統曰凡祭有四時春祭曰杓夏祭曰禘秋祭曰嘗冬祭曰烝謂夏殷時禮也礿禘陽義也嘗烝陰義也禘者陽之盛也嘗者陰之盛也故曰莫重於禘嘗夏者尊卑著而秋萬物成又祭統曰周公旦有勳勞於天下成王而欲尊魯故賜之以重祭外祭則郊社是也內祭則大嘗禘是也言此者善周公功也又表記曰祭極敬不繼之以樂朝極辯不繼之以倦極猶盡也辯分別政事也祭義曰祭之日樂與哀半饗之必樂已至必哀又表記曰子曰后稷之祀易富也其辭恭其欲儉其祿及子孫富之言備也以傳世之祿兵倫者之祭易備也禮稽命徵, WYG: ''}
