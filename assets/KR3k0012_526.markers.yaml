  - {type: variant, offset: 4302, length: 5, content: 君關內侯霸, SBCK: 俗迄乎今日夫死者骨肉歸乎土神而有靈豈其守夫敗壤而繫乎草莽哉唐書曰王義方􅀄爲太子校書魏徴張亮皆厚禮之亮誅坐與交逰貶授儋州􅁻安丞行至南海舟人將}
