  - {type: variant, offset: 235, length: 174, content: 位周還出戶肅然必有聞乎其容聲出戶而聽愾然必有聞乎其歎息之聲周還出戶謂薦設時也無戶者一闔戶若食間則有出戶而聽之又祭義曰孝子將祭慮事不可以不豫比時具物不可以不備虛中以治之此時猶先時也虛中言不兼念餘事宮室既脩牆屋既設百物既備夫婦齋戒沐浴盛服奉承而進之洞洞乎屬屬乎如弗勝如將失之其孝敬之心至也與脩設謂掃除及黝堊薦其薦俎序其禮樂備其百官奉承而進之百官助主人進, SBCK: 祠}
