  - {type: variant, offset: 4149, length: 1, content: 孟, WYG: 合符應于是作渭陽五帝廟同宇韋昭曰宇謂上同下異禮所謂復廟重屋也帝一殿面各五門各如其帝色祠所用及儀亦如雍五畤}
  - {type: variant, offset: 4149, length: 1, content: 孟, krp: 合符應於是作渭陽五帝廟同宇韋昭曰宇謂上同下異禮所謂複廟同屋也帝一殿面五門各如其帝色祠所用及儀亦如雍五畤明年}
  - {type: variant, offset: 4152, length: 3, content: 日荅禮, SBCK: 月文帝親拜霸渭之㑹以郊見渭陽五帝五帝廟臨渭其北穿蒲地溝水爟火舉而祠􅀂光輝然屬天}
  - {type: variant, offset: 4152, length: 4, content: 日荅禮焉, WYG: 月文帝親拜霸渭之㑹以郊見渭陽五帝五帝廟臨清渭其北穿蒲地溝水灌火舉而祠若光輝然屬天馬于是貴平至上大夫賜累千金而使博士諸生刪六經中作王制謀議巡狩封禪事文帝出長門若見五人于道北遂因直其立五帝壇祠以五牢東觀漢記曰建武三年上幸舂陵祠圜廟大置酒與舂陵父老故人為樂}
