  - {type: variant, offset: 424, length: 5, content: 夕和乎酸鹹, SBCK: 好謙前丗貴戚明戒也保身全已豈不樂哉後列曰班超爲都護以任尚代超尚謂超曰君在外國三十餘年而小人猥承君後冝以誨之超曰塞外吏士夲非孝子順孫皆以罪過徒補邊而蠻夷懷鳥獸之心難養易敗今君情嚴急水清無大魚察政不得下冝陽爲簡易寛小過繩大罪而巳又曰馬援岀屯襄國詔百官祖道援謂}
