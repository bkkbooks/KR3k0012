  - {type: variant, offset: 350, length: 0, content: '', WYG: 賢而任之耶上曰賢之房曰然則何以知其不賢也曰以其時亂而君危知之房曰今治乎亂乎上曰亂房曰然則有所任乎上曰幸其未至於彼也房曰臣恐後世之視今猶今之視古也元帝嘿然又曰韓延壽善為政坐法棄市吏民數千人送至渭上老小扶持車轂争奉酒炙延壽不忍拒逆為飲酒石餘使掾吏分謝吏民百姓莫不流涕延壽三子皆為郡吏臨死屬其子勿為吏以巳為戒子皆以父言去官東觀漢記曰馮勤遷司徒是時三公多見罪退上欲令以善自終乃因讌見從容戒之曰朱浮上不忠於君下陵轢同列終以中傷放逐受誅雖復追加賞賜不足以償不訾之身忠臣孝子鑒照前世以為鑒戒能盡忠於國勤事}
  - {type: page-break, offset: 350, content: '', id: KR3k0012_WYG_458-8b, image: WYG0897/WYG0897-0199b.png}
  - {type: variant, offset: 351, length: 1, content: 患, WYG: 二則爵賞光乎當世名利垂於}
  - {type: punctuation, offset: 352, content: ，, id: KR3k0012_CHANT_458-bkkpn104}
  - {type: 'tls:seg', offset: 352, content: '', id: KR3k0012_CHANT_458-4a.22}
  - {type: variant, offset: 353, length: 4, content: 知五尺童, WYG: 朽可不勉哉又曰樊宏為人謙慎常戒其子曰富貴盈溢未有能終者天道惡滿而好謙前世貴戚明戒也保身全已豈不樂哉後漢書班超為都䕶以任尚代超尚謂超曰君在外國三十餘年而小人猥承君後宜以誨之超曰塞外吏士本非孝子順孫皆以罪過徙補邊而遠人懷鳥獸之心難養易敗今君情嚴急水清無大魚察政不得下和宜蕩佚簡易寛小過䋲大罪而已又曰馬援出屯襄國詔百官祖道援謂黄門侍郎梁松竇固曰凡人貴富當使可賤如卿等欲不可復賤居髙自持勉思鄙言松後果貴滿致災固亦幾不免後漢書馬援兄子嚴敦並喜通輕俠援前在交趾遺書戒之曰吾欲汝曹聞人過失如聞父母之名耳可得聞而口不可得言也好議論人長短是非正法此吾所大惡也寧死不願聞子孫有此行又曰徐穉嘗為太尉黄瓊所辟不就及瓊卒歸葬穉乃負粮徒步到江夏赴之設鷄酒薄祭哭卒而不告姓名時㑹者四方名士郭林宗等數十人聞之疑其穉也乃選能言生茅容輕騎追之及於塗容為設飯共言稼穡之事臨决去謂曰為我謝郭林宗大厦將顛非一䋲所維何為栖栖不遑寧處也魏志曰傅嘏與鍾㑹從平毌邱儉後㑹有自矜色嘏戒之曰子志大量小而勲業難為也可不慎哉又曰吏部尚書何晏詣管輅問曰連夢青蠅數頭來在鼻上驅之不肯去有何意故輅曰今君侯位重山岳勢若雷霆而懐德者鮮畏威者衆殆非小心翼翼多福之人又鼻者艮此天中之山髙而不危所以長守富也今有蠅而集焉位峻者顛輕毫者亡不可不慎又曰曹爽飲食衣服擬於乗輿擅取武庫禁兵曹羲深以為憂數諌止之又著書三篇陳驕淫盈溢之致覆敗辭㫖甚切不敢斥爽託戒諸}
