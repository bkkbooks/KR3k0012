  - {type: variant, offset: 1575, length: 273, content: 之言未卒而天大雨方千里何為有德於天而惠施民也今主君以白鴈之故而欲煞人無異於虎狼梁君援手與上車歸入郭門呼萬歲曰樂哉今日也人獵皆禽獸吾獵獨得善言而歸又曰齊桓公讀書堂上輪扁斲輪堂下釋椎鑿而上問桓公曰敢問公之所讀者何言耶公曰聖人之言也曰聖人在乎公曰已死矣然則君之讀者古人之糟粕也列子曰晉文公出欲會伐衛公子鉏仰而笑公問何笑曰笑臣鄰之人也臣之鄰人有送其妻適家者道見柔婦悅而與言然顧視其妻亦有招之者矣竊笑此也公悟其言乃止引師還未至而有伐其北鄙者韓子曰衛靈公之時彌子瑕有寵專於衛國侏儒有見公者曰臣之夢賤矣公曰奚夢曰見竈為見公也公怒曰吾聞夢見人主者見日奚為見竈對曰, SBCK: 尔}
