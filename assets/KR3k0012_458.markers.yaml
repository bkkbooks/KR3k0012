  - {type: variant, offset: 32, length: 0, content: '', WYG: 君子之樞機樞機之發榮辱之主也可不慎乎尚書曰兢兢業業一日二日萬㡬又曰無稽之言勿聽弗詢之謀勿庸又曰不矜細行終累大德又曰功崇惟志業廣惟勤位弗期驕祿弗期侈又曰先王克謹天戒又曰作德心逸日休作偽心勞日拙又曰儆戒無虞罔失法度又曰懔乎若朽索之馭六馬又曰德惟一動罔弗吉德二三動罔弗凶毛詩曰惴惴小心如臨于谷又曰戰戰兢兢如臨深淵如履薄氷又曰無念爾祖聿修厥徳又曰白圭之玷尚可磨也斯言之玷不可為也左傳曰晉入楚軍三日穀范文子立於戎馬之前曰君㓜弱諸臣不佞何以及此君其戒之周書曰惟命不于常有德之謂也君其戒之又曰禍福無門唯人自召又曰臧孫云季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石孟孫死吾亡無日矣又曰吳公子札來聘見叔孫穆子悦之謂穆子曰子其不得死乎好善不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不慎所居何以堪之禍必及子聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉謂子産曰鄭之執政者侈難將至矣政必及子子為政慎以禮不然鄭國將敗適晉說叔向曰吾子勉之君侈而多良大夫皆富政將在家吾子直必思自免於難又曰正考父三命益恭故鼎銘云一命而僂再命而傴三命而俯循牆而走亦莫予敢侮禮曰毋不敬儼若思安定辭又曰敖不可長欲不可縱志不可滿樂不可極又曰安安而能遷臨財毋苟得臨難毋苟免狠毋求勝分毋求多又曰不登髙不臨深不苟訾不苟笑孝子不服闇不登危懼辱親也又曰管仲鏤簋朱紘山節藻梲君子以為濫矣晏平仲祀其先人豚肩不揜豆澣衣濯冠以朝君子以為隘矣是故君子之行}
