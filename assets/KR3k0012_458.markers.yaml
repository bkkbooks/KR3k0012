  - {type: variant, offset: 32, length: 0, content: '', SBCK: 君子之樞機樞機之發榮辱之主也可不愼乎尚書曰兢兢業業一日二日萬機又曰無稽之言勿聽弗詢之謀勿庸又曰不矜細行終累大德又曰功崇惟志業廣惟勤位弗期驕禄弗期侈又曰先王克謹天戒又曰作德心逸日休作僞心勞日拙又曰戒愼無虞罔失法度又曰懔乎􅀂朽索之馭六馬又曰德惟一動罔弗吉德二三動罔弗凶毛詩曰惴惴小心如臨于谷又曰戰戰兢兢如臨深淵如履薄冰又曰無念爾祖聿脩厥德又曰白圭之玷尚可磨斯言之玷不可爲左傳曰晉入楚軍三日穀范宣子立於戎馬之前曰君㓜弱諸臣不佞何以及此天命不於常有德之謂也君其戒之又曰禍福無門唯人自召又曰臧孫云季孫之愛我疾疹也孟孫之惡我藥石也美疹不如惡石孟孫死吾亡無日矣又曰呉公子札來聘見叔孫穆子曰恱之謂穆子曰子其不得死乎好善不能擇人吾聞君子務在擇人吾子爲魯宗卿而任其大政不愼所舉何以堪之禍必及子聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉謂子産曰鄭之執政者侈難將至矣政必及子子爲政愼以禮不然鄭國將敗適晉􅀃叔向曰吾子免之君侈而多良大夫皆冨政將在家吾子直必思自免於難又曰正考父三命益㳟故鼎銘云一命而僂再命而傴三命而俯循牆而走亦莫予敢侮禮曰母不敬儼􅀂思安定辭又曰敖不可長欲不可縱志不可滿樂不可極又曰安安而能遷臨財無茍得臨難無苟免很母求勝分母求多又曰不登髙不臨深不茍訾不茍􅀏孝子不服闇不登危懼辱親也又曰管仲鏤簋朱紘山節藻梲君子以爲濫矣晏平仲祀其先人豚肩不揜豆澣衣濯冠以朝君子以爲隘矣是故君子之行}
