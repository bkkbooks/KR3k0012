  - {type: variant, offset: 3339, length: 0, content: '', SBCK: 惠帝復祚紹居夲職上疏諌曰願陛下無志金傭大司馬無忘潁上大將無忘黃橋則禍亂之萌無由而兆隋書曰賀􅀂弼及敦以武烈知名仕周爲金州揔管宇文護忌而害之臨刑呼弼謂之曰吾必欲平江南然此心不果汝當成吾志且吾以舌死汝不可不思因引錐刺弼舌出血誡以愼口唐書曰太宗嘗謂長孫無忌等曰朕聞主賢則臣直人不自知公直面論攻朕得失無忌奏言陛下武功文德跨絶古今發號施令事皆利物孝經云將順其羙臣順之不暇實不見陛下有所愆失太宗曰朕兾聞巳過公乃妄相䛕恱朕今面談公等得失以爲鑒誡言之者無過聞之者可以自改因目無忌曰善避嫌疑應對敏速求之古人亦當無比而揔兵攻戰非所長也髙士廉渉獵古今心術聦悟臨難旣不改節爲官亦無朋黨所少者骨鯁規諌耳唐儉言辭俊利善和解人酒杯流行發言啓齒事朕三十載遂無一言論國家得失楊師道性行絶善自無愆過無情實怯懦未甚更事急緩不可得力岑文夲性過敦厚文章自其所長而持論􅁪據經逺自當不􅀒於物劉洎性最堅貞言多利益然其意尚然諾於朋友能自􅀘闕亦何以尚馬周見事敏速性甚貞正於論量人物直道而行朕比任使多所稱意禇遂良學問稍長性亦堅正旣冩忠誠甚親附於朕譬飛鳥依人自加憐愛又曰閻立本雖有應務之才而尢善圖􅀞工於冩眞􅁗府十八學士圖及貞觀中凌煙閣功臣圖並立夲之跡也時人咸稱其妙太宗}
