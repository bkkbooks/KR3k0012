  - {type: variant, offset: 3333, length: 0, content: '', krp: 征合肥還爲張遼所襲幾至危殆賀齊時率三千兵在南津迎權權旣就大船㑹諸將飲宴齊下席涕泣而言曰至尊人主當特重今日之事幾致禍敗羣下震悕若無天地願}
  - {type: variant, offset: 3334, length: 4, content: 鄭眾為郎, SBCK: 此爲終身戒權自前拭其淚曰大慙謹以刻心非伹書紳也王隱晉書曰􅁃衮兄女芳將嫁羙服具矣衮刈荆苕爲箕箒焉召諸子集之于堂男女以班而命芳來汝少􅀌汝逸汝豫不汝疵瑕今汝將適人事舅姑灑掃庭内婦人道也故賜汝以匪器之羙欲汝之温㳟朝夕雖休勿休也晉書曰趙王倫􅆲位嵇紹爲侍}
