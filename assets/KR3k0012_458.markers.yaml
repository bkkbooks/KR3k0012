  - {type: variant, offset: 1229, length: 605, content: 今君廚肉臭而不可食樽酒敗而不可飲而三軍之士皆有饑色欲以勝敵不亦難乎莊王曰請有酒投之水有食饋之賢行軍中之有饑色者加五倍之賜又曰衛靈公座重華之臺侍御數百隨珠照日羅衣從風仲叔敖入諫曰昔桀行此而亡今四境內侵諸侯加兵土地日削百姓乖離今君內寵無乃太盛歟靈公再拜曰寡人過矣微子之言社稷傾於是出宮女之不進者數百人百姓大悅莊子曰趙簡子出田鄭龍為右有一野人簡子曰龍下射彼使無驚吾馬三命鄭龍鄭龍不對簡子怒鄭龍曰昔踐土之盟不戮一人虎狼殺人固將救之簡子還車輟田曰今吾田也得士又曰梁君出獵見白鴈群集梁君下車彀弓欲射之道有行者白鴈群駭梁公怒欲殺行者其御公孫龍下車撫其心梁君忿然作色而怒曰龍不與其君而顧與他人何也公孫龍對曰昔者齊景公之時天旱三年卜之曰必以人祠乃雨景公下堂頓首曰吾所以求雨者為民也今必使吾以人祠乃且雨寡人將自當之言未卒而天大雨方千里何為有德於天而惠施民也今主君以白鴈之故而欲煞人無異於虎狼梁君援手與上車歸入郭門呼萬歲曰樂哉今日也人獵皆禽獸吾獵獨得善言而歸又曰齊桓公讀書堂上輪扁斲輪堂下釋椎鑿而上問桓公曰敢問公之所讀者何言耶公曰聖人之言也曰聖人在乎公曰已死矣然則君之讀者古人之糟粕也列子曰晉文公出欲會伐衛公子鉏仰而笑公問何笑曰笑臣鄰之人也臣之鄰人有送其妻適家者道見柔婦悅而與言然顧視其妻亦有招之者矣竊笑此也公悟其言乃止引師還未至而有伐其北鄙者韓子曰衛靈公之時彌子瑕有寵專於衛國侏儒有見公者曰臣之夢賤矣公曰奚夢曰見竈為見公也公怒曰吾, WYG: 朕}
