  - {type: variant, offset: 55, length: 0, content: '', SBCK: 其死好勝者必遇其敵盗憎主人民怨其上君子知天下之不可上也故下之知衆之不可先也故後之温㳟愼德使人慕之執雌持下人莫踰之人皆趨彼我獨守此孔子顧謂弟子曰此言雖鄙而中事情又孔子觀於周廟而有欹器焉孔子問守廟者曰此謂何器對曰蓋謂右生之器孔子曰吾聞右坐之器滿則覆虚則欹中則正有之乎對曰然孔子使子路取水而試之滿則覆中則正虚則欹孔子喟然而歎曰嗚呼惡有满而不覆者哉子路曰敢問持滿有道乎孔子曰持滿之道挹而損之子路曰損之有道乎孔子曰髙而能下滿而能虚冨而能儉貴而能卑智而能愚勇而能怯辯而能訥􅀶而能淺明而能闇是謂損而不極能行此道唯至德者及之易曰不損而益之自損而終益故也家語曰孔子行遊中路聞哭者聲甚悲孔子驅之前有異人者少進見之吾丘子也擁鏁帶索而哭孔子辟車而下問曰夫子有喪也何􅂘之悲也吾丘子對曰吾有三失孔子曰願聞三失吾丘子曰吾少好學問周通天下還後吾親亡一失也事君驕奢}
