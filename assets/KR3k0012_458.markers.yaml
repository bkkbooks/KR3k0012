  - {type: variant, offset: 2313, length: 0, content: '', WYG: 臣直}
  - {type: variant, offset: 2314, length: 0, content: '', WYG: 不自知公直面論攻朕得失無忌奏言陛下武功文德跨絶古今發號施令事皆利物孝經云將順其美}
  - {type: variant, offset: 2315, length: 0, content: '', WYG: 順}
  - {type: variant, offset: 2316, length: 0, content: '', WYG: 不暇實不見陛下有所愆失太宗曰朕兾聞已過公乃妄相謏悅朕今面談公等得失以為鑒誡}
  - {type: variant, offset: 2317, length: 0, content: '', WYG: 之者無過聞之者可以自改因目無忌曰善避嫌疑應對敏速求之古人亦當無比而總兵攻戰非所長也髙士廉涉獵古今心術聰悟臨難既不改節為官亦無朋黨所少者骨鯁規諌耳唐儉言辭俊利善和解人酒盃流行發言啓齒事朕三十載遂無一言論國家得失楊師道性行純善自無愆過而情實怯懦未甚更事緩急不可得力岺文本性過敦厚文章自其所長而持論恒據經逺自當不負於物劉洎性最堅貞言多利益然其意尚然諾私於朋友能自補闕亦何以尚馬周見事敏速性甚貞正於論量人物}
