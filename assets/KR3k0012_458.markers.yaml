  - {type: variant, offset: 269, length: 139, content: 庶人有稱曰亡羊而固牢不為遲見兔而呼狗不為晚湯武以百里王桀紂以天下亡今國雖小絕長繼短以千里數且君王獨不見夫青蛉乎六足四翼蜚翔乎天地之間求蚊䖟而食之待甘露而飲之自以為無患不知五尺童子以竹竿加之乎四仞之上而下為虫蟻所食青蛉猶其小者黃雀俛啄百粒仰棲茂樹鼓其翼奮其翅自以為無患與民無爭不知, SBCK: 竊伏海瀕聞暴}
