  - {type: variant, offset: 3210, length: 239, content: 鹿之故殺人一當死使天下聞之皆以陛下重鹿賤人二當死也匈奴即有急推鹿觸之三當死也武帝默然遂釋煞鹿者之罪邵氏家傳曰邵信字孝信為執法都尉吳王嘗因迎春便道遊獵信從行露板諫曰今元正御節是萬物萌育之始豈可亡溫養之德而為逆害之道乎吳主省板即為廻駕虞溥江表傳曰孫權以鄭眾為郎中嘗與之言卿好於眾中面諫或失禮敬寧不畏龍鱗乎對曰君明臣直朝廷與下無諱實恃洪恩不畏龍鱗顧子曰昔梁丘據之諫景公也於房晏嬰之諫景公也於朝然晏嬰之忠著於竹素梁丘之佞于今不絕亦為公平正直者聖賢之所先矣漢書揚雄甘泉賦曰甘泉本因秦離宮既, WYG: 驕}
