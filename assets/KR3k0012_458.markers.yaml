  - {type: variant, offset: 421, length: 2, content: 茂樹, SBCK: 亂乎上曰亂房曰然則有所任乎上曰幸其未至於彼也房曰臣恐後丗之視今猶今之視古也元帝嘿然矣又曰韓延夀善爲政坐法弃市吏民數千人送至渭城老小扶持車轂爭奉酒炙延壽不忍拒逆爲飲酒石餘使􅁺吏分謝吏民百姓莫不流涕延壽三子皆爲郎吏臨死屬其子勿爲吏以巳爲戒子皆以父言去官東觀漢記曰馮勤遷司徒是時三公多見罪退上欲令以善自終乃因讌見從容戒之曰朱浮上不忠於君下陵轢同列終以中傷放逐受誅雖復追加賞賜不足以償不訾之身忠臣孝子鑒照前丗以爲鑒戒能盡忠於國事君無二則爵賞先乎當丗名列於不朽可不勉哉又曰樊宏爲人謙慎常戒其子曰冨貴盈溢未有能終者天道惡滿}
