  - {type: variant, offset: 407, length: 306, content: 知公子王孫左抱彈右攝丸晝遊乎茂樹而夕和乎酸鹹黃雀猶其小者鴻鵠嬉游乎江河脩其六翮一舉千里自以為無患與民無爭不知弋者操其弓矢脩其防翳故朝遊乎江河而暮調乎鼎俎鴻鵠猶其小者蔡侯之事又是也蔡侯南遊乎高陵北經乎巫山嬉遊乎商蔡之囿不以國家為事不知子發受命宣王紲以朱絲也蔡侯之事猶其小者今君王之事又是也君王左州侯右夏侯從新安君與壽陵君淫行康樂遊娛馳聘不知穰侯方與秦王謀殺之乎黽塞之外襄王大懼形體棹慓曰謹受令乃封辛為成陵君而用計焉戰國策文亦同又曰趙簡子上羊腸之坂群臣皆偏禓推車而虎噲獨檐戟行歌不推車簡子曰寡人上坂群臣皆推車噲獨戟行歌不推車噲謂人臣而侮其主者其罪何若對曰為人臣侮其主者死又曰身死妻子為戮君既已聞為人臣侮其主之罪君亦聞, WYG: 當爾夫}
  - {type: variant, offset: 410, length: 1, content: 王, SBCK: 舊矣迺今承顔接辭凢爲吏太剛則折太軟則廢威行施之以恩然後樹功揚名永終天禄勝之納其誡深接以禮又曰楊惲失爵位居處治産業起室宅其友人安定守}
  - {type: variant, offset: 410, length: 1, content: 王, krp: 舊矣迺今承顔接辭凢爲吏太剛則折太軟則廢威行施之以恩然後樹功揚名永終天禄勝之納其誡深接以禮又曰楊惲失爵位居處治産業起室宅其友人安定守}
  - {type: variant, offset: 412, length: 8, content: 左抱彈右攝丸晝遊, SBCK: 會宗與書誡之曰大臣廢退當闔門惶恐爲可憐之意不當通賔客有譽稱也惲内懷不服驕奢不悔坐􅆎斬望前列曰元帝時京房以言災異數召見又爲吏考課事奏之因問上曰幽厲之君何以危所任者何人也上曰主不明而任巧佞房曰知巧佞而任之邪將以爲賢而任之耶上曰賢之房曰然則何以知其不賢也曰以其時亂而君危知之房曰今治}
