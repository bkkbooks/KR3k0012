  - {type: variant, offset: 847, length: 381, content: 來獻之左右曰鄙哉辭也楚王曰子不知漁者仁人也蓋聞囤倉粟餘者國有餓死民後宮多幽女者下多曠夫餘衍之蓄眾府庫者境內多貧困之民皆失君人之道漁者知之其此諭寡人也於是乃遣使恤鰥寡而存孤獨出倉粟發幣帛而賙賑不足罷去後宮不御者出以妻鰥夫楚民大悅鄰國歸之故漁者獻魚而楚國賴之又曰魏文侯與士大夫坐問曰寡人何如君群臣皆曰仁君也次至翟黃君非仁君曰子何以言之對曰君伐中山不封君之弟而封君之長子臣以知君非仁君也文侯怒而逐翟黃黃趨而出次至任座文侯問寡人何如君也任座對曰仁君也臣聞之其君仁者其臣直向者翟黃之言直臣是以知君仁也文侯曰善復召翟黃新序曰魏文侯曰吾一見箕季而得四焉其墻壞而不築吾問何不築對曰不時是教我不奪農功其墻枉而不端吾問何不端對曰地然是教我無侵封疆也從者食其桃箕季禁之豈愛桃哉是教我下無犯上也食我槽飡之食瓜瓠之羹豈不具五味教我無多歛於百姓以省飲食之養也王孫子新書曰楚莊王攻宋將軍子重諫, SBCK: 輅}
