  - {type: variant, offset: 2416, length: 744, content: 履非其屨也而屨春冰未有冠危石而不壓踰春冰而不陷者也桀乃笑而應之曰子且就炮烙之刑龍逢布武而趨赴火而死桓氏要論曰易曰王臣謇謇傳曰諤諤者昌變人之情抑人之欲咈人之耳逆人之意不爾不為諫也楚漢春秋曰惠帝崩呂太后欲為高墳使從未央宮而見之諸將諫不許東陽侯垂泣曰陛下見惠帝冢悲哀流涕無已是傷生也臣竊哀之太后乃止汝南先賢傳曰郭憲字子橫建武中為光祿勳車駕西征隗囂諫曰天下初定車駕未可動憲乃當車拔佩力以斷車靷帝不從遂上隴其後頴川兵起乃廻駕而還帝歎曰恨不用光祿之言也又曰郭憲字子橫學貫祕奧師事東海王仲子王莽為大司馬權貴傾朝莽召仲子欲令為兒講仲子聞即褰裳欲往憲曰今君位為博士如何輕身賤道禮有來學無往教之義不宜輕道也於是仲子晏乃往莽問君來何遲仲子具以憲言荅之莽陰奇焉又曰劉璋遣法正迎劉備劉巴諫曰不可內也既入巴復諫曰若使備討張魯是放虎於山林也璋不聽巴閉門稱疾備攻成都令軍中其有害巴者誅及三族及得甚善又曰時匈奴數犯塞帝患之乃召百寮廷議時郭憲以為天下疲弊不宜動眾諫諍不合乃伏地眩瞀不復言帝令兩郎扶下殿憲亦不拜又曰薛勤字子恭定遠侯班始尚公主主遇始慠慢無婦禮始殺主詔書怒欲滅其家勤建議執志不顧遂奏上施行其立朝盡忠類皆如此又楚國先賢傳曰楊顒字子昭襄陽人為蜀丞相主簿諸葛亮嘗自校簿書顒直入諫曰為治有體不可相侵請為明公作家以喻之今有人使奴執耕稼婢典炊雞主司晨狗主吠盜牛負重載馬涉遠路私業無曠所求皆足雍容高拱飲食而已矣忽一旦捐棄欲以身親其役為此碎務形疲神困終無一成豈智不如奴婢雞犬哉失家之法耳是以古人稱坐而論道謂之三公作而行之謂之卿大夫明公為治乃躬自校簿流汗竟日不亦勞乎亮謝之鍾離意別傳曰明帝作北宮意諫曰昔湯遭旱以六事自責曰政不節耶使民疾耶宮室榮耶女謁盛耶說夫昌耶苞苴行耶夫宮室廣大所以驚耳極觀非所以崇德致平宣化海內東方朔別傳曰孝武皇帝, WYG: 器故}
