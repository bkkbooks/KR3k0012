  - {type: variant, offset: 52, length: 1, content: 士, SBCK: 莫見乎隱莫顯乎微故君子愼其獨也孝經曰在上不驕髙而不危制節謹度滿而不溢論語曰君子有三戒少之時戒之在色及其壯也戒之在􅃲及其老也戒之在得又曰如有周公之才之羙使驕且吝其餘不足觀也巳又曰三思而後行再思可矣家語曰孔子之周觀於太廟右階之前有金人焉三緘其口而銘其背曰古之愼言之人也戒之哉無多言多言多敗無多事多事多患安樂必戒無行所悔勿謂何傷其禍將長勿謂何害其禍將大勿謂莫聞神將伺人熒熒不滅炎炎奈何㳙㳙不壅終爲江河緜緜不絶將成網羅毫末不札將尋斧柯誠能愼之福之垠也口是何傷禍之門也彊梁者}
  - {type: page-break, offset: 52, content: '', id: KR3k0012_SBCK_458-3a}
  - {type: variant, offset: 52, length: 1, content: 士, WYG: 莫見乎隱莫顯乎㣲故君子慎其獨也孝經曰在上不驕髙而不危制節謹度滿而不溢論語曰君子有三戒少之時戒之在色及其壯也戒之在鬭及其老也戒之在得又曰如有周公之才之美使驕且吝其餘不足觀也已又曰三思而後行再斯可矣家語曰孔子之周觀於太廟右階之前有金人焉三緘其口而銘其背曰古之慎言人也戒之哉無多言多言多敗無多事多事多患安樂必戒無形所悔勿謂何傷其禍將長勿謂何害其禍將大勿謂莫聞神將伺人熒熒不㓕炎炎奈何涓涓不壅終為江河綿綿不絶將成網羅毫末不札將尋斧柯誠能慎之福之根也口是何傷禍之門也强梁者}
