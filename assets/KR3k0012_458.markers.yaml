  - {type: variant, offset: 1835, length: 475, content: 夢見人主者見日奚為見竈對曰夫人君兼照一國一人不能壅故將見人主而夢見日夫竈一人煬焉則後人無從見矣今或者一人煬君乎則臣雖夢見竈不亦可乎公曰善遂去雍鉏退子瑕而用司空狗孔叢子曰陳惠侯大城因起陵陽之臺未終而坐法死者數千人欲坑三監吏煞之夫子適見陳侯與登臺而觀焉夫子曰美哉斯臺自古聖王為城未見不戮一人而能功若此者也陳侯默然而退遽竊赦所坑吏既而見夫子問曰昔周作靈臺亦戮人乎荅曰文王之興附者六州六州之眾各以子來區區之臺未及期月而既成矣何戮之有夫以少少之眾能立矣大大之功唯君耳又曰齊王行車裂之刑群臣諫爭之弗聽子高見齊王曰車裂之刑無道之刑也而君行之臣竊以為下吏之過也齊王曰謹聞命遂除車裂又曰智伯欲伐仇由而道難不通乃鑄大鍾遺仇由仇由君悅除道將內之赤章曼支諫曰不可此小之所以事大而今大以遺小卒必隨之不可內不聽遂內之曼支因以斷轂而馳至齊十月而仇由亡又曰秦繆公以女樂二八與良宰遺戎王戎王喜迷惑大亂由余驟諫而不聽因怒而歸繆公也孔叢子曰趙簡子曰厥也愛我鐸也不我愛厥諫我必於無人之所鐸之諫我也喜質我於人中必使我愧尹鐸對曰厥愛君之愧也而不愛君之過也鐸也愛君之過而不憂君之愧也此簡子之賢也人, WYG: ''}
