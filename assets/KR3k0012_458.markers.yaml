  - {type: variant, offset: 430, length: 2, content: 雀猶, SBCK: 門侍郎梁松竇固曰凢人貴冨當使可賤如卿等欲不可復賤居高自持勉思鄙言松後果貴滿致災固亦幾不免後列曰馬援兄子嚴敦並喜通輕俠援前在交趾遺書戒之曰吾欲汝曹聞人過失如聞父母之名耳可得聞而口不可得言也好論議人長短是非正法此吾所大惡也寜死不願聞子孫有此行又曰徐穉嘗爲太尉黄瓊所辟不就及瓊卒歸葬稺乃負糧徒歩到江夏赴之設鷄酒薄􅀕哭卒而不告姓名時㑹者四方名士郭林宗等數千人聞之疑}
