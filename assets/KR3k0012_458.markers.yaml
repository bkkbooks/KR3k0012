  - {type: variant, offset: 251, length: 4, content: 楚襄王亡, WYG: 桑霍為我誡豈不厚哉又曰雋不疑字曼倩渤海人也為郡文學進退必以禮名聞州郡武帝末郡國盗賊羣起暴勝之為直指使者綉衣持斧捕盗素聞不疑賢至渤海遣吏請與相見躧履迎堂坐定不疑據地曰竊伏海濵聞公子舊矣迺今承顔接辭凢為吏太剛則折太軟則廢威行施之以恩然後樹功揚名永終天禄勝之納其誡深接以禮又曰楊惲}
