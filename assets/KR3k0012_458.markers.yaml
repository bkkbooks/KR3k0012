  - {type: variant, offset: 1890, length: 1437, content: 則臣雖夢見竈不亦可乎公曰善遂去雍鉏退子瑕而用司空狗孔叢子曰陳惠侯大城因起陵陽之臺未終而坐法死者數千人欲坑三監吏煞之夫子適見陳侯與登臺而觀焉夫子曰美哉斯臺自古聖王為城未見不戮一人而能功若此者也陳侯默然而退遽竊赦所坑吏既而見夫子問曰昔周作靈臺亦戮人乎荅曰文王之興附者六州六州之眾各以子來區區之臺未及期月而既成矣何戮之有夫以少少之眾能立矣大大之功唯君耳又曰齊王行車裂之刑群臣諫爭之弗聽子高見齊王曰車裂之刑無道之刑也而君行之臣竊以為下吏之過也齊王曰謹聞命遂除車裂又曰智伯欲伐仇由而道難不通乃鑄大鍾遺仇由仇由君悅除道將內之赤章曼支諫曰不可此小之所以事大而今大以遺小卒必隨之不可內不聽遂內之曼支因以斷轂而馳至齊十月而仇由亡又曰秦繆公以女樂二八與良宰遺戎王戎王喜迷惑大亂由余驟諫而不聽因怒而歸繆公也孔叢子曰趙簡子曰厥也愛我鐸也不我愛厥諫我必於無人之所鐸之諫我也喜質我於人中必使我愧尹鐸對曰厥愛君之愧也而不愛君之過也鐸也愛君之過而不憂君之愧也此簡子之賢也人主賢則人臣之言直又曰越饑請食於吳子胥諫曰不可與也夫吳之與越仇讎之國非吳喪越越必喪吳若燕秦齊晉山處陸居豈能逾五湖九江越十地以有吳哉今將輸之粟是長仇讎財匱民怨悔無及也符子曰龍逢進諫桀曰臣嘗觀君之冕非其冕也而冕危石君之履非其屨也而屨春冰未有冠危石而不壓踰春冰而不陷者也桀乃笑而應之曰子且就炮烙之刑龍逢布武而趨赴火而死桓氏要論曰易曰王臣謇謇傳曰諤諤者昌變人之情抑人之欲咈人之耳逆人之意不爾不為諫也楚漢春秋曰惠帝崩呂太后欲為高墳使從未央宮而見之諸將諫不許東陽侯垂泣曰陛下見惠帝冢悲哀流涕無已是傷生也臣竊哀之太后乃止汝南先賢傳曰郭憲字子橫建武中為光祿勳車駕西征隗囂諫曰天下初定車駕未可動憲乃當車拔佩力以斷車靷帝不從遂上隴其後頴川兵起乃廻駕而還帝歎曰恨不用光祿之言也又曰郭憲字子橫學貫祕奧師事東海王仲子王莽為大司馬權貴傾朝莽召仲子欲令為兒講仲子聞即褰裳欲往憲曰今君位為博士如何輕身賤道禮有來學無往教之義不宜輕道也於是仲子晏乃往莽問君來何遲仲子具以憲言荅之莽陰奇焉又曰劉璋遣法正迎劉備劉巴諫曰不可內也既入巴復諫曰若使備討張魯是放虎於山林也璋不聽巴閉門稱疾備攻成都令軍中其有害巴者誅及三族及得甚善又曰時匈奴數犯塞帝患之乃召百寮廷議時郭憲以為天下疲弊不宜動眾諫諍不合乃伏地眩瞀不復言帝令兩郎扶下殿憲亦不拜又曰薛勤字子恭定遠侯班始尚公主主遇始慠慢無婦禮始殺主詔書怒欲滅其家勤建議執志不顧遂奏上施行其立朝盡忠類皆如此又楚國先賢傳曰楊顒字子昭襄陽人為蜀丞相主簿諸葛亮嘗自校簿書顒直入諫曰為治有體不可相侵請為明公作家以喻之今有人使奴執耕稼婢典炊雞主司晨狗主吠盜牛負重載馬涉遠路私業無曠所求皆足雍容高拱飲食而已矣忽一旦捐棄欲以身親其役為此碎務形疲神困終無一成豈智不如奴婢雞犬哉失家之法耳是以古人稱坐而論道謂之三公作而行之謂之卿大夫明公為治乃躬自校簿流汗竟日不亦勞乎亮謝之鍾離意別傳曰明帝作北宮意諫曰昔湯遭旱以六事自責曰政不節耶使民疾耶宮室榮耶女謁盛耶說夫昌耶苞苴行耶夫宮室廣大所以驚耳極觀非所以崇德致平宣化海內東方朔別傳曰孝武皇帝時人有殺上林鹿者武帝大怒下有司殺之群臣皆相阿煞人主鹿大不敬當死東方朔時在旁曰是人罪一當死者三使陛下以鹿之故殺人一當死使天下聞之皆以陛下重鹿賤人二當死也匈奴即有急推鹿觸之三當死也武帝默然遂釋煞鹿者之罪邵氏家傳曰邵信字孝信為執法都尉吳王嘗因迎春便道遊獵信從行露板諫曰今元正御節是萬物萌育之始豈可亡溫養之德而為逆害之道乎吳主省板即為廻駕虞溥, SBCK: ''}
