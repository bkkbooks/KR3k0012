  - {type: variant, offset: 2941, length: 3, content: 在襁褓, SBCK: 爲琅耶王納后爲妃無子永嘉六年薨太興三年􅁽贈皇后璽綬祔于太廟晉書曰豫章君荀氏元帝宫人也初有寵生明帝及琅邪王伷音宙由是虞后所忌漸見踈薄明帝即位封建安君别立第宅太寧元年帝迎還臺内供奉隆厚及成帝立尊同於}
