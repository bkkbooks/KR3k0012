  - {type: variant, offset: 1763, length: 0, content: '', SBCK: 沛國譙人也父尚魏征南大將軍母曹氏魏德陽郷主后雅有識度帝每有所爲必預籌畫魏丗宣帝居上將之重諸子並有雄才大略后知帝非魏之純臣而后旣魏氏之甥帝􅀷忌之青龍三年以鴆崩武帝登祚始加號謚文明王皇后王隱晉書曰文明皇后王肅女秉德清貞體行純和八歳誦詩論特精喪服苟有文義過目則識祖司徒㓪異之曰興吾家者必此女矣惜不爲男每居大喪常身不勝衣及鍾㑹見任言於文帝曰㑹好爲事端寵過必􅁦}
  - {type: variant, offset: 1763, length: 35, content: 太傅高密侯禹之孫平壽敬侯訓之女也訓有五男三女長騭次京悝弘閶女燕次綏綏即, WYG: 慙恚不食將自殺諸子亦不食帝驚而致謝}
  - {type: variant, offset: 1763, length: 0, content: '', krp: 沛國譙人也父尚魏征南大將軍母曹氏魏德陽郷主后雅有識度帝每有所爲必預籌畫魏丗宣帝居上將之重諸子並有雄才大略后知帝非魏之純臣而后旣魏氏之甥帝深忌之青龍三年以鴆崩武帝登祚始加號謚文明王皇后王隱晉書曰文明皇后王肅女秉德清貞體行純和八歳誦詩論特精喪服苟有文義過目則識祖司徒㓪異之曰興吾家者必此女矣惜不爲男每居大喪常身不勝衣及鍾㑹見任言於文帝曰㑹好爲事端寵過必弊}
