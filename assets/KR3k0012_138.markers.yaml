  - {type: variant, offset: 2966, length: 0, content: '', SBCK: 陽鎮南將軍預之曽孫也成帝以后弈丗名德咸康二年備禮拜爲后后少有姿色然長猶無齒有來求昬者輙中止及納采之日一夜齒盡生七年三月后崩年二十一后在位六年無子先是三呉女子相與簪白花望之如素㮏傳言天公織女死爲之著服至是而后崩康帝褚皇后晉中興書曰康獻皇后褚氏字􅂫子太傅襃之女也后聦明有器識以名家女入爲琅邪王妃生}
