  - {type: variant, offset: 2967, length: 1, content: 冲, SBCK: 宗穆皇帝孝宗即位尊后曰皇太后泰元元年太后詔曰皇帝㛰冠禮備遐邇宅心宜當陽親覽緝熈惟始今歸政事率由舊典於是復稱崇德太后九年崩于顯陽殿簡文鄭皇后晉中興書曰簡文宣太后鄭氏諱阿春滎陽人先適田氏生一男夫又亡后依於舅呉氏中宗爲丞相敬后先崩將納呉氏女爲夫人后及呉氏女並遊後園有見之者言於中宗曰鄭氏女雖􅊔居賢於呉氏逺矣遂以德色納爲夫人甚有寵后雖貴幸而恒有憂色中宗問其故對曰妾有妹中者適長沙王襃餘二妹未出恐姉旣爲人妾無復求者中宗從容謂劉隗曰鄭氏有二妹卿可求佳對使不失舊隗舉其從子傭娶第三者以小者適漢中李氏皆得舊門帝稱尊號后雖爲夫人詔太子及東海武陵王皆}
