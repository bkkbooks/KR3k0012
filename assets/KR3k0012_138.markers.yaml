  - {type: variant, offset: 2190, length: 0, content: '', WYG: 十二祖朗薨后哀戚哭泣發於自然其父益加敬異既笄歸於文帝生武帝武元楊皇后晉書曰武元楊皇后𢎞農華隂人也有善相后當極貴故文帝為武帝娶之生惠帝武帝疑惠帝不堪奉大統密以語后后曰立嫡以長不以賢豈可動乎帝採諸葛冲等}
