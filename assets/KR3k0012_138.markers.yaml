  - {type: variant, offset: 1752, length: 2, content: 續漢, SBCK: 張氏諱春華髙祖同郡人也母河内山氏司徒濤之從祖姑也后少有德行智識􅀄髙祖辭仕以風痺不能起居曝書遇雨髙起収書家唯一婢見之后懼言語泄漏乃手殺之而自執爨焉帝由是重之其後栢夫人有寵后罕得進見帝嘗卧疾后徃省病帝曰老物可憎何煩出也后慙恚不食將自殺諸子亦不食帝驚而致謝后乃止退而謂人曰老物不足惜慮困我好兒耳魏正始八年崩武帝受禪追尊爲太后景懷夏侯皇后晉}
  - {type: page-break, offset: 1752, content: '', id: KR3k0012_SBCK_138-4b}
  - {type: variant, offset: 1752, length: 2, content: 續漢, WYG: 張氏諱春華高祖同郡人也母河内山氏司徒濤之從祖姑也后少有徳行智識初高祖辭仕以風痺不能起嘗曝}
  - {type: page-break, offset: 1752, content: '', id: KR3k0012_WYG_138-6b, image: WYG0894/WYG0894-0279b.png}
  - {type: variant, offset: 1752, length: 2, content: 續漢, krp: 張氏諱春華髙祖同郡人也母河内山氏司徒濤之從祖姑也后少有德行智識𥘉髙祖辭仕以風痺不能起居曝書遇雨髙起収書家唯一婢見之后懼言語泄漏乃手殺之而自執爨焉帝由是重之其後栢夫人有寵后罕得進見帝嘗卧疾后徃省病帝曰老物可憎何煩出也后慙恚不食將自殺諸子亦不食帝驚而致謝后乃止退而謂人曰老物不足惜慮困我好兒耳魏正始八年崩武帝受禪追尊爲太后景懷夏侯皇后晉}
  - {type: punctuation, offset: 1755, content: 》, id: KR3k0012_CHANT_138-bkkpn403}
  - {type: variant, offset: 1755, length: 0, content: '', WYG: 遇雨自起收書家惟一婢見之后懼言語泄漏乃手殺之而自執㸑焉帝由是重之其後柏夫人有寵后罕得進見帝卧疾后往省病帝}
