  - {type: variant, offset: 2565, length: 4, content: 尊清河孝, WYG: 大喜賈妃酷妬嘗手擊殺數人或以刀㦸擲孕妾子乃墮地上大怒治金墉城將廢之趙粲荀勗深救之故得不廢洛陽尉部小吏忽有好物尉疑為盜召詰之賈后踈親欲求盜物往聽對辭小吏云先行逢一老嫗說家有疾師卜云當得城南年少厭塞蹔相煩尋重報小吏從之上車下帷内著簾箱中行十餘里過六七門限開簾箱忽見樓閣好屋問此何處云天上即以香湯見浴好衣美食將入見一婦人年三十五六短小青黑色眉後有疵見留數日共宿歡宴臨出得此衆物賈氏踈親聞其形狀知是賈后慙笑而去尉亦解意時他人多殺之不出唯此小吏以愛得出賈后詐有身内槀物為産具取妹夫韓夀兒託之諒闇所生故弗顯賈庶人臨廢遥喚帝曰陛下有婦使人廢之亦行自廢詔賜死晉書后妃傳曰齊}
