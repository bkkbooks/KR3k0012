  - {type: variant, offset: 2952, length: 2, content: 崩群, SBCK: 薨詔曰朕少遭憫凶慈訓無禀撫育之勤建安君之仁也一旦薨殂實思報復永懷平昔感痛哀摧其贈豫章郡君别立廟于京都明帝􅁃皇后晉中興書曰明穆皇后􅁃氏諱文君左將軍琛第三女也后少以珪璋特異令儀淑羙故中宗爲肅祖納焉􅀄爲丗子妃仁和有禮􅀷見敬重后生顯宗成皇帝顯宗即位尊后曰皇太后羣}
  - {type: page-break, offset: 2952, content: '', id: KR3k0012_SBCK_138-9a}
  - {type: variant, offset: 2952, length: 2, content: 崩群, WYG: 薨於江左葬瑯琊國初有䜟云銅馬入海建業期太妃小字銅環而元帝中興於江左焉虞皇后荀氏附晉書曰元敬虞皇后諱孟母濟陽外黄人父豫元帝為瑯琊王納后為妃永嘉六年薨大興三年册贈皇后璽綬祔於太廟晉書曰豫章君荀氏元帝宫人也初有寵生明帝及瑯琊王伷由是為虞后所忌漸見疎薄明帝即位封建安君別立第宅太寧元年帝迎還臺内供奉隆厚及成帝立尊同於太后咸康元年薨詔曰朕少遭憫凶慈訓無禀撫育之勤建安君之仁也一旦薨殂實思報復永懐平昔感痛哀摧其贈豫章郡君別立廟於京都明穆庾皇后晉中興書曰明穆皇后庾氏諱文君左將軍琛第三女也后少以珪璋特異令儀淑美故中宗為肅宗納焉為世子妃仁和有禮深見敬重后生顯宗成皇帝顯宗即位尊后曰皇太后羣}
