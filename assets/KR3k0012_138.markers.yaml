  - {type: variant, offset: 2160, length: 3, content: 在襁褓, WYG: 每有所為必預籌畫魏明帝世皇帝居上將之重諸子並有雄才大略后知帝非魏之純臣而后既魏氏之甥帝深忌之青龍二年以鴆崩武帝登祚始加號諡文明王皇后王隠晉書曰文明皇后王肅女秉徳清貞體行純和八歳誦詩論特精喪服茍有文義過目則識祖司徒朗異之曰興吾家者必此女矣惜不為男每居大喪常身不勝衣及鍾㑹以才能見任后每言於文帝曰㑹好為事端寵過必亂太始元年尊為}
