  - {type: variant, offset: 2166, length: 576, content: 臨朝建元元年三月太后崩丙午合葬順陵東觀漢記曰后年五歲太夫人為剪髮夫人年老目冥并中后額雖痛忍不言一額盡傷左右怪而問之后言夫人哀我為斷髮難傷老人意故忍之耳及為太后時宮中亡大珠一筐太后念欲下掖庭考問之恐有無辜僵仆者乃親自臨見宮人閱問動察顏色開示恩信宮人即時首服不加鞭箠不敢隱情宮人驚咸稱神明曹大家附後漢書曰扶風曹世叔妻者同郡班彪之女也名昭字惠班一名姬愽學高才世叔早卒有節行法度兄固著漢書其七表及天文志未及竟和帝詔就東觀藏書閣踵而成之帝數召入宮令皇后諸貴人師事焉號曰大家每有貢獻異物輒詔大家作賦頌及鄧太后臨朝預聞政事作女誡七篇年七十餘卒皇太后素服舉哀使者監護喪事所著賦頌銘誄論䟽凡十六篇子婦丁氏為撰集之又作大家讚焉孝德左皇后續漢書曰孝德左皇后安帝母也父仲躬犍為武陽人后兄聖伯為妖言伏誅父母同產皆沒官后長掖庭有令色賜清河王王大悅特親幸自姬妾已下莫能與比六年生男為清河太子卒葬當利庭延平元年殤帝崩清河太子為皇帝尊清河孝王曰孝德皇帝左姬曰孝德皇后孝安閻皇后續漢書曰孝安安思閻皇后河南滎陽人侍中長水校尉暢之女也有才能令色立為皇后安帝崩閻后皇太后與兄顯定策禁中立濟北王少子北鄉侯為皇帝奉後以其年少欲久專政於是太后攝政永建元年崩謚安思后合葬恭陵孝安李皇后續漢書曰孝安恭愍李皇后以宮人侍上見幸生順帝為閻后所妬見鴆物故瘞葬城北帝即位左右以聞更以禮殯永元二年葬北陵謚曰愍皇后孝順, SBCK: ''}
