  - {type: variant, offset: 2946, length: 4, content: 攝政和平, WYG: 臧氏晉書曰懐帝皇太后諱媛姬初入武帝宫拜中才人早崩懐帝即位追尊曰皇太后梁皇后臧氏晉書曰梁皇后諱蘭璧安定人也祖桓開府儀同三司父芬司徒后初為豫章王妃懐帝即位為皇后永嘉中沒胡賊元帝夏侯太妃晉書曰夏侯太妃名光姬沛國譙人也父莊淮南太守妃生自華宗幼而明慧瑯琊武王為世子覲納焉生元帝元帝立稱皇太妃永嘉}
