  - {type: variant, offset: 3670, length: 813, content: 竇太后歸政還長樂宮迎貴人到京都奉璽綬上尊號為孝仁皇后稱永樂宮竇太后崩後永樂后數至前省與上相見與於政事中平六年上棄天下永樂后兄子重為驃騎將軍何太后臨朝重與太后兄大將軍進權勢相害后每欲參于政事太后輒相禁塞后憤恚嗔罵曰汝欲怗大將軍耶勑驃騎斬大將軍頭來何太后以告進進收重免官爵重自殺后憂怖病還河間崩合葬慎陵孝靈宋皇后續漢書曰孝靈宋后帝敬宋貴人之從孫執金吾酆之女無寵而久當正位後宮幸姬眾共譖惡誣以祝詛上信之遂策收璽綬后自致暴室獄以憂死父兄弟皆被誅諸常侍少黃門在省闥者皆憐宋氏無辜共合錢收葬后及酆父子於睪門亭宋氏舊瑩孝靈何皇后續漢書曰孝靈靈思何皇后南陽宛人也以良家子選入掖庭見幸妊身就館生男為貴人父真前卒召貴人同父兄何進為郎中靈帝崩何皇后子辯立為皇帝后為皇太后進為錄尚書袁紹謀誅廢中官進以紹計白太后后不聽以為中官統領禁省自古及今漢家故事不可廢也且先帝新棄天下奈何令我楚楚與士人共事乎及董卓屯顯陽議以為太后迫永樂后令崩逆婦姑之節遷太后于桐宮太后暴崩群臣奏謚曰靈思皇后合葬文陵孝靈王皇后續漢書曰孝靈靈懷王皇后孝獻帝母王璋女也才明聰敏能書會計以良家子應法相選入掖庭光和三年中夏幸妊身后怖畏何皇后服藥欲除妊胎安不動又后數夢負日遂不敢搖四年三月癸巳生上庚子渴飲米粥遂暴薨上歸掖庭暴室嗇夫朱直擁養獨擇乳母歲餘永樂后自將護至三歲靈帝閔上早失所生追思后令美乃作追德賦令儀頌陵曰文昭陵起墳文陵園北孝獻伏皇后續漢書曰孝獻伏皇后琅邪東武人侍中輔國將軍不其侯完女也后唑與父完謀為奸書詐罔不道上收后下暴室詔獄憂死兄弟皆伏誅張璠漢記曰曹操入其二女於宮貴人誣伏氏氏為亂使御史大夫郗慮伏節收后后被髮徒跣走而執上手曰不能復相活耶上大驚號哭曰我亦不知命在何時顧謂慮曰郗公天下暴虐豈有此乎左右莫不流涕遂殺后也曹瞞別傳曰公遣華歆勒兵入宮收后后閑戶匿壁中歆攘戶廢壁牽后出孝獻曹皇后續漢書曰孝獻曹后丞相魏王操女也名憲建安十八年上納操二女憲節於後宮皆以為貴人明年伏后薨憲為皇后二十年獻, SBCK: ''}
