  - {type: variant, offset: 1817, length: 10, content: 傷娥早孤養視撫育慈恩, krp: 祖㓪薨后哀慼哭泣發於自然其父益加敬異旣笄歸于文帝生武帝武元楊皇后晉書曰楊元后父炳言后相貴故文帝爲武帝娶之生惠帝武帝疑惠帝不堪奉大統宻以語后后曰立嫡以長不以賢豈可動乎帝採諸葛冲等五十人入殿呈露靣常衣令后選取后不取端正唯取長白時卞藩女有羙色帝舉扇鄣靣語后曰藩女可后曰藩三丗皇后不宜枉以卑位其中者以絳紗繫臂遂取胡芳芳啼哭左右曰陛下聞聲芳曰死且不畏何畏陛下帝壯其言父奮聞女中亦哭曰老奴不死唯有二兒男在九地之下女在九天之上帝拜芳爲貴嬪元后疾甚見上素敬胡夫人恐立之又慮太子不安臨終枕帝膝曰從妺男㳙有德色不足復娶異姓帝許之崩于光明殿武悼楊皇后晉氏后妃列傳曰后諱芷字季蘭小字男㳙武帝繼室也太傅楊駿女咸寧二年即后位婉嫕音翳才色映椒房寵禮尤隆后無子賈庶人爲太子妃時數以肆情忌嫉失帝意帝慮始終之事欲廢焉后爲妃陳請曰賈公有勲於王府猶將數丗宥之況賈妃親則其子夫妬忌亦婦人之常事不足以一眚而忘大德帝納焉晏駕尊曰皇太后賈庶人五日一朝后旣喪所天常有慼容庶人謂不恱在巳愈自嫌及星辰有變占於母家不利殿中典兵中郎孟觀等遂進勸庶人有先唱者有福後發者受禍庶人遂䧟誅后父駿三族及内外新屬遷后於永寧宫賈庶人尋諷百僚奏太后廢爲庶人母龐付廷尉行刑詔𥘉欲宥之卒不可事奏太后截髮稽顙稱以請母於賈庶人而龐遂見刑后不勝憂哀崩於幽宫春秋三十有四謚曰武悼皇后晉後略曰賈后旣殺楊庶人於金墉城又信妖巫謂人旣死必訴怨於先帝乃覆而殯之施諸厭劾符書藥物以合瘞之惠帝賈皇后王隱晉書曰后諱南風武帝謀太子㛰乆不決上欲娶衛瓘女元后欲娶賈充女上曰衛女有五可賈女有五不可衛家種賢而多子端正長白賈女種妬少子醜而短黒郭槐多輸寶物於后遂娶南風八年將納妃帝知太子不慧故試之盡召東宫官屬作飲食而宻封詔使太子決停信待之賈妃大懼召人荅詔草給使張泓曰太子不學而荅詔引義必責草主更益譴負不如直以意荅妃大喜語泓便爲我好荅得富貴與汝共之泓素有小才具草令太子自冩武帝大喜賈妃酷妬手擊數人或以刀㦸擲孕妾子乃墮地上大怒治金墉城將殺之趙粲荀朂}
