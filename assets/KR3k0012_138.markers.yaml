  - {type: variant, offset: 2666, length: 267, content: 建元年崩謚安思后合葬恭陵孝安李皇后續漢書曰孝安恭愍李皇后以宮人侍上見幸生順帝為閻后所妬見鴆物故瘞葬城北帝即位左右以聞更以禮殯永元二年葬北陵謚曰愍皇后孝順梁皇后續漢書曰梁皇后大將軍商女后有光景之祥及長聰叡仰承兄姊俯接弟妹恩情周悉既有女功之巧尤好史書學問之事九歲能誦孝經論語遂治韓詩大義略舉女傳列圖常在左右宗族中外咸敬異焉選入掖庭相工茅通見之大驚曰此所謂日角偃月相之極貴臣所未常見於是以為貴人恩寵日崇乃白上曰陽以愽施為德陰以不專為義蓋詩人螽斯之福則百斯男之祚所由興也願陛下思天行之普逮均貫魚之次序使小妾得免罪謗之累於是上愈善之益親顧焉陽嘉, WYG: 康}
