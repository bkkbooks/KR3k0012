  - {type: variant, offset: 2155, length: 1, content: 為, SBCK: 居弘訓宫洛陽敗没于劉曜曜僣位以爲皇后因問曰朕何如司馬家兒后曰胡可並焉陛下開基之聖主彼亡國之暗夫有一婦一子及身三耳不能庇之貴爲帝王而妻子辱於凡庶之手妾尓時實不思生何圖復有今日妾生於髙門甞謂世間男子皆然自奉巾櫛巳來始知天下有丈夫耳曜甚愛寵之生二子而死僞謚獻文皇后謝夫人附晉書曰謝夫人名􅅼夲貧賤父以屠羊爲業􅅼清惠貞正而有淑姿選入後庭爲才人惠帝在東宫將納妃武帝慮太子未知帷房之事乃遣􅅼徃東宫侍寢由是得幸有身賈后忌之求還西宫遂生愍懷乃立爲大子拜􅅼爲淑媛及愍懷遇酖􅅼亦􅀍害焉永康􅀄詔改葬太子因贈􅅼夫人印綬葬顯平陵懷王太后臧氏晉書曰懷王}
