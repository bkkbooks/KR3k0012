  - {type: variant, offset: 2191, length: 2, content: 歲太, WYG: 十人女入殿露面常衣令后選取后不取端正唯取長白時卞藩女有美色帝舉扇鄣面語后曰藩女可后曰藩三世后族不宜枉以卑位其中者以綘紗繫臂遂取胡芳芳啼哭左右曰陛下聞聲芳曰死且不畏何畏陛下帝壯其言父奮聞女中選亦哭曰老奴不死唯有二兒男在九地之下女在九天之上帝拜芳為貴嬪元后疾甚見上素敬胡}
