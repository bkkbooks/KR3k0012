  - {type: variant, offset: 2939, length: 1, content: 冲, WYG: 將入宫衣中有火永興元年河間王顒使將張方廢后於金墉城七月陳聄等倡伐成都王復后位八月張方又廢后十一月張方逼遷大駕幸長安留臺復后位永興二年張方又廢后河間王顒矯詔賜后死劉暾他昆切等上表后得免帝還洛迎復后位後洛陽令何喬又廢后懐帝即位尊后為皇后居𢎞訓宫洛陽敗沒於劉曜曜僭位以為皇后因問曰朕何如司馬家兒后曰胡可並言陛下開基之聖主彼亡國之暗夫有一婦一子及身三耳不能庇之貴為帝王而妻子辱於凡庶之手妾爾時實不思生何圖復有今日妾生於高門嘗謂世間男子皆然自奉巾櫛已來始知天下有丈夫耳曜甚愛寵之生二子而死偽諡獻文帝后謝夫人附晉書曰謝夫人名玖本貧賤父以屠羊為業玖清慧貞正而有淑姿選入後庭為才人惠}
