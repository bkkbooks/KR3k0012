  - {type: variant, offset: 5480, length: 0, content: '', SBCK: 司海陵即位爲使持節都督楊南徐三州諸軍事揚州刺史鎭東城給五千人録尚書假黄􅃏中外都督加殊禮進爵爲王太后令廢海陵王以上入纂大位羣臣三請乃受命建武元年十月癸亥即皇帝位大赦改元戊子立皇太子寳卷賜天下爲父後者爵一級二年十月丁卯詔曰􅁤丗去奢事殷哲后訓物以儉理鏡前書朕思所以遷淳改俗反古移民可罷東田毀興光樓并敕水衡量省御乗永太元年四月甲寅改元大赦五月以太子中庶子梁王爲雍州刺史已酉崩于正福殿年四十七帝明審有吏才持法無所借大存儉約罷丗祖所起新林苑以地還百姓廢文帝所起太子東田賣之永明中輿輦舟乗剔去金銀還主衣庫太官進食有裹蒸帝白可四片破之餘充晚食丗祖掖庭中宫殿服御一無所改蕭寳卷蕭子顯書曰東昏侯諱寳卷字智藏髙宗第二子建武元年立爲皇太子髙宗崩太子即位永元元年正月大赦改元辛卯祀南郊詔二品清官以上應食禄者有二親或祖父母年登七十並給見錢二千貫二年八月甲申夜宫内失火十二月雍州刺史梁王起義兵於襄陽三年正月丙申合朔事畢與宫人於閱武堂元㑹皇后正位帝戎服臨視三月南康王寳融即皇帝位於江陵以太子左率李居士揔督西討諸軍事屯新亭九月義軍至南州輔國將軍申曹軍二萬人於姑熟奔歸丙辰李居士與義軍戰于新亭敗績十月冀青二州刺史桓和入衛屯東宫已邜以衆降光禄大夫張瓌先守石頭弃城奔還於是閇宫城自守李居士以新亭降軍築長圍守宫城十二月王珍國侍中張謏等帥兵入殿廢帝帝在東宫便好弄不喜書學及即位性重澁少言不與朝士接唯親信閹人日夜於後堂戯馬五更方卧至晡乃起漸出遊走屏逐居民從萬春門遊東宫以東至於郊外數十百里皆空家静室巷陌懸幔爲髙障置仗防之謂之屏除夜出晨反火光照天拜愛􅁎潘氏爲貴妃仍以金蓮帖地使妃行於其上曰此歩歩蓮花耶每岀妃乗卧輿帝􅀐馬從後着織成袴褶金薄帽執七寳􅆞矟戎服急裝不變寒暑凌冒􅀨雪不避坑阱馳騁渇乏輙下馬解取腰邊蠡器酌水飲之復上馬馳去選無賴小兒善走者爲逐馬左右百人常以自隨置射雉􅂣二百九十六處翳中帷帳及歩障皆祫縁以紅錦金銀鏤弩牙瑇瑁帖箭郊郭四民樵􅂫路絶吉凶失時􅓅疾弃屍不得殯葬後宫遭火之後更起仙華神仙玉壽諸殿刻畫彫彩麝香塗壁錦幔珠簾窮極綺麗又信􅀑神崔恵景事時蔣子文神爲假黄鉞使持節相國太宰大將軍揚州牧鍾山王以至尊爲皇帝迎神像及諸廟雜神皆入後宫禱祀祈福及聞兵入趨岀户閹人黄大刀傷其􅂰仆地曰奴反耶直後張齊斬首送梁王稱宣德皇后令依漢海昏侯故事追封東昏侯唐袐書監虞丗南公子先生論云公子曰宋齊二代廢主有五並驕淫狂􅁀前後如一或身􅀍殺戮或傾墜宗社豈厥性頑兇自貽非命將天之所弃用傾代業者乎先生曰夫木之性直匠者揉以爲輪金之性剛工人理以成器豈人事也唯上智下愚持禀異氣中庸之才全由訓習自宋齊以來東宫師傅備貟而巳貴賤禮隔規獻無由且多以位昇罕由德進善乎哉賈生之言昔者成王㓜在襁褓之中召公爲太保周公爲太傳太公爲太師保則保其身體􅀓則􅀓以德義師則導之教訓此三公之職也又置三少曰少保少􅀓少師是與太子宴者也故乃孩提有職三公三少同明者孝仁義禮以導習之遂去邪人不使見惡行選天下之儒士孝悌􅀶聞有道術者以翼衛之使與太子居處故太子生乃見正事聞正言行正道左右前後皆正人也習與正人居無不能無正猶生長齊地不能不齊言習與不正人居猶生長楚地不能不楚言也􅁗使趙髙􅀓胡亥教之獄訟所習者非斬劓人則夷人之三族也故胡亥今日即位明日射人有忠諌者謂之誹謗深計者爲之妖言視殺人如刈草菅然豈胡亥之性惡哉彼其導之者非其理也故選左右禆教之最急此五君者禀凡庸之性無周召之師逺益友之箴規狎不尚之近習以斯下質生而楚言覆國忘身理數然也蕭寳融蕭子顯齊書曰和帝諱寳融字智昭髙宗第八子建武元年封隨郡王永元元年改封南康王出爲荆州寧益梁南北􅁗七州諸軍事西平郎將荆州刺史蕭頴胄殺巴西梓潼二郡太守劉山陽奉王舉兵以雍州刺史蕭衍爲使持節都督諸軍事左將軍以蕭頴胄爲右將軍督行諸軍事夏侯亶自京師至江陵稱宣德太后令南康王冝纂成國祚光臨億兆方俟清宫未即大號可且封十郡爲宣城王加相國荆州牧又加黄鉞蕭頴胄爲左長史進號鎭軍蕭衍進號征東將軍巳已群僚上尊號中興元年正月乙已即皇帝位大赦改元以相國左長史蕭頴胄爲尚書令冠軍將軍蕭衍爲雍州刺史十二月建康平皇太后令以蕭衍爲大司馬録尚書事驃􅀐大將軍􅀭州刺史封建安郡公依晉武陵王遵承制故事百僚致敬二年正月皇太后臨朝入居内殿以大司馬蕭􅄛爲都督中外諸軍事殊禮進位相國揔百揆揚州牧封十郡爲梁公備九錫之禮逺遊冠位在諸王上二月進梁王爵爲王増封十郡建天子旍旗警入蹕三月景辰遜位于梁丁卯梁奉帝爲巴陵王徙姑熟戊辰薨年十五追爲和帝葬恭陵}
