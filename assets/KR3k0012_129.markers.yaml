  - {type: 'tls:seg', offset: 5448, content: '', id: KR3k0012_CHANT_129-15a.24}
  - {type: variant, offset: 5448, length: 0, content: '', SBCK: 休範反上遣軍襲㝷陽事平除晉熈王諮議遷司徒右長史黄門郎散􅀐常侍江州刺史徴拜侍中領軍將軍給鼓吹一部又加持節都督京畿諸軍事僕射中軍大將軍開府儀同三司進爵爲公給班劒二十人齊國建爲丗子加侍中南豫州刺史給油絡車羽葆鼔吹以石頭爲丗子宫置二率坊有服章一如東宫進爲太子及太祖即位爲皇太子太祖崩上即位乙丑稱先帝遺詔以司徒禇淵録尚書左僕射王儉爲尚書令丙申立皇太妃王氏永明元年正月辛亥南郊大赦改元四年正月辛亥藉田禮畢甲寅幸閱武堂營酒小㑹十一年正月皇太子長懋薨甲午立太孫昭業爲皇太孫七月上不豫徙居迎昌殿始登階而屋鳴咤甚惡之戊寅大漸詔曰始終大期聖賢不免吾行年六十亦復何恨但皇業艱難萬機事重不能無遺慮耳太孫進德日茂社禝有􅀉子良善相毗輔思弘治道百辟庶條各奉爾職謹事大孫勿有懈怠知復何言又詔曰我識滅之後身著夏衣􅀞天衣純烏犀導路器服悉不得用寳物及織成常所服身刀長短二口鐵環者隨我入梓宫靈上勿以牲牢爲􅀕􅀕唯設䴵茶飲乾飯酒脯而巳喪禮每存省約不須煩民百官六時入臨又顯陽殿玉像諸佛及供飬具如别牒可盡心禮拜供飬自今公私皆不得出家爲道及起立塔寺以宅爲精舎並嚴斷之唯年六十必有道心者聽朝賢選序巳有别詔是日崩年五十四九月丙寅葬景安陵帝剛毅有斷爲治緫大體以冨國爲先頗不喜遊宴彫綺之事言常恨之未能頓遣詔凡諸遊煩宜從休息自今逺近薦獻務存節儉珠玉玩好傷工尤重嚴加禁絶蕭昭業蕭子顯齊書曰鬱林王昭業字元尚小名法身文惠太子長子也丗祖即位封南郡王文惠太子薨立爲皇太孫即位追尊文恵太子爲丗宗文皇帝隆昌元年正月大赦改元加太傅竟陵王子良殊禮閏月丁夘以鎭軍大將軍西昌侯鸞即本號開府儀同三司七月癸巳太后令嗣主特鍾沵氣爰表弱齡自入纂鴻業長惡滋甚居喪無一日之哀衰絰爲忻宴之服昏酣長夜萬機斯壅社稷危殆有過綴旒鎭軍居正體道家國是賴伊霍之舉實􅀉淵謨便可依舊典以禮廢黜中軍新安王體自文皇叡哲天秀冝入嗣洪業永寜四海外即以禮奉迎昭業少羙容止好􅀠書丗祖敕皇孫手書不得妄出以貴重之進對音吐甚有令譽王侯五日一問訊丗祖帝獨呼昭業至幄座别加撫問呼爲法身重愛甚文惠太子崩昭業毎臨􅂘輙號咷不自勝俄爾還内歡􅀏極樂在丗祖喪泣竟入後宫常列故伎二部入閣迎奏爲南郡王時文恵太子禁其起居節其用度昭業謂豫章王妃􅁃氏曰阿婆佛法言有福德生帝王家今日見作天子便是大罪左右主師動見拘執不如作市邊屠沽冨兒百倍矣及即位極意賞賜動百數十萬毎見錢曰昔時思汝一箇不得今用汝未朞年之間所岀諸庫儲錢數億垂盡開主衣庫與不逞群小又給閹人竪子各數人隨其所欲恣意輦取諸寳器以相剖擊破碎之以爲􅀏樂好鬬鷄密買雞至數千價丗祖御物甘草杖宫人寸斷用之毀丗祖招婉殿以封賜閹人徐龍駒爲齋龍駒尤親幸爲後閤舎人曰夜在宫房内昭業與文帝幸􅁎霍氏淫通龍駒勸長留内聲言度霍氏爲尼以餘人代之皇后亦淫亂齋閤通夜洞開内外淆雜無復分别}
