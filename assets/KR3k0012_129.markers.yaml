  - {type: variant, offset: 5447, length: 0, content: '', SBCK: 書曰丗祖武皇帝諱頥字宣逺太祖長子也小諱龍兒生於建康淸溪宅其夜陳孝后劉昭后同夢龍據屋上故以字上􅀄爲㝷陽國侍郎辟西曹書佐出爲贑令尚書庫部桂陽}
