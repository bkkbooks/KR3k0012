  - {type: variant, offset: 1234, length: 1125, content: 公公至下邳留船運輜重自帥精銳步歸孟昶諸葛長民懼寇之深也欲擁天子過江公弗聽昶窮窘無餘圖飲藥而卒群賊大至公悉出輕利帝躬提幡鼓命軍眾齊力擊之賊眾大敗追奔逮夜乃收兵而歸循等還潯陽公更簡練三軍將進攻討循聞大軍至欲遁還豫章乃悉力柵斷左里丙申大軍至左里將戰公麾以進兵幡竿折遂沉于水眾皆失色公自忻笑曰往年覆舟之戰亦幡竿折今復然賊必破矣眾乃大悅即攻柵並進循兵雖死戰猶弗能禁諸軍乘勝擊之循單舸走劉蕃孟懷玉斬徐道覆于始興傳首京師交州刺史杜慧度斬盧循父子函七首送都劉毅為荊州刺史矜功驕縱公表請討之毅單騎出自隘道側分遣諸軍伐蜀以朱齡石為益州刺史公授以謀略遂平成都斬偽蜀王譙縱荊州刺史司馬休之僭結雍州刺史魯宗之宗之得書響應公帥眾軍西討休之不敢戰乃棄城走奔偽羗偽主姚興死子泓新立人情騷擾公乃抗表北伐諸軍入關及姚泓戰大破之泓肉袒稽首公至長安長安豐稔帑藏盈積後宮數千人公先收彝器渾儀土圭之屬獻于京師其餘珍寶珠王悉以班諸將士執姚泓歸之有司斬于建康市公至洛陽常有紫雲見於軍上晉帝乃命有司禪位于王改元熙二年為永初元年三年正月崩于西陵年六十沈約宋書曰高祖諱裕字德輿漢楚元王交之後也小字寄奴初高祖家貧嘗負刁逵社錢三萬經時無以還逵執錄甚嚴王謐造逵見之乃密以錢代還由是得釋高祖名微位薄盛流皆不與相知唯謐交焉桓玄將篡謐手解安帝璽紱為玄佐命功臣及義旗事建眾並謂謐宜誅唯高祖保持之上清簡寡欲嚴整有法度不視珠玉輿馬之飾後庭無絲竹之音寧州嘗獻虎魄枕光色甚麗時將北征以虎魄治金瘡上大悅命擣碎分付諸將卒關中得姚興後女有盛寵以之廢事謝晦諫即時遣出錢帛皆付外府內無私藏宋臺建有司奏東西堂施局腳床銀塗釘上不許使用直腳床釘用鐵孝武帝大明中壞上所居陰室於其處起玉燭殿與群臣觀之床頭土鄣璧上掛葛燈籠麻繩紼侍中袁覬盛稱上儉素之德故能光有天下克成大業者焉宋書高祖遊京口竹林寺獨臥講堂前上有五色龍章眾僧見之驚以白帝帝獨喜曰上人無妄言也述異記曰宋高祖微時嘗遊會下過孔靜宅正晝臥有神人衣服非常謂之曰起天子在門既而失之靜遽出適與帝遇延入結交贈遺臨別執帝手曰卿後必當大貴願以身嗣為託帝許之及定京邑靜自山陰令擢為會稽內史劉義符徐爰宋書曰少帝諱義符高祖長子也高祖崩五月即皇帝位廬陵王義真明雋秀令朝野屬望而司空徐羨之尚書僕射傅亮領軍謝晦等貪弄朝權深相忌憚乃共誣罔搆成其釁是日上䟽收義真徙于新安郡徐羨之王弘傅亮謝晦檀道濟等守門露仗入殿時上在華林園寢舟中兵士競進殺侍御者二人遂扶上出東閤廢為滎陽王一依漢昌邑晉海西故事遂徙干吳郡六月徐羨之等使邢安太殺滎陽王於金昌亭年十九沈約宋書曰羨之等將謀廢立而廬陵王義真輕動多過不任主四海乃先廢義真然後廢帝侍中程道惠勸立第五皇帝恭羨之不許遣使殺真於新安殺帝於吳縣帝突走出門追者以門關擊之倒地然後加害劉義隆沈約宋書曰, WYG: ''}
