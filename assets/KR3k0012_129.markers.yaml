  - {type: variant, offset: 5542, length: 0, content: '', WYG: 賈生之言昔者成王幼或襁褓之中召公為太保周公為太傅太公為太師保則保其身體傅則傅其德義師則導之敎訓此三公之職也又置三少曰少保少傅少師是與太子晏者也故乃孩提有識三公三少因明孝仁義禮以道習之不使見惡行選天下之儒士孝悌博聞有道術以翼衛之使與太子居處故太子生乃見正事聞正言行正道左右前後皆正人也習與正人居猶生長齊地不能不齊言習與不正人居猶生長楚地不能不楚言也秦使趙髙傅胡亥敎之訟獄所習者非斬劓人則夷人之三族也故胡亥今日即位明日殺人有忠諌者謂之誹謗深計者謂之妖言視殺人如刈草菅然豈胡亥之性惡哉彼其導之者非其理也故選左右禆教之最急此五君者稟凡庸之性無周召之師逺益友之箴規狎不端之近習以斯下質生而楚言覆國亡身理故然也蕭寶融蕭子顯齊書曰和帝諱寶融字智昭髙宗第八子建武元年封隨郡王永元元年改封南康王出為荆州寧益梁南北秦七州諸軍事西中郎将荆州刺史蕭頴胄殺巴西郡太守劉山陽奉王舉兵以雍州刺史蕭衍為使持節都督諸軍事左将軍以蕭頴胄為右将軍督行諸軍事夏侯亶自京師至江陵稱宣德皇后令南康王冝纂成國祚光臨億兆方俟清宫未即大號可且封十郡為宣城公加相國荆州牧又加黄鉞蕭頴胄為左長史進號鎮軍蕭衍進號征東将軍己巳羣寮上尊號中興元年正月乙巳即皇帝位大赦改元以相國左長史蕭頴冑為尚書令領軍将軍蕭偉為雍州刺史十二月建康城平皇太后令以蕭偉為大司馬録尚書事驃騎大将軍揚州刺史封建安郡公依晉武陵王遵承制故事百僚致敬二年正月皇太后臨朝入居内殿以大司馬蕭衍都督中外諸軍事加殊禮進位相國總百揆揚州牧封十郡為梁公備九錫之禮位在諸王上二月進梁公爵為王増封十郡建天子旌旗出警入蹕三月丙辰遜位于梁丁卯梁奉帝為巴陵王徙姑熟戊辰薨年十五追為和帝葬恭安陵太平御覽卷一百二十九}
