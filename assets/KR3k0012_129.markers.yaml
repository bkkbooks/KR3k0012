  - {type: variant, offset: 252, length: 226, content: 會遇賊至仍迎擊之賊眾數千高祖所將人多死而戰意方酣奮長刀所殺傷甚眾牢之子敬宣疑高祖淹久恐為賊所殺乃輕騎赴之既而眾騎並至賊遂大崩高祖為流矢所傷通中信宿而愈自後屢被重傷皆弗以為患軍中益加敬憚恩北走海鹽高祖追而翼之築城于海鹽故治恩知城弗可下乃進向滬高祖復棄城追之恩乘風浮海奄至丹徒師眾數萬鼓噪登于蒜山居民皆荷檐而走高祖率所領棄擊大破之投巘赴水死者甚眾恩顛沛僅得還船雖被摧破猶恃眾力遂徑向京師朝廷震懼以高祖為建武將軍下邳太守帥舟師討恩于郁洲復大破之桓玄從兄循以撫, SBCK: 右}
