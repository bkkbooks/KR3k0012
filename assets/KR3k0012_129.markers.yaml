  - {type: variant, offset: 5488, length: 0, content: '', WYG: 守李居士以新亭降義軍築長圍守宫城十二月王珍國侍中張稷等帥兵入殿廢帝帝在東宫便好弄不喜書學及即位性重澁少言不與朝士接唯親信閹人日夜于後堂戲馬五更方睡至晡乃起漸出遊走屛逐居民從萬春門遊東宫以東至于郊外數十百里皆空家静室巷陌懸幔為髙障置伎人防守謂之屏除夜出晨反火光照天拜愛姬潘氏為貴妃仍以金蓮帖地使妃行于其上曰此歩歩蓮花也毎出妃乘卧輿帝騎馬從後著織成袴褶金箔帽執七寶纏矟戎服急裝不變寒暑凌冐雨雪不避坑阱馳騁渴乏輒下馬解取腰邉蠡器酌水飲之復上馬馳去選無賴小兒善走者逐馬左右百人常以自隨置射雉塲二百九十二處翳中帷帳及步障皆縁以紅錦金銀鏤弩牙瑇瑁帖箭郊郭四民樵蘇路絶吉㓙失時轝疾棄屍不得殯葬後宫遭火之後更起仙華神仙玉壽諸殿刻畵彫彩麝香塗壁錦幔珠簾窮極綺麗又信鬼神迎神像及諸廟雜神皆入後宫禱祀祈福及聞兵入趣出户閹人黄泰平傷其膝仆地曰反耶直後張齊斬首送梁王稱宣德皇后令依漢海昏侯故事追封東昏侯唐秘書監虞世南公子先生論云公子曰宋齊二代廢王有五并驕滛狂暴前後如一或身被弑戮或傾墜宗社豈厥性頑㐫自貽}
