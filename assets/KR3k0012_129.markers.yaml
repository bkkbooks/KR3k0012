  - {type: variant, offset: 1038, length: 718, content: 挾天子奔于江陵冠軍將軍劉毅輔國將軍何無忌帥諸軍南討破玄大將軍郭鈴等于桑落洲玄棄眾復挾天子西走初益州刺史毛璩遣弟子循之誘玄以入蜀至於枚回州益州督護馮遷斬玄首傳于京師天子反正詔進位侍中都督中外諸軍事高祖固讓加錄尚書封豫章公邑萬戶絹三萬匹鮮卑慕容德僭號於青州德死從子超襲偽位公抗表北討屠廣因超踰城走獲之戮其王公以下約口萬餘馬二千匹夷其城隍獻超于京師斬于建康市盧循寇南康盧陵豫章諸郡守皆委任奔走馳使徵公公至下邳留船運輜重自帥精銳步歸孟昶諸葛長民懼寇之深也欲擁天子過江公弗聽昶窮窘無餘圖飲藥而卒群賊大至公悉出輕利帝躬提幡鼓命軍眾齊力擊之賊眾大敗追奔逮夜乃收兵而歸循等還潯陽公更簡練三軍將進攻討循聞大軍至欲遁還豫章乃悉力柵斷左里丙申大軍至左里將戰公麾以進兵幡竿折遂沉于水眾皆失色公自忻笑曰往年覆舟之戰亦幡竿折今復然賊必破矣眾乃大悅即攻柵並進循兵雖死戰猶弗能禁諸軍乘勝擊之循單舸走劉蕃孟懷玉斬徐道覆于始興傳首京師交州刺史杜慧度斬盧循父子函七首送都劉毅為荊州刺史矜功驕縱公表請討之毅單騎出自隘道側分遣諸軍伐蜀以朱齡石為益州刺史公授以謀略遂平成都斬偽蜀王譙縱荊州刺史司馬休之僭結雍州刺史魯宗之宗之得書響應公帥眾軍西討休之不敢戰乃棄城走奔偽羗偽主姚興死子泓新立人情騷擾公乃抗表北伐諸軍入關及姚泓戰大破之泓肉袒稽首公至長安長安豐稔帑藏盈積後宮數千人公先收彝器渾儀土圭之屬獻于京師其餘珍寶珠王悉以班諸將士執姚泓歸之有司斬于建康市公至洛陽常有紫雲見於軍上晉帝乃命有司禪位于王改元熙二年為永初元年三年正月崩于西陵年六十沈約宋書曰高祖諱裕字德輿漢楚元王交之後也小字寄奴初高祖家貧嘗負刁逵社錢三萬經時無以還逵執錄甚嚴王謐造逵見之乃密以錢代還由是得釋高祖名微位薄盛流皆不, SBCK: ''}
