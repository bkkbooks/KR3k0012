  - {type: variant, offset: 5479, length: 0, content: '', SBCK: 五謚曰恭王蕭鸞蕭子顯齊書曰髙宗明皇帝諱鸞字景栖始安貞王道生子也少􅀌太祖撫育恩過諸子宋丗爲安􅁻令有嚴能之名遷寧朔將軍淮南宣城二郡太守太祖踐祚遷侍中封西昌侯建武元年持節冠軍將軍郢州刺史丗祖即位轉度支尚書侍中領驍􅀐將軍王子侯舊乗􅆞帷車髙宗獨乗下帷儀從如素士遷中領軍左衛將軍豫州刺史尚書左僕射領右衛將軍武帝遺詔爲侍中尚書令加鎭軍中書監開府儀同}
  - {type: page-break, offset: 5479, content: '', id: KR3k0012_SBCK_129-6a}
