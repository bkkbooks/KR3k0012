  - {type: variant, offset: 3473, length: 1125, content: 下省將見害者數矣卒得無恙世祖崩其日太子即皇帝位罷南北二馳道孝建以來所改制度還依元嘉是歲諸郡大旱甚米一斗數百京邑亦至百餘永光元年春改元大赦八月帝自率宿衛兵誅太宰江夏王義恭尚書令驃騎大將軍柳元景尚書左僕射顏師伯廷尉劉德願改元為景和元年以宮人謝氏為貴嬪夫人加虎賁鞁戟鸞輅龍旗出警入蹕時帝凶悖日甚誅殺相繼內外百司不保首領先訛言湘中出天子帝將南巡荊湘二州以厭之先欲誅除諸叔然後發太宗與左右阮佃夫王道隆李道兒密結帝左右壽寂之姜產之等十一人謀共廢帝戊午夜帝於華林園竹林堂射鬼時巫云見此堂有鬼故帝自射之壽寂之懷刀入姜產之為副帝欲走寂之追而殞之時年十七帝幼而狷急在東宮每為世祖所責世祖西巡子業啟參起居書跡不謹上讓之子業啟事陳謝上荅曰書不長進此是一條耳聞汝素業都懈狷戾日甚何以頑固爾耶帝少好讀書頗識古事自造世祖誅及雜篇章往往有辭彩沈約宋書曰前廢帝景和末召南平王鑠妃江氏入宮使左右於前逼迫之江氏不受命謂之曰若不從當殺汝三子江氏猶不肯於是遣使於第殺敬猷敬淵等杖一百其夕廢帝亦殞劉彧沈約宋書曰太宗明皇帝諱彧字休炳小字榮期文帝第十一子也為雍州刺史景和末上入朝被留停廢帝誅害宰輔殺戮大臣恒慮有圖之者疑畏諸父並拘之殿內收上付廷尉一宿被原將加禍害者前後非一既而害上意定明旦便應就禍害上先與腹心阮佃夫李道兒壽寂之等密共合謀殞廢帝於後堂建安王休仁便稱臣引升西堂御坐召見諸大臣于時事出倉卒上失履跣至西堂猶著烏帽坐定休仁呼主衣以白帽代之引備羽儀雖未即位凡眾事悉稱令書施行上即皇帝位大赦天下改景和元年為太始元年鎮軍將軍江州刺史晉安王子勛舉兵反鎮軍長史鄧琬為其謀主雍州刺史袁顗帥眾赴之車駕親御六師出頓中興堂司徒建安王休仁帥眾軍大破賊斬偽尚書僕射袁顗進討江郢荊雍相五州平定之晉安王子勛並賜死同黨皆伏誅太豫元年四月上大漸袁粲禇淵劉勔蔡興宗沈攸之同被顧命上崩于景福殿年四十四帝少而和美風姿端雅早失所生飬於路太后房內大明世諸弟多被猜忌唯上見親常侍路太后醫藥好讀書愛文義在藩時撰江左以來文章志又續衛瓘所注論語二卷行世及即大位四方反叛以寬仁待物諸將帥有父兄子弟同逆者並授以禁兵委任不異故眾為之用莫不盡力平定天下逆黨多被全宥其才者並見授用有如舊臣才學之士多蒙引進參攷典籍應對左右於華林園茆堂講周易常自臨聽末年好鬼神多忌諱近讒慝剪落皇技宋氏之業自此衰矣沈約宋書曰王景文為揚州刺史上既有疾而諸弟並已見殺唯桂楊王休範人才本下不見疑出為江州刺史慮一旦晏駕皇后臨朝景文自然成宰相門族強盛籍元舅之重歲暮不為純臣太豫元年春上疾篤乃遣使送藥賜景文死手詔曰與卿周旋欲全卿門戶故有此處分劉昱沈約宋書曰廢帝諱昱字德融小字慧震明帝長子也太宗諸子在孕皆以周易筮之即以得之卦為小字故帝字慧震立為皇太子太宗崩太子即位元徽元年正月改元二年太尉, SBCK: ''}
