  - {type: variant, offset: 4269, length: 329, content: 路太后醫藥好讀書愛文義在藩時撰江左以來文章志又續衛瓘所注論語二卷行世及即大位四方反叛以寬仁待物諸將帥有父兄子弟同逆者並授以禁兵委任不異故眾為之用莫不盡力平定天下逆黨多被全宥其才者並見授用有如舊臣才學之士多蒙引進參攷典籍應對左右於華林園茆堂講周易常自臨聽末年好鬼神多忌諱近讒慝剪落皇技宋氏之業自此衰矣沈約宋書曰王景文為揚州刺史上既有疾而諸弟並已見殺唯桂楊王休範人才本下不見疑出為江州刺史慮一旦晏駕皇后臨朝景文自然成宰相門族強盛籍元舅之重歲暮不為純臣太豫元年春上疾篤乃遣使送藥賜景文死手詔曰與卿周旋欲全卿門戶故有此處分劉昱沈約宋書曰廢帝諱昱字德融小字慧震明帝長子也太宗諸子在孕皆以周易筮之即以得之卦為小字故帝字慧震立為皇太子太宗崩太子即位元徽元年正月改元二年太尉, WYG: 中}
