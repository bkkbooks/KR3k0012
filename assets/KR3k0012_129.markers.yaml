  - {type: variant, offset: 4817, length: 440, content: 歸四年春夏此行彌數自京城剋定意志轉驕於是無日不出與左右人解僧智張立鬼恒自馳逐夜出承明門久去晨反旦去暮歸從者並執鋌矛行人男女及馬驢值無免者民間憂懼晝日不敢開門道上行人殆絕常著小袴未嘗服衣冠有白棓數十枚各有名號鉗鑿錐鋸之徒不離左右嘗以鐵錐錐人陰破左右人見斂眉者昱大怒令此人祖臂正立以矛刺臂洞骨於耀靈殿上飬驢數十頭所自乘馬飬於御床側先是民間訛言謂太宗不男昱是李道兒子昱每出入去來常自稱劉統或自號李將軍與右衛翼輦營女子私通每從之遊持百數十錢供酒肉之費輅車一乘其上施蓬乘以出入從者不過數十人羽儀追之恒不及又各慮禍亦不敢追尋惟整部伍別在一處瞻望而已凡諸鄙事過目即能能鍜金銀裁衣作帽莫不精絕未嘗吹箎執管便韻天性好殺以此為忻一日無事慘慘不樂齊王潛圖廢立與直閣將軍王敬則謀之七月七日昱乘露車從二百許人無復鹵簿羽儀往青園尼寺曉至新安寺就曇渡道人飲酒醉扶夕還仁壽殿東河艖氈幄中臥時昱出入無禁大內諸閣夜皆不閉廂下畏相逢值無敢出者宿衛並逃避內外無相禁攝王敬則先結昱左右楊萬年等二十五人謀共取昱其夕王敬則出外, SBCK: 止}
