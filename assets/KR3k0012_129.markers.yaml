  - {type: variant, offset: 339, length: 648, content: 中益加敬憚恩北走海鹽高祖追而翼之築城于海鹽故治恩知城弗可下乃進向滬高祖復棄城追之恩乘風浮海奄至丹徒師眾數萬鼓噪登于蒜山居民皆荷檐而走高祖率所領棄擊大破之投巘赴水死者甚眾恩顛沛僅得還船雖被摧破猶恃眾力遂徑向京師朝廷震懼以高祖為建武將軍下邳太守帥舟師討恩于郁洲復大破之桓玄從兄循以撫軍將軍鎮丹徒以高祖為中軍參軍玄篡帝位循入朝玄高祖從至京師玄既宿憚高祖威名又悅高祖之風儀姿貌語司徒王謐曰昨見劉裕卿不得獨擅其清或說玄曰劉裕龍行虎步聸視不凡恐必不為人下宜早為其所玄曰我方欲平蕩中原使裕以萬人為前驅關隴不足定也事定之後當更議之耳高祖乃與弟道規沛郡劉毅東海何無忌潛謀匡復桓循弟弘以征虜將軍領廣陵以道規為中兵參軍劉毅先亦為弘吏佐遭母憂還京口是至住江北與道規共集義徒高祖託遊獵會無忌及任城魏詠之高平擅馮之及從弟蕃等同謀二十七人并願從者百餘人是時大風暴起丙辰詰朝城門開義眾馳入稱有詔齊聲大呼吏士驚散即獲桓循斬而徇之與桓弘主簿平昌孟昶等帥壯士六十人斬弘于廣陵城因收眾濟江玄遣頓丘太守吳甫之右衛將軍皇甫敷北拒義軍或曰裕等眾力甚弱豈有辦成陛下何慮之甚玄曰劉裕足為一世之雄劉毅家無檐石之儲樗蒱一擲百萬何無忌劉牢之甥酷似其舅共舉大事何謂無成眾推高祖為盟主移檄京邑遇吳甫之於江乘甫之玄驍將也其兵甚銳高祖躬執長刀徑入其陣眾皆披靡即斬甫之進至羅落橋高祖望賊旗鼓誓眾馳進挺劍指麾光曜如電將士皆莫敢仰視但憑神武爭為先登殊死而戰無不一當百呼聲動天地風火並起鉦鼓之音震駭京邑桓謙等諸軍一時土崩高祖鎮石頭留臺百官群僚宿衛各率其職於是推高祖為使, WYG: ''}
