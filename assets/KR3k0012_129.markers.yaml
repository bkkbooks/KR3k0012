  - {type: variant, offset: 5445, length: 0, content: '', SBCK: 建元元年四月甲午即位於南郊柴燎告天昇壇受禪禮畢即建康宫大赦改昇明三年爲建元元年封宋帝爲汝隂王五月汝隂王薨追謚爲宋順帝四年三月庚申有疾召司徒禇淵左僕射王儉曰吾遘疾弥留至}
  - {type: variant, offset: 5445, length: 0, content: '', WYG: 建元元年四月甲午即位於南郊柴燎告天昇壇受禪禮畢即建康宫大赦改昇明三年為建元元年封宋帝為汝隂王五月汝隂王薨追諡為宋順帝四年三月庚申召司徒禇淵左僕射王儉詔曰吾遘疾彌留至}
  - {type: variant, offset: 5445, length: 0, content: '', krp: 建元元年四月甲午即位於南郊柴燎告天昇壇受禪禮畢即建康宫大赦改昇明三年爲建元元年封宋帝爲汝隂王五月汝隂王薨追謚爲宋順帝四年三月庚申有疾召司徒禇淵左僕射王儉曰吾遘疾弥留至}
  - {type: variant, offset: 5446, length: 0, content: '', SBCK: 危篤公等奉太子如事吾當令太子敦睦親戚委任賢才崇尚節儉弘宣簡惠則天下之理盡矣壬戍崩于臨光殿年五十六謚曰太祖髙皇帝上少有大量􅀶渉經史善屬文雖經綸夷險不廢素業後宫器物欄檻以銅爲飾者改用䥫内殿施黄紗帳宫人著紫皮履欲以身率下移風變俗毎曰使我治國十年當使金土同價四月庚寅葬武進大安陵蕭頥蕭子顯}
  - {type: page-break, offset: 5446, content: '', id: KR3k0012_SBCK_129-3a}
  - {type: variant, offset: 5446, length: 0, content: '', WYG: 大漸公等奉太子如事吾當令太子敦睦親戚委任賢才崇尚節儉𢎞宣簡惠則天下之理盡矣壬戌崩於臨光殿年五十六四月上諡曰太祖髙皇帝上少有大量博涉經史其後經綸夷險不廢素業後宫器物欄檻以銅為飾者改用鉄内殿施黄紗帳宫人著紫皮履欲以身率下移風變俗毎曰使我治國十年當使金土同價四月庚寅葬武進大陵蕭賾蕭子顯}
