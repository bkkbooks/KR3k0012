  - {type: variant, offset: 1757, length: 666, content: 相知唯謐交焉桓玄將篡謐手解安帝璽紱為玄佐命功臣及義旗事建眾並謂謐宜誅唯高祖保持之上清簡寡欲嚴整有法度不視珠玉輿馬之飾後庭無絲竹之音寧州嘗獻虎魄枕光色甚麗時將北征以虎魄治金瘡上大悅命擣碎分付諸將卒關中得姚興後女有盛寵以之廢事謝晦諫即時遣出錢帛皆付外府內無私藏宋臺建有司奏東西堂施局腳床銀塗釘上不許使用直腳床釘用鐵孝武帝大明中壞上所居陰室於其處起玉燭殿與群臣觀之床頭土鄣璧上掛葛燈籠麻繩紼侍中袁覬盛稱上儉素之德故能光有天下克成大業者焉宋書高祖遊京口竹林寺獨臥講堂前上有五色龍章眾僧見之驚以白帝帝獨喜曰上人無妄言也述異記曰宋高祖微時嘗遊會下過孔靜宅正晝臥有神人衣服非常謂之曰起天子在門既而失之靜遽出適與帝遇延入結交贈遺臨別執帝手曰卿後必當大貴願以身嗣為託帝許之及定京邑靜自山陰令擢為會稽內史劉義符徐爰宋書曰少帝諱義符高祖長子也高祖崩五月即皇帝位廬陵王義真明雋秀令朝野屬望而司空徐羨之尚書僕射傅亮領軍謝晦等貪弄朝權深相忌憚乃共誣罔搆成其釁是日上䟽收義真徙于新安郡徐羨之王弘傅亮謝晦檀道濟等守門露仗入殿時上在華林園寢舟中兵士競進殺侍御者二人遂扶上出東閤廢為滎陽王一依漢昌邑晉海西故事遂徙干吳郡六月徐羨之等使邢安太殺滎陽王於金昌亭年十九沈約宋書曰羨之等將謀廢立而廬陵王義真輕動多過不任主四海乃先廢義真然後廢帝侍中程道惠勸立第五皇帝恭羨之不許遣使殺真於新安殺帝於吳縣帝突走出門追者以門關擊之倒地然後加害劉義隆沈約宋書曰太祖文皇帝諱義隆小字車兒武帝第三子也授西中郎將荊州刺史長七尺五寸愽涉經史善隸書少帝廢百官備法駕奉迎即皇帝位改元元嘉元年三年司徒錄, SBCK: ''}
