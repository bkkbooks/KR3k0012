  - {type: variant, offset: 2661, length: 377, content: 口復載將去三十年二月濬自京口入朝復載還東宮有告上云京口有一尼服食出入征北內似是嚴道士上使掩捉得二婢云道育隨濬還都上乃使京口送道育二婢頃至撿覆廢劭賜濬死母潘淑妃具以告濬濬馳報劭劭因是有異謀其月二十一日召前中庶子蕭斌告以逆事明旦與斌同載從萬春門入張超之手行殺逆又使人殺潘淑妃濬屯中堂劭即偽位改元嘉三年為太初元年世祖及南譙王義宣隨王誕並舉義兵劭以事委王羅漢魯秀以拒義軍三月十九日義軍至新林二十一日至新亭二十二日劭眾連敗相繼散降四月四日義軍薛安都等並入殿臧質從廣莫門入同會大極殿劭穿西垣入武庫井中即從井中牽出縛劭於馬上防送軍門斬于牙下濬劭及四子並梟首曝屍於市投劭濬屍于江張超之為亂兵所剖腹刳心臠食其肉焚其頭骨道育鸚鵡並都街鞭殺於石頭西望山下焚屍揚灰于江後史官目劭為元凶劉駿沈約宋書曰世祖孝武皇帝諱駿字休龍小字道民文帝第三子遷南中郎將江州刺史元凶殺逆以為征南將軍加, WYG: 拜}
