  - {type: variant, offset: 3560, length: 648, content: 驃騎大將軍柳元景尚書左僕射顏師伯廷尉劉德願改元為景和元年以宮人謝氏為貴嬪夫人加虎賁鞁戟鸞輅龍旗出警入蹕時帝凶悖日甚誅殺相繼內外百司不保首領先訛言湘中出天子帝將南巡荊湘二州以厭之先欲誅除諸叔然後發太宗與左右阮佃夫王道隆李道兒密結帝左右壽寂之姜產之等十一人謀共廢帝戊午夜帝於華林園竹林堂射鬼時巫云見此堂有鬼故帝自射之壽寂之懷刀入姜產之為副帝欲走寂之追而殞之時年十七帝幼而狷急在東宮每為世祖所責世祖西巡子業啟參起居書跡不謹上讓之子業啟事陳謝上荅曰書不長進此是一條耳聞汝素業都懈狷戾日甚何以頑固爾耶帝少好讀書頗識古事自造世祖誅及雜篇章往往有辭彩沈約宋書曰前廢帝景和末召南平王鑠妃江氏入宮使左右於前逼迫之江氏不受命謂之曰若不從當殺汝三子江氏猶不肯於是遣使於第殺敬猷敬淵等杖一百其夕廢帝亦殞劉彧沈約宋書曰太宗明皇帝諱彧字休炳小字榮期文帝第十一子也為雍州刺史景和末上入朝被留停廢帝誅害宰輔殺戮大臣恒慮有圖之者疑畏諸父並拘之殿內收上付廷尉一宿被原將加禍害者前後非一既而害上意定明旦便應就禍害上先與腹心阮佃夫李道兒壽寂之等密共合謀殞廢帝於後堂建安王休仁便稱臣引升西堂御坐召見諸大臣于時事出倉卒上失履跣至西堂猶著烏帽坐定休仁呼主衣以白帽代之引備羽儀雖未即位凡眾事悉稱令書施行上即皇帝位大赦天下改景和元年為太始元年鎮軍將軍江州刺史晉安王子勛舉兵反鎮軍長史鄧琬為其謀主雍州刺史袁顗帥眾赴之車駕親御六師出頓中興堂司徒建安王休仁帥眾軍大破賊斬偽尚書僕射袁顗進討江郢荊雍相五州平定之晉安王子勛並賜死同黨皆伏誅太豫元年四月上大漸, WYG: ''}
