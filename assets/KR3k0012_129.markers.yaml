  - {type: variant, offset: 37, length: 132, content: 夕甘露降于墓樹嘗遊下邳遇一沙門于逆旅沙門言及中原事故因云江表尋當喪亂高祖曰便遂至亂亡當有拯之者不沙門曰拯之者其在君乎其意甚至初高祖患手瘡積年未瘳沙門曰此瘡難治先有良藥當以相與因出懷中黃散褁留之沙門既去高祖追而望之倏忽不見以黃散治瘡一傅而愈餘散寶錄之被金瘡輒用有驗晉, SBCK: 爲蘭}
