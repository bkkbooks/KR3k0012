  - {type: variant, offset: 2410, length: 4, content: 鐵椎椎殺, SBCK: 時塓館宫室圬人塗者論語曰宰予晝寢子曰朽木不可雕也糞土之墻不可汚也橙都鄧切續晉陽秋曰何無忌母劉牢之姉也無忌與髙􅃝謀夜於屏風裏制檄文母潜橙於屏風上窺之旣知其謀大喜謂曰汝能如此吾讎耻雪矣丗􅀃曰謝中郎在壽陽敗臨奔走猶求}
  - {type: variant, offset: 2410, length: 10, content: 鐵椎椎殺王孫聖益州記, WYG: 時塓館宫室論語}
