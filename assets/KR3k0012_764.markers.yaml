  - {type: variant, offset: 2721, length: 2, content: 魏明, krp: 張天下以爲之籠因江海以爲之罟何亡魚失鳥之有乎又曰狐裘負籠甚可恠也世說曰宋處宗甚有思理常得一長鳴雞愛而食之恒籠盛着䆫間雞遂作人語與處宗談論極有言思終日不輟處宗因此言巧大進楚辭曰鳯皇作鶉籠兮雖翕翅其不容傳咸班鳩賦叙云余楸蔚然成林閑居無爲有時遊之顧見班鳩音聲可恱於見捕而畜之旣巳擾馴岀之於籠無何失去後時時一來飛翔似如有戀聊爲之賦成公綏鸚鵡賦曰小禽也以其能言解意故爲人所愛之以金籠升之以殿堂可謂珎之矣蓋乃未得鳥之性也古詩曰羅敷好蠶桑採桑城南隅青絲爲籠繩桂枝爲籠鈎沈約宋書曰廢}
  - {type: variant, offset: 2724, length: 4, content: 好聞椎鑿, krp: 狂悖無道誅害羣公忌憚諸父並聚}
  - {type: punctuation, offset: 2727, content: 、, id: KR3k0012_CHANT_764-bkkpn1023}
