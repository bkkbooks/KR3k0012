  - {type: variant, offset: 51, length: 0, content: '', SBCK: 事庸君臣節不遂二失也少擇交遊寡於親友老而無託是三失也請從此辭投水而死孔子曰弟子記之此足以爲戒於是歸養親者十有二三風俗通曰鎌刀自揆積芻蕘之効鍠音撗異苑曰長山郭悖元嘉十二年病亡後孫兒見悖着帽布裙在靈床上呼孫與語云今}
