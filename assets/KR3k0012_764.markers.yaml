  - {type: punctuation, offset: 157, content: 「, id: KR3k0012_CHANT_764-bkkpn69}
  - {type: variant, offset: 157, length: 446, content: 大喪及窆執斧以莅匠師匠師主豊碑之士執斧以師之使戒其士禮曰禮諸侯賜鈇音夫鉞然後誅又曰天子負斧依南鄉而立斧依為斧文屏風於戶牖之間傳曰楚子執齊慶封將戮之負之斧鉞以徇於諸侯使言曰無或如齊慶封弒其君弱其孤以盟其大夫春秋元命苞曰斧鑕主亂行斬狂詐斧之為言補也漢書曰分周為二有逃責之臺被竊鈇之言應劭曰周赦王出至路邊竊取遇人又曰暴勝之為直指使者衣繡持斧逐捕盜賊又曰王莽司徒王尋初發長安宿霸昌廄亡其黃鉞尋軍士所王素狂直入哭曰此經所謂喪其齊音資斧者也應劭曰齊利也亡其利斧言無以復斬斷者東觀漢記曰祭遵襲略陽遣護軍王忠皆持刀斧伐樹開道又曰蔣翊字元卿後母憎之伺翊寢操斧斫之值詡如廁謝承後漢書曰會稽戴就字景成為都曹掾太守為州所奏就見伏考燒斧以著腋下就罵獄卒此無火氣何不熟燒魏志曰太祖延張繡及其將帥置酒高會太祖行酒典韋持大斧立後刃徑尺太祖所至之所韋輒舉目之繡及將帥莫敢仰視晉書曰魏舒嘗適野王主人妻夜產俄而聞車馬之聲相問曰男也女也曰男書之十五以兵死復問宿者誰曰魏公舒後十五載詣主人問所生兒何在曰因條桑為斧傷而死舒自知為公晉咸和, SBCK: 鍤鍤地}
