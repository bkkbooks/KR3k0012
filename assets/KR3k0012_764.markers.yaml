  - {type: variant, offset: 50, length: 0, content: '', SBCK: 東觀漢記曰山陽郡人江伯欲嫁姉姉引鎌欲自割魏略曰孟康字公休爲弘農太守時岀桉行勑吏卒各持鎌自刈馬草說苑曰孔子聞哭者聲甚悲進見之吾丘子也吾一曰虞擁鎌帶索而哭孔子問何哭之悲對曰吾有三失子曰願聞三失曰吾少好學周遍天下還後吾親亡是一失也素尚髙節}
