  - {type: variant, offset: 2734, length: 29, content: 陳仲舉微時常宿黃申家婦方產夜有叩門者須臾門裏言有客堂下有人, krp: 籯笭也漢書曰韋賢曰遺子黄金滿籯}
  - {type: variant, offset: 2737, length: 7, content: 微時常宿黃申家, WYG: 􅃠而囚之置籠中見夢於王曰我為江使於河伯而􅃠當路豫且得我王有德義故來告愬又曰齊使淳于髠獻鵠於楚出邑門道飛其鵠掲空籠而獻之東觀漢記曰耿恭於疏勒城穿井十五丈不得水恭乃正衣冠向井再拜為吏士禱水身自率士負籠有飛泉涌出吏士驚喜皆稱萬歲晉中興徴祥說曰泰元中公王}
