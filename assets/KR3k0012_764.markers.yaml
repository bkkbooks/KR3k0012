  - {type: variant, offset: 1452, length: 681, content: 所截應倨勾之正也說文曰鋸槍唐也古史考曰孟莊子作鋸史記曰公孫鞅之事孝公也設乃鋸以禁奸邪信賞罰以致理後漢書曰獻帝欲復肉刑孔融議曰雖忠如鬻奉信如楚和智如孫臏一離刀鋸沒世不齒吳志曰孫皓愛妾使人至市賊奪百姓財物同市陳聲繩之以法皓大恕假他事燒鋸斷聲頭王隱晉書曰趙王倫欲廢賈后而門鑰在侍中處所部司馬多木作有利鋸至期倫乃命三部司馬以銅鋸截關開門晉書曰胡母輔之字彥國少擅高名王澄常與人書曰彥國吐佳言如鋸木屑霏霏不絕誠為後進領袖也又中興書曰符健凶淫暴虐常露刀張弓椎鉗鋸鑿殺人之具備置左右宋書曰後廢帝名昱初在東宮惰業好嬉師主不能禁及嗣位漸自放恣晨出暮歸從者並執鋌矛加以虐刑鍼椎鑿鋸之徒不離左右莊子曰禮若亢鋸之柄亢舉也禮有所斷割猶舉鋸之柄以斷物也又曰天下好智而百姓求竭矣於是乎釿音斤鋸顓焉繩墨殺焉椎鑿決焉管子曰軍中必有一斧一鋸尸子曰水非石之鑽繩非木之鋸列女傳曰臧文仲為魯使齊齊拘之文仲使人遺公書恐人得之乃謬其詞曰臧我羊食我以銅魚公及大夫莫能知之乃問臧孫母母泣曰吾子拘有木治矣木治桔也臧我羊者臧善也羊者有母告妻善養母食我以銅魚銅魚其父錯錯者所以治鋸也鋸者所以治木是以知有木治擊於獄矣淮南子曰夏屋聯房公輸王爾無所措剖居綺切劂居月切削鋸然猶未能贍人主之欲也世說曰晉元皇初見賀司空言及吳時孫皓燒鋸截一賀頭是誰司空未復言元皇曰燒是賀邵司空流涕曰昔者先臣遭遇無道臣創巨痛深無以上荅明詔元皇慚愧三日不出衡山記曰雞頭陂西有石室有人採藥暮宿其中曉見一鋸懸在壁上示有形無復鐵貫椎說文曰椎擊也齊謂之柊音終揆音葵鐓丁回切千椎斤也纂文曰柊揆方椎崔贛易林曰亡椎失斧公輸無輔廣雅曰柊揆敤若臥切櫌鐇音煩䤶於葉切椓音卓椎, SBCK: ''}
