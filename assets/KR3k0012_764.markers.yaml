  - {type: variant, offset: 39, length: 4, content: 破除荊棘, SBCK: 詳謹令减斧跡也崔鴻十六國春秋曰石虎馳獵無度晨岀夜歸又多輕行躬行作所太子太保韋謏諌曰白龍魚服有豫且子居切之禍海􅀂潜遊離葛陂之酷願陛下清宫蹕路思二神爲先鑒不可忽天下之重輕行斤斧之間一旦有狂夫之變雖龍騰之勇不暇施也智士之計豈及設哉莊子曰郢人堊漫其鼻端􅀂蠅翼使匠石斵之運斤成風盡堊而鼻不傷郢人立而不失容孫子曰何世之無才何才之無施良匠提斤斧造山林梁棟阿衡之材櫨柱楣椽之朴森然陳於目前大厦之器具矣夢書曰斤斧爲選士取有材夢得斤斧選士來鏟釋名曰鏟平削也廣雅曰籖子簾切謂之鏟也鮑昭蕪城賦曰鏟利銅山鐁音斯釋名曰鐁彌也有髙下迹}
