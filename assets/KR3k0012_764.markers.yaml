  - {type: variant, offset: 2682, length: 0, content: '', krp: 可雕也糞土之墻不可汚也橙都鄧切續晉陽秋曰何無忌母劉牢之姉也無忌與髙袒謀夜於屏風裏制檄文母潜橙於屏風上窺之旣知其謀大喜謂曰汝能}
  - {type: variant, offset: 2683, length: 8, content: 方鑿管子曰軍必有, SBCK: ''}
  - {type: variant, offset: 2683, length: 0, content: '', krp: 此吾讎耻雪矣丗說曰謝中郎在壽陽敗臨奔走猶求王帖橙也籃集異記曰丹陽張承先家有鬼長爲其取物㑹有客湏蓴斤鯉魚二十頭鬼將一小兒持籃至驃騎街十字路小兒睡覺看籃中巳有蓴鯉䈪許的切}
