  - {type: variant, offset: 2479, length: 1, content: 徐, SBCK: 狐裘􅀒籠甚可恠也世􅀃曰宋處宗甚有思理常得一長鳴雞愛而食之恒籠盛着䆫間雞遂作人語與處宗談論極有言思終日不輟處宗因此言巧大進楚辭曰鳯皇作鶉籠兮雖翕翅其不容傳咸班鳩賦叙云余楸蔚然成林閑居無爲有時遊之顧見班鳩音聲可恱於見捕而畜之旣巳擾馴岀之於籠無何失去後時時一來飛翔似如有戀􅂓爲之賦成公綏鸚鵡賦曰小禽也以其能言解意故爲人所愛之}
