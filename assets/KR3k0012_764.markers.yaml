  - {type: variant, offset: 2402, length: 2, content: 夫差, SBCK: 子産相鄭十八年刑三人殺三人錐刀之遺於道者莫之敢舉鑚尚書大傳曰古者中刑用鑚鑿物理論曰趙堯錐鑚之吏能探髙祖深心致位丞相鉗漢書曰江充捕巫蠱燒䥫鉗灼強服之吴時外國傳曰扶南有訟者燒䥫令赤以鉗舉䥫着手行七步無罪者手不燒有罪者手即燋泥鏝爾雅曰鏝謂之圬郭璞注曰􅅺鏝也􅀃文曰鏝䥫圬也左傳曰鄭子産相鄭伯如晉晉侯未之見子産}
  - {type: page-break, offset: 2402, content: '', id: KR3k0012_SBCK_764-5b}
  - {type: variant, offset: 2402, length: 2, content: 夫差, WYG: 子産相鄭十八年刑三人殺三人錐刀之遺於道者莫之舉鑚尚書大傳曰古者中刑用鑚鑿物理論曰趙堯錐鑚之吏能探高祖深心致位丞相鉗漢書曰江充捕巫蠱燒鐵鉗灼强服之呉時外國傳曰扶南有訟官燒䥫令赤以鉗舉著手中行七歩無罪者手不燒有罪者手即焦泥鏝爾雅曰鏝謂之圬說文曰鏝䥫圬也左傳曰鄭子産相鄭伯如晉晉侯未見子産}
