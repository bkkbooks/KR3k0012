  - {type: variant, offset: 2430, length: 0, content: '', SBCK: 􅀑長爲其取物㑹有客湏蓴斤鯉魚二十頭􅀑將}
  - {type: variant, offset: 2431, length: 2, content: 鐵椎, SBCK: 小兒持籃至驃􅀐街十字路小兒睡􅁴看籃中巳有蓴鯉䈪許的切方言曰䈪所以注斛陳魏宋楚之間謂之䈪或謂之籮自􅀜而西謂之注箕郭璞注曰盛米榖冩鮮中也江東亦呼爲䈪籮屬形小而高也續捜神記曰吴興人章苟者於田中耕乗小舡以歸籮魚鮭置舡中著菰裏有物輙巳食盡如此非一後日磨鍜於菰蘆中見一}
  - {type: page-break, offset: 2431, content: '', id: KR3k0012_SBCK_764-6b}
  - {type: punctuation, offset: 2433, content: ，, id: KR3k0012_CHANT_764-bkkpn892}
  - {type: 'tls:seg', offset: 2433, content: '', id: KR3k0012_CHANT_764-41a.10}
  - {type: variant, offset: 2434, length: 0, content: '', SBCK: 虵偷苟以鋘义之中其虵籠史記曰宋元王二年江使神􅀛使於河至泉陽漁者豫且舉綱而囚之置籠中見夢於王曰我爲江使於河伯而網當路豫且得我王有德義故來告愬又曰齊使淳于髠獻鵠於楚岀邑門道飛其鵠揭空籠而獻之東觀漢記曰耿恭於䟽勒城穿井}
  - {type: variant, offset: 2435, length: 2, content: 許圍, SBCK: 五丈不得水恭乃正衣冠向井再拜爲吏士禱水身自率士􅀒籠有飛泉涌岀吏士驚喜皆稱萬歳􅀳中興徴祥􅀃曰㤗元中公王婦女髪緩􅁂傾髻以爲盛飭用髪豐多不可恒戴乃先於籠上榜之名曰假髻或曰假頭至於貧民不能自辯自號無頭就人借髻亦服之妖也無幾時烈宗晏駕而天下騷動二十年中兵革不息孫恩之亂刑斬無數桓􅀇之役死者萬計凢􅀍戮之家多亡頭首沈約宋書曰廢帝狂悖無道誅害羣臣公卿忌憚諸父並聚之殿内歐棰陵曵無復人理建安王休仁及太宗山陽王休祐形體並肥壯帝以竹籠盛而稱之續述征記曰梁鄒西有籠水發源}
