  - {type: variant, offset: 2421, length: 8, content: 市橋莋音作橋今各, SBCK: 丹陽張承先家}
  - {type: variant, offset: 2421, length: 40, content: 市橋莋音作橋今各有一鐵椎大十許圍長六七十尺云初橋引機運此椎以擊橋柱本有三今餘二管, WYG: 宰予晝寢}
  - {type: variant, offset: 2421, length: 68, content: 市橋莋音作橋今各有一鐵椎大十許圍長六七十尺云初橋引機運此椎以擊橋柱本有三今餘二管子曰一農必有一椎莊子曰儒以詩禮發冢曰徐以金椎控其頤無傷口, krp: 古者}
