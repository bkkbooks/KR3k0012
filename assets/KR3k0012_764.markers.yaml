  - {type: variant, offset: 2688, length: 2, content: 軍必, krp: 䈪所以注斛陳魏宋楚之間謂之䈪或謂之籮自關而西謂之注箕郭璞注曰盛米榖冩鮮中也江東亦呼爲䈪籮屬形小而高也續捜神記曰吴興人章苟者於田中耕乗小舡以歸籮魚鮭置舡中著菰裏}
  - {type: variant, offset: 2691, length: 0, content: '', krp: 物輙巳食盡如此非}
  - {type: variant, offset: 2692, length: 103, content: 鑿莊子曰齊桓公讀書堂上輪扁斲輪堂下釋椎鑿而上問桓公抱朴子曰魏明帝好聞椎鑿之聲搜神記曰陳仲舉微時常宿黃申家婦方產夜有叩門者須臾門裏言有客堂下有人不可進曰從後往須臾還留者問曰何等名可與幾歲應以何死荅曰男也名奴得, SBCK: 經太平御覽卷第七百六}
  - {type: page-break, offset: 2692, content: '', id: KR3k0012_SBCK_764-8b}
  - {type: variant, offset: 2692, length: 1, content: 鑿, krp: 後日磨鍜於菰蘆中見一大虵偷苟以鋘义之中其虵籠史記曰宋元王二年江使神龜使於河至泉陽漁者豫且舉綱而囚之置籠中見夢於王曰我爲江使於河伯而網當路豫且得我王有德義故來告愬又曰齊使淳于髠獻鵠於楚岀邑門道飛其鵠揭空籠而獻之東觀漢記曰耿恭於䟽勒城穿井十五丈不得水恭乃正衣冠向井再拜爲吏士禱水身自率士負籠有飛泉涌岀吏士驚喜皆稱萬歳晉中興徴祥說曰㤗元中公王婦女髪緩鬢傾髻以爲盛飭用髪豐多不可恒戴乃先於籠上榜之名曰假髻或曰假頭至於貧民不能自辯自號無頭就人借髻亦服之妖也無幾時烈宗晏駕而天下騷動二十年中兵革不息孫恩之亂刑斬無數桓玄之役死者萬計凢𬒳戮之家多亡頭首沈約宋書曰廢帝狂悖無道誅害羣臣公卿忌憚諸父並聚之殿内歐棰陵曵無復人理建安王休仁及太宗山陽王休祐形體並肥壯帝以竹籠盛而稱之續述征記曰梁鄒西有籠水發源長城山直北流於梁鄒西注濟水或云齊之孝婦誠感神明湧泉發於室内潜以績籠蔽之人莫之知由是無谷汲之勞姑及家人疑而嫉之值出而捜其室旣無所覩試發此籠而泉遂濆涌流漂居宇所以名曰籠水也}
