  - {type: variant, offset: 604, length: 563, content: 居注曰因有司奏魏氏故事正旦賀公卿上殿虎賁六人隨上以斧柄柱衣裙上令宜依舊為儀注詔曰此非前代善制其除之三輔舊事曰王莽夢大夏殿前五銅人語莽惡之斧斫開銅人腹東陽記曰晉中朝時有民王質者入山伐木至石室中見童子數人彈琴而歌因留跂斧柯而聽之童子以物與之狀如棗核質含之便不復飢也童子曰汝來已久宜去質承聲起斧柯漼然爛盡既歸去家已數十年列女傳曰丁仲謀妻氏共夫至交阯夫為賊所殺妻舩上得一斧舉以破賊列仙傳曰赤斧手中常有赤斧錄異傳曰陳世母黃亡後還家但聞聲世忽亡斧黃言問家奴福盜之幽明錄曰文翁常欲斷大樹欲斷處去地一丈八尺翁先祝曰吾若得二千石斧當著此處因擲之中所欲一丈八尺處後果為郡賈逵別傳曰逵廟一柏樹有人竊來斫伐始投斧數下斧刃仍折於樹中七賢傳曰文黨字翁仲與人俱入山取木謂侶人曰吾欲遠學先試投斧高木上斧當挂乃投之斧果上因之長安受經廷尉決事曰廷尉高文惠上民傅晦詣民籍牛塲上盜黍為牛所覺以斧擲折晦腳物故依律牛應棄市監棗超議晦既夜盜牛本無殺意宜減死一等六韜曰操刀不割失利之期執斧不伐賊人將來繁葉不去將為斧柯列子曰人有亡鈇者意其鄰人子視其行步竊鈇也顏色竊鈇也言語竊鈇也動作態度無為而不竊鈇也俄而於其谷而得其鈇他日復見其鄰子之動作熊度無似竊鈇矣孟子曰斧斤以時入山林材木不可勝用也荀卿子曰林木茂而斧斤至焉呂氏春秋曰孔甲田于東陽萯音倍山天大風晦孔甲迷惑入于民室主人方乳乳產, SBCK: 土}
