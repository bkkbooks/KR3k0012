  - {type: variant, offset: 2828, length: 10, content: 長木鉤取鑿墮陷腦而死, WYG: 其能言觧意故為人所愛玩之以金籠升之以殿堂可謂珍之矣盖乃未得鳥之性也古詩曰羅敷好蠺桑採桑城南隅青絲為籠繩桂枝為籠鈎籝說文曰籝笭也漢書曰韋賢曰遺子黄金滿籝不如一經太平御覽卷七百六十四}
