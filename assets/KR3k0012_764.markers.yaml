  - {type: variant, offset: 2734, length: 2, content: 陳仲, WYG: 吳興人章苟者於田中耕乘小船以歸籮魚魽置船中著菰蘆中有物輙已食盡如此非一後日磨鍛於菰蘆中見一大虵偷食苟以鍛乂之中其蛇籠史記曰宋元王二年江使神龜使於河至泉陽漁者豫且}
