  - {type: variant, offset: 2402, length: 11, content: 夫差使力士石番以鐵椎椎, krp: 子産相鄭十八年刑三人}
  - {type: variant, offset: 2405, length: 4, content: 力士石番, SBCK: 盡壞其館之垣而納車馬焉曰文公之爲盟主也崇大諸侯之館圬人}
