  - {type: variant, offset: 2824, length: 1, content: 末, WYG: 室既無所覩試發此籠而泉遂潰湧流漂居宇所以名曰籠水也莊子曰一雀過羿必得之或以天下為之籠則雀無逃矣是故湯以庖籠伊尹秦穆公以五羊之皮籠百里奚以其所好籠之也淮南子曰張天下以為之籠因江海以為之罟何亡魚失鳥之有乎又曰狐裘負籠甚可怪也世說曰宋處宗甚有𤣥理常得一長鳴雞愛而食之恒籠著忩間鷄遂作人語與處宗談論極有思理終日不輟處宗因此言巧大進楚辭曰鳯凰作鶉籠兮雖翕翅其不容傅咸班鳩賦叙云余楸蔚然成林閑居無為有時遊之顧見班鳩音聲可恱於是捕而畜之既以擾馴}
