  - {type: variant, offset: 211, length: 2, content: 臣愚, SBCK: 置江開舊在京赤甲城後移在江南岸對白帝城故基在今夔州魚復縣南枋即舫字古用通箄音歩隹切附音疋沮切擊破馮駿及田鴻季玄等遂抜夷道夷陵據荆門虎牙撗江水起浮橋闘樓立攅柱絶水道結營山上}
