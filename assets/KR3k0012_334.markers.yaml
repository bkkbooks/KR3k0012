  - {type: variant, offset: 218, length: 1, content: 便, SBCK: 利於是裝直進樓舡冐突露撓數千艘並舡名樓舡之上施樓撓檝也爾雅曰檝謂之橈又謂露橈在外人在舡中冐突取其觸冐而唐突也晉書曰周訪與諸軍共征杜弢弢作結臯打官軍舡艦訪作長岐棖以拒之結臯不爲害又曰劉􅁉北征廣固嶺南賊將徐道覆謂其帥盧循曰令日之機萬不可失旣尅都邑劉􅁉雖還無能爲也循從之􅀄道覆密欲裝舟艫乃使人伐舡材於南康山僞云􅀅下都貨之稱力少不能得致即賤賣之價减數倍居人貪賤賣衣物而市之贛石水急贛古暗切出舡甚難皆儲之如是者數四故板大積而百姓弗之疑及道覆舉兵案賈劵而取無得隠匿者乃并裝之旬日而辨遂舉衆㓂南康廬陵豫章郡諸守相皆委任奔走梁書曰陸納反叛造大艦一名曰三王艦者邵陵王河東王桂陽嗣王三人並爲元帝所害故立其像於艦􅀕以太牢加其節盖羽儀鼓吹毎戰輙􅀕之以求福又曰王琳大營樓艦將啚義舉琳將張平宅乗一艦毎將戰勝艦則有聲如野猪故琳戰艦以千數以野猪爲名南史曰梁徐丗譜從陸法和與景戰於赤亭湖景軍甚盛丗譜乃別造樓舡拍艦火舫水軍以益軍勢將戰又乗大艦居前大敗景軍禽景將任約景退走因隨王僧辨攻郢州丗譜復乗大艦臨其倉間賊將宋子仙據城降以功徐信州刺史封魚復縣侯周書􅁃信傳曰信常有郷􅀜之思作哀江南賦以致其意云麾兵金匱校戰王堂蒼鷹赤雀䥫軸牙檣隋書曰楊素數進取陳之}
