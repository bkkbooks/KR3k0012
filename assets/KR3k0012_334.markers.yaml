  - {type: variant, offset: 3300, length: 0, content: '', WYG: 十里一候在事五六年帝以成勤勞徴還京師}
  - {type: variant, offset: 3300, length: 0, content: '', krp: 不接三隅要害役戍其勤若非興集師徒繕脩壁壘設攻守之具務耕戰之方則封内多虞諸華屢驚由中及外皆靡寕居深帷永圗豈忘終食顧以薄徳至化未孚旣不能復前古之封致四夷之守與其臨事而重擾豈若先備而安是用弘逺之謀脩五原之壘使邊城有守中夏克寕不有蹔勞敦能永逸冝令左右神䇿軍及朔方河中絳邠寕慶兵馬副元帥渾瑊朔方靈塩豊綏銀節度都統杜希全邠寕節度使張献甫左神䇿行營節度使邢君牙夏綏銀節度使韓潭鄜坊丹延節度使王拪曜振武麟勝節度使范希朝各於所部簡擇馬歩将士合三萬五千人同赴塩州左神䇿將軍張昌冝充右神䇿將軍塩州行營節度使權知塩州刺史杜彦光充塩州刺史應所板築及縁脩城雜役等冝共取六人千充其餘將士皆列布營陣戒嚴設備明加斥候以警不虞其脩城板築功役將士各賜絹布有差其塩州防秋將士三年滿與代更加給賜仍委杜彦光具名聞奏悉與改轉其防遏將士等畢事便合放歸仍賜布帛有羌其諸軍吏士都賜帛七千疋朕情非爲巳悉在靖人咨尓將相之臣忠良之士輸誠奉國陳力忘勞勉茂功勲永安疆埸必集兵事實惟衆心各相率勵以副朕意𥘉貞元三年塩州爲吐蕃所䧟毀其城而去自是塞外無保障靈武勢隔西逼鄜坊其爲邊患故命城之二旬而畢又詔兼御史大夫叱干遂統兵五千與兼御史中丞史履澄杜彦光之衆戍之是役也上念將士之勞厚令度支供給又詔涇原劒南山南諸軍深討吐蕃以分其力由是板築之際虜無犯塞者及畢中外咸稱賀焉}
