  - {type: variant, offset: 632, length: 5, content: 得穀百萬斛, SBCK: 謂橋本名横橋在今咸陽縣東南河上至安邑前漢書曰河上地名故􅁗内史帝二年改爲河上}
  - {type: variant, offset: 632, length: 668, content: 得穀百萬斛郡國列置田官數年之中所在積粟倉廩皆滿又曰廢帝齊王正始四年司馬宣王督諸軍伐吳因欲廣田積穀為兼并之計乃使鄧艾行陳項以東至壽春自今淮陽郡項城縣以東至今壽春郡也艾以為田良水少不足以盡地利宜開河渠可以大積軍糧又通運漕之道乃著濟河論以喻其指又以為昔破黃巾因為屯田積穀計都以制四方今三隅已定事在淮南每大軍征舉運兵過半功費巨億以為大役陳蔡之間土下田良可省許昌左右諸稻田并水東下令淮北二萬人淮南三萬人分木且田且守小豊常收三倍於西計除眾費歲完五百萬斛以為軍資六七年間可積三千萬斛於淮上此則十萬之眾五年食也以此乘敵無不剋矣宣王善之皆如艾計遂北臨淮水自鍾離西南撗石以西盡沘水沘旁脂切四百餘里置一營營六十人且田且守兼脩廣淮陽百咫二渠上引流下通淮潁大理諸陂於潁南潁北穿渠三百餘里溉田二萬頃淮南淮北皆相連接自壽春到京師農官兵田雞犬之聲阡陌相屬每東南有事大軍出征汎舟而下達于江淮資食有儲而無水害艾所建也晉書曰羊祐為征南大將軍鎮襄陽吳西城去襄陽七百里每為邊害羊祐患之意以詭計令吳罷守於是戍邏減半分以墾田八百餘頃大獲其利祐之始至也軍無百日之糧及至季年有十年之積太康元年平吳之後當陽侯杜元凱在荊州今襄陽郡脩邵信臣遺迹邵信臣所作鉗廬陂大門堰在今南陽郡虢縣界時為荊州所統也激用滍音蚩淯音育諸水以浸田原萬頃分壃刊石使有定分公私同利眾庶賴之號曰杜父舊水道淮沔漢達江陵千八百里北無通路又巴丘湖沅湘之會表裏山川寔為險固荊蠻之所恃也當陽侯乃開楊口起夏水達巴陵千餘里夏水口在今江陵郡江陵縣界巴陵即今郡也內瀉長江之險外通零桂之漕零陵桂陽並令邵地南土歌之曰後代無叛由杜翁孰識智名與勇功, WYG: ''}
