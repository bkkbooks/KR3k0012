  - {type: variant, offset: 12, length: 1, content: 始, SBCK: 遣呉漢伐之漢軍所過多侵􅁀時破虜將軍鄧奉謁歸東野怒呉漢掠其郷里遂返擊破漢軍獲其輜重屯據淯陽與諸將合從又曰鄧禹自箕關將入河東箕關在今王屋縣東河東都尉守關不開禹攻十日破之獲輜重千餘乗又曰耿弇追張歩平壽乃􅁏􅃝􅀒斧鑕於軍門鑕鍖也示必死鍖所林切弇􅀓歩詣行在所而勒兵入據其城樹十二郡旗鼔東觀記曰弇凢平城陽瑯瑘髙宻膠東東萊北海齊千乘濟南平源泰山臨淄等令部兵各以郡人詣旗下衆向十餘萬輜重七千餘兩皆罷遣歸郷里晉書曰劉毅追桓玄於峥嶸州毅乘風縱火盡銳争先玄衆大潰燒輜重夜走崔鴻十六國春秋曰前􅁗符堅遣將王猛伐前燕慕容暐師次潞川燕將慕容評率兵十萬禦之以待乆制之猛乃遣其將郭度率􅀐五千夜從間遂起火於髙山因燒評輜重火見鄴中評性貪鄙障固山泉賣樵鬻水積錢絹如丘陵三軍莫有􅋐志因而大敗唐書曰髙宗遣將薛仁貴郭待封伐􅄍蕃仁貴留三萬人作兩柵輜重並留柵内倍道掩之待封不從仁貴之䇿領輜重継進未至烏海􅄍蕃二十餘萬悉衆救其前軍迎擊待封敗之待封趍山軍粮及輜重並爲賊所掠仁貴遂退軍戎車書曰武王戎車三百兩車一乘歩卒七十二人虎賁三百人與紂戰于牧野詩曰戎車旣駕四壯業業又曰}
