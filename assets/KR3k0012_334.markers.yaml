  - {type: variant, offset: 3216, length: 7, content: 宣帝地節三年詔, krp: 遊艇無女牆舷上置槳牀槳音槳左右隨大小長短四尺一牀計牀計㑹進止逥軍轉陣其疾如風虞候居之非戰舡也又}
  - {type: variant, offset: 3221, length: 81, content: 年詔曰朕既不德不能附遠是以邊境屯戍未息今復飾兵重屯久勞百姓非所以綏天下也其罷車騎將軍右將軍屯兵後漢書曰橫野大將軍王常薨遣驃騎大將軍杜茂將眾兵屯北邊築亭候脩烽燧又曰, SBCK: ''}
