  - {type: variant, offset: 3302, length: 5, content: 十五年徙鴈, krp: 范希朝爲振武節度使振武有党項室韋交居川阜凌犯爲盗日入慝作謂之刮城}
  - {type: variant, offset: 3303, length: 58, content: 五年徙鴈門代郡上谷三郡人置常山關以東又曰二十五年南單于遣子入侍於是雲中五原八郡人歸本土邊人在中國皆賜以裝錢轉輸給食也, SBCK: 四}
