  - {type: variant, offset: 423, length: 1, content: 為, SBCK: 而遣之素居永安造大艦名曰五牙上起樓五層髙百餘尺左右前後置六柏竿並髙五十尺容戰士八百人旗幟加於上次曰黄龍置兵百人自餘平乗舴艦等各有差唐書曰曹王臯性多巧思常爲戰艦挾以二輪令蹈之愬風皷浪其疾如掛㠶席凢造物必省昜而爲乆不可販性纎悉毎遺人粮肉必令自持衡秤量以致之官署布帛令縱書其幅而印之絶吏之􅀻易三國典略曰梁陸法和多聚兵艦欲襲襄陽㓂武關梁王使止之法和謂使者曰法和是求道之人常不希釋􅆊天王坐處豈規人主之位但於空王佛所與主上香火因縁見主上應有報至故救援耳今旣􅀍疑是業不可改也又曰梁陸納叛湘州時造二艦衣以牛皮髙十五丈一曰青龍一曰白虎選其驍勇者乗之以戰魏武軍令舡戰令曰雷皷一通吏士皆嚴再通士伍皆就舡整持櫓棹戰士各持兵器就舡各當其所幡皷各隨將所載舡皷三通大小戰舡以次發左不得至右右不得至左前後不得易處違令者斬通典曰水戰舡闊狹長短隨用大小勝人多少皆以米爲卒一人重米二石其擑掉篙櫓㠶席絙素沉石調度與常舡不殊又曰樓舡舡上建樓三重列女牆戰格樹幡幟開弩牎矛穴置抛軍壘石鐵汁􅃺如城壘忽遇􅁀風人力不能制此亦非便於事然爲水軍不可不設以成形勢又曰蒙衝以生牛皮蒙舡覆背兩廂開掣棹孔前後左右有弩牎予穴敵不得近矢石不能敗此不用大舡務於速進乗人之不及非戰之舡也又曰􅋐艦舡上設女牆可髙尺牆下開製掉孔舷内五尺又建柵與女牆齊棚上又建女牆重列戰敵上無覆背前後左右樹牙旗幡幟金皷此戰舡也又}
