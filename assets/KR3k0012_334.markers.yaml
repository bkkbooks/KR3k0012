  - {type: variant, offset: 426, length: 14, content: 遊兵以充入金城郡益積蓄省大費, WYG: 曰法和是求道之人常不希釋􅆊天王坐處豈規人主之位乎但於空土佛所與主上香火因縁縁見主上應有報至故救援耳}
  - {type: variant, offset: 427, length: 1, content: 兵, SBCK: 艇無女牆舷上置槳牀槳音槳左右隨大小長短四尺一牀計牀計㑹進止逥軍轉陣其疾如風虞候居之非戰舡也又曰海鶻頭低尾髙前大後小如鶻之狀舷下左右置浮版形如鶻翅翼}
