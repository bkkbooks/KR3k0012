  - {type: variant, offset: 3288, length: 6, content: 將眾兵屯北邊, WYG: 繕治障塞自西河至渭橋西河今勝州富昌縣至渭橋本名橫橋在今咸陽縣東西河上至安邑前漢書曰河上地名故秦内史髙帝時改為河上郡武帝分為左馮翊太原至井陘太原今幷州也井陘今屬常山郡常山今恒州也中山至鄴皆}
  - {type: variant, offset: 3288, length: 0, content: '', krp: 繕治障塞自西河至渭橋西河今勝州冨昌縣也謂橋本名横橋在今咸陽縣東南河上至安邑前漢書曰河上地名故秦内史帝二年改爲河上郡武帝分爲左馮翊太原至井陘太原今并州也井陘今属常山郡常山今恒州也中山至鄴皆築保壁起十里一候在事五六年帝以成勤徴還京師又曰盧芳與匈奴烏桓連兵㓂盗尤數縁邊愁苦詔王霸}
  - {type: variant, offset: 3289, length: 1, content: 眾, krp: 㢮刑徒六千餘人與茂治飛狐道飛狐道在今蔚州飛狐縣北通嬀州懷戎縣即古之飛狐口也推石布土築起亭障自代至平城三百餘里晉書曰梁武昭王暠脩燉煌舊塞東西二國以防北虜之患築燉煌舊塞西南二國以威南虜唐書曰竇静檢校并州大惣管以突厥頻來入㓂請断石嶺以爲障塞詔從之又曰馬燧奏隴州刺史兼御史中丞州西有通道二百餘歩上連峻山與吐蕃相直虜毎入㓂皆出於此燧乃按險易立石種樹以塞之下置二門上設譙櫓八日而功畢㑹抱玉入覲燧與俱來留京師乆之代宗知其能召見拜啇州刺史又曰李朝晟爲邠州刺史奏方渠合道水波皆賊路也請城其地以備之詔問須}
  - {type: substitution, offset: 3289, original: 眾, replacement: 衆, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19653}}
  - {type: variant, offset: 3291, length: 3, content: 屯北邊, krp: 幾何朝晟奏臣部下兵自可集事不煩外助復問前}
