  - {type: variant, offset: 1574, length: 496, content: 寇昔魏置典農而中都足食晉開汝潁而河汴委儲卿宜勉之後魏書曰文帝大統十一年大旱十二年秘書丞李彪上表請別立農官取州郡戶十分之一為屯人相水陸之宜料頃畝之數以贓贖雜物市牛科給令其肆力一夫之田歲貢六十斛甄其正課并征戍雜役行此二事數年之中則穀積而人足矣帝覽而善之尋施行焉自此公私豊贍雖有水旱不為害也北史曰後魏刁雍除薄骨律鎮將雍以西土乏雨表求鑿渠溉公私田又奉詔以高平安定統萬及薄骨律等四鎮出車牛五千乘運屯穀五十萬斛付沃野以供軍糧道多深沙車牛難阻河水之次造舡水運又以所綰邊表常懼不虞造儲穀置兵備守詔皆從之詔即名此城為刁公城以旌功焉北齊書曰廢帝乾明中尚書左丞蘇珍芝又議脩石鼈等屯歲收數十萬石自是淮南防糧足又曰孝昭帝皇建中平州刺史嵇曄建議開幽州督冗舊陂今范陽郡范陽縣界是長城左右營屯田歲收稻粟數十萬石北境得以周贍又於河內置懷義等屯以給河南之費自是稍止轉輸之勞又曰武成帝河清三年詔緣邊城守堪墾食者營屯田置都子使以統之子使當田五十頃歲終課其所入褒貶隋書曰文帝開皇三年突厥犯塞吐谷渾寇邊轉輸勞弊乃命朔方惣管趙仲卿於長城以北大興屯田隋書曰郭衍授朔州惣管所部有恒安鎮北接番境常勞轉運衍乃選沃饒地置屯田歲剩粟萬餘石民免轉輸之勞, SBCK: ''}
