  - {type: variant, offset: 263, length: 156, content: 頃以上願罷騎兵留弛刑應募及淮陽汝南步兵與吏私從者合九萬二百八十二人用穀月二萬七千三百六十三斛塩三百八斛分屯要害處冰解漕下繕鄉亭浚溝渠水運木繕補也治湟陿以西漕音皇陿音峽道橋七十所令可至鮮水左右田事出賦人二十畝田事出謂至春人出營田也賦班輿之也至四月草生發郡騎及屬國胡騎伉健各千倅馬什二就草倅副也七碎切什二者千騎則與副, SBCK: 叚}
