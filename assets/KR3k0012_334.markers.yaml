  body:
  - {type: variant, offset: 4, length: 3, content: 四屯田, SBCK: 五輜重戎車戰艦亭障輜重釋名曰輜厠也謂軍糧什物雜厠載之以其累重故稱輜重後漢書注曰輜車名也孫子曰使敵不得至者險害之地功其所必救能守其險害之要路敵不得自致故王子曰一犬當穴萬䑕不敢出一虎當溪萬鹿不敢過言守之上也故飽能飢之絶其粮也委軍而争利則輜重􅂢委置庫藏輕師而行􅀂敵乗虚而來抄絶其後則巳輜重皆悉􅂢弃是以軍無輜重則亡無粮食則亡無委積則亡此三者亡之道也委積芻草之處史記曰漢王遣將韓信以兵數萬欲東下井陘擊趙趙王陳餘聚兵井陘口號稱二十萬李左車説陳餘曰韓信渉西河虜魏王擒夏説欲以下趙此乗勝而去國逺􅋐其鋒不可當臣聞千里餽粮士有飢色樵􅂫後㸑樵取薪也蘇草也師不􅀫飽今井陘之道車不得方䡄􅀐不得成列行數百里其勢粮食必在其後願足下假臣竒兵三萬人從間路絶其輜重足下􅀷溝髙壘堅營勿與戰使前不得􅋐退不得還吾竒兵絶其後使野無所掠不至十日而韓信之頭可致於戯音麾下不然必爲所擒矣陳餘儒者常稱義兵不用詐謀竒計曰吾聞兵法十則圍之倍則戰今韓信兵號數萬千里而襲我亦巳罷極今如避不擊後有大者何以加之則諸侯謂吾怯而輕來伐我不聽韓信使人間視知不用大喜乃敢引兵遂進竟破趙軍後}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_334-1b}
  - {type: variant, offset: 4, length: 3, content: 四屯田, WYG: 五輜重戎車戰艦亭障輜重釋名曰輜厠也謂軍糧什物雜厠載之以其累重故稱輜重後漢書注曰輜車名也孫子曰使敵不得至者險害之地攻其所必救能守其險害之要路敵不得自致故王子曰一犬當穴萬鼠不敢出一虎當溪萬鹿不敢過言守之固也故飽能飢之絶其糧也委軍而爭利則輜重捐委其庫藏輕師而行若敵乗虛而來抄絶其後則已輜重皆所捐棄是以軍無輜重則亡無糧食則亡無委積則亡此三者亡之道也史記曰漢王遣將韓信以兵數萬欲東下井陘擊趙趙王陳餘聚兵井陘口號稱二十萬李左車說陳餘曰韓信涉西河虜魏王擒夏銳欲以下趙此乗勝而去國逺鬬其鋒不可當臣聞千里餽糧士有飢色樵蘇後爨樵取薪也蘇草也師不宿飽今井陘之道車不得方軌騎不得成列行數百里其勢糧食必在後願足下假臣竒兵萬人從間路絶其輜重足下深溝髙壘堅營勿與戰使前不得鬬退不得還吾竒兵絶其後使野無所掠不至十日而韓信之頭可致於麾下不然必為所擒矣陳餘儒者常稱義兵不用詐謀竒計曰吾聞兵法十則圍之倍則戰之今韓信兵號數萬千里而襲我亦已罷極如今避不擊後有大者何以加之則諸侯謂吾怯而輕來伐我不聽韓信使人間覘知不用大喜乃敢引兵遂進竟破趙軍後}
