  - {type: variant, offset: 1902, length: 483, content: 營屯田歲收稻粟數十萬石北境得以周贍又於河內置懷義等屯以給河南之費自是稍止轉輸之勞又曰武成帝河清三年詔緣邊城守堪墾食者營屯田置都子使以統之子使當田五十頃歲終課其所入褒貶隋書曰文帝開皇三年突厥犯塞吐谷渾寇邊轉輸勞弊乃命朔方惣管趙仲卿於長城以北大興屯田隋書曰郭衍授朔州惣管所部有恒安鎮北接番境常勞轉運衍乃選沃饒地置屯田歲剩粟萬餘石民免轉輸之勞唐書曰竇靜歷并州大惣管司馬遷長史于時突厥數為邊患師旅歲興軍糧不屬靜上表請於太原多置屯田以省餽運時議者以人物淍零不宜動眾書奏不省靜復上書辭甚切於是徵靜入朝與裴寂蕭瑀封德彝等爭論於殿庭寂等不能屈竟從靜議歲收數十萬斛高祖善之又曰開元二十五年令諸屯隸司農寺者每三十頃以下二十頃以上為一屯隸州鎮諸軍者每五十頃為一屯其屯應置者皆從尚書省處分其舊屯重置者一依丞前封壃為定新置者並取荒閑無籍廣占之地其屯雖料五十頃易田之處各依鄉原量事加數其屯官取勳官五品以上及武散官并前資邊州縣府鎮戍八品以上文武官內簡堪者充據所收斛斗等級為功優諸屯田應用牛之處山原川澤土有硬軟至於耕懇用力不同土軟處每一頃五十畝配牛一頭疆硬處一頃二十畝配牛一頭即當屯之內有硬有軟亦准, WYG: 樹牙旗幡幟金鼔}
