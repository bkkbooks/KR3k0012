  - {type: variant, offset: 218, length: 1, content: 便, WYG: 利於是裝直進樓船冐突露橈數千艘並船名樓船之上施樓橈楫也爾雅曰楫謂之橈蓋謂露楫在外人在船中冐突取其觸冐而唐突也晉書曰周訪與諸軍共征杜弢弢作桔皋打官軍船艦周訪作長岐棖拒之桔皋不為害又曰劉裕北征廣固嶺南賊將徐道覆謂其師盧循曰今日之機萬不可失既克都邑劉裕雖還無能為也循從之初道覆密欲裝兵艦乃使人伐船材於南康山偽云將下都貨之稱力少不能得致即賤賣之價减數倍居人貪賤賣衣物而市之贛石水急贛古暗切出船甚難皆儲之如是者數四故大板積而百姓弗之疑及道覆舉兵案賣券而取無得隠匿者乃并裝之旬日而辦遂舉衆冦南康廬陵豫章郡諸守相皆委任奔走梁書曰陸納反叛造大艦一名曰三王艦者邵陵王河東王桂陽嗣王三人並為元帝所害故立其象於艦祭以太牢加其節蓋羽儀鼔吹每戰輙祭之以求福又曰王琳大營樓艦將圗舉義琳將張平宅乗一艦每將戰勝艦則有聲如野猪故琳戰艦以千數以野猪為名南史曰梁徐世譜從陸法和與侯景戰赤亭湖景軍甚盛世譜乃别造樓船舶艦火舫水車以益軍勢將戰又乗大艦居前大敗景軍擒景將任約景退走因隨王僧辯攻郢州世譜復乗大艦臨其倉間賊將宋子仙舉城降以功除信州刺史封魚復縣侯周書庾信𫝊曰信常有鄉關之思作哀江南賦以致其意云麾兵金匱校戰王堂蒼鷹赤雀鐵軸牙檣隋書曰楊素數進取陳之}
