  - {type: variant, offset: 2489, length: 4, content: 東二十四, SBCK: 中絳邠寕慶兵馬副元帥渾瑊朔方靈塩豊綏銀節度都統杜希全邠寕節度使張献甫左神䇿行營節度使邢君牙夏綏銀節度使韓潭鄜坊丹延節度使王拪曜振武麟勝節度使范希朝各於所部簡擇馬歩􅀅士合三}
  - {type: variant, offset: 2496, length: 6, content: 八百八十石河, SBCK: 人同赴塩州左神䇿將軍張昌冝充右神䇿將軍塩州行營節度使權知塩州刺史杜彦光充塩州刺史應所板築及縁脩城雜役等冝共取六人千充其餘將士皆列布營陣戒嚴設備明加斥候以警不虞其脩城板築功役將士各賜絹布有差其塩州防秋將士三年滿與代更加給賜仍委杜彦光具名聞奏悉與改轉其防遏將士等畢事便合放歸仍賜布帛有􅆧其諸軍吏士都賜帛七千疋朕情非爲巳悉在靖人咨尓將相之臣忠良之士輸誠奉國陳力忘勞勉茂功勲永安疆􅂣必集兵事實惟衆心各相率勵以副朕意􅀄貞元三年塩州爲吐蕃所䧟毀其城而去自是塞外無保障靈武勢隔}
