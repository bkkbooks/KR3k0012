  - {type: variant, offset: 424, length: 1, content: 田, WYG: 戰艦挾以二輪令蹈之遡風澎浪其疾如掛帆席凡造物必省易而為久不可敗性纎悉每遺人糧肉必令自持衡秤量以致之官置布帛令縱書其幅而印之絶吏之私易三國典畧曰梁陸法和多聚兵艦欲襲陽冦武關梁主使止之法和謂使}
