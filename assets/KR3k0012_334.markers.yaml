  - {type: variant, offset: 3295, length: 1, content: 亭, WYG: 堡}
  - {type: variant, offset: 3295, length: 0, content: '', krp: 塩州凢興師七萬今何其易也朝晟曰塩州之役咸集諸蕃戎盡知之今臣境近虜若大興兵即蕃戎入㓂㓂則戰戰則無暇城矣今請宻發軍士不十日至塞下未三旬而功畢蕃人始知巳無可柰何上從之巳事軍還至馬嶺吐蕃始乗障數日而退又曰貞元九年二月將城塩州詔曰設險守國易象垂文有備無患先王令典況脩復舊制安固封疆按甲息人必在於此塩州地當衝要逺介朔陲東逹銀夏西援靈武宻迩延慶保捍王畿乃者城池失守制備無據千里}
  - {type: variant, offset: 3296, length: 1, content: 候, WYG: 壁}
