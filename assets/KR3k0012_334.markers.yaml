  - {type: variant, offset: 12, length: 1, content: 始, WYG: 遣呉漢伐之漢軍所過多侵暴時破虜將軍鄧奉謁歸新野怒吳漢掠其鄉里遂返擊破漢軍獲其輜車屯據淯陽與諸將合從又曰鄧禹自箕關將入河東箕關在今王屋縣界河東都尉守關不開禹攻十日破之獲輜重千餘乗又曰耿弇追張步平壽乃肉袒負斧鑕於軍門鑕鍖也示必死祈林切弇傳步詣行在所而勒兵入據其城樹十二郡旗鼓東觀記曰弇凡平城陽琅琊髙密膠東東郡北海齊千乗濟南平原泰山臨淄等郡令部兵各以郡人詣旗下衆向十餘萬輜重七千餘兩皆罷遣歸鄉里晉書曰劉毅追桓𤣥於崢嶸州毅乗風縱火盡銳爭先𤣥衆大潰燒輜重夜走崔鴻十六國春秋曰前秦苻堅遣將王猛伐前燕慕容瑋師次潞川燕將慕容評率兵十萬禦之以持久制之猛乃遣其將郭度率騎五千夜從間道起火於髙山因燒評輜重火見鄴中評性貪鄙障固山泉賣樵鬻水積錢絹如丘陵三軍莫有鬬志因而大敗唐書曰髙宗遣將薛仁貴郭待封伐吐蕃仁貴留三萬人作兩栅輜重並留栅内倍道掩之待封不從仁貴之䇿領輜重繼進未至烏海吐蕃二十餘萬悉衆救其前運仰擊待封敗之待封趨山軍糧及輜重並為賊所掠仁貴遂退軍戎車書曰武王戎車三百兩車一乗步卒七十二人虎賁三百人與紂戰於牧野詩曰戎車既駕四牡業業又曰}
