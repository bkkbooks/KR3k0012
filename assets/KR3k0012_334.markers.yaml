  - {type: variant, offset: 1960, length: 1011, content: 營屯田置都子使以統之子使當田五十頃歲終課其所入褒貶隋書曰文帝開皇三年突厥犯塞吐谷渾寇邊轉輸勞弊乃命朔方惣管趙仲卿於長城以北大興屯田隋書曰郭衍授朔州惣管所部有恒安鎮北接番境常勞轉運衍乃選沃饒地置屯田歲剩粟萬餘石民免轉輸之勞唐書曰竇靜歷并州大惣管司馬遷長史于時突厥數為邊患師旅歲興軍糧不屬靜上表請於太原多置屯田以省餽運時議者以人物淍零不宜動眾書奏不省靜復上書辭甚切於是徵靜入朝與裴寂蕭瑀封德彝等爭論於殿庭寂等不能屈竟從靜議歲收數十萬斛高祖善之又曰開元二十五年令諸屯隸司農寺者每三十頃以下二十頃以上為一屯隸州鎮諸軍者每五十頃為一屯其屯應置者皆從尚書省處分其舊屯重置者一依丞前封壃為定新置者並取荒閑無籍廣占之地其屯雖料五十頃易田之處各依鄉原量事加數其屯官取勳官五品以上及武散官并前資邊州縣府鎮戍八品以上文武官內簡堪者充據所收斛斗等級為功優諸屯田應用牛之處山原川澤土有硬軟至於耕懇用力不同土軟處每一頃五十畝配牛一頭疆硬處一頃二十畝配牛一頭即當屯之內有硬有軟亦准此法其稻田每八十畝配牛一頭諸營田若五十頃外更有地剩配得丁牛者所收斛皆准頃畝折除其大麥喬麥乾蘿蔔等准粟計折斛斗以定等級天寶八年天下屯田百九十一萬三千九百六十石關內五十六萬三千八百一十石河北四十萬三千二百八十石河東二十四萬五千八百八十石河西二十六萬八十八石隴右四十四萬九百二石後上元中於楚州古謝陽湖置洪澤屯壽州置芍陂屯厥田沃襄大獲其利王元長策秀才文曰今農戰不脩文儒是競棄本殉末厥弊茲多戍役詩曰采薇遣戍役也文王之時西有昆夷之患北有獫狁之難以天子之命命將卒遣戍役以守衛中國故歌采薇以遣之又曰楊之水刺平王也不撫其民而遠屯戍于母家周人怨思焉左傳曰齊侯使連稱管至父戌葵丘瓜時而往曰及瓜而代期戍公問不至請代不許故謀作亂漢書曰晁錯上言守邊備塞勸農力本當世急務也臣聞秦北攻胡貊築塞河上南攻楊粵置卒戍焉非所以衛邊地而救民死也貪戾而欲廣地故功未立而天下亂夫起兵不知其勢戰則為人禽屯則卒積死夫胡貉之地積陰之處也木皮三寸冰厚六尺食肉飲酪其人密理鳥獸毳毛密理謂肥肉也其性能寒楊粵音越之地少陰多陽其人䟽理鳥獸稀毛其性能暑秦之戍卒不能其水土死者僨於地僨也音奮秦民見行如往棄市因以讁發之名曰讁戍也凡民守戰至死而不降北者以計為之也故戰勝守固則有拜爵之賞攻城屠邑則得其財鹵以富家室故能使其眾蒙矢石赴湯火視死如歸秦之發卒也有萬死之害而無銖兩之報故其禍及己陳勝行戌至于大澤為天下先倡天下從之如流水胡人衣食之業不著於地, krp: 徃返}
