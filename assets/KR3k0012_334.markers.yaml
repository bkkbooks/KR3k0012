  - {type: page-break, offset: 2485, content: '', id: KR3k0012_SBCK_334-7a}
  - {type: variant, offset: 2486, length: 0, content: '', SBCK: 日而功畢㑹抱玉入覲燧與俱來留京師乆之代宗知其能召見拜啇州刺史又曰李朝晟爲邠州刺史奏方渠合道水波皆賊路也請城其地以備之詔問須兵幾何朝晟奏臣部下兵自可集事不煩外助復問前築塩州凢興師七萬今何其易也朝晟曰塩州之役咸集諸蕃戎盡知之今臣境近虜􅀂大興兵即蕃戎入㓂㓂則戰戰則無暇城矣今請宻發軍士不}
  - {type: variant, offset: 2487, length: 1, content: 石, SBCK: 日至塞下未三旬而功畢蕃人始知巳無可柰何上從之巳事軍還至馬嶺吐蕃始乗障數日而退又曰貞元九年二月將城塩州詔曰設險守國易象垂文有備無患先王令典況脩復舊制安固封疆按甲息人必在於此塩州地當衝要逺介朔陲東逹銀夏西援靈武宻迩延慶保捍王畿乃者城池失守制備無據千里亭障烽燧不接三隅要害役戍其勤􅀂非興集師徒繕脩壁壘設攻守之具務耕戰之方則封内多虞諸華屢驚由中及外皆靡寕居􅀷帷永圗豈忘終食顧以薄徳至化未孚旣不能復前古之封致四夷之守與其臨事而重擾豈􅀂先備而安是用弘逺之謀脩五原之壘使邊城有守中夏克寕不有蹔勞敦能永逸冝令左右神䇿軍及朔方}
  - {type: page-break, offset: 2487, content: '', id: KR3k0012_SBCK_334-7b}
