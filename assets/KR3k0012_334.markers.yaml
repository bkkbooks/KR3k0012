  - {type: variant, offset: 2780, length: 440, content: 寸冰厚六尺食肉飲酪其人密理鳥獸毳毛密理謂肥肉也其性能寒楊粵音越之地少陰多陽其人䟽理鳥獸稀毛其性能暑秦之戍卒不能其水土死者僨於地僨也音奮秦民見行如往棄市因以讁發之名曰讁戍也凡民守戰至死而不降北者以計為之也故戰勝守固則有拜爵之賞攻城屠邑則得其財鹵以富家室故能使其眾蒙矢石赴湯火視死如歸秦之發卒也有萬死之害而無銖兩之報故其禍及己陳勝行戌至于大澤為天下先倡天下從之如流水胡人衣食之業不著於地如飛鳥走獸於廣壄美草甘水則止草盡水竭則移往來轉徙時至時去此胡人之業然令卒守塞一歲而更不知胡人之能不如選常居者家室田作以為備便為之高城深壍具藺石布渠荅藺石城上雷石也渠荅鐵蒺䔧也調立城邑母下千家為中周虎落虎落外藩也上從其言募民徙塞下又曰錯復言臣聞古之徙遠方以實廣虛也相其陰陽之利嘗其水泉之味審其土地之宜觀其草木之饒然後營邑立城製里割宅通田作之道正阡陌之界先為築室家有一堂二內二內內房也置器物焉此民所以輕去故鄉而勸之新邑為置醫藥巫以救疾病以脩祭祀男女有婚生死相恤此所以使民樂其處而有長居之心也又曰宣帝地節, SBCK: 百}
