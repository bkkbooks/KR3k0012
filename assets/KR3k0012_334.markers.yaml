  - {type: variant, offset: 3323, length: 0, content: '', WYG: 馬燧奏隴州刺史兼御史中丞州西有通道}
  - {type: variant, offset: 3323, length: 1, content: 二, krp: 元和中城臨涇從涇原節度使叚祐之請也臨涇城直涇州西北九}
  - {type: variant, offset: 3324, length: 0, content: '', WYG: 百餘步上連峻山於吐蕃相直虜每入冦皆出於此燧乃按險易立石種樹以塞之下置二門上設譙櫓八日而功畢李抱玉入覲燧與俱來留京師久之代宗知其能召見拜商州刺史又曰李朝晟為邠州刺史奏方渠合破道水皆賊路也請城城以備之詔問須兵㡬何朝晟奏臣部下兵自可集事不煩外助復問前築鹽州凡興師七萬今何其易也朝晟曰鹽州之役成集諸蕃戎盡知之今臣境近虜若大興兵即蕃戎入冦冦則戰戰則無暇城矣今請密發軍士不}
  - {type: page-break, offset: 3324, content: '', id: KR3k0012_WYG_334-11b, image: WYG0896/WYG0896-0020d.png}
  - {type: page-break, offset: 3324, content: '', id: KR3k0012_WYG_334-12a, image: WYG0896/WYG0896-0021a.png}
  - {type: variant, offset: 3325, length: 1, content: 五, WYG: 日至塞下未三旬而功畢蕃人始知巳無可柰何上從之巳事軍還至馬嶺吐蕃始乗障數日而退又曰貞元九}
  - {type: variant, offset: 3325, length: 9, content: 五年南單于遣子入侍, krp: 里實險要之鎮從前因循不脩常爲犬戎所保其界有青石嶺嶺多美土軍人耕獲屢爲藩㓂掠奪祐請脩築議者是非相半祐决城之功畢時方以爲大利三國典略曰齊司從斛律光築吞周平隴定誇三城}
  - {type: punctuation, offset: 3327, content: ，, id: KR3k0012_CHANT_334-bkkpn670}
  - {type: 'tls:seg', offset: 3327, content: '', id: KR3k0012_CHANT_334-20a.4}
  - {type: variant, offset: 3327, length: 7, content: 南單于遣子入侍, WYG: 二月將城鹽州詔曰設險守國易象垂文有備無患先王令典况修復舊制安固封疆按甲息兵必在}
  - {type: punctuation, offset: 3334, content: 。, id: KR3k0012_CHANT_334-bkkpn671}
  - {type: 'tls:seg', offset: 3334, content: '', id: KR3k0012_CHANT_334-20a.5}
  - {type: variant, offset: 3335, length: 0, content: '', WYG: 此鹽州地當衝要逺介朔陲東逺寧夏西援靈武密邇延慶保障王畿乃者城池失守制備無據千里亭障烽燧不接三偶要害役戍其勤若非興集師徒繕修壁壘設攻守之具務耕戰之方則封内多虞諸華屢驚由中及外皆靡寧居深惟永圗豈忘終食顧以薄徳至化未孚既不能復前古之封致四夷之守與其臨事而重擾豈若先備而安休}
  - {type: page-break, offset: 3335, content: '', id: KR3k0012_WYG_334-12b, image: WYG0896/WYG0896-0021b.png}
  - {type: variant, offset: 3335, length: 26, content: 是雲中五原八郡人歸本土邊人在中國皆賜以裝錢轉輸給食也, krp: 境上太平御覽卷第三百三十四}
  - {type: variant, offset: 3336, length: 2, content: 雲中, WYG: 用𢎞久逺之謀修}
  - {type: variant, offset: 3340, length: 2, content: 八郡, WYG: 之壘使邊城有守中夏克寧不有蹔勞孰能永逸宜令左右神䇿軍及朔方河中綘邠寧慶兵馬副元帥渾瑊朔方靈鹽豐綏銀節度都統杜希全邠寧節度使張獻甫左神䇿行營節度使邢君牙夏綏銀節度使韓潭鄜坊丹延節度使王栖曜振武麟勝節度使范希朝各於所部簡擇馬步將士合三萬五千}
  - {type: page-break, offset: 3340, content: '', id: KR3k0012_WYG_334-13a, image: WYG0896/WYG0896-0021c.png}
  - {type: variant, offset: 3343, length: 0, content: '', WYG: 同赴鹽州左神䇿將軍張昌宜充右神䇿將軍鹽州行營節度使權知鹽州刺史杜彦光充鹽州刺史應所板築及縁修城雜役等宜共取六千人充其餘將士皆列布營陣戒嚴設備明加斥候以警不虞其修城板築攻役將士各賜絹布有差其鹽州防秋將士三年滿與代更加給賜仍委杜彦光具名聞奏悉與改轉其防遏將士等畢事便合放}
  - {type: variant, offset: 3344, length: 1, content: 本, WYG: 仍賜布帛有差其諸軍吏士都賜皁絹千疋朕情非為巳悉在靖人咨爾將相之臣忠良之士竭誠奉國陳力忘勞勉茂功勲永安疆場必集兵事實惟衆心各自率勵以副朕意初貞元中鹽州為吐蕃所䧟毁其城而去自是塞外無保障靈武勢隔西逼鄜坊甚為邊患故命城之二旬而畢又詔兼御史大夫叱干遂統兵五千與兼御史中丞史復澄杜彦光之衆戍之是役也上念將士之勞厚令度支供給又詔涇原劒南山南諸軍探討吐蕃以分其力由是板築之際虜無犯塞者及畢中外咸稱賀焉又曰范希朝為振武節度使振武有黨項室韋交居州阜凌犯為盜日久匿作謂之刮城門居人懼駭鮮有寧日希朝周知要害置堡栅斥候嚴密人遂獲安異蕃雖鼠竊狗盜必殺無赦戎冦甚憚之又曰元和中城臨涇城從涇原節度使叚祐之請也臨涇城直涇州西北九十里實險要之鎮從前因循不修常為犬戎所堡其界有青石嶺嶺多美}
