  - {type: variant, offset: 210, length: 0, content: '', SBCK: 寅敬也前有旌旗幟所以知變化示應而不失周曰元戎先良也前立代􅁖立善之旗所以知善罪之所在先齊良善而後代之文選曰輕車霆激驍􅀐雷驚戰艦墨子曰公輸般自魯之楚爲舟戰之具謂之鈎拒退則鈎之進則拒之也後漢書曰公孫述遣其將任滿田戎程汎將數萬人乗枋箄下江關榜箄以木竹爲之浮於江水上爾雅曰舫附也郭景純曰水中箄筏也華陽國志曰巴楚相攻}
