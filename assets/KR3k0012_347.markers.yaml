  - {type: variant, offset: 4020, length: 143, content: 和鑄雖歐冶專精越礪劍鍔終為鄙器上皇即解之以投鑪中俄而煙焰衝天日為之晦及乎劍成殺三牲以釁祭工問上皇曰何時得此匕首荅曰秦昭襄王時余時行逢一野人於野授余云是殷高宗初時物此世世相傳上有古書字記其年月及成劍工人視之其銘尚存叶前疑也工人即持以授上皇上皇賜高祖高祖長佩於身以殲三猾天下已定呂后藏於寶庫, SBCK: 示左右左右皆試引}
