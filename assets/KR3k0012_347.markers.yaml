  - {type: variant, offset: 2593, length: 274, content: 千人定天下况今有數萬眾自足辯事晧意大喜便開庫藏盡出金寶以賜與之小人無狀得便持走陶侃表曰伏承大官廚器損失謹奉獻狼炙刀槃二具張衡與特進書曰以為鈆刀強可一割謝尚與張涼州書曰今致五尺金斷頭刀一口班固與竇憲牋曰今月中以令賜固刀曰此將軍少小時所服今賜固伏念大恩且喜且慚謝尚與楊征南書曰云今餉五尺金頭刀碧綾車中盾梁簡文帝謝勑賚善勝威勝刀啟曰冰鍔含采彫琰表飾名均素質神號脫光五寶初成曹丕先荷其一二勝今造愚臣揔被其恩錫韓非之書未足為比給博山之筆方此更輕梁劉孝儀為晉安王謝東宮賜玉環刀啟曰苗峰珍鋌利極銛鋩謹當擁以雄身藉而安體匕首通俗文曰匕首劍屬其頭類匕故曰匕首短而便用, SBCK: 虎皮}
