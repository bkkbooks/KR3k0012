  - {type: variant, offset: 1380, length: 1, content: 墨, SBCK: 羿作弓爾雅曰弓有縁者謂之弓郭璞注曰即今宛轉弓也無縁者謂之弭今之角弓也以金者謂之銑以辱者謂之珧音遥以玉者謂之圭用金蚌玉飾弓兩頭因以爲名也易曰弦木爲弧剡木爲矢弧矢之利以威天下盖取諸睽又曰公用射隼于髙墉之上􅀗之無不利又曰先張之弧尚書曰和之弓在東房孔安國注曰和古之弓人又曰平王錫晉文侯彤弓一彤矢百玈音盧弓一玈矢千又曰備乃弓矢詩曰彤弓天}
