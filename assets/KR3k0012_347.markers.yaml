  - {type: variant, offset: 1512, length: 1383, content: 木不可以為斧又曰金勝木者非以一刀殘林也土勝水者非以一墣塞江也墣塊也法言曰刀不利筆不銛宜加諸礪阮子曰裁國無利器猶鈆刀而望其巧抱朴子曰金丹以塗刀辟兵萬里論衡曰世諱厲刀井上恐刀墮井中或說以為刑之字井與刀也厲刀井上井刃相見恐被刑也典論曰魏太子丕造百辟寶刀三其一長四尺三寸六分重三斤六兩文似靈龜名曰靈寶其二采似丹霞名曰含章長四尺四寸三分重三斤十兩其三鑒似崩霜刀身劍鋏名曰素質長四尺三寸重二斤九兩又造百辟露陌刀一長三尺二寸重二斤二兩狀似龍文名曰龍鱗聖證論曰昔國家有優曰史利漢氏舊優也云梁冀有火浣布切玉刀一朝以為誕而不信也正始初得火浣布乃信楚辭曰師望在肆昌何識師望謂太公也昌文王名也言太公在市肆而屠何似知識之鼓刀楊聲后乃喜后謂文王又曰鈆刀進御違棄太阿太阿劍名張衡西京賦曰吞刀吐火雲霧杳冥畫地成川流渭通涇劉楨瓜賦曰折以金刀四剖三離曹植寶刀賦曰建安中家父魏王乃命有司造寶刀五枚三年乃就以龍虎熊馬雀為識太子得一余及余弟饒陽侯各得一焉其餘二枚家王自杖之賦曰有皇漢之明后思潛達而玄通飛文義以博致揚武備以禦凶乃熾火炎爐融鐵挺英烏獲奮椎歐冶是營扇景風以激氣飛光鑑於天庭爰告祠於太乙乃感夢而通靈然後礪以五方之石鑿以中黃之壤規員景以定眾攄神思而造像垂華紛之葳蕤流翠采之晃瀁陸斬犀象水斷龍舟輕擊浮截刃不瀸流踰南越之巨闕超有楚之太阿寔真人之攸御永天祿而是荷樂府歌曰秦家有好女自名曰女休休年十四五為宗行報讎左執白陽刀右據宛景矛張華詩曰吳刀鳴手中利劍嚴秋霜古詩曰美人贈我金錯刀何以報之雙瓊瑤後漢馬敬通刀陽銘曰脩爾甲兵用戒不虞見危授命臨事而懼又刀陰銘曰溫溫穆穆配天之威苗裔無疆福祿來綏後漢李元錯佩刀銘曰佩之有錯抑武揚文豈為麗好將戒其身又金馬書刀銘曰巧冶練剛金馬託形黃文錯鏤兼勒工名魏文帝露陌刀銘曰於鑠良刀胡練亶時譬諸麟角靡所任茲不逢不若永世寶持曹植寶刀銘曰造茲寶刀既礱既礪匪以尚武予身是衛麟角匪觸鸞距匪蹶王粲刀銘曰相時陰陽制法利兵陸剸犀兕水截鯢鯨君子服之式章威靈何晏斫猛獸刀銘曰徒摶不共作戒宣丘用造斯器螭獸是劉制禽允良昏明亶時永釐厥後蠲民之災一作斬虎刀銘曰螭虎是劉晉張協把刀銘曰赫赫名金昆吾遺璞裁為把刀利亞切玉時文斯偃含精內燭威助雖化武不可黷裴景聲文身刀銘曰良金百鍊名工展巧寶刀既成窮理盡妙文繁波廻流光霆一作電照在我皇世戢而不耀張協露陌刀銘曰露陌在服威靈遠振遵養時晦曜得崇信魏武策軍令曰孤先在襄邑有起兵意興工師共作卑手刀時北海孫賓碩來候孤譏孤曰當慕其大者乃與工師共作刀耶孤荅曰能小復能大何苦曹植表曰昔歐冶改視鈆刀易價伯樂所眄駑馬百倍王濬表曰孫皓出案行石頭還左右兵皆跳刀大呼云要當為國家一死戰決之勝魏帝尚以千人定天下况今有數萬眾自足辯事晧意大喜便開庫藏盡出金寶以賜與之小人無狀得便持走陶侃表曰伏承大官廚器損失謹奉獻狼炙刀槃二具張衡與特進書曰以為鈆刀強可一割謝尚與張涼州書曰今致五尺金斷頭刀一口班固與竇憲牋曰今月中以令賜固刀曰此將軍少小時所服今賜固伏念大恩且喜且慚謝尚與楊征南書曰云今餉五尺金頭刀碧綾車中盾梁簡文帝謝勑賚善勝威勝刀啟曰冰鍔含采彫琰表飾名均素質神號脫光五寶初成曹丕先荷其一二勝今造愚臣揔被其恩錫韓非之書未足為比給博山之筆方此更輕梁劉孝儀為晉安王謝東宮賜玉環刀啟曰苗峰珍鋌利極銛鋩謹當擁以雄身藉而安體匕首通俗文曰匕首劍屬其頭類匕故曰匕首短而便用周禮冬官無桃氏曰桃氏為劍廣臈二寸有半寸臈謂兩刀也兩從半之, WYG: 矢}
