  - {type: variant, offset: 2875, length: 12, content: 桃氏為劍廣臈二寸有半寸臈, SBCK: 司弓矢掌六弓四弩八矢之法辯其名物而掌其守藏與其出入仲春獻弓弩仲秋獻矢箙弓弩成於和矢服成於堅也箙盛矢噐也以獸皮爲之及其頒之王弓弧弓以授射甲革椹音砧質者夾弓􅁃弓以授射豻音岸又俄塞切侯鳥獸者唐弓大弓以授學射者及使者勞者王􅓡夾􅁃唐大兵者弓異躰之名徃躰寡來躰多曰王弧徃躰多來躰寡曰夾􅁃天子之弓合九而成䂓諸侯合七而成規大夫合五而成䂓士合三而成䂓句者}
