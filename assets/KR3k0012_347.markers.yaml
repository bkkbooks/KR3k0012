  - {type: variant, offset: 2163, length: 256, content: 刀陰銘曰溫溫穆穆配天之威苗裔無疆福祿來綏後漢李元錯佩刀銘曰佩之有錯抑武揚文豈為麗好將戒其身又金馬書刀銘曰巧冶練剛金馬託形黃文錯鏤兼勒工名魏文帝露陌刀銘曰於鑠良刀胡練亶時譬諸麟角靡所任茲不逢不若永世寶持曹植寶刀銘曰造茲寶刀既礱既礪匪以尚武予身是衛麟角匪觸鸞距匪蹶王粲刀銘曰相時陰陽制法利兵陸剸犀兕水截鯢鯨君子服之式章威靈何晏斫猛獸刀銘曰徒摶不共作戒宣丘用造斯器螭獸是劉制禽允良昏明亶時永釐厥後蠲民之災一作斬虎刀銘曰螭虎是劉晉張協把刀銘曰赫赫名金昆吾遺璞裁為把刀利亞切玉時文斯偃含精內燭威助雖化武不可黷裴景聲文身刀銘, SBCK: ''}
