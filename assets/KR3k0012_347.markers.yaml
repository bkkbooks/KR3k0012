  - {type: variant, offset: 113, length: 12, content: 王雙曾於市中買得一刀賣人, SBCK: 弓神名曲張方言}
  - {type: variant, offset: 113, length: 0, content: '', WYG: 弓神名曲張方言曰弓藏謂之韇音獨箭衣也爾雅曰弓有縁者謂之弓郭璞注曰即今宛轉弓也無縁者謂之弭今之角弓也以金者謂之銑以辱者謂之珧玉者謂之圭用金蚌玉飾弓兩頭因以為名也易曰弦木為弧剡木為矢􅋃矢之利以威天下蓋取諸睽又曰公用射隼于髙墉之上獲之無不利又曰先張之􅋃尚書曰和之弓在東房孔安國注曰和古之弓人又曰平}
