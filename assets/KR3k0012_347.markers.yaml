  - {type: variant, offset: 4169, length: 3, content: 白氣如, SBCK: 􅃦石闕弓射之滅矢飲羽下視知石也却復射之矢摧無迹譙子法訓曰善耕者足以謹地待時而動善射者調弓定凖見可而發君子善飬其人足用韓楊天子要集曰弧者天弓備盗賊楚辭曰帶長劒兮挾􅁗弓言身死帶劒弓示不舎武也劉邵趙郡賦曰其噐用則六弓四弩縁沉黃間堂溪魚腸丁令角端陳琳武庫賦曰弓則烏號越􅁄繁弱角端象弭繡質哲弣文身唐太宗詠弓詩曰上弦明月半激箭流星逺落鴈帶書驚啼猿映枝轉後梁宣帝詠弓詩曰虞人招不進繁氏乆彌工已悲軒主跡復挹楚王風楊師道奉和詠弓詩曰霜重麟􅑟勁風髙月影圎烏飛隨帝輦鴈落逐鳴絃齊王融謝武陵王賜弓啓曰殿下摛藻蕙樓暢藝蘭苑敷積玉於風筵疊連珠於月的兎園掩秀鄴水慙竒融揖讓未工濫陪升飲之賞操弧反正謬奉招賢之􅃬文韜鏤景逸幹梢}
  - {type: page-break, offset: 4169, content: '', id: KR3k0012_SBCK_347-11b}
  - {type: variant, offset: 4169, length: 3, content: 白氣如, WYG: 􅃦石關弓射之滅矢飲羽下視知石也却復射之矢摧無迹譙子法訓曰善耕者足以謹地待時而動善射者調弓定準見可而發君子養其人足用韓陽天子要集曰􅋃者天弓備盜賊楚辭曰帶長劒兮挾秦弓言身死帶劎弓示不舍武也劉邵趙郡賦曰其噐用則六弓四弩弩緑沉黄間堂溪魚腸丁令角端陳琳武軍賦曰弓則烏號越棘繁弱角端象弭繡質哲弣文身唐太宗詠弓詩曰上弦明月半激箭流星逺落鴈帶書驚啼猿映枝轉後梁宣帝詠弓詩曰虞人招不進繁氏乆彌工已悲軒主跡復挹楚王風楊師道奉和詠弓詩曰霜重麟膠勁風髙月影圎烏飛隨帝輦鴈落逐鳴絃齊王融謝武陵王賜弓啓曰殿下摛藻蕙樓暢藝蘭苑敷積玉於風筵疊連珠於月的兎園掩秀鄴水慙奇融揖讓未工濫陪升飲之賞操􅋃反正謬奉招賢之賜文韜鏤景逸幹稍}
