  - {type: variant, offset: 3226, length: 3, content: 叔孫俊, SBCK: 􅀓融性豪爽有三子靈慶靈根靈越並有才力融以此自􅀒謂足爲一時之雄甞謂人曰吾昨夜夢有一駿馬無堪乗者人曰何由得人乗之有一人曰唯有􅀓靈慶堪乗此馬又有弓一張亦無人堪引有一人曰唯有􅀓靈根可以彎此弓又有數􅁓文書人皆讀不能解此文有一人曰唯有􅀓靈越可以解之融意謂其三子文武材幹堪以駕馭當丗常宻謂郷人曰汝聞之不鬲䖝之子有三靈此圖䜟之文也好事者然之故豪勇之士多相歸附唐書曰太宗謂蕭瑀曰朕}
  - {type: page-break, offset: 3226, content: '', id: KR3k0012_SBCK_347-6b}
  - {type: variant, offset: 3226, length: 3, content: 叔孫俊, WYG: 傅融性豪爽有三子靈慶靈根靈越並有才功融以此自負謂足為一時之雄嘗謂人曰吾昨夜夢有一駿馬無堪乗者人曰何由得人乗之有一人曰唯有傅靈慶堪乗此馬又有弓一張亦無人堪引有一人曰唯有傅靈根可以彎此弓又有數紙文書人皆讀不能解此文有一人曰唯有傅靈越可以解之融意謂其三子文武材幹堪以駕馭當世常宻謂鄉人曰汝聞之不鬲虫之子有三靈此圖䜟之文也好事者然之故豪勇之士多相歸附唐書曰太宗謂蕭瑀曰朕}
  - {type: page-break, offset: 3226, content: '', id: KR3k0012_WYG_347-10b, image: WYG0896/WYG0896-0118b.png}
