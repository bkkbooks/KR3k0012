  - {type: variant, offset: 126, length: 26, content: 得之者貴因之不見雙後佩之果為將將此刀與曹真真以一刀換, WYG: 備乃弓矢詩曰彤弓天子錫有功諸侯也彤弓弨兮受言藏}
  - {type: variant, offset: 126, length: 1, content: 得, krp: 弓藏謂}
  - {type: variant, offset: 128, length: 331, content: 者貴因之不見雙後佩之果為將將此刀與曹真真以一刀換之又曰鍾會克蜀於成都土中得一刀文曰太一刀會死入帳下王伯昇後渡浮江刀遂飛入水又曰鄧女年十二曾讀太山碑碑下掘得一刀黑如漆色長三尺餘上常有風氣冷凄凄然時人以為神賜又曰孫權遣張昭代周瑜為南郡太守曾作一刀背上有盪寇將軍四字八分書又曰蔣欽拜別部司馬造一刀文曰司馬古隸書又曰周幼平擊曹公勝拜平虜將軍因造一刀遂銘曰幼平又曰董元代少果勇自打鐵作刀後討黃祖蒙衝俠河元代引刀斷蒙衝纜分為二流大司馬號刀曰斷蒙刀又曰潘文珪偏將軍為擒關羽拜固陵太守因刻刀曰固陵又曰朱理君少愛征討黃武中累功拜安國將軍作佩刀文曰安國又曰關羽為先主所重不惜身命自採武都山鐵為二刀銘曰萬人及羽敗惜刀投於水又曰張益德初受新亭侯自命匠鍊赤珠山鐵為一刀銘刃曰新亭侯蜀帝大將, SBCK: 韇音獨箭衣}
