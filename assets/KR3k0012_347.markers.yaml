  - {type: variant, offset: 3720, length: 0, content: '', SBCK: 覩隂三覩陽􅀓以燕牛之角纒以荆麋之䈥糊以河魚之膠此四者天下選也而不穿一扎是君不能射也而反欲殺妾之夫不亦謬乎妾聞射之道左手如拒右手如附枝右手發之左手不知此射之道也公以其言爲儀而穿七扎弓工立得出賜金三鎰綦母遽注}
  - {type: variant, offset: 3720, length: 0, content: '', WYG: 覩隂三覩陽傅以燕牛之角纒以荆麋之筋糊以河魚之膠此四者天下選也而不穿一札是君不能射也而反欲殺妾之夫不亦謬乎妾聞射之道左手如拒右手如附枝右手發之左手不知此射之道也公以其言為儀而穿七札弓工立得出賜金三鎰綦毋遽注}
  - {type: variant, offset: 3720, length: 0, content: '', krp: 覩隂三覩陽傳以燕牛之角纒以荆麋之䈥糊以河魚之膠此四者天下選也而不穿一扎是君不能射也而反欲殺妾之夫不亦謬乎妾聞射之道左手如拒右手如附枝右手發之左手不知此射之道也公以其言爲儀而穿七扎弓工立得出賜金三鎰綦母遽注}
  - {type: variant, offset: 3721, length: 6, content: 龍鱗狀似龍文, SBCK: 繁人官名扎鎧扎也燕角善楚䈥何膠粘也管公明別傳曰信都令家中婦女盡驚更牙疾病使公明爲占之卦成語曰君北室床西頭當有兩死男人一􅀑持矛一􅀑持弓箭頭在壁中脚在壁外持矛者主刺頭故頭重痛不得舉持弓箭者主射􅇩腹故心中懸痛不得飲食晝則浮遊夜還病人故驚恐􅀂徙其屍柩便皆丁強於是令歸室中果得兩楸棺中有角弓及數箭物已乆逺木消爛徙骸埋之合家皆愈洞林曰曲阿令趙元瞻兒字虎舒從吾學卜自求蓍作卦見吾有盛艾小陵􅀛欲得之不與語之曰當作卦相爲致此物令自來復數曰果有一􅀛入廐虎舒後見吾言偶有一物試可占之􅀂得當再拜輸一好角弓即便作卦曰案卦之是爲􅀛虎舒奉弓起再拜老子曰天之道其猶張弓乎髙者抑之下者舉之列子曰紀昌學射於飛衛飛衛曰尓先學不瞚而後能}
  - {type: page-break, offset: 3721, content: '', id: KR3k0012_SBCK_347-9a}
