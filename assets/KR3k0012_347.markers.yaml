  - {type: variant, offset: 2899, length: 0, content: '', SBCK: 澤澤宫也所以習射選士之處也射義曰天子將至必先習射於澤者所以擇土也大射燕射共弓矢如數又曰庭氏掌射國中之妖鳥馬融傳曰國中妖鳥梟鷄惡聲之鳥也􅀂不見其鳥獸則以救日之方與救月之矢夜射之獸虎狼㘁鳴也救日食則伐皷北靣射太隂救月蝕則伐皷南靣射太陽以此弓矢射之􅀂其神也則以太隂之弓與抂矢射之抂矢名也又曰弓長六尺}
