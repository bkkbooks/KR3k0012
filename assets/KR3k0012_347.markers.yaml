  - {type: variant, offset: 3072, length: 2, content: 此上, WYG: 九和安弓危矢危弓安矢儀禮曰司射告賔曰弓矢既具有司請射賔與大夫弓倚于西序矢在弓下左傳曰王賜晉文公彤矢百玈弓十玈矢千又曰武王克商作頌曰載櫜弓矢又曰楚子享公于新臺使長鬛者好以大屈宴好之賜大屈弓名也又曰舟堅射陳武子中手舟堅季氏臣也失弓而罵武子罵也又曰周公相武王以尹天下於周為睦分魯公以大路大旂夏后氏之璜封父之繁弱封父古之諸侯也繁弱大弓名也封之於少昊之墟又曰魯伐齊士皆坐列顔髙之弓六鈞皆分取傳而觀之顔髙魯人也三十斤為鈞六鈞一百八十斤也故異之又曰子蕩以弓梏華弱于朝又曰陽虎稅甲如公宫取寳玉大弓以出又曰齊景公田于沛招虞人以弓不進公欲執之辭曰旌以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進又曰晉楚戰於鄢陵郄至三遇楚子之卒見楚子必下免胄而趨風楚子使工尹襄問之以弓杜預註曰問遺之也又曰楚靈王次于乾谿右尹子革夕王與之語曰昔我先王熊繹僻在荆山唯是桃弧棘矢以供禦王事榖梁曰八年盜竊大弓大弓者武王之戎弓也周公受賜藏之魯焦贛易林曰桃弓葦㦸除殘去惡郭璞毛詩拾遺曰象弭魚服毛云弭弓反末以象骨為之蓋俗說文誤也左傳曰左執鞭弭弭者弓之别名}
