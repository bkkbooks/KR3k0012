  - {type: variant, offset: 3957, length: 4, content: 昂星為輔, SBCK: 奈何其獨也尸子曰鴻鶴在上扞弓鞟彏同弩待之􅀂發􅀂否問二五弗知非二五難計也欲鴻之心亂也抱朴子曰金弧王弦無激矢之能又曰農夫得彤弓}
  - {type: variant, offset: 3957, length: 2, content: 昂星, WYG: 余何其獨也尸子曰鴻鶴在上杆弓鞟弩待之若發若否問二五弗知非二五難計也欲鴻之心亂也抱朴子曰金弧玉弦無激矢之長又曰農夫得彤弓以驅鳥南成得衮衣以負薪猶世人得仙丹而不貴淮南子曰射者扞烏號之弓彎綦衛之箭扞張弓彎引也綦美箭所出地名也衛羽也烏號柘桑其材堅勁烏跱其上及飛至枝必撓下勁能復起摷烏隨之烏不敢飛號呼其上伐其材以}
  - {type: page-break, offset: 3957, content: '', id: KR3k0012_WYG_347-17a, image: WYG0896/WYG0896-0121c.png}
  - {type: variant, offset: 3957, length: 4, content: 昂星為輔, krp: 奈何其獨也尸子曰鴻鶴在上扞弓鞟彏同弩待之若發若否問二五弗知非二五難計也欲鴻之心亂也抱朴子曰金弧王弦無激矢之能又曰農夫得彤弓}
  - {type: variant, offset: 3960, length: 1, content: 輔, WYG: 弓因曰烏號之弓也下說黄帝鑄鼎鍾於湖得遒而仙乗龍上天其臣援弓射龍欲下黄帝不能也烏于也號呼也於是抱弓而號也自}
  - {type: punctuation, offset: 3961, content: ，, id: KR3k0012_CHANT_347-bkkpn1274}
  - {type: 'tls:seg', offset: 3961, content: '', id: KR3k0012_CHANT_347-59a.28}
  - {type: variant, offset: 3962, length: 1, content: 殲, SBCK: 駈烏南成得衮衣以􅀒薪猶世人得仙丹而不貴淮南子曰射者扞烏號之弓彎綦御之箭杆張也彎引也綦美箭所出地名也衛利也烏號柘枽其材堅勁烏跱其上及飛至技必撓下勁能復起摷烏隨之烏不敢飛號呼其上伐其材以爲弓因曰烏號之弓也一􅀃黄帝鑄鼎鍾於湖得道而仙乗龍上天其臣援弓射龍欲下黄帝不能也烏於也號呼也於是抱弓而號也自以名其弓爲烏號之弓也重之羿逢蒙子之巧以要飛鳥猶不能與羅者竟多羿古諸侯有窮之君也逢蒙羿弟子皆攻射而百發百中故曰之巧要取竟逐也何則以所持之小也又曰淇衛箘路箘折箭竹也出於淇地衛箭羽也飾以銀雖有薄縞然獨猶不能穿也􅀂假之䈥角之力弓弩之􅀔則貫兕甲而經於革楯矣又曰曲張弓名也一名彷徨弓又曰宛轉弓今之弭弓是也吕氏春秋曰齊宣王好射􅀃人之謂巳能用強弓也其甞所用弓不過}
  - {type: page-break, offset: 3962, content: '', id: KR3k0012_SBCK_347-10b}
  - {type: variant, offset: 3962, length: 1, content: 殲, WYG: 名其弓為烏號之弓也重之羿逢蒙子之巧以要飛鳥猶不能與羅者競多羿言諸侯有窮之君也逢蒙羿弟子皆攻射而百發百中故曰之巧要取競逐也何則以所持之小也又曰淇衛箘路箘路箭竹也出于淇地衛箭羽也飾以銀雖有薄縞然獨猶不能穿也若假之筋角之力弓弩之勢則貫兕甲而經於革楯矣又曰典張弓名也一名彷徨弓又曰宛轉弓今之弭弓是也吕氏春秋曰齊宣王好射說人之謂已能用強弓也其嘗所用弓不過}
