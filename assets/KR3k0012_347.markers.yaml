  - {type: variant, offset: 4, length: 4, content: 七刀下陶, SBCK: 八弓釋名曰弓穹也張之穹隆然也其未曰簫言簫邪也又謂之弭以骨爲之滑弭弭也中央曰弣孚主切一作拊跗撫也所撫持也簫跗之間曰淵淵宛也言宛曲也􅀃文曰弓近窮逺象形也弴音雕又音敦􅀞弓也弭弓無縁可以解􅆖觚也弲許縁切角弓也弧木弓也一曰徃體寡來體多曰􅀌弨尺招切又勑朝切弓反也音權弓曲也音遥弓便利也張施弓絃也彏烏郭切弓急張也弸拍生切又鄙矜切弓強貌也彎持弓關矢也㢨一弧切滿弓有所向也}
