  - {type: variant, offset: 1927, length: 235, content: 賦曰有皇漢之明后思潛達而玄通飛文義以博致揚武備以禦凶乃熾火炎爐融鐵挺英烏獲奮椎歐冶是營扇景風以激氣飛光鑑於天庭爰告祠於太乙乃感夢而通靈然後礪以五方之石鑿以中黃之壤規員景以定眾攄神思而造像垂華紛之葳蕤流翠采之晃瀁陸斬犀象水斷龍舟輕擊浮截刃不瀸流踰南越之巨闕超有楚之太阿寔真人之攸御永天祿而是荷樂府歌曰秦家有好女自名曰女休休年十四五為宗行報讎左執白陽刀右據宛景矛張華詩曰吳刀鳴手中利劍嚴秋霜古詩曰美人贈我金錯刀何以報之雙瓊瑤後漢馬敬通刀陽銘曰脩爾甲兵用戒不虞見危授命臨事而懼, SBCK: 戎噐也}
