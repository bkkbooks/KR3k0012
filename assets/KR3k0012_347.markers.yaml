  - {type: variant, offset: 4165, length: 2, content: 守藏, SBCK: 間而止至於一半而止皆曰此不下九石非王孰能用是宣王所用不過三石而終身自以爲用九石豈不悲哉非直士其孰能不阿主故亂國之主患存乎用三石爲九石又曰萬人操弓共射一招招無不中招謂的也杜夷幽求曰弓折由射}
