  - {type: variant, offset: 3233, length: 0, content: '', SBCK: 數以示弓工乃曰非良材也朕問其故工曰木心不正脉理皆邪弓雖剛勁而遣箭不直非良弓也朕始悟焉朕以弧矢定四方使弓多矣有天下之日淺得爲治之意固未及於弓弓猶失之何况於治乎自是遂延耆老問之政術京官}
