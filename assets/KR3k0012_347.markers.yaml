  - {type: variant, offset: 3192, length: 0, content: '', SBCK: 句驪別種居小水因名小水狟出好弓所謂狟弓也挹婁弓長四尺力如弩矢用楛長尺八寸青石爲鏃古肅愼國也魏要略曰北方有橐離之國其王侍婢有身王欲殺之婢云有氣如雞子來下我故有身後生子王􅂢之於溷中猪以喙嘘之徙馬閑馬以氣嘘之王疑以爲太子令其母收畜之名曰東明常令牧馬東明善射王怒奪其國殺之東明走南至奄水以弓擊水魚鱉浮爲橋東明得渡魚鱉解散追兵不得渡東明因都王夫餘之地王隱晉書曰劉琨與丞相牋曰不得進軍者實困無食殘民鳥散録召之曰皆披林而至衣服藍縷木弓一張荆矢十􅃗晉中興書曰符徤匈暴露刃張弓推鉗鋸鑿殺人之具備置左右晉令曰弓弩士習射者給竹弓角弓皆二人一張沈約宋書曰蕭思話爲梁州太祖賜以弓琴手勑曰丈人頃何所作事務之暇故以琴書爲娱耳并徃枽弓一張材理乃快先所常用旣乆廢射又多病略當不能制之便成老公令人歎息良材美器冝在盡用之地丈人真無所與讓也梁書曰羊侃膂力絶人所用弓至二十石馬上用六石弓三國}
