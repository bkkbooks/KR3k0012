  - {type: variant, offset: 3962, length: 1, content: 殲, krp: 駈烏南成得衮衣以負薪猶世人得仙丹而不貴淮南子曰射者扞烏號之弓彎綦御之箭杆張也彎引也綦美箭所出地名也衛利也烏號柘枽其材堅勁烏跱其上及飛至技必撓下勁能復起摷烏隨之烏不敢飛號呼其上伐其材以爲弓因曰烏號之弓也一說黄帝鑄鼎鍾於湖得道而仙乗龍上天其臣援弓射龍欲下黄帝不能也烏於也號呼也於是抱弓而號也自以名其弓爲烏號之弓也重之羿逢蒙子之巧以要飛鳥猶不能與羅者竟多羿古諸侯有窮之君也逢蒙羿弟子皆攻射而百發百中故曰之巧要取竟逐也何則以所持之小也又曰淇衛箘路箘折箭竹也出於淇地衛箭羽也飾以銀雖有薄縞然獨猶不能穿也若假之䈥角之力弓弩之勢則貫兕甲而經於革楯矣又曰曲張弓名也一名彷徨弓又曰宛轉弓今之弭弓是也吕氏春秋曰齊宣王好射說人之謂巳能用強弓也其甞所用弓不過}
