  - {type: variant, offset: 3721, length: 6, content: 龍鱗狀似龍文, WYG: 繁人官名札鎧也燕角善楚筋紉河膠粘也管公明别傳曰信都令家中婦女盡驚更疾病使公明為占之卦成語曰君北室牀西頭當有兩死男人一鬼持矛一鬼持弓箭頭在壁中脚在壁外持矛者主刺頭故頭重痛不得舉持弓箭者主射胷腹故心中懸痛不得飲食晝則浮遊夜還病人故驚恐若徙其屍柩便皆丁強於是令歸室中果得兩敗棺中有角弓及數箭物已乆逺木消爛徙骸理之合家皆愈洞林曰曲阿令趙元瞻兒字虎舒從吾學卜自求著作卦見吾有盛艾小陵龜欲得之不與語之曰當作卦相為致此物合自來復數日果有一龜入廐虎舒後見吾言偶有一物試可占之若得當再拜輸一好角弓即便作卦曰案卦之是為龜虎舒奉弓起再拜老子曰天之道其猶張弓乎髙者抑之下者舉之列子曰紀昌學射於飛衛飛衛曰爾先學不瞬而後能}
