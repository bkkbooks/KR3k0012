  - {type: variant, offset: 1577, length: 0, content: '', SBCK: 明猶嫌有所脫失故遣徃冩之還以校正平所書尺寸皆得􅀄無脫誤所疑兩字故如正平所遺字也於是章陵敬服丗􅀃曰魏武嘗過曹娥碑下楊脩讀碑背上題云黃絹㓜婦外孫韲臼魏武謂脩曰卿解不荅云解魏武曰卿未可言待我思之行三十里乃曰吾巳得令脩别記所知脩曰黃絹色絲也於字爲絶㓜婦少女也於字爲妙外孫女子也於字爲好韲臼受辛也於字爲辭所謂絶妙好辭魏武亦記之與脩同乃歎曰我才不如卿乃覺三十里}
  - {type: variant, offset: 1577, length: 0, content: '', krp: 明猶嫌有所脫失故遣徃冩之還以校正平所書尺寸皆得𥘉無脫誤所疑兩字故如正平所遺字也於是章陵敬服丗說曰魏武嘗過曹娥碑下楊脩讀碑背上題云黃絹㓜婦外孫韲臼魏武謂脩曰卿解不荅云解魏武曰卿未可言待我思之行三十里乃曰吾巳得令脩别記所知脩曰黃絹色絲也於字爲絶㓜婦少女也於字爲妙外孫女子也於字爲好韲臼受辛也於字爲辭所謂絶妙好辭魏武亦記之與脩同乃歎曰我才不如卿乃覺三十里}
  - {type: variant, offset: 1578, length: 1, content: 充, SBCK: 肅荅詔問爲瑞表曰太和六年上將幸許昌過繁昌詔問受禪碑生黃金白玉應瑞不肅奏以始改之元年嘉瑞見乎于踐祚之壇冝矣晉令曰諸葬者皆不得立祠堂石碑石表石獸語林曰孫興公作永嘉郡郡人甚輕之桓公後遣傳教令作敬夫人碑郡人云故當有才不尓桓公那得令作碑於此重之荆州圖記曰羊叔子與鄒􅃳甫嘗登峴山泣曰自有宇宙便有此山由來賢逹登此望如我與卿者多矣皆湮滅無聞念此使人悲傷潤甫曰公德冠四海道嗣前哲令問令望當與此山俱傳􅀂潤甫軰乃當如公語耳後叅佐爲立碑着故望處百姓毎行望碑莫不悲感杜預名爲墮淚碑盛弘之荆州記曰冠軍縣有張詹墓七丗孝廉刻其碑背曰白楸之棺易朽之衣銅鐡不入瓦器不藏嗟矣後人幸勿見傷及胡石之亂舊墓莫不夷毁而此墓儼然至元嘉六年民飢始發說者云􅀄開金銀銅錫之器未裝雕刻之飾爛然畢備齊道記曰琅邪城始皇東遊至此立碑銘紀􅁗功德云是李斯所刻西征記曰國子堂前有列碑南北行三十五枚刻之表裏書春秋經尚書二部大􅂐􅀠科斗三種字碑長八尺今有十八枚有餘皆崩太學堂前石碑四十枚亦表裏􅀠書尚書周易公羊傳禮記四部本石塶相連多崩敗又太學讃碑一所漢建武中立時草創未備永建六年詔下三府繕治有魏文典}
