  - {type: variant, offset: 2602, length: 645, content: 州芒芒遠貌也畫分也經啟九道九道九州之道也啟開也民有寢廟獸有茂草各有攸處德用不擾人神各有歸故德不亂也在帝夷羿冐于原獸冐貪忘其國恤而思其麀牡言但念獵武不可重重猶數也用不恢于夏家羿以好武雖有夏家而不能恢大也獸臣司原敢告僕夫獸臣虞人也告僕夫不敢斥尊也范曄後漢書曰崔琦字子瑋梁冀聞其才請與交冀行多不軌琦數引古今成敗以誡之冀不能受作外戚箴晉書曰張華懼後族之盛作女史箴以為諷賈后雖凶妒而知敬重華又曰文帝子齊王攸武帝時為太子太傅獻箴於太子其略曰無曰父子之間昔有江充無曰至親靡二或容潘崇諛言亂真譖潤離親驪姬之讒晉侯疑申固親以道勿固以恩修身以敬勿託以尊世以為工後周書曰齊王憲友劉休徵獻王箴一首憲美之休徵後又以此箴上高祖高祖方剪削諸弟甚悅其文唐書曰元和中吏部郎中柳公綽獻太毉箴曰寒暑滿天地之間浹肌膚於外好愛溢耳目之前誘心知於內端潔為隄奔射猶敗氣行無間隙不在大睿聖之姿清明絕俗心正無斜志高寡欲謂天高矣氣蒙晦之謂地厚矣撗流漬之聖情超遙萬方賴之飲食所以資身也過則生患衣服所以稱德也侈則生慢惟過與侈心必隨之氣與心流疾亦伺之上深嘉歎降中使勞問又曰敬宗遊幸無度李德裕獻丹扆箴六首霄衣箴曰先王聽政昧爽以俟鷄鳴既盈日出而視伯禹大聖寸陰為貴光武至仁反支不忌無俾姜后獨去簪珥彤管記言克念前志又有正服罷獻納誨辨邪防微等箴文多不載帝甚嘉之胡廣百官箴敘曰箴諫之興所由尚矣聖君求之於下忠臣納之於上故虞書曰予違汝弼汝無面從退有後言墨子著書稱夏箴之辭崔瑗敘箴曰昔揚子雲讀春秋傳虞人箴而善之於是作為九州及二十五管箴規匡救言君德之所宜斯乃體國之宗也, SBCK: ''}
