  - {type: variant, offset: 1582, length: 0, content: '', SBCK: 下相城西北漢太尉陳球墓有三碑近墓一碑記弟子盧植鄭玄管寜華歆等六十人其一碑陳登碑文並蔡邕所作酈善長水經注曰昔大禹導河積石踈決梁山所謂龍門矣孟津河口廣八十歩巖際鐫跡遺功尚存岸上並有廟祠祠前有石碑三所碑字紊滅不可識也一碑是太和中立述異記曰崆峒山中有堯碑禹碣皆籕文焉伏滔述帝功徳銘曰堯碑禹碣磨}
