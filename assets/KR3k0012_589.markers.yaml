  - {type: variant, offset: 90, length: 3, content: 篇工歌, WYG: 碑背曰白楸之棺易朽之衣銅鐵不入瓦器不藏嗟夫後人幸勿見傷及胡石之亂舊墓皆夷毁而此墓儼然至元嘉六年民饑始發説者云初開金銀銅錫之器朱裝雕刻之飾爛然畢備齊道記曰瑯琊城始皇東遊至此立碑銘紀秦功德云是李斯刻西征記曰國子堂前有列碑南北行三十五枚刻之表裏春秋經尚書二部大篆隸科斗三種字碑長八尺今有十八枚存餘皆崩太學堂前石碑四十枚亦表裏𨽻書尚書周易公羊傳禮記四部本石塶相連多崩敗又太學讃碑一所漢建武中立時草創未備永建六年詔下三府繕治有魏文典論立碑今四存二敗述征記曰下相城西北漢太尉陳球墓有三碑近墓一碑記弟子盧植鄭𤣥管寧華歆等六十人}
