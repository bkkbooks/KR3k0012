  - {type: variant, offset: 188, length: 0, content: '', WYG: 陸機鈎深猶傳碑賦如一國朝傳記曰魏文貞之薨也太宗親製碑文并為書石後為人所間詔令踣之及征高麗不如意深悔是行乃歎曰若魏徴在不使我有此舉也既渡遼水令馳驛祀以少牢復立碑焉又曰率更令歐陽詢行見古碑索靖所書駐馬觀之良久}
