  - {type: 'tls:seg', offset: 29, content: '', id: KR3k0012_CHANT_589-1a.9}
  - {type: variant, offset: 33, length: 1, content: 宣, WYG: 又撰進之後例行餽遺臣若公然阻絶則違陛下撫納之宜僶勉受之則非微臣平生之志臣不願為之秉筆帝嘉而從之又曰李綘憲宗時中官吐突承璀自藩邸承恩寵既為神䇿軍護軍中尉嘗欲於安國佛寺建立聖德碑大興工作絳即上言陛下布維新之政剗積習之弊四海延頸日望德音今忽立聖德碑以示天下不廣大易稱大人者與天地合德與日月合明垂拱勵精求理執契豈可以文字而盡聖德又安可以碑表而贊皇猷若可叙述是有分限乃反虧損盛德豈謂敷揚至道哉故自堯舜禹湯文武並無建碑之事至秦始皇荒逸之君煩酷之政乃有梁嶧山之碑揚誅伐之功紀巡幸之跡適足為百世所笑萬代所譏至今稱為失道亡國之主豈可擬議於此陛下嗣髙祖太宗之業舉貞觀開元之政思理不遑食從諫如順流固可與堯舜禹湯文武方駕而行安追秦皇暴虐不經之事而自損聖德近者閻巨源請立記聖德碑陛下詳盡事宜皆不允許今忽令立此與前事頗乖況此碑既在安國寺即不得叙載遊觀崇飾之事述遊觀且乖治理叙崇飾又非政經固非哲}
