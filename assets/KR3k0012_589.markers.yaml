  - {type: variant, offset: 1137, length: 212, content: 劉伶字伯倫沛國人也志氣曠放以宇宙為狹著酒德頌為建威參軍以壽終崔鴻春秋前燕錄曰慕容雋觀兵近郊見甘棠于道周從者不識雋曰唏此詩所謂甘棠于道甘者味之主也木者春之行也五德屬仁五行主土春以施生味以養物色又赤者言將有赫赫之慶于中土吾謂國家之盛此其徵也傳曰升高能賦可以為大夫群司亦各書其志吾將覽焉於是內外臣寮並上甘棠頌南史曰梁大同中嘗驟雨殿前往往有雜色寶珠梁武觀之甚有喜色虞寄因上瑞雨頌帝謂寄兄荔曰此頌典裁清拔卿之士龍也將加擢用寄聞之歎曰美, SBCK: 勒石紀號垂􅁉後昆羙}
