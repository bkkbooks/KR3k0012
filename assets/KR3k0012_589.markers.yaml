  - {type: variant, offset: 659, length: 10, content: 治脩古禮巡狩方嶽崔駰, SBCK: 卒同志者乃共刻石立碑蔡邕爲其文旣而謂盧植曰吾爲碑多矣皆有慙德唯郭有道碑無愧色耳又蔡邕傅曰邕以經籍去聖巳乆文字多謬俗儒穿鑿疑誤後學乃與五官中郎將堂谿典光禄大夫楊賜諌議大夫馬日磾議郎張訓韓􅀃太史令單颺等奏求正定六經文字靈帝許之邕乃自丹於碑使工鐫刻太學門外於是後儒晚學咸取焉及碑始立其觀視及摹冩者車乗日千餘兩塡塞街陌魏志曰王粲與人共行讀道邊碑人問曰卿能闇乎曰能因使背而誦之不安一文又曰鄧艾字士載年十二隨母至潁川讀陳寔碑文言爲世範行爲士則艾遂更名範字士則後宗族有與同者故改焉晉書曰隱逸傅戴逵字安道譙國人也少􅀶學好談論善屬文能鼓琴工書􅀞其餘工藝靡不畢綜揔角時以鷄􅆑汁溲白瓦屑作鄭􅀇碑又爲文而自鐫之詞麗器妙時人莫不驚歎又曰郭璞爲􅁃氷筮曰墓碑生金􅁃氏大忌後氷子爲廣州刺史碑生金爲桓温所㓕又曰杜預好爲後丗名常言髙岸爲谷深谷爲陵刻石爲二碑紀其勲績一沉萬山之下一立峴山之}
