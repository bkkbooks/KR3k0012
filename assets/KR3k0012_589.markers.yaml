  - {type: variant, offset: 1359, length: 5, content: 情耳吾豈買, SBCK: 盛者也又曰文苑傳曰李邕尤長碑頌雖貶職在外中朝衣冠及天下寺觀多賷持金帛徃求其文前後所製凢數百首受納饋運亦至鉅萬時議以爲自古鬻文獲財未有如邕者有文集七十卷其張幹公行狀洪州放生碑批韋巨源謚議文士推重之後恩思例贈秘書監又曰長平中源寂使新羅國見有國人傳冩諷念馮定所爲黒水碑􅀞鸖記韋休符之使西蕃也見其國人冩定商山記以代屏障其文}
