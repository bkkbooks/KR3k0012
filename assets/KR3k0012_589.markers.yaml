  - {type: variant, offset: 7, length: 17, content: 頌者美盛德之形容以其成功告於神明者, SBCK: 碑􅀍}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 郭林宗卒同志者乃共刻石立碑蔡邕為其文既而謂盧植曰吾為碑多矣皆有慚德惟郭有道碑無愧色耳又蔡邕傳曰邕以經籍去聖已乆文字多謬俗儒穿鑿疑誤後學乃與五官中郎將堂谿典光禄大夫楊賜諫議大夫馬日磾議郎張馴韓説太史令單颺等奏求正定六經文字靈帝許之邕乃自書册於碑使工鐫刻立於太學門外於是後儒晚學咸取正焉及碑始立其觀視及摹冩者車乗日千餘兩填塞街陌魏志曰王粲與人共行讀道邊碑人問曰卿能闇誦乎曰能因使背而誦之不失一字又曰鄧艾字士載年十二随母至潁川讀陳實碑文言文為世範行為士則艾遂更名範字士則後宗族有與同者故改焉晉書隠逸傳戴逵字安道譙國人也少博學好談論善屬文能鼓琴工書畫其餘巧藝靡不畢綜總角時以雞卵汁溲白瓦屑作鄭𤣥碑又為文而自鐫之詞麗器妙時人莫不驚歎又曰郭璞為庾氷筮曰墓碑生金庾氏大忌後氷子為廣州刺史碑生金為桓温所滅又曰杜預好為後世名常言髙岸為谷深谷為陵刻石為二碑記其勲績一沉萬山之下一立峴山之上曰焉知此後不為陵谷乎又曰孫綽少以文才稱於時文士綽為其冠温王郗庾諸公之薨必須綽為碑文然後刋石焉又曰扶風武王駿嘗都督雍梁病薨追贈大司馬加侍中假黄鉞西土聞其薨也泣者盈路百姓為之樹碑長老見碑無不下拜其遺愛如此又曰唐彬為幽州百姓追慕彬功德生為之立碑作}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_WYG_589-3a, image: WYG0898/WYG0898-0372a.png}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_WYG_589-3b, image: WYG0898/WYG0898-0372b.png}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_WYG_589-4a, image: WYG0898/WYG0898-0372c.png}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_WYG_589-4b, image: WYG0898/WYG0898-0372d.png}
  - {type: variant, offset: 7, length: 17, content: 頌者美盛德之形容以其成功告於神明者, krp: 碑𬒳}
  - {type: variant, offset: 8, length: 1, content: 者, WYG: 彬初受學於東海閻德門徒甚多獨目彬有廊廟才及彬官成而德已卒乃為立碑王隠晉書曰石瑞記曰永嘉初陳國項縣賈逵石碑中生金人盜取盡復生此江東之瑞齊書曰竟陵王薨范雲是故吏上表請為立碑文云人蓄油素家懷鈆筆瞻彼景山徒然望慕油素絹也筆所以理書也三國典畧曰宗懔少聰明好讀書語輒引古事鄉人呼為小兒學士梁主使製龍川廟碑一夜便就詰朝呈上梁主美之又曰陸雲呉郡呉人曽製太伯廟碑呉興太守張纉罷郡經途讀其文嘆美之曰今之蔡伯喈也至都言於髙祖髙祖召兼尚書議郎頃之即真後魏書曰衞操桓帝以為輔相任以國事劉石之亂勸桓帝匡助晉氏東瀛公司馬騰聞而善之表加右軍封定㐮侯桓帝崩後立碑於大䢴城南以頌功德云魏軒轅之苗裔桓穆二帝馳名域外九譯宗焉有德無禄大命不延背棄華殿雲中名都逺近齊軌奔赴梓廬時晉光熈元年秋也皇興初雍州别駕鴈門段榮於大䢴掘得此碑又曰爾朱榮字天寶美容貌幼而明決長好射獵葛榮之叛也榮列圍為大獵有雙兎起於馬前榮乃彎弓而誓曰中之則擒葛榮應弦而殪三軍咸悦破賊之後即命立碑於其所號曰雙兎碑唐書曰賈敦實寃句人也貞觀中為饒陽令時制除大功已止不得聯職敦實兄敦頥先為洛州刺史甚有惠政百姓共樹碑於大市通衢及敦實去職復刻石頌其政德立於兄之碑側故時人呼為常棣之碑焉又曰貞觀中議封禪又議立碑勒石紀號垂裕後昆}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_WYG_589-5a, image: WYG0898/WYG0898-0373a.png}
