  - {type: variant, offset: 2103, length: 498, content: 餘萬言其一卷論楚者最為工妙恒悅之故竭思以贊其美世說曰羊孚作雪讚曰資清以化乘氣以霏遇象能鮮即潔成輝桓伊遂以書扇箴文心雕龍曰箴所以攻疾除患喻針石垣又曰斯文之興盛於三代夏商二箴餘句頗存及周之辛甲百官箴闕唯虞箴一篇體義備焉迄至春秋微而未絕故魏絳諷君於后羿楚子訓人於在勤戰伐已來棄德務功銘辭代興箴文萎絕至揚雄稽古始範虞箴卿尹州牧二十篇及崔胡補綴揔稱百官指事配位盤鑒有徵可謂追清風於前古攀辛甲於後代者也至於潘勗符節要而失淺溫嶠侍臣博而患繁王濟國子引多事寡潘君乘輿義正體蕪凡斯繼作鮮有克衷至於王朗雜箴乃寘巾履得其戒慎而失其所施觀其約文舉要憲章武銘而水火井竈繁辭不已志有偏也夫箴誦於經銘題於器名用雖異而警戒實同箴全禦過故文資確切銘兼褒讚故理貴弘潤取其要也然天言之道蓋闕庸器之制久淪所以箴銘實用罕施後代惟秉文君子宜酌其遠大矣陸士衡文賦曰箴頓挫而清壯周書曰夏箴曰小人無兼年之食遇天饑妻子非其妻子也大夫無兼年之食遇天饑臣妾非其臣妾也卿大夫無兼年之食遇天饑臣妾轝馬非其有也國無兼年之食遇天饑百姓非其有也左傳襄元曰昔周辛甲之為太史命百官官箴王闕辛甲周武王太史也闕遇也百官各以箴以誡王過也於虞人之箴曰虞人掌田獵者芒芒禹跡畫為, SBCK: ''}
