  body:
  - {type: variant, offset: 2, length: 1, content: 四, SBCK: 五}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 五碑釋名曰碑被也此本葬時所設也施其鹿盧以繩被其上引以下棺追述君父之功美以書其上後人因為焉故建於道陌之頭名其文謂之碑也文心雕龍曰碑者埤也上古帝王紀號封禪樹石埤岳故曰碑也周穆紀迹于弇山之石亦古碑之意也又宗廟有碑樹之兩楹事止麗牲未勒勲績而庸器漸闕故後代用碑以石代金同乎不朽自廟徂墳猶封墓也自後漢以來碑碣雲起才鋒所斷者莫高蔡邕楊賜之碑骨鯁訓典陳郭二文句無擇言周乎衆碑莫非精允其叙事也核而要其綴采也雅而澤清辭轉而不窮巧義出而卓立察其為才自然至矣孔融所創有慕伯喈張陳兩文辨給足采亦其亞也及孫綽為文志在於碑温王郗庾詞多支離桓彛一篇最為辯才矣此碑之所致也屬碑之體資乎史才其序則傳其文則銘標序盛德必見清風之華昭紀鴻懿必見俊偉之烈此碑之制也夫碑實銘器銘實碑文因器立名事光於誄是以勒器讃勲者入銘之域樹碑述己者同誄之區焉禮記喪大記曰君葬用輴}
