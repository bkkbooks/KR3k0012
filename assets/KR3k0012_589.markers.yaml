  - {type: variant, offset: 39, length: 5, content: 吉甫作頌穆, WYG: 吾雖一過皆識然其中央第四行中石書磨滅兩字不分明當是某字恐不諦耳因援筆書之初無所遺唯兩字不著耳章陵雖知其才明敏猶嫌有所脱失故遣往寫之還以校正平所書尺寸皆得初無脱誤所疑兩字}
