  - {type: variant, offset: 36, length: 49, content: 其詩曰吉甫作頌穆如清風陸機文賦曰頌則優游以彬鬱文章流別論曰頌詩之美者也古者聖帝明王成功治定而頌聲興, SBCK: ''}
  - {type: variant, offset: 36, length: 0, content: '', WYG: 上納之後唐史記曰魏帥楊師厚於黎陽山採巨石將紀德政制度甚大以銕為車方任負載驅牛四百不由道路所經之處或壞人廬舍或發人丘墓百姓瞻望曰碑來石才至而卒魏人以為應悲來之兆禰衡别傳曰黄祖之子射作章陵太守與衡有所之見蔡伯喈所作石碑正平一過視而歎}
  - {type: page-break, offset: 36, content: '', id: KR3k0012_WYG_589-9a, image: WYG0898/WYG0898-0375a.png}
  - {type: variant, offset: 36, length: 49, content: 其詩曰吉甫作頌穆如清風陸機文賦曰頌則優游以彬鬱文章流別論曰頌詩之美者也古者聖帝明王成功治定而頌聲興, krp: ''}
  - {type: variant, offset: 37, length: 1, content: 詩, WYG: 好後日各歸章陵自恨不令吏寫之正平}
