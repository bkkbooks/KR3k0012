  - {type: variant, offset: 3, length: 0, content: '', WYG: 紼二碑御棺用羽葆大夫葬用輴二紼二碑御棺用茅士葬用國車二紼無碑凢封用紼去碑負引又祭義曰祭之日君牽牲既入廟門麗于碑麗猶繫也東觀漢記曰竇章女順帝初入掖庭為貴人早卒帝追思之詔史官樹碑}
