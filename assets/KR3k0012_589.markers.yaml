  - {type: variant, offset: 27, length: 5, content: 烝民尹吉甫, WYG: 文苑傳曰李邕尤長碑頌雖貶職在外中朝衣冠及天下寺觀多齎持金帛往求其文前後所製凡數百首受納饋遺亦至鉅萬時議以為自古鬻文獲財未有如邕者有文集七十卷其韓公行狀洪州放生池碑批韋巨源諡議文士推重之後恩例贈秘書監又曰長平中源寂使新羅國見其國人傳寫諷念馮定所為黑水碑畫鶴記韋休符之使西蕃也見其國人定商山記以代屏障其文名馳於戎夷如此又曰裴度平淮西詔韓愈撰平淮西碑其辭多序裴度時先入蔡州擒呉元濟李愬功第一愬不平之愬妻出入禁中因訴碑辭不實詔令磨愈文憲宗命翰林學士段文昌重撰文勒石又曰蕭俛在相位時穆宗詔撰故成德軍節度使王士真神道碑對曰臣器褊狹王承宗先朝阻命事無可觀如臣秉筆不能溢}
