  - {type: variant, offset: 15, length: 0, content: '', WYG: 闡後王之休烈其義逺矣又曰髙祖御製慈恩寺碑文及自書鐫刻既畢甲戌上御安福門樓觀僧𤣥裝等迎碑向寺皆造幢蓋飾諸寺}
