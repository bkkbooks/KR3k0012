  - {type: variant, offset: 1583, length: 0, content: '', SBCK: 不昧虞喜志林曰贑榆縣有始皇碑潮水至則加其上三丈去則見三尺行有十二字異苑曰呉郡岑淵碑在江乗湖西太元村人見􅀛從田中出還其元處萍藻猶着腹下金樓子曰銘頌所稱興公而巳夫披文相質􅀶約温潤吾聞斯語未見其人班固碩學尚云賛頌相似陸機鈎深猶稱碑賦如一國朝傳記曰魏文貞}
