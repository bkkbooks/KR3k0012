  - {type: variant, offset: 1617, length: 485, content: 官上頌文比瓦石唯班固賈逵傅毅楊終侯諷五頌文比金玉崔駰西巡頌表曰臣聞陽氣發而鶬庚鳴秋風厲而蟋蟀吟氣之動也唐虞之世樵夫牧監擊轅中韶感於和也臣不知手足之動音聲敢獻頌云零陵先賢傳曰周不疑字文直曹公時有白雀瑞儒林並已作頌不疑見操授紙筆立令復作操奇之讚釋名曰稱人之美曰讚讚纂也纂集其美而敘之也文心雕龍曰讚者明也助也昔虞舜之祀樂正重贊蓋唱發之詞也及益贊于禹伊陟贊于巫咸並颺言以明事嗟嘆以助詞者也故漢置鴻臚以唱拜為讚即古之遺語也至如相如屬詞如贊荊軻及史班書記以讚褒貶約文以惣錄頌體而論詞又紀傳後評亦同其名而仲治流別謬稱為述失之遠矣及景純任雅動植必讚讚兼美惡亦猶頌之有變耳然本其為義事生獎歎所以古來篇體促而不廣必結言於四字之句槃桓于數韻之詞約舉以盡情照灼以送文比其體也發言雖遠而致用蓋寡大抵所歸其頌家之細條也李充翰林論曰容象圖而讚立宜使辭簡而義正孔融之讚楊公亦其美也晉書曰嵇含紹之孫也弘農王粹以貴公子尚主館宇甚盛圖莊周於室廣集朝士使含為子讚含援筆為之文不加點其略曰嗟乎先生高跡何局生處巖岫之居死寄雕楹之屋既非其所沒有餘辱粹有愧色又曰衛恒字巨山為黃門郎善草隸太康元年汲縣人盜發魏襄王冢得策書, SBCK: 八}
