  - {type: variant, offset: 1602, length: 1, content: 永, SBCK: 率更令歐陽詢行見古碑索靖所書駐馬觀之良乆而去數百歩復還下馬佇立疲則布毯坐觀因􅀫其傍三日而後去李綽尚書故實曰東晉謝太􅀓墓碑樹貞石􅀄無文字盖重難製述之意國史􅀘曰韋貫之爲尚書右丞長安中爭爲碑誌􅀂市賈然大官卒其門如市至有喧競搆致不由䘮家是時裴均之子圖不朽於貫之縑帛萬疋貫之舉手曰寧餓不苟太}
