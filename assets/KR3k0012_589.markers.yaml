  - {type: variant, offset: 809, length: 2, content: 平望, SBCK: 陸雲呉郡呉人曽製太伯廟碑呉興太守張纉罷郡經途讀其文歎羙之曰今之蔡伯喈也至都言於髙祖髙祖召兼尚書議郎頃之即眞後魏書曰衛操桓帝以爲輔相任以國事劉石之亂勸桓帝匡助晉氏東􅌡公司馬騰聞而善之表加右軍封定襄}
