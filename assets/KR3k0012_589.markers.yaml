  - {type: variant, offset: 242, length: 188, content: 形容也昔帝嚳之世咸累為頌以歌九招自商頌已下文理允備夫化偃一國謂之風風正四方謂之雅容告神謂之頌風雅序人故事資變正頌主告神故義必純美魯以旦次編商以前王追錄斯乃宗廟之正歌非饗燕之恒詠也時邁一篇周公所製哲人之頌規式存焉夫三閭橘頌情采芬芳比類屬興又覃及細矣至於秦政刻文爰頌其德漢之惠景亦有述容沿世並作相繼於時矣若夫子雲之表充國孟堅之序戴侯武仲之美顯宗史岑之述僖后或擬清廟或範駉那雖深淺不, SBCK: 亡者}
