  - {type: variant, offset: 226, length: 0, content: '', SBCK: 石亦古碑云意也又宗廟有碑樹之兩楹事止麗壯未勒勲績而庸器漸闕故後代用碑以石代金同乎不朽自廟徂墳猶封墓也自後漢巳來碑碣雲起才鋒所斷莫髙蔡邕觀楊賜之碑骨鯁訓典陳郭二文詞無擇言周胡衆碑莫不精允其序事也該而要其綴采巳雅而澤清辭轉而不窮巧義出而卓立察其爲才自然}
