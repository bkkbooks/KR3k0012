  - {type: variant, offset: 822, length: 2, content: 教請, SBCK: 無禄大命不延背棄華殿雲中名都逺近齊䡄奔赴梓廬時晉光熈元年秋也皇興􅀄雍州别駕鴈門叚榮於大䢴掘得此碑又曰􅈛朱榮字天寳羙容皃㓜而明決長好射獵葛榮之叛也榮列圍大獵有􅀟兎超於馬前榮乃彎弓而誓曰中之則擒葛榮應􅁌而殪三軍咸恱破賊之後即命立碑於其所號曰􅀟兎碑唐書曰賈敦實宛昫人也貞觀中累除饒陽}
