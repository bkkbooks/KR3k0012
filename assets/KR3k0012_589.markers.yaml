  - {type: variant, offset: 87, length: 2, content: 史錄, WYG: 章陵敬服世説曰魏武嘗過曹娥碑下楊修讀碑背上題黄絹幼婦外孫韲臼魏武謂修曰卿解不答云解魏武曰卿未可言也待我思之行三十里乃曰吾已得之問修所解修曰黄絹色絲也於字為絶幼婦少女也於字為妙外孫女子也於字為好齏臼受辛也於字為辭所謂絶妙好辭魏武亦與修同乃歎曰我才不如卿乃較三十里王肅奉詔為瑞表曰太和六年上將幸許昌過繁昌詔問受禪碑生黄金白玉應瑞否肅奏以始改之元年嘉瑞見于踐祚之壇宜矣晉令曰諸葬者皆不得立祠堂石碑石表石獸語林曰孫興公作永嘉郡郡人甚輕之桓公後遣傳教令作敬夫人碑郡人云定有才不爾桓公那得令作碑於此重之荆州圖記曰羊叔子與鄒潤甫嘗登峴山泣曰有宇宙便有此山由來賢逹登此望如我與卿者多矣皆湮滅無聞念此使人悲傷潤甫曰公德冠四海道嗣前哲令聞令望當與此山俱傳若潤甫輩乃當如公語耳後參佐為立碑故望處百姓每行望碑莫不悲感杜預名為墮淚碑盛𢎞之荆州記曰冠軍縣有張唐墓七世孝廉刻}
