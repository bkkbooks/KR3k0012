  - {type: variant, offset: 213, length: 5, content: 頌失之遠矣, SBCK: 碑也}
  - {type: variant, offset: 213, length: 482, content: 頌失之遠矣文心雕龍曰四始之至頌居其極頌者容也所以美盛德而述形容也昔帝嚳之世咸累為頌以歌九招自商頌已下文理允備夫化偃一國謂之風風正四方謂之雅容告神謂之頌風雅序人故事資變正頌主告神故義必純美魯以旦次編商以前王追錄斯乃宗廟之正歌非饗燕之恒詠也時邁一篇周公所製哲人之頌規式存焉夫三閭橘頌情采芬芳比類屬興又覃及細矣至於秦政刻文爰頌其德漢之惠景亦有述容沿世並作相繼於時矣若夫子雲之表充國孟堅之序戴侯武仲之美顯宗史岑之述僖后或擬清廟或範駉那雖深淺不同詳略有異其褒德顯容典章一也原夫頌惟典懿詞必清鑠敷寫似賦而不入華侈之區敬慎如銘而異於規式之域榆楊以發藻汪洋以樹儀雖纖巧曲致與情而變其大體所弘如斯而已漢書曰宣帝徵王褒為聖主得賢臣頌褒對曰夫荷旃被毳者難與道純綿之麗密羹藜唅糗者不足與論大牢之滋味今臣僻在西蜀生於窮巷之中長於蓬茨之下無有遊觀廣覽之知不足以塞厚望應明旨雖然敢不略陳愚而杼情素又曰成帝時西羗嘗有警上思將帥之臣追美充國乃召黃門郎揚雄即充國圖畫而頌之後漢書曰帝召賈逵因勑蘭臺給筆札使作神雀頌范曄後漢書曰肅宗治脩古禮巡狩方嶽崔駰上西巡頌稱漢德帝雅好文章自見駰頌後常嗟歎之問侍中竇憲, WYG: 舉手}
