  - {type: variant, offset: 2280, length: 317, content: 餘里布陣長驅徑至金牙山賀魯牙帳時賀魯集眾欲獵定方縱兵擊之盡破其牙帳生擒數萬人賀魯脫走投石國定方於是悉命諸部歸其所居埋瘞骸骨存問疾苦復其產業賀魯所虜掠者悉撿責還之於是西域諸國安堵如故令副將蕭嗣業往石國以追賀魯遂擒歸于京師又曰貞觀中突厥諸部離叛朝庭將圖進取以李靖為代州道行軍揔管率驍騎三千自馬邑出其不意直趨惡陽嶺以逼之突利可汗不虞於靖見官軍掩至相謂曰唐兵若不傾國而來靖豈孤軍而至一日數驚四年靖進擊定襄城破之突厥諸部落並走磧北突利可汗來奔又曰貞觀中吐谷渾寇邊以李靖為西海道行軍大揔管統兵部尚書侯君集刑部尚書任城王道宗等五揔管征之軍次伏埃城吐谷渾燒去野草以餧我師退保大非川諸將咸言春草未生馬已羸疲不可赴敵唯靖決計而進深入敵境遂踰積石山前後戰數, SBCK: 九}
