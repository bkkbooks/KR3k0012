  - {type: variant, offset: 1901, length: 0, content: '', WYG: 權曰老賊欲廢漢自立久矣但忌二袁吕布劉表與孤耳今諸英雄已滅唯孤尚存孤與老賊勢不兩立君言當擊甚與孤合權拔刀斫前奏案曰諸將兵敢復言迎曹操者與此案同果有赤壁之捷焉又曰蜀大將諸葛亮率衆十萬由斜谷出始平據武功五丈原魏大將司馬宣王帥師拒之與亮對於渭南亮分兵屯田為久駐之本耕者雜於渭濵而百姓安堵軍無私焉屢使交書復致巾幗婦人之飾以怒宣王王亦屢表請戰魏使衛尉辛毗仗節而到遂不復出矣亮曰彼無戰心所以固請者亦惑於衆耳將在軍君命有所不受苟能制吾豈千里請戰耶宣王使二千餘人就軍營東西角大聲稱萬歲亮使問之荅曰吳朝有使至請降亮謂曰計吳朝必無降理卿是六十老翁何煩詭誑如此懿與亮相持百餘日亮卒於軍中及軍退懿追焉亮長史楊儀結陣反旗鳴鼓若將向懿者懿遽退不敢逼經二日乃行其營壘曰天下竒才也懿乃追之儀多布鐵蒺藜懿使軍士二千人著軟材平底木履前行蒺藜悉着履次馬歩徑進追至赤㟁方知審問百姓為諺曰死諸葛走生仲達懿笑曰吾便料生不便料死故也吳志曰魏使大司馬曹仁歩騎數萬向濡須為欲東攻羨溪朱桓分兵赴羨溪仁軍進拒濡須桓聞追羨溪兵未到而仁奄至諸將各懼桓喻之曰凡兩軍交對勝負在將不在衆寡兵法所以稱客倍而主人半者謂俱在平原無城池之守又謂士衆怯勇齊等故耳今人既非智勇又久渉人馬罷困桓與諸君共據高城南臨大江北陪山陵以逸待勞以主制客此百戰百勝之勢雖曹丕自來尚不足憂况仁等耶桓}
