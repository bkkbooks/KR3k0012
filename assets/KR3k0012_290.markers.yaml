  - {type: variant, offset: 103, length: 0, content: '', krp: 定陶梁死宋義所遇齊使者髙陵君顯見楚懷王曰宋義論武信君必敗數日果破未戰先見敗徴此可謂知兵矣召宋義與計事而恱之因}
  - {type: variant, offset: 104, length: 3, content: 功進位, SBCK: 爲}
  - {type: variant, offset: 104, length: 2, content: 功進, WYG: 不整以誘之後者敦陳整旅敦厚吳子從之戰於雞父音甫吳子以罪人三千先犯胡沈與陳囚徒不習戰以示不整也三國争之吳為三軍以擊之其後中軍從王光帥右軍掩餘帥左軍吳之罪人或奔或止三國亂吳師擊之敗獲胡沈之君及陳大夫舍胡沈之囚使奔許與蔡頓曰吾君死矣師譟而從之三國奔三國許蔡頓也楚師大奔又曰晉侯將伐虢大夫士蒍曰不可虢公驕若驟得勝於我必棄其民棄民不養之無衆而後伐之欲禦我誰與夫禮樂慈愛戰所蓄也夫民讓事樂和愛親哀喪而後可使也上之使民以義讓哀樂為本言不可以力强虢弗蓄也亟戰將饑言虢不蓄義讓而力戰也後終為晉所滅又曰秦伯伐晉晉將趙盾禦之上軍佐臾駢曰秦不能久請深壘固軍以待之秦人欲戰秦伯謂士㑹曰若何而戰晉士㑹奔秦對曰趙氏新出其屬曰臾駢必實為此謀將以老我師也臾駢趙盾屬大夫新出佐上軍趙有側室曰穿晉君之壻也側室枝子有寵而弱不在軍事弱年少又未嘗渉知軍之事好勇而狂且惡臾駢之佐上軍也若使輕者肆焉其可也肆暫往而速退秦軍掩晉上軍趙穿追之不及上軍不動趙穿獨追之反怒曰裹粮坐甲固敵是求敵至不擊將何所俟軍吏曰將有待也待可擊之穿曰我不知謀將獨出乃以其屬出趙盾曰秦獲穿也獲一卿矣晉自有數}
