  - {type: variant, offset: 334, length: 1, content: 常, WYG: 得信晩遂聽信計又曰項籍圍漢王於滎陽城久之漢王患之請割滎陽以西以和項王}
  - {type: punctuation, offset: 335, content: ，, id: KR3k0012_CHANT_290-bkkpn82}
  - {type: 'tls:seg', offset: 335, content: '', id: KR3k0012_CHANT_290-4a.14}
  - {type: variant, offset: 336, length: 3, content: 復設備, WYG: 聽漢王謂陳平曰天下紛紛何時定乎陳平對曰項王為人恭敬愛人士之亷節好禮者多歸之至於行賞功爵邑重之言愛惜之士亦以此不附今大王慢而少禮士亷節者不來然大王能饒人以爵邑士之頑鈍嗜利無耻者亦多歸漢誠各去}
  - {type: page-break, offset: 336, content: '', id: KR3k0012_WYG_290-8b, image: WYG0895/WYG0895-0538b.png}
  - {type: punctuation, offset: 339, content: 。, id: KR3k0012_CHANT_290-bkkpn83}
  - {type: 'tls:seg', offset: 339, content: '', id: KR3k0012_CHANT_290-4a.15}
  - {type: variant, offset: 340, length: 0, content: '', WYG: 兩短襲其兩長天下指麾則定矣又曰漢王與項籍約中分天下漢王欲西歸張良陳平説曰漢有天下大半而諸侯皆附之楚兵疲食盡此天亡之時也何不因其饑而遂取之今釋不取所謂養虎自遺患也從之終滅羽漢書曰陳王拜項梁為楚上柱國梁自號武信君乃使宋義於齊道遇齊使者高陵君顯張晏曰顯名高陵縣名也曰公將見武信君乎曰然義曰臣論武信君軍必敗公徐行則免疾行及禍章邯夜銜枚擊楚大破之定陶梁死宋義所遇齊使者高陵君顯見楚懷王曰宋義論武信君必敗數日果破未戰先見敗徵此可謂知兵矣召宋義與計事而悦之因以為上將又曰西域都䕶為烏孫兵所圍上召陳湯問之湯知烏孫瓦合不能久攻因對曰已觧矣屈指計其日不出五日當有吉語聞居四日軍書到言已觧又曰黥布反帝召薛公問對曰使布出於上計東取吳西取楚并齊取魯傳檄燕趙固守其所山東非漢之有也出中計東取吳西取楚并韓取魏據敖倉之粟塞成皋之口勝敗之數未可知也出下計東取吳西取下蔡歸重於越身歸長沙陛下高枕而卧漢無事矣上曰是計將安出對曰必出下計布故酈山之徒也酈音離自致萬乘之主此皆為身不顧}
