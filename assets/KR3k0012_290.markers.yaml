  - {type: variant, offset: 2256, length: 134, content: 兵陵雪晝夜兼進所經收其人眾遂至雙河去賀魯所居二百餘里布陣長驅徑至金牙山賀魯牙帳時賀魯集眾欲獵定方縱兵擊之盡破其牙帳生擒數萬人賀魯脫走投石國定方於是悉命諸部歸其所居埋瘞骸骨存問疾苦復其產業賀魯所虜掠者悉撿責還之於是西域諸國安堵如故令副將蕭嗣業往石國以追賀魯遂擒歸于京師又, WYG: 笑}
  - {type: variant, offset: 2256, length: 134, content: 兵陵雪晝夜兼進所經收其人眾遂至雙河去賀魯所居二百餘里布陣長驅徑至金牙山賀魯牙帳時賀魯集眾欲獵定方縱兵擊之盡破其牙帳生擒數萬人賀魯脫走投石國定方於是悉命諸部歸其所居埋瘞骸骨存問疾苦復其產業賀魯所虜掠者悉撿責還之於是西域諸國安堵如故令副將蕭嗣業往石國以追賀魯遂擒歸于京師又, krp: 笑}
