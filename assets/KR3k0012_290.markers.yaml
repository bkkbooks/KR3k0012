  - {type: variant, offset: 2598, length: 1794, content: 合殺傷甚眾大破其國又曰武德中突厥突利頡利二可汗到原州太宗率兵拒之兩陣將交太宗以數騎出謂之曰不念昔者香火之言乃來相侵知二可汗外同內異故以此言疑之頡利見太宗輕出又聞香火之言乃陰猜突利因遣使曰王不須慮我無惡意更欲與王自斷當耳於是歛軍引却又曰貞觀中北狄鐵勒薛延陀發同羅僕骨回紇等眾合二十萬度漢屯白道川據善陽嶺以擊突厥可汗李思摩之部思摩引其種落走朔州留精騎以拒戰延陁乘之及塞太宗令張儉李勣等率兵數道擊之時太宗誡之曰延陁負其兵力踰漠而來經途數千馬已疲瘦夫用兵之道見利速進不利速退其掩思摩不能疾擊思摩既入長城又不能速退吾先勑思摩燒薙殺草延陁糧食日盡野無所獲頃者偵人來云其馬齧噉林木枝皮略盡卿等椅角思摩不須前戰俟其將退一時奮擊制勝之舉也於是李勣擊延陁之眾破之先是延陁擊突厥沙鉢羅及杜爾皆以步兵戰而勝及其將來寇也先講武於國中教習步戰每五人以一人經習戰陣者使執馬而四人前戰克勝即授馬以追奔失於應接罪至於死沒其家口以賞戰人至是遂行其法突厥先合趣退延陁乘勝而逐之勣兵拒擊而延陁萬矢俱發傷我戰馬李勣乃令去馬步陳率長矟數百為隊齊奮以衝之其眾潰散副揔管薛萬徹率數千騎收其執馬者其眾失馬莫知所從因擊之乃大敗又曰武后初徐敬業起兵於楊州武太后令將軍李孝逸討之敬業拒于高卸之下阿谿敬業置陣既久士卒多疲怠皆顧瞻陣不能整孝逸遂率眾擊之因風縱火敬業懼燒而退孝逸進擊大破之又曰武德中薛萬均與羅藝守幽燕竇建德率眾十萬來至范陽萬均謂藝曰眾寡不敵今若兵鬭百戰百敗當以計取可令羸兵弱馬阻水背城為陣以誘之賊若度水請公精騎百人伏於城側待其半度而擊之破之必矣從之建德引兵度水萬均擊之大破又曰武德初王世充據東都太宗往征之屯青城宮營壘未立王世充眾二萬自方諸門出臨穀水以禦大軍諸將甚懼太宗以精騎陳於北邙登後魏宣武陵以觀賊陣謂左右曰賊勢迫矣悉眾而出利在一戰今日破之其後不能出矣乃令屈突通率步卒五千度水布陣以當之因戒通曰待兵交即放煙吾當率馬軍南下兵纔接太宗以騎衝之挺身先進表裏合勢賊眾殊死戰散而復合者數焉地既險隘賊多䂎䂎鋌也筭也騎戰稍難太宗親自射之莫不應弦而倒起辰及午賊眾始退因乘之迫于城塹俘斬七千人自是不敢復出又曰高宗遣將軍裴行儉討突厥於黑山至朔川謂其下曰兵法尚詐者以權謀制敵也若御其下則非誠信不可行遣副將蕭嗣業運糧被掠兵多餧死所以敗也狡寇狃忲不可以不備乃詐為糧車三百乘每車伏壯士五人各齎陌刀勁弩以羸兵數百人援之兼伏精兵居險以待之賊果大下羸兵棄車散走賊驅馬就泉井解鞍牧馬方擬取糧車中壯士齊發伏兵亦至殺獲殆盡賊眾奔潰自是續遣糧運無敢近之者又曰馬燧為魏愽招討使田悅求救於淄青恒州李納遣大將衛俊將兵僅萬人以救悅李惟岳亦遣三千餘人救悅收合散兵二萬餘壁於洹水淄青軍其東恒州軍其西首尾相應燧帥諸軍進屯於鄴奏請益河陽兵詔遣河陽節度使李芃將兵會之軍次於漳悅遣將王光進以兵守長橋築月城以為固軍不得渡燧乃於下流以兵車數百乘維鐵鎖絕中流實以土囊以遏水水稍淺諸軍畢渡是時軍糧少悅深壁不戰欲老燧軍燧令諸軍持十日糧以前進次倉口與悅等夾洹水而軍李抱真等問曰糧少深入何也燧曰糧少利速戰兵法善於致人而不致於人今田悅與淄青恒州三軍為首尾計以老我師若分軍擊其左右兵少未可必破悅且來救是前後受敵也兵法所謂攻其必救固當戰也燧為諸公合而破之燧乃造三橋逾洹水日挑戰悅不敢出恒州兵自以軍少懼為燧所并引軍合於田悅燧又令於軍中曰悅死傷之餘安敢出戰所恃者淄青軍爾吾當先破納軍則田悅坐受降也淄青軍聞懼亦引軍合於田悅謂燧明日復挑戰乃伏兵萬人欲邀之燧乃令諸軍半夜皆食先雞鳴時擊鼓鳴潛師旁洹水西徑趨魏州令曰聞賊至即止為陣又令百騎鳴鼓角留於後仍抱薪持火待軍止鼓角匿其旁伺悅軍渡焚其橋軍行十數里悅乃率淄青恒州兵步騎四萬餘踰掩其後乘風縱火鼓噪而進燧乃坐軍前除草斬榛棘廣百步以為陣募勇士得五千餘人分為前引以俟賊至比悅軍至則火滅氣乏力少衰乃縱擊之悅大敗時神策昭義河陽軍小却河東軍勝諸軍還鬭合擊又大破迫切洹水悅軍走橋橋已焚矣悅軍亂赴水斬首二萬殺賊大將孫晉卿安墨啜生獲三千餘人溺水死者不可勝數淄青軍殆盡死者相枕藉三十里悅收兵得千餘人走夜至魏州又曰元和十二年唐鄧節度使李愬奏以九月二十六日圍蔡州吳房縣攻其外城毀之斬首千餘級初將出攻左右白以往亡日請避之愬曰賊以往亡謂吾不能來正可擊也及戰勝而歸賊以梟騎五百追愬愬下馬據胡床令於眾曰後廻戈者斬由是眾悉力戰射殺賊將孫忠憲賊眾乃退或勸愬曰乘其退可遂柭吳房愬曰取之賊必合勢而固其穴不如留之使分其力, SBCK: ''}
