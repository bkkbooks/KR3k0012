  - {type: variant, offset: 313, length: 0, content: '', WYG: 王不如也然臣嘗事之請言項王之為人也項王喑噁叱咤千人皆廢喑音陰啞烏路切叱尺栗切咤陟訝切然不能任屬賢將此特匹夫之勇耳項王見人恭敬慈愛語言嘔嘔人有疾病涕泣分食飲至使人有功當封爵者印刓弊刓五元切忍不能與此所謂婦人之仁也項王雖霸天下而臣諸侯不居關中而都彭城背義帝之約而以親愛王諸侯不平諸侯之見項王遷逐義帝置江南亦皆歸逐其主而自王善地項王所過無不殘滅者天下多怨百姓不親附特劫於威彊耳名雖為霸實失天下心故曰其彊易弱今大王誠能反其道任天下武勇何所不誅以天下城邑封功臣何所不服以義}
  - {type: page-break, offset: 313, content: '', id: KR3k0012_WYG_290-7b, image: WYG0895/WYG0895-0537d.png}
  - {type: variant, offset: 314, length: 0, content: '', WYG: 從思東歸之士何所不尅且三秦王為秦將將秦子弟數歲矣所殺亡不可勝計又欺其衆降諸侯}
  - {type: punctuation, offset: 315, content: ，, id: KR3k0012_CHANT_290-bkkpn78}
  - {type: 'tls:seg', offset: 315, content: '', id: KR3k0012_CHANT_290-4a.10}
  - {type: variant, offset: 315, length: 3, content: 悉發國, WYG: 新安項王詐坑秦降卒二十餘萬唯獨邯欣翳得脱章邯司馬欣董翳秦父兄怨此三人痛入骨髓今楚彊以威王此三人秦民莫愛也大王之入武關秋毫無所害除秦苛法與秦約法三章耳秦民無不欲得大王王秦者於諸侯之約大王當王關}
  - {type: page-break, offset: 315, content: '', id: KR3k0012_WYG_290-8a, image: WYG0895/WYG0895-0538a.png}
  - {type: variant, offset: 319, length: 3, content: 士馬既, WYG: 關中人咸}
