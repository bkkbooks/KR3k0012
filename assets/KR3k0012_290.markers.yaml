  - {type: variant, offset: 1901, length: 0, content: '', SBCK: 權曰老賊欲廢漢自立乆矣但忌二􅀽吕布劉表與孤耳今諸英雄已滅唯􅀌尚存􅀌與老賊勢不兩立君言當擊甚與􅀌合權抜刀斫前奏案曰諸將吏敢復言迎曹操者與此案同果有赤壁之捷焉又曰蜀大將諸葛亮悉衆十萬由斜谷出始平據武功五丈原魏大將司馬宣王帥師拒之與亮對於渭南亮分兵屯田爲乆駐之本耕者雜於渭濵而百姓安堵軍無私焉屢使交書復致巾幗婦人之飾以怒宣王王亦屢表請戰魏使衛尉辛毗持節勒懿及軍吏以下不許出戰姜維謂亮曰辛毗杖節而到賊不復出矣亮曰彼無戰心所以固請者尓惑於衆耳將在軍君命有所不受茍能制吾豈千里請戰耶宣王使二千餘人就軍營東西角大聲稱萬歳亮使問之荅曰呉朝有使至請降亮謂曰計呉朝必無降法卿是六十老翁何煩詭誑如此懿與亮相持百餘日亮卒於軍中及軍退懿追焉亮長史楊儀結陣反旗鳴鼔􅀂將向懿者懿遽退不敢逼經二日乃行其營壘曰天下竒才也懿乃追之儀多布鐵蒺藜懿使軍士二千人著軟材平厎木履前行蒺藜悉着履然馬歩徑進追至赤岸方知審問百姓爲之諺曰死諸葛走生仲逹懿􅀏曰吾便料生不便料死故也孔明料吴下降明矣司馬不料亮死暗也呉志曰魏使大司馬曹仁歩􅀐數萬向濡湏爲欲東攻羡溪朱桓分兵赴羡溪仁軍進拒濡湏桓聞追羡溪兵未到而仁奄至諸將各懼桓喻之曰凢兩軍交對勝􅀒在將不在衆寡兵法所以稱客倍而主人半者謂俱在平原無城池之守又謂士衆勇怯齊等故耳今仁旣非智勇又乆渉人馬罷困桓與諸軍共據髙城南臨大江北陪山陵以逸待勞以主制客此百戰百勝之􅀔雖曹丕自來尚不足憂況仁等耶桓}
