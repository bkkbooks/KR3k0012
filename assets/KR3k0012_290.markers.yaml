  - {type: variant, offset: 442, length: 451, content: 密軍失利密與數子登舡南濟自餘兵馬皆東走月城充乘勝長驅直至月城下密既渡南岸即策馬西上直向充本營左右麾旌相繼而至充營內見密兵來逼急連舉六烽充乃捨月城之圍收兵西退自洛北達於黑石中間四十餘里奔赴顛狽大喪師徒密之行也東北之圍不救而自解西南之寇不戰而成功充伏其權奇不復輕出又曰隋漢王諒據并州及隋將楊素率眾數萬討諒時晉絳呂三州並為諒城守素各以二千人縻之而去諒遣將趙子開擁眾十餘萬柟絕徑路屯據高壁嶺布陣五十里素令諸將以兵臨之自引兵入霍山緣崖谷而進直指其營一戰破之殺獲數萬又曰隋開皇中文帝大議伐陳諸將皆云大江闊遠兵不習水以此為疑若一登南岸秦兵一可當百襄邑公賀若弼獻十策其一事請多造舡須舡既多賊必防擬更甚今南地無馬請付傍江諸州二十歲已上老馬令飼以平陳為名賊必懼求馬擬戰密勑刺史私賣博大舡江南下濕特不宜馬不逾周年並當死盡終不為彼用陳主陳叔寶果大造舡市馬輸舡既多方覺不便而止高頴請所博得舡運諸州米貯壽陽城役徒於壽陽穿大池以魚蓮遨游為名造舡教水戰仍以賀若弼為壽州揔管終以此平陳又曰隋將軍劉方率兵討林邑國其王梵志率其徒乘巨象而戰方, SBCK: ''}
