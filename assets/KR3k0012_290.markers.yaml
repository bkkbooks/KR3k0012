  - {type: variant, offset: 1506, length: 235, content: 驚而潰唐書曰太宗屯武牢竇建德悉眾而南陳兵於汜水王充將郭士衡陣於南周亘數里鼓譟請戰諸將大懼太宗數騎升高丘安坐以望之謂諸將曰賊起山東未見大敵今度險而囂是無正令逼城而陣有輕我心我按兵不出彼迺氣衰陣久卒飢勢將自退追而擊之何往不剋吾與公等為約必以午後破之如或不然寡人為無謀矣建德乃遣兵涉汜水太宗令揔管王君廓以少擊之待河北馬渡方欲與戰建德列陣自辰至午士卒飢倦人皆坐列又爭飲水太宗乃令宇文士及將三百騎經賊陣之西馳而南上誡之曰賊若不動汝宜引歸如覺動宜出東面士及纔過賊眾果動逡巡欲退太宗曰, SBCK: 􅀔}
