  - {type: variant, offset: 91, length: 0, content: '', WYG: 擊而不知吾卒之不可以擊勝之半也知敵之可以擊知吾卒之可擊而不知刑之不可以戰勝之半也勝之半者未可知也故曰知兵者動而不迷舉而不頓將能料敵以少合衆以弱擊强兵無選鋒曰北其勢若此必走北之兵也夫料敵制勝計極險易利害逺近上將之道也知此而用戰者必勝不知此而用戰者必敗夫唯無慮而易於敵者必擒於人也已無智慮而外易人者必為人擒故䇿之而知得失之計䇿度敵情觀其所施則計數知候之而知動静之理喜怒動作察其舉止則情理可知也故知動静權變為勝刑之而知死生之地刑相敵情觀其所得而知之角之而知不足有餘之處角量也角量彼我軍馬之使則長短可知又曰兵者詭道兵無常形以詭詐為道故校之以五計而索其情一曰度二曰量三曰數四曰稱五曰勝勝敗之數用兵之法當此事稱量敵之情也地生度因地形度形勢度生量量生數知其逺近廣狹知其量數數生稱稱量敵與已稱生勝稱量人之故知其勢勝負所在也故勝兵若以鎰稱銖敗兵若以銖稱鎰輕不能相舉動也勝之戰者人也若决於千仭之谿者形也仭七尺也其勢疾也左傳曰吳子入越越子以甲楯五千保於㑹稽請行成伍員曰不可臣聞務德莫如滋去疾莫如盡違天而長讐雖悔之不可矣王不聽退而告人曰二十年之外吳其為沼乎又曰吳師在陳楚大夫皆懼子西曰二三子恤不相睦無患吳矣昔闔廬食不二味居不重席勤恤其民而與之勞逸今聞夫差次有臺榭陂池焉宿有妃嬙嬪御焉視民如讐而用之日新夫先自敗也已安能敗我又曰楚子伐鄭晉師救之楚子北師次於􅀈􅀈鄭北地􅀈音延聞晉師濟河楚子欲還伍參言於楚子曰晉之從政者新未能行令其佐先縠剛愎不仁未肯用命其三帥者專行不獲欲專其所行而不得聽而無上衆誰適從此行也晉師必敗楚改乗轅而北之次於管以待之晉師在敖鄗之間敖五勞反鄗許久反晉魏錡求公族未得欲為公族大夫而怒欲敗晉師請致師不許請使許之使所吏反遂往請戰而還趙旃求卿未得請挑戰不許請召盟許之與魏錡皆命而往郤克曰二憾往矣弗備必敗隨㑹曰若二子怒楚楚人乘我喪師無日矣乗猶登也不如備之楚之無惡除備而盟何損於好若以惡來有備不敗且雖諸侯相見軍衛不徹警也先縠不可不肯設備隨㑹使鞏朔韓穿帥七覆於敖前帥將也覆}
