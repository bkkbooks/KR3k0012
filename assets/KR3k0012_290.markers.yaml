  - {type: variant, offset: 4, length: 4, content: 機略八隋, krp: 一料敵上孫子曰用兵之道校之以五計而索其情索其勝負之情索搜索之義也曰主孰有道將孰有能道德智能主君也先當校兩囯之君主知能否也若荀息断虞公貪而好宝宫之竒懦不能強諌天地孰得視兩軍所據知誰得天時地利法令孰行設而不犯犯而必誅號出令知誰能施行也兵衆孰強士卒孰練知誰兵器強盛士卒簡練者故王子曰主不素習當陣惶惑將不素習臨陣闇変是也賞罰孰明賞善罰惡知誰分明者也賞無度則費而無恩罰無度則戮而無威吾以此知勝負矣以上七事料敵情知勝負所在敵知吾卒之可用以擊之不知敵之不可擊勝之半也知敵之可以擊而不知吾卒之不可以擊勝之半也知敵之可以擊知吾卒之可擊而不知形之不可以戰勝之半也勝之半者未可知也故曰知兵者動而不迷舉而不頓將能料敵以少合衆以弱擊強兵無選鋒曰北其勢若此必走北之兵也夫料敵制勝計極險易利害逺近上將之道也知此而用戰者必勝不知此而用戰者必敗夫唯無慮而易於敵者必擒於人也巳無智慮而外易人者必爲人擒故䇿之而知得失之計䇿度敵情觀其所施則計數知候之而知動靜之理喜怒動作察其㪯止則情理可知也故知動靜權変爲勝形之而知死生之地形相敵情觀其所得而知之角之而知不足有餘之處角量也角量彼我軍馬之使則長短可知又曰兵者詭道兵無常形以詭詐爲道故校之以五計而索其情一曰度二曰量三曰數四曰稱五曰勝勝敗之數用兵之法當此事稱量敵之情也地生度因地形度形勢度生量量生數知其逺近廣狹知其數量數生稱稱量敵与巳稱生勝稱量人之故知其勢勝負所在也故勝兵若以鎰稱銖敗兵若以銖稱鎰輕不能相㪯動也勝之戰者人也若决水於千仞之谿者形也仞七尺也其勢疾也左傳曰呉子入越越子以甲楯五千保于㑹稽請行成伍貟曰不可臣聞務德莫如滋去疾莫如盡違天而長讎雖悔之不可矣王不聽退而告人曰二十年之外呉其爲沼乎又曰呉師在陳楚大夫皆懼子西曰二三子恤不相睦無患矣昔闔廬食不貳味居不重席勤恤其民而與之勞逸今聞夫差次有臺榭陂池焉宿有妃嬙嬪御焉視民如讎而用之日新夫差先自敗也巳安能敗我者也又曰楚子伐鄭晉師救之楚子北師次于郔郔鄭北地郔音延聞晉師濟河楚子欲還伍參言於楚子曰晉之從政者新未能行令其佐先縠剛愎不仁未肯用命其三帥者專行不獲欲專其所行而不得聽而無上衆誰適從此行也晉師必敗楚改乗轅而北之次於菅以待之晉師在敖鄗之間敖五勞反鄗許各反晉魏錡求公族未得欲爲公族大夫而怒欲敗晉師請致師不許請使許之使所吏反遂往請戰而還趙旃求卿未得挑戰不許請召盟許之與魏錡皆命而往郄克曰二憾往矣弗備必敗隨㑹曰若二子怒楚楚人乗我喪師無日矣乗猶登也不如備之楚之無惡除備而盟何損於好若以惡來有備不敗且雖諸侯相見軍衛不徹警也先縠不可不肯設備隨㑹使鞏朔韓穿帥七覆于敖前帥將也覆爲伏兵七処故上軍不敗而中軍下軍皆敗績又曰呉師伐楚州來楚救之呉人禦諸鍾離楚將子瑕卒楚師熸呉楚之間謂火㓕爲熸軍之重主䘮亡故其軍人无復氣勢也熸子廉反呉將公子光曰諸侯從於楚者衆而皆小國也畏楚而不獲巳是以來吾聞之作事威尅其愛雖小必濟尅勝也軍事尚威胡沈之君㓜而狂性無常也陳大夫齧壯而頑頓與許蔡疾楚政大將死其師熸薳越爲帥帥賤多寵政令不壹越非正卿也軍多寵人政令不壹於越也七國同役而不同心七囯楚頓胡沈蔡陳許也帥賤而不能整無大威命楚可敗也先分師以犯胡沈與陳必先奔諸侯之師乃摇心矣諸侯乖亂楚必大奔請先者去備薄威示之以不整以誘之後者敦陳整旅敦厚呉子從之戰于雞父音甫吴子以罪人三千先犯胡沈與陳囚徒不習戦以示不整也三國爭之吴爲三軍以擊之其後中軍從王光帥右軍掩餘帥左軍呉之罪人或奔或止三國亂呉師擊之敗獲胡沈之君及陳大夫舎胡沈之囚使奔許與蔡頓曰吾君死矣師譟而從之三國奔三囯許蔡頓也楚師大奔也又曰晉侯將伐虢大夫士蔿曰不可虢公驕若驟得勝於我弃其民弃民不養之無衆而後伐之欲禦我誰與夫禮樂慈愛戰所蓄也夫民讓事樂和愛親哀喪而後可使也上之吏民以義譲哀樂爲本言不可以力強虢弗蓄也亟戰將飢言虢不蓄義譲而力戦也後終爲晉所滅又曰秦伯伐晉晉將趙盾禦之上軍佐臾駢曰秦不能乆請深壘固軍以待之秦人欲戰秦伯謂士㑹曰若何而戰晉士㑹奔秦對曰趙氏新出其屬曰臾駢必實爲此謀將以老我師也臾駢趙盾屬大夫新出佐上軍趙有側室曰穿晉君之壻也側室枝子有寵而弱不在軍事弱年少又未嘗渉知軍之事好勇而狂且惡臾駢之佐上軍也若使輕者隷焉其可也隷暫往而追退秦軍掩晉上軍趙穿追之不及上軍不動趙穿獨追之返怒曰裹糧坐甲固敵是求敵至不擊將何俟軍吏曰將有待也待可擊之穿曰我不知謀將獨出乃以其屬出趙盾曰秦獲穿也獲一卿矣晉自有敵位從卿者秦以勝歸我何以報乃皆出戰交綏而退司馬法日逐奔不逺從綏不及遂奔不逺則難誘從綏不及則難蹈然則古名退軍爲綏秦晉亦未能堅戰短兵未致爭而兩退故曰交綏也又曰晉師伐楚四月甲午晦楚晨壓晉軍而陣晉大夫郄至曰楚有六間古莧切其二卿相惡子重子反王卒以舊罷老不代鄭陣而不整不整列蠻軍而不陣蛮夷從楚者不結陣陣不違晦晦月終隂之盡也故兵家以爲忌在陣而囂囂譁喧也合而加囂陣合冝靖而益其声各頋其後莫有鬪心舊不必良以犯天忌我必克之終敗楚于􅋣陵史記曰龐㳙追孫臏臏量其行暮當至馬陵道狹而旁多阻險可伏兵乃大斫樹白而書之曰龐㳙死此下於是令齊軍善射者萬弩夾道而伏期曰見火起而俱發寵㳙夜至斫樹下見白書乃鑚火燭之讀書未畢齊軍萬弩俱發魏軍大亂龐㳙自知智窮兵敗乃自刎曰遂成竪子之名又曰漢王在漢中拜韓信爲大將信因問王曰今東嚮爭權天下豈非項王耶漢王曰然曰大王自料勇悍仁彊孰與項王漢王黙然良乆曰不如也信再拜賀曰惟信亦爲大王不如也然臣嘗事之請言項王之爲人也項王喑噁叱咤千人皆廢喑音隂噁烏路切叱尺栗切咤陟訝切然不能任屬賢將此特匹夫之勇耳項王見人㳟敬慈愛言語姁姁人有疾病涕泣分食飲至使人有功當封爵者刻印刓刓五元切忍不能與此所謂婦人之仁也項王雖霸天下而臣諸侯不居關中而都彭城背義帝之約而以親愛王諸侯不平諸侯之見項王遷逐義帝置江南亦皆歸逐其主而自王善地項王所過無不殘滅者天下多怨百姓不親附特劫於威彊耳名雖爲霸實失天下心故曰其彊易弱今大王誠能返其道任天下武勇何所不誅以天下城邑封功臣何所不服以義兵從思東歸之士何所不尅且三秦王爲秦將將秦子弟數嵗矣所殺亡不可勝計又欺其衆降諸侯至新安項王詐坑秦降卒二十餘萬唯獨邯欣翳得脫章邯司馬欣董翳秦父兄怨此三人痛入骨髓今楚彊以威王此三人秦民莫愛也大王之入武關秋毫無所害除秦苛法與秦約法三章耳秦民無不欲得大王王秦者於諸侯之約大王當王關中關中人咸知大王失職入漢中秦人無不恨者今大王舉而東三秦可傳檄而定也於是漢王大喜自以爲得信晚遂聽信計定秦滅項又曰項籍圍漢王於滎陽城乆之漢王患之請割滎陽以西以和項王不聽漢王謂陳平曰天下紛紛何時定乎陳平曰然項王爲人恭敬愛人士之廉節好禮者多歸之至於行賞功爵邑重之言愛惜之士亦以此不附今大王慢而少禮士廉節者不來然大王能饒人以爵邑士之頑鈍嗜利無恥者亦多歸漢王誠各去其兩短襲其兩長天下指麾可定矣又曰漢王與項籍約中分天下漢王欲西歸張良陳平說曰漢有天下太半而諸侯皆附之楚兵疲食盡此天亡之時也不因其飢而遂取之今釋不取所謂養虎自遺患也從之終滅羽漢}
