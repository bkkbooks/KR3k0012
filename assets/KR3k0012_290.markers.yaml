  - {type: variant, offset: 361, length: 3, content: 王世充, SBCK: 曹公擊馬超始賊毎一部到公輙有喜色賊破之後諸將問故公荅曰􅀜中長逺􅀂賊各依險阻征之不一二年不可定也今皆來集其衆雖多莫相歸服軍無適主一舉可滅爲功差易吾是以喜又曰後漢末青州黄巾衆百餘萬人起兖州界刺史劉岱欲擊之鮑信諌曰今賊衆百萬百姓皆震恐士卒無􅃲志不可敵也觀賊衆羣軰相隨軍無輜重唯以抄掠爲資今不􅀂蓄士衆之力先爲固守使彼欲戰不得攻則不能其􅀔必離散然後選精銳據其要害擊之可破也岱不從遂}
