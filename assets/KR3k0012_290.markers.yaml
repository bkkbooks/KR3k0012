  - {type: variant, offset: 1003, length: 273, content: 獲罪亡投化及具以告密情化及大怒其食又盡乃度永濟渠與密戰于童山之下自辰達酉密為流矢所中頓於汲縣化及掠汲郡北趣魏縣其將王智略張童仁等率所部兵歸于密者前後相繼又曰隋末楊玄感反攻東都刑部尚書衛玄感戰兵始會玄感詐令人大呼曰官軍已得玄感矣官軍稍怠玄感與數千騎乘之玄感兵於是大潰又曰隋煬帝征高麗隋將于仲文率軍從樂浪道軍次烏骨城仲文揀羸馬驢數千置於軍後既而率眾東過高麗出兵掩襲輜重仲文廻擊大破之又曰隋漢王諒作亂遣其將余公理自太行下河內隋將史祥討之軍於河陰久不得濟祥謂軍吏曰余公理輕而無謀才用素不足稱又新得志謂其眾可恃恃眾必驕且河北人先不習兵所謂擁市人而戰不足圖也, SBCK: 耳}
