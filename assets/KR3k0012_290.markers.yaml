  - {type: variant, offset: 107, length: 1, content: 上, WYG: 從卿者秦以勝歸我何以報乃皆出戰交綏而退司馬法曰逐奔不逺從綏不及逐奔不逺則難誘從綏不及則難陷然則古名退軍為綏秦晉亦未能堅戰短兵未致争而兩退故曰交綏也又曰晉師伐楚月甲午晦楚晨壓晉軍而陣晉大夫郤至曰楚有六間古莧切其二卿相惡子重子反王卒以舊罷老不代鄭陣而不整不整列蠻軍而不陣蠻軍從楚老不結陣陣不違晦晦月終陰之盡也故兵家以為忌在陣而囂囂譁喧也合而加囂陣合宜静而益其聲各顧其後莫有鬭心舊不必良以犯天忌我必克之終敗楚於鄢陵史記曰龎涓追孫臏臏量其行暮當至馬陵道狹而旁多險阻可伏兵乃斫大樹白而書之曰龎涓死此樹下於是令齊軍善射者萬弩夾道而伏期曰見火起舉而俱發龎涓夜至斫樹下見白書乃鑽火燭之讀書未畢齊軍萬弩俱發魏軍大亂龎涓自知智窮兵敗乃自刎曰遂成豎子之名又曰漢王在漢中拜韓信為}
