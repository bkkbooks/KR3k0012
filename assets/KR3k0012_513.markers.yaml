  - {type: variant, offset: 867, length: 1003, content: 至平扶持其母奔走逃難仲遺腹女始一歲平抱仲女而棄其子母欲還取之平不聽曰力不能兩活仲不可以絕類遂去不顧謝承後漢書曰魏霸字嶠卿濟陰人為鉅鹿太守與兄子同苦樂不得自異又曰許荊兄子世嘗報讎殺人怨家會眾操兵至荊家欲殺世荊始從府休歸與相遇因出門解劍長跪曰前無狀相犯咎皆在荊不能相教既兄早歿一子為嗣如令死者傷其滅絕今願殺身代世塞咎雖死以往猶謂更生怨家扶起荊曰許掾郡中稱為賢吾何敢相侵因遂委去華嶠後漢書曰薛苞弟子求出苞不敢止乃中分其財奴婢引其老者曰與我共事久若不能使也田廬取其荒頓曰吾少時所治意所戀也器物取其朽敗曰我服食久身口所安也袁山松後漢書曰范丹為萊蕪長去官於市賣卜妻紡績以自給丹弟子愷見丹藩不完載柴將客藩之時丹適行還怒勑子拔柴載以還之後漢書曰馬援字文淵扶風茂陵人也援兄子嚴敦並喜譏議而通輕俠客援前在交阯還書誡之曰吾欲汝曹聞人過失如聞父母之名耳可得聞而口不可得言也好論議人長短妄是非正法此吾所大惡甯死不願聞子孫有此行也汝曹知吾惡之甚矣所以復言者施襟結褵申父母之戒欲使汝曹不忘之耳龍伯高敦厚周慎口無擇言謙約節儉廉公有威吾愛之重之願汝曹効之杜季良豪俠好義憂人之憂樂人之樂清濁無所失父喪致客數郡畢至吾愛之重之不願汝曹効之効伯高不得猶為謹勑士所謂刻鵠不成尚類鶩也効季良不得陷為天下輕薄子所謂畫虎不成反類狗也訖今季良尚未可知郡將下車輒切齒州縣以為言吾常寒心是以不願子孫効也又曰范遷字子廬沛國人也為司徒及在公公輔有宅數畝田不過一頃復推與兄子其妻謂曰君有四子而無立錐之地可餘奉祿以為後世遷曰吾備位大臣而蓄財求利何以示後在位四年薨家無檐石焉又曰張堪字君遊南陽宛人也堪早孤讓先父餘財數百萬與兄子又曰第五倫字伯魚京兆長陵人或問倫曰公有私乎對曰吾兄子嘗疾一夜十往退而安寢吾子有疾雖不省視竟夕不眠若是者豈可謂無私乎又曰張禹字伯達父歆為淮陽相終於汲令禹性篤節儉父卒汲吏人賻送前後百萬悉無所受又以田宅推與伯父自身寄止又曰中常侍趙忠言於省內曰袁本初坐作聲價好養死士不知此兒終欲作何叔父太傅隗聞而呼紹以忠言責之紹終不改又曰戴封遭伯父喪去官又曰沮授為曹操所執授曰叔父母弟懸命袁氏若蒙公靈速死為福操歎曰孤早相得天下不足慮也遂赦而厚遇焉又曰劉矩字叔方少有高節以叔父遼未得仕進遂絕州郡之命又曰伏恭字叔齊司徒湛之兄子湛弟黯位至光祿勳無子以恭為後魏志曰荀攸字公達祖父曇攸少孤及曇卒故吏張推求守曇墓攸年十三疑之謂叔父衢曰此吏有非常之色殆將姦亂衢悟乃推問果殺人亡命因是異, SBCK: 覆}
