  - {type: variant, offset: 125, length: 597, content: 蔑者與宓子賤偕仕孔子往過孔蔑而問焉曰自汝之仁何得何亡對曰未有所得而亡者三王事若聾聾宜為襲前後相積襲也學焉得習言不得習學者是學不得明也俸祿少饘粥不及親戚是骨肉益疏也公事多急不得吊死問疾是朋友道闕也其所亡者三即此謂矣孔子不悅往過子賤問如孔蔑對曰自來仕者無亡而得者三始誦之今得而行之是學益明也俸祿所供被及親戚是骨肉益親也雖也有公事而兼以弔死問疾是朋友信篤也孔子喟然謂子賤曰君子哉若人魯無君子者斯焉取斯也漢書曰初高祖微時嘗避事時與賓客過其丘嫂食應邵曰丘氏女也孟康曰西方謂亡女壻為丘婿丘空也兄亡空有嫂也晉灼曰丘大也大嫂為家嫂也嫂厭叔與客來陽為羹盡轢釜客以故已而視釜中有羹由是怨嫂及立齊代王而伯子獨不得侯太上皇以為言高祖曰某非敢忘封之也為其母不長者封其子信為頡羹侯又曰疏廣字仲翁東海蘭陵人也宣帝時為太子太傅兄子受字公子為少傅太子每朝因進見太傅在前少傅在後叔姪並為師傅朝廷以為榮又曰王莽字巨君孝元皇后之弟子父及兄弟皆以元成世封侯輔政凡九侯五大司馬唯莽父曼早死不侯五侯子爭侈靡莽獨孤貧折節為儉受禮經勤身博學事母及寡嫂養孤兄子行甚整又外交英俊內事諸父世父鳳病莽侍疾亂髮垢面鳳且死以託太后及帝拜黃門侍郎東觀漢記曰鄭均好義篤實事寡嫂收兒恩禮甚至又曰魏譚有一孤兄子年一二歲常自養視遭饑饉分升合以相生活譚時有一女生裁數月念無穀食終不能兩全棄其女養活兄子州郡高其義又曰桓榮卒子郁當襲爵讓於兄子顯宗不許不得已受封而悉以租入與, SBCK: 褒薦}
