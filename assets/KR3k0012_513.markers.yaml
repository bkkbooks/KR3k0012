  - {type: variant, offset: 2354, length: 1019, content: 徒渾之弟也兄子濟輕之嘗詣湛見床頭有周易問曰叔父何用此為湛曰體中不佳時脫復看耳濟請言之湛因剖析玄微妙有奇趣皆所未聞也濟才氣抗邁於湛略無子姪之敬既聞其言不覺慄然心形俱肅遂留連彌日累夜自視缺然乃歎曰家有名士三十年而不知濟之罪也濟有從馬絕難乘濟問湛曰叔頗好騎不湛曰亦好之因騎此馬姿形既妙迴策如素善騎者無以過之又濟所乘馬湛愛之湛曰此馬雖快然力薄不堪苦行近見督郵馬當勝但芻秣不至耳濟試養之而與己馬等湛又曰此馬雖快任方知之平路無以別也於是當蟻封內試之濟馬果躓而郵馬如常濟益歎異還白其父曰濟始得一叔乃濟以上人也武帝亦以湛為癡每見濟輒調之曰卿家癡叔死未濟常無以荅及是帝又問如初濟曰臣叔殊不癡因稱其美帝曰誰比濟曰上比山濤不足下比魏舒有餘湛聞曰欲處我季孟間乎又曰殷浩字深源陳郡長平人也叔父融俱好老易融與浩口談論詞屈著篇則融勝浩由是為風流談論者所宗又曰鄧攸逃奔石勤以牛馬負其妻子而去擔其兒及其弟子綏度不能兩全遂棄己子卒以無嗣綏服攸喪三年又曰謝安字安石於東山營墅樓館林竹甚盛每攜中外子姪往來遊集餚饌亦屢費百金世頗以此譏焉安殊不以屑意又曰徐苗字叔胄高密淳于人也其兄弟皆早亡撫養孤遺慈聞州里田宅奴婢盡推與之又曰謝玄字幼度以勳封康樂縣公陳以先封東興侯賜兄子玩詔聽之更封玩豫甯伯又曰羅憲兄子尚字敬之少孤依叔父憲又曰劉曜逼長安涼州刺史張寔叔父西海太守肅請為先鋒擊曜曰狐死首丘心不忘本鍾儀在晉楚弁南音肅受晉寵割符列位羯逆滔天朝廷傾覆宴安方裔難至不奮何以為人臣寔曰門戶受重恩自當闔宗効死但叔父春秋已高氣力衰竭軍旅之事非耆耄所堪乃止既而聞京師陷沒肅悲憤而卒又曰慕容超字祖明德之兄北海王納之子也符堅破鄴以納為廣武太守數歲去官家於張掖德之南征留金刀而去及垂起兵山東符昌收德諸子皆誅之納母公孫氏以耄獲免納妻段氏方娠未決囚之于郡獄掾呼延評德故吏也嘗有死罪德免之至是將公孫及段氏逃于羗中而生超焉年十歲而公孫卒臨終授超以金刀曰若天下太平汝得東歸可以此刀還汝叔也何法盛晉中興書曰何充字次道道年在童齔伯父遽謂之曰我為小兒時亡伯車騎謂我汝後當與伯父爭名汝今器宇深弘亦當出我右又曰時氐賊強侵寇無已朝議求文武良將可以鎮遏比方者衛將軍謝安曰唯有兄子玄可堪此任中書郎郄超聞而歎曰安違眾舉親明也玄必不負舉才也於是徵還拜建武將軍兗州刺史領廣陵相監江北諸軍事又曰陸納字祖言為吳興太守衛將軍謝安嘗欲詣納納兄子俶怪納無供辦復不敢問乃密作數十人供安至納設茶果而已俶下精飲食客罷納大怒杖俶四十云既不能光益父叔乃復穢我素業, SBCK: ''}
  - {type: variant, offset: 2354, length: 1019, content: 徒渾之弟也兄子濟輕之嘗詣湛見床頭有周易問曰叔父何用此為湛曰體中不佳時脫復看耳濟請言之湛因剖析玄微妙有奇趣皆所未聞也濟才氣抗邁於湛略無子姪之敬既聞其言不覺慄然心形俱肅遂留連彌日累夜自視缺然乃歎曰家有名士三十年而不知濟之罪也濟有從馬絕難乘濟問湛曰叔頗好騎不湛曰亦好之因騎此馬姿形既妙迴策如素善騎者無以過之又濟所乘馬湛愛之湛曰此馬雖快然力薄不堪苦行近見督郵馬當勝但芻秣不至耳濟試養之而與己馬等湛又曰此馬雖快任方知之平路無以別也於是當蟻封內試之濟馬果躓而郵馬如常濟益歎異還白其父曰濟始得一叔乃濟以上人也武帝亦以湛為癡每見濟輒調之曰卿家癡叔死未濟常無以荅及是帝又問如初濟曰臣叔殊不癡因稱其美帝曰誰比濟曰上比山濤不足下比魏舒有餘湛聞曰欲處我季孟間乎又曰殷浩字深源陳郡長平人也叔父融俱好老易融與浩口談論詞屈著篇則融勝浩由是為風流談論者所宗又曰鄧攸逃奔石勤以牛馬負其妻子而去擔其兒及其弟子綏度不能兩全遂棄己子卒以無嗣綏服攸喪三年又曰謝安字安石於東山營墅樓館林竹甚盛每攜中外子姪往來遊集餚饌亦屢費百金世頗以此譏焉安殊不以屑意又曰徐苗字叔胄高密淳于人也其兄弟皆早亡撫養孤遺慈聞州里田宅奴婢盡推與之又曰謝玄字幼度以勳封康樂縣公陳以先封東興侯賜兄子玩詔聽之更封玩豫甯伯又曰羅憲兄子尚字敬之少孤依叔父憲又曰劉曜逼長安涼州刺史張寔叔父西海太守肅請為先鋒擊曜曰狐死首丘心不忘本鍾儀在晉楚弁南音肅受晉寵割符列位羯逆滔天朝廷傾覆宴安方裔難至不奮何以為人臣寔曰門戶受重恩自當闔宗効死但叔父春秋已高氣力衰竭軍旅之事非耆耄所堪乃止既而聞京師陷沒肅悲憤而卒又曰慕容超字祖明德之兄北海王納之子也符堅破鄴以納為廣武太守數歲去官家於張掖德之南征留金刀而去及垂起兵山東符昌收德諸子皆誅之納母公孫氏以耄獲免納妻段氏方娠未決囚之于郡獄掾呼延評德故吏也嘗有死罪德免之至是將公孫及段氏逃于羗中而生超焉年十歲而公孫卒臨終授超以金刀曰若天下太平汝得東歸可以此刀還汝叔也何法盛晉中興書曰何充字次道道年在童齔伯父遽謂之曰我為小兒時亡伯車騎謂我汝後當與伯父爭名汝今器宇深弘亦當出我右又曰時氐賊強侵寇無已朝議求文武良將可以鎮遏比方者衛將軍謝安曰唯有兄子玄可堪此任中書郎郄超聞而歎曰安違眾舉親明也玄必不負舉才也於是徵還拜建武將軍兗州刺史領廣陵相監江北諸軍事又曰陸納字祖言為吳興太守衛將軍謝安嘗欲詣納納兄子俶怪納無供辦復不敢問乃密作數十人供安至納設茶果而已俶下精飲食客罷納大怒杖俶四十云既不能光益父叔乃復穢我素業, WYG: ''}
