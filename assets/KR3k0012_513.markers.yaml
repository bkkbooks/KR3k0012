  - {type: variant, offset: 4063, length: 0, content: '', WYG: 何可載答曰從叔惟忠與孝君當不以忠孝為美約有慙色博物志曰蔡邕有書近萬卷末年載數車與王粲粲亡後粲子預魏諷反被誅邕}
  - {type: variant, offset: 4064, length: 6, content: 告嵩終不復信, WYG: 與粲書悉入粲從子景字長緒崔鴻前凉録曰范績字𢎞基績幼有名稱族叔上洛太守眺拊其首曰汝吾宗千里駒也歴仕三朝士友服其清亮舉秀才為郎中遷中都謁者族父爾雅釋親曰父之從祖昆弟為族父後漢書曰侯覇字君房河南宻人族父淵以官有才辨任職元帝世佐石顯等領中書號曰太常侍蜀志曰費褘字文偉江夏􅀈人也􅀈音盲少孤依族父伯仁伯仁姑益州牧劉璋母也晉書曰顧和字君孝侍中衆族子也曾祖容吳荆州刺史祖相臨海太守和二嵗喪父總角便有志}
