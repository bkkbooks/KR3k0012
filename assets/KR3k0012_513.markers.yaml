  - {type: variant, offset: 3960, length: 146, content: 太祖一名吉利字阿瞞少飛鷹走狗遊蕩無度其叔父數言之於嵩操患之後逢叔父於路乃陽敗面喎口叔父怪問其故太祖曰卒中惡風叔父以告嵩驚愕呼操操曰貌如故嵩曰叔父言汝中風為已差乎操曰初不中風但失愛叔父故見罔耳嵩乃疑焉後叔父有所告嵩終不復信操於是益得肆意陳留耆舊傳曰高慎字孝甫敦厚少文華有沉深之量撫育孤史子五人恩, SBCK: 魯}
