  - {type: variant, offset: 1980, length: 373, content: 人子之道莫大於寶身全行以顯父母又曰毛玠居顯位常布衣蔬食撫育兄孤子甚篤又曰張範子陵及弟子戩為山賊所得範直詣賊請二子賊以陵還範範謝曰諸君相還兒厚矣夫人情雖愛其子然吾憐戩之小請以陵易之賊義其志悉以還範又曰王基字伯與東萊曲城人也少孤與叔父翁居撫養甚篤亦以孝稱又曰高慎字孝甫敦厚少華有沉深之量撫育孤兄子五人恩義甚篤琅琊相何英嘉其履行以女妻焉蜀志曰諸葛亮初未有子求兄子喬為嗣瑾啟孫權遣喬來西亮以喬為嫡子故易其字焉拜為駙馬都尉王隱晉書曰庾袞孤兄女曰芳將嫁美服具矣袞刈荊苕為箕箒焉召諸子集之于堂男女以班而命芳曰汝芳少孤今汝適人將事舅姑洒掃庭內婦人之道也故賜汝以此匪器之美欲汝之溫恭朝夕雖休勿休也又曰魏舒容皃質朴少號遲鈍人莫之知唯叔父衡知其奇每有賓客造己常勸使過舒言吾兄子非常人也臧榮緒晉書曰阮籍隨叔父至東兗州刺史王昶聞籍奇偉請與相見乃歎息以不能測也又曰王湛字處沖, WYG: 儀同三}
