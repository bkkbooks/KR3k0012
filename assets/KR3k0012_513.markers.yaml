  - {type: variant, offset: 121, length: 0, content: '', SBCK: 之舊人曰原壤其叔母死夫子將助之以木子路曰由也昔聞諸夫子母友不如巳者過則勿憚改姑巳如何姑且巳止孔子曰凡人有䘮匍匐救之况舊故非友同志乃爲友故友非舊友吾其徃及之爲槨原壤登木曰乆矣予之不託於音也遂歌曰狸首之班然執女手之卷然夫子爲之隱陽不聞以過之子路曰夫子屈節而極於此失其舉矣豈未可巳乎孔子曰吾聞之親者未失其爲親也故者未失其故也禮記亦載稱原壤之母也蜀志曰許靖字文休汝南平輿人也靖與曹公書曰丗路威夷禍亂遂爾駑怯偷生自竄蠻貊成闊十年􅁻凶禮廢涉南海循岸渚五千餘里復遇疫疾伯母殞命并及群從自諸妻子一時略盡復相扶持前到此郡追計爲兵害及病亡者十遺一二生民之艱辛苦之甚晉書曰羅含字君章桂陽人也含㓜􅀌爲叔母朱氏所飬少有志尚晝卧夢一鳥文彩異常飛入口中因驚起􅀃之朱氏曰鳥有文彩汝後必有才章自後藻思日新又曰餘杭婦人經年荒賣其子以活夫之}
