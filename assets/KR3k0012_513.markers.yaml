  - {type: variant, offset: 3930, length: 2, content: 論弟, SBCK: 與同席而坐不與同噐而食又檀弓曰姑姉妹之薄也盖有受我而厚之者也左傳僖上曰􅀄晉獻公筮嫁伯􅁎於􅁗遇歸妹之睽史􅂫占之曰不􅁻歸妹睽􅀌冦張之弧姪其從姑六年其逋逃歸其國而棄其家明年其死於髙梁之虚震爲木離爲火火從木生離爲震妹於火爲姑謂我姪者吾謂之姑謂}
