  - {type: variant, offset: 4107, length: 138, content: 甚篤琅邪相何英嘉其履行以女妻焉又曰爰彌字伯仁年十歲叔父蘭部濟陰從事與御卒俱獵縣送酒肉彌不肯嘗問其故荅曰聞之於諸侯夫臨其事不食其食蘭然其言還而不受貞潔之質由是以彰也海內先賢傳曰故南郡太守南陽程堅體履仁孝秉志清潔少讓財兄子仕郡縣居貧無資摩鏡自給襄陽記曰龐統字士元德公從子也少未有識, SBCK: 姑}
