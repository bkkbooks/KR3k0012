  - {type: variant, offset: 4079, length: 2, content: 耆舊, WYG: 志曰阮武字文業魏末為清河太守族子籍在總角未知名武見而偉之以為勝已明於知人皆此類也姑釋名父之姊妹曰姑姑故也言於己為久故之人也廣雅曰姑謂之威威故也說文曰威姑也爾雅曰父之姊妹為姑王父之姊妹為王姑曾祖王父之姊妹為曾祖王姑髙祖王父之姊妹為髙祖王祖姑父之從父姊妹為從祖姑父之從祖姊妹為族祖姑毛詩曰泉水衛女思歸也問我諸姑遂及伯姊父之姊妹稱姑先生曰姊箋云則又問姑及姊親其類也先姑後姊尊姑也禮記曲禮曰姑姊妹女子子已嫁而返兄弟不與同席而坐不與同器而食又檀弓曰姑姊妹之薄也蓋有愛我而厚之者左傳僖上曰初晉獻公筮嫁伯姫於秦遇歸妹之暌史蘇占之曰不吉歸妹暌孤寇張之弧姪其從姑六年其逋逃歸其國而棄其家明年其死於髙梁之墟震為木離為火火從木生離為震妹於火為姑謂我姪者吾謂之姑謂子圉質於秦也漢書曰成帝班媫妤彪之姑也後漢書曰桓􅁮字文林姑為楊賜夫人父鸞卒姑赴哀将至止於傳舍整飾從者而後入􅁮心非之及姑勞問終無一言號哭而已賜遣吏祠因縣發取祠具􅁮拒不受後每至京師未甞舍楊氏晉書曰阮孚母祖姑家胡婢也父咸通之生子咸遺姑書曰不意今日遂生子姑答曰靈光殿賦云胡人遥集於上楹便可以遥集為字咸從之列女}
