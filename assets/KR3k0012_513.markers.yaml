  - {type: variant, offset: 3872, length: 0, content: '', SBCK: 子歆兄弟五人皆稚弱慿之撫飬􅀂巳所生又曰荀崧從弟馗早亡二息序廞許金切年各數􅀊崧迎與其共居恩同其子太尉臨淮公荀顓廢絶朝廷以崧属近欲以崧子襲封崧哀序􅀌微乃讓封與序論者稱焉宋書曰謝景仁陳郡陽夏人也衛將軍晦從叔父也祖據太􅀓安弟父兄宣城内史景仁􅀶聞強識玄每與之言不倦也又曰王誕字茂丗琅瑘臨沂人也少有才藻晉孝武崩從叔尚書令珣爲哀䇿文乆而未就謂誕曰猶少序節物一句因出夲示誕誕攬筆便益之接其冬秋代變後云霜繁廣除風廻髙殿珣嗟歎清㧞因而用之拜秘書郎宋齊語録曰梁特進沈約撰史王希􅡭甞問約曰從叔太常何故無傳約戯之曰賢從叔者何可載荅曰從叔唯忠與孝君當不以忠孝爲羙約有慙色􅀶物志曰蔡邕有書近萬卷末年載數車與王粲粲}
