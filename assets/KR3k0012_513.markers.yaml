  - {type: variant, offset: 4740, length: 0, content: '', WYG: 齊攻魯至郊遥見一婦攜一兒抱一兒及軍至乃棄抱者而抱攜者将欲射之遂止而問曰所抱者誰之子對曰兄之子所棄者誰之子曰己子也妾見大軍至不能兩全遂棄所生之子軍曰子之於母甚痛於心何棄所生而抱兄子對曰子之於母私愛也姪之於姑公義也夫背公而向私者妾不為也於是齊軍遂止曰魯郊有婦人猶持節行况於朝廷乎遂囬軍不伐魯君聞之賜束帛號曰義姑又曰梁宣節姑者梁之婦人也其室失火兄子與己子三人在内入取兄子輙得其子及火盛不復得入婦人将赴火其友曰本取兄子卒適得己子至於中心亦已足矣何至赴火婦曰梁國豈可以戸告人曉也被不義之名何以見弟兄吾欲復投吾子又失母子之情誓不生遂赴火而死君子曰可謂節姑也先賢行状曰蔡伯喈母袁曜卿之姑女又曰鍾元皓妻李膺之姑生子覲與膺同名太平御覽卷五百一十三}
