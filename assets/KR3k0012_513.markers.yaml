  - {type: variant, offset: 725, length: 8, content: 淳于恭養兄崇孤兒, SBCK: 皇甫謐字士安㓜名静安定朝郍人漢太尉嵩之曽孫也出後叔父徙居新安年二十不好學遊蕩無度甞得􅀲果輙進叔母任氏任氏日孝經云二牲之飬猶爲不孝汝今年餘二十目不存}
  - {type: variant, offset: 725, length: 3, content: 淳于恭, WYG: 皇甫謐字士安幼名靖安定朝那人漢太尉嵩之曾孫也後叔父徙居新安年二十不好學遊蕩無度甞得瓜果輙進叔母任氏任氏曰孝經云三牲之}
  - {type: variant, offset: 725, length: 8, content: 淳于恭養兄崇孤兒, krp: 皇甫謐字士安㓜名静安定朝郍人漢太尉嵩之曽孫也出後叔父徙居新安年二十不好學遊蕩無度甞得瓜果輙進叔母任氏任氏日孝經云二牲之飬猶爲不孝汝今年餘二十目不存}
  - {type: variant, offset: 729, length: 4, content: 兄崇孤兒, WYG: 獨為不孝汝今年餘二十目不存}
