  - {type: variant, offset: 734, length: 1, content: 誨, SBCK: 心不入道無以慰我因歎曰昔孟母三徙以成仁曽父烹豕以存教豈我居不卜鄰教有所闕何爾魯鈍之甚也修身篤}
  - {type: variant, offset: 734, length: 1, content: 誨, WYG: 心不入道無以慰我因歎曰昔孟氏三徙以成仁曾丈烹豕以為教豈我居不卜隣教有所闕何爾魯鈍之甚也脩身篤}
  - {type: variant, offset: 734, length: 1, content: 誨, krp: 心不入道無以慰我因歎曰昔孟母三徙以成仁曽父烹豕以存教豈我居不卜鄰教有所闕何爾魯鈍之甚也修身篤}
