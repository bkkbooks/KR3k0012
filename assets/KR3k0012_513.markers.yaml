  - {type: variant, offset: 4740, length: 0, content: '', SBCK: 齊攻魯至郊遥見一人携一兒抱一兒及軍至乃棄抱者而抱携者將欲射之遂止而問曰所抱者誰之子對曰兄之子所棄者誰之子日巳子也妾見大軍至不能兩全遂棄所生之子軍曰子之於母甚痛於心何棄所生而抱兄子對曰子之於母私愛也姪之於姑公義也夫背公而向私者妾不爲也於是齊軍遂止曰魯郊有婦人猶持節行况於朝廷乎遂廻軍不伐魯君聞之賜束帛號曰義姑又曰梁宣節姑者梁之婦人也其室失火兄子與巳子三人在内入取兄子輙得其子及火盛不復得入婦人將赴火其友曰夲取兄子卒誤得巳子至於中心亦巳足矣何至赴火婦曰梁國豈可以戸告人暁也􅀍不義之名何面見弟兄吾欲復投吾子又失母子之情誓不生遂赴火而死君子曰可謂節姑也先賢行狀曰蔡伯喈母􅀽曜卿之姑也又曰鍾元皓妻李膺之姑也生子覲與膺齊名太平衘覽卷第五百十三}
