  - {type: variant, offset: 3461, length: 171, content: 又曰安帝時以劉鎮之為散騎常侍光祿大夫不受鎮之毅季父也義熙初謂毅蕃曰汝輩才力勢運足以得志當身爭耳我不就汝求位求財又不受汝罪累每見毅等道從吏卒到門輒罵詬之毅甚敬畏每未至宅數百步止與白衣數人而進儀衛悉不自隨及至毅敗天下服其先見而劉裕甚敬遇之又曰燕金紫光祿大夫高平公平歆初歆伯父左光祿大夫熙拊歆首而告之曰汝儀容偉茂志節果當有佐命之功顯吾門者必汝也孫巖, SBCK: ''}
