  - {type: variant, offset: 4296, length: 441, content: 衛尉興從祖兄也少喪父母與叔父居恭謙婉順溫良節儉王莽末義兵初起乃與叔父避世蒼梧後徵拜謁者以叔父憂棄官張瑩漢南記曰北海靖王興性敦篤仁厚長有明略兄弟少為光武所撫育恩愛如子劉彥明燉煌實錄曰汜固字孔完大將軍掾純之孫也推家財百萬與寡弟婦二百萬與孤兄子於是三府競辟皆不就張騭文士傳曰桓驎字元鳳伯父焉知名官至太尉精察好學年十三四在焉坐有宿年客焉告之曰吾此弟子頗有異才今已涉獵書傳殊能作詩賦君試為口賦試與之客乃為詩曰甘羅十二楊烏九齡昔有二子今則桓生參差等蹤異世齊名驎即荅曰邈矣甘羅超等絕倫卓彼楊烏命世稱賢嗟予惷弱殊才侔年仰慚二子俯愧過言傅子曰傅爕字南容奉寡嫂甚謹食孤姪如赤子世說曰郄鑒遭永嘉喪亂窮餧鄉人共飴之公常攜兄子外甥周翼二小兒往食鄉人曰各自窮餧以君之賢共欲存君耳恐不能兼飴公於是獨往食輒含飯著兩頰還吐與二兒後鑒亡翼時為鄮莫候切縣解職歸席苫於公靈心喪三年又曰謝太傅寒雪日內集與兒女講論文義俄而雪驟公欣然曰白雪紛紛何所似兄子胡兒曰散鹽空中差可擬兄女曰未若柳絮因風起公大笑樂即公大兄弈之女左將軍王凝之, SBCK: ''}
