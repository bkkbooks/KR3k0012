  - {type: variant, offset: 48, length: 4, content: 國在遼東, SBCK: 置其中大人爲使又置文家以統}
  - {type: variant, offset: 48, length: 0, content: '', WYG: 北舊肅慎國也去洛五千里國有水闊三百餘里名速末水其地下濕無牛有車馬佃則偶耕車則步推有粟及麥穄音祭菜則有葵水氣醎凝鹽池多猪無羊嚼米為酒飲之能醉婦人則布裙男子猪犬裘婚之夕男就女家執女乳而罷便以為定仍為夫婦俗以人溺洗手面頭挿虎豹尾其父母春夏死立埋之冡上作屋不令雨濕若秋冬死以其尸哺貂食其肉多得之國南有徒太山魏言太皇有虎豹熊狼不害人其傍有大莫盧覆鍾國莫多廻國庫婁國素和國具伏弗國延犁尒國拔大何國郁羽陵國庫伏真國魯婁國羽真侯國前後各遣使朝獻北史曰勿吉}
  - {type: page-break, offset: 48, content: '', id: KR3k0012_WYG_784-6a, image: WYG0899/WYG0899-0821c.png}
  - {type: variant, offset: 48, length: 4, content: 國在遼東, krp: 置其中大人爲使又置文家以統}
  - {type: punctuation, offset: 49, content: ，, id: KR3k0012_CHANT_784-bkkpn16}
  - {type: 'tls:seg', offset: 49, content: '', id: KR3k0012_CHANT_784-2a.4}
  - {type: variant, offset: 50, length: 0, content: '', WYG: 髙句驪北一曰靺鞨邑落各自有長不相總一其人勁悍於東夷最强言語獨異常輕立莫婁等國亦患之去洛陽五千里自和龍北二百餘里有善玉山山北行十三日至祁黎山又北行七日至洛懷水水廣里餘又北行十五日至太岳魯水又東北行十八日到其國其部類凡有七種一號栗末部與髙麗接勝兵數千多驍武每冦髙麗其二曰伯咄部在栗末北勝兵七千其三曰安車骨部在伯咄東北其四曰拂湼部在伯咄東其五曰號室部在拂湼東其六曰黒水部在安車骨西北其七白山部在栗末東南勝兵並不過三千而黒水部尤為勁健自拂湼以東矢皆石鏃即古肅慎氏也東夷中為强國所居多依山水渠帥曰大莫弗瞞母官切咄國南有從太山者俗甚敬畏之人不得山上溲汙行經山者以物盛去地卑濕築土如堤鑿穴以居開口向上以梯出入其妻有外淫者人告其夫夫輒殺妻而後悔必殺告者由是奸淫事終不敢發人皆善射以射獵為業角弓長三尺箭長尺二寸常以七八月造毒藥傅矢以射禽獸中者立死煮毒藥氣亦能殺人又曰延興中勿吉國遣乙力支朝獻太和初又貢馬五百疋乙力支稱初發其國乘船溯灘可西上至上濔河沉船於水南出陸行渡洛狐水從契丹西界達和龍自云其國先破髙句驪十落宻共百濟謀從水道並力取髙麗遣乙力支奉使大國謀其可否詔書三國同是藩附宜共和順勿相侵擾乙力支乃還復自來道取得本船汎達其國隋書曰開皇初勿吉國相率遣使貢獻文帝詔其使曰朕聞彼土人勇今來實副朕懷視爾等如子爾等宜敬朕如父對曰臣等僻處一方聞内國有聖人故來朝拜既親奉聖顔願長為奴僕其國西北與契丹接每相刼掠後因其使來文帝誡之使勿相攻擊使者謝罪帝因厚勞之令宴飲於前使者與其徒皆起舞其曲折多戰鬭容帝顧謂侍臣曰天地間乃有此物常有用兵意然其國與隋懸隔唯栗末白山為近煬帝初與髙麗戰頻敗其衆渠帥突地稽率其部降拜右光禄大夫居之抑城與邊人來徃悦中國風俗請被冠帶帝嘉之賜以錦綺而褒寵之及}
