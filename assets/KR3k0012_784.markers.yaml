  - {type: variant, offset: 1641, length: 11, content: 袖衫大口袴素皮帶黃革履, SBCK: 漢南史曰漢國在文身國東五千餘里無兵戈不戰代鳯俗並與文貞國同而言語異流求隂書曰流求國居海島之間當見建安郡東水行五日而至閩川之東也􅁟多出銅其王性􅂬斯名渴刺兠不知其由來有國代數也彼􅁟人呼之爲可老羊妻曰多快茶所居曰波羅檀洞壍柵三重環以流水樹􅁄爲藩王所居舎其十人十六門彫刻禽獸多闘鏤樹以橘而葉􅁡條纎如髮紛然下垂國有四五師統諸洞洞有小王徃徃有村村有鳥了帥並以善戰者爲之自相樹立理一村之事男女皆以白紵纒髮從頭盤繞}
