  - {type: variant, offset: 12, length: 0, content: '', krp: 東沃沮人性質直強勇便持矛歩戰魏志曰東沃沮在}
  - {type: variant, offset: 15, length: 5, content: 國節於飲食, SBCK: 盖馬大山之東濵大海}
  - {type: variant, offset: 15, length: 0, content: '', WYG: 葢馬太山之東濵大海而居無大君王世世有邑落其言語與句驪大同時時小異漢初燕亡人衞滿王朝鮮時沃沮皆屬焉元封二年伐朝鮮分其地為四郡以沃沮為𤣥莵郡後為夷貊所侵還屬樂浪今諸邑落渠帥稱三老臣句驪置其中大人為使又置大加以統之稅其貊布食物美女婢妾其土肥美背山向海宜五穀人性質直少牛馬便持刀矛其}
  - {type: page-break, offset: 15, content: '', id: KR3k0012_WYG_784-2a, image: WYG0899/WYG0899-0819c.png}
  - {type: variant, offset: 15, length: 5, content: 國節於飲食, krp: 盖馬大山之東濵大海}
  - {type: punctuation, offset: 16, content: ，, id: KR3k0012_CHANT_784-bkkpn5}
  - {type: 'tls:seg', offset: 16, content: '', id: KR3k0012_CHANT_784-1a.5}
  - {type: variant, offset: 16, length: 1, content: 節, WYG: 俗制度大較似句驪其嫁娶之法女年十歲已相許男家迎之長養以為婦至成人更還女家責錢畢乃復還男其葬送法治大木槨長十餘丈開一頭作户新死者皆假埋之須肌肉盡取骨置槨中舉家皆共一槨刻木如生隨死者為數又為瓦鬲置米其中編懸之}
  - {type: page-break, offset: 16, content: '', id: KR3k0012_WYG_784-2b, image: WYG0899/WYG0899-0819d.png}
  - {type: variant, offset: 18, length: 0, content: '', WYG: 槨户邊後漢書曰北沃沮人言海中有女國無男人或傳其國有神井闚之輒生子云魏志曰北沃沮一名置溝婁去南沃沮八百里其俗南北皆同與挹婁接喜乘船冦抄沃沮畏之夏月恒在山巖深穴中為守備冬月氷凍船道不通乃下居村落其耆老言國人嘗乘船捕魚遭風見吹數十日東得一島其上有人言語不可曉其俗常以七月取童女沉海又言一國亦在海中純女無男又得一布衣其兩袖長二丈又得一破船在岸邊有一人項中復有面與言不相曉不食而死肅慎書曰成王既伐東夷肅慎來賀海東諸夷武王克商皆通道焉成王即政而叛王征服之故肅慎相來賀王俾榮伯作賄肅慎之命王使榮伯為命書以幣賄賜肅慎之夷王後漢書曰挹婁又肅慎之國也在夫餘東北千餘里東濱大海南與北沃沮接不知其北所極土地多山險車馬不通人形似夫餘而言各有異有五穀麻布出赤玉好貂所謂挹婁貂是無君長其邑各有大人處於山林之間土氣極寒常為穴居以深為貴大家至接九梯好養豕食其肉衣皮冬以豕膏塗身厚數分以禦風寒夏則倮以尺布蔽其前後其人臭穢不潔作厠於中圍而居之自漢興以後臣屬夫餘種衆雖少而多勇力處山險又善射發能入人目弓長四尺力加弩矢用楛長一尺八寸青石為鏃鏃皆施毒中人即死便乘船好冦盗隣國畏患而卒不能伏東夷夫餘}
  - {type: page-break, offset: 18, content: '', id: KR3k0012_WYG_784-3a, image: WYG0899/WYG0899-0820a.png}
