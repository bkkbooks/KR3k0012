  - {type: variant, offset: 53, length: 0, content: '', WYG: 役突地稽率其徒以從每有戰功賞賜甚厚扶桑國南史曰扶桑國者齊永元元年其國有沙門慧深來至荆州說云扶桑在大漢國東二萬餘里地在中國之東其土多扶桑木故以為名扶桑葉似桐初生如笋國人食之實如梨而赤績其皮為布以為衣亦以為錦作板屋無城郭有文字以扶桑皮為紙無兵甲不攻戰其國法有南北獄若有犯輕罪者入南獄重罪者入北獄有赦則放南獄不赦北獄在北獄者男女相配生男八歲為奴生女九歲為婢犯罪之身至死不出貴人有罪國人大㑹坐罪人於坑對之宴飲分訣若死别焉以灰繞之其一重則身屏退二重則及子孫三重者則及七世名國王為乙祁貴人第一者對盧第二者小對盧第三為納咄沙國主行有鼓角導從其衣色隨年改易甲乙年青丙丁年赤戊巳年黄庚辛年白壬癸年黒有牛角甚長以角載物至勝二十斛有馬車牛車鹿車國人養鹿如中國畜牛以乳為酪有赤梨經年不壞多蒲桃其地無鐵有銅不貴金銀市無租估其婚姻法婿往女家門外作屋晨夕洒掃經年而女不悦即駈之相悅乃成婚大抵與中國同親喪七日不食祖父母喪五日不食兄弟伯叔姑姊妹三日不食設坐為神像朝夕拜奠不制衰絰嗣王立三年不親國事其俗舊無佛法宋大明二年罽賔國常有比丘五人游行其國始通佛法經教焉女國南史曰沙門惠深云女國在扶桑}
