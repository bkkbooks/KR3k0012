  - {type: variant, offset: 36, length: 3, content: 女群聚, WYG: 子不哭哭者謂之不壯相盗贓物無多少盡誅殺之雖野處並不相犯死者即日便葬於野交木作小槨殺猪積槨上富至數百貧者數十以}
  - {type: variant, offset: 40, length: 2, content: 倡樂, WYG: 死者之糧以土覆之以繩繫於槨頭出土上以酒灌醉終繩腐而止無時祭祀也其檀弓三尺五寸括矢長尺有咫石砮皮骨甲石山在國東北取之必先祈神石利入鐵勿吉後}
  - {type: page-break, offset: 40, content: '', id: KR3k0012_WYG_784-5b, image: WYG0899/WYG0899-0821b.png}
