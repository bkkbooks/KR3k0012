  - {type: variant, offset: 1208, length: 249, content: 至舊夫餘人戶三倍於前魏時後貢使相尋歲致黃金二百斤白銀四百斤又曰後魏文明太后以獻文六宮未備勑璉令薦其女璉奉表云女己以出求以弟女應旨朝廷許焉會獻文崩乃止又曰後魏太和十五年璉死其孫雲立復賜以衣冠服物車旗之飾自比歲常貢獻至大統十年其王成遣使至西魏朝貢及齊受東魏之襌又朝于齊文宣加成使持節侍中驃騎大將軍高麗王如故又曰北齊天保三年文宣至營州使愽陵崔柳使于高麗永魏末流人勑柳曰若不從者以便宜從事及至不見許柳張目叱之拳擊成墜於床下成左右雀息不敢動乃謝服柳以五千戶反命又曰高句驪東至新羅西度遼二千里南接百濟北鄰靺鞨一, SBCK: 七}
