  - {type: variant, offset: 845, length: 362, content: 界築小城受之遂名此城為憤溝婁者句麗城名也又曰公孫度之雄海東也高句麗伯固與之通好伯固死伊夷摸五伊夷摸數寇遼東建安中公孫康出軍擊之大破其國焚燒邑落伊夷摸更作新國於九都山下又曰高句麗伊夷摸死其子位宮立始位宮曾祖宮生而目開能視國人惡之及長凶虐國以破殘及位宮生亦能視人高麗呼相似為位以為似其曾祖宮故名位宮亦有勇力便鞭馬善射獵魏正始中位宮寇西安平五年幽州刺史母丘儉將萬人出玄菟討位宮大戰於沸流敗走儉追至頳峴懸車束馬登丸都山屠其所都位宮單將妻子遠竄六年儉復討之位宮輕將諸加奔伏沷沮儉使將軍王頎追之絕沷沮千餘里到肅慎南界刻石紀功又刊丸都山銘不耐城而還又曰後魏太武帝時高麗王釗曾孫璉始遣使者詣安東奉表貢方物并請國諱太武嘉其誠款詔下帝系名諱於其國使員外散騎侍郎李敖拜璉為都督遼海諸軍事高句麗王敖至其所居平壤城訪其事云去遼東一千餘里至柵城南至小海, SBCK: ''}
