  - {type: variant, offset: 240, length: 0, content: '', krp: 年十歲已相許男}
  - {type: variant, offset: 241, length: 0, content: '', SBCK: 迎之長飬以爲婦至成人更還女家責錢畢乃復還男其葬送之法大木槨長十餘丈開一頭作户新死皆假埋之湏肌肉盡聚置槨中舉家皆共一槨刻木如生隨死者爲數又爲瓦鬲置米其中編懸之於槨户邊後漢書曰北沃沮人言海中有女國無男人或傳其國有神并闚之輒生子云魏志曰北沃沮一名置溝婁去南沃沮八百里其俗南北皆同與挹婁接喜乗舩㓂抄沃沮畏之夏日垣在山上長深穴中爲守備冬月冰凍舩道不通乃下居村落其耆老言國人嘗乗舩捕魚遭風見吹數十日東得一島其上有人言語不可暁其俗常以七月取童女沈海又言一國亦在海中純女無男又得一布衣其兩䄂長二文又得一破舡在岸邊有一人項中復有面與語不相暁不食而死肅慎書曰成王旣伐東夷肅慎來賀海東諸夷武王克商皆通道焉成王即政而叛王服而服之故肅慎相來賀王俾榮伯作賄肅慎之命王使筞伯為命書以弊賄賜肅慎之夷亡後漢書曰挹婁古肅慎之國也在夫餘東北千餘里東濵大海南與北沃沮接不知其北所極土地多山險車馬不通人形似夫餘而言各異有五穀麻布出赤玉好貂所謂挹婁貂是無君長其邑各有大人處於山林之間土氣極寒常爲穴居以深爲貴大家至接九梯好飬豕食其肉衣皮冬以豕膏塗身厚數分以禦風寒夏則祼以尺布蔽其前後其人臭􅁾不㓗作厠於中圜之而居自漢興己後臣屬夫餘種衆雖少而多勇力處山嶮又善射發能入人自弓長四尺力如弩矢用楛長一尺八寸青石爲鏃鏇皆施毒中人即死便乗舡好㓂盗隣國畏患而卒不能服東夷夫餘飲食􅀋此皆用爼豆唯挹婁獨無法俗最無綱紀魏志所載同山海經曰不咸出在肅慎國有樹名雄先人代帝於此􅂑依其谷無衣中國有聖帝代立者則此木皮可衣家語曰孔子在陳惠公賔之於上館時有隼集於陳侯之庭而死楛矢貫之石砮楛木名砮箭鏃其長尺有咫惠公使以隼如孔子之館問焉子曰隼之來逺矣此肅慎氏之矢也事具慱物部肅愼國記曰肅慎氏其地在夫餘國北可六十日行東濵大海夏則巢居冬則穴處父子丗爲君長無文墨以言語爲約其畜有馬猪牛羊不知乗馬以爲財産而己猪放山谷中食其肉㘴其皮績猪毛以爲布無井竃人作瓦鬲四五􅂛以食㘴則箕踞足􅃑肉而啖之得凍肉㘴其上令煥土地無塩燒木作􅁅灌取汁食之俗皆編髮以布作褡俓尺餘以蔽前嫁娶之法男以毛羽挿女頭女和則持歸然後致禮娉之婦貞而女􅁋貴壯賤老寡居終身不嫁性凶悍以無憂喪相尚父母死男子不哭哭者謂之不壯相盗贓物無多少盡誅殺之雖野處而不相犯死者即日便葬於野交木}
