  - {type: variant, offset: 26, length: 2, content: 俗淫, krp: 言語與句麗大同時時小異漢𥘉燕亡人衛滿王朝鮮時沃沮}
  - {type: variant, offset: 27, length: 0, content: '', WYG: 無衣中國有聖帝代立者則此木皮可衣家語曰孔子在陳惠公賔之於上館時有隼集陳侯之庭而死楛矢貫之石弩楛木名砮箭鏃其長尺有咫惠公使以隼如孔子之館問焉子曰隼之來逺矣此肅慎氏之矢也肅慎國記曰肅慎氏其地在夫餘國北可六十日行東濵大海夏則巢居冬則穴處父子世為君長無文墨以言語為約其畜有馬猪牛羊不知乘馬以為財産而已猪放山谷中食其肉坐其皮績猪毛以為布無井竈人作瓦鬲畜四升以食坐則箕踞足挾肉而啖之得凍肉坐其上令煖土地無鹽燒木作灰灌取汁食之俗皆編髪以布作格􅀈徑尺餘以蔽前嫁娶之法男以毛羽挿女頭女和則持歸然後致禮聘之婦貞而女}
  - {type: page-break, offset: 27, content: '', id: KR3k0012_WYG_784-4b, image: WYG0899/WYG0899-0820d.png}
  - {type: page-break, offset: 27, content: '', id: KR3k0012_WYG_784-5a, image: WYG0899/WYG0899-0821a.png}
