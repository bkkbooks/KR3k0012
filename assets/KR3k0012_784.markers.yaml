  - {type: variant, offset: 20, length: 5, content: 而好治宮室, WYG: 類此皆用爼豆唯挹婁獨無法俗最無綱紀魏志所載同山海經曰不咸山在肅慎國有樹名雄先入代帝於此取衣}
  - {type: variant, offset: 21, length: 4, content: 好治宮室, SBCK: 居無大君王丗丗有邑長}
