  - {type: variant, offset: 750, length: 1, content: 時, krp: 里有善玉山山北行十三日至祁黎山又北行七日至洛懷水水廣里餘又北行十五日至太岳魯水又東北行十八日到其國其部類凡有七種一號栗末部與髙麗接勝兵數千多驍武毎㓂高麗其二曰伯咄部在栗末北勝兵七千其三日安車骨部在伯咄東北其四曰拂涅部在伯咄東其五曰號室部在拂涅東其六曰黒水部在安車骨西比其七曰山部在栗末東南勝兵並不過三千而黒水部尤爲勁徤自拂涅以東矢皆石鏃即古肅慎氏也東夷中爲強國所居多依山水渠帥曰大莫弗瞞母官切咄國南有從太山者俗甚敬畏之人不得山上溲汙行經山者以物盛去地卑濕築土如堤鑿穴以居開口向上以梯出入}
