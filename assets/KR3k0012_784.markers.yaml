  - {type: 'tls:seg', offset: 751, content: '', id: KR3k0012_CHANT_784-4a.5}
  - {type: variant, offset: 753, length: 0, content: '', SBCK: 有外􅁋者人告其夫夫輒殺妻而後悔必殺告者由是姧􅁋事終不敢發人皆善射以射獵爲業角弓長三尺箭長尺二寸常以七八月造毒藥􅀓矢以射禽獸中者立死煑毒藥氣亦能殺人又曰延興中勿吉國遣乙力支朝獻大和􅀄又貢馬五百疋乙力支稱􅀄發其國乗舡溯難可西上至太沵河沉舩於水南出陸行度洛􅀌水從契丹西界逹和龍自云其國先破髙句麗十落密共百濟謀從水道并力取髙麗遣乙力支奉使大國謀其可否詔勑三國同是藩附冝共和順勿相侵擾乙力乃還從其來道取得夲舡汎逹其國隋書曰開皇􅀄勿􅁻國相率遣使貢獻文帝詔其使曰朕聞彼土人勇今來實副朕}
  - {type: variant, offset: 753, length: 0, content: '', krp: 有外淫者人告其夫夫輒殺妻而後悔必殺告者由是姧淫事終不敢發人皆善射以射獵爲業角弓長三尺箭長尺二寸常以七八月造毒藥傳矢以射禽獸中者立死煑毒藥氣亦能殺人又曰延興中勿吉國遣乙力支朝獻大和𥘉又貢馬五百疋乙力支稱𥘉發其國乗舡溯難可西上至太沵河沉舩於水南出陸行度洛孤水從契丹西界逹和龍自云其國先破髙句麗十落密共百濟謀從水道并力取髙麗遣乙力支奉使大國謀其可否詔勑三國同是藩附冝共和順勿相侵擾乙力乃還從其來道取得夲舡汎逹其國隋書曰開皇𥘉勿吉國相率遣使貢獻文帝詔其使曰朕聞彼土人勇今來實副朕}
  - {type: variant, offset: 754, length: 4, content: 孕朱蒙逃, SBCK: 視尓等如子尓等冝敬朕如父對曰臣䓁僻處一方聞内國有聖人故來朝拜旣親奉聖顔願長爲奴僕其國西北與契丹接每相刼掠後因其使來文帝誡之使勿相攻擊使者謝罪帝因厚勞之令宴飲於前使者與其徒皆起舞其曲折多戰闘容上頋謂侍臣曰天地間乃有此物常得用兵意然其國與隋懸隔唯栗末白山爲近焬帝􅀄與髙麗戰頻敗其衆渠師突地稽率其部降拜右光禄大夫居之栁城與邊人來徃恱中國風俗請􅀍冠帶帝嘉之賜以錦綺而褒寵之及遼東之役突地稽率其徒以從每有戰功賞賜甚厚扶桒國南史曰扶桒國者齊永平元年其國有渉門慧深來至荆州􅀃云扶桒在大漢國東二萬餘里地在中國之東其土多扶桒木故以爲名扶桒葉似桐初生如笋國人食之實如梨而赤績其皮爲布以爲衣亦以爲錦作板屋無城郭有文字以扶桒皮爲紙無兵甲不攻戰其國法有南北獄􅀂有犯輕罪者入南獄重罪者入北獄有赦則放南獄不赦北獄在北獄者男女相配生男八歳爲奴生女九􅀊爲婢犯罪之身至死不出貴人有罪國人大㑹坐罪人於坑對之宴飲分訣􅀂死别焉以􅁅繞之其一重則一身屏退二重則及子孫三重者則及七丗名國王爲乙祁貴人第一者對盧第二者小對盧第三爲納咄沙國主行有鼓角導從其衣色隨年改易甲乙年青景丁年赤戊巳年黄庚辛年白壬癸年黒有牛角甚長以角載物至勝二十斛有馬車牛車鹿車國人飬鹿如中國畜牛以乳爲酪有赤梨經年不壞多蒲桃其地無鐵有銅不貴金銀市無租估其婚姻法壻徃女家門外竹屋晨夕灑掃經年而女不恱即駈之相恱乃成婚婚禮大抵與中國同親喪也日不食祖父母喪五日不食兄弟伯叔姑姉妹三日不食設坐爲神像朝夕拜奠不制衰絰嗣王立三年不親國事其俗舊無佛法宋大明二年􅄢賔國常有比丘五人游行其國始佛法經教焉女國南史曰沙門惠深云女國在扶桒東千餘其人容白端正色甚潔白身體存毛髮長委地至二三月􅔡入水妊娠六七月産子女人胷前無乳項}
