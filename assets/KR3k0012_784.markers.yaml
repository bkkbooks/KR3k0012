  - {type: 'tls:seg', offset: 28, content: '', id: KR3k0012_CHANT_784-1a.8}
  - {type: variant, offset: 28, length: 7, content: 皆潔淨自喜夜輒, WYG: 貴壯賤老寡居終身不嫁性凶悍以無憂喪相尚父母死}
  - {type: variant, offset: 29, length: 12, content: 潔淨自喜夜輒男女群聚為倡, SBCK: 屬焉元封二年伐朝鮮分其地爲四郡以沃沮爲玄莵郡後爲夷貊所侵還屬}
  - {type: page-break, offset: 29, content: '', id: KR3k0012_SBCK_784-1b}
  - {type: variant, offset: 29, length: 12, content: 潔淨自喜夜輒男女群聚為倡, krp: 屬焉元封二年伐朝鮮分其地爲四郡以沃沮爲玄莵郡後爲夷貊所侵還屬}
