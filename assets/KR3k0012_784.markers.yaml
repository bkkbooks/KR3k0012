  - {type: variant, offset: 3274, length: 236, content: 六軍以會之夏四月李勣軍渡遼進攻蓋牟城拔之以其城置蓋州五月渡遼水詔徹橋梁以堅士卒志帝既至遼東城下見七卒負檐以填壍者帝分其尤重者於馬上載之從官悚動爭齎以送城下高麗聞我有拋車飛三百斤石於一里之外者甚懼之乃於城上積木為戰樓以拒飛石勣列車發石以擊其城所遇盡潰又推撞車撞其樓閣無不傾倒拔其城為遼州初帝自定州命每十里置一烽屬于遼城與太子約剋遼東當舉烽是日帝命舉烽師次白崖城右衛太將軍李思摩中弩矢帝親為吮血將士聞之莫不感勵城主孫戊音遂乞降以其城置巖州授伐音為刺史我軍之渡遼也莫離支遣加戶城, SBCK: 覽卷第}
