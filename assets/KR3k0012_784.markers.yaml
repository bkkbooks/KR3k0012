  - {type: variant, offset: 3758, length: 385, content: 千人並遣集沒為將分賞將士太宗愍其父母妻子一朝分散令有司准其直以布帛贖之赦為百姓其眾歡叫之聲三日不息又曰貞觀二十年高麗遣使來謝罪并獻二美女太宗謂其使曰歸謂爾主美色者人之所重爾之所獻信為美麗憫其離父母兄弟於本國留其身而忘其親愛其色而傷其心我不取也並還之又曰乾封元年高麗遣其子入朝陪位於太山之下其年蓋蘇文死其子男生代為莫離支與弟建不睦為其所逐走據國內城使其子獻城詣闕求哀十一月命英國公李勣率郭侍封等以征之二年二月勣至新城謂諸將曰新城是高麗西境鎮城最為要害若不先圖餘未易可下遂引兵於城西南據山築柵且攻且守城中窘急數有降者自此所向克捷高藏及男建將首領九十八人持帛幡出降請使入朝勣以禮延接男建猶𨳲門固守十一月拔平壤城虜高藏男建等至京師獻俘于含元宮乃分其地置都督府九州四十二縣一百又置安東都護府以統之擢其酋渠有功者授都督刺史及縣令與華人參理仍遣左武衛將軍薛仁貴揔兵鎮之自是高氏君長遂絕, SBCK: ''}
