  - {type: variant, offset: 2318, length: 649, content: 置官有對盧則不置沛者有沛者則不置對盧焉晉安帝義熙九年高翼奉表獻赭白馬宋元嘉十五年馮弘為魏所攻敗奔高麗北豐城表求迎接文帝遣使王白駒趙次興迎之并令高麗資遣璉不欲弘南乃遣將孫漱高仇等襲殺之白駒等率所領七千餘人生擒漱殺仇等二人十六年文帝欲侵魏詔璉獻馬八百疋大明二年又獻肅慎矢及楛矢石砮歷齊梁並授爵位遣使奉表獻方物不絕唐書曰高麗者出自扶餘之別種其國都於平壤城即漢樂浪郡之故地在京師東五千一百里其官大者號大對盧比一品揔知國事三年一代若稱職者不拘年限交替之日或不相祗服皆勒兵相攻勝者為之其王但閉宮自守不能制禦次曰太大兄比正二品對盧以下官揔十二級外置州縣六十餘城大城置傉薩一人比都督諸城置道使比刺史其下各有僚佐分掌曹事衣裳服食唯王五綵以白羅為冠白皮小帶其冠及帶咸以金飾官之貴者則青羅為冠次以緋羅插二鳥羽及金銀為飾衫簡袖袴大口白韋帶黃革履國人衣褐戴弁婦人首加巾幗好圍碁投壺之戲人能蹴鞠食用籩豆簠簋罇俎罍洗頗有箕子之遺風其所居必依山谷皆以茅草葺舍唯佛寺神廟及王宮官府乃用瓦其俗貧窶者多冬月皆作長坑下燃火熅以取煖種田養蚕略同中國城東有大穴名隧神皆以十月王自祭之俗愛書籍至於衡門廝養之家各於街衢造大屋謂之局堂子弟未婚之前晝夜於此讀書習射又曰武德二年高麗王建武遣使來朝四年又遣使朝貢高祖感隋末戰士多陷其地五年賜建書云在此所有高麗人等已令追括尋即遣送彼處有此國人者立可放還務盡綏育之方共弘仁恕之道於是建武悉搜括華人以禮賓送前後至者萬數高祖大喜七年遣使往冊建武為上柱國遼東郡王高麗王仍將天尊像及道士彼為之講老子其王及道俗等觀聽者, SBCK: 男女}
  - {type: variant, offset: 2318, length: 649, content: 置官有對盧則不置沛者有沛者則不置對盧焉晉安帝義熙九年高翼奉表獻赭白馬宋元嘉十五年馮弘為魏所攻敗奔高麗北豐城表求迎接文帝遣使王白駒趙次興迎之并令高麗資遣璉不欲弘南乃遣將孫漱高仇等襲殺之白駒等率所領七千餘人生擒漱殺仇等二人十六年文帝欲侵魏詔璉獻馬八百疋大明二年又獻肅慎矢及楛矢石砮歷齊梁並授爵位遣使奉表獻方物不絕唐書曰高麗者出自扶餘之別種其國都於平壤城即漢樂浪郡之故地在京師東五千一百里其官大者號大對盧比一品揔知國事三年一代若稱職者不拘年限交替之日或不相祗服皆勒兵相攻勝者為之其王但閉宮自守不能制禦次曰太大兄比正二品對盧以下官揔十二級外置州縣六十餘城大城置傉薩一人比都督諸城置道使比刺史其下各有僚佐分掌曹事衣裳服食唯王五綵以白羅為冠白皮小帶其冠及帶咸以金飾官之貴者則青羅為冠次以緋羅插二鳥羽及金銀為飾衫簡袖袴大口白韋帶黃革履國人衣褐戴弁婦人首加巾幗好圍碁投壺之戲人能蹴鞠食用籩豆簠簋罇俎罍洗頗有箕子之遺風其所居必依山谷皆以茅草葺舍唯佛寺神廟及王宮官府乃用瓦其俗貧窶者多冬月皆作長坑下燃火熅以取煖種田養蚕略同中國城東有大穴名隧神皆以十月王自祭之俗愛書籍至於衡門廝養之家各於街衢造大屋謂之局堂子弟未婚之前晝夜於此讀書習射又曰武德二年高麗王建武遣使來朝四年又遣使朝貢高祖感隋末戰士多陷其地五年賜建書云在此所有高麗人等已令追括尋即遣送彼處有此國人者立可放還務盡綏育之方共弘仁恕之道於是建武悉搜括華人以禮賓送前後至者萬數高祖大喜七年遣使往冊建武為上柱國遼東郡王高麗王仍將天尊像及道士彼為之講老子其王及道俗等觀聽者, WYG: 男女}
