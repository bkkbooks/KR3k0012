  - {type: variant, offset: 11, length: 1, content: 牛, WYG: 重有憂者而曰然昔吾舅死扵虎吾夫又死焉今吾子又死焉夫子曰何為不去曰無苛政子曰小子識之苛政猛扵虎也左傳宣四年曰若敖娶扵䢵生鬭伯比若敖卒従其母畜扵䢵淫扵䢵子之女生子文焉䢵夫人使棄諸夢中虎乳之䢵子田見之懼而歸夫人以吿遂使收之楚人謂乳榖謂虎為於莬故命之曰鬭糓於莬春秋考異郵曰三九二十七七者陽氣成故虎七月而生陽立扵七故虎首尾長七尺般般文者隂陽雜也春秋演孔圖曰天命蕩白虎戯朝其終白虎在野爾雅曰甝白虎虪黑虎漢書曰猛虎之猶與不如蜂蠆之致螫又曰武帝元狩中南郡獲白虎以為寳又曰李廣北平郡出獵見草中石以為虎而射之中石没羽視之石也明日射之終不能入矣又司馬遷書猛虎處深山百獸震恐及在穽檻之中揺尾而求食積威約之漸也又曰李敢子禹有寵扵太子禹有勇上召禹使刺虎懸下圏中未至地有詔引出之禹以劍斫絶纍欲刺虎上壯之赦焉後漢書曰劉昆字桓公光武時為𢎞農太守先是崤黽驛道多虎災行旅不通昆為政三年仁孝大行虎皆負子渡河帝聞而異之後徴為光禄勲詔問昆曰前在江陵返風滅火後守𢎞農虎北渡河行何德政而致是事昆對曰偶然耳左右皆笑其質訥帝歎曰此乃長者之言也又曰宋均遷九江太守郡多虎異數為人患常募設檻穽而猶多傷害均到下記屬縣曰夫虎豹在山黿鼉在水各有所托且江淮之有猛獸猶北土之有雞豚也今為人害咎在殘吏而勞勤張捕非憂恤之本也其務退奸貪思進忠善可}
