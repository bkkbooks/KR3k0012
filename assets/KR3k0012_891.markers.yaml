  - {type: variant, offset: 2675, length: 9, content: 莊周婦死而歌夫通性, SBCK: 猛虎不處卑勢鷙鳥不立垂枝也西京􅄂記曰李廣與兄弟獵於􅁳山之北見卧虎焉射一矢斃斷其髑髏以爲枕示服猛也鑄銅象其形爲溲器示厭服之也又曰余所知有鞠道龍善爲幻術甞向余􅀃曰東海人黃公少時爲幻􅁗末有白虎見東海詔遣黃公以赤刀徃厭之術旣不行遂爲虎所殺三輔人俗用以爲戲漢朝亦取之爲角抵戲焉王子年拾遺録曰始皇二年謇㳙國􅀞工者名烈􅒨刻白王兩虎削玉爲毛有如眞矣不􅀧兩目睛始皇使餘工夜徃􅀧之爲睛旦徃虎即飛去明年南郡有獻白虎二頭始皇使視之乃是先刻玉始皇}
