  - {type: variant, offset: 2685, length: 282, content: 者以卑及尊死生不悼不可論也夫象見子皮無遠近必泣周何忍哉愽物志曰南海四象各有雌雄其一雌死百有餘日其雄泥土著身獨不飲酒食肉長吏問其所以輒流涕若有哀狀晉諸公讚曰晉時南越致馴象於皋澤中養之為作車黃門鼓吹數十人令越人騎之每正朝大會皆入充庭帝行則以象車導引以試橋梁後象以鼻擊害人有司啟之而殺象象泣血流地不敢動自後朝議以象無益於事悉送還越萬震南洲曰南傳曰扶南王善射獵每乘象三百頭從者四五千人異物志曰俗傳象牙歲脫猶愛惜之掘地而藏之人欲取當作假牙潛往易之覺則不藏沈懷遠南越志曰象牙長一丈餘脫其牙則深藏之削木代之可得不爾窮其主得乃已也異苑曰會稽張茂字偉康嘗夢大象以問萬推推曰當為太守而, SBCK: 去目睛二虎}
