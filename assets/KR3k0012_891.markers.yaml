  - {type: variant, offset: 13, length: 1, content: 角, SBCK: 去㩜穽除削課制其後傳言虎相與東遊渡江又曰法雄爲南郡太守郡濵帶江􅃆又有雲夢藪澤雲夢澤今在安州永􅀄中多虎狼之暴前太守賞募張捕反爲所害者甚衆雄乃移書屬縣曰凡虎狼之在山林猶人之居城市}
  - {type: variant, offset: 13, length: 1, content: 角, WYG: 去檻穽除削課制其後傳言虎相與東游渡江又曰法雄為南郡太守郡濱帶江沔又有雲夢藪澤其中多虎狼之暴前太守賞募張捕反為所害者甚衆雄乃移書屬縣曰凡虎狼之在山林猶人之居城市}
