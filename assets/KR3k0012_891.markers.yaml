  - {type: variant, offset: 811, length: 0, content: '', WYG: 寅日稱虞吏者虎也又曰蔡誕入山還家云被謫到崑崙山下白虎委蛇長百餘里其口中牙皆如三百斛虹大風俗通曰虎者陽物百獸之長也能噬食鬼魅今}
