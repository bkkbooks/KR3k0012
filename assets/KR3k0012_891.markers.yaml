  - {type: variant, offset: 11, length: 1, content: 牛, SBCK: 重有憂者而曰然昔吾舅死於虎吾夫又死焉今吾子又死焉夫子曰何爲不去曰無苛政子曰小子識之苛政猛於虎也左傳宣四年曰若敖娶於䢵生􅃲伯比若敖卒從其母畜於䢵淫於䢵子之女生子文焉䢵夫人使弃諸夢中夢澤虎乳之䢵子田見之懼而歸夫人以告告女私通所生遂使收之楚人謂乳爲榖謂虎爲於莬故命之曰􅃲榖於莬春秋考異郵曰三九二十七七者陽氣成故虎七月而生陽立於七故虎首尾長七尺般般文者隂陽􅄂也春秋演孔圖曰天命湯白虎戲朝其終白虎在野爾雅曰甝白虎漢宣帝時南郡􅀗白儵虎獻其皮骨爪牙也虎里虎虪音叔甝胡甘切漢書曰猛虎之猶與不如蜂蠆之致蠚又曰宣帝元狩南郡獲白虎以爲寳又曰李廣北平郡出獵見草中石以爲虎而射之中石没羽視之石也明日射之終不能入矣又曰馬遷書曰猛虎在山中百獸震恐及陷檻穽揺尾而求食積威納之漸也又曰李敢子禹有寵於太子禹有勇上召禹使刾虎懸下圏中未至地有詔引出之禹以劒斫絶纍欲刾虎上壯之遂放焉後漢書曰劉昆字桓公光武時爲􅀪農太守先是崤澠驛道多虎灾行旅不通昆爲政三年仁化大行虎皆􅀒子渡河帝聞而異之後徴爲光禄勲詔問昆曰前在江陵返風滅火後守􅀪農虎北渡河行何徳政而致是事昆對曰偶然耳左右皆􅀏其質訥帝歎曰此乃長者之言也顧命書諸䇿又曰宋均遷九江太守郡多虎􅁀數爲人患常募設㩜穽而猶多傷害㩜爲機以捕獸穽謂穿地䧟之均到下記屬縣曰夫虎豹在山黿鼉在水各有所託且江淮之有猛獸猶北土之有雞豚也今爲人害咎在殘吏而勞勤張捕非憂恤之夲也其務退姧貪思進忠善可}
