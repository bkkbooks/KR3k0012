  - {type: variant, offset: 1375, length: 1268, content: 不得是楊吾君之恥也君其必速殺之勿令遠聞君忸怩顏厚乃趣赦之戰國策曰楚王遊於雲夢結駟千乘旌旗蔽日野火之起若雲霓兕虎之聲若雷霆有狂兕王彎弓而射發而殪笑曰樂矣今日之遊千秋萬歲之後誰與樂此楚辭曰君王親發兮發射憚青兕憚驚也言懷王是時親自射以言嘗從君田獵今狩驚有兕牛而不能制也呂氏春秋曰楚莊王時獵雲夢欲射殺隨兕者申公子培刦音劫王奪而射之王怒曰何其暴而不敬也欲誅之左右諫乃止不出三日子培病亡楚與晉戰於兩棠之地大勝賞有功者子培之弟請曰人有功於軍旅臣之兄有功於車下臣兄常讀故記曰殺隨兕者不出三日故臣兄刦而殺之果有病死王乃撿故記果有之遂賞子培弟也淮南子曰小國不鬥於大國之間畏見嫌也兩虎不鬥於伏兕之旁畏見食也論衡曰尚父伐紂渡孟津杖鉞呼曰蒼兕蒼兕按蒼兕水獸也善覆舟因令急渡蒼兕害汝河中有此獸時浮出一身九首人惡畏之未必能覆舟也亦謂之蒼雉西都賦曰狂兕觸蹶江賦曰水兕雷咆乎陽侯曹洪與魏文帝書曰若奔兕之觸魯縞未足以喻其易晉郭璞山海圖贊曰兕惟壯獸似牛青黑力無不傾自焚以革皮充武備角助文德象春秋運斗樞曰搖光之星散而為象爾雅曰南方之美有梁山之犀象焉說文曰象長鼻牙南越之大獸三歲一乳左傳襄四曰象有齒以焚其身賄也又定上曰吳伐楚鍼尹固與王同舟王使執燧象以奔吳師繞火燧繫象尾使赴吳師漢書大宛傳曰身毒國其人乘象以戰漢書曰武帝元始二年南越獻馴象注曰能拜隨人意吳志曰外國傳曰扶南王盤況少而雄傑聞山林有大象輒生捕取之教習乘諸國聞而伏之又曰賀齊為新都太守孫權出祖道作樂儛象吳書曰權謂齊曰今定天下都中國使殊俗貢珍狡獸率儛非君而誰也三國典略曰周軍逼江陵梁人率步騎開枇杷門出戰初嶺南獻二象于梁至是梁王被之以甲負之以樓束刃於鼻令崑崙馭之以戰楊忠射之二象反走隋書曰劉方授驩州道行軍惣管經略林邑大業元年正月軍至海口林邑王梵志遣兵守險方擊走之師次闍梨江賊據南岸立柵方盛陳旗幟擊金鼓懼而潰既渡江行三十里賊乘巨象四面而至以弩射象象中瘡卻蹂其陣王師力戰賊奔於柵因攻破之俘賊馘萬計唐書曰自永徽已來文單國累獻馴象凡三十有二皆豢於禁中頗有善舞者以備元會充庭之飾及德宗即位曰王者不尚異物不貴難得之貨今官用費而物性不得非宜也悉放於荊山之陽又曰高宗時周澄國遣使上表云訶伽國有白象首垂四牙身運五足象之所在其土必豐既有威靈又弭災患力兼十象強制百人以水洗牙飲之愈疾請發兵迎取以獻之上謂侍臣曰夫作法於儉其弊猶奢誰能制止故聖人越席以昭儉茅茨以誡奢書云珍禽奇獸不育於國方知無益之源不可不遏朕安用奇象令其遠獻乃勞其使而遣之山海經曰巴蛇食象三歲而出其骨帝王世紀曰舜葬蒼梧下有群象常為之耕又云禹葬會稽祠下有群象耕田萬歲曆曰成帝咸康六年臨邑王獻象一知跪拜文子云見象之牙知大於牛呂氏春秋曰肉之美者髦象之約高誘注曰髦象肉之美者吳錄地理經曰九真郡龐縣多象象生山中郡內及日南饒之江表傳曰孫權遣使詣闕獻馴象二頭魏太祖欲知其斤重咸莫能出其理時鄧王冲尚幼乃曰置象大舡刻其所至稱物以載之可知也太祖大悅即施行焉又曰魏文帝遣使於吳求象牙群臣以非禮欲不與孫權勑付使者論衡曰象耕鳥耘虛言也五帝三王皆有功德何獨為舜禹也蒼梧多象之地會稽眾鳥所居象自蹈土鳥自食草土蹶草盡若耕耘, WYG: ''}
