  - {type: variant, offset: 8, length: 2, content: 獬豸, SBCK: 虎山獸之君也春秋運斗樞曰樞星散而爲虎易履卦曰履虎尾不咥人亨又頥卦曰虎視耽耽其欲逐逐易革卦九五象曰大人虎變其文炳也易通卦驗曰立秋虎始嘯月令曰仲冬虎始交禮記曰孔子過太山側有婦人􅂘於墓者而哀夫子式而聽之使子貢問之曰子之哭也一}
  - {type: variant, offset: 8, length: 2, content: 獬豸, WYG: 虎山獸之君也春秋運斗樞曰樞星散為虎易履卦履虎尾不咥人亨頤卦虎視耽耽其欲逐逐易革卦九五象曰大人虎變其文炳也易通卦騐曰立秋虎始嘯月令曰仲冬虎始交禮記曰孔子過太山側有婦人哭於墓者而哀夫子式而聽之使子貢問之曰子之哭也一}
