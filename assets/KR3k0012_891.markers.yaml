  - {type: variant, offset: 2918, length: 373, content: 丈餘脫其牙則深藏之削木代之可得不爾窮其主得乃已也異苑曰會稽張茂字偉康嘗夢大象以問萬推推曰當為太守而不能善夫象者大獸取諸其音獸者守也象以齒焚其身後必為人所殺茂永昌中為吳興太守值王敦問鼎執正不移敦遣沈充滅之而取其郡萬震南州異物志曰象之為獸形體特詭身倍數牛目不逾狶鼻為口役望頭若尾馴良承教聽言則跪素牙玉潔載籍所美服重致遠行如丘徙王韶之始興記曰伊水口有長洲洲廣十里平林蔚然有群象野牛法顯記曰藍國王得佛一分舍利起塔塔傍有池池中有龍常守護有群象以鼻取水雜香花而來供養後魏書曰乾陁國好征戰有鬥象七百頭十人乘一象皆執兵仗象鼻持刀嶺表錄異曰廣之屬郡潮循州多野象潮循人或捕得象爭食其鼻云肥脆尤堪作炙或云象肉有十二種象膽不附肝隨月轉在諸肉楚越之間象皆青黑唯西方佛林大食多白象又雲南豪族家多畜象負重致遠若中國之牛馬漢使至其國輒舞象飾以金羈皆合節奏乾符中占城獻馴象亦能蹈舞, WYG: ''}
