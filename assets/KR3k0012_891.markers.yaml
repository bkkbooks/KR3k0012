  - {type: variant, offset: 20, length: 0, content: '', krp: 其諱故或謂之於䖘於音今江南山夷呼虎爲䖘自関東西或謂之伯都也風俗通曰呼虎爲李耳俗說虎夲南郡中廬李氏公所化爲呼李耳因喜呼班便怒龍魚河圖曰懸文虎鼻門上冝官子孫帶印綬懸虎鼻門中周一年取燒作屑與婦飲之二月中便有兒生貴子勿令人知之泄則}
