  - {type: variant, offset: 347, length: 1, content: 丈, WYG: 世祖遣鄧禹西征送之扵道既返因扵野田獵路見二老翁即禽世祖問曰禽何向並舉首西指言此中多虎臣毎即禽虎亦即臣大}
  - {type: variant, offset: 347, length: 1, content: 丈, krp: 秦召公子無忌無忌不行使朱亥奉璧一雙秦}
