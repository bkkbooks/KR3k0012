  - {type: variant, offset: 2661, length: 113, content: 越童所鉤無便故也蔣子萬機論曰莊周婦死而歌夫通性命者以卑及尊死生不悼不可論也夫象見子皮無遠近必泣周何忍哉愽物志曰南海四象各有雌雄其一雌死百有餘日其雄泥土著身獨不飲酒食肉長吏問其所以輒流涕若有哀狀晉諸公讚曰晉時南越致馴象於皋澤中養, WYG: 戲漢朝亦取}
