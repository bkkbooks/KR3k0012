  - {type: variant, offset: 819, length: 342, content: 犀木覺後年輒復解山海經曰琴鼓之山多白犀蜀王本紀曰江水為害蜀守李冰作石犀五枚二枚在府中一在市南下二在淵中以厭水精因曰石犀里也林邑國記曰犀行過叢林不通便開口露齒前向直指棘林自開南州異物志曰犀如象大色黑頭似豪婦豬食草木也南越志曰高州平之縣巨海有大犀其出入有光水為之開劉欣期交州記曰有犀角通天向水輒開萬震南州異物志曰犀有特神者角有光曜白日視之如角夜暗之中理皆燦然光由中出望如火炬欲知此角神異置之草野飛鳥走獸過皆驚昔行野中見一死人鳶烏欲往啄之每至其頭輒驚走飛去怪而視之其頭中有犀簪近此角也劉欣期交州記曰犀出九德縣其毛如豕蹄有三甲頭如馬有三角鼻上角長額上角短晉郭璞犀贊曰犀之為狀形兼牛豕力無不傾呴無不靡以賄嬰災困乎角掎傳咸犀鉤銘曰世稱雞駭之犀有以此鉤見遺者為之銘獸曰玄犀處自林麓食唯棘刺體兼五肉或, WYG: 時}
