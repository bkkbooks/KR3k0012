  - {type: variant, offset: 498, length: 170, content: 章帝元和元年日南獻白雉白犀晉書曰溫嶠還武昌至牛渚磯云其水多怪物遂燖犀角而照之見奇形異狀或朱衣乘車馬嶠夢人曰與君幽明道別何苦相照書紀年曰夷王獵于杜林得一犀牛韓詩外傳曰太史南官括至義渠得駭雞犀以獻紂戰國策曰張儀為秦破從連橫說楚王楚遣車百乘獻駭雞之犀夜光之璧於秦王離騷曰淹芳芷於腐臭淹潰腐臭棄駭雞於筐竹器也范子計然曰犀角出南郡上價八千中三千下一千, SBCK: 虵不可使爲足虎不可使縁木}
