  - {type: variant, offset: 16, length: 3, content: 決訟命, SBCK: 至化之代猛獸不擾皆由恩信寛澤仁及飛走太守雖不德敢忘其義記到其毀壞㩜穽不得妄捕山林是後虎害稍息人以獲安在郡數歳歲常豐稔又曰童恢字漢宗爲不其令户人甞爲虎所害乃設檻捕之生獲二虎恢呪虎曰天生萬物唯人爲貴虎狼當食六畜而殘暴於人王法殺人者死傷人則論法若是殺人者當垂頭服罪自知非者當號呼稱􅁈一虎低頭閉目狀如震懼即時殺之一乃踊躍自奮遂放之謝承後漢書曰豫章劉陵字孟髙爲長沙安成長先時多虎百姓患之皆從他縣陵之官脩德政踰月虎悉岀界去民皆還漢皇德傳曰丗祖遣鄧禹西征送之於道旣返因於野王獵路見二老翁即禽丗祖問曰禽何向並舉首西指言此中多虎臣每即禽虎亦即臣大王勿徃也方言曰虎陳魏宋楚之間或謂之李父江淮南楚之間謂之李耳虎食物值耳即止以}
  - {type: page-break, offset: 16, content: '', id: KR3k0012_SBCK_891-3a}
