  - {type: variant, offset: 26, length: 0, content: '', krp: 之間謂之牒易曰𥘉六剥牀以足篾貞凶象曰剥牀以足以㓕下也六二剥牀以辨篾貞凶象曰剥牀以辨未有與也六四剥牀以膚凶象曰剥牀以膚切近災也又曰巽在牀下象曰巽在牀下上窮也詩曰乃生男子載寢之牀禮曰曽子寢疾樂正子春坐於牀下曽元曽申坐於足童子隅坐而執燭童子曰華而睆大夫之簀與華盖也簀牀第也曽子曰然斯季孫之賜也我未之能易也元起易簀命元起也曽元曰夫子之病革音棘矣不可以變幸而至於旦請敬易之曽子曰尔之愛我也不如彼君子之愛人也以徳細人之愛人也以姑息吾何求哉吾得正而斃焉斯巳矣舉扶而易之反席未安而没左傳曰齊無知弑其君殺孟陽于牀注云陽小臣代公居牀事具逐門又曰楚子圍宋宋人懼使華元夜入楚師登子反之牀曰寡君使元以病告又曰夏子庾卒楚子使薳子慿爲令尹訪於申叔䂊叔䂊曰國多寵而王弱國不可爲也遂以疾辭方暑掘地下冰而牀焉重繭衣裘鮮食而寢楚子使醫視之復曰瘠則甚矣而血氣未動乃使子南爲令尹周禮曰玉府掌王之袵席牀第國語曰}
  - {type: variant, offset: 27, length: 1, content: 世, SBCK: 獻公寢而不寐郤叔虎曰牀第之不安耶驪􅁎之不側耶戰國䇿曰孟嘗君至楚獻象牀郢之登徒直送之不欲行見孟嘗君門人公孫戍曰象牀之直千金傷此若髪標賣妻息不足以償足下能使僕無行先人有寳劒願獻之戍曰諾范曄後漢書曰􅀽術僣號人情離叛欲北至青州曹操使劉備邀之至江寕坐簀牀而歎曰􅀽術乃至於此乎歐血而死又曰向栩性卓詭常於竈北坐板牀上如是績乆板乃有膝踝足指之處又曰羊茂自季寳爲東郡太守冬日坐百羊皮夏月坐一榆木板牀􅂼食出界買塩䜴食之又曰薛淳爲漢中太守夏但坐板牀不設席冬坐羊皮河内高弘爲琅瑘相亦然也魏志曰陳登字元龍許汜與劉備並在荊州牧劉表坐汜曰陳元龍河海之士豪氣不除備問汜君言豪有事耶汜曰昔遭亂過下邳見元龍元龍無主客之意不相與}
  - {type: page-break, offset: 27, content: '', id: KR3k0012_SBCK_706-2b}
  - {type: variant, offset: 27, length: 0, content: '', WYG: 獻公寢而不寐郤叔虎曰牀第之不安邪驪姬之不在側邪戰國策曰孟嘗君至楚獻象牀郢之登徒直送之不欲行見孟嘗君門人公孫戌曰象牀之直千金傷此若髪標賣妻息不足以償足下能使僕無行先人有寶劒願獻之戌曰諾范瞱後漢書曰袁術僭號人情離叛欲北至青州曹操使劉備邀之至江寧坐簀牀而歎曰袁術乃至於此乎歐血而死又曰向栩性卓詭常於竈北坐板牀上如是積久板乃有膝踝足指之處又曰羊茂字季寶為東郡太守冬日坐百羊皮夏月坐一榆木板牀蔬食出界買鹽䜴食之又曰薛淳為漢中太守夏但坐板牀不設席冬坐羊皮河内髙𢎞為瑯琊相亦然也魏志曰陳登字元龍許汜與劉備並在荆州牧劉表坐汜曰陳元龍河海之士豪氣不除備問汜君言豪有事耶汜曰昔遭亂過下邳見元龍元龍無主客之意不相與語自上牀卧使客卧下牀備曰君有國士之名今天下大亂帝王失所望君憂國忘家有濟}
