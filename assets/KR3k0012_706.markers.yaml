  - {type: variant, offset: 29, length: 0, content: '', SBCK: 自上床卧使客卧下床備曰君有國士之名今天下大亂帝王失所望君憂國忘家有濟丗之意而君求田問舎言無所采是元龍所諱何縁當與君語如小人欲卧百尺樓上卧君於地下何但上下􅇃之間耶表大􅀏晉書}
