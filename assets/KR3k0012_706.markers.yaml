  - {type: variant, offset: 254, length: 3, content: 素簏中, SBCK: 常侍登床莊子曰驪􅁎之父封人之子晉國之始得也曰涕泣沾衿及其與同匡床食芻養而後悔其涕泣也啇君書曰明者無所不見人主處匡床之上而天下治論衡曰孔子將死遺祕書曰不知何一男子自謂􅁗始皇上我堂踞我床丗夲曰紂爲玉床南方志曰南方老人以􅀛支床及老人亡舁牀􅀛尚活天文集曰紫宫門外}
