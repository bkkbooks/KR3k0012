  - {type: variant, offset: 192, length: 3, content: 短青黑, WYG: 便絶榖設小牀常獨坐不與人共又曰太尉郄鑒使人求女壻於王導導令就東廂遍觀諸子使者歸謂鑒曰王氏諸少年並佳然見問咸自矜持唯一人在東牀坦腹而食獨若不聞鑒曰正此佳耳訪之乃逸少也以女妻之又曰桓𤣥從荆州下都簒位所坐御牀忽陷殷仲文進曰將由聖徳淵重厚地不能載𤣥大恱燕書曰公孫鳳隠於昌黎九城寢於土牀也沈約宋書曰武帝初開國有司奏東西堂施局脚牀銀塗釘上不許使用直脚牀釘用鐡又曰江湛為元兇劭所害初湛家數見怪異未敗之日所眠牀忽有數斗血又曰王微不仕元兇之變微尋書玩古遂至足不履地終日端坐皆生埃唯當坐處獨淨又曰羊戎好為雙聲江夏王義恭嘗設齋使戎布牀須臾王出以牀狹乃自臨牀戎曰官家恨狹更廣七寸王笑曰卿豈惟善雙聲乃辨士也又曰張敷為中書舎人狄當周赳並管要務以敷同省名家欲詣之赳曰彼若不相容接便不如不往詎可輕行當曰吾等並已員外郎矣何憂不得共坐敷先方設二牀去壁三四尺二客就席數呼左右曰移我逺客赳等失}
