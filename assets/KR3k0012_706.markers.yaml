  - {type: variant, offset: 244, length: 0, content: '', SBCK: 紀僧眞幸於武帝稍歷軍校容表有士風謂帝曰臣小人出自本縣武史遭逢聖時陛勞至此爲兒婚得荀昭先女即時無復所湏唯就陛下乞作士大夫帝曰江斆謝􅊪音藥我不得歷此意可自詣之僧眞承旨斆登榻坐定斆便命左右曰移吾牀讓客僧眞䘮氣而退之又曰虞愿除後軍將軍褚彦回詣愿不在見其眠床上積塵埃有書數卷彦回歎曰虞君之清乃至於此令人掃地拂床而去又曰竟陵}
