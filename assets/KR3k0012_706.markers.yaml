  - {type: variant, offset: 379, length: 1, content: 張, SBCK: 徐稺字􅐐子豫章人陳蕃爲太守不接賔客唯稺來特設一榻去則懸之又曰周璆字孟玉陳蕃爲太守璆來置一榻去則懸之也蜀志曰簡雍性簡傲佚蕩自諸􅁑亮以下則獨擅一榻湏枕卧語無所爲屈呉志曰周瑜薦魯肅孫權引肅合榻對飲言議宋議書曰當陽侯劉彦節旣貴士子自非三署不得上方榻時以此少之又曰顔延之爲祕書􅁥光禄勲太常時沙門釋惠林以才學爲文帝所賞朝廷政事多與之謀遂士庻歸仰上毎引見常􅂛獨榻延之甚嫉焉因醉曰昔子同􅆖乗表絲正色此三台之座豈可使刑餘居之上變色又曰王瞻字明逺一字叔鸞􅀒氣慠俗好貶裁人物仕宋爲王府叅軍常詣劉彦節直登榻曰君侯是公孫僕是公子引滿促膝唯余二人彦節外雖酬之意甚不恱齊書曰孔休源字慶緒􅀶學爲晉}
