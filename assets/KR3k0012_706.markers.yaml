  - {type: variant, offset: 292, length: 1, content: 齒, WYG: 明先生别傳曰明生隨神女還岱宗石室中金牀玉几西京雜記曰武帝為七寶牀雜寶屏風八寶帳設於宫中時人謂為寶宫又曰昭陽殿設玉牀又曰韓嫣以玳瑁為牀拾遺記曰董偃常卧延清之室畫石為牀石文如畫體甚輕出郅支國上設紫瑠璃帳火齊屏風又曰石季倫屑沈水香如塵末而置象牀上使所愛者踐之無跡則賜眞珠百琲百琲珠百枚若有跡者則節其飲食令體弱故閨中相戲曰爾非細骨輕軀那得百琲眞珠又曰頻斯國有楓林林東有大石室可容萬人坐壁上刻為三皇之像天皇十三頭地皇十一頭人皇九頭皆龍身亦有膏燭之䖏緝石為牀牀上有膝痕深二三寸衡山記曰仙人室中有黄玉床盛𢎞之荆州記曰長沙郡有賈誼所穿井旁局脚石牀一牀可容人坐其形古制云誼所坐牀也西征記曰金郷焦氏山北有漢司𨽻校尉曽峻塜前有石牀長八尺瑩摩鮮明叩之即鳴時太尉從事中郎傅珍之諮議叅軍周安穆折石牀各取一頭為曽氏之後所訟鄴中記曰石虎御牀殿方三丈餘其牀皆局脚髙下六尺後宫别房中有小形玉牀又有轉關牀射鳥獸異物志曰獸麡賫柴二音狼形如麋而角向前入林則得之角正四據人因以作踞牀異苑曰沙門支法存有八尺沈香板牀刺史王淡息切求不與遂殺而籍焉籍没也後息疾法存出為祟世說曰袁紹年少時曽夜以劒遣人擲魏武小下不着帝揆其後必髙因帖臥牀劒至果髙語林曰簡文為撫軍時所坐牀上塵不聽左右拂見鼠行跡視以為佳雜五行}
