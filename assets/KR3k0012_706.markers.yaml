  - {type: variant, offset: 251, length: 2, content: 家止, SBCK: 上不盡其義終不肯食又曰西域􅀛兹等國其王坐金牀隨太歳轉與妻並坐接客後魏書曰魏収讀書夏月坐板床隨樹隂諷誦積年牀版爲之銳减而精力不輟又曰韓務除龍驤將軍郢州刺史獻七寳牀象牙席唐書曰貞觀十八年召三品巳上賜宴於玄武門太宗操筆作飛白書羣臣乗醉就太宗手中相競散􅀐常侍劉洎登御牀引手然後得之其不得者咸稱洎登床罪當死請付法太宗􅀏曰昔聞婕妤辭輦今}
