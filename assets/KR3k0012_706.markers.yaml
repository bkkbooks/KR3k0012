  - {type: variant, offset: 290, length: 1, content: 漆, krp: 素栢局脚床七具漢武帝内傳曰武帝受西王母眞刑六甲雲飛十二事帝盛以黄金封以白玉凾珊瑚爲床紫錦爲帷安着柏梁臺上皇甫謐髙士傳曰老萊子隱蒙山之陽支木爲床神仙傳曰衛叔卿入華山有紫雲鬰鬰白玉爲床眞人周君傳曰周義山字季通令㑹仙人在金屋太室以彩玉爲牀}
  - {type: variant, offset: 292, length: 1, content: 齒, SBCK: 明先生別􅀓曰明生隨神女還岱宗石室中金床玉几西京雜說曰武帝爲七寳床雜寳屏風別寳帳設於柱宫中時人謂爲寳宫又曰昭陽殿設玉牀又曰韓嫣以玳瑁爲床拾遺録曰董偃常卧延清之室􅀞石爲床石文如􅀞體甚輕出郅支國上設紫瑠璃帳火齊屏風又曰石季倫屑沉水之香如塵沬布置象床上使所愛者踐之無跡則賜眞珠百琲珠百枚曰琲若有跡者則節其飲食令體弱故閨中相戯曰尓非細骨輕軀那得百琲眞珠又曰頻斯國有楓林林東有大石室可容萬人坐壁上尅爲三皇之像天皇十二頭地皇一十一頭人皇九頭皆龍身亦有膏燭之處緝石爲床床上有􅂰痕深二三寸衡山記曰仙人室中有黄玉牀盛弘之荊州記曰長沙郡有賈􅁩所穿井旁局脚石床一床可容一人坐其形古制傳云􅁩所坐床也西征記曰金郷焦氏山北有漢司􅈻校尉曽峻塚前有石床長八尺瑩摩鮮明叩之即鳴時太尉從事中郎􅀓珎之諮議叅軍周室穆折石床各取一頭爲曽氏之後所訟鄴中記曰石虎御床辟方三丈其餘床皆局脚髙下六寸後宫别坊中有小形玉床又有轉􅀜牀射鳥獸異物志曰麡賫柴二音狼狀如麋而角向前入林則得之角正四據人因以作踞牀異苑曰沙門支法存有八尺沉香板床刺史王淡息切求不與遂殺而籍焉籍没也後息疾法存岀爲崇也丗說曰􅀽紹年少時曽夜以劒遣人擲魏武小下不着帝揆其後必髙因帖卧床劒至果髙語林曰簡文爲撫軍時所坐床上塵不聽左右拂見鼠行跡視以爲佳雜五行}
