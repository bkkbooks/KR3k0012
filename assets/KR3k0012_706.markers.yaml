  - {type: variant, offset: 192, length: 3, content: 短青黑, SBCK: 便絶榖設小床常獨坐不與人共又曰太尉郄鑒使人求女􅡾於王導問令就東廂遍觀諸子使者歸謂鑒曰王氏諸少年並佳然聞信至咸自矜持唯一人在東牀坦腹而食獨若不聞鑒曰正此佳􅡾訪之乃逸少也遂以女妻之又曰桓􅀇從荆州下都篡位所坐御牀忽䧟殷仲文進曰將由聖德淵重厚地不能載􅀇大恱燕書曰公孫鳯隱於昌􅀺九城寢於土牀也沈約宋書曰武帝􅀄開國有司奏東西堂施局脚床銀塗釘上不許使用直脚床釘用鐵也又曰江湛爲元􅇯劭所害􅀄湛家數見怪異未敗之日所眠床忽有數斗血又曰王微不仕元􅇯之變微尋書玩古遂至足不履地終日端坐床皆生埃唯當坐處獨浄又曰羊戎好爲􅀟聲江夏王義恭嘗設齊使戎布牀湏􅁷王岀以牀狹乃自開牀戎曰官家恨狹更廣七寸王􅀏曰卿豈唯善􅀟聲乃辨士也又曰張敷爲中書舎人狄當周赳善管要務以敷同省名家欲詣之赳曰彼若不相容接便不如不往詎可輕行當日吾等並巳貟外郎矣何憂不得共坐敷先設二床去壁三四尺二客就席數呼左右曰移我逺客赳等失}
