  - {type: variant, offset: 245, length: 2, content: 敦害, SBCK: 子良爲㑹稽郡閤下有虞翻舊床罷任還乃致以歸後於西邸起古齊多聚古人器服以充之又曰少帝夜醉蕭坦之與曹道挾抱還延昌殿置玳􅈘牀上梁書曰侯景旣篡位聞義師轉近猜忌弥深床前蘭錡自遶然後見客又曰長沙王㦤孫植性恬静獨處一室牀有􅂰痕宗室衣冠莫不堦則又曰兼弘性奢侈侍妾百餘人不勝金翠服翫車馬皆一時之絶有眠床一張皆是蹙栢四靣}
