  - {type: variant, offset: 26, length: 0, content: '', SBCK: 之間謂之牒易曰􅀄六剥牀以足篾貞凶象曰剥牀以足以㓕下也六二剥牀以辨篾貞凶象曰剥牀以辨未有與也六四剥牀以膚凶象曰剥牀以膚切近災也又曰巽在牀下象曰巽在牀下上窮也詩曰乃生男子載寢之牀禮曰曽子寢疾樂正子春坐於牀下曽元曽申坐於足童子隅坐而執燭童子曰華而睆大夫之簀與華盖也簀牀第也曽子曰然斯季孫之賜也我未之能易也元起易簀命元起也曽元曰夫子之病革音􅁄矣不可以變幸而至於旦請敬易之曽子曰尔之愛我也不如彼君子之愛人也以徳細人之愛人也以姑息吾何求哉吾得正而斃焉斯巳矣舉扶而易之反席未安而没左傳曰齊無知弑其君殺孟陽于牀注云陽小臣代公居牀事具逐門又曰楚子圍宋宋人懼使華元夜入楚師登子反之牀曰寡君使元以病告又曰夏子􅁃卒楚子使薳子慿爲令尹訪於申叔䂊叔䂊曰國多寵而王弱國不可爲也遂以疾辭方暑掘地下冰而牀焉重繭衣裘鮮食而寢楚子使醫視之復曰􅇤則甚矣而血氣未動乃使子南爲令尹周禮曰玉府掌王之袵席牀第國語曰}
  - {type: page-break, offset: 26, content: '', id: KR3k0012_SBCK_706-1b}
  - {type: page-break, offset: 26, content: '', id: KR3k0012_SBCK_706-2a}
  - {type: variant, offset: 26, length: 0, content: '', WYG: 之間謂之牒易曰初六剥牀以足蔑貞凶象曰剥牀以足以滅下也六二剥牀以辨蔑貞凶象曰剥牀以辨未有與也六四剥牀以膚凶象曰剥牀以膚切近災也又曰巽在牀下象曰巽在牀下上窮也詩曰乃生男子載寢之牀禮曰曽子寢疾樂正子春坐於牀下曽元曽申坐於足童子隅坐而執燭童子曰華而睆大夫之簀與華美也簀牀第也曽子曰然斯季孫之賜也我未之能易也元起易簀命元起也曽元曰夫子之病革音棘矣不可以變幸而至於旦請敬易之曽子曰爾之愛我也不如彼君子之愛人也以徳細人之愛人也以姑息吾何求哉吾得正而斃焉斯已矣舉扶而易之反席未安而沒左傳曰齊無知弑其君殺孟陽于牀注云陽小臣代公居牀又曰楚子圍宋宋大懼使華元夜入楚師登子反之牀曰寡君使元以病告又曰夏子庾卒楚子使薳子慿為令尹訪於申叔豫叔豫曰國多寵而王弱國不可為也遂以疾辭方暑掘地下氷而牀焉重繭衣裘鮮食而寢楚子使醫視之復曰瘠則甚矣而血氣未動乃使子南為令尹周禮曰王府掌王之衽席牀第國語曰}
  - {type: page-break, offset: 26, content: '', id: KR3k0012_WYG_706-2a, image: WYG0899/WYG0899-0293a.png}
  - {type: page-break, offset: 26, content: '', id: KR3k0012_WYG_706-2b, image: WYG0899/WYG0899-0293b.png}
