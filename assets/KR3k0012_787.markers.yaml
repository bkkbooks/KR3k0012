  - {type: variant, offset: 2694, length: 185, content: 遂絕時天下無事群臣言林邑多奇寶者仁壽末上遣大將劉方為驩州道行軍惣管卒欽州刺史甯長直驩州刺史李暈開府秦雄步騎萬餘及犯罪者數千人擊之其王梵志率其徒乘巨象而戰方軍不利方於是多掘小坑草覆其上因以兵桃之梵志悉眾而陳方與戰偽北梵志逐之至坑所其眾多陷轉相驚駭軍遂亂方縱兵擊之大破之頻戰輒敗遂棄城而走方入其都獲其廟主十八枚皆鑄金為之蓋其有國十八葉矣方班帥梵志復其故地遣使謝罪於是朝貢不絕, SBCK: ''}
