  - {type: punctuation, offset: 1009, content: 、, id: KR3k0012_CHANT_787-bkkpn236}
  - {type: variant, offset: 1009, length: 260, content: 交州之北恒出道間伺候二州行旅有單逈輩者輒出擊之利得人食之不貪其財貨也地有棘竹厚十餘寸破以作弓長四尺餘名狐弩削竹為矢以銅為鏇長八寸以射急疾不凡用也地有毒藥以傳矢金入則撻皮視未見瘡顧盼之間肌肉便皆壞爛須臾而死尋問此藥云取䖝諸有毒螫者合著管中曝之既爛因取其汁日煎之如射肉在其內地則裂外則不復裂也烏滸人便以肉為殽俎又取其髑髏破之以飲酒也其伺候行人小有失輩出射之若人無救者便止以火燔燎食之若人有伴相救不容得食力不能盡相檐去者便斷取手足以去尤以人手足掌蹠為珍異以飴長老出得人歸家合聚鄰里懸死人中當四面向坐擊銅鼓歌舞飲酒稍就割食之奉月, SBCK: ''}
