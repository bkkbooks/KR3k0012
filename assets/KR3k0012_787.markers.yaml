  - {type: variant, offset: 2, length: 5, content: 二哀牢後漢, SBCK: 三赤土國蒲羅中國優鈸國横跌國北攎國馬五洲薄歎洲躭蘭洲巨延洲濵郍專國鳥文國期調國林陽國牟奴七國蒲林國師子國毗加梨國干陁利國狼牙脩國婆利國訶羅陁國呵羅單國蒲黄國婆皇國婆逹國闇婆逹國槃槃國斤陁利國赤􅁟國隋}
