  - {type: variant, offset: 4048, length: 202, content: 質多斯郍遂兼扶南而有之死子伊奢郍先代立居伊奢郍城郭下二萬餘家城中有一大堂是王聽政之所其王三日一朝坐五香七寶床上施寶帳帳以文木為竿象牙金鈿為壁狀如小屋懸金光焰有同於赤土前有金香爐二人侍側王著朝霞古貝瞞絡腰腹下垂至脛頭戴金寶花冠披真珠瓔珞足履革屣耳懸金璫常服白疊以象牙為屩有五大臣一曰孤落支二曰高相憑三曰婆阿多陵四曰舍磨陵五曰髯羅婁及諸小臣朝於王者輒於階下三稽首王喚上階則跪以兩手抱膊遶王還坐議政事訖跪伏而去, SBCK: ''}
