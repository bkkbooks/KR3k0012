  - {type: variant, offset: 3488, length: 508, content: 扶南人聞之舉國欣迎戴而立焉復改制度用天笁法憍陳如死後王持梨陁跋摩宋文帝元嘉中三奉表獻方物齊永明中王憍陳如闍邪跋摩遣使送珊瑚佛像并獻方物詔授安南將軍扶南王其國人皆醜黑拳髮所居不穿井數十家共一池引汲之俗事天神以銅為像二面者四手四面者八手手各有所持或小兒或鳥獸或日月其王出入乘象嬪侍亦然王生則偏踞翹膝垂左𣍿至地以白疊敷前設金盆香爐於其上國俗居喪則剃髮除鬚死者有四葬水葬則投之江流火葬則焚為灰爐土葬則瘞埋之鳥葬則棄之中野人性貪恡無禮義男女恣其奔隨隋書曰扶南國王遣貢獻其王姓古龍諸國多姓古龍訊耆老言崑崙無姓氏崑崙之訛抱朴子曰扶南國出金鋼可以刻玉狀似紫石英其所生在百丈水底盤石上如鍾乳人沒水取之竟日乃出以鐵槌之不傷鐵反自損以羖羊角扣之漼然冰泮外國傳曰扶南人若戶中亡器物者即以米一升詣神廟乞神見盜者以米著神足下明日取米呼戶中奴婢分令囓之盜者口中血出米完不碎不盜者入口即敗從日南至徼外悉爾又曰扶南之東漲海中有大火洲洲上有樹得春雨時皮正黑得火燃樹皮正白紡績以作手巾或作燈注用不知盡又曰扶南國人最大居舍雕文刻鏤好布施多禽獸王好獵皆乘象一去月餘日南州異物志曰扶南國在林邑西三千餘里自立為王諸屬皆有官長及王之左右大臣皆號為崑崙真臘隋書曰真臘, WYG: ''}
