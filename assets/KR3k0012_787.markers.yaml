  - {type: variant, offset: 2882, length: 1114, content: 貞觀中林邑王梵頭利死率國人共立頭利女王諸葛地頭利之始子女王獨任國中不寧大臣可倫翁定乃立地為王妻之以女主其國乃定諸葛地自立後遣使可倫因地盤獻火珠狀如水精日午時正以珠承影取艾衣之火見云得之於羅剎國令之環土國主即梵志之後在日南郡西陸行二十餘日方至扶南國蕭子顯齊書曰扶南國男子截錦為橫幅女為貫頭貧者以布自蔽鍜為鐶鏆環貫音銀器伐木起屋國王居重閣以木柵為城海邊生大葉長八九尺編其葉以覆屋國王行乘象婦女亦能乘象無牢獄有訟者則以金指環若鷄子沸湯中令探之又燒鑕令赤著手上捧行七步有罪者手皆燋爛無罪者不傷又令沒水直者入即沉不直者不沉又曰扶南在日南之南大海西灣中廣袤三千餘里有大江水西海入海其先有女人為王名柳葉又有激國人名混填夢神賜弓一張故乘舩入海填晨起於神廟樹下不得弓即乘舩向扶南柳葉見舩卒眾欲禦之混填舉弓遙射貫舶一面通中人柳葉怖遂降混填娶以為妻惡其躶露形體乃穿疊布貫其首遂治其國子孫相傳南史曰扶南王混盤死國人共舉大將軍范蔓為王蔓勇健有權略復以兵威攻伐旁國咸服屬之自號扶南大王乃作大舩窮漲海開國十餘闢地五六千里蔓死後大將范尋殺其子長而代立更繕國內起觀閣遊戲之朝且中脯三四見客百姓以蕉蔗龜鳥為禮國無牢獄於城溝中養鰐魚門外圈猛獸有罪者輒以餧猛獸及鰐魚魚獸不食為無罪三日乃放之鰐魚大者長三丈餘狀如鼉有四足喙長六七尺兩邊有齒利如刀劍常食魚遇得麞鹿及人亦噉之蒼梧以南及外國皆有之又曰扶南王憍陳如本天笁婆羅門也有神語曰應王扶南憍陳如心悅南至盤盤扶南人聞之舉國欣迎戴而立焉復改制度用天笁法憍陳如死後王持梨陁跋摩宋文帝元嘉中三奉表獻方物齊永明中王憍陳如闍邪跋摩遣使送珊瑚佛像并獻方物詔授安南將軍扶南王其國人皆醜黑拳髮所居不穿井數十家共一池引汲之俗事天神以銅為像二面者四手四面者八手手各有所持或小兒或鳥獸或日月其王出入乘象嬪侍亦然王生則偏踞翹膝垂左𣍿至地以白疊敷前設金盆香爐於其上國俗居喪則剃髮除鬚死者有四葬水葬則投之江流火葬則焚為灰爐土葬則瘞埋之鳥葬則棄之中野人性貪恡無禮義男女恣其奔隨隋書曰扶南國王遣貢獻其王姓古龍諸國多姓古龍訊耆老言崑崙無姓氏崑崙之訛抱朴子曰扶南國出金鋼可以刻玉狀似紫石英其所生在百丈水底盤石上如鍾乳人沒水取之竟日乃出以鐵槌之不傷鐵反自損以羖羊角扣之漼然冰泮外國傳曰扶南人若戶中亡器物者即以米一升詣神廟乞神見盜者以米著神足下明日取米呼戶中奴婢分令囓之盜者口中血出米完不碎不盜者入口即敗從日南至徼外悉爾又曰扶南之東漲海中有大火洲洲上有樹得春雨時皮正黑得火燃樹皮正白紡績以作手巾或作燈注用不知盡又曰扶南國人最大居舍雕文刻鏤好布施多禽獸王好獵皆乘象一去月餘日南州異物志曰扶南國在林邑西三千餘里自立為王諸屬皆有官長及王之左右大臣皆號為崑崙真臘隋書曰真臘, SBCK: 槃槃}
