  - {type: variant, offset: 747, length: 237, content: 國交通前漢唐蒙開夜郎滇笮而哀牢不附至光武季年始請內屬漢置永昌郡以統理之稅其鹽布氈罽以利中土其國西通大秦通交阯奇珍進貢歲時不闕及諸葛亮五月渡瀘水收其金銀鹽布以益軍儲使張伯岐選其勁卒以增武備前代置郡其利頗深今鹽布之稅不供珍奇之貢不入而空竭府庫驅率平人受役蠻夷肝腦塗地漢以得利既多更置博南哀牢二縣蜀人愁怨行者作歌今於國家無絲髮之利在百姓受終之酷伏乞省罷姚州使肄嶲府歲時朝覲同之番國烏滸後漢書曰交阯西有噉人國生首子輒解而食謂之宜弟味旨則以遣其君君喜而賞其父取妻美則讓其兄今烏滸人是也, WYG: 但貨香花}
