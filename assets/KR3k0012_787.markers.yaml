  - {type: variant, offset: 2469, length: 198, content: 沉之於海有官者以銅甖沉之海口庶人以瓦送之於江男女皆截髮哭至水次盡哀而止歸則不哭每七日燃香散花復哭盡哀而止百日三年皆如之皆奉佛文字同於天笁隋書曰林邑之先因漢末交趾女子徵側之亂內縣功曹子區連殺縣令自號為王無子其甥范熊代立死子逸立日南人范文因亂為逸僕隸遂教之築宮室造器械逸甚信任使文將兵極得眾心文因間其子弟或奔或徙及逸死國無嗣文自立為王其後范佛為晉楊威將軍戴桓所破宋交州刺史檀和之將兵擊之深入其境至梁陳, SBCK: ''}
