  - {type: variant, offset: 16, length: 0, content: '', krp: 國近逺稱其父釋王位出家爲道傳位於利冨多塞在位十六年矣有三妻並隣國王之女也居僧祇城有門三重相去各百許歩毎門圖畫仙人菩薩之像懸金花鈴毦婦女數十人或奏樂或捧金花又飾四}
  - {type: variant, offset: 18, length: 0, content: '', SBCK: 容飾如佛塔邊金剛力士之狀夾門而立門外者持兵杖門内者執白拂夾道垂素網綴花王宮諸屋悉是重閤北户北面而坐坐三重之榻衣朝霞布冠金花冠垂雜寳瓔珞四女子立侍左右兵衛百餘人王榻後作一龕以金銀五香木雜鈿之龕後懸一金光熖夾榻又樹二金鏡鏡前首陳金甕甕前各有金香炉當前置一金伏牛牛前樹一寳盖盖左右皆有寳扇婆羅門等數百人東西重行相向而坐其官有薩陁迦邏一人陁拏逹又二人迦利密迦三人共掌政事俱羅末帝一人掌刑法毎城置郍耶迦一人鉢帝十人其俗皆穿耳剪髮無跪拜之禮以香油塗身敬佛尤重婆羅門婦人作髻於項後男女通以朝霞朝雲雜色布爲衣豪冨之室恣意華靡唯金鏁非王賜不得服用毎婚嫁擇吉曰女家先期五日作樂飲酒父執女手以授壻七日乃配焉旣娶則分財別居唯㓜子與父同居父母兄弟死則剔髮素服就水上構竹爲棚棚内積薪以屍置上燒香建幡吹蠡擊皷以送之縱火焚薪遂落於水貴賤皆同唯國王燒訖収􅁅貯以金瓶藏於廟屋冬夏常温􅀨多霽少種植無時特冝稻穄白豆黒麻自餘物産多同交阯以甘蔗作酒雜以紫􅀲根酒色黄赤味亦香羙亦}
  - {type: page-break, offset: 18, content: '', id: KR3k0012_SBCK_787-2a}
