  - {type: variant, offset: 1302, length: 0, content: '', SBCK: 林陽國康㤗扶南土俗曰扶南之西南有林陽國去扶南七千里土地奉佛有數千沙門持戒六齊曰魚肉不得入國一曰再市朝市諸雜米甘菓石宻暮中但貨香花南州異志曰林陽在扶南西七千餘里地皆平􅀶民十餘萬家男女行仁善皆侍佛牟奴國摸盧國末利國卑離國滿都國余國沙樓國晉起居注曰太熈元年正月牟奴等國大小口十七萬九千餘人各遣正副使詣護東夷校尉何龕上獻方物蒲林國晉起居注曰興寜元年閠月蒲林王國新開通前所奉表詣先帝今遣到其國慰諭師子國宋元嘉起居注曰師子國王遣使奉獻詔曰此小乗經甚少彼國所有皆}
