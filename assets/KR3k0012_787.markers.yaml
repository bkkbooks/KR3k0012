  - {type: variant, offset: 16, length: 0, content: '', SBCK: 國近逺稱其父釋王位出家爲道傳位於利冨多塞在位十六年矣有三妻並隣國王之女也居僧祇城有門三重相去各百許歩毎門圖􅀞仙人菩薩之像懸金花鈴毦婦女數十人或奏樂或捧金花又飾四}
  - {type: variant, offset: 16, length: 0, content: '', WYG: 國近逺稱其父釋王位出家為道𫝊位於利冨多塞在位十六年矣有三妻並隣國王之女也居僧祗城有門三重相去各百許步每門圖畫仙人菩薩之像懸金花鈴毦婦女數十人或奏樂或捧金花又飾四}
