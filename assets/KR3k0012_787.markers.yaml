  - {type: variant, offset: 646, length: 214, content: 有濮竹節相去二丈地出銅鐵鈆錫金銀光珠琥珀水精瑠璃軻蟲蚌珠孔雀翡翠犀象猩猩豹獸唐書曰麟德元年五月於昆明之梇楝川置姚州都督府每年差兵募五百人鎮守武太后神功二年蜀州刺史張柬之上表曰姚州者古哀牢之舊國也本不與中國交通前漢唐蒙開夜郎滇笮而哀牢不附至光武季年始請內屬漢置永昌郡以統理之稅其鹽布氈罽以利中土其國西通大秦通交阯奇珍進貢歲時不闕及諸葛亮五月渡瀘水收其金銀鹽布以益軍儲使張伯岐選其勁卒以增武備前代置郡其利頗深今鹽布之稅不供珍奇之貢不, SBCK: 一車輸王餘自}
