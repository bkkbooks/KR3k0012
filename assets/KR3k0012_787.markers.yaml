  - {type: variant, offset: 4276, length: 274, content: 持甲仗若有征伐因而用之其俗非王妻子不得為嗣王初立之日所有兄弟並刑殘之或去一指或劓其鼻別處供給不得仕進人形小而色黑婦人亦有白者悉拳髮垂耳性氣捷勁居處器物頗類赤土以右手為淨左手為穢每旦澡洗以楊枝淨齒讀頌經呪又澡洗乃食食罷還用楊枝淨齒飲食多蘇酪沙糖粇粟米餅欲食之時先取雜肉羹與餅相和手擩而食男婚禮畢即與父母分財別居父母死小兒未婚者以餘財與之若婚畢財物入官其喪葬兒女皆七日不食剔髮而哭僧尼道士親故皆來聚會音樂送之以五香木燒屍收灰以金銀瓶盛送于大水之內貧者或用瓦而以彩色畫之亦有不焚送屍山中任野獸食者其國北多山阜南有水澤地氣尤熱無霜雪饒瘴癘毒蟲土宜粱稻與日南, SBCK: 學婆羅門甚敬佛法貞觀}
