  - {type: variant, offset: 42, length: 0, content: '', SBCK: 石自是島嶼連接又行二三日西望見狼牙湏國之山於是南逹雞籠島至於赤土之界其王遣使婆羅門鳩摩羅以舶三十艘來迎吹蠡擊皷以樂隨使進金鏁以纜駿舩月餘至其都王遣其子郍耶迦請與駿等禮見先遣人送金盤貯香花并鏡鑷金合二枚貯香油金瓶八枚貯香水白疊布四條以擬供使者盥洗將象二頭持孔雀盖以迎使人并致金花盤以藉詔凾}
  - {type: variant, offset: 42, length: 0, content: '', WYG: 石自是島嶼連接又行二三日西望見狼牙須國之山於是南逹鷄籠島至於赤土之界其王遣婆羅門鳩摩羅以船三十艘来迎吹蠡撃鼔以樂隨使進金鏁以纜駿舩月餘至其都王遣其子郍耶迦請與駿等禮見遣人送金盤貯香花并鏡鑷金合二枚貯香油金瓶八枚貯香水白疊布四條以擬供使者盥洗將象二頭持孔雀葢以迎使人并致金花盤以籍詔函}
