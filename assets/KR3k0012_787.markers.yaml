  - {type: variant, offset: 19, length: 19, content: 沙壹居牢山嘗捕魚水中觸沉木若有感因懷妊, SBCK: 椰漿爲酒又曰煬帝即位募能通絶域者大業三年屯田主事駿虞部主事王君政等請使赤土帝大恱賜駿等帛各百疋時服一襲遣賫物五千叚以賜赤土王其年}
