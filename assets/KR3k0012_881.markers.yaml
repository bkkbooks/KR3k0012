  - {type: variant, offset: 19, length: 5, content: 南宮極震南, SBCK: 莊公有神降于莘有神聲以接人莘號地惠王問諸内史過曰是何故也對曰國之將興明神降之􅁥其德也將亡神又降之觀其􅁖也故有得神以興亦有以亡虞夏啇周皆有之王曰􅀂之何對曰以其物享焉其至之日亦其物也三從之内史過徃聞􅉑請命反曰􅉑必亡矣虐於民而聽於神神居莘􅉑公使祝應宗區史嚚享焉神賜之土田史嚚曰􅉑其亡乎吾聞之國將興聽於民將亡聽於神神聦明正直而壹者也依人而行􅉑多凉德其何土之能得凉薄也爲僖二年晉滅下陽傳又宣上曰昔夏之方有德也逺方圗物圖􅀞山川竒異之物獻之貢金九牧鑄鼎象物象所圗物著之於鼎百物爲之備使民知神姦圗􅀑神百物之形使民逆備之故民入川澤山林不逢不􅀂􅀂順也螭魅罔兩螭山神獸形魅怪物罔兩水神莫能逢之又昭元曰􅀳侯有疾鄭伯使公孫僑如􅀳聘且問疾叔向問焉曰寡君之疾病卜人曰實沈臺駘爲崇敢問此何神也子産曰昔髙辛氏有二子長曰閼伯季曰實沈居于曠林不相能也日尋干戈以相征討后帝不臧遷閼伯于啇丘主辰遷實沈于大身主參由是觀之則實沈參神也昔金天氏有裔子曰昧爲玄􅁳師生允格臺駘臺駘能業其官宣汾洮障大澤以處大原帝用嘉之封諸汾川由是觀之則臺駘汾神也又昭三曰石}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_SBCK_881-2a}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_SBCK_881-2b}
  - {type: variant, offset: 19, length: 5, content: 南宮極震南, WYG: 是何故也對曰國之將興明神降之監其徳也將亡神又降之觀其惡也故有得神以興亦有以亡虞夏商周皆有之王曰若之何對曰以其物享之其至之日亦其物也王從之内史過往聞虢請命反曰虢必亡矣虐而聽於神神居莘六月虢公使祝應宗區史嚚享焉神賜之土田史嚚曰虢其亡乎吾聞之國將興聽於民將亡聽於神神聰明正直而壹者也依人而行虢多凉徳其何土之能得又宣上曰昔夏之方有徳也逺方圖物貢金九牧鑄鼎象物百物而為之備使民知神姦故民入川澤山林不逄不若魑魅罔兩莫能逄之又昭元曰晉侯有疾鄭伯使公孫僑如晉聘且問疾叔向問焉曰寡君之疾病卜人曰實沈臺駘為祟敢問此何神也子産曰昔髙辛氏有二子長曰閼伯季曰實沈居于曠林不相能也日尋干戈以相征討后帝不臧遷實沈于大夏主參由是觀之則實沈參神也昔金天氏有裔子曰昧為𤣥㝠師生允格臺駘臺駘能業其官宣汾洮障大澤以處大原帝用嘉之封諸汾川由是觀之則臺駘汾神也又昭三曰石}
