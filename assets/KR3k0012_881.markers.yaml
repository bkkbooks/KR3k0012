  - {type: variant, offset: 11, length: 3, content: 地動陰, SBCK: 隂陽不測之謂神神者變化之極妙萬物而爲言不可以形詰者也又曰知變化之道者其知神之所爲乎夫變北之道不爲而自然故知變化者則知神之所爲唯神也故不疾而速不行而至毛詩嵩髙曰維嶽降神生甫及申禮記孔子間居曰清明在躬氣志如神又中庸曰􅀑神之爲德也其盛矣乎視之而弗見聽之而弗聞體物而不可遺體猶生也可猶所也不}
  - {type: variant, offset: 11, length: 2, content: 地動, WYG: ''}
  - {type: variant, offset: 11, length: 3, content: 地動陰, krp: 隂陽不測之謂神神者變化之極妙萬物而爲言不可以形詰者也又曰知變化之道者其知神之所爲乎夫變北之道不爲而自然故知變化者則知神之所爲唯神也故不疾而速不行而至毛詩嵩髙曰維嶽降神生甫及申禮記孔子間居曰清明在躬氣志如神又中庸曰鬼神之爲德也其盛矣乎視之而弗見聽之而弗聞體物而不可遺體猶生也可猶所也不}
