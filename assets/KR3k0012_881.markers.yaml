  - {type: variant, offset: 408, length: 146, content: 季氏將有逐君之變又曰昭公三十三年地震劉向以為是時周景王崩劉子單子立王子猛尹氏立王子朝季氏逐昭公黑肱叛邾吳殺其君僚宋五大夫晉二大夫皆以地叛又曰哀公三年地震仲尼見棄而季氏強又曰趙幽王五年代地大動自樂徐以西北至平陰臺屋墻垣太半壞地坼東西百三十步六年大飢秦滅之漢書曰惠帝時地震隴西壓四百餘家時諸呂用事, WYG: 主}
