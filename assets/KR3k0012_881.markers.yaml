  - {type: variant, offset: 1603, length: 2014, content: 許昌百姓愁苦之應哀帝及海西公簡文孝武時皆頻地震是時人主幼弱群小弄權兵役連年海西見廢又曰孝武太元年夏震含章殿四柱并侍者二人後年符堅略襄陽又曰安帝義熙年頻地震或有聲如雷時太尉劉裕謀逆宋書曰孝武大明元年地震有聲自河北來魯郡山搖地動彭城女墻四百八十丈墜屋傾兗州地裂泉湧二年不已其後兗州刺史夏侯祖懽卒齊書曰廢帝東昏侯時地震一年不止其年護軍崔惠景反兵圍城帝閉門以拒之隋書曰梁武太清二年八月侯景舉兵反於豫州登壇歃盟地震及圍城死者太半又曰太清三年建康地再震時侯景自為大丞相崔鴻十六國春秋曰前趙劉聰建元元年三月平陽城震崇明觀陷為池水赤氣至天有赤龍奮迅而去十一月地震二年八月平陽地震汾水大溢流漂數百家聰死子粲立為劉曜所殺曜自立又曰前秦符堅時秦雍二州地震裂泉湧長安大風震電壞屋殺人堅懼而愈修德政焉俄而符雙等伐長安尋為戰敗又曰後秦姚泓時秦州地震三十二殷殷有聲山崩舍壞識者以為秦州泓之故鄉將滅之徵後宋高祖入長安執於建康斬之又曰姚興四年所在地震前後一百五十六公卿百司抗表請罪興曰災譴之來咎在元首近代或歸罪三公甚非也朕當考躬省己思宋景之義公等何愆宜悉冠履復位後魏書曰太祖道武天賜六年夏地震其年帝愛姬萬人與清河王紹通作亂帝被紹及萬人殺之又曰宣武延昌元年沁州地震陷殺人甚眾又累年沁州秀容敷城鴈門山鳴地震不止其年幽州沙門劉僧紹反明年胡太后臨朝後天下大兵太后少帝為爾朱榮投於河隋書曰北齊武成清河年并州地震是時和士開專恣之應又曰隋文帝開皇二十年廢太子勇以晉王廣為皇太子將冊之夜烈風大雪地震山崩人舍多壞殺人太子卒與僕射楊素弒帝呂氏春秋曰周文王寢病五日而地動東西南北不出國郊百吏皆請曰臣聞地之動為主也群臣皆悲曰請移之興事動眾以增國城文王曰我必有罪故天示此以罰我今動眾以增國城是重吾罪不可無幾疾瘳也地裂尚書說曰黃帝將亡則地裂春秋考異郵曰臣恣盛地裂坼戰國策曰齊閔王莽莒淖齒數之曰羸博之間地坼至泉地以告也而王不知戒何得無誅乃殺之書紀年曰夏桀末年社坼裂其年為湯所放後漢書曰安帝時緱氏地裂後郡國地坼或泉湧越雋夷殺長吏燒城邑又曰南地坼長百八十二里廣五十六里又洛陽新城地裂又緱氏地陷裂京師地陷時帝幼冲官者用事又曰建康元年隴西漢陽張掖北地武威地百八十震山谷坼裂壞城又曰冲帝初即位葬順帝是日鴈門京師太原三郡地震沙湧土裂又曰桓帝時河東地裂明年京師雲陽地震時閹豎用事皇后梁氏崩後八年緱氏頻年兵革又李膺等二百餘人受誣下獄又上黨地裂是時寇賊彌盛又曰靈帝時河東地裂十二處長十里是時閹豎用事政在私門續漢書曰和帝永和七年趙國易陽地裂京房易傳曰地拆裂者臣離相從也是時南單于眾乖離相從也是時南單于眾乖離漠軍追討崔鴻十六國春秋曰西秦乞伏乾歸太初十九年苑川地裂後四年乾歸為兄子公府所殺抱扑子曰軍中地裂急徙居不測軍敗地震心大戰或有謀反墨子曰三苗欲滅時地震泉湧地陷今古五行記曰夏桀末年瞿山地陷一夕為大澤深九丈其年為湯所放晉書曰武帝太康八年宣帝廟地陷其年七月殿前地陷方丈深數丈中有破舡是時帝不用和嶠之言而信賈充之佞至十一年惠帝立王室大亂又曰惠帝時五月城中地陷方三十丈殺人六月又地坼家人陷死八月地裂廣三十六丈長八十四丈人大飢又上庸四處山崩地陷廣三十丈長百三十丈大水出殺人時賈后亂政又夜暴雷雨賈謐齋屋柱陷入地壓床悵明年謐誅天下兵亂帝室從此微矣又曰懷帝時洛陽地步廣里地陷出鵝三又當陽地裂三廣三丈長三百步時司馬越專政王室離敗死者計萬又曰安帝時山陰地陷方四尺有聲如雷後二年西明寺門穿湧水毀門大尉劉裕矯詔殺害朝士俄而禪宋隋書曰梁武帝普通二年始興郡石鼓村地自開成井方六尺深三十丈侯景篡梁昇御床床腳陷入地後景被殺崔鴻十六國春秋曰前涼張天錫三年四月延興地震陷水出又曰前趙劉聰末年武庫地陷深一丈五尺時中常侍王沉中宮僕射郭猗皆寵幸用事聰遊宴後宮或百日不出沉等奢僣貪殘賊害良善御史大夫陳元達諫聰不從元達自殺又曰前秦姚泓永和元年秦州地陷裂巖嶺崩墜人舍壞是年為宋高祖所擒斬於建康市又曰前秦符堅末年洛陽地陷堅後伐晉敗焉又曰安帝末年桓玄篡晉昇太極殿殿無故陷旬月宋高祖殺之又曰北涼沮渠茂乾永和七年太廟階陷六月城門崩其年九月茂乾面縛降於魏又曰西涼李歆嘉興元年三月燉煌謙德門陷至四年歆為沮渠蒙遜所敗又曰夏赫連勃勃鳳翔七年六月太廟基陷其年八月勃勃死隋書曰北齊後主末年穆后如晉陽向北宮辭胡太后所乘七寶車無故陷入地半沒四足是年齊滅后與帝俱入長安又曰隋煬帝大業十三年十二月洛州乾陽門內地陷周闊丈餘至十四年帝遇殺天下大亂異苑曰晉武帝太康五年宣帝廟地欻陷梁無故自折凡宗廟所以承祖先嗣永世不刊安居摧陷是煙絕之祥也地凶漢書曰光武時岑彭伐蜀去成都數十里軍營北有地名曰彭亡彭聞之欲移會日暮是夜彭為公孫述刺客詐為逃奴刺殺之魏志曰太祖圍呂布大司馬楊固救布為其將楊醜所殺楊將眭固又殺醜屯兵射犬巫誡之曰將軍字白兔而邑名射太兔見必驚宜急移去固不從明日遂戰死晉書曰建業太社西宮地吳時右司馬丁奉宅吳後主孫皓殺之流徙其家晉元帝初為僕射周顗宅顗為王敦所害後為冠軍將軍蘇峻宅峻反被誅殺後為索悅宅為, WYG: 㓂}
