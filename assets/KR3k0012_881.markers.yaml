  - {type: variant, offset: 3631, length: 5, content: 為章武王司, WYG: 曰段暉師事歐陽湯湯甚器愛之有童子與暉同志後二年童子辭歸從暉請}
  - {type: variant, offset: 3637, length: 5, content: 秀宅秀亦凶, WYG: 暉戯作木馬與之童子甚悦謝暉曰吾太山府君子奉勅遊學今將欲歸煩子厚贈無以報徳子後位}
