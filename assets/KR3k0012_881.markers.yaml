  - {type: variant, offset: 3682, length: 129, content: 第始造未居為元凶所害王隱晉書曰祖約為豫州刺史府中地忽赤如丹約竟敗見殺土踊紀年曰梁惠成王七年地忽長十丈有餘高尺半周隱王二年齊地暴長長丈餘高一尺漢書曰成帝河平四年臨淮縣土踊起高二丈時王莽專政崔鴻十六國春秋曰前涼張寔五年祁山地震從中陶原坂三里冒覆下川忽如見掩坂上草, WYG: 好言終乗}
