  - {type: variant, offset: 27, length: 0, content: '', SBCK: 問内史過曰是何故對曰昔夏之興祝融降於崇山其亡也回禄信於聆隧啇之興也檮杌次於丕山其亡也夷羊在牧周之興也鷟鳴於歧山其衰也杜伯射王於鄗宣王殺杜伯不􅇳後宣王田于囿中杜伯起於道左衣朱冠操朱弓矢射宣王中心拆脊而死今則丹朱之神也􅉑其亡也賈逵注曰祝融回禄火之神也檮也丹朱堯}
  - {type: variant, offset: 27, length: 2, content: 子朝, WYG: 問内史過曰是何故對曰昔夏}
