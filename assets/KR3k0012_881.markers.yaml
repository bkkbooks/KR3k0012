  - {type: variant, offset: 3622, length: 0, content: '', WYG: 以威儀鼓吹求於鍾山之神奉以相國之號及堅至壽春望八公山草木皆類人形若有力焉後魏書曰初聖武皇帝嘗率數萬騎田於山澤欻見輜軿自天而下既至見美婦人侍衛甚盛帝異而問之對曰我天帝女受命相偶随同寢宿旦請還曰明年周時復㑹此處言終而别去如風雨及期至前}
  - {type: variant, offset: 3623, length: 4, content: 親昵緣道, WYG: 田處果復相見天女以所生男授帝曰此君之}
