  - {type: variant, offset: 1682, length: 257, content: 聲如雷時太尉劉裕謀逆宋書曰孝武大明元年地震有聲自河北來魯郡山搖地動彭城女墻四百八十丈墜屋傾兗州地裂泉湧二年不已其後兗州刺史夏侯祖懽卒齊書曰廢帝東昏侯時地震一年不止其年護軍崔惠景反兵圍城帝閉門以拒之隋書曰梁武太清二年八月侯景舉兵反於豫州登壇歃盟地震及圍城死者太半又曰太清三年建康地再震時侯景自為大丞相崔鴻十六國春秋曰前趙劉聰建元元年三月平陽城震崇明觀陷為池水赤氣至天有赤龍奮迅而去十一月地震二年八月平陽地震汾水大溢流漂數百家聰死子粲立為劉曜所殺曜自立又曰前秦符堅時秦雍二州地震裂泉湧長安大風震電壞屋殺人堅懼而愈修德政, SBCK: 力}
