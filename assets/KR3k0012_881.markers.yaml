  - {type: variant, offset: 2153, length: 290, content: 后臨朝後天下大兵太后少帝為爾朱榮投於河隋書曰北齊武成清河年并州地震是時和士開專恣之應又曰隋文帝開皇二十年廢太子勇以晉王廣為皇太子將冊之夜烈風大雪地震山崩人舍多壞殺人太子卒與僕射楊素弒帝呂氏春秋曰周文王寢病五日而地動東西南北不出國郊百吏皆請曰臣聞地之動為主也群臣皆悲曰請移之興事動眾以增國城文王曰我必有罪故天示此以罰我今動眾以增國城是重吾罪不可無幾疾瘳也地裂尚書說曰黃帝將亡則地裂春秋考異郵曰臣恣盛地裂坼戰國策曰齊閔王莽莒淖齒數之曰羸博之間地坼至泉地以告也而王不知戒何得無誅乃殺之書紀年曰夏桀末年社坼裂其年為湯所放後漢書曰安帝時緱氏地裂後郡國地坼或泉湧越雋夷殺長吏燒城邑又曰南地坼長, SBCK: 平御覽卷第八}
