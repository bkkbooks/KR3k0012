  - {type: 'tls:seg', offset: 23, content: '', id: KR3k0012_CHANT_881-1a.8}
  - {type: variant, offset: 25, length: 1, content: 極, SBCK: 于晉魏榆魏榆晉也􅀳侯問於師曠曰石何故言對曰石不能言神或馮焉謂有精神馮依石而言不然民聽濫也抑臣又聞之曰作事不時怨讟動於民則有非言之物而言今宫室崇侈民力凋盡怨讟並作莫保者性石言不亦冝乎論語曰子不語怪力亂神神謂􅀑神之事又曰子路問事􅀑神子曰未能事人焉能事􅀑􅀑神難明語之無益故不荅家語曰不食者不死而神國語曰􅉑公夢在廟有神人靣白色虎􅀲執􅃏立於西阿之下公懼而走神曰無走帝命曰使晉襲于爾門公拜稽首􅁴召史嚚占之對曰如君之言則蓐収也天之刑神也天事官成公使囚之且使國人賀夢舟之僑告其族曰衆謂􅉑不乆吾乃今知之又曰有神降於莘}
  - {type: page-break, offset: 25, content: '', id: KR3k0012_SBCK_881-3a}
  - {type: variant, offset: 25, length: 1, content: 極, WYG: 于晉魏榆晉侯問於師曠曰石何故言對曰石不能言或馮焉不然民聽濫也抑臣又聞之曰作事不時怨讟動於民則有非言之物而言今宫室崇侈民力凋盡怨讟並作莫保其性石言不亦宜乎論語曰子不語怪力亂神又曰子路問事鬼神子曰未能事人焉能事鬼家語曰不食者不死而神國語曰虢公夣在廟有神人面白毛虎爪執鉞立於西阿之下公懼而走神曰無走帝命曰使晉襲于爾門公拜稽首覺召史嚚占之對曰如君之言則蓐收也天之刑神也天示君戒公使囚之且使國人賀夢舟之僑告其族曰衆謂虢不久吾乃今知之又曰有神降於莘}
