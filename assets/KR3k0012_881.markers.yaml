  - {type: variant, offset: 765, length: 217, content: 相食帝冲幼鄧氏執政後又郡國九地震明年海賊張伯路與平原劉文何周文光等攻戰厭次殺令長後三年郡國十八地震淮南人飢明年鄧太后崩帝失政又曰順帝時京師頻地震岸崩及地陷其年吳郡丞羊珍反郡府後二年涼州地百八十震山谷坼裂是日徐楊賊攻燒邑城殺掠民吏又曰冲帝時京師地震三郡沙湧土裂時帝年二歲母后臨朝郡盜大起發掘憲陵攻燒城邑又曰桓帝時京師地震荊楊人多飢死後又震憲陵寢屋瓦宮廟瓦落盡時梁冀專政又曰靈帝時地震海水溢又震鴻都府門時閹堅專政又曰初平二年并州牧董卓焚燒, SBCK: 少貧賤嘗至}
