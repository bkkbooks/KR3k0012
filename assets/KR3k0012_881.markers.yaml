  - {type: variant, offset: 640, length: 6, content: 建昭四年藍田, WYG: 又曰游水發根言上郡有巫病而鬼下之上召置之甘泉及病使人問神君神君言曰天子無憂病病少瘉强與我會甘泉於是上病瘉遂起幸甘泉病良已大赦置壽宫神君神君最貴者曰太一其佐曰大禁司命之屬皆從之非可得見聞其言言與人音等時去時來來則風肅然居室帷中時晝言然嘗以夜天子祓然後入因巫為主人関飲食所欲言行下又置壽宫北宫張羽旗設共具以禮神君神君所言上使受書其名曰盡法其所言世俗之所知也無絶殊者而天子心獨喜其事祕世莫知也又曰公孫卿言見神人于東萊山若云欲見天子天子於是幸緱氏城拜卿為中大夫遂至東萊宿留之數日無所見見大人迹云又曰祠神人於交門宫若有鄉坐拜者或言益州有金馬碧雞之神可醮祭而致於是遣諫大夫王褒使持節而求之又曰谷永說成帝曰昔周史萇𢎞欲以鬼神之術輔道靈王會朝諸侯而周愈微諸侯叛楚懐王隆祭祀事鬼神欲以獲福助却秦師而兵挫}
