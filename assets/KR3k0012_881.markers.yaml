  - {type: 'tls:seg', offset: 13, content: '', id: KR3k0012_CHANT_881-1a.5}
  - {type: variant, offset: 14, length: 0, content: '', WYG: 陽不測之謂神又曰知變化之道者其知神之所為乎唯神也故不疾而速不行而至毛詩崧髙曰維嶽降神生甫及申禮記孔子閒居曰清明在躬氣志如神中庸曰鬼神之為徳其盛矣乎視之而弗見聽之而弗聞體物而不可遺使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右詩曰神之格思不可度思矧可射思又祭法曰山林川澤丘陵能出雲為風雨見怪物皆曰神又祭義宰我曰吾聞鬼神之名不知其所謂子曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也衆生必死死必歸土此之謂鬼骨肉斃于下陰為野土其氣發揚于上為昭明焄蒿悽愴此百物之精也神之著也因物之精制為之極明命鬼神以為黔首則百衆以畏萬民以服又樂記曰明則}
  - {type: page-break, offset: 14, content: '', id: KR3k0012_WYG_881-1b, image: WYG0900/WYG0900-0684d.png}
  - {type: page-break, offset: 14, content: '', id: KR3k0012_WYG_881-2a, image: WYG0900/WYG0900-0685a.png}
  - {type: variant, offset: 15, length: 1, content: 餘, SBCK: 所遺言萬物無不以􅀑神之氣生也使天下之人齊明盛服以承􅀕祀洋洋乎如在其上如在其左右詩曰神之格思不可度思矧可射思格來也矧况也射厭也言神之來其形象不可億度况可厭倦乎又􅀕法曰山林川谷丘陵能出雲爲風雨見怪物皆曰神又􅀕義宰我曰吾聞􅀑神之名不知其所謂子曰氣也者神之盛也魄也者􅀑之盛也合􅀑與神教之至也衆生必死死必歸土此之謂􅀑骨􅁏斃于下隂爲野土其氣發􅀭于上爲昭明焄蒿悽愴此百物之精也神之著也因物之精制爲之極明命􅀑神以爲黔首則百衆以畏萬民以服又樂記曰明則有禮樂幽則有􅀑神聖人之精氣謂之神賢智之精氣謂之􅀑}
  - {type: page-break, offset: 15, content: '', id: KR3k0012_SBCK_881-1b}
  - {type: variant, offset: 15, length: 1, content: 餘, WYG: 禮樂幽則有鬼神}
  - {type: variant, offset: 15, length: 1, content: 餘, krp: 所遺言萬物無不以鬼神之氣生也使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右詩曰神之格思不可度思矧可射思格來也矧况也射厭也言神之來其形象不可億度况可厭倦乎又祭法曰山林川谷丘陵能出雲爲風雨見怪物皆曰神又祭義宰我曰吾聞鬼神之名不知其所謂子曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也衆生必死死必歸土此之謂鬼骨肉斃于下隂爲野土其氣發揚于上爲昭明焄蒿悽愴此百物之精也神之著也因物之精制爲之極明命鬼神以爲黔首則百衆以畏萬民以服又樂記曰明則有禮樂幽則有鬼神聖人之精氣謂之神賢智之精氣謂之鬼}
