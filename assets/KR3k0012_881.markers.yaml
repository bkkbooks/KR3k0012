  - {type: variant, offset: 2756, length: 1447, content: 夕為大澤深九丈其年為湯所放晉書曰武帝太康八年宣帝廟地陷其年七月殿前地陷方丈深數丈中有破舡是時帝不用和嶠之言而信賈充之佞至十一年惠帝立王室大亂又曰惠帝時五月城中地陷方三十丈殺人六月又地坼家人陷死八月地裂廣三十六丈長八十四丈人大飢又上庸四處山崩地陷廣三十丈長百三十丈大水出殺人時賈后亂政又夜暴雷雨賈謐齋屋柱陷入地壓床悵明年謐誅天下兵亂帝室從此微矣又曰懷帝時洛陽地步廣里地陷出鵝三又當陽地裂三廣三丈長三百步時司馬越專政王室離敗死者計萬又曰安帝時山陰地陷方四尺有聲如雷後二年西明寺門穿湧水毀門大尉劉裕矯詔殺害朝士俄而禪宋隋書曰梁武帝普通二年始興郡石鼓村地自開成井方六尺深三十丈侯景篡梁昇御床床腳陷入地後景被殺崔鴻十六國春秋曰前涼張天錫三年四月延興地震陷水出又曰前趙劉聰末年武庫地陷深一丈五尺時中常侍王沉中宮僕射郭猗皆寵幸用事聰遊宴後宮或百日不出沉等奢僣貪殘賊害良善御史大夫陳元達諫聰不從元達自殺又曰前秦姚泓永和元年秦州地陷裂巖嶺崩墜人舍壞是年為宋高祖所擒斬於建康市又曰前秦符堅末年洛陽地陷堅後伐晉敗焉又曰安帝末年桓玄篡晉昇太極殿殿無故陷旬月宋高祖殺之又曰北涼沮渠茂乾永和七年太廟階陷六月城門崩其年九月茂乾面縛降於魏又曰西涼李歆嘉興元年三月燉煌謙德門陷至四年歆為沮渠蒙遜所敗又曰夏赫連勃勃鳳翔七年六月太廟基陷其年八月勃勃死隋書曰北齊後主末年穆后如晉陽向北宮辭胡太后所乘七寶車無故陷入地半沒四足是年齊滅后與帝俱入長安又曰隋煬帝大業十三年十二月洛州乾陽門內地陷周闊丈餘至十四年帝遇殺天下大亂異苑曰晉武帝太康五年宣帝廟地欻陷梁無故自折凡宗廟所以承祖先嗣永世不刊安居摧陷是煙絕之祥也地凶漢書曰光武時岑彭伐蜀去成都數十里軍營北有地名曰彭亡彭聞之欲移會日暮是夜彭為公孫述刺客詐為逃奴刺殺之魏志曰太祖圍呂布大司馬楊固救布為其將楊醜所殺楊將眭固又殺醜屯兵射犬巫誡之曰將軍字白兔而邑名射太兔見必驚宜急移去固不從明日遂戰死晉書曰建業太社西宮地吳時右司馬丁奉宅吳後主孫皓殺之流徙其家晉元帝初為僕射周顗宅顗為王敦所害後為冠軍將軍蘇峻宅峻反被誅殺後為索悅宅為會稽王道子所親昵緣道子見殺又為章武王司馬秀宅秀亦凶至宋孝武時為雍州刺史臧質宅質反見殺故代稱充凶地宋史部尚書王僧綽常謂宅無吉凶請以為第始造未居為元凶所害王隱晉書曰祖約為豫州刺史府中地忽赤如丹約竟敗見殺土踊紀年曰梁惠成王七年地忽長十丈有餘高尺半周隱王二年齊地暴長長丈餘高一尺漢書曰成帝河平四年臨淮縣土踊起高二丈時王莽專政崔鴻十六國春秋曰前涼張寔五年祁山地震從中陶原坂三里冒覆下川忽如見掩坂上草木存焉地生毛晉書曰武帝太始中皇甫晏為益州刺史西討屯兵人咸死之地生白毛俄被牙門將所殺又曰成帝時地生毛時天下大兵而中原擾亂百姓疲怨又曰孝武時京都地生毛而氐賊圍繞襄陽彭城征戍連年不解又京都地生毛符堅滅後人勞役後又江陵交戰不解又曰安帝義熙十年地生白毛連年征討勞擾之應京房曰以為人勞之異金失其性地生毛常璩華陽國志曰晉武帝太始八年蜀地生毛長七八寸生數里裏李勢欲亡地又生毛崔鴻十六國春秋曰後秦姚興時乞伏乾歸鎮州地震生毛而乾歸太初十九年七月為兄子公府所殺又曰北燕馮跋太平十五年龍城地生白毛長一尺二寸月餘乃滅後遼西太守高潛謀反伏誅隋書曰梁武帝大同年地生白毛長二尺時築浮山堰功垂就而潰百姓苦之又曰陳後主末年地生白毛時功役不息卒為隋滅又曰北齊武成清河年初滄州及長安地生毛時北築長城內興三臺人苦役焉唐書曰則天天授初淮南地生毛或白蒼長者尺餘或遍居人床下楊州尤甚大如馬尾焚之如毛氣著作郎韓琬寓于楊州親掇之其年稱制, SBCK: ''}
