  - {type: variant, offset: 712, length: 1, content: 郡, SBCK: 隂子方者至孝有仁恩嘗臘日晨炊見竈神形見􅄂五行書曰􅍳神長衣黄衣夜􅀍髪從竈中出知其名呼之而可除凶􅁖子方再拜受慶家有黄羊因以祀之自是巳後􅁀至巨冨田有七百餘頃輿馬㒒􅀠比於􅀖君子方常言我子孫必將強大至孫識三丗而遂繁昌故後常以臘日祀竈而薦黄羊焉又曰班超至于寘王廣德禮意甚踈且其俗信巫巫言神怒何漢使有騧馬急求取以祠我廣乃遣使就超請馬超宻知其狀報許之而令巫自來取馬有頃巫至超斬其首以送廣德吴志曰臨海羅陽縣有神自稱王表語言飲食與人無異然不見其形又一婢名績紡遣中書郎李崇賫輔}
