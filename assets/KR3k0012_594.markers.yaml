  - {type: variant, offset: 3098, length: 0, content: '', WYG: 浙東觀察使裴肅卒以攝副使齊總為衢州刺史孟容以總無出人才一旦超為郡守非舊制也封還詔書時乆絶論駮及孟容舉職班行為之惴恐徳宗聞開悟召對慰勉遂寢其事又曰李藩為給事中}
