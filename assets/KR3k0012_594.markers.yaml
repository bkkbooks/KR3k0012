  - {type: variant, offset: 716, length: 7, content: 當何由一得見快, krp: 敷于下情進乎上也秦始皇立奏而法家少文觀王綰之奏德辭質而義近李斯之奏驪山事略而意誣故無膏潤形於篇章}
