  - {type: variant, offset: 700, length: 4, content: 第五倫每, SBCK: 馬援征㝷陽山賊上書除其竹林譬如嬰兒頭多蟣虱而剔之書奏上大悅出尚璽書數日黃門取頭虱章持入張璠漢記曰周舉上書言得失尚書郭度}
  - {type: page-break, offset: 700, content: '', id: KR3k0012_SBCK_594-2b}
  - {type: variant, offset: 700, length: 1, content: 第, WYG: 馬援征潯陽山賊上書除其竹林譬如嬰兒頭多蟣虱而剔之書奏上大悅出示尚書盡数日敕黄門取頭虱章持入張蟠漢記曰周舉上書言得失尚書郭度見之歎息上䟽願退位避舉常置其章於座吳志曰東萊人太史慈字子義為郡奏曹史會郡與州有隙先聞者為善時州章已去郡守選慈以行至洛詣公車見州吏始欲通章慈曰章題署得無誤耶取来視之乃以刀截敗其章因其亡去還通郡章州遂受短由是知名晉書曰樂廣善清言而不長於筆將譲尹請潘岳為表岳曰當得君意廣乃作二百句語述己志岳因取次比之便成名筆時人咸云廣不假岳之筆岳不取廣之㫖無以成斯美也北史曰董紹傳孝武崩周文與百官推奉文帝上表勸進令吕思禮薛憕作表前後再奏帝尚執謙冲不許周文曰為文能動至尊唯董公耳乃命紹為苐三表操筆便成表奏周文曰開進人意亦當如此也又曰胡方回為鎮北司馬為鎮修表有所稱慶世袓覧而歎美問誰所作既知方回召為中書博士賜爵臨涇子又曰邢卲善屬文每一文初出京師為之紙貴讀誦俄遍逺近於時袁翻與范陽袓塋位望通顯文筆之美見稱先達以邵藻思華贍深共嫉之每洛中貴人拜職多憑邵為謝章表嘗有一貴職初授官大事賔食翻與卲俱在坐翻意主人託其為讓表遂命卲作之翻甚不悅每告人曰邢家兒常作客章表自買黄紙冩而送之邵恐為翻所害乃辭以疾北齊書曰盧詢祖有術學文章華美為後生之俊舉秀才至鄴趙郡李祖勲嘗晏諸文士齊文宣使小黄門勑祖勲曰蠕蠕既破何無賀表使者佇立待之諸賓客為表詢祖俄頃便成其詞有云十萬横行樊將軍請而受屈}
