  - {type: variant, offset: 762, length: 0, content: '', WYG: 文宗嘗謂侍臣曰近日諸候章奏語大浮華有乖典實宜罰掌書記以戒其流李石曰古人因事為文今人以文害事懲弊抑末實在於斯論衡曰谷子虞唐子髙章奏白事筆有餘力劾奏文心雕龍曰按劾之奏所以明憲清國昔周之太僕䋲愆紏謬秦有御史職主文法漢置中丞總司按劾故位在鷙擊砥礪其氣必使筆端振風簡上凝霜者也觀孔光之奏董賢則實其姦回路粹之奏孔融則誣其釁惡名儒之與險士固殊心焉若夫傅咸勁直而按辭堅深劉}
  - {type: page-break, offset: 762, content: '', id: KR3k0012_WYG_594-9a, image: WYG0898/WYG0898-0413a.png}
  - {type: variant, offset: 762, length: 0, content: '', krp: 文宗嘗謂侍臣曰近日諸侯章奏語太浮華有乖典實冝罰掌書記以誡其流李石曰古人因事爲文今人以文害事懲弊抑末實在其地之盛時論衡曰谷子雲唐子髙章奏百上筆有餘力劾奏文心雕龍曰案劾之奏所以明憲清國昔周之太僕繩愆糺繆奏有御史職主文法漢置中丞揔司案劾故位在鷙擊砥礪其氣必使筆端振風簡上凝霜者也觀孔光之奏董賢則實其姧回路粹之奏孔融則誣其釁惡名儒之與儉士固殊心焉若夫傅咸果勁而辭案堅深劉}
  - {type: variant, offset: 763, length: 5, content: 囂賓客掾史, WYG: 切正而劾文濶畧各其志也後之弹事迭相斟酌惟新日用而􅃇凖不差然函人欲全矢人欲傷術在紏惡勢必深峭詩刺䜛人投畀豺虎禮疾無禮方之鸚猩墨翟非儒目以豕彘孟軻譏墨比諸禽獸詩禮儒墨既其如兹奏劾嚴文孰云能免是以近世為文競於詆訶吹毛取瑕刺骨為戾復似善詈}
  - {type: page-break, offset: 763, content: '', id: KR3k0012_WYG_594-9b, image: WYG0898/WYG0898-0413b.png}
  - {type: variant, offset: 763, length: 5, content: 囂賓客掾史, krp: 切正而劾文闊略各有志也後之彈事迭相斟酌惟新日用而舊淮不羗然甲人欲全矢人欲傷術在糺惡勢入剛峭詩刺䜛人投卑犲虎禮疾無禮方之鸚猩墨翟非儒目以羊彘孟軻譏墨比諸禽獸詩禮儒墨旣其如此奏劾嚴文孰云能免是以近丗爲文競於詆訶吹毛取瑕刺骨爲戾覆似善詈}
  - {type: variant, offset: 769, length: 0, content: '', WYG: 失折衷若能闢禮門以懸規標義路以植矩然後踰墻者折肱㨗徑者㓕跡何必躁言醜句詬病為切哉是以立範運衡宜明體要必使理有典刑辭有風軌總法家之式秉儒家之}
  - {type: variant, offset: 769, length: 0, content: '', krp: 失折衷若能闢禮門以懸規摽義路以植矩然後踰墻者折肱捷徑者滅跡何必躁言醜句詬病爲巧哉是以丘範運衡冝明體惡必使理有典刑辭有風軌揔法家之裁秉儒家之}
