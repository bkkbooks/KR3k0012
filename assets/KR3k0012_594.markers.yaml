  - {type: variant, offset: 2790, length: 207, content: 蘇綽自有晉之季文章競為浮華遂成風俗太祖欲革其弊因魏帝祭廟群臣畢至乃命綽為大誥奉行之其詞曰惟中興十有一年仲夏庶邦百辟咸會於王庭柱國洎群公列將罔不來朝時迺大稽百憲敷乎庶邦用綏我王度詞多不載自是之後文筆依此體三國典略曰周太祖太饗群臣史宮柳虬執簡書告於廟曰廢帝文皇帝之嗣子年七歲文皇帝託於安定公曰是子也才由公不孝不才亦由公勉之公既受茲重寄居元輔之任又納女為皇后遂不能訓誨有成致令廢黜負文皇帝付囑之意此咎非安定公而誰太祖乃令, SBCK: 陳淮薨}
