  - {type: variant, offset: 205, length: 0, content: '', SBCK: 漢末讓表以三爲斷曹公稱表表不止三讓又勿得浮華所以魏􅀄章表指事造實求其靡麗則未足矣如文舉之薦祢衡氣􅀭采飛孔明之辭後主志盡文壯雖華實異旨並表之英也琳瑀章表有譽當時孔璋稱徤則其摽也陳思之表獨冠群才觀其體贍而律調辭清而志顯應物製巧隨變生趣執轡有餘故能緩急應節矣迨晉􅀄筆札則張華爲儁其三讓公封理同辭要引義比事必得其偶及羊公之辭開府有譽於}
  - {type: page-break, offset: 205, content: '', id: KR3k0012_SBCK_594-2a}
  - {type: variant, offset: 205, length: 0, content: '', WYG: 漢末讓表以三為斷曹公稱為表不必三讓又勿得浮華所以魏初章表指事造實求其靡麗則未足羙矣至文舉之薦襧衡氣揚采飛孔明之辭後主志盡文暢雖華實異㫖並表之英也琳瑀章表有譽當時孔璋稱徤則其標也陳思之表獨冠羣才觀其體贍而律調詞清而志顯應物制巧隨變生趣執轡有餘故能緩急應節迨晉初筆札則張華為雋其三讓公封理周辭要引義比事必得其偶及羊公之辭開府有譽於}
