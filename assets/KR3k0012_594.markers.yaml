  - {type: variant, offset: 1021, length: 0, content: '', SBCK: 樂廣善清言而不長於筆將讓尹請潘岳爲表岳曰當得君意廣乃作二百句語述已之志岳因取次比之便成名筆時人咸云􅀂廣不假岳之筆岳不取廣之旨無以成斯羙也後魏書曰董紹傳孝武崩周文與百官推奉文帝上表勸進令吕思禮薛憕作表前後再奏帝尚執謙冲不許周文曰爲文能動至尊唯董公耳乃命紹爲第三表操筆便成表奏周文曰開進人意亦當如此也又曰胡方回爲北鎮司馬爲鎮脩表有所稱慶世祖覽而嗟羙問誰所作卽知方回召爲中書􅀶士賜爵臨涇子又曰邢劭善屬文每一文􅀄岀京師爲之􅁓貴讀誦俄遍逺近于時􅀽翻與范陽祖瑩位望通顯文筆之羙見稱先逹以劭藻思華贍深共嫉之毎洛中貴人拜職多慿劭爲謝章表甞有一貴勝􅀄授官大事賔食翻與劭俱在坐翻意主人託其爲讓表遂命劭作之翻甚不恱每告人云邢家小兒常客作章表自買黃􅁓冩而送之劭恐爲翻所害乃辭以疾北齊書曰盧詢祖有術學文章華羙爲後生之俊舉秀才至鄴趙郡李祖勳甞宴諸文士齊文宣使小黃門勑祖勲日蠕蠕旣破何無賀表使者佇立待之諸賔皆爲表詢祖俄頃便成其詞云昔十萬横行樊將軍請而受屈五千深入李都尉去以不歸時重其工三國典略曰周}
