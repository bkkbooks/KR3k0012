  - {type: variant, offset: 3098, length: 0, content: '', SBCK: 浙東判官武試大理評事齊揔由是拜衢州刺史孟容以揔無出人才一旦超爲郡守非舊制也封還詔書時乆絶論駮及孟容舉職班行爲之惴恐德宗開悟召對慰勉遂寢其事又曰李藩爲給事中}
