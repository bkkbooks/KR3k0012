  - {type: punctuation, offset: 1849, content: 『, id: KR3k0012_CHANT_594-bkkpn517}
  - {type: variant, offset: 1849, length: 0, content: '', SBCK: 能免是以近丗爲文競於詆訶吹毛取瑕刺骨爲戾覆似善詈多失折􅂨􅀂能闢禮門以懸規摽義路以植矩然後踰墻者折肱捷徑者滅跡何必躁言醜句詬病爲巧哉是以丘範運衡冝明體惡必使理有典刑辭有風軌揔法家之裁秉儒家之文不畏強禦氣留墨中無縱詭隨聲動簡外乃稱絶席之雄直方之舉也晉書曰何曽嘉平中爲司􅀠校尉撫軍校事尹橫慿寵作威姧利盈積朝野畏憚莫敢言者曽奏劾之朝廷稱焉又曰敬思王怡字元愉少拜散􅀐侍郎累遷散􅀐常侍黃門郎御史中丞值海西廢簡文帝登祚未解嚴大司馬桓温屯中堂吹警角恬奏劾温大不敬請科罪温視奏歎曰此兒乃敢彈}
  - {type: page-break, offset: 1849, content: '', id: KR3k0012_SBCK_594-6a}
  - {type: variant, offset: 1850, length: 1, content: 常, SBCK: 也又}
  - {type: variant, offset: 1852, length: 7, content: 唯聞李德林名及, SBCK: 劉毅以孝廉辟司􅀠都官從事京邑肅然毅將彈河南尹司􅀠不許曰攫獸之犬鼷蹈}
  - {type: variant, offset: 1860, length: 2, content: 與齊, SBCK: 背毅曰旣能攫獸不能殺䑕何損於犬投􅀓其背而去南史曰徐陵爲御史中丞時安成王頊爲司空以帝弟之尊權傾}
  - {type: page-break, offset: 1860, content: '', id: KR3k0012_SBCK_594-6b}
  - {type: variant, offset: 1863, length: 2, content: 作詔, SBCK: 野直兵鮑僧叡假王威風抑塞辭訟大臣莫敢言陵乃奏彈之文帝見陵服章嚴肅􅀂不可犯爲歛容正坐陵進讀奏狀時安成王殿上侍立仰視文帝流汗失色陵遣殿中侍史引王下殿自是朝廷肅然隋}
  - {type: variant, offset: 1866, length: 22, content: 移檄我正謂其是天上人豈言今日得其驅使復為我作, SBCK: 曰郎茂爲尚書左丞時工部尚書宇}
