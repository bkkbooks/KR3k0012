  - {type: variant, offset: 712, length: 3, content: 此聖主, krp: 秦𥘉之制改書爲奏又曰群臣奏事上書皆爲兩通一詣后一詣帝凡群臣之書通於天子者四品一曰章二曰奏三曰表四曰駮議文心雕龍曰昔陶唐之臣敷奏以言秦漢附之上書稱奏陳政事獻典儀上急變劾愆謬揔謂之奏奏者進}
  - {type: punctuation, offset: 716, content: ，, id: KR3k0012_CHANT_594-bkkpn210}
