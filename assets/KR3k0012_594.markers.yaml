  - {type: variant, offset: 969, length: 39, content: 國之語耳帝忿然作色而問其故濟具以荅因夫作威作福書之明戒天子無戲古人所慎唯察之於, SBCK: 去遁還通章州遂受短由}
  - {type: variant, offset: 971, length: 930, content: 語耳帝忿然作色而問其故濟具以荅因夫作威作福書之明戒天子無戲古人所慎唯察之於是帝意解追取前詔王隱晉書曰武帝泰始四年班五條詔書於郡國一曰正身二曰勤民三曰撫孤寡四曰敦本息華五曰去人事又曰楚王瑋既誅汝南王亮尋又詔云瑋矯詔行斬刑臨死出其懷中青紙以示監刑尚書劉頌流涕而言此詔書也受此而行謂為社稷今更為罪託體先帝枉受如此幸見申列晉書楊駿傳曰武帝疾篤未有顧命佐命功臣皆已沒矣朝臣惶惑計無所從而駿盡斥群公親侍左右因輒改易公卿樹其心腹會帝少間見所用者乃正色謂駿曰何得便爾乃詔中書以汝南王亮與駿夾輔王室駿恐失權寵從中書借詔觀之得便藏匿中書監華廙恐懼自往索之終不肯與信宿之間上疾遂篤又曰齊王冏入宮稱詔廢賈后后曰詔當從我出何詔也晉中興書曰初顯宗幼冲見王導恒拜又帝與導手詔則敬白中書作詔則曰敬問於是以為永制又曰桓玄左右稱玄為桓詔桓胤諫曰詔者施於辭令不以為稱謂也漢魏之主皆無此言願陛下稽古帝則令萬世可法玄曰此詔以行今宣勑罷之後周書曰冀儁善隸書特工摸寫魏文昌初為賀拔岳墨曹參軍及岳被害太祖引為記室時侯莫陳悅阻兵隴右太祖志在平之乃令儁偽作魏帝勑書與費也頭令將兵助太祖討悅儁依舊勑摸寫及代舍人主書等署與真無異太祖說費也頭已曾得魏帝勑書及見此勑不以為疑遂遣步騎一千受太祖節度隋書後齊正日侍中宣詔慰勞州郡國使詔牘長一尺三寸廣一尺雌黃塗飾上寫詔書三計會日侍中依儀勞郡國計吏問剌史大守安不及穀價麥苗善惡人間疾苦又班五條詔書於諸州郡國使人寫以詔牘一枚長二尺五寸廣一尺三寸亦以雌黃塗飾上寫詔書正會日依儀宣示使人使人歸以告剌史二千石一曰政在正身在愛人去殘賊擇良吏正決獄平徭賦二曰人生坐勤勤則不匱其勸率由桑無或煩擾三曰六極之人務加寬養必使生有以自救沒有以自給四曰長吏華浮奉客以求小譽逐末捨本政之所疾宜謹察之五曰人事意氣干亂奉公內外溷淆綱紀不設所宜糺劾又曰陳梁制諸用官式吏部先為白牒錄數十名吏部常參掌人共署奏勑或可或不其不用者更銓量奏請隨才補用以黃紙錄名八座通署奏可即出付典名而典以名怗鶴頭板整威儀送往得官之家其有特發詔授官者即宣付詔誥局作詔草奏聞勑可黃紙寫出門下門下詔請付外施行又曰周武平齊得李德林嘗謂群臣云我常曰唯聞李德林名及其與齊朝作詔書移檄我正謂其是天上人豈言今日得其驅使復為我作文書極為大異神武公紇豆毅荅, WYG: ''}
