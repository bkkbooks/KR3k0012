  - {type: variant, offset: 728, length: 25, content: 曰汝三皇時人也說將尚不能動萬乘主耶倫曰未遇知己道不, krp: 務農晁錯之兵術匡衡之定郊王吉之勸禮温舒之緩獄谷永之陳仙理旣切至辭亦通辦}
