  - {type: variant, offset: 3098, length: 0, content: '', krp: 浙東判官武試大理評事齊揔由是拜衢州刺史孟容以揔無出人才一旦超爲郡守非舊制也封還詔書時乆絶論駮及孟容舉職班行爲之惴恐德宗開悟召對慰勉遂寢其事又曰李藩爲給事中}
  - {type: variant, offset: 3100, length: 919, content: 所出為時流歎服議者以為自開元已來蘇頲齊澣蘇晉賈曾韓休許景先及逖為王言之最逖尤苦思文理精練晉史曰高祖令制誥之辭不得虛飾冗長必須陳其實行以正王言教尚書舜典曰帝曰契汝作司徒敬敷五教在寬春秋元命苞曰天垂文象人行其事謂之教教俲也言上為而下俲也文心雕龍曰教者俲也言出而民効也故王侯稱教昔鄭弘之守南陽條教為後所述乃事緒明也孔融之守北海文教麗而罕施乃治體乖也若諸葛孔明之詳酌庾稚恭之明斷並理得而詞中教之善也漢書曰京兆尹王遵出教令誡文心雕龍曰戒勑為文實詔之切者魏武稱作勑戒當指事而語勿得依違曉治要矣及晉武勑戒備告百官勑都督以兵要戒州牧以董司警郡守以恤隱勒牙門以禦衛有訓典焉戒者慎也禹稱戒之用休君父至尊在三同極漢高之勑太子東方朔之戒子亦顧命之作也及馬援以下各貽家戒班姬女戒足稱母師矣太公金匱曰武王曰五帝之誡可得聞乎太公曰黃帝曰余君民上搖搖恐夕不至朝故為金人三緘其口慎言語也東方生傳曰朔誡其子以上容應劭曰容身避容也首陽為拙柱下為工飽食安步以仕易農依隱玩世詭時不逢後漢書曰馬援兄子嚴敦並喜譏議而通輕俠客援在交阯還書誡之曰聞人之過失如聞親名耳可得聞而口不得言也好論人長短妄有善惡者寧死不願聞子孫有此行也龍伯高敦厚周慎謙約節儉吾愛之重之願汝曹效之杜季良豪俠好義憂人之憂樂人之樂有喪致客數郡畢至吾愛之重之不願汝曹效之效伯高不得猶為謹勑士所謂刻鵠不成尚類鶩者也效季良不得陷為天下輕薄子所謂畫虎不似反類狗也裴松之以為援此誡可謂切至之至不刊之訓矣杜恕家事戒曰張子臺視之似鄙樸人然其心中不知天地間何者為惡毅然如與陰陽合德作人如此富貴禍害何由而生陶淵明道誡曰夫天地賦命有生必有終自古賢聖誰能獨免汝輩既稚小不同生當思四海皆為兄弟之義鮑叔管仲分財無猜歸生伍舉班荊道舊遂能以此為成因喪立功它人尚爾況共父之人哉潁川韓元長漢末名士身處卿佐八十而終兄弟同居至于沒齒濟北汜雉春晉時操行人也七世同家人無怨色詩云高山仰止景行行止汝其慎哉顏延年廷詰云喜怒者有性所不能無常起於褊量而止於弘識然喜過則不重怒過則不威能以恬漠為體寬愉為器則為美矣大喜蕩心微抑則定甚怒煩性稍忍即歇故動無堡容舉無失度則為善也欲求子孝必先為慈將責弟悌務念為友雖孝不待慈而慈能植孝悌非期友而友亦立悌夫和之不備或應以不和猶信不足焉必, SBCK: ''}
