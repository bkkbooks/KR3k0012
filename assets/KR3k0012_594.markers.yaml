  - {type: variant, offset: 700, length: 0, content: '', krp: 馬援征㝷陽山賊上書除其竹林譬如嬰兒頭多蟣虱而剔之書奏上大悅出尚璽書數日黃門取頭虱章持入張璠漢記曰周舉上書言得失尚書郭度見之歎息上䟽願退位避舉常置其章於坐呉志曰東萊太史慈字子義爲郡奏曹史㑹郡與州有隙先聞者爲善時州章巳出郡守選慈以行至洛詣公車見州吏欲始通章慈曰章題署得無誤耶取視之先懷書刀截敗其章因共亡去遁還通章州遂受短由是知名晉書曰樂廣善清言而不長於筆將讓尹請潘岳爲表岳曰當得君意廣乃作二百句語述已之志岳因取次比之便成名筆時人咸云若廣不假岳之筆岳不取廣之旨無以成斯羙也後魏書曰董紹傳孝武崩周文與百官推奉文帝上表勸進令吕思禮薛憕作表前後再奏帝尚執謙冲不許周文曰爲文能動至尊唯董公耳乃命紹爲}
  - {type: variant, offset: 701, length: 0, content: '', krp: 三表操筆便成表奏周文曰開進人意亦當如此也又曰胡方回爲北鎮司馬爲鎮脩表有所稱慶世祖覽而嗟羙問誰所作卽知方回召爲中書博士賜爵臨涇子又曰邢劭善屬文每一文𥘉岀京師爲之𥿄貴讀誦俄遍逺近于時袁翻與范陽祖瑩位望通顯文筆之羙見稱先逹以劭藻思華贍深共嫉之毎洛中貴人拜職多慿劭爲謝章表甞有一貴勝𥘉授官大事賔食翻與劭俱在坐翻意主人託其爲讓表遂命劭作之翻甚不恱每告人云邢家小兒常客作章表自買黃𥿄冩而送之劭恐爲翻所害乃辭以疾北齊書曰盧詢祖有術學文章華羙爲後生之俊舉秀才至鄴趙郡李祖勳甞宴諸文士齊文宣使小黃門勑祖勲日蠕蠕旣破何無賀表使者佇立待之諸賔皆爲表詢祖俄頃便成其詞云昔十萬横行樊將軍請而受屈}
  - {type: variant, offset: 702, length: 2, content: 倫每, WYG: 千深入李都尉去以不歸時重其工三國典畧曰周武帝下令上書者並為表於皇太子以下稱啓後周書曰柳慶領記室時北雍州獻白鹿羣臣欲草表陳賀尚書蘇綽謂慶曰近代已來文章華靡逮於江左彌復輕薄洛陽後進祖述不已相公柄民宰物職典文秀宜製此表以革前弊慶操筆立成辭義兼美綽讀而笑曰枳橘猶自可移况才子也隋書曰魏楊遵彦命李徳林製讓尚書令表援筆立成不加竄㸃因大相賞異以示吏部郎中陸卬卬云已大}
  - {type: page-break, offset: 702, content: '', id: KR3k0012_WYG_594-6a, image: WYG0898/WYG0898-0411c.png}
  - {type: variant, offset: 702, length: 1, content: 倫, krp: 千深入李都尉去以不歸時重其工三國典略曰周武帝下令上書者並爲表於皇太子巳下稱啓後周書曰枊慶領記室時北雍州獻白鹿群臣欲草表陳賀尚書蘇綽謂慶曰近代巳來文章華靡逮于江左弥復輕薄洛陽後進祖述不巳相公柄民䡄物君職典文房冝製此表以革前弊慶操筆立成辭兼文質綽讀而笑曰枳橘猶自可移况才子也隋書曰魏楊遵彦命李德林製讓尚書令表援筆立成不加治點因大相賞異以示吏部郎中陸卬云巳見其文筆浩浩如河之東注比來所見後生制作乃㳙澮之流耳卭仍命其子乂與德林周旋戒乂汝}
  - {type: variant, offset: 704, length: 0, content: '', krp: 事宜師此人以爲模楷唐書曰令狐楚爲太原掌記鄭儋在鎭暴卒不及指撝後事軍中喧譁將欲有變中夜忽數十騎持刃迫楚至軍門諸將逼之令草遺表楚在白刃之中搦管立成讀示三軍無不感泣由是名聲益重典論曰陳琳阮瑀之章表書記今之俊也魏文帝與呉質書曰孔璋章表殊徤微爲繁冨丗說曰司馬景王令中書令虞松作表再呈輙不可意令松更定松思竭不能改心存之形於顔色鍾㑹察其憂問松松以實荅㑹取爲定五字松恱服以示景王景王曰不當尔耶誰所定也日鍾㑹向亦欲啓之㑹公}
  - {type: variant, offset: 705, length: 4, content: 光武詔書, SBCK: 之歎息上䟽願退位避舉}
  - {type: variant, offset: 705, length: 16, content: 光武詔書常歎曰此聖主也當何由一得, WYG: 其文筆浩浩如河之東注比來所}
  - {type: variant, offset: 705, length: 0, content: '', krp: 問不敢饕其能王曰如此可大用可令來㑹平旦入見至二皷乃岀出後王獨拊手歎息曰此眞王佐材也博物志曰漢承秦法群臣上書皆云昧死王莽慕古法改曰稽首}
  - {type: variant, offset: 707, length: 1, content: 詔, krp: 因而不改朝臣曰稽首輕冝稽首再拜奏陸士衡文賦曰奏平徹以閑雅漢}
