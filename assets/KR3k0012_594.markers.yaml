  - {type: variant, offset: 1951, length: 264, content: 才用無所不堪勝於騏驎鳳凰遠矣武帝大笑曰誠如公言唐書文苑傳曰徐安貞開元中為中書舍人集賢學士每上屬文作手詔多令安貞視草風俗通曰光武中興以來五曹詔書題鄉亭壁歲輔正多有闕謬永建中兗州剌史過翔箋撰卷別改著板上一勞而九逸崔元始正論曰俚語曰州郡記如霹靂得詔書但挂壁永平中詔禁吏卒不得繫馬宮外樹為傷害其枝葉又詔今雒陽幘工作幘皆二尺五寸圍人頭各有大小不可同度此詔不可從也蔡質漢儀曰延熹中京師遊俠有盜發順帝陵者賣御物於市市長追捕不得周景以尺一詔召司隸校尉左雄詣臺與三日期擒賊曹植說灌均上事令曰孤前令寫灌均所上孤章三臺九府所奏事及詔書一通置之座隅孤欲, SBCK: 將􅀫衛近臣趨侍堦庭}
