  - {type: variant, offset: 1844, length: 0, content: '', SBCK: 製讓尚書令表援筆立成不加治􅀧因大相賞異以示吏部郎中陸卬云巳見其文筆浩浩如河之東注比來所見後生制作乃㳙澮之流耳卭仍命其子乂與德林周旋戒乂汝每事宜師此人以爲模楷唐書曰令狐楚爲太原掌記鄭儋在鎭暴卒不及指撝後事軍中喧譁將欲有變中夜忽數十􅀐持刃迫楚至軍門諸將逼之令草遺表楚在白刃之中搦管立成讀示三軍無不感泣由是名聲益重典論曰陳琳阮瑀之章表書記今之俊也魏文帝與呉質書曰孔璋章表殊徤微爲繁冨丗􅀃曰司馬景王令中書令虞松作表再呈輙不可意令松更定松思竭不能改心存之形於顔色鍾㑹察其憂問松松以實荅㑹取爲定五字松恱服以示景王景王曰不當尔耶誰所定也日鍾㑹向亦欲啓之㑹公見問不敢饕其能王曰如此可大用可令來㑹平旦入見至二皷乃岀出後王獨拊手歎息曰此眞王佐材也􅀶物志曰漢承􅁗法群臣上書皆云昧死王莽慕古法改曰稽首光武因而不改朝臣曰稽首輕冝稽首再拜奏陸士衡文賦曰奏平徹以閑雅漢書雜事曰􅁗􅀄之制改書爲奏又曰群臣奏事上書皆爲兩通一詣后一詣帝凡群臣之書通於天子者四品一曰章二曰奏三曰表四曰駮議文心雕龍曰昔陶唐之臣敷奏以言􅁗漢附之上書稱奏陳政事獻典儀上急變劾愆謬揔謂之奏奏者進也敷于下情進乎上也􅁗始皇立奏而法家少文觀王綰之奏德辭質而義近李斯之奏驪山事略而意誣故無膏潤形於篇章矣自漢來奏事或稱上䟽儒雅繼踵殊采可觀􅀂夫賈􅁩之務農晁錯之兵術匡衡之定郊王􅁻之勸禮温舒之緩獄谷永之陳仙理旣切至辭亦通辦可謂識大體矣後漢群臣嘉言罔伏楊秉耿介於災異陳蕃憤懣於尺一骨骾得焉張衡指􅎥於史䜟蔡邕銓列於朝儀􅀶雅明焉魏代名臣文理迭興􅀂髙堂天文黃觀教學王㓪節省甄毅考課亦盡節而知治矣晉氏多難世交屯夷劉頌殷勤於時務温嶠懇惻於費役並體國之忠規矣夫奏之爲筆固以明允篤誠爲本辯析踈通爲首強志足以成務愽見足以窮理酌古御今治繁揔要此其體也典略曰王粲才旣髙辯鍾繇王㓪等雖名爲魏相至於朝廷奏議皆閣筆不敢措手唐書曰文宗}
