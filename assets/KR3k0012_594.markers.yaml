  - {type: variant, offset: 760, length: 0, content: '', WYG: 羣臣嘉言罔伏楊秉耿介於灾異陳蕃憤懣於尺一骨鯁得焉張衡指摘於史職蔡邕銓列於朝儀博雅明焉魏代名臣文理迭興若髙堂天文王觀教學王朗節省甄毅考課亦盡節而知治矣晉氏多難灾屯流移劉頌殷勤於時務温嶠懇切於費役並體國之忠規矣夫奏之為筆固以明允篤誠為本辨析踈通為首強志足以成務博見足以窮理酌古御今治繁總要此其體也典畧曰王粲才既髙辨鍾繇王朗等雖名為魏相至於朝廷奏議皆閣筆不敢措手唐}
  - {type: page-break, offset: 760, content: '', id: KR3k0012_WYG_594-8b, image: WYG0898/WYG0898-0412d.png}
  - {type: variant, offset: 760, length: 0, content: '', krp: 群臣嘉言罔伏楊秉耿介於災異陳蕃憤懣於尺一骨骾得焉張衡指􅎥於史䜟蔡邕銓列於朝儀博雅明焉魏代名臣文理迭興若髙堂天文黃觀教學王㓪節省甄毅考課亦盡節而知治矣晉氏多難世交屯夷劉頌殷勤於時務温嶠懇惻於費役並體國之忠規矣夫奏之爲筆固以明允篤誠爲本辯析踈通爲首強志足以成務愽見足以窮理酌古御今治繁揔要此其體也典略曰王粲才旣髙辯鍾繇王㓪等雖名爲魏相至於朝廷奏議皆閣筆不敢措手唐}
