  - {type: variant, offset: 1848, length: 0, content: '', SBCK: 曰近日諸侯章奏語太浮華有乖典實冝罰掌書記以誡其流李石曰古人因事爲文今人以文害事懲􅁦抑末實在其地之盛時論衡曰谷子雲唐子髙章奏百上筆有餘力劾奏文心雕龍曰案劾之奏所以明憲清國昔周之太僕繩愆糺繆奏有御史職主文法漢置中丞揔司案劾故位在鷙擊砥礪其氣必使筆端振風簡上凝霜者也觀孔光之奏董賢則實其姧回路粹之奏孔融則誣其釁惡名儒之與儉士固殊心焉􅀂夫傅咸果勁而辭案堅深劉隗切正而劾文闊略各有志也後之彈事迭相斟酌惟新日用而舊淮不羗然甲人欲全矢人欲傷術在糺惡勢入剛峭詩刺䜛人投􅂌犲虎禮疾無禮方之鸚猩墨翟非儒目以羊彘孟軻譏墨比諸禽獸詩禮儒墨旣其如此奏劾嚴文孰}
  - {type: page-break, offset: 1848, content: '', id: KR3k0012_SBCK_594-5b}
  - {type: punctuation, offset: 1849, content: ：, id: KR3k0012_CHANT_594-bkkpn516}
