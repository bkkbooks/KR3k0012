  - {type: variant, offset: 472, length: 223, content: 漢制度曰帝之下書有四一曰策書二曰制書三曰詔書四曰誡勑策書者編簡也其制書二尺短者半之篆書起年月稱皇帝以命諸侯王三公以罪免亦賜策而以隸書用尺一木兩行惟此為異也制書者帝者制度之命其文曰制詔三公皆璽封尚書令即重封露布州郡者詔書也其文曰告某官云如故事誡勑者謂勑某官他皆類此漢書曰誡勑剌史太守及三邊營官被勑文曰有詔勑某官是為誡勑世皆名此為策書失之甚也又曰淮南王安傳曰武帝方好藝文以安屬於諸父辨博善為文辭甚尊重之每為報書及賜師古曰書賜之也常召司馬相如等視草迺遣, SBCK: ''}
