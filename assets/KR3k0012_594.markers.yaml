  - {type: variant, offset: 710, length: 86, content: 歎曰此聖主也當何由一得見快矣等輩笑之曰汝三皇時人也說將尚不能動萬乘主耶倫曰未遇知己道不可故耳范曄後漢書曰隗囂賓客掾史多文才士每所有事當世才士大夫皆諷誦之故帝有所荅尤加意焉魏, SBCK: 置其章於坐呉}
