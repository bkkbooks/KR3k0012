  - {type: variant, offset: 753, length: 0, content: '', WYG: 敢饕其能王曰如此}
  - {type: variant, offset: 754, length: 0, content: '', WYG: 大用可令來會平旦入見至二鼓乃出出後王獨拊手歎息曰此真王佐才也博物志曰漢承秦法羣臣上書皆云昧死王莾慕法古改曰稽首光武因而不改朝臣曰稽首輕宜稽首再拜奏陸士衡文賦曰奏平徹以閑雅漢書雜字曰㤗初之制改書為奏又曰羣臣奏事皆為兩通一詣后二詣帝凡羣臣之書通於天子者四品一曰章二曰奏三曰表四曰駮議文心雕龍曰昔唐虞之臣敷奏以言秦漢之輔上書稱奏陳政事獻典儀上急變劾愆謬摠謂之奏奏者進也文敷於下情進於上也秦始立奏而法家少文觀王綰之奏勲徳辭質而義近李斯之奏驪山事畧而意逕}
