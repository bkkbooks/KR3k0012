  - {type: 'tls:seg', offset: 94, content: '', id: KR3k0012_CHANT_074-4a.7}
  - {type: variant, offset: 96, length: 3, content: 倚音寄, SBCK: 八激堤島釋名曰海中可居曰島到也人所奔到漢書曰田橫懼誅入居海島中孟康海中山曰島魏志曰王傾討句驪入沃沮人云嘗乗􅂳捕魚風吹十日東得一島上有人常以七月取童女沉海齊地記曰嶗山東北五里入海有管彦島是黃巾賊帥管承後也又曰東牟城東有盤島城東北有牛島常以五月海牛及海狸與島産乳其上嶼臨海記曰去郡七里東有樊續嶼嶼上空冢裏猶餘敗鼓角或呼爲樊府君墓今郡公田在此嶼下滸爾雅曰岸下地曰滸詩曰綿綿􅁑藟在河之滸岸爾雅曰重涯曰岸詩曰髙岸爲谷又曰淇則有岸晉書曰殷仲堪於江濵見流棺而􅁙焉旬日之間門溝忽起爲岸其夕有人自稱感君之恩堪因問岸何祥也荅曰水中有岸曰洲君將牧州言終而没至是果得荆州也水經注曰船官浦東即黃鵠山林澗甚美譙郡戴仲􅀂野服居之山下謂之黃鵠岸又曰昆明池有金堤石岸益州有金堤左思曰西踰金堤東曰玉津孫卿子曰泉生珠而岸不枯􅅺􅀃文曰􅅺黒􅁟在水中者也易曰井􅅺不食舊井無禽在井之下故稱􅅺井而􅅺則不可食書曰淮海惟楊州厥土惟塗􅅺詩含神霧曰夫齊之地處孟春之位海岱之間􅁟地汙􅅺流之所歸利之所聚傳曰晉楚將戰吕錡夢射之中之退入於􅅺論語曰子夏云雖小道必有可觀者焉致逺恐􅅺是以君子不爲小道令諸子書泥滯䧟不通也漢書溝洫志曰涇水一石其􅅺數斗且漑且畨長我禾黍又曰禹􅅺行乗橇東觀漢記曰隗囂將王元􅀃囂將背漢曰請以一丸􅅺爲大王東封函谷􅀜此萬丗一時也又曰鄧訓將黎陽宫兵屯漁陽遷護烏丸校尉黎陽宫故吏皆戀慕知訓好以青􅅺封書從黎陽歩推鹿車載青􅅺至上谷遺訓其得人心如此隴石記曰武都紫水有􅅺其色}
