  - {type: variant, offset: 516, length: 257, content: 驚墮水幾死而後至太傅又曰景元四年伐蜀鐘會領十餘萬眾分從斜谷入先遣牙門將許儀在前治道會在後行而橋穿馬足陷於是斬儀蜀志曰先主為曹公所追張飛距後據水斷橋無敢近者吳志曰凌統字公續從征合淝為右部都督時權徹軍還前部已發魏將張遼等奄至津北權使追還前兵兵已遠勢不相及也統率親近三百人扶杆桿權出敵已毀橋之兩板策權馬驅統復還戰王隱晉書曰杜預啟建河橋于富平津眾論以為殷周所都經聖賢而不作者必不可作故也預曰昔造舟為梁則河橋之謂也遂作橋成上從百官臨會舉杯勸預曰非君此橋不立也預曰非陛下之明臣亦不獲奉成聖制也眾咸稱善後魏書曰崔亮為雍州刺史城北, SBCK: 超隔}
