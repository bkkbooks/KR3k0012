  - {type: variant, offset: 2708, length: 214, content: 二渠灌溉於魏田數百頃魏益豊實後廢堰田荒魏時更修通天井堰鄴城西面漳水十八里中細流東注鄴城南二十里中作二十堰語林曰陳協數日輒進阮步兵酒一壺後晉文王修九龍堰阮舉協文王用之掘地得古承水銅龍六枚堰遂成也魏郡圖經曰愜山古堰也今謂之愜山即漢成帝時河決金堤蓋於此運土以塞河頗愜當時人心故謂之為愜山在今魏縣西戴延之西征記曰金瀍谷三水合處有千金堨音曷即魏陳思王所立引水東灌民今賴之又九州要記洛陽千金堨傍有九龍祠存又地理書曰穀水出為湖溝置千金堰以堰之, WYG: 四}
