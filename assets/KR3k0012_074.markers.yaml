  - {type: variant, offset: 104, length: 0, content: '', SBCK: 小石相支其間析析然抱朴子曰軍術曰地生瓦礫不去有大禍蔡伯喈青衣賦曰金生沙礫珠出􅑕􅅺盧子雲相風賦曰楚石雜結緑沙礫厠隋珠沙龍魚河圗曰􅃖尤兄弟八十一人並銅頭鐵額食沙石韓詩外傳曰孔子南遊􅃴楚至於阿谷之隧有女子佩瑱而浣者孔子曰彼婦人其可與言乎執觴以授子貢曰善爲之辝婦人荅曰阿谷之隧隱曲之汜欲飲則飲何問於婢子授子貢觴跪坐置之沙上曰禮不親授禮曰自西河至於流沙千里而遥雍州是也家語曰得其人如聚沙而􅀨之非其人如會聾而鼓之}
