  - {type: variant, offset: 2582, length: 91, content: 宜稼穡每年少雨以雪水溉田至是渠堰盡為賊所毀既地少林木難為修葺守珪誤祭祈禱經宿而山水暴至大漂材木塞澗而流直至城下守珪使取充堰於是水道復舊晉後略曰張方圍京邑決千金堰水溝渠枯涸井多無泉鄴中, SBCK: 見人或聞歌􅀏之聲蓋􅀑物也鄱陽}
