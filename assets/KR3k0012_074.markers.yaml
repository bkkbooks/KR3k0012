  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_074-1a, image: WYG0893/WYG0893-0592a.png}
  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第七十四}
  body:
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 九塘隄島嶼滸岸泥礫沙塘録異傳曰文翁者廬江人爲兒童時乃有神異及長當起歷下陂以作田文翁晝日斫伐柴薪以爲陂塘其夜忽有數百頭野猪以􅈹一戴土着柴中比曉成塘吴地記曰壇塘一名陌城夫差十二年旣殺子胥後悔之與群臣臨江作塘創設􅀕奠百姓因以立廟吴越春秋云夫差設􅀕杯動酒盡劉道眞錢塘記曰防海大塘在縣東去邑一里徃時郡議曹華家信冨乃議立此塘以防海水始開募有能運土石一斛即與錢一􅂛旬日之間來者雲集塘未成而譎不復取於是載􅁟石者棄置而去塘以之成旣遏絶潮源一境􅂪利也述異記曰今烏江長亭亭下有騅馬塘即當時烏江亭長艤舟待項王處南越志曰丹城縣有釡塘金沙自是而出裴淵廣州記曰彰平縣朱沙塘水如絳魚鼈皆赤荆州記曰長沙郡東十餘里有郡人劉壽墓有石闕四所壽漢順帝時爲司徒其東有􅀛塘周廽四十五里有靈􅀛出其中故塘因名焉盛弘之荆州記曰始安熈平縣東南有山山西其形長狹水從下注塘一日再减盈縮因名爲朝夕塘幽明録又載幽明録曰耒陽縣東北有蘆塘淹地}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_074-1b}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 九塘隄島嶼滸岸泥礫沙塘録異傳曰文翁者廬江人為兒童時乃有神異及長當初厯下岐以作田文翁盡日斫伐柴薪以為陂塘其夜忽有數百頭野猪以鼻戴土著柴中比曉成塘吳地記曰壇塘一名陌城夫差十二年既殺子胥後悔之與群臣臨江作塘創設祭奠百姓因以立廟吴越春秋云夫差設祭杯動酒盡劉道真錢塘記曰防海大塘在縣東去邑一里往時郡議曹華家甚富乃議立此塘以防海水始開募有能運土石一斛即與錢一升旬日之間來者雲集塘未成而譎不復取於是載土石者棄置而去塘以之成既遏絶潮源一境蒙利也述異記曰今烏江長亭亭下有騅馬塘即當時烏江亭長艤舟待項王處南越志曰丹城縣有釜塘金沙自是而出裴淵廣州記曰彰平縣朱沙塘水如絳魚鼈皆赤荆州記曰長沙郡東十餘里有郡人劉夀墓有石闕四所夀漢順帝時為司徒其東有龜塘周廽四十五里有靈龜出其中故塘因名焉盛𢎞之荆州記曰始安熈平縣東南有山山西其形長狹水從下注塘一日再見盈縮因名為潮汐塘幽明録曰耒陽縣東北有廬塘淹地}
