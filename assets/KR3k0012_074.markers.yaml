  - {type: variant, offset: 13, length: 3, content: 榷音角, WYG: 易曰井泥不食舊井无禽在井之下故稱泥井而泥則不可食書曰淮海惟揚州厥土惟塗泥詩含神霧曰夫齊之地處孟春之位海岱之間土地汚泥流之所歸利之所聚傳曰晉楚將戰吕錡夢射月中之退入於泥論語曰子夏云雖小道必有可觀者焉致遠恐泥是以君子不為小道今諸子書泥滯䧟不通也去聲漢書溝洫志曰涇}
