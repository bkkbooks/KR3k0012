  - {type: variant, offset: 1573, length: 1005, content: 始於此橋因名萬里橋地理志曰漳水出上黨鄴中趙武帝於漳水造浮橋接紫陌故號曰紫陌橋祖台之志怪曰義興郡溪渚長橋下有蒼蛟吞噉人周處執劍橋側伺久之遇出於是懸自橋上投下蛟背而㓨焉蛟數創流血舟溪自郡渚至太湖句蒲乃死水經注曰上虞縣亦名虞賓舜避丹朱於此故以名縣百官從之故縣北有百官橋亦云禹與諸侯會事訖因相虞樂故曰上虞二說不同未詳孰是國語曰天根見而水涸水涸而成梁故夏令曰十月而成梁不使民患涉也紀年曰周穆王七年大起師東至于九江架黿鼉以為梁崔鴻國春秋後燕錄曰慕容垂與劉牢之戰于五丈橋津晉大敗車騎將軍慕容德等引兵要牢之五丈橋牢之馳馬跳五丈澗會符丕救至而免孟子曰子產為政以其乘車濟人於溱洧故孟子曰可為惠而不知為政抱朴子曰尾生與婦人期橋下水至不去以至溺死雖有信不如無也王充論衡曰高麗國侍婢有氣如雞子來下之有娠生子名東明東明善王恐其害國欲殺之東明走至掩水以弓繫水魚鼈為梁既度而魚鼈解散諸葛亮集曰亮上事曰臣先進孟琰據武功水東司馬懿因水以二十日出騎萬人來攻琰營臣作東橋賊見橋垂成便引兵退堰埭吳錄曰句容縣大皇時使陳勳鑿開水道立十二埭以通吳會諸郡故舡行不復由京口晉中興書曰兗州既平謝玄患水道險澀糧運艱難壅呂梁水立七埭以利運漕又曰謝安築埭於新城北百姓賴之故名召伯埭述征記曰秦梁埭到召伯埭二十里召伯埭到三枚埭十五里三枚埭到鏡梁埭十五里晉書曰李矩與汝南太守袁孚率眾修洛陽千金堰以利運漕梁典曰天監十三年魏降人王足陳計求堰淮水以灌壽陽引北方童謠曰荊山為上格浮山為下格潼泡為激溝并灌鉅野澤武帝遂發徐楊築之令太子右衛率康絢護堰作役人及戰士二十萬於鐘離南起浮山北抵巉石依岸以築土合脊眷於中流十四年四月堰將合淮水漂疾輒復決潰眾會之或謂江淮之間多有蛟能乘風雨決壞崖岸其性惡鐵因是引東西二冶故鐵器大則釜鬲小則钁鋤數千萬斤沉於堰所謂不能合乃伐樹為井干填以巨石加土其上緣淮百里內岡陵木石無巨細必盡負擔者肩背穿夏日疾疫死者相枕蠅䖟晝合是冬又寒甚淮泗盡凍士死者十七八至十五年四月堰乃成其長九里下闊百四十丈上廣四十五尺高二十丈軍人安堵列居于上其水清潔俯視居人墳墓了然皆在其下其壽陽戍因移置八公山上夾淮數百里皆水之所淹人謂絢曰四瀆天所以節宣其氣不可久塞既而昏霧四日霧解而堰決殺萬人其聲若雷聞三百里水中怪物隨流而下或人頭魚身龍形鳥首殊類詭狀不可勝名今號其處為荊山堰今渦口東岸是後周書曰賀蘭祥太祖以涇渭溉灌之處渠堰廢毀乃命祥修造富平堰開渠引水東注於洛功用既畢民獲其利唐書張守珪為都督瓜州也地, SBCK: ''}
