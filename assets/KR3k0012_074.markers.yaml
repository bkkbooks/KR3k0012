  - {type: variant, offset: 5, length: 5, content: 橋說文曰橋, SBCK: 頃其􅀷不可測中有大魚常至五日一躍􅁬出}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_074-2a}
  - {type: variant, offset: 5, length: 1, content: 橋, WYG: 頃其深不可測中有大魚常至五日一躍奮出水大可三圍其狀異常每躍出水則小魚奔迸隨水上岸不可勝計述異記云廬塘有蛟魚五日一化或為美婦人或為男子至於變亂尤多郡人相畏故不敢有害心蛟亦不能為計後為雷電殺之此塘遂涸劉欣期交州記曰鑿南塘者九真路之所經去州五百里馬援積石為塘以通於海達於象浦建標為南極之界淮南子曰壞塘取龜發屋求狸桀跖之徒君子不為堤爾雅䟽墳大防也謂堤雖水所皆有而河墳最大也梁書曰始興忠武王憺音炎字僧達為荆州刺史遇大江溢堤壞憺親率將吏冐雨築之水勢甚猛人皆恐懼或請避之憺曰王尊尚欲身塞河堤我心何獨以危避登堤嘆息遂輟膳而刑白馬以祭江神以身為百姓請命言終而水退堤出郡國志曰長沙金牛堤漢武時有異人牽金牛走入此堤内因以名焉水經注曰涿郡王尊自益州刺史遷東郡太守河水盛溢泛浸瓠子金堤尊躬率吏民投沉白馬祈水神河伯親執圭璧請身填堤廬居其上吏民皆走尊立不動水齊足而止公私壯其勇節又曰漢安帝永初七年令謁者太山矛岑於石門東積石八所皆如小山以捍衝波謂之八激堤島釋名曰海中可居曰島到也人所奔到漢書曰田横懼誅入居海島中魏志曰王傾討句驪入沃沮人云嘗乗船捕魚風吹十日東得一島上有人常以七月取童女沉海齊地記曰嶗山東北五里入海有管彦島是黄巾賊帥管承後也又曰東牟城東有盤島城東北有牛島常以五月海牛及海狸與鳥產乳其上嶼臨海記曰去郡七里東有樊續嶼嶼上空冢裡猶餘敗鼓角或呼為樊府君墓今郡公田在此嶼下滸爾雅曰岸下地曰滸詩曰綿綿葛藟在河之滸岸爾雅曰重涯曰岸詩曰髙岸為谷又曰淇則有岸晉書曰殷仲堪於江濵見流棺而葬焉旬日之間門溝忽起為岸其夕有人自稱感君之恩堪因問岸何祥也答曰水中有岸曰州君將得州言終而沒至是果得荆州也水經注曰船官浦東即黄鵠山林間甚美譙郡戴仲若野服居之山下謂之黄鵠岸又曰昆明池有金堤石岸益州有金堤左思曰西踰金堤東越玉津孫卿子曰泉生珠而岸不枯泥}
