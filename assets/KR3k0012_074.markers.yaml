  - {type: variant, offset: 100, length: 0, content: '', SBCK: 紫而粘貢之用封璽書故詔誥有紫􅅺之美帝王丗紀曰周穆王征犬戎得錬剛赤刀用之割玉如割􅅺焉神仙傳曰董奉君居廬山嘗大旱縣令于士彦詣奉􅀃大旱之意奉因仰視其屋曰貧家屋皆見天不可以得􅀨如何令解其意身率將吏爲起屋屋成當􅅺壁作人巳掘􅁟欲取江水沃􅅺奉曰不須日暮當􅀨也其夜果大􅀨聚壤成􅅺頋微廣州記曰鬰林郡山東南有池有石牛在池下民常祀之歳旱百姓殺牛祀之以牛血和􅅺􅅺石牛背祠畢天􅀨洪注洗背􅅺盡而後晴曾子曰白沙在􅅺與之皆黒淮南子曰琬琰之玉在汙􅅺之中雖廉者不釋也丗􅀃}
