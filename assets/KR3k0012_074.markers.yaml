  - {type: variant, offset: 72, length: 1, content: 莫, SBCK: 書曰始興忠武王憺音淡字僧逹爲荆州刺史遇}
  - {type: variant, offset: 74, length: 0, content: '', SBCK: 江溢堤壞憺親率將吏冒􅀨築之􅀨勢甚猛人皆恐懼或請避之憺曰王尊尚欲身塞河堤我心何獨以危登堤歎息遂輟膳而刑白馬以􅀕江神以身爲百姓請命言終而水退堤出郡國志曰長沙金牛堤漢武時有異人牽金牛走入此堤内因以名焉水經注曰􅃰郡王尊自益州刺史遷東郡太守河水盛溢泛浸瓠子金堤尊躬率吏民投沉白馬祈水神河伯親執圭璧請身填堤廬居其上吏民皆走尊立不動水齊足而止公私壯其勇節水經曰漢安帝永􅀄七年今謁者太山于岑}
