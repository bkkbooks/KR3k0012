  - {type: variant, offset: 60, length: 0, content: '', WYG: 鄧訓將黎陽宫兵屯漁陽遷䕶烏丸校尉黎陽宫故吏皆戀慕知訓好以青泥封書從黎陽歩推鹿車載青泥至上谷遺訓其得人心如此隴右記曰武都紫水}
  - {type: variant, offset: 60, length: 0, content: '', krp: 鄧訓將黎陽宫兵屯漁陽遷護烏丸校尉黎陽宫故吏皆戀慕知訓好以青泥封書從黎陽歩推鹿車載青泥至上谷遺訓其得人心如此隴石記曰武都紫水}
  - {type: variant, offset: 61, length: 3, content: 狐綏綏, WYG: 泥其色亦紫而粘貢之用封璽書故詔誥有紫泥之封帝王世紀曰周穆王征犬戎得錬剛赤刀用之割玉如割泥焉神仙傳曰童奉君居廬山嘗大旱縣令于士彥詣奉說大旱之意奉因仰視其屋曰貧家屋皆見天不可以得雨如何令解其意身率將吏為起屋屋成當泥壁作人已掘土欲取江水沃泥奉曰不湏日暮當雨也其夜果大雨聚壤成泥顧㣲廣州記曰鬰林郡山東南有池有石牛}
