  - {type: variant, offset: 3956, length: 484, content: 金承土帝圖讖識所謂白帝朱宣者也故稱少昊號金天氏在位百年而崩河圖曰大星如虹下流華渚女節氣感生白帝朱宣宋均生云朱宣少昊氏也古史考曰窮桑氏嬴姓也以金德王故號金天氏或曰宗師太昊之道故曰少昊遁甲開山圖曰帝少昊死死葬雲陽山傳曰魯昭公十七年郯子來朝昭子問焉曰少皞氏鳥名官何也郯子曰吾祖也我高祖少皞摯之立也鳳鳥適至故紀於鳥為鳥師而鳥名鳳鳥氏歷正也玄鳥氏司分者也伯趙氏司至者也青鳥氏司啟者也丹鳥氏司閉者也祝鳩氏司徒也瞗鳩氏司馬也鳲鳩氏司空也爽鳩氏司寇也鶻鳩氏司事也五鳩鳩民者也五雉為五工正利器用正度量夷民者也九扈為九農正扈民無淫者也魏曹植少昊贊曰祖自軒轅青陽之裔金德承土儀鳳帝世官鳥號名官殊職別系農正扈民各有品制顓頊高陽氏史記曰顓頊靜淵以有謀䟽通而知事養材以任地載時以像天依鬼神以制義治氣以教化絜誠以祭祀帝生子曰窮禪顓頊崩而玄囂器之孫高辛立是為帝嚳與嚳同古史考曰高陽氏妘姓以水德王帝王世紀曰帝顓頊高陽氏黃帝之孫昌意之子姬姓也母曰景僕蜀山氏女為昌意正妃謂之女樞金天氏之末女樞生顓頊於若水首戴干戈有聖德父昌意雖黃帝之嫡以劣降居若水為諸侯顓頊生十年而佐少昊十二年而冠二十而登帝位平九黎之亂怪火, SBCK: 人}
