  - {type: variant, offset: 4710, length: 6, content: 顓頊死即復蘇, SBCK: 中候運行曰帝堯率群臣東沉于雒刻壁書曰天下臣放勛德薄施行不元元善也尚書大傳曰堯八眉舜四童子八者如八字也又曰堯舜之王天下一人不刑而四海治春秋元命包曰堯眉八彩是謂通明暦象日月琁璣玉衡大戴禮曰宰我曰請問帝堯孔子曰髙辛之子也曰放勛其仁如天其智如神就之如日望之如雲冨而不驕貴而不䂊黃斧紼衣彤車乗白馬六韜曰太公曰帝堯王天下之時金銀珠玉弗服錦繡文綺弗衣竒恠異物弗聽宫垣屋室弗崇桶椽柱楹不藻飾芧茨之蓋弗剪齊黻黼之絓履不弊盡不更爲也滋味不重糝弗食也温飰煖羮不酸餧不易也不以私曲之故留耕種之時削心約志從事無予爲莊子曰昔堯之治天下也使天下人欣欣焉人樂其性又曰堯治天下之民平海內之政徃見四子於姑射之山汾水之陽窅然喪其天下四子許由齧缺披衣王倪也窅然猶幽然自失之皃言堯以有事之心至於無爲之人故亦無所用也又曰堯觀于華封華封人曰嘻請祝聖人使聖人壽使聖人富使聖人多男子堯曰多男子則多懼多冨則多事多壽則多辱封人曰夫聖人鶉居鷇音扣食鳥行而無章天下有道則與物皆昌天下無道則脩德就間千歳厭丗去而上仙乗彼白雲至于帝郷三患莫至身常無殃又曰堯治天下伯成子髙立爲諸侯及堯授舜舜授禹子髙辭爲諸侯而耕禹徃見之曰堯治天下吾子立爲諸侯堯授舜舜授余吾子辭之敢問何也子髙曰昔堯治天下不賞而人勸不罰而人畏子今賞罰而人且不仁德自此衰刑自此立後世之亂自此始矣無落吾事俋俋音蟄乎耕而不頋尸子曰人之言君天下者瑶臺九累而堯白屋黼衣九種而堯大布宫中三市而尭鶉居珎恠逺味而尭糲飯菜粥騏驎青龍而堯素車玄駒又曰堯舜有天下四海之內皆治而丹朱啇均不與焉而謂皆治者衆也又曰舜授天下顔色不變堯以天下與舜顔色不變知天下無能益損於巳也又曰人戴冠履莫不譽堯非桀敬士侮慢故敬侮之譽毀之非其取也韓子曰堯之王天下冬日鹿裘夏日􅁑衣茅茨不剪採椽不斵糲梁之食藜藿之羮雖監門之養不敵於此矣又曰由余謂􅁗穆公曰昔堯有天下飯於土䡄飲於土形其􅁟南至交阯北至幽都東西日月所出入者無不賔服吕氏春秋曰堯有子十人不與其子而授舜孟子曰堯使九男二女事舜也又曰堯以天下讓於子州支父對曰以我爲天子猶之可也雖然我適有幽憂之病方將治之未暇在天下也幽隱也詩曰如有隱憂天下重物也而不以天下害其生者故可託天下}
