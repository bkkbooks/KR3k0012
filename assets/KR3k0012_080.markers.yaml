  - {type: variant, offset: 4703, length: 0, content: '', SBCK: 圖曰堯時與群臣賢智到翠嬀之淵大􅀛􅀒圖來出授堯勑臣下寫取寫畢􅀛還水中昜坤靈圖曰其母萌之玄雲入户蛟龍守門母爲慶都也天皇之}
