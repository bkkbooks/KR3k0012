  - {type: variant, offset: 4679, length: 0, content: '', WYG: 母曰慶都孕十四月而生堯於丹陵名曰放勛或從母姓伊祁氏年十五而佐帝摯授封於唐為諸侯身長十尺常夢攀天而上故年二十而登帝位以火承木都平陽置敢諫之鼔天下大和命羲和四子羲仲羲叔和仲和叔分掌四岳諸侯有苗氏處南蠻而不服堯征而克之于丹水之浦乃以尹壽許由為師命伯䕫訪}
