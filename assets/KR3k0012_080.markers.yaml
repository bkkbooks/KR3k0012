無所畏忌入水不溺入火不熱斫撻無傷痛至和者無物能傷溺熱痛癢實由矜懼也乘空如履實寢虛若處床雲霧不閡其視雷霆不亂其聽美惡不汨其心山谷不躓其步神行而已黃帝既悟然自得又二十有八年天下大治幾若華胥氏之國而帝登假假當為遐莊子曰北門成問於黃帝張咸池之樂於洞庭之野吾所聞之而懼復聞之而惑帝曰吾奏之以人徵之以天行之以義禮建之以太清以人奏之以天徵之天人合德爾乃知以春為禮以狄為義太清乃建又曰黃帝將見大隗于具茨之山方明為御昌寓驂乘張若隰明前馬昆閽滑稽後車至於襄城之野七聖皆迷無所問途適遇牧馬童子問途焉曰若知具茨之山乎曰然黃帝曰異哉小童非徒知具茨之山又知大隗之所存乎曰然黃帝曰吾子之事雖然請問為天下小童辭黃帝又問小童曰天下者亦奚以異乎收馬者哉亦去其害馬者而已矣馬以過分為害黃帝再拜稽首稱天師而退又曰黃帝聞廣成子在於崆峒之上故往見之曰敢問至道之精廣成子曰自而治天下雲氣不待族而雨草木不待黃而落日月之光益以荒矣又奚足以語至道黃帝退捐天下築特室席白茅間居三月復往邀之廣成子南首而臥黃帝從下風膝行而進再拜稽首而問曰聞吾子達於至道敢問治身柰何而可而以長久廣成子蹶然而起曰善哉問乎來吾語汝至道之精窈冥冥至道之極昏默默無視無聽抱神以靜形將自正我修身千二百歲矣吾形未嘗衰黃帝再拜稽首曰廣成子之謂天矣尸子曰子貢曰古者黃帝四面信乎孔子曰黃帝取合己者四人使治四方不計而耦不約而成此之謂四面韓子曰師曠謂晉平公曰黃帝合鬼神於西太山之上駕象車六交龍畢方並館蚩尤居前風伯進掃雨師洒道乃作為清角之樂淮南子曰黃帝治天下而力牧太山稽輔之力牧太山稽輔則黃帝之師也孟子曰王者師臣也以理日月星辰之治陰陽之氣節四時之度正律曆之數明上下等貴賤使強不得暴寡人民保命不夭安能性命不夭遊也歲時熟而不凶不凶無災害也百官正而無私皆在公也上下調而無尤君調臣和無尢過也法令明而不闇輔佐公而不阿卿土公正不阿意曲從田者不侵畔漁者不爭隈隈曲深處無所聚也道不拾遺市不豫價城郭不關關閉邑無盜賊商旅之人相讓以財狗彘吐菽粟於道路而無忿爭之心於是日月精明星辰不失其道風雨時節五穀登熟虎豹不妄噬鷙鳥不妄摶鳳凰翔於庭麒麟擾於郊青龍進駕飛黃伏皂飛黃出西方狀如狐頂上有角乘之壽千歲皂櫪也諸北儋耳之國莫不獻其貢職皆北極之夷國論衡曰謚法靜民則法曰黃帝者安民之謚非得道之稱也蔣子萬機論曰黃帝之初養性愛民不好戰伐而四帝各以方色稱號交共謀之邊城日驚介冑不釋黃帝歎曰夫君危于上民安于下主失於國其臣再嫁厥病之由非養寇耶今處民萌之上而四盜亢衡震于師於是遂即營疊以滅四帝向令黃帝若不龍驤虎變而與俗同道則其民臣亦害于四帝矣抱朴子曰黃帝生而能言役使百靈可謂天授自然之體者猶復不敢端坐而得道故陟王屋而受丹經到鼎湖而飛流珠登崆峒而問廣成上具茨而事大隗適東岱而奉中黃入金谷而諮老子論道養則質玄素二女精推步則訪山稽力牧講占候則詢風著體診則受雷歧審攻戰則納五音之策窮神奸則記曰澤之亂相地理則書青烏之說救傷殘則綴金冶之術故能畢記祕要窮盡道真又曰昔黃帝東到青丘過風山見紫府先生受三皇內文以劾召萬神南到負隴蔭建水觀百靈之所登採若戟之華飲丹巒之水西見中黃子受九品之方過崆峒從廣成子受自然之經北到洪隄上具茨見大隗君黃蓋童子授神芝圖還陟王君居得神丹注說到峨嵋山見皇人於玉堂又曰汲郡塚中竹書言黃帝既仙去其臣有左徹者削木為黃帝之像帥諸侯朝奉之故司空張茂先撰博物志亦云黃帝仙去其臣思戀罔極或刻木立像而朝之或取其衣冠而葬之或立廟而四時祠之孫綽子曰黃帝之遊天衢奏鈞天之鼓建日月旗乘琱雲之輿駕八翼之龍彭祖前驅松喬挾轂先景流而不返長風逐而不及發軔紫宮不崇朝而匝六合也符子曰黃帝將適昆虞之丘中路逢容成子乘翠華之蓋建日月之旗驂紫虬御雙鳥黃帝命方明避路謂容成子曰吾將釣于一鑿栖于一丘又曰黃帝謂其友無為子曰我勞天下矣疲於形役請息駕於玄圃子且代之焉能棄我之逸而為君之勞哉乃攀龍而俱去晉牽牽秀黃帝頌曰邈矣軒轅應天載靈通幽遠覽觀象設形誕敷厥訓彝倫攸經德從風流化與雲征皇猷允塞地平天成爰登方岳封禪勒成紛然鳳舉龍騰太清違落九土陟彼高冥民斯攸慕涕泗沽纓遐而不墜式頌德聲帝王世紀曰有巢氏已降至黃帝為三皇號中古少昊金天氏帝王世紀曰少昊帝名摯字青陽姬姓也母曰女節黃帝時有大星如虹下流華渚女節夢接意感生少昊是為玄囂降居江水有聖德邑于窮桑以, krp: ''}
