  - {type: variant, offset: 4714, length: 2, content: 復蘇, WYG: 政七十載景星出翼鳯凰來庭鄭𤣥注曰翼朱鳥宿朱草生郊嘉禾孳連甘露潤液醴泉出山朱草可以染服者嘉美也書序曰唐叔得禾異畝同穎因名之為孳連醴亦甘修壇河雒榮光起河休氣四塞休美也榮光五色從河出美氣四塞燭燿熠熠也白雲起回風揺龍馬御甲赤文緑色龍形像馬也赤熛怒之使也甲所以藏圖赤文色而緑地也臨壇止霽吐甲圖而帶足霽齊赤止也帶足者帶去也又中候運行篇曰帝堯率羣臣東沉刻璧于雒又曰天子臣放勛德薄施行不元元善也尚書大傳曰堯八眉舜四瞳子八者如八字也又曰堯之王天下一人不刑而四海治春秋元命苞曰堯眉八彩是謂通明厯象日月璇璣玉衡大戴禮曰宰我曰請問帝堯孔子曰髙辛之子也曰放勛其仁如天其智如神就之如日望之如雲富而不驕貴而不豫黄斧紼衣彤車白馬六韜太公曰帝堯王天下之時金銀珠玉弗服錦繡文綺弗衣竒怪異物弗御宫垣屋室弗崇桷椽柱楹不藻茅茨之堦弗剪黼黻之絓履不弊盡不更為也滋味不重糝弗食也温飯煖羮不酸餧不易也不以私曲之故留耕種之時削心約志從事于國政莊子曰昔堯之治天下也使天下之人欣欣焉人樂其生又曰堯治天下之民平海内之政往見四子於姑射之山汾水之陽窅然喪其天下四子許由齧缺被衣王倪也窅然猶幽然自失之貌言堯以有事之心至於無為之人故亦無所用也又曰堯觀于華封華封人曰嘻請祝聖人使聖人壽使聖人富使聖人多男子堯曰多男子則多懼多富則多事多壽則多辱封人曰夫聖人鶉居而鷇音扣食鳥行而無章天下有道則與物皆昌無道則修德就閒千嵗厭世去而上僊乗彼白雲至于帝鄉三患莫至身常無殃又曰堯治天下伯成子髙立為諸侯及堯授舜舜授禹伯成子髙辭為諸侯而耕禹往見之曰堯治天下吾子立為諸侯堯授舜舜授余吾子辭而耕敢問何也子髙曰昔堯治天下不賞而民勸不罰而民畏子今賞罰而民且不仁德自此衰刑自此立後世之亂自此始矣無落吾事俋俋音邑乎耕而不顧尸子曰人之言君天下者瑶臺九累而堯白屋黼衣九種而堯大布宫中三市而堯鶉居糲飯菜粥麒麟青龍而堯素車𤣥駒又曰堯舜有天下四海之内皆治而丹朱商均不與焉而謂皆治者妄也又曰舜受天下顔色不變堯以天下與舜顔色不變知天下無能損益於己也又曰人戴冠躡履譽堯非桀而士或侮慢之知毁譽非其取也韓子曰堯之王天下冬日鹿裘夏日葛衣茅茨不剪桷椽不斵糲粱之食藜藿之羮雖監門之養不敵於此矣又曰由余謂秦穆公曰昔堯有天下飯於土簋飲於土鉶其土南至交阯北至幽都東西日月所出入者無不賔服吕氏春秋曰堯有子十八人不與其子而授舜孟子曰堯使九男二女事舜也又曰堯以天下讓於子州支父對曰以我為天子猶之可也雖然我適有幽憂之病將治之未暇在天下也幽隱也詩云如有隱憂天下重物也而不以天下害其生者故可託天下}
