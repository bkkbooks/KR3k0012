  - {type: variant, offset: 4678, length: 0, content: '', WYG: 古史考曰髙辛氏或曰房姓以木德王張顯析言曰髙辛氏初生自言其名其居民終無迷謬魏陳王曹植帝嚳賛曰祖自軒轅𤣥囂之裔生言其名木德帝世撫寧天地神靈察物教彌四海明並日月帝摯帝王世紀曰帝摯之母於四人之中其班最下而摯年兄弟最長故得登帝位封異母弟放勛為唐侯摯在位九年政軟弱而唐侯德盛諸侯歸之摯服其義乃率其羣臣造唐朝而致禪因委志心願為臣唐侯於是知有天命乃受帝禪而封摯於髙辛氏事不經見漢故議郎東海衞宏所傳云耳帝堯陶唐氏帝王世紀曰帝堯陶唐氏祁姓}
