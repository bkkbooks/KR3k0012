  - {type: variant, offset: 4726, length: 0, content: '', SBCK: 至今􅀍之􅀽子法書曰堯避舜於濟隂今定陶有堯冡信乎符子曰許由謂堯曰坐于華殿之上靣􅀟闕之下君之榮願亦巳足矣夫堯曰坐于華殿之上森然而松生于棟余立於櫺扇之內霏焉而雲生于牖雖靣􅀟闕無異乎崔嵬之冠蓬萊雖背墉墎無異乎廻巒之縈崑崙余安知其所以}
  - {type: variant, offset: 4726, length: 1, content: 不, WYG: 至今被之袁子法書曰堯}
  - {type: variant, offset: 4726, length: 0, content: '', krp: 至今𬒳之袁子法書曰堯避舜於濟隂今定陶有堯冡信乎符子曰許由謂堯曰坐于華殿之上靣雙闕之下君之榮願亦巳足矣夫堯曰坐于華殿之上森然而松生于棟余立於櫺扇之內霏焉而雲生于牖雖靣雙闕無異乎崔嵬之冠蓬萊雖背墉墎無異乎廻巒之縈崑崙余安知其所以}
