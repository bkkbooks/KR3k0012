  - {type: variant, offset: 4723, length: 0, content: '', WYG: 治天下也舜為司徒契為司馬禹為司空后稷為大田師奚仲為工其導萬民也水處者木谷處者牧陸處者農地宜其事事宜其械械宜其用用宜其人澤臯織網陵阪耕田得以所有易所無以工易所拙是故離叛者寡而聽從者衆譬若播棊於地員者走屋方者處髙各從其所安又曰人之所以樂為天子者以窮耳目之欲而適身體之便也今髙臺層榭人之所麗也而堯採椽不斵素題不枅言梁柱相折矩不著枅櫨也珍怪竒味人之所美也堯糲粱之飯藜藿之羮文錦狐白人之所好也而堯布衣掩形鹿裘禦寒養生之具不加厚而増之以大任重之以憂故舉天下而傳之舜若解重負然非直辭讓也又曰堯治天下政教平德潤洽在位七十載乃求所屬天下之統令四嶽明揚側陋四嶽舉舜而薦之堯堯乃妻以二女以觀其内任以百官以觀其外既入大麓烈風雷雨不迷林屬於川曰麓堯使舜入林麓之中遭大風雨不迷也乃屬以九子堯有九男贈以昭華之玉而傳天下焉又曰堯之有天下也非貪萬民之富也而寧人主之位也以為萬姓力屈强弱相乗衆寡相暴於是堯乃身服節儉之行而明愛之仁以和輯之是故茅茨而不剗採椽而不斵大輅不畫大輅天子車也越席不縁越席束蒲席也大羮不和無有味也粢飯不鑿巡狩行教勤勞天下周流五嶽豈其奉養不足樂哉舉天下以為社稷非有利焉年衰志閔舉天下之重而傳之舜也猶却行而釋蹤也又曰堯之時十日並出焦禾穗殺草木而民無所食窫窳九嬰大風脩蛇封豕鑿齒為民害堯弋鑿齒於疇華之澤疇華南方澤也鑿齒獸持戈楯羿持弓箭射殺也殺九嬰於凶水之上九嬰水之大怪為人之害者北杖之地有凶水者也繳大風於青丘之澤大風大鷙鳥也繳以石磻繳繫矢射之青丘東方也上射十日羿射日墮日中鳥羽而下殺窫音乾窳音庾窫窳狀如龍形人齒食人也斬脩蛇於洞庭洞庭南方水也其蛇食象三嵗而其骨出也禽封豕於桑林封豕大彘也桑林湯禱旱地萬民皆喜置堯為天子也又曰堯王天下而憂不解授舜而憂乃釋說苑曰河間獻王曰堯存心於天下有一人飢曰我飢之也有一人寒曰我寒之也一民有罪曰我陷之也仁昭而義立德博而化廣故不賞而人勸不罰而人懼先生而後殺是堯道也揚子}
