  - {type: variant, offset: 4710, length: 3, content: 顓頊死, WYG: 堯之精陽萬物莫不從者言堯在天陽精所在帝世有洪水之灾天生聖人使救之故言乃統天也書曰若稽古帝堯孔安國曰若順稽考也能順考道而行之者帝堯曰放勲欽明文思安安勲功欽敬也言堯放上世之初化而以敬明文思之四德安安當安者也允恭克讓光被四表格于上下允信也克能也光充格至也既有四德又信恭能讓故其名聞充溢四外至于天地也克明峻德以親九族能明峻德之士任用之以睦髙祖至𤣥孫之親九族既睦平章百姓既已也百姓畿内民也言化九族而平章百姓也百姓昭明協和萬邦黎民於變時雍昭亦明也協和黎衆時是雍和也言天下衆民皆變是以風俗大和也尚書中候曰帝堯}
