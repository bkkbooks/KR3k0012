  - {type: variant, offset: 4704, length: 0, content: '', krp: 天帝以玄雲覆衛之故曰時乗六龍以御天也又曰堯之精陽萬物莫不從者言堯在天陽精所}
  - {type: variant, offset: 4706, length: 2, content: 顓頊, SBCK: 必有洪水之灾天生聖人使救之故言乃統天也書曰􅀂稽古帝堯孔安國曰􅀂順稽考也能順考道而行之者帝堯曰放勛欽明文思安安勛功欽敬也言堯放上丗之􅀄化而以敬明文思之四德安天當安者也允恭克讓光􅀍四表格于上下允信也克能也克光格至也旣有四德又信恭能讓故其名聞充溢四外至于天地也克明俊德以親九族能明俊德之士任用之以睦髙祖至玄孫之親九族旣睦平章百姓旣巳也百姓官也言化九族而平章明也百姓昭明恊和萬􅀖黎民於變時邕昭亦明也恊和黎衆時是邕和也言天下衆民皆變是以風俗大和也尚書中候曰帝堯即政七十載景星出翼鳯凰止庭鄭玄曰注翼朱鳥􅀫朱草生郊嘉禾孳連甘露􅃳液醴泉出山朱草可以染服者嘉美也書序曰唐叔得禾異畒同頴此注之爲孳連醴亦甘脩壇河雒榮光起河休氣四塞休美也榮光五色從河出美氣四塞炫燿熠熠也白雲起囬風揺龍馬銜甲赤文緑色龍形像馬也赤熛怒之使也甲所以藏圖赤文色而緑地也臨壇止霽吐甲圖而帶足霽齊亦止也帶足音帶去也}
  - {type: page-break, offset: 4706, content: '', id: KR3k0012_SBCK_080-4b}
  - {type: variant, offset: 4706, length: 2, content: 顓頊, WYG: 以𤣥雲覆御之故曰時乗六龍以御天也}
