  - {type: variant, offset: 4723, length: 0, content: '', SBCK: 治天下也舜爲司徒契爲司馬禹爲司空后稷爲大田師奚仲爲工其導萬民也水處者魚山處者木谷處者牧陸處者農地冝其事事冝其械械冝其用用冝其人澤臯織罔陵阪耕田得以所有易所無以工易所拙是故離叛者寡而聽從者衆譬􅀂播棊於地􅀒者走室方者處髙各從其所安又曰人之所以樂爲天子者以窮耳目之欲而適身體之便也今髙臺層榭之人所麗也而堯採椽不斵斥題不枅言梁柱相斥矩不着枅櫨也珎恠竒味人之所美也堯糲梁之飯藜藿之羮文錦狐白人之所好也而堯布衣掩形鹿裘禦寒養生之具不加厚而増之以大任重之以憂故舉天下而傳之舜􅀂解重􅀒然非直辭讓也又曰堯治天下政教平德潤洽在位七十載乃求所屬天下之統今四嶽楊側陋四嶽舉舜而薦之堯堯乃妻以二女以觀其内任以百官以觀其外旣入大麓烈風雷􅀨不迷林属於山曰麓堯使舜入林麓之中遭大風􅀨不迷也乃属以九子堯有九男贈以昭華之玉而傳天下焉又曰堯之有天下也非貪萬民之冨也而寜人主之位也以爲百姓力屈強弱相乗衆寡相暴於是堯乃身服節儉之行而明愛之仁以和輯之是故茅茨而不剗采椽而不斵大路不􅀞大路天子車也越席不縁越席束蒲序也大羮不和無五味也粢飯不鑿廵狩行教勤勞天下周流五嶽豈其奉養不足樂哉舉天下以爲社禝非有利焉年衰志閔舉天下之重而傳之舜也猶却行而釋蹤也又曰堯之時十日並出燋禾穗殺草木而民無所食窫窳九嬰大風封豕鑿齒於疇華之澤疇華南方澤也鑿齒獸持戈楯羿持弓箭射殺也殺九嬰於凶水之上女嬰水大之恠爲人之害者北狄之地有凶水者也繳大風於青丘之澤大風大鷙鳥也激以石磎繳擊矢射之青丘東方丘上射十日羿射日墮曰中鳥羽而下殺窫音乹窳音􅁃窫窳􅃺如龍􅁃人齒食人也断脩虵於洞庭洞庭南方水也其虵食象三歳而其骨出也禽封豕於桑林封豕大彘也桑林湯禱旱地萬民皆喜置堯爲天子也又曰堯王天下而憂不解授舜而憂乃釋􅀃苑曰河間獻王曰堯存心於天下有一人飢曰我飢之也有一人寒曰我寒之也一民有罪曰我䧟之也仁而立德􅀶而化廣故不賞而人勸不罰而人治先生而後殺是堯道也楊子}
