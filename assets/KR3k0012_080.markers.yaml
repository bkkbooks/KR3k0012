  - {type: variant, offset: 4724, length: 1, content: 婦, SBCK: 言曰堯能則天者以其能臣二聖二聖舜禹也又曰堯舜之德輕於鴻毛潜夫論曰堯舜之德譬猶偶燭施明於幽室也前燭照之後燭益明非前燭昧後燭彰也乃二燭相因而成大光荀恱申鑒曰思唐虞於上丗瞻仲尼於中古乃知小道足羞也譙子法訓曰唐虞之衣裳文法禹稷之溝洫耕稼}
