  - {type: page-break, offset: 4642, content: '', id: KR3k0012_SBCK_080-3b}
  - {type: variant, offset: 4642, length: 0, content: '', krp: 之故年二十而登帝位以火承木都平陽置敢諌之鼔天下大和命羲和四子羲仲羲叔和仲和叔分掌四嶽諸侯有苗氏處南蠻而不服堯征而克之于丹水之浦乃以尹壽許由爲師命伯夔訪山川谿谷之音作樂六章天下大和百姓無事有八十老人擊壤于道觀者歎曰大哉帝之德也老人曰吾日出而作日入而息鑿井而飲耕田而食帝何力於我哉有僬僥氏來貢没羽厨中自生肉脯如翣形揺鼔自生風使食物寒而不臭名曰翣晡又有草夾階而生隨月生死王者以是占日月之數惟盛德之君應和而生故堯有之名蓂莢一名暦莢始封稷契咎繇襃進伯禹納舜于大麓後年二月又率群臣刻壁爲書東沉于洛言天命當傳舜之意今中候運衡之篇是也舜攝政二十八年堯與方廽遊陽城而崩尚書所謂二十有八載放勛乃殂落是也百姓如喪考妣三載四海遏宻八音凡堯即位九十八年年百一十八歳墨子以爲堯堂髙三尺土階三等堯取散冝氏女曰皇生丹朱又有庶子九人皆不肖故以天下命舜又曰帝堯氏作始封於唐今中山唐縣是也堯山在北唐水在西北入河南有望都縣有都山即堯母慶都之所居也相去五十里都山一名豆山北登堯山南望都山故名其縣曰望都春秋合誠圖曰堯母慶都有名於世蓋大帝之女生於斗維之野常在三河之南天大雷電有血流潤大石之中生慶都長大形像大帝常有黃雲覆蓋之夢食不飢及年二十寄伊長孺家出觀三河之首常若有神隨之者三河之首東河此端有赤龍負圖出慶都讀之赤受天運運録運也下有圖人衣赤光面八彩鬚鬢長七尺二寸兊上豐下足履翼翼署曰赤帝起誠天下寳衣赤光光像而又着衣也八彩彩色有八也翼翼星火位宿也國人旁有此署文七十也奄然隂風雨赤龍與慶都合婚有娠龍消不見龍乘風雲故光隂風乃龍至也婚猶㑹合或爲結也旣乳視堯如圖表及堯有知慶都以圖予堯如圖人儀表也孝經援神契曰堯鳥庭荷勝八眉堯火精人也鳥庭庭有鳥骨表取像朱鳥與太微庭也朱鳥戴聖荷勝似之八眉眉彩色有八論語曰大哉堯之爲君也巍巍乎唯天爲大唯堯則之孔安國曰則}
