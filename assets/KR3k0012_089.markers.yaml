  - {type: variant, offset: 4470, length: 276, content: 召逆旅夫妻見之賜嫗千金擢其夫為羽林郎自是懲戒希復微行上少好學招求天下遺書上親自省校使莊助司馬相如等以類分別之好醉賦每所行幸及奇獸異物輒命相如等賦之上亦自作詩賦數百篇下筆即成初不留思相如造文遲彌時而後成上每難其工妙謂相如曰以吾之速易子之遲可乎相如曰於臣則可未知陛下何如耳上大笑而不責也然性嚴爭不貸小過刑殺法令殊為峻刻汲黯每諫曰陛下愛才樂士求之無倦比得人勞苦神明未盡其用輒已殺之士資無已之誅臣恐天下賢才將盡於陛下欲與誰為治乎黯言之甚怒上笑而喻之行幸欣言中流與群臣飲醼乃自作秋風辭顧謂群臣曰漢有六七之厄法應再受命宗室子孫誰當應此者六七四十二代漢者當塗高也群臣, SBCK: 始}
