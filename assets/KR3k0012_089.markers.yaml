  - {type: variant, offset: 1317, length: 1, content: 體, WYG: 元帝侍中應邵曰元成帝紀皆固父所作臣班彪自説也外祖言金敞也語臣曰元帝多才藝史書鼔琴瑟吹洞簫自度曲被歌聲分忖節度窮極要妙少而好儒及即位徵用儒生委之以政薛貢韋匡迭為宰相而上牽制文義優逰不斷孝宣之業衰矣然寛𢎞盡下出於恭儉號令温雅有古之風烈也應劭漢官儀曰孝武時天子以下未有幘元帝額上有壯髮不欲使人見乃始進幘羣寮隨焉帝王世說曰孝元皇帝}
