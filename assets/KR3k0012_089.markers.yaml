  - {type: variant, offset: 3645, length: 232, content: 騷然海內無聊而孝文之業衰焉劉歆宗廟議曰孝武皇帝愍中國罷勞無安寧之時乃遣大將伏波樓船之屬滅百越七郡北攘匈奴降昆耶之眾置五屬國起朔方以奪其肥饒之地東伐朝鮮起玄兔樂浪以斷匈奴之左臂西伐大宛并三十六國結烏孫起燉煌酒泉張掖以隔氐羗裂匈奴之右肩單于孤將遠遁漢北西垂無事斥地遠境起十餘郡功業既定而封丞相為富民侯以安天下富實百姓其規模可見又招集天下賢俊與協心同謀興制度改正朔易服色立天下之祀建封禪殊官號存周後定諸侯之制永無逆爭之心至今累世賴之單于守蕃百蕃百蠻服從萬世之基也中興之功, SBCK: ''}
