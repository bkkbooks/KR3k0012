  - {type: variant, offset: 5943, length: 284, content: 饗茲永年魏陳王曹植漢武帝贊曰世宗光光文帝是攘威震百蠻恢拓土疆簡定律曆辨修舊章封天禪土功超百王周庾信漢武帝聚書贊曰獻書路廣藏書柱開秦儒出谷漢簡吹灰芝泥即土玉匣封來坐觀風俗不出蘭臺陳沈炯祭漢武帝陵文曰臣聞橋山雖掩鼎湖之靈可祠有魯遂荒大庭之跡不泯伏惟陛下降德猗蘭纂靈豐谷漢道既登神仙可望射之杲於海浦禮曰觀而稱功橫中流於汾河指柏梁而高宴何其甚樂豈不然歟既而運屬上僊道窮晏駕甲帳珠簾一朝零落茂陵玉椀遂出人間陵雲故基與原田而膴膴別風餘趾帶陵阜而茫茫羈旅纆臣豈不落淚昔者承明見猒嚴助東歸駟馬可乘長卿西返恭聞故實竊有愚衷黍稷非馨敢望徼福爵臺之薦空愴魏君痽丘之祠未光夏后瞻仰徽猷伏增悽懼, SBCK: 也太平御覽卷第八十九}
