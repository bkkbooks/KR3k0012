  - {type: variant, offset: 981, length: 0, content: '', WYG: 望於道郎中令龔遂諌王令還郎謁者五十餘人賀到濟陽求長鳴雞道買積竹杖}
  - {type: variant, offset: 982, length: 0, content: '', WYG: 穎曰合竹作杖也過𢎞農使大奴善以衣車載女子旦至廣明東都門遂曰禮奔䘮望見國都哭此長安東郭門也賀曰嗌痛不能哭至城門遂復言賀曰城門與郭門等耳且至未央宫東闕遂曰昌邑帳在是闕外馳道北文穎曰弔哭帳也未至帳所有南北行道馬足未至數歩大王宜下車鄉闕西面伏哭盡哀止王曰諾到哭如儀王受皇}
