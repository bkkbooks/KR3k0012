  - {type: variant, offset: 5331, length: 0, content: '', WYG: 符命之起自此始矣羣臣奏安漢公居攝踐阼服天子黻冕南面朝羣臣車服出入如天子郊祀天地賛者曰假皇帝民臣謂之攝皇帝自稱曰予改元曰居攝元年東郡太守翟義立嚴鄉侯劉信為天子移檄郡國衆十餘萬莽惶懼抱孺子告禱郊}
  - {type: variant, offset: 5332, length: 0, content: '', WYG: 放大誥作䇿班於天下莽既滅翟義自謂威徳已盛遂謀即真之事矣莽母功顯君死莽意不在哀令太后詔議其服劉歆與博士議令新都侯宗主䘮十一月宗室廣饒侯劉京上書言七月中齊郡臨淄縣昌興亭長辛當一暮數夢曰吾天公使也天公使我告亭長曰攝皇帝當為真即不信我此亭中當有新井旦起視亭中誠有新井入且百尺梓潼人哀章即作銅匱為兩檢其上書言莽為真天子昏時衣黃衣持匱至髙廟付僕射以聞莽至髙廟拜受金匱還坐未央前殿下書即真天子位號曰新以十二月癸酉為建國元年莽按符命求得王盛從布衣登用百官並改}
