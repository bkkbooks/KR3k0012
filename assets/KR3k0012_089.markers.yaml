  - {type: variant, offset: 983, length: 0, content: '', WYG: 璽綬襲尊號即位二十七日行淫亂大將軍光與羣臣議白孝昭皇帝后廢賀歸故國初賀在國時數有怪嘗見白犬髙三尺其頸似人而冠方山冠後復見熊左右皆莫見又大鳥飛集宫中王知惡之輙}
  - {type: variant, offset: 984, length: 11, content: 皇后弟竇廣國賢有行欲相, WYG: 問郎中令龔遂遂為言其故後又血汚王坐席王問遂遂呌然號曰宫空不久妖祥數至血者隂憂象也宜畏慎自省賀終不改節居無何就徵既即位夢青蠅}
