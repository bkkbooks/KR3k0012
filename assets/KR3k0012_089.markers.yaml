  - {type: variant, offset: 5343, length: 271, content: 甘泉宮有玉女降常與帝圍碁相娛女風姿端正帝密悅乃逼之玉女因唾帝面而去遂病瘡經年故漢書云避暑甘泉宮此其時也劉歆七略曰孝武皇帝勑丞相公孫弘廣開獻書之路百年之間書積如丘山故外有太常太史愽士之藏內有延閣廣內祕室之府桓子新論曰漢武帝材質尚妙有崇先廣統之規故即位而開發大志考合古今獲前聖代事建正朔制度招選俊傑奮楊威怒武義四加所征者服興起六藝廣進儒術自開闢以來唯漢家最為盛圖故顯為世宗可謂悼爾絕世之主矣然上乃多過差既欲斥境廣土又乃貪利爭物之無益者聞西夷大宛國有馬即大發軍兵攻取歷年士眾多死但得數十疋耳又歌兒衛子夫因幸愛重乃陰求陳皇后過惡而廢退之即立子夫其男為, SBCK: ''}
