  - {type: variant, offset: 89, length: 277, content: 諱恒諱恒之字曰常謚法慈惠愛民曰文高祖之中子也高祖十一年立為代王都中都高后八年高后崩呂產等欲為亂以危劉氏大臣共誅之使迎代王王問左右郎中令張武等議曰漢大臣皆故高帝時大將習兵多謀詐今誅諸呂新啑血京師此以迎大王為名實不可信願大王稱疾無往以觀其變中尉宋昌進曰夫秦失其政諸侯豪傑並起人人自以為得之者以萬數然卒踐天子位者劉氏也天下絕望一矣高帝封王子弟地太牙相制此所謂盤石之宗也天下服其強二矣漢興除秦苛政約法令施德惠人人自安難動搖三也夫以呂太后之嚴立諸呂為三王擅權專制然而太尉以節入北軍一呼士皆左袒為劉氏叛諸呂卒以滅之此乃天授非人力也今高帝子獨淮南王與大王大王又長賢聖仁, SBCK: ''}
