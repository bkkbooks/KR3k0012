  - {type: variant, offset: 2575, length: 0, content: '', WYG: 太初元年號曰陳聖劉太平皇帝漏刻以百二十為度八月詔曰夏賀良等言皆違經背古不合時宜甲子制書非赦令也皆蠲除之賀良等皆伏辜元壽三年帝崩于未央宫在位六年時年二十五漢書曰}
