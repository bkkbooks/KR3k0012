  - {type: variant, offset: 3387, length: 90, content: 茂陵漢書贊曰漢承百王之弊高祖撥亂反正文景務在養民至于稽古禮文之事猶多闕焉孝武初立卓然罷黜百家表章六經遂疇咨海內舉其後民與之立功興太學脩郊祀改正朔定曆數協章律作詩樂建封禪禮百神紹周後, SBCK: 恭儉}
  - {type: variant, offset: 3387, length: 946, content: 茂陵漢書贊曰漢承百王之弊高祖撥亂反正文景務在養民至于稽古禮文之事猶多闕焉孝武初立卓然罷黜百家表章六經遂疇咨海內舉其後民與之立功興太學脩郊祀改正朔定曆數協章律作詩樂建封禪禮百神紹周後號令文章煥焉可述後嗣得遵洪業而有三代之風如武帝之雄才大略不改文景之恭儉以濟斯民雖詩書所稱何有加焉漢書宣帝紀曰本始三年尊孝武帝廟為世宗廟奏盛德之舞武帝巡狩所幸郡國皆立廟荀悅漢紀論曰孝武皇帝規矩萬世之業固後世之基地內脩文學外耀武威以延天下之士先王之風粲然可考者矣然猶好其文未盡其實發其始不克其終奢侈而無限窮兵極武百姓空竭萬民罷弊當此之時天下騷然海內無聊而孝文之業衰焉劉歆宗廟議曰孝武皇帝愍中國罷勞無安寧之時乃遣大將伏波樓船之屬滅百越七郡北攘匈奴降昆耶之眾置五屬國起朔方以奪其肥饒之地東伐朝鮮起玄兔樂浪以斷匈奴之左臂西伐大宛并三十六國結烏孫起燉煌酒泉張掖以隔氐羗裂匈奴之右肩單于孤將遠遁漢北西垂無事斥地遠境起十餘郡功業既定而封丞相為富民侯以安天下富實百姓其規模可見又招集天下賢俊與協心同謀興制度改正朔易服色立天下之祀建封禪殊官號存周後定諸侯之制永無逆爭之心至今累世賴之單于守蕃百蕃百蠻服從萬世之基也中興之功未有高焉漢武故事曰漢景帝皇后妊身夢日入其懷景帝又夢見高祖謂己曰王美人生子可名為彘及生男日因名之焉武帝生於猗蘭殿年四歲立為膠東王數歲長主抱著其𣍿上問曰兒欲得婦不膠東王曰欲得婦長主指左右長御百餘人皆云不用末指其女問曰阿驕好不於是乃笑對曰好若得阿驕作婦當作金屋貯之也長主大悅乃苦要上遂定婚焉膠東王為皇太子時年七歲上曰彘者徹也因改曰徹丞相周亞夫宴見時太子在側亞夫失意有怨色太子視之不輟亞夫於是起帝曰爾何故視此人耶對曰此人可畏必能作賊帝笑曰因此怏怏非少主之臣也廷尉上囚防年繼母陳殺父因殺陳依律年殺母大逆論而帝疑之詔問太子太子對曰夫繼母如母明其不及母也緣父之愛故比之於母耳今繼母無狀手殺其父則下手之日母恩絕矣宜與殺人者同不宜大逆論帝從之年棄巿刑議者稱善時太子年十四帝益以奇之從即位常晨往夜還與霍去病等十餘人皆輕服為微行且以觀戲巿里察民風俗嘗至蓮勺通道中行行者皆奔避路上怪之使左右問之云有持戟詐呵者數十人時微行率不過二十人馬七八疋更步更騎衣如凡庶不可別也亦了無騶御而百姓咸見之又嘗至柏谷夜投亭宿亭長不內乃宿於逆旅逆旅翁謂上曰汝, WYG: ''}
