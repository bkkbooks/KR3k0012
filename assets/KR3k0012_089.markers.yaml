  - {type: variant, offset: 5801, length: 141, content: 附獲祭天金人之寶斬名王以千數馘首虜以萬計既窮追其散亡又摧破其積聚虜不暇於救死扶傷疲於孕重墮殰元封初躬執武節告以天子自將懼以兩越之誅彼時號為威震匈奴矣後漢班固武帝述曰世宗曄曄思弘祖業疇咨熙載髦俊並作厥作伊何百蠻是攘恢我疆宇外愽四荒武功既抗亦迪斯文憲章六學統一聖真封禪郊祀祭旅百神協律改, SBCK: 餘分爲閏言皆非}
