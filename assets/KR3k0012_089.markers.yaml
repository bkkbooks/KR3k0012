  - {type: punctuation, offset: 708, content: 「, id: KR3k0012_CHANT_089-bkkpn176}
  - {type: variant, offset: 712, length: 761, content: 從代來即位二十三年宮室苑囿狗馬服御無所增益有不便輒弛以利民嘗欲作露臺召匠計之直百金上曰百金中民十家之產吾奉先帝宮室常恐羞之何以臺為上常衣綈衣所幸慎夫人令衣不得曳地幃帳不得文繡以示敦朴為天下先治霸陵皆以瓦器不得以金銀銅錫為飾吳王詐病不朝就賜几杖群臣如袁盎等稱說雖切常假借用之群臣如張武等受賂遺金錢覺上乃發御府金錢賜之以愧其心弗下吏專務以德化民是以海內殷富興於禮義後七年六月帝崩於未央宮遺詔無發民男女哭臨服大功十五日小功十四纖七日釋服史記太史公曰孔子言必世然後仁善人之治國百年亦可以勝殘去殺誠哉是言也漢興至孝文四十有餘載德至盛也漢書曰張蒼免相文帝以皇后弟竇廣國賢有行欲相之曰恐天下以吾私廣國乃以御史大夫申徒嘉為丞相又曰武帝從容問東方朔曰吾欲化民豈有道乎朔對曰願近述孝文皇帝之時當世耆老皆聞見之貴為天子富有四海身衣弋綈足履革舄以韋帶劍雚為席兵木為刃服虔曰兵器如木而無刃衣縕無文集上書囊以為殿帷以道德為麗以義為准於是天下望風成俗昭然化之又曰賈捐之曰孝文皇帝閔中國未安偃武行文時有獻千里馬者詔曰鸞旗在前屬車在後吉行日五十里朕乘千里之馬獨先安之於是還馬與道里費荀悅漢紀曰韓信為左丞相與曹參灌嬰擊魏王豹豹姬曰薄姬許負相之當生天子豹猜此言而反豹敗漢王納薄姬實生文帝又曰以孝文之明大朝之治百寮之賢而賈誼見排逐張釋之十年不見省馮唐首白屈於郎豈不惜哉夫以絳侯之忠功存社稷而猶見疑不亦痛乎帝王世紀曰孝文即位二十三年年四十七葬霸陵因山為體廟名顧城桓子新論曰漢太宗文帝有仁智通明之德承漢初定躬儉省約以惠休百姓救贍困乏除肉刑滅律法薄葬埋損輿服所謂達於養生送終之實者也及始從代徵時謀議狐疑能從宋昌之策應聲馳來即位而偃武行文施布大恩欲息兵革與匈奴和親揔撮綱紀故遂襃增隆為太宗也而溺於俗儀斥逐材臣又不勝私恩使嬖妾慎夫人與皇后同席以亂尊卑之倫所通而蔽也風俗通曰, SBCK: ''}
