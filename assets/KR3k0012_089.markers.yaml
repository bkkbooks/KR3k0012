  - {type: variant, offset: 1136, length: 1, content: 閔, WYG: 諱詢之字曰謀字次卿武帝曽孫戾太子孫也太子納史良娣生皇孫納王夫人生宣帝號曰皇曾孫生數月遭巫蠱事太子良娣皇孫王夫人皆遇害曾孫生繫郡邸獄邴吉為廷尉監治巫蠱憐曽孫之亡辜使女徒乳養私給衣食至後元二年望氣者言長安獄有天子氣上遣使者皆殺之内署令郭穰夜至郡邸獄吉拒閉不得入曽孫頼吉得全因遭大赦吉乃載曽孫送祖母史良娣家後有詔掖庭養視上屬籍宗正時掖庭令張賀嘗事戾太子哀曽孫養奉甚謹以私錢供給教書既壯為取暴室嗇夫許廣漢女曽孫因倚依廣漢兄弟及祖母家受詩於東海澓仲翁澓音馥髙才好學然亦喜逰俠鬬雞走馬具知閭里之奸邪吏治得失周遍三輔常困於蓮灼鹵}
  - {type: page-break, offset: 1136, content: '', id: KR3k0012_WYG_089-7a, image: WYG0893/WYG0893-0719a.png}
  - {type: page-break, offset: 1136, content: '', id: KR3k0012_WYG_089-7b, image: WYG0893/WYG0893-0719b.png}
  - {type: variant, offset: 1138, length: 1, content: 國, WYG: 尤樂鄠杜間率常在下杜邵應曰下杜杜陵之下時㑹諸朝舍長安尚冠里身足下有毛遍身及足下皆有毛臥居數有光耀毎買餅所從買家輙大售亦以此自怪元平元年昭帝崩無嗣霍光徵昌邑王賀賀滛亂廢七月光奏遣宗正得至尚冠里舎沐浴賜御府衣太僕以軨獵車奉迎曽孫就齊宗正府封為陽武侯羣臣上璽即皇帝位甘露三年匈奴呼韓耶單于皆來朝賛謁稱藩臣而不名黄龍元年帝崩於}
  - {type: page-break, offset: 1138, content: '', id: KR3k0012_WYG_089-8a, image: WYG0893/WYG0893-0719c.png}
  - {type: variant, offset: 1140, length: 0, content: '', WYG: 央宫在位三十五年漢書曰宣帝始立謁見髙廟大將軍光參乗上内嚴憚之若芒刺在背後張}
