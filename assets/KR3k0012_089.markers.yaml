  - {type: variant, offset: 4383, length: 939, content: 見翁方與少年十餘人皆持弓矢刀劍令主人嫗出安過客嫗歸謂其翁曰吾觀此丈夫非常人也且亦有備不可圖也天寒嫗酌酒多與夫及諸少年皆醉嫗自縛其夫諸少年皆走嫗出謝客殺雞作食平旦上去是日還宮乃召逆旅夫妻見之賜嫗千金擢其夫為羽林郎自是懲戒希復微行上少好學招求天下遺書上親自省校使莊助司馬相如等以類分別之好醉賦每所行幸及奇獸異物輒命相如等賦之上亦自作詩賦數百篇下筆即成初不留思相如造文遲彌時而後成上每難其工妙謂相如曰以吾之速易子之遲可乎相如曰於臣則可未知陛下何如耳上大笑而不責也然性嚴爭不貸小過刑殺法令殊為峻刻汲黯每諫曰陛下愛才樂士求之無倦比得人勞苦神明未盡其用輒已殺之士資無已之誅臣恐天下賢才將盡於陛下欲與誰為治乎黯言之甚怒上笑而喻之行幸欣言中流與群臣飲醼乃自作秋風辭顧謂群臣曰漢有六七之厄法應再受命宗室子孫誰當應此者六七四十二代漢者當塗高也群臣進曰漢應天授命祚踰周殷子子孫孫萬世不絕陛下安得此亡國之言過聽於臣妾乎上曰吾醉言耳然自古以來不聞一姓遂長王天下者但使失之非吾父子可矣行幸五柞宮謂霍光曰朕去死矣可立釣弋子公善輔之三月丙寅上晝臥不覺顏色不異而身冷無氣明日色漸變閉目乃發哀告喪未央前殿朝晡上祭若有食之者常所幸御葬畢悉居茂陵園上自婕妤以下二百餘人上幸之如平生而傍人不見也光聞之乃更出宮人增為五百人因是遂絕始元二年吏告民盜用乘輿御服者案其題乃茂陵中明器也民別買得光疑葬日監官不謹容致盜竊乃收將作以下繫長安獄考訊居歲餘鄴縣又有一人於市貨玉杯吏疑其御物欲捕之因忽不見縣送其器推問又茂陵中物也光自呼吏問之說市人形貌如先帝光於是嘿然乃赦前所繫者歲餘上又見形謂陵令薛平曰吾雖失世猶為汝君奈何令吏卒上吾陵上磨刀劍乎忽然不見因推問陵旁有方石以為礪吏卒常盜磨刀劍甘泉宮恒自然有鍾鼓聲候者時見從官鹵簿似天子自後轉稀至宣帝世乃絕宣帝即位尊孝武廟奏樂之曰虛中有唱善者告祠之曰白鵠群飛集後庭西河立廟神光滿殿中狀如月東萊立廟有大鳥跡意路白龍夜見河東立廟告祠之日白虎銜肉置殿前又有一人騎馬馬異於常馬持捉一札賜將作丞曰聞汝績剋成賜汝金一斤因忽不見札乃變為金稱之有一斤廣川告祠之明日有鍾磬音房戶皆開夜有光香氣聞二三里宣帝親祠甘泉有頃紫黃氣從西北來散於殿前肅然有風空中有妓樂聲群鳥翔儛蔽天宣帝既親覩光怪乃疑先帝有神復招諸方士冀得仙焉, WYG: ''}
