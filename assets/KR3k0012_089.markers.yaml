  - {type: variant, offset: 2411, length: 3, content: 景蒞政, SBCK: 昭㓜冲冢􅌠惟忠燕蓋譸張實叡實聦罪人斯得􅀖家和同魏文帝周成漢昭論曰或方周成王於漢昭帝僉髙成而下昭余以爲周成王體上聖之休氣禀賢妣之胎誨周邵爲保􅀓吕尚爲太師口能言則行人稱辤足能􅂂則相者導儀目厭威容之美耳飽仁義之聲所謂沉漬􅀇流而沐浴清風者矣猶有咎悔聆二叔之謗使周公東遷皇天赫怒顯明厥咎猶啓金縢稽}
  - {type: variant, offset: 2411, length: 91, content: 景蒞政諸侯放命尚書放命圯族鯀之惡懷其族類吳楚七國亦然也克伐七國王室以定非怠非荒務在農桑著于甲令民用寧康魏陳王曹植漢景帝贊曰景帝明德繼文之則肅清王室克滅七國省役薄賦百姓殷昌風移俗易齊美, WYG: ''}
  - {type: variant, offset: 2411, length: 3, content: 景蒞政, krp: 昭㓜冲冢宰惟忠燕蓋譸張實叡實聦罪人斯得邦家和同魏文帝周成漢昭論曰或方周成王於漢昭帝僉髙成而下昭余以爲周成王體上聖之休氣禀賢妣之胎誨周邵爲保傳吕尚爲太師口能言則行人稱辤足能履則相者導儀目厭威容之美耳飽仁義之聲所謂沉漬玄流而沐浴清風者矣猶有咎悔聆二叔之謗使周公東遷皇天赫怒顯明厥咎猶啓金縢稽}
  - {type: punctuation, offset: 2414, content: ，, id: KR3k0012_CHANT_089-bkkpn617}
  - {type: 'tls:seg', offset: 2414, content: '', id: KR3k0012_CHANT_089-17a.9}
  - {type: variant, offset: 2415, length: 0, content: '', SBCK: 國史然後乃窹不亮周公之聖德而信金縢之教言豈不暗哉夫孝昭父非武王母非邑姜養帷蓋主相則桀光體不承聖化不胎育保無仁孝之質佐無隆平之治所謂生於􅀷宫之中長於婦人之手然而德與性成行與體并年在二七早知夙逹發燕書之詐亮霍光之誠豈有啓金縢信國史而後乃寤哉使夫成昭均年而立易世而化質臣而治換樂而歌則漢不獨少周不獨多魏丁儀周成漢昭論曰成王昭帝俱以襁褓之㓜託於冢􅌠流言䜛興此其艱險相似者也夫以發金縢然後垂泣計日力便􅁴詐書明之遲速旣有差矣且叔父兄子非相嫌之處異姓君臣非相信之地霍光罹人謗而不出周公頼天變而得之推此數者齊本而論末計重而量輕漢昭之優周成甚明者也成王秀而獲實其美在終昭帝苗而不秀其得在始必不得巳而論二主余與夫始者也廢帝海昬}
