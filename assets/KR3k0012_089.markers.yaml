  - {type: variant, offset: 1141, length: 1, content: 偃, WYG: 世代光參乗天子從容肆意甚安及光身死而宗族竟誅漢書贊曰孝宣之治信賞必罰綜核名實政事文學法理之事咸精其能至于伎巧工匠噐械自元成間鮮能及之亦足以知吏稱其職民安其業也遭值匈奴乖亂推亡固存李竒曰宣帝能朝呼韓而固存走郅支使逺遁是推亡也信威北夷單于慕義稽首稱藩功光祖宗業垂後嗣可謂中興侔徳殷宗周宣矣東觀漢記曰光}
