  - {type: variant, offset: 5630, length: 1, content: 走, SBCK: 龍樓門不敢絶馳道應劭曰馳道天子之道西至直城門􅀳灼曰黄圖西出南頭弟二門得絶乃度上遲之以􅃺對上於是大恱乃著令太子得絶馳道其後幸酒醼樂幸酒好酒也上不以爲能而定陶恭王有才母傅昭儀又愛上以故欲以恭王爲嗣頼侍中丹護太子家輔助有功上亦以先帝尤愛故得無廢元帝崩太子即位頻年幸甘泉汾隂郊祠綏和二年崩于未央宫在位二十六年時年四十五漢書曰成帝好爲微行從期門郎及私奴宫客多至十餘人皆帯持刀劒或乗小車御者在道上或皆􅀐出入市里郊野逺至旁縣谷永曰今陛下棄萬乗之冨貴樂人家之賤事厭髙美之尊稱好疋夫之卑字如淳曰稱張放家人是卑字買私田於民間畜私奴車馬北宫挺身與群小晨夜相隨烏集醉飽吏民之家亂服共坐混淆無別典門户奉􅀫衛之臣執干戈守空宫公卿百僚不知陛下所在積數年矣漢書賛曰臣之姑晉灼曰班彪之姑後宫爲婕妤父子兄弟得侍帷幄數爲臣言成帝善脩容儀升車正立不内頋疾言親指臨朝淵嘿尊嚴􅀂神可謂穆穆天子之容矣博覽古今容受直辭公卿稱職遭世承平上下和睦然躭于酒色趙氏亂内外家擅朝言之可爲於邑建始以來王氏始執國命哀平矩祚莾遂簒位蓋其威福之所由來者乆矣帝王世紀曰成帝廟名池陽楊雄酒賦叙曰漢孝成皇帝好酒雄作酒賦以諷之孝哀皇帝漢書帝紀曰孝哀皇帝諱欣欣之字曰喜元帝庶孫定陶㳟王之子也母曰丁􅁎好文辭法律入朝上令誦詩通習能􅀃能􅀃其義帝稱其才時王祖母􅀓太后私賂遺上所幸趙昭儀及帝舅主根根及昭儀見上無子亦欲預自結皆勸帝以爲嗣乃立爲太子成帝崩太子即帝位建平二年待詔夏賀良等言赤精子之䜟漢運中衰當再受命今冝改元易號乃赦天下以建平二年爲太􅀄元年號曰陳聖劉太平皇帝漏刻以百二十爲度八月詔曰夏賀良等言皆違經背古不合時冝甲子制書非赦令也皆蠲除之賀良等皆伏辜元夀三年帝崩于未央宫在位六年時年二十五漢書曰孝哀皇帝性不好音及即帝位下詔曰孔子不云乎放鄭聲鄭聲滛其罷樂府官郊祀樂及古之兵法武樂在經法非鄭衛之樂者條奏別屬他官又曰董賢少爲太子舎人美麗自喜上即位見幸岀則叅乗入侍左右旬月之間賞賜巨萬貴震朝廷嘗與上晝寢籍上䄂上欲起賢未􅁴上不欲動揺之乃斷䄂而起又召賢女弟爲昭儀更名其舎爲椒風以配椒房武庫禁兵尚方珎寳上第盡在董氏乗輿乃其副也賢爲大司馬衛將軍年二十二上置酒從容視賢曰吾欲法堯禪舜何如侍中王閎曰天下乃髙皇帝天下非陛下天下也統業至重天子無戯言上乃黙然不恱孝平皇帝漢書帝紀曰孝平皇帝諱衎之字曰樂元帝孫中山孝王之子也年三􅀊時爲王哀帝崩迎中山王即位元始五年爲王莾所酖而崩有司議禮臣不殤君皇帝年已十四冝以禮歛加元服漢書賛曰孝平之世政自莾出襃善顯功以自尊盛觀其文辭方外百蠻無思不服休徴嘉應頌聲並作至乎變異見於上民人怨於下莾亦不能文也少帝孺子漢書曰孝平皇帝崩無子嗣絶宣帝曽孫有五人王莾惡其長也兄弟不得相後乃徴宣帝􅀇孫廣威侯嬰年二􅀊記以卜相最吉莾遂居攝如周公故事改曰居攝元年三月立嬰爲皇太子號曰孺子建國元年乃䇿命孺子以爲安定公莾執孺子手流涕曰今予迫皇天威命不得如周公哀歎良乆孺子下殿北靣稱臣百寮莫不感慟莾勑阿乳母不得與語常在四壁中至於長大不能名六畜後莾以女孫妻之帝王丗紀曰嬰爲孺子三年而廢爲安定公十五年而失國始二年平陵方望等將嬰聚衆爲天子數月更始乃殺之王莾漢書曰王莾字巨君孝元皇后之弟子也父及兄弟皆以元成丗封侯輔政凢九侯五大司馬唯莾父曼早死不侯五侯侈靡莾獨􅀌貧因折節爲儉受禮經勤身博學事母及寡㛐􅀌兄子行甚整又外交英俊内事諸父丗父鳯疾莾侍病亂髮垢靣鳯且死以託太后及帝拜黃門郎永始中封爲新都侯遊者爲之談􅀃虚譽隆洽太后姉子淳于長爲九卿先進在莾右莾隂求其罪因大司馬白之長伏誅莾以獲忠直遂擢爲大司馬輔政欲令名譽過前人遂克巳不倦􅀊餘成帝崩哀帝即位傅太后丁􅁎皆稱尊號丞相朱博奏莾前不廣尊尊之義請免爲庶人乃遣就國杜門自守吏民怨訟莾者以百數元夀元年徴莾􅀊餘哀帝崩莾爲大司馬平帝即位太后臨朝皆委政於莾群臣奏莾定䇿安宗廟賜號安漢公莽以女配帝欲擅權帝母衞􅁎及舅並留中山莾子宇恐帝大後見怨與師吴章夜持血灑莾門吏發􅁴之莾執宇送獄死莽因作書八篇以戒子孫冝班郡國令學官以著官簿比孝經吏人止書者八千餘人咸曰伊尹爲阿衡周公爲太宰帝採伊周稱號加公爲宰衡又加九錫鸞輅龍旂莽又増法五十條犯者徙之西海徙者以千萬數民始怨矣平帝疾莽作䇿請問願以身代藏䇿金縢平帝崩莽惡立長乃選子嬰年三􅀊託以卜相最吉是月前煇光謝􅅝奏武功長孟通浚井得白石下有丹書文曰告安漢公莽爲皇帝符命之興自此始矣羣臣奏安漢公居攝踐祚服天子黻冕南面朝群臣車服岀入如天子郊祀天地賛者曰假皇帝民臣謂之攝皇帝自稱曰予改元曰居攝二年東郡太守翟義立嚴郷侯劉信爲天子移檄郡國衆十餘萬莽惶懼抱孺子告禱郊廟倣大誥作䇿班於天下莽旣滅翟義自謂威徳巳盛遂謀即眞之事矣莽母功顯君死意不在哀令太后下詔議其服莽奏太后下詔議其服莽母太后稱劉京上書言臨淄縣昌興亭長辛嘗夢曰吾天公使我告亭長曰攝皇帝當爲眞即不信此亭中當有新井旦起視誠有新井入地且百尺梓潼人哀章即作銅匱爲兩撿其上書言莽爲眞天子昬時衣黄衣持匱至髙廟付僕射以聞莾至髙廟拜受金匱還坐未央前殿下書即眞天子位號曰新以十二月癸酉爲建國元年莽按符命求得王盛從布衣登用百官並改名又改長安爲常安立祖廟五親廟四又更作小錢與前大錢爲二品百姓不便農商失業民人至泣於市道遣五威將王竒班符命四十二篇五威將乗乾文車駕坤六馬背􅀒鷩鳥之毛服飾甚偉長安狂女子碧呼道中曰髙皇帝大怒趨歸我國不者九月必殺汝莽捕殺之更名匈奴爲降奴是時有用方技待詔黄門者或問莽形皃待詔曰葬所謂鴟目虎吻豺狼之聲故能食人亦當爲人所食問者告之莽誅待詔後常翳雲母屏風非親近莫得見也更名髙句驪爲下句驪五年丈母皇太后崩立廟長安新室丗丗獻􅀕先帝配食坐於床下又明六筦之令犯禁者至死臨淮􅀲田儀姓􅀲田名儀爲盗賊琅耶女子吕母亦起莽之南郊鑄作威斗􅀂北斗欲以厭勝衆兵莽見盗賊起乃命太史推三萬六千􅀊曆紀六年一改元布天下大募天下丁男及死罪囚吏民奴名曰猪突狶勇以爲銳卒莽見盗賊多欲規爲自安遂營長安城南堤封百頃親舉築三千即言符命黄帝以百二十女致仙乃遣分行天下􅀶採淑女莽夢見長樂宫銅人起立惡之使尚方鐫滅銅人膺文又令虎賁武士入髙廟杖劒四面提擊桃湯赭鞭鞭灑屋壁又言黄帝建華蓋以登仙乃造之百官竊言此似轜車非仙物也莽知西方潰叛乃遣分行天下井田衆制㑹世祖與兄齊武王等功拔􅁄陽立劉聖公爲天子莽愈恐欲外視自安乃染其髮􅁂進所徴天下淑女立杜陵史氏女爲皇后娉黄金三萬斤遣王邑王㝷等兵百萬號曰虎牙五威兵定山東圍昆陽丗祖來救昆陽邑等大敗􅀜中聞之震恐命張邯稱符命事因曰易言伏戎于莽升其髙陵三􅀊不興莽皇帝名升謂劉伯升髙陵謂翟義封也猶殄滅不興後莽兵敗莽憂憊不能食但飲酒㗖鰒魚讀軍書倦因慿􅄰不復就床也但爲厭勝遣壊渭陵延陵門䍒罳曰無使民復思漢也崔發言周禮左傳國有太灾則哭以厭之莽乃至南郊陳符命仰天曰皇天即授臣莽何不殄滅衆賊因􅅮心大哭氣盡伏而叩頭諸生小民甚悲哀及能誦䇿文者除爲郎拜將軍九人爲九虎將漢承相司直李松與鄧曅攻京師以王曼爲校尉略地至長門宫而茂陵董喜等並假以號稱漢將長安旁兵四㑹城下爭欲先入城貪立本大功莽分赦城内獄囚皆授兵殺狶飲其血誓曰大功莽分不爲新室者社􅀑記之衆兵發掘莽妻子父祖􅃁燒其棺及九廟明堂火照城中少年朱第張魚等燒作室門斫敬法闥呼曰反虜王莽何不出降火及掖庭莽避火宣室火輙隨之宫人婦女啼呼曰當奈何莽紺祠服帶璽韍紺􅀷清袀音弋句切袀純也言純爲紺服也韍音弗持虞帝匕首天文郎案式於前曰時加某莽旋席隨斗而坐曰天生德於予漢兵其如予何群臣扶掖莽自前殿南下椒除西出白虎就車之漸臺欲阻池水獨把持符命威斗公卿大夫從官尚千餘人王邑晝夜戰罷極入見其子侍中睦解衣冠欲逃邑叱之令還父子共守莽軍人入殿中呼曰反虜王莽安在有羙人出房曰在漸臺衆兵追之圍數百重臺上亦與戰莽入室下晡時衆兵上臺臺上商人杜吴殺莽取其綬校尉公賔就見呉問綬主所在曰室中西北陬就識斬莽首軍人爭分裂莽身支節肌皮臠分爭相殺者數千人傳莽首詣更始懸於宛市中百姓共提擊之或切食其舌應劭漢官儀曰㥽本無巾如今半㥽而巳王莽無髮因爲施巾故里語曰王莽頭秃施㥽屋漢書賛曰王莽始起外戚折節力行以要名譽宗族稱孝師友歸仁及其居位攝政成哀之際勤勞國家直道而行動見稱述其竊位南面處非所據㒹覆之􅀔險於桀紂而莽晏然自以黄虞復出迺始恣睢􅁬其威詐滔天虐民窮凶極惡毒流諸夏亂延蠻貊猶未足逹其欲焉是以四海之内囂然䘮其樂生之心中外憤怨逺近俱發城池不守支體分裂遂令天下城邑爲墟丘壠發掘害徧生民辜及朽骨自書傳所載亂臣賊子無道之人考其禍敗未有如莽甚者也昔􅁗燔詩書以立私議莽誦六經以文姦言同歸殊途俱成}
