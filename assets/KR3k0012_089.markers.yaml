  - {type: variant, offset: 2426, length: 0, content: '', SBCK: 輙以問郎中令龔遂遂爲言其故後又血汙王坐席王問遂遂呌然號曰空宫不乆妖祥數至血者隂憂象也冝畏愼自省賀終不改節居無何就徵旣即位後王夢青蠅之矢積西階東可五六石以屋版瓦覆發視之青蠅矢或曰}
