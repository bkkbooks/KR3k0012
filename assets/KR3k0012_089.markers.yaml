  - {type: variant, offset: 2576, length: 0, content: '', WYG: 哀皇帝性不好音及即位帝下詔曰孔子不云乎放鄭聲鄭聲滛其罷樂府官郊祀樂及古之兵法}
  - {type: variant, offset: 2577, length: 0, content: '', WYG: 樂在經法非鄭衛之樂者條奏别屬他官又曰董賢為太子舎人美麗自喜上即位見幸出則驂乗入侍左右旬月之間賞賜巨萬貴震朝廷嘗與上晝寢藉上䄂上欲起賢未覺上不欲動揺之乃斷䄂而起又召賢女弟為昭儀更名其舎為椒風武庫禁兵尚方珍寳盡在董氏乗輿乃其副也賢為大司馬衛将軍年二十二上置酒從容視賢曰吾欲法堯禪舜何如侍中王閎曰天下乃髙皇帝天下非陛下天下也統業至重天子無戲言上乃黙然不恱孝平}
