  - {type: 'tls:seg', offset: 2525, content: '', id: KR3k0012_CHANT_089-19a.7}
  - {type: variant, offset: 2525, length: 0, content: '', SBCK: 太子納史良娣生皇孫納王夫人生宣帝號曰皇曽孫生數月遭巫蠱事太子良娣皇孫王夫人皆遇害曽孫坐繫郡邸獄邴吉爲廷尉􅁥治巫蠱憐曽孫之亡辜使女徒乳養私給衣食至後元二年望氣者言長安獄有天子氣上遣使者皆殺之内署令郭穰夜至郡邸獄吉拒閉不得入曽孫賴吉得全因遭大赦吉乃載曽孫送祖母史良娣家後有詔掖庭養視上屬籍宗正時掖庭令張賀嘗事戾太子哀曽孫奉養甚謹以私錢供給教書旣壯爲取暴室嗇夫許廣漢女曽孫因依􅀝廣漢兄弟及祖母家受詩於東海澓仲翁澓音馥髙才好學然亦喜遊俠闘雞走馬具知閭里之姧邪吏治得失周遍三輔常困於蓮芍鹵中尤樂鄠杜間率常在下杜劭應曰下杜杜陵之下時㑹諸朝􅃕長安尚冠里身足下有毛遍身及足下皆有毛卧居數有光曜毎買餅所從買家輙大售亦以此自恠元平元年昭帝崩無嗣霍光徵昌邑王賀賀淫亂廢七月光奏遣宗正得至尚冠里舎沐浴賜御府衣太僕以軨獵車奉迎曽孫就齊宗正府封爲陽武侯群臣上璽即皇帝位甘露三年匈奴呼韓耶單于皆來朝賛謁稱藩臣而不名黃龍元年帝崩於未央宫在位二十五年漢書曰宣帝始立謁見髙廟大將軍光叅乗上内嚴憚之􅀂芒刺在背後張安丗代光叅乗天子從容肆意甚安及光身死而宗族竟誅漢書賛曰}
