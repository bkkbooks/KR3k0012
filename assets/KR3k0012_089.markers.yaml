  - {type: variant, offset: 5339, length: 2, content: 漢武, krp: 孝成皇帝諱驁字太孫元帝太子母曰王皇后元}
  - {type: variant, offset: 5340, length: 0, content: '', WYG: 髙廟神靈遣虎賁}
  - {type: variant, offset: 5341, length: 0, content: '', WYG: 士入髙廟拔劔四面提擊桃湯赭鞭鞭灑屋壁或言黃}
  - {type: variant, offset: 5342, length: 0, content: '', WYG: 建華蓋以登仙乃造華蓋九重髙八丈一尺車上人擊鼓􅞮者皆呼登仙百官竊言此似轜車非仙物也莽知天下潰叛乃遣使分行天下除井田奴婢山澤六筦之禁㑹後漢兵起三月辛巳立劉聖公為天子莽愈恐欲外視自安乃染其髮鬢進所徵天下淑女立杜陵史氏女為皇后聘黄金三萬斤遣王邑王尋等兵百萬號曰虎牙五威兵定山東圍昆陽世祖來救昆陽邑等大敗關中聞知震恐命明學男張邯稱說其徳及符命事因曰易言伏戎于莽升其髙陵三嵗不興莽皇帝名升劉謂伯升髙陵謂髙陵侯子翟義也言劉升翟義為伏戎之兵於新皇帝世猶殄㓕不興也後莽兵敗莽憂憊不能食但飲酒啖鰒魚讀軍書倦因憑几寐不復就牀矣但為厭勝遣壊渭陵延陵門罘罳曰無使民復思漢也崔發言周禮左傳國有大災則哭以厭之莽乃至南郊陳符命本末仰天曰皇天即授臣莽何不殄滅衆賊因拊心大哭氣盡伏而叩頭作告天䇿文千餘言諸生小民甚哀及能誦䇿文者除為郎拜將軍九人為九虎將漢丞相司直李松與鄧曄共攻京師以王憲為校尉略地至長門宫茂陵董喜之屬皆假號稱漢將長安旁兵四㑹城下爭欲先入城貪立大功莽分赦城中諸獄囚皆授兵殺狶飲其血誓曰有不為新室者社鬼記之衆兵發掘莽妻子父祖塜燒棺椁及九廟明堂辟雍火照城中少年朱第張魚等燒作室門斧敬法闥呼曰反虜王莽何不出降火及掖庭莽避火宣室火輙隨之宫人婦女啼呼曰當奈何莽紺袀服帶璽韍紺深青袀音戈旬切持虞帝匕首天文即案拭於前日時加某莽旋席隨斗而坐曰天生徳於予漢兵其如予何庚戌晨旦羣臣扶莽自前殿南下椒除西出白虎門就車之漸臺欲阻池水猶抱持符命威斗公卿大夫從官尚千餘人王邑晝夜戰罷極入見其子侍中睦解衣冠欲逃邑叱之令還父子共守莽軍人入殿中呼曰反虜王莽安}
