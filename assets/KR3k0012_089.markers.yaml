  - {type: variant, offset: 4057, length: 292, content: 怨色太子視之不輟亞夫於是起帝曰爾何故視此人耶對曰此人可畏必能作賊帝笑曰因此怏怏非少主之臣也廷尉上囚防年繼母陳殺父因殺陳依律年殺母大逆論而帝疑之詔問太子太子對曰夫繼母如母明其不及母也緣父之愛故比之於母耳今繼母無狀手殺其父則下手之日母恩絕矣宜與殺人者同不宜大逆論帝從之年棄巿刑議者稱善時太子年十四帝益以奇之從即位常晨往夜還與霍去病等十餘人皆輕服為微行且以觀戲巿里察民風俗嘗至蓮勺通道中行行者皆奔避路上怪之使左右問之云有持戟詐呵者數十人時微行率不過二十人馬七八疋更步更騎衣如凡庶不可別也亦了無騶御而百姓咸見之又嘗至柏谷夜投亭宿亭長不內乃宿於逆旅逆旅翁謂上曰汝長大多力當勤稼穡何忽帶劍眾夜行此, SBCK: 壯髮}
