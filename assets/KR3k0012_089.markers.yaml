  - {type: variant, offset: 2420, length: 5, content: 放命圯族鯀, SBCK: 曰昌邑哀王髆天漢四年立十一年薨子賀嗣立十三年昭帝崩無嗣大將軍霍光徴王駕典䘮王乗傳詣大安邸夜漏未盡一刻以火發書其日中賀發晡時至定陶行百三十五里侍從者馬死相望於道郎中令龔遂諌王令還郎謁者五十餘人賀到濟陽求長鳴雞道買積竹杖文頴注曰合竹作杖也過􅀪農使大奴善以衣車載女子旦至廣明東都門遂曰禮奔䘮望見國都哭此長安東郭門也賀曰嗌痛不能哭至城門遂復言賀曰城門與郭門等耳旦至未央宫東闕遂曰昌邑帳在是闕外馳道北文穎曰吊哭帳未至帳所有南北行道馬足未至數歩大王冝下車也嚮闕西靣伏哭盡哀止王曰諾到哭如儀王受皇帝璽綬襲尊號即位二十七日行􅁋亂大將軍光與群臣議白孝昭皇帝后廢賀歸故國􅀄賀在國時數有恠嘗見白犬髙三尺其頸似人而冠方山冠後復見熊左右皆莫見又大鳥飛集宫中王知惡}
