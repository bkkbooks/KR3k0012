  - {type: variant, offset: 1299, length: 0, content: '', WYG: 宣帝廟名樂逰後漢班固宣帝述曰中宗明明寅用刑名時舉傅納聽斷惟精柔逺能邇燀燿威靈龍荒朔漠莫不來庭丕顯烈祖尚於有成}
  - {type: page-break, offset: 1299, content: '', id: KR3k0012_WYG_089-9a, image: WYG0893/WYG0893-0720a.png}
  - {type: variant, offset: 1300, length: 0, content: '', WYG: 元皇帝漢書帝紀曰孝元皇帝諱奭之字曰盛宣帝太子也母曰共哀許皇后宣帝㣲時生民間八嵗為太子壯大柔仁好儒見宣帝所用多}
  - {type: variant, offset: 1301, length: 0, content: '', WYG: 法吏以刑名繩下大臣楊惲等坐刺譏辭語而誅常從容言陛下持刑太深宜用儒生宣帝作色曰漢家自有制度本以覇王道雜理之奈何純任徳教且俗儒不逹時宜好是古非今使人眩於名實何足任乃歎曰亂我家者太子也由是踈太子而愛淮陽王明察好法宜為吾子而王母張婕妤尤幸上欲代太子然以少依許氏故終不背焉宣帝崩太子}
  - {type: page-break, offset: 1301, content: '', id: KR3k0012_WYG_089-9b, image: WYG0893/WYG0893-0720b.png}
  - {type: variant, offset: 1303, length: 1, content: 二, WYG: 頻年行幸甘泉河東郊祀泰畤祠后土幸長楊射熊舘布車騎大獵竟寧元年崩於未央宫在位}
  - {type: variant, offset: 1305, length: 1, content: 三, WYG: 六}
