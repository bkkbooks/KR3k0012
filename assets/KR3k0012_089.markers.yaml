  - {type: variant, offset: 1647, length: 510, content: 彩畫華欀壁墻軒檻皆飾以黃金其勢不可以書囊為帷又帝率聽政宣室不在明光宮也薄太后孝景二年薨不持三年服也匈奴數犯塞侵擾邊境候騎至甘泉烽火通長安由是北邊置屯守戰設備胡兵連不解轉輸騷擾費積虛耗因以年歲不登百姓飢乏穀糴嘗至石五百非一升一錢也上曰臨朝揔政施號令何如未及對上復謂向校尉宗室師傅耆舊洽聞親事先帝歷見三世得失勿有所隱向曰文帝嘗過輦郎署呼郎中馮唐問以趙將廉頗李牧唐言今雖有此人不能用也推輦而去還歸禁中召責讓唐鄧通以佞幸吮癰見愛賜以蜀郡銅山令得鑄錢通私家之富侔於王者邦君又為微行數幸通家衣罽旃從侍中近臣常侍期門武騎獵漸臺下騎射狐免上曰後世皆言文帝治天下幾致太平其德偕周成王此語何從生向曰文帝治禮言者不傷其意臣無以大小至即從容言上止輦聽之言事者多襃之後人見其遺文則以為然世之毀譽莫能得實審形者少隨聲者多然文帝之節儉約身以變天下忍容言者含咽臣子之矩此過人難及也典論曰文帝慈孝寬弘仁厚躬脩玄默以儉帥下奉生送終事從約省美聲塞於宇宙仁風暢於四海又曰文帝思賢甚於飢渴用人速於順流班固漢書述曰太宗穆穆允恭玄默化民以躬帥下以德我德如風民應如草國富刑清登我漢道孝景皇帝史記曰孝景皇帝孝文帝之中子也文帝初在代前后有三男及竇太后行前三子更死故景帝得立, WYG: ''}
