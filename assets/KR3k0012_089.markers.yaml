  - {type: variant, offset: 2519, length: 0, content: '', SBCK: 曰昌邑王即位好弄􅇾闘虎使官奴􅀐乗遊戯掖庭之中與孝昭帝宫人淫亂詔掖庭令敢泄言腰斬王受璽凡二十七日有罪千一百二十七條霍光迺即持其手解脫其璽組奏上太后扶王下殿岀金馬門群臣隨送王西靣拜曰愚戇不任漢事起就乗輿副車大將軍光送至昌邑邸光謝曰王行自絶於天臣等駑怯不能殺身以報德寜􅀒王不敢􅀒社稷願王自愛漢書曰王吉字子陽爲昌邑中尉上䟽諌曰大王不好書術而樂逸遊馮試樽銜服虎曰樽促也或曰桂也撙}
  - {type: page-break, offset: 2519, content: '', id: KR3k0012_SBCK_089-4a}
  - {type: variant, offset: 2519, length: 1, content: 音, WYG: 帝}
  - {type: variant, offset: 2519, length: 0, content: '', krp: 曰昌邑王即位好弄彘闘虎使官奴騎乗遊戯掖庭之中與孝昭帝宫人淫亂詔掖庭令敢泄言腰斬王受璽凡二十七日有罪千一百二十七條霍光迺即持其手解脫其璽組奏上太后扶王下殿岀金馬門群臣隨送王西靣拜曰愚戇不任漢事起就乗輿副車大將軍光送至昌邑邸光謝曰王行自絶於天臣等駑怯不能殺身以報德寜負王不敢負社稷願王自愛漢書曰王吉字子陽爲昌邑中尉上䟽諌曰大王不好書術而樂逸遊馮試樽銜服虎曰樽促也或曰桂也撙}
  - {type: variant, offset: 2520, length: 0, content: '', SBCK: 子本反馳騁不止口倦乎叱咤手苦於轡箠身勞乎車輿朝則冒霜露晝則􅀍埃塵夏則爲大暑之所暴炙冬則爲風寒之所偃薄偃靡也遇疾風而靡也薄迫也數以耎脆之玉體耎柔而兖切犯勤勞之煩毒非所以全壽命之宗也又非所以進仁}
  - {type: variant, offset: 2520, length: 1, content: 義, WYG: 紀}
  - {type: variant, offset: 2520, length: 0, content: '', krp: 子本反馳騁不止口倦乎叱咤手苦於轡箠身勞乎車輿朝則冒霜露晝則𬒳埃塵夏則爲大暑之所暴炙冬則爲風寒之所偃薄偃靡也遇疾風而靡也薄迫也數以耎脆之玉體耎柔而兖切犯勤勞之煩毒非所以全壽命之宗也又非所以進仁}
  - {type: punctuation, offset: 2521, content: 》, id: KR3k0012_CHANT_089-bkkpn654}
  - {type: variant, offset: 2521, length: 0, content: '', SBCK: 之隆也夫廣厦之下細氊之上明師居前勸誦在後上論唐虞之際下及殷周之盛學仁聖之風習治國之道忻忻焉發憤忘食日新厥德其樂豈不長哉大王誠留意則心有堯舜之志體有喬松之壽美聲譽發而上聞則福禄其臻而社稷安矣中宗孝宣皇帝漢書帝紀}
