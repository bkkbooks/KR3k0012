  - {type: variant, offset: 367, length: 343, content: 聞於天下故大臣因天下之心而欲迎立大王大王勿疑也代王卜之龜兆得大橫占曰大橫庚庚余為天王夏啟以光代王曰寡人固以為王矣又何王卜人曰所謂天王者乃天子也代王乃命宋昌參乘張武等六人乘傳詣長安至高陵休止而使宋昌先馳之長安觀變昌至渭橋丞相已下皆迎宋昌還報代王馳至渭橋群臣拜謁太尉勃進曰願請間言昌曰所言公公言之所言私王者不受私太尉乃跪上天子之璽符代王謝曰至代邸而議之遂馳入代邸宗室大臣列侯吏二千石皆伏固請代王西向讓者三南向讓者再遂即天子位即日夕入未央宮三年匈奴入北地居河南為寇帝自甘泉之高奴因幸太原見故群臣皆賜之舉功行賞十三年齊太倉令淳于公有罪當刑少女緹縈自傷泣乃隨其父至長安上書願沒入為官婢贖父刑罪使得自新書奏天子天子憐悲其意乃下詔曰夫刑至斷支體刻肌膚終身不息何其楚痛豈稱為民父母之意哉其除肉刑又曰孝文, SBCK: 元}
