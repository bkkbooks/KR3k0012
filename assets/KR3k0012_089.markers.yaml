  - {type: variant, offset: 5339, length: 2, content: 漢武, SBCK: 孝成皇帝諱驁字太孫元帝太子母曰王皇后元}
  - {type: variant, offset: 5339, length: 0, content: '', WYG: 髙皇帝大怒趣歸我國不者九月必殺汝莽捕殺之更名匈奴單于曰奴服于是時有用方技待詔黃門者或問莽形貌待詔曰莽所謂鴟目虎吻豺狼之聲者也故能食人亦當為人所食問者告之莽誅待詔後常翳雲母屛風非親近莫得見也更名髙句驪為下句驪五年二月文母皇太后崩立廟長安新室世世獻祭先帝配食坐於牀下又明六筦之令犯禁者至死臨淮𤓰田儀姓𤓰田名儀為盗賊琅琊女子吕母亦起莽之南郊鑄作威斗若北斗欲以厭勝衆兵莽見盗賊起乃命令太史推三萬六千嵗厯紀六年一改元布天下大募天下丁男及死罪囚吏民奴名曰猪突狶勇以為銳卒莽見盗賊多欲視為自安遂營長安城南提封百頃親舉築三下即陽城脩獻符命言黃帝以百二十女致神仙乃遣分行天下博採淑女莽夢見長樂宫銅人起立惡之念銅人銘有皇帝初兼天下之文使尚方工䥴滅銅人膺文又感}
  - {type: page-break, offset: 5339, content: '', id: KR3k0012_WYG_089-18a, image: WYG0893/WYG0893-0724c.png}
