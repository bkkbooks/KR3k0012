  - {type: variant, offset: 2612, length: 593, content: 冬十月行幸雍祠五畤獲白麟乃作白麟之歌元鼎四年冬十月行自夏陽東幸汾陰十一月甲子后土祠于汾陰睢之上蘇林曰睢音雖如淳曰睢者河之東岸也元封元年應劭曰始封大山故改年也行自雲陽北歷上郡西河五原出長城山登單于臺至于朔方臨北河勒兵十八萬騎旌旗徑千餘里威震匈奴還祠黃帝于橋山乃歸甘泉遂東巡於海上夏四月上還登封太山王者功成治定告成功天封岱宗也助天高也刻於石記號有金策石函金泥玉撿之封焉降明堂案郊祠志曰初天子封太山太山東北趾古時有明堂也行自太山復東巡於海上至碣石文頴曰在遼西絫縣今罷屬臨榆此石著海旁韋昭地理曰在古北平彊城西南也二年冬十月行幸雍祠五畤春幸緱氏遂至東萊夏四月還祠太山至瓠子服虔曰瓠子隄名也蘇林曰在甄城以南濮陽以西廣百步深五丈臨決河命從臣將軍以下皆負薪塞河隄作瓠子之歌四年冬十月幸雍祠五畤通回中道應劭曰回中在安定高平有險阻蕭關在其北通至長安也孟康曰回中在北池山險有武帝故宮如淳曰三輔黃圖云回中宮在汧也遂北巡蕭關如淳曰匈奴傳匈奴入朝郍蕭關在安定朝郍縣也五年冬南巡狩至于盛唐如淳曰縣名也韋昭曰南郡也望祀虞舜于九疑應劭曰舜葬蒼梧九疑山今在零陵營道也祭灊天柱山應劭曰灊音潛南嶽霍山灊縣名屬廬江文頴曰天柱山灊縣南有祠自尋陽浮江親射蛟江中獲之舳艫千里太初元年應劭曰用夏正以正月為歲首故改年為太初行幸太山十一月甲子朔旦冬至祀上帝于明堂天漢三年應劭曰時頻年苦旱故改年為天漢以祈甘雨晉灼曰取雲漢之詩求雨之意也初榷酒酤, WYG: ''}
