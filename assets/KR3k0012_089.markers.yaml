  - {type: variant, offset: 5328, length: 0, content: '', WYG: 元皇后之弟子也父及兄弟皆以元成世封侯輔政凡九侯五大司馬唯莽父曼早死不侯五侯侈靡莽獨孤貧因折節為儉受禮經勤身博學事母及寡嫂孤兄子行甚整備又外交英俊内事諸父世父鳳疾莽侍病亂髪垢面鳳且死以託太后及帝拜黃門郎永始中封為新都侯逰者為之談說虛譽隆洽太后姊子淳于長先進在莽右莽隂求其罪因大司馬根白之長伏誅莽以獲忠直根因薦自代上遂擢為大司馬輔政莽欲令名譽過前人遂克己不倦嵗餘成帝崩哀帝即位傅太后丁姬皆稱尊號丞相朱博奏莽前不廣尊親之義請免為庶人乃遣就國杜門自守吏民寃訟莽者以百數元壽元年徵莽嵗餘哀帝崩莽為大司馬平帝即位太后臨朝皆委政於莽羣臣奏莽定策安宗廟賜號安漢公莽以女配帝欲擅權帝母衛姬及舅並留中山莽子宇􅂲帝大後見怨與師吳章夜持血灑莽門吏發覺之莽執宇送獄死莽因作書八篇以戒子孫宜班郡國以著官簿比孝經吏人上書者八千餘人咸曰伊尹為阿衡周公為太宰宜採伊周稱號加公為宰衡又加九錫鸞輅龍旂莽又増法五十條犯者徙之四海徙者以十萬數民始怨矣平帝疾莽作策請命願以身代藏策金縢平帝崩莽惡立長乃選子嬰年三嵗託以卜相最吉是月前煇光謝囂奏}
