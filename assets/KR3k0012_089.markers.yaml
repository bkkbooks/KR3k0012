  - {type: variant, offset: 1091, length: 7, content: 無刃衣縕無文集, WYG: 靡也薄迫也數以耎脆之玉體耎柔而兖切犯勤勞之煩毒非所以全壽命之宗也又非所以進仁義之隆也夫廣厦之下細氊之}
