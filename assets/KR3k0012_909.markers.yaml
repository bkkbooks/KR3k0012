  - {type: variant, offset: 1428, length: 2, content: 少咸, krp: 青丘之國有狐而九尾郭璞注曰丗平則出爲瑞也又曰武都}
  - {type: variant, offset: 1432, length: 0, content: '', SBCK: 有黒水焉其上有玄狐蓬尾蓬蓬其尾也􅀃􅁐日蓬狐文豹書紀年曰宣王時鳥化爲狐夏伯抒子東征獲狐九尾玄中記曰五十􅀊之狐爲淫婦百􅀊狐爲羙女又爲巫神禮斗威儀曰君乗火王政平南海輸以文狐春秋潜潭巴曰白狐至國民利不至下驕恣韓詩外傳曰狐水神也春秋後語曰楚宣王以昭奚恤爲相諸侯畏之王問群臣曰吾聞北方畏昭奚恤亦誠何如江乙對曰虎求百}
  - {type: variant, offset: 1432, length: 0, content: '', krp: 有黒水焉其上有玄狐蓬尾蓬蓬其尾也說苑日蓬狐文豹書紀年曰宣王時鳥化爲狐夏伯抒子東征獲狐九尾玄中記曰五十歲之狐爲淫婦百歲狐爲羙女又爲巫神禮斗威儀曰君乗火王政平南海輸以文狐春秋潜潭巴曰白狐至國民利不至下驕恣韓詩外傳曰狐水神也春秋後語曰楚宣王以昭奚恤爲相諸侯畏之王問群臣曰吾聞北方畏昭奚恤亦誠何如江乙對曰虎求百}
  - {type: punctuation, offset: 1433, content: ，, id: KR3k0012_CHANT_909-bkkpn522}
  - {type: 'tls:seg', offset: 1433, content: '', id: KR3k0012_CHANT_909-26a.8}
  - {type: variant, offset: 1433, length: 0, content: '', SBCK: 而食之得狐狐曰子無噉我天帝令我長百獸子􅀂食我是逆天帝之命子以我爲不信我爲子先行隨我後觀百獸見我能無走乎虎以爲然隨狐而行百獸見之皆走虎不知獸之畏已反以爲畏狐也今王地方五千里帶甲百萬而任之於昭奚恤然北方非畏奚恤}
  - {type: page-break, offset: 1433, content: '', id: KR3k0012_SBCK_909-5b}
  - {type: variant, offset: 1433, length: 0, content: '', krp: 而食之得狐狐曰子無噉我天帝令我長百獸子若食我是逆天帝之命子以我爲不信我爲子先行隨我後觀百獸見我能無走乎虎以爲然隨狐而行百獸見之皆走虎不知獸之畏已反以爲畏狐也今王地方五千里帶甲百萬而任之於昭奚恤然北方非畏奚恤}
