  - {type: variant, offset: 2274, length: 116, content: 狒狒人身反踵笑即上脣掩其目一名梟羊北方謂之土螻山海經曰狒狒如人面脣黑身有毛反踵見人則笑笑則上脣掩目交廣及南康山中有大者丈餘俗呼為山都山海經圖讚曰狒狒怪獸被髮操竹獲人則笑脣蓋其目終亦號咷反為我戮吳都賦曰猩猩啼而就擒狒狒笑而被格風母十洲, SBCK: 天子獵於滲澤得玄狢以􅀕河宗後秦}
