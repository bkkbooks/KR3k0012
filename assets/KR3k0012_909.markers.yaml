  - {type: variant, offset: 1241, length: 6, content: 如熊脂如熊白, SBCK: 後死則首丘禮檀弓曰君子曰樂樂其所自生禮不忘其夲古之人有言曰狐死正丘首仁也易解卦曰九二田獲三狐得黄矢貞􅁻又曰未濟亨小狐汔濟濡其尾詩國風曰南山崔崔雄狐綏綏又曰有狐綏綏在彼淇梁又曰莫赤匪狐莫黒匪烏漢書曰陳勝呉廣於所次旁藂祠張晏曰次人所止處藂祠􅀑所慿夜篝音構火狐鳴呼曰大楚興陳勝王卒皆夜驚恐旦日卒中往往指目勝廣晉書曰王浚據幽州有狐踞府門躍入㕔事後浚果敗又曰涼武昭王暠子歆爲涼州牧時有狐上南門主簿汜稱曰諺曰野獸入家主人將去狐上南門又狐者胡也天意􅀂曰有胡人居于此城南面}
