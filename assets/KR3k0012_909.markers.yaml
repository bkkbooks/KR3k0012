  - {type: variant, offset: 2455, length: 425, content: 歲南州異物記曰風母獸一名平猴狀如猴無毛赤目若行逢人便叩頭似如懼罪自乞人若檛打之愜然死地無復氣息小得風吹須臾能起抱朴子內篇曰風生獸似豹青色大如猩猩生南海大林中張取積薪數車以燒之薪盡此獸在灰中不然其毛不燋斫剌不入打之如皮囊以錐鎪其頭數十乃死嶺南異物志風猩如猿猴而小晝日踡伏不能動夜則騰躍甚疾好食蜘蛛蟲打殺以口向風復活唯破腦不復生矣以酒浸愈風疾南人相傳云此獸常持一小杖遇物則指飛走悉不能去人有得之者所指必有獲夷人施罟網既得其獸不復見其杖杖之數百乃肯為人取或云邕州首領甯洄得之洄資產巨萬僮伎數百洄甚秘其事豻說文曰豻胡地野狗也異物志曰豻猨屬頭形正方髮長尺餘皆蒼色犬類似人有所視輒搖頭兩手被髮不爾則覆鄣其兩目衣毛皤皤若披狐裘木居洄藏密向乃得見耳蹶爾雅曰西方有比肩獸與邛邛矩虛比焉其名曰蹶孫子曰北方有獸其名曰蹶前足鼠後足兔是獸也甚矣其愛蛩蛩巨虛也食得甘草必齧以遺蛩蛩巨虛蛩蛩巨虛見人將來必負蹶以走蹶非性心愛蛩蛩巨虛也為假足也二獸者亦非性心愛蹶也為其得甘草而遺之故也, SBCK: 九}
