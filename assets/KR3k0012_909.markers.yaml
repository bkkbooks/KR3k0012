  - {type: variant, offset: 58, length: 1, content: 獻, SBCK: 髙祖使太子將兵四皓曰今使太子將兵無異羊將狠也宋書曰王仲德􅀄遇符氏之敗兄叡同起義兵與慕容垂戰敗仲德􅀍重創走與家屬相失路經大澤困未能玄卧林中有一小兒青衣年可七八􅀊􅀐牛行見仲德驚曰巳食未仲德言飢小兒玄湏􅁷復來得飯與之食畢欲行而􅁀雨莫知津逕有一白狼至前仰天而號號訖銜仲德衣因渡水仲德隨後得濟與叡相見後魏書曰匈奴單于生女姿容甚羙國人皆以爲神單于曰吾有此女安可配人將以與天乃於國無人之地築髙臺置二女}
  - {type: page-break, offset: 58, content: '', id: KR3k0012_SBCK_909-2a}
  - {type: variant, offset: 58, length: 1, content: 獻, WYG: 髙祖使太子将兵四皓曰今使太子將兵無異羊禦狼也宋書曰王仲徳初遇苻氏之敗兄叡同起義兵與慕容垂戰敗仲徳被重創走與家屬相失路經大澤困未能去乃卧林中有一小兒青衣年可七八歳騎牛行見仲徳驚曰漢已食未仲徳言未小兒去須臾復来得飯與之食畢欲行而暴雨莫知津逕有一白狼至前仰天而號號訖銜仲徳衣因渡水仲徳隨後得濟與叡相及後魏書曰匈奴單于生二女姿容甚美國人皆以為神單于曰吾有此女安可配人將以與天乃於國無人之地築髙臺置二女}
