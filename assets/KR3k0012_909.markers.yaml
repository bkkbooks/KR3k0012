  - {type: variant, offset: 156, length: 1, content: 熊, WYG: 君子曰樂樂其所自生禮不忘其本古之人有言曰狐死正丘首仁也言不忘本也易解卦曰九二田獲三狐得黄矢貞利又曰未濟亨小狐汔濟濡其尾詩國風曰南山崔崔雄狐綏綏又曰有狐綏綏在彼其梁又曰莫赤匪狐莫黑匪烏漢書曰陳勝令吳廣之次所旁叢祠中張晏曰戍人所止處也叢鬼所憑也夜構火狐鳴呼曰大楚興陳勝王卒皆夜驚恐旦日卒中徃徃指目勝廣晉書曰王浚據幽州有狐踞府門躍入㕔事後浚果敗又曰凉武昭王暠子歆為凉州牧時有狐上南門主簿范稱曰諺曰野}
