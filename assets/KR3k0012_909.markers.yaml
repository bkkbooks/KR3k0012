  - {type: 'tls:seg', offset: 1297, content: '', id: KR3k0012_CHANT_909-23a.13}
  - {type: variant, offset: 1297, length: 419, content: 初母姜氏夢大羆而孕長而勇果北史曰齊神武遣韓軌司馬子如從河東霄濟華州襲王羆羆不覺比曉眾已乘梯入城羆尚臥未起聞閣外匈匈有聲便袒身露髻徒跣持一白挺大呼而詬曰老羆當道臥貛子那敢過敵見驚退猰窳爾雅曰猰窳類貙虎食人迅走貙勑俱切海內經曰猰窳龍首而虵身人面居於弱水中食人山海經曰少咸之山獸其狀如牛而赤身人面馬足名曰猰窳其音如嬰兒食人淮南子曰堯時猰窳為民害堯乃使羿殺之貙爾雅曰貙似狸郭璞曰今貙虎大於虎豹文如狸山民呼貙虎大者為貙犴搜神記曰江漢之域有貙人其先君之苗裔也能化為虎長沙所屬蠻縣東高居民作檻捕虎得一亭長赤幘大冠在檻中問其故亭長大怒曰昨忽被縣召避雨遂誤入此中於是即出之乃化為虎上山俗云虎化為人好著葛衣其足無踵虎有五指者皆是貙貘爾雅曰貘白豹也郭璞注曰似熊小頭痺腳黑白駮能䑛食銅鐵及竹骨骨節強直中實少髓皮辟濕說文曰貘似熊黃色出蜀廣志曰貘大如驢色蒼白舐鐵消十斤其皮溫煗抱朴子曰劉子知二負之尸東方生識啖鐵之獸實賴鳥禹之書大荒之籍矣神異經曰西荒之中有人焉頭如人著, WYG: 太平御覽卷九}
