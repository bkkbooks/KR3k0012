  - {type: variant, offset: 1717, length: 1163, content: 結敗衣手足虎爪名曰貘㺔音偽伺人獨自輒往就人睡先使捕蝨得臥而舌出槃地丈餘燒大石投舌上於是而死騊駼周書曰正北空桐橐駞騊駼為獻爾雅曰騊駼馬郭璞注曰出山海經其色青說文曰騊駼野馬之良也史記曰匈奴奇畜則騊駼廣志曰騊駼匈奴名馬也山海經曰北海內有獸焉其狀如馬名曰騊駼猩猩爾雅曰猩猩小兒啼今交趾封溪出猩猩狀如貛㹠聲似小兒啼禮記曰猩猩能言不離禽獸春秋說題辭曰猩猩者矜精者也故能言可使陽烈之類以撿下宋均曰矜謂使人自矜在精審也猩猩言說人善惡是陽氣之烈好善王者所以檢下也廣志曰猩猩似狟音丸聲如兒啼不聞其言出交阯封溪縣山海經曰有獸人面名曰猩猩又曰猩猩知人名其為獸如豕而人面山海經讚曰猩猩似狐走立行伏懷木挺刀少辛明目華陽國志曰永昌郡有猩猩能言其血可以染朱罽孫卿子曰猩猩能言笑亦二足無毛而君子啜其羹食其肉故人非以二足無毛以知禮也呂氏春秋曰伊尹說曰肉之美者猩猩之脣淮南萬畢術曰歸終知來猩猩知往注曰歸終猩猩並神獸括地圖曰猩猩人面豕身知人名蜀志曰封溪縣有獸曰猩猩體似豬面似人音作小兒啼聲既能語又知人姓名人知以酒取之猩猩覺初暫嘗之得其味甘而飲之終見羈纓也酈善長注水經曰西蜀封溪縣猩猩人面獸形能言語南方草物狀曰猩猩之獸生在野中狀如㹠子民人捕取交阯武平興古有之晉郭璞猩猩讚曰能言之獸是謂猩猩厥狀似貛號音若嬰自然知往頗測物情狒狒爾雅曰狒狒如人被髮迅走食人說文曰狒狒人身反踵笑即上脣掩其目一名梟羊北方謂之土螻山海經曰狒狒如人面脣黑身有毛反踵見人則笑笑則上脣掩目交廣及南康山中有大者丈餘俗呼為山都山海經圖讚曰狒狒怪獸被髮操竹獲人則笑脣蓋其目終亦號咷反為我戮吳都賦曰猩猩啼而就擒狒狒笑而被格風母十洲記曰炎州有風生獸似豹青色大如猩猩燒之不死斫剌不入以鐵椎鍜其刀頭乃死以其口向風須臾活以石上菖蒲塞其鼻即死取其腦菊華和服之盡卜斤壽五百歲南州異物記曰風母獸一名平猴狀如猴無毛赤目若行逢人便叩頭似如懼罪自乞人若檛打之愜然死地無復氣息小得風吹須臾能起抱朴子內篇曰風生獸似豹青色大如猩猩生南海大林中張取積薪數車以燒之薪盡此獸在灰中不然其毛不燋斫剌不入打之如皮囊以錐鎪其頭數十乃死嶺南異物志風猩如猿猴而小晝日踡伏不能動夜則騰躍甚疾好食蜘蛛蟲打殺以口向風復活唯破腦不復生矣以酒浸愈風疾南人相傳云此獸常持一小杖遇物則指飛走悉不能去人有得之者所指必有獲夷人施罟網既得其獸不復見其杖杖之數百乃肯為人取或云邕州首領甯洄得之洄資產巨萬僮伎數百洄甚秘其事豻說文曰豻胡地野狗也異物志曰豻猨屬頭形正方髮長尺餘皆蒼色犬類似人有所視輒搖頭兩手被髮不爾則覆鄣其兩目衣毛皤皤若披狐裘木居洄藏密向乃得見耳蹶爾雅曰西方有比肩獸與邛邛矩虛比焉其名曰蹶孫子曰北方有獸其名曰蹶前足鼠後足兔是獸也甚矣其愛蛩蛩巨虛也食得甘草必齧以遺蛩蛩巨虛蛩蛩巨虛見人將來必負蹶以走蹶非性心愛蛩蛩巨虛也為假足也二獸者亦非性心愛蹶也為其得甘草而遺之故也, WYG: 九}
