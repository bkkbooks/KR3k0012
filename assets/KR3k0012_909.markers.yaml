  - {type: 'tls:seg', offset: 2236, content: '', id: KR3k0012_CHANT_909-42a.4}
  - {type: variant, offset: 2237, length: 5, content: 謂猩猩厥狀, SBCK: 老精聞燕昭王墓有華表柱向千年可取照之當見如言化爲狐又曰有一書生呉中皓首稱胡􅀶士教授諸生忽復不見九月九日士人相與登山遊觀聞講書聲命僕尋之見空􅃁中群狐羅列見人即走老狐獨不去是皓首書生續搜神記曰襄陽習鑿齒爲荆州主簿從桓武帝出獵時大雪於江陵城西見草上雪氣岀伺視見一黄物射之應箭死徃取乃一老雄狐脚上帶綘綾香囊又曰呉郡頋旃獵至一崗忽聞人語聲云咄咄今年衰乃與衆㝷覔崗項有一穽是古時􅃁見一老狐蹲􅃁中前有一卷簿書老狐對書屈指有所計校放犬咋殺之取視口中無復齒頭毛皆白簿書悉是姧愛人女名巳經姧者朱鈎頭所䟽名有百數旃女正在簿次金樓子曰狐白之裘天子􅀍之而在廟堂爲狐計者不􅀂走於平澤狢􅀃文曰狢}
  - {type: page-break, offset: 2237, content: '', id: KR3k0012_SBCK_909-7b}
