  - {type: variant, offset: 1520, length: 540, content: 能化為虎長沙所屬蠻縣東高居民作檻捕虎得一亭長赤幘大冠在檻中問其故亭長大怒曰昨忽被縣召避雨遂誤入此中於是即出之乃化為虎上山俗云虎化為人好著葛衣其足無踵虎有五指者皆是貙貘爾雅曰貘白豹也郭璞注曰似熊小頭痺腳黑白駮能䑛食銅鐵及竹骨骨節強直中實少髓皮辟濕說文曰貘似熊黃色出蜀廣志曰貘大如驢色蒼白舐鐵消十斤其皮溫煗抱朴子曰劉子知二負之尸東方生識啖鐵之獸實賴鳥禹之書大荒之籍矣神異經曰西荒之中有人焉頭如人著百結敗衣手足虎爪名曰貘㺔音偽伺人獨自輒往就人睡先使捕蝨得臥而舌出槃地丈餘燒大石投舌上於是而死騊駼周書曰正北空桐橐駞騊駼為獻爾雅曰騊駼馬郭璞注曰出山海經其色青說文曰騊駼野馬之良也史記曰匈奴奇畜則騊駼廣志曰騊駼匈奴名馬也山海經曰北海內有獸焉其狀如馬名曰騊駼猩猩爾雅曰猩猩小兒啼今交趾封溪出猩猩狀如貛㹠聲似小兒啼禮記曰猩猩能言不離禽獸春秋說題辭曰猩猩者矜精者也故能言可使陽烈之類以撿下宋均曰矜謂使人自矜在精審也猩猩言說人善惡是陽氣之烈好善王者所以檢下也廣志曰猩猩似狟音丸聲如兒啼不聞其言出交阯封溪縣山海經曰有獸人面名曰猩猩又曰猩猩知人名其為獸如豕而人面山海經讚曰猩猩似狐走立行伏懷木挺刀少辛明目華陽國志曰永昌郡有猩猩能言其血可以染朱罽孫卿子曰猩猩能言笑亦二足無毛而君子啜其羹食其肉故人非以二足無, SBCK: 必卑體弭}
