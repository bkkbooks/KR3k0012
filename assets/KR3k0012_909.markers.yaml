  - {type: variant, offset: 955, length: 3, content: 晉升平, WYG: 酒泉郡每太守到官無㡬輙卒死後渤海陳斐見授此郡斐行卜卜者曰逺諸侯放伯裘能觧此則無憂斐既到官侍有張侯醫有王侯卒有史侯斐恒逺之夜半有上斐被者便以被冒取之物跳踉音狼訇訇作聲乃言曰我無惡意赦我當報恩斐曰汝為何魅曰我本千年狐今為魅垂化為神幸放我我字伯裘府君有急難呼我斐乃喜便放之忽然有赤光如電後每事先以語斐於酒泉境界無毫髮之奸咸曰聖君月餘主簿李音私通斐侍婢既而驚遽懼為伯裘所白遂與諸侯謀殺斐伺旁無人便伏入欲格殺之斐即呼伯裘有物如曵疋練諸侯伏地失魂乃以次縳取皆伏即殺音等伯裘乃辭謝斐曰未能白奸乃為府君所召猶用慙又曰燕昭王墓有老狐化男子詣張華講説華怪之謂雷孔璋曰今有男子少美髙論孔璋曰當是老精聞燕昭王墓有華表柱向千年可取照之當見如言化為狐又曰吳}
