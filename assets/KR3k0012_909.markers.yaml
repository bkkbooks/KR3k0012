  - {type: variant, offset: 104, length: 1, content: 韓, SBCK: 施金狼頭侍衛之士皆謂附離夏言亦狼也盖本狼生志不忘本耳唐書曰薛延陁部落嘗有一客乞食於主人者主人引與入帳命妻具饌其妻頋視客乃狼頭人也主人不知􅁴妻告隣人共視之狼頭人巳食主人而去相與逐之至鬱督軍出見二人追者告其故二人曰我是也我即神人薛延陁當滅我來取之追者懼而返走又曰髙宗時有孝}
