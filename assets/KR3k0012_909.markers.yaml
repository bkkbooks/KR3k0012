  - {type: variant, offset: 1279, length: 0, content: '', SBCK: 曰古人云野狐向窟嘷不祥以其忘夲也敢不盡心焉禄山甚怒以爲譏其胡也莊子曰夫豐狐文豹是何罪之有哉其皮爲之災也管子曰代出狐白之皮狐應隂陽之變六月而一見公貴買之代人忘其難得喜其貴價必相率而求之取此物者因令齊載金錢之代谷求狐白皮代王聞之果去其農處山林求狐二十四月不得一狐離皮聞而伐之王即將其士卒服於齊慎子曰廊廟之材非一木之枝狐白之裘非一狐之皮范子曰狐皮出}
