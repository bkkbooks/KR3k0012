  - {type: punctuation, offset: 2232, content: 「, id: KR3k0012_CHANT_909-bkkpn850}
  - {type: variant, offset: 2232, length: 0, content: '', SBCK: 青丘竒獸九尾之狐有道祥見出則衘書作瑞於周以摽靈符劉敬叔異􅁐曰有胡道洽者自云廣陵人好音樂醫術之事體有臊氣恒以名香自防唯忌猛犬自審死日誡弟子曰氣絶便殯勿令狗見我尸也死於山陽歛畢􅁴棺空即開看不見尸體時人咸謂狐也搜神記曰酒泉郡毎太守到官無幾輙卒死後渤海陳斐使此郡斐行卜卜者曰逺諸侯放伯永}
  - {type: variant, offset: 2232, length: 0, content: '', krp: 青丘竒獸九尾之狐有道祥見出則衘書作瑞於周以摽靈符劉敬叔異苑曰有胡道洽者自云廣陵人好音樂醫術之事體有臊氣恒以名香自防唯忌猛犬自審死日誡弟子曰氣絶便殯勿令狗見我尸也死於山陽歛畢覺棺空即開看不見尸體時人咸謂狐也搜神記曰酒泉郡毎太守到官無幾輙卒死後渤海陳斐使此郡斐行卜卜者曰逺諸侯放伯永}
  - {type: variant, offset: 2233, length: 0, content: '', SBCK: 解此則無憂斐旣到官侍有張醫有王侯卒有史侯斐恒逺之夜半有上斐􅀍者斐便以􅀍置取之物跳踉音郎訇訇作聲乃}
  - {type: variant, offset: 2233, length: 0, content: '', krp: 解此則無憂斐旣到官侍有張醫有王侯卒有史侯斐恒逺之夜半有上斐𬒳者斐便以𬒳置取之物跳踉音郎訇訇作聲乃}
  - {type: variant, offset: 2234, length: 0, content: '', SBCK: 曰我無惡意當深報府君府君曰汝爲何魅曰我夲百年狐今爲魅垂當神聽一放我我字伯永府君有急難呼我斐乃喜便放}
  - {type: page-break, offset: 2234, content: '', id: KR3k0012_SBCK_909-7a}
  - {type: variant, offset: 2234, length: 0, content: '', krp: 曰我無惡意當深報府君府君曰汝爲何魅曰我夲百年狐今爲魅垂當神聽一放我我字伯永府君有急難呼我斐乃喜便放}
  - {type: variant, offset: 2235, length: 1, content: 獸, SBCK: 忽然有赤光如電後毎事先以語斐於酒泉境界無毫毛之姧咸曰聖君月餘主簿李音私通斐侍婢旣而驚懼遽爲伯永所白遽與諸僕謀殺斐伺旁無人便伏人欲格殺之裴即呼伯永有如曳疋綘諸僕伏地失䰟乃以次􅅞取皆伏即殺音等伯永乃辝謝斐曰未及白姧乃爲府君所召猶用慙又曰燕昭王墓有老狐化男子詣張華講􅀃華恠之謂雷孔章曰今有男子少羙髙論孔章曰當}
  - {type: variant, offset: 2235, length: 1, content: 獸, krp: 忽然有赤光如電後毎事先以語斐於酒泉境界無毫毛之姧咸曰聖君月餘主簿李音私通斐侍婢旣而驚懼遽爲伯永所白遽與諸僕謀殺斐伺旁無人便伏人欲格殺之裴即呼伯永有如曳疋綘諸僕伏地失䰟乃以次縛取皆伏即殺音等伯永乃辝謝斐曰未及白姧乃爲府君所召猶用慙又曰燕昭王墓有老狐化男子詣張華講說華恠之謂雷孔章曰今有男子少羙髙論孔章曰當}
