  - {type: variant, offset: 238, length: 8, content: 爰有赤豹熊羆六韜, WYG: 又}
  - {type: variant, offset: 240, length: 940, content: 赤豹熊羆六韜曰文王囚羑姜里散宜生受命而行宛懷條塗之山有黃熊得而獻於紂左傳曰晉靈公使宰夫臑熊蹯不熟殺之寘諸畚載以過朝又曰楚子將以商臣為太子令尹子上諫之不聽又欲立王子職而黜商臣商臣以宮甲圍成王王請食熊蹯而死弗聽王縊史記曰趙簡子病不知人五日而寤曰我之帝所見一熊欲援我帝命我射之中熊死有當道者曰帝令主君滅晉二卿熊其祖也漢書曰昌邑王賀在藩帝見熊以問左右左右皆荅不見又曰孝元帝馮昭儀上幸虎圈鬭獸後宮皆坐熊出圈攀檻欲上殿昭儀乃當熊而立及左右格殺熊上問人情驚懼何故當熊昭儀曰夫猛獸得人而止妾恐熊至御坐故身當之耳帝嗟嘆以此倍敬重之淮南子曰誠中之人樂而彶彶急也忠信之人自樂為之非彶彶也如鶚之好聲熊之好經夫有誰為務又曰愛熊而食之鹽愛獺而飲之酒雖欲養之非其道熊食鹽而死獺飲酒而敗故曰非其道也周書王會曰成王時不屠何國獻青熊一孟子曰魚我所欲熊掌亦我所欲二者不可得兼舍魚取熊掌義者我所欲生亦我所欲二者不可得兼舍生取義列子曰黃帝戰於阪泉帥熊貙虎為前驅纏子曰桀王天下酒濁而殺廚人紂王天下熊蹯不熟而殺廚人抱朴子曰玉策記稱熊壽五百歲五百歲則能化瑣語曰晉平公夢見赤熊闚屏惡之而有疾使問子產子產曰昔共工之卿曰浮遊既敗於顓頊自沒沉淮之淵其色赤其言善笑其行善顧其狀如熊常為天王祟見之堂上則止天下者死見堂下則邦人駭見門近臣憂見庭則無傷窺君之屏病而無傷祭顓頊共工則瘳公如其言而疾間魏略曰大秦國出玄熊赤螭建武故事曰咸和七年左右啟以米飴熊上曰此無益而費於穀且是惡獸所不宜畜使遣打殺以肉賜左右直人異苑曰邵陵高平黃秀以元嘉三年入山經月不還其兒根生尋覔蹲空樹中從頭至腰毛色如熊問其何故荅曰天讁如此汝但自去生哀慟而歸踰年人見其形盡為熊矣又曰熊獸藏於山穴穴裏不得見穢及傷殘見則舍穴自死續搜神記曰晉升平中有人入山射鹿忽墮一坎窅然深絕內有數頭熊子須臾有一大熊來入瞪視此人人謂必以害己良久出藏果分與諸子末後作一分著此人前人飢久於是冒死取噉之既轉相狎熊母每旦覔食果還輒分此人人賴以支命後熊子大其母一一負將出子既盡人分死坎中窮無出路熊母尋復還入坐人邊人解意便抱羆之足於是跳出遂得無他又曰熊無穴居大樹孔中東土呼熊為子路以物擊樹云子路可起於是便下不呼則不動也羆爾雅曰羆如熊黃白文郭璞注曰似熊而長頭高腳猛憨多力能拔樹木關西呼為猳羆援神契曰赤羆見姦宄息佞人離則出, SBCK: 狼材野馬}
