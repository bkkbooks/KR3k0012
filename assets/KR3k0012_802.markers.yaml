markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 太平御覽卷第八百二珎寳部一寳珠上寳尚書湯誓曰遂伐三朡俘厥寳玉孔安國日俘取也玉以禮神使無水旱之災故取而寶之􅁩伯仲伯作典寳二臣作典寳一篇言國之常寳也又盤庚曰無緫于貨寳孔安國注曰無緫貨寳以求位也又旅􅋙曰分寳玉于伯叔之國時庸展親孔安國注云以寳玉分同姓之國是用誠信親親之道弗寳逺物則逺人格不侵奪其利其來服所寳惟賢則邇人安寳賢任能則近人安近人安則逺人安也又顧命曰越玉五重陳寳於東西序坐}
