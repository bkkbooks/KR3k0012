  - {type: variant, offset: 100, length: 9, content: 為匈奴所圍索頭虜單, krp: 斐與侃在比嘗同學有詔令侃延斐同賞賔客三百餘人食器皆金玉雜寳奏三部女樂至夕侍婢百餘人俱執金花燭崔鴻十六國春秋前趙録曰曜平陳安長駈至}
  - {type: variant, offset: 103, length: 0, content: '', WYG: 中郎將京邑貴人多寄寳貨因泰市匈奴泰皆挂於壁及徴為尚書悉以還呉志曰士燮為交阯太守每遣使詣權致雜香細葛輙以千數明珠大貝琉璃翡翠瑇瑁犀象之珎竒物異果蕉葉龍眼之屬無嵗不至晉中興書曰姚萇試諸子謂曰吾有一寳物萬金不易汝等技藝勝者吾以與之諸子皆素好馬欲扵父前試之惟略不動萇以為賢故越諸兄立爲嗣子晉安帝記曰桓𤣥尤愛珎寳常玩㺯珠玉不離扵手晉書殷仲文𫝊曰桓𤣥為劉裕}
