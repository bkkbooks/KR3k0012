  - {type: variant, offset: 274, length: 3, content: 受封北, krp: 國在西海之中出竒寳啇賈到則不見人但置寳物價直於洲上寳依價質之而去以能養師子故以爲國名又曰天寳中師子國遣婆羅門僧灌頂三藏來獻金寳瓔珞老子曰我有三寳保而持之一曰慈二曰儉三曰不敢爲天下先輕敵則幾喪吾寳晏子春秋曰和氏之璧井里之朴耳良工脩之則爲荐國之寳孫卿子云井里之璞又云玉人琢之爲天下寳魯連子曰楚王成章華臺酌諸侯酒魯君先至與之大曲之弓不琢之璧旣而悔之伍舉見魯君曰大曲之弓不琢之璧楚王之寳也吴求之弗與舉兵伐楚魯懼奉而歸之墨子曰周公見申徒狄曰賤人強氣則罰至申徒狄曰周之靈珪出於}
  - {type: punctuation, offset: 278, content: ，, id: KR3k0012_CHANT_802-bkkpn61}
  - {type: 'tls:seg', offset: 278, content: '', id: KR3k0012_CHANT_802-4a.4}
  - {type: variant, offset: 278, length: 0, content: '', SBCK: 楚之明月出􅑕蜃五象出於汙澤和氏之璧夜光之珠三􅁄六里此諸侯所謂良寳也淮南子說山云周之簡珪産於石大象神􅀛出於溝壑孟子曰諸侯之寳三土地人民政事寳珠玉者殃必及身淮南子曰夫夏后氏之璜不能無考考班璺明月之珠不能無纇夜光之珠白似月光故日明月纇若􅁝之有結纇也然天下寳之者何也小惡不及妨大美傳子曰夫齎不貲之寳獨􅀫曠野其危甚於累􅆑比之秦猶㤗山之安也戰}
  - {type: page-break, offset: 278, content: '', id: KR3k0012_SBCK_802-5b}
  - {type: variant, offset: 278, length: 0, content: '', krp: 楚之明月出􅑕蜃五象出於汙澤和氏之璧夜光之珠三棘六里此諸侯所謂良寳也淮南子說山云周之簡珪産於石大象神龜出於溝壑孟子曰諸侯之寳三土地人民政事寳珠玉者殃必及身淮南子曰夫夏后氏之璜不能無考考班璺明月之珠不能無纇夜光之珠白似月光故日明月纇若絲之有結纇也然天下寳之者何也小惡不及妨大美傳子曰夫齎不貲之寳獨宿曠野其危甚於累卵比之秦猶㤗山之安也戰}
  - {type: variant, offset: 279, length: 0, content: '', SBCK: 䇿曰周}
  - {type: variant, offset: 279, length: 6, content: 有大鮮卑山因, WYG: 在西海之中出竒寳商賈到則不見人但置寳物價值於洲上賈依價質之而去}
  - {type: variant, offset: 279, length: 0, content: '', krp: 䇿曰周}
  - {type: variant, offset: 280, length: 0, content: '', SBCK: 砥阨宋有結緑梁有懸犁楚有和璞此四寳者玉之所美也巳爲天下名器國語曰晉定公享楚王孫圍趙簡子鳴玉以相問圍曰楚之白珩猶在乎爲寳也幾何對曰未甞爲寳也楚有觀射父能作訓辭以行諸侯有左史􅀝相能道訓典以叙百物有夢曰雲金木竹箭之生也此楚國寳也􅀂白珩先王之玩何寳焉夢澤也穆天子傳曰天子西征至陽紆之山河伯無夷所都是惟河宗氏乃至於崑崙之丘觀舂山之寳吕氏春秋曰世皆以珠玉爲寳寳逾多而民逾貧失其所寳也陸賈新語曰聖人不用珠玉而寳其身也鹽鐵論曰汝漢之合鐵誘外國鈎羗胡之寳也􅀃文曰琛寳也犍爲舎人日美寳爲琛􅀃􅁐曰經侯過魏左帶玉具劒右帶環佩左光照右右光照左太子不視又不問經曰魏國亦有寳乎太子曰主信臣忠百姓戴上此魏國之寳也經左解玉具右解佩委之而起阮子曰雖金玉滿堂明珠滿室飢不爲寳非國之用新序曰晉平公浮西河中流而歎曰嗟乎安得賢士}
  - {type: page-break, offset: 280, content: '', id: KR3k0012_SBCK_802-6a}
  - {type: page-break, offset: 280, content: '', id: KR3k0012_SBCK_802-6b}
