  - {type: variant, offset: 269, length: 0, content: '', SBCK: 后配彭城王孫韶魏室竒寳多隨后入韶家有二玉鉢相盛轉而不可出馬瑙榼三斗玉縫之皆稱西域􅀑作也北齊書曰髙德正嘗辭疾除兾州刺史即起顯祖怒禁門下其妻出寳物滿四牀欲以􅀉人帝掩見大怒曰我府藏無此物詰其得由皆諸元賂之帝乃斬德正并妻}
