  - {type: variant, offset: 1467, length: 894, content: 所相每自誇大莫廆之孫曰乞得龜為慕容廆破之先是海出大龜枯死於平郭至是乞得龜敗也高車北史曰高車蓋古赤狄之種也初因號為狄歷北方以為勑勒諸夏以為高車丁零其語略與匈奴同而時有小異或云其先匈奴甥也其種有狄氏袁紇氏斛律氏解批氏護骨氏異奇斤氏其人好引聲長歌有似狼嗥本無都統大帥當種各有君長為姓麤猛黨類同心至於寇難翕然相依鬭無行陣其俗婚姻用牛馬納聘以多為榮俗無穀不作酒迎婦之日男女相將持馬酪熟肉節解主人延賓亦無行位穿廬前藂坐飲宴終日又曰高車俗不潔淨喜致震霆每震則叫呼射天而集之移去至來歲秋馬肥復相率集於震所理羖羊然火拔刀女巫祝說如中國祓除而群駞馬旋繞百匝乃止人持一束柳枝因曲豎之以乳酪灌焉又曰高車婦人以皮裏羊骸苦交切戴之首上縈屈髮髾而綴之髾所交切有似軒冕其死亡葬送掘地作坎坐尸於中張臂引弓佩刀挾矟無異於生而露坎不掩走馬繞旋多者數百匝男女無小大皆集會之又曰高車與蠕蠕同唯車輪高大輻數至多後徙於鹿渾海西北百餘里部落強大常與蠕蠕為敵後魏道武帝度弱洛水西行至鹿渾海襲破之復討其餘種於狼山又曰道武帝自牛川南引大校獵以高車為圍騎徒遮列七百餘里聚雜獸於其中因驅至平城即以高車眾起鹿苑南固臺陰北距長城東包白登之西山又曰高車族有十二姓一曰泣伏利氏二曰吐盧氏三曰乞旃氏四曰大連氏五曰窟賀氏六曰達薄氏七曰阿崙氏八曰莫允氏九曰俟分氏十曰副伏羅氏十一曰乞袁氏十二曰右叔沛氏又曰高車昧利不顧後患又曰高車斛律部帥倍侯利為蠕蠕掩襲遂奔魏賜爵孟都公倍侯利質直勇健過人北方之人畏之嬰兒啼者語曰倍侯利來便止處女歌謠云求良夫當如倍侯利其眾服如此善用五十蓍筮吉凶每中故得親幸倍侯利卒道武悼惜葬以魏禮謚曰忠壯王又曰太和十四年阿伏至羅遣使至京以二箭奉貢云蠕蠕為天子賊臣當為天子討除孝文賜繡袴褶一具雜綵百疋又曰高車部眾分散或來奔附或投蠕蠕詔遣宣威將軍羽林監孟威撫納降人又曰高車遣使貢金方一銀方一金杖二馬七疋駞十頭又曰高車與蠕蠕戰於蒲類海北割蠕蠕之髮送於羽林監孟威又曰高車遣使獻龍馬五疋金銀貂皮及諸方物詔賜樂器一部樂工八十人赤紬十疋雜綵六十疋又曰高車王伊匐遣使朝貢因乞朱畫步挽一乘并幔褥鞦䩛一副繖扇各一枚青曲蓋五枚赤漆扇五枚鼓角十枚詔給之烏洛侯北史曰烏洛侯, SBCK: 笁}
