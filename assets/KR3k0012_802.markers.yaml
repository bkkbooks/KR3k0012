  - {type: variant, offset: 1396, length: 3, content: 被長襦, WYG: 以饑困又所調猥多限每不充今請上珠輸二次輸一麤者蠲除自十月訖二月非採珠之時聽商賈往來如舊並從之晉令曰士卒百工不得服真珠璫珥沈約宋書曰文帝詔太史令錢樂之作小渾天二十八宿中外以白真珠}
