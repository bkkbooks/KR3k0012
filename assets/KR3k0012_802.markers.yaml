  - {type: variant, offset: 318, length: 0, content: '', WYG: 國名又曰天寳中師子國遣婆羅門僧灌頂三藏來獻金寳瓔珞老子曰我有三寳保而持之一曰慈二曰儉三曰不敢為天下先輕敵則幾喪吾寳晏子春秋曰和}
