  - {type: variant, offset: 58, length: 0, content: '', krp: 中郎將京邑貴人多寄寳貨因市奴婢㤗皆掛於壁及徵爲尚書悉以還吴志曰士爕爲交阯太守每遣使詣權致雜香細葛輙以千數明珠大貝琉璃翡翠瑇瑁犀象之珎竒物異果蕉耶龍眼之屬無歳不至晉中興書曰姚萇試諸子謂曰吾}
  - {type: variant, offset: 59, length: 3, content: 數百千, SBCK: 一寳物萬金不易汝等􅇊藝勝者吾以與之諸子皆索好馬欲於父前試之唯略不動萇以爲賢故越諸兄立爲嗣子晉安帝記曰桓􅀇尤愛珎寳常玩弄珠玉不離於手晉書殷仲文傳曰􅁊􅀇爲劉􅁉所敗仲文隨􅀇西走其寳玩悉藏地中皆變爲土晉書吕纂載記曰即序胡安據盗發張駿墓見駿貌如生得真珠簾琉璃榼白玉樽赤玉簫紫玉笛􅃢瑚馬鞭馬腦鍾水陸竒珎不可勝紀齊書曰始興王鑑鎮益州於州園地得古冢無復棺但有石槨銅器十}
