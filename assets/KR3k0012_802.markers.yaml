  - {type: variant, offset: 2859, length: 294, content: 年軻比能出諸魏人在鮮卑者五百餘家還居代郡黃初三年軻比能率部落與代郡烏丸等三十餘口交市遣魏人千餘家居上谷後與東部鮮卑大人素利及步度根三部爭鬭烏桓校尉田豫和之使不得相侵五年軻比能復擊鮮卑豫帥輕騎徑進椅其後比能使別小帥璅奴拒豫進討破之由是懷貳乃與輔國將軍鮮卑輔書曰夷狄不識文字故校尉閻柔保我於天子我與烏丸為讎往年攻擊之而田校尉助素利烏丸也我臨陣使璅奴往聞使君來即引軍退步度根數數鈔盜又殺我弟而誣我以鈔盜我夷狄雖不知禮義兄弟子孫受天子印綬牛馬尚知美水草況我有人心耶將軍當保明我於天子輔得書聞帝帝復使豫招納安慰軻比能眾遂強盛控弦十餘萬騎每鈔掠得財物均平分付一決目前終無所私故能得眾死力餘部大人皆憚之, SBCK: ''}
