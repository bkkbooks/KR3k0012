  - {type: variant, offset: 906, length: 10, content: 慕容廆字弈洛瓌昌黎棘, SBCK: 視屋上瓦獨無霜其下有寳藏蔡氏化清論曰經云寳者衆之所利也苟利其利害必存焉郭璞奏曰臣以爲珎竒靡麗之物誠是玩弄之所寳然非經國之至寳張衡東京賦曰所貴惟賢所寳惟􅂖明皇雜録曰楊國忠驕奢僣侈之態復紛然未滿持盈公主玉葉冠􅉑國夫人夜光枕楊國忠鏁子帳皆希代之寳莫能計其直珠上􅀃文曰珠蚌之隂精也尚書禹貢曰徐州厥貢淮夷蠙蛛淮夷二水出蠙蛛也周禮天官玉府曰􅀂王合諸侯則共珠盤玉敦鄭􅀇曰敦盤􅀋珠玉以爲飾左傳哀公曰衛太叔疾出奔宋臣向爲宋向魋臣納美珠焉與之}
