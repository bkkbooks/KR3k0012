  - {type: variant, offset: 334, length: 1, content: 賴, WYG: 逾貧失}
  - {type: variant, offset: 336, length: 1, content: 勳, WYG: 所寳也陸賈新語曰聖人不用珠玊而寳其身也鹽鐵論曰汝漢之合鐵誘外國鈎羗胡之寳也説文曰琛寳也徤爲舎人曰美玊為琛説苑曰經侯過魏左帯玊具劒右帶環佩左光明右右光照左太子不視又不問經曰魏國亦有寳乎太子曰主信臣忠百姓戴上此魏國之寳也經左解玊具右解佩委之而起阮子曰雖金玊滿堂明珠滿室饑不爲寳非國之用新序曰晉平公浮西河中流而歎曰嗟乎安得賢士大夫與共此憂樂乎船人固桑對曰夫劒産扵越珠産江漢玉産崑岡此三寳者皆無足而致今君苟好士則賢士至矣西京雜記曰武}
