  - {type: variant, offset: 49, length: 6, content: 索頭虜姓託跋, SBCK: 天不愛其道地不愛其寳又曰儒有不寳金玉而以忠信爲寳左傳莊公曰齊人來歸衛寳文姜請之也又莊公曰王及鄭伯入于鄭遂入成周取其寳器而還又文下曰宋昭以盡以寳行又襄公曰宋人得玉獻諸子罕子罕不受曰我以不貪爲寳爾以玉爲寳􅀂與秋皆喪寳也不􅀂人有其寳也又昭六曰吴太子諸樊入鄖諸樊吴王僚之太子取楚夫人與其寳器以歸公羊傳僖公曰虞公貪而好寳及爲晉所滅抱寳牽馬而去又定公曰盗􅀼寳玉大弓盗者何陽虎也史記曰趙簡子告諸子曰吾藏寳符於常山之上先得者賞諸子馳之常山上求無所得母䘏還曰巳得符矣登常山而臨代代可取也又曰晉使郄克以車八百乗伐齊陳于鞍於是晉軍追齊至馬陵齊侯請以寳器謝不聽必得􅀏克者蕭同叔子又曰魯昭公八年楚靈王就章華臺召昭公往焉賜昭公寳器巳悔復詐取之又曰衛叔名封成王長用事舉康叔爲周司㓂賜衛寳􅀕器又曰秦逐客李斯書曰陛下致崑山之玉有隨和之寳乗明月之珠服太阿之劒乗纎離之馬建翠鳯之旗樹靈鼉之鼓此數寳者秦不生一焉而陛下􅀃之又曰樂毅伐齊入臨淄盡取齊寳也又曰梁惠王與齊威王㑹田於梁問齊王亦有寳乎威王曰無有梁王曰􅀂寡人國小尚有徑寸之珠照車前後各十二乗者十枚柰何以萬乗之國而無寳乎威王曰寡人以爲寳與王異吾臣有檀子者使守南城則楚人不敢爲㓂東取泗上十二諸侯皆來朝吾臣有䀎子者使守髙堂則趙人不敢東漁於河吾更有黔夫者使守徐州則燕人􅀕北門趙人祭西門齊之北門也言燕趙之人畏其侵伐故􅀕以求福徙而從者七千餘家吾臣有種首者使備盗賊則道不拾遺將以照千里豈特十二乗哉梁惠王慙不懌而去梁或作魏字漢書曰沛公西入武􅀜欲擊秦嶢下軍張良曰臣聞其將者賈竪子易動以利令酈食其持重寳㗖秦將秦將果欲連和沛公乃擊秦軍大破之謝承後漢書曰鄭引爲鄒令縣人王逢得路遺寳物懸於衢道求主還之後漢書曰丗祖遣衛尉銚期持珎寳繒帛賜隗􅅝期至鄭􅀍盗張璠漢記曰朱儁爲郡吏太守尹端有罪應死儁爲買珎寳賂主章吏端得免死范曄後漢書曰帝常召見諸郡計吏問其風俗及前後守令能不蜀郡計椽樊顯進曰漁陽太守張堪昔在蜀其仁以惠下威能討姦前公孫述破時珎寳山積捲握之物足冨十丗而堪去職之日乗折轅車布􅀍而巳帝聞良乆歎息魏}
