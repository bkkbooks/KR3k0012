  - {type: variant, offset: 921, length: 9, content: 曾祖莫護跋初率諸部, SBCK: 尚書考靈曜曰夘金出􅎮握命孔符赤用藏龍􅄍珠也鄭􅀇注曰藏祕也珠寳物俞道也赤漢將用天之秘道尚書考靈曜曰甲子冬至日月五緯俱起牽牛日月􅀂編珠春秋保乾圖曰吐珠於澤誰能不含宋均注曰珠岀於野澤之中誰能不含取以爲寳也禮斗威儀曰王者政平德至淵泉則江海出明珠又戴禮曰玉居山而木能潤淵生珠而岸不枯韓詩外傳曰良珠度寸雖有百仞之水不能奄其耀也韓詩内傳曰漢女所弄珠如荆鷄􅆑孝經援神契曰神靈滋液百寳用則珠母見珠母璣鏡宋均曰事神明得則}
