  - {type: variant, offset: 1366, length: 0, content: '', SBCK: 琉璃珠璣又曰扶風人士孫奮居冨而性恡梁兾認奮母爲其守藏婢云盗白珠十斛也後漢書曰珠蚌中隂精也玓瓅明珠色也璣珠不圎也夫餘出珠大如酸􅀥東觀漢記曰永建四年漢陽太守文礱獻大珠詔曰海内頗有災異而礱不推忠竭誠而喻明珠之瑞求媚今封珠却還又曰顯宗時鍾離意爲尚書時交阯太守坐贓千金徴還伏法以其資物頒賜羣臣意得珠璣悉以委地而不拜賜上恠而問其故對曰臣聞孔子忍渴}
  - {type: page-break, offset: 1366, content: '', id: KR3k0012_SBCK_802-9b}
  - {type: variant, offset: 1366, length: 0, content: '', WYG: 琉璃珠璣又曰扶風人士孫奮居富而性恡梁冀認奮母為其守藏婢云盗白珠十斛也後漢書曰珠蚌中隂精也玓瓅明珠色也璣珠不圓也夫餘出珠大如酸棗東觀漢記曰永建四年漢陽太守文礱獻大珠詔曰海内頗有災異而礱不推忠誠而偷明珠之瑞以求媚令封珠却還又曰顯宗時鍾離意為尚書時交阯太守坐贓千金徴還伏法以其資物頒賜群臣意得珠璣悉以委地而不拜賜王恠而問其故對曰臣聞孔子忍渇扵盗泉之水曾參廻車扵勝母之閭惡名也此贓穢之物誠不敢拜帝嗟嘆曰清乎尚書之言乃更以庫錢三十萬賜意又曰和熹后時新遭大憂法禁未設宫中亡大珠一箧主名不立太后乃親自臨見宫人一一問閴察其顔色開示恩信宫人盗者即時首服謝承後漢書曰孟嘗為合浦太守郡俗舊採珠以易米二千石貪穢使人採珠積以自入珠忽徙去合浦無珠餓死者盈路孟嘗化行一年之間去珠復還又曰汝南李敬少時為趙相奴}
