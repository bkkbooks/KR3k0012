  - {type: variant, offset: 1394, length: 1, content: 婦, WYG: 或以懸頸垂耳至扵袂不以金銀錦􅄢為珎又曰倭國女王壹與遣大夫率善等獻貢白珠五十孔青大勾珠二枚也蜀志曰秦宓奏記益州牧劉焉薦儒士任定祖曰甫欲割蚌求今乃隋和炳然復何歎哉又曰宗預復東使呉孫權握預手曰今君年長孤亦衰老恐不復相見遺預大珠一斛呉録地理志曰朱崖珠宫懸出明月珠玉又曰袁博字君逰為淮陵長其女得壞牆中璫珠百餘博封上之詔以賜博呉志曰魏文帝遣使以馬求易明珠翡翠權曰此皆孤所不用而可得馬何苦而不聽其交易王隱晉書武帝詔曰御府内省珠玊玩好之物皆以賜王公也晉書陶璜自交州上表曰合浦郡土地墝埆無有田農百姓唯以採珠為業商賈去來以珠貨米而呉時珠禁甚嚴慮百姓私散好珠禁絶來去}
