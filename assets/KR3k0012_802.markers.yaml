  - {type: variant, offset: 104, length: 5, content: 圍索頭虜單, WYG: 敗仲文隨𤣥西走其寳玩悉藏地中皆變為土晉書吕纂載記曰即序胡安據盗發張駿墓見駿貌如生得真珠簏琉璃榼白玊樽赤玊簫紫玉笛珊瑚馬鞭馬瑙鍾水陸竒珎不可勝記齊書曰始興王鑑鎮益州扵州園地得古塜無復棺但有石槨銅器千種並古形玊璧三枚珍寳甚多不可皆識金銀為蠶形者數萬計又以朱砂為阜水銀為池左右咸勸取之鑑曰皇太子昔在雍有發古冢者得玉屏風玉匣之屬皆將還都吾意嘗不同乃遣功曹何佇之爲起墳諸寳物一不得犯梁書曰羊侃大同中魏使陽斐與侃在北嘗同學有詔令侃延斐同宴賔客三百餘人食器皆金玊雜寳奏三部女樂至夕侍婢百餘人俱執金花燭崔鴻十六國春秋前趙録曰曜驅平長安至}
