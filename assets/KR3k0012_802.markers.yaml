  - {type: variant, offset: 917, length: 2, content: 鮮卑, SBCK: 鉏城鉏宋邑宋公求珠魋不與由是得罪又哀下曰越圍吴晉趙鞅使楚隆告于吴王曰寡君之老無恤使陪臣隆敢展謝其不共展陳也黄池之役君之先臣志父得承齊盟曰好惡同之今君在難無恤不敢憚勞非晉國之所能及也使陪臣敢展布之王拜稽首曰寡}
