  body:
  - {type: variant, offset: 1, length: 5, content: 狄三託跋氏, SBCK: 列玉五重又陳先王所寳之器物赤刀大訓引璧琬琰在西序大玉夷玉天球河圖在東序胤之舞衣大貝鼖鼓在西房兊之戈和之弓垂之竹矢在東房皆歴代所傳之寳毛詩嵩髙曰王遣申伯路車乗馬錫爾介珪以作爾寳寳瑞詩含神霧曰聖人受命必順斗張握命圖授漢寳}
