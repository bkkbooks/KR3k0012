  - {type: variant, offset: 1366, length: 0, content: '', krp: 琉璃珠璣又曰扶風人士孫奮居冨而性恡梁兾認奮母爲其守藏婢云盗白珠十斛也後漢書曰珠蚌中隂精也玓瓅明珠色也璣珠不圎也夫餘出珠大如酸棗東觀漢記曰永建四年漢陽太守文礱獻大珠詔曰海内頗有災異而礱不推忠竭誠而喻明珠之瑞求媚今封珠却還又曰顯宗時鍾離意爲尚書時交阯太守坐贓千金徴還伏法以其資物頒賜羣臣意得珠璣悉以委地而不拜賜上恠而問其故對曰臣聞孔子忍渴}
  - {type: variant, offset: 1367, length: 0, content: '', SBCK: 盗泉之水曽參廻車於勝母之閭惡名也此贓穢之物誠不敢拜帝嗟嘆曰清乎尚書之言乃更以庫錢三十萬賜意又曰和熹后時新遭大憂法禁未設宫中亡大珠一篋主名不立太后乃親自臨見宫人一一間䦧察其顔色開示㤙信宫人盗者即時首服謝承後漢書曰孟甞爲合浦太守郡俗舊採珠以易米先時二千石貪穢使人採珠積以自入珠忽徙去合浦無珠餓死者盈路孟甞化行一年之間去珠復還又曰汝南李敬少時遷趙相奴於䑕穴中得繫珠及璫珥相連以問主簿主簿曰前相夫人昔亡珠不知所在疑其子婦􅀼之因去婦敬送珠付前相慙乃還去婦又曰豫章黄向辰歩路中得珠琪一囊可直三百餘萬求主還之主欲以半物謝向向委去不顧也魏書曰卞皇后性儉約不尚華麗無文繡珠玉器皆黒􅃮太祖甞得名璫數具命后自選一具后取其中者太祖問其故對曰取其上者爲貪取其下者爲僞故取其中者魏志曰文帝問􅂫則曰前西域通使燉煌獻徑寸大珠可復求市得不則曰􅀂陛下德流沙漠不求自至求而得之不足貴也帝黙然又曰公孫淵以}
  - {type: page-break, offset: 1367, content: '', id: KR3k0012_SBCK_802-10a}
  - {type: variant, offset: 1367, length: 0, content: '', WYG: 䑕宂中得繫珠及璫珥相連以問主簿主簿曰前相夫人昔亡珠不知所在疑其子婦竊之因去婦敬送珠付前相慙乃還去婦又曰豫章黃向辰歩路中得珠琪一囊可值三百餘萬求主還之主欲以半物謝向向委去不顧也魏書曰卞皇后性儉約不尚華麗無文繡珠玊器皆黒􅃮太祖嘗得名璫數具命后自選一具后取其中者太祖問其故對曰取其上者為貪取其下者為僞故取其中者魏志曰文帝問蘇則曰前西域通使燉煌獻徑寸大珠可復求市得不則曰若陛下德流沙漠不求自至求而得之不足貴也帝黙然又曰公孫淵以}
