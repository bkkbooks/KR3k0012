  - {type: variant, offset: 463, length: 315, content: 部一居上谷北濡源之西東接宇文部自統之一居代郡之參合陂北兄子猗㐌統之一居定襄之盛樂故城使猗㐌弟猗盧統之稽胡後周書曰稽胡一百步部稽蓋匈奴別種劉元海五部之苗裔也或云山戎赤狄之後離石以西安定以東方七八百里居山谷間種落繁熾其俗婦人多貫蜃貝以為耳頸飾孝昌中有劉蠡升者居雲陽谷分遣部眾抄掠居汾晉之間略無寧歲神武遷鄴後始密圖之偽許以女妻蠡升之子蠡升信之遂遣其子詣鄴齊神武厚為之禮緩以婚期蠡升既恃和親不為之備大統元年三月齊神武潛師襲之又曰保定中離石生胡數寇汾北勳州刺史韋孝寬於險要築城以遏其路又曰建德五年高祖敗齊師於晉州乘勝逐北齊人所棄甲仗稽胡乘間竊出盜而有之慕容氏晉書載記曰慕容氏其先有熊氏之苗裔世居北夷邑于紫蒙之野號曰東胡其後與匈奴並盛控弦之士, SBCK: 􅃶}
