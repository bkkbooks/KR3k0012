  - {type: variant, offset: 270, length: 3, content: 昌意少, SBCK: 伯堅隋書曰􅄏皇十二年突厥遣使獻七寳埦唐書曰師}
  - {type: variant, offset: 270, length: 3, content: 昌意少, WYG: 伯堅隋書曰開皇十二年突厥遣使獻七寳椀唐書曰師}
  - {type: variant, offset: 270, length: 3, content: 昌意少, krp: 伯堅隋書曰𨳩皇十二年突厥遣使獻七寳埦唐書曰師}
  - {type: variant, offset: 274, length: 3, content: 受封北, SBCK: 國在西海之中出竒寳啇賈到則不見人但置寳物價直於洲上寳依價質之而去以能養師子故以爲國名又曰天寳中師子國遣婆羅門僧灌頂三藏來獻金寳瓔珞老子曰我有三寳保而持之一曰慈二曰儉三曰不敢爲天下先輕敵則幾喪吾寳晏子春秋曰和氏之璧井里之朴耳良工脩之則爲荐國之寳孫卿子云井里之璞又云玉人􅅣之爲天下寳魯連子曰楚王成章華臺酌諸侯酒魯君先至與之大曲之弓不􅅣之璧旣而悔之伍舉見魯君曰大曲之弓不􅅣之璧楚王之寳也吴求之弗與舉兵伐楚魯懼奉而歸之墨子曰周公見申徒狄曰賤人強氣則罰至申徒狄曰周之靈珪出於}
  - {type: page-break, offset: 274, content: '', id: KR3k0012_SBCK_802-5a}
