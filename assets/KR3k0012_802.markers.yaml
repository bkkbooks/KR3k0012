  - {type: variant, offset: 1369, length: 1, content: 塞, SBCK: 叛遣田豫以本官督青州刺史程喜喜内懷不服軍事之際多相違錯喜知帝寳愛明珠乃宻上豫雖有戰功而禁令寛㢮所得器仗珠銀甚多放散不皆簿管由是功不見列又曰文帝作終制曰飯含無以珠玉無施珠􅃭玉押典略曰臨淄侯曹植與楊脩書曰今丗作者可略而言人人自謂握靈虵之珠魏略曰大􅁗國出夜光珠真白珠夫餘出珠大如酸􅀥魏志曰東夷俗以瓔珠爲財寳或以綴衣爲飾或以懸頸垂耳至於􅃑不以金銀錦􅄢爲珎又曰倭國女王壹與遣大夫率善等獻真白珠五十孔青大勾珠二枚也蜀志曰秦宻奏記益州牧劉焉薦儒士任定祖曰甫欲剖蚌求蛛今乃隨和炳然復何歎哉又曰宗預復東聘吴孫權握預手曰今君年長􅀌亦衰老恐不復相見遺預大珠一斛吴録地理志曰朱崖珠宫縣出明月珠又曰􅀽慱字君遊爲淮陵長其女得壞牆中璫珠百餘􅀶封上之詔以賜􅀶吴志曰魏文帝遣使以馬求易明珠翡翠權曰此皆􅀌所不用而可得馬何􅀂而不聽其交易王隠晋書武帝詔曰御府内省珠玉玩好之物皆以賜王公也晉書陶璜自交州上表曰合浦郡土地墝埆無有田農百姓唯以採珠爲業啇賈去來以珠􅐙米而吴時珠禁甚嚴慮百姓私散好珠禁絶來去人以飢困又所調猥多限每不充今請上珠輸二次者輸一麤者蠲除自十月訖二月非採珠之時聽啇旅往來如舊並從之晉令曰士卒百工不得服眞珠璫珥沈約宋書曰文帝詔太史令錢樂之作小渾天安二十八􅀫中}
