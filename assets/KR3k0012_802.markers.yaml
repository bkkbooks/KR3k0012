  - {type: variant, offset: 319, length: 0, content: '', WYG: 之璧井里之朴耳良工修之則為荐國之寳孫卿子云井里之璞又云玊人琢之為天下寳魯連子曰楚王成章華臺酌諸侯酒魯君先至與之大曲之弓不琢之璧既而悔之伍舉見魯君曰大曲之弓不琢之璧楚國之寳也呉求之弗與舉兵伐楚魯懼奉而歸之墨子曰周公見申徒狄曰賤人强氣則罰至申徒狄曰周之靈珪出扵土楚之明月出蚌蜃五象出扵漢澤和氏之璧夜光之珠三棘六里此諸侯之良寳也孟子曰諸侯之寳三土地人民政事寳珠玊者殃必及身淮南子曰夫夏后氏之璜不能無考考班璺明月之珠不能無纇夜光之珠白似月光胡曰明月類若絲之有結纇也然天下寳之者何也小惡不及妨大美𫝊子曰夫齎不貲之寳獨宿曠野}
  - {type: page-break, offset: 319, content: '', id: KR3k0012_WYG_802-8b, image: WYG0900/WYG0900-0122d.png}
  - {type: variant, offset: 320, length: 5, content: 裔始均仕堯, WYG: 危甚扵累卵比之秦猶有㤗山之安也戰國策曰周有􅀈砈宋有結緑梁有懸黎楚有和璞此四寳者玉之所美也已為天下名器國語曰晉定公享楚王孫圉趙簡子鳴玊以相問圉曰楚之白珩猶在乎爲寳也幾何對曰未嘗為寳也楚有觀射父能作訓辭以行諸侯有左史倚相能通訓典以叙百物有夢曰雲金木竹箭之生也此楚國寳也若白珩先王之玩何寳焉夢澤也穆天子傳曰天子西征至陽紆之山河伯馮夷所都是惟河宗氏乃至扵崑崙之邱觀舂山之寳吕氏春秋曰}
