  - {type: variant, offset: 363, length: 3, content: 孑干旄, SBCK: 三年不爲禮禮必壊三年不爲樂樂必崩舊􅂖旣没新􅂖旣􅂛鑚燧改火期可巳矣子曰食夫稻衣夫錦於女安乎曰安女安則爲之爾雅曰素錦綢杠以白地錦韜旗之竿尚書大傳曰古之帝王者必有命民能敬長憐􅀌取舎好讓舉事力者命於其君然後得乗飾車軿馬衣文錦漢書曰項羽}
