  - {type: variant, offset: 2770, length: 432, content: 璠漢記曰朱雋少孤母以販繒綵為事同郡周起負官債百萬縣催責之雋竊母帛為起解債魏志曰景初中賜倭女王蒨絳五十疋紺青五十疋吳書曰陸遜破曹休當還西陵上賜遜繒綵丹漆梁書曰張譏幼喪母有錯綵經帕母之遺製及有所識家人具以告之每歲時輒對帕哽噎不能自已唐書曰武德中太宗平并州悉復故地上悅置酒含章殿宴群臣極歡遣入御府賜繒綵皆盡重而出韓子曰齊桓公好服紫一國盡服紫五素不得一紫公患之管仲曰君勿衣紫也謂左右曰吾惡紫臭公曰諾三日境內莫有衣紫風俗通曰夏至著五綵辟兵題綵曰游光厲鬼知其名無溫疾五采辟五兵也按取新斷織繫戶亦此類也世語曰王經彥偉初為江夏太守大將軍曹爽附絳二十疋令交市於吳經不納書棄官歸崔寔四民月令日八月清風戒寒趣染綵也摯虞決疑曰古者男子皆衣綵有故乃素服秦漢以來服色轉變令唯朝廷五服用綵裴玄新言曰五月五日集五綵繒謂之辟兵不解以問伏君伏君曰青赤白黑為之四面黃居中央名曰襞方綴之於複以示婦人養蚕之工也傳聲者誤以為辟兵李陵與蘇武詩曰有鳥西南飛熠熠似蒼鷹朝發天地隅暮宿曰南陵欲寄一言書託之箋綵繒張載擬, SBCK: 衡}
