  - {type: variant, offset: 362, length: 0, content: '', SBCK: 巷伯刺幽王也寺人傷於䜛而作是詩也萋兮斐兮成是貝錦萋斐丈相錯也彼譛人者亦以太甚論語曰宰我問三年之䘮期巳乆矣君}
