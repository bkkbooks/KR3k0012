  - {type: variant, offset: 2242, length: 433, content: 賣廄馬百餘疋御府大司農出雜繒二萬疋與所賣廄馬直賜公卿已下及貧民不能自存者李𠐶曰我邸閣儲跱少乃悉載置其營賈詡曰此上意不可距也𠐶終不從又曰李𠐶時合羌胡數千人先以御物繒綵與之晉書曰單道開燉煌人常衣麤褐或贈以繒服皆不著宋書曰朱百陽居山陰有時出山陰為妻買繒綵三五事好飲酒遇醉或失之後周書曰梁主蕭巋朝於鄴高祖與之宴大悅賜雜繒万叚良馬數千疋并賜齊後主妓妾及常所乘五百里駿馬以遺之纈西河記曰西河無蚕桑婦女著碧纈裙上加細布裳且為戎狄性著紫纈襦袴以外國色錦為袴褶後魏書曰封回為都官尚書冀州大中正滎陽鄭雲謟事長秋卿劉騰貨紫纈四百疋得為安州刺史除書旦出晚往詣回坐未定問安州興生何事便回曰卿荷國寵恩位至方伯雖不能拔園葵去織婦宜思方略以濟百姓如何見造問興生乎封回不為商賈何以相示雲慚失色綵尚書禹貢曰徐州厥篚玄纖縞荊州厥篚玄纁玄黑繒縞白繒纖細也纖在中明物皆當細禮記玉藻曰無君者不貳綵非列綵不入公門列綵正服史記曰通邑大都采千疋比千乘家漢書曰孝文六年遺單于赤綈綠繒各四十疋東觀漢記曰光武起拜朱和建義大, SBCK: 葬霍}
