  - {type: variant, offset: 1622, length: 8, content: 羅敷善蚕桑採桑城, SBCK: 錦衾遺洛浦同􅂁與我違夏侯孝􅀂集羊太常辛夫人傳曰夫人字憲英衛尉肅侯毗之女不好華麗琇上夫人子帔縁以錦不肯服從外孫胡母楊上夫人錦􅀍夫人反卧之諸􅁑亮集曰今民貧國虚決敵之資唯仰錦耳張温表曰劉禪送臣温孰錦五端魏武與楊彪書曰今贈足下錦裘二領繡尚書益稷曰予欲觀古人之象藻火粉米黼黻絺繡尚書大傳曰未命爲士得衣繡毛詩終}
