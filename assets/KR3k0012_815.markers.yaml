  - {type: variant, offset: 274, length: 1, content: 絲, krp: 今吾子愛人以政猶未能操刀而使割也其傷實多子之愛人傷之而巳子有美錦不使人學製焉大官大邑身之所庇而使學者製焉其爲美錦不亦多乎言官邑人重多於美錦也又昭四曰晉合諸侯次于衛地叔鮒求貨於衛淫蒭蕘者淫放也欲使衛惠之而致貨也衛人使屠伯饋叔向羮與一篋錦屠伯衛大夫也曰諸侯事晉未敢携貳況衛在君之宇下屋宇之下喻近而敢有異志蒭蕘者異於他日敢請之請止之也叔向受羮反錦受羮示不逆其意且非貨也又昭四曰平丘之㑹公不與盟晉人執季孫意如以幕蒙之使狄人守之司鐸射魯大夫也懷錦奉壷飲氷以匍匐焉守者御之乃與之錦而入匍匐竊徃飲季孫也氷箭箭盖可以取飲者也又昭六曰齊侯將納公命無受魯貨申豐後女賈豐賈二人皆季氏家臣也以幣錦二兩二丈爲一端二端爲一兩所謂匹也二兩二匹縛一如瑱瑱充耳縛卷也急卷使如充耳易懷藏適齊師謂子猶之人髙齮齮子猶家臣子猶梁丘據能貨子猶爲髙氏後粟五千庾言若能爲我行貨於子猶當爲請使得爲高氏後又當致粟五千庾庾十六斗丸八千斛髙齮以錦示子猶子猶欲之齮曰魯人買之百兩一布以道之不通先入幣財言魯人買此甚多布陳之以百兩爲數子猶受之又哀上曰呉人藩衛侯之舎藩籬子服景伯謂子貢曰夫諸侯之㑹事旣畢矣侯伯致禮地主歸餼侯伯致禮以禮賔也地主所㑹主人也餼生物以相辭也各以禮爵讓今吾不行禮於衛而藩其君舎以難之難若困也子盍}
