  - {type: variant, offset: 846, length: 2, content: 絲幽, WYG: 為之纒頭宴享加惠借以為詞又曰大厯中代宗勑曰王制命市納賈以觀人好惡布帛精麄不中度廣狹不中量不鬻於市漢詔亦云纂組文繡害女工也朕思以恭儉克巳淳樸化人每尚素𤣥之服庶齊金土之價而風俗不一踰侈相髙浸弊於時其來自久耗縑贈之本資錦綺之奢異彩奇文恣其誇耀今師旅未戢黎元不康豈使滛巧之功更虧恒制在外所織造大張錦軟錦瑞錦透背及大􅰃錦竭鑿六硬已上錦獨窠文紗四尺幅及獨窠吳綾獨窠司馬綾等並宜禁斷其長行髙䴡白錦雜色錦及常行文}
