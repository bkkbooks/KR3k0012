  - {type: variant, offset: 1904, length: 222, content: 紫國人皆好服之至五素不得一紫事具綵門鹽鐵論曰縞素不能自分於緇墨賢聖不能自治於亂世班固與弟書云今齎白素三百疋欲以市月支焉宋玉美人賦曰腰如束素徐幹團扇賦曰惟合歡之奇扇肇伊洛之纖素古詩曰新人能織縑故人工織素織縑日一疋織素五丈餘以縑特比素新人不如故班婕妤詩曰新裂齊紈素鮮潔如霜雪裁為合歡扇團團象明月揚雄荅劉歆書曰天下上計孝廉及內郡衛卒會者雄常把三寸弱翰筆齎油素四尺以問其異方語歸即以鈆㰅次之於鈆槧七念反三十七歲於今矣繒史記曰烏氏倮以繒遺戎王戎王十倍報之, SBCK: 必文繡}
