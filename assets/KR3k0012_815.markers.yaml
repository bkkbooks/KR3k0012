  - {type: variant, offset: 2141, length: 0, content: '', WYG: 華藻又從而繡其鞶帨鹽鐡論曰古庻人老耄而後衣絲其餘則麻枲而已故命曰布衣今富者縟繡羅紈中者素綈錦氷論衡曰齊郡能刺繡恒女無不能者襄邑能織綿恒婦無不巧者目見而手狎也又曰刺繡之師能縫帷裳納縷之工不能織錦儒生能為文吏文吏不能為儒生也文吏一旦在位則鮮冠利劔一歲與職則田宅併集又曰繡之未刺錦之未織綿帛何以異哉及其加五采之功施計縷之飾則文章煥煥學士有文章其猶綿帛布色之功桓譚新論曰陽城子姓張名衡蜀郡人王翁與吾俱為講學祭酒及寢疾預買棺槨多下錦繡立被}
