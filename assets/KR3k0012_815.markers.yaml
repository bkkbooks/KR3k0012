  - {type: variant, offset: 2138, length: 3, content: 聲桀為, SBCK: 下必將衣繡遊於九重之臺賈􅁩曰繡是古天子之服今冨人大賈嘉㑹召客以􅀍牆屋􅀃􅁐曰􅀳平公使叔向聘呉呉人飾舟以送之左百人右百人有繡衣而豹裘者有錦衣而狐裘者歸以告平公平公曰呉其亡乎又曰鄂君乗青翰之舟張翠蓋越人擁檝而歌曰心恱君兮君不知於是鄂君舉繡被而覆之楊子法言曰今之學也非獨爲華藻又從而繡其鞶恱喻今學煩多也鹽鐵論曰古庶人老耄而後衣絲其餘則麻枲而巳故命曰布衣今冨者綺繡羅紈素綈水綿論衡曰齊郡能刺繡恒女無不能者襄邑能織錦恒婦無不巧者目見而手狎也又曰刺繡之師能縫帷裳網縷之工不能織錦儒生能爲文吏文吏不能爲儒生也文吏一旦在位則鮮冠利劒一歳典職則田宅併集又曰繡之未刺錦之未織絲帛何以異哉反其加五采之功施針縷之飾則文章煥燿學士有文章其猶絲帛布色之功􅁊譚新論曰陽城子張名衡蜀郡人王翁與吾俱爲講樂􅀕酒及寢疾預買棺槨多下錦繡立被}
  - {type: page-break, offset: 2138, content: '', id: KR3k0012_SBCK_815-11a}
  - {type: page-break, offset: 2138, content: '', id: KR3k0012_SBCK_815-11b}
  - {type: variant, offset: 2138, length: 2, content: 聲桀, WYG: 下必將衣繡遊於九重之臺賈誼曰繡是古天子服今富人大賈嘉㑹召客以被牆屋説苑曰晉平公使叔向聘其吳人餙舟以送之左百人右百人有繡衣而豹裘者有錦衣而狐裘者歸以告平公平公曰吳其亡乎又曰鄂君乘青輸之舟張翠盖越人擁擑而歌曰心悦君兮君不知於是鄂君舉繡被而覆之楊子法言曰今之學者非獨}
  - {type: page-break, offset: 2138, content: '', id: KR3k0012_WYG_815-18a, image: WYG0900/WYG0900-0228c.png}
  - {type: variant, offset: 2138, length: 3, content: 聲桀為, krp: 下必將衣繡遊於九重之臺賈誼曰繡是古天子之服今冨人大賈嘉㑹召客以𬒳牆屋說苑曰晉平公使叔向聘呉呉人飾舟以送之左百人右百人有繡衣而豹裘者有錦衣而狐裘者歸以告平公平公曰呉其亡乎又曰鄂君乗青翰之舟張翠蓋越人擁檝而歌曰心恱君兮君不知於是鄂君舉繡被而覆之楊子法言曰今之學也非獨爲華藻又從而繡其鞶恱喻今學煩多也鹽鐵論曰古庶人老耄而後衣絲其餘則麻枲而巳故命曰布衣今冨者綺繡羅紈素綈水綿論衡曰齊郡能刺繡恒女無不能者襄邑能織錦恒婦無不巧者目見而手狎也又曰刺繡之師能縫帷裳網縷之工不能織錦儒生能爲文吏文吏不能爲儒生也文吏一旦在位則鮮冠利劒一歳典職則田宅併集又曰繡之未刺錦之未織絲帛何以異哉反其加五采之功施針縷之飾則文章煥燿學士有文章其猶絲帛布色之功桓譚新論曰陽城子張名衡蜀郡人王翁與吾俱爲講樂祭酒及寢疾預買棺槨多下錦繡立被}
  - {type: punctuation, offset: 2139, content: ，, id: KR3k0012_CHANT_815-bkkpn800}
