  - {type: page-break, offset: 459, content: '', id: KR3k0012_SBCK_815-6b}
  - {type: variant, offset: 459, length: 3, content: 章帝使, WYG: 官供錦被魏志曰景初中賜侯女王絳地交龍錦五疋紺地勾}
  - {type: variant, offset: 459, length: 10, content: 章帝使文郎居左武郎居, krp: 孔子北靣稽首呉志曰蔣欽字公弈爲}
  - {type: variant, offset: 461, length: 1, content: 使, SBCK: 見西王母巾器中有一卷小黃書盛以紫錦之囊帝問此書是仙方耶不審其目可得瞻盻不王母出以示之此五岳之眞形圖也}
  - {type: variant, offset: 463, length: 3, content: 郎居左, SBCK: 袐禁豈汝穢質所冝佩王母即命女宋靈賔更取一圖以與}
  - {type: variant, offset: 463, length: 13, content: 郎居左武郎居右儲正住中曰臣, WYG: 錦三疋倭獻暴}
  - {type: page-break, offset: 463, content: '', id: KR3k0012_WYG_815-5b, image: WYG0900/WYG0900-0221b.png}
