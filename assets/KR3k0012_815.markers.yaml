  - {type: variant, offset: 3276, length: 171, content: 疋可以供送葬之事染周禮天官下曰染人掌染絲帛凡染春暴練夏纁玄秋染夏官獻功又地官下曰掌染草掌以春秋歛染草之物染草茅蒐橐蘆豕首紫茢之屬以權量受之以待時而頒之權量以知輕重多少時染夏之時又冬官考工記曰鍾氏染羽以朱湛丹秫三月而熾之鄭司農云湛漬也丹秫赤粟玄謂湛讀如斬車帷裳之漸熾也羽所以飾旌旌及王后之車淳而漬之淳沃也以炊下湯沃其熾蒸之以漬羽漬猶染也三入為纁, SBCK: 一十}
