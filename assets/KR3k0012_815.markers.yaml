  - {type: variant, offset: 1631, length: 14, content: 隅青絲為籠繩桂枝為籠鉤何用識, SBCK: 曰君子至止黼衣繡裳又楊之水曰素衣朱繡從子于鵠鵠曲沃邑也鵠音沃又九罭曰九罭美周公也我遘之子衮衣繡裳周禮秋官下小行人曰合六幣琮以錦琥以繡又冬官上􅀞繢曰五采備謂之繡禮記月令曰仲秋之月命有司文繡有􅁪必修其故左傳閔公曰狄伐衛公與石祁子玦寗莊子矢曰以此賛國擇利而爲之與}
