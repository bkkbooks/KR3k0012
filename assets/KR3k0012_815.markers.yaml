  - {type: variant, offset: 2145, length: 1, content: 漢, SBCK: 大過曰􅀍繡夜行不見文章安㘴玉堂乃無咎殃洞􅁳記曰甘泉有霞光繡藻龍繡連煙繡王子年拾遺記曰孔子生之夕有麟吐玉書於闕里人家乃以繡紱繫麟角而去又曰呉主孫權常歎魏蜀未夷軍旅之隟思得善􅀞者使圖作山川地形軍陣之象趙夫人曰丹青之色易歇滅不可爲乆寳妾能刺繡作列國圖於方帛上冩五岳河海城邑行陣之形進於呉主時人謂之針絶呉越春秋曰呉王死辭曰不忍見伍子胥吾死必結璧連組以幕吾目恐其不蔽即復重羅繡三㤿以爲奄明生不昭我身死不見我形吾何言哉物理論曰世傳有夫死而婦許以不嫁者誓以繡衣禭以衣尸納諸棺焉後三年婦出適迎有日矣有行道人夜求人家􅀫向晨主人語之婦約之辭􅀉所誓之衣曰子到􅀂千里當逢之還此衣焉或者出門到所言處果見迎車具以事告還其繡衣婦遂自經而死又曰夫論事比􅀋不得其體雖飾以華辭文以美言無異錦繡衣掘株管弦樂土梗非其趨也世􅀃曰曹植妻衣繡太祖登臺見之以違制命還家賜死戒經六禽變曰寅爲衣裳文繡夢}
