  - {type: variant, offset: 667, length: 446, content: 絲作繩結之燒為灰末投水中灰若出水還成繩者病不可愈須臾灰聚浮出復為繩又療果無效少日資亡宋書曰諸葛闡上言夫歲時有利害之收而蚕桑有經常之苦機杼居不變之勤而民用有奢儉之異今南至有五絲命縷之服仲夏北至比肆連行紏繩縻無用之工玄黃侵衣章之費飾綵雖貴始無所入尺絕寸分終於捐棄部一邑以推百城其費愽矣謹率愚管謂宜禁革後魏書曰幽州刺史張亮初有薛琡夢亮於山上桂絲覺而告亮且占之曰山上絲幽字君為幽州乎未朞而受管子曰齊桓公伐楚濟汝水踰方城使貢絲於周室墨子見染絲者歎曰染於蒼則蒼染於黃則黃五入則為五色故染不可不慎非獨染絲治國亦然淮南子曰蚕餌絲則商弦絕商金聲春蚕吐絲金死故絕也山海經曰歐絲之野有一女子跪樹而歐絲郭璞注曰蚕類也呂氏春秋惠子曰使女工化為絲不能治絲大匠化為木不能治木家語曰子張問入官子曰脩身返道故夫女工必自擇絲麻良匠完材賢君選左右論衡曰蚕含絲而商弦絕桉子生而父氣衰新絲既登故體者自壞耳桓譚新論曰昔神農始削桐為琴繩絲為絃以通神明之德合天地之敘風俗通曰五月五日色續命絲俗說益人命正部曰皎皎練絲為藍則青得丹則赤得蘗則黃得, SBCK: 錦爲蔽}
