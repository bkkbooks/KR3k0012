  - {type: variant, offset: 452, length: 1, content: 丹, SBCK: 朱寵仲威爲太尉家貧食脫粟卧布被朝廷賜錦􅀍梁􅁏皆不敢當漢官儀曰虎賁中郎將古官衣紗縠單衣虎文錦袴餘郎亦然漢官典職曰尚書郎直中官供錦􅀍魏志曰景􅀄中賜倭女王絳地交龍錦五疋紺地勾文錦三疋倭獻􅁀文􅄂錦二十疋魏文帝詔曰前後每得蜀錦殊不相比適可訝而鮮􅂌尚復不愛也自吾所織如意虎頭連璧錦亦有金薄蜀薄來至洛邑皆下惡是爲下土之物皆有虚名典略曰孔子反衛夫人南子使人謂之曰四方君子之來者必見寡小君孔子不得巳見之夫人在錦帷中孔子北靣稽首呉志曰蔣欽字公弈爲右護軍孫權常入其内母練帳縹􅀍權歎其在貴守約勑御府爲其母作錦􅀍改易帷帳又曰甘寜住止常以繒錦維舟去輙割弃以示奢又曰諸􅁑融父兄質素雖在軍旅身無采飾而融錦􅄢文繡獨爲奢侈環氏呉紀曰蜀遣使獻重錦千端江表傳曰陸遜攻劉備於夷陵備捨舡歩走燒皮鎧以斷道使兵以錦挽車走入白帝蜀志曰先主入益州賜諸􅁑亮法正張飛􅀜羽錦各千疋王隱􅀳書曰􅀽甫字公曹稱所知於領軍何勗勗曰君稱其好人則多所冝何以爲欲使宰民不可爲臺閣職乎甫曰人各有能有不能此人雖好好莫過錦錦不可以爲熖王隱晉書曰竇滔妻􅂫氏善屬文符堅時滔爲秦州刺史􅀍徙流沙􅂫氏思之織錦爲回文詩以􅀉滔循環宛轉以讀之詞甚悽切􅀳書曰石季龍僣立遷都于鄴傾心事佛圖澄有重於勒下書衣澄以綾錦乗以雕輦南史曰宋元凶劭將作難賜􅀽淑等袴褶又就主衣取錦裁三尺爲一叚又中裂之分蕭斌與淑及左右使以􅅞袴褶齊書曰江淹爲宣城太守時罷歸始泊禪靈寺渚夜夢一人自稱張景}
  - {type: page-break, offset: 452, content: '', id: KR3k0012_SBCK_815-3b}
  - {type: page-break, offset: 452, content: '', id: KR3k0012_SBCK_815-4a}
