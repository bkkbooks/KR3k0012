  - {type: variant, offset: 1365, length: 0, content: '', SBCK: 其國人來獻有雲崑錦文如雲霞有樓堞有離珠錦文似貫佩珠也有􅂐􅊢錦文似大􅂐字有列明錦文羅燈燭七幅皆廣三尺又曰周靈王起昆昭之臺以享群臣張鸞章錦文如鸞翔又曰呉趙逵之妹善書􅀞巧妙無􅀟能於指間以綵絲爲雲龍虬鳯之錦大則盈尺小則方寸}
  - {type: variant, offset: 1365, length: 0, content: '', WYG: 其國人來獻有雲崑錦文如雲霞有樓堞有雜珠錦文似貫珠佩也有篆𨽻錦文似羅燈燭也幅皆廣三尺又曰周靈王起昆昭之臺以享羣臣張鸞章錦文如鸞翔又曰吳趙逹之妹善書畫巧妙無雙能於指間以綵絲為雲龍虬鳯之錦大則盈尺小則方寸}
