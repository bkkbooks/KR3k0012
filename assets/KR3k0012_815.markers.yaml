  - {type: variant, offset: 452, length: 1, content: 丹, WYG: 朱}
  - {type: variant, offset: 452, length: 2, content: 丹陽, krp: 朱寵仲威爲太尉家貧食脫粟卧布被朝廷賜錦𬒳梁肉皆不敢當漢官儀曰虎賁中郎將古官衣紗縠單衣虎文錦袴餘郎亦然漢官典職曰尚書郎直中官供錦𬒳魏志曰景𥘉中賜倭女王絳地交龍錦五疋紺地勾文錦三疋倭獻暴文雜錦二十疋魏文帝詔曰前後每得蜀錦殊不相比適可訝而鮮卑尚復不愛也自吾所織如意虎頭連璧錦亦有金薄蜀薄來至洛邑皆下惡是爲下土之物皆有虚名典略曰孔子反衛夫人南子使人謂之曰四}
  - {type: variant, offset: 453, length: 1, content: 陽, WYG: 寵}
  - {type: variant, offset: 454, length: 0, content: '', SBCK: 謂曰前以一疋錦相􅀉今可見還淹探懐中得數尺與之此人大恚曰郍得割截都盡顧見丘遲謂曰餘尺旣無用以遺君自爾淹文章躓矣趙書曰前石死調大臣子弟六十人爲挽郎引錦一疋後魏書曰甄琛爲定州刺史旣至郷衣錦晝遊政體嚴細甚無聲譽又曰孝武至彭城宋江夏王義恭獻蠟燭十挺武陵王駿獻錦一疋北史曰齊畢義雲家有十餘機織錦并造金銀器物後周書曰太祖曽在同州與郡公宴集出錦􅄢及􅄂綾絹數叚命諸將樗蒲取之唐書曰王}
  - {type: page-break, offset: 454, content: '', id: KR3k0012_SBCK_815-5a}
  - {type: variant, offset: 454, length: 1, content: 方, WYG: 仲}
  - {type: variant, offset: 455, length: 2, content: 儲為, SBCK: 慶天后初爲廣州都督境内清肅手制襃之曰朕以卿歷職有稱故授此官旣美化逺聞實副朝􅀉令賜卿􅄂綵六十叚并瑞錦等物以彰善政也又曰大曆初代宗詔許宰臣元載王縉及左僕射裴冕戸部侍}
  - {type: variant, offset: 455, length: 1, content: 儲, WYG: 威}
  - {type: variant, offset: 455, length: 3, content: 儲為郎, krp: 君子之來者必見寡小君孔子不得巳見之夫人在錦帷}
  - {type: variant, offset: 457, length: 0, content: '', WYG: 太尉家貧食脱粟卧布被朝廷賜錦被梁肉皆不敢當漢官儀曰虎賁中}
  - {type: variant, offset: 458, length: 0, content: '', SBCK: 判度支第五􅄾京兆尹􅀺幹各出錢三十萬宴郭子儀于子儀私第内侍魚朝恩叅其㑹焉朝恩出錦三十疋羅五十疋綾一百疋爲子儀纒頭之費極歡而罷舊俗賞歌舞人以錦綵置之頭上謂之纒頭宴饗加惠借以爲詞又曰大曆}
  - {type: page-break, offset: 458, content: '', id: KR3k0012_SBCK_815-5b}
  - {type: variant, offset: 458, length: 0, content: '', WYG: 將古宮衣紗縠軍衣虎文錦袴餘郎亦然漢官典職曰尚書郎直}
  - {type: punctuation, offset: 459, content: 。, id: KR3k0012_CHANT_815-bkkpn210}
  - {type: 'tls:seg', offset: 459, content: '', id: KR3k0012_CHANT_815-11a.4}
  - {type: variant, offset: 459, length: 1, content: 章, SBCK: 代宗勑曰王制命市納賈以觀人之好惡布帛精麤不中度廣狹不中量不鬻於市漢詔亦云纂組文繡害女工也朕思以恭儉克巳敦朴化人毎尚素玄之服庶齊金土之價而風俗不一踰侈相髙浸弊於時其來自乆耗縑繒之夲資錦綺之奢異彩竒文恣其誇競今師旅未戢􅀺元不康豈使􅁋巧之功更虧恒制在外所織造大張錦軟錦瑞錦透背及大􅰃錦竭鑿六硬巳上錦獨窠文紗四尺幅及獨窠呉綾獨窠司馬綾等並冝禁斷其長行髙麗白錦􅄂色錦及常行小文字綾錦花文所織盤龍對鳯麒麟師子天馬辟邪孔鵲仙鶴芝草萬字􅀟勝及諸織差様文字等亦冝禁斷又曰張萬福爲和州刺史賊許果至楚州大掠節度使韋元甫命萬福追討未至淮隂果爲其將康自勸所逐自勸擁兵繼掠循淮南東萬福倍道追而殺之代宗發詔以勞之賜衣一襲宫錦十􅀟又曰太和中賜修指南車記里古人故金忠義男公亮緋衣牙笏錦三十疋范子計然曰錦大丈出陳留列子曰范氏之藏火子華曰􅀂能入火取得錦者從所多少啇丘開入火徃還而身不燒尸子曰夫捨而弗治則腐而棄使工女繰之以爲美錦人君朝而服之子思子曰管仲饋錦也雖惡而登朝子産練紫也雖美而不尊孔子家語淮南子曰管仲文錦也雖醜登廟子産練帛也美而不尊管雖不及聖猶文錦也子産先思後去如練帛雖温不堪爲宗廟服枹朴子曰籍孺董鄧猶錦紈之裹塵埃又曰寸錦足以知巧刺䑕足以知勇又曰寸裂之錦黻未􅀂堅完之韋布又曰小文雖巧猶寸錦細碎之珎太公六韜曰夏桀殷紂之時婦人錦繡文綺之㘴席衣以綾紈嘗三百人穆天子傳曰吉日甲子天子乃執白珪玄璧以見西王母好獻錦組百純郭璞注日純疋錦名也組綾屬音祖也西王母再拜受之又曰盛􅁎之䘮天子使襞人贈用文錦漢武内傳曰}
