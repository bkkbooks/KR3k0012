  - {type: variant, offset: 3448, length: 421, content: 入為緅七入為緇染纁者三入而成又再染以黑則為緅今禮俗文作爵言如爵頭色也又復再染以黑乃成緇矣禮記月令曰季夏命有司染綵黼黻文章必以法故無或差貸黑黃蒼赤莫不質良無敢詐偽以給郊廟祭祀之服以為旗章以別貴賤等級之度質正也良善也所用染者當得其真綵正善爾雅曰一染謂之縓彫絹反再染謂之頳三染謂之纁青謂之䓗黑謂之黝漢書王莽傳曰更始元年拜置百官莽聞之愈恐欲外示自安乃染其鬚髮吳錄曰九真移風縣有赤絮膠人規土知蟻穴墾發以木枝插其中則蟻緣而生漆折漆以染絮其色正赤宋書曰陶季直五歲喪母哀若成人初母未病令於外染衣卒後家人始贖季直抱之號慟聞者莫不酸感呂氏春秋曰素染於青染於黃五入而五色堯舜三王染於賢聖而治桀紂幽厲染於凶佞而亡愽物志曰蕪蘇子染法蕪蘇子一升可染一疋直以水浸之耳釋名曰緗桑葉初生色也廣志曰烏丸與匈奴同俗丈夫婦人為木幘朱染之如杆盆以沓頭神仙傳曰昌容者商王女也脩道於常山食逢蔂根二百餘年能致紫草賣與染家得錢以與貧病者環濟要略曰正色有五謂青赤黃白黑也間色有五謂紺紅縹紫流黃也, SBCK: ''}
