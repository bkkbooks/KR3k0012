  - {type: variant, offset: 467, length: 6, content: 郎居右儲正住, SBCK: 帝靈賔􅊥懷}
  - {type: punctuation, offset: 470, content: 。, id: KR3k0012_CHANT_815-bkkpn212}
  - {type: 'tls:seg', offset: 470, content: '', id: KR3k0012_CHANT_815-11a.6}
  - {type: variant, offset: 470, length: 56, content: 儲正住中曰臣文武兼備在所施用上嘉其才以繁亂絲付儲使理儲拔佩刀三斷之對曰反經任勢臨事宜然袁宏漢記曰郭泰傳童子魏照求, krp: 護軍孫權常}
  - {type: punctuation, offset: 474, content: ，, id: KR3k0012_CHANT_815-bkkpn213}
