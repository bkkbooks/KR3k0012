  - {type: variant, offset: 52, length: 2, content: 進堅, SBCK: 當獨歩當時擬之方叔論者咸曰當求之於古造次無其比也後魏書曰來大千驍果善􅀐射遷中散至於朝賀之日大干常着御鎧盤馬殿庭莫不歎異嘗從太宗獵見虎在髙巖上大干持矟直前刺之應手而死太宗嘉其勇壯又爲殿中給事又曰乙瓌代人也其先世統部落世祖時瓌父正知慕國威化遣瓌入貢世祖因留之瓌便弓馬善􅀐射手格猛獸膂力過人數從征伐甚見信待尚上谷公主世祖之女也又曰􅁃葉爲將有謀略治軍清整常以少擊多士衆服其智勇名冠諸將又曰楊播字延慶自云弘農華隂人也除左將軍㝷假前將軍隨車駕南討至鍾離師廻詔播領歩卒三千􅀐五百爲衆軍殿時春水􅀄長賊衆大至舟艦塞川播以諸軍渡淮未訖嚴練南岸身自居後諸軍賊衆遂集於是圍播數重播乃爲圎陳以禦之身自􅅮擊斬殺甚多相拒再􅀫軍人食盡賊圍更急髙祖在北而望之旣無舟舡不得救援水􅀔稍减播領精􅀐三百歷其舩大呼曰今我欲渡能戰者出賊莫敢動遂擁衆而濟髙祖甚壯之賜爵華隂子又曰河間公齊烈帝之玄孫也少雄傑魁岸世祖愛其勇壯引侍左右從征赫連昌世祖馬蹶賊衆逼帝齊以身蔽捍决死擊賊賊乃退又曰賈思伯字仕休齊郡益都人也世宗即位加輔國將軍任城王之圍鍾離也以思伯持節爲其軍司及失利思伯爲後殿以思伯儒者}
  - {type: page-break, offset: 52, content: '', id: KR3k0012_SBCK_436-1b}
  - {type: page-break, offset: 52, content: '', id: KR3k0012_SBCK_436-2a}
  - {type: variant, offset: 52, length: 2, content: 進堅, WYG: 當獨歩當時擬之方叔論者咸曰當求於古造次無其比也後魏書曰來大干驍果善騎射遷中散至於朝賀之日大干常著御鎧盤馬殿庭莫不歎異嘗從太宗獵見虎在髙巖上大干持矟直前刺之應手而死太宗嘉其勇壮又為殿中給事又曰乙瓌代人也其先世統部落世祖時瓌父正知慕國威化遣瓌入貢世祖因留之瓌便弓馬善騎射手格猛獸膂力過人數從征伐甚見信侍尚上谷公主世祖之女也又曰庾葉為将有謀畧治軍清整常以少擊多士衆服其智勇名冠諸将又曰楊播字延慶自云𢎞農華隂人也除左将軍尋假前将軍隨車駕南討至鍾離師廽詔播領歩卒三千騎五百為衆軍殿時春水初長賊衆大至舟艦塞川播以諸軍渡淮未訖嚴練南岸身自居後諸軍賊衆遂集於是圍播數重播乃為圎陳以禦之身自摶擊斬殺甚多相拒再宿軍人食盡賊圍更急髙祖在北而望之既無舟船不得救援水勢稍减播領精騎三百立其船大呼曰今我欲渡能戰者出賊莫敢動遂擁衆而濟髙祖甚壮之賜爵華隂子又曰河間公齊烈帝之𤣥孫也少雄傑魁岸世祖愛其勇壮引侍左右從征赫連昌世祖馬蹶賊衆逼帝齊以身蔽捍决死擊賊賊乃退又曰賈思伯字仕休齊郡益都人也世祖即位加輔國将軍任城王之圍鍾離也以思伯持節為其軍司及失利思伯為後殿以思伯儒者}
