  - {type: variant, offset: 67, length: 1, content: 爾, SBCK: 此父不生此子陳書曰蕭摩訶齊軍戰有西域胡妙於弓矢弦無虚發衆軍尤憚之及將戰明徹謂摩訶曰􅀂殪此胡則彼軍奪氣君有關張之名可斬顔良矣摩訶曰願識其形狀當爲公取之明徹乃召降人有識胡者云胡着絳衣擭皮弓兩端骨弭明徹遣人覘乃知胡在陣仍自酌以飲摩訶摩訶飲訖馳馬衝齊軍胡挺身出陣前十餘歩彀弓未發摩訶遥擲銑鋧立中其額應手而仆齊軍大力十餘人出戰摩訶又斬之又曰周䥫虎事梁河東王􅊫王僧辨擒欲烹之䥫虎曰侯景尚未滅奈何殺壯士耶僧辨竒之後降髙祖又曰蕭摩訶帥齊兵爲㓂髙祖遣安都北拒齊軍於鍾山龍尾及北郊壇安都謂摩訶曰卿驍勇有名千聞不如一見摩訶對曰今日令公見矣隋書曰宇文慶從武帝攻河隂先登攀堞與賊短兵接戰良乆中石廼墜絶而後􅂫帝勞之曰卿之餘勇可以賈人也又曰楊玄感驍勇多力毎戰親軍長矛身先士卒喑嗚叱咤}
  - {type: page-break, offset: 67, content: '', id: KR3k0012_SBCK_436-3b}
  - {type: page-break, offset: 67, content: '', id: KR3k0012_SBCK_436-4a}
  - {type: variant, offset: 67, length: 0, content: '', WYG: 此父不生此子陳書曰蕭摩訶與齊戰有西域胡妙於弓矢絃無虛發衆皆憚之將戰吳明徹謂摩訶曰殪此胡則彼軍奪氣君有關張之名可斬顔良矣摩訶曰願識其形状當為公取之明徹召降人有識胡者云胡著絳衣樺皮弓兩端骨弭明徹遣人覘視知胡在陣仍自酌以飲摩訶摩訶飲訖馳馬衝齊軍胡挺身出陣前十餘歩彀弓未發摩訶遥擲銑鋧中其額應手而仆齊軍大力十餘人出戰摩訶又斬之又曰周鐵虎事梁河東王詧王僧辯擒欲烹之鐵虎曰侯景尚未滅柰何殺壯士耶僧辨奇之後降髙祖又曰任約引齊兵為冦髙祖遣侯安都拒齊軍於鍾山龍尾及北郊壇安都謂蕭摩訶曰卿有勇名千聞不如一見摩訶對曰今日令公見矣隋書曰宇文慶從武帝攻河隂先登攀堞與賊短兵接戰良乆中石廼墜絶而後蘇帝勞之曰卿之餘勇可以賈人也又曰楊𤣥感驍勇多力每戰親軍長矛身先士卒喑鳴叱咤所當者莫不震懾論者方之項羽又曰魚俱羅馮翊下邽人也身長八尺膂力絶人聲氣雄壯言聞數百歩又曰權武少果勁勇力絶人能重甲上馬嘗倒於井未及泉復躍而出其拳捷如此又曰長孫晟突厥之内大畏長孫摠管聞其弓聲謂為霹靂見其走馬稱為閃電王笑曰将軍震怒威行域外遂與雷霆為比一何壯哉唐書曰丘行恭從討王世充㑹戰於邙山之上太宗欲知其虛實強弱及與數十騎衝之直出其後衆皆披靡莫敢當其鋒所殺傷甚衆既而限以長堤與諸騎相失唯行恭獨從尋有勁騎數人追及太宗矢中御馬行恭乃廽騎射之發無不中餘賊不敢復前然後下馬抜箭以其所乘馬進太宗行恭於御馬前歩執長刀巨躍大呼斬數人突陣而出得入大陣貞觀中有詔刻石為人馬以象行恭抜箭之壯立於昭陵闕前又曰淮陽王道𤣥拜洛州總管及府廢改授洛州刺史五年劉黒闥引突厥冦河北復授山東道行軍總管師㳄下博與賊軍遇道𤣥帥騎先登命副将史萬寳督軍繼進萬寳與之不協及道𤣥深入而擁兵不進謂所親曰吾奉手詔言淮陽小兒雖名為将而軍之進止皆委吾今其輕鋭越濘交戰大軍道動必䧟泥溺莫如結陣以待之雖不利於王而利於國道𤣥遂為賊所擒全軍盡沒唯萬寳逃歸道𤣥遇害年十九太宗追悼乆之嘗從容謂侍臣曰道𤣥終始從朕見朕深入賊陣所向必剋意嘗企慕所以每陣先登盖學朕也惜其年少不遂逺圗因為之流涕又曰王君廓鎮幽州㑹突厥入冦君廓邀擊破之俘斬二千餘人獲馬五十疋髙祖大悦徴入朝賜以御馬令於殿庭乘之而出因謂侍臣曰吾聞藺相如叱秦皇目皆出血君廓往擊竇建徳将出戰李勣遏之君廓發憤大呼目及鼻耳一時流血此之壯氣何謝古人不可以常例賞之復賜錦袍金帯還鎮幽州又曰劉世讓為并州總管統兵屯於鴈門突厥處羅可汗與髙開道苑君璋合衆攻之甚急鴻臚卿鄭元璹先使在蕃可汗令元璹來説之世讓厲聲曰大夫柰何為夷狄作説客耶經月餘虜乃退及元璹還述世讓忠勇髙祖下制褒美之又曰李嗣業賊将李歸仁初以鋭師數來挑戰我師攅矢而逐之賊軍大至逼廹我騎突入我營我師􅅝亂嗣業謂郭子儀曰今日之事若不以身啖冦決戰於陣萬死而冀其一生不然則我軍無孑遺矣嗣業乃脱衣徒搏執長刀立於陣前大呼當嗣業刀者人馬俱碎殺十數人陣容方駐前軍之士盡執長刀而出如墻而進嗣業先登奮命所向摧靡又曰張濬拜諌議大夫其年冬宰相王鐸至滑臺兼充天下行營都統方徴兵諸侯奏用濬為都統判官時王敬武初破𢎞覇軍即大振累詔徴平虜兵敬武獨不赴援鐸遣濬往説之敬武已援偽命復怙強不迎詔使濬至謁見責之曰公為天子守藩王臣賫詔宣諭而侮慢詔使既未識君臣禮分復何顔以御軍民哉敬武愕然謝咎既宣詔軍士按兵黙然濬並召将佐集於鞠塲面諭之曰人生効忠仗義所冀粗分逆順懸知利害黄巢前日販鹽虜耳公等捨累葉天子而臣販鹽白丁何利害之可論耶今諸侯勤王天下響應公等獨據一州坐觀成敗賊平之後去就何安若能此際排難解紛陳師鞠旅共誅冦盜迎奉鑾輿則富貴功名指掌可取吾惜公輩捨安而即危也諸将改容引過謂敬武曰諌議之言是也即時出軍從濬入援京師晏子春秋曰昔夏之衰也有推移大戲殷之衰也有費仲惡來足走千里手裂兕虎任之以力淩轢天威專行勇力不顧乎義理是以桀紂以滅殷夏以衰又曰荘公奮乎勇力不顧於行尚勇力之士無忌於國貴戚不薦善福邇不引過故晏子見公公曰古者亦有徒以勇力立於世者乎晏子對曰嬰聞之輕死以行理謂之勇誅暴不避強謂之力故勇力之立也以行理義也今公自奮乎力勇不顧乎行暴尚勇力之士無忌於國身立威疆行流淫暴貴戚不薦善福邇不引過反聖王之徳而脩滅君之行用此存者嬰未嘗聞有也吳越春秋曰專諸豐邑人伍子胥初去楚如吳時遇之於塗專諸方與人闘其怒有萬人之氣甚不可當其妻一呼即還子胥怪而問其壯何夫子怒之盛聞一女子之聲而即折道寧有説乎專諸曰子視吾之儀寧類愚者耶何言之鄙也夫屈一人之下必申萬人之上子胥因相決之推顙深目虎口鷹背戾於從難知其勇士也又曰伍子胥見吳王僚望其顔色甚可畏長一丈大十六圍眉間一尺僚與語三日辭無復者賢人也子胥知王好之每入言語侃侃有勇壯之氣也韓詩外傳曰衛靈公晝寝而起志氣益衰使人馳召勇士孫㳙道遭行人卜商子夏曰何馳之疾也對曰君晝寝而起使我馳召勇士公孫㳙子夏曰徴㳙而勇若㳙者可乎御曰可子夏曰載我而反至君曰延先生上起召公孫㳙俄而㳙至入門抜劔疾呼曰商不我取若頭子夏顧叱之曰咄内劔吾将與君言勇於是君令㳙内劔而上子夏曰來吾嘗與子從君而北見趙簡子被髮杖矛而見我君從十三行之後趨而進曰諸侯相見不宜不朝服君不朝服行人卜商将以頭血濺君之衣矣使反朝服而見吾君者子耶我耶㳙曰子也子夏曰子之勇不若我一矣又與子從君而東至海曹齊君重鞇而坐從十三行之後趨進曰諸侯相見不宜相臨以其一鞇而去之者子耶我耶㳙曰子也子夏曰子之勇不若我二矣又與子從君於囿中於是兩猏逐我君與抜矛格而還之者子耶我耶㳙曰子也子夏曰子之勇不若我三矣所貴為士者上攝萬乘下不放乎匹夫外立節矜敵而不侵掠内禁殘害而君不危殆是士之所長而君子之所致貴也若夫以長掩短以衆暴寡淩轢無罪之民而威於閭巷之間者是士之甚毒而君子之所致惡也於是靈公避席曰嗟乎寡人雖不敏請從先生勇又曰孔子遊於景山之上子路子貢顔囬從焉孔子曰君子登髙必賦}
