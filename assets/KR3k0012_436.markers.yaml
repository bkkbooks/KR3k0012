  - {type: variant, offset: 55, length: 0, content: '', krp: 之必死及至大喜曰仁者必勇常謂虚談今於軍司見之矣又曰于栗磾代人也少習武藝拜冠軍將軍道武畋干白登山見熊領數子道武顧謂栗磾曰能縛之乎栗磾曰能道武曰若搏之不勝豈不虚斃一壯士耶栗磾曰自可能致御前坐而制之㝷而擒之晉將劉𥙿遺栗磾書曰黒稍將軍磾常好持黒矟故有其號又曰楊大眼武都氐王難當之孫也少驍勇趫捷走如飛電宣武南征尚書李冲典選統校征官大眼徃求征焉冲不許大眼曰尚書不見知聽下官出一伎便出長繩三丈繫之於髻而走繩直如矢馬馳不及冲大驚曰千載巳來未有此人也遂用爲軍主大眼顧謂同寮曰吾之今日所謂蛟龍得水之秋也自此一舉不復與諸君齊列矣所經戰皆武冠六軍大眼妻潘氏善射詣軍省大眼至攻戰遊獵之際潘氏亦戎裝齊鑣並轡乃至還營同坐幕下對諸寮佐言笑自得大眼指謂諸人曰此潘將軍也明帝加光禄大夫淮泗之間童兒啼者恐之云楊大眼至無不立止王秉之𥘉歸國也謂大眼曰吾在南時聞君之名以爲眼如車輪及見君乃不異常人大眼曰皷旗相望瞋眸奮發足使君目不能視何必大如車輪又曰文成帝名濬太武孫晃子也即位後冬大儺矅兵帝有勇力善騎射靈丘南有山髙四百餘丈詔群官仰射山峯無能踰者帝彎􅓡發矢出山四十餘丈過山南二百歩遂詔刋石勒銘紀功北齊書曰髙昻字敖曹膽力過人姿儀殊異其父次同爲求嚴師加鞭撻昂不遵師訓專事馳騁每言男兒當撗行天下自取冨貴誰能端坐讀書作老博士也其}
