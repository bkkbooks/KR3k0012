  - {type: variant, offset: 404, length: 531, content: 從上流淺瀨夜渡寧曰請以五百人往對之羽聞吾咳唾聲必不敢涉涉即成擒矣又曰陸統字公績從征合肥為右部都督時權徹軍還前部已發魏將張遼等奄至津北統率親近三百人陷圍拔權出敵已毀橋權策馬驅馳統復還戰左右盡死所殺數十人度權已免乃還橋敗道絕被甲潛行權既御舩見之驚喜統痛親近無返者悲不自勝權引袂拭之謂曰公績亡者已矣茍使卿在何患無人蜀志曰關羽字雲長河東人也先主入益州留羽督荊州軍事嘗為流矢所中貫左臂羽令鑿骨劈之時與諸將飲食血流盈器言笑自若及破曹仁於樊城威振華夏曹公議遷都以避其銳司馬宣王蔣濟以為關羽得志孫權必大怒權後果用呂蒙計平荊州虜羽斬之又曰張飛字益德涿人先主背曹公依劉表於雷陽聞曹公卒至棄妻子而奔乃以飛將二十騎拒之後飛據水斷橋瞋目橫槊曰張益德在此爾曹敢來決死否眾無敢近者先主入益州飛與諸葛亮分定郡縣飛雄猛名亞關羽羽善待卒伍而驕士大夫飛敬愛君子而不恤小人先主常戒之及先主伐吳臨發益州於是飛帳下張達殺之持其首順流奔于孫權晉書曰桓石虔小字鎮惡有材幹趫捷從父在荊州於獵圍中見猛獸被數箭而伏諸督將素知其勇戲令拔箭石虔因急往拔得一箭猛獸跳石虔亦跳高於猛獸猛獸伏復拔一箭以歸嘗從桓沖入關沖為符健所圍垂沒石虔躍馬赴之拔沖於數萬眾中而還莫敢抗者三軍歎息威震敵人又曰吾彥字士則吳郡人出自寒微有文武才幹身, WYG: ''}
