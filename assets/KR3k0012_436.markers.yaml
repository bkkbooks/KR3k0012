  - {type: variant, offset: 101, length: 12, content: 即委財物散走堅追斬得一級, SBCK: 民而威於閭巷之間者是士之甚毒而君子之所致惡也於是靈公避席曰抑乎寡人雖不敏請從先生勇又曰孔子游於景山之上子路子貢顔回從焉孔子曰君子登髙必賦􅈛願言者何其丘將啓汝子路曰由願􅁬長㦸􅀭三軍乳虎在後仇敵在前􅅮躩快志進救兩國之患孔子曰勇士哉又曰齊莊公出獵有螳蜋舉足將􅅮其轉輪問其御曰此何蟲也對曰此螳蜋者也其爲蟲知進而不知退不量力而輕敵莊公曰}
