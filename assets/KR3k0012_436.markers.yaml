  - {type: variant, offset: 131, length: 3002, content: 為前部督受勑斫敵前營權特賜米酒眾肴寧乃賜手下百兵食食畢寧先以銀椀酌酒自飲兩椀乃酌與都督伏不肯持寧引白削置膝上呵謂之曰卿見知於至尊孰與甘寧甘寧尚不惜死卿何得獨惜死乎都督見寧色厲即起拜持酒次通酌兵各一銀椀至二更時衘枚出破敵敵驚動遂退寧益貴重增兵二千又曰董襲字元岱餘姚人權討黃祖祖橫兩艨艟守江口以栟櫚大紲縛石為碇上有千人以弩交射軍不得進襲將敗死百餘人被兩鎧乘軻舩突入艨艟襲乃以刃斷其紲艨艟於是橫流制不能已大兵遂進祖乃開門走追斬之明日大會權舉觴屬襲曰今日之會斷紲之功也又曰甘寧字興霸性奢靡嘗以繒錦維舟去或割棄勸權襲黃祖擒之隨魯肅至益陽拒關羽羽擇銳士五千人從上流淺瀨夜渡寧曰請以五百人往對之羽聞吾咳唾聲必不敢涉涉即成擒矣又曰陸統字公績從征合肥為右部都督時權徹軍還前部已發魏將張遼等奄至津北統率親近三百人陷圍拔權出敵已毀橋權策馬驅馳統復還戰左右盡死所殺數十人度權已免乃還橋敗道絕被甲潛行權既御舩見之驚喜統痛親近無返者悲不自勝權引袂拭之謂曰公績亡者已矣茍使卿在何患無人蜀志曰關羽字雲長河東人也先主入益州留羽督荊州軍事嘗為流矢所中貫左臂羽令鑿骨劈之時與諸將飲食血流盈器言笑自若及破曹仁於樊城威振華夏曹公議遷都以避其銳司馬宣王蔣濟以為關羽得志孫權必大怒權後果用呂蒙計平荊州虜羽斬之又曰張飛字益德涿人先主背曹公依劉表於雷陽聞曹公卒至棄妻子而奔乃以飛將二十騎拒之後飛據水斷橋瞋目橫槊曰張益德在此爾曹敢來決死否眾無敢近者先主入益州飛與諸葛亮分定郡縣飛雄猛名亞關羽羽善待卒伍而驕士大夫飛敬愛君子而不恤小人先主常戒之及先主伐吳臨發益州於是飛帳下張達殺之持其首順流奔于孫權晉書曰桓石虔小字鎮惡有材幹趫捷從父在荊州於獵圍中見猛獸被數箭而伏諸督將素知其勇戲令拔箭石虔因急往拔得一箭猛獸跳石虔亦跳高於猛獸猛獸伏復拔一箭以歸嘗從桓沖入關沖為符健所圍垂沒石虔躍馬赴之拔沖於數萬眾中而還莫敢抗者三軍歎息威震敵人又曰吾彥字士則吳郡人出自寒微有文武才幹身長八尺手格猛獸膐力絕群陸抗奇其勇略將拔用之眾情不允乃會諸將密使狂人拔刀跳躍而走彥不動舉几禦之眾伏其勇乃擢用焉又曰庾闡字仲初頴川鄢陵人也祖輝安北長史父東以勇力聞武帝時有西域健胡趫捷無敵晉人莫敢與校帝募勇士唯東應選遂撲殺之名震殊俗又曰王彌多權略凡有所掠必預圖成敗舉無遺策弓馬迅捷膐力過人青土號為飛豹又曰周處為人勇暴不可當之嘗居義興水中有蛟龍山上有白額虎鄉里有周處時人謂之三橫有里人說處請殺虎虎死入水擊蛟龍沒行數十里處與之俱經三日三夜人謂己死矣皆相慶賀處殺蛟龍迴聞鄉里相賀始知身之患人也於是仄身脩己至洛陽惠帝拜為將軍累遷為建威將軍後西征沒于陣贈西平將軍又曰郭默殺江州太守自稱刺史為人勇捷常身被重甲跳三丈矛時人莫不憚之後陶侃及庾亮率軍滅之又曰蔡裔仕偽趙為振武將軍少有勇力呼聲若雷嘗有盜入室裔撫机一呼賊眾皆殞時人憚之又曰李特巴西人少仕州郡雄勇善騎射沉毅有大度嘗至劍閤箕踞太息顧眄險阻曰劉禪有如此之地面縛於人豈非庸才耶後藂流人眾至數萬遂攻城自稱大將軍為益州刺史後稱蜀為羅尚所殺子孫六世至勢為大司馬桓溫所滅共四十六年又曰劉元海匈奴中人祖扶羅助漢討黃巾遂以眾留定難屬董卓亂屯于河內元海即扶羅之孫也髫齓英惠及長好學尤好左氏傳孫吳兵法略皆誦之兼愛武事妙絕於眾猨臂善射趫捷膐力過人姿儀魁偉身長八尺四寸鬚長三尺太始中武帝召與語大悅之及惠帝失馭寇盜蜂起成都王潁表元海為將軍後王浚伐潁元海說潁曰今二鎮跋扈眾餘十萬恐非宿衛所能禦及請為殿下還說五部以赴國難潁曰五部之眾可保發否鮮卑烏丸勁速如風雲何易可當吾欲奉乘輿還洛陽避其鋒銳徐傳檄天下以逆順制之君意如何元海曰殿下武皇帝之子有殊勳於王室威恩允洽四海欽風孰不思為殿下沒命捐軀者何難發之有乎王浚豎子東瀛踈屬豈與殿下爭衡乎殿下一發鄴宮示弱於人洛陽何復得至縱達洛陽威權不復在殿下也紙檄尺書誰人奉之且東胡之悍不踰五部願殿下勉撫士眾靖以鎮之當為殿下以二部摧東瀛二部梟王浚二豎之首可指日而懸矣潁悅拜元海為北單于元海至左國城二旬之間眾已五萬元海謂劉宣等曰夫帝王豈有常哉大禹出於西戎文王生於東夷唯德所授耳遂僣稱漢王子孫四世至曜為石勒所滅合二十五年又曰石季龍趙王石勒從子也身長七尺五寸趫捷便弓馬勇冠當時至於降城陷壘不復料別善惡坑壍士女鮮有遺類指授攻討所向無前故勒委以專征之任所在立後廢弘而僣位時豪傑侵恣賄賂公行季龍患之擢殿中御史季宸為御史中丞特親任之自此百僚震懾州部肅清季龍曰朕嘗聞良臣猛獸高步通衢而豺狼避路信矣哉季宸是也賞賜甚厚後以疾卒又曰石閔趙王季龍養子也善謀策勇力絕人既殺石鑒遂僣國號大魏戎卒三十萬旌旗鍾鼓綿亙百餘里雖石氏之盛無以過之慕容俊遣慕容恪率眾伐之閔與恪十戰皆敗恪恪乃以鐵鏁連馬簡善射卑勇而無剛者五千方陣而前閔所乘赤馬日行千里左仗雙刃右執劍戟順風擊之斬鮮卑三百餘級俄而燕騎大至圍之數匝閔躍馬潰圍馬死為恪所擒斬之左右七里草木悉枯又曰符生健之子也幼而無賴及長力舉千斤雄勇好殺手格猛獸走及奔馬擊剌騎射冠絕一時何法盛晉中興書曰周訪字士達尋陽人遷武昌太守時杜弢作亂寇豫章訪進討弢別帥杜弘張彥等邀訪訪為流矢所中折齒口中流血壯氣益勇先登舊擊臨陣禽彥殺數百人又曰劉遐字正長廣平人性果毅便弓馬遭天下亂遐自為塢主攻抄日至無時不戰遐每奮擊直入賊軍陷堅摧銳鄉人邵績深知之以女妻焉遂立壁河濟之間胡不敢逼時人號為關羽張飛王隱晉書曰段疋磾召弟文鴦還厭次石虎來先縱騎抄城左右鴦登城臨見不勝其勇欲出擊胡磾疑有伏不聽出民出大為胡所殺掠鴦單將壯士數十騎出擊胡所殺甚多胡騎退鴦追躡磾率步繼鴦虎伏騎起磾鴦力戰殺胡數十鴦還赴磾磾已散還鴦所乘馬乏頓虎呼曰大兄久望共天同不違願今日見何故復戰請精杖語鴦罵曰汝為寇虜久應死吾兄不能用吾計故令汝得至此吾寧死不忍為汝擒遂下馬與胡戰矟折執刀戰不降虎軍四面解馬羅披自鄣前捉鴦自辰至申力極斫殺人而後見得也又曰石勒攻夏口朱伺銜鐵面以弩的射賊大帥數人皆殺之並以磊石弓箭兩下所向摧破賊皆拋舩上岸於水邊作陣伺身被數十箭氣色不變諸軍尋至賊兵便崩退投水死者百數夏口之全伺之勳也宋書曰蒯恩字道恩蘭陵人高祖出征恩縣差為征民充甲士使伐馬芻恩常負大束兼倍餘高祖聞之即給器仗伏恩大喜因征妖賊常為先登多斬首級既習戰陳膽力過人又曰宗越朱陽人為郡吏太守夏侯穆擢為隊主蠻有為寇盜者常使越討伐往輒有功家貧無以市馬常刀楯步出單身挺戰眾莫能當每一捷郡將輒賞錢五千因此得買馬又曰宗啟為江夏王國上將軍十五年不徙官元嘉二十二年伐林邑啟自奮願行義恭舉啟有膽勇乃降除振威將軍又曰薛安都與副將譚金追魯爽於小峴爽自與腹心壯騎斷後譚金先薄之不能入安都望見爽便躍馬大呼直往剌之應手而倒左右范雙斬爽首爽累世驍猛生習戰陣咸云萬人敵安都單騎直入斬之而反時人皆云關羽之斬顏良不過也徐爰宋書曰柳元景字孝仁河東解人也良家子少便弓馬慕尚將師數隨父伐蠻夙以勇稱孫巖宋書曰拓跋燾字佛貍壯健有筋力勇於戰鬭忍虐好殺夷旅畏之攻城臨敵皆親貫甲胄又曰宗啟字元幹南陽沮人兄泌娶妻始入門夜被劫啟年十四挺身與劫相拒十餘人皆披散不得入室時天下無事士人並以文義為業而啟任氣好勇故不為鄉曲所知齊書曰桓崇祖在淮陰見上便自比韓信白起咸不信唯上獨許之崇祖再拜奉旨及破虜啟上謂朝臣曰崇祖許為我制虜果如其言恒自擬韓白今真其人也又曰張敬兒年少便馬有膽氣好射虎發無不中南陽新野風俗出騎射而敬兒尤多膐力又曰魚復侯子響勇力絕人開弓四斛力數在園池中帖騎馳走竹樹下身無虧傷又曰周山圖鎮軍將軍張永征薛安都於彭城山圖, SBCK: ''}
