  - {type: variant, offset: 1385, length: 2633, content: 年又曰劉元海匈奴中人祖扶羅助漢討黃巾遂以眾留定難屬董卓亂屯于河內元海即扶羅之孫也髫齓英惠及長好學尤好左氏傳孫吳兵法略皆誦之兼愛武事妙絕於眾猨臂善射趫捷膐力過人姿儀魁偉身長八尺四寸鬚長三尺太始中武帝召與語大悅之及惠帝失馭寇盜蜂起成都王潁表元海為將軍後王浚伐潁元海說潁曰今二鎮跋扈眾餘十萬恐非宿衛所能禦及請為殿下還說五部以赴國難潁曰五部之眾可保發否鮮卑烏丸勁速如風雲何易可當吾欲奉乘輿還洛陽避其鋒銳徐傳檄天下以逆順制之君意如何元海曰殿下武皇帝之子有殊勳於王室威恩允洽四海欽風孰不思為殿下沒命捐軀者何難發之有乎王浚豎子東瀛踈屬豈與殿下爭衡乎殿下一發鄴宮示弱於人洛陽何復得至縱達洛陽威權不復在殿下也紙檄尺書誰人奉之且東胡之悍不踰五部願殿下勉撫士眾靖以鎮之當為殿下以二部摧東瀛二部梟王浚二豎之首可指日而懸矣潁悅拜元海為北單于元海至左國城二旬之間眾已五萬元海謂劉宣等曰夫帝王豈有常哉大禹出於西戎文王生於東夷唯德所授耳遂僣稱漢王子孫四世至曜為石勒所滅合二十五年又曰石季龍趙王石勒從子也身長七尺五寸趫捷便弓馬勇冠當時至於降城陷壘不復料別善惡坑壍士女鮮有遺類指授攻討所向無前故勒委以專征之任所在立後廢弘而僣位時豪傑侵恣賄賂公行季龍患之擢殿中御史季宸為御史中丞特親任之自此百僚震懾州部肅清季龍曰朕嘗聞良臣猛獸高步通衢而豺狼避路信矣哉季宸是也賞賜甚厚後以疾卒又曰石閔趙王季龍養子也善謀策勇力絕人既殺石鑒遂僣國號大魏戎卒三十萬旌旗鍾鼓綿亙百餘里雖石氏之盛無以過之慕容俊遣慕容恪率眾伐之閔與恪十戰皆敗恪恪乃以鐵鏁連馬簡善射卑勇而無剛者五千方陣而前閔所乘赤馬日行千里左仗雙刃右執劍戟順風擊之斬鮮卑三百餘級俄而燕騎大至圍之數匝閔躍馬潰圍馬死為恪所擒斬之左右七里草木悉枯又曰符生健之子也幼而無賴及長力舉千斤雄勇好殺手格猛獸走及奔馬擊剌騎射冠絕一時何法盛晉中興書曰周訪字士達尋陽人遷武昌太守時杜弢作亂寇豫章訪進討弢別帥杜弘張彥等邀訪訪為流矢所中折齒口中流血壯氣益勇先登舊擊臨陣禽彥殺數百人又曰劉遐字正長廣平人性果毅便弓馬遭天下亂遐自為塢主攻抄日至無時不戰遐每奮擊直入賊軍陷堅摧銳鄉人邵績深知之以女妻焉遂立壁河濟之間胡不敢逼時人號為關羽張飛王隱晉書曰段疋磾召弟文鴦還厭次石虎來先縱騎抄城左右鴦登城臨見不勝其勇欲出擊胡磾疑有伏不聽出民出大為胡所殺掠鴦單將壯士數十騎出擊胡所殺甚多胡騎退鴦追躡磾率步繼鴦虎伏騎起磾鴦力戰殺胡數十鴦還赴磾磾已散還鴦所乘馬乏頓虎呼曰大兄久望共天同不違願今日見何故復戰請精杖語鴦罵曰汝為寇虜久應死吾兄不能用吾計故令汝得至此吾寧死不忍為汝擒遂下馬與胡戰矟折執刀戰不降虎軍四面解馬羅披自鄣前捉鴦自辰至申力極斫殺人而後見得也又曰石勒攻夏口朱伺銜鐵面以弩的射賊大帥數人皆殺之並以磊石弓箭兩下所向摧破賊皆拋舩上岸於水邊作陣伺身被數十箭氣色不變諸軍尋至賊兵便崩退投水死者百數夏口之全伺之勳也宋書曰蒯恩字道恩蘭陵人高祖出征恩縣差為征民充甲士使伐馬芻恩常負大束兼倍餘高祖聞之即給器仗伏恩大喜因征妖賊常為先登多斬首級既習戰陳膽力過人又曰宗越朱陽人為郡吏太守夏侯穆擢為隊主蠻有為寇盜者常使越討伐往輒有功家貧無以市馬常刀楯步出單身挺戰眾莫能當每一捷郡將輒賞錢五千因此得買馬又曰宗啟為江夏王國上將軍十五年不徙官元嘉二十二年伐林邑啟自奮願行義恭舉啟有膽勇乃降除振威將軍又曰薛安都與副將譚金追魯爽於小峴爽自與腹心壯騎斷後譚金先薄之不能入安都望見爽便躍馬大呼直往剌之應手而倒左右范雙斬爽首爽累世驍猛生習戰陣咸云萬人敵安都單騎直入斬之而反時人皆云關羽之斬顏良不過也徐爰宋書曰柳元景字孝仁河東解人也良家子少便弓馬慕尚將師數隨父伐蠻夙以勇稱孫巖宋書曰拓跋燾字佛貍壯健有筋力勇於戰鬭忍虐好殺夷旅畏之攻城臨敵皆親貫甲胄又曰宗啟字元幹南陽沮人兄泌娶妻始入門夜被劫啟年十四挺身與劫相拒十餘人皆披散不得入室時天下無事士人並以文義為業而啟任氣好勇故不為鄉曲所知齊書曰桓崇祖在淮陰見上便自比韓信白起咸不信唯上獨許之崇祖再拜奉旨及破虜啟上謂朝臣曰崇祖許為我制虜果如其言恒自擬韓白今真其人也又曰張敬兒年少便馬有膽氣好射虎發無不中南陽新野風俗出騎射而敬兒尤多膐力又曰魚復侯子響勇力絕人開弓四斛力數在園池中帖騎馳走竹樹下身無虧傷又曰周山圖鎮軍將軍張永征薛安都於彭城山圖領二千人迎軍至武原為虜騎所追合戰多所傷殺虜圍轉急山圖據城自固然後更結陣死戰突圍出虜披靡不能禁眾稱其勇呼為武原將又曰焦度初青州刺史顏師伯出鎮差度領憧上送之索虜寇青州師伯遣度領軍與虜戰於沙溝杜梁度身破陣大捷師伯板為己輔國府參軍虜遣清水公寇清口度又領軍救援剌虜騎將豹皮公墮馬獲其裝鎧矟手殺數十人師伯啟孝武稱度氣力弓馬並絕人帝召還充左右見度身形黑壯謂師伯曰真健物也又曰周盤龍子奉叔單馬率二百餘人結陣虜萬餘騎張左右翼圍繞之一騎走還報奉叔已沒盤龍方食棄筋馳馬奮弰直奔虜陣自稱曰周公來虜素畏盤龍驍名即時披靡時奉叔已大殺虜得往在外盤龍不知乃衝東擊西奔走突北賊眾莫敢當奉叔見其父久不出復躍馬入陣父子兩騎縈攪數萬人虜眾大敗盤龍父子由是名播北國形甚羸訥而臨軍勇果諸將莫逮又曰崔恭祖者慧景宗人驍果便馬矟氣力絕人頻經軍陣討王敬則與左興盛軍容袁文曠爭及敬則首訴明帝曰恭祖禿馬絳衫手剌倒賊故文曠得斬其首以死易勳而見枉奪若夫此勳要當剌殺左興盛帝以其勇使謂興盛曰何容令恭祖與文曠爭功遂封二百戶又曰桓康簡陵人勇果驍悍宋太初中隨武帝起義為郡所縶眾皆散康裝擔一頭貯穆后一頭貯文惠太子竟陵王子良自負至山中與門客蕭欣祖三十餘人相結破獄出武帝郡兵追急康死戰破之隋武帝起兵摧堅陷陣所經材邑次行暴害江南人畏之以其名怖小兒畫其形狀於寺中病瘧者寫其形怙其床壁無不立愈位至蘭陵太守梁書曰王神念少善射騎既老不衰常於高祖前手執二刀楯左右交度馳馬往來冠絕群伍又曰侯景懷朔人也少而不羈高歡以為將雄勇冠時征伐數有大功景謂高歡曰若假臣三萬人當橫行天下要須縛取蕭衍老翁遣作太平寺主及歡敗於沙苑景謂歡曰宇文泰忸於戰勝今必致殆請以勁騎數千至關中取之歡以告其妃婁氏婁氏曰彼若得泰景亦不歸高歡乃止後歡死景乃以河南十三州降于梁高澄使慕容紹宗圍景於長社景乃走紹宗追之至渦陽景遣使謂紹宗曰欲送客耶將定雌雄耶紹宗曰決戰景乃令將士皆被甲持短刃但低視斫人腦馬足遂敗紹宗軍裨將斛律光尤之紹宗曰吾戰多矣未見此賊爾相持連月景食盡其將景顯等降紹宗眾遂潰景乃與腹心數十騎南走後稍收散卒得馬步八百人晝夜兼行追軍不敢逼遣使謂紹宗曰景若就擒公復何用紹宗乃縱之遂攻壽春下之據其城, WYG: ''}
