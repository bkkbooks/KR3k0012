  - {type: variant, offset: 67, length: 0, content: '', krp: 此父不生此子陳書曰蕭摩訶齊軍戰有西域胡妙於弓矢弦無虚發衆軍尤憚之及將戰明徹謂摩訶曰若殪此胡則彼軍奪氣君有關張之名可斬顔良矣摩訶曰願識其形狀當爲公取之明徹乃召降人有識胡者云胡着絳衣擭皮弓兩端骨弭明徹遣人覘乃知胡在陣仍自酌以飲摩訶摩訶飲訖馳馬衝齊軍胡挺身出陣前十餘歩彀弓未發摩訶遥擲銑鋧立中其額應手而仆齊軍大力十餘人出戰摩訶又斬之又曰周䥫虎事梁河東王察王僧辨擒欲烹之䥫虎曰侯景尚未滅奈何殺壯士耶僧辨竒之後降髙祖又曰蕭摩訶帥齊兵爲㓂髙祖遣安都北拒齊軍於鍾山龍尾及北郊壇安都謂摩訶曰卿驍勇有名千聞不如一見摩訶對曰今日令公見矣隋書曰宇文慶從武帝攻河隂先登攀堞與賊短兵接戰良乆中石廼墜絶而後蘇帝勞之曰卿之餘勇可以賈人也又曰楊玄感驍勇多力毎戰親軍長矛身先士卒喑嗚叱咤所當者莫不震懾論者方之項羽又曰魚俱羅馮翊下邽人也身長八尺膂力絶人聲氣雄壯言聞數百歩又曰權武少果勁勇力絶人能重甲上馬嘗倒投於井未及泉復躍而出其拳捷如此又曰長孫晟突厥之内大畏長孫惣管聞其弓聲謂爲霹靂見其走馬稱爲閃電王笑曰將軍震怒威行域外遂與雷霆爲比一何壯哉唐書曰丘行恭從討王世充㑹戰於邙山之上太宗欲知其虚實強弱乃與數十騎衝之直出其後衆皆披靡莫敢當其鋒所殺傷甚衆旣而限以長堤與諸騎相失唯行恭獨從㝷有勁騎數人追及太宗矢中御馬行恭乃廻騎射之發無不中餘賊不敢復前然後下馬拔箭以其所乗馬進太宗行恭於御馬前歩執長刀巨躍大呼斬數人突陣而出得入大陣貞觀中有詔刻石爲人馬以象行恭拔箭之狀立於昭陵闕前又曰淮陽王道玄拜洛州惣管及府廢改授洛州刺史五年劉黒闥引突厥㓂河北復授山東道行軍惣管師次下博與賊軍遇道玄帥騎先登命副將史萬寳督軍繼進萬寳與之不恊及道玄深入而擁兵不進謂所親曰吾奉手詔言淮陽小兒雖名爲將而軍之進止皆委吾今其輕銳越濘交戰大軍道動必滔泥溺莫如結陣以待之雖不利於王而利於國道玄遂爲賊所禽全軍盡没唯萬寳逃歸道玄遇害年十九太宗追悼乆之嘗從容謂侍臣曰道玄終始從朕見朕深入賊陣所向必尅意嘗企慕所以毎陣先登蓋學朕也惜其年少不遂逺圗因爲之流涕又曰王君廓鎮幽州㑹突厥入㓂君廓邀擊破之俘斬二千餘人獲馬五千疋髙祖大恱徴入朝賜以御馬令於殿庭乗之而出因謂侍臣曰吾聞藺相如叱秦皇目皆出血君廓徃擊竇建德將出戰李勣遏之君廓發憤大呼目及鼻耳一時流血此之壯氣何謝古人不可以常例賞之復賜錦𫀆金帶還鎮幽州又曰劉世讓爲并州惣管統兵屯於鴈門突厥處羅可汙與髙開道苑君璋合衆攻之甚急鴻臚卿鄭元璹先使在蕃可汙合元璹來說之世讓厲聲曰大夫奈何爲夷狄作說客耶經月餘虜乃退及元璹還述丗讓忠勇髙祖下制襃美之又曰李嗣業賊將李歸仁𥘉以銳師數來挑戰我師攅矢而逐之賊軍大至逼我追騎突入我營我師囂亂嗣業謂郭子儀曰今日之事若不以身啖㓂决戰於陣萬死而兾其一生不然則我軍無子遺矣嗣業乃脫衣徒搏執長刀立於陣前大呼當嗣業刀者人馬俱碎殺十數人陣容方駐前軍之士盡執長刀而出如牆而進嗣業先登奮命所向摧靡又曰張濬拜諌議大夫其年冬宰相王鐸至滑臺兼充天下行營都統方徴兵諸侯奏用濬爲都統判官時王敬武𥘉破弘覇郎軍大振累詔徴平盧兵敬武獨不赴援鐸遣濬徃說之敬武巳授僞命復怙強不迎詔使濬至謁見責之曰公爲天子守藩王臣賫詔宣諭而侮慢詔使旣未識君臣禮分復何顔以御軍民哉敬武愕然謝咎旣宣詔軍士按兵黙然濬並召將佐集於鞠塲靣諭之曰人生効忠仗義所兾粗分逆順懸知利害黃巢前日販鹽虜耳公等捨累葉天子而臣販鹽白丁何利害之可論耶今諸侯勤王天下響應公等獨據一州坐觀成敗賊平之後去就何安若能此際排難解紛陳師鞠旅共誅宼盜迎奉鑾輿則冨貴功名指掌可取吾惜公軰捨安而即危也諸將改容引過謂敬武曰諌議之言是也即時出軍從濬入援京師晏子春秋曰昔夏之衰也有推移大戯殷之衰也有費仲惡來足走千里手裂兕虎任之以力凌轢天威專行勇力不顧乎義理是以桀紂以㓕殷夏以衰又曰莊公奮乎勇力不顧於行尚勇力之士無忌於國貴戚不薦善偪邇不引過故晏子見公公曰古者亦有徒以勇力立於丗者乎晏子對曰嬰聞之輕死以行理謂之勇誅暴不避強謂之力故勇力之立也以行理義也今公自奮乎勇力不顧乎行暴尚勇力之士無忌於國身立威疆行流淫暴貴戚不薦善偪邇不引過反聖王之德而脩㓕君之行用此存者嬰未嘗聞有也呉越春秋曰專諸豊邑人伍子胥𥘉去楚如呉時遇之於塗專諸方與人闘其怒有萬人之氣甚不可當其妻一呼即還子胥恠而問其壯何夫子怒之盛聞一女子之聲而即折道寧有說乎專諸曰子視吾之儀寧類愚者耶何言之鄙也夫屈一人之下必申萬人之上子胥因相决之推䫙深目虎口鷹背戾於從難知其勇士也又曰伍子胥見呉王僚王僚望其顔色甚可畏長一丈大十六圍眉間一尺僚與語三日辭無復者賢人也子胥知王好之毎入言語侃侃有勇壯之氣也孔演漢魏春秋曰許禇之爲人長八尺餘大十圍容貌甚雄勇力絶人漢末賊起禇在汝南與少年相聚及宗族數千家共堅壁相保曹公脩兵汝南禇以其衆歸公公見而壯之曰此樊噲也即日拜都尉引入宿衛諸從禇俠客皆爲虎士出入周旋不離左右軍中以禇力如虎癡勇號曰癡虎至今天下稱之皆謂其姓名也呉均齊春秋曰戴僧静㑹稽永興人臨湘侯副大祖在淮隂雅有人鑒見而賞之㑹匈奴卒至僧静應募出戰單力直前虜騎奔退又斬三級時天盛寒乃脫衣口銜三頭以刀揷背拍浮而還臨湘侯大賞之曰殺三人亦可反命矣進之於太祖石頭之役功冠諸將遂至貴顯蕭方等三十國春秋曰符洛雄勇多力猛氣絶人坐制奔牛射洞犁耳符堅深憚之故常爲邊守又曰劉陽少驍猛甚有勇力手曳牛尾却行百歩又曰趙將麻秋命黒槊龍騰三千人馳擊謝艾軍艾左右擾動李偉勸艾乗馬艾不從乃下踞胡牀而麾衆趙人以爲有伏懼而不進韓詩外傳曰衛靈公晝寢而起志氣益衰使人馳召勇士公孫道遭行人卜啇子夏曰何馳之疾也對曰君晝寢而起使我馳召勇士公孫子夏曰微而勇若者可乎御曰可子夏曰戴我而反至君曰延先生上起召公孫俄而至入門拔劔疾呼曰啇不我取若頭子夏顧叱之曰咄内劔吾將與若言勇於是君令内劔而上子夏曰來吾甞與子從君而北見趙簡子趙簡子𬒳髮仗矛而見我君從十三行之後趍而進曰諸侯相見不冝不朝服君不朝服行人卜啇將以頭血濺君之衣矣使反朝服而見吾君者子耶我耶曰子也子夏曰子之勇不若我一矣又與子從君而東至海曹齊君重鞇而坐從十三行之後趍進曰諸侯相見不冝相臨以其一鞇而去之者子耶我耶曰子也子夏曰子之勇不若我二矣又與子從君於囿中於是兩軍逐我君與拔矛格而還之者子耶我耶曰子也子夏曰子之勇不若我三矣所貴爲士者上不攝萬乗下不放乎疋夫外立節矜敵而不侵掠内禁殘害而君不危殆是士之所長而君子之所致貴也若夫以長掩短以衆暴寡凌轢無罪之民而威於閭巷之間者是士之甚毒而君子之所致惡也於是靈公避席曰抑乎寡人雖不敏請從先生勇又曰孔子游於景山之上子路子貢顔回從焉孔子曰君子登髙必賦}
