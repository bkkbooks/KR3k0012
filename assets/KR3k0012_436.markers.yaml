  - {type: variant, offset: 73, length: 2, content: 操刀, SBCK: 百歩又曰趙將麻秋命黒槊龍騰三千人馳擊謝艾軍艾左右擾動李偉勸艾乗馬艾不從乃下踞胡􅇃而麾衆趙人以爲有伏懼而不進韓詩外傳曰衛靈公晝寢而起志氣益衰使人馳召勇士公孫道遭行人卜啇子夏曰何馳之疾也對曰君晝寢而起使我馳召勇士公孫子夏曰微而勇􅀂者可乎御曰可子夏曰戴我而反至君曰延先生}
  - {type: variant, offset: 76, length: 1, content: 岸, SBCK: 起召公孫俄而至入門拔劔疾呼曰啇不我取􅀂頭子夏顧叱之曰咄内劔吾將與􅀂言勇於是君令内劔而上子夏曰來吾甞與子從君而北見趙簡子趙簡子􅀍髮仗矛而見我君從十三行之後趍而進曰諸侯相見不冝不朝服君不朝服行人卜啇將}
