  - {type: variant, offset: 78, length: 1, content: 手, SBCK: 頭血濺君之衣矣使反朝服而見吾君者子耶我耶曰子也子夏曰子之勇不􅀂我一矣又與子從君而}
  - {type: page-break, offset: 78, content: '', id: KR3k0012_SBCK_436-8a}
  - {type: variant, offset: 78, length: 18, content: 手東西指麾若分部兵以羅遮賊狀賊望見以, WYG: 此}
  - {type: variant, offset: 78, length: 22, content: 手東西指麾若分部兵以羅遮賊狀賊望見以為官兵捕, krp: 此爲人必爲天下勇士矣於是廻軍避}
  - {type: variant, offset: 80, length: 7, content: 西指麾若分部兵, SBCK: 至海曹齊君重鞇而坐從十三行之後趍進曰諸侯相見不冝相臨}
