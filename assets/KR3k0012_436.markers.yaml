  - {type: variant, offset: 71, length: 6, content: 堅行操刀上岸, krp: 對曰此螳蜋者也其爲蟲知進而不知退不量力而輕敵莊公曰}
  - {type: variant, offset: 72, length: 0, content: '', SBCK: 壁相保曹公脩兵汝南禇以其衆歸公公見而壯之曰此樊噲也即日拜都尉引入􅀫衛諸從禇俠客皆爲虎士出入周旋不離左右軍中以禇力如虎癡勇號曰癡虎至今天下稱之皆謂其姓名也呉均齊春秋曰戴僧静㑹稽永興人臨湘侯副大祖在淮隂雅有人鑒見而賞之㑹匈奴卒至僧静應募出戰單力直前虜􅀐奔退又斬三級時天盛寒乃脫衣口銜三頭以刀揷背拍浮而還臨湘侯大賞之曰殺三人亦可反命矣進之於太祖石頭之役功冠諸將遂至貴顯蕭方等三十國春秋曰符洛雄勇多力猛氣絶人坐制奔牛射洞犁耳符堅深憚之故常爲邊守又曰劉陽少驍猛甚有勇力手曳牛尾却}
