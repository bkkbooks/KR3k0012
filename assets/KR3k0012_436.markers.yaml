  - {type: variant, offset: 3622, length: 396, content: 餘人相結破獄出武帝郡兵追急康死戰破之隋武帝起兵摧堅陷陣所經材邑次行暴害江南人畏之以其名怖小兒畫其形狀於寺中病瘧者寫其形怙其床壁無不立愈位至蘭陵太守梁書曰王神念少善射騎既老不衰常於高祖前手執二刀楯左右交度馳馬往來冠絕群伍又曰侯景懷朔人也少而不羈高歡以為將雄勇冠時征伐數有大功景謂高歡曰若假臣三萬人當橫行天下要須縛取蕭衍老翁遣作太平寺主及歡敗於沙苑景謂歡曰宇文泰忸於戰勝今必致殆請以勁騎數千至關中取之歡以告其妃婁氏婁氏曰彼若得泰景亦不歸高歡乃止後歡死景乃以河南十三州降于梁高澄使慕容紹宗圍景於長社景乃走紹宗追之至渦陽景遣使謂紹宗曰欲送客耶將定雌雄耶紹宗曰決戰景乃令將士皆被甲持短刃但低視斫人腦馬足遂敗紹宗軍裨將斛律光尤之紹宗曰吾戰多矣未見此賊爾相持連月景食盡其將景顯等降紹宗眾遂潰景乃與腹心數十騎南走後稍收散卒得馬步八百人晝夜兼行追軍不敢逼遣使謂紹宗曰景若就擒公復何用紹宗乃縱之遂攻壽春下之據其城, SBCK: 六}
