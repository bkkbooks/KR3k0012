  - {type: variant, offset: 88, length: 7, content: 羅遮賊狀賊望見, SBCK: 其一鞇而去之者子耶我耶曰子也子夏曰子之勇不􅀂我二矣又與子從君於囿中於是兩軍逐我君與拔矛格而還之者子耶我耶曰子也子夏曰子之勇不􅀂我三矣所貴爲士者上不攝萬乗下不放乎疋夫外立節矜敵而不侵掠内禁殘害而君不危殆是士之所長而君子之所致貴也􅀂夫}
