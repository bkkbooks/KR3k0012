  - {type: variant, offset: 1348, length: 342, content: 公欲眾整齊今遵奉法不避是教命行也上乃貰之以為剌奸將軍謂諸將曰當備祭遵吾舍中兒犯命尚殺之必不私諸卿也又曰鄭眾字仲師建武中太子及山陽王因虎賁將梁松請眾欲為通籍遺縑帛眾悉不受謂松曰太子儲君無外交義漢有舊防諸王不宜通客松諷以長者難逆不可不慮眾曰犯禁觸罪不如守正而死又曰吳良字太儀齊國臨淄人以清白方正稱於鄉里為郡議曹掾正旦掾入賀太守門下掾王望前言曰齊郡敗亂遭離盜賊人民飢餓不聞雞鳴狗吠之音明府視事五年土地開闢盜賊滅息五穀豊熟家給人足今日歲首誠上雅壽掾皆稱萬歲良跪曰門下掾佞謟明府無受其觴盜賊未弭人民困乏不能家給人足於今議曹掾尚無袴寧為家給人足耶太守曰此生言是遂不舉觴賜鰒魚百枚宴罷教署功曹良恥以言受官不拜又曰申屠剛字巨卿扶風人性剛直忠正志節抗厲常慕史鰌汲黯之為人涉獵書記果於行義元始中舉賢良對策, SBCK: ''}
