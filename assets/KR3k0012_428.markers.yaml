  - {type: variant, offset: 2027, length: 2, content: 為侍, SBCK: 以出正閨肘跪擊馬而反之曰非吾君也公慙而不朝晏子曰臣聞下無直辝上有墮君民多矯行今君有失行而刖跪直禁是君之福也於是令刖跪倍資又曰景公見梁丘據公曰與我和晏子曰此同也和者君甘則臣酸君淡則臣醎今據也君甘則甘所謂同也安得爲和尸子曰范献子遊河大夫皆在君曰孰知欒氏之子大夫莫荅舟人清㳙捨揖荅曰君奚問欒氏之子君曰自吾亡欒氏也其老者未死少者壯矣清㳙曰善脩晉國之政内得大夫外不失百姓雖栾氏子其􅀂君何􅀂不脩晉國之政内不得大夫而外失百姓則舟}
  - {type: page-break, offset: 2027, content: '', id: KR3k0012_SBCK_428-6a}
  - {type: variant, offset: 2027, length: 0, content: '', WYG: 以出正閨刖跪繫馬而反之曰非吾君也公慚而不朝晏子曰臣聞下無直辭上有墮君民多矯行今君有失而刖跪直禁是君之福也於是令刖跪陪資又曰景公見梁邱㨿公曰與我和晏子曰此同也和者君甘則臣酸君淡則臣鹹今據也君甘則甘所謂同也安得}
  - {type: page-break, offset: 2027, content: '', id: KR3k0012_WYG_428-9b, image: WYG0896/WYG0896-0731d.png}
  - {type: variant, offset: 2027, length: 2, content: 為侍, krp: 以出正閨肘跪擊馬而反之曰非吾君也公慙而不朝晏子曰臣聞下無直辝上有墮君民多矯行今君有失行而刖跪直禁是君之福也於是令刖跪倍資又曰景公見梁丘據公曰與我和晏子曰此同也和者君甘則臣酸君淡則臣醎今據也君甘則甘所謂同也安得爲和尸子曰范献子遊河大夫皆在君曰孰知欒氏之子大夫莫荅舟人清㳙捨揖荅曰君奚問欒氏之子君曰自吾亡欒氏也其老者未死少者壯矣清㳙曰善脩晉國之政内得大夫外不失百姓雖栾氏子其若君何若不脩晉國之政内不得大夫而外失百姓則舟}
  - {type: variant, offset: 2028, length: 1, content: 侍, WYG: 和尹子曰范獻子逰河大夫皆在君曰孰知欒氏之子大夫莫答舟人清涓捨楫答曰君奚問欒氏之子曰吾不忘欒氏也其老者未死少者壯矣清涓曰善修晉國之政内得大夫外不失百姓雖欒氏子其若君何若不修晉國之政内不得大夫而外失百姓則舟}
  - {type: punctuation, offset: 2030, content: 。, id: KR3k0012_CHANT_428-bkkpn619}
  - {type: 'tls:seg', offset: 2030, content: '', id: KR3k0012_CHANT_428-22a.7}
  - {type: variant, offset: 2030, length: 0, content: '', SBCK: 之人皆栾氏子也君曰善呂氏春秋曰熊意見齊宣王曰寡人聞子好直有之乎對曰意何能直意聞好直之士家不處乱國身不見汗君今意身得見君而家託乎齊意何能直夫賢主所以貴士者以其能直言也言直則枉者見人主欲聞枉而惡直是鄣水源而欲其流也􅀃苑曰魏武侯浮西河而下中流謂呉起曰美哉山河之固此魏之寳也對曰在德不在險昔三苗氏左洞庭而右彭蠡德義不脩而禹滅之夏桀之居左河濟而右太華伊闕在南羊膓在北脩政不仁而湯放之殷紂之國左孟門而右太行常山在其北大河經其南脩政不德而武王伐之由此觀之在德不在險􅀂君不脩德舡中之人盡敵國也武侯曰善又曰􅁗始皇旣有}
  - {type: page-break, offset: 2030, content: '', id: KR3k0012_SBCK_428-6b}
  - {type: variant, offset: 2030, length: 0, content: '', WYG: 之人皆欒氏子也君曰善吕氏春秋曰熊意見齊王宣曰寡人聞子好直有之乎對曰意何能直意聞好直之士家不處亂國身不見汙君今意身得見君而家託乎齊意何能直夫賢主所以貴士者以其能直言也言直則枉者見人主欲聞枉而惡直是障水源而欲其流也説苑曰魏武侯浮西河而下中流謂吴起曰美哉山河之固此魏之寶也對曰在德不在險昔三苗氏左洞庭而右彭蠡德義不修而禹滅之夏桀之㞐左河濟而右太華伊闕在南羊腸在北彼敢不仁而湯放之殷紂之國左孟門而右太行常山在其北大河經其南修政不德而武王伐之由此觀之在德不在險若君不修德舟中之人盡敵國也武侯曰善又曰秦始皇既有}
