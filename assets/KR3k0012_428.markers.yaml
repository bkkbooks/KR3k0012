  - {type: variant, offset: 1194, length: 1, content: 訴, SBCK: 豈是令臣曲筆也其執意如此又曰于烈丗宗􅀄咸陽王禧當權遣家奴傳信於烈曰湏舊羽林虎賁執仗出入烈曰天子諒闇事歸宰輔領軍典掌􅀫衛有詔不敢違理無私給奴惘然而返以報禧禧遣謂烈曰我號天子兒天子叔元輔之命與詔何異烈厲色曰其􅀂是詔應遣官人何由遣私奴索官家羽林烈頭可得羽林不可得禧惡其剛直}
