  - {type: variant, offset: 3462, length: 0, content: '', SBCK: 受禍不乆矣兾更㑹議立蠡吾侯子唯固與杜喬深據本議桓帝立固與杜喬以夲立䔉下獄太后詔出固兾乃復令黃門常侍作飛章虚奏収固等繫獄皆死京師諺曰直如絃死道邊曲如鈎反封侯孔融別傳曰􅀽術僣亂曹操託楊彪與術婚姻誣以欲圖廢置奏収下獄劾以大逆融聞之不及朝服徃見操曰楊公四丗清德海内所瞻周書父子兄弟罪不相及况以􅀽氏歸罪易稱積善餘慶徒欺人耳操曰此國家之意融曰假使成王殺邵公周公可得言不知􅁘纓綏搢紳所以瞻仰明公者以公聦明仁智輔相漢朝舉直措枉致之雍熈今横殺無辜則海内觀聽莫不解躰孔融魯國男子便當拂衣而去操不得巳遂理出彪樊英別傳曰順帝䇿書備禮􅀇纁徴英詔切郡縣駕載上道英不得巳到京師稱疾不肯赴乃強輿入殿猶不以禮屈帝怒曰朕能生君能殺君能貴君能賤君能冨君能貧君君何慢朕英曰臣受命於天生盡其命天也死得其命亦天也陛下焉能殺臣臣見􅁀君如見仇讎立朝猶不肯可得貴乎雖在布衣列環堵之中晏然自得不易萬乗之尊又何得而賤乎陛下焉能賤臣臣非禮之禄萬鍾不受也申其志雖簞食不厭也陛下焉能冨臣焉能貧臣帝不能屈而敬其名使出就太醫養疾日置羊酒語林曰晉王敦與丗儒議下都丗儒以朝廷無亂且唱兵始自古所難諌諍甚苦處冲變色曰吾過􅀩恩遇受任南}
