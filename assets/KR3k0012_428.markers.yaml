  - {type: variant, offset: 662, length: 496, content: 通小臣戲殿上大不敬當斬通頓首首盡出血上使持節召通而謝丞相又曰單于嘗為書謾呂太后太后怒召諸將議討之上將軍樊噲曰臣願得十萬眾橫行匈奴中諸將皆阿太后以噲言為然季布曰樊噲可斬夫以高帝四十餘萬困於平城噲時亦在其中今噲奈何以十萬眾橫行匈奴中又曰諸葛豊字少康琅耶人以明經為郡文學特立剛直貢禹為御史大夫除豊為屬舉侍御史元帝擢為司隸校尉剌舉無所避京師為之語曰間何闊逢諸葛上嘉其節加豊秩光祿大夫時侍中許章以外屬貴幸奢淫不奉法度賓客犯事與章相連案劫章欲奏其事適逢許侍中私出豊駐車舉節欲收之章窘馳去豊追之許侍中因得入宮門自歸上豊亦上奏事於是收豊節司隸校尉去節自豊始也又曰安昌侯張禹以帝師位至特進甚尊重朱雲上書求見公卿在前雲曰今朝廷臣上不能匡主下無以益民皆尸位素飡臣願賜尚方斬馬劍斷佞臣一人頭以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上廷辱師傅罪不赦御史將雲下雲攀殿檻檻折雲呼曰臣得下從龍逢比干遊地下足矣未知聖朝何如耳於是左將軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直於世使其言是不可誅其言非固當容之上意然後已及後當治殿檻上曰勿易因而葺之以旌直言之臣東觀漢記曰戴憑為侍中數進見問得失上謂憑曰侍中當匡輔國政勿有隱情憑, WYG: 充}
