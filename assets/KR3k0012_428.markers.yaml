  - {type: variant, offset: 2968, length: 278, content: 聽時扶風馬融為冀章祐因謂融曰李公之罪成於卿手李公即誅卿何面目見天下人乎冀起入祐亦徑去又曰李充遷侍中大將軍鄧騭貴戚傾時以充高節卑敬之嘗置酒請充賓客滿坐酒酣騭跪曰幸託椒房位列上將幕府初開欲辟天下奇偉以匡不逮唯諸君博求其器充乃為陳海內隱居懷道之士頗有不合騭欲絕其語以肉啖之充抵肉於地曰說士猶甘於肉遂出徑去又曰崔琦數引古今成敗戒梁冀琦以言不從失意復作白鵠賦以為諷梁冀見之呼琦問百官內外各有司存天下云云豈獨吾人之尤琦對曰將軍累世台輔任齊伊尹而德政未聞元元荼炭不能納貞良以救禍敗乃復欲鉗塞士口杜蔽主聽將玄黃改色馬鹿易形乎冀無以對又曰許敬字鴻卿汝南平輿人也有吏誣君者會於, WYG: 煩温}
