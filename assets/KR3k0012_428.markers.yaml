  - {type: variant, offset: 1218, length: 0, content: '', SBCK: 來曰奉辝帝曰卿言太子何如人也運曰中人時齊王憲等並在帝側帝顧之謂曰百官佞我皆云太子聦明唯運獨云中人方驗之忠直因問中人之狀運曰班固比齊桓爲中人管仲相之則覇竪貂輔之則乱可與爲善可爲與惡帝曰我知之矣超拜運爲京兆郡丞呉均齊春秋曰王僧䖍性甚方直逺近望之咸曰如水鏡也唐書曰􅂫丗長髙祖待之意甚厚髙祖謂曰卿自謂謟佞􅁘正直􅁘對曰臣實愚直髙祖曰卿􅀂直何爲背丗充而歸我對曰洛陽旣平天下爲一臣智窮力屈始歸陛下向使丗充尚在臣據漢南天意雖有所歸人事足爲勍敵髙祖大􅀏甞又嘲之曰名長意短口正心邪弃忠貞於鄭國忘信義於吾家丗長對曰名長意短實如聖旨口正心邪未敢奉詔又曰桓彦範爲大理凡所奏議􅀂逢人主詰責則辝色}
  - {type: page-break, offset: 1218, content: '', id: KR3k0012_SBCK_428-5a}
  - {type: variant, offset: 1218, length: 0, content: '', WYG: 来日奉辭帝曰卿言太子何如人也運曰中人時齊王憲等並在帝側帝顧之謂曰百官佞我皆云太子聰明唯運獨云中人方驗其忠直因問中人之狀運曰班固比齊桓為中人管仲相之則伯竪貂輔之則亂可與為善可與為惡帝曰我知之矣超拜運為京兆郡丞吴均齊春秋曰王僧䖍性甚方直逺近望之咸曰如水鏡也唐書曰蘇世長髙祖待之意甚厚髙祖謂曰卿自謂諂佞耶正直耶對曰臣實愚直髙祖曰卿若直何為背世充而歸我對曰洛陽既平天下為一臣智窮力屈始歸陛下向使世充尚在臣據漢南天意雖有所歸人事足為勍敵髙祖太笑嘗又嘲之曰名長意短口正心邪棄忠貞於鄭國忘信義於吾家世長對曰名長意短實如聖㫖口正心邪未敢奉詔又曰桓彦範為大理凡所奏議若逢人主詰貴則辭色}
