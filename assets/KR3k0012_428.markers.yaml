  - {type: variant, offset: 2545, length: 223, content: 臣等以荊屬託母弟陛下留聖心加惻隱故請耳如令陛下子臣等專誅而己帝歎息良久鯈益以此知名又曰張綱字文紀皓之子也漢安元年選八使徇風俗皆耆儒知名多歷顯位唯綱年少官次最微餘人受命之部而綱埋其車輪於洛陽都亭曰豺狼當路安問狐貍遂奏曰大將軍梁冀河南尹不疑蒙外戚之援荷國厚恩以芻蕘之姿居阿衡之任不能敷楊五教翼贊日月而專為封豕長虵肆其貪饕誠天威所不赦大辟所宜加書奏而京師震悚又曰奚延字秀平陳留外黃人桓帝時徵博士太尉楊秉舉賢良方正再遷為侍中帝遊上林苑從容問曰朕何如主也延, SBCK: ''}
