  - {type: variant, offset: 1164, length: 0, content: '', WYG: 王彬字世儒從兄敦入石頭中宗使彬銜命慰勞㑹周顗被殺彬往哭顗既而見敦敦怪其有涕洟問其所以彬曰向哭伯仁情不能已敦曰伯仁自致刑戮且凡人遇汝復何為哉彬曰伯仁世譽與君齊行忠烈之軌邈焉難逮其有何罪而致禍戮勃然數敦曰兄抗旌内侮戮殺忠義謀圖不軌禍必及門敦大怒厲聲曰爾之狂悖乃可至此為吾不能殺汝耶丞相導在坐勸彬起謝彬曰昨暴脚痛不能拜且此復何所謝意氣自若敦曰脚痛孰若頸痛然卒以至親不忍加害檀道鑾續晉陽秋曰初淮陵内史虞珧子妻裴以尺牘辯利兼服食絶穀常衣黄衣狀若學道司馬道子常延致之甚悦其才每與百官飲宴裴亦預焉悉令與賔客談衆人皆為降節王恭訴曰恭聞男女之别國之大節未聞宰相之坐有失行婦人舉坐竦然道子為慙崔鴻十六國春秋後趙録曰張進元城屠各人也為刺奸外部都督糾舉不避豪右軍中憚之號曰張霹靂又前凉録曰汜禕字休臧燉煌人為福禄令剛直不事上府酒泉太守馬漢遣督郵張休祖劾禕休祖曰君不聞寧逢三千頭虎不逢張休祖乎禕怒以印繫肘而就縛縛訖發印以告事聞休祖坐不解印擅縛令長以大不敬論禕遷居延令又前秦録曰王墮字安生京兆霸城人也博學有雄才性剛愎疾惡雅好直言疾董榮如仇讎毎朝見之畧不與言人謂之曰董尚書貴幸一時公宜降意墮曰何鷄狗而令國士與之言乎榮聞而慙恨故説苻生誅之及刑榮謂墮曰君今復敢不數董龍作鷄狗乎墮瞋目而叱之龍榮之小字也後魏書曰尉聿字成興性耿介肅宗時為武衛將軍領軍元义秉權百寮莫不致敬聿獨長揖不拜出為凉州刺史凉州緋色天下之最义送白綾二千疋令聿染之聿拒而不許又曰古弼代人也少忠謹善騎射初為獵郎使長安稱㫖轉門下奏事以敏正著稱太宗嘉之賜名曰筆取其直而有用後改名弼言其有輔佐才也上谷民上書言苑囿過度民無田業宜减大半以賜貧者弼覽而善之入欲陳奏遇世祖與給事中劉樹棊志不聽事弼侍坐良久不獲申聞乃起於世祖前捽樹頭掣下床以手搏其耳以拳毆其背曰朝廷不治寔爾之罪世祖失容放棊曰不聽奏事實在}
