  - {type: variant, offset: 38, length: 0, content: '', SBCK: 舅荀顗召之垂涕而入太祖謂曰玄伯何以處我對曰誅賈充以謝天下太祖曰不可爲更思其次泰曰但見其進不知其次太祖乃不復問郭粲晉紀曰􅀄王敦將下朝士共議周顗以爲敦剛愎不仁親害乎子必能稱兵以向朝廷敦旣尅石頭顗與戴淵共詣敦謂顗曰伯仁卿􅀒我顗荅曰公戎車内侮下官親帥六軍不能其事使王旅敗績以此􅀒公又問淵吾此舉}
