  - {type: variant, offset: 1164, length: 0, content: '', SBCK: 王彬字丗儒從兄敦入石頭中宗使彬衘命慰勞㑹周顗􅀍殺彬徃哭顗旣而見敦敦恠其有涕洟問其所以彬曰向􅂘伯仁情不能巳敦曰伯仁自致刑戮且凡人遇汝復何爲哉彬曰伯仁丗譽與君齊行忠烈之􅁤邈焉難逮其有何罪而致禍戮勃然數敦曰兄抗旌内侮戮殺忠義謀圖不􅁤禍及門户敦大怒厲声曰尓之狂悖乃可至此爲吾不能殺汝􅁘丞相導在坐勸彬起謝彬曰昨􅁀脚痛不能拜且此復何所謝意氣自􅀂敦曰脚痛孰􅀂頸痛然猶以至親忍不加害檀道鵉續晉陽秋曰􅀄淮陵内史虞珧子妻裴以尺牘辯利兼服食絶谷常衣黄衣狀􅀂學道司馬道子常延致甚恱其才毎與百官飲宴裴亦預焉悉令與賔客談衆人皆爲降節王恭辝曰恭聞男女之別國之大節未聞宰相之坐有失行婦人一坐竦然道子爲慙崔鴻十六國春秋後趙録曰張進元城屠各人也爲刺姧外部都督糺舉不避豪右軍中憚之號曰張霹􅆮又前凉録曰汜禕字休臧燉煌人爲福禄令剛直不事上府酒泉太守馬漢遣督郵張休祖劾禕休祖曰君不聞寧逢三千頭虎不逢張休祖乎禕怒以印擊肘出而就縛縛訖發印以告從事聞休祖坐不解印擅􅅞令長以大不敬論禕迁居延令又前􅁗録曰王墮字安生京兆覇城人也􅀶學有雄才性剛愎疾惡雅好直言疾董榮如仇讎毎朝見之略不與言人謂之曰董尚書貴幸一時公冝降意墮曰何雞狗而令國士與之言乎榮聞而慙恨故􅀃符生誅之及刑榮謂墮曰君今復敢不數董龍作雞狗乎墮瞋目而叱之龍榮之小字也後魏書曰尉聿字成興性耿介肅宗時爲武衛將軍領軍元乂秉權百寮莫不致敬聿獨長揖不拜出爲凉州刺史凉州緋色天下之最又送白綾二千疋令聿染之聿拒而不許又曰古弼代人也少忠謹善􅀐射􅀄爲獵郎使長安稱旨轉門下奏事以敏正著稱太宗嘉之賜名曰筆取其直而有用後改名弼言其有輔佐才也上谷民上書言苑囿過度民無田業冝減太半以賜貧者弼覽而善之入欲陳奏遇丗祖與給事中劉樹棊志不聽事弼侍坐良乆不􅀗申聞乃起於丗祖前捽樹頭掣下床以手搏其耳以拳歐其背曰朝廷不治寔尓之罪丗祖失容曰於棊不聽奏事實在}
