  - {type: variant, offset: 142, length: 1016, content: 事具刑法門論語為政曰哀公問何為則民服孔子對曰舉直措諸枉則民服舉枉措諸直則民不服措猶投也諸之也言投之於上位也又曰葉公曰吾黨有直躬者其父攘羊而子證之攘盜也我鄉黨有直人名躬父盜羊則證其罪孔子曰吾黨之直者異於是父為子隱子為父隱直在其中矣又衛靈公曰直哉史魚邦有道如矢邦無道如矢史魚衛大夫名鰌君有道無道行常如矢直不曲也又微子曰柳下惠為士師三黜柳下惠魯大夫展禽食菜柳下謚曰惠士師嶽官名黜貶退也人曰子未可以去乎曰直道而事人焉往而不三黜枉道而事人何必去父母之邦漢書曰周昌為人強力敢直言自蕭曹等皆卑下之昌嘗入奏事高帝方擁戚姬昌退走高帝退還騎昌項問曰我何如主昌仰曰陛下即桀紂之主也於是上笑之然尤憚昌及高帝欲廢太子而立戚姬子如意為太子群臣固爭莫能得而昌廷爭之上問其說昌為人口吃又盛怒曰臣雖口不能言然臣知其不可陛下欲廢太子臣期期不奉詔上欣然而笑即罷呂后側耳於東廂聽見昌為跪謝曰微君太子幾廢矣又曰申屠嘉為人廉直門不受私謁是時太中大夫鄧通方愛幸文帝嘗讌飲通家時嘉入朝而通居上旁有怠慢之禮嘉奏事畢因言陛下幸愛群臣則貴富之至於朝廷之禮不可不肅上曰君勿言吾私之罷朝嘉為檄召鄧通詣丞相府不來且斬通恐入言上上曰汝第往吾今使人召若通至詣丞相府免冠徒跣頓首謝嘉責曰朝廷者高皇帝之朝廷也通小臣戲殿上大不敬當斬通頓首首盡出血上使持節召通而謝丞相又曰單于嘗為書謾呂太后太后怒召諸將議討之上將軍樊噲曰臣願得十萬眾橫行匈奴中諸將皆阿太后以噲言為然季布曰樊噲可斬夫以高帝四十餘萬困於平城噲時亦在其中今噲奈何以十萬眾橫行匈奴中又曰諸葛豊字少康琅耶人以明經為郡文學特立剛直貢禹為御史大夫除豊為屬舉侍御史元帝擢為司隸校尉剌舉無所避京師為之語曰間何闊逢諸葛上嘉其節加豊秩光祿大夫時侍中許章以外屬貴幸奢淫不奉法度賓客犯事與章相連案劫章欲奏其事適逢許侍中私出豊駐車舉節欲收之章窘馳去豊追之許侍中因得入宮門自歸上豊亦上奏事於是收豊節司隸校尉去節自豊始也又曰安昌侯張禹以帝師位至特進甚尊重朱雲上書求見公卿在前雲曰今朝廷臣上不能匡主下無以益民皆尸位素飡臣願賜尚方斬馬劍斷佞臣一人頭以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上廷辱師傅罪不赦御史將雲下雲攀殿檻檻折雲呼曰臣得下從龍逢比干遊地下足矣未知聖朝何如耳於是左將軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直於世使其言是不可誅其言非固當容之上意然後已及後當治殿檻上曰勿易因而葺之以旌直言之臣東觀漢記曰戴憑為侍中數進見問得失上謂憑曰侍中當匡輔國政勿有隱情憑, SBCK: 充}
