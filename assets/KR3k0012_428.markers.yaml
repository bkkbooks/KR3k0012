  - {type: page-break, offset: 2771, content: '', id: KR3k0012_SBCK_428-7a}
  - {type: variant, offset: 2772, length: 2, content: 為漢, SBCK: 築臺于雲宫殿五里建千石之鍾立萬石之􅒶婦女連百倡優累千興作麗山宫室至雍相繼不絶所以自奉者殫天下竭民力陛下所謂自營僅存之主耳何暇比徳於五帝欲官天下哉􅁗皇帝闇然無以應靣有慙色新序曰齊景公遊於牛山之上而北望齊曰美哉國乎使古無死者則寡人將去斯如之何乃泣沾􅁭髙子曰然賴君之賜􅂼食惡肉可得而食也駑馬棧車可得而乗也且不欲死而况吾君乎俯而垂泣晏子拊手而􅀏曰樂哉今日嬰之遊也見怯君一而䛕臣二使古之無死者則太公丁公至今猶存吾君方將􅀍蓑笠而立乎畎畒之}
  - {type: variant, offset: 2772, length: 0, content: '', WYG: 築臺於營宫殿五里建千石之鐘立萬石之簴婦人連百倡優累於興作驪山宫室至雍相繼不絶所以自奉者殫天下竭民力陛下所謂自營僅存之主耳何暇比德於五帝欲官天下哉秦皇帝黙然無以應面有慙色新序曰齊景公遊於牛山之上而北望齊曰美哉國乎使古無死者則寡人將去斯如之何乃泣沾襟髙子曰然類君之賜蔬食惡肉可得而食也駑馬棧車可得而乘也且不欲死而况吾君乎俯而垂泣晏子拊手而笑曰樂哉今日嬰之遊也見怯欲一而諛臣二使古之無死者則太公丁公至今猶存吾君方}
  - {type: page-break, offset: 2772, content: '', id: KR3k0012_WYG_428-11b, image: WYG0896/WYG0896-0732d.png}
  - {type: variant, offset: 2772, length: 2, content: 為漢, krp: 築臺于雲宫殿五里建千石之鍾立萬石之􅒶婦女連百倡優累千興作麗山宫室至雍相繼不絶所以自奉者殫天下竭民力陛下所謂自營僅存之主耳何暇比徳於五帝欲官天下哉秦皇帝闇然無以應靣有慙色新序曰齊景公遊於牛山之上而北望齊曰美哉國乎使古無死者則寡人將去斯如之何乃泣沾襟髙子曰然賴君之賜𬞞食惡肉可得而食也駑馬棧車可得而乗也且不欲死而况吾君乎俯而垂泣晏子拊手而笑曰樂哉今日嬰之遊也見怯君一而䛕臣二使古之無死者則太公丁公至今猶存吾君方將𬒳蓑笠而立乎畎畒之}
  - {type: variant, offset: 2773, length: 1, content: 漢, WYG: 被簑笠而立乎畎畆之}
  - {type: variant, offset: 2775, length: 2, content: 主帝, SBCK: 唯事之恒何暇念死乎景公慙焉又曰晉平公間居師曠侍坐平公曰子生無目子之黙黙也師曠對曰天下有五黙黙而臣不得預一焉平公曰何謂也師曠曰群臣行賂以採名譽百姓侵􅁈無所告愬而君不悟此一默黙也忠臣不用用臣不忠下才處髙不肖處賢而君不悟此二黙黙也姦臣欺詐空虚府庫以其少才覆塞其惡賢人逐邪臣貴而君不悟此三黙黙也國貧民罷上下不和而好財用兵􅄝欲無厭謟䛕在傍而君不悟此四黙黙也至道不明法令不行吏民不正百姓不安而君不悟此五黙黙也國有五黙黙而不危者未之有也臣之黙黙何害乎國家哉又曰周舎立趙簡子門三日三夜簡子使問之曰夫子將何以敎寡人對曰願爲君諤諤之臣墨筆操牘隨君之後伺君過而書之簡子恱之又曰魏文侯與士大夫坐問曰寡人如何君也群臣皆曰君仁君也至任座曰君非仁君也曰子何以言之對曰君伐中山不以封君之弟而封君之子是以知君非仁君也文侯怒逐任座次到翟璜對曰君仁君也}
