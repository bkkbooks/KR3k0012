  - {type: variant, offset: 1201, length: 0, content: '', SBCK: 下我無憂於上又曰録尚書髙陽王雍欲以令史朱暉爲廷尉評頻煩託吏部尚書元順順不爲用雍遂下命用之順投之於地雍聞大怒昧爽坐都㕔召順曰身天子之子天子之弟四海之内親尊莫二元順何人以身成命投弃於地順徐謂雍曰髙祖迁宅中土創定九流官方清濁軌儀萬古而朱暉小子身爲省吏何合爲廷尉清官殿下旣先皇同氣冝遵成旨自有短垣而復踰之也周書曰王羆字熊覇陵人也質直木強處物平當州閭敬憚焉三國典略曰􅀄周萬年縣令樂運抑挫豪右時稱強直帝甚嘉之特許通籍事有不便咸令奏聞至}
