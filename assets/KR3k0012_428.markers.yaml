  - {type: variant, offset: 2074, length: 369, content: 有今天下以陛下准桓帝猶謂堯舜比德者也上不悅其言謂曰奇所謂楊震子孫有強項遺風想死後又當致大鳥也袁山松後漢書曰李膺等下獄獄吏曰諸入獄當祭皋繇以祈福范滂曰皋繇古之賢臣知滂無罪將理之於天如其有罪祭之何益及訊獄王甫以次詰之滂年少在後越次而前甫曰夫合黨連群必有盟誓其所謀圖皆何等耶滂曰竊聞仲尼之言見善如不及見惡如探湯欲使善善齊其情惡惡同其行謂王政之所思不悟反以為黨乃仰天歎曰古之脩善自求多福今之脩善乃陷大戮死之日願賜一幡埋於首陽山側上不負皇天下不愧夷齊尚書霍諝以黨事無驗表陳赦之范曄後漢書曰高獲字敬公南陽人與世祖有素舊師事司徒歐陽歙歙下獄當斷獲冠鐵冠帶鈇鑕詣闕請歙帝雖不赦而引見之謂曰敬公朕用子為吏宜改常性獲對曰臣受性於天地父母不可改之於陛下出便辭去三公爭辟不應又曰任延字長孫南陽人為武威太守帝戒之曰善事上官無失於和延對曰臣聞忠臣不和和臣不忠上下雷同, SBCK: 禪}
