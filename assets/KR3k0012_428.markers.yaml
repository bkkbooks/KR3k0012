  - {type: variant, offset: 31, length: 2, content: 夫乾, SBCK: 􅀄武帝知太子闇弱後必亂國然不能擇才遣荀朂及和嶠重徃觀之勗還盛稱太子德更進茂不同西宫之時嶠曰臣以爲太子如故不見更勝此自陛下家事非臣所盡知於是天下貴嶠而賤勗于寳晉紀曰髙貴郷公薨太祖㑹朝臣而謀}
  - {type: variant, offset: 31, length: 358, content: 夫乾其靜也專其動也直是以廣生焉尚書皋陶謨曰直而溫又洪範曰無反無側王道正直又曰三德一曰正直毛詩羔裘曰彼其之子邦之司直又小明曰靖共爾位好是正直神之聽之介爾景福左傳襄元曰恤民為德正直為正正曲為直參和為仁又昭四仲尼曰叔向古之遺直也事具刑法門論語為政曰哀公問何為則民服孔子對曰舉直措諸枉則民服舉枉措諸直則民不服措猶投也諸之也言投之於上位也又曰葉公曰吾黨有直躬者其父攘羊而子證之攘盜也我鄉黨有直人名躬父盜羊則證其罪孔子曰吾黨之直者異於是父為子隱子為父隱直在其中矣又衛靈公曰直哉史魚邦有道如矢邦無道如矢史魚衛大夫名鰌君有道無道行常如矢直不曲也又微子曰柳下惠為士師三黜柳下惠魯大夫展禽食菜柳下謚曰惠士師嶽官名黜貶退也人曰子未可以去乎曰直道而事人焉往而不三黜枉道而事人何必去父母之邦漢書曰周昌為人強力敢直言自蕭曹等皆卑下之昌嘗入奏事高, WYG: 初武}
  - {type: variant, offset: 31, length: 2, content: 夫乾, krp: 𥘉武帝知太子闇弱後必亂國然不能擇才遣荀朂及和嶠重徃觀之勗還盛稱太子德更進茂不同西宫之時嶠曰臣以爲太子如故不見更勝此自陛下家事非臣所盡知於是天下貴嶠而賤勗于寳晉紀曰髙貴郷公薨太祖㑹朝臣而謀}
  - {type: variant, offset: 34, length: 3, content: 靜也專, SBCK: 日太常陳泰不至使}
