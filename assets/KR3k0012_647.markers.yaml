  - {type: variant, offset: 2493, length: 298, content: 充舉兵與丞相劉屈釐戰太子敗走自殺明年屈氂復坐祝詛腰斬妻子梟首續漢書曰張濟為河南令中常侍段珪奴乘犢車于道濟即收捕梟首懸尸珪門也後魏書曰宋鴻貴為定州平北府參軍送戍兵於荊州坐取兵絹四百疋兵欲告之乃斬兵十人又踈凡不達律令見律有梟首之非乃生斷兵手以水洗然後斬決尋坐伏法時人哀兵之苦嘆鴻貴之愚也廷尉決事曰河內太守上民張太有狂病病發殺母弟應梟首遇赦議不當除之梟首如故棄市禮曰刑人於市與眾棄之史記秦皇平六國制天下藏詩書及偶語棄市漢書曰中元二年改磔曰棄市應劭曰先諸死刑皆死之市令改曰棄市自非妖道不復磔也又曰竇嬰矯先帝詔當棄市嬰陽病痱不食欲死或聞上無意殺嬰復食治病晉書曰范堅遷尚書右丞時廷尉奏殿中吏劭廣盜官慢二張合布, SBCK: 夷}
