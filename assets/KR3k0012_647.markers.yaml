  - {type: variant, offset: 812, length: 270, content: 禁曰諸君不知公常令先圍而後降者不赦夫奉法行令事上之節也狶雖舊交禁可失節乎自臨與狶訣霣涕而斬之郡中震慄無求不獲又曰夏侯玄雅量弘濟臨斬東市顏色不變舉動自若又曰鄧艾父子既囚鍾會至成都先送艾然後作亂會已死本營將士追艾檻車迎還衛瓘遣田續等計艾遇於綿竹西斬之蜀志曰魏延夢頭上生角以問占夢趙直直詐延曰夫麟有角而不用此不戰而賊欲自破之象也退而告人曰角之為字刀下用也頭上用刀其凶甚矣後為馬岱所斬又曰劉璋勑關戍諸將文書勿復通先主先主大怒召璋白水軍督陽琛責以無禮斬之又曰張松書與先主及法正曰今日大事垂可立功如何釋此去乎松兄廣漢太守肅懼禍退以白璋發其謀於是璋收斬松, SBCK: 王隱}
