  - {type: variant, offset: 3253, length: 249, content: 曰董卓國之大賊幾傾漢室君為王臣所宜同忿而懷其私遇以忘大節今天誅有罪而反相傷痛豈不與為逆哉即收付廷尉考竟其罪邕陳辭謝乞黔首刖足繼成漢史士大夫多矜救之不能得太尉馬日磾馳往謂允曰伯喈曠世逸才多識漢事當續成史為一代典且忠孝素著而所坐無名之誅無乃失名望乎允曰昔武帝不殺司馬遷使作謗書流於後世方今國祚中衰不可令佞臣執筆在幼主左右既無益聖德復使吾黨蒙其訕議曰磾退而告人曰王公其不長世乎善人國之紀制作國之典滅紀廢典其能久乎邕遂死獄中晉書曰王豹上書勸齊王與成都王頴如分陝之利會長沙王乂至於案上見豹牋謂冏曰小子離間骨肉, SBCK: 股肱}
