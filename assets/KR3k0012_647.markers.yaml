  - {type: variant, offset: 1113, length: 1, content: 懷, WYG: 父京兆尹杜悰以其首罪免父有光教義請減死配流王彦威曰殺人者死百王共守若許殺人不死是教殺人興雖免父不合減死山海經曰共工之臣曰相柳氏九首以食於九山相柳之所抵厥為澤谿禹殺相柳其血腥不可以樹五穀乃以為衆帝之臺曹操别傳曰始袁忠為沛相薄待操沛公桓邵亦輕之及在兖州陳留邊讓頗笑操操殺讓族其家忠邵俱避難交州操逺遣使就太守士燮盡族劭劭得出首拜謝於}
  - {type: page-break, offset: 1113, content: '', id: KR3k0012_WYG_647-6a, image: WYG0898/WYG0898-0762a.png}
  - {type: variant, offset: 1113, length: 5, content: 懷中青紙詔, krp: 父京兆尹杜悰}
  - {type: variant, offset: 1115, length: 3, content: 青紙詔, WYG: 庭操謂曰跪可解死耶遂殺之孟子曰孟子謂齊宣王曰左右皆曰可殺勿聴諸大夫皆曰可殺勿聴國人皆曰可殺然後察之見可殺焉然後殺之故曰國人殺之也言當其刑大辟之罪如此而後可}
  - {type: page-break, offset: 1115, content: '', id: KR3k0012_WYG_647-6b, image: WYG0898/WYG0898-0762b.png}
  - {type: punctuation, offset: 1118, content: ，, id: KR3k0012_CHANT_647-bkkpn302}
  - {type: 'tls:seg', offset: 1118, content: '', id: KR3k0012_CHANT_647-11a.8}
  - {type: variant, offset: 1119, length: 7, content: 示監刑尚書劉頌, SBCK: 其首罪免父有光教義請減死配}
  - {type: variant, offset: 1119, length: 2, content: 示監, WYG: 為民父母又曰或問勸齊伐燕有諸曰未也今有殺人者或問之曰人可殺與則将應之曰可彼如曰孰可以殺之則将應之曰為士師則可以殺之今以燕伐燕何為勸之哉燕有罪王者當誅之至於齊則不可搜神記曰漢宣帝之世燕代之間有三男共取一婦生四子及其将分妻子而不可均遂致紛争訟廷尉范延夀斷之曰此非人類當以禽獸從母不從父也請戮三男以兒還母帝嗟嘆曰何必古若此則可謂當於理而厭人情也延夀蓋見人事而知用刑矣太公金匱曰殺一人而千人恐者殺之殺二人而萬人動者殺之殺三人而君振者殺之三族}
  - {type: page-break, offset: 1119, content: '', id: KR3k0012_WYG_647-7a, image: WYG0898/WYG0898-0762c.png}
  - {type: variant, offset: 1119, length: 7, content: 示監刑尚書劉頌, krp: 其首罪免父有光教義請減死配}
  - {type: variant, offset: 1124, length: 12, content: 劉頌流涕言此詔書也奉此而, WYG: 秦誓曰今商王受弗敬上天降災下民沉湎冒色敢}
  - {type: page-break, offset: 1124, content: '', id: KR3k0012_WYG_647-7b, image: WYG0898/WYG0898-0762d.png}
