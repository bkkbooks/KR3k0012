  - {type: variant, offset: 19, length: 0, content: '', SBCK: 禮秋官上曰掌戮掌斬殺諜而􅅮之斬以鈇􅃏􅀂今要斬也殺以刃刀􅀂今弃市也諜爲姦㓂反間者斬之小者殺之凡殺其親者焚之殺王之親者辜之焚之燒也易曰焚如死如弃如辜之言枯也謂磔之也凡殺人者踣諸市肆之三日刑盗于市踣僵尸也肆猶陳也又司刑職曰殺罪五百鄭玄曰煞死刑尚}
  - {type: variant, offset: 19, length: 0, content: '', WYG: 禮掌戮曰掌斬殺賊諜而摶之斬以鉞若今腰斬殺以刀刃若今棄市諜為姦㓂反間者大者斬之小者殺之凡殺其親者焚之殺王之親者辜之焚燒也易曰焚如死如棄如辜之言枯也謂磔之凡殺人者踣諸市肆之三日刑盜于市踣僵尸肆陳也又司刑職曰殺罪五百鄭𤣥曰兹死刑尚}
