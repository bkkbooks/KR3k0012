  - {type: variant, offset: 1598, length: 0, content: '', SBCK: 樹㯏乃以爲衆帝之臺曹操别傳曰始􅀽忠爲沛相薄待操沛國桓劭亦輕之及在兖州陳留邊讓頗􅀏操操殺讓族其家忠劭俱避難交州操逺使就太守士爕盡族劭劭得出者拜謝於中庭操謂曰跪可解死耶遂殺之孟子曰孟子謂齊宣王曰左右皆曰可殺勿聽諸大夫皆曰可殺勿聽國人皆曰可殺然後察之見可殺焉然後殺之故曰國人殺之也言當真行大辟之罪如此而後可以爲民父母又曰或問勸齊伐燕有諸曰未也今有殺人者或問之曰人可殺與則將應之曰可彼如曰孰可以殺之則將應之曰爲士師則可以殺之今以燕伐燕何爲勸之哉燕有罪王者當誅之燕猶齊故}
