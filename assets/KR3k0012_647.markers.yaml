  - {type: variant, offset: 2481, length: 36, content: 江充掘巫蠱太子宮太子乃斬充舉兵與丞相劉屈釐戰太子敗走自殺明年屈氂復坐祝詛, WYG: 趙人新垣平以望氣得幸請祠汾隂作渭陽五帝廟欲出周鼎夏四月郊見上帝嵗餘懼誅遂謀為逆發覺}
  - {type: variant, offset: 2481, length: 36, content: 江充掘巫蠱太子宮太子乃斬充舉兵與丞相劉屈釐戰太子敗走自殺明年屈氂復坐祝詛, krp: 趙人新垣平以望氣得幸以圡上立渭陽五帝廟欲出周鼎夏四月郊見上帝嵗餘懼誅謀爲逆發覺}
