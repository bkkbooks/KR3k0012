  - {type: variant, offset: 2792, length: 274, content: 十疋有司正刑棄市廣二子宗年十三雲年十一操黃幡撾登聞鼓乞恩辭求自沒為奚官奴以贖父命尚書朱映議以為天下之人無子者少事遂行便成永制堅亦同映議又曰咸和二年句容令孔恢罪棄市詔曰恢自陷刑網罪當大辟但以其父年老而有一子以為惻然可特原之隋書曰文帝意每尚慘急奸回不止京市白日公行掣盜人間強盜亦往往而有帝患之問群臣斷禁之法楊素等未及言帝曰朕知之矣詔有人能糺告者沒賊家產業以賞糺人時月之間內外寧息其後無賴之徒候富人子弟出路者而故遺物於其前偶拾取則擒以送官而取其賞大柢被陷者甚眾帝知乃命盜一錢已上皆棄市行旅皆晏起早宿天下懍懍焉考竟釋名曰獄死曰考竟考竟者考得其情竟其命於獄也, SBCK: 族}
