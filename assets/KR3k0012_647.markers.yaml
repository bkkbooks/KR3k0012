  - {type: variant, offset: 1085, length: 8, content: 楚王瑋既誅汝南王, SBCK: 周處字子隱陽羡人姑爲中書省事時女子李忩斍父北叛時殺父處奏曰斍父以偷生破家以邀福子圉告歸懷羸結舌忩無人子之道證父攘羊傷化汙俗冝在􅄬卑以彰㐫逆平刑市朝不足塞責奏可殺忩唐書曰宰相宋申錫爲鄭注所搆獄自内起崔玄}
  - {type: page-break, offset: 1085, content: '', id: KR3k0012_SBCK_647-3b}
  - {type: variant, offset: 1085, length: 8, content: 楚王瑋既誅汝南王, WYG: 周處字子隠陽羨人始為中書省事時女子李忽覺父北叛遂叛父處奏曰叛父以偷生破家以邀福子圉告歸懐嬴結舌忽無人子之道證父攘羊傷化汙俗宜在投畀以彰凶逆典刑市朝不足塞責奏可處斬唐書曰宰相宋申錫為鄭注所搆獄自内起崔𤣥}
  - {type: variant, offset: 1085, length: 8, content: 楚王瑋既誅汝南王, krp: 周處字子隱陽羡人姑爲中書省事時女子李忩斍父北叛時殺父處奏曰斍父以偷生破家以邀福子圉告歸懷羸結舌忩無人子之道證父攘羊傷化汙俗冝在投卑以彰㐫逆平刑市朝不足塞責奏可殺忩唐書曰宰相宋申錫爲鄭注所搆獄自内起崔玄}
  - {type: punctuation, offset: 1094, content: 、, id: KR3k0012_CHANT_647-bkkpn295}
  - {type: variant, offset: 1094, length: 3, content: 衛瓘尋, SBCK: 首率諌官請對與文宗往復數百言文宗不省其詐欲寘申錫於法玄亮泣曰孟軻有言衆人皆曰殺之未可也諸大夫皆曰殺之未可也天下皆曰殺之然後察之方寘於法今至聖之代殺一凢庶尚湏合於典法况無辜殺一宰相乎臣爲陛下惜天下法實不爲申錫也文宗爲之感悟玄亮由此名重於朝}
  - {type: variant, offset: 1094, length: 3, content: 衛瓘尋, WYG: 首率諫官請對與文宗往復數百言文宗不省其諫欲寘申錫於法𤣥亮泣曰孟軻有言衆人皆曰殺之未可也左右皆曰殺之未可也天下皆言殺之然後察之方寘於法今至聖之代殺一凡庶尚須合於典法况無辜殺一宰相乎臣為陛下惜天下法實不為申錫也文宗為之感悟𤣥亮由此名重於朝}
