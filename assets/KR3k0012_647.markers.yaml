  - {type: variant, offset: 1771, length: 660, content: 死臣不敢奉詔上怒甚謂綽曰卿惜辛亶而不自惜也命左僕射高頴將綽斬之綽曰陛下寧可殺臣不得殺辛亶至朝堂解衣當斬上使人謂綽曰竟何如對曰執法一心不敢惜死上拂衣而入良久乃釋之明日謝綽勞勉之賜物三百段漢新事曰奉車都尉竇固征匈奴騎都尉秦彭副固令彭別屯彭擅斬軍司馬固奏彭不由督率賊殺人公卿議皆以為固議是公府掾郭躬以為彭得專斬人上曰軍正校尉一統督何以得專殺躬對曰一統將者謂在部曲也今彭別將兵軍事至急勢不得關督將有詔躬上殿令尚書令與公卿雜難躬曰督將授斧鉞稱令故得擅行法都尉別得行軍法何以明之躬對曰軍正校尉別將兵假斧鉞即得專軍法難者曰今不假故不得擅殺躬曰漢制假棨戟以當斧鉞議者皆屈上從之晉朝雜事曰夜遣通事令史張林黃門令史駱休開神虎門迎故太傅趙王至太極前召收中書監張華侍中朝謐尚書裴危解結侍郎杜斌等斬之於東鍾下華等大呼自稱忠臣張林詰之曰公等知太子無罪何不諫諫若不從何不去也遂斬之華陽國志曰王濬自成都帥水陸軍及梁州又率七萬人伐吳臨發斬牙門將李延延所愛將也以爭騎斬之眾莫不肅商君書曰晉文公將欲明刑以親百姓顛頡後至吏請其罪君曰用事焉吏遂斷顛頡之首以徇晉國之士皆懼曰顛頡之有寵斬以徇而況我乎韓子曰禹遇諸侯會稽之上防風後至禹斬之王韶孝子傳曰周青東郡人也母患積年青扶侍左右五體羸瘦村里乃歛錢營助湯藥母痊許嫁同郡周小君小君疾未獲成禮乃求見青屬累父母青許之俄而命終青供養為務十年中翁姑感之勸令更嫁青誓以匪石翁姑並自殺女姑告青害殺收考遂以誣款七月刑青於市青謂監殺者曰乞樹長竿擊白幡青若殺翁姑血入泉不殺血上天既斬血乃緣竿上天梟首傳曰叔孫昭子殺豎牛投其首於寧風棘上漢書曰, SBCK: ''}
