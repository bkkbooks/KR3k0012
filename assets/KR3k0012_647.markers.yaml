  - {type: variant, offset: 1601, length: 0, content: '', SBCK: 不可均反致争訟廷尉范延壽斷之曰此非人􅀋當以禽獸處之禽獸從母不從父也請戮三男以兒還母帝嗟嘆曰何必古􅀂此則可謂當於理而厭人情也延壽盖見人事而知用刑矣太公金匱曰殺一人而千人恐者殺之殺二人而萬人動者殺之殺三人而君振者殺之三族刑雜}
