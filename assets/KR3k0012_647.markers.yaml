  - {type: variant, offset: 3164, length: 8, content: 向相字甫興性卓詭, SBCK: 太傅司馬宣王奏免大將軍曹爽又尚書丁謐鄧颺何晏司􅈻校尉畢䡄荆州刺史李勝大司農桓範皆與爽通姦夷三族三十國春秋曰魏帝謁陵曹爽及弟義訓彦皆從髙祖命授兵召公卿於廟堂奏皇太后廢爽丁酉斬爽義訓彦夷三族雜死刑韓子曰齊國好厚葬布帛盡於衣裘林木盡於棺槨桓公患之以告管仲曰布帛盡則無以爲幣林木盡則無以爲守備如民之厚葬}
