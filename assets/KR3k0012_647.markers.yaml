  - {type: variant, offset: 57, length: 1, content: 發, SBCK: 監叛周公以成王之命殺禄父禮曰邾婁定公時有殺其父者有司以告公瞿然失席曰是寡人之罪也寡人甞學斷斯獄矣臣弑君凢在官者殺無赦子弑父凢在官者殺無赦言諸臣子孫無尊卑皆得殺之其罪無赦也殺其人壞其室洿其宫而瀦焉明其大逆不欲人復之也盍君踰月}
