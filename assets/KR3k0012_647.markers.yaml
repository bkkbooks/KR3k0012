  - {type: variant, offset: 673, length: 2, content: 有詔, SBCK: 先帝新弃天下山陵未成竇武何功兄弟父子一門三侯又多取掖庭宫人作樂飲醼旬月之間貲財億計大臣􅀂此是爲道耶公爲㨂樑枉撓阿黨復焉求賊遂令収蕃蕃拔劒叱甫甫兵不敢近乃益人圍之數十里遂執蕃送黄門北寺獄黄門從官騶蹋蹴蕃曰死老魅復能損我曹貟數奪我曹􅅒假否即害之呉志曰人詐告樓玄謗訕政事華覈上䟽乞􅀇自新孫皓疾􅀇名聲復徒􅀇及子男據付交阯將張弃使以戰自効隂別勑弈令殺之據到交阯病死玄一身隨弈}
