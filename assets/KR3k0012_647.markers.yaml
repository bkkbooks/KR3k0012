  - {type: 'tls:seg', offset: 1145, content: '', id: KR3k0012_CHANT_647-11a.14}
  - {type: variant, offset: 1145, length: 457, content: 託體先帝受枉如此幸見申列頌亦歔欷不能仰視又曰荀晞字道將河南山陽人為兗州剌史斷決如流人不敢欺以從母子為都護犯法晞斬之既而素服哭曰殺汝者兗州剌史哭弟者荀道將以嚴刻斬戮號曰屠伯後為石勒所殺又曰石閔仕偽趙石鑒為侍中錄尚書事鑒使石苞夜誅閔不剋反為閔攻殺鑒等殺胡人斬關踰城不可勝數閔知胡人不為己用頒令下每人斬一胡文官賜爵一級武官立拜牙門于時一日之中斬胡萬人於是鼻高多鬚濫死者甚眾胡人死至二十餘萬又曰皇甫謐字子方少遵父操永嘉中博士徵不起避亂荊州閉門居未嘗入城府蠶而後衣耕而後食南土人士咸尊敬之剌史陶侃禮之甚厚王敦弟王廙代侃廙至荊州大失物情百姓叛廙大行誅戮立威以方回為侃所禮責其不來詣己乃收而斬焉荊土華夷莫不流涕三十國春秋曰丙寅丞相府斬督運令史淳于伯于建康於是以刀拭柱血逆流上二丈三尺下四尺五寸其直如絃後魏書曰段暉從世祖至長安有人告暉欲南奔世祖問曰何以知之告者曰暉置金於馬韉中不欲逃走何由爾也世祖密遣視之果如告者之言斬之於市齊書曰庾弘遠字士操清實有士譽仕齊為江州長史剌史陳顯達舉兵敗斬於朱雀航將刑索帽著之曰子路結纓吾不可以不冠而死, WYG: ''}
