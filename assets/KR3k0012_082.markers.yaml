  - {type: variant, offset: 1708, length: 3, content: 月月半, SBCK: 不暇食於是四海之士皆至隋巢子曰昔三苗大乱天命殛之夏右受之大神降而輔之司禄益食而民不飢司金益冨而國家寳司命益年而民不夭四方歸之莊子曰昔者禹堙洪水親自橾橐耜而滌天下之川服無跋脛無毛沐甚􅀨擳疾風置萬國禹大聖}
