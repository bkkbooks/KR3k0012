  - {type: 'tls:seg', offset: 3138, content: '', id: KR3k0012_CHANT_082-33a.14}
  - {type: variant, offset: 3138, length: 1, content: 媵, SBCK: 圖壞亂暦紀皇天也紀綱紀也天}
  - {type: variant, offset: 3138, length: 1, content: 媵, WYG: 圖壞亂厯紀皇天也紀綱紀也天之圖厯龍逢引以諫桀也殘賊天下刑法峻也賢人遁逃避時虐也淫色嫚易男女無別不事祖宗韓詩外傳曰桀為酒池可以運舟糟丘足以望十里家語曰夏桀昆吾斬劉黎民如草木者焉天下討之如匹夫史記曰自孔甲以來諸侯多叛夏桀不務德而虐傷百姓百姓弗堪乃召湯而囚之夏臺已而釋之湯修德諸侯皆歸湯湯遂率兵以伐夏桀桀走鳴條放而死紀年曰后桀命扁伐山民山民女于桀二人曰琬曰琰桀愛二人女無子焉斵其名于苕華之玉苕是琬華是琰而棄其元妃于洛曰妺喜桀傾宫飾瑶臺作瓊室立玉門湯遂滅夏桀桀逃南巢氏自禹至桀十七世有王與無王用嵗四百七十一年帝王世紀曰帝桀淫虐有才力能伸鈎索鐵手能搏虎多求美女以充後宫為瓊室瑶臺金柱三千始以瓦為屋以望雲雨大進侏儒倡優為爛熳之樂設竒偉之戲縱靡靡之聲日夜與妺喜及宫女飲酒常置妺喜於膝上妺喜好聞裂繒之聲為發繒裂}
