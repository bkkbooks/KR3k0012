  - {type: variant, offset: 601, length: 202, content: 僚師師以五采章施于五色之服以六律五聲八音協治蒸民乃粒萬邦作乂庶績咸熙乃作大韶之樂簫韶九成鳳皇來儀擊石拊石百獸率舞故孔子稱韶盡美矣又盡善也景星曜於房群瑞畢臻德被天下初舜既踐帝位而父瞽瞍尚存舜常戴天子車服而朝焉天下大之故曰大舜都乎咸陽或營蒲坂媯汭嬪于虞故因號有虞氏有二妃元妃娥皇無子次妃女英生啇均次妃登北氏生二女霄明燭光有庶子八人皆不肖故以天下禪禹舜年八十一即真八十三而薦禹九十五而使禹攝政攝五年有苗氏叛南征, SBCK: 歳}
  - {type: variant, offset: 601, length: 202, content: 僚師師以五采章施于五色之服以六律五聲八音協治蒸民乃粒萬邦作乂庶績咸熙乃作大韶之樂簫韶九成鳳皇來儀擊石拊石百獸率舞故孔子稱韶盡美矣又盡善也景星曜於房群瑞畢臻德被天下初舜既踐帝位而父瞽瞍尚存舜常戴天子車服而朝焉天下大之故曰大舜都乎咸陽或營蒲坂媯汭嬪于虞故因號有虞氏有二妃元妃娥皇無子次妃女英生啇均次妃登北氏生二女霄明燭光有庶子八人皆不肖故以天下禪禹舜年八十一即真八十三而薦禹九十五而使禹攝政攝五年有苗氏叛南征, krp: 歳}
  - {type: variant, offset: 603, length: 239, content: 師以五采章施于五色之服以六律五聲八音協治蒸民乃粒萬邦作乂庶績咸熙乃作大韶之樂簫韶九成鳳皇來儀擊石拊石百獸率舞故孔子稱韶盡美矣又盡善也景星曜於房群瑞畢臻德被天下初舜既踐帝位而父瞽瞍尚存舜常戴天子車服而朝焉天下大之故曰大舜都乎咸陽或營蒲坂媯汭嬪于虞故因號有虞氏有二妃元妃娥皇無子次妃女英生啇均次妃登北氏生二女霄明燭光有庶子八人皆不肖故以天下禪禹舜年八十一即真八十三而薦禹九十五而使禹攝政攝五年有苗氏叛南征崩于鳴條年百歲殯以瓦棺葬蒼梧九疑山之陽是為零陵謂之紀市在今營道縣下有群象為之耕, WYG: 徒將興}
