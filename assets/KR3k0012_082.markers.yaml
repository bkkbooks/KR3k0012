  - {type: variant, offset: 3294, length: 4, content: 舜藏黃金, SBCK: 桀紂有民左億右億之衆四岳三塗之險京山中南之固及在鳴條之野一朝而失天下符子曰桀觀炮烙}
  - {type: variant, offset: 3294, length: 4, content: 舜藏黃金, WYG: 桀紂為君從愚妄之言違長者之諫衣温而忘百姓之寒食美而忘天下之飢或身放南巢或頭縣白旗斯亦無他也但不節財而暴民也尸子曰伯夷叔齊飢死首陽無地故也桀放}
  - {type: page-break, offset: 3294, content: '', id: KR3k0012_WYG_082-23b, image: WYG0893/WYG0893-0657d.png}
  - {type: variant, offset: 3294, length: 4, content: 舜藏黃金, krp: 桀紂有民左億右億之衆四岳三塗之險京山中南之固及在鳴條之野一朝而失天下符子曰桀觀炮烙}
  - {type: variant, offset: 3299, length: 2, content: 嶄巖, SBCK: 瑶臺謂龍逢曰樂乎龍逢曰樂桀曰觀刑曰樂何無惻怛}
  - {type: variant, offset: 3299, length: 2, content: 嶄巖, WYG: 厯山紂殺於鄗宫無道故也有道無地則餓有地無道則亡又曰昔者桀紂縱欲長樂以苦百姓珍怪逺味必南海}
  - {type: variant, offset: 3299, length: 2, content: 嶄巖, krp: 瑶臺謂龍逢曰樂乎龍逢曰樂桀曰觀刑曰樂何無惻怛}
  - {type: variant, offset: 3302, length: 1, content: 山, SBCK: 心}
  - {type: variant, offset: 3302, length: 0, content: '', WYG: 葷北海之鹽西海之菁東海之鯨此其禍天下亦厚矣又曰昔夏桀之時至德滅而不揚帝道掩而不興興舉也客臺振而掩覆客臺行禮客之室言不能行禮故天大振動而覆敗犬羣而入泉言將壞滅犬失其生故羣入淵一說犬禍彘御藪而席隩彘衘晨席入人隩内言彘禍美人婢首墨面而不容婢首亂頭也萃興髪并編為婢首不修容飾也曼聲吞炭内閉而不歌曼聲見世衰亂將滅故吞炭自敗音聲閉氣而不歌飛鳥鎩翼走獸决蹄鎩翼殘翼决致蹇也言桀無道田獵鳥獸悉被創殘翼廢脚蹇}
