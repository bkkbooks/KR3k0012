  - {type: variant, offset: 3286, length: 1, content: 為, SBCK: 也客臺振而掩覆客臺行禮客之室言不能行禮故天大振勤而覆敗犬成羣而入泉言將滅壤犬失其主故噑入淵一􅀃犬禍彘衘藪而席隩彘衘晨席入人隩内言彘禍美人婢首墨面而不容婢首亂頭也萃興髪并編爲婢首不修容飾也㬅聲吞炭内䦨而不歌㬅聲見世衰亂將滅故吞炭自敗音聲􅐬氣而不歌飛鳥鎩翼走獸决蹄鍛翼殘翼決致蹇也言桀無道田獵鳥獸悉􅀍創殘翼廢脚山無峻幹澤無佳水峻幹羙材佳水清水言入山澤不以時故又曰桀爲琁室瑶臺象廊玉牀琁瑶石之次玉也象才廊室也權天下虐百姓於是湯以革車三百乗伐于南巢南巢盧江居巢收之夏宫天下寜定百姓和輯譙周法訓曰桀紂雖有}
