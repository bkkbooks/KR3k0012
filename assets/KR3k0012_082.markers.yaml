  - {type: variant, offset: 2319, length: 159, content: 之袗衣畫繪者也此言舜窮居之時若將終身及其為萬乘之主被服繪繡若固常自所有也分定使之然也又曰舜之居深山之中也與木石居與鹿豕遊其所以異於深山之野人者幾希舜耕歷山之時居山之間鹿豕近人若與人遊希遠也當此之時舜與野人相去豈遠哉及其聞一善言見一善行若決江決江河沛然莫之能禦也又曰舜流共工于幽州放驩兜于崇山殺三苗于三危殛鯀于羽山四罪而, SBCK: 扈氏}
