  - {type: variant, offset: 2177, length: 2, content: 雞鳴, SBCK: 禹之王天下也身執木畚以爲民先股無完胈體無生雖臣虜之勞不􅀂於此矣吕氏春秋曰禹年三十未娶行塗山恐時暮失制乃娶塗山女又曰禹南濟乎江黃龍􅀒舟舟中之人恐懼禹仰}
  - {type: variant, offset: 2177, length: 2, content: 雞鳴, WYG: 禹之王天下也身執木畚以為民先服無完胈體無生雖臣虜之勞不若於此矣吕氏春秋曰禹年三十未娶行塗山恐時暮失制乃娶塗山女又曰禹南濟乎江黄龍負舟舟中之人恐懼禹仰}
  - {type: page-break, offset: 2177, content: '', id: KR3k0012_WYG_082-9b, image: WYG0893/WYG0893-0650d.png}
  - {type: variant, offset: 2177, length: 2, content: 雞鳴, krp: 禹之王天下也身執木畚以爲民先股無完胈體無生雖臣虜之勞不若於此矣吕氏春秋曰禹年三十未娶行塗山恐時暮失制乃娶塗山女又曰禹南濟乎江黃龍負舟舟中之人恐懼禹仰}
  - {type: variant, offset: 2180, length: 0, content: '', SBCK: 􅀏曰受命於天竭力以濟生人受命天也奈何憂於龍焉龍弭耳低尾而逃又曰昔者禹一沐而三握髮一食而三}
  - {type: variant, offset: 2180, length: 0, content: '', WYG: 笑曰余受命於天竭力以濟萬民命受天也奈何憂於龍焉龍弭耳低尾而逃又曰昔者禹一沐而三握髪一食而三}
  - {type: variant, offset: 2180, length: 0, content: '', krp: 笑曰受命於天竭力以濟生人受命天也奈何憂於龍焉龍弭耳低尾而逃又曰昔者禹一沐而三握髮一食而三}
