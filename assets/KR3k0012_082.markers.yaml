  - {type: variant, offset: 2206, length: 0, content: '', SBCK: 時天下大水禹身執畚鍤以爲民先䟽河而導九攴攴分鑿江而通九路辟五湖而定東海又曰禹之趨時冠挂而不頋履遺而不取冠有所桂着去不暇頋視非爭其先也爭得其時也􅀃苑曰禹見罪人下車問而泣之左右曰夫罪人不順道故然焉君王何爲痛之至}
