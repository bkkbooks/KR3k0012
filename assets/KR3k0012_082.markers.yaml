  - {type: variant, offset: 3529, length: 120, content: 也徐氏中論曰小人恥其面不如子都君子恥其行不如舜禹杜夷幽求曰以舜禹之登庸視孔氏之窮屈不以跛鱉之與晨驥乎符子曰舜禪夏禹於洞庭之野呂氏春秋曰舜有子九人不予其子而授禹至公也風土記曰舜東夷之人生於桃丘媯水之汭損石之東舊說言舜上虞人也虞即會稽縣距餘姚七, SBCK: 覽卷第八}
