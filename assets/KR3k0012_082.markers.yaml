  - {type: variant, offset: 1665, length: 10, content: 舜以太尉受號即位為天, SBCK: 禹之時民大樂其駢三聖相繼故樂名大夏也孝經鈎命决曰命星貫昴脩紀夢接生禹命使之星謂流行之星也遁甲開山圖曰禹㳺於東海得玉碧色長一尺二寸光如日月自昭逹幽􅁳楊雄蜀王夲紀曰禹夲没山廣柔縣人生於石細其地名痢兒畔禹母吞珠孕禹坼堛而生於縣塗山娶妻生}
