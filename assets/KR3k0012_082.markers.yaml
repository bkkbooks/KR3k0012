  - {type: variant, offset: 2694, length: 438, content: 堯之子而之舜謳歌者不謳歌堯之子而謳歌舜曰天也夫然後之中國踐天子之位也莊子曰羊肉不慕蟻蟻慕羊肉羊肉羶也舜有羶行百姓悅之故三徙成都至鄧之墟十萬家堯聞舜之賢舉之童土之地童土不生草之地曰冀得其來之澤舜來施恩澤也又曰舜讓天下於善卷善卷曰余立於宇宙之中冬日衣皮毛夏日衣葛絺春耕種足以勞動秋收歛足以休食日出而作日入而息逍遙於天地之間而心意自得吾何以天下為悲夫子之不知余也遂不授於是去而入深山莫知其處又曰舜以天下讓其友北人無擇北人無擇曰異哉后之為人也居於畎畝之中而遊堯之間不若是而已又欲以辱行汗漫我吾羞見之自投清冷之泉尸子曰舜兼愛百姓務利天下其田也荷彼耒耜耕彼南畝與四海俱有其利雷澤也旱則為耕者鑿瀆儉則為獵者表虎故有光若日月天下歸之若父母又曰舜南面而治天下天下太平燭於玉燭息於永風食於膏火飲於醴泉舜之行其猶河海乎千仞之溪亦滿焉由此觀之禹湯之功不足言也又曰堯問於舜曰何事曰事天問何任曰任地問何務曰務人又曰舜一徙成邑再徙成都三徙成國其致四方之士堯聞其賢草茅之中與之語政至簡而易行與之語道廣大而不窮, SBCK: 庖正虞思}
