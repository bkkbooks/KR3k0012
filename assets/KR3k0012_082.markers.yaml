  - {type: variant, offset: 1678, length: 2, content: 二月, SBCK: 語曰子曰禹吾無間然矣孔子惟禹功德之盛也言不能復間厠其間也菲飲食而致孝乎鬼神馬融曰菲薄也致孝􅀑神􅀕祀豊㓗也惡衣服而致美乎黻冕孔安國日損其常服以盛􅀕祀卑宮室而盡力乎溝洫包曰方里爲井井間有溝溝廣四尺十里爲城城中有洫洫􅀷廣八尺也符子曰禹讓天下於竒子竒子曰君言佐舜勞矣鑿山川通河漢首無髮股無毛故舜也以勞報子我生而逸不能爲君之勞矣越絶書曰禹始憂民救水到大越於茅山大㑹計爵有功更名茅山謂之㑹稽及其王矣廵狩大越吴越春秋曰禹案黃帝中經見聖人所記曰在九疑山東南天柱號曰宛委承以文玉覆以盤石其書簡青玉爲字編以白銀禹乃}
  - {type: variant, offset: 1678, length: 2, content: 二月, WYG: 論語曰子曰禹吾無間然矣孔子推禹功德之盛也言不能復間厠其間也菲飲食而致孝乎鬼神馬融曰菲薄也致孝鬼神祭祀豐潔也惡衣服而致美乎黻冕孔安國曰損其常服以盛祭祀卑宫室而盡力乎溝洫方里為井井間有溝溝深廣四尺十里為城城中有洫洫深廣八尺也符子曰禹讓天下於竒子竒子曰君言佐舜勞矣鑿山川通河漢首無髮股無毛故舜也以勞報子我生而逸不能為君之勞矣越絶書曰禹始憂民救水到大越於茅山大會計爵有功更名茅山謂之會稽及其王也巡狩大越吳越春秋曰禹案黄帝中經見聖人所記曰在九疑山東南天柱號曰宛委承以文玉覆以盤石其書簡青玉為字編以白銀禹乃}
