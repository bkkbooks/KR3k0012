  - {type: 'tls:seg', offset: 3146, content: '', id: KR3k0012_CHANT_082-33a.16}
  - {type: variant, offset: 3146, length: 0, content: '', WYG: 有日猶吾之有民日亡吾乃亡耳兩日鬬蝕鬼呼於國桀醉不寤湯來伐桀以乙卯日戰于鳴條之野桀未戰}
  - {type: variant, offset: 3147, length: 1, content: 託, WYG: 敗績湯追至大涉遂禽桀於焦放之厯山乃與妺喜及諸嬖妾同舟浮海奔于南巢之山而死博物志曰夏桀之時為長夜飲深宫中男女雜處三旬不出不聽政太公六韜曰桀時有瞿山之地桀十月鑿山陵通之於河民有諫者曰冬鑿地穿山是發}
