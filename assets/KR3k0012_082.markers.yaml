  - {type: variant, offset: 3310, length: 1, content: 淵, SBCK: 而君爲樂臣爲君股肱熟有心恱而股肱不恱乎桀曰聽子諌諌得我功之不得我刑之龍逢曰臣觀君冕非冕也冕危石也臣觀君履也非履也履春冰也未有冠危石而不壓蹈春冰而不䧟桀歎曰子知我之亡而不自知亡子就炮烙之刑吾觀于亡知我不亡龍逢行歌曰造化勞我}
  - {type: variant, offset: 3310, length: 1, content: 淵, WYG: 夏宫天下寧定百姓和輯譙周法訓曰桀紂雖有天下之位而無一人之譽也猶朽木枯樹逄風則仆也袁子正書曰桀紂有民不億之衆四嶽三塗之險京山終南之固及在鳴條之野一朝而失天下符子曰桀觀炮烙於瑶臺謂龍逢曰樂乎龍逢曰樂桀曰觀刑曰樂何無惻怛之心焉逢曰天下苦之而君為樂臣為君股肱孰有心悅而股肱不悅乎桀曰聽子諫諫得我功之不得我刑之龍逢曰臣觀君冕非冕也冕危石也臣觀君履亦非履也履春冰也未有冠危石而不壓踏春冰而不䧟桀嘆曰子知我之亡而不自知亡子就炮烙之刑吾觀子亡子不知我亡龍逢行歌曰造化勞我}
