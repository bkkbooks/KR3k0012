  - {type: variant, offset: 3137, length: 0, content: '', WYG: 二姚思有虞君也自以二女妻少康姚姓也而邑諸綸綸虞邑也有田一成有衆一旅方十里為成五百人為旅能布其德而兆其謀兆始也以收夏衆撫其官職遂㓕過戈復禹之績祀夏配天不失舊物魏髙貴鄉公少康漢髙論曰少康生於滅亡之後降為諸侯之𨽻﨑嶇逃難僅以身免能布其德而兆其謀卒滅過戈光復禹績非至德𢎞仁豈濟斯勲漢祖因土崩之勢專任智力以成功業為子則數危其親為君則囚繫其賢相身没之後社稷幾傾若與少康易時而處或未能復大禹之績矣又論曰三代之世任德濟勲如彼之難秦項之際任力功成如此之易且太上立德其次立功就令漢祖功髙未若少康盛德之茂也帝杼直吕反紀年曰帝杼居原自遷于老王帝王世紀曰帝杼一號后杼或曰公孫曼能率禹之功夏人報祭之在位十七年帝槐紀年曰后芬立四十四年帝王世紀曰帝芬一名帝槐或曰祖武在位二十六年帝芒紀年曰后芒即位元年以𤣥珪賔于河東狩于海獲大魚后芒陟位五十八年帝王世紀曰帝芒一名和或曰帝芒帝泄帝王世紀曰帝泄一名帝世或曰泄宗在位十六年帝不降紀年曰不降即位六年伐九苑五十九年其弟立是為帝扃帝王世紀曰帝不降一名帝降或曰北成北字或作江字帝扃帝王世紀曰帝扃一名帝禹或曰髙陽在位二十二年帝厪音近紀年曰帝厪一名𦙍甲即位居西河天有妖孽十日並出帝王世紀曰帝厪一名頊或曰董江在位二十年帝孔甲左傳曰昭二十九年秋龍見于絳郊晉魏獻子問於蔡墨曰蟲莫智於龍以其不生得也信乎對曰古者畜龍故國有豢龍氏御龍氏有夏孔甲擾于有帝擾順也其德能順于天帝賜之乘龍河漢各二四頭為乘各二乘十六頭各有雌雄史記曰帝孔甲立好方鬼神事淫亂夏后氏德衰諸侯叛之天降龍二有雌雄孔甲不能食未得豢龍氏陶唐既衰其後有劉累學擾龍于豢龍氏以事孔甲孔甲賜之姓曰御龍氏漢書曰孔甲作盤盂銘三十六篇列仙傳曰師門為夏孔甲龍師孔甲不能修其心意殺而埋之外野一旦風雨迎之頃則山木皆焚孔甲祠而禱之未還而道死吕氏春秋曰夏后孔甲于東陽薲音頻山天大風晦孔甲迷入民室主人方乳乳産也咸言后來是良日子誰敢殃之長成人幕動折撩斧破斬足遂為守者以其無足為守門之官乃作破斧之歌帝臯紀年曰后昊立三年帝臯也帝王世紀曰帝臯一名臯茍帝發紀年曰帝發一名后敬或曰發惠其子立為桀帝桀歸藏曰昔桀伐唐而枚占於營營或曰不吉不利出征唯利安處彼狸為鼠書曰伊尹相湯伐桀升自陑遂與桀戰於鳴條之野尚書帝命驗曰桀失其玉鏡用其噬虎玉鏡喻以清明之道噬虎喻暴虐之風尚書帝命候曰夏桀無道殺關龍逢圮滅}
