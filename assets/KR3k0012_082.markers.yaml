  - {type: variant, offset: 2022, length: 141, content: 堯舜等昇首山觀河渚有五老遊於河渚相謂曰河圖將來告帝期五老流星上入昴有頃赤龍負玉苞舒圖出堯與大舜等共發曰帝當摳百則禪虞百年而禪與舜堯喟然歎曰咨爾舜天之歷數在爾躬孔叢子曰舜身六尺有奇面頷無毛亦聖也朝子曰歷山農者侵畔舜往而耕者讓河濱漁者爭坻舜往朞年而漁者讓長東夷之陶者窳舜往陶朞年而器以牢, SBCK: 禹歩}
