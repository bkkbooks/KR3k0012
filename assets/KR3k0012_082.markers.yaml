  - {type: variant, offset: 2181, length: 4, content: 孳孳為善, SBCK: 以禮有道之士通乎巳之不足通乎巳之不足則不與物爭矣又曰禹之决江水也民聚瓦礫及其事巳成功巳立爲萬世利禹之所見}
  - {type: page-break, offset: 2181, content: '', id: KR3k0012_SBCK_082-6a}
  - {type: variant, offset: 2181, length: 2, content: 孳孳, WYG: 以禮有道之士通乎已之不足通乎已之不足則不與物爭矣又曰禹之决江水也民聚瓦礫及其事已成功已立爲萬世利禹之所見者逺也而民莫知之賈誼書曰禹常晝不暇食而夜不暇寢矣方是時憂務民也淮南子曰昔者鯀作三仭之城諸侯倍之禹知天下叛之乃壞城平地散財物禁甲兵施之以德海外賔服四夷納職又曰禹沐淫雨櫛疾風决江䟽河鑿龍門闢伊闕修彭蠡之防乘四載隨山刋木平治水土定千八百國夙興夜寐以致聰明輕賦薄斂以寛民氓布德施惠以振困窮弔死問罪以養孤孀百姓親附政令流行又曰禹}
