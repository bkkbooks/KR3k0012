  - {type: variant, offset: 3186, length: 9, content: 雒陶方回續牙伯陽東, SBCK: 琬曰琰桀愛二人女無子焉斵其名于􅀂華之玉苕是琬華是琰而棄其元妃于洛曰妺喜桀傾宮飾瑶臺作瓊室立玉門湯遂滅夏桀逃南巢氏自禹至桀十七世有王興無王用歳四百七十一年帝王世紀曰帝桀􅁋虐有才力能伸鈎索鐡手摶熊虎多求美女以充後宫爲瓊室瑶臺金柱三千始以瓦爲屋以望雲􅀨大進侏儒倡優爲爛漫之樂設竒偉之戯縱靡靡之聲日夜與妺喜及宮女飲酒常置妺喜於膝上妺喜好聞裂繒之聲桀爲發裂繒以順適其意以人駕車肉山脯林以爲酒池一鼓而牛飲者三千餘人醉而溺水以虎入市而視其驚伊尹舉觴造桀諌曰君王}
