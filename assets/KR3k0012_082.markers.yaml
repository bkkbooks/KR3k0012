  - {type: variant, offset: 14, length: 5, content: 名重華冀州, WYG: 問四岳曰有能成美堯之事者使居官皆曰伯禹為司空可成美堯之功舜曰嗟然命禹汝平水土維是勉之禹拜稽首讓于契后稷臯陶舜曰女其往視爾事矣禹為}
  - {type: variant, offset: 15, length: 18, content: 重華冀州人也作什器於壽丘就時於負夏舜, SBCK: 曰文命禹之}
