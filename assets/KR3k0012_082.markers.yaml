  - {type: variant, offset: 3140, length: 0, content: '', SBCK: 圗暦龍逢引}
  - {type: variant, offset: 3140, length: 0, content: '', krp: 圗暦龍逢引}
  - {type: variant, offset: 3141, length: 7, content: 娥九子事之而託, SBCK: 諫桀也殘賊}
  - {type: variant, offset: 3141, length: 2, content: 娥九, WYG: 順適其意以人駕車肉山脯林以為酒池一鼔而牛飲者三千餘人醉而溺水以虎入市而視其驚伊尹舉觴造桀諫曰君王不聽羣臣之言亡無日矣桀聞言析啞然笑曰}
