  - {type: variant, offset: 2597, length: 1, content: 泣, SBCK: 是爲羿帝有窮后羿帝王丗紀曰羿有窮氏未聞其姓其先帝嚳以世掌射故於是加賜以弓矢封之於鉏爲帝司射歷唐及虞夏至羿學射於􅁻甫其辭佐長故亦以善射聞與吴賀北遊使羿射雀左目羿引弓射之誤中左目羿俯首而愧終身不忘故羿善射至今稱之及有夏之衰羿自鉏遷于窮石因夏民之不附以代夏政逼篡帝位故號窮氏傳曰昔有夏之方衰也后羿自鉏遷于窮石因夏民以代夏政恃其射也不脩民事而􅁋于原獸棄武羅伯囚熊髠尨圉四子皆羿之賢臣而用寒浞土捉反寒浞伯明氏之䜛子弟也伯明后寒棄之夷羿收之信而使之以爲巳相浞行媚于内而施賂于外愚弄其民而娱羿}
