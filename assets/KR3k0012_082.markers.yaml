  - {type: variant, offset: 2238, length: 2, content: 加諸, SBCK: 及魏陳王曹植夏禹賛曰于嗟夫子拯丗濟民克卑宫室致孝􅀑神􅂼食薄服紱冕乃新厥德不回其誠可親亹亹其德温温其仁尼稱無間何德之純又禹治水賛曰嗟夫夏禹寔勞水功西鑿龍門䟽河導江梁歧旣闢九州以同天賜􅀇圭奄有萬􅀖又禹渡河賛曰禹濟于河黃龍乗船舟人並懼禹歎仰天子受天運勤功恤民死亡命也龍聞弭身􅁃信禹渡江賛曰二江􅀄鑿九谷新成風飛蠲涌水起龍驚樂天知命無待憂生危舟遂静亂檝還平帝啓歸藏曰昔夏后啓筮享神於大陵而}
  - {type: variant, offset: 2238, length: 2, content: 加諸, WYG: 魏陳王曹植賛曰吁嗟夫子拯世濟民克卑宫室致孝鬼神蔬食薄服紱冕乃新厥德不囘其誠可親亹亹其德温温其仁尼稱無間何德之純又禹治水賛曰嗟夫夏禹實勞水功西鑿龍門疏河導江梁岐既闢九州以同天賜𤣥圭奄有萬邦又禹渡河賛曰禹濟于河黄龍乘船舟人並懼禹仰歎天予受天運勤功恤民死亡命也龍聞弭身周庾信禹渡江賛曰二江初鑿九谷新成風飛鷁涌水起龍驚樂天知命無待憂生危舟遂静亂楫還平帝啓歸藏曰昔夏后啓筮享神於大陵而}
