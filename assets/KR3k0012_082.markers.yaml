  - {type: variant, offset: 2592, length: 0, content: '', SBCK: 四方今失厥道亂其紀綱乃厎滅亡言失堯之道乱其法制白致滅亡其四曰明明我祖萬􅀖之君有典有則貽厥子孫典謂經籍則法貽遺也言仁及後丗􅀜石和鈞王府則有荒墜厥緒覆宗絶祀金鐵銀石供民器用通之使和平則官民足言古制有而太康失其業以取亡其五曰鳴呼曷}
  - {type: variant, offset: 2592, length: 0, content: '', WYG: 四方中今失厥道亂其紀綱乃底㓕亡言失堯之道亂其法制自致滅亡其四曰明明我祖萬邦之君有典有則貽厥子孫典謂經籍則法度貽遺也遺及後世關石和鈞王府則有荒墜厥緒覆宗絶祀金鐵衡石供民器用通用使和平則官民足言古制存而太康失其業以取亡其五曰嗚呼曷}
  - {type: variant, offset: 2592, length: 0, content: '', krp: 四方今失厥道亂其紀綱乃厎滅亡言失堯之道乱其法制白致滅亡其四曰明明我祖萬邦之君有典有則貽厥子孫典謂經籍則法貽遺也言仁及後丗關石和鈞王府則有荒墜厥緒覆宗絶祀金鐵銀石供民器用通之使和平則官民足言古制有而太康失其業以取亡其五曰鳴呼曷}
  - {type: variant, offset: 2593, length: 3, content: 己為樂, SBCK: 予懐之悲曷何也言思而悲萬姓仇予予將疇依鬱陶乎予心顔厚有忸怩弗愼厥德雖悔可追言人君行巳不愼其德以速滅敗欲改悔其可追及乎言無益也帝王丗紀曰太康無道在位二十九年失政而崩帝仲康書曰惟仲康肇位四海㣧侯命掌六師羲和廢厥職酒荒于厥邑㣧后承王命徂征羲和廢其職官還其私邑以酒迷乱仲康命㣧侯掌六師徃就其邑討之帝相紀年曰帝相即位處啇丘元年征淮夷二年征風夷及黄夷帝王丗紀曰帝相一名相安自太康巳來夏政凌遟爲羿所逼乃徙啇丘依同姓諸侯斟灌斟㝷氏羿遂襲帝}
  - {type: page-break, offset: 2593, content: '', id: KR3k0012_SBCK_082-9a}
  - {type: variant, offset: 2593, length: 0, content: '', WYG: 予懷之悲曷何也言思而悲也萬姓仇予予將疇依鬱陶乎予心顔厚有忸怩弗慎厥德雖悔可追言人君行已不慎其德以速㓕敗雖已改悔其可追及乎言無益也帝王世紀曰太康無道在位二十九年失政而崩帝仲康書曰惟仲康肇位四海𦙍侯命掌六師羲和廢厥職酒荒于厥邑𦙍后承王命徂征羲和廢其職官還其私邑以酒迷亂仲康命𦙍侯掌六師往就其邑討之帝相紀年曰帝相即位處商丘元年征淮夷二年征風夷及黄夷帝王世紀曰帝相一名相安自太康已來夏政凌遲為羿所逼乃徙商丘依同姓諸侯斟灌氏斟鄩氏羿遂襲帝號為羿帝有窮后羿帝王世紀曰羿有窮氏未聞其姓其先帝嚳以世掌射故以是加賜以弓矢封之於鉏為帝司射厯唐及虞夏至羿學射如吉甫其辭佐長故亦以善射聞與吳賀北遊使羿射雀左目羿引弓射之誤中右目羿俯首而愧終身不忘故羿善射至今稱之及有夏之衰羿自鉏遷于窮石因夏民以代夏政逼簒帝位故號有窮氏傳曰昔有夏之方衰也后羿自鉏遷于窮石因夏民以代夏政恃其射也不修民事而淫于原獸棄武羅伯因熊髠龍圉四子皆羿之賢臣而用寒浞土捉反寒浞伯明氏之讒子弟也伯明后寒棄之夷羿收之信而使之以為}
