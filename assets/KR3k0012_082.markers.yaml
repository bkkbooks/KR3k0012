  - {type: variant, offset: 3137, length: 0, content: '', SBCK: 二姚思有虞君也自以二女妻少康姚姓也而邑諸綸綸虞邑也有田一成有衆一旅方十里爲成五百人爲旅能布其德而逃其謀兆始也以收夏衆撫其官職遂滅過戈復禹之績祀夏配天不失舊物魏髙貴郷公少康漢髙論曰少康生於滅亡之後降爲諸侯之􅀠﨑嶇逃難僅以身免能布其德而兆其謀卒滅過戈克復禹績非至德弘仁豈濟斯勲漢祖因土崩之勢專任智力以成功業爲子則數危其親爲君則囚繫賢相身没之後社稷幾傾􅀂典少康易時而處或未能復大禹之績矣又論曰三代之世任德濟勲如彼之難􅁗項之際任力成功如此之昜且太上立德其次立功就令漢祖功髙未􅀂少康盛德之茂也帝宁直吕反紀年曰帝宁居原自遷于老王帝王世紀曰帝宁一號后予或曰公孫曼能率禹之功夏人報􅀕之在位十七年帝槐紀年曰后芬立四十四年帝王世紀曰帝芬一名帝槐或曰祖武在位二十六年帝芒紀年曰后芒即位元年以􅀇珪賔于河東狩于海獲大魚后芒陟位五十八年帝王世紀曰帝芒一名和或曰帝芒帝泄帝王世紀曰帝泄一名帝世或曰泄宗在位十六年帝不降紀年曰不降即位六年伐九苑五十九年其弟立是爲帝局帝王世紀曰帝不降一名帝降或曰北成北字或作江字帝局帝王世紀日帝􅈰一名帝禺或曰髙陽在位二十一年帝廑音近紀年曰帝廑一名胤甲即位居西河天有祅孽十日並岀帝王世紀日帝廑一名頊或曰董江在位二十年帝孔甲傳曰昭二十九年秋龍見于絳郊皆魏獻子問於蔡墨曰古者國有豢龍氏有御龍氏及有夏孔甲擾于有帝擾順也其德能順於天帝賜之乗龍河漢各二四頭爲乗各二乗十六頭各有雌雄史記曰帝孔甲立好方術􅀑神事􅁋亂夏后氏德衰諸侯叛之天降龍二有雌雄孔甲弗能食未得豢龍氏陶唐旣衰其後有劉累學擾龍于豢龍氏以事扎甲孔甲賜之姓曰御龍氏漢書曰孔甲作盤盂銘三十六篇列仙傳曰師門爲夏孔甲龍師孔甲不能修其心意殺而埋之外野一旦風􅀨迎之記則山木皆焚孔甲祠而禱之未還而道死吕氏春秋曰夏后孔甲甞于東陽薲音頻山天大風晦孔甲迷入民室主人方乳乳産也咸言后來是良日子誰敢殃之長成人幕動折撩斧破斬足遂爲守者以其無足爲守門之官乃作破斧之歌帝臯紀年曰后昊立三年帝臯也帝王世紀曰帝臯一名臯茍帝發紀年曰后發一名后敬或曰發惠其子立爲桀帝桀歸藏曰昔桀伐唐而枚占於營營或曰不􅁻不利岀征唯利安處彼貍爲䑕書曰伊尹相湯伐桀升自陑遂與桀戰于鳴條之野尚書帝命驗曰桀失其玉鏡用其噬虎玉鏡喻清明之道噬虎喻暴虐之風尚書帝命􅀱曰夏桀無道殺􅀜龍逢絶滅}
