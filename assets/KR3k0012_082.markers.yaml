  - {type: variant, offset: 3178, length: 6, content: 法其遊也得六, SBCK: 討之如疋夫史記曰自孔甲以來諸侯多叛夏桀不務德而虐傷百姓百姓不堪廼召湯而囚之夏臺巳而釋之湯修德諸侯皆歸湯湯遂率兵以伐夏走鳴條逐放而死紀年曰后桀命扁伐山民山民女于桀二}
  - {type: variant, offset: 3178, length: 6, content: 法其遊也得六, krp: 討之如疋夫史記曰自孔甲以來諸侯多叛夏桀不務德而虐傷百姓百姓不堪廼召湯而囚之夏臺巳而釋之湯修德諸侯皆歸湯湯遂率兵以伐夏走鳴條逐放而死紀年曰后桀命扁伐山民山民女于桀二}
