  - {type: variant, offset: 2201, length: 1, content: 徒, SBCK: 城諸侯倍之禹知天下叛之乃壞城平地散財物禁甲兵施之以德海外賔服四夷納職又曰禹沐􅁋雨櫛疾風决江䟽河鑿龍門闢伊闕修彭蠡之防乗四載隨山刋木平治水土定千八百國夙興夜寐以致聦明輕賊薄歛以寛民力布徳施惠以振困窮吊死問疾以養􅀌霜百姓親附政令流行又曰禹爲水以身解於陽旰之河解禱也陽旰河在秦}
