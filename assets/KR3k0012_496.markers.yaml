  - {type: variant, offset: 2190, length: 0, content: '', WYG: 文開三輔决録曰馮豹字仲文後母遇之甚酷豹事之愈謹時人為之語曰道德彬彬馮仲文又曰五門子孫凡門之伍門今在河西四十里澗榖洛三水之交傳聞馬氏兄弟五人共居此地作五門客舍因以為名主養猪賣豚故民為之語曰苑中三公館下二卿五門嚾嚾但聞豚聲又曰賈彪兄弟三人並有髙名彪最優天下稱曰賈氏三虎偉節最怒又曰游殷字幼齊為}
  - {type: page-break, offset: 2190, content: '', id: KR3k0012_WYG_496-4b, image: WYG0897/WYG0897-0475b.png}
  - {type: variant, offset: 2191, length: 0, content: '', WYG: 􅎮所害月餘􅎮得病但言伏伏游幼齊將鬼來於是遽死闗中諺曰生有知人之明死有貴神之靈臨海異物志曰安家夷皆好噉猴頭羮諺言人能負人千石之粟不願負人猴頭羮臛又曰䱥魚肥炙食甚美諺曰寧去累世田宅不去䱥魚額風俗通曰趙王好大眉人間半額楚好廣領國人没項齊王好細腰後宫有餓死者又曰延嘉中常侍單超左琯徐璜貝瑗唐衡在帝左右縱其姦逸時人為之語曰左迴天徐轉日貝獨坐唐應聲言信用甚於轉圜也又曰里語曰縣官漫漫怨死者半六韜曰天下攘攘皆為利往天下熙熙皆為利來列子曰周諺曰田父可坐殺晨出夜入自以性之恒啜菽茹藿自以味之極一朝處以軟毛綈薦以粱肉蘭味心痟體煩内熱生病矣又曰楊朱曰古語有之生相憐死相捐此語至矣又曰趙子文曰國諺有言察見淵魚者不祥智料隱逸者殃且君欲無盜莫若舉賢而任之孟子曰齊人有言雖有智慧不如乘勢雖有鎡基不如待時齊人之諺語也乘勢居富貴之勢也鎡基田器耒耜之屬也孔藂子曰平原君與子髙飲强子髙酒曰昔有遺諺堯舜千鐘孔子百觚子路嗑嗑尚飲百榼古之賢聖無不能飲也吾子何辭焉韓子曰鄙諺曰長袖善舞多錢善賈此言多資之易為工又曰古有諺曰為政猶沐也雖有棄髮之費而有長髮之利也慎子曰諺云不聰不明不能為王不瞽不聾不能為公蔣子萬機論曰學者如牛毛成者如麟角又曰猛虎不處卑勢勁鷹不立垂枝抱朴子曰桓靈諺曰舉秀才不知書察孝亷父别居寒素清白濁如泥髙第良將怯如蠅又曰古人欲達勤誦經今世圖官勉治生商君書曰公孫鞅謂秦孝公曰臣聞之疑行無名疑事無功君亟定變法之慮無惑天下之議語曰愚者暗於未成智者見於未萌邯鄲氏笑林曰桓帝時有人辟公府掾者倩人作奏記文人不能為作因語曰梁國葛龔者先善為記文自可冩用不煩更作遂從人言冩記文不去龔名姓府公驚不答而罷歸故時人語曰作奏雖工宜去葛龔賈誼新書鄙諺曰欲投鼠而忌器此善喻也鼠近於器尚憚而弗投恐傷器也况貴大之臣近於主帝乎桓子新論曰闗東鄙語曰人聞長安樂則出門而西向笑知肉味美則對屠門而大嚼又諺曰侏儒見一節而長短可知孔子言舉一隅足以三隅反觀吾小時二賦亦足以揆其能否崔寔政論曰每詔書所欲禁絶雖重懇惻罵詈極筆猶復廢捨終無悛意故里語曰州郡記如霹靂得詔書但掛壁又曰一歲再赦奴兒喑啞况不軌之民孰不回意應劭漢官儀曰里語云仕宦不止車生耳蔡邕獨斷曰古幘無巾王莽頭秃乃始施巾故語曰莽頭秃幘如屋王朗貧窶語曰諺曰魯班雖巧不能為乞丐者顔魏武選令曰諺曰失晨之雞思補更鳴昔季闡在白馬有受金取婢之罪棄而弗問後以為濟北相以其能故曹植令曰諺云相門有相將門有將夫相者文德昭將者武功烈鬭爭左傳𨼆公曰鄭}
