  - {type: variant, offset: 2192, length: 0, content: '', WYG: 將伐許授兵於太宫公孫閼與穎考叔爭車穎考叔挾輈以走輈車轅也子都拔㦸以逐之又襄二十六年秦伯之弟鍼如晉脩成叔向命召行人子員欲使荅秦行人子朱曰朱也當御御進也言當次行三云叔向不應子朱怒曰班爵同同為大夫何以黜朱於朝撫劒從之叔向曰秦晉不和久矣今日之事幸而集晉國賴之不集三軍暴骨子員道二國之言無私子常易之奸以事君者吾所能御也拂衣從之人救之平公曰晉其庶乎庶幾於治吾臣之所爭者太師曠曰公室懼卑臣不心競而力争不務徳而争善私欲已侈能無卑乎又襄二十六年楚伐鄭至于城麇鄭皇頡戍之出與楚師戰敗穿封戌囚皇頡公子圍與之爭之正於伯州犂正曲直也伯州犂曰請問於囚乃立囚伯州犂曰所爭君子也其何不知上其手曰夫子為王子圍寡君之貴介弟也下其手曰此子為穿封戌方城外之縣尹也誰獲子上下手以道囚意囚曰頡遇王子弱焉弱敗也言為王子所得戌怒抽戈逐王子圍史記曰藺相如功大拜為上卿位在廉頗右頗曰我為趙將有攻城野戰之功相如徒以口舌為勞位居我上吾不忍為之下必辱之相如聞之不肯與㑹每朝常稱病不欲與頗爭列於是舍人請辭去相如曰强秦不敢加兵於趙者徒以吾兩人在也今兩虎共鬭勢不俱生所以先國家之急而後私讎也又曰彭越字仲常漁巨野中為羣盜賊陳勝項梁起少年或謂諸豪傑相立叛秦仲可以來效之越曰兩龍方鬭且待之也又曰婁敬説上曰夫與人鬭不搤其亢張晏曰亢喉嚨拊其背未能全其勝也今陛下入闗而都案秦之故地此亦搤天下之亢而拊其背也又曰孔子去陳過蒲㑹公叔氏以蒲叛蒲人止孔子弟子公良孺者有勇力謂曰昔侍夫子遇難於匡今遇難於此命也吾寧鬭而死鬭甚疾蒲人懼謂曰無適衞吾出子也漢書曰項羽謂漢王曰天下匈匈以吾兩人願與王挑戰決雌雄漢王笑曰吾寧鬭智不鬭力又曰大將軍霍光秉政諸霍在平陽奴客持刀兵入市吏不能禁及尹翁歸為市吏莫敢犯者又曰邴吉常出逢羣鬭者死傷横道吉過之不問掾史獨怪之吉曰民鬭相殺傷長安令京兆尹職所當禁也宰相不親小事又曰原涉遣奴至市買肉奴乘涉氣與屠者爭言斫傷屠者又漢書張耳贊曰張耳陳餘世所稱賢}
