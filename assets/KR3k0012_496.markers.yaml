  - {type: variant, offset: 3009, length: 237, content: 須石鼈鳴又曰太祖使盧洪趙達撫軍主剌舉軍中語曰不畏曹公但畏盧洪曹公尚可趙達殺我晉中興書曰禇齊字季野桓彝目之季野皮裏陽秋又曰薛兼紀瞻閔鴻顧榮賀循同志友善號曰五俊又曰中宗渡江王導群從同心翼載時人語曰王與馬共天下又曰杜預在內七年損益不可勝數朝野稱之號曰杜武庫言無所不有宋書曰顏竣字士遜為吏部尚書留心選舉自強不息任遇既隆奏無不可其後謝莊代竣領選意多不行竣容貌嚴毅莊風姿甚美賓客喧訴常懽笑荅之時人為之語曰顏竣瞋而與人官謝莊笑而不與人官又曰高祖壯士丁旿有氣力時人語曰勿跋扈付丁旿又曰王玄謨, SBCK: ''}
