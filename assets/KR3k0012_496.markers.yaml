  - {type: 'tls:seg', offset: 17, content: '', id: KR3k0012_CHANT_496-1a.6}
  - {type: variant, offset: 17, length: 1, content: 俗, SBCK: 乗􅀔居冨貴之勢也鎡錤田器耒耜之属也孔叢子曰平原君與子髙飲強子髙酒曰昔有遺諺堯舜千鍾孔子百觚子路嗑嗑尚飲百榼古之賢聖無不能飲也吾子何辭焉韓子曰鄙諺曰長䄂善舞多錢善賈此}
  - {type: page-break, offset: 17, content: '', id: KR3k0012_SBCK_496-4a}
  - {type: variant, offset: 17, length: 1, content: 俗, krp: 乗勢居冨貴之勢也鎡錤田器耒耜之属也孔叢子曰平原君與子髙飲強子髙酒曰昔有遺諺堯舜千鍾孔子百觚子路嗑嗑尚飲百榼古之賢聖無不能飲也吾子何辭焉韓子曰鄙諺曰長䄂善舞多錢善賈此}
  - {type: variant, offset: 19, length: 0, content: '', SBCK: 多資之易爲工又曰古有諺曰爲政猶沭也雖有棄髪之廢而有長髪之利也慎子}
  - {type: variant, offset: 19, length: 0, content: '', krp: 多資之易爲工又曰古有諺曰爲政猶沭也雖有棄髪之廢而有長髪之利也慎子}
