  - {type: variant, offset: 2304, length: 0, content: '', SBCK: 青四足似熊性忠而直見人闘則觸不直聞人論咋不正名曰獬豸一名任法今御史用法冠俗曰獬豸冠也續搜神記曰晉太原中北地人陳良與沛郡民李焉共爲賈後大得利焉殺良取物死十許日良忽􅂫活得歸家􅀃死時見周旋人劉舒舒乆巳亡謂良曰去年春社日祠祀家中闘爭吾實忿之作一兕於庭前良}
  - {type: page-break, offset: 2304, content: '', id: KR3k0012_SBCK_496-8a}
  - {type: variant, offset: 2304, length: 0, content: '', WYG: 青四足似熊性忠而直見人鬭則觸不直聞人論咋不正名曰獬豸一名任法今御史用法冠俗曰獬豸冠也續搜神記曰晉太原中北地人陳良與沛郡民李焉共為賈後大得利焉殺良取物死十許日良忽蘇活得歸家説死時見周旋人劉舒舒久已亡謂良曰去年春社日祠祀家中鬭爭吾實忿之作一兕於庭前良}
  - {type: variant, offset: 2304, length: 0, content: '', krp: 青四足似熊性忠而直見人闘則觸不直聞人論咋不正名曰獬豸一名任法今御史用法冠俗曰獬豸冠也續搜神記曰晉太原中北地人陳良與沛郡民李焉共爲賈後大得利焉殺良取物死十許日良忽蘇活得歸家說死時見周旋人劉舒舒乆巳亡謂良曰去年春社日祠祀家中闘爭吾實忿之作一兕於庭前良}
  - {type: variant, offset: 2305, length: 0, content: '', SBCK: 往報舒家其怪亦絶皇甫士安逸士傳曰髙鳯隣里有爭財闘者兵刄相加鳯脫衣巾爲叩頭曰仁義遜讓不可廢也爭財者投兵謝之而罷東觀漢記又載又曰管寜所居屯落㑹有汲者或男女雜錯或爭井􅋐䦧寧患之乃買器分置井傍汲}
  - {type: variant, offset: 2305, length: 0, content: '', WYG: 往報舒家其怪亦絶皇甫士安逸士傳曰髙鳯鄰里有爭財鬭者兵刃相加鳯脱衣巾為叩頭曰仁義遜讓不可廢也爭財者投兵謝之而罷東觀漢記又載又曰管寧所居屯落㑹有汲者或男女雜錯或爭井鬭䦧寧患之乃買器分置井傍汲}
  - {type: page-break, offset: 2305, content: '', id: KR3k0012_WYG_496-13a, image: WYG0897/WYG0897-0479c.png}
  - {type: variant, offset: 2305, length: 0, content: '', krp: 往報舒家其怪亦絶皇甫士安逸士傳曰髙鳯隣里有爭財闘者兵刄相加鳯脫衣巾爲叩頭曰仁義遜讓不可廢也爭財者投兵謝之而罷東觀漢記又載又曰管寜所居屯落㑹有汲者或男女雜錯或爭井鬪䦧寧患之乃買器分置井傍汲}
  - {type: variant, offset: 2306, length: 0, content: '', SBCK: 待之各自相責不復闘也㑹稽典録曰夏香字曼卿門側有大井上有瓦盆里中兒童各競飲牛爭水共闘香豫爲汲多置盆器由是無爭費禕别傳曰魏延與楊儀並坐爭論延或舉刄擬儀儀涕泣撗集禕常入坐其間諫喻分别石勒別傳曰勒微時居與邑人李陽相近陽性剛愎毎輕勒與爭漚麻池共相打楪㸦有勝􅀒吴越春秋曰伍子胥始吴時遇專諸於途專諸方與人闘將就之適其怒有萬人之氣其妻一呼即還子胥怪而問其狀專諸曰夫屈一人之下必伸萬人之上列子曰昔共工與顓頊爭爲帝怒觸不周之山折天柱絶地維胡非子曰胡非子脩墨子教有屈將子恃勇聞墨者非闘帶劒危冠往見胡非子刼而問之曰將聞先生非闘而好勇有􅀃則可無􅀃則死胡非子爲言五勇屈將子恱服尸子曰魯人有孝者三爲母北魯人}
  - {type: page-break, offset: 2306, content: '', id: KR3k0012_SBCK_496-8b}
  - {type: variant, offset: 2306, length: 0, content: '', WYG: 待之各自相責不復鬭㑹稽典録曰夏香字曼卿門側有犬井上有瓦盆里中兒童各競飲牛爭水共鬭香豫為汲多置盆器由是無爭費禕别傳曰魏延與楊儀並坐爭論延或舉刃擬儀儀涕泣下褘常入坐其間諫喻分别石勒别傳曰勒微時居與邑人李陽相近陽性剛愎每輕勒與爭漚麻池共相扞揲互有勝負呉越春秋曰伍子胥如呉時遇專諸於途專諸方與人鬭將就之適其怒有萬人之氣其妻一呼即還子胥怪而問其狀專諸曰夫屈一人之下必伸萬人之上列子曰昔共工與顓頊爭為帝怒觸不周之山崩折天柱絶地維胡非子曰胡非子脩墨以敎有屈將子好勇聞墨者非鬭帯劒危冠往見胡非子刼而問之曰將聞先生非鬭而好勇有説則可無説則死胡非子為言五勇屈將子悦服尸子曰魯人有孝者三為母北魯人}
