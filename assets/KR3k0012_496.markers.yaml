  body:
  - {type: variant, offset: 7, length: 0, content: '', SBCK: 七諺下􅃲爭諺下漢晉春秋曰諸葛亮卒楊儀整軍而出宣王不逼百姓諺曰死諸葛走生仲逹梁祚魏國統曰王昶字文舒戒兄子云諺曰救寒無􅀂重裘止謗莫􅀂自脩斯言信矣張勃吴録曰陸稠字伯嬴爲廣陵太守姦吏歛乎廣陵諺曰解結理煩我國陸君韓詩外傳曰夫知惡往古之所以危亡而不知積其所以安存則無以異乎却行而求逮於前人也鄙語曰不知爲吏視已成事或曰前車覆後車戒江表傳曰諸葛亮表都護李嚴嚴少爲郡職吏用性深尅茍利其身郷里爲嚴諺曰難可狎李鱗甲又曰典韋容貌魁傑名冠三軍其所持手㦸長幾一尋軍中爲之語曰帳下壯士有典軍手提􅀟㦸八十斤又曰郭典字君業爲鉅鹿太守與中郎將董卓攻黄巾賊張寳於曲陽典作圍塹卓不肯典獨於西當賊之衝晝夜進攻寳由是城守不敢出時人爲語曰郭君圍壍董將不許幾令狐狸化爲豺虎頼我郭君不畏強禦轉機之間敵爲窮虜猗猗惠君保完疆土又曰栁琮字伯騫所抜進皆爲時所稱致位牧守郷里爲諺曰得黄金一笥不如爲栁伯騫所識皇甫謐逹士傳曰繆斐字文雅代脩儒學繼踵}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_496-1b}
  - {type: variant, offset: 7, length: 1, content: 六, WYG: 七}
  - {type: variant, offset: 7, length: 0, content: '', krp: 七諺下鬪爭諺下漢晉春秋曰諸葛亮卒楊儀整軍而出宣王不逼百姓諺曰死諸葛走生仲逹梁祚魏國統曰王昶字文舒戒兄子云諺曰救寒無若重裘止謗莫若自脩斯言信矣張勃吴録曰陸稠字伯嬴爲廣陵太守姦吏歛乎廣陵諺曰解結理煩我國陸君韓詩外傳曰夫知惡往古之所以危亡而不知積其所以安存則無以異乎却行而求逮於前人也鄙語曰不知爲吏視已成事或曰前車覆後車戒江表傳曰諸葛亮表都護李嚴嚴少爲郡職吏用性深尅茍利其身郷里爲嚴諺曰難可狎李鱗甲又曰典韋容貌魁傑名冠三軍其所持手㦸長幾一尋軍中爲之語曰帳下壯士有典軍手提雙㦸八十斤又曰郭典字君業爲鉅鹿太守與中郎將董卓攻黄巾賊張寳於曲陽典作圍塹卓不肯典獨於西當賊之衝晝夜進攻寳由是城守不敢出時人爲語曰郭君圍壍董將不許幾令狐狸化爲豺虎頼我郭君不畏強禦轉機之間敵爲窮虜猗猗惠君保完疆土又曰栁琮字伯騫所抜進皆爲時所稱致位牧守郷里爲諺曰得黄金一笥不如爲栁伯騫所識皇甫謐逹士傳曰繆斐字文雅代脩儒學繼踵}
  - {type: xml-element, offset: 8, content: '', id: KR3k0012_CHANT_496-bkkxmlele1}
  - {type: 'tls:seg', offset: 8, content: '', id: KR3k0012_CHANT_496-1a.1}
  - {type: 'tls:seg', offset: 8, content: '', id: KR3k0012_CHANT_496-1a.2}
  - {type: variant, offset: 8, length: 0, content: '', SBCK: 愽士以經行脩明學士稱之故時人謂之語曰素車白馬繆文雅王祥别傳曰晉受禪時廊廟之士莫不懽容而祥色不加怡時人爲之語曰王公恨恨有送故之情也張方賢楚國先賢傳曰}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_SBCK_496-2a}
  - {type: variant, offset: 8, length: 0, content: '', krp: 愽士以經行脩明學士稱之故時人謂之語曰素車白馬繆文雅王祥别傳曰晉受禪時廊廟之士莫不懽容而祥色不加怡時人爲之語曰王公恨恨有送故之情也張方賢楚國先賢傳曰}
  - {type: variant, offset: 9, length: 0, content: '', SBCK: 曰黄尚爲司􅀠姦慝自弭左雄爲尚書令天下慎選舉荀氏家傳曰荀䆳夫人有至行時歳荒毎來糴者夫人恒叩其斛糴者歸量輙過其本時人號曰􅁺斛夫人陳留風俗傳曰許晏守偉君授魯詩於琅邪王改學曰許氏章句列在儒林故諺曰殿}
  - {type: variant, offset: 9, length: 4, content: 上說文曰, WYG: 下鬭争}
  - {type: variant, offset: 9, length: 0, content: '', krp: 曰黄尚爲司隷姦慝自弭左雄爲尚書令天下慎選舉荀氏家傳曰荀䆳夫人有至行時歳荒毎來糴者夫人恒叩其斛糴者歸量輙過其本時人號曰掾斛夫人陳留風俗傳曰許晏守偉君授魯詩於琅邪王改學曰許氏章句列在儒林故諺曰殿}
  - {type: xml-element, offset: 10, content: '', id: KR3k0012_CHANT_496-bkkxmlele2}
