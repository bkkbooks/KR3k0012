  - {type: variant, offset: 3585, length: 209, content: 餘人斬于鄴市又曰祖瑩與陳郡袁飜齊名秀出時人為之語曰京師楚楚袁與祖洛中翩翩祖與袁又曰李謐字永和初師事小學博士孔璠數年之後璠還就謐請業同門生為之語曰青成藍藍謝青師何嘗在明經陳書張種少恬靜居處雅正不妄交遊傍無造請時人為之語曰宋稱敷演梁則卷充清處學尚種有其風隋書崔儦與頓丘李若俱見稱重時人為之語曰京師灼灼崔儦李若齊士歸鄉里仕郡為功曹又曰何妥少聰明時蘭陵蕭春亦雋才住青陽巷妥住白楊頭時人為之語曰世有兩俊白楊何妥青陽蕭春其見美如此, SBCK: 六}
