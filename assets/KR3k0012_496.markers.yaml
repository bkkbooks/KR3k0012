  - {type: variant, offset: 2188, length: 75, content: 理詣胡伯始袁山松後漢書曰桓帝時京師稱曰李元禮巖巖如玉山陳仲舉軒軒如千里驥又曰桓帝時南陽語曰朱公叔肅肅如松柏下風又曰公沙穆有六子時人號曰公沙六龍天下無雙, SBCK: 喜合闘但喜解闘耳}
