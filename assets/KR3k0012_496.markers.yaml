  - {type: variant, offset: 3316, length: 217, content: 繖崔鴻前秦錄曰梁讜字伯言博學有雋才與弟熙俱以文藻清麗見重一時時人為之語曰關東堂堂二申兩房未若二梁瓌文綺章崔鴻前涼錄曰辛攀字懷遠隴西狄道人父奭尚書郎兄鑒曠弟寶迅皆以才識知名秦雄為之語曰五龍一門金友玉昆後魏書曰濟南王元彧與從兄安豐王中山王齊名時人為之語曰三王楚楚盡琳瑯未若濟南備圓方又曰靈太后幸左藏賜諸臣儀同陳留公李崇章武王融並以所負多顛仆於地崇乃傷腰融至損腳時人為人語曰陳留章武傷腰折股貪人敗類穢我明主又曰初廣平人李波為逋逃之藪公私咸患, SBCK: ''}
