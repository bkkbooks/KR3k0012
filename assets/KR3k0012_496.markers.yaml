  - {type: variant, offset: 871, length: 724, content: 明經歷位至丞相故鄒魯諺曰遺子黃金滿嬴不如一經又曰于定國決疑平法罪疑從輕加審慎之心朝廷稱之曰張釋之為廷尉天下無冤人于定國為廷尉人自以不冤又曰王莽篡立後復上符命者莽盡誅之時揚雄校書天祿閣使者欲收雄雄恐乃從閣自投幾死京師為之語曰惟寂惟寞自投于閣爰清爰靜無作符命又曰范增往說項梁曰夫秦滅六國楚最無罪自懷王入秦不反楚人憐之至今故南公稱楚雖三戶亡秦必楚又曰樓護字君卿與谷永俱為五侯上客長安號之曰谷子雲筆札樓君卿唇舌又曰成帝時王吉子駿為京兆尹試以政事先是京兆有趙廣漢張敞王尊王章至駿皆有能名故京師稱曰前有趙張後有三王又曰匡衡好學諸儒為之語曰無說詩匡鼎來匡說詩解人頤又曰少府五鹿充宗貴幸為梁丘易元帝好之欲考其異同令與諸易家論充宗辯口諸儒莫能抗有薦朱雲者召入攝齋登堂抗首而請音動左右故諸儒為之語曰五鹿嶽嶽朱雲折其角又曰文帝從灞陵欲馳下峻阪袁盎攬轡上曰將軍怯耶盎曰臣聞千金子不垂堂百金子不倚衡服虔曰惜身不倚衡也如淳曰衡樓殿邊棚楯又曰杜欽字子夏少好經書家富而目偏盲故不好為吏茂陵杜業與欽同姓字俱以才能稱於京師故衣冠謂欽為盲杜子夏以相別欽惡以疾見詆為小冠高廣材二寸由是京師更謂欽為小冠杜子夏而業為大冠杜子夏又曰劉輔諫成帝立趙后曰里語云腐木不以為柱卑人不可以為主又曰蕭育少與陳咸朱博為友著聞當世往者有王陽貢公故長安語云蕭朱結綬王貢彈冠言其相薦達也育與博後有隙不能終世以友為難又曰成帝為太子及即位以張禹論語為師以上難數對己問經為論語章句獻之諸儒為之語曰欲為論念張文由是學者多從張氏餘家浸微又曰諸葛豐元帝擢為司隸校尉剌舉無所避京師語曰間何闊逢諸葛又曰王吉少時居長安其東家有棗樹臨吉庭中吉婦取以啖之吉知而去婦東家聞而欲伐樹鄰里止之因請吉還婦為之語曰東家有樹王陽婦去東家棗完去婦復還, SBCK: 爲樂}
