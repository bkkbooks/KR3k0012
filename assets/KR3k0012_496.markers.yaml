  - {type: variant, offset: 26, length: 0, content: '', SBCK: 作奏雖工冝去葛龔賈􅁩新書鄙諺曰欲投䑕而忌器此善喻也䑕近於器尚憚而弗投恐傷器也况貴大之臣近於主帝乎桓子新論曰􅀜東諺語曰人聞長安樂則出門而西向􅀏知肉味美則對屠門而大嚼又諺曰侏儒見一節而長短可知孔子言舉一隅足以三隅反觀吾小時二賦亦足以揆其能否崔寔政論曰毎詔書所欲禁絶雖重懇惻罵詈極筆由復廢捨終無悛意}
