  - {type: variant, offset: 489, length: 291, content: 就列不能者止家語孔子曰里語云相馬以車相士以君弗可廢也國語曰晉重耳過鄭鄭文公無禮叔詹曰若不禮則殺之諺曰黍稷無成不能為榮黍不能蕃蕪稷不能蕃殖所生不疑維德之基公不聽又曰景王將鑄無射之大林無射鍾名也其律中林鍾也鍾成伶人告和景王謂泠州鳩曰鍾果和矣對曰未可知也諺曰眾心成城眾口鑠金戰國策曰昔者茱莒好謀陳蔡好詐莒恃越而滅蔡信晉而亡語曰騏驥之衰也駑馬先之孟賁之倦也女子勝之又曰莊辛謂楚王曰鄙諺云見兔而顧犬未為晚也亡羊而補牢未為遲也史記曰鄙諺曰寧為雞口無為牛後又曰李將軍悛悛如鄙人口不能道辭及死知與不知皆為盡哀彼其忠實心誠信於士大夫也諺曰桃李不言下自成蹊此言雖小可以諭大又曰諺曰千金之子不死於市非空言, SBCK: ''}
