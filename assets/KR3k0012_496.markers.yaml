  - {type: punctuation, offset: 10, content: 《, id: KR3k0012_CHANT_496-bkkpn1}
  - {type: variant, offset: 10, length: 1, content: 說, SBCK: 成群許偉君曹操别傳曰吕布梟勇且有駿馬時人爲之語曰人中有吕布馬中有赤􅇠文士傳曰江應元時人諺曰嶷然希言江應元又曰留侯七丗孫張讃字子卿􅀄居吴縣相人里時人諺曰相里張多賢良積善應子孫昌習鑿齒襄陽記曰黄承産謂諸葛亮曰身有醜女才堪相配即載送之郷里語曰孔明擇婦正得外醜也和苞漢趙記曰陳安奮刀左右俱發隴上語曰隴上壯士有陳安丈八虵矛左右槃西京雜記曰韓嫣好彈以金爲丸一日所失者十餘長安爲之語曰􅀂飢寒逐彈丸京師兒童每聞嫣岀彈輙隨之望丸所落便拾取焉英雄記曰􅀽紹父成字文開貴盛自梁兾以下皆與交言無不從京師諺曰事不諧詣文開三輔决録曰馮豹字仲文後母遇之甚酷豹事之愈謹時人爲之語曰道德彬彬馮仲文又曰五門子孫凡民之伍門今在河南西四十里澗榖洛三水之交傳聞馬氏兄弟五人共居此地作五門客舎因以爲名主養猪賣豚故民爲之語曰苑中三公舘下二卿五門嚾嚾但聞豚聲又曰賈彪兄弟三人並有髙名彪最優故天下稱曰賈氏三虎偉節最怒又曰游殷字㓜齊爲胡􅎮所害月餘􅎮得病但言伏伏游㓜齊將􅀑來於是遽死􅀜中諺曰生有知人之明死有貴神之靈臨海異物志曰安家夷皆好噉猴頭羹諺言人寧􅀒人千石之粟不願􅀒人猴頭羮臛又曰䱥魚肥炙食甚美諺曰寧去累丗田宅不去䱥魚額風俗通曰趙王好大眉人間半額楚王好廣領國人没項齊王好細腰後宫有餓死者又曰延嘉中常侍單超左琯徐璜具瑗唐衡在帝左右縱其姦逸時人爲之語曰左迴天徐轉日具獨坐唐應聲言信用甚於轉圓也又曰里語曰縣官漫漫怨死者半六韜曰天下攘攘皆爲利往天下熈熈皆爲利來列子曰周諺曰田父可坐殺晨岀夜入自以性之恒啜菽茹藿自以味之極一朝處以軟毛綈薦以梁肉蘭味心㾓體煩内熱生病矣又曰揚朱曰古語有之生相怜死相􅂢此語至矣又曰趙子}
