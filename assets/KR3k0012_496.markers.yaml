  - {type: variant, offset: 2440, length: 258, content: 推服每聞玠言輒歎息絕倒故時人為之語曰衛玠談道平子絕倒又曰阮瞻見司徒王戎戎問曰聖人貴名教老莊明自然其旨同異瞻曰將無同戎咨嗟良久即命辟之時人謂之三語掾又曰劉惔字真長沛國相人也祖宏字終嘏光祿勳宏兄粹字純嘏侍中弟潢字沖嘏吏部尚書並有名中朝時人語曰洛中雅雅有三嘏又曰劉與字慶孫俊朗有才局與琨並尚書郎弈之甥名著當時京師為之語曰洛中弈弈慶孫越石又曰裴秀少好學有風操時人語曰後進領袖有裴秀又曰荀闓字道明亦有名稱京都為之語曰洛中英英荀道明又曰羊祜傳曰王衍嘗詣枯陳事辭甚俊辯祜不然之衍拂衣而起祜顧謂賓客曰王夷甫方以盛名處大位然敗俗傷化必, SBCK: 爭}
