  - {type: variant, offset: 2193, length: 0, content: '', WYG: 居約時相然信死豈顧問哉及據國爭權卒相滅亡勢利之交古人羞之續漢書曰孝靈皇帝於後園令宫人為列肆販賣使相偷盜爭鬭上臨視之以為樂東觀漢記曰執金吾賈復在汝南部將殺人潁川捕得冦恂乃戮之於市復以為恥過潁川謂左右曰吾今見恂必手劒之恂知其謀不欲與相見恂曰昔藺相如屈於廉頗者為國也乃勅屬縣盛供具一人皆兼二人之饌恂乃出迎於道稱疾還賈復勒兵欲追之而吏士皆醉遂過去恂以狀聞上乃徵恂恂至引見時復先在座欲起相避上曰天下未定兩虎安得私鬭又曰周黨字伯况太原人鄉佐發黨徭道於人中辱之黨學春秋長安聞復讎之義輒講下辭歸到與鄉佐相聞期鬭曰鄉佐多從兵往使鄉佐先拔刀然後與相擊鄉佐服其義勇}
