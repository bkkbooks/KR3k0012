  - {type: variant, offset: 14, length: 1, content: 傳, SBCK: 有}
  - {type: variant, offset: 14, length: 229, content: 傳言也俗言曰諺禮記大學曰故諺有之人莫知其子之惡莫知其苗之碩此謂身不脩不可以齊其家左傳隱公曰滕侯薛侯來朝爭長公使羽父請於薛侯曰周諺有之山有木工則度之賓有禮主則擇之周之宗盟異姓為後寡人若朝於薛不敢與諸任齒又曰虞叔有王虞公求旃弗獻既而悔之曰周諺有之疋夫無罪懷璧其罪吾焉用此其以賈禍也乃獻之又曰楚子為陳夏氏亂故伐陳殺夏徵舒滅陳為縣申叔時使於齊復命不賀王使讓之對曰人有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣又曰公孫歸父會楚子于宋宋人使樂嬰齊告急於, WYG: 下漢}
  - {type: variant, offset: 14, length: 1, content: 傳, krp: 有}
  - {type: variant, offset: 16, length: 0, content: '', SBCK: 察見淵魚者不祥智料隱逸者殃且君欲無盗莫􅀂舉賢而任之孟子曰齊人有言雖有智慧不如乗勢雖有鎡基不如待時齊人之諺語}
  - {type: variant, offset: 16, length: 0, content: '', krp: 察見淵魚者不祥智料隱逸者殃且君欲無盗莫若舉賢而任之孟子曰齊人有言雖有智慧不如乗勢雖有鎡基不如待時齊人之諺語}
