  - {type: punctuation, offset: 21, content: 《, id: KR3k0012_CHANT_496-bkkpn9}
  - {type: variant, offset: 21, length: 1, content: 禮, SBCK: 云不聦不明不能爲王不瞽不聾不能爲公蔣子萬機論曰學者如牛毛成者如鱗角又曰猛虎不處卑勢勁鷹不立垂枝抱朴子曰桓靈曰舉秀才不知書察孝廉父别居寒素清白濁如􅅺髙第良將怯如蠅又曰古人欲逹勤誦經今丗圖官勉治生啇君書曰公孫鞅謂秦孝公曰臣聞之疑行無名疑事無功君亟定變法之慮殆猶天下之議語曰愚者暗於成事智者見於未萌邯鄲氏􅀏林曰桓帝時有人辟公府椽者倩人作奏}
  - {type: page-break, offset: 21, content: '', id: KR3k0012_SBCK_496-4b}
  - {type: variant, offset: 21, length: 1, content: 禮, krp: 云不聦不明不能爲王不瞽不聾不能爲公蔣子萬機論曰學者如牛毛成者如鱗角又曰猛虎不處卑勢勁鷹不立垂枝抱朴子曰桓靈曰舉秀才不知書察孝廉父别居寒素清白濁如泥髙第良將怯如蠅又曰古人欲逹勤誦經今丗圖官勉治生啇君書曰公孫鞅謂秦孝公曰臣聞之疑行無名疑事無功君亟定變法之慮殆猶天下之議語曰愚者暗於成事智者見於未萌邯鄲氏笑林曰桓帝時有人辟公府椽者倩人作奏}
  - {type: punctuation, offset: 23, content: ‧, id: KR3k0012_CHANT_496-bkkpn10}
  - {type: variant, offset: 23, length: 0, content: '', SBCK: 文人不能爲作因語曰梁國􅁑龔者先善爲記文自可冩用不煩更作遂從人言冩記文不去龔名姓府公}
