  - {type: variant, offset: 27, length: 0, content: '', SBCK: 里語曰州郡記如霹􅆮得詔書但掛壁又曰一歳再赦奴兒噫唶况不􅁤之民熟不肆意應劭漢官儀曰里語云仕官不止車生耳蔡邕獨断曰古幘無巾王莽頭秃乃始施巾故語曰莽頭秃幘如屋王㓪貧窶語曰}
