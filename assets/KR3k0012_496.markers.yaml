  - {type: variant, offset: 244, length: 1258, content: 晉侯欲救之伯宗曰不可古人有言曰雖鞭之長不及馬腹天方授楚未可與爭雖晉之強能違天乎諺曰高下在心高下猶屈申也川澤納汙山藪藏疾瑾瑜匿瑕國君含垢含忍也垢恥也天之道也又曰韓厥曰古人有言曰殺老牛莫之敢尸而況君乎又曰梗陽人有獄魏戊不能斷以獄上其大宗賂以女樂魏子將受之閻沒女寬退朝待於庭饋入召之比置三歎魏子曰吾聞諸諺曰唯食忘憂吾子置食之間三歎何也同辭而對曰食畢願以小人之腹而為君子之心屬厭而已又曰晉侯假道於虞以伐虢宮之奇諫曰虢虞之表也虢亡虞必從之諺所謂輔車相依脣亡齒寒者其虞虢之謂乎論語曰孔子曰周任有言曰陳力就列不能者止家語孔子曰里語云相馬以車相士以君弗可廢也國語曰晉重耳過鄭鄭文公無禮叔詹曰若不禮則殺之諺曰黍稷無成不能為榮黍不能蕃蕪稷不能蕃殖所生不疑維德之基公不聽又曰景王將鑄無射之大林無射鍾名也其律中林鍾也鍾成伶人告和景王謂泠州鳩曰鍾果和矣對曰未可知也諺曰眾心成城眾口鑠金戰國策曰昔者茱莒好謀陳蔡好詐莒恃越而滅蔡信晉而亡語曰騏驥之衰也駑馬先之孟賁之倦也女子勝之又曰莊辛謂楚王曰鄙諺云見兔而顧犬未為晚也亡羊而補牢未為遲也史記曰鄙諺曰寧為雞口無為牛後又曰李將軍悛悛如鄙人口不能道辭及死知與不知皆為盡哀彼其忠實心誠信於士大夫也諺曰桃李不言下自成蹊此言雖小可以諭大又曰諺曰千金之子不死於市非空言也又曰樗里子滑稽多智號曰智囊秦人諺云力則任鄙智則樗里又曰司馬相如諫武帝故鄙諺曰家累千金者坐不垂堂此言雖小可以喻大漢書曰季布為任俠有名楚人諺曰得黃金百斤不如季布一諾又曰韋賢少子玄成復以明經歷位至丞相故鄒魯諺曰遺子黃金滿嬴不如一經又曰于定國決疑平法罪疑從輕加審慎之心朝廷稱之曰張釋之為廷尉天下無冤人于定國為廷尉人自以不冤又曰王莽篡立後復上符命者莽盡誅之時揚雄校書天祿閣使者欲收雄雄恐乃從閣自投幾死京師為之語曰惟寂惟寞自投于閣爰清爰靜無作符命又曰范增往說項梁曰夫秦滅六國楚最無罪自懷王入秦不反楚人憐之至今故南公稱楚雖三戶亡秦必楚又曰樓護字君卿與谷永俱為五侯上客長安號之曰谷子雲筆札樓君卿唇舌又曰成帝時王吉子駿為京兆尹試以政事先是京兆有趙廣漢張敞王尊王章至駿皆有能名故京師稱曰前有趙張後有三王又曰匡衡好學諸儒為之語曰無說詩匡鼎來匡說詩解人頤又曰少府五鹿充宗貴幸為梁丘易元帝好之欲考其異同令與諸易家論充宗辯口諸儒莫能抗有薦朱雲者召入攝齋登堂抗首而請音動左右故諸儒為之語曰五鹿嶽嶽朱雲折其角又曰文帝從灞陵欲馳下峻阪袁盎攬轡上曰將軍怯耶盎曰臣聞千金子不垂堂百金子不倚衡服虔曰惜身不倚衡也如淳曰衡樓殿邊棚楯又曰杜欽字子夏少好經書家富而目偏盲故不好為吏茂陵杜業與欽同姓字俱以才能稱於京師故衣冠謂欽為盲杜子夏以相別欽惡以疾見詆為小冠高廣材二寸由是京師更謂欽為小冠杜子夏而業為大冠杜子夏又曰劉輔諫成帝立趙后曰里語云腐木不以為柱卑人不可以為主又曰蕭育少與陳咸朱博為友著聞當世往者有王陽貢公故長安語云蕭朱結綬王貢彈冠言其相薦達也育與博後有隙不能終世以友為難又曰成帝為太子及即位以張禹論語為師以上難數對己問經為論語章句獻之諸儒為之語曰欲為論念張文由是學者多從張氏餘家浸微又, WYG: 春秋}
