  - {type: variant, offset: 1332, length: 343, content: 當世不亦優哉又曰謝夷吾轉下邳令預自剋死日如期果卒勑其子曰漢末嘗亂有發掘露骸之禍使縣棺下葬墓不起墳楚國先賢傳曰韓塈將終遺言曰夫俗奢示之以儉儉則節之以禮歷見前世送終過制失之甚也若曹敬聽吾言歛以時服葬以土藏穿畢便葬送之以瓦器慎勿有增益襄陽耆舊記曰襄陽城南邊大道有諸葛女郎墓者是諸葛仲茂女冢也年十三四亡茂婦憐之不能自遠故近臣葬之日日往哭又曰秦頡者字初起頡之南陽過宜城中一家東向大道住車視之曰此居處可作冢後喪還至此住處車不肯前故吏為市此宅葬之今宜城城中大冢前有二碑是也又曰有俍子者家訾萬金而自少小不從父語臨亡意欲葬山上恐兒不從到言葬我著瀦下石磧上俍子曰我田來不奉教從今當從此一語遂盡散家財作冢積土繞之成一洲長數百步元康中始為水所壞俍子前漢人也譙周三巴記曰巴國有亂巴國將畢曼子請師於楚楚人與師曼子已, SBCK: ''}
