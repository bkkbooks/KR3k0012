  - {type: variant, offset: 56, length: 1, content: 午, SBCK: 昭穆爲左右公君也圗謂畫其地形及丘壟所處而藏之先王造塋者昭居左穆居右夾處東西凢諸侯居左右以前卿大夫士居後以其旋子孫各就其所出王以尊卑處其前後而亦併昭穆凢死於兵者不入兆域􅀾敗無勇投諸塋外以罰之凢有功者居前居王墓之前處昭穆之中央以爵等爲丘封之度與樹數別尊卑也王公}
  - {type: page-break, offset: 56, content: '', id: KR3k0012_SBCK_557-1b}
  - {type: variant, offset: 56, length: 1, content: 午, WYG: 昭穆為左右公君也圖謂畫其地形及丘龍所處而塟之先王造塋者昭居左穆居右夾處東西凡諸侯居左右以前卿大夫士居後以其族子孫各就其所出王以尊卑處其前後而亦併昭穆凡死於兵者不入兆域戰敗無勇投諸塋外以罰之凡有功者居前居王墓之前處昭穆之中央以爵等為丘封之度與樹數别尊卑也王公曰丘諸臣封漢律曰列侯墤髙四尺闗内侯以下至庶人各有差大葬既有}
