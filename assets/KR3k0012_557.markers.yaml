  - {type: variant, offset: 2518, length: 46, content: 里名高陵不築牆不種樹立堂皇五間安欑圖勒大臣像又於堂皇東立重樓虎陵在鄴西北角既葬鄴中便亂其封域, SBCK: 國春秋曰晉義熈九年盗發}
  - {type: variant, offset: 2518, length: 504, content: 里名高陵不築牆不種樹立堂皇五間安欑圖勒大臣像又於堂皇東立重樓虎陵在鄴西北角既葬鄴中便亂其封域故未有名域云尋被掘凡此二陵皆偽葬右勒虎自別於深山風俗通曰王喬為葉令天下一玉棺於廳事前令臣吏試入不動搖喬曰天帝獨欲召我沐浴服飾寢其中蓋便立覆之宿昔葬於城東土自成墳其夕縣中牛皆流汗吐舌人無知之者皇覽曰舊漢家之葬方中百步穿築為方城其中開道足施六馬發三河三輔近郡卒徒十萬數復土姚信士緯曰蓋葬於寬平則恐後世都邑居之葬於陵野則恐民人耕稼及之厚槨大棺人所為用下一寡材木民人率多發掘以繕其居千墳萬壙無不毀者其唯瓦棺薄葬歛以時服依于高丘徹于深穽庶乎不辱耳語林曰王太保有二兒喪一兒欲還舊塋一兒欲留葬太保乃垂涕曰不忘故鄉仁也不戀本土達也唯仁與達吾二子有焉又曰王武子葬夕孫子荊哭之甚悲賓客莫不為垂涕哭畢向靈曰卿常好驢鳴今為卿作驢鳴既作體似真聲賓客莫不大笑孫聞笑顧謂曰諸君不死令王武子死賓客莫不皆怒須臾之間或悲或笑或怒世說曰阮藉葬母蒸一肥豚飲酒二斗然後臨決直言窮矣都得一號因吐血良久又鄧粲晉記曰籍母將死與人圍棊如故局者求止籍不肯留與決既而飲酒一二升舉聲一號吐血數升也又曰庾文康亡何楊州臨葬云埋王樹著土中使人情何能已文康庾亮謚也何楊州者何充也又, WYG: 國春秋}
