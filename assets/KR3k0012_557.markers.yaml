  - {type: variant, offset: 143, length: 3, content: 吳謀伐, SBCK: 驃􅀐將軍霍去病卒天子悼之發屬國􅀇甲軍陳自長安至茂陵爲冢像祁連山又曰嚴延年東海下邳人爲河南太守母來見執因大驚謂延年曰天道神明人不可獨殺我不自意當老見壯子􅀍刑戮也行矣爲汝東歸掃除墓地耳遂去歸郡見昆弟宗人復爲言之後􅀊餘果敗東海莫不賢其母又曰哀帝令將作爲董賢起冢營義陵傍内便房剛栢題湊外爲徼道周垣數里闕果罳甚盛果音浮罳音思又曰莽奏貶􅀓太后號爲定陶恭王母丁􅁎莽復言恭王母丁􅁎不臣妾至葬渭陵冡髙與元帝山}
  - {type: page-break, offset: 143, content: '', id: KR3k0012_SBCK_557-3b}
  - {type: variant, offset: 143, length: 1, content: 吳, WYG: 驃騎將軍霍去病卒天子悼之發屬國𤣥甲軍陳自長安至茂陵為塜像祁連山又曰嚴延年東海下邳人為河南太守母來見訊囚大驚謂延年曰天道神明人不可獨殺我不自意當老見壯子被刑戮也行矣為汝東歸掃除墓地耳遂去歸郡見昆弟宗人復為言之後歲餘果敗東海莫不賢其母又曰哀帝命將作為董賢起塜營義陵傍内便房剛栢題凑外為徼道周垣數里闕罘罳甚盛又曰莽奏貶傅太后為定陶恭王母丁太后為丁姬莽言恭王母不臣丁姬妾至葬渭陵冡髙與元帝山齊請發恭王母及丁姬塜取其璽綬消滅徙恭王母歸定陶葬王塜次而葬丁姬復其故太后以為已定之事不湏復發莽固争之後詔曰因改故棺為致椁作塜祠以太牢謁者護既發𫝊太后塜崩壓死殺數百人開丁姬椁火出四五丈吏卒以沃滅廼得入竞燔椁中物開傳太后椁時臭聞數里公卿在位皆阿莽共入錢帛遣子弟及諸生四夷凡十餘萬人操持作具助將作掘平恭王母丁姬塜二旬間皆平莽又周棘其處以為世誡云時有羣鸞數千銜土投丁姬穿中又曰張賀為掖庭令及宣帝即位賀已死子又早亡上追思賀恩封其冡置守冢二百家又曰夏侯勝字公長遷太𫝊卒官賜冡塋葬平陵太后為素服五日報師傅之恩儒者以為榮又曰原涉自以先人墳墓儉約非孝也廼大治冡舎周閣重門初武帝時京兆曹氏葬茂陵傍謂之為京兆阡涉慕之廼買地開道立署曰南陽阡人不肯從謂之原氏阡東觀漢記曰帝感李通首創大}
