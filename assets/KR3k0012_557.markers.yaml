  - {type: variant, offset: 147, length: 1, content: 齊, krp: 諸發恭王母及丁姬冢取其璽綬消滅徙恭王母歸定陶葬恭王冢次而葬丁姬復其故太后以爲旣巳之事不湏復發莽固争之后詔曰因改故棺爲致椁作冢祠以太牢謁者護旣發傳太后冢崩壓殺數百人開丁姬椁火出四五丈吏卒以水沃滅迺得入燒燔椁中器物開傳后棺臰聞數里公卿在位皆阿莽旨入錢帛追子弟及諸生四夷凡十餘萬人操持作具助將作掘平㳟王母丁姫冢二旬間皆平莽又周棘其豦以爲丗戒云時有羣鷰數千衘土投丁姬穿中又曰張賀爲掖庭令及宣帝即位賀巳死子又早亡上追思賀恩封其家恩德置守冢二百家又曰夏侯勝字公長遷太傅卒官賜冢塋葬平陵太后爲素服五日報師傳之恩儒者以爲榮斛縑五百疋除三子爲郎中長子壽服竟爲邸平侯相夢序告之曰乆客思郷里壽即弃官上書乞骸骨歸葬帝許之乃反舊塋焉魏略曰曹操微時人莫知之唯橋玄見而異焉謂曰今天下將亂安生民者其在君乎操感其知巳及後經過玄墓輙悽愴致祭魏志曰管輅過母丘儉墓下倚樹哀吟曰玄武藏頭倉龍無足白虎衘尸朱雀悲哭四危以備法當滅族卒如其言又曰幽州牧劉虞署田疇爲從事奉使未至虞巳爲公孫瓉所害及至謁祭虞墓陳章表哭泣而去呉書曰孫堅家于富春葬於城東冢上數有光恠雲氣五色王隱晉書曰𥘉太康元年汲縣民盗發魏安釐王冢得竹書􅃮字又曰交廣記呉將吕岱爲廣州遣掘尉他冢費損無獲他雖僣侈然慎終其身乃令後不知其豦鑒於牧堅所殘也又曰愍帝建興中曹嶷發}
  - {type: variant, offset: 150, length: 112, content: 使子女為質於吳吳王因為太子聘齊女齊女少思齊日夜哭泣發病闔閭乃起北門名曰齊門令女往遊其上女思不止病日益甚至且死女曰令死有知必葬海虞山之顛以望齊國闔閭傷之甚用其言葬於虞山之嶺以贍望齊國是時太子亦病而死說苑曰蓋聞相梁并衛有罪而走齊, SBCK: 及}
