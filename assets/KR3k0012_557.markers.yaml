  - {type: variant, offset: 2328, length: 188, content: 可送吾置彼石室巾褐香鑪此外無所須也及其亡日謹奉遺命葬經數年尸猶儼然葛巾覆之如初弗朽後忽不復見今舟行者過其山渚尚聞香氣咸異焉解道處齊記曰魏黃初三年文帝弟燮封濮陽王臨終顧命葬近蘧瑗之墓吾常想其為人願託賢哲之靈扶南傳曰頓愻國人死或鳥葬或火葬鳥葬者病困便歌儛送郭外有鳥如鵝綠色飛來萬計啄食都盡歛骨焚之沉之於海此上行必生天鳥若不食自悲傷乃就火葬取骨埋之是次行也鄴中記曰石勒陵在襄國城西南, SBCK: ''}
