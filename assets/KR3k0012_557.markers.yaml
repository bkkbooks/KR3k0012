  body:
  - {type: variant, offset: 5, length: 1, content: 五, SBCK: 六冢墓􅀃文曰冢髙墳也壟丘也墓兆域也釋名曰冢腫也象山頂之髙者腫起也墓孝子思慕之處也丘陵象其形也書曰武王克啇封比干之墓周禮曰大司徒以夲俗六安萬民一曰媺音美宫室二曰族墳墓又曰冢人掌公墓之地辨其兆域而爲之圖先王之}
  - {type: variant, offset: 5, length: 1, content: 五, WYG: 六塜墓說文曰塜髙墳也壟丘也墓兆域也釋名曰塜種也象山頂之髙者壠起墓孝子思慕之處也丘陵象其形也書曰武王克商封比干之墓周禮曰大司徒以本俗六安萬民一曰媺音美宫室二曰族墳墓又曰塜人掌公墓之地辨其兆域而為之圖先王之}
