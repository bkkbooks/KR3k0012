  - {type: variant, offset: 1887, length: 440, content: 葬所地故謂之馬冢焉又曰河內淇園張公老而無子貲財累億求沒入官死葬園中于今供祀犧牲永昌郡傳曰建寧郡葬夷置之積薪之上以火燔之煙氣正上則大殺牛羊共相勞賀作樂若遇風煙氣旁邪爾乃悲哭也豫章記曰許子將墓在郡南四里昔子將以中國大亂遠來渡江隨劉繇而卒藏于昌門裏于時漢興平二年也吳天紀中太守吳興沈季白日於廳事上坐忽然如夢見一人著黃單衣黃巾稱汝南羊與許子將求改葬因忽不見即求其喪不知豦所遂招魂葬之命文學施遐為招魂文越地傳曰禹井井者法也以為禹葬以度不煩人眾樂資九州志曰渡之塩官有奉禪山昔始皇過此而美之死因葬焉有廟在平地于今民祠之述征記曰荀氏葬在彭城東岸東岸有一丘民俗謂之荀氏葬或云斯則徐偃王葬后倉者也古徐國宮人娠而生卵棄之水濱有犬名后倉衘而歸伏而成人遂為徐之嗣君純筋無骨號曰偃王偃王躬行仁義眾國附之得朱弓之瑞周穆王命楚滅之后倉將死生角九尾實黃龍也又曰魚山臨清河舊屬東阿東阿王曹植每升此山有終焉之志植之所遊池沼溝渠悉存既葬于山西有二石柱猶存也地今割并穀城鄧德明南康記曰陽道士葬巖右室元嘉中道士過世臨終語弟子, SBCK: 止蕭方}
