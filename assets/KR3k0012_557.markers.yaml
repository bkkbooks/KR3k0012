  - {type: variant, offset: 143, length: 3, content: 吳謀伐, krp: 驃騎將軍霍去病卒天子悼之發屬國玄甲軍陳自長安至茂陵爲冢像祁連山又曰嚴延年東海下邳人爲河南太守母來見執因大驚謂延年曰天道神明人不可獨殺我不自意當老見壯子𬒳刑戮也行矣爲汝東歸掃除墓地耳遂去歸郡見昆弟宗人復爲言之後歲餘果敗東海莫不賢其母又曰哀帝令將作爲董賢起冢營義陵傍内便房剛栢題湊外爲徼道周垣數里闕果罳甚盛果音浮罳音思又曰莽奏貶傳太后號爲定陶恭王母丁姬莽復言恭王母丁姬不臣妾至葬渭陵冡髙與元帝山}
  - {type: variant, offset: 145, length: 3, content: 伐齊齊, WYG: 每幸南陽常遣使者以太牢祠通冡又曰建武三年以皇祖皇考墓為昌陵後改為章陵因以舂陵為章陵縣二十六年春正月初作夀陵將作大匠竇融上言園陵廣寰無慮所用帝曰古帝王之葬皆陶人瓦器木車茅馬使後世之人不知其處太宗始終之義景帝能遵孝道遭天下反覆而獨完其福豈不美哉今所制地不過二三頃無為陵地裁令流水而已又曰祭彤字次孫早孤以至孝稱值天下亂野無烟火而彤獨在塜側每賊過見其尚㓜而有志節竒而哀之後漢書曰楊震字伯起改葬華隂逺近畢至先葬日有鳥髙丈餘喪前悲鳴葬畢乃去於是立石鳥像於其墓所又曰郭伋徵大中大夫卒時年八十六帝親臨賜塜塋地又曰种暠上音冲下音杲為遼東郡薨并凉邊民咸為發哀匈奴聞暠卒舉國傷惜單于每入朝賀見墳墓輙哭祭又曰帝祠章陵過湖陽祠樊重墓追爵謚為夀張敬侯立廟於湖陽車駕每南廵帝幸其墓賞賜大會又曰韓稜遷南陽太守特聴得過家上冡郷里以為榮又曰蔡順母平生畏雷自亡後每有震雷順輙圜冡泣曰順在此後太守鮑衆舉孝亷順不能逺離墳墓遂不就又曰温序拜謁者遣護𦍑校尉序行部至襄武為隗囂别將荀字所拘刼伏劒而死序主簿韓遵從事王忠持屍歸殮光武聞而憐之命忠送喪到洛陽城傍為冡地賜榖千斛縑五百疋除三子為郎中長子夀服竟為𤣥平侯相夢序告之曰乆客思鄉里夀即棄官上書乞骸骨歸葬帝許之乃反舊塋焉魏畧曰曹操微時人莫知之惟橋𤣥見而異焉謂曰今天下將亂安之者其在君乎操感其知已及後經過𤣥墓輙悽愴致祭魏志曰管輅過毌丘儉墓下倚樹哀吟曰𤣥武藏頭蒼龍無足白虎銜尸朱雀悲哭四危以備法當滅族卒如其言又曰幽州牧劉虞署田疇為從事奉使未至虞已為公孫瓚所害及至謁祭虞墓陳章表哭泣而去吴書孫堅家在富春塟于東城冡上數有光怪雲氣五色王隠晉書曰初太康元年汲縣民盗發魏安釐王塜得竹書漆字又曰交廣記吴將吕岱為廣州遣掘尉佗塜費損無獲佗雖僣然能慎終其身乃令後不知其處鑒于牧豎所殘也又曰愍帝建興中曹嶷發}
