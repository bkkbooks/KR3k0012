  - {type: variant, offset: 70, length: 2, content: 吳王, SBCK: 墓大夫掌凢􅀖墓之域爲之圖凡􅀖中之墓地民所葬地令國民族葬而掌其禁令族葬各徒其親凢爭墓地者聽其獄訟師其属而巡墓厲居其中之室以守之厲營限遮列處禮曰適墓不登壟爲甘不敬塵冢也墓笙域助葬必執紼葬喪之大事紼引車索又曰孔子旣得合葬於防言旣得者少􅀌不知其墓曰吾聞之古者墓而不墳墓謂兆域土之髙者日墳也今丘也東西南北之人不可以不識音志也於是封之崇四尺四尺盖周之制也孔子先反當脩虞事門人後雨甚至後持封也孔子問焉曰尓來何遲也曰防墓崩孔子不應三三言之以孔子弗問孔子泫然流涕曰吾聞之也古不脩墓脩猶治也又曰易墓非古也易謂墓治草木不易者丘陵也又曰曽子曰朋友之墓有􅀫草而不哭焉􅀫草謂陳根也爲師必喪三年於朋友期可又曰子路去魯謂顔淵曰何以贈我贈送曰吾聞之也去國則􅂘于墓而後行反其國不􅂘展墓而入無君事主於孝􅂘言衣去也展省袒之謂子利曰何以處我處猶安也子路曰吾聞之也過墓則式過祀則下治者主於故又曰晉趙文子曰叔譽觀于九原叔譽叔向也文子曰死者如可作也吾誰與歸叔譽曰其陽豦父乎文子曰行并植於晉國不没其身其智不足稱也并猶專也謂㓻而專巳爲狐射姑所殺没終也其咎犯乎文子曰見利不頋其君仁不足稱也謂與文子避難至反國無安君之心及河授壁要君以利也我則隨武子乎利其君不忘其身謀其身不遺其友武子士㑹也晉人謂文子知人傳曰譽叔曰晉人禦師必於殽殽有二陵焉其南陵夏后臯之墓也又曰鄭子展子産帥車七百乗伐陳陳侯扶其太子偃師奔墓欲逃冢問也又曰呉將伐齊越子率其衆以朝呉將皆喜唯子胥懼曰是豢呉也夫}
