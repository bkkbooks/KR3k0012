  - {type: variant, offset: 60, length: 5, content: 今武里午日, SBCK: 庶人各有差大喪記有曰請庶甫竁遂爲之尸竁尸絹切又士汭切葬穿壙也又音毳及竁以度爲丘遂共喪之􅉎器及葬言鸞車象人鸞車巾車所飾遣車也亦設鸞於象人謂以芻爲人言問其}
  - {type: variant, offset: 60, length: 5, content: 今武里午日, krp: 庶人各有差大喪記有曰請庶甫竁遂爲之尸竁尸絹切又士汭切葬穿壙也又音毳及竁以度爲丘遂共喪之窆器及葬言鸞車象人鸞車巾車所飾遣車也亦設鸞於象人謂以芻爲人言問其}
  - {type: variant, offset: 66, length: 2, content: 舉火, SBCK: 如法度者及􅉎報斧以涖臨下棺也遂入藏凶器正墓域守墓蹕墓域守墓禁位謂丘封所居前後之禁所爲榮限凢􅀕墓爲尸凢諸侯及諸臣葬於墓者授之兆爲之蹕均其禁}
  - {type: variant, offset: 66, length: 2, content: 舉火, WYG: 如法及􅉎執斧以涖臨下棺也遂入藏凶器正墓位蹕墓域守墓禁位謂丘封所居前後也禁所謂營限也凡祭墓為尸凡諸侯及諸臣塟於墓者授之兆為之蹕均其禁}
