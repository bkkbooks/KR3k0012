  - {type: variant, offset: 58, length: 1, content: 死, SBCK: 丘諸臣封漢律日列侯墳髙四尺関内侯以下}
  - {type: variant, offset: 58, length: 7, content: 死至今武里午日, WYG: 請度甫竁遂為之尸竁尺絹切又上内切葬穿壙也又音串及竁以度為丘遂共喪之􅉎器及葬言鸞車象人鸞車巾車所飾遣車也亦設鸞旗象人謂以芻為人言問其}
  - {type: variant, offset: 58, length: 1, content: 死, krp: 丘諸臣封漢律日列侯墳髙四尺関内侯以下}
