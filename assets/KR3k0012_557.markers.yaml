  - {type: variant, offset: 70, length: 2, content: 吳王, WYG: 墓大夫掌邦墓之域為之圖凡邦中之墓地民所塟地令國民族塟而掌其禁令族塟各從其親凡争墓地者聴其獄訟帥其屬而廵墓厲居其中之室以守之厲塋限遮列禮曰適墓不登壠助葬必執紼禮記曰孔子既得合葬於防言既得者少孤不知其墓曰吾聞之古者墓而不墳墓謂兆域土之髙者曰墳今丘也東西南北之人不可以不識音志也於是封之崇四尺四尺葢周之制也孔子先反掌修虞事門人後雨甚至後時封也孔子問焉曰爾來何遲也曰防墓崩孔子不應三三言之以孔子弗聞孔子泫然流涕曰吾聞之也古不脩墓脩猶治也又曰易墓非古也又曰孔子曰朋友之墓有宿草而不哭焉宿草謂陳根也為師喪三年於朋友期可又曰子路去魯謂顔淵曰何以贈我贈送曰吾聞之也去國則哭于墓而後行反其國不哭展墓而入無君事主於孝哭言哀去展省視之謂子路曰何以處我處猶安也子路曰吾聞之也過墓則式過祀則下居者主致敬又曰晉趙文子與叔譽觀于九原叔譽叔向也文子曰死者如可作也吾誰與歸叔譽曰其陽處父乎文子曰行并直於晉國不没其身其智不足稱也并猶専也謂剛而専已為狐射姑所殺没終也其咎犯乎文子曰見利不顧其君仁不足稱也我則隨武子乎利其君不忘其身謀其身不遺其友晉人謂文子知人左傳曰蹇叔曰晉人禦師必於殽殽有二陵焉其南陵夏后臯之墓也又曰鄭子展子産帥車七百乘伐陳陳侯扶其太子􅅯師奔墓又曰吴將伐齊越子率其衆以朝吴將皆喜唯子胥懼曰是豢吴也夫}
