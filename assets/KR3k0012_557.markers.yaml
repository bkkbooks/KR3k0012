  - {type: variant, offset: 147, length: 1, content: 齊, SBCK: 諸發恭王母及丁􅁎冢取其璽綬消滅徙恭王母歸定陶葬恭王冢次而葬丁􅁎復其故太后以爲旣巳之事不湏復發莽固争之后詔曰因改故棺爲致椁作冢祠以太牢謁者護旣發􅀓太后冢崩壓殺數百人開丁􅁎椁火出四五丈吏卒以水沃滅迺得入燒燔椁中器物開􅀓后棺臰聞數里公卿在位皆阿莽旨入錢帛追子弟及諸生四夷凡十餘萬人操持作具助將作掘平㳟王母丁姫冢二旬間皆平莽又周􅁄其豦以爲丗戒云時有羣鷰數千衘土投丁􅁎穿中又曰張賀爲掖庭令及宣帝即位賀巳死子又早亡上追思賀恩封其家恩德置守冢二百家又曰夏侯勝字公長遷太傅卒官賜冢塋葬平陵太后爲素服五日報師􅀓之恩儒者以爲榮斛縑五百疋除三子爲郎中長子壽服竟爲邸平侯相夢序告之曰乆客思郷里壽即弃官上書乞骸骨歸葬帝許之乃反舊塋焉魏略曰曹操微時人莫知之唯橋玄見而異焉謂曰今天下將亂安生民者其在君乎操感其知巳及後經過玄墓輙悽愴致􅀕魏志曰管輅過母丘儉墓下􅀝樹哀吟曰玄武藏頭倉龍無足白虎衘尸朱雀悲哭四危以備法當滅族卒如其言又曰幽州牧劉虞署田疇爲從事奉使未至虞巳爲公孫瓉所害及至謁􅀕虞墓陳章表􅂘泣而去呉書曰孫堅家于富春葬於城東冢上數有光恠雲氣五色王隱晉書曰􅀄太康元年汲縣民盗發魏安釐王冢得竹書􅃮字又曰交廣記呉將吕岱爲廣州遣掘尉他冢費損無獲他雖僣侈然慎終其身乃令後不知其豦鑒於牧堅所殘也又曰􅉖帝建興中曹嶷發}
