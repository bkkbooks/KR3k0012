  - {type: variant, offset: 2616, length: 794, content: 天帝獨欲召我沐浴服飾寢其中蓋便立覆之宿昔葬於城東土自成墳其夕縣中牛皆流汗吐舌人無知之者皇覽曰舊漢家之葬方中百步穿築為方城其中開道足施六馬發三河三輔近郡卒徒十萬數復土姚信士緯曰蓋葬於寬平則恐後世都邑居之葬於陵野則恐民人耕稼及之厚槨大棺人所為用下一寡材木民人率多發掘以繕其居千墳萬壙無不毀者其唯瓦棺薄葬歛以時服依于高丘徹于深穽庶乎不辱耳語林曰王太保有二兒喪一兒欲還舊塋一兒欲留葬太保乃垂涕曰不忘故鄉仁也不戀本土達也唯仁與達吾二子有焉又曰王武子葬夕孫子荊哭之甚悲賓客莫不為垂涕哭畢向靈曰卿常好驢鳴今為卿作驢鳴既作體似真聲賓客莫不大笑孫聞笑顧謂曰諸君不死令王武子死賓客莫不皆怒須臾之間或悲或笑或怒世說曰阮藉葬母蒸一肥豚飲酒二斗然後臨決直言窮矣都得一號因吐血良久又鄧粲晉記曰籍母將死與人圍棊如故局者求止籍不肯留與決既而飲酒一二升舉聲一號吐血數升也又曰庾文康亡何楊州臨葬云埋王樹著土中使人情何能已文康庾亮謚也何楊州者何充也又曰晉明帝亦解冢宅聞郭璞為人葬後微服往看因問君何以葬龍角此法當滅族主人荅云郭景純云此是葬龍耳不出三年當致天子明帝復問云為是出天子耶荅非能出招致天子耳相冢書曰凡葬龍耳富貴出五侯葬龍頭暴得富貴人不能見葬龍口賊子孫葬龍齒三年暴死葬龍咽死滅門葬龍腮必卒死天子葬高山諸侯葬連崗庶人葬平地應璩新詩曰野田何紛紛城郭何落落埋葬嫁娶家皆是商旅客喪側食不飽酒肉紛狼籍晉武帝賜劉廙葬錢詔曰故侍中劉廙以清識明鑒有聲前代昔宣皇帝接以師友之恩廙墓為盜賊所發甚用惻然其子阜素甚清貧今當殯葬其給轜車銘旌賜錢給作藏人功至時遺使者祭之晉賜王沉葬錢并地詔曰故驃騎將軍王沉忠允篤誠執德弘毅外清方夏內熙袞職歷位著稱厥功茂焉不幸薨殞志業未究今當葬其賜錢三十萬葬田一頃晉賜傳嘏夫人鮑葬錢詔曰故太常傅嘏昔以令德賢才為先帝所接登龍之際有翼贊盡忠之勳早代殯沒不終功業每念其遺績常存於心今嘏夫人鮑當葬賜錢十萬給作藏人功嘏墓開祭以少牢, SBCK: ''}
