  - {type: variant, offset: 1016, length: 239, content: 相謝言絕而亡翼賣素買衣衾殯殮之葬埋高敞之地以金置棺下不使人知乘馬去公卿兄長公見翼乘馬謂必殺公卿陰告官收翼具以狀對長公迎喪發棺下得金如數叩頭謝以金投其門中翼送長安還之汝南先賢傳曰袁閎字夏甫延熹末黨事將作閎遂散髮乃築土室四周於庭潛身十八年終于土室之中臨卒勑其子曰勿設殯棺衣衾之備也但著禈衫踈布單衣幅巾襯尸於板床之上五百墼為藏會稽典錄曰趙曄字長君山陰人也少為縣吏奉檄迎督郵曄甚恥之由是委吏到犍為詣慱士杜撫受韓詩撫嘉其精力盡以其道授之積二十年不還家人為之發喪制服至撫卒曄經營葬之然後歸家, SBCK: 聞髙祖卧疾望墳掩淚}
