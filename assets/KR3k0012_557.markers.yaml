  - {type: variant, offset: 479, length: 529, content: 葬於芷陽明帝葬於洛南皆不藏珠寶不起山陵今京師貴戚郡縣豪家生不極養死乃崇喪造起大冢廣樹松柏廬舍祠堂務崇侈僣此無益於終無益於孝徒作煩擾傷害吏民今案畢鎬之郊無文武之陵南城之東無曾晢之冢周公非不忠曾子非不孝也崔寔政論曰送終之家亦大無度至念親將終無以奉遣乃約其供養衣服豫脩已沒之制竭家盡業甘之不恨窮阨既迫起為盜賊拘執陷罪為世大戮痛乎此俗之愚民也錄異傳曰袁安葬其母逢三書生語其葬處遂至四世五公其後公路年十八驕豪故常食密飯諸女以絳為地道遊行其上此葬地所致也謝綽宋拾遺曰桓溫葬姑熟之青山平墳不為封域於墓傍開隧立碑故謬其處令後代不知所在襄陽耆舊傳曰峴山南有習家魚池者習郁之所作也郁將亡勑其兒煥曰我葬必近魚池煥為起冢於池之北去池四十步山謙之丹陽記曰晉車騎將軍王舒令其子曰甚愛漂陽縣死則我欲葬焉故王死之後徙縣治今豦而以昔解為墓續搜神記曰干寶字令升新蔡人其父有嬖妾母至妒寶父葬時因推著藏中經十年而母喪開墓見棺妾伏棺上衣服如生就視猶暖漸漸有氣息與歸經日乃蘇云父常與之寢接恩情如生在家中范晏陰德傳曰陳翼字春卿廬江舒人也行到縣郭見道上馬傍有臥疾人呼翼與語曰吾是長安魏公卿聞廬江樂土來下道病困不能復前儻可相救翼荅云家有弊廬可俱歸乎公卿曰幸甚即扶與俱到家養視積日既困公卿謂翼曰馬上有金千餘餅素, SBCK: 元嘉}
