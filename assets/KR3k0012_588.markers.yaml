  - {type: variant, offset: 1859, length: 0, content: '', krp: 漢德帝雅好文章自見駰頌後常嗟歎之問侍中竇憲曰寧知崔駰乎對曰班固數爲臣說之然未見帝曰}
  - {type: variant, offset: 1860, length: 0, content: '', SBCK: 愛班固而忽崔駰此葉公之好龍也可試見之駰由此候憲憲屣履迎門􅀏謂駰曰亭伯吾受詔交公何得薄我哉遂揖入以爲上客又曰傳毅與班固賈逵共典校書毅追羙孝明帝功德最盛而廟頌未立乃依清廟作顯宗頌十篇奏之又曰平望侯劉毅以和熹鄧太后有德教請令史官著長樂宫聖德頌以敷宣景耀勒勲金石縣之日月攄之罔極以崇陛下蒸蒸之孝帝從之魏志曰黃􅀄三年黃龍見鄴西漳水中山王褒上頌賜黃金十斤晉春秋曰懷帝䧟於平陽劉聦加帝開府儀同三司㑹稽郡公引帝入醼謂帝曰}
  - {type: variant, offset: 1860, length: 0, content: '', krp: 愛班固而忽崔駰此葉公之好龍也可試見之駰由此候憲憲屣履迎門笑謂駰曰亭伯吾受詔交公何得薄我哉遂揖入以爲上客又曰傳毅與班固賈逵共典校書毅追羙孝明帝功德最盛而廟頌未立乃依清廟作顯宗頌十篇奏之又曰平望侯劉毅以和熹鄧太后有德教請令史官著長樂宫聖德頌以敷宣景耀勒勲金石縣之日月攄之罔極以崇陛下蒸蒸之孝帝從之魏志曰黃𥘉三年黃龍見鄴西漳水中山王褒上頌賜黃金十斤晉春秋曰懷帝䧟於平陽劉聦加帝開府儀同三司㑹稽郡公引帝入醼謂帝曰}
  - {type: variant, offset: 1861, length: 0, content: '', SBCK: 爲豫章王時朕與王武子俱造卿武子稱朕於卿卿言聞名乆矣卿以所作樂府文示朕曰劉君聞君善詞賦試爲㸔也朕與武子俱爲盛德頌卿稱善者乆之又引朕射于皇堂朕得十二籌卿與武子俱得九籌卿又贈朕柘弓銀硯卿頗憶否帝曰安敢忘之恨尔日不得早識龍顔聦曰卿家骨肉何相殘之甚邪帝曰此殆非人事皇天意也大漢將興應乾受暦故爲陛下自相驅耳且臣家􅀂能奉武皇帝之業九族敦睦陛下何由得之聦甚有喜色晉書曰劉臻妻陳氏聦敏能屬文嘗正旦}
