  - {type: variant, offset: 3350, length: 415, content: 年乃成門庭戶席皆置筆硯遇得一句即便䟽之賦成時人皆有譏訾思意甚不愜後示張華華曰此二京可三然君又未重於世宜以示高名之士思乃請序皇甫謐謐見之嗟嘆遂為作序於是先相訾者莫不斂袵讚述焉陸機入洛欲為此賦聞思作之撫掌而笑與第雲書此聞有傖父欲作三都賦須其成當以覆酒瓮耳及思賦出機絕歎服以為不能加也又曰袁宏作東征賦列稱過江諸名德而獨不載桓彝溫甚恨之嘗以問宏宏曰尊君稱位非下官敢專既未遑啟故不敢顯之溫曰君欲何為詞宏即荅云風鑒散朗或搜或引身雖可亡道不可殞溫乃喜又不道陶侃侃子胡奴抽刃於曲室問袁君賦云何忽袁急而荅曰大道尊公何言無因曰精金百鍊在割能斷功以治民職思靜亂長沙之勳為史所讚胡奴乃止金樓子云劉休玄好學有文才為水仙賦時人以為不減洛神賦擬古詩時人謂陸士衡之流也余謂水仙不及洛神擬古勝乎士衡矣閩川名士傳曰貞元中杜黃裳知貢舉試珠還合浦賦進士林藻賦成憑几假寐夢人謂之曰君賦甚佳但恨未敘珠來去之意爾藻悟視其草乃足四句其年擢第謝杜黃裳謂曰唯林生敘珠來去之意若有神助, SBCK: 八}
  - {type: variant, offset: 3350, length: 415, content: 年乃成門庭戶席皆置筆硯遇得一句即便䟽之賦成時人皆有譏訾思意甚不愜後示張華華曰此二京可三然君又未重於世宜以示高名之士思乃請序皇甫謐謐見之嗟嘆遂為作序於是先相訾者莫不斂袵讚述焉陸機入洛欲為此賦聞思作之撫掌而笑與第雲書此聞有傖父欲作三都賦須其成當以覆酒瓮耳及思賦出機絕歎服以為不能加也又曰袁宏作東征賦列稱過江諸名德而獨不載桓彝溫甚恨之嘗以問宏宏曰尊君稱位非下官敢專既未遑啟故不敢顯之溫曰君欲何為詞宏即荅云風鑒散朗或搜或引身雖可亡道不可殞溫乃喜又不道陶侃侃子胡奴抽刃於曲室問袁君賦云何忽袁急而荅曰大道尊公何言無因曰精金百鍊在割能斷功以治民職思靜亂長沙之勳為史所讚胡奴乃止金樓子云劉休玄好學有文才為水仙賦時人以為不減洛神賦擬古詩時人謂陸士衡之流也余謂水仙不及洛神擬古勝乎士衡矣閩川名士傳曰貞元中杜黃裳知貢舉試珠還合浦賦進士林藻賦成憑几假寐夢人謂之曰君賦甚佳但恨未敘珠來去之意爾藻悟視其草乃足四句其年擢第謝杜黃裳謂曰唯林生敘珠來去之意若有神助, WYG: 八}
