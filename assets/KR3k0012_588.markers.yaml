  - {type: variant, offset: 3152, length: 197, content: 藏出地以手收之覺大少氣病一歲余少好文見子雲工為賦頌欲從學子雲曰能讀千賦則善之矣魏文典論曰今之文人魯國孔融廣陵陳琳山陽王粲北海徐幹陳留阮瑀汝南應璩東平劉楨此七子者於學無所遺於辭無所假如粲之初征登樓槐賦幹之玄猨漏巵團扇枕賦雖張蔡不過也陳琳阮禹之章表書記今之儁也應璩和而不壯劉楨壯而不密孔融體氣高妙有過人者魏文臨渦賦曰余從上拜墳乘馬過水相佯高樹之下駐馬書鞭為臨渦賦世說曰左思字太冲齊國臨淄人也作三都賦, SBCK: 百八}
