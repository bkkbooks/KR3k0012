  - {type: variant, offset: 1877, length: 1, content: 詩, SBCK: 羣司亦各書其志吾將覽焉於是内外臣竂並上甘棠頌南史曰梁大同中嘗驟􅀨殿前徃徃有雜色寳珠梁武觀之甚有喜色虞􅀉因上瑞雨頌帝謂􅀉兄荔曰此頌典裁清拔卿之士龍也將加擢用􅀉聞之歎曰羙盛德之形容以申擊壤之情耳吾豈買名求仕者乎後周書曰顔之儀㓜潁悟三歳能讀孝經及長􅀶渉羣書好爲詞賦嘗獻神州頌辭以雅贍梁元帝手勑報曰枚乗二葉俱得遊梁應貞兩丗並稱文學我求才子鯁慰良深江陵平之儀隨例遷長安丗宗以爲麟趾學士隋書志曰比齊中書侍郎杜臺卿上丗祖武成皇帝頌齊主以爲未能盡善令和士開以頌示卒德林宣旨云臺卿此文未當朕意以卿有大才湏叙盛德即冝速作急進本也德林乃上頌十六章并}
  - {type: page-break, offset: 1877, content: '', id: KR3k0012_SBCK_588-3b}
  - {type: variant, offset: 1877, length: 5, content: 詩序則同義, WYG: 無兼年之食遇天饑臣妾非其臣妾也卿大夫無兼年之食遇天饑臣妾轝馬非其有也國無兼年之食遇天饑百姓非其有也左}
  - {type: variant, offset: 1877, length: 1, content: 詩, krp: 羣司亦各書其志吾將覽焉於是内外臣竂並上甘棠頌南史曰梁大同中嘗驟雨殿前徃徃有雜色寳珠梁武觀之甚有喜色虞寄因上瑞雨頌帝謂寄兄荔曰此頌典裁清拔卿之士龍也將加擢用寄聞之歎曰羙盛德之形容以申擊壤之情耳吾豈買名求仕者乎後周書曰顔之儀㓜潁悟三歳能讀孝經及長博渉羣書好爲詞賦嘗獻神州頌辭以雅贍梁元帝手勑報曰枚乗二葉俱得遊梁應貞兩丗並稱文學我求才子鯁慰良深江陵平之儀隨例遷長安丗宗以爲麟趾學士隋書志曰比齊中書侍郎杜臺卿上丗祖武成皇帝頌齊主以爲未能盡善令和士開以頌示卒德林宣旨云臺卿此文未當朕意以卿有大才湏叙盛德即冝速作急進本也德林乃上頌十六章并}
