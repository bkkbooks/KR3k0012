  - {type: variant, offset: 1982, length: 3, content: 詩畫境, WYG: 交冀行多不軌琦數引古今成敗以誡之冀不能受作外戚箴晉書曰張華懼后族之盛作女史箴以為諷賈后雖凶妬而知敬重華又曰文帝子齊王攸武帝時為太子太傅獻箴於太子其畧曰毋曰父子之間昔有江充毋曰至親靡二或客潘崇䛕言亂真譛潤離親驪姬之讒晉侯疑申固親以道勿固以恩修身以敬勿託以尊世以為工後周書曰齊王憲友劉休徴獻王箴一首憲美之休徴後又以此箴上高祖高祖方剪削諸弟甚恱其文唐書曰元和中吏部郎中栁公綽獻太毉箴曰寒暑滿天地之間浹肌膚於外玩好溢耳目之前誘心知於内清潔為隄奔射猶敗氣行無間隙不在大睿聖之姿清明絶俗心正無邪志髙寡欲謂天髙矣氣蒙晦之謂地厚矣横流潰之聖徳超邁萬方頼之飲食所以資身也過則生患衣服所以稱徳也侈則生慢惟過與侈心必隨之氣與心流疾亦伺之上深嘉嘆降中使勞問又曰敬宗遊幸無度李徳裕獻丹扆箴}
