  - {type: variant, offset: 94, length: 10, content: 士逸在布衣賢人失志之, WYG: 儀幼頴悟三嵗能讀孝經及長博渉書書好為詞}
  - {type: punctuation, offset: 99, content: ，, id: KR3k0012_CHANT_588-bkkpn31}
  - {type: 'tls:seg', offset: 99, content: '', id: KR3k0012_CHANT_588-2a.13}
  - {type: variant, offset: 105, length: 36, content: 作矣孫卿及楚臣屈原離讒憂國皆作賦以風諭咸以惻隱古訓之義也其後宋玉唐勒漢興, WYG: 嘗獻神州頌詞致雅贍梁元帝手勅報曰}
