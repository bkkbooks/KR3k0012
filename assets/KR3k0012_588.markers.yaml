  - {type: variant, offset: 2172, length: 6, content: 成豔賈誼鳥致, SBCK: 資身也過則生患衣服所以稱德也侈則生慢惟過與侈心必隨之氣與心流疾亦伺之上深嘉歎降中使勞問又曰敬宗遊幸無度李德􅁉獻丹扆箴六首霄衣箴曰先王聽政昧爽以俟鷄鳴旣盈日岀而視伯禹大聖寸隂爲貴光武至仁反支不忌無俾姜后獨去􅆪珥彤管記言克念前志又有正服罷獻納誨}
