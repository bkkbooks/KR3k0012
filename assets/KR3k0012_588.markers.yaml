  - {type: variant, offset: 143, length: 1, content: 司, WYG: 二葉俱得遊梁應貞兩世並稱文學我求才子鯁慰良深江陵平之儀隨例遷長安世宗以為麟趾學士隋書曰北齊中書侍郎杜䑓卿上世祖武成皇帝頌齊主以為未能盡善令和士開以頌示李徳林宣㫖云䑓卿此文未當朕意以卿有大才須叙盛徳即宜速作急進本也徳林乃上頌十六章並序武成覽頌善之賜名}
