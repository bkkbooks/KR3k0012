  - {type: variant, offset: 79, length: 14, content: 道寖壞聘問歌詠不行於列國歌詠, WYG: 書曰顔}
  - {type: punctuation, offset: 82, content: ，, id: KR3k0012_CHANT_588-bkkpn29}
