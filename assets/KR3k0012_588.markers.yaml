  - {type: variant, offset: 2162, length: 0, content: '', SBCK: 憲章武銘而水火井竈繁辭不巳志有偏也夫箴誦於經銘題於器名用雖異而警戒實同箴全禦過故文資确切銘兼褒讃故理貴弘潤取其要也然天言之道盖闕庸器之制乆淪所}
  - {type: variant, offset: 2162, length: 0, content: '', krp: 憲章武銘而水火井竈繁辭不巳志有偏也夫箴誦於經銘題於器名用雖異而警戒實同箴全禦過故文資确切銘兼褒讃故理貴弘潤取其要也然天言之道盖闕庸器之制乆淪所}
  - {type: variant, offset: 2163, length: 4, content: 會新相如, SBCK: 箴銘實用罕施後代惟秉文君子冝酌其逺大矣陸士衡文賦曰箴頓挫而清壯周書曰夏箴曰小人無兼年之食遇天饑妻子非其妻子也大夫無兼年之食遇天饑臣妾非其臣妾也卿大夫無兼年之食遇天饑臣妾􅓅馬非其有也國無兼年之食遇天饑百姓非其有也左傳襄元曰昔周辛甲之爲太史命百官官箴王闕辛甲周武王太史也闕過也百官各以箴以誡王過也於虞人之箴曰虞人掌田獵者芒芒禹跡畫爲九州芒芒逺貌也畫分也經啓九道九道九州之道也啓開也民有􅃦廟獸有茂草各有攸處德用不擾人神各有歸故德不亂也在帝夷羿冐于原獸冐貪忘其國恤而思其麀牡言但念獵武不可重重猶數也用不恢于夏家羿以好武雖有夏家而不能恢大也獸臣司原敢告僕夫獸臣虞人也告僕夫不敢斥尊也范曄後漢書曰崔􅄾字子瑋梁兾聞其才請與交兾行多不䡄􅄾數引古今成敗以誡之兾不能受作外戚箴晉書曰張華懼后族之盛作女史箴以爲諷賈后雖凶妬而知敬重華又曰文帝子齊王攸武帝時爲太子太傅獻箴於太子其略曰無曰父子之間昔有江充無曰至親靡二或容潘崇䛕言亂眞譛潤離親驪􅁎之䜛晉侯疑申固親以道勿固以恩修身以敬勿託以尊丗以爲工後周書曰齊王憲友劉休徴獻王箴一首憲羙之休徴後又以此箴}
