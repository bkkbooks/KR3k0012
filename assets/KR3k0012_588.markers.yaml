  - {type: variant, offset: 17, length: 0, content: '', WYG: 頌則優游以彬蔚文章流别論曰頌詩之美者也古者聖帝明王功成治定而頌聲興於是史錄其篇工歌其章以奏於宗廟告於神明故頌之所美則以為名或以頌形或以頌聲其後已非古頌之意昔班固為安豐戴侯頌史岑為出師頌和僖鄧后頌與魯頌體意相類而文辭之異古今之變也揚雄趙充國頌頌而似雅傅毅顯宗頌文與周頌相似而雜以風雅之意若馬融廣成上林之屬純為文}
