  - {type: variant, offset: 2375, length: 162, content: 千首逾惑體要遂使繁華析枝膏腴害骨無貫風軌莫益勸戒此楊子所以追悔於雕蟲貽誚於霧縠者也宋玉大言賦序曰楚襄王既登雲陽之臺命諸大夫景差唐勒宋玉等並造大言賦賦卒而玉受賞又有能為小言賦者賦之雲夢之田而賦卒乃賜玉田楊子法言曰或問曰吾子少而好賦曰然童子雕蟲篆刻壯夫不為詩人之賦麗以則辭人之賦麗以媱若孔氏之門而用賦則賈誼升堂相如入室崔鴻十六國, SBCK: ''}
