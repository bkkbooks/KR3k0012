  - {type: variant, offset: 2691, length: 185, content: 為夢一黃衣翁謂之曰子可為大人賦言神仙之事以獻上賜錦四匹又曰司馬長卿賦時人皆稱典而麗雖詩人之作不能加也揚子雲曰長卿賦不從人間來神化所主耳子雲學相如為賦而不逮是故雅服焉又曰司馬相如為上林子虛賦意思蕭散不復與外相關控引天地錯綜古今忽然而睡煥然而興幾百曰而後成其友人盛各𢱯字長通牂牁名士嘗問以作賦相如曰合纂組以成文列錦繡而為質一經一緯一宮一商此作賦之跡也賦家之心苞括宇宙惣覽人物, SBCK: 冝}
