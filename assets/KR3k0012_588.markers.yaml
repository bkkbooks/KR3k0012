  - {type: variant, offset: 35, length: 0, content: '', WYG: 宣帝徴王襃為聖主得賢臣頌襃對曰夫荷旃被毳者難與道純綿之麗宻羮藜含糗者}
  - {type: page-break, offset: 35, content: '', id: KR3k0012_WYG_588-3a, image: WYG0898/WYG0898-0366c.png}
  - {type: variant, offset: 36, length: 1, content: 歌, WYG: 足與論太牢之滋味今臣僻在西蜀生於窮巷之中長於蓬茨之下無有遊觀廣覽之知不足以塞厚望應明㫖敢不畧陳愚}
  - {type: variant, offset: 38, length: 1, content: 誦, WYG: 抒情素又曰成帝時西羌嘗有警上思将帥之臣追美充國乃召黄門郎揚雄即充國圖畫而頌之後漢書曰帝召賈逵因勅蘭䑓給筆札使作神雀頌范􅁮後漢書曰肅宗治修古禮廵狩方岳崔駰上西廵頌稱漢徳帝雅好文章自見駰頌後嘗嗟嘆之問侍中竇憲曰寧知崔駰乎對曰班固數為臣說之然未見帝曰公愛班固而忽駰此葉公之好龍也可試見之駰由此候憲憲迎門笑}
  - {type: page-break, offset: 38, content: '', id: KR3k0012_WYG_588-3b, image: WYG0898/WYG0898-0366d.png}
  - {type: variant, offset: 40, length: 0, content: '', WYG: 駰曰亭伯吾受詔交公何得薄我哉遂揖入以為上客又曰傅毅與班固賈逵共典校書毅追美孝明帝功徳最盛而廟頌未立乃依清廟作顯宗頌十篇奏}
  - {type: variant, offset: 41, length: 65, content: 賦登高能賦可以為大夫言感物造端材智深美可以與圖政事故可以列為大夫也春秋之後周道寖壞聘問歌詠不行於列國歌詠之士逸在布衣賢人失志之賦作, SBCK: 逺}
  - {type: variant, offset: 41, length: 0, content: '', WYG: 又曰平望侯劉毅以和僖鄧太后有徳教請令史官著長樂宫聖徳頌以敷宣景耀勒勲金石縣之日月攄之㒺極以崇陛下烝烝之孝帝從之魏志曰黄初三年黄龍見鄴西漳水中王褒上頌賜黄金十斤晉春秋曰懐帝陥於平陽劉聦加帝開府儀同三司㑹稽郡公引帝入讌謂帝曰卿為豫章王時朕與王武子俱造卿武子稱朕於卿卿言聞名久矣卿以所作樂府示朕曰劉君聞君善詞}
  - {type: page-break, offset: 41, content: '', id: KR3k0012_WYG_588-4a, image: WYG0898/WYG0898-0367a.png}
  - {type: variant, offset: 41, length: 65, content: 賦登高能賦可以為大夫言感物造端材智深美可以與圖政事故可以列為大夫也春秋之後周道寖壞聘問歌詠不行於列國歌詠之士逸在布衣賢人失志之賦作, krp: 逺}
  - {type: punctuation, offset: 42, content: ，, id: KR3k0012_CHANT_588-bkkpn22}
  - {type: 'tls:seg', offset: 42, content: '', id: KR3k0012_CHANT_588-2a.4}
  - {type: variant, offset: 42, length: 2, content: 登高, WYG: 試為㸔也朕與武子俱為盛徳頌卿稱善者久之又引朕射於黄堂朕得十二籌卿與武子俱得九籌卿又贈朕柘弓銀硯卿頗憶否帝曰安敢忘之恨爾日不得早識龍顔聦曰卿家骨肉何相殘之甚耶帝曰此殆非人事皇天意也大漢将興應乾受厯故為陛下自相驅耳且臣家若能奉武皇帝之業九族敦睦陛下何由得之聦甚有喜色晉書曰劉臻妻陳氏聦敏能屬文嘗正旦獻椒花頌其詞曰旋穹周廻三朝肇建青陽散暉澄景載焕又曰劉伶字伯倫沛國人也志氣曠放以宇宙為狹著酒徳頌為建威叅軍以夀終崔鴻春秋前燕錄曰慕容雋觀兵近郊見甘棠於道周從者不識雋曰唏此詩所謂甘棠於道甘者味之主也木者春之行也五徳屬仁五行主土春以施生味以養物色又赤者言将有赫赫之慶於中土吾謂國家之盛此其徴者也傳曰升髙}
  - {type: page-break, offset: 42, content: '', id: KR3k0012_WYG_588-4b, image: WYG0898/WYG0898-0367b.png}
  - {type: page-break, offset: 42, content: '', id: KR3k0012_WYG_588-5a, image: WYG0898/WYG0898-0367c.png}
  - {type: punctuation, offset: 51, content: 。, id: KR3k0012_CHANT_588-bkkpn23}
  - {type: 'tls:seg', offset: 51, content: '', id: KR3k0012_CHANT_588-2a.5}
  - {type: variant, offset: 51, length: 8, content: 言感物造端材智深, WYG: 羣司亦各書其志吾得覽焉於是内外臣僚並上甘棠頌南史曰梁大同中嘗驟雨殿前往往有雜色寳珠梁武觀之甚有喜色虞寄因上瑞雨頌帝謂其兄荔曰此頌典裁清㧞卿之士龍也将加擢用寄聞之嘆曰}
  - {type: page-break, offset: 51, content: '', id: KR3k0012_WYG_588-5b, image: WYG0898/WYG0898-0367d.png}
