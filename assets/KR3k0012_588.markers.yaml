  - {type: 'tls:seg', offset: 1855, content: '', id: KR3k0012_CHANT_588-21a.9}
  - {type: variant, offset: 1856, length: 1, content: 邵, SBCK: 帝嚳之丗咸累爲頌以歌九招自啇頌巳下文理允備夫化偃一國謂之風風正四方謂之雅雅容告神謂之頌風雅序人故事資變正頌主告神故義必純羙魯以旦次編啇以前王追録斯乃宗廟之正歌非饗燕之􅁪詠也時邁一篇周}
  - {type: variant, offset: 1856, length: 1, content: 邵, WYG: 虞舜之祀樂正重讃葢唱發之詞也及益讃于禹伊陟讃于巫咸並颺言以明事嗟嘆以助詞者也故漢置鴻臚以唱拜為讃即古之遺語也至如相如屬筆始讃荆軻及遷史固書託讃襃貶約文以揔錄頌體而論詞又記傳後評亦同其名而仲治流别謬稱為述失之逺矣及景純注雅動植必讃讃兼美惡亦猶頌之有變耳然本其為義事生奨嘆所以古來篇體促而不廣必結言於四字之句盤桓於數韻之詞約舉以盡情昭灼以送文此其體也發言雖逺而致用葢寡大抵所歸其頌家之細條也李充翰林論曰容象圖而讃立宜使辭簡而義正孔融之讃楊}
  - {type: page-break, offset: 1856, content: '', id: KR3k0012_WYG_588-7b, image: WYG0898/WYG0898-0368d.png}
  - {type: variant, offset: 1856, length: 1, content: 邵, krp: 帝嚳之丗咸累爲頌以歌九招自啇頌巳下文理允備夫化偃一國謂之風風正四方謂之雅雅容告神謂之頌風雅序人故事資變正頌主告神故義必純羙魯以旦次編啇以前王追録斯乃宗廟之正歌非饗燕之恒詠也時邁一篇周}
  - {type: variant, offset: 1858, length: 0, content: '', SBCK: 所製哲人之頌規式存焉夫三閭橘頌情采芬芳比􅀋屬興又覃及細矣至於􅁗政刻文爰頌其德漢之惠景亦有􅄒容㳂丗並作相繼於時矣􅀂夫子雲之表充國孟堅之序戴侯武仲之羙顯宗史岑之述僖后或擬清廟或範䮐那雖深淺不同詳略有異其褒德顯容典章一也原夫頌惟典懿詞必清鑠敷冩似賦而不入華侈之區敬慎如銘而異於規式之域榆楊以發藻汪洋以樹儀雖纎巧曲致與情而變其大體所弘如斯而巳漢書曰宣帝徴王褒爲聖主得賢臣頌褒對曰夫荷旃􅀍毳者難與道純綿之麗宻羮藜唅糗者不足與論大牢之滋味今臣僻在西蜀生於窮巷之中長於蓬茨之下無有遊觀廣覽之知不足以塞厚望應明旨雖然敢不略陳愚而杼情素又曰成帝時西羗嘗有警上思將帥之臣追羙充國乃召黃門郎楊雄即充國圖􅀞而頌之後漢書曰帝召賈逵因勑蘭臺給筆札使作神雀頌范曄後漢書曰肅宗治脩古禮廵狩方嶽崔駰上西廵頌}
  - {type: page-break, offset: 1858, content: '', id: KR3k0012_SBCK_588-1b}
  - {type: variant, offset: 1858, length: 0, content: '', WYG: 亦其義也晉書曰稽含紹之孫也𢎞農王粹以貴公子尚主館宇甚盛圖荘周於室廣集朝士使含為讃含援筆為之文不加㸃其畧曰嗟乎先生髙迹何局生處巖岫之居死寄雕楹之屋寄非其所没有餘辱粹有愧色又曰衞恒字巨山為黄門郎善草隸太康元年汲縣人盗發魏襄王冡得䇿書十餘萬言其一卷論楚事者最為工妙恒恱之故竭思以賛其美世說曰羊孚作雪讃曰資清以化乘氣以霏遇象能鮮即㓗成輝桓伊遂以書扇箴文心雕龍曰箴所以攻疾除患喻鍼䂖也又曰斯文之興盛於三代夏商二箴餘句頗存及周之辛甲百官箴闕惟虞箴一篇體義備焉迄至春秋㣲而未絶故魏綘諷君於后羿楚子訓民於在勤戰伐以來棄徳務功銘辭代興箴文委絶至揚雄稽古始範虞箴卿尹州牧二十篇及崔胡補綴惣}
  - {type: page-break, offset: 1858, content: '', id: KR3k0012_WYG_588-8a, image: WYG0898/WYG0898-0369a.png}
  - {type: page-break, offset: 1858, content: '', id: KR3k0012_WYG_588-8b, image: WYG0898/WYG0898-0369b.png}
  - {type: variant, offset: 1858, length: 0, content: '', krp: 所製哲人之頌規式存焉夫三閭橘頌情采芬芳比類屬興又覃及細矣至於秦政刻文爰頌其德漢之惠景亦有𫐠容㳂丗並作相繼於時矣若夫子雲之表充國孟堅之序戴侯武仲之羙顯宗史岑之述僖后或擬清廟或範䮐那雖深淺不同詳略有異其褒德顯容典章一也原夫頌惟典懿詞必清鑠敷冩似賦而不入華侈之區敬慎如銘而異於規式之域榆楊以發藻汪洋以樹儀雖纎巧曲致與情而變其大體所弘如斯而巳漢書曰宣帝徴王褒爲聖主得賢臣頌褒對曰夫荷旃𬒳毳者難與道純綿之麗宻羮藜唅糗者不足與論大牢之滋味今臣僻在西蜀生於窮巷之中長於蓬茨之下無有遊觀廣覽之知不足以塞厚望應明旨雖然敢不略陳愚而杼情素又曰成帝時西羗嘗有警上思將帥之臣追羙充國乃召黃門郎楊雄即充國圖畫而頌之後漢書曰帝召賈逵因勑蘭臺給筆札使作神雀頌范曄後漢書曰肅宗治脩古禮廵狩方嶽崔駰上西廵頌}
  - {type: variant, offset: 1859, length: 0, content: '', SBCK: 漢德帝雅好文章自見駰頌後常嗟歎之問侍中竇憲曰寧知崔駰乎對曰班固數爲臣􅀃之然未見帝曰}
  - {type: page-break, offset: 1859, content: '', id: KR3k0012_SBCK_588-2a}
  - {type: variant, offset: 1859, length: 5, content: 公卿獻詩師, WYG: 百官指事配位盤鑒有徴可謂追清風於前古攀辛甲於後代者也至於潘朂符節要而失淺温嶠侍臣博而患繁王濟國子引多事寡潘尼乗輿義正體蕪凡斯繼作鮮有克終至於王朗雜}
