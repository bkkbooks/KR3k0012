  - {type: variant, offset: 2168, length: 3, content: 林繁類, SBCK: 髙祖髙祖方剪削諸弟甚恱其文唐書曰元和中吏部郎中栁公綽獻太毉箴曰寒暑滿天地之間浹肌膚於外好愛溢耳目之前誘心知於内端㓗爲隄奔射猶敗氣行無間隙不在大睿聖之姿清明絶俗心正無斜志髙寡欲謂天髙矣氣蒙晦之謂地厚矣撗流漬之聖情超遥萬方頼之飲食所}
