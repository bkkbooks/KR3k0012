  - {type: variant, offset: 30, length: 10, content: 賦也漢書曰不歌而誦謂, SBCK: 頌失}
  - {type: variant, offset: 30, length: 0, content: '', WYG: 頌失之逺矣文心雕龍曰四始之至頌居其極頌者容也所以美盛徳而述形容也昔帝嚳之世咸墨為頌以歌九招自商頌以下文理克備夫化偃一國謂之風風正四方謂之雅容告神明謂之頌風雅序人故事兼變正頌主告神故義必純美魯以公旦次編商以前王追錄斯乃宗廟之正歌非饗燕之恒詠也時邁一篇周公所製哲人之頌規式存焉夫三閭橘頌情采芬芳比類屬興覃及細物矣至於秦政刻文爰頌其徳漢之恵景亦有述容沿世並作相繼於時矣若夫子雲之表充國孟堅之頌戴侯武仲之美顯宗史岑之述僖后或擬清廟或範駉那雖深淺不同詳畧有異其褒徳顯容典章一也原夫頌惟典懿詞必清鑠敷冩似}
  - {type: page-break, offset: 30, content: '', id: KR3k0012_WYG_588-2b, image: WYG0898/WYG0898-0366b.png}
  - {type: variant, offset: 30, length: 10, content: 賦也漢書曰不歌而誦謂, krp: 頌失}
  - {type: variant, offset: 31, length: 1, content: 也, WYG: 而不入華侈之區敬慎如銘而異於規戒之域揄揚以發藻汪洋以樹儀雖􅊏巧委曲與情而變其大體含宏如斯而已}
  - {type: punctuation, offset: 32, content: 。, id: KR3k0012_CHANT_588-bkkpn16}
