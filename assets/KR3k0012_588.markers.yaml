  - {type: variant, offset: 159, length: 3, content: 語設其, WYG: 帝王建鴻徳者須鴻筆之臣褒頌紀徳也又曰永平中神雀羣集孝明詔上神雀頌百官上頌文比瓦石惟班固賈逵傅毅楊終侯諷五頌文比金玉崔駰四廵頌表曰臣聞陽氣發而鶬鶊鳴秋}
