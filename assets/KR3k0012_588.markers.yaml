  - {type: variant, offset: 195, length: 1634, content: 則賈誼登堂相如入室矣又曰上令王褒與張子僑等並待詔數從遊獵所幸宮館輒為歌頌第其高下以差賜帛議者多為淫靡不急上曰不有博弈者乎為之猶賢乎己辭賦大者與古詩同義小者辨麗可嘉如女工有綺縠音樂有鄭衛今世俗猶皆以此娛說耳目辭賦比之尚有仁義風諭鳥獸草木多聞之觀賢於倡優博弈遠矣又曰武帝以安車徵枚乘孽子皋母為小妻乘之東歸也皋母不肯隨乘乘怒留皋與母居年十七上書自陳枚乘之子上得大喜召入詔使賦平樂館善之拜為郎皋不通經術談笑類徘倡為賦頌好慢戲以故得渫黷貴幸比東方朔郭舍人武帝春秋二十九乃得皇太子群臣喜故皋與東方朔皇太子生賦皋為文疾受詔輒成司馬相如善為文而遟故所作少又曰上讀司馬相如子虛賦善之乃召相如相如曰此乃諸侯之事未足觀請為天子遊獵之賦上令尚書給筆札相如以子虛虛言也為楚烏有先生者烏有此事為難亡是也欲明天子之義故虛籍此三人為辭以推天子諸侯之苑囿其卒歸於節儉因以諷諫天子天子大悅時上好神仙相如又奏大人賦天子大悅飄飄有凌雲之氣游天地之間意又曰趙昭儀方大幸每上甘泉常從在屬車間豹尾中故揚雄盛言車騎之眾參麗之駕非所以感動天地逆釐三神又言屏玉女卻宓妃以懲齊戒之事賦成奏之天子異焉先是時蜀有司馬相如作賦甚弘麗溫雅雄心壯之每作賦常擬以為式後漢書曰王延壽字文考少遊魯國作靈光殿賦後蔡邕亦造此賦未成及見延壽所為甚奇之遂輟翰又曰李充字伯仁少以文章顯名賈逵薦充召詣東觀受詔作賦拜蘭臺令史魏志曰陳思王植太祖常視其文曰汝倩人耳植跪曰出言為論下筆成篇固當面試時鄴銅雀臺新成太祖悉將諸子登使名賦植賦援筆立成太祖甚異之吳書曰張紘作柵瘤枕賦陳琳在北見之以示人曰此吾鄉里張子紘所作也後紘見琳武庫賦應機論與琳書歎美之琳荅曰自僕在河北與天下隔此間率少於文章易為雄伯故僕受此過美之談非其實也今景在此足下子布在彼所謂小巫見大巫神氣盡矣魏略曰卞蘭獻賦贊述太子德美太子報曰作者不虛其辭受者必當其實蘭此豈吾實哉昔吾丘壽王一陳寶鼎何武等徒以歌頌猶受金帛之賜蘭事雖不諒義足嘉也今賜牛一頭又曰邯鄲淳作投壺賦奏之文帝以為工賜絹十疋晉書曰孫綽絕重張衡左思賦云三都二京六經之鼓吹也嘗作天台山賦辭致甚工初成以示友人范榮期云卿試擲地當作金石聲也榮期曰恐此金石非中宮商然每至佳句輒云應是我輩語又曰桓溫欲經緯中國以河南粗平將移都洛陽朝廷畏溫不敢為異而北土蕭條人情危懼孫綽上䟽言不可溫見綽表不悅曰致意興公何不尋君遂初賦而知人家國事耶又曰顧愷字長康晉陵無鍚人也博學有才氣嘗為箏賦成謂人曰吾賦之比嵇琴不賞者必當以後出相遺深識者亦當以高奇見貴宋書曰謝莊字希逸仕為太子中庶子時南平王鑠獻赤鸚鵡帝詔群臣為賦太子左衛率袁淑文冠當時作賦畢示莊及見莊賦歎曰江東無我卿當獨秀我若無卿亦一時之傑遂隱其賦梁書曰張率為待詔賦奏之甚見稱賞手勑荅曰相如工而不敏枚皋速而不工卿可謂兼二子於今之世矣又曰沈眾字仲興好學有文詞仕梁為太子舍人時武帝制千字詩眾因注解與陳謝景同時召見于文德殿帝命眾竹賦賦成奏之手勑荅曰卿文體翩翩可謂無忝爾祖北齊書曰劉晝舉秀才入京考策不第乃恨不學屬文方復緝綴辭藻言甚苦拙制一首賦以六合為名自謂絕倫吟諷不輟乃歎曰儒者勞而少工見於斯矣我讀儒書二十餘年而荅策不第始學作文便得如是曾以此賦呈魏收收謂人曰賦名六合其愚已甚及見其賦又愚於名唐書曰獲嘉主簿劉知幾著思慎賦以剌時鳳閣侍郎蘇味道李嶠見文相顧而歎曰陸機豪士之所不及也當今防身要道盡在此矣又曰文苑傳李華字遐叔善屬文與蘭陵蕭頴士友善華應進士時著含元殿賦萬餘言頴士見而賞之曰景福之上靈光之下後唐書曰李琪少孤貧苦學尤精於文賦昭宗時李谿父子以文學知名於時琪年十八袖賦一軸謁谿谿覽賦驚異倒履迎門因出琪啞鍾捧日等賦指爾謂琪曰予常患近年文士辭賦皆數句之後未見賦題吾子入句見題偶屬典麗吁可畏也琪由是以益知名也摯虞文章流別論曰賦者敷陳之稱古詩之流也前世為賦者有孫卿屈原尚頗有古之詩義至宋玉則多淫浮之病矣楚詞之賦賦之善者也故楊子稱賦莫深於離騷賈誼之作則屈原儔也禰衡傳曰黃祖時大會賓客人有獻鸚鵡者祖舉巵酒於衡曰願先生賦之以娛佳賓衡攬筆而作文無加點辭采甚麗, WYG: ''}
