  - {type: variant, offset: 2888, length: 234, content: 乃作合組歌列錦賦而退身終不復敢言作賦之心矣博物志曰王延壽逸之子也魯作靈光殿初成逸語其子曰汝鴈狀歸吾欲為賦文考遂以韻鴈簡其父曰此即好賦吾固不及矣三國典略曰齊魏收以溫子昇邢邵不作賦乃云會須作賦始成大才唯以章表自許此同兒戲文士傳曰何楨字元幹青龍元年天子特詔曰楊州別駕何禎有文章才試使作許都賦成封上不得令人見禎遂造賦上甚異之又曰棘嵩見陸雲作逸民賦嵩以為丈夫出身不為孝子則為忠臣必欲建功立策為國宰輔遂作官人賦以反雲之賦桓子新論曰予少時見揚子雲麗文高論不量年少猥欲迨及業作小賦用思, SBCK: ''}
