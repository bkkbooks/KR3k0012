  - {type: variant, offset: 1771, length: 6, content: 恨令取六七株, krp: 復勝君嶠即苦辭敦不從表𥙷丹陽尹猶懼錢鳯爲之姧因敦置酒與嶠别嶠曰違離宇下情戀不巳願自起行酒以展𡵨路之心行酒至鳯未飲嶠因僞醉以手板擊鳯幘爲之墜作色曰錢鳯何人温太真行酒而敢不飲鳯不恱敦以爲醉兩釋之明日鳯曰嶠與朝廷甚宻必未可信或懷反噬冝更思之敦曰太眞昨醉小加聲色豈得以此相詭貳由是鳯謀不行而得}
