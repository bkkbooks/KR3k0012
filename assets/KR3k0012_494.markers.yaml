  - {type: punctuation, offset: 3727, content: 「, id: KR3k0012_CHANT_494-bkkpn999}
  - {type: variant, offset: 3727, length: 0, content: '', SBCK: 夫狐之搏雉也卑體弭毛以侍其來也雉見而信之故可得而禽也使狐瞑目見其必殺之􅀔雉亦知憚驚逺飛以避其怒矣夫人僞詐以相欺非直禽獸詐也呉越春秋曰要離爲王殺慶忌曰請以罪岀走殺臣之妻子焚之吴市飛楊其􅁅購臣千金與百里之邑詐徃慶忌必信臣也王曰諾要離以罪出走王殺其妻子焚之吴市飛揚其􅁅購之千金與百里之邑吕氏春秋曰趙簡子病召太子告曰我則死巳葬上}
  - {type: page-break, offset: 3727, content: '', id: KR3k0012_SBCK_494-7b}
  - {type: variant, offset: 3727, length: 0, content: '', WYG: 夫狐之搏雉也卑體弭毛以待其來也雉見而信之故可得而禽也使狐瞋目見其必殺之勢雉亦知憚驚逺飛以避其怒矣夫人偽詐以相欺非直禽獸詐也吳越春秋曰要離為王殺慶忌曰請以罪出走殺臣之妻子焚之吳市飛其灰購臣千金與百里之邑詐徃慶忌必信臣也王曰諾要離以罪出走王殺其妻子焚之吳市飛其灰購之千金與百里之邑吕氏春秋曰趙簡子病召太子告曰我則死已葬上}
  - {type: page-break, offset: 3727, content: '', id: KR3k0012_WYG_494-12b, image: WYG0897/WYG0897-0465b.png}
  - {type: variant, offset: 3727, length: 0, content: '', krp: 夫狐之搏雉也卑體弭毛以侍其來也雉見而信之故可得而禽也使狐瞑目見其必殺之勢雉亦知憚驚逺飛以避其怒矣夫人僞詐以相欺非直禽獸詐也呉越春秋曰要離爲王殺慶忌曰請以罪岀走殺臣之妻子焚之吴市飛楊其灰購臣千金與百里之邑詐徃慶忌必信臣也王曰諾要離以罪出走王殺其妻子焚之吴市飛揚其灰購之千金與百里之邑吕氏春秋曰趙簡子病召太子告曰我則死巳葬上}
  - {type: variant, offset: 3729, length: 6, content: 綿聯彫琢刻鏤, SBCK: 之山以望簡子死巳葬襄子上夏屋以望代曰先君必以此殺之也反歸慮所以取代乃先善之代君好色請以}
