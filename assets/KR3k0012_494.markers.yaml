  - {type: variant, offset: 2042, length: 846, content: 一食萬錢猶云無可下筯處又曰石崇財產豐積室宇宏麗後房百數皆曳紈繡珥金翠絲竹盡當時之選庖廚窮水陸之珍又曰何劭驕奢簡貴亦有父風衣裘服翫新故巨積食必盡四方珍異一日之供以錢二萬為限時論以為太官御膳無以加之又曰羊稚舒冬月釀令人抱甕須臾復易人酒速成而味好又曰愷失政遂縱酒極滋味初何邵一身一日之供必錢二萬為限及愷有踰於邵宋書曰徐湛之善於尺牘音辭流暢貴戚豪家產業甚厚室宇園池貴遊莫及伎樂之妙冠絕一時門生千餘人皆三吳富人之子姿質端妍衣服鮮麗每出入行遊塗巷盈滿泥雨日悉以後車載之太祖嫌其侈縱每以為言又曰謝靈運性奢豪車服鮮麗衣裳器物多改舊制世共宗之咸稱謝康樂也又曰劉穆之性奢豪食必方丈旦輒為十人饋穆之既好賓客未嘗獨飡每至食時客止十人以還者帳下依常下食以為常白高祖曰穆之家本貧賤贍生有闕自叨忝以來雖每存約損而朝夕所須徵為過豐自此以外一毫不以負公又曰阮佃夫通貨賄凡事非賂不行宅舍園池諸王邸第莫及女伎數十藝色冠絕當時金玉錦繡之飾宮掖不逮也每製一衣造一物京邑莫不法效焉於宅內開瀆東出十許里塘岸整潔泛輕舟奏女樂齊書曰劉悛既藉舊恩尤能悅附人主承迎權貴賓客閨房供費奢廣罷廣司二州悉傾資獻家無留儲在蜀作金浴盆餘金物稱是又曰劉撝彭城人其祖彥之父仲度俱仕明帝時為戶部郎中太子洗馬其家豪富資財宅宇山池妓妾姿藝皆窮上品有愛妓陳玉珠明帝求不與逼奪之撝有怨詞帝令有司誣奏將殺之入獄數宿鬢毛皆白免死為司徒長史明帝射雉郊野渴倦撝得青早瓜進帝帝對割甚嘉之入齊三遷為御史中丞五為兵部尚書後魏書曰夏侯道遷譙國人封濮陽侯除兗州大中正不拜好奢侈宴飲京師珍羞罔不畢備嘗於京城西水次大起園池植列花果延招攜彥日往遊適妓妾十餘人當自娛興國秩俸歲入三千疋專供酒饌不營家產每誦孔融詩曰座上客恒滿樽中酒不空餘非吾之事也識者多之道遷不娉正室又曰郢州刺史韓務獻七寶床象牙席詔曰昔晉武帝焚雉頭裘朕常嘉之今務所獻亦此之流也奇麗之物有乖素風可付其人家隋書曰裴矩為給事郎煬帝至東都矩以蠻夷朝貢者多諷帝令都下大戲徵四方奇異陳於端門街衣錦珥金翠店肆悉設帷帳盛酒食遣蠻夷見者嘆其中國以為神仙, WYG: ''}
