  - {type: variant, offset: 3739, length: 2, content: 猶未, krp: 願問群臣於是乃問群臣群臣半言馬半言鹿當此之時秦王不敢信其目而從邪臣之言鹿與馬之異形乃衆人之所知也然不}
  - {type: variant, offset: 3742, length: 1, content: 贍, SBCK: 别其是非况於闇昧之事乎王符潜夫論曰昔紂好色九侯聞之乃獻厥女紂則大喜以爲天下之麗莫􅀂此也以問妲己妲己懼進御而奪巳愛也乃爲俯而泣曰君王年旣老耶明旣衰耶何貌惡之􅀂此而覆謂之好也紂於是渝而以爲惡妲己恐天下之愈進美女因曰九侯之無道也乃欲以此惑君王也而弗誅何以革後紂則大怒遂脯淑女而烹九侯論衡曰儒書稱武王伐紂太公隂謀食小兒以丹令身絶赤長大教言啇亡啇民見身赤以爲天神及言啇亡皆謂啇滅世􅀃曰鍾㑹宻白鄧艾有反􅃺㑹善効}
