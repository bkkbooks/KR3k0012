  - {type: variant, offset: 272, length: 1, content: 孰, SBCK: 今楚拘之秦王欲岀之秦王有愛女美又簡擇宫中佳麗習音者以從之資以金玉寳器以上庸六縣爲湯沐邑欲因張儀内之楚王必受之而忘子子踈必矣鄭䄂遽說王出張子又曰張丑爲賈於燕燕王欲殺之走且岀境境吏得之丑曰燕王所爲將殺我者人有言我有寳珠也今我巳亡矣而燕王不我信今子致我我且言子之奪我珠而吞之燕王必且殺子刳子之腹君}
