  - {type: variant, offset: 1225, length: 5, content: 通儒教養諸, WYG: 荆州刺史曹爽等令勝辭宣王自陳無他功効横􅂪時恩當為本州宣王令兩婢侍邉持衣衣落復上指口言渇主飲婢進粥宣王持杯飲粥皆流出沾胷勝愍然為之涕言曰今主上尚幼天下賴明公然衆情謂公舊風病發何意尊體乃爾宣王徐更言年老沉疾死在旦夕君當屈為并州并州近胡好善為之恐不復相見如何勝曰當遷本州非并州宣王仍復陽為惛謬曰君方到并州努力自愛錯亂其辭狀如荒語勝復曰當忝本州非并州也宣王乃若微悟者謂勝曰懿年老意荒不解君言今當與君别自顧氣力轉微後必不更㑹同欲自力設薄主人}
