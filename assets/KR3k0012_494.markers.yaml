  - {type: variant, offset: 3736, length: 2, content: 剞劂, SBCK: 弟妻之襄子謂代君而請觴之先令舞者置兵羽中數百人又先具大金斗代君至酒酣舉斗而擊之腦塗地舞者操兵以闘盡殺其從者陸賈新語曰秦二丗之時趙髙駕鹿而從行王曰丞相何爲駕鹿髙曰馬也王曰丞相誤耶以鹿爲馬也髙曰乃焉也陛下以臣之言爲不}
  - {type: variant, offset: 3736, length: 2, content: 剞劂, WYG: 弟妻之襄子為代君而請觴之先令舞者置兵羽中數百人又先具大金斗代君至酒酣舉斗而擊之腦塗地舞者操兵以鬭盡殺其從者陸賈新語曰秦二世之時趙髙駕鹿而從行王曰丞相何為駕鹿髙曰馬也王曰丞相誤耶以鹿為馬也髙曰乃馬也陛下以臣之言為不}
