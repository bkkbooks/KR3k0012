  - {type: variant, offset: 3736, length: 2, content: 剞劂, krp: 弟妻之襄子謂代君而請觴之先令舞者置兵羽中數百人又先具大金斗代君至酒酣舉斗而擊之腦塗地舞者操兵以闘盡殺其從者陸賈新語曰秦二丗之時趙髙駕鹿而從行王曰丞相何爲駕鹿髙曰馬也王曰丞相誤耶以鹿爲馬也髙曰乃焉也陛下以臣之言爲不}
  - {type: variant, offset: 3739, length: 2, content: 猶未, SBCK: 願問群臣於是乃問群臣群臣半言馬半言鹿當此之時秦王不敢信其目而從邪臣之言鹿與馬之異形乃衆人之所知也然不}
