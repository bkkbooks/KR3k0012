  - {type: variant, offset: 1218, length: 12, content: 馬融才高博洽為通儒教養諸, krp: 和熹鄧后臨朝權在外戚杜根以安帝年長冝親政事乃與同時郎上書直諌太后大怒収執根等令盛以嫌囊於殿上撲殺之執法者以根知名語行事人使不加力旣而載出城外根得蘇太后使人檢視遂詐死三日目中}
  - {type: variant, offset: 1219, length: 5, content: 融才高博洽, WYG: 宣王稱病因李勝出}
