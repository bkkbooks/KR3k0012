  - {type: variant, offset: 1778, length: 208, content: 之惠帝知富無以誇之時外國進火浣布天下更無帝為衫來幸崇家崇奴僕五十人皆衣火浣布衫祇承帝大慚崇廁屋內置侍婢衣以紈素並以香囊錦袋崇大會賓客侍中劉實往廁見廁內燦爛便出謂崇曰幾誤入公室矣崇曰廁也寔更往見侍婢所逼便迴後趙王倫誅崇兄弟妻子無少長悉皆遇害初崇家稻米屬地化為螺人以為族滅之應也又曰和嶠字長輿汝南西平人中郎將庾凱見嶠歎曰森森若千丈松雖磥砢多節目施之大廈有棟梁之用武帝重之為黃門侍郎嶠家產豐富擬於王者杜預封帝以為和嶠有錢癖, krp: 都}
