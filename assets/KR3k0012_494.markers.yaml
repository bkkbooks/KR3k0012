  - {type: variant, offset: 3744, length: 2, content: 主之, SBCK: 書於劒閣要艾章表白事皆易其言令辭指倨傲多自矜伐葛仙公別傳曰時有一老人頗能治病從中國來其人言年巳數百歳後他坐仙公}
