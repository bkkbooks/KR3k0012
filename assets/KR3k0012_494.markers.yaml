  - {type: variant, offset: 1218, length: 0, content: '', WYG: 和熹鄧后臨朝權在外戚杜根以安帝年長宜親政事乃與同時郎上書直諫太后大怒収報根等令盛以縑囊於殿上撲殺之執法者以根知名語行事人使不加力既而載出城外根得蘇太后使人檢視遂詐死三日目中生蛆因得迯竄也又曰隗囂敗公孫述懼欲安其衆成都郭外有秦時舊倉改名白帝倉自王莽以來常空述詐使人言白帝倉出穀如山陵百姓空市里徃觀之述乃大㑹羣臣問曰白帝倉出穀乎皆對言無述曰訛言不可信道隗王破者復如此矣又曰臧宫将兵至中盧屯駱越是時公孫述将田戎任滿與征南大将軍岑彭相拒於荆門彭等戰數不利越人謀叛從蜀宫兵力不能制㑹屬縣送委輸車數百乗至宫夜使鋸斷城門限令車周轉出入至旦越人候伺者聞車聲不絶而門限斷相告以漢兵大至其帥乃奉牛酒以勞軍魏志曰司}
  - {type: page-break, offset: 1218, content: '', id: KR3k0012_WYG_494-7a, image: WYG0897/WYG0897-0462c.png}
