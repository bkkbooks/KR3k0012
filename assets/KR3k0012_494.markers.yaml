  - {type: variant, offset: 1288, length: 11, content: 子以次相傳鮮有入其室者, WYG: 結君為友因流涕哽咽勝亦長嘆}
  - {type: variant, offset: 1289, length: 818, content: 以次相傳鮮有入其室者吳志曰甘寧好遊俠水行則連軒侍從被文錦繡常以繒帛維舟去或割棄之以示奢侈也又曰將軍賀齊性奢好軍事所乘舡彫刻丹鏤青蓋綘襜蒙衝鬭艦望之若山蜀志曰先主定益州以劉琰為涪陵太守後主立封都鄉侯服御飲食侈靡侍婢數十人皆為聲樂又悉教讀誦魯靈光殿賦又曰麋笁字子真東海人世殖貨財僮僕萬人貲產巨億徐州牧陶謙辟為別駕謙卒笁奉謙命迎先主牧之及呂布襲破先主虜其妻子笁於是進妹為夫人乃以二千人金帛貨幣以助軍實先主賴笁之資復振軍威先主後定益州即帝位拜笁為安漢將軍弟芳為南郡太守攜貳迎孫權敗關羽於是笁乃請罪先主以兄弟罪不相及待之如初晉書曰何曾字頴孝陽夏人其家大富魏明帝時為文學武帝踐祚累遷為太傅性甚奢豪每赴宴不食太官所設帝命取其食蒸餅上不拆作十字不食日食萬錢猶云無下筯之處人以小紙書者勑記室勿報又曰石崇字季倫累遷荊州刺史崇好俠無賴遣吏劫遠使商客致家大富有別館在河陽之金谷財產盈積室宇宏麗後房百數皆曳綺紈絲竹之妙皆盡一時之選與貴戚惠帝舅王愷奢靡相尚愷以飴燠釜崇以蠟代薪愷作紫絲步障四十里崇作錦步障五十里愷以示石脂塗屋崇以椒塗之武帝助愷珊瑚樹一株高二尺愷以示崇崇以鐵如意擊破愷不悅崇曰無恨令取六七株還之惠帝知富無以誇之時外國進火浣布天下更無帝為衫來幸崇家崇奴僕五十人皆衣火浣布衫祇承帝大慚崇廁屋內置侍婢衣以紈素並以香囊錦袋崇大會賓客侍中劉實往廁見廁內燦爛便出謂崇曰幾誤入公室矣崇曰廁也寔更往見侍婢所逼便迴後趙王倫誅崇兄弟妻子無少長悉皆遇害初崇家稻米屬地化為螺人以為族滅之應也又曰和嶠字長輿汝南西平人中郎將庾凱見嶠歎曰森森若千丈松雖磥砢多節目施之大廈有棟梁之用武帝重之為黃門侍郎嶠家產豐富擬於王者杜預封帝以為和嶠有錢癖又曰王濟性豪侈麗服玉食時洛京地甚貴濟買地為馬埒編錢滿之時人謂金埒又曰任愷初何邵以公子奢侈每食必盡四方珍饌愷乃踰之一食萬錢猶云無可下筯處又曰石崇財產豐積室宇宏麗後房百數皆曳紈繡珥金翠絲竹盡當時之選庖廚窮水陸之珍又曰何劭驕奢簡貴亦有父風衣裘服翫新, SBCK: 罕}
