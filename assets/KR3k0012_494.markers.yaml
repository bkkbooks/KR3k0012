  - {type: variant, offset: 3747, length: 1, content: 也, SBCK: 知此公定年俄一人從天下舉坐瞻目良乆集地着朱衣進賢冠即問此公曰天遣我來問君定年幾何故欺詐民人速以實對公大怖下地長跪言曰無􅃺實九十三仙公因撫手大􅀏忽然失朱衣人所在太平御覽卷第四百九十四}
