  - {type: variant, offset: 80, length: 175, content: 桷皆非禮也御孫諫曰臣聞之儉德之恭也侈惡之大也先君有恭德而君納諸大惡無乃不可乎又曰襄公五年齊慶封來聘其車美叔孫曰豹聞之服美不稱必以惡終美車何為又曰吳師在陳楚大夫皆懼子西曰今聞夫差次有臺榭陂池焉宿有妃嬙嬪御焉一日之行所欲必成玩好必從珍異是藂觀樂是務視民如讎而用之日新夫差先自敗也已安能敗我禮記曰管仲鏤簋而朱絃旅樹而反坫山節而藻梲賢大夫而難為上也得天子之禮, SBCK: 詐}
