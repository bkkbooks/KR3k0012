  - {type: variant, offset: 1540, length: 3, content: 相及待, krp: 時入事洩自出見恪曰使君若尊體不安自可湏復當具白主上欲以甞知恪意荅曰當力人散騎常侍張約朱思宻書與恪曰今日張設非常疑有佗故恪省書而去未出門逄太常滕裔恪曰卒腹痛不任入裔不知峻計謂恪曰君自行旋未見今上置酒請君巳至門直當力進恪踟蟵而還劒履上殿謝亮還坐設酒峻因曰使君疾未善平當有常服藥酒自可取}
