  - {type: variant, offset: 985, length: 303, content: 冀然後入國吏人輸金懷璧求官請罪者道路相望冀又遣客出塞外國大壯棟宇加以丹漆圖以雲氣仙靈臺榭交通相望駭雞犀夜光璧充實帑藏鳴駞龍馬秣於內廄冀將妻孫氏乘輦青蓋車張羽葆飾以金玉琥珀每遊觀池亭及弟內多從倡優鳴鍾鼓吹竽酣樂竟路日夜相繼及桓帝誅冀收其貲產以實國庫詔減天下一歲租稅之半又曰桓帝時誅梁冀封單超徐璜具瑗左悺唐衡五人超薨後四侯轉撗天下為之語曰左廻天具獨坐徐臥虎唐兩隋皆競起第宅樓觀壯麗窮極技巧金銀罽毦施於犬馬取良民美女以為妃妾皆珍飾華侈擬則宮人其僕從皆乘車而從列騎東觀漢記曰馬融才高博洽為通儒教養諸生常有千數涿郡盧植北海鄭玄皆其徒也善鼓瑟好吹笛達生任性不拘儒者之節居宇器服多存侈飾常坐高堂施綘紗帳前授生徒後列女樂弟, SBCK: ''}
