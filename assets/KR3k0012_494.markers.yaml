  - {type: variant, offset: 945, length: 3, content: 梁冀為, SBCK: 王郎起北州擾惑吴漢素聞世祖長者獨欲歸心乃􅀃太守彭寵岀止外亭念所以譎衆未知所出望見道中有一人似儒生者漢使人召入爲具食問以所聞生因言劉公所過爲郡縣所歸邯鄲舉尊號者實非劉氏漢}
  - {type: variant, offset: 945, length: 2, content: 梁冀, WYG: 王郎起北州擾惑吳漢素聞世祖長者獨欲歸心乃説太守彭寵出止外亭念所以譎衆未知所出望見道中有一人似儒生者漢使人召入}
  - {type: variant, offset: 945, length: 3, content: 梁冀為, krp: 王郎起北州擾惑吴漢素聞世祖長者獨欲歸心乃說太守彭寵岀止外亭念所以譎衆未知所出望見道中有一人似儒生者漢使人召入爲具食問以所聞生因言劉公所過爲郡縣所歸邯鄲舉尊號者實非劉氏漢}
  - {type: variant, offset: 948, length: 0, content: '', WYG: 具食問以所聞生因言劉公所過為郡縣所歸邯鄲舉尊號者實非劉氏漢}
  - {type: variant, offset: 949, length: 2, content: 司馬, SBCK: 喜即詐爲丗祖書移檄漢陽使生賷以詣寵令具以所聞􅀃之漢復隨後入寵甚然之於是遣漢將兵擊王郎又曰王莽時尚書缺詔將大夫六百石以上試對政事天文道術以髙第者􅀘之翟酺自恃能髙而忌太史令孫懿恐其先用乃往候懿旣坐言無所及唯涕泣流連懿恠而問之酺曰圖書有漢孫登以才智爲中官所害􅀚君表相似當應之酺受恩接愴君之禍耳懿憂懼移病不試由是酺對第一拜尚書又曰靈帝時宦官得志並起第擬則宫室帝甞登永安候臺宦官恐其望見居處乃使中大夫尚坦諌曰天子不當登髙登髙則百姓虚散自是不敢升髙東􅀚漢記曰和熹鄧后臨朝權在外戚杜根以安帝年長冝親政事乃與同時郎上書直諌太后大怒収執根等令盛以嫌囊於殿上撲殺之執法者以根知名語}
  - {type: page-break, offset: 949, content: '', id: KR3k0012_SBCK_494-4a}
  - {type: variant, offset: 949, length: 19, content: 司馬行大將軍事害太尉李固及內外忠臣皆冀, WYG: 喜即詐}
  - {type: variant, offset: 949, length: 20, content: 司馬行大將軍事害太尉李固及內外忠臣皆冀為, krp: 喜即詐爲丗祖書移檄漢陽使生賷以詣寵令具以所聞說之漢復隨後入寵甚然}
  - {type: variant, offset: 952, length: 0, content: '', SBCK: 事人使不加力旣而載出城外根得蘇太后使人檢視遂詐死三日目中生蛆因得迯竄也又曰隗囂敗公孫述懼欲安其衆成都郭外有秦時舊倉改名白帝倉自王莽以來常空述詐使人言白帝倉出􅂖如山陵百姓空市里往􅀚之述乃大㑹群臣問曰白帝倉岀􅂖乎皆對言無述曰訛言不可信道隗王破者復如此矣又曰臧宫將兵至中盧屯駱越是時公孫述將田戎任滿與征南}
  - {type: page-break, offset: 952, content: '', id: KR3k0012_SBCK_494-4b}
  - {type: variant, offset: 955, length: 0, content: '', SBCK: 岑彭相拒於荆門彭等戰數不利越人謀叛從蜀宫兵少力不能制㑹属縣送委輸車數百宫夜使鋸断城門限令車周轉岀入至旦越人候伺者聞車聲不絶而門限断相告以漢兵大至其帥乃奉牛酒以勞軍魏志曰司馬宣王稱病因李勝出爲荆州刺史曹爽等令勝辭宣王自陳無它功効撗䝉時恩當爲本州宣王令兩婢侍邊持衣衣落復上指口言渇主飲婢進粥宣王持杯飲粥皆流岀沾􅅐勝􅉖然爲之涕泣曰今主上尚㓜天下頼明公然衆情謂公舊風病發何意尊體乃尓宣王徐更言年老沉疾死在旦夕君當屈爲并州并州近胡好善爲之恐不復相見如何勝曰當遷夲州非并州宣王仍復陽爲惛謬曰君方到并州努力自愛錯亂其辝狀如荒語勝復曰當忝夲州非并州也宣王乃􅀂微悟者謂勝曰懿年老意荒不解君言今當與君别自顧氣力轉微後必不更㑹同欲自力設薄主人生死共別今師昭兄弟結君爲友因流涕哽咽勝亦長歎吴志曰孫峻謀置酒誅諸􅁑恪恪將見駐車宫門峻巳伏兵於帷中恐恪不時入}
  - {type: page-break, offset: 955, content: '', id: KR3k0012_SBCK_494-5a}
  - {type: punctuation, offset: 956, content: ，, id: KR3k0012_CHANT_494-bkkpn276}
  - {type: 'tls:seg', offset: 956, content: '', id: KR3k0012_CHANT_494-16a.4}
  - {type: variant, offset: 956, length: 0, content: '', SBCK: 洩自出見恪曰使君􅀂尊體不安自可湏復當具白主上欲以甞知恪意荅曰當力人散􅀐常侍張約朱思宻書與恪曰今日張設非常疑有佗故恪省書而去未出門逄太常滕裔恪曰卒腹痛不任入裔不知峻計謂恪曰君自行旋未見今上置酒請君巳至門直當力進恪踟蟵而還劒履上殿謝亮還坐設酒峻因曰使君疾未善平當有常服藥酒自可取之恪意乃安則飲所賫酒數行亮還入内峻起如厠着短服岀曰詔收諸􅁑恪恪驚起杖劒未殊而峻刄交下晉書曰謝􅀇等旣破符堅有驛書至謝安安方對客圍碁看書旣竟便攝放牀上了無喜色碁如故客問之徐荅云小兒輩遂巳破賊旣罷還内過户限心喜甚不覺屐齒之折其矯情鎮物如此又曰桓玄以歴代咸有肥遁之士而巳丗獨無乃徴皇甫謐六丗孫希之爲著作并給其資用皆令讓而不受号曰髙士時人名爲充隠又曰紀瞻爲㑹稽内史時有詐作大將軍府符收諸吏曁令令巳受拘瞻􅁴其詐便破檻出之訊問使者果伏詐妄又曰崔洪口不言貨財手不執珠玉汝南王亮甞讌公卿以琉璃鍾行酒酒及洪洪不執亮問其故對曰慮有執玉不趍之義故尓然實乖其常性故爲詭也晉中興書曰晉元帝叔父東安王繇爲成都王頴所}
  - {type: page-break, offset: 956, content: '', id: KR3k0012_SBCK_494-5b}
  - {type: page-break, offset: 956, content: '', id: KR3k0012_SBCK_494-6a}
  - {type: variant, offset: 957, length: 0, content: '', SBCK: 懼禍及謀岀奔其夜月明禁衛甚嚴不能得去有頃天􅁀風􅀨晦􅁳邀者散帝乗間得脫至河陽爲津吏所止從者宗典後至以馬鞭拂之謂曰舎長官禁貴人而汝􅀍駐耶因大􅀏由是􅀍釋又曰温嶠知王敦不可復諌乃潜謀滅之先夙夜綜其府事而附其欲錢鳯敦所信也嶠謂人曰錢丗儀精神滿腹嶠素有知人之稱鳯聞而恱之深結好於嶠㑹丹陽尹缺嶠說敦曰京尹輦轂喉舌宜得文武兼之公冝自選其才敦然之問嶠誰可作者嶠曰愚謂錢鳯可用然裁之在公敦思惟良乆曰無復勝君嶠即苦辭敦不從表􅀘丹陽尹猶懼錢鳯爲之姧因敦置酒與嶠别嶠曰違離宇下情戀不巳願自起行酒以展􅄮路之心行酒至鳯未飲嶠因僞醉以手板擊鳯幘爲之墜作色曰錢鳯何人温}
  - {type: page-break, offset: 957, content: '', id: KR3k0012_SBCK_494-6b}
  - {type: variant, offset: 958, length: 1, content: 尉, SBCK: 真行酒而敢不飲鳯不恱敦以爲醉兩釋之明日鳯曰嶠與朝廷甚宻必未可信或懷反噬冝更思之敦曰太眞昨醉小加聲色豈得以此相詭貳由是鳯謀不行而得還都又曰王允之年在捴角敦深知之謂爲似巳入則共寢甞夜飲辭曰醉先眠敦將錢鳯計逆允之悉聞慮敦或疑於眠處大吐敦果照視見眠吐中不復疑之唐書曰}
  - {type: variant, offset: 960, length: 5, content: 固及內外忠, SBCK: 義府擢拜中書侍郎同中書門下三品􅁥修國史賜爵廣平縣男義府貌狀温恭與人語必嬉怡微􅀏而􅄶忌隂賊旣處權要欲人附已微忤意者輙加傾䧟故時人言義府􅀏中有刀又以其柔而害物亦謂之李猫尹文子曰虎求百獸食之得狐狐曰子無食我也天帝令我長百獸今子食我是逆天帝命也子以我言不信吾爲子先行子隨我後觀百獸之見我不走乎虎以爲然故遂與行獸見之皆走虎不知獸之畏已而走以爲畏狐也韓子曰司城子罕謂宋君曰慶賞賜予者民之所好也君自行之誅罰殺戮者民之所惡也}
  - {type: page-break, offset: 960, content: '', id: KR3k0012_SBCK_494-7a}
