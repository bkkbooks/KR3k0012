body:
  text: 人事部五十六孝女史記曰淳于緹縈者齊人也父淳于意為太倉令生女五人縈㝡小父犯罪當刑乃罵其女曰生女不生男緩急非有益也縈自傷涕泣隨父至長安詣北闕上書曰父為吏齊中皆稱廉平今坐法當刑妾傷死者不可復生刑者不可復續雖欲改過自新其道無由妾願沒為官奴以贖父之刑使得自新漢文帝憐悲其意原其父罪漢書曰東海有孝婦少寡無子養姑甚謹姑欲嫁之終不肯姑告鄰人曰孝婦養我勤苦我老久累丁壯奈何其後姑自縊死姑女告吏曰婦殺我母吏捕孝婦自經服罪于公以為此婦養姑孝聞必不煞也太守不聽于公爭之不能得乃抱其獄哭於府上因辭疾去遂煞孝婦郡中枯旱三年後太守至于公曰孝婦不當死前太守強斷之當在是乎於是太守煞牛自祭婦冢天立大雨後漢書和熹鄧皇后諱綏太傅禹之孫也父訓護羗校尉母陰氏光烈皇后從弟女也后年五歲太傅夫人愛之自為翦髮夫人年高目眊誤傷后額忍痛不言左右見者怪而問之后曰非不痛也太夫人哀憐為斷髮難傷老人意故忍之耳晉書曰衛瓘及禍太保主簿劉瑤等冒難收瓘而葬之楚王偉之伏誅也瓘女與國臣書曰先君名謚未列無異凡人每怪王國蔑然無言春秋之失其咎安在悲憤感慨故以是意瑤等執黃幡撾登聞鼓上言又曰會稽寒人陳氏有三女無男祖父母年八九十老無所知又篤癃病母不安其室遇寒飢女相率於西湖採菱更日至市貨賣未嘗虧怠鄉里稱為義門多欲取為婦長女自傷焭獨誓不肯行祖母尋相繼卒三女自營殯葬為菴舍屋墓側又曰永興概中里王氏女年五歲得毒病兩目皆盲性至孝年二十父死臨屍一叫眼皆血出小妹娥舐其血左目即開時人稱為孝感唐書曰劉寂妻夏侯氏滑州胙城人字碎金父長雲為鹽城縣丞因疾喪明碎金遂求離其夫以終侍養經于五年兼事後母以至孝聞及父卒毀瘠殆不勝喪被髮徒跣負土成墳廬於墓側每日一食如此者積年貞觀中有制表其門閭賜以粟帛又曰于敏直妻張氏營州都督睆城公儉之女也數歲時父母微有疾即觀察顏色不離左右晝夜省侍宛若成人及稍成長恭順彌甚適延壽公于欽明子敏直初聞儉有疾便即號勇自傷期於必死儉卒後凶問至號哭一慟而絕高宗下詔賜物百段仍令史官編錄之又曰楊紹宗妻王氏華州華陰人也初年三歲所生母亡為繼母鞫養至年十五父又征遼而沒繼母尋亦卒王乃收所生母及繼母屍柩并立父形像招魂遷葬訖又廬於墓側陪其祖母及父墳永徽中詔曰故楊紹宗妻王氏因心為孝率性成道年迫桑榆筋力衰謝以往在隋朝父沒遼左招魂遷葬負土成墳又葬其祖父母等竭此老年親加板築痛結晨昏哀感行路永言志行嘉尚良深宜摽其門閭用旌敏德賜物三十段粟五十碩又曰孝女賈氏濮州鄄城人也始年十五其父為宗人玄基所害其弟強仁年幼賈氏撫育之誓以不嫁及強仁成童思共報復乃候玄基煞之取其心肝以祭父墓遣強仁自列於縣有司斷以極刑賈詣闕自陳己為請代強仁死高宗哀之特制賈氏及強仁免罪移其家於洛陽又曰汴州李氏孝女年八歲父卒柩殯在堂十餘載每日哭泣無限及年長母欲嫁之遂截髮自誓請在家終養及喪母號毀殆至滅性家無丈夫自營棺槨州里欽其至孝送葬者千餘人葬畢廬於墓側蓬頭跣足負土成墳手植松柏數百株李昶列上其狀制特表其閭賜以粟帛顏氏家訓曰張建女三歲喪母靈床上屏風平生舊物屋漏沾濕出曝曬之女子一見伏床流涕家人怪其不起乃往抱持薦席淚漬精神傷沮不能飲食將以問醫診脈云女腸斷矣因耳便吐血數日而亡中外憐之莫不悲歎宣州圖經曰宛陵管氏女名瑤年十七與母同寢母為虎所負去瑤哀叫隨之因囓虎耳墮方捨其母瑤即負母歸家氣絕武帝表其門以旌孝行王韶之孝子傳曰周青東郡人母疾積年青扶持左右四體嬴瘦村里乃歛錢營助湯藥母痊許嫁同郡周少君少君疾病未獲成禮乃求青母見青囑託其父母青許之俄而命終青供為務十餘年中公姑感之勸令更嫁青誓以匪石後公姑並自殺女姑告青害殺縣收栲捶遂以誣款七月刑青於市青謂監殺曰乞樹長竿擊白幡青若殺公姑血入泉不殺者血上天血乃緣幡竿上天宋躬孝子傳曰賈恩會稽諸暨人也母亡在殯為災火所燒恩及妻伯號哭赴火火不及去鄰近救助棺器得免恩伯二人髮膚燋烈須臾俱死元嘉四年牓門曰孝蠲役三世師覺授孝子傳曰北宮氏女嬰兒子者齊人也無兄弟而父母老遂撤其環瑱誓不適人以奉養父母國人聞之莫不相率以孝請女為趙王后齊使候問使者曰北宮氏女嬰兒子無恙耶撤其環瑱至老不嫁以養父母此助王率民出於孝者也齊王聞之表其門以顯異焉異苑曰順陽南鄉縣楊豐與息女香於田穫粟豐為虎所噬香年甫十四手無寸刃乃搤虎頸豐因獲免香以誠孝致感猛獸為之逡巡太守平昌孟肇之賜資榖旌其門閭焉列女傳曰陳寡孝婦者陳之寡婦人也年十六而嫁未有子其夫當從戎屬孝婦曰我有老母吾不還汝肯善視吾母乎婦曰諾夫果死婦養姑不衰父母將嫁之孝婦曰受人之託豈可棄哉因欲自殺父母懼不敢嫁之養姑二十八年姑年八十四壽乃盡賣其田宅以葬之列女後傳曰珠崖二義者珠崖令之後妻及前妻女也女名初生十三珠崖多珠繼母連大珠以為係臂及令死當送喪還法內珠於奩入關者死繼母棄之其子男九歲取之置其母鏡奩中皆不知也及關候搜索得珠奩中吏曰誰當坐者初謂是其繼母取之乃白曰君不幸夫解係臂棄之初心惜之取置夫鏡奩中夫人不知也母亦為然憐之乃曰此珠妾之係臂也君不幸妾解之心不忍棄而置鏡奩中妾當坐因此哭哀動傍人閞吏執筆書不能就一字閞候垂涕終日不能乃曰母子有義如此吾寧可坐之不忍加文後訪訊乃九歲男兒內焉又曰酒泉龐孝婦者趙君安之女也名俄親君安為同縣孝壽所殺而娥親兄弟三人一時病亡壽乃喜而自賀以為莫己報也娥親聞之陰思欲以報壽備兵以伺壽十數年於縣門前斫殺壽訖詣縣自首守長義之解印綬去欲縱娥親娥親曰讎怨賽身妾之分治獄制罪君之常理何敢茍生以枉公法後遇赦得免太常張奐聞嘉之禮以束帛又曰潁川公孫何者公孫氏之女年十三怨家報其父父走得免何與母俱亡母先得見仇人甚悅爭欲取心何便馳出叩頭涕泣曰老母常有篤疾垂沒之人安足殘戮以塞忿哉我是其兒父母所憐不如殺我遂殺之而捨其母會稽典錄曰孝女曹娥者上虞人父盱能弦歌為巫五月五日於縣泝江濤迎婆娑神溺死不得屍骸娥年十四歲乃緣江號哭晝夜不絕聲旬有七日遂投江而死縣長改葬娥於道傍為立碑焉益部耆舊傳曰孝女雄者犍為人父江和為縣功曹縣長遣江和拜檄謁郡太守乘舡墮湍水物故屍喪不歸雄號泣晝夜心不圖存所生男二人並數歲乃各為作囊盛珠環以係兒臂數為訣別之辭家人每防閑之經百許日後稍懈雄因乘小舡於父墮處慟哭遂自投水死弟賢其夕夢雄告之卻後六日當共父出至期伺之果與父相持浮於江上部縣長表言為雄立碑圖像其形焉續述征記曰梁鄒城西有籠水發源長城山直北流於梁鄒西注濟或云齊之孝婦誠感神明湧泉發室內事具水部晏子春秋曰景公所愛槐令吏守之犯槐者刑傷之者死有不聞令遇而犯之者吏收而拘之將加罪焉其子女往晏子之家說曰賤妾請有道於相國妾聞明君不為禽獸傷人今君以樹木之故殺妾父妾恐害明君之義晏子明日早朝而復於君公令吏罷守槐之役出犯槐之囚紀聞曰吳宣城郡青陽縣有梅根治孝女李娥廟居曾阜之巔林木秀茂周廻十里土人不敢樵採敬而事之日薦蘋藻娥父吳大帝時為鐵宮冶以鑄軍器一夕煉金竭鑪而金不出時吳方草創法令至嚴諸耗折官物十萬即坐斬倍又沒入其家而娥父所損折數過千萬娥年十五痛傷之因火烈遂自投于鑪中赫然屬天於是金液沸湧溢於鑪口娥所躡三履浮出於鑪身則化矣其金汁塞鑪而下遂成溝渠泉注二十里入于江水其所收金凡億萬斤溝渠中鐵至今仍存故吳俗每治銅鐵必先為娥立祠享而祈福歙州圖經曰章頊歙縣合陽鄉人也妻程氏與二女入山採葉程為暴虎銜囓去二女冤叫挽其衣裙與虎爭力虎乃捨之程由是獲全時刺史劉贊嘉之給湯藥蠲戶稅改鄉為孝女宣室志曰鄭邯耕民也天寶中母病人教令啖杏實可愈其妻楊氏曰此非時之物須勞苦以求之冀上天哀憫而賜子其傭耕侍疾吾欲徧於邑里訪之庶比於解叔謙丁公藤之感也乃至鄰郡易君子之衣而行忽於道傍莽穢中見一杏實悲喜再拜取之絜滌而歸奉其姑曰他郡有人憫其事遺此一實姑喜食之疾漸瘳明年夏忽一日雷風甚動其屋盧殷殷然不斷若在簷宇里人驚慴遁去者不可勝計楊氏泣告其姑曰去冬以莽穢中杏實奉姑紿為郡人所遺今天將謫妾以死從此別矣乃伸臂立於庭具訴其事詞未畢忽有聲若發其庭者雲物陰晦默不可辨既而楊氏覺其臂若捧千金重莫能舉久方開霽乃視之有二金龍長數尺蟠遶其左右臂龍頂上有字曰賜楊氏自是其家日豊至為富室
