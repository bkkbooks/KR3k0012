body:
  text: 羽族部十鴿說文曰鴿鳩屬也後魏書曰崔光曾於門下省晝讀經有鴿飛集膝前遂入於懷綠臂上肩久之乃去道俗贊詠詩頌者數十人梁書曰侯景圍臺城軍士煮弩燻鼠捕雀食之殿堂舊多鴿群藂至是殲焉隋書曰文帝嘗宴達頭可汗使者於武德殿有鴿鳴於梁上上命崔彭射之既發而中上大悅賜錢臺萬又曰楊秦見赤鴿映棘高二尺越絕書曰蜀有花鴿狀如春花戴祚西征記曰祚至雍丘始見鴿大小如鳩色似鸚鵡戲時兩兩相對鸜鵒周禮曰鸜鵒不踰濟鄭司農注云不踰濟無妨中國有也地氣然也禮稽命徵曰孔子謂子夏曰群鵒至非中國之禽也左傳曰有鸜鵒來巢書所無也師巳曰異哉吾聞文成之世童謠有之師巳魯大夫也鸜之鵒之公出辱之鸜鵒之羽公在外野往饋之馬鸜鵒株株公在軋侯株株跳行貌徵褰與襦褰袴也鸜鵒之巢遠哉遙遙稠父喪勞宋父以驕稠父昭公死故喪勞也宋父定公代玄以驕鸜鵒鸜鵒往歌來哭昭公生出歌也死還哭也童謠有是今鸜鵒來巢其將及乎公羊傳曰有鸜鵒來巢何以書記異也何異爾非中國之禽也宜穴而巢何休注曰鸜鵒猶欲此推固欲自下居上之徵春秋考異郵曰鸜鵒者飛行屬於陽夷狄之鳥穴居於陰異苑曰五月五日翦鸜鵒舌令學人語山海經曰衡山多青臒及鸜鵒晉書曰鎮西將軍謝尚字仁祖善鸜鵒舞幽明錄曰晉司空桓豁在荊有參軍剪五月五日鸜鵒舌教令學語遂無所不名顧參軍善彈琵琶鸜鵒每立聽移時又善能效人語聲司空大會吏佐令悉效四坐語無不絕似有生齆鼻語難學學之不似因內頭於甕中以效焉遂與齆者語聲不異主典人於鸜鵒前盜物參軍如廁鸜鵒伺無人密白主典人盜如千種一二條列衘之而未發後盜牛肉鸜鵒復白參軍曰汝云盜肉應有驗鸜鵒曰以新荷裹著屏風後檢之果獲痛加治而盜者患之以熱湯灌殺參軍為之悲傷累日遂請殺此人以報其怨司空言曰原殺鸜鵒之痛誠合治殺不可以禽鳥故極之於法令止五歲刑也淮南萬畢術曰寒皋斷舌可使語取寒皋斷其舌即語寒皋一名鸜鵒唐書曰祕書少監崔行功未得吾品前忽有鸜鵒衘一物入其堂置案上而去乃魚袋玦數日加大夫荊楚歲時記曰五月鸜鵒子毛羽新成俗好登巢取養之以教其語謂之花鵒倉庚禮記曰仲春之月倉庚鳴毛詩曰春日載陽有鳴倉庚又曰倉庚于飛熠熠其羽又曰黃鳥于飛集于灌木又曰綿綿黃鳥止于丘阿又曰睍睆黃鳥載好其音又曰黃鳥哀三良也交交黃鳥止于棘誰從穆公子車奄息詩義䟽曰黃麗留也或謂黃栗留幽州謂之黃鸎或謂之黃鳥一名倉庚一名商庚一名鵹黃一名楚雀齊人謂之搏黍關西謂之黃鳥常以椹熟時來在桑間此乃應節趣時之鳥或謂之黃袍爾雅曰倉庚商庚即鶩黃也鵹黃楚雀即倉庚也又曰皇黃鳥郭璞曰俗注黃離留亦呼名搏黍韓詩曰簡簡黃鳥載好其音說文曰離黃倉庚也鳴即蠶生也戴勝禮記曰季春之月戴勝降于桑鄭玄曰蠶將生之候也戴勝趣織之鳥是時恒在桑言降若時治自天來故重乙爾雅曰鴡彼及切鴒皮及切戴鵀也郭璞曰鵀即頭上勝也亦呼為戴勝鴡鴔者猶今𪃃鶝語聲轉耳春秋考異郵曰孟夏戴絍降說辭曰戴絍之為言戴勝也陽衘表以期達蠶珥絲在四月故孟夏載絍出以任氣成天津也故戴絍出蠶期起絍而載之明趣時急也衘天表候以于期已至唯蠶是務珥吐也孝經援神契曰戴絍下蠶始生魏志曰戴絍烏巢張珔門陰告門人曰夫戴鵀陽鳥而巢門陰此凶祥也旬日而卒揚雄方言曰燕之東北朝鮮洌水之間鳲謂之鶝鴀自關而東謂之戴絍東齊海岱之間謂之戴南南猶絍也或謂之紡澤或謂之輻燕之東北朝鮮冽水之間謂之𪂉𪂉郭璞注爾雅曰尸鳩布穀非戴勝也爾雅紡在戴絍下然曰案爾王鳥名爾方言依此義又失之廣雅同也扈詩曰交交桑扈率塲啄粟桑扈竊脂也牋云竊脂肉食今無肉自場啄粟失其性也不能以自治又曰交交桑扈有鶯其羽詩義䟽曰或說有鶯其羽言雖小鳥其鶯然有文章左傳曰郯子云少皞擊以鳥名官九扈為九農正扈民無淫者也杜預注云扈止也止民使不淫爾雅曰春扈頒扶云切鶞勑偷切夏扈竊玄秋扈竊藍冬扈竊黃桑扈竊脂棘扈竊丹行扈唶唶子夜切宵扈嘖嘖郭璞注曰諸扈皆因其毛色音聲以名也犍為舍人曰頒鶞主三士宜穀種樹也竊玄黑色移民去黃竊扈青移民收歛竊黃色黃氏蓋藏竊丹色赤為民鴟鳥行扈晝行鳴宵扈夜行鳴皆隨四時同依諸扈為節候也嘖音債山海經曰崌山有鳥焉如鶚赤身白首其名竊脂郭璞注曰今呼責雀為竊脂疑非此也又曰上申之山鳥多當扈狀如雉以髯飛食之不眴目上音瞬淮南子曰馬不食脂桑扈不啄粟非廉也左思齊都賦曰四扈推移春秋冬夏四時鳥也百舌禮記曰仲夏之月反舌無聲鄭玄注曰反舌百舌也又曰郯子曰少皞鳥師而鳥名祝鳩氏司徒者也杜預注鵻鳩孝故為徒主司教民春秋保乾圖曰江充之害太子交啄反舌鳥入殿宋均注曰交啄反舌百舌鳥風土記曰祝鳩反舌也鄭注禮記云反舌百舌鳥麋信難曰案緯書反舌蝦蟆也昔於長安與諸生共至城北水中取蝦蟆剝視之其舌反成向此則鄭君得過乎喬夙荅曰蝦蟆五月中始得水當聒人耳何云無聲是知蝦蟆非反舌鳥易通卦驗曰反舌鳥乃能反覆其舌隨百鳥之音周書曰芒種之日又五日反舌無聲反舌有聲佞人在側孔子明鏡曰國臣謀反有反舌鳥入宮淮南子曰人有多言猶百舌之聲後魏書曰汝陽王為東豫州刺史舉城降梁梁武以為北道總督至項城朝廷出師討之望風退走梁武責之曰舌同百鳥瞻若鼷鼠遂徙合浦郭愔百舌鳥詩曰百舌鳴高樹弄音無常則借問聲何煩永俗不尚嘿伯勞禮曰仲夏之月鷃始鳴鄭云鵙搏勞蔡邕章句鵙伯勞一曰伯趙應時而鳴為陰候也左傳曰郯子云少皞時伯趙氏司至者也杜預注曰伯越伯勞也夏至鳴冬至止詩曰七月鳴鵙鄭玄曰伯勞鳴將寒之候五月鳴幽也晚寒鳥物之候從其氣焉爾雅曰鵙伯勞也郭璞注曰似𪁞鶡而大大戴禮夏小正曰五月鳲則鳴鳲者伯鷯也鳴者相命也廣雅曰伯趙鵙也易通卦驗曰夏至小暑伯勞鳴孟子曰南蠻鴂舌博勞也淮南萬畢術曰伯勞使虵蜿蟬乃天使然也又曰伯勞守金人不敢取取伯勞血以塗金人不敢取東方朔別傳朔與弟子偕行渴令弟子扣道邊家求飲不知姓名主人門門不與須臾見伯勞飛集主人門中李樹上朔謂弟子曰此主人姓李名伯當爾但呼李伯當果有李伯當應即入取飲陳思王植貪惡鳥論曰國人以伯勞鳥獻諸庭者侍臣謂曰世同惡伯勞之鳴何謂也王曰月令仲夏鵙始鳴詩云七月鳴鵙七月夏之五月鵙則博勞也昔尹吉甫信後妻之讒而殺孝子伯奇其弟伯封求而不得作黍離之詩俗傳云吉甫後悟追傷伯奇出遊于田見異鳥鳴於桑其聲噭然吉甫心動曰無乃伯奇乎鳥乃拊翼其聲尤切吉甫曰果吾子也乃顧曰伯奇勞乎是吾子栖吾輿非吾子飛勿居言未卒鳥尋聲而栖其蓋歸入門集于井幹之上向室而號吉甫命後妻載弩射之遂射殺後妻以謝之故俗惡伯勞鳴言所鳴之家必有尸也好事附名為之說令俗人惡之其實否也伯勞以五月鳴應陰氣之動陽為仁養陰為殘賊伯勞蓋賊害之鳥也屈原曰鵙鴂之先鳴使百草為之不芳其聲鵙鵙故以音名也晉書曰慕容垂之起於關東歲在癸未符堅之分氐戶於諸鎮也趙整因侍援琴而歌曰阿得脂博勞舅父是仇綏尾長翼短不能飛遠徙種人留鮮卑一旦緩急語阿誰堅笑而不納至是整言驗矣周書時訓曰芒種之日螳蜋生又五日鵙始鳴若不鳴號令壅逼兵書曰軍行卒見伯勞鳴軍前後賊來圍吾軍伯勞鳴軍中軍分散有所配屬京房易妖占曰伯勞藂邑中歲大水伯勞鳴軍中師分而水且至鳴於君之宮凶夢書曰伯勞為憂口舌聲可惡也夢見伯勞憂口舌也斲木爾雅曰鴷斲木也郭璞注曰斲木蟲因名今斲木有兩三種在山中者大有赤色臨海異物志曰啄木大如雀喙足背青毛色正青翠鳥類也凡啄木異種舌長二寸抄有剌針裴諧集左氏詩曰南山有鳥自名啄木飢則緣樹暮則巢宿無干於人惟志所欲此蓋禽獸性清者榮性濁者辱閩中名士傳曰薛令之唐開元中為左補闕兼太子侍講時東宮官冷落久次難進令之題詩云明月夜團團照見先生盤盤中何所有苜蓿長欄干飯澀匙難綰羹稀筯易寬只可謀朝夕郍能度歲寒明皇因幸春宮見之不悅命筆酬之曰啄木觜距長鳳凰毛羽短既嫌松桂寒任逐桑榆暖令之遂投簪謝爵徒步東還鳭鷯爾雅曰鳭鷯剖葦郭璞注曰好剖葦皮食其中蟲因名之鳲音刀又曰桃虫鷦其䳄鴱注云鷦桃雀俗呼為巧婦詩曰肇允彼桃虫翻飛惟鳥注桃蟲鷦鷯是也故爾雅曰桃蟲鷦也微小黃雀其鶵化為蜩故俗語曰鷦鷯生蜩雀易林亦謂桃蟲生蜩或云布穀生子鷦鷯養之方言曰自關而東謂之土雀或謂之女匠今亦名巧婦以東呼希母自關而西謂之鸋鴂爾雅云𪁽鴙鵄鴞屬也非甯決音自關而西謂之桑死或謂之蔑雀莊子曰鷦鷯巢深林不過一枝說苑曰孟嘗君寄客於齊王三年不見用客反見孟嘗君曰不知臣罪耶君之過也孟嘗君曰縷因針而入不因針而急夫子之才必薄矣客曰不然臣見鷦鷯巢於葦之苕鴻毛著之臨危建之工女不能為可謂完堅矣大風至則苕折卵破者其所託者使然也晉書曰張華素孤貧為鷦鷯賦成阮籍見之曰王佐之才也由是聲名始著巂爾雅曰巂周也郭璞注曰巂鳥孫炎為鷰別名風土記亦云是赤口鷰也蜀王本紀曰望帝使臣鱉靈治水去後望帝與其妻通慚愧且以德薄不及鱉靈乃委國授之去望帝去時子䳏鳴故蜀人悲子䳏鳴而思望帝望帝杜宇也從天墮臨海異物志日鷤䳏一名田鵑春三月鳴晝夜不止音聲自呼俗言取母血塗其口兩邊皆赤上天自言乞恩至當陸子熟鳴乃得止耳呂氏春秋曰伊尹說云肉之美者巂燕鷰之翠高誘注鳥名翠踈異苑曰杜鵑始陽相推而鳴先發聲者便吐血死昔有人山行見一群寂然即聊學其聲便嘔血死鵽爾雅曰鵽鳩冠雉郭璞注曰鵽大如鴿似鳴雉鼠腳無後指歧為鳥憨急群飛出北方沙漠地莊子曰青鵽愛子忘親司馬彪注曰鵽鳥專愛其子而忘其母也唐書曰高宗時突厥犯塞初突厥之未叛也有鳴鵽群飛入塞相繼蔽野邊人相驚曰此鳥一名突厥雀南飛突厥犯塞之候也及是春還復北飛至靈夏之北悉墮地而死視之則無頭矣裴行儉問於右史苗神容曰鳥獸之祥乃應人事何也對曰人雖最靈而稟性含氣同於萬類故吉凶兆於彼禍福應於此聖王受命龍鳳為嘉瑞者和氣同也故漢高斬虵而驗秦之必亡仲尼感麟而知己之將死夷羊在牧殷紂以滅鸜鵒來巢魯昭出奔鼠舞端門燕剌誅死大鳥飛集昌邑以敗是故君子處恭寅畏動必思義雖在幽獨如承大事知明神之照臨懼患難之及己也雉升鼎耳殷宗側身以修德鵩止坐隅賈生作賦以敘命卒以無患者德勝祥也鴞毛詩曰鴟鴞周公救亂也鴟鴞鴟鴞既取我子無毀我室詩義䟽曰鴟鴞似黃雀而小啄剌如錐取茅為巢以麻紩之如剌絑靴縣著樹或一房或二房幽州謂之鸋鳲或曰女匠關東謂之工雀關西謂之蔑雀或謂巧女爾雅曰鴟鴞鸋鳲鴟春秋運斗樞曰玉衡星散為鴟莊子曰鴟得腐鼠鵷鶵過之仰而視之又曰鵄嗜鼠之鳥也淮南子曰虞氏者梁富人也登高樓臨大路設樂陳酒博於其上遊俠相隨行樓下博者射中而笑飛鳶墮腐鼠而中遊俠俠相與語曰虞氏富人奚有輕人之志乃辱我以腐鼠其夜乃殺虞氏大滅其家此謂類非也淮南萬畢術曰鴟腦令鷄自伏取鴟腦以塗鷄自即伏不能起也呂氏春秋曰亂國之妖市有舞鴟鹽鐵論曰泰山之鴟啄腐鼠於窮澤非有害於人也今有同盜主財而食之焉得若泰山之鴟乎後魏書曰孝武即位蠕蠕諸藩並遣使朝貢帝臨軒宴之有鴟鳥飛鳴於殿前帝素知竇熾善射因欲矜示遠人乃給熾御箭兩隻命射鴟應弦而落諸蕃人咸歎異焉帝大悅列仙傳曰李仲甫夜臥床上或為鴟鳥跱架上後至沓縣臣山上候北風當飛度南海山上有羅鷹者羅得鴟視之仲甫也後留更三年自云往崑崙去茅鴟爾雅曰狂茅鴟郭璞注曰鳩鴟也似鷹而白孫炎曰大目鵂鶹也廣雅曰盧休茅鴟鳩也左傳曰叔孫穆子食慶封慶封汜祭穆子不說使工為之誦茅鴟茅鴟逸詩剌不敬亦不知鳶禮記曰前有塵埃則載鳴鳶鳶鳥則膊風也毛詩曰鳶飛戾天魚躍于淵爾雅曰鳶鳥醜其飛也翔布翅翱翔漢書曰成帝河平元年太山有鳶焚其巢子墮地黑色東觀漢記曰馬援擊交阯下潦上霧毒氣上蒸仰視烏鳶跕跕丁兼切墮水中梁書曰永安侯蕭礭字仲正少好弓馬人有笑者礭謂之曰吾當為國家破賊故預習之每臨陣對敵意氣安祥帶甲據鞍自朝至夕馳驟往返不以為勞侯景愛之恒在左右常從景出獵見飛鳶景眾射之莫能中礭射之應弦而落自是王偉忌之隋書曰崔彭善射達頭可汗遣使於上曰請得崔將軍一與相見上曰此必善射聞於虜庭所以來請耳遂遣之及至匈奴中可汗召善射者數十人因擲肉於野以集飛鳶遣其善射者射之多不中復請彭射之連發數矢皆應弦而落突厥相顧莫不歎服可汗留彭不遣百餘日上賂以繒綵然後得歸又曰長孫晟引啟民可汗歸附賜射於武安殿選善射者十二人分為兩列啟民曰臣有長孫大使得見天子今日賜射願入其列許之給晟箭六隻發皆入鹿啟民列竟勝時有鳶群飛上曰公善彈為我取之十發俱中應丸而落是日百官獲賚晟獨居多博物志曰漢舊使綦國送鳶卵給太官晉中興書徵祥說曰永和九年吳郡獻白鳶
