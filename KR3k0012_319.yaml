body:
  text: 兵部四十九攻圍下王隱晉書曰祖約為豫州刺史胡騎至攻城大戰其日西風兵火俱攻賊以繩繫鐵鉤擿挽城樓樓住拔壞又作鐵鉤𢺡音斸城登梯得上所挽樓城北角行墻三十步壞約始大怖使戴洋呼孫叔敖伍子胥卿若使胡奴得城當持白酒寸脯著卿前急今轉風卻賊當上肥牛中後風轉下晡賊退亦不知風偶自轉為能感動晉書曰趙王倫孫秀為義師所討日蹙乃與秀謀或欲收餘卒出戰或欲焚燒宮室誅殺不赴己者或欲乘船東走入海計未決王與率營兵七百餘人自南掖門入勑宮中兵各守衛諸門三部司馬為應於內與自往攻秀秀閉中書南門與放兵登墻燒屋秀及左右遽走出左衛將軍趙泉斬秀等以徇又曰劉𥙿率兵伐後秦姚泓後魏遣將鵝青等步騎十萬屯河北有數千騎緣河隨晉軍進止時軍人緣河南岸牽百丈河流迅急有漂渡北岸者輒為魏人所殺掠遣軍纔過岸即退軍還復來宋武乃遣白直隊主丁旿音午率七百人及車百乘於河北岸上去水百餘步為却月陣兩頭抱河車置七仗士事畢使豎一白眊仍吏功羽毛飾魏人見數百人步牽車上不解其意並未動宋武先命朱超石戒嚴二千人白眊既舉超石馳往赴之並齎大弩百張一車益二千人設彭排轅上魏人見營陣乃進圍營超石先以軟弓小箭射敵敵以眾少兵弱四面俱發寅薄攻營於是百弩俱發又遣善射者叢箭射之魏眾既多弩不能制超石初行別齎大搥并千餘張矟乃斷矟長四尺以搥搥之一矟輒洞貫三四人魏眾不能當一時奔潰宋書曰晉義熙五年六月偽燕主慕容超留羸老守廣固使其廣甯王賀刺盧及公孫五樓悉力據臨朐去城四十里有臣夢水超告五樓急據之北至為龍符所保五樓乃退大軍分四千兩車為二翼方軌徐行車悉張幰御者執矟以騎為遊軍軍令嚴肅比及臨朐賊騎交至帝命兗州刺史劉藩荊州刺史劉道鄰等陷其陣日向昃戰猶酣帝用參軍胡藩策襲剋臨朐賊乃大奔超遁還廣固獲其玉璽豹尾輦等送于都景子剋廣固大城超固其小城乃築長圍以守之館穀於青土停江淮轉輸又曰朱循之隨右軍到彥之北自河南廻循之留戍滑臺被魏將安頡攻之圍糧絕將士熏鼠食之循之被圍既久母常悲憂忽一旦乳汁驚出母號慟告家人曰我年老非復有乳汁時今如此兒必沒矣魏果以其日剋滑臺囚之又曰宗越為長水校尉竟陵王誕據廣陵反越領軍馬隸沈慶之攻誕及城陷孝武使悉殺城內男丁越受旨行誅躬臨其事莫不先加捶楚或有鞭其面者欣然有所得殺凡數千人改封始安縣子三國典略曰侯景收其餘眾步騎八百南過小城城人登埤詬之曰跛腳奴景怒攻城拔之殺詬者而去又曰周王思政固守頴川高岳久圍不解陳元康言於齊王澄曰公自匡輔朝政未有殊功雖敗侯景本非外賊潁城將陷願公因而乘之足以取威定業王從之於是親至頴川益發其眾號曰決命夫更起土山王坐於堰上趙道德言於王曰箭頭有鐵不避大王引王帶而下箭集於王唑之所梁書曰武帝自襄陽率兵東下至郢州攻未拔蕭頴冑在江陵遣衛尉席闡文勞軍因謂梁武曰今頓兵兩岸不併軍圍郢定西陽武昌取江州此機已失莫若請救於魏與北連和猶為上策梁武謂闡文曰漢口路通荊雍控引秦梁糧運資儲聽此氣息兵若進魯山必阻河路所謂搤喉若糧運不通自然離散何謂持久劉元起近欲以三千往定尋陽彼若懽然悟機一酈生亦足脫拒我師固非三千能下西陽武昌取使耳得便應鎮守兩城不減萬人糧儲稱足卒無所出脫東君有上者萬人攻一城兩城勢不相救若我分軍應援首尾俱弱如其不遣孤城必陷一城既沒諸城相次土崩天下大事於是去矣若郢州既拔席卷沿流西陽武昌自然風靡何遽分兵散眾自貽其憂且丈夫舉動言靜天步況擁七州之兵以誅群豎懸河注火奚有不滅豈容北面請救以自示弱彼未必能信徒貽我醜聲此之下計何謂上策及拔郢城向下城戍無不風靡遂剋建業崔鴻十六國春秋曰前燕將慕容恪率兵討叚龕於廣固恪圍之諸將勸恪宜急攻之恪曰軍勢有宜緩以剋敵有宜急而取之若彼我勢均且須強援虜腹背之患者須急攻之以速大利如其我強彼弱外無寇援力足制之者當羈縻守之以待其弊兵法十圍五攻此之謂也龕恩結賊黨眾未離心今憑固天險上下同心攻守勢倍軍之常法若其促攻不過數旬剋之必矣但恐傷吾士眾當持久以取耳乃築室返耕嚴固圍壘終剋廣固又曰燕將呂護據野王陰通晉事覺燕將慕容恪等率眾討之將軍傅顏言於恪曰護窮寇假合王師既臨則上下喪氣必士卒攝魂敗亡之驗也殿下前以廣固天險守易攻難故為長久之策今賊形便不與往同宜急攻之以省千金之費恪曰護老賊經變多矣觀其為備之道未易卒圖令圈之窮城樵採路絕內無蓄積外無強援不過十旬其斃必矣何必遽殘士卒之命而趍一時之利哉吾嚴濬圍壘休養將卒以重官美貨間而離之事淹勢窮其釁易動我則未勞而寇已弊此謂兵不血刃坐以制勝也遂長圍守之凡經六月而野王潰護南奔于晉悉降其眾後魏書曰齊神武起義兵於河北被爾朱兆天光度律仲遠等四將同會鄴南士馬精強號二十萬圍於鄴南韓陵山時神武馬二千步不滿三萬兆等及圍不合神武連繫牛驢自塞之於是將士死戰四面奮擊大破兆等又曰燕鳳字子章代人也少好學愽綜經史明習陰陽讖緯昭成以禮迎致之鳳不應聘命諸軍圍代城人曰燕鳳不來吾將屠汝代人懼送鳳昭城與語大悅待以賓禮北史曰西魏將王思政守頴川郡城東魏師十萬攻之備盡攻擊之術以頴水灌城陷之思政知事不濟率左右據土山謂之曰吾受國任遂辱王命力屈道窮計無所出唯當効死以謝朝恩仰天大哭左右皆號慟思政向西再拜便欲自剄先是齊文襄告城中人曰有生致王大將軍者封侯重賞若大將軍身有損親近左右皆從大戮都督駱訓謂思政曰公常語訓等但將我頭降非但得富貴亦是活一城人今高襄既有此語公豈不哀城中士卒也固共止之不得引決齊文襄遣其散騎常侍趙彥深就土山執手申意引見文襄辭氣慷慨涕泗交流無屈撓之容文襄以其忠於所事禮遇甚厚思政初入頴川士卒八千人及城陷之日存者纔三千人遂無叛者後周書曰武帝建德五年東伐齊六軍攻晉州城帝屯於汾曲齊王憲攻洪洞永安二城並拔之是夜虹見於晉城上首向南尾入紫宮長十餘丈帝每日自汾曲赴城下親督戰城下惶窘庚午齊行臺左丞侯子欽出降壬午齊晉州刺史崔景嵩守城北面夜密遣送款上開府王軌率眾應之未明登城鼓噪齊眾潰遂剋晉州擒其城主俘甲士八千人送關中隋書曰大業中煬帝徵天下驍果之士以伐遼左沈光預焉同類數萬人皆出其下光將詣行在所賓客送至灞上者百餘騎光酹酒而誓曰是行也若不能建功立名當死於高麗不復與諸君相見矣及從帝攻遼東以衝梯擊城竿長十五丈光昇其端臨城與賊戰短兵接殺十數人賊竟擊之而墜未及於地適遇竿上有垂絙光接而復上帝望見壯異之馳召與語大悅即日拜朝請大夫賜寶刀良馬恒致左右親顧漸密又曰陳稜大業三年拜賀武賁郎將後三歲與朝議大夫張鎮周發東陽兵萬餘人自義安汎海擊流求國月餘而至流求人初見舩艦以為啇旅往往詣軍中貿易稜率眾登岸遣鎮周為先鋒其主歡斯渴剌兜遣兵拒戰鎮周頻擊破之稜進至低沒檀洞其小王歡老摸率兵拒戰稜擊敗之斬老摸其日霧雨晦暝將士皆懼稜刑白馬以祭海神既而開霽分為五軍趍其都邑渴剌兜率眾數千逆拒稜遣鎮周又先鋒擊走之稜乘勝逐北至其柵渴剌兜背柵而陣稜盡銳擊之從晨至未苦鬥不息渴剌兜自以軍疲引入柵稜遂填墳壍攻破其柵斬渴剌兜獲其子島槌虜男女數千而歸帝大悅進稜位右光祿大夫武賁如故唐書曰武德初宇文化及據聊城淮安王神通進兵躡之祕書丞徵謂神通曰化及今據聊城莘人為其固守若至莘即宜攻取但拔莘縣聊城益懼因而逼之易同俯拾須以攻具自隨一足威敵二不乏用不然兵至莘城見無攻具不下如不能剋莘而遠追化及恐亦無功則化及非旬月可獲莘人阻我糧運士及為之外援恐非計之善者神通不從軍次莘果不下而退敗又曰武德中李靖隋河間王孝恭討輔公祏音石賊一軍舟師三萬頓于當塗柵斷江口傍江築城又遣六軍二萬據當塗南路亦造柵自固並蓄力養銳以抗大軍諸將皆云二軍並是強兵為不戰之計城柵既固率不可攻請直指丹陽掩其巢穴若丹陽既破二軍可不戰而破靖曰公祏精銳雖在水陸二軍然其自統之兵亦是勁勇二軍城柵尚不可攻公祏既保石頭豈應易拔若我師師至丹陽留停旬日進則石頭未平退則歸路已絕此便腹背受敵恐非萬全之計然此二軍皆是百戰餘賊必不憚於野戰今若攻其城柵乃是出其不意滅賊之機唯在此舉靖乃率諸將水戰俱苦戰破之二軍悉潰走靖遂率輕兵先至丹陽公祏餘眾雖多不敢戰擁兵東走並相次擒獲又曰高祖率眾攻屈突通於河東士卒登城南面者已千餘人高祖在東原望之而不見會暴雨至鳴角止軍由是不剋或勸遂攻之高祖曰屈突通習兵而無勇若決戰非其所長嬰城難以必勝此自守虜耳不足為虞遂收軍營於河渚又曰薛萬均圍梁師都突厥不敢來援諸將見賊城險固皆有憚色萬均謂之曰城中無氣鼓聲不徹此見敗亡之候平在旦夕諸君勿以為憂俄而師都見殺城降又曰天寶末祿山反尚衡起義兵討祿山以王栖曜為牙旗將下兗鄆諸縣軍威稍振兼衙前總管復下曹州初逆將邢超然乘城號令栖曜曰彼可取也一箭殞之城中氣懾遂下又曰馬燧自京還太原初田悅新代承嗣統兵恐人不附己詐示誠款燧上䟽明其必反宜先備之其年悅果與青恒州通謀自將兵五萬圍邢州攻臨洺築重城內絕其外以拒救兵邢州將李洪臨洺將張伾皆堅守不拔昭義軍數告急乃詔燧將救臨洺燧軍出崞口兵未過險乃遣人持書喻說且示之好悅謂燧畏之十一月師次邯鄲悅遣使至斬之以徇遣兵擊破其支軍射殺其將成鉉之悅自攻臨洺遣大將楊朝先將兵萬餘於臨洺南雙崗下東西列二柵以禦燧燧乃率李抱真李晟進軍營於二柵之中其夜東柵走歸悅進軍營明山取其棄柵以置輜重謂將吏曰朝先守堅柵不下萬人彼令悅等盡銳攻之此數月不能下殺傷必甚吾此必破臨洺賞勞軍士而與之戰必勝之術也悅乃分恒州李惟岳救兵五千以助朝先燧率軍攻朝先田悅將萬餘人救之燧乃令大將李自良李奉國將兵合神策軍據雙崗禦之令曰令悅得過斬爾燧令推火車以焚其柵自晨至暮急擊大破之拔其柵斬朝先及大將盧子昌斬首五千餘級生虜八百餘人居五日進軍徑戰燧自將銳兵扼其衝口凡百餘合士皆決死悅兵大敗斬首萬餘生虜九百人得穀三十萬斛器甲稱是悅收兵夜走邢州五代周史曰慕容彥超漢祖即位授澶州節度使檢校太尉杜重威叛於鄴下以鄆州節度使高行周為行營都部署彥超為副兵至城下二帥不恊杜重威之子婦即行周之息女也行周用兵持重彥超舉措輕躁彥超欲速於攻城行周以為未可彥超乃揚言稱行周以愛女之故惜賊而不攻行周忿之漢祖聞其事懼有他變以是親征及車駕至鄴彥超數因事凌迫行周行周不勝其憾嘗一日至於行宮幕次雨泣告於執政又自掬糞茄於口中聲氣甚厲聞於御座漢祖深知彥超之曲遣近臣和解行周亦召彥超於帳中責之兼令首過於行周行周稍解時彥超獨排君議累請攻城漢祖信之乃親督諸軍四面齊進損傷者萬餘人死者千餘人眾議無不歸罪於彥超自是不復敢言攻城矣說苑曰田單為齊上將興師十餘萬將以攻翟往見魯仲連子曰將軍之攻翟必不能下矣田將軍曰單以五里之城十里之郭復齊之國何謂攻翟不能下也及攻翟三月不下齊之童兒謠曰大冠如箕長劍柱頤攻翟不能下累於吾兵於是田單恐駭往見仲連子曰先生何以知單攻翟不能下也仲連子曰夫將軍即墨之時坐則織簣立則杖箠為士卒唱曰恐宗廟亡矣故將有死之心無生之氣今將軍東有掖邑之封西有淄上之寶黃金橫帶馳乎淄澠之間是以樂生而惡死也田單明日結髮祖于矢石之間乃引桴而鼓之翟人下之淮南子曰趙簡子死未葬中牟入齊中牟自入臣於齊也已葬五日襄子起兵攻之圍未合而城自壞者十丈襄子擊金而退之軍法鼓以進眾鉦以退之軍吏諫曰君誅中牟之罪而城自壞是天助我何故去之襄子曰吾聞之叔向曰君子不乘人於利不迫人於險使之治城城成而後攻之中牟聞其義乃請降古司馬兵法曰眾以合寡為追裹而闕合有交兵眾者以寡合對追逐也圍也以眾擊寡逐而圍之聞其去道無令死戰敵若眾則受裹敵眾己寡則依利道而受圍以堅眾心分共四向而受敵則眾以死為生拔能衝逐四出以克勝也敵若寡若畏則譬之開之敵家少弱恐懼者則開去道無令為窮寇必死戰也韓子曰世有三亡以亂攻治者亡以邪攻正者亡以逆攻順者亡清濟濁河足以為限長城巨防足以為塞管子曰善攻者料眾以攻料食以攻食料備以攻備以眾攻眾眾存不攻以食攻食食存不攻以備攻備備存不攻列子曰楚攻宋圍其城民易子而食之析骸而炊之丁壯者皆乘城而戰者太半
