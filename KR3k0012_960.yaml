body:
  text: 木部八楛尚書禹貢曰荊州厥貢惟菌簵楛注曰楛中矢幹皆出雲夢之澤也毛詩旱麓曰瞻彼旱麓山足也榛楛濟濟陸機毛詩疏義曰榛楛似荊而赤葉似著上黨人篾以為牛筥箱器又屈以為叉故上黨調問婦人欲買赭不曰蛙中自有黃土買叉不曰山中自有楛又文賦曰彼榛楛之勿剪亦蒙榮於集翠靈壽漢書孔光傳曰賜太師靈壽杖孟康曰扶老杖也服虔曰靈壽木名也似竹有節長不過八九尺山海經曰廣都之野靈壽實華樗爾雅曰栲山樗栲似樗色小白生山中亦類漆滲樹毛詩我行其野曰我行其野蔽芾其樗惡木也陸機毛詩疏義曰蔽芾其樗樗樹及皮皆似漆青色其葉臭莊子曰惠子曰吾有大樹人謂之樗其本擁腫不中繩墨小枝拳曲不中規矩立之途匠者不顧今子之言大而無用衆所同去莊子曰何不樹於無何有之鄉廣莫之野逍遙乎寢臥其下風俗通曰嘉平中有兩樗一宿長丈餘作人狀頭目宛然河洛記曰洛陽北山謂之邙山其上無大樹大業都城之北嶺上有古樗樹不知其來早晚婆娑周回四五畝已來在伊闕正南相當越公等將建都城之日據此樹以為南北定准嫌樗木名惡號曰婆娑羅樹矣荊春秋運斗樞曰玉衡星散為荊廣雅曰楚荊也牡荊蔓荊也廣志曰赤莖大實者名曰牡荊又有山荊毛詩漢廣曰翹翹錯薪言刈其楚楚荊也又綢繆曰綢繆束楚三星在戶左傳昭公曰伍舉入鄭聲子將如晉遇之於鄭郊班荊相與食而言復故班布也布荊生地共議之史記曰廉頗肉袒負荊因賓客至藺相如門謝罪卒與為刎頸之交漢書曰淮南王安謀反伍被諫曰昔子胥諫吳王云臣今見麋鹿遊姑蘇之臺臣今亦將見宮中生荊棘露沾衣也東觀漢記曰尹勤治韓詩身牧豕事親至孝無有交遊門生荊棘後漢書曰鮑永為魯郡太守時董憲別帥彭豐虞休皮常等各千餘人稱將軍不肯下頃之孔子闕里無故荊棘自除從講堂至于里門永異之謂府丞及魯令曰方今危急而闕里自開斯豈夫子欲令太守行禮助吾誅無道耶乃會人衆修鄉射之禮請豐共會觀視欲因此擒之豐等亦欲圖永乃持牛酒勞饗而潛挾兵器永覺之手格殺豐等擒破黨與帝嘉其略封為關內侯晉書曰索靖拜酒泉太守惠帝即位賜爵關內侯有先識遠量知天下將亂指洛陽宮門銅駝歎曰會見汝在荊棘中耳老子曰師之所處荊棘生焉周景式孝子傳曰古有兄弟忽欲分異出門見三荊同株接葉連陰歎曰木猶欣然藂況我而殊哉遂還為雍和一曰田真克弟神仙傳曰吳有徐隨居丹徒左慈過隨門下有宿客車六七乘欺慈云徐公不在慈去客皆見牛在楊樹杪車轂中皆生荊木長一二丈客懼入報隨隨曰此左公遣追之客逐慈叩頭謝客還見牛在故地無荊木也顧微廣州記曰撫納縣出金荊禮弓矢圖曰楚焞士敦反以荊為之燃以灼正以荊者凡木心圓荊心方也地理志曰荊楚本多材因名地焉廣州記曰白荊堪為履紫荊堪為床淮南萬畢術曰南山牡荊指病自愈節不相當有月暈時剋之杜寶大業拾遺録曰五年南方置北景林邑海陰三郡北景在林邑南大海中與海陰接境其地東西一千餘里南北三百餘里海水四絶北去大岸三百餘里或云馬援鑄柱尚存地暑熱多大林木高者數百尋有金荊生於高山峻阜大者十圍盤屈瘤蹙文如美錦色艷於真金中夏時有於海際得之工人數用甚精妙貴於沉檀棘毛詩湛露曰湛湛露斯在彼杞棘又黃鳥曰交交黃鳥止于棘又墓門曰墓門有棘斧以斯之周書曰太姒夢見商之庭産棘周禮秋官上曰朝士掌建邦外朝之法左九棘孤卿大夫位焉右九棘公侯伯子男位焉鄭玄曰樹棘以為位者取其赤心而外刺象以赤心三剌也左傳昭公曰豎牛奔齊孟仲之子殺之投其首於寧風之棘上春秋元命苞曰樹棘聽訟其下者棘赤心有剌言治人者原心不失其赤實也後漢書曰馮異朝京師引見帝謂公卿曰是我起兵時主簿也為吾披荊棘定關中又曰仇覽字季智一名香陳留考城人也時考城令河內王渙政尚嚴猛聞覽以德化人署為主簿後渙謝遣曰枳棘非鸞鳳所棲百里豈人賢之路今日太學曳長裾飛名譽皆主簿後耳以一月俸為資勉卒景行晉書曰劉琨至并州荊棘成林豺狼滿道琨剪除荊棘收葬枯骸造府朝建市獄寇盜時來掩襲嘗以城門為戰場百姓負楯以耕屬鞬而耨琨撫循勞來甚得物情又曰祖逖在河南公私豐贍士馬日滋方當推鋒越河掃清冀朔會朝廷將遣戴若思為都督逖以若思是吳人雖有才望無弘致遠識且已剪荊棘收河南地而若思雍容一旦來統之意甚怏怏又曰石季龍大饗群臣於太武殿佛圖澄曰殿乎殿乎棘子成林將壞人衣龍殿石有棘生冉閔小字棘奴時龍養為己子又曰崔洪靖厲骨鯁為尚書左丞時人為之語曰叢生棘剌來自博陵在南為鷂在北為鷹又曰顧愷之畫鄰女象以棘針釘之又曰姚萇符登師於渥源盡俘其衆乃掘符堅尸鞭撻薦之以棘坎土而埋之宋書曰袁淑上太祖書曰所謂棲鳥於烈火之上養魚於叢棘之中北齊書曰世祖為後主擇師傅趙彥深進馬敬德入為侍講其妻夢猛獸將來向之敬德走超叢棘妻伏地不敢動敬德占之曰吾當得大官超棘過九卿也爾伏地夫人也隋書曰流求國居海島之中土人所居曰波羅檀洞塹柵三重環以流水樹棘為藩韓子曰宋人為燕王以棘剌之端為沐猴者使王必三月齊而後觀之右御冶工謂王曰臣聞人主無十日不燕今王不能久齊故以三月為期也棘剌至小安可削乎王必察之王囚而問之果無有乃殺之冶人謂王曰士有虛名多棘剌之說也呂氏春秋曰棗棘之有也裘狐之有也食棘之棗裘狐之皮先王固用非其有而已有之湯武一日而盡有夏商之地秦子曰踰枳棘之籬則有絓枉之患登椒桂之圃則有榮華之芳陳留耆舊傳曰魏尚被繫詔獄有雀集獄棘上尚占曰夫棘樹者中心赤外有剌象我言有剌而赤心之至誠李嘗藥録曰棘實是棗針世人用門冬苗代之非其真也廣五行記曰隋文帝開皇末年代州人姓王仕為驃騎將軍性好畋獵所殺無數有五男無女後有一女子端正若畫見者皆奇之父母特加鍾愛鄉里爭為作好衣而與之女年七歲一旦失之初疑鄰里戲藏之尋訪終不見者諸兄遠覔去家三十餘里於棘中見之欲就抱取驚走馬追不及兄弟以十餘騎圍之而口中唯作兔聲抱歸家不能言而身體盡棘所傷母為挑之得剌盈掬不食而死唐新語曰呂太一為戶部員外郎戶部與吏部鄰司吏部移牒令牆宇悉立棘以防令史交通太一牒報曰眷彼吏部銓綜之司當須簡要清通何必堅籬插棘省中賞其俊拔楚辭曰甘棠枯於豐草號藜棘樹於中庭君子晉宮閣名曰華林園君子樹三株廣志曰君子樹似柳松曹爽樹之於庭長生洛陽記曰明光殿前有長生木樹二株鄴中記曰金華殿後有石虎皇后浴室種雙長生樹世謂之西王母長生樹萬年晉宮閣名曰華林園有萬年樹十四株謝玄暉詩曰風動萬年枝黃蘖說文曰蘖黃木也永嘉郡記曰青田出枯楊所經山路左側木則黃蘖為林草便黃連覆地土人往伐黃蘖者皆有酒食禱祀禱祀若有違失山神意二藥輒化為異物不可復得淮南萬畢術曰蘗令面悅取蘗葉三寸土苽三枚大棗七枚膏和塗面不得四五日立悅矣先以湯洗面乃傳藥抱朴子曰黃蘗芝草者千歲黃蘗根下有如三斛器去本株三丈細根相連大如縷未服之盡一丈則地仙支子漢書貨殖傳曰巵茜千石亦比千乘之家地鏡圖曰望氣見人家黃氣者支子樹也晉令曰諸官有秩支子守護者置吏一人晉宮閣名曰華林園支子五株遊名山志曰樓石山多支子也本草經曰支子一名木丹葉兩頭尖如樗蒲形剝其子如繭而黃赤葛洪治霍亂轉筋方曰燒支子二枚末服之立愈無患纂文曰無患木名也一名曰糅女枚反婁實可去垢崔豹古今注曰程雅問櫨木名曰無患何也答曰昔有神巫曰𡧢眊音餌能以符劾百鬼得鬼則以此木為棒棒殺之世人相傳此木為衆鬼所畏競取此木為器以厭卻邪魅故號曰無患卞敬宗無患枕讚曰爰茲素朴名為吉姑匠人斯製以獻君子栟櫚廣雅曰栟音并櫚櫚棕也吳志曰孫權討黃祖祖橫兩蒙衝保守沔口以栟閭大紲繫石為釘齊書曰高帝討晉安王時朝廷器甲皆充南討帝軍容寡闕乃編援皮為馬具裝折竹為寄生夜舉火進軍賊望見恐懼未戰而走梁書曰張孝秀性通率不好浮華常冠穀皮巾躡蒲履手執栟櫚皮塵尾服寒食散盛冬臥於石上唐書曰訶陵國在南方海中洲上豎木為城作大屋重閣以棕櫚皮覆之王坐其中山海經曰翠之山其木多棕棕樹無枝高二丈許葉大而圓枝生杪頭尖實皮相披一行皮者為一節可以為索廣志曰棕一名栟櫚葉似車輪乃在樹下下有皮纏之附地起二旬一採轉復上生說文曰棕一名蒲葵吳録地理志曰武陵臨沅縣多栟櫚木生山中晉令曰夷其民守護棕皮者一身不輸之
