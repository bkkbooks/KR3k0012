body:
  text: 釋部四異僧下高僧傳曰安清字世高安息國王正后之太子也幼以孝行見稱雖居家而奉戒清峻王薨便嗣位乃深惟苦空散離形器行服既畢遂讓國與叔出家修道博曉經藏而遊方弘化遍歷諸國以漢桓帝之初始到中夏多有神迹世莫能量自稱先身己經出家有一同學多瞋分別值世主不稱每輒恚恨高屢加訶諫終不悛改如此二十餘年乃與同學辭訣云卿明經精勤不在吾後然性多恚怒命過當受惡形我若得道必當相度既而值靈帝之末振錫江南云我當過廬山度昔同學行過宮亭湖廟此廟舊有靈威商旅祈禱乃分風上下各無留滯嘗有乞神竹者未許輒取舫即覆沒竹還本處自是舟人敬憚莫不懾影時商旅三十餘船奉牲請福乃降祝曰舫有沙門可更呼上客咸驚愕請高入廟神告高曰吾昔外國與子俱出家學道好行布施而性多瞋怒今為宮亭廟神周回千里並吾所治以布施故珍玩甚豐以瞋恚故墮此神報今見同學悲欣何言壽盡旦夕而醜形長大若於此捨命穢污江湖當渡山西澤中此身滅後恐墮地獄吾有絹干匹并雜寶物可為立法營塔使生善處也高曰故來相度何不出形神曰形甚醜異衆人必懼高曰但出衆不怪也神從床後出頭乃是大蟒不知尾之長至高膝邊高向之梵語數番贊唄數契蟒悲淚如雨須臾還隱高即取絹物辭別而去舟侶揚帆蟒復出身登山而望衆人舉手然後乃滅倏忽之頃便達豫章即以廟物為造東寺高去後神即命過暮有一少年上船長跪高前受其呪願忽然不見高謂船人曰向之少年即宮亭廟神也得離惡形矣又曰竺曇摩羅剎此云法護其先月支人本姓支氏世居燉煌郡年八歲出家遂隨師至西域遊歷諸國遂通外國之言三十六種書亦如之以晉武之末隱居深山山有清泉恆取澡漱後有採薪者穢其水側俄頃而燥護乃徘徊歎曰人之無德遂使清泉輟流水若永竭真無以自給正當移去耳言訖而泉流滿澗法護以世居燉煌而化道周洽時人咸謂燉煌菩薩也又曰帛遠字法祖才思俊徹敏朗絶倫誦經日八九千言研味方等妙入幽微世俗墳典多所該貫晉惠之末太宰河間王顒鎮關中虛心敬重待以師友之禮每至間辰靜夜輒談講道德于時西府初建俊又甚盛能言之士咸伏其遠達後奄然命終群胡各起塔廟少時有一人姓李名通死而更蘇云見祖法師在閻羅王處為王講首楞嚴經云講畢往忉利天又見祭酒王浮被鎖械求祖讖悔昔祖平素之日與浮每爭邪正浮屢屈既瞋不自忍乃作老子化胡經以誣謗佛法殃有所歸故死方思悔又曰佛馱跋陀羅此云覺賢本姓釋迦氏維羅衛國甘露飯王之苗裔也父少亡賢三歲孤與母居五歲復喪母為外氏所養從祖鳩婆利聞其聰敏兼悼其孤露乃迎還度為沙彌至年十七與同學數人俱以習誦為業衆皆一月賢一日誦畢其師歎曰賢一日敵三十夫也及受具戒修業精勤博學群經多所通達少以禪律馳名常與同學僧迦達多共遊罽賓同處積歲達多雖伏其才明而未測其為人也後於密室閉戶坐禪忽見賢來驚問何來答云暫至兜率致敬彌勒言訖便隱達多知是聖人未測淺深後屢見神變乃歸心祈問方知得不還果然常欲遊方弘化備觀風俗會有秦沙門智睿西至罽賓既要請苦遂愍而許焉於是既度蔥嶺路經六國國主矜其遠化並傾懷資奉至交趾乃附舶循海而行經一島下賢以手指山曰可止於此舶主曰客行惜日調風難遇不可停也行二百餘里忽風轉吹舶還向島下衆人方悟其神咸師事之於後暗夜之中忽令衆船俱發無肯從者賢自起收纜一舶獨發俄爾賊至留者悉被抄害頃之至青州東萊郡聞鳩摩羅什在長安即往從之什大悅秦太子泓欲聞賢説法乃要命群僧集論東宮羅什與賢數蕃往什問法云何空答曰衆微成色色自無性故離色常空又問既以極微破色空微復去何破一微答曰群師或折一微我意謂不爾又問微是常耶答曰以一微故衆微空以衆微故一微空時寶雲譯出此語不解其意道俗咸謂賢之所計微塵是常餘日長安學僧復請更釋賢曰夫法不自生緣會故生緣一微故有衆微微自無性則為空矣寧可言不破一微常而不空乎此是問答之大意也又曰曇無懺天竺人明解呪術所向皆驗西域號為大呪師後隨王王即天竺王也入山王渴須水不能得懺乃密呪石出水因贊曰大王聖化所感遂使枯石生泉鄰國聞者皆歎王德于時雨澤甚調百姓稱詠王悅其道深加優寵後至涼涼王沮渠蒙遜聞懺名呼與相見接待甚厚嘗告蒙遜云有鬼入聚落必多災疫遜不信欲躬見為驗懺即以術加之遜見而駭怖懺曰宜潔誠齋戒神呪以驅之乃讀呪三日謂遜曰鬼已去矣時境首有見鬼者云見數百疫鬼奔驟而逝境內獲安懺之力也又曰釋法顯姓龔平陽武陽人也三歲便度為沙彌十歲遭父母憂孝性過人葬事畢仍即還寺嘗與同學數十人於田中刈稻時有飢賊欲奪其穀諸沙彌悉走唯顯獨留語賊曰若欲須穀隨意所取但君等昔不布施故致飢貧今復奪人恐來世彌甚貧道預為君憂耳言訖即還賊棄穀而去及受大戒常慨經律舛闕誓志尋求以晉隆安三年西度流沙將至天竺去王舍城三十餘里有一寺逼暝過之顯欲詣耆闍崛山寺僧諫曰路甚艱阻多黑師子亟經噉人何由可至顯曰遠涉數萬里誓到靈鷲身命不期出息非保豈可使積年之誠既至而廢雖有險難吾不懼也衆莫能止乃遣兩僧送之既至山日將曛夕遂欲停宿兩僧色懼捨之而還顯獨留山中燒香禮拜翹感舊迹如覩聖儀至夜有三黑師子來蹲踞顯前舐脣搖尾顯誦經不輟一心念佛師子乃低頭下尾伏顯足前顯以手摩之呪曰若欲相害待我誦竟若見試者便可退矣師子良久乃去明晨乃還路窮幽梗止有一徑通行未至里餘忽逢一道人年可九十餘容服粗素而神氣俊遠顯雖覺其韻高而不悟是神人後又逢一少僧顯問曰向者耆年是誰耶答云頭陀迦葉大弟子也顯方大恨更追至山所有橫石塞于室口遂不得人顯流涕而去又曰曇無竭此云法勇至罽賓國禮拜佛鉢住歲餘學梵書語求得觀世音受記經梵文一部復西行雖屢經危險而繫念所齎觀世音經未嘗暫廢將至舍衛國中野逢山象一群無竭稱名歸命即有師子從林中出象驚惶奔走後渡恆河值野牛一群嗚吼而來將欲害人無竭歸命如初尋有大鷲飛來野牛驚散其誠心所感在險克濟皆此類又曰釋智嚴晉義熙十三年宋武帝西伐長安剋捷旋斾塗出山東時始興公王恢從駕遊觀山川至嚴精舍見其同止三僧各坐繩床禪思湛然恢至良久不覺彈指三人開眼俄而還閉不與言恢心敬其奇訪諸耆老皆云此三僧隱居求志高潔法師也恢即啓宋武延請還都莫肯行者既屢請情至二人推嚴隨行恢道懷素篤禮事甚勤還都即住始興寺嚴性虛靜志避喧塵恢乃為於東郊起精舍即枳園寺也嚴在寺不受別請常分衛自資道化所被幽顯咸伏有見鬼者云見西州太社聞鬼相謂云嚴公當至當辟易此人未之解俄而嚴至聊問姓字果稱智嚴默而識之密加禮異又曰求郍跋摩此云功德鎧纍世為王年十四便機見俊遠深有遠度仁愛泛博崇德務善其母嘗須野肉令跋摩辨之跋摩曰有命之類莫不貪生夭彼之命非仁人矣母怒曰設令得罪吾當代汝跋摩他日煮油誤澆其指因謂母曰代兒忍痛母曰痛在汝身吾何能代跋摩曰眼前之苦尚不能代況三途耶母乃悔悟終身斷殺至年十八相工見而謂日君年三十當臨大國南面稱尊若不樂世榮當獲聖果至年二十出家受戒乃辭師違衆林棲谷飲孤行山野遁迹人世往師子國觀風闡教識真之衆咸謂己得初果儀形感物見者發心元嘉初文帝知跋摩己至南海於是勑州郡令資發下京路由始興經停歲許始興有虎市山峰嶺高絶跋摩謂其髣佛耆闍乃改名靈鷲於山寺之外別立禪室去寺數里磬音不聞每至鳴權跋摩已至或冒雨不霑或履泥不濕時道俗莫不肅然增敬寺有寶月殿跋摩於殿北壁手自畫作羅漢像乃作定光儒童有布髮之形像始成之後每夕放光此山本多虎災自跋摩居之晝行夜往或值虎者以杖按頭戲之而去於是山旅水賓去來無梗嘗於別室入禪纍日不出寺僧遣沙彌候之見一白師子緣柱而立亙室彌漫生青蓮華沙彌驚恐大呼往逐師子豁無所見後文帝重勑觀寺等復更敦請乃泛舟下都以元嘉八年正月達于建業文帝引見因問曰弟子常欲持齋不殺迫以身殉物不獲從志法師既不遠萬里來化此國將何以教之跋摩曰夫道在心不在事法由己非由人且帝王與匹夫所修各異匹夫身賤名劣言令不威若不剋己苦躬將何為則帝王以四海為家萬民為子出一嘉言則士庶咸悅布一善政則神人以和刑不夭命役無勞力乃則使風雨適時寒暖應節百穀滋繁桑麻鬱茂如此持齋亦以大矣不殺亦以衆矣寧在闕半日之餐全一禽之命然後方為弘濟耶帝乃撫兒歎曰夫俗人迷於遠理沙門滯於近教迷遠理者謂至道虛説滯近教者則拘攣篇章至如法師所言真謂開悟明達可與言天人之際矣乃勑住祇洹寺供給隆厚又曰曇摩密多此云法秀罽賓人也年至七歲神明澄正每見法事輒自然欣躍其親愛而異之遂令出家罽賓多出聖達屢值明師博貫群經特深禪法所得門戶極其微奧為人沉邃有慧解儀軌詳正生而連眉故世號連眉禪師少好遊方有如毗羅神王衛送遂至龜茲於中路欲迥乃現形告辭密多曰汝神力通變自在遊處將不相隨共往南方語畢即收影不現遂從至都即於上寺圖像于壁迄今猶有聲影之驗潔誠祈福莫不響應又曰釋智猛雍州新豐人每聞外國道人説天竺國有釋迦遺迹及方等經常慨然有感馳心遐外以為萬里咫尺千載可追遂發長安到罽賓國有五百羅漢常往返於阿耨達地有大阿羅漢見猛至歡喜猛咨問方士為説四天子事猛於奇沙國見佛文石唾壺又於此國見佛鉢光色紫紺四際盡然以香花供養頂戴發願鉢若有應能輕能重既而轉重力遂不堪及下鉢時復不覺重至迦維羅衛國見佛髮佛牙及肉髻骨佛影佛迹炳然具存其所遊踐究觀靈變天梯地龍之事不可勝數又曰天竺沙門僧伽達禪學深明來遊宋境嘗在中坐禪日時將迫念欲虛齋乃有群鳥銜果飛來授之達多思惟彌猴奉密佛亦受而食之今鳥授食何為不可於是授而進之又曰求郍跋陀羅此云功德賢中天竺人以大乘學故世號摩訶衍譙王欲請講華嚴經而跋陀自忖未善宋言有懷愧歎即旦夕禮懺於觀世音乞求冥應遂夢行人白衣持劍擎一人首來至其前曰何故憂耶跋陀具以事對答曰無所多憂即以劍易首更安新頭語令迥轉曰得無痛也答曰不痛豁然便覺心神喜悅且起道義皆通備領宋言於是就講又曰沙門寶意世居天竺以宋孝建中來止京師瓦官禪房恆於寺中樹下坐禪又曉經律時人號為三藏常轉側數百具子立知吉凶善能神呪以香塗掌亦見人往事宋祖施一銅唾壺高二尺許常在床前忽有人竊之意取竹席一領空卷之呪數通經于三夕唾壺還在席中莫測其然又曰竺法崇嘗遊湘州麓山山精化為夫人詣崇請戒捨所住山以為寺崇居之少時化洽湘土又曰釋法安一名慈欽未詳何許人善能開化愚蒙撥邪歸正晉義熙中新陽虎災縣有大社樹下築神廟左右居民以百數遭虎死者夕有一兩安嘗遊於其縣暮經此宿民以畏虎早閉門閭安徑之樹下通夜坐禪向曉聞虎負人而至投之樹北見安如喜驚跳伏安前安為説法授戒虎踞地不動有頃而去及旦村人追虎至樹下見安大驚謂是神人遂傳之一縣士庶莫不崇奉虎災由此遂息因改神廟留安立寺又曰釋曇雍於廬山之西南營立茅宇與弟子曇果澄思禪門嘗於一時果夢山神求受五戒果曰家師在此可往咨受少時雍見一人著單衣夾給風姿端雅從者二十餘人請受五戒雍以果先夢知是神仙乃為説法受戒神嚫以外國匕箸禮拜辭別倏忽不見又曰釋僧苞建三七日普賢齋懺至第十七日有白鵠飛來集普賢座前至行香畢乃去至二十一日將暮有黃衣者四人繞塔數匝忽然不見又曰支曇蘭晉太元中遊剡縣後憩始豐赤城山見一處林泉清曠而居之經于數日忽見一人長數丈呼蘭令去又見諸異形禽獸以恐蘭見蘭恬然自得乃屈膝禮拜云珠欺王是家舅令往韋鄉山就之推此處以相奉爾後三年忽聞車騎隱隱從者彌衆俄而有人著幘稱珠欺王通既前從其妻子男女等二十三人並形貌端正有逾於世既至蘭所暄涼訖蘭問住在何處答曰在樂安縣韋鄉山久服風問與家纍仰投乞授歸戒蘭即為授之受法竟嚫錢一萬密二器辭別而去便聞鳴笳動吹響振山谷禪衆十餘共所聞見又曰釋玄高母夢梵僧散華滿室覺便懷胎及生男家內忽有異香光明照壁迄旦乃息母以兒生瑞兆因名靈育出家改名玄高聰敏生知學不加思至年十五已為山僧説法受戒林陽堂山古老相傳云是群仙所宅高徙衆三百往居山舍多有靈異磬不擊而鳴香亦自然有氣應真仙士往往來遊學徒之中有玄紹者學究諸禪神力自在手指出水供高洗漱其水香靜倍異於常每得非世華香以獻三寶其靈如紹者有十一人西海有梵僧印亦從高受學志隘量褊得少為足便謂已得羅漢頓盡禪門高乃密以神力令印於定中備見十方無極世界諸佛説法不同印於一夏尋其所見永不能盡方知定水無底大生愧懼又曰釋僧同韜光晦迹人莫能知居寒山山在長安南四百里將殂告弟子日吾將去矣其夕見火從繩床後出燒身經二日方盡煙焰張天而房不燼弟子收遺灰架以磚塔又曰阿訶羅竭者多行頭陀獨宿山野晉惠帝元康元年乃西入止婁至山石室中坐禪此室水既遠時人欲為開澗竭曰不假相勞乃自起以左腳蹍尺展反室西壁陷沒指既拔足水從中出清香軟美四時不絶來飲者皆止飢渴除病又曰竺法慧本關中人晉康帝建元中至襄陽止羊叔子寺不受別請每乞食輒齎繩床自隨於間曠之路則施之而坐時或遇雨以油帔自覆雨止唯見繩床不知慧所在訊問未息慧已在繩床每語弟子法照曰汝過去時折一雞腳其殃尋至俄而照為人所擲腳遂永疾又曰涉公西域人言未然之事驗若指掌以苻堅建元十一年至長安能以祕呪呪下神龍每旱堅常請之呪龍俄而龍下鉢中天輒大雨堅及群臣親就鉢觀之咸歎其異又曰杯渡者不知姓名常以木杯渡水因而為目不修細行神力卓越世莫測其由來唯持一蘆圌子更無餘物向廣陵遇村舍有李家設八關齋先不相識乃直人齋堂而坐置蘆圌於中庭衆以其形陋無恭敬心李見蘆圌當道欲移置墻邊數人舉不能動渡食竟提之而去笑曰四天王福于李家于時有一豎子窺其圌中見四小兒並長四寸面目端正衣裳鮮潔於是追覓不知所在後三日乃見西界蒙籠樹下坐李禮拜請還家供養渡不堪持齋飲酒噉肉至於辛鱠與俗不殊清旦忽云欲得一袈裟中時令辨李即經營至中時未成渡云暫出至冥不返合境聞有異香疑之為怪處處覓渡乃見在北岩下敷敗袈裟於地臥之而死頭前腳後皆生蓮花花極鮮香邑共殯之後數日有人從北來云見渡負廬圌行向彭城乃共開棺唯見鞋履既至彭城有白衣黃欣深信佛法見渡禮拜請還處家家至貧但有麥飯而已渡甘之怡焉止得半年忽語欣云可覓蘆圌三十六枚吾須用之答云此間正可有十枚貧無以買恐不盡辦渡曰汝但檢覔宅中應有欣即窮檢果得三十六枚列之庭中雖有其數亦多破損比欣次第熟視皆新完渡密封之因語欣令開乃見錢帛皆滿可百許萬識者謂是杯渡分身他土所得嚫施回以施欣欣受之皆為功德經一年許渡辭去欣為辦糧食明晨見糧食具存不知渡所在續高僧傳曰釋慧恭者益州成都人也與同寺慧遠結契勤學遠直詣長安恭往荊揚訪道從江左來還二人相遇欣歡共敘別離三十餘年同宿數夜遠言談泉湧恭竟無所道遠問恭曰離別多時今得相見慶此歡會伊何可論但覺仁者無所説將無所得耶恭對曰為性暗劣都無所解遠曰大無所解可不誦得一部經乎恭曰唯誦得觀世音經一卷遠厲聲曰觀世音經小兒皆能誦之何煩汝大許人且向為童子出家與遠立誓望登道果豈復三十餘年唯誦一卷經如指許大是非暗鈍懶惰所為請與斷交願法師早去無增遠之煩惱也恭曰經卷雖小佛口所説遵敬者得無量福輕慢者得無量罪仰願暫息瞋心當為法師誦一遍即與長別遠大笑曰觀世音經是法華普門品遠己講之數百遍如何欲鬧人耳乎恭曰外書云人能弘道非道弘人但至心聽佛語豈得以人棄法乃於庭前結壇壇中安高座繞壇數匝頂禮升高座遠不得已於簷下據胡床坐聽恭始發聲唱經題異香氛氳遍滿房宇及入經文天上作樂雨四種花樂則寥亮振空花則氛霏滿地誦經訖下座自為解座梵訖花樂方歇慧遠接足頂禮淚下交流謝曰慧遠臭穢死尸敢行天日之下乞暫留賜見教誨恭曰非恭所能諸佛力耳即拂衣長揖沿流而去爾後訪問竟不知其所之
