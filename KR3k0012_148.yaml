body:
  text: 皇親部十三太子二左傳曰初宋芮司徒生女子芮司徒宋大夫赤而毛棄諸堤下其身色赤而生毛也恭姬之妾取以入名之曰棄長而美恭姬宋伯姬也平公入夕視夕也平公恭姬子也恭姬與之食公見棄也而視之尤右過也意悅之故視之過久姬納諸御納之平公之御嬖生佐公嬖棄而生佐佐立為宋元公惡而婉婉順也佐貌惡心順太子痤美而很太子貌美戾而心很很戾不從教合左師畏而惡之合左師向戍也寺人惠墻伊戾為太子內師而無寵寺人宋閹士惠墻皆發聲竇為伊戾名以公寺人為太子內師長掌內官秋楚客聘于晉過宋楚客過使太子知之請野饗之公使往伊戾請從之公曰夫不惡女乎夫謂太子伊戾無寵於太子故曰夫不惡汝對曰小人之事君子也惡之不敢遠好之不敢近敬以待命敢有二心乎有縱供其外莫供其內言我內師也當為內師供內使也臣請往也遣之至則欿用牲加書徵之以書為之徵驗也書盟書而騁告公騁馳曰太子將為亂既與楚客盟矣公曰為我子又何求對曰欲速速疾也欲疾代公得位故與楚客謀共弒公也公使視之則信有焉有盟也問諸夫人夫人佐母棄也與左師則皆曰固聞之固久也久聞太子欲為亂公囚太子太子曰唯佐也能免我召而使請曰日中不來吾知死矣左師聞之聞太子與佐期日中聒而與之語聒歡也欲使失期佐過期乃縊而死經書宋公殺其世子痤平公用伊戾之譖聽夫人左師而之言世子師之言世子無罪而死故稱宋公殺罪之地佐為太子公徐聞其無罪也乃烹伊戾又曰許悼公虐許悼公靈公之子許男買瘧寒疾也五月戊辰飲太子止之藥卒經書夏五月戊辰許世子弒其君買止焯公子襄太子也公疾不瘳止進藥雖嘗而不由醫太子奔晉書曰弒其君禮醫不三世不使君有疾飲藥臣先嘗之親有疾飲藥子先嘗之公疾未瘳而進藥雖嘗而不由醫而卒故圖罪之書弒告於諸侯也君子曰盡心力以事君舍藥物可也原止之無惡藥物不害醫無以加壽命有終故曰舍藥物可也一曰罪止非也刺無良史物讀為勿止實孝能盡心事君舍藥勿以罪之又曰楚平王卒令尹子常欲立子西子西平王之長庶子宜申也曰太子任弱其母非嫡太子任昭王也秦嬴也太子建實娉之子西長而好善立長則順建善則治王順國治可不務乎子西怒曰是亂國而惡君王也謂夫人故太子建娉之廢而不立是謂亂國追惡君王也國有外援不可黷也外援謂太子任秦外孫黷易也秦為任外援不可易王有嫡嗣不可亂也敗親速讎亂嗣不祥我受其名賂吾以天下吾滋不從楚國何為必殺令尹令尹懼乃立昭王又曰齊燕姬生子不成而死燕姬齊景公嫡夫人昭七年燕人所歸不成未冠諸子鬻姒之子荼荼嬖諸子諸公子鬻姒景公妾也淳于人所納女荼安孺子諸大夫恐其為子也言於公曰君之齒長矣未有太子若之何為子為太子也荼少故恐立之言君年長未有太子一旦不諱當若之何欲令早立長也公曰二三子聞於憂虞則有疾疹亦姑謀樂何憂於無君言二三子聞於鄰國憂虞疾疹在其間今無疾疹何為不自謀自樂何憂無君乎公疾使國惠子高昭子立荼國惠子國景之子國憂也高昭高偃之子高張也置群公子於菜置置菜齊東鄙邑欲使遠齊公羊傳曰子般卒卒云子卒此其稱子般卒何何休注曰裾子赤不言子赤卒君存稱世子明當世父位為君也君薨稱子某緣民臣之心不可一日無君故稱子某繼父也名者尸柩尚在以君前臣名踰年稱公不曠年無君也又曰公孫慈如牟公及齊侯宋公陳侯衛侯鄭伯許男曹伯會王世子于首止戴曷為殊會王世子據宰周公不殊別也世子貴也世子猶世世子也解貴意也言當世父位儲君副主不可以諸侯會之為文故殊之使若諸侯為世子所會他自王者言之屈遠世子在三公下禮喪服斬衰曰公士大夫之衆臣是也自諸侯言之世子尊於三公此禮之威儀各有所施言及者因其文可得見汲汲也世子所以會者時桓公德衰故上假王世子示以公義也穀梁傳曰曹伯使世子射姑來朝朝不言使非正庾信注曰禮諸侯之適誓於天子攝其君則下其君一等未誓則以玉帛繼子男此謂會同急王命者也至於相朝非急會今曹伯有疾不朝魯未為有闕而使世子攝朝言非禮之正使世子伉諸侯之禮而來朝曹伯失正矣諸侯相見日朝以待人父之道待人之子以內為失正矣內魯內失正曹伯失正言二者俱失之世子可以已矣則是放命也放違也言世子違命而正是當不義則爭之又曰陳侯之弟招殺陳世子偃師招成公子偃師哀公子所謂悼太子者也哀公愛其世子留託之招哀公之柩衷公有疾招殺太子偃師而立留嚮曰陳公子招招發於十年矣今曰陳侯之弟招何也曰盡其親所以惡招也盡其親謂招稱公子又稱弟招先君之公子今君之母弟也兩下相殺不志乎春秋此其志何也世子者唯君之二也二副云可以重之存焉志之也諸侯之尊弟兄不得以屬通其弟云者親而殺之惡也惡哀公使招至放殺之孝經曰昔者明王之以孝治天下不敢遺小國之臣而況於公侯伯子男乎鄭玄注曰古者諸侯五年一朝天子使世子郊迎芻米百車以客禮待之盡坐正殿夜設庭燎思與相見問其勞苦也孔子家語曰邾隱公既即位將冠使大夫因孟懿子問於孔子孔子曰其禮如世子之冠冠於阼階所以著代王肅注曰主人之位以明代交也醮於客位加其成冠於阼階若不醴則用酒於客位敬而成之戶西為客也三加彌尊喻其志喻其志使彌知尊宜敬戒加綢布皮及爵辨冠而字之敬其名雖天子之元子猶士也其禮變天下無生而貴者又曰孔子曰古者王世子雖幼其即位則尊為人君治成人之事者也何冠之有孟懿子曰然則諸侯之冠異天子與怪天子無冠禮而諸侯之冠如子之冠問之也孔子曰君薨而世子主喪是亦冠已君人無所殊諸侯亦人君與天子無異孔叢子曰穆公問於子思曰立太子有常乎答曰有之在周公之典曰文王舍適而立次微子舍孫而立其弟是何法也子思曰殷人質而尊故立其弟周人文而親其親故立其子亦各有禮也文質不同其禮則異文王舍適立次權也漢舊儀曰皇后太子各食三十縣曰湯沐邑白虎通曰何以知天子之子稱世子春秋傳星曰王世子會于首止是也何以知天子之稱太子尚書曰太子發升于舟是也中候曰廢考立發為太子明文王時稱太子也或云諸侯之子稱世子則春秋傳云晉太子申生鄭太子華齊太子光由是觀之周制太子世子亦不定也漢制天子稱皇帝其嫡嗣稱皇太子諸侯王之嫡稱世子後代咸因之又曰太子夫人無諡者何本婦人隨夫太子無諡其夫人不得有諡士冠經曰天子之元子猶士也無諡知太子亦無諡又曰天子太子諸侯之世子皆以諸侯禮娶與君同示無再之義也又曰天子之太子諸侯之世子皆就於諸外者尊師說先王之道也故曲禮曰聞有來學無往教也易曰匪我求童蒙童蒙求我記曰小學在公宮南之左太學在郊又曰太子群后之太子公卿大夫元士之適子皆造小學小學經藝之宮也太學者辟雍卿射之宮又曰君在立太子者所以防篡殺齊臣子之亂君在者春秋之義殺太子與殺君同罪春秋曰殺其君之子奚齊言君者明與君同也君薨夫人無子有遺腹待其産而立之何尊適重正也曾子問云立適以長不以賢賢不肖未可知也尚書曰知人則哲唯帝難之立子以貴不以長者塞愛憎也故春秋公羊傳曰立適以長不以賢立子以貴不以長列女傳曰魯漆室女倚柱而嘯鄰婦謂之曰何嘯之悲也子欲嫁乎吾為子求偶女曰吾豈嫁哉吾憂魯君老而太子少也鄰婦曰此乃魯大夫之憂也且魯國雖有事婦人何與女曰子知其一不知其二也昔者晉客舍吾家繫馬馬佚馳踐吾園葵使我終歲不厭菜鄰人女奔亡借吾兄追之溺流而死令吾終身無兄今魯君老老必將悖太子少少必愚愚悖之間奸僞互起夫魯國有事禍及衆庶婦人獨安所避之鄰婦謝曰子之慮非吾所及也居三年魯果內亂齊楚攻之男子戰鬭婦人輸不得休息史記曰周厲王奔彘太子靜匿召公之家國人聞之乃圍之召公以其子代王太子太子竟得脫召二相行政號曰共和共和十四年厲王死于彘太子靜長於召公家二相乃立共和是為宣王又曰幽王嬖愛褒姒生子伯服幽王廢后及太子而以褒姒為后伯服為太子太史伯陽曰禍成矣母可奈何申侯怒乃與犬戎共攻殺幽王麗山下虜褒姒於是諸侯共立故幽王太子宜咎是為平生紀年曰幽王八年立褒姒之子曰伯服為太子史記燕世家曰燕見秦且滅六國秦兵臨易水禍且至太子丹陰養壯士二十人使荊軻獻督亢地圖於秦王秦覺殺軻使將軍王剪擊燕二十年秦拔薊燕王亡徙居遼東斬丹以獻秦燕丹子曰太子丹質於秦秦王遇之無禮不得意欲歸秦王不聽謬言令烏白頭馬生角乃可丹仰天而歎烏即白頭馬生角秦不得已而遣之為機發之橋欲陷丹丹過之橋為不發夜到關丹為雞鳴遂得逃歸故怨於秦欲報之養勇士無所不至丹與其傅麴武書曰丹不肖生於僻陋之國長於不毛之地未曾得覩君子雅訓欲有所陳幸垂覽之丹聞丈夫之通義節恥受辱以生也貞正所羞之見却以虧其節故有刎喉不顧據鼎不過者斯豈樂死而忘生哉其心所守也今秦王反戾天常虎狼其行遇丹無禮諸侯最甚每念之痛入骨髓計燕國之衆不能敵之曠年相守力固不足欲收天下勇士集海內英雄破國空藏以奉養之重幣甘辭以市於秦秦貪我賂而信我辭則一劍之任當千萬之師須臾之間可解丹萬世之恥若其不然令丹生無目於天地死懷恨於九泉必令諸侯無以為歎易水之北未知誰有此蓋亦大夫恥也謹遣書願熟思之史記呂后本紀曰太后高祖微時妃也生孝惠帝為人仁弱高祖以為不類我常欲廢太子立戚姬子如意如意類我幾代太子者數矣賴大臣爭之及用留侯策太子得毋廢又張良世家曰上欲廢太子立戚夫人子趙王如意大臣多諫爭未能得堅決者也呂后恐不知所為人或謂呂后曰留侯善畫計策上信用之呂后乃使建成侯呂澤劫留侯曰君常為上謀臣今欲易太子君安得高枕而臥乎留侯曰始上數在困急之中幸用臣策今天下安定以愛欲易太子此骨肉間雖臣等百餘人何益呂澤強要曰為我畫計留侯曰此難以口舌爭也顧上有不能致者天下有四人四人者年老矣皆以為上慢侮人故逃匿山中義不為漢臣然上高此四人今公誠能無愛金玉璧帛令太子為書卑辭安車因使辨士請之來以為客時時從入朝令上見之則必異而問之上知此四人賢則一助也於是呂后令呂澤使人奉太子書卑辭厚禮迎四人四人至客建成侯所漢十一年黥布反上病欲使太子將往擊之四人相謂曰凡來者以將存太子太子將兵事危矣乃說建成侯曰太子將兵有功則位不益太子無功還則從此受禍矣且太子所與俱諸將皆嘗與上定天下驍將也今使太子將之此無異使羊將狼也皆不肯為盡力其無功必矣臣聞母愛者子抱今戚夫人日夜侍御趙王如意常抱居前上曰終不使不肖子居愛子之上明乎其代太子位必矣君何不急請呂后承間為上泣言黥布天下猛將也善用兵今諸將皆陛下故等夷夷猶餌也乃令太子將此屬無異使羊將狼也莫肯為用且使布聞之則鼓行而西耳晉灼曰鼓行而西言無所畏上雖病強載輜車臥而護之諸將不敢不盡力上雖苦為妻子自強於是呂澤立夜見呂后呂后承間為上泣涕而言如四人意上曰吾惟豎子固不足遣而公自行耳於是上自將兵而東群臣居守皆送至灞上留侯病自強起至曲郵長安縣有曲郵聚見上曰臣宜從病甚楚人剽疾願上無與楚人爭鋒因說上曰令太子為將軍監關中兵上曰子房雖疾強臥而傅太子是時叔孫通為太傅留侯行少傅事漢十二年上從擊破布歸疾益甚愈欲易太子留侯諫不聽因疾不視事叔孫太傅稱說引古今以死爭太子上佯許之猶欲易之及宴置酒太子侍四人者從太子年皆八十有餘鬚眉皓白衣冠甚偉上怪之問曰彼何為者四人前對各言名姓東園公角里先生綺里季夏黃公上乃大驚曰吾求公數歲公避逃我今公何自從吾兒遊乎四人皆曰陛下輕士善罵臣等義不為辱故恐亡匿竊聞太子為人仁孝恭敬愛士天下莫不延頸欲為太子死者故臣等來耳上曰煩公幸卒調護太子如淳曰調護猶營護也四人為壽已畢起去上目送之召戚夫人指示四人者曰我欲易之彼四人輔之羽翼已成難動矣呂后子真而主矣漢書外戚傳曰孝景王皇后武帝母也入太子宮太子幸愛之生三女一男男方在身時王夫人夢日入其懷以告太子太子曰此貴徵也未生文帝崩景帝即位王夫人生男是時薄皇后無子後數歲景帝立齊栗姬男為太子而王夫人男為膠東王長公主嫖有女欲與太子為妃栗姬妬而景帝諸美人皆因長公主見得貴幸栗姬日怨怒謝長主長主不許長主欲與王夫人夫人許之會薄皇后廢長公主日譖栗姬景帝嘗囑諸姬子曰吾百歲後善視之栗姬怒不肯慮言不遜景帝心銜之而未發也長公主日譽王夫人男之美帝亦自賢之又以曩者所夢日符計未有所定王夫人又陰使人趣大臣立栗姬為皇后大行奏事文曰子以母貴母以子貴今太子母號宜為皇后帝怒曰是乃所當言耶遂按誅大行廢太子為臨江王栗姬愈恚不得見以憂死卒立王夫人為皇后男為太子漢武故事曰武帝生猗蘭殿四歲立為膠東王七歲立為皇太子漢書曰衛皇后生戾太子據元狩元年立為皇太子年七歲矣初上年二十九乃得太子甚喜為立禖張晏曰禖者求子月令曰祀子高禖是使東方朔枚皋作禖祝及壯詔受公羊春秋又從瑕丘江公受穀梁及冠就宮上為立博望苑使通賓客從其所好故多以異端進者元鼎四年納史良娣韋昭曰良娣官也太子有妃有良娣有孺子凡三等産子男進號曰史皇孫張晏曰皆以舅氏姓為氏以相別也武帝末衛后寵衰江充用事充與太子及衛氏有隙恐上晏駕後太子所誅會巫蠱事起充因此為姦是時上春秋高意多所惡以為左右皆為蠱道祝詛窮治其事充典治巫蠱遂至太子宮掘蠱得桐木人太子召問少傅石德德懼為師傅并誅因謂太子曰奸臣如此太子將不念秦扶蘇事耶太子急乃收捕充斬以聞遂部賓客為將率與丞相劉屈釐等戰太子兵敗亡不得上怒甚群下憂懼不知所出壺關三老茂上書云子弄父兵罪當笞爾書奏天子感寤太子之亡也東至湖藏匿泉鳩里主人家貧常賣屨以給太子太子有故人在湖聞其富贍使人呼之而發覺吏圍捕太子太子自度不得脫即入室自經後車千秋言太子之冤上遂擢千秋為丞相而族滅江充家上憐太子無辜乃作思子宮為歸來望思之臺於湖天下聞而悲之宣帝即位有司奉諡曰戾置奉邑三百家又曰孝元皇帝為太子也母曰哀許皇后宣帝微時生民間年二歲宣帝即位八歲立為太子壯大柔仁好儒見宣帝所用多文法吏以刑名繩下大臣楊惲蓋寬饒等坐刺譏辭語為罪而誅嘗侍宴從容言陛下持刑太深宜用儒生宣帝作色曰漢家自有制度本以霸王道雜之奈何純任德教害政乎且俗儒不達時宜好是古非今使人眩於名實不知所守何足委任乃嘆曰亂我家者太子也繇是踈太子而愛淮陽王曰淮陽王明察好法宜為吾子而王母張婕妤尤幸上有意欲用淮陽王代太子然以少依許氏俱從微起故終不背焉又曰孝宣王皇后宣帝即位召入後宮稍進為婕妤霍皇后廢後上憐許太子早失母幾為霍氏所害於是乃選後宮素謹慎而無子者遂立王婕妤為皇后令母養太子又曰孝成皇帝元帝太子也母曰王皇后元帝在太子家生甲觀畫堂如淳曰甲觀二名畫堂二名三輔黃圖云太子宮有甲觀又別外不在未未夾宮中為世嫡皇孫宣帝愛之字曰太孫常置左右年三歲而宣帝崩元帝即位帝為太子壯好經書寬博謹慎初居桂宮上常急召太子出龍樓門張晏曰門撞上有銅龍黃白鶴飛廉之為名也不敢絶道應劭曰馳道天子道也若今之中道然古甚重也西至直城門晉灼曰黃圖西出南頭第二門得絶乃度還入作室門上遲之問其故以狀對上大悅乃著令令太子得絶馳道云其後幸酒樂宴晉灼曰幸酒好酒樂宴上不以為能而定陶恭王有才藝母傅昭儀又愛幸上以故常有意欲以恭王為嗣賴侍中史丹護太子家輔助有力上亦以先帝尤愛太子故得無廢又曰孝哀皇帝庶孫定陶恭王子也嗣立為王好文辭法律元延四年入朝盡從傅相中尉時成帝少弟中山孝王亦來朝獨從傅上以問定陶王對曰令諸侯王朝得從其國二千石傅相中尉皆國二千石故盡從之上令誦詩通習能說他日問中山王獨從傅在何法令不能對帝由此賢定陶王數稱其材為加元服而遣之時年十七矣明年徵立為皇太子謝曰臣幸得繼父守藩為諸侯王材質不足以假充太子宮
