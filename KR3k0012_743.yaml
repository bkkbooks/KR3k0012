body:
  text: 疾病部五瘡周禮春官下曰瘍醫掌腫瘍潰瘍金瘍折瘍之祝祝當如注讀如注病之注禮記曲禮上曰頭有瘡則沐身有瘍則浴謝承後漢書曰媯皓母炙瘡發膿皓祝而愈之魏書曰孫觀遷青州刺史從征孫權於濡須口為流矢所中穿左足力戰不顧太祖勞之曰將軍被瘡深重而猛氣益奮及瘡甚遂卒吳歷曰孫策為許貢客所傷既被瘡策引鏡自照曰面如此當可復建功立事乎椎几大呼瘡皆分裂其夜卒江表傳曰周泰為濡須督諸將以泰本出於微賤咸輕傲之孫權乃入泰營於都巷中張幔大請官僚使泰脫衣幘見其瘡痍匝體指瘡而問何地戰傷泰具對權把其臂流涕沈約宋書曰劉雍所噉食每異於人性嗜瘡痂以為味似鰒魚詣孟靈休靈休先患炙瘡瘡痂落床上雍因取食之靈休瘡痂未落者悉褫以飴雍靈休與何勗書曰劉雍向顧見噉舉體流血南康國吏二百人不問有罪無罪遞牙舉鞭取瘡常以給膳又曰張收嘗為猘大所傷醫云宜食蝦蟆膾收甚難之醫含笑先嘗收因此乃食瘡亦即愈後魏書曰長孫子彥末年石發舉體生瘡雖親戚兄弟以為惡疾如此難以自明世無良醫誤其死矣嘗聞惡疾蝮蛇螫之不痛試為求之當令兄弟知我乃於南山得蛇以股觸之痛楚號叫俄而腫死抱朴子曰治金瘡以氣吹之血即斷痛立止論衡曰儒書言燕太子丹使客荊軻刺秦王不得誅死後高漸離復以擊築見秦王王知燕之客乃膠其眼使之擊築漸離置鉛於築中以為重而擊秦王秦王病瘡三月而死夫言高漸離以築擊秦王實也言中秦王病瘡三月而死虛也嵇康高士傳曰孔休元嘗被人斫之至見王莽以其面有瘡瘢乃碎其玉劍與治之華他別傳曰琅琊有女子右股上有瘡癢而不痛愈已復發他曰當得稻粳色犬繫馬頓走出五十里斷頭向癢乃從之須臾有蛇在皮中動以鐵橫貫引出長三尺許七日便愈異苑曰陳郡謝石少患面瘡諸治莫愈乃自匿遠山臥於巖下中霄有物舐其瘡隨舐除而舐處悉白故世呼為謝白面又曰有田父耕值見傷一蛇有一蛇銜草著瘡上而傷者差田父收其餘葉治瘡皆驗又曰晉時長山趙宣母任身如常而髀上癢搔之成瘡二兒從瘡中出母子平安幽明録曰漢武在甘泉宮有玉女降與帝圍棊女風姿端正帝乃欲通之女因唾帝面遂成瘡帝避跪謝神女為出溫水洗之事貝溫泉部西京雜記曰廣川王好發冢後發欒書冢是夕王夢一丈大鬢眉盡白以杖扣王左腳王覺左腳腫痛因生瘡至死不差三輔故事曰衛太子嶽鼻武帝疾避暑甘泉宮江充謂太子曰陛下惡太子鼻當持紙蔽其鼻及入充言曰太子不欲聞陛下膿臭蔽鼻而入帝大怒痱説文曰痱風病也漢書曰灌嬰矯先帝詔當棄市嬰陽病痱不食欲死或聞上無殺意嬰復食治病議定不死矣乃有飛語為惡言聞上故以棄市東觀漢記曰明帝行幸諸國勑執金吾馮魴將緹騎宿玄武門復道上詔曰復道多風寒左右老人且病痱多取帷帳東西完塞窗皆令緻密螫毒魏志曰彭城夫人夜之廁蠆螫其手呻吟無賴華他令溫湯漬手數易湯常令暖其旦即愈搜神記曰阮瑀傷於虺嗅其瘡而雙虺出鼻中孔叢子曰宰我使齊反見夫子曰梁丘據遇毒三旬而瘳齊會大夫衆賓賀焉大夫並復獻攻毒之方弟子謂曰梁丘子瘳矣方安所施夫子曰三折肱而知為良醫治梁丘遇虺害而獲瘳假有與之同疾者必問所以己之方衆人為見故各言其方也抱朴子曰蝮蛇中人不曉方術者但以刀割肉投地其肉沸如火炙須臾燋盡嵇含遇蠆客賦曰元康二年七月七日中夜遇蠆客有戲余者曰諺云過滿百為蠆所螫斯言信哉蠱周禮秋官曰庶氏掌除毒蠱以嘉草攻之左傳曰宣二晉里克有蠱疾沈約宋書曰沛郡相縣唐賜往比村飲酒還因得病吐蠱蟲十枚臨死語妻張曰死後刳腹出病張手破之藏悉糜碎搜神記曰蠱有怪物若鬼其妖形變化雜類殊種或為狗豕或為蟲蛇其人皆自知其形狀常行之於百姓所中皆死續搜神記曰曇遊道人清苦沙門也剡縣有一家事蠱人噉其食飲無不吐血死遊詣之主人下食遊便呪焉一雙蜈蚣長丈餘於盤中走出飽食歸安然無他靈鬼志曰滎陽郡有一家姓廖其家纍世為蠱以致富子女豐悅後取新婦不以此語之家人悉行婦獨守家見屋中一大堽試發見一大蛇便作沸湯悉灌殺之家人還婦具説焉舉家驚惋無幾其家疾病死亡略盡癰疽廣雅曰痤疽癰也説文曰癰腫也痤小腫也釋名曰癰壅也氣壅不通結裏而潰也左傳襄十九年傳曰晉荀偃疸疽生瘍於頭疸疽惡瘡濟河及著癰病自出史記曰卒有病癰者吳起為吮之卒母哭之曰往年吳公吮其父父遂戰死今又吮此子妾不知其所死矣漢書曰項羽疑范增奪其權增怒曰天下且定而王自為之願賜骸骨羽許之亞父未至彭城疽發背而死又曰僕射鄭崇數以職事見責發頸癰而死又曰文帝病癰鄧通常為上吮之上問曰天下誰最愛我通曰莫若太子太子入上使吮癰太子色難聞通吮之慚遂恨通東觀漢記曰樊倏事後母至孝母常病癰樊至吮嗽典略曰趙戩病疽疾年六十餘聞魏王薨哭泣哀過瘡發而卒王隱晉書曰徐苗字叔胄弟亡臨殯口中癰大潰膿溢苗含去之宋書曰劉瑀與何偃俱發背癰瑀疾已篤聞偃亡歡甚叫呼於是亦卒南史曰徐嗣伯春月出戲聞草屋中有呻吟聲嗣伯曰此病甚重更二日不療必死乃往視見一老姥稱體痛而處處有黯黑無數嗣伯還煮斗餘湯送令服之訖痛熱愈甚跳投床者無數須臾所黯處皆拔出長寸許乃以膏塗諸瘡口三日而復云此名釘疽也又曰薛伯宗善徙癰疽公孫泰患發背伯宗為氣封之徙置齋前柳樹上明日而癰消樹邊使起一瘤如拳大稍稍長二十餘日瘤大膿爛出黃赤汁升餘樹為之痿損唐書曰李洧正巳從父兄正巳死洧以徐州歸順封潮陽郡王無何背發疽稍平乃大具糜餅飯僧於市洧乘平肩輿自臨其場市人歡呼洧驚疽會於背而卒孝子傳曰魏達父苦疽痺達吮嗽而愈山海經曰帶山有鳥狀如馬五采名鵸鵌食之不疽又曰半石之山合水出焉多鰧魚蒼文赤尾食之不癰譙明之山譙水注焉多阿羅魚一首十身食之已癰辛氏三秦記曰大魚如羊在長池中世人食之生癰瘡論衡曰儒書云齊桓公負婦人朝諸侯管仲告諸侯曰吾君有疽瘡不得婦人瘡惡不愈諸侯信管仲故無叛者瘻説文曰瘻頸腫也山海經曰脫扈之山植豬之草可以已鼠郭璞注曰鼠瘻也淮南子曰狸頭已鼠雞頭已瘻洞林曰柳祖休婦病鼠瘻積年不差及困令兒就吾卦之語之曰當得賤師姓石者治之事具鼠部癬説文曰癬乾瘡也山海經曰渠豬之山多豪魚赤喙赤尾食之可已白癬又曰橐山橐水出焉修郡之魚其音如鴟食之已癬瘃説文曰瘃中塞腫漢書曰趙充國討先零帝詔充國曰欲至冬擊虜將軍士寒手足皸瘃豈有利哉皸坼裂也瘃寒瘡也疥説文曰疥瘙也周禮天官疾醫曰夏時有癢疥病禮記月令曰仲冬行春令民多疥癘左傳昭五曰齊侯疥遂痁期而不瘳諸侯之賓問疾者多在焉國語吳語曰夫差既許越成乃大戒師徒將以伐齊子胥諫曰越之在吳也猶人之有心腹之疾也今王非越是圖而齊魯以為憂事夫齊譬諸疾疥癬也豈能涉江湖而與我爭此地哉山海經曰石跪之山其草多條其狀如韭而白花黑實食之已疥宋玉登徒子賦曰登徒子之妻既疥且痔登徒悅之使有五子又曰竹山有草名曰黃藿枝如樗葉如麻白華赤實浴之已疥惡疾韓詩外傳曰芣苡傷夫有惡疾也采采芣苡薄言捋之芣苡澤瀉也芣苡良惡之菜猶捋之不已君子雖有惡疾我猶不能去離也論語雍也曰伯牛有疾子問之自牖執其手包曰牛有惡疾不欲見人曰亡之命矣夫斯人也而有斯疾也斯人也而有斯疾也後魏書曰李庶生而天閹崔諶調之曰教弟種鬢以錐遍刺作孔插以馬尾庶曰先以此方回施貴族藝眉有效然後樹鬢世傳諶門有惡疾以呼沱為墓田故庶言及之列女傳曰蔡夫之妻者宋人之女也既嫁於蔡夫有惡疾其母將改嫁之女曰夫之不幸乃妾之不幸將何去之終不聽其母而作芣苡之詩疫癘説文曰疫皆民之疾也釋名曰疫役也言有鬼行疾也禮記月令曰孟夏行秋令則民多大疫續漢書曰元初中會稽大疫使光祿大夫將醫巡行魏書曰文帝在東宮氛癘大起時人雕傷帝深感歎與素所敬者大理王朗晝言人生有七尺之形死為一棺之土唯立德揚名可以不朽魏志曰司馬朗遷兗州刺史征吳到居巢軍中大疫朗躬親巡視致藥於疾卒焉王隱晉書曰郭文舉得疫病危困不肯服藥曰命在天不在藥鍾離意別傳曰黃讜為會稽太守吳大疾疫黃君轉署意中部督郵意乃露車不冠身循行病者賜與醫藥其所臨護口十餘人劉根別傳曰頴川太守到官民大疫掾吏死者過半夫人郎君悉病府君從根求消除疫氣之術根曰寅戌歲泄氣在亥今年太歲在寅於聽事之亥地穿地深三尺方與深同取沙三斛著中以淳酒三升沃其上府君即從之病者即愈疫疾遂絶山海經曰復州之山有企踵之鳥如梟一足彘毛見則其國中大疫三輔決録曰井丹舉室疫病梁松自將醫藥治丹盛弘之荊州記曰始安郡有鳥焉其形似鵲白尾名為青鳥常以三月自蒼梧而度群飛不可勝數山人見其來多苦疫氣魏文帝與吳質書曰昔年疾疫親故多罹其災徐陳應劉一時俱逝曹植説疫氣曰建安二十二年厲氣流行家家有僵尸之痛室室有號泣之哀或闔門而殪或覆族而喪或以為疫者鬼神所作夫罹此者悉被褐茹藿之子荊室蓬戶之人耳若夫殿處鼎食之家重貂纍蓐之門若是者鮮焉此乃陰陽失位寒暑錯時是故生疫而愚民懸符厭之亦可笑
