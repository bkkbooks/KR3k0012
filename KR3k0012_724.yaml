body:
  text: 方術部四醫三齊書曰徐嗣伯為臨川王映所重時直閣將軍房伯玉服五石散十許劑無益更患冷夏日常復衣嗣伯為診之曰卿伏熱應須以水發之非冬月不可至十一月冰雪大盛令二人夾捉伯玉伯玉解衣唑石上取冷水從頭澆之盡二十斛伯玉口噤氣絶家人啼哭請止嗣伯遣人執杖防閣敢有諫者撾之又盡水五斛伯玉始能動而見背上彭彭有氣俄而起唑曰熱不可忍乞冷飲嗣伯以水與之一飲一升病都差自爾恆發熱冬月猶單衣體更肥壯又嘗有傴人患滯冷積年不差嗣伯為診之曰此尸注也當得死人枕煮服之乃愈於是往古冢中取枕枕已一邊腐𡙇服之即差後秣陵人張景年十五腹脹面黃衆醫不能療以問嗣伯曰此石蛔音回耳極難療當得死人枕煮之依語煮枕以湯投之得大痢并蛔蟲頭堅如石者五升病即差後沈僧翼患眼痛又多見鬼物以問嗣伯嗣伯曰邪氣入肝可覔死人枕煮服之服竟可埋枕於故處如其言又愈王晏問之曰三病不同而皆用死人枕而俱羌何也答曰尸注者鬼氣伏而未起故令人沉滯得死人枕促之魂氣飛越不得復附體故尸注可差石蛔者久蛔也醫療既僻蛔蟲轉堅世間藥不能遣所以須鬼物驅之然後可散故令煮死人枕也夫邪氣入肝故使眼痛而見魍魎應須邪物以鉤之故用死人枕也氣因枕去故復埋於冢間也又春月出南籬門戲聞草屋中有呻吟聲嗣伯云此病甚重更二日不療必死乃往視見一老姥稱體痛而處處有𪒠音黑無數嗣伯還煮斗餘湯送令服之服之訖痛熱愈甚跳投床者無數須臾所𪒠處皆拔出長寸許乃以膏塗諸瘡口三日而復云此名釘疽也又薛伯宗善徙癰疽公孫泰患發背伯宗為氣封之徙置齊前柳樹上明日癰消樹邊便起一瘤如拳大稍稍長二十餘日瘤大膿爛出黃赤汁升餘樹為之痿損齊書曰禇澄字彥道建元中為吳郡太守百姓李道念以事到郡澄見謂曰汝有重病答曰舊有冷病至今五年衆醫不羌澄為診脈曰汝病非冷熱當是食雞子過多所致令取䔉一斗煮之服一服乃吐一物如升許誕褁之而動開視乃雞雛十二頭而病都愈吳均齊春秋曰顧歡字玄平吳都人也隱於會稽山陰白石村歡率性仁愛素有道風其濟人也或以禳厭而多全護有病邪者造之歡問君家有書乎答曰唯有孝經三篇歡曰取置病人枕邊恭敬之當自羌如言果愈後問其故歡曰善禳惡正勝邪故爾梁書曰陶弘景字通明丹陽人性愛林泉尤好著述常曰我讀書未滿萬卷以內典參之乃當小出耳先生性好醫方專以拯濟欲利益群品故修撰神農本草經三卷為七卷撰真誥十卷集驗方五卷廣肘後為百一之製世所行用多獲異效焉又曰范雲疾召醫徐文伯視之文伯曰緩之一月乃復欲速即時愈正恐二年不復可救雲曰朝聞道夕死可矣而況二年文伯乃下火而壯焉重衣以覆之有頃許汗流於此即起二年果卒又曰王僧孺工屬文善楷隸多識古事侍郎金元起欲工素問訪以砭石僧孺答曰古人當以石為針必不用鐵說文有此砭字許慎雲以石剌病也東山經高氏之山多針石郭璞云可以為砭針春秋美疹不如惡石服子慎注云石砭石也季世無復佳石故以鐵代也後魏書曰王顯字世榮陽平人也頗參士流雖以醫術自達而明敏有決斷才用初聞昭懷后之懷世宗也夢為日所逐化龍而繞后后寤而驚悸遂成心疾勑召諸醫診脈徐謇云是微風入藏宜進湯藥顯云案三部脈非有心疾將是懷孕生男之象後果如顯言乃補御史常在御營進藥出入禁內世宗詔顯撰藥方三十卷頒布天下又曰徐謇字伯城丹陽人也兄文伯皆善醫藥謇性祕忌承奉不得其意雖貴為王公不為指療魏孝文遷洛除中散大夫子雄亦以醫術稱又曰裴宣患篤世宗遣太醫令馳馹就視并賜御藥宣素明陰陽之書自始患便知不起因自剋亡日果如其言又曰高允微有不適猶不寢臥呼醫請藥出入行止吟詠如常高祖文明太后聞而遣醫李循往脈視之告以無恙循入密陳允榮衛有異懼其不久於是遣使備賜御膳珍羞自酒米至屏於鹽醢百有餘品皆盡時味及床帳衣服茵被几杖羅列於庭王官往還尉問相屬允喜形於色語人曰天恩以我篤老大有所賚得非以贍客矣表謝而已不有他慮如是數日夜中卒家人莫覺北齊書曰張子信少以醫術知名隱於白鹿山時出京師甚為魏收崔季舒所知嘗以詩酬贈大寧中徵為尚藥典御歲餘謝病歸又曰馬嗣明河內野王人少明醫術診脈預知生死邢劭子寶十七八苦傷寒嗣明診其脈告楊愔曰此子今病不療自愈然不踰年必死覺之少晚不可為也數日兩公侍宴酒酣顯祖曰子才兒聰宜以近郡處之愔曰年少未可劭出愔以嗣明言奏乃止寶未朞而卒其驗如此背發腫嗣明以粗理色石大如鵝卵烈火燒令黃赤投醋中使屑落盡暴乾搗篩和傅之立愈嗣明從駕之晉陽至遼陽見榜云女病能差之與錢拾萬衆醫視之無敢措手嗣明見榜笑曰真得汝矣乃抵其家問其由云曾將麥穗見赤物長二尺似蛇入指中因驚倒手臂疼重月餘日漸及半身腫痛不可忍呻吟晝夜不絶嗣明曰毒蛇為鸛所啄遺血於此犯而得之即受方令服十餘劑以湯散補之明年還鄴女疾都愈載鏹而歸嗣明恃其伎視徐之才崔鸞叔等蔑如也隋開皇中卒又曰李元忠趙郡柏仁人也代為著姓元忠倜儻博學通陰陽術數初以母老多患乃專心醫藥研習積年遂善於方技性仁恕人有疾病無問貴賤咸為療之故鄉里推敬聲稱益遠後拜南郡太守族弟密性方直亦以母老習醫遂成妙手又曰崔季舒字叔正博陵安平人少孤明敏有識幹精於醫術經方本草常所披覽天保中於徙所無事更鋭意研精後雖位望顯貴亦不懈怠張太素齊書曰徐之才字士茂高平金鄉人五葉祖仲融隱於秦望山有道士過之求飲因留瓠蘆遺之曰習此子孫當以道術救世位至二千石開視乃扁鵲鏡經一卷習之遂為良醫至濮陽太守父雄員外散騎侍郎代傳其術號為神明而之才幼而俊發尤為精敏仕梁為豫章王綜鎮東右常侍隨綜鎮彭城綜降魏之才走至呂梁為魏所獲既羈旅以醫自業又諧隱滑稽無方王公貴人爭饋之為貴人居矣稍遷員外散騎常侍加中軍金紫天平中高祖詣晉陽恆居內館所療十全皇建中除兗州剌史未行武明皇太后不豫之才奉藥立愈賞賜巨萬有人腳跟腫痛不堪忍諸醫莫識之才視曰蛤精也當乘船入海出腳水中得之疾者曰是也之才為割得雨蛤子大如榆莢或以五色骨為佩刀靶之才曰此人瘤也何從得之對曰於古冢見髑髏額骨長數寸試削視文理故用之其通識類此武成酒色過度恍惚不恆曾病發自言初見空中有五色物稍近變成一美婦人去地數丈亭而立之才曰此色欲過多大虛所致即進藥一服稍稍遠變成五色物數服而愈病發輒馳召之針藥所加無不愈者齻音積武成王生齪牙遍召諸醫尚藥典御鄧宣文以實對帝怒而抶之之才拜賀曰此謂智牙生則聖明而壽帝大悅賜帛萬匹加金玉重寶又曰張遠遊齊人以醫藥道術知名尋有詔徵令與術士同合九轉金丹成顯祖置之玉匣曰我貪人間樂不能飛上天待我臨死方可服之後周書曰姚僧坦字法衛吳興武康人也父菩提梁高平令嘗嬰疾歷年乃留心醫藥梁武帝性又好之每召菩提討論方術言多會意由是頗禮之僧坦幼通洽居喪盡禮年二十四即傳家業梁武帝召入禁中面加討試僧坦酬對無滯梁武甚奇之時武陵王所生葛修華宿患積時方術莫效帝令僧坦視之僧坦還說其狀武帝歎曰卿用意綿密乃至於此以此候疾何疾可逃朕每留情頗識治體今聞卿說益開人意十一年帝因發熱欲服大黃僧坦曰大黃乃是快藥然至尊年高不宜輕用帝弗從遂至危篤梁元帝嘗有心腸疾諸醫咸謂宜用平藥可漸宣通僧坦曰脈洪而實此有宿妨非用大黃必無差理帝從而愈及大軍克荊州為燕公于謹所召大相禮接太祖遣使馳驛徵僧坦謹固留不遣謂使人曰吾年時衰暮疢疾嬰沉今得此人望與之偕老太祖以謹勳隆重乃止明年隨至長安伊婁穆以疾還京請僧坦省疾自云自腰至臍似有三縛兩腳緩縱不復自持坦即為診脈處湯三劑穆初服一劑上縛解再服中縛解又服三縛悉除而兩腳疼痺猶自攣弱更為合散稍得屈伸至九月遂能起行大將軍襄樂公賀蘭隆先冇有氣疾加以水腫喘息奔急唑臥不安或有勸其服決命大散者其家疑未能決乃問僧坦僧坦曰意謂此患不與大散相當若欲自服不煩賜問因而委去其子殷勤拜請曰多時仰屈今日始來竟不下治意實未盡僧坦知其可羌即為處方諸患悉愈大將軍樂平公竇集暴感風疾精神瞀亂無所覺知諸醫先視者皆云已不可救僧坦後至曰困矣終當不死若專以見付相為治之其家欣然僧坦為合湯散所患即瘳大將軍永世公叱伏列椿苦痢積時而不廢朝謁燕公于謹嘗問僧坦曰樂平永世俱有痼疾若如僕意永世羌輕對曰夫患有深淺時有克殺樂平雖困終當保全永世雖輕必不免死謹曰君言必死當在何時對曰不出四月果如其言謹歎異之文宣太后寢疾醫巫雜說各有同異高祖引僧坦問曰太后患勢不輕諸醫並云無慮朕人子之情可以意得君臣之義言在無隱公以為何如對曰臣無聽聲視色之妙特以經事已多唯之常人竊已憂懼帝泣曰公既決之矣知復何言尋而太后崩四年高祖親戎東討至河陰遇疾口不能言臉垂覆目不得視一足短縮又不得行僧坦以為諸藏俱病不可並治軍中之事莫先於語乃處方進藥帝遂得言又治目目疾便愈未及治足疾亦瘳比至華州帝已痊復是歲高祖幸雲陽遂寢疾乃召僧坦赴行在所內史柳昂私問曰至尊貶膳日久脈候何如對曰天子上應天心或當非愚所及若凡庶如此萬無一全尋而帝崩宣帝初在東宮嘗若心痛乃令僧坦治之其疾即愈及即位恩禮彌隆大象二年除太醫下大夫帝尋有疾僧坦宿直侍疾帝謂隋公曰今日性命唯委此人僧坦診候知帝危殆乃對曰臣荷恩既重思在效力但恐庸短不逮敢不盡心帝領之及靜帝嗣位遷上開府儀同大將軍隋開皇初卒僧坦撰集驗方十二卷行紀三卷行於世隋書曰許智藏高陽人也祖道幼嘗以母疾覽醫方因而究拯世號名醫誡其諸子曰為人子者嘗膳視藥不知方術豈謂孝乎由是世相傳授仕梁官至員外散騎侍郎父景武竟陵王咨議參軍智藏少以醫術自達仕陳為散騎常侍及陳滅高祖以為員外散騎侍郎使詣楊州會秦孝王俊有疾上馳召之俊夜中夢其妃崔氏泣曰本來相迎如許智藏將至其人若到當必相苦為之奈何明夜俊又夢崔氏曰妾得計矣當入靈府中以避之及智藏至為俊診脈曰疾已入心即當發癇不可救也果如言俊數日而薨上奇其妙齎物百段煬帝即位智藏時致仁于家帝每有所苦輒令中使就詢訪或以輿迎入殿扶登御床智藏為方奏之用無不效唐書曰甄權許州扶溝人也嘗以母疾與弟立言專醫方得其旨趣隋開皇初為祕書省正字後稱疾免隋魯州剌史庫狄嶔若風患手不得引弓諸醫莫能療權謂之曰欽但將弓箭向垛一針可以射矣針其肩偶一穴應時射貞觀十七年權年一百三歲太宗幸其家視其飲食訪以藥性因授朝散大夫賜几杖衣服其年卒撰脈經針方明堂人形圖各一卷弟立言武德中纍遷太常丞御史大夫杜淹患風毒發腫太宗令立言視之既而奏曰從今更十一日午時必死果如其言時有尼明律年六十餘患心腹鼓脹身體羸瘦已經二年立言診其脈曰腹內有蟲當是誤食髮為之耳因令服雄黃須臾吐一蛇如人手小指唯無眼燒之猶有髮氣其疾乃愈又曰許裔宗常州義興人也初仕陳為新蔡王外兵參軍時柳太后感風不能言名醫療皆不愈脈益沉而噤裔宗曰口不可下藥宜以湯氣薰之令藥入腠理周時可差乃造黃耆防風湯數十斛置於床下氣如煙霧其夜便得語武德初關中多骨蒸病得之必死遞相連染諸醫無能療者裔宗每療無不愈或謂曰公醫術若神何不著書以貽將來裔宗曰醫乃意也在人思慮又脈候幽微若其難別意之所解口莫能宣且古之名手唯是別脈脈既精別然後識病夫病之於藥有正相當者唯須單用一味直攻彼病藥力既純病即立愈今人不能別脈莫識病源以情臆度多安藥味譬之於獵未知兔所多發人馬空地遮圍或冀一人偶然逢也如此療疾不亦踈乎假令一藥偶然當病復共他味相和君臣相制氣勢不行所以難羌諒由於此脈之深趣既不可言虛設經方豈加於舊吾思之久矣故不能著述耳年七十餘卒又曰秦鳴鶴為侍醫高宗苦風眩頭重目不能視武后亦幸災異逞其志至是疾甚召鳴鶴張文仲診之鳴鶴曰風毒上攻若剌頭出少血即愈矣天后自簾中怒曰此可斬也天子頭上豈是試出血處耶上曰醫之議病理不加罪且吾頭重悶殆不能忍出血未必不佳命剌之鳴鶴剌百會及腦戶出血上曰吾眼明也言未畢后自簾中頂禮拜謝之曰此天賜我師也躬負繒寶以遺鳴鶴又曰安金藏為太常工人時睿宗為皇嗣或有誣告皇嗣潛有異謀者則天令來俊臣按之左右不勝楚毒皆欲自誣唯金藏大呼謂俊臣曰公既不信金藏言請剖心以明皇嗣不反即引佩刀自剖其胸五藏並出血流被地氣遂絶則天聞之令舁入宮中遣醫人卻內五藏入以桑白皮縫合之傅藥經宿乃蘇
