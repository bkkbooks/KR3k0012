body:
  text: 南蠻三赤土國隋書曰赤土國扶南之別種也在南海中水行百餘日而達所都土色赤因以為號陳婆羅剌國西婆羅婆國南訶羅旦國北巨大海地方數千里其王姓瞿曇氏名利富多塞不知有國近遠稱其父釋王位出家為道傳位於利富多塞在位十六年矣有三妻並鄰國王之女也居僧袛城有門三重相去各百許步每門圖畫仙人菩薩之像懸金花鈴毦婦女數十人或奏樂或捧金花又飾四婦人容飾如佛塔邊金剛力士之狀夾門而立門外者持兵杖門內者執白拂夾道垂素網綴花王宮諸屋悉是重閣北戶北面而坐坐三重之榻衣朝霞布冠金花冠垂雜寶瓔珞四女子立侍左右兵衛百餘人王榻後作一龕以金銀五香木雜鈿之龕後懸一金光焰夾榻又樹二金鏡鏡前首陳金甕甕前各有金香爐當前置一金伏牛牛前樹一寶蓋蓋左右皆有寶扇婆羅門等數百人東西重行相向而坐其官有薩陀迦邏一人陀拏達又二人迦利密迦三人共掌政事俱羅末帝一人掌刑法每城置郍耶迦一人鉢帝十人其俗皆穿耳剪髮無跪拜之禮以香油塗身敬佛尤重婆羅門婦人作髻於項後男女通以朝霞朝雲雜色布為衣豪富之室恣意華靡唯金鎖非王賜不得服用每婚嫁擇吉曰女家先期五日作樂飲酒父執女手以授壻七日乃配焉既娶則分財別居唯幼子與父同居父母兄弟死則剔髮素服就水上構竹為棚棚內積薪以尸置上燒香建幡吹蠡擊鼓以送之縱火焚薪遂落於水貴賤皆同唯國王燒訖收灰貯以金瓶藏於廟屋冬夏常溫雨多霽少種植無時特宜稻穄白豆黑麻自餘物産多同交址以甘蔗作酒雜以紫瓜根酒色黃赤味亦香美亦名椰漿為酒又曰煬帝即位募能通絶約域者大業三年屯田主事駿虞部主事王君政等請使赤土帝大悅賜駿等帛各百匹時服一襲遣齎物五千假以賜赤土王其年十月駿等自南海郡乘舟晝夜二旬每值便風至焦石山而過東南泊陵伽鉢拔多洲西與林邑相對上有祠神焉又南行至師子石自是島嶼連接又行二三日西望見狼牙須國之山於是南達雞籠島至於赤土之界其王遣使婆羅門鳩摩羅以舶三十艘來迎吹蠡擊鼓以樂隨使進金鎖以纜駿船月餘至其都王遣其子郍耶迦請與駿等禮見先遣人送金盤貯香花并鏡鑷金合二枚貯香油金瓶八枚貯香水白疊布四條以擬供使者盥洗將象二頭持孔雀蓋以迎使人并致金花盤以藉詔函男女百人奏蠡鼓婆羅門二人導路至王宮宣詔訖引駿等坐奏天笁樂事畢駿等還館又遣人送食以草葉為盤其大方丈後請駿等入宴王前設兩床床上並設草葉盤方一丈五尺上有黃白紫赤四色之餅牛羊魚鱉豬蝳蝐之肉百餘品延駿升床從者坐於地席各以金鍾置酒女樂迭奏禮遺甚厚尋遣郍邪迦隨駿貢方物既入海見緑魚群飛水上浮海上十餘日至林邑東南並蒲浪北山而行其海水闊千餘步色黃氣腥舟行一日絶云是大魚糞也循海北岸達于交址至六年春與郍耶迦於弘農謁帝帝大悅賜物及官賞各有差蒲羅中國吳時康泰為中郎表上扶南土俗曰拘利正東行極崎頭海邊有居人人皆有尾五六寸名蒲羅中國其俗食人優鈸國康泰扶南土俗曰優鈸國者在天笁之東南可五千里國土熾盛城郭珍玩謠俗與笁司橫趺國康泰扶南土俗曰橫趺國在優鈸之東南城郭饒樂不及優鈸也北攎國康泰扶南土俗曰諸薄之東南有北攎洲出錫轉賣與外徼馬五洲康泰扶南土俗曰諸薄之東有五洲出雞舌香樹木多華少實薄歎洲康泰扶南土俗曰諸薄之西北有薄歎洲土地出金常以採金為業轉賣與諸賈人易糧米雜物耽蘭洲康泰扶南土俗曰諸薄之西北有耽蘭之洲出鐵巨延洲康泰扶南土俗曰諸轉薄之東北有巨迹洲人民無田種芋浮船海中截大蚶螺杯往扶南濱郍專國康泰扶南土俗曰濱郍專國出𩥄都田切馬及金俗民皆有衣被結髮也烏文國康泰扶南土俗曰烏文國昔混滇初載賈人大舶所成此國斯調國康泰扶南土俗曰斯調洲灣中有自然監纍如細石子國人取之一車輸王餘自入南州異物志曰斯調海中洲名也在歌營東南可三千里上有王國城市街巷土地沃美萬震南方異物志曰斯調國又有中洲焉春夏生火秋冬死有木生於火中秋冬枯死以皮為布林陽國康泰扶南土俗曰扶南之西南有林陽國去扶南七千里土地奉佛有數千沙門持戒六齊曰魚肉不得入國一曰再市朝市諸雜米甘果石密暮中但貨香花南州異志曰林陽在扶南西七千餘里地皆平博民十餘萬家男女行仁善皆侍佛牟奴國摸盧國末利國卑離國滿都國闕余國沙樓國晉起居注曰太熙元年正月牟奴等國大小口十七萬九千餘人各遣正副使詣護東夷校尉何龕上獻方物蒲林國晉起居注曰興寧元年閏月蒲林王國新開通前所奉表詣先帝今遣到其國慰諭師子國宋元嘉起居注曰師子國王遣使奉獻詔曰此小乘經甚少彼國所有皆可悉為寫送之聞彼鄰多有師子此所未覩可悉致之法顯記曰師子國本旡人正有鬼神及龍居之諸國商人來共市易鬼神自現身但出寶物顯其時直商人則依價直取物諸國人文其土樂悉亦復來於是遂成大國和適無冬夏之異草木常茂田種隨人無有時節毗加梨國宋元嘉起居注曰五年天笁毗加梨國王月遣使上表并奉金剛指環一枚剛印摩勒金環一枚毾㲪一具白旃檀六假白赤鸚鵡各一頭細疊兩張干陀利國南史曰干陀利國在南海洲上其俗與林邑扶南略同出班布古貝檳榔特精為諸國之極宋孝武世王釋婆羅郍鄰陀遣長史笁留陀獻金銀寶器梁天監元年其王瞿曇修跋陀羅以四月八日夢一僧謂曰中國今有聖主十年後佛法大興汝若遣使貢奉禮敬則土地豐樂商旅百倍若不信我則竟土不得自安初未之信既而又夢此僧曰汝若信我我當與汝往觀乃於夢中至中國拜覲天子既覺心異之陀羅本工畫乃寫夢中所見武帝容資飾以丹青仍遣使并畫工奉表獻玉盤等物使人既至摸寫帝形以還其國比本畫則符同焉因盛以寶函日加禮敬後跋陀死子毗針耶跋摩立遣長史毗員跋摩奉表獻金芙蓉雜香藥等狼牙修國南史曰狼牙修國在南海中其界東西三十日南北二十日行北去廣州二萬四千里土氣物産與扶南略同偏多棧沉婆律香其俗男女皆袒而披髮以古貝為于漫其王及貴臣乃加雲霞布覆胛以金繩為絡帶金環貫耳女子則布以纓絡繞身其國纍磚為城重門樓閣王出乘象有幡毦旗鼓罩白蓋兵衛甚嚴國人説立國已四百餘年後嗣衰弱王族有賢者國人歸向之王聞乃加囚執其鎖無故自斷王以為神因不敢害乃逐出境遂奔天笁天笁妻以長女俄而狼牙王死大臣迎還為王二十餘年死子婆伽達多立天監十四年遣使阿撤多奉表婆利國南史曰婆利國在廣州東南海中洲上去廣州二月日行國界東西五十日行南北二十日行有一百三十六聚土氣暑熱如中國之盛夏穀一歲再熟草木常榮海出文螺紫貝有石名坩貝大硬其國人抱古貝如袍及為都縵乃用班絲者以瓔絡繞身頭著金長冠高尺餘形如牟綴以七寶之飾帶金裝劍偏坐金高座以金鐙支足侍女皆為金花雜寶之飾或持白毦拂及孔雀扇王出以象駕輿輿以雜香為之上施羽蓋珠簾導從吹螺擊鼓自古來通中國問其先及年數不能記自言白靜王夫人即其國女天監十六年遣使奉表獻金席等普通三年其王頻伽復遣使珠智獻白鸚鵡青蟲兜鍪琉璃器古具螺杯雜色香數十種隋書曰婆利國自交址浮海南過赤土丹丹乃至其國國界西四月行南四十五日行王姓剎利耶伽名護濫那婆官曰獨訶邪拏次曰獨訶氏拏國人善投輪刀其大如鏡中有竅外鋒如鋸遠以投人無不中其餘兵器與中國略同俗類真臘物産同於林邑其殺人及盜截其手姦者鎖其足期年而止祭祀必以月晦盤貯酒殽浮之流水每十一月必設大祭海出珊瑚有鳥名舍利解人語大業十二年遣使入貢後遂絶訶羅陀國南史曰訶羅陀國宋元嘉七年遣使奉表曰伏承聖主重三寶興立塔寺周滿國界今故遣使二人表此微心呵羅單國宋元嘉起居注曰去年六月闍婆洲呵羅單國王毗沙跋摩遣使獻奉又曰十一年呵羅單國王尸梨毗遮耶獻銀滲柈等南史曰呵羅單國都闍婆洲元嘉七年遣使獻金剛指環鸚鵡鳥天笁國白疊等物十年呵羅單國王毗沙跋摩奉表曰常勝天子陛下諸佛世尊常樂安穩三達六通為世間尊是名如來是故至誠五體敬禮其後與子所篡奪十三年又上表二十六年文帝詔曰呵羅單國婆皇婆達三國頻越遐海款化納貢遠誠宜甄可並加除授乃遣使策命之二十九年又遣長史婆和沙彌獻方物蒲黃國宋元嘉起居注曰二十六年蒲黃國獻牛黃等物又獻鬱金香等物婆皇國南史曰婆皇國元嘉二十六年國王舍利婆羅跋摩遣使獻方物四十一種文帝策命之為婆皇國王二十八年復遣使貢獻孝武孝建三年又遣長史笁郍婆智奉表獻方物以郍婆智為振威將軍大明三年獻赤白鸚鵡大明八年明帝泰始二年又遣使貢獻明帝以其長史笁須羅遠前長史振威將軍笁郍婆智並為龍驤將軍婆達國南史曰婆達國元嘉二十六年國王舍利不陵伽跋摩遣使獻方物文帝策命之為婆達國王二十六年二十八年復遣使獻方物闍婆達國南史曰闍婆達國元嘉中國王師利婆達呵阿陀羅跋摩遣使奉表曰宋國大主大吉天子足下教化一切種智安穩天人師降伏四魔成等正覺轉道法輪度脫衆生我雖在遠亦霑靈潤槃槃國宋起居注曰孝建二年七月二十日槃槃國王遣長史笁伽藍婆奉獻金銀琉璃諸香藥等物南史曰槃槃國元嘉孝建大明中並遣使貢獻梁中大通元年四年其王使使奉表纍送佛牙及畫塔獻沉檀等香數十種六年八月復遣使送菩提國舍利及畫塔國圖并菩提樹葉詹糖等香梁書曰槃國南海大洲中北與林邑隔小海自交州船行四十日至其國王曰楊栗翨音翅栗翨父曰楊德武連以上無得而紀百姓多緣水而居國無城皆豎木為柵王坐金龍床每坐諸大人皆兩手交抱肩而跪及其國多有婆羅門自天竺來就王乞財物王甚重之其大臣曰勃郎索濫次曰崑崙帝也次曰崑崙勃和音胡臥切次曰崑崙勃帝索甘且其言崑崙古龍聲相近故或有謂為古龍者其在外城者曰郍延猶中夏刺史縣令其矢多以石為鏇矟則以鐵為刃有僧尼寺十所僧尼讀佛經皆食肉而飲酒亦有道士寺一所道士不飲食酒肉讀阿修羅王經其國不甚重之俗皆呼僧為比丘呼道士為貪隋大業中亦遣使朝貢唐書曰槃槃國在林邑西南海曲中北與林邑隔小海自交州郍行四十四日乃至其國與狼牙修國為鄰人皆學婆羅門甚敬佛法貞觀九年遣使來貢方物斤陀利宋起居注曰孝建二年八月二日斤陀利國王釋陀羅降陀遣長史竹留陀及多奉表獻方物
