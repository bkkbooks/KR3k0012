body:
  text: 職官部五十一內史史記曰汲黯字長孺公孫弘為相乃上言曰右內史界部中多貴人宗室難治非素重臣不能任請徙黯為內史數歲官事不廢漢書曰倪寬遷右內史寬既治民勸農業表奏開六輔渠六輔謂京兆馮翊扶風河東河南河內也定水令以廣溉田收租稅時裁闊狹與民相假貸以故租多不入後有軍發右內史以負租課殿當免民聞皆恐失之大家牛車小家檐負輸租屬不絶課更最上由此愈奇寬晉書曰孔季恭為吳興內史吳興頻喪太守言項羽神為祟君居郡事竟無害也又曰王薈字敬文恬虛守靖不競榮利少歷清官除吏部郎侍中建威將軍吳國內史時年饑粟貴人多饑死薈以私米作饘粥以飴餓者所濟活甚衆梁書曰顧憲之為衡陽內史先是郡境連歲疾疫者死者太半棺木尤貴悉裹以生席棄之路傍憲之下車分告屬縣求其親黨悉令殯葬其家人絶滅者憲之為出公祿使綱紀營護之又土俗山民有病輒云先祖為禍皆開冢剖棺水洗枯骨名為除祟憲之曉諭為陳生死之別事不相由風俗遂改時刺史王奐新至唯衡陽獨無訟者乃歎曰顧衡陽之化至矣又曰傅昭為安成內史郡自宋已來兵亂相接郡府舍稱凶每昏旦聞人鬼相觸在任者鮮以吉終及昭至有人夜見甲兵出曰傅公善人不可侵犯乃騰虛而去有頃風雨忽至飄郡廳事入隍中自是郡遂無患咸以昭貞正所致又曰傅昭為安成內史郡多猛獸為害常乃命去檻穽猛獸竟不為害又曰殷鈞字季和陳郡長平人也為臨川內史鈞體多疾閉閣臥理而百姓化其德劫盜皆奔出境又曰伏𣈶為永陽內史在郡清潔政務安靜郡人何貞秀等一百五十四人詣州言狀湘州刺史以聞詔勘有十五事為吏人所懷帝善之隋書曰樊子蓋為河南內史屢有治績文帝謂曰今為公別造玉麟符以代銅獸也唐書曰王及善契丹作亂山東不安起授滑州刺史則天謂曰邊賊反叛卿雖疾閣可將妻子曰行三十里緩步至彼與朕臥理此州以斷河路也因問朝廷得失及善備陳理亂之宜十餘道則天曰彼末事也此為本也卿不可行乃留拜內史郡丞漢書曰黃霸為頴川郡守有郡丞老病聾督郵欲逐之霸曰許丞廉吏雖老尚能拜起送迎止頗重聽何傷其善助之無失賢者意又曰黃霸為河南太守丞霸為人明察內敏又習文法為丞處職當於法令太守甚任之吏民愛敬焉東觀漢記曰光武議靈臺所處上謂桓談曰吾欲讖決之何如談默然曰臣不讀讖上問其故談復言讖非經上大怒曰桓談非聖無法將下斬之談叩頭流血良久乃得解出為六安郡丞意忽忽不樂病卒時年七十餘又曰趙典兄子溫初為京兆郡丞歎曰大丈夫生當雄飛安能雌伏遂棄官而去後官至三公謝丞後漢書曰劉平為濟陽郡丞太守劉育甚重之任以郡職漢名臣奏曰張禹奏曰案令丞相奏事司直持案長史將簿中二千石奏事皆與其丞合緣是以臣下各得盡心竭誠而事公明王隱晉書曰范晷字彥長南陽人僑居清河仕為郡五官後為河內郡丞時裴叔則為河內郡知之為裴所伏後為侍御史隋書曰張須陀為齊郡丞屬歲饑穀米湧貴須陀將開倉賑給官屬咸曰待詔勑不可擅與須陀曰今帝在遠遣使往來必掩歲序百姓有倒懸之急如待報至當委溝壑矣吾若以此獲罪死無所恨先開倉而後上狀帝知之而不責也又曰王文同為恆山郡丞有一人豪猾每持長吏短前後守令咸憚之同下車聞其名召而數之因令左右剡木為大撅埋於廷出尺餘四角各埋小撅令其露心於木撅上縛四支於小撅以捧毆其背應時潰爛郡中大駭吏人相視懾氣唐書官品志曰丹陽會稽吳郡吳興及萬戶郡丞並六百石汝南先賢傳曰周防字偉公年十六任郡小吏世祖巡狩汝南召椽史試經防尤能誦讀拜為守丞防以未冠請去師事徐州刺史蓋豫明經舉孝廉拜郎中陸機集上表曰伏見司徒下諫議大夫張暢除當為豫章內史丞暢才思清敏志節貞厲秉心立操早有名譽其年時舊比多歷郡守唯暢陵遲自首末齒而佐下藩遂蹈碎濁於暢名實居之為劇前後未始有此愚以為宜解舉試以近縣詔暢既為是人所稱便差代郡參軍晉書曰阮子避亂渡江元帝以為安東參軍蓬髮飲酒不以王務縈心北史曰盧文偉少孤有志尚頗涉經史年三十八始舉秀才除本州平北府流參軍說刺史裴攜案舊迹修督冗陂溉田萬頃人賴其利晉劉弘教曰太康以來天下無虞遂共尚無為貴談莊老少有說事外託論公務內但共談笑今即同舟而載安可不人人致力耶督郵韋昭辨釋名曰釋云督郵主諸縣罰以負郵殷糾攝之也漢書曰田延年為河東太守行縣在平陽召故吏五六十人延年皆臨見令有文者東有武者西閲數十人次到尹翁歸獨伏不肯起對曰翁歸文武兼備唯所施設延年召上辭問甚奇其對使歸府案事發姦窮竟事情延年大重之徙署督郵河東二十縣分為兩部閲孺部汾北翁歸部汾南又曰孫寶為京兆尹以立秋日署故吏侯文為東部督郵入見勑曰鷹隼始擊常順天氣取姦惡以成嚴霜之誅椽部拒有人乎文曰無其人不敢空受職寶曰誰文曰霸陵杜稚秀寶曰更言其次文曰豺狼方橫道不宜復問狐狸徲秀聞之杜門不通水火穿後牆為小戶不敢犯法東觀漢記曰趙勤字孟卿南陽棘人明達好學介然特立太守駱珍召署曹吏至掾督郵太守桓虞下車葉令雍霸及新野令皆不遵法乃復勤督郵到葉見霸不問縣事但高談清論以激厲之霸即陳責解印綬去勤還入新野界令聞霸已去遣吏奏記陳罪復還印綬去虞乃歎曰善吏加良鷹矣下韝即中又曰虞延陳留人光武東巡過小黃高帝母昭靈后園陵在焉延為部督郵詔呼引見問園陵之事延占拜可觀其園陵樹蘗皆諳其數俎豆犧牲頗曉其禮帝善之勑延從駕到魯還經封丘城門下小不容羽蓋上怒使撻侍御史延因陛見引咎以為罪在督郵上詔曰以陳留督郵虞延故貸御史罪後漢書曰馬援為郡督郵送囚至司命府王莽置司命官上公已下皆烈糾察囚有重罪援哀而縱之遂亡命北地遇赦因留牧畜又曰陳球為繁陰令時魏郡守諷縣求賄球不與太守怒撾督郵令逐球督郵不肯曰魏郡十五城獨繁陽有異政令逐之將致議於天下太守乃止司馬彪續漢書曰鐘離意仕郡為督郵縣亭長受民雞酒府下記考之意封還記詣閣白見以春秋責重先內後外政化之本由近及遠宜先請府內且闊細微太守賢之謝承後漢書曰會稽謝夷吾字堯卿為西部督郵烏程長有罪太守第五倫使夷吾往收之到縣入閣便大哭以三百錢為禮便歸倫問其故對曰三十日中當死故不收之至時果如其言謝承後漢書曰許慶字子伯家貧為郡督郵牛車鄉里號曰軺車郵慶嘗與友人談論漢無統嗣幸臣專勢世俗衰薄賢者放退慨然據地悲哭時人稱許子伯哭世又曰聞人襲為郡督郵行則負擔臥則無被連麕皮以自覆不受人食之費魏志曰蒲寵字伯寧山陽昌邑人年十八為郡督郵時郡內李朔等擁部曲害于平民太守使寵糾焉朔等請罪不復侵掠又曰高堂隆字叔平平陽人魯高堂生後也少為諸生太守薛悌命為督郵督軍與悌爭名悌而呵之隆案劍叱督軍曰昔魯定見侮仲尼歷階趙彈秦箏相如進缶臨臣名君義之所討也督軍失色悌起止之列異傳曰汝南北部督郵西平劉伯夷有大才略案行到懼武亭夜宿或曰此亭不可宿伯夷乃獨往宿去火誦詩書五經訖臥有頃轉東首以絮巾結兩足以幘冠之拔劍解帶夜時有異物稍稍轉近忽來覆伯夷伯夷屈起以袂掩之以帶繫魅呼火照之視得一老狸色赤無毛持火燒殺之明日發視樓屋間得魅所殺人髮結數百枚於是亭遂清靜舊說狸髡千人得為神也漢魏先賢行狀曰故宗正南陽劉伯字奉先少履清節忠亮正直研精文學無不綜覽嘗為督郵時豫章太守虞績以叨餮穢污徵至郡界當就法車不肯就坐伯乃拔刀驅績績恐就車乃徑上尚書以肅王道廣州先賢傳曰徐徵字君求蒼梧荔浦人少有方直之行不撓之節頗覽書傳尤明律令延喜五年徵為中部督郵時唐帝恃豪貴京師號為唐獨語遣賓客至蒼梧頗不拘法度徵便收客郡市髡笞乃白太守太守大怒收徵送獄主簿守閣曰此人無故賣買既侵百姓汙辱婦女徐徵上念明政據刑申恥今便治郡無復爪牙之吏後督郵當徒跣行奉諸貴戚賓客耳太守答知徵為是迫不得已會稽先賢傳曰茅開字季闔餘姚人為督郵平決厭衆心嘗之部歷其家不入門當路向堂朝拜府君益善之鐘離意別傳曰汝南黃讜拜會稽太守召意署北部督郵時郡中大疫黃君轉署意中部督郵意乃露車不冠身循行病者門入家賜與醫藥詣神廟為民禱祭其所臨戶四千餘人後日府君出行災眚百姓攀車言曰明府不須出也但得鐘離督郵民皆活也馬融長笛賦序曰融既博覽又好音樂能鼓琴吹笛為督郵獨臥平陽塢中有洛客舍逆旅吹笛融聞甚悲遂作長笛賦云爾
