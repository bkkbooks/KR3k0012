body:
  text: 資産部十四釣毛詩何彼穠矣曰其釣維何維絲伊緡伊維緡綸也箋云釣者以此有求於何彼以為之乎以絲為之綸則是善釣也又國風竹竿曰籊籊竹竿以釣于淇又小雅采緑曰之子于釣言綸之繩綸釣繳也其釣維何維魴及鱮維魴及鱮薄言觀者論語述而曰子釣而不綱綱謂為大索橫流屬釣尚書大傳曰周文王至磻溪見呂望釣文王拜之尚云望釣得玉璜刻曰周受命呂佐檢德合于今昌來提戰國策曰魏王與龍陽君共船而釣龍陽君得十餘魚而涕下王曰何謂也對曰臣之始得魚也臣甚喜後得益大今欲棄臣前之所得矣今臣與王拂枕席爵至人君走人於庭避人於塗四海之內其美人多矣聞臣之得幸王也必裂裳而趍王臣亦猶曩之所得魚也亦將棄矣臣安能無涕乎魏王曰有是心也何不相告於是布令於四境之內曰有敢言美人者族謝承後漢書曰鄭敬隱於蟻陂釣魚大澤折芰為坐以荷薦肉瓠瓢盈酒琴書自娛後漢書曰郭玉者廣漢人初有老父不知何所出常漁釣於涪水自號涪翁乞養民間見有病者時下針石有效王從受術焉又曰嚴光字子陵會稽餘姚人少有高名與光武同遊及光武即位乃變姓名隱身不見帝思其賢令以物色訪之後齊國上言有一男子披羊裘釣澤中帝疑其光也備安車玄纁聘之三反而後至拜為諫議大夫不屈乃耕於富春山後人名其釣處為嚴陵瀨晉書曰翟莊湯之子也少以弋釣為事及長不復獵或問魚獵同是害生之事而先王止去其一何哉莊曰獵自我釣自物未能頓去故先節其甚者夫貪餌吞鉤豈我哉時人以為知言宋書曰王弘之性好釣上虞江有一處名石頭弘之常垂綸於此經過者不識之或問漁師得魚賣不弘之曰亦不得得亦不賣日夕載魚入上虞郭經親故門各以一兩頭置門內而去又曰文帝嘗與群臣臨天泉池帝垂綸良久不獲王景文越席曰臣以為垂綸者清故不獲貪餌衆皆稱善又曰漁父者不知姓名亦不知何許人也太康孫緬為尋陽太守落日逍遙渚際見一輕舟凌波隱顯俄而漁父至神韻蕭灑垂綸長嘯緬其異之乃問有魚賣乎漁父笑而答曰其釣非釣寧賣魚者耶緬益怪焉遂褰裳涉水謂曰竊觀先生有道者也終朝鼓枻良足勞止吾聞黃金白璧重利也駟馬高蓋榮勢也方今主道文明守在海外隱淪之士靡然向風子胡不贊緝熙之美何晦用其若是也漁父曰僕山海狂人不達世務未辨賤貧無論榮貴乃歌曰竹竿籊籊河水悠悠相忘為樂貪餌吞鉤非夷非惠聊以忘憂於是悠然鼓棹而去孔叢子曰子思居衛衛人釣於河得鱞一作鰥魚魚焉其大盈車子思問之曰鱞魚魚之難得者也子如何得之對曰吾下釣垂一魴之餌鱞過而弗視也更以豚之半體則吞之子思喟然曰鱞雖得貪以死餌士雖懷道貪以死祿文子曰魚不可以無餌釣獸不可以空器召列子曰詹何以獨繭絲為綸芒針為鉤荊條為竿剖粒為餌引盈車之魚於百仞之川洎流之中綸不絶鉤不申竿不撓因水勢而施舍也又曰渤海之東有大壑焉實惟無底之谷其中有五山常隨潮波上下往還不得暫峙使巨鼇十五舉首而載之五山始峙而不動而龍伯國有大民暨五山之所一釣而連六鼇合負而趨歸其國灼其骨以數焉荀卿子曰自上蒞下猶夫釣者焉隱於手而應於釣則可以得魚鬼谷子曰古之善摩者如操釣而臨深淵而投之必得魚矣闕子曰魯人有好釣者以桂為餌黃金之鉤錯以銀碧垂翡翠之綸其持竿處位即是然其得魚不幾矣故曰釣之務不在芳飾事之急不在辨言莊子曰莊子釣於濮水之上楚王使大夫二人往見焉曰願以境內纍夫子莊子持竿不顧又曰任公子好釣巨魚為大綸巨釣以犗牛為餌蹲會稽投東海朞年不得魚已而大魚食之牽巨釣驚揚波而奮鬐白波若山海水振蕩任公子得若魚離而臘之浙河以東蒼梧以北莫不厭若魚者淮南子曰詹公之釣千歲之鯉又曰聖人以道德為竿以昏義為鉤餌役之天地門萬物孰非其有哉又曰無餌之釣不可以得魚愚士無禮不可以得賢又曰釣者靜之罛者舟之罩者抑之罾者舉之為之異得魚一也孫綽子曰海人與山客辨其方物海人曰橫海有魚額若華山之頂一吸萬頃之波山客曰鄧林有木圍三萬尋直上千里傍蔭數國有人曰東極有大人斬木為策短不可支釣魚為鮮不足充饑抱朴子曰金鉤玉餌雖珍而不能制九淵之沉鱗顯寵豐祿雖貴而不能致無欲之幽人符子方外曰太公釣隱溪五十有六年矣而未嘗得一魚魯連聞之往而觀其釣太公跪石隱崖且不餌而釣仰詠俯吟及暮而釋竿傅子曰劉曄責楊暨曰夫釣者中大魚則縱而隨之須可制而後牽之則無不得也人主之威豈徒大魚而已子誠直臣然計不足不可不精思也穆天子傳曰天子北征舍於珠澤此澤出珠因名之云今越攜平澤出青珠以釣於流水又曰辛未天子北還釣于漸澤食魚于桑野又曰天子乃釣于河以觀姑繇之木姑繇大木也山海經曰尋木長千里生河邊謂此木之類六韜曰呂尚坐茅以漁文王勞而問焉呂尚曰魚求於餌乃牽其緡人食於祿乃服於君故以餌取魚魚可殺以祿取人人可竭以小釣釣川而擒其魚中釣釣國而擒其萬國諸侯呂氏春秋曰善釣者出魚乎千仞之下餌香也又曰太公釣於紂之世文王得之而王文王千乘也紂天子也天子失之而千乘得之知與不知也又曰若釣者魚有大小餌有宜適羽有動靜羽釣浮也說苑曰宓于賤為單父宰過於陽書曰子亦有以送僕乎陽書曰吾少也賤不知治民之術有釣道二焉請以送子子賤曰釣道奈何陽書曰夫投綸餌迎而吸之者陽橋也其為魚也薄而不美若存若亡若食不食者魴也其為魚也薄而味厚宓子賤曰善於是未至單父冠蓋迎之者交接於道子賤曰驅驅之夫陽書之所謂陽橋者至矣焦贛易林曰曳綸江海鉤挂魴鯉王孫利得以饗仲友列仙傳曰呂尚冀州人避紂亂釣于卞溪三年不獲魚比嫗聞曰自可止矣公曰非爾所矣果獲大鯉得兵鈐於魚腹中後葬無尸唯玉鈐六薦在棺中又曰涓子者齊人釣於澤得符鯉中又曰陵陽子明銍鄉人釣施溪得白龍子解網拜謝放之後數十年得白魚腹中有書教子明服食遂上黃山採五石脂石肺服之三年白龍來迎之神仙傳曰左慈字元放盧江人少有神通嘗在曹公坐公從容曰今日高會珍羞略備所少吳松江鱸魚耳而放下坐應曰此可得也因求銅盤貯水以竹竿餌釣於盤須臾引入鱸魚出公大笑會者咸驚中論曰獨思則滯而不通獨為則困而不就善釣不易坻而得魚君子不降席而追道又曰又王遇姜公於渭濱皤然皓首秉竿而釣文王得之灼若袪雲而見日霍若開霧而觀山桓範世論曰水則有波釣則有磨我欲更之無如之何言物動而舋已彰形行而跡已著又曰釣巨魚不使嬰兒輕預非不親力不堪也王子年拾遺記曰漢帝元鳳中季秋之月泛衝瀾靈鷁之舟窮晷繼夜釣于臺下以香金為鉤霜絲為綸丹鯉為餌得白蛟長三丈大若蛇無鱗甲又曰吳主與潘夫人遊釣得大魚吳主喜夫人曰昔聞泣魚今乃為喜有喜必憂以為深誡至末年漸相譖毀稍見離退時人謂夫人知幾釣臺今猶存焉世說曰劉道真少時常漁釣草澤善歌嘯聞者莫不留連有一老嫗識異常人甚樂歌嘯乃殺豚進之道真食豚盡了不謝嫗見不飽又進一豚食半還之後為吏部郎嫗兒為小令史道真超用之兒不知由復白母母告之於是齎牛酒詣道真道真曰去去無可復相報楚辭曰以直針為釣又何魚之能得宋玉釣賦曰宋玉與登徒子偕受釣於玄淵退而見於楚襄玉登徒子曰夫玄淵之釣也以三尋之竿八絲之綸餌以蛆蟟鉤以細針以出三尺之魚於數仞之水中盧植與張然明書曰臨江而釣終日不獲一魚魚之不食其餌也是以君子慎其舉謝玄與兄書曰居家大都無所為正以垂綸為事足以永日此固下大有鱸魚一出手釣得四十七枚又與書曰昨日疏成後出釣手所獲魚以為二坩鮓今奉送筌周易曰筌者所以在魚得魚而忘筌廣雅曰篝筌謂之昆莊子曰得魚忘筌王朝之與庾安箋曰此間萬頃江湖撓之不濁澄之不清而百姓投一綸下一筌者皆奪其魚器不輸十匹則不得放不知漆園吏何得持竿不顧漁父鼓泄而歌滄浪也罛說文曰罛罟也爾雅曰魚罟謂之罛郭璞注曰最大網罟也今江東云毛詩碩人曰河水洋洋北流活活施罛穢穢鱣鮪發發莊子曰函車之獸介而離山不免乎網罟淮南子曰張天下以為籠因江海以為罟又何亡魚失鳥之有乎綱罟廣雅曰罻罾魚網謂之罟說文曰網庖羲所結繩以田以漁也周禮天官上曰獸人掌罟田獸辨其名物罟網也以網搏所當田之獸冬獻狼夏獻麋春秋獻獸物狼膏聚麋膏散聚則溫散則涼以救時之苦也獸物凡獸皆可獻也時田則守罟備獸觸玃禮記中庸曰子曰人皆曰豫知驅而納諸罟獲陷阱之中而莫之知辟也毛詩國風曰九罭之魚鱒魴興也九罭變罟小魚魚之網也鱒魴大魚也周易曰庖犧氏結繩而為網罟爾雅曰緵罟謂之九罭九罭魚網也今之百囊罟是亦謂之䍣今江東呼為緵韓詩曰九罭之魚鱒魴九罭取芘也史記曰泉陽漁人豫且舉網獲江東神龜漢書曰豺獺未祭罝網不布於澤焉魏志曰邴原在遼東十餘年後乃潛遁還南行已數日而公孫度甫覺度知原之不可復追也因曰邴君所謂雲中白鶴非鶉雉之網可能羅始吾自遣之勿復求也宋書曰孫法宗常居墓所山禽野獸皆悉馴附每逢鹿觸網必解放之備以錢物陳書曰張昭字德明吳郡吳人也幼有孝性父熯常患消渴嗜鮮魚昭乃身自結網捕魚以供朝夕南史曰陳王固嘗聘魏宴昆明池魏人以南人嗜魚大設罟網固以佛法呪之遂一鱗不獲文子曰臨河欲魚不若退而織網老子曰天網恢恢踈而不漏莊子曰魚不畏網而畏鵜鴣網者公平無私鵜鴣有欲得之心故魚畏又曰豐狐文豹不免於網羅之患者文也韓子曰善張網者引其網不一一攝萬目而後得一一攝萬目而後得則是勞而難獲引其網而魚已慕矣故吏者民之本網也故聖人治吏不治民又曰靖郭君將城薛客曰君聞大魚乎網不能止繳不能絓也蕩而失水螻蟻得意焉孟子曰數罟不入汙池魚鱉不可勝食也枹朴子曰太昊師蜘蟵而結網國語曰魯宣公夏濫於泗淵濫漬也漬罟於泗水之淵以取魚泗在魯城北里革斷其罟而棄之罟網曰古者大寒降土蟄發降下也寒氣初下謂季冬建丑之月大寒之後也土蟄發謂孟春建寅之月蟄蟲始震魚上水獺祭魚水虞於是乎講罛罶取名魚登川禽而嘗之寢廟行諸國助宣氣也今魚方別孕不放魚長又行罣罟貪無藝也公聞之曰吾過而里革匡我不亦善乎是良罟也為我得法良善使有司藏之使吾無忘諗言里此罟則不忘里革言諗告也曰藏罟不如置里革於側之不忘也置置又曰聖人貴讓且諺曰獸惡其網民惡其上獸惡其網為害己民惡其上為病也古史考曰庖羲作卦觀像而作網世本曰芒則網宋襄注曰芒庖羲臣呂氏春秋曰湯見設網者四面張而祝之曰自天下者自地出者自四方來者皆罹我網湯曰嘻盡之矣非桀其孰如此又曰舜之末遇時也以其從屬拙他財取水利編蒲韋結罘網應璩報東海相染季然書曰足下頓彌天之網收萬仞之魚量之以溪谷數之以陔兆何其壯乎觀夫任公子之所釣此為鰌音秋蝦未足為吾子之道罶毛詩鹿鳴曰魚麗于罶鱨鯊又小雅苕之華曰牂羊僨首三星在罶牂羊牝羊也罶曲梁寡婦之笱也爾雅曰嫠婦之笱謂之罶敦璞注曰謂以簿為其魚笱廣雅曰曲梁謂之昴纂文曰楊州取魚罶也吳人謂之為笱主說文曰罶曲梁寡婦笱魚所留也罺爾雅曰罺謂之汕郭璞注曰今之撩罟也犍為舍人曰以薄摷魚曰摷者也纂文曰以魚乘水上為汕罩爾雅曰籗謂之罩郭璞注曰捕魚籠毛詩小雅曰南有嘉魚蒸然罩罩纂文曰以鐵施掉因以取魚符子曰天羅廓矣野人猶有罩翳之勤涔爾雅曰糝謂之涔郭璞注曰今作糝者聚柴於水中魚得寒入其裏藏隱因以簿圍捕取之犍為舍人曰以米投水中養魚曰涔也纂文曰以鐵施竹頭取魚為涔罾說文曰罾魚網也史記曰陳勝詐為書置人所罾魚腹中風土記曰罾樹四植而張網於水車挽上下之形如蜘蟵之網方而不圓楚辭曰鳥何萃兮蘋中罾何為兮木上俞失其所應璩新詩曰洛水禁罾罟魚鱉不為殖罾罟網名空令自相啖吏民不得食笱毛詩雞鳴弊笱曰弊笱在梁其魚唯唯又小雅小辨曰無逝我梁無發我笱說文曰笱曲竹捕魚笱也從竹勾亦聲欚廣雅曰其罾謂之欚梁毛詩國風曰維鵜在梁不濡其翼鵜汙澤也梁水中之梁鵜在梁可謂不濡其翼彼其之子不稱其服箋云不稱者言德薄而服尊維鵜在梁不濡其咮咮啄也彼其之子不遂其媾又小雅曰鴛鴦在梁戢其左翼言休息也箋云梁石絶水之梁戢斂也鴛鴦休息梁又曰彼何人斯其心孔艱胡逝我梁不入我門魏志曰文帝東征郭后留譙宮時后兄表留宿衛欲遏水取魚后曰水當通運漕又少材木奴客不在目前當復私取官竹木作梁遏水今奉車所不足者豈魚乎齊地記曰高密郡有古斷水處因造魚歲收億數故號曰萬匹梁軥廣雅曰軥謂之軥上罠說文曰罠漁也罨廣雅曰罨鮆網也風土記曰罨如𦌇而小斂口從水上掩而取者也箄纂文曰箄流水中張魚器也纂文曰取蟹者曰銛纂文曰鐵有巨施竹頭以擲魚為銛
