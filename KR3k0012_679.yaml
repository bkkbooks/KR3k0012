body:
  text: 道部二十傳授上五嶽真形圖經曰若道士得祕聖之經皆當杜祕於一人之口者即真靈之文將墜於獨見何緣得存於永代乎傳授但當必得其人豈可祕而不出是斯文永翳也太極經曰太上玉經隱注寶訣衆經之祖也太上令傳太極諸侯公王卿伯未得此位不得之矣道士有見此書則皆應為仙公也玄籙宿名將定焉靈寶真一經曰太靈真人告太極左宮仙公曰吾昔授太上靈寶洞玄自然太真上寶經為太極真人依太上法傳授於人定志經曰元始告右玄真人曰汝授此經可擇其人傳之彌布無外三皇經曰百萬人中或有一人應得此文者皆有仙籙宿命者也欲有所授當擇其人入諸名山八極周流天下鬼神無敢犯之者太清元始天中之王母初學道之師也又曰皇人者太帝所使在峨嵋山黃帝往授真一五牙法抱朴子曰黃帝東至青丘過風山見紫府先生受三皇內文以劫召萬神南至圓壠蔭建木觀百靈西至中黃子受九加之方過崆洞從廣成子授自然之經北至洪隄上具茨見大隗君黃蓋童子受神芝圖還陟王屋得神丹注記至峨嵋山見黃人於玉堂問真一之道曰夫長生仙方惟有金液守形卻惡獨有真一之道古人尤重也黃帝自然體道者也猶復陟王屋而受丹經登崆洞而問廣成往具茨而事大隗適東岱而奉中黃入金谷而咨子心論道養而證玄素精推步而授雷岐窮神姦記而白澤相地理而書青烏救傷殘而綴金冶故能畢該祕要窮盡道真按神仙經云昔黃帝老子奉事元君元君以受要訣況乎不建彼二君者安能自得仙度世者乎按荊山經及龍首記皆云黃帝服神丹又曰彭祖八百年安期千年斯其壽之過人遠矣若果有不死之道彼何不遂仙乎豈非稟命受氣偶得其多者乎按彭祖經云佐堯曆夏至商為大夫商王從受還年之術行之有效欲殺彭祖以絶其術祖覺而逃去去時年八百又曰紫微玄宮玉飛天真書太清元始授西母佩之位登仙宗真人衛從又曰玄洲仙伯關天萬仙真書東海小童授以得道人佩之一名仙人道籙一名鳳真籙太玄登仙盟文又崑崙墉臺靈飛太真大上丈人以授得道者佩之周行五嶽山神授職一名五嶽兵符佩之金石為開又曰蓬來高上真書成青天上皇以傳寧封佩此真符橫行江海一名蓬萊太玄玉札一名九流真書北陵文人授以馬師皇致龍來又天帝丈人黃上真書佩之知吉凶未兆之事上清經曰上清真人登大帝滄浪山諸太極真人授以丹青玉爐鍊雲根經三元布經曰昔寧玄甫受此經於皇上真人九年祕藏白空山齋戒百日忽見其巖有王文銀簡今封一通於白空山中本行經曰丹靈真人遇玄和先生受靈寶赤書五氣玄文黑帝真文一篇高玄經曰昔上元以隱文授太和玉女玉女授幼陽君以文封於九疑洞室登真隱訣曰太極帝君寶章者東海青童君授涓子以封掌名山涓子剖鯉所獲是太上召三一守形也以朱書素佩之左肘勿經履汙穢佩之八年而三一俱見矣三一者三元真一君也授其封掌之教又曰李翼字仲甫以七變法傳左慈慈修之以變化萬端此經在茅真人傳後道士以還丹方殊祕故略出別為一卷茅君傳曰太真元君西母授説明堂玄真經云太上立玄雙神四明玄真內映明堂外清吞息二暉長生神精上補司命監御萬靈六華充溢撤視黃寧此四十字即玄真之本經也其後王母惣真更演説行事之法猶如九真中經惟以龍書為主也太上刻於鳳臺南軒非惣真弟子不教非司命之玄挺不傳又曰西母攜王君茅盈以詣固衷之宮固衷盈二弟也西母撫背告之曰汝道雖成所聞未足我有所授汝乃遣侍女郭密香與上元夫人相聞云但不相見四千餘年天事勞我致以罕面可暫來否當此相待上元夫人遣一侍女答曰阿環再拜上問起居遠隔絳河擾以官事遂違顏色近五千年仰戀光潤情係無違密香至奉信承降尊於茅固處聞命之際即當飾駕先被太常君勑使詣希林校定三元之籙正爾暫往如是當還還便束帶願暫少留茅固因問王母不審上元夫人何真也曰三天真皇之母上元之高真統領十方玉女之名籙者也及上元夫人來聞雲中簫鼓聲龍馬嘶鳴既至從者甚衆皆女子齊年十六七容色明逸多服青綾之衣光彩奪目上元年未笄天姿絶艷服赤霜之袍柀青錦裘頭作三角髻餘髮散於腰戴九晨夜月之冠鳴六山火藻之佩曳鳳文琳華大綬執流黃揮精劍入室向王母拜王母坐止呼之與同座北向上元夫人設廚王君勑茅盈二弟固衷起拜稽首而立命坐復席上元乃勑侍女出紫錦囊開緑金之笈三元流珠經丹景道精經隱地八術經太極緑景經凡四部以傳固衷西王母勑侍女李方明出丹瓊之函披雲珠之笈以玉珮金璫太霄隱書洞飛二景內真符以傳司命茅君上元曰阿母隱書之妙上真內經天仙所寶封之金臺佩入太微動則八景玉輿靜則宴寢金堂此文妙矣阿環太極緑經等可以致明月黃華得白日之赤精也及西母上元俱去惟王君獨留經日於是盈與二弟訣別而與王君俱去到赤城玉洞之府告二弟曰吾今去便有局任不得復數相往來句曲山是治所也漢光武建武七年三月丁巳遣使者吳倫齎黃金五十斤置于茅三君廟下四時祠以太牢至明帝永平二年詔丹陽句容茅真人廟使營護修守時邑人通呼此廟為白鵠廟句曲之洞宮有五門石階曲山以水其門令得往來上下也句曲洞天東通林屋北通岱宗西通峨嵋南通羅浮皆大道也其間小徑新路阡陌沙澮非一處也漢建安之未左慈聞江東有此山故尋之齊戒三月而登山乃得其門入洞虛造陰宮二茅君授以神芝三種慈周旋洞室經年制度甚肅歎曰不圖天下復有如此之異乎至于地中洞天有三十六所王屋委羽西城西玄青城赤城羅浮句曲林屋括蒼崑崙蓬萊瀛州方丈滄浪白山八停之屬也五嶽及諸名山皆有洞室或三十里二十里十里嶽洞方百里也句曲山秦時名為句金壇以洞天內有金壇百丈因以致名也漢靈帝時勑郡縣採句曲之金以充武庫孫權時又遣宿衛人採金常輸官句曲山每至三月十八日十二月二日東卿司命茅君當是日請揔真玉君大虛真人東海青童君會于句曲之上好道者欲求神仙宜先齋戒俟此日登山陳乞也茅君即授以要道得入洞門又曰紫微元靈白玉龜臺九靈太真元君即西王母也上宰揔真王君東卿司命茅君之師右莢紫微夫人之母也居崑崙墉臺別治白玉龜山青琳之宮朱紫之房首戴華勝腰帶虎章葆蓋沓映羽旌廕庭以漢平帝時來降句曲華陽宮授司命茅君玉佩金璫經又獎教中小二君至晉成帝時與金闕聖君同降陽洛隱元臺授魏夫人玉清隱書四卷又穆天子傳所載詣西王母及降漢武者皆是也別有傳紀名靈鏡洞玄上經或曰大有妙經即今所存中元輔卿手執者是未顯于世主訓教天下學真之人又曰西極揔真君者茅司命之師也生於商末服青精䭀飯九轉丹用曲晨劍解之道治西城山宮年三十著繡衣芙蓉冠把鈴帶劍一漢元帝時降陽洛山授玉清虛上經三十一卷晉時又降魏夫人於陽洛臺每以三月十二月亦同來句曲推校學仙別有傳未顯於世神仙傳云降蔡經家者是此君也又曰清虛王真人揔真王君弟子南嶽魏夫人師漢元帝時辭家人華陰山九年太極真人降授二法後入地胏山終南山一名地胏又登陽洛山平帝時南極夫人西城王君同降授上經三十一卷王君共詣玄洲請書真名乃還西城修行道成於是乘飛飆車遊行天下後登白空山詣紫清太素三元君受流金火鈴豁落七元八景飛晨神策玉璽畢又還西城太上遣賜繡羽晨蓋雙珠月明素羽瓊干丹錦旌太素又遣齎成命之書以為太素清虛真人治玉屋山主領寶經乘虎斾虎輦金蓋玉輪八景飛輿杖九色節出入上清受事太素寢宴太極南嶽魏夫人師之撰傳顯於世南嶽魏夫人內傳曰夫人姓魏諱華存字賢安任城人晉司徒文康公魏舒女也少讀老莊春秋三傳五經百子事常別居一園獨立間處服餌胡麻父母逼之強適太保公椽南陽劉幼彥疇昔之志存而不虧後幼彥為修武令隨之縣舍間齋別寢入室百日所期仙靈季冬月夜半四真人來降于室太極真人安度明東華青童君碧海景林真清虛真人王子登於是夫人拜乞長生度世青童君曰此清虛真人者爾之師也當受業焉景林真曰爾應為紫虛元君上真司命封南嶽夫人也夫人謝曰此是婢子有幸賜以性命自陳畢東華小童指而笑曰丹心苦哉於是清虛真人王君乃命侍女華散條李明甕等川披雲蘊開玉笈出太上寶文八經隱書大洞真經靈書八道紫度炎光石精玉馬神真虎文高仙羽玄三十一卷即手授夫人也王君昔學道在陽洛山遇南極夫人西城王君授此三十一卷經行之成真人今所授者是南極西城之本經也陽洛山有洞臺是清虛之別宮也王君當授魏夫人經之時起立北向而誓曰太上三玄九皇高真太帝太帝使教子魏華存於是景林真又授夫人黃庭內景經一名太上琴心一名大帝金書一名東華玉篇令晝夜誦之王君又告曰子若不在山中隱身齋戒則大洞真經不可妄讀也至于虎經龍書八素隱文之屬奇祕玄奧若不齋戒絶世不可施行子今且可誦黃庭內經步躡七元存五星之神而已人間行之亦足感通變化欲成際會我有以相迎矣方諸青童怡然小留四真吟唱乃命北寒玉女宋聯涓彈九氣之璈東華玉女煙景珠擊西盈之鐘雲林玉女賈屈庭吹鳳戾之簫飛玄玉女鮮于靈金拊九合玉節王君乃語夫人曰訣諸要訖乃別去夫人守靜日進在世八十三年以晉成帝咸和九年王君與東華青童來降時歲在甲午二真人與夫人藥題曰隱遷白醫川神散石精金光化形靈丸使稱疾忽行剋期有定俱會陽洛宮言畢二真人去夫人即服藥因稱腳疾閉目寢息飲而不食到七日其夜半之後太一玄仙遣飆車來迎駕氣騁御徑入帷寢其時子弟侍疾衆親滿側莫之覺也夫人遂用藏景之法託形劍化徐登飆輪徑之陽洛居隱元之臺志栖上元誠感九天丹心真契澄神太素夫人遂北詣上清宮太微天帝遣九宮太真侍玉元晨郎李明期授夫人神鳳之章使封山召雲中央黃老君遣正一羽晨侯公陽子明授夫人龍衣虎帶丹青飛裙十絶華幡使川登行上清攝真命仙三素高元君遣左華九成夫人范定英授夫人流金火鈴九蓋之軿使彈制萬魔飛輪太無太上玉晨大道君遣繡衣使者孟六奇授九色之節雙珠月明神虎之符錦旗虎旌使位主群神以威六天太素三元君遣保禁仙都衷文堅右嬪元姬趙約羅授夫人西華玉女三百八景飛輿玄景九龍使侍衛執巾上詣三清扶桑太帝君遣八玄仙伯柯原首五方天帝君簡肅正等授夫人玉札金文位為紫虛元君領上真司命使主諸學道死生圖籍攝御之官關校罪考金關後聖君命仙伯牙叔平授夫人青瓊之板丹緑為文位為南嶽夫人比秩仙公給曲晨飛蓋以遊九宮使治天台大霍山洞臺之中主下訓奉道教授當為真仙者令一月再登玉清三登太素四謁玉晨宮宴扶桑之高臺於是夫人授王母之命且還王屋山小有之中更齋戒三月九微元君龜山王母西城真人王方平太虛真人赤松子桐柏真人王子喬並降小有清虛上宮絳房之中各命侍女金石發響於是西母徘徊起立折腰俯唱曰哀此去留會劫盡天地傾嘉會絳阿內相與樂未央歌畢須臾司命神仙諸隸屬及南嶽神靈迎官並至西母等與夫人同去詣天台霍山臺登真隱訣曰太微天帝金虎符太上玉真保皇道君以授於太上太微天帝君又曰太一有玉璽金真虎符方丈臺昭靈李夫人治方丈臺弟十三朱館中以晉興寧中降楊君曳紫錦衣帶神虎符流金鈴帶青玉色綬有兩侍女年二十許著青綾衣一侍女名隱暉捧赤玉箱二枚青帶絡玉檢文題檢一曰太上章一曰太上文自此後數數來降授書作詩集仙録曰驪山姥不知何代人也李筌好神仙之道常歷名山博棌方術至嵩山石室中得黃帝陰符經本絹素書緘之甚密題云大魏真君二年七月七日道士寇謙之藏之名山用傳同好筌竟不曉其義因入秦至驪山下逢一老母髽髻當頂餘髮半垂弊衣扶杖神狀甚異路傍見遺火燒樹因自語曰火生於木禍發必剋筌聞之前謁曰此黃帝陰符經祕文也母曰吾受此經已三元六周甲子少年從何而得知筌稽首再拜具告得經之所因請問玄義盡得之俄失姥
