body:
  text: 樂部五鼓吹樂樂志曰何承天云鼓吹蓋短簫饒歌軍樂也黃帝使歧伯所作以楊德建武漢曲有朱鷺思悲艾如張上之回擁離戰城南巫嵩上陵將進酒君馬黃芳樹有所思雉子班聖人出上耶臨高臺遠如期石留務成玄雲黃鶴釣竿魏改十二曲為之平戰滎陽獲呂布克官渡舊拜定功平南荊平關中應帝期雍熙太和晉武改為靈芝祥宣受命征遼東景龍飛平玉衡因時運惟庸蜀天序金靈運夏苗畋狄彌田順天道至梁周隋各述本朝功業隨而改之以自揚其勳烈又曰撗吹有雙角即胡樂以從軍也張博望入西涼傳其法於西京初得摩呵兜勒一曲李延年因胡曲更造新聲二十八解晉以來有黃鵠隴頭出閞入閞出塞入塞折楊柳落梅花黃潭子赤枝楊望行人十曲崔豹古今注曰漢樂有黃門鼓吹天子所以宴樂群臣短簫饒歌鼓吹之常亦以賜有功諸侯也唐會要曰大和中太常禮院奏謹按凱樂鼓吹之歌曲也周官大司樂王師大獻捷奏凱樂注云獻功之樂也又司馬之職師有功則凱樂獻于社注云兵樂曰凱司馬法曰得意則凱樂所以示喜也左氏傳載晉文公勝楚振旅凱以入魏晉已來鼓吹曲章多述當時戰功是則歷代獻捷必有凱歌太宗平東都破宋金剛其後蘇定方執賀魯李績平高麗皆備軍容凱歌入京都謹撿貞觀顯慶開元禮書並無儀注今參酌古今備其陳設及奏歌曲之儀如後凡命將征討有大功獻俘馘者其名曰備神策兵衛於東門外如獻俘常儀其凱樂用饒吹二部笛畢簫笳鐃鼓每色二人歌工二十四人樂工等乘馬執樂器次第陳列如鹵薄之式鼓吹令丞前導分行於兵馬俘馘之前將入都門鼓吹振作迭奏破陳樂應聖期賀朝歡君臣同慶樂等四曲破陳樂詞曰受律辭元首相將計叛臣咸歌破敵樂共賞太平人應聖期詞曰聖德期昌運雍熙方寓清乾坤資化育海嶽共休明開土欣耕稼銷戈遂偃兵殊方歌帝澤執贄賀升平賀朝歡詞曰四每皇風被千年德永清戎衣更不著今日告功成君臣同慶樂詞曰主聖開昌曆臣忠奉大猷君看偃革後便是太平秋俟行至太社及太廟門工人下馬陳列於門外據周禮大司樂注云獻於祖大司馬云先凱樂于社謹詳禮儀則社廟之中似合奏樂伏以尊嚴之地鐃吹歡譁既無明文或乖肅敬今請並於外門陳設不奏歌曲俟告獻禮畢復導引奏曲如儀至皇帝所御樓前兵仗旌門外二十步樂工皆下馬徐行前進兵部尚書介胄執鉞於旌門內中路前導周禮師有功則大司馬左執律右秉鉞以先凱樂注曰律所以聽軍聲鉞所以示將威吹律聽聲其術久廢請以秉鉞以存禮文次協律郎二人公服執麾亦於門外分導鼓吹令丞引樂工等至位立定太常卿於樂工之前跪具官臣某奏事諸奏凱樂協律郎學麾鼓吹大振作遍奏破陳樂等四曲樂闋協律郎偃麾太常卿又跪奏樂畢兵部尚書太常卿退樂工等並於門外立訖然後引俘馘入獻及稱賀如別儀晉書曰衛瓘領太子少傳加千兵百騎鼓吹之府又曰汝南王亮母伏太妃常有小疾祓於洛水亮兄弟三人侍從並持節鼓吹震耀洛濱武帝登凌雲臺望見曰伏妃可謂富貴矣又曰劉毅字仲雄轉司隸校尉皇太子朝鼓吹將入東掖門毅以為不敬止於門外奏劾保傅以下詔赦之然後得入又曰謝尚纍位江夏義陽隨三郡太守往咨事安西將軍庾翼於武昌翼呼共射曰君若破的當以鼓吹相賞尚應聲中之翼即以副鼓吹給之王隱晉書曰陶侃平蘇峻除侍中太尉加羽葆鼓吹晉中興書曰漢武時南平百越始置交址九真日南合浦南海鬱林蒼梧凡七郡立交趾剌史以州邊遠山越不賓宜加威重故剌史輒假節七郡皆加鼓吹齊書武帝時壽昌畫殿南閣置白鷺鼓吹二部乾光殿東西頭置鍾磬兩箱皆宴樂處也又曰王敬則臨淮射陽人也僑居晉陵南沙縣母為女巫常謂人云敬則生時胞衣紫色後應得鳴鼓角人笑之曰汝子得為人吹角可矣又曰張敬兒將拜三司謂其妻嫂曰我拜後應開黃閣因口自為鼓吹聲初得鼓吹羞便奏之南史綦母珍之貴幸珍之母隨弟欽之作暨楊令欽之罷縣還珍之迎母至湖孰輒將青氅百人自隨鼓角橫吹都下當人追從者百數又曰桓崇祖初於淮陰見高帝便自比韓白唯上獨許之後為豫州剌史建元二年魏攻壽春崇祖破之啓至上謂朝臣曰崇祖恆自擬韓白今真人也進為都督崇祖聞陳顯達李安人皆增給軍儀乃啓求鼓吹上勑曰韓白何可不與衆異給鼓吹一部又曰張興世致位給事中興世父嘗謂興世曰我雖田舍老公樂聞鼓角汝可送一部竹田時欲吹之興世素恭謹畏法譬之曰此是天子鼓角非田舍公所吹梁典曰高祖衍生秣陵三樓橋宅生日有異光頂有五嶽骨當還宅范雲聞鼓吹之聲蒙被出視乃高祖也雲乃深自結託梁書侯景即位乃以廣抑車載鼓吹橐駝馬負犧牲輦上置筌蹄垂腳坐焉又曰胡僧祐字顯果為天水天門二郡太守性好葺綴文詞又多鄙拙多被戲謔自矜尤甚後隨伐侯景回拜領將軍常以所加鼓部置齋中對之人或獻言此乃羽儀公望隆重不當如此答曰我愛之人莫不笑之陳書劉仲舉字德言為長安令政號廉平陳文帝居鄉里嘗詣仲舉時天降雨仲舉獨坐齋內聞外有簫鼓聲俄而帝至仲舉異之乃深自結託北史爾朱榮少時父新興曾與榮遊池上忽聞簫鼓音謂榮曰古老相傳聞此聲皆至公輔吾年老當為汝耳隋書鼓吹車上施層樓四角金龍銜流蘇羽葆凡鼓吹陸則樓車水則樓船在殿庭則畫筍簴為樓上有翔鷺棲烏或為鵠形又曰蔡徵拜吏部尚書啓後主借鼓吹後主謂所司曰鼓吹軍樂有功乃授蔡徵不自量揆紊我朝章然其父景歷既有締構之功宜且如啓唐書平陽公主葬特給鼓吹太常議婦人無鼓吹高祖曰往者公主於司竹園舉兵應義親執金鼓有克定之功宜特加之又曰中宗時皇后上言自妃主及五品以上母妻請從婚葬之日特進鼓吹宮官亦準此左臺御史唐紹上疏諫曰竊聞鼓吹之作本為軍容昔黃帝涿鹿有功以為警衛故鉦鼓有靈夔孔雀雕鶚爭石墜崖壯士怒之類自昔功臣備禮適得用之假如郊祀天地唯有宮懸而無案架故知軍樂之用尚不給於神祀豈容接於閨閫哉鄧德明南康記曰雩都縣君山絶峰高崿遠望似舟船上有玉臺方廣數丈周回盡是白石柱上自然石覆如屋形風雨之後景氣明淨頗聞山上有鼓吹之聲吳質別傳曰質為北中郎將朝京師喜遲其到詔列鹵簿作鼓吹至闕而止江表傳曰孫策賜周瑜鼓吹為治館舍策令曰周公瑾英俊異才與孤有惣角之好骨肉之分前在丹陽發衆及船糧以濟大事論德酬功此未足報也鄴中記曰石虎正會置三十步鼓吹三十步輒置一部十二人皆在平閣上去地丈餘又有女鼓吹贄虞新禮儀志曰漠魏故事將葬設吉凶鹵簿皆鼓吹新禮以禮吉事無凶事無樂宜除吉鹵簿凶服鼓吹虞按禮葬有客車郎吉駕之明文也徐廣車服注曰中朝公主有鼓吹幽明録曰晉臨川太守謝摛夜中聞鼓吹聲兄澡曰夜者陰間不及存將在身後及死贈長水校尉加鼓吹世説曰三都二京五經鼓吹俗説曰桓公作詩思不來輒作鼓吹既而得思云鳴鵠響長阜歡曰鼓吹固自來人思語林曰陸士衡為河北督日已被間搆內懷憂悶聞衆軍警角鼓吹曰我今聞此不如華亭鵠戾魏武帝令曰孤所以能常以少兵敵衆者常念增戰士忽餘事是以往者有鼓吹而使步行為戰士愛馬也不樂多署吏為戰士愛糧也王渾表曰吳國臨戰牙門將張秦黃辰騎督綦母倪勇揵效武破賊制勝此三人之所致也秦辰已亡今倪獨在昔伐蜀有小戰功牙門數人便加鼓吹至於滅吳一國而有未得鼓吹者臣愚昧謂聖詔賜倪鼓吹存録猛將以盡武人之力也陸機鼓吹賦曰原鼓吹之所始蓋稟命於黃軒四夷樂毛詩谷風鼓鍾曰以雅以南以籥不僣為雅為南舞四夷之樂大德德廣所及也東夷之樂曰昧北夷之樂曰禁西夷之樂曰離南夷之樂曰任以為籥舞若是和而不僣矣周禮春官鞮鞻曰鞮氏掌四夷之樂與其歌聲又曰旄人掌散樂舞夷樂夷樂四夷之樂散樂野人為之善者又曰春官𩎟師曰𩎟師掌教𩎟樂祭祀則帥其屬而儛之舞東夷之舞也周禮春官鞮鞻掌四夷之樂鄭玄注曰東方曰昧南方曰任西方曰朱離北方曰禁禮記明堂位曰昧東夷之樂也任南蠻之樂也納蠻夷之樂於太廟言廣魯於天下也後漢書曰永寧初年西南夷禪國王獻樂及幼人明年元會作之於庭安帝與群臣共大奇之又曰陳禪字紀山為諫議大夫西南禪國王獻樂及幼人能吐火自支解易牛馬頭大會作之庭禪離席舉手曰帝王之庭不宜作夷狄之樂五經通義曰東夷之樂持矛舞助時之生南夷之樂持羽舞助時之養又舞四夷之樂明澤廣被四表也東夷之樂曰侏離南夷之樂曰任西夷之樂曰禁北夷之樂曰昧東方所謂侏離者何陽始通萬物之屬離地而生故謂之侏離南方所以謂任者何陽氣盛用事萬物懷任故謂之任西方所以謂之禁者何西方陰氣用事禁止萬物不得長大故謂之禁北方所以謂之昧者何北方陰氣盛用萬物暗昧不見故謂之昧四夷之樂何以作之於廟陳於戶王子年拾遺記曰成王之時南垂之南有扶婁夷國或於掌中備百蓋之樂婉轉屈曲於指間人形或長數分神怪歙忽樂府傳此末代猶在焉風土記曰越俗飲宴即鼓拌以為樂取大素圜柈以廣尺五六者抱以著腹以右手五指更彈之以為節舞者蹀地擊掌以應柈節而舞樂部樂志曰龜茲起自呂光滅龜茲因得其聲樂記有豎箜篌琵琶五絃笙笛簫觱篥毛圓鼓都答臘鼓腰鼓羯鼓溪婁鼓銅拔貝等十五種為一部工二十人歌曲有善善摩尼解曲娑伽兒舞曲小天踈勒監天笁起自張重華據涼州重四譯來貢樂器鳳首箜篌琵琶五絃笛銅鼓毛圓都曇銅拔貝等九種為一部工十二人歌曲有沙石強舞曲有文曲康國起自周閔帝娉北狄為后得其所獲西戎伎因得其聲集器有笛正鼓加鼓銅拔等四種為一部工七人歌曲有三殿農和去舞曲有賀蘭體鼻始末奚波地疏勒安國高麗並起後魏平馮氏通西域因得其伎繁會其聲踈勒樂器有豎箜篌琵琶五絃笛簫觱篥答臘鼓腰鼓羯鼓溪婁鼓十種為一部工十二人歌曲有元利死讓樂舞曲有遠服解曲有鹽曲安國樂器箜篌琵琶五絃笛簫雙觱篥正鼓和銅拔等簫小觱篥桃皮觱篥腰鼓齊鼓簷鼓貝等十四種為一部工十八人歌曲有歌芝栖舞曲有舞芝栖北狄樂皆馬上樂也鼓吹本軍旅之音馬上奏之故自漢以來北狄樂揔歸鼓吹署後魏樂府始有北歌即魏史所謂真人歌是也代都時命掖庭宮女晨夕歌之周隋代興西涼樂雜奏今存者五十三章其名因可解者六章慕容可汗吐谷渾部落稽巨鹿公主白淨王太子企俞也其餘不可解或可汗之詞按今大角即後魏代箕邏逈是也其曲亦多可汗之詞北虜之俗皆呼主為可汗吐谷渾又慕容別種知此歌是燕魏之際鮮卑歌詞虜音不可曉梁有巨鹿公主歌似是姚萇時歌詞華音與此歌不同梁樂府鼓改又有大白淨皇太子小白淨皇太子企俞等曲隋鼓吹有白淨王太子曲與北歌校之其音皆異唐書樂志曰安樂後周武帝平齊所作也行列方正象城郭周代謂之城舞者八十人刻木為面狗喙獸耳以金飾之垂線為髮畫襖皮帽舞蹈姿制作猶羌胡狀唐會要曰驃國樂貞元十八年正月驃國王來獻凡一十二曲以樂工三十五人來朝樂曲皆演釋氏經綸之詞驃國在雲南西南以天笁國相近故樂多演釋氏之詞每為曲皆齊聲唱各以兩手十指齊斂為赴節之狀一低一仰未嘗不相對有類中國柘枝舞驃一作僄其西別有彌臣國樂舞亦與驃國同子習比伎以樂后制使袁滋郗土美至南詔並皆見此樂唐會要曰南詔樂貞元十六年正月南詔異牟等作奉聖樂舞因西川押雲南八國使韋皋以進時御麟德殿以閲之又曰高昌樂西魏與高昌通始有此樂至隋開皇六年來獻聖明樂曲至太宗朝伐其國盡得其樂事見十部伎門也又曰扶南天笁二國樂隋代全用天笁列於樂部不用扶南因煬帝平林邑國獲扶南工人及其匏琴朴陋不可用但以天笁樂轉寫其聲又曰龜茲樂自呂光破龜茲得其聲呂氏云其樂分散至後魏有中原復獲之至隋有西國龜茲之號凡三部開元中大盛於時曹婆羅門者纍代相承傳其業至孫妙達尤為北齊文宣愛之每彈常自擊胡鼓和之及周武帝娉突厥女為后西域諸國皆來媵遂荐有龜茲踈勒康國安國之樂又曰百濟貞觀中滅二國盡得其樂至天后時高麗樂猶二十五曲貞元末唯能習一曲衣服亦漸變其土風矣其百濟至中宗時工人死散開元中歧王範為太常卿復奏置焉又曰踈勒樂工人皂絲布頭巾白絲布袍錦𥘞褾白絲布袴舞二人白襖錦袖赤皮靴赤皮帶樂用豎箜篌琵琶五絃琵琶橫笛簫觱篥答臘鼓腰鼓雞樓鼓康國樂工人皂絲布頭巾緋布袍錦領舞二人緋襖錦袖緑綾淩渾襠褲赤皮鞾白袴帑舞急轉如風俗之胡旋乞寒者本西國外蕃之樂也神龍二年三月并州清源縣尉呂無泰上曰臣謹按洪範八政曰謀時寒若能謀事則時寒順之何必倮露形體澆灌衢路鼓舞跳躍而索寒也禮曰立秋之月行夏令寒暑不節陰陽不調政令之失也休咎之應君臣之感也理均影響可不戒哉至景雲二年左拾遺朝曰宗諫傳曰辛有適伊川見被髮於野祭者曰不及百年此其戎乎其禮先亡矣後秦晉遷陸渾之戎於伊川以其中國之人習戎狄之事一言以貫百代可知今之乞寒濫觴胡俗伏願三思籌其所至先天二年十月中書令張説諫曰韓宣適魯見周禮而歎孔子會齊數倡優之罪列國如此況天朝乎今外國請和選使朝謁所望接以禮樂示以兵威雖曰戎狄不可輕易焉知無駒支之辨由余之賢哉且乞寒潑胡未聞典故倮體跳足盛德何觀揮水投泥失容斯甚法殊魯禮襲比齊優恐非干羽柔遠之義樽俎折衝之道願擇芻言特罷此戲至開元元年十二月勑臘月乞塞外蕃所出漸浸成俗因循已久自今已後無問蕃漢即宜禁斷樂府雜録曰舞有骨鹿舞胡旋俱於一小圓毯子上舞縱橫騰擲兩足終不離於毯上其妙若皆夷舞也
