body:
  text: 皇王部二十二西晉惠皇帝晉書曰孝惠帝諱衷字正度武帝第二子也太始三年立為皇太子時年九歲太熙元年四月已酉武帝崩是日太子即皇帝位大赦改元為永熙尊皇后楊氏曰皇太后立妃賈氏為后以太尉楊駿為太傅輔政秋八月壬午立廣陵王遹音韋為皇太子以中書監何劭為太子太師吏部尚書王戎為太子太傅永平元年春正月詔改永熙二年為永平元年又詔子弟及群官並不得謁陵三月辛卯誅太傅楊駿駿弟衛將軍瑤太子太保濟中護軍張劭散騎常侍假廣楊邈左軍劉禎河南尹李斌中書令蔣俊東夷校尉文淑尚書武茂皆夷三族壬辰大赦賈后矯詔廢皇太后為庶人徙于金墉城告于天地宗廟誅太后母龐氏壬寅徵大司馬汝南王高為太宰太保衛瓘輔政六月賈后矯詔使楚王瑋音偉殺太宰汝南王亮太保菑陽公衛瓘乙丑以瑋擅害亮瓘殺之九月辛丑徵征西大將軍梁王彤為衛將軍録尚書事以趙王倫為征西大將軍都督雍梁二州諸軍事三年春二月已酉賈后弒皇太后于金墉城五年冬十月武庫火焚纍代之寶十二月景戍新作武庫大調兵器六年八月秦雍氏羌悉叛推氐羌帥齊萬年僣號稱帝圍于涇陽七年春正月癸丑周處及齊萬年戰於六陌王師敗績處死之九年春正月左積弩將軍孟觀伐氐戰于中亭大破之獲齊萬年徵征西大將軍梁王彤録尚書事以北中郎將河間王顒為鎮西將軍鎮關中放都王穎為鎮北大將軍鎮鄴十二月壬戍廢皇太子遹為庶人及其三子幽于金墉城殺太子之母謝氏永康元年正月大赦改元三月癸未賈后矯詔害庶人遹于許昌夏四月辛卯日有食之癸已梁王彤趙王倫矯詔廢賈后為庶人司空張華尚書僕射裴顧音隗文毀切皆遇害侍中賈謐及黨與數十人皆伏誅甲午倫矯詔大赦自為相國都督中外諸軍如宣帝輔魏故事追復故皇太子位丁酉以梁王彤為太宰已亥趙王倫矯詔害賈庶人于金墉城五月已已立皇孫臧為太孫秋八月淮南王允舉兵討趙王倫不剋允及其二子秦王郁漢王迪皆遇害永寧元年春正月乙丑趙王倫纂帝位景寅遷帝于金墉城號曰太上皇改金墉曰永昌宮廢皇太孫臧為濮陽王五星經天縱橫無常癸酉倫害濮陽王臧三月平東將軍齊王冏俱永切起兵以討倫傳檄州郡屯于陽瞿征北大將軍成都王穎征西大將軍河澗王顒常山王乂豫州刺史李毅兗州刺史王彥南中郎將新野公歆皆舉兵應之衆數十萬倫遣其將閭和出伊闕張泓孫輔出堮坂以拒冏孫會士猗許超出黃橋以拒穎及穎將趙驤石超戰於沮音蛆水會等大敗棄軍走四月辛酉左衛將軍王輿尚書淮南王漼七隗反勒兵入宮擒倫黨孫秀孫會許超士猗於離反駱休等皆斬之逐倫歸第即日乘輿反正群臣頓首謝罪帝曰非諸卿之過也詔大赦改元誅趙王倫義陽王威九門侯質等及倫之黨與五月立襄陽王尚為皇太孫六月戊辰大赦增吏位二等庚午東萊王蕤左衛將軍王輿謀廢齊王冏事泄廢蕤為庶人輿伏誅夷三族甲戍以齊王冏為大司馬都督中外諸軍事成都王穎為大將軍録尚書事河間王顒為太尉罷承相復置司徒官太安元年五月癸卯以清河王遐子覃為皇太子賜孤寡帛大酺音甫五日以齊王冏為太師東海王越為司空秋七月兗豫徐冀等四州大水冬十月地震十二月丁卯河間王顒表齊王冏窺伺神器有無君之心與成都王穎新野王歆范陽王虓許交切同會洛陽請廢冏還第長沙王乂奉乘輿屯南上東門攻冏殺之幽其諸子于金墉城廢冏弟北海王實大赦改元以長沙王乂為太尉都督中外諸軍事二年七月中書令卞粹侍中馮蓀河南尹李含等二於長沙王爻疑而害之八月河澗王顒成都王穎舉兵討長沙王乂帝以乂為大都督帥軍禦之庚申劉引及張昌戰於清水斬之顒遣其將張方穎遣其將陸機牽秀石超等來逼京師乙丑帝幸十三里橋遣將軍皇甫商拒方於宜陽己巳帝旋軍于宣武場庚午舍于石樓天中裂無雲而雷九月丁丑帝次于河橋壬午皇甫商為張方所敗甲申帝軍于芒山丁亥幸偃師辛卯舍于豆田癸巳帝旋于城東景申進軍緱氏擊牽秀走之大赦張方入京城燒清明開陽二門死者萬計石超逼乘輿于緱氏冬十月壬寅帝旋于宮石超焚緱氏服御無遺丁未破牽秀范陽王虓于東陽門外戊申破陸機于建春門石超斬其大將軍賈崇等十六人懸首銅駝街張方退屯十三里橋十一月辛巳星晝隕聲如雷王師攻方壘不利方決千金堰水碓皆涸音鶴乃發王公奴婢手舂給兵廩一品已下不從征者男子十三已上皆從役又發奴助兵號為四部司馬公私窮踧子六反米石萬錢詔命所至一城而已壬寅夜赤氣竟天隱隱有聲景辰地震癸亥東海王越執長沙王乂幽於金墉城尋為張方所害甲子大赦永興元年春正月成都王穎自鄴諷于帝乃大赦改元為永安帝逼於河間王顒密詔雍州刺史劉沉秦州刺史皇甫重以討之沉舉兵攻長安為顒所敗張方大掠洛中還長安於是軍中大餧人相食以成都王穎為丞相穎遣從事中郎成夔等以兵五萬屯十二城門殿中宿所忌者穎皆殺之以三部兵代宿衛二月乙酉廢皇后羊氏幽于金墉城黜皇太子覃復為清河王三月河間王顒表請立成都王穎為太弟戊申詔曰朕以不德纂承鴻緒于茲十有五載禍亂滔天奸逆仍起至乃幽廢重宮宗廟幾絶成都王穎溫仁惠和剋平暴亂其以穎為皇太弟都督中外諸軍事丞相如故秋七月景申朔右衛將軍陳眕音軫詔召百寮入殿中因勒兵討成都王穎戊戍大赦復皇后羊氏及皇太子覃己亥司徒王戎東海王越高密王簡平昌公摸吳王晏豫章王熾襄陽王範右僕射荀藩等奉帝北征至安陽衆二十餘萬穎遣其將石超拒戰己未六軍敗績於湯陰矢及乘輿百官分散侍中嵇紹死之帝傷頰中三矢亡六璽帝遂幸超軍餒甚超進水左右奉秋桃超遣第熙奉帝之鄴穎帥群官迎謁道左帝下輿涕泣其夕幸于穎府有九錫之儀陳留王送貂蟬文鶡尾明日乃備法駕幸于鄴唯豫章王熾司徒王戎僕射荀藩從庚申大赦改為建武八月戊辰穎殺東安王繇張方復入洛陽廢皇后羊氏及皇太子覃胸奴左賢王劉元海反於離石自號大單于安北將軍王俊遣烏丸騎攻成都王穎于鄴大敗之穎與帝單車走洛陽御服分散倉卒上下無齎侍中黃門被囊中齎齊私錢三千詔貸用所在買飯食以供宮人止食於道中客舍宮人有持升餘粇米飯燥及蒜鹽監豉以進帝帝噉音啖之御中黃門布被次獲嘉市粗米飯盛以瓦孟帝噉兩盂有老父獻蒸雞帝受之至溫將謁陵帝喪履納從者之履下拜流涕左右皆歔欷及濟河張方帥騎三千以陽燧青蓋車奉迎方拜謁帝躬止之辛巳大赦賞從者有差冬十一月乙未方請帝謁陵因劫帝幸長安以所乘車入殿中帝馳避後園竹中方逼帝升車左右中黃門鼓吹十二人步從唯中書監盧志侍側方以帝幸其壘帝令具載宮人寶物軍人因略妻後宮分爭府藏魏晉來所積之物掃地無遺矣行次新安寒甚帝墮馬傷足尚書高光奉進面衣帝嘉之河間王顒帥官屬步騎三萬迎于灞上顒前拜帝下車止之以征西府為宮唯僕射荀藩司隸劉暾他昆反太常鄭球音求河南尹周馥音服復與其遺官在洛陽為留臺承制行事號為東西臺焉景午留臺大赦改元復為永安辛丑復皇后羊氏李雄僣號成都王劉元海僣號漢王十二月丁亥詔曰天禍晉邦家嗣莫繼成都王穎自在儲二政績虧損四海失望不可承重器其以王還第豫章王熾先帝愛子令問日新四海注意今以為皇太弟以隆我晉邦以司空越為太傅與太宰顒夾輔朕躬司徒王戎參録朝政光祿大夫王衍為尚書左僕射百官皆復職齊王冏前應還第長沙王乂輕陷重刑封其子紹為樂平縣王以奉其嗣自須項戎車屢征勞費人力供御之物皆減三分之二戶調田租三分減一蠲除苛政愛人務本清通之後當還東京大赦改元以河間王顒都督中外諸軍事二年春正月甲午朔帝在長安夏四月景子張方廢皇后羊氏七月東海王越嚴兵徐方將西迎大駕成都王穎部將公帥藩等聚衆攻陷郡縣害陽平太守李志汲郡太守張延等轉攻鄴平昌公模遣將軍趙驤擊破之九月壬子以成都王穎為鎮軍大將軍都督河北諸軍事鎮鄴河間王顒遣將軍呂朗屯洛陽冬十月景子詔曰得豫州刺史劉喬檄稱穎川太守劉輿迫脅驃騎將軍虓拒逆詔命造構凶逆擅劫郡縣合聚兵衆擅用荀晞為兗州斷截王命鎮南大將軍荊州刺史劉𢎪平南將軍彭城王釋等各勒所統徑會許昌與喬并力今遣右將軍張方為大都督統精卒十萬建武將軍呂朗廣武將軍騫貙勑俱反建威將軍刀默等為軍前鋒共會許昌除輿兄第丁丑使前車騎將軍石超北中郎將王闡討輿等赤氣見于北方東西竟天有星孛于北斗平昌公模遣將軍宋胄等屯河橋十一月立節將軍周權詐被檄自稱平西將軍復皇后羊氏洛陽令何橋攻權殺之復廢皇后十二月呂朗等東屯榮陽成都王穎進據洛陽張方劉𢎪等並按兵不能禦范陽王虓濟自官渡拔榮陽石超襲許昌破劉喬於肅喬奔南陽右將軍陳敏舉兵反自號楚公矯稱被中詔從沔漢奉迎天子逐楊州刺史劉機丹陽太守王曠光熙元年春正月戊子朔日有蝕之帝在長安河間王顒聞劉喬破大懼遂殺張方請和於東海王越越不聽宋胄等破穎將婁裒進逼洛陽穎奔長安甲子越遣其將祁弘宋胄司馬纂等迎帝己亥弘等奉帝還洛陽乘牛車行宮藉草公卿跋涉六月景辰朔至自長安升舊殿哀戚流涕謁于大廟復皇后羊氏辛未大赦改元八月以太尉東海王越録尚書事驃騎將軍范陽王虓為司空九月頓丘太守馮嵩執成都王穎送之于鄴冬十月司空范陽王虓薨長史劉輿害成都王穎十一月庚午帝崩于顯陽殿在位十六年時年四十八葬太陽陵帝之為太子也朝廷咸知不堪政事衛瓘常侍宴撫武帝所坐床曰可惜此坐和嶠亦以為言曰皇太子有淳古風而季代多僞恐不了升下家事武帝默然不答後武帝欲廢太子楊后曰立嫡以長不以賢豈可動乎太子遂定及居大位政出群下紀綱大壞貨賂公行天下為之市賈焉帝又嘗幸華林園聞蛙聲謂左右曰此鳴者為官乎為私乎或對曰在官地者為官在私地者為私及天下荒亂百姓餒甚帝曰何不食肉糜其蒙蔽皆此類也王隱晉書曰高堂隆剋鄴宮屋材云後若干年當有天子居此宮惠帝止鄴宮治屋者土剝更泥始見刻字計年正合趙王倫晉書曰趙王倫字子彝宣帝弟九子也母曰柏夫人魏嘉平初封安樂亭侯五等建改封東安子拜諫議大夫武帝受封琅琊郡王元康初遷征西將軍開府儀同三司鎮關中倫刑賞失中氐音低羌反叛徵還京師尋拜車騎將軍太子太傅深交賈郭諂事中宮大為賈后所親信求録尚書張華裴頠固執不可又求尚書令華頠復不許敏懷太子之廢也使倫領右軍將軍時左衛司馬督司馬雅及常從督許超並常給事東宮二人傷太子無罪與殿中中郎士猗節謀廢賈后復太子以華頠不可移難與圖權倫執兵之要性貪冒可假以濟事乃說倫嬖人孫秀曰中宮凶妒音蠹無道與賈謐等共廢太子今國無適嗣社稷將危大臣將起大事而公名奉中宮與賈郭親善太子之廢皆云預知一朝事起禍必相及何不先謀之乎秀許諾言於倫倫納焉事將起而秀知太子聰明若還東宮將與賢人圖政量已必不得志更說倫曰太子剛猛不可私請明公素事賈后時議皆以公為賈氏之黨今雖欲建大功於太子太子含宿怒必不加賞於明公矣當謂逼百姓之望翻覆以免罪耳此乃所以速禍也今且緩其事賈后必害大子然後廢后為太子報讎亦足以立功豈徒免禍而已倫從之秀乃微泄其謀使謐黨頗聞之倫秀因勸謐等早害太子以絶衆望太子既過害倫秀之謀益甚而超雅懼後難欲悔其謀乃辭疾秀復告右衛佽飛督閭和和從之期四月三日景夜一籌以鼓聲為應至期乃矯詔勑三部司馬曰中宮與賈謐等殺害太子今使車騎入廢中宮汝等皆當從命賜爵關中侯不從誅三族於是衆皆從之倫又矯詔開門夜入陳兵道南遣翊軍校尉齊王同將三部司馬百人排閣入華林令駱休為內應迎帝幸東堂遂廢賈后為庶人幽之于建始殿中書監侍中黃門侍郎八座皆夜入殿執張華裴顧解紹杜斌等於殿前殺之尚書始疑詔有詐郎師景露板奏請手詔倫等以為沮衆斬之以殉明日倫坐端門屯兵北向遣尚書和郁送賈庶人于金墉尋矯詔自為使持節大都督中外諸軍事相國侍中王如故一依宣文輔魏故事以其世子散騎常侍拲音拱領冗從僕射子馥前將軍封濟陽王虔黃門郎封汝陰王詡況羽反散騎侍郎霸城侯孫秀等皆封大郡並據兵權文武官侯封者數千人百官總已聽於倫倫素庸下無智策復受帛於秀秀之威權振於朝廷天下皆事秀而無求於倫秀起自琅琊小吏纍官於趙國以諂媚自達既執機衡遂恣其姦謀多殺忠良以逞私憾前衛尉石崇黃門郎潘嶽皆與秀有嫌並見誅於是京邑君子不樂其生矣淮南王允齊王冏以倫秀驕僣內懷不平秀等亦深忌焉乃出冏鎮許奪允護軍允發起兵討倫允既敗滅倫加九錫增封五萬戶倫無學不知書秀亦以狡黠胡八反小才貪淫昧利所共立事者皆邪佞之徒唯競榮利無深謀遠略倫秀並惑巫鬼聽妖邪之說秀使牙門趙奉詐為宣帝神語令倫早入西宮又言宣帝於北邙為趙王佐助於是別立宣帝廟於邙山謂逆謀可成秀等部分諸軍分布腹心使散騎常侍義陽王威兼侍中出納詔命矯作禪讓之詔使持節尚書令滿奮僕射崔隨為副奉皇帝璽綬以禪位于倫倫僞讓不受於是宗室諸王群公卿士咸假稱符瑞天文以勸進倫乃許之左衛王與前軍司馬雅等率甲士入殿譬諭三部司馬示以威賞皆莫敢違其夜使張林等屯守諸門義陽王威及駱休逼奪天子璽綬夜漏未盡內外百官以乘輿法駕迎倫惠帝乘雲母車鹵簿數百人自華林西門出居金墉城尚書和郁兼侍中散騎常侍琅琅耶王睿中書侍郎陸機從到城下而反使張衡衛帝實幽之也倫從兵五千人自端門登太殿滿奮崔隨樂廣進璽綬於倫乃僣即帝位大赦改元建始諸黨皆登卿將並列大封其餘同謀者咸超階越次不可勝紀至于奴卒廝役亦加以爵位每朝會貂蟬盈坐時人為之諺曰貂不足狗尾續而以茍且之惠取悅人情府庫之儲不充於賜金銀冶鑄不給於印故有白板之侯君子恥服其章百姓亦知其不終矣倫親祠太廟還遇大風飄折麾蓋孫秀既立非常之事倫敬重焉秀任文帝為相國時所居內府事無巨細必咨而行倫之詔令秀改革有所與奪自書青紙為詔或朝令夕改者數四百官轉易如流矣時齊王冏河間王顒成都王穎並擁強兵各據一方秀知冏等必有異圖乃選親黨及倫故吏為三王參佐及郡守秀本異與張林有隙雖外相推崇內實忌之及林為衛將軍深怨不得開府潛與拲箋具說秀專權動違衆心而功臣皆小人撓亂朝廷可一時誅之拲以書白倫倫以示秀秀勸倫誅林倫請宗室會於華林園召林秀及王輿入因收林殺之誅三族及三王起兵討倫檄至倫秀始大懼遣其中堅孫輔為上將軍督諸軍以拒義師倫復受太子詹事劉琨節督河北將軍率步騎千人催諸軍與義軍戰于激水大敗退保河上劉琨燒斷河橋自義兵之起百官將士咸欲誅倫秀以謝天下秀知衆怒難犯不敢出省及聞河北軍悉敗憂悶音悶不知所為義陽王威勸秀至尚書省與八座議征戰之備秀從之使京城四品以下子弟十五以上皆詣司隸從倫出戰內外諸軍悉欲劫殺秀秀懼自崇禮闥走還下舍衛將軍趙泉斬秀等以徇使倫為詔曰吾為孫秀等所誤以怒三王今已誅秀其迎太上復位吾歸老于農畝傳詔以騶音鄒虞幡勑將士解兵文武官皆奔走莫敢有居者黃門將倫自華林東門出及拲皆還汶陽里弟於是以甲士數千迎天子于金墉百姓咸稱萬歲帝自端門入升殿御廣室送倫及拲付金墉城梁王彤表倫父子凶逆宜伏誅百官會議于朝堂皆如彤表遣尚書袁敞持節賜倫死飲以金屑苦酒倫慚以巾覆面曰孫秀誤我於是收拲馥虔詡付廷尉獄考竟百官是倫所用者皆斥免之臺省府衛僅有存者自兵興六十餘日戰及殺害近十萬人
