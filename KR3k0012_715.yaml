body:
  text: 服用部十六梳篦說文曰櫛梳枇惣名也釋名曰梳言其齒䟽也枇言其細相枇也禮記曲禮上曰男女不同巾櫛又玉藻曰櫛用樿櫛髮晞用象櫛左傳僖公中曰晉太子圉為質於秦將逃歸謂羸氏曰與子歸乎對曰寡君之使婢子侍執巾櫛以固子也從子而歸棄君命也不敢從亦不敢言漢書曰孝文帝遺匈奴檽袍梳枇各一也續漢書曰季文德素善延篤謂公卿曰延篤有王佐之才欲引進之篤聞為書止文德曰吾常昧爽櫛梳坐於客堂朝則誦虞夏之書歷公旦之典禮覽仲尼之春秋當此之時不知天之為蓋地之為輿慎勿迷其本棄其生也魏志曰徐季龍取十三種物著大篋中使管輅占之輅先說雞子後道蠶蛹遂一一名之唯以梳為枇耳脩復山陵故事曰梓宮用象牙梳五枚後梓宮物象牙梳六枚瑇瑁梳六枚東宮舊事曰太子納妃有瑇梳三枚盛弘之荊州記曰臨賀興安縣東邊有平石其上有櫛履各一具俗云越王渡溪脫履墜櫛於此崔寔政論曰無賞罰而欲世之治是猶不畜梳枇而欲髮之治物理論曰威行法明漏吞舟之魚法之不明則數於細櫛細櫛則苛慝生也夢書曰夢梳枇為憂解也虱盡去百病愈傅咸櫛賦敘曰夫才之治世猶櫛之理髮涂岑詩曰思見君巾櫛以弭我勞慚蔡邕女誡曰用櫛則思其心之理高文惠與婦書曰今致瑇瑁梳一枚陸雲與兄機書曰按行視曹公器物梳枇皆在四愁詩曰美人遺我旃檀梳晉傅咸櫛賦曰我嘉茲櫛惡亂好理一髮不順實以為恥雖日用而匪懈不告勞而自已茍以理而委任期竭力以沒齒刷說文曰荔草似蒲而小根可作刷通俗文曰所以理髮謂之刷釋名曰刷帥也帥髮長短皆令上從也東宮舊事曰太子納妃有七豬𣯛刷嵇康養生論曰勁刷理髮僅乃得之陸雲與機書曰按行視曹公器物刷贓處尚識鑷釋名曰鑷攝也攝取髮也通俗文曰披減鬚鬢謂之鑷說文曰作籋曰籋箱也洞林曰卷縣令施安上懷鑷令郭璞射之璞曰此是鏡物有兩歧沈約宋書曰彭城王義康餉沈熙光銅鑷脩復山陵故事曰梓宮中用鐵鏤鑷五枚臨海水土記曰鑷魚長七寸頭如鑷齊書曰高祖恒令左右拔白髮隆昌王高祖之孫年五歲戲於床前帝曰兒言我是誰荅曰太翁帝曰豈有為人曾祖拔白髮乎即擲去鏡鑷觿說文曰觿角銳端可以解結毛詩淇澳曰芄蘭之支童子佩觿芄蘭草觿所以解結禮記內則曰子事父母左佩小觿金燧右佩大觿木燧剔齒纖陸雲與兄機書曰一日行曹公器物有剔齒纖今以一枚寄兄
