body:
  text: 皇親部八蜀劉備甘后蜀志曰先主甘皇后沛人産後主值曹公軍至追先主於當陽長坂于時困逼棄后及後主賴趙雲保護得免於難后卒追諡皇思夫人遷葬於蜀未至而先主殂殞丞相亮上言皇思夫人宜號昭烈皇后與大行皇帝合葬制曰可穆后蜀志曰先主穆皇后陳留人也兄吳一素與劉焉有舊是以舉家隨焉入蜀焉有異志而聞善相者使相后云當大貴焉時將子瑁自隨遂為瑁納后瑁死寡居先主既定益州而孫夫人還吳群下勸先主聘后先主疑於與瑁同族法正進曰論其親踈何與晉文之於子圉乎於是納后延熙八年薨合葬惠陵劉禪張后蜀志曰後主敬哀皇后車騎將軍張飛長女章武元年納為太子妃建興元年立為皇后小張后蜀志曰後主小張皇后飛小女隨後主遷于洛陽吳孫堅吳后吳志曰孫堅吳夫人權之母也本吳人徙錢塘早失父母與弟居孫堅聞其才貌欲娶之吳氏親戚嫌堅輕狡將距焉堅甚慚恨夫人謂親戚曰何愛一女以取禍乎如有不遇命也於是遂許為婚生四男一女及權少年統業夫人助理國政甚有補益建安七年臨薨引見張昭等囑以後事孫權步后吳志曰吳主權步夫人臨淮淮陰人也以美麗得幸於權寵冠後宮夫人性不嫉妬多所推進故久見愛權為王及帝意欲以為后群臣議在徐氏權依違者十餘年然宮內皆稱皇后親戚上疏稱中宮及薨臣下緣權旨請追正名號乃贈皇后印綬二王后吳志曰吳主權一土夫人琅琊人也夫人以選入宮得幸生孫和權將立為后而全公主素憎夫人數加譖毀及權寢疾言有喜色由是權深責怒以憂死吳志曰吳主權王夫人南陽人也生孫休及和為太子和母貴諸姬有寵者皆出居外夫人出在公安卒因葬焉休即位遣使追尊曰敬懷皇后改葬敬陵潘后吳志曰吳主權潘夫人會稽句章人父為吏坐死夫人與姊俱輸織室權見而異之召充後宮得幸有身夢有以龍頭授己者己以蔽膝受之遂生孫亮夫人為皇后性妬媚容自始至卒譖害甚衆權不豫夫人使問中書令張昭呂后專制故事侍疾疲勞因以羸病諸人伺其昏臥共縊殺之託言中惡後事泄坐死者六七十人權尋薨合葬蔣陵謝妃吳志曰吳主權謝夫人會稽山陰人也權聘以為妃愛幸有寵後權納姑孫徐氏欲令謝下之謝不肯由是失寵早卒徐妃吳志曰吳主權徐夫人吳郡富春人也初適同郡陸尚尚卒權娉以為妃使母養子登後權以夫人妬忌廢之以疾卒孫亮全后吳志曰孫亮全夫人全尚女也立為皇后孫綝廢亮為會稽王隨亮之國吳録曰亮妻惠解有容色吳平乃歸永寧中卒孫休朱后吳志曰孫休朱夫人朱據女孫綝廢亮休立夫人為皇后休卒群臣尊夫人為皇太后孫皓即位月餘貶為景皇后稱安定宮孫皓母何太后吳志曰孫和何姬丹陽句容人也父遂本騎士孫權嘗遊幸諸營而何姬觀於道中權望見異之命宦者召入以賜子和生男權喜名之曰彭祖彭祖即皓也後徙和居新都遣使賜嫡妃張氏自殺何姬曰若皆從死誰當養孤遂撫育皓及其王弟皓即位尊和為昭獻皇帝何姬為昭獻皇后月餘進為皇太后焉孫皓滕后吳志曰孫皓滕夫人故太常胤之族女也胤夷滅夫人父牧以踈遠徙邊郡孫休即位大赦得還以牧為五官中郎皓既封烏程侯娉牧女為妃皓即位為皇后封牧高密侯拜衛將軍録尚書事時人以牧尊戚頗推令諫爭而夫人寵漸衰皓滋不悅皓母何恆左右之又太史言於運歷中后不可易皓信巫覡故得不廢常供養升平宮長秋官僚備員而已受朝賀表疏如故皓內諸寵姬佩皇后璽蔽者多矣天紀四年隨皓遷于洛陽前趙劉淵母呼延妃崔鴻三十國春秋前趙録曰左賢王妃呼延氏魏嘉平中祈子於龍門俄而一大白魚頭有二角軒髯躍鱗於龍門而至於祭所久之乃去巫覡皆異之曰此嘉祥也其夜夢旦所見魚變為人左手把一物大如半雞子光影非常授延氏曰此是日精服之生貴子自是十三月而生淵劉淵張后崔鴻三十國春秋前趙録曰劉淵皇后張氏夢日入懷寤而告淵淵曰吉徵也慎勿言之自是十五月生聰劉聰呼延后崔鴻三十國春秋前趙録曰劉聰皇后呼延氏淵后之從父妹有美色恭孝稱於宗族淵后愛聰姿貌故以配焉每謂聰曰父終子紹古今之大典陛下自承高祖之嗣太弟何為者哉陛下百年後粲兄弟必無種也願陛下深思之聰亦信之曰然吾當為計后曰事留變生太弟見粲兄弟並大必有不安之志矣或有小人構間其中未必不禍發于今日妾常聞陛下說魯隱公事一何相似竊為陛下寒心聰深然其言於是相圖之計起矣大劉后崔鴻三十國春秋前趙録曰劉聰皇后劉氏殷長女也字麗芳以左貴嬪立為皇后聰將起𪃫儀殿廷尉陳元達諫聰大怒將斬之后時在後堂聞而密遣中常侍勑左右停刑於是手疏啓曰伏聞勑旨將為妾營殿今四海未一禍難猶繁廷尉之言社稷之計當賞以美爵而反欲誅之陛下此怒由妾而起廷尉之禍由妾而招自古國敗家喪未始不由婦人妾每覽古事忿之不忘何意今日妾自為之後人觀妾猶妾之視前人復何面目仰侍巾櫛請歸死此堂以塞陛下誤惑之過聰覽之色變曰朕此來得微風之患意怒不自由元達忠臣命其冠履就坐引元達以劉后表示曰外輔如公等內輔如此后朕亦何憂矣小劉后崔鴻三十國春秋前趙録曰聰后劉氏殷小女字麗華童齒聰惠膚髮異常晝營女工夜誦書傳母每止之敦玩彌甚與諸兄爭論經義理旨超然諸兄常深歎謝性孝友善風儀進止如圭璋焉以貴嬪立為皇后殷二女四孫皆姿色超世女德冠時聰並納之自是六劉之寵傾於後宮建元中流星起於牽牛入紫微龍形委蛇其光照地落平陽北十里視之則肉臭聞于平陽肉傍常有哭聲晝夜不止聰甚惡之劉后産一蛇一虎各害人而走尋之不得頃見隕肉之傍劉氏卒僞諡武宣皇后乃失此肉哭聲亦止劉曜劉后崔鴻三十國春秋前趙録曰劉皇后侍中暟女年十三長七尺八寸手垂過膝髮與身齊姿色才德邁於列后後趙石勒劉后崔鴻三十國春秋後趙録曰石勒劉皇后侍中閏之妹後部胡人也勒納之於胡關美色有特寵張枰反於襄城后抽劍斬之勒賴后而濟后性惠有幹助理軍國之務有呂氏輔漢之風然嚴整貞婉容裕不妬忌過之也石弘即位尊為皇太后與彭城王堪謀殺石虎謀泄虎殺之後燕慕容垂假后崔鴻三十國春秋後燕緑曰垂皇后假氏字元妃光祿大夫儀之女后少而婉惠有節操嘗謂妹季妃曰我終不能為庸人之妻季妃曰妹亦不為庸夫之婦鄰人聞而笑之內黃人張定善相見儀二女大驚曰君家大興當由二女儀深異之至年二十餘而不嫁儀子麟謂儀曰張定何知而拒求者儀曰吾女輩志行不凡故且踟蹰以擇良配垂稱燕王垂納元妃為繼室遂有殊寵范陽王德亦娉季妃焉姊妹俱為垂德皇后卒如其志宋劉裕臧后沈約宋書武敬臧皇后諱愛親東莞人也后適高祖生會稽宣長公主高祖以儉正率下后恭謹不違及高祖興復晉室居上相之重而后器服粗素不為親屬請謁晉義熙四年正月甲午卒於東城時年四十八追贈豫章公夫人還葬丹徒胡婕妤宋書武帝胡婕妤諱道安淮南人義熙初為高祖所納生文帝五年被譴賜死時年四十二高祖踐祚追贈婕妤太祖即位上尊號曰章皇太后劉義隆袁后沈約宋書曰文帝袁皇后諱齊媯陳郡陽夏人左光祿大夫湛之庶女也太祖初拜宜都王妃生太子劭及東陽獻公主英娥上待后恩禮甚篤袁氏貧薄后每就上求錢帛以贍與之上性節儉所得不過三五十匹因此恚恨甚深稱疾不復見上上每入必他處回避上數掩伺之不能得疾篤上執手流涕問所欲言后視上良久乃引被覆面崩于顯陽殿時年四十六上甚悼痛之詔永壽太守顏延之為哀策文其文甚麗也劉駿母路后沈約宋書曰文帝路淑媛諱惠男丹陽建康人也以色貌選入後宮生孝武拜為淑媛年既長無寵常隨世祖出藩世祖入討元凶淑媛留守尋陽上即位有司奉尊號曰皇太后第休之並超顯職太后頗豫政事賜與休之等財物家纍千金居處器服與帝子相侔尋崩時年五十五遷殯東宮改東宮門題曰崇憲宮劉駿王后沈約宋書曰孝武文穆王皇后諱憲嫄琅邪臨沂人元嘉二十年拜武陵王妃生廢帝山陰公主世祖在藩后甚有寵上伐凶逆與太后同還京都立為皇后大明四年率六宮躬桑于西郊廢帝即位尊曰皇太后宮曰永訓其年崩于含章殿時年三十八祔葬景寧陵劉彧母沈婕妤沈約宋書文帝沈婕妤諱容姬納後宮為美人生明帝拜為婕妤元嘉三十年卒時年四十世祖即位追贈湘東國太妃太宗即位上尊號為皇太后劉彧王后沈約宋書曰明恭王皇后諱貞風琅琊臨沂人也上嘗宮內大集而裸婦人觀之以為歡笑后以扇鄣面獨無所言帝怒曰外舍家寒乞今共為笑樂何獨不視后曰為樂之事其方自多豈有姑姊妹集聚而祼婦人形體以為樂外舍之為歡適實與此不同帝大怒遣后令起廢帝即位尊為皇太后元徽五年五月五日太后賜帝玉柄毛扇帝嫌其毛柄不華因此欲加鴆害已令太醫煮藥左右止之曰若行此事官家便應作孝子豈復得出入交會帝曰汝語有大理乃止孝建元年薨于第時年四十四陳妃沈約宋書曰明帝陳貴妃諱妙登丹陽屠家女也太妃家在建康縣東家貧有草屋兩三間上出行見之賜錢三萬令起瓦屋尉自送錢與之家人並不在唯太妃在家時年十二三尉見其容質甚美即以白世祖於是迎入宮賜太宗始有寵一年許衰歇以乞將軍李道兒尋又還生廢帝故民中皆呼廢帝為李氏子廢帝踐祚號曰皇太妃輿服一如晉孝武太妃故事置家令一人改諸國太妃曰大姬劉昱江后沈約宋書曰後廢帝江皇后諱簡圭濟陽考城人太始五年太宗求太子妃而雅信小數名家女多不合后弱小門無強廕卜筮最吉為太子納焉太子即位為后帝既廢降為蒼梧王妃劉准母陳昭華沈約宋書曰明帝陳昭華諱法容丹陽人也太宗晚年諸弟姬人有懷孕者輒取入宮及生男殺其母而與六宮所愛者養之順帝桂陽王休範子也以昭華為母焉順帝即位進為皇太妃劉准謝后沈約宋書曰順帝謝后諱梵境光祿大夫莊孫女也升明二年立為皇后順帝禪位降為汝陰王妃
