body:
  text: 人事部十九短中國人左傳襄上曰臧紇救鄫侵邾敗於狐駘臧紇武仲也鄫屬魯故救之狐駘邾也國人誦之曰我君小子朱儒是使朱儒朱儒使我敗於邾襄公幼弱故曰小子臧紇短小故曰朱儒家語曰高柴齊人字子羔長不過六尺狀貌甚惡為人篤孝居魯見知史記曰秦倡朱儒優旃始皇時置酒天雨陛者寒旃矜之乃大呼曰汝雖長尚雨立我雖短故幸休始皇乃使皆代漢書曰嚴延年為人短小精幹敏捷於事雖子貢冉有通於政事不能繼也又曰樓護為人短小精辨論議常依名節與谷永俱為五侯上客又曰東方朔待詔公車奉祿薄朱儒得省見久之朔紿音逮騶朱儒師古曰朱儒短人也騶廄之御騶也曰上以若曹無益於縣官耕田力作固不及人臨衆處官不能治民從軍擊虜不任事無益於國用徒索衣食今欲盡殺若曹朱儒大恐啼泣朔教曰上即叩頭請罪居有頃聞上過朱儒皆號泣頓首上問何為對曰東方朔言上欲盡誅臣等上知朔多端召問何恐朱儒為對曰臣朔生亦言死亦言朱儒長三尺餘奉一囊粟錢二百四十朱儒飽欲死臣朔飢欲死上大笑因待詔金馬門又曰郭解為人短小恭儉諸公以此重之又曰蔡義為丞相時年八十餘短小常兩吏挾乃能行又曰張蒼不滿五尺蒼父八尺餘蒼子復長八尺及孫毅長六尺餘又曰宣帝時渤海盜賊起上以龔遂為太守召見遂形貌短小帝見心內輕焉及對賜黃金乘傳去謝承後漢書曰汝南周滂字次彥世祖到常山問可治兵者誰滂舅以滂對世祖見滂短小以為不能將帥滂對有詞理拜潁川府丞東觀漢記曰張重日南計吏形容短小明帝問云何郡小吏答曰臣日南計吏非小吏也袁宏漢紀曰陰后短小舉止時有失儀左右掩口而笑魏志曰樂進字文謙容貌短小膽烈從高祖為帳下吏魏氏春秋曰魏武王姿貌短小神明英徹吳録曰張蕃字仲輔為人短小顧談以短戲之曰朱儒朱儒有何德令我思君罔極臧榮緒晉書曰山濤子淳元尪疾不仕世祖聞其短小而聰敏欲見之濤面答淳元自謂形容宜絶人事不肯受詔論者奇之沈約宋書曰王敬弘形狀短小而坐起端方劉璠梁典曰徐摛起家太學博士周捨舉曰臣外弟徐摛形質陋小若不勝衣而堪此選乃為晉安王侍讀崔鴻前涼録曰宗醜字仲業慷慨有大志清素敦朴不好華競形狀短小體有鱗甲仕至西平太守三國典略曰齊孟業有盛名初司州牧清河王嶽聞業名召為法曹見其容貌短小笑而不言及尋斷決之處乃謂業曰卿決斷之明可謂有過軀之用晏子春秋曰晏子短小使楚楚人為小門而迎晏子晏子曰使狗國者從狗門入今臣使楚不當狗門入王曰全齊無人耶使子為使晏子曰齊之臨淄張袂成帷揮汗成雨何為無人使賢者使於賢國使不肖者使於不肖之國以嬰為不肖故使王耳孫卿子非相曰帝舜短周公短楚葉公子高微小短瘠行若不勝衣而定楚國說苑曰齊遣淳于髡到楚為人短小楚王甚薄之謂曰齊無人而使子來何長也對曰臣無所長臣腰中七尺之劍欲斬無狀王王曰止吾但戲子耳即與髡共飲酒博物志曰齊桓公獵得一鳴鵠宰之嗉中得一人長三寸三分著白圭之袍帶劍持車罵詈瞋目後又得一折齒方圓三尺問群臣曰天下有此及小兒否陳章答曰昔秦胡充一舉渡海與齊魯交戰傷折版齒昔李子敖於鳴鵠嗉中遊長三寸三分纂文曰漢光武時潁川張仲師長二尺二寸亦出王充論衡古文璅語曰齊景公伐宋至曲陵夢見有短丈夫賓於前晏子曰君所夢何如哉公曰其賓者甚短大上小下其言甚怒好俯晏子曰則如是伊尹也伊尹甚大而短大上小下赤色而髯其言好俯而下聲公曰是矣晏子曰是怒君師不如違之遂不果伐宋方言曰鮆矲蒱揩反短也江湘之會謂之鮆昨啓反又曰癠桂林之中謂短矲東揚之間謂之俯今俗呼小為瘠矲短也俯言俯視因名云汝南先賢傳曰周舉字宣光姿貌短陋有晏子之風陸胤廣州先賢傳曰徐徵字君外為人短小果敢劉彥明燉煌實録曰泛洊字世震博學善屬文為人短小弱冠屢陳損益續搜神記曰司徒蔡謨親親有王蒙者單獨常為蔡公所收養蒙長才及三尺似為無骨登床輒令人抱上桓談新論曰諺云朱儒見一節而長短可知短絶域人詩含神霧曰東北極有人長九寸家語曰孔子曰僬僥氏長三尺短之至也國語同魏略西域傳曰短人國在康居西男女皆長三尺衆甚多康居長老傳曰常有商行迷惑失道而到此國國中甚多珠夜光明商度此國去康居可萬餘里魏志曰倭南有朱儒國人其長三四尺去女王國四千餘里列子曰從中州以東三十萬里得僬僥國人長一尺六寸東北極有人名竫音靖人長九寸山海經曰周饒國為人短小著冠帶一曰僬僥國郭璞曰其人長三尺漢武故事曰東郡送一短人長七寸衣冠具足疑其山精常令在案上行召東方朔問朔至呼短人曰巨靈汝何忽叛來阿母還未短人不對因指朔謂上曰王母種桃三千年一作子此兒不良已三過偷之矣遂失王母意故被謫來此上大驚始知朔非世中人短人謂上曰王母使臣來告陛下求道之法唯有清淨不宜躁擾復五年與帝會言終不見神異經曰西北荒中有小人焉長一寸圍如長朱衣玄冠乘軺車導引有威儀人遇其乘車並食之其味辛楚終不為蟲豸所咋並識萬物名字殺腹中三蟲又曰西海之中有鵠國男女皆長七寸自然有禮好經論跪拜壽三百歲人行如飛日千里百物不敢犯之唯畏鵠鵠遇吞之上壽三百歲在鵠腹不死而鵠一舉千里張華注曰此陳章對齊桓公云西海之外鵠國男女皆七寸也廣志曰東方有人長三尺君長出行導衛威儀有若中國人又有小人如螻蛄手撮之滿手得二十枚外國圖曰僬僥國人長一尺六寸迎風則偃背風則伏眉目具足但野宿一曰僬僥長三尺其國草木夏死而冬生去九疑三萬里王子年拾遺記曰員嶠山有陀移國人長三尺壽萬歲廣延之國人長二尺郭璞山海經圖贊曰僬僥極麼門可反諍人唯小四體具足眉目才了肥說文曰肥多肉也腴腹下肥也禮記禮運曰安之以樂而不達於順猶食而弗肥也四體既正膚革充盈人之肥也左傳哀下曰魯哀公至自越郭重仆孟武伯惡重曰何肥也公曰是食言多矣能無肥乎公與大夫始有惡公羊傳宣公曰楚莊王圍宋子反乘堞而窺宋城見華元曰何如華元曰易子而食析骸而炊子反曰吾聞圍國者鉗馬而秣之使肥者應客是何子之情也華元曰吾聞君子見人之惡則矜之小人見人之惡則幸之吾見君子是以情也家語曰弱土之人肥漢書曰陳平少時家貧好讀書有田三十畝獨與兄伯居伯常耕縱平遊學平為人長美色人或謂平貧何食而肥若是其嫂疾平不親家産曰亦食糠核耳音紇京師人謂粗屑為紇頭也有叔如此不如無有伯聞逐其婦又曰張蒼當斬解衣伏質長大肥白如瓠王陵見而怪其美士乃言于沛公赦勿斬東觀漢記曰梁鴻妻同郡孟氏女狀醜而肥力舉石臼擇對不嫁願得如鴻者後因妻鴻謝承後漢書曰梁國車成字子威兄恩都為赤眉賊所得欲臠之成叩頭曰兄瘦我肥欲得代之賊感其義俱放之後漢書曰虞延字子大陳留東昏人也腰帶十圍力能扛鼎又曰東平王蒼腰帶八圍顯宗甚重之詔曰日者問東平王處家何等最樂言為善最樂其言甚大副是腰腹矣又曰尸董卓於市天時始熱卓素充肥脂流於地守尸吏燃火置卓臍中光明達曙後漢典略曰馬騰字壽成扶風茂陵人馬援後也長八尺餘身體洪大面鼻雄異而性賢厚人多敬之魏志曰司馬懿秦免曹爽桓範踰城出為爽畫二策爽不能用範怒爽曰肥奴曹子丹好人生卿五六頭肉今桓範隨卿滅門也晉書曰王戎子萬有美名少而大肥戎令食糠而肥愈甚年十九卒晉中興書曰兗州既有八伯之號後更置四伯大鴻臚陳留江淵以能食為谷伯豫章太守陳留史疇以大肥為大伯散騎侍郎高平張嶷以狡妄為猾伯廬陵太守羊曼以佷戾為璅伯蓋擬古之四凶晉書曰孝武即位桓溫入朝拜高平陵問左右殷清形狀答者言肥短溫云向亦見在帝側後趙書曰王洛生石勒欲挫其權豪洛生在獄自剌腹深五寸洛生肥盛不陷中重以刀潰其腹出胃而死宋書曰前廢帝狂悖無道誅害群公忌憚諸父並藂之殿內歐捶凌曳無復人理始興王休仁及太宗山陽王休祐形體並肥壯帝乃以竹籠盛而稱之以太宗尤肥號為豬王又曰沈昭略性狂俊不事公卿嘗至婁湖苑逢王景文子約張目視之曰汝是王約也何乃肥而癡約曰汝沈昭略耶何乃瘦而狂昭略撫掌大笑曰瘦已勝肥狂又勝癡又曰范曄長不滿七尺肥黑禿眉鬢善彈琵琶能為新聲梁書曰安陵王大春字仁經少博涉書傳性孝謹體貌環偉腰帶十圍隋書曰王世續字闡熙容貌魁岸腰帶十圍風神爽拔有傑人之表尸子曰閔子騫肥子貢曰何肥也子騫曰吾出見其美車馬則欲之入聞先王之言則又欲之兩心相與戰今先王之言勝故肥韓子曰子夏見曾子曰何肥也對曰戰勝故肥曾子曰何謂也子夏曰吾入見先王之義則榮之出見富貴又榮之二者戰於胸臆今先王之義勝故肥淮南子曰繼子得食肥而不澤情不相往來也適子懷於燕慈母喻於利情相往來也吳質別傳曰詔特進以下會質間曹真肥朱鑠臞質召俳優使說肥臞真曰卿欲部曲將遇我耶遂爭而罷諸葛恪別傳曰孫權常問恪何以自娛而更肥澤恪對曰臣聞富潤屋德潤身臣非敢自娛修己而已異苑曰晉司隸校尉高平滿奮字武秋豐肥膚肉潰裂每至暑夏輒膏汗流溢其有愛妾夜取以燃照炎灼發于屋表奮大惡之悉盛而埋之暨永嘉之亂為胡賊所燒皎若燭光會稽典録曰董孝治勾章人家貧採薪供養得甘果奔走以獻母母甚肥悅鄰人家富有子不孝母甚瘦不孝子疾孝治母肥常苦辱之孝治不報及母終負土成墳鳥獸助其悲號喪竟殺不孝子置冢前以祭詣獄自繫會赦得免方言曰益梁之間凡諱其肥盛謂之䑋如掌切肥貌也博物志曰京邑有一人失名姓食噉兼十許人遂肥不能動其父曾作遠方長吏彼縣令故義共傳食之一二年中一鄉為儉張顯誓曰古諺云堯舜至聖身如脯臘桀紂無道肥膚三尺語林曰孟業為幽州其人甚肥或以為千斤武帝為稱之難其大臣乃作一大稱掛壁業入見武帝曰朕欲自稱有幾斤業答曰陛下欲稱臣耳無煩復勞聖躬於是稱業果得千斤世語曰太祖父嵩在太山太祖令太山太守應劭送家詣兗州陶謙密遣數十騎掩捕嵩家嵩懼穿後垣先出其妾肥不得出逃于廁與妾俱被害又曰廋公造周伯仁曰君何所欣悅而忽肥廋曰君復何所憂慘而忽瘠伯仁曰吾無所憂直是清虛日來滓穢日去物理論曰穀氣勝元氣其人肥而不壽瘦釋名曰省瘦也臞省約少之言也說文曰嬴委也瘠瘦也周禮地官司徒曰墳衍之人晢而瘠下平衍也左傳襄三年曰楚子使薳子馮為令尹訪於申叔豫豫曰國多寵王弱不可為也遂以疾辭方暑闕地下冰大夫孝疾受水而床焉重繭衣裘禮記玉藻曰纊為繭縕為袍也鮮食寢楚子使醫視之復曰瘠則甚矣血氣未動乃使子南為令尹漢書曰張湯子安世女孫敬為霍氏外屬婦霍氏反當相坐安世瘦臞形於顏色宣帝赦敬以慰其意東觀漢記曰和熹鄧后自遭大憂及新野君仍喪諸兄嘗悲傷思慕羸瘦骨立不能自勝又曰龐萌字明兄為赤眉所得欲啖之萌詣賊叩頭言兄年老羸瘠不如萌肥健願代兄賊義而不啖謝承後漢書曰楊彪見漢祚將移遂稱腳攣不復行積十餘年後子修為曹操所殺操見彪問曰公何瘦甚對曰愧無日磾先見之明猶懷老牛舐犢之愛操為之改容獻帝春秋曰司空攻呂布於下邳呂布登西北白樓上城陷士擒以詣司空布曰明公何瘦司空曰所以瘦不早相得故耳司空曹操也三輔決録注曰張氏得鉤何氏得算故三輔舊語曰何氏算張氏鉤何氏肥張氏瘦言何氏有肥人輒貴瘦人輒賤張氏瘦者輒貴肥者輒賤故二族以鉤算知吉凶以肥瘦知貴賤文子曰神農形悴堯瘦將欲利萬人也韓子曰宓子賤治單父有子見之曰何瘁也曰官事急憂之故臞有子曰昔舜鼓五絃之琴歌南風之詩而天下治今單父細治之而憂治天下將奈何故無術御之雖瘁臞未有益也世說曰鄧竟陵免官後赴山陵過見大司馬桓公問曰卿何以更瘦徐廣晉記曰鄧遐勇力絶人氣蓋當世人方樊噲為桓溫參軍數從征伐為冠軍將軍竟陵太守枋頭之伇溫既懷恥忽且忌憚遐因免遐官遐曰有愧於叔達不能不恨恨於破甑述異記曰甄法崇永初中為江陵令在任嚴明于時南平僇士為江安令喪官至其年末崇在廳事上忽見一人從門入云僇江安通法崇法崇知士已亡因問卿貌何故瘦答曰我生時所行善不補惡今繫苦役窮劇理盡魏明帝手詔曹植曰王顏色瘦弱何意耶腹中調和不今者食幾許米又啖肉多少見王瘦吾甚驚宜當節水加餐答詔表曰近得賜御食拜表謝恩尋奉手詔愍臣瘦弱奉詔之日泣涕橫流錐武文二帝所以愍憐於臣不復過於明詔
