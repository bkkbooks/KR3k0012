body:
  text: 服用部二簾釋名曰簾廉也自障蔽為廉恥也聲類曰簾戶蔽也通俗文曰戶幃曰簾揚雄方言曰宋魏陳楚謂之曲或謂之麴自關以西謂之箔南楚謂之蓬薄漢書曰周勃以織薄曲為業蘇林曰薄一名曲也又曰嚴君平筮卜成都市日得百錢則閉肆下簾而授老子梁書曰夏侯亶性節儉不事華侈晚頗好音樂有妓妾十數人無被服姿容每有客常隔簾奏時謂簾曰夏侯妓衣齊書曰沈麟士字雲禎有高尚之心居貧織簾誦書號為織簾先生又曰柳世隆善卜別龜甲價至萬永明初世隆曰永明九年我亡後三年丘山崩齊亦於此季矣屏人命典籤李黨取筆及高齒屐題簾箔旌曰永明十一年因流涕謂黨曰汝當見吾不見也唐書曰張嘉貞蒲州猗氏人也弱冠應五經舉拜平鄉尉坐事免歸侍御史張循憲為河東採訪使薦嘉貞材堪憲官請以己之官秩授之則天召見垂簾與之言嘉貞奏曰以臣草菜而得入謁九重是千載一遇也咫尺之間如隔雲霧竟不覩日月恐君臣之道有所未盡則天遽令卷簾與語大悅擢拜監察御史又曰王鍔為淮南作法軍中無一棄物至故簾亦令收之他日付船坊以為篸箬上作含切下而灼切他皆如此莊子曰河上有家貧窮緯蕭以為業司馬彪注曰蕭蒿也織緯蒿為薄簾也又曰張毅者高門懸薄無不奏也漢武故事曰甲帳居神以白珠為簾箔玳瑁押之象牙為蔑洞冥記曰漢武元鼎元年甘泉宮起招仙靈閣編翠羽麟毫以為簾西京雜記曰漢諸陵寢皆以竹為簾簾皆為水文及龍鳳像又曰昭陽殿織珠為簾風至聲如珩珮拾遺記曰石虎於太武殿前起樓高十丈結珠為簾垂五色玉珮至鏗鏘和鳴晉東宮故事曰簾箔皆以青布緣純三秦記曰明光宮在漸臺西以金玉珠璣為簾箔段龜龍涼州記曰呂纂時胡人發張駿冢得白珠薄簾汝南先賢傳曰范滂被收曰願得一幡一薄埋於首陽山上不負皇天下不愧夷齊謝綽拾遺曰戴明寶歷朝寵幸家纍千金大兒嬌淫為五色珠簾明寶不能禁之崔實政論曰珠璣玩飾匿若懷袖文繡蔽於帷簾夢書曰夢簾屏風蔽匿一身也唐國史補曰尚書李廙有清德其妻劉晏妹也晏嘗造廙見其門簾甚弊乃暗度廣狹以粗竹織成不加緣飾將以贈廙三攜至門不敢發言而去帷說文曰在旁曰帷釋名曰帷圍也以自障圍也禮記曲禮曰帷簿之外不趨又曰弊帷不棄為埋馬也又曰路馬死埋之以帷周禮春官下曰掌舍掌王之會同之舍帷宮設旌門謂王行晝止有所展肆若食息張帳為官樹旌表門左傳曰齊歸公孫敖之喪為孟氏且國故也為惠叔毀請且國之之族故聽其歸殯而書之葬視共仲制如慶父皆以罪降聲已不視帷堂而哭聲已蕙叔母怨敖從莒女故帷堂又曰公孫歸父以襄仲之立也有寵欲去三桓以張公室與公謀而聘于晉欲以晉人去之冬公薨季子言於朝曰使我殺適立庶以失大援者仲也夫遂逐東門氏襄仲居東門子家還及笙子家歸父壇帷復命於介除地為壇而張帷介副也使副反命於君又曰閭丘嬰以帷縛音篆其妻而載之與申鮮虞乘而出仁子莊公倍臣也鮮虞推而下之下嬰妻也曰君昏不能匡危不能救死不能死而知匿其眤匿藏也眤親也其誰納之又曰公孟有事於蓋獲之門外齊子氏帷於門外而伏甲焉禮記曰士喪君使人吊撤帷主人迎吊于寢門外史記曰孔子見衛夫人夫人在絺幃中而拜又曰蘇秦說齊宣王曰臨菑之衆連袵成帷又曰高祖曰運籌帷幄之中決勝千里之外子房功也又曰文帝幃帳不得文繡又曰董仲舒為博士下帷講誦弟子以次相授或莫見其面三年不窺舍園漢書曰秦起咸陽而至西雍離宮三百帷帳不移而具又曰成都侯王商弟內大池以行船立羽蓋張周帷又曰東方朔上疏云文帝集上書囊為殿帷後漢書曰更始委於趙萌日夜與婦人飲宴後庭群臣欲言事輒醉不能見時不得已令侍中坐帷內與語諸將識非更始聲出皆怨曰成敗未可知遽自縱放若此華嶠後漢書曰班始尚陰城公主公主順帝之姑貴驕淫亂與所嬖居帷中而始入使伏床下袁宏漢記曰獻帝出長安李𠐶來追董承懼射之以被為帳幔又曰賈琮為冀州剌史垂帷而行及至州曰剌史當遠視廣聽反垂帷以自掩蔽乃命褰帷東觀漢記曰張奐字然明使胸奴中郎將時休屠各及朔方烏丸並反燒度遼將軍門煙火相望兵衆大恐各欲亡走奐安坐車中與弟子講書自若魏志曰司馬景王奏太后廢齊王芳曰帝於陵雲臺曲室中施帷見九親婦女吳志曰孫峻欲誅諸葛恪置酒伏兵於帷中晉書曰穆帝立年始二歲皇太后禇氏設白紗帷於太極前殿抱帝臨軒晉陽春秋曰武帝令曰殿前織成帷不須施也宋書曰袁粲每經傅昭戶輒歎曰經其戶寂若無人披其帷其人斯在豈非名賢乎齊書曰毛惠素為少府卿性孝母服除後更修母所住處幃屏每月朝十五向帷悲泣傍人為之感傷終身如此呂氏春秋曰伍子胥將欲見吳王而不得客有言之於王子光者王子光見而惡其貌客以告子胥曰此易改也願令王子光居於堂上重帷而見其衣王子光許之子胥說之半王子光舉帷搏其手而與之坐淮南子曰先針而後縷可以成帷先縷而後針不可以成衣漢武帝內傳曰七月七日宮掖之內張雲錦之帷然九光之燈候西王母至也王母以紫錦為帷神仙傳曰淮南王見八公至足不及履迎之登思仙之喜張綺羅之帷西京雜記曰趙飛燕為皇后其弟上遺金錯繡帷拾遺記曰漢安帝好微行於郊間或露起帷宮千間皆用錦罽文繡風俗通曰俗說帷帳車不可作衣令人病癘東宮舊事曰太子納妃有青布碧裹梁下幃一紺絹青布窗戶幃各一夢書曰夢見帷帳憂陰事離騷曰紐薛荔而為帷楚詞曰翡翠幬飾高堂張衡南都賦曰暮春之禊元巳之辰朱帷連綱曜野映雲左太冲吳都賦曰藹藹翠帷嫋嫋素女潘嶽寡婦賦曰入空室兮望靈座帷飄飄兮燈熒熒庚闡楊都賦曰皇帝乃坐路寢御組帷阮藉詩曰薄帷鑒明月清風吹我𥘞幄爾雅曰以覆帷謂之幄說文曰幄木帳也三禮圖曰在上曰奕四傍及上曰帷上下四傍悉周曰幄幄大帷也書曰成王疾大漸出綴衣於庭孔安國曰綴衣幄帳周禮天官曰幕人掌帷幕幄奕皆以布為之四合象室宮曰幄至所居之幄也左傳曰楚子伐鄭諸侯還救鄭晉侯使張骼輔躒致楚師求御于鄭鄭人卜宛射犬吉二子在幄坐射犬于外又曰子産子太叔相鄭伯以會子産以幄幕九張行子太叔以四十既而悔之每舍損焉及會亦如之亦凡張也又曰衛侯為虎幄於籍圃於籍田之圃幄幕以虎獸為飾也漢書曰元后未央宮置酒內者令為傅太后張幄座於太皇后旁王莽案行責內者令曰定陶太后藩妾何得與至尊並撤去更設座傅太后聞之大怒不肯會漢書儀曰祭天紫壇有紺幄帳西京雜記曰成帝設雲幄雲幕於甘泉紫殿世謂為三雲殿拾遺録曰燕昭三年廣延之國獻善舞者二人王處以丹綃華幄物理論曰漢末黃門張讓段圭等於靈帝幄後相對泣帝驚問尚復幾時哉於是大收諸黨劉植魯都賦曰緹幄彌津丹帷覆洲幕廣雅曰幕帳也釋名曰幕絡也在裏之稱也說文曰帷在上曰幕蒙之覆案食亦曰幕周禮天官下曰幕人掌帷幕幄奕綬之事在旁曰帷在上曰幕又曰國君過市刑人赦夫人過市罰一幕世子過市罰一帟命夫過市罰一蓋命婦過市罰一帷謂諸侯及夫人世子過其國市大夫內子過其都之市者人之所交利而行刑之處君子無故不遊觀之若遊觀之則施惠儀禮曰國君與卿圖事管人布幕寢門外左傳曰楚子元伐鄭楚師夜遁諜告曰楚幕有烏乃止諜間也鄭所使間候伺楚也幕帳也又曰吳季禮來聘過衛夜宿於戚戚子孫邑也聞鍾聲季子曰異哉夫子之在此猶燕之巢於幕上而又何樂乎文子聞之終身不聽琴瑟又曰晉人執季孫意如以幕蒙之漢書曰衛青征胸奴大剋武帝就拜大將軍於幕下府中因號幕府東觀漢記曰明德馬皇后既處椒房太官上飯重加幕覆輒撤去晉書曰郤超字嘉賓桓公與謝安論大事令超臥帳內聽之風動帳開安笑曰郤生可謂入幕之賓宋書曰劉穆之孫瑀仕官甚不得意至江陵與顏峻書曰朱循之三世叛兵一日居荊州青油幕下作謝宣明面唐書曰杜暹為監察御史往磧西覆屯蕃人齎金以遺暹固辭不受左右言不可逆其情乃受而埋之幕下既去乃移牒令取之黃石公三略曰軍幕未設將不言熱此謂之禮將說苑曰晏子謂景公曰合疏縷之緯以成幕兵書曰將軍帳幕無故動敵人散走魚豢典略曰孔子反衛見夫人在錦帷中孔子北面稽首夫人自帷中再拜環佩之聲璆璆然王子年拾遺記曰漢成帝好微行於太液池傍起霄游宮鋪黑緹幕器服皆尚黑色漢武內傳曰李夫人既死帝思之命工人作夫人形狀置於輕紗幕中宛然如生帝大悅楚辭曰離榭修幕侍君之間間靜潘安仁籍田賦曰青壇蔚其嶽立翠幕黯似雲布張景洛陽褉賦曰停與蕙渚息駕蘭田朱幔虹野翠幕霓連劉楨詩曰明月照緹幕華燭散炎暉奕釋名曰小幕曰帟張在上奕帟然也周禮曰幕人掌惟帟鄭司農云帟平帳也凡喪王則張帟三重諸侯再重卿大夫不重又掌次曰師田則設重帟禮曰君於士有賜帟
