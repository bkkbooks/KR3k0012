body:
  text: 方術部十三占候周禮春官宗伯下曰眡祲掌十煇之法以觀妖祥辨吉凶妖祥善惡之徵鄭司農云煇謂日光氣也眡音視一曰祲二曰象三曰鐫四曰監五曰闇六曰瞢七曰彌八曰敘九曰隮十曰想故書彌作迷隮作資鄭司農曰祲陰陽氣相侵也象者如赤鳥也鐫謂日旁氣四面反鄉如煇狀也監雲氣臨日也闇日月食也瞢日月瞢瞢無光也彌者白虹彌天也敘者雲有次序如山在日上也隮者升氣也想者煇光也玄謂鑴讀如童子佩鑴之鑴謂日旁氣剌日也監冠珥也彌氣冠日也隮虹也詩云朝隮于西想雜氣有似可形想掌安宅敘降宅居也降下也人見妖祥則不安主安其居處也次序其凶禍所下謂禳移之正歲則行事占夢以季冬贈惡夢此正月而行安宅之事所以順民歲終則弊其事弊斷也謂計其吉凶然否多少傳曰僖五年正月辛亥朔日南至公既視朔遂登觀臺以望而書禮也視朔親告朔也觀臺臺上搆屋可以遠觀也朔旦冬至曆數之所始治曆者因此則可以明其術數審別陰陽敘事訓民魯君不能常脩此禮故善公之得禮也凡分至啟閉必書雲物分春秋分也至冬夏至也啟立春立夏閉立秋立冬雲物氣色災變也傳重申周典不言公者日官掌其職為備故也素察妖祥逆為之備又襄二十八年曰春無冰梓慎曰今茲宋鄭其饑乎歲在星紀而淫於玄枵歲歲星也星紀在丑斗牛之次玄枵在子虛危之次十八年晉董叔曰天道多在西北是歲歲星在亥至此年十一歲故在星紀明年乃當在玄枵今已在玄枵淫行失次以有時菑陰不堪陽時菑無冰也盛陰用事而溫無冰是陰不勝陽地氣發洩蛇乘龍蛇玄武之宿虛危之星龍歲星歲星木也木為青龍失次出虛危下為蛇所乘龍宋鄭之星也歲星本位在東方東方房心為宋角亢為鄭故以龍為宋鄭之星也宋鄭必饑玄枵虛中也玄枵三宿虛星在其中枵耗名也土虛而民耗不饑何為歲為宋鄭之星今失常經入虛耗之次時復無冰地氣發洩故曰土虛民耗也禆竈曰今茲周王及楚子皆將死禆竈鄭大夫歲棄其次而旅於明年之次以害鳥帑周楚惡之旋客處也歲星棄星紀之次客在玄枵歲星所在其國有福失次於北禍衝在南南為朱鳥鳥尾曰帑鶉火鶉尾周楚之分故周王楚子受其咎俱論歲星過次梓慎則曰宋鄭飢禆竈則曰周楚王死傳故備舉以示卜占唯人所在也又曰子蟜之卒也將葬公孫揮與禆竈晨會事焉會葬事過伯有氏其門上生莠子羽曰其莠猶在乎子羽公孫俾以莠喻伯有侈知其不能久存於是歲在降婁降婁中而旦裨竈指之曰猶可以終歲指降婁也歲星十二年而一終歲不及此次也已不及降婁及其亡也歲在娵訾之口娵訾營室東二十八年歲星淫在玄枵今三十年在娵訾是歲星停在玄枵二年其明年乃及降婁又曰昭七年夏四月甲辰朔日有食之晉侯問於士文伯曰誰將當日食對曰魯衛惡之衛大魯小公曰何故對曰去衛地如魯地衛地豕韋也魯地降婁也日食於豕韋之未及降婁之始乃息故禍在衛大在魯小也周四月今二月故曰在降婁也於是有災魯實受之其大咎其衛君乎魯將上卿又曰夏四月陳災鄭禆竈曰五年陳將復封五十二年而遂亡子產問其故對曰陳水屬也陳顓頊之後故為水屬火水妃也火畏水故為之妃妃音配而楚所相也相治也楚之先祝融為高辛氏火正主治火事今火出而火陳火心星也火出於周為五月而以四月出者以長歷推前年誤置閏逐楚而建陳也水得妃而興陳興則楚衰故曰逐楚而建陳妃以五成故曰五年妃合也五行各相妃合得五而成故五歲而陳復封為十三年陳侯吳歸于陳傳歲五及鶉火而後陳卒亡楚克有之天之道也故曰五十二年又曰有星出于婺女鄭裨竈言於子產曰七月戊子晉君將死今茲歲在顓頊之虛姜氏任實守其地居其維首而有妖星焉告邑姜也邑姜晉之妣也天以七紀戊子逢公以登星斯於是乎出吾是以譏之又曰有星孛于大辰西及漢申須曰彗所以除舊布新也天事恒象今除於火火出必布焉諸侯以火災乎梓慎曰往年吾見之是其徵也火出而見今茲火出而章必火入而伏其居火也久矣其與不然乎火出於夏為三月於商為四月於周為五月夏數得天若火作其四國當之六物之占在宋衛陳鄭乎宋大辰之虛也陳大皞之虛也鄭祝融之虛也皆火房也星孛及漢漢水祥也衛顓頊之虛也故為帝丘其星為大水水火之牡也其以丙子若王午作乎水火所以合也若火入而伏必以壬午不過其見之月鄭禆竈言於子產曰宋衛陳鄭將同日火若我用瓘犖玉瓚鄭必不火子產弗從十八年夏五月火始昏見丙子風梓慎曰是謂融風火之始也七日其火作乎戊寅風甚壬午大甚宋衛陳鄭皆火梓慎登大庭氏之庫以望之曰宋衛陳鄭也數日皆來告火禆竈曰不用吾言鄭又將火鄭人請用之子產不可子太叔曰寶以保民也若有火國幾亡可以救亡子何愛焉子產曰天道遠人道邇非所及也何以知之竈焉知天道是亦多言矣豈不或信遂不與亦不復火又曰昭公二十年二月已丑日南至梓慎望氣曰今茲宋有亂國幾亡三年而後弭蔡有大喪叔孫昭子曰然則戴桓也汰侈無禮已甚亂所在也後漢書曰謝夷吾字堯卿會稽山陰人也少為郡吏學風角占候太守第五倫擢為督郵時烏程長有贓釁倫使收案其罪夷吾到縣無所驗但望閤伏哭而還一縣驚怪不知所為及還白倫曰竊以占候知長當死近三十日遠不過六十日遊魄假息非刑所加故不收之倫聽其言至月餘日果有驛馬齎長印綬上言暴卒倫以此益禮信之又曰楊由字辰侯蜀郡成都人少習易并七政元氣風雲占候為郡文學掾時有大雀夜集於庫樓太守廉范以問由對曰此占郡內當有小兵然不為害後二十餘日廉柔縣蠻夷反殺傷長吏郡發庫兵擊之由嘗從人飲勑御者曰酒若三行便宜嚴駕既而趨去後主人舍有弗相殺者人請問何以知之由曰向社中木上有鳩弗此兵賊之象也又曰公沙穆遷弘農令永壽元年霖雨大水三輔以東莫不湮沒穆明曉占候乃豫告令百姓徙居高地故弘農人獨得免害又曰段翳字元章廣漢新都人習易經明風角時有就其學者雖未至必豫知姓名嘗告守津吏曰當有諸生二人荷檐問翳舍處者幸為告之後如其言又有一生來學積年自謂略究要術辭歸鄉里翳為合膏藥并以簡書封於筒中告生曰有急發視之生到葭萌與吏爭津吏撾破從者頭生開筒得書言到葭萌與吏蜊頭破者以此膏裹之生用其言創者即愈生歎服乃還卒業翳遂隱居竄跡終于家晉書曰戴洋善方術司馬颺為烏程令將赴職洋曰君深慎下吏颺後果坐吏免官洋又謂曰卿免官十一月當作郡加將軍至期為太守振武將軍颺賣宅將行洋止之曰君不得至當還不可無宅颺果為徐麤所逼不得之郡元帝增颺眾二干使助祖逖洋勸不行乃稱病收付廷尉俄而因赦得出康帝將登祚使洋擇日洋以為宜用三月二十四日景午太史令陳卓奏用二十二日昔越王用三月甲辰反國范蠡稱在陽之前當生盡出上下盡空德將出遊刑入中宮今與此同洋曰越王為吳所囚雖當時遜媚實懷怨懟故用甲辰乘德而歸留刑吳宮今大王內無含咎外無怨憤當承天洪命納祚無窮何為追越王去國留殃故事耶乃從之咸和元年祖約南行路遇大雷雨西南來洋曰甲子西南天雷其下必失火將至夏汝南人反執約兄子濟迸于石勒約府內地忽赤如丹洋曰按河圖徵云地赤如丹血丸當有下反上者恐十月二十七日胡馬當來飲淮水至時石勒騎大至攻城大戰其日西風兵火俱發約大懼會風廻賊退時傳言勒遣騎向壽陽約欲送其家還江東洋曰必無此事尋而傳言果妄征西將軍庾亮鎮武昌咸康三年洋言於亮曰武昌土地有山無林正可圖始不可居終山作八字數不及九昔吳用壬寅來止創立宮城至巳酉還下沫陵陶公亦涉八年土地盛衰有數人心去就有期不可移也公宜更擇吉處武昌不可久住隋書曰庾季才初仕梁元帝頗明星曆因共仰觀從容謂季才曰朕猶慮禍起蕭牆何方可息季才曰頃天象告變秦將入郢陛下宜留重臣作鎮荊峽整斾旋都以避其患帝初然之後與懍等議乃止俄而江陵陷滅高祖為丞相嘗夜召季才而問曰吾以庸虛受茲顧命天時人事卿以為何如季才曰天道精微難可急察竊以人事卜之符兆已定季才縱言不可公豈復得為箕潁之士乎高祖默然久之因舉首曰吾今譬如騎獸誠不得下矣因賜雜綵五十疋絹二百段曰愧公此意宜善為思之大定元年正月季才言曰今月戊戍平旦青氣如樓闕見於國城之上俄而變紫逆風西行氣經云天不能無雲而雨皇王不能無氣而立於今王氣已見須即應之二月日出卯入酉居天之正位謂之二八之門日者人君之象人君正位宜用二月其月十三日甲子甲為六甲之始子為十二辰之初甲數九子數又九九為天數其日即是驚蟄陽氣壯發之時昔周武王以二月甲子日定天下享年八百漢高帝以二月甲午即帝位享年四百故甲子甲子為得天數今二月甲子宜應天受命上從之開皇初授通直散騎常侍高祖將遷都夜與高熲蘇威二人定議季才旦而奏曰臣仰觀玄象俯察圖記龜兆允襲必有遷都且堯都平陽舜都冀土是知帝王居止世代不同且漢營此城經今八百歲水皆鹹不甚宜人願陛下恊天之心為遷徙之計高祖愕然謂熲等曰是何神也遂發詔施行賜絹三百段馬兩疋進爵為公謂季才曰朕自今已後信有天道矣又曰盧太翼善曆數其後目盲以手摸書而知其字仁壽末高祖將避暑仁壽宮大翼固諫不納至再三太翼曰臣愚豈敢飾詞但恐是行鑾輿不及反高祖大怒繫之長安獄期還而斬之高祖至宮寢疾臨崩謂皇太子曰太翼非常人也前後言事未嘗不中吾來日道當不反今果至此爾宜釋之唐書曰桑道茂者大曆中遊京師善太一遁甲五行災異之說言事無不中代宗召之禁中待詔翰林建中初神策軍脩奉天城道茂請高其垣閭大為制度德宗不之省及朱泚之亂帝倉卒出幸至奉天方思道茂之言時道茂已卒命祭之
