body:
  text: 兵部五十拒守上孫子曰昔之善戰者先為不可勝先諮之廟堂虜其危難然後高壘深溝使兵士練習故敵不得勝以待敵之可勝以此守備之固待敵之闕則可勝也不可勝在己言守備之固制敵在外也可勝在敵守備之固自脩理以候敵之虛解已見敵敵有闕漏之形然後可勝也故善戰者能為不可勝不能使敵必不可勝己若敵曉縛兵事策與道合深為己備者亦不可強勝故曰勝可知見成形也而不可為也敵有備也已料見形者則勝負可知若敵密而無形亦不可強使為敗故范蠡曰時不至不可強生事不究不可強成不可勝者守也形藏也若未見其形彼眾我寡則自守也可勝者攻也敵攻己乃可勝也已見其形彼寡我眾則可攻故善守者藏於九地之下善守備者務因其山川之阻丘陵之固使不知所攻言其深密藏於九地之下又曰城有所不攻固而多重易曰利用禦寇不利為寇左傳曰晉侯伐齊齊侯禦諸平陰壍防門而守之廣里夙沙衛曰不能戰莫如守險晉將范宣子告齊大夫折文子曰吾知子敢匿情乎魯人莒人皆請以車千乘自其鄉入既許之矣若入君必失國子盍圖之子家以告公公恐晏嬰間之曰君固無勇而又聞是弗能久矣不能久敵齊師夜遁又曰倍則攻敵則戰少則守後漢書曰涼州賊王國圍陳倉左將軍皇甫嵩督前軍董卓救之卓欲進赴陳倉嵩不聽卓曰智者不後時勇者不留決速救則城全不救則城滅全滅之勢在於此也嵩曰不然百戰百勝不如不戰而屈人之兵是以先為不可勝以待敵之可勝不可勝在我可勝在彼彼守不足我攻有餘有餘者動於九天之上不足者陷於九地之下今陳倉雖小城守固備非九地之陷也王國雖強而攻我之所不救非九天之勢夫勢非九天攻者受害陷非九地守者不拔國今已陷受害之地而陳倉保不捐之地我可不煩兵動眾而取全勝之功將何救焉遂不聽王國陳倉自冬迄春八十餘日城堅守固竟不能拔賊眾疲弊果自解去又曰來歙與征虜將軍祭遵襲略陽遵道病還分遣精兵隨歙合二千餘人伐山開道從番須廻中番須廻中並地名也番音盤武帝元封四年幸雍通回中道前書音義曰回中在汧汧今隴州汧元縣也徑至略陽徑直也斬囂守將金梁因其保城囂大驚曰何其神也東觀漢記曰上聞得略陽甚悅左右怪上數破大敵今得小城何足以喜然上以略陽囂所依阻心腹已壞制則其支体也乃悉兵數萬人圍略陽斬山築堤激水灌城歙與將士固死堅守矢盡乃發屋斷木以為兵囂盡銳攻之自春至秋其士卒疲弊帝乃大發關東兵自將上隴囂眾潰走圍解於是置酒高會勞賜歙班坐絕席在諸將之右賜歙妻縑千疋詔使留屯長安悉監護諸將又曰大司徒鄧禹西征定河東張宗詣禹自歸禹聞宗素多權謀乃表為偏將軍禹軍到徇邑赤眉大眾且至禹以徇邑不足守欲引師進就堅城而眾人多畏賊追憚為後拒禹乃書諸將名於竹簡署其前後亂著笥中令各探之笥以竹為之鄭玄注禮記云圓曰簞方曰笥宗獨不肯探曰死生有命張宗豈辭難就逸乎禹歎息謂曰將軍有親弱在營奈何不顧宗曰愚聞一卒畢力百人不當萬夫致死可以橫行宗今擁兵數千以承大威何遽其必敗乎遂留為後拒諸營既引兵宗方勒厲軍士堅壘壁以死當之禹到前縣議曰以張將軍之眾當百萬之師猶以小雪投沸湯雖欲戮力其勢不全也乃遣步騎二千人反還迎宗宗引兵始發而赤眉至宗與戰却之乃得歸營於是諸將服其勇又曰隗囂大將王捷別在戎丘登城呼漢軍曰為隗王城守者皆必死無二心願諸軍亟罷亟紀力切請自殺以明之遂自刎頸死又曰世祖即位遣宗正劉延攻天井關與田邑連戰十餘合延不得進邑迎母弟妻子為延所獲東觀漢記曰鄧禹使積弩將軍馮愔將兵擊邑愔悉得邑母弟妻子後邑聞更始敗乃遣使詣洛陽獻璧馬即拜為上黨太守晉書曰陶侃使桓宣李陽平襄陽侃使宣鎮之以其淮南部曲立義成郡宣招懷初附勸課農桑簡刑罰略威儀或載鉏耒於軺軒或親芸穫於壠畝十餘年間石季龍再遣騎攻之宣能得眾心以寡弱拒守議者以為次於祖逖周訪又曰吳彥為吳建平太守時王濬將伐吳造舡於蜀彥覺之請增兵為備皓不從彥乃輒為鐵鎖撗斷江路及師臨境緣江諸城皆望風降附或見攻而拔唯彥堅守大眾攻之不能剋退舍禮之梁書曰侯景反兵逼建業眾皆兇懼梁將羊侃為守城督侃偽稱得外射書云邵陵王西昌侯兵已至路眾乃少安賊為尖頭木驢攻城矢石所不能制侃作雉尾炬施鐵鏃以油灌之擲驢上燒之俄盡賊又東西四面起土山以臨城城中震駭侃命為地道潛引其土山不能立賊又作登城樓車高十餘丈欲臨射城內侃曰車高塹虛彼來必倒可臥而觀之不勞設備及車動果倒眾皆服焉賊頻攻不捷會侃病死城方陷又曰蔡道恭為司州刺史魏圍司州時城中眾不滿五千人食纔半歲魏軍攻之晝夜不息乃作大車載土四面俱前欲以填塹刺史蔡道恭塹內作蒙艟鬥艦以待之魏人不得進又潛作伏道以決壍水道恭載土地填塞之相持百餘日前後斬獲不可勝計魏大造梯衝攻圍日急道恭用四石烏漆大弓射所中皆洞甲飲羽一發或貫兩人敵人望弓皆靡又於城內作土山多作大矟長二丈五尺施長刃使壯士執以刺魏人魏軍甚憚之陳書曰宜黃侯慧紀鎮荊州隨師濟江慧紀率將士三萬人舡艦千餘乘沿江而下欲趣臺城遺南康太守呂肅將兵據巫峽以五條鐵鎖橫江肅竭其私財以充軍用隋將楊素奮兵擊之四十餘戰爭馬鞍山及磨刀澗守險隋軍死者五千人陳人盡取其鼻以求功賞既而隋軍屢捷獲陳之士三縱之肅乃遁後周書曰李遷哲天和三年進位大將軍詔遷哲率金上等諸州兵鎮襄陽五年陳將章昭達攻逼江陵梁主蕭歸告急於襄州衛公直令遷哲往救焉遷哲率其所部守江陵外城與陳將程文季交戰兵稍却遷哲乃親自陷陣手殺數人會江陵總管陸騰出兵助之陳人又因水汎長壞龍川寧朔堤引水灌城城中驚擾遷哲乃先塞水又募驍勇出擊之頻有斬獲眾心稍定俄而敵人郭內焚燒人家遷哲自率騎出南門又令步兵自北門出兩軍合勢首尾邀之陳人復敗多投水而死是夜陳人又竊於城西堞以梯登者已百數人遷哲又率驍勇扞之陳人復潰俄而大風暴起遷哲乘闇出兵擊擊其營陳人大亂殺傷甚眾陸騰復破之於西堤陳人乃遁又曰太祖以王羆為荊州刺史進號撫軍將軍梁復遣曹義宗眾數萬國荊州堰水灌城不沒者數板時既內外多虞未遑救援乃遺羆鐵券云城全當授本州刺史城中糧盡羆煮粥與將士均分而食之每出戰嘗不擐甲冑大呼曰荊州城孝文皇帝所置天若不祐國家使賊箭中王羆不爾王羆須破賊屢經戰陣亦不被傷彌歷三年義宗方退進封霸城縣公尋遷車騎大將軍又曰王羆華州刺史沙苑之役齊神武士馬甚盛太祖以華州衝要遣使勞羆令加守備羆語使人曰老羆當道臥驩子安得過太祖聞而壯之及齊神武至城下謂羆曰何不早降羆乃大呼曰此城是王羆家生死在此欲死者來齊神武遂不敢攻又曰王思政守頴川兼河南諸軍事東魏太尉高岳行臺慕容紹宗儀同劉豐生等率騎十萬來攻頴川城內臥鼓偃旗若無人者岳恃其眾謂一戰可屠乃四面鼓噪而上思政選城中驍勇開門出入岳眾不能當引軍亂退思政登城遙見岳陣不整乃率步騎三千出邀擊之殺傷甚眾然後還城設守禦之備岳知不可卒攻乃多修營壘又隨地勢高處築土山以臨城中飛梯大車晝夜盡攻擊之法思政亦作火鑽子筭切因迅風便投之土山又以火箭射之燒其攻具仍募勇士縋而出戰岳眾披靡其守土山人亦棄山而走思政即命據其兩土山置折堞以助防守岳等於是奪氣不敢復攻齊文襄更益岳兵堰於建反洧水以灌城城中水泉湧溢不可防止懸釜更炊糧力俱竭慕容紹宗劉豐生及其將慕容永珍共乘樓船以望城內令善射者俯射城中俄而大風暴起船乃飄至城下城上人以長鉤牽船弓弩亂發紹宗窮急透水而死豐生向土山復中矢而斃生擒永珍思政謂之曰僕之破亡在於晷漏誠知殺卿無益然人臣之節守之以死乃流涕斬之并收紹宗等尸以禮埋瘞又曰將賀若敦率步騎六千渡江取陳湘川陳將侯瑱討之江路遂斷糧援既絕人懷危懼敦於是分兵抄掠以充資費恐瑱等知其糧少乃於營內聚土覆之以米集諸營軍士人各持囊遣官司部分若給糧者因召側近村民佯有所訪問令於營外遙見隨即遣之瑱等聞之良以為實乃據守要險欲曠日老敦敦又增脩營壘造廬舍示以持久敦軍數有叛人乘馬投瑱者遂納之敦又別取一馬趣船船中逆以鞭鞭之如是者再三馬便畏船不上後伏兵於江岸遣人乘畏船馬以招瑱軍詐稱降附瑱遣兵迎接竟來牽馬馬既畏船不上敦發伏掩之盡殪又湘之人乘輕船載米粟乃籠雞鴨以餉瑱軍敦患之乃為土人裝船伏甲士於中瑱兵見之謂餉舡至逆來爭之敦甲士出而擒之此後實有饋餉乃亡命奔瑱者猶謂敦之設詐逆遣扞擊並不敢受相持歲餘瑱不能制北史曰西魏將韋孝寬守玉壁東魏大將齊神武命攻之連營數十里至於城下乃於城南起土山欲乘之以入當其山處城上先有兩高樓孝寬更縛木接之令極峻多積戰具以禦之敵人以樓高不得入遂於城南鑿地道又於城北起土山且作且攻晝夜不息孝寬復掘長塹截其道乃置戰士屯於塹上城外每穿至塹戰士即擒殺之又於塹外積柴貯火敵人有在地道內者便下柴火以皮鞴吹之鞴蒲拜切火氣一衝咸即灼爛城外又作攻車車之所及莫不摧毀雖有排楯莫之能抗孝寬乃縫布為幔隨其所向則張設之布既懸於空中其車竟不能壞城外又縛松麻於竿灌油加火規以燒布并欲焚樓孝寬復長作鐵鉤利其鋒刃火竿亦來以鉤遙割之松麻俱落城外又於城西面穿地作二十一道分為四路於其中各施梁柱作訖以油灌柱放火燒之柱折城並崩壞孝寬又隨壞處堅木柵以扞之敵不得入城外盡其攻擊之術孝寬咸拒破之竟以全隋書曰梁士彥遷熊州刺史後從武帝拔晉州進位柱國除使持節晉絳二州諸軍事晉州刺史及帝還後齊後主親總六軍而圍之獨守孤城外無聲援眾皆震懼士彥慷慨自若賊盡銳攻之樓楪皆盡城雉所存尋仞而已或短兵相接或交馬出入士彥謂將士曰死在今日吾為爾先於是勇烈齊奮呼聲動地無一不當百齊師少却乃令妻妾軍民子女晝夜脩城三日而就帝率六軍亦至齊師解圍營於城東十餘里士彥見帝持帝鬚而泣曰臣幾不見陛下帝亦為之流涕時帝以將士疲倦意欲班師士庶叩馬而諫曰今齊師遁眾心皆動因其懼也而攻之其勢必舉帝從之大軍遂進帝執其手曰余之有晉州為平齊之基若不固守則事不諧矣朕無前慮惟恐後變善為我守之又曰郭榮宇丈護擢中外府水曹參軍時齊寇屢侵護令榮於汾州觀賊形勢時汾州與姚襄鎮相去懸遠榮以為二城孤逈勢不相救請於州鎮之間更築一城以相控攝護從之俄而齊將祖孝先攻陷姚襄汾州二城唯榮所立者獨能自守護作浮橋出兵渡河與孝先戰孝先於上流縱火筏以擊浮橋護令榮督便水者引取其筏以功授大都督護又曰劉弘字仲遠拜泉州刺史會高智慧作亂以兵攻州弘城中守百餘日救兵不至前後出戰死亡太半糧盡無所食與士卒數百人煮犀角腰帶及剝樹皮而食之一無離叛賊知其飢餓欲降之弘抗節彌厲賊悉眾來攻城陷為所害上聞而嘉歎者久之賜物二千叚又曰李景檢校代州揔管漢王諒作亂并州景發兵拒之諒遣劉嵩襲景戰於東城昇樓射之無不應弦而倒選壯士擊之斬獲略盡諒復遣嵐州刺史喬鍾葵率勁勇三萬攻之景戰士不過數千加以城池不固為賊衝擊崩毀相繼景且戰且築士卒皆殊死鬥屢挫賊鋒司馬馮孝慈司法參軍呂玉並驍勇善戰儀同三司侯莫陳又多謀畫上拒守之術景知將士可用其後推誠於此三人無所關預唯在閤持重時出撫循而已月餘朔州總管楊義臣以兵來援合擊大破之
