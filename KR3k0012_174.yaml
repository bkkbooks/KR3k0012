body:
  text: 居處部一宮世本曰堯使禹作宮釋名宮穹也屋見垣上穹隆也爾雅曰宮謂之室室謂之宮史記曰天官書曰玄武虛危主宮室大戴記曰周時德澤和洽蒿茂大以為宮柱名為蒿宮毛詩曰定之方中作為楚宮揆之以日作為楚室又曰鼓鍾于宮聲聞于外易曰上古穴居而野處後世聖人易之以宮室上楝下宇以待風雨蓋取諸大壯左傳曰襄公作楚宮穆叔曰太誓云人之所欲天必從之君欲楚夫故作其宮若君不復適楚必死是宮也六月公薨于楚宮又曰晉成虒祁之宮又成銅鞮之宮數里論語曰禹卑宮室而盡力乎溝洫禹吾無間然矣史記曰騶子之燕昭王擁彗先驅請列弟子坐而受業築碣石宮親往師之又曰秦始皇造阿房宮徵發天下工匠又曰秦始皇所居之宮有祈年宮長信宮梁山宮又曰戎使由余於秦秦繆公示以宮室積聚由余曰使鬼為之則勞神矣使人為之亦苦民矣又曰項羽屠咸陽焚其宮室三月火不滅又曰盧生說始皇曰人主為微行所居而人知之則害於神願上居無令人知則不死之藥殆可得也乃命咸陽之旁三百里內宮觀二百七十複道甬道相連帷帳鍾鼓美人充之所幸言其處者死始皇幸梁山宮望見丞相車騎眾不善之中人以告丞相損車騎始皇怒曰此中人泄吾語捕時在旁者斬之自是莫知所在決事悉於咸陽宮又曰始皇二十七年作長信宮於渭南通驪山作甘泉前殿築甬道自咸陽屬之築墻垣如街巷又曰漢武帝時河決天子自臨決河沉白馬玉壁作瓠子歌於是築宮其上名曰宣房宮又曰樗里子卒葬于渭南章臺之東曰后百歲是當有天子之宮夾我墓樗里疾室在於昭王廟西渭南陰鄉樗里故俗謂之樗里子至漢興長樂宮在其東未央宮在其西武庫正直其墓秦人諺曰力則任鄙智則樗里漢書曰漢八年蕭丞相營作未央宮立東闕北闕蒼龍玄虎二闕前殿武庫太倉高祖還見宮闕壯麗甚怒曰天下方未定何治宮室過度也何曰非壯非麗無以威四夷旦令後世無以加也又曰初江充召見犬臺宮晉灼曰黃圖上林有走狗觀也古曰今書本犬臺有作太臺字者誤也漢無太臺宮自請願以所常被服冠見上上許之充為人魁岸容貌甚壯帝望見而異之謂左右曰燕趙固多奇士既至前問以當世政事上悅之又曰武帝六年冬行幸回中春作首山宮又曰上幸不其祠神人于交門宮若有向坐拜者作交門之歌又曰幸河東之明年正月鳳皇集祋祤於所集處得玉寶起步壽宮又曰柏梁災越巫勇之迺曰越俗有火災又起屋必以大用勝服之於是起建章宮為千門萬戶又曰梁孝王吳楚破梁最親有功又為大國居天下膏腴北界泰山西至高陽四十餘城多大縣孝王太后少子愛之賞賜不可勝道於是孝王築東苑方三百餘里廣睢陽城七十里大治宮室為複道宮連屬於平臺四十餘里如淳曰在梁東北離宮所在晉灼曰或說在城中東北角得賜天子旌旗從千乘萬騎出警入蹕擬於天子又曰孝武作建章宮為千門萬戶有鳳凰闕高二十餘丈中有蓬萊方丈瀛洲壺梁象海中神山南有玉堂壁門大鳥之屬立神明臺井幹樓度高五十餘丈輦道相屬焉又曰秦起咸陽西至雍離宮三百師古曰凡言離宮者皆謂於別處置之非常所居也鍾鼓帷帳不移而具又為阿房之殿高數十仞師古曰阿房者言殿之四阿皆為房也一說大陵曰阿言其殿高若於阿上為房也房次王作旁說云始皇作四十殿未有名以其去咸陽近且號阿房阿近也八尺曰仞也東西五里南北千步從車羅騎四馬馳鶩旌旗不撓師古曰撓屈也言庭之廣大殿之高敞眾騎馳鶩無所觸建立旗旌不屈撓撓音女孝切為宮室之麗至於此使其後世曾不得聚廬而託處焉又曰鄒陽諫吳王曰臣聞秦倚曲臺之宮應劭曰始皇帝所治處也若漢家未央宮也懸衡天下服虔曰關西為衡應劭曰衡平也如淳曰衡猶稱也言其縣法度於其上也師古曰此說秦自以為威力強固非論平法也下又言陳勝連從兵之據則是說從橫之事耳服釋是也畫地而不犯兵加胡越師古曰畫地不犯者法制之行至其晚節末路張耳陳勝連從兵之據師古曰從音子容切以叩函谷咸陽遂危師古曰叩擊也何則列郡不相親萬室不相救也又曰後元二年幸盩屋作五祚宮張晏曰有五祚樹因以名又曰甘露二年幸萯陽宮在鄠萯音倍後漢書曰永平三年夏旱而大起北宮鍾離意詣闕免冠上䟽曰伏見陛下以天時小旱憂元元降避正殿躬自克責而皆密雲遂無大潤豈政有未得應天心者邪昔成湯曹旱以六事自責曰政不節邪使人疾邪宮室榮邪女謁盛邪苞苴行邪讒夫昌邪竊見北宮作人失農時此所謂宮室榮也自古非患宮室小狹但患人不安寧宜且罷以應天心臣意以疋夫之才無有重能久食重祿擢備近臣比受厚賜喜懼相半不勝愚戇征營罪當萬死征營不自安也帝策詔報曰湯引六事咎在一人其冠履勿謝比上天降旱密雲數會朕戚然慚懼思獲善應故分布禱請闚候風雲北祈明堂南設雩場明堂在洛陽城南言北祈者蓋時修雩場在明堂之南也今又勑大匠上作諸宮減省不急庶消災譴詔因謝公卿百僚遂應時澍雨又曰東平王蒼薨元和三年東巡狩幸東平宮追念蒼謂其諸子曰思其人至其鄉其處在其人亡因泣下沾襟魏志曰帝營作許昌宮楊阜諫曰堯尚茅茨而萬國安禹卑宮室而天下樂桀作琁室象廊紂為傾宮鹿臺皆喪社稷也吳志曰後主二年六月起新宮於太初之東制度尤廣二千石已下皆自入山督攝伐木又壞諸地大開苑囿起土山作樓觀加飾珠玉製以奇名右臨硎左彎碕又開城北渠引後湖水激流入宮內巡遶堂殿窮極技巧功費萬計又曰赤烏十年春二月適南宮三月改作太初宮詔移武昌材瓦有司奏武昌宮作已二十八年恐不堪用宜別更置帝曰大禹卑宮室為美今軍事未已所在多賦妨損農業且建業宮乃朕從京來作府舍耳材柱率細年月久遠恐朽壞今武昌宮材木自可用繕之晉書曰尚書僕射謝安石以宮室杇壞啟作新宮帝權出居會稽王第二月始興功內外日役六千人安與大匠毛安之決意修定皆仰摸玄象體合辰極並新制置省閣堂宇名署時正構太極殿欠一梁有梅木流至石頭石頭津主啟聞取用之因畫花於梁上以表瑞焉又起朱雀重樓皆繡栭藻井門開三道上重名朱雀觀觀下門上有銅雀懸楣上刻木為龍虎左右相對王隱晉書曰高堂隆刻鄴宮屋材云後若千年當有天子居此宮惠帝止鄴宮治屋土剝更渥始見刻字計年正合時載記曰石勒欲營鄴宮先是廷尉續咸諫止之及是霖雨中山西北暴水流漂巨木百餘萬根集于堂陽勒大悅謂公卿曰諸卿知否此非為災天意欲吾營都矣於是營之勒親定規模又曰劉曜命起酆明觀立西宮建凌霄樓於滈池侍中喬豫和苞上䟽曰臣聞人主之興作也上准乾坤俯順人時是以衛文承亂亡之後宗廟流漂無所而猶上憲營室作為楚宮故能上興康叔武公之跡延九百之慶也今奉詔書將營酆明觀市道蒭蕘咸非之曰一觀之費足以平涼州矣又奉勑旨復欲擬阿房而建西宮模欲瓊樓而建陵霄以此功費亦可以吞吳蜀剪齊魏矣書奏曜大悅宋書曰少帝以石頭城為長樂宮東府城為未央宮齊書曰高祖永明元年秋七月車駕幸青溪舊宮設金石樂在位者賦詩唐書曰東都平太宗入觀隋氏宮室嗟後主罄人力以逞奢侈薛收進曰峻宇雕牆殷辛以滅土階茅楝唐堯以昌秦帝增阿房之飾漢后罷露臺之費故漢祚延而秦禍速自古如土崩瓦解取譏後代良以奢虐所致太宗悅其對又曰高祖嘗避暑于仁智宮又曰閻立德受詔造翠微宮及玉華宮咸稱旨賞賜甚厚又曰太宗將幸九成宮姚思廉諫曰離宮遊幸秦皇漢武之事固非堯舜禹湯之所為也言甚切至太宗納之西京親記曰趙王如意年幼未能親就外傅戚姬使舊趙內傅趙媼傅之號其室為養德宮又曰五柞宮有五柞樹皆連抱上枝覆蔭數十畝其西有青桐觀觀有三梧桐樹樹下石騏驎二枚刊其脇為文字是秦始皇酈山墓上物也頭高一丈三尺東邊者前左腳折折處有赤如血父老謂其有神皆含血而屬筋焉帝王世紀曰紂作傾宮七年乃成大十里高十丈又曰堯有貳宮漢武故事曰上起明光宮發燕趙美女二千人充之取年十五已上二十已下蒲四十者出嫁掖庭令總其籍時有死出者隋捕之凡諸宮美人可有七八千建章未央長樂三宮皆輦道相屬懸棟飛閣不由徑路六韜曰殷君喜治宮室七十三所大宮百里宮中九市列仙傳曰鉤弋夫人齊人病六年右手拳望氣者云東方有貴人氣推而得之召到姿色甚偉帝披其手得一玉鉤而手尋尋辰故名其宮為鉤翼宮十洲記曰方丈山上有玄琉璃宮博物志曰夏桀之時為長夜宮於深谷之中男女雜處三旬不出聽政其後大風飄沙一夕填此宮谷鄴中記曰石虎在時自襄國至鄴二百里中四十里輒立一宮宮有一夫人侍婢數十黃門宿衛石虎下輦即止凡虎所起內外大小殿臺觀行宮四十四所項國志曰武帝遊五柞宮欲廣上林令譙隆諫曰堯舜至治廣德不務苑囿帝初不悅後拜為中郎墨子曰上古之人未知為宮室就陵而居處下潤傷民故聖人作為宮室宮室之法高足以避潤濕中足以禦風寒上足以待霜雪牆高足以別男女故以便生不以為樂也今之為宮室必厚歛百姓暴奪民財為曲直之室青黃刻鏤之飾故國貧而人難訴也管子曰黃帝有合宮以聽政穆天子傳曰天子升于崑崙之丘以觀黃帝之宮越絕書曰美女宮周五百九十步土城者句踐所習教美女西施鄭旦宮室方言曰吳有館娃之宮列子曰周穆王時西域國有化人來王執化人之祛騰而上天暨化人之宮構以金銀絡以珠玉出雲雨之上實為清都紫微也孟子曰齊宣王見孟子於雪宮呂氏春秋曰武王勝殷靖箕子之宮也神異經曰東方有宮青石為牆高三仞左右闕高百尺畫以五色門有銀牓以青石碧鏤題曰天地長男之宮西方有宮白石為墻五色玄黃門有金牓而銀鏤題曰天地少女之宮西南有宮以金為墻闕有金牓以銀鏤題曰天皇之宮南方有宮以赤石為墻赤銅為門闕有銀牓曰天地中女之宮北方有宮以黑石為墻題曰天地中男之宮東南有宮以黃石為墻以黃牓碧鏤題曰天地少男之宮西南有宮以黃銅為墻題曰地皇之宮十洲記曰青丘山上有紫宮天真仙女多遊於此又曰方丈山有琉璃宮紀年曰穆王所居鄭宮春宮說苑曰楚使使聘齊齊王享之梧宮使者曰大哉梧乎王曰江海之魚吞舟況大國之樹三輔故事曰桂宮周匝十里內有光明殿走狗臺土山複道橫北庭從宮中西上城至神明臺三輔黃圖曰有夜光宮望遠宮昭臺宮蒲桃宮棠梨宮萯陽宮長平宮五柞宮漢宮闕名曰長安有長樂宮未央宮長門宮鼓篁宮承光宮宜春宮池陽宮長平宮黃山宮望仙宮長楊宮集靈宮延壽宮祈年宮通天宮馺娑宮沛宮林光宮甘泉宮龍泉宮首山宮交門宮明光宮五柞宮萬歲宮竹宮壽宮建章宮太一宮思子宮見漢書長樂等宮或在京師或在外邵或帝王所居或祠祀所在或因事以置夜光宮棠梨宮扶荔宮見三輔莫圖桂宮見三輔故事鼎湖宮谷口宮魏略曰大秦國城中有五宮相去各十里宮室皆以水精為梱食器亦然郡國誌曰金河府摩磷宮北二十里有石殿一飛橋向岸畫以古賢哲士太常卿蔣少遊制太和五年文明太后來幸釣得鯉魚一雙長三尺以黃金鏁穿鰓放於池中後皆長五尺沉泛相隨正光元年五月五日天清氣爽聞池內鏘鏘聲水中驚沸須臾雷電晦冥有氣五道自池中屬於天久之乃滅波止水定唯見一魚化為龍矣又曰秦川宮昔非子到秦於此築宮室又曰廬山有三宮上宮在懸崖之表人所不及次宮在山巖下兩邊有陰陽溝有石羊馬夾道相對下宮在彭蠡湖際隋圖經曰大業十六年自江都還洛陽勑於汾州北臨汾水起汾陽宮即管涔山汾河源所出之處當盛暑之時臨河盥漱即涼風凜然如八九月其北多雨經夏罕有晴日一日之中倏忽而雨倏忽而晴晴雨未曾經日雖高嶺千仞嶺上居人掘地深二三尺即得清泉用之壽春圖經曰十宮在縣北五里長阜苑內依林傍澗踈逈跨𡵒隨地形置焉並隋煬帝立也曰歸鴈宮回流宮九里宮松林宮楓林宮大雷宮小雷宮春草宮九華宮光汾宮是曰十宮西京記曰通義坊唐高祖龍潛舊宅武德元年以為通義宮六年高祖臨幸大宴群臣引見鄰里父老班賜有差貞觀元年立為興聖尼寺焉又曰大明宮南接京城之北面西接京城之東北隅初高宗嘗患風痺以宮內湫濕屋宇擁蔽乃於此置宮司農少卿梁孝仁充使製造北據高岡南望爽塏視終南如指掌坊市俯而可窺東京記曰上陽宮在皇城西南東苑前苑東垂南臨洛水西亙穀水上元中韋機充使所造列岸脩廊連亙掘地得銅器似盆而淺中有隱起雙鯉之狀魚間有四篆字曰長宜子孫時人以為李氏再興之符高宗末年常居此宮以聽政也兩京記曰上陽宮西有西上陽宮兩宮夾穀水虹橋架逈以通往來楚辭曰魚鱗屋兮龍堂紫貝闕兮珠宮
