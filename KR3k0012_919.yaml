body:
  text: 羽族部五雞春秋運斗樞曰玉衡星散為雞周禮春官上大宗伯曰工商執雞鄭玄曰取其守時而動也禮記曲禮下曰祭宗廟之雞曰翰音又月令曰季冬之月雉雊雞乳又內則曰子事父母雞初鳴咸盥漱左傳宣下曰楚子為乘廣三十乘分為左右廣雞鳴而駕日中而説又成下曰晉與楚旦而戰見星未已子友命軍吏察夷傷補卒乘繕甲兵展車馬雞鳴而食唯命是聽又襄二荀偃令曰雞鳴而駕塞井夷竈唯余馬首是瞻又襄三齊莊公朝指殖綽郭最曰是寡人之雄也州綽曰君以為雄誰敢不雄然臣不敏平陰之役先二子鳴晉伐齊及平陰州綽獲殖綽郭最故自比於雞鬭勝而先鳴又襄五曰公膳日雙雞又昭五曰賓孟適郊見雄雞自斷其尾問之侍者曰自憚其犧也又昭六曰季郈之雞鬭季平子郈昭伯二家相近故鬭雞季氏芥其雞以芥子播其羽郈氏為之金距平子怒毛詩曰女曰雞鳴剌不説德也陳古義以剌今不説德而好色也女曰雞鳴士曰昧旦子興視夜明星有爛又曰君子于役不知其期曷其至哉雞棲于塒日之夕矣又緇衣曰風雨思君子也亂世則思君子不改其度風雨淒淒雞鳴喈喈既見君子云胡不夷風雨蕭蕭雞鳴膠膠既見君子云何不瘳風雨如晦雞鳴不已既見君子云胡不喜又雞鳴思賢妃也雞既鳴矣朝既盈矣匪雞則鳴蒼蠅之聲尚書牧誓曰古人有言曰牝雞無晨牝雞之晨惟家之索論語曰子路遇丈人以杖荷蓧止子路宿殺雞為黍而食之又曰子之武城聞絃歌之聲夫子莞爾而笑曰割雞焉用牛刀爾雅曰雞大者蜀蜀子雓未成雞曰僆絶有力奮雞三尺為鶤棲於杙為桀鑿垣而棲為塒郭璞注曰蜀雞也雓雛子名也今江東呼雞少者為健古之雞春秋説解辭曰雞為積陽南方之象火陽精物炎上故陽出雞鳴以類感也雞之為言隹也隹而起為人期莫寶也善為人制晏早之期春秋考異郵曰雞應旦鳴詩記曆樞曰候及東次氣發雞泄三號冰始泮卒于丑以成歲及東及於寅也承丑之季故謂之次氣也雞為畜陽也丑之季向晨鳴雞得其氣感之而喜故鳴也周書曰大寒之日雞始乳易通卦驗曰萬民聞雞鳴皆翹首結帶正衣裳史記曰子路性鄙好勇力冠雄雞佩假豚陵暴孔子孔子乃設禮義稍誘之子路乃委質請為弟子又曰孟嘗君至關關法雞鳴出客孟嘗君客之居下坐者有能為雞鳴遂發傳出又曰越巫立越祀而以雞卜上信之漢書曰徵昌邑王賀到濟陽求長鳴雞又曰昌邑王之立為皇太子私置雞豚以食又曰龔遂為渤海太守使人家養五雞又曰王奉先好鬭雞宣帝微時數與奉先會後即位以其女為婕妤立為皇后奉先封侯又曰方士曰益州有金馬碧雞之寶可祭祀致也宣帝使王褒往祀焉范曄後漢書曰河南樂羊子妻不知何氏女嘗有他舍雞謬入垣內姑盜殺食之妻對不食而泣怪問之妻曰自傷居貧使食他肉姑竟棄之後漢書曰范式字巨卿與汝南張元伯為友二人春到京以暮秋為期元伯以九月十五日殺雞炊黍以待巨卿母謂元伯曰相去千里汝何信之審也言未畢而巨卿至相隨升堂再拜母極悅九州春秋曰魏王入漢中討劉備不得進欲守復難意欲棄之乃發令云雞肋官屬不知主簿楊修曰夫雞肋棄之則可惜噉之無所得以比之漢中王欲去也白戒嚴王遂還吳録曰魏文帝遣使於吳求長鳴短鳴雞群臣以非禮欲不與孫權勑付使江表傳曰南郡獻長鳴承露雞南越志曰雞冠四間如蓮花鳴清聲徹也魏志曰馬韓國出細尾雞其尾皆五尺餘郭頒魏晉世語曰劉放孫資共典樞要夏侯獻曹肇心內不平殿中有雞棲樹二人相謂此亦久矣其能復幾指謂中書監劉放中書令孫資王隱晉書曰郤詵母病若車及亡不欲車葬而貧無以得馬乃養雞種蒜竭其方術喪過三年得馬八匹舉棺至冢晉書曰祖逖與劉琨俱為司州王簿情好綢繆共被同寢中夜聞雞鳴蹴琨覺曰此非惡聲因起舞又曰桓玄既被殺安帝反正其餘擁衆假號皆平桓氏遂滅元興中衡陽有雌雞化為雄八十日而冠萎及玄建國於楚衡陽屬焉自篡至敗凡八旬矣晉中興書曰殷浩北伐江逌為長史及丁零反叛浩令逌伐之乃取數百雞以長繩連之腳皆繫火一時驅放群雞駭散飛過塹集羌營皆燃因其驚亂縱兵擊之晉書庾征西翼書少時與右軍齊名右軍後進庾猶不分在荊州與都下人書云小兒輩賤家雞愛野雉皆學逸少書須吾下當比之又載記曰符朗善知味會稽王道子殺雞以食之既進朗曰此雞栖恆半露檢之驗焉晉書武帝嘗幸琅邪城宮人常從早發至湖北埭雞始鳴今呼為雞鳴埭南史曰齊鬱林王好鬭雞密買雞至數千價又曰傅琰字季圭為山陰令二野父爭雞琰問雞何食一云粟一云豆琰使破雞得粟罪言豆者魏收後魏書曰崔光字長仁東清河鄃人也正始元年夏有典事史元顯獻四足四翼雞詔散騎侍郎趙雍以問光光表曰翅足衆多亦群下相扇動之象雛而未大腳弱差小亦其勢尚微易制御也武帝覽之悅後數日而茹晧等並以罪失伏法於是禮光逾重又曰傅乾愛嗜雞肉葵菜食傅靈越乃為作之下以毒藥乾愛飯還而卒北史曰宋世良為清河太守發姦擲伏有若神明嘗有一吏休滿還郡食人雞豚又有一幹受人一帽又食二雞世良叱而語之吏幹叩頭伏罪於是上下震悚莫敢犯禁又曰齊彭城王浟為滄州刺史有隰沃縣主簿張達嘗詣州夜投人舍食雞羹浟察知之守令畢集浟對衆曰食雞羹何不償價直也達即伏罪合境號為神明三國典略曰齊長廣王湛即皇帝位於南宮大赦改元其日將赦庫令於殿門外建金雞宋孝王不識其義問於光祿大夫司馬膺之赦建金雞其義何也膺之曰案海中星占曰天雞星動當有赦由是帝王以雞為候唐書曰劉武周父匡徙家馬邑嘗與其妻趙氏夜坐庭中忽見一物狀如雄雞流光燭地飛入趙懷振衣無所見因而娠遂生武周為人驍勇善騎射莊子曰莊子謂惠子曰年溝之雞司馬彪注曰年溝鬭雞處三歲為秣秣魁帥也相者視之則非良雞也然而數以勝人者以狸膏塗其頭也雞畏狸故又曰越雞不能伏鵠卵魯雞固能矣司馬彪曰越雞小雞也魯雞大雞今蜀雞也列子曰紀渻子為周宣王養斗雞十日而問雞可鬭乎曰未也方虛驕而恃氣十日又問之曰未也猶疾視而盛氣十日又問之曰幾矣雞雖有鳴者已無變望之似木雞矣其德全矣異雞無敢應者燕丹子曰燕太子丹質於秦逃歸到關丹為雞鳴遂得逃歸尸子曰戰如鬭雞勝者先鳴韓子曰使雞司夜令狸執鼠皆用其能淮南子曰雄雞夜啼庫兵動而戎馬驚淮南萬畢術曰孤桃之象令雞夜鳴取孤桃南北行枝長三尺折以為象塗以三歲雄血夜居栖下戰國策曰秦惠王謂寒泉子曰蘇秦欺斃邑欲以一人智反覆山東之君夫諸侯之不可一猶連雞之不能俱止於栖也呂氏春秋曰善學者若齊王之食雞也食其距數千而後足又曰白圭謂魏王曰市丘之鼎以烹雞多洎之則淡而不可食市丘魏邑肉汁曰洎少洎之則焦而不熟然而視之蝺焉羹無所可用蝺者齲韓詩外傳曰田饒為魯哀公曰夫雞平頭戴冠者文也足傅距者武也敵在前敢鬭者勇也見食相告者仁也守夜不失時者信也雖有五德猶日瀹而食之者何也以其所從來近也神異經曰東方有人長七丈頭載雞朝吞惡鬼三千暮吞三百名黃父又名食邪以鬼為飯以霧為漿也西京雜記曰成帝時交址越嶲獻長鳴雞即下漏驗之晷刻無差長鳴雞一鳴一食時不絶長距善鬭崔豹古今注曰雞一名燭夜列仙傳曰祝雞翁者雒陽人也居尸鄉北山下養雞皆有名字千餘頭暮栖樹晝放散食欲取呼名即至販雞及子得千萬錢輒置錢去論衡曰傳書言淮南王得道畜皆仙犬吠天上雞鳴雲中陳子要言棄晨雞犬俟鳳警亦猶棄當世之實才須故人之執政也太元經曰雌雞鳴晨雄雞宛頸隋侯墮井河伯除川風俗通曰呼雞朱朱俗説雞本朱公化而為之今呼雞者朱朱也謹桉説文解喌喌二口為歡州其聲也讀若祝祝者誘致禽畜和順之意喌與朱音相似耳又曰臘除夕以雄雞著門上以和陰陽按今人卒病皆殺雄雞傅其心病風者雞散治之東門雞頭治蠱信善也異苑曰朱文繡與羅子鍾為友俱仕於梁繡既死羅鍾哭之其夜俱亡梁南七里有雞山葬繡於其中北九里有雉澗埋鍾於其內繡神靈變為雞鍾魂魄化為雉清鳴哀響來往不絶故詩曰雞山別飛響雉澗和清音荀悅申鑒曰覩孺子之驅雞而見御民之術孺子之驅雞急則驚緩則滯馴而安之然入門嵇康宅無吉凶論曰天同栖之雞一攔之羊賓至而有死者豈異之哉幽明録曰晉兗州刺史沛國宋處宗嘗買得一長鳴雞愛養甚至栖籠著窗間雞遂作人語與宗談語極有言致終日不輟處宗因此言功大進越絶書曰雞山勾踐以畜雞將伐吳以食死士也吳越春秋曰婁門外雞陂墟者吳王牧雞處西河記曰涼州罪人於市將刑忽有一白雄雞飛於人邊請命引頸長鳴伏地向吏驅之去輒來刺史張義免其坐王子年拾遺記曰太初二年月氏貢雙頭雞四足一尾鳴則俱鳴又曰含塗國去王都七萬里人善服鳥獸雞犬皆使能言郭子撗洞冥記曰有遠飛雞夕則還依人曉則絶飛四海外朝往夕還裴玄新言曰正朝縣官殺羊懸其頭於門又磔雞以副之俗説以厭厲或以問河南任君任君曰是月土氣上升草木萌動羊齧百草雞啄五榖故殺之以助生氣崔實四民月令曰十二月東門磔白雞頭可以合藥本草經曰丹雞一名載丹又曰烏雄雞主補中其血治踒折骨凡雞肉不食小兒令生蛔蟲又令消髓葛洪方曰五月七日深井深冢多有毒氣不可入也宜先以雞毛試投井中直下無毒毛回四邊不可入也師曠占曰長吏乘車出入行步道上有雞飛集車上者雄遷雌去雜五行書曰欲求婦取雄雞兩毛燒著酒中飲之所求必得用戊子日此是天地合日必得三往不得女當死龍魚河圖曰玄雞白頭食病人雞有六指亦殺人雞有五色殺人焦贛易林旅之爻曰十雉百雛常與母俱抱雞捕虎誰者為怙又歸妹之無妄曰雞方啄粟為狐所逐走不得息惶懼喘息又歸妹之損曰爭雞失羊亡其金囊利得不長又巽之遁曰三雞啄粟十雛從養飢鵝卒擊亡其兩寂廣志曰雞有胡溝五指金骹及翹之種大者蜀小者荊白雞金體者美舊并州所獻吳中送長鳴雞長倍於常雞永昌郡無雞異物記曰伺潮雞潮水上則鳴博物志神農本草經曰雞卵可以作虎魄法取茯苓雞卵黃白渾雜者熟煮之及尚軟隨意刻作物形以苦酒漬數宿既堅內著粉中假者乃亂真此世所恆用作無不成也干寶搜神記曰安陽城南有亭宿者輒死書生明術數入亭宿端坐誦書夜半有人著皂衣來戶外呼亭主此有宿客耶應曰然喑嗟而去須臾有赤衣問如前生問曰向黑衣者誰答曰北舍母豬赤幘者誰答曰西舍老雄雞也汝是誰答曰我是老蠍也明旦掘之得蠍大如琵琶身長四尺并及豬雞亭遂安靜劉欣期交州記曰長鳴雞出日南南州異物志曰狼盲之雞特稟異聲狼盲地名白澤圖曰老雞能呼人姓名殺之則止又曰雞有四距重翼者龍也殺之震死夢書曰雞為武吏有冠距也夢見雄雞憂武吏也衆雞入門吏所捕也群鬭舍中驚兵怖也論墓書曰養白雞令識其主聲形以五月五日九月九日任意用五色綵長五寸係雞頸將雞於名山放雞著山仰頭呪曰必存鳴晨雞心開悟沈懷遠南越志曰雞冠四開如蓮花鳴聲清徹也荊楚歲時記曰正月一日三元之日雞鳴而起先於庭中爆竹帖畫雞或斫鏤五彩及雞於戶上風土記曰乃有雞子五薰練形正旦皆會生吞雞子一個謂之練形又晨噉五辛以助五藏氣吳録曰合浦朱虛縣有山雞黑色樹栖魏志曰平原太守劉邠印囊及山雞毛著器中使管輅筮輅曰內方外圓五色成文含寶守信出則有章此即囊也高嶽巖巖有鳥朱身羽翼玄黃鳴不失晨此山雞毛也異苑曰山雞愛其毛羽映水則儛魏武時南方獻之帝欲其鳴舞而無由公子蒼舒令人取大鏡著其前雞鑑形而儛不知止遂至死韋仲將為之賦甚美博物志曰山雞有美毛自愛其毛終日映水目眩則溺臨海異物志曰山雞狀如人家雞安陽諸山中多此雞恃距好鬭當時以家雞置其處取即可得南越志曰曾城縣多鵔鸃鵔鸃山雞也利距善鬭世以家雞鬭之可禽也光色鮮明五采炫耀辛氏三秦記曰陳倉山在太白之西去長安八百里上有石雞與山雞各別趙高使燒山山雞飛去石雞不去晨鳴山頭聲聞三十里或云是玉雞陳倉城上有神雞人取不得雄者王雌者霸穆公得雌故霸山海經曰鷩雉一名山雞養之穰火左思吳都賦曰山雞歸飛而來栖顧愷湘中賦曰陽鸞山雞陸機與弟書曰天淵池養山雞甚可嬉周書曰成王時蜀人獻文翰者若皇雞鳥有文采者皇雞似鳧冀州謂之澤時爾雅曰翰天雞也郭璞曰翰雞赤羽見周書説文曰翰天雞也一名晨風玄中記曰東南有桃都山上有大樹名曰桃都枝相去三千里上有天雞日初出照此木天雞即鳴天下雞皆隨之鳴臨海異物志曰杉雞黃冠青綏常在杉樹下頭上有長黃毛頭及頰正青如垂緌南越志曰新夷縣鳥多杉雞尹子曰楊州之雞裸無毛南越志曰高興縣多容雞如家雞五采至則年穰孫綽望海賦曰石雞清響以應潮慧軀輕近以遠潔石雞形似家雞而灰色在海中山上每潮水將至輒鳴相應若家雞司晨也商人欲知水道往來以至此為候也周景式廬山記曰白水南行十餘里有雞山傍有大山竦立上有石雞冠距如生道士李鎮於此下住常寶玩之雞一旦忽摧毀鎮告人曰雞卒如此吾其終乎因與親知訣別後月餘果卒似知命云
