body:
  text: 飲食部十七糜粥周書曰黃帝始烹穀為粥記曰仲秋養衰授几杖行麋粥飲食行酒賜也又曰公叔文子卒其子請謚於君君曰昔者衛國凶飢夫子為粥與國之餓者是不亦惠乎又曰悼公之喪季昭子問於孟敬子曰為君何食悼公魯哀公之子昭子康子之曾孫名強敬子武伯之子名捷敬子曰食粥天下之達禮也又曰穆公之母卒穆公魯哀公之曾孫使人問於曾子曰如之何問居喪之禮曾子曾參之子名申對曰申也聞諸申之父曰哭泣之哀齊斬之情饘粥之食自天子達子喪父母尊卑同又曰親始死三日不舉火故鄰里為之麋粥以飲食之又曰君之喪子大夫公子眾士皆三日不食子大夫公子食粥納財朝一溢米莫一溢米食之無筭又曰大夫之喪主人室老子姓皆食粥左傳曰晉人執衛侯歸之于京師寘諸深室甯子納橐饘焉饘粥餅也又曰齊晏桓子卒晏嬰麤縗斬苴經帶杖菅屨食鬻君倚廬寢苫枕草其老曰非大夫之禮也又曰正考父鼎銘云饘於是粥於是以餬余口饘餼也爾雅曰鬻糜也薄糜餬饘也麋也釋名曰麋煮米使麋爛也粥濯於麋粥粥然也寒粥米投寒水中也史記曰左師觸龍見趙太后曰食得無衰乎太后曰恃粥耳又曰陽盧侯趙章病淳于意診其脈曰迵音洞風迵風者五日而死後七日乃死曰其人嗜粥故中藏實實故過期後漢書曰光武為王郎所追至無蔞亭馮異上豆粥一椀明日上謂諸將曰昨得公孫豆粥飢寒俱解又曰樊儵事後母至孝及母卒哀思過禮毀病不自支世祖常遣中黃門朝暮送饘粥東觀漢記曰曹褒遷將作大匠上聞襃病使致醫藥糜粥謝承後漢書曰南陽陸續仕郡戶曹史時飢荒太守尹興使續於都亭賦民饘粥續悉令簡閱其人訊以名氏事畢興問所食幾何續因口說六百餘人皆分別姓字無有差謬興異之漢獻帝傳曰帝在長安穀一斛五十餘萬帝使侍御史侯汶出太倉米豆為飢民作糜粥死者不絕帝疑廩賦不實勑取米豆五升於御前作糜得滿兩盆詔杖汶五十九州春秋曰臧洪為青州刺史為袁紹所圍糧食已盡初尚掘鼠煮筋角後無可復食廚有米三升主簿啟進內稍以為糜粥洪歎曰吾獨食此何為命作薄粥與眾共啜之魏末傳曰曹爽等令李勝辭司馬宣王并伺察焉宣王見勝自陳無他勞効橫蒙聖恩當為本州詣閤拜辭不悟加恩得蒙引見宣王令兩婢侍衣衣落復上指口言渴主飲婢進粥宣王持杯飲粥粥皆流出沾胸勝愍然者久之吳錄曰李壽作糜以食飢者而不自名又曰朱桓除餘姚長遇疫癘穀食荒貴桓分部良吏隱親醫藥食粥相繼士民感戴之王隱晉書曰賊杜弢下蜀蜀人飢陶侃多作粥以待之於是悉降晉安帝紀曰桓玄敗走左右進以麤粥咽不能下郭林宗傳曰林宗嘗止陳國文學見童子魏德公知其有異德公求近其房止供給洒埽林宗嘗不佳夜中命作粥德公為之進焉林宗一啜怒而呵之曰高明為長者作粥不如意使沙不可食以杯擿地德公更為粥三進三呵德公姿無變容顏色殊悅林宗乃曰始見子之面今乃知卿心遂友善之卒為妙士宋書曰戴顒與兄教並隱遁有名中書令王綏嘗攜客之㪍等方進豆粥綏曰聞卿善琴試欲一聽不荅綏恨而去又曰何子平大明末東土飢荒繼以師旅家有大喪八年不得營葬晝夜號哭常如袒括之日冬不衣絮暑避清涼一日以數合米為粥不進鹽菜齊書曰宣考陳皇后生高帝高帝年二歲乳人乏乳后夢人以兩甌麻粥與之覺而乳驚因此豊足梁書曰昭明太子統母丁貴殯薨水漿不入口每哭慟絕武帝命中書舍人顧恊宣旨曰毀不滅性聖人之制不勝喪比於不孝有我在那得自毀如此耶即強進飲粥太子奉勑乃進數合自是至葬日進麥粥一升武帝又勑曰聞汝所進食過少轉羸瘦我比更無病正為汝胸中亦圮塞成疾故應加饘粥不使我恒懸心雖屢奉勑勸逼終喪日止一溢米不嘗菜果之味又曰張弘策幼以孝聞母嘗有疾五日不食弘策亦不食母強為進粥弘策乃食母所餘又曰蕭景為南兗州刺史會年荒計口振恤又為饘粥於路以賦之又曰任昉為義興太守歲荒散私俸米豆為粥活三千餘人又曰王志天監初為丹陽尹時年飢每旦為粥於郡門以賦百姓眾悉稱惠又曰劉覽字孝智十六通老易位中書郎以所生母憂廬于墓再朞不嘗鹽酪食麥粥而已又曰有河南孝廉秦綿遭母喪送葬不忍復還鄉人為作菴仍止其中若遇有米食粥無米食菜而已又曰庾沙彌母劉氏亡水漿不入口累日初進大麥薄飲經十旬方為薄粥終喪不食鹽酢陳書曰張昭弟乾字玄明聰敏好學亦有至性父卒兄弟日唯食一升麥屑粥後魏書曰崔浩道武季年威風嚴峻官省左右以微過得罪莫不逃避隱匿自下皆變浩獨恭勤不怠或終日不歸帝知之輒命賜以御粥又曰薛真度為豫州刺史景明初豫州大飢真度輒表曰別出倉米五十斛為粥救其甚者詔曰真度所表甚有憂濟百姓之意宜在極卹也又曰文明太后崩孝文五日不食楊椿諫曰聖人之禮毀不滅性縱陛下欲自賢於萬代其若宗廟何帝感其言乃一進粥又曰楊逸為光州刺史時災儉連歲逸欲以倉粟賑給而所司懼罪不敢逸曰國以人為本人以食為命假令以此獲戾吾所甘心遂出粟然後申表右僕射元羅已下謂公儲難闕並執不許尚書令臨淮王或以為宜貸二萬詔聽貸五萬逸既出粟之後其老小殘疾不能自存活者又於州門造粥飼之將死而得濟者以萬數帝聞而善逸又曰韋朏字遵顯少有志業年十八辟州主簿時屬歲儉朏以家粟造粥以飼飢人所活者甚眾又曰房景遠字升遐重然諾好施與儉分贍宗親又於通衢以粥食餓者存濟甚眾平原劉郁行造兗境忽遇劫賊已殺十餘人次至郁郁曰與君鄉近何忍見殺賊曰若言鄉里親親是誰郁曰齊州主簿房陽是我姨兄陽是遠小字賊曰我食其粥得活何得殺其親遂還衣服蒙活者二十餘人又曰李搔妹曰法行幼出家為尼後遭時大儉施糜粥於路北齊書曰李士謙遇年飢多有死者士謙罄家資為之糜粥賴以全活者萬計後周書曰皇甫遐字永賢河東汾陰人性至孝遭母喪乃廬於墓側食粥枕苫櫛風沐雨形容枯顇家人不識隋書曰陸讓母者上黨馮氏女也性仁愛有母儀讓即其孽子也仁壽中為番州刺史贓貨狼籍為司馬所奏上遣使按之皆驗乃命公卿百僚議之咸曰讓罪當死詔可其奏讓將就刑馮氏蓬頭垢面詣朝堂數曰無汗馬之勞致位刺史不能盡誠奉國以荅鴻恩而返違犯憲章贓貨狼籍若言司馬誣汝百姓百官不應亦皆誣汝言至尊不憐愍汝百姓何故治書覆汝汝豈誠臣豈孝子不誠不孝何以為人於是流涕嗚咽親持盂粥勸讓令食既而上表求哀詞情甚切上愍然為之改容獻皇后甚奇其意致請於上遂下詔可減死為民太公金匱曰武王伐紂都洛邑而雪深丈餘不知何五大夫乘馬車從兩騎止王門外師尚父使人持一器粥出開門而進曰先生大夫在內方對天子未有出時天寒故進熱粥以御寒莊子曰顏回有負郭之田五十畝足以供饘粥七略曰宣帝詔徵被公見誦楚辭被公年衰母老每一誦輒與粥風俗通曰范滂父字叔矩遭母憂既葬之後饘粥不贍司徒召滂滂曰老父年尊絕意世仕遂不得避也魏武遺令曰吾夜半覺小不佳至明日飲粥汗出服當歸湯譙子法訓曰或曰母有疾使其妻為粥者妻不可以刀擊之夷其面可以為孝乎曰以刀刃妻其親必駭而有憂及之何有於孝郭子曰許允為吏部郎多用其鄉里帝遣虎賁收之婦云無憂尋還作粟粥待之語林曰石崇為客作豆粥咄嗟便辦王愷乃密貨崇帳中都督曰豆難煮唯豫作熟豆以白粥投之續搜神記曰劉他茍蒙在夏口忽有鬼來喜偷食劉即於他家煮治葛取二升汁蜜齎還家向夜令舉家糜食餘一甌因寫治葛汁著中於几上以甕覆至人定後聞鬼發甕啖糜須臾在屋頭吐至四更中寂然於此遂絕也徐廣晉記曰愍帝建興四年京城糧盡屑麴為粥以供帝食錄異傳曰周時尹氏貴盛五世不別會食數千人遭飢荒羅鼎作糜啜之聲聞數十里鄴中記曰并州之俗以冬至後百五日介子推斷火冷食三日乾粥中國為寒食涼州異物志曰高昌僻土有異於華寒服冷水暑啜羅闍闍受車切此郡人作糜粥啜之俗號闍也南越志曰陵廬城中有井半清半黃黃者甜滑宜作粥色如金似灰汁甚芬馨世說曰郄嘉賓三伏之月詣謝公炎暑重赫雖當風交扇猶霑汗流離謝著故練衣食熱白粥郄謂謝曰自非君體幾不堪此又曰賓客詣陳大丘宿使元方季方炊太丘問炊何遟留元方長跪曰君與客語乃俱竊聽炊忘著米今皆成糜太丘曰爾頗有所識不二子長跪俱說言無遺失大丘曰如此俱成糜自可何必飯耶俗說曰王東亭嘗之吳郡就汰公宿汰公設豆藿糜自噉一大甌東亭有難色汰公強進半甌王薈別傳曰薈為吳郡內史其年太飢薈出私財為百姓饘粥風土記曰天正日南黃鍾踐長粥饘追萌微納休昌是以陽始牙動為饘粥以養幼扶微俗尚以赤豆為糜所以象色也廣志曰遼東赤梁魏武帝以為御粥天文要集曰玉井主粥廚殷康集曰康為武康縣教曰郭邑居民有死喪者可令送兩坩粥時鏡新書曰齊魏收當寒食餉王元景與收書曰始知令節須御麥粥加之以糖彌覺香冷荊楚歲時記曰正月十五日豆糜加油骨其上以祠門戶魏武帝苦寒行曰行行日已遠人馬同時飢擔橐以取薪斧冰持作糜唐新語曰李勣既貴其姉病必親為煮粥火爇其鬚姉曰僕妾多何自苦若是勣對曰豈為無人耶顧姉年老勣亦年老雖欲久為姉煮粥其可得乎膏糜國語曰勾踐載稻與脂於舟以行稻有膏糜國之孺子之遊者無不餔也無不歠也必問其名為後將用之續齊諧記曰吳縣張成夜起忽見一婦人立於宅東南角舉手招成成便往就之婦人曰此地是君家蠶室我即是此地之神明曰是正月半宜作白粥泛膏於上以祭也當令君蠶桑百倍言絕失所成如言為作膏白粥自此已後年年大得蠶今世人正月半作膏糜像此糝周易曰鼎折足覆公餗鄭玄曰糝謂之餗震又為竹竹萌曰荀荀者餗之米也詩云其餗唯何周禮曰醢人掌羞豆之實酏食糝食記曰犬羹莬羹和糝不蓼凡羹齊宜五味之和朱屑之糝蓼則不也又曰糝取牛羊豕之肉三如一小切之與稻米稻米二肉一合以為餌煎之此周禮糝食也說文曰糂以米和羹也糂與糝同宗躬孝子傳曰桑虞喪父十四日食百粒糝藜藿墨子曰孔子窮陳蔡之間藜蒸不糂𥻨通俗文曰煮米𥻨食經曰作糄法近水則澀麷蕡周禮曰籩人掌朝食之籩其實麷蕡白黑形鹽蕡蕡枲實也鄭司農云麷麻曰蕡稻曰白黍曰黑鄭玄曰今河問以北煮穜麥賣之名曰儀禮曰麷蕡坐設于豆西當外列麷在東方婦贊者執白黑以授主婦又曰主婦薦韭菹醢坐奠于筵前醢在南方婦贊者執二籩麷蕡以授主婦主婦不興受之奠麷于醢南蕡在麷東禮曰芼羹菽麥蕡稻黍梁麮荅頡解詁曰麮煮麥也說文曰麮麥甘粥也釋名曰煮麥曰麮麮亦齲也熟煮之齲壞也急就曰甘麮殊美奏諸君肺䐣說文曰䐣切熟肉內於血中和也釋名曰肺䐣饡也全米糝之如膏鑽也盧湛祭法曰四時祠皆用肺䐣血䘓說文曰羊血曰䘓釋名曰血䘓以血作之增其酸豉之味使甚苦以消膏而加菹其中亦以消酒也盧湛祭法曰春夏秋祠皆用輱血熱洛河唐書曰安祿山思順翰並來朝玄宗使驃騎太將軍內侍高力士及中貴人供奉官於京城東駙馬崔惠童池亭宴會使射生官射鮮鹿取血煮其腸謂之熱洛河以賜之為翰好故也羗煮搜神記曰羗煮貊炙翟之食也自太始以來中國尚之戎翟侵中國之前兆也胡飯續漢書五行志曰靈帝好胡服胡飯京師貴戚皆競為之
