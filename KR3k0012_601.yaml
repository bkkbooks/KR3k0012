body:
  text: 文部十六思疾漢書曰枚皋年十七上書自陳乘之子上得大喜武帝春秋二十九乃得皇太子皋與東方朔作皇太子生賦皋為文疾受詔輒成司馬相如善為文而遲故所作少亦具賦門中又曰淮南王安作內篇新出上愛祕之使作離騷傳且受詔日食時上魏志曰陳思王植年十餘歲讀誦持論及辭賦數萬言善屬文太祖嘗視其文謂植曰汝倩人耳植跪曰出言為論下筆成章願當面試奈何倩人時銅雀臺新成太祖悉將諸子登臺使各為詩植援筆立成太祖異之文帝嘗欲害植以其無罪令植七步為詩若不成加軍法植即應聲曰煮豆燃豆箕豆在釜中泣本是同根生相煎何太急文帝善之又曰王粲善屬文舉筆便成無所改定人常以為宿構齊書曰蕭文琰蘭陵人丘令揩吳興人江珙音拱濟陽人竟陵王子良嘗夜集學士刻燭為詩四韻者刻一寸以此為率文琰曰頓燒一寸燭成四韻詩何難之有乃與丘令揩江珙等共打銅鉢立韻響滅則詩成皆可觀覽又曰高祖目裴子野曰其形甚弱其文甚壯俄又勑為書喻魏相文其夜受旨子野謂可待旦方奏未之為也及五鼓勑促令送上子野徐起操筆昧爽便就既奏高祖深嘉焉自是凡文檄皆令具草南史曰朱異音怡又音異遷散騎常侍異容貌魁梧能舉止雖出自諸生甚間軍國故實自周捨卒後異代掌機密其軍旅謀謨方鎮改換朝儀國典詔誥勑書並典掌之四方表疏當局簿領咨詳請斷填委於前異屬辭落紙覽事下議縱橫敏贍不暫停筆頃刻之間諸事便了又曰蔡景曆陳武帝鎮朱方素聞其名以書要之景歷對使人答書筆不停綴文無所改帝得書甚加欽賞即日板授北府中記室參軍崔鴻十六國春秋南涼録曰禿髮傉內沃切檀子禮年十三命為高昌殿賦援筆即成影不移漏傉檀覽而異之擬於曹子建北齊書曰魏收巨鹿人以文章見知曾奉詔為封禪文收對曰封禪者帝之盛事昔司馬長卿尚絶筆於此以臣下材何敢擬議臣雖愚淺敢不竭作乃於御前下筆便就不立藁草文將千言黃門侍郎賈思問侍立深奇之白帝曰雖七步之才無以過此自武定二年以後國家大事詔命軍國文詞皆收所作每有警急不停有同宿構速敏之工邢溫之所不逮梁書范雲少機警其識具善屬文便尺牘下筆輒成未嘗定藁時人疑其宿構蕭介傳曰初武帝延後進二十餘人置酒賦詩藏盾以詩不成罰酒一斗盾飲盡顏色不變言笑自若介染翰便成文無加點帝兩美之曰臧盾之飲蕭介之文即席之美也三國略曰高澄嗣渤海王聞謝挺徐陵來聘遣中書侍郎陸昂於滑臺迎勞於席賦詩昂必先成雖未能盡工亦以敏速見美梁庾肩吾少勤學能鼓琴善屬文宋子仙破會稽購得肩吾謂之曰吾昔聞汝能作詩今可作若能當貰汝命肩吾便操筆立成詩曰髮與年俱暮愁將罪共深聊持轉風燭暫映廣陵琴子仙乃釋之又曰陰鑑字子堅梁右衛將軍子春之子也徐陵言之於陳主陳主召使賦新成安樂宮鏗援筆便就陳主甚歎賞之北史曰隋韋正玄舉秀才楊素志在試退乃手題使擬司馬相如上林賦王褒聖主得賢臣頌班固燕然山銘張載劍閣銘白鸚鵡賦謂曰我不能為君住宿可至未時令就玄正及時並了素讀數遍大驚隋書曰楊素周武帝以為車騎大將軍儀同三司漸見禮周帝命素為詔書下筆立成詞義兼美帝嘉之顧謂素曰善自勉之勿憂不富貴素應聲答曰臣但恐富貴來逼臣臣無心圖富貴唐書曰太宗征遼岑文本卒于行驛召許敬宗令草駐蹕山破賊詔書敬宗立於馬前俄碩而就詞甚典麗深見嗟賞唐賀知章晚年尤加縱誕無復規撿自號四明狂客遨遊里巷醉後屬詞動成卷軸文不加點咸有可觀又曰王勮其御切長壽中纍除太子典膳丞知鳳閣舍人事時壽春王成器衡陽王成義五王初出閣同日受册有司撰儀注不載册文及百寮在列方知闕禮宰臣相顧失色勮立召小吏五人各執筆口授分授寫一時俱畢詞理典贍時人歎服之尋除鳳閣舍人兼弘文館學士又曰韋承慶遷鳳閣舍人兼掌天官選事承慶屬文敏捷雖軍國大事下筆輒成未嘗起草又曰遜逖幼而英俊文思敏速始年十五謁雍州長史崔日用日用小之令為土火爐賦握翰即成辭理典贍曰用覽之駭然遂為忘年之交以是價譽益重又曰玄宗度曲欲造樂府新詞亟召李白白嗜酒已臥於肆矣召入以水灑面即令秉筆頃之成十餘章帝頗嘉之又曰韋溫綬之子也以書判拔萃調補祕書省校書郎時綬致仕田園聞溫登第愕然曰判入高等在群士之上得非交結權幸而致耶令設席於庭自出判目試兩節溫命筆即成綬喜曰此無愧也李端登進士第工詩大曆中與韓翃錢起盧綸等文詠唱和馳名都下號大曆中十才子時郭尚父少子曖尚代宗升平公主賢明有才思尤喜詩人而端等十人多在曖之門下每宴集賦詩公主坐視簾中詩之美者賞曖因拜官會十子曰詩先成者賞時端先獻警句云薰香荀令偏憐小傳粉何郎不解愁主即以百縑賞之錢起曰李校書誠有才此篇宿構也願賦一韻正之請以起姓為韻端即襞箋而獻曰方塘似鏡草芊芊初月如鉤未上弦新開金埒教調馬舊賜銅山許鑄錢曖曰此愈工也令狐楚為太原從事自掌書記至節度判宮歷使下侍御史楚才思俊麗德宗好文每太原奏至能辦楚之所為頗稱之鄭儋都含切在鎮暴卒不及處分從事軍中喧譁將有急變中夜忽十數騎持刃迫楚至軍門諸將環之令草遺表楚在白刃之中榒管即成讀示三軍無不感泣軍情乃安自是聲名益重唐中書舍人陸扆文思敏速初無思慮揮翰如飛文理具愜同舍服其能天子顧待特異嘗金鑾作賦命學士和扆先成帝覽而唴挹之曰朕聞貞元時有陸贄吳通玄兄弟能作內廷文書後來絶不相繼今吾得卿斯文不墜矣又曰李巨川乾符中應進士屬天下大亂流離奔播切於祿仕乃以刀筆從諸侯府王重榮鎮河中辟為掌書記時車駕在蜀賊據京師重榮匡合諸潘叶力彌寇軍書奏請堆案盈几巨川文思敏速翰動如飛傳之藩鄰旡不聳動重榮收復之功巨川之助也及重榮為部下所朝議罪參佐貶為漢中掾時楊守亮帥興元素知之聞巨川至喜謂客曰天以李書記遺我也即命管記室纍遷幕職金樓子曰劉備叛走曹操使阮瑀為書與備馬上立成有以此為能者吾以為兒戲耳文士傳曰劉楨坐廚人進瓜楨為賦立成又曰潘尼曾與同僚飲主人有流璃盆使客賦之尼於坐立成國朝傳記曰李德林為內史令與楊素共執朝政素功臣豪侈後房婦女錦衣玉食千人德林子百藥夜入其室則其寵妾所召也素拘執於庭將斬之百藥年未二十儀神俊秀素意惜之曰聞汝善為文所作詩自敘稱吾意者當免汝死解縛授以紙筆立就素覽之欣然以妾與之并資從數千萬楊德祖答臨淄侯箋曰又嘗親見執事握牘持筆有所造作若成誦在心借書於手曾不斯須少留思慮仲尼日月無得而踰焉修之仰望殆如此矣且以對鶡而作暑賦彌日而不獻見西施之容歸憎其白者也曹植曾作鶡鳥賦命修作修辭不為也又命作暑賦修雖造終日不敢獻思遲西京雜記曰枚皋文章敏疾長卿製作淹遲而盡延譽然長卿首尾溫麗枚皋時有纍句故知疾行無善迹矣揚子雲曰軍旅之際戎馬之間飛書走檄而用枚皋廊廟之下朝廷之中文高典册而用相如後漢書曰張衡字平子少遊大學善屬文太始時天下自公侯以下莫不踰侈衡乃擬班固兩都遂作二京賦因以諷諫思十年始成魏志曰甘露二年帝幸辟雍會命群臣賦詩侍中和逌音由尚書陳騫等制作稽留有司奏免官詔曰吾以門昧愛好文雅廣延詩賦以知得失乃爾紛紜良用惻然乃共原逌等晉書曰左思字太沖齊郡臨淄人思少而好學年四十未仕潛思為三都賦十年而成貴勢之家競傳相寫又案郭伯通衛瓘為思傳曰思為三都改易死乃止宋書曰顏延之與陳郡謝靈運俱以詞彩齊名而遲速懸絶文帝嘗各勑擬樂府北上篇延之受詔輒成靈運久之乃就梁書曰武帝宴壽光殿令劉孺張率賦詩時率與孺並未及成帝取孺手板戲題之曰張率東南美劉孺洛陽才覽筆便應就何事久遲回隋書曰薛道衡授內史侍郎加上儀同三司道衡每至構文必隱空齊踏壁而臥聞戶外有人便怒其沉思如此李翰天寶中寓居陽翟為文精密用思苦澀常從陽翟令皇甫曾求音樂每思涸則奏樂神逸則著文唐李建字構直德宗聞其名擢充翰林學士未幾罷為它官高郢為御史大夫表授殿中侍御四遷兵部郎中知制誥自以草詔思遲不願當其任談藪曰盧思道與庾知禮作詩知禮詩成而思道未就知禮曰盧詩何太春日思道曰自許編苫疾如他織錦遲
