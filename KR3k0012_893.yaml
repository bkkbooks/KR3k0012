body:
  text: 獸部四虎下英雄記曰曹公擒呂布顧劉備曰玄德卿為坐上客我為降虜繩縛我急獨不可一言耶操曰縛餓虎不得不急乃命緩縛布吳志曰呂蒙欲從軍母止之蒙曰不探虎穴安得虎子又曰孫權每田獵常乘馬射虎虎嘗突攀持馬鞍張昭變色而諫權謝昭曰年少慮事不遠然猶不能已乃作射虎車又曰孫權親乘馬射虎庱亭慶音攄淩馬為所傷權投以雙戟虎即廢魏名臣奏曰世祖時有獻虎者問虎何食對曰食肉詔曰下民厭糠何忍以肉食虎乃命虎賁射之斯實得計於時而名垂於後晉令曰諸有虎皆作檻穽籬柵皆施餌捕得大虎賞絹三匹虎子半之魏略曰文帝欲受禪郡國奏白虎二十七見博物志曰江陵有人化為虎俗云猛虎化為人好著紫葛衣足無踵有五指者人化為虎又曰虎知衝破又能畫地卜今人有畫物上下者推其奇偶謂之虎卜孝子傳曰楊香其父為虎噬忿憤搏之父免害又曰郭文舉為虎探鯁骨虎常銜鹿以報之括地圖曰越俚之民老者化為虎王孚安成記曰平都區寶者後漢人居父喪鄰人格虎虎走趨其孤廬中即以蓑衣覆藏之鄰人尋跡問寶寶曰虎豈有可舍而藏之乎此虎後送禽獸以助寶祭孝慈之志通於神明由是知名裴淵廣州記曰興寧縣義熙四年忽有數十大鳥大如鶖少焉化為虎周景式廬山記曰有嫗事康王廟林中有一虎祠祭輒以餘肉及骨與之有人惡畏之嫗使避之人去復來陳留耆舊傳曰王業字子春為荊州刺史有德政卒於支江有三白虎低頭曳尾宿衛其側及喪去踰州境忽然不見民共立碑文號曰支江白虎竹林七賢論曰王戎幼而清秀魏明帝時於宣武場上為欄鬥虎使力士逆與之搏縱人觀之戎年七歲亦往觀焉虎乘間薄欄而吼其聲震地觀者無不僻易顛仆戎安然不動帝於閣上見之使問姓名而異焉殷氏世傳曰亮字子華少學公羊十四傳祖父業多所綜覽舉孝廉到陽城遇虎爭一羊亮乃按劍瞋目斬羊腹虎乃各以其半羊去述異記曰漢中有虎生角道家云虎千歲則牙蛻而角生漢宣城郡守封邵一日忽化為虎食郡民民呼曰封使君因去不復來故時人語曰無作封使君生不治民死食民異苑曰太元末徐桓出門仿佯見一女子因言曲相調便要桓入草中桓說其色乃隨去女子忽然變成虎負桓著背上徑向深山其家左右尋覔唯見虎跡旬日虎夜送徐桓著門外又曰樊陽鄭襲太元中為廣陵太守閣下騶忽如狂奄失其所經日裸身吟呼膚血流灕問其意故云社公命令作虎以班皮衣之辭以執鞭之士不堪虓躍神怒還便剝皮皮以著肉瘡毀慘痛旬日乃差又曰都陽桓闡以太元十九年殺犬祭鄉里綏山煮肉不熟神怒即下教於巫曰桓闡以生肉貽我當謫令自食也其年便作虎作虎之始見人以班衣衣之即能跳透噬逐又曰彭城劉黃雄以太元中為京佐被使還都路經竹里停於邏宿此邏多虎劉極自防衛繫馬於戶前手刀布於地上宵中士庶同睡虎乘間跳入獨取劉而去又曰邵都梁馮恭永初中醉臥於山路夜有虎來以頭枕其背恭中宵展轉之以手搏之復大寢向曉始醒猶見虎蹲在腳後若有宿命非智力所加也又曰扶南王范尋常畜生虎及鰐魚若有訟未知曲直便投與魚虎虎不噬則為有理穢貊之人祭虎為神將有以也幽明録曰桓大司馬鎮赭圻時有何參軍晨出行於田野中溺死人髑髏上還晝寢夢一婦人語云君是佳人何以見穢污暮當令知之是時有暴虎人無敢行夜出者何常穴壁作溺穴其夜趨穴欲溺虎忽囓斷陰莖即死又曰晉孝武帝母李太后本賤人簡文無子曾遍令善相者相宮人李太后給皂役不豫焉相者指之此當生貴子而有虎厄帝因幸之生孝武及會稽王道子既登尊位服相者之驗而怪有虎害且生所未見乃令人畫作虎象因以手撫欲打虎戲便患手腫痛遂以疾崩神仙傳曰介象入山冀遇神仙臥石上有一虎往砥象額寤而見虎謂虎曰天使汝來侍衛我者汝且停若山神使汝來試我者汝自去虎乃去搜神記曰蘇易者廬陵婦人善看産夜忽為虎所取行六里至大曠見有牝虎當産不得解匍匐欲死輒仰視易悟之乃為探出之有三子生畢虎負易送還并送野肉於門內又曰漢江之域貙人能化為虎長沙居民作檻捕虎檻發明日衆人共往格之見一亭長赤幘大冠在檻中坐民問君何以入此中亭長大怒曰昨被縣召夜避雨誤入此中急出我民曰君見召當有文書即出懷中召文書於是出之尋視之化為虎即上走續搜神記曰丹陽縣人沈宗居在縣下以卜為業義熙中左將軍檀侯鎮姑熟好獵以格虎為事忽有一人著皮袴乘烏馬從者一人亦著皮袴以紙裏十餘錢來詣宗卜云西去覔食好東去覔食好宗為作卦卦成告之東向吉西向不利因就宗乞飲內口著甌中狀如牛飲既出門東行百步從者及馬皆化虎自此以後暴虎非常又曰吳猛有道術同縣鄒惠政迎猛夜於家中庭燒香忽有虎來抱政兒超籬去猛語云無所苦須臾果還云虎將去數十步忽然復送歸政遂精進為道士又曰尋陽縣北山中蠻人有術能使人化為虎毛色牙瓜悉如真爾鄉人前將軍周眕有奴使入山伐薪奴有婦及妹亦俱行既至奴語二人云且高樹上視我所為如其言既而入草須臾見一黃班虎從草中出奮迅吼喚甚為可畏少時復為人奴語二人曰歸家慎勿道後向等輩說之周得知飲淳酒令熟醉使人解其衣服及身體唯於髻髮中得一紙畫作大虎邊有符周密取録之奴既醒喚問之事已露遂具說有術其以三尺布巾一赤雄雞一斗酒受此法俗說曰桓石虎是桓征西兒未被舉時西出獵石虎亦從獵圍中射虎虎被數箭伏在地諸將請石虎曰惡郎能拔虎箭不石虎小名惡子答曰可拔耳惡子於是徑至虎邊便拔得箭虎跳越惡子亦跳跳乃高虎跳虎還伏惡子持箭便還又曰齊沈僧照別名法朗攸之之孫也記人吉凶頗有應驗嘗校獵中道而還左右問何故答曰國家有邊事須還處分問何以知之曰向聞南山虎嘯知耳俄而使至金樓子曰孔子遊舍於山使子路取水逢虎於水與共戰攬尾得之內於懷還問子曰上士殺虎如何子曰上士殺虎持虎頭又問中士殺虎如何子曰中士捉耳又問下士殺虎如何子曰捉虎尾子路出尾棄之懷石盤曰夫子知虎在水而使我取水是欲殺我也乃欲殺夫子問曰上士殺人云何曰用筆端中士殺人云何曰用言語下士殺人云何曰用石盤子路乃棄石盤而行國史補曰裴旻為龍華軍使守北平北平多虎旻善射常一日斃虎三十有一既而息於山下四顧自若有父老至曰此皆彪似虎而非將軍若遇真虎無能為也旻曰真虎安在父老曰自此而北三十里往往有之旻躍馬而往果有一虎騰出狀小而勢猛據地一吼山石震烈旻劈易弓矢皆墜殆不得免自此慚懼不復射虎吳氏虎賦曰蓋其狀也誕節緩腕續背連骸細腰鼓胸方口大鼻似黼組雜間若錦繡相連豹說文曰豹似虎周易革卦曰上六君子豹變小人革面象曰君子豹變其文蔚也小人革面順以從君也廣志曰豹有赤豹南山有玄豹南多赤豹狐死首丘豹死首山是性之異也詩義疏曰毛赤而文黑謂之赤豹毛白而文黑謂之白豹也帝王世紀曰紂為王者箕子曰王箸必食熊蹯豹胎散宜生獻紂黑豹孫氏瑞應圖曰文王拘於羑里散宜生於懷塗山得玄豹以獻紂免西伯之難莊子曰夫豐狐文豹棲於山林處於巖穴靜也夜行晝居戒也然不免於網羅之患是何罪之有其皮為之災也管子曰武王為侈靡令人貂襜豹裘方得入廟故豹皮百金臣家糶千鍾未得一豹皮韓子曰虎豹不用爪牙與鼷鼠同威文子曰虎豹之文來射猿狖之捷來格淮南子曰蝟使虎申蛇令豹止物有所制也又曰高山險阻深林榛薄藂木曰榛深草曰薄虎豹之樂也人入之而畏川谷通源積水重淵黿鼉之所便也人入之而死范子計然曰豹皮出南郡雜道書曰南海博羅縣有羅山高入雲霧諸仙人所遊之山也上有豹獸似猴猴南海人名之為纍下洞冥記曰青豹出浪坂之山狀如虎色如翠殺之為脯食之不飢馮邪說鄧禹書曰夫虎豹愛大林蛟龍愛大水列女傳曰陶答子妻曰妾聞南山有文豹霧雨七日不下食者何也欲以澤其衣毛而成其文章也後秦記曰狄伯奇少曾遊獵得豹見其文采炳煥遂自感歎始學書藝林邑國記曰西南界有唼臘蟲食死人肉豹皮覆尸畏而不來謝朓詩曰雖無玄豹姿且隱南山霧晉中朝大駕鹵簿曰豹尾車駕一蘭臺符節令史載自豹尾後徐廣車服注曰乘輿之後有屬車最後一車懸豹尾駮爾雅曰駮如馬倨牙食虎豹說文亦同說苑曰晉平公出略見乳虎乳虎伏而不動顧謂師曠曰吾聞之霸王之主出則猛獸伏而不敢起今者寡人出見乳虎伏而不動此其猛獸乎師曠曰鵲食猬猬食鵔音俊鸃音宜鵔鸃食豹豹食駮駮食虎夫駮之狀有似駁馬今者君之出必驂駁馬而出略乎公曰然山海經曰中曲之山有獸焉其狀如馬而白身黑尾一角虎牙爪音如鼓音其名曰駮是食豹可以禦兵晉郭璞駮贊曰駮惟馬類實畜之英騰髮驤首噓天雷鳴氣無不凌吞虎辟兵
