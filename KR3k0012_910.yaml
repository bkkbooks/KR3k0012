body:
  text: 獸部二十一狼爾雅曰狼牡貛音歡牝狼其子檄吉堯切絶有力迅説文曰狼似犬鋭頭而白頰詩曰狼跋其胡載疐音致其尾疐跉也又曰子之昌兮遭我猱之陽兮並驅從兩狼兮周禮天官獸人曰冬獻狼禮曰狼臅音觸膏又曰君之車厥右虎裘厥左狼裘左傳曰伯石始生子容之母走謁諸姑子容母叔向嫂伯華妻姑叔向母也曰長叔姒生男兄弟之妻相謂姒也姑視之及堂聞其聲而還曰是豺狼之聲也狼子野心非是莫喪羊舌氏矣遂弗視史記大宛傳曰烏孫王昆莫初生棄於野狼往乳之漢書曰江都王建宮人有過者或放狼令齧殺之建觀而大笑為樂又曰高祖使太子將兵四皓曰今使太子將兵無異羊將狠也宋書曰王仲德初遇符氏之敗兄睿同起義兵與慕容垂戰敗仲德被重創走與家屬相失路經大澤困未能去臥林中有一小兒青衣年可七八歲騎牛行見仲德驚曰已食未仲德言飢小兒去須臾復來得飯與之食畢欲行而暴雨莫知津徑有一白狼至前仰天而號號訖銜仲德衣因渡水仲德隨後得濟與睿相見後魏書曰胸奴單于生女姿容甚美國人皆以為神單于曰吾有此女安可配人將以與天乃於國無人之地築高臺置二女其上曰請天自迎之經三年其母欲迎之單于曰不可未徹之間復經一年乃有一老狼晝夜守臺下為穴經時不去其小女曰吾父處我於此欲與天而今狼來或是神物遂乃就之其姊大驚曰此是畜生無乃辱父母也妹不從下為狼妻而産子後遂滋繁成國故其民好引聲長歌又似狼嗥又曰初道武避窟咄難遣穆崇還察人心崇單馬與從者微服入其營會道武為舂妾所識賊皆驚起崇求從者不得因匿坑中徐乃竊馬奔走於大澤有白狼向崇號崇覺寤馳馬隨狼走遂免難道武異之命崇立祀子孫世奉焉後周書四夷傳曰突厥之先胸奴之別種也為鄰國所破其族有一小兒棄草澤中有牝狼以肉飼之及長與狼交合遂有孕焉彼王聞此兒尚在重遣殺之使者見狼在側并欲殺狼狼遂逃于高昌國之北山山有洞穴穴內有平壤茂草周回數百里四面俱山狼匿其中遂生十男其後各為一姓阿史郍即其一也又曰突厥旗纛之上施金狼頭侍衛之士皆謂附離夏言亦狼也蓋本狼生志不忘本耳唐書曰薛延陀部落嘗有一客乞食於主人者主人引與入帳命妻具饌其妻顧視客乃狼頭人也主人不知覺妻告鄰人共視之狼頭人已食主人而去相與逐之至鬱督軍出見二人追者告其故二人曰我是也我即神人薛延陀當滅我來取之追者懼而返走又曰高宗時有孝子年十二喪父母以孝聞晝夜負土為墳又葬曾祖父母經二十載其功始畢有白狼號鳴於墓側詔旌表其門帝王世紀曰有神牽白狼銜鉤入殷國語曰周穆王將征犬戎祭公謀父諫不聽遂征之得四白狼四白鹿以歸自是荒服者不至述異記曰周幽王時牛化為虎羊化為狼洛南有避狼城云幽王時群臣為狼食人故築城避之今洛中有狼村是其處也穆天子傳曰舂山百獸所藂爰有狼材野馬山海經曰盂山有獸多白狼白虎又圖讚曰矯矯白狼有道則遊應符變質乃銜靈鉤淮南萬畢術曰取狼皮以當空戶則羊畏不敢出矣毛詩草木蟲魚疏曰狼能為小兒啼聲以誘人去數十步止其猛揵者人不能制雖善用兵者其不能剋也其膏可以煎和其皮可以為裘狐説文曰狐妖獸也鬼所乘也有三德其色中和小前大後死則首丘禮檀弓曰君子曰樂樂其所自生禮不忘其本古之人有言曰狐死正丘首仁也易解卦曰九二田獲三狐得黃矢貞吉又曰未濟亨小狐汔濟濡其尾詩國風曰南山崔崔雄狐綏綏又曰有狐綏綏在彼淇梁又曰莫赤匪狐莫黑匪烏漢書曰陳勝吳廣於所次旁藂祠張晏曰次人所止處藂祠鬼所憑夜篝音構火狐鳴呼曰大楚興陳勝王卒皆夜驚恐旦日卒中往往指目勝廣晉書曰王浚據幽州有狐踞府門躍入廳事後浚果敗又曰涼武昭王皓子歆為涼州牧時有狐上南門主簿汜稱曰諺曰野獸入家主人將去狐上南門又狐者胡也天意若曰有胡人居于此城南面而居也後竟為沮渠蒙遜所滅王隱晉書曰劉世則女病媚積年韓友令作布囊張著窗間乃閉戶驅逐須臾囊大脹急縛口懸樹間視之唯有二三斤狐毛遂差又曰淳于智濟北人夏侯藻母病因五鼓中出詣智卜有一狐當門向之嗥唳藻愁愕遂駝詣智智曰禍甚急君速歸在狐嗥喚處撫心啼坐勿休然後其禍僅可免也藻如之母亦扶病而出家人既集堂屋五間拉然暴崩唐書曰哥舒翰素與祿山思順不協上每和解祿山謂翰曰我父是胡母是突厥公母是突厥公是胡與公族類頗同何得不相親乎翰應之曰古人云野狐向窟嗥不祥以其忘本也敢不盡心焉祿山甚怒以為譏其胡也莊子曰夫豐狐文豹是何罪之有哉其皮為之災也管子曰代出狐白之皮狐應陰陽之變六月而一見公貴買之代人忘其難得喜其貴價必相率而求之取此物者因令齊載金錢之代谷求狐白皮代王聞之果去其農處山林求狐二十四月不得一狐離皮聞而伐之王即將其士卒服於齊慎子曰廊廟之材非一木之枝狐白之裘非一狐之皮范子曰狐皮出天外穆天子傳曰天子獵於滲澤得白狐玄貉祭於河宗山海經曰青丘之國有狐而九尾郭璞注曰世平則出為瑞也又曰武都之山有黑水焉其上有玄狐蓬尾蓬蓬其尾也説苑曰蓬狐文豹書紀年曰宣王時鳥化為狐夏伯抒子東征獲狐九尾玄中記曰五十歲之狐為淫婦百歲狐為美女又為巫神禮斗威儀曰君乘火王政平南海輸以文狐春秋潛潭巴曰白狐至國民利不至下驕恣韓詩外傳曰狐水神也春秋後語曰楚宣王以昭奚恤為相諸侯畏之王問群臣曰吾聞北方畏昭奚恤亦誠何如江乙對曰虎求百獸而食之得狐狐曰子無噉我天帝令我長百獸子若食我是逆天帝之命子以我為不信我為子先行隨我後觀百獸見我能無走乎虎以為然隨狐而行百獸見之皆走虎不知獸之畏已反以為畏狐也今王地方五千里帶甲百萬而任之於昭奚恤然北方非畏奚恤其實畏王之甲兵故人臣見畏者君威也君不用則威亡矣趙曄吳越春秋曰禹年三十未娶行塗山恐時暮失辭曰吾之娶也必有應已矣乃有白狐九尾而造於禹禹曰白者吾服也九尾者王證也於是塗山人歌曰綏綏白狐九尾龐龐成于家室我都彼昌禹乃娶塗山女淮南子曰夫狐之搏雉也必卑體弭毛以待其來也雉見而信之故可得而禽也淮南萬畢術曰犀角置狐穴中狐不歸抱朴子曰玉榮記曰狐及狸狼皆壽八百歲滿三百暫變為人形西京雜記曰廣川王玄疾藂其無賴少年遊獵無度國內冢墓盡發之嘗發欒書冢無餘物有一白狐見人驚走左右戟之不得傷左足於是王夢一丈夫髮眉盡白來謂王曰何故傷吾左足以杖叩王左腳王乃患腳至死不羌白虎通曰狐死首丘不忘本也德至鳥獸則九尾狐見九者子孫繁息也於尾者後當盛也崔豹古今注曰章帝元和二年白狐九尾見信都魏略曰文帝受禪九尾狐見於譙都名山記曰狐者先古之淫婦也其名曰紫紫化而為婦故其名自稱阿紫伏滔北征記曰皇天塢北古特陶穴晉時有人逐狐入穴行十餘里得書二千卷又曰河冰厚數尺冰始合車馬未過須狐先行此物善聽水無聲乃過酈善長水經注曰狐性多疑故俗有狐疑之説管輅傳曰夜有一小物如獸手持火以口吹之書生舉刀斫斷腰視之狐也郭璞九尾狐贊曰青丘奇獸九尾之狐有道祥見出則銜書作瑞於周以摽靈符劉敬叔異苑曰有胡道洽者自云廣陵人好音樂醫術之事體有臊氣恆以名香自防唯忌猛犬自審死日誡弟子曰氣絶便殯勿令狗見我尸也死於山陽斂畢覺棺空即開看不見尸體時人咸謂狐也搜神記曰酒泉郡每太守到官無幾輒卒死後渤海陳斐使此郡斐行卜卜者曰遠諸侯放伯永能解此則無憂斐既到官侍有張醫有王侯卒有史侯斐恆遠之夜半有上斐被者斐便以被冒取之物跳踉音郎訇訇作聲乃言曰我無惡意當深報府君府君曰汝為何魅曰我本百年狐今為魅垂當神聽一放我我字伯永府君有急難呼我斐乃喜便放之忽然有赤光如電後每事先以語斐於酒泉境界無毫毛之姦咸曰聖君月餘主簿李音私通斐侍婢既而驚懼遂為伯永所白遽與諸僕謀殺斐伺旁無人便伏人欲格殺之斐即呼伯永有如曳匹絳諸僕伏地失魂乃以次縛取皆伏即殺音等伯永乃辭謝斐曰未及白姦乃為府君所召猶用慚又曰燕昭王墓有老狐化男子詣張華講説華怪之謂電孔章曰今有男子少美高論孔章曰當是老精聞燕昭王墓有華表柱向千年可取照之當見如言化為狐又曰有一書生吳中皓首稱胡博士教授諸生忽復不見九月九日士人相與登山遊觀聞講書聲命僕尋之見空冢中群狐羅列見人即走老狐獨不去是皓首書生續搜神記曰襄陽習鑿齒為荊州主簿從桓武帝出獵時大雪於江陵城西見草上雪氣出伺視見一黃物射之應箭死往取乃一老雄狐腳上帶絳綾香囊又曰吳郡顧旃獵至一岡忽聞人語聲云咄咄今年衰乃與衆尋覔岡項有一穽是古時冢見一老狐蹲冢中前有一卷簿書老狐對書屈指有所計校放犬咋殺之取視口中無復齒頭毛皆白簿書悉是姦愛人女名已經姦者朱鉤頭所疏名有百數旃女正在簿次金樓子曰狐白之裘天子被之而在廟堂為狐計者不若走於平澤狢説文曰狢似狐善睡周禮考工記曰狢踰汶則死土氣然也爾雅曰狢子狟穆天子傳曰天子獵於滲澤得玄狢以祭河宗後秦記曰姚襄遣參軍薛瓚使桓溫溫以胡戲瓚瓚曰在北曰狐在南曰狢何所問也
