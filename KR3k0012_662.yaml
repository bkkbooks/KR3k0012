body:
  text: 道部三真人下集仙錄曰王母者龜山金母也西華至精之氣化而生金母生而飛翔處極陰元位配西方母養群品所居宮闕在舂山崑崙之圃閬風之苑有城千里樓十二非飆車羽輪不可到也蓬髮虎齒非西母之真形蓋金方之神也元始授以萬天元統龜山九光之籙使制召萬靈統括眾真揔諸天之羽儀天帝朝宴之會上清寶經三洞玉書凡所授度咸所關預黃帝在位王母遣使乘白鹿集帝庭授以地圖其後舜在位遣使獻白玉環及益地圖遂廣黃帝九州為十二州又遣獻舜玉琯吹之以和八風又尚書帝驗期曰王母之國在西荒凡得道授書者皆朝王母於崑崙之闕王褎字子登齋戒三月王母授以瓊花寶曜七晨素經茅盈從西城王君詣白玉龜臺朝謁王母求長生之道王母授以玄真之經又授寶書童散四方洎周穆王駕黿鼉魚鼈為梁以濟弱水而升崑崙玄圃閬苑之野而會于王母歌白雲之謠刻石紀跡于弇龠山之下而還漢武帝好長生之道元封元年登嵩岳築尋真之臺齋戒思道王母於七月七日乘紫雲之輦駕九色斑龍帶天真之策佩金剛靈璽黃錦之服金光奕奕結飛雲文綬戴天太真晨纓之冠躡方瓊鳳文之履天姿奄藹真絕世之人也下車扶二侍女登床東向而坐命侍女取桃以玉盤盛至七枚四與帝食母自食三帝欲收核種之母曰此桃三千歲一實中土地薄種之不生問長生之道母曰賤榮樂卑自復佳爾養性之道理身之要在不怠耳欲長生者先取諸身堅守三一保靈根青白分明適泥丸三宮備衛在絳宮黃庭戊己無流源此所謂呼吸太和保守自然真要之道也至若太上靈藥上帝之奇物也下陰生重雲妙草皆神仙之藥也得上品者後天而老乃太上之所服非中仙之所寶其中品者有得服之後天而遊乃天真之所服非下仙之所及其次藥有九丹金液紫虹華英太清九轉五雲之漿玄霜絳雪騰躍三黃東瀛白香玄洲飛生八石千芝威喜九光西流石膽東滄青錢高丘餘糧積石瓊田太靈還丹盛以金蘭長光絳草雲童飛于此飛仙之所服非地仙之所聞也其下藥茯苓昌蒲巨勝黃精之類服之可以延年雖不得長享無期亦以身生光澤得為地仙求道者要先憑此階漸而能致遠勝也若能呼吸服御保固神氣此上品自然之要道也且夫一人之身天付之以神地付之以形道付之以氣萬物草木亦如之身以道為本豈可不養神固氣以全爾形也形神俱全上聖所貴王母命上元夫人出八會之書五岳真圖五帝六甲靈飛之符凡十二事以授帝不能用其道而多所惑焉後三祠王母復下降所授之書置柏梁臺上為天災所焚李少君解形而去巫蠱事起帝愈悔恨又大茅君盈南治句曲之山元壽二年八月己酉南岳真人赤君西城王君方諸葛青童並從王母降於茅盈之室又王母命上元夫人授盈二第茅固茅衷太霄隱書其後紫靈元君魏華存齋戒於陽洛山隱元之臺王母與金闕聖君降於臺中乘八景之輿同詣清虛上宮傳玉清隱書四卷以授魏夫人時太虛真人等歌太極歌王母曰逍遙玄精際萬流無暫停哀此去留會劫盡天地傾當尋無中景不死亦不生體被自然道寂觀合大冥南岳挺真幹玉映耀穎精有任靡其事虛心自受靈嘉會絳河曲相與樂未央王母復還龜臺三一經曰黃帝遊靈臺青城山絕巖之下見天真皇人以蒼玉為屋黃玉為狀翠羅之帷侍者皆天人又曰高丘子商時人也好道入人六景山積年但讀黃素道經服餌朮後服鴻丹得陸仙遊行五岳復飲金液為中岳真人又曰郭崇子商時人也彭真人弟子嘗山行盜困祟諸子弟欲追擒之崇子曰縱去其盜後仕官而崇子譽之數數往彼謝之曰我昔盜也不可受大君子之譽遂自殺後崇子得道太極真人以為有殺人之罪不得為真人此為善之過尚致人自斃況為惡乎又曰楚莊公時市長宋萊子常洒掃一市久時有一乞食翁入市經日行歌道中曰天庭發雙華山源彰陰邪清晨案天馬來詣太真家真人無奈隱又以滅百魔常歌此乞食市人無解此者獨萊子悟疑其真人然未全解其歌耳遂師此翁而去積十餘年翁遂授以中仙之道萊子今在中岳也乞食翁者西岳真人馮延壽周宣王時人也天庭任兩眉之下是徹視之津梁亦謂之華庭也山源是鼻下人中之本側在鼻下小入谷中也天馬手也以手按鼻下則杜絕百邪又曰真人尹喜周大夫也為關令少好學善天文祕緯鬼神無以匿其情狀瓌傑不檢榮戚不形於色志懷逍遙天性玄湛忽登樓四望見東極有紫氣西邁喜曰夫陽數度盡九星度值合歲月並正應有異人過此乃齋戒掃道以俟之及老子度關喜先誡關吏曰若有翁乘青牛薄板車者勿聽過止以白之果至吏白願少止喜帶印綬設師事之禮老子重辭之喜曰願為我著書說大道之意得奉而行焉於是著道德經上下二篇喜於是俱去玄洲上卿蘇林傳曰林字子玄濮陽曲水人也父秀含德隱曜居於恒山林少稟異操至趙師琴高先生授鍊氣益命之道又師華山仇先生授還神之術曰子真人也當學真道乃致林於涓子未遂告林真訣先生日必作地上真人當先去三尸林後授紫陽真人道訣凡二百餘事至于守玄丹洞房三元真人具標上焉林為中岳真人茅君傳日盈字叔申咸陽人也父祚有三子盈固衷也盈少稟奇操矯俗抗邁不求聞達不交非類入恒山讀老易餌朮潛影在山中六年精思念道誠感密應夢太玄玉女持玉劄而攜之曰西城有王君得真道可為師明發乃尋求至西城齋戒三月果見王君盈乃叩頭再拜勤懇乞長生之術乃得在西城洞臺之中金玉上宮親侍旦夕執巾屨之役積十七年專一不懈復二年王君命駕造白玉龜山謁王毋於青琳宮將盈同行王君見西王母稽首於前盈乃叩頭再拜自陳於王母前得治身之要道行其事歸家數十年以漢元帝時天官下迎來渡江東治句曲山於是天皇大帝遣授黃金紫玉策為太元真人東岳上卿司命神君仗紫毛之節十絕靈幡巾藕華冠繡羽紫帔丹青飛群斑龍輿素虎軿曲晨寶蓋瓊帷緣寶執神流火雙珠月明錦旌白羽玄千金鍾玉磐紫琳之腴玉漿金甖治赤城山玉洞之府上編上清下宴太極封掌吳越司校太山死生籙朝籍眾真定策金名領授學道試校群仙時茅君弟吏二千石當之官鄉人多送之茅君亦在座曰余亦有職某月日當之官賓客曰願奉送茅君言不須有所損費吾有以供帳至期大作宴會皆青縑帷幄下鋪重白氈奇饌異果羅列妓樂合奏聞數里從者千餘人文吏則朱衣素帶武吏則戎備曜日茅君乃登羽蓋車去以晉興寧三年七月四日夜初降楊君家著青錦繡裙紫毛帔巾芙蓉冠侍從七人入戶一人執紫毛節一人執十絕幡一人帶綠章囊一人握流金鈴三人奉白牙箱並朱衣以後數數來降弟子迎候仙人李遵撰傳光顯于世閒也三洞珠囊日王褒字子登前漢王陵七世孫服青精䭀飯趍步峻峰如飛鳥無津梁直度積水又服雲碧晨飛丹腴視見甚遠太上大道君遣正一左玄執蓋郎封瑋音賜王君素明瓊玕丹紱綿旌號清虛真人真誥曰赤松子黃帝時雨師號太極真人又曰九疑真人韓偉遠昔師中岳宋德玄德玄者周宣王時人也服靈飛六甲得道能遠行數變隱得玄靈之道今在嵩山偉遠久而隨得其道九疑真人又曰裴玄仁右扶風陽夏人也漢文帝二年始生焉裴君得道將入室弟子鄧雲亦得道將鄧登太華山入西洞玄石室中積三十二年忽見五老人賜裴君神芝之術亦號清虛真人又曰中岳真人王仲甫少好仙道常吸引二景及飡霞法四十餘年都不覺益其子亦服之十八年仙去後南真人忽降仲甫家而教之日子朏眾虧減津液不注雖接真景以飡霞故未為身益仲甫遂因藥治病兼修真道又積年方成今在玄洲受書為中岳真人領九玄之司又曰范伯慈桂陽人也家本事俗忽得狂病經年不愈聞沈道士治病多驗乃棄家求療五十日病愈後入天目山餌胡麻精思十七年又服丹砂得道為玄一真人又曰許謐宇思玄一名穆晉簡文皇帝以為護軍長史雖外混俗務而內修真學得為上清真人又曰紫虛元君領上真司命南岳魏夫人玉清虛弟子名華存楊司命之師也任城人晉司徒文康公魏舒之女年二十四適南陽劉幼彥幼彥為汲縣修武夫人齋戒念道入室百日十二月夜半青童君及王君四真人同降授上經三十一卷至洛陽亂夫人渡江居豫章隨于璞往江州安城郡因居彼年八十三以成帝咸和九年青童清虛又降授劍解之道稱疾隱化乘飆車往陽洛山明日有四十七真人降教道法積十六年西母與金闕南極同降迎夫人北詣上清宮玉闕下受神鳳章龍衣虎帶丹飛裙十絕華幡流金火鈴九蓋芝軿九色之節雙珠月明神虎之符錦旂虎旌給西華玉女八景飛輿玄景九龍又受扶桑大帝君玉劄金文位為紫虛元君領上真司命主諸學道死生圖籍攝御三官關校罪考又受金闕聖君青瓊板丹籙文位為南缶夫人給曲晨飛蓋治天台大霍山洞臺中下訓奉道教授當為真仙者一月再登玉清三登太素四謁玉晨遨宴扶桑仰招天真揔括神籙刊書九天佐命東華叶翼帝晨飛步太霞參轡九虛以興寧中降揚君又授許掾上經自此後數數來降也玉清虛令弟子范邈作內傳顯于世也又曰紫清上宮九華安真妃晉興寧三年年十三四著雲錦裙上丹下青腰絲繡帶右帶係十餘小鈴鈴子青色又黃色相閒左帶玉珮指著金鐶白珠約臂作髻在頂中餘髮垂至腰一侍女朱衣帶青章襄長尺餘以盛書書可十餘卷白玉檢囊口上刻字玉清神虛內真紫元丹章一侍女赤衣捧白玉箱絳帶絡之年並十七八自此後數數來降授書作詩真人傳曰馬明生者齊國臨淄人也本姓帛名和字君賢為縣吏捕賊所傷遇太真元君與藥即愈隨至太山石室中金床玉几珍物奇偉人跡所不能及事之勤亦至矣太真乃授以長生之方曰我所受服太和自然龍胎之體適所以授三天真人不可以教始學者後隨安期先生服餌仙去為真人裴真人弟子三十四人其十八人學真道餘學仙道
