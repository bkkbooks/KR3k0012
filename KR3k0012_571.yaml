body:
  text: 樂部八歌一釋名曰人聲曰歌歌柯也以聲吟詠有上下如草木有柯葉充言歌聲如柯也爾雅曰徒歌謂之謠尚書曰帝庸作歌曰勑天之命惟時惟幾用庶尹允諧故作歌以戒之安不忘危也勑正也奉天命以臨人惟在順時惟在慎微也乃歌曰服肱喜哉元首起哉百工熙哉元首君也服肱之臣喜樂盡忠君之理功乃起百王之葉乃賡載歌曰元首明哉服肱良哉庶事康哉賡續載成也帝歌歸美股肱乃安以成其美又歌曰元首叢業脞哉服肱惰哉萬事隳哉叢脞細碎無大略曰君如此則臣懈萬事隳廢其功不成歌以申成也脞音倉果反又曰九功惟序九序惟歌六府三事之功次序皆可歌樂乃德政之致也勸之以九歌俾勿壞六府三事之功次壞在此三者而已又曰禹曰於帝念哉德惟善政政在養民水火金木土穀惟修正德利用厚生惟和九功惟敘九敘惟歌又曰詩言志歌永言聲依永律和聲又五子之歌曰太康尸位以逸豫畋於有洛之表十旬不反厥弟五人御其母于洛之汭五子咸怨述大禹之戒以作歌其一曰怨豈在明不見是圖為人上者奈何不敬其二曰內作色荒外作禽荒甘酒嗜音峻宇雕墻有一于此未或弗亡其三曰惟彼陶唐有此冀方今失厥道亂其紀綱乃砥滅亡其四曰明明我祖萬邦之君有典有則貽厥子孫荒墜厥緒覆宗絶祀其五曰嗚呼曷歸子懷之悲萬姓仇豫豫將疇依鬱陶乎豫心顏厚有忸怩弗慎厥德雖悔可追毛詩曰情動於中而形於言言之不足故嗟歎之嗟歎之不足故永歌之永歌之不足故不知手之舞之足之蹈之也又葛屨園有桃曰心之憂矣我歌且謠又谷風四月曰君子作歌唯以告哀禮記曰子貢問師乙曰賜也聞聲歌各有宜也如賜者宜何歌也師乙曰乙賤工也何足以問其所宜請誦其所聞而吾子自執焉寬而靜柔而正者宜歌頌廣大而靜疏達而信者宜歌大雅恭儉而好禮者宜歌小雅正直而靜廉而謙者宜歌風肆直而慈愛者宜歌商溫良而能斷者宜歌齊夫歌者直己而陳德也動己而天地應焉四時和焉星辰理焉萬物育焉故商者五帝之遺聲也商人識之故謂之商齊者三代之遺聲也齊人識之故謂之齊明乎商之音者臨事而屢斷明乎齊之音者見利而能讓臨事而屢斷勇也見利而能讓義也有勇有義非歌孰能保此故歌者上如抗下如隊曲如折止如稿木倨中矩句中鉤纍纍乎端如貫珠故歌之為言也長言之也説之故言之言之不足故長言之長言之不足故嗟歎之嗟歎之不足故不知手之舞之足之蹈之也又檀弓曰原壤之母死登木歌曰貍首之班然執女手之卷然又樂記曰昔者舜作五絃之琴以歌南風又檀弓上曰孔子蚤作負手曳杖逍遙於門歌曰太山其頽乎梁木其壞乎哲人其萎乎又曰魯人有朝祥而暮歌者子路笑之又曰歌者在上匏竹在下貴人聲也又曰奠酬而工升歌發德音也歌者在上匏竹在下貴人聲也周禮春秋太師大祭祀師瞽登歌小師掌教絃歌教謂教瞽矇出音絃謂琴瑟歌依詠詩也左傳哀二十一年八月公乃齊侯邾子盟齊人責稽首因歌之曰魯人之皋數年不覺使我高蹈言魯人皋緩數年不知答齊稽首故使我高蹈來為此會唯其儒書以為二國憂又曰昭十三年南蒯將適費飲鄉人酒鄉人或歌之曰我有圃生之杞乎從我者子乎去我者鄙乎倍其鄰者恥乎已乎已乎非吾黨之士乎已乎已乎言自遂不改又曰哀五年秋齊景公卒冬十月公子嘉公子駒公子黔奔衛公子鉏公子陽生來奔皆景公子在萊者萊人歌之景公死乎不與埋三軍之事乎不與謀師乎師乎何黨之乎又曰襄四年崔子稱疾不視事公問崔子遂從薑氏入于室公拊楹而歌歌以命薑氏論語曰夫子與人歌而善必使反之而後和之又曰楚狂接輿歌而過孔子曰鳳兮鳳兮何德之襄往者不可諫來者猶可追已而已而今之從政者殆而又曰子於是日哭則不歌史記曰古詩三千餘篇孔子曰其重句施於禮上採契后稷中述殷周之盛至幽厲之缺始於衽席故曰閞睢以為風始鹿鳴為小雅始文王為大雅始清廣為頌始三百五篇皆絃歌之以求合韶武雅頌之音禮樂自此可得而述又曰漢家常以正月上辛祠太一甘泉夜到明忽有流星至於祠壇上使童男女七十人俱歌又得神馬渥窪水中為太一歌曰太一貺兮天馬下沾赤汗兮洙流赭今安匹兮龍為友後伐大宛得千里馬蒲桃為歌曰天馬來兮從西極經萬里兮歸有德承靈威兮降外國涉流沙兮四夷服又曰箕子朝周故殷墟咸生禾忝箕子傷之欲哭則不可欲泣為近婦人乃作麥秀之詩以歌詠之曰麥秀漸漸兮禾黍油油彼狡童兮不我好仇所狡童者紂也民為流涕又曰淳于髡見梁惠王王屏左右見之終無言王讓之髡曰王志在音吾是以默也王曰會有獻歌者未及言之也又曰趙武靈王夢見處女鼓琴而歌曰美人焭兮顏若舜華若苕之榮命兮曾無我羸且曰王飲酒樂數言所夢想見其狀吳廣聞之內其女姓嬴孟姚也甚有寵立為后又曰文王克殷伯夷叔齊恥之不食周粟隱首陽山作歌曰登彼西山兮言采其薇矣以亂易暴兮不知其非神農虞夏忽焉沒兮我適安歸又曰項羽軍壁垓下兵食少盡軍四面皆楚歌應邵曰楚歌者雞鳴時歌也項王乃歌曰漢已皆得楚乎是何楚人之多項王乃悲歌慷愾曰力拔山兮氣蓋世時不利兮騅不逝騅不逝兮可奈何虞兮虞兮奈若何漢書曰李延年善歌武帝幸之時人語曰一雌復一雄雙飛入紫宮又曰孝惠帝所教歌兒百二十人有鈌輒補又曰田橫齊玉建之親族也秦滅六國田氏悉為庶人高祖遣韓信破齊後定天下田橫乃與五百人深居海島高祖即位遣使者徵之橫與將士俱至尸鄉亭頓止橫乃奮躍自刎而死從者不敢哭遂歌以寄之今之挽歌起於此矣又曰張釋之為中郎將從行至霸俊是時慎夫人從上指視慎夫人新豐道曰此是邯鄲道也使慎夫人鼓瑟上自倚瑟而歌又班固頌論功歌詩靈芝歌曰因露寐兮産靈芝象三德兮瑞應圖延壽命兮光此都緣上帝兮象太微參日月兮揚光輝又曰武帝幸雍祠五畤獲曰麟作白麟之歌又曰上幸行河東祠后土顧視帝京欣然中流歌曰秋風起兮白雲飛草木黃落兮鴈南歸蘭有秀兮菊有芳懷佳人兮不能忘泛樓船兮濟汾河橫中流兮揚素波蕭鼓鳴兮發擢歌欣樂極兮哀情多少壯幾時兮奈老何又曰孝武南巡狩至于盛唐尋陽浮江親射蛟江中獲之舳艫千里薄樅陽而出作盛樅陽之歌又曰高帝崩皇大后乃令戚夫人髡鉗衣赭舂舂且歌曰子為王母為虜終日舂薄暮常與死為伍相離三千里當使誰告汝太后聞之大怒曰乃欲倚汝子耶遂鴆殺趙王斷戚夫人手足去眼熏耳名曰人彘又曰漢以江都王女昭君妻烏孫悲愁自作歌曰吾家嫁我兮天一方遠託絶國兮鳥孫王穹廬為室兮氈為牆以肉為食兮酪為漿居常悲思兮內感傷願為黃鵠兮歸故鄉又曰燕王旦謀反事敗王憂悶置酒方載宮會賓客群臣妾坐飲王自歌曰歸空城兮狗不吠雞不鳴橫術何廣兮固知中國之無人華容夫人起舞歌曰髮紛紛兮不暇梳骨籍籍兮枕丘墟母求子兮妻求夫俳佪兩渠問兮君子獨安居又廣陵王胥祝詛事發覺有司按驗有實使者反及置酒顯陽殿召太子霸及子女董訾胡生等夜飲使所幸八子郭昭君家人子趙左君等王自歌曰空久生兮無終長不樂兮安窮奉天期兮不得須臾千里馬兮駐待路黃泉下兮幽深人生要死兮何為苦心可用為樂心所喜出入無悰為樂亟蒿里召兮郭門閲死不得取代庸身自逝又曰元帝自度曲被歌注云聲終更授其次曰度曲度曲未終雲起雪飛是也謝承後漢書曰祭遵為將取士皆用儒術對酒設樂必雅歌投壺東觀漢記曰朱酺明帝時為益州剌史移書屬郡喻以聖德白狼王等百餘國重譯來庭歌詩三章酺獻之後魏書曰鄭道昭字僖伯兼中書侍郎從征河北高祖饗侍臣於懸匏於大竹堂道昭兄懿俱侍坐樂作酒酣高祖乃歌曰日月光天兮無不曜江左一隅兮獨未混彭城王協續歌曰願從聖王兮登衡會萬國馳誠混日外鄭懿歌曰雲雷大振兮天地闢率土來賓一正曆邢巒歌曰舜舞干戈兮天下歸文德遠被莫不思道昭歌曰皇風一鼓兮九地匝戴日依天清六合高祖又歌曰遵彼汝墳兮昔化貞未若今日道風明宋辨歌曰文王政教兮暉江沼寧知大化光四表吳書曰留贊初為將臨敵必先被髮叫天因抗音而歌左右應之乃進戰晉書曰三月上巳日會稽夏統字仲御入洛陽市藥太尉賈充問曰卿能土地曲乎統曰百姓懷君恩作慕歌為孝女曹娥作河女之章為伍子胥作小海唱今欲之充曰善乃以足扣舷船引聲囀喉清激慷慨大風應至含水激天雲雨響集充曰聽慕歌之聲便髣佛見大禹之容聞河女之音不覺涕泣交下即謂伯姬高行在目前聆小海之唱謂子胥屈平立吾之左右又曰袁山松善音樂舊歌有行路難曲詞頗踈質山松乃文其辭句婉其節制因酣歌之聞者流涕又曰應詹督南平天門武陵三郡事時政令不一諸蠻怨望並謀背叛詹召蠻酋破銅券與盟由是懷詹數郡無虞其後天下大亂詹境獨全百姓歌之曰亂離既普殆為灰朽僥幸之運賴茲應后歲寒不雕孤境獨守拯我塗炭惠隆丘阜潤同江海恩猶父母又曰山簡慠誕好酒嘗止襄陽習公池日晚醉歸自歌曰山公時一醉遙造高陽池日暮倒載歸酩酊無所知時復能騎馬倒著白接籬舉頭問葛強何如并州兒晉陽秋曰高祖伐公孫淵過本縣賜牛酒穀帛郡守典農會暮次父老故舊宴飲高祖作歌曰天地開闢日月重光今遭際會奉辭遐方將掃逋穢還過故鄉肅清萬里揔齊八荒告成歸老待罪舞陽鄧粲晉紀曰太子洗馬郭訥字敬言嘗入洛觀伎人歌言佳石崇問其曲訥不知崇笑卿不識曲郍得言佳訥答譬如見西施何必識其姓名然後知美崇無以難崔鴻十六國春秋曰初符堅二十五年滅慕容沖姊清河公主年十四有姝色堅納之寵冠後庭沖時年十二亦有龍陽之美堅又幸之姊弟專寵宮人莫進長安中歌之曰一雌與一雄雙飛入紫宮咸懼為亂王猛切諫乃出沖沖卒為堅賊又前燕録日慕容廆父涉歸分戶以封長庶子吐谷渾分馬以給之及廆嗣翮位而二部馬鬥廆怒遣使讓渾曰先公分建有別奈何不相遠離而令馬有鬥傷渾曰馬飲食水草鬥其常性何故怒及於人兄弟至親而鬥起於馬當去汝萬里於是遂西移八十里廆後悔之遣乙那樓追渾謝之乃擁回渾馬馬東行數百步輒悲鳴西奔衝突山谷如是者十餘日此非人事遂附陰山面黃河晉永嘉之亂南遷隴右廆以孔懷之思作吐谷渾阿於歌歲暮窮思常歌之及雋垂僣號以為輦後大曲孟嘉別傳桓溫問嘉曰聽伎絲不如竹竹不如肉何謂也答曰漸近自然一坐咨嗟晉書曰孝武太元中琅邪王軻之家有鬼歌子夜殷允為章郡僑人庾僧度家亦有鬼歌子夜殷允為章郡亦是太元乎則子夜是此時以前人也齊書曰蕭惠基解音律尤好魏三祖曲及相和歌每奏輒賞悅不能已也梁書曰羊侃有妓孫荊玉能反腰怗地銜得席上玉簪初賚歌人王娥兒東宮亦賚歌者屈偶之並妙盡奇曲一時無對唐書曰劉禹錫泛朗州司馬鑾俗好巫每祠鼓舞必歌俚辭禹錫或從事於其間乃依騷人之作為新辭以教巫祝故武陵溪洞間夷歌率多禹錫之辭也又曰開元中歌工長孫元忠元忠之祖受於侯將軍貴昌并州人也亦代習北歌貞觀中有詔令貴昌以其聲教樂府元忠之家代相傳習如此雖譯者亦不能通知其辭蓋年歲久遠失其真矣絲桐唯琴曲有胡笳聲
