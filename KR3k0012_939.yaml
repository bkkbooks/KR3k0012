body:
  text: 鱗介部十鯨鯢魚春秋考異郵曰鯨魚死而彗星出左傳宣下曰古者明王伐不敬取其鯨鯢而封之以為大戮鯨鯢大魚以喻不義之人春秋後語曰楚威王問宋玉曰先生其有遺行歟何士民衆庶不譽之甚也宋玉對曰天鳥有鳳而魚有鯨鳳凰上擊九千里翱翔乎窈冥之上夫藩籬之鷃豈能與料天地之高哉鯨魚朝發於崑崙之墟暮宿於孟津赤澤之鯢豈能與量江漢之大哉故非獨鳥有鳳而魚有鯨士亦有之唐書曰開元七年大拂靺羯獻鯨鯢睛淮南子曰麒麟鬭則日月食鯨魚死而彗星出鯨海中魚之王也鄧析書曰獵猛虎者不於後園釣鯨鯢者不於清池何則園非虎處池非鯨淵文字同說苑曰昔南瑕子過程本子程本子為之烹鯢魚南瑕子曰吾聞君子不食鯢魚程本子曰乃君子不食子何事焉南瑕子曰吾聞上比所以廣德也下比所以狹行也比於善自進之階也比於惡自退之源也魏武四時食制曰東海有大魚如山長五六里謂之鯨鯢次有如屋者時死岸上毫流九頃其鬚長一丈廣三尺厚六寸瞳子如三升梡大骨可為矛矝廣志曰鯢魚聲如小兒有四足形如鱧出伊水也司馬遷謂之人魚故其著史記曰始皇帝之葬也以人魚之膏為其燭也徐廣曰人魚似鮎而四足即鯢魚也崔豹古今注曰鯨海魚也大者長千里小者數千丈一生數萬子常以五月六月就岸邊生子至七八月導引其子還入海中鼓浪成雷噴沫成雨水族驚畏之皆逃匿莫敢當其雌曰鯢大者亦長千里眼睛為明月珠任昉述異記曰南海有珠即鯨魚目瞳夜可以鑒謂之夜光潘嶽滄海賦曰魚則吞舟鯨鯢左思吳都賦曰長鯨吞航修鯢吐浪木玄虛海賦曰其魚則橫海之鯨突兀孤遊巨鱗剌雲洪鬐插天顱骨成嶽流膏為淵曹毗觀濤賦曰於是神鯨來往乘波躍鱗噴氣霧合噫水成津骸喪成島嶼之墟目落為明月之珠鯪魚山海經曰鯪魚吞舟臨海水土記曰鯪魚背腹皆有剌如三角菱䱜魚南越記曰䱜魚南越謂為瓌雷魚長一丈子朝出食暮還母腹常從臍中入口中出腹內有兩洞腹貯水以養子腹容二子兩腹則四子也其鰓鱗皮有珠文可以飾刀劍口孫綽望海賦曰徑䱜楊鬐以排流捶額魚臨海水土記曰捶額似䱜魚長四尺海鰌魚臨海水土記曰海鰌長丈餘金樓子曰鯨鯢一名海鰌穴居海底鯨入穴則水溢溢為潮來鯨既出入有節故潮水有期也嶺表録異曰海鰌魚即海上最偉者也其小者亦千餘尺每歲廣州常發𦨴船過南安貨易路經調黎地名海心有山阻東海濤嶮而急亦黃河之三門也深闊處或見十餘山或出或沒篙工曰非山島鰌魚背也日閃鬐鬣若箕朱旗日中忽雨霡霂舟子曰此鰌魚噴氣水散於空風勢吹來若雨耳近魚魚即鼓船而譟條爾而沒魚畏鼓物類相伏耳石魚臨海水士記曰石音矛附石以踞錯鰐魚吳時外國傳曰鰐魚大者長二三丈有四足似守宮常吞食人扶南王范尋勑捕取置溝塹中尋有所忿者縛以食鰐若罪當死鰐便食之如其不食便解放以為無罪梁書曰扶南國於城溝中養鰐魚門外圈猛獸有罪者輒以餧猛獸及鰐不食為無罪三日乃放之鰐大者長二丈餘狀如鼉有四足喙長六七尺兩邊有齒如刀劍常食魚遇得麞鹿及人亦噉之蒼梧以南及外國皆有唐書曰韓愈為潮州刺史既視事詢吏民疾苦皆曰郡西湫水有鰐魚卵而化其長數丈食民畜産將盡以是民貧居數日愈往視之令判官秦濟炮一豚一羊投之湫呪之曰今潮州大海在其南鯨鵬之大蝦蟹之細無不容鱷魚朝發而夕至今與鱷魚約三日乃至七日如頑而不徙須為物害則刺史選林伎壯夫操徑弓毒矢與鱷魚從事矣呪之夕有暴風雷起於湫中數日湫水盡涸徙於舊湫西六十里自是潮人無鱷患虞喜志林曰方有鱷魚喙長八尺秋時最甚人在舟邊者魚或出頭食人故人持戈於船測而禦之博物志曰南海有鱷魚狀似龜斬其頭而乾之啄去齒而更生如此三乃止交州記曰鰐好出沙上卵大如鵝卵可食廣州異物志曰鰐魚長者二丈餘有四足喙長七尺齒甚利虎及鹿渡水鰐擊之皆斷喙去齒旬日更生嶺表録異曰鰐魚其身土黃色有四足修尾形狀如鼉而舉止趫疾口生鋸齒往往害人南中鹿多最懼此物鹿走崖岸之上群鰐嗥叫其下鹿必怖懼落崖多為鰐魚所得亦物之相攝伏也故李太尉貶官潮州經鰐魚灘沉損平生寶玩古書圖畫一時沉失遂召舶工崑崙取之但見鰐魚極多不敢輒近乃是鱷魚窟宅也鮫魚說文曰鮫魚也皮可以飾刀山海經曰燕山漳水出焉其中多鮫魚郭璞曰鮫背上有甲朱文尾長三四尺皮可以飾刀劍口西京雜記曰尉他高祖時獻鮫魚荔芰高祖報以蒲陶錦四匹博物志曰東海中有鮫鯖魚既生子子驚還入母腹尋復出任昉述異記曰虎魚老則為鮫鱕魚南越記曰鱕魚鼻有橫骨如轓海中波浪為之湧海船逢之必斷石首魚臨海異物志曰石首小者名䠓水其次名春來石首異種又有石頭長七八寸與石首同嶺表録異曰石頭魚狀如鱅魚隨其大小膽中有一石子如喬夌粒瑩白如玉有好奇者多市魚之小者貯於竹器任其壞爛即淘之取其魚脛石子以植酒籌黃靈魚臨海水土記曰黃靈魚小文正黃似石首烏賊魚南越記曰烏賊魚有碇遇風浪便虬前一鬚下碇而住腹中血及膽正黑中以書也世謂烏賊壞墨而知禮故俗云是海若白事小吏或曰古之諸生常自浮水烏見以為死便往喙之乃卷取烏故謂烏賊今烏化為崔豹古今注曰烏賊魚名河伯從事小吏嶺表録異曰烏賊魚只有骨一片如龍骨而輕虛以指甲刮之即為末亦無鱗而肉翼前有四足每潮來即以二長足捉石浮身水上有小蝦魚過其前即吐涎惹之取以為食廣州邊海人往往探得大者率如蒱扇煠熟以薑醋食之極脆美或入鹽渾腌為乾捶如脯亦美吳中好食之左思吳都賦曰烏賊擁劍𩸔魚臨海異物志曰𩸔似烏賊肥食甘美䱥魚臨海異物志曰䱥魚至肥炙食甘美諺曰寧去纍世田宅不去䱥魚額鰒魚漢書曰王莽以關東兵起憂悶不食但飲酒食鰒魚東觀漢記曰吳良字大儀齊人為郡議曹椽正旦入賀太守門下掾王望前上言壽皆稱萬歲良跪曰門下侯諂明府無受其觴盜賊未弭人民困乏太守曰生言是遂不舉觴賜鰒魚百枚教署功曹良恥以言受官遂不肯謁後漢書曰張步遣使伏隆詣闕上書獻鰒魚郭璞注三蒼云鰒似蛤偏著石廣志曰鰒無鱗有一面附石決明細孔雜雜或七或九本草云石決明一名鰒魚音步角切魏志曰倭國人入海捕鰒魚水無深淺皆沉沒取之齊書曰褚彥回時淮北屬魏江南無鰒魚或有間關得至者一枚直數千錢有餉彥回鰒魚三十枚彥回時雖貴而貧過甚門生獻計賣之云可得十萬錢彥回變色曰我謂此是食物非曰財貨且不知堪錢聊爾受之雖復儉乏寧可賣餉取錢悉與親遊噉之少日便盡陳思王求祭先主表曰先主喜食鰒魚前已表徐州臧霸送鰒魚二百足自供事魏文帝與孫權書曰今因趙咨致鰒魚千枚比目魚爾雅曰東方有比目魚焉不比不行其名謂之鰈郭漢注曰狀如牛脾一兩片相合乃行江東呼至餘魚史記曰管仲諫桓公古者封禪東海有比目之魚搜神記曰東海名餘腹者昔越王為膾割而未切墮半於水化為魚臨海水土記曰兩片特立合體俱行比目魚也嶺表録異曰比目魚南人謂之鞋屜魚江淮為之拖沙魚左思三都賦曰雙則比目片則王餘孫綽望海賦曰王餘孤遊比目雙遊人魚出海經曰龍侯之山決水出焉其中多人魚狀如䱱魚四足其音如嬰兒食之無癡疾史記曰秦始皇冢中以人魚膏為燈燭臨海異物志曰人魚似人長三尺餘不可食虎魚范子曰虎魚出東海郭璞江賦曰或虎狀類人虎魚頭似虎腹背皆有剌
