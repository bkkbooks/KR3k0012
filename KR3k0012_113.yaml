body:
  text: 皇王部三十七唐肅宗宣皇帝唐書曰肅宗宣皇帝諱亨玄宗第三子母曰元獻皇后楊氏景雲二年乙亥生初名嗣升二歲封陜王五歲拜安西大都獲河西四鎮諸蕃落大使上仁愛英司得之天然及長聰敏彊記屬辭典麗耳目之所聽覽不復遺忘開元十五年正月封忠王改名浚五月領朔方大使單于大都護十八年奚契丹犯塞以上為河北道元帥信安王禕為副元帥御史大夫李朝隱京兆尹裴胄先等八揔管兵以討之仍命百寮設次於光順門與上相見左丞相張說退謂學士孫逖韋述曰嘗見太宗寫真圖忠王英姿穎發儀表非常雅類聖祖此社稷之福也二十年諸將大破奚契丹以上遙統之功加司徒二十三年改名璵後皇太子瑛得罪立上為皇太子天寶十三載正月安祿山來朝上嘗密奏云祿山有反相玄宗不聽十四載十一月祿山果叛十二月丁未陷東京辛丑制太子監國仍遣上親揔諸軍進討時祿山以誅楊國忠為名由是軍民切齒於楊氏國忠懼乃與貴妃謀間其事上遂不行乃詔河西節度哥舒翰為皇太子前鋒兵馬元帥令率衆二十萬守潼關明年六月哥舒翰為賊所敗關門不守玄宗幸蜀丁酉至馬嵬頓兵軍不進請誅楊氏於是誅國忠賜貴妃自盡車駕將發留上在後宣諭百姓衆泣而言曰逆胡背恩主上播越臣等生於聖代世為唐民願勠力一心為國討賊請從太子收復長安玄宗聞之曰此天啓也乃令高力士與壽王瑁送太子內人及服御等物留後軍廄馬從上令力士口宣曰汝好去百姓屬望慎勿違之莫以吾為意且西戎北狄吾嘗厚之今國步艱難必得其用汝其勉之上回至渭北便橋已斷水暴漲無舟楫上號令水濱百姓歸者三千餘人渭水可涉又過潼關散卒誤以為賊與之戰士衆多傷乃收其餘衆以北上軍既濟後者皆溺上喜以為天之眷佑時從上唯廣平建寧二王及四軍將士才二千人自奉而北夕次永壽百姓遮道獻牛酒有白雲起西北長數丈如樓閣之狀議者以為天子氣戊戍至新平郡時晝夜奔馳三百餘里士衆器械亡失過半所存之衆不過一旅時賊據長安知上治兵河西三輔百姓皆曰吾太子大軍即至賊望西北塵起有時奔走七月辛酉上至靈武時魏少遊預備供帳無不畢備裴冕杜鴻漸等從容進曰今寇逆亂常毒流函洛主上倦勤大位移幸蜀川江山阻修奏請路絶宗社神器須有所歸萬姓顒顒思崇明聖天意人事不可固違伏願殿下順其樂推以安社稷王者之大孝也上曰俟平寇逆奉迎鑾輿從容儲闈侍膳左右豈不樂哉公等何忩忩也冕等凡六上箋辭情激切上不獲已而從之是月甲子上即皇帝於靈武即日奏上皇是日御靈武南門下制大赦天下改元曰至德以朔方度支副使大理司直杜鴻漸為兵部郎中朔方節度判官崔漪為吏部郎中並知中書舍人事以御史中丞裴冕為中書侍郎同中書門下平章事改靈武郡為大都督府癸巳上所奉表始達成都丁酉上皇遜位稱誥遣左相韋見素吏部尚書房琯門下侍郎崔渙等奉冊書赴靈武九月戊辰上南幸彭原郡景子至順化郡韋見素房琯崔渙等自蜀郡齎上冊書及傳寶等至上素知房琯名至是琯請為兵馬元帥收復兩京許之二載春正月庚戍朔上在彭原受朝賀是日通表入蜀賀上皇上皇遣平章事崔圓奉誥赴彭原乙卯逆胡安祿山為其子慶緒所殺九月持四節與回紇葉護太子率兵四千助國討賊葉護入見宴賜加等丁亥元帥廣平王統朔方安西回紇南蠻大食之衆二十萬東向討賊壬寅與賊將安守忠李歸仁等戰於香積寺西北賊軍大敗斬首六萬級賊帥張通儒棄京城東走癸卯廣平王收西京甲辰捷書至行在即日告捷於蜀上皇遣裴冕入京啓告郊廟社稷冬十月癸丑賊將尹子琦睢陽害張巡姚誾執許遠賊自香積之敗悉衆保陜郡廣平王統郭子儀等進攻與賊戰於陜西之新店賊衆大敗斬首十萬級橫尸三十里庚申安慶緒與其黨奔河北壬戌廣平王入東京陳兵天津橋南士庶歡呼路側陷賊官僞署侍中陳希烈等三百餘人素服待罪癸亥上自鳳翔還京仍遣太子太師韋見素入蜀迎上皇鳳翔郡給復五載京寅至望賢宮得東京捷書至上大喜丁卯入長安士庶涕泣拜抃曰不圖復見吾軍上亦為之感惻九廟為賊所焚上素服哭於廟三日入居大明宮十二月日午上皇至自蜀上至望賢宮奉迎上皇御宮南樓上望樓辟易下馬趍進樓前再拜蹈舞稱慶上皇下樓上匍匐捧上皇足涕泗嗚咽不能自勝遂扶侍上皇御殿親自進食自試御馬以進又躬攏轡而行止之後退上皇曰吾享國長久吾不知貴見吾子為天子吾知貴矣上乘馬前導自開遠門至丹鳳門旗幟燭天綵棚夾道士庶舞抃路側皆曰不圖今日再見二聖百寮班於舍元殿庭上皇御殿左相苗晉卿率百辟稱賀人人無不感咽禮畢上皇詣長樂殿謁九廟神主即日幸興慶宮上請歸東宮上皇遣高力士再三慰諭而止三載正月甲戍朔戊寅上皇御宣政殿冊皇帝尊號曰光天文武大聖孝感皇帝乙巳上御興慶殿奉冊上皇徽號曰太上至道聖皇大帝丁未御丹鳳門大赦天下改至德三載為乾元元年二年九月庚寅逆胡史思明陷洛陽副元帥李光弼守河陽汝鄭滑等州陷賊三年閏四月朔彗出西方其長數丈己卯以星文變異上御丹鳳門大赦天下改乾元為上元追封周太公望為武成王依文宣王例置廟時大霧自四月雨至閏月末不止米價翔貴人相食饑死者委骸於路二年三月甲子史朝義率衆夜襲我陜州衛伯玉逆擊敗之戊戍史思明為其子朝義所殺九月壬午制自今已後朕號唯稱皇帝其年號但稱元年去上元之號其以今年十一月為歲首便數建丑建寅每月以所建為數建卯月辛亥朔上御丹鳳門大赦以京兆府為上都河南府為東都鳳翔為西都江陵為南都太原為北都建巳月庚戍朔壬子楚州刺史崔侁表獻定國寶玉十三枚甲寅太上皇崩於西內神龍殿上自仲春不豫聞上皇登遐不勝哀悸因茲大漸乙丑詔皇太子監國又曰上天降寶獻自楚州因以體元叶乎五紀其元年宜改為寶應建巳月為四月餘月並依常數仍依舊以正月一日為歲首丁卯宣遺詔是日上崩于長生殿年五十二諡曰文明武德大聖大宣孝皇帝廟號肅宗寶應二年三月葬于建陵史思明附唐書史思明本名窣于營州寧夷州突厥雜種胡人也狹瘦少鬚鼻傴背眼目廞枯性急躁與安祿山同鄉里相校一日生思明除日生祿山歲日生及長相善俱以驍勇聞初事特進烏知義每令輕騎覘賊必生擒以歸又解六蕃語與祿山同為玄市郎張守圭為幽州節度奏為折衝天寶初頻立戰功官至將軍知平盧軍事嘗入奏玄宗賜坐與語甚奇之問其年曰四十矣玄宗撫其背曰卿貴在後勉之遷大將軍北平太守十一載祿山奏授平盧節度都知兵馬使十四載祿山反命思明討饒陽等諸郡陷之十五載正月六日思明與蔡希德圍顏杲卿於常山九日拔之又圍饒陽二十九日不能拔李光弼出土門收常山郡思明解圍而拒光弼光弼列兵於城南相持纍月光弼草盡使精卒以車數乘於旁縣取草輒被擊之其後率十匹唯共得兩束草至銼蒿薦以飼之初祿山以賈循為范陽留後謀歸順為副留守向潤客所殺以思明代之又以征戰在外令向潤客代其任四月朔方節度郭子儀以朔方蕃漢二萬人自土門而至常山軍威遂振南收趙郡思明退保博陵五月十日子儀光弼敗思明於沙河上思明以騎卒奔嘉山光弼擊之思明又敗走入博陵郡光弼圍之城方拔屬潼關失守肅宗理兵于朔方使中官邢延恩追朔方河東兵馬光弼入土門思明隨後邀擊之思明將卒頗精鋭皆平盧戰士因南收常山趙郡又攻河間平原顏真卿以兵食既盡乃渡河而南由是河北之地悉陷於思明至德二年正月思明以蔡希德合范陽上黨兵馬十萬圍李光弼於太原光弼使為地道至城陳前驍賊方戲弄城中人地道中人擒而曳之賊以為神呼為地藏菩薩思明留十月會安祿山死慶緒令歸范陽希德留百餘日竟不能拔而歸自祿山陷兩京常以駱駝運兩京御府珍寶於范陽不知紀極由是資其逆謀思明轉驕慶緒之命慶緒為王師所敗投鄴郡其下蕃漢兵五萬人初不知所從思明擊殺三千人然後降之慶緒使阿史郍承慶安守忠徵兵於思明且欲圖之判官耿仁智忠諒之士謂思明曰大夫崇重人不敢言仁智請一言而死思明曰試言之對曰大夫久事祿山祿山兵權若是誰敢不服如大夫比者逼於凶威耳固亦無罪今聞孝感皇帝聰明勇智有少康周宣之略大夫發使輸誠必開懷見納此轉禍為福之上策也思明曰善承慶等以三千騎至范陽思明悉衆介胄以逆之衆且數萬去之一里使人謂之曰相公及王遠至將士等不勝喜躍此皆邊兵怯懦頗懼相公之衆莫敢進也請弛弓以安之從之思明遂以承慶守忠入內廳飲樂之別令諸將於其所分收其甲仗其諸郡兵皆給糧恣歸之欲留者分隸諸營遂拘承慶斬守忠及李立節之首會李光弼使衙官敬俯招之思明遂令衙官竇子昂奉表以所管兵衆八萬人兼以僞河東節度高秀巖來降肅宗大悅封思明為歸義王范陽長史御史大夫河北節度使朝義以下並為列卿秀巖雲中太守以其男如嶽等七人為大官使內侍李思敬將軍烏承恩宣慰便令討殘賊明年改元乾元四月肅宗使烏承恩為副使候伺其過而殺之初承恩父知義為節度思明常事知義亦有開獎之恩以此光弼冀其無疑因謀殺之承恩至范陽數漏其情夜取婦人衣衣之詣諸將家以翻動之意諭之諸將以白思明思明甚懼無以為驗有頃承恩與思敬從上京來宣恩命畢將歸私第思明留承恩且於館中思明當有所議已令幃其所寢之床伏二人于其下承恩有小男先留范陽思明令省其父夜後私於其子曰吾受命除此逆胡便授吾節度矣床下二人叫呼而出以告思明思明令執之搜其衣囊得朝廷所與阿史郍承慶鐵券及光弼與承恩之牒云承慶事了即付鐵券不了不可付之又得簿書數百紙皆載先所從反軍將名思明語之曰我何負於汝而至是耶承恩稱死罪此太尉光弼之謀也思明集軍將官吏百姓西向大哭曰臣以十三州之地十萬衆之兵降國家赤心不負陛下何至殺臣因榜殺承恩父子囚李思敬遣使表其事朝廷又令中使慰諭云國家與光弼無此事乃承恩所為殺之善也又有使從京至執三司議罪人狀以示思明思明曰陳希烈已下皆重臣上皇棄之幸蜀既收復天下此輩當慰勞之今尚見殺况我本從祿山反乎諸將皆云烏承恩之前事情狀可知光弼尚在憂不細也大夫何不取諸將狀以誅光弼以謝河北百姓主上若不惜光弼為大夫誅之大夫乃安不然為患未已思明曰公等言是乃令耿仁智張不矜修表請誅光弼謝河北若不從臣請臣則自領兵往太原誅光弼不矜初以表示思明及封入函耿仁智盡削去之寫表者密白思明思明怒甚執二人於庭曰汝等何得負我命斬之仁智事思明頗久意欲活之卻令召入謂之曰我任使汝向三十年今日之事我不負汝仁智大叫曰人生固有一死須存忠節今大夫細邪說為反逆之計縱延旬月不如早死請速加斧鑕思明大怒亂捶亂捶殺之腦流于地十月郭子儀領九節度圍相州安慶緒偷道求救於思明思明懼軍威之盛不敢進十二月蕭華以魏州歸順詔遣崔光遠替之思明擊而拔其城光遠脫身南渡思明於魏州殺三萬人平地流血數日即乾乾元二年正月一日也思明於魏州北設壇僣稱為大聖燕王以周贄為行軍司馬三月引衆救相州官軍敗而引退思明召慶緒等殺之併有其衆四月僣稱大號以周贄為相以范陽為燕京九月寇汴州節度使許驥合於思明思明益振又陷洛陽與太尉光弼相拒思明恣行凶暴下無聊矣上元二年潛遣人反說官軍曰洛中將士皆幽朔人咸思歸魚朝恩以為然告光弼及諸節度僕固懷恩衛伯玉等可速出兵以掃殘賊光弼等然之乃出師南道齊進次榆林賊委物僞遁將士等不復設備皆入城虜掠賊伏兵在北邙山下因大下士卒咸棄甲奔散魚朝恩衛伯玉退保陜州光弼懷恩棄河陽城退居聞喜步兵散死者數千人軍資器械盡為賊有河陽懷州盡陷於賊思明至陜州為官軍所拒於姜子反戰不利退歸永寧築三角城約一日內畢以貯軍糧朝義城畢未泥思明至詬之對曰緣兵士疲乏暫歇耳又怒曰汝惜部下兵違我處分令隨身數十人立馬看泥斯須而畢又曰待收陜州斬卻此賊朝義大懼是夕思明居驛朝義在店中思明令心腹曹將軍揔中軍兵嚴衛朝義將駱悅并許驥男季常等言主上欲害王悅與王死無日矣因言廢興之事古來有之欲喚取曹將軍舉大事可乎朝義回面不應王悅曰王若不應悅等即歸李家王亦不全矣朝義然之令許季常命曹將軍至悅等告之不敢拒其夜思明夢而驚悟據床惆悵每好伶人寢食置左右以其殘忍皆恨之及此問其故曰吾向夢見水中沙上群鹿渡水而至鹿死水乾言畢如廁伶人相謂曰鹿者祿也水者命也胡祿命俱盡矣駱悅入問思明所在未及對殺數人因指在廁思明覺變踰牆出至馬槽鞴馬騎之王悅等至令傔人周子俊射中其臂落馬曰是何事悅等告以懷王思明曰我朝來語錯合有此事然汝殺我太疾何不待我收長安終事不成矣因急呼懷王者三曰莫殺我囚我卻罵曹將軍曰這胡誤我這胡誤我悅遂令心腹手擒思明赴柳泉驛曰事已成矣朝義曰莫驚聖人否莫損聖人否悅曰無時周贄許驥統後軍在福昌朝義令許季常往告之贄聞驚欲仰倒朝義領兵回贄等來迎因殺贄思明至柳泉驛縊殺之朝義便僣僞位寶應二年為李懷所擒梟首送闕下代宗孝武皇帝唐書曰代宗孝武皇帝諱豫肅宗長子母曰章敬皇太后吳氏以開元十四年十二月生于東都上陽宮初名俶年十五封廣平王玄宗諸孫百餘上為嫡皇孫宇量弘深寬而能斷喜怛不形於色仁孝溫恭動必由禮幼好學尤專禮易玄宗鍾愛之祿山之亂京城陷賊從肅宗搜兵靈武以上為天下兵馬元帥時朝廷草創兵募寡弱上推心示信招懷流散比至彭原兵衆數萬及肅宗回幸鳳翔時房琯郭子儀繼戰不利賊鋒方鋭屢來寇襲上選求勇幹頻挫其鋒聖慮遑寧士心大振及帥師進討雪涕辭違步出闕門方始乘馬回紇葉護王子率兵入助勇冠諸蕃上接以優恩結為兄弟故香積之戰賊徒大敗遂委西京而遁雖子儀嗣業之奮命由上恩信結於士心故人思自效既收京城民庶安堵秋毫不犯遺老歡迎對之歔欷聞賊殘衆猶保陜郊即日長驅東趍虢略新店之役一戰大捷慶緒之黨十殲七八數旬之間河南砥定兩都恢復二聖回鑾統率之功推而不受肅宗還京改封楚王乾元元年三月改封成王四月庚寅立為皇太子改名豫上元末年兩宮不豫太子往來侍疾躬嘗藥膳衣不解帶者久之及承監國之命流涕從之寶應元年四月肅宗大漸所幸張皇后無子后懼上功高難制陰引越王係於宮中將圖廢立乙丑皇后矯詔召太子中官李輔國程元振素知之乃勒兵於凌霄門俟太子至即衛從太子入飛龍廄以俟其變是夕勒兵於三殿收捕越王係及內官朱光輝馬英俊等禁錮之幽皇后於別殿丁卯肅宗崩程元振等始迎上於九仙門見群臣行監國之禮己巳即皇帝位於柩前二年秋七月壬寅朔戊申群臣上尊號曰寶應元聖文武皇帝御含元殿授冊壬子御宣政殿宣制改元曰廣德大赦天下是月吐蕃大寇河隴陷秦成渭三州又大震關西陷蘭廓河鄯洮岷等州盜有隴右之地己丑吐蕃寇涇州刺史高暉以城降因為吐蕃鄉導冬十月庚午朔辛未高暉引吐蕃犯京畿寇奉天武功盩屋等縣蕃軍自司竹園渡渭循南山而東丙子車駕幸陜州戊寅吐蕃入京師立廣武王承宏為帝仍逼前翰林學士于可封為制封拜辛巳車駕至陜州子儀在商州會六軍使張知節烏崇福長孫全緒等率兵繼至軍威遂振舊將王甫誘聚京城惡少年齊擊鼓於朱雀街蕃軍震懾狼狽奔潰庚寅子儀收京城壬辰以宰臣元載判天下元帥癸巳以郭子儀為京城留守十二月丁亥車駕發陜郡還京辛卯鄂州大風火發江中焚船三千艘焚居人廬舍二千家甲午上至自陜州二年二月己巳朔冊天下兵馬元帥尚書令雍王適為皇太子癸酉上親薦獻太清宮太廟乙亥祀昊天上帝於圓丘冬十月景寅僕固懷恩引吐蕃二萬寇邠州節度使白孝德閉城拒守丁卯寇奉天京師戒嚴先鋒將郭晞斬賊營於邠州西俘斬數百計三年春正月癸卯朔制大赦天下改為永泰元年三月庚戍吐蕃請和詔宰臣元載杜鴻漸與蕃使同盟于興唐寺辛亥大風拔木是春大旱京師米貴斛至萬錢九月丁酉僕固懷恩死于靈州之鳴沙縣時懷恩誘吐蕃數十萬寇邠州蕃將尚給思贊磨尚悉東贊等寇奉天醴泉黨功羌渾奴刺寇同州及奉天逼鳳翔府厔縣京師戒嚴九年八月辛未幽州節度使朱泚遣弟滔奉表請自入朝兼自率五千騎防秋許之詔所司築第待之十年春正月乙未朔丁酉昭義牙將裴志清逐其帥薛崿崿奔名州上章待罪志清率衆歸田承嗣乙未朱泚乞留京師西征吐蕃請以弟滔權為幽州留後許之十二年三月宰相元載王縉得罪下獄命吏部尚書劉晏訊鞫之辛巳制中書侍郎平章事元載賜自盡門下侍郎平章事王縉貶撫州刺史十四年五月癸卯上不康至辛亥不視朝辛酉皇太子監國是夕上崩于紫宸之內殿諡曰睿文孝武皇帝廟號代宗十月己酉葬元陵
