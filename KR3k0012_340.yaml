body:
  text: 兵部七十敘兵器禮記曰冕辨兵革藏於私家是謂脅君周禮曰司兵掌五兵五兵者戈殳戟矛牟夷左傳曰孔文子將攻太叔訪于仲尼仲尼曰胡簋之事則嘗聞之矣兵甲之事未之學也春秋佐期曰太尉主甲卒神名辨會曰庫兵動鼓自鳴諸侯得衆也漢書曰兵不鋭利與空手同甲不堅密與袒裼同弩不及遠與短兵同射不能中與亡矢同中不能入與亡鏃同此將不省兵之禍也又曰韓延壽在東郡試騎士治飾兵車畫龍虎建幢棨植羽葆鼓車又取官銅候月蝕鑄作刀劍倣效尚方蕭望之以為僣上不道棄市又曰李陵至浚稽山與單于相值圍陵陵軍居兩山間以車為營陵引士營外為陳前行持戟楯後行持弓弩東觀漢記曰盆子降鎧甲兵弩積城西門高與熊耳山等又曰王莽之遣王尋王邑也欲盛威以震山東甲衝輣干戈旌旗甚盛又曰鄧遵永初中遷度遼將軍討擊羌虜斬首八百餘級得鎧弩刀矛戟楯匕首二三千枚又曰吳漢性忠厚篤於事上自初從征伐常在左右兵有不利軍營不如意漢常獨繕激揚吏士吳志曰賀齊性奢侈尤好軍事兵甲器械極為精好干櫓戈矛葩爪文畫弓弩矢箭咸取上材王隱晉書曰羊祜表伐吳曰徑弩長弓不如中國長矛楯戟不如中國馬騎淩厲又不如中國吳唯便水戰一入其地則長江非復吳有晉起居注曰成帝咸和元年四月乙丑詔曰作琅邪王大車斧六十枚侍臣劍八枚將軍手戟四枚三國典略曰梁邵陵王綸篤好書史妙工草隸為丹湯尹擅造甲仗梁武知之綸並沉于江中及後出征器械並闕乃獨歎曰吾昔聚仗本備非常朝廷見疑逼使分散今日討逆卒無所資太公六韜曰春以長矛在前夏以大戟在前秋以弓弩在前冬以刀楯在前此四時應天之法也太公金匱曰武王曰五帝之時無守戰之具國存者何太公曰守戰之具皆在民間耒耜者是其弓弩也鋤耙者是其矛戟也簦笠者是其兜鍪也鎌斧者是其攻戰之具也雞狗者是鉦鼓也古司馬兵法曰兵不雜則不利長兵以衛短兵以守太長則犯太短則不及太輕則鋭鋭則易亂太犯則不齊兵長短相衛太短太輕者皆不如法也犯者觸柱也故不齊不及者遠於利也鋭者不固則破故奔北擾亂也又曰弓矢圍殳矛守戈戟助凡五兵當長以衛短短以救長迭戰則久皆戰則強李氏曰迭更也言更戰更息則可堪久悉舉軍戰衆多者強軍令曰始出營豎矛戟舒幡旗鳴鼓角行三里辟矛戟結幡旗鳴鼓角未至營三里復豎矛戟舒幡旗鳴鼓角至營復結幡旗止鼓角違令者髡呂氏春秋曰古之至兵士民未合而威已諭矣敵已服矣豈必用袍鼓干戈哉淮南子曰兵革錞摩錞祺名也金鼓鈇鉞所以飾怒也錞市均切又曰所謂兼國有地者伏尸數十萬破車以千百數傷弓弩矛戟矢石之創者扶輿於路故世至枕人頭食人肉葅人肝飲人血甘之於貓豢牛羊貓牛肉豢豕肉故自三代以後者天下未嘗得安其情性而樂習俗保其修命而不夭於人虐也所以然者何諸侯力政天下不合而為一家也又曰齊桓公將欲征伐甲兵不足令有重罪者出犀甲一戟犀甲取其堅也戟車戟也長丈六尺犀或作三直出三甲也有輕罪者贖以金分輕小以金分出金匱隨罪輕重有分兩也説而不勝者出一束箭不勝猶不直也箭十二為束也百姓皆説乃矯箭為矢矢箭之竿好者也鑄金而為刃刃五刃也刀劍矛戟矢也以伐不義而征無道遂霸天下崔實政論曰兵器精利有蔡太僕之弩龍亭之劍至今擅名天下陸機要覽曰東弓南矛西戟北劍中鼓亦曰四兵鹽鐵論曰強楚徑鄭有犀兕之甲堂溪之揵內據金城外任利兵是以威行諸夏強伏敵國故孟賁畜臂衆人輕之怯夫有備其氣自倍以吳楚之士儛利劍蹶強弩以與狢虜騁於中原一人當百不足道也邯鄲五經折疑駮曰矢絶於弦不可追止戟執在手制之在人山海經曰天地東西二萬八千里南北二萬六千里出銅之山四百六十七出鐵之山三千六百九十此天下之所分壤樹穀也戈矛之所發也刀鎩之所起也能者有餘拙者不足干寶搜神記曰晉元康中婦人以金銀象角玳瑁為斧鉞戈戟而戴之以當笄蓋妖之大者也樊文淵七經義綱格論曰車上五兵戈殳車戟酋矛牟夷步卒五兵戈殳車戟酋矛矢魏文典論曰昔周有雍孤之戟屈盧之矛狐父之戈上世名器又曰抱朴子曰劍戟不皆於縫佳饌不可擊斷牛馬又曰陳吳之徒奮劍而大呼劉項之倫揮戈而颷駭又曰或問辟五兵之道抱朴子答曰吳大皇帝曾從介先生受要道云但知北斗姓字及日月名字便不畏白刃大皇帝以試告左右數十人常為先登陷陳皆不傷也鄭君云但誦五兵名亦驗矣刀名大房虛星主之矢名防徨熒惑主之弓名曲張角星主之弩名遠望張星主之戟名大將參星主之臨戰時嘗細祝之或以五月五日作赤靈符著心前或丙午日日中作燕軍龍虎三囊符歲易之歲符歲易月符月易日符日易或佩西毒兵信符或佩南極鑠金符或取牡荊以作六陰神將符指敵人或以月蝕時刻三歲蟾蜍候下之有八字者血以書所將之刀劍或交鋒之際乘魁履剛呼四方之長亦有明效也魏文帝校獵賦曰抗沖天之素旄兮靡格擇之修循旃雄戟趪音皇而躍厲兮黃鉞扈而楊鮮又曰千乘亂擾萬騎奔走經營原隰騰越峻岨彤弓斯彀戈鋋具舉徐幹齊都賦曰矢流鏑絓胡卦切張羅𥸢作合切飛鋋抱雄戈繆襲籍田賦曰靈旗蔚以燾奡兮雄戟偈以而嵯峨彎枉矢於狼狐兮建黃鉞於匏瓜繁欽征天山賦曰有漢丞相武平侯曹公杖節東征觀六軍於三江浮五湖以曜武左駢雄戟右攢干將彤弧朱矰舟羽絳房望之如火映奪朝陽應璩詩曰放戈釋甲胄乘軒入紫微從容待帷幄光輔日月暉崔駰安豐侯詩曰被兕甲兮跨良馬擇長戟兮彍強弩彍音霍曹植詩曰皇考建世業余從征四方櫛風而沐雨萬里蒙露霜劍戟不離手鎧甲為衣裳魏文帝董桃行曰晨背大河南轅跋涉遐路漫漫師徒百萬譁喧戈矛若林成山旌旗拂日蔽天應璩書曰左執屈盧之徑矛右秉干將之雄戟高冠拂雲長劍耿介簫管振音厥聲載路馮軾虎視清風震疊可謂堂堂乎難與並為仁也太白陰經曰工欲善其事必先利其器器之於事如影之隨形嚮之應聲其相須如左右手故曰器械不精不可言兵五兵不利不可舉事上古庖犧氏之時弦木為弓剡木為矢神農氏之時以石為兵故砮石中矢鏃黃帝之時以玉為兵𧈪尤之時爍金為兵割革為甲始制五兵建旗幟樹夔鼓又曰鼓以佐軍威又曰纛六口大將中營建出引六軍右者天子六軍諸侯三軍今天子十二諸侯六軍故纛有六以主之又曰門旗二口色紅八幅大將牙門之旗出引將軍前列又曰門槍二根以豹尾為刃搕出居紅旗後止居帳門前左右安立又曰五方旗五口各具方色大將中營建出六纛後在營亦於纛後隨方而建又曰嚴警鼓一十二面大將營前左右行列各六面在纛後又曰角十二具於鼓左右後列各六具以代金又曰隊旗二百五十面尚色圖禽與本陳同五幅又曰認二百五十口尚色圖禽與諸陳不同各自為志認旗出居隊後恐士卒交雜又曰陳將門旗各任所色不得以紅恐雜大將軍又曰陳將鼓一百二十五面恐設疑驚敵用又曰甲六分七千五百領又曰戰袍四分五千領又曰搶十分一萬二千五百根恐揚兵縛筏用又曰牛筋牌二分二千五百面馬軍以團牌代四分支又曰弩二分絃三副箭一百分二千五百張弩七千五百條弦二十五萬隻箭又曰弓十分弦三副箭一百五十分一萬二千五百張弓三萬七千五百條弦三十七萬五千隻箭射申箭五萬隻又曰生錍箭二萬五千隻長箭垛箭錍匹梨切又曰弓袋胡鹿張弓袋並一萬二千五百副又曰佩刀八分一萬口又曰陌刀二分二千五百口又曰棓二分二千五百張馬軍及陌刀並以啄錐鉞斧代各四支分又曰搭索二分二千五百條馬軍用也牙兵書曰牙旗者將軍之精凡始堅牙必以制日制日者謂上剋下日也立牙之日吉氣來應大勝之徵凶氣先應破軍殺將黃帝出軍決曰始立牙之日喜氣來應旗幟指敵或從風舉暉二終日不繞竿勇氣奔逸是謂堂堂之陳此大勝之徵又曰有所攻伐作五采牙旗青牙旗引住東赤牙旗引住南白牙旗引住西黑牙旗引住北黃牙旗引住中又曰始立牙之日凶氣先應旗幟皆垂或逆風滂浡牙竿摧折旗幡絶烈還繞繳竿如此終日勢弱又曰將軍出兵有所討伐引兵出城門望見白雲及白水者舉白牙旗五色牙旗隨天氣四時也真人水鏡經曰凡軍始出立牙竿必令貌堅若有折將軍不利牙旗竿軍之精也即周禮司常職云軍旅會同置旌門是也抱朴子曰軍始舉牙立旗風氣和調幡校飄飄終日不息者其軍有功魏志曰典韋初為張邈士屬司馬趙寵牙門長大莫能勝韋一手建之寵異其才力吳志曰陸遜為右部督會丹陽賊帥費棧扇動山越權遣遜討棧棧支黨多所往兵少遜乃益施牙幢分布鼓角夜潛出谷間鼓譟而前應即破散又曰黃武八年夏黃龍見樊口於是權稱尊號因瑞改元又作黃龍大牙常在中軍諸軍進退視其所向命胡綜作賦吳書曰賀齊從上討合肥時城中出戰徐盛失牙齊別拒擊得盛所失牙晉書曰陸機始臨戎而牙旗折意甚惡之後戰軍果大敗後魏書曰奚斤代人也魏初大將行師唯長孫嵩拒劉𥙿及斤征河南獨給漏刻及十二牙旗吳胡綜大牙賦曰狼狐垂曜實惟兵精聖人觀法是效是營始作器械爰求厥成明明大吳實天生德乃律天時制為神軍取象太一五將三門疾則如電遲則如雲進止有度約而不煩四靈既布黃龍處中周制日月實曰太常桀然特立六軍所望後漢滕輔祭牙文曰恭羞太牢潔薦遐靈推轂之任實討不庭天道助順正直聰明晉袁宏祭牙文曰天生五才治道所司廢一不可靜亂輔時赫赫晉德乃武乃文中世不競王度暫屯戎狄猾夏虔劉生民蠢爾東胡被髮左袂思我皇澤稽首海裔受爵納貢服膺纍世後嗣不恭實叛實戾侵我神畿隔我嘉惠哀彼黎民嬰此雕殘况荷大寵任其艱難慨然發憤撫劍忘餐敢建高牙烈烈桓桓晉顧愷之祭牙文曰維年月日録尚書事豫章公𥙿敢告黃帝𧈪尤五嶽之靈兩儀有正四海有王晉命在天世德重光烈烈高牙闐二伐鼓白氣經天簡楊神武宋王誕伐廣固祭牙文曰敬建崇牙顯茲威靈使鳴金輟釁無戰有寧皇風幽被凱斾歸旌宋鄭鮮祭牙文曰潔牲先事薦茲敬祭崇牙既建義綘增厲人鬼一揆三才同契帷茲靈鑒庶必有察逆順幽辨忠孝顯節使凶醜時殲主寧臣悅振旅上京凱歸西蕃神器增暉四境永安唐陳子昂禡牙文曰蓋先王作兵以討有罪姦匿竊命戎夷不龔則必肆諸市朝大戮原野皇家子育万國寵綏百蠻青雲干呂自環入貢久有年矣契丹凶羯敢亂天常乃蜂聚丸山豕食遼塞宴安鴆毒作為攙槍天厭其凶國用致討皇帝命我肅將王誅今大軍己集告辰叶應旄頭首建羽斾前列夷貊感威將士聽誓方俟天命為民殄災惟爾有神尚殲乃醜召太一會雷公翼白虎乘青龍星流彗掃永清朔裔使兵不血刃戎夏大同以昭我天子之德允乃神之功豈非正直克明無縱大讎以作神羞
