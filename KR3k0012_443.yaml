body:
  text: 人事部八十三知人上尚書咎繇曰都在知人在安民禹曰吁咸若時惟帝其難之言堯亦以知人安民為難故曰吁知人則哲能官人安民則惠黎民懷之禮記曰趙文子與叔譽觀乎九原文子曰死者如可作也吾誰與歸叔譽曰其陽處父乎處父字文公之傳也文子曰行并植音特於晉國不沒其身其智不足稱也并專也謂剛而專為狐射姑所殺其咎犯乎文子曰見利不顧其君其仁不足稱也我則隨武子乎利其君不忘其身謀其身不遺其友晉人謂文子其中退然如不勝衣其言訥訥然如不出諸其口所舉於晉國管庫之士七十有餘家生不交利死不屬其子焉春秋僖五年曰鄭殺申侯初申侯申出也姊妹之子日出有寵於楚文王文王將死與之璧使行曰唯我知女女專利而不厭豫取豫求不女疪瑕從我取從我求我不以女為罪後之人將求多於女謂嗣君也求多以禮義大望責之女必不免我死女必速行無適小國將不女容焉政狹法峻既葬出奔鄭又有寵於厲公子文聞其死也曰古人有言曰知臣莫若君弗可改也已又曰晉文公及曹曹共公聞其駢脅欲觀其裸浴薄而觀之薄迫也駢脅合幹僖負羈之妻曰吾觀晉公子之從者皆足以相國若以相若遂以為傅相夫子必反其國反其國必得志於諸侯而誅無禮曹其首也子盍蚤自二焉自二自別異於曹乃饋盤飧置璧焉臣無竟外之交故用盤藏璧飧中不欲令人見也公子受飧反璧又曰秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽戶而還遂霸西戎用孟明也君子是以知秦穆之為君也舉人之周也與人之一也一無二心孟明之臣也其不解也能懼思也子桑之忠也其知人也能舉善也子桑公孫枝舉孟明者詩曰于以采繁于沼于沚于以用之公侯之事秦穆有焉詩國風言沼沚之繁至薄猶采以共公侯以喻秦穆不遺小善夙夜匪懈以事一人孟明有焉詩大雅善仲山角也一人天子也詒厥孫謀以燕翼子子桑有焉詒遺也燕安也翼成也詩大雅美武王能遺其子孫善謀以安成子孫言子桑有舉善之謀又曰晉陽處父聘于衛反過寧寧嬴從之及溫而還其妻問之嬴曰以剛商書曰沈潛剛克高明柔克夫子一之其不沒乎陽子性純剛天為剛德猶不干時寒暑相順況在人乎且華而不實怨之所藂也言過其行犯而藂怨不可以定身剛則犯人余恐不獲其利而離其難是以去之為六年晉殺處父又曰晉侯觀于軍府見鍾儀問之曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使稅之稅解也召而弔之再拜稽首問其族對曰伶人也伶人樂官公曰能樂乎對曰先父之職官也敢有二事使與之琴操南音南音楚聲公曰君王何如對曰非小人之所得知也固問之對曰其為太子也師保奉之以朝于嬰齊而夕于側也嬰齊令尹子重側司馬子反言其尊卿敬老不知其他公語范文子文子曰楚囚君子也言稱先職不背本也樂操土風不忘舊也稱太子抑無私也舍其近事而遠稱少子以示性所自然明至誠名其二卿尊君也尊晉君也不背本仁也不忘舊信也無私忠也尊君敏也仁以接事信以守之忠以成之敏以行之事雖大必濟言有此四德必能成大事君盍歸之使合晉楚之成公從之重為之禮使歸求成又曰子産始知然明問為政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀也子産喜以語子太叔且曰他日吾見蔑之面而已蔑然明名今吾見其心矣又曰韓宣子如齊納幣見子雅子雅召子旗子旗子雅之子使見宣子曰非保家之主也不臣志氣亢見子尾子尾見疆疆子尾之子宣子謂之如子旗亦不臣大夫多笑之唯晏子信之曰夫子君子也夫子韓起君子有信其有以知之矣為十年齊欒施高疆來奔漢書曰薛宣為丞相而翟方進為司直宣知方進大儒有宰相器深結厚焉後方進竟代為丞相又曰薛宣字貢君初宣察孝廉琅琊太守趙貢見宣異之令妻子與相見戒曰貢君至丞相我兩子亦中丞相史宣為相除趙貢兩子為史東觀漢記曰上既破邯鄲誅王郎召鄧禹宿夜語曰欲北發幽州突騎諸將誰可使者禹曰吳漢可其人勇鷙有智謀諸將鮮能及者上於是以漢為大將軍漢遂斬幽州牧苗曾上以禹為知人更始時大司馬朱鮪在洛陽上欲南定河內問禹曰諸將誰可使守河內者禹曰寇恂文武備足有牧民之才河內富貴南迫雒陽非寇恂莫可使也上拜寇恂為河內太守又曰朱勃字叔陽年十二能誦詩書候馬援兄勃衣方領能矩步辭言間雅援才知書見之自失兄知其意乃自酌酒慰援曰朱勃小器速成智盡此耳卒當從汝稟學及援為將軍封侯而勃位不過縣令又曰虞延字子大陳留人孝明帝時有新野功曹鄧寅以外戚小侯每豫朝會而容姿趍步有出於衆顯宗目之顧左右曰朕之儀貌豈若此人特賜輿馬之服延以寅雖有容儀而無實行未嘗加禮拜郎中遷玄武司馬寅在職不服父喪帝聞乃歎曰知人則哲惟帝難之信哉斯言以延為明謝承後漢書曰許邵字子將汝南平輿人清論風行高唱草偃多所賞識拔樊子昭於未聞天下咸稱許郭袁山松後漢書曰李膺子瓚位至東平相初曹操微時瓚異其才將沒謂子宣等曰世將亂矣天下英雄無過曹操張孟卓與吾善袁本初汝外親雖爾勿依必歸曹氏諸子從之並免亂世矣又曰南陽何顒初見曹操歎曰漢將亡安天下者必此人也操以是嘉之魏志曰武帝機警有權數時人莫知者橋玄見而異焉謂曰今天下將亂安生民者其在君乎太祖常感其知己後經過玄墓輒悵然致祭又曰王粲字仲宣蔡雍見而奇之時雍才學顯著常車騎填巷賓客盈座聞粲在門倒屣迎之粲年既幼弱容狀短小一座皆驚雍曰此王公孫也有異才愧吾不如也吾家書籍文章盡當與之又曰陳群為童兒時祖晏常異之曰此兒必興吾門群為司空而曹屬時薦樂安王摸下邳周逵者太祖辟之還教以為摸逵穢德終必敗太祖不聽後摸逵皆坐姦宄誅太祖以謝群群薦廣陵陳喬丹陽戴乾太祖皆用之後吳人叛乾忠義死難喬為名臣又曰楊駿字季才司馬宣王年十六七與駿相遇駿曰此非常人也同邵王象少孤特為人僕隸年十七八使牧羊而私讀書駿見美其人質即贖著家中娉妻立屋然與別駿自少及長以人倫自任魏略曰趙歧逃難匿姓名賣餅北海市時安丘孫嵩字賓石遊市見歧察非常人呼與共載歧懼失色嵩乃令騎屏行人從容問曰視子非賣餅者不有重怨即亡命乎北海孫賓石闔門百口勢能相濟歧素聞嵩名即以實告之遂與俱歸藏歧復壁中孫盛魏氏春秋曰嘉平元年右將軍夏侯霸本蜀人問太傅之德霸對曰彼自為家非人臣也問京師雋士對曰有鍾會者若管朝政吳蜀之憂也蜀志曰先主年十五母使學同宗劉德然遼西公孫瓚俱事同郡盧植德然父元起常資給先主與德然等起妻曰各自一家何能常爾耶起曰吾宗中有此非常人也又曰諸葛亮字孔明琅琊人耕壟畝好為梁父吟自比於管仲樂毅時人莫之許也唯博陵崔州平頴川徐庶與亮友善謂為信然先主屯新野庶見先主器之庶謂先主曰諸葛孔明臥龍也將軍豈願見之先主曰君與俱來庶曰此人可就見不可屈致也將軍宜枉駕顧之由是先主詣亮又曰龐統字士元襄陽人少時朴鈍未有識者頴川司馬微清雅有知人鑒統弱冠往見微微採桑樹上坐統桑下共語自晝達夜微甚異之稱當為南州士人冠冕由是漸顯也吳志曰顧邵字孝則雍長子也年三十七起家為豫章太守小吏姿質佳者令獎就學擇其先進擢置左右職舉善以教風化大行初錢塘丁謂出於役伍陽羡張康生乎民庶烏程吳粲雲陽殷禮起乎微賤邵皆拔而友之謂至典軍中郎康至丹陽禮至零陵令粲至太子少保又曰張溫字惠恕少修操容貌瓌偉權聞之以問公卿曰溫當今與誰為北大司農劉基曰無可與為輩顧雍曰溫當今無輩權曰如是張允不死也徵到延見文辭占對觀者傾悚權改容加禮又曰張昭字子布為人矜嚴忠謹能識人諸葛恪字元遜年少之時衆人奇其英才昭言終敗葛氏者元遜吳書曰陶謙字恭祖年十四獨帛幡乘竹馬而戲邑中兒童皆隨之蒼梧太守同縣甘公出遇之於塗見其容貌異住車與語甚悅之因許妻以女甘夫人怒曰聞陶家兒遨戲無度如何以女許之甘公曰彼有奇志必大成遂與之後為徐州刺史王隱晉書曰石苞少子崇字季倫苞臨終預分諸子財物獨不及崇其母以為言苞曰此兒雖小大自能得財也又曰魏舒字陽元任城人容貌朴實少號遲鈍人莫之知唯叔父衡知其奇每有賓客己常勸使過舒言吾兄子非常人也虞預晉書曰魏舒少名遲鈍唯太原王又曰卿終當為台輔然亦不能令妻子免飢寒吾當助卿營之常借給舒受而不辭又曰武陔字元夏沛國竹邑人父同有顯名陔及二弟韶茂皆總角見稱時同郡劉公榮名人嘗詣同過陔兄弟與觀其舉動便出語同曰君三子皆國士也元夏量最優出輔佐之風仕官可為亞公叔夏季夏不減常伯納言陔後果開府徐廣晉書曰鄭齊純和有識初荀攸見齊曰鄭公業為不亡矣時相國掾魏諷有盛名同郡任覽謂齊曰諷姦雄必以禍終子宜絶之後諷果敗司空王朗辟掾委以求才齊舉高陽許允扶風魯芝東萊王基並為名臣又曰魏謁者郭玄信出使從弘農求御人遣石苞及鄧艾為御行十餘里玄信謂二人曰子並當至將相既而苞為縣吏到鄴賣鐵于市長趙元儒異之曰公輔才也遂與交稍遷至弘農司馬欲求縣吏部郎許允謂苞曰君我輩人也當相引置朝廷何欲小縣乎苞還歎不意允之知己晉書陶侃傳曰樂廣欲會荊楊士人武庫令黃慶進侃於廣人或非之慶曰此子終當遠到復何疑也又曰王導少有風鑒識量清遠年十四陳留高士張公見而奇之謂其從兄敦曰此兒容貌志氣將相之器也又石苞傳曰趙元儒有知人鑒見苞異之因與結交歎苞遠量當至公輔又曰陸雲幼時吳尚書廣陵閔鴻見而奇之曰此兒若非龍駒當是鳳雛又曰劉裕為布衣衆未之識也唯王謐獨奇貴之嘗謂裕曰卿當為一代英雄晉書曰庾翼字稚恭風儀俊偉少有經綸大略京兆杜乂陳郡殷浩並才名冠世而翼弗之重也每語人曰此輩宜束之高閣候天下太平然後議所任耳見桓溫總角之中便期之以遠略因言於成帝曰桓溫有英雄之才願陛下勿以常輩畜之宜委以方部之任必有弘濟艱難之勳又曰謝安常疑劉牢之不可獨任又知王味之不宜專城牢之既以亂終而味之亦以貪敗由是識者服其知人又陶侃傳曰劉弘為荊州刺史將之官辟侃為南蠻長史遣先向襄陽討賊張昌破之弘既至謂侃曰吾昔為羊公參軍語吾其後當居此今相觀察必繼老夫矣又曰時豫章郎中令楊晫陶侃州里人也為鄉論所歸侃詣之晫曰易稱貞固足以幹事陶士行是也與同乘見中書郎顧榮榮甚奇之吏部郎溫雅謂晫曰奈何與小人共載晫曰此人非凡器也
