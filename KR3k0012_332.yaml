body:
  text: 兵部六十二斥候後周書曰韓果性強記兼有權略所行之處山川形勢輒能記憶兼善伺敵虛實揣知情狀有潛匿溪谷欲為間偵者果登高望之所疑處往必有獲太祖由是以果為虞候都督每從征行常領候騎晝夜巡察略不眠寢又曰達奚武大統初為秦州刺史齊神武趣沙苑太祖復遣武覘之武從三騎皆衣敵人衣服至日暮去營數百步下馬潛聽得其軍號因上馬歷營若警夜者不如法者往往撻之具知敵之情狀以告太祖太祖深嘉焉遂從破之諸葛亮兵要曰軍已近敵羅落常平明以先發絶軍前十里內各案左右下道亦十里之內數里之外五人為部人持一白幡登高外向明隱蔽之處軍至轉尋高而前弟一見賊轉語後第二第三詣主者白之凡候見賊百人以下但舉幡指百人以上便舉幡大呼主者遣疾馬往視察之又曰凡軍行營壘先使腹心及鄉導前覘審知各令候吏先行定得營地壁立軍分數立四表候視然後移營又先使候騎前行持五色旗見溝坑揭黃揭去列切衢路揭白水澗揭黑林藪揭青野火揭赤以本鼓應之立旗鼓令相聞見若渡水踰山深邃林藪精驍勇騎搜索數里無聲四周絶迹高山樹頂令人遠視精兵四向要處防禦然後分兵前後以為鎮拓乃令輜重老小次步後馬切在整肅防敵至人馬無聲不失行列險地狹徑亦以部曲鱗次或須環回旋轉以後為前以左為右行則魚貫立則鴈行到前止處遊騎精鋭四向散列而立各依本方下營一人一步隨師多少咸表十二辰豎六旍長二丈八尺審子午卯酉地勿令邪僻以朱雀旍豎午地白獸旍豎酉地玄武旍豎子地青龍旍豎卯地招搖旍豎中央其樵牧飲不得出表外也衛公兵法曰諸營下定事須防禦於營外二十步列隊仗如臨陳對寇法晝夜嚴警縱逢雨雪并押隊官並不得離隊每營留五匹馬并鞍轡放飼防有警急即令馳告至夜每陳前百步外著聽子二人一更一替以聽不虞仍令探更人探聽子細勿令眠睡其晝日諸軍前各亦逐高要處安置斥候以視動靜又曰諸軍營隊伍每夜分更令人巡探人不得高聲唱號行者敲弓一下坐者扣矟三下方擲軍號以相應會當營界探周而復始擲號錯失便即決罰當軍折衝果毅並押鋪宿盡更巡探相分付虞候及中軍官人通探都巡又曰諸軍下定每營夜別置外探每營折衝果毅相知作次每夜別四人各領五騎馬於營四面去營十里外遊奕以備非常如有驚急奔馳報軍又曰令人枕空胡祿臥有人馬行三十里外東西南北皆響見於胡祿中名曰地聽則先防備又曰諸兵馬既逼賊庭探候事須明審諸營住及營行前後及左右廂助上五里著馬兩騎十里更加兩騎十五里更加兩騎至三十里一道用人馬十二騎若兵多發引稍長肋上即是更量加一兩道使令相見其乘馬人每令遙相見常接高行各執一方面異旗無賊此旗常卷見賊即速展軍營見旗展即知賊至須覔穩處既知賊來得設機伏整齊部伍迎前戰其最遠及次遠人須與好馬乘騎不然被賊捉將備邊漢書曰朝錯上言守邊備塞曰胡人衣食之業不著於地其勢易以擾亂邊境何以明之胡人食肉飲酪衣皮毛非有城郭田宅之歸居如飛鳥走獸於曠野美草甘水則止草盡水竭則移以是觀之往來轉徙時至時去此胡人之生業而中國所以離南畝也今使胡人數處轉牧行獵於塞下或當燕代或當上郡北地隴西以候備塞之卒卒少則入陛下不救則邊民絶望而有降敵之心如救之少發則不足多發遠縣才至則胡人已去聚而不罷為費甚大罷之則胡復入如此連年則中國貧苦而民不安矣陛下幸憂邊境遣將吏發卒以治塞甚大惠也然今遠方之卒守塞一歲而更不知胡人之態不如選常居者家室田作且以備之其要害之處通川之道調立城邑無下千家為居中周虎落先為室屋具田器乃募罪人及免徒復作令居之不足募以丁奴婢贖罪及輸奴婢欲以拜爵者不足乃募民之欲往者皆賜高爵復其家與冬夏衣廩食能自給而止其亡夫苦妻者縣官買與之人情非有匹敵不能久安其處塞下之民祿利不厚不可使久居危難之地胡人入驅而能止其所驅者以其半與之縣官為贖其民如是則邑里相救赴胡不避死非以德上也欲全親戚而利其財也此與東方之戍卒不習地勢而心畏胡者功相萬也以陛下之時徙民實邊使遠方亡屯戍之憂塞下之民父子相保亡係虜之患利施後世名稱聖明其與秦之行怨民相去遠矣上從其言募民徙實塞下錯復言陛下幸募人以實塞下使屯戍之事益省輸將之費益寡甚大惠也下吏誠能稱厚惠奉明詔存恤所徙之老弱善遇其壯士和輯其心而勿侵刻使先至者安樂而不思故鄉則貧民相募而勸往矣臣聞古之徙遠方以實廣虛也相其陰陽之和嘗其水泉之味審其土地之宜觀其草木之饒然後營邑立城製里割宅通田作之道正阡陌之界先為立室家有一堂二內門戶之閉置器物焉民有所居作有所用此民所以輕去故鄉而勸之新邑也為置醫巫以救疾病以修祭祀男女有昏生死相恤墳墓相從種樹畜豕室屋完安此所以使民樂其樂處而有長居之心也臣又聞古之制邊縣以備敵也使五家為伍伍有長十長一里里有假士四里一連連有假五百十連一邑邑有假候皆擇其邑之賢才有禮讓習地形悉知民心者居則習民以射法出則教民於應敵故卒伍成於內則軍正定於外服習已成勿令遷徙幼則同遊長則共事夜戰聲相知則足以相救晝戰目相見則足以相識歡愛之心足以相死如此而勸以厚賞威以重罰則前死不還踵矣所徙之民非壯有材力但費衣糧不可用也雖有材力不得良吏猶亡功也又曰王莽將嚴尤上言曰胸奴為害久矣周秦漢征之然皆未有得上策者也周得中策漢得下策秦無策焉當周宣王時獫狁內侵至於涇陽命將征之盡境而還其視戎狄之內侵譬蚊虻之螫驅之而已故天下稱明是為中策漢武帝選將練兵約齎糧深入遠戍雖有克獲之功胡輒報之兵連禍結三十餘年中國罷耗胸奴亦衄而天下稱武是為下策秦始皇不忍小恥而輕民力築長城之固延袤萬里轉輸之行起於負海疆境既完中國內竭以喪社稷是為無策今天下遭陽九之厄比年飢饉西北邊尤甚發三十萬衆具三百日糧東援海岱南取江淮然後能備計其道里二年尚未集合兵先至者聚居暴露師老械弊勢不可用此一難也邊既空虛不能奉軍糧內調郡國不相及屬此二難也計一人三百日糧用備十八斛非牛刀不能勝也牛又當齎食加二十斛重也胡沙鹵多乏水草以往事揆之軍出未滿百日牛必物故且盡其餘糧人不勝此三難也胡地秋冬甚寒春夏甚風釜鑊音富薪炭重不可勝食糒音備飲水以歷四時師有疾病之憂勢不能久此四難也輜重自隨則輕鋭者少不得疾行虜徐遁不能及幸而逢虜要遮前後危殆不測此五難也大用民力功不可必臣伏憂之又班固論曰書云蠻夷猾夏詩稱戎狄是膺春秋有道守在四夷久矣狄之為患也故自漢興忠信嘉謀之臣曷嘗不運籌策相與爭於廟堂之上乎高祖時劉敬呂后時樊噲季布孝文時賈誼朝錯孝武時王恢韓安國朱買臣公孫弘董仲舒人持所見各有同異然揔其要歸兩科而已搢紳之儒則守和親介胃之士則言征伐皆偏見一時之利害而未究胸奴之終始自漢興以至于今曠世歷年詘伸異變強弱相反是故其詳可得而言也昔和親之論發於劉敬是時天下初定新遭平城之難故從其言約法和親賂遺單于冀以救安邊境孝惠高后遵而不違胸奴寇盜不為衰止而單于反以驕倨逮至孝文與通關市妻以漢女增厚其賂歲以千金而胸奴數背約束邊境屢被其害是以文帝中年赫然發憤遂貯戎服親御鞍馬徙六郡良家材力之士馳射上林講習戰陳聚天下精兵軍於廣武顧問馮唐與論將帥喟然歎息思古名臣此則和親無益已然之明效矣仲舒親見四世之事猶復欲守舊文頗增其約以為義動君子利動貪人如胸奴者非可以仁義説也獨可説以厚利結之於天耳故與之厚利以説其意與盟於天以牢其約質其愛子以纍其心胸奴雖欲展轉奈失重利何奈殺愛子何夫賦斂行賂不足以當三軍之費城郭之固無異於貞士之約而使邊城守境之民父兄緩帶稚子咽哺胡馬不窺於長城而羽檄不行於中國不亦便於天下乎察仲舒之論考諸行事乃知未合於當時而有闕於後世也當孝武時雖征伐剋獲而士馬亦略相當雖開河南之野建朔方之郡亦棄造陽之北九百餘里胸奴人民每來降漢單于亦輒拘留漢使以相報復其桀驁尚如斯安肯以愛子為質乎此不合當時之言也若不置質定約和親是雖襲孝文既往之悔而長胸奴無已之詐也夫邊城不選守境武略之臣修鄣隊備塞之具厲長戟徑弩之械恃吾所以待邊寇而務賦斂於民遠行貨賂割剝百姓以奉寇讎信甘言守空約而幾胡馬之窺不已過乎至孝宣之世承武帝當擊之威值胸奴百年之運因其壞亂幾亡之厄權時施宜覆以威德然後單于稽首臣服遣子入侍三世稱蕃賓於漢廷是時邊城晏閉牛馬布野三世無犬吠之驚黎庶忘干戈之役後六十餘載之間遭王莽篡位始開邊隙單于由是歸怨自絶莽遂斬其侍子邊境之禍搆矣故呼韓耶始朝於漢漢議其禮蕭望之曰戎狄荒服言其慌忽無常至亦宜待以客禮讓而不臣如後嗣遁逃竄伏使於中國不為叛臣及孝元時議罷守塞之備應以為不可云盛不忘衰安必思危遠見識微之明矣單于咸棄其愛子昧利不顧侵掠所獲歲巨計而和親賂遺不過千金安在其不棄質而失重利也仲舒之言漏於是矣夫規事建議不圖萬世之因而偏恃一時之事者未可以經遠若乃征伐之功秦漢行事嚴尤論之當矣故先王度中土立封畿分九州列五服物土貢制外內或修刑政或修文德遠近之勢異也是以春秋內諸夏而外夷狄夷狄之人貪而好利被髮左袵人面獸心其與中國殊章服異習飲食不同言語不通僻居北垂寒露之野逐草隨畜射獵為生隔以山川擁以沙漠天地之所以絶內外也是故聖王禽獸畜之不與約誓不就攻伐約之以費賂而見欺攻之則勞師而招寇其地不可耕而食也其民不可臣而畜也是以外而不內踈而不戚政教不及其人正朔不加其國來則德而禦之去則備而守之其慕義而貢獻則接之禮讓羇縻不絶使曲在彼蓋聖人制禦蠻夷之常道也後漢書曰馬援奏言西干縣戶有三萬二千西干縣交址郡故城在今交州龍編縣東遠界去庭千餘里庭縣庭也請分為封溪望海二縣許之又曰馬援在隴西帝詔武威太守東觀漢記曰梁統也令悉還金城客民金城人客在武威者歸者三千餘口使各反舊邑援奏為置長吏繕城郭起塢候字林曰塢小障一曰小城字或作塢開導水田勸以耕牧郡中樂業又曰杜茂引兵屯晉陽上遣謁者假忠將衆配茂鎮守北邊因發邊卒築亭候修烽火又發委輸金帛繒弩供給軍士并賜邊民冠蓋相望茂亦建屯田驢車轉運也晉書杜預傳曰胸奴帥劉猛舉兵反自并州西及河東平陽詔預以散侯定計省闥俄拜度支尚書預乃奏立籍田建安邊論處軍之要又作人排新器興常平倉定穀價較鹽運制課調內以利國外以救邊者五十餘條皆納焉宋書曰文帝元嘉中每歲為後魏侵境令朝臣博議何承天陳備邊之要其大略一曰移遠就近以實內地二曰浚復城隍以增岨防三曰纂偶車牛以飭戎械四曰計丁課役勿使有闕唐書曰高祖與群臣言備邊之事將作大匠于筠進曰未若多造船艦於五原靈武置舟師於黃河之中足以斷其入寇之中路中書侍郎溫彥博又進曰昔魏文帝掘長塹以遏胸奴亦由因循其事高祖並從之於是遣將軍桑顯和塹斷北邊要路又徵江南習水之士更發卒於靈州造戰船塞險左傳曰蔡侯吳子唐侯伐楚舍舟于淮汭自豫章與楚夾漢章漢東江地北名楚左司馬沈尹戍謂楚將子常曰子沿漢而與之上下沿緣也緣漢上下遮使勿度也我悉方城外以毀其舟以方城外人毀吳所舍舟也還塞大隧直轅冥厄三者漢東三隘路厄烏革切子濟漢而伐之我自後擊之必大敗之既謀而行楚大夫武成黑謂子常曰吳用木也我用革也用軍器也不可久也不如速戰大夫史皇謂子常曰楚人惡子而好司馬若司馬毀吳舟于淮塞城口而入城口三隘道之揔名是獨克也子必速戰不然不免乃濟漢而陳自小別至于大別禹貢漢水至大別南入江然則此二別在江夏界也三戰子常知不可欲奔知吳不可勝也史皇曰安求其事求知政事難而逃之將何所入子必死之子常違左司馬戍之言故敗也戰國策曰吳子問孫武曰敵人保山據險擅利而處糧食又足挑之則不出乘間則侵掠為之奈何武曰分兵守要謹備勿懈潛探其情密候其怠以利誘之禁其牧採久無所得自然變改待離其故奪其所愛漢書曰胸奴呼韓耶單于來朝元帝以後宮良家子王嬙音墻字昭君賜單于單于歡喜上書願保塞上谷以西至燉煌請罷邊備以休天子人民帝下有司議郎中侯應上言以為不可其略曰自周秦興以來胸奴寇侵甚矣其北邊有陰山東西千餘里本冒頓單于依阻其中至孝武帝出師征伐斥奪此地攘之於漠北建塞徼起亭隧築外城設屯戍以守之然後邊境少安夫夷狄之情困則卑順強則驕逆天性也前已罷外城省亭隧今才足以候視通烽火而已安不忘危不可復罷且中國尚建關梁以制諸侯所以絶臣下之覬欲起塞以來百有餘年非皆以土垣或因山巖石木柴疆落溪水卒徙築理功費久遠不可勝計今欲以一切省繇戍十年之外卒有他變鄣塞破壞亭隧滅絶當更發屯繕理纍代之功不可卒復非所以永持至安威制百蠻之長策也帝納之蜀志曰曹公使夏侯妙才張郃屯漢中蜀先主進兵漢中次于陽平關南度沔水緣山稍前於是定軍勢作營妙才將兵來爭其地先主命黃忠乘高鼓噪攻之大破妙才軍斬妙才曹公自長安南征先主遙策之曰曹公雖來無能為也我必有漢川矣及公至先主斂衆拒險終不交鋒積日不拔士亡者多曹公果引軍還先主遂有漢中魏志曰曹爽伐蜀司馬景王同行出駱次于興勢蜀將王林夜襲景王營堅臥不動林退景王謂諸將曰費禕已據險拒守進不獲戰攻之不可宜亟軍亟紀力切以為圖爽等引還禕果馳兵赴三嶺爭險乃得過也晉書曰劉裕討南燕慕容超超召群臣議拒晉師大將公孫五樓曰吳兵輕果所利在速戰初鋒勇鋭不可爭也宜據大峴使不得入曠日延時沮其鋭氣徐簡精騎二千循海而南絶其糧運別勑假暉率兗州之軍緣山東下腹背擊之上策也各命守宰依險自校其資儲之外餘悉焚蕩芟除粟苗使敵無所資堅壁清野以待其釁中策也縱賊入覘出城逆戰下策也超曰吾京都殷盛戶口衆多非可一時入守青苗布野非可卒芟設使芟苗城守以全性命朕所不能今據五州強帶山河之固戰車萬乘鐵馬万群縱令過峴至於平地徐以精騎踐之此成擒也其將慕容鎮曰若如聖旨必須平原用馬便宜出峴逆戰戰而不勝猶可退守不宜縱敵入峴自貽窘逼昔成安君不守井陘之險終屈於韓信諸葛瞻不據束馬之嶮卒擒於鄧艾臣以為天時不如地利阻守大峴策之上也超不從乃令攝莒梁父二戍循城隍簡士馬蓄鋭以待之其夏晉師次東莞超遣其左軍假暉等步騎五萬進據臨昫俄而晉師度峴慕容超懼率四萬就假暉等于臨昫戰敗超奔還廣固宋武圍廣固數月而破燕地悉平後魏書曰遣將伐後燕慕寶已平并州潞川頻勝寶在中山引群臣議之中尹符謨曰魏軍強盛千里轉鬥乘勝而來勇氣兼倍若逸騎平原形勢彌盛殆難為敵宜杜嶮拒之中書令眭邃曰魏軍多騎師剽鋭眭息為切馬上齎糧不過旬月宜令郡縣聚千為一堡深溝高壘清野待之至無所掠資食既罄不過六旬自然窮退尚書封懿曰今魏師十萬天下之勍敵也百姓雖欲營聚不足自固是則聚糧集兵以資強寇且動衆心示之以弱岨闕拒戰計之上也慕容麟曰魏今乘勝氣鋭其鋒不可當宜謹守設備待其弊而乘之於是修城積粟為持久之備魏攻中山不剋進據博陵魯口諸將覩風而奔郡縣悉降于魏唐書曰武德中大宗圍王世充於東都世充勢窮竇建德自北來救諸將及蕭瑀等咸請且退師避之太宗不許曰世充糧盡內外離心我當不勞攻擊坐收其弊耳建德新破海公將驕卒惰今我據武牢扼其襟要若賊恃勝冒險爭鋒吾當破賊若不戰旬月之間世充自潰彼敗我振足以臨之一行兩定在於斯舉若不速進賊入武牢諸城新附必不能守二賊并力將若之何秦府記室薛收進曰世充據東都府庫填積所患者在於乏食是以為我所持建德親惣十餘萬衆來拒王師亦當盡彼驍雄期於速戰若縱其兩寇相連轉河北之積以相資給則伊洛間戰鬥不已大王今欲親率猛鋭先據城皋之險訓兵坐甲當彼疲弊之衆一戰必剋建德破則世充自下不過數旬二國之君可面縛麾下蕭瑀等奈何遂請退兵太宗曰善而從之留齊王元吉圍世充親率三千五百人趣武牢守之與戰相持二十餘日五月建德謀伺官軍芻盡牧馬於河北必將襲武牢太宗聞之遂牧馬千餘匹於河渚間以誘之詰朝建德果悉衆而至陳於汜水東太宗候陳久卒飢令宇文士及率騎經賊陳之西馳而南上賊陳動因而諸軍奮擊之大潰竟如太宗本策
