body:
  text: 文部二詩文心雕龍曰詩者持也持人情性三百之蔽義歸無邪持之為訓有符焉爾人稟七情應物斯感感物吟志莫非自然堯有大唐之歌虞造南風之詩觀其二文詞達而已及大禹成功九序惟歌少康敗德五子咸諷順美匡惡其來久矣自商暨周雅頌圓備四始彪炳六義環深子夏鑒絢素之章子貢悟琢磨之句故商賜二子可以言詩自王澤彌竭風人輟采春秋觀志以諷誦舊章酬酢以為賓榮吐納而成聲文逮楚國諷怨則離騷為剌秦王滅典亦造仙詩漢初四言韋孟首唱匡諫之義繼軌周人孝武愛文柏梁列韻嚴馬之徒屬詞無方至成帝品録三百餘篇朝章國采亦云周備而詞人遣翰莫見五言所以李陵班婕見擬於前代按邵南行露始肇半章孺子滄浪亦有全曲暇豫優歌遠見春秋邪淫童謠近在成世閲時取徵則五言久矣又古詩佳麗或稱放叔其孤竹一篇則傅毅之詞比采而推固兩漢之作乎觀其結體散文直而不野宛轉附物惆悵切情實五言之冠冕也至於張衡怨篇清典可味仙詩綏歌雅有新聲暨建安之初五言騰踴文帝陳思縱轡以聘節王徐應對望路而爭驅並鄰風月狎池苑述思榮序酣宴慷慨以任氣磊落以使才造懷指事不求纖密之巧驅詞逐貌唯取昭晣之能此其所用也及正始明道詩雜仙心何晏之徒率多浮淺唯嵇志清峻阮旨遙深若乃應璩百一獨立不懼詞譎義具魏之遺直也晉世群才稍入輕綺張左潘陸比肩詩衢采縟於正始力柔於建安或折文以為武或流靡以自研此其大略也江左篇製溺於玄風羞笑徇務之志崇盛忘機之談袁孫已下雖各有雕采而詞趣一揆莫與爭雄所以景純仙篇挺拔而為俊也宋初文詠體有因革嚴老告退而山水方滋儷采百家之偶爭價一句之奇情必極貌以寫物必窮力而追新此近代之所竟也故鋪觀列代而情變之數可鑒撮舉同異而綱領之要可明矣若夫四言正體則雅潤為本五言流調則清麗居宗華實異用惟才所安故平子得其雅叔夜合其潤茂先擬其清景陽振其麗若兼善則子建仲宣遍美則太沖公幹然詩有恆裁思無定位隨性適分鮮能圓通若妙識所難其易也將至忽以為易其難也方來矣至於三六雜言則出自篇什離合之發則萌於啚讖回文所興則道原為始聯句共韻則柏梁餘製巨細或殊情理同致總歸詩囿故不繁云列子曰堯微服遊於康衢聞兒童謠曰立我蒸民莫匪爾極不識不知順帝之則堯問曰孰教爾為此言童兒曰我聞之大夫問大夫大夫曰古詩也文章流別論曰詩言志歌永言古有採詩之官王者以知得失古詩之四言者振鷺于飛是也漢郊廟歌多用之五言者誰謂雀無角何以穿我屋是也樂府亦用之六言者我姑酌彼金罍是也樂府亦用之七言者交交黃鳥止于桑是也於俳諧倡樂世用之古詩之九言者浻酌彼行潦浥此注茲是也不入歌謠之章故世希為之夫詩雖以情志為本而以聲成為節顏延之庭誥曰荀爽云詩者古之歌章然則雅誦之樂篇全矣是以後之詩者率以歌為名及秦勒望嶽漢祀郊宮辭著前史者文變之高制也雖雅聲未至弘麗難追矣逮李陵衆作揔雜不類是假託非盡陵制至其善篇有足悲者摯虞文論足稱優洽柏梁以來繼作非一纂所至七言而已九言不見者將由聲度闡誕不協金石至於五言流靡則劉楨張華四言側密則張衡王粲若夫陳思王可謂兼之矣鍾嶸詩評曰古詩李陵班婕妤曹植劉楨王粲阮藉陸機潘嶽張協左思謝靈運等十二人詩皆上品曹植詩其原出於國風其骨氣高奇辭彩華茂情兼雅怨體備文質粲然逸古卓爾不群嗟乎陳思之文章也譬人倫之有周孔鱗羽之有龍鳳音樂之有笙竽女工之有黼黻若孔子之門用文則公幹升堂思王入室王陽潘陸自可坐於廊廡之間劉楨文體出於古詩伏氣愛奇動多震絶楨骨氣凌霜高風跨俗但氣過其文雕潤恨少然自陳思已往楨稱獨步張協字景陽詩其原出於王粲文章華靜實少病纍又巧構形似之言雄於潘嶽靡於太沖風流調遠實曠代之高才其辭彩蔥蒨音韻鏗鏘使人味之亹亹不倦阮籍詩其原出於小雅雖無雕斫之巧而詠懷之作可以陶性靈發幽致言在耳目之內情寄八荒之表洋洋乎會於風雅矣陶潛詩其原出於應璩又協左思風力文體省淨殆無長語篤意真古辭興婉媚至如歡言酌春酒日暮天無雲風華清靡豈直田家語邪古今隱逸詩之宗也漢書曰王褒字子淵蜀人也宣帝時修武帝故事講論六藝劉向張子僑等待詔金馬門褒有俊材使褒作中和樂職如淳曰言王政中和在官者樂其職宣布詩藝林曰宣帝詩歌之名選好事者依鹿鳴之聲習而歌之魏書曰李康字蕭遠性介立不和俗為鄉裏所嫉故官不進嘗作遊九嶷詩明帝異其文問左右斯人安在吾欲擢之因起為隰陽長卒晉書載記曰李壽奢侈殺人以立威其臣龔壯作詩七篇託言應璩以諷壽壽報曰省詩知意若今人所作時賢之話言也古人所作死鬼之常辭耳又曰桓玄既篡欲引用孟昶問其人於劉邁邁曰臣在京口不聞昶有異能但父子紛紛更相贈詩爾玄笑之而止宋書曰顏延之與陳郡謝靈運共以詞彩齊名而遲速懸絶文帝嘗各勑擬樂府北上篇延之受詔便成靈運久之乃就延之嘗問鮑昭己與靈運優劣昭曰謝五言如初發芙蓉自然可愛君詩若鋪錦列繡雕繪滿眼鍾嶸詩評云靈運詩其原出於陳思雅有景陽之體嶸謂若人學多才博寓目輒書內無文思外無遺物其繁且富宜哉然名章秀句處處間起妙曲新聲駱驛奔發類青松拔木白玉映竹未足以貶高才也又曰謝惠連方明之子也十歲能屬文族兄靈運嘉賞之云每有篇章對惠連輒得佳語嘗於永嘉西堂思詩竟日不就忽夢惠連則得池塘生春草大以為工常云此語有神工非余語也趙書曰徐光字季武年十四五為將軍秣馬光但書馬柳吾浪反柱為詩頌不親馬事梁書曰丘遲字希範辭采麗逸時有鍾嶸詩評云范雲婉轉清便如流風回雪遲詩點綴映媚似落花依草雖義淺文通而秀於敬子其見稱如此三國典略曰周文州氐酋反制鄜州剌史高琳討平之軍還帝宴群公卿士命賦詩言志琳詩云寄言竇車騎為謝霍將軍何以報天子沙漠靜妖氛帝大悅曰獯獫陸梁未時款塞卿言有驗國之福也又曰齊蕭愨字仁祖為太子洗馬嘗於秋夜賦詩其兩句云芙蓉露下落楊柳月中踈曰蕭仁祖之斯文可謂雕章間出昔潘陸齊軌不襲建安之風顏謝同聲遂革太乙之氣自漢逮晉情賞猶自不諧河北江南意製本應相詭顏黃門云吾愛其蕭散宛然在目而盧思道之徒雅所不愜箕畢殊好理宜固然又曰王睎為常山王司馬睎恬憺寡欲不以世務為纍時謂之方叔司馬常遊晉祠賦詩曰日落應歸去魚鳥見留連時常山王遣使召睎睎不時至明日承相西閣祭酒盧思道問睎昨已朱顏得無魚鳥致怪乎睎笑曰昨陶然以酒被責卿輩亦是留連之一物豈直魚鳥而已哉又曰辛德源嘗於邢邵座賦詩其十字曰寒威漸離風春色方依樹衆咸稱善後王昕逢之謂曰今日可謂寒威離風春色依樹隋書曰楊素嘗以五言詩七百字贈番州剌史薛道衡詞氣宏拔風韻秀出亦為一時盛作未幾而卒道衡歎曰人之將死其言也善豈若是乎唐書文苑傳曰元萬頃乾封中從英國公李績征高麗為遼東道管記時別帥馮本以水軍援禆將郭封船破失期封欲作書與績恐高麗知其救兵不至乘危迫之乃令萬頃作離合詩贈績績不達其意大怒曰軍機急切何用詩為必斬之萬頃解釋之乃止又曰錢起能五言詩初從鄉薦家寄江湖嘗於客舍月夜獨吟遽聞人吟於廷曰曲終人不見江上數峰青起愕然懾衣視之無所見矣以為鬼怪而志之及起就試之年李暐所試湘靈鼓瑟詩題中有青字起即以鬼謠十字為落句暐深嘉之稱為絶唱是歲登第又曰元稹聰警絶人年少有才名與太原白居易為友工為詩善狀詠當時風態物色當時言詩者稱元白焉自衣冠士子至閭閻下俚悉傳諷之號為元和體穆宗在東宮有妃嬪左右嘗念及稹篇詠者宮中呼為元才子至是極承恩遇嘗為長慶宮詞數十百篇閭里竟為傳唱又曰劉禹鍚晚年與少傅白居易友善居易詩筆文章時無在其右者嘗與禹鍚唱和往來因集其詩而序之曰彭城劉夢得詩豪者也其鋒森然少敢當者豫不量力往往犯之夫合應者聲同交爭者力敵一往一復欲罷不能一二年來日尋筆硯同和贈答不覺滋多大和三年春已前紙墨所在者凡一百三十八首其餘乘興仗醉率然作者不在此數嘗戲微之云僕與足下二十年來為文友詩敵幸也亦不幸也吟詠情性播揚名聲其適遺形其樂忘老幸也然江南士女語才子者多云元白以子之故使僕不得獨步於吳越閭此亦不幸也今垂老復遇夢得非重不幸耶夢得文之神妙莫先於詩若妙與神則吾豈敢如夢得雪裏高山頭白早海中仙果子生遲沉舟側畔千帆過病樹前頭萬木春之句之類真謂神妙矣在在處處應有靈物護持豈止兩家子弟祕藏而已世説曰夏侯孝若作周詩成示潘嶽曰此文非徒溫雅乃見孝悌之性潘因此遂作家風詩又曰孫秀收石崇潘嶽先送石市潘後至石謂潘曰安仁卿亦復爾耶潘曰可謂白首同所歸潘金谷詩云投分寄石友白首同所歸乃成其詩又曰孫子荊除婦服作詩以示王武子曰未知文生於情情生於文覽之悽然憎伉儷之重文士傳曰張秉自知短命乃作千年歌詩以自傷顏氏家訓曰王籍入若邪溪詩云蟬噪林逾靜鳥鳴山更幽江南以為文章斷絶物無異議簡文吟詠不能忘之金樓子云有何贈智者常於任昉座賦詩而其詩言不類任云卿詩可謂高厚其人大怒曰遂以我詩為狗號國朝傳記曰薛道衡聘陳為人日詩云入春才七日離家已二年南人嗤之曰是底言語誰謂此虜解作詩及云人歸落鴈後思發在花前乃喜曰名下固無虛士國朝雜記曰沈佺期以工詩著名燕公張説嘗謂之曰沈三兄詩直須還他第一國史補曰德宗以二月一日為中和節宴百寮賦詩群臣奉和詔寫本賜戴叔倫於容州天下榮之又曰杜佑在淮南進崔叔清詩百篇上曰此惡詩焉用進時人謂之淮勑惡詩陸機文賦曰詩緣情而綺靡
