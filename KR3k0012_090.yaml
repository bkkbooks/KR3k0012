body:
  text: 皇王部十四漢孝昭皇帝漢書帝紀曰孝昭皇帝諱弗之字曰不武帝少子也母趙倢妤本以有奇異得幸服虔曰婕妤有奇手指不伸案外戚傳曰望氣者云北有奇女天子氣故稱奇異也及生帝有奇異文穎曰十四月乃生遂立為太子年八歲武帝崩太子即皇帝位始元元年春二月黃鵠下建章宮太液池中如淳曰謂之液者天地和液之氣所為池案時漢用土德服色尚黃鵠色皆白而今更黃以為土德之端故紀之也言承陰陽津液以作之公卿上壽賜諸侯王列侯宗室金錢各有差己亥上耕于鉤盾弄田應劭曰時帝年九歲未能親耕帝籍鉤盾官者近署故往試耕為戲弄也案西京故事弄田在未央宮中也元鳳元年左將軍上官桀桀子驃騎將軍安與大將軍霍光爭權欲害之詐使人為燕王旦上書言光罪時帝年十四覺其詐皆伏雖後有譖光者上輒怒曰大將軍國家忠臣先帝所屬敢有譖毀者坐之光由是得盡忠元年夏四月帝崩于未央宮案帝九歲即位在位十三年壽二十二也六月葬平陵漢書贊曰昔周成王以孺子繼位而有管蔡四國流言之變孝昭幼年即位亦有燕蓋上官逆亂之謀成王不疑周公孝昭委任霍光各因其時以成名大矣哉承孝武奢侈餘弊師旅之後海內虛耗戶口減半光知時務之要輕繇薄斂與民休息至始元元鳳之間胸奴和親百姓充實舉賢良文學問民所疾苦議鹽鐵而罷推酤尊號曰昭不亦宜乎後漢班固昭帝述曰孝昭幼冲冢宰惟忠燕蓋譸張實睿實聰罪人斯得邦家和同魏文帝周成漢昭論曰或方周成王於漢昭帝僉高成而下昭余以為周成王體上聖之休氣稟賢妣之胎誨周邵為保傳呂尚為太師口能言則行人稱辭足能履則相者導儀目厭威容之美耳飽仁義之聲所謂沉漬玄流而沐浴清風者矣猶有咎悔聆二叔之謗使周公東遷皇天赫怒顯明厥咎猶啓金滕稽諸國史然後乃寤不亮周公之聖德而信金縢之教言豈不暗哉夫孝昭父非武王母非邑姜養帷蓋主相則桀光體不承聖化不胎育保無仁孝之質佐無隆平之治所謂生於深宮之中長於婦人之手然而德與性成行與體并年在二七早知夙達發燕書之詐亮霍光之誠豈有金縢信國史而後乃寤哉使夫成昭均年而立易世而化質臣而治換樂而歌則漢不獨少周不獨多魏丁儀周成漢昭論曰成王昭帝俱以襁褓之幼託於冢宰流言讒興此其艱險相似者也夫以發金滕然後垂泣計日力便覺詐書明之遲速既有差矣且叔父兄子非相嫌之處異姓君臣非相信之地霍光罹人謗而不出周公賴天變而得之推此數者齊本而論末計重而量輕漢昭之優周成甚明者也成王秀而獲實其美在終昭帝苗而不秀其得在始必不得已而論二主余與夫始者也廢帝海昏侯漢書曰昌邑哀王髆天漢四年立十一年薨子賀嗣立十三年昭帝崩無嗣大將軍霍光徵王駕典喪王乘傳詣大安邸夜漏未盡一刻以火發書其日中賀發晡時至定陶行百三十五里侍從者馬死相望於道郎中令龔遂諫王令還郎謁者五十餘人賀到濟陽求長鳴雞道買積竹杖文穎注曰合竹作杖也過弘農使大奴善以衣車載女子旦至廣明東都門遂曰禮奔喪望見國都哭此長安東郭門也賀曰嗌痛不能哭至城門遂復言賀曰城門等耳旦至未央宮東闕遂曰昌邑帳在是闕外馳道北文穎曰吊哭帳未至帳所有南北行道馬足未至數步大王宜下車也嚮闕西面伏哭盡哀止王曰諾到哭如儀王受皇帝璽綬襲尊號即位二十七日行淫亂大將軍光與群臣議白孝昭皇帝后廢賀歸故國初賀在國時數有怪嘗見白犬高三尺其頸似人而冠方山冠後復見熊左右皆莫見又大鳥飛集宮中王知惡之輒以問郎中令龔遂遂為言其故後又血污王坐席王問遂遂叫然號曰空宮不久妖祥數至血者陰憂象也宜畏慎自省賀終不改節居無何就徵既即位後王夢青蠅之矢積西階東可五六石以屋版瓦覆發視之青蠅矢或曰惡蛇矢也問遂而不用其言卒至於廢大將軍光更尊孝武帝曾孫是為宣皇帝漢書曰昌邑王即位好弄鬥斗虎使官奴騎乘遊戲掖庭之中與孝昭帝宮人淫亂詔掖庭令敢泄言腰斬王受璽凡二十七日有罪千一百二十七條霍光乃即持其手解脫其璽組奏上太后扶王下殿出金馬門群臣隨送王西面拜曰愚戇不任漢事起就乘輿副車大將軍光送至昌邑邸光謝曰王行自絶於天臣等駑怯不能殺身以報德寧負王不敢負社稷願王自愛漢書曰王吉字子陽為昌邑中尉上疏諫曰大王不好書術而樂逸遊馮試樽銜服虎曰樽促也或曰桂也撙音子本反馳騁不止口倦乎叱咤手苦於轡箠身勞乎車輿朝則冒霜露晝則被埃塵夏則為大暑之所暴炙冬則為風寒之所偃薄偃靡也遇疾風而靡也薄迫也數以耎脆之玉體耎柔而兗切犯勤勞之煩毒非所以全壽命之宗也又非所以進仁義之隆也夫廣廈之下細氈之上明師居前勸誦在後上論唐虞之際下及殷周之盛學仁聖之風習治國之道欣欣焉發憤忘食日新厥德其樂豈不長哉大王誠留意則心有堯舜之志體有喬松之壽美聲譽發而上聞則福祿其臻而社稷安矣中宗孝宣皇帝漢書帝紀曰孝宣皇帝諱詢字次卿詢之字曰謀武帝曾孫戾太子孫也太子納史良娣生皇孫納王夫人生宣帝號曰皇曾孫生數月遭巫蠱事太子良娣皇孫王夫人皆遇害曾孫坐繫郡邸獄邴吉為廷尉監治巫蠱憐孫之亡辜使女徒乳養私給衣食至後元二年望氣者言長安獄有天子氣上遣使者皆殺之內署令郭穰夜至郡邸獄吉拒閉不得入曾孫賴吉得全因遭大赦吉乃載曾孫送祖母史良娣家後有詔掖庭養視上屬籍宗正時掖庭令張賀嘗事戾太子哀曾孫奉養甚謹以私錢供給教書塈壯為取暴室嗇夫許廣漢女曾孫因依倚廣漢兄弟及祖母家受詩於東海澓仲翁澓音馥高才好學然亦喜遊俠鬥雞走馬具知閭里之奸邪吏治得失周遍三輔常困於蓮芍鹵中尤樂鄠杜間率常在下杜劭應曰下杜杜陵之下時會諸朝舍長安尚冠里身足下有毛遍身及足下皆有毛臥居數有光曜每買餅所從買家輒大售亦以此自怪元平元年昭帝崩無嗣霍光徵昌邑王賀賀淫亂廢七月光奏遣宗正得至尚冠里舍沐浴賜御府衣太僕以軨獵車奉迎曾孫就齊宗正府封為陽武侯群臣上璽即皇帝位甘露三年胸奴呼韓耶單于皆來朝贊謁稱藩臣而不名黃龍元年帝崩於未央宮在位二十五年漢書曰宣帝始立謁見高廟大將軍光參乘上內嚴憚之若芒刺在背後張安世代光參乘天子從容肆意甚安及光身死而宗族竟誅漢書贊曰孝宣之治信賞必罰綜核名實政事文學法理之事咸精其能至于伎巧工匠器械自元成間鮮能及之亦足以知吏稱其職民安其業者也遭值胸奴乖亂推亡固存李奇曰宣帝能朝呼韓而固存走郅支使遠遁是推亡也信威北夷單于慕義稽首稱藩功光祖宗業垂後嗣可謂中興侔德殷宗周宣矣東觀漢記曰光武下詔曰唯孝宣皇帝有功德其上尊號曰中宗帝王世紀曰宣帝廟名樂遊後漢班固宣帝述曰中宗明明寅用刑名時舉傅納聽斷惟精柔遠能邇燀耀威靈龍荒朔漠莫不來庭丕顯烈祖尚於有成孝元皇帝漢書帝紀曰孝元皇帝諱奭之字曰盛宣帝太子也母曰共哀許皇后昔微時生民間及即位壯大和仁好儒見宣帝所用多文法吏以刑名繩下大臣楊惲等坐刺譏辭語而誅嘗從容言陛下持刑太深宜用儒生宣帝作色曰漢家自有制度本以霸王道雜理之奈何純任德教且俗儒不達時宜好是古非今使人眩於名實何足任乃歎曰亂我家者太子也由是踈太子而愛淮陽王明察好法宜為吾子而王母張婕妤尤幸上欲代太子然以少依許氏故終不背焉宣帝崩太子即位頻年行幸甘泉河東郊祀大畤祠后土幸長楊射熊館布車騎大獵竟寧元年崩於未央宮在位十六年時年四十三班固漢書贊曰臣外祖兄弟為元帝侍中應劭曰元成帝紀皆固父彪所作臣班彪自說也外祖言金敝也語臣曰元帝多才藝善史書鼓琴瑟吹洞簫自度曲被歌聲分忖節度窮極要妙少而好儒及即位徵用儒生委之以政薛貢韋匡迭為宰相而上牽制文義優遊不斷孝宣之業衰矣然寬弘盡下出於恭儉號令溫雅有古之風烈應劭漢官儀曰孝武時天子以下未有幘元帝額上有壯髮不欲使人見乃始進幘群寮隨焉帝王世紀曰孝元皇帝廟名長壽孝成皇帝漢書帝紀曰孝成皇帝諱鷔字太孫元帝太子母曰王皇后元帝在太子宮生帝於甲觀畫堂如淳曰甲觀館名畫堂堂名為世嫡皇孫宣帝愛之字曰太孫常置左右及為太子好經書為人寬博謹慎初居桂宮上嘗急召太子出龍樓門不敢絶馳道應劭曰馳道天子之道西至直城門晉灼曰黃圖西出南頭弟二門得絶乃度上遲之以狀對上於是大悅乃著令太子得絶馳道其後幸酒宴樂幸酒好酒也上不以為能而定陶恭王有才母傅昭儀又愛上以故欲以恭王為嗣賴侍中丹護太子家輔助有功上亦以先帝尤愛故得無廢元帝崩太子即位頻年幸甘泉汾陰郊祠綏和二年崩于未央宮在位二十六年時年四十五漢書曰成帝好為微行從期門郎及私奴宮客多至十餘人皆帶持刀劍或乘小車御者在道上或皆騎出入市里郊野遠至旁縣谷永曰今陛下棄萬乘之富貴樂人家之賤事厭高美之尊稱好匹夫之卑字如淳曰稱張放家人是卑字買私田於民間畜私奴車馬北宮挺身與群小晨夜相隨烏集醉飽吏民之家亂服共坐混淆無別典門戶奉宿衛之臣執干戈守空宮公卿百僚不知陛下所在積數年矣漢書贊曰臣之姑晉灼曰班彪之姑後宮為婕妤父子兄弟得侍帷幄數為臣言成帝善修容儀升車正立不內顧疾言親指臨朝淵默尊嚴若神可謂穆穆天子之容矣博覽古今容受直辭公卿稱職遭世承平上下和睦然耽于酒色趙氏亂內外家擅朝言之可為於邑建始以來王氏始執國命哀平矩祚莽遂篡位蓋其威福之所由來者久矣帝王世紀曰成帝廟名池陽揚雄酒賦敘曰漢孝成皇帝好酒雄作酒賦以諷之孝哀皇帝漢書帝紀曰孝哀皇帝諱欣欣之字曰喜元帝庶孫定陶恭王之子也母曰丁姬好文辭法律入朝上令誦詩通習能說能說其義帝稱其才時王祖母傅太后私賂遺上所幸趙昭儀及帝舅王根根及昭儀見上無子亦欲預自結皆勸帝以為嗣乃立為太子成帝崩太子即帝位建平二年待詔夏賀良等言赤精子之讖漢運中衰當再受命今宜改元易號乃赦天下以建平二年為太初元年號曰陳聖劉太平皇帝漏刻以百二十為度八月詔曰夏賀良等言皆違經背古不合時宜甲子制書非赦令也皆蠲除之賀良等皆伏辜元壽三年帝崩于未央宮在位六年時年二十五漢書曰孝哀皇帝性不好音及即帝位下詔曰孔子不云乎放鄭聲鄭聲淫其罷樂府官郊祀樂及古之兵法武樂在經法非鄭衛之樂者條奏別屬他官又曰董賢少為太子舍人美麗自喜上即位見幸出則參乘入侍左右旬月之間賞賜巨萬貴震朝廷嘗與上晝寢籍上袖上欲起賢未覺上不欲動搖之乃斷袖而起又召賢女弟為昭儀更名其舍為椒風以配椒房武庫禁兵尚方珍寶上第盡在董氏乘輿乃其副也賢為大司馬衛將軍年二十二上置酒從容視賢曰吾欲法堯禪舜何如侍中王閎曰天下乃高皇帝天下非陛下天下也統業至重天子無戲言上乃默然不悅孝平皇帝漢書帝紀曰孝平皇帝諱術之字曰樂元帝孫中山孝王之子也年三歲時為王哀帝崩迎中山王即位元始五年為王莽所鴆而崩有司議禮臣不殤君皇帝年已十四宜以禮斂加元服漢書贊曰孝平之世政自莽出褒善顯功以自尊盛觀其文辭方外百蠻無思不服休徵嘉應頌聲並作至乎變異見於上民人怨於下莽亦不能文也少帝孺子漢書曰孝平皇帝崩無子嗣絶宣帝曾孫有五人王莽惡其長也兄弟不得相後乃徵宣帝玄孫廣威侯嬰年二歲記以卜相最吉莽遂居攝如周公故事改曰居攝元年三月立嬰為皇太子號曰孺子建國元年乃策命孺子以為安定公莽執孺子手流涕曰今豫迫皇天威命不得如周公哀歎良久孺子下殿北面稱臣百寮莫不感慟莽勑阿乳母不得與語常在四壁中至於長大不能名六畜後莽以女孫妻之帝王世紀曰嬰為孺子三年而廢為安定公十五年而失國始二年平陵方望等將嬰聚衆為天子數月更始乃殺之王莽漢書曰王莽字巨君孝元皇后之弟子也父及兄弟皆以元成世封侯輔政凡九侯五大司馬唯莽父曼早死不侯五侯侈靡莽獨孤貧因折節為儉受禮經勤身博學事母及寡㛐孤兄子行甚整又外交英俊內事諸父世父鳳疾莽侍病亂髮垢面鳳且死以託太后及帝拜黃門郎永始中封為新都侯遊者為之談說虛譽隆洽太后姊子淳于長為九卿先進在莽右莽陰求其罪因大司馬白之長伏誅莽以獲忠直遂擢為大司馬輔政欲令名譽過前人遂克己不倦歲餘成帝崩哀帝即位傅太后丁姬皆稱尊號丞相朱博奏莽前不廣尊尊之義請免為庶人乃遣就國杜門自守吏民怨訟莽者以百數元壽元年徵莽歲餘哀帝崩莽為大司馬平帝即位太后臨朝皆委政於莽群臣奏莽定策安宗廟賜號安漢公莽以女配帝欲擅權帝母衛姬及舅並留中山莽子宇恐帝大後見怨與師吳章夜持血灑莽門吏發覺之莽執宇送獄死莽因作書八篇以戒子孫宜班郡國令學官以著官簿比孝經吏人止書者八千餘人咸曰伊尹為阿衡周公為太宰帝採伊周稱號加公為宰衡又加九錫鸞輅龍旗莽又增法五十條犯者徙之西海徙者以千萬數民始怨矣平帝疾莽作策請問願以身代藏策金縢平帝崩莽惡立長乃選子嬰年三歲託以卜相最吉是月前輝光謝囂奏武功長孟通浚井得白石下有丹書文曰告安漢公莽為皇帝符命之興自此始矣群臣奏安漢公居攝踐祚服天子黻冕南面朝群臣車服出入如天子郊祀天地贊者曰假皇帝民臣謂之攝皇帝自稱曰豫改元曰居攝二年東郡太守翟義立嚴鄉侯劉信為天子移檄郡國衆十餘萬莽惶懼抱孺子告禱郊廟倣大誥作策班於天下莽既滅翟義自謂威德已盛遂謀即真之事矣莽母功顯君死意不在哀令太后下詔議其服莽奏太后下詔議其服莽母太后稱劉京上書言臨淄縣昌興亭長辛嘗夢曰吾天公使我告亭長曰攝皇帝當為真即不信此亭中當有新井旦起視誠有新井入地且百尺梓潼人哀章即作銅匱為兩撿其上書言莽為真天子昏時衣黃衣持匱至高廟付僕射以聞莽至高廟拜受金匱還坐未央前殿下書即真天子位號曰新以十二月癸酉為建國元年莽按符命求得王盛從布衣登用百官並改名又改長安為常安立祖廟五親廟四又更作小錢與前大錢為二品百姓不便農商失業民人至泣於市道遣五威將王奇班符命四十二篇五威將乘乾文車駕坤六馬背負鷩鳥之毛服飾甚偉長安狂女子碧呼道中曰高皇帝大怒趨歸我國不者九月必殺汝莽捕殺之更名胸奴為降奴是時有用方技待詔黃門者或問莽形貌待詔曰莽所謂鴟目虎吻豺狼之聲故能食人亦當為人所食問者告之莽誅待詔後常翳雲母屏風非親近莫得見也更名高句驪為下句驪五年文母皇太后崩立廟長安新室世世獻祭先帝配食坐於床下又明六管之令犯禁者至死臨淮瓜田儀姓瓜田名儀為盜賊琅耶女子呂母亦起莽之南郊鑄作威斗若北斗欲以厭勝衆兵莽見盜賊起乃命令太史推三萬六千歲曆紀六年一改元布天下大募天下丁男及死罪囚吏民奴名曰豬突狶勇以為鋭卒莽見盜賊多欲規為自安遂營長安城南堤封百頃親舉築三千即言符命黃帝以百二十女致仙乃遣分行天下博採淑女莽夢見長樂宮銅人起立惡之尚方鐫滅銅人膺文又令虎賁武士入高廟杖劍四面提擊桃湯赭鞭鞭灑屋壁又言黃帝建華蓋以登仙乃造之百官竊言此似轜車非仙物也莽知西方潰叛乃遣分行天下井田衆制會世祖與兄齊武王等功拔棘陽立劉聖公為天子莽愈恐欲外視自安乃染其髮鬢進所徵天下淑女立杜陵史氏女為皇后娉黃金三萬斤遣王邑王尋等兵百萬號曰虎牙五威兵定山東圍昆陽世祖來救昆陽邑等大敗關中聞之震恐命張邯稱符命事因曰易言伏戎于莽升其高陵三歲不興莽皇帝名升謂劉伯升高陵謂翟義封也猶殄滅不興後莽兵敗莽憂憊不能食但飲酒啖鰒魚讀軍書倦因憑寐不復就床也但為厭勝遣壞渭陵延陵門果罳曰無使民復思漢也崔發言周禮左傳國有太災則哭以厭之莽乃至南郊陳符命仰天曰皇天即授臣莽何不殄滅衆賊因搏心大哭氣盡伏而叩頭諸生小民甚悲哀及能誦策文者除為郎拜將軍九人為九虎將漢承相司直李松與鄧曅攻京師以王曼為校尉略地至長門宮而茂陵董喜等並假以號稱漢將長安旁兵四會城下爭欲先入城貪立本大功莽分赦城內獄囚皆授兵殺狶飲其血誓曰大功莽分不為新室者社鬼記之衆兵發掘莽妻子父祖冢燒其棺及九廟明堂火照城中少年朱第張魚等燒作室門斫敬法闔呼曰反虜王莽何不出降火及掖庭莽避火宣室火輒隨之宮人婦女啼呼曰當奈何莽紺祠服帶璽韍紺深清枃音弋句切杓純也言純為紺服也韍音弗持虞帝匕首天文郎案式於前曰時加某莽旋席隨斗而坐曰天生德於豫漢兵其如豫何群臣扶掖莽自前殿南下椒除西出白虎就車之漸臺欲阻池水獨把持符命威斗公卿大夫從官尚千餘人王邑晝夜戰罷極入見其子侍中睦解衣冠欲逃邑叱之令還父子共守莽軍人入殿中呼曰反虜王莽安在有美人出房曰在漸臺衆兵追之圍數百重臺上亦與戰莽入室下晡時衆兵上臺臺上商人杜吳殺莽取其綬校尉公賓就見吳問綬主所在曰室中西北陬就識斬莽首軍人爭分裂莽身支節肌皮臠分爭相殺者數千人傳莽首詣更始懸於宛市中百姓共提擊之或切食其舌應劭漢官儀曰幘本無巾如今半幘而已王莽無髮因為施巾故里語曰王莽頭禿施幘屋漢書贊曰王莽始起外戚折節力行以要名譽宗族稱孝師友歸仁及其居位攝政成哀之際勤勞國家直道而行動見稱述其竊位南面處非所據顛覆之勢險於桀紂而莽晏然自以黃虞復出乃始恣睢奮其威詐滔天虐民窮凶極惡毒流諸夏亂延蠻貊猶未足達其欲焉是以四海之內囂然喪其樂生之心中外憤怨遠近俱發城池不守支體分裂遂令天下城邑為墟丘壠發掘害遍生民辜及朽骨自書傳所載亂臣賊子無道之人考其禍敗未有如莽甚者也昔秦燔詩書以立私議莽誦六經以文姦言同歸殊途俱成滅亡此皆亢龍絶氣非命之運紫色䵷音蛙聲餘分閨位聖王之驅除云爾非命非天命也紫間色䵷邪音歲月之餘分為閏言皆非正也
