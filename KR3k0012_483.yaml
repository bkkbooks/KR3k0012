body:
  text: 人事部一百二十三仇讎下太公六韜云武王伐殷乘舟濟河兵車出壞船於河中太公曰太子為父報仇令死無生所過津梁皆悉燒之列子曰魏黑卵以昵嫌殺丘邴章其子來丹謀復讎丹氣甚猛形甚露計粒而食之順風而趨雖怒不能稱兵恥假力於人誓手劍以屠黑卯黑卵悍志絶衆力抗百夫筋骨皮肉非人類也延頸承刃披胸受矢鋩鍔摧屈而體無痕負材力視來丹猶雛鷇也來丹之友申抱曰子怨黑卯至矣黑卯之易子過矣將奚謀焉丹垂涕曰願為我謀申抱曰吾聞衛孔周其祖得殷帝之寶劍童子服之卻三軍之衆奚不請焉已下具劍部淮南子曰魯人有為其父報讎於齊者刳其腹而見其心坐而拭冠起而更衣徐出門上車而步顏色不變其御欲驅撫而止之曰為父報讎以出死非為生也今事已成矣有何去之追者曰此有節行之士不可殺也解圍而去之琴操曰樗里牧恭為父報怨而亡林嶽之下有馬夜降圍其室而鳴於是覺而聞走馬聲以為吏追之乃奔而亡明視天馬迹也乃曰吾以義殺人而天馬來降以驚動吾處不安以告吾耶乃感懼入沂澤之中作走馬引後果讎家候之不得也又曰聶政父為韓王治劍過期不成王殺之時政未生及壯問母知之乃入山遇仙人學鼓琴漆身吞炭七年琴成入韓逢妻從買櫛對而笑妻泣曰君似政齒政曰天下人齒盡相似耳乃入山援石擊落其齒以刀內琴中剌韓王國語曰吳敗越於會稽勾踐説國人曰寡人不知其力之不足也與大國報仇以暴露百姓之骨於中原此則寡人之罪也親為夫差洗馬而歸乃致其衆而誓之寡人聞古之賢君不患其衆之不足也而患其志行之少恥今夫差衣水犀之甲者億有三千人水犀如牛其甲有朱鑿以為甲士不患其志行之少恥而患其衆之不足也韓詩外傳曰魏文侯問解狐曰寡人將定西河之守誰可用對曰荊伯柳賢人殆可文侯曰是非子之讎也對曰君問可非問讎也於是將以伯枊為西河守伯柳見解狐而謝之解狐曰言子者公也怨子者私也虞溥江表傳曰孫策殺許貢貢客為貢報讎射策中頰陸胤廣州先賢傳曰尹牙字猛德太守南陽寵下車牙以德進幹任喉舌寵雖當國厚祿而懷愧戚見於顏色牙常用怪焉曰伏見明府四節悲歎有慘瘁之思何也寵謂牙曰父為豪周張所害重仇未報並與戴天非孝子雖官尊祿重而塵恥未判是以長愧而無恥也聞好馬牙與校圉交通遂充騶馬之職乃先醉張近侍以夜解縱諸馬令之亂駭知張必將驚起伏側階下張果出問其故牙因手刃張首而還孝子傳曰魏湯少失其母獨與父居邑飬蒸蒸盡於孝道父有所服刀戟市南少年欲得之湯曰此孝父所愛不敢相許於是少年歐檛湯父湯叩頭拜謝之不止行路書生牽止之僅而得免後父壽終湯乃殺少年斷其頭以謝父墓焉師覺授孝子傳曰仲子崔者仲由之子也初子路仕衛赴蒯聵之亂衛人狐黶時守門殺子路子崔既長告孔子欲報父讎夫子曰行矣子崔即行黶知之於城西決戰其日黶持蒲弓木戟與子崔戰而死皇甫謐列女後傳曰衛義姬者其夫有先人之讎讎家來報壻避之仇家得義姬問壻所在乃積薪燎之遂不言而燒死又曰郃陽友娣者郃陽邑任延壽之妻也字季兒有三子季兒兄弟季宗與延壽爭葬父之事延壽與其友陰殺季宗季兒曰殺夫不義事兄之讎亦不義何面目以生而戴天履地乎遂以繩自縊死馮翊王讓聞之大其義令縣復其三子而表其墓也又曰京師節女者長安大昌里人之妻也其夫有仇仇家欲報夫而無道聞其妻孝義乃劫其妻父使要其女為中間父呼其女而告之計念不聽則殺父不孝聽之則殺夫不義不孝不義雖生不可以行於代欲以身當之且曰諾夜在樓上新沐頭東首臥則是矣妾請開戶而夜半仇家果至斷頭持去明視之乃其妻之頭也仇家痛以為義遂釋不殺其父越統書曰伍子胥入吳居三年闔閭將為之報讎子胥曰不可臣聞諸侯不為匹夫興師於是止其後荊將伐蔡子胥言之闔閭即使子胥救蔡而伐荊十五戰十五勝荊平王已死子胥捶笞平王之墓而數之曰昔者吾先人無罪而子殺之今以此報子也趙曄吳越春秋曰越王念吳欲復怨非一旦也冬寒則抱冰夏熱則握火愁心苦思懸膽於戶出入嘗之不絶於口乃中夜抱柱而哭哭訖復承之以嘯於是群臣聞之咸曰夫復讎謀敵非君王之憂自臣下之急務也二十一年興師滅吳檀道鸞續晉陽春秋曰王談年十許歲父為鄰人竇度所殺談陰有復讎之志年十八密買市利插刃陽若以耕耘者度常乘船出入經一橋下談伺度行還於橋上以插斬之應手而死既而歸罪有司太守孔巖義其孝勇列上宥之搜神記曰丁蘭河內野王人年十五喪母乃刻木作母事之供養如生鄰人有所借木母顏和則與不和不與後鄰人忿蘭盜斫木母應刀血出蘭乃殯殮報讎漢宣帝嘉之拜中大夫幽明録曰項縣民姚牛年十餘父為鄉人所殺牛常賣衣物市刀戟圖欲報讎後在縣署前手刃之於衆中吏捕得官長深矜孝節為推遷其事會赦得免後令出獵逐鹿入草草有古深穽數處馬將趍之忽見一公舉杖擊馬馬驚僻不得及鹿令怒引弓將射之曰此中有穽恐君墯耳令曰汝為何人公為跪曰民姚牛父也感君活牛故來謝恩因滅不見令身感其事在官數年多惠於民會稽典録曰魏朗字少英上虞人少為縣吏兄為鄉人所殺朗白日操刀報讎於縣中遂亡命到陳國從博士郤仲信學春秋圖緯又詣太學受五經京師長者李膺之徒爭從之解系傳曰張華裴頠之被誅也趙王倫孫秀以宿讎收系兄弟將殺之梁王彤救之倫等怒曰我見水中蟹尚欲殺之況此人兄弟輕我也遂并戮其妻子崔鴻前燕録曰吐谷渾子吐延年少有大志身長七尺八寸雄姿魁桀羌虜憚之號曰項羽性俶儻不群慷慨謂群下曰大丈夫生不在中國當高皇光武之代與韓彭吳鄧並驅中原定天下決雌雄使名垂竹帛而潛竄窮山隔閉殊俗不聞聖教於上宗不得策名於天府生與麋鹿同群死作氈裘之鬼雖偷觀日月獨不愧於心乎負其智勇猜忍不恤下為帛城羌酋薑聰所剌殺長子業年十歲常縛草人號曰薑聰哭而射之大號而泣不中瞋目大呼要中乃止其母謂之曰薑聰諸將已屠膾之矣汝何如此業泣曰誠知射草人無益於先公所以申罔極之心耳陳留志曰韓卓父嘗為吏所辱卓執兵伏道欲候殺之而長子暴病將死卓乃歎曰道家有信報讎不欲過今長子病豈為是乎於是乃投刃援杖復恥而止常璩華陽國志曰陳網字仲卿少與同郡張宗受學南陽以母喪歸宗為安衆至元所殺網終喪往復之自拘有司會赦免應劭風俗通曰汝南陳公思為五官掾王子祐為兵曹行會食下亭子祐曾以縣官事考殺公思叔父斌斌無子父思欲為報仇不能得卒見子祐不勝憤怒便格殺之還府歸死時大守太傅胡廣以為公思追念叔父仁勇憤發手刃仇敵自歸司敗便原遣之梁祚魏國統曰崔周平者漢太尉烈之孫也兄曰元平為議郎以忠直稱董卓之亂烈為卓所害元平常思有報復之心會病卒魏文帝雜詔曰喪亂以來兵革從橫天下之人多相殺害昔賈復寇恂私相怨憾至懷手劍之忿光武召而和之卒共同輿而載崔鴻後燕録曰秦滅燕慕容桓阻兵遼東為秦所殺子鳳泣血不言年十一告其母曰昔張良養士以擊秦王復君之仇也先王之事豈可一日忘之虞預會稽典録曰朱朗字恭明父為道士淫祀不法遊在諸縣為烏傷長陳頵所殺朗陰圖報怨而未有便會頵以病亡朗乃剌殺頵子事發亡命奔魏魏聞其孝勇擢以為將又曰董黯字孝治家貧採薪供養母甚肥悅憐人家富有子不孝母甚瘦不孝子疾黯母肥嘗苦之黯不報及母終負土成墳竟殺不孝子置冢前以祭詣獄自繫會赦免廣德神異録曰賈氏女不知何許人年十五父為宗人所害其弟強仁年幼賈氏撫育之及強仁長乃共殺讎者自列其罪高祖嘉之又曰王君操父大業中為鄉人李君則歐死貞觀初君則以運代遷革不懼憲網又以君操孤微謂無復讎之志遂仕州府操密袖白刃剌殺之刳其心肝咀食立盡詣州自陳刺史以其擅殺問之曰殺人當死律有明文何方自理以求生路君操對曰亡父被殺二十餘載聞諸典禮父讎不可同天早願圖之久而未遂常懼滅亡不展冤情今大恥既雪甘從刑憲太宗特原之又曰張琇蒲州解縣人父審素為嶲州都督在邊纍載有糾其軍中贓罪勑監察御史楊汪馳傳就軍按之汪在路為審素黨與所劫對汪殺告事者脅汪令審素無罪俄曰州人翻殺審素之黨汪始得還至益州奏稱審素謀反因深按審素構成其罪斬之籍沒其家琇與兄瑝以年幼坐徙嶺外尋各逃歸纍年隱匿汪後纍遷殿中侍御史改名萬頃是年瑝琇候萬頃於東都城挺刀殺之瑝雖年長其發意及手刃皆琇為之既殺萬頃繫表於斧刃自言報讎之狀便逃奔就江外殺萬頃同謀搆父罪者行至汜水為捕者所獲時都城士女皆矜琇等幼稚義烈能復父讎多言其合矜恕者中書令張九齡又欲活之裴耀卿李林甫固言國法不可縱讎上以為然因謂九齡等曰復讎雖禮法所許殺人亦格律具存孝子之情義不顧命國家設法焉得容斯殺人成復讎之志赦之虧格律之條然道路喧議故須告示乃下勑曰張琇等兄弟同殺推問疑承律有正條須合至死近聞士庶頗有喧詞矜其為父報讎或言本罪冤濫但國家設法事存經久蓋以濟人期於止殺各申為子之志誰非徇孝之夫展轉相讎殺傷何限咎陶作士法在必行曾參殺人亦不可恕不能加以刑戮肆諸市朝宜付河南府決殺瑝琇既死士庶咸傷憫之為作哀誅榜於衢路中市人斂錢於死所造義井並葬瑝琇於北邙又恐萬頃家人發之并作疑冢數所其為時人所傷如此唐新語曰杜并父審言善五言尤攻書翰恃才蹇傲深為時輩所嫉自洛陽丞貶吉州司戶又與群寮不叶司馬周季重與司戶郭若訥共構之審言繫獄將因事殺之并年十三伺季重等酣宴密刃剌季仲而死并亦見害季重臨死歎曰吾不料審言有此孝子邪若訥誤我至此審言由是免官歸東都自為祭文以祭并士友咸哀并孝烈蘇頲為墓志劉充濟為祭文則天召見審言甚嘉歎之又曰衢州人余長安父與叔共二人為同郡衣金所殺長安八歲自誓十七乃復讎大理斷死刺史元錫奏言臣見余氏一家橫遭死者實二平人蒙顯戮者乃一孝子引公羊傳父不受誅子復讎之義請下百僚集議時裴垍當國李鄘為有司事竟不行老儒薛伯皋與錫書曰大司寇是俗吏執人柄老小生余氏子宜其死矣
