body:
  text: 珍寶部三玉上尚書堯典曰在璿璣玉衡以齊七政孔安國注曰在察也璿美玉璣衡王者正天之器可轉運者七政日月五星各異政舜察天文齊七政審己當天心與否又胤征曰火炎崑岡玉石俱焚山脊曰岡崑山出玉言火逸而害玉又禹貢曰華陽黑水惟梁州厥貢璆璆玉名也雍州厥貢惟球琳琅玕球琳皆玉名琅玉玕石而似珠又顧命曰成王被冕服馮玉几又曰大玉夷玉天球在東序尚書中候曰湯沉璧於洛黑鳥隨魚止化為黑玉赤勒文尚書説曰有人能起載玉英鄭玄曰玉果實召載為骨衣也尚書大傳曰堯致舜天下贈以昭華之玉周書曰武王俘商舊寶玉萬四千佩玉億有八萬周禮天官下曰玉府掌王之金玉玩好兵器凡良貨賄之藏共王之服玉佩玉珠玉齊則共食玉玉是陽精之純者食之所禦水氣又春官上大宗伯曰玉作六器以禮天地四方以蒼璧禮天以黃琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以玄璜禮北方儀禮聘禮曰凡執玉無籍者襲鄭玄注云籍言修也大戴禮曰玉在山而木潤淵生珠而崖不枯珠者陰中之陽也破勝火玉者陽中之陰也破勝水禮記月令曰孟春之月天子衣青衣服蒼玉又曲禮上曰受珠玉者以掬又曰執玉爵者弗揮又曰執玉不趍志重玉也又檀弓曰石駘仲卒駘仲衛大夫石碏之族無適子有庶子六人卜所以為後者莫適立也曰沐浴佩玉則兆言齊潔則得吉兆也五人者則沐浴佩玉石祁子曰孰有執親之喪而沐浴佩玉者乎不沐浴佩玉心正且知禮又月令曰孟春之月天子衣青衣服蒼玉又玉藻曰古之君子必佩玉右徵角左宮羽玉聲所中也徵角在右事也民也可以勞宮羽在左宮也物也宜逸趨以采齊路門外之樂節也門外謂之趨齊當楚薺之薺齊行以肆夏登堂之樂節周還仲規反行也宜圓折還中矩曲行也宜方進則揖之退則揚之然後玉鏘鳴也揖之謂小免見於前也揚之謂小仰見於後也鏘聲貌又曰君子無故玉不去身君子於玉比德焉故謂喪與災天子佩白玉而玄組綬公侯佩山玄玉而朱組綬大夫佩水蒼玉而純組綬世祖佩瑜玉而綦組綬士佩瓀玫而縕組綬玉有山玄水蒼者視之文色所似也綬者所以佩玉相承受也又學記曰玉不琢不成器人不學不知道又聘義曰子貢問於孔子曰敢問君子貴玉而賤珉何也為玉之寡珉之多與孔子曰非為珉之多故賤之也玉之寡故貴之也夫昔者君子比德於玉焉溫潤而澤仁也縝密而栗知也縝髮也栗堅貌廉而不劇義也劇猶傷也義者不茍傷人也垂之如墜禮也禮尚謙卑叩之其聲清越以長其終詘然樂也樂作則有聲止則無也越猶陽也詘絶止貌瑕不掩瑜瑜不掩瑕忠也瑕玉之病也瑜其中間美者孚尹旁達信也氣如曰虹天也精神見于山川地也精神亦精氣也虹天氣也圭璋特達德也特達謂以朝聘天下莫不貴者道也道者人無不由詩云言念君子溫其如玉故君子貴之也禮含文嘉曰玉石得宜則太白常明禮稽命徵曰王者得禮制則澤谷之中有白玉焉禮斗威儀曰君乘金而王則紫玉見於深山左詩桓公曰初虞叔有玉虞公求旃不獻既而悔之曰周諺有之匹夫無罪懷璧其罪吾焉用此以其賈害乃獻之又莊公曰虢公晉侯朝王享禮命之宥命之以幣物有助也皆玉五瑴非禮也又僖上曰天王使邵武公內史過賜晉侯命受玉惰過歸告王曰晉侯其無後乎事具錫命門又僖下曰楚子玉自為瓊辨玉纓未之服也先戰夢河神謂己曰畀余賜汝孟諸之麋弗致也大心與子西使榮黃諫弗聽榮季曰死而利國猶或為之況瓊玉乎是糞土也而可以濟師將何愛焉弗聽又僖下曰晉侯執衛侯歸之于京師使醫衍鴆衛侯寧俞貨醫使薄其鴆不死公為之納玉於王與晉侯皆十瑴王許之乃釋衛侯又文公下曰秦伯使西乞術來聘且言將伐晉襄仲辭玉事具奉使部又曰莒太子僕以其寶玉來奔又成上曰晉及齊戰于鞍齊師敗齊侯使賓媚人賂以紀甗玉磬與地不可則聽客之所為又襄十五年曰宋人或得玉獻諸子罕子罕弗受獻玉者曰以示玉人玉人能治玉者玉人以為寶也故敢獻之子罕曰我以不貪為寶爾以玉為寶若以與我皆喪寶也不若人有其寶稽首而告曰小人懷璧不可以越鄉言必謂盜所害納此以請死也請免死子罕置諸其里使玉人為之攻之攻治也富而後使復其所賣玉得富又襄公十八年晉侯伐齊將濟河獻子以朱絲玉二瑴雙玉曰瑴而禱曰齊環怙恃其險負其衆庶環齊靈公名負依也棄好背盟陵虐神主神主民也謂數伐魯民人曾臣彪將率諸侯以討焉彪晉平公名稱臣者明上有天子以謙告臣曾臣猶末臣其官臣偃實先後之守官之臣偃獻子名茍捷有功無作神羞羞恥也官臣偃無敢復濟偃信巫言故以死自誓唯爾有神裁之沈玉而濟又昭七年曰燕暨齊平燕人歸燕姬嫁玉與齊侯賂以瑤甕玉櫝斝耳不克而還瑤玉也櫝匱也斝耳玉爵又曰公賜公衍羔裘使獻龍輔於齊侯龍輔玉名遂入羔裘齊侯喜與之陽穀陽穀齊邑又曰公疾遍賜大夫從公者大夫不受賜子家子雙琥琥玉器一環一璧輕服細好之服受之大夫皆受其賜巳未公薨子家反賜於府人曰吾不敢逆君命也大夫皆反其賜又昭十六年曰晉韓起聘于鄭宣子有環其一在鄭商玉環同工共朴自共為雙宣子謁諸鄭伯謁請子子産弗與曰非官府之守器也寡君不知子太叔子羽謂子産曰韓子亦無幾求言所求少晉國亦未可以二晉國韓子不可偷也偷薄也若屬有讒人交鬥其間鬼神而助之以興其凶怒悔之何及吾子何愛於一環其以取憎於大國也盍求而與之子産曰吾非偷晉而有二心將終事之是以弗與忠信故也僑聞君子非無賄之難立而無令名之患僑聞為國非不能事大字小之難無禮以定其位之患夫大國之人令於小國而皆獲其求將何以給之一共一否為罪滋大大國之求無禮以斥之何饜之有吾且為鄙邑則失位矣不復成國若韓子奉命以使而求玉焉貪淫甚矣獨非罪乎出一玉以起二罪吾又失位韓子成貪將焉用之且吾以玉賈罪不亦鋭乎鋭細小也韓宣子私覲於子産以玉與馬曰子命起舍夫玉是賜我玉而免吾死也敢不藉手以拜以玉為藉手拜謝子産又昭十七年曰鄭裨竈言於子産曰宋衛陳鄭將同日火若我用瓘斝玉瓚鄭必不火子産弗與以為天災流行非禮所息故也為明年宋衛陳災傳又定上曰蔡昭侯為兩佩與兩裘佩佩玉也以如楚獻一佩一裘於昭王昭王服之以享蔡侯又曰蔡侯歸及漢執玉而沈曰余所有濟漢而南者有若大川自誓言若後渡漢當受禍明如大川又曰季平子行東野還未至丙申卒于房陽虎將以璵璠斂璵璠美玉君所賜仲梁懷弗與曰改步改玉昭公之出孫行君事佩璵與祭宗廟今定公立復臣位改君步則亦當去璵璠陽虎欲逐之告公山不狃曰彼為君也子何怨焉又定下曰邾隱公來朝子貢觀焉邾子執玉高其容仰公受玉卑其容俯玉朝者之贄子貢曰以禮觀之二君者皆有死亡焉又曰陽虎脫甲如宮取寶玉大弓以出又哀上曰衛太子禱曰大命不敢請佩玉不敢愛又曰吳申叔儀乞糧於公孫有山氏曰佩玉藥兮余無所繫之穀梁傳隱公曰賵玉曰唅春秋孔演圖曰孔子論經有鳥化為書孔子奉以告天赤爵集書上化為玉刻曰孔提命作應法春秋説題辭曰孔子以受黃玉葬魯城北毛詩國風曰將翱將翔佩玉鏘鏘將將鳴玉而後行又竹竿曰巧笑之瑳佩玉之郍瑳巧笑貌郍行有節度又小雅曰它山之石可以攻玉攻錯也又大雅曰維玉及瑤鞞琫容刀詩含神霧曰孔子曰詩者天地之心刻之玉板藏之金府韓詩外傳曰良玉度尺雖有千仞之土不能掩其光周易鼎卦曰上九鼎玉鉉大吉無不利鄭玄注曰鼎蓋象玉似剛而柔廉而不劌易曰乾為金為玉孝經援神契曰神靈滋液百寶用則玉有瑛華宋均曰尊卑不失其服玉者英華也論語子罕曰子貢曰有美玉於斯韞櫝而藏諸求善價而沽諸子曰沽之哉沽之哉我待價者也寧有自訟賣之道乎我居而待價者又季氏曰孔子曰求虎兕出於柙龜玉毀於櫝中是誰之過與逸論語曰璠璵魯之寶玉也孔子曰美哉璠璵遠而望之煥若也近而視之瑟若也一則理勝一則孚勝又曰玉十謂之區治玉謂之琢亦謂之雕雙王為瑴五瑴為區雕治璞也瑴音角瑳玉色鮮白也瑩玉色也瑛玉光也瓊赤玉也璿瑾瑜美玉也璑舞三采玉也玲瑲琤瑝鍠玉聲也璬玉佩玉也瑱充耳也璪玉飾以水藻也史記曰范蠡事越王勾踐二十餘年竟滅吳范蠡曰君行令臣行意乃載其輕寶珠玉乘舟浮海行終不反漢書曰陳平求見漢王拜平為都尉綘灌等或讒平曰雖美丈夫如冠玉耳又曰文帝始幸雍新垣平以望氣見平使人持玉柸闕下獻之平言上曰闕下有寶玉氣果有獻玉柸者又郊祀志曰宣帝祀河東之明年鳳凰集祋祤於所集處得寶玉乃起萬壽宮又曰王莽就國孔休守新都相休謁見莽莽進其玉具寶劍休不肯受莽因曰誠見君面有瘢美玉可以滅獻其璏耳即解其璏休復辭莽遂椎碎之自裏以進休也後漢書曰孝明帝時汴渠成故行幸滎陽巡行河渠薦嘉玉潔牲以禮河神續漢書曰桓帝時光祿吏舍下夜有青氣視之得玉鉤玦各一鉤長七寸三分玦五寸四分身中皆雕鏤又曰三老五更杖玉杖民年七十授之以玉杖華嶠後漢書曰嘉平中袁逢為三老賜玉杖范曄後漢書曰梁冀金玉珠璣異方珍怪積藏室魏志曰漢時夫餘王葬用玉鉀常豫以付玄莬郡王死則迎取以葬公淵伏誅玄莬庫猶有玉鉀一具今夫餘庫有玉璧圭瓚數代之物傳世以為寶耆老言先代之所賜也魏略曰大秦國出采玉五色玉夫餘國出赤玉晉書曰中興東遷舊章多闕而冕旒飾以翡翠珊瑚及雜珠等顧和奏舊冕十有二旒皆用玉珠今用雜珠等非禮若不能玉可用白琁成帝於是始下太常改之沈約宋書曰紫玉王者不藏金玉則光見深山崔鴻十六國春秋南燕録曰鎮南長史悅壽謂南海王法曰向見北海王子天資引雅神爽高邁始知天族多奇玉林皆寶又前涼録曰辛攀字懷遠隴西狄道人兄鑒曠弟寶迅皆以才識知名秦雍為之語曰三龍一門金友玉昆又曰初呂光之稱王也遣市六璽於于闐六月玉至也燕書曰文帝熙平二年左部民得玉璽玉鼎趙書曰劉聰徙治平陽於汾水中得白玉四寸高二分龍鈕文曰有新保之後魏書曰崔挺為光州刺史掖縣有人年踰九十板輿造州自稱少曾充使林邑得一美玉方尺四寸甚有光彩藏之海島垂六十歲欣逢明政今願奉之挺曰吾雖德謝古人未能以玉為寶遣船隨取光潤果然迄不肯受乃表送都又曰李預字元凱歷征西大將軍長史帶馮翊太守府解罷郡遂居長安羡古人餐玉法乃採訪藍田躬往政得若環璧雜器形者大小百餘頗有粗黑者亦挾盛以還至而觀之皆光潤可玩預乃椎七十枚為屑食之餘多惠人後預及聞者更求玉於前處皆無所見翊公源懷弟得其玉琢為器佩皆鮮明可寶預服經年云有效驗而世事寢食皆不禁節又加好酒損志及疾篤謂妻子曰吾酒色不絶自致於死非藥過也然吾尸體必當異勿速殯令後人知餐服之妙時七月中旬長安毒熱預尸四宿而體色不變其妻常氏以玉珠二枚唅之口閉常謂曰君自云餐玉有神驗何不受唅言訖齒啓納珠因虛其口都無穢氣舉斂棺堅直不傾委死時有遺玉屑數升囊盛納諸棺中又曰高祐為中書侍郎時有人於零丘得玉印一以獻詔以示祐祐曰印上有籀書二字文曰守壽壽者命也我獲其命亦是歸我之徵又曰穆弼有風格善自位置高祖初定代族欲以弼為國子助教弼辭曰先臣以來蒙恩纍世比校徒流實用慚屈高祖曰朕欲厲胄子故屈卿先白玉投泥豈能相污弼曰既遇明時恥沉於泥滓又曰孝昌中於廣平王第掘得古玉印勑召祖瑩與李琰之令辨何世之物瑩云此是于闐國王晉泰康中所獻乃以墨塗字觀之果如瑩言時人稱為博物後周書曰武帝保定中晉公護獲玉斗以獻北史曰于謹平江陵獲大玉徑四尺圍七尺及諸輿輦法物以獻又曰隋文時王邵上表云稽覽圖史又云政道則陰物變為陽物鄭玄注云蔥為韭亦是謹案自六年已來遠近山石多變為玉石為陰玉為陽
