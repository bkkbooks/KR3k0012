body:
  text: 職官部四十七從事中郎魏志曰韓嵩字德高義陽人少好學貧不改操知世將亂不應三公之命與同好數人隱居於酈西山中黃巾起嵩避難南方劉表逼以為從事中郎吳志曰嚴畯字曼才彭城人也少耽學善詩書三禮避亂江東與諸葛瑾步騭齊名有善性質純厚其於人物忠告善導志存補益張昭進之於孫權權以為騎都尉從事中郎晉書曰祖納字士言最有操行能清言文義可觀性至孝少孤貧常自炊爨以養母平北將軍王敦聞之遺其二婢辟為從事中郎有戲之曰奴價倍婢納曰百里何必輕於五羖皮耶又曰稽紹字延祖方直儒雅為衛軍從事中郎虞預晉書曰劉隗字大連彭城人學涉有具為祕書郎避亂南渡遂為中宗從事中郎甚見器遇何法盛晉中興書曰謝萬少而才器俊秀太宗聞其名取為鎮軍從事中郎抱朴子曰友人稽君道為廣州刺史其弟應靜為太博從事中郎別於襄陽君道泣而應靜不泣抱朴子以為丈夫宜然府椽史記曰倪寬為廷尉史為人溫良有廉智張湯以為長者數稱譽之及湯為御史大夫而寬為掾漢書曰陳遵為公府掾公府掾史率皆羸車小馬不尚鮮明而遵獨極輿馬衣服之好門外車騎交錯東觀漢記曰吳良以清白方正稱東平王蒼辟為西曹椽數諫正蒼多善策蒼上表薦良續漢書曰府掾比古之元士皆三命也漢舊注曰或曰漢初掾史辟皆上言故有祑皆比命士其所不言則為百石屬其後皆自辟故通為百石云魏志曰董尋字文奧為人忠直為軍謀掾青龍中上大興宮室群臣皆負土尋上書諫曰今臣自知言必死而臣自譬於牛之一毛生既無益其死何損且比本不生矣是以發筆流涕心與世辭臣有八子臣死之後以纍陛下魏略曰令狐劭字孔叔在安邑毛城中會太祖攻破鄴遂圍毛城城破劭等輩十餘人皆當斬太祖閲見之疑其衣冠也問其祖考而識其父乃解於署軍謀掾蜀志云馬良字季常為左將軍掾後遣使吳良謂亮曰今銜國命協穆二家幸為良介於孫將軍亮曰君試自為文良即草曰寡君遺掾良通好以紹昆吾豕韋之勳其人吉士荊楚之令鮮於造次之華而有克終之美願降心存納以慰將命權善待之吳志曰張溫父允以輕財重士名顯州郡為孫權東曹掾晉中興書曰荀闓字道明有清稱京師為之語曰洛中英英荀道明大司馬齊王辟以為掾又曰王珣弱冠而陳郡謝玄俱辟大司馬桓溫語人曰謝掾年三十必擁旄仗節王掾當作黑頭公皆未易才也典略曰趙戩除萬年令遂遭三輔亂客荊州劉表以為賓客是時白衣平原禰衡高論冠世來遊京師詆庀朝士及南見戩歎之曰所謂鐵則干將莫耶木則椅桐梓漆人則顏冉仲弓後辟魏王相國掾殷氏家傳曰殷秦字子平為大皇帝車騎掾委以書記上歎曰非唯秋兔之毫乃是鷹鸇之爪郭子曰王仲祖謝仁祖同為王公掾在坐長史云謝掾能作異舞王命為之謝便起舞神意甚暇王公熟視顧謂諸客曰使人思安豐安豐王戎封也語林曰王藍田少有癡稱王丞相以地辟之既見無所他問問來時米幾價藍田不答直張目視王公王公云王掾不癡何以云癡府屬漢書曰谷永字子雲為長安吏後博學經書有茂才除補御史大夫屬華嶠後漢書曰陳寵以時俗三府掾屬不肯親事但出入養虛故寵獨勤心於事又以法令繁冗吏得生因緣以致輕重乃置撰科牒辭訟比例使事類相從以塞姦源其後公府奉以為法魏志曰蔣濟字子通辟丞相主簿西曹屬令曰舜舉皋陶不仁者遠臧否得中望於賢屬又曰胡質字文德少與蔣子通俱知名於江淮間仕州郡濟為別駕使見太祖太祖問曰胡通達長者寧有子孫不濟曰有子曰質規摹大略不及父至於精良綜事過之太祖辟為丞相屬臧榮緒晉書云劉沈字道真世為北州名族博學好古辟衛瓘屬范亨燕書曰鮮于休有才器伎幹辟為左光祿大夫曹屬咨議參軍齊書曰張岱歷為三府咨議與典籤主帥共事事舉而情得或謂岱曰主王既以執事多門而每能緝和公私云何致此岱曰古人言一心可以事百君我為政端平待物以禮悔吝之事無由而及明暗短長更是才用之多少耳南史曰柳叔夜年十六為新野太守甚有名績補遙光咨議參軍及事敗左右扶上馬欲與俱亡答曰吾已許始安以死豈可負之耶遂自殺公府舍人史記曰李斯上蔡人也為丞相呂不韋舍人漢書曰爰盎字絲楚人也為將軍呂祿舍人又曰田叔字子仁以壯勇為衛將軍舍人衛青也後使刺三河奏事稱意為京輔都尉干寶晉紀云閻纘為人鯁直不畏強禦初仕為太傅楊畯舍人記室參軍魏志曰太祖以陳琳阮瑀管記室軍國書檄多琳所作鍾會以中郎在大將軍管記室事為心腹之任時人謂之子房吳志曰孫惠以書干東海王越詭其姓名自稱南嶽逸民秦祕之勉之以勤王匡世之略辭義甚美越省書榜題道衢招求其人惠乃出見越即以為記室參軍專掌文疏豫參謀議每造書檄越或驛馬催之應命立成皆有辭旨何法盛晉中興書曰王丞少而沖淡弱冠知名太尉王衍雅重之以比南陽樂廣司空東海王越以為記室參軍雅相敬重勑子毗曰夫學之所益者淺體之所安者深間習禮度不如式瞻儀形諷味遺言不如親承音旨王參軍人倫之表汝其師之又曰殷浩字淵源弱冠與京兆杜乂並有美譽善言玄理論難精微故風流清談皆歸之征西將軍庾亮引為記室參軍又曰孔寅字舒元中宗命為安東參軍專掌記室時書命殷積寅每稱職沈約宋書曰孔顗署衡陽王義季記室奉箋固辭曰記室之局實惟華要自非文行秀敏莫敢居之顗學不綜實性又踈惰何可以屬知祕記秉筆文闈假吹之尤方斯非濫三國典略曰顏晃字克明琅邪臨沂人也少孤貧有詞彩解褐梁邵陵王綸兼記室參軍時東宮學士庾信常使于府王使晃接對信輕其尚少曰此府兼記室幾人晃答曰猶少於宮中學士杜龕為吳興太守專好勇力梁元患之及使晃管其書翰仍謂龕曰顏晃文學之士使相毗佐造次之間必宜咨稟後周書曰郁慶領記室時北雍州獻白鹿群臣欲草表陳賀尚書蘇綽謂慶曰近代已來文章華靡逮于江左彌復輕薄洛陽後進祖述不已相公柄民軌物君職典文房宜製此表以革前弊慶操筆立成辭兼文質綽讀而笑曰枳橘猶自可移況才子也隋書曰魏淡專精好學博涉經史善屬文詞采贍逸齊博陵王濟聞其名引為記室唐書曰李巨川字下巳隴右人國初十八學士道玄之後故相逢吉之姪曾孫父循大中八年登進士第巨川乾符應進士屬天下大亂流離奔播切於祿仕乃以刀筆從諸侯府王重榮鎮河中辟為掌書記時車駕在蜀賊據京師重榮匡合諸藩叶力殄寇軍書奏請堆案盈几巨川文思敏速翰動如飛傳之藩鄰無不聳動重榮收復之功巨川之助也典略曰阮瑀字元瑜陳留人以才自護曹洪聞其有才欲使報答書記瑀不肯榜笞瑀瑀終不屈洪以語曹公公知其無病使人呼瑀瑀終惶怖詣門公見之謂曰卿不肯為洪且為我作之瑀曰諾遂為記室世説曰太原孫楚字子荊為大司馬石苞記室參軍又曰郤超王珣並以俊才為桓溫大司馬所眷珣為主簿超為記室參軍桓時為荊州超為人多鬚珣形狀短小于時西人為之歌曰髯參軍短主簿能令公喜能令公怒府參軍魏志曰張范參丞相軍事甚見敬重太祖征伐常謂文帝曰舉動必咨此人世子執子孫禮又曰董昭等謂太祖宜進爵國公備九錫以彰殊勳密以咨荀彧彧以為太祖本興義兵以匡朝寧國秉忠貞之誠守退讓之實君子愛人以德不宜如此太祖由是心不平會征孫權表請彧勞軍于譙因留彧以侍中光祿大夫持節參丞相軍事太祖軍至濡須彧疾留壽春以憂薨時年五十又曰曹休字文烈劉備遣將吳蘭屯下辨太祖遣曹洪征之以休參洪軍事太祖謂休曰汝雖參軍其實帥也洪聞此令恆委事於休又曰于禁屯頴陰樂進屯陽翟張遼屯長社諸將任氣多共不協使趙儼并參三軍每事誨諭遂相親睦又曰太祖征馬超文帝留守使程昱參軍田銀蘇伯等反河間遣將軍賈信討之賊有千餘人請降議者皆以為如舊法昱曰誅降之意臣以為不可誅也縱誅之宜先啓聞衆議曰軍事有專無請昱不答文帝起入特引見昱昱曰凡專命者謂有臨時之急呼吸之間者耳今此賊制在賈信之手無朝夕之變故老臣不願將軍行之文帝答曰君慮之善即白太祖太祖果不誅太祖還聞之甚悅謂昱曰君非徒明於軍計也又善處人父子之間晉書曰魏舒字陽元為相國參府朝碎事未嘗不見是非至廢興大事衆人既下意然後徐為之多出衆議莫不敬從晉王曰魏舒堂堂人之領袖也又曰孫楚字子荊為佐著作郎參石苞驃騎軍事楚既負其才器頗侮易苞初至揖曰天子命我參卿軍初參軍不敬府主楚既輕苞遂制施敬自楚始也又曰李涓字宣伯容貌簡素頽然若不足者而智度沉邃言必有中高祖為大將軍涓再參軍上信重之臧榮緒晉書曰庾敳字子嵩參太傅軍事從子亮少時見敳在太傅府僚佐多名士皆一世秀異敳處其中常自袖手晉中興書曰郤超字景興少而卓犖不羈有曠世之度俶儻高雋籠蓋當時時人為之語曰楊州獨步王文度盛德絶倫郗景興交遊士林每在勝拔又精於理義大司馬桓溫取為參軍英氣蓋世罕有所推與超相見常謂不能測也又曰薛兼為軍祭酒言於中宗曰臣邑人張闓才幹堪任當今之良器願垂引納以綜朝事中宗即召闓為安東參軍又曰郭璞為尚書郎大將軍王敦以璞有術取為參軍璞畏不敢辭又曰中宗之為安東取周訪為參軍在散輩中未之識也府進鎮東訪隨例為參軍時府參軍譙國周訪有罪當死誤收訪訪自列無罪而吏不察訪窮蹙乃身自執使仗奮擊收捕數十人皆被創披散訪得逸走歸府聞中宗大驚怒不問格鬥之罪又曰蘇峻反范汪逃遁西歸時庾亮溫嶠治兵潯陽咸以衆少賊強未敢即路且信使阻絶不相知聞及汪經過嶠等訪焉汪曰賊政令不一貪暴縱橫滅亡已兆雖強易弱朝廷倒懸宜時進討嶠等納之是日護軍平南二府交命始解褐參護軍事又曰阮孚字遙集咸子也避亂渡江中宗以為安東參軍蓬髮飲酒不以王務嬰心又曰鎮南將軍劉弘以陶侃為長史謂侃曰我昔為羊太傅參軍羊公見語云君後當居我身處我今相察亦復然也沈約宋書曰宗越隨柳元景北伐領馬幢主隸柳元怙有戰功在景後還補後軍參軍督護隨王誕戲之曰汝何人遂得我府四字越答曰征伐未死不憂不得咨議參軍誕大笑宋書曰王瞻字明遠一字叔鸞負氣傲俗好貶裁人物仕宋為王府參軍嘗詣劉彥節直登榻曰君侯是公孫僕是公子引滿促膝唯余二人彥節外迹雖酬之意甚不悅梁史曰沈警字世明惇篤有行業學通左氏春秋家纍千金後將軍謝安命為參軍甚相敬重警內足於財為東南豪士無進仕意謝病歸安固留不止乃謂曰沈參軍卿有獨善之志不亦高乎警曰使君以道御物前所以懷德而至既無用佐時故遂飲啄之願耳還家積載以墳素自娛後秦記云姚襄遣參軍薛瓚使桓溫溫以胡戲瓚瓚曰在北曰狐居南曰狢何所問也後周書曰梁昕以三輔望族上謁太祖見昕容貌瓌偉深賞異之即授右府長流參軍文章志云顧凱之字長康博學有文章性遲鈍為桓溫參軍甚被親昵溫嘗語人云凱之體中有癡黠各半合而論之只得平平耳干寶司徒儀曰行參軍之職掌凡使命及督察覆行之事彈劾補遺獻納聞見以達視聽世語曰王子猷作桓溫車騎參軍桓謂王曰卿在府久此當相斷理初不答直高視以手板柱頰云西山朝來致有爽氣又曰郝隆為桓公南蠻參軍三月三日作詩不能者罰三升隆初以不能受罰既飲覽筆便作其一句云娵子瑜反隅躍清池桓問娵隅是何語答云蠻名魚為娵隅桓公曰作詩何以為蠻語隆答曰千里投君始得為府參軍那得不作蠻語魏武選令曰今詔書省司隸官鍾校尉材智決洞通敏先覺可上請參軍事以輔暗政俗説曰陶夔為王孝伯參軍三日曲水集陶在前行坐有一參軍督護在坐陶於坐作詩隨得五三句後坐參軍督護隨寫取詩成陶猶更思補綴後坐寫其詩者先呈陶詩經日方成王怪陶參軍乃復寫人詩陶愧愕不知所以王後知陶非濫遂彈去寫詩者諸葛亮與參軍掾屬教曰任重才輕固多闕漏前參軍董幼宰每言輒盡數有諫云雖性鄙薄不能悉納幼宰參署七年事有不至至于十反未有忠於國如亮可以少過矣孫綽為功曹參軍駮事箋曰綱紀居管轄之任以糾司外內駮議彈射誠無所拘然亦所以獻可替否舉直繩違而已
