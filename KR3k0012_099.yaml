body:
  text: 皇王部二十三西晉懷皇帝晉書曰孝懷皇帝諱熾字豐度武帝第二十五子也光熙元年封豫章郡王屬惠帝之時宗室構禍帝沖素目守門絶賓遊不務世事專玩史籍有譽於時初拜散騎常侍及趙王倫篡見收為射聲校尉纍遷車騎大將軍都督青州諸軍事未之鎮永興元年改授鎮北大將軍都督鄴中諸軍事十二月丁亥立為皇太弟帝以清河王覃本太子也懼不敢當典書令廬陵修肅曰二相經營王室志寧社稷儲二之重宜歸時望親賢之舉非大王而誰清河幼弱未允衆心是以既升東宮復贊藩國今乘輿播越二宮久曠常恐氐羌飲馬於涇川蟻暟衆控弦於灞水宜及吉辰時登儲副上翼大駕早寧東京下允黔首顒顒之望帝曰卿吾之宋昌也乃從之光熙元年十一月孝惠帝崩羊皇后以於太弟為嫂不得為太后催清河王覃入已至尚書閣侍中華混等急召太弟癸酉即皇帝位大赦皇后羊氏為惠皇后居弘訓宮追尊所生太妃王氏為皇太后立妃梁氏為皇后十二月南陽王摸殺河間王顒於雍谷永嘉元年春正月癸丑朔大赦改元除三族刑以太傅東海王越輔政二月辛已東萊人王彌起兵反寇青徐二州三月庚午立豫章王詮為皇太子辛未大赦庚辰東海王越出鎮許昌五月馬牧帥汲桑聚衆反叛魏郡太守馮嵩遂陷鄴城害新蔡王騰燒鄴宮火旬日不滅入掠平原山陽公劉秋遇害洛陽步廣里地陷有二鵝出色蒼者沖天白者不能飛秋七月己酉朔東海王越進屯官渡以討汲桑己未以平東將軍琅琊王睿為安東將軍都督楊州江南諸軍事假節鎮建鄴八月己卯朔撫軍將軍荀晞音希敗汲桑於鄴十二月戊寅并州人田蘭薄盛等斬汲桑于樂陵東海王越矯詔囚清河王覃于金墉城癸卯越自為丞相以撫軍荀晞為征東大將軍二年春正月丙子朔日有蝕之丁未大赦二月辛卯清河郡王覃為東海王越所害冬十月甲戍劉元海僣帝號於平陽仍稱漢三年三月丁巳東海王越歸京師乙丑勒兵入宮於帝側收近臣中書令繆播帝舅王延等十餘人並害之大旱江漢河洛皆竭可涉九月景寅劉聰寇浚儀遣平北將軍曹武討之丁丑王師敗績東海王越入保京城聰至西明門越禦之戰於宣陽門外大破之使車騎將軍王堪平北將軍曹武討劉聰王師敗績堪奔還京師劉聰攻洛陽西明門不剋冬十一月石勒陷長樂安北將軍王斌遇害因屠黎陽乞活師李惲薄盛等帥衆救京師聰退走惲等又破王彌于新汲四年十月壬子以驃騎將軍王浚為司空平北將軍劉琨為北平大將軍京師飢東海王越羽檄徵天下兵帝謂使者曰為我語諸征鎮若今日尚可救後則無逮矣時莫有至者十一月甲戍東海王越帥衆出許昌以行臺自隨宮無復守衛茺饉日甚殿內死人交橫府寺營署並掘塹自守盜賊公行桴鼓之音不絶越軍次項自領豫州牧鎮東將軍周馥表迎大駕遷都壽陽越使裴頠討馥為馥所敗走保東城請救於琅琊王睿五年春正月帝密詔荀晞討東海王越罪狀告方鎮討之以征東大將軍荀晞為大將軍景子東海王越薨五月進司空王浚為大司馬琅琊王睿為鎮東大將軍東海王越之出也使河南尹潘滔居守大將軍荀晞表遷都倉垣帝將從之諸大臣畏滔不敢奉詔且宮中及黃門戀資財不欲出至是飢甚人相食百官流亡者十八九帝召群臣會議將行而警衛不備帝撫手歎之曰如何曾無車輿乃使司徒傅祇出詣河陰修理舟楫為水行之備朝士數十人導從帝步出西掖門至銅駝街為盜所掠不得進而還六月癸未劉曜王彌石勒同寇洛川王師頻為賊所敗死者甚衆庚寅司空荀藩光祿大夫荀組奔轘轅太子左率溫夷夜開廣莫門奔小平津丁酉劉曜王彌入京師帝開華林園門出河陰藕池欲幸長安為曜等所追及曜等遂焚燒宮廟辱妃后吳王晏竟陵王楙音茂尚書左僕射和郁等皆遇害百官士庶死者三萬餘人帝蒙塵於平陽劉聰以帝為會稽公荀藩移檄州鎮以琅琊王為盟主豫章王端東奔荀晞晞立為皇太子自領尚書令且置官屬保梁國之蒙縣百姓飢米斛萬餘價八月劉聰使子粲攻陷長安太尉征西將軍南陽王模遇害長安遺人四千餘家奔漢中九月癸亥石勒襲陽夏至于蒙縣大將軍荀晞豫章王端並沒于賊六年春正月帝在平陽九月辛已前雍州刺史賈匹討劉粲於三輔走之關中小定乃與衛將軍梁芬京兆太守梁綜共奉秦王業為皇太子於長安七年春正月劉聰大會使帝著青衣行酒侍中庾珉號哭聰惡之丁未帝遇弒崩于平陽在位七年時年三十晉陽秋曰懷帝天姿清劭少有聲名若遭承平之世足為守文佳主而繼惠帝擾亂之後東海專政祿去王室無幽厲之釁而有犬戎之禍悲夫愍皇帝晉書曰愍皇帝諱鄴字彥旗武帝孫吳孝王晏之子也出繼伯父秦獻王東襲封秦王永嘉二年拜散騎常侍撫軍將軍及洛陽傾覆避難於滎陽密縣與舅荀藩荀組相遇自密南趣許穎豫州刺史閻鼎與前撫軍長史王毗司徒長史劉疇中書郎李昕及藩組等同謀奉帝歸于長安而疇等中塗復叛鼎追殺之藩組僅而獲免鼎遂扶帝乘牛車自宛趣武關歸於長安頻遇山賊士卒亡散次于藍田鼎告雍州刺史賈匹匹遽遣州兵迎衛達于長安又使輔國將軍梁綜助守時有玉龜出霸水神馬鳴城南元年九月辛巳奉秦王為皇太子登壇告類建宗廟社稷大赦加匹征西將軍以秦州刺史南陽王保為大司馬賈匹討賊張連遇害衆推始平太守麴允領雍州刺史為盟主承制選置建興元年夏四月景午奉懷帝崩問舉哀成禮壬申即皇帝位大赦改元以衛將軍梁芬為司徒雍州刺史麴允為使持節領軍將軍録尚書事京兆太守索綝為尚書右僕射五月詔琅琊王曰朕以沖昧纂承洪緒未能梟夷凶逆奉迎梓宮枕戈煩冤肝心抽裂前得魏浚表知公帥先三軍已據壽春傳檄諸侯協齊威勢想今漸進已達洛陽涼州刺史張軌乃心王室連旗萬里已到汧隴梁州刺史張光亦遣巴漢之卒屯在駱谷秦川驍勇其會如林間遣使適還具知平陽定問云幽并隆盛餘胡衰破然猶恃險當須大舉未知公今所到是以息兵秣馬未便進軍今為已至何許當須來旨使乘輿自出會除中原也公宜思引謨猷勗濟遠略使山陵旋反四海有賴故遣殿中都尉劉蜀蘇馬等具宣朕意公茂德昵屬宣隆東夏恢融六合非公而誰但洛都陵廟不可空曠公宜鎮撫以綏山東右丞相當入輔弼追蹤周邵以隆中興也二年秋七月劉曜趙舟等又逼京都領軍將軍麴允討破之四年七月劉曜攻北地麴允帥步騎三萬救之王師不戰而潰北地大守麴昌奔于京師曜進至涇陽渭北諸城悉潰建威將軍曾充散騎常侍梁緯少府皇甫陽等皆死之八月劉曜逼京師內外斷絶鎮西將軍焦嵩平東將軍宋哲始平太守笁恢等同赴國難麴允與公卿守長安小城以自固散騎常侍華輯監京兆馮翊弘農上洛四部兵東屯霸上鎮軍將軍胡嵩帥城西諸郡兵屯遮馬橋並不敢進冬十月京師飢甚米斗金二兩人相食死者太半太倉有麴數十餅麴允屑為粥以供帝至是復盡帝泣渭允曰今窘厄如此外無救援死於社稷是朕事也然念將士暴離斯酷今欲聞城未陷為羞死之事庶令黎元免屠爛之苦行矣遣書朕意決矣十一月乙未使侍中宋敞送箋於曜帝乘羊車肉袒銜壁輿櫬出降群臣號泣攀車執帝之手帝亦悲不自勝御史中丞吉朗自殺曜焚櫬受壁使宋敞奉帝還宮初有童謠曰天子何在豆田中時王浚在幽州以豆有藿殺隱士霍原以應之及帝如曜營營實在城東豆田壁辛丑帝蒙塵於平陽麴允及群官並從劉聰假帝光祿大夫懷安侯壬寅聰臨殿帝稽首于前麴允伏地慟哭因自殺五年春正月帝在平陽庚子虹霓彌天三日並照平東將軍宋哲奔江左十一月劉聰出獵令帝行車騎將軍戎服執戟為導百姓聚而觀之故老或歔欷流涕聰後因大會使帝行酒洗爵反而更衣又使帝執蓋晉臣在座多失聲而泣尚書郎辛賓抱帝慟哭為聰所害十二月戊戍帝遇弒崩于平陽在位五年時年十八帝之繼皇統也屬永嘉之亂天下崩離長安城中戶不盈百墻宇頽毀蒿棘成林朝廷無車馬章服唯桑板署號而已衆唯一旅公私有車四乘器械多闕運饋不繼巨猾滔天帝京危急諸侯無釋位之志征鎮闕勤王之譽故君臣窘迫以至殺辱東晉元皇帝晉書曰元皇帝諱睿字景文宣帝曾孫琅耶恭王覿之子也咸寧二年生於洛陽有神光之異一室盡明所藉藁如始刈及長白毫生於日角之左隆準龍顏目有精曜顧眄煒如也年十五嗣位琅耶王幼有令問惠皇之際王室多故每恭儉退讓以免于禍沉敏有度量不顯灼然之迹故時人未之識焉唯侍中嵇紹異之謂人曰琅耶王毛骨非常殆非人臣之相元康二年拜員外散騎常侍纍遷左將軍從討成都王穎蕩陰之敗叔父東安王繇為頴所害帝懼禍及將出奔其夜月正明而禁衛嚴警無由得去甚窘迫有頃雲霧晦冥雷雨暴至徼者皆弛因得潛出頴先令諸關無得出貴人帝既至河陽為津吏所止從者宋典後來以策鞭帝馬而笑曰舍長官禁貴人汝亦被拘耶吏乃聽過至洛陽迎太妃歸國東海王越之收兵下邳也假帝輔國將軍尋加平東將軍都督楊州諸軍事越西迎大駕留帝居守永嘉初用王導計始鎮建業以顧榮為軍司馬賀循為參佐王敦王導周顗音擬刀協等為腹心股肱賓禮名賢存問風俗江東歸心焉及懷帝蒙塵于平陽司空荀藩等移檄天下推帝為盟主愍帝即位加左丞相歲餘進位丞相大都督中外諸軍事建武元年春二月辛已平東將軍宋哲至宣愍帝詔曰時遭屯否皇綱不振朕以寡德奉承洪緒不能祈天永命紹隆中興至使凶胡敢帥犬羊逼迫京輦朕今幽塞窮城憂慮萬端恐一旦崩潰卿指詣丞相具宣朕意使攝萬機時據舊都修復陵廟以雪大恥三月帝素服出次舉哀三日西陽王義及群僚參佐州郡牧守等上尊號帝不許義等以死固請至于再三帝慨然流涕曰孤罪人也唯有蹈節死義以雪天下之恥庶贖鈇鉞之誅吾本琅耶王諸賢見逼不已乃呼私奴命駕將反國群臣乃不敢迫請依魏晉故事為晉王許之辛卯即王位大赦改元太興元年春正月戊申朔臨朝懸而不樂三月癸丑愍帝崩問至帝斬縗居廬景辰百寮上尊號即皇帝位詔曰昔我高祖宣皇帝誕膺期運廓開王基景文皇帝奕世重光緝熙諸夏爰暨世祖應天順時受茲明命功格天地仁濟宇宙昊天不融降此鞠凶懷帝短世越去王都天禍荐臻大行皇帝崩殂社稷無奉肆群后三司六事之人疇咨庶尹至于華戎致輯大命于朕躬豫一人畏天之威罔弗敢違遂登壇南面受終文祖燔柴頒瑞告類上帝惟朕寡德纘戎洪緒若涉大川罔知攸濟惟恭股肱爪牙之佐文武熊羆之臣用能弼寧晉室輔豫一人思與萬國共茲休慶於是大赦改元庚午立太子紹為皇太子永昌元年春正月乙卯大赦改元戊辰大將軍王敦舉兵於武昌以誅劉隗為名龍驤將軍沈充帥衆應之三月徵征西將軍戴若思鎮北將軍劉隗還衛京都劉隗軍于金城右將軍周札守石頭帝被甲徇六師於郊外遣平南將軍陶侃領江州安南將軍甘卓領荊州各帥所統以躡敦後夏四月敦前鋒攻石頭周札開城應賊奮威將軍侯禮死之敦據石頭戴若思劉隗帥衆攻之王導周顗郭逸虞潭等三道出戰六軍敗績尚書令刀協奔于江垂為賊所害鎮北將軍劉隗奔于石勒帝遣使謂敦曰公若不忘本朝於此息兵則天下尚可安也如其不然朕當歸于琅耶以避賢路辛未大赦敦自為丞相都督中外諸軍録尚書事封武昌郡公邑萬戶十一月已丑帝崩于內殿在位六年時年四十七葬平陵廟號中宗孫盛晉陽秋曰昔秦始皇東遊望氣者云五百年後東南金陵之地有天子氣於是始皇改曰秼陵吳人以為孫權帝之表也盛案始皇遊歲至權僣號四百三十七年考之年數既不合校之基守又非倫豈應帝王之符而見兆於上代乎有晉金行奄君四海金陵之祥其在斯乎且秦政東遊至是五百二十六年所謂五百年之後當有王者也又孫皓將亡吳郡臨無湖一夜草木自除于湖邊得石函中有小石青白色長四尺廣二寸餘上有白帝字時人莫察其祥意者豈中宗興五湖之徵歟太康三年建業有寇餘姚人任振以周易筮之曰寇已滅矣後三十八年楊州當有天子又太安中童謠曰五馬浮渡江一馬化為龍永嘉大亂王室淪覆唯琅耶西陽汝南南頓彭城五王獲濟至是中宗登祚先是歲鎮鎮辰太白四星聚於牛斗之間五鐸又見于晉陵置數玄感若合符契焉又初玄石圖有牛繼馬後故宣帝深忌牛氏遂為二榼共一口以貯酒帝先飲佳者以毒者鴆其將牛金而恭王妃夏氏通小吏牛欽而生元帝亦有符云世説曰元帝始過江謂顧驃騎曰寄人國事志常懷慚策跪答曰臣聞王者天下為家是以耿毫無定處九鼎後洛邑願陛下無以遷都為念又曰元帝正會引丞相王導登御床王公既固辭中宗引之彌苦文獻曰使太陽與萬物同暉臣下何以仰瞻明皇帝晉書曰明皇帝諱紹字道畿元皇帝長子也幼而聰哲為元帝所寵異年數歲嘗坐置𣍿前屬長安使來因問帝曰汝謂日與長安孰遠對曰長安近不聞人從日邊居然可知也元帝異之明日宴群寮又問之對曰日近元帝失色曰何乃異間者之言對曰舉目則見日不見長安由是益奇之建興初拜東中郎將鎮廣陵元帝為晉王及即帝位為皇太子性至孝有文武才略永昌元年閏月已丑元帝崩庚寅太子即皇帝位大赦尊所生荀氏為皇太后大寧元年三月戊寅朔改元臨軒停饗宴之禮懸而不樂二年夏五月王敦矯詔拜其子應為武衛將軍兄含為驃騎大將軍帝所親信常從督公乘雄冉曾並為敦所害六月敦將舉兵內向帝密知之乃乘巴滇駿馬微行至于湖陰察敦營壘而出軍士疑帝非常人又敦晝寢夢日環其城驚起曰此必黃鬚鮮卑奴來也帝母荀氏燕代人帝狀類外氏鬚黃敦故為帝云於是使五騎物色追帝帝亦馳去僅以獲免秋七月壬申朔敦遣其兄含及錢鳳周撫鄧嶽等水陸五萬至于南岸南溫嶠移屯水北燒朱爵桁以挫其鋒帝躬帥六軍出次南堂至癸酉夜募壯士遣將軍假秀中軍司馬曹渾左衛參軍陳嵩鍾寅等甲卒千人渡水掩其未備平旦戰於越城大破之斬其前鋒將何康王敦憤惋而死三年春二月戊戍復三族刑唯不及婦人三月戊辰立皇太子衍為皇太子大赦增文武位二等大酺三日賜鰥寡孤獨帛閏八月壬午帝不豫召太宰西陽王義司徒王導尚書令卞壺車騎將軍郤鑒護軍將軍庾亮領軍將軍陸曄丹陽尹溫嶠並受遺詔輔太子戊子帝崩于東堂在位三年時年二十七葬武平陵廟號肅祖晉陽秋曰明帝文武鑒斷初在東宮敬禮賢士昵近明德自王導庾亮溫嶠桓彝阮放皆見親待分好綢繆雅好辭章談論辨明理義與二三君子并著詩論粲然可觀于時東宮號為多士王敦既平思求民瘼詔尚書令僕射尚書曰吾飢於餐直言渴於求亮正想諸君達此懷矣豫違汝弼堯舜之相君臣吾雖虛暗庶不距逆耳之談稷契之任諸君居之矣望共勗之世説曰晉明帝欲起池臺元帝不許之明帝為太子好養武士夕中作池比曉便成即令謂太子池是也成皇帝晉書曰成皇帝諱衍字世根明帝長子也大寧三年三月戊辰立為皇太子閏月戊子明帝崩己丑太子即皇帝位大赦增文武位二等賜鰥寡孤老帛人二匹尊皇后庚氏為皇太后秋七月癸卯皇太后臨朝稱制咸和元年春二月丁亥大赦改元大酺五日賜鰥寡孤老米人二斛二年十一月豫州刺史祖約歷陽太守蘇峻等反十二月辛亥蘇峻使其將韓晃入姑孰屠蕪湖三年二月庚戍峻至于蔣山假領軍將軍卞壺節六師及峻戰于西陵王師敗績景辰峻攻青溪柵因風縱火王師又大敗尚書令領軍將軍卞壺丹陽尹羊憲黃門侍郎周導廬江太守陶瞻並遇害死者數千人庾亮又敗于宣陽門內遂攜其諸弟與郭默趙裔奔尋陽於是司徒王導右光祿大夫陸曠荀嵩等衛帝於太極殿太常孔愈守宗廟賊乘勝麾戈接於帝座突入太后後宮左右侍人皆見掠奪是時太官惟有燒餘米數石以供御膳百姓號泣震響都邑丁巳峻矯詔大赦又以祖約為侍中太尉尚書令自為驃騎將軍録尚書事五月乙未峻逼遷天子于石頭帝哀泣升車宮中慟哭峻以倉屋為宮九月戊申司徒王導奔于白石庚午陶侃使督護楊謙攻峻于石頭溫嶠庾亮陳于白石竟陵太守李陽拒賊南偏峻輕騎出戰墜馬斬之衆遂大潰賊黨後立峻弟逸為帥四年二月大雨霖丙戍諸軍攻石頭李陽與蘇逸戰于柤浦陽軍大敗建威長史滕含以鋭卒擊之逸等大敗含奉帝御于溫嶠舟群臣頓首號泣請罪丁亥大赦時大兵之後宮闕灰燼以建平園為宮甲午蘇逸以萬餘人自延陵湖將入吳興乙未將軍王允之及逸戰于漂陽獲之咸康元年春正月庚午朔帝加元服大赦改元增文武位一等大酺三日賜鰥寡孤獨不能自存者米人五斛二月楊州諸郡飢遣使賑給八年夏六月庚申帝不豫詔曰朕以眇年獲嗣洪緒託于群公之上於茲十有八年未能闡融政道翦除逋祲夙夜戰兢匪遑寧處今遘疾殆不興是用震悼子厥心年齡眇眇未堪艱難司徒琅耶王嶽親則母弟體則仁長君人之風允塞時望肆爾群公卿士其輔之以袛奉祖宗明祀協和內外允執其中嗚呼敬之哉旡墜祖宗之顯命壬辰引武陵王晞會稽王昱中書監庾水中書令何充尚書令諸葛恢受顧命癸已帝崩于西堂在位十七年時年二十二葬興平陵廟號顯宗
