body:
  text: 河北諸山大伾山隋圖經曰大伾山按書云至于大伾又名青檀山今名黎陽東山劉澄山川記云黎國也詩云黎侯寓于衛衛以中露泥中二邑處之以國名也又張揖云成皋山是大伾山即謬矣枉人山隋圖經曰枉人山俗名上陽三山或云紂殺比干於此山因得名古凡伯國之地也鮒鰅山山海經曰鮒鰅山顓頊葬其陽九嬪葬其陰四虵衛之鮒鰅山者蓋今廣陽山之別名也郡國志曰顓頊所葬俗名青冢山焉天門山水經注曰天門注曰謂之百家巖下可容百家故以為名山有石穴狀如門纔得通人自平地東南入便至天井蘇門山十道志曰蘇門山一曰蘇嶺俗又名五巖山魏氏春秋云即阮籍見孫登長嘯有鳳皇集登隱之處故號登為蘇門先生萬谷根山郡國志曰晉陽萬谷根山即羊腸坂也皇甫謐云羊腸塞在龍山西即晉陽西北古西河上郡關於此隋煬帝大業四年經此幸汾陽改名深谷嶺十二州志云晉陽有羊腸蟠曲在其西北九十里也又隋國經曰失山去萬谷根山二十里頭上有石墟魏太武避暑之所羊腸坂在焉郡山後魏興國土地記曰太原郡山有石室方丈四尺四壁有篆字人莫之識嬰山隋圖經曰嬰山為并州之主牢山又曰牢山在太原縣東北後魏書劉聰遣子粲襲據晉陽猗廬救之遂獵于受陽年山陽閱皮肉山為之赤也介山并州記曰介山一名橫嶺左傳僖二十四年晉侯賞從亡者介之推不及祿遂與母階隱而死晉侯求不獲以綿上田封之以志吾過且旌人杜注曰西河介休縣南有地名綿上也靜巖山郡國志曰靈石縣有靜巖山在東北二十里即太岳也下有五龍泉即文公封推綿上之田是也風山水經注曰河水南經比屈縣故城西十里有風山上有穴如輪風氣蕭瑟習常不止當其衝飄也而略無生草蓋常不定眾風之門故也管涔山水經注曰管涔山汾水所出土人亦云箕管山見多管草或以為名又為管字前趙錄云劉元海族子曜嘗隱避於管涔之山夜忽有二童子入跪曰管涔王使小臣奉謁趙皇帝獻劍一口置前再拜而去以燭視之劍長二尺光輝非常背有名云神劍服御除眾毒曜遂服之隋時變為五色也又有三城堆故縣城於此置也又有汾陽宮隋大業四年置隋末廢也又有汾水出山陽山海經云管涔之山汾水出焉西流至于河十二州記云汾水出周武縣之燕京山蓋管涔之異名也五臺山水經注曰五臺山其山五蠻巍然故曰五臺晉永嘉三年鴈門郡人五百餘家避亂入此山見山中人為先驅因而不返遂寧巖野往還之士稀有望見其村居者至詣尋訪莫知所在故俗人以為仙者之都矣中臺之山山頂方三里西北陬有一泉水不流謂之太華泉蓋五臺之層秀仙經云此山名為紫府仙人居之其北臺之山冬夏常冰雪不可居即文殊師利常鎮毒龍之所今多佛寺四方僧徒善信之士多往禮焉謁泉山隋圖經曰西河謁泉山一名隱泉山有石室子夏退居之所水經注曰謁泉山俗云陽雨愆時謁禱是應故得其名懸罋山郡國志曰懸罋山一名龍山亦名結絀山多鮆魚食之不驕晉水出焉又有象山前錄云劉聰征劉琨不克略晉陽踰象山而歸也又汾水自陽曲縣界流入南過晉陽縣晉水從縣南流注之又有洞過水西入于汾晉水下口也又有晉祠水經注曰倨西山枕水有唐叔虞祠水側有涼堂晉川之中最為勝處姚最序行記云高洋天保年中大修樓觀五指山李穆叔趙記曰轑陽東北有五指山巖石孤聳上有一手一足之跡厥大如箕指數俱全又郡國志云北齊宣王遣人量之長七尺又十六國春秋云石勒當生之時此山上草木皆為鐵騎之形紇真山冀州圖經曰紇真山在城東北登之望桑乾代郡數百里內宛然又郡國志云望之數百里內夏恒積雪故彼人語曰紇真山頭涼死雀何不飛去生處樂又有神泉人歌曰紇真山頭有神丹入地千尺絕骨冷是山北十里有白登山元姬山冀州圖經曰元姬山在馬邑後魏書云道武侍人姓李善謳歌死葬此山魏主思之樂府為之曲其曲存焉白登山冀州圖經曰白登山在定襄縣東北漢高所困之處上有臺因山為名火山冀州圖經曰火山在定襄縣西五里水經注曰西溪水源出火山山有火井南北七十步深不見底炎熱上升常若雷之發嚮以草爨之則煙騰火發其山一名熒臺井東五六尺有陽井廣輪與火井相狀熱勢亦同東有火井祠歲時祀之井北百步有東西谷廣十許步南岸下有風穴厥大容人其深不測而穴中肅肅常有微風雖三伏亦凜列三山隋圖經曰河東都三山即舜所耕歷山也禹貢所謂壺口雷首至于太岳壺口山在慈州太岳在晉州雷首在河東界此山有九名謂歷山首山薄山襄山甘棗山渠豬山獨頭山陑山等名又湯伐桀升自陑之所稷山隋圖經曰稷山在綘郡后稷播百穀於此山亦左氏傳謂晉侯治兵於稷以略狄土是此也後魏曰高涼山隋以後又為稷山霍山隋圖經曰霍山在洪洞縣東北霍水出焉水經注云發源成潭潭闊七十步而不測其深爾雅云霍山之珠玉焉又有聖人崖崖有七穴相通又水經云霍山北有雀鼠谷中道險左右柱結成偏梁閣道累石成路俗謂之魯班橋也平山隋圖經曰平山在平陽一名壺口山尚書謂壺口治梁及歧即此地也今名姑射山在縣西平水出其下又山海經云憲山之南三百里有姑射山冀州圖經云西入文成郡以山為界又莊子云堯見姑射神人杳然喪其天下即是此山也發鳩山山海經曰上黨發鳩山多柘木有鳥狀如烏而文首白喙赤足名曰精衛其鳴自相呼云炎帝女東遊溺海化鳥今猶銜石以填之抱犢山道書福地記曰抱犢山在上黨東南高七丈有石城高十丈方一里東南角有草名玉照下枝冬生花高五六尺味頗甘取其末服之方寸匕日三不饑宜五穀多食物無惡毒寇賊不至玉匱云抱犢山東北去恒山之南數百里云南有穴行三百里出美陽縣西七十里名洞口又隋圖經曰卑山今名抱犢山四面危絕山頂有二泉後魏葛榮亂百姓抱犢上山因以名之也房山隋圖經曰房山嶺上有王母祠甚靈俗號為王母山後漢書曰章帝永和三年幸趙祠房山即謂此山也在縣西北十里濊水出焉亦謂石臼水又謂之鹿水出行唐東入博陵謂之木刀溝一謂袈裟水又從此過石童山南流入滹沱河前燕慕容雋時房山王母祠前大樹自拔根下得玉圭壁八十三顆光色稍苛雋以為岳神之命以太牢祭之每祀有一虎來往祠側性頗馴狎而不害於物韓信山隋圖經曰韓信山圓峻俗呼為韓信臺又乎為土門口西入井陘即向太原路是此也又有韓信城信破趙駐軍於此湯山山海經曰湯山湯水出焉此湯能愈疾為天下最又按隋圖經云湯後側巖上有石室一戶無塵穢俗號曰聖人室下經銅鳥廟有碑題云漳河神壇是也干山言山李公緒記曰柏仁縣有干山言山衛詩云出宿于干飲餞于言是此也黑山九州要記曰墨子昔居汲郡黑山採茯苓餌五百歲或老或少又魏志漢獻帝初平二年黑山賊為毒自統睦固等十萬餘眾以掠魏郡也又云一名青山列仙傳曰犢子鄴人在黑山常牽一黃犢來過鄴城沽酒陽都女見悅之遂留相奉都女生死連眉即此者也土地十三州志云黑山險為逋逃幽藪隋區宇圖志云周太祖諱黑因改黑山為青山也雷公山隋圖經曰雷公山耆老傳曰魏時黑山群盜張燕等不立君長直以名號為稱多髯者謂之羝公大聲者謂之雷公時雷公賊保此山因以為名鼓山隋圖經曰鼓山亦名塗山宋永初古今山川記云鼓山如石鼓形二所南北相當二鼓相去十里冀州圖經云鄴城西有石鼓鼓自烏即有兵魏都賦云神誕召於高巒是也高齊末此鼓鳴未幾云鄴城有兵而齊滅隋文季年又鳴聞數百里也隆慮山隋圖經曰隆慮山一名林慮蓋隋縣西二十里山有三峰南第一峰名仙人樓高五十丈下有黃花谷北巖出瀑布水注成池黃花谷西北有洞穴去地十餘仞下有小山孤竦謂之玉女臺高九百丈其山北一峰名舉峰其北有偏橋即抱犢因也南接大行北連恒岳又按顏脩內傳曰橋順字仲產有二子曰璋曰琮師事仙人盧子基於隆慮山栖霞谷教二子清虛之術服飛龍藥一九千年不飢魏文帝詩曰西山有雙童不飲亦不食謂此也鮮卑山隋圖經曰鮮卑山在柳城縣東南崔鴻十六國春秋慕容廆先代君遼左號曰東胡其後雄昌與勾奴爭盛秦漢之際為匈奴所敗分保鮮卑山因復以山為號也棘城之東塞外又有鮮卑山在遼西之西北一百里與此異山而同號大碣石山地理志曰大碣石山在右北平驪城縣西南王莽改曰碣石也漢武帝亦常登之以望巨海而勒其石今於此枕海有石如埇道數十里當山頂有大石如柱形往往而見立於海之中潮水大至及潮波退不動不沒不知深淺世名之天橋柱也狀若人造亦非人力所就韋昭亦指此以為碣石也白狼山郡國志曰白狼山一曰鹿首山魏武於此逢師子處事具獸部鳴雞山隋圖經曰鳴雞山在懷戎縣東北本名磨笄山昔趙襄子殺代王其夫人曰代已亡矣吾將何歸遂磨笄於山而自殺代人憐之為立祠焉因名其山為磨笄山每夜有野雞群鳴於祠屋上故亦謂為鳴雞山歷山後魏輿地圖風土記曰潘城西北三里有歷山形似覆釜故以名之其下有舜祠瞽叟祠存焉川喬山山海經曰川橋山有黃帝祠大荒內有軒轅臺射者不敢西向畏軒轅故也梁湘東王臨終詩云寂寥千載後誰畏軒轅臺大翮山小翮山山海經曰大翮山小翮山有王仲廟仲字次仲年小入學而遠常先到其師怪之謂不歸使人候焉實在家等輩常見次仲捉一小棘木長三尺餘至著屋間欲取輒不見及年弱冠變蒼頡舊文為今隸書秦始皇時官務繁多次仲為文簡略赴急用之大嘉使徵不至始皇大怒詔檻車送之次仲吟詠化為大鳥出車外翮然高飛徘徊長引至于西門山落二翮因名之也飛龍山隋圖經曰飛龍山又名封龍山十六國春秋前趙錄云王俊遣祁弘率鮮卑討石勒戰於飛龍山下勒師大敗酈元水經注云汶水東經飛龍山北又趙記云每歲有疾風雹雨東南而行俗傳此山神女為東海而三石人猶存衣冠全具其北即張耳故墟耳無終山隋圖經曰無終山一名步陰山又名翁同山神仙傳云仙人白仲理者遼東人也隱居無終山中合神丹又於山中作金五千斤以救百姓即此山也又水經云翁伯周末避亂適無終山山前有泉水甚清夏嘗澡浴得玉藻架一雙於泉側又搜神記云無終山又有陽翁玉田昔雍伯雒陽人父母終葬於無終山山高八十里上無水雍伯置飲有人就飲與石一升令種之後玉生得白壁五雙娉北平徐氏遂家焉燕山隋圖經曰燕山在易縣東南七十里巖側有石鼓去地百餘丈望之若數百石囷左右梁貫之鼓東南有石人援桴之狀同擊勢云燕山石鼓鳴則有兵龍山隋圖經曰龍山在易縣西南三十里有龍山石上往往有仙人及龍跡西麓谷有一坑大如車輪春則風出東夏出南秋出西冬出北有沙門法猛以夏日入其東穴見石堂石人欲窮諸穴便有一人厲聲云法師有滯三穴皆如東者不宜仍來見穢猛仍意不息不覺忽在穴外也孔山水經注曰易水東經孔山北又隋圖經云孔山有孔表裏通徹故名爾
