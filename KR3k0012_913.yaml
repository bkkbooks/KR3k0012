body:
  text: 獸部二十四貍爾雅曰狸子𧳙余至切說文曰狸伏獸也禮曰狸首之班然又曰狸去正脊魏志曰清河令徐季龍使人獵令管輅筮其所得輅曰當獲小獸雖有爪牙微而不疆雖有文章蔚而不相非虎非雉其名曰狸獵人暮歸果如輅言晉書曰樂廣為河南尹先是河南官舍多妖怪前尹皆不敢處正寢廣居之不疑嘗外戶自閉左右皆驚廣獨曰顧見牆有孔使人掘牆得貍而殺之其怪亦絶唐書曰武弘度士彠兄子也父卒廬于墓側晨夕哀號有野貍每至弘度齊時必來求食往來馴狎無驚懼時以為孝感玄中記曰鉛錫之精為狐狸子思子曰謂狐為狸者非直不知貍也忽得狐復失貍者也琴操曰曾子鼓琴墨子立外而聽之曲終入曰善哉鼓琴身已成矣而曾未得其首也曾子曰吾晝臥見一貍見其身而不見其頭起而為之弦因曰殘形操淮南子曰貍頭似鼠以類推也許慎曰狸食鼠又曰狸頭止癙癙寒熱病也雞頭止瘻抱朴子曰虎尾不負狸身象牙不出鼠穴本草曰狸肉甘無毒主風濕鬼毒氣皮中如針㓨歸藏曰昔者桀筮伐唐而枚占熒惑曰不吉彼為貍我為鼠勿用作事恐傷其父者也風俗通曰汝陽西門習武亭有鬼魅宿者輒死其厭者皆亡髮北部督郵西平郅伯夷到亭上樓宿誦六甲孝經易本記臥密拔劍解帶夜有正異者四五尺來覆伯夷以劍帶擊魅腳呼下燈照見一老狸正赤略無毛衣持下燒殺明旦發樓屋得所亡髮人百餘因此遂絶神仙傳曰欒巴為豫章太守先是廬山廟中有人言語飲酒投杯音杯能使宮亭湖中分風行者舉帆相逢巴未到十數日廟中神不復作聲不知所在巴到自上表說廟鬼詐稱天官欺損百姓積愆日夕罪當窮治乞以事付功曹臣身行捕逐如不治討恐其復遊行天下所在血食枉病良民責以重禱乃至所在推求山川社稷問鬼蹤跡此鬼乃到齊國為書生齊太守見之既有容美麗又有才辨學識論經說義時在齊人莫不見知太守亦不知是鬼乃以女妻之生一男巴到與太守相見語畢問曰聞卿有一女壻明五經諸子可得相見不太守請女壻詐病辭不出而巴求之不止壻告其婦言吾今日出必死如何女亦怪之不知何以巴知不敢出乃求奏板一枚并筆書符付太守曰以此與賢女壻自當出也女壻得符流涕與婦辭訣而出望見巴即身體已變為狸而面故是人也巴厲聲呵言死狸敢爾何不正汝真形即盡為狸巴復曰斬之亦不斬者而狸頭已斷於地又言取狸子來須臾太守女所生兒已復為狸子即又斬之巴辭還郡搜神記曰博陵劉伯祖為河東太守所止承塵上有神能語常呼伯祖與語及京師詔書告下消息輒預告伯祖伯祖問其所食啖欲得羊肝買羊肝於前切之臠隨刀不見盡兩羊肝有一老狸眇眇在案前持刀者欲舉刀斫之伯祖呼止自與著承塵上須臾大笑曰向者啖肝醉忽失形與府君相見大慚愧後伯祖當為司隸神復先語伯祖云某月某日詔書當到至期如言及入司隸府神隨逐在承塵上輒言省內事伯祖大恐怖語神曰今職在剌舉君左右貴人聞神在此因以相害神答曰誠如府君所慮當相捨去遂即無聲幽明録曰吳興戴眇家僮客姓王有少婦美色而眇中弟恆往就之客私懷忿怒具以白眇中郎作此甚為無理願尊勑語眇以問弟弟大罵曰何緣有此必是妖鬼勑令打殺客初猶不敢後來閉戶欲縛便變成大狸從窗中出又曰董仲舒常下帷獨詠有客來詣語遂移日舒知其非常客又云欲雨仲舒因此戲之曰巢居知風穴居知雨卿非狐狸則是鼷鼠客聞此言色動形壞化成老狐狸也隋王度古鏡記曰大業七年五月余自御史告歸河東適遇侯生卒而得一鏡六月余歸長安宿於主人程雄家新授寄一婢頗稱端麗各曰鸚鵡余整冠履引鏡自照鸚鵡遙見便叩頭流血云不敢住余召雄問其故雄曰兩日前有一客攜婢從東來來時病困因留寄於此不知婢之由也余疑其精魅以鏡逼之遂自陳云本是華山廟前長松下千歲老狸久行變惑罪當至死近為府君捕逐逃潛河渭之間為下邽陳思恭義女思恭妻鄭氏見養恩厚嫁鸚鵡與鄉人柴華意不相愜逃而去東至韓城遂為行人李無慠所執無傲粗人也遂劫鸚鵡遊行至此不意天鏡一照自隱無路然為人已久羞復故形願樂飲而忘形因匣鏡置酒悉召雄家鄰里與共飲宴此婢大醉起舞歌曰寶鏡寶鏡哀哉余命自我離形于今幾姓生雖可樂死不必傷何為眷戀守此一方歌畢化為狸而死述異記曰陳留董逸少時鄰女梁瑩年稚色豔逸愛慕傾魂貽椒獻寶瑩亦納而未獲果後逸鄰人鄭充在逸許宿二更中門前有叩掌聲充臥望之亦識瑩語逸梁瑩今來逸驚躍出迎把臂入舍逸與瑩寢瑩仍求去逸攬持不置申款達旦逸欲留之云為汝蒸㹠作食竟去逸起閉戶絶帳瑩因變形為狸從梁上走去金樓子曰貍不可使棲處牛不可使捕鼠貂說文曰貂鼠屬也大而黃黑色出丁零國廣志曰貂出夫餘關山圖曰霍山南嶽其獸多赤貂東觀漢記曰建武二十五年烏桓詣闕朝賀獻貂皮魏書曰鮮卑有貂豽女滑切鼲音魂子皮毛柔蠕故天下以為名裘魏志曰挹婁國出好貂今所謂挹婁貂是也江表傳曰遼東太守遣使詣孫權送貂皮千枚欲舉國歸吳晉書曰趙王倫篡位至於奴卒廝役亦加以爵位每朝會貂蟬盈坐時為之唁曰貂不足狗尾續異苑曰貂出句麗國常有一物共居穴或見之身貂類人長三尺能制貂愛樂刀子其俗人欲得貂皮以刀插穴口此物夜出皮置刀邊須人持皮去乃取刀隋書曰北室韋其俗以捕貂為業南室韋亦多貂貀說文曰貀獸無前足漢津能捕豺貀購百錢爾雅曰貀無前足郭璞注曰晉太康七年石陵扶夷縣檻得獸似狗貀文有角兩腳即此類也或曰豹似虎而黑無前兩足是也廣雅曰豹貀也唐書曰長慶中河東節度使李聽貢貀三頭貀猛揵之獸也穆宗好畋遊嘗詔諸道廣求此獸搜踐山谷郡縣告勞防虞籠檻甚於豺虎及至林苑往往噬人後穆宗亦盡令逐之及敬宗即位聽復獻之𤟤說文曰𤟤鼠出丁令胡以作裘魏略曰丁靈國出青𤟤子白𤟤子皮江表傳曰魏文帝遣使吳求𤟤皮豹犀群臣以非禮欲不與權勑付使山海經曰獄法之山有獸焉如犬而人面善投見人則笑其名曰𤟤其行如風見則大風山海經圖讚曰山𤟤之獸見乃歡唬厥性善投行如矢激是惟氣精出則風作貓詩曰孔樂韓土有貓有虎爾雅曰虎竊毛謂之虥土盞切貓郭璞注云竊淺也或曰竊毛鹿毛也禮曰古之君子使之必報之迎貓為其食田鼠也迎虎為其食田豕也迎而祭之也尹子曰使牛捕鼠不如貓狌音生之捷北史曰獨狐陀性好左道其外祖母高氏先事貓鬼轉入陀家每以子日夜祠之貓鬼所殺人取其財物置於所事貓鬼家鬼若降人則面正青若被牽曳陀後敗免死唐書曰高宗廢王后令宮人宣勑示后后拜曰但願大家萬歲昭儀長承恩澤死是吾分也良娣承勑罵曰阿武狐媚翻覆至此百千生願得一日為貓阿武為鼠吾扼其喉以報今日即足矣武后聞之不說自是約六宮不許畜貓又曰朱泚軍中有貓乳鼠者泚獻之為祥代宗使中官示於朝宰臣率百僚皆賀崔祐甫獨否中官詰其故答曰此之失常也可吊不可賀中官徵其狀祐甫立草之略曰禮云迎貓為其食田鼠也以能除害故列祀典今反乳之是謂失常且貓受人食養而棄職不修亦何異法吏不勤觸邪疆吏不勤捍敵是天將垂戒故不敢賀衆皆伏代宗嘉其正直獺禮記月令曰孟春之月獺祭魚然後虞人入澤梁說文曰獺如小狗水居食魚偏音編獺屬也遁甲開山圖曰霍山光南嶽其獸多柴獺山邊水故有柴獺淮南子曰愛獺而飲之酒欲養之非其道言獺飲酒而敗風土記曰陽羡縣前有大橋下有白獺將有兵動獺出穴口向嗥也魏略曰南蠻皆用獺皮為其冠鹽鐵論曰水有猵音頻獺而池魚勞國有強禦而齊民消也獨曰猵群曰獺如淳博物志曰猵如馬自腰以下似扁蝠毛似獺大可五六十斤淳同鄉人吉孟景福中征遼東時為運船吏於海中有猵獺跳上船船人皆謂海神共叩頭敬禮船左武令人云但魚獺耳可烹而食之神仙傳曰樊夫人者劉綱之妻也俱行道術各自言勝綱於是唾槃中水即作鯉魚夫人乃唾槃中使成獺而食魚綱每共試術事事不如永嘉地記曰濤山至高常有拾橡者見上有大湖又有自然石橋多獺異色鳥獸蝟孝經援神契曰蝟多剌故不使超踰抑揚爾雅曰蝟毛剌淮南子曰鵲屎中蝟爛而漆見蟹不糝淮南萬畢術曰蝟膏塗鐵柔不折華陽國志曰滇池縣有白蝟山無石而多蝟也北齊書曰成帝夢大蝟攻破鄴城故索境內以蝟膏絶之至後主名緯亡齊之徵廣五行記曰梁末蜀人費祕刈麥值暴風雨隱於巖石間避雨去家數里遙見前路有數婦人皆著紅紫襴古莧切衣歌吟而來祕竊怪野外何因有此心異之漸近寂然無聲去祕數步乃各住立少時悉轉向祕看之其面並無七孔唯垂鳥毛而已祕驚怖仆地至二更祕兒怪父不至把火尋覔見祕臥在道傍左側有十餘剌蝟見火即爭散走祕至家百餘日死
