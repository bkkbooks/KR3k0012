body:
  text: 道部十四仙經上仙經曰九轉丹金液經守一訣皆在崑崙五城內藏以玉函書以金札封以紫泥印以中章抱朴子曰余聞鄭君言道書之重者莫過於三皇內文五嶽真形圖古者仙官志人尊祕此道非有仙名者不授也受之四十年一傳傳之訣朱而盟委信為約諸名山五嶽皆以此書但藏於石室幽隱之地應得道者入山精誠思之則山神自開山令人見之如帛仲理者於山中得之是也有此書者當須清潔每有所為必先白之如奉君父其經曰有三皇文者辟邪惡鬼溫疫橫禍又次有玉女隱微一卷可化形為飛龍雜獸金玉木石興致雲雨之類亦大術也其淮南鴻寶萬畢之書不能過也鄭君博極五經知道者也兼綜九宮三棊推步天下河雒與洛同讖緯太和元年知季辰之亂江南將鼎沸負笈將仙藥東入霍山莫所知之又曰家有五嶽真形圖辟惡人不能害又曰黃老玄聖深識獨見開祕文於名山受仙經於神人蹶埃塵以遣纍凌太遐以高躋金石龜鶴與之等壽念有志於將來愍信者之無聞垂以方法炳然著明淺見之徒區區所守甘於蓼而酣於醨知飲食過度而速病而不能節知極情恣欲而致殞而不能割神仙可得安能信乎按仙經以為諸得仙者皆其受命偶值神仙之氣自然所稟故胎育之中已含道性及其有識心好其事必遇明師而得其法不然則不信不求求亦不得夫百年之壽三萬餘日幼弱則未有所知衰邁則歡樂並廢童蒙昏老除數十年而險厄憂病又相尋焉居世之年略銷其半人凡得壽不過五六十咄丁骨切嗟咸盡除哀憂昏耄六七千日耳顧眄已盡況於全百年者萬無一焉諦而念之亦無笑夏蟲朝菌也蓋知道者所至悲也太上太宵琅書曰道本無形應感生象大象無象象妙難明故見真文結空成字又曰大上真人靈寶祕文內符者九天真王三天真皇以授帝譽藏於鍾山北阿夏禹治水畢詣鍾山鍾山真人以授之禹還會稽更撰定為二通一通藏苗山山𥕵須萬年劫會乃出一通絹寫付雲水洞室須甲申期至令與理水傳伯長等又曰吳王闔閭十二年正月使龍威丈人入包山洞庭取之以出有符而無說又齊人樂子長受之於霍林仙人韓衆乃敷演服御之方藏於東海北陰之室太一金液經者按劍經序云高丘子服金液水長史書云欲合金液意皆是此方今有葛洪注是郗愔黃素書又有別訣一卷此亦太清上丹法也登真隱訣曰楊君許長史共書洞房經於小碧箋紙又云篆書白麻紙又曰八素之經是聖君以白素之繒八色之彩筆自書也靈書經曰昔龍漢之年高上大聖以紫筆書空青之林撰出妙經靈寶真文出法度人也金根經曰太陽金童太陰玉女侍紫書上法又曰西華玉女在仙都守衛藏天隱月之經龍飛尺素隱訣云天帝君命羽仙侍郎執金案以請經真誥曰上清九真中經內訣是太極真人赤松子撰又曰華陽中玉碣文云養存三元洞我玉文領理八老二十四真不眠內視此仙之要言也又曰寶神經裴清虛裴真君也錦囊中書也侍者常所帶者裴昔從紫微夫人受此書也又曰玄圃北壇西瑤之上臺也天真祕文盡在其內又曰九華真妃與紫微王夫人南嶽魏夫人同降真妃坐良久乃命侍女發檢囊中出二卷書付楊君一上清玉霞紫映內觀隱書一上清還晨歸童日暉中玄書此是三元八會之書楊君既究識真字令作隸字顯之耳道有八素真經太上之隱書也又有九真中經老君之祕言也黃書亦要長生之訣也青要紫書金根衆文玉清真訣三九素言丹景道精隱地八術白簡青籙紫度炎老此皆道之經也又有飛步七元天綱之經七變神法七轉之經又大洞真經三十九篇太丹隱書八稟十訣天關三圖七星移度九丹變化胎精中記九赤班符封山隧海金液神丹太極隱芝五行祕符曲素辭訣黃水月華佪水玉精水陽青英絳樹青實琅玕華丹天皇象符以合元氣白羽紫蓋以遊五嶽三皇內文以召天地神靈玉佩金璫以登太極素奏丹符以召六甲金真玉光以映天下八景之輿遊行太清飛行之羽以超虛空劉向列仙傳敘曰列仙傳漢光祿大夫劉向所撰也初武帝好方士淮南王安亦招賓客有枕中鴻寶之書先是安謀叛伏誅向父德為武帝治淮南獄得其書向幼而讀之以為奇及宣帝即位修武帝故事向與王褒等以通博有俊才進侍左右向又見淮南鑄金之術上言黃金可成上使向與典尚方鑄金費多不驗下吏當死兄安陽成侯安民乞入國戶半贖向罪上亦奇其材得減死論詔為黃門侍郎講五經於石渠至成帝時向既司典籍見上頗修神仙事遂修上古以來及三代秦漢博採諸家言神仙事穆天子傳曰升崑崙之墟以觀黃帝之宮具齊戒以祀登舂山即玄圃也崑崙之山地方二千里有曾城九重是謂閬風玄圃山海經云明明崑崙玄圃其上穆天子勒銘於玄圃以昭後世天子與王母觴於瑤池之上王母為謠白雲在天於是天子升于崦嵫日入處山也乃紀跡於崦山茅盈傳曰王母謂茅盈曰玉珮金璫之道太極玄真之經能之者皆飛行太虛王母命西城王惣真一一解釋玄真之經又自敷演金璫之經口授於盈曰金璫者上清之華蓋陰景之內真玉珮者太上之隱玄洞飛之寶章得其道者上陟雲漢宴寢太極元始太常之言是太宵二景隱書玉珮金璫之文章也又有陰陽二景內真符與本文相隨太上法惟令授諸司命子玉札玄挺緑字刊金黃映內曜素書上清與當為上卿之君司命之任矣然不先聞明堂玄真之道亦未由得太宵隱書也玄真之道是食日月之法鍊五神之術耳其經曰太上玄玄雙神四明玄真內映明堂外清吞息二暉長生神精上補司命監御萬靈六華充溢徹視黃寧凡四十字太上刻於鳳臺南闕也非惣真弟子而不教非司命之挺而不傳也太上真官用日霞之道挹二景之法使通靈致真體生玉映役命萬神上升帝房昔鍾山真公用此玄真法耳王君乃將盈歸西城依承真訣按而行之三年之中面生玉澤後王君又賜盈九轉還丹及方一首立壇結盟約不得傳泄乃遣令歸告曰復百年求我於南嶽將授汝仙官於吳越盈後得仙居句曲山邦人因改句曲之名為茅君之山時茅君二弟聞盈方信有仙矣棄官而去渡江求兄相見告二弟真訣一十八年道成因使更齊戒三年授以上道使存明堂玄真之氣盈乃啓王君自說二弟得為地仙之法要當受籙佩帶真極之符王君賜玄水玉液絳日丹芝可使二弟齊戒三月而服之盈命颷車與二弟詣青洲請書名金簡而詣西城洞宮朝見惣真上宰次南詣衡山之朱臺謁太虛赤真人歸方諸請地仙二真之策造赤城受真變神符又之羅霍求華旌繡幡又上登九宮詣金闕之下受聖君之書頓首於闕下三月於是聖君命九微太真上相王大司命高晨師青童君使上詣太上請朱冠使者下拜二弟於金闕下授二弟真簡而還又曰神仙經黃白方二十五卷千有餘首然率多深微難知其可解分明者少許耳世人多疑此事為虛誕與不信神仙者正同耳余昔從鄭君受九丹及金液經因復求授黃白中經五卷鄭君言曾與左慈於廬江銅山中試作皆成也然齊潔禁忌之勤苦與合九丹神仙藥無異也俗人多譏余好攻異端謂余欲強通天下之不通若方諸所得水火豈與常水火別哉皆自然之所感致非窮理盡性不能究其指歸非原始要終不能得其情狀成都內史吳太文博達多知亦自說昔事道士李根見根術有所成不得其術令百日齊戒太史文連在官終不能得恆歎息言人間不足處也太真科曰清虛小有天王撰三天一正法經金液經曰太初混元皇經以陳上真絳晨封之玉篋至道之大合符天圖三丹要言太皇所紀祕之玉堂勿傳其旨太真玄丹經刻于清虛之堂太皇君之寶章也命曰紫蘂明珠之丹開元回化混爾而分陰陽屢變其道自然玄圖七轉至九而還大黃首篇是曰玉虛上真保之命曰元經上清洞真玉經曰太上八景章皆刻於東華仙臺不宣於世其受帝君九陰訣盟用素絲絳幣此曰暉之誓也其受太上結鄰章盟用碧幣此月華之誓也太一帝君洞真玄經曰有玉女在太上六合紫房之內侍衛太丹隱書馬明生內傳曰靈寶天書封於九天之上大有之宮西華玉女金晨紫童典衛之玉光八景經曰金華之玉晨晨童侍衛玉光八景之經太上黃素經曰凡讀太丹隱書金華洞房及雌一寶章者是能餐味玄真觸類無滯感召太素陟降九真得稱為三元丹法師惣領上真九真中經曰西玄山洞臺中有鬱儀鄰結二經王簡金字玉檢曰青筆書三元玉檢上元檢後太洞經曰西靈玉童在當寒臺侍衛八景玉籙經後聖君列紀曰龜母按筆玉童結編名曰靈書紫文上經三皇經內音曰凡書此內音之符以黃筆為文成篆隸科斗之字記造化人倫之始酆都六宮下制北帝文曰人之死生玉帝刻石隱銘以書六宮北壁制檢群凶又云刻石隱文以未書青繒三尺佩之萬神朝己此玄古之道也又云酆都山洞中玉帝隱銘凡九十一言刻石書酆都山洞天六宮北壁六宮萬神之靈也又云玉清隱書洞景金玄之章刻石隱銘此音發於自然之篇九天玉章其詞幽奧非始學凡夫所可竟通非大帝下降不得演究此銘也又多根經云凡修金玄當珮隱銘玉帝七聖玄記曰列名上清者皆刻注於玄圃得為太平之真也故太上誥命記乎玉文非以簡札翰墨所能宣也玉清隱書曰玄羽玉郎以玄羽玉經授太素三元高上玉賢之賓又日景玉童在靈景之闕瓊霞之房侍衛上皇玉惠玉清之隱書
