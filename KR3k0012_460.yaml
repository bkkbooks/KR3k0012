body:
  text: 人事部一百鑒戒下鬻子曰昔周公使康叔守商戒之曰無殺不辜寧失有罪亦有無罪而見誅亦有有功而不賞慎之管子曰齊桓公管仲鮑叔牙寧戚飲公曰何不為寡人壽鮑叔牙奉杯而起曰使公無忘在莒管仲無忘束縛於魯寧戚無忘飯牛車下公避席再拜晏子曰夫爵益高者意益下官益大者心益小祿益厚者施益博也又曰君子居必擇鄰遊必就士可以避患也又曰人之將疾必先不甘梁肉之味國之將亡必先思忠臣之語列子曰狐丘文人謂孫叔敖曰人有三怨子知之乎孫叔敖曰何謂也對曰爵高者人妒之官大者主惡之祿厚者患處之孫叔敖曰吾爵益高志益下吾官益大吾心益小吾祿益厚吾施益博以是免三怨可乎莊子曰夫畏途十殺一人則父子兄弟相戒必盛卒而後敢出衽席之上飲食之間而不知為之戒遇也文子曰其文好者身必剝其角美者身見殺甘泉先竭直木必伐荀子曰魯哀公問政於孔子曰寡人生於深宮之中長於婦人之手未嘗知哀未嘗知憂未嘗知勞未嘗知懼未嘗知危孔子曰君之問也丘小人也何以知之曰無吾子無所聞之孔子曰君入廟門而右登自胙階仰見榱棟俯察機筵其器存其人亡君以此思則哀至焉昧爽而櫛冠未明而聽朝一物失所亂之端也君以此思則憂至焉君平明而聽朝日昃而退諸侯之子孫必有在君之庭者君以此思則勞至焉君出魯之四門以望四郊亡國之墟則必有類焉君以此思則懼至焉且丘聞之君者舟也民者水也水能載舟亦能覆舟君以此思則危至焉又曰慶封為亂於齊而將之越其族人曰晉近奚不之慶封曰越遠利以避難族人曰變是心也居晉而安不變是心雖越其可以安乎又曰桓公往問管仲曰仲父有病即有不幸政將遷誰豎刁何如曰不可人情莫不愛其身豎刁自宮而為君治內身之不愛何能愛君公曰衛公子開封何如管仲曰齊衛之間不過十日之行開封事君十年不歸不見父母非人心也父母之不親安能親君公曰易牙何如曰夫易牙為君主味君之所未嘗食唯人肉而易牙蒸首子而進之其子不愛焉能愛君公曰孰可管仲曰隰朋可其為人堅中而廉外少欲而多信堅中足以為表廉外可與大任少欲則能臨其衆多信則能親鄰國此霸王之佐也君其用之管仲死桓公不用隰朋而用豎刀三年桓公南遊堂邑豎刁易牙衛公子開封及大臣為亂桓公餒而死荀子曰伯禽將歸於魯周公謂伯禽曰君子力如牛不與牛爭力走如馬不與馬爭走智如士不與士爭智韓子曰西門豹性急佩韋以自緩董安於心緩佩弦以自急故能以有餘補不足以長續短之謂明至淮南子曰奔車之上無仲尼覆舟之下無伯夷韓子曰天下有至貴而非勢位也有至富而非金玉也有至壽而非千歲也願恕反性則貴矣適情知足則富矣明生死之分則壽矣韓子曰秦昭王謂左右曰今時韓與魏孰強對曰魏強秦昭王曰其無奈寡人何左右皆然中旗伏瑟而對曰王之料天下過矣當六晉之時智氏最強滅范中行氏又率韓魏之兵以圍趙襄子於晉陽決晉水以灌晉陽之城城不沒者三板智伯行水魏宣子御韓康子驂乘智伯曰吾始不知水可以亡國也乃今知之汾水可以灌安邑絳水可以灌平陽魏宣子肘韓康子韓康子履魏宣子之足接於車上而智氏身死國亡為天下笑今秦雖不過智氏韓魏弱尚賢其在晉陽之下也此方其用肘足之時願王勿易也於是秦王恐又曰吳鐸以聲自毀膏燭以明自鑠又曰魏武侯浮西河而下中流謂吳起曰美哉山河之固魏國之寶也對曰在德不在險昔三苗氏左洞庭而右彭蠡德義不修而禹滅之夏桀之居左河濟而右太華伊闕在其南羊腸在其北修政不仁湯放之商紂之國左孟門右太行常山在其北大河經其南修行不德而武王滅之王恃儉而不修德舟中之人盡敵國也武侯曰善說苑曰昔成王封周公周公辭不受乃封周公子伯禽於魯將辭去周公戒之曰去矣子其無以魯國驕士矣我文王之子也武王之弟也今王之叔父也又相天子吾於天下亦不輕矣嘗一沐而三握髮一食而三吐哺猶恐失天下之士吾聞之曰德行廣大而守以恭者榮土地博裕而守以儉者安祿位尊盛而守以卑者貴人衆兵彊而守以畏者勝聰明睿智而守以愚者益博聞多記而守以淺者廣此六守者謙德也夫貴為天子富有四海不謙者先天下亡其身桀紂是也可不慎乎故易曰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙誡之哉子其無以魯國驕士矣又曰春秋有忽然而足以亡者國君不可以不慎也妃妾不一足以亡公族不親足以亡大臣不任足以亡國爵不用足以亡親佞近讒足以亡舉百事不時足以亡使民不節足以亡刑罰不中足以亡內失衆心足以亡外嫚大國足以亡說苑曰田子方侍魏文侯坐太子擊趨而入見賓客群臣皆趨田子獨不起文侯有不說之色太子亦然田子方稱曰為子起與無如禮何不為子起與無如罪何請為子誦楚恭王之為太子也將出之雲夢遇大夫工尹工尹遂趨避家人之門中太子下車從之家人之門中曰子大夫何為其若是吾聞之尊其父者不兼其子兼其子者不祥莫大焉子大夫何為其若是工尹曰向吾望見子之面今而後記子之心文侯曰善太子擊前誦恭王之言而習之又曰孫叔敖為楚令尹一國吏民皆來賀有一父衣鹿衣冠白冠後來弔孫叔敖正衣冠而出見之謂老父曰楚王不知臣不肖使臣受吏民之垢人盡來賀子獨來弔豈有說乎父曰有說身已貴而驕人者民去之位已高而檀權者君惡之祿已厚而不足者患處之孫叔敖再拜曰謹受命願聞餘教父曰位已高而意益下官益大而心益小祿已厚而慎不取君守此三者足以治楚矣說苑曰魏公子牟東行穰侯送之曰先生將去之山東矣獨無一言以教冉乎魏公子曰微君言之牟幾忘語君君知夫官不與勢期而勢自至乎勢不與富期而富自至乎富不與貴期而貴自至乎貴不與驕期而驕自至乎驕不與罪期而罪自至乎罪不與死期而死自至乎穰侯曰善謹受明教說苑曰高上尊貴無以驕人聰明聖智無以窮人資給疾速無以先人剛毅勇猛無以勝人不知則問不能則學雖知必質然後辨之雖能必讓然後為之故士雖聰明聖智自守以愚功被天下自守以讓勇力距世自守以怯富有四海自守以廉此謂高而不危滿而不溢者也說苑曰齊桓公為大臣具酒期以日中管仲後至桓公舉觴以飲之管仲半棄酒桓公曰期而後至飲而棄酒於禮可乎管仲對曰臣聞酒入舌出舌出者言失言失者身棄臣計棄身不如棄酒桓公笑曰仲父起就坐說苑曰常樅有疾者老子往問焉曰先生疾甚矣無遺教可以語諸弟子者乎常樅曰子雖不問吾將語子曰過故鄉而下車子知之乎老子曰過故鄉而下車非謂其不忘故鄉耶常樅曰嘻是已常樅曰過喬木而趨子知乎老子曰過喬木而趨非謂其敬老耶常樅曰嘻是以張其口而示老子曰吾舌存乎老子曰然吾齒存乎老子曰亡常樅曰子知之乎老子曰夫舌之存也豈非以其柔耶齒之亡也豈非以其剛耶常樅曰嘻是以天下之事已盡矣無以復語子哉說苑曰桓公曰金剛則折革剛則裂人君剛則國家滅人臣剛則交友絶夫剛不和不和則不可用是故四馬不和取道不長父子不和其世破亡兄弟不和不能久同夫妻不和家室大凶易曰二人同心其利斷金因不剛也又曰老子曰得其所利必慮其害樂其所樂必顧其敗人為善者天報以福人為不善者天報以禍也故曰禍兮福所倚福兮禍所伏戒之慎之君子不務何以備之夫上知天則不失時下知地則不失財日夜慎之則無害矣太公金匱曰武王問師尚父曰五帝之戒可復得聞乎師尚父曰舜之居民上兢兢如履薄冰禹之居民上栗栗如恐不滿湯之居民上翼翼乎懼不敢息呂氏春秋曰出則以車入則以輦務以自逸命之曰招蹶之機肥肉厚酒務以自強命之曰爛腸之食靡曼皓齒鄭衛之音務以自樂命之曰伐性之斧三者富貴之所致者也新序曰楚恭王有疾召令尹曰常侍苑蘇與我處忠我以義吾與其處不見不思也雖然吾有以得也其功不細必爵之申侯伯與我處吾所樂者勸吾為之吾所好者勸吾服之吾與處不見思之雖然吾終無得也其過也不細必亟遣之令尹曰諾明日王薨令尹即拜苑蘇為上卿而逐申伯出於國諸葛亮集先主遺詔勑後主曰勿以惡小而為之勿以善小而不為唯賢唯德能服於人汝父德薄勿效之讀傳必可讀漢書禮記間暇歷視諸子及六韜商君書益人意知吾終之後汝兄弟父事丞相鄭玄別傳曰玄病困戒子益恩曰吾家舊貧為父母群弟所容去廝役之吏遊周秦之都往來幽並兗豫之役候覲通人大儒得意者咸從捧手有所受焉遂博稽六藝究覽傳記今我告爾以事將間居以安性覃思以終業自非國君之命問親族之憂展孝墳墓觀省野物曷常扶杖出門乎家事大小汝一承之吾煢煢一夫曾無同生相依其勗求君子之道研鑽勿替恭慎威儀以近有德顯譽成於僚友德行立於已志若致聲稱亦有榮於所生耳曹植別傳曰植博學有高才年十餘歲誦詩論及賦十萬言性簡易不事華麗太祖征孫權使植留守鄴戒之曰吾昔為潁令年二十三思此時所行無悔於今今汝年二十三矣可不勉與文士傳曰陸景誡盈曰重臣貴戚隆盛三族莫不羅患搆禍鮮以善終大者破家小者滅身唯金張子弟世履忠篤故能保貴持寵祚鍾昆季其餘禍敗可為痛心東方朔集曰朔將仙戒其子曰明者處世莫尚於中庸優哉遊哉與道相從首陽為拙柱下為工飽食安步以仕代農依隱玩世詭時不逢劉向集誡子書曰告歆謙之無忽若未有異德蒙恩甚厚將何以報董生有云弔者在門賀者在閭有憂則恐懼慎事慎事則必有善功而遺福也蔡雍女誡曰心猶首面也是以甚致飾焉面一旦不修則塵垢穢之心一朝不思善則邪惡入之咸知飾其面不修其心夫面之不飾愚者謂之醜心之不修賢者謂之惡愚者謂之醜猶可賢者謂之惡將何容焉故覽照拭面則思其心之潔也傳脂則思其心之軟也加粉則思其心之鮮也澤髮則思其心之順也用櫛則思其心之理也立髻則思其心之正也攝鬢則思其心之整也蔡雍廣連珠曰臣聞目瞤耳鳴近夫小戒也狐鳴犬嗥家人小祅也猶忌慎動作封鎮書符以防其禍是故天地示異災變橫起則人主恆恐懼而修政魏文帝誡子曰父母於子日雖肝腸腐爛為其掩蔽不欲使鄉黨士友聞其罪過然行之不改久久人自知之用此仕官不亦難乎王修誡子書曰我實老矣所恃汝等也汝今踰郡縣越山河離兄弟去目下者欲令見舉動之宜以觀高人遠節聞一得三父欲令子善唯不能殺身其餘無惜也諸葛亮誡外生曰夫志當存高遠慕先賢絶情欲棄凝滯使庶幾之志揭然有所存惻然有所感忍屈伸去細碎廣咨問除嫌吝雖有淹留何損於美趣何患於不濟若志不強毅意不慷慨徒碌碌滯於俗默默束於情永竄伏於凡庸不免於下流矣又曰夫君子之行靜以修身儉以養德非淡薄無以明志非寧靜無以致遠夫學欲靜也才須學也非學無以廣才非志無以成學淫慢則不能勵精險躁則不能治性年與時馳意與日去遂成枯落多不接世悲守窮廬將復何及崔瑗坐右銘曰無道人之短無說己之長施人慎勿念受施慎勿忘世譽不足慕唯仁為紀綱隱心而後動謗議庸何傷
