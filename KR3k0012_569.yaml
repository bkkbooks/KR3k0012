body:
  text: 樂部六宴樂樂志曰壽陽樂宋南平穆王為豫州剌史所作也楊叛兒齊隆昌時有楊旻母為師巫旻小隨母入宮及長后所幸童謠曰楊婆兒共戲來語訛為叛兒西烏飛宋州剌史沈攸之舉兵思歸所作詞云白日落西山還去來上震樂梁武帝所作有七曲鳳臺桐柏方寸諸玉龜金丹等築地樂梁孝王築睢陽城方七十里唱聲相杵以鼓聲也又曰梁武篤敬佛法作善哉天樂大歡天道仙道神王龍王滅過惡除愛水斷苦輪十篇名為正樂陳後主尤重樂聲遣宮女於清樂中造黃鶴留玉樹後庭花金叉兩臂垂歌詞綺艷極於輕薄又造無愁曲音韻窈窕極於衷思隋煬帝不解音律大製艷曲令樂正白明達造新聲納刑樂萬歲樂藏釣樂七夕相逢樂投壺樂玉女行觴神仙客鬥百草泛龍舟還舊宮長樂花等曲皆掩抑摧藏哀音斷絶後高聲獻望明樂曲煬帝令知音者於館所聽之歸而肆習及客方獻先於前奏之胡夷皆驚焉又隋開皇初定令置七部樂曲一曰國伎二日清商伎三曰高麗伎四曰天笁伎五曰安國伎六曰龜茲伎七曰文康伎其後牛弘請存鞞鐸巾拂等四舞因稱四舞又煬帝更定清樂為九部歌曲有楊叛兒永代樂舞曲有明君于闐佛曲有萬代豐等凡樂以聲徐者為本聲疾者為解唐會要曰清樂者凡代之遺聲其始即清商三調是也並漢氏已來舊典樂器製度并諸歌章古調與魏三祖作者皆被史籍自晉氏播遷其音分散不復存於內地符堅滅梁得之于前後二秦及宋武定關中收之入江南及隋平陳後獲之隋文聽之善其節奏曰此華夏正聲也因更損益去其哀怨考而補之乃置清署商揔謂之清樂西倞等為九部隋室喪亂日益淪缺矣后朝猶有六十三曲今其詞存者有白雲公莫巴渝明君之君鐸舞曰鳩子夜吳聲四時歌前溪阿子歡聞團扇懊惱白紵玉樹後庭花春江花春江月夜長史變丁督護讀曲烏夜啼石城莫愁襄陽栖烏夜飛估客楊叛兒雅歌龍舟等三十二曲明君雅歌各二首四時四首合三十七首又七曲有聲無詞上林鳳雛平調清調瑟調平折命嘯通前四十四篇在焉見通典當江南之中舞白紵渝等衣服各異至梁武改省之宋以江左諸曲哇淫然而從容雅緩猶有士君子之風焉自長安年以後朝廷不重古典工伎漸缺能合于管絃者唯明君楊叛兒驍壺春歌白雲堂堂春江花月夜八曲舊樂多或數百言明君尚能四十言今所傳二十六言漸訛失與吳音轉遠宜取於吳人使之傳習開元中有歌工李郎子北人也調聲已失云學於前才生郎子亡後清樂唯歌一曲詞典詞典而音雅自周隋已來多用西涼樂鼓舞曲多用龜茲樂其曲度皆時俗所知也唯琴家獨傳楚漢聲及清諷瑟調蔡雍五弄謂之九算雅樂尚存非朝廷郊廟所用故不載自唐虞迄三代舞用國子樂用瞽師漢魏已後皆以賤隸為之唯雅樂尚又曰高麗百濟樂宋朝初得之至後魏太武滅北燕以得之而未具周武滅齊威振海外二國各獻其樂周人列於樂部謂之國伎隋文平陳及文康禮俱得之又曰貞觀十四年景雲見河水清協律郎張文收採古朱鴈天馬之義制景雲河清歌名曰宴樂奏之管絃為諸樂之首今元會第一奏者是也又曰武德初未暇改作每宴享因隋制奏九部樂一宴樂二清商三西涼四扶南五高儷六龜茲七安國八踈勒九康國貞觀十六年十一月宴百僚奏十部先是伐高昌收其樂付太常乃增九部為十部伎今通典所載十部之樂無扶南樂祇有天竺樂事見南蠻樂其後分為立坐二部立部伎有八部一安樂後用平齊所作二太平樂亦謂之五方師子舞三破陳樂四慶善樂五大定樂亦謂之八紘同軌樂太宗平遼時作也六上元樂高宗所作七賢壽樂武太后所在舞時行列成字有聖超千古道冠百王皇帝萬年寶祚彌昌八光聖樂玄宗所在自安樂已下每奏皆雷大鼓同用龜茲樂並立奏之其大定樂加以金鉦唯慶善樂獨用西京樂最為間雅其破陳上元慶善三舞皆易其衣冠合其鍾磐以享郊廟自天后臨朝此禮遂廢神龍三年八月勑立部伎舞人以後更不得改補入諸色役坐部伎有六部一宴樂張文收所作也又分為四部有景雲慶善破陳承天等樂二長壽樂武太后長壽年所作三天授樂武太后天壽年所作四烏歌方歲故為樂以像之五龍池樂玄宗所作也帝在藩邸時居崇慶坊宅中經兩地忽為池及即位以宅為宮故為樂以歌其祥六小破陳樂玄宗所在生於舞用四人被之金甲自長壽已下皆用龜茲樂人皆著靴唯龍池用雅樂而無鍾磬舞人盡躡履而行其樂章又有陳樂詞七首中和樂詞五首五方師子詞五首南詔奉聖樂詞五首聖壽荷皇恩詞四首聖壽樂詞四首大定樂詞六首上元樂詞一十五首文武順聖樂詞九首貞觀未有裴神符有妙解琵琶唯作璽蠻奴大鳳傾杯樂三曲聲度清美太宗深愛之高宗未真伎遂盛於時泊天后至神龍之際大增加立坐部伎諸舞尋亦廢之而已又曰高宗御含元殿東翔鸞閣大酺當時京城四縣及太宗音樂分為東西朋雍王賢為東朋周王顯為西朋務以角勝為樂禮畢曲者本自晉太尉庾亮家卒其容取其諡以號之謂文康樂每奏九部樂終則陳之故以禮畢為名其曲有散花樂等隋平陳得之入九部器有笙笛簫箎鈴盤鞞腰鼓等七種三懸為一部工二十人今亡太平樂亦謂之五分師子舞師子縶獸出於西南夷天笁師子等國綴毛為之象其俯仰馴狎之容二人持繩拂為習弄之狀五師子各位其方色百四十人歌太平樂舞抃以從之服飾皆作崑崙象上元樂高宗所造舞者百八十一人起雲衣備五色以象元氣故曰上元烏歌萬歲樂武太后所造時宮中養鳥能人言又常稱萬歲為樂以象之舞三人緋大袖並畫鸜鵒冠作鳥象今嶺南有鳥似鸜鵒養之久則能言名吉了了音料光聖樂玄宗所造也舞八十人鳥冠五綵畫衣兼似上元聖壽之容以歌王業所興自安樂以後皆雷大鼓雜以龜茲樂聲震百里並立奏之其大定樂加金鉦唯慶善樂獨用西涼樂最為間雅舊破陳上元慶善三舞皆易其衣冠合之鍾磬以享郊廟自武太后革命此禮遂廢自安樂部謂之立部伎也大唐平高昌盡收其樂又造宴樂而去禮畢曲令著令者唯十部龜茲疏勒安國康國高麗西涼高昌燕清樂伎天笁凡十部南蠻北狄國俗皆隨髮際斷其髮今舞者咸用繩圍首反約髮抄內於繩下又有新聲自河西至者號胡音聲與龜茲樂散樂俱為時重諸樂咸之小寢大定樂高宗所造出自破陳樂舞者四十人被五綵文甲持槊歌和云八紘同軌樂以象平遼東而邊隅大定也唐會要曰貞元三年四月河東節度使馬燧定難曲御麟德殿閲試之又曰汴州節度使韓弘進聖朝萬歲樂曲譜凡三百首又曰延載元年正月二十三日制越古長年樂一曲又曰十二年十二月昭義節度使王虔休獻繼天誕聖樂表曰臣伏見開元中天長節度日四海歡娛萬年獻壽竊以陛下降誕之日有惟新之曲適過之音臣遣成繼天誕聖樂一曲天抵宮為調表五音之奉君也以上為德知五運之居中也凡二十四遍法二十四氣西成一歲之功也不聞沾懘之音以作中和之樂其曲譜同進上先太常人劉玠流落至潞州虔休因令造此曲以進今中和樂起於此中又曰顯慶二年上以琴中雅曲古人歌之近代已來此聲頓絶令所司修習舊典至三年十月八日太常丞呂才奏按張華博物志白雪是天帝使素女鼓五絃曲名以其調高人和遂寡自宋王已來迄今千祀未有能歌白雪曲者臣今準勑依琴中舊曲定為宮商然後教習並合於歌輒以御製雪詩為白雪歌詞又樂府奏正典之後皆有送聲君唱臣和事彰前史觀取侍中許敬宗等奉和雪詩十六首以為送聲各十六節上善之仍付太常編於樂府樂府雜録曰雨淋鈴者因唐明皇駕回至駱谷聞雨淋鑾鈴因令張野狐撰為曲名又曰夜半樂者因唐玄宗自潞州入定內難進軍斬長樂門閞時正當夜半平韋庶人後乃命樂人撰此曲又曰黃驄疊者唐太宗初定中原時所策黃驄馬後因征遼北馬忽斃上嘆惜久之因命樂人製此曲又曰得寶子者唐明皇初納太真妃喜甚謂諸嬪御云朕得楊氏如獲至寶也因撰此曲又曰文淑子者唐長慶初有俗講僧文淑善吟經兼念四聲觀世音菩薩其音諧暢感動時人樂工黃米飯依其念菩薩四聲乃撰成曲也又曰楊柳枝曲者白傳典杭州時所撰尋進入教坊也又曰還京樂者唐明皇自蜀返正樂官張野孤撰此曲又曰道調子曲者因唐懿皇后樂工史敬約吹觱篥初吹道調懿皇后謂是曲子誤拍敬約乃隨拍便撰此曲也又曰新傾杯樂唐宣宗善吹籚管自撰此曲內有數拍不均上初捻管命樂工辛骨咄拍不中上瞋目視之骨咄憂懼一夕而殞又曰望江南者因朱崖李太尉鎮浙西日為亡姬謝秋娘所撰後進入教坊遂改名一名夢江南曲也又曰康老子者本長安富室家子酷好聲樂落托不事生計常與國樂遊處一旦家産蕩盡因詣西鄽遇一媼持舊錦茵貨鬻次康乃酬半千獲得之尋有波斯見大驚謂康老曰何處得此至寶此是冰蠶所織若暑月陳於榻上可致一室清涼因酬價千萬鬻之康老獲此厚價復與國樂追歡不三數年間費用又盡康老尋歿樂嗟歎之乃撰此曲也又曰大郎神者天后朝有一士人陷冤獄仍籍沒家族其妻配入掖庭本初善吹觱篥因撰此曲寄其哀情始名大郎神蓋取其良人行第也畏人知遂三易其名悲切子離別難終名怨回鶻羯鼓録曰宋開府孫沇有音律之學貞元中進樂書三卷德宗覽而嘉之知是開府之孫遂召對命坐與論音樂甚喜數曰又召至宣徽張樂使觀焉曰有舛誤乖濫悉可言沇曰容臣與樂官商摧講論具狀條奏上宣教坊使與樂官參議數日二使奏樂多言沇曾不解聲調不審節拍又聵疾不可議樂上頗異之又召沇對沇曰臣老年多病耳實失聰若迫於聲律不至無業上又使作樂曲罷問其得失要務舒遲衆工多笑之忽忿然作色奏曰曲雖妙其間有不可者上驚問之即指一琵琶云此人逆而忍兼即抵法不宜在至尊前又指一笙云此人神魂已遊墟墓不可更令供奉上令主者潛伺察之旋而琵琶者為同儕告訐稱六七年前其父自縊不得端由即令按鞫遂伏其罪笙者憂恐不食旬日而卒上益加知遇面賜章綬纍纍召對每令察樂樂工見之悉喘恐脅不敢正視沇懼禍辭病而退女樂部左傳襄二曰鄭人賂晉侯以女樂晉侯以樂之半賜魏絳史記曰孔子為政齊人懼梨鉏乃選齊國中女樂好音八十人皆衣文而舞康樂文馬三十駟遺魯君陳女樂文馬魯城南皋門外季桓子微服往觀再三將受乃語魯君往觀終日怠於政事子路曰夫子可以行矣桓子卒受齊女樂三日不聽政孔子遂行論語曰齊人歸女樂季桓子受之三日不朝孔子遂行後漢書曰馬融字季長違生任性不拘儒者之節常坐高堂施絳帳前授生徒後列女樂弟子以次相傳鮮有入其室者盧植字子幹侍講數年未嘗融以是嘉之也魏志曰夏侯惇從太祖征孫權還使惇都督二十六軍留居巢賜妓樂名倡令曰魏絳以和戎之功猶受金石之樂況將軍乎又曰曹爽飲食車服擬於乘輿又私取先帝才人七八將吏師工鼓吹良家子女三十三人皆以為妓詐作詔書發才人五十七送鄴臺使先帝婕妤教習為妓擅取太樂樂器武庫禁兵作窟室綺疏四周數與何晏等會其中縱酒作樂又曰楊阜為武都太守會馬超來寇曹洪置酒大會女倡著羅縠衣踏鼓一座皆笑楊阜厲聲責洪曰男女有別遂奮衣出洪立罷女樂請阜還座肅然憚之陳書章昭達每飲會必盛設女伎雜樂備羌胡之聲音律姿容並一時之妙雖臨敵弗之廢也隋書房暉遠傳高祖嘗謂群臣曰自古天子有女樂乎楊素以莫知所出遂言無女樂暉遠進曰臣聞窈宨淑女鍾鼓樂之此即王者房中之樂著於雅頌不得言無高祖大説又曰牛弘修皇后房內之樂文帝龍潛時頗好音樂嘗倚琵琶作歌二首名曰地厚天高託言夫妻之義因即取之為房內曲命婦人並登歌上壽並用之職在宮內女人教習之唐書曰先天元年正月皇太子令宮臣就率更寺閲女樂太子舍之賈曾諫曰臣聞作樂崇德以感神人韶夏有容威英有節婦人媟黷無廁其間昔魯用孔子幾致於霸齊人懼之饋以女樂魯君既受孔子遂行戎有由余兵強國富秦人反間遺之女妓戎王耽悅由余乃奔斯則大聖名賢疾之已久矣良以婦人為樂必務冶容哇咬動心蠱惑喪志上行下效淫俗將成敗國亂人實由茲起殿下監撫餘間宴私多適後庭妓樂古或有之至於所司教習彰示群僚慢妓淫聲實虧眷化伏願並令禁斷墨子曰秦繆公之時戎強大繆公遺之女樂二八與良宰戎王大喜以其故數飲食日夜不休左右有言秦寇之至者因扞弓而射之扞引秦寇果至戎王醉而臥於尊下卒生縛之未禽則不知登山而視牛若羊視羊若豚牛之性不若羊羊之性不若豚所自視之勢逆也而因怒於牛羊之性也此狂者也狂而以行賞罰此戴氏之所以絶韓子曰晉韓公欲伐虞虢乃遺之屈産之乘垂棘之璧女樂二八以熒其心亂其政郭子曰謝公在東山畜妓簡文曰安石必出與人同樂不與人同憂注曰謝以安石也石虎鄴中記曰虎大會禮樂既陳虎繳兩閣上窗幌宮人數千陪列看坐悉服飾金銀熠熠又於閣上作女妓數百衣皆絡珠璣鼓舞連倒琴瑟細伎畢備漢晉陽秋曰晉文王與劉禪宴為之作蜀伎樂傍人皆代禪感而禪語笑自若謂賈充曰人之無情乃至是乎雖使葛亮在不能輔之久全況薑維耶充曰不如是何由併之哉夏仲御別傳曰仲御從父家女巫章丹陳珠二女妍姿冶媚清歌妙舞狀若飛仙又曰仲御當正會宗弟承問御曰黃帳之裏西施之孫鄭袖之子膚如凝脂顏如桃李徘徊容與載進載止彈琴而奏清角翔風至而玄雲起若乃攜手交舞流盻頡頑足踰鞞鼓口銜笙黃丹裙赫以四序素耀煥以楊光赴急絃而折倒應緩節以相佯遠望而雲近視而雪舒紅顏而微笑啓朱唇而揚聲世説曰魏武有一伎聲最清高而酷惡性情欲殺則愛其才欲置則不堪於是選百人一時俱教少時百人中果有一人聲及之便殺向惡性者俗説曰宋椲是石崇伎緑朱弟子有國色善吹笛後在晉明帝聞帝疾患危篤群臣進諫請出宋禕時朝賢悉見帝曰卿諸人誰欲得之者衆人無言阮遙集時為吏部尚書對曰願以賜臣即與之鹽鐵論曰貴人之家中山素女撫流徵於堂上鳴鼓巴俞交作於堂下婦人被羅紈婢妾曳絺紵賢良曰古者彈箏鼓而已無妙要之音今富者鳴箏調琴鄭舞趙謳續搜神記曰袁真在豫州遣女伎紀陵阿薛阿郭阿馬三妓與桓宣武既至經時三人共出庭前觀忽有一流星直墮盆池冏然明淨薛郭二人更以瓢酌取皆不得阿馬最後取正入瓢中便飲之即覺有娠遂生桓溫世説曰王導作女伎蔡謨在坐不悅而去導知亦不止之笑林曰某甲者為霸府佐為人都不解每至集會有聲樂之事己輒豫焉而恥不解妓人奏讚之己亦學人仰讚和同時人士令己作主人并使喚妓客妓客未集召妓具問曲吹一一疏著手巾箱下先有藥方客既集因問命曲先取所疏者誤得藥方便言是疏方有附子三分當歸四分己云且作附子當歸以送客舍滿座絶倒
