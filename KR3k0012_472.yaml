body:
  text: 人事部一百一十二富上周易曰富有之謂大業兼濟萬物故有曰富有尚書曰五福二曰富毛詩曰瞻烏爰止于誰之屋富人之屋烏所集禮記曰儒有不保金玉而忠信以為寶不祈土地立義以為土地不祈多積多文以為富也又曰富潤屋德潤身又曰問國君之富數地以對山澤所出問大夫之富曰有宰食刀祭器衣服不假問士之富以車對問庶人之富數畜以對周禮曰太宰掌建邦之六典以佐王平邦國六曰事典以富邦國左傳曰秦后子有寵於桓后子秦桓公子也景公之母弟公子針如二君於景其母曰不去懼選選數也君子奢富弗去君將數其罪而加也又曰齊慶氏亡分其邑與晏子晏子不受人問曰富者人之所欲也何為不受對曰我非惡富恐失富也又曰初衛公叔文子朝而請享靈公退見史鰌給告之史鰌曰子必禍矣子富君貪罪其及子乎文子曰君既許我矣其若之何史鰌曰無害也子臣可以免子雖富禮恭不失臣禮富而能臣必免於難戍也驕戌子之才公救戍也其亡乎又曰鄭駟秦富而侈嬖大夫也而常陳卿之車服於其庭鄭人惡而殺之論語曰孔子曰富而可求也雖執鞭之士吾亦為之如不可求從吾所好又曰季氏富於周公而求也為之藂斂而附益之子曰非吾徒也小子鳴鼓而攻之可也求冉有名也季氏富矣而求藂民財以增之又曰富與貴是人之所欲不以其道得之不處也又曰不義而富且貴於我如浮雲又曰富而無驕易又曰富而好禮史記曰孔氏用鐵冶為業秦伐魏遷孔氏南陽大鼓鑄規陂池連車騎遊諸侯因賈之利有遊聞公子賜與名然其贏得過當愈於纖嗇家致富數千金故南陽行賈盡法孔氏之雍容又曰計然曰貴出如糞土賤取如珠玉財幣欲其行如流水修之十年國富又曰蘇秦說齊王曰臨淄富而實其人無不鬭雞走狗六博蹴踘者又曰范蠡之陶乃營生積居與時馳逐十九年之中三致千金又曰君子富好行其德小人富以適其力又曰白圭曰吾營生猶伊尹呂尚之謀又曰穰侯魏冉之富富於王家出關輜車千乘有餘又曰白圭樂觀時變歲熟取穀與之絲漆繭出取帛絮與之食趍時若猛獸鷙鳥之發又曰卓氏用鐵冶富又曰程鄭富埒卓氏又曰吳楚七國兵起時長安中列侯封軍從軍旅齎貸于錢子家以為侯邑國在關東成敗未決莫肯與唯無鹽氏捐千金貸息什之三月吳楚平一歲中則無鹽氏息十倍用此富埒關中又曰關中富商大賈盡諸田田蘭韋家粟氏安陵杜氏亦巨萬此其章章尤異者也皆非有爵邑奉祿弄法犯奸而富也盡推理去就與時俯仰獲其贏利以來致財用也又曰呂不韋往來販賤賣貴家纍千金又曰齊俗賤奴虜而刁間獨貴人之桀黠奴人所患也惟刁間收使之逐漁鹽商賈之利或連騎交守相然愈益任終得其力起富數千萬又曰范蠡浮海出齊變名姓自謂鴟夷子皮耕於海畔苦身務力父子治生無幾何致錢數千萬齊人聞賢以為相范蠡嘆曰居致千金官則至卿相此布衣極又受尊名不祥乃歸相印盡散財以分於知交鄉黨懷其重寶間行以去止於陶以為此天下之中交易有無之路通為生可致富矣於是自謂陶朱公復約身又耕畜勞居候時轉物逐什一之利居無何則致資纍巨萬天下稱陶朱公也又曰子貢既學於仲尼退而仕於衛廢著鬻財曹魯之門徐廣曰子貢傳云廢居著猶居也讀音如貯七十子徒賜最為饒原憲不饜糟糠匿於窮巷子貢結駟車騎束帛之幣以聘諸侯所至國君無不界迎與杭禮者夫使孔子名布揚於天下者子貢先後之也又曰猗頓用鹽起而邯鄲郭縱以鑄冶成業與王者埒富烏氏倮韋昭曰烏氏縣名屬安定倮名也畜牧及衆賣求繒物問遺戎王戎王倍與之蓄至用谷量牛馬秦始皇令倮比封君寡婦清其先得丹穴而擅其利數世家足不資清寡婦也能守其業用財自衛不見犯秦皇帝以為貞婦而客之為築女懷情臺夫倮鄙人收長清窮鄉寡婦禮抗萬乘君顯天下豈非以富耶又曰夫用貧求富農不如工二不如商剌繡文不如倚市門此言末業貧者之資也富者人之情性所不學而俱顯也今有無袟祿之俸爵邑之人而與之比者命曰素封又曰蜀卓氏之先趙人用鐵冶富秦破趙遷卓氏見虜略獨夫妻推輦行諸遷虜少有餘財爭干吏求近卜處葭萌唯卓氏曰此地挾薄吾聞岷山之下沃野下有蹲鴟至死不飢民工於市易賈乃求遠遷致之臨邛大喜即鐵山鼓鑄運籌策漢蜀之民富至僮千人田池射獵之樂擬於人君程鄭山東遷虜也亦冶鑄賈椎結之民富埒卓氏俱居臨邛也漢書曰寧成既被刑乃詐刻傳出關歸家曰仕不至二千石賈不至千萬安可比人乎乃廣貸陂曲千餘頃假貧人役使數千家致産數千萬為任俠又曰張耳大梁人少時魏公子母忌為客嘗亡命遊外黃富人女甚美庸奴其夫亡邸父客如淳曰父時賓客也謂曰求賢夫從張耳女聽為請決嫁之女家厚奉給耳以故致千里客官為外黃令陳餘亦大梁人好儒術遊趙苦陘富人公乘氏以妻之餘年少父事耳相與為刎頸交又曰梁孝王未死財以巨萬計不可勝數及死藏府餘黃金尚四十萬斤他財物稱是也又曰張安世尊為公侯食邑萬戶然身衣弋綈夫人自紡績家僮七百人皆有手伎作事內治産業纍積纖微是以能植其貨富於大將軍光也又曰卓氏女文君亡奔司馬相如相與歸成都家徒四壁立相如與俱之臨邛盡賣車騎置酒舍乃令文君當壚相如身自著犢鼻褌與傭保雜作滌器於市中卓王孫恥之為杜門不出昆弟諸公謂王孫曰有一男兩女所乏者非財今文君既失身於司馬長卿長卿故倦遊雖貧其人才足依也且又令客奈何相辱如此王孫不得已分與文君僮百人錢百萬及其嫁時衣被財物文君乃與相如歸成都買田宅為富人居又曰鮑宣上書哀帝曰奈何獨私養外親與幸臣董賢多賞賜以萬數奴從賓客漿酒藿肉蒼頭盧兒比日用致富非天意也又曰上使善相人相鄧通曰當貧餓死上曰然富通者在我何說貧於是賜通蜀嚴道銅山得自鑄錢鄧氏錢布天下其富如此餓部中亦出又曰原涉父哀帝時南陽太守時天下殷富大郡二千石死官賦斂送喪皆千萬以上妻子通共受之以定産業時又少行三年喪者及涉父死讓還南陽賻送行喪冢廬三年由是顯名京師遊使部中亦出又曰故秦陽以田農而甲一州以田地過限從而富貴為一州第一翁伯以脂而傾縣濁氏以賣脯而連騎張里以馬醫而擊鍾又曰宣曲任氏之先為督道倉吏秦之敗豪桀皆爭金玉任氏獨窖倉粟楚漢相距滎陽人不得耕種米石至萬四豪桀金玉盡歸任氏以此起富又曰安邑千樹棗燕秦千樹栗此其人皆與千戶侯等又曰劉德寬厚好施家産過百萬則以賑昆弟賓客又曰史丹盡得父財身又食大國邑數見褒賞賜纍千金僮奴以百數後房妾數十人內奢淫好飲食極滋味聲色之樂又曰富者土木被文錦犬馬餘肉粟又曰中大夫張匡上書言王商宗族權勢合資巨萬計私奴以千數又曰郡國富人兼利顓業以貨賂自行取重於鄉里者不可勝數又曰師史轉轂百數賈郡國無所不至能致千萬又曰京師富人杜楊樊嘉茂陵勢綱為天下高資又曰所忠言貴家子弟富人或鬭雞走狗馬弋獵博戲亂齊人又曰成都羅裒資至巨萬又後漢書曰郭況遷大鴻臚上數幸其宅賞金帛甚盛京師號況家為金穴言其富貴也又曰樊童字君雲世善農稼好貨殖性溫厚有法度三世共財子孫朝夕禮敬常若父家其營理産業物無所棄課役童隸各得其宜故能上下戮力財利歲倍至及廣開田土三百餘頃其所起廬舍皆有重堂高閣陂渠灌注池魚畜牧有求必給資至巨萬而賑贍宗族恩加鄉閭又曰宣帝時陰子方者至孝有仁恩當臘日晨炊而竈神形見子方再拜受福家有黃羊因以祠之自是以後暴至巨富有田七百餘頃輿馬僕隸比於封君方常言我子孫必將強大至識三世而遂繁昌故後常以臘日祠竈而以黃羊又曰王丹字仲回京兆人哀平時仕州郡家纍千金隱居養志好施周給每歲農時輒載酒肴於田間候勤勞者而勞之其墮孏者恥不致丹皆兼功自萬邑藂相率以致富殷其輕黠游薄廢業為患者輒曉其父兄使黜責之沒則賻給親自將護其有遭喪憂者輒待丹為辦也又曰馬防以病乞骸骨詔賜故中山王田廬以特進就第防弟貴盛奴婢各千人已上寶貨巨億皆買京師膏腴美業又大起第復觀連閣臨道彌貨曰街路多藂聲樂曲度比諸郊廟賓容畢至京兆杜篤之徒數百人常為食客居門下刺史守令多出其家謝承後漢書曰戴遵字子高富於資産輕財好義賓客常三四百人時人名之關東大豪戴子高魏典略曰公沙穆字文人北海膠東人也體履清直兼學多文隱居東萊山中桓帝時有富人王仲者謂穆曰今多以貸仕吾奉子以百萬唯子所用穆答曰斯意厚矣夫富貴在天得之有命以賄求爵姦莫大焉郡舉孝廉除郎中以高第為光祿主事吳書曰劉表亡曹公向荊州表子琮降以節迎曹公諸將皆疑其詐曹公以問婁子伯子伯曰天下擾攘各貪王命以自重今以節來是必至誠曹公大喜遂進近寵袟子伯家纍千金公曰婁子伯富樂於孤但勢不如孤耳從破馬超等子伯功為多曹公常歎曰子伯之計孤不及也蜀志曰董和字幼宰南郡人益州牧劉璋以為牛鞞江原長成都令蜀土富實時俗奢侈貨殖之家侯服玉食婚姻葬送傾家竭産和躬率之以儉惡衣蔬食防遏踰僣為之軌制所在皆移風變善又曰麋笁字仲祖業貨殖僮客萬人資産巨億王隱晉書曰石崇雖有人財而性粗強貪而好利富擬王者有司簿閲崇田宅財物及水碓有三十餘區倉頭八百人他珍寶奇異不可稱數又曰何曾遒豪纍世人有小紙為書者曾勑記室勿報也蒸餅上不坼作十字不食食日膳萬錢猶曰無下筯處又曰刁達字伯道弟暢字仲遠次弘字叔仁各歷職州刺史兄弟子姪並不治名行競修貨殖有田萬頃奴婢數千人義旗初建弘將謀起兵宋王遣劉毅誅之刁氏既富奴客從橫上山固澤為京口之蠹宋既誅暢散其穀帛金錢牛羊令民稱力取之彌日不盡時天下飢儉編戶菜色及刁氏之破百姓充足徐廣晉記曰石季倫甚富侈衣服妓樂誇於許史有妓人曰緑珠美孫秀欲之使人求焉崇盡出其婢妾數十人皆蘊蘭麝而被羅縠晉諸公讚和嶠字長輿逌之子也少知名以雅重稱常慕其舅夏侯玄之為人厚自封植嶷然不群拜黃門郎遷中書令轉尚書愍懷太子初立以嶠為少保加散騎常侍家産豐富擬王公而性至儉吝宋書曰沈攸之少貧及貴在荊州富擬王侯夜中諸廂廊然燭達曉曳珠玉者數百人皆一時絶妙孫巖宋書曰徐堪之産業豐富室宇園池貴遊莫及門生千餘皆三吳富人子每出入行遊塗巷盈滿唐書郝處俊侍中平恩公許圉師即處俊之舅早同州里俱官達於時又其鄉人田氏彭氏以殖貨見稱有彭志筠顯慶中上表請以家財絹布二萬段助軍詔授其絹萬匹特授奉議郎仍布告天下故江淮間語曰貴如許郝富若田彭
