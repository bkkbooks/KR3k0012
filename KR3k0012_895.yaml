body:
  text: 獸部六馬二史記曰造父以善御幸於周穆王得驪驥溫驪驊騮緑耳之駟西巡守樂而忘歸又曰楚莊王有愛馬衣以文繡置華屋之下啖以棗脯馬死欲以大夫禮葬之樂人優孟入殿門大哭曰請以人君之禮葬之以雕玉為棺文梓為槨豫章為題湊發甲卒為壙老弱負土諸侯聞之皆知大王賤人貴馬也王曰為之奈何請為王言六畜之葬以龍竈為槨銅音曆為棺齊以薑桂薦以木蘭衣以火光葬人腹中王乃以馬屬太官又曰巴蜀沃野西近卭笮有笮馬旄毛又曰馬蹄躈千躈苦吊切牛千足此亦比千乘之家又曰陸地牧馬二百蹄牛蹄角千皆與千戶侯等又曰東胡使求冒頓千里馬冒頓問群臣群臣曰千里馬胸奴寶也勿與冒頓曰與人鄰國奈何惜一馬遂以與也又曰冒頓圍高祖於平城所騎西方盡白馬東方盡青龍北方盡烏驪南方盡騂馬又曰郭隗謂燕昭王曰臣聞古人有以千金求市千里馬而不能得於是與涓人金請為市之齎千金覔之而絶域有千里馬已死乃用五百金市其首而還王怒曰安用死馬首乎徒費五百金涓人答曰死馬首尚用五百金況生馬乎天下以王好馬馬必將至矣未期年果有獻千里馬者三匹又曰任安為衛將軍舍人與田仁會俱為舍人居門下心同相愛二人家貧無錢用以事將軍家家監使養惡齧馬兩匹同床臥仁竊言曰不知人哉家監任安曰將軍尚不知人乃況家監也又曰項王駿馬名騅常騎及被圍於垓下乃悲歌慷苦莽切愾苦改切為歌詩曰力拔山兮氣蓋世時不利兮騅不逝及至烏江謂亭長曰吾騎此馬五歲所當無敵嘗一日千里不忍殺以賜公又曰大宛有善馬在二師城匿不肯與漢使天子既好宛馬使壯士車令等持千金以請宛王二師城善馬宛國饒漢物相與謀曰二師馬宛寶馬也遂不肯與漢使怒妄言推金而去宛貴人怒遮攻漢使取財物天子大怒拜李廣利為二師將軍發屬國騎及郡國惡少年數萬人以伐宛期至二師城取善馬漢書曰孝文皇帝時有獻千里馬者詔曰鸞旗在前屬車在後吉行日五十里朕乘千里之馬獨先安之乃還馬又曰鄭當時以任俠自喜孝景時為大子舍人五日洗沐常置驛馬長安諸郊請謝賓客夜以繼日又曰萬石君過官門闕必下車趍見輅馬必式焉又曰石建為太僕奏事自下讀之驚恐曰書馬者與尾而五今乃四獲譴死矣又石慶為太僕御出上問車中幾馬慶以策數馬畢曰六馬又曰初天子發易書發易書以卜也以卜曰神馬當從西北來得烏孫馬好名曰天馬及得宛汗血馬益壯更名烏孫馬曰西極馬宛馬曰天馬又曰武帝求賢詔曰馬或奔踶而致千里士有負俗之纍而立功名夫泛駕之馬亦在御之而已又曰元狩二年馬生余吾水中在朔方北元鼎四年馬生渥窪水中作天馬之歌又曰大宛國別邑七十餘城多善馬汗血言其先天馬子也言大宛國喬山其上有馬不可得因取五色馬母置其下與集生駒皆汗血因號曰天馬子也又天馬歌曰太一貺天馬千里下霑赤汗沫流赭大宛馬汗血沾濡也志俶儻精權奇籋浮雲籋音躡言馬上浮雲也暗音奄上馳體容與迣萬里迣音逝迣超踰今安匹龍為友又歌曰天馬來從西極涉流沙九夷服天馬來曆無草徑千里循東道天馬來開遠門竦子身逝崑崙天馬來龍之媒天馬龍之類馬來龍必至之媒也遊閶闔觀玉臺又曰孝武之世聞天馬蒲陶則通大宛安息自是之後明珠文甲通犀翠羽之珍盈於後宮龍文魚目汗血之馬皆駿馬也充於黃門又曰烏孫國大昆彌治赤谷城山多松樠不田作種樹畜逐水草與胸奴同俗國多馬富人至四五千匹又曰王褒聖主得賢臣頌曰及至駕齧𣍿驂乘旦王良執靶韓哀附輿縱馳騁騖忽如草靡過都越國蹶如歷塊追奔電逐遺風周流八極萬里一息何其遼哉人馬相得也又曰御史大夫衛綰奏馬高五尺九寸以上齒未平馬十歲齒下平不得出關又曰昌邑王賀召皇太后果下馬乘之後漢書曰光武時有獻名馬者日行千里又進寶劍價兼百金帝以馬駕鼓車劍賜騎士又曰劉盆子既立乘鮮車大馬赤屏泥赤屏泥謂以緹油屏泥於軾前絳襜絡又曰更始既誅王莽乃北都洛陽申屠建李松自長安傳送乘輿服御又遣中黃門從官奉迎遷都二年二月更始自洛陽而西初發李松奉引馬驚奔觸北宮鐵柱門三馬皆死續漢書曰禍也時更始失道將亡之徵又曰賈復持劉嘉書此渡河及光武於柏人因鄧禹得召見光武奇之禹亦稱有將帥節於是署復破虜將軍督盜賊復馬羸光武解左驂以賜之又曰馬援於交址得駱越銅鼓乃鑄為馬式還表上之曰夫行天莫若龍行地莫若馬馬者兵甲之本國之大用安寧則以別尊卑之序有變則以濟遠近之難昔有騏驥一日千里伯樂見之昭然不惑近世有西河子輿亦明相法子輿傳西河儀長孺長孺傳茂陵丁君都君都傳成紀楊子阿臣援嘗師事子阿受相馬骨法考之行事輒有效驗臣愚以為傳聞不如親見視影不如察形今欲形之於生馬則骨法難備又不可得傳之於後孝武皇帝時善相馬者東門京鑄作銅馬法獻之詔立於魯班門外更名魯班門曰金馬門臣謹備數家骨相以為法馬高三尺五寸圍四尺五寸詔置於宣德殿下以名為馬式焉又曰卓茂為丞相府史嘗出行有人認其馬茂問曰子亡馬幾何時對曰月餘日矣茂有馬數年心知其謬默解與之挽車而去顧曰若非公馬幸至丞相府歸我他日馬主別得亡者乃詣府送馬叩頭謝之茂性不爭如此又曰或問第五倫曰公有私乎對曰昔人有與吾千里馬者吾雖不受每三公有所選舉心不能忘而亦終不用也又曰光和元年京師馬生人京房易傳曰諸侯相伐闕妖馬生人又洪範五行傳云秦孝公二十一年傳有馬生人非其類也必有非姓者其後始皇蓋呂不韋子終以絶嗣此非姓也又曰光和四年春正月初置騄驥廄丞領受郡國調馬騄驥善馬也調謂徵發也豪右辜榷馬一匹至二百萬前書音義曰辜障榷專也謂障餘人賣買而自取其利又曰明帝賜東平王蒼陰太后器服及遺宛馬一匹血從前膊上小孔中出嘗聞武帝歌天馬霑赤汗今親見其然也又曰明德馬后過濯龍門上見外家門起居者車如流水馬如遊龍倉頭衣緑褠褠臂衣今之臂褠以縛左右手於事便也顧視御者不及遠矣謝承後漢書曰朱震字伯厚性剛烈初為從事奏濟陰太守單匡贓罪并連匡兄中常侍車騎將軍超三府唁曰車如雞栖馬如狗疾惡如風朱伯厚續漢書曰張奐字然明為安定屬國都尉堯離湳奴感切上奐馬二十匹大豪嘗以金渠八枚遺奐奐召主簿張祁入於羌前以酒酹地曰使馬如羊不得以入廄使金如粟不得以入懷盡還不受東觀漢記曰張湛為光祿勳帝臨朝或有惰容湛輒諫其失常乘白馬上每見湛輒言白馬生復諫矣事具職官部光祿篇又曰吳漢兵守成都公孫述將延岑遣奇兵出吳漢兵後襲擊破漢漢墮水緣馬尾得出又曰杜林字伯山與馬援鄉里素相親厚援從南方還時林馬適死援令子持馬一匹遺林曰朋友有車馬之饋可具以備乏林受之居數月林遣子奉書曰將軍內施九族外有賓客望恩者多林父子兩人食列卿祿常有盈今送錢五萬援受之謂子曰人當以此為法是伯山所以勝我也又曰上始欲征胸奴與竇固等議出兵調度皆以為塞外草美可不須馬穀其各以固等將兵到燉煌當出塞上請馬穀上以固言前後相違怒不與穀皆言案軍出塞無穀馬故事馬防言宣帝時五將出征胸奴候騎得漢馬矢見其中有粟知漢兵出以故引去以是言之馬當與穀上善其用意微動勑下調馬穀防遂見親近又曰明德后詔書流布咸稱至德王主諸處莫敢犯禁廣平巨鹿樂成王入問起居車騎鞍勒皆純黑無金銀采飾馬不踰六即賜錢五百萬又曰桓典為御史是時官官秉權典執政無所回避常乘驄馬京帥畏憚為之語曰行行且止避驄馬御史獻帝春秋曰曹操與呂布軍戰敗布得操騎而不知是問曰曹使君何在答曰騎黃馬者是也因得免魏志曰穢國出果下馬漢時恆獻之馬高三尺乘於果樹下行又曰龐意討關羽親與羽交戰射羽中額時意常乘白馬羽軍謂之白馬將軍又曰陳思王表文帝曰臣於武皇帝世得大宛紫騂馬一匹形法應圖善持頭尾教令習拜今已能拜又能行與鼓節相應謹以奉獻又曰文帝與孫權書曰前使于禁及王敦去時所道騶吾鐵驪馬本欲使禁自致之念將軍儻欲速得今故先以付往此二馬朕常所自乘其調良善走數萬匹選之真可樂也中國雖饒馬其知名絶足亦時有耳又曰朱建平善相馬文帝將出取馬建平道遇之語人曰此馬之相今日死矣帝將乘馬馬惡衣香嚙帝𣍿帝大怒即殺之魏書曰曹公所乘馬名絶影為矢所中傷頰及足吳書曰孫堅於西華失利堅被瘡墮馬臥草中軍衆分散不知堅所在堅所騎驄馬馳還營棓地鳴呼將士隨馬於草中得堅又曰諸葛恪為將蜀使至上謂使曰元遜為將軍君還蜀可報丞相為致佳馬恪起陳謝上曰卿未得馬何為謝對曰夫蜀陛下外廄陛下有詔臣必得之是以謝也吳志曰魏使以馬求易珠璣翡翠玳瑁孫權曰此皆孤所不用而可以得馬何苦而不聽與交易九州春秋曰初呂布騎將侯成遣客牧馬十五匹客悉驅馬去向沛城欲歸劉備成自將騎逐之悉得馬還諸將合禮賀成成釀五六斛酒獵得十餘頭豬未飲食先持半豬五升酒自入詣布前跪言蒙將軍恩逐得所失馬江表傳曰孫策性好獵將步騎數百策驅馳逐鹿所乘馬精駿從騎絶不能及又曰孫權征合肥駿馬上津橋橋南已撤丈餘無板谷吉利在馬後使權持鞍緩鞚利於後著鞭以助馬勢遂得超渡
