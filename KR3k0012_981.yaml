body:
  text: 菜茹部五蘆服爾雅曰葵蘆萉萉宜為蔔蘆蔔蕪菁屬紫華大根俗呼雹葵蔔字或作蔔方言曰蕪菁紫者謂之蘆蔔廣志曰蘆蔔別名雹葵後漢書曰劉盆子在長安時掖庭中宮女猶有數百千人自更始敗後幽閉殿內拔庭中蘆蔔根捕池魚而食之東觀漢記同北史曰張威隋文受禪遷青州刺史在州頗事産業遣家奴於人間鬻蔔根其奴緣此侵擾百姓上深加責坐廢於家正論曰理世不真賢猶治病無真藥當用人參反得蘿蔔根唐新語曰開元中中書令蕭嵩以文選是先代舊業欲注釋之奏請左補闕王智明金吾衛佐李玄成進士陳居等注文選先是東宮衛佐馮光進入院校文選兼復注釋解鴟蹲云今之芋子即是著毛蘿蔔院中學士向外說之蕭嵩聞之附掌大笑雲南記曰嶲州界緣山野間有菜大葉而粗莖其根若大蘿蔔土人蒸煮其根葉而食之可以療飢名之為諸侯菜云武侯南征用此菜子蒔於山中以濟軍食亦猶廣都縣山櫪林謂之諸葛木也芥魏子曰蓼蟲在蓼則生在芥則死非蓼仁芥賊本不可失也劉向別録曰尹都尉書有種芥葵蓼韭蔥諸篇嶺南異物志曰唐孟琯嘗於嶺表買芥菜置壁下忘食數日皆生四足有首尾能行走大如螳蜋但腰身細長又曰南土芥高者五六尺子如雞卵廣州人以巨芥為醎葅埋地中有三十年者貴尚親賓以相餉遺嶺表録異曰廣州地熱種麥則苗而不實北人將蔓菁子就彼種者出土即變為芥吳氏本草曰芥葅一名水蘇一名勞祖蓴南越志曰石蓴似紫菜色菁集異記曰丹陽張承先家有鬼長為取它物會有客須蓴二斗鱧魚二十頭鬼將一小兒置驃騎令小兒睡眼覺看籃中已有蓴鱧幽明録曰阿東常醜奴泛湖邊拔蒲暮宿空舍時日暮見一女姿容極美乘船載蓴至舍寄住變而為獺蘘荷說文曰蘘蘘荷也一名菏苴廣雅同崔豹古今注曰蘘荷似蓄苴而白蓄苴色紫花生根中花未敗時可食久置則削爛不為實矣葉似薑宜蔭翳地常依蔭而生也搜神記曰余外婦姊夫蔣士有傭客得疾下血醫以中蠱乃密以蘘荷根布席下不使知乃狂言曰食我蠱者乃張小人也乃呼小小亡去今世攻蠱多用蘘荷根往往驗蘘荷或謂嘉草葛洪方曰人得蠱取蘘荷葉著臥席下不使知立呼蠱姓名潘嶽間居賦曰蘘菏依陰時藿向陽紫菜集異記曰會稽照誕入海採菜於山上曝之夜忽見群鬼張目切齒欲來擊誕誕奮刀斫之見鬼悉披靡乃就誕乞少許紫菜誕不為與吳郡緣海記曰郡海邊諸山悉生紫菜吳賦云綸組紫絳者也苦買晉書安帝紀曰義熙二年有苦買菜生楊州營莖高四尺六寸廣二尺二寸是後歲多征伐人民積苦故苦買者買苦也芹爾雅曰芹楚葵今水中芹也詩曰觱沸濫泉言采其芹芹菜也又曰泮水思樂泮水薄采其芹芹水菜也列子曰宋國有人其妻告之曰昔有人甘茙菽與芹子鄉豪嘗之哲於其口哲於其腸衆哂之呂氏春秋伊尹說曰菜之美者雲夢之芹也范汪祠制曰孟春祭有芹葅字林曰䔇音豈美菜生雲夢薺爾雅曰菥思歷切大薺似薺細葉俗呼老薺又曰蒫才何切薺實廣雅曰菥蓂馬辛也說文曰薺草可食詩曰誰謂荼苦其甘如薺荼苦菜也而君子於己之苦又甚於荼北方之荼則如甘薺禮曰孟夏之月靡草死薺葶藶之屬春秋繁露曰薺以美冬水氣也薺甘味也乘於水氣故美者甘勝寒也薺之言濟所以濟大水也淮南子曰薺麥冬生而夏死抱朴子曰薺麥大蒜仲夏而枯物理論曰夫解小而引大了淺而伸深猶以牛刀割雞長殳刈薺吳氏本草曰菥蓂一名折目一名策冥一名馬駒雷公神農扁鵲辛季氏小溫四月採乾二十日生道傍細辛乾薑苦參薺實神農甘毒生野田五月五日採陰乾治腹脹蕨詩曰陟彼南山言採其蕨蕨鱉菜也又曰山有蕨薇隰有杞桋晉書曰齊王秉權張翰謂郡人顧榮曰天下紛紛未已吾本山林間人無望於時去矣采南山蕨飲三江水也爾雅曰蕨鱉初生無葉可食江西謂之弊古詩曰山桃發紅萼野蕨漸紫苞堇詩曰周原膴膴堇荼如飴堇菜也荼苦菜也周之原地肥美所生菜雖有性苦者皆甘如飴也禮曰堇苴枌榆免薧音考滫髓以滑之謂用調和飲食也蓂堇類也冬用堇夏用荁爾雅曰齧苦堇今堇葵也葉似柳子如米汋食之滑三十國春秋曰劉殷字長盛七歲喪其父哀毀踰禮曾祖母王氏盛冬思堇殷入澤中慟哭有堇生焉得斛餘廣語曰夏蓂秋堇滑如粉後魏書曰崔和為平昌太守性鄙吝埋錢百斛其母季春思堇惜錢不買荇爾雅曰莕接余其葉苻藂生水中葉圓在莖端長短隨流水深淺江東人食之音杏也詩曰參差荇菜左右流之窈窕淑女寤寐求之荇接余也邪蒿北齊書曰刑峙字士俊以經授皇太子廚宰進太子食有菜曰邪蒿令去之曰此菜有不正之名非殿下所宜食顯宗聞而嘉之藝臺通俗文曰藝臺謂之胡菜韻集曰藝臺胡菜薰葇方言曰蘇之小者謂之穰葇薰菜也鹿角南越志曰猴葵色赤生石上南越謂之鹿角葫荽石崇奴券曰奴當種羅勒胡荽不親不踈優殿南方草物狀曰合浦有菜名優殿以豆醬汁茹食芳好可食胡餅雍菜廣州記曰雍菜生水以為葅冬風廣州記曰冬風菜陸生宜肥肉作羹二者微味人甚重之絡葵博物志曰人食絡葵為狗齧則瘡不差或致死蔊字林曰蔊辛菜也荶字林曰荶菜似蒜生水中波稜唐書曰太宗時婆羅獻波稜菜葉類紅藍實如蒺藜大熟之能益食味
