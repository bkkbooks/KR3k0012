body:
  text: 禮儀部三十五葬送四吳越春秋曰早平門外麋湖西城者麋王城也與越王遙戰越王殺麋王麋王無頭騎馬還武里乃死因留葬武里城中以午日死至今武里午日不舉火又曰吳王闔閭有子女怨王乃自殺闔閭痛之甚葬於昌門外鑿地為池積土為山文石為槨金鼎銀鐏珠玉之寶皆以送女乃舞白鵠於吳市中令萬民隨觀還使男女與鵠俱入門因塞之又曰吳謀伐齊齊景公使子女為質於吳吳王因為太子聘齊女齊女少思齊日夜哭泣發病闔閭乃起北門名曰齊門令女往遊其上女思不止病日益甚至且死女曰令死有知必葬海虞山之顛以望齊國闔閭傷之甚用其言葬於虞山之嶺以贍望齊國是時太子亦病而死說苑曰蓋聞相梁并衛有罪而走齊管仲迎而問曰吾子相梁并衛之時門下使者幾何人曰門下使者三千餘人管仲曰今與幾何人來曰臣與三人俱曰是何對曰其一人父死無以葬我為葬之一人母死無以葬亦為葬之一人兄有獄我為出之是以得三人來桓子新論曰揚子雲為郎居長安素貧比歲亡其兩男哀痛之皆持歸葬於蜀以此困乏子雲達聖道明於死生不下季札然而慕戀死子不能以義割恩自令多費而致困貧論衡曰儒書言孔子當泗水而葬為之卻流此言孔子德使水卻不湍其墓是故儒者講論皆言孔子之後當封泗水以卻流為證殆虛言也王符潛夫論曰文帝葬於芷陽明帝葬於洛南皆不藏珠寶不起山陵今京師貴戚郡縣豪家生不極養死乃崇喪造起大冢廣樹松柏廬舍祠堂務崇侈僣此無益於終無益於孝徒作煩擾傷害吏民今案畢鎬之郊無文武之陵南城之東無曾晢之冢周公非不忠曾子非不孝也崔實政論曰送終之家亦大無度至念親將終無以奉遣乃約其供養衣服豫修已沒之制竭家盡業甘之不恨窮厄既迫起為盜賊拘執陷罪為世大戮痛乎此俗之愚民也録異傳曰袁安葬其母逢三書生語其葬處遂至四世五公其後公路年十八驕豪故常食密飯諸女以絳為地道遊行其上此葬地所致也謝綽宋拾遺曰桓溫葬姑熟之青山平墳不為封域於墓傍開隧立碑故謬其處令後代不知所在襄陽耆舊傳曰峴山南有習家魚池者習郁之所作也郁將亡勑其兒煥曰我葬必近魚池煥為起冢於池之北去池四十步山謙之丹陽記曰晉車騎將軍王舒令其子曰甚愛漂陽縣死則我欲葬焉故王死之後徙縣治今豦而以昔解為墓續搜神記曰干寶字令升新蔡人其父有嬖妾母至妒寶父葬時因推著藏中經十年而母喪開墓見棺妾伏棺上衣服如生就視猶暖漸漸有氣息與歸經日乃蘇云父常與之寢接恩情如生在家中范晏陰德傳曰陳翼字春卿廬江舒人也行到縣郭見道上馬傍有臥疾人呼翼與語曰吾是長安魏公卿聞廬江樂土來下道病困不能復前儻可相救翼答云家有弊廬可俱歸乎公卿曰幸甚即扶與俱到家養視積日既困公卿謂翼曰馬上有金千餘餅素二十匹可賣殮餘以相謝言絶而亡翼賣素買衣衾殯殮之葬埋高敞之地以金置棺下不使人知乘馬去公卿兄長公見翼乘馬謂必殺公卿陰告官收翼具以狀對長公迎喪發棺下得金如數叩頭謝以金投其門中翼送長安還之汝南先賢傳曰袁閎字夏甫延熹末黨事將作閎遂散髮乃築土室四周於庭潛身十八年終于土室之中臨卒勑其子曰勿設殯棺衣衾之備也但著禈衫踈布單衣幅巾襯尸於板床之上五百墼為藏會稽典録曰趙曄字長君山陰人也少為縣吏奉檄迎督郵曄甚恥之由是委吏到犍為詣慱士杜撫受韓詩撫嘉其精力盡以其道授之積二十年不還家人為之發喪制服至撫卒曄經營葬之然後歸家又曰張諛字彥承上虞人也與同鄉丁孝正相親葬送過制謏書難之曰吾聞班固善陽孫之省葬惡始皇之飾終夫倮以矯世君子弗為若乃據周公之定品依延州而成事取中庸以建基獲美稱於當世不亦優哉又曰謝夷吾轉下邳令預自剋死日如期果卒勑其子曰漢末嘗亂有發掘露骸之禍使縣棺下葬墓不起墳楚國先賢傳曰韓塈將終遺言曰夫俗奢示之以儉儉則節之以禮歷見前世送終過制失之甚也若曹敬聽吾言斂以時服葬以土藏穿畢便葬送之以瓦器慎勿有增益襄陽耆舊記曰襄陽城南邊大道有諸葛女郎墓者是諸葛仲茂女冢也年十三四亡茂婦憐之不能自遠故近臣葬之日日往哭又曰秦頡者字初起頡之南陽過宜城中一家東向大道住車視之曰此居處可作冢後喪還至此住處車不肯前故吏為市此宅葬之今宜城城中大冢前有二碑是也又曰有俍子者家訾萬金而自少小不從父語臨亡意欲葬山上恐兒不從到言葬我著瀦下石磧上俍子曰我田來不奉教從今當從此一語遂盡散家財作冢積土繞之成一洲長數百步元康中始為水所壞俍子前漢人也譙周三巴記曰巴國有亂巴國將畢曼子請師於楚楚人與師曼子已平巴國既而楚遣使請城曼子曰吾誠許子之君矣持頭往謝楚王城不可得乃自刎以頭與楚子楚子歎曰吾得臣若巴曼子何以城為乃以上卿禮葬曼子頭巴國葬其身亦然華陽國志曰德陽縣有青石祠山源沃美有澤原之利士女多貞孝車騎將軍鄧芝方之鄧林有終焉之志沒遂葬其山博物志曰淡臺子羽渡水而子溺死人將葬之滅明曰此命也吾豈與螻蟻為親魚鱉為集於是遂以水葬之又曰漢滕公夏侯嬰死公卿送葬至東郭門外四馬不行掊地悲鳴即掘馬蹄下得石槨其銘曰佳城鬱鬱三千年見白日于嗟滕公居此室乃葬所地故謂之馬冢焉又曰河內淇園張公老而無子資財纍億求沒入官死葬園中于今供祀犧牲永昌郡傳曰建寧郡葬夷置之積薪之上以火燔之煙氣正上則大殺牛羊共相勞賀作樂若遇風煙氣旁邪爾乃悲哭也豫章記曰許子將墓在郡南四里昔子將以中國大亂遠來渡江隨劉繇而卒藏于昌門裏于時漢興平二年也吳天紀中太守吳興沈季白日於廳事上坐忽然如夢見一人著黃單衣黃巾稱汝南羊與許子將求改葬因忽不見即求其喪不知豦所遂招魂葬之命文學施遐為招魂文越地傳曰禹井井者法也以為禹葬以度不煩人衆樂資九州志曰渡之鹽官有奉禪山昔始皇過此而美之死因葬焉有廟在平地于今民祠之述征記曰荀氏葬在彭城東岸東岸有一丘民俗謂之荀氏葬或云斯則徐偃王葬后倉者也古徐國宮人娠而生卵棄之水濱有犬名后倉銜而歸伏而成人遂為徐之嗣君純筋無骨號曰偃王偃王躬行仁義衆國附之得朱弓之瑞周穆王命楚滅之后倉將死生角九尾實黃龍也又曰魚山臨清河舊屬東阿東阿王曹植每升此山有終焉之志植之所遊池沼溝渠悉存既葬于山西有二石柱猶存也地今割并穀城鄧德明南康記曰陽道士葬巖右室元嘉中道士過世臨終語弟子等可送吾置彼石室巾褐香爐此外無所須也及其亡日謹奉遺命葬經數年尸猶儼然葛巾覆之如初弗朽後忽不復見今舟行者過其山渚尚聞香氣咸異焉解道處齊記曰魏黃初三年文帝弟燮封濮陽王臨終顧命葬近蘧瑗之墓吾常想其為人願託賢哲之靈扶南傳曰頓遜國人死或鳥葬或火葬鳥葬者病困便歌儛送郭外有鳥如鵝緑色飛來萬計啄食都盡斂骨焚之沉之於海此上行必生天鳥若不食自悲傷乃就火葬取骨埋之是次行也鄴中記曰石勒陵在襄國城西南三十里名高陵不築牆不種樹立堂皇五間安欑圖勒大臣像又於堂皇東立重樓虎陵在鄴西北角既葬鄴中便亂其封域故未有名域云尋被掘凡此二陵皆僞葬右勒虎自別於深山風俗通曰王喬為葉令天下一玉棺於廳事前令臣吏試入不動搖喬曰天帝獨欲召我沐浴服飾寢其中蓋便立覆之宿昔葬於城東土自成墳其夕縣中牛皆流汗吐舌人無知之者皇覽曰舊漢家之葬方中百步穿築為方城其中開道足施六馬發三河三輔近郡卒徒十萬數復土姚信士緯曰蓋葬於寬平則恐後世都邑居之葬於陵野則恐民人耕稼及之厚槨大棺人所為用下一寡材木民人率多發掘以繕其居千墳萬壙無不毀者其唯瓦棺薄葬斂以時服依于高丘徹于深穽庶乎不辱耳語林曰王太保有二兒喪一兒欲還舊塋一兒欲留葬太保乃垂涕曰不忘故鄉仁也不戀本土達也唯仁與達吾二子有焉又曰王武子葬夕孫子荊哭之甚悲賓客莫不為垂涕哭畢向靈曰卿常好驢鳴今為卿作驢鳴既作體似真聲賓客莫不大笑孫聞笑顧謂曰諸君不死令王武子死賓客莫不皆怒須臾之間或悲或笑或怒世說曰阮藉葬母蒸一肥豚飲酒二斗然後臨決直言窮矣都得一號因吐血良久又鄧粲晉記曰籍母將死與人圍棊如故局者求止籍不肯留與決既而飲酒一二升舉聲一號吐血數升也又曰庾文康亡何楊州臨葬云埋王樹著土中使人情何能已文康庾亮諡也何楊州者何充也又曰晉明帝亦解冢宅聞郭璞為人葬後微服往看因問君何以葬龍角此法當滅族主人答云郭景純云此是葬龍耳不出三年當致天子明帝復問云為是出天子耶答非能出招致天子耳相冢書曰凡葬龍耳富貴出五侯葬龍頭暴得富貴人不能見葬龍口賊子孫葬龍齒三年暴死葬龍咽死滅門葬龍腮必卒死天子葬高山諸侯葬連岡庶人葬平地應璩新詩曰野田何紛紛城郭何落落埋葬嫁娶家皆是商旅客喪側食不飽酒肉紛狼籍晉武帝賜劉廙葬錢詔曰故侍中劉廙以清識明鑒有聲前代昔宣皇帝接以師友之恩廙墓為盜賊所發甚用惻然其子阜素甚清貧今當殯葬其給轜車銘旌賜錢給作藏人功至時遺使者祭之晉賜王沉葬錢并地詔曰故驃騎將軍王沉忠允篤誠執德弘毅外清方夏內熙袞職歷位著稱厥功茂焉不幸薨殞志業未究今當葬其賜錢三十萬葬田一頃晉賜傳嘏夫人鮑葬錢詔曰故太常傅嘏昔以令德賢才為先帝所接登龍之際有翼贊盡忠之勳早代殯沒不終功業每念其遺績常存於心今嘏夫人鮑當葬賜錢十萬給作藏人功嘏墓開祭以少牢
