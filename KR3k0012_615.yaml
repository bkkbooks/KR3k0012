body:
  text: 學部八幼學禮記學記曰幼者聽而不問學不躐等也又曲禮曰十年曰幼學論語為政曰子曰吾十有五而志于學三十而立學成能有所立漢書曰東方朔十三學書三冬文史足用十五學擊劍十六學詩書誦二十二萬言十九學孫吳兵法鉦鼓之教亦誦二十萬言時莫之比司馬彪續漢書曰荀悅十二能讀春秋貧無書每至市間閲篇牘一見多能誦記後漢書曰張堪早孤讓先父餘財數百萬與兄子年十六受業長安志美行厲諸儒號曰聖童魏志曰鍾會母性矜嚴勤見規誨四歲授孝經七歲誦論語八歲誦詩十歲誦尚書十一誦易十二誦春秋左氏國語十三誦周禮十四誦成侯易記十五便入太學問四方奇文異訓謂會曰學猥則倦倦則意怠故以漸訓汝今可以獨學矣西晉趙至字景真年十四隨人入太學觀書時嵇康於學寫石經古文異事訖去遂逐車問康異而語之為諸生宋書曰王儉幼篤學手不釋卷賓客或相稱美僧虔曰我不患此兒無名正恐名太盛耳乃手書崔子玉坐右銘以貽之丹陽尹袁粲聞其名及見之曰宰相之門栝柏豫章雖小已有棟梁氣矣南史曰虞荔字山披會稽餘姚人也幼聰敏有志操年九歲隨從伯闡候太常陸倕問五經十事荔對無遺失倕甚異之太守衡陽王辟為主簿荔又辭以年小不就後魏書曰祖瑩字元珍范陽人年八歲能誦詩書十二為中書博學耽書以晝繼夜父母恐其成疾禁之不能止常密於灰中藏火驅逐僮僕父母寢睡後燃火讀書以衣被蔽窗戶恐漏光明為人所覺內外親戚呼為聖小兒又曰任城王澄子順字子和年九歲師事樂安陳豐初書王羲之小學篇數千言晝書夜誦旬有五日一皆通利豐奇之白澄曰豐十五從師迄于白首耳目所經未見此比江夏黃童不得無雙也澄笑曰藍田生玉何容不爾十六通杜氏春秋恆集門生討論同異三國典略曰齊王紘字師羅太安狄郡人北豫州剌史基之子也年十三楊州剌史郭元貞撫其背曰汝讀何書對曰誦孝經元貞曰孝經云何曰在上不驕為下不亂元貞曰吾作剌史豈其驕乎紘曰雖不驕君子防未萌亦願留意梁書曰西陽王犬鈞性厚重不妄戲弄年七歲武帝問讀何書對曰學詩因令諷誦即誦周南音韻清雅帝重之因賜王羲之書一卷三國典略曰梁孝元字世誠初年五歲梁武問曰讀何書對曰能讀曲禮梁武曰汝試言之孝元即誦上篇左右莫不驚歎及長精神爽俊殷興通語曰殷禮字往嗣幼而鄉里異之七歲就官學書在師未嘗戲弄諷誦恆不為聲潛識而已師殺雞詣禮父穎曰賀此子能興君門行在舟車手不釋卷從曲阿往返遂不知隄瀆廣狹及行旅喧鬧未嘗視之時人語曰奇才強記殷往嗣後與張溫使蜀至荊州虎牙遭水衆人失色往嗣見之無異諸葛亮見之歎曰東吳菰蘆中乃有此奇偉晚學國語曰晉文公問元帥於趙衰元帥上卿對曰郤縠可行年五十矣縠晉大夫守學彌惇夫先王之法德義之府也志記德義生民之本也能惇篤者不忘百姓也請使郤縠公從之說苑曰晉平公問師曠曰吾年七十欲學恐晚如何對曰少年如日出之光二十而學如日中之光老學如炳燭之明孰與夜行乎公曰善哉後漢書曰獻帝詔曰孔子歎學之不講講者習也不講則所識日忘今耆儒年踰六十去離本土營求糧資不得專業結童入學白首空歸長委農野永絶榮望朕甚愍焉其依科罷者聽為太子舍人劉艾獻帝紀曰時長安中謠曰頭白皓然食不充糧褁衣褰裳當還故鄉聖主愍念悉用補郎舍是布衣被服玄黃齊書曰張充字延符少好逸遊父緒嘗告歸至吳始入西郭逢充獵右臂鷹左牽狗遇船至便放紲脫韝拜於水次父緒曰一身兩役無乃勞乎充曰充聞三十而立今充二十九矣請至來年緒曰過而能改顏氏子焉延明年便改多所該通唐書曰姚元崇玄宗獵于渭濱上曰卿頗知獵乎元崇曰臣少居廣城大澤不知書唯以射獵為事年四十方遇張憬藏謂臣當以文學備位將相無為自棄爾來折節讀書今雖官位過忝至於馳射老而猶能於是乎驅鷹放犬遲速稱旨上大悅曰久不見卿思有顧問卿可於宰相行中行常後上縱轡久顧之曰卿行何後公曰臣官踈賤不合參宰相行上曰可兵部尚書平章事桓子新論曰高君孟頗知律令常自伏寫書署郎哀其老欲代之不肯云我躬自寫乃當十遍讀魏應璩答韓文憲書曰昔公孫弘皓首入學顏涿聚五十始涉師門朝聞道夕殞聖人所貴足下之年甫在不惑如以學藝何晚之有若能上逮南榮忘食之樂下踵寧子黑夜之勤窮文盡義無微不綜規富貴之榮取金紫之爵是夏侯勝拾芥之謂也好學論語曰子曰十室之邑必有忠信如丘者焉不如丘之好學也已矣又曰有顏淵者好學不遷怒不二過不幸短命死矣今也則亡未聞好學者也又曰孔文子何以謂之文也子曰敏而好學不恥下問是以謂之文又曰我非生而知之者好古敏以求之也又曰子夏曰日知其所亡月無亡其所能可謂好學也已禮記檀弓上曰孔子與門人立拱而尚右二三子亦皆尚右孔子曰二三子之嗜學我則有姊之喪故也二三子皆尚左新序曰葉公諸梁問樂主鮒曰晉大夫趙文子為人何若對曰好學而受規諫仁也江出岷山其源若甕口至楚國其廣十里無它故其下流多也好學受規諫宜乎立哉漢書曰陳平少時家貧好讀書治黃帝老子之術兄伯常耕田縱平遊學東觀漢記曰馮豹字仲文好儒學以詩傳教授鄉里為之語曰道德斌斌馮仲文又曰和熹鄧后七歲讀論語志在書傳母常非之曰當習女工今不是務寧當學博士耶后重違母意晝則縫紉夜私買脂燭讀經傳宗族外內皆號曰諸生范曄後漢書曰荀爽幼好學太尉杜喬見而稱之曰可為人師爽遂耽思經書慶弔不行徵命不應張璠漢記曰朱穆字公叔好學專精每一思至中食失餐行墜坑坎亡失冠履其父常言穆大專幾不知馬之幾足後漢書曰張霸就樊倏受嚴氏公羊春秋遂博覽五經諸生孫綝劉固等慕之各市宅其傍以就學耶魏書曰吉茂字叔暢好書不恥惡衣惡食而恥一物之不知建安初與扶風蘇則共入武功南山精思數歲北齊書曰劉逖字子長少而聰敏在遊宴之中卷不離手值有文籍所未見者則終日諷誦或通夜不歸其好學如此也文士傳曰李庸字蕭遠篤志好學善屬文詞藻清美常燃柴草火以讀之南史曰梁劉峻字孝摽平原人也永明中從桑乾還自謂所見不博更求異書聞有者必往祈借清河崔蔚祖謂之書淫北史曰隨劉臻為儀同性恍忽耽經史經日覃思至於世事多所遺忘有劉訥者亦任儀同俱為太子學士情好甚密臻住南訥住東臻嘗欲尋訥謂從者曰汝知劉儀同家乎從者不知尋訥謂還家因答曰知於是引之而去既扣門臻尚未悟謂至訥家乃據鞍大呼曰劉儀同可出矣其子迎門臻驚曰汝亦來耶其子答曰是大人家於是顧盻久之乃悟叱從者汝大無意吾欲造劉訥耳杜預自敘曰少而好學在官則勤於吏治在家則滋味典籍玄晏春秋曰余家素貧窘晝則務作於勞夜則甘疲寐及二時之務書卷生麝篋不解緘唯季冬裁得一旬學或兼夜寐或戲獨否或對食忘餐或不覺日夕是以遊出之事吉凶略絶富陽男數以全生之道誨子方之好色號子為書帙廢學毛詩緇衣曰子𥘞剌學校廢也世亂則學校不修焉青青子𥘞悠悠我心縱我不往子寧不嗣音尚書曰不學牆面涖事惟煩論語曰德之不修學之不講是吾憂也左傳曰學者植也不學將落也史記曰周道既廢焚燒詩書故明堂石室金匱玉板圖籍散亂也又曰始皇諸生到者拜為郎七百人密種瓜於驪山山溫成實令諸生就視說之人人不同乃為伏機方難未定機發從上土填之其坈在陽西南三望里今為閔儒鄉也又曰秦始皇令天下有藏詩書百家語者悉詣守尉燒之敢偶詩書者棄市以古非今者族之漢書曰夫子沒而微言絶七十子終而大義乖前漢書曰綘侯不好文學每召諸生東向坐而責之不以賓主之禮相接東觀漢記曰班超字仲升家貧為官傭寫書輟書歎曰丈文夫當效傅介子張騫立功異域以取封侯安能久事筆硯乎三國典略曰齊許惇無學術與邢劭魏收等同列諸人談說經史惇隱几而睡深為勝流所輕梁書曰柳津字元舉性強直乏風華或勸之聚書津曰吾嘗令道士上章驅鬼安用此鬼名耶隋書曰宇文慶沉深有器局少以聰敏見知周初受業東觀頗涉經史既而謂人曰書足記姓名而已安能久事筆硯為腐儒之業于時文州民夷相聚為亂慶應募從征賊保據巖谷徑路懸絶慶束馬而進襲破之以功授都督唐書曰馬燧少嘗與諸兄讀書乃輟卷歎曰天下將有事矣丈夫當立功征伐以濟四海安能矻矻為一儒也西京雜記曰傅介子年十四好學書常棄瓢而歎曰大丈夫當立功絶域何能坐為散儒卒斬胸奴使者還報拜中郎將後復斬樓蘭王首封義陽侯金樓子曰曹子文少善射御力格猛獸不避險阻數從征伐志意慷慨魏武常抑之曰汝不念讀書而好乘馬擊劍此一夫之用何足貴也
