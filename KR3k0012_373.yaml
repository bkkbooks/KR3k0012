body:
  text: 人事部十三髀股説文曰髀股外也又曰股髀也釋名曰髀卑也在下稱也股固也為強固也易説卦曰巽為股春秋元命苞曰髀之為言跂也陰二故人兩髀尚書咎繇謨帝曰臣作朕股肱耳目左傳僖中曰宋公及楚人戰於泓宋公既成列楚人未濟司馬曰彼衆我寡及其未濟也請擊之公曰不可既陳而後擊之宋師敗績公傷股又襄四年曰齊侯襲莒門于且于且于莒邑傷股而退又襄二十五年曰崔杼之亂甲興公登臺而請弗許公踰牆又射之中股又哀下曰衛石圃攻公公踰北方而墜折股戰國策曰蘇秦讀書欲睡引錐自剌其股血流至踵漢書曰高祖股上有七十二黑子又曰魏勃少時欲求見齊相曹參家貧無以自通乃早掃齊舍人門因得自進及灌嬰責其勸齊王反狀勃曰失火之家豈暇先言大人然後救火乎因退股戰不能言嬰曰人謂勃勇庸妄人耳何能為乎東觀漢記曰耿弇擊張步於東城飛矢中弇股以手中刀截之軍中無知者魏志曰諸葛亮軍退司馬宣主使張郃追之郃曰軍法圍城必闕歸軍勿追宣王不聽郃不得已逐之蜀軍乘高布伏弓弩亂發矢中郃髀股江表傳曰孫策攻苲融為流矢中傷股不能乘馬因自輿還九州春秋曰劉備奔荊州劉表甚敬禮之備作上客數年嘗於坐中起至廁見髀裏肉生流涕還坐表問備備曰昔年嘗身不離鞍鞞肉皆消今不復騎髀裏生肉日月若馳老將至矣而功業不立是以悲耳晉中興書曰王恭敗單馬奔曲阿不堪久騎兩髀生瘡不能復去曲阿人殷礭以船載之為胡浦尉所得三國典略曰後周盧昌期祖英伯反宇文神舉討平之神舉以英伯壯節欲令寬赦軍人已割其髀肉如鵝卵矣英伯顏色不變遂遣誅之唐書曰李績初平王世充獲其故人單雄信績表稱其武藝請以官爵贖之高祖不許臨將就戮績對之號慟割股肉以啖之曰生死永訣典略曰王符字節信安定人渡遼將軍皇甫規去官歸安定有人前以貨買鴈門太守者亦去官歸書剌從規規臥不迎使呼入既坐問啖鴈美乎又以其剌刮髀聞符至大禮之段龜龍涼州記曰隱王張美人年色壯艷出家為道呂隆逼之張自投門樓雙股頓折口誦經色自若俄而死太公金匱曰武王伐殷丁侯不朝尚父乃引畫丁侯射之丁侯病遣使請臣尚父乃以十干日別去箭丁侯病乃愈四夷聞皆懼越裳氏獻白鳥也山海經曰長股國為人常被髮一曰長腳范注方曰青龍中司徒吏顏奮女苦風一髀偏枯農犢民為穿地作坑取雞矢荊葉燃之令煙內脛坑中視蟲出長尺頭尾赤病愈臀廣雅曰臀謂之脽亦謂臎脽音誰臎音翠釋名曰臀遌也高厚有殿遌也周易困卦初六曰臀困于株木入于幽谷三歲不覿凶又姤卦曰臀無膚其行次且國語曰晉成公之生其母夢神規其臀以黑曰使有晉國故名之黑臀膝釋名曰膝申也可屈申也膝頭曰膞膞圓也因形圓而名之禮記檀弓下曰穆公問子思曰為舊君反服古歟子思曰古之君子進人以禮退人以禮今之君子進人若將加諸膝退人若將墜諸淵無為戎首不亦善乎又何反服之禮之有孝經曰故親生之膝下以養父母日嚴史記曰衛鞅復見孝公與語不自知膝之前於席也魏志曰朱建平善相文帝將出取馬入建平曰此馬之相今日死矣文帝將乘馬馬惡衣香囓帝膝帝大怒即使殺之又曰諸葛亮復出岐山詔張郃督諸將至木門與亮軍交戰飛矢中郃右膝薨又曰蘇則與董昭俱為侍中昭嘗枕則膝臥則推下之曰蘇則膝非佞人之枕又曰鍾繇有膝疾拜起不便常輿車上殿魏略曰初袁熙納甄后熙出行在幽州后留侍姑及鄴城破袁紹妻及后坐堂上文帝入紹舍后怖以頭伏姑膝上文帝謂曰袁夫人令新婦舉頭姑乃捧后令仰帝就視顏色非凡稱歎之太祖聞遂為迎之又曰諸葛亮在荊州以建安初與潁川石廣元徐元直汝南孟公威等俱遊學三人務於精熟而亮獨觀其大略每晨夜從容常抱膝長嘯而謂三人曰卿諸人仕進可至郡守刺史三人問其所至亮但笑而不言三國典略曰王僧辨平侯景或謂僧辨曰朝士來者孰當先至僧辨曰其周弘正乎俄而弘正與弟弘讓自拔迎軍僧辨甚喜謂之曰公可坐膝上弘正對曰可謂加諸膝也老夫何足當之莊子曰黃帝聞廣成子在於崆洞之上間居三月復往邀之廣成子南首而臥黃帝從下風膝行而進列女傳曰桀日夜與末嬉及宮人飲酒常置末嬉於膝上聽用其言黃帝素問曰膝者筋之府脛説文曰脛胻也胻胡郎切釋名曰脛莖也直而長似物莖尚書泰誓曰啇王受斫朝涉之脛孔安國注曰冬月見朝涉水者謂其脛耐寒斬視之論語憲問恥曰原壤夷俟孔子曰幼而不遜悌長而無述焉老而不死是為賊以杖叩其脛後漢書曰馬援擊西羌中流矢貫脛帝以璽書勞之東觀漢記曰淳于恭養兄崇孤而教誨學問時不如意輒呼責數以捶自擊其脛欲感之兒慚負不敢復有過魏略曰北丁零有馬脛國聲似鴈鶩從膝脛以下生馬蹄走疾於馬正部曰夏禹治水腓無胈脛無毛山海經曰交脛國為人交脛郭璞注曰腳脛曲相交所謂交趾也有赤脛民赤水之東有長脛之國腓脹説文曰腨腓脹也腨市兗切腓符非切脹直良切易艮卦曰六二艮其腓又咸卦六二曰咸其腓凶居則吉東觀漢記曰馬援為隴西太守擊羌中矢貫腓脹上聞賜羊三千牛三百頭以養病山海經曰無䏿之國為人無䏿郭璞曰脹脹䏿音啓又公弟切韓子曰晉平公與唐彥坐而出叔向入公曳一足叔向問之公曰向吾侍唐子腓痛足痺而不可伸足爾雅曰趾足也説文曰足在下也釋名曰腳卻也以其坐時卻在後也易説卦曰震為足尚書説命曰若跣弗視地厥足用傷禮記玉藻曰足容重舉欲遲也又祭義曰樂正子春下堂而傷其足數月不出猶有憂色門弟子曰夫子之足瘳矣數月不出猶有憂色何也樂正子春曰父母全而生之子全而歸之可謂孝矣不虧其體不辱其身可謂全矣故君子頃步而弗敢忘孝也今子忘孝之道豫是以有憂色也一舉足而不敢忘父母一出言而不敢忘父母是故道而不徑舟而不遊不敢以先父母之遺體而行危殆左傳莊公曰鄭伯治與於雍糾之亂者刖強鉏君子謂強鉏不能衛其足又莊公八年曰齊亂殺孟陽于床曰非君也不類見公之足于戶下遂弒之又成下曰齊刖鮑牽仲尼曰鮑莊子之智不如葵葵猶能衛其足言鮑牽居亂不能危行言遜又昭二年曰衛襄公夫人薑氏無子嬖人婤姶生孟縶孟縶之足不良能行跛也婤音周姶烏合切又哀下曰衛侯與諸大夫飲酒褚師聲子襪而登席公怒曰必斷而足事具手部穀梁傳定公會齊侯于夾谷孔子曰笑君者罪當死使司馬行法焉手足異門而出史記曰韓信使人言齊偽詐多變願為假王漢王大怒張良陳平躡漢王足因附耳語曰漢方不利寧能禁信之王乎漢書曰漢王項羽相與臨廣武之間漢王數羽十罪羽大怒伏弩射中漢王漢王傷胸乃捫足曰虜中吾指又曰張湯所愛史魯謁居病臥閭里主人湯自往視病為謁居摩足又曰昭帝立遣李陵故人隴西任立政等三人俱至胸奴招陵單于置酒政等見陵未得私語即目視陵而數自循其刀環握其足陰喻之言可歸漢後漢書曰李固足下有龜文續漢書曰楊彪見漢祚將終遂稱腳攣不復行積十餘年王隱晉書曰陶侃為荊州杜韜音韜將王真遙語真橫腳馬上侃説曰杜韜為益州刺史盜用庫金父死不奔喪君本佳人何隨之天下無白頭賊也真聞下其腳辭又順侃知其意使降人喻真真乞得先信乃截髮為信蜀賊糧盡真既降而走晉書曰陶潛無履江州刺史王弘顧左右為之造履左右請履度潛便於座伸足令度焉弘要之還州問其所乘答云素有腳病向來籃輿亦足自反乃令一門生二兒共輿之三十國春秋曰王濟嘗與武帝棊濟伸腳在局下因問孫皓曰聞君生剝人面皮何也皓曰見人臣無禮於其君者則剝之武子大慚遽縮腳晉陽秋曰周顗既遇害王彬告之甚哀敦怒曰周伯仁凡人遇汝何為如此彬曰伯仁長者君之親友在朝雖無蹇諤亦無所阿黨且加之極刑何痛如之左右見敦盛怒竊勸跪謝彬曰腳痛不能跪拜敦復曰腳痛孰與頸痛咸為失色續晉陽秋曰習鑿齒以腳病廢於里巷符堅滅樊鄧素聞其名與釋道安俱舉而致焉與語大悅以其蹇疾裁堪半丁與諸鎮書曰晉氏平吳利在二陸今破漢南得士一人半耳三國典略曰侯景左足上有肉瘤其狀如龜戰應剋捷瘤則隱起如其不勝瘤則低下及奔敗瘤陷肉中唐書曰工部尚書賈直言父道沖以伎術待詔翰林因言事獲罪於代宗皇帝詔逐之賜鴆於路直言偽令其父拜四方辭上下神祇伺使者視稍怠即取其鴆以飲遂迷仆而死明日鴆泄于足而後復蘇代宗聞之減父罪直言亦自此病躄家語曰南宮縚音韜見孔子未嘗越履往來過之足不履影老子曰千里之行始於足下韓子曰楚人和氏得玉璞楚山之中獻之武王武王使玉人相之曰石也刖其左足武王薨文王即位又奉獻之玉人相之曰石也刖其右足成王即位和抱其璞哭于楚山之下三日三夜泣盡繼之以血王使玉人理之得寶焉名曰和氏璧又曰魯哀公問孔子曰吾聞夔一足信乎對曰夔人也獨通於聲堯曰夔一而足矣使為樂正又曰晉平公與唐彥坐而出叔向入公曳一足叔向問之公曰吾待唐子腓痛足痺而不敢申叔向不悅公曰子欲貴吾爵子子欲富吾祿子夫唐先生無欲也非正坐吾無以養之三輔舊事曰武帝發兵攻衛太子連斗五日白虎闕前溝中血沒足吳越春秋曰越王念吳欲復怨非一旦也苦思勞心夜以接日足清則漬之以水冬寒則抱冰夏熱則握火愁心苦志縣膽於戶出入嘗之不絶於口帝王世紀曰大禹右足文履已字抱朴子曰老君足下有八卦穆天子傳曰至于巨搜氏巨搜之人乃獻白鶴之血以飲天子且具牛馬之湩湩乳也今江甫人多呼乳為湩音寒凍之凍以洗天子之足山海經曰柔利國為人一手反膝曲足一曰留利之國人足反折跛踵國其為兩足皆大郭璞注曰其人行足跟不著地也周書曰晉平公使師曠見太子晉曰吾聞王子之語高於太山夜寐晝居不安不遠道願一言王子曰吾聞太師將來吾心甚喜既以見君子喜而又懼吾甚年少見子而攝盡忘吾度師曠束躅其足曰善哉善哉王子曰太師何舉足驟師曠曰天寒足趵居劬切是以數也王子曰請入坐遂席弦琴師曠歌無射瀨鄉記李母碑曰老子足蹈二五西京雜記曰廣川王發欒書冢樞明器朽爛無餘有一白狐見人驚走左右逐戟之不能得傷其左腳夕王夢一丈夫鬚眉盡白來謂王曰何故傷吾左腳仍以杖擊王左腳王覺左腳腫痛生瘡至死不差王子年拾遺録曰周昭王夢羽人遺藥以之塗足則飛上天萬里之外蕭廣濟孝子傳曰五郡孝子者中山常山魏郡巨鹿趙國人也少去鄉里孤無父母相隨於衛國因結兄弟長元重次仲重次叔仲次季仲次稚重期夕相事財三千萬於空城中見一老姥兄弟下車再拜曰願為母母許焉積二十四年母得病口不能言五子乃仰天歎願使我母語即便得語謂五子曰吾太原董陽猛女嫁同縣張文賢死亡我男兒名焉遺七歲值亂亡失心前有七星右足有黑識語未竟而卒五子送喪會朝歌長晨出亡其記囊疑五子所竊收得三重詣河內告枉具言始末太守號哭曰生不識父與母相失痛不自聊知近為五子所養馳使放三重會稽典録曰黃昌為蜀郡太守初昌為州書佐婦寧於家遇賊遂流轉入蜀為民妻其子犯法乃詣昌昌疑不類蜀人因問所由對曰妾本會稽餘姚戴次公女州書佐黃昌妻嘗歸家為賊所略遂至於此昌驚呼前謂曰何以識黃昌左足心有黑子常言當為二千石乃出足示之相持悲泣還為夫妻楚辭卜居曰漁父鼓枻歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足踝釋名曰踝跖踝踊也亦因其形踝踝也足後曰跟在下旁著地踵藂也上體之所鍾藂也史記曰蘇秦握錐自厲流血至踝英雄記曰向詡坐板床有兩踝處入板中二寸許陸機別傳曰孟玖欺成都王頴曰陸機司馬孫承備知機情可考驗也頴於是收承父子五人考掠備加踝骨皆脫出終不誣機
