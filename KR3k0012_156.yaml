body:
  text: 州郡部一敘京都上釋名云都者國君所居人所都會也邑猶俋聚會之稱也左傳曰邑有先君宗廟之主曰都尚書太傳曰十邑為都尚書曰建邦設都又曰成王在豐欲宅洛邑使召公先相宅作召誥惟太保先周公相宅厥既得卜則經營毛詩文王受命有此武功既伐于崇作邑於酆周禮大司徒以土圭之法測土深正日影以求地中又曰四縣為都又曰距國五百里為都公羊傳曰京師者天子之居也京者大也師者衆也天子之居必以衆大之辭言之白虎通曰京師者何謂也千里之邑號也明什倍諸侯法日月之徑千里或曰夏為夏邑殷為商邑周為京師帝王世紀曰天子畿方千里曰甸服甸服之內曰京師又曰天子所居宮曰都風俗通曰京謂非人力所能成天地性自然也京師義亦取此帝王世紀曰宓羲為天子都陳在禹貢豫州之域西望外方東及明緒於周陳胡公所封故春秋傳曰陳太昊之墟也於漢屬淮陽今陳國是也神農氏亦都陳又營曲阜故春秋稱魯大庭氏之庫黃帝都涿鹿於周官幽州之域在漢為上谷而世本云涿鹿在彭城南然則上谷本名彭城今上谷有涿鹿縣及蚩尤城阪泉地又有黃帝祠皆黃帝戰蚩尤之處也或曰黃帝都有熊今河南新鄭是也少昊民自窮桑登位故春秋傳曰世不失職遂濟窮桑登帝位在魯北後徙曲阜於周為魯在禹貢徐州蒙羽之野奎婁之分降婁之次周以封伯禽故春秋傳曰命伯禽而封少昊之墟是以書敘稱魯公伯禽宅曲阜是也顓頊氏自窮桑徙商丘於周為衛在禹貢冀州太行之東北踰常山及兗州桑土之野營室東壁之分豕韋之次故春秋傳曰衛顓頊之墟也謂之帝丘今東郡濮陽是也帝嚳氏都宅今河南偃師是也禹貢外方之城嵩之北或言在梁非也帝堯氏始封於唐今中山唐縣是也堯山在焉唐水在西北入唐河南有望都縣山即堯母慶都之所居也相去五十里都山一名亙山北登堯山南望都山故名其縣曰望都而地理志堯山在唐南山中張晏以堯山實在唐北地理志堯之以後徙涿鹿世本云在彭城南今上谷郡北自有彭城非宋彭城也後又徙晉陽今太原縣也於周禮在并州之域及為天子都平陽於詩風為唐國武王子叔虞封焉更名唐故吳季扎聞唐之歌曰思深哉其有陶唐氏之遺氏乎帝舜其所營都或言蒲阪即河東縣帝王世紀曰夏鯀封崇伯故春秋傳曰謂之有崇伯鯀國在秦晉之間左氏傳曰趙穿侵崇是也禹受封為夏伯在禹貢豫州外方南角亢氐之分壽星之次於秦漢屬潁川本韓地今河南陽翟是也受禪都平陽或在安邑或在晉陽於漢平陽安邑皆屬河東晉陽屬太原在冀州大行恆山之西太原太嶽之野參代之分實沉之次於周為晉今司隸并州之域也相徙商丘於周為衛成公夢康叔曰相奪子享是也少康中興復還舊都故春秋傳曰復禹之跡不失舊物是也世本又言夏后居陽城本在大梁之南於戰國大梁魏都今陳留浚儀是也案經傳曰夏與堯舜同在河北冀州之域不在河南也故五子歌曰惟彼陶唐有此冀方今失厥道亂其紀綱乃底滅亡言自禹至太康與唐虞不易都域也然則居陽城者自謂禹避商均時非都也故戰國策稱桀之居左天門之險右天溪之陽成皋在其北伊洛出其南吳起對魏武侯亦言桀之居左河濟右太華伊井關在其南羊腸在其北案地理志上黨商都有天井關即天門也有羊腸坂在太原晉陽西北九十里為通西上郡關即吳起之所云也洛皆在陽城非都審矣帝王世紀曰商契始封於商在禹貢太華之陽上洛商是也世本契居番相徙商丘本顓頊之墟故陶唐氏之火正閼伯之所居也故春秋傳曰閼伯居商丘祀大火相因之故商王大火謂之辰故辰為商星今濮陽是也然則契之所封商丘商洛是也商土於周為衛商是也而學者以商丘為契封謬矣湯始居亳學者咸以亳本帝嚳之墟在禹貢豫州洛河之間今河南偃師西二十里尸鄉之陽亭是也以經考之事實甚失其正孟子稱湯居亳與葛為鄰案地理志葛今梁國寧陵之葛鄉是也湯地七十里葛又伯耳封域有制葛伯不祀湯使亳衆為之耕有童子餉食葛伯奪而殺之計寧陵至偃師八百里而使亳衆為耕童子餉食非其理也今梁自有二亳南亳在穀熟北亳在蒙非偃師也故古文仲虺之誥曰乃葛伯仇餉初征自葛即孟子之言是也湯又盟諸侯于景亳然則二亳皆在梁矣春秋會于亳是也太甲既立不明伊尹放諸桐世本又言太甲從上司馬在鄴西南案詩書太甲無遷都之文桐宮其在斯乎仲丁徙囂或曰今河南之敖倉是也故書序曰仲丁徙于囂河亶甲徙相在河北故書序曰河亶甲居相是也祖乙徙耿為河所毀故書序曰祖乙圯于耿今河東有耿鄉是也及盤庚立復南居亳之殷地故書序曰將治亳殷今偃師是也然則殷有三亳二亳在梁國一亳在河南南亳偃師即湯都也蒙為北亳即景亳湯所盟地偃師為西亳即盤庚所徙者也故立政篇曰三亳坂尹是也武丁徙朝歌於周為衛今河內縣也紂自朝歌北築沙丘臺沙丘地理志在巨鹿東北七十里邯鄲國屬趙於禹貢在冀州大陸之野昴畢之分大梁之次至今民俗歌謠男女淫縱猶有紂之餘風世稱趙女之美是也又曰周后稷始封邰今扶風是也及公劉徙邑於豳今新平漆之東北有豳亭是也故詩稱篤公劉于豳斯館至太王避狄循漆水踰梁山徙邑於歧山之陽西北歧城舊趾是也故詩稱率西水滸至于歧下南有周原故始改號曰周王季徙程故書序曰維周王季宅程是也故孟子稱文王生於畢郢西夷人也暨文王受命徙都於酆在今京兆之西是也故稱伐戎於崇作邑於酆及武王伐紂營洛邑而定鼎焉今洛陽西南洛水之北有鼎中觀是也周公相成王以酆鎬偏處西方之貢不均乃使邵公卜居洛水之陽以即土中故援神契曰八方之廣周洛為中於是遂築新邑營定九鼎以為王之東都之洛邑故周書稱我乃卜澗水東瀍水西唯洛食是為王城名曰東周故公羊傳曰王城者何東周也地理志王城本郟鄏之地是以或謂之郟鄏故春秋傳曰成王定鼎于郟鄏河南是也今郟鄏東門名鼎門蓋九鼎所從入也成王既卜營洛邑建明堂朝諸侯復還酆鄗故書序曰成王既黜殷命還歸在酆至懿王徙大丘秦謂之廢丘今京兆槐里是也世本曰懿王居大丘厲王淫亂出于彘今河東永安是也平王即位徙居洛洛誥所謂新邑也國語曰幽王滅周乃東遷本殷之畿內在禹貢豫州外方之域河洛瀍澗之間周於南柳七星張之分鶉火之次也及敬王避子朝之亂東居成周故春秋經曰天王入于成周是也後六年王室定遂徙都成周是後晉又率諸侯之徒修繕其城以成周城小不受王都故壞翟泉而廣焉翟泉地在成周東北今洛陽城中有周王冢是也至赧王又徙居西周而失位又曰秦非子始封於秦故秦本紀稱周孝王曰朕分之土邑秦本隴西秦谷亭是也玄孫莊公徙廢丘周懿王之所都今槐里是也及襄公始受酆之地列為諸侯文公徙汧故秦本紀曰公事獵至汧乃卜居之今扶風郿縣是也寧公又都平陽故秦本紀曰寧公二年徙居平陽今扶風郿之平陽亭是也故秦本紀曰德公元年初居雍今扶風雍是也至獻公即位徙治櫟陽今馮翊萬年是也孝公自櫟陽徙咸陽秦本紀曰作為咸陽築冀闕徙之及漢元年更名新城屬扶風後并於長安故太史公傳曰長安故咸陽也元鼎三年復別為渭城今長安西北渭水陽有故城故西京賦曰秦里其朔實為咸陽是也又曰漢高帝元年始為漢王都南鄭屬漢中秦厲王所置在禹貢梁州之域北達雍南跨巴蜀與秦同分二年北徙櫟陽故秦獻公之所居後居萬年故屬馮翊今京兆縣也都長安秦咸陽之地今京兆所治縣也其城狹小至惠帝元年始更築廣五年乃成光武以武信侯進封蕭王在禹貢徐州之域於周以封子姓之別附庸事在春秋於漢屬豫州今沛國蕭是也及即位於鄗更名高邑建武元年始都洛陽故成周之舊基城東西六里一十步南北九里一百步是以時人謂洛陽為東京長安為西京又曰魏武為魏公都鄴今魏郡是也後文帝因漢之舊復都洛陽以譙為先人本國許昌為漢之所居長安為西京之遺跡鄴為王業之本基與洛陽凡五處故號曰五都博物志曰河東平陽堯所都河東太陽虞所都太保後潁川陽翟夏禹國弘農陜虢所都王季後河南偃師尸鄉湯所都魯國薛奚仲所都河南洛陽周公遷殷民曰成周河南武王遷九鼎周公營之以為王城平王所都河南鞏東周所都扶風槐里周懿王所都扶風郇邑豳鄉公劉所封左馮翊櫟陽秦獻公所封扶風雍秦惠王所都晉書云晉都洛陽至永嘉南遷居建康今潤州江寧縣宋齊梁陳並同居建康梁元帝及後梁蕭察又別居江陵永嘉之亂有十六國各建都邑前涼張軌都燉煌後涼呂光都姑臧後涼禿髮烏孤都略陽西涼李皓都酒泉北涼沮渠蒙遜都張掖前燕慕容廆初都和龍後徙薊又徙鄴後燕慕容垂都中山南燕慕容德都廣固北燕馮跋都和龍前秦符堅後秦姚萇並都長安西秦乞伏國仁都定樂前趙劉聰都平陽從趙石勒都襄國至右季龍都鄴後蜀李特都成都夏赫連勃勃都統萬城又曰永嘉南遷後魏據中原初都代又徙洛陽至文帝遷長安孝靜帝遷都鄴號東魏西魏東魏禪北齊高洋以鄴為上都晉陽為下都西魏禪周周禪隋並都長安隋高祖營大興城后徙居之名曰長安今西京也隋煬帝遷洛陽於故周之王城對伊闕即今東都城也
