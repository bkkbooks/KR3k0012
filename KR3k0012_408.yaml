body:
  text: 人事部四十八交友二范曄後漢書曰孔融宙之子也十歲從父詣京師時河南尹李膺簡重勑外云自京非當世才藝英賢通家子孫輒不得進融故造其門云我與公積代通家子孫膺乃召見問父祖嘗與僕有恩舊曰然吾先君孔子與君先人李老君同德比義而相師友融與君豈非積代通家也衆奇之又曰第五倫始以營長詣郡尹鮮于褒見而異之署為吏後褒坐事左轉高唐令臨去握臂訣曰恨相知晚又曰肅宗始修古禮巡狩方嶽崔駰上四巡頌帝歎之謂侍中竇憲曰知崔駰乎對曰班固數為臣說之然未見帝曰公愛班固而忽崔駰葉公之好龍也可試見駰候憲憲倒屣迎笑謂駰曰吾受詔交公何得薄我哉遂揖入也又曰鍾皓字季明穎川長社人皓少以篤行稱同郡陳實年不及皓皓引與為友又曰張叔升字彥真陳留尉氏人也有大志歎曰人生於世白駒過隙耳安能曲道媚世俗哉守外黃令遇黨錮去官道逢友人班荊而語曰今闕下閹宦專權因相向而泣有老父過之曰嗟乎二大夫何泣之悲龍不隱鮮鳳不藏翼一世網羅泣將何及二人欲與之言不顧而退升竟以黨錮下獄死又曰任末字叔本遊京師教授友人董奉德於洛陽病亡末躬推車載奉德致於墓所由是知名也又曰梁鴻友人高恢字伯達少好老子隱華陰山及鴻東遊思恢作詩遠不復相見恢亦高抗終身不仕又曰陳蕃李膺之敗何顒與蕃膺善遂為官者所陷乃改名姓亡匿汝南間所至皆親其豪傑有聲荊豫之域袁紹慕之私與往來結為奔走之交又曰孔奮字君魚扶風茂陵人也守姑臧長治貴仁平太守梁統深相敬待不以官屬禮之常迎於大門引入見母又曰李燮字德公所交皆捨短取長好成人之美潁川荀爽賈彪雖俱知名而不相能燮並交二子情無適莫世稱其正又曰王允字子師同郡郭林宗一見奇之曰王生一日千里王佐才也遂定交謝承後漢書曰范式為荊州刺史友人南陽孔嵩貧有親老乃變名姓傭於新野縣縣吏遣嵩為式導騶式見而識之呼嵩把臂謂曰子非孔仲山耶對之歎息式勑縣代嵩嵩以傭未竟不肯去又曰陳蕃既被害友人陳留朱震時為銍令聞而棄官哭而收葬又曰許敬字鴻卿汝南人與同郡周伯靈為交友伯靈早亡卿育養其子又曰馬實字伯騫勤結英雄所欲友接負笈荷檐不遠萬里山陽王暢未仕時實慕嵩名往見之屆暢門投剌欲不肯見使從者拒之云行歷未旋實留連日日往伺之謂從者曰夫孝子事親行不踰日而至今不歸非孝子也欲待與相見如凶於路往而不友哭之以為死交暢聞其言歎息壯志因執其手揖引與入美談畢請入見母飲宴定好而別實臨退執暢手訣曰太上立德其次立功幸俱生盛明之世免磚瓦之姿託為丈夫當建名後載不可為空生徒死之物穢天壤之間又曰雷義字仲公豫章人舉茂才讓友人陳重字景公刺史不聽義遂陽狂被髮走不應命鄉里為之語曰膠漆自謂堅不如雷與陳又曰范式字巨卿山陽金鄉人少遊太學與汝南張劭為友劭字元伯二人並告歸鄉里式謂元伯曰後二年當還將過拜尊親見孺子焉乃共剋期至日巨卿果至升堂拜母飲盡歡而別後元伯寢疾篤同郡郅君章商子微晨夜省視元伯臨盡曰恨不見死友尋卒式夢元伯玄冕垂纓而呼曰吾死當以某日葬子豈能相及式覺而悲赴之便服朋友之服投其葬日未屆而喪已發引至壙將定而柩不肯進其母撫之曰元伯豈有望也停柩移時見有素車白馬哭而來母曰必巨卿也既至叩喪言曰行矣元伯死生異路永從此辭會葬者千人皆揮涕式執紼引柩乃前進式留止冢次修墳樹而退又曰范式嘗至京師受業太學時諸生長沙陳平子同在學與式未相見而平子被病曰山陽范式列士也可託死吾歿但以尸埋巨卿戶前乃裂素為書遺巨卿既終妻從其言式行適還有書見瘞愴然感之向墳揖哭為死友乃營護妻兒身自送喪於臨湘未至四五里乃委素書於柩上哭別而去袁山松後漢書曰吳祐放豬長垣澤中誦經而行北海公沙穆遊太學資乏變服為傭與祐賃舂遂為交於杵臼之間華嶠後漢書曰洛陽慶鴻慷慨好義廉范與為刎頸之友時人稱曰前有管鮑後有慶廉司馬彪續漢書曰李膺性簡亢無所交接唯以同郡荀淑陳實為時友東觀漢記曰楊政嘗過馬武稱疾見政對几據床欲令政拜床下入戶前排武徑上床唑武恨言語不懌政因把武臂責之曰卿蒙恩稱蕃臣不思求賢報國而驕天下英俊會信陽侯至責數武合為朋友也又曰尹敏字幼季與班彪相厚每相興談常對案不食晝至暝夜即徹具又曰朱暉同縣張堪有名德每與相見常接以友道暉以堪宿望盛名未敢安之堪至把暉臂曰欲以妻子託朱生暉舉手不敢答堪後仕為漁陽太守暉自為臨淮太守絶相聞見時南陽饑堪妻子貧窮暉乃自往候視其困分所有以賑給之又曰郅惲友人董子張者父先為鄉人所害及子張病將終惲往候之子張病涕視惲不能言惲曰吾知子不悲天命而痛讎不復也子張但目擊而已惲即起將客遮仇人取其頭以示子張見而氣絶又曰趙喜為赤眉兵所圍迫急乃亡走與友人韓仲伯等數十人攜小弱越山出武關仲伯以婦色美慮有強暴者而己受其害欲棄之於道喜怒不聽以泥塗仲婦面載以鹿車身推之每逢賊欲逼奪喜輒言病以此得免又曰閔仲叔恬靜養神弗役於物與周黨相友黨每過仲叔共含菽飲水又曰應順字仲華汝南人少與同郡許敬善敬家貧親老無子為敬去妻更娶魏志曰荀攸彧從弟也太祖令曰孤與荀公達周旋二十餘年無毫毛可非者又曰公達賢人也所謂溫良恭儉讓以得之孔子稱晏平仲善與人交久而敬之公達即其人也又曰曹真字子丹太祖族子也真少與宗人曹遵鄉人朱讚並事太祖遵讚早亡真愍之乞分所食邑封遵讚子詔曰大司馬有叔向撫孤之仁篤晏嬰久要之分君子成人之美聽分真邑賜遵讚子爵關內侯各五百戶又曰崔琰字季圭清河東武成人也少撲訥好繫劍尚武事琰友人公孫方早卒琰撫其孤息若己子又曰陳矯字季弼為郡功曹過太山太山守薛悌異之結為親友戲矯曰以郡吏交二千石不亦可乎悌後為魏郡及尚書令皆代矯魏略曰趙歧字臺卿藏匿避難賣餅市中孫嵩見歧非常人呼而問之遂與俱歸嵩先入白母曰出行乃得死友迎上堂享之極欣藏歧復壁中又曰華歆字子魚平原人靈帝時與北海邴原管寧俱遊學三人相善故時人號三人為龍謂原為龍腹寧為龍尾歆為龍頭魏氏春秋曰嵇康寓居河內與之遊者未嘗見其喜慍之色與陳留阮籍河內山濤向秀籍兄子琅琊王戎沛人劉伶相與友善遊於竹林號曰七賢吳志曰孫策創業命張昭為長史撫軍中郎將升堂拜母如比肩之舊文武之事一以委昭又曰吳範字文則與親故接有終始素與魏滕同邑相善為交滕嘗有罪吳王權責怒甚敢有諫者處死範謂滕曰與汝偕死滕曰死而無益何死範曰安能慮此坐觀汝耶乃髡頭自縛詣門下使鈴下以聞鈴下不敢曰必死不可範曰汝有子耶曰有曰使汝為吳範死子以屬我鈴下諾乃排閣入言未卒權大怒欲投以戟逡巡出走範因突入叩頭流血言與涕并良久權意釋免滕又曰周瑜長壯有姿貌孫堅議興兵討董卓徙家於舒堅子策與同年獨相友善瑜推道南宅以舍策升堂拜母有無共通又曰魯肅字子恭臨淮東城人周瑜知其奇也遂相親結定喬札之分又曰魯肅代周瑜之當陸口過呂蒙屯下肅意尚輕蒙或說肅曰呂將軍功日顯不可以故意待也君宜順之肅遂往詣蒙酒酣蒙問肅曰君受重任與關羽為鄰將何計略以備不虞因為畫五策肅於是越席就之拊其背曰呂子明吾不知卿才略所及乃至於此遂拜蒙母結友而別吳録曰張溫字惠怒英才瓌偉遂以禮躬延見召對詞雅淹潤帝改容前席拜中郎聘蜀與諸葛全結金蘭之好焉蜀志曰馬謖音縮字幼常才氣過人好論軍計謖臨終與諸葛亮書曰明公視謖猶子謖視明公猶父願深殛鯀興禹之義使平生之交不虧此謖雖死無恨於黃泉也于時十萬之衆為之流涕亮自臨祭待其孤遺若平生又曰張裔字君嗣蜀郡成都人也少與犍為楊恭友善恭早死孤遺未數歲裔分居事恭母如恭息長大為之娶妻買宅産業使立門戶又曰楊戲字文然為人篤於舊故與巴西韓儼黎韜童幼相親後儼痼疾廢頓韜無行見損戲經紀振恤恩好如初晉書曰王龔字孝伯清操過人才地自負恆有宰相之望與王沉齊名友善又曰桓溫字元子宣城太守彝之子也與庾翼友善恆相期以寧濟之事翼薦溫於明帝曰桓溫少有雄略願勿以常人遇之又曰陸機吳人也文章冠代至太康末與弟雲造太常張華華素重其名如舊相識曰伐吳之役利獲二俊又曰周馥字祖宣馥少與友人成公簡齊名俱起家為諸王友學又曰紀瞻慎行好施老而彌篤少與陸機兄弟相親善及機被誅瞻恤其家及嫁女資送同於所生又曰鄭袞字叔林滎陽開封人也少孤隨叔父渾避難江東時華歆為豫章太守渾往依之歆素與袞父泰友善撫養袞如己子晉中興書曰郗超所交皆一時秀美雖寒門後進亦拔而友之死之日貴賤操筆為誄者四十餘人其為物所宗貴如此又曰胡母輔之字彥國少高名有王尼者出寒微輔之庾顗王澄等共為美談尼以門役送護軍府輔之等乃齎羊酒詣門吏以聞護軍曰諸名士以羊酒來當有以既入先過尼尼已給府養馬輔之等坐廄下與尼炙羊飲酒而去竟不見護軍大驚乃與尼長假又曰東甌沃壤名士多樂居之太傅謝安未仕時亦居東土共王羲之孫綽李充許詢道林皆文義冠世共相友昵又曰魯公賈謐參管朝政京洛人士無不傾心渤海石崇之徒年皆長謐並以文才降節事謐共相朋昵號曰二十四友又曰羊曼字祖延頽縱宏狂飲酒誕節與溫嶠庾亮阮放桓彝同志友善並中興名臣時州里稱陳留阮放為宏伯高平郗鑒為方伯太山胡母輔之為達伯濟陰卞壺為裁伯陳留蔡謨為朗伯陳留阮孚為誕伯高平劉綏為秀伯而曼為黠伯凡八伯蓋擬古之八雋又曰薛兼與同郡紀瞻廣楊閔鴻吳郡顧榮會稽賀循同志友善初入洛司空張華見而歎息曰南金也又曰華談所友人袁甫者字公胄歷陽人少能言議與談齊名友善太安中入洛談與甫書曰誠以枯澤非應龍之淵棘林非鸞鳳之窟昔食其自匿監門非高祖不長揖孔明躬稼南陽非劉氏不馳驅望雲霄而遇翮見鴻漸之輕羽瞻長塗而高鳴知騏驥之迅足又曰王濛少而不羈不為鄉閭所齒晚節剋修遂有風流美譽與沛國劉恢齊名友善時人以濛比袁耀卿恢比茍奉倩何法盛晉中興書曰庾翼字雉恭時京兆杜乂陳郡商浩並才名冠世而翼弗之重每語人曰此輩宜束之高閣俟天下平然後議其所任耳唯與桓友善在總角之中便相期終始又曰肅祖之在東宮與溫嶠庾亮並布衣之好晉陽秋曰陸抗羊祐推喬劄之好抗嘗遺祐酒祐亦饋抗藥各推心服之
