body:
  text: 兵部八十一箭下魏百官名曰三公拜賜鶉尾鶻尾髇許交切箭十二枚三齊略記曰富平城孝明帝時改為厭次此城東南五十里有蒲臺高丈八秦始皇所頓處時在臺下縈蒲繫馬夾道數百步到今蒲生猶縈馬蒲似水楊而徑堪為箭博物志曰交州山夷名曰俚子弓長數尺箭長尺餘以燋銅為鏑塗毒藥於鏑鋒中人即死不時斂藏則胼脹沸爛須叟燋煎都盡唯骨在耳其俗誓不以此藥法語人治之飲婦人月水及糞汁時有差者唯射豬犬者無它以其食糞故也燋銅者有聲以物打之徐聽其聲得燋毒者偏鑿取以為箭鏑焦貢易林曰雙鳧俱飛以歸稻池經涉其澤為矢所射傷我胸臆劉向新序曰楚熊渠子夜行見寢石似伏獸射之飲羽異苑曰烏傷黃蔡義熙初於查溪岸照射見水際有物眼光徹其間相去三尺許形大如斗引弩射之應弦而中便聞從流奔驚波浪砰磕苦盍切不知所向經年與伴共至一處名為竹落岡盍先所二十許里有骨可長三丈餘見昔射箭貫在其中因語伴云此是我往年所射物乃死於斯拔矢而歸其夕夢見一長人責誚之曰我在洲渚之間無關人事而橫見殺害怨苦莫申連時覓汝今始相得眠寤仍患腹疾而殞又曰永陽李增行經大溪見二蛟在水引弓射之中一即死增歸因復出市有女子素服銜涕捉所射箭增怪而問焉女答曰何用問為若是君許便以相還授矢而滅增惡而驟反未達家暴死於路孟子曰矢人豈不仁於函人哉矢人惟恐不傷人函人惟恐傷人列子曰逢蒙之弟子曰鴻超怒其妻而怖之引烏號之弓綦衛之箭射其目矢未注眸子瞬不睫矢墜地而塵不揚又曰飛衛學射於甘蠅諸法並善唯嚙法不教衛密將矢以射蠅蠅嚙得鏃矢射衛衛繞樹而走矢亦繞樹而射魯連子曰燕伐齊取七十餘城唯莒與即墨不下齊田單以即墨破燕軍殺燕將軍騎劫復齊城唯聊城不下燕將城守數月魯仲連乃為書著之於矢以射城中遺燕將燕將得書泣三日乃自殺尉繚子曰夫殺人百步之外者誰也曰矢也韓子曰矢來無向則為鐵室以備之又曰智伯將伐趙趙襄子召張孟談問之曰奈無箭何孟談曰董安于之治晉陽也公宮之垣皆以荻音秋蒿楛楚牆音隔之其高至于文君發而用之有餘箭矣於是發而試之堅則菌幹之徑不能過也君曰吾箭已足矣奈無金何孟談曰董子之治晉陽公宮令舍之堂皆以鍊銅為柱質君發而用之有餘金矣戰國策曰公宮之垣皆以荻蒿其堅則菌簬之徑不能過其餘何也蕗音路又曰水激則悍矢激則遠又曰楚人有白猿王自射之則搏矢而熙熙戲也使養由基射之始調弓矯矢未發而猿擁樹號矣由基楚共王之臣養叔也調調張也矯直也擁抱也諸葛子曰若能力兼三人身與馬如膠漆手與箭如飛虻誠宜寵異亢倉子曰勾粵之幹鏃以精金鷙隼為之羽以之掊箠則其與槁朴也無擇勾粵東粵幹似幹也鷙隼鵰鶚之類掊箠打擊也爾雅曰東南之美有會稽之竹箭焉夫勾越之幹以精金為鏃以隼翎羽之打擊則同於槁朴也無擇猶無異也及夫蕩寇爭虔音衡覿武決勝加之彊弩之上則三百步之外不立敵矣排蕩寇敵爭衡決勝如此勾粵之幹於強弩之上則不立敵也楚辭曰舉長矢兮射天狼陳琳武庫賦曰矢則申息肅眘音慎箘簵空流燋銅毒鐵簳鏃鳴鏃子虛賦曰曳明月之珠旗建干將之雄戟左烏號之雕弓右夏服之徑箭射雉賦曰昔賈氏之如皋始解顏於一箭醜夫為之改貌憾妻為之釋怨吳都賦曰其竹則篔于君切簹都郎切籃音吟箊音於桂箭射筒由梧有篁篻音瓢簩音勞有叢後漢李尤弧矢銘曰弦木為弧剡木為矢大協并八極同紀晉江統弧矢銘曰幽都䈥角會稽竹矢率土名珍東南之美易以獲隼詩以殪兕伐叛柔服用威不韙梁昭明太子弓矢贊曰弓用䈥角矢製良工亦以觀德非止臨戎楊葉命中猿墮張空箭筒釋名曰箭萁受矢之器以皮曰箙扶福切柔服用之也織竹曰笮音幘相迫笮之名也說文曰蘭所以盛弩矢人所負也詩義問曰總所以覆矢也謂箭筒蓋也周禮夏官下司弓矢曰仲秋獻矢服蔔盛矢器也獸皮為之也左傳曰公徒執冰而踞杜預注曰冰箭筒蓋也又曰晉楚戰楚熊負羈囚智罃智莊子以其族反之負霸楚大夫也魯罃智莊子之子也廚武子御武子魏錡下軍之士多從之智莊子下軍大夫故也每射抽矢菆楚尤切納諸廚子之房抽擢也菆好箭也房箭舍也武子怒曰非子之求而蒲之愛蒲楊柳可以為箭也董澤之蒲可勝既平董澤地名在東聞喜縣集異記曰丹陽張承先家有一鬼為張偷得一箭筒云慎勿至新亭射此三井陶家物張以借他鬼罵欲燒屋張馳取還乃止雜詩曰象弧雕服竹譜曰射筒竹簿肌而長中著箭因以為名步叉釋名曰步叉人所帶以箭叉其中馬上曰鞬鞬建也弓矢並建立其中也通俗文曰箭箙謂之步靫趙書曰石虎等破劉曜於上邽獲馬二百匹赤罽金銀步叉弓鞬三十具櫜鞬左傳曰晉楚治兵遇于中原左執鞭弭右執櫜鞬以與君周旋橐受箭也後漢書曰董卓膂力過人雙帶兩鞬左右馳射方言曰所以藏箭謂之箙藏弓謂之鞬左氏傳云右屬橐鞬魏百官名曰三公拜賜魚皮步叉一貛皮鞬一琢菆金校步叉一金校豹皮鞬一射捍說文曰韝射臂㧺也三禮弓矢圖曰檖者臂捍以朱韋為之謂之檖者所以遂弦也括地圖曰羿年五歲父母與入山其母處之大樹下侍蟬鳴還欲取之群蟬俱鳴遂捐去羿為山間所養羿年二十能習弓矢仰天歎曰我將射遠方矢至吾門止因捍即射矢摩地截草經至羿門隨矢去管子曰桓公弋管仲隰朋朝公望二豫弛弓脫捍而迎之魯連子曰弦銲音汗相第而矰矢得高焉專諸刺王僚闔廬乃名成焉彈廣雅釋器曰𢐂謂之彈𢐂音置字林曰彈行丸者又栟也栟使戰動掉彈也栟普耕切與枰同桂苑曰彈行丸弓也又作弓音彈開元文字曰引彈之謂行丸者也又彈栟也說文曰彈行丸也吳越春秋曰陳音對越王云弩生於弓弓生於彈彈生於古之孝子古者人民質朴死則裏以白茅投之中野孝子不忍父母為禽獸所食則作彈以守之故古人歌之曰斷竹屬木飛土逐肉遂令死者不犯鳥狐之殘也周禮曰凡句兵欲無彈刺兵欲無蜎注云句兵戈戟屬彈為掉也蜎狂左傳曰晉靈公不君從臺上彈人觀其避丸者穀梁曰靈公朝大夫而暴彈之也觀其避丸也暴戲暴之也漢書曰長安中姦猾浸多閭里多少年群輩殺吏受財報仇相與探丸為彈得赤丸者破武吏黑者斫文吏白者主治喪城中薄暮塵起剽劫行者死傷橫道張璠漢紀曰班超使于置願將三十六人以為蒿矢彈丸之用魏書曰齊王芳為帝常喜以彈彈人魏書傳曰曹爽兄弟歸家勑洛陽縣發民八百人使尉部圍爽第四角作高樓令人在上望視爽計窮愁悶持彈到後園中樓上人便唱言故大將軍東行南行爽還廳事上矣晉安帝紀曰琅㖿內史孫無終貪橫忍虐妓妾有忤意者輒彈其面蕭子顯齊書曰桓榮祖字華先下邳人榮祖善彈彈鳥毛盡而鳥不死海鵠群翔榮祖登城西樓彈之無不折翅而下崔鴻西秦録曰辛進字國都隴西人建弘初為散騎常侍從乞伏熾盤遊于後園霄觀彈鳥丸傷暮末母之面至是末問母面傷之由母曰辛進彈鳥所傷末怒故誅之隋書曰長孫晟善彈有鳶群飛上曰公為我取之晟十發俱中並應丸而落賜賚極多韓詩外傳曰楚莊王將興師伐晉告大夫曰有敢諫者罪至死無赦孫叔敖進諫曰臣之園中有榆其上有蟬蟬方奮翼悲鳴欲飲清露不知螳蜋在後曲其頸欲擢而食之也螳蜋方欲食蟬而不知黃雀在後舉頭而欲音卓食之黃雀方欲食螳蜋不知童子挾彈丸在榆下仰而欲彈之童子方欲彈黃雀不知前有深坑後有掘株也此皆貪前之利不顧後害者也非獨昆蟲衆庶若此人主亦然楚國不殆而晉國以寧孫叔敖之力也西京雜記曰韓嫣音焉於騫武帝佞幸也作金丸人皆逐之長安為之語曰苦飢寒逐金丸異苑曰青溪小姑廟云是蔣侯第三妹廟中有大穀樹扶踈蔭瀆烏常産育其上太元中陳郡謝慶執彈乘馬激殺數頭至夜夢一女子衣裳楚楚怒云此鳥是我養何故見侵經年而謝卒慶名渙靈運父也幽明録曰元嘉初散騎劉俊家在丹陽郡後嘗間居而天大驟雨見門前有三小兒皆可六七歲相牽狡獪音儈而並不沾濡俊疑非人俄見共爭一瓠壺子俊引彈彈之正中壺霍然不見俊出人問前得一壺而泣曰此是小兒物不知何由在此俊具說之東方朔記曰東方朔對驃騎難曰以珠彈不如埿丸各有所用也莊子曰莊周遊乎雕陵之樊覩一異鵲自南方來翼廣七尺目大運寸而進集于栗林周曰何鳥哉執彈而留之覩一蟬方得美蔭而忘其身螳蜋執翳而搏之見得而忘其形異鵲從而利之見利而忘其真莊周怵然曰物固相纍二類相招也指彈而射之虞人逐而訊之以周為盜栗又曰化豫之左臂以為雞子因以求時夜浸假而化右臂以為彈余因以求鶚炙又曰以隋侯之珠彈千仞之雀以所用者重所要者輕大玄經曰明珠彈於飛害其得不傷潛夫論曰丁夫不傅犁鋤懷丸挾彈或取好土作丸賣之其彈外不可禦盜內不足禁鼷鼠妄彈鳥雀百發不得一反中人面目此無用而有害也世說曰前輩人忌曰唯不飲酒作樂王世將以忌曰送客至新亭別主人欲作音聲王便起去持彈往衛洗馬墓下彈鳥夢書曰夢持彈者得朋友趙一窮鳥賦曰有一竊鳥戢翼原野罼音必網加上機穽在下前見蒼隼後見驅者矰繳張右羿弓彀左飛丸繳矢交集于我思飛不得欲鳴不可舉頭畏觸搖足恐墮內獨怖急乍水乍火夏侯孝若繳彈賦曰張弱弓理繁繳望大群以送丸審遣放而必獲古樂府歌曰烏生八九子秦氏桂樹間秦氏家有遊蕩子立用睢陽強彈丸魏明帝猛虎行曰雙桐生空井枝葉自相加通泉浸其根玄雲潤其柯上有雙棲鳥交頸鳴相和何意行路者秉丸彈是窠桓玄南林彈詩曰散帶躡駟揮彈出長林歸翮赴舊栖木末轉翔禽落羽尋絶響屢中輒應心後漢李尤彈銘曰昔之造彈起意弦木以丸為矢合竹為朴漆飾膠治弗用䈥鏃丸彈之利以弋鳧鶩晉靈嬌悖群臣是彈樂其如躍趍如避丸
