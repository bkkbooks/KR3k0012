body:
  text: 人事部一百二十四怒說文曰怒恚也易曰君子懲忿窒欲尚書曰今商王受弗敬上天降災下民皇天震怒命我文考肅將天威毛詩曰君子如怒亂庶遄沮又曰王赫斯怒爰整其旅又曰薄言往訴逢彼之怒又曰如震如怒闞如虓虎禮記曰父母怒不悅而橽之流血不敢疾怨起敬起孝左傳曰公孫閼與潁考叔爭車潁考叔挾輈以走輈車轅也子都拔棘以逐之子都公孫閼也及大逵弗及子都怒又曰齊侯遊于姑焚遂田于貝丘姑焚貝丘皆齊地也見大豕從者曰公子彭生也怒曰彭生敢見射之豕人立而啼公懼墜于車傷足喪屨又曰齊侯蔡姬乘舟于囿蕩公公懼變色禁之不可公怒歸之未之絶也蔡人嫁之齊侯以諸侯之師侵蔡蔡潰又曰先軫朝問秦囚公曰夫人請之吾舍之矣先軫怒曰武夫力而拘諸原婦人暫而免諸國隳軍實而長寇讎亡無日矣不顧而唾公使陽處父追之及諸河則在舟中矣又曰楚子使申舟聘于齊曰無假道於宋及宋華元曰過我而不假道鄙我也鄙我亡也殺其使者必伐我伐我必亡亡一也乃殺之楚子聞之投袂而起屨及於窒皇劍及於寢門之外車及於蒲胥之市秋九月楚子圍宋又曰衆怒不可犯又曰衛獻公戒孫文子寧惠子食皆服而朝日旰不召而射鴻於囿二子從之不釋皮冠而與之言二子怒而逐獻公又曰邾莊公與夷射姑飲酒私出閽乞肉焉奪之杖以敲之公在門臺臨庭閽以瓶水沃庭邾子望見之怒閽曰夷射姑旋焉旋小便也命執之弗得滋怒自投於床論語曰哀公問弟子孰為好學孔子對曰有顏回者好學不遷怒不二過不幸短命死矣今也則亡國語曰晉郤獻子如齊聘齊傾公使婦人觀而笑之獻子怒歸請伐齊范武子退自朝曰郤子之怒甚矣不逞於齊必發諸晉國逞解不得政何以逞怒余將致政焉以成其怒也史記曰孟嘗君客於趙平原君趙人聞孟嘗賢出觀皆笑曰始以薛公為魁梧也今視之乃眇小丈夫耳孟嘗聞之怒客與俱者下斫擊數百人遂滅一縣以去又曰韓信使人言漢王曰齊反覆之國南邊吳楚不為假王鎮之其勢不定漢王大怒罵曰吾困於此旦暮望若佐我張良陳平躡漢王足因附耳曰漢方不利寧能禁信乎不如因而立之漢王復罵曰大丈夫定諸侯即為真王何以假為又曰趙使藺相如齎璧西入秦秦王坐章臺見相如相如奉璧秦王大喜傳璧以示美人及左右左右皆呼萬歲相如視秦王無意償趙城乃前曰璧有瑕請指示王王授璧相如因持璧卻立倚柱怒髮衝冠謂秦王曰趙王齊戒五曰使臣奉璧拜送於庭何者嚴大國之威以修好也今臣至大王見臣列觀禮節甚倨得璧傳之以示美人以戲弄臣臣觀大王無償城意故臣復取璧大王必擊臣臣頭今與璧俱碎於柱矣持璧睨柱秦王恐其破乃辭謝固請又曰鄒陽上書於梁王曰蘇秦相燕燕人惡之於王王按劍而怒食以駃騠漢書音義曰駃騠馬也生七日而超其母漢書曰項羽令壯士出挑戰漢有善騎射曰樓煩應劭曰樓煩胡也今有樓煩縣楚戰三合樓煩輒射殺之羽大怒自被甲持戟挑戰樓煩欲射羽羽瞋目叱之樓煩目不能視手不能發走還璧中不敢復出又曰沛公從百餘騎見項羽於鴻門沛公起如廁招樊噲出獨騎噲與靳強滕公紀成晉灼曰紀通父步從間道赴軍使良留謝羽羽問沛公安在良曰聞將軍有意督過之脫身去至軍矣故使臣獻璧羽受又獻玉斗於范增范增怒撞其斗起曰吾屬今為沛公虜矣又曰黥布反上自征望布軍置陳如項籍軍上惡之與布相見謂布何苦而反曰欲為帝耳怒罵之遂戰破布軍又曰文帝曰吾獨不得廉頗李牧為將豈憂胸奴哉馮唐曰陛下雖得廉頗李牧不能用也上怒起入禁中又曰上獵上林中車駕未行先使韓嫣乘副車從數百騎馳視獸江都王望見以為天子辟從者伏謁道旁嫣驅而不見既過江都王怒為皇太后泣請得歸國入宿衛比韓嫣太后比銜嫣嫣侍出入永巷不禁以奸聞皇太后怒使使賜嫣死上為謝終不得嫣遂死東觀漢記曰更始韓夫人尤嗜酒每侍飲見常侍奏事輒怒曰帝方對我用此時事來耶起手抵破書案又曰龐萌為平狄將軍與蓋延共擊董詔書獨下延而不及萌萌以為延譖己自疑遂反上聞之大怒乃自將兵討萌與諸將書曰吾常以龐萌為社稷臣將軍得無笑其言乎又曰鄧晨南陽人與上起兵新野吏乃燒晨先祖祠堂污池室宅焚其冢墓宗族皆怒曰家自富足何故隨婦家入湯鑊中晨終無恨色又曰有詔會議靈臺所上謂桓談曰天下事吾欲讖決之何如談默然良久曰臣不讀讖上問其故談復極言讖之非經上大怒曰桓談非聖無法將下斬之談叩頭流血良久得解出為六安郡丞又曰戴憑為侍中數進見門得失上謂憑曰侍中當輔國政勿有隱情憑曰太尉西曹掾蔣遵清亮忠孝學通古今陛下納膚受之譖遂禁錮世以是為嚴上怒曰子復欲黨乎憑出自繫廷尉詔出引見憑謝曰臣無謇諤之節而有狂瞽之言上即勑尚書解遵禁錮又曰韓歆字翁君南陽人以從征伐有功封扶陽侯好直言為司徒嘗因朝會帝讀隗囂公孫述相與書歆曰亡國之君皆有才桀紂亦有才上大怒以為激發免歸田里上猶不釋復詔就責歆及子嬰皆自殺又曰竇憲恃宮掖聲勢遂以賤直奪沁園公主不敢訴後肅宗駕出過園指以問憲憲陰嗚不得對發覺帝大怒召憲切責曰今貴主尚見枉奪何況小臣乎又曰杜根和熹鄧后臨朝根以安帝年長宜親政事乃上書直諫太后大怒收根囊盛撲殺之執法者私語行事人使不加力既而載出城外根詐死三日目中生蛆因逃竄及鄧氏誅根方歸徵拜侍御史魏志曰太祖討張魯東還時有將軍許遊擁部曲不附太祖大怒先欲討之群臣多諫可招懷遊共討強敵太祖橫刀於膝作色不聽繆襲欲諫太祖逆謂之曰吾計已定卿勿復言襲曰若殿下計是耶臣方助殿下成之若殿下計非耶雖成宜敗之殿下逆令臣勿言何待下之不闡閎乎方今豺狼當路而狐狸是先人將謂殿下避強攻弱進不為勇退不為仁臣聞千石之弩不為鼴鼠發機萬鈞之鍾不以筵橦起音今區區之遊何足以勞神哉太祖曰善遂厚撫遊遊即歸服又曰夏侯惇從征呂布為流矢所中傷左目時夏侯淵與惇俱為將軍軍中號惇為盲夏侯惇惡之每覽照恚怒輒撲照著地又曰諸葛亮既屢遣使交書於司馬宣王又致巾幗婦人之飾以怒宣王將出戰辛毗仗節勒軍吏以下乃止吳志曰呂蒙字子明少依姊夫鄧當當為孫策將數討山越蒙年十五六隨當擊賊顧見呵不能禁歸告其母恚怒欲罰之蒙曰貧賊難居設有功富貴可致且不探虎穴安得虎子母哀而舍之又曰孫權為吳王欣宴之未自起行酒虞翻伏地佯醉不持權去翻起坐權大怒手劍欲擊之侍坐者莫不惶遽惟大農劉基起抱權諫曰大王以三爵後殺善士翻雖有罪天下孰知之權曰曹孟德殺孔文舉孤於虞翻何有哉蜀志曰姜維為鄧艾所摧還陰平尋被後主勑命乃投甲詣會於涪軍將士咸怒拔刀斫石晉書曰王導妻曹氏性妒導憚之乃密營別館以處衆妾曹氏知而將往焉導恐妾被辱遽令命駕猶恐遲之以所執麈尾柄驅牛而進司徒蔡謨聞之戲導曰朝廷欲加公九錫導弗之覺但謙退而已謨曰不聞餘物唯有短轅犢車長柄塵尾導大怒謂人曰吾往與群賢共遊洛邑日何曾聞有蔡克死又曰郗超實黨桓氏以父愔忠於王室不令知之將亡出一箱書付門生曰本欲焚之恐公年尊必以傷愍為斃我亡後可呈此箱不爾便燒之愔後果哀悼成疾門生依旨呈之則悉與溫往反密計愔於是大怒曰小子死恨晚矣又曰周訪為荊州王敦以訪名將勳業隆重有疑色其從事中郎郭舒說敦曰荊州雖遇寇難荒斃實為用武之國若以假人將有尾大之患公宜自領以為梁州足矣敦從之訪大怒敦手書譬釋并遺玉環玉碗以申厚意訪投碗於地曰吾豈賈豎可以寶悅乎又曰陶侃嘗出遊見人持一把未熟稻問用此何為人云行道所見聊取之耳侃大怒曰汝既不佃而戲賊人稻執而鞭之齊書曰袁彖性剛嘗以微言忤世祖又與王晏不協世祖在便殿用金柄刀子治瓜晏在側曰外聞有金刀之言恐不宜用此物世祖愕然窮問所以晏曰袁彖為臣說之上銜怒良久彖到郡坐逆用祿錢免官崔鴻後趙録曰冉閔為慕容恪所擒慕容雋立問閔曰汝奴僕下才何自妄稱天子閔曰爾曹人面獸心欲篡逆我一時英雄何為不作帝王耶雋怒鞭之三百後魏書曰李彪之入京也孤微寡援而自立不群以李沖好士傾心宗附沖亦重其器學禮而納焉每言之高祖公私共相援益及彪為中尉兼尚書為高祖知待便謂非復籍沖而更相輕背唯公斂袂而已沖時震怒數責彪前後愆悖瞋目大呼投折几案詈辱肆口沖素溫柔而一旦暴急遂發病荒悸言語亂錯猶扼腕叫詈稱李彪小人然醫藥所不能療或謂肝藏傷裂旬有餘日而卒列子曰宋有蘭子能以伎干宋元君雙杖屬其腦弄七劍而躡之元君立賜金帛又有蘭子能燕戲聞之復以干元君元君大怒曰昔有異伎適值寡人有欣心故賜金帛彼必聞此復望吾賜拘而戮之莊子曰孔子往見盜跖下車而前謁者通之盜跖聞之忿怒目如明星髮上指冠孔子趍而進避席反走再拜盜跖大怒而展其足按劍嗔目其聲如吼虎韓子曰孟孫獵得麑使秦巴持之其母隨而呼秦巴不忍而與其母孟孫適至求麑不得大怒逐之居三月復召使為子傅燕丹子曰田光答太子曰竊觀太子客皆無可用者夏扶血勇之人怒而面赤宋意脈勇之人怒而色青武陽骨勇之人怒而色白荊軻神勇之人怒而色不變吳越春秋曰吳王伐齊請公孫聖告之聖諫願大王勿伐齊王大怒曰吾天之所生神之所助使力士石番擊以鐵槌身絶為五吳越春秋曰子胥諫吳王王怒賜以钃鏤之劍盛以鴟夷之器投之於江說苑曰秦王以五十里封鄢陵君鄢陵君辭不受使唐且謝秦王秦王怒曰嘗見天子之怒乎一怒伏尸百萬流血千里唐且曰大王嘗聞布衣韋帶之士怒乎伏尸二人流血五步即按其匕首起視秦王曰今將是矣王變色長跪曰先生就坐寡人諭矣列士傳曰秦召魏公子無忌無忌不行使朱亥奉璧一雙秦王大怒將朱亥著虎圈中亥瞋目視虎眥裂血出濺虎虎不敢動怨尚書曰商王受自絶于天結怨于民崇信奸回放黜師保又曰怨豈在明不見是圖毛詩曰亂世之音怨以怒其政乖又曰角弓父兄剌幽王也不親九族而好讒佞骨肉相怨故作是詩又曰民之無良相怨一方左傳曰宋華元將與楚戰殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗君子謂羊斟非人也以其私怨敗國殄民又曰晉侯賞從亡者介之推不言祿祿亦弗及其母曰盍亦求之以死誰懟對曰尤而效之罪又甚焉且出怨言不食其食又曰季郈之雞鬭季平子郈昭伯季氏芥其雞郈氏為之金距平子怒益室於郈且讓之故郈昭伯怨平子又曰晉郗至獻楚捷于周與單襄公語驟稱其伐單子語諸大夫曰溫季其亡乎位於七人之下而求掩其上怨之所藂亂之本也多怨而階亂何以在位又曰吳公子札來聘請觀於周樂為歌周南召南曰美哉始基之矣猶未也然勤而不怨矣為之歌小雅曰美哉思而不二怨而不害其周德之衰乎又曰子産曰我聞忠恕以積怨不聞作威以防怨又曰君子之言信而有徵故怨遠於其身小人之言僣而無徵故怨咎及之論語曰放於利而行多怨又曰貧而無怨難富而無驕易國語曰夫事君者險而不懟怨而不怒戰國策曰趙襄子怨智伯漆其頭為飲器漢書曰汲黯列九卿而公孫洪張湯為小吏及弘湯稍與黯同位而尊用過之黯心褊不能無怨望見上言曰陛下用群臣如積薪耳後來者居上東觀漢記曰長水校尉耿恭坐將兵不憂軍事肆心縱欲飛鷹走狗遊戲道上虜至不敢出得詔書怨懟徵下獄續漢祭祀志曰建武二十年二月群臣上言即位三十年宜封禪太山詔書曰即位三十年百姓怨氣滿腹吾誰敢欺欺天乎晉書曰趙王倫諂事賈后裴頠甚惡之倫數求官頠與張華復固執不許由是深為倫所怨玉韶之晉紀曰桓玄問衆曰朕其敗乎曹靖之對曰神怒民怨臣實憂懼玄曰民怨有之神何為怒對曰移晉宗廟所以怒也管子曰凡禍亂之所生各在於非理故曰間禍在除怨晏子春秋曰景公籍重而獄多拘者滿圄怨者滿朝文子曰人有三怨爵高者人妒之官大者王惡之祿厚者怨處之夫爵益高者意益下官益大者心益小祿益厚者意益薄淮南子曰和氏之璧夏氏之璜揖讓而進之則欣暮夜以投人則為怨時與不時也楚辭曰怨靈修之浩兮終不察夫民心衆女妒余之娥眉兮譖諑謂余善淫譖毀也諑譖也琴操曰王昭君者齊國襄王之女也昭君年十七時顏色皎潔聞於國中襄王見昭君端正間麗於孝元帝既不幸納備後宮積五六年王昭君心有怨曠不飾其形容元帝每歷後宮踈略不過其處後單于遣使者朝賀元帝陳設倡樂乃令後宮莊出昭君怨恚久不得侍列乃更修飾盛服形容光輝帝令後宮欲至單于者起於是昭君喟然越席而前曰妾幸得備在後宮粗醜卑陋不合陛下之心誠願得元帝見昭君便驚悔不得復止遂以與之王昭君雖去漢至單于心思不樂乃作怨曠思惟歌曰秋木萋萋其葉萎黃我獨伊何改往變常翩翩之燕遠集西羌高山峨峨河水泱泱父母妻子道里悠長嗚呼哀哉憂心惻傷
