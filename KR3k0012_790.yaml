body:
  text: 南蠻五南詔蠻唐書曰南詔蠻本烏蠻之別種也姓蒙氏蠻謂王為詔自言哀牢之後代居蒙舍州為渠帥在漢永昌故郡東姚州之西其先渠帥有六自號六詔兵力相埒各有君長無統帥蜀時為諸葛亮所征皆臣服之又曰南詔蠻國初時有蒙舍尨生迦獨迦獨生細奴邏高宗時來朝細奴邏生邏盛武后時來朝其妻方娠邏盛次姚州間妻生子曰吾且有子死於唐地足矣子名盛邏皮邏盛至京師賜錦袍金帶師國開元初邏盛死盛邏皮立盛邏皮死子皮邏閣立又曰南詔蠻皮邏閣嗣立二十六年詔授特進封越國公賜名曰歸義其後破洱阿蠻洱音而志切以功茦授雲南王歸義漸強盛餘五詔浸弱先是劍南節度王昱受歸義賂奏六詔合為一詔歸義既併五詔服群蠻破吐蕃之衆兵日以驕大遂徙居大和城天寶四載歸義遣孫鳳迦異來朝授鴻臚卿歸國恩賜甚厚又曰閣羅鳳襲封王無何鮮于仲通為劍南節度使張虔陀為雲南太守仲通褊急寡謀虔陀矯詐遇下不以禮舊事南詔嘗與其妻子謁見都督虔陀皆私之又有所徵求閣羅鳳多不應虔陀遣人罵辱之仍密奏其罪惡閣羅鳳忿怨因發兵反圍虔陀殺之後遣使謝罪仍與雲南録事參軍姜如芝俱來請還其所虜掠且言吐蕃大兵壓境若不許當歸命吐蕃雲南之地非唐有也仲通不許因其使進軍逼大和城為南詔所敗自是閣羅鳳北臣吐蕃又曰閣羅鳳死其孫異牟尋為王牟尋頗知書有才智善撫其衆吐蕃役賦南蠻重數又奪諸蠻險地城立城堡歲徵兵以助鎮防牟尋益猒苦之有鄭回者本相州人天寶中授嶲州西瀘縣令嶲州陷為所虜閣羅鳳以回有儒學更名曰蠻利甚愛重之命教鳳迦異及異牟尋立以回為清平官事皆咨之回嘗言於牟尋曰自昔南詔嘗款附中國中國尚禮義以惠養為務無所求取今棄蕃歸唐無遠戍之勞利莫大焉牟尋善其言謀內附者十餘年矣會劍南西川節度使韋皋招撫諸蠻苴烏烏星虜望等歸化聞牟尋之意因諸蠻寓書於牟尋且招懷之牟尋乃斬吐蕃使去其所立帝號以歸我仍請復南詔舊名初吐蕃因爭北庭與回鶻大戰死傷頗衆乃徵兵於牟尋須萬人牟尋欲因以襲之及示寡弱謂吐蕃曰蠻軍素少僅可發三千人吐蕃五千人戍吐蕃乃將數萬踵其後晝夜兼行乘其無備大破吐蕃於神川鐵橋遣使告捷帝乃命兼御史中丞袁滋持節冊南詔王仍賜金印曰貞元冊南詔印又曰貞元十年南詔王遣使蒙湊羅楝來獻鐸槊浪人劍驃國唐書曰驃國在永昌故郡南二千餘里其國境東鄰真臘西接東天竺南盡溟海北通南詔些樂城界東北距陽苴咩城六千八百里往來通聘迦羅婆提等二十國役屬者道林王等九城食境土者羅君潛等二百九十八部落其王姓困沒長名摩羅惹其國相名摩訶思郍其王近適則輿以金繩床遠適則乘象嬪妃甚衆常數百人其羅城構以磚甃周一百六十里壕岸亦構磚相傳本是舍利佛城城內有居人數萬家佛寺百餘區其堂宇皆錯以金銀塗以丹彩地以紫礦覆以錦罽其俗好生惡殺其土宜菽粟稻粱無麻麥其理無刑名桎梏之具犯罪者以竹五十本束之復犯者撻其背數止五輕者止三殺人者戮之男女十歲則落髮止寺舍依桑門至二十不悟佛理乃復髮為居人其衣服悉以白㲲為朝霞繞腰而已不衣繒帛云出於蠶為其傷生故也君臣父子長幼有序華言謂之驃自謂突羅成闍婆人謂之徒里拙古未嘗通中國貞元中其王聞南詔異牟尋歸附心慕之八年乃遣其弟悉利移因南詔重譯來朝又獻其國樂凡十曲與樂工三十五人俱樂曲皆演釋氏經論之詞意以悉利移為試大僕卿南夷志曰驃國在永昌南七十五日程閣羅鳳所通也其國用銀錢以青磚為圓城周行一日程百姓盡在城內有十二所堂當國王所居門前有大象露坐高百餘尺白如霜雪俗尚廉恥人壯和善少言重佛法城中並無宰殺又多推步天文若有訴訟者王即令焚香向大象思惟是非便各引退或有災疫王亦焚香對象悔過自責男子多衣白疊婦人當頂為高髻以金銀真珠為飾餘著青婆裙又披羅假行必持扇貴家婦女皆三人五人在傍共扇與波斯及婆羅門接界西去舍利城六十日程疑此是東天竺也暴蠻等部落南夷志曰竹子嶺東有暴蠻部落嶺西有盧鹿蠻部落又有生蠻磨彌殿部落此等部落皆東烏蠻也男則髻女則散髮見人無禮節拜跪三譯乃與華通大部落則有大鬼主百家二百家小部落亦有小鬼主一切信使鬼巫用相服制土多牛馬無布帛男女悉被牛羊皮勿鄧南夷志曰勿鄧部落大鬼主夢衝地方千里功部一姓白蠻五姓烏蠻烏蠻婦人以白黑繒為衣白蠻婦人以白繒為衣下不過膝大賧南夷志曰大賧周回百餘里悉是野蠻無君長地有瘴毒河賧人至中瘴者十死八九閣羅鳳嘗遣使築城於彼管制野蠻不逾歲死者過半歲遂罷棄其土肥沃種瓠長丈餘冬瓜亦然皆三尺圍又多薏苡無農桑收此充糧三面皆是雪山其高造天南瀘南夷志曰瀘水蜀諸葛亮伐南蠻五月渡瀘處大如臂川中氣候常熱雖方冬行過者皆祖衣流汗量水川南夷志曰量水川在滇池南兩日行漢舊黎州地川中有天地其水東南流出一石竇中水流甚廣石竇甚狹蠻云此竇忽室空則百姓憂溺彌諾國彌臣國南夷志曰彌諾國彌臣國皆邊海國也呼其君長為壽彌諾面赤而長彌臣面黑而短性恭謹每與人語向前一步一拜國無城郭彌諾王所居屋之中有一大柱雕刻為文飾以金銀彌臣王以木柵為居海際水中以石師子為屋四足仍以板蓋悉用香木王出即乘象百姓皆樓居披婆羅籠男少女多俗好音樂樓兩頭置鼓飲酒即擊鼓男女攜手樓中踏舞為樂在永昌城西南六十日程崑崙國南夷志曰崑崙國王北去西洱河八十一程出象及青木香旃檀檳榔琉璃水精犀牙等物蠻寇嘗攻之為其決水淹浸進退無計餓死萬餘不死者去其右腕後放回小婆羅門國南夷志曰小婆羅門國在永昌北七十四日程俗不食牛肉預知身後事出貝齒白蠟越諾共大耳國來往蠻夷善之信通其國夜半國南夷志曰夜半國在蒼望城東北隔麗水城川原其婦人唯與鬼通能知吉凶禍福本土君長崇信之蠻夷往往以金購之要知善惡女王國南夷志曰女王國去歡州十月程往往與歡州人交易蠻嘗伐之中其藥箭百不存獨錦蠻南夷志曰獨錦蠻者烏蠻之苗裔也在秦臧川去安寧兩日程其族多姓李異牟尋母即獨錦蠻女也有季負藍貞元中為大將軍在勃弄揀川為城使等弄揀蠻南夷志曰弄揀蠻則白蠻苗裔也本姚州弄揀縣部落其地舊為褒州嘗有首領誤殺司戶懼罪率衆北奔在摩磨些江側貞元中異牟尋破吐蕃城邑獲弄揀城遷於永昌之地清蛉蠻南夷志曰清蛉蠻亦白蠻苗裔也本清蛉縣部落天寶中嶲州初陷有首領尹氏父子相率南奔河賧閣羅鳳厚待之貞元中南詔清平官尹輔酋皆其人也衣服言語與蒙舍略同長禈蠻南夷志曰長禈蠻本烏蠻之後部落在劍川屬浪詔其俗皆衣長禈曳地更無衣服唯披牛羊皮施蠻南夷志曰施蠻本烏蠻種族也鐵橋西北大施賧小施賧劍尋賧皆其所居之地男以繒布為縵襠袴婦人從頂橫分其髮當額及頂後各為髻男女終身跣足披牛羊皮磨些蠻南夷志曰磨些蠻鳥種也鐵橋上下及大婆小婆三婆採覽昆池等川皆其所居之地土多牛羊一家即有羊群終身不洗手面男女皆披羊皮俗好飲酒歌舞撲子蠻南夷志曰撲子蠻勇悍趫捷以青婆羅假為通身袴善用泊箕竹弓深林間射飛鼠發無不中部落首領謂之酋在上無食器以芭蕉葉藉之尋傳蠻南夷志曰尋傳蠻俗無絲綿布帛披婆羅籠跣足可以踐履捺棘持弓挾矢射豪豬生食其肉取其兩牙雙插頂傍為飾又條其皮以擊腰每戰鬭即以籠子籠頭如兜鍪狀裸形蠻南夷志曰裸形蠻在尋傳城西三百里為巢穴謂之野蠻閣羅鳳既定尋傳而野蠻散居山谷集戰即召之亦無君長女多男少無田農衣服唯有木皮以蔽形或十妻五妻共養一丈夫盡日持弓下楬欄有外來侵害者則射之𦬹望子蠻南夷志曰𦬹望子蠻在蘭蒼江以西其人勇捷善於馬上用槍所乘馬不用鞍跣足衣短甲才蔽胸腹而已望蠻南夷志曰望蠻外喻部落在永昌北其人長大負排持槊前無強敵又能用木弓短箭傅毒藥中人立斃婦人跣足以青布為衣聯珂貝巴齒真珠斜絡其身有夫豎分髮為兩髻無夫者頂後為一髻垂之地宜沙牛角長四尺以來婦人嗜乳酪黑齒金齒銀齒繡腳南夷志曰黑齒金齒銀齒繡腳四蠻並在永昌關南雜種類也黑齒以漆漆其齒金齒以金鏤片裹其齒銀齒以銀有事見人則以此為飾寢食則去之皆當頂上為一髻以青布為通身袴又斜披青布條繡腳蠻則於踝上腓下周匝刻為文彩衣以緋布繡面蠻南夷志曰繡面蠻生一月則以針刺面青黛塗之如繡狀穿鼻蠻南夷志曰穿鼻蠻在柘東以徑尺金環穿鼻中隔下垂過頤君長即以絲繩繫使人牽起乃行其次者花頭金釘兩枚從鼻兩邊穿令透下長鬃揀鋒南夷志曰長鬃揀鋒二蠻部落鬃黑而長當額前為一長鬃髺下過臍每行即以物撐起君長使兩女在前各持一物撐之今為南詔所惣茫蠻南夷志曰茫蠻部落並開南雜種也茫是其君之號亦呼茫詔從永昌城南先過唐封次鳳藍苴次茫天連次茫吐薅又有火賧茫昌盛恐他茫鮓茫施皆其類也樓居無城郭或漆齒衣青布衫藤篾纏腰紅繒布纏髻出其餘垂後為飾婦人披五色娑羅籠孔雀巢人家樹上象如水牛俗養以耕田棠魔蠻南夷志曰棠魔蠻去安南林西原十二程俗養牛馬長與漢人博易大中八年經略使苛暴人將鹽一斗博牛或馬一匹因茲隔絶不來
