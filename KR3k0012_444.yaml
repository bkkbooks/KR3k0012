body:
  text: 人事部八十四知人中晉書曰裴頠字逸民弘雅有遠識博學稽古少知名御史中丞周弼見而歎曰頠若武庫五兵縱橫一時之傑也又曰荀勗父盼早亡勗依于舅氏歧嶷夙成年十餘歲能屬文從外祖魏太博鍾繇曰此兒當及其曾祖既長遂博學達於從政又曰郭奕時亭長李含有俊才而門寒為豪族所排奕用為別駕含後果有名位時以奕為知人又曰賀循少玩篇籍善屬文博覽衆書尤精禮傳雅有知人之鑒拔同郡楊方於卑陋卒成名於世又曰應詹鎮南大將軍劉弘詹之祖舅也請為長史謂之曰君器識弘深後當代老子於荊南矣乃委以軍政又曰楊方字公回少好學有異才初為郡鈐下威儀公事之睱輒讀五經鄉邑未之知內史諸葛恢見而奇之待以門人之禮由是始得周旋貴人間又曰郭奕字大業太原陽曲人也少有重名山濤稱其高簡有雅量為野王令羊祜嘗過之奕歎曰羊叔子何必減郭大業少選復又歎曰羊叔子去人遠矣遂送祜出界數百里又曰李喜薦樂安孫璞亦以道德顯時人稱為知人又曰唐彬初受學於東海閬德德門徒甚多獨目彬有廊廟才及彬官成而德已卒乃為之立碑又曰韋忠年十二喪父哀慕毀悴杖而後起司空裴秀弔之匍匐號訴哀慟感人秀出而告人曰此子長大必為佳器歸而命子頠造焉也又曰沛國戴晞少有才智與嵇紹從子含相友善時人許以遠致紹以為必不成器晞後為司州主簿以為無行被斥州黨稱有知人之明又曰鄭袤字林叔榮陽開封人也高祖衆漢大司農父泰楊州刺史有高名袤少孤早有識鑒荀攸見之曰鄭公業為不亡矣又曰王戎傳云阮籍與渾為友戎年十五隨渾在郎舍戎少籍二十歲而籍與之交籍每適渾俄須去過戎良久然後出謂渾曰濬冲清貴非卿倫也共卿言不如共阿戎談又曰樂廣字彥輔父方參魏征西將軍夏侯玄軍事廣時年八歲玄嘗見廣在路因呼與語還謂方曰向見廣神姿朗徹當為名士卿家雖盆可令專學必能興卿門戶也又曰曹攄字顏遠譙國人也祖肇魏將軍攄少有孝行好學善屬文太尉王衍見而器之調補臨淄令又曰潘京舉秀才到洛尚書令樂廣京州人也共談纍日深歎其才謂京曰君天才過人恨不學耳若學必為一代談宗京感其言遂勤學不倦又曰王澄傳云王衍有重名於世時人許以人倫之鑒尤重澄及王敦庾敳常為天下士目曰阿平第一子嵩第二處仲第三澄嘗謂衍曰兄形似道人而神峰太俊衍曰誠不如卿落落穆穆然澄由是顯名又曰戴若思往武陵省父時同郡人潘京素有理鑒名知人其父遣若思就京與語既而稱若思有公輔之林又曰周顗傳云同郡賈嵩有清操見顗歎曰汝頴固多奇士自頃雅道陵遲今復見周伯仁將振起舊風清我邦族矣又曰劉隗伯父訥字令言有人倫鑒識初入洛見諸名士而歎曰王夷甫大鮮明樂彥輔我所敬張茂先我所不解周弘武巧於用短杜方叔拙於用長又曰周浚有人倫鑒識其鄉人史曜素微賤衆所未知浚獨引之為友遂以妹妻之曜竟有名於世又曰阮修傳云王衍當時談宗自以論易略盡然有所未了研之終莫悟每云不知此後當見能通之者不衍族子敦謂衍曰阮宣子可與言衍曰吾亦聞之但未知其亹亹之處定何如耳及與循談言寡而旨暢衍乃歎服焉又曰桓彝字茂倫庾亮每屬彝覔一佳吏部及至都謂亮曰為卿得一吏部矣亮問安在彝曰人所應有而不必有人所應無而不必無徐寧真海岱清士因為敘之即遷吏部郎又曰謝玄時符堅強盛邊境數被侵冠朝廷求文武良將可以鎮禦北方安乃以玄應舉中書郎郗超素與玄不善聞而歎曰安違衆舉親然玄亦必不負舉時咸以為不然超曰吾嘗與玄共在桓公府見其使才雖履屐間亦得其任所以知之晉中興書曰何充字次道年在童齔伯父邃謂之曰我為兒時亡伯車騎謂我汝後當與伯父爭名汝今器宇宏深亦當名出我右由是少有名望又曰吳隱之字處默少有孝行遭母憂哀毀過禮時與太常韓康伯鄰居伯母語伯曰汝後若居銓衡之職當用如此輩人及伯為吏部尚書因進用之遂歷清顯又曰范汪字玄平少失父年六歲過江依外家虔氏荊州刺史王澄見而奇之以為興范族者必是人也又曰魏徐州刺史呂虔有佩刀工相之以為必三公可服此刀虔謂別駕王祥曰茍非其人刀或為害卿有公輔之量故以相與祥始辭之固強乃受祥死之日以刀授弟覽曰吾兒凡汝後必興足稱此故以相與又曰王珣字元琳弱冠與謝玄俱辟大司馬桓溫掾溫語人曰謝掾年三十必擁旄仗節王掾當作黑頭公皆不易才也又曰薛兼與同郡紀瞻廣陵閔鴻吳郡顧榮會稽賀循同志友善號曰五俊初入洛司空張華見而歎曰皆南金也又曰陸曄童齔中從兄機稱之為陸氏之寶我家不世之公也又曰褚季野翼從弟弱冠譙國橋彝見而異之曰褚季野有皮裹陽秋又曰王敦為太子舍人滎陽潘滔時為洗馬見而目之曰處仲蜂目已露但豺聲未振若不噬人亦當為人所噬沈約宋書曰桓玄聞一軍起便憂悴無復計或曰劉裕等衆力微弱豈便有成陛下何慮之甚玄曰劉裕是為一世之雄劉毅家無擔石之讎樗蒱一擲百萬何無忌劉牢之甥酷似其舅共舉大事何慮無成也宋書曰謝弘微童幼時精神端審時然後言叔父混嘗異之曰此兒深衷夙敏方成佳器有子如此足矣又曰謝弘微叔父混尚晉陵公主高祖受命晉陵公主降東鄉君以混得罪前代東鄉君節義可嘉聽還謝氏自混亡至是數載而室宇修整倉廩充盈門徒業使不異平日曰疇墾闢有如於舊東鄉君歎曰僕射平生重此子可謂知人僕射為不亡矣又曰袁淑字陽源陳郡陽夏人丹陽尹豹少子也少有風格年數歲伯湛謂家人此非凡兒齊書曰隋郡王子隆能屬文明帝謂王儉曰我家東阿也儉曰東阿重出實為皇家藩屏又曰徐孝嗣姑適東莞劉舍舍兄藏為尚書左丞孝嗣往詣之藏退語舍曰徐郎是令僕人三十餘可知矣汝宜善自結又曰江學為丹陽丞時袁粲為尹見學歎曰風流不墜正在江郎數與宴賞流連日夜蕭子顯齊書曰禇淵字彥回河南陽翟人也父卒悉推財與弟唯取書數千卷初與從弟照同載道遇太祖淵舉手指太祖車謂照曰此非常人將來不可測梁書曰沈瑀起家州從事奉朝請嘗詣齊尚書右丞殷濔濔與語及政事甚器之謂曰觀卿才幹當居吾此職又曰范述曾字子玄吳郡錢塘人也幼學從餘杭呂道惠受五經略通章句道惠學徒常有百數獨稱述曾曰此子必為王者師又曰賀琛字國寶會稽山陰人也伯父瑒步兵校尉為世碩儒琛幼瑒授其經業一聞便通義理瑒異之常曰此兒當以明經致貴又曰臧盾幼從徵士琅琊諸葛璩受五經通章句璩學徒常有數十百人盾處其間無所狎比璩異之歎曰此生重器王佐才也又曰賀瑒時沛國劉瓛為會稽府丞見瑒深器異之嘗與俱造吳郡張融指瑒謂融曰此生神明聰敏將來當為儒者宗又曰丘仲孚字公信吳興烏程人也少好學從祖靈鞠有人倫之鑒常稱為千里駒也陳書曰杜之偉強識俊才頗有名當世吏部尚書張瓚深知之以為廊廟器也又曰陸慶永陽王為吳郡太守聞其欲與相見慶固辭以疾時宗人陸榮為郡五官慶嘗詣焉王乃微服往榮舍穿壁以觀之王謂榮曰觀陸慶風神凝峻殆不可測嚴君平鄭子真何以尚茲北史曰于謹南伐江陵以唐瑾為元帥府長史及軍還諸將多因虜掠大獲財物瑾一無所取唯得書兩車載之以歸或言於周文曰唐瑾大有輜重悉是梁朝珍玩周文初不之信然欲明其實密遣使檢閲唯見墳籍而已乃歎曰孤知此人來二十許年耳其不以利污義向若不令撿視恐常人有投杼之疑孤所以益明之耳凡受人委任當如此也隋書曰魏任城王諧薦李德林因遺尚書令楊遵彥書云燕趙固多奇士此言誠不為謬今歲所貢秀才李德林者文章學識固不待言觀其風神器宇終為棟梁之用至如經國大體是賈生朝錯之儔雕蟲小伎殆相如子雲之輩今雖唐虞君世俊乂盈朝然修大廈豈厭夫良材之積也吾嘗見孔文舉薦禰衡表云洪水橫流帝思俾乂以正平比夫大禹常謂擬諭非倫今以德林言之便覺前言非大又曰楊素少落拓有大志不拘小節世人多未之知唯從叔祖魏尚書僕射寬深異之每謂子孫曰處道當逸群絶倫非常之器非汝曹所逮也又曰柳莊少有遠量博覽墳籍兼善辭令濟陽蔡大寶有重名於江左時為嶽陽王蕭察咨議見莊便歎曰襄陽水鏡在於茲矣大寶遂以女妻之又曰高構河東薛道衡才高當世每稱構有清鑒所為文筆必先以草呈構有所詆訶道衡未嘗不嗟伏大業七年終于家時年七十二所舉杜如晦房玄齡等後皆自致公輔論者稱構有知人之鑒又曰虞世基字茂世會稽餘姚人也父荔陳太子中庶子世基幼沈靜喜慍不形於色博學有高才兼善草隸陳中書令孔奐見而歎曰南金之貴屬在斯人少傅徐陵聞其名召之世基不往後因公會一見而奇之顧謂朝士曰當今潘陸也因以弟女妻焉隋書曰李德林任城王諧為定州刺史重其才召入州館朝夕同遊殆均師友不為君民禮數嘗語德林云竊聞蔽賢蒙顯戮久令君沉滯吾獨得潤身朝廷縱不見尤亦懼明靈所譴於是舉秀才入鄴李德林幼聰敏年數歲誦左思蜀都賦十餘日便度高隆之見而嗟歎遍告朝士云若假其年必為天下偉器鄴京人士多就宅觀之月餘日中車馬不絶年十五誦五經及古今文集日數千言俄而該博墳典陰陽緯候無不通涉善屬文辭核而理暢魏收嘗對高隆之謂其父曰賢子文筆終當繼溫子升隆之大笑曰魏常侍殊己嫉賢何不近比老彭乃遠求溫子又曰李士謙字子約趙郡平棘人也髫齔喪父事母以孝聞母曾嘔吐疑為中毒因跪而嘗之伯父魏歧州刺史瑒琛所嗟尚每稱曰此兒吾家之顏子也
