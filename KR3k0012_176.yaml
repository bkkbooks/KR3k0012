body:
  text: 居處部三殿説文曰殿堂之高大者也釋名曰殿典也摯虞決疑要注曰凡太極殿乃有陛堂則有階無陛也右磩左平平者以文磚相亞次墄者為陛級也九錫之禮納陛以登謂受此陛以上殿堂之正者為路寢凡殿堂坐位以近尊為上無尊者則已東向者以北為上南向者以西為上西向者以南為上北向者以東為上也殿堂之上唯天子居床其餘皆鋪幅席前設筵凡天子之殿東西九筵南北七筵史記秦始皇以咸陽人多先王之宮迂小乃營作朝宮渭南禁苑中先作前殿阿房東西五百步南北五十丈上可以坐萬人下可以建五丈之旗周旋為閣自殿下直指南山之巔為復道渡渭屬之咸陽漢書曰宣帝幸河東之明年鳳皇集上林乃作鳳皇殿以答嘉瑞事具祥瑞部鳳皇篇後漢書曰董卓傳云建安元年七月帝還至洛陽幸陽安殿張楊以為己功故因以楊為名殿范曄後漢書曰中平三年復修玉堂殿東觀漢記曰明帝欲起北宮尚書仆射鍾離意上書諫出為魯相後起德陽殿殿成百官大會上謂公卿曰鍾離尚書若在不得成此殿魏志明紀云青龍三年丁已行還洛陽宮命有司復崇華殿改名九龍殿又高堂隆傳云帝遂復崇華殿時郡國有龍九見故改曰九龍殿又張遼傳曰文帝引遼會建始殿親問破吳賊意狀帝嘆息顧左右曰此亦古之邵虎也為起殿舍又特為遼母作殿晉書曰張駿霸西河於姑臧起謙光殿畫以五色飾以金玉窮盡珍巧四面各起一殿東方曰宜陽青殿南方曰朱陽赤殿西方曰政德白殿北方曰玄武黑殿各同方色各以時居之晉載記曰石虎於襄國起太武殿於鄴造東西宮至是就太武殿基高二丈八尺以文石綷之下穿伏室置衛士五百人於其中東西七十五步南北六十五步皆漆瓦金鐺銀楹金柱珠簾玉壁窮極伎巧又起靈臺于顯陽殿後選士庶之女以充之後庭服綺縠奇玩者萬餘人內置女官十有八等教宮人星占及馬步射置女太史于靈臺仰觀災祥以考外太史之虛實魏略曰青龍三年起太極殿洛陽故諸宮有卻非殿銅馬殿敬法殿清涼殿鳳皇殿嘉德殿黃龍殿壽安殿竹殿晉中興書曰烈宗起清暑殿讖者曰清暑反語楚聲也為殿以酸楚之聲為號非吉祥也有頃烈宗崩桓玄自號楚又孝武帝造太極殿郭璞筮云二百一十年此殿為奴所壞後梁武帝毀之捨身為奴落享燕書曰秋七月丁卯營新殿昌黎大棘城縣河岸崩出鐵築頭一千一百七十四枚永樂民郭陵見之詣闕言狀以是日到詔曰經始崇殿而築具出人神允協之應也趙書曰劉曜召構殿巧手三千人發陽平等十郡車牛五千乘運土築建德殿臺基齊書武穆裴皇后傳云寵姬荀昭華居鳳華拍殿宮內御所居壽昌畫殿南閣置白鷺鼓吹二部又魏虜傳云虜主宏率衆至壽陽軍中黑氈行殿皆烏漆楯烏漆槊綴以黑蝦蟆幡登八公山賦詩而去又禮志云魏文修洛陽宮室權都許昌殿狹小元日於城南立氈殿青帷以為門又蕭赤斧子頴胄傳曰建武中荊州大風雨龍入柏齋中柱壁上有瓜足處刺史蕭欣恐畏不敢居之頴胄改為嘉福殿隋書宇文愷傳云時上北巡愷造觀風行殿上容侍衛者數百人離合為之下施輪軸推移倏忽有若神功戎狄見之莫不驚駭唐太宗謂侍臣曰今天下無事四夷賓服唯須守此成功以養百姓因指殿而言曰安百姓者如造此舍經始斯畢安可改移若易一榱增一瓦人足竟踐良工揮墨搖其梁棟所壞益多亦猶百姓既安因而撫養若慕奇功變法制不恆其德必致勞擾又曰太宗謂侍臣曰朕頃覽劉聰傳聰將為劉后起𪃫儀殿廷尉陳元達諫聰大怒命斬之劉后手疏啓請甚切聰怒解而甚愧之人之讀書欲廣聞見然非知之難也朕近於藍田市木將別為一殿取制兩儀仍構重閣其木已具遠想聰事斯作遂止又曰高祖引蘇世長宴於披香殿世長酒酣奏曰此隋煬帝之所作耶何雕麗之若此高祖曰卿好諫以直其心實詐豈不知此殿是吾所造何須姦詭疑煬帝乎對曰臣實不知但見傾宮鹿臺琉璃之瓦並非受命帝王愛民節用之所為也若是陛下作此誠非所宜臣昔在武功幸獲陪侍見陛下宅宇才蔽風霜當彼時亦以為足今目隋之侈民不堪命數歸有道而陛下得之實謂懲其奢淫不忘儉約今初有天下而於隋宮之內又加雕飾欲撥其亂寧可得乎高祖每優容之又曰玄宗嘗召張説及禮官學士等賜宴於集仙殿上謂説曰今與卿等賢才同宴於此宜改殿為集賢殿因下制改麗正書院為集賢殿書院又曰麗正殿高宗降誕之所開元中繕寫圖籍貯之洛陽宮殿簿有明光殿三秦記云明光殿在桂宮中皆以金玉珠璣為簾晝夜光明太沖吳都賦云飾赤烏之暐暐是也三輔宮殿名曰未央宮有騏驎殿椒房殿又曰長樂宮前殿宣德殿通光殿高明殿漢宮殿名曰長安有臨華殿神仙殿高門殿朱鳥殿曾城殿宣室殿承明殿鳳皇殿飛雲殿昭陽殿鴛鸞殿鉤臺殿合歡殿蕭何殿曹參殿韓信殿成都記曰隋蜀王秀常造一殿飛鳥不止其上戴延之西征記曰太極殿上有金井闌金搏山鹿盧山蛟龍山負於井上又有金師子伏滔北征記曰梁城東有韓馮墓去城三里青蘭殿是宋王住殿山謙之丹陽記曰太極殿周制路寢也秦漢曰前殿今稱太極曰前殿洛宮之號始自魏史記秦皇改命宮為廟以擬太極魏號正殿為太極蓋採其義而加以太亦猶漢夏門魏加曰大夏耳咸康中散騎侍郎庾闡議求改太為泰蓋謬矣東西堂亦魏制於周小寢也皇后正殿曰顯陽東曰含章西曰徽音又洛宮之舊也含章名起後漢顯陽徽音亦起魏曰明陽晉避文帝諱改為此周禮亦有路寢小寢又其制度也登真隱訣云寥陽殿太和殿皆云玉清宮中殿名二京雜記曰漢成帝設雲帳雲幄雲幕於甘泉紫殿謂之三雲殿漢官典職曰德陽殿周旋容萬人激洛水於殿下郡國志曰秦州上邽縣北十六里有無疆古殿基後魏太武築也王子年拾遺記曰漢成帝造飛行殿方丈如今之輦選期門羽林之士負之而趨一名雲雷宮兩京記曰東京五殿陰殿也壁厚五丈高九十尺東西房廊皆五十餘間西院有廚東院有教坊內庫高宗常御此殿又曰流杯殿東西廊殿南頭兩邊皆有亭子以間山池此殿上作漆渠九曲從陶光園引水入渠隋煬帝常於此為曲水之飲在東都又曰含元殿陛上高於平地四十餘丈南去丹鳳門四百步王文考魯靈光殿賦序曰魯靈光殿者蓋漢景帝程姬之子恭王餘之所立也初恭王始都下國好治宮室遂因魯僖基兆而營焉遭漢中微盜賊奔突自西京未央建章之殿皆見隳壞而靈光巋然獨存意者豈非神明依憑支持以保漢室者耶然其規矩制度上應星宿亦所以永安也晉宮閣名曰太極殿十二間徽行殿顯陽殿暉章殿含章殿建始殿仁壽殿百福殿清暑殿章華殿嘉福殿宣光殿修明殿嘉樂殿芙蓉殿崇光殿華光殿蔬圃殿華德殿九華殿右五殿在華林園章陽殿百兒殿芳德殿靈光殿承光殿永寧殿景福殿延休殿百子殿虞清殿淵冥殿安昌殿建康宮殿簿云林光殿在縣東北十里潮溝村覆舟山前晉以為藥園又曰陳永初中於臺城中起昭德嘉德壽安乾明有覺等殿又曰光嚴殿在縣東北六里景陽山東嶺南起重雲光嚴二殿前為兩樓又云梁於臺城中立曾城觀觀歷四代修理更起重閣七間上名重雲殿下名光嚴殿又云太初宮中有神龍殿去縣三里左太沖吳都賦云杭神龍之華殿是也又云臺城溫德門內又起三善長春勝辨等殿又云鳳光殿在縣東北五里一百步舊臺城內又云宋於臺城立正福清曜等殿又云臺城中有麗譙閣麗日殿飛香三重閣又云臺城溫德門內有永貞溫文文思壽安等殿輿地志云未央後宮有鴛鴦昭陽飛翔增地合歡蘭林披香鳳皇等八殿又云丹陽郡建康縣文德殿梁武帝移張衡渾儀置此殿又云洛陽有顯陽殿皇后正殿也魏明所建又云丹陽郡建康縣臺城華光殿梁武帝大通中毀施與草堂寺人洗取朱貨直百萬以其地起重閣七間又云丹陽郡建康縣臺城寶雲殿梁武帝以施佛事又云丹陽郡建康縣臺城惠輪殿梁武帝以供養佛又云洛陽昭陽殿魏明所治在太極之北鑄黃龍高四丈鳳皇二丈置殿前又云新安郡新始縣西十里有大宰殿晉武陵王晞為太宰桓溫詐言其反徙新安立第於此葬第側後喪還都今空冢在楊龍驤洛城記曰顯陽殿北有雲氣殿洛陽宮殿簿曰明光殿徽音殿式乾殿暉章殿含章殿建始殿仁壽殿嘉福殿百福殿芙蓉殿九華殿流圃殿華光殿崇光殿建康宮闕簿云赤烏殿在縣東北五里吳昭明宮內制度上應星宿亦所以永安也注水經曰孔子廟東南立百步有雙石闕即靈光之南闕也闕北百餘步即靈光殿基東西二十丈南北十二丈高丈餘東西廊廡別舍中間方七百餘步闕之東北有浴池池方四十餘步池中有鉤臺方十步池臺之基岸悉石也遺基尚整故王延壽賦曰周行數里仰不見日者也是漢景帝程姬子魯恭王之所造也殿之東南即泮宮也在高門直北道西宮中有臺高八十尺臺南水東西一百步南北六十步臺西水南北四百步東西六十步臺池咸結石為之
