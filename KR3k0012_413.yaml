body:
  text: 人事部五十三孝上爾雅曰善父母為孝毛詩鄁柏舟曰凱風美孝子也凱風南風衛之淫風流行雖有七子之母猶不安其室故美七子能盡其孝道以慰其母心又曰陟岵孝子行役思念父母也國小而迫數侵削役于大國父子兄弟離散而作是詩也陟彼岵兮山有草木曰岵瞻望父兮又谷風蓼莪剌幽王也民人勞苦孝子不得終養爾蓼蓼者莪匪莪伊蒿蓼蓼長大貌也莪己蓼長大我視之以為非莪反謂之蒿諭己憂思雖在役中心不精識其事哀哀父母生我劬勞尚書曰有鰥在下曰虞舜帝曰俞豫聞如何嶽曰瞽子父頑母器象傲克譖以孝蒸乂不格姦大戴禮曰上敬老則下益孝禮記曲禮曰凡為人子者冬溫而夏清昏定而晨省故州閭鄉黨稱其孝也孝子不服暗不登危懼辱親也服事也不於暗冥之中從事謂卒有非常失禮也又祭義曰曾子曰孝有三大孝尊親其次不辱其下能養公明儀問於曾子曰夫子可以為孝乎曾子曰是何言與是何言與君子之所謂孝者先意承志諭父母於道參直養者安能為孝乎曾子曰身也者父母之遺體也行父母之遺體敢不敬乎居處不莊非孝也事君不忠非孝也蒞官不敬非孝也朋友不信非孝也戰陳無勇非孝也五者不遂災及於親敢不敬乎烹熟羶薌嘗而薦之非孝也養也夫孝置之而塞乎天地溥之而橫乎四海斷一樹殺一獸不以其時非孝也孝有三小孝用力中孝用勞大孝不匱慈愛忘勞可謂用力矣尊仁安義可謂用勞矣博施備物可謂不匱矣父母愛之喜而弗忘父母惡之懼而無怨父母有過諫而不逆父母既沒必求仁者之粟以祀之此之謂終禮又曰先王之孝也色不忘乎目目常思父母之顏色聲不絶乎耳心志嗜欲不忘乎心君子生則敬養死則敬享思終身弗辱也又曰子曰舜其大孝也歟德為聖人尊為天子富有四海之內宗廟享之子孫保之故大德也必得其位必得其祿必得其名必得其壽又曰閔子騫既除喪而見與之琴和之而不和彈之而不成聲夫樂之和猶人心雖喪以除而哀未已作而曰哀未忘也先王制禮不敢過也又曰文王之為世子朝於王季日三雞初鳴而衣服至於寢門外問內豎之御者曰今日安否何如內豎曰安文王乃喜及日中又至亦如之及暮亦如之其有不安節則內豎以告文王文王色憂行不能正履王季復膳然後亦復初左傳曰鄭莊公即位姜氏愛共叔段請京使居之叔段襲鄭莊公伐京遂置姜氏于城潁而誓之曰不及黃泉無相見也既而悔之潁考叔曰君何患焉若闕地及泉遂而相見闕穿也隧埏也其誰曰不然公從之君子曰潁考叔純孝也孝經曰愛敬盡於事親而德教加於百姓刑於四海蓋天子之孝也高而不危所以長守貴也滿而不溢所以長守富也蓋諸侯之孝也言滿天下無口過行滿天下無怨惡蓋卿大夫之孝也以孝事君則忠以敬事長則順蓋士之孝也謹身節用以養父母此庶人之孝也孝經援神契曰天子行孝四夷和平又曰孝悌之至通於神明病則致其憂憔悴消形求醫翼全宋均注曰翼羽翼親者也孝經說曰孝畜也養也論語學而曰父在觀其志父沒觀其行三年無改於父之道可謂孝矣孝子父在無所自專庶幾於其善道而已又為政曰子路問孝子曰色難言和顏色悅為難也家語曰子路見孔子曰負重涉遠不擇地而遊家貧親老不擇祿而仕昔者由也事二親之時常食藜藿之實而為親負米百里之外親沒之後南遊於楚從車百乘積粟萬鍾纍茵而坐茵辱列鼎而食願欲食藜藿為親負米不可復得也枯魚銜索幾何不蠹二親之壽忽如過隙孔子曰由也事親可謂生事盡力死事盡思者也又曰曾參者武城人字子與志於孝道故孔子因之作孝經齊欲以為卿而不就曰吾父母老食人祿則憂人事吾不忍遠親而為人役也後母遇之無恩而供養不衰及其妻為藜蒸不熟因出之人曰非七出也答曰藜蒸小物耳吾欲使熟而不用吾命況大事乎遂遣之終身不娶其子請焉告子曰高宗以後妻殺孝己尹吉甫以後妻放伯奇吾上不及高宗下不比吉甫庸知其得免於非乎漢書曰梁孝王每聞太后病口不能食又曰金日磾母教誨兩子甚有法度上聞而嘉之母死詔圖畫於甘泉宮署曰休屠王閼氏日磾每見畫常拜向之涕泣東觀漢記曰汝郁字叔異陳國人年五歲母病不能飲食郁亦不肯飲食母憐之強為飧飯欺言已愈郁察母親色不平輒復不食宗親共奇異之因字曰異又曰蕭彪字伯文京兆杜陵人纍官巴郡太守父老乞供養父有賓客輒立屏風後應受使命父嗜餅音餅每自買進之又曰張霸字伯饒蜀郡成都人年數歲有所噉必先讓父母鄉里號曰張曾子九歲通春秋復欲進業父母語汝小何能多少霸曰饒為之故字伯饒後作會稽太守兒童歌曰城上烏哺父母府中諸吏皆孝子又曰趙咨字文楚東郡燕人大司農陳奇舉咨至孝躬率子孫耕農為養盜嘗夜往劫之咨恐母驚懼乃先至門迎盜因設為食謝曰老母八十疾病須養居貧無儲乞少置衣糧妻子餘物一無所請盜皆慚奔走又曰黃香字文疆父兄舉孝廉貧無奴僕香躬勤苦盡心供養冬無被袴而親極滋味暑即扇枕寒即以身溫席又曰鮑永字君長上黨人少有志操事母至孝妻常於母前叱狗永即去之又曰樊鯈字長魚事母至孝母常病癰鯈晝夜匍伏不離左右至為吮癰又曰張表字公儀奉之子也遭父喪疾病曠年目無所見耳無所聞服闋醫藥救療歷歲乃瘳每彈琴惻愴不能成聲見酒肉未嘗不泣宗人親厚節會飲食宴為其不復設樂又曰廉范字叔度京兆人也父客死蜀漢范與客步負喪歸至葭萌船觸石破沒范持棺柩遂俱沈溺衆傷其義鉤求得之僅免於死又曰李充兄弟六人出入更衣家貧親老充妻勸異居充使釀酒會親戚充啓其母曰此婦勸異居不可奉祭祀請去之遂叱出其婦吳志曰顧悌以孝悌廉直聞於鄉黨每得父書灑掃整衣服設几筵舒書其上拜跪讀書應諾畢復再拜父終水漿不入於口五日孫權為作布衣一襲強令悌釋服悌雖以公義自割猶以不見父喪常畫壁作棺柩設象神坐於下對之哭泣服未闋卒臧榮緒晉書曰長孫略字文度以富春車道少動經江水父難於風波每行乘藍車略常步從遠者百里每渡浦則親入水扶持藍車又曰嵇紹事母至孝和色柔聲常居不足謹身節儉朝夕孜孜親執刀俎非無使伎以他人不如己之至誠也又曰晉齊獻王司馬攸字文猷晉文少子太后崩執喪過哀動必盡禮左右或以稻米千飯丸理中丸以進王對之涕泣不食經三年杖然後能起人有犯諱者常悲不自勝又曰王延九歲喪父母卜氏遇之無道延事之夏則扇枕席冬則以身溫之盛寒體無全衣而親極滋味王隱晉書曰李胤字宣伯遼東人祖父敏漢末河內太守為賊所迫逐不知所終其子追索歷年無所見此居與父同年者亡制服行喪燕國徐邈與之州里勸令娉婦孕生胤遂絶房內常禮重之不堪其憂數年而卒胤母更適牽招胤不識父母又改行有識之後降食哀感亦如遭喪之禮以祖不知存亡設木主以事之由是發名又曰郤詵對策上第拜朝議郎母憂去職母苦病亡不欲車載家貧無以市買乃於所住堂北壁假葬朝夕拜告養雞種蒜竭其力術過三年得馬八匹輿棺至家負土成墳晉中興書曰吳隱之字處默濮陽人遭母憂哀毀過禮時與太常韓康伯鄰居隱之每哭康伯母輒輟食流涕悲不自勝語康伯曰吾若居銓衡之職當用此輩人及康伯為吏部尚書因進用之遂歷清顯又曰范宣八歲後園挑菜誤傷指大啼問痛邪答曰非為痛身體髮膚不敢毀傷是以啼也又曰後蜀李雄太子班雄寢疾班晝夜省侍衣不解帶雄自少攻戰大被傷痍至是多膿潰班為吮膿殊無難色班即雄兄之子也宋書曰孫法宗一名宗之吳興人也父隨孫恩入海澨被害尸骸不收母兄並餓死法宗年小流迸至十六方得還單身勤苦霜行草宿營辦棺槨造立冢墓葬送母兄儉而有禮以父尸不測入海尋求聞世間論是至親以血瀝骨當悉凝沒乃操刀沿海見枯骸則刻肉灌血如此十餘年臂脛無完皮血脈枯竭終不能逢縗絰終身常居墓所山禽野獸皆悉馴附每逢鹿觸網必解放之又孝義傳曰崔懷順清河東武城人也父耶利魯郡太守宋元嘉中為魏所獲懷順與妻房氏篤愛聞父見虜即日遣妻布衣蔬食如喪禮歲時北向流涕耶利後仕魏書戒懷順不許如此懷順得書更號泣懷順從叔摸為滎陽太守亦入魏摸子雖居處改節不廢婚官宋大明中懷順宗人冀州刺史元孫北使魏魏人問之曰崔邪利摸並力屈來歸二家子姪出處不同義將安在元孫曰王尊叱馭王陽回車欲令忠孝並弘臣子兩遂泰始初淮北入魏懷順因此歸北至代都而邪利已卒懷順絶而後蘇載喪還青州徒跣冰雪土氣寒酷而手足不凍時人以為之孝感又曰華寶晉陵無錫人也父豪晉義熙末戍長安年八歲臨別謂寶曰須我還當為汝上頭長安陷寶年七十不婚冠或問之者輒號慟彌日不忍答也又曰散騎常侍袁瑜薦會稽郭道事繼母至孝家貧産子憂不能字謂其妻曰傷慈以終孝吾無恨也遂瘞之又曰師覺援字覺授南陽溫陽人也與外兄宗少文並有素業以琴書自娛於路忽見一人持書一函題曰至孝師君苫前俄而不見捨車奔歸聞家哭聲一叫而絶良久乃蘇又曰謝𣟤字宣鏡幼有殊行年數歲所生母郭氏久嬰痼疾𣟤晨昏溫清嘗藥捧膳不闕一時勤容戚顏未嘗暫改恐僕役營疾懈倦躬自執勞母為病畏驚而微賤過甚一家尊卑感𣟤至性皆納履而行屏氣而語如此十年餘又曰蔡曇智鄉里號蔡曾子廬江何伯璵兄弟里號為何展禽並為高士沈顗所稱常云聞蔡曇智之風怯夫勇鄙夫有立志聞何伯璵之風僞夫正薄夫厚伯璵與弟幼璵俱厲節操養兄孤子及長為婚推家業盡與之安貧枯槁誨人不倦郡守下車莫不修請又曰余齊人晉陵人也少有孝行為邑書吏大明二年父賓在家病亡信未至齊人謂人曰比者肉痛心煩有如割截居常皇駭必有異故信尋至以父病報之四百餘里一日而至至門方知父死號痛慟絶良久乃蘇問父所遺言母曰汝父臨終恨不見汝齊人即曰相見何難於是號殯所須臾便絶州縣上言有司奏改其里為孝義里蠲租布賜其穀百斛又曰彭城劉悛司空勔音免之長子年十三身長七尺三寸以孝悌稱勔見害於朱雀街悛兄弟平生不行此路喪骨立杖而後起悛為黃門郎稍遷右衛勑明帝山陵不獲己從朱雀街過感慟而卒齊書曰王文殊字令章吳興故鄣人父入魏文殊思慕泣血終身蔬食不衣帛服麻縕而已不婚不交人物吳興太守謝瀹聘為功曹不就立小屋於縣西端揖拱其中歲時伏臘月十五未嘗不北望長悲如此三十餘年太守孔琇之表其行鬱林詔榜門改所居為孝行里琇音秀又音酉蕭子顯齊書曰劉瓛胡官切有至性祖母病疽經年瓛手持膏藥漬指爛母孔氏甚嚴明謂親戚曰阿稱便是今世曾子稱瓛小名也又曰樂頤字文德南陽人也世居南郡父在家病亡頤忽思戀涕泣因假還中路果得父凶問頤便徒跣號咷出陶後渚遇商人附載西上水漿不入口數日常遇病與母隔壁忍病不言齧被至碎恐母哀己吏部庾果之嘗往候之設食枯魚菜葅云我不能食此母聞之自出常膳魚羹數種果之曰卿過於茅季偉我非郭林宗又曰傅琰字季圭北地靈州人也美姿儀除尚書左侍郎遷尚書左丞遂遭母喪居南岸鄰家失火延燒琰屋抱柩不動鄰人競求赴救乃得俱全琰肱髀之間已被煙熖服闋除江夏王録事梁書曰沈崇傃字思整吳國武康人也父懷明宋兗州刺史崇傃六歲丁父憂哭踊過禮及長事所生母至孝家貧常傭書以養天監二年太守柳惲辟為主簿崇傃之從惲到郡還迎其母未至而母卒崇傃以不及侍疾將欲致死水漿不入口晝夜號哭旬日殆將絶氣兄弟謂曰葬未申遽自毀滅非全孝道也崇傃心悟乃稍進食母權瘞去家數里哀至輒之瘞所不避雨雪就墳哀慟飛鳥翔集夜常有猛獸來望之有聲狀如歎息者家貧無以遷曆乃行乞經年始獲葬焉既而廬于墓側自以初行喪禮不備復以葬後更行服三年久進麥屑不噉鹽酢坐臥於單薦因虛腫不能起郡縣舉至孝梁武帝聞即遣中書舍人慰勉之乃詔令釋服推補太子洗馬旌其門閭崇傃奉詔釋服而涕泣如居喪固辭不受官乃除永寧令自以祿不及養哀思不自堪未至縣卒又曰荀匠字文師潁陰人晉太保勗九世孫也祖瓊年十五復父仇於成都市以孝聞宋元嘉末渡淮赴武陵王義為元凶追殺贈員外散騎侍郎父法超仕齊為安復令卒官匠號慟氣絶身體皆冷至夜乃蘇既而奔喪梁天監元年其兄斐為鬱林太守征俚賊為流矢所中死於陳喪還匠迎于豫章望舟投水傍人赴救僅而得全及至家貧不時葬居父憂并兄服歷四年不出廬戶櫛括髮不復櫛沐髮皆禿落哭無時聲盡則係之以泣目眥皆爛形體枯悴皮骨裁連雖家人不復識郡縣以言武帝詔遣中書舍人為其除服推為豫章王國左常侍匠雖即官而毀悴逾甚外祖孫謙誡之曰主上以孝臨天下汝過古人故推汝為此職非為君父之命難拒故亦楊名後世所顯豈獨汝身匠乃拜竟以毀卒
