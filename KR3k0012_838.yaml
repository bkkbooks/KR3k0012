body:
  text: 百榖部一穀周易曰日月麗乎天百穀草木麗乎土尚書曰稷降播種農食嘉穀毛詩穀風信南山曰既沾既足生我百穀毛詩甫田曰播厥百穀既庭且碩曾孫是若周禮天官曰太宰以九職任萬民一曰三農生九穀鄭曰農云九穀稷黍秣稻麻大小豆大小麥凡王之膳食用六穀鄭司農云稻黍稷梁麥菰菰雕胡也藥養其病鄭玄注五穀麻黍稷麥豆又夏官曰職方氏掌天下之圖辨其邦國都鄙九穀之數楊州荊州其穀宜稻豫州并州其穀宜五稷鄭玄云黍稷麥稻菽青州其穀宜稻麥兗州其穀宜四種黍稷稻麥雍州冀州其穀宜稷幽州其穀宜三種稷黍稻禮記月令曰孟春天子乃以元日祈穀于上帝孟夏驅獸無害五穀獸糜鹿之屬食穀苗驅之令勿害也孟秋農乃登穀天子嘗新先薦寢廟黍稷之屬於是始熟又王制曰五穀不時不鬻於市又樂記曰夫古者天地順而四時當民有德而五穀昌疾疹不作而無妖祥德盛而教尊五穀時熟然後賞之以樂大戴禮曰黃帝播百穀草木節用水火財物生而民得其利百年民畏其神百年亡而民用其教百年故曰三百年又曰食氣者神明而壽食穀者智惠而巧不食者不死禮斗威儀曰君乘木而王則草木豐茂嘉穀並生也左傳襄公曰泰伯之弟針謂趙文子曰針聞之國無道年穀和熟天贊之也鮮不五稔又曰晉范宣子為政賦黍苗季武子興再拜稽首曰小國之仰大國也如百穀之仰膏雨也穀梁傳襄公二十四年曰京師大飢五穀不升升為大飢升成也一穀不升謂之嗛嗛不足貌二穀不升謂之飢三穀不升謂之饉四穀不升謂之康康虐也五穀不升謂之大侵春秋繁露曰金干土則五穀傷土干金則五穀不成春秋佐助期曰咸池主五穀爾雅曰中有岱嶽與其五穀魚鹽生焉穀不熟為飢仍飢為荐郭璞注曰言泰山有魚鹽之饒也不熟五穀不成荐連歲不成也周書曰凡禾麥居東方黍居南方稻居中央粟居西方菽居北方史記曰黃帝考定星曆立五行民神易業敬而不黷故神降之嘉生嘉穀也又曰齊桓公欲封禪管仲曰今鳳皇不來嘉穀不生而還蓬蒿藜莠茂鴟梟數至又曰留侯性多病即導引不食穀服辟穀藥而靜居行氣漢書朝錯曰粟米布帛生於地長於是聚於力非可一日成也數石之重中人弗勝不為姦邪所利一日弗得而飢寒至是胡明君貴五穀而賤金玉今海內為一土地人民之衆不減湯禹加以亡天災數年之旱而蓄積之未及也何也地有遺利民有餘力生穀之土未盡墾山澤之利未盡出也遊食之人未盡歸農也又曰宣帝即位歲數豐穰穀至石五錢東觀漢記曰永平十五年上始欲征胸奴與竇固等議出兵調度皆以為塞外草美可不須穀馬案軍出塞無穀馬故事馬防言常與穀上曰何以言之防對曰宣帝時五帝出征案其奏言胸奴候騎得漢矢見其中有粟知漢兵出以故引去以是言之馬當與穀上善其用意微緻即下調馬穀防遂見親也又曰建武初穀食尚少趙孝得穀炊將熟令弟禮夫妻出北還孝夫妻共蔬食茹菜禮夫妻來輒獨飴之積久禮心疑吝後同掩見亦不復肯出兄弟怡怡鄉里歸德華嶠後漢書曰馬援在河西有穀數萬斛乃歎曰凡殖財者貴以施也否則守錢虜耳袁宏漢紀曰赤眉亂後關中大飢黃金一斤易五升穀後漢書曰董卓築塢於郿高原七丈號曰萬歲塢今案塢舊基高一丈周回一里一百步也積穀為三十年儲自云事成雄據天下不成守此足以畢老又曰王莽末天下大飢建武二年天下野穀旅生麻菽尤盛魏志曰自遭荒亂率乏糧穀曹公曰夫定國之術在於強兵足食秦人以急農兼天下孝武以屯田定西域此先世之良式也是歲乃募民屯田許下得穀百萬斛於是郡列置田官所在積穀又曰袁曜卿為魏國郎中令及卒太祖為之流涕賜穀二千斛一教以太倉穀千斛賜郎中令家一教以垣下穀千斛與曜卿家外不解其意教曰以太倉穀者官法也以垣下穀者親舊也又曰袁談以王循為別駕太祖破鄴藉沒審配等家財物資以萬數破南皮閲循家穀不滿十斛又曰高堂隆諫祿賜穀帛人主之所以惠養吏民而為之司命若令有廢是奪其命又曰甄皇后三歲失父後天下兵亂飢饉百姓皆賣金銀珠金寶物時后家大有儲穀頗以買之后年十餘歲白母曰今世亂而多買寶物匹夫無罪懷璧為罪又左右皆飢乏不如以穀振給親族鄰里廣為恩惠舉家稱善曹瞞傳曰太祖嘗賦廩穀不足私謂主者如何主者曰可以小斛以足之後軍中言太祖欺衆太祖謂主者曰借汝一死厭衆乃殉曰小斛盜官穀即斬之江表傳曰諸葛亮聞恪代徐詳書與陸遜曰家兄年老而恪性踈今使典主糧穀糧穀軍之要最僕雖在遠竊用不安足下特為啓至尊轉之王隱晉書曰鄧攸為吳郡太守吳人飢荒攸輒出臺倉穀振之後被劾攸曰善不可為也三國典略曰後梁有何山者其射之妙人莫能及有烏噪於庭樹蕭察惡之謂山曰射中者賜一車穀其烏巢並於枝上山曰脫一箭中兩請賜兩車臣無車牛願官為送察許之於是山射中其二項察甚欣悅即令載穀送之後魏書曰韋珍遷顯武將軍郢州刺史在州有聲績朝廷嘉之遷龍驤將軍賜驊騮二匹帛五十五匹穀三百斛珍乃召集州內孤貧者謂曰天子以我能綏撫卿故賜以穀帛吾何敢獨當遂以所賜悉分與之北史曰盧義僖寬和畏慎不妄交款性情儉素不營財利少時幽州頻遭水旱先有數萬石穀貸人義僖以年穀不熟乃燔其契州閭悅其恩德雖居顯位每至困乏麥飯蔬食欣然甘之唐書曰長壽二年元日大雪其夜質明而晴上謂侍臣曰俗云元日有雪則百穀豐未知此語有何故實文昌左丞姚璹對曰汜勝書云雪是五穀之精以其汁和種則年穀大穰又宋孝武帝大明五年元日降雪以為嘉瑞上曰朕臨御萬方心存百姓如得年登歲稔此即可為大瑞雖獲麟鳳亦何用為墨子曰一穀不收謂之饉二穀不收謂之旱三穀不收謂之凶四穀不收謂之五穀不收謂之飢饉則大夫以下損祿五分之一旱則三凶則四飢則盡祿廩食而已孔叢子曰魏王問子慎曰寡人聞昔上天神異后稷而為之下嘉穀周遂以興住中山之地無故有穀非人所為云天雨之反以亡國何答曰天雖至神自古及今未聞其下穀與人也詩美后稷能大教民種善穀以利天下所謂稷降播種農殖嘉穀其義一也若中山之穀妖怪之事非所謂天祥也管子曰常山之東河汝之間早生而晚殺五穀之所蕃熟也陳子要言曰食穀而鄙田衣帛而笑蠶是惑也范子計然曰五穀者萬民之命國之重寶也是故無道之君及無道之臣皆不能積其盛有餘之時以待其衰不足星經曰八穀八星在五車北主黍稷稻梁麻麥烏麻星明俱熟師曠曰杏多實不蟲者來年秋喜五穀之先欲知五穀但視五木擇其木盛者來年益種之京房五星占曰五穀俱傷何君無德也京房易逆刺曰天雨穀歲大熟淮南子曰木勝土土勝水水勝火火勝金金勝水故禾春生秋死禾木也木王而生金王而死也菽夏生冬死菽火也火王而生水王而死也麥秋生夏死麥金也金王而生火王而死也薺冬生仲夏死薺水也水王而生土王而死也又曰稷墾草發災糞土樹穀使五穀之五種各得宜因地之勢也又曰女夷鼓歌女夷天帝之女下司時和春陽喜樂鼓歌也以司天和以長百穀禽獸草木孟夏之月以享穀本雄鳩長穀為帝候歲雄鳩養長穀之鳥也金樓子曰鬻官者欲民之死蓄穀者欲歲之飢船漏水入囊洞內虛也説苑曰楚魏會於晉陽將以伐齊王患之使人召淳于髡曰楚魏謀欲伐齊願先生與寡人共之淳于髡大笑而不應三問而不應王怫然作色曰先生以寡人國為戲乎淳于髡對曰臣不敢以王國為戲也臣笑鄰之祠田也以篋飲與一鮒魚其祝曰下田汙耶得穀百車蟹戶買反堁口對反者宜禾臣笑其所以祠者少而求者多王曰善賜之千金革車百乘立為上卿山海經曰都廣之野百穀自生冬夏播琴郭璞注曰其城方三百里蓋天地之中素女所出也播琴猶播殖方俗言耳揚雄方言曰凡以火乾五穀之類出自山東齊楚以往曰熬隴冀以往曰𤐧平力切秦晉之間曰焣創眇切楊泉物理論曰穀氣勝元氣其人肥而不壽養性之術常使穀氣少則病不生矣梁者黍稷之惣名也稻者溉種之惣名菽者衆豆之惣名三穀各二十種為六十疏果之實助穀各二十斤為百穀故詩曰播厥百穀穀者衆種之大名也説文曰稑音六疾熟也穀續也百穀惣名也賈誼書曰至于神農嘗百草之實察鹹苦之味教民食穀汜勝之書曰雪者五穀之精又曰小豆忌卯稻麻忌辰禾忌丑秫忌未小麥忌戍大麥忌子桓談新論曰世俗咸言漢文帝澤加黎庶穀至石數錢論談曰謂天雨穀從天而下應變而生非也夫雲出於山散而為雨人見從天墜謂雨水也夏日則雨冬寒則凝為雪發於丘山不從天降明矣穀從地起與疾風俱飄集於地人謂天之雨也建武三十一年陳留雨穀蔽地視穀形如米而黑此夷狄地所生穀也夷狄不食穀生於草野成熟委於地遭疾風之俱飛衰穀集中國中國見之謂天雨穀世要論曰學不勤則不知道耕不力則不得穀又曰服一綵則念女工勞御一穀則恤農夫勤兵書曰軍中地生五穀將軍得天道大吉夢書曰五穀為財飲食物夢見穀得財吉五穀入家家當盛殷氏世傳曰殷謖字伯起遭世喪亂埋穀數百石後謖為賊所執見掠責具以穀告之賊猶嫌其未實欲刃焉謖乃詈曰卿行劫害當知人心豈有出財還自殺耶則知其誠遂免羊祜別傳曰祜周行賊境七百餘里往反四十餘日刈賊穀以為軍糧皆計須畝送絹還直使如穀價風俗通曰建武之初旅穀彌望野繭被山盛弘之荊州記曰桂陽郡西北接耒陽縣有溫泉其下流百里恆資以溉灌常十二月一日種至明年三月新穀便登重種一年三熟博物志曰馬食穀則足重不能行又曰扶海洲上有草焉名曰蒒其實食之如大麥從七月稔熟民斂穫至冬乃訖名曰自然穀或曰禹餘糧又曰孝元竟寧元年南陽山都雨穀小者如黍粟而青黑味苦大者如米豆赤黃味如麥下三日生根葉狀如大豆初生時幽明録曰琅耶諸葛氏兄弟二人寓居晉陵家甚貧耗常假乞自給穀在囷中計日用未應盡而早以空罄始者謂是家中相竊盜復封檢題識而耗如初後有宿客遠來際夕至巷口見數人擔穀從門出客借問諸葛在否答云悉在客進內言語之後因問卿何得大糶穀主人云告乞少穀欲充口云何復得糶之客云吾向來逢見數人擔穀從門出若不糶者為何事主人兄弟相視竊自疑怪試入看封題儼然如故試開囷量視即無十許斛知前後所失非人為之異苑曰涼州張駿時天雨五穀殖之悉生因名為天麥張衡東京賦曰所貴唯賢所寶唯穀曹植謝賜穀表曰詔書念臣經用不足以船河邸閣穀五千斛賜臣謝玄書奉白糧穀十斛是釣池上之所種
