body:
  text: 皇王部十三漢孝文皇帝春秋演孔圖曰戴玉英玉英文帝之首表象玉英而秀出光中再光曰光也再再中也漢含孳曰夜景移位復中支庶起也仁雄出日角用為仁人之雄傑既戴玉英且日角也謂用於天下史記曰孝文皇帝諱恆諱恆之字曰常諡法慈惠愛民曰文高祖之中子也高祖十一年立為代王都中都高后八年高后崩呂産等欲為亂以危劉氏大臣共誅之使迎代王王問左右郎中令張武等議曰漢大臣皆故高帝時大將習兵多謀詐今誅諸呂新喋血京師此以迎大王為名實不可信願大王稱疾無往以觀其變中尉宋昌進曰夫秦失其政諸侯豪傑並起人人自以為得之者以萬數然卒踐天子位者劉氏也天下絶望一矣高帝封王子弟地太牙相制此所謂盤石之宗也天下服其強二矣漢興除秦苛政約法令施德惠人人自安難動搖三也夫以呂太后之嚴立諸呂為三王擅權專制然而太尉以節入北軍一呼士皆左袒為劉氏叛諸呂卒以滅之此乃天授非人力也今高帝子獨淮南王與大王大王又長賢聖仁孝聞於天下故大臣因天下之心而欲迎立大王大王勿疑也代王卜之龜兆得大橫占曰大橫庚庚余為天王夏啓以光代王曰寡人固以為王矣又何王卜人曰所謂天王者乃天子也代王乃命宋昌參乘張武等六人乘傳詣長安至高陵休止而使宋昌先馳之長安觀變昌至渭橋丞相已下皆迎宋昌還報代王馳至渭橋群臣拜謁太尉勃進曰願請間言昌曰所言公公言之所言私王者不受私太尉乃跪上天子之璽符代王謝曰至代邸而議之遂馳入代邸宗室大臣列侯吏二千石皆伏固請代王西向讓者三南向讓者再遂即天子位即日夕入未央宮三年胸奴入北地居河南為寇帝自甘泉之高奴因幸太原見故群臣皆賜之舉功行賞十三年齊太倉令淳于公有罪當刑少女緹縈自傷泣乃隨其父至長安上書願沒入為官婢贖父刑罪使得自新書奏天子天子憐悲其意乃下詔曰夫刑至斷支體刻肌膚終身不息何其楚痛豈稱為民父母之意哉其除肉刑又曰孝文皇帝從代來即位二十三年宮室苑囿狗馬服御無所增益有不便輒弛以利民嘗欲作露臺召匠計之直百金上曰百金中民十家之産吾奉先帝宮室常恐羞之何以臺為上常衣綈衣所幸慎夫人令衣不得曳地幃帳不得文繡以示敦朴為天下先治霸陵皆以瓦器不得以金銀銅錫為飾吳王詐病不朝就賜几杖群臣如袁盎等稱説雖切常假借用之群臣如張武等受賂遺金錢覺上乃發御府金錢賜之以愧其心弗下吏專務以德化民是以海內殷富興於禮義後七年六月帝崩於未央宮遺詔無發民男女哭臨服大功十五日小功十四纖七日釋服史記太史公曰孔子言必世然後仁善人之治國百年亦可以勝殘去殺誠哉是言也漢興至孝文四十有餘載德至盛也漢書曰張蒼免相文帝以皇后弟竇廣國賢有行欲相之曰恐天下以吾私廣國乃以御史大夫申徒嘉為丞相又曰武帝從容問東方朔曰吾欲化民豈有道乎朔對曰願近述孝文皇帝之時當世耆老皆聞見之貴為天子富有四海身衣弋綈足履革舄以韋帶劍雚為席兵木為刃服虔曰兵器如木而無刃衣縕無文集上書囊以為殿帷以道德為麗以義為準於是天下望風成俗昭然化之又曰賈捐之曰孝文皇帝閔中國未安偃武行文時有獻千里馬者詔曰鸞旗在前屬車在後吉行日五十里朕乘千里之馬獨先安之於是還馬與道里費荀悅漢紀曰韓信為左丞相與曹參灌嬰擊魏王豹豹姬曰薄姬許負相之當生天子豹猜此言而反豹敗漢王納薄姬實生文帝又曰以孝文之明大朝之治百寮之賢而賈誼見排逐張釋之十年不見省馮唐首白屈於郎豈不惜哉夫以絳侯之忠功存社稷而猶見疑不亦痛乎帝王世紀曰孝文即位二十三年年四十七葬霸陵因山為體廟名顧城桓子新論曰漢太宗文帝有仁智通明之德承漢初定躬儉省約以惠休百姓救贍困乏除肉刑滅律法薄葬埋損輿服所謂達於養生送終之實者也及始從代徵時謀議狐疑能從宋昌之策應聲馳來即位而偃武行文施布大恩欲息兵革與胸奴和親揔撮綱紀故遂褒增隆為太宗也而溺於俗儀斥逐材臣又不勝私恩使嬖妾慎夫人與皇后同席以亂尊卑之倫所通而蔽也風俗通曰孝成皇帝問劉向世俗多傳道文皇帝少生於軍不知父所在日祭於代城東門外高帝數夢見一兒祭己使使至代求之果得文帝立為代王後徵到後期不得立日為再中遂即位為天子躬行至儉集上書囊以為前殿帷常居明光宮聽政為皇太子治三年服天下平米升一錢有此事不向對曰文帝生而為王者子常居宮闕內不棄捐軍中祭代東門外也高后八年九月己酉夕即位時已昏夜日不再中也文帝雖節儉未央前殿至奢雕文及五彩畫華欀壁墻軒檻皆飾以黃金其勢不可以書囊為帷又帝率聽政宣室不在明光宮也薄太后孝景二年薨不持三年服也胸奴數犯塞侵擾邊境候騎至甘泉烽火通長安由是北邊置屯守戰設備胡兵連不解轉輸騷擾費積虛耗因以年歲不登百姓飢乏穀糴嘗至石五百非一升一錢也上曰臨朝揔政施號令何如未及對上復謂向校尉宗室師傅耆舊洽聞親事先帝歷見三世得失勿有所隱向曰文帝嘗過輦郎署呼郎中馮唐問以趙將廉頗李牧唐言今雖有此人不能用也推輦而去還歸禁中召責讓唐鄧通以佞幸吮癰見愛賜以蜀郡銅山令得鑄錢通私家之富侔於王者邦君又為微行數幸通家衣罽旃從侍中近臣常侍期門武騎獵漸臺下騎射狐免上曰後世皆言文帝治天下幾致太平其德偕周成王此語何從生向曰文帝治禮言者不傷其意臣無以大小至即從容言上止輦聽之言事者多褒之後人見其遺文則以為然世之毀譽莫能得實審形者少隨聲者多然文帝之節儉約身以變天下忍容言者含咽臣子之矩此過人難及也典論曰文帝慈孝寬弘仁厚躬修玄默以儉帥下奉生送終事從約省美聲塞於宇宙仁風暢於四海又曰文帝思賢甚於飢渴用人速於順流班固漢書述曰太宗穆穆允恭玄默化民以躬帥下以德我德如風民應如草國富刑清登我漢道孝景皇帝史記曰孝景皇帝孝文帝之中子也文帝初在代前后有三男及竇太后行前三子更死故景帝得立漢書曰孝景皇帝諱啓字曰開應劭曰禮諡法布義行剛曰景文皇帝太子也母竇太后七年六月文帝崩丁未太子即皇帝位又曰孔子稱斯民三代之所以直道而行也信哉周秦之弊綱密文峻而姦軌不勝漢興掃除煩苛與民休息至于孝文加之以恭儉孝景遵業五六十載之間移風易俗黎民醇厚周言成康漢言文景美矣又曰孝景即帝位竇嬰為太子詹事帝弟梁孝王母竇太后愛之孝王朝因宴昆弟飲是時上未立太子酒酣上於是從容曰千秋萬歲後傳王太后大欣嬰引巵酒進於上曰天下者高祖天下也父子相傳漢之約也何以得與梁王太后由此憎嬰帝王世紀曰孝景帝即位十六年年四十八葬陽陵廟名德陽班固漢書述曰孝景蒞政諸侯放命尚書放命圯族鯀之惡懷其族類吳楚七國亦然也克伐七國王室以定非怠非荒務在農桑著于甲令民用寧康魏陳王曹植漢景帝贊曰景帝明德繼文之則肅清王室克滅七國省役薄賦百姓殷昌風移俗易齊美成康孝武皇帝史記本紀曰孝武皇帝漢書音義曰諱徹也孝景帝中子也母曰王太后孝景四年以皇子為膠東王七年栗太子廢為臨江王以膠東王為太子孝景十六年崩太子即位為孝武皇帝漢書武帝紀曰後三年正月景帝崩甲子太子即位元朔四年冬行幸甘泉元狩元年冬十月行幸雍祠五畤獲白麟乃作白麟之歌元鼎四年冬十月行自夏陽東幸汾陰十一月甲子后土祠于汾陰睢之上蘇林曰睢音雖如淳曰睢者河之東岸也元封元年應劭曰始封大山故改年也行自雲陽北歷上郡西河五原出長城山登單于臺至于朔方臨北河勒兵十八萬騎旌旗徑千餘里威震胸奴還祠黃帝于橋山乃歸甘泉遂東巡於海上夏四月上還登封太山王者功成治定告成功天封岱宗也助天高也刻於石記號有金策石函金泥玉撿之封焉降明堂案郊祠志曰初天子封太山太山東北趾古時有明堂也行自太山復東巡於海上至碣石文頴曰在遼西絫縣今罷屬臨榆此石著海旁韋昭地理曰在古北平強城西南也二年冬十月行幸雍祠五畤春幸緱氏遂至東萊夏四月還祠太山至瓠子服虔曰瓠子隄名也蘇林曰在甄城以南濮陽以西廣百步深五丈臨決河命從臣將軍以下皆負薪塞河隄作瓠子之歌四年冬十月幸雍祠五畤通回中道應劭曰回中在安定高平有險阻蕭關在其北通至長安也孟康曰回中在北池山險有武帝故宮如淳曰三輔黃圖云回中宮在汧也遂北巡蕭關如淳曰胸奴傳胸奴入朝郍蕭關在安定朝郍縣也五年冬南巡狩至于盛唐如淳曰縣名也韋昭曰南郡也望祀虞舜于九疑應劭曰舜葬蒼梧九疑山今在零陵營道也祭灊天柱山應劭曰灊音潛南嶽霍山灊縣名屬廬江文頴曰天柱山灊縣南有祠自尋陽浮江親射蛟江中獲之舳艫千里太初元年應劭曰用夏正以正月為歲首故改年為太初行幸太山十一月甲子朔旦冬至祀上帝于明堂天漢三年應劭曰時頻年苦旱故改年為天漢以祈甘雨晉灼曰取雲漢之詩求雨之意也初榷酒酤三月行幸泰山修封祀明堂還幸北地祠常山瘞玄玉夏四月赦天下行所過母出田租太始三年行幸甘泉宮饗外國客二月令天下大酺五月行幸東海獲赤鴈作朱鴈之歌幸琅耶禮日成山孟康曰禮日祠日也韋昭曰成山在東萊界還幸建章宮後元二年朝諸侯王于甘泉宮賜宗室立皇子弗陵為皇太子張晏曰昭帝也後但名弗以多難諱丁卯帝崩于五柞宮案帝年十七即位即位五十四年壽七十一歲也張晏曰有五柞之樹故因以名宮在盩庢縣也葬於茂陵漢書贊曰漢承百王之弊高祖撥亂反正文景務在養民至于稽古禮文之事猶多闕焉孝武初立卓然罷黜百家表章六經遂疇咨海內舉其後民與之立功興太學修郊祀改正朔定曆數協章律作詩樂建封禪禮百神紹周後號令文章煥焉可述後嗣得遵洪業而有三代之風如武帝之雄才大略不改文景之恭儉以濟斯民雖詩書所稱何有加焉漢書宣帝紀曰本始三年尊孝武帝廟為世宗廟奏盛德之舞武帝巡狩所幸郡國皆立廟荀悅漢紀論曰孝武皇帝規矩萬世之業固後世之基地內修文學外耀武威以延天下之士先王之風粲然可考者矣然猶好其文未盡其實發其始不克其終奢侈而無限窮兵極武百姓空竭萬民罷弊當此之時天下騷然海內無聊而孝文之業衰焉劉歆宗廟議曰孝武皇帝愍中國罷勞無安寧之時乃遣大將伏波樓船之屬滅百越七郡北攘胸奴降昆耶之衆置五屬國起朔方以奪其肥饒之地東伐朝鮮起玄兔樂浪以斷胸奴之左臂西伐大宛并三十六國結烏孫起燉煌酒泉張掖以隔氐羌裂胸奴之右肩單于孤將遠遁漢北西垂無事斥地遠境起十餘郡功業既定而封丞相為富民侯以安天下富實百姓其規模可見又招集天下賢俊與協心同謀興制度改正朔易服色立天下之祀建封禪殊官號存周後定諸侯之制永無逆爭之心至今纍世賴之單于守蕃百蕃百蠻服從萬世之基也中興之功未有高焉漢武故事曰漢景帝皇后妊身夢日入其懷景帝又夢見高祖謂己曰王美人生子可名為彘及生男日因名之焉武帝生於猗蘭殿年四歲立為膠東王數歲長主抱著其𣍿上問曰兒欲得婦不膠東王曰欲得婦長主指左右長御百餘人皆云不用末指其女問曰阿驕好不於是乃笑對曰好若得阿驕作婦當作金屋貯之也長主大悅乃苦要上遂定婚焉膠東王為皇太子時年七歲上曰彘者徹也因改曰徹丞相周亞夫宴見時太子在側亞夫失意有怨色太子視之不輟亞夫於是起帝曰爾何故視此人耶對曰此人可畏必能作賊帝笑曰因此怏怏非少主之臣也廷尉上囚防年繼母陳殺父因殺陳依律年殺母大逆論而帝疑之詔問太子太子對曰夫繼母如母明其不及母也緣父之愛故比之於母耳今繼母無狀手殺其父則下手之日母恩絶矣宜與殺人者同不宜大逆論帝從之年棄巿刑議者稱善時太子年十四帝益以奇之從即位常晨往夜還與霍去病等十餘人皆輕服為微行且以觀戲巿里察民風俗嘗至蓮勺通道中行行者皆奔避路上怪之使左右問之云有持戟詐呵者數十人時微行率不過二十人馬七八匹更步更騎衣如凡庶不可別也亦了無騶御而百姓咸見之又嘗至柏谷夜投亭宿亭長不內乃宿於逆旅逆旅翁謂上曰汝長大多力當勤稼穡何忽帶劍衆夜行此不欲為盜則淫耳上默然不應因乞漿飲翁答曰吾止有溺無漿也有頃還內上使覘之見翁方與少年十餘人皆持弓矢刀劍令主人嫗出安過客嫗歸謂其翁曰吾觀此丈夫非常人也且亦有備不可圖也天寒嫗酌酒多與夫及諸少年皆醉嫗自縛其夫諸少年皆走嫗出謝客殺雞作食平旦上去是日還宮乃召逆旅夫妻見之賜嫗千金擢其夫為羽林郎自是懲戒希復微行上少好學招求天下遺書上親自省校使莊助司馬相如等以類分別之好醉賦每所行幸及奇獸異物輒命相如等賦之上亦自作詩賦數百篇下筆即成初不留思相如造文遲彌時而後成上每難其工妙謂相如曰以吾之速易子之遲可乎相如曰於臣則可未知陛下何如耳上大笑而不責也然性嚴爭不貸小過刑殺法令殊為峻刻汲黯每諫曰陛下愛才樂士求之無倦比得人勞苦神明未盡其用輒已殺之士資無已之誅臣恐天下賢才將盡於陛下欲與誰為治乎黯言之甚怒上笑而喻之行幸欣言中流與群臣飲宴乃自作秋風辭顧謂群臣曰漢有六七之厄法應再受命宗室子孫誰當應此者六七四十二代漢者當塗高也群臣進曰漢應天授命祚踰周殷子子孫孫萬世不絶陛下安得此亡國之言過聽於臣妾乎上曰吾醉言耳然自古以來不聞一姓遂長王天下者但使失之非吾父子可矣行幸五柞宮謂霍光曰朕去死矣可立釣弋子公善輔之三月丙寅上晝臥不覺顏色不異而身冷無氣明日色漸變閉目乃發哀告喪未央前殿朝晡上祭若有食之者常所幸御葬畢悉居茂陵園上自婕妤以下二百餘人上幸之如平生而傍人不見也光聞之乃更出宮人增為五百人因是遂絶始元二年吏告民盜用乘輿御服者案其題乃茂陵中明器也民別買得光疑葬日監官不謹容致盜竊乃收將作以下繫長安獄考訊居歲餘鄴縣又有一人於市貨玉杯吏疑其御物欲捕之因忽不見縣送其器推問又茂陵中物也光自呼吏問之説市人形貌如先帝光於是默然乃赦前所繫者歲餘上又見形謂陵令薛平曰吾雖失世猶為汝君奈何令吏卒上吾陵上磨刀劍乎忽然不見因推問陵旁有方石以為礪吏卒常盜磨刀劍甘泉宮恆自然有鍾鼓聲候者時見從官鹵簿似天子自後轉稀至宣帝世乃絶宣帝即位尊孝武廟奏樂之曰虛中有唱善者告祠之曰白鵠群飛集後庭西河立廟神光滿殿中狀如月東萊立廟有大鳥迹意路白龍夜見河東立廟告祠之日白虎銜肉置殿前又有一人騎馬馬異於常馬持捉一札賜將作丞曰聞汝績剋成賜汝金一斤因忽不見札乃變為金稱之有一斤廣川告祠之明日有鍾磬音房戶皆開夜有光香氣聞二三里宣帝親祠甘泉有頃紫黃氣從西北來散於殿前肅然有風空中有妓樂聲群鳥翔儛蔽天宣帝既親覩光怪乃疑先帝有神復招諸方士冀得仙焉帝王世紀曰孝武皇帝廟名淵龍幽明録曰漢武帝在甘泉宮有玉女降常與帝圍碁相娛女風姿端正帝密悅乃逼之玉女因唾帝面而去遂病瘡經年故漢書云避暑甘泉宮此其時也劉歆七略曰孝武皇帝勑丞相公孫弘廣開獻書之路百年之間書積如丘山故外有太常太史博士之藏內有延閣廣內祕室之府桓子新論曰漢武帝材質尚妙有崇先廣統之規故即位而開發大志考合古今獲前聖代事建正朔制度招選俊傑奮楊威怒武義四加所征者服興起六藝廣進儒術自開闢以來唯漢家最為盛圖故顯為世宗可謂悼爾絶世之主矣然上乃多過差既欲斥境廣土又乃貪利爭物之無益者聞西夷大宛國有馬即大發軍兵攻取歷年士衆多死但得數十匹耳又歌兒衛子夫因幸愛重乃陰求陳皇后過惡而廢退之即立子夫其男為太子後聽邪臣之譖衛后以憂死太子出走滅亡不知其處信其巫蠱多徵會邪僻求不急之方大起宮室內竭府庫外罷天下百姓之死亡不可勝數此可謂通而蔽者典論曰孝武帝承纍世之遺業遇中國之殷阜府庫餘錢帛倉廩畜腐粟因此有意平滅胸奴而得清邊境矣故即位之初從王恢之書設馬邑之謀自元光以迄征和四五十載之間征胸奴四十餘舉踰廣漢絶梓嶺封狼居禪姑幕梁北河觀兵瀚海刈單于之旗勦閼氏之首採符離之窟掃五王之庭納休屠昆耶之附獲祭天金人之寶斬名王以千數馘首虜以萬計既窮追其散亡又摧破其積聚虜不暇於救死扶傷疲於孕重墮殰元封初躬執武節告以天子自將懼以兩越之誅彼時號為威震胸奴矣後漢班固武帝述曰世宗曄曄思弘祖業疇咨熙載髦俊並作厥作伊何百蠻是攘恢我疆宇外博四荒武功既抗亦迪斯文憲章六學統一聖真封禪郊祀祭旅百神協律改正饗茲永年魏陳王曹植漢武帝贊曰世宗光光文帝是攘威震百蠻恢拓土疆簡定律曆辨修舊章封天禪土功超百王周庾信漢武帝聚書贊曰獻書路廣藏書柱開秦儒出谷漢簡吹灰芝泥即土玉匣封來坐觀風俗不出蘭臺陳沈炯祭漢武帝陵文曰臣聞橋山雖掩鼎湖之靈可祠有魯遂荒大庭之迹不泯伏惟陛下降德猗蘭纂靈豐谷漢道既登神仙可望射之杲於海浦禮曰觀而稱功橫中流於汾河指柏梁而高宴何其甚樂豈不然歟既而運屬上仙道窮晏駕甲帳珠簾一朝零落茂陵玉碗遂出人間陵雲故基與原田而膴膴別風餘趾帶陵阜而茫茫羈旅纆臣豈不落淚昔者承明見猒嚴助東歸駟馬可乘長卿西返恭聞故實竊有愚衷黍稷非馨敢望徼福爵臺之薦空愴魏君痽丘之祠未光夏后瞻仰徽猷伏增悽懼
