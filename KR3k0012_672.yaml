body:
  text: 道部十三服餌下登真隱訣曰太極真人昔以神方一首傳長里先生先生姓薛自號長里周武王時人也先生以傳西域揔真王君即金闕聖君之上宰也按䭀飯方受西梁真人所傳時在大宛北谷今長里傳九轉乃周初間是為受服䭀飯三四百年後乃合此丹蓋司命劍經序也惣真王君傳太元真人即東卿司命茅大君也以漢武帝天漢三年受之時年四十八後又以付二弟并各賜成丹一劑司命既傳二弟而不載於此當以王君命使付非正次傳授也自二君以後惟定籙與楊君使示許長史并掾乃至于今故漢晉之世諸學道人各六合服金液升仙無言九轉則此真人方下授以來未有營之者受經皆登壇盟誓割帛跪金為敢宣之約敢不敢也前盟則金龍玉魚後代止布帛而已違盟負信三祖獲考於水官謂妄傳非人也傳授須齊盟用金玉偃鐶以代剪髮歃血之誓也欲合九轉先作神釜當用滎陽長沙豫章土釜謂瓦釜也昔黃帝火九鼎於荊山太清中經亦有九鼎丹法即是丹釜從來咸呼為鼎用穀糠燒之當在名山深僻處臨水上作竈屋屋長四丈廣二丈開南東西三戶先齊戒百日乃泥作神釜釜成搗藥令計至九月九日平旦發火按合諸丹無用年歲好惡惟日月中有期限及吉凶琅玕以四月七月十二月中旬間發火曲晨以五月中起火太清九丹起火雖無定月而云作六一五月七月九月為佳自齊以始便斷絶人事令待丹成也合丹可將同志及有心者四五人耳皆當同齊戒齊起日先投玄酒五斛於所止之流水中若地無流水當作好井亦投酒於井中以鎮地氣令齊者皆飲食此水也合丹法又令以青石函盛好龍骨十斤沉于東流水中名曰青龍液飲食之以通水靈也取東海左顧牡蠣吳郡白石脂雲母屑蚯蚓土滑石礬凡六物等分太極真人以太上天帝君鎮生五藏上經刻于太極紫微玄琳殿東殿墉上此乃上清八龍大書非世之學者可得悟了也南嶽赤松子受而服之求其注釋於太極真人又青童君云五公之腴鎮生五藏鍊白易軀可以少顏色須齊戒泥竈修鍊也雲腴之味香甘異美強血補骨守氣凝液鎮生五藏長養魂魄真上藥也真人云此愈於鍊八石餌雲母也真人鍊形於太陽易貌於三官者此之謂也又曰太極真人青精䭀飯方按彭祖傳云大宛有青精先生能一日九食亦能終歲不飢即是此矣真上仙之妙方斷穀之奇靈也清虛真人說霍山中有學道者鄧伯元王玄甫受服青精石飯吞日景之法能夜中書又仙人龍伯高受服青䭀方醉亡隱處方臺又定録君命告椽云次服䭀飯兼穀勿違益髓除患肌膚充肥又掾書告長史覔米藥來山染作飯恐草燥又長史與大掾書令餉小掾白米是染作飯凡此六事有書者也太極真人青精十石䭀飯上仙靈方王君注解其後大書者是太素本經及西梁口訣墨注者是清虛王君所釋南嶽魏夫人敷撰而使司命楊君書之五真共成一法足稱靈妙矣上元寶經曰子食草木之王氣與神通子食青燭之津此之謂也此太素所傳太極所撰上真靈仙之至要不同餘術也服䭀飯百害不能傷疾疫不能干去諸思念絶滅三尸耳目聰明行步輕捷能隱化遁變長服益壽茅司命大君語二弟云宜服四扇散昔黃帝授風后卻老還少之道也我昔授之於高丘先生今以相付耳又語小弟保命君曰卿宜服王母四童散此反嬰之祕道也體中少損宜服此方以補腦耳按小茅君服時已一百二十歲也夫此二方皆妙法也當齊戒修制又曰裴君受支子元服食茯苓之法焦山蔣山人所傳能長生久視修合之際須謹密齊戒裴君又受支子元胡麻之法蔣先生惟服此二方位為仙真此二方書與世少異裴君所祕用者驗而有實凡服伏苓胡麻之方甚衆此法既真人所經用真人手所書記必當最神勝於諸法若能常服仙道可期但患人服未覺甚益便不服之故少有剋終之效若體先不虛損及年少之時當服伏苓若年三十歲當服胡麻蔣先生曰此二方是大有之要法長生神仙之祕寶也大有者謂委羽山洞天大有宮中之書法彼人當有服之者寶玄經云伏苓治少胡麻治老合以齊戒服以朝早卉醴華腴密也百卉之花以成腴醴五公謂為卉醴華英火精水寶火精伏苓也性熱而合火伏苓則其精矣水寶胡口麻也性冷色黑而含津澤故謂之水寶和以為一還精歸寶此之謂也裴君以年少時所用故服伏苓也清虛真人年十二便受此方于時未必虧損所以云服伏苓夜視有光也二方同耳皆長年之奇方也若合二物倍用密共煎搗為丸乃隹按青精方伏苓禁食酸此專用伏苓不必禁酸味又曰清虛王真人授南嶽魏夫人穀仙甘草丸方魏夫人少多病疾王君於修武縣中告夫人曰學道者當去病先令五藏充盈耳目聰明乃可存思服御耳按王君初降真之時是晉元康九年冬於汲郡修武縣廨內夫人時應年四十八也夫人按而服之及隱景去世之時年八十三歲也此晉成帝咸和八年甲午歲則夫人從服藥已來三十五年矣其間或不必常相續也了無復他患先疹都愈髮不白齒不落耳目聰明常月中書道家章符夫人既為女官祭酒故猶以章符示跡耳存思入室動百日數十日了不覺勞既在俗世家事相亂欲修齊研誦便託以入室也食飲通快四體充盈即甘草丸之驗也謂之穀仙方脾胃既和則能食而不害膚充而精察起居調節無溢利之患矣食穀而得仙故謂之穀仙也此本九宮右真公郭少金撰集此方諸宮久已有之至郭氏更撰集次第序說所治耳猶如青精乃太素之法而今謂太極真人也學仙道者宜先服之昔少金以此方授介象又授劉根張陵等數十人亦稱此丸為少金丸宜齊戒修合併無毒無所禁食一年大益無責旦夕之效也俗人亦皆可服之又曰雲芝英不擇日而修合治三尸伏疾服食一劑則穀蟲死則三尸枯若道士固食穀者乃宜服也穀蟲既滅使人食穀而無病過飽而不傷去尸蟲之藥甚多莫出於此昔修羊公稷丘子東方朔崔文子商丘子但服此藥以協穀而皆得仙也漢景帝及武帝求索東方朔修羊公祕方終不傳又曰北海公涓子名姓不顯青童君弟子蘇林之師也少餌木黃精授守一玄丹之道在世二千八百年玄洲上卿蘇林字子玄涓子弟子也同紫陽之師濮陽曲水人年二十餘辭家學道後授三元真一遊變人間又曰太清正一真人張道陵沛國人本大儒漢延光四年始學道至漢末於鳥鵠山仙官來降授以正一盟威之教施化領民之法號天師即真誥云奉張道陵正一平氣者是也天師靈寶伍符序及太清金液丹序並佳筆別有傳已行於世又曰服五石者亦能一日九食百關流淳亦能終歲不飢還老反嬰遇食則食不食亦平真上仙之妙方斷穀之奇靈也陶隱居注云雖一日九食而吸饗流變不為滓終歲不飯而容色更鮮又云吸引之易感無貴於七曜修行之早成不過於九道保守之堅固莫踰於鎮生衛用之急防無起於渾神藥石之速效豈勝於青精祈拜之感孰賢於朝謝也又曰服五石鎮五藏不壞又曰九苞鳳腦太極隱芝丹爐金液紫華虹英太清九轉五雲之漿東瀛白香滄浪青錢高丘餘精積石飛田能使人壽考琴高先生受鎮氣益命之道又行補腦反丹之法寶劍上終曰太極曲晨八景丸服之能飛行太虛又曰太虛真人服四極雲牙也又曰飛龍雲腴方鍊五石之華膏身有玉光能夜書此樂愈於八石之餌又曰服日月之華者欲得恆食竹筍竹筍者日華之胎也一名太明又欲恆食松葉松者木之秀也欲服日月當食此物氣以感運也太虛真人云松柏者木之秀又曰真人挹五方元晨之暉食九霞之精注曰謂清晨之元氣始暉之霞精曰陽數九謂之九霞本文云神光內耀朱華外陳太上黃素經曰凡道士臨食常上饗太和太平經曰青童君採飛根吞日景空洞靈章云朝餐五雲氣夕吸三晨光又云食黃琬紫真之飴真誥曰崑崙有絳山石髓玉樹之實又曰上清金闕靈書紫文採服陰華吞月精之法昔授之於大微天帝君一名黃氣陽精藏天隱月之經也又曰諸為道者酒肉最為大忌酒之為物能使人識慮昏迷性懷亂僻案諸藥中惟四童丸云用酒亦可以水又朮丸以酒和煎之其餘不云酒服餌又曰後漢左慈就司命乞丹砂得十二斤以合九華丹又曰治明期與後漢末人張正禮在衡山中受服王君虹景丹積三十餘年又曰趙廣信陽城人也魏末來剡山受服氣法守玄中之道後服九華丹又曰朱孺子吳末人入赤水山服菊花餌木又受西歸子入室存泥丸法三十三章又曰鄭景世與張重華俱晉初人也在灊山受行守五藏含日法服胡麻及玄丹又曰馬明生臨淄人為縣吏逐賊被傷太真夫人以靈元救得差後師安期生受服太清丹又曰王玄甫沛人與鄧伯元俱在霍山受服青精石飯吞日丹景之法又曰黃山訣云養性服食藥物不欲食䔉及石榴子道士自不可食列仙傳曰赤將子輿者黃帝時人不食五穀而食百草華又曰天仙偓佺者槐山採藥人也好食松實體生毛目方能飛行及走馬又曰務光夏時人耳長七寸好琴服蒲韭根又曰涓子齊人好餌朮著天地之經三十八篇後釣於澤得符鯉中隱宕山能致風雨吉伯陽九仙法淮南王少得其文不能解也其琴心三篇有旨焉又曰劉景前漢時人也從邯鄲張君受餌雲母知其吉凶抱朴子曰修道餌藥及隱居入山不得入小法者多遇害萬物之老者悉能為怪常試人耳惟不能於鏡中易其真形耳是以古之入山道士皆以明鏡徑九寸已上懸於背後則老魅不敢近人或有來試人者則當顧視鏡中是列仙山神者如人形是鳥獸邪鬼亦見昔人有於蜀雲臺山石室中忽有一人著黃練單衣葛巾至其前於是人顧鏡中乃鹿也因叱而成鹿徑去又林慮山下有一亭每宿者或死或病常夜有十數人衣或白或黑或婦人男子後郅伯夷過宿明燭而坐夜半果見密以鏡照之乃群犬也伯夷乃執燭起詐誤以燭燼落其衣聞燎毛遂以刀剌殺一犬餘駭去每入山須擇吉日抱朴子曰天地之情狀陰陽之吉凶茫茫乎其亦難詳也吾亦不必謂之有又亦不敢保其無然黃帝呂望皆所信伏近代嚴君平司馬遷皆所據用而經傳有歷剛曰吉日有自來矣王者立太史官封拜置立有事宗廟社稷郊祀天地皆擇其日也按玉鈐經云欲入山不可不知遁甲之祕術而不為人委曲說其事也
