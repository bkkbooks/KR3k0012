body:
  text: 方術部十一相中宋書高帝紀曰晉陵人韋叟善相術桓修令相帝當得州不叟曰當得邊州剌史退而私於帝曰君相貴不可言帝笑曰若相中當用為司馬至是叟謂帝曰成王不負桐葉之信公亦應不忘司馬之言然不敢希鎮軍司馬願得領軍佐於是用焉又曰初桓玄篡位遷晉帝於尋陽桓循入朝高祖從至建業玄見高祖謂司徒王謐曰昨見劉裕其風骨不恆蓋人傑也每遊集贈賜甚厚玄妻劉氏尚書令耽之女也聰明有智鑒嘗見帝因謂玄曰劉裕龍行虎步瞻視不凡恐不為人下宜早為之所玄曰我方平蕩中原非裕莫可待關隴平定然後議之又曰柳元景少時貪苦嘗至下都值大雷雨日暮寒甚頗有羇旅之歎岸側有一老父自稱善相謂元景曰方大富貴位至三公元景曰以為幸甚豈望富貴老父曰後當相憶及貴求之不知所在又曰明帝大會新亭接會諸軍主摴蒲官賭李安人五擲皆盧帝大驚目安人曰卿面方如田封侯狀也安人少時貧有一人從門過相之曰君後當富貴與天子交手共戲至是安人尋此人不知所在孫嚴宋書曰沈攸之字仲達少孤貧與吳郡孫超之全景文共乘小船出京都三人共上引埭有一人止之而相曰君三人皆當至方伯攸之曰豈有三人俱有相相者曰骨法如此若不驗便是相書誤耳後攸之為荊郢二州超之廣州景文南豫州又曰徐羡之年少時嘗有一人來謂曰我是汝祖羡之拜此人汝曰有貴相而有大厄宜以錢二十八文埋宅四角可以免災過此可位極人臣後羡之隨親之縣內嘗暫出而賊自後破縣縣內人無免者雞犬亦盡唯羡之在外獲全齊書曰太祖初為建康令有能名少府蕭惠開雅有知人鑒謂人曰昔魏武為洛陽北部人服其英今看蕭建康但當過之耳又曰張欣泰少時有人相當得三公而年才三十後屋瓦墜傷額又問相者云無復公相年壽可更增亦可得方伯之任耳後為剌史年三十六卒又曰曹武雖武士頗有知人之鑒性儉嗇無所餉遺獨餉梁武謂曰卿必大貴我當不及見今以弱子相託每密遺錢物并好馬時帝在戎多乏就武換借未嘗不得遂至十七萬又曰明帝體上有赤志常祕不言既而江祐勸帝出以示人晉壽陽太守王洪軌罷任還上祖示之曰皆謂此是日月相卿幸無泄軌曰公日月在軀如何可隱輒當言之公卿上大悅梁書曰梁武帝初為衛軍王儉東閣祭酒儉一見深相器異請為戶曹屬謂廬江何憲曰此蕭郎三十內當作侍中出此則貴不可言又曰梁武帝遷隋王鎮西咨議參軍行經牛渚逢風入泊龍瀆有一老人謂帝曰君龍行虎步相不可言天下將亂安之者其在君乎問其名氏忽然不見又曰梁武帝初為司州剌史有沙門自稱僧惲謂帝曰君頂有伏龍非人臣也復求莫知所之又曰武帝起兵時呂僧珍一夜忽頭痛壯熱及明而顙骨益大其骨法蓋有異焉又嘗語親舊曰吾昔在蒙縣熱病發黃時必謂不濟主上見卿有富貴相必當不死俄而果愈又僧珍童兒時從學有相工歷觀諸生指僧珍曰此有奇聲封侯相也後隨武帝起義平東昏封平固侯南兗州剌史後魏書曰李欣字元盛欣母賤為諸兄所輕父崇曰此子相者言貴吾每觀察或未可知遂使入都為中書學生世祖幸中書學見而異之謂從者曰此小兒終效用於朕之子孫矣目識眄之世祖舅陽平王杜超有女將許貴戚世祖聞之謂超曰李欣後必官達益人門戶可以女妻之遂勸成婚南人李哲嘗言欣必當貴達杜超之死也世祖親哭三日欣以超婚得在喪位出入帝目而指之謂左右觀此人舉動豈不有異於衆必為朕家幹事之臣又曰寇讚字奉國上谷人嘗從相者唐文相曰君額上黑子入幘位當方伯封公及為上谷太守文以百姓禮拜謁文曰明公憶疇昔言乎爾日伹知公當貴不知得為州人讚曰往時卿言社瓊不得官人威謂不然後瓊得盩屋令卿猶言相中不見而瓊未拜果暴終昔魏舒見主兒死自知己必至三公吾恆以卿言瓊之驗亦復不息此望也又曰廬淵出鎮關右詔兼侍中初淵年十四嘗詣長安將還餞送者五十餘人別於渭北有相者扶風人王伯達曰諸君皆不如此廬郎雖位不副實然德聲甚威望踰公輔後二十餘年當制命關右願不相忘此行也相者年過八十詣軍門請見言敘平生南史曰梁元帝初從劉景授相術因訊以年答曰未至五十當有小厄禳之可免帝曰茍有期會禳之何益及四十七為魏所滅崔鴻十六國春秋後趙録曰石勒東至平原賣與荏平人師歡為奴有一老父謂勒曰君龍角髮際上四道已成當貴為人主甲戌之歲王彭祖可圖勒曰若如公言不敢忘德忽然不見又曰張秀字文伯羌渠部人也頗曉相法常謂石虎曰明公之相非人臣骨虎掩其口曰君勿妄言族吾父子又南燕録曰慕容德年十八身長八尺二寸姿貌雄異額上有日月兩角足下有偃月重文太史公黃泓善相謂德曰殿下相法當先為人臣然後為人君但恐下官入地不見殿下升天耳德拜范陽王建元年即帝位又前涼録曰況瑗與同郡陳琠他典反宗配遇相者於路相者曰三人皆二千石封然況瑗腹有逆毛當兵死無後北齊書曰房豹遷侍御史王思敬入據頴川隨慕容紹宗出討乃為紹宗開府主簿兼行臺郎中紹宗自云有水厄遂於戰艦中浴并自投於水中冀以厭當之豹謂紹宗曰夫命也在天豈人理所能延公若實有災厄非禳避所免若其實無何禳之有今三軍之事在於明公唯應達命任理以保之元吉未幾而紹宗遇溺死又曰慕容顯時幼見一沙門指之曰此郎子有好相表大必為良將貴極人臣語終失僧莫知所在後纍遷特進驃騎大將軍封定陽王又曰尉瑾為聘梁使人陳昭善相謂瑾曰二十年後當為宰相瑾出昭謂人曰此公為宰相後不過三年當死昭後為陳後主兼散騎常侍至齊瑾時兼右僕射鳴騶鐃吹昭復謂人曰二年當死果如言焉又曰廬潛陷陳時李騊駼將逃歸并要潛潛曰我此頭面何可誑人吾少時相者云沒在吳越死生已定弟其行也因寄書與弟士邃曰吾夢汝以其日得患某月某日漸損皆如其言既而歎曰壽陽陷吾以頸血湔城而死佛教不聽自殺故荏苒偷生今可死矣於是閉氣而絶其家購尸歸葬又曰遼西段長太原龐倉鷹俱有先知之監長為魏懷朔鎮將見高祖甚異之謂高祖云君有康世之才終不徒然也請以子孫為託興和中啓贈司空公子寧相府從事中郎天祿初兼南中郎將倉鷹交遊豪俠厚待賓旅居於州城高祖客其舍初居處於蝸牛盧中倉鷹母數見廬上赤氣屬天倉鷹亦知高祖有霸王之相每私加敬割其宅半以奉高祖由此遂蒙親識三國典略曰高澄嗣渤海王朝於鄴時有吳士目盲而妙於聲相王使試之聞劉桃桃板之聲曰有所繫屬當大富貴王侯將相多死於其手譬如鷹犬為人所使聞趙道德之聲曰亦繫屬人聞太原公之聲曰當為人主聞王之聲崔暹私稱之謬曰亦國主也曰我家群奴猶當極貴況吾身也又日齊文宣字子進神武第二子也婁太后初孕文宣每夜有赤光照室既生數月后乃與親姻相對共憂寒餧文宣忽應曰得活故名俟尼干鮮卑言有相子也及長黑色大顙兌下鱗身重踝瞻視審定不好戲弄深沈有大度晉陽有沙門乍愚乍智時人不測呼為阿禿師婁后見其諸子歷問祿位至文宣再三舉手指天而己口無所言見者異之又曰梁宣豐侯修參軍陳晃善相人修因法會將晃自隨令相簡文有天下否晃言簡文九州骨成必踐帝位而地部過弱非但王畿蹙侵兼恐不得善終又曰東魏御史賈子儒善相太常卿崔暹私引子儒潛觀齊王儒曰人有七尺之形不如一尺之面一尺之面不如一寸之眼大將軍臉薄顧速非帝王相也皇甫玉又竊觀王於道曰此不作物會是垂洟者垂洟者謂太原公洋又曰齊高歸彥嘗令皇甫玉相己玉曰公位極人臣必可反歸彥曰我為何須反玉曰公有反骨又曰周王軌以隋公楊堅相表殊異因入侍宴陽醉撥去堅帽言曰是何物頭額帝謂之雖大而卻無所至也皇甫后見堅又舉手自拍其額帝謂堅曰皇后道公額也帝乃密使來和相堅和詭對曰堅相貌是守節忠臣宜作揔管大將作揔管則能靜肅一方作大將則能全軍破敵陳書曰長沙王叔堅母本吳中酒家婢相者言當生貴子宣帝微時因飲通焉生叔堅及即位召拜淑儀又曰章昭達字伯通少時遇相者謂曰卿容貌甚善須少虧則當富貴梁大司中昭達為東宮直後因醉墮馬鬢角小傷昭達喜之相者曰未也侯景之亂昭達率鄉人援臺城為流失所中眇其目相者見曰卿相善矣不久當貴後還鄉里與陳文帝遊因結君臣之分以功進位司空後周書曰太祖身長八尺方顙廣額美鬢髯長至委地垂手過膝皆有黑子宛轉若龍盤之形面有紫光人望而敬畏之又曰孝閔帝覺太祖第三子九歲封略陽郡公時有善相者史元華見帝退謂所親曰此公子有至貴之相但恨其壽不足以稱之耳隋書曰高祖生於馮翊波若寺紫氣充庭有尼來自河東謂皇妣曰此兒所從來甚異不可俗間處之尼將高祖舍於別館躬自撫養皇妣嘗抱高祖忽見頭上角出遍體鱗起皇妣大駭墜高祖於地尼自外入見曰已驚我兒致令晚得天下為人龍顏額有五柱八頂目光外射有文在手曰王長上短下沉深嚴重又高曰祖在周明帝即位授右小官伯進封大興郡公帝嘗遣善相者趙照視之照詭對曰不過作柱國耳既而陰謂高祖曰公當為天下君必大誅殺而後定善記鄙言也又曰韋鼎仕梁為太府卿初鼎之聘周也嘗與高祖相遇鼎謂高祖曰觀公容貌故非常人而神監深遠亦非群賢所逮也不久必大貴貴則天下一家歲一周天老夫當委質願深自愛及陳平上馳召之授上儀同三司待遇甚厚又曰龐晃知高祖非常人染自結納及高祖去官歸京師晃迎見高祖於襄邑高祖甚歡晃因白高祖曰公相貌非常名在圖籙九五之日希願不忘高祖笑曰何妄言也頃之有一雄雉鳴於庭高祖命晃射之曰中則有賞然富貴之日特以為驗晃既射而中高祖撫掌大笑曰此是天意公能感之而中也又曰來和好相術高祖微時來詣和相和待人去私謂高祖曰公當王有四海及為丞相拜儀同既受禪進爵為子開皇末和上表自陳曰臣早奉龍顏自周代天和三年已來數蒙陛下顧問當時具言至尊膺圖受命光宅區宇此乃天授非由人事所及臣無勞效坐致五品二十餘年臣是何人敢不慚懼愚臣不任區區之至謹録陛下龍潛之時臣有所言一得書之祕府死無所恨昔陛下在周嘗與永富公竇榮之語臣曰我聞有行聲即識其人臣當時即言公眼如曙星無所不照當王有天下願忍誅殺建德四年五月周武帝在雲陽宮謂臣曰諸公皆汝所識隋公相祿何如臣報武帝曰隋公止是守節人可鎮一方若為將領陳無不破臣即於宮東南奏聞陛下謂臣此語不忘明年烏丸軌言於武帝曰隋公非人臣帝尋以問臣臣知帝有疑臣詭報曰是節臣更無異相於時王喧梁彥光等知臣此語大象二年五月至尊從永巷東門入臣在永巷東門北面陛下問臣曰我得無災鄣不臣奏陛下曰骨法氣色相應天命已有付屬未幾遂揔百揆上覽之大悅進位開府賜物五百段米三百石地十頃又曰煬帝在藩時好學善屬文沉深嚴重朝野屬望高祖密令善相者來和遍視諸子和曰晉王眉上雙骨隆起貴不可言又曰宇文述年十一時有相者謂述曰公子善自愛後當位極人臣周武帝時以父軍功起家拜開府又曰李景遼東之役為馬軍揔管及還事漢王高祖奇其壯武使袒而觀之曰卿相表當位極人臣又曰帝嘗謂趙綽曰朕於卿無所愛惜但卿骨相不當貴耳仁壽中卒又曰文帝時蘭陵公主寡上為之求夫選親衛柳述及蕭瑒等以示韋鼎鼎曰瑒當封侯而無貴妻之相述亦通顯而守位不終上曰位由我耳遂以主降又曰來和善相術同郡韓則嘗詣和相謂之曰後四五當大官人初不知所謂則至開皇十五年五月而終人間其故和曰十五年為三五加以五月為四五大官槨也和言多此類著相經四十卷北史曰李賢幼有志節不妄舉動常出遊逢一老人鬚眉皎白謂曰我年八十觀士多矣未有如卿卿必為台牧努力勉之九歲從師受業略觀大指而已或議其不精答曰賢豈能領師徒授業至如忠孝之道實銘於心問者慚服又曰牛弘初在繈褓有相者見之謂其父曰此兒當貴善愛養之及長鬢貌甚偉性寬裕好學博聞又曰隋齊王暕妃早卒遂與妃姊元氏婦通生一女外人皆不得知陰引喬令則於第內宴召相工遍視後庭相工指妃姊曰此産子者當為皇后貴不可言
