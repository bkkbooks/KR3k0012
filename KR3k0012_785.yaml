body:
  text: 東夷五豆莫婁後魏書曰豆莫婁國在勿吉國北千里去洛陽六千里舊北夫餘也沃沮范曄後漢書曰東沃沮人性質直強勇便持矛步戰魏志曰東沃沮在高句驪蓋馬大山之東濱大海而居無大君王世世有邑長其言語與句麗大同時小異漢初燕亡人衛滿王朝鮮時沃沮皆屬焉元封二年伐朝鮮分其地為四郡以沃沮為玄菟郡後為夷貊所侵還屬樂浪今諸邑落渠帥稱三老臣句驪置其中大人為使又置文家以統之稅其貂布食物美女婢妾其土肥美背山向海宜五穀人性質直少牛馬便持刀矛其國俗制度大較似句驪其嫁娶之法女年十歲已相許男家迎之長養以為婦至成人更還女家責錢畢乃復還男其葬送之法大木槨長十餘丈開一頭作戶新死皆假埋之須肌肉盡聚置槨中舉家皆共一槨刻木如生隨死者為數又為瓦鬲置米其中編懸之於槨戶邊後漢書曰北沃沮人言海中有女國無男人或傳其國有神并窺之輒生子云魏志曰北沃沮一名置溝婁去南沃沮八百里其俗南北皆同與挹婁接喜乘船寇抄沃沮畏之夏日垣在山上長深穴中為守備冬月冰凍船道不通乃下居村落其耆老言國人嘗乘船捕魚遭風見吹數十日東得一島其上有人言語不可曉其俗常以七月取童女沈海又言一國亦在海中純女無男又得一布衣其兩袖長二丈又得一破船在岸邊有一人項中復有面與語不相曉不食而死肅慎書曰成王既伐東夷肅慎來賀海東諸夷武王克商皆通道焉成王即政而叛王服而服之故肅慎相來賀王俾榮伯作賄肅慎之命王使榮伯為命書以弊賄賜肅慎之夷亡後漢書曰挹婁古肅慎之國也在夫餘東北千餘里東濱大海南與北沃沮接不知其北所極土地多山險車馬不通人形似夫餘而言各異有五穀麻布出赤玉好貂所謂挹婁貂是無君長其邑各有大人處於山林之間土氣極寒常為穴居以深為貴大家至接九梯好飬豕食其肉衣皮冬以豕膏塗身厚數分以禦風寒夏則裸以尺布蔽其前後其人臭穢不潔作廁於中圜之而居自漢興已後臣屬夫餘種衆雖少而多勇力處山嶮又善射發能入人自弓長四尺力如弩矢用楛長一尺八寸青石為鏃鏇皆施毒中人即死便乘船好寇盜鄰國畏患而卒不能服東夷夫餘飲食類此皆用俎豆唯挹婁獨無法俗最無綱紀魏志所載同山海經曰不咸出在肅慎國有樹名雄先人代帝於此取依其谷無衣中國有聖帝代立者則此木皮可衣家語曰孔子在陳惠公賓之於上館時有隼集於陳侯之庭而死楛矢貫之石砮楛木名砮箭鏃其長尺有咫惠公使以隼如孔子之館問焉子曰隼之來遠矣此肅慎氏之矢也事具博物部肅慎國記曰肅慎氏其地在夫餘國北可六十日行東濱大海夏則巢居冬則穴處父子世為君長無文墨以言語為約其畜有馬豬牛羊不知乘馬以為財産而已豬放山谷中食其肉坐其皮績豬毛以為布無井竈人作瓦鬲四五升以食坐則箕踞足袂肉而啖之得凍肉坐其上令煥土地無鹽燒木作灰灌取汁食之俗皆編髮以布作褡徑尺餘以蔽前嫁娶之法男以毛羽插女頭女和則持歸然後致禮娉之婦貞而女淫貴壯賤老寡居終身不嫁性凶悍以無憂喪相尚父母死男子不哭哭者謂之不壯相盜贓物無多少盡誅殺之雖野處而不相犯死者即日便葬於野交木作小槨殺豬積槨上富室數百貧者數十以為死者之糧以土覆之以繩繫於槨頭出土上以酒灌酹才繩腐而止無時祭祀也其檀弓三尺五寸括矢長尺有咫石砮皮骨申石山在國東北取之必先祈神石利入鐵勿吉後魏書曰勿吉國在高句驪北舊肅慎國也去洛五千里國有大水闊三里餘名速木其地下濕無牛有車馬佃則偶耕車則步推有粟及麥穄音祭菜則有葵水氣鹹凝鹽生樹上亦有鹽池多豬無羊嚼米醞酒飲之能醉婦人則布裙男子豬大皮裘婚之夕男就女家執女乳而罷便以為定仍為夫婦俗以人溺洗手面頭插虎豹尾其父母春夏死立埋之冢上作屋不令雨濕若秋冬死以其尸哺貂食其肉多得之國南有從太山魏言太皇有虎豹熊狼不害人其傍有大莫盧覆鍾國莫多回國庫婁國素和國其伏弗國延犁小國拔大何國都羽陵國庫伏真國魯婁國羽真俟國前陵各遣朝獻北史曰勿吉國在高句麗北百鞂鞨也落各自有長不相惣一其人徑捍於東夷最強言語獨異常輕豆莫婁等國亦患之去洛陽五千里自和龍北二百餘里有善玉山山北行十三日至祁黎山又北行七日至洛懷水水廣里餘又北行十五日至太嶽魯水又東北行十八日到其國其部類凡有七種一號栗末部與高麗接勝兵數千多驍武每寇高麗其二曰伯咄部在栗末北勝兵七千其三日安車骨部在伯咄東北其四曰拂涅部在伯咄東其五曰號室部在拂涅東其六曰黑水部在安車骨西北其七曰山部在栗末東南勝兵並不過三千而黑水部尤為徑健自拂涅以東矢皆石鏃即古肅慎氏也東夷中為強國所居多依山水渠帥曰大莫弗瞞母官切咄國南有從太山者俗甚敬畏之人不得山上溲汙行經山者以物盛去地卑濕築土如堤鑿穴以居開口向上以梯出入其妻有外淫者人告其夫夫輒殺妻而後悔必殺告者由是姦淫事終不敢發人皆善射以射獵為業角弓長三尺箭長尺二寸常以七八月造毒藥傅矢以射禽獸中者立死煮毒藥氣亦能殺人又曰延興中勿吉國遣乙力支朝獻大和初又貢馬五百匹乙力支稱初發其國乘船溯難可西上至太濔河沉船於水南出陸行度洛孤水從契丹西界達和龍自云其國先破高句麗十落密共百濟謀從水道并力取高麗遣乙力支奉使大國謀其可否詔勑三國同是藩附宜共和順勿相侵擾乙力乃還從其來道取得本船泛達其國隋書曰開皇初勿吉國相率遣使貢獻文帝詔其使曰朕聞彼土人勇今來實副朕懷視爾等如子爾等宜敬朕如父對曰臣等僻處一方聞內國有聖人故來朝拜既親奉聖顏願長為奴僕其國西北與契丹接每相劫掠後因其使來文帝誡之使勿相攻擊使者謝罪帝因厚勞之令宴飲於前使者與其徒皆起舞其曲折多戰鬥容上顧謂侍臣曰天地間乃有此物常得用兵意然其國與隋懸隔唯栗末白山為近煬帝初與高麗戰頻敗其衆渠師突地稽率其部降拜右光祿大夫居之柳城與邊人來往悅中國風俗請被冠帶帝嘉之賜以錦綺而褒寵之及遼東之役突地稽率其徒以從每有戰功賞賜甚厚扶桑國南史曰扶桑國者齊永平元年其國有沙門慧深來至荊州説云扶桑在大漢國東二萬餘里地在中國之東其土多扶桑木故以為名扶桑葉似桐初生如笋國人食之實如梨而赤績其皮為布以為衣亦以為錦作板屋無城郭有文字以扶桑皮為紙無兵甲不攻戰其國法有南北獄若有犯輕罪者入南獄重罪者入北獄有赦則放南獄不赦北獄在北獄者男女相配生男八歲為奴生女九歲為婢犯罪之身至死不出貴人有罪國人大會坐罪人於坑對之宴飲分訣若死別焉以灰繞之其一重則身屏退二重則及子孫三重者則及七世名國王為乙祁貴人第一者對盧第二者小對盧第三為納咄沙國主行有鼓角導從其衣色隨年改易甲乙年青景丁年赤戊巳年黃庚辛年白壬癸年黑有牛角甚長以角載物至勝二十斛有馬車牛車鹿車國人養鹿如中國畜牛以乳為酪有赤梨經年不壞多蒲桃其地無鐵有銅不貴金銀市無租估其婚姻法壻往女家門外竹屋晨夕灑掃經年而女不悅即驅之相悅乃成婚婚禮大抵與中國同親喪也日不食祖父母喪五日不食兄弟伯叔姑姊妹三日不食設坐為神像朝夕拜奠不制衰絰嗣王立三年不親國事其俗舊無佛法宋大明二年罽賓國常有比丘五人遊行其國始佛法經教焉女國南史曰沙門惠深云女國在扶桑東千餘其人容白端正色甚潔白身體存毛髮長委地至二三月竟入水妊娠六七月産子女人胸前無乳項後生毛根白毛中有汗似乳子百日能行三四年則成人矣兒見人驚避偏畏丈夫食醎草如禽獸醎草葉似邪蒿而氣味醎文身南史曰文身國在倭國東北七千餘里人體有文如獸其額上有三文大直貴文小曲者賤土俗歡樂物豐而賤行客不齎糧有屋宇無城郭國王所居飾以金銀珍麗繞屋為塹廣一丈實以水銀雨則流于小銀之上市用珍寶大漢南史曰漢國在文身國東五千餘里無兵戈不戰代鳳俗並與文身國同而言語異流求陰書曰流求國居海島之間當建安郡東水行五日而至閩川之東也土多出銅其王姓歡斯名渴剌兜不知其由來有國代數也彼土人呼之為可老羊妻曰多快茶所居曰波羅檀洞塹柵三重環以流水樹棘為藩王所居舍其十人十六門雕刻禽獸多鬥鏤樹以橘而葉蜜條纖如髮紛然下垂國有四五師統諸洞洞有小王往往有村村有鳥了帥並以善戰者為之自相樹立理一村之事男女皆以白紵纏髮從頭盤繞婦人以羅紋白布為帽織鬥鏤皮并雜色紵及雜花以為衣製裁不一織藤為苙飾以毛羽兵有刀矟弓箭劍鼓之屬編紵為甲或以熊豹之皮王乘木獸令人舉之而行導從不過數十人國人好相攻擊人皆驍健善走難死而耐創諸洞各為部隊不相救助兩陳相當勇者三五人相擊射如其不勝一軍皆走遣人致謝即共和解收取鬥死者共聚而食之食皆用手無賦斂有事則均稅俗無文字視月虧盈以紀時節候草枯以為年歲人深目長鼻頗類於胡人縱年老髮多不白無君臣上下之節拜伏之禮父子同床而寢婦人産乳必食子衣以木槽曝海水為鹽木汁為醋釀米麴為酒遇得異味先進尊者凡有宴會執酒者必待呼名而後飲上王者酒亦呼王名銜杯同飲頗同突厥歌呼踏蹄一人唱衆皆和音韻哀怨其死者氣將絶舉至庭浴其尸以布帛纏之裹以葦草櫬土而殯上不起墳為子者數月不食肉有熊羆豺狼尤多豬雞無牛羊驢馬厥田良沃先以火燒而引水灌之持一插以石為刃長尺餘闊數寸而墾之宜播種樹木同江表氣候與嶺南相類俗事山海之神祀以酒肴鬥戰殺人便將所殺人祭其神煬帝大業初海帥何蠻等每春秋二時天清風靜東向依稀似有煙霧之氣亦不知幾千里三年帝令羽騎尉朱寬入海求訪異俗何蠻言之遂與蠻俱往因到流求國言語不相通掠一人并取其甲而還時倭國使來朝貢見之曰此夷邪久國人所用也帝遣武賁郎將陳稜朝請大夫張鎮同率兵自義安浮海擊之至流求初稜將南方諸國人從軍有崑崙人頗解其語遣人慰諭之流求不從拒逆官軍稜擊走之進至其都頻戰皆敗毀其宮室虜其男女數千人而還
