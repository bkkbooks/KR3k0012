body:
  text: 舟部四艇釋名曰二百斛以下曰艇其形艇一人二人所乘行者也廣雅曰舼音卭艇舟也淮南子曰越舼蜀艇不能無水而行陸機思歸賦曰棹河淵之輕艇舴艋廣雅曰舴艋舟也臨海記曰西北有白鵠山高三百丈上有一舟名舴艋前頭有石鼓石艇世云石鼓鳴則土地寇亂隆安初此鼓屢鳴果有孫恩賊此處多山精水祟不可輕陟山下平地便望見舴艋民王志祭山神求到鼓所遂得至捉捶打鼓閭里咸聞如金玉之響下山便病死蓋登山召禍擊鼓自殺也異苑曰檀道濟元嘉中鎮尋陽入朝伏誅濟未下時有人施罟於柴桑江收得大船孔鑿若新使匠作舴艋云勿斫工人誤截兩頭檀以為不祥殺三巧手欲以塞匠違約加斫凶兆先遘矣宋元嘉起居注曰有司奏云楊州刺史王弘上會稽從事韋詣解列先風聞餘姚令何玢之造作平床一乘舴艋一艘精麗過常用功兼倍請免玢今官詔可其奏筏論語曰道不行乘桴浮于海從我者其由與子路聞之喜東觀漢記曰吳漢教乘筏從江下巴郡盜賊解散張堪為陪義長公孫述遣擊之有同心士三千人相謂曰張君養我曹為今日也乃選習水三百人斬竹為箄渡水英雄記曰曹操進軍至江上欲從赤壁渡江無船作竹椑使部曲乘之從漢水來下出大江注浦口未即渡周瑜又夜密使輕船走軻百艘燒椑操乃夜走吳録曰孫策欲渡江船少欲往便求策姑王氏分命伐蘆為梁以佐船渡人吳録地理志曰蒼梧高要縣郡下人避瘴氣乘筏來停此六月來十月去歲歲如此雷次宗豫章記曰望蔡縣有一石室入室十餘里得水廣數十步清深不測邊有筏竹遊者伐竹為筏過水莫能究其源出好鍾乳淮南子曰方車跖越乘桴入朝欲無寵不可得也許填曰桴木筏越絶書曰木客大冢者勾踐之兄弟冢也初徙之琅邪使樓船卒二千八百人松柏以為桴故曰木客也楫說文曰楫舟棹也書曰若濟巨川用汝作舟楫詩曰檜楫松舟方言曰楫或謂之撓或謂之擢吳越春秋曰子胥伐楚因引軍襲鄭治漁者之子在鄭乃還列女傳曰趙簡子南擊荊至河津津吏醉臥不能渡簡子怒將殺之津吏之女娟乃持楫而前走曰妾父聞主君將渡恐風波之起水神動駭故禱祝九江三淮之神不勝杯杓餘瀝醉於此君命之誅願以微軀易父之死簡子將渡用楫少一人娟曰妾居河濟之間重乎世習舟楫之事願備員持楫簡子遂與渡中流呤河激之歌簡子乃娉以為夫人其母遽曰河水激揚濟之不易淮南子曰七尺之楫動大船者因水為資也人君發一言之號而令行於民者衆為資也說苑曰襄城君始封之日衣翠衣帶玉鉤履縞舄立乎流水之上大夫莊辛過而說之曰願把君之手其可乎襄城君作色不言莊辛遷延稱曰君獨不聞鄂君乘青翰之舟張翠蓋會鍾鼓之音越人擁楫而歌曰今夕何夕兮寨州水流今日何日兮得與子同舟山有木兮木有枝心悅君兮君不知於是鄂君榆袂而擁之舉繡被而覆之襄城君乃奉手進之楊子法言曰灝灝音浩于海濟樓船之力也航人無楫如航河李軌注曰喻有民無禮樂治也抱朴子曰瓊艘瑤楫無涉川之用金弧玉弦無激矢之能是以斤潔而無政事者非撥亂之器儒雅而乏治略者非翼亮之才左思吳都賦曰篙音高工楫師選自閩隅翼御長風狎玩靈胥篙方言曰所以刺船謂之篙盛弘之荊州記曰魚復縣瞿唐灘上有神廟先極靈驗刺史二千石經過皆不鳴鼓角篙旅恐觸石有聲乃以布裹篙頭王韶始興記曰含進公口下流有枯木曰聖鼓上下人以篙犯之者皆虐喻益期與韓豫章箋曰馬伏波昔開道篙跡鑿石猶存槳方言曰所以隱擢謂之槳郭璞注曰搖僧小耕也江東含呼胡人也楊泉五湖曰赤檜升棹檀槳細堅櫓釋名曰在旁曰櫓櫓旅也用旅力然後舟行也吳志曰呂蒙襲關羽至尋陽晝伏精兵於䑦𦪇中役白衣搖櫓作商賈服晝夜兼行至羽所置屯候盡收縛之是故羽不聞知遂到南郡柂釋名曰船尾曰柂椸也在後見椸曳且弼正船不使他戾也方言曰船後曰舳好舳制水也郭璞曰今江東呼為軸也孫放別傳曰庾公建學校孫君年最幼入為學生班在諸生之後公問君何獨居後答曰不見船拖耶在後所以正船尋陽記曰盧山西嶺有甘泉曾見一拖從山嶺流下此溪中人號為拖下溪宣穆所遣人見山湖中有敗艑而後拖流下信其不妄孫綽子曰動而不乘不理若泛舟而無拖趙一嫉邪賦曰奚異涉海之失拖坐積薪而待燃張華遊仙詩曰遊仙迫西極弱水隔流沙雲榜鼓霧拖飄忽陵飛波纜爾雅曰泛泛楊舟紼縭維之紼索也縭緌也郭璞曰索也緌吳書曰甘寧住止常以繒錦纜舟去輒割棄以示奢笮纂文曰竹索謂之笮茅索謂之索釋名曰引舟者曰笮笮作也起舟使動作也漢鼓吹曲曰桂樹為君船青絲為君笮木蘭為君棹黃金錯其間帆釋名曰隨風張幔曰帆帆泛者舟疾泛泛然也韻集曰帆船張也帆音凡馬疾步也義以與帆同長沙耆舊傳曰夏隆仕郡時潘濬為南征太守遣隆修書致禮濬飛帆中流力所不及隆乃於岸邊拔刀大呼指濬為賊因此被收濬奇其以權變自通解縛賜以酒食吳時外國傳曰從加郍調州乘大伯舶張七帆時風一月餘日乃入秦大秦國也南州異物志曰外徼人隨舟大小或作四帆前後沓載之有盧頭木葉如牖形長丈餘織以為帆其四帆不正前向皆使邪移相聚以取風吹風後者激而相射亦並得風力若急則隨宜城減之邪張相取風氣而無高危之慮故行不避迅風激波所以能疾永嘉記云郡有石帆又有破石傳云古有神人以破石半為帆故名石帆吳郡録海記曰海虞縣有穿山下有洞穴高十丈廣十餘丈山昔在海中行侶舉帆從穴中過陸景典語曰孤特與水軍一萬從風舉帆朝發海島暮至呇渚世說曰顧長康作殷荊州佐請假還東爾時例不給布帆顧苦求之然乃發至破冡便遭風大敗作箋與殷云地名破冡而出行人安穩布帆無恙馬融廣成頌曰然後方艅舶連舼舟張雲帆施霓幬靡颼風陵迅流發櫂歌從水謳郭璞江賦曰鼓帆迅越超張絶逈倏忽數百千里俄頃飛廉無以希其蹤渠黃不能及其景孫綽望海賦曰若乃惟馨陳祈祝不愧言或適於東或歸于西商客齊暢潮流往還各資順勢雙帆同懸倏如繡驊背馳拏奴加切如交集絰軒帆檣吳書曰孫弘被黜之長沙過蕪湖有鵲𠾑薪巢帆檣帆檣官僚以為檣末傾危非久安之像遂以憂終郭璞江賦曰舳艫相接萬里連檣泝洄沿流或漁或商五兩淮南子曰若綄胡管切之候風也許慎曰綄候風扇也楚人謂之五兩兵書曰凡候風法以雞羽重八兩建五重旗取羽繫其巔立軍營中郭璞江賦曰氣氛梫於清旭覘五兩之動靜榜補明堂月令曰榜舫人習水者也司馬相如上林賦曰榜人歌聲流喝烏邁切釋名曰船筌𥶌桅釋名曰船前立柱曰桅桅巍也巍巍高貌也筌𥶌釋名曰舟中床以薦物者曰筌言伹有簀筌床也其上板曰𥶌言所覆衆慮也牂柯魏略曰沐並字德信少有志氣吳將朱然圍樊城遣兵於硯山斫牂柯材兵作食先熟者呼共食後熟者曰不也呼者曰汝欲作沐德信耶其名乃播異域雖華夏不知者以為前世人也華陽國志曰楚頃襄王遣將軍莊蹻泝沅水出且蘭且干余切以伐夜郎王㭬牂柯擊船於且蘭既克夜郎而秦奪楚黔中地無路得歸遂留王之號為莊王以且蘭有㭬船牂柯處因改其為名牂柯異物志曰牂柯者繫船筏也其山在海中小而高以繫船伐也俗人謂之越王牂柯遠望甚小而高不似山望之以為一株樹在水中也尋陽記曰郡西北有一松楊樹枝條繁茂垂陰數畝傳云陶桓公牂柯成此樹豫章記新淦音紺縣北二十五里曰封溪今有聶友所伐梓繫著牂柯處昔聶友於此左右夜照射遇一白鹿友遂射之鹿帶箭走友即躡跡追尋不得見向箭著一梓樹友即伐樹數斧便有血出而落之梯隨復故創音瘡不可得斷友更多將手刀復伐之輦其梯而焚之樹遂斷斫以二板以還繫著渚下以樟木為牂柯後友船行遇風船皆沒唯友船獨全尋看乃向椊板夾扶其船友大異之後友在京都此板於豫樟來至友許輒有大喜中更異梓板至輒有憂所用樟木為牂柯者遂生為樹今猶存其木合抱始到植之今枚條皆向下板門中亦述其事泝斗廣雅曰泝斗謂之以之切纂文曰杼水斗也
