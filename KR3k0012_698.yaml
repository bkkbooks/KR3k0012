body:
  text: 服章部十四履釋名曰履禮也飾足所以為禮亦曰抱也所以抱足也復其下曰舄舄臘也久立地濕故復其下使乾臘也不借言賤易有宜各自畜不假借之也齊人曰搏借搏借猶把鮓鹿之貌也曰鹿絲麻韋草皆同名鹿粗措也言所以安措足也説文曰履足所依也靸小兒履也鞮革履也廣雅曰履襟謂之碁世本曰於則作履扉於則黃帝臣草曰扉麻曰履也方言曰絲作之麻作之不借組者謂之履屨朝鮮洌水之上謂之邛角南方江沔之間總謂之粗梁益謂之屣或謂之䋀下几反一音盡履其通語也徐士邳沂之間今下邳沂音圻謂之叩角緉𦄍上兩下爽閞之東西或謂之緉或謂之𦄍其通語也史記曰張良嘗遊於下邳圯上有一老父至良所墮其履圯下顧謂良曰孺子下取之父曰履我良業為取履因長跪進之又曰東郭先生待詔公車貧困飢寒衣幣不完行雪中履屨有上無下足盡踐地道中人笑之又曰趙平原君使人於春申君欲誇楚為玳瑁簪刀劍之室飾以珠玉而春申君客三千餘人其上客皆躡珠履趙使大慚又曰淳于髡曰杯盤狼籍履舄交錯漢書曰王莽好高冠厚履又曰鄭宗哀帝擢為尚書僕射數諫爭每見曳革履上笑曰我識鄭尚書履聲魏志曰曹公令曰議者以祠廟當解履吾受賜命帶劍不解履上殿今有事于廟而解履是尊先公而替王命敬父祖而簡君主也吾不敢脫履上殿蜀志曰先主少孤織履為業曹公罵云賣履舍長又曰劉琰妻胡入賀太后后特留胡經月乃出胡有美色琰疑其與後主有私呼卒伍伯撾胡以履搏面胡具以言告琰坐下獄有司議曰卒非撾妻之人面非受履之地琰竟棄市晉書曰夜武庫火纍代之寶皆焚焉孔子履漢祖斬蛇劍王莽頭並失又曰符健時霖雨河水溢浦津監寇登得一履於河長七尺三寸內指迹長一尺深三寸續晉漢陽春秋曰江州剌史王弘造陶淵明無履弘從人脫履以給之語左右為彭澤作履左右請履度淵明於衆坐伸腳令度及履至著而不疑晉惠帝起居注曰帝還洛陽至陵下謁無履取左右履著下拜趙録曰佛圖澄卒葬後郭門吏報石季龍云是師攜一履西去季龍發其墓唯見一履與一石後魏書曰王遵業從容恬素若處丘園嘗著穿履好事者多毀新履以學之宋書曰益州道士邵碩元徽二年忽告人云吾命終因臥而死後人見碩在荊州上明以一隻故履縛左腳而行甚疾遂不知所之齊書曰高祖儉素宮人盡令著紫絲履太公金匱履之書曰行必慮正六韜崇侯虎曰今周伯昌懷仁而善謀冠雖弊禮加於首履雖新法以踐地可及其未成而圖之又曰昔帝堯王天下黼衣絓履不弊不更為也晏子曰公問曰子近市識貴賤乎時公繁刑晏子曰踊貴履賤公愀然遂緩刑又曰景公為履黃金之綦飾以銀連以珠良玉之約其長尺又曰景公為履飾以金玉服以聽朝履重僕不能舉之問曰天寒乎晏子曰古之制衣服冬輕而暖夏重而清金玉之履是重而寒也公入徹履孫卿子曰大布之衣簏紃之履可以養體也莊子曰儒者冠圓冠者知天時履方屨者知地形又曰曾子居衛捉𥘞而肘見納履而踵決韓子曰鄭人有欲買履者先自度足而置其坐往市而忘操之見履乃曰吾忘度足乃歸取之市罷不得履人曰何不試以足曰寧信度數無自信也又曰文王履係解視左右盡賢無可使係者因俯而係之又曰魯人身善織履其妻善織縞而徙於越或謂之曰子必窮履飾足也而越人跣縞為冠之也而越人被髮欲不窮可得乎賈子曰天子黑方履諸侯素方履大夫素圓履賈誼書曰昔楚昭王與吳戰楚軍敗昭王走而履決失之行三十步復旋取左右問曰何惜此一踦履乎王曰楚國雖貧豈愛一踦履哉惡與偕出弗與俱反也自是之後楚國之俗無相棄者又曰履雖鮮弗加之於枕冠雖弊弗以苴履又曰二世胡亥之為公子曰詔置酒享群臣召諸子賜食先罷胡亥下階群臣陳履狀善者因行踐敗而去諸侯聞之者莫不太息及二世即位皆知天下必棄之淮南子曰禹之趍時冠挂而弗顧履遺而不取鹽鐵論曰古者庶人鹿菲草履今富者韋沓絲履風俗通論數曰踦者奇也履舄之一也夢書曰履襪為子屬體末也若夢得履襪者必有子息也履者為男襪者為女也西京雜記曰趙飛燕為皇后其弟上遺同心七寶綦履又曰度安世年十五為成帝侍郎常著輕絲履又曰匡衡邑人有説詩者衡從與語質疑邑人推服到履而去拾遺録曰穆王起春宵之宮西王母來焉納丹豹文履魏武帝遺令曰諸舍中可學作組履賣之又內式令曰吏民多製文繡之服履絲不得過絳紫金黃絲織履前於江陵得雜綵絲履以與家約當著盡此履不得效作也晉令曰土卒百工履色無過緑青白婢履色無過紅青古儈古會切賣者皆當著巾帖額題所儈賣者及姓名一足著黑履一足著白履東宮舊事曰太子妃有絳地絞履一緉漢舊儀曰乘輿帶七尺斬蛇劍履虎尾約履徐乾古履儀曰正會大司馬問劍履上殿義徐言所以遂見從著履上殿時人見咸譏云古無履但有舄今當著舄上殿不宜著履案周禮天王赤舄黑舄后素葛履鄭君注曰復下曰舄單下曰履是則古有履也蔡謨答臺符分別履舄之名事曰被符小會義注侍臣劍履升殿而摯虞決疑言劍舄履之名宜審謹案今時所謂履者自漢以前皆名屨屨左傳曰踊貴履賤禮曰戶外有二屨不言二履賈誼曰冠雖弊不以苴屨亦不言苴履言履者猶足所履踐耳詩云糾糾葛屨可以履霜舄者一物之別名履者足踐之通稱稱先代以來優崇重臣言劍履則包舄也又大臣升殿不唯朝會或私覿獨見臨時所著不必是舄故揔言履以明不跣而已摯虞中朝宿臣多識往行親覩其禮退而書之即是晉之故典令決疑言舄者書時事也儀注言履者舉揔名也尋文揔意所稱雖異其制一也鄧德明南康記曰昔有慮耽仕州為治中當元會至曉不及朝化為白鵠至閣前回翔欲不威儀以帚擲之得一雙履耽驚還就列內外左右莫不駭異時步騭為廣州剌史意甚惡之便以狀聞遂至誅滅荊州記曰興安水邊平石上有石履搜神記曰宮亭湖孤石有一佑客下都經其下見二女子云可為妾買兩緉絲履自厚相報佑客至都與置之並一箱置履在內留廟中去兼一書一刀忘而和留之及下去乘舟忽有鯉魚躍入剖之得刀與書幽明録曰晉太寧元年餘杭人姓王失其名往上舍過廟乞福既去亡履已行五六里懶復更反取一白衣人持履後至云宮使還君化為鵠飛入田中列仙傳曰嘯父冀州人在曲周市補履數十年不老人奇之又曰昭帝既葬鉤弋夫人空棺無尸但有絲履列異傳曰胡母班為太山府君齎書詣河伯貽其青絲履甚精巧也漢武內傳曰七月七日西王母降履玄瓊鳳文之舄列女傳曰翟方進學於京師後母憐其幼隨之長安織履以給之皇甫諡高士傳曰陳仲字子終自齊適楚楚王欲以為相其妻子曰家織履以食淡然而無為樂在其中矣謝使者秦嘉與婦淑書曰今枉虎龍組緹履一緉高文惠婦與文惠書曰今聊奉組生履一緉曹植賀冬表曰獻白文履七緉襪百副崔實四民月令曰八月制韋履十月作白履劉楨魯都賦曰纖纖絲履粲爛鮮新表以文組綴以朱蠙曹植洛神賦曰踐遠遊之人履曳霜綃之輕裙古樂府詩曰君子防未然不處嫌疑間瓜田不納履李下不正冠張華輕薄篇曰足下黃金履手中雙莫耶甄述女詩曰足躡承雲履豐趺皓春錦古詩曰頭上金叉十二行足下絲履五文章傅玄履銘曰戒之哉念履正無履邪正者吉之路邪者凶之徵賈誼弔屈原文曰章甫薦履漸不可久嗟若先生獨離此咎舄崔豹古今注曰舄以木置履下乾臘不畏泥溺也方言曰履中有木者謂之復舄自關而東謂之復履其上單者謂之宛下單者謂之鞮詩曰公孫碩膚赤舄几几又南有嘉魚車攻曰赤芾金舄箋云金舄黃朱色也周禮天官下曰屨人掌主及后之服屨為赤舄黑舄赤繶黃繶青句素屨葛屨鄭玄曰王告服有九舄有三等赤舄為上冕服之舄也王后亦服六唯祭服有舄鄭司農云赤繶黃繶黃繶以黃赤云絲為下緣繶音憶左傳曰楚子次于乾溪兩雪王皮冠秦復陶秦所遺羽衣也翠被以翠羽飾被豹舄以豹皮為履執鞭以出三禮六服圖曰王后翬衣玄舄榆翟赤舄鞠衣著履鞠衣以下皆履之三禮圖曰復下曰舄單下曰履夏葛冬皮也説苑曰襄成君始封之時衣翠衣帶玉佩玉劍履縞舄典論曰中常侍張讓子奉為太醫令與人飲酒輒掣引衣掌發露形體以為戲樂將罷又亂其舄履無不顛倒漢武內傳曰西王母履文鳳之舄列仙傳曰安期先生琅琊阜鄉人秦始皇請見與語三日三夜賜金壁千萬出於阜鄉皆置去留書以赤玉舄一枚以報拾遺録曰秦王子嬰寢於望夷宮夜夢有人長文鬚鬢絶青納王舄而乘丹車告云天下當亂王乃殺趙高所夢則始皇之靈所著舄則安期所遺者列仙傳曰黃帝葬橋山山崩無尸唯劍舄存衝波傳曰足履萬錢之舄漂如日光宛如遊龍風俗通曰孝文身履革舄而衣弋綈又曰俗説明帝時尚書郎鄴令王喬每月朔常詣臺朝帝怪其來數而無車馬密令太史候望言其臨至時常有雙鳧從東南飛來因舉羅得一隻舄使上方識是四年中所賜尚書履也杜氏幽求曰褒衣博帶高冠厚舄佩以珠璣結之纓蕤陳思王七啓曰金華之舄動趾遺光襪説文曰襪足衣釋名曰襪末在腳也左傳曰衛侯與諸大夫飲酒禇聲子襪而登席公怒帝王世紀曰武王伐紂行至商山襪係解五人在前莫肯係皆曰臣所以事君非為係襪漢書曰中山王來朝成帝賜食後飽起下襪係解成帝以為不能而賢定陶王又曰景帝時王生者善為黃老言嘗召居廷中公卿盡會張釋之為廷尉王生顧曰吾襪解為我結襪釋之跪而結之人或讓王生獨奈何辱張廷尉如此王生曰吾老且賤自度終亡益於張廷尉方今天下名臣吾故聊使廷尉跪結襪欲以重之諸公聞之賢王生而重釋之東觀漢記曰和帝召諸儒侍中賈逵黃香相難罷朝特頒賜履襪文子曰均為縞也或為冠或為襪則履之又曰文王伐崇至鳳皇之墟而襪係解文王自結之太公問焉文王曰吾聞亡君所與處盡其役寡人雖不肖所與處皆先君之人也故無令結之漢舊儀曰凡齋玄豹襪耕用青襪會稽典録曰賀劭為人美容止與人交久益敬之在官府常著襪希見其足崔浩女儀曰近古婦以冬至日進履襪於舅姑張衡南都賦曰羅襪躡迹而容與曹植洛神賦曰凌波微步羅襪生塵也皇甫規與馬融書曰謹上襪一量以通微薄秦嘉婦與嘉書曰今奉細布襪二量高文惠婦與文惠書曰今奉織成襪一量曹植賀冬表曰獻襪七量并為襪頌曰玉趾既御屨和蹈貞行與録邁動以福并後漢崔駰作襪銘
