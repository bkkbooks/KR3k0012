body:
  text: 人事部一百七嘲戲説文曰嘲相調戲相弄也又曰戲弄也毛詩曰善戲謔兮不為虐兮又曰伊其相謔贈之以芍藥又曰謔浪笑傲中心是悼左傳曰宋萬歸宋宋公靳之曰始吾愛子今子魯囚也吾不愛子矣萬病之遂殺宋公戲而相狎曰靳論語曰子之武城聞絃歌之聲莞爾而笑曰割雞焉用牛刀子遊對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使夫子曰偃之言是也前言戲之耳漢書曰上以東方朔為常侍伏日詔賜從官肉朔獨拔劍割謂其同官曰伏日當早歸即懷肉去上問朔賜肉不待詔割肉而去何也先生自責朔曰不待詔何無禮也拔劍割肉一何壯也割之不多又何廉也歸遺細君又何仁也上笑曰令生自責反自譽復賜酒一石肉一百斤使遺細君東觀漢記曰光武令王霸至薊市中募人將以擊王郎市中人皆大笑舉手邪揄之霸慚懅而還後漢書曰邊韶字孝先陳留浚儀人以文學教授數百人曾晝臥弟子嘲之曰邊孝先腹便便懶讀書伹欲眠韶潛聞之應時對曰邊為姓先為字腹便便五經笥但欲眠思經事寐與周公通情夢與孔子同意師而可嘲出何典記嘲者大慚吳志曰諸葛瑾字子瑜面長似驢吳王使優人牽驢入題其上曰諸葛子瑜瑾子恪請筆益兩字曰之驢人伏其敏權即以驢賜恪蜀志曰先主與劉璋會涪時張裕為璋從事侍坐其人饒鬚先主嘲之曰昔吾居涿縣時多毛姓東西南北皆諸毛也裕即答曰昔有士作上黨潞長遷為涿郡令者去官還家時人與書欲曙潞則失涿欲署涿則失潞乃署曰潞涿君先主無鬚故裕以此及之晉書曰范寧嘗患目痛就中書侍郎張湛求方湛因嘲之曰右方宋陽里子少得其術以授魯東門伯東門伯以授左丘明遂世世相傳及漢杜子春鄭康成魏高堂隆晉左太沖凡此諸賢並有目疾得此方云用損讀書一減思慮二專內視三簡外觀四旦晚起五夜早眠六凡六物熬以神火下以氣篩蘊於胸中七日然後納諸方寸修之一時近能數其目睫遠視尺捶之餘長服不已洞見牆壁之外非惟明目乃亦延年又謝敷傳曰初月犯少微一名處士星占者以隱士當之譙國戴逵有美才時人憂之俄而敷死故會稽人士以嘲吳人云吳中高士便是求死不得死又曰謝萬有才名為會稽王道子驃騎長史嘗因侍坐于時月夜明淨道子歎以為佳萬率爾曰意謂不如微雲點綴道子因戲萬曰卿居心不淨乃復強欲滓穢太清耶又曰何充性好釋典崇修佛寺供給沙門糜費巨億而不吝親友貧乏無所施遺以此獲譏於世阮裕常戲之曰卿志大宇宙勇邁終古充問其故裕曰我圖數千戶郡尚不能得卿圖作佛不亦大乎又曰陸雲與荀隱素未相識嘗會張華坐華曰今日相遇可勿為常談雲因撫手曰雲間陸士龍隱曰日下荀鳴鶴鳴鶴隱字也雲又曰既開青雲覩白雉何不張爾弓挾爾矢隱曰本謂是雲龍騤騤乃是山鹿野糜獸微弩強是以發遲華撫手大笑又曰袁山松欲以女妻謝混王珣曰卿莫近禁臠初元帝始鎮建業公私窘罄每得一扽以為珍膳項下一臠尤美輒以薦帝群下未嘗敢食于時呼為禁臠故珣以為戲混果尚主又曰郤詵遷雍州刺史東堂會送武帝問詵卿自以為何如詵對曰臣舉賢良對策為天下第一猶桂林一枝崑山之片玉帝笑侍中奏免詵詔曰與戲耳不足罪又曰張憑字長宗祖鎮蒼梧太守憑年數歲鎮謂其父曰我不如汝有佳兒憑曰阿翁詎宜以子戲父耶又曰郤超為桓溫參軍時王珣為溫主簿亦為所重府中語曰髯參軍短主簿能令公喜能令公怒超髯珣短故也又曰潘京為州所辟因謁見問策探得不孝字刺史戲京曰辟士為不孝耶京舉答板曰今為忠臣不得復為孝子沈約宋書曰何承天除著作郎時年已老諸佐郎並名家少年荀伯子嘲之曰呼為妳母承天曰卿當云鳳凰將九子嬭母何言耶又曰袁淑喜為誇誕每為時人所嘲始興王濬嘗送錢三萬餉淑一宿復遣追取謂使人謬誤欲以戲淑齊書曰陵澄當世稱為碩學讀易三年不解義欲操宋書終不就王儉戲之曰陸公書廚也又曰庾杲之清貧自業食唯有韭菹瀹韭生韭雜菜或戲之曰誰謂庾郎貧食常有二十七種言三九也又曰謝超宗送湘州刺史王僧虔閣道壞墜水僕射王儉嘗牛驚跣下車超宗撫掌笑戲曰落水三公墮車僕射梁書曰朱異遍治五經涉獵文史博奕書算皆其所長年二十詣尚書令沈約誡之因戲異曰卿年少何乃不廉異逡巡未達約乃曰天下唯有文義棊書卿一時將去可謂不廉也陳書曰徐陵使魏魏人授館宴賓是日甚熱其主客魏收嘲陵曰今日之熱當因徐常侍來陵即答曰昔王肅至此為魏始制禮儀今我來聘使卿復知寒暑收大慚隋書曰何妥少機警八歲遊國學助教顧良戲之曰汝姓何是荷葉之荷是河水之河妥應聲答曰先生姓顧是眷顧之顧是新故之故衆咸異之隋書曰麥鐵杖考功郎竇一嘲之曰麥是何姓鐵杖應聲對曰麥豆不殊那忽相怪竇赧然無以應之時人以為敏惠又曰鄭譯少為太祖所親恆令與諸子遊集年十餘歲嘗詣相府司録李長宗於衆中戲之譯斂容謂長宗曰明公位望不輕瞻仰斯屬輒相玩狎無乃喪德也長宗甚異之唐書曰蘇世長高祖嘗嘲之曰名長意短口正心邪棄忠貞於鄭國忘信義於吾家世長對曰名長意短實如聖旨口正心邪未敢奉詔昔竇融以河西降漢十世封侯臣以山南歸國唯蒙屯監即日擢拜諫議大夫晏子春秋曰晏子短小使楚楚人為小門於大門側而延晏子晏子不入日使狗國者從狗門入今日臣使楚不當從狗門入王曰齊無人耶對曰齊之臨淄張袂成帷揮汗成雨何為齊無人使賢者使賢王不肖者使不肖王嬰不肖故使耳莊子曰惠子始與莊子相見而問乎莊子曰今日自以為見鳳凰而徒遭燕雀耳坐者俱笑孔叢子曰平原君與子高飲強子高酒曰昔有遺諺堯舜千鍾孔子百觚子路溘溘尚飲百榼古之聖賢無不能飲也吾子何辭焉子高曰以穿所聞賢聖以道德為人未聞以飲也平原君曰即如先生言則此言何生子高曰生於嗜酒者蓋其勸勵采戲之辭非實然也平原欣然曰吾弗戲子無所聞此雅言也呂氏春秋曰成王與唐叔虞燕居援梧葉以為圭授虞曰此封汝虞喜以告周公公請曰天子封耶成王曰余一人與虞戲爾周公曰臣聞之天子無戲言天子言則史書之工誦之士稱之於是遂封虞于唐裴啓語林曰劉道真遭亂於河側自牽船見一老嫗採櫓劉謂之曰女子何不調機利杼而採櫓女答曰丈夫何不跨馬揮鞭而牽船又曰祖士言與鍾雅相調鍾語祖曰我汝潁之士利如錐卿燕代之士鈍如槌祖曰以我鈍捶打爾利錐鍾曰自有神錐不可得打祖曰既有神錐亦有神捶鍾遂屈劉義慶世説曰謝太傳始有東山之志祖公見藥中有遠志公問謝此藥又曰小草何以一物二稱謝未即答郝參軍答曰處則為遠志出則為小草謝公殊有愧色又曰鄧艾口吃語艾艾晉文王戲之曰為云艾艾故是幾艾鄧答曰鳳兮鳳兮故是一鳳諸葛恪別傳曰孫權嘗宴見蜀使費禕逆勑群臣使至伏勿起禕至權輟食而群下不起禕嘲之曰鳳凰來翔騏驎吐哺驢騾無知伏食如故恪答曰愛植梧桐以待鳳凰是何燕雀自稱來翔何不彈射使還故鄉劉昭幼童傳曰張玄字祖希年八歲虧齒先達知其不常故戲之君口復何為開狗竇玄答云正使君輩從中入罵詈釋名曰罵迫也以惡言被迫人也又曰詈歷也以惡言相彌歷音力智反左傳曰冉堅射陳武子中手失弓而罵戰國策曰宋康王時有雀生鸇於城之陬使史占之曰小而生巨必霸天下王大喜於是滅滕伐薛取淮北之地逾自信欲霸之亟成故射天笞地斬社稷而焚滅之曰威服天下鬼神罵國老諫者為無頭之冠以是示勇國人大駭齊聞而伐之史記曰陳狶將趙利守東垣高祖攻之月餘不下卒衆罵高祖高祖怒城降令出罵者斬不罵者原之漢書曰項羽拔滎陽城生得周苛羽謂苛為我將以公為上將軍苛罵曰若不趍降漢今為虜矣又曰陳狶反上自至邯鄲令周昌選趙壯士可令將者昌見四人上嫚罵曰豎子能為將乎四人慚伏地上以為將又曰張湯以更定律令為廷尉汲黯於上前憤發罵曰天下刀筆吏不可以為公卿果然又曰王莽自立使安陽侯王舜素傳國璽太后知為莽求怒罵之曰我漢家老寡婦旦暮且死欲與此璽俱葬終不可得又曰魏豹叛漢王謂酈生曰緩頰往説之豹曰人生一世間若白駒過隙今漢王嫚侮人罵詈諸侯群臣如奴耳吾不忍復見又曰張敖為趙王高祖從平城過趙王旦暮自上食高祖箕踞罵詈甚慢之趙相貫高等怒説敖曰今王事皇帝甚恭而皇帝無禮請為王殺之又曰韓信平齊使人請自立為假王漢王大怒詈曰吾困於此望若來佐我乃欲自立為王張良陳平附耳語之漢王寤因復罵曰大丈夫即為真王耳何以假為又曰田蚡取燕王女為夫人太后詔召列侯宗室皆往賀灌夫行酒次至臨汝侯灌賢方與程不識耳語又不避席夫乃罵曰賢平生毀程不直一錢今長者為壽乃效女兒曹沾囁耳語耶又曰黥布反上自征謂布何苦而反布曰欲為帝耳上怒罵之遂戰破布陳又曰呂后召趙王周昌令王稱疾不行呂后大罵昌曰爾不知我之怨戚氏乎而不遣趙王也又曰上擊黥布時流矢所中行道疾甚呂后迎良醫入見問醫疾可治不醫曰可治上嫚罵之曰吾以布衣提三尺劍取天下此非天命乎命乃在天雖扁鵲何益又曰陸賈時時前説稱詩書高帝罵曰我乃馬上得之安事詩書乎賈曰馬上得之寧可馬上治之乎范曄後漢書曰王允與呂布謀令騎都尉李肅并勇士千餘人於掖門內以待董卓卓將出馬驚不行肅以戟剌之墜車顧大呼曰呂布何在布曰有詔討賊卓大罵曰庸狗敢如是耶又曰李傕等共追乘輿大戰恆農東澗射聲校尉祖雋被瘡隨馬李傕謂左右曰尚可活不雋罵之曰汝等凶逆逼迫天子亂臣賊子未有如汝者傕使殺之續漢書曰董卓為司空辟蔡雍稱疾不就卓大怒詈曰我力能族人雍不得已及到署祭酒東觀漢記曰劉寬嘗坐客遣蒼頭市酒迂久大醉而還詈曰畜生寬遣人視奴疑必自殺魏志曰諸葛恪圍合肥新城中遣士劉整出圍傳消息為賊所得栲問所傳語整罵曰死狗此何言也我當必死為魏國鬼不茍求活逐汝去又曰龐德與曹仁討關羽為羽所得羽謂曰我欲以卿為將何不早降德罵羽曰豎子何謂降也遂為羽所殺又曰劉備為豫州舉袁渙為茂才後復為呂布所拘布欲使渙作書詈辱備渙不可再三強之不許布大怒以兵脅渙曰為之則生不為則死渙顏色不變笑而應之曰渙聞唯德可以辱人不聞以罵且他日之事劉將軍猶今日之事將軍也將軍一旦去此復罵將軍可乎布慚而止吳志曰孫峻誅諸葛恪臨淮臧均表乞收葬曰今恪父子三首懸示積日觀者數萬罵聲成風國之大刑無所不震又曰孫堅至南陽太守張咨不給軍糧又不見堅堅詐得急病欲以兵付咨咨心利其兵則將騎五六百入營省堅堅臥與相見無何卒然而起按劍罵咨遂執斬之王隱晉書曰段匹磾弟文鴦與石勒戰所乘馬乏勒呼曰大兄久望共同天不違願今日相見何復戰請釋伏語鴦罵曰汝為虐久應死吾兄不能用吾計故令汝得至此吾寧死不忍為汝所擒遂下馬與戰山海經曰若山有獸焉名曰山膏其狀如豚赤若丹火善罵好罵也賈誼新書曰紂自謂天王而桀自謂天父已滅之後民以相罵禰衡別傳曰禰衡著寬布單衣練巾坐曹操大營門下以杖捶地數罵責操及其先祖無所不至營令史入啓言外有狂生禰衡言語悖逆請案科治操聞之默然良久乃勑外具上廄馬三匹并騎二人挾將送置荊州黃祖遂令殺之吳質別傳曰魏文帝詔上將軍及特進以下皆會質所上將軍曹真肥顉軍朱鑠瘦質召優使説肥瘦真扣刀瞋目言俳敢説吾斬爾遂罵質案劍曰曹子丹吳質吞爾不搖喉何敢恃勢驕耶揚雄方言曰荊淮海岱雜齊之間罵奴曰賊罵婢曰獲桓談新論曰哀帝時有老人范蘭言年三百歲初與人相見則喜而相應和再三則罵而逐入列女傳曰安定皇甫規妻年盛色美董卓娉以輜軿百乘乃輕服詣卓門跪自陳請卓使侍者悉杖刀圍之妻知不免乃立罵卓曰君羌胡之種毒害天下猶未足耶敢欲行非禮於爾君夫人乎卓乃以其頭懸車軛鞭朴交至遂死車下
