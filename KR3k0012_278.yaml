body:
  text: 兵部八儒將左傳曰晉謀元帥趙衰曰郤縠說禮樂而敦詩書以將中軍漢書曰馮奉世以良家子選為將年四十餘乃學春秋涉大義讀史書後漢書曰馬援間於進對尤善述前世行事每言及三輔長者下至閭里少年皆可觀聽自皇太子諸王侍聞者莫不屬耳忘倦又善兵策帝常言伏波論兵與我意合每有所謀未嘗不用又曰祭遵為將軍取士皆用儒術對酒設樂必雅歌投壺雖在軍旅不忘俎豆又曰賈復少好學習尚書事舞陰李生李生奇之謂門人曰賈君之容貌志氣如此而勤於學將相之器也又曰賈復知帝欲偃平戈修文德不欲功臣擁衆京師乃與高密侯鄧禹並剽甲兵敦儒學廣雅曰剽削也謂除甲兵東觀漢記曰復闔門養威重授易經起大義帝深然之遂罷左右將軍復以侯就第加位特進吳書曰魯肅為人方嚴寡於玩飾內外節儉不務俗好治軍整頓禁令必行雖在軍陳手不釋書又善談論能屬文辭遠有過人之明周瑜之後肅為之冠也晉書曰杜預身不跨馬射不穿札而每有大事輒居將帥之列又曰劉毅征盧循敗歸帝大宴於西池有詔賦詩毅詩云六國多雄士正始出風流毅自以武功不競故示文雅有餘也又載記曰石勒雅好文學雖軍旅常令儒生讀史書而聽之每以其意論古帝王善惡朝賢儒士聽者莫不美焉嘗使人讀漢書聞酈食其勸立六國後大驚曰此法當失何得遂成天下至留侯諫乃曰賴有此耳宋書曰沈慶之嘗對上為詩令僕射顏師伯執筆慶之口占曰微生值多幸得逢時運昌老朽䈥力盡徒步還南岡辭榮此聖代何愧張子房並歎其辭意之美梁書曰曹景宗大破魏軍振旅凱入帝於華光宴飲因令左僕射沈約賦韻景宗不得韻意色不平啓求賦詩帝曰卿伎能甚多人才英拔何必止在一詩景宗已醉求作不已詔令約賦韻已盡唯餘競病二字景宗便操筆斯須而成其辭曰去時兒女悲歸來笳鼓競借問路行人何如霍去病帝欣然不已約及朝賢驚嗟竟日詔令上史北史曰周文帝宴群公卿士仍賦詩言高琳詩末章云寄言竇車騎為謝霍將軍何以報天子沙漠靜祅氛帝大悅曰獯獫陸梁末時款塞卿言有驗國之福也後魏書曰韋彧為東豫州刺史以蠻俗荒梗不識禮儀乃表立太學選諸郡生徒於州撿教又於城北置崇武館以習武焉境內清肅還遷大將軍又曰征虜將軍劉藻涉獵群籍美談笑善與人交飲酒至一石不亂後周書曰宇文顯和性矜嚴頗涉經史膂力絶人彎弓數百斤能左右馳射又曰賀拔勝長於喪亂之中尤攻武藝走馬射飛鳥十中其五六太祖每云諸將對敵神色皆動唯賀拔公臨陳如平常真大勇也自居任始愛墳籍乃招引文儒討論義理性又通率重義輕財身死之日唯隨身兵仗及書千餘卷隋書曰高祖有平南之志訪可任者高頴曰朝臣之內文武才幹無出賀若弼者高祖曰得之矣於是拜弼為吳郡揔管委以平陳之事弼欣然以為己任與壽州揔管源雄並為重鎮弼遺雄詩曰交河驃騎幕合浦伏波營勿使騏驎上無我二人名獻取陳十策上稱善賜以寶刀又曰周羅㬋初仕陳為太子左衛率信任逾重時參宴席陳王曰周左率武將詩每前成文士何為後也都官尚書孔範對曰周羅㬋執筆製詩還如上馬入陳不在人後自是益見親禮又曰于仲文討高麗大破之至鴨淥水高麗將乙支文德詐降來入其營仲文先奉密旨若遇高乙支文德者必擒之至是文德來仲文將執之時尚書右丞劉士龍為慰撫使固止之仲文遂捨文德尋悔遣人紿文德曰更有言議可復求也文德不從遂濟仲文選騎渡水追之每戰破賊文德遺仲文詩曰神策究天文妙算窮地理戰勝功既高知足願云止仲文答書諭之文德燒柵而遁唐書曰調露元年突厥阿史德溫傳叛單于府所管二十四州皆叛應之單于都護蕭嗣業率兵討之被阿史德掠其糧車兵多餓死由是大敗朝廷憂之遣禮部尚書裴行儉為定襄道行軍大惣管率諸軍三十萬進討行儉至朔州知賊掠嗣業糧運得勝乃為糧車三百乘每車伏猛士五人持陌刀徑弩又以羸兵數百援之兼伏精兵於險厄處虜見糧車果大至羸兵才鬥棄車而走賊驅車就泉井解鞍牧馬方擬取糧車中壯士齊發虜衆大駭奔散伏兵險發虜騎擒戮殆盡自是續遣糧車虜望之不敢逼糧餉既通進兵屢捷行儉終擒溫傅再平突厥又曰婁師德弱冠進士擢第纍補監察御史上元初吐蕃犯塞有詔募猛士以討之師德抗表應募請為猛士擊虜高宗太悅特假朝散大夫從軍西討頻立戰功遷殿中改授金吾將軍豐州都督則天降書勞之曰卿受委北垂惣司軍任往還靈夏撿校屯田收率既多京抵遽積不煩和糴之費無復轉輸之勞兩軍鎮兵咸得支給覽之嘉尚欣悅良深召為夏官侍郎俄拜鳳閣侍郎同平章事改納言又曰婁師德頗有學術器量寬厚喜怒不形於色專綜邊任三十餘年恭勤接下孜孜不怠當危亂之時族滅者相繼師德出將入相能以功名始終識者多之又曰永徽中薛仁貴平百濟高宗令別將攝帶方州刺史劉仁軌留兵鎮守詔仁貴班師還高宗勞問之曰卿在海東前後奏請皆合事宜而雅有文理卿本武將何得然也對曰非臣所能皆劉仁軌之所為也帝深加歎賞超仁軌六階正授帶方州刺史仁貴初平百濟合境凋殘殭尸相屬仁軌始令收斂骸骨瘞理弔祭之校計戶口署置官長開通道路整理村落補葺堤堰修復陂塘勸課耕種賑貸貧乏存問孤老頒宗廟忌諱位皇家社稷百濟餘衆復安生業仁軌位至中書令又曰御史大夫唐休璟有文武才幹貞觀元年為隴右大使大破吐蕃大將麴莽布支於涼州洪源谷凡六戰六捷破虜築京觀而還後吐蕃使來朝嘗因侍宴蕃使屢覘休璟則天問其故對曰往歲洪源戰時此將軍雄猛無比殺臣將士甚衆今願識之則天大加歎異休璟尤練邊事自碣石西踰四鎮綿亘萬里山川要害皆能記之長安中西突厥與諸蕃不和舉兵相持安西道阻表疏相繼則天召休璟與宰相啇度事勢俄頃間草奏便施行後十餘日安西諸州請兵應接一如休璟所畫則天謂之曰恨用卿晚乃遷夏官尚書同中書門下三品仍謂魏元忠曰休璟諳練邊事卿等十不當一也又曰宰相張說出為并州大都督府長史兼天兵軍大使開元九年胡賊康待賓據長泉鎮叛與黨項連結攻陷蘭池等六胡州詔說與朔方軍大使王晙合勢進討賊攻銀城連谷以據倉糧說統馬步萬人出合河關掩擊大破之追至駱駝堰胡及黨項自相疑二乃散說招集黨項復其居業副使史憲請盡誅黨項說曰先王之道推亡固存如盡誅之是逆天道因奏置麟州安置黨項餘衆其年說自兵部尚書同平章事十年又勑說為朔方軍節度大使往巡五城處置兵馬時降胡康願子自立為可汗舉兵掠監牧馬西河涉出塞說收兵討而擒之以獻徙其家屬於木盤山其黨悉平獲男女三千人於是移河曲六胡州殘胡五萬餘口配之於許汝唐鄧仙豫等州始空河南朔方地先是緣邊鎮兵常六十萬說以邊寇漸平奏罷二十餘萬勒還農畝玄宗頗以為疑說奏曰臣久在疆場具悉邊事禦敵制勝不在多驅間冗陛下若以為疑臣請闔門百口保之以陛下之明四夷畏服必不慮減兵而招寇也玄宗從之時當蕃衛士寖以貧弱逃亡略盡說建策請一切罷之別召募強壯令其宿衛不簡色役優為條例逋逃者必爭來應募上從之旬日得精兵十三萬人分繫諸衛彍騎是也又曰吳元濟據蔡州叛王師討伐詔柳公綽以鄂兵五千隸安州刺史李聽率赴行營公綽曰朝廷以吾儒生不知兵耶即日上奏願自征行許之公綽自鄂濟溳江直抵安州李聽以廉使之禮事之公綽謂之曰公所以屬鞬負弩者豈非為兵事耶若去戎容被公服兩郡守耳何所統攝乎以公名家曉兵若吾不足以指麾則當赴闕不然吾且署職名以兵法從事矣聽曰唯公所命即署聽為鄂嶽都知兵馬使中軍先鋒行營馬步都虞候三牒授之乃選卒六千屬聽戒其部校曰行營之事一決都將聽感恩畏威如出麾下其出權制變為當時所稱入為刑部尚書出授太原尹河東節度使代北有沙陀部落自九姓六州皆畏憚之公綽至鎮召其酋朱耶執宜安置於雲朔塞下治廢柵十一募兵三千令沙陀屯守由是遂無邊患又曰元和十二年憲宗兵宰臣議兵曰王師伐蔡首尾三年雖捷奏頻來窠巢未殄度支供饋其何以濟李逢吉崔群王涯各有奏對多言罷兵為便唯裴度不言利害議曰臣請身自往行營督戰明日延英復對宰臣俱退上獨止度謂之曰卿必能為朕行乎度頓首流涕而奏曰臣誓不與此賊俱全上亦為之感慟度奏曰賊已力困但以群帥不一故未降耳上深嘉之遂欲加度招討使度奏曰韓弘已為都統臣不欲受招討之名但奉使即得乃下詔以度為彰義軍節度蔡申光觀察等使仍淮西行營宣慰處置使其年八月一日度發京師仍賜禁軍三百為衛兵憲宗御通化門餞軍度銜涕辭至蔡州度傳上慰勞之旨躬督戰陳卒伍立功即時論賞諸將奮勵無敢退留至十月十一日拔蔡州擒吳元濟仗節而還又曰元和中以裴度征淮西詔曰輔弼之臣軍國是賴興化致理秉鈞以居取威定功則分鬥而出所以同君臣之體一中外之任焉屬者問罪汝南致誅淮右蓋欲刷其污俗弔彼頑人雖挈地求生者實繁有徒而嬰城執迷者未翦其類何獸困而猶鬥豈鳥窮之無歸歟由是遙聽鼓鼙更張琴瑟煩我台席董茲戎旃朝議大夫守中書侍郎同平章事飛騎尉賜金魚袋裴度為時降生協朕夢卜精辦宣力堅明納忠當軸而才謀老成運籌而智略有定司其樞務備知四方之事付以兵要必得萬人之心是用禱於上玄練此吉日帶丞相之印綬所以尊其名賜諸侯之斧鉞所以重其命爾宜布清問恢壯猷感勵連營蕩平多壘招懷孤疾字撫夷傷况淮西一軍素效忠節過海赴難史冊書勳建中初攻破襄陽擒滅崇義比者脅於凶逆歸命無由每念前勞常思安撫所以內輟輔臣俾為帥率實欲保全慰諭各使得宜往欽哉無越唐書曰太尉李光弼御軍嚴峻而有禮士卒望風畏憚乾元中郭子儀會九節度之師不利於相州詔以光弼代子儀為河北副元帥子儀寬恕朔方將士多不奉法時僕固懷恩引回紇內助纍立戰功將帥多假借之及光弼統師懷恩為右廂都知兵馬使光弼出關會諸軍於汜水左廂都知兵馬使張用濟後至斬於纛下懷恩見而憚之不敢惕息光弼在河陽令懷恩攻泰清於懷州官軍頻不利光弼怒將斬之懷恩出奇為地道偷得賊號詐傳號令賊軍大亂遂拔懷州擒泰清而還光弼拾之泰清妻有美色城破被俘泰清從光弼求之即命還泰清議者稱自艱難已來唯光弼行軍理戎沉毅有籌略將帥中第一又曰鳳翔將野詩良輔涇原將郝玭各以名雄邊上吐蕃嘗謂漢使曰唐國既與吐蕃和好何忘語也問曰何謂曰若不忘語何因遣野詩良輔作隴州刺史其畏憚如此
