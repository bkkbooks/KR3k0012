body:
  text: 器物部五碗方言曰碗謂之盂或謂之銚鋭或謂之櫂碗謂之䀉木謂之涓抉蠲玦兩音說文曰碗小盂也吳志曰曹公出濡須甘寧為前部督受勑斫敵前營孫權特賜米酒衆肴寧乃以銀碗酌自飲兩碗乃酌與其都督都督伏不肯時持寧引劍自削置𣍿上呵之曰卿見知於至尊孰與甘寧寧尚不惜死卿何以獨惜死乎都督即起拜持酒通次酌兵各一銀碗至更時銜枚出斫敵敵驚動遂退寧益貴重晉陽秋曰王敦許周訪荊州又授梁州訪怒敦書喻之遺以玉碗訪投碗於地又曰武帝時魏府丞蕭談承徐修儀疏作漆畫銀帶粉碗詔殺之盤門中亦云晉咸康起居注曰詔賜遼東假遼等琉璃碗義熙起居注曰林邑王范明達獻金碗一副蓋一副東宮舊事曰漆碗子一百枚抱朴子曰外國作水精碗實是合百灰以作之交廣間多有得其法而鑄作之者今以語俗人俗人殊不肯信乃云水精本是自然之物崔豹古今注曰魏帝以車渠石為酒碗文士傳曰潘𡰥音夷與同僚飲主人有琉璃碗使客賦之𡰥於座立成於手尋陽記曰龍窟有深潭有人於此水邊洗銅碗忽浪起水長便失碗此人後見此碗置城裏井邊交州雜記曰太康四年刺史陶璜表送林邑王范熊所獻青白石碗一口白水精碗二口陶侃故事曰侃上成帝水精碗一枚世說曰王大將軍尚主如廁即還婢擎金盤盛水琉璃盛澡豆秦嘉婦與嘉書曰今奉金錯碗一枚可以盛書水琉璃碗一枚可以服藥酒諸葛恢集詔答恢曰今致琉璃碗一枚表曰天恩賜廣州白碗釰滔母與從祖虞光祿書曰賜琉璃碗盂說文曰盂飲器也方言曰宋楚趙魏之間或謂之㯸子忍箋矜二切一曰盤也河濟之間謂之䀂音安𥂫音殘亦謂之銚鋭漢書曰東方朔上嘗使數家射覆置守宮於盂下使射之盂若盤而大盤與鉢字同墨子曰若夫兼相愛交相利此自先聖六王者親行之何以知先聖六王之親行之吾以其所書於竹帛鏤於金石琢於盤盂傳遺後世子孫者知之晉四王起事曰惠帝還洛陽黃門以瓦盂盛茶上至尊韓子曰為人君者猶盂也人猶水也盂圓水圓盂方水方涼州異物志曰琥珀作盂瓶東方朔答客難曰安於覆盂蘇鉝林邑記曰林邑王范明達獻琉璃蘇鉝二口安哉李尤安哉銘曰安哉令名甘旨是盛埏埴之巧甄陶所成食彼美珍思此鹿鳴匕方言曰匕謂之匙說文曰柶音四匕也所以取飯易曰震驚百里不喪匕鬯詩曰有饛簋飧有救棘匕箋云匕所以載鼎實也周禮曰大喪共角柶角柶角匕也禮喪大記曰揳齒用角柶也儀禮曰主人執匕禮曰杜蕢苦怪切謂晉平公曰蕢也宰夫也非切是供又曰匕以桑長三尺或曰五尺刊其柄與末匕所以載牲字者此謂喪祭也吉祭匕用棘三禮圖曰匕以載牲體長二尺四寸葉博三寸長八寸漆丹柄頭疏匕形如飯操以棘心為之英雄記曰董常大會賓客誘降反者以鑊之會者戰栗亡失匕箸與筯字同蜀志曰曹公謂先主曰天下英雄唯使君與操耳先主方食失匕箸王隱晉書曰石勒時有謠云一杯食有兩匙石勒死人不知沈約宋書曰太子妃上世祖金縷匕箸上以賜沈慶之抱朴子曰道士李根煎鉛錫以藥如大豆者投中以鐵匕攪之冷即成鉏又有古強者自云四千歲嵇使君以玉匕與強後忽語嵇云昔安期先生以與之東宮舊事曰漆匕五十枚續齊諧記曰趙文詔為東宮扶侍廨在青溪中橋夜與神女宴寢脫金簪與扶侍亦贈以銀碗及流離匕箸方言曰箸筒盛匕箸者也筒音揔捅陳楚宋魏之間謂之筲或謂之羸音盈自關而西謂之桶揔今俗亦通呼小籠桶揔桶音籠揔蘇孔切通俗文曰以箸取物曰欹音羈禮曰飯黍無以箸羹之有菜者用挾音莢其無菜者不用挾鄭玄曰挾猶箸也今人或謂箸為挾提也史記曰漢王與酈食其謀撓楚權張良從外來曰陛下事去矣臣請借前箸為大王籌張晏曰求借所食之箸用指畫或曰前湯武箸明之事以籌度今時之不若也又曰景帝居禁中召條侯周亞夫賜食獨置大胾不置箸條侯心不平顧謂尚席取箸景帝視而笑曰此豈不足君所乎條侯免冠謝謝承後漢書曰莽時有奇士巨母霸臥則枕鼓以鐵箸食吳志曰趙達善治九宮一算之術嘗遇知故知故曰倉卒之間無酒食以敘意達以箸一隻再三蹤橫之乃言卿東壁下有酒一斗鹿肉三斤何以言無主人慚曰知卿善射欲相試耳典略曰曹汝隨大軍破張魯命陳琳作書報太祖曰且夫墨子之守縈帶為垣高不可登析箸為械堅不可入晉書曰何曾字頴考日食萬錢猶言無下箸之處東宮舊事曰漆箸一百雙荀卿子曰從山望木者十仞之木如箸而求箸不上析高蔽其長也韓子曰紂為象箸而箕子怖以為象箸必不加於土鉶必將犀玉之杯象箸玉杯必不美菽藿則必薦豹胎薦豹胎必不衣短褐而食於茅茨之下則必錦衣九重廣室高臺吾畏其終故怖其始故箕子見象箸以知天下之禍淮南子曰糟丘生乎象箸論衡曰以箸撞鍾以算擊鼓鍾鼓不能鳴者用橦之者小也神仙傳曰葛玄嘗與客食玄以口中飯盡化為蜂數百集於客身客皆投匕箸驚懼玄乃張口其蜂悉入葛洪治噎方曰與對食之人當以手捉箸問噎人曰此何等物噎人當答曰箸即復曰咽下去即愈語林曰王藍田食雞子以箸刺之不得便大怒王述也投于地相書曰人三指用箸者自如四指用箸貴五指用箸大富貴也機方言曰俎機也西南蜀漢之郊曰杫音賜史記曰項王為高俎置太公其上如淳曰高俎機上也後漢書曰樂嵩者河內人天性朴忠家貧為郎常獨直臺上無被止食糟糠帝每夜入臺輒見嵩問其故甚嘉之自此詔太官賜尚書以下朝夕餐給帷被皂袍及侍史二人畢三禮圖曰畢似天畢以載牲醴又葉博三寸長八寸柄長二尺四寸丹漆兩頭詩曰有救天畢載施之行箋云畢所以助載鼎寶儀禮曰宗人執畢鄭玄曰畢狀如文也禮曰畢用桑長三尺刊其柄與末畢所以助主人者刊猶削也飯帚說文曰陳留以飯帚為筲筲巢切亦盛箸籠又作筲也炙函東宮舊事曰漆炙大函一具飯函列異傳曰景初中城陽縣吏王巨嘗作倦枕機臥聞竈下呼曰文納何以在人頭下應曰我見枕不得動汝來就我至乃飯函也淅箕廣雅曰淅䉴音箱匴音旋䉛音郁纂文曰䉛淅箕也一曰𧀮魯人謂之淅䉴方言曰箕陳魏宋楚之間謂之籮炊䉛謂之縮漉米䉛也或謂之匴江東呼淅籤也筐方言曰箄必弭切簍音縷籅音餘䈱音叨筐𥱿也𥱿音筥江沔之間謂之籅趙代之間謂之䈱淇衛之間謂之牛筐𥱿其通語也𥱿小者南楚謂之筐關而西秦晉之郊謂之箄今江東亦名小籠為箄說文曰筐飯筐也𥱿飴牛筐也方曰筐圓曰𥱿三禮圖曰大筐以竹受五斛大夫以盛米致饋於聘賓小筐以竹受五升以盛米又曰筐以盛熬穀四種八筐大夫三種六筐士二種四筐易曰女篚筐無實書曰厥篚織文篚筐屬也又曰厥篚檿絲厥篚玄纖縞厥篚織具厥篚玄纁璣組厥篚纖纊又曰惟其士女篚厥玄黃紹我周王詩曰采采卷耳不盈頃筐又曰于以采蘋南澗之賓於以盛之維筐及筥方曰筐員曰筥又曰標有梅頃筐塈之又曰女執懿筐遵彼微行爰求柔桑懿筐深筐也禮曰蠶則績而蟹有筐左傳曰筐筥錡釜之器潢汙行潦之水可薦於鬼神可羞於王公又曰晉侯筮嫁伯姬於秦遇歸妹之睽其繇曰士刲羊亦無忘也女承筐亦無貺也西京雜記曰元后在家日燕銜白石大如指墮績筐中后取之石自剖為二其中文曰母天地遂復還合後為皇后常致璽中莊子曰愛馬者以筐盛屎呂氏春秋曰有娀氏二佚女為九成之臺帝令燕往遺二卵爭搏之覆以玉筐北飛遂不反吞之生契𥰠方言曰𥰠盛飯筥也南楚謂之筲今建平人呼曰筲趙魏之郊謂之去音袪𥰠今通語也說文曰𥰠飯筥也受五升秦謂之筲廣雅曰蹊音溪映𥰠音旅也纂文曰穭映大筥也趙代以筥為䈱論語曰斗筲之人何足算也筲竹器受二斗東宮舊事曰漆注綺織𥰠二十枚陶侃故事曰侃上成帝漆復𥰠五十枚簞說文曰簞飯器也禮曰凡以苞苴簞笥問人者操以授命儀禮曰小祝盤匜與簞巾于西階東左傳曰趙宣子田于首山見靈輒餓為之簞食與肉又曰越圍吳趙孟使楚隆往吳王拜稽首曰寡人不佞不能事越與之一簞珠使問趙孟簞小笥也問遺也論語曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂孟子曰孟子謂齊宣王曰今燕虐其民王往而征之民以為將拯己於水火之中也簞食壺漿以迎王師若殺其父兄係纍其子弟如之何其可又曰非其道則一簞食不可受於人如其道則舜受堯之天下不以為泰又曰商之君子實玄黃于篚以迎其君子其小人簞食壺漿以迎其小人黃石公三略曰良將用兵有饋一簞醪者使投之於河令士卒迎流而飲之爵說文曰爵禮器也象爵之形觶音枝受四升詩曰赫如渥赭公言錫爵周禮曰享先王贊玉爵宗廟獻用玉爵大朝覲會同贊獻玉爵玉爵王禮諸侯之酢爵也又曰梓人為飲酒器爵一升觚三升獻以爵而酬以觚禮曰執玉爵者弗揮為其寶而脆也又曰知音智悼子卒未葬晉平公飲酒師曠李調侍鼓鍾杜匱自外來聞鍾聲曰安在寢杜簣入寢歷階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐而飲之降趨而出平公呼而進之曰簣曩者爾心或開豫是以不與爾言飲曠何也曰子卯不樂紂以甲子死桀以乙卯亡王者謂之疾日不舉樂為事所以自戒懼也知悼子喪在堂未葬斯其為子卯也大矣曠也太師也不以詔是以飲之也爾飲調何也曰調也君之褻臣也為一飲一食忘君之疾是以飲之也爾飲何也曰簣宰夫也非刀匕是供又敢與知防是以飲之也平公曰寡人亦有過焉酌而飲寡人杜簣洗而揚觶公謂侍者曰如我死則必無廢斯爵也至于今既畢獻斯楊觶謂之社舉又曰宗廟之祭貴者獻以爵賤者獻以散尊者舉觶卑者舉角凡觴一升曰爵二升曰觚三升曰觶四升曰角五升曰散也又曰魯祀周公於太廟爵用玉盞仍雕加以壁角爵君所進於尸也仍因也因爵之形為稱也加加爵也散角皆以璧飾其口也又曰孔子射於矍相之圃蓋觀者如堵牆使公罔之裘序點楊觶而語公罔之裘楊觶而語曰幼壯孝弟耆耋好禮不從流俗修身以俟死者不在此位也蓋去者半處者半序點又楊觶而語曰好學不倦好禮不變旄期稱道不亂者不在此位也蓋僅有存者三禮圖曰爵受一升尾長六寸博二寸傅翼兌音鋭下方足漆赤雲氣又曰散受五升左傳曰凡公行告于宗廟反則飲至舍爵策勳焉爵飲酒器也既飲置爵則書勳勞又曰虢公請器王賜之爵玉爵也爵人貴石也後趙書曰石虎子韜以琉璃爵螺杯勸客酒吳志曰諸葛恪行酒至張昭昭不肯飲曰此非養老之禮權曰卿其能令張公辭屈乃當飲之恪曰昔師尚父九十秉旄杖鉞猶未告老軍旅之事將軍在後酒食之事將軍在先何為不養老也昭為盡爵古今注曰章帝章和年銅酒爵出河內泌水典論曰劉表諸子好酒造三爵大曰伯雅中曰仲雅小曰季雅楚辭九歌曰授北斗兮酌桂漿斗為玉爵班婕妤賦曰酌羽觴兮銷憂孟康曰羽觴作生生爵形有頭尾羽翼也
