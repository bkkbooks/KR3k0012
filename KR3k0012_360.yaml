body:
  text: 兵部九十羈許慎說文曰羈馬絡頭也左傳曰晉公子重耳之及難也秦伯納之及河子犯以璧授公子曰臣負羈紲從君巡於天下杜預曰羈馬羈細馬彊也臣之罪甚多矣請由此亡又曰初晉侯之豎頭須守藏者其出也竊藏以逃文公出時也盡用以求納之及入求見公辭以沐謂僕人曰居者為社稷之守行者為羈絏之僕其亦可也何必罪居者漢書曰今漢承襄周暴秦極弊之後流俗已薄於三代而行堯舜之刑是猶以鞿羈而御駻馬如淳曰鞿音機以繩繫馬領曰鞿駻突之馬也駻音汗東觀漢記曰光武皇帝雖發師旁縣人馬席薦䩭靽皆有成賈而貴不侵民樂與官市䩭音羈靽音半康泰吳時外國傳曰加營國王好馬月支賈人常以舶載馬到加營國國王悉為售之若於路失䩭靽但將頭皮示王王亦售其半價郭頒晉世語曰愍懷太子好卑雞小牛置田舍令左右騎斷羈勒令墮馬韓詩外傳曰昔衛獻公走反國及郊將班邑於從者而後入太史柳莊曰如皆守社稷則孰負羈靮音的而從如皆從則孰守社稷君反國而復為私也無乃不可乎釋智匠古今樂錄曰襄陽銅蹄哥曰龍馬紫金鞍翠毛白玉羈照曜雙闕下知是襄陽兒杜夷幽求曰羈蚊絆蚤禁其非法刳蟣屠虱求其肝膽非至精誰能知之又曰銜羈之馬伏櫪之駒莫不思平原曠澤翹尾而馳陸也又曰琱羈鏤絆呼名翹陸不可化也夢書曰羈繮為相要制也夢得羈繮要約士也羈結語言繮往來也羈結韁豎結勑疆也弊絕不用難俛仰也摯虞逸驥詩曰逸驥無鑣轡騰陸從長川剪落就羈靮飛軒躡雲煙孫綽詩曰野馬閑於羈澤雉屈於樊神王自有所何為人事間傅玄馳射馬賦曰百鳥齊興六驥孔閑金銜玉羈文防鏤鞍明珂景朗華䩸采鮮傅玄良馬賦曰金羈在首發以明珂鏤鞍采䩸織防含華䩸音茸傅玄難良馬賦曰飾以金羈申以玉纓結以輕軒節以和鈴曹植遊俠篇曰白馬飾金羈連翩西北馳借問誰家子幽并遊俠兒孫惠三馬衷辭序曰余於物特所留心而所服三馬一時離羈感田子之愛遂作哀文云爾珂服虔通俗文曰勒飾曰珂郭義恭廣志曰期調國出金銀白珠硫璃水精器五色珠馬珂又曰剽刃國出桐華布珂珠貝艾香雞舌香傅玄樂府豫章行曰輕裘綴孔翠明珂曜珊瑚張華輕薄篇曰文軒樹羽蓋乘馬佩玉珂韉隋書曰宇文述素好著奇服炫燿時人雲定興為製馬韉於後角上缺方三寸以露白色世輕薄者爭放學之謂為許公缺勢又遇天寒定興曰宿衛必當耳冷述曰然乃製裌頭巾令深袹音陌耳又學之名為許公柏勢述大悅曰雲兄所作必能變俗我聞作事可法故不虛也障泥王隱晉書曰韓友字景先廬江舒人舒縣廷掾王睦卒病死已呼魄家人就友卜令以丹畫板作日月置尸頭前及臥虎皮馬彰泥登時大愈蕭方等三十國春秋曰高勾驪以千里馬生羆皮鄣泥獻于南燕燕王超大悅荅以水牛能言鳥世說曰王武子善解馬性嘗乘一馬著連乾彰泥前有水終不肯渡王云此必是惜彰泥使人解去便徑度防汗東觀記曰和帝永元三年西謁園陵桓郁兼羽林中郎將從賜馬二疋并鞍勒防汗魏百官名曰黃地金鏤織成萬歲鄣泥一具又織成防汗一具桓寬鹽鐵論曰古者庶人賤騎繩控草鞮皮薦而已及其後革鞍攻成鐵鑣不飾令富者黃金琅勒罽繡弇汗弇音奄司馬彪戰略曰孟達將蜀兵數百降魏魏文帝以達為新城太守太和元年諸葛亮從成都到漢中達又欲應亮遺亮玉玦織成鄣汗蘇合香亮使郭摸詐降過魏興太守申儀與達有隙摸語儀亮言玉玦者已決織成者言謀已成蘇合香者言事已合當胸後漢書曰太守趙興署鮑永功曹時有矯稱侍中止傳舍者興欲謁之永疑其詐諫不聽出興遂駕往永乃拔佩刀截馬當胸乃止當胸以韋為之也後數日莽詔書果下捕矯稱者永由是知名鞙尾服虔通俗文曰馬鞻音樓尾曰鞙胡畎切魏百官名曰赤茸鍮石鞙尾一具鞭禮記曰獻車馬者執筴綏又曰君車將駕則僕立於馬前已駕僕展軨鄭玄曰展軨具視効駕白已駕也奮衣由右上取貳綏奮振去塵也貳副也執筴分轡驅之五步而立左傳曰晉公子重耳之及於難也及楚楚子享之曰公子若反晉國則何以報不穀對曰若以君之靈得反晉國晉楚治兵遇於中原其避君三舍若不獲命其左執鞭弭右屬橐鞬以與君周旋又曰宋告急於晉伯宗曰不可雖鞭之長不及馬腹又曰楚靈王使圉徐以懼吳楚子次于乾谿以為之援雨雪王皮冠秦復陶翠被豹舄執鞭以出執鞭以教令右尹子革夕子革鄭丹也夕暮也王見之去冠被舍鞭與之語又曰晉荀瑤帥師伐鄭鄭駟弘請救於齊陳成子救鄭及濮雨不涉成子衣製杖戈製雨衣也立於阪上馬不出者助之鞭之公羊傳曰陽虎將殺季孫于蒲圃使臨南御之至孟衢臨南投策使陽越下取策陸機毛詩草木虫魚䟽曰据枝葉似楨松爾雅曰据櫃也去匱切節似扶老即金靈壽是也今人以為馬鞭及杖孔藂子曰刑以齊民譬之於御則鞭策也漢書曰婁敬云太王以狄伐故去豳杖馬箠去居歧又曰石慶為太僕御出上問車中幾馬慶以策數馬畢舉手曰六馬又曰李廣擊匈奴匈奴兵多破廣軍生得廣廣時傷置絡間而臥行十餘里廣陽死睨其傍有一胡兒騎廣騰而上胡兒馬因鞭馬南馳數十里得其餘軍又曰大司空士夜過奉常亭亭長呵之告以官名亭長醉曰寧有符傳耶士以馬箠擊亭長漢獻帝起居注曰李𠐶性喜鬼怪左道之術又於朝廷省門為董卓設神坐數以羊祠之祠畢過省閤問帝起居求入見𠐶帶三刀手復與鞭合持一刀侍中侍郎見𠐶帶仗皆惶恐亦帶劍持刀先入在帝側張勃吳錄曰大皇帝大會飲宴下馬迎魯肅肅入拜起禮之謂言子敬孤持鞍下馬相迎足以顯未肅趨進曰未也眾咸愕然既坐徐舉鞭曰願麾下威德加于四海然後以安車軟輪徵肅始當顯耳帝拊掌歡笑又曰大皇帝潛軍於睆口命陸遜為大都督假鉞大皇帝親執鞭以見之虞溥江表傳曰孫權攻合肥不能下徹軍將退兵已上道權與呂蒙蔣欽陵統等在後張慢飲食畢垂當發魏將張遼帥六七千人奄至圍遮數重權乘駿馬上津橋南已見徹丈餘無板谷利附在馬後使持鞍緩鞚利於後著鞭以助馬勢遂得超度王隱晉書曰上黨鮑瑗家多喪病貧苦淳于叔平曰君舍東北有桑樹徑至市入門數十步當有一人持新馬鞭便就買還以懸北桑樹三年當暴得財也瑗遂承其言詣市果得馬鞭懸之正三年浚井得錢數十萬銅鐵雜器復可二十餘萬於是家業用展病者亦愈干寶晉記曰晉永嘉初有神見兗州甄城民家免奴為主簿自號為樊道基有嫗號成夫人欲迎致便載車行當得此免奴主簿從行為譯以宣所宜汝南梅蹟字仲真去鄴來經兗州聞其然因結羊世茂阮士公諸賓往觀之成夫人便遣主簿出當與貴客語主簿死不肯避成夫人因大嗔索士公馬鞭脫主簿鞭之何法盛晉中興書曰祖逖與劉琨中夜而坐相謂曰若四海鼎沸豪傑並起吾與足下相避於中原後琨與親舊書曰吾枕戈待旦志梟逆虜常恐祖生先人著鞭耳沈約宋書曰胡蕃字道序義旗起桓玄戰敗將出奔藩於南掖門捉玄馬鞚曰今羽林射手猶有八百皆是義故西人一旦捨此欲歸可復得乎玄直以馬鞭指天而已於是奔散蕭方等三十國春秋曰石勒遣石虎率精騎五千掩李矩營生執矩外甥郭謂之弟元教元作書與謂說云去年東平曹嶷西賓猗廬矩如牛角何不歸命勒與謂書餉塵尾馬鞭說賓禮賢弟想同斷金往物為信矩所領將士並欲歸勒矩知眾之去己乃率眾來歸又曰城都王頴誅黃門孟玖於是東海王越高密王簡皆懼奔國琅邪王睿又將出焉而徼禁甚密穎又先下諸津禁止諸貴人王至河陽乃見拘焉宋典後至以鞭拂之曰舍長官禁貴人而爾見止耶因大笑之吏乃放遣因得奔國崔鴻前秦錄曰符堅起教武堂于渭城命太學生明陰陽兵法教為將士朱彤諫曰虎將之士受教學生強幹之術乃弱本之方夫養將之法譬之養馬秣以高櫪習以戰馭長鞭策後金勒制前折旋規矩任知進退又曰符堅引群臣議代晉太子左率石越曰今歲鎮守斗福德在吳弗可犯且國有長江之嶮朝無昏政之臣願保境養民伺其虛隙堅曰武王伐紂逆歲犯星夫差威陵上國為勾踐所滅雖有長江其能固乎吾之眾投鞭於江足斷其流吾當內斷其心矣又曰符堅時關中謠曰長鞘馬鞭擊左股太歲南行當避虜秦呼鮮卑為白虜慕容垂起關東歲在癸未崔鴻後梁錄曰咸寧二年盜發張駿墓得珠簾琉璃珊瑚馬鞭樂資春秋後傳曰魯仲連曰齊閔王將之魯夷維子為執鞭而從之袁希之漢表傳曰費禕放離切領漢節誘納降附越嶲太守張嶷牋誡禕曰昔岑彭率師來歙杖節感皆見害刺客不鎮重也今明公位尊權重宜覽前事後歲首禕持節行酒郭循以馬鞭中小刀刺禕禕數日薨魏百官名曰駝馬鞭二枚異苑曰長山張舒以元嘉九年二月二十四日奄見一人著朱衣平上幘手捉青柄馬鞭云汝何可教便隨我去見素絲繩繫長梯來下舒上梯仍造大城綺堂洞室地如黃金有一人長大不巾蹟獨坐絳紗帳中語舒曰主者誤取汝賜汝秘術卜占勿貪錢賄舒亦不覺受時劉義慶幽明錄曰餘杭人沈縱家素貧與父同入山還未至家見一人左右導從四百許前車輜重馬鞭夾道鹵簿如二千石遙見縱父子使喚住就縱手中燃火縱因問是何貴人荅曰是鬥山王在餘杭南縱知是神叩頭云願見祐助後入山得一王㹠從此如意又曰桓玄既肆無君之心使御史害太傅道子於安城玄在南州坐忽見一平上幘人持馬鞭通云蔣侯來玄驚愕然便見階下奴子御幰車見一士大夫自云是蔣子文君何以害太傅與為伯仲顧視之間便不復見又曰廣陵韓晷字興彥陳敏反時與敏弟恢戰於尋陽還營下馬覺鞭重見有綠錦囊中有短卷書著鞘皆不知所從來開視之故穀紙佛神呪經謝氏鬼神列傳曰下邳陳超為鬼君弼所逐改名何規從餘杭步道還家求福絕不敢出入五年後意漸替懈與親舊臨水戲酒酣共說往事超云不復畏此鬼也小俛首乃見鬼影在水中超驚怖時亦有乘馬者超借馬騎之下鞭奔驅此鬼去超遠近常如初微聞鬼云汝何規耶急急就死吳會分地記曰六山者勾踐於此山鑄銅銅不鑠則埋之上生馬箠勾踐遣使者移於南社種之飾治以為馬箠獻於吳劉欣期交州記曰兕出九德有一角角長二尺餘形如馬鞭柄闞駰十三州志曰山桑縣人俗貪偽好持馬鞭行邑故語曰沛國龍冗至山桑詐託旅使若奔喪道遇寇抄失資糧太公陰謀曰武王曰吾欲造起居之誡隨之以身箠書曰馬不可极民不可劇馬极則躓民劇則敗莊子曰莊子使楚見空髑髏髐然司馬彪曰髐曰骨皃撽以馬箠而問之曰夫子貪生理而為此乎將有亡國之事斧鉞之誅乎語卒援髑髏枕而寢又曰馬蹄可以踐霜雪毛可以御風寒齕草飲水翹足而陸此馬之真性也及至伯樂曰我善治之燒剔之刻之雒之連之以羈馽編之以皂棧馬之死者十二三矣飢之渴之馳之驟之齊之前有橛飾之患後有鞭策之威而馬之死者已過半矣淮南子曰昔者王良造父御也投足調均勞逸若一安勞樂進馳騖若滅左右若鞭周旋若環世皆以為巧然未見其貴也若夫鉗具太丙之御也除轡舍銜去鞭棄策軍車莫動而自舉馬莫使而自走又曰大丈夫恬然無思澹然無慮以天為蓋以地為輿四時為馬陰陽為騶電以為鞭策雷以為車輪鹽鐵論曰無鞭策雖造父不能以調四馬無勢位雖舜禹不能以治萬民又曰秦攝利銜以御宇內執脩箠以笞八极杜夷幽求曰召渴者以臨河不待鞭策而自至說苑曰默無過言愨無過事木馬不能行亦不費食騏驥日馳千里鞭箠不去其背楊偉時務論曰轡策靽摯之具設雖剛怒麤戾蹄齧之馬若足拘靽縶口銜轡勒箠策必至則躡䠱循䠱馳錄切世說曰王敦在姑熟晉帝出看敦營敦覺追帝帝以金馬鞭與客舍姥莫補切姥以水澆馬屎令追者問姥姥云去已久矣追者乃止也又曰王澄字平子從荊州下過王敦敦謀欲害之而平子左右二十八人悉捉鐵馬鞭為衛敦不敢近夢書曰鞭箠為所使有勑趨也夢得鞭箠欲有使也持以鞭馬使朋友也鞭使馬疾服諾喜也曹植九詠曰乘逸嚮兮執電鞭忽而往兮怳而旋曹植陌上桑曰望雲際有真人安得輕舉繼清塵執電鞭騁飛麟張華輕薄篇曰文軒樹羽蓋乘馬珮玉珂橫簪列瑁瑇長鞭施象牙揚雄河東賦曰奮電鞭驂雷輜鳴洪鍾建五旗魏文帝臨渦賦曰建安十八年終譙余兄弟從上拜墳墓遂乘馬遊觀經東園遵渦水相佯乎高樹之下乃駐馬書鞭為渦賦傅玄良馬賦曰鞭不得搖手不及動忽然增逝肉飛骨踴傅玄馳射馬賦曰佷如革戾如膠鞭裁向腹奮尾跳凥曹植表曰願得策馬執鞭首當塵路掫風后之奇接吳孫之要追慕卜商起矛左右李尤馬箠銘曰御者箠策示有威怒東野之敗督責過度溫嶠與陶公書曰奉惠赤角一具及鞉鼓馬鞭鼓角既周軍用馬鞭服以周旋玩之於乎與之偕老也偃武之日乃當藏之篋笥耳謝艾密令與楊初曰今遣舍人孔章特口論要密將軍可差腹心人旨致珊瑚馬勒香瓔於盈切一具遺王擢王擢狐疑於將軍父子事得施矣袁宏與范曾書曰四海鼎沸天轡將移杖短策以晨征登重幙以吐奇指六合以倒戈望崑崙而舉麾枊魚豢魏略曰獻帝露布益州曰馬擊枊而不暇解貫冑延頸以侍白刃枊五剛切又五浪切蜀志曰靈帝末先主從校尉鄒靖討賊有功除安喜尉督郵以公事到縣先主求謁不通乃直入傳縛督郵杖二百解綬擊其頸著馬枊棄官亡命常璩華陽國志曰建寧郡同瀨縣存馬縣雍闓反時結壘於縣山繫馬馬枊柱生成林今夷言無梁林無梁夷言馬也蕭子雲晉史草曰姚略時有賀僧者不知何人自云遊歷五郡時人號為賀五郡齋戒奉道為百姓說吉凶略死泓立僧謂泓曰宜絜掃一馬廄開屋設大枊有異馬其大非常自遠來天所送矣趙書曰徐光字秀武頓丘人父以牛毉為業光年十四五為將軍王陽秣馬光但書馬枊屋柱為詩頌不親馬事異苑曰丹陽甘卓字季思照鏡無頭乃見在馬枊荀氏靈鬼志曰泰元中有道人從外國來多有術法自說所受術師曰衣非沙門也嘗行見一人擔上有小籠子可受斗餘語檐人云吾步疲極欲暫寄君擔上人甚怪之慮是狂人便語君欲何許自居邪荅云君若見許正欲入君此籠子中檐人愈怪其奇君能入籠中便是神人也即入籠中籠亦不更大擔亦不覺重至國中一家大富而性慳惜不行仁義語檐人吾試為君破奴慳囊即至其家有一快馬甚惜之在枊下繫忽失去尋求不知處明日見馬在五斗甖中終不可破取不知何方得取之便往語言君作百人廚食周餉窮困者馬當得出耳主人即狼狽作之既畢馬還在柱淮南萬畢術曰馬枊生腐芽者取馬枊生芽可以為藥食煞鳧矣
