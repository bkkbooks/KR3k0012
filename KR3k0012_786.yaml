body:
  text: 南蠻一敘南蠻禮記王制曰南方曰蠻雕題交址有不火食者矣雕文謂刻肌以丹青涅之交距足相鄉不火食地氣暖不為病傳曰庸人率群蠻以叛楚庸今上庸縣屬楚之小國麋人率百濮聚於選將伐楚選楚地百濮夷也於是申息之北門不啓又曰楚子聞蠻氏之亂也與蠻子無質也質信也使然丹誘戎蠻子嘉殺之遂取蠻氏又曰王子朝使告于諸侯曰茲不穀震蕩播越竄在荊蠻未有攸底詩曰蠢爾蠻荊大邦為讎蠢動也蠻荊荊州之蠻也又曰修爾車馬弓矢戎兵用戒戎作用逖蠻方蠻方蠻荊之外也此時中國微弱故復戒將率之臣以治軍實又曰保有鳧繹遂荒徐宅至于海邦淮夷蠻貊及彼南夷莫不率從尚書舜典曰柔遠能邇惇德允元而難任人蠻夷率服帝曰皋陶蠻夷猾夏寇賊姦宄猾亂也夏華夏也群行攻劫曰寇殺人曰賊在外曰姦在內曰究言無殺所致也又禹貢曰三百里蠻以文德來之不制以法論語曰子張問行子曰言忠信行篤敬雖蠻貊之邦行矣史記曰吳太伯弟仲雍皆周大王之子避季歷乃奔荊蠻文身斷髮示不可用荊蠻義之從西歸之千餘家漢書曰賈誼上書云凡天子者天下之首何也上也蠻夷者天下之足何也下也世説曰郝隆為桓溫南蠻參軍三月三日就溫席作詩曰娵隅躍清池溫問何物答曰蠻名魚為娵隅桓曰何為作蠻語隆曰千里投公始得一蠻府參軍郍得不作蠻語越裳國尚書大傳曰交址之南有越裳國周公居攝六年制禮作樂天下和平越裳以三象重譯而獻曰雉曰道路悠遠山川阻深音使不通故重譯而朝成王以歸周公曰德不加焉則君子不饗其質質亦贄也政不施焉則君子不臣其人吾何以獲此賜也其使請曰吾受命吾國之黃耇日久矣天之無烈風注雨意者中國有聖人乎有則盍往朝之周公乃歸之於王稱先王之神致以薦于宗廟周德既衰於是稍絶黃支國漢書曰黃支國去合浦日南三萬國俗與朱崖略同武帝時來貢具多明珠璧琉璃奇石異物大珠圍及二寸至團者置之平地終日不得止槃瓠後漢書曰昔高辛氏有犬戎之寇帝患其侵暴而征伐不剋乃訪募天下有能得犬戎之將吳將軍首者購黃金千鎰邑萬家又妻以少女時帝有畜狗其毛五采名曰槃瓠下令之後槃瓠遂銜人頭造闕下群臣怪而診視之乃吳將軍首也帝大喜乃以女配槃瓠槃瓠得女負而走南山止石室中所處險絶人迹不至於是女解去衣裳為僕鑒之髻結著獨力之衣僕鑒獨力皆未詳流俗或改鑒為堅者妄穿鑿也經三年生子十二人六男六女槃瓠死後因自相夫妻織績木皮染以草實好五色衣服製裁皆有尾形其衣裳班蘭語言侏離好入山壑不樂平曠帝順其意賜以名山廣澤其後滋蔓號曰蠻夷外癡內黠安土重舊以先父有功母帝之女田作賈販無關梁符傳租稅之賦有邑君長皆賜印綬冠用獺皮名渠帥曰精夫相呼為姎徒姎焉郎切説文曰自自稱姎我也今長沙武陵蠻是也又曰南蠻其在唐虞與之要質故曰要服夏商之時漸為邊患暨于周代黨衆彌盛故詩曰蠢爾蠻荊大邦為讎至楚武王時蠻與羅子共敗楚師殺其將屈瑕莫敖不設備故敗縊于荒谷群帥囚于治父也楚師既振遂屬於楚及吳起相悼王南并蠻越遂有洞庭蒼梧秦昭王使白起伐楚略取蠻夷始置黔中郡又曰漢興改秦黔中郡為武陵歲令大人輸布一匹小口二丈是謂賨布説文曰賨南蠻賦也音牛冬切雖時為寇盜而不足為郡國患光武建武二十三年武陵蠻精夫相單程等大寇郡縣遣武威將軍劉尚發南郡長沙武陵兵萬餘人乘船泝沅水入武溪擊之沅水出牂牁故旦蘭東北經靈溪長沙巴陵郡入洞庭通功也武溪在靈溪郡盧溪縣尚輕敵深入悉為所沒又遣伏波將軍馬援將兵至臨沅今武陵郡武縣即漢臨沅縣也擊破之單程等飢困乞降會援病卒謁者宗均聽悉受降為置吏以司之群蠻遂平又曰順帝永和初武陵太守上書以蠻夷率服可比漢人增其租賦議者皆以為可尚書令虞詡獨奏曰自古聖王不臣異俗非德不能及威不能加其獸心貪婪難率以禮是故羈縻而綏撫之附則受而不逆叛則棄而不追先帝舊典貢稅多少所由來久矣今猥增之必有怨叛計其所得不償所費必有後悔帝不從其冬澧中漊中蠻漊水出令澧陽郡漊音婁果爭貢布非舊約遂殺鄉史舉種反叛明年遣武陵太守李進討破之斬首數百級餘皆降散又曰延熹中長沙零陵蠻反叛寇江陵荊州刺史劉度謁者馬睦南郡太守李肅皆奔走肅王簿胡爽扣馬首諫曰蠻夷見郡無警備故敢乘間而進明府為國大臣連城千里舉旄鳴鼓應聲十萬秦何委付守之重而為逋逃之人乎肅拔刃向爽曰掾促去太守今急何暇此計抱馬固諫肅遂殺爽而走帝聞之徵肅棄市復爽門問拜家一人為郎魏略曰高辛氏有老婦居王室得耳疾挑之乃得物大如繭婦人盛瓠中覆之以槃俄須化為犬其文五色因名槃瓠干寶晉紀曰武陵長沙郡夷槃瓠之後雜處五服之內憑山阻險每常為猱雜魚肉而歸以祭槃瓠俗稱赤髓撗裙子孫唐書曰黃國公册安昌者槃瓠之苗裔也世為巴東蠻師與田李向鄧各分槃瓠一禮世傳其皮盛以金函四時致祭黃閔武陵記曰山半有槃瓠石室可容萬人中有石床槃瓠行迹今接山窟前有石羊石獸古迹奇異尤多坐石窟大如三間屋遙見一石仍似狗形蠻俗相傳云是槃瓠象也荊州記曰阮陵縣君居酉口有上就武陽二鄉唯此是槃瓠子孫狗種也二郡在武陵溪之北廩君後漢書曰巴郡南郡蠻本有五姓色氏樊氏瞫氏瞫音審相氏鄭氏皆出於武落鍾離山在今郡是夷陵山縣其山有赤黑二穴巴氏之子生於赤穴四姓之子皆生黑穴未有君長俱事鬼神乃共擲劍於石穴約能中者奉以為君巴氏子務相乃獨中之衆皆歎又令各乘土船約能浮者當為君餘姓悉沉惟務相獨浮因共立之是為廩君乃乘土船從夷水至鹽陽鹽水有神女謂廩君曰此地廣大魚鹽所出願留共居廩君不許鹽神暮輒來宿旦即化為蟲與諸蟲群飛掩蔽日光天地晦冥積十餘日廩君思其便因射殺之天乃開明廩君於是君乎夷城四姓皆臣之廩君死魂魄世為白虎巴氏以虎飲人血遂以人祠焉又曰秦惠王并巴中以巴氏為蠻夷君長世代尚秦女其人爵比不更有罪得以爵除又曰漢興南郡太守靳強奏請一依秦時故事至光武建武二十三年南郡潳山蠻雷遷等始反叛潳音屠寇掠百姓遣武威將軍劉尚討破之徙其種人七千餘口置江夏界中其後沔中蠻是也漢之江夏郡今竟陵郡富水安陸齊安漢陽江夏蘄春郡地皆是也又曰和帝永元十三年巫蠻許聖等漢之巫縣今雲安郡巫山縣也以郡收稅不均懷怨恨遂屯聚反叛荊州諸郡兵討破之復悉徙置江夏靈帝光和三年江夏蠻復反寇患纍年廬江太守陸康討破之漢廬江即今郡也世本曰廩君使人操青縷以遺鹽神曰嬰此即相宜云與女俱生弗宜將去鹽神受縷而嬰之廩君即立陽石上望青縷而射之鹽神死天乃大開説文曰𢄐南郡蠻夷布也𢄐音稼荊州圖曰夷陵縣西有溫泉古老相傳此泉元出鹽于今水有鹽氣縣西一獨山有石穴有二大石並立穴中相去一丈俗名為陰陽石陰石常濕陽石常燥盛弘之荊州記曰昔廩君浮夷水射鹽神于陽石之上按今施州清江縣江水一名夷水一名鹽水源出清江縣西都亭山水經曰夷水別出巴郡魚復縣注云水色清照十丈分沙石蜀人見澄清因名清江板楯蠻後漢書曰板楯蠻者秦昭襄王時有一白虎常從群虎數遊秦蜀巴漢之境傷害千餘人昭王乃募國中有殺虎者賞邑萬家時有巴郡閬中夷人能作白竹之弩乃登樓射殺白虎昭王嘉之以其夷人不欲加封乃刻石盟要復夷人頃田不租十妻不算一戶免其一頃田之租稅雖有十妻不輸口算之錢也傷人者論殺人得以倓錢贖死何承天纂文曰倓蠻夷贖罪貨也倓音徒濫也盟曰秦犯夷輸黃龍一雙夷犯秦輸清酒一鍾夷人安之又曰漢高帝為漢王發夷人還伐三秦今爾中秦川秦地既定上遣還巴中復其渠帥羅朴督鄂度夕龔七姓不輸租賦餘戶乃歲入賨錢口四十世號為板楯蠻夷閬中有渝水其人多居水左右天性徑勇初為漢前鋒數陷陳俗喜歌舞喜音虛記切高祖觀之曰此武王伐紂之歌也乃命樂人習之所謂巴渝舞也又曰靈帝光和中巴郡板楯叛寇掠三蜀及漢中諸郡帝欲大發兵乃問益州計吏考以征討方略漢中上計程苞對曰板楯七姓射殺白虎立功先世復為義人其人勇猛善於兵戰昔安帝永和初中羌入漢川郡縣破壞得板楯救之羌死敗殆盡故號為神兵羌人畏忌傳語種輩勿復南行至建和二年羌復大入實賴板楯連摧破之前車騎將軍馮緄南征武陵雖丹陽精兵之鋭亦倚板楯以成其功近益州郡亂太守李顒亦以板楯討而平之忠功如此本無惡心但長吏卿亭更賦至重僕役箠楚過於奴虜闕庭悠遠不能自聞含怨呼天叩心窮谷故邑落相聚以致叛戾非有謀主僣號以圖不軌今但選明能牧守自然安集不煩征伐也帝從其言遣太守曹謙宣詔赦之即皆降服北史曰自劉石亂後請漸得北遷陸渾以南溝於山谷道武既定中山蠻王梅安率渠帥數千朝京求留質子以表忠款拜安侍子豹為安遠將軍延興中大陽蠻首桓誕擁河水以北滍葉以南八萬餘落內屬孝文嘉之拜誕東荊州刺史襄陽王誕字天生桓玄子也既內屬居朗陵王師南伐請為前驅討義陽不果而旋太和十七年蠻首田益宗率部曲四千餘戶內屬襄陽蠻首雷婆思等十一人率千餘戶內徙求居大和川詔給廩食後開南陽全有沔北之地蠻人安堵不為寇賊宣武景明初太陽蠻首田育丘等二萬八千戶內附詔置四郡十八縣魯陽蠻魯北燕等聚衆萬餘攻逼頻陽遣右衛將軍李崇討平之徙萬餘家於南北及六鎮尋叛南走所在追討北及河殺之皆盡正始二年梁沔東太守田清喜擁七郡三十一縣戶萬九千內附永平初東荊州表太守桓叔興前後招慰大陽蠻歸附者一萬七百戶請置郡十六縣五十詔前鎮東府長史酈道元檢行置之後二荊兩郢蠻大擾動斷三鴉路殺都督寇盜至於襄城汝水百姓多被其害連年攻討散而復合其暴滋甚有冉氏向氏田氏陬落最盛大者萬家小者千戶更相崇樹僣稱王決七據三峽斷遏水路荊蜀行人至有假道者周文略定伊瀍聲教南被諸蠻畏威靡然向風後唐州蠻田魯嘉叛自號豫州伯王雄等計平之尋而蠻師舟令賢向五子王等反攻陷白帝天和初開封陸騰討斬之以其骸骨於水邏城側為京觀後蠻蛋音但見輒大哭自此狼戾之心去矣俚後漢書曰建武十二年九真徼外蠻里張里蠻之別號今則呼為俚人率種人慕化內屬封為歸漢里君沈懷遠南越志曰晉康郡夫陙音純縣人夷曰世尺切其俗柵居實惟俚之城落南州異物志曰廣州南有賊曰俚此賊在廣州之南蒼梧鬱林合浦寧浦高涼五郡中央地方數千里往往別村各有長帥無君主恃在山險不用王自古及今彌歷年紀民俗蠢愚唯知貪利無有仁義道理土俗不愛骨肉而貪寶貨及牛犢若見賈人有財物水牛者便以其子易之夫或鬻婦兄亦賣弟若鄰里有負其家債不時還者其子弟中愚者謂其兄曰我為汝取錢汝但當善殯葬我耳其處多野葛為鈞挽數寸徑到債家門下謂曰汝負我錢不肯還我今當自殺因食野葛而死債家門下其家便稱宛宗族人衆往債家曰汝不還我錢而殺我子弟今當擊汝債家慚懼因以牛犢財物謝之數十倍死家乃自收死者罷去不以為恨裴淵廣州記曰俚獠貴銅鼓唯高大為貴面闊丈餘方以為奇初成懸於庭剋晨置酒招致同類來者盈門其中豪富子女以金銀為大叉執以叩鼓竟留遺主人名為銅鼓叉風俗好殺多構讎怨欲相攻擊鳴此鼓集衆到者如雲有是鼓者極為豪強
