body:
  text: 工藝部十圍碁左傳曰寧喜許納衛獻公太叔文子曰今寧子視君不如奕碁奕者舉碁弗定不勝其偶而況置君弗定乎奕圍碁也九世之卿族一舉而滅之可哀也哉魏志曰王粲觀人圍碁局壞壞謂白黑既亂粲復為之碁者不信以袍蓋局便更以他局為之用相比校不誤一道魏氏春秋曰孔融被誅二子碁而不起左右曰爾父見報不起何也二子曰安有巢毀而卵不破者乎蜀志曰費禕與來敏圍碁于於時羽檄交馳人馬擐甲嚴駕已訖而禕留意對戲色無厭倦禕至敵遂退吳志曰孫權太子和常言嘗世士人宜講修術學習射御以周世務而但交遊博奕以妨事業非進取之謂也後群僚侍宴言及博奕以為妨事費日而無益於用勞精損思終無所紀非所以進德修業積纍功緒也人情猶不能無嬉娛嬉娛之好亦在飲宴琴書射御之間何必博奕可以為欣乃命侍坐者八人各著論以矯之於是中庶子韋曜退而奏論和以示賓客時蔡款好奕故以諷之吳録曰嚴武字子卿圍碁莫與為輩謂之八絶晉書曰王質入山斫木見二童圍碁坐觀之及起斧柯已爛矣又曰賈謐嘗與太子奕碁爭道成都王熲頻在坐正色曰皇太子國之儲君賈謐何得無禮也又曰符堅率衆號百萬次于淮淝京師震恐加謝安征討大都督兄子玄入問計安夷然無懼色答曰已別有旨既而寂然玄不敢復言及令張玄重請安遂命駕出墅親朋畢集方與玄圍碁賭別墅安常碁劣於玄是日玄懼便為敵手而又不勝安顧謂其甥羊曇曰以墅乞汝又曰王導與其子悅奕碁爭道導笑曰相與有瓜葛那得為爾耶又曰祖納為軍咨祭酒納好奕碁王隱謂之曰禹惜寸陰不聞數碁對曰我以忘憂耳鄧粲晉紀曰阮籍母死與人圍碁如故對者求止籍不肯留決勝焉晉中興書曰王恬字敬豫與濟陽江霖俱善奕碁為中興第一又曰陶侃在荊州見佐吏博奕戲具投之於江曰圍碁者堯舜以教愚子博者商紂所造諸君並懷國器何以為此一本為牧猪奴戲晉起居注曰鎮東司馬顏延之坐圍碁免官沈約宋書曰羊玄保為黃門侍郎善奕碁碁品第三太祖亦好玄數蒙引見與太祖賭郡戲勝得補宣城太守又曰徐羡之沉密寡言不以憂喜見色頗工奕碁當世以此推之又曰謝弘微性無慍色末年與人圍碁西南有碁死勢有人曰南風急或覆舟人悟救之弘大怒投局於地識者知其莫年齊書曰能碁人琅耶王抗為第一品吳郡禇思莊會稽夏赤松第二品赤思速善於鬭碁宋文帝世羊玄保戲因製局圖還於帝前覆之太祖使思莊與王抗官賭自食時至日暮一局始竟上倦遣還省至五更方決抗睡於局後思莊達曉不寐世或以思莊品第致高緣其用思深久人不能對也又曰武帝好圍碁碁甚拙去格七八道物議共欺為第三品與第一品王抗圍碁依品賭戲抗每饒借之曰皇帝飛碁臣抗下能斷帝終不覺以為信然好之愈篤又曰武陵王曄少年時貧無碁局乃破荻為片縱橫以為碁局指點行勢遂至名品燕書曰羅騰字叔龍工圍碁究盡其妙獨步當時俄而右北平樂抄少攜出與齊焉後魏書曰甄琛舉秀才入都積歲頗以奕碁棄日至乃通夜不止有蒼頭者常令秉燭或時睡即大加其杖如此非一奴後不勝楚痛乃白琛曰郎君辭父母仕宦京師若為讀書執燭不敢暫非乃以圍碁日夜不息豈是向京之意而肆加杖罰不亦理乎琛惕然慚感遂從許赤虎假書研習聞見益優陳書曰梁武帝詔校定碁品到溉朱异已下並集陸瓊時年八歲於客覆局由是京師號曰神童唐書曰順宗朝罷翰林陰陽星卜醫相射覆碁奕諸待詔三十二人初王叔丈以碁待詔既用事惡其與己儕類相亂故罷之江表傳曰呂范討山越還白事於孫策從容獨與圍碁因論軍旅西京雜記曰杜夫子善奕碁為天下第一或譏其費日夫子曰精其理者足以大裨聖教又曰戚夫人侍兒賈佩蘭後出為扶風人假儒妻說在宮內時常以八月四日出雕房北戶竹下圍碁勝者終年有福負者終年疹病取絲縷就北辰祈求延命乃免述異記曰朱道珍常為孱陵令南陽劉廓為荊州參軍每與圍碁日夜相就局子略無暫輟道珍以宋元徽三年六月亡至九月廓坐齊中忽見一人以書授廓云朱孱陵書廓開書看是道珍手跡云每思碁聚非意致闊方有來緣想能近領廓讀書畢失信所在失其書信寢疾尋亡孟子曰奕秋通國之善奕者也使奕秋誨二人奕其一人專心致志惟奕秋之為聽一人雖聽之一心以為有鴻鵠將至思援弓繳而射之雖與之俱學弗若之矣抱朴子曰葛洪體鈍性駑所寡玩好見人博戲曾不目眄至今不知碁局幾道又曰善圍碁者世謂之碁聖故嚴子卿馬綏明有碁聖之名也淮南子曰行一碁不足以見智彈一弦不足以見悲尹文子曰以智力求者喻如奕碁進退取與攻劫放捨在我者也陳留志曰阮簡字茂弘為開封令縣有劫賊外白之甚數簡方圍碁長嘯吏云劫急簡曰局上劫亦甚急其高率如此揚子法言曰圍碁擊劍反目胲形亦皆自然也博物志曰堯造圍碁丹朱善之新語曰世言圍碁或言兵法之類上者張置踈遠多得道而勝中者務相遮絶爭便求利下者守邊隅趨作罫古買反線間方田也猶薛公之言黥布反也上計取吳楚廣地中計塞成皋遮要爭利下計據長江以臨越守邊隅趨作罫者也俗說曰羊玄保作吏部郎數被召見後有傳詔來始入門其兒靈孫年十許歲見傳詔語其父云兒知也正當圍碁耳語林曰王中郎以圍碁是坐隱亦以圍碁為手談又曰王武子與武帝圍碁孫皓在側武子問孫歸命何以好剝人面皮皓曰見無禮於君者則剝之乃舉碁局下故譏之又曰豫章太守顧劭是丞相雍之子在郡卒時雍方盛集僚屬圍碁外信至而無兒書雖神意不變而心料有故賓客既散方歎曰已無延州之遺纍寧有喪明之責耶於是豁情散哀顏色自若方言曰圍碁者自關東齊魯之間謂之奕班固奕指曰北方之人謂碁為奕弘而說之舉其大略義亦同矣局必方正象地則也道必正直體明德也其有黃黑陰陽分也駢羅列布效天文也四象既陳行之在人蓋王政也法則臧否為仁由己道之正也夢書曰夢圍碁者欲鬭也魏粲圍碁賦序曰清靈體道稽謨玄神圍碁是也魏應瑒奕勢曰蓋碁奕之制所由來尚矣駱驛雨集魚鱗鴈峙奮維闔翼固衛邊鄙寇動北疊備在南尾晉劉恢圍碁賦序曰司空從事中郎庾仲初性好圍碁終不達碁旨言文則觸類而至對局則冥然而窮何所解如彼之易所礙如此之難哉投壺禮記曰投壺之禮主人奉矢司射奉中使人執壺投壺射之類也主人請曰某有枉矢哨且礁切哨不正貌壺請樂賓賓曰子有旨酒嘉肴既受賜矣又重以樂敢辭主人曰枉矢哨壺不足辭也敢固以請賓曰某既賜矣又重以樂敢固辭主人曰枉矢哨壺不足辭也敢固以請賓曰某固辭不得命敢不敬從不得命不以命見許賓再拜受主人般還曰辟賓再拜受受矢也主人阼階上拜送賓般還曰辟拜送送矢也已拜受矢進即兩楹間退反位揖賓就筵司射進度壺間以二矢半反位設中東面執八算興設中亦賓也八算於中橫委其餘於中西執算而立以請賓俟投請賓曰順投為入比投不釋勝飲不勝者正爵既行請為勝者立馬一馬從二馬三馬既立請慶多馬請主人亦如之請猶告也順投矢本入也比投不捨也勝飲不勝言以能養不能也禮記曰壺頸修七寸腹修五寸口徑二寸半容㪷五升壺中實小豆焉為其矢之躍而出也壺去席二矢半矢以柘若棘毋去其皮取其堅且重也或言去其皮節也左傳曰晉侯以齊宴中行穆子相投壺晉侯先穆子曰有酒如濰有肉如坻寡君中此為諸侯師中之齊侯舉矢曰有酒如澠有肉如陵寡人中此與君代興東觀漢記曰祭遵薨范淑上疏曰遵為將軍取士皆用術對酒設樂必雅歌投壺魏略曰邯鄲淳字元淑作投壺賦千餘言奏之文帝以為工賜帛十匹又曰游楚好投壺自娛晉書曰石崇有妓善投壺隔屏風投之王弼別傳曰弼性和理樂遊宴解音律善投壺崔實傳曰投壺者皆以多算飲少算西京雜記曰武帝時郭舍人善投壺以竹為矢不用棘也古之投壺取中而不求還故實小豆惡其矢躍而出也郭舍人則激矢令還一矢百餘反語之為驍言如博之堅於輩中為驍傑每為武帝投壺輒賜金帛獻帝春秋曰袁紹聞魏郡兵反與黑山賊等數萬人共覆鄴城殺郡守坐中家在鄴者憂怖失色或起而啼泣紹觀督引滿投壺言笑容旨自若晉陽秋曰王胡之善於投壺言手熟閉目神異絶經曰東荒山中有大石室東王公居焉與一玉女投壺設有入不出者天為之笑張華曰天笑者開口流光藝經曰投壺法十二籌以象十二月之數投壺變曰謂之投壺者取名蓨他由切藪漸而轉易鑄金代焉逮之于後人事生矣壺底去一尺其下筍以龍玄玄月中蝦蟆隨其生死也橫日狗龍蛇之類運之以皫平表切蝦謂龍下皫螭也燕尾燕識候而歸人來去有恆投而歸人自數之極也矢十二數之極也長二尺八寸法於嘗矣古用柘棘古者投壺擊鼓而節帶劍十二入襝頰二帶謂之帶劍倚十八倚並左右如狼尾狀狼壺二十令矢圓轉西於壺口劍驕七十入帶劍還如後也三百六十籌得一馬言三百六十歲功成也馬謂之近黨同得勝也三馬成都魏粲碁賦曰夫注心鋭念自求諸身投壺是也晉傅玄投壺賦序曰投壺者所以矯懈而正心也晉李尤壺籌銘曰投壺籌禮揖敘先後通風月數分為王部
