body:
  text: 火部四庭燎説文曰庭燎火燭也禮曰庭燎之百由齊桓公始也僣天子也庭燎之差公蓋五十侯伯子男皆三十詩曰庭燎美宣王因以針也夜如何其夜未央庭燎之光君子至止鸞聲鏘鏘周禮曰閽人掌守王宮之中門之禁中門於內為中若今宮閽門大祭祀喪紀之事設門燎宮門廟門燎地燭也蹕止行者廟在中門之外凡賓客亦如之又曰凡邦之大事共墳庭燎故書墳為蕡鄭司農云蕡燭麻燭也玄謂墳大也樹於外門丹大燭於門內曰庭燎皆所以照衆為明中春以木鐸修火禁于國中為季春將出火也火禁謂水火之處及備風燥晉中興書曰哀帝興寧元年詔庭燎樹端門內晉起居注曰成帝咸和八年十二月有司奏庭燎在公車門外今更集議舊在端門內依舊門內施詔曰尚書奏九年庭燎當在端門內明帝時在公車門外可依舊安趙書曰石勒造燎高十丈上盤置燎下盤安人以燎絙繳上下石虎鄴中記曰石虎正會殿庭中端門外及閶闔門前設庭燎各二合六處皆六丈説苑曰齊桓公設庭燎為士之欲造見者期年而士不至東野鄙人有以九九之術見者桓公曰九九足以見乎對曰臣非以九九為足以見巨聞主君設庭燎以待士期年而不至夫士所以不至者以君天下賢君也四方之士皆自論不及君故不至也夫九九薄能耳而君猶禮之況賢於九九者乎桓公曰善禮之期月而士至煙説文曰煙火氣也焆焆然也漢書曰元帝時有童謠曰井水溢滅竈煙灌玉堂流金門謝承後漢書曰吳郡徐相為長沙太守常食乾飯不發煙沈約宋書曰桓玄使桓謙屯東陵口卞範之屯覆舟山西高祖躬先士卒以奔之東北風急因命縱火煙乃張天許邁別傳曰邁少名映高平閻慶等皆就映受學映曰閻君可服氣以斷穀彭君宜餌藥以益氣慶等將去映為燒香以五色煙出映亦自去莫知所在列仙傳曰寧封子黃帝時人也為帝陶正有神人遇之為其掌火能出五色煙三秦記曰秦始皇葬驪山牧羊童失火燒之三月煙不絶廣古今五行記曰前涼御史宋詡房壁中煙出掘而視之別柱燋然詡謂弟澄曰柱之為字左木右主宋字含木木燋宋破而主存此災之大者也宜思防之其後張雍誅宋混諸黨王子年拾遺記曰員嶠之山四百里有池周一千里色隨四時變中有神龜八足六眼背負七星日月八方之圖復有四燭時出爛石上望之煌煌如列星矣於冥昧當雨之時而光色彌明此石常浮於水邊方數百里其色多紅燒之有煙數百里升天則成香雲香雲遍潤則成香雨又曰晉文公焚林以求介推有白鴉繞繞而噪或集介子之側火不能焚晉人嘉之為立臺號曰思煙列子曰秦之西有義渠之國者其親戚死聚柴積而焚之煙上謂之登遐然後成為孝子抱朴子曰伯喈識絃音於煙燼之餘也淮南子曰冬至甲子受制木用事火煙青七十二日丙子受制火用事火煙赤七十二日戊子受制土用事火煙黃七十二日庚子受制金用事火煙白七十二日壬子受制水用事火煙黑西域諸國志曰屈茨國有山夜則有光火晝則恆煙焉風俗通曰亂如俗如縕者糞除不潔草芥集衆火就燒之謂之縕言其煙氣縕縕取其希有淆亂鍾會芻蕘論曰焚林成煙其似於雲顏延之廷詰曰火含煙而妨火桂懷囊而蠹殘桂然大勝滅蠹壯則桂折焦贛易林夫之小過曰十里望煙散煙日分形體滅亡終不見君炭説文曰炭燒木也記曰季秋草木黃落乃伐薪為炭左傳曰邾子在門臺門上有臺臨庭閽以瓶水沃庭邾子望見之怒閽曰夷射姑旋焉旋小便也命執之見其不潔執射姑也弗得滋怒自投于床廢于爐炭爛遂卒廢墮也又曰宋文公卒始厚葬用蜃炭燒蛤為炭以塞黃又曰宋元公惡寺人柳欲殺之及裘柳熾炭于位以溫地將至則去之使公坐其處比葬又有寵言元公好惡無常周禮曰宮人共王之沐浴沐浴所以自潔清凡寢中之事掃除執燭共爐炭又曰掌炭掌灰物炭物之徵令以時入之灰炭皆山澤之農所出也灰給浣練炭之所共多以權量受之以共邦之用凡炭灰之事又曰赤友氏掌除墻屋以蜃炭攻以灰灑毒之灑灑也除墻屋者除蟲豸藏逃其中者蜃大蛤也搗其炭以坌之則走淳之以灑之則死史記曰竇皇后弟少君為人所略賣為主人入山作炭墓臥岸崩百餘人皆壓死少君獨不死漢書曰先冬夏至懸鐵炭於衡各一端令適亭冬陽氣至炭仰而鐵低夏陰氣至炭低而鐵仰以候二至焉晉書曰王沉為豫州刺史下教求直言之士主簿禇䂮曰堯舜周公所以能致忠諫者以其帎誠之心著也冰炭不言而冷熱之質自明者以其有實也若好忠直如冰炭之自然則諤諤之臣將濟濟而盈庭逆耳之言不求而自至矣又曰孫登住宜陽山自作炭人見之知非常人與語登不應後魏書曰高聰卒有妓十餘人有子無子皆令燒指吞炭出家為尼邵氏家傳曰邵貞字德方山陰人性詳審赴張氏葬或落生炭於貞履中坐人謂貞不見疾呼貞因不為回顧神仙傳曰嚴青會稽人也於山中作炭忽有人與青一卷素書曰汝骨應得道長生故授神書也齊地記曰東南盧水水側有勝火木方人俗音曰挺木經野火燒之不死炭亦不滅東方有不灰之木豫章記曰豐城縣葛鄉有石炭二百頃可燃以炊爨交州記曰竈頭山越人炊爨之處掘而得炭淮南子曰譬猶冰炭鉤繩也何時而可合冰寒炭熱鉤繩曲直無時得今人曰懸羽與炭而知燥濕之氣燥故炭輕溫故炭重又曰夫濕之至也莫見其形而炭已重矣風之至也莫見其象而木已動矣又曰天下莫相憎於膠膝膠漆相持不解故曰憎一曰膠入漆中則敗漆入膠中亦敗膠以多少推之故曰相憎也而莫相愛於冰炭冰得炭則解解歸水復其性炭得冰則保其炭故曰相愛也膠膝相賊冰炭相息也抱朴子曰柳乃速朽者也而燔之為炭則億載而不敗呂氏春秋曰豫讓欲報襄子滅鬢去眉變其形容作乞人往乞於其妻曰然貌無似吾夫者其因何類吾夫之甚讓乃吞炭而變其聲異苑曰信安鄭徽年少時登前橋仿佯見一老翁以小囊與徽云此是君命慎勿零落若有破碎便為凶兆言訖失所在徽密開看是一挺炭意乃祕之雖家人不之知也永初三年年六十病篤語弟子云吾齒盡矣可試啓此囊見炭碎析於是遂亡桓談新論曰舉火夜作燃炭乾牆王況釋時論曰融融者皆趍熱之士得爐冶之門者唯挾炭之子鹽鐵論曰冰炭不可以同器語林曰洛下少林木炭止如粟狀羊琇驕豪乃搗小炭為屑以物和之作獸形後何召之徒共集乃以溫酒火熱既猛獸皆開口向人赫赫然諸豪相矜皆服而效之賈誼鵬鳥賦曰天地為爐兮造化為工陰陽為炭兮萬物為銅灰周禮曰蟈氏掌去蛙黽焚壯鞠以灰灑之則死壯鞠鞠不華者齊魯之間謂蛙為黽耿黽也蟈與耿黽尤怒鳴為聒人耳去之其煙被之則凡水蟲無聲杜子春云假令風從東方來則於水東面為煙令煙西行彼之水上又曰慌力見切帛以欄為灰渥淳諸帛實其澤器淫之以蜃渥讀如繒人渥管之渥以欄木之灰漸釋其帛也杜子春云淫當為泥書亦或為湛鄭司農云澤器謂澤之器謂澤之器蜃清其灰而盝力瀆切之而揮之清澄也於灰登而盝晞之晞而揮去其蜃史記曰秦商鞅作苛法有棄灰於道者刑之漢書曰韓安國坐抵罪獄吏田甲辱之安國曰死灰獨不復燃乎甲曰燃即溺之又曰武帝穿昆明池得黑灰有外國胡云此是天地劫灰之餘也問東方朔信然後漢書曰楊琰為零陵太守時蒼梧群賊攻劫琰制車數十乘置灰車中從風散灰賊不得視因以敗之魏略曰文欽為廬江太守為都督王陵所奏欽訴曹爽爽謂曰陵責卿載灰兩船何為乎聞足下起染舍故燒作灰耳吳録曰張舉字子清為句章令有婦殺夫者因焚屋言燒死其弟疑而訟之舉按尸開口視之無灰令人取豬兩頭殺一生而俱焚之開視其口所殺者無灰生者有灰乃明夫先死婦後燒之婦遂首服焉晉書曰鳩摩羅什天笁人也中書監張資病驍騎將軍呂光博營救療有外國道人羅又云能差資病光喜給賜甚厚羅什以其誑詐告資曰又不能為益徒煩費耳冥運雖隱可以事試也乃以五色絲作繩結之燒為灰末投水中灰若出水還成繩者病不可愈須臾灰聚浮出復為繩又療果無效少日資云少日猶無幾時隋書曰齊神武霸府田曹參軍信都芳深有巧思能以管候氣仰觀雲色嘗與人對語即指天曰孟春之氣至矣人往驗管而飛灰已應每月所候言皆無爽又為輪扇二十四埋地中以測二十四氣每一氣感則一扇自動他扇並住與管灰相應若符契焉又曰開皇九年平陳後高祖遣毛爽及蔡子元于普明等以候節氣依古於三重密室之內以木為案十有二具每取律呂之管隨十二辰位置于案上而以土埋之上平於地中實葭莩之灰以輕緹素覆律口每其月氣至與律冥符則灰飛衝素散灰出外而氣應有早晚灰飛有多少或初入月其氣即應或至中下旬間氣始應者或灰飛出三五夜而盡或終一月而上末高祖異之以問牛弘弘對曰灰飛半出為和氣吹灰全出為猛氣吹灰不能出為衰氣和氣應者其政平猛氣應者其臣縱衰氣應者其君暴高祖駮之曰臣縱君暴其政不平非月別而有異也今十二月律於一歲內應並不同安得暴君縱臣若斯之甚也弘不能對莊子曰鄭有巫曰季咸知人之死生存亡禍福壽夭期以歲月旬日若神鄭人見之皆棄而走不喜自聞死日列子見之而心醉歸以告壺子曰嘗試與來以吾示之明日列子與之見壺子出而咸謂列子曰嘻子之先生死矣不活矣不可以旬數矣吾見怪焉見濕灰焉濕灰均其寂魄化此乃至人無感之時也又曰南郭子綦隱几而坐仰天而噓嗒焉似喪其偶答焉解體若失其配匹也顏子成遊立侍乎前曰何居乎形固可使如稿木而心固可使如死灰乎死灰稿木取其寂寞無情耳夫任自然而志是非者其體中獨任天真而已又何所有哉淮南子曰月暈以蘆灰環之缺一面則暈亦闕一面焉又曰爛灰生繩又曰仲夏之日無燒灰草木盡成無暴布無爛之也又曰夫吹灰而欲無昧涉水而欲無濡不可得也又曰女媧殺黑龍以濟冀州黑龍為冀州害積盧灰以止淫水盧黑也一曰葦灰也又曰伐薪而為炭燔草而為灰抱朴子曰吳世姚光者有火術吳主試之積荻數千束里之因猛火而燔荻了盡謂光當已化為煙燼而光端坐灰中振衣而起把一卷書吳主取其書視之不能解也又曰外國作水精碗實是合五百種灰以作之今交廣多有其法六韜曰武王伐殷得二大夫而問之殷國將亡亦有妭乎其一人對曰殷國常雨血雨灰血石武王曰大災妖也其一人曰是非大妖也殷國大妖三十七章雨血雨灰血石臣不為妖災武王踧然而問三十七章之妖對曰殷君好射人喜以人餧虎喜割人心喜殺婦喜殺人父孤人之子吳越春秋曰吳王欲殺王子慶忌而莫之能要離謂吳王曰臣請殺之乃偽加罪焉執其妻焚而愓其灰述異記曰蜀郡成都張伯兒年十餘歲作道士通靈有逆鑒時飲醇灰汁數升云以洗腸療疾從征記曰自燃灰狀如黃灰生海濱投水中浣衣不須淋水太玄經曰冷竹為管窒灰為候以揆百度虞翻注曰以冷空竹為管也窒塞也物理論曰宜陽縣金門山竹為律管河內葭莩以為灰可以候氣焉春秋感精符曰畫遺灰則月暈
