body:
  text: 藥部一藥歸藏經曰昔常娥以不死之藥奔月易曰無妄之疾勿藥有喜象曰無妄之藥不可試也書曰若藥弗瞑眩厥疾弗瘳周禮曰醫師掌藂藥供醫事疾醫以五藥養病凡藥以酸養骨以辛養筯以鹹養脈以苦養氣以甘養肉以滑養竅鄭玄注曰毒藥之辛苦者也五藥草木蟲石穀禮記曰君有疾飲藥臣先嘗之親有疾飲藥子先嘗之嘗者度所堪也醫不三世不服其藥又曰季春餧獸之藥無出九門為鳥獸方孚乳傷之為逆天時天子九門者路門應門雉門畢門庫門皋門國門近郊門遠郊門孟夏之月藂蓄百藥蕃蕪之時毒氣盛也左傳曰臧孫曰季孫之愛我也疾疹也孟孫之惡我也藥石也常志相違戾猶藥石之療疾也美疹不如惡石孟孫死吾亡無日矣又曰許悼公疾飲太子止之藥卒太子奔晉書曰殺其君君子曰盡心力以事君舍藥物可也藥物有毒當由醫非凡人所知譏止不舍藥物所以加殺君之名論語曰康子饋藥拜而受之曰丘未達不敢嘗饋遺史記曰長桑君與扁鵲藥服之三十日見人五藏漢書曰灌夫擊吳身中大創十餘適有萬金良藥故得不死又曰王嘉為丞相數上封事言不宜封董賢上怒有詔假謁者節召丞相詣廷尉詔獄使者既到府掾史涕泣共和藥進嘉嘉引藥盃以擊地謂官屬曰丞相幸得備位三公奉職有罪當伏刑都市以示萬眾丞相豈兒女耶何為咀藥而死東觀漢記曰上嘗與朱祐共買蜜合藥上追念之即賜祐白蜜一石問何如長安時共買蜜乎又曰鄧訓為護烏桓校尉吏士常大病瘧轉易至數十人訓身煮湯藥咸得平愈其無妻者為適配偶又曰王閎者王莽叔父平阿侯譚子也王莽篡位潛忌閎乃出為東郡太守閎懼誅常繫藥手內莽敗漢兵起閎獨完全華嶠後漢書曰張楷字公超家貧無以為業常乘驢車至縣賣藥九州春秋曰青州刺史焦和多作陷水丸沉河望寇不得渡吳書曰合肥之役凌統身被六七瘡有卓氏良藥故得不死魏志曰太祖性嚴掾屬公事往往杖之何夔常畜毒藥誓死無辱是以終不見及晉書曰餘杭隱士郭文字文舉王導聞召之永昌中大疫父病亦殆導遺藥文曰命在天不在藥也王隱晉書曰李涓為尚書令家至貧兒病無錢買藥上賜錢十萬李涓一作李鳳又曰程咸字延休其母夢白頭公授藥曰服此當得貴子後生咸至侍中又曰符生常使太醫令程延合安胎藥問人參好惡并藥分多少延曰雖小小不具自可堪用生以為譏己遂斬之又曰陸抗與羊祜推喬扎之好抗嘗遺酒祜飲之不疑抗有疾祜饋之藥杭亦推心服之宋書曰高祖微時伐狄新洲見大虵長數丈射傷之明日洲中聞杵臼聲往視之見童子數人皆青衣於榛中禱藥問其故荅曰我王為劉寄奴所射合藥傳之帝曰神何不殺之童子曰寄奴王者不死不可殺帝叱之皆散仍收藥而反又客經下邳逆旅會一沙門謂帝曰江表當亂能安之者其在君乎帝先患手瘡經年不愈沙門有黃藥因留與帝既而忽亡帝以黃散傅瘡一傅而愈寶其餘及所得童子藥每遇金瘡傅之並愈齊書曰隨郡王子隆年二十一而體過充壯常使徐嗣伯合蘆茹丸服以自銷損又曰豫章王嶷薨後見形於沈文季曰我未應死皇太子加膏中十一種藥使我癰不差湯中復加藥一種使利不斷吾已訴先帝先帝許還東邸當判此事因胸中出青紙文書示文季曰與卿少舊因卿呈主上俄失所在文季祕而不傳甚懼此事少時太子薨矣魏書曰邢巒為侍郎甚見親遇高祖因行藥園至司空府南見巒宅遣使謂巒曰朝行藥園至此見卿第宅乃佳東望德館情有依然又曰天竺烏長國婆羅門為上族解天文人有爭訟服之藥曲者發狂直者無恙隋書曰隋大舉伐陳王頒力戰被傷恐不堪復斗悲感嗚咽夜中睡夢有人授藥比寤而瘡不痛時人以為忠感又曰楊素寢疾帝每令醫診候賜以上藥然蜜問醫人恒恐不死素又自知名位已極不肯服藥亦不將慎每語弟約曰我豈須臾活耶唐書曰太宗幸襄城宮登子邏坂見暍者僵於路駐馬命左右取藥飲之乃蘇又曰天竺方士郍羅邇婆娑寐自言壽二百歲云有長生之術太宗信之深加禮敬館之金飆門內造延年之藥令崔敦禮監主之發使天下採諸奇藥異石不可稱數後竟不就又曰元和中山人柳泌言靈藥可得上信之乃以為台州刺史賜紫令採靈藥又曰柳公綽有道士獻藥試之有驗問所從來曰合此藥於薊門時朱克融方叛公綽遽謂曰惜哉至藥來於賊臣之境雖驗何益乃沉之于江而逐道士莊子曰宋人有善為不龜手之藥者龜手裂若龜文世世以洴音萍澼音僻絖音曠為事洴澼漂也絖絮也冬漂絮則手拘能為藥以自治客聞之請買其方百金以說吳王說可以戰吳王使之將冬與越人水戰大敗越人列地而封之能不龜手一也或以封或不免於洴澼絖則所用之異也唐子曰仙人韓終即韓馮之兄為宋王採藥王不肯服之終因服之遂得仙淮南子曰羿請不死之藥於西王母姮娥竊而奔月姮娥羿妻也羿從西母請不死之藥於西王母未及服之姮娥盜服得仙奔入月中為月精又曰今夫地黃主屬骨而甘草食肉之藥也以其屬骨而責其生肉以其生肉而責其屬骨是王孫綽之欲倍偏枯之藥而欲以生殊死之人亦謂失論矣王孫綽魯人也又曰崑崙墟旁有九井玉橫維其西北之隅橫猶光也橫或作彭盛不死藥器也四水者帝之神泉以和百藥以潤萬民抱朴子曰神農經曰上藥令人身安命延昇天神仙遨遊上下役使萬靈體生毛羽行廚立至又曰五芝及餌丹砂玉札曾青雄黃雲母太一禹餘糧各可單服之皆令人飛行長生又曰中藥養性不藥除病能令毒蟲不加猛獸不死惡氣不行眾祅辟屏孝經援神契曰椒薑禦濕菖蒲益聰巨勝延年威喜辟兵此皆上聖之至言方術之實錄也孝經援神契注引抱朴子曰仙藥之上者丹砂次則黃金次則白銀次則諸芝次則五玉次則雲母次則明珠次則太一禹餘糧次則石中黃子次則石桂英次則石腦次則石流丹次則石飴次則曾青次則松鬆柏脂茯苓地黃麥門冬木巨勝重樓黃連石韋檸石象柴一名托盧是也或名仙人杖或名西王母杖或名天精或名卻老或名地骨或名枸也戰國策曰有獻不死之藥於荊王者謁者操以入中射之士問曰可食乎曰可因奪而食之王怒使人殺中射之士士曰臣問謁者謁者曰可食臣故食之是臣無罪罪在謁者也且客獻不死之藥臣食之而王殺臣是死藥也王乃殺無罪之臣而明人之欺王王乃不殺說苑曰湯曰藥食先嘗於卑然後至於貴藥食嘗乎卑然後至乎貴教也藥言獻於貴然後聞於卑道也又曰孔子曰良藥苦於口利於病忠言逆於耳利於行呂氏春秋曰魯有公孫綽者告人曰我能治偏枯今吾倍為偏枯之藥則可以起死人矣物固有以為小不可以為大可以為半而不可以為全者矣又曰良醫醫病病萬變藥亦萬變病變而藥不變嚮之壽民今為殤子矣又曰若用藥者得良藥則活人得惡藥則殺人義兵之為天下良藥也亦大矣論衡曰大王亶父睹王季之可立故易名曰歷歷者適也大伯覺悟採藥以避王季山海經曰大荒之中有黃木赤枝青葉群帝取藥言樹花實皆為藥也又曰大荒中有山名豐阻玉門日月所入有靈山巫咸巫昉巫即巫盼巫彭巫姑巫真巫祀巫謝巫羅十巫從此升降百藥爰在酈善長注水經曰茷山甚喦峻重疊灌柏齊陰攢柯翠峙泉石轉深蓋仙居之宿所是以世人目巖為擣藥巖名此水為擣藥水漢武內傳曰王母謂武帝曰太上之藥乃有玄光黎角風實雲子帝園王族昌城王蘂夜河天骨崆峒靈瓜四劫一實寘陵驎膽仰掇扶桑之丹椹俯採長河之文藻紫虬童子九色鳳腦太真虹芝天漢臣草南宮大碧西卿扶老三梁龍華生子大道有得食之後天而老此太上之所服非中山之所寶也又曰武帝崩遺詔以雜道書四十卷置棺中到延康二年河東工曹李及入上黨抱犢山採藥於巖室中得此書盛以金箱其書後題臣姓名記日月是武帝時物也河東太守張純以箱及書奏宣帝宣帝示武帝時左右侍臣有典書中郎見書流涕曰此是帝崩時殯殮物也東方朔別傳曰孝武皇帝好方士敬鬼神使人求神僊不死之藥甚至初無所得天下方士四面蜂至不可勝言東方朔睹方士虛語以求尊顯即云上天欲以喻之其辭曰陛下所使取神藥者皆天地之間藥也不能使人不死獨天上藥能使人不死耳上曰然天何可上也朔對曰臣能上天上知其謾託陁後二音欲極其語即使朔上天取不死之藥朔既辭去出殿門復還曰今臣上天似謾詫者願得一人為信驗上即遣方士與朔俱往期三十日而反朔等既辭而行日日過諸侯傳飲往往留十餘日期又且盡無上天意方士謂之曰期且盡日日飲酒為奈何朔曰鬼神之事難豫言當有神來迎我者於是方士晝臥良久朔遽覺之曰呼君極久不應我今者屬從天上來方士大驚還具以聞上上以為面欺詔下朔獄朔啼對曰朔須幾死者再上曰何也朔對曰天公問臣下方人何衣臣朔曰衣蟲蟲何若臣朔曰蟲喙髯髯類馬邠邠類虎天公大怒以臣為謾言繫臣使下問還報有之名蠶天公乃出臣今陛下茍以臣為詐願使人上問之天上大驚曰善齊人多詐欲以喻我止方士也罷諸方士弗復用也由此朔日以親近列僊傳曰樂子長者齊人也少好道真到霍林山遭僊人受服巨勝赤松散方僊人告之曰虵服此藥化為龍人服此藥老翁成童能昇雲上下改易形容崇氣益精起死養生子能服之可以度世子長服之年百八十色如少女妻子九人皆服此藥老者還少少者不復老又曰燕王遣韓終採藥王先使韓終服之面如金色又曰安期生賣藥海邊時人以為千歲公又曰瑕丘仲賣藥於甯後地動舍壞仲死人取屍棄水收其藥賣之仲被裘誚之後為夫余使者又曰崔文子太山人賣藥都市後有疫死者萬計文子擁朱幡持黃散循問民服其散愈者萬計後在蜀賣黃散赤丸世故寶之又曰負局先生者語似燕代間人也負磨鏡局循吳帝市中磨一鏡一錢因磨輒問主得無人疾苦者有輒出紫丸藥以與之得莫不愈後上吳山絕崖頭世世懸藥與下人曰吾欲還蓬萊山與汝曹神水崖頭一旦有水白色從石間來下服之病多愈高士傳曰韓康字伯休京兆霸陵人採藥名山賣於長安市口不二價三十餘年時有女子從康買藥康價不移女子怒曰公是韓伯休郍乃不二價也康歎曰我本避名今女子皆知有我何用藥為乃遯入霸陵山中魯女生別傳曰封君達隴西人也少好道初服黃連丸五十餘年乃入鳥鼠山又於山中服水銀百餘年還鄉里年如二十者常乘青牛故號為青牛道士桂陽先賢畫讚曰蘇耽嘗除門庭有眾賓來耽告母曰人招耽去已種藥著後園梅樹下可治百病一葉愈一人賣此藥過足供養便隨賓去母走牽之四體如醉足不能舉邴原別傳曰魏太子為五官中郎將原為長史太子讌會眾賓百數十人太子建議曰君父各有篤疾有藥一丸可救一人當救君耶父耶眾人紛然或君或父時原在坐不與此論太子諮之於原原悖然對曰父太子亦不復難曹毗杜蘭香傳曰神女蘭香降張碩碩問壽如何香曰消磨自可愈疾淫祀無益香以藥消磨王子年拾遺錄曰燕昭王坐祇明之室晝而假寐忽夢西方有白雲蓊蔚而起俄而闇於庭間有人衣服皆毛羽駕蒼螭之車從雲中而出直詣王所王夢中與語問以上僊之術羽人曰大王精智未開欲求恒生不可得也王請受絕慾之教羽人指畫王心應手而裂王乃驚悟因患心疾久之乃昇於泉照之館復見前所夢人於前曰本欲易王之心乃出方寸綠囊囊中有續脈名丸哺四精散其細若灰以手摩王之臆俄而既愈王因請其方曰其用物也有九明神芝煎以蒼鷹之血黑河鱗膽煮以琨璵之脂貯以玉缶緘以金繩封以玉印王得服之後天而死若溺於淫嗜於欲求者祇苦心焉語畢化為青鳧入天際王求合藥終不能成黑河北極也其水濃黑不流上有濃雲生焉有黑鯤千尺如鯨常飛遊於南海博物志曰夫性之所以和病之所以愈是當其藥應其病則生違其藥失其應則死本草經曰太一子曰凡藥上者養命中藥養性下藥養病神農乃作赭鞭鉤𨨪尺制切從六陰陽與太一升五岳四瀆土地所生草石骨肉心皮毛羽萬千類皆鞭問之得其所能主治當其五味百七十餘毒異苑曰魏武北征蹋頓升嶺眺矚見一崗不生百草王粲曰如是古冢此人在世服生礜石死而石上熱蒸出外故卉木燋滅即令鑿之果得大墓有礜石滿塋仲宣博識強記皆類此也一說粲在荊州從劉表登鄣山見此異任昉述異記曰漢世古諺云雖有神藥不如少年雖有珠玉不如金錢太原神釜崗中有神農嘗藥之鼎在焉成陽山中有神農鞭藥處一名神農原一名藥草山山中有紫陽觀世傳神農於此辨百藥也養生略要曰神農經曰五味養精神強魂魄五石養髓肌肉肥澤諸藥其味酸者補肝養心除腎病其味苦者補心養痺除肝病其味甘者補脾養肺除心病其味辛者補肺飬腎除脾病其味鹹者補腎飬肺除肝病故五味應五行四應四時夫人性生於四時然後命於五行以一補身不死命神以母養子長生延年以子守母除病究年嶺表錄異曰廣之屬郡及鄉里之間多蓄蠱彼之人悉能驗之以草藥治之十得其七八藥則金釵服形如石斛古漏子女票恨食之即吐人肝藤濃汁煎喫陳家白藥子一名吉利本梧州陳氏有此藥善解蟲每有中者即求之前後救人多矣遂以為名今封康州有得其種者廣府每歲常為土貢焉諸解毒藥功力皆不及陳家白藥王彪之閩中賦曰藥草則青珠黃連拳柏決明蓯蓉鹿茸漏蘆松榮痊痾則年永練質則翰生謝靈運山居賦曰本草所載山澤不一雷桐是別和緩是悉三枝六根五華九實樂府歌詩曰仙人騎白鹿髮短耳何長道我奉上藥覽之獲無疆來到主人門奉藥一玉箱主人服此藥身體日康強髮白復還黑延年壽命長魏文帝詩曰西山何如高高高殊無極上有兩仙童不飲亦不食與我一丸藥光耀有五色服藥四五日身體生羽翼應劭表曰臣劭言郡舊因計吏獻藥闕而不修慚悸交集無辭自文今道少通謹遣五官孫艾貢茯苓十斤紫芝六枝鹿茸五斤五味一升計吏發行輒復表貢
