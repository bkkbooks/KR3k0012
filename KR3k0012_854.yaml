body:
  text: 飲食部十一𩜌方言曰腕謂之餚以豆屑雜𩛿也蒼頡解詁曰𩜌飴中著豆屑也說文曰𩜌豆飴也饊廣雅曰浮𥹷也𥹷音流說文曰饊熬稻張饘也急就篇曰饊飴𩛿盧諶祭法曰四時皆用饊麴蘗書曰若作酒醴爾惟麴蘗記曰仲冬之月乃命有司秫稻必齊麴蘗必時左傳曰楚子伐簫還無社與司馬卯言虢申叔展還無社蕭人也司馬卯申叔展皆楚大夫叔展曰有麥麴乎曰無麥麴所以御濕也有山芎藭乎曰無方言曰𪍠音器䴭音才䴳千八切麰音牟大夌麴也䴽音脾細麵麴也䵆音蒙有衣麴䴹麴小麥為麴䴹即麴耳自關而西秦豳之間曰𪍠晉之舊都曰䴭今河東人呼麴為才齊右河濟曰䴳北燕曰䴹麴其通語也說文曰麴酒母也䤓生衣也䤁熟麴也蘗牙米也通俗文曰麥麴曰音壺音故版切釋名曰麴朽也鬱之使生衣朽敗也蘗缺也漬麥覆之使生牙關缺也史記曰文帝遺匈奴秫蘗又曰通邑大都蘗麴鹽豉千荅也東觀漢記曰順帝詔禁民無得酤賣酒麴漢晉陽春秋曰愍帝在長安為劉粲所攻糧盡太倉有麴數十餅屑之為粥以供奉帝麴屑盡遂降列子曰子產有兄公孫朝聚酒千鍾積麴成封劉伶酒德頌曰枕麴藉糟崔寔四民月令曰七月七日作麴麩蒼頡解詁曰麵細麩也說文曰麩小麥皮屑也史記曰陳平為人長大美色或謂陳平貧何食而肥若是其嫂疾平之不視家產曰亦食糠覈孟康曰麥糠中之不破者晉灼曰京師謂鹿屑為紇頭吳書曰袁術既為雷薄等所距留住三日士眾絕糧乃還至江亭去壽春八十里問廚下尚有麥屑三十斛劉謙之晉記曰王莽誅童謠曰昔年食麥屑今年食䝁豆䝁豆不可食使我枯嚨喉崔寔四民月令曰五月五日至後可糴麩至冬以養馬
