body:
  text: 獸部十五豕爾雅曰豕豬江東呼為狶䝐豶䝐羊箠反俗呼小獖豬為䝐子也么幼最後生者俗呼為么豚奏者豱音溫今貙豬矩頭皮理腠蹙也豕生三豵音宗二師一特所寢橧疾陵切四蹢皆白豥音該其迹絶有力豟音厄豕高五尺者牝豝彘五尺為豟大豕為豟今漁陽呼豬大者為豟也説文曰豰許卜切小肫也豯肫生三月豵子公切豚生六月也或曰一歲曰豵豝牝豕豶𧱅也豜公妍切三歲豕豭壯豕也䝐豶也豛音役大谷名豬曰豛豷於麗切豕息也豢以穀圈養豕也何承天纂文曰梁州以豕為䝕之涉切河南謂之彘吳楚謂之豨火豈切漁陽以大豬為豝齊徐以小豬為䝒化主切𧱻音覔白豕黑頭也豱豕奏毛也方言曰豬燕朝鮮之間謂之猳關東謂之彘或謂之豕南楚謂之狶其子或謂之豚或謂之𤠓音奚吳楊之間謂之豬子春秋説題辭曰斗星時散精為彘四月生應天理崔豹古今注曰豬一名喙一名參軍易説卦曰坎為豕又睽卦曰上九睽孤見豕負塗載鬼一車又大畜曰六五豶豕之牙吉又姤卦曰初六繫于金柅貞吉有攸往見凶嬴豕孕蹄躅禮記曲禮下曰凡祭豕曰剛鬣豚曰腯肥又曰士無故不殺犬豕又月令曰孟夏農乃登麥天子以彘嘗麥又王制曰秋薦黍以豚又禮器曰晏平仲祭其先人豚肩不掩豆又內則曰豕望視而交睫腥望視遠視也腥當為星星肉如米者論語曰陽貨欲見孔子孔子不見饋孔子豚詩國風騶虞曰彼茁者葭一發五豝豕牝曰豝又曰彼茁者蓬一發五豵一歲曰豵箋云豕三歲曰豵又魚藻嶄嶄之石曰有豕白蹢蒸涉波矣左傳莊八年曰齊無知弒其君十二月齊侯遊于姑棼遂田於貝丘見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼墜于車傷足喪屨反誅屨於徒人費弗得鞭之見血走出遇賊于門劫而束之費曰我奚御哉袒而示之背信之費請先入伏公而出鬭死于門中石之紛如死于階下遂入殺孟陽于床曰非君也不類見公之足于戶下遂殺之而立無知又昭七曰昔有仍氏生女樂正居夔取之生伯封實有豕心貪婪無饜謂之封豕又曰衛靈公夫人南子與宋朝通衛太子使齊過宋宋野人以婁豬刺而歌之云既定爾婁豬盍歸吾艾猳史記曰子路性鄙好勇伉直冠雄雞佩豭豚漢書曰公孫弘災川人少時為獄吏有罪免家貧牧豕海上又曰郅都景帝將為郎嘗從入上林賈姬在廁野彘入廁上目召都都不行上欲自持兵救賈姬都諫之乃止彘亦不傷賈姬又曰燕剌王旦將作亂廁中群豕出壞太官竈東觀漢記曰承宮字少子琅邪人少孤年八歲人令牧豕鄉里徐子盛明春秋經授諸生數百人宮過其廬下見諸生講誦好之因棄豬而聽經豬主怪不還行索見宮欲笞門下生共禁止因留精舍門下拾薪執苦數年遂通經又曰朱浮與彭寵書責之曰伯通自伐以功為高天下往時遼東有豕生子白頭異而獻之行至河東見群豕皆白懷慚而還若以子功論於朝廷則為遼東豕也續漢書曰曹萌字元偉以仁厚稱鄰人有亡豕者與萌豕相類詣門認之萌不與爭後所亡豕自還其主大慚送所認豕辭謝萌萌笑而受之袁山松漢紀曰吳祐放豬於長垣澤中誦經而行遇父故人謂之曰子二千石子掉鞭而誦經行吟於澤畔縱子無恥奈君父何祐守志如初與北海公沙穆遊大學資乏變服為傭祐賃使舂遂為死交於杵臼之間張璠漢紀曰莎車王殺于置王于置大人都末出城見野豕欲射之豕乃語曰無殺我我為汝殺莎車將軍都末異之即與先共殺莎車王謝承後漢書曰朱穆字文元嘗養豬豬有疾使人賣之於市語之曰如售當自告買者言病也賣豬者售不言病且直過多穆怪其故齎半直以還買豬者辭不取穆棄錢而去魏志曰挹婁國在夫餘東常穴居土寒氣劇於夫餘其俗好養豬食其肉衣其皮冬以豬膏塗身又曰管輅嘗至郭恩家碓上鳩鬭謂恩曰當有老人將肫一口從東候公舍有小口傷亦無所苦明日果有親知老翁攜肫饋恩恩射鳩為饌箭著小女子腳舉家惶怖竟無所害又有人失婦使輅卜之輅曰君明日於路見簷豬者乃逐之行次豬忽繩斷走入他舍突破主人甕見其婦出豬遂擒之晉書曰阮咸至宗人間共集不用杯觴斟酌以大甕盛酒團坐相向大酌更飲時有群豕來飲其酒咸直接去其上便共飲之又曰愍懷太子嘗從帝觀豕牢言於帝曰豕甚肥何不殺以享士而使久費五穀帝嘉其意即使亨之因撫其背謂廷尉傳祗曰此兒當興我家又曰韓友字景先廬江舒人也龍舒長鄧林父病積年垂死友為筮使畫作野豬著臥處屏風上因是遂差又曰呂光死其子纂立有豬生子一身三頭又有龍出井中蟠於殿前纂以為美瑞羅什獨以為災俄而呂超殺纂又曰劉聰時豕著進賢冠升聰殿與犬鬭北史曰陸逞纍除京兆尹郡界有豕生數子經旬而死其家又有豶豕遂乳養之諸豚賴之以活時以逞仁政所致皇甫謐高士傳曰孫期字仲彧濟陰人與諸生講京氏易古文尚書家貧事母至孝牧豕於大澤中以奉養焉遠人從其學者皆執經壟畔以追之里落化其仁讓黃巾賊起過期里陌相約不能犯孫先生舍郡舉方正遣吏齎羊酒請期期驅豕入草不顧也三輔決録曰五門子孫凡民之伍馬氏兄弟五人共居此地作客舍養豬賣豚故謂之曰苑中三公巨下二卿五門嚄嚄但聞豚聲董正別傳曰司馬徽字德操時人呼為水鏡嘗有人妄認徽豬徽便推與之後數日亡豬者以豬還徽乃叩頭謝自責徽又厚謝華陽國志曰何隨字季業清廉退讓嘗有屠者牽豬過隨門索斷失之強認隨溷中豬隨牽與之屠人尋自得亡者還隨隨以與之越絶書曰雞山豕山者勾踐以畜雞豕將伐吳以食死士也墨子曰孔子窮於陳蔡之間藜蒸不糂桑感切子路烹豕孔子不問肉所從來而食之符子曰朔人獻燕昭王以大豕曰養奚若使曰豕也非大圊不居非人便不珍今年百二十矣人謂豕仙王乃命豕宰養六十五年大如沙墳足如不勝其體王異之令衡官橋而量之折十橋豕不量又命水官舟而量其重千鈞其巨無用燕相謂王曰奚不饗之王乃命宰夫膳之夕見夢於燕相曰造化勞我以豕形食我以人穢吾患其生久矣仗君之靈得化吾生始得為魯津之伯燕相遊乎魯津有赤龜奉璧而獻一云夜光珠孝經援神契曰彘水伏故去脈淮南子曰六九五十四四主時時主豕故豕四月而生又曰黃帝理天下狗彘吐菽粟於路無忿爭之人山海經貓大者肉重千萬斤豪豬如豚而白毛毛大如笄而黑端郭璞注曰貓豬也夾脾而有粗豪長數尺能以頸上毫射物博物志曰商丘子有養豬法卜式有養豬羊法祖台之志怪曰吳中有一士大夫於都假還至曲阿塘上見一女子甚美留其宿士解臂金鈐繫女臂令暮更來遂不至使人求都無此色過豬圈見一母豬臂上繫金鈐養生要集曰白豕白蹄青爪不可食也異物志曰鬱林大豬一蹄有四五甲多膏賣者以鐵錐剌其頭入七八寸得赤肉乃動習鑿齒襄陽耆舊傳曰木蘭橋者今之豬欄橋是也山海經圖豪彘讚曰剛鬣之族號曰豪豨毛如攢錐中有激矢宋袁淑大蘭王九錫文曰太亥十年九月乙亥朔十三日丁亥北燕伯使使者豪豨册命大蘭王曰咨惟君稟太陰之沉精摽群形於玄質體肥腯而洪茂長無心以遊逸資豢養於人主雖無爵而有秩此君之純也君昔封國殷商號曰豕氏葉隆當時名垂于此此君之美也白蹢彰於周詩涉波應乎隆象歌詠垂於人口經千載而流響此君之德也君相與野遊唯君為雄顧群數百自西徂東俯噴沫則成霧仰奮鬣則生風猛毒必噬有敵必攻長驅直突陳無全鋒此君之勇也
