body:
  text: 木部十交讓大魏諸州記曰益州汶山郡平康縣界東北接牂牁有都安縣有交讓樹兩兩相對歲更半枯半生不俱盛左思蜀都賦曰交讓所植建木山海經曰有木若牛引之有皮若纓黃蛇其實若欒其木若區名曰建木在弱水上青葉紫莖玄華赤實百仞無枝上有九欘涉玉切下有九衢黃帝所為欘曲也為治護之也淮南子曰建木在廣都衆帝所自上下日中無影呼而無響蓋天之中廣都方都南山也若木山海經曰灰野之山有樹青葉名曰若木郭璞注曰生崑崙西隅其華光赤照下地也楚詞曰羲和之未陽若華何光羲和日卿也言日未陽升之時若木能有赤明之光華又曰折若木以拂日姑繇穆天子傳曰天子釣于河以觀姑繇之木丹木山海經曰崦嵫山有丹木葉如穀其實大如瓜赤跗而黑理食之已疸可以禦火又曰密山上多丹木圓葉而赤莖黃華而赤實如飴食之不飢玉膏灌丹木丹木五歲五色乃清言光明也五味乃馨蓂靈列子曰荊之南有蓂靈者以五百歲為春以八千歲為秋椿左傳襄公十八年諸侯伐齊孟莊子斬雍門之椿或作橁為公琴莊子曰上古有大椿以八千歲為春秋曹毗魏都賦曰柳柏振露緑椿停霜迷穀山海經曰招搖之山有木焉其狀如穀而黑理其花四照其名迷穀佩之不迷帝休山海經曰少室之山有木名帝休其枝葉大如楊而五衢黃華黑實服之不恐雒常山海經曰肅慎之國有樹名雒常聖人代立於此取衣郭璞曰其俗無衣聖帝代立則此木皮可衣也返魂十洲記曰藂窟洲在西海中申未地上有大樹與楓木相似而華葉香聞數百里名為返魂樹叩其樹樹亦能自聲聲如牛吼聞之者皆心振神駭伐其根心於玉釜中煮取汁微火熟煎之令可丸名曰驚精香或名震靈丸或名反生香或名人鳥精或名卻死香斯靈物也香氣聞數百里死尸在地聞氣仍活如何神異經曰南方荒中如何之樹三百歲作華九百歲作實有核形如棗子長五尺金刀割之則飴非則辛食之得地仙顧凱之啓蒙記曰如何隨刀而改味仙樹西河舊事曰連山有仙樹人行山中飢渴者輒得之可飽不得持去平居時亦不得見棆爾雅曰棆無疵也郭璞曰楩屬似豫章也機山海經曰單狐之山其木多機郭璞曰音飢也木鹿荊州土地記曰武陵城內社中木鹿樹及南岸二木鹿樹光武所種椵說文曰椵木可作伏機椋爾雅曰椋即來掠有髓熊折而乳之又曰今掠材中車輞橝廣志曰橝樹葉似蘇繫彌毛詩義疏曰繫迷一名契似檀廣志曰繫迷樹子赤如糯粟可食枕梁異物志曰有木洪直厥名枕梁乙木徐衷南方記曰乙樹葉檮之和繻葉汁煮之再沸味辛曝乾可投魚羹中求郍衛羅浮山記曰求郍衛外國樹英華紅粉至可愛玩男青羅浮山記曰男青條蘂之屬莫不朱色尤易植立折插土中因便開榮尋木山海經曰尋木長十里生河邊玉樹山海經曰開明北有丈玉樹五彩括地圖曰崑崙墟北有玉樹世說曰謝安嘗謂子姪曰汝等何豫人事諸子莫言玄答曰譬如芝蘭玉樹欲生庭階耳唐書曰雲陽縣界多漢離宮故地有似槐而葉細士人謂之玉樹揚子雲甘泉賦云玉樹青蔥後左思以雄為假稱珍怪也踈麻南越志曰踈麻大二圍高數丈四時結實無衰落騷人所謂折踈麻兮瑤華樠山海經曰樠樹生蜀中七八月吐穗成有鹽梅粉可以酢羹琅玕山海經曰崑崙山有琅玕樹盧頭南越志曰南海江岸間有盧頭木葉如甘蔗織以為帆以其踈暢懷風故帆不以布櫰山海經曰中曲山有櫰音瓌木如棠而圓葉赤實如木瓜食之多力桬棠山海經曰桬棠木出崑崙山黃色赤實味如李食之使不溺山海經曰前山其木多似柞子可食冬夏恆青作柱難腐帝屋山海經曰講山有木名帝屋葉如椒反陽赤實反陽剌不勾也可以禦凶六駮陸機毛詩疏義曰六駮馬梓其樹皮青白駮犖遙視似馬故謂之駮馬下章云山有苞棣隰有樹檖皆山隰木相配不宜謂獸崔豹古今注曰六駮山中有木葉似豫章皮多癬駮名六駮木漆淮南子曰虻散積血斫木愈齲驅主切此類之推者也推行膏之殺鱉鵲矢中蝟中亦殺矣爛灰生蠅爛腐漆見蟹而不乾又曰染者先青而後黑則可先黑而後青則不可工人下漆而上丹則可下丹而上漆則不可萬事由此也所先後上下不可不審也崔豹古今注曰漆樹以剛斧其皮關以竹管承之汁滴則成也槲齊書曰樂預為永世令人懷其德卒官時有一媼年可六七十檐槲蔌葉造市貨之聞預卒人泣棄溪中曰失樂令我輩孤獨老姥故應就死爾市人皆泣其惠化如此三國典略曰齊斛律光之入寇也周將韋孝寬忌之孝寬參軍曲巖頗知卜筮謂孝寬曰來年東朝必大相殺孝寬因令巖作謠言曰百升飛上天明月耀長安又曰高山不推自崩槲樹不扶自豎乃間諜遺其文於鄴中齊人用是而殺斛律光明月光字也隋書曰倭國草木冬青土地膏腴水多陸少以小環挂鸕鷀項令入水捕魚得百餘頭俗無盤俎藉以槲葉食用手餔之性質直有雅風唐書曰萬歲登封元年春封嵩山御朝覲壇受朝賀登封壇南有槲樹大赦日於其杪置金雞改名為金雞樹樺隋書曰鉢室韋衣胡布山而住人衆多比室韋不知為幾部落用樺皮蓋屋杜寶大業拾遺録曰二年汾州起汾陽宮宮南外平林率是大樺木高百餘尺行從文武皆剝取皮覆菴舍柟陸機毛詩疏義曰梅柟其樹及葉似豫樟葉大如牛耳一頭尖其華赤黃子不可食柟木細理於豫樟無子赤者材堅白者脆荊州人曰梅多江南及魏興新城上庸蜀皆多樟柟三國典略曰初陳文帝以湘州出杉柟使營造大艦金翅等二百許艘并諸水戰之具石南魏王花木志曰南方記石南樹野生二月花仍連著實實如燕子八月熟民採之取核乾取皮作魚羹和之尤美出九真任昉述異記曰曲阜古城有顏回墓墓上石楠二株可三四十圍土人云顏回手植之木婆郍娑隋書曰真臘國土俗與日南九真相類異者有婆郍娑樹無花葉似冬瓜菴羅樹花葉似棗實似李毗野樹花似木瓜葉似杏實似楮婆田羅樹花葉實並似棗而小異歌畢他樹花似李葉似榆而厚大實似李其大如升自餘多同九真枹嶺表録異曰枹木産江溪中葉細如檜身堅類柏唯根軟不勝刀鋸今潮循人多用其根刳而為履當木濕時刻削易如割瓜木乾之後柔刀不可理也或油畫或漆其輕如通草暑月著之隔卑濕地氣力如杉木今廣州賓從諸郡牧守初到任皆有油畫枹木履也牧婆羅南夷志曰南詔多牧婆羅樹子破其殼中白如柳絮紉為絲織為方幅裁之為籠段男子婦人通服之驃國彌臣諾亦皆披婆羅籠段青田崔豹古今注曰烏孫國有青田核莫測其樹之形實至中國者得其核取將漬水則成酒其味淳美核大如五六升瓠空之以盛水俄而成酒味劉璋時得兩核集賓客設之常供二十人飲之一核所盛方盡一核所盛者得中飲盡隨便注水隨成即飲不可久置久置則苦不堪飲名曰青田壺亦曰青田酒都念杜寶大業拾遺録曰十二年四月南海郡送都念子樹一百株勑付西苑十六院內種此樹高一丈許葉如白楊枝柯長細花心金色花葉正赤似蜀葵而大其子小於柿子甘酸至美蜜漬為粽益佳嶺表録異曰倒捻子窠叢不大葉如苦李花似蜀葵小而深紫南中婦女得以染色有子如軟柿頭上有四葉如柿蒂食者必捻其蒂故謂之倒捻子或呼為都念子蓋語訛也其子外紫肉赤無核食之甜軟甚暖腹藏兼益肌肉娑羅魏王花木志曰娑羅樹緗葉子似椒味如羅勒嶺北人呼為大娑羅盛弘之荊州記曰巴陵縣僧寺床下忽生一木不旬日勢凌軒棟道人移居避之木即長遲但極晚香有西域僧見之曰娑羅樹也彼僧所憩之蔭常著花至元嘉十一年忽生一花狀如芙蓉兒樹唐書曰波斯於西海中見一方石上有樹幹赤葉青樹上總生小兒長六七寸見人皆笑動其手腳頭著樹枝其使摘取一枝小兒便死今在大食王處酒樹梁書曰南方頓遜國有酒樹似安石榴取花汁停杯中數日成酒美而醉人博物志曰酒出無遜國都勾劉欣期交州記曰都勾樹木中出屑如麵可啖魏王花木志曰交州記都勾似栟櫚木中出屑如麵可取為餌食如桄榔烏文崔豹古今注曰烏文木出波斯國每舶上將來就中烏文爛然中國亦有出溫括婺等州北閭汲冢周書王會曰白洲北閭者其華若羽伐其木以為車終行不敗白洲東南蠻與白民接也水中可居白洲洲中出此珍木制木崔豹古今注曰制木湖州最多有子如栗木有白皮波斯國來者皆去其皮人多不別
