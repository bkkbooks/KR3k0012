body:
  text: 文部十八著書下呂氏春秋曰呂不韋為秦相國集諸儒使著其所聞為十二記八覽六論合十餘萬言名為呂氏春秋暴之咸陽市門懸千金於其上有能增損一字者與之金時人無能增損説者以為非不能也蓋憚相國畏其勢然其書以道德為準的以無為為紀綱以忠義為品式以公方為撿格與孟軻孫卿相表裏也列仙傳曰李耳字伯陽陳人也生於殷時為周柱下史好養精氣貴無名接而不施轉為守藏吏積年乃知其真人也仲尼師之去入大秦過關令尹喜待迎之強使著書作道德上下經二卷鶡冠子或曰楚人隱居衣斃履穿以鶡為冠莫測其名因服成號著書言道家事馮暖常師事之西京雜記曰淮南王著鴻列二十篇鴻大也烈明也言大明禮教也號為淮南子一曰劉安子自云字中有風霜之氣揚子雲以為一出一入字直百金又曰董仲舒夢蛟龍入懷乃作春秋繁露又曰葛洪家世有劉子駿漢言百卷首尾無題目但以甲乙丙丁記其卷數先父傳之劉歆欲撰書編録漢事類未得搆而亡故書無宗本止雜記而前後無事類後好事者以意次第之始甲之癸為十帙帙十卷合百卷洪家有小同異又曰揚雄著太玄經夢吐鳳皇集其頂上而滅揚雄傳贊曰雄好古而樂道其志欲窮文辭成名於後世以為經莫大於易於是故作太玄傳莫大於論語故作法言桓談新論曰揚子雲才智聞達卓絶於衆漢興已來未有此也國師子駿曰何以言之答曰通才著書以百數唯太史公為廣大餘皆藂殘小論不能比之子雲所造法言太玄也人貴所聞賤所見故輕昜之若遇上好事必以太玄次五經也抱朴子曰王充作論衡北方都未有得之者蔡伯喈嘗到江東得之歎其文高度越諸子及還中國諸儒覺其談論更遠嫌得異書或搜求至隱處果得論衡捉取數卷將去伯喈曰唯我與爾共之勿廣也又曰盧生問曰蔡伯喈張平子才足著子書正恐言遠旨深世人不解故不著也余難云若如來言子雲亦不應作太玄經也瓦甂木柸比門所饒金觴玉爵萬家無一也又曰孔鄭之門耳聽口受者滅絶而託竹素者為世寶也又曰余家遭火典籍蕩盡困於無力不能更得故抄掇衆書撮其精要用功少而所收多思不煩而所見博或謂洪曰流無源則乾條離株則悴吾恐玉屑盈車不如金璧余答曰詠圓流者採珠而捐蚌登荊嶺者拾玉而棄石余之抄略譬猶擲翡翠之藻羽脫犀象之角牙又曰嵇君道問二陸優劣抱朴子曰朱淮南嘗言二陸重規沓矩無多少也一手之中不無鈍利方之它人若江漢之與潢潦陸子十篇誠為快書者其辭之富者雖覃思不可損也其理之約者雖潛筆腐豪不可益也陸平原作子書未成吾門生有在陸君軍中嘗在左右説陸君臨亡曰窮通時也遭遇命也古人貴立言以為不杇吾所作子書未成以此為恨耳余謂仲長統作昌言未竟而亡後董襲撰次之桓談新論未備而終班固謂其成琴道今才士何不贊成陸公子書頴容春秋例曰著述之事前有司馬遷揚雄後有鄭衆班固近即馬融鄭玄其所著作違義正者略舉一兩事以言之遷史記不識畢公文王之子而言與周同姓揚雄法言不識六十四卦云所從來尚矣論衡曰畫工好畫上世人不畫秦漢士者尊古卑今楊子云作太玄經法言張伯松不肯一觀與並肩故賤其言也若生周世則為金匱也又曰淮南呂覽文不無纍害所以出者家富官貴也人有難充書者繁重云不在多以為龍少魚衆少者為神充答曰文衆勝寡財富愈貧世無一分吾有百篇人無一字吾有萬言孰為賢也充仕數不遇以章和二年徙家避難楊州丹陽入為治中才小任大職在剌劾筆札之思歷年寢廢章和三年罷州還年漸七十時可懸輿髮白齒落日月逾邁貧無供養忘不娛快乃作養生之書凡十六篇論衡造於永平末定於建初之年耳新論曰余為新論術辨古今亦欲興治也何異春秋褒貶耶今有疑者所謂蚌異蛤二五為非十也談見劉向新序陸賈新語乃為新論莊周寓言乃云堯問孔子淮南子云共工爭帝地維絶亦皆為妄作故世人多云短書不可用然論天間莫明於聖人莊周等雖虛誕故當採其善何云盡棄耶風俗通應邵撰序云風者天氣有寒暖地形有陰陽泉水有美惡草木有剛柔俗者含血之類象而生之百里不同風千里不同俗周秦嘗以月遣輶軒使采異代方知載之祕府及羸氏之亡遺棄殆盡蜀人嚴君平有千餘言林陶翁儒才有梗概揚雄續注二十七年凡九千字猶不如爾雅之宏麗張竦云縣諸日月不刊之書余不才敢比隆於斯人金樓子曰王仲宣昔在荊州著書數十篇荊州壞盡焚其書今在者一篇知名之士咸重之見虎一毛不知其班又曰劉輔性矜嚴有盛名沉深好經書善説京氏易論集經傳及圖讖文作五經通論世號之曰沛王通明帝甚敬重之賞賜恩寵加異又曰或問余曰子何不詢之有識共著此書曷為區區自勤如此豫曰夫荷旃被毳者難與道純綿之緻密羹藜唅糗者不足論大牢之滋味故服綌之涼者不知盛暑之鬱燠襲貂狐之暖者不知至寒之悽愴豫之術業豈賓客之能窺斯蓋以筳撞鍾以蠡測海也豫常切齒淮南不韋之書謂為賓遊所製每至著述之間不令賓客窺之也又曰桓談新論華談又有新論揚雄有太玄經楊泉有太元經談此多誤動形色或云桓談有新論何處復有華談楊子但有太玄經何處復聞太元也皆由不學使之然矣隋大業拾遺曰大業之初勑內史舍人竇威起居舍人崔祖濬及龍川贊治侯偉等三十餘人撰區宇圖志一部五百餘卷新成奏之又著丹陽郡風俗乃見以吳人為東夷度越禮義及屬辭比事全失修撰之意帝不悅遣內史舍人柳逵宣勑責威等云昔漢末三方鼎立大吳之國以稱人物故晉武帝云江東之有吳會猶江西之有汝潁衣冠人物千載一時及永嘉之末華夏衣纓盡過江表此乃天下之名都自平陳之後碩學通儒文人才子莫非彼至爾等著其風俗乃為東夷之人度越禮義於爾等可乎然於著術之體又無次序各賜杖一頓即日勑追祕書學士十八人修十郡志內史侍郎虞世基惣檢於是世基先令學士各序一郡風俗擬奏請體式學士著作佐郎虞綽序京兆郡風俗學士宣惠尉陵敬序河南郡風俗學士宣德郎杜寶序吳郡風俗四人先成以簡世基世基曰虞綽序京兆文理俱贍優博有餘然非衆人之所能繼陵敬論河南雖文華才富序事過繁袁朗杜寶吳蜀二序不略不繁文理相副宜具狀以四序奏聞去取聽勑及奏帝曰學士修書頗得人意各賜物二十段付世基擇善用之世基乃鈔吳郡序付諸頭以為體式及圖志第一副本新成八百卷奏之帝以部秩太少更遣子細重修成一千二百卷卷頭有圖別造新樣紙卷長二尺敘山川則卷首有山水圖敘郡國則卷首有郭邑圖敘城隍則卷首有公館圖其圖上山水城邑題書字極細並用歐陽肅書即率更令詢之長子攻於草隸為時所重幼屬文東觀漢記曰班固字孟堅九歲能作賦頌因數入讀書禁中每行巡狩輒獻上賦頌魏志曰陳思王植年十歲善屬文太祖曰汝倩人耶植跪對曰出言為論下筆成章願當面試時銅雀臺新成太祖悉將諸子登臺使各賦之植援筆立就亦出思疾門又曰文帝八歲屬文魏氏春秋曰阮籍幼有奇才異質八歲能屬文性恬靜兀然彈琴長嘯以此終日又曰庾闡字仲初少孤年九歲能屬文鄉里重之崔鴻十六國春秋曰南涼録禿髮傉檀子歸年十三命為高昌殿賦援筆即成影不移漏傉檀覽而異之擬之曹子建亦出思疾問後魏書曰胡叟入長安觀風化隱匿名行懼人見知時京兆韋祖思少閲典墳多蔑時彥知叟至召而見之祖思習常待叟不足聊與溫涼拂衣而出祖思固留之曰當與君論天人之際何遽而反乎叟對曰論天人者其亡久矣與君相知何夸言若是也遂不坐而去至主人家賦韋杜二族一宿而成時年十有八矣具述前載無違舊美敘中世有協時事而末及鄙黷人皆奇其才思其筆世猶傳誦之以為笑狎齊書曰張率字士簡性寬雅年十二能屬文常日限為詩一篇或數日不作則追補之稍進作賦頌至年十六向作二千餘首有虞訥者見而詆之率乃一旦焚毀更為詩示焉託云沈約訥便向之唴稱無字不善率曰此吾作也訥慚而退南史曰劉孝綽本名冉幼聰敏七歲能屬文舅齊中書郎王融深賞異之與同載以適親友號曰神童融每曰天下文章若無我當歸阿士阿士即孝綽小字也又曰謝貞八歲嘗為春日間居詩從舅王筠奇之謂所親曰至如風定花猶落乃追步惠連矣年十三尤善左氏春秋工草隸蟲篆後周書曰李旭幼年已解屬文有聲洛下時洛陽創置明堂旭年十歲數為明堂賦雖優洽未足才制可觀見者咸曰有家風矣三國典略曰蕭大心字仁恕小名英童與大臨同年十歲並能屬文嘗雪朝入見梁武帝詠雪令二童各和並援筆立成梁書曰柳惲早有令名少工篇什為詩云亭皋木葉下隴首秋雲飛琅邪王融見而唴賞因書齋壁及所執白闌團扇又曰太祖文帝諱綱字世讚六歲能屬文高祖驚其早就不之信也及於御前面試辭彩甚美高祖難曰此子吾家之東阿也又曰丘遲字子希年八歲便屬文父靈鞠有才名常謂氣骨似我徵士何點見而異之又曰庾肩吾八歲能賦詩特為兄於陵所友愛又曰何遜字仲言八歲能賦詩弱冠州舉秀才南鄉范雲見對策大相稱賞謂所親曰頃觀文人質則過儒文則傷俗其能含清濁守今古見之何生矣沈約亦愛其文又曰陸從典字由儀幼聰敏年八歲讀沈約集見回文妍麗援筆擬之便有佳致十二作柳賦其辭甚美從父瑜特所賞愛隋書曰李德林幼聰敏年數歲誦左思蜀都賦十餘日便度高隆之見而唴歎遍告朝士云若假其年必為天下偉器鄴京人士多就宅觀之月餘日中車馬不絶年十五誦五經及古今文集日數千言俄而該博墳典陰陽緯候無不通涉善屬文辭核而理暢又曰于宣敏字仲達少沉密有才思年十一詣周趙王王命之賦詩宣敏為詩甚有幽貞之志王大奇之坐客莫不唴賞起家右侍上士文選人名録曰曹植年十歲誦讀詩論及賦數萬言能屬文又曰謝靈運幼而聰慧善屬文舉筆立成文章之盛獨絶當時幼童傳曰謝瞻字宣遠幼而聰悟五歲能屬文通玄理又曰孫士潛字石龍六歲上書七歲屬文金樓子自敘曰余六歲解為詩奉勑為詩曰池萍生已合林花發稍周風入花枝動日照水光浮因爾稍學為文也
