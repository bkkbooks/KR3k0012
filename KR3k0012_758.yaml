body:
  text: 器物部二鑊周禮曰烹人掌供鼎鑊所以煮肉反魚腊之器既熟乃辱於鼎脣音蒸儀禮曰雍人陳三鼎在羊鑊之西二鼎在豕鑊之西史記曰藺相如謂秦王曰今以秦之強而先割十五都與趙趙豈敢留壁而得罪於大王乎臣知欺大王當誅臣請就湯鑊唯大王群臣熟計議之晉書曰張平自稱豫州刺史樊雅自號譙郡太守元帝皆版為四品將軍豫州刺史祖逖出屯廬洲遣參軍殷乂詣平雅乂意輕平視其屋云當持作馬廄見大鑊云欲鑄作鐵器平曰此是帝王大鑊天下定後方當用之奈何打破乂曰卿能保頭而不惜大鑊耶乎大怒於坐斬乂阻兵固守歲餘逖攻平殺之而雅據譙城文子曰養魚於沸鑊之中棲鳥於炎鑪之上雖欲其生養理失矣陸機洛陽記曰宮牆外以大鐵鑊盛水以救火鑊受百斛百步一置楊龍驤洛陽記云鐵鑊合一百八十枚也搜神記曰武帝從南岳著廬江潛霍山之上無水廟有四鑊可受四十斛至祭時水輒自滿用之足了事畢即空塵土樹葉莫之汙也積五十歲歲作四祭後但作三祭一鑊自敗朱崖傳曰朱崖大家有銅鑊多者五三百積以為貨南越志曰龍川縣營崗北有巨鑊恒有懸泉注之終歲不滿嘗有採薪者欲推動之忽然震電迷失路十許日乃至家湘州記曰伍子胥廟中有大銅器元嘉中沙門釋亮啟乞此廟器鑄丈六金像始廟所有大銅鑊可容三百斛許即陷入地中僧亮夢神語云今捨此器相與發願免此神形殷斌當山記曰魏興反照山上有三公鐵鑊常有數十斛雖大旱而不減長老云有天子女欲來此山愁思而死三公衛送故於此烹之羅浮山記曰有名鑊容千餘斛溢為瀑布墨子守死曰二十五步一竈竈有鐵鑊容二石以上為湯釜說文曰鍑音富如釜而大口釜也一曰鼎大上下若甑曰鬵音尋三足釜也方言曰釜自關而西或謂之釜或謂之鍑鍑亦釜之揔名也廣雅曰錪他典切鉼音餅鬲音曆鍑音富鏕音鹿饅鍪漫牟二音音規錡釜也埤蒼曰鎢䥈小釜也易說卦曰坤為釜詩曰于以湘之維錡及釜錡釜屬也有足曰錡又曰誰能烹魚溉之釜鬵鬵釜屬也左傳曰筐筥錡釜之器潢汙行潦之水三禮圖曰釜制度云三斛或曰二斛春秋繁露曰夏求雨曝釜於術音遂十日史記曰項籍救鉅鹿沉舡破釜甑以示必死古史考曰黃帝始造釜甑戰國策曰蔡澤入韓魏遇奪釜鬲於途東觀漢記曰梁鴻少孤詣太學受業同房先炊已呼鴻及熱釜炊鴻曰童子不因人熱者也滅竈更燃火又曰鄧遵破匈奴得釜鑊二三千枚謝承後漢書曰范丹為萊蕪長遭黨錮有時絕糧閭里歌之曰釜中生魚范萊蕪又曰胡邵為淮南太守使鈴下閣外炊曝作軋飯閣中不設釜竈潁川馮暹為徐州刺史以小銅釜甑十日一炊後漢書曰王莽納言將軍嚴尤欲據宛伯升乃陳兵誓眾焚積聚破釜甑鼓行而前破釜甑示必死也魏略曰鍾繇為相國以五熟鼎範因太子鑄之釜成太子與繇書曰昔有黃三鼎周之九寶咸以一體調一味豈若斯釜五味時芳蓋鼎之烹飪以享上帝今之嘉釜有踰茲義晉諸公讚曰尚書杜預欲為平底釜謂於薪火為省黃門郎賈彝於世祖前面質預曰釜之尖下以備沃洗今若平底無以去水預亦不能折之前秦錄曰處士張忠隱于太山鑿石為釜容六斗四升河圖曰漢高祖觀汶水見一黃釜驚卻反化為一翁責言曰劉季何不受河圖莊子曰曾子再仕而心再化曰吾及親仕三釜而心樂仕三十鍾不洎親吾心悲韓子曰智伯圍襄子於晉陽決晉水以灌之城中巢處懸釜而炊呂氏春秋曰晉文公反國介之推不肯受賞或遇之山中負釜淮南子曰鈆不可以為刀木不可以為釜又曰太王亶父處邠狄人攻之杖策而去百姓負釜甑踰梁山而國乎歧淮南萬畢術曰牛膽鳴取牛膽以塗熱釜即自鳴矣風俗通曰俗說齊人有空車行魯人有負釜者便特置車中二三百里臨別取釜不相問為誰亦不謝後車家繫獄當死釜主徑往募人取之穿壁未達車者怒不肯出釜主慚欲俱死明日主者以事白齊君義而原之魏子曰鼎以為希出而世貴之釜鬲常用而世輕之兵書曰初出軍行日三炊釜不得覆覆釜軍敗物理論曰堯世洪水民登木而栖懸釜而茅君內傳曰欲合九轉先作神釜郭文傳曰文以石為釜婁承先別傳曰昔山越民反所過殘毀望婁氏之里往中庭顧見釜甑尚省於竈曰恐他遠寇取之仍為取洗沈著井中而去婁家後還皆盡得之朱崖傳曰朱崖俗多用土釜南蠻獠民格曰諸告言伯叔外祖父母裴淵廣州記曰東官郡煮鹽織竹為釜以牡蠣屑泥之燒用七夕一易異苑曰長山朱郭夫妻恒採藻澗濱見二銅釜沿流而下取之而歸有圓蓋滿中銅器光輝輝目自然作聲郭懼運著北山埋之而後賣釜與人主載出為貨舡無故自覆失釜所在又曰薛願家有虹飲釜中水盡以酒灌之便吐金滿釜而願因之豐富離騷曰黃鍾毀棄瓦釜雷鳴鬲爾雅曰鼎疑足者謂之鬲郭璞曰曲腳也或曰疑定也犍為舍人曰鼎足相去䟽闊曰鬲方言曰鍑或謂之鏤吳楊之間謂之鬲周禮曰鬲實五觳苦角切厚半寸脣寸漢書曰空足之間蘇林曰足中空不實家語曰魯有儉者瓦鬲煮食祀之自謂甚美盛之土鉶之器以進孔子孔子受之欣然有悅如受大牢子路曰瓦甂音邊陋器也夫子何喜如此乎孔子曰夫食美者念其親以其食美者而念其我思也盛弘之荊州記曰湘東陰山縣西有鬲口溪昔有大鬲容百斛出於此水故因為名鐺通俗文曰鬴音輔有足曰鐺齊書曰明帝每存儉約鑄壞太官元日上壽銀酒鐺尚書令王晏等咸稱盛德蕭頴曹曰朝庭盛禮莫過三元此一路器既是舊物不足為侈帝不悅預曲宴銀器蒲席頴曹曰陛下前欲壞酒鐺恐宜移在此器也帝甚慚唐書曰薛大鼎為滄州太守政化大行百姓利之賈敦頤為瀛州刺史鄭德本為冀州刺史俱有異政時人號曰鎗腳刺史東宮舊事曰皇太子初拜給銅龍頭鎗孝子傳曰陳遵母好食鐺底焦飯孔氏志怪曰有人苦心腹病死後剖視之得銅鐺一枚容數合許疾病部廢門中備云其事述異記曰諸葛景亡後宅上常聞語聲當酤酒還而無溫鎗鬼云卿無溫鎗那得飲酒即見一銅鎗從空中來續齊諧記曰王敬伯夜見一女子命婢取酒須臾持一銀酒鎗笑林曰太原人夜失火欲出銅鎗設得熨斗便大驚怪曰異事火未至已被燒失腳梁王筠以服散鎗贈殷鈞別詩曰玉鉉布交文金丹煥仙說九沸翻成緩七輔良為切執以代踈麻長貽故人別鎢錥廣雅曰鎢錥謂之銼𨰠說文曰銼才禾切𨰠力禾切鍑也纂文曰秦人以鈷䥈為銼𨰠魏略曰徐晃性嚴驅使將士不得閑息于時軍中為之語日不得餉屬徐晃晃聞此語笑曰我槌破汝鎢錥耶杜預奏事曰藥杵臼澡槃熨斗釜瓮甕銚槃鎢錥皆亦民閒之急用也江逌表曰昔康皇帝玄宮內金烏育銚廣雅曰鋗血涓切謂之銚說文曰銚溫器也嵩高山記曰岳左右有古人住處銅銚器物猶存衡山記曰有人採藥暮宿石室中見一銅銚是煮藥處蠻人聞之取銚還用舉村盡病送返乃己夢書曰夢見得新銚鋗取婦好也魏武上獻帝表曰臣祖騰有順帝賜器今上四石銅鋗四枚五石銅鋗一枚御物有純銀粉銚一枚束晳貧家賦曰執偏隳之漏鋗鑪說文曰鑪方鑪也鏇似絹反圜鑪也周禮曰宮人掌王之六寢凡寢中之事掃除執燭共鑪炭凡勞事勞事勞褻之事也左傳曰邾子在門臺臨廷閽以鉼水沃庭邾子望見之怒閽曰夷射姑旋焉旋小便也命執之弗得滋怒自投于床廢廢墮也于鑪炭爛遂卒魏略曰孫權上書稱臣稱說天命太祖以權書示外曰是兒欲路吾著爐炭上耶崔豹古今注曰漢成帝顧成廟有二真金爐拾遺錄曰周靈王出於宣昭之臺望東方雲氣蓊鬱俄而有二人乘飛遊之輦上帝酣其一人能為霜雪坐者皆禁乃命青金洪鑪青金洪者出青零淵石色皆如紺中有金鑄為大鑪異苑曰龐猗義熙中為宜都太守御人牧馬於野見一銅鑪上焰帶鏁而行持歸以呈猗遂檻盛送下荊州至郡北界夜忽風雨有叫聲光火燭天徑來趨舡失鑪所在鹽鐵論曰歐冶能因國君之銅鐵以為金鑪大鍾而自不能為壺鼎盤盂無其用也桓譚新論曰元帝求方士漢中送人王仲都大暑日使暴坐又環以十鑪不言熱論衡曰當風鼓箑向日燃爐而天終不為冬夏易氣又曰推無益之能納無補之說似以夏進鑪以冬奏扇賈誼鵬鳥賦曰且夫天地為鑪兮造化為工陰陽為炭兮萬物為銅甑說文曰窐戶圭切甑空也古史考曰黃帝始作甑方言曰甑自關而東謂之獻魚蹇切或謂之鬵或謂之酢餾力救切爾雅曰䰝與甑同謂之鬵鬵鉹也郭璞注曰涼州呼鉹音侈周禮曰陶人為甗實二鬴厚半寸脣寸甑實二鬴厚半寸脣寸七穿量六斗四升曰鬴鄭司農云甗無底甑也左傳曰晉師從齊師入自丘轝擊馬陘齊侯使賓媚人賂以紀甗杜預注曰甗玉甑也滅紀所得漢書曰項羽引兵渡河皆沈舡破釜甑燒廬舍示士卒勝去不勝死無廻心後漢書曰范史雲為萊蕪長時人歌曰甑中生塵范史雲袁山松後漢書曰荀淑與陳寔神交棄官常命駕相就令元方侍側季方作食嘗一朝食遟季方跪曰向聞大人與荀君言甚善竊聽之甑壞飯縻寔曰汝聽談解乎荅曰解令說之不誤一言公悅韓詩外傳曰舜甑無羶淮南子曰粟得濕而熯音罕甑得火而液白虎通曰王者德至山陵丹甑見京房易逆刺曰天雨釜甑歲一熟益部耆舊傳曰任文公知有王莽之變悉賣奇物唯存銅甑蓑笠郭林宗別傳曰鉅鹿孟敏容居太原林宗見而問之對曰甑已破矣視之無益林宗以其分決勸使學果為美士郭文傳曰文以竹為甑錄異傳曰隆安中吳縣張君林忽有鬼來助其驅使林家甑破無可用鬼乃撞盆底穿以充甑錢塘記曰石姥莫補切山有甑大數十圍下有三石支足一人搖之輒動縱使千百人引之與一人不異離騷曰珪璋雜於甑窐窐士甑孔也箄說文曰箄蔽也所以蔽甑底也淮南子曰明鏡可鑑形蒸食不如竹箄裴玄論云尹氏鏡蒸食不如三錢竹箄夢書曰夢見新箄婦女憙孔融同歲論曰弊箄徑尺不足以救鹽池之鹹甑帶淮南子曰琬琰之玉汙泥土之中雖廉者弗釋琬琰美玉釋捨也弊箄甑瓾在旃茵之上雖貪者不搏瓾甑帶也搏取也瓾讀鼃黽之也美之所在雖汙辱世不能賤惡之所在雖高隆世不能貴夢書曰夢見甑欲娶婦夢見甑帶煤灼來
