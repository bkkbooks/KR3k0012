body:
  text: 珍寶部四玉下唐書曰太宗嘗謂魏徵曰玉雖有美質在於石間不值良工琢磨與瓦礫不別若遇良工即為萬代之寶朕雖無美質為公所切磋勞公約朕以仁義弘朕以道德使朕功業至此公亦足為良匠耳又曰高宗朝封禪太嶽造玉册三枚皆以金編每牒長一尺二寸廣一寸二分厚三分刻玉填金為字又為玉匱一以藏正坐玉册金匱二以藏配坐玉册各一尺三寸并玉檢方五寸當繩纏處刻為五道當璽處刻深二分方一寸二分為黃金繩以纏金玉匱各五周為金泥以泥之為玉璽一枚方一寸二分文同受命至以封玉匱又天寶中詔曰禮神以玉者蓋取其精潔表以溫潤合德為器有象正辭乃信以達馨香其在壁頃來禮神六器及宗廟奠玉自馮紹正奏後有司並皆用珉禮所謂君子貴玉而賤珉是珉不可用也朕精禋郊壇嚴敬宗廟奉惟新之祚庇太平之人則人力普存備物以享安可以珉代玉惜費事神沉國家之富有萬方之助祭闕典必修無文咸祑豈於天地宗廟奠王有虧自今已後禮神六器宗廟奠玉並用真玉諸祀用珉如以玉難得大者寧小其制度以取其真又曰憲宗時隰州刺史吳暈獻玉杯一頗珍奇云先使吐蕃所得又曰憲宗時莊宅使許遂振得玉類珽以進上悅命賜絹三百匹又曰貞元六年盧群入拜侍御史有人誣告故尚父子儀嬖人張氏宅中有寶玉者張氏兄弟又與尚父子孫相告訐詔促其獄群上奏言張氏以子儀在時分財子弟不合爭奪然張氏宅與親仁宅皆子儀家事子儀有大勳伏望陛下赦而勿問使私自引退上從之時人賞其識大體也又曰大和中文王命中使以白玉帶就幽州賜李載義亦殊恩也又曰開成中王起議今國家郊天報地祀神之玉常用守經據古禮神之玉則無臣等請詔下有司精求美玉創造蒼璧等九器祭訖具而藏之其餘燎玉請依常制管子曰夫玉之所以貴者九德出焉溫潤以澤仁也鄰以理者智也堅而不蹙義也廉而不劌行也鮮而不垢潔也折而不撓勇也瑕適皆見情也茂華光澤並通而不相陵容也叩之其音清專徹遠純而不殺辭也是以人主貴之藏以為寶剖以為符瑞文子曰鄭人謂王未理者璞周人謂鼠未臘者璞周人懷璞問鄭賈曰欲之乎出其璞視之乃鼠璞范子計然曰玉英出藍田列子曰穆王征西戎西戎獻昆吾之劍赤刀切玉如切泥又曰宋人有為其君以玉為楮葉者三年而成鋒煆莖葉毫芒繁澤亂之楮葉中不可別也此人遂以巧食宋國尹文子曰魏田父有於野得玉徑尺弗知其玉也以告鄰人鄰人詐之曰此怪石也畜之弗利田父雖疑猶録置於廡下其夜玉明照一室其家大怖遽而棄之於野鄰人盜之以獻魏王魏王召玉工相之玉工望玉再拜卻立曰敢賀大王得天下之寶臣所未常見王問價玉工曰此無價以當之五城之都僅可一觀王立賜獻者千金長食上大夫祿也鬼谷子曰鄭人之取玉也載司南之車為其不惑也尸子曰水方折者有玉圓折者有珠又曰玉者色不如雪澤不如雨潤不如膏光不如燭鄒子曰夫珠生於南海玉出於須彌無足而至者人好之也士有足而不至者以人不好也韓子曰楚人卞和得玉璞於楚山獻厲王使玉王人相之曰石也王以和為慢刖右足及武王即位又獻之復相曰石也次刖左足及文王即位和乃抱其璞而哭於楚山三日三夜泣盡繼之以血王使玉人治之得寶玉焉名曰和氏之璧又曰周有玉版紂令膠鬲索之文王不豫費仲來求因豫之是膠鬲賢而費仲無道也周惡賢者之得志也故豫費仲文王舉太公於渭濱者貴之也而資仲玉版者愛之也故曰不貴其師不愛其資雖知大迷又曰堂溪空見昭侯曰今有白玉之危而無當有瓦危而有當君渴將何以飲君曰以瓦巵堂溪空曰白玉之巵美而君不以飲者以其無當耶君曰然堂溪空曰為人主而漏泄其群臣之語譬猶玉巵之無當也堂溪空每見而出昭侯必獨臥惟恐蔑言泄於妻妾淮南子曰琬琰之玉存汙泥之中雖廉者不釋也又曰崑崙山曾城九重有珠樹玉樹又曰鍾山之玉炊以爐炭三日三夜而色澤不變得天地之精又曰玉璞不厭厚又曰白玉不雕美珠不文質有餘也又曰兩堅不能相加兩強不能相伏故梧桐斷馬角截梨玉言柔勝剛又曰玉待濫諸而成器濫諸珍玉之名也言物有待賤而貴隨巢子曰幽厲之時奚祿山壞天賜玉玦於羿遂以殘其身以此為福而禍抱朴子曰吳時發廣陵大冢兵人共舉死人以倚璧有一玉長一尺形似冬瓜從人懷中頽出墮池玉可以為珠酒及地榆酒化之為水亦可燒以為粉服一年以上入水不沾入火不灼又曰玉脂生玉之山膏流出萬年以上則凝而成之鮮明如水精以無心草木和之須臾成水服之一升得千歲玉服玄真者其命不極玄真玉別名也服玉當得于闐白玉赤松子以玄蟲而漬玉為水服之故得乘煙霞上下也又曰中山諺曰稱人字者金玉也知其物則不為害賈子曰德有天理曰道性神明命之所生而能象德者獨玉也符子曰荊山不貴玉鮫人不貴珠穆天子傳曰天子大朝黃之山披啚視典用觀天子之寶器玉果石以美玉謂女果者璿珠璿玉類音執又曰天子北征東還乃循黑水至於群玉之山先王所謂策府天子於是取玉枝三乘玉器服物於是載玉萬隻也又曰赤烏氏美人之地寶玉之所在也山海經曰玨二玉相合玨音角瑁琉夷蠻係耳玉也稷契之山及鹿臺山其上多白玉瑜次之山多嬰垣之玉泰冒之山洛水出焉其中多藻玉密山之上丹水出焉其中多王膏其源沸湯黃帝是食玉膏之所出五色乃清五味乃馨堅栗精密澤而有光五色發作以和柔剛天地鬼神是食是饗君子服之以禦不祥龍首之山弱水出焉其中多美玉放皋之山明水出焉其中多蒼玉平丘在三桑東爰有遺玉帝王世紀曰有燕飛而遺卵簡翟與妹競取覆以玉筐又曰周武王伐殷為天子登臺見玉王曰誰之玉或曰諸侯之玉王不取反歸之天下聞之曰王廉於財矣又曰紂敗績登鹿臺蒙寶衣玉席投於火而死漢武故事曰上起神屋前庭植玉樹以珊瑚為枝碧玉為葉華子青赤以珠玉為之空其中如小鈴鎗有聲也漢武內傳曰西王母云昌城玉女夜山火玉又曰長州一名青丘仙草靈藥甘液玉英美所不有漢書儀曰祭天用玉几論衡曰玉變為石珠變為礫毀謗使然也採玉者破石拔玉選士者棄惡取善又曰璆琳琅璆玉也琳珠也琅玕珠之類也鹽鐵論曰南越以孔雀珥門戶崑山之旁以玉抵鳥鵲桓談新論曰雒陽季幼賓有小玉撿衛謁者史子伯素好玉器見而奇之使豫報以三萬錢請買焉幼賓曰我與好事長者博之已雇十萬非三萬錢主也余驚駭云我若於路見此千錢亦不市也故知之與不知相去甚遠王逸正部論曰或問玉符曰赤如雞冠黃如蒸栗白如脂肪黑如純漆玉之符也魏文帝與鍾誄書亦出也矯世論曰白玉之肖牙者唯離婁能察之白虎通曰玉者象君子之德燥不輕濕不重是以人君寶之應劭漢官儀曰封襌壇有玉龜郭子橫洞冥記曰元鼎元年起招靈閣有一神女留一玉叉以與帝帝以賜趙婕妤至昭帝元鳳中宮人猶見此叉共謀欲碎之明視叉匣唯見白燕直升升天後宮人常作玉叉因名玉燕叉言其吉祥西京雜記曰高祖初入咸陽宮周行庫藏金玉珍寶不可勝言其尤驚異者有青玉五枚燈高七尺五寸下作蟠螭以口含燈然則鱗甲皆動煥爛盈室焉又曰高祖初入咸陽周行庫藏見玉笛長二尺二寸二十九孔吹之則見車馬山林嶾嶙相次吹息不復見銘曰昭華之管事具樂部五經通義曰玉有五德溫潤而澤有似於智鋭而不害有似於仁抑而不橈有似於義有瑕於內必見於外有似於信垂之如墜有似如禮瑞應圖曰玉甕者聖人之應也不汲自盈王者飲食有節則出雒書曰王者不藏金玉則紫玉見于深山服飾不逾祭服則玉英出胡綜別傳曰吳時掘得銅印以琉璃為蓋畫布雲母於其上開之得白玉如意太皇帝以問君君曰秦皇以金陵有天子氣處處埋寶物以當王士之氣此抑是也文士傳曰劉楨字公幹少有才辨常豫魏文帝座見甄后不伏武帝嘗怒配上方武帝輦至上方觀作署楨故匡坐正色磨石不仰武帝問曰石何如楨因得喻己自理跪對曰石出自荊山玄巖之巔外有五色之章內有含和之珍摩之不加瑩雕之不增美稟氣堅貞受茲自然顧其理枉屈紆繞猶不得中武帝顧左右大笑即日還宮赦楨復署吏列山傳曰赤松子者神農時雨師也服水玉教神農能入火不燒神仙傳曰沈羲為仙人所迎見老公以金案玉盤賜羲搜神記曰孔子作春秋制孝經既成齊戒告天天降赤虹化為黃玉長二尺上有文又曰羊公雍伯雒陽人性篤孝父母終葬無終山遂居焉山高八十里上無水公汲水作義漿於坂頭行者皆飲之三年有一人就飲以石子一斗與之使至高平好地有石處種之玉當生其中羊公未娶又語汝後當得好婦語畢不見後種其石數歲時時往視玉子生人莫知有徐氏在北平著姓女甚有名時人求多不許公乃試求徐氏徐氏以為狂乃戲云以白璧一雙來當聽為婚公至所種石中得一隻白璧以贄徐氏徐氏大驚遂以女妻公天子異之拜為大夫於種玉處四角作大石柱各一丈中央一頃地曰玉田續搜神記曰樂安高衛其孫雅之在廄中云有神來降自稱白頭公柱杖光耀照人也白頭公白玉也搜神記曰吳王夫差女名玉童子韓重有道術女悅之結氣死葬于昌門之外重至冢前哭祭女見形將重入冡臨去取崑崙玉孟以送重燉煌高納之郡府紀年曰桀伐岷山岷山女尼慮反千桀二女曰琬曰琰桀愛二女無子刻其名於苕華之玉苕是琬華是琰石虎鄴中記曰後宮別坊中有小形玉床又曰石虎以宮人為女官用玉案文書涼州記曰盜發張駿陵得玉樽玉簫玉笛法顯記曰師子國有玉像齊諧記曰餘杭縣南巷中有一人姓沈名路入山得一玉肫從此以後所向如意家遂殷富異苑曰晉東瀛王騰字元邁以永嘉元年鎮鄴天雪門前方數十步融液不積騰怪掘之得玉馬高一尺許口齒缺騰以馬者國姓為吉瑞或謂馬無齒則不復食又曰弘農楊子陽太元初聞土中聲掘得玉肫録異傳曰江巖常到吳採藥及富春縣清泉山南遙見一美女紫衣獨踞石而歌聲有碣石之音巖往未及數十步輒去女處唯見所踞石耳如此數日巖乃擊破石遂從石中得一紫玉廣長一尺後不復見女又曰邴浪者安樂人行到松滋縣九田山見一鳥形如雉而色正赤集山巖石上鳴聲如吹笙浪即射中之鳥仍入石穴中浪遂鑿石得一赤玉狀如鳥形十洲記曰周穆王時西胡獻玉杯是白玉之精光明照夕置杯於庭中皆明旦而水汁滿於杯中汁甘而香美斯靈器也又曰瀛州有玉膏如酒名曰玉酒飲之令人長生博物志曰得好玉用合玉漿廣志曰白玉美可照而出交州青玉出樓國碧玉出夫餘梁四公記曰扶桑國使使貢觀日玉大如鏡方圓尺餘明徹如琉璃映日以觀見日中宮殿皎然分明地鏡圖曰二月中草木光生下垂者下有美玉又曰玉石之精也其在石中若山中石潤而浸旁有水其居地氣青而浮其氣白而圓光轉其地中常潤白玉圖曰玉之精名曰柔狀如美女衣青衣見之以桃戈刺之而呼其名則可得也夜行見女子戴燭行者潛從其所亡則入石石中有玉世説曰長沙王徙封常山至國穿井入地四丈得白玉方三四尺又曰溫嶠取姑女下玉鏡臺一枚是公為劉越石長史征劉聰所得語林曰平子從荊州下王敦敦欲殺之平子恆持一玉枕下床去故不得發敦後矯平子左右而借其玉枕持下宋去遂殺平子本草經曰玉泉一名玉醴臨死服五斤色不變吳氏本草曰白玉體如白頭公明皇雜録曰天后嘗召諸皇孫坐於殿上觀其嬉戲因出西國所貢玉環釧杯盤列於前後縱令爭取以觀其志莫不奔竟厚有所獲獨上端坐略不為動后大奇之撫其背曰此兒當為太平天子因命取玉龍子以賜玉龍子太宗於晉陽宮得之文德皇后常置之衣箱中及大帝載誕之三日后以珠絡衣裕并玉龍子賜焉其後常藏之內府雖其廣不數寸而溫潤精巧非人間所有及上即位每京師愆雨必虔誠祈禱將有霖霪逼而視之若奮鱗鬣開元中三輔大旱上復祈禱而涉旬無雨上密投南內之龍池俄而雲物暴起風雨隨作上幸西蜀車駕次渭水將渡駐蹕於水濱左右侍御或有臨流濯弄者於沙中得之上聞驚喜視之泫然流涕曰此吾昔時所寶玉龍子自後每夜中光彩輝燭一室上既還京為小黃門攘竊以遺李輔國常置於匱中有聲輔國將敗夜中聞櫝中有聲開視亡其所
