body:
  text: 地部二十六河釋名曰河下也隨地下處而通流也山海經曰崑崙山縱廣萬里高萬一千里去嵩山五萬里有青河白河赤河黑河環其墟其白水出其東北陬屈向東南流為中國河河百里一小曲千里一大曲發源及中國大率常然東流潛行地下至規期山北流分為兩源一出䓗嶺一出于闐其河復合東注蒲昌海復潛行地下南出積石山西南流又東廻入塞過燉煌酒泉張掖郡南與洮河合過安定北地郡北流過朔方郡西又南流過五原郡南又東流過雲中西河郡東又南流過上都河東郡西而出龍門汾水從東於此入河東即龍門所在呂氏春秋曰龍門未開河出孟門東大溢是謂洪水禹鑿龍門始南流至華陰潼關與渭水合又東廻過砥柱砥柱山名河水分流包山而過山見水中若柱然今陜州東河北陜縣三縣界及洛陽孟津所在至鞏縣與洛水合成皋與濟水合濟水出河北至王屋山而南截河渡正對成皋又東北流過武德與沁水合至黎陽信都信都今冀州絳水所在絳水亦曰潰水一曰漳水鉅鹿之北遂分為九河鉅鹿今邢州大陸所在大陸澤名九河一曰徒駭二太史三馬頰四覆釜五胡蘇六簡七絜八鉤盤九鬲津又合為一河而入海齊桓公塞九河以廣田居故館陶貝丘廣川信都東光河間以東城池九河舊跡猶存漢伐河決金堤南北多罹其害議者常欲求九河故跡而穿之未知其所是以班固云自茲距漢以亡其八枝也河之故瀆自沙丘堰南分河出焉故尚書稱導河積石至于龍門今絳州龍門縣界南至于華陰北至于砥柱東至于孟津在洛北都道所湊古今以為津東過洛汭至于大伾洛汭今鞏縣在河洛合流之所也大伾山今汜水縣即故成皋也山爯成曰伾北過絳水至于大陸其絳水今冀州信都大陸澤名今邢州鉅鹿又北播為九河同為逆河入海是也同合出九河又合為一名為逆河逆迎也言海口有潮夕潮以迎河水書曰九河既道孔安國注曰河水分為九道詩曰關關睢鳩在河之洲又曰新臺有泚河水瀰瀰又曰河水洋洋北流活活又曰誰謂河廣一葦航之誰謂送遠予望之又曰不敢暴虎不敢憑河大戴禮曰聖人有國則河不滿溢禮斗威儀曰君乘土而王其政太平則河溓宋均注曰河不災溢也傳曰周詩有之曰俟河之清人壽幾何詩逸詩也言人壽促而河清遲喻晉之不可待也又曰楚昭王有疾卜河為祟大夫請祭王曰江漢沮漳楚之望也河非所獲罪春秋考異郵曰河者水之氣四瀆之精所以流化故曰河潤千里孝經援神契曰河者水之伯上應天漢史記曰秦滅六國自以為獲水德之瑞更名河曰德水漢書曰河有兩源一出葱嶺山一出于闐于闐在南山下其北流與葱嶺河合東注蒲昌海一名鹽澤又曰長水校尉高竝言河決率常於平原東郡左右其地形下而土䟽惡也聞禹理河本空此地以為水猥近察秦漢河決曹衛之域不過百八十里可空此也勿以為官亭民室張璠漢紀曰郭伋為穎川太守光武詔曰賢能太守去帝城不遠河潤九里冀京師并蒙其福魏志曰袁紹渡河沮授臨舟歎曰上盈其志下務其功悠悠黃河吾其濟乎說苑曰甘茂使齊渡河舩人曰河水猶澗耳君不能渡何王之能說乎甘茂曰持擑隨流臣不若子說萬乘之君子不如我桓譚新語曰大司馬張仲議曰河水濁一石水六斗泥而民競決河溉田令河不通利至三月桃花水至則決以其噎不泄也可禁民勿復引河韓詩外傳曰申徒狄非世將自投於河崔嘉聞而止之曰聖人民之父母也今為濡足之故不救溺人可乎申徒狄曰昔桀殺龍逄紂殺比干而亡天下吳殺子胥陳殺泄治而滅其國非無聖知不用故也遂負石而沉於河河圖始開圖曰黃帝問風后曰余欲知河之始開風后曰河凡有五皆始開乎崑崙之墟慎子曰西河下龍門其流駛竹箭抱朴子曰撮攘不能填決河升水不能冷原火又曰寸膠不能理黃河之濁尺水不能卻蕭丘之火淮南子曰武王伐紂至孟津陽侯之波逆流而擊疾風晦冥人馬不相見於是武王左操黃鉞右執白旄瞋目而麾曰余在天下誰敢害余意者於是風濟波罷又曰河以委虵委虵音逶迤故能遠山以陵遲故能高道以優游故能化又曰水九折注海而流不絕者有崑崙之輸也風俗通曰河播也播為九州也物理論曰河色黃眾川之流蓋濁之也百里一小曲千里一曲一直山海經曰從極之淵深三百仞唯冰夷恒都焉冰夷馮夷也淮南子曰馮夷得道以潛大川馮夷人面乘兩龍乘雲車駕二龍水經注曰禹理洪水觀於河見白面長人魚身出曰吾河精也授禹河圖而還於淵又曰昔澹臺子羽齎千金之璧渡河陽侯波起兩蛟挾舟子羽曰吾可以義求不可以威劫操歛斬蛟蛟死波休乃投璧於河三投而輒躍出乃毀璧而去示無恡意又曰崑崙在北去嵩高五萬里地之中也高萬一千里河水出其東北蕭廣濟孝子傳曰三洲人者各一州人皆孤單焭獨三人闇會樹下息因相訪問老者曰寧可合為斷金之業邪二人曰諾即相約為父子因命二人於大澤中作舍且欲成父曰此不如河邊二人曰諾河邊舍幾成父曰又不如河中二人復填河二旬不立有一書生過之為縛兩土肫投河中會父往呼止之曰嘗見河可填耶觀汝行耳相將而去明日俱至河邊望見河中土高丈餘祥瑞禮記曰河出馬圖言龍馬負圖也河圖曰黃帝云余夢見兩龍授圖乃齊往河洛而求有魚折溜而止魚汎曰圖跪而受之運斗樞曰舜與諸侯觀河洛有黃龍負圖出置帝前䠠入水而前去䠠之遊反又音帶䠠去也拾遺記曰黃河千年一清聖王之大瑞也易乾鑿度曰帝王將起河水先清清變白白變赤赤變黑黑變黃各三日中候曰榮光出河休氣四塞滎光即五色論語曰河不出圖吾已矣夫沉祭穆天子傳曰天子西狩獵獲白狐玄貉以祭于河禮記曰三王之祭川也皆先河後海此所謂務本言海之本源自河也史記曰元光中河決於匏子於是天子臨決河沉白馬玉璧於河令群臣從官自將軍以下皆負薪填決河而取淇園之竹以為堰天子既臨河決悼功之不成乃作瓠子之歌決塞穀梁傳曰梁山崩壅河三日不流晉君召伯尊伯尊遇輦者問焉輦者曰君親素縞帥群臣哭之既而祠焉伯尊至君問之伯尊如其言而河流矣左傳曰伯宗漢書曰成帝時河決潰金隄凡灌四郡河隄使者王延世塞以竹落長四丈大九圍盛以小石兩船夾載而下之三十六日河隄成改元為河平又曰賈讓奏言治河有上中下三策若徙其當水衝之人以避之放河使北入海泛濫期月自定不勞人力此功一立河定人安千載無患謂之上策若多穿漕渠使人得以溉田雖非聖人法然亦救敗術也今據堅地作石隄東西水門但用木以土耳旱則開東方水門以溉田水則開西方高門以分河此誠富國安人興利除害謂之中策茍繕完故堤增卑陪厚勞費無已數逢此害謂冣下策也又曰武帝元光中河水從頓丘發卒十萬救決河起龍淵宮武廟也自作之故言宮呂氏春秋曰故龍門未開呂梁未發河水孟門大溢逆流名曰洪水禹乃決江疏河為彭蠡之鄣所治者千八百國此禹之功文子曰江河之大溢不過三日水經注曰漢平帝之世河汴決壞未及得修汴渠東侵日月彌廣門閭故處皆水中也漢明帝永平十二年議治汴渠上乃引樂浪人王景問水形便景陳利害應對敏捷帝甚善之乃賜山海經渠書禹貢圖及以錢帛發卒數十萬詔景與將作謁者王吳治渠防築隄修堨起自滎陽東至千乘海口千有餘里景乃商度地勢鑿山開澗防遏衡要踈決壅積十里一門水更相廻注無復潰漏之患明年渠成帝親隨巡行詔濱河郡國置河堤員吏如西京舊制由是顯名王吳及諸從事者皆增秩一等順帝陽嘉中又自汴河口以東緣河積石為堰通淮曰金堤靈帝建寧中又增修石門以遏渠口水盛則通注津耗則輟流淮春秋說題辭曰淮出桐柏淮者均也均其務釋名曰淮圍也圍遶楊州北界東至海廣雅同說文曰淮出南陽平氏桐柏大復山東南水經注及山海經云淮水出南陽平氏縣桐柏山其源初則涌出復潛流三十里然後長騖東北經大復山從義陽郡北東過江夏平春縣北又東過新息縣南期思縣北至原鹿縣南與汝水合又東過廬江安豐縣與決水合東北至九江壽春縣東與穎水合壽春縣北與淝水合又東至當塗縣北與渦水合東北至下邳淮陰縣與泗水合東至廣陵淮浦縣而入海也近海數百里通朝夕潮尚書稱導淮自桐柏東會于泗沂入于海是也書曰淮沂其乂又曰泗濱浮磬淮夷蠙珠周禮曰橘踰淮而北為枳此地氣然也詩曰率彼淮浦省此徐土孟子曰禹排淮泗而注諸江焦貢易林曰江河淮海天之奧府眾利所聚可以饒有劉向說苑曰莊周貧往貸於魏文侯文侯曰待吾邑粟之來而奉之周曰乃今者周之來見道牛蹄中有鮒魚焉太息謂周曰我尚可活也周曰須我為汝向南詣楚王決江淮以溉汝鮒魚曰今命在盆甕之中耳乃為我見楚王決江淮以溉我汝即索我於枯魚之肆矣晉陽秋曰秦始皇東遊望氣者云五百年後金陵有天子氣於是始皇改曰秣陵塹北山以絕其勢今建康即秣陵西北界所塹即建康南淮也今謂之秦淮淮南子曰夫醉者超江津以為尋常之溝也濟釋名云濟濟也言源出河北濟河而南也水經注及山海經云濟水出河東垣縣王屋山初名流水風俗通云濟水出常山房子縣贊皇山此又則是一水耳應氏以為流入濟者非也東出溫縣西北始名濟水孔安國注尚書曰泉源為沇流去為濟在溫西北平地又東南流當鞏縣之北而南入河與河並流過成皋成皋今汜水縣晉書地道志曰濟自大伾入河與河水鬥大伾成皋古成皋兼包鞏縣之界溢出為滎水東流過陽武及封丘縣又東過朐縣南至定陶縣南又東北流與荷水會東至乘氏縣西分而為二其一東北流入鉅野澤過壽張西與汶水合又北過穀城縣西又東北過廬縣北經齊郡東萊郡而入海也尚書稱導沇水東流為濟河水所在也又東北會于汶又東北入于海是也淮南子曰濟水通和宜麥風俗通曰濟出常山房子贊皇山廟在東郡臨邑縣濟者齊也齊其度量也戴延之西征記曰濟水自大岯入河與河水鬥而東流劉向說苑曰泗瀆江河淮濟何以視諸侯能蕩滌垢濁焉能通百川於海焉能蕩出雲雨焉為德甚美故視諸侯周禮冬官曰鸜鵒不踰濟地氣然也左傳曰鄭伯之車僨于濟韓子曰清濟濁河足以為限長城巨防足以為塞齊五戰之國也
