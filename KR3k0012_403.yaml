body:
  text: 人事部四十三敘賢周禮地官曰以賢制爵則民慎德禮大學曰君子賢其賢而親其親詩黍離曰丘中有麻思賢也莊王不明賢人放逐國人思之而作是詩也丘中有麻彼留子嗟留大夫氏子嗟字也丘中麻麥子嗟所治箋云子嗟放逐於朝去治卑賤之識又曰白駒大夫剌宣王也剌其不能留賢者也皎皎白駒食我場苗縶之維之以永今朝宣王之末不能用賢者有乘白駒而去箋云願去者乘其白駒來者食我場中之苗縶絆之欲留也書大禹謨曰野無遺賢萬邦咸寧又曰任賢勿貳去邪勿疑又說命曰爵罔及惡德惟其賢又曰惟后非賢不乂惟賢非后不食又武成曰建官惟賢蒞事惟能又旅獒曰所寶惟賢則邇人安易曰坤地卦天地變化草木蕃天地閉賢人隱又大畜曰不家食吉養賢也又頤曰天地養萬物聖人養賢以及萬民又繫辭曰可久則賢人之德可大則賢人之業論語里仁曰君子見賢思齊焉見不賢者而內自省也齊等也省察也察己得無然也又雍也曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂賢哉回也簞笥也貧者人之所憂而顏志道有所樂故深賢之又述而曰冉有曰伯夷叔齊何人也子曰古之賢人也又衛靈公曰臧文仲其竊位者歟知柳下惠之賢而不與立柳下惠魯士師展禽也其邑名柳下謚曰惠也又子張曰叔孫武孫毀仲尼子貢曰仲尼不可毀也他人之賢者丘陵也猶可踰也仲尼日月也無得而踰焉春秋繁露曰氣之清者為神人之精者為賢治身以練神為寶治國以積賢為道大戴禮曰帝入西學上賢而貴德樂動聲儀曰召公賢者也明不能與聖人分職常戰慄恐懼故舍於樹下而聽斷焉勞身苦體然後乃與聖人齊是周南無美而召南有之韓詩外傳曰魏文侯問狐卷子曰父賢足恃乎對曰不足子賢足恃乎對曰不足兄賢足恃乎對曰不足弟賢足恃乎對曰不足臣賢足恃乎對曰不足文侯勃然作色而怒曰寡人問此五者於子子一以為不足者何也對曰父賢不過堯而丹朱放子賢不過舜而瞽瞍拘兄賢不過周公而管叔誅臣賢不若湯武而桀紂伐君欲治從身始人何恃國語曰智宣子將以瑤為後宣子荀寅瑤宣子之子智伯也智果曰不如霄也智果荀氏之族也霄宣子庶子也宣子曰霄也佷佷戾不從人也對曰霄之佷在面瑤之佷在心心佷敗國面佷不害瑤之賢於人者有五其不逮者一美鬢長大則賢鬢髮鬢也射御足力則賢伎藝必給則賢巧文辯惠則賢強毅果敢則賢若是而甚不仁以其五賢陵人而以不仁行之其誰能待之若果立瑤也智宗必滅弗聽智果別族于太史為輔氏太史掌氏姓也及智氏之亡也唯輔果在又曰臼季使舍於冀野臼季胥臣冀野晉地見冀缺耨其妻饁之相敬如賓耨耘田也野饋曰鎑字音曄從而問之冀芮之子也與之歸既復命進之曰臣得賢敢以告文公曰子何以知其賢對曰臣見其賢不忘敬也公使為下軍大夫史記曰燕昭王於破燕之後即位卑身厚幣以招賢者謂郭隗曰齊因孤之國亂襲破燕孤極知燕小力少不足以報然得賢士與共國以雪先王之恥孤之願也先生視可者得身事之郭隗曰王必欲致士必從隗始況賢於隗者豈遠千里哉於是昭王為隗改築宮而師事之又曰伯禽就封於魯周公戒伯禽曰我文王之子武王之弟成王之叔父我於天下亦不賤矣然我一沐三握髮一飯三起以待士猶恐失天下之賢人子之魯慎無以國驕人又曰楚昭王聘夫子夫子往焉路出東蔡大夫謀曰夫子賢者所剌譏皆中諸侯之病若用於楚則陳蔡危矣遂使兵拒之孔子不得行家語曰孔子謂宓子賤曰子治單父眾悅何施而得之對曰此地民有賢於不齊者不齊事之事而稟度焉皆教不齊以治道孔子歎曰昔堯舜聽天下務求賢以自輔夫賢人百福之宗神明之主也惜乎不齊之所治小也又曰子夏問於孔子曰顏回之為人奚若子曰回之信賢於丘曰子貢之為人奚若子曰賜之敏賢於丘曰子路之為人奚若子曰由之勇賢於丘曰子張之為人奚若子曰師之莊賢於丘子夏避席而問曰然則四子者何為事先生子曰居吾語汝夫回能信而不能反反謂反信也君子言不必信唯義所在也賜能敏而不能詘詘人唯辯敏亦宜有折屈時也由能勇而不能怯師能莊而不能同言人雖務莊亦當有和同時也兼四子者之有以易吾吾弗與也此其所以事吾而不及也又曰孔子讀史至楚復陳夏徵舒殺其君楚莊王討之取陳而有之申叔時諫莊王莊王從之乃復陳國也喟然曰賢哉楚莊王輕千乘之國而重一言之信非申叔時之忠弗能建其義非莊王之賢弗能受其訓又曰所謂賢者德不踰閑閑法行中規繩又曰哀公問於孔子曰當今之君孰者最賢孔子對曰丘未之見抑有衛靈公乎公曰吾聞其閨門之內無別而子次之賢何也孔子對曰臣論其朝廷行事不論其私家之際也公曰其事何也孔子曰靈公之弟曰公子渠牟其智足以治千乘其信足以守之靈公愛而任之又有士曰王林者見賢必進之而退與分其祿是以衛國無遊放之才靈公知而尊之又有士曰慶足者國有大事則必起而治之國無事則退容賢言其所以退欲以容賢於朝靈公悅而敬之又有大夫史鰌以道去衛靈公郊舍三日琴瑟不御必待史鰌之入而後敢入臣以此取之難次之賢不亦可乎孔叢子曰魯人有公儀潛者厲節行道恬於榮利不事諸侯子思之與友穆公因子思欲以為相謂子思曰公儀子必輔寡人寡人三分魯之一子思對曰如君之言則公儀愈所不至也若飢渴待賢納用其言儀雖蔬食飲水亦願在下風今徒以高官厚祿釣餌君子無信人之意公儀子則終身不躡乎君之庭矣且臣不任為君操竿不釣以傷守節之士也又曰子思自齊反衛君館而問曰先生魯國之士不以衛褊小猶步玉趾而慰存之願有賜於寡人子思曰羈旅於此而辱君之威尊亟臨蓽門其榮多矣欲報君以財弊則君府藏已盈而伋又貧欲報君以善言恐未合君心而徒言不聽也願有報君者唯達賢耳君曰固寡人所願也任子曰夫賢人者至德以為己心行道以為己任處則不求私名仕則不求私寵不為其身不阿其君積禮義於朝播仁風於民使天下之人翼翼焉向戴其君之尊欣欣焉歌舞其君之德文子曰山有猛獸林木為之不斬野有螫蟲葵藿為之不採國有賢臣折衝千里列子曰牛缺者上地之大儒也至邯鄲遇盜於耦沙之中盡取其衣裝車牛步而去視之欣然無憂苦之色盜追而問其故曰君子不以所養害其所養盜曰嘻賢矣既而相謂曰彼之賢往見趙君使以我為事必困我乃相與追而殺之孫卿子曰古之賢人賤為布衣貧為匹夫然而非禮不進非義不受莊子曰以財分人謂之賢尹文子曰尹文子見齊宣王王歎國寡賢尹文子曰使國悉賢孰處王下王曰國悉不肖可乎尹文子曰國悉不肖孰理王朝王曰賢與不肖皆無可乎尹文子曰不然有不肖故王尊於上臣卑於下進賢退不肖所以有上下也王孫子曰趙簡子獵於晉山之陽撫轡而歎董安于曰敢問何歎子曰吾有食殺之馬數千多力之士數百欲以獵獸也吾恐鄰國養賢以獵吾也文子曰虎豹之駒未成而有食牛之氣鴻鵠之翼未合而有四海之心賢者之生亦然也又曰國之所以不治者三不知用賢此其一也或求賢不能得此其二也雖得弗能盡此其三也申子曰千里有賢者是比肩而立韓子曰晉平公問叔向曰吾群臣孰賢對曰趙武賢武之立如不勝衣言如不出口然其所舉士者數十人皆令得其意而公家甚賴之況武子之生也不利其家死不託其孤臣敢以為賢孟子曰國君進賢如不得已將使卑踰尊踈踰戚可不慎歟左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之呂氏春秋曰伊尹出空桑之中長而賢湯聞伊尹使人請之有侁氏有侁氏不可伊尹亦欲歸湯湯於是請取妻於有侁氏有侁氏喜使伊尹為媵送女故賢主之求有道之士無不以也有道之士求賢主無不行也相得然後樂不謀而親不約而信相為殫智竭力犯危行苦志懽樂之此功名所以大成也又曰百里奚之未遇時亡虢而虜飯牛於秦鬻以五羊之皮公孫枝得而悅之獻諸繆公三日請屬事公曰賈之五羊之皮而屬事無乃為天下笑乎枝曰信賢而任之君之明也議賢而下之臣之忠也君為明君臣為忠臣彼為信賢境內將服敵國且畏夫誰暇笑哉遂用之謀無不當舉必有功號曰五羖大夫又曰史台謂申向曰吾所患者不知賢申向曰人之患不在乎不言用賢而在乎不誠用賢夫言用賢者口也卻賢者行也言行相反而欲賢者用不肖者廢不亦難乎人主誠用賢則境內賢者出矣天下賢者至矣又曰得十良馬不如得一伯樂得十良劍不如得一歐冶得地千里不如得一賢人又曰魏文侯過段干木之閭而軾其僕曰君胡為軾曰此非段干木之閭歟干木蓋賢者也吾安敢不軾又曰趙簡子將襲衛使史墨行瞶之瞶視也音貴期以一月六月而反復簡子曰何其久也對曰謀利而得害猶弗察也蘧伯玉為相史鰌佐焉孔子為客子貢使令於君前甚聽君聽其言易曰渙其群元吉渙者賢也群者眾也元者吉之始也渙其群元吉者其佐多賢簡子案兵而不動周書陰符曰凡治國有三常一曰君以舉賢為常二曰官以任賢為常三曰士以敬賢為常夫然雖百代可知也京房易飛候曰何以知賢人隱師曰視四方有大雲五色具而不雨下賢人隱也易參同契曰天道無適莫常傳與賢者黃石公三略曰傷賢者殃及三世蔽賢者身當遭害達賢者福流子孫嫉賢者其名不令陸賈新語曰聖人居高處上則以仁義為巢乘危履傾則以聖賢為杖說苑曰周公卜居曲阜命龜曰作邑于山之陽賢則茂昌不賢則速亡又曰夫朝無賢人猶鴻鵠之無羽翼是故絕江海者託於舡致遠道者託於乘欲霸王者託於賢又曰明君在上慎於擇士務於求賢設四佐以自輔有英俊以治官又曰伯禽與康叔封朝成王見周公三見而三笞康叔駭色謂伯禽曰有商子者賢人也與子往見之康叔與伯禽見商子曰吾二子者朝乎成王見周公三見而三笞其說何也商子曰二子蓋相與觀南山之陽有木焉名曰橋二子者往觀乎南山之陽見橋竦然實高而仰反以告商子商子曰仰者父道也商子曰二子蓋相與觀乎南山之陰有木焉名曰梓二子者往觀乎南山之陰見梓勃焉實而俯反以告商子商子曰俯者子道也二子者明日見乎周公入門而趍登堂而跪周公拂其首勞而食之曰安見君子二子對曰見商子周公曰君子哉商子也又曰孔子之郯遭程子於塗傾蓋而語終日有間顧謂子路曰取束帛以贈先生子路不對有間又顧謂曰取束帛以贈先生子路悄然對曰由聞之也士不中間而見女無媒而嫁君子不行也孔子曰詩不云乎野有蔓草零露團兮有美一人清陽婉兮邂逅相遇適我願愿兮今程子天下之賢士於是不贈終身弗見也中間謂紹介也六韜曰文王舉賢若何太公曰案察實選才任能名實俱得也物理論曰在金石曰堅在草木曰緊在人曰賢千里一賢謂之比肩故語曰黃金累千不如一賢杜氏幽求曰周封千里而已八州之地皆以祿賢抱朴子曰桓文漢高鼓群賢以為六翮託豪傑以為舟楫傅子曰或問近世大賢君子若荀令君之仁荀軍師之智斯可謂近世大賢人士君子矣荀令君仁以立德明以舉賢行無謟瀆謀能應機孟軻稱五百年而有王者其間必有命世者其荀令君乎桓譚新論曰以賢代賢謂之順以不肖代不肖謂之亂論衡曰賢聖之君察知佞臣若視俎上之脯指掌中之文風俗通曰賢堅也堅中廉外白虎通曰王者即位先封賢者憂民之急也故列土為疆非為諸侯張官設府非為卿大夫皆為民也越絕書曰子胥正而信范蠡智而明皆賢人也潛夫論曰南面之大務莫急於知賢異苑曰汝南陳仲躬與諸息姪就穎川荀季和父子于時德星為之藂太史奏曰五百里內有賢人集列女傳曰衛靈公與夫人夜坐聞車聲轔轔至闕而止過闕復有聲公問曰知此為誰夫人曰此必蘧伯玉也問何以知之曰妾聞禮下公門式路馬所以廣敬也夫忠臣不為昭昭信節不為冥冥墯行今伯玉衛國賢大夫也仁而有智敬於事上此其人必不以闇昧廢禮是以知之公使視之果伯玉也反戲之曰非也夫人進觴再拜賀之公曰子何以賀曰始妾謂獨有伯玉今衛復有與之齊者是君有二賢臣也國多賢臣則國之福也西京雜記曰漢文帝為太子立思賢菀以招賓客周斐汝南先賢傳曰黃憲潔靜通理齊聖廣淵不矜名以詭時不抗行以矯俗論者咸曰顏子復生乎漢之代矣語林曰賢者國之紀人之望自古帝王皆以之安危故書曰惟后非賢不乂惟賢非后不食昔者周公體大聖之德而勤於吐握由是天下之士爭歸之向使周公驕而且吝士亦當高翔遠去所至寡矣王褒聖主得賢臣頌曰夫賢者國家之器用也君人者勤於求賢而逸於得人故聖主必待賢臣而弘功業俊士亦候明主以顯其德千載一會論說無疑翼乎如鴻毛之遇順風沛乎若巨魚之縱大壑其意如此則胡禁不止曷令不行鍾子芻蕘論曰賢者之處世猶金王生於沙礫豫章產乎幽谷下不進之於上則無由而至矣
