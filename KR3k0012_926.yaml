body:
  text: 羽族部十二鴛鴦歸藏曰有鳧鴛鴦有鴈鷫鷞詩曰鴛鴦剌幽王也思古明王交於萬物有道自奉養有節焉鴛鴦于飛畢之羅之君子萬年福祿宜之鴛鴦在梁戢其左翼君子萬年宜其遐福西京雜記曰趙飛燕為皇后其女弟昭儀在昭陽殿遺飛燕書曰今日嘉辰貴姊懋膺洪冊上檖三十五條以陳踴躍內有鴛鴦襦鴛鴦被魏志曰文帝問占夢周宣曰吾夢殿屋兩瓦墮化為雙鴛鴦此何為也宣對曰後宮當有暴死者上曰吾詐卿耳宣曰夫夢意也茍以形言便占吉凶言未卒黃門令奏宮人相殺干寶搜神記曰大夫韓憑其妻美宋康王奪之憑怨王囚之憑遂自殺妻乃陰腐其衣王與之登臺自投臺下左右投衣衣不勝手遺書於帶曰願以尸還韓氏而合葬王怒令埋之二冢相對經宿忽有梓木生二冢之上根交於下枝連其上有鳥如鴛鴦雌雄各一恆栖其樹朝暮悲鳴音聲感人古今注曰鴛鴦水鳥鳧類雌雄未嘗相離人得其一則一者相思死故謂之匹鳥楚詞曰鴛鴦兮噰噰古詩曰客從遠方來遺我一端綺文彩雙鴛鴦裁為合歡被又曰入門時左顧但見雙鴛鴦鴛鴦七十二羅列自成行鄭氏婚禮謁文贊曰鴛鴦雌雄相類飛止相匹鸂鶒臨海異物志曰鸂鶒水鳥毛有五彩色食短菰其在溪中無毒氣劇談録曰河南府尹闕前臨大溪每僚佐有入臺者則水中沙有小灘漲出石礫金光澄徹可愛牛僧孺為縣尉一旦忽報灘出翌日宰邑與同僚列筵於亭上觀之因召老宿備詢其事有老吏云此必分司御史非西臺之命若是西臺灘上當有鸂鶒雙立前後居人以此為則僧孺潛揣縣僚無出己者因舉柸曰既能有灘何惜一雙鸂鶒宴未終俄有鸂鶒飛下不旬日拜西臺御史鵁鶄爾雅曰鵁鶄郭璞注曰似鳧腳高毛冠江東人家畜之以厭火災鳴音鶂肩反說文曰鳽鵁鶄也一曰鵁鸕西京雜記曰魯恭王好鬭雞鴨養孔雀鵁鶄奉穀一年二千石異物志曰鵁鶄巢於高樹顛生子未能飛皆銜其母翼飛下地飲食夢書曰夢見鵁鶄居不雙也婦見之此獨居也壻見之恐失妻也雄雌俱行淫佚遊也唐書曰玄宗嘗遣中官往江南採捕鵁鶄及諸水禽汴州刺史倪若水上疏諫曰方今九扈時忙三農作苦田夫擁耒蠶婦持桑而以此時採捕奇禽異鳥供園池之玩遠自江嶺達於京師水備舟舫陸倦擔負飯之以魚肉間之以稻梁道路觀者莫不以陛下賤人而貴鳥也陛下當以鳳凰為凡鳥麒麟為凡獸即鵁鶄鸂鶒曷足為貴也鷗倉頡解詁曰鷖鷗也生藕葉上名水梟說文曰鷗水梟也山海經曰玄服國其人食鷗南越志曰江鷗一名海鷗在漲海中隨潮上下常以三月風至乃還洲嶼生卵似雞卵色青頗知風雲若群飛至岸必風漁人及度海者皆以此為候列子曰海上之人有好鷗鳥者每旦之海上從鷗鳥遊鷗鳥之至者百數而不止其父曰吾聞鷗鳥皆從汝遊取來吾玩之明日之海上鷗鳥舞而不下也晉咸和起居注曰二年正月饗萬國有五鷗集太極殿前晉中與徵祥說曰鷗集太極殿殿非鷗所處湖澤鳥也時蘇峻作逆宮室被焚唐書曰崔湜既私附太平公主時人咸為之懼門客陳振鷺獻海鷗賦以諷之湜雖稱善而心實不悅鷺詩曰坎其擊鼓宛丘之下無冬無夏值其鷺羽鷺鳥之羽可以翳舞者所持以指麾又曰振鷺二王之後來助祭也振鷺于飛于彼西雍我客戾止亦有斯容又曰振振鷺鷺于下鼓咽咽醉言舞于胥樂兮毛詩義疏曰鷺水鳥好白而潔故謂之白鳥齊魯之間謂之春鋤遼東樂浪吳楊人皆云白鷺大小如鷂青腳高尺七八寸解指尾如鷹尾啄長三寸頂上有毛十數枚長尺餘毿毿然衆毛異甚好將欲取魚時弭之今吳乂亦養之好群飛行楚成王時有朱鷺合沓飛舞則復有赤色舊鼓吹曲有朱鷺是也爾雅曰鷺舂鋤郭璞注曰白鷺也頭翅皆上皆有長翰毛江東以取為接離名之月白鷺穆天子傳曰天子作詩三章以哀民曰有皎者鵅鵅鳥名音路鶣鶣其飛幽明録曰巴東有一道士忘其姓名事道精進入屋燒香忽有風雨至家人見一白鷺從屋中飛出雨住遂失道士所在古金樂録曰吳王夫差時有雙鷺飛出鼓中而去南史曰張融年弱冠同郡道士陸修靖以白鷺羽扇遺之曰此異物奉異人䳭鴒詩曰䳭鴒在原兄弟急難毛詩義疏曰䳭鴒水鳥一名渠梁大如鷃雀腳長尾尖背上青灰色腹下白頸下黑如連錢故桂陽謂之連錢爾雅曰䳭鴒雍渠郭璞注曰雀屬也飛則鳥行則搖鷁左傳曰正月戊申六鷁退飛過宋都風也莊子曰夫白鷁之相視眸子不運而風化列子曰河澤之鳥視而孕曰鶂録異傳曰弘公者吳興烏程人患瘧經年弘後獨至旁舍瘧發有數小兒或騎公腹或扶公首腳公因佯眠忽起捉得一兒遂化成黃鷁餘者皆走公乃縛以還家暮懸窗上云明日當殺食之比曉失鷁處公瘧遂斷于時人有得瘧者但依弘便瘧斷晉書曰武帝謀伐吳詔王濬修舟艦濬乃作大船連舫方百二十步受二千餘人以木為城起樓櫓開四出門其上皆得馳馬來往又畫鷁首怪獸於船首以懼江神博物志曰白鷁雄雌相視則孕或曰雄鳴上風雌鳴下風則亦孕劉禎魯都賦曰緑鷁蔥鸊鷉爾雅曰虪須羸似鳧而小膏中螢刀揚雄方言曰野鳧甚小而好沒水中者南楚之外謂之鸊鵜大者謂之鶻鵜纂文曰鵒施石擊開零皆野鴨沒食曰鵅長頸曰施多白曰開零在山澗曰石擊白𪇰爾雅曰鵅烏𪇰郭璞注曰水鳥也似鶂而短頸後翅紫白色皆上緑色江東呼為鳥𪇰音駁卞敬宗𪇰賦曰烏真野之性備於俯仰之間專視緩步有自卑之志鴇詩曰鴇羽剌時也晉昭公之後大亂五世君子下從征役不得養父母也肅肅鴇羽集于苞栩肅肅鴇行集于苞桑肅肅鴇翼集于苞棘禮曰雞肝鴈腎鴇奧鹿胃鄭玄云奧脾鶢鶋爾雅曰鶢鶋雜縣郭璞注曰漢文帝時琅琊有大鳥如馬駒時人謂之爰居廣志曰馬鳥鶢鶋莊子曰海鳥止於魯郊魯侯觴之於廟奏九韶以為樂具太牢以為膳鳥胘視憂悲不敢食一臠不敢飲一杯三日而死此以人養鳥也不如以鳥養鳥司馬彪曰即鶢鶋也國語曰海鳥曰委居止於魯東門之外三日爰居雜縣東門城門臧文仲使國人祭之文仲不知以為神展禽曰越哉臧孫之為政也越足也言其迂闊不知政要也夫祀國之大節也節制而節政之所成也言節所以成政故慎制祀以為國典今無故而加典非政之宜也夫聖王之制祀也功施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能扞大患則祀之非是族也不在祀典今海鳥至己不知而祀之以為國典難以為仁且智矣夫仁者講功而智者處物無功而祀之非仁也不知而不問非智也今茲海其有災乎夫廣川之鳥獸恆知而避其災也是歲也海多大風鵜鶘爾雅曰鵜鶘鴮鸅郭璞注曰今之鵜鶘也好群飛入水食魚故名夸睪俗呼為陶河毛詩疏曰唯鵜在梁許慎曰鵜鶘也一名汗澤一名陶河水鳥身形似鴆而極大啄長尺餘直而廣目中赤𪁟下故大如數斗囊若有小水魚便抑水滿其湖而棄之令水竭盡魚在陸地乃共食之故曰陶河魏志曰五月有鵜鶘集靈芝池詔曰此詩人所謂污澤也曹詩㓨恭公遠君子而近小人今豈有賢智之士處于下位乎否則斯鳥胡為而至其博舉天下雋德茂材獨行君子以答曹人之㓨山海經曰憲斯之山沙水出焉其中多鵜鶘如鴛鴦而人足其鳴自叫見國有土功莊子曰魚不畏網而畏鵜鶘網者公平無私鵜鶘有心故魚畏之明主行賞罰如網淮南子曰鵜鶘飲水數升而不足鸕鷀爾雅曰鷀鷧郭璞注曰即鸕鷀也觜角曲如鉤食魚異物志曰鸕鷀不生卵而孕雛於池澤間又吐生多者八九少者五六相連而出若系緒水鳥而巢高樹上或在石窟之間隋書曰俀國草木冬青土地膏腴水多陸少以小環挂鸕鷀項令入水捕魚得百餘頭以充食唐書曰貞元十三年四月上以自春已來時雨未降正陽之月可行雩祀遂幸興慶宮龍堂兆庶祈禱忽有白鸕鷀沉浮水際群類翼從其後左右侍衛者咸驚異之俄然莫知所往方悟龍神之變化遂相率蹈舞稱慶至乙丑果大雨遠近滂沱於是宰臣等上表陳賀范汪治咽方曰咽鸕鷀啄即愈治鯁燒鸕鷀羽水服半錢即下若呼鸕鷀鸕鷀亦有下者婟澤爾雅曰紡澤虞孫炎注曰尸鴆或謂紡澤虞其別名郭璞注曰今澤也常在澤中見人輒鳴不去有象主守之官因名之也鸛雀說文曰鸛雀也詩曰我來自東零雨其濛鸛鳴于垤婦歎于室毛詩義疏曰鸛一名負釜一名背竈一名皂君泥其巢一旁為池含水滿之取魚置池中食其雛若殺其子則一村致災旱華嶠後漢書曰楊震字伯起年五十始應州郡之辟衆人謂之晚暮後有鸛雀銜三鱣魚飛集講堂前都講取魚進曰蛇魚者卿大夫之服象也數三者法三台也先生自此升矣淮南萬畢術曰天雄鸛胎日行千里取鸛鳥胎於月中暴一日一夜增天雄一月用三十天雄而井治為丸大如梧子欲行吞一丸得騰蛇膽和大良去天雄乃膳獨即行千里桓談新語曰昔有鸛郡國皆殺之而三輔俗不敢取取或雷霹靂起原天不獨在彼而在此其殺取時正與雷偶耳抱朴子曰以鸛血塗金丹一丸內衣中以指物隨口變化神農本草曰鸛骨味甘無毒治鬼蟲諸㾏五尸心腹疾博物志曰鸛水鳥也伏卵時數入水卵冷則不孕取礐石周圍繞卵以助暖氣故方術家以鸛巢中暖礜石為真物列仙傳曰木羽者巨鹿人母貧賤主助産産探婦婦兒生開目大笑母大怖暮夢見大冠赤幘者守兒言此即司命君當報汝恩使汝子木羽得仙母陰識之生兒字木羽所探兒至年十五夜有車馬來迎之過呼木羽為我御車遂俱去又二十餘年鸛雀旦以二尺魚著戶上母匿不道而賣其魚四十餘年母乃終鶖詩曰有鶖在梁說文曰鶖禿鶖也環氏吳紀曰嗣主問中書令張尚鳥之中大者唯鶴小者雀乎尚曰大者有禿鶖小者鷦鷯嗣主忌勝己因徙尚楚辭曰鵾鴻群晨雜鶖鶬鵾鵾雞也鴻吉也鶖禿鶖後魏書曰正光二年八月獲禿鶖於宮內詔以示崔光崔光表曰蒙示十四日所得大鳥此即詩所謂有鶖在梁解云禿鶖也貪惡之鳥野澤所育不應入於殿庭昔魏氏黃初中有鵜鶘集于靈芝池文帝下詔以曹恭公遠君子近小人博求賢俊太尉華歆由此遜位而讓管寧也臣聞野物入舍古為不善是以張珔惡隼賈誼忌鵩鵜鶘暫集而去前王猶為至誡況今親入宮禁為人所獲方被畜養宴然不以為懼准諸往義信有殊矣且號叨餮之禽必資魚肉菽麥稻梁時或餐啄一食之費容過斤溢今春夏陽旱穀糴稍貴窮窘之家時有菜色陛下為民父母撫之如傷豈可棄人養鳥留意於醜形惡聲哉衛侯好鶴曹伯愛鴈身死國滅可為寒心陛下學通春秋親覽前事何得口詠其行未遵誠願遠師殷宗近法魏祖修德延賢消災集慶放無用之物棄之川澤取樂琴書頤養神性肅宗覽表大悅即棄之池澤南史曰齊晉安王子勛即僞位於尋陽其夕有禿鶖鳥集城上唐書曰會昌曰元年六月有禿鶖鳥集于禁苑鶬爾雅曰鶬縻鴰郭璞注曰今呼鶬鴰音箭括一音利也莊子曰大鶬飽食仰天而噓列子曰蒲且子之弋連雙鶬於青雲之際楚辭曰酸鵠臇鳥臇小臛也煎鴻鶬江賦曰奇鶬九頭精衛山海經曰炎帝之女名媱游于東海溺而不反是為精衛常取西山之木石以堙東海述異記曰昔炎帝女溺死東海中化為精衛其鳴自呼每銜西山木石以填東海怨溺死故也海畔俗說精衛無雄耦海燕而生生雌狀如精衛生雄狀如海燕今東海畔精衛誓水處猶存溺於此川誓不飲其水一名誓鳥一名宛禽又名志鳥俗呼為帝女雀博物志曰有鳥如烏文首白喙赤足名曰精衛昔赤帝之女名女媱往遊于東海溺死而不反其神化為精衛故精衛常取西山之木石以填東海左思衛都賦曰𦐊𦐊音祗精衛銜木償怨左思吳都賦曰精衛銜石而遇繳文鰩夜飛而觸綸水扎鳥南夷志曰水扎鳥出昆明池冬月遍於水際
