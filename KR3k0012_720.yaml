body:
  text: 服用部二十一粉釋名曰粉分也研米使分散也赬勑貞切粉者赤也染粉使赤以著頰也墨子曰禹造粉博物志曰紂燒鉛錫作粉漢書曰廣川王去幸姬陶望卿去疾后昭信謂去疾曰前畫工畫望卿𥘵裼傅粉疑有姦又曰惠帝侍中皆傅脂粉續漢書曰順帝時所除官多不次李固奏免百餘人此等既怨共作飛章誣固曰大行在殯路人掩涕固獨胡粉飾貌搔頭弄姿盤旋偃仰曾無慘怛之心魏書曰何晏自喜動靜粉白不去手行步顧影魏略曰邯鄲淳詣臨淄侯植時天暑植取水浴以粉自傅科頭胡舞擊劍誦小說顧謂淳曰邯鄲生何如也韓子曰若毛嬙西施之美麗無益吾面用脂澤粉黛則倍其初言先王仁義無益於治明法度必賞罰則國之脂澤粉黛淮南子曰漆不厭黑粉不厭白袍朴子曰或問涉海之法答曰先於川次破雞子一枚以少粉雜香末合攪水中則不畏風波又曰民不信黃丹及胡粉是化鉛所作神仙傳曰真人南極子能含粉成雞子吐之數十枚煮之雞子黃中皆有少粉也華陽國志曰巳郡江西縣有清水穴巴人以此水為粉則皓曜鮮芳嘗貢京師名為粉水扶南傳曰頓遜國有磨夷花末之為粉大香夢書曰婦人夢粉飾為懷妊神農本草曰粉錫一名鮮錫語林曰石崇廁置甲煎粉沉香汁之屬漢官儀曰省中以胡粉塗壁鄴中記云石虎以胡粉和椒塗壁曰椒房宋玉登徒子賦曰著粉太白施朱太赤蔡雍女誡曰弘粉則思其心之鮮曹植樂府曰御巾粉於君傍中有藿納都梁傅長虞感涼賦曰珠汗隕於王躬粉附身而沽凝黛說文作黱畫眉也鰧與黛同釋名曰黛代也滅去眉毛以此代其處也通俗文云染青石謂之點黛後漢書曰明德馬后眉不施黛獨左眉角小缺補之如粟宋起居注曰河西王沮渠蒙遜獻青雀頭黛百斤楚詞曰粉白黛黑施芳澤長袂拂面善留客脂澤釋名曰澤人髮恆枯瘁以此濡澤之脣脂以丹作象脣赤也廣志曰面脂魏興已來始有之漢書曰翁伯販脂而傾縣邑又曰孔奮為姑臧長清儉人或譏之以身處脂膏不能自潤北史后妃傳曰晉舊儀典櫛三人掌宮中櫛膏沐世說曰江淮以北謂面脂為面澤蔡雍女誡曰傅脂則思其心之和澤髮則思其心之潤馮衍集曰衍與婦弟任武達書曰惟一婢武所見頭無叉澤面無脂粉燕脂博物志曰作燕支法取藍花違委切搗以水洮去黃汁作十餅如手掌著濕草臥一宿便陰乾欲用燕支以水浸之三四日以水洮赤黃汁盡得赤汁而止也西河舊事曰祁連山焉支山宜畜養胸奴失此二山乃歌曰失我祁連山使我六畜不蕃息失我焉支山使我婦女無顏色崔豹古今注曰燕支葉似蒯花似菖蒲出西方土人以染名為燕支中國人謂紅藍以染紛為婦人面色謂為燕支粉也習鑿齒與燕王書曰此下有紅藍足下先知之不北方人採取其花染緋黃接其止英者作燕支婦人用為顏色可愛班固曰胸奴名妻作閼氏言可愛如燕支的釋名曰以丹注面曰的的灼也此本天子諸侯有群妾者以次進御有月事者止不御重不口說故注此於面灼然而識也王粲神女賦曰施華的結羽叉傅玄鏡賦曰珥明璫之迢迢點雙的以發姿花勝釋名曰花勝草化也言人形容正等著之則勝續漢書輿服志曰皇后入廟為花勝上為鳳皇以翡翠為毛羽下有白珠垂金綺鑷橫簪之山海經曰西王母梯凡戴勝符瑞圖曰金勝者仁寶也不斷自成光若明月晉中興書曰一名金稱援神契曰神靈滋液百珍寶用有金勝晉孝武時陽穀氏得金勝一枚長五寸形如織勝
