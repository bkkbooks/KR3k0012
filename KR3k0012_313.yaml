body:
  text: 兵部四十三決戰中後漢書曰賈復與五校戰於真定大破之復傷瘡甚光武大驚曰我所以不令賈復別將者為其輕敵果然失吾名將聞其婦在孕生女耶我子娶之生男耶我女嫁之不令其憂妻子也復病尋愈追及大武於薊相見甚歡又曰銚期從擊王郎將兒劉宏奉於巨鹿下兒五奚切期先登陷陳手殺五十餘人被瘡中額攝憤復戰攝猶正也遂大破之又曰祭遵與景丹諸將南擊弘農厭新柏華蠻中賊東觀記史柏華聚名弩中遵口洞出血流衆見遵傷稍引退遵呼叱止之士卒戰皆自倍遂大破之又曰帝在魯聞耿弇為張步所攻自往救之未至陳俊謂弇曰劇虜兵盛可且閉營休士以須上來弇曰乘輿且到臣子當擊牛釃酒以待百官反欲以賊虜遺君父耶乃出兵大戰自旦及昏復大破之殺傷無數城中溝塹皆滿又曰岑彭征公孫述乃令軍中募攻浮橋先登者授賞於是偏將軍魯奇應募而前時天風狂急彭奇船逆流而上直衝浮橋而攢柱鉤而不得去續漢書曰時天東風其攢柱有反把鉤奇船不得去奇等乘勢殊死戰因飛炬焚之風急火盛橋樓崩燒彭復悉軍順風並進所向無前蜀兵大亂溺死者數千人又曰張步攻耿弇營與劉歆等戰弇升王宮瓌臺望之臨淄本齊國所都即齊王宮中有環臺也東觀記作瓌臺視歆等鋒交乃引精兵以橫突步陳於東城下大破之飛矢中弇股以佩刀截之左右無知者又曰袁紹使麴安攻公孫瓚紹在後十數里聞瓚已破發鞍息馬唯衛帳下強弩數十張大戟士百許人瓚散兵二千餘騎卒至圍紹數重射矢雨下田豐扶紹使却入空垣紹脫兜鍪抵地曰大丈夫當前鬥死而返逃垣墻間耶促使諸弩並發多傷瓚騎衆不知是紹頗稍引却會麴義來迎騎乃散退又曰鄧禹還長安張宗夜將鋭士入城襲赤眉中矛貫脾脾背上兩膊間又轉攻諸營保為流矢所激皆幾至於死又曰賈復從上擊青犢於射犬大戰至日中賊陳堅不却光武傳召復曰吏士皆飢可但朝飯復曰先破之然後食耳於是被羽先登被猶負也折羽為旌旌旗將軍所執先登先赴敵也所向皆靡賊乃敗走諸將咸服其勇又曰陳俊字子昭拜強弩將軍所向皆敗世祖曰戰將盡如此豈有憂乎魏志曰母丘儉字仲恭有幹策為幽州刺史度遼將軍儉以高句驪數侵叛督將軍出玄菟從道滑討之句驪王宮將步騎逆軍沸水上大戰宮連破走遂束馬懸車登九都山屠高麗所斬獲首虜以千數使玄菟太守王頎追過沷沮千餘里至肅慎界刻石紀功刊丸都之山銘不耐之城又曰代郡烏桓反以任城王彰為北中郎將行驍騎將軍臨發太祖誡彰曰居家為父子受事為君臣動以王法從事爾其誡之彰北征入涿郡界叛胡數千騎卒至時兵馬未集唯有步卒千人騎數百匹用田豫計固守要隟虜乃散退彰追之身自戰射胡騎應弦而倒者前後相屬戰過半日彰鎧中數箭意氣益廣乘勝逐北至于乘乾臣松之案乘乾縣名屬代郡今北虜居之號為乘乾郡去代二百餘里長史諸將皆以為新涉遠士馬疲又受節度不得過代不可深進遺令輕敵彰曰率師專行唯利所在何節度乎胡走未遠追之必破從令縱敵非良將也遂上馬令軍中後出者斬一日一夜與虜相及擊大破之斬首獲生以千數彰乃倍常科大賜將士將士無不悅喜時鮮卑大人軻比能將數萬騎觀望強弱見彰力戰所向皆破乃請服北方悉平時太祖在長安召彰彰自代過鄴太子謂彰曰卿新有功今西見上勿宜自伐彰到如太子言歸功諸將太祖喜持彰鬚曰黃鬚兒竟大可用又曰龐德與曹仁討關羽德屯沔北十里會天霖雨十餘日漢水暴溢樊下平地五六丈德與諸將避水上隄羽乘船攻之以大船四面射隄上德披甲荷弓箭不虛發將軍董衝部曲將統超等欲降德皆收斬之自平旦力戰至日過中羽攻益急德謂督將成何曰吾聞良將不怯死以茍免烈士不毀節以求生今日我死日也戰益怒氣愈壯而水浸盛吏士皆降德與麾下將一人伍伯二人彎弓傅矢登小船欲還仁營水盛船覆失弓矢獨抱船覆水中為羽所得立而不跪羽謂曰卿兄在漢中我欲以卿為將不早降為德罵羽曰豎子何謂降也魏王帶甲百萬威振天下汝劉備庸才耳豈能敵耶我寧為國家鬼不為賊將也遂為羽所殺吳志曰孫權討黃祖祖橫兩蒙衝俠守沔口以栟櫚大紲繫石為磴上有千人以弩交射飛矢雨下軍不得前董襲與陵統俱為前部各將敢死百人被兩鎧乘大船突入蒙衝裹身以刀斫兩紲蒙衝橫流大兵遂進祖便開門走兵追斬之明日大會權舉觴屬襲曰今之會斷紲之功晉書曰劉毅等誅桓玄兵至竹里玄使其將皇甫敷吳甫之拒毅軍遇之於江乘臨陳斬甫之進至羅落橋又斬敷首玄大懼使使柏謙何淡之屯覆舟山毅等軍至嶈山𥙿使羸弱登山多張旗熾玄不之測益以危懼謙等士卒多北府人素懼伏𥙿莫敢出鬥𥙿與毅等分為數隊進突謙陳皆殊死戰無不一當百時東北風急毅軍放火烟塵張天鼓譟之音震駭京邑謙等諸軍一時奔散又曰周處攻齊萬年於六陌將戰處軍人未食齊王肜促命速進而絶其後繼處知必敗賦詩曰去去世事已策馬觀西戎藜藿甘粱黍期之克命終言畢而戰自旦及暮斬首萬計弦絶矢盡左右勸退處案劍曰此是吾效節受命之日何退之為且古者良將受命鑿凶門以出蓋有進無退也今諸軍負信勢必不振我為大臣以身殉國不亦可乎遂力戰而歿又曰明威將軍朱伺隨陶侃討杜韜有殊功石勒夏口之戰伺用鐵面自衛以弩的射賊大帥數人皆殺之賊挽船上岸於水邊作陳伺逐水上下以邀之箭中其脛氣色不變諸軍尋至賊潰追擊之皆棄船投水死者太半賊夜還長沙伺追至蒲沂不及而反加威遠將軍赤幢曲蓋又曰朱伺劉浚與鄭攀戰楊口壘伺常所調弩忽噤不發伺甚惡之及賊攻陷北門伺退入船初浚開諸船底以木掩之名為船械伺既入賊舉鋌擲伺伺逆接鋌反以擲賊賊走上船屋大喚云賊帥在此伺從船底沉行五十步乃免又載記曰劉曜使其將軍平先丘中伯率徑騎追陳安安與壯士十餘騎於陜中格戰安左手奮七尺大刀右手執丈八蛇矛近交則刀矛俱發輒害五六人遠則帶雙鞬左右馳射而走平先亦壯健絶人勇捷如飛與安搏戰三交奪其蛇矛而退會日暮雨甚安棄馬與左右五六人步踰山嶺匿于溪澗翌日尋之遂不知所在會連雨始霽輒振威呼延青尋其徑迹斬安于澗曲隴上歌之曰隴上壯士有陳安丈八蛇矛左右槃戰始三交上蛇矛東流之水名去不還劉曜命樂府歌又曰禿髮傉檀追赫連勃勃遣善射者射之中勃勃乃勒衆逆擊敗之追奔八十餘里殺傷萬計斬其大將十餘人以為京觀號髑髏臺還于嶺北又曰前秦符堅為姚萇所攻符堅率兵攻姚萇皆刻鋒鎧為死休字示以戰死為志每戰以長矟鉤刃為方圓大陳知有厚薄從中分配故人自為戰所向無前又曰後趙冉閔之亂石琨及張舉王朗率衆七萬伐鄴石閔帥騎千餘拒之城北閔執兩刃矛馳騎擊之皆應鋒摧潰斬級三千琨等大敗歸于冀州又曰朱伺善戰人或問之伺答諸人以舌擊賊伺唯以刀耳又問曰將軍前後擊賊何以每得勝耶伺曰兩敵共對唯當忍之彼不能忍我能忍是以勝耳又曰周訪討江沔間賊杜曾訪有衆八千進至張陽曾鋭氣甚盛訪曰先人有奪人之心善謀也使將軍李恆督左甄許朝督右甄訪自領中軍高張旗幟曾果先攻左右甄曾勇冠三軍訪甚惡之自於陳後射雉以安衆心令小將趙胤領其父餘兵屬左甄力戰敗而復合胤馳馬告急訪怒叱令更進號哭還戰自辰至申兩甄皆敗訪選精鋭八百人自行酒飲之勑不得輒動聞鼓音乃進賊未至三十步訪親鳴鼓將士皆騰躍奔赴曾遂大潰殺千餘人遂定漢沔又曰劉𥙿舉兵伐後秦姚泓王鎮惡為前鋒軍至渭橋鎮惡所乘皆蒙衝小艦鎮惡登岸渭水流急倏忽間諸艦悉逐流去時泓屯軍在長安城下猶數萬人鎮惡撫慰士卒曰卿諸人並家在江南此是長安門外去家萬里而舫乘衣糧並已逐流去豈復有生之計耶唯宜死戰可以立大功不然則無遺類矣乃身先士卒衆亦知無復退路莫不騰踊爭先泓衆一時奔潰即陷長安城崔鴻十六國春秋曰前秦符堅將王猛討前燕慕容暐暐遣將慕容評屯於潞川以拒之猛與評相持遣禆將郭慶以鋭卒五千夜從間道出評營後傍山起火燒其輜重暐懼遣使讓評催之遣戰猛知評賣水鬻薪有可乘之會評又求戰乃陳於潞原而誓衆曰今與諸君深入賊地宜各勉進不可退也願戮力行間以報恩願受爵明君之朝慶觴父母之室不亦美乎衆皆勇奮破釜棄糧大呼競進猛覩評師之衆也惡之謂鄧羌曰今日之事非將軍莫可以捷將軍其勉之羌曰若以司隸見與者公無以為憂猛曰此非吾之所及必以本郡太守萬戶侯相處羌不悅而退俄而兵交猛召之羌寢而弗應猛馳就許之羌於是大飲帳中與張蚝徐成等蚝七吏切跨馬運矛馳入評軍出入數四傍若無人搴旗斬將搴居輦反殺傷甚衆戰及日中評衆大敗俘斬五萬裴子野宋略曰左將軍劉康祖聞虜寇壽陽自虎牢率七千人來赴虜至者八萬騎康祖令軍中曰顧望者斬首轉步者斬足士皆用命賊死者萬餘血流沒踝流矢貫頸墮馬死宋書鄧琬傳曰殷孝祖屯軍鵲洲沈沖之謂陶亮曰昔孝祖梟將一戰便死孝祖與賊合戰每戰常以鼓蓋自隨軍中人相謂曰殷統兵可謂死將矣今與賊交鋒而以羽儀自顯欲不斃得乎又曰傅弘之字仲度涼僞太子赫連瓌率衆襲長安弘之領步騎五千大破之瓌又抄渭南弘之又於寡婦渡破瓌獲賊二百及義真東歸赫連佛佛傾國追躡於青泥大戰弘之射貫甲胄氣冠三軍陳敗陷沒佛佛逼令降弘之不為屈也又高祖紀曰于時北師始還傷痍未復戰士才數千賊衆十餘萬舳艫亘千里孟昶諸葛長仁懼欲擁天子過江帝曰今兵士雖少猶足一戰若其克濟臣主同休如其不然不復能草間求活吾計決矣又曰薛安都北征至陜下魏多縱突騎衆軍患之安都怒甚乃脫兜鍪解所帶鎧唯著絳衲兩襠衫馬亦去具裝馳入賊陳猛氣咆𠷺所向無敵當其鋒者無不應刃而倒如是數四每入衆無不披靡又曰高祖義軍進至覆舟東張疑兵以油帔冠株布蒲山谷帝先馳之將皆殊死戰無不當百呼聲動天地因風縱火煙焰張天謙等大敗齊書曰薛安都討魯爽及沈慶之濟江安都望見爽便躍馬大呼直往刺之應手而倒左右范雙斬爽首爽世裊猛咸云萬人敵安都單騎直入斬之而返時人皆云關羽斬顏良不足過也梁書曰大同初魏軍復圍南鄭杜懷瑤命第三子嶷帥二百人與魏前鋒戰於光道寺溪矢中其目失馬敵人交矟將至嶷斬其一騎躍而上馳以歸嶷旅力絶人便馬善射一日戰七八合所佩霜明朱弓四石餘力班絲纏矟長二丈五同心敢死士百七十人每出殺傷數百人敵人憚之號為杜彪又曰侯景圍王僧辨於巴陵元帝乃引僧祐於獄拜為假節武猛將軍封新市縣侯令援僧辨將行泣下謂其子玘曰汝可開朱白二門吾不捷則死吉則由朱凶則由白也元帝聞而壯之又曰蔡道班為湖陽戍主攻蠻錫城反為蠻困馮根年十六救之匹馬交戰提雙劍左右奮擊殺傷甚多道班以免由是知名又曰武帝師次秣陵東昏遣大將王珍國盛兵朱雀門衆號二十萬及戰梁武軍引却王茂匹馬單刀直前外生韋欣慶勇力絶人執鐵纏矟翼茂而進故大破之茂勳第一欣慶力也陳書曰武帝入援建鄴杜僧明為前鋒與蔡路養戰於南野僧明馬被傷武帝馳救之以所乘馬援僧明僧明上馬復進殺數十人因而乘之遂敗路養南史曰陳將蕭摩訶隨都督吳明徹濟江攻秦郡時齊遣大將尉破胡等率衆十萬來援其前隊有蒼頭犀角大力之號皆身長八尺膂力絶倫其鋒甚鋭又有西域胡人妙於弓矢弦無虛發衆軍尤憚之及將戰明徹謂摩訶曰若殪此胡則彼軍奪氣君有關張之名可斬顏良矣摩訶曰願得識其形狀明徹乃召降人有識胡者云胡著絳衣華皮裝弓兩端骨弭明徹遣人覘伺知胡在陳仍自酌酒飲摩訶摩訶飲訖馳馬衝齊軍胡挺身出陳前十餘步彀弓未發摩訶遙擲銑鋧正中其額應手而仆齊軍大力十餘人出戰摩訶又斬之於是齊師退走後魏書曰呂羅漢父溫佐秦州羅漢隨侍隴右氐楊難當率衆數萬寇上邿秦人多應之鎮將元意頭知羅漢善射共登西城樓令羅漢射難當隊將及兵二十三人應弦而殪賊衆轉盛羅漢進計曰今又不出戰示敵以弱衆情攜二大事去矣意頭善之即簡千餘騎令羅漢出戰羅漢與諸騎策馬大呼直衝難當軍衆皆披靡殺難當左右隊騎八人難當大驚又曰宇文延字慶壽體貌魁岸眉目踈朗永平中釋褐奉朝請直後員外散騎常侍以父福老詔聽隨侍在瀛州屬大乘妖黨突入州城延率奴客戰死者數人身被重瘡賊乃小退而縱火燒齊閣福時在內延突火而入抱福出外支體灼爛髮盡於是勒衆與賊苦戰賊乃散走以此見稱又曰趙遐為滎陽太守時蕭衍將馬仙琕率衆攻圍昫城戍主傅文驥嬰城固守以遐為別將與劉思祖等救之次於鮑口去胊城五十里夏雨頻降厲涉長驅將至的城仙琕見遐營壘未就徑來逆戰思祖率彭沛之衆望陳奔退遐孤軍奮擊獨破仙碑斬其直閣將軍軍主李魯生仙琕先分軍於胊城之西阻水列柵以圍固城遐身自潛行觀水深淺結草為筏御枚夜進破其六柵遂解假固城之圍進救昫城都督盧昶率大軍繼之未幾而文驥力竭以城降賊衆軍大崩昶棄其節傳輕騎而走唯遐獨握節而還
