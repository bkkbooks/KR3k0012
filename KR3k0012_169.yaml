body:
  text: 山南道下梁州圖經曰梁州漢中郡春秋至戰國時楚地秦漢為漢中郡蜀志曰劉備初得漢中曰曹公雖來無能為也漢書曰項羽立沛公為漢王王巴蜀漢中四十一縣都南鄭沛公欲攻楚丞相蕭何諫曰雖王漢之惡不猶愈於死乎且語曰天漢其稱甚美願王漢中鎮撫其民收用巴蜀還定三秦天下可圖也洋州十道志曰洋州洋川郡春秋戰國時並為楚地秦為漢中郡地漢志曰成固屬漢中郡今洋源縣地是也又曰安陽屬漢中𩰿谷水所出今黃金縣地十道志曰商州上洛郡禹貢梁州之域周為豫州之境戰國時屬秦秦併天下為內史地漢武置上雒縣於此史記張儀說楚懷王曰大王誠能絕約於齊臣請獻商於之地六百里楚於是與齊絕約使一將軍隨張儀至秦儀謂楚使者曰臣有奉邑六里願以獻大王左右楚使者曰臣受命於王以商於之地六百里不聞六里皇甫謐帝王世紀曰四皓始皇時隱於商山作歌曰英英高山深谷逶迤曄曄紫芝可以療飢唐虞時遠吾將何歸漢志曰商屬弘農郡秦相衛鞅邑也金州十道志曰金州安康郡禹貢梁州之域於周庸國之地楚之附庸後為楚地秦為漢中郡帝王世紀曰安康謂之媯墟或謂之姚墟後漢書鄭弘上書曰虞舜出於姚墟夏禹生於石紐穎容釋例曰舜居西域本曰媯汭漢志曰西域屬漢中郡應劭曰媯墟在西北舜之所居即今西城縣房州十道志曰房州房陵郡土地所屬與金州同古麋國也左傳曰楚子伐麋成大心敗麋師于防渚杜注防渚在麋地闞駰云防陵即春秋防渚也漢志曰防陵上庸屬漢中郡盛弘之荊州記曰竹山縣有白馬塞孟達為新城太守登白馬而歎曰劉封申躭據金城千里而不能守豈丈夫哉通州十道志曰通州通川郡土地所屬與金州同春秋戰國并屬巴子國秦併天下為巴漢郡漢因之後漢志曰宣漢屬巴郡即漢宕渠地也巴漢記曰和帝分宕渠之東置也圖經曰西魏改為通州以其居西達之路故以為名今為達州渠州十道志曰渠州潾山郡土地所屬與通州同漢志曰宕渠屬巴郡輿地志曰梁大通三年於此置渠州左思蜀都賦曰外負銅梁宕渠渝州十道志曰渝州南平郡古巴國也三巴記曰閬白二水東西流曲折三廻如巴字故謂之三巴山海經曰海內西南有巴國昔太皞生咸鳥咸鳥生乘釐乘釐生後昭是為巴人郭璞曰為巴始祖李膺益州記曰明月峽在巴縣東壁高四十丈有圓孔形如滿月因以為名又曰江津縣西有香草樓昔有仙人於此置樓居植香草於樓下一夕仙去後人指其地為香草樓涪州十道志曰涪州涪陵郡禹貢梁州之域周為雍州之地春秋時屬巴國秦為巴郡漢為涪陵縣巴漢志曰涪陵巴郡之南鄙本與楚商於之地接朗州十道志曰朗州武陵郡禹貢荊州之域春秋及戰國時屬楚秦為黔中郡漢高帝五年更名武陵郡梁湘東主於荊州割武陵郡置武州陳天嘉元年分武陵立沅陵郡隨文改武州為辰州又改為嵩州又改為朗州史記曰秦惠王十四年求以武闕外就楚易黔中地武陵記曰後漢梁松自義陵移郡於若城今州東有張若城是晉書曰潘京武陵漢壽人也弱冠郡辟主簿太守趙廞甚器之嘗問之曰貴郡何以名武陵京曰鄙郡本名義陵在辰陽縣界與夷獠相接數為所攻光武時移東山遂得全完共議易號傳曰止戈為武詩稱高平曰陵於是名焉武陵記曰武陵郡境四千餘里灃州十道志曰灃州灃陽郡春秋戰國時其地屬楚秦屬黔中郡漢改黔中為武陵郡屬荊州今州即武陵郡之零陽縣地吳分武陵西界立天門郡此即郡之境晉為南義陽郡隋平陳置松州尋改為灃州在灃水之北故取為名尚書禹貢曰岷山導江東別為沱又東至于灃豐水名輿地志曰晉末以義陽流人在南郡者立為南義陽郡寄在荊州十道志曰慈利縣即漢零陽縣地圖經曰界內有零溪水即以為名隋開皇十八年改零陽為慈利縣王仲宣贈士孫文始詩曰悠悠澹灃澹灃二水在灃陽縣巴州十道志曰巴州土地所屬與通州同漢為巴郡宕渠縣四夷縣道記曰李特孫壽時有群獠十餘萬從南越入蜀漢間散居山谷因斯流布在此地後遂為獠所據壁州十道志曰壁州始寧郡本漢宕渠縣地後漢分置宣漢縣梁分宣漢置始寧後魏分始寧置諾水縣蓬州十道志曰蓬州咸安郡本漢宕渠縣地周地圖記曰武帝天和四年割巴州之伏虞郡隆州之隆城郡於此置蓬州集州十道志曰集州符陽郡本漢宕渠縣地晉惠帝永寧中李特王蜀其地屬焉梁武改為東巴州後改為集州以東北有集水因以為名又云以萬山所集故也唐州十道志曰唐州淮安縣禹貢豫州之域春秋楚地戰國時屬晉後入韓秦置三十六郡為南陽郡漢志曰南陽郡有比陽縣比水所出東入蔡左傳僖四年齊師伐楚楚子使屈完如師齊侯陳諸侯之師與屈完乘而觀之齊侯曰以此眾戰誰能禦之以此攻城何城不克對曰君若以德綏諸侯誰敢不服君若以力楚國方城以為城漢水以為池雖君之眾無所用之晉太康地記曰自華至沘陽南北連百里號為方城亦曰長城周地圖記曰湖陽縣光武所封外祖樊重邑又光武封姊為湖陽公主漢志曰湖陽古廖國也廖音力教反鄧州十道志曰鄧州南陽縣禹貢豫州之域戰國屬韓秦置三十六郡南陽其一也釋名曰在中國之南而居陽地故以為名漢志曰南陽郡領宛犨等三十六縣秦置莽曰荷墜屬荊州又曰鄧屬南陽故國都尉治應劭曰鄧侯國也史記蘇秦說韓惠王曰韓西有宜陽東有穰淯後漢書曰時天下墾田多不以實詔下郡國撿覆其事時諸郡各遣使奏事帝見陳留吏牘上有書視之云潁州弘農可問河南南陽不可問帝詰吏不肯服時顯宗為東海公言曰河南帝城多近臣南陽帝鄉多近親田宅踰制不可為準史記曰秦滅韓徙天下不軓之人於南陽故其俗夸奢尚氣力好商賈漁獵藏匿難制宛西通武關東受淮海都會也圖經曰菊潭以界內菊潭水以名縣盛弘之荊州記曰菊水其源傍有芳菊浸潤流其滋液水極芳馨飲之者皆壽考後魏略曰孝文帝南巡至新野臨潭水而見菖蒲花乃歌曰兩菖蒲新野樂遂建兩菖蒲寺以美之楚地記曰漢江之北為南陽漢江之南為南郡襄州十道志曰襄州襄陽郡禹貢豫州之南境春秋以來楚地秦南郡之北界二難為南陽郡獻帝時魏武始置襄陽郡襄陽記曰襄陽本楚之下邑檀溪帶其西峴山亙其南亦楚國之北津也荊州圖副曰建安十三年魏武平荊州始置襄陽郡以地在襄山之陽為名楚地記曰蜀關羽攻沒于禁等七軍兵勢甚盛獨襄陽徐晃屯守不下曹公謂晃曰全襄陽者徐公之功也後吳大帝率兵向西時曹仁鎮之司馬宣王言於魏文曰襄陽水陸之衡禦寇要地不可失也南雍州記曰永嘉之亂三輔豪族流於樊沔僑於漢側立雍州因人所思以安百姓也宋文帝因之置南雍州焉晉書曰山簡字季倫嘗鎮襄陽郡中有高陽池每臨池未嘗不大醉而還人歌之曰山公何所詣往至高陽池日暮倒載歸酩酊無所知時時能騎馬倒著白接蘺舉鞭問葛強何如并州兒盛弘之荊州記曰襄陽郡峴首山南至宜城百餘里其間彫牆峻宇閭閻填列漢宣帝末其中有卿士刺史二千石數十家珠軒駢輝華蓋連延掩映於太山廟下荊州刺史行部見之雅歎其盛勑號太上廟道為冠蓋里漢志曰築陽屬南陽郡故穀國今穀城縣也莽曰宜禾應劭曰築水出漢中房陵東入沔築音逐圖經曰穀城縣有酇城漢志曰即蕭何出所封也音讚均州十道志曰均州武當郡禹貢豫州之域春秋時楚地秦置南陽郡漢志曰武當屬南陽郡十道志曰鄖鄉古麇國也左傳曰楚潘崇伐麇至于錫穴又地形志曰漢中郡之東界有錫縣即古之錫穴也隨州十道志曰隨州漢東郡春秋隨侯之國秦及兩漢屬南陽郡左傳曰楚武王侵隨鬭伯比言於楚子曰漢東之國隨為大漢志曰隨屬南陽郡故厲國也左氏傳曰楚伐徐齊師伐厲以救之厲音賴又曰舂陵屬南陽郡侯國故蔡陽之白水鄉上唐卿漢文帝元朔五年以零陵泠道之舂陵鄉封長沙王子買為舂陵侯後以舂陵下濕上書徙南陽今棗縣有舂陵故城
