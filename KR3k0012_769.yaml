body:
  text: 舟部一敘舟上釋名曰船循水而行又曰舟言周流也船上屋曰廬象舍也其上重室曰飛廬在上故曰飛也又在其上曰雀室於中候望若鳥雀之驚視也又曰舟名青翰千翼赤鳥亦名鷁首說文曰船從舟從鉛省聲艘船揔名也艘音騷易曰刳木為舟剡木為楫舟楫之利以濟不通詩曰泛彼柏舟在彼中河舟在河中猶婦人在夫家是其常處又曰二子乘舟泛泛其景二子伋壽願言思子中心養養又曰泛泛楊舟載沉載浮楊木也舟之泛浮隨所載既見君子我心則休書曰豫乘四載隨山刊本所載者四其一曰水乘舟又曰若乘舟汝弗濟臭厥載禮曰季春之月舟牧覆舟五覆五反乃告舟備具于天子鄭玄曰舟宮覆反舟者備傾漏也蔡雍章句曰備謂楫櫂紼纚維引之具左傳曰齊侯與蔡姬乘舟于囿蕩公公懼變色禁之不可公怒歸之未之絶也蔡人嫁之齊侯以諸侯之師侵蔡又曰冬晉薦饑使乞糴于秦秦輸於晉自雍及綘相繼命之曰泛舟之殺泛謂水運入河汾也又曰秦伯伐晉孟明濟河焚舟示必旡也取王宮及郊王宮郊皆晉地晉人不出遂自茅津濟封崤尸而還第津在河東大陽縣西封藏又曰楚敗吳師獲其舟餘皇餘皇舟名又曰晉楚將戰趙嬰齊使其徒先具舟于河故敗而先濟也春秋潛潭巴曰澤浮舟天子以亡為憂宋均注曰潭無底之澤今浮舟言陰盛之耳論語曰南宮適問於孔子曰羿善射奡蕩舟俱不得其死然爾雅曰舫舟也天子造舟諸侯維舟大夫方舟士特舟庶人乘柎郭璞注曰造北船為橋也維連四船也方併兩船也特單船也柎編木以渡也廣雅曰艦大船也舫艕船也蒙衝艑步典切䑦音鉤𦪇音鹿舸古我切共音廷音孟音舟洪舟挺舟猛舟也家語曰舟非水不行水入舟則沒君非民不治民犯上則君危戰國策曰或謂公叔曰乘舟舟漏而不塞則舟沉矣塞漏舟而輕陽侯之波則舟覆矣令公自以辨於薛公而輕秦是漏舟而輕陽侯之波也願公察之帝王世紀曰昭王濟漢船人惡之以膠船進王中流膠船解王沒于水史記曰項羽欲東渡烏江瓚曰牛渚烏江亭長艤船侍徐廣曰擬音儀駰案應劭曰檥正也孟康曰檥音蟻附也附船著岸也如淳曰南方人謂整船向岸曰檥也謂項王曰江東雖小地方千里衆數十萬人亦足王也願大王急渡今獨臣有船漢軍至無以渡項王笑曰天之亡我我何渡為且籍與江東子弟八千人渡江而西今無一人還縱江東父兄憐而王我何面目見之縱彼不言籍獨不愧於心乎乃為亭長曰吾知公長者吾騎此馬五歲所當無敵嘗一日行千里吾不忍殺之以賜公又曰韓信擊魏魏王盛兵蒲坡塞臨晉信乃益為疑兵陳船欲渡臨晉而伏兵從夏陽以木罌缶與缶字同渡軍襲安邑虜魏王豹又曰陳平逃楚歸漢渡河船人疑有金陰欲害之平脫衣刺船遂免害漢書曰鄧通蜀郡南安人以櫂船為黃頭郎師古曰櫂船能持櫂行船也士勝水其色黃故刺船之郎皆著黃帽因號曰黃頭郎也又曰景帝三年吳大船自覆吳地以船為家國將亡也又曰武帝汾歌曰泛樓船兮濟汾河橫中流兮楊素波又曰武帝浮江射蛟舳艫千里李斐曰舳後持抱處艫船頭刺擢處也又曰武帝時越欲漢用船戰逐水戰相逐乃大修昆明池列館環之治樓船高十餘丈旗幟加其上又曰伍被曰吳王伐江陵木以為船又曰薛廣德為御史大夫秋上酎祭宗廟出便門欲御樓船廣德當乘輿免冠頓首曰宜從橋詔曰大夫冠廣德曰陛下不聽臣臣自刎以血污車輪陛下不得入廟矣上不悅光祿大夫張猛進曰臣聞主聖臣直乘船危就橋安聖主不乘危御史大夫言可聽上曰曉人不當如是耶乃從橋又曰江都易王子建不道使宮女乘小船建以足踏覆宮女溺乍沉乍浮建觀而大笑後漢書曰馬援平南越將樓船大小二千餘艘士二萬餘人進擊九真賊徵側餘黨都羊等自無功至居風無功居風二縣並屬九真郡斬獲五千餘人嶠南悉平嶠嶺嶠也廣州記曰援到交趾立銅柱為漢之極界又曰第五倫為會稽太守永平五年坐法徵老小攀車叩馬啼呼相隨曰裁行數里不得前倫乃僞止亭舍陰乘船去衆知復追之及詣廷尉吏人上書守闕者千餘人是時顯宗方按梁松事亦多為松訟者帝患之詔公車諸為梁氏及會稽太守上書者勿復受會帝幸廷尉録囚徒得免歸田里身自耕種不交通人物數年拜宕渠令又曰任文公巴郡人為從事天大旱白刺史曰五月一日當有大水其變已至不可防救宜令吏人預為其備刺史不聽文公獨儲大船百姓或聞頗有為防者到其日旱烈文公急命促載使白刺史刺史笑之日將中天北方雲起須臾大雨至脯時湔水涌起十餘丈酈元水經注云湔水出綿道王疊山在今益州湔音子建庭反突壞廬舍所害數千餘人文公遂以占術馳名又曰郭林宗遊洛陽始見河南尹李膺大奇之遂相友善於是名震京師後歸鄉里衣冠諸儒送至河上車數千兩林宗唯與李膺同舟而濟衆賓望之以為神仙焉又曰趙炳嘗臨海求船人不和之和許也俗本作知者誤也炳乃張蓋唑其中長嘯呼風亂流而濟於是百姓神服從者如歸魏志曰尚書僕射杜畿受詔作御樓船於陶河試船遇風沒文帝為之流涕詔曰昔冥勤其官而水死稷勤百穀而死杜畿忠之至也又曰徐宣遷司隸校尉從至廣陵六軍乘舟風浪暴起帝船洄倒宣疾在後陵波而前群寮無至者帝壯之又曰郭嘉死太祖征荊州還於巴丘遇疾燒船歎曰郭奉孝若在不使孤至此奉孝嘉字又曰鄧哀王仲字蒼舒五六歲智若成人孫權曾致巨象太祖欲知其輕重訪之群下咸莫能出其理仲曰量象大船之上而刻其所至稱物以載之則交可知矣太祖大悅即施行焉魏略曰孫權乘大船來觀軍公使弓弩亂發箭著其船船偏重將覆權因回船復以一面受箭箭均船平乃還吳志曰諸葛恪出征東興有虹見其船又曰吳人以舟楫為興馬以巨海為夷庚也晉書曰陸機初詣張華華問雲何在機曰雲有笑疾未敢自見俄而雲至華為人多髭製好帛繩纏髭雲見而大笑不能自已先是常著縗絰上船於水中顧見其影因大笑落水人救獲免又曰張憑字長宗祖鎮蒼梧太守憑年數歲鎮謂其父曰我不如汝有佳兒憑曰阿翁詎宜以子戲父耶及長有志氣為鄉閭所稱舉孝廉負其才自謂必參時彥初欲詣劉惔鄉里及同舉者共笑之既至惔處之下座神意不接憑欲自發而無端會王濛就惔清言有所不通憑於末制之言旨深遠足暢彼我之懷一座皆驚惔延之上座清言彌日留宿至旦遣之憑既還船須臾遣傅教覔張孝廉船便召與同載遂言之於簡文帝帝召與語歎曰張憑勃窣為理窟官至吏部郎御史中丞又曰王濬徵拜右衛將軍除大司農車騎將軍羊祜雅知濬有奇略乃密表留濬於是重拜益州刺史武帝謀伐吳詔濬修舟艦濬乃作大艦連船方百二十步受二千餘人以木為城起樓櫓開四門其上皆得馳馬來往又畫鷁首怪獸於船首以懼江神舟楫之盛自古未有太康元年正月濬自成都率巴東監軍廣武將軍唐彬攻吳丹陽剋之擒其丹陽監盛紀吳人江險磧要害之處並以鐵鎖橫截之又作鐵錐長丈餘暗置江中以逆拒船先是羊祐獲吳間諜具知情狀濬乃作大筏數十亦方百餘步縛草為人被甲持仗令善水者以筏先行筏既行遇鐵錐軌著筏去又作炬長十餘丈大數十團灌以麻油在船前遇鎖然炬燒之須臾融液斷絶於是船無所礙王隱晉書曰陶侃擊蜀賊王真真拘得侃有雀船侃欲投水都督王榱蘇扶侃入小船得脫晉中興書曰蘇峻作逆與祖渙許柳等將萬餘人出橫江連船東渡時遇西風既濟船江中忽更東風吹船還西岸峻書善喜喜曰是天助我固將志也又曰郭翻武昌人安西將軍庾翼以帝舅之重躬往逼翻欲強起翻曰人性各有所短豈可強逼翼以翻船俠小欲引就大船翻曰使君不以民鄙賤而辱臨之此固野人之舟也翼俯屈入其中船太公六韜曰武王伐殷先出於河呂尚為將以四十七艘船濟於河又曰天船一名天撗以濟大水又曰殷君為酒池可遊船莊子曰顏回問於仲尼曰回嘗濟於觴深之泉津人操舟若神吾問焉操舟可學也曰遊善者數音朔能若乃夫沒人未嘗見舟而便操之吾問焉不吾告敢問何謂也仲尼曰善遊者之數能忘水故也彼視衆泉若陵視舟之覆猶車之卻退也視泉若陵故視舟之覆於淵猶車卻退於岐也又曰藏舟於壑藏山於澤謂之固矣然則夜半有力者負之而走昧者不知也又曰水之積也不厚則其負大舟也無力覆杯水於坳於交切堂之上則芥為之舟置杯焉則膠水淺而舟大也又曰孔子遊乎緇維之林坐杏壇之上有漁父者下船而來孔子乃下求之至於澤畔有將杖拿而引其船顧見孔子再拜而起乃刺船而去延緣葦間顏淵還車了不顧待水波定不聞拿音而後敢乘又曰方舟而濟河有虛船來觸舟雖有惼心之人終不怒也忽有一人在其上則惡聲隨之向不怒向虛而今實也又曰巧者勞而智者憂無能者無所求也食而遨泛若不係之舟也又曰散木以為舟則沉是不材之木鄧析子曰同舟涉海中流遇風救患若一所憂同也孔藂子曰順謂韓王曰吳越之人同舟濟江中流遇風波其相救如左右手不慎所同之患是不如吳越之舟人也尸子曰六馬登糟丘方舟泛酒池劉析書曰舟行於水車轉於陸此勢自然者也文子曰舟浮江海不為莫乘而沉君子行道不為莫知而止孫卿子曰君者舟也庶人者水也水則載舟水則覆舟墨子曰工倕作舟慎子曰燕鼎之重乎千鈞乘於吳舟則可以濟所託者浮道也又曰行海者生而至越有舟也行陸者立而至秦有車也秦越遠塗也安坐而至者械也韓子曰千鈞得船則浮錙銖失船則沉非千鈞輕而錙銖重也有勢之與無勢也又曰奔車之上無仲尼覆舟之下無伯夷號令者國之舟車安則知廉危則爭越也
