body:
  text: 人事部一百一十四遊俠漢書曰意氣高作威於世謂之遊俠又曰背公死黨之義成守節奉上之義廢又曰朱家魯人魯皆儒教而朱家用俠聞諸所嘗施唯恐見之賑人不贍先從貧賤專趍人之急自關而東莫不延頸願交焉又曰楚田仲以俠聞父事朱家田仲死而有雒陽劇孟以任俠顯吳楚反時條侯為太尉乘傳東至河南得劇喜曰吳楚舉大事而不求孟吾知其無能為也天下騷動宰相得之若一敵國而劇孟行大類朱家孟母死自遠方送喪車蓋千乘又曰郭解河內軹人字伯翁善相者許負外孫也解父以任俠孝文時誅死解為人短小精悍不飲酒少時陰賊感慨不快意身所役甚衆以軀借交報仇藏亡令作姦剽劫休乃鑄錢掘冢不可勝數年長更折節為儉以德報怨厚施薄望然其自喜為俠益甚解姊子負解之勢與人飲使之嚼徐廣曰盡酒也音子妙反非其任強灌之人怒拔刀刺殺解使人徵之賊窘自歸且以實告解解曰公殺人當吾兒不直遂去諸公聞之皆多解之義益附焉戰國策曰韓傫相韓嚴遂重於君二人相害也嚴遂正議直指舉韓傫之過韓叱之於朝嚴遂拔劍趍之於是懼亡去求人可以報韓傫者至齊人言聶政勇敢士也避仇隱於屠肆之間嚴遂陰交於政以意厚之政母死既喪除政曰嗟乎政乃市井之人鼓刀以屠而嚴仲子乃諸侯之卿相也不遠千里枉車騎而交臣舉百金為親壽我雖不受然是深知政也至濮陽見嚴仲子曰前日所以不許子曰徒以親也親今不幸死仲子所欲報者為誰仲子具告之政獨行拔劍至韓韓適有東孟之會韓王及相皆在焉持兵戟而衛者甚衆政直入上階刺韓傫傫走而抱哀侯聶政刺之兼中哀侯左右大亂又史記曰大史公曰吾嘗過薛其俗閭里多暴桀子弟與鄒魯殊問其政曰孟常君招致天下任俠姦人薛中蓋六萬家矣又曰鄭衛俗與趙伯類濮上之邑徙野王縣也王好氣任俠衛之風也又曰寧成抵罪得脫乃詐刻傳出關歸家稱曰仕不至二千后賈不至千萬安可比人乎乃貫貸買陂田千餘頃役使數千家數年産至千金為任俠其役民重於郡守又曰列國時魏有信陵趙有平原齊有孟嘗楚有春申皆藉王公之勢悉為遊俠雞鳴狗盜無不賓禮而趙相虞卿棄國捐君以周窮支魏齊之厄信陵無忌竊符矯命殺將專師以赴平原之急皆以取重諸侯顯名天下扼腕而遊談者以四豪為稱首又曰季布為人任俠有名項籍滅高祖購求布千金敢舍匿罪三族布匿濮陽周氏周氏曰漢求將軍急且至能聽臣敢進計布許之乃髡鉗布衣褐置廣柳車中而共其家僮數十人之魯朱家所賣之朱家心知其季布也置田舍乃之雒陽見汝陰侯滕公説曰季布何罪臣各為其主項氏臣豈可盡誅耶今上始得天下而以私怒求一人何示不廣且以季布之賢漢求之急如此不北走胡則南走越耳夫忌壯士資敵國此伍子胥所以鞭平王之墓也君何不從容為上言之滕公心知朱家大俠意布匿其所乃許諾侍間果言如朱家指上乃赦布又曰布弟季心氣蓋關中遇人恭謹為任俠方數千里士爭為死又曰孝文時鄭當時以任俠自喜孝景時為太子舍人每五日洗沐常置驛馬長安郊請謝賓客夜以繼日常恐不遍當時好黃老其知友皆天下有名之士又曰袁盎為楚相免家居與閭里鬭雞走狗雒陽劇孟嘗過盎盎善待之安陵富人有謂盎曰吾聞劇孟博徒將軍何自通之盎曰孟雖博徒然母死客送喪車千餘乘此亦有過人者又曰灌夫為人剛直使酒不好面諛貴戚權勢在己之右欲必凌之在己之左尤益禮待稠人廣衆薦寵下士士亦以此多之不好文學喜任俠重然諾所與交通無非豪傑大猾也又曰公孫賀子聲以皇后姊子嬌奢不奉法征和中擅用北軍錢千九百萬發覺下獄是時捕陽陵朱安世不能得求之賀請遂捕安世以贖聲罪上許之安世者京師大俠也聞賀欲以贖子笑曰丞相禍及宗矣從獄中上書告聲與陽石公主私通及使巫祭祠上幸甘泉當馳道埋偶人祝詛有惡言下有司案驗賀窮所犯遂父子死獄中又曰眭弘字孟魯國番人少時遊俠鬭雞走狗長乃變節從嬴公受春秋嬴公姓字以明經為議郎至符節令又曰朱博字子元杜陵人家貧少時給事縣為亭長稍遷功曹任俠好交從士大夫不避風雨又曰萬章字子夏長安熾盛街閭各有豪俠章在城西柳京號曰城西萬子夏為京兆尹門下督從至殿中諸侯貴人爭欲揖章莫與京兆言者又曰婁護字君卿是時王氏方盛賓客滿門兄弟爭其客各有所厚唯誰盡入其門咸得其歡心結士大夫無不傾心交長者尤見親禮為人短小精辨論議常依名節聽之者皆竦會母死送葬致車千兩又曰陳遵字孟公杜陵人身長八尺餘容貌甚偉性善書與人尺牘主皆藏去以為榮時列侯有子與遵同姓字者每至人門曰陳孟公坐中莫不震動既至而非因號曰陳驚坐又曰原涉為谷口令時年二十餘谷口聞其名不言而治人嘗置酒請涉入里門客有道涉所知母病避疾在里宅者涉即往候叩門哭因問以喪事家無所有涉乃削牘為疏具記衣被飯含之物分付市買日跌皆會其周急待人如此後人有毀涉者乃姦人之雄喪家子即時剌殺又曰邛成太后外家王氏貴而侍中王林卿通輕俠傾京師後坐法免賓客愈盛又曰漢興禁網踈闊外戚大臣魏其武安之屬競逐於京師遊俠劇孟郭解之徒馳騖於閭閻荀悅漢記曰立氣勢作威福結私交以力強於時者謂之遊俠又曰俗有三遊德之賊也一曰遊俠二曰遊説三曰遊行亂之所由生也傷道害德敗法惑時先王之所慎也東觀漢記曰郅惲之友董子張父及叔為鄉裏盛氏一時所殘害子張病困將終惲往候張張視惲歔郗惲曰吾知子不悲天命長短而痛二父讎不復也惲即將客遮仇人取其頭以示張張喜氣因絶惲見令以狀首令應之遲趍出詣獄令跣追之不及即自入獄謝惲拔刃自嚮以要惲曰子不從我出敢不以死明心乎惲遂出魏志曰典韋陳留人己吾人也貌魁梧旅力過人好豪俠襄邑劉氏與睢陽李禮為讎韋報之禮故富春長備怨其謹韋乘車載雞酒偽候者開懷匕首入殺禮并妻徐出取車上刀戟步去禮居近市一市盡追莫敢近者又曰楊阿若後名豐字伯陽少遊俠常以報仇解怨為事故時人為之號曰東市相斫楊阿若西市相斫楊阿若魚豢典略曰徐福字元直好任俠擊劍未嘗為人報讎為吏所得問其姓字閉口不言吳志曰甘寧字興霸少有氣力好遊俠招合輕薄少年為之渠帥群藂相挾持弓弩負眊帶鈴聲即知是寧裴子野宋略曰寧朔將軍何邁素豪俠好藂斂士出入遊從者塞路孫盛晉陽秋曰祖逖字士稚好俠每之田舍輒稱兄命散穀帛以贈貧者唐書丘和河南洛陽人也父壽魏鎮東將軍和少便弓馬重氣任俠及長始折節與物無忤無貴賤皆愛之列子曰虞氏者梁之富人也家既充盛錢金無量財貨無訾登高樓臨大路設樂陳酒擊博樓上俠客相隨而行樓上博者大笑鳶飛適墜其腐鼠而中之俠客曰虞氏富樂之日久矣常有輕易人之志乃辱我以腐鼠率徒屬而滅其家韓子曰儒以文亂法而俠以武犯禁裴啓語林曰李陽大俠士庶無不傾心為幽州刺史當之職盛暑一日詣數百家別賓客常填門張衡西京賦曰都邑遊俠張趙之倫輕死重氣結黨連群實蕃有徒其從如雲劉邵趙都賦曰遊俠之徒晞風擬類貴交尚信輕命重氣義激毫毛節成感慨張華博陵王宮俠曲曰俠客樂幽險築室窮山陰轑獵野獸盡施網川無禽又曰雄兒任氣俠聲蓋少年場借友行報怨殺人都市旁腰間叉素戟手持白頭鑲古詩曰失意杯酒間白刃起相讎曹子建詩曰借問誰家子幽并遊俠兒
