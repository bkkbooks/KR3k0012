body:
  text: 人事部十頸項釋名曰頸徑也徑挺而長也說文曰頸頭莖也脰項也河圖曰黑帝修頸毛詩碩人曰領如蝤蠐領頸也禮斗威儀曰君乘木而王其民長頸宋均曰以青龍也春秋元命苞曰北方至寒其人形短頸短頸畏寒傳曰晉伐齊齊侯禦諸平陰晉州綽射殖綽中肩兩矢夾頸脰頸也史記曰范蠡遺大夫種書曰越王長頸鳥喙可與共患難不可與共樂又曰沛公軍至灞上秦王子嬰以組係頸降軹道傍漢書曰張耳陳餘相與為刎頸之交刎頸之交者言託契深重雖斷頸絶頭無所顧也又曰周昌嘗燕入奏事高帝方擁戚姬昌還走高帝逐得騎昌項問曰我何如主也昌仰曰陛下即桀紂主也又曰田蚡取燕王女為夫人太后詔列侯宗室皆往賀灌夫行酒至臨汝侯灌賢賢方與程不識耳語夫無所發怒乃罵賢坐乃起更衣稍稍去竇嬰去因戲音麾招麾之令出也夫出蚡遂怒曰此吾驕灌夫罪也乃令騎留夫夫不得出籍福起為謝按夫項令謝夫愈怒不肯順蚡乃戲騎戲亦音麾令縛夫置傳舍後漢書曰董宣既格殺胡陽公主家蒼頭帝使宣謝公主宣不伏上使人按其項於地宣不肯起因號為強項侯東觀漢記曰班超字仲升常行遇見相工工謂超曰燕頷虎頭飛而食肉此萬里封侯相魏書曰文帝既立為嗣喜因抱辛毗頸曰辛君知吾喜不魏志曰母丘儉使王傾至海上海上人云得一破船有生人項有面與語不曉不食而死蜀志曰先主率其屬從校尉鄒靖討賊因有功除安喜尉督郵以公事到縣先主求謁不通直入縛督郵杖二百解綬繫其頸著馬柳五葬切棄官亡命王隱晉書曰杜預初伐吳吳人知預病癭每見大樹似癭者輒以刀斬破白題曰杜預頸唐書曰屈突通或說歸降義軍通泣曰吾蒙國重恩歷事兩主受人厚祿安可逃難有死而已自摩其頸曰要當為國家受人一刀耳家語曰孔子其頸似皋陶孔叢子曰子高遊趙還魯平原君客鄒文李節與子高別文節流涕交頸子高撫手而已尸子曰禹長頸鳥喙扶南傳曰毗塞國王身長一丈二尺頸長三尺自古不死莫知其年知未然事號為長頸王繁欽三胡賦曰罽賓之胡面象炙蝟頂須如持囊肩釋名曰肩堅也說文曰肩髆也春秋元命苞曰文王龍顏阜肩左傳昭二十年曰衛公孟縶狎齊豹初齊豹見宗魯於公孟薦達也為驂乘焉將作亂而謂之曰公孟之不若子所知也勿與乘吾將殺之對曰吾由子事公孟今聞難而逃是僣子也使子言不信子行事乎吾將死之公孟有事於蓋獲之門外宗魯驂乘齊氏用戈擊公孟宗魯以背蔽之斷肱以中公孟之肩皆殺之又昭二十六年成大夫公孫朝告于齊曰孟氏魯之敝室也敝壞也用成已甚弗能忍也請息肩於齊齊師圍成又定上曰楚子涉睢七余切濟江入于雲中雲夢澤也王寢盜攻之以戈擊王王孫由于以背受之中肩爾雅曰北方有比肩民焉迭食而迭望此即半體之人各有一目一鼻一孔一臂一腳亦由魚鳥之相舍也崔鴻十六國春秋後趙録曰初太式殿既成圖畫自古賢聖忠臣烈士是月皆變為胡狀旬餘頭悉入肩中喉冠忦音介髣佛微出石虎大惡之國語曰叔魚鳶肩其母曰是必為賄死莊子曰支離疏肩高於頂又曰盧敖見若士深目鳶肩淮南子曰東方之人鳶肩北方人大肩梁冀別傳曰冀鳶肩文傳曰趙一肩高二尺高自抗竦為鄉黨所擯車頻秦書曰符堅生肩背有赤色隱狀如篆文洛神賦曰肩若削成胛釋名曰胛闔也與胸脅背相會闔說文曰髆肩胛也春秋元命苞曰胛之為言附著也如龍蟠虎伏合附著也吳越春秋曰專諸剌王僚貫胛達背臂釋名曰臂裨也在傍曰裨也左傳莊公初公築臺臨黨氏見孟任從之閟而以夫人言許之割臂盟公生子般焉又襄公公孫丁射尹公他貫臂春秋元命苞曰湯臂四肘是謂神剛象月推移以綏四方史記曰吳起東出衛郭門與其母訣嚙臂而盟曰起不為卿相不復入衛門果如其言漢書曰李廣隴西人援臂善騎射又曰陳湯擊郅支時中寒病臂不屈伸湯入有詔無拜又王莽傳曰甄豐子尋作符命而誅尋手理有天子字莽解其臂入視曰此一太子也或曰一六子也明尋子父當戮死也又曰劉歆上議曰武帝立五廟國伐朝鮮起玄莬樂浪以斷胸奴左臂西伐大宛結烏孫以裂胸奴左臂續漢書曰單超河南人梁冀振動天下延熹二年皇后崩帝呼單超等入謀誅冀及更召徐璜具瑗等五人遂定其議帝嚙超臂出血以為盟冀及宗親黨與悉誅之後漢書曰楊璇平蒼梧桂陽猾賊荊州刺史趙凱誣奏璇實非身破賊而妄有其功遂檻車徵璇防禁嚴密無由自訟乃嚙臂出血書衣為章具陳破賊形勢以付子弟詣闕通之詔原璇更拜議郎凱受誣人之罪魏志曰太祖所乘名絶影流矢所中并中太祖右臂吳志曰太史慈字子義東來人也長七尺美鬚髯猿臂善射蜀志曰先主長七尺五寸自顧見耳垂臂下𣍿又曰關羽為流矢所中貫在左臂陰兩常痛伸臂與醫刮骨去毒血流盤器而羽割炙引酒自若晉書曰都官從事濟南劉享奏何曾綺麗華飾瑩牛蹄角後曾辟郭為掾因小事杖享破臂晉中興書曰交州刺史王諒為州人梁碩所圍城陷碩逼奪諒節諒不與碩遂斷諒右臂諒正色曰死不畏臂斷何有哉崔鴻十六國春秋後趙録曰石勒引李陽歡酣陽臂笑視之曰卿雖老臂中由有力頗復與人鬭不孤往日厭卿老拳卿亦飽孤毒手後秦記曰姚襄垂臂過𣍿三國典略曰陸法和進於巴陵見王僧辨謂之曰貧道已卻侯景一臂更何能為檀越宜即逐取侯景三國典略曰高歡營主尉景欲執爾朱兆歡嚙臂止之唐書曰高宗幸東都太子於京師監國因留薛元超以侍太子臨行謂元超曰朕之留卿如去一臂關西之事悉以委卿列子曰甘蠅古之善射者飛衛學射於甘蠅紀昌學射於飛衛盡飛之術計天下之敵己一人而已乃謀殺飛衛相遇於野二人交射矢鋒觸而墜於地飛矢先窮紀昌唯一既發飛衛以棘剌之端扞之而無差於是二子泣而投弓相拜於途請為父子剋臂以誓不得告術於人也莊子曰仲尼謂顏淵曰吾終身與汝交臂而失之可不哀與又曰浸假而化豫之左臂以為雞豫因以求時夜浸假而化豫之右臂以為彈豫因以求雞炙又曰韓魏相爭侵地子華子見昭僖侯昭僖有憂色子華子曰今使天下書銘於君之前曰左手攫之則右手廢右手攫之則左手廢然而攫之必有天下君攫之乎僖侯曰寡人不攫也子華子曰自是觀之兩臂重於天下也身又重兩臂韓之輕於天下遠矣燕丹子曰荊軻拾瓦投蛙音圭太子令人奏奉盤金軻用竭復進軻曰非為太子愛金也但臂痛耳淮南子曰羿右臂長而善射新序曰崔杼殺莊公申蒯漁於海將入死之門者以告崔杼令勿內蒯曰汝疑我乎乃斷其左臂以與門者以示杼陳八列令其入蒯拔劍呼天而鬭殺七列不及崔杼一列而死白虎通曰湯臂二肘是謂抑翼攘去不義萬民蕃息璅語曰晉師曠晝侍平公鼓瑟輟而笑曰齊君與嬖人戲墜床傷臂公書記之使問齊侯果如其言山海經曰長臂國人捕魚水中兩手各操一魚又曰奇肱之國其人唯有一臂劉欣期交州記曰儋耳之東人臂一骨外國事曰大拳國人援臂長脅西京雜記曰宣帝被收繫郡邸獄臂上猶帶史良娣合綏宛轉繩係寶鏡一枚幽明録曰有人相羊叔子父墓有帝王之氣叔子於是乃自掘斷墓後相者又云此墓由當出折臂三公叔子工騎乘及為襄陽縣督盤馬落地遂折臂論衡曰書傳稱曾子孝與母同氣曾子出薪於野客至而欲去曾子母以右手扼左臂曾子左臂立痛即馳至此虛也臂痛曾子臂亦痛母死曾子亦死乎扼於革切俗說曰釋道安生便左臂上一肉廣一寸許著臂如釧將可上下時人謂之印手菩薩楚辭曰九折臂而成醫腕釋名曰腕者言宛屈也左傳定下曰晉師將盟衛侯于鄟澤鄟音專趙簡子曰群臣誰敢盟衛君者涉他成何曰我能盟之將歃涉他捘衛侯之手及腕捘子對切捘擠也血至於腕衛侯怒腋釋名曰腋繹也言可張翕尋繹也說文曰胳略下也胠腋下也胳音各胠香劫反又去魚二切漢書五行志曰高后八年三月祓霸上還過軹道見物如蒼狗戟高后腋忽不見卜之趙王如意為祟遂病腋下而崩東觀漢記曰江革為五官中郎將將朝會詔使虎賁迎送扶腋寵遇甚厚孔融上書曰先帝褒厚老臣懼其殞越是故扶接助其氣力三公剌腋近為憂之非警戒也云備大臣非其類也神仙傳曰老子母感大流星而娠懷之七十歲乃生剖母左腋而出肘釋名曰肘注也可隱注也傳曰師陳于鞍郤克傷於矢曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之又曰欒盈之亂范鞅遇欒樂曰樂免之死將訟汝於天樂射之不中又注則乘槐本而覆或以戟鉤之斷肘而死春秋後語曰智伯率韓魏之兵以伐趙襄子於晉陽決晉水以灌晉陽之城不沒者三板智伯行水魏桓子御韓康參乘智伯曰吾不知水之可以亡人國乃今知之然汾水可以灌安邑綘水可以灌平陽魏桓子肘韓康子韓康子履桓子之足接於車上而智伯地分身死國亡為天下笑謝承後漢書曰羊續為南陽太守志在矯俗裳不下𣍿彈琴出肘段龜龍涼州記曰呂光左肘生肉印及征西域印內隱起文字曰巨霸也莊子曰子貢往見原憲憲杖策而應正襟肘見又曰支離叔與滑介叔觀於宜伯之丘崑崙之墟黃帝之所休俄而柳生於其左肘其意蹶蹶然惡之支離叔曰惡之乎滑介叔曰亡豫何惡生者假借也假之而生生塵垢也生為晝夜且吾與子觀化化及我何惡哉呂氏春秋曰密子賤治單父恐魯君聽讒令己不得行術將行請迎史二人俱至單父使其書將書密子掣其肘書不善則怒史患之請歸報魯君太息曰密子以此諫寡人自今以去單父非寡人有
