body:
  text: 職官部五十尹春秋傳曰周公相王室以尹天下尹正也漢書曰內史周官秦因之掌治京師景帝二年分置左右內史武帝太初元年更名京兆尹張晏曰地高曰京左傳曰莫之與京十億曰兆尹者正也祑二千石銀印青綬進賢兩梁冠絳朝服佩水蒼玉又曰趙廣漢字子都涿郡人也守京兆尹廣漢為人強力天性精於吏職見使吏民或夜不寢至旦尤善為鉤鉅以得事情蘇峻曰鉤得其情吏不得去鉅鉤者設如欲知馬價則先問狗次問羊又問牛然後及馬參伍其價以類相準則知馬之賤貴不失實矣銖兩之奸皆知之長安少年數人會窮里空會謀共劫人坐語未訖廣漢使捕治具服廉明威制豪強百姓追思歌之至今又曰元始五年有一男子乘黃犢車建黃旐衣黃襜褕逕來詣北闕自謂衛太子京兆雋不疑後到叱從吏使收縛之曰昔蒯聵違命出奔輒距而不納春秋是之衛太子得罪先帝亡不即死今來自詣此罪人也遂送詔獄由是名聲重於朝廷在位者皆自以不及廷尉驗治何人竟得奸詐本夏陽人姓成名方遂皃一似戾太子又曰張敞為京兆尹朝廷每有大議引古今處便宜公卿皆服敞無威儀時罷朝會過走馬章臺街或曰在長安中安在章臺下街使御史驅自以便面拊馬又為婦畫眉長安中傳張京兆眉憮無大也孟康曰撫音詡北方人謂為妍有司以奏上問之對曰臣聞閨房之內夫婦之私有過於畫眉者上愛其能然不得大位為京兆尹九年與楊惲厚坐惲大逆誅又曰張敞冬為尹一日捕諸偷得數百人由是市無偷盜又曰王尊王章王駿並為京兆有名京師稱曰前有趙張後有三王後漢書曰袁安為河南尹政號嚴明然未曾以贓罪鞫人常稱曰凡學士者高則望宰相下則希牧守養人於聖世曰尹不忍為也聞之者感激自厲在職十年京師肅然名重於朝廷又曰張酺入為河南尹竇景家人復擊傷市卒吏捕得之景怒遣緹騎侯海等五百人毆傷市丞說文曰緹帛丹黃色也漢官儀曰執金吾有緹騎酺部吏楊章等窮究正海罪徙朔方景忿怒乃移書辟章等六人為執金吾吏欲固執之章等惶恐入白酺願自引贓罪以辭景命酺即上言其狀竇太后詔報自今執金吾辟吏皆勿遣又曰楊彪遷侍中京兆尹光和中黃門令甫使門生於郡界辜攉官財物七千餘萬華嶠書曰甫使門生翹辜攉解見靈帝紀彪發其姦言之司隸校尉陽球因此奏誅甫天下莫不愜心又曰延篤字叔固及邊鳳皆為京兆尹並有能名語曰前有張趙後有邊延張趙即趙廣漢及張敞也又曰梁冀為河南尹居職暴恣多非法父啇所親客洛陽令呂放頗與啇言及冀之短啇以讓冀冀即遣人於道刺殺放而恐啇知之乃推疑於放怨仇請以放弟禹為洛陽令安慰放家欲以滅口使捕之盡滅其宗親賓客百餘人又曰王梁為河南尹穿渠引穀水注洛陽城下東寫鞏川及渠成而水不流七年有司劾奏之梁慚懼上書乞骸骨謝承後漢書曰周暢字伯時性仁慈為河南尹永初二年夏旱久禱無應暢自收葬洛陽城旁客死骸骨凡萬餘人應時澍雨歲乃豐稔袁崧後漢書曰延篤字叔堅南陽人也為京兆尹正身率下民不忍欺應劭漢官儀曰河南尹所治周地也洛陽本成周周之衰微分為東西周秦兼天下置三川洛河伊也漢更名河南孝武皇帝增曰太守世祖中興徙都洛陽改號為尹尹正也詩云赫赫師尹魏志曰鄭渾字文公為京兆尹渾以百姓新集為制移居之法使兼復者與單輕者相伍溫信與孤老為比勤稼穡明禁令以發姦者由是民安於農而盜息又曰傅嘏字蘭石為河南尹內掌帝都外統京畿兼主六卿六遂之士其民異方雜居多豪門大族啇賈胡貊天下四會利之所聚而奸之所生也前尹司馬舉其綱而太簡次尹劉靜綜其綱而太宏後尹李勝毀常法以收一時之聲嘏立司馬之綱統裁劉氏之綱目以經緯之李氏所毀以漸補之郡有七百吏半非舊也河南俗黨五官椽功曹典選職皆授其本國人無用異邦人者嘏各舉其良而用之分官曹之職次考栲之其治以德教為本然持法有恒而不可犯見理識情獄訟不枉檟楚而得其實不為小惠有所薦達及大益於民事皆隱其端迹若不由己出故當時無赫赫之名使民久而後安者也又曰司馬芝子華為河南尹教群下曰蓋君設教不能使吏必不犯也吏能犯教而不能使君必不聞也夫設教而犯君之劣也犯教而聞吏之禍也君劣於上吏禍於下此政事所以不理也可不勉之哉於是下吏莫不自厲又曰劉馥字子靖出為河南尹散騎常侍應璩以書與子靖曰入作納言出臨京任富民之術日引月長王隱晉書曰樂廣字彥輔為河南尹故郡中前多怪後人皆於廊下郵傳中治事無敢在廳事者唯廣處之自若白戶自閉二子凱模等懾怖廣使掘牆孔得狸乃絕代者乃相承入止又曰庾純字謀甫太始六年詔曰河南大郡四方表則中書令庾純清粹忠正才紹治化其以純為河南尹又曰劉隗補丹陽尹雖在外而萬機秘密皆預聞之晉書曰羊曼為凡陽尹時朝士過江初拜官相飾供饌曼拜丹陽尹客來早者得佳設日晏則漸罄不復及精隨客早晚而不問貴賤有羊固拜東海太守竟日皆美雖晚至者猶獲盛饌論者以固之豐腆乃不如曼之真率晉起居注曰武帝咸寧三年詔曰河南百郡之首其風教宜為遐邇所模以導齊之侍中奉車都尉王恂忠亮篤誠才兼外內明於治化其以恂為河南尹晉中興書云晉天興元年改丹陽內史為丹陽尹宋書劉秀之遷丹陽尹先是秀之從叔穆之為丹陽尹與子弟於廳事上飲宴秀之亦與焉廳事柱有一穿穆之謂子弟及秀之曰汝等試以栗遙擲此柱若能入穿後必得此郡穆之諸子並不能中唯秀之獨入焉唐書曰開元初改雍州長史為京兆尹揔理眾務又曰鄭珣瑜出為河南尹珣瑜既入境官吏以逼降延日珣瑜到即後於事乃送所獻馬齎印於路以例告珣瑜曰未上官不可遽有進獻及既上即過時矣遂不獻又曰郭英乂時嚴武卒元載薦英乂代之遂兼成都尹充劍南節度使英乂到成都肆行不軌無所忌憚玄宗舊宮置為道士觀內有玄宗鑄金真容及乘輿侍衛圖畫先是節度使每至皆先拜而後視事英乂以觀地有形勝乃入居之其真容及圖畫悉遭毀壞見者無不憤怒又曰英乂為成都尹頗恣狂蕩聚女人騎驢擊毬製鈿驢鞍及諸服用皆侈靡裝飾日費數萬以為笑樂未嘗問百姓間事人頗怨之又曰許孟容為京兆尹神策軍吏李昱假貸長安富人錢八千貫蒲三歲不償孟容遣吏收捕械繫剋日命還之曰不及其當死自興元已後禁軍有功又中貴之尤有渥恩者方得護軍故軍士日益橫府縣不能制孟容剛正不懼以法繩之一軍盡驚冤訴於上立命中使宣旨令送本軍孟容繫之不遣中使再至乃執奏曰臣誠知不奉詔當誅然臣職司輦轂合為陛下彈抑豪強錢未盡輸昱不可得上以其守正許之自此豪右歛迹威望大震又曰劉栖楚為京兆尹摧抑豪右不顧患難事無大小必設鉤鉅故時人重之或稱其機變往往有類於西漢時趙廣漢者又曰李傑為河南尹傑既勤於聽理每有訴列雖衢路當食無廢處斷由是官無留事人吏愛之先是河汴之間有梁公堰年久堰破江淮漕運不通傑奏調發汴鄭丁夫以濬之省功速就公私深以為利刻石水濱以紀其績又曰柳仲郢為河南尹以寬惠為政言事者以為不類京兆之政仲郢曰輦轂之下彈壓為先郡邑之治惠養為本何取類耶又曰蘇震為太常卿是歲東都耆老表乞行幸上重違其心選勤舊勳賢為之牧守遂以震為河南尹兼御史中丞仍充東都畿甸觀察使英雄記曰董卓廢少帝自公卿已下莫不卑下於卓唯京兆尹蓋勳長揖爭禮見者皆為失色李爕別傳曰爕字德公京兆人拜京兆尹吏民愛敬乃作歌曰我府君道教舉恩如春威如虎愛如母訓如父李郃別傳曰鄧騭弟豹為將作大匠河南尹缺豹欲得之上及騭兄弟亦欲用難便召拜下詔令公卿舉騭以旨遣人諷公卿悉舉豹李郃曰司隸河南尹當整頓京師檢御貴戚今反使親家為之必不可為後法公舉司隸羊浸不舉豹豹竟不得尹恨公卿不舉對士大夫曰李公寧能不舉我故我不得尹耶莊子曰孫叔敖能以爵祿為己害故三為令尹三去令尹而色不變語林曰蘇峻新平溫庾諸公以朝廷初復京尹宜得望實唯孔君平可以處之孔固辭二公逼諭甚苦孔敖然曰先帝大漸卿輩身侍御床口行詔令孔垣爾時正璅臣耳何與國家事不可今日喪亂而猥見逼迫吾俎豆上腐肉任人割截耶庾愧不能荅說苑曰楚令尹子文之族干法者廷理釋之子文責之曰吾豈為私意耶何廷理之駮於法也不寘刑地吾將死廷理懼遂刑其人國人聞之曰若令尹之公也吾黨何憂乃相與作歌曰子文之族犯國法程廷理釋之子文不聽通典曰凡帝王所都皆曰尹南朝曰丹陽尹後魏初曰代尹東魏曰魏尹北齊曰清都尹揚雄河南尹箴曰茫茫天區畫冀為京啇邑翼翼四方之經爰作卿士以尹王州風化攸興萬國承流梁邵陵王讓丹陽尹初表曰臣進非民譽退異宗英尸居戎號已紊彝典况京兆五守西漢難追河南二尹東京罕繼審己循涯自知莫可街談巷議尤見不勝梁庾肩吾為南康王讓丹陽尹表曰臣聞劍鏤七星非有司天之用縑圖五嶽寧識崇朝之雲是知策彼泥龍不能令其逐日乘斯流馬安可使其奔電方今振鷺盈庭白駒空谷惟帝念功惟明克允君子之國罕聞其讓石門之水獲免於貪少尹唐書曰李憕為東京少尹時蕭胤為尹依倚權貴蒞事多不法憕以公直正之人用繫賴又道士孫甑生以左道求進託以修功德往來嵩山求請無度憕必挫之五代史後唐書曰李承勳累遷至太原少尹劉守光之僣號也莊宗遣承勳往使伺其亹端承勳至幽州見守光如藩方交聘之禮謁者曰燕王為帝矣可行朝禮承勳曰吾大國使人太原亞尹是唐帝除授燕主自可臣其部人安可臣我哉守光聞之不悅拘留於獄數日出而訊之曰臣我乎承勳曰燕君能臣我王則我臣之吾有死而已安敢辱命會王師討守光承勳竟沒於燕中留守東觀漢記曰和帝南巡祠園廟張禹以太尉留守北宮太官朝夕送食後漢書曰車駕征張步留伏湛居守時蒸祭高廟冬祭曰蒸也而河南尹司隸校尉於廟中爭論湛不舉奏坐策免吳志曰孫權征新城使登居守揔知留事時年穀不豐頗有賊盜乃表定科令所以防禦甚得止奸之要晉書曰張方劫惠帝幸長安僕射荀藩等與其遺官在洛陽為留臺承制行事號為東西臺後魏書曰高祖南伐以太尉元丕廣陵王羽留守京師並加持節又曰荀頹大駕行幸三州頹留守京師沙門法秀謀反頹率禁兵收掩畢獲內外晏然駕還飲至文明太后曰當爾之日卿若持疑不即收捕處分失所則事成不測矣今京畿不擾宗廟社稷安者實卿之功也隋書曰楊瓚平齊之役諸王咸從留瓚居守帝謂之曰六府事殷一以相付重朕將遂事東方無西顧之憂矣其見親信如此唐書曰儀鳳元年司農卿韋弘機為東都留守時有道士朱欽遂為中宮所使至都所使至都所為橫恣弘機執而囚之因奏曰道士假稱中宮驅使依倚形勢臣恐虧損皇明為禍患之漸高宗特發中使賜書慰諭仍云不須漏洩又曰武后垂拱中文昌右丞相蘇良嗣為京留守時尚方監裴匪躬檢校京苑將鬻苑中果菜以收其利良嗣駮之曰昔公儀休相魯猶能拔葵去織未聞萬乘之主鬻其果菜以與下人爭利也又曰柳公綽為北都留守充河東節度觀察使等是歲北虜遣梅祿將軍李暢以馬萬疋來市且曰朝貢所經過守帥每假禮分嚴其兵備留館則戒卒于外懼有襲奪太原故事亦出兵送之暢至界上公綽獨使牙門將祖孝恭單馬勞焉待以修好之意暢感義出涕徐驅道中不妄馳獵及至關牙門令譯引謁宴以常禮及市馬歸竟不敢有所犯
