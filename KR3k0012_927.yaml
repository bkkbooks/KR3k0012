body:
  text: 羽族部十三鷹春秋運斗樞曰瑤光星散為鷹禮記月令曰驚蟄之日鷹化為鳩又曰七月鳩化為鷹然後設罻羅左傳文公十八年季文子使太史克對宣公曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失墜曰見無禮於其君者誅之如鷹鸇之逐鳥雀也又昭公四郯子曰少皞鳥師而鳥名爽鳩氏司寇者也杜預注曰爽鳩鷹鷙鳥也故為司寇主盜賊也又襄公四曰子産始知然明問為政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀毛詩曰維師尚父時惟鷹揚如鷹之飛揚也箋云鷹鷙鳥也爾雅曰鷹鶆鳩郭璞注曰鶆當為鷞字之誤也左傳作鷞鳩是也善擊官於代郡捕之又曰鷹隼醜其飛也翬鼓趐翬翬然疾春秋考異郵曰金伐木故鷹擊雉易通卦驗曰鷹者鷙殺之鳥周書曰驚蟄之日鷹變為鳩小暑之日鷹乃學習處暑之日鷹乃祭鳥大戴禮日正月鷹則為鳩鷹也者非其殺之時也鳩也者非其殺之時也善變而知仁故具言之也鳩為鷹而不仁故不盡其辭史記曰李斯臨刑思牽黃犬臂蒼鷹出上蔡東門不可得矣漢書曰鷹隼未擊矰弋不得施於蹊隧又酷吏傳曰郅都為濟陽太守時人號為蒼鷹又曰孫寶為京兆尹請故吏侯文為椽立秋日文謂寶曰今鷹隼始擊當順天氣成嚴霜之誅後漢書曰崔駰與竇憲箋曰今日漢陽太守率吏卒數十人皆臂鷹牽狗云欲上幕府夫鷹犬所獲不過雉兔斯乃細人之事東觀漢記曰和熹皇后臨朝上林鷹犬悉斥賣之又曰趙勤字孟卿太守桓虞署督郵新野令自責還印綬去虞歎曰善吏如使良鷹下韝即中馬融與伯世書曰憒憒愁思猶不解懷思在竹間放狗逐麋晚秋涉冬大蒼出籠黃棘下菟芼以乾蔡以送餘日茲樂而已魏志曰呂布因陳登求徐州牧不得布怒登喻之曰登見曹公言待將軍譬如養虎當飽其肉不則噬人公曰不如養鷹飢則為用飽則揚去布乃解晉書曰虞潭字思奧會沈充等逼京師潭起義軍至上虞有野鷹飛集屋梁衆懼潭曰起大義而剛鷙之鳥來破賊必矣後如其言又曰崔洪清厲骨鯁為尚書左丞時人為之語曰叢生荊棘來自博陵在南為鷂在北為鷹又載記曰慕容垂請至鄴拜墓符堅許之權翼諫曰垂猶鷹也飢則附人飽便高揚遇風塵之會必有凌霄之志唯宜急其羈靽不可任其所欲堅不從南史曰王僧達性好鷹犬何尚之致仕復膺朝命於宅設八關齊大集朝士自行香次至僧達曰願即且放鷹犬勿復遊獵又曰齊鬱林王即位未踰旬多藂飛鷹快犬以梁肉俸之陳書曰侯安都率水軍於中流斷齊軍糧運又襲秦郡破徐嗣徽柵收其家口得嗣徽所彈琵琶及所養鷹遣信餉之曰昨至弟住處得此今以相還嗣徽等見之大懼北史曰後魏華山郡王澄弟嵩孝文時位步兵校尉大司馬安定王休薨未及卒哭嵩便遊田帝聞大怒曰嵩大司馬薨殂一月爾便以鷹鷂自娛有叔父之痛無猶子之情損心棄禮何其太速便可免官又曰齊廣寧王孫孝珩好綴文有技藝嘗於廳事壁自畫一蒼鷹見者皆以為真三國典略曰元坦為冀州刺史不恤人事專為藂斂性好畋漁無日不出秋冬獵禽獸春夏捕水族鷹犬常數百頭器網十餘車自云寧三日不食不能一日不獵唐書曰太宗初傳位舊苑中有籠鷹悉斷聯任去良犬並解絏放之又曰太宗謂侍臣曰李大亮可謂忠直矣朕遣使至其所見有佳鷹諷令獻朕大亮因密表責朕云陛下久絶田獵而使者求鷹若是陛下之意深乖昔旨如其自擅便是任使非人朕覽表嘉歎不能自己有臣若是朕復何憂於是賜之金壺以彰忠讜又曰源乾曜為京兆尹仍京師留守乾曜政存寬簡不嚴而理嘗有仗內白鷹因縱逸遂失所在上令京兆切捕之俄於野外獲之其鷹掛於叢棘而死官吏懼得罪相顧失色乾曜徐曰事有邂逅死亦常理主上仁明當不以此置罪必其獲戾吾自當之不須懼也遂入自請失旨之罪上不問又曰憲宗時每歲冬以鷹犬出近畿習狩謂之外按宣徽院供奉官為其使領徒數百恃恩恣撗郡邑懼擾皆厚禮迎犒之恣其所便止舍私邸百姓畏之如寇盜戰國策曰唐睢謂秦王曰要離剌慶忌蒼鷹擊於殿上廣志曰有雉鷹有菟鷹一歲為黃二歲為撫三歲為青胡鷹獲麞出廬江幽明録曰楚文王少時好獵有人獻一鷹文王見之爪距神爽殊絶常鷹故為獵於雲夢置網雲布煙燒張天毛群羽族爭噬競搏此鷹軒頸瞪目遠視雲際無搏噬之志王曰吾鷹所獲以百數汝鷹曾無奮意將欺余耶獻者曰若效於雉兔臣豈敢獻俄而雲際有一物凝翔鮮白不辨其形鷹便竦翮而升矗若飛電須臾羽墮如雪血下如雨有大鳥墮地度其兩翅數十里衆莫能識時有博物君子曰此大鵬雛也文王乃厚賞之西京雜記曰茂陵少年李亭好馳駿狗逐獸或以鷹鷂逐兔皆以為佳名狗則有修毫釐睫白望青曹之名鷹則有青翅草眸青冥金距之屬鷂則有從風鷂孤飛鷂論衡曰孔子畏陽虎卻行流汙陽虎未必色白孔子未必面青鷹擊雀鶚啄鴈未必鷹鶚南方雀鴈西方自以筋力勇壯相勝服也秦子曰虎能雄猛不可以託麑鷹能飄擊不可以寄雛物理論曰使武士宰民如使狼牧羊使鷹養雛也焦贛易林曰鷹棲茂樹候雀往來益部耆舊傳曰廣漢馮皓為謁者逐單于至雲中大將軍梁冀遣人求鷹止晉陽舍人不避皓皓收之使人擊鷹而亡也皓追捕甚急冀辭乃止古樂府曰豹則虎之弟鷹則鷂之兄魏文帝答繁欽書曰商風振條秦鷹秋吟斯可謂聲協鍾石氣應風律孫楚鷹賦曰郭延考與余辭其後從者韝二鷹以侍側郭邊人也好弋獵顧眄心欲自娛樂請余為賦曰其為相也踈尾闊臆高鬐圓顱深自娥眉狀似愁胡曲觜短頸足若雙枯隋魏彥深鷹賦曰惟茲禽之化育實鍾山之所生資金方之猛氣擅火德之炎精何虞者之多端運橫羅以羈束綴輕絲於雙臉結長皮於兩足飛不遂於本情食不充於所欲逸翰由其暫斂雄心為之自局若乃貌非一體相乃多途指重十字尾貴合盧立如植木望似愁胡觜同劍利腳等荊枯亦有白如散花赤如點血大文若錦細班似纈眼類明珠毛猶霜雪身重若金爪剛如鐵或復頂平似削頭圓如卵臆闊頸長筋粗脛短翅厚羽徑髀寬肉緩求之事用俱為絶伴或似鶉頭或似鵄首赤精黃足細骨小肘懶而易驚姦而難誘住不可呼飛不及走若斯之輩不如勿有若夫疾食速消此則有命兔頸猴立是為無病廁門忌大結肚惡軟條不欲絶背不宜喘生於窟者則好眠巢於木者則常立雙骹長者則起遲六翮短者則飛急毛衣屢改厥色無常寅生酉就總號為黃二周作鴘千日成蒼雖日排虛性殊衆鳥雌則體大雄則形小遇犬則驚猜得人則馴擾養雛則少病野羅則多巧察之為易調之實難格必高逈屋必華寬薑以取熱酒以排寒韝須溫暖肉不陳乾近之令狎靜之使安晝不離手夜便火宿微加其毛少減其肉肌肥骨瘦心和性熟念絶雲霄志在馳逐鶻北齊書曰上洛王思宗弟思好少以騎射事文襄及文宣受命為左衛將軍本名思孝天保五年討賊文宣悅其驍勇謂曰爾擊賊如鶻入鴉群宜思好事故改名焉隋書曰劉昶子居士為太子千牛備身藂徒任俠不遵法度公卿子弟有力雄健者輒將至家以車輸括其頸而捧之殆死能不屈者稱為壯士釋而與交黨與三百人其趫捷者號為餓鶻隊唐書曰元和四年藹德曷里祿設弭施合蜜里迦可汗遣使請改回紇為回鶻義取回旋輕犍如鶻又曰元和八年淄青節度使李師道進鶻十二命還之唐杜甫義鶻行曰陰崖二蒼鷹養子黑柏顛白蛇登其巢吞噬恣朝餐雄飛遠求食雌者鳴辛酸力強不可制黃口寧半存其父從西來翻身入長煙斯須領健鶻憤悶寄所宣斗上捩孤影無聲來九天修鱗脫遠枝巨顙拆老拳高空得蹭蹬短草辭蜿蜒折尾能一擺飽腸今已穿生雖滅衆雛死亦垂千年物情有報復快意貴目前茲實鷙鳥最急難心炯然功成失所往用捨何其賢近經潏水湄此事樵夫傳飄蕭覺素髮凜欲衝儒冠人生所與分亦在顧眄間聊為義鶻行永激壯士肝鸇爾雅日晨風鸇也郭璞注曰鷂屬孟子曰為叢驅雀者鸇也為湯武驅民者桀與紂也隼毛詩曰織文鳥章白斾央央箋云鳥章隼之文章將帥之服又曰鵷彼飛隼其飛戾天亦集爰止隼急疾之鳥詩義疏曰鷂也齊人謂之擊正或謂之題肩或曰雀鷹春化為布穀此屬數種皆為隼周易曰公用射隼于高墉之上春秋考異郵曰陰陽氣貪故題肩擊宗均注曰題肩有爪芒為陽中陰故擊殺也國語曰仲尼在陳有隼集于陳侯之庭而死楛矢貫之石弩其長尺有咫陳惠公使以隼如仲尼之館問之仲尼曰隼之來也遠矣此肅慎氏之矢也昔武王克商通道于九夷八蠻使各以其方賄來貢使無忘職業於是肅慎氏貢楛矢石弩其長尺有咫先王欲昭其令德之致遠也故銘其括曰肅慎氏之貢矢以分大姬配虞胡公而封諸陳古者分同姓以寶玉展親也分異姓以遠方之職貢使無忘服也故分陳以肅慎氏之貢君若使有司求諸故府其可得也使求得之金櫝鷂說文曰鷂鷙鳥也爾雅曰鷣負雀郭璞注曰鷣鷂也江東呼為鷣善捉雀因名云廣雅曰鶙肩鷸子籠脫鷂也廣志曰鷸子大如胡燕色似鷂食雀籠脫擊鳩鵲晉書曰王育京兆人也太守杜宣命為主簿俄而宣左遷萬年令杜令王攸詣宣宣不迎之攸怒曰卿往為二千石吾所敬也今吾儕耳何故不見迎欲以小雀遇我使畏死鷂也唐書曰武德初萬年縣法曹孫伏伽上表以三事諫其一曰陛下貴為天子富有四海凡曰搜狩須順四時陛下二十日龍飛二十一日有獻鷂雛者此乃前朝之弊風少年之事務何忽今日行之又曰太子承乾與漢王元昌相託附承乾賜以琵琶名馬元昌報以鷂子山雞又曰太宗得鷂絶俊異私自臂之望見鄭公魏徵乃藏於懷公知之遂前白事因語古帝王逸豫微以諷諫語久帝惜鷂且死而素嚴敬徵欲盡其言徵語不時盡鷂死懷中又曰楊德幹高宗朝為萬年令有宦官恃貴寵放鷂不避人禾稼德幹擒而杖之二十悉拔其鷂頭宦者涕泣袒背以示於帝帝曰爾情知此漢獰何須犯他百姓竟不之問又曰貞元十四年九月中書門下奏賀嵯峨山獲白鷂莊子曰鷂為鸇鸇為布谷布谷復為鷂此物變也列士傳曰魏公子無忌方食有鳩飛入案下公子使人顧望見一鷂在屋上飛去公子乃縱鳩令出鷂逐而殺之公子暮為不食曰鳩避患歸無忌竟為鷂所得吾負之為吾捕得此繇者無忌無所愛於是左右宣公子慈聲旁國左右捕得鷂三百餘頭以奉公子公子欲盡殺恐無辜乃自案劍至其籠上曰誰獲罪無忌者耶一鷂獨低頭不敢仰視乃取殺之盡放其餘名聲布流天下歸焉論衡曰儒書稱魏公子方欲與客飲有鸇擊鳩鳩逃公子案下鸇追殺之於公子之前公子使人設罔捕鸇得數十責殺鳩之罪擊鳩之鸇俯頭不敢仰視公子乃殺之此虛言也鸇有千數擊鳩飛去安可復得或是捕鸇者折其頸也夢書曰鷹鷂為攻剽殘心也夢見鷹鷂憂賊人也魏陳思王曹植鷂雀賦曰鷂欲取雀雀自言雀微賤身體柴小肌肉痟瘦所得蓋少君欲相噉實不足飽鷂得雀言初不敢語頃來轗軻資糧乏旅三日不食略思死鼠今日相得寧復置汝雀得鷂言意甚怔營性命至重雀鼠貪生君得一食我命隕傾皇天是鑒賢者是聽鷂得雀言意甚泹惋當死斃雀頭如果蒜不早首服烈頸大喚行人聞之莫不往觀雀得鷂言意甚不移目如擘椒跳蕭二翅我雖當死略無可避鷂乃置雀良久方去二雀相逢似是公嫗相將入草共上一樹仍共本末辛苦相語向者近出為鷂所捕賴我番揵體素便附說我辨語千條萬句欺恐舍長令兒大怖我之得免復勝於汝自今後竟莫復相妒鵰毛詩谷風四月曰匪鶉匪鳶翰飛戾天毛曰鶉鵰也鵰鳶貪殘之鳥也說文曰鷲黃頭赤目五色皆備一曰鵰漢書曰李廣為上郡守胸奴入上郡武帝使中貴人從廣胸奴射中貴人廣曰是必射鵰者也廣射殺二人生得一人果射鵰者也穆天子傳曰春山爰有青鵰執犬豕食鹿列子曰周宣王之牧正有役人梁鴦者能養野禽獸委食於園庭之內雖虎狼鵰鶚之類無不柔者雌雄在前孳尾成群異類雜居不相搏噬後魏書曰秦王幹機悟壯勇善弓馬太宗出遊白登之東北幹以騎從有雙鵰飛於上太宗命左右射之莫能中鵰旋飛稍高幹自請射之以二箭而下雙鵰太宗嘉之賜御弓矢金帶以旌其能軍中於是號幹為落鵰都尉北齊書曰斛律光嘗從世宗於洹橋校獵見一大鳥雲表飛揚光引弓射之正中其頸此鳥形如車輪旋轉而下至地乃大鵰也世宗取而觀之深壯異焉丞相屬邢子高見而歎曰此射鵰手也當時傳號落鵰都督隋書曰長孫晟周宣帝時突厥攝圖請婚于周以趙王招女妻之然周與攝圖各相誇競妙選驍勇以充使者因遣晟副汝南公宇文神慶送千金公主于其牙前後使數十輩攝圖多不禮見晟而獨愛焉每共遊獵留之竟歲嘗有二鵰飛而爭肉因以兩箭與晟曰請射取之晟乃彎弓馳往遇鵰相攫遂一發而雙貫焉攝圖喜命諸子弟貴人皆親友冀昵近之以學彈射鷲漢書曰胸奴有計入漢地直張掖郡直當也生奇材箭竿鷲羽師古曰大鵰也黃頭赤目其羽可用為箭西域諸國記曰耆闍崛山在王舍城北四里山有兩崖鷲鳥常群居其顛土人號為靈鷲山也佛國記曰山石頭似鷲阿育王使鑿石假安兩翼兩腳今見存林邑國記曰西南遠界有靈鷲鳥能知吉凶覘人將死食尸肉盡乃去家人取骨燒為灰投之漲海鶚毛詩曰關睢后妃之德也風之始也所以風化天下而正夫婦也關關睢鳩在河之洲一名王睢一名鵰鷞江東呼為鶚食魚鷙而有別倉頡解詰曰鶚金喙鳥也見則天下兵能擊殺麞鹿漢書曰鄒陽諫吳王曰臣聞鷙鳥纍百不如一鶚孟康曰鶚大鵰白鷢爾雅曰揚白鷢郭璞注曰以鷹尾上白也廣雅曰白鷢鷹也說文曰白鷢玉鵰也崔豹古今注曰揚白鷢似鷹而尾上白也亦號為印尾鷹風土記曰說詩義者或說睢鳩為白鷢白鷢鸇屬於義無取蓋蒼鷃大如白鷢而色蒼其鳴戛戛和順又遊於水而息於洲常隻不雙
