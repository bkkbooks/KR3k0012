body:
  text: 服用部二十笄釋名曰笄係也所以拘冠使不墜也三禮圖曰笄簪也士以骨大夫以象詩曰君子偕老副笄六珈副后夫人之首飾編髮為之珈笄飾之最盛者白虎通曰男子幼娶必冠女子幼嫁必笄禮曰女子許嫁笄而字國語曰司馬子期欲以妾為子內子卿之嫡妻訪於左史倚相曰吾有妾而願欲笄之倚相止之又曰范文子暮退於朝武子曰何暮也對曰有秦客瘦辭於朝瘦隱也大夫莫之能對也吾知三焉解其三事武子怒曰大夫非不能也讓父兄也爾童子而三掩人於朝吾不在晉國亡無日矣擊之以杖折其委笄春秋後語曰趙襄子之姊為代王夫人襄子併代殺王平其地其姊聞之泣而呼天靡笄自殺代人憐之名其地為磨笄山齊淳于髡十酒説曰羅襦排門翠笄窺牖叉釋名曰叉枝形也因名之也爵叉者叉頭施爵曹植美女篇曰頭插金爵叉續漢書曰靈帝時江夏黃氏母浴而化為黿入于深淵其後人時見出浴簪一銀叉猶在其首又輿服志曰貴人助蠶玳瑁叉江表傳曰魏文帝遣使於吳求玳瑁三點叉群臣以為非禮咸人不與孫權勑付使者晉記云王達妻衛氏太安中為鮮卑所掠路由章武臺留書并叉釧訪其家晉令曰六品下得服金叉以蔽髻又曰女奴不得服銀叉晉山陵故事曰后服有玳瑁叉三十隻沈約宋書曰泰始三年以皇后已下六宮金叉千枚班賜北征將士列女傳曰梁鴻妻孟光荊叉布裙洞冥記曰元鼎元年起招靈閣有神女留一玉叉與帝帝以賜趙婕妤至昭帝元鳳中宮人猶見此叉共謀欲碎之明旦視之匣唯見白燕直升天去故宮人作玉叉因改名玉燕叉言其吉祥拾遺録曰漢獻帝為李傕所敗帝傷指伏后以繡紱拭血刮玉叉以拂於創應手則愈又曰魏文帝納美女薛靈藝有獻火珠龍鸞叉帝曰珠翠尚不能勝況龍鸞之重乎又曰魏明帝時昆明國貢嗽金鳥鳥常吐金屑如粟用飾叉珮謂之辟寒金宮人相嘲曰不服辟寒金那得帝王心又曰石季倫愛婢翔風別玉聲金色為倒龍之佩瑩金為鳳冠之叉言刻玉如倒龍之勢鑄金象鳳皇之狀結袖繞楹舞於晝夜使聲聲相接謂之恆舞欲有所召者不呼姓名悉聽珮聲視叉色玉輕聲者居前金色艷者居後以為行次而進也華陽國志曰涪陽大龜其甲可卜其緣可作叉世號靈叉裴淵廣州記曰豪富女子以金銀為大叉執以叩銅鼓號為銅鼓叉崔豹古今注曰蟠龍叉梁冀婦所制異苑曰吳郡有徐君廟東陽長山縣吏李瑫義熙中遭事在都婦過廟乞恩拔銀叉為願未至富陽有白魚跳婦前剖腹得所願叉夫事尋解幽明録曰尋陽參軍夢一婦人前跪自稱先葬近水淪沒誠能見救雖不能富貴可令君薄免禍參軍答曰何以為志婦人曰君見渚邊上有魚叉即我也參軍明旦覔果見一毀墳其上有叉移置高燥處卻十餘日參軍行至東橋牛奔直趣水垂墮忽轉正得無恙也録異傳曰吳人費季客賈去家與諸賈人語曰吾臨行就婦求金叉婦與之吾乃置戶楣上忘白婦説妻夢見季死前金叉在戶上妻取得發哀一年季卻還神仙占曰頭上著叉夜臥墮靴履中者婦人與外夫殺之司馬相如美人賦曰玉叉挂臣冠羅袖拂臣衣黃香九宮賦曰剝駭雞以為叉駭雞犀也古歌辭曰頭上金叉十二行足下絲履五文章陳司馬美女篇曰頭戴金雀叉腰珮翠琅玕崔瑗三子叉銘曰元正上日百福孔靈鬢髮如雲乃象衆星三珠橫叉攝㜎讚靈魏陳思王美女篇曰頭戴合歡叉梁陽濟泄井得金叉詩曰昔日倡家女摘華露井邊摘華還自比插映還自憐窺窺終不已笑笑自成妍寶叉於此落從來非一年翠羽成泥去金色尚如先此人今不在此物今空傳秦嘉與婦淑書曰今致寶叉一雙價直千金可以耀首淑答曰未奉光儀則寶叉不設靈怪曰吳興妖童贈謝府君詩曰玉叉空中墜金鈿色已歇獨泣謝春風良夜辜明月鑷齊書曰文安王后為皇太子妃無寵太子為宮人製新麗衣裳及首飾而右床惟陳故古舊叉鑷數枚又曰周盤龍為右將軍建元元年魏攻壽春以盤龍為軍主假節助豫州剌史桓崇祖拒魏大破之上聞之喜下詔美稱送金叉鑷二十枚與其愛妾杜氏王仲宣七釋曰載明中之羽雀雜華鑷之威蕤孔偉七別曰長袖隨腕而遺耀紫鑷承鬢而騁輝璫珥説文曰珥瑱也瑱以玉充耳也釋名曰瑱鎮也懸璫耳旁不欲使人妄聽自鎮重也此本出於蠻夷蠻夷婦女輕浮好走以此璫錘之也今中國倣之也風俗通曰耳珠曰璫周書曰武王馳紂商師大崩帝辛登稟臺取天知王珥及鹿玉衣身以自焚鹿玉則銷天知珥在火中不銷詩曰玉之瑱也象之揥也瑱塞耳也又曰有匪君子充耳琇瑩琇瑩美玉傳曰夏齊侯將納公魯昭公也命無受魯貨申豐從女買以幣錦二兩縛一如瑱史記曰淳于髡謂齊威王曰前有墮珥後有遺簪此可飲八斗又曰武帝譴責鉤弋夫人夫人脫簪珥叩頭魏書曰卞太后性約儉不尚華麗無文繡珠玉器皆黑漆太祖嘗得名璫數具命后自選一具后取其中者太祖問其故對曰取其上者為貪取其下者為詐故取其中者耳吳録曰袁博出遊其女策得壞墟齊璫珥百枚於是封上之詔以賜博也晉令曰士卒百工不得服真珠璫又諸葛恪別傳曰范慎不馬耳璫恪答曰母之於女天下至親穿耳附珠何傷於仁戰國策曰齊王夫人有七美珥韓子曰齊威王夫人死有十孺子所窺者凡十人薛公欲知所立人為十王珥而美其一獻於王以付十孺子明曰視美珥所在乃立之西京雜記曰趙飛燕為皇后其女弟上遺合浦圓珠珥夢書曰珠珥為人子之所貴夢得珠珥得子也魏陳思王洛神賦曰不江南之明璫劉禎魯都賦曰含丹吮素巧笑妍詳插曜日之笄珥明月之璫繁欽定情詩曰何以致區區耳中雙明珠王粲七釋曰抭照夜之明璫煥煜爚以垂暉傅玄七謀曰佩崑山之美玉珥南海之明璫釧通文俗曰環臂謂之釧東宮舊事曰皇太子納妃有金釧二雙祖台之志怪曰建安中河間太守劉照夫人卒於府後太守至夢見一好婦人就為室家持一雙金鏆古喚切與太守不能名婦人乃曰此錗竹志切鏆錗鏆者其狀如紐珠大如指屈伸在人太守得置枕中前太守迎喪言有錗鏆開棺視夫人臂果無復有錗鏆焉甄異記曰樂安章沉病死未殯而蘇云被録到天曹主者是其外兄斷理得免見一女同時被録乃説金釧二雙記沉以與主者亦得還遂共宴接女云家在吳姓徐名秋英沉後尋問遂得之女父母因以女妻沉高文惠與婦書曰今致金鏆一雙交州記曰波斯王以金釧聘斯調王女也唐書曰交河王麴崇𥙿兄昭少好學嘗有鬻異事書於市者其母將為買之搜索家財不足其價唯篋中有金釧數枚既而歎曰何愛此物令吾子不有異聞乎促令貨易此書昭後歷位司膳卿頗以詩詠流譽繁欽定情詩曰何以致契闊繞臂金跳脫指環春秋繁露曰紂刑鬼侯之女取其環五經要義曰古者后妃群妾禮御於君所女史書曰授其環以進退之有娠則以金環退之當御者以銀環進之進者著於左手陽也以當就男故著左手右手陰也既御而復故此女吏之職漢書儀曰宮人御幸賜銀環後漢書曰孫程等十九人立順帝有功各賜金指釧環晉書曰羊祐年五歲令乳母取所弄玉環乳母曰汝先無物祐乃於鄰人李氏東墻桑樹中探得之李氏見驚曰余亡兒所失物也乳母具言前事李氏悲惋時人異之李氏之子即羊祐前身也又曰傳暢年五歲父友見而戲解暢衣取其金環與左右暢不惜以此賞之後選入侍講東宮宋書曰西南夷元嘉七年遣使獻金剛指環梁書曰武丁貴嬪武帝鎮樊城嘗登樓以望見漢濱五彩如龍丁有女子擘絖則貴嬪也帝贈以金環納之時年十四後魏書曰咸陽王禧弟樹字秀和位宗正卿後奔梁武帝尤器之後復歸魏初辭梁其愛妹玉兒以金指環與樹常著之寄以還梁表必還之意朝廷知之俄而賜死拾遺録曰吳王潘夫人以火齊指環桂石榴枝上因其處臺名曰環榴臺時有諫者云今吳蜀爭雄還劉之名將為妖乎權乃翻其名為榴還臺也西京雜記曰戚姬以百鍊金為彄照見指上骨惡之以賜侍兒益部耆舊傳曰劉寵喪母時危亂墳墓發傷寵乃矯母令家貧無財唯有手上金環賣造墓供送免發掘西戎傳曰大宛國人深目多鬢娶婦人以金同心指環為聘外國雜俗曰諸問婦許婚下全同心指環保同志不改林道記曰林邑王獻金指環於吳主胡俗傳曰始結婚姻相然許便下金同心指環扶南傳曰扶南有訟者煮水令沸以金指環投湯中然後以手探湯其直者手不爛有罪者入湯即燋茅君傳曰勾曲山上有神芝五種求之法當以三月登山齎金環二雙啓以奉誓如此者三以為盟也必得芝草投環於石間忘顧念集靈記曰王諿琅耶人也仕梁為南康王記室亡後數年妻子困於衣食歲暮諿見形謂婦曰卿困乏衣食妻因與之酒別而去諿曰我若得財物當以相寄後月小女探得金指環一隻甄異傳曰沛郡秦拊義熙中至曲阿村日暮失路遠見火光投之屋有少女因寄宿曉臨別女以指環與拊拊去回顧乃是冢焉
