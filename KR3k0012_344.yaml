body:
  text: 兵部七十四劍中吳越春秋曰越王允常聘歐冶子作名劍五枚三大二小一曰純鈞二曰湛盧三曰豪曹或曰盤郢四曰魚膓五曰鉅闕秦客薛燭善相劍王取豪曹示之薛燭曰非寶劍也夫寶劍五色並見今豪曹五色黯然無華殞其光亡其神矣王復取鉅闕示之薛燭曰非寶劍也夫寶劍金錫和同氣如雲煙今其光已離矣王復取魚腸示之薛燭曰夫寶劍者金精從理至本不逆今魚腸倒本從末逆理之劍也服此者臣弒其君子弒其父王取純鈞示之薛燭矍然而望之曰光乎如屈陽之華沈沈如芙蓉始生於湘觀其文如列星之芒觀其光如水之溢塘觀其色渙如冰將釋見日之光此純鈞者也王曰是也客有買此劍者市之鄉三十駿馬千疋千戶之都二其可與乎薛燭曰不可臣聞王之初造此劍赤董之山破而出錫若耶之溪涸而出銅雨師灑道雷公發鼓蛟龍捧爐天帝壯炭太一下觀於是歐冶子曰天地之精悉其伎巧造為此劍吉者宜王凶者可以遺人凶者尚直萬金况純鈞者耶取湛盧薛燭曰善哉衘金鐵之英吐銀錫之精奇氣託靈有遊出之神服此劍者可以折衝伐敵人君有逆謀則去之他國允常乃以湛盧獻吳吳公子光殺吳王僚湛盧去如楚昭王寤而得之召風胡子問之此劍直幾何對曰赤董之山已合若耶之溪深而不測群神上天歐冶已死雖有傾城量金珠玉不可與况駿馬萬戶之都乎又曰越王問范蠡用兵行陣對曰越有處女出於南林之中願君王問以手戰之道立可見也處女將見道逢老人自稱袁公袁公曰聞子善為劍願一觀之女曰妾不敢有隱袁公即跪拔林之竹處女即捷其末公操其本而刺處女處女因舉杖擊之袁公即飛上樹變為白猿女別去見越王越王大悅乃命五校之隊長高才習之以教軍人當此之時皆稱越女劍又曰干將者吳人與歐冶同師俱作劍前獻劍壹杖闔閭得而寶之以故使干將造劍二枚一曰干將二曰莫邪莫邪者干將之妻名也干將作劍採五山之精合六合之英候天伺地陰陽同光百神臨觀天氣下降而金鐵之精未流莫邪曰子以憘為劍聞於王王使子作劍三年不成者其有意乎干將曰吾不知其理莫邪曰夫神物之化須人而成今夫子作劍得無當得人而後成干將曰昔吾師之作冶也金鐵之頴不消夫妻俱入冶鑪之中莫邪曰先師親爍身以成物妾何難也於是干將夫妻乃斷髮揃音剪指投之鑪中使僮女一作子三百鼓橐裝炭金鐵乃濡遂以成劍陽曰干將而作龜文陰曰莫邪而作漫理干將匿其陽出其陰而獻之闔閭闔閭甚惜之又曰伍子胥過江解劍與漁父曰此劍中有七星北斗文其直千金越絕書曰楚王召風胡子而問之曰寡人聞吳有干將越有歐冶子此二人寡人願齎邦之重寶皆以奉子因吳王請此二人為鐵劍可乎風胡子曰善於是乃令風胡子之吳見歐冶子干將使之為鐵劍歐冶子干將鑿茨山洩其溪取其鐵英為劍三枚一曰龍淵二曰太阿三曰工市劍成風胡子奏之楚王楚王見之精神太悅見風胡子問之曰此三劍其名為何風胡子曰一曰龍淵二曰太阿三曰工市楚王曰何為龍淵太阿工市風胡子對曰欲知龍淵觀其狀如登高山臨深淵欲知太阿觀其鍔巍巍翼翼如流水之波欲知工市觀其鍔從文間起至脊而止如珠而不可枉文若流而不絕晉鄭聞此三劍而求之不得興師圍楚之城三年不解倉穀盡庫無兵革於是引太阿之劍登城而麾之三軍破敗士卒迷惑流血千里晉鄭之頭畢白楚王於是大悅曰此劍威耶寡人力也風胡子對曰劍之威也因大王之神楚王曰夫劍鐵耳固能有精神如此乎風胡子曰神農以石為兵黃帝以玉為兵禹以銅鐵為兵天下皆服此亦鐵之神也王之德也又曰闔閭冢吳縣昌門外名曰白虎丘磐郢魚腹之劍在焉十萬人治之葬三日白虎居上號曰虎丘又曰伍子胥走吳至江上見漁者曰來渡我漁者知其非恒人即載入舡子胥即解其劍以與漁者曰吾先人之劍直百金請以與子也漁者曰吾聞荊王有令曰能得伍子胥者購之千金吾欲得荊王之千金何以子百金之劍為漁者渡千斧之津曰亟飡而去無令遣追者及子也子胥行即覆舡伏匕首自刎而死琴操曰聶政父為韓王冶劍過期不成王殺之時政未生壯問母知之乃上太山遇仙人學鼓琴漆身為厲吞炭變音七年琴成入韓逢其妻從置櫛對妻而笑妻泣曰君何似政齒政曰天下人齒相似反入山援石擊落其齒以刀內琴中刺韓王列士傳曰干將莫耶為晉君作劍三年而成劍有雄雌天下名器也乃以雌劍獻君留其雄者謂其妻曰吾藏劍在南山之陰北山之陽松生石上劍在其中矣君若覺殺我爾生男以告之及至君覺殺干將妻後生男名赤鼻具以告之赤鼻斫南山之松不得劍思於屋柱中得之晉君夢一人眉廣三寸辭欲報讎購求甚急乃逃朱興山中遇客欲為之報乃刎首將以奉晉君客令鑊煮之頭三日三日跳不爛君往觀之客以雄劍倚擬君君頭墮鑊中客又自刎三頭悉爛不可分別分葬之名曰三王冢列異傳曰莫耶為楚王作劍藏其雄者搜神記亦曰為楚王作劍餘悉同也孝子傳曰眉間赤名赤鼻父干將母莫耶父為晉王作劍藏雄送雌母孕尺父曰男當告之曰出戶望南山松上石上劍在其巔及產果男母以告尺尺破柱得劍欲報晉君客有為報者將尺首及劍見晉君君怒烹之首不爛王臨之客以擬王王首墜湯中客因自擬之三首盡麋不分乃為三冢曰三王冢也文士傳曰魏文帝愛楊脩才脩誅後追憶脩脩曾以寶劍與文帝文帝後佩之告左右曰此楊脩劍也周斐先賢傳曰許嘉給縣功曹儀小吏常持劍侍臣功曹月朔晨朝并持炬火嘉於是忿然歎曰男兒為吏不免賤役即投火於地以劍帶槐樹趨謁府門南記曰魏應字尹伯任城人明魯詩章帝重之數進見論難於前特受賞賜劍玦衣服先賢行狀曰王烈字彥考通識達道時國中有盜牛者牛主得之盜者曰我邂逅迷惑從今已後將改過子既已赦宥幸無使王烈聞之人有以告烈者烈以布一端遺之或問此人既有盜畏君聞之反與布何也烈曰昔秦穆公人盜其駿馬食之已而賜之酒盜者不愛其死以救穆公之難今此盜人能悔其過懼聞之知是恥惡則善心將生故與布勸為善也一年之中行路老父檐重人代檐行數十里欲至家置而去問姓字不以告頃之老父復行失劍於路有人行而遇之欲置而去懼後人得之劍主永失所取而購募或能差錯遂守之至暮劍主還見之前者代檐人也老父欖其袂曰子前者代吾檐不得姓名今子復守吾劍于路未有若子之仁子請告吾姓名將以告王烈乃語之而去老父告烈烈曰世有仁人吾未見之使人見之乃昔時盜牛人也雷煥別傳曰煥字孔章鄱陽人善星曆卜占晉司空張華夜見異氣起斗牛華問煥見之乎煥曰此謂寶劍氣華曰時有相吾者云君當貴遶身佩寶劍此言欲效矣乃以煥為豐城令煥至縣移獄掘入三十餘尺得青石亟一枚中有雙劍文采未甚明煥取南昌西山黃白土用拭劍光艷照曜乃送一劍并少黃土與華自留一劍華得劍并土曰此干將也莫耶已復不至然天生神物終當合耳乃更以華陰赤土一斤送與煥煥得磨劍鮮光愈亮及華誅劍亡玉匣莫知所在後煥亡煥子爽帶劍經延平津劍無故墮水令人沒水逐覔見二龍長數丈盤交須臾光采微發曜日映川說苑曰經侯往過魏太子左帶玉具劍右帶環珮左光照右右光照左又曰西閭過渡河而溺焉能說諸侯過曰干將莫耶拂鍾不錚以之攝履曾不如兩錢之錐錚楚庚切又曰齊遣淳于髡到楚髡為人頭小楚王甚薄之謂曰齊無人耶而使子來子何長也髡對曰臣無所長腰中七尺之劍欲斬無狀王王曰止吾但戲子耳即與髡共飲酒鹽鐵論曰所謂利兵者非謂吳楚之鋌干將之劍也以道德為城以仁義為郭莫之敢攻莫之敢入文王是也以道德為冑仁義為劍莫之敢當莫之敢禦湯武是也今不建不攻之城不可當之兵而任匹夫之役而行三尺之刃亦細矣魏文帝典論曰余好擊劍善以短乘長選茲良金命彼國工精而鍊之至于百辟其始成也五色駭鑪巨橐自鼓又曰建安二十四年二月丙午魏太子丕造百辟寶劍長四尺二寸重一斤十有五兩淬以清漳厲以礛音監䃴音諸飭以文玉表以通犀光似流星名曰飛景礛䃴青礪石也世說曰王子喬墓在金陵戰國時人有盜發之者覩無所見唯有一劍停在室中欲進取之劍作龍鳴虎吼遂不敢近俄而徑飛上天又曰鍾會是荀濟北從舅二人情好不協荀有好寶劍可直百萬常在母鍾太夫人許會善書學荀手跡作書與母取劍仍竊去不還荀深知是鍾無求得求思所以報之鍾會兄弟共以千萬起新宅始成甚精麗未得移住荀善畫於是潛往畫鍾門堂並作太傅形像衣冠狀皃如平生二鍾來入門便大感慟於是宅遂空廢陶弘景刀劍錄曰夏禹字高密在位十年以庚戌八年鑄一劍長三尺九寸後藏之會稽秦望山腹上刻二十八宿文有背面面記星辰背記山水日月又曰啟子少康在位二十九年歲次辛卯三年春鑄一銅劍上有八方面長三尺一寸頭方又曰孔甲在位四十年以九年歲次甲辰採牛頭山鐵鑄一劍銘之曰夾古文篆長四尺一寸又曰太田在位三十二年以四年歲次甲子鑄一劍長二尺九寸文曰定光古文篆書又曰武丁在位五十九年歲次戊午鑄一劍長三尺銘曰照膽大篆書又曰周昭王瑕在位五十一年二年歲次壬午鑄五劍各投五岳鎮方岳大篆書長五尺又曰簡王夷在位十四年歲次癸酉鑄一劍銘曰日駿長三尺大篆書又曰秦昭王在位五年元年丙午鑄一劍長三尺銘曰誡大篆書又曰始皇在位三十七年三年丁巳採北祇銅鑄二劍銘曰定秦李斯小篆書李斯刻一口埋在阿房闕下一口埋在日觀臺長六尺又曰前漢劉季在位十二年季以始皇三十四年於南山得一鐵劍長三尺小篆書銘曰赤霄及貴常服之此即斬白蛇之劍也又曰文帝恒在位二十三年以初元十九年庚午鑄三劍各長三尺三寸銘曰神龜形以應大撗之兆帝崩命入玄宮又曰武帝徹在位五十四年以元光五年乙巳鑄八劍各長三尺六寸銘曰八服小篆書嵩霍衡華太山皆埋之又曰宣帝詢在位二十五年太始四年鑄兩劍各長三尺一曰毛二曰貴以應足下毛之祥皆小篆書又曰平帝衍在位五年元始元年辛酉掘得一劍上有帝名因服之大篆書又曰新室王莽在位十八年建國五年庚午造威㪷及神劍皆鍊五石為之銘曰神勝萬國伏小篆書長三尺六寸又曰劉更始聖公在位二年自造一劍銘曰更國小篆書又曰後漢光武劉秀在位三十三年未貴時在南陽鄂水中得一劍文曰秀霸小篆書帝服之又曰漢明帝在位十八年元和元年戊午鑄一劍上作龍形沉之于洛水洛水清往往有人見又曰章帝烜在位十三年建初八年鑄一金劍投之伊水中以厭𣍿人之怪弘景按水經伊水有一物如人𣍿頭有人浴輒引之投水又曰安帝祐在位十九年永初七年鑄一劍藏峨嵋山擬山王也又曰順帝寶在位十九年永建元年鑄一劍長三尺四寸小篆書銘曰安漢後遂為年號又曰靈帝宏在位二十二年以建和三年鑄四劍銘曰中興一劍無故而失又曰魏武帝曹操以建安二十年於谷中得一劍三尺六寸上有金字銘曰孟德王常服之又曰齊王芳正始六年造一劍常服之無故失其刃但有空匣又曰吳主孫權黃武五年採武昌山銅鐵作十口劍萬口刀各長三尺九寸刀頭方皆是南鋼越炭作之上有大吳篆字又曰吳孫權赤烏中有人得淮陰侯韓信劍帝賜周瑜又曰孫亮建興二年鑄一劍銘曰流光小篆書又曰孫皓建初元年鑄一劍銘曰皇帝吳主小篆書又曰蜀後主劉禪延熙二年造大金劍長一丈二尺鎮劍口山往往人見輝光後人處處求覔不得又曰宋劉昱元徽二年於蔣山頂造一劍銘曰永蜀小篆書又曰蜀主劉備章武元年辛丑棌金牛山鐵鑄八鐵劍各長三尺六寸一備自佩一與太子一與梁王理一與魯王永一與諸葛亮二與張飛關羽一與趙雲並是亮書作風角處所又曰晉懷帝名熾永嘉元年造一劍長五尺銘曰步光篆字又曰東晉司馬衍咸和元年造劍十三口銘曰興國又曰東晉司馬昌明太元十年於金華山頂埋一劍銘曰神劍又曰後魏道武帝登國元年於阿理鑄二劍一銘曰鎮山一銘曰沈水並隸書又曰明元帝以太常元年造一劍長四尺銘背曰太常又曰太武帝至真君元年有道士繼天師自為帝造劍因改元為真君劍長三尺六寸隸書又曰梁武帝蕭衍天監元年即位至普通中歲在庚申命弘景造神劍十三口用金銀銅鐵錫五色合為此劍長短各依劍洞術法一曰凝霜道家三洞九真劍上刻真人玉女名字二曰宮儀備齋六宮有劍神名無刃刻宮宿星皇后服之三曰摛光備非常御斬刺長三尺六寸上刻風伯雨師形名四曰九天出軍行師君執授將長五尺金鏤作𧈪尤神形五曰伐形刻符籙道家登真圖口決六甲神長五尺六曰四目突宮闈茵被臥止小室幄帳中長三尺五寸七曰五威靈光長二尺許半身有刃上刻星辰北斗天市天魁二十八宿服此除百邪魑魅去厭即伏用之八曰風烏有惡鳥鳴起鎮之上有黃帝呪法禹步形勢用之九曰司命行刑煞罰者執之賜萬姓自裁者十曰禮劍生畜男子弧矢縠劍則用之十二曰永昌鎮國安社用之長七尺十三曰閏劍長六尺所以作十三口象閏月故也取上元甲子時加斗魁加歲正月旦合合之取風雷雨震日止環偏長八寸文曰服之者永治四方小篆文
