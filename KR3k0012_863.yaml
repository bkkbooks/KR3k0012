body:
  text: 飲食部二十膾周禮天官籩人曰朝事之籩其實膴鮑鄭玄曰膴䐑生魚為大臠也鮑者於𥻅室中糗乾之出於江淮也燕人膾魚方寸切其腴以啖所貴也禮內則曰牛膾羊炙魚膾芥醬又曰大夫燕會有膾無脯有脯無膾士不二羹胾庶人耆老不徒食尊卑差也膾春用葱秋用芥豚春用韭秋用蓼芥芥醬也肉腥細者為膾大者為軒膾者先軒之所謂攝而切之又少儀曰與羊魚之腥聶而切之為膾聶之口䐑先藿葉切之復報切則成膾也詩曰來歸自鎬我行永久飲銜諸友炮鱉膾鯉鯉魚御進也箋云御侍也王以告甫遠從鎬地來又曰月長久今飲之酒使其諸友恩舊者待之又加珍美之饌所以極勸之也論語鄉黨曰膾不厭細春秋佐助期曰八月雨後苽菜生於汙下地中作羹臛甚美吳中以鱸魚作鱸苽菜為羹魚白如玉菜黃若金稱為金羹玉鱸一時珍食說文曰鱸細切肉也釋名曰膾會也細切肉散分其赤白異切之乃會和之也東觀漢記曰章帝與舅馬光詔曰朝送鹿膾寧用飯也魏志曰陳登得胸中煩滿面赤不食華他為脈曰府君胃中有蟲數升欲成肉疽食腥物所為也即作湯二升先服一升斯須盡服之食頃吐出三升許蟲赤頭皆動半身猶是生魚膾也沈約宋書曰張收為猘犬所傷人云宜食蝦蟆膾收難之兄暢含笑先嘗收乃食瘡即愈又曰沈攸之舉兵圍郢城獲范雲令送書入城餉柳世隆鱠魚二十頭梁書曰蕭潁胄素能飲酒噉白肉膾至三升葛洪神仙傳曰仙人介象字元則會稽人有諸方術吳主聞之徵象到武昌甚敬貴之稱為介君與吳主共論鱠魚何者最美象曰鯔魚為上吳主曰論近魚耳此海中出安可得耶象曰可得耳乃令人於殿庭中作方塪汲水滿之并求釣象起餌之垂綸於塪中不食頃果得鯔魚吳主驚喜問象曰可食否象曰故為陛下取以作生安敢取不可食之物乃使廚下切之吳主曰聞蜀使來有蜀薑作齏甚好恨時無此象曰蜀薑豈不易得願羌所使者并付直吳主指左右一人以錢五十付之象書一符以著青竹杖中使行人閉目騎竹竹止便買薑訖復閉目此人承其言騎竹須臾已至成都不知是何處問人人言蜀市乃買薑于時吳使張溫先在蜀既於市中相識甚驚便作書寄其家此人買薑畢投書負薑騎杖閉目須臾已還到吳廚下切鱠亦適了搜神記曰左慈字元放在曹操坐操謂衆賓曰高會所少吳浙江鱸魚耳放曰此可得也因求銅藻盤貯水以竿餌釣於盤中須臾引一鱸出操拊手笑曰可更得不放乃更引餌沉之須臾復引出皆長二尺餘生鮮可愛操令目前切膾孝子傳曰曾參食生魚甚美因吐之人問其故參曰母在之日不知生魚味今我美吐之終身不食異物記曰鯽魚作膾味珍無輩列女傳曰姜詩妻事姑嗜魚膾又不能獨味妻與詩常力作供膾呼鄰母共食其舍側忽有泉常出鯉魚一雙以供二母之膳吳越春秋曰伍子胥伐楚末還闔閭治魚作膾作膾過時不至魚臭猶須子胥之至也三師到闔閭膾而食之不知其臭後王重作之其味如故人作魚須膾者闔閭之時造也博物志曰吳王江行食鱠有餘棄之於中流化而為異魚今呼王餘魚長數寸大如筯猶有膾形齊諧記曰江南有麻姑治者為人好噉鱠江北岸有華本者得一大蛇喚麻為鱠得食甚美苦索魚名華本因醉喚取蛇及餘肉出麻治見之大吐歐血死又曰周子有女噉鱠不知足家為之貧至長橋南見罛者挫魚作鮓以錢一千求一飽食五斛便大吐有蟾蜍從吐中出婢以魚置口中即成水女遂不復噉膾世說曰張季膺辟齊王東曹掾在洛見秋風起因思吳中蓴羹鱸魚鱠曰人生貴得適意何羈官千里以要名爵遂命駕便歸俄而齊王敗時人謂為見機又曰桓車騎冲在荊州張玄為侍中使至江陵路經陽歧俄見一人持小籠生魚徑來造船云有魚欲寄作膾張乃維舟而納之問其姓字云是劉遺民劉驎之字遺民張素聞其名大相欣待既知張銜命問謝安王文度並佳不張甚欲語言劉子無意既進膾便去云向得此魚觀君船上當有膾具是故來耳於是便去杜寶大業拾遺録曰六年吳郡獻海鮸音免乾膾四瓶瓶容一斗浸一斗可得徑尺面盤并奏作乾膾法帝以示群臣云昔術人介象於殿庭釣得海魚此幻化耳亦何是珍異今日之鱠乃是海真魚所作求自數千里亦是一時奇味即出數盤以賜近臣作乾膾法當五六月盛熱之日於海取得鮸魚其魚大者長四五尺鱗細紫色無細骨不腥捕得之即去其皮骨取其精肉縷切隨成曬三四日須極乾以新白瓷瓶未經水者盛之蜜封泥勿令風入經五六十日不異新者後取噉時以新布褁於水中漬三刻久取出灑卻水則曒然矣廣五行記曰唐咸亨四年洛州司戶唐望之各集計至五品進止未出間有僧來覔初不相識延之共坐少頃曰貧道出家人得飲食亦以少公名人故暗相託能設一頓鱠否司戶欣然即處分買魚此僧云看有蒜否家人云蒜盡也僧即起司戶留之曰蒜盡遣買即得僧云既蒜盡不可更住苦留不止望之果無疾暴卒明皇雜録曰邢州人和璞嘗謂房琯曰君歿之時必因食魚膾既歿之後當以梓木為棺然不得歿於君之私第不處公館不處玄壇佛寺不處親友之家其後譴於閬州寄居州之紫極宮臥疾數日刺史忽具鱠邀房於郡齊房亦欣然命駕既歸暴卒州主命攢櫝於宮中棺得梓木為之脯釋名曰脯搏也乾燥相搏著也修縮也乾燥縮也說文曰脯乾肉也修脯也補莫切薄膊之屋上也腕骨脯也朐脯挺也周禮曰脯人掌乾肉也凡田獸臘膴胖之事夫物解肆乾謂之乾肉薄切曰脯棰之而施薑桂曰暇修臘小物而乾者祭祀共豆脯膴胖又曰膳夫凡王之稍事設薦脯醢鄭司農云稍事謂非日中大舉時而間食謂之稍事膳夫主設薦脯醢云謂稍有小而事飲酒也儀禮曰鄉飲酒主人立于西階東薦脯使出祖釋軷祭脯士冠賓東面薦脯禮曰以脯修置者左朐右末又曰婦人之贄脯修大夫燕禮有膾無脯又禮特牲曰大饗尚睱修而已矣穀梁傳曰束修之肉不行境中有至尊者不二公羊傳曰魯昭公出奔齊侯使高子執簞食四脡脯公稽首以衽受易曰噬乾肺得金矢王肅注曰四體離陰卦骨之象骨在乾肉脯之象金象所以獲野禽故食之反得金矢君子於味必思其毒於利必備其難論語曰子曰自行束修已上吾未嘗無誨焉孔曰言人奉禮自行束修以上則皆教誨之也又曰沽酒市脯不食尚書大傳曰散宜生閎夭南宮適三子者學乎太公見三子知三子之為賢人遂酌酒切脯約為朋友漢書曰濁氏以賣而連騎東觀漢記曰光武初起兵叔父良搏手大呼曰我欲詣納言嚴將軍叱上起去出閣令人視之還白方坐啖脯晉書曰桑虞嘗行宿寄逆旅同舍客失脯疑虞為盜虞默然無言便解衣償之主人曰此舍數失魚肉雞鴨多是狐狸偷君何以疑人乃將脯往山冢間尋求果得之客求還衣虞投之不顧北齊書曰彭城王攸為滄州刺史有一人從幽州來驢馱鹿脯至滄州界腳痛行遲偶會一人為伴遂盜驢及脯去明旦告州乃令左右及府僚吏分市鹿脯不限其至主見識之推獲盜者唐書曰太宗狩于濟源之凌山上曰古者三先驅以供宗廟今所獲鹿宜令所司造脯醢以充薦享國語曰楚成王聞子文之朝不及夕也成王楚文王之子成王頵於是乎每朝設脯一束糗一筐以羞子文至于今令尹祑之祑常呂氏春秋曰趙宣子將之絳見翳桑之下有餓人宣孟與脯二朐拜受不敢食問其故曰臣有母持以遺之宣孟更賜之二束遂去東方朔神異經曰北方有增水萬里厚百丈有鼠在冰下土中食冰下草木肉重萬斤可以作脯又曰西北荒有遺酒追復脯焉其味如麞食一片復一片葛洪神仙傳曰王遠至蔡經家與麻姑共設肴膳擘脯而行云是麒麟脯又曰左慈詣劉表請犒軍有酒一器脯一盤百人捷酒賜兵人三杯酒一片脯萬人皆同而酒器如故脯亦不減世語曰初太祖乏食程昱掠其本縣供三旬糧頗雜以人脯由是失朝望故位不至公也續齊諧記曰劉晨阮肇入天台山有女仙人為設胡麻飯山羊脯因留連之楚詞曰折瓊枝以為羞王逸注曰羞脯也盧諶祭法曰春祠用脯夏用煏憑逼反杜育菽賦曰脯則正膂通幹粗鹿肥麋梁劉孝威謝東宮賡鹿脯等啓曰上林絶胡人之搏禁地無張京之犯而猶有班超之遊獵李廣馳射遠歸於廚使入貢於脯人并圖三事之車影入九仙之鏡鯖西京雜記曰五侯不相能賓客不得往來婁護豐辨傅會五侯間各得其意競致奇膳護乃合以為鯖世稱五侯鯖以為奇味焉齊書曰武帝就虞悰求諸飲食方悰祕不出上醉後體不怏悰乃獻醒酒鯖鮓一方而已鮓釋名曰鮓葅也以鹽米釀之如葅熟而食之也吳志曰孟仁為鹽池司馬自能結網手以捕魚作鮓寄母母還之曰汝為魚官而以鮓寄我非避嫌也宋書曰王瑩代謝超宗為義興太守與謝交惡超宗到都後瑩父懋往超宗處超宗設精白鮑美鮓獐巴懋問郍得佳味超宗詭言瑩始見餉佯驚曰大人豈應不得耶懋大忿言於朝廷稱瑩供養不足坐失廢棄久之博物志曰仲秋月取折頭鯉子去鱗破腹使膂割為漸米爛藻之以赤秝米飯鹽酒令糝之鎮不苦重踰月乃熟是謂秋鯖王子年拾遺記曰漢元鳳二年於淋池之南起桂臺以望遠帝常以季秋之月沉衝瀾雲鷁之舟窮略係夜釣於臺下以香金為釣霜絲為綸丹鯉為餌得白蛟長三丈若大蛇無鱗甲帝曰非瑞也命太官為鮓肉紫骨青味絶香美班賜群臣帝後思其美漁者不復得知為神異也列異傳曰費長房又能縮地脈坐客在家至市買鮓一日之間人見之千里外者數處世說曰有人遺張華鮓見之謂客云此龍肉也肉鮓中則有五色光試之果如言後問其主云於茅積下得白魚所作也又曰陶侃少時作魚梁吏常以一坩苦甘切鮓餉母母封鮓付反書責侃曰汝為吏以官物見餉非唯不能益吾乃以增吾憂也謝玄與婦書曰昨出釣獲魚作一坩鮓今奉送大業拾遺曰十二年六月吳郡獻太湖鯉魚腴鱔四十坩純以鯉腴為之計一坩䱹用鯉魚三百頭肥美之極冠於鱣鮪八珍周禮天官曰食醫掌王之八珍禮曰淳熬煎醢加于六稻上沃之以膏曰淳熬沃煎成之以為名淳母煎醢加于黍食之上沃之以膏曰淳母母讀曰模模象也作此象淳熬也炮取豚若將圭之刳之實棗於其腹中編萑以苴之塗之以謹音堇塗炮之塗皆乾擘之濯手以摩之去其皽音善切為稻粉糔溲之以為醴以付豚煎諸膏膏必滅之巨鑊湯以小鼎薌脯於其中使其湯母滅鼎三日三夜無絶火而后調之以醯醢炮者以塗燒之為名將當為牂牂羊也檮珍取牛羊麋麕之肉必脄音媒每物與牛若一捶反側之去其餌熟出之去其皽柔其肉脄脊側肉漬取牛肉必新殺者薄切之必絶其理湛音尖諸美酒期朝而食之以醢若醯臆湛亦漬也為熬捶之去其皽編萑布牛肉焉屑桂與薑以酒諸上而鹽之乾而食之施羊亦如之施麋施鹿施麇皆如牛羊欲濡肉則睪而煎之以醢欲乾肉則搖而食之熬取火上為之今火脯似之此七者周禮八珍其一肝膋是也肝膋取狗肝一懞之以其濡炙之舉焦其膋不蓼膋腸間脂也
