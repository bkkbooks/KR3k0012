body:
  text: 資產部五蠶周禮天官下內宰曰中春詔后帥外內命婦始蠶于北郊以為祭服蠶于北郊婦人以純陰為尊郊必有公桑蠶室焉又夏官馬質曰馬質掌質馬禁原蠶者原再也天文辰為馬蠶書蠶為龍精月直大火則浴其種是蠶與馬同氣也物莫能兩大禁再蠶者為傷馬也禮記月令季春曰是月也命有司無伐桑柘愛蠶食有司謂主山林之官乃修蠶器蠶器謂簿槌鈳筐之類后妃齊戒享先蠶而躬桑以勸蠶事季春吉祀皇后享先蠶先蠶天駟享先蠶而後躬桑示率先天下也又孟夏曰是月也蠶事既登后妃獻繭乃收繭稅以桑為均貴賤長幼如一以給郊廟之服后妃獻繭進其成功也乃收繭稅十而取一以桑為均者謂用桑多則繭多桑少則繭少貴賤長幼如一各自以桑為不得以人貴賤長幼為差又檀弓曰成人有其兄死而不為衰者聞子皋將為成宰遂為衰成人曰蠶則績而蟹有匡范則冠而蟬有緌兄則死而子皋為之衰蚩兄死者言其衰之不為兄死如蟹有匡蟬有緌不為蠶之績范之冠也范蜂也蟬蜩也緌謂蜩啄長在腹下又祭義曰古者天子諸侯必有公桑蠶室近川而為之築宮仞有三尺棘牆而外閉之及大昕之朝君皮弁素積卜三宮之夫人世婦之吉者使入蠶室奉種浴于川桑于公桑風戾以食之大昕季春朔月之朝也諸侯夫人三宮半王后也風戾之者及早涼脆采之風戾之使露氣燥乃以食蠶蠶性惡濕歲既單矣世婦卒蠶奉繭以示于君遂獻繭于夫人又祭統曰是故天子親耕于南郊以共齊盛王后蠶于北郊以共純音緇服諸侯耕於東郊以共齊盛夫人蠶於北郊以共冕服天子諸侯非莫耕也王后夫人非莫蠶也春秋文耀鉤曰商絃絕蠶合絲絃將絕蠶含絲以待用也春秋考異郵曰蠶陽者大火惡水故食不飲桑者土之液木生火故蠶以三月葉類會精合相食爾雅曰蛾羅蠶蛾螝蛹音龜蠶蛹蟓桑繭食桑葉作繭即今蠶也雔由樗繭食樗葉棘繭食棘葉欒繭食欒葉蚢蕭繭食蕭葉者皆蠶類史記天官書曰正月上甲風從東方來宜蠶續漢書曰光武建武二年野蠶成繭民收其絮又輿服志曰貴人助蠶瑇瑁釵簪珥東觀漢記曰明德馬后置織室蠶於濯龍中往來觀內以為娛樂謝承後漢書曰南陽范充為吳桂陽太守教民植桑絺紵之屬養蠶織履民得利益吳錄曰南陽郡一歲蠶八績後魏書曰世宗正始年徐州蠶蛾喫人尫殘者一百一十餘人死者二十二人時高肇專政聚歛不息隋書曰江湖之南一年蠶四五熟唐書曰武德中梁州言野蠶成繭百姓採而用之又曰文德太后率內外命婦有事於親蠶又曰開元中上命官中食蠶親自臨視欲使嬪御已下知女工之事及蠶罷獲絲甚多因以賜焉又曰天寶中益州獻三熟蠶緊厚白淨與常蠶不殊又曰大曆中太原府清河縣人韓景暉養冬蠶成繭詔給復終身韓子曰鱓似虵蠶似蠋人見虵驚駭見蠋則毛起而漁者持鱓婦人拾蠶利之所在皆賁育也淮南子曰季春后妃齋戒東鄉就桑省婦使觀蠶事又曰蠶食而不飲三十日而化又曰食桑者有絲而蛾又曰蠶食礜而不飲又曰蠶餌絲而商絃絕商絃金聲也春蠶吐絲金死故絕賁星墜而渤海決賁星流星也勃海水之勃怒也又曰原蠶一歲再登非不利也然王法禁之者以其殘桑淮南方畢術曰白芳七結浴蠶又曰僵蠶使馬不食欲愈之以桑拭口皋即食矣馬喜齧人亦以僵蠶眉拭脣即不齧也抱朴子曰甘始以藥粉桑長蠶蠶得十月不老金樓子曰楊泉蠶賦序曰古人作賦者多矣而獨不賦蠶乃為蠶賦是何言歟楚蘭陵荀如有蠶賦德淵近不見之有文不如無述也東方朔別傳曰武帝求神仙朔言能上天取藥上知其謾欲極其言即遣方士與朔上天朔曰當有神來迎我後方士晝臥朔遽口呼若極真者吾從天上還方士遽以聞上以為面欺下朔獄朔泣曰臣幾死者再天公問臣下方何衣朔曰衣蠶蠶何若曰喙呥呥仁廉切類馬色班班類虎天公大怒以臣為謾繫臣司空使使下問還報有之乃出臣今陛下以臣為詐願使使上問之上曰齊人多詐欲以喻我止方士也罷方士東方朔占曰正月旦竟日不風清明宜蠶列仙傳曰園客濟陽人姿皃好而良邑人多欲以女妻之客終不娶種五色香草積數十年服食其實一旦五色蛾止其香末客收而薦之以布生桑蠶焉蠶時有女夜至自稱客妻客與俱蠶得繭大如盆郭子橫洞宜記曰寒青之國其國人皆以鳥為衣其地多霜雪陰翳忽見日從南方出則百獸皆鳴國俗以為祥異有蠶色青長一丈亦曰青蠶績其絲大如指一絲可羈絆牛馬國人常以十丈充黃門之廄以拘馬也巨象師子帝令以此一絲繫之古今注曰元帝永元四年東萊郡東弁山有野蠶為繭收得萬餘石民人以為絲絮司馬徽別傳曰人有臨蠶求徽蔟者徽便以與之自棄其蠶搜神記曰舊說太后古時有人遠征家唯有一女并馬一疋女思父戲馬曰爾能為我迎得父吾將嫁汝馬乃絕韁而去至父所父疑家中有故乘之而還馬後見女輒怒而奮繫父怪之密問女女具以荅父乃射殺馬曝皮於庭女至皮所足蹙之曰爾馬而欲人為婦自取屠剝何如言未竟皮蹶然起卷女而行父還失女後大樹枝得女及皮乃盡化為蠶績於樹上其繭厚大異於常蠶鄰婦取養之其收二倍今世或謂蠶為女兒古之遺語也拾遺錄曰員嶠之山名環丘有冰蠶長七寸黑色有角有鱗以霜雪覆之然後作繭長一尺其色五綵織為文錦入水而不濡投火則經宿不燎海人獻堯以為黼黻顏氐家訓曰胡人見錦不信有蟲食樹吐絲所成昔在江南不信有千人氈帳及來河北不信有萬石舟舡皆實驗也齊諧記曰正月半有神降陳氏之宅云我是蠶神能見祭當令蠶百倍今人正月半作餻糜像此也一云吳郡張誠皇后親蠶儀注曰皇后躬桑始將一條執筐受桑將三條女尚書跪白曰可止執筐者以桑授蠶母蠶母以桑適金室也先蠶儀注曰親蠶前三日太祝令質明以太牢祠先蠶也週遷古今輿服雜事曰蠶始生后食之三灑而止三輔故事曰始皇后葬用金蠶二十箔玄中記曰大月支有牛名為日及今日割取其肉三四斤明日瘡愈漢人入此國以牛示之以為珍異漢人曰吾國有蟲大小如指名為蠶食桑葉為人吐絲外國人不復信有蠶也又曰化民食桑三七年化能以自裹如蠶績九年生翼七年而死去琅耶四萬里神異經同林邑記曰九真郡蠶年八熟繭小輕薄絲弱綿細永嘉郡記曰永嘉有八輩蠶蚖珍蠶三月績柘蠶四月初績蚖蠶四月初績愛珍五月績愛蠶六月末績寒珍七月末績四出蠶九月初績寒蠶十月績凡蠶再養者前輩皆謂之珍少養之愛蠶者故蚖蠶種也蚖珍三月既績出蛾取卵七月八月便割蠶生多養之是為蚖蠶欲作愛者取蚖珍之卵藏內甕器中隨器大小亦可十紙百紙蓋覆器口安冷水使冷氣折其出勢僅得三七日然後劄生養之謂為愛珍亦愛子績成繭蛾生卵卵七日又剖成蠶多養之此則愛蠶也顧微廣州記曰吳黃武三年遣交州治中呂瑜發趙嬰齊冢得金蠶曰珠各數斛廣志曰有原蠶有冬蠶有野蠶有柞蠶食柞葉可以作綿崔贛易林兌之坎曰飢蠶作室緒多亂纏端不可得又震之說曰秋蠶不成冬種不生龍魚河圖曰蠶沙宅亥地大富得蠶絲吉利仲長子昌言曰北方寒其人壽南方暑其人夭此寒暑之方驗於人也約之蠶也寒而餓之則引日多溫而飽之則用日少此寒溫飢飽之為脩短驗於物者也物理論曰使人主養民如蠶母之養蠶則其用豈徒絲蠶而已哉雜五行書曰含南種棗九株辟縣官宜蠶桑又曰二月上壬取土泥屋四角宜蠶吉呂氏本草曰石蠶一名沙蜯神農雷公醎無毒生漢中治五淋破隨肉解結氣利水道除熱孫卿蠶賦曰食桑而吐絲前亂而後治夏生而惡暑疾溫而惡雨蛹以為母蛾以為父三俯三起事乃大已是謂蠶理閔鴻蠶賦曰體龍頸而驥喙邁皦素於羔羊左思吳都賦曰國稅再熟之稻鄉貢八蠶之綿古艷歌曰日出東方隅照我秦氏樓秦氏有好女自名為羅敷羅敷善蠶桑採桑城南隅陸機詩曰老蠶晚績縮老女晚嫁辱曾不如老鼠飜飛成蝙蝠蔡邕書曰家祖君常言客有三當死夜半蠶時至人室家也今者一行而犯其兩嵇康養生論曰火蠶十八日寒蠶三十餘日裴頠崇有論曰鳥無胃肺蛤無五藏蛭以空中而生蠶以無胃而育也繰禮記祭義曰古之獻繭者其率用此與問者之辭及良日夫人繅三盆手遂布于三宮夫人世婦之吉者使繅遂朱綠之玄黃之以為黼黻文章服既成君服以祀先王先公敬之至也三盆手者三掩也凡繅每淹大揔而手掖之以出緒也說文曰繰𦅰繭為絲也尸子曰夫繭合而弗治則腐蠹而棄使女工繰之以為美錦列仙傳曰園客蠶得繭大如盆繰一繭數十日繰訖俱去莫知所如濟陽今有革蠶祠已備於前故此小略繀車通俗文曰織纖謂之繀音碎受緯曰孚繀車方言曰繀車趙魏之間謂之歷鹿車東齊海岱之間謂之道軌孫德施繀車賦曰惟工藝之多門偉英麗乎創形擬老氏之一轂兮應天運以廻行秉轉屈以成規兮不辭勞以自傾故其用同造物功參天地軒轅垂衣因其以濟袞冕龍旂用康上帝勳存王室惠流皂隸觀其微風興於輪端霧雨散于𨌘輻制以靈木絡以奇竹危朝日以投員兮准暈月以造象若洪輪之在雄兮似蜘蛛之結網爾乃才藝妻妾工巧是嘉或織綿組或匠綾羅舒皓腕於輕輪兮煥擬景乎鏡華絲成妙於指端號𢬤兮幽而相和象蟋蟀之鳴戶兮類寒蟬之吟家篗方言曰篗援也音爰兗豫河濟之間謂之轅郭璞注曰所以絡絲說文曰篗收絲者也或作音角從角間聲絡車方言曰河濟之間絡謂之格郭璞注曰所以轉篗紿事也柅易姤卦曰繫于金柅金者堅剛之物柅者制動之至通俗文曰張絲曰柅也說文曰檷絡絲檷從木爾聲讀若柅機杼毛詩谷風大東曰小東大東杼軸其空字林曰𢈻女涉切機下所履史記曰公儀休相魯見布好出家婦燔其機也列女傳曰河南貞義者樂羊子之妻也羊子出學後得遺金一餅以與貞義曰妾聞君子不以利洿行反裘負薪古人知其害本羊子慚而棄之學一年復歸貞義引刀趣機曰此織生於蠶桑治於絲繭加之機杼一絲而累以至丈尺今若斷之損棄成功稽廢日月夫子積學當日知所無中而廢歸何異斷機哉羊子大慚復出七年不歸列子曰紀昌者學射於飛衛曰爾先學不瞚而後可言射矣紀昌歸偃坐其妻之機下以目承牽挺牽挺機二年之後雖錐末到眥而不瞚也淮南子曰伯余之初作衣也伯余黃帝臣也緂麻素縷手經指挂後世為之機杼勝復以便其用傳子曰舊機五十綜者五十躡六十綜者六十躡馬生者天下之名巧也患其遺日喪功乃皆易以十二躡其奇文異變因感而作王逸機賦曰舟車棟宇麤工也杵臼碓磑直巧也槃材縷小用也至於織機功用大矣上自太始下訖羲皇帝軒龍躍庾業是創俯系聖思仰攬三光悟彼織女終日七襄爰制布帛始垂衣裳於是取衡山之孤桐南岳之洪樟勝復迴轉刻象乾形大庭淡泊擬則川平先為日月蓋取昭明三轉列布上法台星兩驥齊首儼若將征方圓綺錯極妙窮奇兔耳跧伏若安若危猛犬相守竄身匿蹄高樓雙峙以臨清池遊魚衘餌瀺灂其陂鹿廬並趍纖繳俱垂宛若星圖屈膝推移爾乃垂輕杼欖床帷動搖多容俯仰生姿古詩曰纖纖擢素年扎扎弄機杼又曰皎皎白素絲織為寒女衣寒女雖巧妙不得秉機杼梭通俗文曰梭織具也所以行緯之蘇戈切鄧粲晉書曰謝鯤鄰家有美女鯤桃之女以梭投之折其兩齒異苑曰陶侃嘗捕魚得一梭還插著壁有頃雷雨梭變成赤龍從屋而躍
