body:
  text: 河南道中虢州十道志曰虢州弘農郡禹貢豫州之域春秋為虢地七國時秦韓之境秦併天下為三川郡漢元鼎中置弘農郡左傳僖二年曰晉荀息以屈産之乘垂棘之璧以假道於虞以伐虢應劭漢官儀云弘大也所以廣大農業也漢志曰武帝置弘農縣於秦故函谷關山嶺下戴延之西征記曰函者道形如函也孫卿子曰秦有松柏之塞是也帝王世紀曰虢有三焉周興封虢仲於西虢此其地也封虢叔於東虢即成皋是也今陜郡平陸縣是北虢漢書曰楊僕為樓船將軍恥為關外人於是徙關新安割秦河南南陽二郡之西境於故函谷置弘農郡漢書郊祀志曰黃帝以首山之銅鑄鼎於荊山之下後名其地為鼎湖今胡城縣也郡國縣道記曰盧氏西虢之別也遁甲開山圖曰盧氏山宜五穀可以避水災因山以名縣汝州十道志曰汝州臨汝郡禹貢豫州之域春秋時為周王畿及鄭楚之地十三州志曰戰國時梁屬魏秦置三十六郡屬三川郡漢為河南郡之梁縣也左傳昭二十九年傳曰陶唐氏既衰其後有劉纍學擾龍于豢龍氏以事孔甲能飲食之夏后嘉之賜氏曰御龍一雌死潛醢以食夏后夏后饗之而使求之懼而遷于魯縣即魯山縣也又曰楚白公之亂葉公率國人攻白公白公奔山縊死葉公遂邑焉即今葉縣也家語曰葉公好龍窗壁皆畫龍形真龍為降葉公見而喪魄漢書曰漢王至成皋轅生説漢王曰漢楚相拒滎陽數歲漢常困願君王出武關項王必引南走王深壁令滎陽成皋且休息使韓信等輯河北地連燕齊君王乃復走滎陽如此則楚所備者多漢得休息王從其計出兵宛葉間左傳曰邘晉應韓武之穆也注曰應城在襄城城父縣西南韓詩外傳曰周成王與弟戲以桐葉為圭以封汝周公曰天子無戲言王應時而封曰應侯今應城是也鄭州十道志曰鄭州滎陽郡禹貢豫州之境秦兼天下為三川郡帝王世紀曰黃帝都於都有熊今新鄭是也漢志曰新鄭本高辛氏火正祝融之墟國語曰鄭桓公為司徒問於史伯曰王室多故余懼及焉何以逃死史伯對曰王室將卑戎翟必昌不可逼也當成周者南有荊蠻申呂應鄧陳蔡隋唐北有衛燕翟鮮虞路泉徐蒲鮮虞姬姓路泉徐滿皆赤翟隗姓也西有虞虢晉隗霍楊魏芮八國姬姓也東有齊魯曹宋滕鄒莒是非王之友子母弟甥舅也皆則蠻夷戎狄之人也非親作頑不可入也其濟洛河穎之間乎言此四水之間可逃是其子男之國虢鄶為大虢東虢仲之後鄶姬姓虢叔恃勢鄶仲恃險皆有淫侈怠慢之心加之以貪冒君若以周難之故寄孥與賄焉不敢不許孥妻子賄財也周亂而是驕而貪必將背君君若以成周之衆奉辭伐罪無不克矣克二邑鄢弊補舟依柔歷華君之土也言克虢鄶此八邑可得若前華後河右洛左濟主芣騩而食溱洧芣驪山名主為神主也修典刑以守之可以少固公説乃東孥與賄虢鄶受之十邑皆有寄也後桓公之子武公竟取十邑之地而居之今河南新鄭是十邑謂前八邑及虢鄶韓詩外傳曰鄭國俗以二月桃花水下時會于溱洧之上以自祓除也故詩曰溱與洧方渙渙兮漢書曰漢王數困滎陽成皋間計欲捐成皋以東屯鞏雒以距楚酈食其曰夫敖倉天下轉輸久矣臣聞其下藏粟甚多楚人拔滎陽不能堅守敖倉此天所以資漢願足下急進兵攻滎陽據敖倉之粟即天下知所歸矣晉書曰阮籍嘗登廣武見劉項戰處歎曰時無英主使豎子成名其地在滎陽地道記曰陽武滎陽有博浪沙張良為韓擊秦始皇處宋州十道記曰宋州睢陽郡理宋城縣虞舜十二州為豫州之境周為青州之域武王封微子之邑後為齊楚魏所滅三分其地魏得其梁陳留齊得濟陰東平楚得沛梁即今州地禮記曰武王克殷下車而封殷之後於宋禹貢曰導荷澤被孟豬孟豬澤在今虞城縣明都澤是博物志曰宋北至泗水南迄睢渦有孟豬之澤碭山之基元和郡國志曰秦併天下改為碭郡後改為梁國漢文帝封子武為梁王自漢至晉為梁國屬豫州宋改為梁郡隋於睢陽置宋州唐書曰天寶末祿山亂兩河郡縣多所陷沒張巡許遠守睢陽賊將尹子奇併力攻圍逾年不下城中食盡竟為賊所陷巡等抗詞不撓遂被害陳留風俗傳曰宋之地猶有先王遺風重厚多仁好稼穡惡衣食以致畜藏史記曰梁孝王築東苑三百里是曰兔園又為復道自宮屬諸平臺三十餘里圖經曰梁王有修竹園園中竹木天下之選集諸方遊士各為賦故館有鄒枚之號又有鴈鶩池周回四里亦梁王所鑿又有清冷池有釣臺謂之清冷臺漢志曰寧陵屬陳留莽曰康善孟康曰故葛伯國今葛鄉是也漢書曰梁孝王武以孝文十二年徙梁梁為大國居天下膏腴地北界泰山西至高陽四十餘城多大縣於是孝王築東苑方三百餘里廣睢陽城七十里大治宮室為復道自宮連居於平臺四十餘里曹州十道志曰曹州濟陰郡置在濟陰縣禹貢豫州之域周為曹國地後屬宋七國時屬齊漢為濟陰郡地在濟水之南故以為名曹詩曰薈兮蔚兮南山朝躋曹南山也左傳僖二十八年曰晉侯圍曹門焉多死曹人尸諸城上棨晉死人於城上人晉侯患之聽輿人之誦曰移舍於墓言將發冢曹人凶懼因其凶也而攻之入曹而分曹衛之田以賜宋人晉侯有疾曹伯之豎侯獳貨筮史使曰以曹為解齊桓公為會而封異姓今君為會而滅同姓曹叔振鐸文之昭也先君唐叔武之穆也且合諸侯而滅兄弟非禮也公説復曹伯尚書曰夏師敗績遂伐三鬷俘厥寶玉孔曰三鬷國名今定陶也水經曰荷水俗謂之五丈溝東經定陶漢書曰高祖五年春二月甲午即皇帝位於定陶汜水之陽左傳曰衛孫蒯田于隧飲馬于重丘重丘人毀瓶因詬之重丘今乘氏縣亳州十道志曰亳州譙郡置在譙縣禹貢豫州之域春秋時陳國之譙邑六國時屬楚秦為碭郡地漢為譙縣屬沛郡左傳曰楚成得臣帥師伐陳遂取焦夷杜注焦今譙國史記曰周武王封神農之後於譙國漢書地理志曰王莽以譙為延成亭魏志曰後漢熹平五年黃龍見譙太史令單揚以為其國當有王者興不及五十年亦當復見及文帝即位果如其言以先人舊都立為譙國與長安許昌鄴洛陽號為五都元和郡縣志曰後魏立南兗州周武改為亳州魏略曰太祖於譙東五十里澤中築起精舍讀書射獵閉絶賓客即謂之譙東史記曰老子苦縣人也告縣即今真源縣單州五代史曰單州本單父縣梁為輝州後唐同光二年復舊隸宋州周廣順中割隸曹州史記曰虙不齊字子賤為單父宰反命於孔子曰國有賢者賢不齊者五人教不齊所以治者孔子曰惜哉不齊所治者小所治者大則庶幾矣呂氏春秋曰宓子賤治單父彈鳴琴身不下堂而單父治許州十道志曰許州許昌郡禹貢豫州之域周為許國左傳曰許太嶽之胤也説文曰許炎帝之後也武王伐紂時封之漢志曰潁川許縣舊許國也魏略曰後漢建安元年太祖迎獻帝都於許即此邑也魏文帝即位改許昌縣焉左傳曰鄭伯請釋泰山之祀而祀周公以泰山之祊易許田今有魯故城在長社縣後漢書曰宋寵為潁川太守問功曹鄭凱曰聞貴郡山川多産奇秀前賢往哲可得聞乎凱對曰鄙郡稟嵩高之靈中嶽之精是以聖賢龍蟠俊乂鳳集昔許由巢父恥受堯禪洗耳河濱重道輕帝邈世高蹈樊仲父者志潔心遐恥山河之功賤天下之重抗節參雲公儀許由俱出陽城留侯張良奇謀輔世玄笇入微濟生民之命恢帝王之略功成而不居爵厚而不受出于父城胡元安體曾參之至行履樂正之純業喪親泣血骨立形存精神通於神明雉兔集於左右出潁陽彪義山英姿秀偉逸才挺出究孔子之房隩存文武於將墜出於昆陽杜伯夷經學著於師門政事熙於國朝清身不茍有於陵之操損已存公有公儀之節出定陵又曰獻帝建安元年遷都許魏略曰黃初五年文帝東征留郭后於永始臺霖雨百餘日城樓多壞有司請移后曰昔楚昭王出遊貞薑留漸臺江水至使者迎而無符不出卒沒今帝在遠未有急奈何移也又景福殿賦曰鎮以崇臺實曰永始臺在許昌縣魏志曰荀彧字文若潁川潁陰人也董卓之亂彧謂父老曰潁川四戰之地天下有變當為兵衝宜亟去無久留鄉人多懷土猶豫會冀州牧韓馥迎彧獨將宗族至冀州後董卓遣李催等出關東所過虜掠至潁川鄉人留者多見殺略陳州十道志曰陳州淮陽郡置在菀丘縣元和郡國圖曰禹貢豫州之域本太昊之墟周武王封媯滿於陳春秋時楚滅之秦滅楚屬潁川郡漢高分置淮陽國後漢改為陳國毛詩陳風曰坎其擊鼓宛丘之下又曰東門之池可以漚麻注水經曰東門池水至清而不耗不生諸草爾雅曰陳有宛丘又曰丘上有丘為宛丘漢書曰高帝十一年立子友為淮陽王罷潁川郡以益之七賢傳曰漢武出淮陽到監鄉帝問陳翼曰此名為何翼曰監鄉上曰何欺乎翼曰臣言不欺若不欺佩刀當生白毛若欺則無毛視之刃果有毛監鄉在盧江縣潁州十道志曰潁州汝陰郡置在汝陰縣元和郡縣圖曰禹貢豫州之域春秋胡子國楚滅之秦併天下為潁川郡在漢州則汝南郡之汝陰縣也魏晉於此置汝陰郡後魏改置潁州毛詩曰遵彼汝墳伐其條枚史記曰蒙恬伐楚寢丘今汝陰縣有寢丘故城在焉呂氏春秋曰楚孫叔敖戒其子曰我死王必封汝無受利地荊楚之間有寢丘其地為不利可長有也其子從之楚封功臣二葉而滅唯寢丘不奪一名沈丘蔡州十道志曰蔡州汝陽郡禹貢豫州也圖經曰春秋時為沈蔡二國之地後為楚魏二國之境秦兼天下以其地為三川漢為汝南郡地形志曰謂之懸瓠城亦名懸壺城又水經曰汝水周城形如懸瓠故取名焉史記曰周武王克殷封叔度於蔡挾武庚作亂周公殺管叔而放蔡叔與車七乘子改行率德周公聞之舉胡以為魯卿士故魯國治復封胡于蔡是為蔡仲輿地志曰新蔡縣蔡平侯自上蔡徙都之故曰新蔡漢志曰汝南郡高帝置王莽曰汝汾又曰鮦陽屬汝南郡在銅水之陽也鮦音紂又曰吳房本房子國也楚靈王遷房于楚吳王闔閭弟夫概王奔楚楚封於此為堂溪氏以封吳故曰吳房史記蘇秦説韓王曰韓之劍戟出堂溪又曰李斯上蔡人也二世二年七月具斯五刑論要斬咸陽市斯出獄與其中子俱執顧謂子曰吾欲與客復牽黃犬出上蔡東門逐狡兔可得乎後漢書曰許劭字子將汝南平輿人也兄虔亦知名汝南人稱平輿淵有二龍焉平輿故城今蔡州汝陽縣東北有二龍鄉月且里
