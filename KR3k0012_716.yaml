body:
  text: 服用部十七步搖釋名曰后首飾曰副副覆也以覆於首上有垂珠步則搖也周禮曰王后首服為副所以副首為飾若今步搖也續漢書輿服志曰皇后入廟步搖以黃金為山題貫白珠桂枝相糾八爵九華熊虎赤羆天鹿辟邪後漢書曰和熹鄧后賜馮貴人赤綬以未有步搖環佩各加賜一具晉書曰慕容廆曾祖莫護跋魏初率其諸部入居遼西從宣帝伐公孫氏以功拜率義王始建國於棘城之北時燕代多冠步搖冠護跋見之乃斂髮襲冠諸部因呼之為步搖其後音訛遂為慕容焉江表傳曰孫皓使尚方以金作步搖假髻以千數令宮人著以相撲朝成夕敗輒命更作晉令曰步搖蔽髻皆為禁物西京雜記曰趙飛燕為皇后其女弟上遺黃金步搖宋玉風賦曰主人之女垂珠步搖梁沈靖妻沈氏步搖花詩曰珠花縈翡翠寶葉間金瓊翦荷不似製為花如自生低枝拂衣領微步動搖英假髻周禮曰追師掌王后首服為副鄭玄云副婦人首飾三輔謂之假髻東觀漢記曰章帝詔東平王蒼惟王孝友之德令以光烈皇后假髻帛巾各一衣一篋遺王可時瞻視以慰凱風寒泉之思晉中興書微祥説曰太元中公主婦女緩鬢假髻以為盛飾用髮豐多不可恆戴乃先於籠上扶之名曰假髻或名假頭至於貧人不能自辦自號無頭就人借髻後孫恩桓玄之亂死者萬計被戮之家多亡頭首至大斂時皆以藤縛菰草為頭是假髻之應也晉令曰士卒百工不得著假髻髲釋名曰髲被也髲少者得以被助其髲也詩曰鬒髮如雲不屑髢也髢髮也音弟傳曰衛莊公自城上見戎州巳氏之妻髮美使髡之以為呂薑髢後為巳氏所殺也吳志薛綜上事云漢時朱崖叛以長吏覩其人好髮髡取為髲故百姓怨叛南越志曰開安縣出頭髲異苑曰琅琊費縣民家恆患失物作繩彄施穿穴口因繫得一髲長三尺許後不復失物
