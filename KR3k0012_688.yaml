body:
  text: 服章部四幘賾釋名曰幘賾也下齊眉頤然也揚雄方言曰覆髻謂之幘巾或謂之承露或謂之覆髻皆趙魏之間通語也應劭漢官儀曰幘古卑賤執事不冠者之所服也徐廣輿服雜注曰天子郊廟則黑介幘漢書曰武帝從館陶公主飲董偃緑幘傅韝伏殿下乃贊曰館陶公主庖人臣偃昧死再拜謁後漢書曰劉盆子探得符後棄之復還依俠卿俠卿為制絳單衣半頭赤幘幘巾所以履髻也續漢書曰童子幘旡屋示未成人也半頭幘即空頂幘也其上無屋故以為名董仲舒繁露曰以赤統者幘尚赤盆子承漢統故用赤也東宮故事曰太子有空頂幘一枚即半頭幘之制也東觀漢記曰光武初起與諸李市弓弩絳衣赤幘又曰詔賜段熲赤幘大冠一具又曰馬援外類儻蕩簡易而內重禮事寡嫂雖在閨內必幘然後見又曰馬援初見帝令中黃門引入上在宣德殿南廡下但幘坐援曰陛下何知臣非剌客姦臣而簡易若是謝承後漢書曰巴祗字敬祖為楊州剌史黑幘毀壞不復改易以水澡墨傅而用之許慎説文曰澡洗也續漢書曰許劭字子將劭知人入幘肆拔樊子昭袁曄漢獻帝春秋曰孫堅屯梁東為董卓所攻衆少而不敵與其驍騎潰圍得出常著赤罽幘卓騎追堅堅脫罽幘令親近將祖茂著之堅從間道得去吳書曰顧悌字子通疾篤妻出省之悌命左右自扶起冠幘加襲令妻還貞潔不黷如此晉書曰庾顗字子嵩性儉家富劉輿説東海王越令就換錢千萬冀其有吝因此可乘越於衆坐中問顗顗頽然已醉幘墮機上以頭就穿取徐答云下官家故有兩千萬隨公所取矣輿於是乃服越甚悅又曰易雄字興長長沙劉陽人也少為縣吏自念卑賤無由自達乃脫幘挂縣門而去宋書曰檀道濟數拒魏有功及誅憤怒氣盛目光如炬俄爾間引飲一斛乃脫幘投地曰乃壞汝萬里長城齊書曰卞彬字士蔚濟陰宛昫人也祖嗣之中領軍父延之弱冠為上虞令有剛氣會稽太守孟彭以令長裁之積不能容脫幘投地曰我所以屈卿者政為此幘耳今已投之卿以一世勳門而慠天下國士拂衣而去梁書曰謝舉臨川始興諸王常所遊踐邵陵王綸於婁湖立園廣宴酒後好聚衆賓冠手自裂破投之唾壺皆莫敢言舉嘗預宴王欲取舉幘舉正色曰裂冠毀冕下官弗敢聞命拂衣而退王屢召不反甚有慚色北齊書曰平秦王歸彥額骨三道著幘不安文宣見之怒使以馬鞭擊其額血被面曰爾反時嘗以此骨嚇漢後歸彥竟反云漢官儀曰謁者著緗幘大冠司馬彪續漢書曰梁冀改易輿服之制作平上軿車庳幘狹冠也衛宏漢舊儀曰凡齋紺幘耕青幘周遷輿服雜事曰漢桓帝延熙中梁冀誅後京師作幘皆顏短耳長短上長下以為服祑董巴漢輿服志曰古者有冠無幘秦加其武將首飾為絳柏以表貴賤後稍作顏題漢興續其顏卻結之施巾連題卻覆之今喪幘是也至孝文乃高顏續為之耳崇其巾為屋貴賤皆服之蔡雍獨斷曰漢元帝額有壯髮不欲使人見始進幘服群臣皆隨焉尚無巾王莽頭禿因施巾故里語曰王莽禿幘施屋傅暢晉公卿禮祑曰中書監令著介幘晉氏要事曰哀帝隆和元年太學博士曹弘之等議立秋應讀令不應著緗幘改為素英雄記曰公孫瓚字伯圭上計吏郡太守劉基以事公車徵伯圭褠衣平幘御車洛陽身執徒養張敞晉東宮舊事曰太子衣冠有空頂幘一擊虞決疑曰凡救日蝕者皆著赤幘以助陽也侍臣皆赤幘帶劍干寶搜神記曰昔魏武軍中無故作白幍此喪徵也初撗縫其前名之曰顏晉永嘉初乃去其縫名無顏幘其後二年四海分崩下人悲歎無顏以生也廣志曰交址蒼梧俗以翡翠為幘董仲舒止雨書曰執事者赤幘由是言之知不著冠之所服也裴啓語林曰晉明帝年少不倫常微行詔喚人以衣幘迎之涉水過衣幘悉濕元帝已不重明帝忽復有此以為無不廢理既入幘不正元帝自為正之明帝大喜劉楨答魏文帝書曰南垠之金登窈窕之首貂蟬之尾綴侍臣之幘魏武遺令曰吾有頭病自先著帽幘持大服如存時勿遣陸雲與兄書曰一日案行視曹公器物有一介幘如吳幘帽釋名曰帽冒也釋志曰楊阜字義山拜城門校尉嘗見明帝著帽披縹綾半袖阜問帝曰此於禮何法服也帝默然不答自是不法服不以見阜又曰管寧在家恆著皂帽布裙隨時單復魚豢魏略曰夫餘國以金銀飾帽韋昭吳書曰朱然破魏將李典等軍斬首五百級得鼓車三乘拜然左大司馬加錫御織成帽又曰陸遜破曹休於石亭還上脫翠帽以遺遜晉書曰王濛字仲祖美姿容居貧帽敗自入肆買之嫗悅其貌爭遺新帽蕭方等三十國春秋曰石季龍將獵輒冠金縷之帽又陸翽鄴中記云季龍獵著金縷織成合歡帽宋書曰沈慶之隨宗愨等伐沔北諸山蠻大破之威震諸山群蠻皆稽顙慶之患頭風好著狐皮帽群蠻惡之號曰蒼頭公又曰元凶劭始生三日帝往視之簪帽甚堅無風而墜于劭側上不悅又曰何尚之大明二年以左光祿開府儀同三司侍中如故尚之在家常著鹿皮帽及拜開府天子臨軒百僚陪位沈慶之於殿庭戲之曰今日何不著鹿皮冠蕭子顯齊書曰東昏侯自造遊宴之服綴以花采錦繡群小又造四種帽帽因勢為名一曰山鵲歸林者詩曰鵲巢夫人之德東昏寵嬖淫亂故鵲反藪二曰兔度坑天意言天下將有逐兔之事也三曰反縛黃離嘍黃口小鳥也反縛之應也四曰鳳凰度三橋鳳凰者嘉瑞三橋梁王宅處也又曰永明中蕭諶開博風帽後裙之製又為破後帽世祖崩後建謀廢立誅滅諸王又曰茹法亮吳興武康人也為前軍延昌殿為世祖陰室藏諸御高宗即位開陰室出世祖白紗帽防身刀法亮歔欷流涕又曰徐龍駒常住含章殿著黃綸帽被貂裘南面向案代帝書勑又曰豫章王嶷妃庾氏嘗有疾瘳上幸嶷邸後堂設金石樂宮人畢至登桐臺使嶷著烏紗帽因極宴盡歡梁書曰到溉嘗夢武帝遍見諸子至湘東而脫帽與之於是密敬事焉又曰初賀革之江陵也意甚不悅過別御史中丞江革以情告之答曰吾常夢主上遍見諸子唯至湘東王所手脫帽以與之此人後必當璧卿其行乎又曰沙門寶志忽重著三布帽亦不知於何得之俄而武帝崩文惠太子預章文獻王相繼薨又曰鄧至國其俗呼帽曰災何又曰俀國男女皆露髻富貴者以錦繡雜采為帽似中國胡公頭又曰庾弘遠字士操清實有士譽仕齊為江州長史剌史陳顯達舉兵敗斬於朱雀航將刑索帽著之曰子路結纓吾不可以不冠而死又曰垣崇祖為豫州剌史魏攻壽春崇祖著白紗帽肩輿上城決水破之後魏書曰辛紹先有至孝性丁父憂三年口不甘味頭不櫛沐髮遂落盡故常垂裙皂帽又曰高昂轉司徒公好著小帽世因稱司徒帽北齊書曰齊制宮內唯天子紗帽臣下皆戎帽特賜平秦王歸彥紗帽以寵之後周書曰獨孤信在秦州嘗因獵日暮馳馬入城其帽微側詰旦而吏人有戴帽者咸慕信而側帽焉隋書曰後周之時著突騎帽如今胡帽垂裙覆帶蓋索髮之遺象也又文帝項有瘤疾不欲人見每常著焉相魏之時著而謁帝故後周一代將為雅服小朝公宴咸許戴之唐書曰代宗時禁民皂衫厭耳帽以異官健西京雜記曰趙飛燕為皇后其弟在昭陽殿遺飛燕書曰今月嘉辰貴姊懋膺大册上遺金花紫綸帽以陳踴躍孟嘉別傳曰嘉為桓溫參軍九月九日溫遊龍山參僚悉集時佐吏並戎服有風吹嘉帽墮初不覺良久如廁溫命還之授孫盛紙筆啁之置嘉坐處嘉還見之請筆即答四坐嗟歎幽明録曰安開者安成之俗師也善於幻術時王凝之為江州向王當行陽為王刷頭簪荷葉以為帽與王著當時亦不覺帽之有異到座之後荷葉乃見舉坐驚駭王不知魏文帝與劉曄書曰劉生帽裁製微不長有似里父之服孟逵與諸葛亮書曰貢白綸帽一顏以示微意劉謐之下野賦曰頭戴鹿心帽足著狗皮靴面傅黃灰滓髻插蕪菁花男女四五人皆如燒蝦蟆束晳近遊賦曰帽引四角之縫裙有叄條之殺又曰老公戴合歡之帽少年著蕞角之巾巾釋名曰巾謹也二十成人士冠庶人巾當自謹修四教也方言曰兩復結謂之幘巾或謂之承露巾或謂覆髮巾也續漢書曰巨鹿張角自稱天師弟子數十萬人始起兵皆著黃巾以相識別故世謂黃巾賊後漢書曰光武徵鮑永永疑不至及更始亡乃發去上將軍列侯印綬悉罷兵但幅巾與諸將詣河內幅巾謂不著冠但幅巾束首也又曰何進袁隗欲特表陳實以不次之位實謝曰久絶人事飾巾待終而已又曰曹操既猜嫌忌孔融令丞相軍謀祭酒路粹枉狀奏融云位為九列不遵朝儀禿巾微行唐突宮掖魏志曰諸葛亮出斜谷司馬宣王拒之堅壁不與戰亮致巾幗婦人之飾以怒宣王又曰華歆為豫章太守孫策略地江東歆知策善用兵乃幅巾迎策蜀書曰諸葛武侯與宣王在渭濱將戰宣王戎服涖事使人視武侯乘素輿葛巾毛扇指麾三軍皆隨其進止宣王聞而嘆曰可謂名士矣鄧粲晉書曰王敦欲伐甘卓遣使送大巾又曰謝萬字萬石簡文辟為從事中郎著白綸巾鶴氅裘版而前帝與談移日沈約宋書曰陶潛在家郡將侯潛值其酒熟取頭上葛巾漉酒還暴著之梁書曰武帝賜陶弘景以鹿皮巾後屢加禮聘並不出又曰賀德基少遊學都下積年不歸衣資罄乏又恥服故弊盛冬止衣夾襦袴嘗於白馬寺前逢一婦人容服甚盛呼德基入寺門脫白綸巾以贈之仍謂曰君方為重器不久貧寒故以此相遺耳問姓名不答而去又曰武帝與何點有舊及踐祚手詔論舊賜以鹿皮巾等召之點以巾褐引入華林園又曰王僧孺遷尚書左丞俄兼御史中丞僧孺幼貧其母鬻紗巾以自業後周書曰宣政元年初服常冠以皂紗為之加簪而不施纓其制若今之折角巾也唐書曰張易之同休嘗請公王大臣宴於司禮寺因謂御史大夫楊再思曰公面似高麗請作高麗舞再思欣然剪紙自帖其巾反紫袍遂作之陸翽鄴中記曰皇后出女騎一千為鹵簿冬月皆著紫綸巾孰錦袴褶郭林宗別傳曰林宗嘗行陳梁間遇雨故其巾一角坫而折二國學士著巾莫不折其角云作林宗巾其見儀則如此傅子曰漢末王公多以幅巾為雅是以袁紹之徒雖為將帥皆著縑巾張華博物志曰魏文帝彈棊能用手巾角時有一書生又能低頭以所冠葛巾角撇棊羊祜與從弟護軍書曰年已朽老既定邊事當角巾東路還歸鄉里接離郭璞注爾雅曰白鷺翅上有長翰毛江東取為接離世説曰山簡為荊州時酣暢人為之歌曰山公時一醉徑造高陽池日暮倒戴歸酩酊無所知時復乘駿馬倒著白接離舉手謝葛強何如并州兒高陽池在襄陽強是其愛將并州人也鄣日晉八王故事曰初趙王倫將篡位洛下童謠曰屠蘇鄣日覆兩耳當有瞎兒作天子於時商農通著大裁障日倫實眇目也孫楚謝箋曰大恩賜鄣日其器雖小而禮遇甚弘昔衛綰錫六劍珍而不用楚雖不敏且受而藏之
