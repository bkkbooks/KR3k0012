body:
  text: 兵部十九機略七三國典略曰周賀若敦陳侯瑱相拒于湘州敦恐瑱知其糧少乃於營內聚土覆之以米召其側近村人揚有所訪令其遙見瑱聞以為實乃據守要險以老敦師敦又增修壁壘示以持久土人乘輕騎載米粟籠雞鴨以向瑱軍敦患之乃偽為土人裝舡內甲士其中瑱兵見舡至送米爭取敦甲士出而擒之後周書曰太祖以王羆為大都督鎮華州魏孝武西遷拜驃騎大將軍加侍中開府嘗脩州城未畢梯在外齊神武遣韓軌司馬子如從河東宵濟襲羆羆不之覺比曉軌眾以乘梯入城羆尚臥未起聞閤外洶洶有聲便袒身露髻徒跣持一白挺大呼而出敵見之驚逐至東門左右稍集合戰破之軌眾遂投城遁走又曰陸騰陵州木籠獠恃險麤獷每行抄劫詔騰討之獠既因山為城攻之未可拔騰遂於城下多設聲樂及諸雜技示無戰心諸賊果棄其兵仗或攜妻子臨城觀樂騰知其無備密令眾軍俱上諸賊惶懼不知所為遂縱兵討擊盡破之又曰楊忠梁雍州刺史岳陽王蕭察雖稱藩附而尚有二忠自穰城觀兵於漢濱易旗進實騎二千察登樓望之以為三萬懼而服焉又曰韓襃為汾州刺史界北接大原當千里徑先是高齊寇數入人廢耕桑前後刺史莫能防扞襃至適會寇來襃乃不下屬縣人既不及設備以故多被抄掠齊人喜相謂曰汾州不覺吾至先未集兵今者之還必莫能追躡我矣由是益懈不為營壘襃己先勒精銳伏北山中分據險阻邀其歸路乘其眾怠縱伏擊之盡獲其眾又曰東魏寇龍門屯軍蒲坂造三道浮橋渡河又遣其將竇泰趣潼關高敖曹圍洛州太祖出軍廣陽召諸將曰賊今椅吾三面又造橋於河示欲必渡是欲綴吾軍使竇泰得西入耳久與相持其計得行非良策也且歡起兵以來泰每為先驅其下多銳卒屢勝而驕今出其不意襲之必克克泰則歡不戰而自走矣諸將咸曰賊在近捨而遠襲事若差跌悔無及也太祖曰歡前襲關吾軍不過霸上今者大來兵未出郊賊顧謂吾但自守耳無遠鬭意又忸於得志有輕我之心乘此擊之何往不克賊雖造橋未能徑度比五日中吾取竇泰必矣公等勿疑庚戍太祖率騎六千還長安聲言欲保隴右辛亥謁渧而潛出軍癸丑旦至小關竇泰卒聞軍至惶懼依山為陣未及成列太祖縱兵擊破之盡俘其眾萬餘人斬泰傳首長安高敖曹適陷洛州執刺史泉企聞泰之歿焚輜重棄城走齊神武亦撤橋而退通典曰後周末隋文帝為丞相益州揔管王謙舉兵拒命隋文遣將梁睿討之進至龍門謙將趙儼秦會擁眾十萬據嶮為營周亘三十里睿令將士銜枚出間道四面奮擊破之王謙又令高阿郍壞達奚惎惎渠記切等以盛兵攻利州聞梁睿將至惎分兵據開遠睿顧謂將士曰此虜要欲遏吾兵勢吾當出其不意破之必矣遣一將趨劍閣一將指巴西一將水軍入嘉陵睿遣將分道攻惎自午及申破之惎奔歸于謙睿進逼成都謙令達奚惎城守親率精兵五萬背城結陣睿擊之謙不利將入城惎以城降謙將麾下三十騎遁走斬之又曰後周將法尚初自陳來歸陳將樊猛濟江討之法尚遣部曲督韓朗詐為背己奔于陳偽告猛曰法尚部兵不願降北人皆竊議盡欲叛還若得軍來必無鬭者自當於陣倒戈耳猛以為然引師急進法尚乃佯為畏懼自保於江曲猛陣兵挑戰法尚先伏輕舡於浦中又伏精銑於古村之北自張旗幟逆流拒之戰數合偽退登岸投古村猛捨舟逐之法尚又疾走行數里與村北軍合復前擊猛猛走退赴舡既而浦中伏舡取其舟楫建周旗幟猛於是大敗僅以身免又曰後周末隋文帝輔政周大將尉遲逈在河北拒命河南州縣多從逈遣將檀讓屯成武別將高士儒屯永昌隋將于仲文詐移書州縣曰大軍將至可移積粟讓謂仲文未能卒至方搥牛享士仲文知其怠選精騎襲之一日便至遂拔成武逈將席毗羅眾十萬屯於沛縣將攻徐州其妻子住金鄉仲文遣人詐為毗羅使者謂金鄉城主徐善凈曰檀讓明日午到金鄉將宣蜀公令即尉遲逈賞賜將士金鄉人謂為信然皆喜仲文簡精兵偽建逈旗幟倍道而進善淨遙見仲文軍且至以為檀讓乃出迎謁仲文執之遂取金鄉諸將多勸屠之仲文曰此城是毗羅起兵之所當寬其妻子其兵可自歸如即屠之彼意絕矣眾皆稱善於是毗羅恃眾來薄官軍仲文背城結陣出軍數里設伏於麻田中兩陣纔合伏兵發俱曳柴鼓噪塵埃蔽天毗羅軍大潰仲文乘之賊皆投漆水而死水為之不流獲檀檻送京師河南悉平又曰後周末隋文作相遣將于仲文先以兵定關東破尉遲逈將檀讓初仲文在蓼隄諸將皆曰軍自遠來士馬疲弊不可決勝仲文令三軍趣食列陣大戰既而破賊諸將皆請曰前兵疲不可交戰竟而剋勝其計安在仲文笑曰吾所部皆山東人果於進不宜持久乘勢擊之所以制勝諸將皆以為非所及又曰後周將達奚長儒圍陳將吴明徹於呂梁陳遣驍將劉景率勁勇七千來為聲援長儒於是取車輸數百繫以大石沉之清水連轂相次以待景軍景至舡盤礙輪不得進長儒乃縱奇兵水陸俱發大破因檎明徹又曰後周遣將率突厥之眾逼齊晉陽齊將叚韶禦之時大雪之後周人以步卒為前鋒從西山而下去城二里諸將咸欲逆擊之韶曰步人氣力勢自有限今積雪既厚逆戰非便不如陣以待之彼勞我逸破之必矣既而交戰大破之敵前鋒盡殪無復孑遺自餘通宵奔遁又曰後周遣將計高圍洛齊將叚韶禦之韶登邙坂聊欲觀周軍形勢至太和谷便值周軍即遣馳告諸營與諸將結陣以待之周軍以步人在前上逆戰韶以彼徒我騎且却且引待其力弊乃遣下馬擊之短兵始交周人大潰洛城之圍並即奔遁又曰西魏末岷州羗據州城反魏將獨孤信討之勒兵向萬年頓三交谷口賊併力拒守信因詭道趨綢松嶺綢直由切賊不虞信兵之至觀風奔潰乘勝逐北徑至城下賊出降又曰西魏末涼州刺史宇文仲和據州不受代魏將獨孤信率兵討之仲和嬰城固守信夜令諸將以衝梯攻其東北信親帥壯士襲其西南遲明克之遲直吏切未明也天未明之時須已襲之事畢然後天明明遲於事耳又曰西魏末蠕蠕侵魏魏大將元纂禦之蠕蠕遂逃出塞纂令將于謹率二千騎追之至郁郅原前後十七戰盡降其眾率輕騎出塞覘賊屬鐵勒數千騎奄至謹以眾寡不敵退必不免乃散其眾騎使匿叢薄間又遣人升山指麾若分部軍眾者賊遙見雖疑有伏兵既恃其眾不以為慮乃進軍逼謹謹常乘駿馬一紫一騧賊先所識乃使二人各乘一馬突陣而出賊以為謹也皆爭逐之謹乃率餘軍擊其追騎賊遂奔走因得入寨又曰西魏末遣將史寧與突厥木汗可汗同伐吐谷渾俱會於青海寧謂木汗曰樹敦賀真二城是吐谷渾巢穴今若拔其本根餘種自然離散此上策也木汗從之即分為兩軍木汗從北道向賀真寧趣樹敦吐谷渾婆周王率眾逆寧寧擊斬之踰山履險遂至樹敦即吐谷渾之舊都多諸珍藏而其主先已奔賀真留其征南王及數千人固守寧進兵攻之偽退果開門逐之因廻兵奮擊門未及闔寧兵遂得入生獲其征南王俘虜男女財寶盡歸諸突厥又曰東魏西荊州為梁將曹義宗所圍東魏召人赴救慕容儼應募赴之時東魏北淯太守宋帶劍謀叛淯音育儼乃輕騎出其不意直至城語云大軍已到太守何不出迎帶劍造次惶恐不知所為便出迎儼即執之一郡遂定又曰東魏初齊神武破爾朱兆兆奔保秀容分兵守險出入鈔掠神武每揚聲云欲討之師出復止如此者數四神武揣兆歲首必應會飲使將竇泰率精騎先一日一夜行三百里兆軍人因宴休墯忽見泰軍莫不奪氣因而剋之又曰東魏將齊神武率兵伐西魏大軍濟河集諸將議進趣之計斛律羌舉曰宇文黑獺雖聚凶黨強弱可知若固守無糧援可恃今揣其情以同困獸若不然其戰而逕趣長安空虛可不戰而剋拔其根本彼無所歸則黑獺之首懸於軍門矣諸將議有同遂戰於渭曲大敗而歸齊神武違之故敗也又曰東魏末齊神武薨子澄立侯景叛歸梁而圍彭城澄遣慕容紹宗討之將戰紹宗以梁人剽悍恐其眾之撓也一一引將卒而誑之曰我當佯退誘梁人使前汝可擊之皆申明誡之景又命梁人逐北勿過二里會戰紹宗實敗走梁人不用景言乘敗深入魏人以紹宗言為信爭共掩擊遂大破之又曰東魏遣將斛律金寇西魏洛陽師至于河北周文帝患其度河乃於上流縱火舩而下以燒河橋金先備小艇半盛以水鐵鎖連之亘絕中流火舡至而不前須臾火滅而橋獲存遂進軍洛陽又曰東魏將齊神武伐西魏軍至許原西周文帝至渭南徵諸州兵皆來會乃召諸將謂之曰高歡越山度河遠來至此天亡之時也今及其新至便可擊之即造浮橋於渭令軍人齎三日糧輕騎度渭南夾渭而軍至沙苑距齊神武軍六十餘里齊神武聞周文至引軍來會覩周文軍少竟馳而進不行列揔萃於左軍兵將交周文鳴鼓士皆奮起其將于謹等六軍與之合戰李弼等率鐵騎橫擊之絕其軍為二遂大破之斬六千餘級臨陣降者二萬餘人齊神武夜遁追至河上復大剋獲前後虜其卒七萬留其甲士二萬餘悉縱歸又曰齊神武大舉伐西魏將渡蒲津其將薛琡曰琡呂六切西賊連年飢饉但宜置兵諸道勿與野戰比及來年麥秋人眾盡應餓死西賊自然歸降願無渡河也侯景亦曰今者之舉兵眾極大萬一不捷卒難收歛不如分為二軍相繼而進前軍若勝後軍全力前軍若敗後軍承之神武皆弗納遂有沙苑之敗又曰齊神武與魏孝武帝搆隙自太原舉兵逼洛陽帝遣將元斌之斛斯椿鎮武牢椿丑倫切遣使告周文帝文帝謂左右曰高歡數日行八九百里曉兵者所忌正須乘便擊之而主上以萬乘之重不能度河決戰方緣津據守且長河萬里扞禦為難若一處得度大事去矣果如其言帝西奔長安孝武違而敗也
