body:
  text: 果部二棗爾雅曰棗壺棗也郭璞注曰今江東呼棗大而鋭上者為壺壺猶瓠也邊要棗細要棗也今謂之鹿盧棗櫅音齊白棗即今棗子曰熟樲酸棗樹小實酢孟子曰養其樲棗遵羊棗實小而員紫黑色今俗呼為羊矢棗孟子曰曾晳嗜羊棗洗大棗今河東猗氏出大棗子如雞卵蹶泄苦棗子味苦也蹶音歲也晳無實棗不著子也還味稔棗還味短味也稔音荏還音旋又曰棗李曰疐之孫炎曰疐去其抵疐音帝京房易妖占曰天雨棗小民流亡也焦贛易林師之豫曰北山有棗使叔壽考說文曰樲酸棗也毛詩豳七月曰八月剝棗周禮天官籩人曰饋食之籩其實棗大戴禮夏小正曰八月剝棗剝者取也禮記曲禮下曰婦人之贄脯修棗栗又內則曰棗曰新之又曰棗栗飴密以甘之春秋繁露曰握棗與錯金以示嬰兒必取棗而不取金故物之於人小者易知史記曰楚莊王之時有所愛馬啖以棗脯又曰李少君以卻老方見上少君言上曰臣曾遊海上見安期生食巨棗大如瓜漢書曰廣陵厲王胥宮園中棗樹乃生十餘莖莖正赤葉白如素王唑祝咀自殺又曰王吉少時學問居長安其東家有棗樹垂吉庭中吉婦取棗以啖吉後知之乃去婦東家聞而欲伐其樹鄰里共止之因固請吉令還婦里中為之語曰東家有樹王陽婦去東家棗完去婦復還又曰安邑千樹棗此其人皆與千戶侯等東觀漢記曰自馮愔反後鄧禹威稍損又乏食敗走至高陵軍士飢餓皆食棗葉又曰中黃門孫程謀誅江京後程於盛化門外與馬國等相見詐謂國曰天子與我棗脯與若棗者早成之乃與國等共為謀立順帝謝承後漢書曰河南陶碩鄉曲餉之碩無所受但食棗飲水美談而已又曰孟節能含棗核不食可至五年應劭漢官儀曰光武封太山上壇見酢梨酸棗上問其故主者曰百官上者所置上曰封禪大禮千歲一會衣冠士大夫何故爾也魏志曰杜恕上疏曰冀州戶口最大又有桑棗之饒國家徵求之府世說曰魏文帝忌弟任城王饒壯因在卞太后側共圍棊並啖棗文帝以毒置諸棗蒂中自選可食者而王弗悟遂雜進之既中毒太后索水救之帝預勑毀器太后徒跣赴井無器可汲須臾遂卒又曰王大將軍嘗至石崇家如廁見漆箱中盛乾棗本以塞鼻王遂食盡群婢莫不笑晉書曰賈后將廢太子詐稱上不和呼太子入朝既至后不見置于別室遣婢陳舞賜以酒棗逼飲醉之晉史曰光祿卿李郁因晝寢夢食巨棗覺而有疾謂其親友曰嘗聞棗字重來呼魂之象今子神氣逼抑將不免乎未幾而卒孟子曰曾晳嗜羊棗而曾子不忍食公孫丑問曰鱠炙與羊棗孰美曰膾炙哉曰曾子何為食膾炙孟子曰膾炙同也羊棗獨也韓子曰秦飢應侯謂王曰五苑之果蔬橡棗栗足以活民請發之又曰子産治鄭桃棗之蔭於衛者莫援也鄒子曰夏取棗杏之火淮南子曰十一月官都尉其樹棗晏子春秋曰景公謂晏子曰東海之中有水而赤水中有棗花而不實何也晏子曰昔者秦穆公乘龍治天下以黃布蒸棗至海而投其布故水赤蒸棗故花而不實公曰吾佯問子對曰嬰聞佯問者佯對之盧育冀州論曰安平好棗地産不為無珍杜氏新書曰杜畿為河東太守平虎將軍劉勳為太祖所親貴震朝廷常從畿求大棗畿拒以他故後勳伏法太祖得其書歎曰杜畿可謂不媚竈也英雄記曰孔文舉為東萊賊所攻城欲破其治中左承祖以官棗賦與戰士蔡雍奏事曰程末年十四時祖父叔病物故未抱伏叔尸號泣悲哀舅哀其羸劣嚼棗肉以哺之未見食歔欷不能吞咽漢武內傳曰七月七日西王母當下為帝設玉門之棗東方朔傳曰武帝時上林獻棗上以所持杖擊未央前殿檻呼朔曰叱叱先生來來先生知此筐中何等物也朔曰上林獻棗四十九枚上曰何以知之朔曰呼朔者上也以杖擊檻兩木兩木林也來來者棗也叱叱者四十九枚上大笑賜帛十匹王子年拾遺記曰北極有岐峰之陰多棗樹百尋其枝莖皆空其實長尺核細而柔百歲一實真人關令尹喜內傳曰老子西遊省太真王母共食玉文之棗其實如瓶神仙傳曰吳郡沈羲為仙人所迎上天云天上見老君老君賜羲棗二枚大如雞子又曰李意期於成都角中作一土窟居其中冬夏單衣長髮剪去之但使長五寸許多飲酒食脯及棗栗或百日二百日不出窟是時無可所食也魯女生別傳曰李少君曰冥海之棗大如瓜鍾山之李大如瓶臣已食之遂有奇光劉根別傳曰有道之士不可識往者有陳孜如癡人江夏袁仲陽知事之孜謂仲陽曰今年春當有疾可服棗核中仁二十七枚後果大病又曰能常服棗核中仁百邪病不復干也仲陽服之有效馮明生別傳曰明生為縣吏捕賊為賊所傷殆死道間見女人年可十六七姿容絶世以肘後管中一丸如小豆與服即愈隨神女還岱宗見安期生曰共與女郎遊於安息西母之際食棗異美此間棗小不及憶此棗未久已二千年矣神女云昔與君共食一枚乃不盡此間小棗郍可相比也高士傳曰胡昭字孔明晉宣帝為麻衣時與昭有舊昭同郡周士等謀帝昭聞而步險邀士於肴澠之間止士士不肯昭泣以示誠士感其義乃止昭斫棗樹共士盟而別昭雖有陰德於帝口終不言時人莫知風俗通曰鮑焦耕田而食穿井而飲於山中食棗或曰此棗子所植也遂強吐立枯死水經注曰酸棗縣故城南古韓國昔天子建國名都或以山林故豫章以樹氏都酸棗以棘名邦故曰酸棗也水經曰高唐縣大河右溢世謂之甘棗溝水側多棗故俗取名焉廣志曰東郡榖城紫棗長二寸西王母棗大如李核三月熟衆果之先熟者也種洛陽宮後園河內伋郡棗一名墟棗一名安邑棗東海蒸棗洛陽夏白棗安平信都大棗單父棗梁園國夫人棗大白棗一名曰戚咨小核多肌三星棗駢白棗灌棗此四者官園所種棗有狗雞心牛頭羊矢彌候細腰之名又有玄棗大棗崎廉棗桂棗鄴中記曰石虎園中有西王母棗冬夏有葉九月生花十二月乃熟三子一尺又有羊角棗亦三子一尺東陽記曰信安縣有懸室坂晉中朝時有民王質伐木至石室中見童子四人彈琴而歌質因留倚柯聽之童子以一物如棗核與質含之便不復飢俄頃童子令其歸質承聲而去斧柯漼然盡爛既歸質去家已數十年親舊凋落無復此時矣楊衒之洛陽伽藍記曰景陽山南有百果園果別作一林林名有一堂有仙人棗長五寸把之兩頭俱出核細如針霜降乃熟食之甚美俗傳云出崑崙山一曰西王母棗晉宮閣名曰華林園棗六十二株王母棗十四株盧諶祭法曰春祠用棗油本草曰凡棗九月採日乾補中益氣久服神仙郭子橫洞冥記曰嵣細棗出嵣之山山臨碧海萬年一實子如今軟棗笮之有膏膏可燃燈西王母握核以獻帝因名曰握核棗杜寶大業拾遺録曰二年八月信都獻仲思棗四百枚棗長四寸五寸圍紫色細文文皺核肥有味勝於青州棗北齊時有仙人仲思得此棗種之亦名仙棗時海內唯有數樹西京雜記曰初修上林苑群臣各獻名果樹亦有製有美名弱枝棗西王母棗出崑崙山棠棗王門棗青華棗梬音程棗赤心棗神異經曰北方荒中有棗林焉其高五尺子長六七寸圍過其長熟赤如朱乾之不縮氣味甘潤殊於常棗食之可以安軀體益氣力異苑曰鄭鮮之女腳患攣癖就王濮陽請水澆之餘灌庭中枯棗樹棗樹既生女腳亦差又曰沙門笁慧猷太元二年夜夢讀詩五首其一篇後曰陌南酸棗樹名為六奇木遣人以伐取載還柱馬屋又曰太元中南郡欣陵縣有棗樹一年忽生桃李棗三種花子幽明録曰太原王仲德年少時遭亂避胡賊絶粒三日草中臥忽有人扶其頭呼云可起啖棗王便寤瞥見一小兒長四尺即隱乃有一囊乾棗在前噉之小有氣力便起任昉述異記曰魏世河內冬雨棗耆舊說周秦時河南兩酸棗遂生野酸棗今酸棗縣是也棗之甚小者謂之酸棗廣五行記曰馮宣上黨人仕為北平護軍喪於官時年三十八還家鄉里服始畢婢在外聞叫喚聲開門見宣婢驚入白宣妻韓韓悲愕良久見宣宣曰生必有死恨早別恩情宣外甥嚴翊至宣曰當有兵亂繼以飢疫并土不可復居侯宅東棗樹死便走可免翊受旨宣告別須臾而沒後二百日棗樹死翊與宣家東投漁陽發後四旬而上黨遭寇暴兵人死荒亂塗炭存者鮮矣嶺表録異曰波斯棗廣州郭內見其樹樹身無閒枝直聳三四十尺及樹頂四向共生十餘枝葉如海棕亦呼為海棕廣州所種者或三五年一番結子亦似此中青棗但小耳自青及黃撲已盡又朵著子每朵約三二十顆劉珣曾於番酋家食本國將來者色類沙糖皮肉軟爛餌之乃永樂天蒸之味也其核與北中棗殊異兩頭不尖雙卷而圓如小塊紫礦珣亦收而種之久無萌芽疑是蒸熟也魏文帝詔群臣曰南方龍眼荔枝寧比西國蒲陶石蜜乎酢且不如中國凡棗味莫言安邑御棗也曹植鷂雀賦曰雀得鷂言意甚不移依一棗樹藂蕽多剌潘嶽笙賦曰棗下纂纂朱實離離宛其落矣化為枯枝潘嶽間居賦曰周文弱枝之棗防陵朱仲之李傅玄棗賦曰素華離朱實甚脆色如霜雪甘如含蜜左思魏都賦曰淇園之筍信都之棗古詩曰甘瓜抱苦蒂美棗生剌棘郭璞棗讚曰赤心鯁直傅玄歌詞曰黃葉離高柯丹棗坐自零不惜棗自零念我少弟兄
