body:
  text: 禮儀部三祭禮上毛詩召南曰采蘋大夫妻能循法度也能循法度則可以承先祖供祭祀也于以采蘋南澗之濱于以采藻于彼行潦蘋大萍也澗崖也藻聚藻也行潦流潦也又小雅天保曰吉蠲為饎是用孝享吉善蠲絜也饎酒食也享獻也箋云謂將祭祀也禴祠烝嘗于公先王春曰祠夏曰禴秋曰嘗冬曰烝公事也箋云公謂后稷也君曰卜爾萬壽無疆君先君也尸所以象神卜子也箋云君曰卜爾者尸嘏主人傳神辭也又小雅吉日曰吉日維戊既伯既禱維戊順類乘壯也伯馬祖也重物慎微將用馬力必先為之禱其祖禱獲也箋云戊剛日也故乘壯為順類也又小雅大田曰來方禋祀以其騂黑與其黍稷以享以祀以介景福騂牛也黑羊豕也箋云成王之來則又禋祀四方之神祈報焉陽祀用騂牲陰祀用黑牲又小雅楚茨曰濟濟蹌蹌絜爾牛羊以往烝嘗或剝或亨或肆或將濟濟蹌蹌言有容也亨飪之也肆陳將齊也或陳于皮或齊其肉箋云有容言威儀敬慎也冬祭曰烝秋祭曰嘗祀之禮各有其事有解剝其皮者有煮熟之者有肆其骨體於俎者或奉持而進之者祝祭于祊祀事孔明祊門內也箋云孔甚也明狄備也契也孝子不知神之所在故使祝博求之平生門內之旁待賓客之處祀禮於是甚明又小雅信南山曰祭以清酒從以騂牡享于祖考咸尚赤曰騂箋云清謂玄酒也酒鬱鬯五齊三酒也祭之禮先以鬱鬯降神然後迎生享于祖考納考時執其鸞刀以啟其毛取其血膋鸞刀乃有鸞者言割中節也箋云毛以告純人膋脂膏也血以告殺膋以升臭合之黍稷實之於蕭合馨香也是烝是享苾苾芬芬祀事孔明又生民曰生民尊祖也后稷生於姜嫄文武之功起於后稷故推以配天焉厥初生民時維姜嫄生民如何克禋克祀以拂無子克能也弗之言祓也姜嫄之生后稷如何乎乃禋祀上帝於郊禖以祓除其無子之疾而得其福也履帝武敏攸介攸止載震載肅載生載育祀郊媒之時有大神之跡姜嫄履其拇指生子而養之長名曰棄也又清廟曰清廟祀文王也周公既成雒邑朝諸侯率以祀文王焉清廟者祭有清明之起德者之宮也謂祭文王又清廟烈文曰烈文成王即政諸侯助祭也新王即政必以朝享之禮祭於祖考告嗣位也烈文辟公鍚茲祉福惠我無疆子孫保之烈光也文王鍚之也又臣工曰振鷺二王之後來助祭也二王殷夏也其後祀也宋也振鷺于飛于彼西雍我客戾止亦有斯容箋云白馬於西雍之澤言所集得其虔也興者喻祀宋之君有潔白之德來助祭周之廟得禮之宜又臣工潛曰潛季冬薦魚春獻鮪也猗與漆沮潛有多魚有鱣有鮪鰷鱨鰋鯉猗與欽美之言漆沮歧周二水也潛摻也以享以祀以介景福介助也景大也尚書舜典曰望于山川徧于群神孔安國傳曰謂在遠者望祭之也群神丘陵墳衍之屬又說命曰黷于祭祀時謂弗欽孔安國傳曰祭不欲數數則黷黷則不敬也又洛誥曰祀于新邑咸秩無文孔安國傳曰以祀典祀于新邑皆次秩不在禮文者而禮之又多士曰罔弗明德卹祀孔安國傳曰自帝乙以上無不顯用有德憂念齊敬奉其祭祀言能保宗廟社稷也尚書大傳周傳曰祭之為言察也察者至也至者人事也人事至然後祭祭者薦也薦之為言在也在也者在其道也禮志曰君子生則敬養死則敬饗也又五行傳曰簡宗廟不禱祠廢祭祀逆天時則水不潤下君行此四者為逆天此宮之政北為水故源流竭絕是水不潤下也又五行傳曰六瀰之禮散齋七日致齋三日新器潔祀用赤黍三日之朝於中庭祀四方從東方始卒於北方禮志致齋三日周禮凡祭祀前期十日宗伯帥執事十日是為齋一旬乃祀也今此致齋即祀者欲得容三十也荅蓋八日為致齋明九日朝而初祀亦一旬有一日事乃畢也其祀禮曰格祀篇云今亡曰某也方祀曰播國率相行祀其祝也曰若爾神靈洪範六濔是合神靈謂木精靈威仰火精赤熛怒士精含樞細金精白招矩水精汁光紀及木帝太皞火帝炎帝土帝黃帝金帝少昊水帝顓頊木官勾芒火官祝融土官後土金官蓐收水官玄冥皆是也古者生能其事死在祀禮配其神而食合猶為也六瀰是神靈所為也無差無傾無有不正若民有不敬事則會批之于六濔言民廣及天下有過者也事六事也會合也批推也言天下之有過神靈亦合推內於六濔天子以下為任者也六事之機以縣示我我民人無敢不敬事上下王祀周禮天官冢宰曰以八則治都鄙一曰祭祀以馭其神祭祀其先君社稷五祀以九式均節財用一曰祭祀之式式謂財用之節度又天官上內饔曰凡宗廟之祭祀掌割亨之事凡燕飲食亦如之又天官上獸人曰凡祭祀喪紀賓客共其死獸生獸共其皃者凡獸入于腊人當乾之也皮毛䈥角入于王府給作器物又天官上亨人曰祭祀共大羹鉶羹賓客亦如之大羹肉湆也鄭司農云大羹不致五味也鉶羹加鹽菜地又地官上牧人曰牧人宰牧六牲而阜蕃其物以供祭祀之牲牷六牲謂牛馬羊豕犬雞凡陽祀用騂牲毛之陰祀用黝牲毛之望祀各以其方之色牲毛之毛純也陰祀祭六郊地及社稷也鄭司農云陽祀春夏也黝讀為幽幽黑也凡時祀必用牷物時祀四時所常祀謂山川以下至四方百物也凡外祭毀事用尨可也尨謂雜色不純毀謂副辜毀除殃咎之屬也凡祭祀共其犧牲以授充人繫之犧牲毛羽皃具也授充人者當殊養之凡牲不繫者共奉之謂非時而祭祀者又地官上曰牛人掌養國之公牛以待國之政令凡祭祀供其享牛求牛以授職人而芻之鄭司農云享牛前祭一日之牛求牛禱於鬼神祈福之牛也玄謂獻神之牛謂所以登者凡祭祀供其牛牲之牙與其盆簝以待事牙謂福衡之屬盆簝皆器名又地官下閭師曰凡庶民不畜者祭無牲不耕者祭無盛矣又春官上太宗伯曰太宗伯之職掌建邦之天神人鬼地祇之禮以佐王建保邦國建立也立天神人鬼地祇之禮者謂祀之祭之享之之禮吉禮是也自吉禮於上次以立安邦國者牙以相成明尊鬼神重人事以禋祀祀昊天上帝以實柴祀日月星辰以楢燎祀司中司命風師雨師禋之言煙也周人尚臭煙氣之臭聞者也楢積也詩曰芃芃棫樸薪之楢之三祀皆積柴實牲體焉或有玉帛燔柴而升煙所以報陽也以血祭祭社稷五祀五嶽以理沉祭山林川澤以副辜祭四方百物不言祭地此皆地祇祭地可知也陰祀自血起貴氣臭也社稷土穀之神也有德者配食凡祭祀大神享大鬼享祭大祇帥執事而卜日宿視滌濯涖玉鬯省牲鑊奉玉齊詔大號治其大禮詔相王之大禮執事諸有事於祭者也宿申式也滌濯溉祭器也若王不與祭祀則攝位王有故代行其祭事凡大祭祠王后不與則攝而薦豆籩徹薦徹豆籩后之事國有大故則旅上帝及四望王大封則先告后土乃頒祀于邦國都家鄉邑頒讀為班班其所當祀及其禮也都家鄉邑謂王子弟及公卿大夫所食采地也又春官下太祝曰太祝掌六祝之辭太師宜于社造于祖馬融傳曰爾雅曰起大事動大眾必先有事於社也設軍社類上帝社者社主也類者以事類告祀上帝國將有事於四望將行也四望日月星辰也及軍歸獻于社則前祝獻於社主又春官曰家宗人掌家祭祀之禮凡祭祀致福大夫采地之所祀與都同若先王之子孫亦有祖廟禮記月令曰孟春之月其祖戶祭先脾春陽氣出祀之於戶內陽也祀之先祭脾者為春陽中於藏直脾為尊也仲春之月天子獻羔開冰先薦寢廟獻羔謂獻司寒也祭司寒而出冰薦於宗廟乃後賦之上丁命樂正習舞釋菜將舞必釋菜於先師以禮之天子乃率三公九卿諸侯大夫親往視之順時達物中丁又命樂正入學習樂是月也祠不用犧牲用珪璧更皮幣又月令曰孟夏之月共祀竈祭先肺夏陽氣盛熱於外祀之於竈從熱類也祀之先肺者陽位在上肺亦在上肺為尊也又月令仲夏曰祀皇地祇於方丘夏至之日祀皇地祇於方丘以高祖神堯皇帝配坐以岳瀆等神從祀又月令仲夏曰命有司祭先牧謂仲夏祭先牧於大澤用剛日又月令季夏曰其祀中霤祭先心中霤猶中室也祭中霤之禮為俎先進心是月也祀黃帝於南郊謂季夏士德王日則祀黃帝合樞紐於南郊以軒轅配坐以後土鎮星從祀也又月令曰孟秋其祀門祭先肝秋陰氣出祀之於門外陰也祭先肝者秋為陰中於藏值肝凡祀門為俎先進肝也又月令曰孟冬其祀行祭先腎冬陰氣盛寒於外祀之於行從辟除之類行謂道也祭先腎者陰位在下腎亦在下凡祀行為俎先進腎又月令孟冬日祀神州地祇於北郊謂立冬日祭神州地祇於北郊太宗文武聖皇帝配坐是月也命有司祭司寒謂孟冬祭司寒於北郊是月也命有司祭司中司命司人司祿謂立冬後亥日祀司祿等於國域西北又月令仲冬曰命有司祈祀四海大川名源淵澤井泉順其盛德之時祭也又曲禮上曰臨祭不惰祭服弊則焚之祭器弊則埋之又曲禮下曰無田祿者不設祭器有田祿者先為祭服君子雖貧不鬻祭器雖寒不衣祭服去國祭器不踰境大夫寓祭器於大夫士寓祭器於士又曲禮下曰天子祭天地祭四方祭山川祭五祀歲徧諸侯方祀祭山川祭五祀歲徧大夫祭五祀歲徧士祭其先祭四方謂祭五官之神於四郊也勾芒在東祝融在南蓐收在西玄冥在北詩云來方裡祀者各祭其方之官而已矣五祀謂竈中霤門行厲也此蓋殷時制也祭法天子立七祀諸侯立五祀大夫立三祀士立二祀謂周也凡祭有其廢之莫敢舉也有其舉之莫敢廢也為其瀆神也廢舉謂若殷廢農祀棄後不服廢棄祀農也非所祭而祭之名曰淫祀淫祀無福支子不祭祭必告於宗子不敢自專凡祭宗廟之禮牛曰一元大武豕曰剛鬣豚曰肥腯羊曰柔毛雞曰翰音犬曰羹獻雉曰䟽趾兔曰明視脯曰尹祭槀魚曰商祭鮮魚曰脡祭水曰清滌酒曰清酌黍曰薌合梁曰薌萁稷曰明粢稻曰嘉蔬韭曰豐本鹽曰醎醝玉曰嘉玉弊曰量弊號牲物者冀於人用也元頭也武迹也腯肥也春秋傳曰博碩肥腯充貌也尹正也商猶量也脡直也萁辭也嘉善也稻苽蔬之屬也豐茂也大醎曰醝今河東雲云弊帛也又曲禮曰大饗不問卜祭五帝於明堂莫適卜也不饒富富之言備也備而已勿多於禮又檀弓下曰仲遂卒于垂壬午猶繹萬入去籥仲孫魯公子先曰辛巳有事太廟而仲遂卒明日而繹非也萬千儛也籥籥儛也仲尼曰非禮也卿卒不繹又王制曰祭豐年不奢凶年不儉又王制曰天子祭天地諸侯祭社稷大夫祭五祀五祀謂司命中霤門行厲也此祭謂大夫有地者其無地祭三耳天子祭天下名山大川五嶽視三公四瀆視諸侯視視其牲器之數諸侯祭名山大川之在其地者魯人祭泰山晉人祭河是也天子諸侯祭因國之在其地而無主後者又禮器曰晏平仲祀其先人豚肩不奄豆澣衣濯冠以朝君子以為阨也阨猶狹阨孔子曰臧文仲安知禮夏父弗綦音忌逆祀而弗正也燔柴於奧文仲魯公子區之曾孫藏孫辰也莊文之間為大夫於時為賢是以非之不正禮也文二年八月丁卯有事於太廟躋僖公始逆祀於是夏父弗綦為宗人之為也奧當為爨字之誤夫奧者老婦之祭也盛於瓮尊於缾又曰季氏祭逮闇而祭日不足繼之以燭雖有強力之容肅敬之心皆倦怠矣有司跛倚以臨祭其為不敬大矣他日祭子路與室事交乎戶堂事交乎階質明而始行事晏朝而退孔子聞之曰誰謂由也不知禮乎又大傳曰牧之野武王之事也既事而退柴於帝祈於社設奠於牧室柴尊告天地及先祖也遂率天下諸侯執豆籩駿奔走又祭法曰燔柴於泰壇祭天也瘞埋於泰折祭地也用騂犢壇祈封土為祭處也壇之言垣也垣明貌也折炤晢也必為炤明之名尊神也地祀用黝牲與天俱用犢連言耳埋少牢於泰昭祭時也相近於坎壇祭寒暑也王宮祭日也夜明祭月也幽宗祭星也雩宗祭水旱也四坎壇祭四方也山林川谷丘陵能出雲為風雨見怪物皆曰神有天下者祭百神諸侯在其地則祭之亡其地則不祭昭明也亦謂壇也時四時也亦謂陰陽之神也埋之者陰陽出入於地中也凡此以下皆祭用少年又祭法曰聖王之制祭祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大菑則祀之能捍大患則祀之是故厲山氏之有天下也其子曰農能播植百穀夏之衰也周棄繼之故祀以為稷共工氏之霸九州也其子曰后土能平九州故祀以為社帝嚳能序星辰以著眾堯能賞均刑法以義終舜勤眾事而野死鯀鄣洪水而殛死禹能脩鯀之功黃帝正名百物以明民共財顓頊能脩之契為司徒而民成冥勤其官而水死湯以寬治民而除其虐文王以文治武王以武功去民之災此皆有功烈於民者也及夫日月星辰民所瞻仰也山林川谷丘陵民所取材用也非此族也不在祀典
