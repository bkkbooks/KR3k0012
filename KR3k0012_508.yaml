body:
  text: 逸民部七逸民七皇甫士安高士傳曰荷蕢者衛人也避亂不仕自匿姓名孔子擊磬於衛乃荷匱而過孔氏之門曰有心哉擊磬乎既而曰硜硜乎莫己知斯已而已矣深則厲淺則揭孔子聞之曰果哉蔑之難矣又曰石門守者魯人也亦避世不仕自隱又名為魯守石門主晨夜開閉之子路從孔子入石門而宿問子路曰奚自子路曰自孔氏遂譏孔子曰是知其不可而為之者與時人賢焉又曰東郭順子者魏人也修道守真田子方師事之而為魏文侯師友侍坐於文侯數稱溪工文侯曰溪工子師耶子方曰非也無擇之里人也稱道數當無擇稱之文侯曰然則子無師耶子方曰有文侯曰子師誰子方曰東郭順子也文侯曰然則夫子何故未嘗稱之子方曰其為人也直情而容物物無道則正容以悟之使人意也消無擇何也以稱之子方出文侯曰遠哉全德之君子始吾以聖智之言仁義之行為至矣吾聞子方之師形解而不敢動口鉗而不知言語所學真土梗耳夫魏真為居纍矣又曰壺丘子林者鄭人也道德甚優列禦寇師事之又曰列禦寇者鄭人也隱居不仕鄭穆公時子陽為相專任刑列禦寇乃絶跡窮巷面有飢色或告子陽曰列禦寇蓋有道之士也居君之國而窮君無乃不好士乎子陽聞而悟使官載粟數十乘以與之禦寇出見使再拜而辭之入見其妻妻撫心而怒曰聞為有道之妻子皆得樂今子之妻子有飢色君遺先生食先生不受豈非命也哉禦寇笑曰君非自知而遺我也以人之言而遺我至於其罪我也又必且以人之言此吾所以不受也居一年鄭人殺子陽其黨皆死禦寇安然獨全終身不仕著書八篇言道家之意號曰列子又曰段干木者晉人也少貧且賤心志不遂乃治清節遊西河師事卜子夏與田子方李克翟璜吳起等居於魏皆為將唯干木守道不仕魏文侯就造其門段干木踰牆而避之文侯尊以容禮出過其廬而軾其僕問曰干木布衣也君軾其廬不以甚乎文侯曰段干木不趨勢利隱處乎窮巷聲馳千里敢不軾乎文侯以名過齊桓公者蓋能尊段干木敬卜子夏友田子方故也又曰公儀潛魯人與子思為友穆公因子思而致命欲以為相子思曰公儀子逾所以不至也君若飢渴待賢納用其謀雖蔬食飲水伋亦願在下風如以高官厚祿為釣餌而無信用之心公儀子智若魚者可也不爾則不踰君之庭且臣不佞又不能為君操竿下釣以傷守節之士潛竟終身不屈又曰王斗齊人也修道不仕與顏歜並時曾造齊宣王門欲見宣王宣王使謁者延斗入斗曰趍見王為好勢趍見斗為好士於王何如謁者還報王曰先生徐之寡人請從王趨而迎之於門曰寡人奉先君之宗廟社稷願聞先生直言正諫斗曰王之憂國愛民不若王之愛尺之縠王曰何謂斗曰王使為冠不使左右便辟而使工者何也為能之也今王治齊國非左右便辟則無使也臣故曰不如愛尺之縠也王乃謝曰寡人有罪於國家矣於是舉士五人任之以官齊國大治王斗之力也又曰黔婁先生者齊人也修身清節不求進諸侯魯恭公聞其賢遣使致禮賜粟三十鍾欲以為相辭不受齊王又禮之以黃金百斤聘以為卿又不就著書四篇言道家之務號曰黔婁子終身不屈以壽終又曰原憲居環堵之甕牖桑樞上漏下濕縵衣無表手足胼胝三日不舉火十年不製衣坐而彈琴子貢相衛結駟連騎排藜藿入窮閭巷不容軒來見憲憲韋冠杖藜而出應門正冠則纓絶斂衽則肘見納屨則踵決子貢曰嘻先生何病也憲笑曰憲聞之無財謂之貧學道而不能行者謂之病若憲貧也非病也若夫仁義之慝車馬之飾憲不忍為子貢逡巡面有慚色終身恥其言之過也又曰曾參字子羽魯哀公致邑焉參辭不受曰吾聞受人者常畏人與人者常驕人縱君不我驕我豈無畏乎又曰陳仲子齊人其兄載為齊卿食祿萬鍾仲子以為不義將妻子適楚居於於陵自謂於陵子仲窮不茍求不義之食遭歲飢乏糧三日乃匍匐而食井上李實之蟲者三咽而食視身自織履妻擘纑以易衣食楚王聞其賢欲以為相遣持金百鎰至於陵聘仲子仲子入謂妻曰楚王欲以我為相今日為相明日結駟連騎食方丈於前意可乎妻曰夫子左琴右書樂在其中矣結駟連騎所安不過一肉而懷楚國之憂竟可乎於是謝使者遂相與逃而為人灌園又曰披裘公者吳人延陵季子出遊見道中有遺金顧而覩公曰取彼金公投鎌瞋目拂手而言曰何子處之高而視之卑五月披裘而負薪豈取金者哉季子大驚既謝而問姓名公曰子皮相之士何足語姓名哉又曰江上丈人者楚人也楚平王以費無忌之讒殺伍奢奢子員士將奔吳至江上欲渡無舟而楚人購員甚急自恐不脫見丈人得渡因解所佩劍以與丈人曰此千金之劍也願獻之丈人不受曰楚國之法得伍胥者爵執圭金千鎰吾尚不取何用劍為不受而別莫知其誰員至吳為相求丈人不能得每食輒祭之曰名可得聞而不可得見其唯江上丈人乎又曰漁父者楚人也見楚亂乃匿名隱釣於江濱楚頃襄王時屈原為三閭大夫名顯於諸侯為上官靳尚所譖王怒遷之江濱被髮行吟於澤畔漁父見而問之曰子非三閭大夫歟何故至斯原曰舉世混濁而我獨清衆人皆醉而我獨醒是以見放漁父曰夫聖人不疑滯於萬物故能與世推移舉世混濁何不隨其流揚其波汨其泥衆人皆醉何不餔其糟啜其醨何故懷瑾握瑜自令放焉乃歌曰滄浪之水清可以濯吾纓滄浪之水濁可以濯吾足遂去深自閉匿人莫知焉又曰河上丈人者不知何國人也明老子之術自匿姓名居河之湄著老子章句故世號曰河上丈人當戰國之末諸侯交爭馳說之士咸以權勢相傾唯丈人隱身修道老而不虧專業於安期先生為道家之宗焉又曰樂臣公者宋人也其先宋公族其後別從趙其族樂毅顯名於諸侯而臣公獨好黃老恬靜不仕及趙為秦昭王滅臣公東之齊以老子顯名齊人尊之號稱賢師趙人田叔等皆師事之又曰蓋公者齊之膠西人也明老子師事樂臣公楚漢之起齊人爭往於世主唯蓋公獨遁居不仕及漢定天下曹參為齊相延問諸儒數百人何以治齊人人各殊參不知所從蓋公善黃老乃使人厚幣聘之公為言治道貴清淨則民定遂推此為類為參言之參悅乃避正堂舍之師事焉齊果大治及參入相漢導蓋公之道故天下歌之蓋公雖為參師然未嘗仕以終壽又曰四皓者皆河內軹人也或在汲一曰東園公二曰角里先生三曰綺里季四曰夏黃公皆修道潔己非義不動秦始皇時見秦政虐乃退入藍田山而作歌曰莫莫高山深谷逶迤曄曄紫芝可以療飢唐虞世遠吾將何歸駟馬高蓋其憂甚大富貴之畏人不如貧賤之肆志乃共入商洛隱地肺山以待天下定及秦敗漢高聞之徵之不至深自匿終南山不能屈也又曰黃石公者下邳人也遭秦亂自隱姓名時人莫能知者初張良易姓為張自匿下邳步遊沂水圯上與黃石公相遇衣褐衣而老墜履圯下顧謂良曰孺子取履良素不知乍愕然欲毆之為其老也強忍下取履因跪進焉公笑以足受而去良殊驚公行里許還謂良曰孺子可教也後五日平明與我期此良愈怪之復跪曰諾五日平旦良往公怒曰與老人期何後也後五日早會良雞鳴往公又先在怒曰何後復五日早會良夜半往有頃公亦至喜曰當如是乃出一篇書與良曰讀是則為王者師後十二年孺子見濟北穀城山下黃石即我遂去不見良旦視其書乃是太公兵法良異之因講習以說他人莫能用後與沛公遇於陳留沛公用其言輒有功後十三年從高祖過濟北穀城山下得黃石公良乃寶祠之及良死與石并葬焉又曰魯二徵士者皆魯人也高祖定天下即皇帝位博士叔孫通白徵魯諸儒三十餘人欲定漢儀禮二士獨不肯罵通曰天下初定死傷者未起而欲起禮樂禮樂所由起百年之德而後可舉吾不忍為公所為也公所為不合古吾不行也公往矣無汙我通不敢致而去又曰安期先生者琅琊人受學河上丈人賣藥海邊老而不仕時人謂之千歲公秦始皇東遊請與語三夜賜金璧直數千萬出置阜鄉亭而去赤玉舄為報留書與始皇曰後數十年求我於蓬萊山下及秦敗安期先生與其友蒯通同往見項羽羽欲封之卒不肯受見列仙傳又曰東郭先生者與其友梁右君俱修道隱居不仕曹參為齊相尊禮士范陽人蒯通為參客入見參曰婦人有夫死三日嫁者有幽居守寡不出門者足下即欲求婦何取參曰取不嫁者通曰然則求臣亦由是也彼東郭先生梁石君齊之雋士也今隱未嘗卑節下意以求仕願足下禮之參遂致禮聘二人亦終不仕齊人美焉又曰田何字子齊人也自孔子受易世傳至何及秦焚學以易為卜筮之書獨不焚故何傳之不絶漢興何以齊諸田徙杜故號曰杜田生以易受弟子東武王仲洛陽周王孫丁寬齊服生梁項生等皆顯當世惠帝時何年老家貧守道不仕帝親幸其廬以受業終為易者宗又曰王生者漢文景時人也善為黃老退居不仕與南陽張釋之交當時釋之為公車令太子與梁王共入朝不下司馬門釋之劾奏太子不敬文帝善之遷至庭尉及文帝崩太子代立為帝是謂景帝釋之懼稱病欲去用王生計乃見上謝之景帝不過也王生平常與釋之及公卿會庭中立王襪解顧謂釋之前跪而繫之既退或讓生曰獨奈何辱張廷尉使跪繫襪乎生曰吾年老老且賤矣自度終無益張廷尉廷尉方為天下名臣吾豈敢恥廷尉使繫襪乎欲重之諸公聞之皆賢王生而重張廷尉
