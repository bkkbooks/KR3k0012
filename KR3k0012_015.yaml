body:
  text: 天部十四霜釋名曰霜喪也其氣慘毒物皆喪也說文曰𩅀竹入反早霜皚霜雪之白者易坤卦曰履霜堅冰至象曰履霜堅冰陰始凝也馴致其道至堅冰也詩曰糾糾葛屨可以履霜鄭玄注曰魏俗至冬猶謂葛屨可用履霜利其賤也又曰九月肅霜肅縮也霜降而收縮萬物也又曰蒹葭蒼蒼白露為霜禮曰季秋之月霜始降則百工休鄭注曰謂膠漆之作停又曰孟冬行秋令則雪霜不時又曰孟春行冬令則雪霜大摯又曰霜露既降君子履之必有悽愴之心非其寒之謂也鄭注云感時念親也又曰天子大社必受霜露以達天地之氣也京房易傳曰誅不原情有霜附木不下地不教而誅其霜反在草下又曰興兵妄誅厥災夏霜賢聖遭害其霜附木不下也大戴禮曰霜是陰陽之氣也陰氣勝則凝而為霜春秋元命苞曰陰陽凝為霜又曰霜以殺木露以潤草春秋考異郵曰霜者陰精冬令也四時代謝以霜收殺霜之為言亡也物以終也又曰僖公即位隕霜不殺草臣威強也春秋感精符曰霜殺伐之表季秋霜始降鷹隼王者順天行誅以成肅殺之威孝經援神契曰霜以挫物五經通義曰寒氣凝以為霜霜從地升也五經鉤沉曰天霜樹落葉而鴻鴈南飛家語曰霜降而婦功成嫁娶者行焉季秋霜降娶者始也詩曰將子無怒秋以為期國語曰駟四馬見而霣于敏反霜霣霜而冬裘具賈逵曰駟房星也漢武內傳曰西王母云仙之上藥玄霜絳雪王子年拾遺記曰廣延國有霜色紺碧又曰嵰立儼反州霜甘又曰員嶠之山名環丘有冰蠶以霜雪覆之然後作璽其色五采織為文錦入水不濡以投火經宿不燎唐堯之代海人獻以為黼黻莊子曰馬蹄可以踐霜雪毛可以禦風寒曾子曰陰氣勝則凝為霜淮南子曰芝蘭以芳未嘗見霜先霜刈之又曰聖人行於水無跡衆人行霜有跡又曰至秋三月青女乃出降以霜雪高繡注曰青女天神青天玉女主霜雪也又曰鄒衍事燕惠王盡忠左右譖之王王繫之獄仰天哭夏五月天為之下霜地鏡圖曰視屋上瓦獨無霜者其下有寶山海經曰豐山有九鍾霜降其鍾即鳴命曆序曰桀無道夏隕霜師曠占曰春夏一日有霜雪者君治政大嚴刻太殺天以示之宜損威殺重人命崔豹古今注曰鷓鴣常向日而飛畏霜露夜棲則以樹葉覆其背上蔡雍月令章句曰露凝為霜徐整長曆曰北斗當崑崙山氣運注天下秋冬為霜雪唐書曰寧王憲疾時京城寒甚凝霜封樹時學者以為春秋雨木冰即此是亦名樹介言其象介胄也憲見而歎曰此俗謂樹稼者也諺曰樹稼達官怕必有大臣當之吾其死矣十一月薨琴操曰履霜者伯奇之所作也伯奇者吉甫之子也吉甫聽其後妻之言疑其孝子伯奇遂逐之伯奇編水荷而衣采楟音亭山梨木也花而食之清朝履霜自傷無罪見放逐乃援琴而鼓之楚辭曰秋既戒之以白露冬又申之以嚴霜古艷歌辭曰秋霜白露下桑葉鬱為黃何瑾悲秋夜曰霜凝條兮璀璀露霑葉兮泠泠雹釋名曰雹炮匹巧反又音雹也其所中物皆摧折如人所蹙炮也許慎說文曰雹雨冰也從雨包聲禮曰仲夏行冬令則雹凍傷穀傳曰昭四年正月大雨雹季武問於申豐曰雹可禦乎對曰聖人在上無雹雖有不為災古者日在北陸而藏冰西陸朝覿而出之其入也時今藏川池之冰棄而不用風不越而殺雷不發而震雹之災誰能禦之穀梁傳曰僖公二十九年秋大雨雹雹者陰脅陽臣侵君之象也京房易傳曰飛雹下盡樹木之枝害五穀者君賦斂刻民也焦貢易林曰陰雨泥寒常冰不溫凌人惰怠大雹為災尚書洪範五行傳曰陰陽相脅而雹霰盛陰而雪凝滯而冰寒陽氣薄之不相入則散而為霰盛陽雨水溫暖而湯熱陰氣脅之不相入則轉而為雹霰者陽脅陰也雹者陰脅陽也又曰人君妬賢疾善在下謀上則日蝕而雹殺走獸春秋感精符曰大臣擅法則雨雹又曰九月十月日色青則寒有雪雹春秋考異郵曰陰陽專精凝合成雹雹之言合也春秋漢含孳曰專一精并氣凝為雹宋均注曰謂若魯僖公脅於齊以妾為妻尊重齊勝無回曲之心感陰水氣乃使結而不解散史記曰景帝二年秋雨雹大者五寸深二尺又曰凡雹皆冬之愆陽夏之伏陰也漢書曰成帝河平二年四月楚國雨雹大如斧飛鳥皆死又曰宣帝地節四年五月山陽濟陰雨雹如雞子深二尺五寸殺二十人蜚音飛與飛同鳥皆死又漢書五行志曰武帝元封三年雹大如馬頭范曄後漢書曰有青蛇見於御坐軒前又大風雨雹霹靂拔樹張奐上疏曰臣聞風為號令動物通氣木生於火相須乃明蛇能屈伸配龍騰蟄順至為休徵逆來為殃咎陰氣專用則精凝為雹故大將軍竇武太傅陳蕃或志寧社稷或方直不回前以讒勝并伏誅戮海內默默人懷震憤昔周公葬不如禮天乃動威今武蕃忠貞未被明宥妖眚之來皆為此也宜急為改葬徙還家屬其從坐禁錮一切蠲除又皇太后雖居南宮而恩禮不接朝臣莫言遠近失望宜思大義顧復之報天子深納奐言又曰時頻有地震隕雹蔡雍上封事曰臣聞天降災異緣象而至霹靂雹數發殆刑誅繁多之所生也又曰安帝延光元年夏京師及郡國三十雨雹又曰獻帝初平二年五月雹如扇如斗東觀漢記曰和帝永元五年六月郡國大雨雹大如鴈子又曰韓稜字伯師除為下邳令視事未朞吏民愛慕時鄰縣皆雹傷稼稜縣界獨不雹晉書曰太元二十一年四月雨雹時道子專政姦佞競進烈宗不能禁終至大亂晉中興書曰太興二年海監雨雹大如雞子崔鴻前趙録曰劉曜光初三年夏四月長安雨雹大如雞子後魏書曰鮮卑兵投鹿侯從胸奴三年其妻在家有子怪欲殺之妻言常行卬天視而雹入口吞之而生子號擅石槐後遂為鮮卑大人郭氏玄中記曰東方有柴都焉在齊國有山山有泉水如井狀深不測至春夏時雹從井中出常敗五穀人常以柴塞之不柴塞則出也故號為柴都陳留風俗記曰雍丘縣夏后公祠有神井能興霧雹伏琛齊地記曰安丘城南三十里有雹都淵其雹或出亦不為災異西京雜記曰鮑敞問董仲舒曰雹何物也曰陰氣脅陽也涼州異物志曰有一大人生于北邊在丁零北千五百里偃臥於野其高如山頓腳成谷撗身塞川長萬餘里頓腳之間乃似大谷近之有災銅雹擊之也唯可遙看不可到下則雷電流銅鐵之丸為雹以擊殺人曾子曰陽之專氣為雹雹者氣之化也淮南子曰北方之極有九澤有積雪雹孔叢子曰永初二年夏河西縣大雨雹皆如棬杯大者或如斗殺畜生雉兔折樹木於是天子責躬省過風俗通曰成帝問劉向曰俗說文帝時天下斷獄三人米一斗一錢有此事否對曰不然後元年雨雹如桃李深三尺尋景帝代之不可為升平歷代記曰石遵襲位於鄴暴風雨震電雹如斗其太武殿及兩廂端門光豔照天金石皆消為火月餘乃滅紀年曰夷王七年冬雨雹大如礪白虎通曰自上而下曰雨雹風角占曰徵動羽有雹霜陳陸璦和張湖孰雹詩曰惟徵動羽惟陰脅陽雨冰作冷凝氣為祥虹霓釋名曰虹攻也純陽攻陰氣故也陰陽不和昏姻錯亂淫風流行男女互相奔隨則此氣盛霓齧也其體絶見於非時此災氣傷害物如有所食齧說文曰霓屈蛇青赤或白色陰氣者也河圖稽耀鉤曰鎮星散為虹霓虹霓主內淫又霓者氣也起在日側其色青赤白黃周書曰清明後十日虹始見小雪日虹藏不見虹不收藏婦不專一詩曰螮蝀在東莫之敢指螮蝀虹也夫婦過禮則虹氣盛君子見戒而諱之莫之敢指禮曰小雪之日虹藏不見又曰玉氣如白虹天也又曰清明後十日虹始見爾雅曰螮蝀虹也霓為挈二易通卦驗曰虹不時見女謁亂公虹者陰陽交接之氣陽唱陰和之象今失節不見似君心在房內不修外事廢禮失義夫人淫恣而不敢制故曰女謁亂公詩含神霧曰瑤光如霓貫月感女樞生顓頊尚書考靈曜注曰日傍白者為虹日旁青赤者為霓春秋演孔圖曰霓者斗之亂精也斗失度則投霓見宋均注曰投應也春秋元命苞曰陰陽交為虹霓春秋運斗樞曰樞星散為虹霓蔡雍月令章句曰虹螮蝀也陰陽交接之氣著於形色者也雄曰虹雌曰霓虹常依陰雲晝見於日衝無雲不見大陰亦不見霓常依蒙濁見日旁白而直曰白虹凡日旁者四時常有之唯雄虹起季春見至孟冬乃藏史記曰荊軻慕燕丹之義白虹貫日太子畏之如淳注曰虹臣象日君象烈士傳曰荊軻發後太子見虹貫日不徹曰吾事不成矣後聞軻死事不立曰吾知之矣漢書曰武帝遊東萊臨大海是歲虹氣蒼黃色若飛鳥集城陽宮南又曰上官桀謀廢昭帝迎立燕王是時天雨虹下屬宮中飲井井水竭又天文志曰虹霓者陰陽之精光如淳注曰雄曰虹雌曰霓張璠漢紀曰靈帝和光元年虹晝御座殿庭前色青赤上引蔡雍問之對曰虹霓小女子之祥又名臣蔡雍奏詔曰有黑氣墮溫殿東庭中如車蓋騰起奮迅五色有頭體長十余丈形似龍占者以虹霓對虹著於天而降於庭以臣之聞則天所投虹者也吳志曰諸葛恪圍新城不剋引軍出往東興有蛇見其船還拜蔣陵白虹復繞其車吳録云恪曰虹何為此來哉果為孫峻所誅晉陽秋曰建武元年虹長彌天晉安帝紀曰義熙二年七月夜彩虹出西方蔽月前涼録曰張駿六年有彩虹五里隆隆如鍾鼓之聲沈約宋書曰劉義慶在廣陵有疾而白虹貫城野麕入府心甚惡之因自陳求還莊子曰陽炙陰為虹文子曰天地二氣即成虹人二即生病淮南子曰昔者馮夷大丙之御也皆古得道能御陰陽乘雷車駕雲虹又曰太古二皇得道之柄立於中央二皇伏羲神農神與化遊以撫四方是故虹霓不出賊星不行賊星妖星含德之所致也含懷也又曰虹霓者天之忌也孟子曰湯東面而征西夷怨南面而征北狄怨民之望湯也若大旱之望雲霓戰國策曰唐睢謂秦王曰聶政刺韓相白虹貫日搜神記曰孔子修春秋制孝經既備齊戒向北斗星而拜告備于天乃有赤氣如虹自上而下化為玉璜上有刻文孔子跪而授之又曰廬陵巴丘民陳濟者作州吏其婦姓秦獨在家忽疾病恍惚發狂後漸差常有一丈夫長大儀貌端正著絳碧袍采色炫耀來從之常相期於一山澗至於寢處不覺有人道感接忽忽如眠耳如是積年春每往期會不復畏難比鄰人觀其所至輒有虹見秦云至水側丈夫金瓶引水共飲後遂有娠生兒如人多肉不覺有手足濟尋假還秦懼見之乃內兒著瓮中因見此丈夫以金瓮與之令覆兒濟時醉眠在牗下聞人與秦語語聲至愴濟亦不疑也又丈夫語秦云兒小未可得將去不須作衣我自衣之即以絳囊與裹之令可時出與乳于時風雨晦冥鄰人見虹下其庭秦常能辨佳食肴饌豐美有異於常丈夫復少時將兒去亦風雨晦冥人見二虹出其家從此遂踈異苑曰古語有之曰古者有夫妻荒年菜食而死俱化成青虹故俗呼為美人又曰晉陵薛願義熙初有虹飲其釜煥吸響便竭願輦酒灌之隨投便竭吐金滿器於是災弊日祛而豐富歲臻述異記曰有黑虹下樂輯營少日輯病卒紀年曰晉定公十八年青虹見瑞應圖曰大虹竟天握登見之意感生帝舜於姚墟太玄經曰紫霓圍日其疾不割雜兵書曰日暈有白虹貫內出外者從所止戰勝華陽國志曰李特生長子蕩字仲平少子雄字仲俊初特妻羅氏妊雄夢雙虹自地升天一虹中斷羅曰吾二兒有先亡者有貴者後雄王蜀黃帝占軍決曰攻城有虹從南方入飲城中者從虹攻之勝白虹繞城不匝從虹所在擊之勝謹守其鈌賊乃從其地破走文子曰父無喪子之憂兄無哭弟之哀童子不孤婦人不孀虹霓不見盜賊不行含德之所致也楚辭曰青雲衣兮白霓裳楚辭天問曰白霓嬰茀胡為此堂王逸注曰霓雲之有色似龍者茀白雲逶迤若蛇者言有此霓茀氣氣逶迤相嬰何為於此堂乎蓋屈原所見祠堂也安得失夫良藥不能固臧臧善也崔文子學仙於王子喬子喬化為白虹而如嬰茀持藥與崔文子文子驚怪引戈擊霓中之因墮其藥俯而視之王子喬之履也故言得藥不善也揚雄甘泉賦曰曳虹彩之流離左思吳都賦曰虹霓回帶於雲館潘尼苦雨賦曰收絳霓於漢陰楊文雲賦曰浮素霓之逶迤
