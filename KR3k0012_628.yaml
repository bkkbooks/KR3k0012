body:
  text: 治道部八賦歛周禮天官下掌皮曰掌秋歛皮冬歛革又地官下旅師曰凡用粟春頒而秋歛之因時而施之饒時而歛之委人掌歛野之賦歛薪芻凡䟽材木材凡畜聚之物聚歛野賦物之園囿山澤之賦凡䟽材草木有實者凡蓄聚之物瓜瓠葵芋禦冬之具也以稍聚待賓客以甸聚待羈旅又地官下曰掌染草掌以春秋歛染草之物以權量受之待時而頒之禮記王制曰古者公田藉而不稅藉之言借也借民力而治田美惡取於此不稅民之所自治也孟子曰夏后氏五十而貢殷人七十而助周人百畝而徹則云古者古者謂殷時也市廛而不稅廛市物邸舍也關譏而不征譏異服識異言也征亦稅又太學曰百乘之家不畜聚歛之臣與其有聚歛之臣寧有盜臣左傳宣上曰晉靈公不君厚歛以雕牆從臺上彈人觀其避丸者又文下曰縉雲氏有不才子晉雲黃帝時官名貪于歛食冒于貨賂侵欲崇侈不可盈厭聚歛積實不知紀極不分孤寡不恤窮匱冒亦貪也盈滿也實財也天下之民以比三凶非帝子孫故別以比三凶謂之饕餮貪財為饕貪食為餮穀梁傳文公曰天王使毛伯來求金求車猶可求金甚也毛詩葛屨曰碩鼠剌重歛也國人剌其君重歛蠶食於民不脩其政貪而畏人若大鼠也碩鼠碩鼠無食我忝三歲貫女莫我肯顧逝將去女適彼樂土樂土樂土爰得我所論語先進曰季氏富於周公孔子曰周公天子之宰卿土而求也為之聚歛而附益之孔曰冉求為季氏宰為之急賦稅子曰非吾徒也小子鳴鼓而攻之可也鄭曰小子門人也鳴鼓聲其罪以責之也春秋繁露曰木有變春彫冬榮秋水春多雨此徭役眾賦歛重百姓貧窮道多飢人救者省徭役薄賦歛出倉穀振困窮韓詩外傳曰晉平公藏寶之臺燒士大夫聞者皆趍車馳馬救火三曰三夜乃勝之公子晏獨奉束帛而賀曰臣聞王者藏於天下諸侯藏於百姓農夫藏於囷庾商賈藏於筐簣今百姓困乏於外而賦歛無已昔桀紂殘賊為天下戮今皇天降災於藏臺是君之大福也漢書曰秦為亂政虐刑殘滅天下北為長城之役南有五嶺之戍外內騷動百姓罷敝頭會箕歛家家箕頭數出穀以箕歛之也以供軍費財匱力盡又曰入物者補官出貨者除罪選舉陵夷廉恥相冒武力進用法嚴令具興利之臣自此而始又曰衛青北擊胡賦稅既竭不足以奉戰士有司請令民得買爵及贖禁錮減罪置賞官名曰武功爵又曰孝武時山東被水災民多飢乏於是天子遣使虛郡國倉廩以振貧猶不足又募豪富人相假貸而富商賈或滯財役貧轉穀百姓不佐公家之急黎民重困是時禁苑有白鹿而少府多銀錫有司言曰古者皮幣諸侯以聘享金有三等黃金為上白金為中赤金為下乃以白鹿皮方尺緣以繢為皮直四十萬王侯宗室朝覲聘享必以皮幣薦璧然後得行又曰東郭咸陽孔僅為大農丞師古曰姓東郭名咸陽姓孔名僅二人也領鹽鐵事而桑弘羊貴幸咸陽齊之大煮鹽孔僅南陽大冶皆致產累千金弘羊洛陽賈人之子以心計故三人言利析秋毫矣其明年大將軍驃騎大出擊胡賞賜五十萬金是時財匱戰士頗不得祿矣大農上鹽鐵丞孔僅咸陽言山海天地之藏宜屬少府陛下弗私以屬大農佐賦願募自給費因官器作鬻鹽官與牢盆蘇林曰牢價直今世人言顧手牢浮食奇民欲擅斡山海之貨以致富羨役利細民除故鹽鐵家富者為吏吏益多賈人矣商賈以幣之變多積貨逐利於是公卿言郡國頗被災害貧民無產業者募徙廣饒之地陛下損膳省用出禁錢以振元元寬貸而民不齊出南畝商賈滋象貧者畜積無有皆仰縣官異時筭軺車賈人之緡錢皆有差請筭如故率緡錢二千而筭一師古曰率計有二千錢者則出一筭諸作有租及鑄以手力所作而賣之者率緍錢四千筭一非吏比者三老北邊騎士軺車一筭師古曰比例也身非為吏之例非為三老非為北邊騎士而有軺車者皆令出一筭比音必寐反商賈人車二筭商賈人有軺車又使多出一筭重其職舡五丈以上一筭匿不自占占不悉戍邊一歲沒入緡錢悉猶盡也有能告者以其半畀之畀與也音必寐反賈人有市籍及家屬皆無得名田一人有市籍身及家內皆不得有田地以便農敢犯令沒入田貨又曰晁錯奏古者稅民不過什一其求易供使民不過三日其力易足至秦則不然用商鞅之法改帝王之制除井田民得賣買富者田連阡陌貧者亡立錐之地入顓川澤之利管山林之餘荒淫越制踰侈以相高邑有人君之尊里有公侯之富小民安得不困又曰自貢禹在位數言得失書數十上禹以為古民亡賦筭口錢起武帝征伐四夷重賦於民民產子三歲則出口錢故民重困至於生子輒殺之甚可悲痛宜令兒七歲去齒乃出口錢年二十乃筭也又曰何武兄弟五人皆為郡吏郡縣敬憚之武弟顯家有市籍租常不入縣數負其課市嗇夫求商捕辱顯家顯怒欲以吏事中商武曰以吾家租賦徭役不為眾先奉公吏不亦宜乎東觀漢記曰馬防多牧馬畜賦歛羗胡帝不喜之數加譴勑所以禁遏甚備由是權勢稍損賓客亦衰范曄後漢書曰靈帝南宮災張讓趙忠等說帝令歛天下田畝稅十錢以修宮室發太原河東狄道諸郡材木及文石每州郡部送至京師黃門常侍輒令譴呵不中者因強折賤買十分雇一因復貨之於官官復不為即受遂至腐積宮室連年不成剌史太守復增私調百姓呼嗟江表傳曰魏文帝遣使求雀頭香大明珠象牙犀角瑇瑁孔雀翡翠鬥鴨長鳴鷄群臣奏曰荊楊二州貢有常典魏所求珍玩物非禮也不宜與權曰彼所求者於我瓦石耳孤何惜焉彼在諒闇中而求若是寧可與言禮哉皆具與之晉中興書曰孔嚴補大中正時東海王弈信用群下上䟽求海鹽錢塘以水牛牽埭稅取錢直嚴啟宜寢表帝詔曰弈謂此適民無損害豈奪惠卹之旨耶省所啟敬納忠規又曰謝安弟石尚書令薨時年六十二石無它才望直以宰相弟兼有大勳遂居清顯而聚歛無厭取譏當世管子曰鮑叔曰必用夷吾之言公不聽乃令四封之內脩兵關市之征侈之侈謂過常也謂重其賦稅又曰桓公踐位十九年施關市之征征賦五十而取一取其貸賄五十之一上年什取三中年什取二下年什取一歲飢不稅歲飢謂時歲惣飢故不稅歲飢施而稅此歲飢謂有飢者有不飢者施故飢而稅不飢又曰地辟而國貧者舟輿飾臺榭廣也賞罰信而兵弱者輕用眾使民勞也舟車飾臺榭廣則賦歛厚矣輕用眾使民勞則民力竭矣賦歛厚則下怨上民力竭則令不行下怨上令不行而求敵之勿謀己不可得也又曰桓公問曰梁聚謂寡人曰古者輕賦稅而肥籍歛取下無順於此者矣梁聚之言何如管子對曰梁聚之言非也彼輕賦稅則倉廩虛肥籍歛則器械不奉而諸侯之皮幣不至倉廩虛則倳賤無祿皮幣不衣於天下則國倳賤梁聚之言非也又曰桓公見黃鵠謂管仲曰鴻鵠東西南北儵忽千里所恃者六翼也今仲父寡人之翼也管子對曰民勞而亡使之不時民飢而重歛焉雖黃鵠之有羽翼其若君何晏子春秋曰為君籍厚斂而託之為民進讒諛而託之用賢遠公正而託之不順君行此三者則危墨子曰聖王作舟車完固輕利可以任重致遠是以民樂而利之今則厚歛百姓飾車以文采飾舟以刻鏤是以其民飢寒並至而國亂矣又曰古之民未知飲食故聖人耕稼其為食也以增氣充虛今則厚歛百姓以為美蒸庖魚鼈前則方丈孤寡凍餧雖欲無亂不可得也孟子曰求也為季氏宰無能改於其德而賦粟倍於他日孔子曰求也非我徒也小子鳴鼓而攻之可也又曰耕者助而不稅則天下之農皆悅而欲耕於其野也孫卿子曰成侯嗣君聚歛計數之君也未及取民者也鄭子產取民者也未及為政者也管仲為政者也未及脩禮者也故脩禮者王為政者強取民者安聚歛者亡莊子曰北宮奢為衛靈公賦歛以鍾為壇于郭門之外三日而成上下之懸王子慶忌見而問焉曰子何術設之奢曰無敢設也奢聞之既琢復歸於朴還其用本性也伺乎其無識任其純朴而也儻兮其怠疑無所取也華兮其送往而迎來無所欣悅來者勿禁往者無止任彼耳也從其強梁從于眾也隨其典傅無所係也因其自窮用其不得不爾故朝夕賦歛而毫毛不挫故無損也而況有大塗者乎韓子曰趙簡主出稅吏請輕重簡主曰勿輕勿重則利入於上輕則利歸於民吏無有私利而正矣孔藂子曰子思言茍變於衛君曰其才可將五百乘衛君曰吾知其才可然變嘗為吏賦於民而食人二鷄子故弗用也子思曰夫聖人之官人如大匠之用木也取其所長棄其所短今君以二卵棄扞城之將不可使聞於鄰國也公曰謹受命淮南子曰或有罪而可賞或有功而可罪者始西門豹治鄴西門豹魏之侯之官食無積粟府無儲錢庫無兵甲官無計會人數言其過於文侯身往行其縣果若人言文侯曰翟璜任子治鄴鄴大亂子能變道則可不能將加誅於子西門豹曰王主富民霸主富武亡國富府庫今君欲為霸者也臣故蓄積於民君以為不然臣請先登鼓之鉀兵粟米可立具也乃登城而鼓之致鉀笴甲鎧笴操箭矢也兵弩而出再鼓服揵載粟而至服駕出也揵擔文侯曰罷之西門豹曰與民信非一日積也一舉而欺之其後不可復用也燕嘗侵魏八城請北擊之以復侵地遂舉兵擊燕復地而後反此有罪而可賞者也解篇為東封解篇魏臣治東封也上計而入三倍有司請賞之文侯曰吾土地非益廣也人民非益眾也何以三倍對以冬伐木而積之以春浮之河而鬻之文侯曰民寒以力耕暑以強耘秋以收歛冬間無事又伐林而積之負軛而浮之於河是用民不得休息也民以弊矣雖有三倍之入將焉用之此有功而可罪者也太公兵法曰武王問太公勝負何如太公對曰夫紂之行不由理精兵酒池賦歛甚數百姓苦之國語曰鬥旦廷見令尹子常子常令尹子囊之孫囊瓦子常與之語問畜貨聚馬歸以語其弟曰楚其亡乎不然令尹其不免乎吾見令尹問蓄聚積實若餓豺虎焉殆必亡者晁錯上書曰陰陽不和水旱為災一亡也縣官重責更賦租稅二亡也貪吏並出受取不已三亡也說苑曰晉平公好樂多賦歛不治城郭曰敢諫者死國人憂之有咎犯者諫公曰善乃屏鍾鼓除竽瑟遂與咎犯參治國焉又曰晏子飲景公酒令器必新家老曰財不足歛於民晏子曰止夫樂者上下同之今上樂其樂下傷其費是獨樂者也不可新序曰魏文侯出遊見路人反裘而負芻文侯曰胡為反裘而負芻對曰臣愛其毛文侯曰若不知其裏盡而毛無所植明年東陽上計錢十倍大夫畢賀文侯曰此所以賀我者譬無異夫彼路人反裘而負芻也將愛其毛不知其裏盡毛無所植也今吾田地不加廣士民不加眾而錢十倍必取士大夫也吾聞之下不安者其上不可居也此非所以賀我又曰中行寅將亡乃召其太祝而欲加罪焉祝簡對曰昔吾先君中行密子皮車十乘不憂其薄也憂德義之不足也今主君有車百乘不憂德義之薄也唯患車之不足也夫舡車飾則歛厚歛厚則民怨謗詛矣且君茍以祝為有益於國乎則詛亦將為亡矣國亡不亦宜乎桓譚新論曰漢定以來百姓賦歛一歲為四十餘萬萬吏俸用其半餘二十萬萬藏於都內為禁錢少府所領園地作務之八十三萬萬以給宮室供養諸賞賜郭子曰王夷甫婦郭太寧女才拙而性剛聚歛無厭夷甫患之而不能禁時其鄉人幽州剌史李陽景都大使猶漢之樓護護字君卿郭氏甚憚之夷甫驟諫之乃云非但我言卿不可李陽亦謂不可郭氏乃為少損京氏別對災異曰火起災何人君貪財賦歛盡民貨即火為起不救必有日蝕之災矣其救之也舉廉貞之士為首之
