body:
  text: 禮儀部二十一拜說文曰拜首至地也尚書舜典曰帝曰俞咨垂汝作共工垂拜稽首讓于殳斨帝曰俞咨益汝作朕虞益拜稽首讓于朱虎熊羆帝曰俞咨伯汝作秩宗伯拜稽首讓于夔龍又大禹謨曰帝曰禹官占惟先蔽志昆命于元龜朕志先定詢謀僉同鬼神其依龜筮叶從卜不習吉禹拜稽首固辭又大禹謨曰益贊于禹曰惟德動天無遠弗屆滿招損謙受益時乃天道禹拜昌言曰俞班師振旅又益稷曰皋陶拜手稽首揚言曰念哉周禮春官下大祝曰大祝辨九拜一曰稽首二曰頓首三曰空首四曰振動五曰吉拜六曰凶拜七曰奇拜八曰褒拜九曰肅拜以享右祭祀嵇首拜頭至地也頓首頭叩地空首拜頭至手所謂拜手也古拜拜而後稽顙謂齊衰不杖以下者也言吉者此殷之凶拜周以其與頓首相近故謂之吉拜云凶拜稽顙而後拜謂三年服者也杜子春云奇讀為奇偶之奇謂先屈一膝雅拜是也或云奇讀曰倚倚拜謂持節持戟拜身倚之以拜也鄭大夫云動讀為董書亦或為董振董以兩手相擊也奇拜謂一拜也褒謂報報再拜是也鄭司農云褒拜今時持節拜也肅拜但俯身下手今時揖是也介者不拜故曰為事敢肅使者玄謂振動戰栗變動之拜也書曰王色變一拜答臣下也再拜禮神與尸享獻也謂朝獻饋獻也右讀為侑侑勸尸食而拜禮記曲禮曰侍食於長者主人親饋則拜而食主人不親饋則不拜而食以其禮於已不隆也又曲禮曰君言至則主人出拜君言之辱使者歸則必拜送于門外又曲禮曰介者不拜為其拜而莝拜莝則失容節莝猶詐也又曲禮下曰士有獻於國君問之曰安取彼再拜稽首而後對又檀弓上曰孔子曰拜而後稽顙頽乎其順也稽顙而後拜頎乎其至也頽頎懇至也此俱喪拜時人行之異禮又內則曰凡拜男尚右手女拜尚左手鄭玄注曰左陽右陰左傳僖公曰王使宰孔賜齊侯胙胙祭肉尊之此二王後曰天子有事于文武使孔賜伯舅胙天子謂異姓諸侯曰伯舅齊侯將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜七十曰日耋級等也對曰天威不違顏咫尺言天監察不遠威嚴常在顏面之前八寸曰咫小白余敢貪天子之命無下拜小百齊侯名余身也恐隕越于下隕越顛墜也揚天王居上故言恐顛墜于下以遺天子羞敢不下拜下拜登受又僖中曰公賦河水公賦六月趙衰曰重耳拜賜公子降拜稽首公降一級而辭焉衰曰君稱所以佐天子者命重耳重耳敢不拜又文上曰公如晉及晉侯盟晉侯饗公賦菁菁者我菁菁者莪詩小雅取其既見君子樂且有儀莊叔以公降拜曰小國受命於大國敢不慎儀君貺之以大禮何樂如之抑小國之樂大國之惠也侯降辭登成拜公賦嘉樂嘉樂詩大雅取顯顯令德宜民宜人受祿於天又成公九年曰季文子如宋致女復命公享之賦韓奕之五章韓奕詩大雅篇名其五章言蹶父嫁女於韓後為女相所居莫如韓樂文子喻魯侯有蹶父之德宋公如韓侯宋土如韓樂穆姜出于房再拜曰大夫勤辱不忘先君以及嗣君施及未亡人穆姜伯姬母聞文子言宋樂喜而出謝其行勞婦人夫死自稱未亡人先君猶有望也言先君亦望文子之若此敢拜大夫之重勤又賦緑衣之卒章而入緑衣詩邶風也取其我思古人實獲我心喻文子言得己意又襄元曰穆叔如晉報智武子之聘也晉侯享之金奏肆夏之三不拜肆夏樂曲名工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子問之對曰三夏天子所以享元侯也使臣弗敢與聞文王兩君相見之樂也使臣不敢及鹿鳴君所以嘉寡君敢不拜嘉嘉者以叔孫為嘉實故歌鹿鳴之詩取其我有嘉賓也叔孫奉君命求嘉叔孫乃所以嘉魯君四牡君所以勞使臣也敢不重拜皇皇者華君教使臣曰必咨於周皇皇者華君遣使臣之詩也言中臣奉使能輝光君命始華之皇皇然又當咨於忠信以補己不及也臣聞之訪問於善為咨咨親為詢咨禮為度咨事為諏咨難為謀臣獲五善敢不重拜五善謂咨詢度諏謀也又襄二曰公使厚成叔弔于衛曰寡君使瘠聞君不撫社稷而越在他境若之何不弔衛人使太叔儀對曰群臣不佞得罪于寡君寡君不以即刑而悼棄之君不忘先君之好辱弔群臣敢拜君命之辱重拜大貺又昭四曰初楚恭王無冢適有寵子五人無適立焉乃大有事于群望而祈曰隨神擇於五人者使王社稷乃遍以璧見於群望曰當璧而拜者神所立也誰敢違之既乃與巴姬密埋璧於大室之庭巴姬恭王妾太室祖廟使五人齊而長幼入拜順長幼以次拜也康王跨之靈王肘加焉子于子哲皆遠之平王弱抱而入再拜皆厭紐孝經右契曰制作孝經道備使七十人弟子向北辰星而聲折孔子絳單衣向星而拜論語子罕曰拜下禮也今拜乎上泰也雖違衆吾從下臣祭於君酬酢授爵當拜於堂下時臣驕泰故拜於堂上又鄉黨曰康子饋藥拜而受之曰丘未達不敢嘗饋進也拜受敬也未知其故故不敢嘗禮也家語曰子貢曰孔子為大司寇國廄焚有違火來者則拜士一大夫再曰其來者亦相弔之道吾為有司故拜之爾雅曰啓跪也郭璞注曰小跪也方言曰東齊青岱北燕之郊跪謂長鶩郭璞注曰今東郡人亦呼長跪為長鶩釋名曰跪危也兩膝隱地體危倪他跽忌也見所敬者不敢自安也拜於丈夫為趺跌然屈折下就地也於婦人為扶自相扶而上下也漢書曰武帝幸不其如淳曰其音基不基山名因以為縣祠神人於交門宮應邵曰神人蓬萊仙人之屬也琅琊縣有交門宮武帝所造若有嚮坐拜者作交門之歌又曰劉章已殺呂産帝令謁者持節勞章章欲奪節謁者不肯章乃從與載因節信馳斬長樂衛尉呂更始還入北軍復報太尉勃起拜賀又曰大將軍衛青既益尊姊為皇后然汲黯與亢禮或說黯曰自天子欲令群臣下大將軍大將軍尊貴誠重君不可以不拜黯曰夫以大將軍有揖客反不重耶又曰何武徙京兆大尹二歲坐舉方正所舉者召見槃辟雅拜有司以為詭衆虛僞武坐左遷楚內又曰朱博為琅琊太守門下掾貢遂耆老大儒教授數百人拜起舒遲博出教告主簿貢先生不習吏禮主簿且教拜起間習乃止又曰張禹疾車駕自臨問之上親拜禹床下禹小子未有官上臨候禹禹數視其小子上即拜禹之小子為黃門郎給事中東觀漢記曰耿恭於疏勒城穿井十五丈不得水恭乃正衣服向井再拜為吏士禱水身自率士挽籠有飛泉湧出大得水吏士驚喜皆稱萬歲又曰陳遵為大司馬護軍使胸奴過辭於王丹臨訣丹謂遵曰俱遭世反覆唯我二人為天地所貴今子當之絶域無以相贈贈子以不拜遂揖而別遵甚悅之又曰司徒侯覆欲王丹者定交丹被徵霸遣子昱往昱道遇丹拜於車下丹答之昱日家公欲與君投分何為拜子孫耶丹曰君房有是言王丹未之許又曰魏霸為光祿大夫霸妻死長兄伯為霸娶妻送至官舍霸笑曰兒子備具何空養他家姥為即自入拜其妻手奉案前因跪曰夫人視老夫復何中直而空失計義不敢相屈即拜而出妻慚求去遂送還之後漢書曰北胸奴遣使求和親顯宗遣鄭衆持節使胸奴衆至北庭虜欲令拜衆不為屈單于大怒圍守閉之不與水火欲脅服衆衆拔刀自誓單于恐而止乃更發使隨衆還京師華嶠後漢書曰鄭衆使胸奴欲令衆拜不為屈相議復欲遣衆衆曰今往胸奴必恐取勝於臣臣不忍持大漢節對氈裘跪拜明帝收繫廷尉獄獻帝春秋曰董卓自號太師御史中丞以下皆拜初皇甫嵩與卓爭雄後嵩為中丞見卓拜車下卓曰可以服未嵩曰安知明公乃至於是卓曰鴻鵠固有遠志但燕雀不知耳嵩曰昔與明公俱鴻鵠獨明公今為鳳凰卓笑曰卿早服可得不拜也漢雜事曰韋玄成讓侯詔書不聽引拜之也又曰馬援與梁統友善統子虎賁中郎將松往候援援小疾病松拜床下援於床上坐視不為禮左右曰松貴不當禮耶曰我乃松父友雖貴奈何失禮典略曰太子嘗請文學酒酣坐欣命夫人甄氏出拜坐衆人皆伏而劉楨獨平視太祖聞之收楨減死胡沖吳曆曰孫策繫豫章先遣虞翻說華歆歆葛巾迎策策謂歆府君德望遠近所歸策年幼稚宜修子弟之禮便向歆拜魏志曰魯國孔融高才倨傲年在紀群之間先與紀友後與群交更為紀拜由是顯名魏志曰常林年七歲有父黨造門問林曰伯先在不汝何不拜對曰對子字父何拜之有又曰晉宣王以常林鄉邑耆德每為拜或謂林曰司馬公貴重君宜止之林曰司馬公自欲敦長幼之序為後生法貴非吾之所畏也拜非吾之所制也言者踧踖而退蜀志曰先主為漢中王許靖為太博丞相諸葛亮皆為之拜又曰伊籍隨元主入益州東使吳孫權聞其才辨欲逆折以辭籍適入拜權曰勞事無道之君籍即對曰一拜一起未足為勞吳志曰朱冶領吳郡舉孫權為孝廉後權歷位上將及為吳王冶每見權常親迎執板交拜又曰人誣樓玄謗訕政事華核上疏乞玄自新孫皓疾玄名聲復徙玄及子男據付交趾將張並使以戰自效陰別勑並令殺之據到交趾病死一身隨並討賊持刀見並輒拜並未忍殺會並暴疾卒玄殯斂並於器中見勑書還便自殺耳王隱晉書曰何曾為司徒與高鄭二公將見文帝曾在中央獨先拜漢晉春秋曰晉公既進爵為王太尉王祥司徒何曾司空荀顗並請詣謁顗謂祥曰相王尊重何侯既已書敬今日便當相率而拜無所疑也祥曰相國位勢誠為尊貴然要是魏之宰相吾等魏之三公公王相去一階而已班例大同安有天子三司可輒拜人者損魏朝之望虧晉王之德君子愛人以禮吾不為也及入顗遂拜而祥獨長揖帝曰今日方知君見顧之重矣晉書曰潘嶽性輕躁趍世利與石崇諂事賈謐每候其出與崇輒望塵而拜晉中興書曰王猛少貧賤鬻畚為事嘗至洛陽貨畚有一人於市買其畚云家近在此也隨我去取直猛隨去忽至深山中此人語且住樹下當先啓導須臾猛進見一公踞胡床髦悉白侍從十許人有一人引猛云大司馬公猛因拜老公公曰王公何緣拜即十倍酬畚直遣人送猛出山既出嶺視乃嵩高山晉中興書曰顯宗嘗使太常丞張放歸胙於王導詔無下拜導不敢當辭以疾初顯宗幼冲見導恆拜晉諸公讚曰司馬駿鎮西戎既薨每見其碑讀者無不拜之後魏書曰沈文秀為慕容白曜攻之長圍數匝自夏至秋始剋文秀取所持節衣冠儼然坐齊內亂兵入文秀厲聲數四身見執而祼送于白曜曜左右令拜文秀曰各二國大臣無相拜之禮曹瞞別傳曰沛國桓邵亦輕太祖邵避難交州得出首拜謝於庭中太祖曰跪可解死耶遂殺之郭太別傳曰鄉人見太皆於床下拜鄭玄別傳曰建安元年自徐州還高密道遇黃巾賊數萬人見玄皆再拜樊英別傳曰英嘗病臥便室中英妻遣婢拜問疾英下床答拜陳實問英何答婢拜英曰妻齊也共奉祭祀禮無往而不反荀氏家傳曰魏文帝在東宮武帝謂曰荀公為人之師表也汝當盡禮敬之荀曾病世子問疾拜床下三輔決録曰孟他字伯郎靈帝時中常侍張讓專朝讓監奴典任家計他殫家財賂監奴共結親厚積年衆奴心慚問他所欲他曰欲得汝曹拜奴等皆許諾時賓客求見讓者門車常數百乘或纍日不得過他最後往衆奴以其至皆迎而拜之將他車騎入衆人大驚謂他與讓善爭以珍物遺他他得盡以賂讓讓大喜後以蒲陶酒遺讓即拜梁州剌史燕書曰皇甫真字楚季鄴城失守秦主初入臨前殿宴群臣數百人皆集東掖門見待中王猛來真等望馬首拜之明日更見真乃卿猛猛曰昨拜朝卿何恭慢之相違真答曰卿昨為賊朝是國士吾冥拜賊而卿國士亦何所怪也猛嘉之韓子曰禮者所以貌情也中心懷而不諭故疾趍卑拜以明之燕丹子曰田先生見太子太子側階而迎迎而再拜賈誼書曰受計之禮主所親拜者二聞生民之數則拜之聞登穀則拜之郭子曰陶公自上流來陶侃字士衡也赴蘇峻之難含怒於庾公庾公謂必戮己進退無計溫父乃勸詣陶公卿但徑拜必無他我為卿保之庾殊未了而不得不往乃從溫言詣陶至便拜庾風姿雅潤陶見拜不覺自起止之曰庾元規何緣拜陶士衡江統作謁拜議曰以為諸郡吏都無太守伯叔兄敬者近臣君服斯服然則朝幹佐以下左右者可從君而拜君所拜統士古者見賓主皆拜今自非君臣上下則不拜君之新親者唯幹佐小吏則可君拜斯拜矣君之諸父無道謂之事甲辰儀臣見諸王直恭敬而已無鞭板拜揖雖於皇帝為諸祖諸父其義皆同又河南河內諸郡吏前後亦為太守伯叔兄謁拜者其比甚衆矣尚書逸令曰卞壺等奏三代以來記籍禮經無拜臣之制唯漢成帝拜張禹庸主凡臣不足為軌先帝拜司徒導以元皇興自蕃國布衣之交拜在人臣之故師而不改以君拜臣大教有違事應改正太后又詔曰帝幼少宜一遵先帝壺等又固爭云臣期不奉詔又反覆乃從外奏成帝拜王公時議曹疑於儀注博士杜瑗及陳舒議禮無以君拜臣下也小會崇謙非臣下所知無在儀注之制張闈受侯不拜國太妃表云昔為晉陵內史在東海國封內時世孫幼小太妃秉政前內史遷授除拜日及當之官皆上疏拜閣執純臣之禮闓自以雖爵有五等然執圭受瑞俱為列國無相臣之體又晉制拜列侯為相內史於天朝不曰陪於蕃國不稱臣臣以從古則懼有行簡之譏隨俗又恐失君臣之訓經國垂範宜有定淮乞出臣表下八座參詳答報唐書曰田承嗣方跋扈佷傲無禮郭子儀嘗遣使至魏州承嗣輒望拜之指其膝謂使者曰茲膝不屈於人今為公拜
