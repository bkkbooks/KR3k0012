body:
  text: 皇親部十六諸王上漢書百官表曰諸侯王高帝初置金璽組綬史記曰高帝得定陶戚姬愛幸生趙王如意幾代太子者數矣賴大臣爭之及留侯策太子得無廢高帝崩惠帝立呂后使人持鴆飲之遂斷戚夫人手足去眼燻耳飲瘖藥使居廁中名曰人彘居數日乃召惠帝視人彘帝視而知其戚夫人乃大哭因病歲餘不能起使人請太后曰此非人所為臣為太后子終不能治天下又曰燕王劉澤漢書曰澤高帝從祖昆弟高帝十一年封為營陵侯高后時齊人田生以畫干營陵侯澤澤大悅之用二百斤金為壽田生已得金假大宅令其子求事呂太后所幸大謁者張卿居數月請張卿酒酣乃屏人説張卿曰太后欲立呂産為王恐大臣不聽今卿最幸大臣所敬何不諷大臣以聞太后太后必喜諸呂已王萬戶侯亦卿有卿大然之乃諷大臣立産呂産為王田生因説張卿曰呂産王也諸大臣未服今營陵侯澤諸劉長為大將軍尚觖音決望今卿言太后裂十縣王之彼得王喜於諸呂益固矣張卿入言太后乃以澤為琅琊王又曰齊哀王襄悼惠王子高祖孫也太尉周勃誅諸呂大臣欲立齊王琅琊王澤曰齊王母家駟鈞惡戾虎而冠者張晏曰言鈞惡戾如虎而著冠也方以呂氏幾亂天下又立齊王是復為呂氏也漢書曰吳王濞高帝兄仲之子也高祖立濞於沛為吳王已拜受印高祖召濞相之曰若狀有反相因撫其背曰後五十年東南有亂豈若耶天下同姓一家汝慎無反濞頓首曰不敢又曰楚元王交高帝少弟也高祖即帝位交與廬綰常侍上出入臥內傳語言諸內事隱謀文帝尊寵元王子爵比皇子又曰齊悼惠王肥其母高祖微時外婦也高祖六年立食七十餘城孝惠二年入朝帝與齊王燕飲后前置齊王上坐如家人禮太后怒遣人酌巵鴆酒置前令齊王為壽齊王起帝亦起欲俱為壽太后恐自起反巵齊王怪之因不敢飲陽醉而去又曰濟北王興居初以東牟侯與大臣共立文帝於代邸曰誅呂氏臣無功請與太僕滕公入清宮遂將少帝出迎皇帝入宮始誅呂氏時朱虛侯功尤大大臣許盡以趙地王朱虛侯章盡以梁地王東牟興居及孝文帝立聞朱虛東牟之初欲立齊王故黜其功又曰淮南王安為人好書鼓琴不喜弋獵狗馬騁馳亦欲行陰德撫循百姓流譽招致賓客方術之士數千人作為內書二十篇外書甚衆有中篇八卷言神仙黃白之術張晏曰黃黃金白白銀亦二十萬言時武帝方好藝文以安屬為諸父辨博善為文辭甚重尊之每為報書及賜張晏曰賜賜書常召司馬相如等視草乃遣初安入朝獻所作內篇新出上愛祕之使為離騷賦旦受詔食時上又曰孝文皇后生景帝梁孝王孝王太后少子愛之賞賜不可勝道於是孝王築東苑方三百餘里廣睢陽城七十里大治宮室為復道自宮連屬於平臺三十餘里如淳曰在梁東北離宮所在也得賜天子旌旗從千乘萬騎出稱蹕入言警擬天子招延四方豪傑自山東遊士莫不至又曰梁懷王揖文帝子也文帝愛之異於他子五年一朝因墮馬死又曰孝景栗姬生河間獻王德孝景二年立修學好古從民間得善書必為好寫與之留其本加金帛賜以招之繇是四方道術之人不遠千里或有先祖舊書多奉以奏獻王者故得書多與漢朝等修禮樂被服儒術造次必於儒者武帝時獻王來朝獻雅樂及詔策問三十餘事其對推道術而言得事之中文約而指明又曰江都易王非景帝子吳楚反時非年十五有材氣上書願擊吳景帝賜非將軍印吳已破二歲為江都王治吳故國以軍功賜天子旌旗元光五年胸奴大入漢為賊非上書願擊胸奴上不許又曰孝景程姬生魯恭王餘二年立為淮陽王吳楚反破後徙王魯好治宮室苑囿狗馬好音樂口吃難言王初治室壤孔子舊宅以廣宮室聞鍾磬琴瑟之聲遂不敢復壞於其壁中得古文經傳又曰孝景賈夫人生中山靖王勝建元三年來朝天子置酒勝聞樂聲而泣帝問其故勝對曰臣聞悲者不可為纍欷思者不可為歎息故高漸離擊築易水上荊軻為之泣而不食雍門子一微吟孟嘗君為之於邑今臣之心結日久每聞窈眇之聲不知涕泣之橫集也夫衆煦漂山應劭曰煦吹煦聚蚊成雷朋黨執虎十夫橈椎臣身遠與寡莫為之先衆口鑠金積毀銷骨聚輕折軸羽翮飛肉今臣雍閼不得竊自悲也臣聞杜鼷不歡屋鼠不燻何則所託者然也臣雖薄也得蒙肺腑位雖卑也得為東藩屬又稱兄今群臣非有葭莩之親張晏曰葭蘆果業莩裏白皮也鴻毛之重群居黨議明友相為使夫宗室擯卻骨肉冰釋斯伯奇所以流離比干所以橫分也勝又樂酒好肉有子百二十餘人常與趙王彭祖相非曰兄為王專代吏治事王者當日聽音樂御聲色趙王亦曰中山王但奢淫不佐天子拊循百姓何以稱為藩臣又曰景帝唐姬生長沙定王發唐姬故程姬侍者景帝名程姬有所避不願進而飾侍者唐兒使夜進上醉不知幸之遂有身及生子因名曰發以母微無寵故王居卑濕貧國應劭曰景帝後二年諸王來朝有詔稱爵歌舞定王但張袖小舉手左右嗟其拙上怪而間之對曰臣國小地狹不足回旋帝以武陵桂陽屬焉又曰孝武李姬生燕剌盧達切王旦為人辨略博學經書及衛太子敗齊懷王又薨旦自以次弟當立上書求入宿衛上怒下其使獄遂立少子為太子帝崩太子立是為孝昭帝賜諸侯王璽書旦得書不肯哭霍光秉政褒賜燕王錢三萬益封萬三千戶因怒曰我當為帝何賜也多齎金寶走馬賂遺蓋古盍切主上官桀及御史大夫桑弘羊等皆與交通數記疏光過失與旦令上書告之桀欲從中下其章旦聞之喜上疏是時昭帝年十四覺其有詐桀等皆伏誅旦聞之憂悶音悶置酒萬載宮會賓客臣妾坐飲王自歌曰歸空城兮狗不吠雞不鳴橫術何廣廣兮蘇林曰廣音曠瓚以術為道路固知國中之無人華容夫人起舞曰髮紛紛兮置渠骨籍籍兮亡居母求死子兮妻求死夫俳佪兩渠間兮君子獨安居坐者皆泣又曰孝武李姬生廣陵厲王胥倡樂逸遊故終不得為漢嗣始昭帝時胥見上年少無子有覬欲心迎女巫李女須使下神祝詛女須泣曰孝武帝下我左右皆伏言吾必令胥為天子胥多賜女須以錢會昭帝崩胥曰女須良巫也殺牛塞禱及昌邑王徵復使巫祝詛之後王廢胥寢信女須等宣帝即位胥曰太子孫何以反得立復令女須祝詛如前又胥女為楚王延壽后弟婦相餽音匱遺通私書後延壽謀反誅辭連及胥又聞漢立太子謂姬南等曰我終不得立矣居數月祝詛事發覺有司桉驗天子遣廷尉大鴻臚即訊胥胥既見使者還置酒顯陽殿召太子霸及子女董訾胡生等夜飲使所幸八子郭昭君家人子趙左君等鼓瑟歌舞王自歌曰欲人生兮無終長不樂兮安窮奉天期兮不得須臾千里馬兮駐待路黃泉下兮幽深人生要死兮何為苦心何用為樂心所喜出入無悰為樂亟蒿里召兮郭門閲死不得取代庸身自逝左右悉更涕泣奏酒至雞鳴時罷胥讓太子霸曰上遇我厚今負之甚我死骸骨當暴幸而得葬薄之無厚也即以綬自絞死又曰淮陽憲王欽宣帝子好經書法律聰達有才帝甚愛之數嗟歎憲王曰真我子也又曰初楚元王敬禮申公等穆生不嗜酒元王每置酒常為穆生設醴也又曰王尊為東平相東平王以至親驕奢不奉法度傅相連坐及尊視事奉璽書至庭中王未及出受詔尊持璽書歸舍食已乃還致詔後謁見王太傅在前説相鼠之詩尊曰母持布鼓過雷門王怒起入後宮復延請登堂尊謂王曰尊來為相人皆弔尊也以尊不容朝廷故見使相王耳天下皆言王勇王顧但負貴安能勇如尊乃勇耳王變色視尊意欲格殺之即好謂尊欲願觀相君佩刀尊舉掖顧謂傍侍郎前引佩刀視王王欲誣相拔刀嚮王耶王又雅聞尊高名大為尊屈酌酒具食相對極歡東觀漢記曰東平獻王蒼少有孝友之質寬仁弘雅明帝即位詔以為驃騎將軍位在三公上四年蒼上願朝上以王觸寒涉道使中謁者賜乘輿豹裘蒼到洛陽使鴻臚持節郊迎引入不在讚拜之位升殿乃拜上親答拜諸王歸國上特留蒼八月飲酎畢大鴻臚奏遣蒼蒼發上親臨送流涕賞賜以億萬數又曰明帝詔書示諸國曰詔問東平王蒼處家何等最樂王對云為善最樂帝曰其言甚大稱是腰腹蒼美鬢髯腰帶圍八尺二寸又曰北海靖王興每朝廷有異政京師雨澤秋稼好醜輒乘驛馬問焉其見親重如此又曰廣陵思王荊性刻急隱害喜文法有才能中元二年世祖崩不悲哀而作飛書與東海王強説之令舉兵為逆亂強得荊書即執其行書者封上之以親親隱其事遣荊止河南宮又曰明德后詔書流布咸稱至德王主諸家莫敢犯禁廣平巨鹿樂成王在邸入問起居帝望見車騎鞍勒皆純墨無金銀綵飾馬踰六尺於是以白太后即賜錢各五百萬於是施親戚被服自如范曄後漢書曰沛獻王輔矜嚴有法度好經書善説京氏易孝經世號之曰沛王通論在國謹節終始如一稱為賢王顯宗敬重數賞賜焉又曰琅琊孝王京建武十七年追爵為王京性恭孝好經學顯宗尤愛幸賞賜恩寵殊異莫以為比光烈皇后崩帝悉以太后遺金財寶賜京京都莒好治宮室窮極伎巧皆飾以金銀上詩賦頌德帝嘉美下之史官又曰樂成靖王黨永平十五年封樂成王黨聰慧善史書如正文字與肅宗同年尤相親愛又曰清河王慶為太子竇后諷有司奏廢慶慶時雖幼而知避嫌畏禍言不敢及宗氏帝更憐之勑皇后令衣服與太子齊等慶小心恭孝自以廢黜尤異事慎法每朝謁陵廟常夜分嚴裝衣冠待明約勑官屬不得與諸王車馳常以貴又葬禮有闕每竊感恨至四節臘輒祭於私寢竇氏誅後始使乳母於城北遙祠及竇太后崩慶求上冢致哀帝許之詔大官四時給祭慶垂涕曰生雖不獲供養終得奉祭祀私願足矣又曰李燮字德公靈帝時拜安平相先是時安平王續為張角賊所略國家贖王還欲復其國燮奏曰續在國無守蕃政不稱損辱聖朝不宜復國續竟歸蕃燮以謗毀宗室輪作佐校未滿歲王果坐不道被誅乃貴燮為議又曰董卓置弘農王於閣上使郎中令李儒進鴆曰服此藥可以辟惡王曰我無疾是欲殺我耳乃與妻唐姬宮人飲宴別王悲歌曰天道易兮我何如棄萬乘兮退居蕃逆臣見迫兮命不延逝將去汝兮適幽玄因令唐姬起舞姬枕袖而歌曰皇天崩兮后土頽身為帝王兮命天摧死生路異兮從此乖奈我煢獨兮心中哀因泣下嗚咽王曰卿王者妃勢不復為臾民妻自愛從此長辭遂飲鴆死時年十八漢名臣奏曰杜業奏曰河間獻王經術通明積德纍行天下雄駿衆儒皆歸之孝武帝時獻王朝武帝色難之謂獻王曰湯以七十文王百里王其免之知其主意即縱酒聽樂因以終也漢雜事曰中元二年光武崩王莽之亂國無制度皇太子與諸王同席坐尊卑無別是時上下莫之是正太尉趙喜乃正色橫劍殿階扶下諸王以明尊卑魏略曰任城王彰字子文武帝子也太子嗣立既葬遣彰之國如彰自以先王見任有功冀因此見授用而聞當隨例意甚不悅不待遣而去時以鄢陵瘠薄使治中牟及帝受禪因封為中牟王是大駕幸許昌北州諸使上下畏其剛嚴每過中牟不敢不速又曰趙王朝干一名良良本陳妾子良生而陳氏死太祖令王夫人養之良年五歲而太祖疾因遺令語太子言此兒三歲亡母五歲失父以纍汝太子由是親待隆於諸弟良年小常呼文帝言阿翁帝言良曰我汝兄耳愍甚如是每為涕淚
