body:
  text: 人事部一百一十六待士毛詩曰鹿鳴燕群臣嘉賓也既飲食之又實幣帛筐篚以將其厚意然後忠臣嘉賓得盡其心矣家語曰孔子喟然歎曰向使銅鞮伯華無死天下其定矣子路曰由願聞其人子曰其幼也敏而好學其壯也有勇而不屈其老也有道而能下人有此三者以定天下何難乎子路曰幼而好學壯而有勇則其可也若夫有道誰下哉子曰由汝不知也吾聞以衆攻寡無不克也以貴下賤無不得也昔者周公居冢宰之尊制天下之政猶下白屋之士白屋草舍日見百七十人斯豈以無道也欲得士之用也惡有有道而無天下君子者乎戰國策曰管燕得罪齊王謂其左右曰子孰能與我赴諸侯乎左右莫對管燕漣然流涕曰悲夫士何為其易得而難用也田需對曰士三食不得厭而君鵝鶩有餘食下宮蹈羅紈曳綺縠而士不得以為緣且財者君之所輕死者士之所重君不肯以所輕與士而責士以所重事君非士易得而難用也又曰孟嘗君舍人有與君夫人相愛者或以聞孟嘗君曰覩貌相說者人之情也勿言君暮年乃召愛夫人者而謂曰之子與文遊久矣大官未可得小官公不欲衛君與文布衣之交請具車馬皮幣願公以此從衛君遊衛君欲約兵攻齊是以謂衛君曰孟嘗君不知臣不肖以臣欺君今君約天下之兵攻齊是足下欺孟常君也願君勿以齊為心如不聽臣臣血湔足下襟衛君乃止又曰中山之君所傾蓋輿車而朝窮閭隘巷之士者七十家史記曰西伯敬老慈少禮下賢者日中不暇食以待士伯夷叔齊太顛閎夭宜生之徒皆歸之又曰齊宣王喜文學遊說之士如鄒衍淳于髡之徒七十六人皆賜第上大夫是以齊稷下學士復盛又曰帝召田橫乃與其客二人乘傳詣雒陽未至戶鄉廄置橫謝使者遂自刎令客奉其頭從使者奉之高帝拜二客為都尉以王禮葬橫二客穿其冢旁孔自刎下從之海中五百人聞橫死皆自殺於是乃知田橫兄弟能待士也又曰孟嘗君在薛招致諸侯賓客及亡人有罪者皆歸孟嘗君孟嘗君舍業厚遇之以故傾天下之士食客數千人無貴賤一與之等孟嘗君待客夜食有人蔽火光客怒以飯不等輟辭去孟嘗起自取其飯比之客慚自剄又曰信陵君為人仁而下士士無賢不肖皆謙而禮交之不敢以其富貴驕士士以此方數千里爭歸之又曰鄒陽上書梁王曰蘇秦相燕燕人惡之於王按劍而怒食以駃騠白圭顯於中山人惡之魏文侯投以夜光之壁何則兩主二臣剖心折肝相信豈移於浮辭哉又曰周公曰我一沐三握髮一飯三起以待士猶恐失天下之賢人也漢書曰司馬遷云愚以為李陵素與士大夫絶甘分少能得士死力雖古名將不能過也又曰班伯為定襄太守至請問耆老父母故人有舊恩者迎延滿座嘗曰為供具執子孫禮又曰朱博好樂士大夫為郡守九卿賓客滿門欲仕宦者舉薦之欲報仇怨者解劍以帶之其趨待士如是博以此自立然終用敗又曰鄭當時為太子舍人每五日洗沐常置驛馬長安諸郊請謁賓客夜以繼日已具遊俠部又曰鄭當時遷大司農戒門下客至無貴賤無留門者執賓主之禮以其貴下人東觀漢記曰竇固為奉車都尉與附馬都尉耿秉等北征胸奴遂滅西城開通三十六國在邊數年羌胡親愛之炙肉未熟人人長跪前割血流指間進之於固固輒為噉不穢賤也是以親之如父謝承後漢書曰皇甫嵩為三公以身起於汗馬常折節下士也魏書曰劉平結交剌備備不知而待客甚厚客以狀語之而去是時人民飢饉屯藂抄略備外禦寇難內豐財施士之下者必與同席而坐同簋而食無所簡擇衆多歸焉蜀志曰曹公還許先主為左將軍禮之逾重出同輿坐同席又曰董允嘗與尚書令費禕中典軍胡濟等期遊宴嚴駕已辨而郎中董恢詣允修敬恢年少官微見允停出逡巡求去允不許曰本所以出者欲與同好遊談也今君已自屈方展闊舍此之談就彼之宴非所謂也乃命解禕等罷駕不行其守正下士凡此類也吳志曰顧邵當之豫章發在近路會張景病時送者百數邵辭賓客曰張仲節有疾若不能來別恨不見之暫還與訣諸君小相待其留心下士唯善所在皆此類也王隱晉書曰王渾玄仲平吳後據兩州吳人新附皆有畏懼之心渾撫循羈旅勞謙接納坐無空席門不停賓於是江東諸士莫不敬愛宋書羊欣嘗詣領軍將軍謝混混拂席改服然後見之時混族子靈運在坐退告族兄瞻曰將軍見羊欣遂易衣改席欣由此益知名王智深宋紀曰謝景仁嘗請高祖高祖乃命召景仁弟述時為豫州主簿不從高祖遂輟箸不食須述至乃餐其見重如此後魏書曰陸馥為相州刺史假長廣公為政清平抑強扶弱州中有德宿老名望素重者以禮待之詢之政事責以方略如此者十人號曰十善又簡取縣強明百餘人以為假子誘接殷勤賜以衣服令各歸為耳目於外於是發姦擲伏事無驗百姓以為神明又曰賈思伯性謙和傾身禮士雖在街途停車下馬接誘恂恂曾無倦色客有謂思伯曰公今貴重寧能不驕伯曰衰至便驕何常之有當時以為雅言唐書李勉禮賢下士終始盡心以名士季巡張參為判官卒於幕三歲之內每遇宴飲必設虛位於筵次陳膳執酹辭色悽惻論者美之又曰裴度以平賊報國為己任自德宗朝宰相歸私第百官不敢及門度以方討不庭宰臣宜日接多士冀有所得因奏請私家通賓客上方屬意遂許之四方布衣盡得以策畫干丞相至今宰臣私接士因度之請也又曰楊炎樂賢下士以汲引為己任天下士子趍嚮風從皇甫謐逸士傳曰公儀潛魯人也少而厲行樂道不事諸侯與子思友魯穆公聞其賢因子思而致命欲以為相謂子思曰公儀子必輔寡人寡將三分魯國而與之晉諸公讚曰張華博識多聞無物不知盧浮高朗經傳有美於華起家為太子舍人病疽截手遂廢朝廷重之就以為國子博士高閭燕志曰李陵君長谷之東先主與高雲遊宴往來每憩其家陵與其妻王氏每夜自齎酒饌而至晏子春秋曰晏子之晉至中牟覩幣冠衣裘負芻息於途側晏子問曰何者對曰我越石父也不免飢凍為人臣僕晏子解左驂贖之載以俱歸崔鴻國春秋後秦録曰太尉文成公姚顯字於章興之弟也清秀明發文武兼才為令録十餘年無粃改機務之暇賓客如雲謙虛傳受待士以布衣之禮或昏夜靜處與賢士談論政事王孫子新書曰楚莊王攻宋廚有臭肉樽有敗酒將軍子重諫曰今君廚有肉臭而不可食樽有酒敗而不可飲三軍之士皆飢色欲以勝敵不亦難乎說苑曰趙簡子遊於西河而樂之歎曰安得賢士而與處焉舟人古桑對曰鴻鵠高飛遠翔其所恃六翮也背上有毛腹下有毳無尺寸之數去之滿把飛不能為之高不知門下左右客千人者亦有六翮之用乎將盡毛毳新序同而稱晉平公又云三千餘人矣又曰周公日見白屋之士所下者凡七十一而天下之士皆至晏子所與同衣食者百人而天下之士亦至又曰周威王問於寧子曰取士有道乎對曰有窮者達之亡者存之疾者起之士則四方而至矣故士存則國存士亡則國亡子胥怒而亡之包胥怒而存之胡可不貴乎俗說曰謝萬詣簡文萬來無衣幘可前簡文曰但前不須衣幘即呼使入萬著白綸巾鵠氅裘履板而前既見共談移日大器之漢雜事曰于定國謙遜下士士雖貧徒步往過皆與均禮又曰公孫弘為丞相起客館開閣延賢人與參謀議身自食脫粟飯一器盡以俸祿與故人賓客又曰倪寬為人卑體下士務在得人心擇用仁孝推誠與下不求名譽英雄記曰袁紹有姿貌威容愛士養名既纍世台司賓客所歸加以傾心折節莫不爭赴其庭士無貴賤與之抗禮環濟吳記曰孟仁少以敏達知名從南陽李恭學其母賢而有智為作大被或問其故母曰小兒無德以致客學者多貧故為大被庶可得氣類相接也黃石公記曰黃梁昔將用兵人有饋一簞醪者使投之於河令將士迎而飲之夫一簞醪不能味一河水三軍思為之死非滋味及之也劉向新序曰燕相得罪於君將出亡召門下諸大夫曰能從我出乎三問莫對燕相曰士之不足養也有進者曰飢年惡歲士糟糠不足而君之犬馬有餘穀隆冬冽寒士短褐不完而君之臺觀帷簾錦繡自若財者君之所輕死者士之所重也君不能施君之所輕而求得士之所重難焉鬻子曰吾不恐四海之士留於道路也吾恐其留門庭是以四海之士皆至莊子曰子張見魯哀公不禮士也託僕夫而去曰臣聞君好士故不遠千里以見君君之禮士也有似葉公子高之好龍室雕文盡寫以龍於是天龍而下之窺頭於牖拖尾於堂葉公見之棄而還走失其魂魄五色無主是葉公非不好龍也好夫似龍而非龍也今君非不好士也好夫似士而非士者也新序同呂氏春秋曰張儀將西遊於秦過東周客有語之於昭文君者曰張儀壯士也將西遊於秦願君之禮貌之昭文君見謂之曰寡人國雖小請與客共之張儀還北面再拜淮南子曰楚時子發好求伎道之士士有術者無不養楚有善為偷者往見曰臣楚市偷也願以伎該一卒該備也一卒一人後無幾何齊興兵伐楚於是市偷進請曰臣有薄伎願為君行之子發曰諾不問其辭而遣之偷則夜出解齊將軍之帷而獻之子發因使人歸之曰卒有出採薪者得將軍之帷謹歸之於執事明夕復往取其枕子發又使歸之明夕復因取簪又使歸之於是齊師大駭將軍與軍吏謀之曰今夕不去楚軍恐取吾首即還師而去故伎無細薄在人君用之又曰淮南王安養士數千人其中高才八人蘇非李南左吳陳田伍被雷被毛被晉昌號為八公燕丹子曰荊軻之燕太子自御虛左荊軻援綏不讓後日與軻之東宮臨池而觀軻拾瓦投龜太子令人奉槃金軻用抵龜盡而復進軻曰非為太子愛金也臂痛耳後共乘千里馬軻曰聞千里馬肝美太子即殺馬進肝暨樊將軍得罪於秦秦求之急乃來歸太子為置酒陽華之臺酒中太子出美人能琴者軻曰好手太子即進之軻曰但愛其手太子即斷其手盛以玉盤奉之太子常與軻等案而食同床而寢呂氏春秋曰勾踐苦會稽之恥欲深得民心以致必死於吳有甘肥不足分弗敢食有酒流之江與民同之韓子曰吳起出遇故人而止之食故人曰諾故人至暮不來吳起至暮不食而待之孫子曰楚莊王攻宋有酒投之水有食饋之賢行軍中之有飢色者加賜之
