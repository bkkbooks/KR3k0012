body:
  text: 居處部十四廚說文曰廚庖屋也易曰庖有魚義不及賓也毛詩大庖不盈禮記玉藻曰君子遠庖廚凡有血氣之類弗身踐也又田獵之禮一為乾豆二為賓客三為充君之庖漢書賈誼曰其禽獸見其生不忍見其死聞其聲不忍食其肉故遠胞廚所以長恩且明有仁也後漢書禰衡到許都人問荀文若趙稚子云何趙為蕩寇將軍見魏志衡曰文若可使借面吊喪稚長可監廚請客典略曰衡見荀儀容但有貌耳故可吊喪趙有腹健啖肉故可監廚也七賢傳曰阮籍以步兵廚中有美酒求為步兵校尉司馬相如上林賦曰庖廚不徙後宮不移古詩曰左顧敕中廚竈禮有五祀竈居一焉月令孟夏其祀竈祭先肺陽氣盛熱外祀之於竈從熱類也禮臧文仲燔柴於竈者竈者老婦之祭也盛於盆尊於鉼非所柴也文仲焉知禮禮庶人立一祀或立戶或立竈論語王孫賈曰與其媚於奧寧媚於竈史記孫臏救韓入魏為十萬竈明日為五萬竈又明日為三萬竈龐涓經三日大喜曰我固知齊人怯入吾地三日士卒亡者過半遂逐之又曰李斯曰竈上騷除萬世一時也騷音掃漢書李少君言祀竈皆可致神物而丹砂可化為黃金黃金成以為器以食則益壽壽益則海中蓬萊仙者乃可見之封禪則不死黃帝是也天子親祀竈焉又曰初霍氏奢侈茂陵徐生曰霍氏必亡夫奢則不遜不遜必侮上侮上逆道也在人之右眾必害之也霍氏秉權日久害之者多矣天下害之而又行以逆道不亡何待乃上䟽言霍氏太盛陛下即愛厚之宜以時抑制無使至亡書三上輒不報聞其後霍氏誅滅而告霍氏者皆封人為徐生上書曰臣聞客有過主人者見其竈直突傍有積薪客謂主人更為曲突遠徙其薪不者且有火患主人不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝其人灼爛者在於上行餘各以次不錄言曲突者人謂主人曰鄉使聽客之言不費牛酒終亡火患今論功而請賓曲突徙薪亡恩澤燋頭爛額為上客主人迺寤而請之茂陵徐福數上書言霍氏且變宜防絕之鄉使福說行則國亡裂土出爵之費臣亡逆亂誅滅之敗往事既已而福不蒙其功唯陛下察之貴徙薪曲突之策使居焦髮灼爛之右上迺賜福帛千疋後以為郎又曰息夫躬祠竈人見之告呪詛遂棄市又曰昭帝時燕王宮豕出圂胡困切壞都竈注都竈注都竈蒸炊之大竈也劉向以為豕禍後漢書李南女曉術為由拳縣人妻晨詣竈室卒有暴風婦上堂從姑求歸辭其二親姑不許乃跪而泣曰家世傳術疾風起先吹竈突及井此禍為婦女主爨者妾將應之因著其亡日乃聽還家如期病卒又曰更始李軼朱鮪擅命山東王匡張印橫暴三輔其所與官爵皆群小賈豎或有膳夫庖人多著繡面衣錦袴襜褕諸子駡詈道中長安為之語曰竈下養中郎將爛羊頭關內侯又曰虞詡為懷令後羗寇武都鄧太后以詡有將帥之略遷武都太守引見嘉德殿厚加賞賜羗乃率眾數千遮詡於陳倉崤谷詡即停軍不進而宣言上書請兵須到當發羌聞之乃分鈔傍縣詡因其兵散日夜進道兼行百餘里令吏士各作兩竈日增倍之羌不敢迫或問曰孫臏減竈而君增之兵法日行不過三十里以戒不虞而今日行二百何也詡曰虜眾多吾兵少徐行則易為所及速過則彼所不測虜見吾竈日增必謂郡兵來迎眾多行速必憚追我孫臏見弱吾今示強勢有不同故也又曰向栩性不恒又似狂坐於竈北板屋上又曰張忠署孫賓為主簿遂祭竈請比鄰又曰陰識之子方臘日晨炊而竈神見殺黃羊因祀之三世繁昌遂常以臘日祭也戰國策曰智伯攻晉陽城城不沉者三板洎竈生蛙懸釜而炊魯連子曰一井五鉼洩可立待一竈五突烹飪十倍分煙者眾淮南子曰黃帝作竈死為竈神莊子曰仲尼讀春秋老聃踞竈觚而聽觚竈額也又曰陽子居南郭之沛老聃西遊於秦邀還於郊至於梁而遇老子中道仰天而歎曰始以汝為可教今不可也陽子居不荅至舍進盥漱巾櫛脫屨戶外膝行而前日向者弟子欲請夫子夫子行不閑是以不敢問今閑矣請聞其過老子曰而睢睢盰盰而誰與居大白若辱盛德若不足陽子居蹴然變容曰敬聞命矣其往也舍者迎將家公執席妻執巾櫛舍者避席焬者避竈其反也舍者與之爭席矣宜都縣記曰宜都山絕崖壁立數百丈有一火燼插在崖間望可長數尺傳云堯洪水人泊船此旁爨餘留之故曰插竈崖萬畢術曰竈神晦日歸天白人罪夢書曰竈主食夢者得食李尤竈銘曰燧人造火竈能以興竇周禮考工記曰宮中之竇其崇三尺左傳曰蓽門圭竇之人皆凌其上又曰有渦氏滅夏立相后緍方娠逃出自竇晉書阮逸避亂依胡母輔之初至屬輔之與謝鯤阮放畢卓羊曼桓彝阮孚散發裸袒閉室酣飲已累日逸將排戶入守者不聽逸便於戶外脫衣露頭於狗竇中窺之而大叫輔之驚曰他人決不能爾必我孟祖也遽呼入遂與飲不捨晝夜時人謂之八達家語曰子羔為衛之士師刖人之足衛有蒯聵之亂子羔逃至郭門刖者守焉謂子羔曰彼有缺子羔曰君子不踰又曰彼有竇子羔曰君子不隧又曰彼有室子羔入焉追者罷子羔乃去廁廣雅曰清溷屏廁也說文曰廁清也釋名曰廁言人雜廁在上非一也或曰溷濁也或曰清至穢宜常脩治使清潔儀禮曰隸人溫廁溫塞也為人復往褻也左傳曰晉侯將食麥如廁陷而卒史記曰朱虛侯入未央宮遂擊呂產產走天風大起從官亂莫敢鬥遂殺產於郎中府吏廁中又曰范睢事魏中大夫須賈賈為魏昭王使於齊睢從齊襄王聞睢辯有口才乃使人賜睢金十斤及牛酒須賈以睢持魏陰事告齊故睢獨得此饋心怒歸以告魏相魏齊齊使人笞擊睢折脅折齒睢佯死卷以置廁中賓客飲者醉更溺睢以懲後無妄言者又曰李斯者楚之上蔡人也少時為鄉小吏見吏舍廁中鼠食不絜近人犬數驚恐之斯入倉觀倉中鼠食積粟居大廡下不見人犬之憂於是李斯乃嘆曰人之賢不肖譬如鼠矣在所自處耳乃從荀卿學帝王之術又曰萬石君長子建老白首萬石君尚無恙建為郎中令每五日洗沐歸謁親入子舍竊問侍者取親中裙廁牏身自浣滌徐廣曰牏築垣短版也音注廁牏謂溷垣牆隱於其側而浣滌也一謂牏竇言建又自洗盪廁竇廁竇寫除穢污之穴也呂靜曰楲窬褻器音威豆復與侍者不敢令萬石君知以為常又曰趙襄子滅智伯其臣豫讓遁逃山中曰嗟乎士為知已者死女為說己者容今智伯知我我必為報讎而死以報智伯則吾魂魄不媿矣乃變名姓為刑人入宮塗廁中挾匕首欲以刺襄子襄子如廁心動執問塗廁之刑人豫讓內持刃兵曰欲為智伯報仇左右欲誅之趙襄子曰彼義人也吾謹避之耳且智伯亡無後而其臣欲為報仇此天下之賢人也卒釋去之又曰大將軍衛青侍中上據廁而視之注溷廁也漢書郅都侍上賈姬如廁有野彘入廁上目都擊之都不往上欲自行都伏諫曰一姬死復一姬進上雖自輕奈太后宗廟何太后聞之賜都金晉書王戎惠帝反宮以戎為尚書令既而河間王顒遣使說成都王潁將誅齊王冏檄書至冏謂戎曰孫秀作逆天子幽偪孤紏合義兵掃除元惡臣子之節信著神明二王聽讒造構大難當賴忠謀以和不協卿善為我籌之戎曰公首舉義眾定大業開辟已來未始有也然論功報賞不及有勞朝野失望人懷貳志今二王帶甲百萬其鋒不可當若以王就第不失故爵委權崇讓此求安之計也冏謀臣葛旟怒曰漢魏以來王公就第寧有得保妻子乎議者可斬於是百官震悚戎偽藥發墯廁得不及禍又曰郭璞素與桓彝友善彝每造之或值璞在婦女間便入璞曰卿來他處自可徑前但不可廁上相尋耳必客主有殃彝後因醉詣璞正逢在廁掩而觀之見璞躶身被髮銜刀設醊璞見彝撫心大驚曰吾每屬卿勿來反更如是非但禍吾卿亦不免矣天實為之將以誰咎璞終嬰王敦之禍彝亦死蘇峻之難魏氏春秋曰許允為鎮北將軍未發徙樂浪允善相印將拜印以不善更刻大如此者三允曰印雖好而已被辱問送印者果懷之而墜于廁幽明錄曰建德民虞敬上廁輒有一人授草手內與之不覩其形如此非一過後至廁久無送者但聞戶外鬥聲窺之正見死奴與死婢爭先進草奴適在前婢便因後撾之由此輒兩相擊食頃敬欲出婢奴陣勢方未已乃厲聲叱之奄如火滅自是遂絕又曰阮德如嘗於廁見一鬼長丈餘色黑眼大著皂單衣平上幘去之咫尺德如心安氣定徐喚而語之曰人言鬼可憎果然桓譚新論曰博士弟子譚生居東寺連三夜有惡夢以問人教使晨起廁中說之三旦而人告以為呪咀捕治數日曹毗曰杜蘭香戒張碩不宜露頭上廁夜行必燭若脫誤當跪拜謝周景式孝子傳曰管寧避地遼東經海遇風船人危懼皆叩頭思過寧思惟無愆念常如廁不冠即便悔過海風尋止異苑陶侃曾如廁見數十人悉持杖有一人著平上介幘自稱後帝云君長者故出相見襄沔記蜀先主之依劉表起至廁見髀裹生肉慨然流涕還坐表怪問之備曰平常身不離鞍髀肉皆消今不復騎髀裹生生日月若馳老將至矣而功業不建是以悲耳表雖重備因此欲取備備覺偽如廁潛遁出所乘馬名的鸕從襄陽城西檀溪水中而渡被溺不得出備既急乃曰的鸕今日危矣可不弩力乎的鸕乃一踴三丈遂得過溪而去神仙傳曰淮南王安謁仙伯坐起不恭主者奏安不敬讁守廁三年抱朴子內篇曰河東項曼都入山學仙十年而歸家問其故曼都曰在山中仙人乘龍迎我上天先過紫府金床玉几真貴處也仙人以流霞柸飲我輒不死不飢渴昔淮南王事天帝有失行謫之守廁矣吾何人哉語林曰劉寔詣石崇如廁見有絳文帳茵縟甚麗兩婢持錦囊寔遽退笑謂崇曰向誤入卿室崇曰是廁耳寔更往向乃守廁婢所進錦囊是籌良久不得便行出謂崇曰貧士不得此廁乃如他廁又曰石崇廁常有十餘婢侍列皆佳麗藻飾置甲煎沉香無不畢備又與新衣客多不能著王敦為將軍年少往脫故衣著新衣氣色傲然群婢謂曰此客必能作賊世說王大將軍敦初尚主廁見漆箱中盛乾棗本以塞鼻王謂廁上下菓食遂至盡既還婢擎金澡盤盛水瑠璃椀盛澡豆敦自倒著水中而飲之謂之乾飯群婢掩口而笑之
