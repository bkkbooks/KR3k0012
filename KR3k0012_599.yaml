body:
  text: 文部十四符説文曰符信也漢制以竹長六寸分而相合釋名曰符付也書所勑命於上付使傳行之文心雕龍曰符者孚也徵召防偽事資中孚三代玉瑞漢世金竹末代從省代以書翰矣史記曰秦昭王破趙長平又進圍邯鄲魏昭王之子無忌號信陵君其姊為趙惠文王弟平原君夫人平原君數遺公子書請救於魏魏王使將軍晉鄙將十萬衆救趙實持兩端以觀望平原君使者相屬謂公子曰今邯鄲旦暮降秦魏救不至獨不憐公子姊也公子患之過侯嬴問屏人語曰嬴聞晉鄙兵符常在王臥內而如姬最幸力能竊之嬴聞如姬父為人所殺公子使客斬其仇頭敬進如姬姬為公子死無所辭公子誠一開口以請如姬姬必許諾公子從其計如姬果盜晉鄙兵符與公子遂矯魏王令奪晉鄙兵進擊秦秦軍遂解又曰呂不韋説華陽夫人請立子楚夫人然之承太子問從容言子楚質於趙者絶賢來往者皆稱譽之乃涕泣曰妾幸得充後宮不幸無子願得子楚亡以為嫡嗣以託妾身安國君許之乃與夫人刻玉符約以為嫡漢書曰文帝二年九月初與郡守相為銅虎竹使符應邵曰銀虎符第一至第五國家當發兵遣使者郡合符符合及聽之竹使以箭五枚長五寸鐫刻篆書第一至第五張晏曰符以代古之圭璋從簡易終軍從濟南嘗詣博士步入關關吏與軍繻張晏曰繻音須繻符書帛裂而分之臣瓚以為漢出入關用傳猶今之過所軍棄繻而去後為使建節出關關吏識之曰此使者乃前棄繻生也後漢書曰初禁網尚簡但以璽書發兵未有虎符之信杜詩上疏曰臣聞兵者國之凶器聖人所慎舊制發兵以虎符其餘徵調竹使而已符竹未合會取為大信所以明著國命斂持威重也間者發兵但用璽書或以詔令如有姦人詐偽無由知覺愚以為軍旅尚興賊虜未殄徵兵郡國宜有重慎可立虎符以絶姦端昔魏之公子威傾鄰國猶假兵符以解趙圍若無如姬之仇則其功不顯事有煩而不可省費而不得已蓋謂此也書奏從之漢記曰延嘉五年長沙賊起攻沒蒼梧取銅虎符太守甘定剌史侯輔各奔出城又曰郭丹字少卿初之長安買符以入函谷關歎曰丹不乘使者車終不出關後果如本心赤眉欲立宗室以木札符書曰上將軍與兩空札置笥中大集會三老從事令劉盆子等三人居中央一人奉符以年次探之盆子最幼探得將軍三老等即皆稱臣隋書曰高祖頒青龍符於東方總管剌史西方以騶虞南方以朱雀北方以玄武又頒木魚符於總管剌史雌一雄一又頒木魚符於外官五品已上煬帝顧謂樊子蓋曰朕遣越王留守東都示以皇枝盤石社稷大事終以委公特宜持重甲五百人而後出此亦勇夫重閉之義也無賴不軌者便誅鋤之凡可以施行無勞形迹今為公別造玉麟符以代銅獸列女傳曰楚昭貞薑者齊侯之女楚昭王之夫人也昭王平王子昭王軫也昭王出遊留夫人漸臺而上之去漸臺水上之臺王聞江水大遣使者迎夫人忘持符使者至請夫人曰王召宮人皆以符令使者不持符妾不敢從使者而行使者反取反取符未還則大水至臺弛壞夫人流而死王曰唴乎夫守義死不為茍處約持信以成其貞乃號曰貞薑契券釋名曰券綣也相約束綣綣為限以別也大書中央破別之契刻也刻識其數也説文曰券契也別之書以刀刻其旁也故曰契也漢書曰高祖微時好酒及色從王媼武負貰酒時飲醉臥武負王媼見其上有怪高祖每酤留飲酒讎數倍及見怪歲竟兩家常折券棄責以簡牘為契券既不徵索故折毀之棄其所負也楚漢春秋曰高帝初侯者皆書券曰使黃河如帶泰山如礪漢有宗廟無絶世也東觀漢記曰樊重字君雲南陽人家素富外孫何氏兄弟爭財重恥之以田二頃解其忿縣中稱美推為三老年八十餘終其所假貸人間數百萬遣令焚削文契債家聞者皆慚爭往償之諸子從勑竟不肯受晉書曰諸王官司徒吏應給職使者每歲先計偕文書上道五十日宣勑使使各手書書定見破券諸送迎者所受郡別校數寫朱券為簿集上宋書曰顧綽覬之子也有私財甚豐鄉里士庶多負債覬之禁不能止及覬之為吳郡太守出文券一大廚悉令焚之宣言遠近皆不須還綽懊歎彌日唐書曰太宗時東謝渠帥來朝東謝者南蠻之別種也在黔安之東地方千里其俗無文書刻木為約又曰羅讓為福建觀察使兼御史中丞甚著仁惠有以女奴遺讓者讓問其所因者曰本某處家人兄姊九人皆為官所賣其留者唯老母耳讓慘然焚其券書以女奴歸其母夢書曰券契為有信夢得券契有信士也文心雕龍曰契者結也上古純質結繩執契今羌胡徵數負販其遺風也又曰券者束也明白約束約束以備情偽自形半分故周稱判書古有鐵券以堅信誓王褒髯奴則券之諧也戰國策曰孟嘗君使馮歡收責於薛曰責畢市吾家所寡者馮歡召民畢集以責賜民因燒其券還見孟嘗君曰君家所寡者義也臣竊矯命舍責以賜民此為君市義也魏子曰仲尼無券契於天下而德著於古今善惡明也王褒約僮曰蜀郡王子淵以事到湔上寡婦楊惠舍惠有夫時奴名便子淵倩奴行酤酒便拽大杖上家顛曰大夫買便時但要守冢不要為它人男子酤酒子淵大怒曰奴寧欲賣邪惠曰奴父訝人人無欲者子淵即決買券之奴復曰欲使皆上券不上券便不能為也子淵曰諾券文曰神爵三年正月十五日資中男子王子淵從成都安志里女子楊惠買亡夫時戶下髯奴便決賈萬五千奴當從百役使不得有二言晨起早掃食了洗滌浚渠縛落鉏園研陌杜地刻大枷屈竹作杷削治鹿盧居當穿臼縛帚栽芋鑿斗織履作鹿黏雀張鳥結網捕魚種薑養羊長育豚駒二月春分披棕種瓜作音昨瓠別茄披蔥焚槎發芋雞鳴起舂魚落三重調治馬臚滌柸整案園中柭蒜斫蘇切脯飲酒裁得染脣漬口不得傾杯覆斗用錢推紡堊敗棕索綿席買席往來都洛當為婦女求脂澤轉出旁蹉牽犬販鵝武都買茶楊氏池中掘荷入市不得夷蹲旁臥惡言醜罵棕栟櫚也皮可為繩作廬也音鑿蜀土收芋皆窖藏之至春乃發馬戶水門也蜀每落流水養魚欲食乃取之訪堊白墡地蹉市名武都縣出名茶楊氏池出好多作刀矛持入益州貨易羊牛自教精慧不得癡愚持斧入山斷輮裁轅若有餘殘當作俎几木履及彘槃焚薪作炭石礨薄岸治舍蓋屋書削代牘日暮欲歸當送乾薪兩三束四月當披九月當穫十月拔豆掄夌窖芋南安拾栗採橘持車載輳多取蒲茅蓋作繩索兩墮所無為當編蔣織薄植種桃李梨柿柘桑三丈一樹八尺為行果類相從從橫相當果熟收斂不得吮嘗犬吠當起驚告鄰里棖門柱戶上樓擊鼓持楯曳矛還落三周勤心疾作不得遨遊奴老力索種莞織席事訖休息當舂一石夜半無事浣衣當白若私錢主給賓客奴不得有姦私事當關白奴不聽教當笞一百讀券文適訖辭窮詐索仡仡叩頭兩手自縛目淚下落鼻涕長一尺審如王大夫言不如早歸黃土陌丘蚓鑽額早知當爾王大夫酤酒真不敢作惡也輮車輞也疊石竹籠盛石以薄岸也豕槃豬槽也南安縣出摽掄麥種麥也十月民輸租載輳有利也漢時官不禁報怨民家皆作高樓致其上有急則上樓擊以告邑里令救助也石崇奴券曰余元康之際至在滎陽東住聞主人公言聲大高須臾出趣吾車曰公府當怪吾家嘵嘵邪中買得一惡羝奴名宜勤身長九尺餘力舉五千斤挽五石力弓百步射錢孔言讀書欲使便病日食三斗米不能奈何吾聞公賣不公喜便下絹百匹問請吾曰吾胡王子性好讀書公府事一不上券則不為公府作券文曰取東海巨鹽東齊羝羊朝歌浦薦八板𤕷床負之安邑梨栗之鄉常山細縑趙國之編許昌之總沙房之綿作車當取高平莢榆之轂無尾髑髏之狀太良白槐之輻茱萸之輞河東亂櫛桑轅太山桑光長安雙入白烏釘鎖巧手出於上方見好弓材可斫千張山陰青槻烏嗥柘桑張金好墨過市數之蠡并市豪筆備郎寫書皞角幘道金案玉碗宜勒供筆更作多辭乃斂吾絹而歸邵氏家傳曰邵仲金好賑施年八十一臨卒取其貸錢物書券自於目前焚之曰吾不能以德教子孫不欲復以賄利纍之及貸者還錢子孫不受曰不能光顯先人豈可傷其義乎鐵券東觀漢記曰桓帝延熹八年妖賊蓋登稱太皇帝有壁二十圭五鐵券十一後伏誅晉中興書曰初閔帝在關中與氐羌破鐵券約不役使又曰應詹督天門等郡天門武陵溪蠻並反詹誅其魁帥餘皆當降自元康已來政令不洽溪蠻懷化數郡無憂其後州郡所有敗唯詹獨保之一境三國典略曰梁任果降同果字靜鸞南安人也世為方隅豪族仕於江左志在立功太祖嘉其遠來待以優禮後除始州剌史封樂安公賜以鐵券聽世傳襲又曰侯景圍臺城陳昕説范桃捧令率所領二千人襲殺王偉宋子仙帶甲歸降桃捧許之使昕夜入官城密啓梁主梁主大悅命使納之並鐫銀券賜桃捧曰事定日當封汝為河南王即有景衆并給金帛女樂以報元功而太子恐其詭詐猶預不決隋書曰李穆纍以軍功進爵為伯從太祖擊齊師於郎山太祖臨陳墜馬穆突圍而進以馬策擊太祖而詈之授以從倚潰圍俱出賊見其輕侮謂太祖非貴人遂緩之以故得免既而與穆相對泣顧謂左右曰成事我者其此人乎即令撫慰關中所至剋定擢授武衛將軍賜以鐵券恕其十死又曰越王侗立以段達為納言右翊衛大將軍攝禮部尚書王世充亦納言左翊衛大將軍攝吏部尚書元文都內史令左驍衛大將軍盧楚亦內史令皇甫無逸兵部尚書右武衛大將軍郭文懿內史侍郎長文黃門侍郎委以機務為金書鐵券藏之宮掖于時洛陽稱段達等為七貴唐書曰李懷光既解奉天之圍不獲朝見因大怒德宗遣中使諭旨加太尉賜鐵券懷光怒甚投券於地曰人臣反則賜鐵券今賜懷光是使反也上遂幸也梁洋過所釋名曰過所至關津以示之或曰傳傳也轉移所在識以為信也史記曰寧成為右內史外戚多毀成之短抵罪髡鉗是時九卿罪死即死少被刑而成極刑自以不復收於是解脫詐刻傳出關歸家漢書曰文帝十三年詔除關無用傳張晏注曰傳信也若今過所李奇曰傳棨也顏師古曰或用棨或用繒帛棨者刻木為合符魏略曰倉慈為燉煌太守胡欲詣國家為封過所廷尉決事曰廷尉上廣平趙禮詣雒治病博士弟子張策門人李臧齎過所詣洛還責禮冒名渡津平裴諒議禮一歲半刑策半歲刑晉令曰諸渡關及乘船筏上下經津者皆有所寫一通付關吏零丁齊諧記曰國步山有廟又一亭呂思與少婦投宿失婦思逐覔見天城廳事一人紗帽馮几左右競來擊之思以刀斫計當殺百餘人餘者便乃大走向人盡成死狸看向廳事乃是古始大冢冢上穿下甚明見一群女子在冢裏見其婦如失性人因抱出冢口又入抱取於先女子有數十中有通身已生毛者亦有毛腳面成狸者須臾天曉將婦還亭亭吏問之具如此答前後有失兒女者零丁有數十吏便斂此零丁至冢口迎此群女隨家遠近而報之各迎取於此後一二年廟無復靈戴良字文讓失父零丁曰敬白諸君行路者敢告重罪自為積惡致災交天困我今月七日失阿爹念此酷毒可痛傷當以重幣繒用相賞請為諸君説事狀我父軀體與衆異脊背傴僂捲如胾脣吻參差不相值此其庶形何能備請復重陳其面目鴟頭鵠頸獦狗眼淚鼻涕相追逐吻中含納無牙齒食不能嚼左右蹉似西域駱駝請復重陳其形骸為人雖長甚細材面目芒蒼如死灰眼眶曰陷如米羹柸
