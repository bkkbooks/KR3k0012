body:
  text: 治道部六貢賦上家語曰哀公問政於孔子孔子對曰政之急者莫大乎使民富且壽也公曰為之奈何孔子曰省力役薄賦斂則民富矣敦禮教遠罪戾則民壽矣又曰子貢問於孔子曰昔者齊君問政於夫子夫子曰政在節財魯君問政於夫子夫子曰政在諭臣葉公問政於夫子夫子曰政在悅近而來遠三者之問一也夫子應之不同然則政有異端乎孔子曰各因其事也齊君為國奢于臺榭淫于苑囿伎樂不解於時一旦而賜人以千乘之家者三故曰政在節財魯君有三人孟叔叔孫季叔內比周以愚其君外讎諸侯之賓以蔽其明故曰政在諭臣夫荊之地廣而教狹民有離心莫安其居故曰政在悅近而來遠此三者皆所以為政又曰閔子騫為費宰問政於孔子孔子曰以德以法夫德法者御民之具猶御馬之銜勒也子騫曰敢問古之政孔子曰古之政者天子以內史為左右手內史掌手八柄及敘事之受納以語王聽治以德為銜勒以百官為轡以刑罪為策以萬民為馬故御天下數百年而不失善御馬者正銜勒齊轡策善御民者一其德法正其百官刑不用而天下治又曰子遊問於孔子曰子亟言子産之惠可得聞乎孔子曰惠在愛民而已子遊曰愛民之謂德教何翅於惠哉孔子曰夫子産者猶衆人之母也食之弗能教也子遊曰其事可言乎孔子曰子産以其乘車濟冬涉者盡愛而無教也又曰孔子謂宓子賤曰子治單父衆悅子何施而得之對曰不齊之治也父恤其子其子恤諸孤而哀喪紀孔子曰善小節也小民附矣猶未足也曰不齊所父事者三人所兄事者五人所友事者十一人孔子曰父事三人可以教孝矣兄事五人可以教悌矣友事十一人可以舉善矣中節也中節人附矣猶未足也曰此地民有賢於不齊者五人不齊事之而稟度焉皆教不齊所以治之之道孔子歎曰其大者乃於此乎有矣又曰孔子初仕為中都宰中都魯邑名也為養生送死之節長幼異食如五十異狼強弱異任謂力作之事各從所任弱困也男女別塗路不拾遺器不雕偽市不二價如各其貨不相欺狂為四寸棺五寸槨因丘陵為墳不封不樹行之一年而四方諸侯皆則焉又曰宓子賤者仕魯為單父宰恐魯君聽讒使己不得行其政於是辭行故請君之近吏二人與之俱至官令二吏書方書輒掣其肘書不善則從而怒之二吏患焉辭請歸魯子賤曰子之書不善子勉歸之矣二吏歸報於君曰宓子賤使臣書而掣臣肘書惡而又怒臣邑吏皆笑之此臣所以去之而來也魯君以問孔子孔子曰宓不齊君子也其才任霸王之佐屈節而治單父將以自試意者宓子以此諫乎公寤太息曰此寡人之不肖也寡人亂宓子之政而責其善者數矣微二吏則寡人無以知過微夫子則寡人無由自寤遽發所愛之使告宓子曰自今以往單父非魯有也從子之制有便於人者子決之五年一言其要宓子敬奉詔遂得行其政於是單父治焉躬教厚明親親尚篤敬施至仁加懇誠致忠信百姓化之又曰孔子兄之子蔑者與宓子賤皆仕孔子往過蔑而問之曰自子之仕何得何亡對曰未有所得而亡者三王事若聾聾宜為襲言前後相因襲學焉得習言不得學習也是學不得明也奉祿少饘粥不及親戚是骨肉益踈也公事多急不得弔死問疾是朋友道闕也其亡者三即謂此也孔子不悅往過子賤問如孔蔑對曰自來仕無所亡而所得者三始誦之今得而行之是學益明也奉祿所供被及親戚是骨肉益親有公事而兼以弔死問疾是朋友信篤也孔子喟然謂子賤曰君子哉若人若人猶是人也魯無君子於焉取斯國語曰齊桓公親逆管仲于郊而與之坐問焉曰昔吾先君襄公築臺以為高位居高臺以自尊田狩畢弋不聽國政卑聖侮士而唯女是崇九妃六嬪正適稱妃言九者尊之如一明其淫侈非禮制也姪娣之屬皆稱望嬪婦官也陳妾數百陳列食必梁肉衣必文繡戎士凍餒戎車待遊車之裂戎士待陳妾之餘戎車兵車遊車遊戲之車裂殘也優笑在前賢材在後優笑車倡非是以國家不日引引申不月長長益恐宗社不掃除社稷不血食敢問為此若何為治管子對曰昔吾先王昭王穆王世法文武遠績以成名周管之先績功也言昭王雖有所闕猶能世法文王武王之典以成其功名也合群叟比校民之有道合會叟老比方校考也謂考其德行道藝而興賢設象以為民紀式權以相應式用也權平也治正用民使平均相應比綴以度比其衆寡綴連也連失也度法也端本肇末端等肇正也謂先等其本以正其末勸之以賞賜糾之以刑罰班序顛毛以為民紀統班次序列顛等也毛髮也統經也言次列使長幼有序以為治民之經紀也桓公曰為之若何管子對曰昔者聖王之治天下也參其國而伍其鄙參三國也也郊以內也伍伍也鄙郊以外謂三分國都以為三軍五分其鄙以為五屬聖王謂若湯武定民之居成民之事使四民各居其職若公就官府農就田野所以成其事陵為之終以為葬地而慎用其六柄焉柄本六柄生殺貧富貴賤又曰齊桓公問管仲曰國安矣吾欲事於諸侯其可乎管子對曰未可君若正卒伍修甲兵周禮五人為五百人為卒今管子亦以五人為五而以二百人為卒則大國亦將正卒伍修甲兵則難以速得志矣君有攻伐之器小國諸侯有守禦之備則難以速得志矣君若欲速得志於天下諸侯則事可以隱令可寄政事戎事隱匿寄託也匿軍令託於國政若有征伐鄰國不知桓公曰為之若何管子對曰作內政而寄軍令焉內政國政因治正以寄軍令桓公曰善管子於是制國五家為軌軌為之長軌中一人為之長十軌為里里有司為立有司四里為連連為之長十連為鄉鄉有良人焉良人鄉士又為大夫也以為軍令為軍常令五家為軌故五人為伍軌長帥之居則為軌出則為伍所謂寄政十軌為里故五十人為小戎里有司帥之小戎兵車此有司之所乘故曰小戎詩云小戎俴收古者戎車一乘步卒二十二人令齊五十人四里為連故二百人為卒連長帥之十里為鄉故二千人為旅鄉良人帥之五鄉一帥故萬民為一軍五鄉之帥帥之五鄉每一軍有五鄉也鄉帥鄉也萬人為軍齊制也周則萬二千五百人為軍帥長三軍故有中軍之鼓有國子之鼓有高子之鼓春以搜振旅春田日搜旅整衆也周禮仲春教振旅遂以搜田秋以獮治兵秋田目獮周禮仲秋教治兵遂以獮田也是故卒伍整於里軍旅整於郊內教既成令勿使遷徙遷徙猶改更伍之人祭祀同福死喪同恤恤憂禍災共之人與人相疇疇匹世同居少同遊故夜戰聲相聞足以不乖晝戰目相見足以相識其歡欣足以相死致死以相救居同樂行同和與和同死同哀是故守則同固戰則同強君有此士也三萬人方行於天下方橫以誅無道以屏周室屏蕃天下大國之君莫之能禦禦當又曰晉文公元年春屬百官賦職任功屬會賦授也授職事任有功棄責薄斂施舍分寡注當云棄責除宿責也施施德也舍舍禁也分寡分少財也救乏振滯匡困資無救救乏絶振極淹滯之士匡正困窮之人資無與無財輕關易道通商寬農輕關輕其稅易道除盜賊通商利旅寬農寬其政不奪其時茂穡勸分省用足財茂勉稼穡也勸有分無也省減減國用足財備凶年利器明德以厚民性利利器用明明德教厚民性厚其性情也舉善授能官方定物方常物事亡其常官以定百事正名育類正名正上下服位之名育類長育善類昭舊族昭明舊臣有功者之善愛親戚明賢良明顯尊貴寵國之責臣尊禮之賞功勞事耇老禮賓旅旅客友故舊故舊公子時胥藉狐箕欒郤柏先羊舌董韓實掌近官舊十一性晉之舊旅近官朝廷諸姬之良掌其中官諸姬同姓中官內官異姓之能掌其遠官遠官縣鄙公食貢大夫食邑士食田受公田庶人食力各由其力工商食官工百工商官賈周禮府藏皆有賈人以知物賈食官官稟之皂隸食職士臣皂皂臣與與臣隸食職名以其職大小食祿也官宰食加官宰家臣加夫夫之加田也論語原憲為之宰政平民阜財用不匱阜安呂氏春秋曰吳起行魏武侯自送之絶河謂吳起曰先生將何以治之西河對曰以忠以信以勇以敢武侯曰四者足矣請以四者恃先生又曰宓子賤治單父彈鳴琴身不下堂而單父治巫馬期以星出以星入日夜不居以身親之而單父亦治巫馬期問其故於宓子宓子曰我之謂任力任力者固勞任人者固逸子則君子矣又曰使民無欲上雖賢不用失無欲者其視為天子與隸同彭祖與殤子同天子至貴也天下至富也彭祖至壽也誠無欲則三者不足勸故人之欲多者其可得用亦多也人之欲少者其可得用亦少也無欲者不可得而用之善為上者能令人欲無窮故人亦可得用而無窮然欲不正以治身則夭以治國則亡群狗相與居皆靜投以炙雞則相與爭或折其骨或絶其筋爭術在也凡治國令其民爭行義也亂國令其民爭不義也強國令其民爭樂用也弱國令其民競不用也又曰桀紂以去之道致之罰雖重刑雖嚴何益大寒民暖是利熱在上民清是利走故民無常處見利則去欲為天子者民之所走不可不察今之世至寒矣至熱矣而民無走聚則行鈞也等於暴亂民無走則王者廢矣暴君幸矣民絶望矣家語曰子路治蒲三年孔子過之入其境三稱善孔貢執轡而問其善可得聞乎孔子曰吾入其境田疇盡易草萊甚辟溝洫深濬此恭敬以信故其民盡力入其邑墉屋宅固樹木甚茂此其忠信而寬故其民不偷也至其庭甚清間諸不用命此其言明察以斷故其政不擾也以此觀之雖三稱善庸盡其美乎
