body:
  text: 河南宋鄭齊魯諸山砥柱山水經注曰砥柱山名也禹治洪水山陵當水者鑿之故破山以通河河水分流包山而過山見水中若柱然故曰砥柱搜神記曰齊景公渡于江沅之河竈御左驂沒之眾皆驚惕古冶子於是拔劍從之邪行五里逆之三里至于砥柱之下乃殺竈頭右手挾左驂鷰躍鵠踴而出仰天大呼水為逆流三百步觀者皆以為河伯也說文曰鳳鳥出東方君子之國過崑崙飲砥柱濯羽弱水暮宿風穴邙山說文曰邙洛陽北土上邑也十道志曰邙山在洛陽縣四十里元和郡國志曰北邙山是隴山之尾一名平逢山亦名郟山楊佺期洛城記曰北山連嶺脩亘四百餘里實古今東洛九原之地也又戴延之西征記云邙山西匡東垣亙阜相屬其下有張母祠即永嘉中此母有神術能愈病故元帝渡江時延聖火於丹陽即此母也今祠存焉續漢書五行志曰靈帝時童謠曰侯非侯王非王千乘萬騎上北邙至中平六年獻帝為中常侍叚珪等數人所執公卿百官隨其後到阿上乃得還此非侯非王上北邙也魏略曰魏文帝獵北邙上時盛夏炎暑行者或中暍鮑勛切諫遂因此伏法魏志曰明帝即位欲平北邙令登臺以觀見孟津廷尉辛毗諫曰天地之性高高下下今而反之既非其理加以損費人功民不堪役帝乃止熊耳山河圖括地象曰熊耳山地門也其精上為畢附耳星史記齊桓公曰寡人南伐至邵陵登熊耳山以望江漢東觀漢記曰赤眉初降輦輸鎧甲兵弩積與熊耳山等盛弘之荊州記曰南縣脩縣北有熊耳山山東西各一峰傍竦南北望之若熊耳山多漆下多櫌棕浮豪之水出焉西流注于洛又案仙書謂此山上有青丹之樹得而服之成仙西京雜記曰葉似江籬而紅綠是又有丹青樹葉一青一赤望之如繡長安謂之丹青樹是也鼓鍾山山海經曰鼓鍾之山帝臺之所以觴百神者也有草焉方莖而黃華圓葉而三成其名曰烏酸可以為毒也今名鍾山在陸渾縣西南三十里陸渾山水經曰陸渾山伊水出焉今亦號方山漢末隱士潁川胡昭隱居山中有石城遠望之有金壇玉匱皛然間出尤好竹木泉石時有野人居之長生不死春秋時遷陸渾之戎意其遺類崤山元和郡縣志曰二崤山在今澠池縣西北一名嶺岑左傳謂秦將襲鄭蹇叔哭送謂收子骨所後漢末建安中曹公西討巴漢惡其險而更開北山道路多從之便又有石銘云晉太康三年弘農大守梁柳脩復舊道西征記曰崤山上不得鳴鼓角鳴則風雨揔至自東崤至西崤三十里東崤長坂數里峻阜絕澗車不得方軌西崤全是石坂十二里險絕不異東崤傳曰杞子自鄭使告于秦曰鄭人使我掌其北門之管若潛師以來國可得也穆公召孟明西乞白乙使出師於東門之外蹇叔之子與師哭而送之曰晉人禦師必於崤有二陵焉其南陵夏后皋之墓也北陵文王之所避風雨也必死是間余收爾骨焉漢書曰景帝三年吳楚反以周亞夫為太尉擊吳楚亞夫發至灞上趙涉遮說亞夫曰吳王素宿懷輯死士久矣此知將軍且行必置間人於崤澠阨陋之間將軍何不從此右去趨藍田出武關抵洛陽間不過差一二日直入武庫擊金鳴鼓諸侯聞之以為將軍從天而下也太尉如其計至洛陽使吏搜崤澠間果得吳伏兵三輔舊事曰鄧禹敗於潼關後大破赤眉於崤青要山山海經曰青要山實惟帝之密都畛水出焉有草黃華赤實服之美人色注水經云強山東阜即騩山有美棗焉十道志曰青要山又名強山缺門山注水經曰缺門山山阜之不相接者一里故得名二壁爭高升聳相亂是也三塗山地理志曰三塗山在陸渾縣南左傳謂四嶽三塗九州之險或曰三塗者伊闕大谷轘轅三道是也女几山元和郡縣志曰女几山在福昌縣西南三十四里山海經曰女几山上多玉下多金其獸即豹麖麝禽多鷮翟鴆白馬山十道志曰白馬山注水經云溪水出宜陽白馬山山上有大石厥狀似馬故溪間以物色受名焉滑州白馬山開山圖云白馬群行山上悲鳴則河決馳走則山崩謂此山也西征記云山有神白馬故名焉太陰山十道志曰太陰山左傳謂晉梁丙陰趯率戎伐潁又云蠻子赤奔晉之陰地且自雒以東至陸渾謂此山也金門山阮籍宜陽記曰金山之竹堪為笙管楊泉物理論云宜陽金山竹為律管河內葭莩為灰可以調氣又注水經曰金門溪出金門山也又戴氏西征記云宜陽縣地名金門塢轘轅山十道志曰轘轅山在緱氏東南左傳曰欒盈過周王使候出諸轘轅是也按轘轅道十三曲今置關焉又按薛綜注東京賦云轘轅坂十二曲道將去復還故曰轘轅闕塞山洛陽記曰闕塞山在河南縣左傳晉趙鞅納王使汝寬守闕塞伏虔謂南山伊闕是也杜預云洛西南闕口也俗名龍門是也牧牛山陽城記曰牧牛山在陽城東八十里下有九十六泉即滄河之上源也父老云昔有一神駮身自山而降下飲泉竭故以為名九山陽城記曰九山在縣南三十五里注水經云相澗水經九山東仲長子云昔有上者身遊九山之上施心不拘之鄉即此山也山陰有九山廟碑晉永康二年立文曰九山府君者太華元子之稱也大嵬山陽城記曰大嵬山在密縣東南五十里即具茨之山黃帝登具茨之山升於供隄之上受神芝圖於黃蓋童子即此也又名具茨山也又有方山一名浮戲山汜水出焉又有洧水出密縣西南馬嶺山桑山春秋曰鄭大旱使屠擊有事於桑山斬其木不雨子產曰有事於山蓻山林也蓻養護也而斬其木有罪大矣奪之官邑半石山山海經曰半石山其上有草生而秀高大葉與花皆赤而不實其名嘉榮服者不遷喜怒在緱氏南十五里天心山道書福地志曰天心之山方圓百里形如城四面有門上有石牆長十餘丈山高谷深多生微蘅其草有風不偃無風獨搖天心山又名錫義山在豊利縣東六十五里小徑山山海經曰小徑山器難之水出焉舊傳器難之水即索水也小徑山一曰嵩諸山俗名周山在榮陽縣三十五里蘭巖山神境記曰榮陽縣有蘭巖山峭拔千丈常有雙鵠不絕來往傳曰昔有夫婦隱此山數百年化為此鵠忽一旦一鵠為人所害其一鵠歲常哀鳴至今饗動岩谷莫年歲碭山水經注曰碭縣分水北有碭山碭芒二縣之間山澤深固多懷神智有仙者涓予柱主並隱碭山得道漢高隱之占后望氣知之即於是處也歷山水經注曰雷澤西南十許里有一小山孤立峻上停停嵥峙謂之歷山山北有小阜南屬迤澤之東北有陶墟緣生言舜耕陶所在墟阜聯屬濱帶瓠河也鄭玄云歷山河東今有舜井皇甫謐曰或言今濟陰歷山是也與雷澤相比余謂鄭玄之言為然故揚雄河東賦曰登歷觀而遙望兮聊浮濟河之巖今雷首歷觀歷山西枕大河校之圖緯於事為安南城山後漢書曰鄭玄漢末遭黃巾之難客於徐州今孝經序鄭氏所作其序云僕避于南城之山棲遲巖石之下念昔先人餘暇述夫子之志而注孝經蓋康成胤孫所作也今西上可二里所有石室焉周廻五丈俗云是康成注孝經處也奚公山楊曄徐州記曰奚公山奚仲造車之所山上軌轍猶存嵇山水經曰嵇山嵇氏故居也嵇康本姓奚會稽人也先自會稽遷于譙之銍縣故為嵇氏取稽字之上以為姓蓋志本也曹南山十道志曰曹南山曹風詩所謂薈兮蔚兮南山朝躋是也有汜水出焉即漢書云高祖即位於汜水之陽今壇存焉汜音汎嶧山書禹貢曰嶧陽孤桐泗濱浮磬鄭玄注曰嶧山今在下邳西葛嶧山也詩曰奄有鳧嶧遂荒徐宅鳧嶧二山爾雅曰魯國鄒縣有嶧山純石相積構連屬而成山史記始皇本紀曰二十八年始皇行郡縣上鄒嶧山立石與諸博士議刻石頌秦德三代地理書曰秦始皇乘羊車登嶧山鄒山記曰鄒山古之嶧山也孤桐之所植邾文公之所卜山下是鄒縣本是邾國魯穆公改鄒山從邑變故謂鄒山嶧陽猶多桐樹地理志嶧山在鄒縣北繹邑之所依名也山東西二十里南北一十三里高秀獨出積石相臨殆無壤石間多孔穴洞達相通往往有如數間居處其俗謂之嶧孔遭亂輒將居人入嶧外寇雖眾無所施害永嘉中太尉郗鑒將鄉曲逃此山胡賊攻守不能得今山南有大嶧名曰郗公嶧山北有絕巖秦始皇觀禮於魯登於嶧山之上命丞相李斯以大篆勒銘山嶺名曰晝門詩所謂保有蒲嶧者也金鄉山戴延之西征記曰焦氏山北數山有漢司隸校尉魯恭穿山得白虵白兔不葬更葬山南鑿而得金故曰金鄉山山形峻峭冢前有石祠石廟廟四壁皆青石隱起自書契以來忠臣孝子貞婦及孔子弟子七十二人形像像邊皆刻石記之文字分明又有石狀長八尺磨瑩鮮明叩之聲聞甚遠時太尉從事中郎傳珍諮議參軍周安穆析敗石床各取之為魯氏之後所訟三人并免官琅琊山史記始皇二十六年滅齊遂登琅琊山築層臺於上秦皇樂之因留三月是也郡國縣道記云琅琊臺在故城東南十里州東南一百七十里臺上有始皇碑碑上有六百字可識餘多剝落臺側有四時祠即齊地八祠之一又云臺上有神泉人或汙之即立竭龜山水經注曰龜山在博縣一十五里昔夫子傷政道之陵遟故望山而懷操故琴操有齊龜山操焉山北即龜陰之田也春秋定公十年齊人來歸龜陰之田是也徂徠山又經注曰鄒山記云徂徠山在梁甫奉高博三縣界猶有美松亦曰尤竦之山危山漢書五行志曰哀帝時無塩危山土自起覆草如馳道狀報山又報山石轉立東平王雲及后謁自之石所祭治石象報山立石束倍草并祠之三年息夫躬告之王自殺后謁棄市國除尼丘山水經注曰沂水出魯城東南尼丘山西北山即顏母所祈而生孔丘也山東一十里有顏母廟防山南數里孔子父葬處禮所謂防墓崩者也羽山十道志曰羽潭一名羽池潭東有羽山漢志曰東海郡祝其縣有羽山殛縣之所郡國志云鍾離沬城有羽泉殛鯀處其水恒清牛羊不飲書曰殛鯀于羽山又曰蒙羽其藝左傳曰昭公二年鄭于產聘于晉平公有疾韓宣子逆客私焉曰寡君寢疾于今三月矣並走群望有加而無瘳今夢黃熊入于寢門其何厲鬼也對曰以君之明子為大政其昔堯殛鯀于羽山其神化為黃熊入于羽淵實為夏郊三代祀之也韓子祀夏郊平公乃間華不注山傳曰齊師與晉戰於鞌齊師敗績晉遂之三周華不注山水經曰華不注虎牙桀立孤峰特起青崖發翠同點黛焉長白山郡國志曰長白山陳仲子夫妻隱起郭氏述征記云長白山能興雲雨山西南有大湖山二山並有石室敗赤漆舡上有記皆謂之堯時物黌山三齊略記曰鄭玄刊注詩善棲黌今山有古井不竭猶生細草葉形似韭俗稱鄭公書帶陶山齊地記曰范蠡浮海出齊變姓名自號鴟夷子間行止於陶山因號陶朱公焉後改曰鴟夷山在今平陰縣東巫山又曰巫山一名孝堂山左傳曰齊侯登巫山以望晉師即此山也山上有石室俗傳云郭巨葬母之所因名孝堂山焉在平陰縣魚山郭延生述征記曰魚山一名五山瓠子歌所謂也魏熹平中有神女智瓊降弦超室後復遇此山陌上又西征記曰魚山臨河神女智瓊與弦超會所魏陳思王曹植嘗登此山有終焉之志遂葬其西亦其所封國也魚山在東阿縣東北穀城山漢書曰穀城山昔張良受黃石公素書云山下黃石即吾也穀城山一名黃石山在東阿縣東北勞山伏琛齊記曰不其城南二十里有大勞山小勞山在海側晏謀齊記曰俗云太山自言高不如東海勞即此也蒙山高士傳云老萊子隱於蒙山之陽以葭為蓋蓬為室歧木為床耆艾為蓆衣縵飲水墾山播植楚王親至其門方織畚至去有間其妻戴畚菜挾薪而至問車馬跡之多荅曰楚王妻曰可食以酒肉者可加以鞭捶可受以官祿者可隨以鈇鉞先生受人官祿為人所制妾不能為人所制者妻乃畚菜而去也東蒙山在蒙山之東故曰東蒙論語云昔者先王以為東蒙王是社稷之臣何以伐為謝祿山郡國志曰東海郡有謝祿山按漢書王莽時東海徐宣謝祿等擊王莽將田況大破之曾屯兵於此因名謝祿山在縣西一里夾山地理志曰懷仁縣有夾山左傳齊魯會于夾谷即此也在縣西四十里桃山地理志曰桃山即華萊山也一名義珠山山上有井不可窺窺者不盈歲輒死又云山上井有鳥巢於井中此鳥金喙黑色見則大水吠狗山地理志曰吠狗山宋武北伐南燕之時至此山夜間犬吠明日視之唯見石狗
