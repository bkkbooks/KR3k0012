body:
  text: 服用部一帳釋名曰帳張也張施於床上也小帳曰斗形如覆斗也爾雅曰幬謂之帳史記曰丞相公孫弘燕見上或時不冠至如汲黯不冠不見也上嘗坐武帳中黯前奏事上不冠望見黯避帳中使人可其奏其見敬禮如此漢書曰東方朔曰陛下誠能用臣朔之計推甲乙之帳甲乙帳名瓚曰造甲乙之帳終以隨珠燔之於四達之衢東觀漢記曰馮魴永平中上行幸諸國勑魴車駕發後將緹騎宿玄武門復道上詔南宮復道多惡風寒老人居之且病靡音肥風病苦內者多取惟悵東西竟塞諸窗望令致密漢官儀曰祭天有紺幄帳魏略曰大秦國金織成五色帳又以明月夜光珠為帳又吳時外國傳云斯條國王作白珠交結帳魏志曰呂布將辭袁紹還洛紹欲殺之明日當發紹遣甲兵三十人辭以送布布使止於帳側僞使人於帳中鼓箏紹兵臥布無何出去而兵不覺夜半兵起亂斫布床被謂為己死明旦紹訊問知布尚在事見樂部又曰太祖幃壞即補納又曰典韋拜都尉太祖引置左右將親兵數百人常繞帳晝立侍終日夜宿帳左右又曰曹爽從帝朝高平陵司馬宣王語弟孚曰陛下在外不可露宿促送帳幔詣行在所也吳志曰蔣欽宇公希拜左護軍權嘗入其內母疏帳縹被權歎其貴而守約勑御府為母作錦被段易帷帳晉令曰錦帳為禁物晉後略曰張方兵入洛御寶織成流蘇武帳皆割分為馬㸂矣晉令曰元帝時有奏太極殿施絳帳帝詔曰漢文以上書皂囊為帷冬可青布夏青疏又曰桓玄小會於西堂殿施絳綾帳鏤黃金龍銜五色羽葆流蘇群臣切相語曰此頗似轜車亦王莽仙蓋之流沈約宋書曰高祖圍廣固夜忽有鳥大如鵝蒼黑色飛入高祖帳中胡蕃起賀曰蒼黑胡虜之色胡虜歸我大吉之祥也明旦攻城陷之齊書曰高祖儉素內殿施黃紗帳又曰吐谷渾王河南其國多善馬有屋宇雜以百子帳即穹廬也隋書曰煬帝北巡欲誇戎狄令宇文愷為大帳其下坐數千人帝大悅賜物千段又造觀風行殿上容侍衛者數百人離合為之下施輪軸推移倏忽有若神功戎狄見之莫不驚駭唐書曰高祖時吳王杜伏威獻竹帳上以勞人不受又曰始畢可汗衙帳無故自破高祖曰此何祥也內史令蕭瑀進曰昔魏文帝幸許昌城門無故自壞帝惡之而返其年文帝崩始畢帳壞即其類也高祖然之抱朴子曰蔡伯喈到江東得論衡中國諸儒覺其談論更遠嫌得異書求其帳中隱處果得之傳子曰太祖武皇帝魏武帝愍嫁娶之僣上公主適人不過皂帳郭子曰許侍中顧司空俱作王丞相從事常夜在丞相許戲二人歡極丞相便使入己帳中眠顧至曉猶展轉不得熟寐許上床便大鼾丞相語諸客曰此中亦是難眠處耳東宮舊事曰皇太子納妃有熟絳綾帳絳絹幄又曰東齊夏施烏紗單帳四率坊洗馬坊烏練帳三輔事曰秦時奢侈綈帳綺繡土木朱紫漢武故事曰上以琉璃珠玉明月夜光雜錯天下珍寶為甲帳其次為乙帳甲以居神乙以自居桓談新論曰李少君置武帝李夫人神影於帳中令帝觀見之燕丹太子曰秦始皇置高漸離於帳中擊筑又時外國傳曰斯調王作白珠交結帳金床上天笁佛精舍天笁王見珠圓好意欲留焉臣下諫乃止拾遺録曰蜀先主甘后坐於白絹帳中於外望之如月下聚雪益部耆舊傳曰翟酺上事云漢文帝連上事書囊以為帳惡聞紈素之聲神仙傳曰茅君當受神靈之職衆賓皆至忽然有素縑帳於屋下敷數重白氈金案玉柸人皆飽醉又曰茅君仙去民為立廟茅在帳中與人言鄴中記曰石虎御床辟方三丈冬月施熟錦流蘇斗帳四角安純金龍頭銜五色流蘇或用青綈光錦或用緋綈登高文錦或用紫綈大小錦絮以房子錦百二十斤白綈為裏名為裏復帳帳四角安純金銀鑿金香爐以石墨燒集和名香帳頂上安金連花花中懸金薄織成捥枕囊春秋但錦帳表以五色總為夾帳夏用紗羅或綦文丹羅或紫縠文為單帳鄧德明南康記曰陽道士葬巖室經數年尸猶儼然葛帳覆之幽明録曰晉朱黃祖奉親至孝母病篤天漢開明有一老翁將小兒持箱自通即以兩丸藥賜母服之患頓消因停宿夜中廳事上有五色氣祭天琴歌清好祖往視之翁坐斗帳裹四角及頂上各有一大珠形如鵝子明彩炫耀馬融別傳曰融為通儒善鼓琴好吹笛達生任性不拘儒者節居宇器服多在侈飾常坐高堂施絳紗帳前授生徒後列女樂弟子次相傳授鮮有入其室者風俗通曰靈帝好胡服帳京師皆竟為之後董卓擁胡兵掠宮掖語林曰劉植詣石崇如廁見有絳文帳大床茵褥甚麗不得行乃更如他廁俗說曰桓玄在南州妾當産畏風應須帳桓曰不須作帳可以到夫人故帳與之世說曰郗超為桓溫參軍時謝安王坦之嘗詣溫溫令超帳中臥聽論事風動帳開見超安笑曰郤生可謂入幕之賓矣又曰卞範為丹陽羊孚於南州暫還往卞許云卞疾動不堪坐卞便開帳袚褥羊徑上卞大床枕入被下乃回坐傾𣍿移辰達暮羊去卞執手曰我弟一理其卿卿莫負我魏武遺令曰吾與妓女皆著銅雀臺上施六尺床練帳月朝十五輒向帳作樂古詩曰紅羅復斗帳四角垂香囊柴子大七折曰錦衾內設羅幬繢帳也江淹別賦曰春宮悶此青苔色秋帳含茲明月光孔稚圭北山文曰蕙帳空兮夜鶴怨山人去兮曉猿驚離騷曰翡翠羽帳飾高堂劉玄休詩曰羅帳延秋月幔說文曰幔幕也釋名曰幔幔相連綴之言也廣雅曰幔掩也東觀漢記曰岑彭與吳漢圍隗囂壅谷水以縑幔盛土為堤灌城宋書曰晉安王子勳叛逆取所乘車除腳以為輦其夕有梟集其幔梁書曰曹景宗為楊州剌史性躁動不能沉默出行常欲褰車帷幔左右輒諫以位望隆重人所具瞻不宜然景宗謂所親曰我昔在鄉里平澤中逐麞數助射之此樂使人忘死不知老之將至今來楊州作貴人動轉不得路行開車幔小人輒言不可開置車中如三日新婦此悒悒使人無氣又曰柳惔音談甚重婦頗成畏憚性愛音樂女妓精麗略不敢視僕射張稷與惔狎密而為惔妻賞敬稷每詣惔必先相聞夫人惔每欲見妓但因稷請奏其妻隔幔坐妓然後出惔因得留目六韜曰將冬不服棗夏不操扇天雨不張帳蓋名曰禮將不躬禮無以知士卒寒暑也軍令曰戰時皆取船上布幔布衣漬水中積聚之賊有炬火火箭以掩滅之拾遺録曰周穆王時鸞章錦幔者摩連國獻焉錦文如鸞翔又曰吳主趙夫人巧妙無雙權居昭陽宮倦暑乃褰紫絹之帷夫人曰此不足貴也權使夫人厝其思焉答曰妄欲窮慮盡思能使下絹帷而清風自入視外無有蔽礙列侍者飄然自涼若馭風而行權稱善夫人乃扸髮以神膠續之神膠出鬱夷國接弓弩之弦百絶百續乃織為羅縠纍月而成裁之為幔內外視之飄飄如煙氣輕動而房內自涼時權尚軍旅常以此幔自隨以為征幕舒之則廣縱一丈卷之內文漆忱中謂之絲絶秦記曰符堅以太常韋逞母宋傳其父業得周官音義乃就家立講堂書生百人隔紗幔而授業焉陸機別傳曰機夢黑幔繞車手決不開至明見誅世說曰庾太尉亮有兒年數歲溫太真常隱幔怛怛驚也之此兒神色恬然乃徐跪曰君侯何以為論者乃謂不減亮王融詠幔詩曰幸得與珠綴羃歷君之楹日映不辭卷風來輒自輕每聚金爐氣時駐玉琴聲但願置撙酒蘭釭當夜明幌說文曰櫎帷屏風之屬晉惠帝起居注曰有雲母幌鄴中記曰石虎太武殿西有崑華殿閣上輒開大窗皆絳紗幌華延雋洛陽記曰洛陽城十八觀皆籠雲母幌幬說文曰幬單帳也謝承後漢書曰黃昌夏多蚊貧無幬傭債為作幬又曰羊續為廬江太守臥一幅布幬幬穿敗糊紙補之淮南子曰楚將子發求伎道之士楚有善為偷者願以伎自效子發禮之後齊伐楚偷乃夜解齊將之幬獻之子發因復還之齊將懼而退楚辭曰翡翠幬高堂紗版玄玉梁又曰翡翠珠被被爛衾齊光弱何拂壁羅幬張馬融廣成頌曰張雲帆施霓幬曹植九詠曰蕙幬兮荃床床幨通俗文曰障床曰幨昌鹽切釋名曰床前帷曰幨幨垂也東宮舊事曰皇大子納妃有録石綺絹裹床幨二青廬世說曰魏武帝少時常與袁紹好為遊俠觀人新婚因潛入主人園中夜叫呼云偷青廬中人皆出觀帝乃抽刀劫新婦與紹還出失道棘林中紹不能動帝復大叫偷人今在此紹惶迫自擲出遂俱免唐書曰建中中議公主出降之儀曰近代設氈帳擇地而置此乃北胡穹廬之制不可以為佳宜於堂室中置帳以紫綾縵為之
