body:
  text: 居處部九第漢書曰高祖詔列侯食邑者皆賜大第室二千石受小第室注云有甲乙次第故曰第又曰出不由里門面大道者名曰第史記騶奭者齊諸鄒子亦頗采騶衍之術以紀文於是齊王嘉之自如淳于髡以下皆命曰列大夫為開第康莊之衢高門大屋尊寵之覽天下諸侯賓客言齊能致天下賢士也漢書霍去病益貴上為治第辭曰胸奴不滅無以家為又曰高后德夏侯嬰脫孝惠魯元於下邑賜北第上曰近我以尊異之注云第以北為尊又曰平恩侯許伯入第司隸校尉蓋寬饒往賀酒酣仰視屋曰美哉富貴無常忽則易人此如傅舍所閲多矣唯謹慎為得久居侯可不誡哉晉書青溪橋東南臨淮水周三里九十步太宗舊第後為會稽文孝王道子宅謝安薨後道子領楊州刺史於此理事時人呼為東府至是築城以東府為名其城東北角有靈秀山即道子宅內山嬖臣趙牙所築也齊書劉瓛姿狀鑯小而儒學冠於當朝京師貴遊士子莫不下席受業瓛性謙下不以高名自居住檀橋有屋數間上皆穿漏學徒不敢斥呼為青溪焉竟陵王子良親往謁表世祖為瓛立館以楊烈橋故主第給之生徒皆賀瓛曰室美豈為人哉華宇豈吾宅哉未及徙居遇疾卒唐書假綸兵部尚書綸少任俠落拓不修細行仕隋左親衛隱太子見而悅之妻以琅琊長公主舍高祖之舊第數聞鼓吹之音視之無所覩綸謂主曰聞圖讖李氏當王命今於第內有此禎祥必而家應籙之徵也又曰張延賞東都舊第在思順里亭館之麗甲於都城子孫五代無所加工時號三相張氏云魏王奏事爵雖列侯食邑不滿萬戶不得作第其舍在里中皆不稱宅荀氏家傳曰荀彧字文若太祖既定冀州為公起大第於鄴諸將各以功次受居地太祖親遊之笑曰此亦周禮六勳之差也文選蜀都亦有甲第當衢向術音隧西京賦北闕甲第當道直啓邸史記曰代王馳入北邸史記封禪書曰方士多言古帝王有都甘泉者其後天子又朝諸侯甘泉甘泉作諸侯邸陸機洛陽記曰百郡邸在洛城中東城下步廣里中屋説文曰屋居也釋名曰大屋曰廡廡撫也覆也亦謂之正也屋之正大者通俗文曰客堂曰庌五下反聲類曰廡堂下周也釋名曰屋奧也其中溫奧易豐卦曰豐其屋蔀其家窺其戶闃其無人王弼注云屋藏蔭物也以蔭處極而最在外際自藏蔭者也既豐其屋又覆其家暗之甚也棄其所處而深自藏窺戶無人詩鵲巢行露曰誰謂雀無角何以穿我屋又曰於我乎夏屋渠渠注夏大也渠渠猶勤勤也又車轔小戎曰在其板屋亂我心曲注西戎版屋心曲心之委曲也又曰瞻烏爰止于誰之屋周禮冬官廬人曰殷重屋堂修七尋崇三尺四阿重屋考工記茸屋三分瓦屋四分注各分其修以其一為峻尚書大傳曰武王伐紂觀兵於盟津有火流於王屋化為赤烏三足禮記曰富潤屋左傳清廟茅屋昭其儉也又曰宋災樂嘉為政火所未至撤小屋塗大屋注大屋難撤故就塗之又曰欒氏乘公門宣子謂趙鞅曰矢及君屋死之鞅用劍以帥卒欒氏退又昭六年傳曰叔孫婼聘於晉一日必葺其墻屋去如始至東觀漢記曰鍾離意為堂邑令初到無屋意乃出俸錢作屋民齎柱趣作浹日而成畢為民士祝曰興功役者令也如有禍崇令當之民大悅又曰王霸建武初連徵不至霸安貧賤居常茅屋蓬戶藜藿不厭然樂道不怠以壽終吳志曰吳儀字子羽為人不治産業造屋舍才容足鄰家起大宅孫權出望見起屋左右曰昊儀家權曰昊子羽儉必非也令人親至果是鄰舍又曰魚宗為將軍朱據史將母在營夜雨屋漏宗起涕泣謝母母曰但當勉之何足泣也晉記曰左將軍王廙中宗姨弟也為母起屋違制上流涕責廙皇甫謐列女傳曰衛農與妻宿客舍遇雷雨妻夢虎齧其足驚起相謂曰我此行未宜天欲戮我夫妻出中夜叩頭屋壞壓殺數十人家語曰孔子厄於陳蔡從者七日不食子貢以貨竊犯圍出糴於野人得米一石焉顏回仲由炊之壞屋之下有埃塵墨墮飯中顏回取而食之子貢自井望見之不悅以為竊食呂氏春秋亦載又曰周公居家宰之尊而猶下白屋之士日見百七十人新語堯舜之人可比屋而封桀紂之人可比屋而誅漢武故事曰上起神屋九間雖崑崙玄圃不之過也又曰武帝四歲封膠東王長主抱膝上問曰兒欲得婦長主指左右長御百餘人皆云不用因指其女問曰阿驕好不笑對云好若得阿嬌作婦當作金屋貯之長主大悅乃苦要上遂定婚漢官典職曰南北宮相去七里中間作大屋復道三行天子案行中央臺官從左右崔凱喪服節曰禮人君宮室之制為殷屋殷屋四夏屋也卿大夫為夏屋隔半以北為正室中半以南為堂正室齋室也神異經曰西北金闕北荒有百屋齊長四十丈畫以五色戴延之西征記曰洛陽城有鬱金屋廣志曰大秦國以青水精為屋郡國志秦州俗尚氣力不恥寇盜弓馬射獵以為工能其居八板為屋故詩云在其板屋修我甲兵及車轔轔四鐵小戎皆言田狩之事論衡曰豐屋知名家喬木知舊都鴻文在國聖世之驗又工伎之書起宅蓋屋必擇吉日夫屋覆人形宅居人體何患害於歲月而必擇之亦如以彰蔽人身者神要之則夫裝車治船亦當擇日世説曰蔡司徒説在洛陸機兄弟住參佐廨中數間瓦屋士龍住東頭士衡住西頭又曰庾闡作楊都賦成以示庾亮亮云可三二京四三都謝安云不得爾此是屋下架屋耳事事擬學而無不儉狹景陽詩蜘蟵網四屋七啓曰雲屋皓旰音旱間宮顯敝陶潛集少無適俗韻性本愛丘山方宅十餘畝草屋八九間劉義恭啓事曰洪恩潭被賜臣息伯籥柳屋二間楚詞九歌曰魚鱗屋兮龍堂家説文牖戶之間謂之扆其內謂之家易家人有嚴君焉父母之謂也又家人嗃嗃未失也婦子嘻嘻失家節也易家人女正位乎內男正位乎外詩刑于寡妻至于兄弟以御于家邦言文王自家刑國後漢李通嚴毅治家如官庭舍説文曰市居曰舍禮記有客弗能館不問其所舍左傳秦獲晉侯以歸晉大夫反首拔舍而從之注反首亂頭髮反下垂也拔舍草止也漢書曾城舍班婕妤居之又曰成帝趙皇后女弟絶幸為昭儀居昭陽舍桓子新論董賢女弟為昭儀居椒風舍後漢朱祐初學長安帝往候之祐不得相勞苦而先升講舍後車駕幸其第帝因笑曰主人得無舍我講乎以有舊恩數蒙賞賴謝承後漢書曰趙昱請處士綦母君公立精舍受公羊傳又曰楊震客居湖縣立精舍家貧常以種藍自業又曰楊奇字公挺震之玄孫少有志節不以家勢為名交結英彥不與豪右相交通於河南緱氏界中立精舍門徒常二百人又曰陳實字仲弓詣太學郭林宗陳仲舉為親友歸家立精舍講授諸生數百人又曰周磐字堅伯初為安陵令以從弟暢為司隸縣屬州部換陽平令復換重合令磐已歷二縣恥復經三城遂去還家立精舍教授守先人冢廬遠方知名又曰張奐字然明弘農華陰人詣太學受業博通五經隱處在扶風郿縣界中立精舍斟酌法喬卿之雅訓晝誦書傳暮習弓馬魏武令曰孤本欲自立精舍今遂為國討賊後漢書張湛稱疾不朝拜太中大夫居中東門侯舍故時人號曰東門君齊書周顒字彥倫汝南城安人也智林道人遺書顒於種山西立隱舍休沐則歸之古今注野人為員舍如蝸牛之殼故曰蝸舍廬説文曰廬寄也春夏居秋冬去釋名曰寄此為廬周禮凡國野之道十里有廬廬有飲食漢書武帝賜嚴助書曰制詔會稽太守君厭承明之廬張晏曰承明廬在石渠閣外直宿山曰廬也勞侍從之事懷故土出為郡吏會稽東接於海南近諸越北抗大江間者闊焉久不聞問具以春秋對無以從橫説華嶠後漢書曰汝南薛苞字孟嘗父取後妻憎苞分之出外日夜號泣不能去被歐杖不得已廬於門外旦入灑浸進食父怒逐之又廬於里頭晨昏不廢積歲餘父母慚而還之東觀漢記曰耿純率宗族歸光武純兄歸燒家廬舍上以問純純曰恐宗人賓客卒有不同故焚燒廬舍絶其反顧之望上大笑又曰李恂為武威太守後坐事免無田宅財産居山澤結草為廬魏略曰楊沛前後宰歷城守不以私計介意後家無餘積無他奴婢占河南席陽亭部荒田二頃分牛廬居止其中魏志曰管寧至遼東乃廬於山谷時避難者多居郡南而寧居北示無遷志晉書征虜將軍石崇河南金谷澗中有別廬冠絶時輩引致賓客日以賦詩諸葛亮表先帝不以臣卑鄙三顧臣於草廬之中咨臣以當世之事郡國志廬山周武王時有俗先生字君孝兄弟七人皆有道術結廬於此仙去空廬尚存故曰廬山皇甫謐高士傳曰世莫知焦先所出或言生漢末無父母兄弟見漢衰乃不言常結草為廬冬夏袒露垢汙如泥後野火燒其廬先因露寢遭冬雪大至先袒臥不移人以為死就視如故洛陽故宮名曰侍中廬在南宮中屠蘇通俗文曰屋平曰屠蘇廣雅曰屠蘇庵也魏略曰李勝為河南尹廳事前屠蘇懷令人治之庵釋名曰圜屋曰庵庵掩也自覆掩也
