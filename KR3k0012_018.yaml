seq: 18
front:
  text: 時序部二五行釋名曰五行者言五氣於其方各施行者尚書洪範曰五行一曰水二曰火三曰木四曰金五曰土皆其生數水曰潤下火曰炎上言其自然之常性也木曰曲直金曰從革木可以揉曲直金可以改更者土曰爰稼穡種曰稼斂曰穡土可以種可以斂也潤下作鹹水鹹所生炎上作苦焦氣之味曲直作酸木實之性從革作辛金之氣味稼穡作甘甘味生於百穀五行以下箕子所陳之也禮曰五行之動迭相竭也五行四時十二月還相為本也又曰五行之秀氣傳曰秋龍見于絳郊魏獻子問於蔡墨蔡墨對曰古有豢龍氏有御龍氏獻子曰今何故無之對曰五行之官是謂五官實列受氏姓封為上公祀為貴臣社稷五祀是尊是奉木正曰勾芒正官長也取木生勾曲而有芒角火正曰祝融融明貌也金正曰蓐收初秋摧折而可收也水正曰玄冥水出而陰幽冥也土正曰后土土為群物之主故曰后土獻子曰社稷五祀誰氏之官也對曰少皞氏有四叔曰重曰該曰修曰熙實能理金木及水使重為勾芒該為蓐收修及熙為玄冥二子相代為水王也世不失職遂濟窮桑此三祀也窮桑少昊之號四子能治其官顓頊氏有子號曰犂為祝融共工氏有子號曰勾龍為后土此其二祀也后土為社稷田正也掌播殖也有烈山氏之子曰柱為稷自夏已上祀之周棄亦為稷棄周之始祖能播百穀湯既勝夏廢柱而以棄代之也自啇以來祀之漢書曰五行者五常之形氣也又律曆志曰天以一生水地以二生火天以三生木地以四生金天以五生土魏略曰詔以漢火行火忌水故去洛水而加隹魏於行次為土水得土而流土得水而軟故除隹加水變雒為洛家語曰季康子問於孔子曰舊聞五帝之名而不知其實請問何謂孔子曰昔丘也聞諸老聃天有五行木金水火土分時化育以成萬物一歲三百六十日五行行至七十三日化生長育萬物莫不成也其神謂之五帝五帝五行之神佐天理物者也而説皆為之名字亦為妖怪而妄也古之王者易代改號取法五行更王終始相生亦象其義也法五行更王終始相生以木德王天下其次所生之行轉相承故其生為明王者死配五行是以太皞配木炎帝配火少皞配金顓頊配水黃帝配土康子曰太皞氏其始之木何也孔子曰五行用事先起於木木東方也萬物之初皆出焉是故王者作而首以木德王天下則以所生之行轉相承也康子曰吾聞勾芒為木正祝融為火正蓐收為金正玄冥為水正后土為土正此則五行之主也而不稱何孔子曰凡五正者五行之官名也言但主五行之官名安得同名為帝五行佐成上帝而稱五帝太皞之屬配焉亦云帝從其號音昔少皞氏之子有四叔曰重曰該曰修曰熙實能理金木水火土使重為勾芒該為蓐收修及熙為玄冥顓頊氏之子曰黎為祝融共工氏子曰勾龍為后土此五者各所以能業其官職生為上公死為貴神別稱五祀不得同帝也五祀上公之神耳故不得稱帝五正不及五帝五帝不及天地也遁甲開山圖榮氏解曰五龍受爰皇後君也兄弟四人皆人面龍身長曰角龍木仙也次曰羽龍水仙也父曰宮龍土仙也父子同得仙治在五方今五行之神也白虎通曰五行者何謂也謂金木水火土言行者欲言為天行氣之義也地之承天猶婦之事夫臣之事君也其位卑卑者親視事故自同於一行尊於天也尚書一曰水二曰火三曰木四曰金五曰土水位在北方者陰氣在黃泉之下任養萬物水之為言準也陰化沾濡任生木木在東方者陽氣始動萬物始生木之為言觸也陽氣動躍火在南方陽在上萬物垂枝火之為言委隨也萬物布施火之為言化也陽氣用事萬物變化也金在西方者陰始起萬物禁止金之為言禁也土在中央中央者土土主吐萬物土之為言吐也樂記曰春生夏長秋收冬藏土所以不名時者地土之別名也比於五行最尊故自居部職也又曰萬物懹任交易變化始起先有太初然後有太始形兆既成名曰太素渾沌相連視之不見聽之不聞然後剖判清濁既分精耀出布庶物生精者為三光粗者為五行五行生情性情性生汙中汙中生神明神明生道德道德道德生文章四時釋名曰四時四方各一時時期也不失期也書曰乃命羲和敬授民時禮曰天有四時春秋冬夏無非教也周禮曰典瑞掌玉器之藏土圭以致四時日月度其影至不至以知其行失也爾雅曰四時和為玉燭又曰春為青陽夏為朱明秋為白藏冬為玄英論語曰天何言哉四時行焉萬物生焉周禮曰凡四時成歲歲者春秋冬夏各有孟仲季以名十有二月月中氣以著時應春三中氣雨水春分穀雨夏三中氣小滿夏至大暑秋三中氣處暑秋分霜降冬三中氣小雪冬至大寒閏無中氣斗指兩辰之間萬物春生夏長秋成冬藏天地之正四時之極不易之道春秋繁露曰四時天之四選春者少陽之選夏者太陽之選秋者少陰之選冬者太陰之選四時之行父子之道也天地之志君臣之義也陰陽之理聖人之法也廣雅曰四方各一時時期也物之生死各應節期而止也又曰時司空也司空主也各主一方物之生死京房易妖占曰海燕自來衆燕隨之穀不登君失春政則蒼燕見於邑民多流亡失夏政則赤燕見於邑失秋政則白燕見於邑失冬政則黑燕見於邑皆如春占管子曰歲有四秋而分四時故曰農事既成農夫賦其耜鐵此之謂春之秋大夏且至絲纊之所作此之謂夏之秋秋成五㯏之所會此謂秋之秋營室中女事紡績緝縷之所作也此之謂冬之秋㯏穀同音又曰東方曰歲星其時曰春其氣曰風風生木南方曰日其時曰夏其氣曰陽陽生火西方曰辰其時曰秋其氣曰陰陰生金北方曰月其時曰冬其氣曰寒寒生水淮南子時則曰六合孟春與孟秋為合仲春與仲秋為合季春與季秋為合孟夏與孟秋為合仲夏與仲冬為合季夏與季冬為合孟春始盈孟秋始縮盈長也縮短也仲春始出仲秋始內出二月播植也內八月取斂也季春大出季秋大內孟夏始緩孟冬始急緩四月陽炎也急十月寒肅也仲夏德畢季冬刑畢德畢陽施窮也刑畢陰殺盡也又曰陰陽之專精為四海四時之散精為萬物四時者天之吏也又曰以天為蓋以地為輿四時為馬又曰日回而月周時不與人遊徐整三五曆記曰北斗當崑崙崑崙氣連注天下春夏為露秋冬為霜晉張華詩曰四氣鱗次寒暑環周晉陸機詩曰年往迅徑矢時來諒急絃閏説文曰餘分之月歲再閏也告朔之禮天子居宗廟門中故其字從王在門中也白虎通曰月有閏何周天三百六十五度四分度之一十二月日不匝十二度故三年一閏五歲再閏也明陰不足陽有餘閏者陽之餘也書堯典曰帝曰咨汝羲暨和期三百有六旬有六日以閏月定四時成歲咨嗟暨與也匝四時曰期一歲十二月月三十日正三百六十日除小月六為六日是為一歲有十二日未盈三歲足得一月則置閏焉以定四時之氣節成一歲之曆象傳曰閏月不告朔非禮也先王之正時也履端於始舉正於中歸餘於終杜預注曰步曆之始以為術之端首也日月之行有遲有速必分十二月舉中氣以正月也餘日則歸於終積為閏也履端於始序則不愆舉正於中人則不惑歸餘於終事則不悖又曰閏月戊寅濟于陰阪注以為門五日蓋誤以門字與五字合為閏月也公羊傳曰閏月不告朔曷為不告朔天無是月也閏月矣何以謂之天無是月月非常月也所在無常故無正也穀梁傳曰閏月者附月之餘日也一歲三百六十日餘六日又有小月積五歲得六十日而再閏故曰附月之餘日者也積分而成於月者也天子不以告朔而喪事不數也禮玉藻曰朔於南門之外諸侯聽朔於廟天子聽朔於明堂諸侯告朔於祖則天子告朔於文武也閏月則闔閂左扉立乎其中閏無中氣無時令故不聽於堂也門謂廟門立其中當視朝周禮春官曰閏月太史詔王居門終月門謂路寢門也鄭司農云月令十二月令在青陽明堂惣章玄堂左右之位唯閏無居于門故於文王在門謂之閏春秋元命包曰三年一閏以起紀宋均注曰紀法也三年加以一閏以會成歲也史記曰黃帝起消息正閏餘漢書音義曰歲之餘為閏文士傳曰陸績字公紀作渾天説曰閏月無中氣斗斜指二辰之間荊楚歲時記曰周禮云王出居寢門故為字門中從王也是月也不舉百事以非中氣也歲釋名曰歲越也越故限也年進也進而前也祀已也新氣生故氣已也載載生物也白虎通曰年者仍也年以紀事據月言年數者載成萬物終始也五帝言載三王言年世本曰后益作占歲易曰寒往則暑來暑往則寒來寒暑相推而歲成焉洪范曰叶用五紀一曰歲孔安國曰所以紀四時也禮曰日窮於次月窮于紀星回于天數將幾終歲且更始歲者四時一終日一周天之名也言前至孟春之月日復在營室月復建寅昏復參中旦復尾中故曰更始也矣爾雅曰太歲在甲曰閼逢在乙曰旃蒙在丙曰柔兆在丁曰強圉在戊曰著雍著孫炎音豬略切郭璞音義曰著者或作祝黎是也在已曰屠維在庚曰上章在辛曰重光在壬曰玄黓郭璞音翼在癸曰昭陽太歲在寅曰攝提格在卯曰單閼在辰曰執徐在巳曰大荒落在午曰敦牂郭璞音子郎友在未曰協洽在申曰涒灘郭璞曰涒音湯昆反灘音湯干反在酉曰作噩孫炎音愕在戍曰閹茂在亥曰大淵獻在子曰困敦在丑曰赤奮若又曰夏曰歲商曰祀周曰年唐虞曰載郭璞注曰歲取星行一次祀取四時一終也年取禾一熟也載取物終歲更始者也史記天官書臘之明日人衆卒歲一會飲酒發陽氣故曰初歲魏略曰董遇好學讀書常以三餘冬歲之餘夜與陰雨日之餘晉書曰博士張亮議曰俗謂臘之明日為初歲秦漢以來有賀此皆古之遺語也易乾鏧度曰孔子曰歲三百六十日而天氣周八卦用事各四十五日而備歲事尚書大傳曰凡六沴之作歲之朝月之朝日之朝后王受之歲之中月之中日之中則正卿受之歲之夕月之夕日之夕則庶民受之鄭玄曰自正月盡四月為歲之朝後志曰凡六氣相傷謂之沴尚書考靈耀曰天地開闢元曆紀名月首甲子冬至日月五緯俱起牽牛初日月若懸鼊璧五星若編珠青龍甲子攝提格孳青龍歲也歲在寅日攝提格孳猶生也春秋元命包曰歲之為言遂也遂出也出行事於所直辰也淮南子曰太陰治春則欲行仁惠溫良德仁故柔良太陰治夏則欲布施宣明火德陽也故布德遍明太陰治秋則欲修備繕兵金德斷剛故修兵也太陰治冬則欲猛毅堅強水德純陰冰凍閉固故堅強也三歲而改節六歲而一衰衰疫疾也十二歲而一荒蔬不熟為荒也淮南子曰見一叶之落知歲之將暮呂氏春秋曰天行不信莫能成歲師曠占曰黃帝問師曠曰吾欲知歲苦樂善惡可知否師曠對曰歲欲豐甘草先生薺也歲欲飢苦草先生葶藶也歲欲惡惡草先生水藻也歲欲旱旱草先生蒺藜也歲欲溜溜草先生蓬也歲欲病病草先生艾也廣志曰青龍天一太陰太歲也袁子正書語曰歲在申酉乞漿得酒歲在辰巳嫁妻賣子夫盛衰更代豐荒相半天之常道也楚辭曰獻歲發春兮獻進也又曰開春發歲兮承陽施惠養百姓也歲除呂氏春秋注曰前歲一日擊鼓驅疫癘之鬼謂之逐除亦曰儺論語曰鄉人儺孔子朝服立於阼階張衡東京賦曰卒歲大儺荊楚記曰歲暮家家具肴蔌謂宿歲之儲以迎新年相聚酣飲又曰歲前又為藏鉤之戲辛氏三秦記曰昭帝母鉤弋夫人手拳而國色帝披之得鉤人人學藏鉤亦法此鉤亦作彄又曰留宿歲飯至新年十二月則棄之街衢以為去故納新也唐太宗文皇帝守歲詩曰暮景斜芳殿年華麗綺宮寒辭去冬雪暖帶入春風階馥舒梅素盤花卷燭紅共歡新故歲迎送一霄中又曰歲陰窮暮紀獻節啓新芳冬盡今霄促年開明曰長冰消出鏡水梅散入風香對此歡經宴傾壺待曙光又於太原召侍臣賜宴守歲詩曰四時運灰琯一夕變冬春送寒餘雪盡迎歲早梅新梁庾肩吾歲盡應令詩曰歲序已云殫春心不自安聊開葉酒試奠五辛盤金薄圖神燕朱泥印鬼丸梅花應可折惜為雪中看隋薛道衡歲窮應教詩曰故年隨夜盡初春逐晚生方驗從軍樂飲至入西京
