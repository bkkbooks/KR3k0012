body:
  text: 布帛部二錦説文曰錦襄邑織成也釋名曰錦金也作之用功重其價如金故制字帛與釜也禮記王制曰錦文珠玉成器不鬻於市不示民也奢與貪成猶善也禮記玉藻曰童子之節也緇衣衣錦緣錦紬并紐錦束髮皆朱錦童子未冠之稱冠禮曰將冠者彩絲衣紒也又玉藻曰君衣狐白裘錦衣以褐之錦衣狐裘諸侯之服也又曰居士錦帶居士道藝處士也又中庸曰詩云衣錦褧衣惡其文之著也故君子之道暗然而日章小人之道的然而日亡言君子深遠難知小人淺近易知也所以不知孔子以其深遠也襌為褧錦衣以美而君子以褧表之為其文章露似小人也左傳閔公曰衛遷于曹齊桓公歸夫人魚軒重錦三十兩又襄三曰晉侯先歸公享晉六卿于蒲圃賄荀偃束錦加璧又襄五曰左師見夫人之步馬者步馬習馬問之對曰君夫人氏也左師曰誰為君夫人余胡弗知圉人歸以告夫人使饋之錦與馬先之以玉又襄六曰子皮欲使尹何為邑子産曰少未知可否子皮曰吾愛之夫往而學焉亦愈知治子産曰人之愛人求利之也今吾子愛人以政猶未能操刀而使割也其傷實多子之愛人傷之而已子有美錦不使人學製焉大官大邑身之所庇而使學者製焉其為美錦不亦多乎言官邑人重多於美錦也又昭四曰晉合諸侯次于衛地叔鮒求貨於衛淫芻蕘者淫放也欲使衛惠之而致貨也衛人使屠伯饋叔向羹與一篋錦屠伯衛大夫也曰諸侯事晉未敢攜二況衛在君之宇下屋宇之下喻近而敢有異志芻蕘者異於他日敢請之請止之也叔向受羹反錦受羹示不逆其意且非貨也又昭四曰平丘之會公不與盟晉人執季孫意如以幕蒙之使狄人守之司鐸射魯大夫也懷錦奉壺飲冰以匍匐焉守者御之乃與之錦而入匍匐竊往飲季孫也冰箭箭蓋可以取飲者也又昭六曰齊侯將納公命無受魯貨申豐後女賈豐賈二人皆季氏家臣也以幣錦二兩二丈為一端二端為一兩所謂匹也二兩二匹縛一如瑱瑱充耳縛卷也急卷使如充耳易懷藏適齊師謂子猶之人高齮齮子猶家臣子猶梁丘據能貨子猶為高氏後粟五千庾言若能為我行貨於子猶當為請使得為高氏後又當致栗五千庾庾十六斗凡八千斛高齮以錦示子猶子猶欲之齮曰魯人買之百兩一布以道之不通先入幣財言魯人買此甚多布陳之以百兩為數子猶受之又哀上曰吳人藩衛侯之舍藩籬子服景伯謂子貢曰夫諸侯之會事既畢矣侯伯致禮地主歸餼侯伯致禮以禮賓也地主所會主人也餼生物以相辭也各以禮辭讓今吾不行禮於衛而藩其君舍以難之難若用也子盍見大宰乃請束錦以行以賂吳毛詩淇澳碩人曰碩人其頎衣錦褧衣齊侯之子衛侯之妻又蟋蟀曰角枕粲兮錦衾爛兮又巷伯曰巷伯刺幽王也寺人傷於讒而作是詩也萋兮斐兮成是貝錦萋斐文相錯也彼譖人者亦以太甚論語曰宰我問三年之喪期已久矣君子三年不為禮禮必壞三年不為樂樂必崩舊穀既沒新穀既升鑽燧改火期可已矣子曰食夫稻衣夫錦於女安乎曰安女安則為之爾雅曰素錦綢杠以白地錦韜旗之竿尚書大傳曰古之帝王者必有命民能敬長憐孤取舍好讓舉事力者命於其君然後得乘飾車軿馬衣文錦漢書曰項羽在關中懷思東歸曰富貴不歸故鄉如衣錦夜行又曰景帝二年下詔曰雕文刻鏤傷農事錦繡纂組害女工宜禁之又曰賈人母得衣錦謝承後漢書曰朱寵仲威為太尉家貧食脫粟臥布被朝廷賜錦被梁肉皆不敢當漢官儀曰虎賁中郎將古官衣紗縠單衣虎文錦袴餘郎亦然漢官典職曰尚書郎直中官供錦被魏志曰景初中賜倭女王絳地交龍錦五匹紺地勾文錦三匹倭獻暴文雜錦二十匹魏文帝詔曰前後每得蜀錦殊不相比適可訝而鮮異尚復不愛也自吾所織如意虎頭連璧錦亦有金薄蜀薄來至洛邑皆下惡是為下土之物皆有虛名典略曰孔子反衛夫人南子使人謂之曰四方君子之來者必見寡小君孔子不得已見之夫人在錦帷中孔子北面稽首吳志曰蔣欽字公奕為右護軍孫權常入其內母練帳縹被權歎其在貴守約勑御府為其母作錦被改易帷帳又曰甘寧住止常以繒錦維舟去輒割棄以示奢又曰諸葛融父兄質素雖在軍旅身無采飾而融錦罽文繡獨為奢侈環氏吳紀曰蜀遣使獻重錦千端江表傳曰陸遜攻劉備於夷陵備捨船步走燒皮鎧以斷道使兵以錦挽車走入白帝蜀志曰先主入益州賜諸葛亮法正張飛關羽錦各千匹王隱晉書曰袁甫字公曹稱所知於領軍何勗勗曰君稱其好人則多所宜何以為欲使宰民不可為臺閣職乎甫曰人各有能有不能此人雖好好莫過錦錦不可以為焰王隱晉書曰竇滔妻蘇氏善屬文符堅時滔為秦州刺史被徙流沙蘇氏思之織錦為回文詩以寄滔循環宛轉以讀之詞甚悽切晉書曰石季龍僣立遷都于鄴傾心事佛圖澄有重於勒下書衣澄以綾錦乘以雕輦南史曰宋元凶劭將作難賜袁淑等袴褶又就主衣取錦裁三尺為一假又中裂之分蕭斌與淑及左右使以縛袴褶齊書曰江淹為宣城太守時罷歸始泊禪靈寺渚夜夢一人自稱張景陽謂曰前以一匹錦相寄今可見還淹探懷中得數尺與之此人大恚曰郍得割截都盡顧見丘遲謂曰餘尺既無用以遺君自爾淹文章躓矣趙書曰前石死調大臣子弟六十人為挽郎引錦一匹後魏書曰甄琛為定州刺史既至鄉衣錦晝遊政體嚴細甚無聲譽又曰孝武至彭城宋江夏王義恭獻蠟燭十挺武陵王駿獻錦一匹北史曰齊畢義雲家有十餘機織錦并造金銀器物後周書曰太祖曾在同州與郡公宴集出錦罽及雜綾絹數假命諸將樗蒲取之唐書曰王方慶天后初為廣州都督境內清肅手制褒之曰朕以卿歷職有稱故授此官既美化遠聞實副朝寄令賜卿雜綵六十假并瑞錦等物以彰善政也又曰大曆初代宗詔許宰臣元載王縉及左僕射裴冕戶部侍郎判度支第五琦京兆尹黎幹各出錢三十萬宴郭子儀于子儀私第內侍魚朝恩參其會焉朝恩出錦三十匹羅五十匹綾一百匹為子儀纏頭之費極歡而罷舊俗賞歌舞人以錦綵置之頭上謂之纏頭宴饗加惠借以為詞又曰大曆中代宗勑曰王制命市納賈以觀人之好惡布帛精粗不中度廣狹不中量不鬻於市漢詔亦云纂組文繡害女工也朕思以恭儉克己敦朴化人每尚素玄之服庶齊金土之價而風俗不一踰侈相高浸弊於時其來自久耗縑繒之本資錦綺之奢異彩奇文恣其誇競今師旅未戢黎元不康豈使淫巧之功更虧恆制在外所織造大張錦軟錦瑞錦透背及大𦅘錦竭鑿六硬已上錦獨窠文紗四尺幅及獨窠吳綾獨窠司馬綾等並宜禁斷其長行高麗白錦雜色錦及常行小文字綾錦花文所織盤龍對鳳麒麟師子天馬辟邪孔鵲仙鶴芝草萬字雙勝及諸織差樣文字等亦宜禁斷又曰張萬福為和州刺史賊許果至楚州大掠節度使韋元甫命萬福追討未至淮陰果為其將康自勸所逐自勸擁兵繼掠循淮南東萬福倍道追而殺之代宗發詔以勞之賜衣一襲宮錦十雙又曰太和中賜修指南車記里古人故金忠義男公亮緋衣牙笏錦三十匹范子計然曰錦大丈出陳留列子曰范氏之藏火子華曰若能入火取得錦者從所多少商丘開入火往還而身不燒尸子曰夫繭捨而弗治則腐而棄使工女繅之以為美錦人君朝而服之子思子曰管仲饋錦也雖惡而登朝子産練紫也雖美而不尊孔子家語淮南子曰管仲文錦也雖醜登廟子産練帛也美而不尊管雖不及聖猶文錦也子産先思後去如練帛雖溫不堪為宗廟服抱朴子曰籍孺董鄧猶錦紈之裹麝埃又曰寸錦足以知巧刺鼠足以知勇又曰寸裂之錦黻未若堅完之韋布又曰小文雖巧猶寸錦細碎之珍太公六韜曰夏桀殷紂之時婦人錦繡文綺之坐席衣以綾紈嘗三百人穆天子傳曰吉日甲子天子乃執白圭玄璧以見西王母好獻錦組百純郭璞注曰純匹錦名也組綾屬音祖也西王母再拜受之又曰盛姬之喪天子使襞人贈用文錦漢武內傳曰帝見西王母巾器中有一卷小黃書盛以紫錦之囊帝問此書是仙方耶不審其目可得瞻盻不王母出以示之此五嶽之真形圖也文祕禁豈汝穢質所宜佩王母即命女宋靈賓更取一圖以與武帝靈賓探懷中得一卷盛以雲錦之囊王母起立手以付帝説苑曰魏文侯與田子方語有兩童子衣錦而侍於君前田子曰此君之寵子乎文侯曰非也此其父死於戰此其幼孤也寡人收之潛夫論曰夫攻玉以石治金以鹽濯錦以魚浣布以灰物故有以醜治好者矣郭子橫洞冥記曰元鼎元年起招仙靈閣於甘泉宮西編翠羽麟毫為廉有走龍錦有翻鴻錦西京雜記曰武帝時得二師天馬以玫瑰石為鞍轡鏤以金銀以緑地五色錦為蔽泥王子年拾遺記曰員矯之山名環丘東有雲石廣五百里有蠶長七寸黑色有角鱗以霜雪覆之然後作繭長一尺其色五綵織為文錦入水不濡其質輕暖柔滑又曰周成王時因祗國致工女一人善織以五色絲內口中手引而結之便成文錦其國人來獻有雲崑錦文如雲霞有樓堞有離珠錦文似貫佩珠也有篆隸錦文似大篆字有列明錦文羅燈燭七幅皆廣三尺又曰周靈王起昆昭之臺以享群臣張鸞章錦文如鸞翔又曰吳趙逵之妹善書畫巧妙無雙能於指間以綵絲為雲龍虬鳳之錦大則盈尺小則方寸神仙傳曰淮南王為八公張錦綺之帳燔百和之香又曰左慈字元放廬江人少有神道嘗在魏武帝坐帝曰恨無蜀中生薑耳放曰亦可得也因曰吾前遣人到蜀買錦可過勑使者增市二端須臾即得薑還并獲使報華陽國志曰閻憲字孟度成都人名知人為綿竹令以禮讓化民莫敢犯者有民杜成夜行得遺賄一囊中有錦二十匹求其主還之曰縣有明君何敢負也陳留風俗傳曰襄邑縣南有渙水北有睢水傳曰睢渙之間文章故有黼黻藻錦日月華蟲以奉天子宗廟御服焉異物志曰錦鳥文章如丹地錦而藻繢互交俗人見其似錦因謂之錦鳥鄴中記曰石虎冬月施熟錦流蘇斗帳四角安純金龍頭銜五色流蘇或用黃地博山文錦或用紫綈及小明光錦又曰織錦署在中尚方大登高小登高大明光小明光大博山小博山大茱萸小茱萸大交龍小交龍蒲桃文錦班文錦鳳皇錦朱雀錦韜文錦桃核文錦丹陽記曰鬭場錦署平關右遷其百工也江東歷代尚未有錦而成都獨稱妙故三國時魏則布於蜀而吳亦資西道語林曰陳元方遭父喪骨立其母愍之以錦被蒙其上郭林宗往弔見而責之賓客絶百許日世説曰石崇錦步障四十里左思蜀都賦曰貝錦斐成濯色江波古詩曰錦衾遺洛浦同袍與我違夏侯孝若集羊太常辛夫人傳曰夫人字憲英衛尉肅侯毗之女不好華麗琇上夫人子帔緣以錦不肯服從外孫胡母楊上夫人錦被夫人反臥之諸葛亮集曰今民貧國虛決敵之資唯仰錦耳張溫表曰劉禪送臣溫孰錦五端魏武與楊彪書曰今贈足下錦裘二領繡尚書益稷曰子欲觀古人之象藻火粉米黼黻絺繡尚書大傳曰未命為士得衣繡毛詩終南曰君子至止黼衣繡裳又楊之水曰素衣朱繡從子于鵠鵠曲沃邑也鵠音沃又九罭曰九罭美周公也我遘之子袞衣繡裳周禮秋官下小行人曰合六幣琮以錦琥以繡又冬官上畫繢曰五采備謂之繡禮記月令曰仲秋之月命有司文繡有恆必修其故左傳閔公曰狄伐衛公與石祁子玦寧莊子矢曰以此贊國擇利而為之與夫人繡衣曰聽於二子春秋潛潭巴曰天子文繡布地必動絶無嗣釋名曰繡修也文修然也史記曰范睢説昭王曰秦韓之地形相錯如繡又曰文帝所幸慎夫人令衣不得曳地帷不得文繡以示敦朴又曰楚莊王有愛馬衣以文繡漢書曰廣川王去后昭信譖姬榮愛視瞻意態不善疑有私時愛為王刺方領繡晉灼注曰今婦人直領為方領上刺作黼黻文也去取燒之又曰齊織作繡宣帝時呼韓邪單于來賜帛繡綺八千匹又曰武帝詞太一祝宰衣紫及繡又曰江充使胸奴拜直指繡衣御史使督三輔又曰暴勝之為直指使者衣繡持斧逐捕盜賊威震州郡又曰罽賓刺文繡又曰刺繡文不如倚市門此言末業貧者之資也又曰霍光薨贈絮繡被百領又百官表曰侍御史有繡衣直指武帝所制東觀漢記曰更始遂共謀誅百升乃大會諸將以成其計更始取伯升寶劍視之繡衣御史申屠建隨獻玉玦更始竟不能發又曰李忠獨不掠財物上曰我欲賜之諸君無望乎取大驪馬及繡被以賜忠魏志曰張既為尚書出為雍州刺史太祖謂既曰還君本州可謂衣繡晝行矣魏略曰大秦國有金縷繡色綾其國利得中國絲素解以為胡陵晉中興書曰中宗所幸鄭夫人衣無文繡後魏書曰王憲為并州刺史還京師以憲年老特賜錦繡布帛珍羞禮膳管子曰桀女樂三萬人無不服文繡衣裳也墨子曰古之人未知為衣服衣皮帶茭今則厚斂百姓以錦繡文彩靡曼衣范子計然曰能繡細文出齊上價匹二萬中萬下五千也孫卿子曰天子尊重無上矣衣被則五綵雜間色重文繡莊子曰楚聘莊子莊子曰子不見夫犧牛乎衣以文繡入於太廟雖欲為孤犢其可得乎淮南子曰繡為被則宜為冠則議國語齊桓公曰昔吾先君襄公陳妾數百食必梁肉衣必文繡帝王世紀曰紂不服短褐處於茅屋之下必將衣繡遊於九重之臺賈誼曰繡是古天子之服今富人大賈嘉會召客以被牆屋説苑曰晉平公使叔向聘吳吳人飾舟以送之左百人右百人有繡衣而豹裘者有錦衣而狐裘者歸以告平公平公曰吳其亡乎又曰鄂君乘青翰之舟張翠蓋越人擁楫而歌曰心悅君兮君不知於是鄂君舉繡被而覆之楊子法言曰今之學也非獨為華藻又從而繡其鞶悅喻今學煩多也鹽鐵論曰古庶人老耄而後衣絲其餘則麻枲而已故命曰布衣今富者綺繡羅紈素綈水綿論衡曰齊郡能刺繡恆女無不能者襄邑能織錦恆婦無不巧者目見而手狎也又曰刺繡之師能縫帷裳網縷之工不能織錦儒生能為文吏文吏不能為儒生也文吏一旦在位則鮮冠利劍一歲典職則田宅併集又曰繡之未刺錦之未織絲帛何以異哉反其加五采之功施針縷之飾則文章煥耀學士有文章其猶絲帛布色之功桓談新論曰陽城子張名衡蜀郡人王翁與吾俱為講樂祭酒及寢疾預買棺槨多下錦繡立被發冡崔贛易林離之大過曰被繡夜行不見文章安坐玉堂乃無咎殃洞冥記曰甘泉有霞光繡藻龍繡連煙繡王子年拾遺記曰孔子生之夕有麟吐玉書於闕里人家乃以繡紱繫麟角而去又曰吳主孫權常歎魏蜀未夷軍旅之隟思得善畫者使圖作山川地形軍陳之象趙夫人曰丹青之色昜歇滅不可為久寶妾能刺繡作列國圖於方帛上寫五嶽河海城邑行陳之形進於吳主時人謂之針絶吳越春秋曰吳主時人謂之鈄絶吳越春秋曰吳王死辭曰不忍見伍子胥吾死必結璧連組以幕吾目恐其不蔽即復重羅繡三㤿以為奄明生不昭我身死不見我形吾何言哉物理論曰世傳有夫死而婦許以不嫁者誓以繡衣禭以衣尸納諸棺焉後三年婦出適迎有日矣有行道人夜求人家宿向晨主人語之婦約之辭寄所誓之衣曰子到若千里當逢之還此衣焉或者出門到所言處果見迎車具以事告還其繡衣婦遂自經而死又曰夫論事比類不得其體雖飾以華辭文以美言無異錦繡衣掘株管弦樂土梗非其趨也世説曰曹植妻衣繡太祖登臺見之以違制命還家賜死戒經六禽變曰寅為衣裳文繡夢書曰錦繡為憂事有文章夢得錦繡憂縣官也班固詩曰長安何紛紛詔葬霍將軍刺繡被百領縣官給衣衾張衡四愁詩曰美人贈我錦繡假何以報之青玉案班固與竇將軍箋曰固於張掖縣受賜虎頭繡鞶囊一雙慕容朝與顧和書曰今致繡鞾一量
