body:
  text: 宗親部十一慈母保母禮記內則曰子生異為孺子室於宮特掃一室以處之擇於諸母與可者必求其寬裕慈惠溫良恭敬慎而寡言者使為子師其次為慈母其次為保母皆居子室此人君養子之禮也諸母眾妾也可者傳御之屬也子師教示以善道者慈母知其嗜欲者保母安其居處者士妻食乳之而已又曾子問曰子游曰喪慈母如母禮與如母謂父卒三年也孔子曰非禮也古者男子外有傅內有慈母君命所使教子也何服之有言無服也昔者魯昭公少喪其母有慈母良及其死也公弗忍也欲喪之有司以聞曰古之禮慈母無服今也君為之服是逆古之禮而亂國法也若終行之則有司將書之以遺後世無乃不可乎公曰古者天子練冠以燕居吾弗忍也遂練冠以喪慈母喪慈母自魯昭公始也左傳襄六曰宋大災宋伯姬卒侍姆也姆女師也乳母史記曰武帝時有所幸倡郭舍人者發言陳辭雖不合道然令人主和悅武帝少時東武侯母嘗養帝帝壯時號曰大乳母率一月再朝朝奏入有詔使幸臣馬遊卿以帛五十疋賜乳母有詔得令乳母乘車行馳道中當此之時公卿大臣皆敬重乳母乳母家子孫奴從者橫暴長安中當道掣頓人車馬奪人衣服聞於中不忍致之法有司請徙乳母家室處之於邊奏可乳母當入至前面見辭乳母先見郭舍人為下泣舍人曰即入見辭去勿疾步數還顧乳母如其言謝去郭舍人疾言罵之曰咄老女子何不疾行陛下已壯矣寧尚須汝乳而活耶於是武帝憐之乃下詔止無徙乳母後漢書曰安帝時鄧太后臨朝帝不親政事小黃門李閏與帝乳母王聖嘗共譖太后兄執金吾鄧悝等言欲廢帝立太原王德帝每忿懼及太后崩遂誅鄧氏而王聖女伯榮扇動內外競為侈虐明年帝崩立北鄉侯為天子王聖及黨與皆見徙王隱晉書曰賈充子黎民三歲乳母抱向閤充入黎民喜踊充嗚之充夫人郭槐遙望疑充即鞭殺乳母兒思母病死槐又生男向歲乳母抱中庭充過拈兒頰郭又疑之復鞭殺乳母兒又死充遂無嗣譚藪曰宋何承天為著作郎時新著作多貴遊少年或戲承天謂為妳母承天曰鳳凰將九子妳母何言耶妾禮記曲禮曰買妾不知其姓則卜之又內則曰聘則為妻奔則為妾妾之言接也聞佼有禮走而往馬以得接見於君子又曰妾雖老年未滿五十必與五日之御雖婢妾衣服飲食必後長者妻不在妾御莫敢當夕辟女君之御曰也妾將生子及月辰夫使人日一問之左傳成上曰魯聲伯之母不聘不娉無媒禮穆姜曰吾不以妾為姒昆弟之妻相謂為姒生聲伯而出之又昭五晏子對齊景公曰內寵之妾肆奪於市外寵之臣僣令於鄙又哀下曰魯公子荊之母嬖荊哀公庶子將以為夫人使宗人亹夏獻其禮宗人禮官對曰無之公怒曰女為宗司立夫人國之大禮也何故無之對曰周公及武公娶於薛孝惠娶於商自桓以下娶於齊此禮也則有若以妾為夫人則固無其禮也出婦禮記檀弓曰子上之母死而不喪子上孔子曾孫子思伋之子名白其母出門人問諸子思曰昔者子之先君子喪出母乎曰然禮為出母期父卒為文後者不服耳子之不使白也喪之何也子思曰昔者吾先君子無所失道道隆則從而隆道污則從而污污猶殺也有隆有殺進退如禮伋則安能自予不能及為伋也妻者是為白也母不為伋也妻者是不為白也母故孔氏之不喪出母自子思始也又內則曰子甚宜其妻父母不說出宜猶善也漢書曰王吉少時學問居長安其東家有大棗樹垂庭中吉婦取棗以啖吉吉後知之乃去婦東家聞而伐其樹鄰里共止之因固請吉令還婦里中為之語曰東家有樹王陽去婦東家棗完去婦復還又曰王禁生元后元后母魏郡李氏女也後以妒去更嫁為河內荀賓妻後漢書曰馮衍娶北地女任氏為妻悍忌不得畜媵妾兒女常自探井臼老竟逐之又曰黃允濟陰人也以雋才知名郭林宗見而謂曰卿有絕人之才足成偉器然恐守道不篤將失之矣後司徒袁隗欲為從女求姻見允而歎曰得婿如是足矣允聞而黜遣其妻夏侯氏婦請姑曰今當見棄方與黃氏長辭乞一會宗屬以展離訣之情於是大集賓客二百餘人婦中坐攘袂數允隱慝穢惡十五事言畢登車而去允以此廢於時又曰李充字大遜家貧兄弟六人同衣遞食妻竊謂充曰今貧居如此難以久安願思分異充偽許之曰當醞酒具會請呼鄉里內外充於坐中前跪白母曰此婦無狀而教充離間母兄罪合遣斥便呵叱其婦遂令出門婦銜涕而去齊書曰劉瓛母孔氏瓛娶王氏緣壁挂履土落孔氏床上孔氏不悅瓛即出其妻梁書曰孔謙從兄靈慶嘗病寄於謙謙出行還問起居靈慶曰向飲冷熱不調即時猶渴謙退遣其妻家語曰婦有七出三不去七出者不順父母無子淫僻嫉妒惡疾多口舌竊盜不順父母者為其逆德也無子者為其絕世也淫僻者為其亂族也嫉妒者為其亂家也惡疾者為其不可供粢盛也多口舌者為其離親也竊盜者為其反義也三不去者謂有所取無所歸也與其經三年之喪也先貧賤後富貴也凡此皆聖人所以慎男女之際重婚姻之始也又曰曾子妻以炊藜蒸不熟出之古樂府詩曰上山採蘼蕪下山逢故夫迴首問故夫新人復何如舅舅母釋名曰舅久也爾雅曰母之昆弟為舅毛詩秦風曰渭陽康公念母也康公之母晉獻公之女文公遭麗姬之難未反而秦姬卒穆公納文公康公時為太子贈送文公于渭之陽念母之不見也我見舅氏如母存焉及其即位思之而作是詩也我送舅氏曰至渭陽何以贈之路車乘黃我送舅氏悠悠我思何以贈之瓊瑰玉佩儀禮曰舅母之昆弟也傳曰何以服緦從服也言從母服也禮記檀弓曰從母之夫舅之妻二夫人相為服君子未之言也左傳僖中曰秦伯納晉公子重耳及河子犯以璧授公子曰臣負羈紲以從君巡於天下臣之過多矣臣猶知之而況君乎請由此亡公子曰所不與舅氏同心者有如白水授其璧於河又曰庾懌嘗以毒酒餉江州剌史王允之允之覺其有毒飲犬犬斃乃密奏之帝曰大舅已亂天下小舅復欲爾邪懌聞飲酖而卒又曰劉璵字慶孫與弟琨字越石並為尚書郎郭弈之甥也名著當時京師為之語曰洛中弈弈慶孫越石又曰荀勗頴川人少孤貧依於舅氏幼而歧嶷早成十歲能屬文鍾繇曰此兒當及曾祖爽耳又曰殷浩坐徙東陽信安縣外甥韓康伯浩素賞愛之隨至徙所經歲還都浩送至渚側詠曹顏遠詩曰富貴他人合貧賤親戚離因而下泣又曰衛玠字叔寶驃騎將軍王濟玠之舅也雋爽風姿每見玠輒歎曰珠玉在旁覺我形穢又曰郤愔字方回與姊夫王羲之有邁世之風獻之兄弟愔子超未亡時獻之兄弟嘗躡履脩甥舅之禮及超死見愔怠慢履而候之命席便坐愔慨然曰嘉賓不死鼠子敢爾又曰武帝楊后諱豔字瓊芝弘農人母天水趙氏早卒依舅家舅母仁愛親乳之使他人乳己子世說曰衛展字道舒為江州有舊投之都不祗待唯餉王不留行一斤此人便命駕李弘範聞之曰家舅刻薄反役使卉木也又曰魏明帝為外祖築館既成謂左右曰當何名之侍中繆襲曰陛下聖思齊於哲王罔極過於曾閔此館之興情鍾舅氏宜以渭陽名焉上從之妬記曰謝太傅劉夫人不令太傅有別房寵公既深好聲色不能全節遂頗欲立妓妾兄子及外甥等微達其旨乃共諫劉夫人方便稱關睢螽斯有不妒忌之德夫人知諷己乃問誰撰詩荅曰周公夫人曰周公是男子乃相為耳若使周姥傳應無此語也蔡邕進表曰平丘程末年十四時父叔沒末抱屍號泣悲哀舅哀其贏劣嚼棗肉以哺之末見食歔欷不能吞咽外甥釋名曰姊妹之子曰甥出配他男而生也爾雅曰男子謂姊妹之子為出謂我舅者吾謂之甥也儀禮子夏傳曰甥何以緦報之也左傳莊公曰楚文王伐申過鄧鄧祁侯曰吾甥也止而享之騅甥聃甥養甥請殺楚子鄧侯不許三甥曰亡鄧國者必此人也若不早圖後君噬臍其及圖之乎史記曰汲黯字辰孺濮陽人司馬安是其姊子與黯同為太子洗馬漢書曰霍去病衛青姊少兒子也又曰顏安字翁孫魯人眭孟姊子也東觀漢記曰黃香字文強年十二家業虛貧衣食不贍舅龍鄉侯為作衣被不受晉書曰魏舒少為舅甯氏所養甯氏營宅相者云當出貴甥舒時尚幼自言曰當為外氏成此宅相又曰石崇字季倫其甥歐陽建與趙王倫有隙倫偽詔收崇及建建作臨終詩又曰謝重字景重子約字宣暎曾於公座戲嘲無禮於其舅袁湛湛謂曰汝父昔已輕舅今汝復來加我可謂兩世無渭陽之情約父重即王敬之外孫與舅有不恊之論湛故有此云又曰范汪少孤年六歲過江依外家庾氏荊州剌史王澄見之曰興范族者必此子也十三喪母居喪盡禮及長好學博識多通善談名理又曰韓康伯清和有思舅殷浩曰康伯能自摽置居然是出群器也又曰何無忌東海郯人少有大志鎮北將軍劉牢之即其舅也時鎮京口每有大事皆參議之桓玄之篡與劉裕劉毅共興義兵桓玄聞之甚懼其黨曰烏合之眾勢必無成玄曰劉裕勇冠三軍劉毅家無擔石之儲摴蒱一擲百萬何無忌劉牢之甥酷似其舅共舉大事何為無成又曰姚興太史令高魯遣其甥王蒙暉隨劉藻送玉璽一鈕并圖讖祕文於慕容德吳均齊春秋曰劉瓛字珪沛人五歲聞舅孔昭先讀管寧傳欣然請更讀因聽受曰可及此耳三輔決錄曰吉閎幼有美名九歲明尚書舅何邈死家貧子幼閎自造墳塋殯葬之衛玠別傳曰玠王武子甥也武子常與乘白羊車入市舉市曰誰家璧人曰武子甥也武子常與同遊語曰昨與外甥玠並出冏若明珠在側朗然來照人姨爾雅曰母之姊妹為從母儀禮曰從母丈夫婦人服從母母之姊妹傳曰何以小功也以名加也外親之服皆緦之外親異姓正服不過緦晉書曰何充字次道廬江人王導妻姊之子故少與王導善早為顯官嘗詣舍導以塵尾指床呼充共座曰此是君座也宋書初高祖產而皇妣殂孝皇貧薄議欲不舉高祖從母生懷敬未朞乃斷乳而養高祖以舊恩之故懷敬累至會稽太守三輔決錄曰周季貢班固姊之子也善屬文喪婦作問神其姨曹大家難之
