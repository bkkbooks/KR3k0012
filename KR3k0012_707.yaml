body:
  text: 服用部八床許慎說文曰床身之安也釋名曰床裝也所以自裝裁也方言曰床齊魯謂之簀陳楚之間謂之第音滓一音姊北燕朝鮮謂之樹秦晉之間謂之杠南楚越東齊海岱之間謂之𦇗音詵謂之北郊趙魏之間謂之牒易曰初六剝床以足薎貞凶象曰剝床以足以滅下也六二剝床以辨薎貞凶象曰剝床以辨未有與也六四剝床以膚凶象曰剝床以膚切近災也又曰巽在床下象曰巽在床下上窮也詩曰乃生男子載寢之床禮曰曾子寢疾樂正子春坐於床下曾元曾申坐於足童子隅坐而執燭童子曰華而睆大夫之簀與華蓋也簀床第也曾子曰然斯季孫之賜也我未之能易也元起易簀命元起也曾元曰夫子之病革音棘矣不可以變幸而至於旦請敬易之曾子曰爾之愛我也不如彼君子之愛人也以德細人之愛人也以姑息吾何求哉吾得正而斃焉斯已矣舉扶而易之反席未安而沒左傳曰齊無知弒其君殺孟陽于床注云陽小臣代公居床事具逐門又曰楚子圍宋宋人懼使華元夜入楚師登子反之床曰寡君使元以病告又曰夏子庾卒楚子使薳子憑為令尹訪於申叔豫叔豫曰國多寵而王弱國不可為也遂以疾辭方暑掘地下冰而床焉重繭衣裘鮮食而寢楚子使醫視之復曰瘠則甚矣而血氣未動乃使子南為令尹周禮曰玉府掌王之袵席床第國語曰晉獻公寢而不寐郤叔虎曰床第之不安耶驪姬之不側耶戰國策曰孟嘗君至楚獻象床郢之登徒直送之不欲行見孟嘗君門人公孫戍曰象床之直千金傷此若髮標賣妻息不足以償足下能使僕無行先人有寶劍願獻之戍曰諾范曄後漢書曰袁術僣號人情離叛欲北至青州曹操使劉備邀之至江寧坐簀床而歎曰袁術乃至於此乎歐血而死又曰向栩性卓詭常於竈北坐板床上如是績久板乃有膝踝足指之處又曰羊茂自季寶為東郡太守冬日坐百羊皮夏月坐一榆木板床蔬食出界買鹽豉食之又曰薛淳為漢中太守夏但坐板床不設席冬坐羊皮河內高弘為琅琊相亦然也魏志曰陳登字元龍許汜與劉備並在荊州牧劉表坐汜曰陳元龍河海之士豪氣不除備問汜君言豪有事耶汜曰昔遭亂過下邳見元龍元龍無主客之意不相與語自上床臥使客臥下床備曰君有國士之名今天下大亂帝王失所望君憂國忘家有濟世之意而君求田問舍言無所采是元龍所諱何緣當與君語如小人欲臥百尺樓上臥君於地下何但上下床之間耶表大笑晉書曰武帝會宴凌雲臺衛瓘託醉因跪帝床前曰臣欲有言因以手撫帝床曰此座可惜帝意乃悟因謬曰公真大醉也瓘於此不復言又曰齊獻王攸特為文帝所寵愛每見攸輒撫床呼其小字曰此桃符坐也幾為太子者數矣又曰中宗元帝既登尊號百官陪列詔王導升御床共座導固辭曰太陽下同萬物蒼生何由仰照中宗乃止又曰陶淡字起靜好道養年十五六便絕穀設小床常獨坐不與人共又曰太尉郤鑒使人求女婿於王導問令就東廂遍觀諸子使者歸謂鑒曰王氏諸少年並佳然聞信至咸自矜持唯一人在東床坦腹而食獨若不聞鑒曰正此佳婿訪之乃逸少也遂以女妻之又曰桓玄從荊州下都篡位所坐御床忽陷殷仲文進曰將由聖德淵重厚地不能載玄大悅燕書曰公孫鳳隱於昌黎九城寢於土床也沈約宋書曰武帝初開國有司奏東西堂施局腳床銀塗釘上不許使用直腳床釘用鐵也又曰江湛為元凶劭所害初湛家數見怪異未敗之日所眠床忽有數斗血又曰王微不仕元凶之變微尋書玩古遂至足不履地終日端坐床皆生埃唯當坐處獨淨又曰羊戎好為雙聲江夏王義恭嘗設齊使戎布床須臾王出以床狹乃自開床戎曰官家恨狹更廣七寸王笑曰卿豈唯善雙聲乃辨士也又曰張敷為中書舍人狄當周赳善管要務以敷同省名家欲詣之赳曰彼若不相容接便不如不往詎可輕行當日吾等並已員外郎矣何憂不得共坐敷先設二床去壁三四尺二客就席數呼左右曰移我遠客赳等失色而去其自摽遇如此又曰王僧達大明中以歸順功封寧際縣五等侯遷中書舍黃門郎路瓊之太后兄慶之孫也宅與僧達門並嘗盛車服詣僧達僧達將獵已改服瓊之就坐僧達了不與語謂曰身昔門下騶人路慶之者是何親遂焚瓊之所坐床齊書曰紀僧真幸於武帝稍歷軍校容表有士風謂帝曰臣小人出自本縣武史遭逢聖時陛勞至此為兒婚得荀昭先女即時無復所須唯就陛下乞作士大夫帝曰江斅謝𤅢音藥我不得歷此意可自詣之僧真承旨斅登榻坐定斅便命左右曰移吾床讓客僧真喪氣而退之又曰虞愿除後軍將軍禇彥回詣愿不在見其眠床上積塵埃有書數卷彥回歎曰虞君之清乃至於此令人掃地拂床而去又曰竟陵王子良為會稽郡閤下有虞翻舊床罷任還乃致以歸後於西邸起古齊多聚古人器服以充之又曰少帝夜醉蕭坦之與曹道劉挾抱還延昌殿置玳瑁床上梁書曰侯景既篡位聞義師轉近猜忌彌深床前蘭錡自遶然後見客又曰長沙王懿孫植性恬靜獨處一室床有膝痕宗室衣冠莫不階則又曰兼弘性奢侈侍妾百餘人不勝金翠服翫車馬皆一時之絕有眠床一張皆是蹙柏四面周匝無一有異通用銀鏤金花兩重為腳也又曰賀革字文明少以家貧躬耕供養年二十如輟耒就父受業精力不怠有六尺方床思義未達則橫臥其上不盡其義終不肯食又曰西域龜茲等國其王坐金床隨太歲轉與妻並坐接客後魏書曰魏收讀書夏月坐板床隨樹陰諷誦積年床版為之銳減而精力不輟又曰韓務除龍驤將軍郢州剌史獻七寶床象牙席唐書曰貞觀十八年召三品已上賜宴於玄武門太宗操筆作飛白書群臣乘醉就太宗手中相競散騎常侍劉洎登御床引手然後得之其不得者咸稱洎登床罪當死請付法太宗笑曰昔聞婕妤辭輦今見常侍登床莊子曰驪姬之父封人之子晉國之始得也日涕泣沾𥘞及其與同匡床食芻養而後悔其涕泣也商君書曰明者無所不見人主處匡床之上而天下治論衡曰孔子將死遺祕書曰不知何一男子自謂秦始皇上我堂踞我床世本曰紂為玉床南方志曰南方老人以龜支床及老人亡舁床龜尚活天文集曰紫宮門外有天床六星東宮舊事曰太子有素柏局腳床七具漢武帝內傳曰武帝受西王母真刑六甲雲飛十二事帝盛以黃金封以白玉函珊瑚為床紫錦為帷安著柏梁臺上皇甫謐高士傳曰老萊子隱蒙山之陽支木為床神仙傳曰衛叔卿入華山有紫雲鬱鬱白玉為床真人周君傳曰周義山字季通令會仙人在金屋太室以彩玉為床馬明先生別傳曰明生隨神女還岱宗石室中金床玉几西京雜說曰武帝為七寶床雜寶屏風別寶帳設於柱宮中時人謂為寶宮又曰昭陽殿設玉床又曰韓嫣以玳瑁為床拾遺錄曰董偃常臥延清之室畫石為床石文如畫體甚輕出郅支國上設紫瑠璃帳火齊屏風又曰石季倫屑沉水之香如塵沬布置象床上使所愛者踐之無跡則賜真珠百琲珠百枚曰琲若有跡者則節其飲食令體弱故閨中相戲曰爾非細骨輕軀那得百琲真珠又曰頻斯國有楓林林東有大石室可容萬人坐壁上剋為三皇之像天皇十二頭地皇一十一頭人皇九頭皆龍身亦有膏燭之處緝石為床床上有膝痕深二三寸衡山記曰仙人室中有黃玉床盛弘之荊州記曰長沙郡有賈誼所穿井旁局腳石床一床可容一人坐其形古制傳云誼所坐床也西征記曰金鄉焦氏山北有漢司隸校尉曾峻塚前有石床長八尺瑩摩鮮明叩之即鳴時太尉從事中郎傅珍之諮議參軍周室穆折石床各取一頭為曾氏之後所訟鄴中記曰石虎御床辟方三丈其餘床皆局腳高下六寸後宮別坊中有小形玉床又有轉關床射鳥獸異物志曰麡齎柴二音狼狀如麋而角向前入林則得之角正四據人因以作踞床異苑曰沙門支法存有八尺沉香板床剌史王淡息切求不與遂殺而籍焉籍沒也後息疾法存出為崇也世說曰袁紹年少時曾夜以劍遣人擲魏武小下不著帝揆其後必高因帖臥床劍至果高語林曰簡文為撫軍時所坐床上塵不聽左右指見鼠行跡視以為佳雜五行書曰凡安床東首貧賤疾病西首富南首貴北首死兵書曰將坐床無故自動下欲害之夢書曰夢床所壞者為憂妻也曹植九詠曰蕙幬兮荃床柴子太七折曰下莞上簟華鏤之床劉禎績慮賦曰布玳瑁之蓆設觜蠵觜蠵大龜也蠵音惟之床馮玫瑤之几對金精之盤李尤臥床銘曰體之所安寢處之歡夕則敬慎崇德遠姦榻堅床銘曰體之所安寢處知歡久則敬慎崇德遠姦釋名曰長狹而卑曰榻言其榻然近地也小者坐主人無二獨所坐也謝承後漢書曰徐稺字孺子豫章人陳蕃為太守不接賓客唯稺來特設一榻去則懸之又曰周璆字孟玉陳蕃為太守璆來置一榻去則懸之也蜀志曰簡雍性簡傲佚蕩自諸葛亮以下則獨擅一榻須枕臥語無所為屈吳志曰周瑜薦魯肅孫權引肅合榻對飲言議宋議書曰當陽侯劉彥節既貴士子自非三署不得上方榻時以此少之又曰顏延之為祕書監光祿勳太常時沙門釋惠林以才學為文帝所賞朝廷政事多與之謀遂士庶歸仰上每引見常升獨榻延之甚嫉焉因醉曰昔子同驂乘表絲正色此三台之座豈可使刑餘居之上變色又曰五瞻字明遠一字叔鸞負氣慠俗好貶裁人物仕宋為王府參軍常詣劉彥節直登榻曰君侯是公孫僕是公子引滿促膝唯余二人彥節外雖酬之意甚不悅齊書曰孔休源字慶緒愽學為晉安王府長史甚得人譽王深相倚仗常於中齋別施榻云此是孔長史坐人莫得預焉其見敬如此馬魏書曰元順為吏部尚書右僕射上省登階向榻見榻甚故問都令史徐忤起曰此榻曾見先王坐順即哽塞涕泗交流久而不能言遂令換之梁書曰臨汝侯猷為益州頗僣濫客筵內遂有香燈都稜切不置連榻武帝知之以此為僣還都以憂愧成疾卒唐書曰玄宗命太常韋縚讀時令每月一篇每孟月朔日上御宣政殿側置一榻東置面案令韋縚坐而讀之又曰李峴為相元載於政事堂置榻邀宣事中官坐峴至叱左右去榻唐高士傳曰管寧自越海及歸常坐一木榻積五十餘年未嘗箕服榻上當膝處皆穿郭子曰杜預拜鎮南將軍朝士悉至客皆在連榻于稚舒後至曰杜元凱復以連榻坐客不坐便去列仙傳曰脩羊公者魏人也止華陰山石室有懸石榻臥其上石盡穿陷胡床風俗通曰靈帝好胡床董卓權胡兵之應也魏志曰裴潛為兗州剌史常作一胡床及去官留以掛柱齊書曰張景真僣侈武帝拜陵還景真白服乘舴猛坐胡床觀者咸疑是太子梁書曰武帝軍至新林楊公則自越城移此領軍府壘北樓與南掖門相對嘗登樓望戰城中遙見麾蓋縱神鋒弩射之矢貫胡床左右皆失色公則曰虜幾中吾腳談笑如初又曰侯景既篡位時著白紗帽而尚披青袍頭插象牙梳殿上常設胡床及荃蹄著鞾垂腳坐北齊書曰武成胡后與沙門曇獻通布金錢於獻席下又掛寶裝胡床於獻屋壁武成平生之所御者也庾肩吾賦胡床詩曰傳名乃外域入用信中京足欹形已正文邪體自平臨堂對遠客命旅誓初征
