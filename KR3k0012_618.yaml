body:
  text: 學部十一談論史記儒林傳云清河王太傅轅固以治詩孝景時為博士與黃生爭論黃生曰湯武非受命乃弒也轅固曰不然桀紂虐亂天下之人心歸湯武湯武誅桀紂非受命謂何黃生曰冠雖斃必加於首履雖新必關於足何者上下之分也今桀紂雖失君上也湯武雖聖臣下也臣下不能匡過以尊主而誅伐非弒而何轅固曰必若云是高祖伐秦耶於是帝曰食肉不食馬肝不為不知味也學者不言湯武受命不為非也漢書儒林傳曰武帝時江公與董仲舒並通五經能持論善屬文江公訥於口上使與舒議不如仲舒又曰揚雄為人簡易佚蕩不能劇談而好深沉之思也又曰賈生徵見孝文帝方受釐坐宣室上因鬼神事而問鬼神之本賈具道所以然之狀至夜半帝前席既罷曰吾久不見賈生自以過之今不及也東觀漢記曰尹敏與班彪相厚每相與談常奠案不食晝即至暝夜即徹旦晉書曰潘京字世長舉秀才到洛尚書令樂廣京州人也共談纍日深歎其才謂京曰君天才過人恨不學耳若學必為一代談宗京感其言遂勤學不倦時武陵太守戴昌亦善談論與京共談假借之昌以為不如己笑而遣之令過其子若思京方極其言論昌竊聽之乃歎服曰才不可假遂父子俱辱焉又曰郭象字子玄少有才理好老莊能清言太尉王衍每云聽象語如懸河瀉水注而不竭又曰樂廣嘗與裴顧清言欲以理服之而顧辭論豐博廣笑而不言時人謂顧為言談林藪又曰朝賢嘗上已禊飲或問王濟昨遊有何言談濟曰張華善說史漢裴頠論前言往行靡靡可聽王戎子房季扎之間超然玄著又曰王衍妙善玄言唯談老莊為事每捉玉柄塵尾與手同色義理有所不安隨即改更世號曰口中雌黃朝野翕然謂之一世龍門矣又曰胡母輔之字彥國與王澄等為友澄嘗與人書曰彥國吐佳言如鋸木屑霏霏不絶誠為後進領袖也又曰趙孟字長舒為尚書都令史善於清談其面有疵黯時人言諸事不決皆當問疵面又曰裴遐善言玄理音辭清暢泠然若琴瑟嘗與河南郭象談論一座嗟服又曰殷仲堪能清言每云三日不讀道德論便覺舌本間強晉中興書曰殷浩弱冠與京兆杜人並有美譽善言玄理又庾元規少好黃老能言玄理時人方之夏侯泰初又曰謝奕女道韞王凝之妻也凝之弟獻之嘗與賓客談議辭理將屈道韞遣婢白獻之曰欲為小郎解圍乃以青綾步障自蔽申獻之前義客不能屈又曰孫盛年十歲避難渡江及長博學善理于時殷浩擅名一時與抗論者唯盛嘗詣浩談論對食奮尾毛悉落飯中食冷而復暖者數四至朞忘食理竟不定沈約宋書曰高祖少事戎旅不經涉學及為宰相頗慕風流時或談論人皆依違不敢難也鄭解之難必切至未嘗假借要須高祖辭窮理屈然後置之高祖或時慚恧變色動容既而謂人曰我本無術學談義尤淺比時言論諸賢多見寬容唯鄭不爾獨能盡人之意甚以此感之時人謂之格佞宋書曰謝靈運辨博辭義鋒起王惠嘗與之談時然後言時荀伯子在座退而告人曰靈運固自蕭散直上王郎有如萬頃陂焉又曰謝瞻傳曰靈運好臧否人物混患之欲加裁折未有其方謂瞻曰非汝莫能乃與晦曜引微等共遊戲便使瞻與靈運共車靈運登車便商較人物瞻謂曰祕書早亡談者亦互有同異靈運默然言論自此衰止又曰張敷好讀玄言兼屬文論弱冠初父邵使與高士南陽宗少文談繫象往復數番少文欲屈握塵尾歎曰吾道東矣於是名價日重後周書曰蘇綽屬太祖與公卿往昆明池觀漁行至城西漢故倉地顧問左右莫有知者或曰蘇綽博物多通請問之太祖乃召綽具以狀對太祖大悅因問天地造化之始歷代興亡之跡綽既有口辨應對如流太祖益喜乃與綽並馬徐行至池竟不設網罟而還遂留綽至夜問以治道太祖臥而聽之綽於是指陳帝王之道兼述申韓之要太祖乃起整衣危坐不覺膝之前席語遂達曙不厭詰朝謂周惠達曰蘇綽真奇士也又曰裴文舉字道𥙿少忠謹涉獵經史總管韋孝寬特相欽重每與談論不覺膝前於席又曰寇俊字祖俊上穀平昌人也世宗尚儒重德特欽賞之與相見同席而坐因顧訪洛陽故事俊容止端詳音韻清朗帝與之談不覺為之前席齊書劉繪傳曰永明末都下人士盛為文章談義皆湊竟陵西邸繪為後進領袖時張融以言辭辨健周顒稱為清綺而繪音采贍麗雅有風則時人為之語曰三人共宅夾清漳張南周北劉中央言其處二人間也又曰張緒性清談善談玄王儉嘗云緒過江所未有北土可求之耳不知陳仲弓黃叔度能過之不三國典略曰陳袁憲樞之弟也幼聰敏好學梁武帝修建庠序別開五館其一館在憲宅西常招引諸生與之談論每有新義出人意表國子博士周弘正謂憲父君正曰賢子今茲欲策試不君正曰經義猶淺未敢令試居數日君正遣門下客岑文豪與憲候引正將登講座弟子畢集乃授憲塵尾時謝歧何妥在坐弘正謂曰二賢雖窮奧賾得無憚此後生耶何謝起義端憲酬對間敏神色自若弘正因謂文豪曰卿還咨袁吳郡此郎已堪見代為博士矣梁書曰沈約齊初為征虜記室帶襄陽令所奉主即齊文惠太子太子入居東宮為步兵校尉管書記時東宮多士約特蒙親遇時王侯列宮或不得進約每以為言太子曰吾生平懶起是卿所悉得卿談論然後忘寢卿欲我夙興可恆早入又曰簡文在東宮召戚袞講論又嘗置宴集玄儒之士先命道學互相質疑次令中庶人徐摛騁大義間以劇談摛辭辨從撗難以答抗諸儒懾氣時袞說朝聘義摛與往復袞精采自若應答如流簡文深嘉歎之隋書曰辛彥之拜禮部尚書與祕書監牛弘撰新禮吳興沈重名為碩學高祖嘗令彥之與重論議重不能抗於是避席而謝之曰辛君所謂金城湯池無可攻之勢高祖大悅唐書曰楊綰凡所知友皆一時名士或造之者清談終日未嘗及名利或有客欲以世務干者綰言必玄遠不敢發詞內愧而退大曆中德望日崇天下雅正之士爭趍其門至有數千里來者莊子曰孔子見老聃歸三日不談弟子問曰夫子見老聃將何規哉孔子曰吾與汝處於魯之時人用意如飛鴻者吾走狗而逐之用意如井魚者吾為鉤繳以投之吾今見龍合而成體散而成章乘乎雲氣而養乎陰陽余口張不能吸舌出不能縮又何視哉戰國策曰蘇秦說李兌明日復見抵掌而談兌送秦明月之珠和氏之璧抱朴子曰王充所作論衡北方都未有得之者蔡伯喈嘗到東江見之歎其高文度越諸子恆愛玩而獨祕之及還中國諸儒覺其談論更遠嫌得異書或搜求其隱處果得論衡捉取數卷將去伯喈曰唯我與爾共之勿廣也亦出著書門管輅別傳曰輅父為琅邪長輅時年十五琅邪太守單子春雅有才度聞輅一時之俊欲得相見輅父即遣輅造之大會賓客百餘人坐上有能言之士輅問子春府君多嘉客有雄貴之姿輅既年少膽志未剛若相觀懼失精神先飲三升清酒盡之然後而言子春大喜便酌三升酒獨使飲之酒盡之後問子春今欲與輅為對者府君耶四坐之士耶子春曰吾自欲與卿旗鼓相當輅言始讀詩論易學問微淺未能上引聖人之道陳周漢之事但論金木水火鬼神之情耳子春言此最難者而卿以為易耶於是唱大論之端遂造陰陽文彩泛流枝葉橫生少引聖籍多發天然子春及衆士牙相攻劫請難風起而輅人人答對言皆有餘至日向暮酒食不行於是發聲徐州號之神童又冀州剌史裴徽召輅為文學從事相見清論終日不覺罷倦再相見轉為治中四相見轉為別駕前至十月舉為秀才物理論曰夫虛無之談無異春蛙秋蟬聒耳而已荊州先德傳曰龐士元師事司馬德操德操蠶月躬採桑後園士元往助之因與共談元善神遂移日忘餐德操於是異之世說曰何晏為吏部尚書有位望時談客盈坐王弼年未弱冠往見之晏聞來倒履出戶迎之因條向者勝理語弼曰此理僕以為理極可得復難不弼作難一坐便以為屈於是弼自為客主數憣皆一坐所不及也又曰衛玠字叔寶少有名理琅邪王平子高氣不群邁世獨遨每聞君之語議至乎理會之間要微之際輒絶倒於坐前後三聞為之三倒時人遂曰衛君談道平子三倒及君年長論者以為出於王武子之右世咸謂王家三子如衛家一兒玠於武昌見大將軍王敦與之談論彌日信宿敦顧謂僚屬曰昔何王吐金聲於中朝此子復玉振於江表微言之緒絶而復續不悟永嘉之末復有正始之音清言勝詠亹亹入微何平叔在當復倒矣又曰孝武將講孝經謝太傅與諸人私逆講師車武子謂袁彥伯曰不問則德音有遺多問則重勞二謝袁曰必無此嫌車曰何以知爾袁曰何嘗見明鏡疲於屢照清流撓於惠風也郭子曰張憑舉孝廉出京負其才氣謂必參時彥欲詣劉真長鄉里及同舉者咸共哂之張遂徑往詣劉既前處之下坐通寒暑而已真長方洗濯料事神意不接良久張欲自發而未有其端頃之王長史諸賢來詣言各有隔而不通處張忽遙於末坐判之言約皆遠便足以暢彼我之懷舉坐皆驚真長延之上坐遂清言彌日因留宿遂復至曉張退劉曰卿且前去我正爾往取卿共詣撫軍撫軍簡文張既還船同旅笑之曰卿何許宿還張笑而不答須臾真長至遣教覔張孝廉船同旅惋愕既同載俱詣撫軍至門劉謂撫軍曰下官今日為公得一太常博士妙選既前撫軍與之語言咨嗟稱善數日乃止曰張憑徑粹為理之窟即用為太常博士又曰范玄平注字玄平在簡文坐談欲屈引長史曰長史王仲祖卿助我王曰此非拔山之力所能助也異苑曰陸機初入洛次河南偃師時久結陰望道左人居因往投宿見一年少置易投壺與機談機心伏之而無以酬抗既曉便去稅驂逆旅問嫗嫗曰此東數十里無村落正是山陽王家墓耳機乃怪還睇昨路空野霾雲拱木蔽日知所遇者信王弼也又曰陸雲獨於空草中忽見一家墻院整頓雲時飢乏因而詣前見一年少可二十餘風姿可嘉論敘平生不異於人尋共說老子極有辭致雲出臨別語云我是山陽王輔嗣雲出門還望向處正是一冢雲始謂俄頃已經三日幽明録曰阮瞻素秉無鬼論世莫能難每自謂理足可以辨正幽明忽有一鬼通姓名作客詣阮寒溫畢聊談名理客甚有才情未及鬼神事返覆甚苦遂屈乃作色曰鬼神古今聖賢所共傳君何獨言無即僕便是鬼於是忽變為異形須臾消滅阮默然意色大惡後年餘病死
