body:
  text: 方術部九筮下晉書曰嚴卿會稽人也善卜筮鄉人魏序欲暫東行荒年多抄盜令卿筮之卿筮曰君慎不可東行必遭暴害之氣而非劫也序之不信卿曰既必不信宜有以禳之可索西郭外獨母家白雄狗繫著船前求索正得駮狗無白卿曰駮者亦足然猶恨其色不純當餘小毒正及六畜輩耳無所復憂序行半路狗忽作聲甚急有如人打之者比視已死吐黑血斗餘其夕序墅上白鵝數頭無故自死而序家無恙又曰郭璞既過江宣城太守殷祐引為參軍時有物大如水牛灰色卑腳腳類象胸前尾上皆白大力而遲鈍來到城下衆咸異焉祐使人伏而取之令璞作卦遇遁之蠱其卦曰艮體連乾其物壯巨山潛之畜匪兕匪虎身與鬼并精見二午法當為禽兩靈不許遂被一創還其本墅按卦是為驢鼠卜適了伏者以戟剌之深尺餘遂去不復見巫云廟神不悅曰此是䢼亭驢山君鼠使詣刑山暫來過我不須觸之其精妙如此又曰王導深重郭璞引參己軍事導令作掛璞言公有震厄可命駕西出數十里得一柏樹截斷如身長置常寢處災當可消矣導從其言數日果震柏木粉碎時元帝初鎮建鄴導令璞筮之遇咸之井璞曰東北郡縣有武名者當出鐸以著受命之符西南郡縣有陽名者井當沸其後晉陵武進縣人於田中得銅鐸五枚歷陽縣中井沸經日乃止及帝為晉王又使璞筮遇豫之睽璞曰會稽當出鍾以告成功上有勒銘應在人家井沸泥中得之繇辭所謂先王以作樂崇德殷薦之上帝者也及帝即位太興初會稽剡縣人果於井中得一鍾長七尺二分口徑四寸半上有古文奇書十八字云會稽嶽命餘字時人莫識之又曰王敦之謀逆也溫嶠庾亮使郭璞筮之璞對不決嶠亮復令占己之吉凶璞曰元吉嶠等退相謂曰璞對不了是不敢言或天奪敦魄令吾等與國家共舉大事而璞云元吉是為舉事必有成也於是勸帝討敦初璞每言殺我者山宗至是果有姓崇者構璞於敦敦將舉兵又使璞筮璞曰無成敦因疑璞之勸嶠亮又聞卦凶乃問璞曰卿更筮吾壽幾何答曰思向卦明公起事必禍不久若往武昌壽不可測敦大怒曰卿壽幾何曰命盡今日中敦怒收璞詣南岡而斬之璞臨出謂行刑者欲何之曰南岡頭璞曰必在雙柏樹下既至果然復云此樹應有大鵲巢衆索云不見璞更令尋覓果於枝閒得一大巢密葉蔽之又曰庾翼幼時嘗令璞筮公家及身卦成曰立始之末丘山傾長順之初子凋零及康帝即位將改元為建元或謂庾冰曰子忘郭生之言邪立始建元也丘山上名此號不宜用冰撫心歎恨帝崩何充改元為永和庾翼歎曰天道精微乃當如是長順者永和也吾庸得免乎其年翼卒冰又令筮其後嗣卦成曰卿諸子並當貴盛然有白龍者凶徵至矣若墓碑生金庾氏之大忌也後冰子蘊為廣州剌史妾房內忽有一新生白狗子莫知所由來其妾祕愛之不令蘊知狗轉長大蘊入見狗眉眼分明又身至長又弱異於常狗蘊甚怪之將出共視在衆人前忽失所在蘊慨然曰殆白龍乎庾氏之禍至矣又墓碑生金俄而為桓溫所滅終如其言璞之占驗皆此類也撰前後筮驗六十餘事名為洞林又抄京費諸家要最更撰新林十篇卜韻十篇載記曰秦苻融為司隸校尉京兆人董豐遊三年而返過宿妻家是夜妻為賊所殺兄疑豐殺之送豐有司不堪楚掠誣引殺妻融察而疑之問曰汝行往還頗有怪異及卜筮以不豐曰初將發夜夢乘馬南渡水返而北渡復自北而南馬停水中鞭策不去俯而視之見兩日在于水下左白而濕右黑而燥寤而心悸以為不祥還之夕復夢如初問筮者筮者云憂獄訟遠三枕避三沐既至妻為具沐夜授豐枕豐記筮者之言皆不從之乃自沐枕枕而寢融曰吾知之矣周易坎為馬為離三爻同變而成離離為中女坎為中男兩日二夫之象坎為執法吏吏誥其夫婦人被流血而死坎二陰一陽離三陽一陰相承易位離下坎上既濟文王遇之囚羑里有禮而生無禮而死馬左而濕水也左冰右馬馮字也兩日昌字也其馮昌殺之乎於是推驗獲昌詰之具首服曰本與妻謀殺董豐期以沐新枕為驗是以誤中婦人宋書曰劉休善筮因尚書令吳喜事明帝遂見親賞長直殿內後宮孕者帝使筮其男女無不如占齊書曰賀瑒伯祖導養工卜筮經遇工歌女人病死為筮之曰此非死也天帝召之歌耳乃以土塊加其心上俄頃而蘇南史曰梁大同中同泰寺災帝召太史令虞履筮之遇坤之履曰無害其繇曰西南得朋東北喪朋安貞吉文言曰東北喪朋乃終有慶帝曰斯魔也酉應見卯金來剋木卯為陰賊鬼而帶賊非魔孰為致之酉為口舌當就說言乎兌故知善言乎宜前為法事於是人人贊善莫不從風梁書曰鄧元起初為益州剌史及巴東聞蜀亂使蔣光濟筮之遇蹇喟然歎曰吾豈鄧艾而及此乎後果如筮又阮孝緒傳曰孝緒見善筮者張有道曰見子隱跡而心難明自非考之龜蓍無以驗也及布卦既揲五爻曰此將為鹹應感之法非嘉遁之兆孝緒曰安知後爻不為上九果成遁卦有道歎曰此所謂肥遁無不利象實應德心跡并也孝緒曰雖獲遁卦而上九爻不發升遐之道便當高謝又曰阮孝緒自筮卦曰吾壽與劉著作同年及劉著卒孝緒曰劉侯逝矣吾其幾何其年十月卒後魏書曰任城王澄高祖外示南討意在謀遷齊於明堂左個詔太常卿王諶親令龜易筮南伐之事其兆遇革高祖曰此是湯武革順之卦也群臣莫敢言澄曰革者更也將欲應天順人革君臣之命湯武得之為吉陛下帝有天下重光纍葉今日卜征乃可伐叛不得云革命此非君人卦未可為吉也高祖厲聲曰此象云大人虎變何云不吉也澄曰陛下龍興既久不宜方同虎變高祖勃然作色曰社稷我社稷任城而欲沮衆也澄曰社稷誠知陛下之社稷然臣是社稷之臣也務參顧問敢盡愚衷高祖久之乃解曰各言其志亦復何傷車駕還宮便召澄未及升陛遙謂曰向者之革今更欲論之明堂之忿懼衆人竟言沮我計故厲色怖文武耳想解朕意也又曰鄧淵博覽經書長於易筮太祖定中原擢為吏部郎又曰許彥少孤貧好讀書後從沙門法睿受易世祖被徵以卜筮頻驗遂在左右參與謀議北史曰後魏樂平王丕坐事以憂薨及日者董道秀之死也高允遂著筮論曰昔明元未起白臺其高二十餘丈樂平王嘗夢登其上四望無所見王以問日者董道秀筮之曰大吉王默而有熹色後事發王遂憂死而道秀棄市道秀善推六爻以對王曰易稱亢龍有悔窮高曰亢高而無人不為善也夫如是則可上寧於王下保於己福祿方至豈有禍哉今舍於本而從其末咎釁之至不亦宜乎三國典略曰西魏孝武帝字孝則孝文皇帝之孫也性沉厚少言體有鱗文初封汝陽公夢人謂己曰汝當大貴得二十五年將即位使吳遵世筮之遇明夷之賁曰初登于天後入于地帝曰何謂也遵曰初登于天當作天子也後入于地不得久也又曰清河王嶽神武從父弟也初家于洛邑神武奉使入洛常止嶽舍母山氏嘗夜起見神武室中有光窺而無火移於東屋其光復存以為怪也詣卜者筮之遇乾之大有占曰吉易稱飛龍在天大人造也飛龍九五大人之卦當大貴主人蒙其福神武起兵於信都山氏聞之大喜謂嶽曰赤光之瑞今當驗矣可聞從之共圖大計嶽至信都神武以為散騎常侍封山氏為郡君授女侍中入侍皇后又曰齊趙輔和明易善筮後宮誕男女時日筮無不中有人父疾輔和筮之遇乾之晉告之以吉退而謂人曰乾為天天變為魂而升於天能無死乎果如其言又日齊許遵高陽新城人也明易善筮兼曉天文齊神武引為館客自言祿命不富貴終必橫死是以任情踈誕多所犯忤時齊主無道既甚遵語人曰多折算來吾筮此狂夫何時當死於是布算滿床大言曰不出首冬我乃不見又後周書曰梁孝元凡諸伎術無所不該南平嗣王恪嘗以銅合盛金玉虎珀指環請孝元射覆卦遇姤之履林曰上既為天其體則圓指環之象金玉在焉寅爻帶牛寅則為虎琥珀生光在合中央合中之物凡有三種案卦而談或輕或重恪於是神服又以壬申日寅時筮南軍何時有信遇剝之艮孝元曰使還已在門外遣人往看果如所說賓客驚其妙而問之孝元曰艮為門時在寅與日辰并故知之耳凡所占決萬不失一及我軍之伐援蓍為卦取龜式驗之因抵於地曰吾若死此下豈非命乎隋書曰楊伯醜馮翊武鄉人也好讀易隱於華山開皇初被徵入朝見公卿不為禮無貴賤皆汝之人不能測也高祖召與語竟無所答上賜之衣服至朝堂捨之而去於是被髮陽狂遊行市里形體垢穢未嘗櫛沐時有張永樂者賣卜京師伯醜每從之遊永樂為卦有不能決者伯醜輒為分折爻象尋幽入微永樂嗟服自以為非及也伯醜亦開肆賣卜有人嘗失子就伯醜筮者卦成伯醜曰汝子在懷遠坊南門道東北壁上有青裙女子抱之可往取也如言果得或有金數兩夫妻共藏之於後失金其夫意妻有異志將逐之其妻稱冤以詣伯醜伯醜為筮之曰金在矣悉呼其家人指一人曰可取金來其人赧然應聲而取之道士韋知常詣伯醜問吉凶伯醜曰汝勿東北行必不得己當早還不然者楊素斬汝頭未幾上令知常事漢王諒俄而上崩諒舉兵反知常逃歸京師知常先與楊素有隙及素平并州先訪知常將斬之賴此獲免又有失馬來詣伯醜卜者時伯醜為皇太子所召在塗遇之立為作卦卦成曰我不遑為卿占之卿且向西市東壁門南第三店為我買魚作膾當得馬矣其人如此言須臾有一人牽所失馬而至遂擒之崖州嘗獻徑寸珠其使者陰易之上疑焉召伯醜筮曰有物出自水中質圓而色光是大珠也今為人所隱具隱者姓名容狀上如言簿責之果得本珠上奇之賜帛二十匹唐書曰太宗皇后長孫氏隋大業中歸寧於永興里后舅高士廉有姬張氏於后所宿舍側見一大馬二丈餘鞍勒備具士廉筮之遇坤彖曰至哉坤元萬物資生乃順承天坤厚載物德合無疆象曰牝馬地類行地無疆也泰彖曰內陽而外陰內健而外順則是天地交而萬物通也象曰后以輔相天地之宜而左右人也卜人曰龍乾之象也馬坤之象也變而為泰天地交也繇協於歸妹婦人兆也案王弼云婦人謂嫁曰歸女處尊位履中居順也此女當大貴也其可盡言乎士廉志之而心獨喜親戚知者咸敬異焉又曰衛大經篤學善易口無二言則天降詔徵之辭疾不起嘗預筮死日先鑿墓自為志文如筮而終又曰玄宗之為潞州別駕將入朝有軍人韓凝禮自謂知五兆上因以食箸試之既布卦一箸無故自起凡三偃三起觀者以為大吉徵既而誅韋氏定天保因此行也凝禮起家五品家語曰孔子嘗自為筮而卦得賁愀然有不樂之狀子張進曰師聞卜者得賁是吉卦也而夫子之色不平何也孔子曰以其雜也在周易山下有火謂之賁非正色之卦也夫質也白宜正白黑宜正黑今而以賁非吉兆也吾聞丹漆不文白玉不雕何者質之有餘質有餘者不受飾故也說苑同古史考曰庖羲作卦始有筮衝波傳曰孔子使子貢往外而未來謂弟子占之遇鼎皆言無下足不來顏子掩口而笑曰無足者乘舟而來賜至矣清朝也子貢果朝至國語曰晉公子在秦筮之曰尚有晉國得貞屯悔象皆八也內曰貞外日悔震下坎上屯坤下震上豫得此兩卦震在屯為貞在豫為悔八謂震兩陰爻在悔皆不動故曰皆八諸爻無為也筮史占之皆曰不吉卦閉而不通爻無為也司空季子日吉是在周易皆利建侯不有晉國以輔王室安能建侯我命筮曰尚有晉國筮告曰利建侯得國之務也吉孰大焉是二者得國之卦也二者屯豫又曰惠公卒秦伯納公子董困逆公於河公問焉曰吾其濟乎對曰歲在大梁集天行元年始受實沉之星也實沉之虛晉人是居所以興也今君當之無不濟矣君之行也歲在大火大火閼伯之星也是謂大辰臣筮之得泰之八乾下坤上泰遇泰無動爻筮為侯也泰三至五震為陰爻不動其數皆八故得泰之八與貞屯悔豫皆八義同曰是謂天地配享小往大來今及之矣何不濟之有且以辰出而以參人皆晉祥也濟且秉成必伯諸侯秉執子孫賴之君無懼矣又曰晉孫談之子適周事單襄公襄公有疾召頃公而告之曰吾聞晉之筮之也遇乾之否曰配而不終君三出焉一既往矣後之不知其次必此且吾聞之成公之生也其母夢神規其臀以黑曰使有晉國規畫臀尻三世而卑歡之孫故名之曰黑臀於今再矣襄公曰歡此其孫也此周子者晉襄公之孫也而令德孝恭非此其誰且其夢曰必歡之孫實有晉國其卦曰必三取君於周其德又可以君國三襲焉襲合也三合德夢卦也吾聞之泰誓曰朕夢協于朕卜襲于休祥戎商必剋以三合襲晉仍無道而鮮胄其將失之矣早善晉子其當之晉子周子頃公許諾及厲公之亂召周子而立之是為悼公亂謂殺之智瓊傳曰弦超為神女所降論者以為神仙或以為鬼魅不可得正也著作郎干寶以周易筮之遇頤之益以示同寮郎郭璞曰頤貞吉正以養身雷動山下氣性唯新變而之益延壽永年乘龍銜風乃升于天此仙人之卦也搜神記曰橋玄字公祖梁國人也初為司徒長史五月末夜臥見東壁正白如門呼左右左右莫見因起自往手捫摸之壁如故還床又見心大恐其旦應劭往候之玄告劭曰鄉人有童彥興者許季山外孫也其探頤索隱窮神知化然天性褊狹羞於卜筮者玄聞往請之公祖虛禮盛饌下席行觴彥興辭公祖讓再三爾乃應之曰府君怪見白光如門明者然不為害也六月上旬雞鳴時聞南家哭即吉到秋節遷北行郡以金為名位至將軍三公到六月九日太尉楊秉薨七月拜巨鹿太守巨邊有金焉復為度遼將軍遂登三事續搜神記曰郭璞每自為卦知其凶終嘗行建康柵塘逢一趨走少年便牽住脫絲布袍與之此人乃受及當死果此人行刑傍人皆為求屬璞曰我託之久矣此人為之歔欷哽咽又曰郤超年二十餘得重病廬江杜不愆始學易卜屢有驗超令試筮之卦成不愆曰案卦言之卿所苦尋除然宜於東北三十里上宮姓家索其先養雄雉籠而絆之置東簷下卻後九日辰加午必當有野雌雉飛來與交合既畢雙飛去若如此不出二十日病都除又是休應年將八十位極人臣若但雌逝雄留者病一周方差年半八十名位亦失超依其言索雉果得至期日超臥南軒下觀之至日晏果有雌雉飛入籠與雄交而去雄雉不動超歎息曰雖管郭之奇何以尚此超病彌年乃起至四十卒於中書郎録異傳曰隗照者汝陰鴻壽亭人也善於易臨死書板授其妻曰吾亡後當大荒窮雖爾慎莫賣宅也卻後五年春當有詔使來頓此亭姓龔此人負吾金卿以此板往責之勿違吾言言訖而卒後果大困乏欲賣宅憶夫言輒止期日有龔使者至亭妻遂齎板往使者執板惘然不知所以乃言曰我生不踐此何緣爾耶妻曰夫臨亡手書板見命如此不敢妄也使者沉吟良久而寤謂曰賢夫何善妻曰亡夫善於易而未會為人卜也使者曰噫可知矣乃命取蓍筮之卦成撫掌而歎曰妙哉隗生含明隱跡可謂鏡窮達而洞吉凶者也於是告照妻曰吾不可相負金也賢夫自有金耳知亡後暫窮故藏金以待泰平所以不告婦兒者恐金盡而困無已也知吾善易故書板以寄意耳金有五百斤盛以青罌覆以銅柈埋在堂屋東頭去壁一丈入地九尺妻還掘之皆如其言金樓子自敘云初至荊州卜雨聊附見首末孟秋之月亢陽日久月旦雖雨俄爾便晴有人云諺曰雨月額千里赤蓋旱之徵也吾乃端策拂蓍遇動不動既而言曰庚子爻為世於金七月建申申子辰又三五合必在此月五日庚子果值甘雨余又以十七日筮何時雲卷金翹日耀合壁紅塵暗陌丹霞映峙謂亢陽之勢未霔膏澤筮遇坎之比於是輟蓍而歎曰坎者水也子爻為世其在金今夜三更平地上有水稱之為比其方有甘雨乎欣然有自得之志又曰桃文烈善龜卜謂余曰此二十一日將雨其在虞淵之時余乃筮之遇謙之小過既言曰坤艮二象俱在土宮非直無雨乃應開霽俄而星如玉李月上金波霧生猶縠河垂似帶余乃欣然異苑曰頴川庾嘉德善於蓍蔡之事有一人失婢庾卦云君可出東陵口伺候有姓曹乘車者無問識否但就其載得與不得殆一理也旦出郭果有曹郎上墓徑便升車曹大駭呼牛驚奔入草剌一死尸下視乃其婢也博物志曰龜三千歲遊於卷耳之上蓍千歲而三百莖同本以老故知吉凶又曰筮必沐浴齊潔燒香每朔望浴蓍必五浴之浴龜亦然鬼谷子曰夫決情定疑萬事之基以正亂治天決誠為難者也先生乃用蓍龜以助自決也
