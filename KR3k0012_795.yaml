body:
  text: 西戎三羌無弋後漢書曰羌無弋爰劍者秦厲公時為秦所拘執以為奴隸不知爰劍何戎之別也後得亡歸而秦人追之急藏於巖穴中得免羌人云爰劍初藏穴中秦人焚之有影象如虎為其蔽火得以免死既出又與劓女遇於野遂成夫婦女址其狀被髮覆面羌人曰以為俗遂俱亡入三河間諸羌見爰劍被焚不死怪其神共畏事之推以為豪河湟間少五穀多禽獸以射獵為事爰劍教之田畜遂見尊信廬落種人依之者日益衆羌人謂奴為無弋爰劍嘗為奴隸故因名之其後世世為豪也又曰爰劍曾孫忍時秦獻公初立欲復穆公之跡兵臨渭首滅狄獂戎忍季父卬畏秦之威將其種人附落南出賜支河曲西數千里與衆羌絶遠不復交通其後子孫分別各自為種任隨所之或為釐厘牛種越嶲羌是也或為白馬種廣漢羌是也或為參狼種武都羌是也忍及弟舞獨留湟中並娶妻忍生九子為九種舞生十七子為十七種羌之興盛從此起矣又曰忍子研立時秦孝公雄強威服羌戎孝公使太子駟率戎狄九十二國朝周顯王研豪健故羌中號其後為研種及秦始皇時務并六國以諸侯為事兵不西行故種人得以繁息又曰武帝征伐四夷開地廣境北卻胸奴西逐諸羌及渡河湟築令居塞初開河西別置四郡酒泉武威張掖敦煌通道玉門隔絶羌胡使南北不得交關於是鄣塞亭燧出長城外數千里又曰建武九年隗囂死司徒掾班彪上言今涼州部皆有降羌羌胡被髮左袵而與漢人雜處習俗既異言語不通數為小吏點民所見侵奪窮恚無聊故致反叛夫蠻夷寇亂皆為此也舊制益州部置蠻夷騎都尉幽州部置領烏桓校尉涼州部置護羌校尉皆持節領護理其怨結歲時巡行問所疾苦又數遣使驛通導動靜使塞外羌夷為吏耳目州郡因此可得警備今宜復如舊以明威防世祖從之即以牛邯為護羌校尉又曰燒何豪有婦人銅鉗者年百餘歲多智算為種人所信向皆從取計策焉又曰龐參以失期軍敗抵罪以馬賢代領校尉事後遣任尚為中郎將羽林緹騎五營子弟三千五百人代班雄屯三輔尚臨行虞詡說尚曰使君頻奉國命討逐寇賊三州屯兵二十餘萬民棄農桑疲苦徭役而未有功效勞費日滋若此出不克誠為使君危之尚曰憂惶久矣不知所如詡曰兵法弱不攻強走不逐飛自然之勢今虜皆馬騎日行數百里來如風雨去如絶絃以步追之勢不相及所以曠而無功也為使君計者莫如罷諸郡兵各令出錢數千二人共市一馬如此可捨甲胄馳輕兵以万騎之衆逐數千之衆追尾掩截其道自窮便民利事大功立矣尚大喜即上言用其計乃遣輕騎鈔擊杜季貢於丁奚城斬首四百餘級獲牛馬羊數千頭又曰順帝永建元年隴西種羌反叛校尉馬賢將七千餘人擊之戰於臨洮斬首千餘級餘皆率種人降進封賢都鄉侯自是涼州無事至四年尚書僕射虞翊上疏曰臣聞子孫以奉祖為孝君上以安民為明此高宗周宣所以上配湯武也禹貢雍州之域厥田惟上且沃野千里穀稼充積又有龜茲鹽池以為民利上郡龜茲縣有鹽官即雍州之域也水草豐美土宜産牧牛馬銜尾群羊塞道北阻山河乘厄據險因渠以溉水舂河漕水舂即水碓也用功省而軍糧饒足故孝武皇帝及世祖築朔方西河置上郡皆為此也而建元無妄之災衆羌內潰郡縣兵荒二十餘年棄沃壤之饒損自然之財不可謂利離河山之阻守無險之處難以為固今三郡未復園陵單外園陵謂長安諸園陵也單外謂旡守固也而公卿選懦容頭過身張解設難但計所費不圖其安宜開聖德考從所長書奏帝乃復三郡使謁者郭璜督促徙者各歸舊縣結城郭置候驛既而激河浚渠為屯田省內郡費歲一億計遂令安定北地上郡及隴西金城常儲穀粟令周數年又曰順帝永和四年以宋機為并州刺史劉康為涼州刺史並當之職大將軍梁商謂機等曰戎狄荒服蠻夷要服言其荒忽無常而統領之道亦無常法臨事制宜略依其俗今二君性素疾惡欲分白明黑孔子曰人而不仁疾之已甚亂也況戎狄乎其務安羌胡防其大故忍其小過機等天性虐刻遂不能從到州之日多所擾發五年夏雜種羌等遂反叛攻金城與西塞及湟中雜種羌大寇三輔殺害長吏機康並坐徵又曰自爰劍後子孫支分凡百五十種其九種在賜支河首已西及在蜀漢徼北唯參狼在武都其五十二種衰少不能自立分散為附落或絶滅無後或引而遠去其八十九種唯燒當種最強勝兵十餘萬其餘大者萬餘人小者數千人更相鈔盜盛衰無常湟中月氏胡後漢書曰湟中月氏胡其先大月氏之別也舊在張掖酒泉地月氏為胸奴冒頓所殺餘種分散西踰葱嶺其羸弱者南入山阻依諸羌居止遂與共婚姻及驃騎將軍霍去病破胸奴取西河地開湟中於是月氏來降與漢民錯居雖依附縣官而首鼠兩端其後漢兵戰鬭隨勢強弱被服飲食言語略與羌同亦以父名母姓為種其大種有七莊子曰羌人死燔而揚其灰風俗通曰羌本西戎卑賤者也主牧羊故羌字從羊人因以為號無君臣上下健者為豪不能相一種別群分彊者凌弱轉相抄盜男子戰死以為吉病終者謂之凶范曄西域論曰張奐盛稱戎狄一氣所生不宜誅盡流血汙野傷和致妖是何言之迂乎羌雖外患實深內疾苦攻之不根是養痾於心腹也根謂盡其根本又曰昔先王疆理九土判別畿荒知蠻貊殊性難以道御故斥遠諸華薄其貢職唯辭要而已若二漢御戎之方失其本矣氐齊書曰氐楊氏與符氏同出略陽漢世氐居仇池地號百頃建安中有百頃氐王是也又曰仇池四方壁立自然有樓櫓卻敵狀高並數丈有二十二道可舉緣而升東西二門盤道可七里上有岡阜泉源氐於上平地立宮室果園食庫無貴賤皆為板屋王牆所治處名洛谷又曰宋文帝元喜十九年龍驤將軍裴方明等伐氐剋仇池通典曰氐者西戎之別種則在廣漢西君長數十而白馬最大或號青氐或號白氐或稱蚺氐蚺而占切此蓋中國人即其服色而名之也土地險阻有麻銅漆蜜椒蠟等勇戇抵冒貪貨死利居於河地一名仇池方百頃四面斗絶數為邊寇郡縣討之則依固自守其俗語不與中國及羌胡同各自有姓如中國之姓其服尚青俗能織布善田種畜羊豕馬牛婚姻六禮知書疏多知中國之語言與中國之姓其服尚青又曰漢武元封三年氐人反遣兵討破之分徙酒泉郡元鳳初復叛遣大鴻臚田廣明討破之又曰魏武之初諸氐戎叛乃令夏侯妙才討之因徙武都之種於秦川以御蜀虜風俗通曰氐言抵冒貪叨至死好利樂在山溪本西南夷之別種號曰白馬孝武帝遣中郎將郭昌等引兵征之降服以為武都郡晉華陰令江統西戎論曰春秋之義內諸夏而外夷狄以其言論不通贄幣不同種類乖殊或居絶域之外山河嶇險阻之地與中國壤之表崎斷土隔不相侵涉賦役不及正朔不加故曰天子有道守在四夷又曰胸奴求守邊塞而俟應陳其不可單于屈膝未央蕭望之議以不臣是以有道之君不攻夷狄也車師北史曰車師國一名前部其王居交河城後魏大武真君十一年車師王車夷落遣使進薛直上書曰臣亡父僻處塞外仰慕天子威德遣使奉獻不空於歲天子降念賜遣甚厚及臣繼立不闕常貢天子垂矜亦不異前世敢緣至恩輒陳私懇臣國自無諱所攻擊經今八歲人庶飢荒無以存活賊今攻臣急甚不能自全遂捨國東奔三分免一即日已到焉耆東界思歸天闕幸垂賑救於是下詔撫慰之開焉耆倉給之正平初遣子入侍自後每使朝貢高昌北史曰高昌者車師前王之故地東西二百里南北五百里四面多大山以其地勢高敞人庶昌盛因名高昌亦云其地有漢時高昌壘故以為國號東去長安四千九百里漢西域長史及戊巳校尉並居於此晉以其地為高昌郡張軌呂光沮渠蒙遜據河西皆置太守以統之又曰其國有八城地多磧石氣候溫暖厥土良沃穀麥一歲再熟宜蠶多五果有草名羊刺其上生密而味佳出赤鹽其味美復有白鹽其形如玉高昌人取以為枕貢之中國又曰後魏文成帝和平六年高昌人立麴嘉為王嘉宇靈鳳金城榆中人遣使獻珠象白黑貂裘名馬鹽枕等宣武延昌中以嘉為持節平西將軍瓜州刺史又曰後魏孝明熙平初遣使朝貢獻詔曰卿地隔關山境接荒漢頻請朝援徙國內遷雖來誠可嘉於理未協何者彼之氓庶是漢魏遺黎自晉氏不綱因難播越成家立國世積已久惡徙重遷人懷戀舊今若動之恐異同之變爰在時腋不得便如來表也又曰後魏孝明正光元年遣使奉表自以邊遐不習典誥求借五經諸史并請國子助教劉燮以為博士明帝許之又曰其國至隋城周回一千八百四十步於坐室盡魯哀公問政於孔子之像又曰服飾丈夫從胡法婦人裙襦頭上作髻文字亦同華夏兼用胡書有毛詩論語孝經置學官弟子以相教授雖習讀之而皆為胡語賦稅則計田輸銀錢無者輸布又曰隋大業四年遣使貢獻帝待其使甚厚明年伯雅來朝伯雅高昌國王名也因從擊高麗還宗室女華容公主八年冬歸蕃下令國中曰先者以國邊荒境被髮左袵今大隋統御宇宙平一孤既沐浴和風庶均大化其庶人以上皆宜解辮削袵帝聞而善之下詔曰光祿大夫辨國公高昌王伯雅本自諸華世祚西壤昔因多難剪為胡服自我皇隋平一宇宙伯雅踰沙重阻奉貢來庭削袵曳裾變夷從夏可賜衣冠仍頒製造之式唐書曰高昌有草名白疊其實類繭國人採之織以為布又曰武德七年其王文泰又獻狗雌雄各一高六寸長尺餘性甚惠云本出拂䔉國中國拂䔉狗自此始也又曰太宗嗣位復貢玄狐裘因賜其妻宇文氏花叉一具宇文氏復貢玉盤也又曰貞觀四年冬字文氏請預宗親詔賜姓李氏封長樂公主書慰諭之又曰貞觀十三年文泰稱疾不朝太宗命侯君集為交河道大惣管率左屯衛大將軍薛萬均及突厥契苾之衆步騎數万衆以擊之攻拔其城虜男女七千餘口文泰惶懼病死子智盛嗣立出城降君集先是其國童謠云高昌兵馬如霜雪漢家兵馬如日月日月照霜雪回首自消滅文秦使人捕其初唱者不能得君集尋遣使告捷太宗大悅宴百寮班賜各有差曲赦高昌部內欲以高昌為州縣特進魏徵諫以為不便太宗不從遂以其地置西州又置安西都護府留兵以鎮之吐谷渾後魏書曰吐谷渾慕容氏者本遼西鮮卑徙河步歸有二子長曰吐谷渾少曰若洛廆代統部落別為慕容氏步歸之存貧分戶百以給吐谷穀渾渾與洛廆二部馬鬥相傷洛廆怒謂渾曰何不分部令相遠渾曰馬是畜耳而何怒及求別甚易今當去汝萬里之外廆悔謝留之渾曰先公之世卜筮當有二子亭福並流子孫我是卑庶理無並大今以馬致隔天所啓也試驅馬令東若還我當有隨即命擁馬皆悲鳴西走遂西渡隴止于甘松之南廆追悔之作吐谷渾河干歌徙何以兄為河干也逐水草廬帳而居以肉酪為糧渾死其後以吐谷渾為氏又曰豺立自號沙州刺史部內有黃沙周回數百里不生草木因號沙州梁書曰武帝天監十三年其王休運籌遣使獻金裝馬腦鍾二口又表於益州立九層佛寺詔許焉十五年又遣使獻赤舞龍駒及方物隋書曰其王以皂為帽妻戴金花其器械衣服略與中國同其王公貴人多戴羃䍦婦人裙襦辮髮綴以珠貝國無常稅殺人及盜馬者死餘坐則徵物以贖罪風俗頗同突厥有大夌粟豆青海周回千餘里中有小山其俗至冬輒放牝馬於其上言得龍種吐谷渾嘗得波斯草馬放入海因生驄駒能日行千里故時稱青海驄馬又曰開皇十六年以光化公主妻吐名渾王伏允上表欲稱公主為天后上不許唐書曰隋煬帝時其王伏允來犯塞煬帝親惣六軍以討之伏允以數千騎潛於泥嶺而遁其仙頭王率男女十餘萬口來降煬帝立其質子順為王送之本國又曰貞觀九年詔特進李靖為西海道大惣管時伏允太子順欲因此立功由是遂降乃詔曰吐谷穀渾擅相君長竊據荒裔志在凶德政出權門酋渠攜二種落怨憤長惡不悛野心彌熾莫顧蕃臣之禮曾無事上之節莫竊疆場虔劉兆庶積惡既稔天亡有徵朕君臨四海含育万類一物失所責深在豫所以爰命六軍申茲九伐義存活國情非黷武其子大寧王慕容順隋氏之甥志懷明悟長自中土幸慕華風爰見時機深識逆順以其愎諫違衆獨陷迷途遂誅邪臣存茲大計翻然改轍代父歸罪忠孝之美深有可嘉子能立功足以補過既往之釁持宜原免然其建國西鄙已歷年代既從廢絶情所未忍繼其宗祀允歸令嗣可封順為西平郡王仍授趉九物切胡呂鳥甘豆可汗又曰吐谷渾自晉永嘉之末始西疫洮水建國於群羌之故地至龍朔三年為吐蕃所滅波斯北史曰波斯國都宿利城在忸蜜西古條支國也去代二萬四千二百二十八里城方十里戶十餘万河經其城中南流土地平正出金鍮石珊瑚琥珀車渠馬腦多大真珠頗梨琉璃水精瑟瑟金剛火齊鑌鐵銅錫朱砂水銀綾錦疊毼氍毹毾㲪赤麞皮及鬱金蘇合青木等香胡椒畢撥石蜜千年棗香附子訶黎勒無食子鹽緑雌黃等風物氣候暑熱家自藏水地多沙磧引水溉灌其五穀及鳥獸等與中夏略同唯無稻黍稷土出名馬大驢及駝往往有一日能行七百里富室至有數千頭又出白象師子大鳥卯形如橐駝有兩翼飛而不能高食草與肉亦能噉火其王姓波氏名斯坐金羊床戴金花冠衣錦袍織成帔飾以真珠寶物其俗丈夫剪髮戴白皮帽貫頭衫亦有巾帔緣以織或錦婦女服之飾以金銀仍貫五色珠絡之於膊王於其國內別有小牙十餘所猶中國之離宮也每年四月出遊處之十月乃還王即位以後擇諸子內賢者密書其名封之於庫諸子及大臣皆莫之知也王死衆乃共發書視之其封內有名者即立以為王餘子出各就邊任兄弟更不相見也國人號王曰醫囋妃曰防步率王之諸子曰殺野又曰其刑法重罪懸諸竿上射殺之次則繫獄新王立乃釋之賦稅則准地輸銀錢又曰其俗以六月為歲首尤重七月七日十二月一日其日人庶以上各相命召設會作樂又曰後魏孝明神龜中其國遣使上書貢物云大國天子天之所生願日出處常為漢中天子波斯國王居和多千萬禮拜朝廷嘉納之自此每使朝獻唐書曰波斯伊嗣侯遣使獻一獸名活褥地形類鼠而色青身長八九寸能入穴取鼠又曰龍朔元年詔遣隴州南田縣令王名遠充使西域分置州縣因列其地疾陵城為波斯都督府授其王卑路斯為都督是後數遣使貢獻咸亨中卑路斯自來入朝高宗甚加恩賜拜右武衛將軍儀鳳三年令吏部侍郎裴行儉將兵冊送卑路斯還為波斯主行儉以其路遠至安西碎葉而還卑路斯獨返不得入其國漸為大食所侵客於吐火羅國二十餘年有部落數千人後漸離散至景龍二年又來入朝拜為左威衛將軍無何病卒其國遂滅而部衆猶存自開元七年至天寶六載凡十遣使來朝并獻馬腦床九載四月獻大毛繡舞筵長毛繡舞筵無孔真珠等
