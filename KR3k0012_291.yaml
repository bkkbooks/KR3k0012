body:
  text: 兵部二十一料敵上孫子曰用兵之道校之以五計而索其情索其勝負之情索搜索之義也曰主孰有道將孰有能道德智能主君也先當校兩國之君主知能否也若荀息斷虞公貪而好寶宮之奇懦不能強諫天地孰得視兩軍所據知誰得天時地利法令孰行設而不犯犯而必誅號出令知誰能施行也兵衆孰強士卒孰練知誰兵器強盛士卒簡練者故王子曰主不素習當陳惶惑將不素習臨陳暗變是也賞罰孰明賞善罰惡知誰分明者也賞無度則費而無恩罰無度則戮而無威吾以此知勝負矣以上七事料敵情知勝負所在敵知吾卒之可用以擊之不知敵之不可擊勝之半也知敵之可以擊而不知吾卒之不可以擊勝之半也知敵之可以擊知吾卒之可擊而不知形之不可以戰勝之半也勝之半者未可知也故曰知兵者動而不迷舉而不頓將能料敵以少合衆以弱擊強兵無選鋒曰北其勢若此必走北之兵也夫料敵制勝計極險易利害遠近上將之道也知此而用戰者必勝不知此而用戰者必敗夫唯無慮而易於敵者必擒於人也已無智慮而外易人者必為人擒故策之而知得失之計策度敵情觀其所施則計數知候之而知動靜之理喜怒動作察其舉止則情理可知也故知動靜權變為勝形之而知死生之地形相敵情觀其所得而知之角之而知不足有餘之處角量也角量彼我軍馬之使則長短可知又曰兵者詭道兵無常形以詭詐為道故校之以五計而索其情一曰度二曰量三曰數四曰稱五曰勝勝敗之數用兵之法當此事稱量敵之情也地生度因地形度形勢度生量量生數知其遠近廣狹知其數量數生稱稱量敵與已稱生勝稱量人之故知其勢勝負所在也故勝兵若以鎰稱銖敗兵若以銖稱鎰輕不能相舉動也勝之戰者人也若決水於千仞之溪者形也仞七尺也其勢疾也左傳曰吳子入越越子以甲楯五千保于會稽請行成伍員曰不可臣聞務德莫如滋去疾莫如盡違天而長讎雖悔之不可矣王不聽退而告人曰二十年之外吳其為沼乎又曰吳師在陳楚大夫皆懼子西曰二三子恤不相睦無患矣昔闔盧食不二味居不重席勤恤其民而與之勞逸今聞夫差次有臺榭陂池焉宿有妃嬙嬪御焉視民如讎而用之日新夫差先自敗也已安能敗我者也又曰楚子伐鄭晉師救之楚子北師次于郔郔鄭北地郔音延聞晉師濟河楚子欲還伍參言於楚子曰晉之從政者新未能行令其佐先縠剛愎不仁未肯用命其三帥者專行不獲欲專其所行而不得聽而無上衆誰適從此行也晉師必敗楚改乘轅而北之次於菅以待之晉師在敖鄗之間敖五勞反鄗許各反晉魏錡求公族未得欲為公族大夫而怒欲敗晉師請致師不許請使許之使所吏反遂往請戰而還趙旃求卿未得挑戰不許請召盟許之與魏錡皆命而往郤克曰二憾往矣弗備必敗隨會曰若二子怒楚楚人乘我喪師無日矣乘猶登也不如備之楚之無惡除備而盟何損於好若以惡來有備不敗且雖諸侯相見軍衛不徹警也先縠不可不肯設備隨會使鞏朔韓穿帥七覆于敖前帥將也覆為伏兵七處故上軍不敗而中軍下軍皆敗績又曰吳師伐楚州來楚救之吳人禦諸鍾離楚將子瑕卒楚師熸吳楚之間謂火滅為熸軍之重主喪亡故其軍人無復氣勢也熸子廉反吳將公子光曰諸侯從於楚者衆而皆小國也畏楚而不獲己是以來吾聞之作事威剋其愛雖小必濟剋勝也軍事尚威胡沈之君幼而狂性無常也陳大夫齧壯而頑頓與許蔡疾楚政大將死其師熸薳越為帥帥賤多寵政令不一越非正卿也軍多寵人政令不一於越也七國同役而不同心七國楚頓胡沈蔡陳許也帥賤而不能整無大威命楚可敗也先分師以犯胡沈與陳必先奔諸侯之師乃搖心矣諸侯乖亂楚必大奔請先者去備薄威示之以不整以誘之後者敦陳整旅敦厚吳子從之戰于雞父音甫吳子以罪人三千先犯胡沈與陳囚徒不習戰以示不整也三國爭之吳為三軍以擊之其後中軍從王光帥右軍掩餘帥左軍吳之罪人或奔或止三國亂吳師擊之敗獲胡沈之君及陳大夫舍胡沈之囚使奔許與蔡頓曰吾君死矣師譟而從之三國奔三國許蔡頓也楚師大奔也又曰晉侯將伐虢大夫士蒍曰不可虢公驕若驟得勝於我棄其民棄民不養之無衆而後伐之欲禦我誰與夫禮樂慈愛戰所蓄也夫民讓事樂和愛親哀喪而後可使也上之吏民以義讓哀樂為本言不可以力強虢弗蓄也亟戰將飢言虢不蓄義讓而力戰也後終為晉所滅又曰秦伯伐晉晉將趙盾禦之上軍佐臾駢曰秦不能久請深壘固軍以待之秦人欲戰秦伯謂士會曰若何而戰晉士會棄秦對曰趙氏新出其屬曰臾駢必實為此謀將以老我師也臾駢趙盾屬大夫新出佐上軍趙有側室曰穿晉君之壻也側室枝子有寵而弱不在軍事弱年少又未嘗涉知軍之事好勇而狂且惡臾駢之佐上軍也若使輕者隸焉其可也隸暫往而追退秦軍掩晉上軍趙穿追之不及上軍不動趙獨追之返怒曰裹糧坐甲固敵是求敵至不擊將何俟軍吏曰將有待也待可擊之穿曰我不知謀將獨出乃以其屬出趙盾曰秦獲穿也獲一卿矣晉自有數位從卿者秦以勝歸我何以報乃皆出戰交綏而退司馬法曰逐奔不遠從綏不及逐奔不遠則難誘從綏不及則難陷然則古名退軍為綏秦晉亦未能堅戰短兵未致爭而爾退故曰交綏也又曰晉師伐楚四月甲午晦楚晨壓晉軍而陳晉大夫郤至曰楚有六間古莧切其二卿相惡子重子反王卒以舊罷老不代鄭陳而不整不整列蠻軍而不陳蠻夷從楚者不結陳陳不違晦晦月終陰之盡也故兵家以為忌在陳而囂囂譁喧也合而加囂陳合宜靖而益其聲各顧其後莫有鬭心舊不必良以犯天忌我必克之終敗楚于鄢陵史記曰龐涓追孫臏臏量其行暮當至馬陵道狹而旁多阻險可伏兵乃大斫樹白而書之曰龐涓死此下於是令齊軍善射者萬弩夾道而伏期曰見火起而俱發龐涓夜至斫樹下見白書乃鑽火燭之讀書未畢齊軍萬弩俱發魏軍大亂龐涓自知智窮兵敗乃自刎曰遂成豎子之名又曰漢王在漢中拜韓信為大將信因問王曰今東嚮爭權天下豈非項王耶漢王曰然曰大王自料勇悍仁強孰與項王漢王默然良久曰不如也信再拜賀曰惟信亦為大王不如也然臣嘗事之請言項王之為人也項王喑噁叱吒千人皆廢喑音陰噁烏路切叱尺栗切吒陟訝切然不能任屬賢將此特匹夫之勇耳項王見人恭敬慈愛言語姁姁人有疾病涕泣分食飲至使人有功當封爵者刻印刓刓五元切忍不能與此所謂婦人之仁也項王雖霸天下而臣諸侯不居關中而都彭城背義帝之約而以親愛王諸侯不平諸侯之見項王遷逐義帝置江南亦皆歸逐其主而自王善地項王所過無不殘滅者天下多怨百姓不親附特劫於威強耳名雖為霸實失天下心故曰其強易弱今大王誠能返其道任天下武勇何所不誅以天下城邑封功臣何所不服以義兵從思東歸之士何所不剋且三秦王為秦將將秦子弟數歲矣所殺亡不可勝計又欺其衆降諸侯至新安項王詐坑秦降卒二十餘萬唯獨邯欣翳得脫章邯司馬欣董翳秦父兄怨此三人痛入骨髓今楚強以威王此三人秦民莫愛也大王之入武關秋毫無所害除秦苛法與秦民約法三章耳秦民無不欲得大王王秦者於諸侯之約大王當王關中關中人咸知大王失職入漢中秦人無不恨者今大王舉而東三秦可傳檄而定也於是漢王大喜自以為得信晚遂聽信計定秦滅項又曰項籍圍漢王於滎陽城久之漢王患之請割滎陽以西以和項王不聽漢王謂陳平曰天下紛紛何時定乎陳平曰然項王為人恭敬愛人士之廉節好禮者多歸之至於行賞功爵邑重之言愛惜之士亦以此不附今大王慢而少禮士廉節者不來然大王能饒人以爵邑士之頑鈍嗜利無恥者亦多歸漢王誠各去其兩短襲其兩長天下指麾可定矣又曰漢王與項籍約中分天下漢王欲西歸張良陳平説曰漢有天下太半而諸侯皆附之楚兵疲食盡此天亡之時也不因其飢而遂取之今釋不取所謂養虎自遺患也從之終滅羽漢書曰陳王拜項梁為楚上柱國梁自號武信君乃使宋義於齊道遇齊使者高陵君顯張晏曰顯名高陵縣名也曰公將見武信君乎曰然義曰臣論武信君軍必敗公徐行則免疾行及禍章邯夜銜枚擊楚大破之定陶梁死宋義所遇齊使者高陵君顯見楚懷王曰宋義論武信君必敗數日果破未戰先見敗徵此可謂知兵矣召宋義與計事而悅之因以為上將又曰西域都護為烏孫兵所圍上召陳湯問之湯曰烏孫瓦合不能久攻詘指計其日不出五日當有吉語聞果四日軍書言已解又曰黥布反帝召薛公問對曰使布出於上計東取吳西取楚并齊取魯傳檄燕趙固守其所山東非漢之有也出中計東取吳西取楚并韓取魏據敖倉之粟塞成皋之口勝敗之數未可知也出下計東取吳西取下蔡歸重於越身歸長沙陛下高枕而臥漢無事矣上曰是計將安出對曰必出下計布故酈山之徒也酈音離自致万乘之主此皆為身不顧後為百姓萬代慮也故曰出下計上自將東擊布布之初反謂其將曰上老矣厭兵必不能來使諸將獨患淮陰彭越今皆已死餘不足畏也故遂反果如薛公籌之東擊荊荊王劉賈敗死時賈都丹徒也漢終破布通典曰後漢末曹公擊馬超始賊每一部到公輒有喜色賊破之後諸將問故公答曰關中長遠若賊各依險阻征之不一二年不可定也今皆來集其衆雖多莫相歸服軍無適主一舉可滅為功差易吾是以喜又曰後漢末青州黃巾衆百餘萬人起兗州界刺史劉岱欲擊之鮑信諫曰今賊衆百萬百姓皆震恐士卒無鬭志不可敵也觀賊衆群輩相隨軍無輜重唯以抄掠為資今不若蓄士衆之力先為固守使彼欲戰不得攻則不能其勢必離散然後選精鋭據其要害擊之可破也岱不從遂與戰果為所殺劉岱為之而敗又曰後漢末荀攸從曹公征張繡攸言曰繡與劉表相持為強然繡以遊軍仰食表不能供也勢必離不如緩軍以待之可誘而致也不從表果救之軍不利曹公謂攸曰不用君言至是曹公違之而敗又曰後漢末張遼屯長社軍中有謀反者夜驚起亂火一軍盡擾遼謂左右勿動是不一營盡反必有造變者欲以動亂人耳乃令軍中不反者安陳遼將親兵數十人中陳而立有頃定即得首謀者殺之張遼審計立擒賊首亦同料敵之義又曰後漢末曹公征荊州劉琮降得其水軍及步軍遂遺書孫權云今將水軍十八萬與將軍會獵於長州之菀將士聞之恐權延見群下問計咸曰曹操託名漢相挾天子以征四方動以朝庭為辭今日拒之事更不順且將軍大勢可以距操者長江也劉表理水軍艨艟鬭艦千數操悉浮以沿江兼有步兵水陸俱下此則上江之險與我共之矣而勢力衆寡愚謂大計不如迎之權將周瑜曰操雖名漢相其實漢賊將軍神武雄才兼杖父兄遺烈據有江東地方千里兵精足用英豪樂業尚當橫行天下為漢家除殘去穢況操自送死豈可迎之耶請為將軍籌之使北土已安操無內憂能曠日持久來爭疆場又能與我校勝負於船楫可也今北土既未安而加以馬超韓遂在關西為操後患且捨鞍馬杖舟楫與吳越爭衡本非中國所長又今盛寒馬無藁草驅中國士衆遠涉江湖不曾習水土必生疾病此數四者用兵之患也而操皆冒行之瑜得請精兵三萬人徑進夏口保為將軍破之權曰老賊欲廢漢自立久矣但忌二袁呂布劉表與孤耳今諸英雄已滅唯孤尚存孤與老賊勢不兩立君言當擊甚與孤合權拔刀斫前奏案曰諸將吏敢復言迎曹操者與此案同果有赤壁之捷焉又曰蜀大將諸葛亮悉衆十萬由斜谷出始平據武功五丈原魏大將司馬宣王帥師拒之與亮對於渭南亮分兵屯田為久駐之本耕者雜於渭濱而百姓安堵軍無私焉屢使交書復致巾幗婦人之飾以怒宣王王亦屢表請戰魏使衛尉辛毗持節勒懿及軍吏以下不許出戰薑維謂亮曰辛毗杖節而到賊不復出矣亮曰彼無戰心所以固請者爾惑於衆耳將在軍君命有所不受茍能制吾豈千里請戰耶宣王使二千餘人就軍營東西角大聲稱萬歲亮使問之答曰吳朝有使至請降亮謂曰計吳朝必無降法卿是六十老翁何煩詭誑如此懿與亮相持百餘日亮卒於軍中及軍退懿追焉亮長史楊儀結陳反旗鳴鼓若將向懿者懿遽退不敢逼經二日乃行其營壘曰天下奇才也懿乃追之儀多布鐵蒺藜懿使軍士二千人著軟材平底木履前行蒺藜悉著履然馬步徑進追至赤岸方知審問百姓為之諺曰死諸葛走生仲達懿笑曰吾便料生不便料死故也孔明料吳下降明矣司馬不料亮死暗也吳志曰魏使大司馬曹仁步騎數萬向濡須為欲東攻羡溪朱桓分兵赴羡溪仁軍進拒濡須桓聞追羡溪兵未到而仁奄至諸將各懼桓喻之曰凡兩軍交對勝負在將不在衆寡兵法所以稱客倍而主人半者謂俱在平原無城池之守又謂士衆勇怯齊等故耳今仁既非智勇又久涉人馬罷困桓與諸軍共據高城南臨大江北陪山陵以逸待勞以主制客此百戰百勝之勢雖曹丕自來尚不足憂況仁等耶桓因偃旗鼓外示虛弱以誘仁果遣其子太攻濡須分遣將軍常雕王雙等乘油船襲中州桓自拒太太燒營退梟雕首生虜雙送武昌臨陳及溺死者千餘人十六國春秋曰前趙劉曜敗石勒將石季龍于高候今絳州聞喜縣界也遂圍洛陽勒將親救程遐等固諫曰劉曜乘勝兵盛難與爭鋒金墉糧豐攻之未可卒拔曜軍千里勢不支久不可親動動無萬全大業去矣勒大怒按劍叱遐等出召徐光而謂之曰劉曜乘高堆之勢團守洛陽庸人之情皆謂其鋒不可當也然曜帶甲十萬攻一城而百日不剋師老卒殆以我初鋭擊之可一戰而擒若洛陽不守曜必送死冀州自河以北席卷北向吾事去矣程遐等不欲吾親行卿以為何如光對曰劉曜乘高堆之勢不能進臨襄國更攻金墉此其無能為也懸軍三時無攻戰之利若鸞旗親駕必覩旌奔敗定天下之計在今一舉勒笑曰光之言是也使內外戒嚴有諫者斬命石堪石聰桃豹等各統見衆會滎陽使石季龍進據石門以左衛石邃都督中軍事勒統步騎四萬赴金墉勒謂徐光曜盛兵城皋間上計也阻洛水其次也坐守洛陽者成擒也勒諸軍至城皋勒見曜無守軍大悅乃卷甲銜枚詭道兼路出于鞏訾之間知曜陳其軍十餘萬人于城西彌悅勒入自宣門升故太極前殿季龍步卒三萬自城北而西攻其軍石堪石聰等各以精兵騎八千城西而北擊其前鋒大戰於西陽門勒躬貫甲胄出自閶闔夾擊之曜軍大潰於陳擒曜以徇于軍也
