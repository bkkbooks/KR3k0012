body:
  text: 地部二地下淮南子曰東方之極自碣石碣石山在東北海中過朝鮮朝鮮東夷貫大人之國東方有大人之國也東至日出之次扶木之池青土樹木之野皆日所出之地太皞勾芒所司者萬二千里其令曰挺群禁開閉闔通窮窒達障塞行優游棄怨惡解役罪免憂患休罰刑開關梁宣出財和外怨撫四方行柔惠止剛強南方之極自北戶烏孫之界北戶日在其北嚮以為戶貫顓頊之國南方有顓頊之國也南至委火炎風之野赤帝祝融之所司者萬二千里帝赤著明審諟也祝屬也融工也萬物盛長屬續而工也其令曰爵有德賞有功惠賢良救飢渴舉力農振貧窮惠孤寡養老疾出大祿行大賞起毀宗立無後封建侯立賢輔中央之極自崑崙東絶恆山崑崙在西方恆山北嶽也日月之所道謂二十八宿舍在地之分野江漢之所出人民之野五穀之所宜龍門河濟相貫以息壤堙鴻水之州禹以息土堙洪水以為中國九洲洲水中可居也東至於碣石黃帝后土之所司者萬二千里黃中色帝道諟地道載物故稱后也其令曰平而不阿明而不苛包裹覆露無不囊懷普大無私正靜以和行糜粥養衰弔死問疾以送萬物之歸西方之極自崑崙絶流沙沉羽沉羽弱水也其弱至沉毛羽也西至三危之國石城金室飲氣之民不死之野少皞蓐收之所司者萬二千里少皞白帝之號少皞陰用事物浩成也蓐茂也万物茂可收用之其令曰審用法誅必辜備盜賊禁姦邪勑群牧謹貯聚修城補決竇塞蹊徑隄溝瀆止流水壅溪谷守門閭陳兵甲選百官誅不法北方之極自九澤九澤北方之澤也窮夏海之極夏海大海也北至令止之俗令止丁令北海胡地有凍寒積冰雪雹霜霰漂潤群水之野顓頊玄冥所司者萬二千里顓頊黑帝之號頊大言大陰用事振翕而寒之也陰閉不見故神為玄冥也其令曰申群禁固閉藏修塞障繕關梁禁外徒斷罰刑殺當罪𨳲閭大搜客止交游禁夜樂早閉晏開以索姦人姦人已得執之必固大節已幾幾終也刑殺母赦雖有盛尊之親斷以法度母行水母發藏母釋罪又曰任一人之能不足以治三畝之宅也循道理之數因天地之自然則六合不足均也均平也又曰盧敖游乎北海盧敖燕人秦始皇帝召以為博士使求神仙亡而不返也徑乎太陰入乎玄闕太陰北方玄也至於蒙穀之上見一士焉深目而玄鬢渡注而鳶肩豐上而殺下軒軒然迎風而舞顧見盧敖慢然下臂遁逃乎碑盧敖就而視之方倦龜殼而食合梨合梨海蚌盧敖與之語曰唯敖為背群離黨窮觀於六合之外者非敖而已乎敖幼而好遊至長不渝解周行四極唯北陰之不窺今卒賭夫子於是子殆可與敖為友乎若士者齤音拳然嘆曰噫子中州民寧肯而遠至此此猶光日月言太陰之地尚見日月而載列星陰陽之所行四時之所生此其比夫不名之地猶突奧言我所游不可字名之地以盧敖所行之則如突奧中也若我南游乎岡䍚之野北息乎沉墨之鄉西窮冥冥之黨東開澒濛之光此其下無地而上無天聽焉無聞視焉無眴此其外猶有汰沃之汜汰沃四海與天之際流聲也汜崖也其餘一舉而千萬里千萬里狀沐之外也吾猶未能之在吾尚未至此地今子游始於此乃語窮觀豈不亦遠哉然子處矣哉吾與汗漫期於九垓之上汗漫不可知之妞九垓九天也吾不可以久居士舉臂而竦身遂入雲中盧敖仰而視之弗見乃止駕止其所駕而居尸子曰八極之內有君長者東西二萬八千里南北二萬六千里故曰天左舒而起牽牛地右闢而起畢昂孟子曰天子之地方千里不方千里不足以待諸侯諸侯之地方百里不方百里不足以守宗廟呂氏春秋曰凡四極之內東西五億有九萬七千里南北五億有九萬七千里又曰長廬子曰山海嶽河水金石火木此積形成乎地也又曰冬之德寒寒不信其地不成剛地不成剛則凍閉不開天地之大四時之化而猶不能以不信成物又況於人關令內傳曰地厚萬里其下得大空大空四角下有自然金柱輒方圓五千里土釋名曰土吐也吐生物也徐州貢土五色色有黃青白赤黑也土赤者鼠肝色也土色黑曰盧盧然解散也土黃而細密白埴埴職也如脂之職也土色青䔧似䔧草也土色白曰漂漂輕散也尚書禹貢曰冀州土白瓖孔安國曰無塊白壤兗州土黑墳孔安國曰色黑而墳起青州土白墳徐廣曰黎土也楊州土塗泥馬融曰漸如也荊州土塗泥豫州土白墳下墳盧孔安國曰盧踈也馬融曰豫州地青三等下者墳盧也雍州土黃壤徐州土赤戠墳謝沉注曰戠音志梁州土青驪孔安國曰色青黑又洪範曰五行其五曰土土爰稼穡稼穡作甘孔安國曰土可以種可以斂甘味生百穀尚書帝命驗曰土者金之父也周書作雒曰周公建太社於國中其壝東青土南赤土西白土北驪土中央以黃土將遣諸侯鑿其方一面土苴以白茅以土封之故曰裂土詩曰溥天之下莫非王土又曰孔樂韓土川澤滸滸周禮地官上曰大司徒辨十二土名以相民宅知其利害以任土事禮記曰范金合土以為臺榭又曰土斃則草木不長又曰地一撮土之多及其廣厚載華嶽而不重又曰衆生必死死必歸土此之謂鬼骨肉斃于下陰為野土陰蔭也蔡雍月令章句曰色別曰土言五方土色各異也崔實四民月令曰正月雨水中地氣上騰土長冒撅陳根可拔春秋元命苞曰土為言吐也言子成父道吐也氣精以輔也陽立於三故成生其立字十夾一為土春秋繁露曰天有十端其土為之一端春秋考異郵曰后族專則土踊宋均注曰陰盛也論語里仁曰君子懷德小人懷土家語曰孔子曰堯以土德王而尚黃黃土之色也又曰食土者無心而不息又曰宰我問於孔子曰聞鬼神之名而不知其所謂敢問孔子曰人生有魂氣有魄氣氣也者神之盛也衆生必死死必歸土此之謂鬼魂氣歸天此之謂神戰國策曰孟嘗君將入秦蘇秦曰臣來過於淄上有土偶人與桃梗相與語桃梗語人曰子岸上土也八月降雨淄水至則汝殘則復為岸矣今子淄水至則水漂何所之也漢書張釋之傳曰文帝拜釋之為廷尉人有盜高廟坐前玉環文帝怒下廷尉治奏當棄市上大怒釋之頓首謝曰假令愚民盜長陵一柸土陛下復何以加其法乎後漢書曰朱浮與彭寵書曰亦猶河濱之人捧土以塞孟津謝承後漢書曰東郡趙咨病自置小素棺使人取乾黃土二十石細搗篩之遺令亡後置土棺底厚一尺內尸於中以土壅上又曰范訓母亡以布囊盛土負以成壙魏志曰魏明帝起芳林園建昭陽殿公卿以下至於學生莫不展力帝乃躬自握土以率之後魏書曰高昴父次同語人曰吾四子皆五服我死後豈有人與我一鍬土邪及次同死昴大起冢對之曰此老公子平生畏無一鍬土今日被壓竟知之否唐書天寶十三載冊楊國忠為司空其日雨土江表傳曰孫權討袁術舉兵攻晥城術閉門自守糧食乏盡士女或丸土而吞之晉安帝紀曰劉敬宣在鮮卑夢丸土而服之既而占焉或答曰此服土吞丸也既覺而喜曰丸者桓也桓既吞矣我復本土也旬日中聞桓玄敗得來歸世本曰稟君名務相姓巴與樊氏暉氏相氏鄭氏凡五姓俱出皆爭神以土為船雕丈畫之而浮水中其船浮因立為君他船不能浮獨稟君船浮因立為君蜀王本紀曰蜀王獵於褒谷見秦王以金一笥遺蜀王蜀王報以禮物盡化為土秦王大怒臣下拜賀曰土地也今秦當得蜀矣崔鴻十六國春秋後趙録曰建武十二年沙門吳進言於帝曰胡運將衰晉當復興當苦役晉人以厭其氣帝於是使尚書張郡發近郡男女十六萬車十萬乘運土築華林園及長墟一作墻于鄴北廣長五里白虎通曰土在中央中央者主吐含萬物聖證論曰孔鼂云能吐生百穀謂之土河圖挺佐輔曰自此百世之後地高天下山陵消去不風不雨不寒不暑民復食土皆知其母不知其父雷煥別傳曰煥與張華見異氣起牛斗之間煥曰此寶劍也拜煥豐城令到縣掘屋基入四十餘尺得一石函中有雙劍琢錯文采翳而未明君初經南昌遣人取西山北巖下土二升黃白色拭劍光艷照耀莫不驚愕張公得劍喜置坐側曰此土南昌西山北巖土也不如華陰山赤土封一斤與君答書云詳觀劍體真干將也君更用赤土磨拭逾益精明晉書符堅傳初秦之未亂也關中土無火而煙氣火起數十里月餘不滅宋躬孝子傳曰宗承字世林父資喪葬舊塋負土作墳不役僮僕一夕間土壤高五尺松竹生焉荊州先德傳曰羅獻守巴東吳遣盛曼說獻合從之計詣獻求借城門獻遣參軍楊宗謾曰城中土一撮不可得何言城門乎三輔舊事曰成帝作延陵及起廟竇將軍有青竹田在廟南恐犯蹈之言作陵不便乃徙作昌陵取土十餘里土與粟同價關中記曰未央宮蕭何所造周回二十三里疏龍首山土為殿基殿基出長安城上也宣城記曰江矩吳時為廬江太守以清稱徵還船輕皆載土時歲暮逐除者就乞所獲甚少江乃語之逐除人見而去盛弘之荊州記曰武當縣有一溪岸土色鮮黃乃可噉義興記曰陽羡縣塘西潛壤中有黃土色如精金法顯記曰阿育王昔在小兒時當道戲遇迦葉佛乞食小兒欣喜即以一掬土施佛佛持還泥經行地因此果報作鐵輪王晉太康地記城陽姑募縣有五色土吳郡記曰吳縣餘杭山出白土光潤如玉墨子曰啇王紂不德兼夜十日雨土於亳孫卿子曰子貢問於孔子賜未知為人下者其猶土也深掘之而得甘泉樹之而五穀蕃草木植焉禽獸育焉生則主焉死則入焉多其功而不得為人下者猶土也韓詩外傳說苑並載也申子曰四海之內六合之間曰奚貴曰貴土土食之本也淮南子曰伊尹曰興土功也修腳者使之跖鏵強脊者使之負土淮南萬畢術曰東行馬蹄中土令人臥不起取東行白馬蹄下土三家井中泥合土和之置臥人臍上即不能起又曰竈之土不思故鄉取竈前三寸方半寸取中土持之遠出令人不思故鄉裴玄新言曰俗間有土公之神云土不可動玄有五歲女孫卒得病詣市卜云犯土玄即依方治之病即愈然後知天下有土神矣物理論曰游濁為土土氣合和而庶類自生抱朴子曰土飯瓦胾不療於飢壤說文曰壤軟土也尚書康誥曰賓奉圭弊執壤奠孔安國注曰賓諸侯執壤地所出而奠贄尚書孔安國注曰土無塊曰壤周禮地官上司徒職曰大司徒辦十二壤之物而名其種教稼穡樹藝史記曰李斯上書曰太山不讓土壤故能成其高河海不擇細流故能就其深王隱晉書曰解結問別駕治中曰河北白壤高良何故少人士每以三品為中正山海經曰洪水滔天鯀竊帝息壤以堙洪水不待帝命祝融殺鯀于羽郊郭璞注曰息壤謂土自長故可以堰水也漢元帝時臨除縣北甬長六里高二丈即息壤類帝王世紀曰禹葬會稽下不及泉上不通臭既葬收餘壤為壟蕭廣濟孝子傳曰巴郡文讓母死墳土未足耕一畝地為壤群鳥數千銜所作壤以著墳上關中記曰長安地皆黑壤城今赤如火堅如石韓子曰蟻冬居山之陽夏居山之陰蟻壤寸而有水乃掘遂得水塊禮記檀弓上曰寢苫枕塊左傳曰晉文公過衛出五鹿乞食於野野人豫之塊公怒咎犯曰天賜也稽首受而載之國語曰楚靈王於乾溪倣徨於山林枕疇人之股疇人枕王以璞而去之賈遠曰璞瑰也徐整長曆曰黃帝時風不鳴條雨不破塊也淮南子曰土勝水者非一墣塞江也許慎注曰璞塊也塵詩曰無將大車維塵冥冥禮記曰前有埃塵則載鳴鳶鄭玄注曰鳴則將風又曰為長者糞之禮必加帚於箕上以袂拘而退其塵不及長者左傳曰晉楚戰狐毛設二斾而退之欒枝使曳柴而僞遁曳柴起塵詐言聚衆走又曰潘黨望其塵使騁而告曰晉師至矣楚人懼遂出陳史記曰鉤弋夫人死雲陽暴風揚塵漢書酷吏傳曰長安中姦猾浸多受財報仇相與探丸得赤丸者斫武吏黑者斫文吏城中薄暮塵起死傷橫道枹鼓不息謝承後漢書曰范雲為萊蕪長閭里歌之曰甑中生塵范史雲魏志曰歲朝西北大雲風塵埃蔽天十餘日間何晏乃誅晉書王導傳庾亮以望重地逼出鎮於外南蠻校尉陶稱聞說亮當舉兵勸導密為之防導曰吾與元規休戚是同悠悠之談宜絶智者之口元規若來吾便角巾還第復何懼哉時亮執朝廷之權趍向者多歸之導內不能平常遇西風塵起舉扇自蔽徐曰元規塵汙人家語曰顏回拾甑中塵博物志曰徐州人謂塵土為蓬塊吳人謂塵土為坱崔鴻十六國春秋前秦録曰慕容冲叛符堅遣平原公暉討之冲乃令婦人各將一囊盛塵皆令騎牛服文采衣執持長槊於陳後冲晨攻暉兵刃交接昌言班隊何在於是奔競而進皆毀囊揚塵埃霧連天莫測多少暉衆大潰玄晏春秋曰余家素貧晝則苦於作勞夜則甘於疲寢三時之際書皆生塵山海經曰黑水之南有玄蛇食塵又曰大人國有青蛇頭方食塵帝王世紀曰黃帝夢大風吹天下塵埃皆去又夢人執千鈞之弩驅羊數萬群帝歎曰風為號令垢去土后在也豈有姓風名后者哉千鈞之弩異力能遠驅羊數萬群牧民為善豈有姓力名牧者哉得風后於海隅得力牧於大澤神仙傳曰王方平曰聖人言海中復揚塵老子曰和其光同其塵莊子曰野馬也塵埃也淮南子曰地不滿東南故水潦塵埃歸焉又曰蒙塵而欲無昧涉水而欲無濡不可得也語林曰劉道真年十五六在門前弄塵垂鼻涕至胸葛洪肘後方曰治暍死方取道中熱塵土以積暍人心下即活楚辭曰安能以皓皓之白蒙世俗之塵埃也宋謝莊月賦曰陳王初喪應劉端憂多暇緑苔生閣芳塵凝榭曹子建洛神賦曰羅襪生塵古詩云君為清路塵妾為濁水泥又曰京洛多風塵素衣化為緇世說曰虞公善歌發聲動梁塵李康遊仙序曰人生天地之間若流電之過戶牖輕塵之棲弱草兵書曰名將望塵知馬步之多少也晉書曰潘嶽諂事賈謐望塵而拜又曰簡文帝性冲淡所居凝塵滿席湛如也
