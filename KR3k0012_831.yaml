body:
  text: 資産部十尺寸禮記王制曰古者以周尺八尺為步今以周尺六尺四寸為步古者百畝當今東田百四十六畝三十步古者百里當今百二十一里六十步四尺二寸二分周尺之數未詳聞也案禮制周猶以十寸為尺蓋六國時多變亂法度或言周尺八寸則步更為八八六十四寸以此計之古者百畝當今百五十六畝二十五步古者百里當今百二十五里漢書曰度者分寸尺丈引也所以度長短也度音大各反本起黃鍾之長以子穀秬黍中者師古曰秬即黑黍中者不大不小也言取黑黍穀子大小中者率為分寸也一黍之廣度之九十分黃鍾之長一為一分十分為寸十寸為尺十尺為丈十丈為引而五度審矣其法用銅高一寸廣二寸長一尺而分寸丈尺存焉用竹為引高一分廣六分長十丈其方法矩高廣之數陰陽之象也分者自三微而成著可分別也寸者忖也尺者篗也師古曰篗音約丈者張也引者信也師古曰信謂曰伸言其長夫度者引於分忖於寸篗於尺張於丈信於引引者信天下也職在內官內官署名廷尉掌之師古曰法度所起故屬廷尉也魏略曰昔長安市儈有劉仲始者一為市吏所辱乃感激踏其尺折之遂行學問經明行修流名海內後以有道徵不肯就衆人歸其高晉書荀勗別傳曰魏杜夔制律乖錯勗知漢魏尺漸長於古四分夔依為律故不諧乃令佐著作劉恭依周禮制古尺新律呂以諧音韻後得古玉律鍾磬與新律相合詔賜古尺一具隋書曰世稱有田父於野地中得周時玉尺便是天下正尺荀勗試以校尺所造金石絲竹皆短校一米管子曰尺寸尋丈者所以得短長之情也故以尺寸量短長則萬舉而萬不失矣是故尺寸之度雖富貴衆強不為益長雖卑辱貧賤則弗為損度公平而無所偏故奸詐之人弗能誤也故明法者不可巧以詐僞有尋丈之數者不可欺以長短又曰以規矩為方圓則成以尺寸量短長則得以法數治民則安故事廣於理者其成若神孟子曰陳代謂孟子云枉尺直尋若宜可為枉尺直尋欲使孟子屈己宗道也尸子云孔子曰詘寸而信尺小枉而大直吾為之者也韓子曰釋法術而心治堯不能正一國去規矩而妄意度奚仲不能成輪廢尺寸而差短長王爾不能半中使中主守法術拙匠執規矩尺寸則萬不失孔叢子曰跬一舉足也倍跬謂之步四尺謂之仞倍仞謂之尋尋舒兩肱也倍尋謂之常五尺謂之墨倍墨謂之丈倍丈謂之端端謂之兩倍兩謂之匹兩有五謂之束家語曰孔子曰夫布指知寸布寸知尺舒肱知尋舒身知常斯不遠之則也白虎通同說苑曰度量衡以粟生之十粟為一分十分為一寸十寸為一尺十尺為一丈夢書曰丈尺為人正長短夢得丈尺欲正人也魏武上雜疏曰中宮用物雜畫象列尺一枚貴人公主有象牙尺三十枚宮人有象牙尺百五十枚骨尺五十枚量周禮冬官考工記曰栗氏為量改煎金錫則不耗消涷之精不復減也栗古文或作歷玄謂量當與鍾鼎同齊工異者大器不耗然後權之權謂稱分之也雖異法用金必齊權之然後準之準故書或作水杜子春云當為水金器有孔者水入孔中則當重也玄謂準擊平王之又當齊大小準之然後量之鑄之於法中也量讀如量人之量量之以為釜深尺內方尺而圜其外其實一釜以其容為之名也四升曰豆四豆曰區四區曰釜釜六斗四升也釜十則鍾方尺積千寸於今粟米法少二升八十一分升之二十二其數必容釜此言大方耳圜其外者為之脣其臀一寸其實一豆故書臀作脣杜子春云當為臀謂覆之其底深一寸也其耳三寸其實一升耳在旁可舉也重一鈞重三十斤其聲中黃鍾之宮應律之首概而不稅鄭司農云令百姓得以量而不租稅其銘曰時文思索允臻其極銘刻之也時是也允信也臻至也極中也言是文德之君思求可以為民立法者而作此量信至於道之中矣嘉量既成以觀四國以觀示四方使放象之永啓厥後茲器維則左傳昭公三年云晏子曰齊舊四量豆區釜鍾四升為豆各自其四以登於釜四豆為區區斗六升四區為釜釜六斗四升登成也釜十則鍾六斛四斗陳氏三量皆登一焉鍾乃大矣登加也一謂加舊量之一也以五升為豆五豆為區五區為釜則區二斗釜八斗鍾八斛以家量貸而以公量收之貸厚而收薄漢書曰量者籥合升斗斛也所以量多少也本起於黃鍾之籥用度數審其容師古曰因度以生量也其容謂其中所容受之多少也以子穀秬黍中者千有二百實其籥以井水準其概概欲其直故以水平之井水清清則平也師古曰概所以概平斗斛之上者也十籥為合十合為升十升為斗十斗為斛而五量嘉矣其法用銅方尺而圓其外旁有庣焉師古曰庣不滿之處也音吐雕反其上為斛其下為斗其上謂仰斛也其下謂覆斛之底受一斗也左耳為升右耳為合籥其狀似爵以縻爵祿縻散也上三下二參天兩地圜而函方左一右二陰陽之象也其圜象規其重二鈞備氣物之數合萬有一千五百二十三十斤為鈞萬一千五百二十銖聲中黃鍾始於黃鍾而反覆焉孟康曰反斛聲中黃鍾覆斛亦中黃鍾之宮宮為君也臣瓚曰仰斛受一斛覆底受一斗故曰而反覆焉君制器之象也籥者黃鍾律之實也躍微動氣而生物也合者合籥之量也升者登合之量也斗者聚升之量也斛者角斗平多平少之量也夫量者躍於籥合於合登於升聚於斗角於斛也職在太倉大司農掌之也孔叢子曰一手之盛謂之溢兩手謂之掬掬四升也掬謂之豆豆四謂之區區四謂之釜釜二半謂之藪藪謂之缶缶謂之鍾鍾二有半謂之秉秉十六斛也曹瞞傳曰太祖常賦廩穀不足私謂主者曰如何主者曰以小斛量之太祖曰善後軍中言太祖欺衆太祖謂主者曰當特借汝死以厭衆不然事不解乃取狥曰行小解盜官穀斬之軍門風俗通曰斛者角也庾三斛四斗秉二十四斛稱廣雅曰稱謂之衡錘謂之權說文曰稱銓也禮記令仲春曰是月也日夜分則同度量平權衡因春分晝夜平則正之同亦平也丈尺曰度斗斛曰量稱錘曰權稱上曰衡又經解曰禮之於正國也猶衡之於輕重也繩墨之於曲直也規矩之於方圜也故衡誠縣不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圜漢書曰衡權者衡平也權重也衡所以任權而鈞物平輕重也其道如砥砥平也謂以砥石厲物令平齊也砥音指以見準之正繩之直左旋見規右折見矩其在天也佐助璇機斟酌建指以齊七政故曰玉衡論語云立則見其參於前也孟康曰權衡量三尋為參在車則見其倚於衡也又曰齊之以禮此衡在前居南方之義也權者銖兩斤鈞石也所以稱物平施知輕重也本起於黃鍾之重一籥容千二百黍重十二銖兩之為兩二十四銖為兩十六兩為斤三十斤為鈞四鈞為石忖為十八易十有八變之象孟康曰忖度也度其義有十八也黃鍾籥銖兩鈞斤石凡七與下十一象為十八也五權之制以義立之以物鈞之其餘大小之差以輕重為宜圜而環之令之肉倍好者孟康曰謂為鍾之形如環也如淳曰體為肉孔為好周旋無端終而復始無窮已也銖者物繇忽微至於成著可殊異也兩者兩黃鍾律之重李奇曰黃鍾之重重十二銖兩十二得二十四銖二十四銖而成兩者二十四氣之象也斤者明也三百八十四銖易二篇之爻陰陽變動之象也十六兩成斤者四時乘四方之象也鈞者均也陽施其氣陰化其物皆得其成就平均也權與物均重萬一千五百二十銖當物之象也四百八十兩者六旬行八節之象也孟康曰六甲為六旬一歲有八節六甲周行成歲以六乘八節得之也三十斤成鈞者一月之象也石者大也權之大者也始於銖兩明於斤均於鈞終於石物終石大也四鈞為石者四時之象也重百二十斤者十二月之象也終於十二辰而復於子黃鍾之象也孟康曰稻之數始於銖終於石石重百二十斤象十二月銖之重本取於子律黃鍾一籥容千二百黍為十二銖故曰復於子黃鍾之象也千九百二十兩者陰陽之數也三百八十四爻五行之象也四萬六千八十銖者萬五千五百二十物歷四時之象也而歲功成就五權謹矣魏志曰鄧哀王冲字倉舒少聰察歧嶷生五六歲智意所及有若成人孫權曾致巨象太祖欲知其斤重訪之群下咸莫能出其理冲曰置象大船之上而剋其水所至稱物以載之則立可知矣太祖大悅即施行焉吳志曰薛綜上疏云九真會稽朱符多以鄉人虞裒劉彥之徒作長吏侵虐百姓強賦於民黃魚一枚收稻一稱唐書曰安祿山晚年益肥垂肚過膝自稱得三百五十斤每朝見玄宗戲之曰朕適見卿肚幾垂至地管子曰權衡者所以起輕重之數也然而人不事者非心惡利也權不能為之多少其數而衡不能為之輕重其量也知事權衡之無益故不事也又曰有權衡之稱者不可欺以輕重有尋文之數者不可差以長短又曰四會諸侯令曰修道路偕度量一稱數偕同也稱斤兩也數多少也莊子曰聖人不死大盜不止為權衡以稱之則并與權衡而竊之雖有軒冕之賞弗能勸斧鉞之威不能禁掊斗折衡而民不爭也慎子曰厝鈞石使禹察錙銖之重則不識也縣於權衡則氂髮之微識矣及其識之於權衡則不待禹之智中人之知莫不足以識之矣慎子曰君臣之間猶權衡也權左橛則右重右重則左橛輕重迭相柝天地之理也孔叢子曰二十四銖四兩兩有半曰揵倍揵曰舉倍舉曰鏘鏘謂之鍰二鍰四兩謂之斤斤十二謂之衡衡有半謂之倍稱謂之鈞鈞四謂之石石四謂之鼓然則鼓四百八十斤也韓子曰人之不事衡石者非貞廉而遠利也石不能為人多少衡不能為人輕重求索不得故人不事也明主之國官不敢枉法吏不敢為私利貨賂不行是境內之事盡如衡石也說苑曰度量衡以十粟生之十粟重一豆六豆重一銖二十四銖重一兩十六兩重一斤三十斤重一鈞四鈞重一石語林曰孟業為幽州其人甚肥或以為千斤武帝欲稱之難其大臣乃作大稱挂壁業入見帝曰朕欲試自稱有幾斤業答曰陛下正是欲稱臣耳無煩復勞聖躬於是遂稱業果得千斤夢書曰銓衡為人正也夢得衡為平端也以銓稱量平財錢也重者價貴輕者賤也銓衡折敗無平人也李尤權衡銘曰夫審輕重莫若權衡正是非其唯賢明剪刀爾雅釋言曰劑剪齊也郭璞注曰南方人呼剪刀為劑刀釋名曰剪刀剪進也所剪稍進前也齊書曰范雲幸於竟陵王子良江祐求雲女婚姻因酣以巾箱中剪刀與雲曰且以為娉雲笑受之至是祐貴雲又因酣曰昔與將軍俱為黃鵠今將軍化為鳳皇荊布之室理隔華盛因出剪刀還之南史曰沙門寶志不知何許人齊宋之交稍顯靈跡被髮徒跣語默不倫恆以銅鏡剪刀鑷屬挂杖負之而趍預言未兆識之多驗修復山陵故事曰后梓宮用剪刀六枚東宮舊事曰太子納妃有龍頭金縷交刀四銀牙鎖綵帶副世說曰爰綜為新安太守郡南界有刻石爰至其下宴飲忽有人得剪刀於石下者衆咸異之綜問主簿主簿對曰昔吳長沙桓王嘗飲餞孫洲父老云此洲狹而長君當為長沙乎事果應夫三刀為州得交刀君亦當交州後果交州幽明録同衣軸世說曰張華將敗有飄風吹衣軸六七倚壁管禮記內則曰針管線纊荀卿針縷賦曰管以為母魏武上雜物疏曰中宮雜物雜畫象牙針管一枚針說文曰針綴衣也禮記內則曰舅姑衣裳綻裂細針請補綴左傳成公上曰楚伐魯賂以執針百人女工吳書曰虞翻年十二客詣翻兄不過之乃與客書曰虎魄不受腐芥慈石不受曲針王隱晉書曰東宮舊制月請五十萬以供衆用愍懷太子桓採取三月以供賤妾舍人杜錫數諫太子後取針著錫常坐處氈中錫上床刺足血流晉書曰鳩摩羅什嘗講經于草堂寺姚興及朝臣大德沙門千餘人肅然觀聽什忽下高坐謂興曰有二小兒登吾肩欲障須婦人興乃召宮女進入一交而生二子焉興嘗謂什曰天師聰明超悟天下莫二何使法種無嗣遂以妓女十人逼令受之爾後不住僧坊別立廨舍諸僧多效之什乃聚針盈鉢引諸僧謂之曰若能見效食此者乃可畜室爾因舉匕進針與常食不別諸僧愧服乃止又曰顧愷之常悅一鄰女挑之弗從乃圖其形於壁以棘針釘其心女遂患心痛愷之因致其情女從之遂密去針而愈宋書曰傅琰為山陰令賣針賣糖老姥爭團絲來詣琰琰樹團絲於柱鞭之密視有鐵屑乃罰賣糖者南史曰齊王奐為雍州刺史加都督與寧蠻長史劉興祖不睦十一年奐遣軍主朱公息征蠻失利興祖欲以啓聞奐大怒收付獄興祖於獄以針畫漆合盤為書報家稱枉令啓聞而奐亦馳信啓上誣興祖扇動荒蠻上知其枉勑送興祖還都後魏書曰胡太后臨朝常幸西林園命侍臣射不能者罰之又自射針中之大悅吳楚春秋曰勾踐與妻入臣吳妻奉針縷北面為妾管子曰女必有一刀一針然後成為女淮南子曰先針而後縷可以成帷先縷而後針不可以成衣針成幕蕢成城幕帷也縷非針無以通故宜先蕢土籠也始於一蕢以成其城也淮南萬畢術曰首澤浮針取頭中垢塗針塞其孔水中則浮針抱朴子曰彈鳥則千金不及丸泥縫緝則長劍不及數分之針又曰結巾投地而菟走針綴丹帶而蛇行西京雜記曰漢綵女常以七月七日夜穿七針於開襟樓俱以習之說苑曰客因孟嘗君寄於齊王而不用客反見孟嘗君曰不知君之過臣之罪孟嘗君曰夫縷因針而入不因針而急典論曰劉表子弟好酒設大針於坐端有醉伏者輒刺驗其醉醒王子年拾遺記曰魏文帝美人薛夜來妙於針巧雖處於深帷重幕之內不用燈燭裁衣製作立成非夜來所縫製帝不服也宮內號曰針神諸葛元遜傳曰昔元遜對南陽韓文晃誤呼其父字晃難之曰何人子前呼人父字是禮乎諸葛笑答曰向天穿針而不見天何者不輕天意有所在耳即罰文晃酒一杯王郎新奏議曰至於遺針御衣懼傷至尊之體故加之以髡刑將欲懲戒先傷以防絶後傷輿地志曰齊武起曾城觀七月七夕宮人登之穿針世謂之穿針樓劉義恭啓事曰聖恩賜金銀針七色縷并格一犀棟刷匣副綿布兆珍服寶玩以協嘉辰孫卿針賦曰有物於此生於山阜處於堂室不盜不竊穿窬而行日夜合離以成文章以能合從又善連橫下覆百姓上飾帝王時用則存不用則亡臣愚弗識敢請之王曹大家針賦曰鎔秋金之剛精形微妙而直端性通達而漸進博庶物而一貫醫針附魏志曰樊何從華他學何善針凡醫咸言背及胸藏之間不可妄針何針背入一二寸巨闕入五六寸疾輒瘳三輔舊事曰江充為桐人長尺以針刺其腹埋太子宮中充曉醫術因言其事燉煌實録曰張存喜針存有奴好逃亡存宿行針縮奴腳欲使則針解之王渾表曰臣有氣病善夜發服半夏湯或服湯不解尚取針前殿中醫趙恭思纂見給事醫在醫署纂能針有方伎乞以纂名課稱考課醫給臣自療治梁書曰王僧孺多識古事侍郎金元起欲注素問訪以砭石僧孺答曰古人當以石為針必不用鐵說文有此砭字許慎云以石刺病也東山經高氏之山多針石郭璞云可以為砭針春秋美疹不如惡石服子慎注云石砭石也季世無復佳石故以鐵代之耶唐書曰貞觀中太宗幸甄權宅權頴川人醫術為天下最孫思邈師之以授針法時年一百三歲唐書曰太宗征高麗江夏王道宗在陳損足上親為之針鐕說文曰鐕可以綴署物者也韻集鐕綴衣細竹也晉東宮舊事曰太子納妃金鐕二枚縫說文曰縫線也縷線也周禮春官下曰縫人掌王宮縫線之事以役女御縫王及后之衣服淮南子曰秦代天下婦不得剡麻考縷抱朴子曰高巖將霣非細縷所綴龍門沸騰非掬壤所遏西京雜記曰賈佩蘭云在宮時七月七日臨百子池作于闐樂樂畢以五色縷相羈謂為連愛鄴中記曰北方五月五日自作飲食祠神乃作五色縷花相遺不為介子推離騷大招曰秦𦃪齊縷鄭線絡鄭氏婚禮謂文讚曰長命之縷女工所制縫君子裳高松為例
