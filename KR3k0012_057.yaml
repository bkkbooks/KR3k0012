body:
  text: 地部二十一陸釋名曰高平曰陸陸漉也川流漉而去也説文曰陸高平地也周易曰鴻漸于陸夫征不復婦孕不育凶利禦寇王弼曰陸高之頂也進而之陸與四相得不能復反者也又曰莧陸夬夬中行無咎易坤靈圖曰聖人受命瑞應先於河瑞應之至聖人殺龍龍不可殺皆感氣也君子得衆人之助瑞應先見於陸瑞應之至君子殺蛇蛇不如龍陸不如河焦贛易林曰山沒丘浮陸為水魚燕雀無巢民無室廬又曰鳧池水廉高陸為海江河橫流魚鱉成市尚書曰恆衛既從大陸既作孔安國曰二水已治從其故道大陸之地已可耕作也毛詩曰考盤在陸碩人之軸又曰鴻飛遵陸公歸不復於女信宿毛萇曰陸非鴻所宜處也周禮曰作車以行陸作舟以行水此皆聖人之作樂動聲儀曰土肥饒原陸隘狹斯生奢侈之俗也漢書曰禹陸行載車又曰秦地有鄠杜竹林號曰陸海又曰鄒陽奏書吳王曰高皇帝水攻則章邯以亡其城陸擊則荊王以失其地魏名臣奏曰執金吾龐延秦其山居林澤有火耕畬種而平地平陸雖有往古耒耜區種之法就其收者適可疏食不足實食也關令內傳曰關令尹喜生時其家堂陸地自生蓮華光色鮮盛文子曰卻走馬以糞車軌不接於遠方之外是謂坐馳陸泛老子曰蓋聞善攝生者河上公曰攝養也陸行不遇兕虎自然遠避害不干也入軍不被甲兵莊子曰泉涸魚相與處陸相煦以濕相濡以洙不若相忘于江湖王充論衡曰夫知古不知今謂之陸沉然則儒生所謂陸沉者也應劭風俗通曰荊鱉令死亡隨水上荊人求之不得也鱉令至岷山下邑起見蜀望帝使鱉令鑿巫山然後蜀得陸處望帝自以德不如以國禪與鱉令為蜀王號曰開明傳子曰堯遭洪水而貴陸湯大旱而重水又曰陸田命懸於天人力雖修茍水旱不時則一年之功棄矣六韜曰天下之人陸沉於殷久矣傅咸扇賦曰水不策驥陸不乘舟世無為而俎豆設詩時有虞而干戈修夏侯湛春可樂曰春可樂兮樂崇陸之可娛登夷岡以逈眺兮超矯駕乎山嵎又秋可哀曰秋可哀兮哀南畝之菜荒既採蕭於大陸兮又刈蘭乎崇岡又梁田賦曰嬉于夷寧之廣陸步于大野之長京察田疇之疆畔兮觀遊雉之逸形京説文曰京人所為絶高丘也毛詩曰升彼墟矣以望楚矣望楚與堂景山與京毛萇曰京高丘也又曰曾孫之稼如茨如梁曾孫之庚如玹如京又曰依其在京侵自阮疆陟彼高岡無矢我陵爾雅曰丘之高絶者曰京張揖廣雅曰四起曰京應劭風俗通曰京謂非人力所能成天地性自然也京師義亦取此阿説文曰大陵曰阿一曰阿曲阜也毛詩曰無矢我陵我陵我阿無飲我泉我泉我池鄭玄曰文王侵阮國阮之兵無敢當其陵及阿又無敢飲於泉及池者也又曰有卷者阿飄風自南毛萇曰惡人被化而消猶飄風之入曲阿也愷悌君子來遊來歌以矢其音又曰誰謂爾無羊三百維群誰謂爾無牛九十其犉或降于阿或飲于池又曰陟彼中阿言採其虻又曰考盤在阿碩人之邁又曰菁菁者莪在彼中阿又曰綿蠻黃鳥止于丘阿張揖廣雅曰曲陵曰阿史記曰黃帝披山通道而邑于涿鹿之阿帝王世紀曰蚩尤氏強與榆岡爭王於涿鹿之阿穆天子傳曰天子西征升于九阿郭璞曰今新安縣十里九坂也嵇康聖賢高士傳讚曰許由養神宅于箕阿德真體全擇日登遐樂資春秋後傳曰阿旁宮未成成更欲擇令名名之作宮阿旁故天下謂之阿旁宮漢武內傳曰西王母命侍女欹云仰上升絳庭下遊日窟阿顧盼八落外遠指九空遐董覽吳地志曰曲阿秦時名雲陽太史云東南有天子氣在雲陽之間故鑿北岡令曲而阿因名曲阿桓寬鹽鐵論曰晉有河華九阿而奪於六卿齊有泰山巨海而脅於田常孫楚王驃騎誄曰逍遙芒阿闔門下帷研精六藝採鉤微湛方生詩曰發鞍踞平陸秣馬青山阿濁酒炙枯魚鼎食何必過袁宏採菊詩曰息足回阿圓坐長林披榛即澗藉草依陰酈炎詩曰靈芝生河洲動搖困洪波秋蘭榮何晚嚴霜瘁其柯哀哉二芳草不殖太山阿摯虞遷宅誥曰惟大始三年九月上旬涉自洛川周于原阿乃卜昌水東黃水西背山面隰惟此良陸機逸民賦曰相荒土而卜居兮度山阿而考室又緩齊歌行曰遨仙聚靈族高宴曾城阿長風萬里舉慶雲鬱嵯峨峴從征記曰青峴沙峴一名小峴木多櫨杏續述征記曰菟頭峴雖無峭嶮然連林修坂數十里中行者固亦密勿矣伏琛齊地記曰萊蕪谷有銅冶峴古鑄銅處朱虛城西有山峴遠而峻今名半車峴白淵之齊道記曰黃丘北十里有鸑鷟峴下帶長澗東北流經牛山山去此水八十餘里今號曰牛頭水是齊景公所登而歎處劉楨京口記曰去城九里有白在峴江乘地記曰城東四十五里竹里山王途所經途甚傾嶮行者號為翻車峴也武昌記曰城東南有金牛岡岡西有石鼓峴上有三石鼓鼓鳴天必雨隴方言曰秦晉之間冢謂之隴説文曰隴天水天坂也廣志曰泳沙在玉門關外東西數百里有三斷名曰三隴也三秦記曰隴西開其坂九回不知高幾里欲上者七日乃越高處可容百餘家下處數十萬戶上有清水四注俗歌曰隴頭流水鳴聲幽咽遙望秦川心肝斷絶去長安千里望秦川如帶又關中人上隴者還望故鄉悲思而歌則有絶死者秦州記曰隴西郡東一百六十里得隴山南北亘接不知遠近東西廣百八十里其高處可三四里登此嶺東望秦川四五百里極目茫然墟宇桑梓與雲霞一色東人西役升此而顧瞻者無不悲思其上懸巖吐霤於嶺中淵停名曰萬石淵溢流散下皆注於渭故北人升此而歌始興記曰廬水合武水甚險名曰新隴有太守周昕廟即始開此隴者行者放雞散米以祈福而忌著濕衣入廟堆爾雅郭璞注曰江東呼地高堆者為敦説文曰阜小阜也又曰巴蜀山岸脅之堆傍欲落者曰坁坁崩聲聞數百里漢書曰揚雄上書曰往者圖西域豈為康居烏孫踰白堆而寇西邊哉乃以制胸奴也堆形如土龍無頭尾高者二三丈水經注曰緱氏山仙者升焉言王子晉控鶴斯阜靈王望而不得近舉手謝而去其處得遺屣焉俗謂為父堆又曰函關直北隔河有層阜巍然獨秀孤峙河陽世謂之風陵戴延之所謂風埏者也又曰瞿堆南絶壁峭峙孤嶮雲高望之形若覆唾壺高二十餘里羊腸蟠道三十六回開山圖謂之仇夷所謂積石嵯峨嶔岑隱阿者也上有平田百頃煮土成鹽因以百頃為號山上豐水泉所謂清泉湧沸潤氣上流者也漢武帝元狩六年開以為武都郡天地大澤在西故以都為目矣長安圖曰高望堆在延興門南八里潘嶽西征賦曰憑高望之陽隈梁州記曰南鄭城泝漢上五十里水邊有漢武堆漢武嘗遊此以為鉤臺後人覩其崇基謂之漢武堆述異記曰當陽縣南有龍川鳳川云漢帝時八龍五鳳常遊於此亦呼為五鳳堆安定圖經曰振履堆者故老云夸父逐日振履於此故名之墟説文曰墟大丘也崑崙謂之墟史記曰成王伐管蔡以殷餘人封康叔為衛君居故啇墟漢書曰元城郭東有五鹿之墟即沙麓之地也越絶書曰千里墟者闔廬以鑄干將劍處又曰吳門外雞坡墟故吳王所畜雞處也新序曰齊恆公出見遺墟問諸野人野人曰是虢公之墟公曰虢氏何為亡對曰善不能行惡不能去所以為墟矣風俗通曰謹案尚書舜生姚墟又曰姚墟在濟陰城陽縣帝顓頊之墟閼伯之墟是也培塿説文曰附婁小土山也左傳曰培塿無松柏方言曰冢秦晉之間謂之培塿墨子曰培塿之沉則生松柏民衣焉食焉家焉死焉地終不責德故以為仁風俗通曰培塿者即阜之類也今齊魯之間田中小高者名之為培塿矣
