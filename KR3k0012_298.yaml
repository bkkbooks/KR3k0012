body:
  text: 兵者二十八訓兵孫子曰言不相聞故為鼓鐸鐸金鉦也聽其音聲以為耳候也視不相見故為旌旗瞻其指麾以為目候夫金鼓旌旗者所以一人之耳目也齊一耳目之視聽使知進退之度人既專一則勇者不得獨進怯者不得獨退齊之以法教使強弱不得相踰紛紛紜紜間亂而不可亂旌旗亂也示敵若亂以金間之紛紛旌旗像紜紜士卒貌言旌旗翻轉一合一離士卒進退或往或來視之若擾觀之若亂然其法令素定度幟分明各有分數擾而不亂也渾渾沌沌形圓而不可敗車騎齊轉也形圓者出入有道齊整也渾渾車輪轉行沌沌步騎奔馳視其行陳縱橫圓而不方然其指趣各有所應故王子曰將欲內明而外暗內理而外軍所以示敵之輕己者也渾外本切沌徒損切周禮曰太宗伯以軍禮同邦國同謂威其不協僭差者軍禮之別五也太師之禮用衆也用其義勇也大均之禮恤衆也均其地政地守地職之賦所以憂民也大田之禮簡衆也古之因田習兵閲其車徒之數也大役之禮任衆也築宮邑所以事民力強弱也大封之禮合衆也止封疆溝塗之固所以合聚其民也又曰夏官大司馬之職掌仲春教振旅司馬以旗致民平列陳如戰之陳以教坐作進退疾徐疏數之節遂以搜田仲夏教茇舍如振旅群吏撰車徒遂以苗田仲秋教治兵如振旅辨旗物之用遂以獮田仲冬教大閲前期群吏聽誓于陳前斬牲以左右徇陳曰不用命者斬之遂以狩田師以救無辜伐有罪若師有功則左執律右秉鉞以先愷樂獻于社左傳曰春搜夏苗秋獮冬狩於農隙以講武事三年而治兵入而振旅歸而飲至以數軍實昭文章明貴賤辨等列順少長習威儀也又曰楚子文治兵於睽終朝而畢不戮一人子玉復治兵於蒍終日而畢鞭七人貫三人耳國老皆賀子文蒍賈不賀曰子玉剛而無禮過三百乘其不能以入矣子玉之敗子之舉也舉以敗國將何賀焉又曰苗賁皇徇曰搜乘補卒秣馬利兵修陳固列蓐食申禱明日復戰乃逸楚囚又曰宣子曰我若受秦則賓也不受寇也既不受矣而復緩師秦將生心先人有奪人之心軍之善謀也逐寇如追逃軍之善政也訓卒利兵秣馬蓐食潛師夜起戊子敗秦師于令狐至于刳首又曰宣榭火宣榭講武室也論語曰子曰善人教民七年亦可以即戎矣可就兵攻戰也又曰不教民戰是謂棄之後漢書曰靈帝時望氣以為京師有大兵兩宮血流以為太公六韜有天子將兵事可以威厭四方帝乃講武於平樂觀下起大壇建五采蓋天子擐甲介馬稱無上將軍何進領兵屯於觀下置西園八校尉袁紹曹操等為之唐書曰太宗初即位突厥入寇欲諸軍皆習騎射每退朝即引諸衛將習射于顯德殿庭謂將軍已下曰古突厥與中國更有盛衰若軒轅善用五兵即能北逐獯虜周宣驅駕方召亦能制勝太原下至漢晉之君洎于隋代不使兵士素習干戈突厥來侵莫能抗禦遣中國生民塗炭於寇手我今不使汝等穿池築苑造諸淫費農民恣令逸樂兵士唯習弓馬若無賊來我則為汝博士教汝等武藝優長若有賊來我即為汝將師領汝鬭戰亦望使汝等前無橫敵於是日引數百人於殿庭教射太宗親自臨試每坐或至午時射中者隨賞弓力布帛統帥加上考朝臣咸諫云不宜引卑碎之人挾狐矢於軒陛之側上曰率土之內皆吾臣子我所恨不能將我心遍置人腹中豈有相疑之道哉由是一二年間兵士盡便弓馬又曰李抱真領澤潞觀察留後抱真密揣山東當有變上黨且當兵衛是時乘戰餘之地土塉賦重人益困無以養軍士乃籍戶丁男三選其一有材力者免租徭給弓矢令之曰農之隙則分曹角射歲終吾當會試及期按簿而徵之都試以示賞罰復命之如初比三年則皆善射抱真曰軍可用矣於是舉部內之鄉得成卒二萬前既不廩費府庫益實乃繕兵甲為戰具遂雄視山東是時稱昭義步兵冠諸軍又曰德宗即位以馬燧為太原尹北都留守河東節度觀察度支營田使是時承鮑防自百并敗軍之後兵甲寡弱騎士少燧乃悉召將吏牧馬廝役得數千人悉補騎卒教之數月皆為精騎造甲者必令長短三等稱其所衣以便進趨又造戰車以狡猊象刺戟於後行則載兵甲止則為營陳或塞險厄以遏奔衝器械無不犀利居一年陳兵三萬開廣場以習戰陳教其進退古司馬兵法曰凡戰非陳之難使人可陳難非可使陳難使可用難使人盡心效力用必勝也非知之難行之難教習使人知進退之便左右之利事事自行之者難又曰天子之義必純取於天地而觀於先聖天子奉天地之道調和陰陽四時之氣順先王之法度也士庶之義必奉於父母而正於君長士庶必從父母之教君長之命故雖有明君士不先教不可用也雖有明君士不教習不可以受敵也古之教民必立貴賊之經綸使高下不相凌德義不相踰材伎不相掩勇力不相犯故力同意和古者國容不入軍軍容不入國故德義不相踰治國以仁德軍事以勇德以從化義以法斷以國容入軍則軍敗軍容入國則國亂也吳起教戰法曰短者持矛戟長者持弓弩強者持旌旗勇者持金鼓弱者給廝養智者為謀士鄉里相比什伍相保一鼓整兵二鼓戰陳三鼓趣食四鼓然辨五鼓就行聞鼓聲合然後舉旗六韜曰教戰之法必明告吏士三令五申教其操兵起居進止旌旗指麾陳而方之坐而起之行而止之左而右之列而合之絶而解之無犯進止之節無失飲食之宜無絶人馬之力令吏士一人學戰教成十人十人學戰教成百人百人學戰教成千人千人學戰教成萬人萬人學戰教成三軍之衆大戰之法百萬之師故能成大功也衛公兵法曰諸兵士將戰身貌尪弱不勝衣甲又戎具所施理須堅徑須簡取強兵并令試練器仗兵須徹扎陷堅皆須取甲試令所射然始取中又曰每營中兩廂置土馬十二匹大小如常馬真鞍令士卒擐甲胄櫜弓矢櫜音高佩刀劍持矛楯左右上下以便習其事又教旗法曰凡教旗於平原曠野登高遠視處大將居其上南向左右各置鼓一十二面角一十二具左右各樹五色旗六纛居前列旗節次之左右衙官駐隊如偃月形為後騎下臨平野使士卒目見旌旗耳聞鼓角心存號令乃命諸將分為左右皆去兵刃精新甲胄幡幟分為左右廂各以兵馬使為長班布其次陳間容陳隊間容隊曲間容曲以長參短以短參長回軍轉陳以後為前以前為後進無奔迸退無趨走以正合以奇勝聽音覩麾乍合乍離於是三令五申白旗點鼓音動則左右廂齊合朱旗點角音動左右廂齊離離之與合皆不離中央之地左廂陽向西旋右廂陰向東旋左右各復本初白旗棹鼓音動左右各雲蒸鳥散彌川絡野然而不失部隊之踈密朱旗棹角音動則左右各復本初前後左右無差尺寸散則法天聚則法地如此三合而三離三聚而三散不如法者吏士之罪從軍令於是大將出五彩旗一十二口各樹於左右廂陳前每旗命壯勇士五十人守旗選壯勇士五十人奪旗左廂奪右廂右廂奪左廂鼓音動而奪角音動而止得旗者勝失旗者負勝賞而負罰離合之勢聚散之形勝負之理賞罰之信因是而教之太白陰經曰春秋末並為戰國增講武之禮以為戲樂以相誇視而秦更名為角抵故國雖大好戰必亡天下雖平亡戰必危天下既平春搜秋獮振旅理兵所以不忘戰今邊軍更名曰教旗使士卒識金鼓別旗幟任行列知部分一軍之節制也又曰古之諸侯畋獵者為田除害也上所以供承宗廟下所以間習武事太古之時人食禽獸之肉坐其皮後代之人浸多時禽獸寡少衣食不足於是神農教其植穀導以紡績自是之後禽獸復盈山林下平土害禾稼為人所害於是王公秋冬無事畋獵間習兵革奮揚威武以戒非常李冬之月獵日陰用事萬物畢成蟄蟲已伏乃具卒乘從禽于山澤以教部伍分進退之儀一人守圍地三尺十二時守三萬六千尺積尺得六千步積步得一十五里餘六十步圍中徑闊得地五里餘二十步以左右決勝將為交頭其決勝左右將各主士仵為行列皆以金鼓旌旗為節制其初起圍張翼隨山林地勢無遠近部分其合圍地虞候先擇定訖以善弧矢者為圍中騎其步卒槍旗幡守圍有漏禽獸坐守圍吏如大獸公之小獸私之以觀進止管子曰涼風至而白露下天子命左右司馬令組甲厲士衆商君書曰民之見戰如飢狼之見虎則民可用矣呂氏春秋曰世有言曰驅市人而戰可以勝人之厚祿教卒老弱罷民罷與疲同可以勝人之精士練材離散係絫音纍可以勝人之行陳陳與陳同整齊鉏耰白挺可以勝人之長銚利兵此不通乎兵者之論今有利劍於此以刺則不中以擊則不及與惡劍無擇為是鬭因用惡劍則不可簡選精良兵械銛利發之則不時縱之則不當與惡卒無擇為是戰因用惡卒則不可王子慶忌陳午猶欲劍之利也陳午齊人慶忌吳公子二人皆勇有捷力簡選精良兵械銛利令將將之王者有以霸者矣湯武齊桓晉文吳闔閭是也又曰故凡勢險阻欲其便也兵甲器械欲其利也選練角材欲其精也將率士民欲其教也此四者義兵之助也時變之應也又曰闔閭試其民於五湖劍皆加於肩地流血幾不可止勾踐試其民於寢宮民爭入火死者千餘遽擊金而退之賞罰充實也鄴城故事曰凌霄觀成案石季龍永和三年命其子石宣祈于山川因而遊獵乘大略羽葆華蓋建天子旌旗十有六軍戎卒十八萬出自金明門季龍從後宮升觀望之笑曰我家父子如是自非天崩地陷當復何愁但抱子弄孫日為樂耳文選曰三令五申教達禁城謝承與步子山書曰示攻戰進取之方教進退疾徐之節也劉向別傳曰蹴鞠者傳言黃帝所作或曰起戰國之時踏音沓鞠兵勢所以陳之知武材也皆因熙戲而講習也
