body:
  text: 偏霸部十一西秦乞伏國仁崔鴻十六國春秋西秦録曰乞伏國仁隴西鮮卑人其先自漠北南出太陰山五世祖拓鄰晉太始初率戶五萬遷居高平川鄰卒子詰權立遷于牽屯權卒子利郍立郍卒弟祁泥立祁泥卒郍子述延立遷于苑川延卒祁泥子傉大寒立石勒之滅劉曜也懼而遷于麥田無孤山寒卒子司繁立秦始皇中遷于度堅山建元七年秦將王統來伐繁率騎三萬拒統于苑川統潛襲度堅山部民五萬餘落悉降于統繁乃詣統歸降符堅拜南單于留之長安後以為鎮西將軍鎮勇士川甚有威惠之稱司繁卒國仁即位聞堅征晉奔敗仁收衆至十餘萬又聞堅為姚萇所殺於是自稱大都督大將軍大單于領秦河二州牧改秦建元二十一年為建義元年置武陵苑川等十一郡築勇士都城以都之三年符登遣使拜仁大將軍苑川王四年六月薨僞諡曰烈王廟號烈祖乞伏乾歸崔鴻十六國春秋西秦録曰乞伏乾歸國仁弟雄武有度略仁薨群寮以仁子公府幼稚乃立乾歸為將軍大單于河南王大赦改四年為太初元年立妻邊氏為后以南川侯出連乞都為丞相九月遷于金城二年正月符登遣使拜為大將軍金城王六年立子熾盤為太子七年登遣使授左丞相河南王假黃鉞加九錫之禮十月氐王楊定步騎四萬來伐歸勒衆而進大敗定軍斬定及首級萬有七千於是盡有隴西之地十二月僭稱秦王大赦八年呂光來伐歸乃稱蕃遣子勃勃為質既而悔之十三年秦征西大將軍姚碩德率衆來伐入自兩安峽歸次于隴西以拒碩德興潛師繼發歸聞興至自率輕騎數千候興俄與中軍相失為興追騎所逼戰敗遁歸死川乃率騎數百馳至允吾禿發利鹿孤迎歸處之於晉歸將叛謀泄懼為利鹿孤所害謂其子熾盤曰姚興方盛吾將歸之令送汝兄弟及汝母為質於是送熾盤兄弟於西平歸遂奔長安姚興大悅拜河南諸軍事河州刺史歸義侯十四年姚興遣歸還鎮苑川盡以部民配之十八年正月歸至自長安十九年五月苑川地震裂十一月又朝于長安二十年姚興慮歸終為西州之患留拜主客尚書以其子熾盤為西夷校尉行河州刺史二十一年盤以長安亂將始乃招結諸部築城于嵻㟍山以據之更始元年歸隨姚興如平流盤攻抱罕剋之遂遣使來告歸遂奔還苑川遂如抱罕留熾盤鎮之歸將衆二萬遷于度堅山諸將勸稱王七月僣稱秦王大赦改年置百官公卿以下皆復本位四年五月歸畋于五溪山有梟集于其手歸惡之六月為兄子公府所殺公府出奔盤遷于抱罕遣弟廣武將軍智達追擒公府于嵻㟍山南轘裂之八月葬歸于抱罕元平陵僞諡武元王廟號高祖乞伏熾盤崔鴻十六國春秋西秦録曰乞伏熾盤乾歸太子歸薨自稱大將軍河南王改年為永康元年以尚書令翟就為相國封拜各有差二年盤討吐谷渾別統屈達于渴渾川大破之俘獲男女二萬三千三年正月有五色雲起於南山盤大悅謂群臣曰吾今年應有所定王業成矣於是繕甲整兵以待四方之隙五月聞傉擅西征率步騎二萬襲樂都傉檀降遂并南涼兵強地廣十月僭即秦王位置百官立妻吐蕃氏為王后四年盤子元基自長安逃歸拜尚書左僕射建弘元年立第二子慕末為太子領撫軍改年大赦九年盤寢疾顧命太子慕末乃薨于外寢六月葬武平陵諡文昭王廟號太祖乞伏慕末崔鴻十六國春秋西秦録曰乞伏慕末字安石熾盤之太子幼而好學有文才建弘年立為太子盤薨僭即秦王位大赦改年為永弘元年二月立子萬載為太子三年九月部民多叛未焚城邑毀寶器率戶五千東如上邽為赫連定所拒遂國南安十一月魏遣尚書庫結率騎五千迎末衛軍吉毗固諫以為不宜遂內徙從之庫結引還四年赫連定遣其叔北平公韋代率衆一萬攻南安城內大飢人相食傳侍中乞伏延祚吏部尚書乞伏跋跋踰城奔代末乃御璧出降送于上邽及宗族五百餘人悉為赫連定所誅自國仁建義元年乙酉歲至辛未四十七載晉書曰熾盤在位七年而宋氏受禪以宋元嘉四年死子慕末嗣在位三年為赫連定所殺始國仁以孝武大元十年僭位至慕末四世凡四十有六載而滅北燕馮跋崔鴻十六國春秋北燕録曰馮跋字文起長樂信都人其先畢萬之後也子孫食菜馮鄉因以氏焉晉永嘉之亂祖父和避地上黨父安雄有器量為慕容永將永滅跋東徙和龍長樂中跋夜見天門開神光赫然燭於庭中永康末拜中衛將軍建始元年與二弟結謀襲殺慕容熙立高雲為主正始元年以跋為中外都督開府儀同三司録尚書封武邑公太平元年雲為離班桃仁所殺下督李垂等誅班及仁群臣推跋為主僣即天王位大赦令曰義貴適時不必改作故陳氏代姜不徙齊號即號燕國改為太平元年追尊祖和為元皇帝父安為宣帝子永為太子三年七月以太子永領大單于內置四輔七年建太學以長樂劉軒營丘張熾成周翟崇為博士簡二千石已下子弟年十五已上教之十四年宿軍地燃一旬乃滅十七年二月北部人趙壽女既嫁化為男娶妻而無子跋問諸群臣曰此何祥乎尚書左丞傅權對曰漢世雌雞為雄陰變為陽君朁臣僭之象卒有婦人專寵王莽篡集今女為男臣將為君之徵跋曰將何以禳之權曰桑穀生朝大戊修德而殷道中興熒惑守心宋景責躬延齡二紀唯修身崇善可以轉禍十八年八月立子翼為太子跋戒之曰吾聞君人以學為本不學無以立尊敬師傅人倫之始汝其夙夜虔虔欽承明訓二十二年八月跋寢疾召中書監申秀侍中陽哲於內寢謂之曰吾患當不濟卿等善相吾子參決萬機九月跋疾甚輦而臨軒命太子翼勒兵聽政以備非常宋夫人規立其子受惡翼聽政謂之曰上疾將瘳奈何便欲代父臨天下乎翼性仁弱遂還東宮一日三省疾宋夫人矯絶內外遣閽寺傳問而已翼及大臣皆不得見跋弟弘於是舉壯士數十人裏甲入禁中宿衛皆不戰而散宋夫人命閉東閣弘家僮庫斗頭徑捷有勇力踰閣而入至于皇堂射殺女御一人跋驚懼而薨弘遣修城告曰天降凶禍大帝崩背太子不侍疾群公不奔喪疑有逆謀國危社稷吾備太弟之親遂攝大位以寧國家百官叩門入者進階二等太子翼率東宮兵出戰敗退兵皆奔散弘遣使賜死命宗正馮哲黃門盧昭典葬事于東宮葬跋於長谷陵僞諡文成皇帝廟號太祖馮文通崔鴻十六國春秋北燕録曰馮弘字文通跋之季弟高雲篡位拜中領軍封汲郡公太平元年拜尚書右僕射改封中山公遷尚書令司徒録尚書事跋薨僭即天王位大興元年正月壬午朔大赦改年二月立夫人慕容氏為皇后二年正月立子少玉仁為太子六月有鼠集城西盈數里地中西行至水前者銜馬尾後者迭相銜尾而渡識者以為民遷之象七月魏師來伐神高八月石城邊東營丘城周四郡並降魏九月魏師引還徙民四萬餘戶而西三年六月魏永昌王健來伐五年四月遣右衛孫德乞師于宋十二月又遣尚書陽伊請迎于勾麗六年三月端門崩四月魏又遣侍中達興公虞弼東平公鵝青伐攻剋白狼句麗將葛居孟光率衆數萬隨陽伊來迎屯于臨川尚書令郭生因民之憚遷開門而引魏軍魏軍疑而不赴生遂勒衆攻弘弘引句麗兵入自東門與生戰于闕下生中流矢卒句麗軍既入城取武庫甲以給其衆城內美女皆句麗軍人所掠五月乙卯弘率龍城見戶東徙焚燒宮殿火一旬不絶令婦人被甲居中陽伊等勤精兵於外葛居孟先率騎後殿方軌而進前後八十餘里魏軍追至遼水不擊而還遣使徵弘于句麗後二年為句麗所殺僞諡昭成皇帝自馮跋太平元年歲在己酉至弘滅亡之歲丙子二十八載夏赫連勃勃崔鴻十六國春秋夏録曰赫連勃勃朔方人右賢王去卑之後劉元海之族也曾祖父劉虎前趙嘉平中以宗室封樓煩公拜安北將軍丁零中郎將祖父豹後趙建武中拜平北將軍左賢王父衛辰符堅以為西單于督攝河西諸虜屯于伐來城因秦末兵亂遂有朔方之地控弦之士三萬八千姚萇拜辰大將軍河西王大單于魏師來伐辰遣子右地代率騎二萬拒戰河東為魏所敗遂乘勝濟河攻剋伐來執辰殺之勃勃辰弟三子奔秦高平公沒奕于妻之以女姚興以勃勃為持節安將軍五原公配以三交五部鮮卑及雜虜二萬餘落鎮朔方時河西鮮卑杜崙獻馬八千匹于秦濟河至大城勃勃留之召其衆二萬襲殺高平公沒奕于而并其衆至數萬自稱天王大單于大赦改弘始十年為龍升元年置百官以胸奴夏后氏之苗裔僭稱大夏以大兄右地代為丞相代公發嶺北民夷十萬於朔方黑渠之南營起京城大赦改龍升七年為鳳翔元年令曰朕之皇祖北遷幽朔改姓姒氏後從母為劉氏子從母姓非禮也古人氏族無常王者繼天為子是為徽赫實與天連今改姓曰赫連氏庶協皇天之意攴庶非正統者以鐵代為氏庶朕宗豫剛鋭如鐵皆堪伐人二年立夫人梁氏為后立子璝為太子四年九月劉裕滅秦入于長安十二月裕留子義真鎮長安而還勃大悅遂圖進取之計遣太子璝率騎二萬南伐長安五年義真遣龍驤將軍沈田子率衆逆戰璝擊敗之退屯劉回堡八月勃進據咸陽劉裕大懼乃召義真東鎮洛勃入長安正月群臣勸勃稱皇帝三月壇于霸上即皇帝位大赦改鳳翔六年為昌武元年冬十月以太子璝領大將軍雍州牧録南臺尚書事鎮長安十一月勃勃還統萬統萬統萬勃勃所都之城名也宮殿大成大赦改昌武二年為真興元年刻石都南頌紀功德四月追尊父衛辰曰桓皇帝廟號太祖母符氏為桓文皇后父豹曰宣皇帝曾祖虎曰景皇帝祖訓兒曰元皇帝五月兩魚于統萬二年十月起沖天臺于統萬南山欲登之以望長安六年勃將廢太子璝為秦王以酒泉公倫為太子璝聞將廢已率衆七萬北伐倫倫率騎三萬拒之戰於平為璝所敗倫死之太原公昌率騎一萬襲殺璝率衆八萬五千歸于統萬勃大悅立昌為太子七月勃寢疾八月疾甚輦升永安殿召群臣屬以後事薨於永安殿年四十五諡武烈皇帝葬嘉平陵廟號世祖赫連昌崔鴻十六國春秋夏録曰赫連昌一名折勃勃之第三子身長八尺魁岸美姿貌勃薨即位于永安臺大赦改真興七年為永光元年七月杏城劉睹川有青石大如馬頭浮在水上逆流而行人見而送之十月魏乘虛來伐三年五月戰于黑渠為魏所敗昌與數千騎奔還魏追騎亦至昌留河內公費連烏提守高平徙諸城民七萬戶于安定以都之四年二月魏軍至安定三月城潰昌奔秦州魏東平公鵝青追擒之送于魏魏封昌秦王尚始平公主尋為魏所殺赫連定崔鴻十六國春秋夏録曰赫連定勃勃第五子鳳翔二年封平原公雍州牧鎮長安率衆赴安定進封平原王大將軍領司徒昌為魏所擒定遂率遺衆數萬據平原僣稱皇帝大赦改承光四年為勝光元年進征南大將軍白蘭王吐谷渾莫璝為開府儀同三司河南王十月畋于陰磐登苛藍山而望統萬城泣曰先帝以朕承大業者豈有今日之事乎使天假朕年當與諸鄉建王季之業俄而有群狐百數嗚於定傍命射之無所獲定惡之曰此大不善咄咄天道復何言三年八月魏軍來襲十月剋安定進攻平原十一月定遂掠民五萬戶西奔上邽四年河南王莫璝因戎狄之衆東面以爭天下魏遣益州刺史沒利延寧州刺史拾虎率騎三萬來伐遂擒定送于魏勃勃初號龍升元年歲在丁未至是歲在辛未二十五載也
