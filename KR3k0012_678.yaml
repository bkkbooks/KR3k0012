body:
  text: 道部十九几案十洲記曰瀛州金巒觀中有青離玉几覆以雲紈之素刻水碧為倒龍之床玉光八景經曰衆真宴禮大帝屈節於几前太一洞真玄經曰太微紫房中有一童子名于景精字會元當帝君之前捧赤玉案上有所主命籍又曰太一公子白元司命桃君五人皆著朱衣絳巾各捧一白玉案上有所主簡玉清隱書曰太微天帝君進拜於帝皇之几又曰上皇帝君乃推几偃詠虛眺太空吟玉清之隱書歌元景之靈章揚音霞際清微玉桭太洞經曰太微小童五符命籍捧持玉案帝君所臨主通諸神變化經曰有金光立空之案又曰元始拊几高詠嘯朗太空玉珮金璫上經曰九老仙都捧金精之案上請寶文以授衆真也洞神經曰拂拭几案置經於前也像名經曰東方上尊憑七寶鳳文之曲几敷説道要真經法輪經曰三真立空之案以七寶懸覆經上衆篇經曰元始上尊凝真遐想撫几高抗命召五帝論定陰陽推數劫會移校河源檢籙天度洞神經曰有局腳案以置經符也太上黃素經曰凡修受大洞真經雌一奇文者恆置經於几格潔靜之處九幽經曰帝尊在九清妙境三元宮中御三氣之華寶雲玉座惣校圖籙拔濟諸苦二十四生圖曰披九光玉蘊出金書紫字玉文丹章三部八景二十四生圖盛以白玉立空之按九色之中飛文錦蓋懸覆經上龍飛尺素隱訣曰太微天帝君命羽仙侍郎捧金案以請飛行羽章也上清真文王經朝文曰有流明大靈侍言玉案十二枚又始內傳曰諸天各奉蓮華座以寶蓋覆之神仙傳曰黃老遣仙官玉女持金案玉杯盛藥以賜沈羲又曰淮南王為八公進金玉之几執門弟子之禮四極科曰凡寶經之具几案巾秩不可妄借於人太玄經曰老子傳授經戒籙儀注訣曰以局腳小案置經綵巾覆上洞真玄經曰太一洞真玄經者別為囊笈封以寶器盛之几上無量經曰太上座高三丈又於紫臺之宮布一高座六尺金真玉光經曰九天之帝施玉几金床山海經曰西母悌几戴勝悌憑也戴者戴其玉勝也他説西母頭類戴勝甚失之本際經曰元始上尊在長樂舍寶飾高座雖有座形不障於物人所往來亦無隔礙復有小琉璃座行列兩邊悉高五尺茅君內傳曰白玉龜山連玉床帳西母處之太上黃素方曰青精執在紫巫之山化王之室內有玉案也洞真七聖玄記曰左仙上疏九天帝王七聖几下飛行羽經曰修存三一道法坐金床玉几金爐玉匕太真人詩曰太微啓玉案列仙傳曰太室山中有地仙邛疏臥床几案真誥曰鹿迹山中有絶洞洞中自有石床石榻曲夾輿輦太上飛行羽書曰玉清則上清之高真上清則太清之高神太清則飛仙之高靈凡行玉清之道出則諸天侍衛建七色之節駕紫雲軒十二玉輪六師啓路飛龍翼轅行上清之道出則五帝侍衛建紫毛之節駕飛雲丹車位準上清左右仙卿行太清之道出則五帝侍衛建五色之節駕龍輿白虬啓道太極參軒又曰王惣真為茅盈召朱冠使者二人乘流景之輿蒼蛇把緑節仗瓊竿羽旄橫曰朱雲翳景使者並繡衣芙蓉冠持紫素之書各百字以付茅盈二弟固衷是以固有地真上仙定籙神君之號衷有司三官保命仙君之位各依紫素之命封蒞所任神宮上府亦隨事而資給二君焉漢平帝元壽二年八月巳酉南嶽真人西城王君龜山王母方諸青童君並乘緑景之輿駕神虎之軿同造茅盈於句曲之山金璮之陰又曰飛仙祕道招五辰之晨常能行之十五年則南極老人丹陵上真迎以緑雲之輦西極老人素靈子期迎以黃颷之車北極老人玄上仙皇迎以玄景之龍東極老人扶陽公子迎以青軿之輦中元老人上玄子迎以曲晨之蓋五老會合俱升紫虛此五老蓋五星之真人也非如裴君星中五帝之公又異乎雲牙五方之老上學之法順之者飛仙也又曰八道祕言者道有八條其言高妙間心靜室寥朗虛真亦將得見丹景之氣三素飛雲八輿朱輦紫霞瓊輪上清靜眄回轡三元高皇秉節靈童攀轅太素擁蓋南極臨軒於是溟光外映象燭太虛子能見之不煩凝霜濯華玄腴金丹也一道祕言曰以八節日清朝北望清朝小早於清且也有紫緑白雲者是為三元君三素飛雲也其時三元君乘八輿上詣天帝玉清君也子候見當再拜自陳乞侍輪轂二道祕言曰以八節日夜半東北望有玄青黃雲者是為太極天帝君乘八景之輿上詣高上玉皇三道祕言曰以甲子上旬戊辰已巳之日清旦西北望有紫青黃雲者是為太極真君三素雲也其時太極真君及上真人乘玄景緑輿上詣紫微宮四道祕言曰以甲戍上旬戊寅巳卯之日清旦東南望有赤白青雲者是為扶桑太帝君三素雲也其時扶桑太帝君乘光明八道之輦上詣紫微宮五道祕言曰以甲申上旬戊子巳丑之日清旦正西望見白赤紫雲者是為太素上真白帝君三素雲也其時太素上真人白帝君乘修條玉輦上詣玉天玄皇高真也六道祕言曰甲午上旬戊戍巳亥之日清旦正南望有青赤黃雲者是為南極上真赤帝君其時乘絳琳碧輦上詣閬風臺七道祕言曰以甲辰上旬戊申巳酉之日清旦西南望見緑紫青雲者是為上清真人時乘玄景八光丹輦上詣高上天帝八道祕言曰以甲寅上旬戊午巳未之日清旦正東望有朱碧黃雲者是太虛上真人其時乘徘徊玉輿上詣大帝君八節日見三素雲者紫雲在上緑雲次之白雲在下共相沓也子謹視之移度經曰真皇參駕黃霞周行四方飛蓋緑軿上造金闕靈寶赤書曰詣天真人乘碧霞玉輿太洞真經曰太上乘一景之輿受九暉太晨隱符上清隱書龍文經曰王母乘九蓋華輿衆真侍衛紫文經曰方諸東玄東海青童大君齊戒於丹闕黃房之內三年乘碧雲輿太元真人傳曰有班龍之輿金真玉光經曰有玉輦又上清三天列紀有紫輦太洞玉經曰青童君乘雕玉之軿司禁真伯乘日月之軿又曰太極元君乘陵羽之車太上經曰有白鸞之車茅君內傳曰東海青童君乘颷車葛玄傳曰鶴鳴山石室中設自然座有金華蓋又曰五帝真人並乘八景玉輿二十四生圖經曰後聖李君遊西河歷觀八方值元始乘八景玉輿駕玄龍而來李君問天書玉字未究妙章元始俾極道真於是吐洞玄內觀玉符以授之變化經曰景輿丹軿紫軒九天帝王所乘也上清訣曰玄母乘三素之輿又曰元父所控赤羽飛車左御絳鸞右駕紫鳳尸素訣曰太微天帝君登白鸞之車駕黑羽之鳳遊碧水之境大洞玉經曰皇上帝垂明玉之輪轉宴於日中矣茅君內傳曰無上道君成給八景瓊輿鳳璽金真曲晨飛蓋又曰青華小童道君乘碧霞之輿又曰上真君赤帝乘絳琳碧輦又曰太清真君乘青龍紫羽蓋又曰太元真人杖紫雲之節乘班龍之輿白虎之軿曲晨寶蓋又曰太素真君乘虎旗虎輦金蓋玉輪仗九色之節出入太清金真上光經曰太上大道君乘瓊輿碧輦和太道君乘白雲之車又云玄和道君驂駕玄龍太洞玉經曰八皇老君乘黃琅之車把紫鳳之節入太老之室萬華先生乘三素之景羽明之軿宴寢萬乘之室八素章曰四老回錦軿萬仙朝帝房茅君內傳曰朱官使者駕蒼虬把緑杖真誥曰紫元夫人乘羽寶雲車駕九龍女騎九千披錦服青羽裙自然經曰龍轡昂昂雲蓋巍巍仙童玉女與我升龍太上真經曰東方青帝九龍雲輿空洞經曰元始天尊從諸天人並乘玉輦瓊輪元始五老赤書玉篇真文序曰太上道君十方至真乘五色玉輪九色龍妙行真人乘象雲玉輦上詣玉都中極真人常乘象輪車上飛真人常乘九色龍遊玉清雲中飛天之神乘碧霞之輦遊於玉隆之天黑帝君乘四景之輿三元布經曰元始上尊乘紫輦茅君內傳曰王君乘九蓋之輦洞天經曰靈景道君乘赤雲車太上飛行羽經曰中和之真駕錦輿茅君內傳曰王母乘緑景輿玉光八景經曰東方始景道君乘青雲之車駕蒼龍又曰南方玄景道君乘五色雲車駕鳳皇又曰南方靈景道君乘赤雲車西南方元景道君乘紫雲車駕六龍西方明景道君乘白雲車駕白虎北方玄和道君乘珠玉之車金根經曰玉帝君乘碧霞九鳳飛行之輿玉清隱書曰太微君登八瓊之輦傾蓋霞城又曰東北方道君葛獻乘八輿飛龜車下治人泥丸宮登真隱訣曰太元真人乘白虎輿有八色雲軿真誥曰仙人許玉斧乘一新青犢車又曰王眉壽小妹中候夫人乘白牛車上清九真中經內訣曰南極老人丹陵上真迎以緑雲之輿蓋西極老人素靈于期迎以黃颷車人元老人中央上玄迎以曲晨之蓋五老一合俱升紫靈王君傳曰王君乘虎輦金蓋玉輪出入上清受事太素南嶽魏夫人傳曰夫人乘虎輦玉輿隱輪之車真誥曰南嶽夫人駕九蓋之軿搜神記曰玉女成智瓊駕輜軿車從八婢闕五符經曰鐘止上有金臺七寶紫闕元氣之所舍天帝君所治處也殿太洞玉經曰大暉者玉清天中殿名也上皇王真之所遊處也太平經曰大空瓊臺洞真之殿金華之內侍女衆真之所處靈書紫文上經曰有太空瓊臺丹玕之殿靈寶赤書曰妙行真人詣元始受赤書五篇真文於是元始命衆真入太定金臺玉寶之殿九光華房紫書金根經曰有黃金殿玄妙內篇曰有七寶殿堂太洞玉經曰有羽景之堂在太無之庭玉容者太上之明堂也洞景金玄經曰玉帝命太微天帝君坐萬靈於房軒散華香於玉宇留連八瓊之室曲宴九琳之堂外國放品經曰有光碧之堂臺大洞玉經訣曰西田之瑤臺大帝所處有玉清臺也又有散花臺太上玉京經曰玉京有七寶宮宮有七寶玄臺即太上治所又有天寶臺上清經曰有紫碧玄臺大洞真經曰上清真人惣仙大司馬長生法師登太常滄浪山洞臺中雙玉穴酣飲紫明芝液真誥曰有玉華室有刻石真人五勝文曰駕飛龍於西華之臺謁拜帝真赤書玉訣經曰太玄上宮太素真人常以春分之日會諸仙官於崑崙瑤臺校定靈寶真經又曰陽臺真人常以立冬之日會諸仙官玉女於靈寶陽臺之上校定學道簿籙本行經曰有尋真玉臺衆篇經曰帝尊引衆真人集太空金臺內音玉字經曰九層之臺處乎玉京之山煥乎玄都之上有太真玉印又曰馥朗天中玉京玄臺之別號西靈真人常誦無量洞章遊行其上大洞玉經曰九天之上有明真臺茅君內傳曰辰中真人帶廷生符於滄浪之臺導引三光經曰定光真人在皇曾天絶觀臺中導引元氣又曰九變真人在玉完天誥陽無臺中又曰導仙真人在何童天華林蔭雲臺中又曰雲華真人在平育天玄唱寶蓋臺中又曰陽王真人在太真臺中又曰法氣真人在飛臺中又曰澤嬰真人在越衡天無極觀臺中真誥曰白玉龜臺九靈太真元君封此閣三皇經曰人皇所受皇文帝書赤玉為簡黃玉為文安之青宮閉之紫閣太洞真經曰凡天縱仙才名刊金閣金玄羽章曰紫閣之下受事於玉清九有玉閣黃閣青閣樓歷藏中經曰崑崙山有金城九重玉樓十二神仙所治也龜山元籙曰龜山上有十二玉樓峨峨曜景太清有金華樓諸真仙玉籙皆在金樓之中觀靈書經曰有洞靈之觀金字題觀四面又有九靈之觀紫陽之觀又紫微上宮有通陽之觀主得度之人功德輕重宮三元品戒經曰九氣始凝三光發明結青黃白之氣置上元三宮太洞玉經曰太初有華陽之宮會方之宮小有真天中有萬華之宮玉君之治所玉晨宮中有玉映之宮又有元君六淵之宮黃老圓華之宮上清真陽之宮太極上宮主衆仙誦詠室大洞玉經曰太霞之中有白雲之室太虛元君所處三皇經曰蜀郡西峨嵋山石室舊有三皇文此文不與天下衆文同百萬人中未有一人得者龜山元籙曰有瓊瑤之室外國放品經云有瓊華之室洞景金玄經曰八瓊之室又三華寶曜內真上經曰玉室上清經有碧室房大洞玉經曰三華城者玉清之房名也在玉城之中陽安元君所處無上真人內傳曰有流雲九色之房仙公內傳曰崑崙山上有積石瑤房太上紫書籙曰白玉母入於龜山王闕處於青玉宮中朱紫之房靈寶赤書曰有九光華房外國放品經曰紫翠丹房舍道典曰道之清淨者吾舍也道因天清而清之因地靜而靜之因日月之光而明之因星辰之行而正之因萬物之性而消息之萬物中人為貴能使形無事神無體以清淨致無為之意即道為舍也窗諸天內音經曰天真皇人開寒靈之窗又曰南極玄窗主諸得道人受鍊品目戶諸天內音經曰九玄丈人封於玉京紫戶之內洞景金玄經有玉戶門大洞玉經曰太素在幽玄之上九宮列金門於太素之天瓊羽之門蘭室上清宮中門戶名也大上有瓊羽之門四明門者上清玉帝之南門也紫書金根經曰東華方諸青童宮有六門門內周回三千里東有青華門西有玉洞門北有瓊門東北有寒水門東南有天關門庭二道順行經曰洞陽之宮下有流火之庭大洞玉經曰廣寒宮中有寒庭太一之所處又有雲珠之庭太上真文曰上帝朝真金童楊煙流薰紫庭壇二十四生圖曰元始敷五色金為壇王皇譜籙曰元始丈人登玉虛之壇受九天譜籙上皇寶經玉符祕章府龜山元籙曰元始丈人在上清瓊天府大清府開清府玉寶洞元府金融府丹明府重冥府鳳生府
