body:
  text: 獸部二十三鼠易說卦曰艮為鼠春秋運斗樞曰玉衡星散而為鼠說文曰鼠穴蟲總名也䶅下各切鼠出胡地䶉竹鼠也如犬鼨音終豹文鼠也鼷小鼠也鼩精鼩其俱切胡地風鼠也鼢鼠地中行伯勞之所化也㐳鼠㐳令鼠也㐳音萍爾雅曰鼢鼠地中行者鼸鼠以頰裹藏食鼷鼠有螫毒者鼶鼠夏小曰鼬鼶則穴鼬鼠今鼬似鼦赤黃色大尾啖鼠江東呼為鼪者主鼩鼠音劬小鼱鼩也鼫鼠形大如鼠頭似兔尾有毛青黃色好在田中食粟豆閩中呼為鼩鼠鼤鼠鼨鼠豹文鼮鼠音廷文彩如豹鼳鼠音孤覔切似鼠而大蒼黑色在樹上又鼯鼠夷由狀如小狐似日旦乳亦謂之蝙蝠肉翅飛飛生音如人呼廣志曰白猨尾長白腹善緣登若家鼠小異者鼢鼠深目而短尾苗鼠者野鼠也小而短尾夭鼠以皮為裘今當名其裘為天鹿裘黃鼠在田野鼠為群害穀夌善走凡狗不得唯鼠狼能得之左傳曰齊侯將為臧紇田與之邑臧紇聞之見齊侯與之言伐晉對曰多則多矣抑君似鼠晝伏夜動不穴於寢廟畏人故也今君聞晉之亂而後作焉寧將事之非鼠而何乃弗與田詩曰誰謂鼠無牙何以穿我墉誰謂汝無家何以速我訟又曰碩鼠剌重歛也碩鼠碩鼠無食我黍又曰相鼠剌無禮也衛文公能正其群臣而剌在位承先君之化無禮儀也相鼠有皮人而無儀人而無儀不死何為大戴禮曰正月田鼠出田鼠者鼸鼠也詩義䟽曰爾雅鼫鼠許慎云五伎鼠也今之河東有石鼠大能人立交前兩腳於頭上跳善鳴食人禾稼逐則走入樹空中亦有五伎或謂雀鼠其形大故云石鼠也詩言其方物宜謂此鼠非今之鼠也又鼠不食禾苗本又謂螻蛄為碩鼠亦有五伎古今工名蟲鳥物異名同故記已史記曰李斯少時為郡小吏見吏舍廁中鼠食不潔近人犬數驚恐之入倉見倉中鼠食積粟居大廡下無人犬之憂乃歎曰人賢不肖譬如鼠在所自處耳又曰張湯杜陵人也其父為長安丞出湯為守舍還而鼠盜肉其父怒乃笞湯湯掘得盜鼠及肉鞫掠訊鞫論報并取鼠與肉具獄磔堂下其父見之視其文辭如老獄吏大驚遂使書獄漢書曰右馮翊韓延壽有罪下獄楊惲上書訟延壽郎中丘常謂惲曰聞君侯訟韓馮翊當得活乎惲曰事何容易我不能自保直人所謂鼠不容穴衘窶藪故也又曰蘇武使匈奴匈奴徙武北海上掘野鼠草實而食之又曰廣陵王胥將作亂鼠舞王后庭又曰燕剌王旦將作亂鼠舞殿端門魚豢魏略曰大秦國有辟毒鼠魏志曰臧洪為袁紹所圍糧乏乃掘鼠而食之又曰太祖時用刑嚴重太祖馬鞍在庫為鼠所囓庫吏懼罪必死議欲面縛首罪猶慮不免其咎鄧王哀冲謂曰待三日中然後自歸冲於是以刀穿單衣如鼠嚙者謬為失意貌有愁色太祖問之冲對曰世俗以為鼠嚙衣者其主不吉今單衣見嚙是以憂戚太祖曰此妄言耳無所苦也俄而庫吏以嚙鞍聞太祖笑曰衣在側尚囓況馬鞍懸柱乎一無所問晉陽春秋曰大興中衡陽歐純作鼠市四方丈餘開四門門有一木人縱四五鼠於中欲出門木人輒以椎椎之北史曰盧昶為散騎常侍時洛陽縣獲白鼠昶奏以為案瑞典外鎮刺史二千石令長不祗上命刻暴百姓怨嗟則白鼠至因陳時政多所勸誡詔書褒美其意三國典略曰齊將誅斛律光有三鼠遊於光寢光每投食與之一朝俱死床下唐書曰吐蕃有草石速古芒葉長二寸狀如針蒿每莖不過三四葉其莖蔓其花黃其根連珠如麥門冬有鼠長於常鼠每二三十同一穴至秋秋鼠皆收此草為藏多者至數石俗亦掘草根食之而留給鼠糧其國禁殺鼠殺者輒加罪俗亦愛之不殺也洞林曰鄉里人柳休祖婦病鼠瘻積年不差及困垂命令兒來從吾乞卦占得頤之復案卦應得人師姓石者而治之當以鼠出而愈者也休祖兒歸有一賤家奴姓石自言由來能治此病且炙其三處而止歸尋差有一老鼠色正蒼黃逕就其前𨆘𨆘伏而不動呼狗嚙殺之鼠頭上有炙處病便差玄中記曰百歲鼠化為神鄭氏玄中記曰百歲之鼠化為蝙蝠京房易飛候曰鼠舞國門厥咎亡鼠舞於庭厥咎誅死風角要占曰長居官厭盜法七月以生鼠九枚置籠中埋子地稱九百斤土覆坎深各二尺五寸築之令堅固地鏡圖曰青玉之像為女人黃金之見為火及白鼠百怪書曰鼠咋人衣領有福莊子曰且鳥高飛以避矰弋之患鼷鼠深穴於神丘之下以避薰灌之患又曰惠子相梁莊子往見之或謂惠子曰莊子來欲代子相於是惠子恐搜於國中三日王夜莊子見之曰南方鳥其名鵷鶵子知之乎鵷鶵發南海而飛渡北海非梧桐不止非竹實不食非醴泉不飲於是鴟得腐鼠鵷鶵過而仰視之曰嚇今子欲以梁國相嚇我耶又曰鼴鼠飲河不過滿腹文子曰腐鼠在阼燒香於堂尹文子曰鄭人謂玉未理者為璞周人謂鼠未腊者為璞周人乃懷璞問鄭賈曰欲買璞乎賈曰欲因出其璞視之乃鼠也因謝不取淮南子曰柳下惠見餳曰可以養老盜跖見餳曰可以粘鼠又曰孟賁探鼠穴無時死必噬其指失其勢孟賁勇士為探鼠於穴故曰失其勢又曰季春之月田鼠化為鴽淮南萬畢術曰狐目狸腦鼠其穴以塗鼠穴即去被髮向北呪殺巫鼠夜有巫被髮北向禹步呪曰老鼠不祥過自受其殃又曰投鼠者機動釣魚者浮抗動發也發則得鼠浮釣浮也抗動也動則得魚也又曰虞氏者梁富人也登高樓臨大路設樂陳酒蒱博其上遊俠相隨行於樓下博者射明張中友雨㯓音楊而笑䳒墮腐鼠而中遊俠俠相與語曰虞氏富人矣常有輕人之志乃辱我以腐鼠請滅其家其夜乃攻於虞氏大滅其家此謂類而非也抱朴子曰南海有白鼠大者重數斤毛長三寸居空木中其毛可續為布又曰陳安世年十三初為管叔本客得道叔本年七十猶拜安世曰得道者當師吾不羞弟子之禮矣死王樂生鼠雖為帝王死不及生鼠又曰王策記稱鼠壽三百歲滿者則色白善憑人而卜名曰仲仲能一年之中吉凶及千里外之事皆知也典語曰狻獹之狗吠於朝門社稷之鼠竄於宮側春秋後語曰趙惠文王二十九年秦韓相攻軍於閼與上黨有閼與藂閼烏連反與音預或音余王召廉頗問曰可救不對曰道遠險狹難救也又問樂乘對曰如廉公言又問趙奢趙奢對曰道遠險狹譬兩鼠鬭於穴中將勇者勝王乃令奢救之晏子春秋曰景公問晏子治國何患對曰社鼠者不可薰之不可灌之君左右出賣寒熱入則比周此國之社鼠者山海經曰丹熏之山有獸焉其狀如鼠而兔首麋耳以其尾飛名曰耳鼠可禦百毒郭璞山海經圖飛鼠讚曰或以尾翔或以髯凌飛鼠鼓翰倏然皆騰固無常所惟神所憑本草曰鼷鼠一名隱鼠形如鼠大而無尾黑色長鼻賈誼書曰鄙談云欲投鼠而忌器此善喻也鼠近於器尚憚不投況貴大之臣近於帝王乎郭璞注爾雅曰漢文帝宮中得一鼠豹文光彩熒熒以問群臣下子廉郎終軍荅曰鼨鼠文帝賜縑東方朔神異經曰北方有冰萬里厚百丈有鼷鼠在冰下出焉其形如鼠食草木肉重千斤可以作脯食之已熱除熱病也其毛長可八尺可為蓐臥之可以卻寒治風病也其皮可以柔致其聲聞千里有美尾可來鼠此所尾毛所在鼠斬輒入此藂說苑云梁上鼠飽聞長者論論衡曰人生天地猶魚生泉蟣虱於人因氣而生馬食鼠屎腹脹鼠子水午火馬金亦勝木雞何不喙免火亦勝金虵何不食猴又曰鼠踐一篋捐不食博物志曰鼠食巴豆三年重三十斤束晢發蒙記曰西域有火鼠之布東海有不灰之木語林曰簡文為撫軍時所坐床上坐塵不聽左右掃去見鼠行跡視以為佳異物志曰鼠母頭腳似鼠毛蒼口銳大如水牛而獨畏狗水田時有水災起於鼠西域諸國志曰有鼠王國鼠大如狗著金鏁小者如兔或如此間鼠者沙門過不呪願白衣不祠祀輒害人衣器異苑云釋道安昔西方適見此俗喭云鼠得死人目精則為王干寶搜神記曰晉太康中會稽郡憉蜞及蟹皆化為鼠大食稻為災始成者有肉而無骨幽明錄曰吳北寺終祚道人臥齋中鼠從坎出言終祚復數日必當死終祚呼奴令買犬鼠云亦不畏此也但令犬入此戶必死須臾犬至果然終祚乃下聲語其奴曰明日市雇十檐水來鼠便已逆知之云正欲水澆取我我穴周流無所不至竟日澆灌了無所獲密令奴更借三十人鼠云吾上屋居柰我何至時處在屋上奴名同鼠云阿同盜二十萬錢試開庫實如所言奴亦叛去終祚常為商估閉其戶而謂鼠曰汝正欲使我富耳今遠行勤守吾房中勿令有所零失也時桓玄在南州禁殺牛甚急終祚載數萬竊買牛皮還東貨之得二十萬還室猶閉一無所失後遂富積二三千萬列異傳曰中山王周南正始中為襄邑長有鼠衣冠出廳事語曰爾某日當死周南不應至期復出冠幘絳衣語曰爾日中當死復不應入復更出日適中鼠曰周南汝不應我死我復何道遂蹶而死即失衣冠視如常鼠也述異記曰宋車騎大將軍南譙王劉義宣鎮荊州府吏蔡鐵者其人善卜公嘗在內齋見一白鼠緣屋梁上乃命左右射得之內置函中召鐵既至使卜函中何物卜兆成笑曰已具知矣公曰狀之鐵為之狀曰兌色之鼠背明戶彎弧射之絕其左股鼠孕五子三雄而兩雌若不見信剖腹而立知公乃使剖鼠腹皆如鐵言也賜錢一萬劉敬叔異苑曰景平中東陽大水永康蔡喜夫避往南壟夜有大鼠浮水而來伏喜夫奴床角奴恐而不犯每以飯與之水勢既退喜夫既得返故居鼠以前腳捧青紙裹三斤許珠著奴床前啾啾如欲語也又曰南陽趙度少好術藝度有白米為鼠所盜及被頭把刀畫地作獄四面開門向東長嘯群鼠俱到呪之曰凡非噉者過唯止者十餘乃剖腹看臟有米在焉竇氏家傳云竇攸治爾雅舉孝廉為郎世祖與百寮大會於靈臺得鼠身如豹文熒熒有光煇問群臣莫有知者唯攸對曰此名𪕝鼠詔何以知之攸曰見爾雅詔案視書果如攸言賜帛百疋詔諸臣子弟皆從受爾雅許邁別傳曰邁小名映有鼠嚙映衣乃作符占鼠莫不畢至於中庭映曰齧衣者留不齧衣者去群鼠並去唯一鼠獨住伏於中庭而不敢動梁州記曰仙人唐公房祠有碑一所廟北有大坑碑文云是其舊宅處公房舉宅登仙故為坑焉山有易腸鼠一月吐易其腸束廣懲所謂唐鼠者也博物志曰唐房升仙鷄犬去唯以鼠惡不將鼠自侮一月三出腹劉欣期交州記曰竹風鼠如小狗子食竹根出封溪縣秦州記曰乞佛虜乾歸未移枹罕金城見鼠有數萬頭將諸小鼠各銜焉屎群移而度洮麗二水悉上抱罕自是二年而乾歸徙焉晉太康地記曰鳥鼠之山在隴西首陽縣穴入三四尺鼠在內鳥在外鄧德明南康記曰南康山石室號金堂內金色有金鼠時見也金樓子曰齊鬱林王夜中與官者共剌鼠至曉夜輒得數十藍又曰晉寧縣境內出大鼠鼠狀如牛土人謂之偃鼠天時將失鼠則從山出遊畎畝散落其毛悉成小鼠五稼必盡耗也後魏盧元明劇鼠賦曰嗟乎在物最為可賤毛骨莫充於玩賞脂肉不登於俎膳其為狀也僣悞且吁睢離睒上濫切賜音釋鬚似麥穟半垂眼如豆角中劈耳類槐葉初生尾若杯酒餘瀝乃有老者羸髖寬申二音𤴾瘠偏多姦計眾中無敵社託忌器妙解自惜深藏厚閉巧能推覔或尋繩而下或自地高擲登机緣匱盪扉動弈切切終朝轟轟竟夕是以詩人為辭寔云其碩盜于湯之珍俎傾留髦之香澤傷繡領之斜製毀羅衣之重襞曹舒由是獻規張湯為之被讁亦有閑居之士倦游之客絕慶吊以養真素笄左右而尋詩易庭院肅清房攏虛寂爾乃群鼠乘間東西挑擲或床上將髭或戶間出額貌甚舒暇情無畏愓又領其黨與欣欣奕奕欹覆箱奩騰踐菌席共相侮慢特無宜適訝天壤之含弘產此物其何益
