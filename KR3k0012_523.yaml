body:
  text: 禮儀部一敘禮上尚書舜典曰咨四嶽有能典朕三禮三禮天神地祗人鬼之禮也毛詩國風曰相鼠剌無禮也衛文公能正其群臣而剌在位承先君之化無禮儀也相鼠有皮人而無儀相視無禮儀者雖居尊位猶為暗昧之行箋云儀威儀也視鼠有皮雖處高顯之處偷食茍得不知廉恥亦與人無威儀者同人而無儀不死何為箋云人以有威儀為貴今反無之傷化敗俗不知其死無所害也相鼠有齒人而無止止所止息箋云止容止孝經曰容止可觀人而無止不死何俟俟待也相鼠有體體支體也人而無禮人而無禮胡不遄死遄速也毛詩國風曰蒹葭剌襄公也未能用周禮將無以固其國焉秦處周之舊土其人披周之德教曰久矣今襄公親為諸侯未習周之禮法故國人未服焉蒹葭蒼蒼白露為霜興也蒹葭蘆也蒼蒼盛也白露疑戾為霜然後歲事成國家待禮然後興箋云蒹葭在衆草之中也蒼然疆至白露凝戾為霜則成而黃興者喻衆者不後襄公政令者得周禮以教之則服所謂伊人在水一方周禮天官曰太宰之職掌建邦之六典三曰禮典以和邦國以統百官以諧萬民周禮地官司徒曰司徒之職掌施十有二教焉一曰以祀禮教敬則民不茍二曰以陽禮教讓則民不爭三曰以陰禮教親則民不怨四曰以禮樂教和則民不乖五曰以儀辨等則民不越六曰以俗教安則民不愈七曰以刑教中則民不暴八曰以誓教恤則民不怠九曰以度教節則民知足十曰以世事教能則民不失職十有一曰以賢制爵則民慎德十有二曰以庸制祿則民興功周禮地官曰大司徒以五禮防萬民之僞而教之中禮所以節止民之侈僞使其行得中鄭司農云五禮謂吉凶賓軍嘉周禮春官宗伯曰以嘉禮親萬民嘉善也所以固人心所善者而為之制嘉禮之別有云以飲食之禮親宗族兄弟親者使之相親人君有食宗族飲酒之禮所以親之也文王世子曰族食世降一等大傳曰繫之以姓而弗別綴之以食而弗殊百世而婚姻不通者周道然也以昏冠之禮親成男女親其思成其性以賓射之禮親故舊朋友射禮雖王亦立賓主也王者故舊朋友為世子時共在學者天子時有友諸侯之義武王誓曰我有邦冢君是也司寇職有議故之辟議賓之辟以饗燕之禮親四方之賓客賓客謂朝聘者以脤膰之禮親兄弟之國脤膰社稷宗廟之肉以賜同姓之國同福祿也兄弟有共先王者魯定公十四年天王使石尚來歸脤以賀慶之禮親異姓之國異姓王昏姻甥舅禮記曲禮曰夫禮者所以定親疏決嫌疑別同異明是非也道德仁義非禮不成教訓正俗非禮不備分爭辨訟非禮不決君臣上下父子兄弟非禮不定宦學事師非禮不親班朝治軍涖官行法非禮威嚴不行禱柌祭祀供給鬼神非禮不誠不莊是以君子恭敬樽節退讓以明禮樽猶趨也曲禮曰人有禮則安無禮則危故曰禮者不可不學也夫禮者自卑而尊人雖負販者必有尊也而況富貴乎負販者尤輕佻志利宜者無禮然富貴而知好禮則不驕不淫貧賤而知好禮則志不懾懾猶也又曲禮下曰君子行禮不求變俗求猶務也又禮運曰孔子曰夫禮先王以承天之道以治人之情故失之者死得之者生詩曰相鼠有體人而無禮人而無禮胡不遄死相視也遄疾言鼠之有身體如人而無禮者矣人之無禮可僧賤如鼠不如疾死之愈是故天禮必本於天殽於地列於鬼神聖人則大之明因地之利取法度於鬼神以制禮下教令也既又禮之盡其敬也教民嚴上也鬼者精魂所歸神者引物而出謂祖廟山川五祀之屬也達於喪祭射御冠昏朝聘民知嚴上則此禮達於下故聖人以禮示之故天下國家可得而正也又禮運曰禮者君之大柄也所以別嫌明微儐鬼神考制度別仁義所以治政安君也疾今失禮如此為言禮之大義也柄所操以治事又禮運曰是故夫禮必本於太一分而為天地轉而為陰陽變而為四時列而為鬼神又禮運曰故聖人之所以治人七情修十義講信修睦尚辭讓去爭奪舍禮何以治之唯禮可耳飲食男女人之大欲存焉死亡貧苦人之大惡存焉故欲惡者心之大端也人藏其心不可測度也美惡皆在其心不見其色也欲一以窮之舍禮何以哉言人情之難知明禮之重又禮運曰故禮行於郊而百神受職焉禮行於社而百貨可極焉禮行於祖廟而孝慈服焉禮行於五祀而正法則焉言信得其禮則神物興人皆應之百神列宿也百貨金玉之屬又禮運曰故禮義也者人之大端也所以講信修睦而固人之肌膚之會筋骸之束也所以養生送死事鬼神之大端也所以達天道順人情之大竇也竇孔穴也故唯聖人為知禮之不可以已也故壞國喪家亡人必先去其禮言愚者之反聖人也故禮之於人也猶酒之有蘗也君子以厚小人以薄皆得以為美味性善者醇耳又禮器曰禮器是故大備大備盛德也禮器言禮使人成器如來耒耜之為用也人情以為田修禮以耕之此是也大備自耕至於食之而肥禮釋回增美質措則正施則行釋猶去也回邪辟也質猶性也措置其在人也如竹箭之有筠也如松柏之有心也二者居天下之大端故貫四時而不改柯易葉君子有禮則外諧而內無怨故物無不懷仁鬼神饗德先王之立禮也有本有文忠信禮之本也義理禮之文也無本不立無文不行言必外內具也又禮器曰禮也者猶體也若人身體體不備君子謂之不成人設之不當猶不備也禮有大有小有顯有微大者不可損小者不可益顯者不可掩微者不可大也故經禮三百曲禮三千其致一也致之言至也一謂誠也經禮謂周禮也周禮六篇其官有三百六十曲猶事也事禮謂今禮今禮篇多亡本數未聞其中事儀三千未有入室而不由戶者三百三千皆猶誠也又禮器曰君子曰甘受和白受采忠信之人可以學禮茍無忠信之人則禮不虛道是以得其人之為貴也又樂記曰是故先王有大事必有禮以哀之有大福必有禮以樂之哀樂之分皆以禮終大事謂死喪也又經解曰禮之於正國也猶衡之於輕重也繩墨之於曲直也規矩之於方圓也故衡誠縣不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圓君子審禮不可誣以姦詐衡稱也縣謂重也陳設謂彈畫也誠猶審也是故隆禮由禮謂之有方之士不隆禮不由禮謂之無方之民敬讓之道也又經解曰故朝覲之禮所以明君臣之義也聘問之禮所以使諸侯相尊敬也喪祭之禮所以明臣子之恩也鄉飲酒之禮所以明長幼之序也婚姻之禮所以明男女之別也夫禮禁亂之所由生猶坊止水之所自來也故以舊坊為無所用而壞之者必有水敗以舊禮為無所用而去之者必有亂患春見曰朝小聘曰問昏姻謂嫁娶也壻曰昏妻曰姻自以由也故昏姻之禮廢則夫婦之道苦而淫辟之罪多矣鄉飲酒之禮廢則長幼之序失而爭鬭之獄繁矣喪祭之禮廢則臣子之恩薄而倍死忘生者衆矣聘覲之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之欺起矣若謂不至不答之屬故禮之教化也微其止邪也於未形使人日徙善遠罪而不自知也是以先王隆之又哀公問曰哀公問於孔子曰大禮何如君子之言禮何其尊也孔子曰丘也小人不足以知禮謙不答曰君曰否吾子言之也孔子曰丘聞之民之所由生禮為大非禮無以節事天地之神也非禮無以辨君臣上下長幼之位也非禮無以別男女父子兄弟之親昏姻疏數之交也君子以此之為尊敬然言君子以此故尊禮又曰仲尼燕居子張子貢言游侍縱言至於禮言游言偃子游也縱言泛說事子曰居女三人者吾語女禮使女以禮周流無不偏也居女三人者女三人且坐也使之坐凡與尊者言更端則起也子貢越席而對曰敢問何如對應也子曰敬而不中禮謂之野恭而不中禮謂之給勇而不中禮謂之逆言游進曰敢問禮也者領惡而全好者與子曰然領猶治也好善也然則何如子曰郊社之義所以仁鬼神也嘗禘之禮所以仁昭穆也饋奠之禮所以仁死喪也射鄉之禮所以仁鄉黨也食享之禮所以仁賓客也仁猶存也凡存此者所以全善之道郊社嘗禘饋奠存死之善者也射鄉食享存生之善者也郊有后稷社有勾龍子曰明乎郊社之義嘗禘之禮治國其如指諸掌而已乎是故以之居處有禮故長幼辨也以之閨門之內有禮故三族和也以之朝廷有禮故官爵序也以之田獵有禮故戎事間也以之軍旅有禮故武功成也又仲尼燕居曰子曰禮者何也即事之治也君子有其事必有其治治國而無禮譬猶瞽之無相與倀倀乎其何之譬如終夜有求於幽室之中非燭何以見若無禮則手足無所錯耳目無所加進退揖讓無所制又坊記曰子云夫禮者所以章疑別微以為民坊者也故貴賤有等衣服有別朝廷有位則民有所讓位朝位也又中庸曰子曰吾說夏禮𣏌不足徵也吾學殷禮有宋存焉吾學周禮今用之吾從周徵猶明也吾能說夏禮顧𣏌之君不足與明故也吾從周行今之道禮含文嘉曰禮者履也禮稽命徵曰得禮之制澤谷之中有赤烏白王赤蛇赤龍赤木白泉生出飲酌之使壽長禮稽命徵曰禮之動搖也與天地同氣四時合信陰陽為符日月為明上下和洽則物獸如其性命
