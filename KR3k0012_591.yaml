body:
  text: 文部六銘釋名曰銘者述其功美可稱名也禮記祭統曰銘者論撰其先祖之有德善功烈勳勞慶賞聲名列於天下而酌之祭器自成其名焉以祀其先祖者也顯楊先祖所以崇孝也身比為順也明示後世教也夫銘者一稱而上下皆得焉耳矣是故君子之觀於銘也既美其所稱又美其所為為之者明足以見之仕足以與之智足以利之可謂賢矣賢而勿伐可謂恭矣故衛孔悝之鼎銘曰六月丁亥公假於太廟公曰叔舅乃祖莊叔左右成公成公乃命莊叔隨難於漢陽即宮于宗周奔走無射啓右獻公獻公乃命成叔慕乃祖服乃考文叔興舊嗜欲作率慶士躬恤衛國其勤公家夙夜不解民咸曰休哉公曰叔舅子汝銘若纂乃考服悝拜稽首曰對揚以辟之勤大命施于蒸彝鼎此衛孔悝之鼎銘也古之君子論撰其先祖之美而明著之後世者也以比其身以重其國家如此子孫之守宗廟社稷者其先祖無美而稱之是誣也有善而弗知不明也知而弗傳不仁也此三者君子之所恥也周禮夏官上司勳職曰司勳掌六卿賞地之法以等其功賞地賞田也在遠郊之內屬六卿馬等由羌也以功大小為差王功曰勳成王業若周公者也國功曰功保全國家若伊尹也民功曰庸施法於民若后稷也事功曰勞以勞定國若禹者也民功曰力制法成治若咎繇也戰功曰多克敵出奇若韓信陳平者也司馬法曰上多前虜也凡有功者銘於王之太常祭於大蒸司勳詔之銘之言名也生則書於王旌以識其人與其功也死則於蒸先王祭之詔謂告其神以辭也般庚告其卿大夫曰茲子大享于先王爾祖其從與饗之是也今漢祭功臣於廟庭周禮冬官考工記曰釜銘曰時文思索允臻其極銘刻之也時是也允信也臻至也極中也言是文德之君思求可以為民立法者而作此量信至於道之中嘉量既成以觀四國以觀示四方使放象之永啓厥後茲器維則永長也厥其也茲此也又長啓道其子孫使法則此器長用之王隱晉書曰張載字孟陽隨父牧在蜀作劍閣銘剌史張敏表之天子命刻石於劍閣崔鴻十六國春秋後趙録曰勒徙洛陽晷影於褒國銘佐命功臣三十九人于函置于建德前殿劉璠梁典曰天監六年帝以舊國漏刻乖舛乃勑員外郎祖𣈶治漏成命太子舍人陸倕為文其序曰乃詔臣為銘按倕集曰銘一字至尊所改也唐書太宗幸河北觀砥柱因勒銘於其上以陳盛德穆天子傳曰天子觀舂山之上乃為銘疏於玄圃之上以貽後世謂勒石銘功德大戴禮曰武王踐祚三日召士大夫而問焉曰惡有藏之約行之萬世可以為子孫者乎師尚父曰在丹書王欲聞之則齊矣三日端冕師尚父端冕奉書而入則負屏而立王下堂南面而立父曰先王之道不北面王行西折而東面而立師尚父西面道書之言曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶以仁得之以仁守之其量百世以不仁得之以仁守之其量十世以不仁得之以不仁守之必及其世王聞書之言惕然若恐懼而為誡書於席之四端為銘焉太公金匱曰武王曰吾隨師尚父之言因為慎書銘隨身自誡其冠銘曰寵以著首將身不正遺為德咎書履曰行必慮正無懷僥幸書劍曰常以服兵而行道德行則福廢則覆書鏡曰以鏡自昭則知吉凶書車曰自致者急載人者緩取欲無度自致而反皇覽記陰謀黃帝金人器銘曰武王問尚父曰五帝之誡可得聞乎尚父曰黃帝之戒曰吾之居民上也搖搖恐夕不至朝故為金人三封其口曰古之慎言堯之居民上也振振如臨深淵舜之居民上也栗栗恐夕不見旦武王曰吾并殷民居其上也翼翼懼不敢息尚父曰德盛者守之以謙威彊者守之以恭武王曰欲如尚父言吾因是為誡隨之身孔子家語曰孔子觀周遂入太祖后稷之廟廟當右階之前有金人焉三緘其口而銘其背曰古之慎言人也誡之哉無多言無多事多言多敗多事多害安樂必誡無所行悔勿謂何傷其禍將長勿謂何害其禍將大勿謂不聞神將伺人焰焰弗滅炎炎若何涓涓不壅終為江河綿綿不絶或成網羅綿綿微細若不絶則有成網羅者也豪末不札如豪之未言微者札拔也將尋斧柯誠能慎之福之垠也口是何傷禍之門也強梁者不得其死好勝者必遇其敵盜憎主人民怨其上君子知天下之不可上也故下之知衆人之不可先也故後之溫恭慎德使人慕之執雌持下人莫踰之人皆趨彼我獨守此人皆惑之我獨不徙內藏乃智不示人技我雖尊高人弗我害唯能於此也江海雖左長於百川以其卑也天道無親嘗與善人誡之哉戒之哉孔子既讀斯文也顧謂弟子曰小子志之此言實而中情而信詩云戰戰兢兢戰戰恐也兢兢戒也如臨深淵恐墮如履薄冰恐陷行身如此豈口過患哉孫卿子說苑又載也又孫楚反金人銘曰昔太廟左階之前有石人焉大張其口而書其胸曰我古之多言人也無少言無少事少言少事後生何述焉我頌三墳五典八索九丘賾罔深而不探理無奧而不鉤故言滿天下而無口尢夫唯言立乃可長久胡不愧然生針其口自拘廣庭終身義手孔子家語曰孔子觀於魯桓公之廟見欹器焉歌傾孔子問於守廟者曰此何器也對曰宥坐之器子曰吾聞宥坐之器虛則欹中則正滿則覆明君以為至誡常置於坐側也子路進曰敢問持滿有道乎子曰聰明睿智守之以愚功被天下守之以讓勇力振世守之以怯富有四海守之以謙後之君子感誡之至追而作銘楊子法言曰或問銘曰銘哉銘哉有意於慎也文心雕龍曰昔軒轅帝刻輿以弼違太禹勒筍簴以招諫成湯盤盂著日新之規武王戶席題必誡之訓周公慎言於金人仲尼革容於欹器列聖鑒戒其來久矣故銘者名也觀器必也正名審用貴乎慎德蓋臧武仲之論銘也曰天子令德諸侯計功大夫稱伐夏鑄九牧之金周勒肅慎之楛令德之事也呂望銘功於昆吾仲山鏤績於庸器計功之義也魏顆紀勳於景鍾孔悝表勤於衛鼎稱伐之類也若乃飛廉有石槨之錫雲公有奪里之諡銘發幽石噫可怪也趙靈勒跡於潘吾秦昭刻傳於華山夸誕示後吁可笑也詳觀衆例銘義見矣至於始皇勒嶽政暴而文澤亦有踈通之美焉若乃班固燕然之勒張旭華陰之碣序亦成矣蔡雍之銘思燭古全橘公之針則吐納典譽朱穆之鼎全成碑文溺所長也至如敬通新器矱淮武銘而事非其物繁略違中崔駰品物讚多戒少李尤積篇義儉辭碎蓍龜神物而居博奕之下衡斛嘉量而在杵臼之末曾名品之未暇何事理之能間哉魏文九寶器利辭鈍惟張載劍閣其才清彩迅足駸駸後發前至銘勒崏漢得其宜矣文章流別傳曰夫古之銘至約今之銘至煩亦有由也質文時異則既論之矣且上古之銘銘於宗廟之碑蔡雍為楊公作碑其文典正末世之美者也後世以來器銘之佳者有王莽鼎銘崔瑗機銘朱公叔鼎銘王粲硯銘咸以表顯功德天子銘嘉量諸侯大夫銘太常勒鍾鼎之義所言雖殊而令德一也李尤為銘自山河都邑至於刀筆符契無不有銘而文多穢病討而潤色言可采録三輔決録曰何敞字文高為汝南太守帝南巡過郡郡有刻鏤屏風帝命侍中黃香銘之曰古典務農雕鏤傷民忠在竭節義在修身事見黃香集銘志西京雜記杜子夏葬長安北四里臨終作文曰魏郡杜鄴立志忠款犬馬未陳奄先朝露骨肉歸於后土魂氣無所不之何必古丘然後即化封於北郭山焉晏然處死乃命刊名埋於墓前種松柏五株至今茂盛西京雜記滕公駕至陳都門馬鳴跪不肯前以足跑地久之滕公懼使卒掘其所跪之地深二尺得石槨滕公以燭照之有銘乃以水洗之其文字古異左右莫能知問叔孫通通曰科斗書也以今文寫之曰佳城鬱鬱三千年見白日呼嗟滕公居此室滕公曰嗟乎天也吾死其葬此乎於是終葬此焉博物志曰魯閹里蔡伯公死求葬庭中有二人行頃還葬二人復出掘土得石槨有銘曰四體不勤孰為作生不遭遇長附託賴得二人發吾宅閭里祠之又曰衛靈公葬得石槨銘云不逢箕子靈公奪之我里七辭傅玄七謨序曰昔枚乘作七發而屬文之士若傅毅劉廣崔駰李尤桓麟崔琦劉梁桓彬之徒承其流而作之者紛焉七激七依七說七觸七舉七誤之篇於通儒大才馬季長張平子亦引其源而廣之馬作七廣張造七辨或以恢大道而導幽滯或以點瑰奓而託調詠楊暉播烈垂於後世者凡十有餘篇自大魏英賢迭作有陳王七啓王氏七釋楊氏七訓劉氏七華從父侍中七誨並陵前而邈後揚清風於儒林亦數篇焉世之賢明多稱七激工余以為未盡善也七辨似也非張氏至思比之七激未為劣也七釋僉曰妙焉吾無間矣若七依之卓轢一致七辨之纏綿精巧七啓之奔逸壯麗七釋之精密間理亦近代之所希也摯虞文章流別論曰七發造於枚乘借吳楚以為客主先言出輿入輦蹙痿之損深宮洞房寒暑之疾靡漫美色宴安之毒厚味暖服淫曜之害宜聽世之君子要言妙道以疏神導體蠲淹滯之纍既設此辭以顯明去就之路而後說以聲色逸遊之樂其說不入乃陳聖人辨士講論之娛而霍然疾瘳此因膏梁之常疾以為匡勸雖有甚泰之辭而不沒其諷喻之義也其流遂廣其義遂變率辭人淫麗之尤矣崔駰既作七依而假非有先生之言嗚呼揚雄有言童子雕蟲篆刻俄而曰壯夫不為也孔子疾小言破道斯文之族豈不謂義不足而辨有餘者乎賦者將以諷吾恐其不免於勸也傅子集古今七篇而論品之署曰七林文心雕龍曰枚乘擒豔首製七發腴辭雲構夸麗風駭蓋七覆所發發乎嗜欲始邪末正所以戒膏梁之子也自七發以下作者繼踵觀枚氏首唱信獨拔而偉麗矣及傅毅七激會清要之工崔駰七依入博雅之巧張衡亡辨結采綿靡崔瑗七厲植義純正陳思七啓取美於宏壯仲宣七釋致辨於事理觀其大抵所歸莫不高談宮館壯語田獵窮瓌奇之服饌極蠱媚之聲色甘意搖骨豔辭洞魂識雖始之以淫侈終之以居正然諷一勸百勢不自反子雲所謂聘鄭聲曲終而奏雅樂者也七厲敘賢歸以儒道雖文非拔群而意實卓爾矣連珠傅玄文敘曰連珠者興於漢章帝之世班固賈逵傅毅三才子受詔作之而蔡雍張華之徒又廣焉其文體辭麗而言約不指說事情必假喻以達其旨而賢者微悟合於古詩諷興之義欲使歷歷如貫珠易覩而可悅故謂之連珠也班固喻美辭壯文體裁引麗最得其體蔡雍言質辭碎然其旨篤矣賈逵儒而不豔傅毅文而不典文心雕龍曰揚雄雖小而明潤矣此文章之枝流暇預之末造也自此已後擬者間出杜篤賈逵之曹劉珍潘勗之輩欲穿明珠多貫魚目可謂壽陵匍匐非復邯鄲之步里醜捧心不關西子之嚬矣惟士衡運思理新文敏而裁意致句廣於舊篇豈慕朱仲四寸之璠乎夫文小易周思間可膽足使義明而辭淨事圓而音澤磊磊自轉可稱珠耳宋書劉祥著連珠十五首以寄其懷其譏議云希世之寶違時必賤偉俗之器無聖則淪是以明玉黜於楚岫章甫窮於越人有以祥連珠啓上上令御史中丞任遐奏其過惡付廷尉上別遣勑祥曰我當原卿性命令卿萬里思愆卿若能改革當令卿得還乃徙廣州不意終日縱酒少時卒三國典略曰梁簡文為侯景所幽作連珠曰吾聞言可覆也人能育物是以欲輕其禮有德必昌兵賤於義無思不服又曰吾聞道行則五福俱湊運閉則六極所鍾是以麟出而悲豈唯孔子途窮則慟寧止嗣宗
