body:
  text: 人事部六十七清廉下蕭子顯齊書曰王秀之字伯奮琅琊臨沂人也為晉平太守至郡期年謂人曰此郡豐壤祿俸常盈吾生資已足豈可久留以妨賢路上表請代時人為王晉平恐富求歸齊春秋曰何敬叔為東海令在縣清廉不受饋夏節忽箋門受餉數日中得米二千餘斛他物稱是悉以代貧民輸租梁書曰范岫每所居官恆以廉潔著稱為長城令時有梓材巾箱至數十年經貴遂不改易在晉陵唯作牙管一雙猶以為費又曰沈顗字處默吳興武康人也顗不治家産值齊未末兵荒家人并日而食或饋其梁肉者閉門不受陳書曰姚察字伯審吳興武康人察自居顯要其勵清節嘗有私門生送南布一端花練一匹察謂之曰吾所衣著止於麻布蒲練幸不煩此人遜請猶冀受納察勵色驅出自此伏事者莫敢饋也隋書曰狄士文嘗入朝遇上賜公卿入左藏任取多少人極重士文口銜絹一匹兩手各持一匹上問其故士文曰臣口手俱滿餘無所須上異之別賞物勞遣之唐書曰屈突通從太宗平薛舉時珍物山積諸將皆爭取之通獨無所犯高祖聞而謂曰公清正奉國著自終始名下定不虛也又曰賈敦頤曹州冤句人也貞觀中歷遷滄州刺史在職清潔每入朝盡室而行唯弊車一乘羸馬數匹銜勒有闕以繩為之見者不知其刺史也又曰袁承序陳尚書僕射憲之子也武德中纍轉建昌令在任清潔士吏懷之高宗在藩太宗選學行之士為其僚屬謂岑文本曰梁陳名臣有誰可稱復有子弟堪招引否文本言隋師入陳百司奔散唯袁憲獨在其主之傍王世充將受隋禪群僚勸進憲子給事中承家託疾不署名此之父子足稱忠烈承家第承序清貞雅操實繼旡風由是召守晉王友又曰蘇頲性廉儉所得俸盡推與諸弟或散之親族家無餘資又曰盧懷慎清儉不營産業器玩服節無金玉綺文之麗所得俸祿皆隨時分散而家無餘蓄妻子匱乏又曰馮履謙補河北尉有部人張懷道任江陽尉與謙疇舊餉鏡一面謙集寮吏遍視之曰此張公所致也吾與之有舊吾效官以俸祿自守豈私受遺哉昌言曰清水見底明鏡照心余之效官必至於此復書於使者乃歸之又曰李懷遠久居榮位而好尚清廉宅舍屋無所增改嘗乘款段馬豆盧欽望謂之曰榮貴如此何不買駿馬乘之答曰此馬幸免驚蹶無假別求聞者莫不歎伏又曰裴玢為鄜州刺史三年改授山南西道節度使玢歷二鎮頗以公清苦節為政不交權幸不務貢獻蔬食弊衣居處才避風雨而廩庫饒實百姓安業又曰杜暹在家孝友撫異母弟昱甚厚常以公清勒儉為己任弱冠便自誓不受親友贈遺以終其身初為婺州參軍秩滿將歸州吏以紙萬餘張以贈之暹唯受一百餘悉還之時州寮別者見而歎曰昔清吏受一大錢復何異也家語曰曾子弊衣而耕於魯君聞之而賜邑焉曾子固辭曰吾聞受人者常驕人與人者常驕人縱君不我驕也吾能勿畏乎孔子聞之曰參之言足以全其節說苑同又曰子路問於孔子曰仁人廉士窮則改節乎子曰改節則何以稱仁廉哉孔叢子曰子思居貧其友饋之粟者受三車焉或獻鐏酒束修子思弗當也或曰子取人粟而辭吾酒是辭少而取多也義則無名介則不全子思曰然伋不幸而貧於財至乃困乏將絶先人之祀夫所以受粟為賙之酒脯則所飲宴也方乏於食而乃飲宴非義也吾豈以為介哉或擔其酒脯以歸韓詩外傳曰鮑焦衣弊膚見挈畚採蔬遇子貢於道子貢問曰吾子何以至於此乎鮑焦曰天下之道德教者衆矣吾何以不至於此吾聞之世不己知而行之不己者是華行也上不己用而干之不正者是毀廉也行華廉毀然且弗舍惑於利者也子貢曰吾聞之非其世者不生其利汙其君者不食其土非其世而採其蔬詩曰溥天之下莫非王土此誰之有哉鮑焦曰於戲吾聞賢者重進而輕退廉者易愧而輕死則棄其蔬而立槁於洛水之上列子曰東方有人焉曰爰旌目將有適也而餓於道孤父之盜曰丘見而下一飧以餔之旌目三餔而後能視曰子何為者也曰我孤父盜人爰旌目曰嘻汝非盜耶吾義不食也兩手據地而歐之不出喀喀而死孟子萬章曰陳仲子豈不誠廉士哉居於陵三日不食耳無聞目無見井上有李螬食實者過半矣匍匐往將食之三咽然後耳有聞目有見也李實有蟲食之過半避兄離母居於陵又曰伯夷叔齊聖人之清者也聞伯夷叔齊之風貪夫廉懦夫有立志晏子春秋曰景公以五十乘魚賜弦章章歸魚車塞塗撫其御之手曰昔者晏子辭賞以正君故過失不掩今諸臣諂諛以干利吾若受魚是反晏子之義而順諂諛之欲固辭魚不受君子曰弦章之廉晏子之遺行也又曰有工女託於晏子之家者曰婢子東郭之野人願得入身比數於下陳焉晏子曰乃今而後自知吾不肖也古之為政者士農工商異居男女有別而士無邪行女無淫事今僕託國主民而僕必行無清也遂不見韓子曰晉文公出亡箕鄭挈一壺食而從迷而失道與文公相失餓而不敢食及文公反國伐原以為原令呂氏春秋曰古之人非無寶也所寶者異孫叔敖將死屬其子曰我死王必封汝汝毋受利地荊楚之間有寢丘其利少而甚惡可長有也其子受之至今不失淮南子曰曾子立廉不飲盜泉所謂養志者也又曰君子不入市為其挫廉說苑曰孔子見景公景公致廩丘以為養孔子辭不受出謂弟子曰吾聞君子當功以受祿今說景公未之行而賜我廩丘其不知丘亦甚矣遂辭而行又曰子思居於衛縕袍無裏二旬九食田子方使人遺白裘恐其不受因謂之曰吾假人遂忘之吾豫人也如棄之子思辭曰伋聞忘豫不如遺棄物於溝壑伋雖貧不忍以身為溝壑楊子法言曰楚兩龔之潔其清矣兩龔龔盛龔舍三輔決録曰安陵清者有頃仲山飲馬渭水曰與三錢以償之風俗通曰頴川黃子廉者每飲馬投錢於水中又曰鮑焦耕田而食穿井而飲非妻所織不衣餓於山中食棗或問之此棗子所種也遂強嘔立枯而死又曰郝子廉飢不可得食寒不可得衣一分不取諸人曾過姊家飲留十五錢置席下去列女傳曰河南樂羊子妻不知何氏羊子嘗行路得遺金一餅還以與妻妻曰妾聞志士不飲盜泉之水廉者不受嗟來之食況拾遺求利以汙其行乎羊子大慚捐金於里遠尋師學又曰凡為名者必廉廉斯貧為名者必讓讓斯賤長沙耆舊傳曰徐偉奴善叛知識欲為偉售之偉曰不得奴往當復逃亡豈可虛受其價廉平義正若此廣州先賢傳曰踈源字元流南海人出給郡役為戶曹佐源性廉潔家貧餉晏不至同第人餉先到呼之共食源未嘗聽又曰丁密字靖公蒼梧人少以清介為節非家織布物不衣非己種耕菜果不食毫釐之餽不受於人汝南先賢傳曰周燮字彥祖好潛靜養志唯典籍是樂有先人草廬廬于東坑其下有陵田魚蛤生焉非身所耕漁則不食又曰胡定字元潁川人也至行絶人在喪雉兔遊其庭雪覆其室縣令遣戶曹排雪問定定以絶穀妻子皆臥在床令遣掾以乾糧就遺之定乃受半録異傳曰漢時大雪積地丈餘洛陽令身出案行至袁安門無行路謂安已死除雪入見安僵臥問何以不出安曰大雪人皆餓不宜干人令以安為賢舉為孝廉郭緣生武昌先賢傳曰郭翻字長翔為人非己耕不食非妻自織不衣漢皇德傳曰蓋晉燉煌人天性皎潔自小不嘗過人飯貧為官書得錢足供而已不取其餘任嘏別傳曰嘏字紹先幼以至性見稱遇荒亂家貧賣魚官發魚價貴數倍嘏即取直如常陳留耆舊傳曰洛陽令董宣死詔使視之闌輿一乘白馬一匹帝曰董宣之清死乃知之益部耆舊傳曰朱倉字雲卿之蜀從處士張寧受春秋小豆十斛屑之為糧閉戶精誦寧矜之斂得米二十斛倉不受一粒鍾離意別傳曰意為尚書交恥太守張悝居官貪亂贓踰千金珠璣玩寶乃有石數收贓薄入司農詔悉以珠賜諸尚書尚書皆拜受意獨委珠璣於地不拜受明帝問委珠何也對曰愚聞孔子忍渴不飲盜泉之水曾子還車不入勝母之閭晉其名也今陛下以贓珠賜忠臣以故臣不拜受耳羊祜別傳曰昔有攘羊遺叔向母母埋之後事發撿羊肉盡唯舌存遂以羊舌為氏族祜其後也華陽國志曰何隨字季業除安漢令蜀亡去官時巴土飢荒所在無穀送吏行乏輒取道側民羊隨以綿繫其處使足所取直民視羊見綿相語曰聞何安漢清廉行過從者無糧必能爾耳持綿追還之終不受人為語曰安漢吏取糧令為之償范亭燕書曰皇甫真字楚季安定朝郍人也從輔國恪討檎冉閔即南圍拔鄴石氏舊都城內珍玩寶貨充溢真無所取唯存恤人物收斂圖籍真上疏曰臣輒以家奴婢五十口馬七匹牛四十頭以助軍資物理論曰有呂子義當世清賢士也有舊人往存省嫌其設酒食懷乾糒而往主人榮其降己乃盛為饌義出懷中乾糒求一柸冷水而食之語林曰何公為楊州親親有葬者乞數萬錢而帳下無有楊州常有㮧胡恩切米以賑孤寡乃有千餘萬斛虞存為治中面見道帳下空索求糶此米付帳下何公曰次道義不與其孤寡爭粒世說曰范宣潔行廉約韓豫章遺百匹絹不受稍減遂至一匹既終不肯受韓後與范同載就車中手裂二丈與范云人寧可使婦無禈耶范笑而受之郭子曰庾公為護軍屬桓廷尉為索一柱吏桓後遇見徐寧而知之寧字安期東海人致與庾而稱云是海內清士顏延之廷語曰清者人之正路劉弘教曰録事巫衛忠清厲節衣食不充賜單復衣各一旦恆令廚食給其家榖三百斛諸吏宜見賢思齊
