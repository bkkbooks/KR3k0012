body:
  text: 猿猿說文曰猿善猿狒屬也狒抉弗切山海經曰堂庭之山其上多白猿淮南子曰五九四十五五主音音主猿猿故五月而生列子曰老韭為莧老羭為猿莊子曰夫不見騰猿乎其得柟音南梓豫章覽蔓枝而已其間及得柘枳構間危行仄視勢不便未足騁其能也又曰人木處則栗恂懼猿猱然乎哉又曰今取猿狙且余切而衣周公之服彼必齕囓挽裂盡去而後慊觀古今之異猶狙之異乎周公也又曰猿遍音編狙以為雌司馬彪曰扁狙似猿而狗頭食彌猴好與雄狙接淮南子曰虎豹之文來射以虎豹有文章使人射取之猿豽女滑切之捷來乍豹猿屬乍暫疾以其捷故使人疾擊之又曰楚王亡其猿於林木為之殘宋王亡其珠於池中魚為之殫又曰置猿檻中則與豚同非不巧捷也無所肆其能也吳越春秋曰趙王問范蠡手戰之術范蠡答曰臣聞趙有處女國人稱之願王請問之手戰之道也於是王乃請女女將北見王道逢老人自稱袁公袁公問女曰聞子善為劍願得一觀之處女曰妾不敢有所隱也惟公所試公即挽林抄之竹似桔槔末折墮地女接取其末袁公操其本而㓨處女應節入之三入女因舉杖擊之袁公則飛上樹化為白猿呂氏春秋曰荊王有白猿三射之則搏樹而熙使飬由基射之始調弓矯矢未發猿擁木而號漢書曰李廣猿臂善射春秋繁露曰猿似猴大而黑長前臂所以壽者好引其氣也抱朴子曰玉策記稱猿壽五百歲則變而為玃居縛切千歲則變為老人又曰周穆王南征一軍盡化君子為猿為鵠小人為沙為泥張載論曰白猿玄豹藏於櫺檻何以知其接垂條於千仞孝子傳曰猿狒屬也或黃或黑通胂音申輕勦子小切善緣妙吟雌為人所得終不徒生華陽國志曰鄧芝見猿抱子在樹上引弩射之中猿母其子為拔箭以葉塞瘡芝乃歎息投弩水中宜都山川記曰峽中猿鳴至清山谷傳其響泠泠不絶行者歌之曰巴東三峽猿鳴悲猿鳴三聲淚沾衣荊州圖經曰宜都夷道縣西山頂上有古墓名曰女王冢不詳其人林則女貞戰則白猿范汪荊州記曰夷陵縣陝口山非日夜半不見日月多猿鳴至清遠山海經圖讚曰白猿肆巧由基撫弓數如循環其妙無窮猴漢書曰韓生勸項羽都關中羽曰吾聞富貴不還故鄉如衣錦夜行乃燒宮室都彭城韓生曰人言楚人沐猴而冠果然又曰張信少府檀長卿為沐猴與狗鬭蓋寬饒奏免之張晏曰沐猴獼猴也王隱晉書曰護軍張邵母病淳于智筮之使西出市彌猴繫母臂令傍人抱之拍猴恆使作聲三日三夜放去猴出門即為犬所殺母於此漸差郭頒魏晉世語曰司馬宣王辟周泰為新城太守尚書鍾育謂泰曰君釋褐登宰府乞兒乘小車一何駚泰曰君名公之子少有文彩故守吏職獼猴乘土牛一何遲衆賓悅服莊子曰吳王浮于江登于狙且余切之山衆狙見之恂然棄而走有一狙焉委蛇玃搔見巧乎王王射之敏給搏矢矢往雖速而狙猶能將也王命相者趨射之狙死王顧謂其友顏不疑曰狙之伐巧恃其便以傲豫以至此列子曰宋有狙公者飬之成群誑狙曰與若茅朝三而暮四衆狙皆怒曰朝四而暮三衆狙皆喜韓子曰燕王微巧術人請以棘剌之端為母猴母猴成巧人曰人主欲觀之必半歲不入宮不飲酒食肉雨霽日出視之晏陰之間而棘剌之母猴乃可見也燕王恩飬之不能觀也譙子法訓曰人之所以貴者以其禮節也人而無禮者獼猴乎雖人象而蟲質也淮南子曰楚有烹猴者而紿徒亥切其邦人邦人以為狗羹而甘之後聞其猴也據地而吐之盡寫其所食此未為知味者也抱朴子曰余友人騰永叔嘗養一大獼猴鎖著床間犬忽齧殺之永叔使合鎖埋之後百許日有見鬼者往見獼猴走于永叔承塵上不悟見鬼驚指之曰獼猴何以被傷流血永叔曰始乃知皆有鬼也又曰山中申日稱人君者猴也猴壽八百歲王充論衡曰鹿之角足以觸大猴之手足以搏鼠然而鹿制於大猴服於鼠氣不利也神仙傳曰有人種黍山中正患獼猴食之聞介象有道聊從之乞辟猴之法象曰無他法也汝明日往黍所望見群猴便大喚語之云已白介君教莫復侵食黍此人明日視黍遇群猴適欲下樹承象語獼猴各自還山遂絶跡述異記曰南康營氏伍考之伐船材忽見太杜樹上有一猴懷孕考之便登木逐猴騰赴如飛樹既孤逈下又有人猴知不脫因以左手抱樹枝右手撫腹考之禽得遙擺地殺之割其腹有一子形狀垂産爾夜夢見一人稱神以殺猴責讓之後考之病經旬初如狂因漸化為虎毛鬢爪牙悉生音聲亦變遂逸走入山永失蹤跡周景式孝子傳曰余嘗至綏安縣逢徒逐猴猴母負子沒水水雖深而清乃以戟㓨之自脅以下中斷脊尚連抄著船中子隨其傍以手捫子而死陸機與弟雲書曰監徒武庫建始殿諸房中見有兩足猴真怪物也異物志曰南方人以獼猴頭為鮓袁淑排諧集常山王九命文曰及至圖身失所羈束人間馴纓服制惟意所牽登楹而遨抱梁而眠拾托遺餘恣口所便後漢王延壽王孫賦曰原夫天地之造化實神偉之屈奇道玄微以密妙信無初而弗為王孫狡獸形陋觀而醜儀顏狀類乎老公軀體似乎小兒眼睚五皆切𥈬五構切以耽者血視職音戢睫側夾切以䀗乎悅切睳突烏決切高匡而曲頞䁵音儇呼切歷而隳離鼻𪖢許解切齁許侯切以䶋音吸𪖨許夾切耳聿役以𥊔音𥊔知口嗛呼忝切呥音冉以鹼則咸切齺音鄒脣喋蚩涉切㗩而躡切以𤿐匹里切齒崖崖以齡音𡼆爵任音荏𠱞音染而囁入葉切兒儲糧食於兩頰稍委輸於胃脾腃兔蹲而狗踞聲歷鹿而啒咿或嗝嗝苦革切而音的嗅火歷切若啼姿僣傔呼店切而總贛音貢豁盱鬩以頊生深山之茂林處嶄巖之嶔崎性猗僄之㺕音煩疾熊峰出而橫施猱說文曰猱貪獸也一曰母猴似人毛詩草木蟲魚疏曰猱獼猴也楚人謂之沐猴老者為獑猢駿捷也其鳴噭噭而悲詩曰無教猱升木毛萇注曰猱猿屬也爾雅曰猱猿善緣孫炎注曰猱母猴也江乘地記曰攝山有山猱赤足玃說文曰玃母猴也爾雅曰玃父善顧郭璞曰似猴而大倉黑也能玃持人好顧盼抱朴子曰獼猴及猿八百歲化為玃古今注曰猴五百歲化為玃呂氏春秋曰肉之美者玃猱之炙又曰聞言不可不察數傳白為黑故狗似玃玃似母猴母猴似人人與狗則遠矣毛詩草木蟲魚疏曰猱獼猴也楚人謂之木玃老者為玃大而黑長前辟玃之白腰者為獑猢博物志曰蜀中南高山上有物似獼猴長七尺能行揵走名曰猴玃一名馬化或曰猳玃同行道婦人有好者輒盜之以玄人不得知行者每經過其旁皆以其長繩相引然故不兔此能別男女氣臭故取女不取男取玄而為家室其無子者終身不得還十年之後形類之意亦迷惑不復思歸有子者輒拘送還其家産子皆如人有不食飬者母輒死故無敢不飬也及長與人不異皆以楊為姓故今蜀中西界多謂楊率皆猳玃馬化之子孫時時有玃瓜者果然山海經曰果然獸似獼猴以名自呼聲蒼黑群行老者在前少者在後得果食輒與老者似有義焉交趾諸山有之獠人射之以其毛為裘蓐甚溫暖蜀地志曰涪陵南界榛峽中有果然獸形如狗子頭似虎其尾柔滑白黑色皮可為裘輕暖可珍南中八郡志曰交趾有果然白面黑身毛采班闌吳録地理志曰九真咠浦縣有獸名果然猿狖類也色青赤有文居樹上北郡及日南皆有之南方草物狀曰果然獸生在山林上民人以毒箭射之剝取皮皮文青赤白色縫相連作席出九真日南郡南州異物志曰交州以南有果然獸以名自呼身如猿大面通有白色其體不過三尺而尾長四尺餘反尾度身過其頭視其鼻仍見兩孔仰向其毛長柔細滑澤色以白為質黑文視如蒼頭鴨脅邊班文集十餘皮可得一蓐繁文麗好細厚溫暖魏鐘育果然賦曰果然似猴象猿黑頰青身肉非嘉肴惟皮為珍
