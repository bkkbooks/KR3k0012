seq: 23
front:
  text: 時序部七夏中莊子曰井魚不可以語海夏蟲不可以語冰文子曰政失於夏熒惑逆行夏政不失則降時雨列子曰鄭師文學琴於師襄當夏而叩羽絃以召黃鍾霜雪交下川池暴沍管子曰夏日不煬非愛火也冬日不盥非愛水也為不適於身不便於體也夫明王不美宮室非喜小也為傷本也又曰南方其時曰夏夏氣陽陽生火其德施舍是謂曰德又曰春不收枯骨朽胔伐枯木而去之則夏旱至矣鄒子曰季夏取桑柘之火尸子曰夏為樂南方為夏夏興也南任也是故萬物莫不任興蕃殖充盈樂之至也韓子曰季孫相魯令五月掘長溝子路私秩飲之孔子覆其飲曰魯有民焉汝輒擾之何也淮南子曰明庶風後四十五日清明風至則出幣帛使諸侯立夏長養布恩惠故聘問諸侯巽卦之風抱朴子曰洪從祖仙公每大醉夏輒入源泉底一日許乃出能閉氣胎息故耳又曰謂夏必長而蒜麥枯謂冬必凋而竹柏茂日盛陽宜暑夏天未必無涼日極陰宜寒隆冬未必無暫溫也又曰世之豪士暑夏之日露首袒身唯在樗蒲彈棋不離綺紈之側也又曰或問不熱之道答曰或以立夏日服六壬六癸之符或服玄冰之丸或服飛霜之散幽求子曰扇翣微動涼風夏生范子計然曰德取象於春夏刑取象於秋冬周書時訓曰六月節溫風至溫風不至即時無緩政蟋蟀居壁若不居壁即恆急之暴又云門戶不通鷹乃學習若不學習即寇戎不備又曰六月中氣後五日腐草化為螢若不化螢即穀實鮮落土潤溽暑若不溽暑即急應之罰大雨時行若不時行即恩不及下又曰夏取棗杏之火符瑞圖曰麟夏鳴曰養綏隱訣曰四月戍天地凶門日不可入山建創四月十一日地破日不可開山動土又曰立夏之日日中五帝會諸仙人於紫微宮見四真人論求道之功罪董勛問禮俗曰五月俗稱惡月俗多六齋放生案月令仲夏陰陽交死生分君子齋戒止聲色節嗜欲素問曰歧伯曰夏三月此謂蕭秀天地氣交萬物華實夜臥蚤起母厭於日使志母怒使英華成秀使氣得泄若所愛在外此夏氣之應也飬生之道也逆之則傷心秋為痎瘧冬至重疾夏三月天地陰陽之氣交合者萬物華實故言夏生長於萬物成實者也夜臥早起是貪於夏氣不厭於日者也是晚臥早起明於陽氣之盛者也人志氣母怒陽氣成結秀實以成其氣得泄陽者也萬物成結於夏受之因此夏陽氣之所應也能合其氣則是養生之道也逆之則傷損於心心者夏王也故言傷心心傷則秋必病瘖瘧故言夏傷於暑秋病瘖瘧者不從其氣則火為逆也是故傷逆深皆損於陽氣故冬至陰盛必重病大衍星分圖曰五月午日日月會于鶉首又曰六月日月會于鶉火嶺表録異云枹木其輕如通草夏月著之隔卑濕地氣如杉木今廣州諸郡牧守初到任下簷皆有油畫枹履又曰南中夏秋多惡風彼人謂之颶南越志云風起則人心恐懼或云風來則四面具足二義皆有理也壞屋折樹不足喻也甚則吹屋瓦如飛蝶或三二年不一風或二年兩三風亦系廉帥政德之否臧者然發則自午及酉夜半必止此乃飄風不終朝之義也南荒録曰新州男子婦人皆縝髮如雲每沐以灰投水中遂就水而沐之以彘膏塗其髮五六月杭杭秫未獲時民飢盡髡取髮鬻於市既髮即復以彘膏塗之至來年五六月又可鬻矣投荒録曰嶺南方盛夏率一日十餘陰十餘霽雖大雨傾注頃即赫日已復驟雨大凡嶺表夏之炎熱甚於北土且以時熱多又蒸鬱此為甚惡自三月至九月皆蒸熱梁元帝纂要曰夏日朱明氣赤而光明亦曰長嬴以征切朱夏炎夏三夏九夏天曰昊天言氣浩汗風曰炎風節曰炎節草曰茂草雜草木曰蔚林茂林密樹茂樹孟夏亦曰維夏首夏季夏亦曰徂暑徂往也言暑始往四時纂要曰四月也是謂乏月冬穀既盡宿麥未登宜賑乏絶救飢窮九族不能自活者救之無固蘊蓄而忍人之貧貪貨殖之宜忌種福之利君子弗取也陸機纂要曰夏樹名連陰夏雨名綿雨攝生月令曰四月為乾生氣卯死氣酉是月也萬物以成天地化生勿冒極熱勿大汗後當風勿暴露星宿皆成惡病勿食大蒜勿含生薤勿食雞肉勿食蛇鱔是月肝藏以病神氣不行火氣漸臨水力漸衰稍補腎助肺調和元氣無失其時是月八日不遠行宜安心靜念沐浴齋戒必得福慶齊人月令曰四月八日不宜殺草木始服生衣宜進溫酒服溫藥是月也無壞麛卯無伐大樹是月也宜以夙興如酉陽雜俎曰俗忌五月上屋言人五月蛻精神如上屋即自見其形魂魄則不安矣窮神祕苑幽明録曰漢武帝與群臣宴於未央殿方食棗棗帝見梁上有一老翁長八九寸仰觀屋宇俯視帝腳東方朔曰此水木之精其名藻兼夏乃巢林冬即居河此來訴爾所視殿名未央下視腳者足於此也上乃悉罷諸役徐整長曆曰北斗當崑崙氣注天下春夏為露秋冬為霜兵書曰夏出兵赤旗在前執前行地鏡經曰五月中草木葉有專厚而無汁枝下垂者其地有玉師曠占曰春夏一日有霜雪者君父治政大殿都胸切大殺天以示之何以言之霜威殺萬草坐大殺也見變如此宜損威殺重人之命也焦贛易林曰仲春孟夏和氣所在生我嘉福國無殘賊又曰六月採芑征伐無道張仲方叔剋勝飲酒又曰六月種黍歲晚不雨秋不縮酒神失其所趙自勉造化權輿云潮者陰陽氣所激五月無潮陰氣微也八月最大則陰盛也陸機要覽曰昔羽山有神人焉逍遙於中嶽與左元放共遊子訓所坐欲起子訓應欲留之一日之中三雨今呼五月三時雨亦為留客雨桓談新論曰漢中送王仲都時夏大暑使曝日坐又瓌以十爐火不言熱而身不汗出五行大義論曰未者昧也陰氣已長萬物稍衰其體薆昧於未又時物向成皆有氣味也五行體性論云土在四時之中處季夏之末陽衰陰長居位之中㧾於四德謂金水木水火積塵成實積則有間有間故水火成實所能持也故土以含散持實為體稼穡為性又曰土苞四德故其體能兼虛實也論衡曰夫虎出有時猶龍見有期也陰物以冬見陽蟲以夏出出應其氣氣動其類參伐以冬出心尾以夏見參伐則虎星心尾則龍象星出而物見氣至而類動天地之性也又曰盛夏之時當風而立隆冬之月響日而坐其夏欲得寒冬欲得溫也或當風鼓翣翣響日燃爐然而天終不為冬夏易氣者寒暑有節不為人變改也又曰陽燧取火於五月丙午日中之時消鍊五石鑄以為氣摩勵生光仰以向日則火來至此真取火之道也又曰陽燧取火於天消鍊五石五月盛夏鑄以為器乃能得火今又但取刀劍銅鉤之屬摩以向日亦得火焉又曰以夏進爐以冬奏奏亦進也扇此無益人君不遇災患幸矣又曰方今盛夏雷雨時至龍多登雲雲雨與龍相應乘雲雨而行物類相致非有為也又曰夏末蜻蛚蟋蟀也鳴寒螿啼感陰氣也雷動而雉驚啓蟄而蛇出感陽氣也又曰世俗之事亦有緣也夫正月歲始五月陽盛子以此月生精盛熾熱烈厭勝父母父母不堪將受其患相倣俲莫謂不然有空諱之言無實凶之效世俗惑之誤非之甚也諱舉正月五月子以為正月五月子殺父與母不得舉也以舉之父母偶死則信而謂之真矣夫正月五月子何故殺父與母人之含氣在腹之內其生十月而産共元氣也正月與二月何殊五月與六月何異而謂之凶世傳此言久矣又曰實説雷者太陽之微氣也何以明之正月始雷五月陽盛故五月雷迅冬乃雷潛盛夏之時太陽用事陰氣乘之陰陽分爭則相激射為毒毒中人輒死中木木折中屋屋壞諸葛亮出軍表曰五月渡瀘深入不毛之地陶潛集曰潛常言五月六月中北窗下臥涼風暫至自謂羲皇上人穆天子傳曰季夏丁卯天子北斗升于舂山之上以望四野曰舂山是惟天下之高山也孳木華不畏雪天子乃取孳木華之實持歸種之又曰天子四月休于濩澤今平陽濩澤縣是也濩音獲於是射鳥獲獸宋躬孝子傳曰何子平事母至孝母喪年六十有孺子之慕夏避清涼永昌郡傳曰朱提郡有堂狼山山多毒草盛夏之月飛鳥過之不能得去嵇康高士傳曰被裘公者吳人延陵季子出遊見道中有遺金顧而謂公曰取彼金公投鎌瞋目拂手而言曰何子之高而視之卑五月被裘而負薪豈取金者哉季子大驚既謝而問姓名公曰吾子皮相之士而安足語姓名也襄陽耆舊傳曰黃穆字伯開博學為山陽守有德政弟奐字仲開為武陵太守貪穢無行武陵人諺曰天有冬夏人有二黃言不同也周處風土記曰仲夏雨濯枝蕩川注云此節常有大雨名濯枝又曰梅熟時雨謂之梅雨又曰仲夏長風扇暑注云此節東南常有風至俗名黃雀長風盛引之荊州記曰宜都銀山縣有風穴穴口大數尺名為風井夏則風出冬則風入樵人有冬過者置笠穴口風吸之經日還涉長陽溪而得其笠又曰橘洲在郡南四里對南津常看如下及至夏水懷山諸洲皆沒橘洲獨在荊楚歲時記曰四月也有鳥名穫穀其鳴自呼農人候此鳥鳴則云梨根岸爾雅云鳴鳩鴶雛郭璞云今布穀也江東呼獲穀崔實正論云夏扈趣耘鋤即竊脂玄鳥呼穫穀則其夏扈也又曰俗忌五月曝床薦席異苑云新野庾實嘗以五月曝席忽見一小兒死在席上俄失之其後實子遂亡或起於此或問董勛曰俗五月不上屋云五月人脫上屋見影魂便亡勛答云蓋秦時王自為之禁夏不得行漢魏未攻案月令仲夏可以居高明可以遠眺望可以升外山陵可以處台榭鄭玄云順陽在上也今云不得上屋正與禮反敬升云見死小兒而禁曝荐席何以與於此乎俗人月諱何代無之但當矯之歸於正洞冥記曰東方朔母田氏寡夢太白星臨其上因有娠田氏歎曰無夫而孕人得棄我乃移向代郡之東方里五月生朔仍以所居為姓搜神記曰夫金錫之姓一也以五月丙午日中鑄為陽燧以十一月壬子夜半鑄為陰燧言丙午日鑄為陽燧可取火壬子日鑄為陰燧可取水又曰吳猛性至孝小兒時在父母邊臥時夏月多蚊虻而不搖扇懼蚊虻去我及父母王子年拾遺記曰洞庭之山浮於水上其下有金堂數百間帝女居之四時聞金石絲竹之音徹於山頂楚懷王時舉群才賦詩於水湄故云瀟湘洞庭之樂聽者令人難去雖咸池簫韶不能比焉每四仲之節王常繞山以遊宴各舉四仲之氣以為樂章推仲夏律中夾鍾乃作輕風流水之詩宴於山南時中蕤賓乃作皓露秋霜之曲武昌記曰樊山東有小溪盛夏時凜然常有寒氣故謂之寒溪洽聞記云歡州安遠縣西百六十里有溫山其山冬夏常雨山傍有水冬夏常熱水氣醒臭至寒野獸依集水邊取其暖氣西京雜記曰天子夏設羽扇宋玉玄謨壽陽記曰明義樓南有明義井夏有冷漿甜飲米飯羅扇羽扇有三浴室上以清王侯宰吏中以涼君子士流下以涼庶類也楚詞曰滔滔孟夏兮草木莽莽滔滔孟夏四月純陽用事煦然蒸萬物草木之類莫不莽莽然盛茂傷懷永哀兮汩徂南土汩行貌徂往也
