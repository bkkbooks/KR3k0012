body:
  text: 學部二敘經典釋名曰經徑也常典也如徑路無所不通可常用也白虎通曰五經何謂也易尚書詩禮樂也古者以易書詩禮樂春秋為六經至秦焚書樂經亡今以易書詩禮春秋為五經又禮有周禮儀禮禮記曰三禮春秋有左氏公羊穀梁曰三傳與易書詩通數亦謂之九經文心雕龍宗經篇曰三極彝訓其書曰經經也者恆久之至道不刊之鴻教也禮記經解曰孔子曰入其國其教可知也其為人也溫柔敦厚詩教也疏通知遠書教也廣博易良樂教也潔靜精微易教也恭儉莊敬禮教也屬辭比事春秋教也故詩之失愚書之失誣樂之失奢易之失賊禮之失煩春秋之失亂左傳曰韓宣子適魯見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王也春秋演孔圖曰作法五經束之天地稽之圖象質於三王施之四海也漢書曰六藝之文樂以和神詩以正言禮以明體范曄後漢書曰馬融嘗欲訓左氏及見賈逵鄭衆注乃曰賈精而不博鄭博而不精既博既精吾何加焉又曰桓榮受朱普學章句四十萬言榮入授顯宗減為二十二萬言卻復刪省定成十二萬言由是有桓君大小學後漢書曰許慎字叔重性淳篤少博學馬融常推敬之時人謂之語曰五經無雙許叔重初慎以五經傳説臧否不同於是撰五經異義傳於世晉書曰劉殷有七子五子各授一經一子授太史一子授漢書一門之內七業俱興齊書曰臧榮緒常以宣尼庚子日生其日陳五經拜之自號被褐先生唐書曰長慶中上謂兵部侍郎薛放曰為學經史何先放對曰經者古先聖之至言多仲尼所發明皆天人之極致誠萬代不刊之典也史則歷紀成敗雜書善惡各録當時之事亦是鑒其興亡然得失相參是非無所準的固不可以典籍為比論也上曰六經所尚不一至學之士白首不能盡通如何得其要乎對曰論語者六經之精華孝經者人倫之大本窮理執要真可謂聖人至言是以漢朝論語首列學官光武令虎賁之士皆習孝經玄宗親為孝經注解皆使當時大理海內久安人知孝節氣感和樂之所致也上曰聖人謂孝為至德要道其信然矣又曰玄宗時國子司業李元瓘上言三禮三傳及毛詩尚書周易等並聖賢微旨生人教業必事資經遠則斯道不墜今明經所習務在出身咸以禮記文少人皆競讀周禮經邦之軌則儀禮莊敬之楷模公羊穀梁歷代崇習今兩監及州縣以獨學無友四經殆絶既事資訓誘不可因循即望四海均習九經該備從之又曰文宗每對宰臣未嘗不深言經學李石因奏施士丐春秋可讀上曰朕嘗覽之穿鑿之學貴為異同耳學者如鑿井然得美水則已何必辛苦旁求然後為得也廣雅曰三墳分也論三才之分天地人之治其體有三也五典鎮也制作教法所以鎮之上下其等有五八索著素王之法若孔子者聖而不王制此法者有八也九丘者丘區也別九州土氣教化所宜施者也此皆三王以前上至羲皇時書也今皆亡唯堯典在易變易也禮體也得事體也詩志所之也敷布其義謂之賦事類相比似謂之比言王政事謂之雅稱頌成功謂之頌隨作者之志而別名之也尚書上也以堯為上始而書其時事春秋冬夏終而歲成春秋書人事卒歲而究備春秋溫涼中象政和也故舉以為名也國語記諸國君臣相與言語謀議之得失也莊子曰詩以導志書以導事禮以導行樂以導和易以導陰陽春秋以導名分其數散於天下而設於中國者百家之學時或稱而導之皆導古之人陳迹耳而後不能常稱哉又曰孔子謂老聃曰丘治詩書禮樂易春秋六經以為文矣干七十君論先王之道明周邵之迹一無所用甚矣夫人之難説也道之難明耶老子曰幸子之不遇治世之君也夫六經先王之陳迹也豈其道哉又曰孔子見聃不許於是翻翻堆聚之貌十二經以説老聃聃曰願聞其要也孟子曰王者之迹息而詩亡詩亡然後春秋作王者諸聖王者也太平道衰王迹止息頌聲不作曰詩亡春秋撥亂作衰晉之乘楚之搗抌魯之春秋一也淮南子曰五行異氣而皆和六藝異科而皆道溫惠淳良者詩之風也純元敦厚者書之教也清淨條達者易之義也恭儉揖讓者禮之為也寬和簡易者樂之化也剌譏辨議者春秋之靡也故易之失也鬼樂之失也淫詩之失也愚書之失也劫禮之失也亂此六者聖人兼用而裁制之又曰玉石之相類者唯良工能識之書傳之微者唯聖人能論之楊子法方曰或問周官曰立事左氏曰品藻又曰書不經非書也又曰虞夏之書渾渾爾深大商書灝灝爾夷廣周書噩噩爾不阿附也下周者其書憔悴乎下周者秦言酷烈也又曰好書不能要諸仲尼書肆也李軌注曰賣書市又曰説天者莫辨乎易説事者莫辨乎書説體者莫辨乎禮説志者莫辨乎詩説理者莫辨乎春秋又曰或問聖人之經不可使易知歟曰不可天俄而可度則其覆物也淺矣地俄而可測則其載物也薄矣大哉天地之為萬物郭五經之為衆説郛抱朴子曰正經為道德之淵海子書為增深之川流猶北辰之佐三辰林薄之禆高嶽也又曰隱士以三墳為金玉五典為琴箏講肆為鍾鼓百家為笙簧孔融與諸卿書曰鄭康成多臆説人見其名學謂有所出也證案大較要在五經四部書如非此文近為妄矣若子所執以為郊天鼓必當騏驎之皮寫孝經本當曾子家策乎顏延之庭誥曰觀書貴要觀要貴博博而知要萬流可一詠歌之書取其連類合章比物集句採風謠以達民志詩為之祖褒貶之書取其正言晦義轉制衰王微辭豐旨貽意盛聖春秋為上易首體備能事之淵馬陸得其象數而失其成理荀王舉其正宗而略其數象四家之見雖各有所志揔而論之情理出於微明氣數生於形分然則荀王得之於心馬陸取之於物其蕪惡迄可知矣夫數象窮則太極著人心極則神功彰若荀王之言易可謂極人心之數者也鄭玄六藝論曰詩者弦歌諷喻之聲也禮者序尊卑之制崇讓合敬也春秋者古史所記之制動作之事也桓談新論曰易一曰連山二曰歸藏三曰周易連山八萬言歸藏四千三百言古文尚書舊有四十五卷為十八篇古祑禮記有五十六卷古論語二十一卷古孝經一卷二十章千八百七十二字今異者四百餘字蓋嘉論之林藪文義之淵海也蘇子曰立君臣設尊卑杜將漸防未萌莫過乎禮哀王道傷時政莫過乎詩導陰陽示悔吝莫過乎易明善惡廢興吐辭令莫過乎春秋量遠近賦九州莫過乎尚書和人情動風俗莫過乎樂治刑名審法術莫過乎商韓載百王紀治亂莫過乎史漢孟軻之徒溷淆其間世人見其才易登其意易過於是家著一書人書一法雅人君子投筆硯而高視傅子曰詩之雅頌書之典謨文足以相副玩之若近尋之若遠浩浩焉文章之淵府也袁淮正論曰公羊高道聽塗説之書欲以鄉曲之辨論聖人之經非其任也潛夫論曰索物於夜室者莫良於火燭索道於當世者莫良於典籍物理論曰夫五經則海也他傳記則四瀆也諸子則涇渭也至于百川溝洫畎澮茍能通陰陽之氣達水泉之流以四海為歸者皆益也孫綽子曰銜轡衡軛無心於馬而所以御馬典籍禮度無心於治而所以為治又曰典籍文章之言也治出於天辭宣於人杜子新語曰衆儒覩春秋之記録政之失得以立正義以為聖人起當復作春秋也自通士若太史公亦以為然余謂之否夫聖賢所陳皆同取道德仁義以為奇論異文而俱善可觀猶人食皆用魚肉菜茹以為生熟異和而復俱美也博物志曰聖人制作曰經賢曰著述曰記曰章句曰解曰論曰讀文心雕龍曰自夫子刪述而大寶啓耀於是易張十翼書摽七觀詩列四始禮正五經春秋五例義既埏乎性情辭亦匠乎文理故能開學養政昭明有融然而道心惟微聖謨卓絶墟宇重峻吐納者深譬萬鈞之鴻鍾無錚錚之細響矣夫易惟談天入神致用故繫稱旨遠辭文言中事隱韋編三絶固哲人之驪淵也書實紀言而誥訓茫昧通乎爾雅則文意曉然故子貢歎書昭昭若日月之明離離如星辰之行言昭灼也詩主言志詁訓周書摛風裁興藻詞譎喻溫柔在誦最附哀矣禮以立體據事章條纖曲執而後顯採掇片言莫非寶也春秋辨理一字見義五石六鶂以詳備成文雉門兩觀以先後顯旨婉章志晦源已邃矣尚書則覽文如詭而尋理則暢春秋則觀辭立曉而訪義方隱此聖文殊致表裏之異體者也
