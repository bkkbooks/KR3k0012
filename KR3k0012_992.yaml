body:
  text: 藥部八人參説文曰人參音參出上黨春秋運斗樞曰搖光星散為人參廢江淮山瀆之利則搖光不明人參不生禮斗威儀曰君乘木而王有人參生廣雅曰參地精人參也梁書曰阮孝緒母王氏忽有疾合藥須得生人參舊傳鍾山所出孝緒躬歷幽險纍日不逢忽見一鹿前行孝緒感而隨後至一所遂滅就視果獲此草母得服之遂愈異苑曰人參一名土精生上黨者佳人形皆具能作兒啼昔有人掘之始下數鏵音華便聞土中有呻聲尋音而取果得一頭長二尺許四體畢備而髮有損缺處將是掘傷所以呻也石勒別傳曰初勒家園中生人參葩茂甚盛于時父老相者皆云此胡體奇貌異有大志量其終不可知勸邑人厚遇之潛夫論曰夫理世不得真賢譬猶疾不得真藥也疾當得真人參反得蘿蔔己不識真而飲之病浸以劇不知為人所欺也傅子曰先王之制九州異賦天不生地不飬君子不以為禮若河內諸縣去北山絶遠而各調出御上黨真人參上者十斤下者五十斤所調非所生民以為患范子計然曰人參出上黨狀類人者善廣五行記曰隋文帝時上黨有人宅後每夜有人呼聲求之不得去宅一里但一人參枝苗掘之入地五尺得人參一如人體狀去之後呼聲遂絶本草曰人參味甘微寒生山谷主補五藏安定精神魂魄除邪止驚明目開心益智久服輕身延年生上黨廬山記曰山中藥多人參吳氏本草曰人參一名土精一名神草一名黃參一名血參一名人銜一名玉精神農甘小寒桐君雷公苦歧伯黃帝甘無毒扁鵲有毒或生邯鄲三月生葉小兌核黑莖有毛三月九月採根根有頭足手面目如人慕容晃與顧和書曰今致人參十斤丹參吳氏本草曰丹參一名赤參一名木羊乳一名郗蟬草神農桐君黃帝雷公扁鵲苦無毒季氏大寒歧伯醎生桐柏或生太山山陵陰莖華小方如荏毛根赤四月華紫三月五月採根陰乾治心腹痛玄參廣雅曰鹿陽主玄參也建康記曰建康出玄參范子計然曰玄參出三輔青色者善本草經曰玄參一名重臺味苦微寒生川谷治腹中寒熱女子乳補賢氣令人目明生河間吳氏本草曰玄參一名鬼藏一名正馬一名重臺一名鹿腹一名端一名玄臺神農桐君黃帝雷公扁鵲苦無毒歧伯鹹李氏寒或生冤句山陽二月生葉如梅有毛四四相值似芍藥黑莖莖方高四五尺華赤生枝間四月實黑沙參廣雅曰苦心沙參也建康記曰建康出沙參范子計然曰白沙參出雒陽白者善本草經曰沙參一名知母味苦微寒生川谷治血積驚氣除寒熱補中益肺氣生河內吳氏本草曰白沙參一名苦心一名識美一名虎須一名白參一名志取一名文虎神農黃帝扁鵲無毒歧伯鹹李氏大寒生河內川谷或般陽瀆山三月生如葵葉青實白如芥根大白如蕪菁三月採紫參本草經曰紫參一名壯蒙苦寒無毒治心腹積藂寒熱邪氣利大便通九竅生河西及冤句治牛病生林陽建康記曰建康縣出紫參范子計然曰紫參出三輔赤青色者善苦參本草經曰苦參一名水槐茱萸西京雜記曰漢武帝宮人賈佩蘭云在宮時九月九日佩茱萸飲菊花酒令人長壽地理志曰九月九日為絲茱萸囊戴之臂上風土記曰俗上九月九日謂為上九茱萸到此日氣烈熟色赤可折茱萸囊以插頭云辟惡氣禦冬續齊諧記曰汝南桓景隨費長房遊學纍年房謂之曰九月九日汝家有災厄宜令急去家人各作絳囊盛茱萸以繫臂上登高飲菊花酒此禍可消景如言舉家登高山夕還見雞犬牛羊一時暴死房聞之曰此代矣今世人每至此日登高山飲酒戴茱萸囊是也唐廣古今五行記曰晉懷帝時無錫縣有四株茱萸樹生狀若連理郭璞卜云延陵有鼴鼠後當有拔樹儻有此東南數百里有作逆者及樹生而徐馥作亂本草經曰茱萸一名藙音毅味辛溫生川谷間湊理根去三蟲久服輕身生上谷晉宮閣名曰華林園茱萸三十六株范子計然曰茱萸出三輔山茱萸本草經曰山茱萸一名蜀酸棗平生山谷治心下邪氣寒熱溫中逐寒濕去三蟲久服輕身生漢中建康記曰建康出山茱萸范子計然曰山茱萸出三輔吳氏本草曰山茱萸一名鬾音伎實一名鼠矢一名雞足神農黃帝雷公扁鵲酸無毒歧伯辛一經酸或生冤句琅邪或東海承縣葉如梅有剌毛二月華如杏四月實如酸棗赤五月採實占斯本草經曰占斯一名虞及味苦杜仲吳氏本草曰杜仲一名木綿一名思仲黃耆秦州記曰隴西襄武縣出黃耆本草經曰黃耆味甘微溫生山谷黃連廣雅曰王連黃連也范子計然曰黃連出蜀都黃肥堅者善神仙傳曰封君達服黃連五十餘年入鳥鼠山服練水銀百餘歲常騎青牛行民間有疾病者不問識與不識皆與藥即差又曰黑穴公服黃連得仙名山記曰扶容石草多黃連湘州記曰邵陵夫夷縣衡山出黃連永嘉記曰松陽縣草有黃連覆地土人取者必禱祠若失神意則化為異物本草經曰黃連一名王連味苦寒生川谷治熱氣目痛皆傷泣出明目生巫陽吳氏本草曰黃連神農歧伯黃帝雷公苦無毒李氏小寒或生蜀郡太山之陽防己范子計然曰防己出漢中旬陽本草經曰防己一名石解味辛平無毒治風寒溫瘧熱氣通湊理利九竅生漢中吳氏本草經曰木防己一名解離一名解燕神農辛黃帝歧伯桐君苦無毒李氏大寒如葛莖蔓延如芃白根外黃似桔梗內黑文如車輻解二月八月十月採葉根王不留行本草經曰王不留行味苦平生山谷久服輕身能老生太山崔實四民月令曰八月采王不留行世説曰衛江州在尋陽劉孝標注云衛展為江州刺史有知舊人投之都不料理唯餉王不留行一斤此人得餉命駕吳氏本草經曰王不留行一名王不流行神農苦平歧伯雷公甘三月八月採徐長卿本草經曰徐長卿一名鬼督郵味辛溫生山谷治鬼物百精蠱毒疾疫邪氣溫鬼久服強悍輕身生太山吳氏本草曰徐長卿一名石下長卿神農雷公辛或生隴西三月採奄閭本草經曰奄閭味苦微寒生川谷治風寒濕痺身體諸痛久服輕身不老生雍州吳氏本草經曰奄閭神農雷公桐君歧伯苦小溫無毒李氏溫或生上黨葉青厚兩兩相當七月花白九月實黑七月九月十月採驢馬食仙去閭茹建康記曰建康出草盧茹范子計然曰閭茹出武都黃色者善本草經曰閭茹味辛寒生川谷治蝕惡肉敗瘡死肌仍殺疥蟲除大風生代郡吳氏本草經曰閭茹一名離樓一名屈居神農辛歧伯酸鹹有毒季氏大寒二月採葉員黃高四五尺葉四四相當四月華黃五月實黑根黃有汁亦同黃三月五月採根黑頭者良漏盧本草經曰漏盧一名野蘭委萎爾雅曰熒委萎郭璞注曰藥草也葉似竹大者如箭竿有葉狹而長表白裏青根大如指長一二尺可啖吳氏本草經曰委萎一名葳蕤一名王馬一名節地一名蟲蟬一名烏萎一名熒一名玉竹神農苦一經甘桐君雷公扁鵲甘無毒黃帝辛生太山山谷葉青黃相值如薑二月七月採治中風暴熱久服輕身離南爾雅曰離南活莌也草生江南高丈許大葉莖中有瓤正白莌音脫山海經曰升山草多寇脫郭璞注曰草生南方高丈許葉似荷葉白菟藿吳氏本草經曰白菟藿一名白葛榖旋復爾雅曰蕧盜庚旋復似菊本草經曰旋復花一名金沸草爵麻本草經曰爵麻生漢中吳氏本草經曰爵麻一名爵卿小華吳氏本草曰小華一名結草女苑吳氏本草曰女苑一名白苑一名織女苑廣雅曰女腹一名女苑也丹草本草經曰石長生一名丹沙草味鹹微寒生山谷治寒熱惡瘡火熱辟惡氣不祥鬼毒生咸陽吳氏本草曰石長生神農苦雷公辛一經甘生咸陽或同陽鬼督郵本草經曰鬼督郵一名赤箭一名離母味辛溫生川谷殺鬼精物治蟲毒惡氣久服輕身益力長陰肥健生雍州建康記曰建康出鬼督郵吳氏本草曰鬼督郵一名神草一名閻狗或生太山或少室莖如箭赤無葉根如芋子三月四月八月採根用乾治癰腫白鮮本草經曰白鮮治酒風薇䕔吳氏本草曰薇䕔一名縻䕔一名無願一名承膏一名承醜一名無心鬼翹根本草經曰翹根味苦生平澤治下熱氣益陰精令人面悅好明目久服輕身能老生嵩高吳氏本草曰翹根神農雷公甘有毒二月八月採以作蒸飲酒病人藎本草經曰藎草味苦盧精本草經曰盧精治蠱毒味辛平生益州屈草本草經曰屈草實根味苦微寒生川澤治胸脅下痛邪氣腹間寒陰痺久服輕身補益能老生漢中陸英本草經曰陸英生熊耳山㯏菜本草經曰㯏菜一名白英味甘寒生山谷治寒熱久服輕身延年生益州木香本草經曰木香一名木蜜香味辛溫無毒治邪氣辟毒疫溫鬼強志主氣不足久服不夢寤魘寐輕身致神仙生永昌山谷陶隱居云此即青木香也永昌不復貢今皆從外國舶上來云大秦國以療毒腫消惡氣有驗今皆用之杜衡博物志曰杜衡亂細辛蠡實華吳氏本草曰蠡實一名劇草一名三堅一名劇荔華鼠李吳氏本草曰鼠李一名牛李
