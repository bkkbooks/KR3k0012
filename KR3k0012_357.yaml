body:
  text: 兵部八十七甲下吳越春秋曰勾踐使大夫種於吳曰竊聞大王興大義誅強救弱越使賤臣種以先人藏器及甲二十領以賀君又曰公子光伏甲士於私室具酒而請王僚王僚乃被棠夷之甲三重使兵衛至光家之門夾陛帶甲左右皆王僚之親戚也專諸置魚腸劍炙魚腹中而進之刺王僚貫達背王僚立死獻帝春秋曰越騎校尉伍孚以董卓無道欲身自殺之內貫小鎧拔佩刀詣卓卓送出閣執手告別孚引刀刺卓卓多力却不中即殺孚夷其族董卓傳曰卓孫年七歲愛以為己子為作小鎧胄使騎駛音決騠音帝馬與玉甲一具俱出入以為麟駒鳳雛至殺人之子如蚤虱耳晉建武故事曰王敦死祕不發喪賊於水南北渡攻官壘柵皆重鎧浴鐵都督應詹等出精鋭距之宋元嘉起居注曰御史中丞劉損奏前廣州刺史韋朗於廣州所部作犀皮鎧六領請免朗官也鄴中記曰石季龍左右置直衛萬人皆五色細鎧光曜奪目伏侯古今注曰章帝建初三年丹陽宛陵民掘地得甲一述異記曰乾羅者慕容廆之十一世祖也著金銀襦鎧乘白馬金銀鞍勒自天而墜鮮卑神之推為君長家語曰孔子言於定公曰家不藏甲古之制也今三家過制請皆損之管子曰葛廬之山發而得黃金𧈪尤受之制以為劍鎧言其始也孟子曰矢人豈不仁於函人哉矢人唯恐不傷人函人唯恐傷人巫匠亦然故術不可不慎也趙歧章句曰矢箭也函鎧也孫卿子曰楚人鮫革犀兕以為甲堅如金石慎子曰藏甲之國必有兵道鹽鐵論曰強楚徑鄭有犀兕之甲呂氏春秋曰田贊補衣而見荊王王曰先生之衣何其惡也贊曰衣又有惡於此者王曰可得而聞乎對曰甲惡於此王曰何謂也對曰甲冬日則寒夏日則暑衣無惡乎惡乎甲者贊也貧貧故衣惡今大王萬乘之主富厚無敵而好衣民以甲臣弗得也意者為其義也甲之事兵之事也刈人之頸刳人之腹墮人之城郭刑人之父子其名又甚不榮也呂氏春秋曰邾之故為甲裳以帛以帛縕甲公息忌謂邾君曰不若以組凡甲之所以為固者以滿竅也今竅滿矣而任力者半組則不然竅滿則盡任力矣邾君以為然曰將何所得組公息忌對曰上用之則民為之矣邾君曰善下令令官為甲必以組公息忌知説之行也因令其家皆為組人有傷之者曰公息忌之所以欲用組者其家多為組也邾君不説於是乎止官無以組以用邾君有所尤也為甲以組而便公息忌雖多為組何損以組不便公息忌雖無為組亦何益為組與不為組不足以纍公息忌之説用組之心不可不察又曰趙攻中山中山有多力者曰丘鳩衣鐵甲操杖擊無不碎衝無不陷以車投車以人投人説苑曰孔子之匡簡子殺陽虎孔子似之甲士以圍孔子之舍子路怒奮戟將下鬥孔子止之曰何仁義之不免俗也夫詩書之不習禮樂之不修是吾之過也若非陽虎而以為陽虎則非丘之罪也夫由歌方和汝子路歌孔子和之三終而甲罷崔實政論曰貪叨之吏競納財用狡猾之工復盜竊之至以麻枲被弓弩鐵焠醘中令脆易治鎧孔又褊小不足容入凡漢所以能制胡者徒襦鎧弩之利也今鎧則不堅弩則不徑永失所恃矣袍朴子曰屠犀為甲給乎專征之服裂翠為華集乎后妃之首雖出於幽谷遷于喬木然為二物之計未若棲竄於林薄攝生乎榛藪文選曰介胄被霑汗又曰金練照海浦注練甲也又曰玄甲耀日陳林武庫賦曰鎧則東胡闕鞏百鍊精剛函師震推韋人製縫玄羽縹甲灼爚流光孔融置刑論曰古聖作犀兕革鎧今盆領鐵鎧絶聖甚遠魏武軍策令曰袁本初鎧萬領吾大鎧二十領本初馬鎧三百具吾不能有十具見其少遂不施也吾遂出奇破之是時士卒精練不與今時等也曹植表曰先帝賜臣鎧黑光明光各一具兩當鎧一領環鎖鎧一領馬鎧一領今世以升平兵革無事乞悉以付鎧曹殷仲堪相王箋曰奉所賜馬鎧既足以獎厲懦心又以光華遠任庚翼與燕王書曰今致襦鎧一領兜鍪一副又曰鄧百山昔送此犀皮兩當鎧一領雖不能精好復是異物故復致之李尤鎧銘曰甲鎧之施扞禦鋒矢尚其堅剛或用犀兕內以存身外不傷害有似仁人厥道廣大好德者寧好戰者危專智恃力君子不為兜鍪廣雅曰兜鍪謂之胄錏煆謂之鏂鍭上音歐下音侯説文曰胄兜鍪首鎧也易曰離為甲胄詩曰公徒三萬貝胄朱綅毛萇曰貝胄具飾也朱綅以朱綅綴之綅子林切禮記曰獻甲者執胄獻杖者執末又曰臨哀則必有哀色執紼甫勿切不笑臨樂不歎甲胄則必有不可犯之色貌與事宜相配也又曰車則挽綏執以將命甲若有以前之則執以將命無以前之則𥘵櫜奉胄鄭玄注曰𥘵其衣出兜鍪以致命櫜鎧衣也左傳曰公及邾師戰于井陘我師敗績邾人獲公胄懸諸魚門杜預曰胄兜鍪也魚門邾城門又曰秦師襲鄭過周北門左右免胄而下又曰晉侯敗狄于箕先軫曰匹夫逞志於君而無討敢不自討乎免胄入狄師死焉狄人歸其元面如生又曰晉楚戰於鄢陵郤至見楚子必下免胄而趨風疾如風也楚子使工尹襄問之以弓問遺也郤至見客免胄承命曰君之外臣從寡君之戎事以君之靈間蒙甲胄間尤近也不敢拜命介者不拜三肅使者而退又曰楚白公亂葉公亦至及北門或遇之曰君胡不胄國人望君如望慈父母焉盜賊之矢若傷君是絶民望也若之何不胄乃胄而進又遇人曰君胡胄國人望君如望歲焉冒日以冀若見君面是得艾也艾安也而又掩面以絶民望不亦甚乎乃免胄而進言葉公得民心也穀梁傳曰古者被甲嬰胄非以興國也則以征無道豈曰以報其恥哉漢書曰王莽傳云元始五年策王莽加九命之錫於是稽首拜受甲胄一具後漢書曰劉虞積忿公孫瓚不已自率兵十萬攻瓚將出從事代郡程緒免胄而前曰公孫瓚雖有過惡而罪名未正明公不先告曉使得改行以武臨之瓚必悔禍謝罪所謂不戰而服人也虞以緒臨事沮議斬之以徇戒軍士曰無傷餘人殺一伯圭而已虞遂大敗斬虞於薊市東觀漢記曰祭遵薨喪至河南博士范升上疏曰遵為將軍雖在軍旅心存王室不忘俎豆可謂守死善道者也乃贈將軍給侯印綬遣校尉發騎士四百人被玄甲兜鍪兵車軍陳送葬又曰建武六年馬武與衆將上隴擊隗囂身被甲兜鍪持戟奔擊殺數十人囂追兵盡還武中矢傷又曰上征彭寵朱浮上疏切諫曰連年距守吏士疲勞甲胄生蟣虱弓弩不得弛上下相率焦心大兵冀蒙救護生活之恩陛下輟忘之於河北誠不知所以然獻帝春秋曰孫策獲太史慈謂曰孤昔與卿神亭之役若為卿先如何慈謂曰不敢面欺若兜鍪帶不斷未可量也吳志曰太史慈與孫策戰於神亭策得慈兜鍪吳曆曰諸葛恪作東關遏魏軍距之時寒雪恪使丁奉等皆解鎧但著兜鍪持刀緣遏上北軍見祼身緣遏皆大笑不即嚴兵便亂斫遂破北軍晉書天文志曰魏文帝黃初六年十月有星孛于少微歷軒轅占曰兵喪除舊布新之象時帝軍廣陵辛丑帝親御甲胄觀兵沈約宋書曰元嘉二十七年北討至陜虜多縱突騎衆軍患之薛安都怒甚乃脫兜鍪解所帶鎧唯著絳納兩當械馬亦具裝馳奔以入賊陳猛氣咆哱所向無前當其鋒者應刃而倒賊忿之夾射不能中如是者數四每一入衆無不披靡王琰宋書曰晉康太守劉思道攻廣州殺刺史羊希龍驤將軍陳伯紹討之思道迎擊之殺傷甚衆會紹髻解兜鍪墜地退走見禽車頻秦書曰符登堅族曾孫堅死登自立皆刻兜鍪作死休字示士以必死為度故戰所向無前崔鴻前秦録曰符堅末慕容沖率衆登城堅身貫甲胄飛矢滿身後周書曰突屈之先臣於茹茹居金山之陽為茹茹鐵工金山形似兜鍪其俗謂兜鍪為突厥因以為號春秋繁露服制象曰夫執介胄而後能距敵者固非人之所貴也孝經威嬉拒曰欲去惡鬼五刑具五人皆持大斧著鐵兜鍪將之常使去四五十步不可令近人也戰國策曰蘇秦説韓王曰韓之劍當敵則斬甲楯鞮鍪國語曰靡笄之役郤獻子傷曰余病矣張御曰受命於廟受脤於社甲胄而效死戎之政也又晉語曰郤至甲胄而見客免胄而聽命樂資春秋後傳曰吳越令魏武侯厲衆五年秦人興師而臨西河魏士聞之介胄不待令而奮擊殺秦人者萬數英雄記曰袁紹為公孫瓚所圍別駕田豐扶紹入空垣紹脫兜鍪抵地云丈夫當前鬥死而返逃入牆間豈可得活一云入匿牆間廬綝晉四王起事曰建武元年天子還洛陽右將軍張方啓曰陛下自鄴來還宜謁宗廟天子出因便劫居鄴切啓移都其夜方悉引兵從西明廣陽諸城門入自領五千騎皆捉鐵纏矟擊兜鍪燋茸皆用涼州白鶡毛望之若荼周遷輿服雜事曰刺校者挍人之執刺兵者也首戴虎皮胄傳曰蒙皋貔以犯陳蔡因是有虎皮胄焉蜀隊戴貝胄被犀角此古制也詩云貝胄朱綅謂以貝齒飾胄朱縷綴之也胄插以翟尾垂以紅絮朱綅之象也晉令曰軍列營步騎士以下皆著兜鍪郭義恭廣志曰獠音老在牂柯興古鬱林交址蒼梧皆以朱漆皮為兜鍪家語曰孔子對魯哀公曰介胄執戈者無退懦之氣非體純猛服使之然孔叢子曰陳王曰將居軍之禮勝敗之變如之何太師曰介胄在身執鋭在列雖君父不拜又曰子高曰夫儒者居德行道則袞冕之服統師旅則有介胄之服韓子曰天下無道攻戰不已甲胄生蟣虱燕雀處帷幄虞喜志林曰宋祭酒云可以扞禦者為械謂鎧甲兜鍪也抱朴子曰夫德教者黼黻祭服也刑罰者扞刃之甲胄也若以德教治狡暴猶以黼黻禦剡音琰鋒也以刑罰施平世是以甲胄升廟堂也又曰忍痛苦之藥石者所以除伐命之疾嬰甲胄之重冷者所以扞鋒鏑之集又曰盤旋揖讓非禦寇之容摜甲纓胄非廟堂之飾曹植表曰兩當鎧二十領兜鍪自副鎧百領兜鍪自副陶侃答溫嶠書曰奉所送帳下得蘇峻兜牟兜牟作之巧劼用功殊多戰器不事須此也意謂不如三甲者逆賊身所服此是凶器古人惡其名得此兜牟者猶以有功今賞其細葛一端魏武帝上事曰臣前上言逆賊袁尚還即厲精鋭討之今尚人徒震蕩部曲喪守引兵遁亡臣陳軍被堅執鋭朱旗震耀虎士雷譟望旗眩精聞聲喪氣投戈解甲翕然沮壞尚單騎迸走捐棄偽節鉞鈇大將軍邟鄉侯印各一枚兜鍪萬九千六百二十枚其矛楯弓戟不可勝數邟苦浪切又古衡切干寶百志詩曰壯士稟傑姿氣烈有自然俯仰群衆中胡能救世艱閲鞏代縫掖兜鍪易進賢揚雄長楊賦曰高祖奉命順斗極運天關橫巨海漂崑崙提劍而叱之所過麾城摲邑下將降旗一日之戰不可殫記當此之勤鞮鍪生蟣虱介胄被霑汗文選曰朝食不免胄夕息常負戈又曰貝胄星離以貝飾之楯上釋名曰楯遁也跪其下避刃以隱遁也大而平者曰吳魁本出於吳為魁師者所持也隆者曰滇盾本出於蜀蜀滇所持也或曰羌盾言出於羌也約脅而鄒者曰陷虜言可陷破虜敵今謂之曰露是也狹而長者曰步盾步兵所持與刀相配者也狹而短者曰夾子盾車上所持者也子小稱也以縫音逢編板者謂之木絡盾以犀皮作之曰犀盾以木作之曰木盾皆因所用為名也許慎説文曰楯音伐也所以杆音汗身蔽目象形聲也櫓大楯也櫓音魯揚雄方言曰楯自關而東或謂之瞂或謂之干干者扞也關西謂之楯張揖埤蒼曰戟盾也廣雅曰果科于𢲸戟盾也龍魚河圖曰楯名自障禮記曰仲夏之月命樂師修鞀音桃鞞鼓均琴瑟管簫執干戚戈羽又曰春夏學干戈秋冬學羽籥皆於東序又曰季夏以禘禮祀周公於太廟朱干三戚冕而舞大武鄭玄曰朱干亦大楯也周禮曰旅賁氏掌執戈楯夾王車而趨喪紀則衰葛執戈楯又曰方相氏掌蒙熊皮黃金四目衣朱裳執戈楊楯帥百隸而時儺又曰司兵掌五兵五楯各辨其物與之等以待軍事鄭玄曰五楯干櫓之屬其名未盡聞也又曰司戈楯掌戈楯之物而頒之又曰魯及齊戰于炊鼻杜預曰炊鼻魯地齊子泉捷從泄聲子聲子魯大夫也射之中楯瓦瓦楯脊也繇軥音鉤汰輈匕入者三寸入楯瓦也繇過汰矢激也又曰宋樂祁獻趙簡子楊楯六十
