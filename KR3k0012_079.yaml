body:
  text: 皇王部三天皇項峻始學篇曰天地立有天皇十二頭號曰天靈治萬八千歲以木德王洞冥記曰天皇十二頭一姓十二人也徐整三五曆紀曰溟涬始牙濛鴻滋萌歲起攝提元氣肇啓有神靈人十三號曰天皇洞紀曰古人質以頭為數猶今數鳥獸以頭計也若云十頭鹿非十頭也春秋緯曰天皇地皇人皇兄弟九人分為九州長天下也河圖括地象曰天皇九翼題名旋復帝系譜曰天地初起即生天皇治萬八千歲以木德王遁甲開山圖曰天皇被跡在柱州崑崙山下榮氏注曰天皇兄弟十二人身貌相類不可分別治在柱州崑崙山也地皇項峻始學篇曰地皇十二頭治萬八千歲洞紀曰地皇十二頭帝系譜曰地皇治一萬八千歲以火德王三五曆紀曰有神聖人十二頭號地皇遁甲開山圖曰地皇興於熊耳龍門山榮氏注曰地皇兄弟十人面貌皆如女子貌皆相類蛇身獸足生於龍門山中人皇春秋命曆序曰人皇氏九頭駕六羽乘雲車出谷口分九州宋均注曰九頭兄弟九人項峻始學篇曰人皇九頭兄弟各三分人各百歲依山川土地之勢財度為九州各居其一乃因是而區別遁甲開山圖曰人皇起於形馬榮氏注曰人皇兄弟九人生於形馬山身有九也三五曆紀曰有神聖人九頭號人皇馬揔云一百六十五代合四万五千六百年天皇地皇人皇為太古有巢氏禮曰昔先王未有宮室冬則居營窟夏則居橧巢鄭玄注曰冬則居土暑則聚薪柴居其上也項峻始學篇曰上古皆穴處有聖人教之巢居號大巢氏今南方人巢居北方人穴處古之遺俗也皇甫諡以為有巢在女媧之後韓子曰上古之世人民少而禽獸多人不勝禽獸蛇虺有聖人作構木為巢以避群害而人悅之使主天下號之曰有巢氏遁甲開山圖曰石樓山在琅邪昔有巢氏治此山南王天下百有餘代未詳年代也燧人氏易通卦驗曰燧皇始出握機矩表計冥圖其刻曰蒼渠通靈鄭玄注曰矩法也燧皇世謂燧人在伏犧前作其圖謂之計冥時無書刻石而謂之耳刻曰蒼精渠肩之人能通神靈之意也尚書大傳曰燧人為燧皇燧人以火紀火陽也陽尊故託燧皇於天禮含文嘉曰燧人始鑽木取火炮生為熟令人無腹疾有異於禽獸遂天之意故為燧人古史考曰古之初人吮露精食草木實穴居野處山居則食鳥獸衣其羽皮飲血茹毛近水則食魚鱉螺蛤未有火化腥臊多害腸胃於是有聖人以火德王造作鑽燧出火教人熟食鑄金作刃民人大悅號曰燧人禮曰昔者先王未有火化食腥也食草木之實鳥獸之肉飲其血茹其毛此上古之時也後聖人有作作起然後修火之利範金鉢作器用合土瓦瓴甕及大以炮以燔以烹以炙以為醴酪王子年拾遺録曰遂明國有大樹名燧屈盤万頃後世有聖人遊日月之外至於其國息此樹下有鳥啄樹粲然火出聖人感焉因用小枝鑽火號燧人氏太昊庖犧氏皇王世紀曰太昊帝庖犧氏風姓也蛇身人首有聖德都陳作瑟三十六絃燧人氏沒庖犧氏代之繼天而生首德於木為百王先帝出於震未有所因故位在東方主春象日之明是稱太昊制嫁娶之禮取犧牲以充庖廚故號曰庖犧皇後世音謬故或謂之密犧一解云宓古伏字後設以宓為密故號曰密犧一號雄皇氏在位一百一十年易下繫曰古者庖犧氏之王天下仰則觀象於天俯則觀法於地中觀鳥獸之文與天地之宜近取諸身遠取諸物於是始作八卦以通神明之德以類萬物之情結繩而為網罟以畋以漁蓋取諸離河圖曰伏犧禪於伯牛鑽木作火易坤靈圖曰宓犧時立元部民易理易通卦驗曰宓犧方牙蒼精作易無書以畫事鄭玄曰密犧時質朴作易以為政令而不書但以畫其事之形象而已詩含神霧曰大跡出雷澤華胥履之生伏犧宋均注曰雷澤二名華胥伏犧母禮含文嘉曰伏者別也犧者獻也法也伏犧德洽上下天應之以鳥獸文章地應之以龜書伏犧乃則象作易卦傳曰郯子曰太皞氏以龍紀故為龍師而龍名杜預注曰太皞伏犧氏風姓祖也有龍瑞故以龍令官春秋內事曰伏犧氏以木德王天下天下之人未有室宅未有水火之和於是乃仰觀天文俯察地理始畫八卦定天地之位分陰陽之數推列三光建分八節以爻應氣凡二十四氣消息禍福以制吉凶又曰天地開闢五緯各在其方至伏犧乃合故以為元孝經援神契曰伏犧氏曰角衡連珠宋均曰伏犧木精人也曰角有骨表取象日所出房所立有星也衡中有骨表而連珠象王衡有星也又曰鈞命決曰華胥履跡怪生皇犧跡靈威仰之跡也履跡而生以為奇怪也遁甲開山圖曰仇夷山四絶孤立太昊之治伏犧生處帝系譜曰伏犧人頭蛇身以十月四日人定時生崔實政論曰太昊之世設九庖之官魏陳王曹植庖犧贊曰木德風姓八卦創焉龍瑞名官法地象天庖廚祭祀罟網漁畋瑟以像時神德通玄女媧氏帝王世紀曰女媧氏亦風姓也承庖犧制度亦蛇身人首一號女希是為女皇未有諸侯有共工氏任智刑以強伯而不王以水承木非行次故易不載歸藏曰昔女媧筮張雲幕枚占之曰吉昭昭九州日月代極平均土地和合四國山海經曰女媧之腸化為神處粟廣之野郭璞注曰女媧古神女而帝者人面蛇身一日中七十變其腹化為此神粟廣野名也禮曰女媧之笙簧女媧三皇承宓犧者笙簧笙中之簧也世本曰女媧作笙簧也淮南子曰往古之時四極廢九州裂天不兼覆地不周載火濫焱而不滅水浩溔而不息猛獸食精民高誘注曰精善也鷙鳥攫老弱於是女媧鍊五色石以補蒼天女媧陰事佐伏犧治者也斷鼇足以立四極黑龍水精也故力牧大山稽殺之以止雨也濟猶乾也冀州九州中謂合四海之內積蘆灰以止淫水蘆葦也葦生於水故積聚其灰以止於淫水平地出水為淫水民生皆方州抱周天方州地也和春陽夏殺秋約冬枕方寢繩方矩四寸也寢繩直身而臥也風俗通曰俗說天地開闢未有人民女媧摶黃土作人劇務力不暇供乃引繩於絙泥中舉以為人故富貴者黃土人也貧賤凡庸者絙人也遁甲開山圖曰女媧氏沒大庭氏王有天下五鳳異色次有柏皇氏中央氏栗陸氏驪連氏赫胥氏尊盧氏祝融氏混沌氏昊英氏有巢氏葛天氏陰康氏朱襄氏無懷氏凡十五代皆襲庖犧之號自無懷氏已上經史不載莫知都之所在共工氏水德居水火之間霸而不王女媧是三皇之一稱三皇者多有不同以太昊炎帝為二皇其二或稱女媧或稱祝融或稱共工未知孰是自女媧至無懷十五代合一万七千七百八十七歲魏陳王曹植女媧贊曰古之國君製造笙簧禮物未就軒轅纂成或云二君人首蛇形神化七十何德之靈炎帝神農氏帝王世紀曰神農氏姜姓也母曰任姒有喬氏之女名登為少典妃遊於華陽有神龍首感女登於常羊炎帝人身牛首長於姜水有聖德以火承木位在南方主夏故謂之炎帝都於陳作五絃之琴凡八世帝承帝臨帝明帝直帝來帝哀帝揄岡又曰本起烈山或時稱之一號魁隗氏是為農皇或曰帝炎諸侯夙沙氏叛不用命炎帝退而修德夙沙之民自攻其君而歸炎帝營都于魯重八封之數究八八之體為六十四卦在位百二十年而崩崩葬長沙易下繫曰神農氏作斷木為耜楺木為耒耒耜之利以教天下蓋取諸益禮含文嘉曰神者信也農者濃也始作耒耜教民耕其德濃厚若神故為神農也古史考曰炎帝以火應故置官師皆以火為名傳曰郯子曰炎帝以火紀故為火師而火名杜預注曰神農姜姓之祖也有火瑞以火紀事名官也春秋命曆序曰有神人名石耳倉色大眉戴玉理日月清明有次序故神應和氣以生也玉理猶玉英玉勝也駕六龍出地輔號皇神農始立地形甄度四海東西九十萬里南北八十一萬里所為如此其教如神農殖樹木使民粒食故天下號曰皇神農也甄紀地形遠近山川林澤所至孝經鉤命決曰任巳感龍生帝魁任巳帝魁之母也魁神農名巳或作似也典略曰武王滅紂封神農之後於譙文子曰赤帝為火災故黃帝禽之越絶書曰神農不貪天下而天下共富之不以其智自貴於人而天下共尊之莊子曰妸荷甘與神農同學於老龍吉神農隱機闔戶晝暝妸荷甘日中奓戶而入曰老龍死矣神農隱几擁杖而起嚗然入仗而笑曰天知豫僻陋慢誕故棄豫也而死已悟死不足驚故還放杖笑尸子曰神農氏夫負妻戴以治天下堯曰朕之比神農猶旦之與昏也又曰神農氏七十世有天下豈每世賢哉牧民易也淮南子曰古者民茹草飲水採樹木之實食螺蚌之肉時多疹病毒傷之害於是神農乃始教民播種五穀相土地之宜燥濕肥墝高下嘗百草之滋味泉水之甘苦令民知所避就當此之時一日而七十毒又曰神農之治天下也神農馳於國中知不出於四域懷其仁誠之心甘雨以時五穀蕃殖春生夏長秋收冬藏月省時考終歲獻貢以時嘗穀祀于明堂之制有善而無惡風雨不能襲燥濕不能傷養民以公其民朴重端愨不忿爭而財足不勞形而成功因天地之貢資而與之和同是故威厲而不試刑措而不用法省而不煩教化如神其地南至交址北至幽都東至陽谷西至三危莫不聽從當此之時法寬刑緩囹圄空虛而天下一俗莫懷姦心又曰神農皇帝襲九空重九望九空九天也九望九地也神農本草曰神農稽首再拜問於太一小子曰曾聞古之時壽過百歲而殂落之咎獨何氣使然耶太一小子曰天有九門中道最良神農乃從其嘗藥以拯救人命周書曰神農之時天雨粟神農耕而種之作陶冶斤斧為耒耜鉏耨以懇草莽然後五穀興呂氏春秋曰神農教曰士有當年不耕者則天下或受其飢矣女有當年不績者則天下或受其寒矣故夫親耕妻親績賈誼書曰神農以為走禽難以久養民乃求可食之物嘗百草實察鹹苦之味教民食穀陸景典略曰神農嘗百草嘗五穀蒸民乃粒食荊州圖記曰永陽縣西北二百三十里厲鄉山東有石穴昔神農生於厲鄉禮所謂烈山氏也後春秋時為厲國穴高三十丈長二百丈謂之神農穴
