body:
  text: 兵部十五機略三後漢書朱俊傳曰趙弘據宛城俊因急擊弘斬之賊餘帥韓忠復據宛拒俊俊兵少不敵乃張圍結壘赴土山以臨城內因鳴鼓攻其西南賊悉衆赴之俊自將精卒五千掩其東北乘城而入忠乃退保小城惶懼乞降司馬張超及徐璆秦頡皆欲聽之俊曰兵有形同而勢異者秦項之際人無定主也故賞附以勸來耳今海內一統唯黃巾造寇納降無以勸善討之足以懲惡今若受之更開逆意賊利則進戰鈍則乞降縱敵長寇非良計也因急攻連戰不剋俊登土山望之顧謂張超曰吾知之矣賊今外圍周固內營逼急乞降不受欲出不得所以死戰也萬人一心猶不可當況十萬乎其害甚矣不如徹圍并兵入城忠見圍解勢必自出自出則意散易破之道也既而解圍忠果出戰俊因擊之大破之乘勝逐北數十里斬首萬餘級忠等遂降又曰董卓將三萬討先零羌卓於望垣北望垣縣屬天水郡為羌胡所圍糧食乏絶進退逼急乃於所渡水中僞立𨻳以為捕魚而潛從𨻳下過軍續漢書𨻳字作堰北賊追之決水已深不得渡時衆軍敗退唯卓全師而還又曰臧宮將兵屯駱越越人謀叛從蜀宮兵少力不能制會屬縣送委輸車數百乘至宮夜使鋸斷城門限令車回轉出入至旦即越人候伺者聞車聲不絶而門限斷相告以漢兵大至其渠帥乃奉牛酒以勞軍營宮陳兵大會擊牛釃酒饗賜慰納之又曰蜀有妖巫維汜弟子單臣傅鎮等復妖言相聚入原武城維或作侯劫吏人自稱將軍於是遣臧宮將北軍及黎陽營數千人圍之賊穀食多數攻不下士卒死傷帝召公卿諸侯王問方略皆曰宜重其購賞時顯宗為東海王獨對曰妖巫相劫勢無久立其中必有悔欲亡者但外圍急不得走耳宜小挺緩挺解也令得逃亡逃亡則一亭長足以禽矣帝然之即勑宮撤圍緩賊賊衆分散遂斬臣鎮等又曰岑彭南擊秦豐與其大將蔡宏拒彭等於鄧數月不得進帝怪以讓彭彭懼於是夜勒兵馬申令軍中使明旦西擊山都山都縣名屬南陽郡乃緩所獲虜令得逃亡歸以告豐豐即悉其軍西邀彭彭乃潛兵渡沔水擊其將張楊於阿頭山大破之沔水源出武都東狼谷中即漢水之上源也阿頭山在襄陽從川谷間伐木開道直襲黎丘擊破諸屯兵豐聞大驚馳歸救之彭與諸將依東山為營豐與蔡宏夜攻彭彭預為之備出兵逆擊之豐敗走追斬蔡宏又皇甫嵩傳曰梁州賊王國圍陳倉復拜嵩為左將軍督前將軍董卓各率二萬人拒之卓欲速進赴陳倉嵩不聽卓曰智者不後時勇者不留決速救則城全不救則城滅全滅之勢在於此也嵩曰不然百戰百勝不如不戰而屈人之兵是以先為不可勝以待敵之可勝不可勝在我可勝在彼彼守不足我攻有餘孫子之文有餘者動於九天之上不足者陷於九地之下玄女三宮戰法曰行兵之道天地之寶九天九地各有表裏九天之上六甲子也九地之下六癸酉也子能順之萬全可保今陳倉雖小城守固備非九地之陷也王國雖強而攻我之所不救非九天之勢也夫勢非九天攻者受苦害陷非九地守者不拔國今已陷受害之地而陳倉保不拔之城我可不煩兵動衆而取全勝之功將何救焉遂不聽王國圍陳倉自冬迄春八十餘日城堅守固竟不能拔賊衆疲弊果自解去嵩進兵擊之卓曰不可兵法窮寇勿迫歸衆勿追司馬兵法之言今我追國是迫歸衆追窮寇也困獸猶鬭蜂蠆有毒况大衆乎嵩曰不然前吾不擊避其鋭也今而擊之待其衰也所擊疲師非歸衆也且走者莫有鬭志以整擊亂非窮寇也遂獨進擊之使卓為後拒連戰大破斬首萬餘級國走而死卓大慚恨由是忌嵩又曰吳漢岑彭討公孫述述使其將延岑等悉兵拒廣漢及資中又遣將侯丹率二萬餘人拒黃石彭乃多張疑兵使護軍楊翕與臧宮拒延岑等自分兵浮江下還江州今南郡即漢江州縣泝江都江而上江都江城都江也襲擊侯丹大破之因晨夜倍道兼行二千餘里徑拔武陽使精騎馳廣都去成都數十里勢如風雨所至皆奔散初述聞漢軍在平曲故遣大軍逆之及漢兵至武陽出延岑軍後蜀地震駭又曰馬援為隴西太守發步騎三千人擊先零羌將其妻子輜重移阻於允吾谷允吾音鋭牙援乃潛行間道掩赴其營羌大驚壞復遠徙唐翼谷中援復追討之羌引精兵聚北山上援陳軍向山而分遣數百騎繞襲其後乘夜放火擊鼓叫譟虜遂大潰又曰馮異與鄧禹率車騎將軍鄧弘等議攻赤眉異曰賊衆尚多可稍以恩信傾難卒用兵破也上今使諸將屯澠池要其東而異擊其西一舉取之此萬成計也禹弘不從弘遂大戰移日赤眉佯敗棄輜重而走車皆載土以豆覆其上兵士飢爭之赤眉引還擊弘弘軍大亂異與禹合兵救之赤眉小却異以士卒飢倦可且休禹不聽復戰大為所敗又曰河南賊張步據地漢將耿弇討之壁於臨淄步與其三第藍弘壽及故大彤渠帥重異等兵重姓異名也號二十萬至臨淄大城東將攻弇弇先出淄水上與重異遇突騎欲縱弇恐挫其鋒令步不敢進固示弱以盛其氣乃引歸小城陳兵於內步氣盛直攻弇營與弇禆將劉歆等合戰弇升王宮壞臺望之臨淄本齊國所都即齊王宮中壞臺也視歆等鋒交乃自引精兵橫交突步陳於東城下破之又曰赤眉青犢十餘萬衆並在射犬光武引兵將擊之耿純軍在前去衆營數里賊忽夜攻純雨射營中士多傷純勒部曲堅不動選敢死千人俱持強弩各傅三矢使銜枚間行傅著繞出賊後齊聲呼譟強弩並發賊衆驚走追擊之遂破又曰光武遣將王霸馬武擊河南賊周建於垂惠賊帥蘇茂將五校兵四千餘人救建而先遣精騎遮擊馬武軍糧武往救之建從城中出兵夾擊武武恃霸之援戰不甚力為茂建所敗武軍奔過霸營大呼求救霸曰賊兵盛出必敗努力而已閉營堅壁軍吏皆爭之霸曰茂兵精鋭其衆又多吾吏士心恐而馬武與吾相恃兩軍不一此敗道也今閉營固守示不相援賊必乘勝輕進馬武無救其戰自倍如此茂建衆疲勞吾承其弊乃可剋也茂建果悉出兵攻武合戰良久霸軍中壯士路潤等數十人斷髮請戰霸知士心鋭乃開營後出精騎襲其背茂建前後受敵驚亂敗之又曰西域莎車國王不供將兵長史班超發于闐疏勒諸國二萬五千人擊之莎車求救龜茲龜茲王遣將發溫宿姑墨尉頭合五萬人助之超召諸將及于闐疏勒王議曰兵少不敵莫如各解散去于闐從此東歸長史亦從此西歸夜半聞聲鼓便發衆皆以為然乃陰緩所擒得生口歸以超言告龜茲龜茲聞之喜使其將以萬騎於西界遮超溫宿王將以千騎於東界遮于闐王人定後超密令諸司馬勒兵至雞鳴馳赴莎車草營掩覆之胡皆驚走斬首五千級莎車遂降又曰光武遣將鄧禹西征至河東禹擊更始將王匡禹軍不利戰罷明日癸亥匡以六甲窮日不出禹因得更整兵勒衆明晨匡悉軍出攻禹禹令軍中無得輒動既至營下因傳發諸將鼓而並進大破之又曰馮異將數萬人與賊約期會戰使壯士變服與赤眉同伏於道側明日赤眉使萬人攻異前部異裁出兵以救之裁少出兵戌所以示弱賊見勢弱遂悉衆攻異異縱兵大戰日昊賊氣衰伏兵卒起衣服相亂赤眉不復識別衆遂驚潰追擊大破於崤底又曰岑彭將兵三萬餘人南擊秦豐拔黃郵豐與其大將蔡宏等拒於鄧數日不得進彭夜勒兵馬申令軍中使明早西擊山都乃緩所獲虜令得逃亡歸以告豐豐即悉其軍西邀彭彭乃潛兵度沔水擊其將張楊於河頭山大破之從川谷間伐木開道直襲黎丘破諸屯兵豐聞大驚馳歸救之彭依東山為營豐與蔡宏夜攻彭彭先為之備出兵逆擊之豐敗走又曰張步據齊地漢將耿弇征之步將費邑分遣其弟敢守巨里弇進兵先脅巨里使多伐樹木楊言以填塞坑塹數日有降者言邑聞弇欲攻巨里謀來救之弇乃嚴令軍中趣修攻具宣勑諸部後三日當悉力攻巨里城陰緩生口令得亡歸歸者以弇期告邑邑至日果自將精兵三萬餘人來救之弇喜謂諸將曰吾所以修攻具者欲誘致邑耳今來適其所求也即分三千人守巨里自引精兵上岡坂乘高合戰大破之臨陳斬邑既而收首級以示巨里城中凶懼凶許拱切費悉衆亡歸又曰將軍耿秉與竇固合兵一萬四千騎擊車師有後王前王前王即後王之子其庭相去五百餘里秉議先赴後王以為并力根本則前王自服固計未決秉奮身而起衆軍不得已遂進並縱兵鈔掠斬首數千級收馬牛羊十餘萬頭後王安得震怖從數百騎出迎秉降又曰袁紹曹公相持於官渡俎授說紹俎側居切可遣蔣奇別為支軍於外以絶曹公之路紹不從許攸進曰曹公兵少而悉師拒我許下餘守勢必空弱若分遣輕軍星行掩襲許伏則操為成擒如其未潰可令首尾奔命破之必也紹又不用竟為曹公所敗又曰曹公征河北師次頓兵黑山賊于毒等攻東武陽曹公引丘西入山攻毒等本屯毒聞之棄武陽還魏武要擊於內黃大破之又曰曹公征張繡於穰荀攸曰繡仰食於劉表於久而勢必離今緩之可誘致急之則相救公不從與繡戰表果救之公敗歸又曰青徐黃巾三十萬衆入渤海界欲與黑山合公孫瓚率步騎二萬人逆擊於東光南大破之斬首二萬餘級賊棄輜重數萬兩奔走度河瓚因其半濟薄之賊復大破死者數萬
