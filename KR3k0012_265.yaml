body:
  text: 職官部六十二功曹參軍韋昭辨釋名曰曹群也功曹吏所群聚戶曹民所群聚也其他皆然漢書曰蕭何為主吏孟康曰主吏功曹也又曰朱博為琅邪郡守召見功曹閉閣數責與筆札使自記受取一錢已上無得有所匿欺謾半言斷頭矣功曹惶怖具自書姦贓大小不敢隱博知其對以實乃令就席受勑自改而已投刀使削所記遣出就職東觀漢記曰趙勤南陽人太守桓虞召為功曹委以郡事嘗有重客過欲託一士令為曹吏虞曰我有賢功曹趙勤當與議之潛於內中聽虞乃問勤勤對曰恐未合衆客曰止止勿復道又曰楊正為京兆功曹光武崩京兆尹出西域賈胡共起帷帳設祭尹車過帳胡牽車令拜尹疑止車正在前導曰禮天子不食支庶况夷狄乎勑壞祭遂去又曰鮑永為郡功曹時有稱侍中止傳舍者太守趙興欲出謁永以不宜出當車拔佩刀興因還後數日詔書下捕之果矯稱使者由是知名又曰郭丹為郡功曹薦陰亶程胡魯歆自代太守杜詩曰古者卿士讓位今功曹稽古經可為至德編署黃堂以為後法又曰吳良字大儀齊國臨淄人初為郡吏歲旦與掾史入賀門下掾王望舉觴上壽諂稱太守功德良於下席勃然進曰佞邪之人欺諂無狀願勿受其觴太守斂容而止宴罷轉良為功曹恥以言受進終不肯謁又曰汝南太守歐陽歙召郅惲為功曹汝南舊俗十月饗會百里內皆齎牛酒到府飲宴時臨饗禮畢歙教曰西部督郵繇延天資忠貞不嚴而治今與衆儒共論延功顯之于朝惲於下座愀然前曰案延資性貪邪外方內員朋黨搆姦罔上害民明府以惡為善以直從曲此既無君又復無臣惲敢奉觥歙色慚不知所為門下掾鄭敬進曰君明臣直功曹言切明府德也歙意少解曰實歙罪也又曰永平初新野功曹鄧寅以外戚小侯每預朝會而容姿趍步有出於衆上目之顧左右曰朕之儀貌豈若此人特賜輿馬衣服虞延以寅無實行未嘗加禮上乃詔令自稱南陽功曹詣闕寅在職不服父喪帝聞乃歎曰知人則哲推帝難之信哉斯言寅聞而慚退後漢書曰虞延去官還鄉里太守富宗聞延名召署功曹宗性奢靡車服器物多不中節延諫曰昔晏嬰輔齊鹿裘不完季文子相魯妾不衣帛以約失之者鮮矣宗不悅延即辭退居有頃宗果以侈縱被誅臨當伏刑攬涕而歎曰恨不用功曹虞延之諫又曰周章初仕郡為功曹時大將軍竇憲免封冠軍侯就國章從太守行春到冠軍太守猶欲謁之章進諫曰今日公行春豈可越儀私交且憲椒房之親勢傾王室而退就藩國禍福難量明府剖符大臣千里重任舉止進退其可輕乎太守不聽遂便升車章前拔佩刀絶馬鞅於是乃止及憲被誅公卿以下多以交關得罪太守幸免以此重章又曰徐稚豫章人時陳蕃為太守以禮請署功曹稚不免之既謁而退蕃在郡不接賓客唯稚來特設一榻去則懸之又曰韓稜初為郡功曹太守葛興中風疾不能聽政稜陰代興視事出入二年令無違者又曰廉范永平初隴西太守鄧融備禮謁范為功曹謁請會融為州所舉案舉其罪案驗之范知事譴難解欲以權相濟乃託病求去融不達其意大恨之范於是東至洛陽變名姓求代廷尉獄卒居無幾融果徵下獄范遂得衛侍左右盡心勤勞融怪其貌類范而殊不意乃謂曰卿何以我故功曹耶范訶之曰君困厄瞀亂耶鄭玄注禮記曰瞀目不明之貌語遂絶融繫出困病范隨而養視及死竟不言身自將車送喪致南陽葬畢乃去續漢書曰汝南太守宗資以事委任功曹范滂時人謠曰汝南太守范孟博南陽宗資主晝諾又曰李恂字叔英安定臨涇人太守李鴻請署功曹未及到而州辟為從事會鴻卒恂不應州命而送鴻喪還鄉里既葬留起冢墳治喪三年又曰李充為太守魯平請署功曹不就平怒乃投充以捐溝中因謫署縣都亭長不得已起親職役謝承後漢書曰范滂字孟博汝南人太守宗資署功曹滂外甥西平李頌公族子孫頑器穢濁為鄉曲所棄常侍唐衡屬其事資勑曹召署文學史滂不肯聽資怒召功曹書佐朱零問不召頌意狀零以告滂滂曰答教當言頌則滂之姊子豈不樂其升進但頌汙穢小人不宜染汙朝廷不敢以位私人是以不召零具答教如此零入聞資使五伯亂捶困杖言辭不懾仰疾言曰范滂清議猶利刃截腐肉願為明府所笞殺不為滂所廢絶今日之死當受忠名為滂所廢永成惡人滂正直謇諤皆此類也又曰許劭仕郡為功曹抗忠舉義進善黜惡正機執衡允齊風俗所稱如龍之升所貶如墮干淵清論風行所吹草偃為衆所服又曰李壽聰明智達有俊才太守黃讜高其名德召署功曹每進見常薦達郡中善人有異行者讜輒序用壽雖見優禮愈隆壽意益下其所致達未嘗伐其功美又曰羊定字世德為郡功曹病困被不覆軀衣不周身郡將賜大布被及襦袴皆不受執志而終又曰鍾皓字季明潁川長社人同郡陳實年不及皓引與為友皓為郡功曹會辟司徒府臨辭太守問誰可代卿者皓曰明府必欲得其人西門亭長陳實聞之曰鍾君似不察人不知何猶識我又曰彭修會稽人仕郡為功曹時西部都尉宰朝行太守事以徵過收吳縣獄吏將殺之主簿鍾離意爭諫甚切朝怒使收縛意修排閣直入拜於庭曰明府發雷霆於主簿請聞其過朝曰受殺三日初不奉行廢命不忠豈非過耶修因拜曰昔任座面折文侯朱雲攀毀欄檻自非賢君焉得忠臣遂原意罰貸獄吏袁山松後漢書曰岑晊字公孝高才絶人五經六藝無不洞貫太守成瑨請為功曹時謠曰南陽太守岑公孝弘農成瑨但坐嘯張璠漢記曰陳寵為廣漢太守風聲大行徵為大司農帝問何以為治寵曰臣任功曹王渙渙由是知名魏志曰臧洪廣陵郡人也為張超功曹超兄邈謂超曰聞弟為郡守政教威恩不由己出動任臧洪洪者何人超曰洪才略智數優超超甚愛之海內奇士也邈郎引見洪與語大異之又曰臧洪字子原太守張超請洪為功曹卓圖危社稷洪説超曰明府歷世受恩兄弟並據大郡今王室將危賊臣未梟此誠天下義烈報恩效命之秋也今郡境尚全吏民殷富若動桴鼓可得二萬以此誅除國賊為天下倡先義之大者也超然其言又曰袁渙字曜卿當時諸公子多越法度而渙清靜舉動必以禮郡命為功曹郡中姦吏皆去又曰陳矯字季弼廣陵人太守陳登請為功曹使矯詣許謂曰許下論議待君不足者相為觀察還以見誨矯還曰聞遠近之論頗言明府驕而自矜使過泰山泰山太守東郡薛悌異之結為親友戲矯曰以郡吏而交二千石鄰國君從陪臣遊不亦可乎又曰杜畿字伯侯京兆杜陵人年二十為郡功曹鄭縣內繫囚數百畿親臨獄裁其輕重盡決遣之郡中奇其年少而有大志魏略曰京兆尹張時河東人也與杜畿有舊署為功曹常言此家疏誕不中功曹也畿竊云不中功曹中河東太守蜀志曰龐統字士元郡命為功曹性好人倫勤於長養每所稱述多過其才時人怪而問之統答曰當今天下大亂雅道陵遲善人少而惡人多方欲興風俗長道業不美其談即聲名不足慕企不足慕企而為善者少矣今拔十失五猶得其半而可以崇邁世教使有志者自勵不亦可乎吳志曰聶友字文悌豫章人也有脣吻少為縣吏虞翻徙交州縣令使友送之翻與語而奇焉為書與豫章太守謝斐令以為功曹郡時見有功曹斐見之問曰縣吏聶友可堪何職對曰此人縣間小吏耳猶可堪曹吏佐斐曰論者以為宜作功曹君其避之乃用為功曹又曰虞翻字仲翔為孫策功曹好馳騁遊獵翻諫曰明府用烏集之衆驅散附之士皆得其死力雖漢高帝不及也至於輕出微行從官不暇嚴吏卒常苦之夫君人者不重則不威故白龍魚服因於豫且子余切白蛇自放劉季害之願少留意策答曰君言是也然時有所思端坐悒悒有諀諶草創之計是以行耳又曰處士謝談為吳粲功曹以疾不詣粲教曰夫應龍以屈伸為神鳳皇以嘉鳴為貴何必隱於天外潛鱗於重淵者哉又曰潘濬字承明武威人也為人聰察對問有機理王粲見而貴異之由是知名為郡功曹吳録曰孫劭字長緒北海人為孔融功曹融稱曰廊廟才也後為吳丞相王隱晉書曰劉毅字仲雄僑居陽平太守杜恕逼迫舉毅為功曹月餘日沙汰郡吏百餘人三魏稱焉為之語曰但聞劉功曹不聞杜府君又曰世號庾兗有異行元康之末頴川太守復以功曹命之兗服造事之衣杖捶荷斧不俟駕行曰請受下夫之役府君飾車而迎逡巡辭焉形雖益恭而神有不可動之色府君知其不屈乃難曰非常士也吾無以臣之矣乃厚禮遣之晉中興書曰胡母輔之嘗過河南門下飲酒門下騶王子博箕坐其傍輔之叱之使取火博曰我卒也不乏吾事薦之河南君樂廣召見甚悅擢為功曹又曰任旭字次龍臨海人操立清儉不染流俗郡將蔣秀請為功曹治官貪穢每不奉法旭正色苦諫秀既不納旭乃謝去閉門講肆養志而已久之秀坐事被收旭於獄狼狽營救躬自扶送秀慨然歎曰任功曹直人吾違其讜言以至於此復何言哉九州春秋曰建安六年劉表攻西鄂西鄂長杜子緒帥縣男女嬰城而守時南陽功曹柏孝長亦在城中聞兵攻聲恐懼入室閉戶牽被覆頭相攻半日稍敢出面英雄記曰尚栩先人尚子平有道術為縣功曹休歸自入山擔薪賣以食飲會稽典録曰孫策功曹魏勝以忤意見遣將殺之吳太夫人乃倚大井而語策曰汝新造江南其事未集方當優賢禮士捨過録功魏功曹在公盡規汝今日殺之則人明日叛汝吾不忍見禍及當先投此井中耳策大驚遽釋勝又曰魏朗字少英上虞人從太守行春寢於閣外感時志激中夜長歎府君朝問昨歎息者誰主簿曰書佐魏朗也府君由是知朗有凌雲之志轉功曹佐正旦與掾史上朝時功曹吏顧翕披裘以加朝服朗以裘非臣服非翕不敬勑卒撤去翕恚而不聽以手歐卒朗右手鳴鼓左手撤裘以聞府君曰朗當朝正色有不撓之節遂退翕以朗代之朗辭病不就又曰魏徽字孔章仕郡為功曹史府君貴其名重徽每拜謁常跪而待之華陽國志曰公孫述入蜀蜀郡拒守述功之功曹朱尊絆馬死戰光武帝嘉之又曰李業字臣遊廣漢梓橦人少執志清白太守到咸慕其名召為功曹十命不詣又曰朱倉字雲卿下邳人少受學於蜀郡張寧餐豆屑飲水同業憐其貧資給米肉不受家貧常以步行為郡功曹鍾岏良吏傳曰桓虞字仲春馮翊萬年人也為南陽郡守下車聞葉縣雍昱及新野令不遵法度選督郵不能正乃署趙勤為督郵到葉昱即解印綬入新野新野令聞昱已去遣吏奉記陳罪亦即棄官虞乃歎曰善吏如良膺下韝即中擢為功曹委以郡事豫章列士傳曰華茂為功曹病被不覆軀布衣不周身郡將與大布被袴皆不受汝南先賢傳曰袁閬字奉高為功曹辟太尉掾太守唐珍曰今君當應宰府宜選功曹以自代因薦陳仲舉珍即請蕃為功曹又曰新蔡鄭敬字次都為郡功曹都尉高懿廳事前槐樹有露類甘露者懿問掾屬皆言是甘露敬獨曰明府政未能致甘露但樹汁耳懿不悅託疾而去又曰許慎為功曹奉上以篤義率下以恭寬荊州先德傳曰周瑜領南郡以龐士元名重州里所信乃逼為功曹任以大事瑜垂拱而已鍾離意別傳曰意字子阿會稽山陰人也太守竇翔召意署功曹史意乃為府立條式威儀嚴肅莫不靖恭後日竇君與意相見曰功曹須立嚴科太守觀察朝晡吏無大小莫不畏威陳實別傳曰實字仲弓頴川許人也為郡功曹時中常侍侯覽託太守高倫用吏倫教署文學掾實知非其人乃懷擊請見乞從外署倫從之於是卿論怪其非舉倫後被徵為尚書郡中士大夫送至傳舍倫語衆人曰吾前為侯常侍用吏此各由故人畏憚強禦陳君可謂善則稱君惡則稱己者也聞者方歎息陸績別傳曰績字公紀郡人也太守王朗命為功曹風化肅穆郡內大治京兆舊事曰長安孫晨家貧為郡功曹十日一炊無被有蒿一束暮臥其中旦則收之司倉參軍後漢書曰戴就字景成仕郡為倉曹掾刺史劾其太守遣部從事案倉庫簿領五毒慘至郡事遂釋也三國典略曰張軌入關拔嶽以為倉曹參軍或有請貸官粟者軌曰以私害公非吾宿志濟人之難詎得相違乃賣所服之衣糶粟以賑其乏司戶參軍後漢書曰陸績李郃皆仕郡為戶曹史郃後官至司空唐書曰裴琰之絳州聞喜人也世為著姓永徽中為同州司戶參軍時年少美容儀刺史李崇義初甚輕之先是州中有積年舊案數百道崇義促琰之使斷之琰之命書吏數人連紙進筆斯須剖斷並畢文翰俱美且盡與奪之理崇義大驚謝曰公何忍藏鋒以成鄙夫之過由是大知名號為霹靂手司兵參軍唐書曰杜甫字子美本襄陽人後徙居鞏縣天寶初應進士不第天寶末獻三大禮賦玄宗奇之召試文章授京兆兵曹參軍司法參軍後漢書曰周燕宣帝時為郡決曹掾太守欲枉殺囚燕數諫不聽遂殺囚家詣闕稱冤詔遣覆考燕謂太守曰願謹定之書背著燕名府君但時言病而已使收燕燕遂死之燕有五子皆至刺史太守兩漢有決曹賊曹掾主刑法歷代皆有或謂之賊曹或為法曹又曰郭弘為潁川郡決曹掾治獄至四十年用法平正郡內比之東海于公隋書曰陳孝意為會郡司法書佐太守蘇威欲殺一囚固諫不許乃解衣請先受死乃止後至侍御史汝州刺史五官掾後魏書曰王尊字子贛涿郡人為安定太守出教曰五官掾張輔懷虎狼之心貪汙不軌一郡之錢盡入輔家適足以葬矣遂將輔送獄直府史詣閣下從太守受其事輔繫獄數日死東觀漢記曰黃香江夏安陵人也父况為郡五官舉孝廉貧無奴僕香躬勤左右苦暑乃扇床枕冬以身溫席又曰桓帝時白馬令李雲坐直諫繫獄弘農五官掾杜衆傷其忠直獲罪上書願與雲俱得死遂俱死獄中後漢書曰諒輔字漢儒仕郡為五官掾夏大旱太守自祈禱無應輔乃自曝庭中祝曰輔為股肱不能進諫納忠薦賢退惡和調陰陽承順天意乃積薪以自環構火其旁曰若日中不雨將自焚未日中而澍雨也臧榮緒晉書曰范略字彥長南陽順陽人少遊學清河遂徙家僑居郡命為五官掾
