body:
  text: 服章部十袍說文曰以絮曰繭繭以縕曰袍禮記玉藻曰纊為繭縕為袍縕舊絮纊綿也釋名曰袍丈夫著下至跗者袍苞也內衣也論語曰衣弊縕袍與衣狐貉者立而不恥者其由也與詩曰豈曰無衣與子同袍史記曰秦相范睢與魏人須賈有隙及賈使秦睢自稱張祿先生見賈寒取一綈袍以賜之及數其罪曰爾得無死者將以綈袍有戀戀故人之意漢書曰文帝使遺單于繡祫長𥜗錦祫袍各一續漢書曰袁安為光祿勳至清鹿袍糲食又曰三老五更皆服都祿大袍又曰輿服志曰公主貴人妃以上嫁娶得服錦繡羅縠十二色綠袍東觀漢記曰明德馬後袍極麤踈諸王朝望見反以為綺華嶠後漢書曰藥崧者家貧為主無被糟食自此詔給帷被皂袍袁山松後漢書曰靈帝欲以羊續為太尉時拜三公者皆輸東園禮錢千萬中使取之續乃舉縕袍以示之曰臣之所資惟斯而已故不登公位古今善言曰續出黃紙補袍以示使人時人謠曰天下清苦羊續祖又曰桓鸞字始春焉弟也少立志行縕袍糟食不求盈餘以濁世恥不肯仕魏略曰薛夏字宣聲黃初中為祕書丞帝與夏推論書傳未嘗不終日也帝見其衣薄解所御袍賜之蜀志曰彭羨字永年姿性驕慠多所輕忽唯敬同郡秦安薦之於太守許靖曰竊見處士綿竹秦安應山甫之德履雋生之直枕石漱流吟詠縕袍也王隱晉書曰江東賜涼州剌史張駿真金印大袍又曰鄭冲以儒雅為德莅職無幹局之譽簞食縕袍不營資產世以此重之又曰惠帝自鄴還洛陽賜中書監盧士鶴綾袍一領又曰武帝賜桓伊錢百萬袍裏千端又曰慕容冲進逼符堅送一領錦袍遺冲詔曰古者交兵使在其間今送一袍以明本懷齊書曰卞彬蚤虱賦序曰余居貧布衣十年不製一袍之縕有生所託資其寒暑無與易之為之多病起居甚踈縈寢敗絮不能自釋梁書曰侯景將為亂時謠曰青袍白馬壽陽來後景軍中悉著青袍景長乘白馬又曰臨賀王正德侯景之亂正德為平北將軍屯朱雀航景王正德乃北向望闕三拜歔欷流涕引賊入宣陽門與景交揖馬上退據左衛府先是其軍普著絳袍袍裏皆碧至是悉反之賊以正德為天子唐書曰武后出緋紫單羅銘襟背袍以賜文武臣其袍文各有炯戒諸王則飾以盤石及鹿宰相飾以鳳池尚書飾以對鴈左右衛將軍飾以麒麟左右武衛飾以對虎左右鷹對飾以鷹左右千牛餙以牛左右豹韜飾以師子左右金吾飾以象又銘其襟背作八字迴文焉又曰肅宗為皇太子受冊當彼絳紗袍太子以為與皇帝同稱辭不敢當下百官議帝手勑改為米明服又曰薛平能守法度理身儉薄一綠袍十年不易恩加朱紱然始解去莊子曰曾子居衛縕袍無表十年不制衣墨子曰楚莊王鮮冠縕組纓絳衣博袍以理其國政也說苑曰子思居衛縕袍無裏田子方遺狐白之裘恐其不受謂之曰吾假人遂忘之子思竟不受鹽鐵論曰原憲之縕袍賢於季孫之狐狢又曰倪寬練袍衣若僕妾食若庸夫東宮舊事曰太子納妃有絳綾袍一領漢武內傳曰上元夫人降武帝服赤霜之袍雲綵亂色非錦非繡不可得名神仙傳曰太傅楊駿使人迎孫登共語不荅以複布袍賜之受之出門從人借刀斷袍上下異處放駿門下又大讙斫刺當時人謂為狂後乃知駿當誅斬其人王褒內傳曰真人將褒見太上文人著流霞羽袍芙蓉冠搜神記曰有談生者年四十無婦夜有女年十五六姿顏無雙來為生妻經三年遂乃生一兒曰慎勿以火照我後三年可照耳生不能忍照之腰上肉如人腰以下但枯骨婦求去將生入華堂奧室以珠袍與之生至市賣袍睢陽王識是女袍收拷談生談生具對呼兒似玉女又曰郭璞每自為卦知其凶終嘗逢一趍走少年便脫青絲袍與之此人不解其意璞曰身命卒當在君手故逆相屬耳及當死果此人行刑傍人皆為屬求利璞曰我常託之久矣此人為之歔欷哽咽行刑既畢乃說如此鄴中記曰石虎臨軒大會著丹紗袍鍾岏良吏傳曰袁彭字伯楚為南陽太守政以清潔糲食縕袍不改其操古樂府曰紵歌曰紵實如月輕如雲色似銀袍以光軀巾拂塵製以為袍餘作巾古詩曰青袍似春草長條隨風舒魏武帝與楊彪書曰今遺足下貴室錯綵羅縠穀錦袍一領劉弘教曰將士寒窮者給一韋袍複帽劉義恭啟事曰詔旨以赦日所制綾紋綿布袍放生古具袍垂重賜劉謐之與天公牋曰體戰身噤脫衣凍坐賴詹公借袍南城送火褐說文曰褐短衣也詩曰無衣無褐何以卒歲褐毛布也左傳曰吳申叔儀乞食於公孫有山氏曰佩玉蘂兮余無繫之旨酒一盞兮余與褐之父睨之對曰梁則無矣麤則有之若登首山以呼庚癸則乎諾軍中不得出糧牧為私隱庚西方主殼癸北方主水傳言吳子不與士共飢渴所以亡韓詩外傳曰東郭書知宋之將亡故褰褐而過鬲其朝曰宋將有棘荊故褰褐而避之也居三年宋果亡史記曰五羖大夫鄙人也聞秦繆公之賢自粥秦客被褐食牛朞年舉之牛口之下加之百姓之上又曰趙惠文王得楚和氏璧秦昭王遺趙王書願以十城易壁趙遣藺相如奉璧秦王無償城色相如使從者衣褐懷壁便道亡歸又曰婁敬齊人戍隴西過洛陽衣羊裘因齊人虞將軍求見上虞將軍欲為易其衣不肯曰臣衣帛衣帛見衣褐衣褐見遂見上說上西都長安漢書曰貢禹上書云年老貧窮家貲不滿萬錢妻子糠豆不贍短褐不完范曄後漢書曰張玄處徵有才略以世亂不仕司空張溫數以禮辟不能致後溫以車騎將軍出征涼州將行玄自廬被褐帶索要說溫不能用晉書曰皇甫謐字士安上䟽曰咎繇振褐不仁者遠矣陶潛五柳先生傳曰短褐穿結簞瓢屢空晏如也孝子曰聖人被褐而懷玉墨子曰人不可衣短褐衣服不美身體從容不足觀也新序曰齊有婦人極醜無雙號無鹽女行年四十無所容入衒嫁不售乃拂短褐自詣宣王曰願當君王盛顏符子曰有澤父者冠葭蘆之笠納蔍之屨莎裳褐衣裴淵記曰蠻夷取穀樹皮熟搥之以為褐趙壹疾邪賦曰勢家多所宜欬唾自成珠被褐懷金玉蘭蕙化為芻古詩曰短褐中無絮帶斷續以繩衫釋名曰衫芟也衫乘無袖端也襦襠者當胸一當背也揚雄方言曰陳魏宋楚之間謂之䄡或謂之單襦沈約宋書曰徐湛之母會稽公主高祖微時有納布衫襖等衣皆是武敬皇后手自作高祖既貴以此衣付公主曰後代若驕奢不節者可以此示之又曰到溉為建安太守任昉以詩贈之求二衫云鐵錢兩當一百代易名實為惠當及時無待涼秋日溉荅云余衣本百結閩中徒八蠶假令金如粟詎使廉夫貪宋書曰薛安都與魏戰魏多縱突騎眾軍患之安都怒甚乃脫兜鍪解所帶鎧唯著絳衲兩襠衫馬亦去具裝馳入賊陣猛氣咆𠷺所向無當其鋒者又曰渴盤陁國土人翦髮著氈帽小袖衣為衫則開頸縫前齊書曰陽休之除散騎常侍監修起居注頃之坐事左遷驍騎將軍衣兩襠文宣郊天百僚咸從休之為驍騎將軍衣兩襠用手持白棓時魏收為中書令嘲之曰義真服采休之曰我昔為常伯首戴蟬冕今處驍游身被衫甲允文允武何必減卿談笑晏然議曰服其夷曠唐書曰德宗在梁州地熱未給將士春衣上亦御夾服以視朝左右請御衫上曰從我者冬服未易我豈可獨衣衫乎將士聞之莫不流涕魏文帝別傳曰吳選曹令史長沙劉卓字德然病荒夢見一人以白越單衫與之言曰汝著衫汗火燒便潔也卓覺果有汗衫在側汗輒火浣之晉惠帝起居注曰愍懷以體上白絹單衣一領寄與妃宋起居注曰太始二年御史丞羊希奏山陰令謝沉親憂未除常著青絳衲兩襠請免沈前所居官也晉東宮舊事曰太子納妃有白縠白紗白絹衫並紫玉緌祖台之志怪曰建康小吏曹著為廬山使君所迎配以女婉著形意不安屢求諫退婉潸然流涕賦詩序別并贈織禈衫也劉敬叔異苑曰母丘儉征浟浿使王傾窮其東界父老云曾有破舡從漢海流得布衫身如中國人但兩袖俱長三丈䄡䄖方言曰䄡䄖江淮之間謂之𧝎容常容反自關而西謂之䄡䄖以布而無緣謂之藍縷漢書曰元始五年有一男子乘黃犢車建黃旐衣黃䄡䄖著黃慴詣北闕自謂衛太子又曰何並為長陵令侍中王林卿通輕俠傾京師至寺拔刀剌其建鼓並追之卿迫窘乃令奴冠被其䄡䄖自代乘變服馳去東觀漢記曰耿純率宗族賓客二千人皆縑䄡䄖絺巾迎上又曰更始在長安自恣三輔苦之又所官爵多群小或繡面衣錦袴䄡䄖罵詈道路又曰王阜為益州太守大將軍竇憲貴盛以絳罽䄡䄖與阜阜不受又曰段潁滅羗詔賜潁錢十萬絳䄡䄖一領又曰延岑上光武皮䄡䄖宿下邑亭亭長白言睢陽賊衣絳罽擔今宿客疑是乃發卒來岑臥不動吏謝去邊讓別傳曰讓字文禮孔融薦讓於武帝曰邊讓為九州衣被則不足為單衣䄡䄖則有餘恒譚新論曰余自長安歸道病蒙絮被罽䄡䄖宿下邑亭
