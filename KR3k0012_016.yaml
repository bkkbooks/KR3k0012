body:
  text: 天部十五氣釋名曰氣猶餼也餼然有聲而無形也易曰天地氤氳萬物化醇又曰潛龍勿用陽氣潛藏又曰精氣為物遊魂為變精氣煙熅聚而成物聚極則散而遊魂為變又曰天地定位山澤通氣禮曰仲春行秋令則其國大水寒氣惣總至又曰三月之節是月也生氣方盛陽氣發泄勾者畢出萌者盡達又曰三月之節是月也命國儺九門磔攘以畢春氣又曰季春行冬令則寒氣時發草木皆肅又曰孟秋行冬令則陰氣大勝行春令則其國乃旱陽氣復還又曰八月之節是月也天子乃儺以達秋氣又曰九月之節霜始降則百工休乃命有司曰寒氣惣至人力不堪又曰季秋行春令則暖風來至人氣懈惰又曰小雪之日後五日天氣上升地氣下降又曰孟冬行春令則凍閉不密地氣上泄又曰地氣且泄是謂發天地之房諸蟄則死又曰十二月中氣命有司大儺旁磔以送陰氣又曰社祭土而主陰氣也又鄉飲酒曰天地嚴凝之氣始於西南而盛於西北此天地溫厚之盛氣也此天地之仁氣也周禮曰視祲掌十輝之法以觀妖祥辨吉凶妖祥善惡之徵鄭司農云輝謂日光之氣又曰視祲之官春分望氣傳曰節宣其氣尚書中候曰堯沉璧於河休氣四塞春秋繁露曰氣之清者為精人之清者為賢治身以賢積精為道春秋元命苞曰陰陽聚為雲氣史記曰海旁蜃氣象樓臺廣野氣成宮闕又項羽本紀曰范增說項羽曰沛公志不在小吾令人望其氣皆為龍虎成五彩此天子氣也宜急擊勿失又秦紀曰始皇東遊望氣者云五百年後金陵有天子氣於是始皇東遊以猒之改金陵為秣陵塹之以絶其氣漢書曰武帝巡狩過河間見紫青氣自地屬天望氣者云下有奇女求之得拳夫人後生昭帝又曰宣帝幼時號曰曾孫生數月遭巫蠱事雖在襁褓猶繫郡邸獄邴吉為廷尉監治巫蠱憐曾孫無辜至後二年武帝疾望氣者云長安獄中有天子氣上遣使分條中都官詔獄繫者亡輕重皆殺之內者令郭穰夜至郡邸獄吉閉門拒使者不得入曾孫賴吉得全應劭漢官儀曰世祖封禪夕有青氣上與天屬遙望不見山巔又曰高祖在沛隱芒碭山每遊上輒不欲令呂后知常在深僻處后亦常知其處高祖問曰何以知之后曰君所居處上有紫氣又曰孝靈熹平年八月辛未白氣如匹練衝北斗第四星為大獸狀明年楊州刺史臧旻攻盜賊斬首數千級東觀漢記曰和帝永和十二年癸酋夜白氣長三丈起國東北指揮市十日是月西域蒙奇踈勒二國歸義謝承後漢書曰郎顗上書曰去年閏月白氣從天苑入玉井西將有叛戾之患金精之變太尉所掌宜責以災異漢書五行志曰永興二年光祿勳舍壁下有青氣視之得玉鉤玦漢光武封禪儀曰元年封禪晝有白氣夜有赤光又曰建武三十二年二月十九日之山虞此日山上雲氣成宮闕百官皆見之二十一日夕牲時有白氣廣一丈東南極望二十二日禮畢正直壇所有氣與天屬遙望不復見山楚漢春秋曰亞父謀曰吾望沛公其氣衝天五色相摎或似龍或似蛇或似虎或似雲或似人此非人臣之氣也王隱晉書曰武帝咸寧元年洛陽太祖廟中有青氣占者云以為東莞音官王后當有天子後改封琅邪江東之應也又曰魯勝字叔時以歲日望氣乃長歎知將來多故便稱疾去官中書令張華敬之欲用之遣二子諭意遂不動又曰張華察牛斗間有紫氣乃豐城之劍氣也吳志曰朝宮井上旦有五色氣孫堅令浚之得漢傳國璽又曰孫堅葬富春城東冢有光上屬天下蔓數里皆曰非凡氣也孫氏其興乎蜀志曰劉毅向攀等上言建安二十二年數有氣必有天子出其方南中八郡志曰永昌郡有禁水水有惡毒氣中去聲物則有聲中樹木則折名曰鬼彈中人則奄然青爛宋永初山川記曰寧州瘴氣𦱌露四時不絶西升記曰老子西出關關令尹喜占氣知神仙過荊州記曰夷道縣有望州山山下有泉欲雨泉中有赤氣騰上于天莊子曰若夫乘天地之正而御六氣之辨以遊無窮者彼惡乎待哉郭象曰御六氣之辨即是遊變化之塗也又曰人之生氣聚則為生散則為死列子曰太初者氣之始也又曰天積氣之成者也孫卿子曰水火有氣而無生草木有生而無知抱朴子曰軍上氣黑如樓將軍移軍必敗其將勇則氣如火火勢如張弩雲如日月赤氣繞之所見之地大勝不可攻也又曰或問登陟之道曰或用棗心為飛車存念則五蛇六龍而乘之上升三十里名為太清其氣甚剛勝人也師言鳶飛漸高直舒兩翅而自進漸乘剛氣也淮南子曰土地各以類生人是故山氣多男澤氣多女水氣多瘖於金風氣多聾林氣多癃木氣多傴高誘曰自此上至山氣多男皆生子乃有此疾也下氣多腫岸下下濕腫足日腫石氣多力象石也險阻氣多癭暑氣多夭音夭寒氣多壽谷氣多痺丘氣多狂廣氣多仁下而平者為廣陵氣多貪象陵積聚也輕土多利利疾也重土多遲清水音小濁水音大湍水人重湍急流悍水也中土多聖人皆應其類也又曰太清之始世天覆以德地載以樂四時不失其序風雨不降其虐日月淑清而楊光五星循軌而不失其行此時玄元氣至休氣者也呂氏春秋曰天圓為精氣圓通周復無雜故曰圓魏子曰北夷之氣象群羊南夷之氣類船山海之氣象樓臺宮闕都邑之氣象林木家語曰食氣者神明而壽洛書曰有氣象人青衣無手在日西天子之氣也遁甲開山圖曰巨靈者偏得元氣之道故以元氣一時生混沌又曰自老子生周青氣凌遲俗儒道士無所通驗河圖曰崑崙山有水水氣上蒸為霞地鏡圖曰望百姓家黃氣者糵梔子樹也山有白氣而鬱鬱中有神龍三輔舊事曰漢作靈臺以四孟月登而觀黃氣為疾病赤兵黑水荊州圖曰宜都郡望州山袁山松宜都記曰武鍾山山根有涌泉成溪溪注丹水天陰欲雨輒有赤氣故名丹溪論衡曰陳留虞延字君人夜生母見其上氣如一匹絹徑上天以問人人曰吉氣與天通后仕至司徒楚辭曰餐六氣而飲沆瀣兮漱正陽而含朝霞王逸曰餐吞日精食元符也陵陽子明經曰春食朝霞朝霞者日始出赤氣也秋食淪漢淪漢者日沒後赤黃氣也冬食沆瀣沆瀣者北方夜半氣也夏食正陽正陽者南方日中氣也又天問曰伯強安處惠氣安在注曰伯強是大疫鬼也所至恣惡氣傷和氣霧釋名曰霧冒也氣蒙冒覆地物也昏暗之時則為妖災明王聖主則為祥瑞禮記月令曰仲冬行夏令則其國乃旱氛霧冥冥爾雅曰地氣發天不應曰霧尚書中候曰桀無道地吐黃霧春秋元命包曰霧陰陽之氣也陰陽怒而為風亂而為霧漢書曰爰盎諫文帝勿遷淮南王恐其逢霧露病死又曰王氏五侯同日俱封其日黃霧四塞又曰漢高祖至平城胸奴圍上七日天大霧漢使人還往胡不覺後得免平城之難又曰孝成帝建始元年夏四月黃霧四塞上問楊興等對曰陰盛侵陽之氣也東觀漢記曰馬援謂官屬曰吾在浪泊西里間下潦上霧毒氣薰蒸仰視烏鳶跕跕都葉吐葉二音墮水中謝承後漢書曰河南張楷字公超性好道術能作五里霧於華陰時關西人裴優亦能作三里霧魏略曰劉雄鳴每出雲霧中識道不迷惑時人因謂為雲霧王隱晉書曰樂廣為尚書令衛瓘見而奇之令諸子造焉曰此人之水鏡也每見瑩然若開霧覩青天又曰大寧元年黃霧四塞王敦之應也宋元嘉起居注曰盱眙民王彭先丁母艱居喪至孝元嘉之始父又喪亡彭兄弟二人土功未就鄉人助彭作磚磚事須水濟值天旱穿井盡力不得水彭號窮無計一旦天霧霧消之後於磚竈前自然水生沈約宋書曰後漢正月朝天子臨德陽殿受朝賀舍利從南方來戲於殿前激水化成比目跳躍嗽水作霧翳日燕書烈祖後記曰無璽六年蔣幹遣侍中繆高太子詹事劉猗齎傳國璽詣晉求救猗負引行數百里黃霧四塞迷荒不得進乃還易取行璽始得去帝王世紀曰凡重霧三日必大雨雨未降霧不可冒行又曰帝沃丁八年伊尹卒年百有餘歲天霧三日沃丁葬以天子之禮祀以太牢親自臨喪三年以報大德焉又曰黃帝時天大霧三日帝遊洛水之上見大魚殺五牲以醮之天乃甚雨七日七夜魚流始得圖書今河圖也世傳大霧三日必有甚雨自此始也漢武內傳曰東方朔乘雲飛去仰望天霧覆之不知所在劉向列女傳曰陶答子妻者陶大夫答子之妻也答子仕陶三年名譽不興家富三倍其妻數諫曰夫子能薄而官大是謂嬰害無功而家昌是謂積殃昔楚令尹子文之仕家貧而國富福結於子孫名垂於后代今夫子貪富務大不顧後害妾聞南山有玄豹霧雨七日不下食者何也欲以澤其衣毛而成其文章故藏以遠害今君與此背不無後患乎葛洪神仙傳曰欒巴為尚書郎一旦天大霧對坐不相見失巴所在後問其故乃是巴還成都與親故別也又曰淮南王聞有道術之士必卑辭厚幣以致之於是八公乃往一人能坐致風雨立起雲霧王試之無不效李先生傳曰先生名廣字祖和本南陽人劉備遣軍欲取先生先生起霧半天備騎自相殺先生因此乃入吳宜都山川記曰郡西北三十里有丹山天晴山嶺忽有霧起回轉如煙不過再朝雨必降王烈之安成記曰縣人有謝廩者行田歸路中忽遇雲霧霧中有一人乘龜而行廩知神人拜請求隨去父曰汝無仙骨不得去也湘州記曰曲江縣有銀山山常多素霧嵩高山記曰有獵師在山見浮圖奇妙異常有金像比來尋求白霧忽起不知寺處東方朔十洲記曰漢武帝天漢中西胡國獻猛獸使者曰猛獸之出生崑崙或生玄圃食氣飲霧解人語當其神也立起風雲吐嗽霧露百邪迸走因名猛獸王粲英雄記曰曹公赤壁敗行至雲夢大澤中遇大霧迷失道路王子年拾遣記曰平沙千里色如金細如粉風吹起如霧亦曰金霧西京雜記曰太平之代霧不塞望浸淫被薄而已又曰東海人黃公立興雲霧坐成山河假龜龍涼州記曰呂光幸天淵池時天清朗忽然起霧有五色雲在光上陳留風俗記曰雍丘縣有祠名夏后公祠有神井龍能致霧雹博物志曰王爾張衡馬均者昔俱冒霧行一人無恙一人病一人死無恙者飲酒病者食死者空腹莊子曰騰水上溢故為霧抱朴子曰白霧四面圍城不出百日大兵至城下又曰與善人遊如行霧中雖不濡濕潛自有潤又曰通天犀角有白理如線自本徹末者以此角大霧重雲之夜置中庭終不沾濡蘇子曰蜀郡鄧公呼吸成霧韓子曰飛龍乘雲騰蛇游霧雲罷霧散與蚓與蚓字同蟻同矣淮南子曰甚霧之朝可以細書不可以望尋常之外又曰騰蛇遊霧困於蝍蛆又曰昔者馮夷大丙之御也皆古得道能御陰陽遊微霧經霜雪而無跡照日光而無影魏子曰雲霧之盛須臾而訖暴雨之盛不過終日是以人君喜怒不見於容魚龍河圖曰山冬天霧十日以上不除者山崩之後出水脈也京房易占曰大霧君迷惑雲霧四起則時多隱士伏侯古今注曰漢元帝竟寧元年大霧樹皆白潛潭巴曰大霧三十日群猾起上下相蒙上少下多故群猾起志林曰黃帝與蚩尤戰於涿鹿之野蚩尤作大霧彌三日軍人皆惑黃帝乃令風后法斗機作指南車以別四方遂擒蚩尤望氣經曰十月癸已霧赤為兵青為殃又曰六月三日有霧則歲大熟地鏡圖曰玉之千歲者行遊諸國其所居國必三日變為日中之霧漢武帝故事曰武帝葬茂陵芳香之氣異常積於憤埏之間如大霧黃帝玄女戰法曰黃帝與蚩尤九戰九不勝黃帝歸於太山三日三夜霧冥有一婦人人首鳥形黃帝稽首再拜伏不敢起婦人曰吾玄女也子欲何問黃帝曰小子欲萬戰萬勝遂得戰法焉徐幹中論曰文王遇姜公於渭陽執竿而釣文王得之灼若披雲而見白日霍若開霧而覩青山溫嶠與陶侃箋曰霧氣過差則君道幽晦霾釋名曰霾晦也如物塵晦之色也詩曰終風且霾惠然肯來爾雅曰風而雨土為霾崔豹古今注曰漢昭帝元鳳三年天雨黃土晝夜昏霾曀說文曰曀天陰沉也詩曰終風且曀惠然肯顧又曰曀曀其陰爾雅曰陰而風為曀
