body:
  text: 職官部四揔敘三師六典曰三師訓導之官也蓋天子所師法大抵無所統職然非道德崇重則不居其位無其人則闕之尚書云成王黜殷滅淮夷歸酆作周官立太師太傅太保茲惟三公論道經邦燮理陰陽孔安國曰師天子所師法傅傅相天子保保安天子於德義禮記云設四輔及三公不必備唯其人語使能也六典云漢承秦制不置三公漢末以大司馬大司徒大司空為三公師傅之官位在三公上後漢因之師傅尊號曰上公置府僚魏晉江左皆然後魏太師太傅太保尊號曰三師後周又為三公隋氏又為三師太師毛詩曰尹氏太師維周之氐秉國之均四方是維天子是毗俾民不迷箋云毗輔也言尹氏居太師之官持國政之平維制四方又曰維師尚父時惟鷹揚諒彼武王肆伐大啇大載禮曰天子不論於先聖王之德不知君國畜民之道不見禮義之正不察應事之理不博古之典傳不間威儀之數禮樂無經學業不法凡是其屬太師之任也逸禮曰太公為太師周公為太傅召公為太保史記曰周文王得呂尚於磻溪以為師謂之太公武王嗣位號曰師尚父成王即政尊為太師漢書音義曰師訓也應劭漢官儀曰孝平皇帝元始元年太后詔曰太師光今年老有疾俊乂大臣惟國之重書曰無遺老成國之將興尊師重傅其令太師無朝十日一賜餐賜以靈壽杖黃門令為太師於省中施坐置几太師入省用杖焉續漢書曰趙典篤學博聞宜備國師即太師也獻帝春秋曰董卓自號太師御史中丞以下皆拜皇甫嵩與卓爭權後嵩為中丞見卓拜卓曰可以服未嵩曰安知明公乃至於是卓曰鴻鵠固有遠志但燕雀不知耳嵩曰昔與明公俱為鴻鵠但公今日變為鳳皇卓笑曰卿早服何得不拜晉書載記曰蜀李壽以安車束帛聘龔牡為太師牡固辭特聽縞巾素帶居師友之位宋書曰太師太傅太保為三公訓護人主導以德義天子加拜待以不臣之禮非人則闕矣漢制保傅在三公上號曰上公自後常然隋書曰高祖受禪李穆來朝高祖降座禮之拜太師贊拜不名真食成安縣三千戶於是穆子孫雖在襁褓拜儀同其一門執象笏者百餘人穆之貴盛當時無比唐書曰太宗降手詔曰朕觀前代明王聖主曷常無師傅哉况朕鍾百王之末智不周物其無師傅何以匡朕之不逮詩不云乎不愆不忘率由舊章宜依古道置三師位也通典曰太師古官殷紂時箕子周武王時太公成王時周公並為太師周公薨畢公代之秦及漢初並無至平帝元始元年初置以孔光居焉金印紫綬位在太傅上太傅大載禮曰傅傅之德義也天子無恩於父母不惠於庶人無禮於大臣不中於折獄不哀於喪不敬於祭不信於諸侯不議於戎事不厚於德不強於行不從太師之言凡是之屬太傅之任也漢書曰王莽權日盛孔光憂懼不知所出上書乞骸骨莽白太后帝幼小宜師傅領宿衛明年徙為太師莽為太傅光常稱疾不敢與莽并漢書音義曰傅覆也東觀漢記曰詔云行太尉事趙喜三葉在位為國元老其以喜為太傅又曰胡廣為太傅總録尚書事時年八十而心力克壯繼母在堂朝夕贍省傍無几杖言不稱老達練事體明解朝章雖無謇直之風屢有補闕之益又曰卓茂字子康世祖即位求茂謁見年七十餘拜太傅封宣德侯賜几杖又曰鄧禹字仲華以元功拜太傅進見東向甚見尊寵後漢書曰張禹遷為太傅鄧太后以殤帝初育育生也欲令重臣居禁內乃詔禹舍宮中給帷帳床褥太官朝夕進食五日一歸府每朝見特贊與三公絶席續漢書曰太傅掌以善道無常職每帝即位輒置一人録尚書事薨輒省之華嶠後漢書曰鄧彪字智伯為太傅賜爵關內侯百官揔巳以聽於彪恩寵之異莫與為比焉應劭漢官曰太傅古官也周成王時康叔為之高后元年初用王陵金印紫綬又曰和帝册故太尉鄧彪曰元功之族三讓彌高今以彪為太傅魏志曰鍾繇遷太傅繇有膝疾拜起不便時華歆亦以高年疾病朝見皆使載輿車虎賁舁上殿就坐是後三公有疾遂以為故事晉書曰何曾為太傅乞遜位詔會朝劍履乘輿上殿如漢相國蕭何田千秋魏太傅鍾繇故事宋書曰晉宣帝為魏太傅誅曹爽後置左右長史掾屬舍人各十人事既非常加又領兵非準例也齊職儀曰太傅品秩冠服同太宰成王即位周公為太傅遷太師秦無其職漢惠帝崩呂后以丞相王陵為少帝太傅位在三公上後魏書淮陽王欣大統中為太傅文帝謂欣曰王三為太傅再為太師自古人臣未聞此例欣遜謝而巳北齊書曰高歸彥作亂冀州詔假韶與東安王婁睿率衆討乎之遷太傅賜女樂十人并歸彥果園一千畝後周書曰王盟為太傅盟姿度弘雅仁而泛愛雖位居師傅禮冠群后而謙恭自處未嘗以勢位驕人魏文帝甚尊重之賈誼新書曰昔周文王使太公望傅太子發嗜鮀大何反魚而公弗豫文王曰發嗜鮀魚何為弗豫太公曰禮鮀魚不登乎俎豆豈有非禮而可以養太子哉語林曰太傅府有三才裴邈清才潘陽仲大才劉慶孫長才曹植輔臣論曰蓋精微聽察理析毫分規矩可則阿保不傾群言系于口而研核是非典誥揔乎心而唯所用之者鍾太傅也王廙之保傅針曰保傅之賢明宗國用寧輔弼之不忠禍及于躬無曰父子無間昔有潘崇無曰至親無二或容江充太保周禮曰保氏掌諫王惡諫者以禮義正之也大載禮曰天子處位不端受業不敬言語不序聲音不中律進退升降不以禮俯仰周旋無節凡此之屬太保之任也尚書大傳曰成王在豐欲宅洛邑使召公先相宅六日乙未主朝步自周則至于豐惟太保先周公相宅太保召公先周公視洛邑也應劭漢官曰太保古官也保養也晉書曰王祥字休徵泰始元年拜太保三年御史中丞侯史光上言祥久以疾病闕廢朝會應免官詔曰太保耆艾元老高行清粹朕所毗倚以隆道弘治者也前後遜讓不從所執此非有司所得議也其寢光奏晉起居注曰太保衛瓘明允篤誠有匪躬之志其給千兵騎百人齊職儀殷太甲時伊尹為太保周成王時召公為太保崔鴻十六國春秋蜀李雄録曰雄異母兄始字伯敬為太保善撫士衆多歸之時人為之語曰欲養老屬太保呂氏春秋曰荊文王得如黃之狗宛路之矰以田於雲夢三月不反得丹陽之姬期年不聽朝保申曰先王卜以臣為保吉今王期年不聽朝王之罪當笞王伏臣將笞王王曰不穀免於襁褓而齒於諸侯矣願請變更而無笞保申曰臣承先王之令不敢廢也王不受笞是廢先王之令也臣寧抵罪於先王王曰敬諾引席王伏保申束細箭五十跪而加之于背如此者再謂曰王起王乃變更召保申殺如黃之狗折宛路之矰放丹陽之姬兼國三十九保申之力也太宰周禮天官上曰太宰之職掌建邦之六典佐王治邦國又曰太宰以九兩繫邦國之民兩耦合之言繫者以維持其情性使不離散也尚書伊訓曰百官總巳以聽冢宰伊尹乃明言烈祖之成德以訓于王湯有功烈之祖故稱焉王即太甲也又曰冢宰統百官均四海家語曰官屬不治分職不明法政不一百事失紀曰亂亂則飭冢宰飭謂整攝晉書曰武帝時何曾屢上書遜位詔以司徒所掌煩務不可以久勞耆艾其進位太宰朝會乘輿劍履上殿以漢蕭何魏鍾繇故事又曰何曾為太宰年老禮優每召見勑以常所飲食服物自隨令二子侍從又曰太宰羕與王導同受顧命輔成帝時帝幼沖詔羕依安平獻王孚故事設床帳於殿上帝親迎拜又曰安帝以太宰琅㖿王德文不宜嬰拂事務以紆論道之重可袞冕之服緑盩綬羽葆鼓吹盩音戾盩緑也以線為質又曰盩草名也出琅㖿平昌縣似艾可染綬因以為綬名也晉公卿禮秩曰安平王孚朗陵公何曾汝南王亮皆為太宰齊職儀曰太宰品第一金章紫綬佩山玄玉堯命羲和使主陰陽之職羲伯司天即天官也后稷伏事虞夏敬授民時尊稷為天官夏襄稷後不窋失官由是廢稷殷以其官為冢宰周公在酆為太宰邵公又居之秦漢魏無其職晉武以從祖安平王孚為太宰安平薨省咸寧四年又置或謂本太師之職避景皇諱改為太宰或謂太宰周之卿位晉武依周置職以尊安平非避諱也元興中恭帝為太宰桓玄都督中外博士徐豁議太宰非武官不應都督遂從豁議後周書曰文帝依周禮建六官遂置天官大冢宰卿一人掌邦理以建邦之六典佐皇帝理邦國通典曰太宰於殷為六太於周為六卿亦曰冢宰周武王時周公始居之掌建邦之理秦漢魏並不置晉初依周禮備三公三公之職太師居首景帝名師故置太宰以代之而以安平獻王孚居焉仲長統昌言曰冢宰堯官也尚書曰冢宰一曰掌邦治官府以紀萬民二曰教典以安邦國以教官府以擾萬民三曰禮典以統百官以和邦國以諧萬民四曰政典以平邦國以正百官以均萬民五曰刑典以詰邦國以任百官以生萬民魏溫子升為上黨王穆讓太宰表曰臣聞榮蹇長途終慚一日之致懸縷層臺難任千鈞之重固知才弱不可自強力微難以企及智小謀大恐貽折足之憂才輕任重懼有絶臏之悔既慮鑠金固陳匪石揔敘三公六典曰三公論道之官也蓋以佐天子理陰陽平邦國無所不統故不以一職名其官尚書曰惟茲三公論道經邦燮理陰陽周禮曰三槐三公位焉公羊曰三公者何天子之相春秋漢含孳曰三公在天為三台九卿為北斗三公象五嶽九卿法河海二十七大夫法山陵八十一元士法谷阜合為帝佐以匡綱紀史記曰公孫弘以春秋白衣為天子三公漢初因秦置丞相而弘為之則丞相為三公矣漢書曰六符孟康曰秦階三台也凡六星也六符星之符驗也晉書曰文帝為晉王何曾與高柔鄭沖俱為三公將入見曾獨致拜盡敬二人猶揖而巳晉官品令曰三公緑綟綬也綟音戾宋志曰三公黃閣前史無其義按禮記士韠與天子同公侯大夫則異鄭玄注云士賤與君同不嫌也夫朱門洞啓當陽之正色也三公之與天子禮秩相亞故黃其閣以示謙不敢斥天子宜是漢來制也韠音畢通典曰隋置太尉司徒司空以為三公參議國之大事依北齊置府寮無其人則闕祭祀則太尉亞獻司徒奉俎司空行掃除其位多曠行事則攝天文録曰三台星一名三能一名天柱三公之位也在人曰三公在天曰三台陶氏職官要録曰三台擬三公黃帝以風右配上台天老配中台五聖配下台韓子曰背私曰公三象鼎足數三法三光傅子曰三公者佐天子理陰陽環濟要略曰三公者象鼎三足共承其上也説苑曰三公正天下調陰陽節風雨古今通語曰異官同爵共位別職興仁隆化幽贊神明者謂之太尉和五教理人倫使風行俗平萬國咸寧者謂之司徒使國無枉理法錯刑清事均民聚者謂之司空若仁義之路開和平之氣通則五星順行庶績咸熙李固奏記曰湯問伊尹公卿大夫其相何如伊尹對曰三公智通大道應變不窮者也其言足以調陰陽正四時節風雨非大罪不遜位
