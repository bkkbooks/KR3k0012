body:
  text: 工藝部八畫下歷代名畫記曰夫畫者成教化助人倫窮神變測幽微與六籍同功四時並運發於天然非由述作古先聖王受命應籙則有龜字效靈龍圖呈寶自巢燧已來皆有此瑞跡映乎瑤鈴事傳乎金冊庖犧氏發於榮河中典籍圖畫萌矣黃軒氏得於溫洛中央皇蒼頡狀焉又曰夫畫比之書價則顧陸可同鍾離張僧繇可同逸少書則逡巡可成畫非歲月可就所以書多於畫自古而然今分為三古以定貴賤以漢魏三國為上古則趙歧劉褒蔡雍張衡已上四人後漢曹旄楊循桓範徐邈已上四人魏曹不興吳諸葛亮蜀之流是也以晉宋為中古則明帝荀勗衛協王廙顧愷之謝稚嵇康戴逵已上八人晉陸探微顧寶先袁倩顧景秀之流是也已上四人宋以齊梁北齊後魏陳後周為下古則姚曇謝赫劉瑱毛惠遠已上四人齊元帝袁昂張僧繇江僧寶已上四人梁楊子華田僧亮劉殺鬼曹仲達已上四人北齊蔣少遊楊乞德已上二人後魏顧野王陳馮提伽之流是也後周隋及唐為近代之價則董伯仁展子虔孫尚子鄭法士楊契丹陳善見已上六人隋張孝師范長壽尉遲乞僧王知慎閻立德之流是也已上六人唐又曰若言有書籍豈可無九經三史顧陸張吳為正經楊鄭董展為三史其餘畫跡為百家吳雖近可為正經又曰昔謝赫云畫有六法一曰氣韻生動二曰骨法用筆三曰應物象形四曰隨類賦綵五曰經營位置六曰傳摸移寫自古畫人罕能兼知試論曰古之畫者或有遺其形似而尚其骨氣以形似之外求其畫此難可與俗人道也今之畫縱得形似而氣韻不生以氣韻求其畫則形似自在其間矣上古之畫跡簡而意淡淡而雅正顧陸之流是也中古之畫細密而精緻以臻麗展鄭之流是也近代之畫煥爛而求備今人之畫錯亂而無旨衆工之跡是也夫象物必在於形似形似須全其骨氣骨氣形似皆本於意而歸乎用筆故工畫者多攻書然則古之嬪臂纖而骨束古之馬啄大而腹細古之臺閣竦峙古之服飾容曳故古畫非獨變態有奇意也抑亦物象殊也又曰遍觀衆畫唯顧生畫古賢得其妙理對之令人終日不倦凝神遐想妙悟自然物我兩忘離形去智身固可使如槁木心固可使如死灰不亦臻於妙理乎所謂畫之道也又曰漢張衡字平子昔建州浦城縣山有獸名駭豕神人首狀貌惡百鬼惡之好出水邊石上平子往寫之獸入潭中不出或云此獸畏畫故不出可去紙筆即去之獸果出平子拱手不動潛以足指畫獸今號巴獸潭又曰昔張芝學崔瑗杜度草書之法因而變之以成今草字之體勢一筆而成氣脈通連隔行不斷唯王子敬明其深旨故後首之字往往繼其前行世上謂之一筆書其後陸探微亦作一筆畫綿連不斷故知書畫用筆同法陸探微精利潤媚新奇絶妙名高宋代時無等倫又曰魏曹植言觀畫者見三皇五帝莫不仰戴見三季暴主莫不悲惋見篡臣賊嗣莫不切齒見高節妙士莫不忘食見忠節死難莫不抗首見放臣斥子莫不歎息見淫夫妬婦莫不側目見令妃順后莫不嘉貴是知存乎鑒者畫也又曰蜀諸葛亮字孔明華陽國志云南夷其俗徵巫鬼好盟詛要之諸葛亮乃為夷作圖先畫天地日月君長城府次畫神龍及牛馬駝羊後畫部主吏乘馬幡蓋遠行安恤又畫夷牽牛負酒齎金寶詣之以賜夷甚重之又曰曹不興吳興人也孫權使畫屏風誤落筆點素因就成蠅狀權疑其真以手彈之時稱吳八絶張㪍吳録云八絶者孤城鄭嫗善相劉惇善星象吳範善候風氣趙達善算嚴武善碁宋壽善上夢皇象善書曹不興善畫赤烏中不興之清溪見赤龍出水上寫獻孫皓皓送祕府至宋朝陸探微見畫歎其妙因至清溪復見其龍宋時纍月亢旱祈禱無應乃取不興龍置水上應時蓄水成霧纍月雱霈謝赫云不興之跡代不復見祕閣內一龍頭而已觀其風骨擅名不虛在第一品矣又曰晉顧愷之字長康嘗於瓦官寺北殿畫維摩詰畫訖光耀月餘日京師寺記云興寧中瓦官寺初置僧衆設會請朝賢鳴剎注錢其時士大夫莫有過十萬者既至長康長康直打剎注百萬長康素貧衆以為大言後寺衆請勾疏長康曰宜備一壁遂閉戶往來一月餘日所畫維摩詰一軀工畢將欲點眸子乃謂寺僧曰第一日見請施十萬第二日可五萬第三日可任例責施及開戶光照一寺施者填咽俄而得百萬錢愷之嘗言畫人物最難次山水次狗馬臺閣一定器耳差為易也斯言得之至於鬼神人物有生動之可狀須神韻而後全若氣韻不周空陳形像筆力未到空善賦彩謂非妙也又曰宋朝顧駿之常結構高樓以為畫所每登樓去梯家人罕見若時景融朗然乃含毫天地陰慘則不操筆今之畫人筆墨混於塵埃丹青和其泥滓徒污綃素豈曰繪畫自古善畫者匪衣冠貴胄逸士高人振妙一時傳芳千祀非閭閻鄙賤所能為也又曰南齊宗測宇敬微炳之孫也善畫傳其祖業志欲遊名山乃寫祖炳所畫尚子平圖於壁隱廬山居炳舊宅畫阮籍遇孫登於行障上坐臥對之又畫永業寺佛景臺皆稱妙絶又曰南齊謝赫姚最云點刷精研意存切似寫貌人物不俟對看所須一覽便歸操筆目想毫髮皆無遺失麗服靚粧隨時變改直眉曲鬢與世爭新別體細微多從赫始遂使委巷逐末皆類效嚬至於氣韻精靈未躬生動之致筆路纖弱不副雅致之懷然中興已後畫人馬貴在沈摽下毛惠遠上又曰南齊劉瑱字士溫彭城人少聰惠多才藝攻書畫嬪墻當代第一謝云用意綿密畫體簡細筆力困弱制置單省婦人最佳但纖削過差翻為失真然玩之詳熟甚有姿態又曰南齊毛惠遠滎陽陽武人也善畫馬時劉瑱善畫婦人並當代第一市青碧一千二百斤供御戈畫用錢六十五萬有言惠遠納利者勑尚書評價貴二十八萬後家徒壁立甚悔痛之惠遠弟惠秀永明仲待詔祕閣世祖將北伐命惠秀畫漢武北征圖中書郎王融監掌其圖成帝極重之置琅琊臺上每披覽焉又曰北齊楊子華世祖時任直閣將軍嘗畫馬於壁夜聽啼齧長鳴如索水草圖龍於素舒卷輒雲氣縈集也世祖重之使居禁中夫子號為畫聖非有詔不得與人畫時有王子善碁通神號為二絶又曰北齊劉殺鬼與楊子華同時世祖俱重之畫鬭雀於壁間帝見之為生拂之方覺嘗在禁中錫賴巨萬任梁州刺史又曰梁元帝名繹字世誠善畫曾畫聖僧武帝親為贊之任荊州刺史日畫蕃客入朝圖帝極稱善又畫職貢圖并序蓋外國來獻之事長子方智字實相尤能寫真坐上賓客隨容點染即成數人問童兒皆識之又曰梁蕭賁字文奐蘭陵人也多詞學工書畫曾於扇上畫山水咫尺之內見萬里可知姚最云雅性精密後來難比含毫命素動必依真學不為人自娛而已人間罕見其跡又曰陶弘景字通明丹陽秣陵人幼有異操年十歲讀書葛洪神仙傳便有隱逸之志居茅山號華陽隱居好著述明衆藝武帝嘗欲徵用隱居畫二牛一以金籠頭牽之一則迤邐就水草武帝知其意不以官爵逼之又曰梁張僧繇吳人也天監中為武陵王國侍郎直祕書閣知畫事武帝崇飾佛寺多僧繇畫之時諸王在外武帝思之遣僧繇乘傳寫貌對之如面江陵天皇寺明帝置也內有柏堂僧繇畫盧舍那佛及仲尼十哲帝怪問釋門內如何畫孔聖僧繇曰後當賴此耳及後代滅佛法焚天下寺塔獨以殿有宣尼像乃不令毀拆又金陵安樂寺畫四龍不點眼睛即恐飛去人以為妄誕固請點之遂點二龍須臾雷電破壁兩龍乘雲騰而上天二龍未點眼睛者見在又畫天竺二胡僧侯景亂散坼為二後一僧為唐右常侍陸堅所寶堅疾篤夢一胡僧告云我有同友離拆多時今在洛陽李家若求合得之當以法力助君陸以錢帛果於其處購得之其疾乃愈劉長卿為記述其事張畫所有靈感不可具記又曰北齊高孝珩世宗第二子也封廣寧郡王尚書令大司徒博涉多才藝曾於廳壁上畫蒼膺觀者疑其真鳩雀不敢近又畫朝士圖當時妙絶又曰隋楊契丹官至上儀同僧悰云六法備詠甚有骨氣山東體制允屬伊人在閻立本下契丹之跡非不雄富此董展則乏精微李云田楊聲侔董展昔田楊與鄭法士同於京師光明寺畫小塔鄭圖東壁北壁田圖西壁南壁楊畫外邊四面是稱三絶楊以簟蔽畫處鄭竊觀之謂楊曰卿畫終不可學何勞鄣蔽揚託以婚姻有對門之好又求楊畫本楊引鄭至朝堂指宮闕衣冠車馬曰此是吾畫本也由是鄭深歎伏又唐張孝師為驃騎尉尢善畫地獄氣候幽默孝師曾死復蘇具見冥中事故備得之吳道玄見其畫因效之為地獄變又曰唐王陀子善山水幽致峰巒極佳也上言山水者稱陀子頭道子腳又曰唐王道子陽翟人也好酒使氣每欲揮毫必須酣飲學書於張長史旭賀監知章學書不成因攻畫曾事逍遙公韋嗣立為小吏因寫蜀道山水之體自為一家其書跡似薛少保亦甚便利初任兗州瑕丘縣尉玄宗召入禁中改名道玄因授內教博士非有詔不得畫張懷瓘每云吳生之畫下筆有神是張僧繇後身也可謂知言矣官至寧王友開元中將軍裴旻善舞劍道玄觀旻舞畢揮毫益進時又有公孫大娘亦善舞西河劍氣渾脫張旭見之因為之草書杜甫歌行述其事是知書畫之藝皆須意氣而成亦非懦夫所能作也又曰唐盧稜伽吳生弟子也畫跡似吳生但才力有限頗能細畫咫尺間山水廖廓物像精備經變佛像是其所長吳生嘗於京師畫揔總持寺三門大獲泉貨稜伽乃竊畫莊嚴寺三門鋭思開張頗臻其妙一日吳生忽見之驚歎曰此子筆力當時不及我今乃類我精爽盡矣居一月稜伽果卒又曰唐馮紹政尤善畫膺鶻雞雉盡其形態觜眼腳爪毛彩俱妙曾於禁中畫五龍亦稱其善有降雲蓄雨之感又曰唐李思訓宗室也即林甫之伯父早以藝稱於當代一家五人並善丹青高宗甚重之書畫稱一時之妙其畫山水樹石筆格遒徑湍瀨潺湲雲霞縹眇時覩神仙之事窅然巖嶺之幽時人謂之大李將軍也又曰唐韓幹尤工鞍馬忽有人詣門稱鬼使請馬一匹韓君畫馬焚之他日鬼使乘馬來謝其感神若此弟子孔榮為之上足又曰唐張璪字文通尤工樹石山水初畢宏擅名當代一見驚歎異之璪唯用禿筆成以手摸絹素因問璪所授璪曰外即造化中得心源畢宏於是閣筆又曰唐李漸善畫蕃馬騎射射鵰放牧川源之妙筆跡氣調今古無儔李仲和能繼其藝而筆力不及又曰天后朝張易之奏召天下畫工修內庫圖畫因使工人各推所長鋭意摸寫仍舊裝皆一毫不差其真者多歸易之又曰唐朝吳道玄古今獨步前不見顧陸後無來者授筆法於張旭此又知書畫用筆同矣張既號書顛吳宜為畫聖神假天造英靈不窮唐畫斷曰唐吳道玄窮丹青之妙太約宗師張僧繇玄宗天寶中忽思蜀中嘉陵江水遂假吳生驛遞令往貌之及回帝問其狀奏云臣無粉本並記在心遣於大同殿圖嘉陵江三百里山水一日而畢時有李將軍山水擅名亦畫大同殿數月方畢玄宗云李思順數月之功吳道玄一日之跡皆極其妙又畫殿內五龍鱗甲飛動每欲大雨即生煙霧吳生常持金剛經自識本身當天寶中有楊庭光與之齊名潛畫吳生真於講席衆人之中吳生觀之亦見便驚語庭光云老夫衰醜何用圖之又曰唐周昉字景玄郭子儀子壻趙縱常令韓幹寫具衆皆稱善後又請昉寫真二人皆有能名公常列二畫於座未能定其優劣因趙夫人歸省公公子儀也問云此畫何人對曰趙郎曰何者似云兩畫揔似後畫者嘉又問何以言之曰前畫空得趙狀貌後兼移其神氣情性笑言之姿公問後畫者何人乃云周昉是日定其二畫優劣令送錦綵數百匹又曰唐閻立本太宗時南山有猛獸害人太宗使驍勇者捕之不得虢王元鳳忠義奮發自往取之一箭而斃太宗壯之使立本圖其鞍馬僕從皆寫其真無不驚伏其能太宗幸玄都池池斗鸂䳵召立本貌十八學士凌煙閣功臣等實亦輝映前古又曰唐韋無忝京兆人也玄宗朝以畫名馬異獸擅名時稱韋四足無不妙也曾見貌外國所獻師子酷似其真後師子放歸本國唯畫者在圖時因觀覽百獸見之皆懼又玄宗射獵一箭中兩野豬詔於玄武北門寫貌傳在人間乃妙之極也又曰唐楊光畫松石山水出於人表初稱處士謁盧黃門懷慎也館之甚厚知其丹青之能意欲求之而未敢言楊懇辭去復苦留之知其家在洛中衣食乏少心所不安乃令人潛將數百千至洛中供擬取其家書示楊公感之未知所報盧因從容乃言欲求一蹤以子孫寶之意尚難之遂月餘圖一松石雲物移動造化人莫能覩也又曰唐陳閎會稽人也以能寫真本道薦之開元中召入供奉每令寫真御容妙絶當時玄宗射豬鹿兔鴈等并按舞圖真容皆受詔寫貌又太清宮肅宗真容匪唯龍鳳姿日角天字之狀而筆力遒潤神彩英逸實天假其能也閻令之後一人而已又曰唐張萱京兆人也當畫貴公子鞍馬屏幄宮苑子女等名冠於時善起草點蔟置亭臺竹樹花鳥僕隸皆極精研又曰唐王墨不知何許人也名冷善潑墨時人為之王墨多游江湖善畫山水松柏雜樹等性踈野好酒每圖障興酣之後以墨潑之腳蹙手抹或拂或幹隨其形象為山為竹為樹應心隨意倏若造化圖成雲霞淡淡風雨蕭蕭不見污之路也又曰唐李靈雀落魄不拘檢每圖一障非其所欲不可強也以酒生思傲然自得王公之尊寒暑之若山水竹樹一點一抹成於自然或即峰際雲孤或即島嶼極海非常制也又曰唐張志和字子同號煙波子常釣魚洞庭初顏魯公在吳興知其高節以漁歌五首贈之乃圖傳為卷軸隨句賦象人魚鳥獸風雨雲月皆依字成形雅叶其妙
