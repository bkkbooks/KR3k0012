body:
  text: 人事部六十五讓下東觀漢記曰承宮遭王莽篡天下擾攘盜賊並起宮遂避世漢中建武四年將妻子之華陰山谷耕種禾黍臨熟人就認之宮悉推與而去由是顯名又曰光武封朱祐為鬲侯祐自陳功薄而國大願受南陽五百戶足矣上不許又曰竇融光武時數辭讓位不許因上䟽曰臣融年五十三有一子年十五質性頑鈍臣融朝夕教導以經藝不得令觀天文見讖記誠欲令恭肅畏事恂恂循道不願其有才能何況乃當傳以連城廣土享諸侯國哉又曰鄧隲永初元年封隲等以定策增三千戶讓不獲遂逃避避者上䟽自陳又曰歐陽尚書博士缺上欲用桓榮叩頭讓曰臣經術淺薄不如同門生郎中彭閎楊州從事睪弘帝曰俞往女諧因拜榮為博士引閎為議郎車駕幸太學會請博士論難於前榮被服儒衣溫恭有蘊藉明經義每以禮義讓相厭不以辭長人儒者莫之及特為加賞賜又詔諸生雜吹擊罄盡日乃罷榮卒子郁當襲爵上書讓於兄子沉顯宗不許不得已受封而悉以租入與之帝以郁先師子有禮讓甚見親厚又曰上欲封樊興置印綬於前興固讓曰臣未有先登陷陣之功而一家數人並蒙爵土令天下觖望誠不願帝嘉興之讓不奪其志又曰劉愷字伯豫以當襲父般爵讓與弟憲逃避封有司奏請絕國上美其義特優加之愷猶不出有司復奏之侍中賈逵上書曰孔子稱能以禮讓為國於從政乎何有和帝納之詔下曰故居巢侯劉般嗣子愷當襲父般爵而稱父遺意致國弟憲遁亡七年所守彌固蓋王法崇善成人之美其聽憲嗣爵乃徵愷拜為郎稍遷侍中愷之入朝在位者莫不仰其風行又曰淳于恭以謙儉推讓為節家有山田橡樹人有盜取之者恭助為收拾載之歸乃知其恭橡盜者還橡恭不受人又有盜刈恭禾者恭見之念其愧因伏草中至去乃起續漢書曰張堪讓先人餘財數百萬與兄子謝承後漢書曰雷義舉茂才讓於陳重刺史不聽義遂佯狂不應命鄉里為之語曰膠漆自謂堅不如雷與陳又曰陳囂與鄉人紀伯為鄰伯夜竊囂藩地自益囂見之伺伯去密移其藩一丈地以益伯伯慚懼還所侵又卻一丈二尺相避凡廣三丈太守高其義名其閭為義里范曄後漢書曰馮緄字鴻卿巴郡宕渠人也長沙蠻寇益陽荊南皆沒於是拜緄為車騎將軍軍至長沙進擊武陵蠻夷荊州平定詔賜錢一億固讓不受振旅還京師推功於從事中郎魏志曰田疇字子泰右北平人太祖北征烏丸軍次無終夏水路不通疇將其眾為鄉導出盧龍塞虜乃驚太祖與戰遂大斬獲軍還論功封疇為亭侯疇上䟽陳誠以死自誓太祖不聽欲引拜之至于數四疇終不受又曰太祖署邴原為丞相徵事崔琰為東曹掾讓曰徵事邴原議郎張範皆秉德純壹志行忠敏清靜足以厲事貞固足以幹事所謂龍翰鳳翼國之重貴舉而用之不仁者遠又曰王基字伯輿東萊人基拔壽春轉基為征東將軍封東武侯基上䟽固讓歸功參佐由是長史司馬等七人皆侯吳志曰魯肅卒孫權以嚴畯代前後固辭曰僕素書生不閑軍事非才而據殃咎必至發言慷慨至於流涕權乃聽焉嘉其能以實讓又曰薛綜為選曹尚書固讓顧譚曰心精體密貫道達微才昭人物德服眾望誠非愚臣所可越先王隱晉書曰司徒魏舒遜位司空衛瓘與書曰每與足下共論此事日日未果可謂瞻之在前忽然在後于時皆有欲遜者或先顯此意不能行或以歸家申喻復還唯舒知命內定於懷未嘗形之於言論者以為晉興以來能辭榮令終未有如舒者焉又曰杜夷字行齊廬江人王敦為刺史舉方正顧榮等各薦夷於相府元帝曾欲省夷夷深讓帝荅曰吾與足下雖情在忘言然虛遲歷載正以足下羸病故欲相省寧論常敬以為國子祭酒夷前後十餘表求解不聽明帝踐祚夷又頻表又曰上以羊祜為開府儀同讓表曰今光祿李喜秉節高亮在公正色光祿魯芝絜身寡欲和而不同光祿李胤清亮簡素正身在朝皆服事華髮以禮終始雖歷外內之寵不異寒賤之家而猶未蒙此選臣更越之何以塞天下之望又封南城郡侯祜曰昔張良請受留侯漢高不奪其志請受鉅平薨遺令不得以南城侯入柩詔祜曰固讓歷年志不可奪身沒讓存遺言益厲此夷叔所以稱賢季札所以全節重違其志今聽復本封干寶晉紀曰鍾會鄧艾將伐蜀與劉寔別客謂寔曰二將當破蜀不寔曰必破蜀伹皆不還客問其故寔曰治道在於克讓因著崇讓論曰季世不能讓賢虛謝見用之恩莫肯讓於勝己晉中興書曰郗愔拜給事黃門侍郎愔苦求外出時吳郡缺朝議欲用愔愔以資輕而少年不宜超登大郡辭讓切至朝廷嘉之為臨海太守在郡優游養志不以事物縈心崔鴻前趙錄曰張寔為鉅鹿太守治任威強路不拾遺曾欲以寔為司徒太保皆垂涕固辭身騎瘠馬妻乘敗車後魏書曰高肇字首文文昭皇太后之兄也肇子植自中書侍郎出為濟州刺史元愉之反也植率州軍出討破愉別將有功當蒙封賞朝廷論勳每謙讓不受云其家荷重恩為國致效是其常節何足以應進陟之報懇惻發於至誠又曰崔光韶為司空行參軍復請讓從叔和曰臣誠微賤未登讓品屬逢唐朝恥無讓德和亦謙退辭而不當高祖善之遂以和為廣陵王國常侍後周書曰蘇祐字承先陳留圉人也有膂力便騎射從征伐常潰圍陷陣還之日諸將爭功祐終無競太祖歎之常謂諸將曰承先口不言勳孤當代言其見知如此沈約齊紀曰朝係伯襄陽人也事母甚謹西土風俗田與鄰畔者輒於畔上種桑以誌之係伯上種桑枝條蔭蔽他地每開數尺以避焉鄰者隨復侵之係伯輒伐樹更種侵畔者慚不敢犯也齊書曰謝朓遷尚書吏部郎上表三讓中書疑朓官未及讓以問國子祭酒沈約約曰宋嘉元中范曄讓吏部朱循之讓黃門蔡興宗讓中書並三表詔荅近代小官不讓遂成恒俗恐有乖讓意王藍田劉安西貴重初自不讓今豈可慕此不讓耶孫興公孔顗並讓記室今豈可三署皆讓耶謝吏部今授超階別有意豈關官之大小撝讓之美本出人情若大官必讓便與詣闕章表不異例既如此謂都非疑朓讓優荅不許唐書曰溫彥博與兄大雅共掌機密彥博以昆季同在機務意不自安固請他職高祖曰我虛心相待不以為疑卿何自疑也彥博雖應命然每退讓遠避機權寮列以此多之又曰長孫無忌冊拜司空無忌固辭讓不許又曰臣幸居外戚恐招聖主私親之誚敢以死請太宗曰無忌聰明鑒悟且有武略公等並知所以委之台鼎無忌又上表切讓帝使謂之曰昔黃帝得力牧而為五帝先夏禹得咎繇而為三王祖齊桓得管仲而為五伯長朕自在藩邸即任使公遂得廓清宇內君臨天下以公功績才望允稱具瞻故授此官無宜辭讓為禮也又曰盧懷慎開元三年遷黃門監懷慎與紫微令姚崇對掌樞密懷慎自以為吏道不及崇每事皆推讓之周書曰湯放桀而歸於毫三年諸侯大會湯取天子之璽置之天子之坐再辭從諸侯之位湯曰此天子之位有道者可以處之三讓于諸侯諸侯莫敢即位然後湯即天子之位慎子曰堯讓許由舜讓善卷皆辭為天子而退為疋夫列子曰昔堯舜為以天下讓許由善卷而不失天下伯夷叔齊實以孤竹讓而終亡其國晏子春秋曰晏子方食景公使至分食食之使者不飽嬰亦不飽公致千金以奉賓客晏子不受公曰先君桓公以書社百封管仲管仲不辭獨辭何也晏子曰嬰聞聖人千慮必有一失愚人千慮必有一得意以管仲失之嬰得之又曰景公使晏子為阿宰三年而譽聞於國景公悅召而賞之辭而不受公問其故對曰昔嬰之治阿三邪毀於外三讒毀於內今則三邪譽於外三讒譽於內昔者嬰之當誅者當賞而今以當賞者當誅是故不敢受景公知晏子賢乃任以國政三年而齊大興莊子曰堯以天下讓許由由曰日月出矣而爝火不息其於光也不亦難乎時雨降矣而猶浸灌其於澤也不亦勞乎又讓於子州支父子州支父曰我適有幽憂之疾方且治之未暇治天下也又曰舜以天下讓於善卷善卷曰余逍遙於天地之間而心意自得吾何以天下為哉遂不受又曰舜以天下讓其友北人無擇北人無擇曰異哉后之為人居甽畝之中而遊於堯之門不若是而已又欲以其辱行汙漫我吾羞見之自投於清冷之淵又曰湯將伐桀因卞隨而謀卞隨曰非吾事也湯又因務光而謀務光曰非吾事也湯曰伊尹何如曰強力忍詬吾不知其他湯遂與伊尹謀伐桀剋之以讓卞隨卞隨曰君之伐桀謀乎我必以我為賊也勝桀而讓乎我必以我為貪也吾生乎亂世而無道之人再來漫我吾不忍數聞也乃自投於桐水而死桐水今在穎川又讓務光曰智者謀之武者遂之仁者居之古之道也吾子胡不立乎務光辭曰廢上非義殺人非仁子犯其難我享其利非廉也吾聞之曰非其義不受其祿無道之世不踐其土況尊我乎吾不忍見也乃負石自沉於盧水盧水在遼東也呂氏春秋曰沈尹筮遊於郢五年荊王欲以為令尹辭期思之鄙人有孫叔敖彼聖人也王於是使人以王興迎叔敖以為令尹而國治韓子曰舜耕於歷山農者讓畔漁於河濱漁者讓長符子曰禹讓天下於奇子奇子曰君之佐舜勞矣鑿山川通河漢首無髮股無毛故舜也以勞報子我生而逸不能為君之勞矣又曰武王以天下讓歧封子歧封子曰孰勿勿然以天下為事乎君往矣余不忍聞之又曰太伯將讓其國於季歷謂其傅曰大王欲以一國之事而以嗣我我其羞之吾聞至人也不居一世而萬世以之君不貴一代而萬代以之貴吾焉能貴乎一國而賤乎萬代哉山海經曰君子國民衣冠帶劍土方千里多薰華之草好讓故為君子國許遜別傳曰遜年七歲無父躬耕負薪以養母盡孝敬之道與寡嫂共田桑推讓好者取其荒者不營利母常隨之如此當乞食無處遜嘆應母曰但願母老壽耳郭翻別傳曰翻經河墜刀於水路人有為取者翻因與之路人不取至於三四路人固辭翻曰爾向不取我豈能復得乎路人曰吾若取此物為天地鬼神所責矣知其終不受乃沉刀於向所失處路人帳然乃復沒為取之翻於是不逆其意十倍刀價與之魏武令曰里諺曰讓禮一寸得禮一尺斯合經之要矣魏文雜事曰辭爵逃祿不以利累名不以位虧德之謂讓博物志曰三讓一曰禮讓二曰固讓三曰終讓晉劉寔崇讓論曰古之聖王治天下所以貴讓者欲以出賢才而息爭競也夫人情莫不皆欲己之賢以自明賢豈假讓而賢哉故讓道興賢能之人不求而自出矣至公之舉而自立矣一官鈌擇眾官所讓最多者而用之審才之道也在朝之人相讓於上草廬之人咸皆化之推能讓賢之風從此生矣為一國所讓則一國士也為天下所讓則天下才也推讓之風行賢不肖灼然殊矣晉孫盛周秦伯三讓論曰孔子曰泰伯可謂至德也已矣三以天下讓民無得而一焉鄭玄以為託採藥而行一讓也不奔喪二讓也斷髮文身三也三者之美皆蔽隱不著王蕭曰其讓隱故民無得而稱焉咸謂玄既失之而肅亦未為暢也玄之所云三跡顯然天下所共見也何得云隱而未著乎三跡茍著則高讓知亦復不得云其讓隱也蓋泰伯之出讓跡已露不奔喪故一事耳斷髮之與左傳明文相背又不經也然則稱三讓者其在古公至文王乎周之王業顯於亶父受命於昌泰伯玄覽棄周太子之位一讓也假託遜遁受不赴喪之譏潛推大美二讓也無胤嗣而養仲雍之子以為己後是深思遠防令周嗣在昌天人叶從四海悠悠無復纖介疑惑三讓也凡此三者帝王之業故孔子曰三以天下讓言非直常讓若禮臧之倫者
