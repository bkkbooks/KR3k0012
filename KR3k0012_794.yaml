body:
  text: 西戎二罽賓漢書曰罽賓國王治修鮮城去長安萬二千二百里地平溫和有目蓿雜草花木檀櫰梓竹漆種五穀蒲陶有金銀銅錫以金銀為錢文為騎馬幕為人面師古曰幕即漫也出封牛水牛象大狗沐猴孔爵珠璣珊瑚虎珀璧琉琉自武帝始通唐書曰貞觀十六年罽賓國遣使獻褥特鼠啄尖而尾赤能食蛇有被蛇螫者鼠輒嗅而尿之其瘡即愈條支漢書曰條支國臨西海暑濕田宜稻有大鳥卵如甕後漢書曰條支國城在山上周回四十餘里臨西海水曲環其南及東北三面路絶唯西北隅通陸出師子犀牛安息漢書曰安息國王治番兜城去長安萬一千六百里風氣物類與罽賓同亦以銀為錢文獨為王面幕為夫人面王死輒更鑄錢有大馬大爵其屬小大數百城方數千里最大國邑臨媯水商賈車船行旁國畫革旁行為書記師古曰今西方胡國書皆橫行不直下也武帝始遣使至安息王令將將二萬騎迎於東界東界至王都數千里行北過數十城民人相屬因發使隨漢使者來觀漢地以大鳥及卵來獻天子大悅後漢書曰章帝章和元年安息王遣使獻師子符拔符拔形似麟無角也北史曰周武天和二年其王遣使朝獻大月氏漢書曰大月氏國治監氏城去長安萬一千六百里物類民俗與安息同出一封橐馳師古曰脊上出一封也控弦十餘万故強輕胸奴師古曰恃其強盛而輕易胸奴也至冒頓單于攻破月氏以其王頭為飲器月氏乃遠去過大宛西擊大夏而臣之北史曰大月氏北與蠕蠕接數為所侵遂西徒都薄羅城其王寄多羅勇武遂興師越太山南侵北天竺自乾陀羅以北五國盡屬之後魏太武時其國人商販京師自云能鑄石為五色琉璃於是採礦山中於京師鑄之既成光澤美於西方來者乃詔為殿容百人光色映徹自此中國琉璃遂賤異物志曰月氏俗乘四輪車或四牛或八牛可容二十人王稱天子大宛漢書曰大宛國王治貴山城去長安萬二千五百五十里以蒲萄為酒富人藏酒至萬餘石久者至數十歲不敗俗嗜酒焉嗜曰宿宛別邑七十餘城多善馬馬汗血言其先天馬子也孟康曰言大宛國有高山其上有馬不可得因取五色母馬置其下與集生駒皆汗血因號曰天馬子云張騫始為武帝言之上遣使持金馬以請宛王不肯於是天子遣二師將軍李廣利將兵伐宛連四年死人斬其王母寡首獻馬三千匹漢軍乃還又曰宛王蟬封與漢約歲獻天馬二匹漢使采蒲陶苜蓿種歸天子以天馬多益種蒲陶目蓿離宮館旁極望焉異物志云大宛馬有肉角數寸或有解人語及知音舞與鼓節相應西域圖記曰其鳥馬騮馬多白耳白馬驄馬多赤耳黃馬赤馬多黑耳踈勒漢書曰踈勒國王治踈勒城去長安九千三百五十里後漢書曰耿恭為戊巳校尉引衆入踈勒城城中乏水穿井十五丈不得水恭整衣服向井拜飛泉湧出賊遂退之後魏書曰踈勒國高宗末其王遣使送釋迦佛袈婆長二丈餘廣丈餘高宗以審是佛衣應有靈異遂燒之以驗虛實置於猛火之上經日不燃觀者莫不悚駭後每使朝貢隋書曰踈勒國都白山南百餘里其王字阿你厥手足皆六指産子非六指者不育王戴金師子多稻粟麻夌銅鐵銀雌黃唐書曰踈勒國王姓裴俗事祆呼切神有胡書文字貞觀九年遣使獻名馬又曰開元六年玄宗遣使冊立其王裴安定為踈勒王康國隋書曰康國者康居之後也遷徙無常不恆故地然自漢以來相承不絶其本姓溫月氏人也舊居祁連山北昭武城因被胸奴所破西踰葱嶺遂有其國支庶各分王故康國左右諸國並以昭武為姓示不忘本也王字代失畢為人寬厚甚得衆心其妻突厥達可汗女也都於薩寶水上阿祿連城城多衆居大臣三人共掌國事其王索髮冠七寶金花衣綾羅錦繡白疊其妻有髻幪以帛巾丈夫剪髮錦袍名為強國而西域諸國多歸之又曰有胡律置於祅祠決罰則取而斷之重罪者族次重者死賊盜截足人皆深目高鼻多鬢髯善於商賈諸夷交易多湊其國有大小鼓琵琶五絃箜篌笛婚姻喪制與突厥同國立祖廟以六月祭之諸國皆來助祭俗奉佛為胡書氣候溫宜五穀勤修園蔬樹木滋茂出馬駝驢騾封牛黃金碙砂甘香阿薩郍香瑟瑟麖皮氍㲣錦疊多蒲桃酒富家或致千石連年不敗大業中始遣使貢方物後遂絶焉唐書曰康居人多嗜酒好歌舞於道路生子必以石密內口中以膠置掌內欲其成長口嘗甘言掌持錢如膠之粘物又曰以十二月為歲首有婆羅門為之占星候氣以定吉凶頗有佛法至十一月鼓舞乞寒以水相潑盛為戲樂又曰貞觀九年遣使貢師子太宗嘉其遠至命祕書監虞世南為之賦自此朝貢至十一年又獻金桃銀桃詔令植之於苑囿又曰萬歲通天年中則天封其大首領篤婆鉢提為康國王仍拜左驍衛將軍又曰開元六年遣使貢獻鎖子甲水精杯馬腦駝鳥卯之類副貨北史曰副貨國去代一萬七千里東至阿富使且國西至沒誰國中間相去一千里南有連山不知名北至奇沙國相去一千五百里國中有副貨城周匝七十里宜五穀蒲桃唯有馬駝騾國王有黃金殿殿下有金駝七頭各高三尺其王遣使朝貢安國隋書曰安國漢時安息國也王姓昭武氏與康國王同族字設力登妻康國王女也都在郍密水南城有五里環以流水宮殿皆為平頭王坐金駝座高七八尺每聽政與妻相對大臣三人評理國事風俗同於康國唯妻子姊妹及母子相禽獸此為異也煬帝即位之後遣司隸從事杜行滿使於西域至其國得五色鹽而返國之西百餘里有畢國可千餘家其國無君長安國統之大業五年遣使貢獻後遂絶焉烏萇北史曰烏國在賖彌南北有葱嶺南至天竺婆羅門胡為其上族婆羅門多解天文吉凶之數其王動則訪決焉土多林果引水灌田豐稻夌事佛多諸寺塔寺極華麗人有爭訴服之以藥曲者發狂直者無恙為法不殺犯死罪唯徙於靈山西南有檀特山山上立寺以驢數頭運食山下無人控御自知往來烏郍曷隋書曰烏郍曷國都烏許水西舊安息之地王姓昭武亦康種類字佛食都城方二里勝兵數百人王坐金羊座北去安國四百里西北去穆國二百餘里東去瓜州七千五百里大業中遣使貢方物渴槃陀北史曰渴槃陀國在葱嶺東朱駒波西河經其國東北流有高山夏積霜雪亦事佛道附於濅噠通典曰渴槃陀後魏時通焉亦名漢陀國亦名渴槃羅陀國理葱嶺中在朱俱波國西西至護密國北至疏勒國其王本疏勒人纍代相承居此國有戶二千餘有懸度山在國南四百里懸度者名山也溪谷不通以繩索相引而度其間四百里中往往有棧道因以為名今按懸度葱嶺邐迤相屬郵置所絶道阻且長故行人由之莫能分別然法明宋雲所經即懸度山也又有頭痛山在國西南向罽賓歷大頭痛小頭痛之山赤土身熱之坂宋膺異物志曰大頭痛小頭痛山皆渠搜之東疏勒之西經之者身熱頭痛夏不可行行則至死唯冬可行尚嘔吐山有毒藥氣之所為冬乃枯歇故可行也鉢和北史曰鉢和國在渴槃陀西其土尤寒人畜同居穴地而處又有大雪山望若銀峰其人唯食餅麨飲夌酒服氈裘有二道一道西行向濅噠一道西南趣烏長亦為濅噠所屬大夏史記曰大夏在大宛西南二千餘里媯水南其俗土著有城屋與大宛同俗無大君長往往城邑寡小其兵弱畏戰善賈及大月氏西徙皆臣畜大夏大夏民多可百餘萬其都曰藍市城有市販賣諸物東南有身毒國張騫曰臣在大夏時見筇竹杖蜀布問曰安得此大夏國人曰吾賈人往市之身毒身毒國在大夏東南可數千里米國隋書曰米國都郍蜜水西舊康居之地也無王其城主姓昭武康國王之支庶字閉拙都城方二百里勝兵數百人西北去康居百里大業中頻貢方物鄧至通典曰鄧至羌之別種也後魏時與焉有像舒者代為白水酋帥因地名為號稱至王其地自千亭以東平武以西汶嶺以北宕昌以南風土習俗與宕昌同自舒理至十代孫舒彭附後魏孝文帝封甘松縣子鄧為王西魏恭帝初其主檐術因亂來奔周文帝遣兵送還自後無聞安息北史曰安息國在葱嶺之西都蔚搜城西與波斯相接東去長安一萬七百五十里周武天和二年其王遣使來獻乙弗獻通典曰乙弗獻後魏時聞焉在吐谷渾國有屈海周回千餘里衆有萬落風俗與吐谷渾同然不識五穀唯食魚與蘇子狀若中國茍杞子或赤或黑西有契翰一部風俗亦同土特多狼伏盧尼北史曰伏盧尼都伏盧尼城在波斯國北去代二萬七千三百二十里纍石為城東有大河南流中有鳥其形似人亦有如橐駝鳥者皆有翼常居水中出水便死城北有云尼山出銀珊瑚琥魄多師子石國隋書曰石國居藥殺水都城方十餘里其王姓石名泥國城之東南立屋置座於中正月六日七月十五日以王父母燒餘之骨金甕盛之置于床上巡繞而行散以花香雜果王率臣下設祭焉禮終王與夫人出就別帳臣下以次列坐享宴而罷有粟夌多良馬其俗善戰曾二於突厥射匱可汗興兵滅之令特勒甸職攝其國事大業五年遣使朝貢其後不復至宕昌通典曰宕昌羌後魏時興焉亦三苗之嗣與先零燒當罕開諸部姓別自立師皆有地分不相統攝宕昌即其一也俗皆土著居有楝宇其屋織氂牛及羖羊毛覆之無法令徭賦唯征伐之時乃相屯聚不然則各事生業不相來往皆衣裘褐牧養氂牛羊豕以供其食俗有蒸報無文字但取木榮落以記歲時三年一相聚殺牛羊以祭天俗重虎皮以之送死有梁勤者代為酋帥得羌毫心乃自稱王其界自仇池以西千里席水以南北八百里地多山阜部衆二萬餘落至其孫彌忽如遣使於後魏太武帝拜為宕昌王七葉孫彌秦皆授南北兩朝封爵後見兩魏分隔永熙末種人企定乃引吐谷渾寇金城後企定寇石門戍周武帝天和中詔大將軍田恆討平之以其地為宕州鏺汗隋書曰鏺汗國都葱嶺之西五百餘里古渠搜國也王姓昭武守阿漆都城方四里勝兵數千人王坐金羊床妻戴金花俗多朱沙金鐵東去踈勒千里大業中遣使貢方物色知顯北史曰色知顯國都色知顯城在悉万斤西北去代一萬二千九百四十里土平多五果伽色尼北史曰伽色國都伽色尼城在悉萬南去代一萬二千五百里土出鹽多五果白蘭通典曰白蘭羌之別種後周時興焉東北接吐谷渾風俗物産與宕昌同周武帝保定元年朝獻使至乾陀北史曰乾陀國在烏萇西本名業波為濅噠所破因改焉好征戰與罽賓鬭三年不罷人怨苦之有鬭象七百頭十人乘一象皆執兵仗象鼻縛刀以戰所都城東南七里有佛塔高七十丈周三百步即所謂雀離佛圖也史國隋書曰史國都獨莫水南十里舊康居之地也其王姓昭武字逖遮亦康國王之支庶也都城方二里勝兵千餘俗同康國北去康國二百四十里南去吐火羅五百里大業中遣使朝貢師子通典曰師子國東晉時通焉天笁旁國也西海之中延袤二千餘里多出奇寶其地和適無冬夏之異五穀隨人所種不須時節其國舊無人止有鬼神有龍居之諸國商估來共市易鬼不見其形但出珍寶明其所堪價商人依價取之諸國人聞其土樂因此竟至或有停住者遂成大國能馴養師子遂以為名風俗與婆羅門同而尤事佛法安帝義熙初遣使獻玉佛像像高四尺二寸玉色潔潤形制殊特殆非人功歷晉宋代在建康瓦官寺又曰宋文帝元嘉五年其王剎利摩訶南遣使貢獻梁武帝大通元年後王迦葉伽羅訶犁耶亦使使貢獻穆國北史曰穆國都烏滸河之西亦安息之故地與烏郍曷為鄰其王姓昭武亦康國王之種類也字阿濫密都城方三里勝兵二千人東北去安國五百里西去波斯國四千餘里大業中遣使貢方物奄蔡通典曰奄蔡漢時通焉西接大秦東南二千里與康居接去陽關八千餘里控弦十餘萬與康居同俗而役屬康居土氣溫和臨大澤無涯岸多楨松白草及貂畜收逐水草蓋近北海至漢改名阿蘭郍國後魏時白粟特國一名溫郍沙何國北史曰何國都郍密水南數里舊是康居地也其王姓昭武亦康國王之族類都城方二里勝兵者千人其王坐金羊座東去曹國百五十里西去小安國三百里東去瓜州六千七百五十里大業中遣使貢方物濅噠北史曰濅噠國大月氏之種類也亦高車之別種其原出於塞北自金山而南在于闐之西都烏許水南二百餘里去長安一萬一百里其王都拔底延城蓋王舍城也其城方十里餘多寺塔皆飾以金寶風俗與突厥略同兄弟共一妻無兄弟者依其多少之數更加帽焉衣服類加以纓絡頭皆剪髮其語與蠕蠕高車及諸胡不同衆可有十万無城邑依隨水草以氈為屋夏遷涼土冬逐暖處其王分其諸妻各在別所相去或一二里巡歷而行每月一處冬寒之時三月不徙王位不必傳子弟堪者死便受之其國無車輿多駝馬用刑嚴急偷盜無多少皆腰斬盜一責十死者富家纍石為藏貧者掘地而埋隨身諸物皆置冢內人凶悍能鬭戰西域唐居于闐安息及諸小國三十許皆役屬之號為大國又曰後魏明帝熙平中遣宋雲沙門法力等使西域訪求佛經時有沙門慧生者亦與俱行正光中還慧生所經諸國不能知其本末及山川里數蓋舉其略云
