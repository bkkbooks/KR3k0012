body:
  text: 百穀部六黍尚書君陳曰我聞曰至治馨香感于神明黍稷非馨明德惟馨又盤庚曰若農不服田畝罔有黍稷尚書大傳曰夏昏火中可以種黍韓詩外傳黍離曰彼黍離離彼稷之苗薛君注曰詩人求己兄不得憂不識物視彼黍乃以為稷毛詩曰黍離閔宗周也彼黍離離彼稷之苗行邁靡靡中心搖搖又甫田曰今適南畝或耘或秄黍稷薿薿薿薿盛皃也又魚藻黍苗曰芃芃黍苗陰雨膏之儀禮婚禮曰贊設黍于醬東又特牲饋食禮曰佐食搏黍授祝祝以授尸禮記月令曰仲夏之月農乃登黍又曲禮曰黍曰薌合又內則曰羊宜黍豕宜稷左傳昭公曰其藏冰也黑牡秬黍以享司寒杜預注曰黑牡秬黍也司寒北方玄冥之神也故物皆用黑有事於冰故祭其神以上黍春秋佐助期曰黍神名侜佞蘭郝春秋說題辭曰精移火轉生黍夏出秋改杜預注曰云春之夏故移也農書曰黍之言暑也必須暑改得陰乃成也黍者緒也故其立字禾入米為黍為酒以扶老為酒以序尊卑且禾為柔物亦宜養老也爾雅曰秬黑黍秠一稃二米郭璞注曰秠亦黑黍但中與黍米異耳漢和帝時任城生黑黍或三四實一黍二米得黍三斛八斗是也史記封禪書曰管仲說桓公曰古者封禪鄗上黍所以為盛應劭注曰鄗上山也音曜漢書曰冀州民五男三女畜宜牛羊穀宜黍稷後漢書曰承宮遭天下喪亂遂將諸生避地漢中後與妻子之蒙陰山肆力耕種禾黍將熟人有認之者宮不與計推之而去由是顯名晉書曰劉聰時河東大蝗唯不食黍豆靳准率部人收而埋之哭聲聞於十餘里後乃鑽土飛出復食黍豆平陽飢甚崔鴻十六國春秋前秦錄曰符堅讌群臣於釣臺祕書侍郎趙整以堅頗好酒因為酒德之歌曰穫黍西秦採麥東齊春封夏發鼻納心迷隋書曰李士謙隱居有牛犯其田者士謙牽置涼處飼之過於本主望見盜刈其禾黍者默而避之其家僮嘗執盜粟者士謙慰諭之曰窮困所致義無相責遽令放之又曰李士謙自以少孤未嘗飲酒食肉口無殺害之言至於親賓來萃輒陳罇俎對之危坐終日不倦李氏宗黨豪盛每至春秋二社必高會極歡無不沉醉諠亂嘗集士謙所盛饌盈前而先為設黍謂群從曰孔子稱黍為五穀之長荀卿亦云食先黍稷古人所尚容可違乎少長肅然不敢弛惰退而相謂曰既見君子方覺吾徒之不德也士謙聞而自責曰何乃為人所踈頓至於此唐書曰德宗以中和節令文武百辟進農書獻穜稑種及是百寮始進兆人本業三卷司農獻粟及黍各一斗韓子曰韓昭侯之時黍種嘗貴甚昭侯令人覆廩廩吏果竊黍種而糶之山海經曰廣都之野后稷葬焉爰有膏黍膏稷又曰魚山有人一目是少昊子食黍韓子曰吳起攻秦小亭倚一車轅北門外令曰能徙此於南門外者賜上田上宅及有徙者賜如令俄又置一石赤黍東門外令曰能徙此於西門外者賜如初民爭徙之乃下令曰攻亭能先登者仕之大夫賜之上田上宅於是攻之一朝而拔淮南子曰冬三月天子衣黑衣乘玄駱玄馬黑馬白馲食黍與彘黍彘水類時宜也又曰三代積德而王齊桓繼絕而霸故樹黍者無不獲稷樹恩者無不報德又曰渭水多力而宜黍淮南萬畢術曰取麥門冬赤黍漬以狐血陰乾之欲飲酒取一丸置舌下酒吞之令人不醉麥門冬赤黍薏苡為丸令婦人不妬白虎通曰清明風至則黍稷滋閶闔風至則種宿麥黍抱朴子曰張子和丹法用鈆朱砂曾青水合封之蒸之於赤黍米中也紀年書曰惠成王八年雨黍國語曰子餘使公子賦黍苗黍苗小雅其詩曰芃芃黍苗陰雨膏之子餘曰重耳之仰君也若黍苗之仰陰雨也若君實庇癮膏澤之使能成嘉穀薦在宗廟君之力也在宗廟為祭主家語曰孔子侍坐於哀公賜之桃與黍焉哀公請用之孔子先食黍而後食桃左右皆掩口而笑之公曰黍者所以雪桃非為食也孔子對曰丘知之矣然黍者五穀之長郊社宗廟以為上盛果屬有六而桃為下祭祀不用不登郊廟丘聞之君子以賤雪貴不以貴雪賤也今以五穀之長雪五果之下者從上雪下也臣以為妨於教害於義故不敢公曰善呂氏春秋曰得時之黍芒莖而徼下穗芒以長搏采而薄糠舂之易而食之不噮北縣切而香如此者不餲音遏先時者大本而華莖殺而不遂遂長葉高短穗後時者小莖而麻長短穗而厚糠小米今而不香今新也又曰今以百金與搏黍以示兒子兒子必取搏黍也以和氏之璧與百金以示鄙人鄙人必取百金矣又曰飯之美者南海之秬秬黑黍楊泉物理論曰梁者黍稷之揔名崔寔四民月令曰四月可種黍謂之上時汜勝之書曰黍者暑也種必待暑先夏至二十日此時有雨強土可種黍畝三升黍心未生雨灌其心心傷無實凡種黍皆如禾欲䟽於禾禰衡別傳曰十月朝黃祖在艨衝舟上會設黍谷衡年少在坐黍臛至先自飽食畢搏以弄戲其輕慢如此劉向別錄曰傳言鄒衍在燕有谷地美而寒不生五穀鄒子居之吹律而溫至生黍到今名黍谷焉列女後傳曰東平衡農師太尉薨農欲奔赴無糧自致妻願從行行止紡績庶以自資行到聚亭遇天霖雨留獨孤母舍母舍後有空園農曰此園可以種黍從求分種之獨孤母曰此久廢園唯恐生力劣手不多耳何分之有乎農遂與妻斬荊棘種之黍將熟獨孤母乃更曰黍當分農欲委去妻曰不如收歛以遺之安其意然後乃去農遂從之後還獨孤母以昔黍歸農遂不肯取說文曰秬黑黍也一稃二米所以釀鬯也黍禾屬黏者以大暑而種故謂之黍孔子曰黍可以為酒廣雅曰粢黍也黍穰謂之䅀音例崔豹古今注曰宣帝元康四年長安雨黑黍粟如禾和帝元興元年黑黍穗一禾二實或三四實生任城得粟三斛八斗以薦宗廟廣志曰有牛黍有稻尾秀成赤黍有馬革大黑黍或云秬黍有溫屯黃黍有嫗亡燕𪁟之名吳氏本草曰黍神農甘無毒七月取陰乾益中補氣京房易妖占曰天雨黍粟大人出走荊楚歲時記曰十月一日黍臛俗謂之秦之歲首未祥黍臛之義今北人此日設麻羹豆飯當為其始熟嘗新耳博物志曰地三年種蜀黍其後七年多虵稌范曄後漢書曰烏丸國其地宜稌穆天子傳曰天子至赤烏赤烏獻稌麥百載廣志曰有赤稌有白黑青黃鷰頷凡五種呂氏春秋曰飯之美者有陽山之稌說文曰稌糜也音麋崔豹古今注曰麻稌也梁禮記曲禮曰祭宗廟之禮梁曰薌箕又郊特牲曰飯黍稷稻梁白黍黃梁爾雅曰釁赤苗芑白苗郭璞注曰釁赤粱粟芑白粱粟皆好穀也犍為舍人曰別味赤白苗也又曰是伯夷所食首陽草也廣雅曰藿粱木稷也續漢志曰桓帝之初京都童謠曰城上烏尾畢逋公為吏子為徒一徒死百乘車車班班入河間河間奼女工數錢以錢為室金為堂石上慊慊舂黃梁下有懸鼓我欲擊之丞相卿怒城上烏者處高獨食不與下共謂人主多聚歛也公為吏子為徒者言蠻夷叛逆父既為軍吏子弟又為卒徒往擊之也一徒死百乘車者言前一人討胡既死矣後又遣百乘車往也車班班者言乘輿班班入河間迎靈帝也奼女工數錢言帝既立其母永樂太后好聚金錢以為堂室也石上慊慊者言太后雖積金錢猶慊慊常苦不足使人舂黃梁而食之也我欲擊之者言太后教帝使賣官授錢天下忠篤之士怨望欲擊鼓求見卿懸鼓者復怒而止我也唐書曰涼州都督計欽明嘗出按部有吐蕃數萬奄至城下欽明拒戰久之力屈被執賊將欽明至靈州城下欽明大呼曰賊中都無飲城內有美醬乞二升梁米乞二升墨乞一挺是時賊營中四面阻泥河唯有一路得入欽明詐乞此物以喻城中冀有簡兵練將候夜掩襲城中無晤其旨者尋遇害淮南子曰不能耕而欲黍梁不能織而憙衣裳無事而求其功難矣又曰珍怪奇味人之所美也而堯糲粱之飯藜藿之羹糲粗也文繡狐白人所好也而堯布衣揜形鹿裘禦寒國語曰欒伯謂公族大夫公曰夫膏粱之性難正呂氏春秋曰吳起為鄴令民歌之曰終古斥鹵生稻粱楊泉物理論曰粱者黍稷之惣名也神仙傳曰吳孫權時有一人種粱在山中患猿猴食之聞介象有道聊從乞辟猿猴法象告之無他法也汝明日往粱所望見群猴方往時便大喚語之言以白介君使猿猴莫復來食粱此人倉卒直謂象欺弄之明日視粱遇群猴適欲下樹試承象語語猴即各還山去遂便絕跡廣志曰有具粱解粱遼東赤粱魏武帝以為粥本草曰白粱味甘微寒無毒主除熱益氣有襄陽竹根者最佳黃粱出青冀楚辭招魂曰稻粱穱麥挐黃粱挐糅也以黃粱和而糅且香滑傅休弈雉賦曰飲以華泉之水食以玄山之粱左思魏都賦曰雍丘之粱東薔魏書曰烏丸地宜東薔東薔似蓬草實如葵子二十月熟也廣志曰東薔色青黑粒如葵子幽涼并皆有之西河語曰貸我東薔償我田粱上林賦曰東薔彫胡
