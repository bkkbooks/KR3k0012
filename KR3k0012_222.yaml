body:
  text: 職官部十九黃門侍郎六典曰黃門侍郎掌二侍中之職凡政之弛張事之與奪皆參議焉若大祭祀則從升壇以陪禮皇帝盥手則奉巾以進既帨則奠巾于篚奉匏爵以贊獻凡元正冬至天子視朝則以天下祥瑞奏聞漢官儀曰給事黃門侍郎次侍中侍從左右開通內外給事於中故曰給事中黃門侍郎漢書曰王音薦揚雄待詔歲餘為給事黃門郎成哀平三代不徙又曰張禹為太傅有疾成帝臨視拜於床下禹有少子在側數目之帝知其意於前拜黃門郎又曰劉向字子政宣帝時以中郎為給事黃門侍郎又曰董賢字聖卿雲陽人為太子舍人賢待漏在殿下為人美麗自喜哀帝望見悅其儀貌識而問之曰是舍人董賢耶因引上與語拜為黃門侍郎東觀漢記曰鄧閶字秀昭遷黃門侍郎于時國家每有災異水旱閶側身暴露憂懼憔悴形於顏色公卿以下咸高尚焉漢興以來為外戚儀表後漢書曰馬防子巨為常從小侯正月當冠特拜為黃門侍郎肅宗親御章臺下殿陳鼎俎自臨冠之續漢書曰荀悅字仲豫遷黃門侍郎獻帝頗好文學悅與從弟彧孔融並侍講禁中又輿服志曰禁門曰黃闥以中人主之故號曰黃令然則黃門郎給事黃闥之內故曰黃門郎本既無員於此各置六人也又百官志曰給事黃門侍郎六百石無員侍從左右給事中使開通中外諸王朝見於殿上引王就位獻帝起居注曰自誅黃門後侍中侍郎出入禁中機事頗露由是王允乃奏侍中黃門不得出入不通賓客自此始也漢官曰尚書郎奏事於明光殿省中皆胡粉塗璧其邊以丹漆地故曰丹墀尚書郎含雞舌香伏其下奏事黃門侍郎對揖跪受漢舊儀曰黃門郎屬黃門令日暮入對青瑣門拜名曰夕郎魏志曰王粲字仲宣山陽人年十七司徒辟詔除黃門侍郎以西京擾亂皆不就又曰夏侯玄字太初少知名弱冠為黃門侍郎嘗進見與皇后弟毛曾並坐玄恥之不悅形之於色明帝恨之左遷為羽林監又曰杜恕字矜伯為散騎黃門侍郎恕推誠以質不治飭在朝不結交每政有得失常引綱維以正言於是侍中辛毗等器重之又曰夏侯向字伯仁淵從子也文帝與之親友有籌畫智略從太祖定冀州遷黃門侍郎又曰鍾育字稚叔年十四為散騎侍郎機捷談笑有父風大和初蜀相諸葛亮圍祁山明帝欲親西征育上疏曰夫策貴廟勝功尚帷幄不下殿堂之上而決勝千里之外車駕宜鎮守中土以威四方今者盛暑行師詩人所重實非至尊順動之時也遷黃門侍郎魏略曰董遇字季直獻帝時為黃門侍郎旦夕侍講為天子所愛信蜀志曰費禕字文偉為黃門侍郎丞相亮南征還群僚於數十里逢迎年位多在禕右而亮命禕同載由是衆莫不易觀吳志曰孫承字顯世好學有文章作螢火賦行於世為黃門侍郎與顧榮俱為侍臣歸命世內侍多得罪唯榮承獨獲免常使二人記事承答顧問乃下詔曰自今巳後用侍郎皆當令如宗室承顧榮儔也又曰孫皓每宴會群臣無不咸令沉醉置黃門郎十人特不與酒侍立終日為司過之吏宴罷之後各奏其闕失忤視之咎謬言之愆罔有不舉大者即加威刑小者咸以為罪晉書曰顧榮少有圭璋符采朗徹仕吳弱冠舉賢良為黃門侍郎當時後進盡相推謝稱榮有天才令望又曰張華為黃門侍郎博覽圖籍千門萬戶畫地成圖又曰吳隱之孝武帝欲以為黃門郎以隱之貌類簡文帝乃止又曰嵇紹為給事黃門侍郎時侍中賈謐以外戚之寵年少居位潘嶽杜斌等皆附託焉謐求交於紹紹拒而不答謐誅紹時在省以不阿比凶族封弋陽子晉書載記曰秦黃門郎古成詵風韻秀舉確然不群每以天下是非為已任時京兆韋高慕阮籍之為人居母喪彈琴飲酒詵聞而泣曰吾當私刃斬之以崇風教遂持劍求高高懼逃匿終身不敢見詵齊職儀曰給事黃門侍郎四人秩六百石武冠絳朝服漢有中黃門給事黃門位從諸大夫秦制也與侍中掌奏文案贊相威儀典署其事後魏書曰崔光為黃門侍郎未嘗留心文案唯從容論議參贊文政而巳又曰陽平王之子匡為黃門侍郎茹皓始有寵百寮微憚之世宗曾於山陵還詔匡陪乘乂命皓登車褰裳將上匡諫止世宗推之命下皓恨匡失色當時壯其忠謇又曰任城王之子順除給事黃門侍郎時領軍元乂威刑尤盛凡有遷授莫不造門謝謁順拜表而巳曾不詣乂乂謂順曰卿何得不見我順正色曰天子富於春秋委政宗輔叔父宜至公為心舉士報國如何賣恩責人私謝豈所望也北史曰盧誕拜給事黃門侍郎魏帝詔曰經典易求人師難得朕諸兒稍長欲令卿為師於是親幸晉王第勑晉王以下皆拜之於帝前隋書曰劉行本為黃門侍郎文帝嘗怒一郎於殿前笞之行本進諫帝不顧行本乃正當上前又曰陛下不以臣不肖置臣左右豈得輕臣而不顧也乃置笏於地而退上謝之而原所笞者唐書曰溫大雅為黃門侍郎弟彥將為中書侍郎對居近侍高祖謂曰我起義晉陽為卿一門耳又曰高宗總章元年十月東天笁烏蔡國長年婆羅門盧伽逸多受詔合丹上將餌之東臺侍郎郝處俊諫曰修短有天命未聞萬乘之主輕服蕃夷之藥昔貞觀末年先帝令婆羅門僧那羅你娑婆寐依其本國仙方合長年神藥胡既有異術徵求靈草祕石歷年而成先帝服之竟無異效大漸之際名醫莫知所為欲歸罪於胡人將申大戮又恐取笑夷狄龜鏡若是惟陛下深察遂止又曰天寶元年改黃門侍郎為門下侍郎五代史晉書曰天福七年詔門下侍郎班在常侍之下俸祿同常侍三輔決録曰卓茂字子康元帝時遊學長安以儒行為給事黃門郎又曰杜恕字矜伯拜黃門侍郎每直省閣威儀矜嚴又曰馬后志在克已輔上不以私家干朝廷弟為黃門郎訖永平世不遷英雄記曰曹純字子和年十六為黃門郎王嘏別傳曰嘏字昭先魏文以嘏為黃門侍郎每納忠言輒手壞本自在禁省歸書不封帝嘉其淑慎如此桓階別傳曰階為尚書令文帝行幸見諸少子無禈上搏手曰長者子無禈是日拜三子為黃門郎傅子曰王黎為黃門郎軒軒然得志煦煦然自樂劉向七略曰孝宣皇帝重申不害君臣篇使黃門郎張子喬正其字劉向集書誡子歆曰今若年少得黃門侍郎顯處也新拜皆謝貴人叩頭謹戰戰栗栗乃可必免唐中宗授韋嗣立黃門侍郎制曰絳衣近侍秩亞貂蟬青瑣崇班職參鴛鷺實神化之有寄信賢才之攸宜通議大夫韋嗣立忠規奕葉孝緒蟬聯家匡玄燕之朝人輔彤靈之代芝蘭並秀見謝石之階庭騏驥齊驅有劉山之昆季入光振鷺譽滿三臺出據馮熊聲流十部近者命茲鸞渚巳濯鴈行才出公局奄歸蒿里永言荊樹坐折連枝眷彼恆山空餘一鳥俾遷榮於皂蓋宜襲寵於黃樞給事中六典曰給事中凡百司奏抄侍中審定則先讀而署之以駮正違失凡制勑宣行大事則稱揚德澤褒美功業覆奏而請施行小事則署而頒之凡文武六品以下授職所司奏楊則校其仕歷深淺功狀殿最訪其德行量其才藝若官非其人理失其事則白侍中而退量焉漢儀注曰諸給事中日上朝謁乎尚書奏事分為左右以有事殿中故曰給事中多名儒國親為之掌左右顧問漢書曰給事秦官也至漢因之皆為加官所加或大夫博士議郎掌顧問應對位次中常侍又曰元帝詔蕭望之傅朕八年可賜爵關內侯給事中後漢書曰鄭衆字仲師以明經拜給事中魏志曰秦朗字元明明帝即位授以內官為給事中每車駕出入朗常隨從時明帝喜發舉數有以輕微而致大辟者朗終不能有所諫止又未嘗進一善人帝亦以是親愛每顧問之多呼其小字阿蘇晉書曰任熙字伯遠立德邈然徵拜給事中晉起居注曰武帝太康七年詔曰郎中張建忠篤履素為江表士大夫所稱宜在中朝其以建為給事中晉武帝詔曰燕王師陳邵清貞廉潔博通六籍宜在左右以敦儒訓可給事中唐書曰盧粲幽州范陽人也京龍二年遷給事中時節愍太子初立韋庶人以非巳所生深加忌嫉勸中宗下勑令太子却取衛府封物每年以供服用粲駮奏曰皇太子處繼明之重當主鬯之尊歲時服用自可百司供擬又據周官諸應用財器歲終則會唯王及太子應用物並不會此則儲蓄之費咸與王同今與列國諸侯齊衡入封豈所謂憲章在昔垂法將來者也必謂青宮初啓服用所資自當廣支庫物不可長存藩封詔從之又曰盧粲遷給事中時安樂公主壻武崇訓為節愍太子所殺特追封為魯王令司農少卿趙履溫監護葬事履溫諷公主奏請依永泰公主故事為崇訓造陵詔從其請粲駮奏曰伏尋陵之稱謂本屬皇王及儲君等自皇家巳來諸王及公主墓無稱陵者唯永泰公主承恩特葬事越常途不應假永泰公主為名請比貞觀巳來諸王舊例足得豐厚手勑答曰安樂公主與永泰公主無異同穴之義古今不殊魯王緣此特為陵制不煩固執粲又奏曰臣聞陵之稱謂施於尊極不屬王公巳下且魯王若欲論親等第則不親於雍王守禮雍王之墓尚不稱陵魯王則不可因尚公主而加號且君之舉事則載於方冊或稽之往典或考自前朝臣歷撿貞觀巳來駙馬墓無得稱陵者且君人之禮服絶於傍朞蓋為不獨親其親不獨子其子陛下以膝下之恩愛施及其夫贈賵之儀哀榮足備豈得使上下無辨君臣一貫者哉帝竟依粲所奏又曰李藩為給事中制勑有不可遂於黃勑後批之吏曰宜別連白紙藩曰別以白紙是文狀豈曰批勑耶裴垍言於帝以為宰相器又曰憲宗以同州刺史呂元膺復為給事中初元膺自給事中除同州及入謝上問以時政得失元膺論奏詞甚激切上嘉其剛正翌日謂宰臣曰呂元膺讜言直氣今欲留在左右使言得失卿等以為何如李藩裴垍進賀曰陛下納諫超冠前王乃宗社無疆之福臣等不能廣求直士又不能數進直言孤負聖心合當罪責今請以元膺復為給事中以備顧問上悅而從之又曰李遜為給事中嘗論時政以為事君之義有犯無隱陳誠啓沃不必擇辰今君臣敷奏乃候隻日是畢歲臣下睹天顏獻可否能幾何憲宗嘉之又曰元和十四年以撫州司馬令狐通為右衛將軍給事中崔植封還制書言通前刺史壽州用兵失律前罪未塞不宜遽加獎用上命宰臣諭植以通父彰有功不忍棄其子其制方行又曰韋弘景為給事中屢有封駮時有劉士經以駙馬交通邪幸自撿校官用為太僕卿弘景執奏不可中人宣諭再三弘景不為之回穆宗怒乃令弘景使安南雍容宣慰時論翕然推重又曰郭承嘏為給事中開成元年出為華州刺史詔方下兩省迭詣中書求承嘏出麾之由給事中盧載封還詔書奏曰承嘏自居此官繼有封駮能奉其職宜在瑣闈牧守之才易為推擇文宗謂宰臣曰承嘏久在黃扉欲優其祿俸暫令廉問近關而諫列拜章惜其稱職甚美事也乃復為給事中又曰于敖遷給事中昭愍初即位李逢吉用事與翰林學士李紳素不叶遂誣紳以不測之罪逐於嶺外紳同職駕部郎中知制誥龐嚴司封員外郎知制誥蔣防坐紳黨左遷信汀等州刺史黜詔下敖封還詔書時人以為與嚴相善訴其非罪皆曰于給事犯宰執之怒伸龐蔣之屈不亦仁乎及駮奏出乃是論龐嚴貶黜太輕中外無不大噱東方朔記曰東方朔為中郎賜帛百匹給事中荀綽兗州記曰袁准字孝尼有俊才太始中拜為給事中胡廣集曰給事中掌侍從左右無員位次侍中常侍或名儒或國親束晢集曰員外侍郎及給事冗從皆是帝室茂親或貴遊子弟若悉從高品則非本意若精鄉議則必有降損
