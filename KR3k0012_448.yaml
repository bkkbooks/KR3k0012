body:
  text: 人事部八十八品藻下孔叢子曰子高謂魏王曰臣入魏見君二計臣張叔謀有餘范威智不逮然其功一也王曰叔也有餘威也不逮可得同乎答曰駑驥同轅伯樂為之咨嗟玉石相糅和氏為之歎息故賢愚共貫則能士匿謀真偽相錯則智士結舌雖有餘猶不逮也又曰東里閭空腹而好自賢欲自親於子順子順弗下曰夫東里閭外質頑拙有似踈直內懷虛妙非丈夫之節若其度骸稱膚面目鬢眉實美於人也聖人論士不以此為貴者無益於德故也又曰宮他見子順曰他困於貧賤欲自託富貴之門庶克濟乎子順曰夫富而可以託貧貴而可以寄賤者天下寡矣非信義君子明識通達則不可所欲託者誰也宮他曰將適趙公子順曰非其人矣雖好養士奉而已終不能稱也宮他曰將之燕相子順曰彼從兄弟甥舅各濟其私無求賢之志不足歸也宮他曰將之齊田氏子順曰齊大國也其士大夫皆有多黨之心不能容子也他曰然則何向而可子順曰濟子之欲則宜若后成子可也又曰魏安釐王問子順曰馬回之為人雖少文桓桓亮直丈夫之節吾欲以為相可乎答曰知臣莫若君何有不可至於亮直之節臣未明也何故答曰聞諸孫卿其為人也長目而永視者必體方而心圓每以其法相人千百不失臣見回非不偉其體幹然甚疑其自王卒用之三月王果以陷得罪淮南子曰管子文錦也雖醜登廟相桓公以霸功成事衣文錦之服大書在明堂故曰雖醜登廟也子産絹染也美而不尊子産相鄭以乘車濟朝涉者孟子曰惠而不知為政絹染者以子産喻母人月令曰命婦宮染絹溫暖其民如人之母也袁子正書曰孔子稱蘧伯玉國無道可卷而懷也今李膺居濁世之中皎然與世殊塗此西山餓夫之疇耳卒死於非罪惡得為雅人又曰李膺言出于口人莫得違也有難李君之言者則鄉黨非之李君子與人同輿載則名聞天下又曰或云少府楊阜豈非忠哉答曰然可謂直士忠臣則吾不知也夫為人臣見人主失道指其非而播楊其惡可謂直士未為忠臣故司空陳群則不然其談論終日未嘗言人主之非書數十上而外不知君子謂陳群於是乎長者姚信士緯曰論清高之士上可如老子莊周下可如君平子貢耳若於陵仲子及嚴遵夏甫子治未可盡以為師矣平議之士若季札趙武逮于林宗皆可盡為則也其泄冶伯宗及末世史雲子將之屬皆美而未善也聖人考功黜陟猶以三載而子將月旦之處史雲睚眥廢人其觀進者或飾虛其怠沮者皆離叛識誠可謂妙矣然非洙泗之風三千之弘化又曰延陵季子際會之間衛尉蔡君限之於弱余必以然季子通妙達道之機假其討光恐增禍亂受光之讓非其本志若季子之為君也欲行王道其與周爭治霸術以力與列國爭強則不肯破強楚而并其封疆也國人疾光而心歸季子季子不立社稷將傾恐光憂迷內灼而異圖外生非常之變將加于高人是以季子相時慮事順以安民而謂其弱未聞厥旨蔡子答曰諸兄以賢讓國與之冀能楊文武之遺教崇仁義之美化以移風易俗耳何必當與周爭乎而茍守一節退耕於野使還國無討賊之意反云國家有主社禝有祀乃吾君也蓋開篡弒之路非所謂從忠教也又曰揚子雲有深才潛知屈伸沉浮從容玄默近于柳下惠朝隱之風智似蘧瑗而高不及也班固稱之有大度不孜孜於富貴不戚戚於貧賤二者之美蓋亦良矣然楊子之書清貴甚遠然無廟堂之議對王公大人之辭故令其骨鯁不見節操不顯也夫孟子之書將門人所記非自作也故其志行多見非唯教辭而已或拒方鍾之祿或辭兼金之贈或以周漢禮殊二子時異不可責之於周或曰帝納異言而子雲無正論卒有投閣之纍孟軻昂昂其肯然子雲保家養智之士孟軻鳳峙高世之英也又曰周勃之勳不如霍光此前史所載較然可見而人以勃功大於光意竊不安何者勃本帝大臣居太尉之位擁兵百萬既有陳平王陵之力又有朱虛諸王之據酈寄遊説以譎諸呂因衆之心易以濟事若霍光者以倉卒之際受寄託之任輔弼幼主天下晏然遇燕王上官之亂誅除凶逆以靖王室廢昌邑立宣帝任漢家之重隆中興之祚參聲伊周為賢相推驗事校優劣明矣又曰汝南陳仲舉體氣高烈有王臣之節頴川李元禮忠平正直有社稷之能海內論二士有議而未決陳留蔡伯喈云仲舉強於犯上元禮長於接下犯上為難接下為易仲舉為先元禮後矣天下於是為定愚思竊以伯喈未必可從也夫皋繇戒舜犯上之征也舜治百揆接下之效也故陳平謂王陵言面折廷爭我不如公至安劉氏公不如我而犯上則為優是王陵當高於良平朱雲殊乎吳鄧矣陸恭仲答曰陳李二君德齊於行才等於身無長短之差時人或其先後魏文帝典論曰或有方周成王於漢昭帝者余以為周氏體聖考之作氣稟賢妣之胎教周邵為保傅呂尚為太師故咳笑必含仁義之聲觀聽必覿禮義之容弘踐祚之義隆太平之化禮樂興於上頌聲作於下時成王年二十二享國三十年世永治長德與年豐夫孝昭父非武王母非邑薑體不承聖化不胎育保無仁孝之德佐無隆平之治所謂生深宮中長婦人手矣德與體并智與性成孝昭之崩年二十有一承衰斃之世收雕落之民臣無淑聖之智身有短折之期欲高隆周豈不謬哉曹植漢二祖論曰高祖因暴秦而起官由亭長自亡徒招集英雄遂誅強楚光有天下功齊湯武業流後嗣誠帝王之元勳人君之盛事也直寡善人之美稱鮮君子之風采惑秦宮而不出窘項座而不起計失乎酈生忿過乎韓信太公是誥於孝違矣敗古今之大教傷王道之實義然其驍將藎臣皆古今之鮮有而能任其才而用之聽其言而察之故兼天下而有帝位也不然斯不免當世之妄夫世祖體乾靈之休德韜亞聖之才聰達而多識樂施而愛人神光前驅威風先逝軍未出於南京莽已斃于西都當此時也九州鼎沸四海淵涌言帝者二三稱王者四五咸鴟視狼顧虎超龍驤光武秉朱光之巨鉞震赫斯之隆怒蕩滌凶穢勦除醜類若徑風而縱烈火曬白日而掃朝雲也計功則業殊比隆則事異語德則靡愆言行則無穢卒能立不刊之遐迹建不朽之元功故曰光武其近優也曹植成王論曰周公以天下初定武王既終而成王尚幼未能定南面之事是以推己忠誠稱制假號二弟流言邵公疑之發金縢之匱然以用寤亦未決也至於昭帝所以不疑於霍光亦緣武帝有遺詔於光使光若周公踐天子之位行周公之事吾恐叛者非徒二弟疑者非徒邵公也且賢者固不能知聖賢自其宜耳昭帝固可不疑霍光周王自可疑周公也若以昭帝勝成王霍光當踰周公耶若以堯舜為成王湯禹作管蔡邵公周公之不見疑必也陳群汝潁士論曰群以為孔氏先汝潁士勝負之評矣孔答曰汝南戴子高親止千乘萬騎與光武帝共揖於道中潁川士雖抗節未有能頡頏天子者也汝南許子伯與友人共説世俗將壞同夜起舉聲號哭潁川士雖頗憂時未有能哭世者也汝南許掾太守劉晨圖開稻陂灌數萬頃纍世獲其功韓元長雖好地理未成功見效如許掾者也汝南張元伯身死之後見夢於范巨卿頴川雖有奇異未有鬼神能靈者也汝南應世叔讀書五行並下頴川雖多聰明未有能離婁並誦者也汝南李鴻為太尉掾弟殺人當死鴻自縛詣門乞代弟命使飲鴆而死弟因得全潁川士雖欲尚節義未有能煞身成仁者也汝南翟文仲為東郡太守始舉義兵以誅王莽潁川士雖疾惡未有破家為國者也汝南袁公著為甲科郎中上書欲治梁冀潁川士雖務忠讜未有能沒命直言者也何晏冀州論曰略言春秋以來可與海內比而校也恭謹有禮莫賢乎趙衰仁德忠義莫賢乎趙盾納諫服義莫賢乎韓起決危定國莫賢乎狐偃勇謀經國莫賢乎魏絳達讎為主莫賢乎祁奚延譽先主莫賢乎張老明智識物莫賢乎趙武清直篤義莫賢乎叔向聰明肅恭莫賢乎羊舌職守信不移莫賢乎荀息見利思義莫賢乎中行穆子憂國扞君莫賢乎先軫書法不諱莫賢乎董狐分謗和衆莫賢乎郤克流放能顯莫賢乎冀缺拔幽進滯莫賢乎臼季守義死節莫賢乎欒恭子坑言不屈莫賢乎荀瑩劫略不動莫賢乎解楊審聽知機莫賢乎師曠放而益顯莫賢乎狼曋儒雅博通莫賢乎董仲舒體恭篤敬莫賢乎石奮才兼文武千金不入私門莫賢乎竇嬰明君顯賢莫賢乎田叔證主知分莫賢乎貫高忠義正直莫賢乎鮑子都謇諤忠諫莫賢乎王宏張輔名士優劣論曰世人論司馬遷班固才之優劣多以固為勝余以為失遷敘三千年事五十萬言固敘二百年事八十萬言煩省不敵固之不如一也良史述事善足以獎勸惡足以鑒誡人道之常中流小事無取之因循難易益不同矣又遷為蘇秦張儀范睢蔡澤作傳逞辭流離亦足以明其大才也此真所以為良史也又曰世人見魏武皇帝處有中土莫不謂勝劉玄德也余以玄德為勝夫撥亂之主當先以能收相獲將為本一身之善戰不足恃也世人以玄德為呂布所襲為武帝所走舉軍東下為陸遜所覆未若武帝為徐榮所敗馬被創之危也玄德在荊州劉景升父子不能用其計舉州降魏手下步騎不滿數千為武帝大衆所走未若武帝為呂布奔北騎所擒勒突火之急也玄德為陸遜所覆未若武帝為張繡所困挺身逃遁以喪二子也若令高祖死於彭城世人方之不及項羽遠矣武帝死於宛下將復謂不及張繡矣而其安忍無親若楊德祖之徒多見賊害孔文舉桓文林等以宿恨見殺良將不能任行兵三十餘年無不親征功臣謀士曾無列土之封豈若玄德威而有思勇而有義諸葛孔明張飛關羽皆人傑也服而使之夫明暗不相為用臧否不相為使武帝雖處強不為用矣況在危急之間勢弱之地乎若令玄德據有中州將與周室比隆豈徒三傑而已又曰樂毅諸葛孔明之優劣乎或以毅為弱燕合五國之兵以破強齊雪君王之恥莫不謂毅為優余以為五國之兵共伐一齊不足為強大戰濟西伏尸流血不足為仁夫孔明苞文武之德劉玄德以知人之明屢造其廬咨以濟世至如奇策泉涌智謀縱橫遂東説孫權北抗大魏以乘勝之師翼佐取蜀及玄德終禪登大位在擾攘之際立童蒙之主設官分職班敘衆才文以寧內武以折衝勳業濟而殞觀其遺文謀謨弘遠雅規恢廓已有功則讓於下闕則躬自咎見善則遷納諫則改故烈聲震遐邇者也習鑿齒周魯通諸葛論曰客問曰周瑜魯肅何人也主人曰小人也客曰周瑜奇孫策於總角定大計於一面摧魏武百勝之鋒開孫氏偏王之業威震天下名馳四海魯肅一見孫權建東帝之略子謂之小人何也主人曰此乃真所以為小人也夫君子之道故將竭其忠直佐扶帝室尊主寧時遠崇名教若乃力不能合事與志違躬耕南畝遁迹當年何由盡臣禮於孫氏於漢室已亡之日耶客曰諸葛武侯翼戴玄德與瑜肅何異而子重諸葛毀瑜肅何其偏也主人曰夫論古今者故宜先定其所為之本迹其致用之源諸葛武侯龍蟠江南託好管樂有匡漢之望是有宗本之心也今玄德漢高之正胄也信義著於當年將使漢室士而更立宗廟絶而復繼誰云不可哉袁宏七賢序曰阮公瓌傑之量不移於俗然獲免者豈不以虛中犖節動無近對乎中散遣外之情最為高絶不免世禍將舉體秀異直致自高故傷之者也山公中懷體默易可因任平施不撓在衆樂同遊刃一世不亦可乎新序曰晉獻公用荀息之謀而禽虞不用宮之奇謀而亡故荀息非霸王之佐乃戰國并兼之臣也若宮之奇則可謂忠臣之謀也蔣子萬機論曰太史遷云顏回雖篤行不遇仲尼不能彰其名也故五尺之童德擬大舜使在他門未或及此也夫甘羅少回六歲獲河東五城萬乘郊迎而佩印雖所弘非道義然當秦之時染詐變之風也使羅在孔門治丘之訓亦可聞一知十乎曰未必也昔齊欲伐魯回求説陳常而孔子不許遂使子貢子貢一出破齊強晉士吳霸越存魯也夫顏子與賜程智比才相校於八至於此事而丘不使也抱朴子曰凡薄之徒雖便辟流俗而懷空枹虛有似蜀人瓠壺之喻胸中無一紙之識不過酒炙所謂冒于貨賄貪于飲食左生所載不才之子傅子曰夏侯玄求交於傅嘏嘏不納荀粲謂傅嘏曰夏侯太初一時之俊虛心交子不合則怨至二賢不睦非國之利也嘏答之曰太初能虛聲而無實才何平叔言遠而情近好辨而無誠鄧玄茂外徇名利內無關鑰此三人者皆敗德也孫子曰譙周勸王降魏何平曰自謂天子而乞降請命何恥之深乎夫為社稷死則死亡則亡先君正魏之篡不與同天過於其父俯首而事讎可謂茍存豈大君之正道哉郭子曰庾道季云蘭相如雖千載死人凛凛恆如有生氣曹蜍李志雖見在厭厭如九泉下又曰世中稱庾文康為豐年玉庾稚恭為荒年穀又曰魏明帝世使后弟毛曾與夏侯太初共坐時人謂蒹葭倚玉樹時目夏侯太初朗如明月入懷又曰人有問王長史王仲祖也江霦群從兄弟者王答云諸江皆能自生活又曰人問謝太傅王子敬可與先輩誰比謝答曰阿敬近王劉之間王修與真長又曰王子敬問謝公嘉賓何如道季嘉賓郤超小名庾和小名道季答云道季誠杪撮清悟嘉賓故自勝桓公稱云桓溫也鏘鏘有文武又曰王右軍道劉真長樹雲柯而不扶疏又曰桓公問孔思陽安石何如文度孔思未答反問公謂如何答曰安石居然不可陵踐又曰簡文云謝安南名奉字弘道清泠如其弟弟名躬字弘遠學義不如孔嚴嚴字彭祖又曰王丞相云雒下論以我比安期千里王丞字安期阮瞻字千里我亦不推此二人唯共椎王太尉夷甫也又曰周伯仁道桓茂倫欽崎歷落可笑之人也或云是謝幼輿言又曰王丞相言刀玄亮之察察刀協字玄亮戴若思之巖巖戴淵字若思卞望之峰岠並一見我而服也又曰祖士少道右軍王家阿菟菟羲之小名吾菟何緣復減處仲右軍道祖士少風領毛骨恐沒世不復見如此人王子猷説世目士少為朗邁我家亦以為徹朗又曰孫子荊應上品狀王武子時為之目曰天才英博亮拔不群
