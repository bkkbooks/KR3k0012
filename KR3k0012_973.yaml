body:
  text: 果部九蒲萄史記曰大宛以蒲萄為酒富人藏酒至萬餘石久者數十歲不敗漢使取其實來於是離宮別觀傍盡種蒲萄漢書曰李廣利為二師將軍破大宛得蒲萄種歸漢續漢書曰扶風孟他以蒲萄酒一斛遺張讓即以為涼州刺史三輔決録又載魏文帝詔群臣曰中國珍果甚多且復為説蒲萄當其朱夏涉秋尚有餘暑醉酒宿醒掩露而食甘而不䬼烏縣切脆而不酸冷而不寒味長汁多除煩解䬼又釀以為酒甘於麴孽善醉而易醒道之固以流涎音羡咽唾況親食之耶他方之果寧有匹者崔鴻十六國春秋前涼録曰張斌字洪茂燉煌人也作蒲萄酒賦文致甚美又後涼録曰建元二十年呂光入龜茲城胡人奢侈富於生養家有蒲萄酒或至千斛經十年不敗北齊書曰李元忠曾貢世宗蒲萄一盤世宗報以百練縑遺其書曰儀同位亞台鉉識懷貞素出藩入侍備經要重而猶家無擔石室若懸罄豈輕財重義奉時愛已故也久相嘉尚嗟詠無極恆思標賞有意無由忽辱蒲萄良深佩戴聊用絹百匹以酬清德唐書曰高祖賜群臣食於御前果有蒲萄侍中陳叔達執而不食高祖問其故對曰臣母患口乾求之不能得高祖曰卿有母可遺乎遂流涕嗚咽久之乃止因賜物百段又曰蒲萄酒西域有之前代或有貢獻人皆不識及破高昌收馬乳蒲萄實於菀中種之并得其酒法太宗自損益造酒為凡有八色芳辛酷烈味兼醍益既頒賜群臣京師始識其味又曰太宗時葉護獻馬乳蒲萄一房長二丈餘子亦稍大其色紫又曰李直方常第果實若貢士者以緑李為首芳梨為副櫻桃為三甘橘為四蒲萄為五或薦荔支曰寄舉之首也又曰罽賓在蔥嶺南踰縣度經熱坂其地暑濕人皆乘馬士宜粳稻多甘蔗蒲萄草木凌寒不死金樓子曰大月氏國善為蒲萄花葉酒或以根及汁醞之其花似香而緑榮碧鬚夏春之時萬頃競發如鸞翼八月中風至吹葉上傷裂有似綾紈故人呼風為蒲萄風亦名為裂葉風漢武帝內傳曰西王母嘗下帝設蒲萄酒杜篤邊論曰漢征胸奴取其胡麻稗麥苜蓿蒲亦廣地也廣志曰蒲萄有黃白黑三種雲南記曰雲南多乾蒲萄楊衒之洛陽伽藍記曰白馬寺浮圖前奈林蒲萄異於餘處枝葉繁衍子實甚大奈林實重七斤蒲萄實偉於棗味並殊美冠於中京帝至熟時常詣取之或復賜官人得之轉餉親戚以為奇異得者不敢輒食乃歷數家京師語曰白馬甜榴一實直牛唐景龍文館記曰四月上巳日上幸司農少卿王光輔莊駕還頓後中書侍郎南陽岑羲設茗飲蒲萄漿與學士等討論經史又曰大學士李嶠入東都祔廟學士等祖送城東上令中官賜御饌及蒲萄酒博物志曰西域有蒲萄酒積年不敗彼俗傳云可至十年飲之醉彌日不解又曰張騫使西域還得蒲萄晉宮閣名曰華林園蒲萄百七八十株秦州記曰秦野多蒲萄本草經曰蒲萄生五原隴西燉煌益氣強志令人肥健延年輕身王逸荔支賦曰西旅獻崑山之蒲萄鍾會蒲萄賦曰余植蒲萄於堂前嘉而賦之命荀勗並作應禎蒲萄賦曰結繁子之礧落兮英籠總而彌房傳玄蒲萄賦曰踰龍堆之險越懸度之阻涉乎三光之阪歷乎身熱之野橄欖金樓子曰有樹名獨分為二枝其東向一枝是木威樹南向一枝是橄欖樹南越志曰博羅縣有合成樹十圍去地二丈分為三衢東向一衢木葉似練子如橄欖而硬削去皮南人以為糝南向一衢橄欖西向一衢橄欖裴淵廣州記曰橄欖澀酒廣志曰橄欖大如雞子交州以飲酒南州草木狀曰橄子大如棗二月華八九月熟生食味酢蜜藏乃甜美交址武平興古九真有之臨海異物志曰餘甘子梭形初入口舌澀酸飲水乃甘又如梅實核兩頭鋭呼為餘甘橄欖同一物異名耳嶺表録異曰橄欖樹身聳枝皆高數尺其子深秋方熟閩中尤重味云咀之香口勝含雞舌香生喫及煮飲悉解酒毒有野生者子繁樹峻不可梯緣但刻其根下方寸許內鹽於其中一夕子皆自落樹枝節上生脂膏如桃膠南人採之知其皮葉煎之調如黑錫謂之橄欖糖用泥船損乾後牢於膠漆著水益乾堅耳左思吳都賦曰龍眼橄欖椰隋書曰林邑國人深目高鼻髮拳色黑俗皆徒跣以幅布纏身冬月衣袍婦人椎髻施椰葉席唐書曰訶陵國俗以椰樹花為酒其樹生花長三尺餘實大如人脛割之取汁以成酒味甘飲之亦醉南夷志曰荔支檳榔訶梨勒椰子桄榔等諸樹永昌麗水諸山皆有之雲南記曰南詔遣使致南國諸果有椰子狀如大牛心破一重粗皮刮盡又有一重硬殼有小孔以筯穿之內有漿二合餘味甘色白又曰雲南多椰子亦以漬之為糝廣志曰椰樹高六七丈無枝條有葉如束蒲乃在樹末實如大瓠瓜懸在樹頭實外有皮中有核皮裏有汁升餘清如水美如蜜可飲核中膚白如雪厚半寸味如胡桃而美可食出交址家家種之南方草木狀曰椰二月花花仍蓮著實房連相纍房三十或二十七八子十一月十二月熟其樹黃俗名為丹橫破之可作碗子長如栝樓子交州記曰椰子有漿截花以竹䇶承取汁作酒飲之亦醉神異經曰東南荒中有椰木椰高二三丈或十餘丈圍丈餘或七八尺葉三百歲盡落而華華如甘瓜華華盡落而生萼萼下生子三歲而熟熟後不長不減形如寒瓜長七八寸徑四五寸南州異物志曰椰樹大三四圍長六丈通身無枝至百餘年有葉葉狀如蒲長四五尺直竦指天實生葉間皮苞之如蓮狀皮硬過於核中肉白如雞子著皮而腹內空含汁大者含升餘實形團團然或如苽樓橫破之可為爵並堪器用南人珍之異物志曰椰樹高六七丈無枝條葉如束蒲在上其實如瓠繫之巔實外皮如胡蘆膚中有汁升餘清如水味美於蜜食其膚則不飢食其汁則增渴又有如兩眼處俗號椰子為越王頭嶺表録異曰椰子樹亦類海棕實號椰子大如甌盂外有粗皮如火腹次有硬殼圓而且堅厚二三分有圓如卵者即截開一頭砂石摩之去其皴皮其爛斑錦文以白金裝之以為水罐子珍奇可愛殼中有液數合如乳亦可飲之冷而動氣左思吳都賦曰椰葉無蔭俞益期箋曰有清漿數鬭懸於長木之端終不乾故為小異楊梅金樓子曰楊周年七歲甚聰惠孔君平詣其父父不在乃呼兒出為設果有楊梅孔公指以示兒曰此真君家果兒應聲答曰未聞孔雀是夫子家禽博物志曰地有章名則生楊梅南越志曰熙安縣白蜀里多楊梅張公以為名章則多楊梅此偶以所聞而命書後好事改地就之耳求之白蜀去之遠矣裴淵廣州記曰盧山頂有湖楊梅繞其際人登者止得於山飽食不得持下吳興記曰故章縣縣北有石槨山出楊梅常以貢御張華所謂地名章必生楊梅蓋謂此也食經曰藏楊梅法取完者一斛鹽漬之曝乾別取杭皮二斤煮汁鹽漬之不加蜜漬梅色如初美好可留數月臨海異物志曰楊梅其子如彈丸正赤五月中熟熟時似梅味甘甜酸梁江淹楊梅頌曰懷蕊挺實涵黃橘丹鏡日繡壑照霞綺巒沙棠山海經曰崑崙之山有木焉狀如棠棠梨黃華赤實味如李而無核名曰沙棠可以卻水呂氏春秋曰伊尹説曰果之美者沙棠之實南越志曰寧鄉果多沙棠笁法真登羅浮山疏曰羅浮山有沙棠華黃實赤味甘如李枸櫞裴淵廣州記曰枸櫞樹似橘如柚大而倍長味奇酢皮以蜜煮為劉欣期交州記曰枸櫞如柚核細異物志曰枸櫞實橘大如飯筥皮不香味不美可以浣治葛紵若酸漿嶺表録異曰枸櫞子形如瓜皮以橙而金色故人重之愛其香氣京輦豪貴家釘盤筵憐其遠方異果肉甚厚白如蘿蔔南中女工競取其肉鏤花鳥浸之蜂蜜點以燕脂擅其妙巧亦不讓湘中人鏤木瓜也益智十三國春秋曰安帝元年盧修為廣州刺史修遺劉裕益智粽裕乃答以續命湯顧徽廣州記曰益智葉如蘘荷莖如竹箭子從心中出一枝有十子子內白滑四破去之取外皮蜜煮為粽子味辛周景式廬山記曰山果有益智蒲萄廣志曰益智葉以襄荷長丈餘其根上有小枝高八九寸無葉萼其子藂生之如棗中辨黑皮白核小者曰益智含之隔涎濊出壽萬亦生交址南方草物狀曰益智如筆毫長七八分二月華五月六月熟味辛中芬香出交址合浦陳祁暢異物志曰益智類薏苡長寸許如枳椇子味辛剌飲酒食之佳惠遠法師答盧循書曰損餉深抱情至益智乃是一方異味即於僧中行之桶子廣志曰桶子似木瓜樹木南方草物狀曰桶子木如雞卵三月華八月九月熟味酸酢或以蜜藏滋味甜美出交址劉欣期交州記曰如桃陳祁暢異物志曰䅽子之樹枝葉四布枝葉滿蘇如車蓋也名同種異味實甜酢與作紙谷同名而實大異也果而無核裏面如素析酒止酲更為遺賂檖毛詩秦車轔晨風曰隰有樹檖毛云赤羅或云山梨今人謂之楊檖樹實如梨但小耳一名庶梨一名鼠梨陸機毛詩疏義曰樹檖一名赤羅一名山梨今人謂之楊檖樹及實如梨伹實奇小耳一名鹿鼠一名鼠梨齊郡廣縣堯山魯國河內共北中有今人亦種之極有美者赤梨之脆美者爾雅曰檖羅也郭氏曰今楊檖也實似梨而酢可食也廣志曰陽檖子似梨大如杏可食晉宮閣名曰華林園陽檖二株
