body:
  text: 職官部五十七太守論語子路曰善人為邦百年亦可以勝殘去殺矣善人居中不踐迹不入室也此人為政不能早有成功百年乃能無殘暴之人史記曰萬石君奮其父趙人也姓石氏奮長子建次子甲次子乙官皆至二千石於是景帝曰石君及四子皆二千石人臣尊寵乃集其門號奮為萬石君孝景季年萬石君以上大夫祿歸老于家以歲時為朝臣過宮門闕萬石君必下車趨見路馬必式焉又曰杜周為御史大夫家兩子夾河為守漢書曰郡守秦官也常治其郡祑二千石有丞邊郡又有史掌兵馬祑皆六百石景帝中二年更名太守又曰季布為河東太守孝文時人有言其賢召欲以為御史大夫又言其勇使酒難近至留邸一月見罷布進曰臣待罪河東陛下無故召臣此人必有以臣欺陛下者今臣至無所受事罷去此人必有毀臣者夫以一人譽召臣一人毀去臣臣恐天下有識聞之有以窺陛下韋昭曰窺見陛下深淺也上默然慚曰河東吾股肱郡故特召君耳又曰嚴助會稽人也上問所欲對曰願為會稽太守在郡數年不聞問上賜詔書曰君猒承明之廬石渠門外勞侍從之事懷故土出為郡間者闊焉久不聞問助惶恐上書謝曰臣事君猶子事父臣當伏誅願奉二年計最如淳曰舊法當使丞奉歲計躬自欲入奉之也最凡要也又曰朱買臣字翁子拜會稽太守上謂買臣曰富貴不歸故鄉如衣錦夜行今子何如買臣頓首辭謝買臣衣故衣懷其印綬步歸郡邸時會稽吏方相與群飲不視買臣買臣入室中守邸與共食且飽少見其綬守邸怪之前引其綬又視其印會稽太守章也守邸驚出相語上計椽吏皆醉大呼曰妄誕耳守邸曰試來視之其故人素輕買臣者入內視之還走疾呼曰實然座中驚駭丞守相推排陳列庭中拜謁又曰龔勝楚人也哀帝以勝守右扶風數月上知勝非撥煩吏遷勝光祿卿東觀漢記曰彭寵字伯通南陽宛人也父容哀帝時為漁陽太守有名於邊容貌飲食絶衆是時單于來朝當道二千石皆選容貌飲食者故容徙為雲中太守又曰馮勤字偉伯曾祖揚宣帝時為弘農太守生八男皆典郡趙魏間號為萬石諸馮至是世至二千石漢雜事曰蔣滿為上黨其子萬為北地都尉同詔徵見宣帝曰父子剖符耶即詔滿為淮陽相萬為弘農守後漢書曰郅惲再遷長沙太守先是長沙有孝子古初遭父喪未葬鄰人失火初匍匐柩上以身扞火火為之滅惲真異之以為首舉又曰任延為武威太守帝親見戒之曰善事上官無失名譽延對曰臣聞忠臣不私私臣不忠履正奉公臣子之節上下雷同非陛下之福善事上官臣不敢奉詔帝歎息曰卿言是也又曰橋玄為上谷太守上邽姜歧守道隱居名聞西州玄召以為吏稱疾不就玄怒勑督郵尹益逼致之曰歧若不至趣嫁其母趣音促益固爭不能得遽曉譬歧歧堅臥不起郡內士大夫亦往諫玄乃止時頗以為譏漢官解詁云太守專郡信理庶績勸農賑貧決訟斷辟興利除害檢察詳奸舉善黜惡誅殺暴殘者也魏志曰賈逵字梁道太祖征馬超至弘農曰此西道之要以逵領弘農太守召見計事大悅之謂左右曰使天下二千石悉如賈逵吾何憂也又曰劉靖馥之子也黃初中遷廬江太守詔曰卿父昔為彼州今卿復為此郡可謂能克負荷者也又曰曹仁字子孝太祖征呂布仁別攻句陽拔之數有功拜廣陽守太祖器其勇略不使之郡蜀志曰法正字孝直先主以正為蜀郡太守揚武將軍外統都畿內為謀主一餐之德睚眥之怨無不報覆擅殺毀傷己者數人或謂諸葛亮曰法正於蜀郡太縱橫將軍啓主公抑其威福亮答曰主公之在公安也北畏曹操之強東憚孫權之逼近則慮孫夫人生變於肘腋當斯之時進退狼跋法孝直為之輔翼令翻然翱翔不可復制如何禁法正使不得行其意也又曰劉琰字威碩魯國人也先主在豫州辟為從事以其宗姓有風流善談論厚親待之遂墮從周旋常為賓客先主定益州以琰為固陵太守吳志曰士燮為交址太守中國士人往依避難者以百數耽玩春秋為之注解陳國袁徽與尚書令荀彧書曰交址士府君既學問優博又達於從政處大亂之中保全一郡二十餘年疆場無事民不失業羈旅之徒皆蒙其慶雖竇融保河西曷以加之又曰周魴黃武中鄱陽大帥彭綺作亂攻沒屬城及以魴為鄱陽太守與胡綜等戮力致討遂生擒綺送詣武昌又曰陸績字公紀孫權統事辟為奏曹掾以直道見憚出為鬱林太守晉書曰桓玄出補義興太守鬱鬱不得志嘗登高望震澤歎曰父為九州伯兒為五湖長棄官歸國又曰辛恭靖隴西狄道人也少有器幹才量過人隆安中為河南太守會姚興來寇恭靖固守百餘日以無救而陷被執至長安興謂之曰朕將任卿以東南之事可乎恭靖厲色曰我寧為國家鬼不為羌賊臣興怒幽之別室經三年至元興中誑守者乃踰垣而遁歸于江東又曰鄭冲為陳留太守冲以儒雅為德蒞職不為幹局之譽而簞食縕袍不營資産世以此重之又曰劉世智字子房貞素有實兄風少貧窶每負薪自給讀書不輟竟以儒行稱歷吏部郎出為潁川太守平原管輅嘗謂人曰吾與劉潁川兄弟語使人神思清發昏不暇寐自此之外殆白日欲寢矣又曰劉胤王敦請為右司馬胤知敦有不臣心枕疾不視事以是誤敦意出為豫章太守辭以腳疾詔就家授印綬郡人莫鴻南土豪族因亂殺本縣令橫恣無道百姓患之胤至誅鴻及諸豪右界內肅然晉起居注太康八年詔曰昔先王御俗以興至治未有不先成民事者也漢宣識其如此是以歎息良二千石今欲皆先外郡治民著績然後入為常伯納言及典兵宿衛黃門散騎中書郎晉書呂光載記曰呂纂剋金城太守衛鞬韃瞋目謂光曰我寧守節斷頭不為降虜也光義而免之沈約宋書曰羊玄保為黃門郎善奕棊棊品第三太祖亦好棊數蒙引見嘉其溫謹與太祖賭郡戲勝以補宣城太守齊書曰王敬則遷吳興太守郡舊多剽掠有十數小兒於路取遺物敬則殺之以徇自此路不拾遺物郡無劫盜又録得一偷召其親屬於前鞭之令偷身長掃街路久之乃令偷舉舊偷自代諸偷恐為所識皆逃走境內以清又曰劉善明太祖踐祚以善明勳誠欲與善明祿召謂之曰淮南近畿國之形勝自非親賢不使居之卿為我臥治也代高宗為征虜將軍淮南宣城二郡太守又曰張岱時新安王子鸞以盛寵為南徐州割吳郡屬焉高選佐吏孝武帝召岱謂之曰卿美望夙著今欲用卿為子鸞揔刺史之任無謂小屈終當大伸也又曰王敬則為吳興太守入烏程從市過見屠肉枅結賢反歎曰吳興昔無此枅是我少時在此作也召故人飲酒說平生不以屑也南史曰謝超宗有高名齊高帝以超宗為義興太守升明二年坐公事免詣東府門自通其日風寒高帝謂四坐曰此客至使人不衣自暖矣三國典略曰王慶籍為京兆太守太祖以其精勤賚以紫袍及綾裳一襲謂百官曰王慶籍一世清人也又曰陰鏗為招遠將軍晉陵太守鏗嘗與賓友宴飲見行觴者因回酒矣以授之衆坐皆笑鏗曰吾儕終日酣酒而執爵者不知其味非人情也及侯景之亂鏗嘗為賊所擒或救之獲免鏗問其故乃前所行觴者梁書曰劉之遴為南郡太守初之遴在荊府常寄居南郡廨忽夢前太守袁彖謂曰卿後當為折臂太守則居此中之遴後果折臂遂臨此郡又曰謝朏字敬仲齊時為義興太守加秩二千石不省雜事悉付綱紀曰吾不能作主者但吏能作太守耳又曰任昉為吳興太守清潔友人到溉與弟洽從昉為山澤遊被代而還無衣沈約遺裙衫迎也又曰范縝為宜都太守性不信鬼神夷陵有伍相廟唐漢三神廟胡里神廟縝乃下教斷不祠後魏書曰房士達永安末轉濟南太守士達不入京師而頻為本州郡時人榮之又曰崔休為渤海太守時大儒張吾貴有盛名於山東四方學士咸相宗慕弟子自遠而至者常千餘人生徒既衆所在多不見容休乃為設俎豆招延禮接使肆業而還儒者稱為口實又曰盧道將為燕郡太守道將下車表樂毅霍光之墓而為之立祠又曰房幼愍安豐新蔡二郡太守坐事奮官居家忽聞有客聲出無所見還至庭中為家群犬所噬遂卒北史曰宋欽道仕齊歷位中山太守長於撫接然好察細事其州府佐吏使民間者先酬錢然後敢食臨蒞處稱為嚴整後周書曰盧光為京兆太守先是舍數有妖怪前後郡將莫敢居者光曰吉凶由人妖不妄作遂入居之未幾光所乘馬忽升廳事升床南首而立又食器無故自破光並不以介懷其精誠守正如此唐書曰崔玄亮清慎介獨自登朝行不樂趨競歷御史尚書密湖曹三部守每一遷秩謙讓輒形於色又曰李皓守太原舊俗有僧徒以習禪為業及死不斂但輿尸送近郊以飼鳥獸如是積年土人號其地為黃坑坑側有餓犬千數食死人肉因侵害幼弱遠近苦之前後官吏不能禁止皓到官申明禮憲期不再犯仍發兵捕殺群狗其風遂革三輔決録曰馬援誡兄子書龐伯高敦篤周慎口無擇言吾愛之重之願汝曹效之世祖見援書即擢為零陵太守在郡四年甚有治化文士傳曰文帝亦親阮籍常與談戲任其所欲不迫以職事籍常從容言昔曾遊東平樂其土風願得為東平太守文帝大悅即從其意籍便乘驢往之至郡皆壞府舍諸壁鄣使內外相望教令清當十餘日便復乘驢而去楚國先賢傳曰耒陽胡紹字伯蕃年十八為郡門下幹迎太守許荊荊足中風使紹柳之紹視荊跖音跖下而笑荊怒問之紹曰見明府跖下黑子紹亦有之欣而故笑荊視之果有黑子令其從學學八年遂為九真零陵二郡太守華陽國志曰趙瑤字元圭弟琰字稚圭瑤兄弟皆以令德著聞瑤少有公望遷扶風太守徙為蜀郡司空張溫謂之曰弟五伯魚從蜀郡入為司空吾今掃弟以待足下矣西京雜記曰朱買臣為會稽太守懷章綬還至舍亭而國人未知也所知錢勃見曝露乃勞之曰無罷乎遺以紈扇買臣至郡引為上客尋遷為掾吏韓子曰李悝為魏文侯上地之守而欲人之善射乃下令曰民有狐疑之訟者令之射杓中之者勝不中者負令且下而人皆習射日夜不休及與秦戰大敗之以民之善射也風俗通曰蜀郡任嘉年三四歲時父騰為諸生於漢中就師有盜賊道路斷絶蜀亦覆沒客轉長沙為州郡吏後嘉為長沙太守騰為奏曹掾默知嘉實其子曰嘉母語次謂嘉曰奏曹任掾則汝父也但差老耳嘉曰天下豈獨有一任夫人何以老更生邪意母曰咄我尚守養汝數十年無嫌譏豈以垂沒更失計哉顧實真父不可棄捐後嘉問掾聲音何類太守何州里耶掾曰本犍為武陽人蓬轉流宕到此母察審諦又識左耳前贅因出抱持對之流涕嘉自拔榻歔欷哽咽世說曰爰綜為新安太守南界有刻石爰至其下宴有人於石下得剪刀者衆咸異之主簿對曰昔長沙桓王嘗飲餞孫洲父老云此洲狹而長君當為長沙事果應夫三刀為州今得交刀君亦當為交州後果作交州世語曰荊州刺史裴潛以南陽周泰為從事使詣司馬宣王宣王知之辟泰泰九年居喪留鈌行之後三十六日擢為新城太守宣王為大會使尚書鍾育嘲之曰君釋褐登宰府三十六日擁麾蓋守兵馬典郡乞兒乘小車一何快耶泰曰君貴公之子故守吏職獼猴騎土牛一何遲也潘尼贈二李郎詩序曰元康六年尚書吏部郎汝南李光彥遷汲郡太守都亭侯江夏李茂曾遷平陽太守此二子皆弱冠知名歷職顯要旬月之間繼踵名郡離儉劇之勤就放曠之逸枕鳴琴以俟遠致離別之際各斐然賦詩
