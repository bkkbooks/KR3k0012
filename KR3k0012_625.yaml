body:
  text: 治道部五政治三管子曰國有四維一維絶則傾二維絶則危三維絶則覆四維絶則滅傾可正危可安覆可起滅不可復措也四維一曰禮二曰義三曰廉四曰恥又曰政之所行在順民心政之所廢在逆民心民惡憂勞我佚樂之民惡貧賤我富貴之民惡危墜我存安之民惡滅絶我生育之又曰凡牧民者使士無邪行女無淫事士無邪行教也女無淫事訓也教訓成俗而刑罰省也又曰善為國者使民若飢魚之歸餌渴馬之走飲又曰堯舜之民非生而治桀紂之民非生而亂故治亂在上也又曰聖人設度量置儀法如天地之堅如列星之固如日月之明如四時之信然故令往而民從之老子曰治大國若烹小鮮烹小鮮不敢橈恐其縻也治國煩則亂治身煩則精神散以道蒞天下者其鬼不神以道德治天下則鬼不敢見其精神以犯人也又曰聖人虛其心實其腹弱其志強其骨常使民無知無欲使夫知者不敢為也為無為則無不治矣又曰聖人無恆心以百姓心為心善者吾善之不善者吾亦善之信者吾信之不信者吾亦信之欲善信者吾因而善信之不善信者吾亦以善信教之聖人在天下惵惵為天下惲其心聖人治天下常惵惵心同惲用心皆為天下百姓皆注其耳目聖人皆孩之百姓頌注耳目以觀聽聖人聖人視百姓如嬰兒又曰以政治國以奇用兵以無事取天下以政教治國以奇計用兵皆不合道惟無事可以取天下吾何以知天下其然哉以此以此下文知之天下多忌諱而民彌貧國多忌諱人失作業故貧人多伎巧奇物滋起法令滋章盜賊多有法令益明竊盜為姦盡成盜賊故聖人云我無為而民自化我無事而民自富我好靜而民自正我無欲而民自朴老子曰其政悶悶其民淳淳其政察察其民缺缺文子曰水濁則魚險政苛則民亂墨子曰葉公子高問政於仲尼曰善為政者若何對曰善為政者遠者近之而舊者親之墨子聞之曰葉公子高未得其問也仲尼亦未得其對也孟子曰為高必因丘陵為下必因川澤為政必因先王之道孫卿子曰魯有子訟父者康子曰殺之孔子曰不教而誅之是虐殺不辜三軍之敗不可誅也獄犴不治不可刑也上陳教而先服之則百姓從風矣先教而後刑則民知罪矣夫一仞之墻民不能踰百仞之山童子升而遊焉陵遲久矣能謂民弗踰乎訟者聞之乃請無訟莊子曰至德之世山無蹊隧澤無舟梁烏鵲之巢可攀援而窺又曰聞在宥天下不聞治天下在之者恐天下之淫其性也宥之者恐天下之遷其德也天下不淫其性不遷其德豈有治天下者哉不淫不遷無為守分性既正矣德又定焉人皆治道何勞布政有治天下者哉昔堯之治天下也使天下欣欣焉人樂其性也是不恬也桀之治天下也使天下瘁瘁焉人苦其性是不愈也夫不恬不愈非德也非德而可長久者天下無之也又曰黃帝將見大隗于具茨之山適遇牧馬童子問塗焉曰若知具茨之山乎曰然若知大隗之存乎曰然黃帝曰異哉小童非徒知具茨之山又知大隗之所存請問為天下小童曰夫為天下者亦奚以異乎牧馬哉亦去其害馬而已矣又曰黃帝立為天子十九年令行天下聞廣成子在崆洞之上故往見之曰吾欲取天地之精以佐五穀以養民人又欲官陰陽以遂群生為之奈何廣成子曰而所欲問者物之質也而所官者物之殘也自而治天下雲氣不待族而雨草木不待黃而落日月之光益以荒矣而佞人之心翦翦焉又奚足以語至道哉翦翦狹劣貌尸子曰范獻子泛於河大夫皆在君曰孰知欒氏之子大夫莫答舟人清涓捨楫答曰君奚問欒氏之子若君修晉國之政內得大夫外不失百姓雖欒氏之子其若君何若不修晉國之政內不得大夫而外失百姓則舟中之人皆欒氏子也君曰善申子曰明君治國而晦晦而行行而止故一言正而天下定一言倚而天下靡商君書曰善治者使跖可信不能治者使伯夷可疑韓子曰或曰景公不知用勢師曠晏子不知除患夫獵者託車輿之安用六馬之足使王良左轡則身不勞而易及輕獸國者君之車勢者君之馬不乘君之車不因馬之利釋車而下走者也故曰景公不知用勢之主師曠晏子不知除患之臣也又曰桓公謂管仲曰官少而索者衆索求也寡人憂之管仲曰君無聽左右之請因能而授祿因功而與官人莫敢索君何憂焉又曰夫堯舜在上位雖有十桀紂不能亂者勢治也桀紂在上位雖有十堯而不能治者勢亂也又曰故善毛嬙西施之美無益吾面用脂澤粉黛則倍其初明法度必賞罰則國富而治法度賞罰者國之脂澤粉黛也孔叢子曰夫子適齊晏子就其館既燕而私焉曰齊其危夫譬若載無轄之車以臨千仞之溪其不顛覆亦難冀也子吾心也以齊為遊息之館當或可救子幸不吾隱也夫子曰死病不可為醫夫政令者人君之銜轡所以制下也今齊君失之已久也子雖欲挾其輈而扶其輪良弗及也抑猶可以沒齊君及子身過此而往齊其田氏矣又曰定公問曰周書所謂庸庸祇祇畏畏顯民何謂也孔子曰不失其道明之於民之謂也夫能用可用則政治矣敬可敬則尚賢矣畏可畏則省刑矣人君審此三者明以示民而國不興未之有也又曰哀公問書稱夔曰於豫擊石拊石百獸率舞庶尹允諧何謂也孔子對曰此言善政之化乎物也古之帝王功成作樂其功善者樂和樂和則天地且猶應之況百獸乎夔為帝舜樂正實能以樂盡治理之情公曰然則政之大本莫尚夔乎孔子曰夫樂所以歌其成功非政之本也衆官之長信既咸熙然後樂乃和焉又曰孔子之衛衛將軍文子問曰吾聞魯公父氏不能聽獄信乎孔子答曰不知其不能也夫公父氏之聽獄有罪者懼無罪者恥文子曰有罪者懼聽之察刑之當也無罪者恥恥何乎孔子曰齊之以禮則民恥矣刑以止刑則民懼矣文子曰今齊之以刑刑猶弗勝何禮之齊孔子曰以禮齊民譬之於御則轡也刑以齊民譬之於銜則鞭也執轡於此而動於彼御之良也無轡而用策則馬失道矣文子曰以御言之左手執轡右手運用不亦速乎若任轡無策馬何懼哉子曰吾聞古之善御者執轡如組兩驂如舞非策之助也是以先王盛於禮而薄於刑故民從命也廢禮而尚刑民彌暴矣又曰子思問於夫子曰亟問夫子之詔正俗化民之政莫善於禮樂也管子任法以治齊而天下稱仁焉是法與禮樂異用而同功也何必但禮樂哉子曰堯舜之化百世不輟仁愛之風遠矣管仲之智足以定法材非管氏而專任法終必亂成矣又曰孟軻問子思曰堯舜文武之道可力而致乎子思曰彼人也我人也稱其言履其行夜思之晝行之滋滋焉汲汲焉如農之趍時商之趍利惡有不致者乎又曰穆公問子思曰吾國可興乎子思曰可公曰為之奈何對曰茍君與大夫慕周公伯禽之治行其政化開公家之惠杜私門之利結恩百姓修禮鄰國其興也勃矣又曰衛君問子思曰寡人之政何如答曰無非君曰寡人不知其不肖亦望其如此也子思曰希旨容媚則君親之中正弼非則君疏之夫能使人富貴貧賤者君也在朝之士孰肯舍其所以見親而取其所以見疏乎是故競求射君之心而莫有非君之者此臣所謂無非也公曰然乎寡人之過也今知改矣答曰君弗能焉口順而心不懌者臨事必痝君雖有命臣未敢受也又曰信陵君問曰古之善為國至於無訟其道何由答曰由乎政善也上下勤德而和德無不化俗無不和衆之所譽政之所是也衆之所毀政之所非也毀譽是非與政相應所以無訟也又曰子順相魏改嬖寵之官以事賢才奪其不任之祿以賜有功諸喪職者不悅造謗言文咨以告且曰夫不善前政而有成孰與變之而起謗哉子順曰民之不可與慮始久矣古之善為政者其初不能無謗子産相鄭三年而後謗止吾先君之相魯三月而後謗止今吾為政日新雖不及聖賢庸知謗止獨無時乎文咨曰子産之謗嘗亦聞之未識先君之謗何也子順曰先君初相魯魯人頌曰麛裘而芾投之無戾芾而麛裘投之無郵及三月政化既行民又作頌曰袞衣章甫實獲我所章甫袞衣惠我無私文咨喜曰乃今知先生不異乎聖賢矣又曰新桓固謂子順曰賢者所在必興化致治今子相魏未聞異政而即自退其身者志不得乎何去之速也答曰以無異政所以自退也且死病無良醫今秦有吞食天下之心以義事之故不獲安救亡不暇何化之興昔伊摯在夏呂望在商而二國不治豈伊呂之不欲哉勢不可也又曰尹魯謂子魯子之讀先王之書將奚以為答曰為治世世治則助之行道世亂則獨治其身治之至也又曰建初元年大旱天子憂之問群臣政教得失子豐乃上疏曰臣聞為不善而災報得其應也為善而災至遭時運之會耳非政所治也昔成湯遭旱因自責省畋散積減御損膳而大有年意者陛下未為成湯之事焉天子納其言淮南子曰治國者若耨田去害苗而已今沐者墮髮而猶為之不已以其所去者少所利者多又曰聖主之治也猶造父之御也和輯乎轡銜之際而緩急乎唇吻之和正度乎胸臆之中而執節乎掌握之間內得於中心而外合於馬志是故能進能退履繩而還曲中規取道致遠而氣力有餘誠得其術也是權勢者人主之車輿也大臣者人主之四馬也體離車輿之安而手失四馬之心能無危者古今未之聞也是故輿馬不調王梁不能以取道理君臣不和唐虞不能為治執術以御之則管晏之知盡矣明分以視之則跖蹻之姦止矣又曰惠子為惠王為國法惠王梁惠王也惠子惠王師也已成而示之諸先生示為國法先生皆善之奏之惠王惠王甚説之以示翟璜曰善惠王曰善可行乎翟璜曰不可惠王曰善而不可行何也翟璜對曰今夫舉大木者前呼邪許後亦應之此舉重勸力之歌也豈無鄭衛激楚之音哉然而不用者不若取是其宜也治國者禮不文辨故老子曰法令滋章盜賊多有此之謂也又曰田駢以道術説齊王齊王應曰寡人之治齊國也道術難以除患願聞國之政田駢對曰臣之言無政而可以為政譬之若林木無林而可以為林願王察其所謂而自取齊國之政焉已雖無除其患天地之間六合之內可陶冶而變化也齊國之政何足問哉又曰昔者五帝三王之蒞政施教必用參五何謂參五仰取象於天俯取度於地中取法於人乃立明堂之朝行明堂之令明堂布政之宮有十二月之政令以調陰陽之氣而和四時之節以辟疾病之蕃俯視地理以制度量察陵水澤肥墩高下之宜立事生財已除飢寒之患中之考乎德以制禮樂行仁義之道以治人倫而除暴亂之禍乃澄列金木水火土之性澄清故立父子親而成家別清濁五音六律相生之數以立君臣之義而成國察四時季孟之序立長幼之禮而成官此之謂參制君臣之義父子之親夫妻之辨長幼之序朋友之際此之謂五乃裂地而州之分職而治之築城而君之割宅而異之分財而衣食之立太學而教誨之夙興夜寐而勞力之此治之紀綱也然得其人則舉失其人則廢又曰天地之生物也有本末其養物也有先後人之於治國也豈得無終始故仁義者治之本也今不知事修其本而務治其末是釋其根而灌其枝也且法之生也以輔仁義重法而棄義是貴其冠履而忘其頭足也故仁義者為厚定者也不益其基而張其廣者毀不益其基而增其高者覆趙政不增其德而纍其高故滅智伯不行仁義而務廣地故亡國語曰不基其棟不能任重重莫若國棟莫若德國主之有民也猶城之有基木之有根根深即本固基美則上寧又曰禹以夏王桀以夏亡湯以殷王紂以殷亡非法度不存也紀綱不張而風俗壞也三代之法不亡而世不治者無三代之智也六律具存而莫能聽者無師曠之耳也故法雖在必待聖而後治律雖具必待耳而後聽故國之所以存者非以有治也以有賢人也其所以亡者非以無法也以無聖人也又曰治國譬若張瑟大絃絙絙急也則小絃絶矣故急轡數策者非千里之御也清聲不過百里無聲之聲施於四海是故祿過其功者損名過其實者蔽情行合而名副之禍福不虛矣身醜夢不勝正行國有妖祥不勝善政
