body:
  text: 人事部五十一交友五傅幹與張叔威書曰吾與足下義結紈素恩比同生東方朔與公孫弘書曰爵祿不相責以禮同類之遊不以遠近為故東門先生居蓬戶空穴之中魏公子一朝以百騎造之呂望未嘗與文王同席而唑一朝讓以天下半大丈夫相知何必接塵而遊垂髮齊年哉張奧與延叔堅書曰吾與叔堅剖心相知豈以流言相猜耶曹植離友詩曰王旅旋兮背故鄉彼君子兮篤人綱騰駕行兮歸朔方馳原隰兮尋舊疆郭璞贈溫嶠詩曰人亦有言松竹有林及爾臭味異本同岑言以忘得交以淡成謝眺贈友人詩曰芳洲有杜若可以贈佳期清風動簾夜孤月照窗時安得同攜手酌酒賦新詩陸倕贈京邑僚友詩曰時逢世道泰騫足步高衢江間寒事早夜露傷秋草心屬姑蘇臺目送邯鄲道李郭或同舟潘夏時方駕歡娛終美景敷文永清夜捉膝豈異人戚戚皆明婭蕭鈞晚景遊泛懷友詩曰龍門低御溝鳳轄轉芳州雲峰初辨夏麥氣早迎秋山翠餘煙積川平晚照收浪隨文鷁轉波逐彩鴛浮風花輕未洛巖泉咽不流一辭金谷菀空想竹林遊潘嶽詩曰投分寄石友白首同所歸古善哉行曰月沒參橫北斗闌干親友在門忘寢與餐請交不許後漢書曰侯霸欲友王丹霸子見丹下車拜丹答拜霸子曰大人方願交歡奈何拜小子丹曰君房有是言丹未之許也又曰張霸遷侍中時皇后兄虎賁中郎將鄧騭當朝貴戚聞霸名行欲與為交逡巡不答衆笑其不識世務魏志曰將軍張遼與其護軍武周有隙遼就刺史溫恢求交胡質質辭以疾遼出遇質曰僕安意於君何以相孤如此質曰古人之交也多取知其不貪奔北知其不怯聞流言而不信故可終也武伯南身為雅士往者將軍稱之不輟於口今以睚眥之恨反成嫌隙況質才薄豈能終好是以不願也遼感其言復與周平蜀志曰劉巴字子初零陵先賢傳曰張飛嘗就巴宿巴不與語飛遂忿恚諸葛亮謂巴曰飛雖實武人愛慕足不足下雖天爵素高宜少降意巴曰丈夫處世當交四海英雄如何與兵子共語晉書曰解系字少連濟南人也系及二弟結育並清身潔己甚有聲譽時荀勗門宗弘盛勗諸子謂系等曰我與卿為友應向我公拜勗曰我與君尊先使君親厚系曰不奉先君遺教公若與先君厚往日哀頓當垂書問親厚之誨非所敢承勗父子大慚梁書曰庾詵字彥實新野人也性純夷簡罕所遊狎河東柳惲欲與之交拒而不許齊春秋曰王僧祐字喬宗亭然獨立不交當代名士王思遠之徒託意請交並不降意自天子及侯伯未嘗與一人遊焉嵇康高士傳曰井丹字太春扶風人也博學故京師為之語曰五經紛綸井太春未嘗書剌候謁人梁松請友丹不肯見後遂隱遁皇甫士安高士傳曰嚴遵字君平蜀人也揚雄少從之遊數稱其德李溫為益州牧喜曰吾得君平為從事矣雄曰可備禮與相見其人不可屈也王鳳請交不許歎曰益我財者損我神生我名者殺我身故不仕時人服之世說曰何晏鄧揚夏侯太初並求傳嘏交而嘏終不許諸人乃因荀粲說合之傳曰夏侯太初志大心勞能合虛譽誠所謂利口覆國之人鄧揚何晏有為而躁博而寡要外好名利而內無關籥此三賢者皆敗德之人耳遠之猶恐罹禍況可親之哉後皆如其言又曰南陽宗世林與魏武同時而薄其為人不與之交及魏武作司空總朝政從容問宗曰可以交未答曰松柏之志甚存世交後漢書曰孔僖字仲和魯人也祖父建少遊長安與崔篆仕王莽為建新大尹僖與崔篆孫駰復相友善焉晉書曰咸寧初有司奏何劭及兄遵等受故鬲令袁毅貨雖經赦宥宜皆禁止事下廷尉詔曰太保與毅有纍世之交遵等所取蓋薄一皆置之父子交左傳襄五年曰初伍參與蔡太師子朝友其子伍舉與聲子相善聲子子朝之子也伍舉出奔鄭將遂奔晉聲子將如晉遇之於鄭郊班荊相與食班布也布荊坐地朋友世親也魏書曰陳群字長文通達有識度其所交皆父黨也魯國孔融與群父紀友又與群交王隱晉書曰王戎隨父渾在郎舍時阮籍亦為郎每詣渾輒云與卿語不如阿戎談戎時年十五籍乃交焉北齊書曰陸昂字雲駒洛陽人也父子璋魏中書監昂為河間邢劭所賞邢又與子璋交遊嘗謂子璋云吾以卿老蚌復出明珠高士傳曰班嗣在京師家有賜書內足於財父黨揚子雲已下莫不造門唐書曰郤士美字和夫少好學善記覽父友顏真卿肅潁士輩嘗與之討論經傳應對如流既而相謂曰吾曹異曰當交二郤之間矣汝南先賢傳曰薛勤字恭祖仕郡為功曹陳仲舉時年十五為父齎書詣勤勤顧而察之明日造焉仲舉父出迓勤勤曰足下有不凡子吾來候之不從卿也言義盡日道學論曰許邁字叔玄清虛接真遐棲世表志在往而不返故自改名遠遊與王右軍父子為世外之交王亦辭榮好養生之事每造遠遊未嘗不彌日忘返束哲吊蕭孟恩文曰東海蕭惠字孟恩者父昔為御史與哲先君同僚孟恩及哲旦夕同遊分義早著孟恩夫婦皆亡門無立嗣哲時有伯父從兄之憂未獲自往致文一篇以弔其魂絶交毛詩谷風曰谷風剌幽王也天下俗薄朋友道絶焉又曰伐木廢則朋友缺矣史記曰相國曹參始微時與蕭何善及為將相有隙又曰越石父賢在於縲紲之中晏子出遭塗解左驂贖之載歸弗謝入門久之石父請絶晏子懼然攝衣冠謝曰晏雖不仁免子於厄何求絶之速也石父曰不然吾聞君子屈於不知己而伸於知己者方吾在縲紲之中彼不知我也夫子既已感而贖我者是知己知己而無禮固不如縲紲之中漢書曰張耳陳餘始居約時相然信死豈顧問哉及據國爭權卒相滅亡勢利之交古人羞之蓋謂是矣又曰蕭育少與陳咸朱博為友著聞當世往者有王貢故長安人語曰蕭朱結綬王貢彈冠言其相薦達也始育與公卿子顯名咸最先進年二十餘為御史中丞時朱博尚為杜陵亭長為咸育所舉援後遂並歷刺史郡守相及為九卿而博先至將軍上卿歷位多於咸育遂至丞相育與博後有隙不能終故世以友為難也范曄後漢書曰許劭少峻名節好人倫多所賞識劭邑人李達杜直有高氣劭初善之而後有隙東觀漢記曰梁鴻初與京邑蕭友善約不為陪臣及友為郡吏鴻以書責之而去又曰王良字仲子東海人少清高為司徒司直以病歸一歲復徵至滎陽疾篤不任進道乃過其友人友人不肯見曰不有忠言奇謀而取大位何其往來屑屑不憚煩也遂拒之良慚自後連徵輒稱疾魏志鍾繇傳曰王弼為人淺而不議物情初與王黎荀融友善黎奪其黃門郎於是恨黎與融亦不終又曰管寧與華歆同學歆聞車馬聲出門寧割席曰子非吾友也徐廣晉記曰相國掾魏諷有盛名同郡任覽與諷友善鄭袤謂覽曰諷姦雄必以禍終子宜絶之後諷果敗齊書曰初劉逖與祖班以丈義相得結陳雷之契又為弟俊聘班之女將免魏彥深等也以告逖仍付密啓令其奏聞彥深等頗知之先自申理班由是疑逖告其所為及班被出逖遂遣弟離婚其輕交易絶如此唐書曰韋澳貫之之子也大和六年擢進士弟兄溫與御史中丞高元俗友善溫請用澳為御史謂澳曰高二十九持憲綱欲與汝相面汝必得御史澳不答溫曰高君端士汝不可輕澳曰然恐無呈身御史終不詣元裕之門袁叔真隱士傳曰鶡冠者或曰楚人也隱居山林衣斃履穿以鶡為冠莫測其名因服成號著書言道家事馮暖嘗師事焉暖後顯於趙鶡冠子懼其薦己也乃與暖絶焉新序曰吳有士張胥鄙談夫吾前交而後絶張胥鄙有罪拘將死談夫吾合徒取之出於道而後知其夫吾輟行而辭曰吾義不同子故前交而後絶吾聞之君子不以安肆志不為危易行吾今從子是安則肆志危則易行也吾因子而生子若反拘而死闔廬聞之命吏釋之胥鄙辭曰吾義不同於談夫吾故不受其任矣今利以是出誠以談夫吾故免也遂觸牆而死談夫吾聞之曰致任而不受佞也不知而出之愚也佞不可以接上愚不可以事君吾行虛矣人惡以吾力生吾亦恥以此立於世乃絶頸而死後漢朱公叔絶交論曰世之務交遊也甚矣不惇于業不忌于君犯禮以追之背公以從之事替義退公輕私重劉孝標廣絶交論曰騁黃馬之劇談縱碧雞之雄辨於是有弱冠王孫綺紈公子道不掛於通人聲未遒於雲閣是曰談交魚以泉涸而煦沫鳥因將死而鳴哀斷金由於湫隘刎頸起於苫蓋是曰窮交馳鶩之俗澆薄之倫無不操權衡秉纖纊衡所以量其輕重纊所以屬其鼻息若衡不能舉纊不能飛雖顏冉龍翰鳳雛曾史蘭薰雪白視若遊塵遇如土梗近世有樂安任昉見一善則盱衝扼捥遇一才則揚眉抵掌雌黃出於脣吻朱紫由其月旦於是冠蓋輕湊衣裳雲合輜軿擊轊坐客恆滿及瞑目東越歸駭洛浦繐悵猶懸門罕漬酒之彥墳未宿草野絶動輪之賓藐是諸孤朝不謀夕自昔把臂之英金蘭之友曾無羊舌下泣之仁寧慕郈成分宅之德太行孟門豈云嶄絶是以耿介之士疾其若斯獨立高山之頂歡與麋鹿同群袁嶠與禇左軍解交書曰皇太后踐登正祚臨御皇朝將軍之於國外姓之太上皇也與將軍遊處少長雖世譽先後而臭味同歸平昔之交禮與數而降箕踞之欣隨位事而替雖欲虛詠濠肆脫落儀制其能得乎嵇康與山濤絶交書曰足下見直木必不為輪曲者不以為桷蓋不欲枉其天材令得其所不可自好章甫強越人以文冕也今但願守陋巷教子孫時時與親舊敘闊陳說平生濁酒一杯彈琴一曲志願畢矣
