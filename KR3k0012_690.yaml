body:
  text: 服章部六衣白虎通曰衣者隱也裳者鄣也所以隱形自鄣蔽也釋名曰衣者依也人所依以疵寒暑也爾雅曰衣裗音旒謂之䘽音霓衣褸也齊人謂之褗或曰袿衣之飾也黼領謂之襮繡剌黼文以褗領也襮音博之緣謂之純衣緣飾也袕謂之褮衣開孔也孔袕音穴褮音褮衣皆謂之襟交領衱居業切謂之裾衣後裾也𥘞謂之袸辭見切衣小帶也佩𥘞謂之禐佩玉之帶上屬執衽謂之結持衣上衽扱衽謂之擷音擷扱衣上衽於帶衣蔽前謂之䄡今黻膝也婦人之禕謂之縭緌也即今之香纓也禕邪交絡帶繫於體因名為禕緌繫也裳削幅謂之纀蒲木切削殺其幅深衣衣裳世本曰胡曹作衣宗裏注曰黃帝臣也易曰黃帝堯舜垂衣裳而天下治蓋取諸乾坤上衣下裳乾坤之象又曰訟卦上九或錫之鞶帶終朝三禠之象曰以訟受服亦不足敬也書曰子欲觀古人之象日月星辰山龍華蟲作會宗彝藻火粉米黼黻繡以五采彰施于五色作服汝明又說命曰唯衣裳在笥禮曰夫為人子者父母存衣冠不純素孤子當室衣冠不純采純緣又曰季康之母死陳褻衣褻衣非上服敬姜曰婦人不飾不敢見舅姑將有四方之賓來褻衣何為陳於斯命撤之又曰孔子曰昔先王未有火化食草木之實鳥獸之肉飲其血茹其毛未有絲麻衣其羽皮後聖有作治其絲麻以為布帛又曰朝玄端夕深衣深衣三祛謂大夫士也祛尺二寸縫齊倍要衽當旁袂可以回肘長中繼掩尺祫二寸祛尺二寸緣廣寸半以帛裏布非禮也士不衣織無君者不二采衣正色裳閒色非列采不入公門振絺𥿭不入公門振裘不入公門襲裘不入公門纊為繭縕為袍禪為網帛為褶又緇衣曰子曰長民者衣服不二從容有常以齊其民則民德歸一左傳曰袞冕黻珽黻韋𩏂以黻膝也珽玉笏也帶裳幅舄帶革帶也衣下曰裳幅今之行膝者舄復履衡紞紘綖衡持冠者紞冠之垂者紘纓從下而上者綖冠上覆昭其度也藻率鞞鞛藻率以韋為之所以籍王鞞佩刀削上飾鞛下飾鞶厲游纓鞶紳帶也一名大帶厲大帶之垂者游旌旗之游纓在馬膺前昭其文也又曰狄人伐衛衛懿公與石子玦與寧莊子矢使守曰以此贊國擇利而為之與夫人繡衣曰聽於二子取其文章順序又曰欒武子曰若敖蚡冒篳路藍縷以啓山林若敖蚡冒皆楚之先君蓽路柴車一藍縷斃衣也又曰吳季札聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉詩曰碩人其頎衣錦褧衣褧單也尚以禪衣謂其文之大著又曰縞衣綦巾聊樂我員又曰蜉蝣之羽衣裳楚楚蜉蝣之翼采采衣服蜉蝣掘閲麻衣如雪又曰青青子𥘞悠悠我心青𥘞青領也學子之所服又曰山有樞隰有榆子有衣裳弗曳弗婁又曰緇衣美鄭武公也緇衣之宜兮敝子又改為兮緇衣之好兮敝子又改造兮緇衣之席兮敝子又改作兮席大也又曰衣錦褧衣裳錦褧裳又豈曰無衣七兮不如子之衣安且吉兮豈曰無衣六兮不如子之衣安且燠兮又豈曰無衣與子同袍豈曰無衣與子同澤澤褻衣豈曰無衣與子同裳又曰君子至止黻衣繡裳又曰七月流火九月授衣一之日觱發二之日栗烈無衣無褐何以卒歲史記曰文帝衣弋綈所幸慎夫人令衣不得曳地漢書曰齊國有三服之官奉獻冠幘縱為首服紈素為冬服輕綃為夏服又曰韓信既平齊項羽使武涉說信背漢歸楚信曰臣事項王官不過郎中位不過執戟漢王豫我上將軍印授我兵數萬解衣衣我推食食我夫人深親信我我背之不祥雖死不易幸為信謝項王又曰武帝末郡國賊盜群起暴勝之為直指使者衣繡衣持斧捕之又曰朱博為琅琊太守勑官屬多作衣褒大祒音紹招聘也不中節度自令掾吏令去地三寸又曰帝賜南粵主他上禇五十衣中禇三十衣下禇二十衣以綿裝衣曰禇上中下者綿之多少厚薄差又曰江充初召見犬臺宮自請願以所常被服冠見上上許之充衣紗縠單衣曲裾後垂交輸如淳曰交輸割正幅使一頭狹狀若燕尾垂之兩旁見於後也冠禪纚步搖冠飛翮之纓服虔曰冠禪纚故行則搖以鳥羽作纓也步容貌甚壯帝望而異之謂左右曰燕趙固多奇士又曰雋不疑佩環玦褒衣博帶盛服至門下謁暴勝之又曰王吉字子陽好車馬衣服自奉養極為鮮明而遷徙所載不過囊衣天下服其廉而怪其奢世傳子陽能作黃金後漢書曰更始時授官爵皆群小賈豎膳夫庖人多著繡而衣錦袴䄡䄖諸于罵詈道中時智者見之以為服之不中身之災也漢書音義曰諸于大掖衣也如婦人之袿衣揚雄方言曰䄡䄖其短者自關之西謂之裗䘿郭璞注曰俗名䘿䘸據此即是諸于上加繡䘿如今之半臂也䘪音充䘿音屈又曰光武見來歙大歡即解衣以衣之又曰祭遵為人廉約家無私財常衣韋袴寢布被夫人裳不加緣又曰祭彤在遼東幾三十年衣無兼副顯宗美其清約賜之衣被什物無不悉備又曰耿恭自疏勒回衣屨穿決形容枯槁又曰東平憲王蒼侍肅宗饗衛士於南宮因從皇太后周行掖庭池閲陰太后舊時器服愴然動容乃命留五時衣各一襲五時衣謂春青夏朱季夏黃秋白冬黑也衣單復具曰襲及常所御衣合五十篋餘悉分布諸王公主及子孫在京師者各有差特賜蒼及琅邪王京書曰間饗衛士於南宮因閲視舊時衣物惟王有孝友之德今送光烈皇后假髻帛各一及衣一篋可時奉瞻以慰凱風寒泉之思又欲令後生子孫得見先后衣服之製又曰明德馬后身長七尺二寸方口美髮能誦易好讀春秋常衣大練裾不加緣大練大帛也杜預注左傳曰大帛厚繒也朔望諸姬主朝請望見后袍衣踈粗反以為綺縠就視乃笑后辭曰此繒特宜深色故用之耳六宮莫不歎息謝承後漢書曰袁忠乘船戴笠詣王朗見朗左右僮從皆著青絳采衣非其奢麗即辭疾發而退也又曰郭賀拜荊州剌史有殊政顯宗巡狩到南陽特見嗟嘆賜以三公之服黼黻冕旒勑行部去幨幃令百姓見其容服以彰有德魏志曰文帝詔曰三世長者知被服五世長者知飲食此言被服飲食難曉也又曰明帝徵管寧為光祿勳辭不就詔問青州剌史程喜寧守節高乎審疾尫頓耶喜上言寧恆著皂帽布襦袴布裙時單復出入閨庭能自柱杖不須扶持四時祭祀輒自力強改加衣服著絮巾故在遼東所有白布單衣親薦饋饌跪拜成禮魏略曰文昭甄后以漢光和五年十二月丁酉生每寢寐家中髣佛見有人持玉衣覆其上者常共怪之魏氏春秋曰王允為吏部郎中選郡守明帝疑其所用非次召入將加罪允妻阮出謂曰明主可以理奪難以情求允頷之而入帝怒詰之允對曰某郡太守雖限滿文書先至年限在後月限在前帝取事視之乃釋遣出望其衣敗曰清吏也吳書曰孫權每賜周瑜衣寒暑皆白領諸將皆不及晉書曰石崇以奢豪矜物廁常有十餘婢列侍置香粉有客如廁皆易新衣而出客多羞脫故而王敦脫故著新意氣無怍婢相謂曰此必能作賊又曰高士郭文字文舉河內軹人也洛陽陷奔吳居大辟山恆著鹿裘葛巾餘杭令顧揚與葛洪造之揚使致韋衣不納使置室中乃爛於內竟不服用王隱晉書曰董威輦不知何許人忽見洛陽止宿白社於市得殘繒輒結以為衣號曰百結衣宋書曰沈慶之領隊防東掖門劉湛被收之夕上開門召慶之慶之戎服履韎縛袴入上見而驚曰卿何意乃爾急裝慶之曰夜半喚隊主不容換服又曰明帝體肥憎風夏月常著小皮衣又曰明帝疾召禇彥回入帝坐帳中流涕曰吾近危篤故召卿欲使著黃羅來可切耳指床頭大函曰文書皆函得不復開彥回亦悲不自勝黃羅乳母服也又曰范曄性精微有思致觸類多善衣裳器服莫不增損制度世人皆法學之又曰江湛字微深為吏部尚書家甚貧不營財利餉饋盈門一無所受無兼衣餘食嘗為上所召遇浣衣稱疾經日衣成然後起又曰謝超宗為義興太守升明二年公事免詣東府門自通其日風寒高帝謂四卒曰此客至使人不衣自暖矣齊書曰宋元嘉制諸主入齊閣得自服裾帽見人主唯出太極西廂乃備朝衣車駕幸其第乃白服烏紗帽以侍宴焉至於衣服制度動皆陳啓事無專制又曰高帝即位後手詔賜張融衣曰見卿衣服粗故誠乃素懷有本交爾藍縷亦虧朝望今送一通故衣意謂雖故乃勝新也是吾所著已令裁減稱卿之體并履一量又曰陶弘景永明十年脫朝服挂神武門上表辭祿詔許之又曰王思遠立身簡潔諸客詣己者覘知衣服垢穢不前形儀新楚乃與促膝雖然及去之後猶令二人交帚拂其坐處又曰王琨性儉約景和中討義陽王昶六軍誡嚴應須紫服左右欲營辦琨曰元嘉初征謝晦有紫服在匣不須更製檢取果得焉梁書曰到溉性率儉不好聲色庭室單床傍無姬侍冠履十年一易朝服或至穿補又曰波斯國婚姻法一聘財訖女壻將數十人迎婦壻著金綖錦袴戴天冠婦亦如之又曰新羅呼其冠曰遺子禮襦曰尉解袴曰柯半靴曰洗百濟呼帽曰冠襦曰復衫袴曰禈又曰張嵊音盛稷之子也稷初為剡令至嵊亭生之因名嵊字四山少敦孝行年三十餘猶班衣受稷杖動至數百收淚歡然又曰胡緭胡貴切隨陳伯之入魏時元會緭戲為詩曰帽上著籠冠袴上著朱衣不知是今是不知非昔非又曰何敬容為吏部尚書侍中領太子中庶子敬容身長八尺白晳美鬚眉性矜莊衣冠鮮麗武帝衣而左右衣必須潔嘗有侍臣衣帶卷摺帝怒曰卿衣帶如繩欲何所縛敬容希旨故益鮮明常以膠清刷鬚衣裳不整伏床尉之或暑月背為之燋又曰任昉有子東里西華南容北叟西華冬月著葛帔練裙事具交友部又曰任昉為義興太守友人彭城到溉弟洽從昉共為山澤遊及被代登舟止有絹七匹米五石至都無衣鎮軍將軍沈約遺裾衫迎之後魏書曰樂浪王萬壽孫忠明帝時位太常少卿孝武帝泛舟天泉池命宗室諸王陪宴忠愚而無智性好衣服著紅羅襦繡作領碧納袴錦為緣帝謂曰朝廷衣冠應有常式何為著百戲衣忠曰臣少來所愛情存綺羅歌衣儛服是臣所願帝曰人之無良乃至此乎又曰胡叟於高允館見中書侍郎李璨被服華靡叟貧老衣褐璨頗忽之叟謂曰老子今若相脫體上袴褶衣帽君欲作何許也譏其唯假盛服璨惕然失色又曰文宣囚元韶幽於京畿地牢絶食啖衣袖而死北齊書曰爾朱敞字乾羅彥伯之誅敞小隨母養於宮中年十二敞自竇走至大街見童兒群戲敞解所著綺羅金翠服易衣而遁追騎至不識敞便執綺衣兒比究問知非會日已暮由是免陳書曰徐陵為吏部尚書精簡人物搢紳之士皆嚮慕焉陳暄以玉帽簪插髻紅絲布裹頭袍拂踝靴至膝不陳爵里直上陵坐陵不知識命吏持下暄徐步而出舉止自若竟無怍容作書謗陵陵甚病之隋書曰齊後主於苑內作貧兒村親衣藍縷之服而行乞其間以為笑樂多令人服烏衣以相執縛後主果為周所敗被虜困至以賣燭為業唐書曰太宗詔冠冕制度已備令文尋常服飾未為差等於是三品已上服紫四品已上服緋六品七品以緑八品九品以青婦人從夫之色仍通服黃又曰楊妃寵愛特甚宮中主貴妃剌繡者七百人楊益及諸戚里每歲進衣服布之於庭光奪人目又曰肅宗性節儉嘗出衣袖示近臣曰此衣已三浣矣又曰貞元六年德宗初賜節度觀察使新製時服尚方織作呈閲所宜上曰頃來賜衣文綵不恆非制也朕今思之節度使以鵰銜綬帶取武毅以靖封內觀察使以鴈銜威儀委威儀委瑞草也取其行列有序牧人有威儀也又曰文宗朝淮南節度使李德𥙿奏比以婦人長裾大袖朝廷制度尚未頒行微臣之分合副天心比聞閭閻之間袖闊四尺今令闊一尺五寸裙曳四尺今曳五寸初延安公主以衣服踰制駙馬竇浣得罪德𥙿因而奏之六韜曰武王伐紂蒙寶衣投火而死國語曰晉獻公使太子申生伐東山衣之偏裻音督之衣又魯語曰季文子相宣成無衣帛之妾無食粟之馬仲孫它諫曰仲孫它孟獻子之子子服也子為上卿妾不衣帛馬不食粟人其以子為愛且不華國乎愛𠫤也文子以告孟獻子獻子囚之七日囚子服也自是子服之妾衣不過七升之布春秋後語曰田文謂其父靖郭君曰君下宮蹈綺縠之衣而士不得短褐又曰趙襄子既滅智伯智伯之臣豫讓變姓名入宮塗廁以剌襄子襄子覺而赦之後讓伏於橋下襄子至橋馬驚使視之復得讓襄子歎曰嗟乎豫讓之為智伯名既成矣寡人赦子名亦足矣子自為計寡人不釋子矣讓曰臣固伏誅願得君之衣而擊之於是襄子義之脫付身之衣以與之讓拔劍三躍呼而擊之曰吾可以下報智伯矣遂伏劍而死漢雜事曰高祖時大謁者臣章受詔長樂宮令群臣議天子所衣服以安天下謁者趙堯舉春李舜舉夏倪湯舉秋貢禹舉冬四人各職一時制曰可舉者以各舉一時之事白之五服衣始於此董巴漢輿服志曰上古穴居衣毛未有制度後世聖人易之以絲麻觀翬翟之文榮華之色乃染帛以效之始作五采成以為服凡十二章莊子曰莊子衣大布之衣而過魏王魏王曰何先生之憊耶莊子曰士有道德不能行憊也衣斃履穿貧也非憊也商君書曰上世之人衣不暖膚食不滿腹孫卿子曰子夏家貧衣若懸鶉人曰子何不仁曰諸侯之驕我者吾不為臣大夫驕我者吾不復見尹文子曰昔晉國苦奢文公以儉矯之乃衣不重帛食不兼肉無幾時國人皆大布之衣脫粟之飯韓子曰晏相齊妻不衣帛馬不食粟又曰齊桓好服紫國人盡服之公患之管仲曰君謂左右甚惡紫臭於是三日境內莫有紫衣者又曰楊朱之弟楊布衣素衣而出天雨緇衣而反其狗吠之布恐將擊之朱曰使汝狗白而往黑而來能不怪哉事具猗門墨子曰古之人未知衣服之制故聖人作之冬則絹帛輕且溫夏則絺綌清且涼所以適身體和肌膚也又曰晉文公好士之惡衣故文公之臣皆牂羊之裳韋以為帶呂氏春秋曰戎夷違齊如魯天大寒而後與門弟子一人宿於郭外寒逾急謂其弟子曰子與我衣我活我與子衣子活我國士也為天子惜死子不肖也不足愛子與我衣弟子曰夫不肖之人安能與國士衣哉戎夷解衣與弟子夜半而死弟子遂活淮南子曰林類榮啓期衣若懸蓑說苑曰齊林既者衣葦朝景公公曰何忽服小人衣耶林既曰衣狗裘者不必羊鳴今君衣狐裘音能不狐乎又曰魏文侯封太子擊於中山三年使不往來舍人趙倉唐奉使文侯問子之君長大孰與寡人倉唐曰君賜之外府之衣則能勝之文侯遣倉唐賜太子衣一襲令倉唐雞鳴時至太子迎拜賜發篋衣盡顛倒太子趣具駕曰賜之衣非以為寒也欲召擊知無誰與謀故遣子以衣詩曰東方未明顛倒衣裳顛之倒之自公召之事具奉使門鹽鐵論曰古者庶人老耋而後衣絲其餘則麻枲而已拾遺録曰宋景公之時懸四時衣春夏以珠玉為飾秋冬以翡翠為溫又曰禮敬國其俗人年三百歲而織芳茅以為衣蓋尚書云島夷卉服之類也又曰任未年十四好學觀書有合意處則題其衣裳及掌裏以記其事門徒悅其勤學更以靜衣易之又曰太始元年魏帝以陳留王之歲有頻斯國人來朝以五色玉為衣如今之鎧又曰天漢三渠搜國之西有折淪國其俗淳和人壽三百歲有大木一樹千尋若經此木下皆不死不病或有泛海繩山來會其國綴草毛為繩網其衣如今之羅紈也至元狩六年獻網衣一襲帝焚於九逵之道恐後人徵求此物故燒之煙如金石之氣又曰員嶠山南有池移國人長三尺壽萬歲茅為衣衣服皆長裾大袖因風以升煙霞若鳥用羽毛也鍾會母傳曰夫人幼少衣不過青紺世說曰齊王冏為大司馬輔政嵇紹為侍中詣冏咨事冏召葛旟董艾等共論時宜旟等白冏曰嵇侍中善於絲竹公可能操之遂進樂器紹推卻不受冏曰今共為歡何為却耶紹曰公協輔皇室令作事可法紹雖職卑忝備常伯豈可以先王之服為伶人之業今逼高命不敢有辭當釋冠冕襲私服此紹之心旟等不自得而退又曰桓車騎不好著新衣浴訖婦故送新衣車騎大怒催使將去婦便持還冲妻王恬女也傳語云衣不經新何由而故桓大笑而著之又阮宣子論鬼神有無或以人死有鬼阮子獨以為無曰今見者云著生時衣服若人死有鬼衣服亦有鬼乎孝子傳曰老萊子年七十父母猶在萊子常服班欄衣為嬰兒戲曹肇傳曰明帝寵愛肇與帝戲賭衣物有所獲輒入御帳服之遙出親狎如此襄陽耆舊記曰王昌字公伯為東平相散騎常侍早卒婦是任城王曹子大女昌弟式字公儀為渡遼將軍長史婦是尚書令桓階女昌母聰明有典教二婦入門皆令變服下車不得踰侈孫階子嘉尚魏主欲金縷衣見式婦嘉止之曰其嫗嚴固不聽善耳不須持往犯人家法列仙傳曰道士徐延年平陽人也見人持新黃羅衣云延年五百夜半夜明如晝從五億萬人登仙也古艷歌曰焭焭白兔東走西顧衣不如新人不如故離騷屈原曰新沐者必彈冠新浴者必振衣
