body:
  text: 地部十九巖説文曰巖者崖也山邊謂之崖書曰高宗夢得説使百工營求諸野得諸傳巖孔安國注曰使百官以所夢之形像經營求之外野得之於傳巖之溪晉書曰許詢移居皋屯之巖常與沙門支遁及謝安石王羲之等同遊往來今皋屯呼為許度巖齊書曰徐伯珍宅南九里有高山班固謂之九巖山後漢龍丘萇隱處也山多龍鬚柳柏望之五采世呼為婦人巖盛弘之荊州記曰平樂縣有山臨水巖間有兩目如人眼極大瞳子白黑分明名為目巖又曰始興機山東有雨巖回向鴟尾石室數十所行過者皆聞有金石絲竹之聲南康記曰陽道士葬巖室臨終語弟子等可送吾尸置彼石室中巾褐香爐此外無所須也葬數年尸猶儼然今舟行者過其山渚長聞香氣咸歎異焉水經注曰層山石室中有積書卷矣而世士罕有達者因謂之積書巖鄱陽記曰香巖在貴溪縣東五里舊名腥腥巖昔術者許旌陽斬蛟於此巖下因此名焉又以板塞巖口尋蛟潛通洪州橫泉井每至天景澄霽見水底板木存焉後人惡其名遂改焉又曰弋陽嶺上多密巖元嘉中有人見其巖凶有三鐵鑊可容百斛中生蓮花他日往尋不知所在穴説文曰穴者室也易曰上古穴居而野處後世聖人易之以宮室詩曰穀則異室死則同穴禮記月令曰季秋之月蟄蟲在穴內皆墐其戶瑾謂塗閉之也避殺氣也史記曰司馬遷登會稽山探禹穴范曄後漢書曰光武郭皇后父昌生后及生子況況遷大鴻臚賞賜金錢縑帛豐盛莫比京師號況家為金穴山海經曰熊山有穴曰熊穴恆出神人夏啓而冬閉是穴若冬啓夏閉乃必有兵郭璞曰今鄴西有鼓山上有石鼓象懸著山旁鳴則有軍事與此穴殊象而同應莊子曰越人三世殺其君王子搜患之逃於丹穴越人無君從之丹穴王子搜不肯出越人燻之以艾承以玉輿淮南子曰治鼠穴而壞里閭水經注曰昔巴蠻有五姓未有君長俱事鬼神乃共擲劍於石穴約能中者衆奉以為君巴氏子務相乃中之又各令乘土船約浮者當以為君唯務相獨浮因共立之是為廩君又曰江陵有駕部口宋文帝車駕發江陵至此黑龍躍出負帝乘舟左右失色上謂長史王曇首曰此乃夏禹所以受天命矣我何德以堪之故穴為龍穴焉又曰夏平縣有重山即烈山也山下有一穴父老相傳是神農所生處也又曰大洪山巖嶂皆數百許仞入石門又得鍾乳穴穴上素崖立非人迹所及穴中多鍾沉凝膏下垂望齊水雪微津細液滴瀝不斷幽穴潛遠行者不極風土記曰太湖中山有洞穴傍行地中無所不通謂之洞庭續搜神記曰長沙醴陵縣有小水有二人乘船取樵見岸下土穴中水流出有新斫木片逐水流上有深山有人迹異之相謂曰可試入水中看何由爾一人便以笠自鄣入穴穴才容人行數十步便開明朗然不異世上外國圖曰風山之首高三百里風穴方三十里春風自此出也又曰神丘有火穴其光照千里去琅琊三万里荊州圖記曰盧縣有馬穴山傍有地道漢時常有百匹馬出其中形皆小似滇池馬今遂名其處曰馬穴又曰縣北九十里有趙屬山傍有石臺高十五丈廣三丈有穴深一里內甚平整虛寂謂之仙穴錢塘記曰靈隱山有石穴傍入行十數步有水廣丈餘昔有人採鍾乳見龍迹聞穴裏搔搔有聲出宜都記曰佷山縣有丈石穴平居無水有渴者至請乞輒得水戲乞則不得又曰自西陵北行三十里有石穴名馬穴嘗有白馬出食人逐之入穴潛行出漢中漢中人失馬亦嘗出此穴相去數里武昌記曰蕪菁山有龍穴其水深暗少得入者人採鍾乳乘火而入下有水深數尺多有蝙蝠來撲火江乘地記曰西南二十里木廬山有鍾乳穴鄭緝之東陽記曰北山西崖有石床流水澆灌其側又有石田如稻田云堂裏有洞穴有人常於此採鍾乳入十餘日糧絶而穴不可窮王韶之神境記曰滎陽郡有孤山直長百餘丈東北有二穴寥寥然杳杳然便是雲霞中館矣又曰滎陽郡北三十里有何家巖傍有一穴始入幽峽而甚暗昔有採鍾乳者至此見有書三卷竹一枝潯陽記曰赤山下有石穴有人取鍾乳者經宿不知所窮水恆流出深處浮乃得過數里輒見有光明聞裏有聲若霹靂此人遽出竟無以測遠近有仙鼠常撲火鄧德明南康記曰西南有通天穴四壁石色似書丈六像下有石床有石子彈丸聚有一角又曰平固縣西覆笥下有洞穴穴口可廣五六尺高五尺餘昔有人採鍾乳深入為瞑不得出遂留住宿忽聞頭上有篙船之聲北征記曰姑熟有井山有九穴與江通吳郡臨海記曰虞縣有穿山下有洞穴昔有在海中行者舉帆從穴中過盛弘之荊州記曰宜都佷山縣有山山有風穴口大數尺名為風井夏則風出冬則風入樵人有冬過者置笠穴口風吸之經月還涉長陽溪而得其笠則知溪穴潛通玄中記曰蜀郡有青城山有洞穴分為三孔西北通崑崙輿地記曰太湖東小山名洞庭純石巉巖木唯松柏山有三穴東頭北面一穴不容人西頭南面一穴亦然并有青泉流出西北一穴傴僂才得入穴外石盤礡形勢驚人穴裏如一間堂屋上高丈餘恆津潤四壁石色青白南壁開處側肩得入潛行二道北通琅琊東通武縣西通長沙巴陵湖吳大帝使人行三十餘里而反云上聞有浪聲有大蝙蝠如鳥拂殺人火穴中高處火照不見穴有鵝管鍾乳冰寒可得入春夏不可入郡國志曰虔州歸義山夢水出焉有石室金色號為金穴室內常有金鼠出入又曰瓜州常樂縣縣有風穴恆以大石棧之若開暴風起連日又曰循州有龍穴潛通于海傍于洞庭吳都賦云目龍川而帶坰是此也又曰虢州楊震宅西有龍望原南崖有太尉公藏書穴太元初人入穴見古書二十餘卷焉會稽記曰郡有禹穴案漢書司馬遷傳云上會稽探禹穴又有禹井楊都云入洞穴出蒼梧注云在零陵言人從禹穴入至蒼梧出也周地圖記曰順政郡丙穴以其口向因以為名沮水經穴間而過或謂之大丙水每春三月上旬復有魚長八九寸或二三日聯綿從穴出躍相傳名為嘉魚即左太沖蜀都賦所謂嘉魚出於丙穴是也武陵記云鹿山有穴昔宋元嘉初武陵溪蠻入射鹿逐入一石穴穴才可容人蠻人入穴見有梯在其傍因上梯豁然開朗桑果靄然行人翱翔不似戎境此蠻乃枇樹記之其後尋之莫知所處谷説文曰泉通川曰谷易曰入于幽谷三歲不覿凶詩曰葛之覃兮施于中谷唯葉萋萋又曰惴惴小心如臨于谷又曰伐木丁丁鳥鳴嚶嚶出於幽谷遷于喬木又曰皎皎白駒在彼空谷左傳曰莫敖縊于荒谷盛弘之荊州記曰今竹林是也爾雅曰水注溪曰谷蜀志曰谷口今之斜谷是也唐書曰王龜字大年性簡淡蕭灑不樂仕進少以詩酒琴書自適不從科試京城光福里起第兄弟同居斯為宏敞龜意在人外倦接朋遊乃於永達里園林深僻處創書齋吟嘯其間目為半隱亭及從父起在河中於條山谷中起草堂與山人道士遊朔望一還府第後人目為郎君谷老子曰谷得一以盈谷無以盈將恐竭又曰江海能為百谷王者以其善下之也故能為百谷王又曰知其辱為天下谷桓子曰昔齊桓公入谷問父老曰此何谷答曰謂臣愚名為愚公谷風俗通曰南陽酈縣有甘泉谷水甘美云其山上有菊花水從山中流下得其滋液谷中三十餘家不復穿井仰飲此水上壽者一百二十中者百餘歲漢武故事曰上微行至柏谷宿於逆旅劉向別録曰方士傳言鄒衍在燕有谷地美而寒不生五穀鄒子居之吹律而溫氣至而生黍穀今名黍谷博物志曰夏桀之時為長宮於深谷之中三旬不出大風揚沙一夕填此宮谷也虞喜安天論曰日月行於飛谷謂地中也不聞列星復流於地且谷有水體日為火精水火不共器得無傷日之明乎水經注曰令居縣面北塞外瓦街容水文成龍試攪破之尋手成龍畜生將飲皆畏而走又燉煌西有馬蹄谷漢武帝聞大宛有天馬遣李廣利伐而得之甚以為奇故賦天馬之欹秦州記曰古有神婦負土欲塞谷繩絶墜負押木因成二樹其大數圍尋陽記曰廬山西南有康王谷又北嶺有劉成谷天欲雨輒聞鼓角簫笳之聲戴延之西京記曰梓澤去洛城二十里澤在金谷之中朝賢所集賦詩是石崇所居郡國志曰武都沮水之西有角弩谷即蜀將薑維勦五部溪羌之所又曰玉喬谷俗謂太公即王喬所隱處谷有喬堂歲常祀之雲陽記曰龍谷水出雲陽宮東南又有鄭泉云漢時鄭朴字子真隱於谷口不屈其志耕於巖石之下名震京師時人亦因子真所居以為名也又有治谷封禪書所謂谷口是也去雲陽宮八十里出鐵治鑄之所因以為名入谷便流潦沸騰飛泉激兩岸峭壁孤豎盤橫枕谷口凜然凝沍常如八九月中朱明盛暑當晝暫暄涼秋晚候縵袍不暖所謂寒門也又云入冶谷二十里有百里槐樹樹北有泉名曰金泉按此樹猶存金泉西南百步谷中今有毛原監也十道志曰大谷在鞏縣東五里張衡東京賦曰孟津達其後大谷通其前陳思王洛神賦曰經通大谷潘嶽間居賦曰張公大谷之梨皆謂此也嶺廣州記曰有五嶺大庾始安臨賀桂陽揭陽是也南康記曰秦始皇略定楊越謫戍五方南守五嶺第一塞上嶺即南康大庾嶺是第二騎田嶺今桂陽郡臘嶺是第三都龐嶺今江華郡永明嶺是第四氓渚嶺亦江華郡白芒嶺是第五越城嶺即零陵郡南臨源嶺是也談藪曰光州西北有一嶺高峻北臨滄江齊尚書郎崔挺遷光州於嶺上欲立觀宇故老云北嶺秋夏之際常有暴風迅雨巖石盡落相傳云是龍道不可久立挺曰人神相去何遠之有虬龍條忽豈唯一路乎𨔵營之數年果無風雨之患挺還歸尋為雷風所毀後不能立吳地志云南野縣有大庾嶺通廣州晉太康地志嶺峻阻螺轉上踰九磴二里至頂下七里平行十里至亭一名橫亭一名塞上嶺建安記曰建安縣有禱嶺與泉州分界言嶺高禱而方過又有飛猿嶺喬木造天猿猱之所飛走故曰飛猿嶺歙州圖經曰海寧有容嶺有木石糖出樹空石罅中百姓每採之又曰黝縣有墨嶺上有石如墨色軟膩士人取以為墨又曰婺源有甘子嶺此地本無甘樹唯此忽有一株因以為名輿地志曰東陽畢嶺之下有錢嶺往往人於此嶺下獲大錢俗謂之錢嶺又曰贊皇縣有孔子嶺上有石堂寬博其石相拒若楹柱有石人象執卷之狀雷次宗豫章記曰西山中峰最高頂名鶴嶺即子喬控鶴經過之所壇在鶴嶺之側雲景鮮美草木秀潤異於它山山側有土名控鶴鄉
