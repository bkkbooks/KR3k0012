body:
  text: 服用部六囊説文曰囊謂橐也橐車上大囊也方言曰自關而西食囊謂之掩囊周易坤卦六四曰括囊無咎象曰括囊無咎慎不害也焦贛易林歸妹之損曰爭雞失羊亡其金囊利得不長毛詩公劉曰乃裹餱糧于橐于囊公羊傳哀公曰齊景公死舍立陳乞迎陽生使力士舉巨大也囊而至開之則公子陽生也乞曰此君也諸大夫皆再拜稽首自是往殺舍史記曰韓信已定臨淄楚使龍且救齊夾睢水陳韓信乃夜令人為萬餘囊盛沙以壅水上流引軍半渡擊龍且佯不勝遂走龍沮追信信渡水使人決壅水大至急擊殺龍且戰國策曰荊軻逐秦王時侍醫夏無且以樂囊提軻提抵擊也漢書曰陸賈使尉他他賜賈囊中裝直千金又曰東方朔曰侏儒長三尺奉一囊粟錢二百四十朔長九尺餘亦一囊粟錢二百四十侏儒飽欲死臣朔飢欲死又曰楊王孫病且終先令其子曰吾欲裸葬以反吾真死則為布囊盛入地七尺既下從兄脫其囊以身親士又東方朔傳曰文帝集上書囊以為殿帷又曰張安世持囊簪筆事孝武數十年見謂忠謹囊擊橐也近臣負也又曰邴吉馭吏嘗知邊塞吏出適見驛持赤白囊邊郡發奔命書馳來至虜入雲中代郡遽歸府見吉白狀又曰成帝許美人乳詔使婢嚴持乳醫及藥篋至美人所後詔使嚴持緑囊書與許美人告嚴曰美人當有以豫女受來置飾室中美人葦篋一合盛所生兒死緘封及緑囊報書豫嚴又曰王陽好車馬衣服鮮明而遷徙轉移所載不過囊橐時人怪其奢伏其儉故俗傳王陽能作黃金東觀漢記曰岑彭與吳漢圍隗囂壅谷水以縑囊盛土為堤灌西城後漢書張湛傳曰光武嘗召見諸郡計吏問前後守令能否蜀郡計掾樊顯曰漁陽太守張堪昔在蜀仁以惠下威能討姦前公孫述破時珍寶山積捲握之物足富十世而堪去職之日乘折轅車布被囊而已范曄後漢書曰楊琁為零陵太守以緋囊盛石灰於車上繫布索於馬尾會戰從風鼓灰賊不得視因以火燒布布燒馬驚奔突賊陳又曰和熹鄧后臨朝杜根以安帝長宜親政事乃上書直諫太后怒收根盛以縑囊撲殺之執法者以根知名私語行事人使不加力而載出城外根得蘇典略曰馬略為司隸督軍從事討郭援為飛矢所中乃以囊褁其足而戰斬援首詔拜徐州剌史魏略曰大秦國王有五宮相去各十里王一旦至一宮聽事止宿明旦復至一宮遍而還出行常以一韋囊自隨有上言者收辭囊中還宮乃省之吳録曰步騭表言北降王潛等説北箱部伍圖以東向多作布囊欲以盛沙塞江孫權見呂範諸葛恪云每讀騭表輒獨失笑此江與開闢俱生寧有可囊塞埋乎王隱晉書曰棗嵩用事於王浚時謠曰十囊五囊入棗郎晉中興書曰孫恩敗以囊簏盛嬰兒投之於外而告之曰賀汝先登仙堂我尋而後就汝晉書曰郭公居河東精卜筮郭璞從而受業公以青囊中書九卷與之璞由是洞曉其術宋書曰吳郡人陳遺少為郡吏母好食鐺底飯遺在役恆帶一囊每煮食輒録其燋以貽母陳書曰後主怠於政事每啓奏後主倚隱囊置張貴妃於膝上共決之隋書曰張虔威嘗在塗見一遺囊恐其主求失因令左右負之而行後數日物主來認悉以付之莊子曰人而不學命之曰視皮學而不行命之曰輒囊輒繫又曰將為胠篋探囊發匱之盜而為守備則必攝緘縢固扄鐍此世俗所謂智也然巨盜至則負匱揭篋擔囊而趨唯恐緘縢之不固也淮南萬畢術曰鴻毛囊之可以渡江盛鴻毛滿囊可渡江不溺也東宮舊事曰太子納妃有絳石綺絹裹被囊一丹羅長命綺絹裹碗枕囊一紫綦文綺絳絹裹碗囊二晉中經簿曰盛書皂縹囊書函中皆有香囊二世説曰謝玄年少時好著紫羅香囊垂覆手太傅患之而而不欲傷其意乃鐍與戲賭得即燒之語林曰劉承胤少有淹雅之度王庾溫公皆素與周旋聞其至共載看之劉倚被囊了不與王公言神味亦不相酬俄頃賓退王庾甚怪此意未能解溫曰承胤好賄被下必有珍寶當有市井事令人視之果見向囊皆珍玩焉與胡父諧賈諧賈資鬻又曰石崇廁內兩婢持錦囊是籌也俗説曰何承天顏延年俱為郎何問顏曰藿囊是何物顏答曰此當復何解耶蒮囊將是卿言腹中無所有純是藿此是世俗相調之辭也西京雜記曰惠帝與趙王同寢處后殺之不得後帝早獵后命力士於被中扼殺之乃死呂后不信以緑囊盛之載以小軿車入見厚賜之力士東都門外官奴帝後知腰斬之拾遺録曰蘇秦張儀二人假食於路剝樹皮為囊以盛天下良書又曰燕昭王夢西方羽人從雲中來曰大王精智未開求恆生久視之觀不可得也以指畫王心應手而裂王乃驚悟血濕於襟王復見所夢人曰本欲易王之心乃出方寸緑囊囊中有續脈石名丸補血精散摩王之臆俄而即愈又曰石虎為浴臺皆用鍮石碔玞為隄岸或以虎魄車渠為瓶杓夏則自渠水以內池池中皆紗縠為囊盛百雜香漬於水裏王肅喪服要記曰昔魯哀公祖載其父孔子問曰寧設五穀囊乎哀公曰五穀囊者起伯夷叔濟讓國不食周粟而餓首陽之山恐魂乏飢故作五穀囊吾父食味含哺而死何以此為國語曰吳王殺申胥盛以鳲鵜而投之於江鳲鵜革囊春秋後語曰趙王使平原君入楚求其從約其客有文武者二十人偕得十九人未有可以備二十者毛遂請行平原君曰賢士處世譬如錐之處囊其鋒立見今先生處勝門下三年無所聞是先生無所能也遂曰臣乃今日請處囊中耳若早處囊中乃頴脫而出非特末見也平原乃許與偕江表傳曰魏太祖與馬超單馬會語超負其多力嘗置六斛米囊東西走馬輒製米囊以量太祖輕重太祖尋知之曰幾為狡虜所欺漢武內傳曰帝見三母有一卷書盛以紫錦之囊母曰此吾真形圖也曹暪傳曰操性佻易自佩小鞶囊盛手巾細物益部耆舊傳曰閻憲字孟度為綿竹令男子杜成行於路得遺裝囊開視有錦帛二十五匹明送詣吏汝南先賢傳曰范滂被詰受幾許贓賕滂曰曾為北部督郵汝陽令有記囊表裹六尺若以此為贓贓直六十耳郭文舉別傳曰文舉河內人也懷帝未濟江至餘杭市賣箭箬易鹽米以樹皮作囊得米鹽以內囊中裴淵廣州記曰州廳事梁上畫五羊象又作五穀囊隨象懸之云昔高固為楚相五年銜穀萃於楚庭因是圖其象荊楚歲時記八月民俗以錦綵為眼明囊記曰赤松子此日以囊承柏樹下露以為相貽或以金薄為之遞相餉遺幽明録曰習鑿齒為荊州主簿從桓宣武出獵見黃物射之即死是老雄狐臂帶絳綾香囊又曰廣陵韓略將下馬覺鞭重見有緑錦囊中有短卷書著鞭鞘皆不知所從來開視之故穀紙祝經乃世之常聞也異苑曰信安鄭微年少時見人遺一囊云中有物欲碎便為凶兆微密開看乃是一挺炭意甚祕之年八十病篤語子弟云吾齒老矣可試啓此囊見炭悉碎折於是遂死趙一秦客詩曰文籍雖滿腹不如一囊錢宋劉義恭啓曰垂賜金虎魄茱萸囊七寶校裝玉眼明囊帊幞通俗文曰帛三幅曰帊帊衣曰幞職官曰尚書郎入直中宮供青縑曰綾幞晉中興書曰陸納為吳興太守徵拜左右尚書臨發止留被幞餘悉還官梁書曰張譏幼喪母有錯綵絲經帕即母之遺製及有所識家人具以告之每歲時輒對帕哽咽不能自勝南史曰關康之寓居南平昌特進顏延之等當時名士十許人入山候之見其散髮被黃布帊而臥了不相眄延之等咨嗟而退不敢干也北史曰後魏元文既專政於禁中自作別庫掌握之珍寶充牣其中又曾臥婦人於食輿以帊覆之令人輿入禁內出亦如之直衛雖知無敢言者東宮舊事曰皇太子納妃有絳綾裹幞帊五具絹裹帊五
