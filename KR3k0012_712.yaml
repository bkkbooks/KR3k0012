body:
  text: 服用部十三箱東宮舊事曰皇太子初拜有馬齒呈事箱四枚漢武帝內傳曰帝崩時遺詔以雜道書四十卷置棺中至延康二年河東功曹李及入上黨抱犢山採藥於岩室中得此書盛以金箱卷後題日月是武帝時河東太守張純以箱及書奏上之武帝時左右見之涕泣曰此是帝崩時殯殮物宣帝愴然以書付茂陵安合如故晉陸雲與兄機書曰一日行曹公器物有書箱五枚想兄識彥高書箱甚似之巾箱漢武內傳曰武帝見西王母巾箱中有一卷書王母曰此五嶽真形圖昨青城諸仙就我求今當付之宋書曰元凶劭弒逆南陽公主見女巫嚴道育云天神當賜符應時主夕臥見流光相隨狀若螢火遂入巾箱化為雙珠圓青可愛因是巫蠱而敗齊書曰衡陽王鈞常手自細書寫五經部為一卷置于巾箱中以備遺忘侍讀賀玠問曰殿下家自有墳素復何須蠅頭細書別藏巾箱中答曰巾箱中有五經於撿閲易且一更手寫則永不忘諸王聞而爭效為巾箱五經自此始也世說曰威法濟者義興人其兒年二十得病經年有神來語言床席不淨神何處得坐曰有漆內箱甚淨神何不入中因內新果於箱中覺有聲以箱蓋覆之於是便聞箱中動搖即以衣傅之可五升米重而病愈異苑曰晉孝武太元末每聞手巾箱中有鼓吹鞞角之音帝是歲崩天下大亂笥說文曰簞笥飯及衣之器也尚書曰惟衣裳在笥論語曰一簞食一瓢飲簞笥也東觀漢記曰上問第五倫卿為市掾人有遺卿母一笥餅卿從外來見之奪母笥探口中餅出之倫對曰實無此衆人以臣愚蔽故為生此語東觀漢記曰上聞王郎將軍至復驚去馮異進笥麥飯兔肩續漢書曰世祖微時繫南鳴市獄市吏以一笥飯與之吳越春秋曰越以文笥七枚獻吳王西京雜記曰宣帝以虎魄笥盛身毒寶鏡風俗通曰孝靈帝建寧中京師長者皆以葦辟方笥為粧具時有識者竊言葦方笥郡國讞篋也今珍用天下皆當有罪讞於理官也後黨錮皆讞廷尉人名悉入方葦笥中斯為驗矣張衡綬笥銘曰南陽太守鮑德有詔所賜先公綬笥傳世用之更治笥平子為德主簿故為之銘也笈說文作扱曰笈驢上負也風俗記曰笈學士所以負書箱如冠籍箱也謝承後漢書曰徐稚字孺子公車五徵皆不降志其有喪負笈赴弔行五里也又曰袁閎字夏甫汝南人也博覽群書常負笈尋師變易姓名又曰高弘字伯武河內山陽人為琅琊相到官自負笈單步入界聽採風俗又曰蘇章字士成北海人負笈追師不遠萬里又曰方儲字聖明負笈到三輔無術不覽又曰郎宗負笈賣卜給食諸公表上博士徵宗宗負笈遁去李固傳曰固父為三公而固步行負笈千里從師拾遺録曰漢惠帝時有仙人韓稚東至泥離國遇其人洞室負笈而問其年幾何漢武內傳曰上元夫人語武帝曰阿母令以瓊笈妙蘊發紫臺之文賜汝火籠方言曰南楚江沔之間籠謂之篣或謂之笯陳楚宋魏之間謂之庸君今薰籠是也齊書曰卞彬性飲酒火籠什物多諸詭異自稱卞田居又曰范述曾為永嘉太守有善政徵為游擊將軍郡故舊送錢二十餘萬一無所受唯得白桐皮火籠朴十餘枚而已梁書曰臨賀王正德為吳郡太守正德自謂應居儲嫡心常怏怏後奔魏初去之始為詩一絶內火籠曰楨幹屈曲盡蘭麝氣氳銷欲知懷炭日正是履冰朝修復山陵故事曰當梓宮中有象牙火籠東宮舊事曰太子納妃有漆畫手巾薰籠二條大被薰籠三西京雜記曰漢制天子以象牙為籠上皆散花文後宮則五色綾文劉向別録曰淮南王有薰籠賦齊謝朓詠竹火籠詩曰庭雪亂如花井冰粲成玉因炎入豹袖懷溫奉芳蓐體密用宜通文斜性非曲梁范靜妻沈詠五彩竹火籠詩曰可憐潤霜雪纖剖後毫分織作回風莒製為縈騎文含芳出珠被耀緑接緗裙徒嗟今麗飾豈念昔凌雲
