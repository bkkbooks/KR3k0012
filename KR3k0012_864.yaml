body:
  text: 飲食部二十一肉禮曰母反魚肉為已歷口人可穢也濡肉齒決乾肉不齒決又曰六十宿肉六十非肉不飽又曰觴酒豆肉讓而受惡傳曰公將如棠觀魚臧僖伯諫曰鳥獸之肉不登於俎則公不射古之制也又曰齊師伐我曹劌請見其鄉人曰肉食者謀之肉食謂朝大夫劌曰肉食者鄙未能遠謀又曰公膳日雙雞卿大夫之膳食饔人竊更之以鶩御者知之則去其肉而以其泊饋進卿食者饔人御者欲使諸大夫怨慶氏減其膳蓋盧蒲癸王何之謀也又曰有酒如淮有肉如坻有酒如澠有肉如陵亦具酒門穀梁傳曰公曰天王使石尚來歸脤脤也者何也俎實也祭肉也生曰脤熟曰俎論語曰子在齊聞韶三月不知肉味又鄉黨曰魚餒而肉敗不食肉雖多不使勝食氣祭於君不宿肉助祭於君所得性體歸即以班賜不留神惠也祭肉不出三日出三日不食之矣自家其食肉也過三日不食之褻鬼神之餘爾雅曰肉謂之敗臭懷又曰肉曰脫之剝其皮家奈肉束鹿之屬呼麋通又曰鮑宣上書奈何獨私養外親與幸臣董賢使奴從賓為肉史記曰廉頗奔魏趙王使者視頗尚可得用不趙使見頗頗為之一飯斗米肉十斤八曰公孫弘為丞相食一肉帝王世紀曰夏桀為肉山脯林漢書曰黃霸頴川太守使吏出不敢舍郵亭食於道旁烏欔其肉民有欲詣府口言事者適見霸與語道此後日吏謁見霸迎勞之曰甚苦食於道旁乃為鳥所盜肉吏大驚又曰武帝為酒池肉林令外國客遍觀又曰陳平為里社分其肉均父老曰善陳孺子之為宰平曰嗟乎使平宰天下亦當如此肉矣又曰張湯父為長安丞出湯為兒守舍父還鼠盜肉父怒笞湯湯掘室得鼠及餘肉劾鼠掠治又曰伏日賜從官肉大官丞日晏不來東方朔獨拔劍切肉即懷肉歸太官奏之朔入免冠謝上曰先生起自責也朔再拜曰朔來受賜不待詔何無禮也拔劍割肉一何壯也割之不多一何廉也歸遺細君又何仁也上笑曰使先生自責乃反自譽賜酒一石肉百斤歸遺細君客漿酒霍肉視酒如漿視肉如霍又曰成帝許后上疏曰故時酒肉有所賜外家輒上表乃決東觀漢記曰太尉趙喜聞魯恭志行每歲時遣子送米肉辭讓不敢當又曰卓茂為密令民有言亭長受其米肉者茂問之亭長從汝求乎有事與之自以恩意遺人乎民曰自遺之茂曰人異於禽獸者以有仁愛也亭長素為善吏歲時遺之禮也又曰賊經薑詩墓不敢驚孝子致米肉詩埋之後吏譴詩掘出示之又曰閔仲叔客居安邑老病家貧不能買肉日買豬肝一片謝承後漢書曰李萇家晝則躬耕夜則讀書日為母市斤肉梁米作食後漢書曰桓任字儀遼後母生時不食豬羊肉故終身不以豬羊肉入口又曰李充延平年中詔公卿中二千石各舉隱士大儒務取高行以勸後進特徵充為博士侍中大將軍鄧隲貴戚傾時無所下借下音假借音子夜反以充高節每卑敬之嘗置酒請賓客滿堂酒酣隲跪曰幸託椒房位列上將幕府初開欲辟天下奇偉以匡不逮惟諸君博求其器充乃為陳海內隱居懷道之士頗有不合隲欲絶其論以肉啖之充抵肉於地曰説士猶甘於肉遂出徑去甚望之漢舊儀曰齊法食肉三十六兩英雄記曰冀州刺史韓馥問諸從事曰收有何長何短治中劉子曰前勞賜有餘肉百斤賣之一州調度奢儉不復在是猶可勞賜勤勞吏士賣之可示儉吳志曰趙達嘗過故知取盤中隻箸再縱橫之乃言卿東壁下有美酒一斛又有鹿肉三斤何以辭無王隱晉書曰愍懷太子令人屠肉己自分齊手揣輕重斤兩不差云其母本屠家之女也太康起居注曰尚書郭奕有疾日賜酒米各伍升豬羊肉各一斤石崇崔亮母疾曰賜清酒粳米各伍升豬羊肉各一斤半臧榮緒晉書曰趙高為丞相指鹿為馬持蒲作肉晉中興書曰陸納為吳興太守辭大司馬桓溫因問桓公醉可飲幾酒肉食多少溫曰溫酒不過三升便醉白肉不過十臠納後伺間求入自言外有徵禮溫勑而受正有酒一斗鹿肉一盤一坐愕然納曰公近云飲三升民正可二升今有一斗似備餘瀝溫歎服晉書曰周訪鄉人盜訪牛於家間殺之訪得之密埋其肉不使人知宋書曰衡陽王儀季鎮荊州隊主續豐母老家貧無以充養遂不食肉儀季哀其志以錢米給豐母并制豐噉肉齊書曰高帝雖從官而家業本貧為建康令時明帝等冬月猶無縑纊而奉瞻甚厚后母撤去兼肉曰於我過足矣梁書曰傅昭性尤篤慎豫婦嘗得家餉牛肉以進昭昭召其子曰食之則犯法告之則不可取而埋之隋書曰王邵篤好經史遺落世事用思既專性頗恍忽至對食閉目疑思盤中之肉輒為僕從所食邵弗之覺唯責肉少數罰廚人以情白依前閉目伺候而獲之廚人方免笞辱墨子曰孔子厄於陳蔡子路烹豚孔子不問肉所由來食之晏子春秋曰梁丘據見晏子中食而肉不足王孫子曰楚莊伐宋廚有臭肉將軍子重諫王以肉饋於賢公孫尼子曰殷紂為肉圃孟子曰孔子為魯司寇從而祭膰肉不至不稅冕而行不知者以為肉也其知者以無禮也又曰庖有肥肉廄有肥馬民有飢色野有餓殍此率獸而食人也又曰雞豚狗彘之畜無失其時七十者可以食肉矣韓子曰夫百日不食以待梁肉餓者不育令待堯舜之賢乃治當世之民是猶待梁肉而救餓之説也又曰晏子對景公曰田成子殺一牛取一豆肉餘以食士燕丹子曰荊軻入秦過陽翟買肉爭輕重屠辱軻武陽欲擊軻止之淮南子曰今屠牛而烹其肉或以酸或以甘煎熬犢炙和有萬方其本一牛之體呂氏春秋曰肉之美者猩猩之脣貛貛之炙雋燕之翠述蕩之掔音牽獸名旄象之約旄象牛獸也族牛肉羹貴之也又曰嘗一臠而知一鑊之味一鼎之調又曰肥肉厚酒務以相強命之曰爛腸之食劉向新序曰趙簡子使使者聘孔子於魯以胖牛肉迎於河上使者謂船人曰孔子即上船中河安流而殺之孔子至使者致命進胖牛之肉孔子仰天而歎曰美哉水乎洋洋也使丘不濟此水者命也夫桓談新論曰九江太守龐真案縣令高曾受社祭釐有生牛肉二十斤劾以主守盜上請逮捕詔釐不贓天下緣是諸府縣社臘祠祭竈不但進熟食皆復多肉米酒脯臘諸奇珍益盛是故諸郡府至殺牛數十頭又曰關東鄙語世人聞長安樂出門西向笑知肉味美則對屠門而屑風俗通曰陳伯敬目有所見不食其肉王充論衡曰仲子兄祿萬鍾以兄之祿為不義而不食之避兄離母處於陵他日歸有饋其兄生鵝者曰惡用是鶂鶂者他日其母殺是鵝與之食其兄自外來至曰鶂鶂之肉而仲子恥負前言即吐而出之典略曰凡宗廟三歲大祫每大牢分之左辨上帝右辨上后俎餘委肉積於前數千斤名堆俎博物志曰食燕肉不可入水為蛟所吞龍肉以醢漬則文章生方言曰燕之北郊朝鮮洌水間凡異肉及披牛羊五臟謂之膊音博説文曰殽雜肉也醃漬肉也一劫反膊切肉也之耎反廣志曰北方有牧草便於其畜故北方出美肉異苑曰山陰有人嘗食牛肉便作牛鳴菜食乃止廣州先賢傳曰丁密不食有目之肉桂陽先賢畫讚曰程曾子孝孫七歲亡母號慕毀悴王母哀憐嚼食哺之知有肉味遂吐不食華陽國志曰孝子狼偶二親病時不能食肉遂終身不食肉董卓別傳曰呂布殺卓百姓欣慶相賀長安酒肉為暴貴江氏家傳曰蕤年七歲葬父有酒肉食之左右或戲曰郎為孝何肉食蕤瞿然斂容遂不食十洲記曰崑崙銅柱下有回屋焉壁方丈上有鳥名曰希有左翼覆東王公右翼覆西王母其肉若醢仙人甘之笑林曰甲買肉過入都廁挂肉著外乙偷之未得去甲出覔肉因詐便口銜肉曰挂著外門何得不失若如我銜肉著口豈有失理世説曰羅友作荊州從事桓宣武為王車騎集別有求集坐良久辭出宣武曰卿向以咨事今何以去答曰友聞白羊白肉美一生未嘗得故來求食食了無事可咨魏文帝與吳質書曰舉太山以為肉竭東海以為酒陸凱表曰呂蒙凌統早亡先帝痛悼不已子並幼稚皆內省中稱肉食之客炙釋名曰炙炙也炙於火上也脯炙以餳蜜豉汁淹之脯然也釜炙於釜中汁和熟之也銜炙細掾肉和以薑椒鹽豉已乃以肉銜裏其表而炙之豹炙全體炙之各自方割出於胡貊之為也禮曰膾炙處外母嘬炙嘬音初夬切詩曰執爨踖踖為俎孔碩或燔或炙又曰有兔斯首炮之燔之君子有酒酌言獻之毛曰炮加火曰燔傳曰欒寧將飲酒炙未熟聞亂使告季子季子子路也為孔氏宰邑也召獲駕乘車召獲衛大夫駕乘車言不欲戰也行爵食炙奉衛侯輒來奔韓子曰晉平公時進炙而髮繞之平公使殺庖人庖人呼天曰嗟乎臣有三罪而死不自知乎平公曰何謂也對曰臣刀之利風靡骨斷而髮不截是臣之一死桑灰炙之肉紅白而髮不燒是臣之二死也炙熟又重睫而視之髮繞炙而目不見是臣三死也意者堂下有憎臣乎殺臣不亦枉乎謝承後漢書曰陳正字叔方為太官令與黃門侍郎有隙因進御食以髮內炙中光武見之怒將斬正正曰臣當萬死者三一山炭增冶吐炎燋膚爛肉而髮不銷臣罪一也匣出佩刀匠也砥礪而虧肌截骨曾不能斷髮臣二也臣少事眼目書奏章表猶讀表五經具供御食與承反庖人六目齊視豈不如黃門兩目臣罪三也制赦之晉書曰王羲之年十三謁周顗顗異之時重牛心炙座客未噉顗割噉羲之於是始知名齊書曰桂楊之役詔檄久之未就齊高帝引江淹入中書省光賜酒食淹素能飲啖食鵝炙垂盡進酒數升訖文誥亦辦隋書曰煬帝初在藩魚俱羅弟贊以左右從纍遷大都督及帝嗣位拜車騎將軍贊性凶暴虐其部下令左右炙肉遇不中意以籤刺瞎其眼有溫酒不適者立斷其舌孟子曰嗜秦人之炙無以異於嗜吾炙夫物則亦有然者也然則嗜炙亦有外與又曰曾晳嗜羊棗而曾子不忍食羊棗公孫丑問曰膾炙與羊棗孰美孟子曰膾炙哉公孫丑曰然則何為食膾炙而不食羊棗乎曰膾炙所同也羊棗所獨也孝子傳曰王祥後母病欲黃雀炙乃有黃雀數枚飛入其幕因以供母説苑曰智伯以庖人忘炙而不知韓魏炙知小而不忘知大也世説曰顧榮字彥先輟已炙啖行炙者曰豈有終日執之而不知其味也耶明皇雜録曰杜甫後漂寓湘潭間羈旅鷦悴於衡州耒陽縣頗為令長所厭甫投詩於宰宰遂致牛炙白酒以甫遺甫飲過多一夕而卒集中猶有贈聶耒陽詩也
