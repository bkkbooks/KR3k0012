body:
  text: 香部一香書曰至治馨香感于神明左傳曰黍稷非馨馨者香之遠聞明德惟馨說文曰香芳也吳志曰士燮兄弟並為列郡雄長一州車騎滿道胡人夾轂焚香者常有數千世說曰桓車騎時有陳莊者入武當山學道所居恆有白煙香氣聞徹續晉安帝紀曰王鎮惡亡經曰魏興太守郭宣之晝坐忽見陳莊來因敘舊事相對悲泣勸營功德去後郡內悉聞香狀如芳煙流散晉書杜太后傳曰海西公之世太后復臨朝稱制桓溫之廢海西公也太后方在佛屋燒香內侍啓云外有急奏太后乃出尚倚戶前視奏宋書曰范曄撰和香方其序曰麝本多忌過分必害沉實易和盈斤無傷零藿虛燥詹唐黏濕甘松蘇合安息鬱金奈多和羅之屬並被珍於外國無取於中道又棗膏昏鈍甲煎淺俗非唯無助於馨烈乃當彌增於尢疾也所言悉以比類朝士麝本多忌比庾仲文零藿虛燥比何尚之詹唐黏濕比沈演之棗膏昏鈍比羊玄保甲煎淺俗比徐湛之甘松蘇合比慧琳道人沉實易和以自比也齊書曰韓懷明上黨人也客居荊州十歲母患尸㾏每發輒危殆懷明夜於星下稽顙祈禱時寒甚切忽聞香氣空中有人曰童子母須臾永差無勞自苦未曉而母平復梁書曰庾詵尢遵釋教宅內立道場環繞禮懺六時不息誦法華經每日一遍後夜中忽有一道人自稱願公容止甚異呼詵為上行先生授香而去又曰梁武帝祀南郊先是一日景夜南郊令解除之等到郊所履行忽聞異香隨風而至及將行事奏樂迎神有異光圓滿壇上朱紫黃白雜食頃乃滅又曰王琛本無令問為太子中舍人諂事何敬容為其階前種植香草脫履躡其草根敬容意以為善郭子曰陳騫以韓壽為椽每會聞壽有異香氣是外國所貢一著衣歷日不歇騫計武帝惟賜己及賈充他家理無此香嫌壽與己女通考問左右婢具以實對騫以女妻壽壽時未婚晉書云賈充女切香與韓壽金樓子曰齊東婚以錦石為殿內開千門萬戶又有和香香氣紛馥聞之使人歡悅生諸雅態兼令睡眠又曰昔玉池國有民壻面奇醜婦國色鼻齆壻乃求媚此婦終不肯回顧遂往西市無價名香而燻之還入其室婦既齆矣豈分香臭哉呂氏春秋曰懷腐而欲香入水而惡濡漢武故事曰上作柏梁臺悉以香柏香聞數十里也漢官典職曰尚書郎懷香握蘭神仙傳曰淮南王為八公張錦綺之帳燔百和之香佛圖澄傳曰澄以鉢盛水燒香呪之須臾生青蓮花林邑記曰朱吾以南有文狼野人居無室宅依樹止宿食生肉採香為業與人交市若上皇之民矣鄴中記曰石虎作流蘇帳頂安金蓮花花中懸金簿織成綩音苑囊囊受三升以盛香注帳之四面上十二香囊采色亦同竺法登真羅山疏曰越王搗薰陸香扶南傳曰頓遜國人恆以香花事天神香有多種區撥葉逆花途致各遂花摩夷花冬夏不衰日載數十車於市賣之燥乃益香亦可為粉以傳身體述征記曰北芒有張母墓舊說是王氏妻葬有年載後開墓而香火猶燃十洲記曰漢武時長安大疫人死日以百數帝乃試取月氏國神香燒之於城內死未滿三日者活芳氣經三月不歇帝始信神物也乃祕録餘香郭子橫洞冥記曰漢武帝於招仙閣燒靡離之香屑如粟一粒香氣三月不歇又曰跋塗闍者胡人也剪髮裸形不食穀唯飲清水食都夷香如棗核食一斤則歷月不飢以一粒如粟大投清水中俄而滿大盂也博物志曰西域使獻香漢制獻香不滿斤不得受西使臨去又發香器如大豆者試著宮門香氣聞長安四面數十里中經月乃歇搜神記曰渤海史良好一女子許嫁而未果良怒殺之後夢見曰還君物覺而得昔所與香纓金叉之屬又曰初鉤弋夫人有罪以譴死殯尸不臭而香又曰合淝有一大白船覆在水中漁人夜宿其傍聞箏笛之音又香氣非常相傳云曹公載妓船覆於此任昉述異記曰魏武帝陵中有泉謂之香水古詩云安得香水泉濯郎衣上塵一說香水在并州香山其冰潔香浴之去病吳故宮有香水溪俗云西施浴處又呼為脂粉塘吳王宮人濯妝於此溪上源至今馨香又曰南海出千步香佩之聞於千步也今海隅有千步香是其種也葉似杜若而紅碧間雜貢藉云日南郡貢千步香漢雍仲子進南海香物拜為涪陽尉時人謂之香尉日南郡有香市商人交易諸香處南海郡有香戶日南郡有千畝香林名香出其中香洲在朱崖郡洲中出諸異香往往不知其名千年松香聞十里亦謂之十里香也夢書曰夢得香物婦女歸也曹植洛神賦曰踐椒塗之郁烈步蘅音衡薄而流芳魏武令曰昔天下初定吾便禁家內不得香薰後諸女配國家為其香因此得燒香吾不好燒香恨不遂所禁今復禁不得燒香其以香藏衣著身亦不得秦嘉答婦徐淑書曰令種好香四種各一斤可以去穢淑答書曰未得侍帷帳則芬芬不設陸機吊魏武文曰余為著作郎遊祕閣見魏武令曰餘香可分與諸夫人諸舍中無所為學作履組賣也吊曰紆家人於履組塵清慮於餘香麝爾雅曰麝父麋足郭璞注曰腳似麕臍有香許慎說文曰麝如小麋臍有香從鹿射聲黑色獐也義熙起居注曰倭國獻貂皮人參等詔賜細笙麝香齊書曰東昏侯鑿金蓮花帖地令潘妃行其上曰此步步蓮花也塗地皆以麝香唐書曰波斯國人皆以麝香如蘇塗鬚點額及於耳鼻用以為敬抱朴子曰辟蛇法入山以麝香丸著足爪中皆有效又麝香及野豬皆啖蛇故以壓之也又作筆墨法曰作墨用雞子白真珠麝香合以和墨宜用九月二日南夷志曰南詔有婆羅門波斯闍婆渤泥崑崙數種外道交易之處多珠珍寶以黃金麝香為貴貨嵩高山記曰有人在嶺上聞異聲清和雅妙尋不復聞唯見一麝香在嶺上側足䨥跳忽失所在荊州圖記曰臨澧縣南有龍寄山有獸多麝西京雜記曰趙飛燕為皇后女弟在昭陽殿遺飛燕書曰今日嘉辰貴姊懋膺洪冊上檖三十五條以陳暐曜之志焉榔葉扇同心梅合枝李青木香香螺巵出南海一曰丹螺甲九真雄黃麝香沉水香續搜神記曰桓哲字明期居豫章時梅玄龍為太守已病哲往省之語梅曰吾昨夜忽夢作卒迎卿來作太山府君梅聞之愕然曰吾亦夢見卿為卒著衣來迎我數日復同夢如先云二十八日當拜至二十七日晡後桓忽中惡腹脹滿遣人就梅索麝香丸聞便令作凶具桓便亡八日而梅卒本草經曰麝香味辛辟惡殺鬼精生中臺山也秦嘉與婦書曰今奉麝香一斤可以辟惡氣嵇康養生論曰麝食柏而香葳香孫氏瑞應圖曰葳蕤者禮備至則生一曰王者愛人命則生一名葳香也鬱香說文曰鬱芳草也十葉為貫築以煮之為鬯一合而釀之以降神也周禮春官上曰鬱人掌祼器祼器謂彝及舟與瓚凡祭祀賓客之祼事和鬱鬯以實彝而陳之築鬱金煮之以和鬯酒鄭司農云鬱金草名七葉為貫百二十賈為築以煮之鑊中停放祭前鬱為草若蘭後周書曰秦國出鬱金後周書曰波斯國大月氏之別種也地出氍毹翟俞二音玄獐皮及薰陸鬱金蘇合青木香等胡椒畢撥石蜜千年棗香附于訶黎勒無食子鹽緑雌黃等物唐書曰天竺國卑濕暑熱稻歲四熟有金剛似紫石英百鍊不銷可以切玉又有旃檀鬱金諸香通於大秦又曰太宗時伽毗國獻鬱金香似麥門冬九月花開狀似芙蓉其色紫碧香聞數十步花而不實欲種者取根文士傳曰朱穆字公叔作鬱金賦曰英熠爍以焜煌似九日之普照遠而望之粲若星羅出雲嶠近而觀之曄若丹桂耀湘涯應劭地理風俗記曰周禮鬱人掌祼器凡祭醊賓客之祼事和鬱鬯以實樽彝鬱芳草也謂用百草之華煮以合釀黑黍以降神香也或說今鬱金香是也南州異物志曰鬱金者出罽賓國國人種之先取上佛積曰萎熇乃載去之然後取鬱金色正黃細與芙蓉華披蓮者相似可以香酒雞舌應劭漢官儀曰桓帝侍中乃存年老口臭上出雞舌香與含之雞舌頗小辛螫不敢咀咽嫌有過賜毒藥歸舍辭決就便宜家人哀泣不知其故僚友求視其藥出在口香咸嗤笑之吳時外國傅曰五馬洲出雞舌香抱朴子曰或以雞舌黃連乳汁煎之注之諸有百疹之在目愈而更加精明倍常俞益期箋曰外國老胡說衆香共是一木木花為雞舌香南洲異物志曰雞舌出在蘇州云是草花可含香口廣志曰雞舌出南海中及剽國蔓生實熟貫之續搜神記曰王廣豫章人年少未昏至田舍見一女云我是何參軍女年十四而夭為西王母飬使與下土人交廣與之纏綿其日於席上得手巾褁雞舌香其母取巾燒之乃是火浣布龍腦唐書曰正觀中烏萇國遣使獻龍腦香本草曰龍腦香味苦微寒主心腹邪氣風濕積藂出婆律國形似白松脂作杉木氣明淨者善云合粳米灰相思子貯之則不耗樹似杉言婆律膏是樹根下清脂龍腦是樹中乾脂子似豆寇雀頭江表傳曰魏文帝遣使於吳求雀頭香
