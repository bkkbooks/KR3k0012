body:
  text: 儀式部一太常釋名曰九旗之名日月為常畫日月於其端天子所建言常明周禮曰司常掌九旗之物名日月為常又曰節服氏掌祭祀朝覲袞冕六人維王之太常禮記曰成王封周公於曲阜命魯公世世祀周公以天子之禮樂是以魯君乘大路載弧韣旗十有二旒日月之章又曰旗十有二旒龍章而設日月以象天也旗釋名曰交龍為旗旗依倚也通以一赤色為之無文采諸侯所建也爾雅曰有鈴曰旗懸鈴於竿頭盡交龍於旒也詩曰載見辟王曰求厥章龍旗陽陽又曰魯侯戾止言觀其旗其旗茷茷鸞聲噦噦周禮曰龍旗九施以象大火也傳曰藏哀伯諫曰三辰旗旗昭其明也三辰日月星也於旗旗象天之明又曰子魚曰以先王觀之則尚德也昔武王克商成王定之選建明德以藩屏周故周公相王室以尹天下所同為睦分魯公以大路大旗交龍為旗周禮同姓以封旌釋名曰折羽為旌旌精也有精光也爾雅曰注旄首曰旌載旌於竿頭也周禮曰析羽為旄凡軍士建旌旗甸亦如之凡射共獲旌歲時共更旌取舊與新禮記曰武車綏旌綏垂舒之德車結旌不盡飾結謂收斂之也左傳曰初衛宣公蒸於夷薑生伋子屬諸右公子為之娶於齊而美公取之生壽及朔屬壽於左公子夷薑縊宣薑與公子朔搆伋子公使諸齊將殺之壽子告之使行不可曰棄父之命惡用子矣有無父之國則可也及行飲以酒壽子載其旌以先盜殺之伋子至曰我之求也彼何罪請殺我乎又殺之又曰楚許伯御樂伯攝叔為右以致晉師許伯曰吾聞致師者御靡旌摩壘而還又曰宋公享晉侯于楚丘請以桑林舞師題以旌夏旌夏大旌也以大旌表識其行列晉侯懼退入于房去旌卒享而還詩曰子子干旌在浚之城史記曰蘇秦説楚合從楚王曰寡人自料以楚當秦不見勝也內與群臣謀不足恃也寡人臥不安席食不甘味心搖搖然如懸旌而無所終薄今主君欲一天下收諸侯存危國寡人謹奉社稷以從斾釋名曰雜帛為斾以新色綴其邊為翅尾也將帥所建象物雜色也爾雅曰繼旐曰斾續旐未為煞尾詩曰蕭蕭馬鳴悠悠斾旌又曰織文鳥章白斾央央鳥章鳥之文章也央央鮮明貌左傳曰晉或以廣隊不能進楚人惎之脫局少進馬還又惎甚教之之拔斾投衡乃出又曰晉侯伐齊齊登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而踈陳之使乘車者左實右偽以斾先輿曳柴而從之齊侯見之其衆也乃脫歸又曰八月辛未治兵建而不斾建立旌旗不曳其斾遊也壬申復斾之諸侯畏之旟爾雅曰錯革鳥曰旟釋名曰鳥隼為旟旟舉也軍吏所建急疾走事則有稱舉矣周禮曰鳥旟七施以象鶉火也詩曰衆維魚矣旐維旟矣太人占之衆維魚矣實維豐年旐維旟矣室家溱溱旐釋名曰龜蛇為旐旐兆也龜知氣兆之吉凶建之於後察事宜之形兆也爾雅曰緇廣充幅長尋曰旐周禮曰龜蛇四遊以象宮室詩曰我出我車于彼郊矣設此旐矣建彼旄矣彼旟旐斯胡不斾斾斾斾旒垂貌又曰出車彭彭旗旐央央幡釋名曰幡幡也其貌幡幡然也魏志曰陶謙字恭𥘵少孤以不羈聞年十四猶綴帛為幡乘竹馬戲邑中宋書曰高祖討廬循戰于左里高祖麾之竿折幡沉于水衆咸懼高祖笑曰昔覆舟之役亦如之今勝必矣果破賊麾蔡雍月令章句曰麾鳥翼以為旌幢麾也魏志曰張遼從征袁尚於柳城卒與虜遼勸火戰氣甚奮太祖壯之自以所持麾授遼遂擊大破之斬單于踏頓旄頭史記曰昴星曰旄頭漢書曰梁丘賀字長翁宣帝祠孝昭廟先驅旄頭劍挺墮音地首垂臿泥中挺引也劍自然引挺出也刃嚮乘輿車馬驚於是召賀筮之有兵謀不吉上還使有司侍祠是時霍氏外孫任宣坐逆謀反宣子章夜玄服入廟執戟欲為逆發覺伏誅東觀漢記曰東海王強置虎賁旄頭應劭漢官儀曰舊曰羽休郎為旄頭放髮驅今但用營士玄中記曰秦始皇時終南公有梓樹大數百圍蔭宮中始皇惡之興兵伐之天輒大風雨飛沙石人皆疾走至夜瘡合有一人中風雨傷寒不能去留宿夜聞有鬼來問樹言秦王凶暴相伐得不困耶樹曰來即作風雨擊之其奈吾何鬼又曰秦王使三百人被頭以赤絲繞樹伐汝得無敗乎樹漠然無言疾人報秦皇案言伐斷中央有一青牛出逐之入水秦王因立旄頭騎擊虞決疑録要注曰世祖武皇帝因會問侍臣曰旄頭之義何謂耶侍中彭權對曰秦記云國有奇怪觸山截水無不崩潰唯畏旄頭故使虎士服之衛至尊也中書令張華曰有是言而事不經臣以為壯士之怒髮踴衝冠義取於此也徐爰釋疑略曰乘與黃麾內羽林班弓箭左罼右罕者熊皮謂之旄頭魏武表曰不悟陛下復加後命命置旄頭以比東海雲罕徐廣車服注曰雲罕罼罕也司馬相如上林賦曰弋玄鵠弄干鏚載雲罕掩群雅雅鳥張衡東京賦曰雲罕九遊闟戟膠葛潘嶽籍田賦曰五輅鳴鑾九旗楊斾瓊鉞入蘂雲罕暗藹黃鉞説文曰鉞大斧也夏執玄戈殷執白戚周左仗黃鉞字林曰鉞斧也書曰武王左仗黃鉞右秉白旄周書曰武王陳牧野既誓以馳商師大崩商辛自燔于火王斬之以黃鉞懸諸大白左傳曰楚王將戮齊慶封負之斧鉞以徇於諸侯曰無或如齊慶封殺其君弱其孤以盟其大夫封反曰無或如楚恭王之子圍殺其君之子而自立以盟諸侯漢書曰王莽使司徒王尋鎮洛陽初發長安宿霸昌廄亡其黃鉞尋士房楊素狂直乃哭曰此經所謂喪其資斧者也莽聞乃殺之吳志曰假陸遜黃鉞吳王親執鞭以見之晉公卿禮秩曰太尉賈充河間王顒梁王彤司徒王衍汝南王亮太傅楊駿東海王越義陽王望齊王修琅琊王胄東平公茍晞皆假黃鉞晉書曰石勒王彌寇京師以王衍都督征諸軍持節假黃鉞以伐之齊書曰高帝輔政王儉議加黃鉞任遐曰此大事應報禇公彥回也帝曰禇脫不與卿將何計遐曰彥回保妻子愛性命非有奇才異節遐能制之果無違異崔豹古今注曰今斧黃鉞鐵斧玄鉞三代通用之以斷斬今以黃鉞為乘輿之飾玄鉞諸公王得建之武王以黃鉞斷紂頭故王者以為戒太公以玄鉞斬妲己故婦人以為戒漢制諸公建玄鉞以太公助武王斷斬故為諸公之飾大將出征特加黃鉞者以銅為之黃金塗刃及柄不得純金也淮南子曰至精之感無所不通昔武王渡孟津而陽侯之波逆流而擊疾風晦冥武王舉黃鉞瞋目麾之曰豫在天下誰敢害吾意者於是風去而波罷遂得濟又曰國有難召將詔之曰社稷之命在將軍身今國有難願子將而應之將軍受命乃令祝史太卜齋三日之太廟鑽靈龜卜吉曰以受旗鼓君入廟門西面而趍至堂下北面立王親操鉞持頭授將軍柄曰從此上至天者將軍制之又復操斧持頭授將軍其柄曰從此下至淵者將軍制之世説曰諸葛亮之次渭濱也魏明帝遣辛毗為軍司宣王既與亮對渭而陳亮設誘譎萬方宣王果大怒憤將應以重兵亮遣間謀視之還曰有一老夫毅然仗黃鉞當軍門立軍不得出亮曰此辛毗也徐爰釋疑略注曰豹尾黃鉞金鉦舊載馬車晉江左乘馬執之宋元嘉中復舊典豹尾崔豹古今注曰豹尾車周制也象君子豹變尾言謙也古軍正建之今唯乘輿焉漢書曰成帝趙昭儀方大幸每上甘泉嘗從在屬車豹尾中晉中興書徵祥説曰海西公初即位忘設豹尾亦服妖也豹尾儀服之主大人所以豹變也西海凡庸不可以主社稷故忘其豹尾示不能終晉書曰王敦謀逆以沈充錢鳳為謀主明帝討之使充鄉人沈禎往吳興喻充以為司空曰丈夫共事終始當同寧可中道改易禎陳成敗苦勸之充不納率失臨發謂妻子曰男兒不豎豹尾約不還也齊書曰高昭劉皇后年十七裴方明為子求婚酬許已定后夢見先有迎車至猶如常家迎法后不肯去次有迎至龍旗豹尾有異於常后喜而從之既而與裴氏不成婚竟嬪于上武昌記曰樊口南百步有樊山孫權獵於山下依夕見一姥問權獵何所得對云正得一豹姥曰何不豎其尾語竟忽然不見因為立廟以其處楚山神故名為樊山大姥蔡雍獨斷曰大駕屬車八十一乘最後一車懸豹尾豹尾已前皆省中警蹕周禮曰夏官隸僕掌蹕宮中之事蹕止行者又曰師氏掌以媺詔王告王以善道也使其屬師四夷之隸各以其兵服守王之門外且蹕蹕止行人使不得近王宮又曰卿士掌大賓客率其屬夾道而蹕史記曰文帝過渭橋有一人橋下走出乘輿馬驚捕屬之廷尉曰縣人來聞蹕聲匿橋下久之出見車騎即走爾廷尉張釋之奏此人犯蹕當罰金事見刑法門漢書曰梁孝王竇太君少子愛之得賜天子旌旗從千車萬騎出稱蹕入言警擬於天子又曰上官桀與燕王詐上書奏霍光道上稱蹕續漢書曰建安二十二年命魏王建天子旌旗出警入蹕東觀漢記曰姚期次貺為光武賊曹掾從平河北上至葪葪中應王郎上驚去吏民遮道不得行期瞋目道左曰蹕大衆披辟後上即位上笑曰卿欲遂蹕耶又曰楊秉諫桓帝曰王者至尊出入有常警蹕而行清室而止漢舊儀曰皇帝出殿則傳蹕止人先置索室清宮而後往晉書曰桓玄至京都警蹕不絶於音玄篡盜八旬而奔敗宋書曰竟陵王誕在石頭城內修乘輿法物習唱警蹕梁書曰武帝永明末與兄懿卜居東郊之外范雲亦築室相依梁武每至其所妻常聞蹕聲又常與梁武同宿顧皓之舍妻方産雲在外曰武帝有王者相雲起曰王當仰屬相以見歸因是盡心推事又曰侯景即位唱警蹕識者以為名景而言警蹕非久祥也景聞惡之改為備蹕人又曰備於此便畢矣周生列子曰庖饌班錯所享不過一味華蓋結駟列道警蹕其榮不過容膝蘇子曰夫走卒警蹕列呼而行此諸侯之所謂榮華世俗之謂富者也揚雄甘泉賦曰八神奔而警蹕
