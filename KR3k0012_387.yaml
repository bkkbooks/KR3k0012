body:
  text: 人事部二十七健釋名曰健建也能有所建為也左傳莊公曰宋萬弒閔公于蒙澤曹師伐之南宮長萬奔陳以乘車輦其母一日而至乘車非兵車也駕人曰輦宋去陳二百六十里言萬之多力宋人請南宮長萬於陳陳人使婦人飲之酒而以犀革褁之比及宋手足皆見又曰初雩講于梁氏女公子觀之圉人犖自墻外與之戲子般怒使鞭之公曰不如殺之是不可鞭犖有力焉能投蓋于稷門蓋覆地稷門魯南城門走而自投接其屋之桷反覆門上又宣公下曰晉魏顆見老人結草以抗杜回杜秦之力人也又成公上曰高固入晉師磔石以投人禽之而乘其繫桑本焉以徇齊壘又成公下曰晉楚交戰叔山冉搏人以投中車折軾晉師乃止又襄公二曰晉荀偃士丐請伐偪陽偪陽人啟門諸侯之士門焉見門開故攻之懸門發鄹人紇抉之以出門者紇鄹邑大夫仲尼父叔梁紇也狄虎彌建大車之輪而蒙之以甲以為櫓狄虎彌魯人蒙覆也櫓大楯也左執之右拔戟以成一隊百人曰隊孟獻子曰詩所謂有力如虎者也主人縣布堇父登之及堞而絕之墜則又縣之蘇而復上者三主人辭焉乃退又哀公下曰楚白公作亂劫惠王子西以袂掩面而死子期曰昔者吾以力事君不可以弗終抉豫章以殺人而後死以效其多力豫章大木史記曰秦王有力好戲士任鄙烏獲孟說皆至大官王與說舉龍文赤鼎絕臏而死又曰范睢說秦昭王曰烏獲任鄙之力成荊孟賁慶忌夏育之勇又曰張良常學淮陽東見滄海君得力士為鐵椎重百二十斤秦皇東遊良與客俱擊秦皇博浪沙中悞中副車秦皇大怒大索天下求賊甚急張良乃更姓名亡匿於下邳漢書曰項羽在鴻門沛公與張良在坐樊噲聞事急乃拔楯入初入營營衛止噲噲直橦入立帳下羽見之問為誰良曰沛公參乘樊噲也羽曰壯士賜之巵酒彘肩噲既飲酒拔劍切肉食之羽曰能復飲乎曰臣死且不辭豈特巵酒也又曰甘延壽字君況北地郁郅人少以良家子善騎射為羽林投石拔距絕於等倫常超踰羽林亭樓由是遷為郎又曰淮南王長力能扛鼎廣陵王肯空手搏熊羆又曰上官桀從武帝上甘泉天大風車不得行解盍授桀桀奉蓋雖風常屬車兩下蓋御上奇其才力遷未央廄令又曰彭城王翌身長八尺七寸驍幹過人能手舉殿梁超過平陽楚漢春秋曰項梁嘗陰養士最高者多力拔樹以擊地東觀漢記曰蓋延字巨卿身長八尺彎弓三百斤以氣勢聞又曰陰興字君陵為期門僕射從上出入常操小蓋疾風暴雨屏翳左右泥塗隘狹自投車下脫袴解履涉淖至𣍿又曰祭彤字次孫力貫弓三百斤入為太僕從至魯帝指子路室曰此太僕室也范曄後漢書曰虞延字子太陳留人延生時有物如疋練直昇天長八尺六寸力能扛鼎又曰董卓膂力過人雙帶兩鞬左右馳射為羗胡所畏魏志曰許禇字仲康長八尺餘大十圍容皃雄毅勇力絕人漢末藂宗族堅壁以禦寇賊賊攻壁禇令男女藂石如蓋者禇飛石擲之所值皆碎以牛與賊易食牛奔還褚一手逆曳牛尾行百步賊遂不敢取牛禇後事太祖以力如虎而癡號曰癡虎又曰典韋陳留人形皃魁梧膂力過人又曰呂布字奉先五原人也以驍武給并州刺史丁原為騎都尉便弓馬膂力過人號為飛將英雄記曰袁紹父成字文開名壯健貴戚權豪自大將軍梁冀以下皆與交結恩好言無不從故京師諺曰事不諧詣文開江表傳曰太祖與馬超單馬會語超負其多力常置六斛米囊東西走馬輒掣米囊以量太祖輕重許禇瞋目瞪盼超瞪直玉切曰聞君有健將虎侯郍在太祖指禇超乃止太祖尋知之歎息良久曰幾為狡虜所欺王隱晉書曰吳彥字士則吳郡人有文武材幹長八尺餘膂力如虎晉中興書曰庾闡父東以勇力聞世祖時西域遣一使胡趫䟁音巢勇果自謂無敵晉人不敢與校世祖募求勇敢之士唯東應選遂懪殺胡勇聞殊俗晉令曰選三部司馬皆限力舉千二百斤以上前驅司馬取便大戟由基司馬取能挽一石七斗以上弓沈約宋書曰丁旿驍勇有氣力時人為之語曰勿跋扈付丁旿蕭子顯齊書曰張敬兒為持節督雍梁二州刺史部仵泊沔口敬兒舴艋過江詣晉熙王燮中江遇舡覆左右丁壯者各走餘二小吏沒䑳下呼叫張敬兒兩掖挾之隨舡覆仰常得在水上如此飜覆行數十里方得迎接又曰東昏侯有膂力能檐白虎幢自製雜色錦伎衣綴以金花玉鏡眾寶逞諸意熊崔鴻十六國春秋秦錄曰姚興將軍王奚仲驍悍有膂力去其弓矟持短兵出堡與赫連勃勃力戰眾多傷勃勃乃羈縻圍之斷其水路堡民執奚仲出降勃謂奚仲曰卿忠臣也朕方與卿共平天下奚曰若蒙大恩速死為惠乃與所親數十人自刎而死又前趙錄曰郭默字玄雄河內懷人世以屠沽為業默壯勇拳捷能貫甲跳三丈壍時人咸異之曰此兒必興郭氏河內陸允世之豪民望見以女妻之又曰陳安字虎侯家世農民安少慷慨曰大丈夫當乘軒杖節安能久執犁鋤乎遂東遊京師頗學書笇讀魏書見許禇而慕之乃自字虎侯遇晉室喪亂遂憑結司馬賓驍壯果毅武幹過人多力善射持七尺刀貫甲奔及馳馬又前秦錄曰張音剌本姓弓上黨泫氏人也泫玄字膂力過人能卻曳牛走張平愛而子之媱於平妾知而責之慚割陰以自誓遂為閹人堅甚寵之常侍左右終為名將所在有殊功稱鄧羗張萬人敵也又後趙錄曰張珍字巨秦汲郡人晉永嘉中與梁臣戍武德城石勒攻之城潰彌隨例當坑大呼曰官當活健兒何以殺也曰有何捷事而求活也彌曰武德西城上大聲督時警備嚴設使賊不入正是張彌勒笑曰降兒能爾正自奇健乃赦之趙書曰汲桑清河貝丘人年二十餘力扛百鈞呼聞數里時人服之又曰劉靈陽平人年二十餘常期役於縣力制奔牛走及馳馬後魏書曰孝文帝有膂力年十餘歲能以指彈碎羊髀骨又曰元淑字買仁有膂力彎弓三百斤善騎射又曰陳留王虔姿氣魁杰膂力絕人每以常矛短乃大作之猶患其輕後綴銅鈴於刃下其弓力倍如常人以其殊異於世虔常臨陣以矟剌人遂貫胸高舉以示於眾又嘗以一手頓矟於地騎馬偽退敵人爭取引不能出虔引弓射之一箭殺其二人搖矟之徒亡魄奔散徐乃命人取矟而反每從征伐乃率偏將先登陷陣勇冠當時又曰衛王儀長七尺五寸容皃甚偉美鬢髯有笇略少能舞劍騎射膂力過人弓將十石陳留公虔矟大見稱異時人云衛王弓桓王矟也又曰韓茂字元輿嘗從太宗征丁零時大風旍旗皆偃仆茂於馬上持幢初不傾倒太宗訝其膂力又曰伊馥代人也善射多力曳牛卻行三國典略曰周賀若敦嘗從太祖校獵於甘泉宮圍人不齊獸多越逸太祖大怒圍內唯有一鹿俄亦突圍而走敦躍馬馳之鹿上東山敦棄馬步逐山半掣之而下太祖大悅周書曰韓雄河東垣人也少敢勇魁岸膂力絕人工騎射有將帥才略又曰竇熾字光成性寬明有偉略美鬢髯身長八尺二寸善騎射膂力過人隋書曰魚俱羅馮翊下邽人也身長八尺膂氣雄壯言聞數百步墨子曰紂有勇力之人生捕兕虎指畫殺人晏子曰昔夏之衰也有推侈大戲殷之衰也有費仲惡來足走千里手制兕虎子思子曰中行穆伯手捕虎列子曰公儀伯以力聞諸侯周宣王備禮聘之公儀伯至觀形懦夫也宣王心惑曰汝之力何以對曰臣之力能折春螽之服勝秋蟬之翼王作色曰吾之力者能分犀兕之革曳九牛之尾猶憾其弱公儀伯曰臣之師有南丘子者力無敵於天下而六親弗知未嘗用其力故也又曰魏黑卯殺邴章邴章之子來丹謀復仇丹氣甚猛形甚露計粒而食從風而趨誓手劍以屠黑卯黑卯悍志絕眾力抗百夫筋骨皮肉非人類也延頸承刃披胸受矢鋩鍔摧屈而體無痕負其才力視來丹猶鶵鷇也孟子曰有馮婦善搏虎尸子曰中黃伯余左執太行之獶音猱右搏雕虎唯象未與吾試願為牛與象斗以自試又曰飛廉惡來力角犀兕勇搏熊虎也孔叢子曰孔鮒謂陳王曰梁人有陽由者其力扛鼎伎巧過人骨騰肉飛淮南子曰孔子勇復孟諸足蹀狡兔不以力聞六韜曰紂之卒握炭流湯者十八人崇侯虎等舉五百石重沙二十四人山海經曰中曲之山有懷木食之多力穆天子傳曰有虎在於葭中七萃之士曰高奔戎生捕以獻天子乃命為匣而畜之東虞是曰虎牢呂氏春秋曰孔子之勁能招國門之關招舉也淮南子同也又曰趙氏中山之多力者曰吾兵衣鐵甲操鐵杖以戰所擊無不碎所衝無不陷以車投車以人投人春秋外傳曰少室為聞子右聞牛談有力請與之戲不勝致右焉簡子許之使少室為宰曰知賢而讓可以訓矣蜀王本紀曰秦王知蜀王好色乃獻女五人蜀王遣五丁迎女還梓潼見大虵入山穴一丁引其尾不出五丁共引虵山乃崩說苑曰勇士孟賁水行不避蛟龍陸行不避虎狼發怒吐氣聲響動於天王充論衡曰語稱紂力能索鐵伸鉤撫梁易柱言其多力也風俗通曰頴川張欽字孟孝吳楚反與亞夫常為前鋒陷陣潰圍傍人觀曰壯哉此君欽聞自矜遂死軍方言曰蹶膂力也東齊曰䠇宋魯曰膂膂刀也郭璞曰律蹶多力貌通俗文曰強健曰馶音翅曹肇別傳曰肇之弟字德思力舉千鈞明帝寵之寢止恒同嘗與戲賭衣物有所獲輒入御帳取而出之石虎別傳曰虎字季龍勒從弟年十七八身長七尺五寸好弓馬射獵迅健有勇力同時等類多畏憚之異苑曰荊州上明浦常有蛟殺人死者不脫歲昇平中鄧遐為太守素勇健入水覔蛟曳出斬之至今不復有患博物志曰石蕃衛臣也有勇力背負千二百斤沙西京雜記曰江都王勁捷能超七尺屏風任豫益州記曰元帝為丞相有力士鐘齊本吳人百斛米分為三擔擔從渚入市五六里世說曰周處年少時凶強使氣為鄉里所患時義興水中有鮫山中有虎並皆犯暴百姓議與人為三橫而處尤極或說處使殺蛟虎遂入擊蛟或沒或出行數十里經三日夜鄉里皆謂死更相慶處竟殺蛟而出始知為人情所患處遂自改勵終為忠臣孝子楚辭曰魂兮來歸無上天一夫九首拔木九千言有一丈夫身有九段強梁多力從朝至暮能拔木九千也張衡西京賦曰烏獲扛鼎都盧尋橦羸說文曰羸痿也釋名曰羸累也恒累於人也東觀漢記曰和喜太后遭新野君喪悲傷思慕骨立不能自勝王隱晉書曰皇甫謐表從武帝借書上送一車書與謐謐羸病手不釋書歷觀今古無不皆綜又曰尚書令傅勗久羸瘦上令太官給乳酪吳越春秋曰子胥與要離見於吳王要離對曰臣吳國之東阡陌人細微無力迎風則偃背風則仆大王有命臣不敢盡死呂氏春秋曰吳王欲殺王子慶忌而莫之能殺吳王患之吳王之友曰要離謂王曰臣請殺之吳王曰汝拔劍不能舉臂上車不能登足汝能殺之要離曰請必能吳王曰諾世說曰何晏自平叔體弱不勝重服又曰李欽是茂魯弟六子清貞有遠操而少羸病不肯婚宮居住臨海常往兄侍中慕下既有高名王丞相辟為公府掾欽得板命笑曰茂弘乃復以一爵假人又曰丞相去見衛洗馬居然有羸形雖復終日調暢猶若不堪羅綺
