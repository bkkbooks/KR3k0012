body:
  text: 人事部三十八敘夢毛詩雞鳴曰蟲飛薨薨甘與子同夢箋云蟲飛薨薨東方旦明之時我猶樂與君子臥而同夢言親受之也又節正月曰召彼故老訊之占夢箋云君臣在朝侮元老召之不問政事但問占夢而已不尚道德而信徵祥也尚書泰誓曰朕夢叶朕卜襲于休祥戎商必克周禮春官下曰太卜掌三夢之法一曰致夢二曰觭夢三曰咸陟夢者人之精神所寤可占者也致夢言夢之所至也夏后氏作焉咸皆也陟之言得也周人作焉觭讀如諸戎掎之掎亦德也亦言夢所得殷人作焉又春官占夢曰掌其歲時觀天地之會辨陰陽之氣以日月星辰占六夢之吉凶一曰正夢無所感動平安自夢二曰噩夢謂驚愕而夢也三曰思夢覺時所思念之而夢四曰寤夢覺時道之而夢五曰喜夢喜悅而夢六曰懼夢恐懼而夢季冬聘王夢獻吉夢于王王拜受之聘問也夢者事之祥吉凶之占在日月星辰季冬日窮于次月窮于紀星回于天數將幾終於是發弊而問焉若休慶之云爾因獻群臣之吉夢於王歸美焉左傳昭元曰鄭子産如晉晉侯有疾韓宣子曰寡君寢疾於今三月矣並走群望晉望祀山川走往祈禱有加而無瘳今夢黃熊入於寢門其何厲鬼也對曰以君之明子為大政其何厲之有昔堯殛鯀于羽山其神化為黃熊入于羽淵實為夏郊三代祀之晉為盟主其或者未之祀也韓子祀夏郊晉侯有間間差也又昭二曰楚子成章華之臺願與諸侯落之祭之為落基今在華容城內太宰薳啓疆來召公公將往夢襄公祖祖祭道神梓慎曰君不果行襄公之適楚也夢周公祖而行今襄公實祖君其不行子服惠伯曰行也先君未嘗適楚故周公祖以道之襄公適楚矣而祖以道君不行何之三月公如楚論語曰孔子曰甚矣吾衰也久矣吾不復夢見周公謝承後漢書曰范式字巨卿山陽金鄉人仕郡為功曹與汝南張邵字元伯為友後元伯寢疾篤同郡郅君章殷子微省視之元伯臨終歎曰恨不見吾死友尋乃卒式忽夢見元伯玄冕垂纓屣履而呼曰吾以某日死某時葬求歸黃泉未有我忘豈能相及式覺而驚悲歎赴之魏志曰周宣字孔和為太史嘗有問宣者曰吾夜夢見芻狗其占何也宣答曰君欲得美食耳有頃出行果遇豐膳後又問昨夜復夢見芻狗何也宣曰欲墮車折腳宜戒慎之頃之果如宣言後又問曰昨夜夢見芻狗何也宣對曰君家欲失火當護之俄遂火起已而語宣曰前後三時皆不夢也聊試君耳何以皆驗耶宣對曰此神靈動君使言故與真夢無異也又問三夢芻狗而其占不同何也宣曰芻狗者祭神之物故君始夢當得飲食也祭祀訖則芻狗為車所轢故中夢當墮車腳也芻狗既車轢之後必載以為樵故後夢憂失火也宣之敘夢凡此類也後魏書曰莊帝永安中北海王皓入洛莊帝北巡城陽王徽投前洛陽令寇祖仁祖仁聞爾朱兆捕徽乃斬首送之兆夢徽曰我有金二百斤馬一百匹在祖仁家卿可取之兆於是懸祖仁首於樹以石墜足鞭之求金馬祖仁死時人以為立報崔鴻十六國春秋前涼録曰索紞字叔徹善數術占夢孝廉令狐策夢立冰上與冰下人語沈曰冰上為陽冰下為陰陰陽事也士如歸妻逮冰未泮婚姻事也君在上與冰下人語為陰陽介事君當為人媒冰泮而婚成策曰老夫耄矣不為媒也會太守田邈因策為子求張公徵女仲春而婚郡主簿張宅夢走馬上山還舍三周但見松柏不知門處沈曰馬為離離為火禍也人上山為凶字但見松柏墓門像也不知門處為無門也三周三期也後三年必有大禍宅果與賈摹等謀反伏誅焉興平問沈曰我昨夜夢舍馬舞數十人向馬拍手何也紞曰馬者火也舞為火起向馬拍手救火人也平未歸而火起郡功曹張邈嘗奉使詣州夜夢狼噉一腳紞曰腳肉被噉為卻字會東虜反遂不行張斌當舉孝廉夢豎竿中天紞曰此未字也斌果停凡所占夢莫不中驗皇甫謐帝王世紀曰黃帝夢大風吹天下之塵垢皆去又夢人執千鈞之弩驅羊數萬群帝寤而歎曰風為號令執政者垢去土解清治者天下豈有姓風名后者也哉夫千鈞之弩異力能遠者也驅羊數萬群是能善牧者也天下豈有姓力名牧者也於是依二夢之占而求之得風后于海隅登以為相得力牧于大澤進以為將又曰湯思賢夢見有人負鼎抗俎對己而笑寤而占曰鼎為和味俎者割截天下豈有人為吾宰者哉初力牧之後曰伊摯耕於有莘之野湯聞以幣聘有莘之君留而不進湯乃求婚於有莘之君有莘之君遂嫁女於湯以摯為媵臣至毫乃負鼎抱俎見湯也列子曰覺有八徵夢有六候奚謂六候一曰正夢二曰噩夢三曰思夢四曰寤夢五曰喜夢六曰懼夢此六者神所交也一體之盈虛消息皆通於天地應於物類故陰氣壯則夢涉大水而恐懼陽氣壯則夢涉大火而燔𤋲陰陽俱壯則夢生殺以浮虛為疾者則夢揚以沉實為疾者則夢溺藉帶而寢則夢蛇飛鳥銜髮則夢飛將陰夢火將疾夢食飲酒者憂歌舞者哭故神遇為夢形接為事古之真人其覺自忘其寢不夢又曰西極之南隅有國名古莽陰陽之氣所不交寒暑亡辨日月之光所不照晝夜亡辨其民不食不衣而多眠五旬一覺以夢中所為者實覺之所見者妄又曰周之尹氏大治産其下趣役者侵晨昏而弗息有老役夫筋力竭矣夜則昏憊而熟寐而昔昔夢為國君遊宴宮觀恣意所欲其樂無比覺則復役人有慰喻其勤者役夫曰人生百年晝夜各分吾晝為僕夫苦則苦矣夜為人君其樂無北何所怨哉尹氏盧錘家業心形俱疲昏憊而寐昔昔夢為人僕趨走作役無不為也數罵杖撻無不至也尹氏病之以訪其友其友曰若夜夢為僕夫苦逸之復數之常也若欲覺夢兼之豈可得耶又曰黃帝十有五年晝夢遊於華胥氏之國其國在弇州西台州北不知距齊國幾千萬里也非舟車足力之所及彼中無師長無嗜欲不知樂生不知惡死無夭殤不知親己不知疏物帝寤怡然而召輔相而告之曰朕思有以養身治物之道弗獲疲而睡若此知至道不可以情求朕得之矣莊子曰夢者陰陽之精也心所喜怒則精氣從之又曰夢飲酒者旦而哭泣夢哭泣者旦而田獵此寤寐事變也方其夢也不知其夢夢之中又占其夢焉覺而後知其夢又曰昔者莊周夢為胡蝶栩栩然胡蝶也自喻適志與不知周也俄然覺則蘧蘧然周也不知周之夢為胡蝶與胡蝶之夢為周與傅子曰夢攀日月覺而不上天庭夢入九泉寤而不及地下高宗得説偶中耳淮南子曰若人萬化而末始有極也弊而復新其為樂可勝計耶譬若夢夢為鳥而飛於天夢為魚而沒於淵方其夢也不知其夢也覺而後知其夢也今將有所大覺乃後知今此之為大夢也博物志曰太公為灌壇令於時文王夢見一婦人哭於道因問其故答曰吾是太嶽之女嫁為西海之婦吾行往來必以暴風疾雨今灌壇令當吾道吾不敢以暴風疾雨過也夢覺遂召太公三日果有暴風疾雨過其灌壇也始興記曰林水源裏有石室室前盤石上行羅十甕中悉是鉼銀採伐過之不得取之取必迷悶晉孝武太元初封驅之家奴竊三鉼歸發看有蛇螫之而死其夜驅之夢神語之曰君奴不謹盜銀三鉼即日顯戮覺奴已死銀由在復還之矣論衡曰趙簡子夢見天帝也以夢占之知樓臺山陵官位之象也人夢上樓臺升山陵輒得官位實樓臺山陵非官位也則知簡子夢見帝非天帝也世説曰衛玠總角時嘗問樂廣夢樂云是想衛曰神形所不接而夢豈是想樂曰因也衛思因不得遂成病樂聞故命駕為剖折之衛病即小差樂歎曰此賢胸中當必無膏肓夢書曰夢者像也精氣動也魂魄離身神來往也陰陽感成吉凶驗也夢者語其人預見過失如其賢者知之自改革也夢者告也告其形也目無所見耳無所聞鼻不喘嗅口不言也魂出遊身獨在心所思念忘身也受天神戒還告人也受戒不精忘神言也名之為寤告符臻也古有夢官世相傳也又曰昔聖帝明王之時神氣照然先見故堯夢乘龍上太山舜夢擊天鼓禹夢其手長湯夢布令天下後皆有天下桀夢疾風壞其宮紂夢大雷擊其手齊桓夢為大禽所中秦二世夢虎齧其馬王者夢之皆失天下黃帝針經曰歧伯曰正邪外襲內而未有定舍也反淫於藏榮衛俱行而與魂魄飛揚使人臥不得安而喜夢氣淫於府則有餘於外不足於內氣淫於藏則有餘於內不足於外陰氣盛則夢涉大水而恐懼陽氣盛則夢涉大火而燔灼陰陽俱盛則夢相殺毀傷上盛則夢飛下盛則夢墮甚飽則夢與甚飢則夢取肝氣盛則夢怒胏氣盛則夢恐懼心氣盛則夢喜笑脾氣盛則夢歌樂體重身不舉腎氣盛則夢脊兩解不屬其氣客於心則夢見丘山爝火客於肺則夢飛揚見金鐵之奇物客於肝則夢山林樹木客於脾則夢見丘陵大澤壞屋風雨客於腎則夢臨淵沒居水中客於膀則夢遊行客於胃則夢飲食客於大腸則夢田野客於小腸則夢藂邑街衢客於膽則夢斗訟自刳客於陰則夢接內客於頂則夢斬首客於足則夢行走而不能及居深穽內客於股肱則夢禮節拜跪王子年拾遺録曰融高西有夢草莖似蓍柯採之為占則知吉凶懷之以占夢立知禍福吉夢上尚書説命曰高宗夢得説盤庚弟小乙子名武丁德高可尊故號高宗夢得賢相其名曰説使百工營求諸野得諸傅巖使百官以所夢之形像經營求之於外野德之於傅巖之溪毛詩鴻鴈斯干曰吉夢維何維熊維羆維虺維蛇大人占之維熊維羆男子之祥維虺維蛇女子之祥又鴻鴈無羊曰牧人乃夢衆維魚矣旐維旟矣大人占之衆維魚矣實維豐年旐維旟矣室家溱溱溱溱衆也左傳僖下曰晉侯夢與楚子搏搏手搏也楚子伏已而盬其腦盬喋也子犯曰我得天楚伏其罪吾且柔之矣晉侯上向故得天楚子下向地故伏其罪也腦所以柔物又宣上曰鄭文公有賤妾曰燕結夢天使與己蘭曰余為伯倏余而祖也以是為而子以蘭有國香人服媚之如是既而文公見之與之蘭而御之生穆公名之曰蘭又昭元曰昔武王邑薑方震大叔邑薑武王后齊太公之女也懷胎為震大叔成王之弟虞夢帝為己曰余命而子曰虞帝天也將與之唐屬諸參而蕃育其子孫又哀下曰宋景公無子取公孫周之子得與啓畜諸公宮未有立焉公卒得夢啓北首而寢於盧門盧門宋東門也北首死處在門外失國之象也己為烏而集於上咮加於南門尾加於桐門桐門北至曰余夢美必立乃立得春秋元命苞曰堯為天子夢白帝遺吾馬喙子其母為扶始升丘睹白帝上有雲虎感己生皋陶此盡夢所見告之辭也雲虎有雲狀如虎堯聘索狀如問之如堯言徵與語明於刑法周書曰文王去商在程正月既生魄大姒夢見商之庭産商小子發取周庭之梓樹乎闕間梓化為松柏棫柞寤驚以告文王王及太子發並拜吉夢受商之大命于皇天上帝史記曰秦文公夢黃蛇自天下屬地其口止於鄜衍李奇曰鄜昔乎山阪曰衍問史敦敦曰此上帝之徵君其祠之又曰王太后母曰臧兒嫁為槐里王仲妻生兩女長女嫁為金王孫婦臧兒卜女當貴乃奪金氏內之太子宮太子幸愛之生三女一男男方任身時王美人夢日入懷太子曰此貴徵也孝景帝即位王夫人為皇后其男為太子景帝崩太子襲號為武皇帝漢書曰高祖薄姬內後宮歲餘不得幸始姬與管夫人趙子兒相愛約曰先貴無相忘已而管夫人子兒先幸漢王漢王四年坐河南城四幸靈臺此兩美人侍而薄姬不得見二人相與笑薄姬初時約漢王問其故兩人俱以實告漢王心悽然憐薄姬是日召欲幸之對曰昨夢龍據胸上曰是貴徵也吾為汝成之幸有身生文帝
