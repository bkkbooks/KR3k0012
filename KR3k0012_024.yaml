seq: 24
body:
  text: 時序部八夏下淮南子曰中央土其帝黃帝黃帝以土德王天下號曰軒轅氏死託祀於中央之帝其佐后土執繩而制四方其神為鎮星其獸黃龍土色黃也其音宮其日戊巳音土也戊巳土日也又曰孟夏之月南宮御女赤色衣赤采吹竽笙大生南方故處南宮也竽笙空中象陽故吹其兵戟戟有枝幹象陽布散也四月官田其樹桃四月勉農事故官田也桃説與杏同五月官相其樹榆是月養氣長養故官相佐也榆説聞未也季夏之月中宮御女黃色衣黃采其兵劍季夏中央也劍有兩刃喻無所不主也又曰貧人則夏被褐帶索含菽飲水支暑熱冬則羊裘蔽體短褐不掩形而煬灶口又曰鄒衍事燕惠王盡忠左右譖之繫之仰天而哭夏五月天為之降霜又曰陽氣為火陰氣為水水勝故夏至濕火勝故冬至燥八尺之表影修尺有五寸影修則陰氣勝短則陽氣勝陰氣勝則為水陽氣勝則為旱又曰南方之極自北戶孫之外北戶孫國名也日在其北皆為北向戶貫顓頊之國南至委火炎風之野夏赤又曰夏赤帝祝融之所司者萬二千里赤帝炎帝少典之子號為神農南方火德之帝也祝融顓頊之孫老童之子吳回也名黎為高辛氏火王號為祝融死為火神也其令曰爵有功賞有德惠賢良救飢渴舉力農振貧窮惠孤寡憂罷音疲疾出大賞起毀宗立無後封建侯立賢輔應陽施也又曰夏行春令則多風象春木氣多風又曰孟夏招搖指巳盛德在火又曰六月失政十二月草木不脫不脫葉著樹不零落也又景風至則施爵位賞有功夏至陰氣在下陽盛於上象陽布施故賞有功封建諸侯又曰夏治以衡衡者所以平萬物也衡之為度也緩而不後平而不怨施而不德匝而不責常平民祿以繼不足勃勃楊楊唯得是行養長化育萬物蕃昌以成五穀以實封疆其政不失天地乃明明理也呂氏春秋曰杜厲叔事莒閔公以為不知去居海上夏食菱芡冬食橡栗呂氏春秋曰季夏之月令漁師伐蛟升龜漁師掌漁官蛟有能害人難得故言伐龜神可以決吉凶入宗廟尊之故言升蛟則害龜則神也傅玄述夏曰四月維夏運臻正陽和風穆而扇物麥含露而飛芒鳳皇升而王萯秀王萯草名龍辰中而螢火翔魏文帝詩曰夏時饒溫和避暑就清涼北坐高閣下延賓作名倡嘉肴重疊來珍果在一傍棊局縱橫陳博奕合變揚功拙更平聲勝負歡美樂人觴從朝至日夕安知夏節長賈誼鵂鳥賦曰單閼音遏之歲兮四月孟夏庚子日斜兮鵂集豫舍立夏禮記月令曰四月之節日在昴立夏為四月節昏翼中曉牽牛中斗建巳位之初其日丙丁立夏之日螻蟈鳴太史以先立夏三日謁於天子曰某日立夏盛德在火天子乃齋立夏之日天子親率三公九卿大夫迎夏於南郊還乃賞公卿諸侯大夫於朝慶賜遂行無不欣悅命相贊傑俊遂賢良舉長大贊猶揚也遂猶遠也傑俊謂才兼於人者行爵出祿必當其位無虛授也易説曰立夏清明風至而暑鸛鳴博穀飛電見龍升天龍心星名易通卦驗曰立夏雨螻蛄鳴三禮義宗曰四月立夏為節者夏大也至此之時物已長大故以為目小滿為中者物之生長小得並滿故以小滿為名也孝經緯曰穀雨後十五日斗指辰東南維為立夏後十五日斗指巳為小滿續漢書禮儀志曰立夏之日夜漏未盡五刻京師百官皆衣赤至季衣黃抱朴子曰或問不熱之道答曰立夏之日或服玄冰丸或服飛霜散及六壬六癸之符則不熱幼伯子王仲都此二人衣之以重裘曝之於夏日之中周以十爐之火口不稱熱身不流汗蓋用此方者也淮南子曰春分加四十六日而立夏大風濟濟止也音比夾鍾夾鍾二月也萬物去陰夾陽而生也加十五日指巳則小滿滿冒也音比太蔟太蔟正月律也蔟之言陰衰陽發萬物蔟地而生周書時訓曰立夏之日螻蟈不鳴水潦淫漫蚯蚓不出臣奪后命王瓜不生害于百姓小滿之日苦菜不秀仁人潛伏靡草未死國從盜賊小暑不至是謂陰匿劉玄之行軍月令曰立夏日得金五穀不成夏旱多風得木夏寒草生得火多妖言兵戈起得土遠臣不朝國無政令得水上下相和順天下安寧登真隱訣曰立夏之日日中五帝會諸仙人於紫微宮見四真人論求道之功罪五帝之位諸宮皆有之此五方之帝非三十六天帝限也亦主學道者故詣太極紫微宮奉見四真人論扷其功罪之多少夏至周易復卦曰雷在地中復先王以至日閉關啇旅不行后不省方冬至陰之復也夏至陽之復也左傳曰昭二十一年秋七月壬午朔日有食之公問於梓慎曰是何物也禍福何為物事也對曰二至二分二至冬至夏至二分春風秋分日有食之不為災日月之行也分同道也至相過也二分日夜等故言同道二至長短極故相遇其他月則為災陽不克也故常為水陰侵陽是陽不勝陰傳曰少昊氏鳥名官伯趙氏司至者也伯趙伯勞也以夏至鳴冬至止周禮地官曰夏至日影尺有五寸鄭氏云土圭之長也尺有五寸夏至日立八尺表其影適與土圭等謂之地中今潁川陽城地為然又春官大司樂曰孤竹之管雲和之琴瑟冬至日於地上圓丘奏之孫竹之管空桑之琴瑟夏至日於澤中方丘奏之陰竹之管龍門之琴瑟於宗廟奏之雲和空桑龍門皆山名又曰宗伯以夏至致地祗物魅音魅以禬國之凶荒民之禮喪禬除也又曰柞氏夏至令刊陽木而火之冬至剝陰木而水之又曰剃氏掌殺草夏日至而夷之易通卦驗曰夏至景風生蟬始鳴螳蜋生鹿角解木槿榮又曰夏至小暑蝦蟆無聲又曰鹿者獸中陰也貴臣之象鹿應陰解角也夏至大陽始屈陰氣始升陰陽相向君之象也今失節不解臣不承君之象故為貴臣作姦也又曰離南方也夏日中赤氣出直離此正氣也氣出右萬物半死氣出左赤地千里又曰夏至之日清明風至易稽覽圖曰夏至後三十日極溫易稽覽圖曰夏至景風至蟬始鳴螳螂生京房占易曰夏至離王去聲景風用事人君當爵有德封有功春秋感精符曰冬日至成天文夏日至成地理春秋考異郵曰夏至井水躍五經通義曰夏至陰始動而未達故寢兵鼓不設政事所以助微氣之養也三禮義宗曰五月芒種為節者言時可以種有芒之穀故以芒種為名夏至為中者至有三義一以明陽氣之至極二以明陰氣之始至三以見日行之北至故謂之至又曰夏至之時祭崑崙之神於澤之中配以后土孝經説曰夏至之日在內衡又曰斗指午為夏至續漢書禮儀志曰夏至日浚井改水冬至鑽燧改火可去溫病也又曰夏至陰氣萌作恐物不成以朱索連以桃印文以施門戶代世所以尚為飾也故漢以五月五日朱索五色印為門戶飾以止惡氣宋書元嘉四年斷夏至日五絲縷之屬南史曰沈林子父穆夫為沈預所陷死林子與兄田子還東報讎五月夏至節日至預家正大集會子弟盈堂林子兄弟挺身直入斬預首男女無論老幼悉屠之以預首祭祖父墓周處風土記曰夏至之日雨名曰黃梅雨荊楚歲時記曰夏至日取菊為灰以止小麥蟲蠹按干寶變化論乃云稻成蛩麥為蛺蝶其驗乎輿地志曰郭引常夏至於射的釣魚供母將餌聞笳角聲魚躍而去管子曰夏而麥熟天子祈天宗其盛以麥盛菜盛也麥者穀之始抱朴子曰魏武收左元放左慈字元放桎梏之而自解蓋或用夏至日霹靂魑音杉也又曰見潮來去或有早晚輒言有參差非也水從天邊來一月之中天再東再西故潮再大再小也夏至天高故夏潮大也冬時天卑故潮水小也范子曰周髀云冬至三光微夏至三光盛淮南子曰夏至則斗南中繩陽氣極陰氣萌故曰夏至為刑刑始殺也又曰夏至則火從之故五月火正而水漏火正火王也故漏水二説火星正中也漏濕也陽氣為火陰氣為水水勝故夏至濕又曰夏至而流黃澤石精氣流黃土之精也陰氣作於下故流澤而出也石精五色之精也蟬始鳴半夏生蚊虻不食駒犢鷙鳥不搏黃口五月微陰在不未成駒犢黃口肌血脆弱未成故鷙鳥應陰不食不搏也又曰毛羽者飛行之類也故屬於陽故曰夏至日鹿角解又曰夏至加十五日指丁斗杓指丁則小暑音比大呂加十五日指未則大暑音比太蔟加十五日指庚背陽之維則夏節盡風俗通曰夏至著五綵辟兵題曰遊光厲鬼知其名者無溫疾五綵辟五兵也按人取新斷織繫戶亦此類也謹案織取始斷二三寸帛綴著衣襟以已織絍告成於諸姑也後世彌久易以五綵又永建中京師大疫云厲鬼字野重遊光亦但流言無指見之者其後歲歲有病人情愁怖復增題之冀以脫禍今家人織縑新皆取著後嫌絹二寸許繫戶上此其驗也抱朴子曰豫祖郴為汲令以夏至日請主簿杜宣賜酒北壁上有懸赤弩照於杯中形如蛇宣惡之及飲得疾後郴知之使宣於舊處設酒杯中猶有蛇因謂宣曰此弩影耳宣遂意解古今曆術曰夏至之日晝六十五刻夜三十五刻酈道元注水經曰丹水出丹魚先夏至前十夜伺之魚浮水側赤光上照如火神異經曰北方荒中有石湖方千里無凸徒結切凹校交反平滿無高下岸深五丈餘御名冰維夏至左右五六十日解耳曆疏曰藝種謂穀芽始出故曰芒種夏至其日日之行天至於艮維東北角言曰行極於北故曰夏至笁法真羅山疏曰荔枝以冬青夏至日子始赤六七日可食雜説曰百舌鳥一名反舌春則囀夏至則止唯食蚯蚓正月以後凍開則來蚯蚓出故也十月已後則藏蚯蚓蟄故也物之相感不知所由酉陽雜俎曰貓目睛旦暮圓及午豎斂如綖其鼻端常冷唯夏至一日暖蔡雍獨斷曰夏至陰氣始起鹿角解故寢兵鼓身欲寧志欲靜不聽事送迎五日又曰夏至陰氣起君道衰故不賀又曰夏至之日離卦用事日中時南方有赤雲如馬者離氣至也宜黍離氣不至日月無光五穀不成人病目疼冬中無冰應在十一月內夏至之日風從離來為順其年大熟夏至前一日夏至後十日十六日為窮日月令占候圖曰夏至朔日夏至并二日三日至六日夏至五穀熟二十二日二十四日夏至五穀不熟二十五日三十日夏至時價平和晦日夏至五穀貴天文録曰大寒在冬至後二氣積寒而未溫也大暑在夏至後二氣積暑而未歇也寒暑和乃在春秋分後二氣寒暑即未平也譬如火始入室未甚溫弗事加新久而愈熾既遷之猶有餘熱也冬至之日日出辰入申晝行地上百四十六度強夜行地下二百一十九度少弱故晝短夜長也夏至之日日出寅入戍晝行地上二百一十九度少弱夜行地下一百四十六度強故晝長夜短春秋之日日出卯入酉晝行地上夜行地下皆一百八十二度半強晝夜長短同也
