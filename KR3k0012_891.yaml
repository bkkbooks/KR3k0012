body:
  text: 獸部二獬豸說文曰獬豸似牛一角古者決訟命觸不直黃帝時有遺帝獬豸者帝問何食何處曰食薦春夏處水澤秋冬處竹箭松筠神異經曰東北荒中有獸如牛一角毛青四足似熊忠直見人鬥則觸不直聞人論則咋不正名曰獬豸一名任法獸張華曰今御史法冠曰獬豸論衡曰獬豸者一角之羊性識有罪皋繇治獄有罪者令羊觸之皋繇敬羊跪坐事之田俅子曰堯時獲獬豸緝其毛以為帝帳唐書曰開元二十年有一角神羊産子京兆之富平縣肉角當頂白毛上捧識者以獬豸名之騶虞說文曰白虎黑文尾長於身食自死之肉名曰騶虞有志信之德不食人詩國風騶虞曰騶虞鵲巢之應也鵲巢之化行則人倫既正朝廷既治天下純被文王之化則庶類蕃殖搜田以時仁如騶虞則王道成也彼茁者葭一發五豝于嗟乎騶虞騶虞義獸也白虎異文不食生物有至德之信則應之草木蟲魚疏曰騶虞即白虎也文異尾長身不食生物不履生草君王有德則見也尚書大傳曰丈王因囚羑里散宜生之於陵氏取怪獸尾倍其身名曰騶虞以獻紂山海經曰騶虞如虎五色具一曰尾長於身出孟山亦出鳥鼠同穴圍林氏之國日行千里東京賦曰圍林氏之騶虞晉書曰隆安中新野騶虞見宋書曰元嘉二十六年琅邪有白騶虞見二赤虎從之犀爾雅曰犀似豕郭璞注曰形似牛豬頭大腹卑腳有三蹄黑色二角一在鼻上者食角也小而不墮好食棘東觀漢記曰章帝元和元年日南獻白雉白犀晉書曰溫嶠還武昌至牛渚磯云其水多怪物遂燖犀角而照之見奇形異狀或朱衣乘車馬嶠夢人曰與君幽明道別何苦相照書紀年曰夷王獵于杜林得一犀牛韓詩外傳曰太史南官括至義渠得駭雞犀以獻紂戰國策曰張儀為秦破從連橫說楚王楚遣車百乘獻駭雞之犀夜光之璧於秦王離騷曰淹芳芷於腐臭淹潰腐臭棄駭雞於筐竹器也范子計然曰犀角出南郡上價八千中三千下一千淮南萬畢術曰犀角駭狐犀角置狐穴狐去不敢復居也抱朴子曰通天犀角有白理如綖音線者以盛米置群雞欲啄米至輒驚卻故南人名為駭雞也得直角一尺以上刻以為魚而銜以入水水常為開方三尺可得氣息水中以其角為義導者得毒藥以此攪之皆生白沫無復毒勢則無沫起也通天犀所以能殺毒也為物食百草之毒及衆木棘歲一解角藏於山中人以木如其角代之犀木覺後年輒復解山海經曰琴鼓之山多白犀蜀王本紀曰江水為害蜀守李冰作石犀五枚二枚在府中一在市南下二在淵中以厭水精因曰石犀里也林邑國記曰犀行過叢林不通便開口露齒前向直指棘林自開南州異物志曰犀如象大色黑頭似豪婦豬食草木也南越志曰高州平之縣巨海有大犀其出入有光水為之開劉欣期交州記曰有犀角通天向水輒開萬震南州異物志曰犀有特神者角有光曜白日視之如角夜暗之中理皆燦然光由中出望如火炬欲知此角神異置之草野飛鳥走獸過皆驚昔行野中見一死人鳶烏欲往啄之每至其頭輒驚走飛去怪而視之其頭中有犀簪近此角也劉欣期交州記曰犀出九德縣其毛如豕蹄有三甲頭如馬有三角鼻上角長額上角短晉郭璞犀贊曰犀之為狀形兼牛豕力無不傾詬無不靡以賄嬰災困乎角掎傳咸犀鉤銘曰世稱雞駭之犀有以此鉤見遺者為之銘獸曰玄犀處自林麓食唯棘刺體兼五肉或有神異表露以角含精吐烈望如華燭置之荒野禽獸莫觸兕爾雅曰兕似牛郭璞注曰一角青色重三千斤說文曰兕如野牛青毛其皮堅厚可為鎧嶓冢之上其獸多兕詩曰我姑酌彼兕觥維以不永傷又曰匪兕匪虎率彼曠野又曰既張我弓既挾我矢殪彼大兕春秋傳曰犀兕尚多棄申則郍論語曰虎兕出於匣檻也是誰之過與典守者過也國語曰平公射鴳音安不死鴳扈小鳥使堅襄搏之失公怒將殺之叔向聞之夕夕至於朝君告之叔向曰君必殺之昔吾先君唐叔射兕于徒林殪以為大甲以封于晉今君嗣吾先君唐叔射鴳不死搏之不得是楊吾君之恥也君其必速殺之勿令遠聞君忸怩顏厚乃趣赦之戰國策曰楚王遊於雲夢結駟千乘旌旗蔽日野火之起若雲霓兕虎之聲若雷霆有狂兕王彎弓而射發而殪笑曰樂矣今日之遊千秋萬歲之後誰與樂此楚辭曰君王親發兮發射憚青兕憚驚也言懷王是時親自射以言嘗從君田獵今狩驚有兕牛而不能制也呂氏春秋曰楚莊王時獵雲夢欲射殺隨兕者申公子培劫音劫王奪而射之王怒曰何其暴而不敬也欲誅之左右諫乃止不出三日子培病亡楚與晉戰於兩棠之地大勝賞有功者子培之弟請曰人有功於軍旅臣之兄有功於車下臣兄常讀故記曰殺隨兕者不出三日故臣兄劫而殺之果有病死王乃撿故記果有之遂賞子培弟也淮南子曰小國不鬥於大國之間畏見嫌也兩虎不鬥於伏兕之旁畏見食也論衡曰尚父伐紂渡孟津杖鉞呼曰蒼兕蒼兕按蒼兕水獸也善覆舟因令急渡蒼兕害汝河中有此獸時浮出一身九首人惡畏之未必能覆舟也亦謂之蒼雉西都賦曰狂兕觸蹶江賦曰水兕雷咆乎陽侯曹洪與魏文帝書曰若奔兕之觸魯縞未足以喻其易晉郭璞山海圖贊曰兕惟壯獸似牛青黑力無不傾自焚以革皮充武備角助文德象春秋運斗樞曰搖光之星散而為象爾雅曰南方之美有梁山之犀象焉說文曰象長鼻牙南越之大獸三歲一乳左傳襄四曰象有齒以焚其身賄也又定上曰吳伐楚針尹固與王同舟王使執燧象以奔吳師繞火燧繫象尾使赴吳師漢書大宛傳曰身毒國其人乘象以戰漢書曰武帝元始二年南越獻馴象注曰能拜隨人意吳志曰外國傳曰扶南王盤況少而雄傑聞山林有大象輒生捕取之教習乘諸國聞而伏之又曰賀齊為新都太守孫權出祖道作樂儛象吳書曰權謂齊曰今定天下都中國使殊俗貢珍狡獸率儛非君而誰也三國典略曰周軍逼江陵梁人率步騎開枇杷門出戰初嶺南獻二象于梁至是梁王被之以甲負之以樓束刃於鼻令崑崙馭之以戰楊忠射之二象反走隋書曰劉方授歡州道行軍惣管經略林邑大業元年正月軍至海口林邑王梵志遣兵守險方擊走之師次闍梨江賊據南岸立柵方盛陳旗幟擊金鼓懼而潰既渡江行三十里賊乘巨象四面而至以弩射象象中瘡卻蹂其陳王師力戰賊奔於柵因攻破之俘賊馘萬計唐書曰自永徽已來文單國纍獻馴象凡三十有二皆豢於禁中頗有善舞者以備元會充庭之飾及德宗即位曰王者不尚異物不貴難得之貨今官用費而物性不得非宜也悉放於荊山之陽又曰高宗時周澄國遣使上表云訶伽國有白象首垂四牙身運五足象之所在其土必豐既有威靈又弭災患力兼十象強制百人以水洗牙飲之愈疾請發兵迎取以獻之上謂侍臣曰夫作法於儉其弊猶奢誰能制止故聖人越席以昭儉茅茨以誡奢書云珍禽奇獸不育於國方知無益之源不可不遏朕安用奇象令其遠獻乃勞其使而遣之山海經曰巴蛇食象三歲而出其骨帝王世紀曰舜葬蒼梧下有群象常為之耕又云禹葬會稽祠下有群象耕田萬歲曆曰成帝咸康六年臨邑王獻象一知跪拜文子云見象之牙知大於牛呂氏春秋曰肉之美者髦象之約高誘注曰髦象肉之美者吳録地理經曰九真郡龐縣多象象生山中郡內及日南饒之江表傳曰孫權遣使詣闕獻馴象二頭魏太祖欲知其斤重咸莫能出其理時鄧王冲尚幼乃曰置象大船刻其所至稱物以載之可知也太祖大悅即施行焉又曰魏文帝遣使於吳求象牙群臣以非禮欲不與孫權勑付使者論衡曰象耕鳥耘虛言也五帝三王皆有功德何獨為舜禹也蒼梧多象之地會稽衆鳥所居象自蹈土鳥自食草土蹶草盡若耕耘也又曰夫十圍之牛為牧豎所驅長仞之象為越童所鉤無便故也蔣子萬機論曰莊周婦死而歌夫通性命者以卑及尊死生不悼不可論也夫象見子皮無遠近必泣周何忍哉博物志曰南海四象各有雌雄其一雌死百有餘日其雄泥土著身獨不飲酒食肉長吏問其所以輒流涕若有哀狀晉諸公讚曰晉時南越致馴象於皋澤中養之為作車黃門鼓吹數十人令越人騎之每正朝大會皆入充庭帝行則以象車導引以試橋梁後象以鼻擊害人有司啓之而殺象象泣血流地不敢動自後朝議以象無益於事悉送還越萬震南洲曰南傳曰扶南王善射獵每乘象三百頭從者四五千人異物志曰俗傳象牙歲脫猶愛惜之掘地而藏之人欲取當作假牙潛往易之覺則不藏沈懷遠南越志曰象牙長一丈餘脫其牙則深藏之削木代之可得不爾窮其主得乃已也異苑曰會稽張茂字偉康嘗夢大象以問萬推推曰當為太守而不能善夫象者大獸取諸其音獸者守也象以齒焚其身後必為人所殺茂永昌中為吳興太守值王敦問鼎執正不移敦遣沈充滅之而取其郡萬震南州異物志曰象之為獸形體特詭身倍數牛目不逾狶鼻為口役望頭若尾馴良承教聽言則跪素牙玉潔載籍所美服重致遠行如丘徙王韶之始興記曰伊水口有長洲洲廣十里平林蔚然有群象野牛法顯記曰藍國王得佛一分舍利起塔塔傍有池池中有龍常守護有群象以鼻取水雜香花而來供養後魏書曰乾陀國好征戰有鬥象七百頭十人乘一象皆執兵仗象鼻持刀嶺表録異曰廣之屬郡潮循州多野象潮循人或捕得象爭食其鼻云肥脆尤堪作炙或云象肉有十二種象膽不附肝隨月轉在諸肉楚越之間象皆青黑唯西方佛林大食多白象又雲南豪族家多畜象負重致遠若中國之牛馬漢使至其國輒舞象飾以金羈皆合節奏乾符中占城獻馴象亦能蹈舞
