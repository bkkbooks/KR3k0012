body:
  text: 珍寶部十金下國語曰范蠡乘輕舟以浮於五湖莫知其所終王令工以良金寫范蠡之狀而朝禮之穆天子傳曰觀天子寶黃金之膏金膏亦猶玉膏皆其精液也春秋後語曰尉繚來說王曰以秦之強諸侯譬如郡縣其君臣俱怨若或合從醮而出不意醮謂祭盟誓之義也此智伯夫差湣王所以亡也願大王無愛財物賂其豪臣以亂其謀秦不過亡三十萬金則諸侯可盡王大善之又曰邯鄲既存平原君欲封魯仲連仲連辭謝者三終不肯受平原君乃置酒酒酣起前以千金為仲連壽仲連笑曰所貴於天下之士者為人排患釋難解紛而無取也即有取者乃商賈之人仲連不忍為也遂辭平原君而去終身不復見也又曰邯鄲之北有蘇人侯蘇秦往說之蘇人侯送以黃金百溢其家丞諫曰君侯之與客無故舊而送之百金其說可得聞耶蘇人侯曰客天下辯士立談之間再奪我地而復歸之吾地雖小豈其百金韓詩外傳曰田子為相三年歸休以金百鎰奉其母母曰不義之物不入於館為人臣不忠是為人子不孝子其去曰子慚愧走出自歸於王還金請退就獄王赦田子罪以金賜其母又曰楚襄王遣使者持金千斤白璧百雙聘莊子欲以為相莊子固辭又曰延陵季子遊於齊見遺金於路呼牧者取之牧者曰何子居之高而視之下也類君子而言野也有君不臣有友不友當暑衣裘吾豈取金者乎延陵季子知其賢者請問姓字牧者曰子乃皮相之士也何足語姓字哉遂去周易參同契曰黃土金之父流水珠之母英雄記曰董卓塢有金二三萬斤漢武故事曰帝年數歲長公主遍指侍者與作婦好否皆不用後指陳后帝曰若得阿嬌作婦當以金屋貯之漢武內傳曰帝受西王母真形經盛以黃金之几又曰西王母有丸丹金液金漿漢東園祕記曰亡人以黃金塞九竅則尸終不朽陸賈新語曰舜藏金於嶄巖之山損珠玉於五湖之淵杜媱邪絕覬媚之情也東方朔神異經曰北荒中有二金闕高百丈金銀盤圍五十丈又曰西方白宮之外有金山上有人長五丈餘名曰金犀守之蜀王本紀曰秦王以金一笥遺蜀王蜀以禮物荅而盡化為土秦王怒群臣拜賀曰土者地也秦當得蜀矣說苑曰申鳴者孝聞於楚王授之相辭不受其父曰使汝有祿於國立義於庭吾無憂矣申鳴從父命為楚相及白公亂申鳴曰今不得為孝子矣遂援鼓殺白公其父亦死王賜金百斤申鳴曰何面目見天下遂自殺新序曰齊桓公見麥丘邑人問之曰年幾何對曰八十矣曰以子之壽祝寡人乎曰使主君甚壽金玉是賤以人為寶又曰公孫敖問伯象先生曰今先生收天下之術愽觀四方之久矣未能裨世主之治明君臣之義是則未有異於府庫之藏金玉筐之囊間有書又曰郭隗語燕昭王曰古之人君有以千金求千里馬已死買骨五百金不能朞年千里馬至者二論衡曰盧江民小男曰陳爵陳挺相與浴於湖崖有酒樽色正黃沒水中爵以為銅涉水取之重不能舉挺往助之樽更為沉盤動入深淵中挺爵留顧見如錢等正黃數百千枚即共棳樚各得滿手歸示其家乃黃金也論衡曰眾口鑠金者五行二曰火五事二曰言言與火宜故云鑠金風俗通曰眾口鑠金俗說有美金此眾人咸共詆庛言其不純賣金者欲其售因取鍜燒以見真此為眾口鑠金又曰漢書說王陽好車馬衣服及遷徙所載不過囊衣俗傳王陽能作黃金語曰金不可作世不可度王陽居食祿雖為潔白車馬衣服亦能幾何何足推之乃傳俗語白虎通曰金在西方西方者陰始起萬物禁止金之為言禁也西京雜記曰韓嫣好彈常以金為丸一日所失者十餘長安為之語曰若飢寒逐金丸京師兒僮每聞嫣出輒隨之望丸所落而拾之樂說稽熠嘉曰君臣之義生於金葛洪神仙傳曰容成公服三黃得仙所謂雄黃雌黃黃金搜神記曰魏郡張巨賣宅與程應應舉家疾賣何文文獨持大刀暮入北堂梁上一更中有一人丈餘高冠赤幘呼曰細腰應諾何以有人氣荅曰無文問曰高冠者誰荅曰金也在西屋壁下文掘得金三百斤又曰漢文微服懷金過魯少年少年柱金杖出應門王子年拾遺記曰少昊時金鳴於山銀涌於地或如龜虵之類乍似人鬼之形又曰方丈山有池泥色金而味辛以泥為器可作丹矣百鍊可為金矣金色青照鬼魅猶如照面不得藏形也異苑曰汝南殷陶市同縣張南宅掘地得錢百萬金二斤即以還南南曰君至德感寶為君出終不肯受陶送付縣令河南張摽表上尚書又曰新野黃舒義熙中耕田得一船金卜者云三年勿用長守富也舒不能從遂成土壤又曰永康王曠井上有一洗浣石時見赤氣後有胡人寄宿忽求買之曠怪所以求及度錢子婦孫氏覩二黃鳥鬭於浣石上疾往掩取變成黃金胡人不知索市逾急既得撞破石內正有二鳥處又曰即墨有古冡發之有金牛塞埏門不動犯之則大坰述異記曰南康雩都縣沿江西出去縣三里名夢口穴狀如石室舊傳常有神鷄色如好金出此穴中奮翼迴翔長鳴響徹見人輒飛入穴因號此石為鷄石昔有人耕此山側望見鷄出遊戲有一長人操彈彈之鷄遙見便飛入穴彈丸正著穴上丸徑六尺許下垂蔽穴猶有門隙不復容人又有人乘船從下流還縣未至此崖數里一人通身黃衣檐兩籠黃紙求寄載因載之黃衣人乞食船主與之食訖船適至崖下船主乞瓜此人不與仍唾盤上徑下崖直入石中船主初甚忿之見其入石始知神異取食器視之見盤上唾悉是黃金又曰先儒說禹時天下兩金三日古詩曰安得天雨金使金賤如土周成王時咸陽雨金今咸陽有雨金原秦二世元年宮中雨金既而化為石漢惠帝二年宮中雨黃金黑錫又翁仲孺家貧力作居渭川一旦天雨金十斛於其家由是與王侯爭富今秦中有雨金翁世世富錄異傳曰隗炤者汝南陰鴻壽亭民善於易臨終書板授其妻曰吾死當大荒窮雖爾慎莫賣宅後到五年春當有詔使頓來此亭姓龔此人負吾金卿以此板往責之亡後果大困欲賣宅者數矣憶夫言輒止到期日有龔使者果至亭妻遂齎板往責使者使者執板不知所言曰我生平不踐此處何緣爾也沈吟良久謂曰賢夫何能妻曰夫善易而未曾為人卜使者曰可矣乃顧命侍者取蓍而筮之卦成謂炤妻曰吾不相負金賢夫自有金乃知亡後暫窮故藏金以待太平所以不告婦兒者恐金盡而困無已也知吾善易故書板以寄意耳金有五百斤盛以青缾覆以銅拌埋在堂屋東頭去壁一丈入在九尺妻還掘之皆如卜焉異物志曰狼㬻民與漢人交關嘗夜市以鼻嗅金知其好惡幽明錄曰淮牛渚津水深無可筭計人見一金牛形甚魁壯以金鏁絆也又曰巴丘縣百金崗以上二十里名黃金潭上有瀨亦名黃金瀨古有釣於此潭獲一金鏁引之遂滿一船而有金牛出聲貌奔壯釣人波駭牛因奮躍還潭又云晉南頓王平新營一宅始移夢見一人云平輿令黃欲以一器金賂暴勝之為暴所戮埋金在吾上見鎮迮甚若君復築室無復入金明旦即鑿壁下入五尺果得金又曰譙縣城東因城為臺方二十丈高八尺一曰古之冡也魏武帝即築以為臺東面墻崩金玉流出取者多死因築復之又曰海中有金臺臺內有金几玄記紀金之精為牛又曰長安有張氏者晝獨處室有鳩自入止于對床張惡之披懷祝曰鳩爾來為我禍耶止承塵為福耶入我懷鳩翻飛入懷以手探之不知所在而得一金帶鉤焉遂寶之自是之後子孫昌盛世說曰劉曄譖陳矯明帝以金五餅授矯曰君明朕心顧君妻子未知也又曰管寧華歆共園中鋤菜見地有斤金管揮鋤與瓦石不異華捉而擲去曹操別傳曰操引兵入峴發梁孝王冡破棺收金寶數萬斤天子聞之立泣益部耆舊傳曰王忳字少林詣京師於客舍見諸生病甚因謂忳曰腰下有金十斤願以相與乞收藏骸骨未問姓名因絕忳賣金一斤以給絮棺九斤置生腰下魯國先賢志曰叔孫通草創朝儀拜通為奉常賜金五百斤通悉以金賜諸生諸生乃喜曰叔孫生聖人也知當世務廬江七賢傳曰陳翼字子初到覽鄉見馬旁有一人病呼曰我長安魏少公聞卿廬江樂來遊今病不能前翼迎歸養之有金十餅素二十疋既死翼賣素買棺衣衾以金置棺下騎馬出入後其兄長公見馬告之吏捕翼翼具言棺下得金長公叩頭謝以金十餅投其門翼送長安還之邴原別傳曰邴原字根矩以喪亂方熾遂往遼東時同郡劉舉亦在遼太守公孫度掩捕其家而舉得免窘逼歸原東萊太守太史子義素有義原以舉付之舉臨去以其手所杖劍金三餅與原原受金辭劍還謂度曰將軍平日與舉無郄而欲殺之者但恐其為蜂蠆耳令舉以去若以拘閉其家毒螫必滋甚矣度即出舉家原以金還之茅君內傳曰漢帝及王莽獻金鍾之屬今埋在小茅山上又曰取鈆十斤著鐵器中猛火燒之三沸投九轉之華一銖於鈆中攬之須臾立成黃金九斤吳時外國傳曰斯調國作金床扶南傳曰毗騫國食器皆以金為之金如此間之石露出山邊無有限吳越春秋曰伍子胥伐楚還漂陽瀨水上欲報自殺婦人百金不知其家投金瀨水中而去須臾有一姥哭而來自言是女母取金而去蜀李書曰武帝諸將進金銀或以得官者楊襃諫曰陛下為天下主何有以官買金耶帝謝之列女傳曰樂羊子出學其妻貞義截髮供其費後羊子得遺金一餅以與妻貞義曰君子不以利污行羊子慚而去之又曰廣漢汝婦者汝敦妻也敦以所受田地奴婢三百餘萬悉讓與兄裁留園地數十畝起舍耕作土中得金一器敦以示妻妻曰本言讓先祖所有此獨非其有耶敦曰固吾意也俱擔金送與兄嫂郡國誌曰蘇秦宅在洛陽利仁里後魏高顯業每夜見赤光於光處掘得金百斤銘曰蘇家金業為之造寺秦州記曰金城郡應劭云初築城得金城臨海記曰白石山去縣邑三十里望之如雪上有淵相傳云金鵝之所集鄭緝之東陳記曰金㹠山之康縣南三里故老傳云有人得金㹠於此故名山劉欣期交州記曰趙嫗者九真人乳長數尺入山聚盜遂攻郡常著金擒提屐又曰金有華出珠崖謂金華采者也雪山在新昌南人曾於山中得金塊如升迷失道還置本處乃得出錢塘記曰縣東南有峴山長老相傳採金於此羅浮山記曰州南十里有牛潭漁人見金牛自水出義熙中縣民張安躡得金鏁大如指遂數十尋尋尋不已俄有物從水引之掘不能禁以刀斷得數尺安遂致富其後義興周雲甫掩此牛掣斷其鏁得二丈遂以財雄林邑記曰從林邑往金山三十日至遠望金山嵯峨如赤城照耀似天光澗壑谷中亦有生金形如䖝豸細者似蒼蠅大者若蜂蟬夜行燿熠光如瑩火地鏡圖曰黃金之氣赤黃千萬斤以上光大如鏡盤白澤圖曰黃金之精石名瑭狀如豚居人家使人不宜妻白鼠以昏時見於丘陵之間視所出入中有金關令內傳曰老子與尹喜登崑崙上金臺玉樓七寶宮殿晝夜光明乃天帝四王之所遊處有珠玉七寶之床宗躬孝子傳曰郭巨河內溫人也妻生男謀曰養子則不得營業妨於供養當殺而埋焉鍤入地有黃金一釜上有鐵券曰黃金一釜賜孝子郭巨揚雄集曰單于上書願朝哀帝以問公卿公卿虛費府帑可且勿許單于使辭去未發雄上書諫天子召還匈奴使者更報單于書而許之賜雄黃金十斤孔融聖人優劣論曰金之優者名曰紫磨猶人之有聖也陳思王辯道論曰甘陵始其語余曰本師姓韓字世雄始常與師於南流作金前後數四投數萬斤金於海嶺表異錄曰五嶺內富州賓州澄州江溪間皆產金側近居人以木箕陶金為業自且多暮有不獲一星者鄭玘傷淘者詩云披沙辛苦見傷懷往往分毫望亦乖力盡半年深水裏難全為一鳳凰釵就中澄州者最為良金余頃年使于上國親友不欲書其姓字附澄州金二十兩與當時權臣余訝其單鮮友人曰金雖少貴其夜明有異於常金耳遂留宿驗之信然也
