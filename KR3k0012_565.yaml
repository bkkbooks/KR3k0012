body:
  text: 樂部二雅樂中傳曰吳季札來聘請觀於周樂使工為之歌周南召南曰美哉始基之也猶未也猶有商紂未盡善也然勤而無怨矣為之歌邶鄘衛曰美哉淵哉憂而不困者也吾聞衛康叔武公之德如是是其衛風乎為之歌王曰美哉思而不懼其周之東乎為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱乎大風也表東海者其大公乎為之歌豳曰美哉蕩蕩乎樂而不淫其周公之東乎為之歌秦曰美哉此之謂夏聲夫能夏則大大之至也其周之舊乎為之歌魏曰美哉渢渢乎大而險儉而易行以德輔此則明主也為之歌唐曰思深哉其有陶唐氏之遺民乎不然其何憂之遠也非令德之後誰能若是為之歌陳曰國無主其能久乎自鄶以下無譏焉為之歌小雅曰美哉思而不二怨而不言其周德之襄乎猶有先王之遺民焉為之歌大雅曰廣哉熙熙乎熙熙和樂聲也曲而有直體其文王之德乎為之歌頌曰至矣哉盛德之所同也見舞象前南籥者曰美哉猶有所憾見舞大武者曰美哉周之盛也其若此乎見舞詩詔護者殷湯樂也曰聖人之弘也而猶有慚德聖人之難也見舞大夏者禹之樂也美哉勤而不德非禹其誰能及之見舞韶簫者舜之樂也曰至矣哉大矣如天之無不覆也如地之無不載也雖甚盛德其蔑以加此矣若有他樂吾不敢請已又曰宋公享晉侯於楚丘請以桑林桑林殷天子樂名也荀罃辭荀偃士丐曰諸侯宋魯於是觀禮宋王者後魯以周公故皆用天子禮樂故可觀也魯有禘樂賓登用之禘三年太祭則作四代之樂也別祭群公則用諸樂也宋以桑林享君不亦可乎言俱天子樂也舞師題以旌夏旌夏大旌也題識也以大旌表識其行列也晉侯懼而退入於房旌夏非常卒見之人心偶有所畏卜桑林見崇見於卜兆也荀見偃士丐欲奔請禱焉奔走還宋禱謝荀罃不可曰我辭禮矣彼則以之猶有鬼神於彼加之言自當加罪於宋晉侯有聞又曰晉與諸侯伐鄭鄭人賂晉侯以師悝師觸師蠲皆樂師名歌鍾二肆肆列也懸十六為一肆三十二枚也及其鎛磬女樂二八晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之魏絳於是乎始有金石之樂禮也大夫有功則賜樂也論語曰師摯之始關睢之亂洋洋乎盈耳哉魯太師摯識關睢之聲而首理其亂者洋洋乎盈耳德而美之又曰樂云樂云鍾鼓云乎哉言樂不但樂此鍾鼓而已所貴者貴其移風易俗也又曰子語魯太師樂曰樂其可知也始作翕如也始作謂金奏時聞金作人皆翕如變動之貌從之純如也從讀曰縱縱之謂八音皆作純如感和之貌皎如也繹如也以成皎如使清別之貌也繹如志意條達又曰子謂韶盡美矣又盡善也韶舜樂也美舜自以德禪於堯又盡善謂太平也謂武盡美矣未盡善也謂周武王樂美武王以此功定天下未盡善致太平孝經曰移風易俗莫善於樂爾雅曰宮謂之重商謂之敏角謂之經征謂之迭羽謂之柳郭璞注皆五音之列名其義未詳史記曰趙簡子疾五日不知人扁鵲曰昔秦繆公嘗如此五日不知人七日乃寤語大夫曰我之帝所甚樂與百神遊于鈞天廣樂九奏萬舞不類三代之樂其聲動人心又曰樂所以上事宗廟下以變化黎庶又曰凡樂者使萬民感蕩滌雅穢斟酌以飾厥性又曰太史公曰音樂者所以動蕩血脈通流精神而和正心也又曰凡音由於人心天之與人相通如影之象形響之應聲也故為善者天報之以福為惡者天報之以殃其自然者也故舜作五絃之琴歌南風之詩而天下治紂為朝歌北鄙之音身死國亡舜之道何弘也紂之行何隘也夫南風之詩生長之音也舜樂好之天下同意得萬國之歡心故得天下也夫朝歌者不時也北者敗也鄙者陃也紂樂好之萬國殊心諸侯不附百姓不親天下叛之故身死國亡漢書曰聲者蕩滌人之邪意全其正性也商章也物成熟可章度也角觸也物觸地而出戴芒角也宮中也居中央暢四方唱始施生為四聲納也徵祉也物盛大而番祉也羽宇也物聚藏宇覆之也協之五行則角為木五常為仁五事為貌商為金為義為言徯征為火為禮為視羽為水為智為聽宮為土為信為思以君臣民事物言之則宮為君商為臣角為民徵為事羽為物又曰樂者四暢交於中而發作於外此先王立樂之方也又曰樂者歌九德誦六詩是以薦之郊廟則鬼神享之也又曰夫樂通神明安民庶故聽者無不虛已竦神悅而成流是以海內遍知上德被服其風光輝日新化上而遷善而不知所以然至於萬物不夭天地順而嘉應舉故詩曰磬管鏘鏘降福穰穰魏志曰太祖以杜夔為軍謀祭酒參太樂事因令創制雅樂夔善鍾律聰思過人絲竹八音靡所不能唯歌舞非所長散騎侍郎鄧靜尹商善詠雅樂歌師尹胡能歌宗廟郊祀之曲舞師馮肅時知先代諸舞惣究研精遠考經誥近採故事教習講律備作樂器復先代之樂皆自夔始也吳録曰吳中呼周瑜為周郎瑜精意音樂三爵之後其有闕誤瑜必知之而顧時吳人謠曰曲復設周郎顧宋晝臧嘉傳曰武帝入京城進至建鄴桓玄走武帝使喜入宮收圖書器物封府庫有金飾樂器武帝問喜卿欲此乎喜正色曰主上幽逼播越非所將軍首建大義劬勞王室雖復不肖實無情於樂帝笑曰聊以戲耳齊書蕭惠基傳曰自宋大明已來聲伎所尚多鄭衛而雅樂正聲鮮有好者惠基解音律尤好三祖曲及相和歌每奏輒賞悅崔鴻十六國春秋曰後秦録姚興傳曰濟南公雍字子和興之弟也尤喜音樂皆能度其盈虛增改曲調世咸傳之號濟南新調後魏書曰元孚封萬年鄉男永安末樂器殘鈌莊帝命孚修之上表曰昔太和中故中書監高閭太樂令公孫崇修造金石數十年間乃奏成功時大集儒生考其得失太常卿劉芳請別營造久而方就復召公卿量校合否論者沸騰莫有適從登被旨勑並見施用往歲大軍入洛戎馬交馳所有樂器亡失垂盡臣至太樂署問太樂令張乾龜等云丞前已來置宮懸四箱筍簴十六架編黃鍾之磬十四雖器名黃鍾而聲實夷則考之音制不甚諧韻姑洗懸於東北太簇編於西北蕤賓列於西南並皆器象若位調律不和又有儀鍾十四簴懸架首和不叩擊今便刪廢以從正則臣今據周禮鳧氏修廣之規聲氏居句之法吹律求聲叩鍾求響損除繁重討論實録依十二月為十二呂各準辰次當位懸設月聲既備隨用擊奏則會還相為宮之義又得律呂相生之體今量鍾磬之數各以十二架為定奏可于時縉紳之士咸往觀聽靡不咨嗟歎服而反太傳録尚書長孫承業妙解聲律時復稱善隋書曰文帝性恭儉不好聲妓嘗遣牛弘定樂帝曰非正聲雅樂清商九部四舞皆令罷之又曰萬寶常不知何許人也父大通從梁將王琳歸于齊後復謀還江南事泄伏誅由是寶常被配為樂戶因而妙達鍾律遍工八音造玉磬以獻於齊又嘗與人方食論及聲調時無樂器寶常因取前食器及雜物以著扣之品其高下宮商畢備諧於絲竹大為時人所賞然歷周泊隨俱不得調開皇初沛國公鄭譯等定樂初為黃鍾調寶常雖為令人譯等每召與議然言多不用後譯樂成奏之上召寶常問其可否寶常曰此亡國之音豈陛下之所宜聞上不悅寶常因極言樂聲哀怨淫放非雅正之音請以水尺為律以調器上從之寶常奉詔遂造諸樂器其聲率下鄭譯調二律并撰樂譜六十四具論八音旋相為宮之法改絃移柱之規為八十四調一百四十四律變化終於一千八聲時人以周禮有旋宮之義自漢魏以來知音者皆不能通見寶常特創其事皆哂之至是試令為之應手成曲無所疑滯見者莫不嗟異於是損益樂器不可勝紀其聲雅淡不為時人所好太常善聲者多排毀之又太子洗馬蘇夔以鍾律自命尤忌寶常夔父威方用事凡言樂者皆附之而短寶常數詣公卿怨望蘇因誥寶常所為何所傳受初有一沙門謂寶常曰上雅好符瑞有言徵詳者上皆悅先生當言從胡僧受學云是佛象菩薩所傳音律然則上必悅先生所為可以行矣寶常然之遂如其言以答威怒曰胡僧所傳仍是四夷之樂非中國所宜行也其事竟寢寶常聽太常所奏樂泫然而泣人問其故寶常曰樂聲淫厲而哀天下不久相殺盡時四海全盛聞其言者皆謂為不然大業之末其言卒驗寶常貧無子其妻因其臥疾遂竊其資物逃寶常飢餧無人贍竟餓而死及將死也取其所著書焚之曰何用此為見者於火中採得數卷見行於世時論哀之開皇之世有鄭譯何妥盧賫蘇夔蕭吉並討論墳籍撰著樂書皆為當世所用至於天然識樂不及寶常遠矣安馬駒曹妙達王長通郭金樂等能造曲為一時之妙又習鄭聲而寶常所為皆歸於雅此輩雖公議不附寶常然皆心服謂以為神又曰文帝開皇六年尚因周樂命工人齊樹提撿校樂府改換聲律益不能通俄而沛公鄭譯奏上請更修正於是詔太常卿牛弘國子祭酒辛彥之國子博士何妥等議正樂然淪繆既久積年議不定帝怒曰我受天命七年樂府猶歌前代功德命治書侍御史李諤引弘等下將罪之奏曰武王剋殷至周公相成王始制禮樂所事體大不可速成帝意乃解又曰開皇中亡齊伎曹妙達安馬駒等以藝遊三公之家新聲變曲傾動當世天子不能禁也帝令妙達理郊廟樂咸寫傾杯行天之聲萬寶常觀於樂署部伎樂中唯百濟樂清有歌人間謳謠之曲為耳目之如者不可勝載唐書曰鄭從讜在汴時以兄處誨嘗為鎮師歿于是郡訖一政受代不於公署舉樂又曰王涯為太常卿文宗以樂府之音鄭衛太甚欲聞古樂命涯詢於舊工取開元時雅樂選樂童按之名曰雲韶樂樂曲成涯與太常丞李廓少府監庾丞慮押樂工獻於園亭帝按之於會昌殿上悅賜涯等錦綵又曰乾元初上謂于休烈曰古聖人作樂以應天地之和以合陰陽之序則人不夭札物不疵癘且金石絲竹之器也比親享郊廟每聽懸樂宮商不倫或鍾聲失度集樂工考磬來朕當於內自定太常集樂考試數目審知差錯然後令別鑄造磨刻及事畢上臨三殿親試考擊皆合五音群臣稱慶又曰祖孝繫隨毛爽授律皆得爽之法一律而生五音十二律為而六十音因而六之故有三百六十音以當一歲之日又祖述沉重依淮南本數用京房舊術求之得三百六十律各因其月律而為一部以律數為母以氣候為子以一中氣所有日為子以母命子隨所多少分直歲以配七音起丁冬至以黃鍾為宮太簇為商林鍾為徵南呂為羽姑洗為角其餘月建皆依運行每月各以本律宮為旋宮之義由斯著矣武德之樂漢剋暴秦之從所作也言以武德除亂使天下樂行也四時之樂文帝之作也言以己節儉澤施於四海天下和平也又曰正月享西京太廟大樂令裴知古謂萬年令元行衝曰金石諧和當有吉慶之事其在唐室子孫乎其月中宗即位復國為唐國史補曰宋沉善音律太常久亡徵調沉考鍾律得之
