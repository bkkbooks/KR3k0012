body:
  text: 人事部七十公平尚書洪範曰無偏無黨王道蕩蕩無黨無偏王道平平禮記曰昔衛獻公出奔反國及郊將班邑於從者而後入柳莊曰如皆守社稷則孰執羈靮而從如皆從則孰守社稷君反其國而有私也無乃不可乎於是弗果班又孔子間居曰子夏曰三王之德參於天地敢問何如孔子曰奉三無私以勞天下曰敢問何謂三無私子曰天無私覆地無私載日月無私照奉斯三者以勞天下又儒行曰儒有內稱不避親外舉不避怨左傳文上曰賈季奔狄宣子使臾駢送其孥孥妻子也宣子以賈季中軍之佐同官故也夷之搜賈季戮臾駢臾駢之人人臾駢從臣也欲盡殺賈氏以報之臾駢曰不可吾聞前志有之曰敵惠敵怨不在後嗣忠之道也敵猶對也夫子禮於賈季我以其寵報私怨無乃不可乎介人之寵非勇也介因也損怨益仇非智也以私害公非忠也釋此三者何以事夫子盡具其孥與其器用財賄親帥扞之送致諸境又襄上曰祁奚請老晉侯問嗣焉稱解狐其讎也將立之而卒解狐之卒又問焉對曰午也可午祁奚子於是羊舌職死矣晉侯曰孰可以代之對曰赤也可赤職之子伯華於是使祁午為中軍尉羊舌赤佐之君子謂祁奚能舉善矣稱其讎不為諂立其子不為比舉其偏不為黨商書曰無偏無黨王道蕩蕩其祁奚之謂矣又昭七年曰晉韓宣子卒魏獻子為政魏舒魏戊為梗陽大夫戊舒之庶子也梗陽在太原也魏子謂成鱄鱄晉大夫吾與戊也縣人其以我為黨乎對曰何也夫舉無他唯善所取親踈一也論語雍也曰子遊為武城宰孔子問之曰汝得人焉耳乎汝為此宰寧得賢人與之耳語助也對曰有淡臺滅明者行不由徑非公事未嘗至於偃之室史記曰邑人出獵任安常為人分麋鹿雉兔部署小大劇易衆人皆喜曰任少卿分別平又曰陳平為社宰分肉甚均里父老曰善哉陳孺子之為宰平曰嗟乎使平得宰天下亦如此肉漢書曰蕭何不與曹參相能及何病惠帝自臨視因問君即百歲後誰可代君對曰知臣莫若主帝曰曹參何如何稽首曰帝得之矣臣死不恨又曰朱邑惇篤於故舊然性公正不可交以利天子器之東觀漢記曰耿嵩字文都巨鹿人履清高之節髻童介然特立不隨於俗鄉黨大人莫不敬異之王莽敗盜賊起宗族在兵中榖食飢貴宗家數百人升合分糧時嵩年十二三宗人長少咸共推令主廩莫不稱平又曰陰興字君陵盡忠竭思其無益於國雖在骨肉不以私好害公義與張宗鮮于褒不相喜而知其有用猶稱其所長而薦之張汜杜禽之徒與興厚善以其華而少實私貨以財終不為言是以世稱其忠平又曰第五倫字伯魚京兆尹閻興召為主簿時長安鑄錢多姦巧乃署倫為督鑄錢掾領長安市長倫平銓衡正斗斛市無阿枉百姓悅服又曰吳漢嘗出征妻子在後買田業漢還讓之曰軍師在外吏士不足何多買田宅乎遂盡以分與昆弟外家謝承後漢書曰張陵清河人初為梁冀弟胤舉孝廉正月初歲百官朝賀冀恃豪勢不恤王憲帶劍入省陵主臺中威儀呵冀使出勑羽林虎賁奪其劍胤為陵曰昔舉君適所以自伐也答曰明府不以陵之不德誤見擢序不敢阿公以報私恩胤有愧色華嶠後漢書蔡孟喜汝南頓人以禮化鄉里鄉里有諍訟者輒詣喜決之其所平處皆曰無怨范曄後漢書曰袁紹官渡之役審配二子為曹操所擒逢紀與配不睦紹以問之紀對曰配天性烈直每所言行慕古人之節不以二子在南為不義也公勿疑之紹曰君不惡之耶紀曰先所爭者私情今所陳者國事紹曰善乃不廢配又曰蘇章字孺文扶風平陵人順帝時遷冀州刺史故人為清河太守章行部案其姦贓乃請太守為設酒殽陳平生甚欣太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲者私恩也明日冀州刺史案事者公法也遂舉正其罪典略曰荀彧在臺閣不以私欲撓意彧有群從一介才德實薄或謂彧曰以君當事不可以某為議郎耶彧笑曰官者所以表才也若如汝言衆人其謂我何其持心平實皆類此也魏志曰王觀字偉臺東郡廩丘人為南陽太守明帝即位下詔書使郡縣條為劇中平者主者欲言郡為中平觀教曰此郡濱近外虜數有寇害云何不為劇耶主者曰若郡為外劇則恐於明府有任子觀曰夫君者所為民也郡外劇則於役調當有降差豈可為太守之私而負一郡之民遂言為外郡送任子詣鄴時觀但有一子而又幼弼其心公如此又曰魏國初建時未立太子臨淄侯植有才而愛太祖狐疑以亟令密訪於外唯崔琰露答曰蓋聞春秋之義立子以長加五官郎將仁孝聰明宜承正統琰以死守之植琰之兄女壻太祖貴其公亮蜀志廖立傳曰諸葛亮為人公直表廢立徙汶山立聞亮卒泣曰吾其左袵矣又李嚴傳曰亮表廢平徙梓潼平聞亮卒乃發病死習鑿齒曰夫水至平而邪者取法鏡至公而醜者怒水鏡之所以能窮物而不怨者以其無私也水鏡無私猶以免謗況大人君子懷樂生之心流矜恕之德爵之而非私誅之而非怒天下豈有不服也哉故蜀志評曰諸葛亮之為國開誠心布公道其盡忠益時者雖讎必賞犯法怠慢者雖親必罰吳志曰呂蒙字子明嘗以部曲事為江夏太守蔡遺所白蒙無恨意及豫章太守顧邵卒權問所用蒙因薦遺奉職佳吏權笑曰君欲為祁奚耶於是用之甘寧粗暴好殺既嘗失蒙意又時達權令權怒之蒙輒陳請曰天下未定鬭將如寧者難得宜容忍之權遂原寧卒得其用徐廣晉紀曰劉弘字和季在襄陽帝在西京命弘選良才乃稱守宰徵士武陵五朝字世朗高尚荊王牙門將魯國皮初有勳江漢弘上言朝為零陵太守初為襄陽內史詔以襄陽顯郡初資名未允以弘壻前東平太守夏侯陟為襄陽弘曰夫總天下者當與天下同心治一國者當與一國推實吾總荊州十郡安得十女壻然後為治乃表陟婚親舊制不得相臨燕書曰梁琛使秦琛從兄奕先在秦為尚書郎會罷秦主欲令琛止奕舍琛語有司曰昔諸葛亮兄弟各處三國及其聘集公朝相見退無私面君子之志余敢忘乎竟不詣奕數就邸舍因問東國起居琛曰今二方鼎據兄弟並蒙附寵論心各有所在今欲以東國事語君恐非西國之所欲聞周書曰王羆字熊京兆霸陵人也性嚴急處物必當每至享會自稱量酒肉給付將士時人尚其均平宋書曰張邵有佐命功元嘉五年為征虜將軍領寧蠻校尉初王華與邵不和及華參要親舊為之危心邵曰子陵方弘至公豈以私隙害正義是任也華實舉之唐書曰房玄齡為尚書左僕射既任總百司虔恭夙夜盡心竭節不欲一物失所聞人之善若己有之明達吏事而緣飾以文雅審定法令意在寬平不以求備取人不以己長格物隨能收敘無隔卑賤論者稱為良相焉又曰張文瓘為大理卿旬日決遣疑事四百餘條莫不允當自是人有抵罪者皆無怨言又曰奚陟字殷卿知吏部選事銓綜平允有能名遷吏部侍郎所蒞之官時以為稱職又曰韋承慶自天授已來三掌天官選事銓授平允海內稱之又曰楊纂除吏部侍郎典選十餘載銓敘人倫稱為允當然而抑文雅進黠吏觀時任數頗為時論所譏尸子曰自井中窺星所見不過數星自丘上望之則見其始出也夫私心井中公正丘上也慎子曰有權衡者不可欺以輕重有尺寸者不可差以長短有法度者不可巧以詐偽又曰夫投鉤分財投策分馬非以鉤策為均也使得美者不知所以德得惡者不知所以怨故耆龜所以立公識也權衡所以立公正也書契所以立公信也度量所以立公審也法制禮籍所以立公義也凡立公所以棄私也國語曰趙宣子言韓獻子於靈公以為司馬宣子趙孟獻子韓厥河曲之役趙孟使人以其乘車姦行獻子執而戮之衆咸曰韓厥必不役矣其主朝登之而夕戮其車車車僕也宣子召禮之告諸大夫曰可賀我矣吾舉厥而忠吾乃今知免於罪矣家語曰淡臺滅明公正無私韓詩外傳曰直者順道而行順理而言公平無私不為安肆志不為危易行又曰楚有白公之難有壯之善者辭其母將死君難其母曰棄母死君何乎壯之善曰聞事君者內其祿而外其身今之所養母者君之祿也請往死之比至朝三廢車中其僕曰子懼如是何不返也壯之善曰懼吾私也死吾公也吾聞君子不以私害公遂往死之韓子曰古之全大體者則天地觀江海不以智纍心不以私纍己寄治亂於法術託是非於賞罰屬輕重於權衡不逆天理不傷情性不引繩之外不推繩之內不急法之外不緩法之內守成理因自然禍福主乎道法而不出乎愛惡榮辱之責在己而不在乎人故名成於前德垂於後治之至也又曰解狐與荊伯柳為怨趙簡主問於解狐曰孰可以為上黨守對曰荊伯柳可趙簡主曰非子之讎乎對曰臣聞忠臣舉賢不避仇讎其廢也不阿親近簡主曰善遂以荊伯柳為守韓詩外傳曰魏文侯問解狐曰寡人將立西河之守誰可用解狐舉其讎荊伯柳文侯乃用又曰為人臣者北面委質有口不以私言有目不以私視又曰解狐薦其讎以為相其讎往拜謝解狐引弓迎而射之呂氏春秋曰堯有子十人不豫其子而授舜舜有子九人不豫其子而授禹至公也周語曰舜有商均此曰九子不知出何書墨者巨子腹𪏆居秦巨姓子男子通稱𪏆續大車啍啍之啍也其子殺人秦惠王曰先生之年長矣非有他子寡人已令吏弗誅對曰墨者之法殺人者死傷人者刑此所以禁殺傷天下義也王雖為之賜賜受而令吏弗誅腹𪏆不可不行墨者之法遂殺之子人之所私也忍所以行大義巨子可謂公矣又曰晉平公問祁黃羊曰南陽無令其誰可乃舉其讎解狐又問國無尉其誰可乃舉其子午孔子聞之曰祁黃羊可謂至公也又曰天無私覆地無私載日月無私燭四時無私為又曰昔先聖王之治天下必先公公正也公則天下乎矣其得之必以公其失之必以偏偏私下正又曰荊人有遺弓者弗肯索曰荊人遺之荊人得之又何求焉孔子聞之曰去其荊而可矣老聃聞之曰去其人而可矣故老聃則至公得矣又曰天下非一人之天下也天下之天下也書云皇天無親惟德是輔故天下之天下陰陽之和不私長一類甘露時雨不私長一物私猶異也萬民之主不阿一人又曰夏不衣裘非愛裘也暖有餘也冬不用翣翣扇也非愛翣也清有餘也清寒聖人不為私非愛費也節乎己也説苑曰人臣之公治官事則不營私處公門則不言貨當公法則不阿親奉公舉則不避仇讎忠於事君謂之公又曰楚令尹虞丘子言於莊王曰臣聞奉公行法可以得榮能淺行薄無望上位臣為令尹十年國不加治竊選俊士孫叔敖秀才多能其性無欲君舉而授之政則國可寧莊王從之賜虞丘子田三百號曰國老以孫叔敖為令尹少焉而虞丘子之家干法孫叔敖執而戮之虞丘子喜入見於王言孫叔敖果可使持政奉國法而不黨施刑戮而不亂可謂公平莊王曰夫子之賜也又曰楚令尹子文之族有姦法者廷理拘之聞其令尹族也釋之子文召廷理而責之曰今立廷理者將以伺犯王令察觸國法者也於犯法甚明而使廷理緣吾私心釋之是吾不公之心明著於國執一國之柄而以私聞吾生無義吾不若死遂致其族人於廷理曰不是刑也吾將死廷理懼遂刑其族人又曰晉文侯問於咎犯誰可使為西河守者對曰盧子羔可曰子羔非汝之仇歟曰君問可為守者非問臣之仇也子羔見咎犯謝之曰君幸赦臣之過薦於君得為西河守咎犯曰薦子者公也吾不以私事害公義子其去矣顧吾射之矣周生列子曰天下所以平者政平也政所以平者心平也心所以平者衡平也衡所以平者銖兩平也銖兩所以平者毫釐平也無所不均也無所不平也謂之太平夫天之於物無所偏阿君之散恩無所外內任子曰以義事主不私其己以仁接人不謀其欲火佚焚家家不罪火食過傷人人不罪食以其積之於仁義無私害也伊尹放太甲太甲無怨心管仲黜伯氏伯氏無怨言以其積之於公正無私惡也抱朴子曰君人者必修諸己以先四海去偏黨以平王道遣私情以標至公魏武令曰今壽春漢中長安先欲使一兒各往督領之欲擇慈孝不違吾令亦未知用誰也兒雖小時見愛而長大能善必用之吾非有二言也不但不私臣吏兒子亦不欲有所私諸葛亮書曰吾心如稱不能為人作輕重應享與州將箋曰夫公正治化之本德教之基公則無私正則無邪無邪無私而患政教不行未之有也昔叔向論叔魚之罪石碏討石厚之亂祁奚稱解狐之賢臧紇思孟孫之愛春秋嘉之敦崇世教經乎百王厝乎盛衰其義不傾公正之德弘矣重矣明君之所以總天下賢臣之所以奉上民庶之所以繫仰德化之所以美盛公正之可不勉哉曹羲至公論曰夫世人所謂掩惡揚善者君子之大義保明同好朋友之至交斯旨之作蓋閭閻之白談所以救愛憎之相謗崇居厚之大分耳篤正之至理折中之公議也世士不料其數而係其故善惡不分以覆過為弘朋友忽義以雷同為美善惡不分亂實由之朋友雷同敗必從焉談論以當實為清不以過難為貴相知者以等分為交不以雷同為固是以達者存其義不察於文識其心不求於言嵇康釋私論曰不知冒陰之可以無景而患景之不匿不知無情之可以無患而恨情之不巧豈不哀哉未有抱偽而身立清世藏情而信著明君者也是以君子既有其質又覩其鑒貴夫亮達希而存之惡夫矜吝棄而遠之言無茍諱而行不茍隱不也愛之而茍善不以惡之而茍非心無所矜而情無所擊體清神立而是非允當忠感明天子而信篤乎萬民寄胸懷於八荒垂坦蕩於永日斯非賢人君子高行之美者乎
