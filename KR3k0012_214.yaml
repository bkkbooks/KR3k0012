body:
  text: 職官部十一左丞六典曰左右丞掌管轄省事糾舉憲章以辨六官之儀制而正其文法分而視焉漢官典職曰尚書左右丞典臺事繩糾無所不揔續漢書百官志曰左丞掌録尚書吏人上章百官威儀漢官儀曰漢制八座丞郎初拜並集都座交禮遷又解交晉書百官表志注曰左右丞俸月三十斛左丞主臺內禁令宗廟祠祀朝儀射制彈案選用署吏稽近道文書給假晉書曰劉曒字長叔為尚書左丞正色在朝三臺清肅又曰郤詵為尚書左丞推奏吏部尚書崔洪洪曰舉詵丞而還奏我此謂挽弩自射詵曰趙宣子任韓厥為司馬而厥以軍法戮宣子崔侯為國舉才我以才見舉唯官是視各明至公何故其言乃至於此洪聞而悅服之又曰傅咸為尚書左丞時尚書郭奕咸故將也纍辭病疾不起復不上朝又自表妹葬乞出臨喪詔書聽許咸舉奏之又曰郤弘始為尚書郎轉左右丞在朝為百寮所憚後坐泄事免晉諸公贊曰許奇為尚書左丞有准繩操又曰傅咸字長虞為左丞臺閣小大望風自肅晉中興書曰荀蕤字令遠遷左丞時桓溫平蜀朝廷欲以豫章封溫蕤謂太宗曰若溫復假王威平定河洛修復山陵將復何以加之遂止沈約宋書曰何承天為中丞與尚書左丞謝元素不相善二人競伺二臺之違纍相糾奏宋書百官志曰晉宋之世左丞主臺內禁令宗廟祠祀朝儀禮制選用署吏糾諸不法無所回避三國典略曰北齊張耀嘗為尚書左丞文宣近出令耀居守文宣夜還耀不開門勒兵嚴備火至看面然後開迎文宣笑曰卿欲學郅君章也賜以錦袍以其忠勤深見親待梁書曰賀琛遷尚書左丞并參禮儀事琛前後居職凡郊廟諸議多所創定每見高祖與語常移晷刻故省中為之語曰上殿不下有賀雅琛容止都雅故時人呼之又曰劉孺弟覽除尚書左丞性聰敏尚書令史七百人一見並記姓名當官清正無所私姊夫御史中丞褚湮從兄吏部郎李綽在職頗通贓貨覽劾奏並免官李綽怨之常謂人曰犬嚙行路覽噬家人北史曰郎茂煬帝即位為尚書左丞時工部尚書宇文愷右翊衛大將軍于仲文競河東銀窟茂奏劾愷位巳隆祿賜優厚拔葵去織寂爾無聞求利下交曾無愧色仲文大將宿衛近臣趨侍階庭朝夕聞道虞芮之風抑而不慕分誅之利知而必爭何以貽範庶寮示人軌物愷與仲文竟坐得罪隋書曰楊汪字元度高祖嘗謂諫議大夫王達曰卿為我覔一好左丞達遂私於汪曰我當薦君為左丞若事果當以良田相報也汪以達所言奏之達竟以獲罪卒拜汪為尚書左丞汪明習法令果於剖斷當時號為稱職唐書曰趙涓永泰初為監察御史時禁中失火焚室數十間火起處與東宮稍近代宗深疑之涓為巡使俾令即訊涓周歷壖囿按據迹狀乃上直中官遺火所致也推鞫明審頗盡事情既奏代宗稱賞焉德宗時在東宮常感涓之究理詳細及刺衢州年考既深又與觀察使韓滉不相得滉奏免涓官德宗見其名謂宰相曰豈非永泰初御史趙涓乎對曰然即日拜尚書左丞唐新語曰楊昉為左丞時宇文化及子孫理資蔭朝廷以事隔兩朝且其家親族亦衆多為言者所司理之至于左司昉未詳其案狀訴者以道理巳成無復凝滯勃然逼昉昉曰適朝退未食食畢當詳案訴者曰公云未食亦知天下有纍年羇旅訴者乎昉遽命案立批之曰父殺隋主子訴隋資生者猶配遠方死者無宜更敘時人深賞之傅咸表曰左丞職輕事重以賤制貴所以難居臣以暗劣猥忝斯任愧於不稱懼罪之及夙夜惶恐寢食無寧卞壺彈尚書丞郎事曰舊丞郎取急及屬出皆尚有對使職局不廢而昨左右二丞及諸郎皆出唯次直二郎在設使有兵火警急便為無復行事者二丞頓行無印可以封符疏此之逋慢莫斯之甚傅咸答辛曠詩序曰尚書左丞彈八座以下居萬機之會斯乃皇朝之司直天臺之管轄余前為右丞具知此職之要後忝此任僶俯從事日慎一日右丞續漢書百官志曰尚書右丞一人四百石掌録文書期會假署印綬及筆墨諸材用漢官儀曰尚書左右丞秩各四百石遷刺史晉書百官表注曰右丞主臺內庫藏廨舍量物用多少及廩賜民戶租布刑獄兵器稽遠道文書章表奏事晉中興書曰王國寶因酒坐怒右丞祖台之攘袂喚呼以盤盞樂器擲台之復為有司所彈烈宗詔曰國寶縱肆情性其不可長台之懦弱非監司體其免官沈約宋書曰晉西朝八座丞郎朝晡詣都座朝江左唯旦朝而巳八座丞郎初拜並集都座交禮遷又解交漢舊制也今唯八座解交丞郎不復解交宋書百官志曰右丞掌臺丙庫藏凡諸器物廨舍刑獄兵器唐書曰宇文節為尚書右丞明習法令以幹局見稱時江夏王道宗嘗以私事託於節遂奏之太宗大悅賜絹二百匹仍勞之曰朕所以不置左右僕射者正以卿在省耳又曰韋溫為尚書右丞吏部員外張文規父弘靖長慶初在幽州為朱克融所囚文規不時省赴人士喧然罪之溫居綱轄首糾其事出文規為安州刺史五代史後唐書曰梁開平二年改左右丞為左右司侍郎避廟諱也至同光年十月復舊為左右丞長興元年九月詔曰臺轄之司官資並設左右貂素來相類左右揆不至相懸以此比方豈宜分別自此宜升尚書右丞官品與左丞並為正四品左司郎中左司員外郎六典曰左右司郎中員外郎各掌付十有二司之事以舉正稽違者署符目焉凡都省掌舉諸司之綱紀與其百寮之程式以正邦理以宣邦教隋書曰煬帝三年尚書都司始置左右司郎各一人品同諸曹郎從五品掌都省之職唐職員令曰左右司郎中掌副左右丞所管諸司事署抄目舉稽失知臺內宿直若本司郎中不在併行之右司郎中右司員外郎隋書曰骨儀遷尚書右司郎于時政漸亂濁貨賂公行凡當樞要之職無問貴賤並家纍金寶天下士大夫莫不變節而儀勵志守常介然獨立令史漢官儀曰能通蒼頡史篇補蘭臺令史滿歲補尚書令史滿歲為尚書郎出亦與郎同宰百里郎與令史分職受書令史見僕射尚書執板拜見丞郎執板揖續漢書百官志曰尚書令史十八人人二百石曹有三人主書後增列曹三人合二十一人華嶠後漢書韋彪上疏曰有楚獄事繁故置尚書令史以助郎晉書曰陳壽少仕蜀在觀閣為令史又為郎官人黃皓專弄朝政大將軍閻宇等皆曲躬事皓以營時務壽獨峻然皓乃自禪與杖又曰趙孟字長舒入補尚書郎令史善於清談有國士之風其面有疵點諸事不決皆言當問疵面齊職儀曰自魏晉宋齊正令史書令史皆有品秩朱衣執板進賢一梁冠楊楞伽北齊鄴都故事曰尚書郎判事正令史側坐書令史過事典略曰邊讓字文禮陳留人將軍何進聞其名欲以禮辟恐不肯來乃託以軍事召之到署令史進以禮見之讓占對間敘聲氣如流其時坐席賓客有百數皆高慕之
