body:
  text: 道部八道士太霄經曰人行大道謂之道士又云雲從道為事故稱也周穆王因尹軌真人制樓觀遂召幽逸之人置為道士平王東遷洛邑置道士七人漢明帝永平年置二十一人魏武帝為九州置壇度三十五人魏文帝幸雍謁陳熾法師置道士五十人晉惠帝度四十九人給戶三百真誥曰劉翊字子相後漢人也世居潁川家富以濟貧為事為陳留太守後去官入山為道士又曰淳于斟字叔顗會稽人漢桓帝時為縣令入山修道又曰劉寬字文饒後漢南陽太守年七十三入華山服丹棗又曰王朗字法明太原人也入茅山師陶隱居以梁大通三年正月十四日化隱居為制銘志并設奠云紱冕豈榮隨璜非寶萬里求真緘茲內抱又曰陶弘景父真寶清辨有才學工草隸間騎射藥術而陶隱居亦善隸書雖效王書而別為一法文章尺牘為世所重又曰孫韜字文藏會稽剡人也入山師潘四明參受真法學摹寫遂大巧妙後學王書殊有深意當時稱之南洞大碑及許長史壇碑並是韜迹也陶隱居手為經題握中祕訣門人罕能見之惟傳孫韜與桓闓音開二人而已又曰朱仲嘗於會稽賣珠漢高后時人也仲以素書倚酒於女几家几盜寫學其術又曰道士不欲臨喪損神壞氣所以去世不仕而獨存焉惟父母及師不懼性命之傷必臨其喪以此而傷是無傷也抱朴子曰薛旅字季和燕代人周武王時學道於鍾山北河經七試而不過者由淫佚鄙滯敗其試耳又曰郭文舉河內軹縣人入陸渾山學道獨能無情意不生也又曰吳大帝時蜀中有李阿者穴居不食纍世見之號八百歲翁人往問事阿無所言但占阿顏色若欣然則事吉若慘戚則凶若含笑則大慶微歎則深憂如此之候未曾不審也一旦忽去不知所之又曰范零子少好仙道如此積年後遇司馬季主季主同入常山中積七年入石室北東角有石甕或作石牖季主出行懇戒之曰慎勿開零子忽發視之季主還乃遣歸後復召至使守一銅匱又戒勿發零子復發之季主乃遣之遂不得道又曰馮良者南陽人少作縣吏年三十為尉佐史迎督郵自恥無志乃毀車殺牛裂敗衣幘去從師受詩傳禮易復學道術占遊候十五年乃還州郡禮辟不就詔特舉賢良高第半道委還家年六十七棄世東度八山在鹿迹洞中又曰安丘望之字仲都京兆長陵人也修尚黃老漢成帝重其道德常宗師之愈自損退成帝請之若值望之章醮則待事畢然後往老子章句有安丘之學望之忽病篤弟子公沙都輿於庭樹下望之曉然有痊時冬月鼻聞李香開目則見雙赤李著枯枝望之仰手承李李自墮掌中因食李所苦盡除身輕目明遂去莫知何在也道學傳曰燕濟字仲微漢明帝時人也少好道德不仕周遊名山後居武當山寢息無常所或因積石或倚大樹四時衣服不變恆散髮亦有練巾又曰鮑靚字太玄上黨人也漢司隸鮑宣之後稟性清慧學通經史修身養性蠕而允切動不犯聞人之惡如犯家諱人多從受業楊道化物號曰儒林又曰王嘉字子年隴西人也在東陽谷口鑿岸穴居其徒數百各自穴處為人貌短陋而聰察滑稽有問世事善惡終不直説過率有驗又曰嚴遵守君平蜀郡人也修道自保與人子言孝與人臣言忠與人弟言順各因其發導之以善又曰王遠字方平常降蔡經家須臾麻姑至騎從半於方平麻姑手爪如鳥經私心曰時背癢得搔之佳也方平曰姑神人汝何遽此遂鞭之經願從方平學道方平使背立從後觀之曰心邪不可教之仙道乃與度世術又曰庾承仙字崇光頴川人明老莊隱文江縣白水臺立廬舍講肆儒士釋老受其學隱居江南纍詔不出後來始興講道德經剖析凝滯又曰薛玉寶字延世沛國人也梁時師玄圃先生以文章見美善書翰嘗書一章於崇靈觀道正省壁上見者玩之也又曰東鄉宗超字逸倫高密黔陬人也嘗露壇行道奩中香盡自然滿溢又爐中無火而煙氣自生氤氳周遍久之不歇又曰張𥙿天師十二世孫起招真觀植名果盡山栖之趣梁簡文為製碑又曰晉陵人錢妙真於茅山燕口洞得道門人立碑於茅山邵陵王為觀序今具存焉又曰梁武帝天監二年置大小道正平昌孟景翼字道輔時為大正屢為國講説四年建安王偉於座問曰道家經教科禁甚重老子二篇盟誓乃授豈先聖之旨非凡所説耶景翼曰崇祕嚴科正宗妙化理在相成事非乖越又曰劉法先彭城人也時顧歡著道經義於孔德璋多有與奪法先與書討論同異顧道屈服乃答曰吾自古之遣狂水火不避得足下此針始覺醒悟既往狂言不足在怪又云法先每見道釋二衆亟相是非乃著息爭之論顧歡又作夷夏辨或及三科論明釋老同異又曰張詵吳郡嘉興人也善玄言屢講老子修行上道討論上經人自遠來集也詵尋求真祕甚識宗尚又曰陳景尚吳人也善講誦道釋中皆不可及制靈書經大行於世梁邵陵王甚重之召景尚隨王之郢終於江夏又曰桓闓字音舒東海丹徒人也梁初崑崙山渚平沙中有三古漆笥內有黃素寫千君所出太平經三部村人驚異於經所起靜供養先呈陶隱居隱居云此真千君古本闓將經至都便苦勞瘧諸治不愈陶隱居聞云此病非餘恐取經為咎何不送經還本即依二日送尋愈又曰曹寶字世珍丹陽人善為步虛兩京冠絶貴遊見者皆稱賞焉又曰嚴智明字惠識晉陵人也受性有善聲幼工誦詠聲明帝有疾每引法衆於內殿行道聞智明詠經甚懷賞悅云疾為之愈及法席既解智明還外帝中夜不安寢勑呼智明對御轉誦即覺歡又曰徐師子字德威東海人也陳武帝立宗靈大觀引德威為觀主後卒文皇勑齎祕器葬焉太平經曰嚴寄之字靜處丹陽句容人也為道士事親至孝住石渚觀母老不敢遠離乃迎母於觀邊立小屋以盡溫清母終毀痟過禮識者嘉之又曰郗愔字方回高平金鄉人為晉鎮軍將軍心尚道法密自遵行善隸書與右軍相埒手自起寫道經將盈百卷于今多有在者又曰張孝秀以王元規筆迹妙巧頻相請屈元規但玩泉石終日撫琴嘯詠了不執筆臨還止為行書數行而已孝秀雅相推憚弗敢固祈今簡寂館長榜猶有筆迹也又曰許思玄者許遠遊之弟也生而好道儒雅知名晉簡文帝為俗外之交也又曰任敦尚博昌人永嘉中投茅山講道集衆敦竊歎曰衆人雖云慕善皆外好耳未見真心可與斷金者又曰晉陸納為尚書令時年四十病瘡告杜恭云奕世短壽臨終皆患此瘡恭為奏章又與雲飛散謂納曰君命至七十果如其言王右軍病請恭恭謂弟子曰右軍病不羌何用吾十餘日果卒又曰蔣負芻義興人也與晉陵薛彪之為俗外之交去來茅山有志栖託齊永明中暫下都陶隱居一遇便盡素契陶後解紱結宇中茅中茅山也仍請負芻度嶺相就經典藥術常共論之又曰楊超字超遠東海人也出入事陶隱居往復與陶論難得為入室又曰諸慧開字智遠吳興烏程人也每以戒行自修拯濟為務齊大明八年天下飢饉慧開有少穀實乃悉分賑鄉邑賴之有三人積飢食飽而致死其家訴縣稱慧開飼殺餓人苦相誣謗邑令笑曰乞食飽死反怨主人法無此科遣而不問又曰濮陽者不知何許人事道專心祈請皆驗鄭鮷音帝女足跛陽療之尋差晉簡文廢世子無嗣時使人祈請於陽於是中夜有黃氣起自西南遙墮室爾時李皇后懷孝武又曰許邁字叔玄少名映後改名遠遊志求仙道入臨安西山經月不返人亦不知其所之先娶散騎常侍吳郡孫宏女為妻邁居臨安山中為書謝遣其妻云欲聞懸雷之響山鳥之鳴自為簫韶九成不勝能也偶景青蔥之下栖息巖岫之室以為殿堂廣廈不能過也情願所終志絶於此吾其去矣長離別矣又曰禇伯玉字元璩吳郡錢瑭人早慕沖虛年十八父為娶婦入前門伯玉後門出往剡居瀑布山性耐寒暑在山三十餘年隔絶人事一説云伯玉初遊南嶽路入閩中飛湍走險伯玉泊舟晚瀨衝颷忽起山水暴至激船上巔崩落絶嶂徒侶以為冰碎緣阻尋求見伯玉自若以小杖撝舟涉不測之泉衆以駭伏入霍山而去初隱瀑布山齊高祖欽其風欲與相見辭以疾而去帝追恨詔瀑布山下立太平觀孔稚圭立碑又曰張陵博學及河洛天文悉窮其妙靜處衡門不求聞達彈琴詠詩順志而已又曰龍威丈人山中得道者也時人莫知其名號曰山隱居慠然不群高絶人世又曰陶弘景字道明魏郡平陽人也自號華陽隱居常謂人曰我心恆如懸鏡觸物不遺好行陰德拯濟困窮合施諸藥遠近賴之平生未嘗晝眠看書必至半夜好聞松風之聲少絶肥羶晚惟進䭀迅音食餕答紫菜生薑飲酒能至一斗而斷不醉也老氏聖紀曰神醫中嶽仙人成公與以姚氏泓十五年七月六日仙化門徒欲厚葬之興忽然重起曰道士絶纍與俗有殊胡為哀哭厚葬但建修齋功此乃合太古淳真人法也言訖而化明日中時有叩石室者門人出視見兩童子引入戶公與欻起去葬於鞏縣界潔素里又曰孟道養字孝元外名援平昌人少時聞有法席不問遠近往觀聽焉及長性沉靜學專為己不求聞達閉戶開窗披書玩古及入室讀誦聲才出口有劉緩戴詵相造研論窗玄理各歎伏以為邁絶又曰吳猛字世雲豫章人也性純孝夏夜在父母側不敢驅拂蚊蚋恐去己而集親年三十邑人丁義士奉道以術傳之鄉人隱銅為設酒既去酒在器中不耗道士舒道雲病瘧比年猛授以三皇詩使諷之頓愈嘗還豫章以白羽畫江而渡縣東有石笥歷代未嘗開猛往發之多得簡牒古字不可識縣南有峻石時立千仞猿狖不能上猛仗策登之縣令新蔡千慶好畋獵猛屢諫不聽後慶大獵四面引火烘天而猛坐草中自若鳥獸依附左右火不能及慶大駭因是悔王敦於坐收猛俄失之敦大怒是歲敦敗猛登廬山見一叟坐樹下以玉柸承甘露授猛又有玉房金室見數人與猛語若舊相識設玉膏終日猛又乘鐵船於廬山頂又曰錢妙真晉陵人也幼而好道便欲離俗親族逼以適人泣涕固免遂居大小二茅山後往燕口洞手裁書并詩七章與陶隱居又曰孔靈産會稽山陰人也遭母憂以孝聞宴酌珍羞自此而絶饘蔬布素志畢終身父見過毀惻然命具饌靈産勉從父命咽以成疾父以人有天性不可移遂不復逼深研道幾遍覽仙籍宋明帝於禹穴之側立懷仙觀詔使居之遷太中大夫加給事高帝賜以鹿巾猿裘竹素之器手詔曰君有古人之風賜以林下之服登泛之日可以相存也又曰張繹字士和吳郡人也獎勵學徒整肅法事屢講衆經理致深密詞端華辨當時所宗梁武帝雅相欽賞時陶隱居著法檢論明釋老二教繹往復討論甚有條理隱居嘉焉專心道法居貧守約善八體書別制雲篆作茅山南洞碑甚工又曰宋文同字文明吳郡人也梁簡文時文明以道家詣經莫不敷釋撰靈寶經義疏題曰謂之通門又作大義名曰義淵學者宗賴四方延請長於著撰訥於口辭又曰王遂起太原人為集真觀主性少眠縱臥熟猶覺人語言論相涉即領其辭莫不歎其清寤又曰晝夜不臥日月合光
