body:
  text: 鱗介部八魚下辛氏三秦記曰昆明池人釣魚綸絕而去夢於漢武求去其釣明日遊戲於池見大魚衘索帝曰昨所夢也取而去之帝後得明珠玄中記曰東方之東海有大魚焉行海者一日逢魚頭七日遇尾其產則三百里水為血永嘉郡記曰青田溪冬天水熱如湯眾魚歸之名魚倉三齊記曰青城山始皇祭此山築石城入海三十里射魚水四里變赤如血于今猶爾盛弘之荊州記曰長沙湖鄉連水邊有石魚形若鯉相重沓如雲母炙之作魚腥林邑國記曰飛魚翼如蟬飛則凌雲沉泳海底王子年拾遺錄曰瀛洲一名魂洲亦曰環洲有洞淵廣千里有魚身長千丈鱗色蘭斑鼻有角時鼓舞戲或有遠而望者見水間有五色雲上就而視之此乃魚噴水為雲也又曰夏鯀治水無功沉於羽淵化為玄魚大千丈後遂死橫於河海之間後世聖人以魚為神化之物以玄字合於魚為鯀字崔豹古今注曰水君狀如人乘馬眾魚導從一名魚伯大水有之漢末有人於河際見之人馬皆有鱗甲如大鯉魚但手足別耳目鼻與人不殊見人良久入水而沒博物志曰吳王江行食膾有餘棄於江中流化而為魚今江中有名吳王餘鱠魚者長四寸大者如箸猶作鱠形嶺南異物志曰南方嘗晴望海中二山如黛海人云去岸兩廂各六百里一旦暴風雷旦霧露皆腥雜以泥涎七日方已屬有人從山來說云大魚因鳴吼吹沬其一鰓掛山巔七日山為之折不能去鳴聲為雷氣為風涎沬為霧又曰海中所生魚唇置陰處有光初見之以為怪異土人嘗推其義蓋鹹水所生海水中遇陰晦波如燃火滿海以物擊之迸散如星嶺表錄異曰新瀧等州山田揀荒平處以鋤鍬開為町疃伺春雨丘中貯水即先買鯇魚子散於田內一二年後魚兒長大食草根並盡既為孰田又收魚利及種稻且無稗草乃齊民之上術也異苑曰永嘉有人斷水捕魚宰牲祈祭了無所獲將棄罷之其夕夢見老公云諸君何小停夜聞㹠聲驚起共看乃是大魚剉以為鮓頓得百薄故因以百薄為瀨水述異記曰桓冲為江州遣人周行廬山見一湖中有赤鱗魚使者欲飲水魚張鬐向之乃不敢飲又曰關中有金魚神云周平王二年十旬不雨遣祭天神俄而生湧泉魚躍出而降雨幽明錄曰成彪兄喪哀悼結氣晝夜哭泣後釣於澤經所共飲處釋綸悲感有大魚跳入舡中俯視諸小魚彪仰天號慟俛而見之悉放小魚大者便自出舡去搜神記曰宮亭湖孤石有估客下都經其下見二女子云可為買兩量絲履自厚相報估客至都市好絲履并箱盛之自市一書刀亦在箱中既還以箱置廟中而去忘取書刀湖中正帆忽有鯉魚跳入舡破魚得書刀焉廣五行記曰唐儀鳳元年博州僧正滿行同凡俗買魚數頭於房作鱠食之至夜四更忽聞窗外有暴風聲乃夢一佛二佛二金剛語滿云爾是何物小兒將穢汙伽藍金剛手執棒滿閉目因而兩目不開矣又曰曹宋二州西界大劑陂村人陳君少小為捕魚業於後得患恒被眾魚所食痛苦不能自持若以魚網蓋之其痛即止後為村人盜其網去數日之間不勝痛苦而死樂府歌曰江南可採蓮蓮葉何田田魚戲蓮葉間魚戲蓮葉東魚戲蓮葉西宋玉對問曰夫鳥則有鳳魚則有鯨鯨魚朝發崑崙之墟暴於碭石夕宿於孟諸夫尺澤之鯢豈能與量江海之大哉東方朔客難曰水至清則無魚人至察則無徒曹植荅崔文始書曰臨江以釣不獲一鱗非江魚之不食其所餌之者非也是以君子慎舉擢鯉魚河圖曰黃帝遊於洛見鯉魚長三尺青身無鱗赤文成字毛詩宛丘衡門曰豈其食魚必河之鯉又臣工潛曰鰷鱨鰋鯉鰷音條東觀漢記曰姜詩字士遊性至孝母常飲江水兒取水溺死恐母知詐云行學俄而湧泉出舍側并旦出鯉一雙謝承後漢書曰羊續好食生魚為南陽太守丞侯儉貢鯉續受而懸之一歲儉復致一枚續乃以所懸枯魚以示儉終身不復食魚晉書曰王祥性至孝早喪親繼母朱氏不慈數譖之由是失愛於母父有疾衣不解帶湯藥必親嘗母欲生魚時天寒水凍祥解衣將剖冰求之冰忽自解雙鯉躍出持之而歸又曰劉聰將趙染為索綝所敗殺其長史魯徽劉曜聞之曰蹄涔不容尺鯉染之謂也齊書曰崔祖思自相國從事中郎遷齊國內史高帝既為齊王置酒為樂羹膾既至祖思曰此味故為南北所推侍中沈季文曰羹膾吳食非祖思所解祖思曰鼈鯉似非勾吳之詩文季曰千里蓴羹豈關魯衛帝甚悅曰蓴羹故應還沈南史曰梁南郡太守劉之亨嘗夢二人姓李詣之乞命未之解也其明日仲夏有遺生鯉魚二頭之亨曰必夢中所感也乃放之其夜又夢來謝恩云當令君延筭淮南子曰詹公之釣千歲之鯉詹公詹何古得道善釣者又曰牛蹄之踵無盈尺之鯉踵牛踐處符子曰務光自投盧盧川之伯以赤鯉送之金樓子曰五尺之鯉一寸之鯉但大小殊鱗之數等家語曰孔子娶于宋并官氏女一歲而生伯魚伯魚生三日魯昭公以鯉魚賜孔子孔子榮君之貺因名子曰鯉字伯魚曹植辨道論曰甘始言取鯉魚一雙令一者含藥俱投沸膏中有藥者奮尾鼓鰭遊行沉浮有若處淵其一者已熟而可噉余時問言可試不言是藥去此踰萬里非自行不能得也博物志同陶朱公養魚經曰威王聘朱公問之曰公住足千萬家累億金何術乎朱公曰夫治生之法有五水畜第一所謂水畜者魚也以六畝地為池池中有九洲即求懷子鯉魚長三尺者二十頭壯鯉四頭以二月上旬庚日內池水中令無聲魚必生所以養鯉者不相食易長又貴也魏武四時食制曰郫縣子魚黃鱗赤尾出稻田可以為醬列仙傳曰呂尚釣於磻溪三年不獲比周曰可止矣尚曰非爾所及果得大鯉有兵鈐在腹中又曰涓子齊人也好餌朮接食其精至三百年乃見於齊著天地人經四十八篇後釣於河澤得鯉魚賜中符隱於宕山能致風雨又曰琴高趙人也以鼓琴為宋康王舍人行涓彭之術浮游冀州涿郡間二百餘年後辭入涿水中取龍子與諸弟子期之期曰皆潔齊後於水旁設祠屋果乘赤鯉來出祠中且有萬人觀之留一月復入水去又曰子英者舒鄉人也善入水捕魚得赤鯉魚愛其色持著魚池中數以米穀食之一年長丈餘遂生角有翅翼子英怪畏拜謝之魚言我迎汝耳上我背與汝俱去即大暴雨子英上騰去歲歲來歸故舍食飲見妻子魚復來迎之如此七年故吳中門戶作神魚子英祠續述征記曰梁孝王家中有數尺水有大鯉人謂有靈不敢犯宣城記曰臨城縣蓋山有舒姑泉相傳云昔舒氏女未嫁與其父採薪此女坐處化為清泉其母云此女好音樂乃往絃歌而泉湧有朱鯉一雙及命作樂泉故湧出河洛記曰諺云伊洛魴鯉天下最美洛口黃魚天下不如崔豹古今注曰兗州人謂赤鯉為玄駒白鯉為白驥黃鯉為黃雉搜神記曰宮亭孤石有估客至都因市一刀置神廟中而忘取至湖中忽有一鯉跳入舡破之得刀具魚部中續搜神記曰謝允從武當山還在桓宣武座言及左元放為曹公置鱸魚允便云此可得耳求大甕盛水朱書符投水中俄有二鯉鼓鬐在水中又曰會稽鄮音懋縣有女子姓吳字望子為蘇侯神所愛望子心有所欲輒空中下之望子嘗思鱠一雙鮮鯉應心而至幽明錄曰孫權時南方遣吏獻犀簪吏過宮亭廟請福神下教求簪而盛簪器便在神前神云臨入石頭當相還去達石頭三尺鯉魚跳入舡吏破魚得之又曰平都縣南陂上有冢行人於陂取得鯉道逢冢中人來云何敢取吾魚奪著車上而去杜寶大業拾遺錄曰四年梁郡有清冷淵水面闊二里許即衛平得大龜之處清冷水南有橫瀆東南至宕山縣西北入通濟渠是時大雨溝渠皆滿忽有大魚似鯉而頭一角長尺餘鱗正赤從清冷水出頭長三尺許入橫瀆逆流西北十餘里不沒入通濟渠于時夾兩岸隨看者數百人皆謂赤龍大鯉從淵而出此亦唐祚將興之兆楊衒之洛陽伽藍記曰京師語曰伊洛鯉魴貴於牛羊廣五行記曰隋煬帝大業初為詩令宮人唱之曰三月三日向江頭正見鯉魚江上游意欲垂釣往撩取恐是蛟龍還復休鯉魚即唐之國姓俄而唐有天下故歌辭曰客從遠方來贈我雙鯉魚呼兒烹鯉魚中有尺素書古歌甯戚辭曰中有鯉魚長尺半弊布衣裳不覆骭鰋魚爾雅曰鰋今鰋額白魚音偃毛詩鹿鳴魚麗曰魚麗于罶鰋鯉鰋鮎也謝承後漢書曰陳蕃為郡法曹吏正月朝見太守王龔客有貢白魚於龔者龔曰汝南乃有此魚蕃曰魚大且明府之德晉書曰夏統字仲御母病詣洛市藥會三月上已洛中王公已下並至浮橋統並弗之顧太尉賈充怪而問之曰卿居海濱頗能水戲乎荅曰可乃操柂正櫓折旋中流於是風波振駭俄而白魚跳入舡中者有八九觀者皆悚遽酈善長水經注曰聖水出上谷東南流經大坊嶺下嶺之東首山下有石穴東北洞開穴中有水耆舊傳言昔者有沙門釋惠珍者常尋之旁水入穴三里有餘穴分為二一穴漸小西北出不知趣詣一穴西南出入經五六日方還又不測短長其水夏冷冬溫春秋有白魚出穴數日及人有採食者美珍嘗味蓋亦丙穴嘉魚之類列仙傳曰陵陽子明釣於溪得白龍子明解釣謝之後數十年得白魚腹中有書教子明服食之法三年白龍來迎之鱣魚毛詩谷風四月曰匪鱣匪鮪潛逃于淵詩義䟽曰鱣身似龍銳頭口在頷下背上腹下皆有甲大者千餘斤後漢書曰楊震常客居湖城眾人謂之晚貴震志愈篤後有冠雀銜三鱣魚飛集講堂前冠音貫即鸛雀也都講取魚進曰虵鱣者卿大夫服之象也數三者法三台先生自此升矣淮南子曰牛蹄之涔不生鱣鯉抱朴子曰探鷰窠而求鳳卵搜井底而捕鱣魚雖加至勤其非所有也水經曰漢水又東為鱣湍洪波奔盪崩浪雲頹耆舊言有鱣魚奮鰭遡流望濤直上至此則爆鰓失濟故因名湍矣又曰鱣鮪鯉也出鞏穴三月則上渡龍門得渡為龍矣否則點額而還張衡西京賦曰鱣鮪鱮鮦郭璞江賦曰魚則叔鮪王鱣孫綽望海賦曰文鯉黃鱣鮪魚爾雅曰鮥音洛鮛音叔鮪鮪鱣屬也大者名王鮪小者名鮛鮪今宜都郡自荊門以上江中通出鱏鱣之魚有一魚狀似鱣而小建平人呼鮥子即此魚也鱏音尋毛詩淇澳碩人曰施罟濊鱣鮪撥撥毛詩義䟽曰鮪魚出海三月從河上形似鯉而色青黑頭小而尖如鐵兜鍪口在頷下今東萊遼東人謂之尉魚或謂仲明魚仲明者樂浪尉溺死海中化為此魚也禮記月令曰季春薦鮪於寢廟進時羹味淮南子曰夫牛蹄之涔不生鱣鮪又曰禹決江䟽河鑿龍門辟伊闕龍門本有水門鮪魚由其中上行得上過者便為龍門禹辟而大之故言鑿抱朴子曰寸鮪汎濫啼水之中則謂天下無四海之廣也芒蜴宛轉菓核之內則謂八極之界盡於茲也博物志曰河陰岫穴出鮪魚焉䲛魚魏武四時食制曰䲛一名黃魚大數百斤骨軟可食出江陽犍為淮南子曰季春天子始乘舟薦鮪於寢廟乃為麥祈實鮪亘瞢魚也天子乘舟捕魚者以薦進廟也司馬相如上林賦曰䲛漸離左思吳都賦曰筌䲛
