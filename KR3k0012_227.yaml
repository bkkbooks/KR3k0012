body:
  text: 職官部二十四御史中丞下晉書曰熊遠字孝文遷御史中丞中宗每歎其公忠謂遠曰卿在朝政正色不茹柔吐剛忠亮至徑可謂王臣又曰庾峻字山甫為御史中丞優而不剋又曰周處字子隱為御史中丞奏征虜將軍石崇大將軍梁王彤等正繩直筆權豪震肅又曰劉他昆切字長升兼中丞奏免尚書僕射等十餘人朝廷嘉之遂以即真謝靈運晉書曰漢官尚書為中臺御史為憲臺謁者為外臺是為三臺自漢罷御史大夫而憲臺猶置以丞為臺主中丞是也晉中興書曰王恬字元逾音俞為御史中丞值海西公廢太宗即位未解嚴大司馬桓溫屯中堂夜吹警角恬奏劾溫大不敬請理罪明日溫見奏事歎曰此兒乃敢彈我真可畏也又曰熊遠遷御史中丞尚書郎盧綝入直逢尚書刀協於大司馬門外協醉使綝避之綝以當直不肯回協令人牽綝墮馬至協車前而後釋遠奏請免協官詔令白衣領職又曰劉瑀音雨遷御史中丞瑀氣尚人為憲司甚得志彈蕭惠開云非才非望非勳非地彈王僧遠云廕籍高華人品冗末朝士莫不畏其筆端又曰蕭惠開拜御史世祖與劉季之詔曰今以蕭惠開為憲司冀當稱職但往一服額巳自殊有所震及在任百寮畏憚之八年入為侍中詔曰惠開前任憲奉法繩不阿權戚朕甚嘉之可更授御史中丞又曰鄭鮮之遷御史中丞明憲直繩甚得直司之體外甥毅權重當時朝廷莫不歸附鮮之盡心高祖獨不屈意毅甚恨焉又曰荀伯子為御史中丞蒞職勤恪有匪躬之稱立朝正色內外憚之凡所奏劾莫不深相呵毀或延及祖宗其言切直又頗雜嘲戲故世人以此非之齊書曰王僧處遷御史中丞甲族由來多不居憲職王氏分枝居烏衣者位官微咸僧處為此官乃曰此是烏衣諸郎坐處我亦可試為耳又曰江淹為御史中丞明帝作相謂淹曰君昔在尚書中非公事不妄行在官寬猛能析衷今為南司足以震肅百寮也曰今日之事可謂當官而行更恐不足仰稱明旨耳於是彈中書令謝朏音斐司徒左長史王綪音茜護軍長史庾弘遠並以託疾不預山陵公事又奏收前益州刺史劉悛梁州刺史陰智伯並贓貨巨萬輒收付廷尉臨海太守沈昭略永嘉太守庾曇隆及諸郡二千石并大縣官長多被劾內外肅然明帝謂曰自宋巳來不復有嚴明中丞君今日可謂近世獨步梁書曰樂藹遷御史中丞初藹發江陵無故於船得八車輻如中丞健步避道者至是果遷焉又曰王僧孺兼御史中丞僧孺幼貧其母鬻紗布以自業攜僧孺至市道遇中丞鹵簿驅迫墜溝中及是拜日引騶清道悲感不自勝頃之即真後魏書曰李彪為中尉號為嚴酷以姦款難得乃為木手擊其脅腋氣絶而後屬者時有汾州叛胡得其胸渠皆鞭面煞之及彪之病也體上瘡濆痛毒備極又曰李彪遷御史中尉彪為高祖所寵性又剛直遂多所彈糾遠近畏之豪右屏氣高祖嘗呼為李生又從容謂群臣曰吾之有李生猶漢之有汲黯北齊書曰齊王高澄用崔暹為御史中尉宋遊道為尚書左丞謂之曰卿一人處南臺一人處北省當使天下肅然又曰琅邪王儼字仁威武成第三子纍為御史中丞魏氏制中丞出清道與皇太子分路行王公皆徑住車去牛頓車於地以侍中丞過其或違遲則赤棒棒之自都鄴後此儀寢絶武成欲雄寵儼乃使一依舊制初從北宮出將上宮丞凡京畿步騎領軍之官屬中丞之威儀司徒之鹵簿莫不畢備時儼惣領四職帝與胡后在華林園東門外張幕隔青紗步幛觀之遣中使驟馬趣仗不得入自言奉勑赤棒應聲碎其鞍馬驚人墜帝大笑以為善更勑令駐車傳語良久觀者傾京邑陳書曰徐陵除散騎常侍御史中丞時安成王為司空以帝弟之尊勢傾朝野直兵鮑僧睿假王威權抑塞辭訟大臣莫敢言者陵聞之乃為奏彈導從南臺官屬引奏案而入世祖見陵服章嚴肅若不可犯為斂容正色坐陵進讀奏狀時安成王殿上侍立仰視世祖流汗失色陵遣殿中御史引王下殿遂劾免侍中中書監自此朝廷肅然隋書曰後魏延昌中王顯有寵於宣武御史中丞請革選御史此後踵其事每一中尉更置御史自開皇後始自吏部選用依舊入直禁中唐書官品志曰中丞一人掌督司百僚皇太子巳下其在營門行行馬內違法者皆糾彈之雖在馬外而監司不糾亦得奏之專道而行逢尚書丞郎亦得停駐又曰張易之縱恣益橫嘗私引相工李引泰占吉凶言涉不順御史中丞宋璟音冏請窮究其狀武太后曰易之等巳上聞璟曰謀反大逆無容首免易之等分外承恩臣知言出禍從然義激於心雖死不恨太后不悅內史姚璹音孰恐忤旨遽宣勑令出璟曰天顏咫尺親奉德音不煩宰相擅宣王命太后意解及收易之等就獄尋詔原之命就宅謝罪璟拒而不見曰公事當公言之若私見法無私也又曰御史中丞姚庭筠奏稱律令格式懸之象魏奉而行之事無不理比見諸司寮寀不能遵守章程事無大小皆悉聞奏臣聞為君者任臣為臣者奉法故云汝為君目將司明也則知萬機務綜不可遍覽也所以設官分職者委任責成百工惟時以成垂拱之化比者或修一水窗或伐一枯木並皆上聞旒扆取斷宸衷豈代天理物至公之道也自今巳後若緣軍國大事及牒式無文者任奏取進旨自餘據章程合行者各令准法處分其故生疑滯致有稽失者請令御史隨事糾彈上從之又曰盧奕懷慎之少子也與兄奐音喚齊名天寶十一年為御史中丞始懷慎及奐並為此官父子三人為中丞清節不易時人美之又曰齊映為御史中丞從德宗幸梁州每遇險映嘗執轡會上馬驚跳奔益甚上懼傷映令捨轡映堅執久之乃止問其故對曰馬奔踶音弟不過傷臣如捨之或犯清塵雖臣萬死何以塞責上嘉歎無巳又曰御史中丞武元衡奏貞元二年御史中丞竇參所奏凡諸使兼憲官者除元帥都統節度觀察都團練防禦等使餘並在本官之位其後蘇辨音卞于顧音顧以度支郎中兼御史中丞鄧求以易州刺史兼御史大夫皆奉進旨令在同類之上伏以前後異同遵守不一臣謹議伏請自今常參官兼御史大夫中丞者惟檢校省官立在本品同類之上從之又曰元和中御史中丞王播奏監察御史舊例在任二十五月轉准具員不加今請仍舊殿中侍御史舊例在任二月轉准具員加至十八月今請減至十五月侍御史舊例在任六月轉准具員加十三月今請減至十月從之又曰文宗開成初中丞狄兼謨謝官上曰御史中丞朝廷紀綱一臺理則朝廷理朝廷理則天下理無曠厥職兼謨奏曰凡天下有礙法不得中道事臣盡得以彈奏上曰大抵以顧望畏忌為心者自失職業卿梁公之後將嗣家聲不可不留意又曰文宗謂宰臣曰丁居晦作中丞何如因悉數大臣而品第之歎曰宋申錫堪任此官惜哉又曰牛僧孺可為大夫宰臣鄭覃曰頃為中丞未嘗搏擊恐無風望上曰不然鸞鳳與鷹隼事異又曰居晦作此官朕曾以時諺謂杜甫李白輩為四絶問居晦曰此非君上要知之事常以此記得居晦今所以擢為中丞又曰會昌元年中書門下奏御史中丞為大夫之二緣大夫秩崇官不常置中丞常為憲臺之長今寺監少卿少監司業少尹並為寺置之二皆為四品中丞官名至重見秩未崇望升為從四品從之又曰薛存誠為給事中瓊林庫使奏召工徒大廣存誠以為此者姦人竄名以避征徭不可許咸陽尉袁儋都甘切與軍鎮相競軍人無理遂肆侵誣儋反受罰二勑繼至存誠皆執之上聞甚悅命中使嘉勞由是選拜御史中丞又曰孔緯為御史中丞緯器志方雅嫉惡如讎既揔憲綱中外不繩而自肅又曰盧坦為御史中丞裴均為僕射左班踰位請退之均不受坦曰姚南仲為僕射例如此均曰南仲何人坦曰南仲是守正而不交權幸者尋罷為右庶子時人歸咎於均三國典略曰梁張綰字孝卿雍州刺史績之第也梁主策其百事綰對闕其六乃號為百六公常為御史中丞兄績為僕射元日朝會及百司就列兄弟並導騶兩塗前世未有時人榮之崔鴻十六國春秋前録曰假凱驍勇善射好讀書為御史中丞明筆直繩無所阿避號曰老虎傅咸集奏曰司隸中丞得糾太子而不得糾尚書臣所未譬朝廷無以易之梅陶自敘曰余居中丞曾以法鞭皇太子傅親友莫不致諫余笑而應之堂高由陛下太子所以崇於上由吾奉王者法吾豈枉道曲媚後皇太子特見延請賜以請宴禮之如師袁淑謝中丞章曰竊惟此職昭贊實預損益必須廉明威正刺骨窮文使權家勳族不敢藉強而侮物戚門右姓不得稱雄以掩衆昔傅咸臥治僚辟戢懼孫寶移疾卿尹皆怠持書御史漢書曰宣皇帝元鳳中路溫舒上書宜尚德緩刑帝深采覽之季秋後讞魚列反又音巘時帝幸宣室齊宮而決事命侍御史二人持書遂置持書御史通典曰御史中丞舊持書御史也國諱改焉後歷代皆同風俗通曰頃者廷尉多墻面而茍充茲位持書侍御史不復平議讞當糾紛豈一事哉里語曰縣官漫漫冤死者半後漢書曰蔡雍以侍御史轉持書御史遷尚書三日之間周遷三臺續後漢書百官志曰持書御史秩百石掌選明法律者為之天子疑獄以法律讞是非糾六品巳下桓帝以後不治獄充位而巳魏志曰王觀字偉臺東郡亶丘人也明帝幸許昌召觀為治音持下同書侍御史典行臺獄時多倉卒喜怒而觀不阿音順旨晉書曰杜預為鎮南入辭口啓陳壽才史通博宜補黃散也黃黃門侍郎散散騎常侍上曰壽可作治書否預對曰唯在聖詔即手詔用之又曰太始四年置黃沙獄持書御史一人秩與中丞同掌詔獄及廷尉不當皆理之梁書曰謝幾卿天監初除征虜鄱陽王記室尚書三公侍郎尋為侍御史舊郎官傳為職者世謂為南奔幾卿頗失志多陳疾臺事略不復理從為散騎侍郎後魏書曰高道悅拜治書御史正巳當官亡憚彈強禦奏舉任城王王澄等免官高祖詔褒美之隋書曰柳彧遷治書侍御史于時刺史多任武將類不稱職彧上表曰方今天下太平四海清謐共治百姓任其才昔漢光武一代明哲超自布衣備知情僞與二十八將披荊棘定天下及功成之後無所職任伏見詔書以上柱國和干子為祀州刺史其人年垂八十鐘鳴漏盡前任趙州暗於職務政由群小賄賂公行百姓吁嗟歌謠滿道乃云老禾不早殺餘種穢良田古人有云耕當問奴織當問婢此言各有所能也干子弓馬武用是其所長治民蒞職非其所解至尊思治無忘興寢如謂優老尚年自可厚賜金帛若令刺舉所損殊大臣死而後巳敢不竭誠上善之干子竟免又曰梁毗為持書侍御史時京師饑上令禁酒劉昉使妾任任縱也屋當爐酤酒毗劾奏昉曰臣聞處貴則戒之以奢持滿則守之以約昉既位列郡公秩高庶尹縻爵稍久厚祿巳淹正當戒滿歸盈監斯止足何乃規麴蘗之潤競錐刀之末身昵酒徒家為逋藪若不糾繩何以肅厲有詔不治昉鬱鬱不得志又曰柳彧為治書御史右僕射楊素當塗顯貴百寮懾憚無敢忤者嘗以少譴勑送南臺素恃貴坐彧床彧從外來見素如此於階下端笏整容謂素曰奉勑治公之罪素遽下彧據案而坐立素於廷辨詰事狀素由是御之唐書曰孫伏伽初以三事上諫高祖大悅擢拜治書侍御史兼賜帛三百匹時軍國多事賦斂繁重伏伽屢奏請改革舊政高祖並納之因謂裴寂曰隋末無道上下相蒙主則驕矜臣唯諂佞上不聞過下不盡忠使社稷傾危身死匹夫之手朕撥亂反正志在安人平亂任武臣官方委文吏庶得各展器能以匡不逮此每虛心接待冀聞讜言然惟李綱差盡忠款孫伏伽可謂誠直餘人猶踵弊風俯首而巳豈朕所望哉江總贈孔中丞詩曰我行五嶺表辭鄉二十年聞鶯欲動詠披霧即依然疇昔同寮寀今隨年代改借問藏書處唯君故人在故人名官高清簡肅權豪誰知懷九歎徒然泣二毛傅咸御史中丞針敘曰百官之針以針王闕余承先君之蹤竊位憲臺懼有忝纍垂翼之責且造斯針以自勗勵不云自針而云御史中丞針者凡為御史中丞欲通以針之也詞曰煌煌天文衆星是環爰立執法其暉有煥執憲之綱秉國之憲鷹揚虎視肅清違慢蹇蹇匪躬是曰王臣既直其道奚顧其身身之不顧孰有弗震邦國若否惟仲山甫是明焉用彼相莫扶其傾淮南構逆實憚汲生赫赫有國可無忠貞憂責有在繩亦必直良農耘穢勿使能植無禮是逐安惜翅翼喏爾庶寮各敬乃職無為罰先無怙厥力怨及朋友無慚于色罪天子內省有恧音匿慚也是用作針惟以自勑
