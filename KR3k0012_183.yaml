body:
  text: 居處部十門上説文曰門捫也在外為人所捫摸也從二戶象形也閶闔天門也闔門扉也門閉也䦳門嚮也闤闠市門也閽門堅也閽昏也門常昏閉故曰閽即守門隸人也閻里中之門也易説卦曰艮為門爾雅曰閍謂之門注詩曰祝祭於祊是也又曰正門謂之應門宮中之門謂之闈謂相通小門也韓楊天文要集角天門也風俗通曰閈城外郭內里門也禮記注云天子五門皋門雉門庫門應門路門魯有庫雉路三門則諸侯三門也漢制內至禁省為殿門外出大道為掖門應劭注漢書曰掖者言在司馬門之旁掖王者行幸設車宮轅門帷宮旌門無宮則供人門鄭注周官云次車為藩則仰車轅以表門張帷為宮則樹旌以表門陳列周衛則立長人以表門周禮曰掌舍掌王會同之舍設陛枑再重設車宮轅門為壇壝宮棘門為帷宮設旌門無宮則供人門轅門謂次以為藩即車以為門人門謂以人為衛立長人以為門又曰師氏掌以媺詔王居虎門之左司王朝注云虎門路寢門也王日視朝於路寢門外也畫虎焉以明勇猛於守宜也尚書曰舜賓于四門四門穆穆又曰闢四門詩曰乃立皋門皋門有伉乃立應門應門鏘鏘又曰北門篇名刺士不得其志也言衛之忠臣不得其志耳出自北門憂心殷殷又曰高門有閌又曰衡門篇名誘僖公也願而無立志故作是詩以誘掖其君也衡門之下可以棲遲詩義問曰橫一木作門而上無屋謂之衡門易曰重門擊柝以待暴客又曰出門同人無咎又曰不出戶庭無咎禮記曰凡與客入者每門讓於客客至於寢門則主人請入為席然後出迎客主人入門而右客入門而左又曰生男懸弧於門左又曰立不中門行不履閾又曰婦人送迎不出門見兄弟不踰閾又曰兩君相見揖讓而入門入門而懸興作樂又曰大夫士出入公門由闑右不踐閾又曰入門而問諱又曰孔子負手曳杖逍遙於門又曰天子諸侯臺門此以高為貴者又月令曰孟秋其祀門祭先肺陰氣出祀之於門外順陰也又曰孟冬戒門閭修鍵閉左傳啓塞從時門戶橋道謂之啓城郭墻塹為之塞皆啓閉之急不可一日而闕也又襄二年王叔之宰曰蓽門圭竇之人而皆陵其上難為上矣蓽門柴門閨竇小戶穿壁上鋭下方狀如圭又曰新作南門書不時也注本名稷門公吏高之改高門也又曰鄭大水龍鬭于時門之外洧淵又曰公及邾師戰敗績邾人獲公胄懸諸魚門社預曰魚門邾城門又曰楚子囊圍宋門于桐門又曰楚子為陳夏氏亂遂入陳殺夏徵舒轘諸栗門轘車裂也栗門陳城門也論語憲問曰子擊磬於衛有荷蕢而過孔氏之門者曰有心哉擊磬乎又曰邦君樹塞門管氏亦樹塞門又鄉黨曰入公門鞠躬如也史記曰金馬門者官者署門也門旁有銅馬故謂之曰金馬門又曰太史公曰余過大梁求所謂夷門者大梁城東門也又曰夫以汲鄭之賢有勢則賓客十倍無勢則否況衆人乎下邽翟公有言始翟公為廷尉賓客闐門及廢也門外可設爵羅翟公復為廷尉客欲往翟公乃大署門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見又曰萬石君子慶為內史慶歸入門不下車萬石君聞之不食慶恐肉袒請罪不許舉宗及兄建肉袒萬石君讓曰內史貴人入閭里里中長老皆走匿而內史坐車中自如固當乃謝罷慶慶及諸子入里門趨至家又曰呂不韋説子楚曰吾能大子之門子楚笑曰盍自大子之門顧乃大吾門不韋曰吾門待子門而大耳漢書曰太液池有壁門又曰陳平家貧負郭窮巷以席為門然門外多長者車轍又曰魏勃家貧欲見齊相曹參無以自達常早起掃其門人問故勃曰欲見相君無因故為子掃門乃見參參用為舍人又曰梅福居家常以讀書養性為事至元始中王莽顓政師古曰顓與專同福一朝棄妻子去九江至今傳以為仙其後人有見福於會稽者變名姓為吳市門卒云又曰于定國父于公其閭門壞父老方共治之于公謂曰少高大閭門令容駟馬高蓋車我治獄多陰德未曾有冤子孫必有興者至定國為丞相永為御史大夫封侯世傳云又曰張釋之為公車令頃之太子與梁王共車入朝不下司馬門如淳曰官衛令諸出入殿門公車司門者皆下不如令罰金四兩於是釋之追止太子梁王母入殿門遂劾不下公門不敬奏之薄太后聞之文帝免冠謝曰教兒不謹薄太后使丞詔赦太子梁王然後得入文帝繇是奇釋之拜為中大夫又曰鄭崇為尚書上謂曰君門如市何以欲禁切主上師古曰言請求者多交通賓客者也崇對曰臣門如市臣心如水又曰鄒陽諫吳王曰今臣盡智畢義易精極慮則無國不可姦飾固陋之資則何王之門不可曳長裾乎又曰王尊為東平相是時東平王以至親驕不奉法度傅相連坐師古曰前任傅相者頞坐王得罪及尊視事奉璽書至庭中王未及出受詔尊持璽書歸舍食已及還致詔尊持後謁者王傅在前説相鼠之詩師古曰鼠鄘風篇名刺無禮之詩也其辭曰相鼠有皮人而無儀人而無儀不死何為相視也言視鼠有皮雖處高顯之地偷食茍得不知廉恥人無禮儀亦與鼠同不如速死也尊曰母持布鼓過雷門師古曰雷門會稽城門也有大鼓越擊此鼓聲聞洛陽故尊引之也布鼓謂以布為鼓故無聲王怒起入後宮尊亦直趨出就舍又曰蓋寬饒字次公為諫議大夫行郎中戶將軍師古曰百官公卿表郎中令屬官有郎中事戶騎三將各以所主為名也將者主戶衛也劾奏衛將軍張安世子侍中陽都侯彭祖不下殿門師古曰過殿門不下車也并連及安世居位無補彭祖時實下門寬饒坐舉奏大臣非是左遷為衛司馬又曰蕭望之署小苑東門候時王仲翁出入從倉頭盧兒顧謂望之不肯録録反抱關為師古曰録録謂循常也言望之不能隨例搜索以建忤執政不得大官而守門望之曰各從其志又曰鉤弋夫人大有寵有娠十四月乃産是為昭帝武帝曰昔堯十四月而生今鉤弋亦然乃命其門曰堯母門范曄後漢書曰孔融云鄭君里門四方所由觀禮其廣令容高車結駟名為通德之門又曰郅惲字君章為上東門候帝常獵夜還惲拒門不開帝乃回從中東門入賜惲布貶中東門候又曰李膺傳曰是時朝廷日亂綱紀頽弛膺獨持風裁以聲名自高士有被其容接者名為登龍門以魚為喻龍門河水所下之口在今絳州龍門縣辛氏三秦記曰河津一名龍門水陸不通魚鱉之屬莫能上江海大魚薄集龍門下數千不得上上則為龍袁宏漢紀曰建初二年有司依舊典奏封諸舅太后詔曰前過濯龍門上見外家車如流水馬如龍吾不譴怒之但絶其歲用後漢書馬援傳曰孝武皇帝時善相馬者東門京鑄作銅馬法獻之有詔立馬於魯班門外更名魯班門為金馬門又曰赤眉入長安更始單騎走從廚城門出三輔黃圖曰洛城門王莽故曰建于門其內有長安廚官俗名之為廚城門今長安故城北面之中門是也諸婦女從後連呼曰陛下當下謝城更始即下拜復上馬去又郭祚傳曰祚遷尚書右僕射故事令僕中丞騶唱而入宮門至於馬道及祚為僕射以為非盡敬之宜言於世宗帝納之詔御在太極唱至止車門御在朝堂至司馬門騶唱不入宮自此始也又曰張湛建武初為左馮翊在郡修典禮設條教政化大行後告歸平陵望寺門而步告請也告歸謂請假歸寺門即平陵縣門也主簿進曰明府位尊德重不宜自輕湛曰禮下公門軾輅馬輅大也君所居曰寢車馬曰輅馬軾車前橫來也乘車曰必正之有所敬則撫軾為小俯也禮記曰大夫士下公門式輅馬孔子於鄉黨恂恂如也父母之國所宜盡禮何謂輕哉又曰虞延為陳留督郵勑延一人從駕到魯還經封丘城門門下小不容羽蓋帝怒使撻侍御史延因下見引咎以為罪在督郵言辭激揚有感上意乃制詔曰以陳留督郵虞延故侍御史罪宜放魏書曰文帝初在東宮集諸儒於肅城門內講論大義侃侃無倦吳志曰張昭諫孫權不從稱疾不朝權自出過其門呼昭辭疾篤權使燒其門欲恐之昭更閉戶權使滅火住門良久昭諸子共扶昭起權載以還宮又曰初平中謠曰黃金車班蘭耳閶闔門出天子閶闔吳西郭門夫差所作又曰諸葛恪有遷都意更起武昌宮是月武昌門災改作端門晉書曰王衍既有盛才美貌明悟若神常自比子貢聲名藉甚傾動當世妙善玄理唯談莊老每捉玉柄塵尾與手同色義理有所不安隨即改更世號口中雌黃朝野翕然謂之一世龍門又曰賀循時廷尉張闓住在小市將奪左右近宅以廣其居乃私作都門早閉晏開人多患之訟於州府皆不見省會循出至破岡連名詣循質之循曰見張廷尉當為及之闓聞而遽毀其門詣循致謝其為世所敬服如此又曰陳頵字延思陳國若人也少好學有文義父欣立宅起門頵曰當使容駟馬車欣笑而從之又曰稽含自號即丘子門曰歸厚之門崔鴻十六國春秋夏録曰赫連勃勃宮殿大成乃刻石都南頌其功德其南門曰宋朝門東門曰招魏門西門曰平朔門又起沖天臺于南山欲登之望長安又後趙録曰建武十年白虹出自大杜經鳳陽門東南連天十餘刻乃滅於是閉鳳陽門唯元日乃開又後秦録曰姚興從朝門遊于文武苑及昏而還將自平朔門入前驅既至城門校尉王滿聰被甲持杖閉門拒之乃回從朝門而入旦而召聰謂之曰卿社稷之臣也朕有嘉焉於是進位二等隋書曰高祖初為定州惣管先是定州城西門久閉不行齊文宣帝時或請開之以便行路帝不許曰當有聖人來啓之及高祖至而開焉莫不驚異陳書曰高宗七年改作雲龍神虎二門案宮殿簿曰雲龍門第二重宮墻東西門晉本名中東華門本晉東掖門也梁改之西對第三重墻萬春門神虎門第二重宮墻西門晉本名中西華門本晉西掖門宋改名西華東入對第三重墻千秋門水經注曰長安城惠帝元年築六年成即咸陽也本離宮無城故城之十二門東出北頭第一門宣平門王莽更名春正門正月亭民曰東城門其郭門曰東都門逢萌桂冠處也第二清明門一曰凱門王莽更曰宣帝門布恩亭內有籍田倉亦曰籍田門第三霸門王莽更名仁壽門無疆亭民見門色青又名青城門亦曰青綺門邵平種瓜處也南出東頭第一門覆盎門王莽更曰永春門長茂亭其南有下杜城應劭曰故杜陵之下聚落也故曰下杜門又曰端門北對長樂宮第二門安門亦曰鼎路門王莽改曰光禮門顯樂亭第三西安門北對未央宮本名平門王莽更名信平門城正亭西出南頭第一章門王莽更名萬秋門億年亭亦曰故光畢門也又曰便門第二直門王莽改曰直道門端路亭故龍樓門也第三西城門亦曰雍門王莽更名章義門著誼亭其水北有函里民名曰函里門又曰光門亦曰突門北出西頭第一門橫門王莽更名朔都門左幽亭如淳曰橫音光外郭有棘門徐廣曰在渭北北漢書徐厲軍此以備胸奴又有通亥門也第二門洛門又曰朝門王莽更名建子門廣世亭一名高門
