body:
  text: 百卉部五䔰爾雅曰葍䔰大葉白華根如指正白可啖葍方服切䔰音富又曰葍藑茅葍華有赤者為藑葍一種耳亦如䔖苕華黃白異名也蔓巨營切毛詩鴻鴈曰我行其野言採其葍毛詩云惡來也詩義疏曰河內關中謂葍為葍兗幽州謂之燕葍一名爵辨一名蔓根正白著熟熱灰中溫灰中溫㖩飢荒可蒸以禦飢漢祭甘泉或用之其華有兩種葉細而行赤有臭氣也廣雅曰烏麮愆許切葍也說文曰藑茅葍也一曰舜從草藑聲葍䔰也葍從草䔰聲葍從草葍聲風土記曰葍蔓生被樹而升紫黃色大如牛角二三同蒂長七八尺味甜如蜜蘋爾雅曰蘋藾蕭郭璞曰今藾蒿也初生可食毛詩鹿鳴曰呦呦鹿鳴食野之蘋鄭玄云藾蕭也詩義疏云藾蕭葉青白色莖似蓍而輕脆始生者可食亦可蒸也商蕀爾雅曰髦顛蕀孫炎曰一名白棘郭璞曰細葉有剌蔓生一名商蕀廣雅云女木也竊衣爾雅曰蘮九例切蒘切除竊衣孫炎曰江淮間食之其花著人衣故曰切衣郭璞曰似芹可食實大如夌兩兩相合有毛著人衣瞥苡爾雅曰瞥苡馬舄馬舄車前也郭璞曰今車前草大葉長穗好生道邊江東呼蝦蟆衣周書所載同名耳非此瞥苡廣雅曰瞥苡當道馬舄毛詩關睢曰瞥苡后妃之德也採採瞥音浮苡薄言採之毛云瞥苡車前大葉好生道邊也宜懷妊焉神仙服食經曰車前實雷之精也服之形化八月採地衣地衣者車前實也本草經曰車前實一名當道一名牛舌藜毛詩嘉魚曰南山有臺北山有萊詩義疏曰萊藜也莖葉皆似生菊今兗州蒸以為茹謂之萊而譙沛人謂雞蘇為來故三倉云萊茱萸此二草異而名同禮記月令曰孟春行夏令則藜莠蓬蒿並興家語曰子路見孔子曰負重涉遠不擇地而休家貧親老不擇祿而仕昔者由也事二親之時常食藿之實而為負米百里之外親歿之後南遊從車百乘積粟萬鍾纍茵而坐列鼎而食願欲食藜藿為親負米不可復得也又曰楚昭王聘孔子孔子往拜禮也路出於陳蔡陳蔡大夫日相與謀曰孔子賢聖其所剌譏皆中諸侯之病若用於楚陳蔡危矣遂使兵拒孔子孔子不得行絶糧七日外無道所通藜羹不充從者病孔子愈慷慨講誦絃歌不衰又曰曾參後母遇之無恩而供養不衰及其妻為藜羹不熟因出之人曰非七出也答曰藜羹小物耳吾欲熟而不用吾命況大事乎遂出之山海經曰泰山有草焉名曰藜荻可以為疽郭璞曰為治也虞盤估孝子傳曰曾子以藜蒸不熟遣妻莊子曰孔子窮於陳蔡間七日不食藜羹不糝顏色甚憊又曰子貢乘大馬中紺而表素軒車不容巷往見原憲原憲華冠屣履杖藜應門子貢曰嘻先生何病也韓子曰堯之王天下也糲梁之食藜藿之羹王萯禮記月令曰孟夏之月王萯生蔡雍章句曰萯草名也生於陵也藋爾雅曰拜蔏音商藋蔏藋亦似藜廣雅曰堇藋淮南子曰藜藋需而長日加四寸不可以為櫨棟戒火南越志曰廣州有大樹可以御火山北謂之慎火或多種屋上以防火也但南方無霜雪其花不凋故生而成樹耳本草經曰景天一名戒火一名水母花主明目輕身胡枲爾雅曰卷耳苓耳廣雅曰云枲耳也亦云胡枲也江東呼為常枲或曰苓耳形似鼠耳藂生如盤廣雅曰一名枲耳毛詩關睢卷耳曰採採卷耳不盈頃筐毛云苓耳詩義疏曰苓耳葉青白似胡荽白華細葉莖蔓生可為茹滑而少味四月中生子如婦人耳璫謂之璫草幽州謂之爵耳博物志曰洛中人有驅羊入蜀者胡葸子著羊毛蜀人取種因名羊負菜卷施爾雅曰卷施草拔心不死宿羌也離騷云南越志曰寧鄉縣草多卷施江淮間謂之宿莽薔薇神農本草曰薔薇一名牛膝一名薔麻吳氏本草曰薔薇一名牛勒一名牛膝一名薔薇一名出棗茿爾雅曰竹篇匹善切蓄郭璞注云似小藜赤莖節好生道旁可食又殺蟲說文曰萹茿也從草扁聲本草經曰萹萹一名萹竹吳氏本草曰萹蓄一名畜辨一名萹蔓鬼目爾雅曰符鬼目郭璞曰今江東有鬼目草莖似葛葉圓而毛子如耳璫赤色生吳志曰建鄴有鬼目菜於工人黃狗家生依棗樹長丈餘莖廣四寸厚二分本草經曰鬼目一名東方宿一名連蟲陸名羊蹄覆盆爾雅曰茥若圭切蒛去悅切葐郭璞曰覆盆也實似莓而小亦可食孫炎曰青州曰茥廣雅曰蒛葐陸英梅也抱朴子曰俗人見方用蒛葐覆葐謂之瓦器近易之草或不知蓬纍一名陵纍甄氏本草曰覆葐子一名馬瘻一名陸荊酢漿爾雅曰葴寒漿今酸漿草江東呼曰苦葴音針本草曰酢漿一名酸平寒無毒生川澤及人家田園中治熱煩滿定志益氣利水道産難吞其實立産吳氏本草曰酸漿一名酢漿稂爾雅曰稂童梁也稂莠類也國語曰季文子相宣成無衣帛之妄無食粟之馬仲孫他諫曰不華國也文子曰吾聞以德榮為華不聞以妾與馬獻子聞囚之七日自是妾衣七升之布馬食稂莠文子曰過而能改民之上也仲孫他孟獻子庶字毛詩曹蜉蝣下泉曰冽彼下泉浸彼苞稂稂同梁也又大田曰不稂不莠去其螟螣詩義疏曰禾粟秀為穗而成崱嶷如骨之童稂莠毛詩甫田曰無田甫田維莠驕驕甫大也大田過度而無人功終不能獲無思遠人勞心忉忉韋曜問答曰甫田維莠今何草答曰今之狗尾也左傳襄六曰鄭公孫揮過伯有氏其門上生莠子羽曰其莠猶在乎以莠喻伯有伯有侈知其不能久存晉書曰明帝時王如舉兵作亂令人種禾禾悉變莠俄而軍敗降於王敦為敦所煞綬爾雅曰虉綬小草有雜色似綬虉五雁切毛詩義疏曰鵲五色作綬文故曰綬草臺爾雅曰臺夫須臺可以為禦兩笠毛詩嘉魚曰南山有臺樂得賢也南山有臺北山有萊臺夫須也萊草也山有草木次自覆蓋成其高大臣君有賢臣以自君顯毛詩義疏曰舊說莎草也可為簑笠故曰臺笠緇撮或云臺草有皮堅細滑緻可為簦笠南土多有纂文曰臺一曰山莎可作笠皋蘆南越志曰龍川縣有皋蘆草葉似茗味苦澀土人以為飲今南海謂為過羅或曰拘羅翹搖爾雅曰枉矢搖草郭璞曰蔓生細葉紫花可食今俗呼翹搖車土瓜爾雅曰菲蒠萊又曰菲芴郭氏曰菲草生下濕地似蕪菁華紫赤色可食郭璞注即土苽孫炎曰菲葍類芴音物毛詩曰采葑采菲無以下體毛詩云葑須也菲芴也詩義疏云菲似葍莖鹿葉厚而長有毛三月中蒸為茹滑美亦可作羹幽州為之遂爾雅謂息萊今河內為之萊也又毛詩鄭箋云此二萊者蔓菁與葛之類也皆上下可食然而其根有惡時也廣雅曰土苽芴也本草云王苽一名土苽崔實四民月令曰二月盡三月可采土苽根菌爾雅曰中馗菌郭璞注曰地菌也似蓋今江東名為土菌亦曰馗廚可啖之小者菌注大小異名列子曰朝菌不知晦朔朽穰之上有菌芝者生於朝死於晦莊子曰朝菌不知晦朔司馬曰大芝也天陰時生糞土見時萎故不知月始終呂氏春秋曰菜之美者駱越之菌說苑曰雍門周對孟常君曰夫以秦楚之強而報於弱薛譬猶磨蕭斧而伐朝菌也博物志曰江南諸山郡中大木斷倒者經春夏生菌謂之椹食之有味而忽有毒殺人云此物往往自有毒者或云蛇所著之楓樹生者啖之令人笑不得止治之飲土漿多愈風土記曰陽羡袁君廟有祈雨者則祝稱神命常賜芝草草菌也便以神前酒杯灌地以大羹杯覆之有須發杯而菌生今猶然異苑曰交州諸郡有菌以葉塗人軀便舉體菌生生既遍便就朽爛肌肉消腐承露爾雅曰蔠葵蘩露璞曰承露也大莖小葉花紫黃色蔠音終陳留耆舊傳曰梁垣牧為郡功曹與君歸鄉為赤眉所得賊將啖之牧求先賊長義而釋牧送繁露實一斛扶老汝南先賢傳曰蔡順事母至孝井桔槔朽壞在母生年上順不敢治之俄而有扶老生繞之遂堅晉宮閣名曰華林園扶老三株廣志曰扶老華黃如金名金草
