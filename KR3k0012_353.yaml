body:
  text: 兵部八十三戟上釋名曰戟格也旁有枝格也戈勾矛戟也戈過也所刺則決過所勾引制之不得過也車戟曰常長丈六尺車上所持也八尺曰尋倍尋曰常故稱常也手戟手所持擲之戟也説文曰戈平頭戟也從戈一橫之象形也戟有枝兵也戟讀若棘鏌鋣大戟也方言曰戟楚謂之孑鄭璞曰取名於鉤子也凡戟而無刃秦晉之間謂之孑或謂之鏔音寅吳楊之間謂之戈東齊秦晉之間謂其大者曰鏝莫干切胡其典者謂之句孑鏝胡即今雞鳴句孑戟也南楚宛郢謂之匽音匽戟其柄自關而西謂之祕音祕或謂之殳音殊廣雅曰匽謂之雄戟太公兵法曰戟之神名大將趙氏兵書曰戟參星主之周禮曰掌舍為壇壝音遺宮棘門鄭司農云棘門以戟為門也左傳曰鄭伯將伐許授兵於太宮公孫閼與頴考叔爭車考叔挾輈以走輈車轅也子都技棘以逐之棘戟也及大逵不及子都怒都閼字也又曰莊公四年楚武王荊尸授師孑焉以伐隨尸陳也孑者戟然則楚始於此參用戟為陳也又曰鄭公子歸生受命于楚伐宋華元禦之戰于大棘宋師敗績囚華元狂狡輅鄭人鄭人入於井狂狡宋大夫輅迎也倒戟而出之獲狂狡君子曰失禮違命宜其為禽也又曰晉侯飲趙盾酒伏甲將攻之遂跣以下公族夫熬犬焉靈輒倒戟以禦公徒而免之問何故曰翳桑之餓人也又曰諸侯伐逼陽狄虒彌建大軍之輪蒙之以甲為櫓左執之右拔戟成一隊又曰欒氏乘公門范宣子謂鞅曰矢及君屋死之鞅用劍以帥卒用劍短兵接欲致無也欒氏退攝車從之遇欒樂樂盈之族曰樂射之不中又注注屬矢於弦則乘槐本而覆或以戟鉤之斷肘而死周書曰年飢上用輿曲輈不漆矛戟縷纏羽旄不擇鳥史記曰平原君與楚合縱言其利害日出而言之日中不決毛遂按劍而前曰今楚地方五千里持戟百萬此霸王之資也又曰蘇秦説韓王曰韓之劍戟皆出於冥山棠溪漢書曰項羽令壯士挑戰漢有善騎射曰樓煩應劭曰樓煩今樓煩縣是也楚戰三合樓煩輒射殺之羽大怒自被甲持戟挑戰樓煩欲射羽瞋目叱之樓煩目不能視手不能發走還入壁不復敢出又曰田肯賀上曰秦形勝之國也帶河阻山懸隔千里持戟百萬懸隔千里之外秦得百二馬齊地方二千里持戟百萬齊得十二焉非親子弟莫可使王齊者也又曰奉天子法駕迎皇帝代邸皇帝入未央宮有謁者十人持戟衛端門曰天子在足下何為者不得入又曰漢七年長樂宮成於是皇帝輦出房百官執戟傳警引諸侯王以下至吏六百石以次奉賀又曰息夫躬云諸曹以下僕遫音速不足數卒有強弩圍城長戟指闕陛下誰與備之又曰朝錯上言曰兩陳相近平地淺草可前可後此長戟之地也劍楯三不當一又曰灌夫字仲孺父孟死吳軍夫奮曰願取吳王若將軍頭以報父仇於是夫被甲持戟募軍中壯士所善願從數十人及出壁門莫敢前獨兩人及從奴十餘騎馳入吳軍至戲音麾下所殺傷數十人又曰揚雄位不過執戟又曰八月飲酎行祠孝昭廟是時霍氏外孫代郡太守任宣坐謀反誅宣子章為公車丞亡在渭城界中夜玄服入廟執戟立廟門待上至欲為逆發覺伏誅後漢書曰光武署銚期為賊曹掾上略地向北期從徇薊時王郎檄書到薊中起兵應郎光武趍駕出百姓聚觀喧呼蒲道遮路不得行期騎馬奮戟嗔目大呼左右曰蹕周禮隸僕掌蹕宮中之事鄭衆曰止行清道也若今警蹕説文蹕與蹕同衆皆披靡東觀漢記曰吳漢與蘇茂周建戰漢躬被甲持戟告令諸部將曰聞鼓聲皆大呼俱進後至者斬遂鼓而進賊兵大破又曰建武四年隗囂遣馬援奏課京師因曰臣與公孫述同縣少小相善臣前往蜀述陛戟乃見臣今臣遠從異方來陛下何以知臣非刺客姦人而簡易若是上大笑又曰田邑字伯玉為上黨太守時更始遣鮑永馮衍屯太原永衍恐其先降説之曰晏嬰臨盟擬以曲戟不易其辭又曰楊政字子行師事博士范升建武中范升為太常丞為去妻所誣告坐事繫獄當伏重罪政以車駕出時伏道邊抱升子持車叩頭武騎虎賁恐驚馬引弓射之不去旄頭以戟叉政傷胸前政遂涕泣求哀上即尺一出升又曰孫程與王康等斬江京等迎立濟陰王是為順帝閻顯弟景為衛尉從省中還外府收兵至盛德門尚書郭鎮率直宿羽林出逢景景因斫鎮不中鎮劍擊景墮車左右以戟叉其胸禽之送廷尉謝承後漢書曰彭循字子陽太守祕君聞循義勇多謀請循以守吳令民歌之曰時歲倉卒盜賊縱橫大戟強弩不可當賴遇賢令彭子陽司馬彪續漢書曰楊仁字文義巴郡人顯宗特詔補北宮衛士及帝崩時諸馬貴盛各爭欲入宮仁被甲持戟嚴勒門衛莫敢輕進者肅宗既立諸馬共譖仁上知其忠愈善之張瀅漢南記曰陳蕃等欲除諸黃門謀泄閽寺之黨於宮中詐稱驚云外有反者蕃奔入宮小黃門朱寓逆以戟刺蕃魏志曰董卓恐人謀己常以呂布自衛嘗失意拔手戟擲布布拳捷之由是陰怨卓英雄記又載呂布詣董卓卓嘗拔戟擲之言布亂其私室又曰袁術遣將紀靈等步騎三萬攻劉備備求救於呂布嚴步兵千騎二百馳往赴備布謂靈等曰布性不喜合鬥但喜解鬥耳布令門候於營門中舉一只戟布言諸君觀布射戟小枝一發中者諸君當解去不中可留鬥布舉弓射戟正中小枝諸將皆驚言將軍天威也明日歡會然後各罷又曰張繡反襲太祖營太祖出戰不利典韋以長戟左右擊之一叉輒十餘矛音矛摧左右死傷者略盡韋被數十創短兵接戰賊前搏之韋雙挾兩戟擊殺之餘賊不敢前又曰典韋好持大雙戟與長刀軍中為之語曰帳下壯士有典軍持一雙戟八十斤王沈魏書曰太祖討呂布於濮陽布有別屯在濮西相持太祖募隱陳典韋先占但持長矛撩戰時西面又急韋左手持十餘戟大呼起所抵無不應手倒者魚豢魏略曰徐庶字元直少好任俠為人報讎白堊鳥各切突面被髮而走為吏所得乃感激棄其刀戟更絹巾單衣折節學問吳志曰孫權拜諸葛恪丹陽太守授棨戟武騎作鼓吹導引歸家又曰孫權乘馬射虎庱亭庱據陵切馬為虎所傷權投以雙戟虎遂却又曰太史慈劉繇使循騎卒遇孫策慈便前鬥正與策對刺慈馬以欖慈項上手戟慈亦得策兜鍪又曰孫綝遣中書郎李崇奪孫亮璽綬徵立琅邪王休奉書於休曰綝以薄才見授大任不能輔導陛下頃月以來多所造立親近劉承悅於美色敗壞藏中矛戟五千餘枚以為戲具韋昭吳書曰凌統怨甘寧殺其父操嘗於呂蒙舍會酒酣統乃以刀舞寧起曰能雙戟舞蒙曰寧雖能未若蒙之巧也因操刀持楯以身分之張勃吳録曰嚴白虎使弟輿詣長沙桓王請和許之輿請與王獨會面約既會王引白削斫席輿體動王知其無能以手戟投之立死蜀志曰兩鑲音娘是謂閉木戶持雙戟是謂坐鐵室也常璩華陽國志曰荊邯記公孫述曰昔漢祖敗而復征故能禽秦亡楚以弱為強況今地方數千杖戟百萬晉書曰賈后字南風初為太子妃性酷虐嘗手殺數人或以戟擲孕妾子隨刃隨地帝聞之大怒欲廢之又曰楊駿字文長為賈后所誅初溫縣有人如狂造書曰光光文長大戟為牆毒藥雖行戟還自傷及駿居內府以戟為衛至兵入駿府逃于馬廄以戟殺之又曰裴楷有知人之鑒謂鍾會如觀武庫森森見矛戟在前王隱晉書曰上聞賈妃酷妬戟擲諸孕子者皆墮已治金墉城當廢之趙粲救於內荀勗請於外故不廢焉又曰祖逖軍大飢進據食犬丘城樊雅遣六十餘人入逖營拔戟楯大呼向逖逖軍人夜不知何賊多少皆欲散走崔鴻前趙録曰杜育字子光濮陽人少為賊其母每怒育曰天下將亂且以習膽如意望封侯不如意但不使他斫人頭曾為賊圍衣甲三重持戟蓬轉而出又曰劉聰獵上林以愍帝行車騎將軍戎服執戟前導觀者指曰此故長安天子崔鴻後趙録曰冉閔所乘赤馬曰朱龍日行千里左杖雙刃矛右執鉤戟斬鮮卑三百餘級齊書曰宋升平三年尤里封人於官高湖際得瑞靸蘇合切戟三杖旁有古字隋書曰柳彧為屯田侍郎固讓弗許時制三品已上門皆列戟左僕射高熲子弘德封應國公申牒請戟彧判曰僕射之子更不異居父之戟槊已列門外尊有厭卑之義子有避父之禮豈容外門既設內閣又施事竟不行熲聞而歎伏家語曰孔子北遊登于農山之上子路子貢顏回侍側孔子曰二三子各言爾志吾將擇焉顏回曰回願得明王聖主而相之敷其五教導之禮樂使城郭不修溝池不越鑄劍戟為農器放馬牛於原藪室家無離曠之思千載無戰鬥之患夫子凛然曰美哉德也陸賈楚漢春秋曰沛公脫身鴻門從間道至軍張良韓信乃謁項王軍門曰沛公使臣奉白璧一隻獻大王足下玉斗一隻獻大將軍足下亞父受玉斗置地戟撞破之樂資春秋後傳曰聶政拔劍至韓韓相方坐府上持兵戟而衛侍者甚衆聶政直入上陛刺殺俠纍戰國策曰蘇秦説惠王曰夫徒處而致利安坐而廣地雖古五帝三王五伯明主賢君常欲坐而致之其勢不能故以戰續之寬則兩軍相守迫則杖戟相撞又曰齊王建入朝於秦雍門司馬橫戟當馬前曰所為立王者為社稷王何以去社稷而入秦王不聽遂入秦英雄記曰呂布白陳登使詣曹操求徐州牧不得登還布怒拔戟斫機曰不惟吾所求無獲但為卿父子所賣耳登不為動容徐對曰登見曹公言養將軍譬如養虎當飽其肉不飽則將噬人公曰不如卿言譬如養鷹飢則為用飽則揚去其言如此布意乃解王隆漢官解詁曰衛尉宮闕周廬殿掖屯陳夾道當兵交戟胡伯始曰謂諸門郎閣陳屯士夾其道旁當兵以示威武交戟以遮妄出入者也應劭漢官儀曰舊制太子食湯沐十縣家令領主自有宮置周衛交戟五日一朝因坐東廂省視膳食東方朔傳曰武帝坐未央前殿天雨新止朔執戟在殿陛遙指獨語上見呼問之朔對曰殿後柏樹上有鵲立枯枝上東向鳴上遣侍中視之如朔言上問何以知之朔曰風從東來鵲尾旁風則傾背風則蹶必當順風而立故知東向鳴也新雨生枝滑故枝澀故立枯枝上上大笑賜帛十匹又曰孝武元封三年作柏梁臺召群臣有能為七言者乃得上坐衛尉曰周衛交戟禁不時陳壽益部耆舊傳曰張霸遷會稽太守是後盜賊衰少野無遺寇童謠曰棄若戟棄若矛盜賊盡吏皆休蕭廣濟孝子傳曰魏陽不知何處人獨與父居父有刀戟市南少年求之陽曰老父所服不敢相許少年怒道逢陽父打傷叩頭請罪父沒陽斷少年頭以謝父冢前師覺授孝子傳曰仲子崔者仲由之子也子路仕衛赴蒯聵之亂衛人于黶遂殺之子崔既長欲報父讎黶知之曰夫君子不掩人之不備須後日於城西決戰其日黶持滿弓木戟與崔戰而死張敞晉東宮舊事曰東列崇福門門各羌楯十幡雞鳴戟十張
