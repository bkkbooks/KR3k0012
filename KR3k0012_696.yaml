body:
  text: 服章部十二𥜗説文曰𥜗短衣也一日㬮衣㬮溫也奴案反釋名曰𥜗暖也言溫暖也單𥜗如𥜗而無絮也反閉𥜗之小者也卻向著之領含於項反於背後開其𥘞漢書曰班伯為侍中與王許子弟為群在於綺𥜗紈袴之間非其好也又曰昌邑王被廢太后被珠𥜗如淳曰以珠飾𥜗晉書曰貫珠為𥜗盛服坐武帳中王前聽詔又曰哀帝以東園祕器珠襦玉押皆豫以賜董賢東觀漢記曰廉范字叔慶為蜀郡太守舊禁制民夜作范毀削先令百姓為便歌之曰廉叔度來何暮不禁火民安作平生無襦今有五袴又曰來歙詣雒見上上大喜解所被襜𥜗衣賜歙又曰第五倫性節儉為二千石常衣布𥜗又曰梁鴻妻孟氏女布𥜗袴裙鴻曰此真梁鴻妻也魏志曰管寧常著皂帽布襦隨時單復晉令曰旄頭羽林著韋腰襦齊書曰武陵昭王曄過竟陵王子良宅冬月道逢乞人脫襦與之子良見曄衣單進襦於曄曄曰我與向人亦復何異梁書曰顧協少清介有志操初為廷尉正冬服單薄寺卿蔡法度欲解𥜗與之憚其清嚴不敢發口謂人曰我願解身上𥜗與顧郎難衣食者竟不敢以遺之又曰郭祖深清儉常服故布𥜗又曰索君正為豫章內史性不信巫邪有師世榮稱道術為一郡巫長君正在郡小疾主簿熊丘問巫師云須疾者衣為信命君正以所著𥜗與之事竟取𥜗云神將送與北斗君君正使檢諸身於衣裏獲之以為亂政即刑於市而焚神一郡無敢行巫後魏書曰高祖復至鄴見公卿曰朕昨日入城見車上婦人冠帽而著小𥜗襖者尚書何為不察任城王澄曰著者猶少帝曰任城意欲全著乎一言可以喪邦其斯之謂可命史官書之東宮舊事曰太子納妃有紫縠𥜗絳紗繡縠𥜗吳越春秋曰勾踐與妻入臣吳夫人衣無緣之裳左開之𥜗筮以養馬又曰吳王闔閭葬女以珠𥜗之寶鍾離意別傳曰意為司徒侯霸府議曹掾詔送三百人到河北遇隆冬到弘農意輒使屬縣令出錢與徒作𥜗袴光武謂侯霸曰君所使吏仁恕用心乎列仙傳曰細伯子者冬著單衣盛暑𥜗袴列異傳曰東海君以織成青𥜗遺陳節方述異記曰乾羅者慕容廆之十一世祖也著金銀𥜗鎧乘白馬金銀鞍勒自天而墜鮮卑神之推為君長西京雜記曰趙飛燕為皇后其弟在昭陽殿上遺織成上𥜗呂氏春秋曰子産治鄭鄧析務難之約民大獄一衣小獄𥜗袴鄭國大亂子産殺鄧析而民服桓談新論曰待詔景子春素善占坐事繫其婦朱君至獄門通言遺𥜗袴子春驚曰朱君來言與朱為珠袴而𥜗中絶者也我當誅斷也後遂腰斬世説曰司馬宣王從遼東還有六十假士寒凍於車乞一𥜗公乞之酒左右曰官不少𥜗可賜之公乞之酒曰𥜗官中物臣無私施語林曰謝鎮西著紫羅𥜗據胡床彈琵琶作大道曲夢書曰上𥜗為大夫婦人夢之得賢夫也束晢近遊賦曰繫明𥜗以御冬古詩曰羅敷好蠶桑採桑城南隅紺綺為下裳紫綺為上𥜗又曰妾有繡腰𥜗葳蕤金縷光陸機與長沙夫人書曰士璜亡恨一𥜗少便以機新𥜗衣與之袴説文曰袴脛衣也釋名曰袴跨也兩股各跨別也留冀州所名大禢下至膝者也留牢也幕絡在衣表方言曰齊魯之間袴謂之褰或謂之襱音襱關西謂之袴大袴謂之倒頓小袴謂之芙蓉衫楚通語也史記曰屠岸賈攻趙務朔等妻晉成公姊有遺腹公宮匿之生男屠岸賈索於宮中夫人置兒袴中祝曰趙宗若滅即號若不滅即無聲乃索兒竟無聲又後魏書云平文皇后王氏年十三因事入宮得幸於平文生昭成平文崩昭成在襁褓時國有內難將害帝子后匿帝於袴中呪曰若天祚未終者汝無聲遂良久不啼得免於難又曰淮陰屠中少年有侮韓信者衆辱之曰信能死剌我不能出我袴徐廣曰袴服也袴亦作跨於是視之俯出袴下蒲伏一市皆笑信以為怯又曰周仁為人陰重不泄嘗衣斃補衣溺袴張晏曰陰重不泄下不潔故溺袴甚為不潔清以是得幸景帝漢書曰昌邑王賀衣短衣大袴又曰朱博琅琊郡功曹官屬多褒衣大祒孟康曰祒音紹謂大袴也又曰昭帝上官后霍光外孫光欲后擅寵有子帝體不安左右及醫皆阿意言宜內宮人使令皆為窮袴多其帶後宮無進者張晏曰窮袴前後有襠使不得交通東觀漢記曰更始所爵多群小被服威儀不以衣冠或繡面衣錦袴後漢書曰馬援田牧至有牛馬羊數千頭盡散昆弟故舊身衣羊裘皮袴又曰祭遵賞賜與士共之家無私財身衣韋袴又曰吳良字大儀齊國臨淄人以清白守正稱為郡議曹掾正旦掾吏入賀門下掾王望舉觴上壽曰齊郡遭離盜賊今明府視事五年家給人足良跪曰門下掾佞諂明府勿受其觴盜賊未盡人庶困乏今良曹掾尚無袴望曰議曹惰窳自無袴寧足為不家給人足耶太守曰此生言是賜良鰒魚百枚謝承後漢書曰秦護清廉不受禮賂家貧衣服單露鄉人歌之曰冬無袴有秦護魏略曰賈逵居貧無袴過其妻兄柳孚家宿其明無何著孚袴去時人謂為通達又曰許允聞李豐等被收欲往見大將軍已出門回遑不定中道還取袴豐等已收訖大將軍聞允前遽怪之曰我自收豐等不知士大夫何為匆匆乎又曰趙跋避難至北海著布袴絮巾在市中賣餅宋書曰劉穆之壞布裳為袴往見武帝帝謂曰我始舉大義須一軍中甚急誰堪其選穆之曰無見踰者帝笑曰卿能自屈吾事濟矣梁書曰周劉顯將之尋陽朝賢畢祖道顯懸帛十匹約曰儉衣來者以賞之衆人競改常服不過短長之間顯曰將有甚於此矣既而周弘正緑絲布袴軒昂而至折摽取帛又曰元帝愍懷太子眤狎群下好著微服常入朝公服中著碧絲布袴摳衣元帝見之帝大怪遣尚書周弘正責之又曰安成王秀為郢州冬月常作𥜗以賜凍者又曰王𥙿之常使二老婦女戴五條辮著青絞羅袴飾以朱彩又曰何點永元中崔惠景圍城人間無薪點悉伐園樹以贍親黨惠景性好俠義慕交點點不顧之至是乃逼召點點裂裙衣為袴往赴其軍終日談説不及軍事其語默之迹如此北齊書曰承相司馬任胄主簿李世林都督鄭仲禮房子遠等潛謀害神武自魏氏舊俗以正月十五日夜為打蔟戲能中者即時賞帛胄令仲禮藏刀於袴中因神武臨觀謀竊發後敗韓子曰鄭人卜子使妻為袴曰寫吾故袴妻因鑿新袴為孔效之又曰韓昭侯使人藏弊袴侍者曰君上不以賜左右而藏之昭侯曰吾聞明主之愛一嚬一笑有為嚬而嚬有為笑而笑今袴豈特嚬笑哉嚬笑不妄為袴豈可無幼而與之吾必待有功者故藏之事具賞賜門鹽鐵論曰古者鹿裘皮帽及其後大夫士狐狢庶人則毛袴高士論曰孫略冬日見貧士脫袴遺之列士傳曰孟嘗君食客三千人上客食肉中客食魚下客食菜馮援經冬無袴面有飢色郭子曰孫興公道曹輔佐才云白地明光錦裁為負板袴非無文綵然酷無裁製俗説曰謝仁祖年少時喜著剌文袴出郊郭外其叔父誚責之仁祖於是自改遂為名流董巴輿服志曰祀宗廟絳袴示赤心奉神也搜神記曰晉中興作袴者直幅為口無殺不大夫裁也王敦之徵東宮舊事曰皇太子納妃有絳直文羅袴七綵杯文綺袴鄴中記曰石虎獵著金縷合歡袴廣州先賢傳曰申朔字元遊蒼梧人為九真都尉布𥜗布袴鄉邑歎慕之蔡廓彈事曰兼司徒員外散騎常侍謝粲應著絳袴而粲披袴不以貫足有虧常體應邵漢官儀曰司空騎吏以下皂袴因秦水行今漢家火行宜絳袴又曰虎賁中郎將衣紗縠單衣虎紋錦袴魏舊事曰楊平善裁袴以官絹百匹作小袴百枚世説曰武帝嘗降玉武子婢子百餘人皆綾羅袴裙手擎飲食袴褶釋名曰褶襲也覆上之言也晉書曰楊濟字文通歷位鎮南征北將軍遷太子太傅濟有才藝嘗從武帝校獵北邙下與侍中王濟俱著布袴褶騎馬執角弓在輦前晉中興書曰郭文舉上餘杭大辟山令顧揚以文山行與韋袴褶一具文不納使者置衣室中而去文亦無言袴褶爛于戶內趙書曰中書令徐光奏耕服介幘青縑袴褶宋書曰元凶邵弒逆袁淑止之劭因起賜淑等袴褶又就主衣取錦裁三尺為一段又中裂之與淑及左右使以縛袴褶又曰張暢為南譙王義宣司空長史南郡太守元凶弒逆義宣發哀之日即便兵暢為元佐位居僚首哀容俯仰蔭映當時舉哀改服著黃韋袴褶出射堂簡人音姿容止莫不囑目見者皆願為盡命蕭子顯齊書曰東昏侯拜愛姬潘氏為貴妃乘臥與侯騎馬為從著織成袴褶後魏書曰傳靈根及弟靈越南走靈根叔乾愛先在南遣船迎之得免靈根差期不得俱渡臨濟人知銼斬殺之乾愛出郡迎靈越問靈根愆期狀靈越殘不應答乾愛不以為惡勑左右取匣中烏皮袴褶令靈越代所常服虛越言不須乾愛云汝可著體上衣服見桓公耶桓公護之為剌史靈越竟不肯著唐書曰玄宗時御史大夫李適之秦每大禮六品官並服朱衣自是以下許通著袴褶如有慘故不合著朱衣袴褶者聽不入自餘應著而不著者請奪俸以懲不恪西河記曰西河無蠶桑婦女以外國異色錦為袴褶魏百官名曰三公朔賜青杯文綺長袖袴褶一方道盛此北疆記曰盧主南郊著皇班褶繡袴江表傳曰呂範願暫領督出釋褠著袴褶執鞭詣闕下啓事語林曰夏少明在東不知名聞裴逸民知人乃褁糧寄載入洛從之未至家少許見一人著黃皮袴褶乘馬將獵夏問曰裴逸民家近遠答曰君何以問夏曰聞其名知人故從會稽來投之裴曰身是逸民君明可更來明往逸民果知之乃用為西門侯於此遂知名傅暢自序曰余年五歲散騎常侍魯叔虎與先公甚友善每來往喜與余戲嘗解余衣褶披其背脫余金環與侍者謂余吝惜而余笑與之經數日不索
