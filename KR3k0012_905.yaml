body:
  text: 獸部十六狗上爾雅曰犬生三猣音宗二師一玂音祈未成毫狗長喙獫音廉又音險短喙猲音歇獢許嬌切狗絶有力狣音兆尨狗也狗四尺為獒説文曰犬狗之有懸蹄者也孔子曰視犬之字如畫狗也又曰狗叩也叩氣吠以守也又曰尨犬之多毛者也猲短喙犬也獫黑犬黃頭也狂之句切黃犬黑頭也猈音罷短腦狗也㺌胡斬切犬吠不止也獒犬如人心可使也狾居世切狂犬也狄亦犬也又曰狡少狗也胸奴有狡犬巨口而黑身呂忱字林曰獹韓良犬也㹱音鵲宋良犬也𤜵五見切逐虎犬也何承天纂文曰守犬為獖扶本切隴西以犬為猶酉㺜乃切毠乃居切㲰乃庾切皆多毛犬也獟五校切猘居例切也䂏音雕屈尾犬也廣雅曰殷虞晉獒楚茹黃韓盧宋鵲並犬屬廣志曰狗有懸蹄短尾之號古今注曰狗一名黃羊易説卦曰艮為狗詩國風盧令曰盧令令其人美且仁盧田犬令令纓環聲盧重環其人美且鬈又國風野有死麕曰無撼我悅兮無使尨也吠尨狗也禮記曲禮曰馬效羊者右牽之效犬者左牽之又曲禮曰凡祭祀犬曰羹獻又內則曰狗赤服而躁臊又檀弓曰仲尼之畜狗死使子貢埋之曰吾聞之斃帷不棄為埋馬也斃蓋不棄為埋狗也丘也貧無蓋於其封也亦與之席無使其首陷焉封當為窆陷謂浸於土尚書洪範曰西旅獻獒西戎遠國貢大犬太保作旅獒召公也左傳宣上曰晉侯飲趙盾酒伏甲將攻之其右提彌明知之趍登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫敖焉明搏而殺之盾曰棄人用犬雖猛何為又襄三曰國人逐瘈狗瘈狗入於華臣氏國人從之華臣懼遂奔陳又昭六曰二十三年遂取邾師獲鉏弱地邾人訴于晉晉人來討叔孫婼如晉乃館諸箕使人與叔孫居於箕者請其吠狗弗與及將歸殺而與之食示下愛公羊宣公曰靈公食趙盾公曰聞子劍利以示我盾將起進劍彌明曰何故拔劍於公所盾知之躇階而走躇猶超遽不暇以次公有周狗可與比周所指如意謂之獒而屬之獒亦躇階從彌明逆而踆之以足逆踏之曰踆絶頷趙盾顧曰君之獒不若臣之獒也史記淮陰傳云高祖詔齊捕蒯通通至上曰若教淮陰侯反乎對曰然臣固教之跖狗吠堯堯非不仁固吠非其主當是時臣獨知韓信非知陛下也又徐偃王志云徐君宮人任娠而産卵以為不祥棄於水邊孤獨老母有犬名鵠倉獵於水濱得所棄卵銜以來歸獨母以為異覆暖之遂𧉸蝍成小兒生時正偃故以為名徐君宮中聞之乃更録取收養長而仁知襲君徐國後鵠倉臨死更生角而九尾實黃龍也偃王莽之徐梁界中今見有狗壟云又曰范蠡之齊遺大夫種書蜚鳥盡良弓藏狡兔死走狗烹又曰范睢説秦昭王曰夫以秦而治諸侯譬若縱韓廬而博蹇兔也閉關十五年不敢窺兵於山東者是穰侯不忠而大王之計有所失也漢書五行志曰文帝後五年六月齊雍城門外有狗生角又曰成帝河平元年長安男子石良劉晉相與同居有如人狀在其室中擊之為狗走復至數人被甲持弓至良家擊之或傷皆狗也自二月至六月乃止其於洪範皆犬禍也後漢書曰岑熙為魏太守無為而化視事二年輿人歌之曰我有枳棘岑君伐之我有蝥賊岑君遏之吠狗不驚足下生氂又曰靈帝於西園弄狗著進賢冠帶綬續漢書曰靈帝寵用便嬖弟子轉相汲引賣關內侯直五百萬令長強者貪如豺狼弱者略不類物實狗而冠也又曰昌邑王見狗冠方山冠龔遂曰王之左右皆狗而冠魏志曰太祖云我有丁斐猶人家有盜狗善捕鼠雖小損而完囊儲又曰公孫淵未亡家數有怪犬冠幘綘衣上臺又曰朱建平善相術謂應璩云君年六十三位為常伯當有厄先此一年當獨見一白狗而旁人不見也據六十一為侍中直內省歘見白狗問之衆人悉無見者於是遊觀田里飲宴自娛過期一年年六十三卒魏略曰丁溢外似踈濫而內明慧雖與何晏鄧揚等同列而皆少之唯聲勢屈於曹爽爽亦教之言無不從故于時謗書謂臺中三狗啀喍不可當一狗憑點作蛆囊三狗謂何鄧丁也點者爽小字也其意言三狗皆欲囓人而畜蛆也吳志曰孫峻謀誅諸葛恪恪將見之夜精爽擾動通夕不寢嚴畢趍出犬銜引其衣恪曰犬不欲我行乎還坐有頃乃復起犬又銜其衣恪令從者逐犬遂升車晉書曰當陽侯杜預初攻吳吳人憚其智以瓠繫狗頸示之預恨之及平盡殺之又曰齊王冏入廢賈后后呼帝曰陛下有婦使人廢亦行自廢又問冏曰起事者誰冏曰梁趙后曰梁狗當繫頸今反繫其尾何得不然又曰吳隱之為奉朝請謝石請為衛將軍主簿隱之將嫁女石知其貧素遣女必當率薄乃令移廚帳助其經營使者至方見婢牽犬賣之此外蕭然無辦又曰庾翼常令郭璞筮其后璞曰卿后並貴盛然有白龍者凶徵至矣後庾冰子蘊為廣州刺史其妾産犬子不令蘊知狗轉長大蘊入見狗眉目分明而異形於衆後失所在蘊慨然曰殆白龍乎後為桓氏所滅又藝術傳曰嚴卿會稽人也善卜筮鄉人魏序欲暫東行荒年多抄盜令卿筮之卿筮曰君慎勿東行必遭暴害之氣而非劫也宜有以穰之可索西郭外獨母家白雄狗繫著船前求索正得駮狗卿曰其色不純當有小毒正及六畜爾無復憂序行半路狗忽有聲甚急如被人擊比視已死吐黑血斗餘其夕序墅上白鵝數頭無故自死而家無恙後魏書蠻夷傳云獠性同禽獸若殺其父求得一狗以謝其母不懷嫌恨又以大狗一頭買一生口北史曰齊南陽王綽始十餘歲留守晉陽愛波斯狗尉破胡諫之綽歘然斫殺數狗狼籍在地破胡驚走不敢復言後有婦人抱兒在路走避入草綽奪其兒飼波斯狗婦人號哭綽怒又縱狗使食狗不食塗以兒血乃食焉後周書曰張元琮性仁孝村陌有狗子為人所棄者元見即收而養之其叔父怒曰何用此為將欲更棄之元對曰有生之類莫不重其性命若天生殺自然之理今為人所棄而死非其道也若而不收養無仁心也是以收而養之叔父感其言遂許焉未幾乃有狗母銜一死兔置元前而去三國典略曰齊高緯以波斯狗為赤虎儀同逍遙郡君常於馬上設蹬褥以抱之鬭雞亦號為開府馬皆籍以氈罽被以金玉號為蛟龍儀同其將合牝壯則設青盧黼帳牢具過於諸王婚禮齊主常親視焉又曰齊廣寧王孝珩嘗畜一犬守外人不得趣近孝珩每射令其取箭亦解呼召左右牽衣而進又曰徐之才嘗與朝士出遊望郡犬並走諸人令目之之才應聲曰為是宋鵲為是韓盧為逐李斯東走為負帝女南徂陳書曰張彪敗後與妻楊氏去唯常所養一犬黃倉在彪前後未曾捨離乃還入若邪山中沈泰説陳文帝遣章昭達領千兵重購之并圖其妻彪眠未覺黃倉驚吠劫來便噬一人中喉即死及彪被害黃倉嗥叫宛轉血中唐書曰貞觀中彌泥孰可汗李思摩部落濟河於故定襄城為牙帳戶三萬勝兵四萬馬九萬匹思摩之初建也詔錫其土南至大河北有白道川而白道收田處龍荒之最突厥咸競其利思摩以北接延陀種落初集其力尚微未敢北徙至是始還其國因上言曰非分蒙恩立為落長實望子孫竭誠奉國作國家一狗北門守吠若延陀侵逼請家口徙入長城詔許之郭頒魏晉世語曰郊天壇下有白狗高三尺光色鮮明恆臥見人則去周書曰渠溲大者露犬也能飛食虎豹春秋考異郵曰七九六一三陽氣通故斗運狗三月而生宋均注曰狗斗精之所生也又曰狗三月而生陽至於三故狗各高三尺穆天子傳曰𪃫韓之人獻天子良犬七十𪃫之然切又曰天子之狗走百里執虎豹山海經曰陰山有獸焉其狀如狸白首其名天狗又曰犬戎國黃帝之後弄明生白犬二頭自為牝牡故為此國也又曰金門之山有赤犬名曰天犬下則有兵又曰蜪音陶犬如犬而青食人從首始白澤圖曰黑狗白頭耳長卷尾龍也國語曰趙簡子田于螻晉君之囿史黯聞之以犬待於門晉太史史黯也簡子見之何為曰有所得大欲試之茲囿簡子曰何以不告對曰君行臣不從為不順譏簡子曰獵君囿不從君而自行也主將適螻而麓弗聞麓主君苑囿之官傳曰山林之木衡麓守之臣敢煩當日當日謂直日者也主將之君囿不煩麓以告君臣亦不敢煩主之直日以自白也簡子乃還覺所譏也戰國策曰齊欲伐魏淳於髡謂齊王曰韓子盧者天下之壯犬也東郭逡者海內之狡兔也韓子盧逐東郭逡環山者三勝山者五兔極於前犬疲於後犬兔俱罷各死其處田父見之無勞倦之苦而擅其功今齊魏久相持頓其兵疲甚衆臣恐強秦大楚承其後而有田父之功齊王懼謝將休士説苑同也春秋後語曰貂勃常惡田單曰安平君小人也安平君聞之故為酒而召貂勃曰單何以得罪於先生常見惡貂勃曰然跖之狗吠堯非貴跖而賤堯狗自吠非其主也且公孫子賢而徐子不肖然而公孫子與徐子鬭徐之狗攫公孫子之腓而噬之獸以足曰攫攫音居縛切腓腨腸也音肥噬囓也若乃得去不肖為賢者狗豈特攫而噬之哉安平君曰敬聞命矣明日單住之於王漢武故事曰公孫卿至東萊云見一人長五丈自稱巨公牽一黃犬把一黃雀欲謁天子因忽不見東方朔別傳曰天下之良馬將以捕鼠深宮之中曾不如跛犬也西京雜記曰楊萬年有獵狗名青骹賣直百金又曰茂陵少年李亭好馳駿狗逐獸或以鷹鷂兔皆以為佳名狗則有修毫釐睫白望青曹之名
