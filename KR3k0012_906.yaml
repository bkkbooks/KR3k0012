body:
  text: 獸部十七狗下列子曰楊朱之弟曰布衣素衣而出天雨解素衣衣緇衣而反其狗迎而吠楊布怒將撲狗楊朱曰子無撲矣子亦猶是也向者使汝狗白而往黑而來豈能無怪哉晏子春秋曰晏子短使楚楚人為門於大門側延晏子晏子曰使狗國者從狗門入今使楚不當從此門入又曰景公走狗死公命外供之棺內給祭晏子諫不可公曰善韓子曰宋有酤者斗概甚平遇客甚謹為酒甚美懸幟甚高而酒不售遂致於酸問楊長倩長倩曰汝狗惡也孺子懷錢挈壺往酤輒有狗齧之猶大臣齕有道之士尸子曰齊有貧者命其狗為富命其子為樂方將祭狗入於室叱之曰富出祝曰不祥家果有禍長子死哭之曰樂乎而不息悲也隋巢子曰昔三苗大亂龍生于廟犬哭于市尹文子曰康衢長者字僮曰善搏字犬曰善噬賓客不過其門三年於是改之賓客復往呂氏春秋曰齊有善相狗者其鄰藉之買鼠狗期年而得曰是良狗也其鄰畜之數年不噉鼠以告相者曰此良狗也志在麞麋豕鹿不在鼠欲取其鼠也則桎之其鄰桎其後足則狗取鼠又曰齊有好獵者不得獸欲須良狗家貧不能得乃還疾耕疾耕則家富家富則有良狗有良狗則數得獸也獵常過人霸王亦然又曰荊王得茹黃之狗宛路之繒以畋雲夢三月不返保申跪而笞王出而自沉於澗而死王乃殺狗拆繒又曰鄭子陽之難猘狗潰之子陽鄭信逐猘狗春秋亦云齊高固之難失牛潰之逐失牛如逐猘狗也當其時狗牛猶可以為人倡而況夫以人為倡乎飢馬盈廄嗼然嗼無聲也未見芻也飢狗盈宮嗼然未見骨也見骨與芻動則不可禁淮南子曰削薄其德曾纍其刑而欲以為治無以異於執彈而來鳥袖梲而狎犬也梲伏也又曰馬之死也剝之若橐橐治橐也雖含氣而永不能搖狡狗之死也割之猶蠕狡少也蠕動也又曰狅馬不觸於木猘狗不自投於河聾蟲不自陷況人乎聾無知也淮南萬畢術曰取馬毛犬尾置朋友夫妻衣中自相憎矣抱朴子曰陶犬無守夜之益瓦雞無同晨之警又曰甘始以駐年藥餌食新生雞犬皆不長食白犬則毛黑説苑曰梁相死惠子之梁渡河而遽墮船船人救之問欲何之曰欲相梁船人曰子居舟楫之間而溺無我則死又安能相梁乎惠子曰居廣艘長楫之間我不如子至於安國家全社稷子不比我吾視子蒙蒙若未視之狗子耳論衡曰亡獵犬於山林大呼犬名其犬則鳴號而應其主人犬異類聞呼而應者識其主也潛夫論曰一犬吠形百犬吠聲桓談新論曰占仲子婢死有兒年四歲葬後數來撫循之亦能為兒沐頭甚令人惡之以告方士曰有狗效之婢遂不復來又曰楊仲文家嫗死已斂未葬忽起坐棺前床上飲酒醉而狗形見殺之風俗通曰殺狗磔邑四門俗云狗別賓善守衛著以辟惡又曰太史公記云秦始皇殺狗磔四門以禦凶災今人殺白犬以血題門戶曰正月白犬血辟除不祥又曰殺犬磔攘犬者金畜攘者卻也抑金使不害也又曰桂陽太守汝南李叔堅少時為從事在家狗如人立行家人言當殺犬叔堅云犬馬喻君子狗見人行效之何傷叔堅見縣令還解冠榻上狗戴持走家大驚堅復云雲誤觸冠冠纓挂著之耳狗於竈前畜火家益怪堅復云兒婢皆在田中狗助畜火狗何能作怪遂不肯殺後數日狗自暴死卒無纖芥之異叔堅辟太尉掾固陵長原武令終享大位金樓子曰入名山牽白犬抱白鶴山神大喜芝草及寶玉等自出又曰王思微性好淨潔左右提衣悉令白紙褁手指在宅有犬汙柱思微令門生洗之意猶不已更令刮削復言未足遂令易柱洞林曰楊州從事慎曜伯婦病困經日發作有時如聞物往來者其兄周彥武令人作卦得蹇身在戊戍與坎鬼井卦中當有從東北田家市黑狗畜之以代人任患死當有無幾時狗便死復更養如前凡三遇養輒皆吐血而死婦病亦差雜五行書曰白犬虎文南斗君畜之可致萬石也黑犬白耳大王犬也畜之令富貴黑犬白前兩足宜子孫白犬黃頭家大吉黃犬白尾代有衣冠黃犬白前兩足利人玄中記曰昔高辛氏犬戎為亂帝言曰有討之者妻以美女封三百戶帝之狗名槃瓠亡三月而殺犬戎以其首來帝以女妻之於會稽東南得海中土三百里而封生男為狗生女為美人封為狗氏國干寶搜神記曰槃瓠者本高辛氏宮中老婦人有耳疾醫者挑治之有物大如繭以瓠離盛之以槃覆之有頃化為犬其文五色因名槃瓠秦氏三秦記曰有白鹿原周平王時白鹿出此原原有狗枷堡秦襄公時有天狗來其下凡有賊天狗吠而護之一堡無患涼州異物志曰犬狗如驢希見其牙周處風土記曰犬則青鸇白雀飛龍虎子馴良捷警難狎易使述異記曰濟陽山有麻姑仙處俗説山上千年則金雞鳴玉狗吠漢末皆云淮南王升仙其處雞鳴天上犬吠雲中又曰朱休之家犬歌曰言我不能歌聽我歌梅花今年故復可明年當奈何家殺犬明年並死又曰宋元徽中吳縣中都里石玄度家有黃狗生白雄子母愛其子異於常犬銜食飴之子成大狗子每出獵未反母輒門外望之玄度久患氣嗽轉就危困醫為處湯須白犬市索卒不得乃殺所養白狗以供湯用母向子死處跳踴嗥呼倒地復起纍日不息其家煮狗肉與客共食之投骨於地母輒銜置窟中食畢移入後園大桑樹下掘土埋之日向樹嗥喚月餘乃止玄度漸劇臨死屢言湯不救恨殺此狗其弟法度從此終身不食狗肉又曰陸機少時頗好遊獵在吳豪盛客獻快犬名曰黃耳機往仕洛常將自隨此犬黠惠能解人語又常借人三百里外犬識路自還一日至家機羈官京師久無家問機戲語犬曰我家絶無書信汝能齎書馳還取消息不犬喜搖尾作聲應之機試為書盛以竹筒繫之犬頸犬出驛路疾走向吳飢入草噬肉取飽每經大水輒依渡者弭耳掉尾向之其人憐愛因呼上船載近岸犬即騰上速去如飛徑至機家口銜竹筒作聲示人機家開筒取書看畢犬又向人作聲如有所求其家作答內竹筒中復繫犬頸犬既得答仍馳還洛計人程五旬而犬往還裁半後犬死殯之遣送還家葬機村南去機家二百步築土為墳村人呼為黃耳冢異苑曰東海何淡之隆安初屢入關中後還得一犬壯大非常何每行來輒已知處淡之後抱疾犬亦疾及其亡犬一嗥而斃神仙傳曰李仲甫者能隱形初隱百日一年復見形後遂長隱但聞其聲與人對接飲酒食如常有諸張欲從學甫云卿性急未中教張守之至費用五十匹了無所得張大怒乃懷上手而往先與仲甫語畢因依聲左右斫之甫已在他床笑云天下乃當有汝曹愚人學道未得而殺人也我寧可得殺我真得殺汝但頑癡不足問耳使主人呼一犬來著諸生前看能殺之否俄爾犬頭在地犬腹已破叱諸生云卿言我能使卿如犬形否諸生下地叩頭乃止遂不教之列仙傳曰列子者自稱蜀人好放犬犬走入山穴列子隨十餘宿行度數百里出山頭上有殿屋官府松樹仙人吏使甚嚴見其故妻主江魚與列子一函藥發函魚子也著池中養之一年皆為龍列後送函上山犬色更赤有長翰常隨列往來百餘年遂留山上時時下護其宗族蜀人立祠於穴孔常有鼓似傳呼聲搜神記曰山陽王瑚字孟璉為東海蘭陵令夜半時輒有黑幘白單衣吏詣縣扣閣近之則忽然不見如此數年後令伺之見一老狗黑頭白軀至閣便為人以白孟璉殺之乃絶又曰鄱陽趙壽有犬蠱有陳岑家有黃犬六七群出吠岑後令伯婦與壽婦食吐血幾死屑桔梗飲之乃愈又曰東越門中有墉下北隰中有大蛇長七八丈大十餘圍嘗八月送童女至蛇穴輒吞之噉九女時樂縣李誕有小女名奇應募而行乃請好劍咋蛇犬詣之至則放犬咋蛇以劍擊之越王奇之娉以為后續搜神記曰林慮山下有亭有過宿者或病或死常云有十餘人男女各雜衣或黑或白轉來為害有劉伯夷者過宿明燭而坐誦經至中夜其怪復集伯夷密以鏡照之乃一群狗也因陽以燭誤灼其衣作燃毛氣乃以刀剌之遂死餘犬悉走去又曰晉穆哀之世領軍司馬濟陽蔡詠家犬夜群相吠伺之見一狗著黃衣戴帢為衆犬所吠打殺乃是詠家老黃犬又曰晉太和中廣陵人楊生養狗甚憐愛之行止與俱後生飲酒醉行經大澤草中眠不能動時冬月有野火起風又猛狗周章號喚生醉不覺前有一坑水狗便走往眠水中還以身壓生左右草沾濕著地火尋過去生方醒他日又暗行墮空井中犬呻吟徹曉須臾有人徑過怪犬向井號往視見生生曰君可出我當厚報君人問以何物見與生云唯君耳人曰以狗見與便相出生曰此狗曾活我於已死不得相與他物任君人曰若爾便不能相出狗因下頭目井生知其意乃語路人以狗相與乃出之繫狗而去卻後五日狗夜走還又曰會稽人張然滯役經年不歸婦遂與奴私通然養一狗名曰烏龍後歸奴與婦欲謀殺然狗注精舐脣視奴然烏龍與手應聲湯奴奴失刀仗然取刀殺奴幽明録曰晉太興二年吳民華隆生獵養一快犬號曰的尾常將自隨隆後至江邊伐荻犬暫出渚次隆為大蛇所圍繞周身犬還便咋蛇蛇死隆僵仆無所知犬倣徨涕泣走還船復反草中伴怪所以隨往見隆悶絶將歸家二日犬為不食隆復蘇乃始進飯隆愈愛惜同於親戚後忽失之二年尋求見在顯山嶺表録異曰嘗有人自青社泛海歸閩為惡風所飄五日夜不知其幾千里也經一處同船有新羅人云是狗國逡巡果如人裸形抱狗而出見船驚走楚辭九辨曰豈不鬱陶而思君兮君之門以九重猛犬唁唁而迎吠兮關梁閉而不通魏賈岱宗大狗賦曰其頭顱也不可論以盡其骨法也不可辨而釋傞蹴蹌雄姿猛相兀然高八九尺毛踰紫豔光雙眉如白壁時頻伸而振迅若應龍之騰擲瓜類刀戈牙如交戟西晉傅玄走狗賦曰骨相多奇儀表可嘉足懸鉤爪口含素牙首類驤螭尾如騰蛇修頭闊腋廣前捎後豐顱促耳長舌緩口舒節急筯豹耳龍形蹄如結鈴五魚體成勢似凌青雲目若泉中星轉視流光采曜赤精震茹黃而懾宋鵲兮越妙古而揚名
