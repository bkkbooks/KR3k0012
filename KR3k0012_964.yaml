body:
  text: 竹下桂竹山海經曰雲山有桂竹甚毒傷人必死郭璞曰始興小桂縣出桂竹也箭竹爾雅曰東南之美者有會稽之竹箭焉禮記曰禮之於人也如竹箭之有筠也事具禮部說文曰箭矢竹也戴凱之竹譜曰箭竹高者一丈節間三尺堅勁中為矢桃枝竹爾雅曰桃枝四寸有節今桃枝節間相去多四寸竹譜曰桃枝竹皮滑而黃可以為席山海經曰嶓冢之山囂水之上多桃枝竹裴氏廣州記曰有桃竹魏志曰倭國有桃枝竹篁竹竹譜曰篁竹似桂而概節䈥竹竹譜曰䈥竹長二丈許圍數寸至堅利出日南九真南方以為矛其筍未成竹時堪為弩絃見徐衷南中奏劉淵林云夷人以史篻音瓢竹為矛即是䈥竹一物而二名者也永嘉郡記曰陽興去安固江口六十五里有仙石山頂上有平石辟方十餘丈名為仙壇壇陬有一䈥竹凡有風來動音自成宮商周景式廬山記曰康皇溪道士種松及䈥竹竿笁法真登羅山䟽曰嶺南道無䈥竹唯羅山有之其大尺圍細者色如黃金堅貞踈節異苑曰東陽留道先元嘉四年䈥竹林忽生連理野人無知謂為禍崇斫殺之鉤端竹山海經曰嶓冢之山囂水之北多鉤端竹筇竹漢書曰張騫至大夏見筇竹杖問之云賈人市之身毒國山海經曰龜山多狹竹郭璞曰即筇竹竹譜曰筇竹高節實中狀若人剡俗謂之扶老竹廣志云出南廣邛都縣羅浮山記曰邛竹本出邛山張騫西至大夏所見也而此山左右時有之鄉老多以為杖種龍竹廣志曰種龍竹任作笛呂氏春秋曰昔黃帝命伶倫為律伶倫自大夏之西沅渝之陰取竹之嶰谷斷兩節間長六寸九分而吹之以為黃鍾之宮律之本也竹譜曰種龍竹伶倫所伐雲母竹廣志曰雲母竹大竹也攡竹廣志曰攡竹細而多㓨𥯨竹廣志曰𥯨竹任作笛嶺表錄異曰𥯨簩竹皮薄而空多大者俓不逾二寸皮上有麤澀文可為錯子錯甲利勝於鐵若鈍以漿水洗之還復快利廣州記云石麻之竹勁而利削為刀割象皮如切竿狗竹竹譜曰狗竹節間有毛出臨海篃竹竹譜曰篃竹江漢間謂之箭竿一尺數節葉大如扇可以衣蓬江漢之間謂之𥳆竹音蒯由梧竹南方草木狀曰由梧竹吏民家種之長三四丈圍一尺八九寸作屋柱出交阯林邑記曰由梧堪為屋梁柱左思吳都賦曰由梧有篁班皮竹博物志曰洞庭虞帝之二女啼以涕揮竹竹盡班今下雋有班皮竹篔簹顧微廣州記曰箄竹一名篔簹節長一丈吳錄曰始興曲江縣有篔簹竹圍尺五寸節相去六七尺夷人以為布葛異苑曰建安有篔簹竹節中有人長尺許頭足皆具竹譜曰篔簹竹大者中作甑苦竹永嘉郡記曰樂成縣民張薦者隱居頤志不應辟命家有苦竹數十頃在竹中為屋恒居其中王右軍聞而造之薦逃避竹中不與相見一郡號為高士射筒竹竹譜曰射筒竹薄肌而長中著箭因以為名沙麻竹南越志曰沙麻竹人削以為弓弓似弩淮南所謂溪子弩也或曰蘇麻竹或曰麤麻竹嶺表錄異曰沙摩竹廣桂皆植大如茶盌竹厚而空小一人止擎一莖堪為茅屋之椽梁也其種者即釤其竿每截二尺許釘入土不逾月而生根葉明年長牙笋不三載而為林蓋土地所宜也南人俺以鹽為笋笴石麻竹裴淵廣州記曰石麻竹勁利削為刀切象皮如截芋笣竹顧微廣州記曰平鄉縣有笣竹堪作布吳都賦曰笣筍抽節往往縈結雞頸竹竹譜曰雞頸竹篁之類纖細大者不過如指踈葉黃皮強脆無所堪施筍美青班色綠江山崗所饒也籚𥯨竹竹譜曰此竹當是蘆出楊州東垂諸郡浙江以東可以為箎䈄竹竹譜曰䈄墮竹大如腳指蟲食其筍皮類綉甚可愛莽竹爾雅曰莽數節節間促也粼竹爾雅曰粼音吝堅中竹類其中實也簢竹爾雅曰簢音閔筡音徒中其中空也仲竹爾雅曰仲無笐亦竹類未詳音航𥲑竹禮斗威儀曰君乘水而王其政太平𥲑紫脫為常生壬子年拾遺記曰岑華山在西海之西有𥲑竹為簫管吹之若群鳳之鳴漢竹廣志曰永昌有漢竹圍三尺餘利竹廣志曰西南出利竹林於竹竹譜曰林於竹葉薄而廣晉竹吳越春秋曰吳王聞越王盡心自守賜之以書增之以封越王乃使大夫齎葛布十萬狐皮五雙晉竹十庾以荅封禮沛竹東方朔神異經曰南方荒中有沛竹其長百丈圍二丈五六尺厚八九寸可以為舡其子美食之可以已瘡癘張茂先曰子笋也棘竹竹譜曰棘竹生交州諸郡藂生初有數十莖大者二尺圍肉至厚幾於實中夷人破以為弓枝節皆有㓨彼人種以為城卒不可攻萬震異物志所謂種為藩落阻過曾墉者也或卒倒根出大如十石物從橫相承狀如繰車一名笆竹見三倉筍味落人鬢髮沈懷遠南越志曰宋昌縣有棘竹長十尋大如甕其間短者輒六七丈也為竹叢薄葉下有釣剌或有條末如芒針南州異物志曰棘竹節有棘剌嶺表錄異曰南土有剌竹即枝上有剌南人呼剌為剌勒自根橫生枝條展轉如織雖野火焚燒只燎細枝嫩葉春叢生轉復牢密邕州舊以剌竹為牆蠻蜒來侵竟不能入䈏竹竹譜曰䈏與由衙厥體俱洪圍或累尺䈏實衙空南越之居梁柱是供異物志曰有竹曰䈏其大數圍節間相去扃促中實滿堅強以為屋榱斷截便以為棟梁不復加斤斧也弓竹竹譜曰弓竹出東垂諸山簜竹尚書禹貢曰篠簜既敷爾雅曰簜竹竹別名也儀禮日芻竹在建鼓之間謂筲管之屬筍爾雅曰筍竹萌初生者毛詩韓弈曰其蔌維何維筍及蒲荀竹萌也周禮天官醢人曰加豆之實箈菹筍菹箈箭萌也筍竹萌也東觀漢記曰馬援至荔浦見冬筍名笣筍上言禹貢厥笣橘柚疑謂是也其味美於春夏筍續晉安帝紀曰豫州刺史司馬尚之為桓玄將馮該所攻倉儲稍竭外白戰士多飢悉未付食是時蘆筍時也尚之指筍曰且噉此足解三日將士離心遂敗呂氏春秋曰味之美者越駱之莔高誘曰筍也華陽國志曰何隨字季葉有竹園人盜其筍者隨行見之恐驚乃挈履而歸荊州圖曰茿陽薤山上有孤竹三年而生一笋笋成代謝常一楚國先賢傳曰孟宗字恭武至孝母好食竹笋宗入林中哀號方冬筍為之出因以供養時人皆以為孝感所致南史曰沈道虔有人拔其屋後笋令人止之曰惜此笋欲令成林更有佳者相與乃令人買大笋送與盜者慚不取道虔使置其門內而還笋譜曰笋者竹之白蒻也竹之醜節種凡草木有白蒻嫩而堪食者皆曰白蒻也同蔗屬厥性弱於木而強於草實草木中別類也陸龜蒙笋賦曰洪纖靡定方圓不均南方有方竹
