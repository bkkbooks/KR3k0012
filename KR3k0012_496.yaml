body:
  text: 人事部一百三十六諺上說文曰諺傳言也俗言曰諺禮記大學曰故諺有之人莫知其子之惡莫知其苗之碩此謂身不脩不可以齊其家左傳隱公曰滕侯薛侯來朝爭長公使羽父請於薛侯曰周諺有之山有木工則度之賓有禮主則擇之周之宗盟異姓為後寡人若朝於薛不敢與諸任齒又曰虞叔有王虞公求旃弗獻既而悔之曰周諺有之疋夫無罪懷璧其罪吾焉用此其以賈禍也乃獻之又曰楚子為陳夏氏亂故伐陳殺夏徵舒滅陳為縣申叔時使於齊復命不賀王使讓之對曰人有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣又曰公孫歸父會楚子于宋宋人使樂嬰齊告急於晉晉侯欲救之伯宗曰不可古人有言曰雖鞭之長不及馬腹天方授楚未可與爭雖晉之強能違天乎諺曰高下在心高下猶屈申也川澤納汙山藪藏疾瑾瑜匿瑕國君含垢含忍也垢恥也天之道也又曰韓厥曰古人有言曰殺老牛莫之敢尸而況君乎又曰梗陽人有獄魏戊不能斷以獄上其大宗賂以女樂魏子將受之閻沒女寬退朝待於庭饋入召之比置三歎魏子曰吾聞諸諺曰唯食忘憂吾子置食之間三歎何也同辭而對曰食畢願以小人之腹而為君子之心屬厭而已又曰晉侯假道於虞以伐虢宮之奇諫曰虢虞之表也虢亡虞必從之諺所謂輔車相依脣亡齒寒者其虞虢之謂乎論語曰孔子曰周任有言曰陳力就列不能者止家語孔子曰里語云相馬以車相士以君弗可廢也國語曰晉重耳過鄭鄭文公無禮叔詹曰若不禮則殺之諺曰黍稷無成不能為榮黍不能蕃蕪稷不能蕃殖所生不疑維德之基公不聽又曰景王將鑄無射之大林無射鍾名也其律中林鍾也鍾成伶人告和景王謂泠州鳩曰鍾果和矣對曰未可知也諺曰眾心成城眾口鑠金戰國策曰昔者茱莒好謀陳蔡好詐莒恃越而滅蔡信晉而亡語曰騏驥之衰也駑馬先之孟賁之倦也女子勝之又曰莊辛謂楚王曰鄙諺云見兔而顧犬未為晚也亡羊而補牢未為遲也史記曰鄙諺曰寧為雞口無為牛後又曰李將軍悛悛如鄙人口不能道辭及死知與不知皆為盡哀彼其忠實心誠信於士大夫也諺曰桃李不言下自成蹊此言雖小可以諭大又曰諺曰千金之子不死於市非空言也又曰樗里子滑稽多智號曰智囊秦人諺云力則任鄙智則樗里又曰司馬相如諫武帝故鄙諺曰家累千金者坐不垂堂此言雖小可以喻大漢書曰季布為任俠有名楚人諺曰得黃金百斤不如季布一諾又曰韋賢少子玄成復以明經歷位至丞相故鄒魯諺曰遺子黃金滿嬴不如一經又曰于定國決疑平法罪疑從輕加審慎之心朝廷稱之曰張釋之為廷尉天下無冤人于定國為廷尉人自以不冤又曰王莽篡立後復上符命者莽盡誅之時揚雄校書天祿閣使者欲收雄雄恐乃從閣自投幾死京師為之語曰惟寂惟寞自投于閣爰清爰靜無作符命又曰范增往說項梁曰夫秦滅六國楚最無罪自懷王入秦不反楚人憐之至今故南公稱楚雖三戶亡秦必楚又曰樓護字君卿與谷永俱為五侯上客長安號之曰谷子雲筆札樓君卿唇舌又曰成帝時王吉子駿為京兆尹試以政事先是京兆有趙廣漢張敞王尊王章至駿皆有能名故京師稱曰前有趙張後有三王又曰匡衡好學諸儒為之語曰無說詩匡鼎來匡說詩解人頤又曰少府五鹿充宗貴幸為梁丘易元帝好之欲考其異同令與諸易家論充宗辯口諸儒莫能抗有薦朱雲者召入攝齋登堂抗首而請音動左右故諸儒為之語曰五鹿嶽嶽朱雲折其角又曰文帝從灞陵欲馳下峻阪袁盎攬轡上曰將軍怯耶盎曰臣聞千金子不垂堂百金子不倚衡服虔曰惜身不倚衡也如淳曰衡樓殿邊棚楯又曰杜欽字子夏少好經書家富而目偏盲故不好為吏茂陵杜業與欽同姓字俱以才能稱於京師故衣冠謂欽為盲杜子夏以相別欽惡以疾見詆為小冠高廣材二寸由是京師更謂欽為小冠杜子夏而業為大冠杜子夏又曰劉輔諫成帝立趙后曰里語云腐木不以為柱卑人不可以為主又曰蕭育少與陳咸朱博為友著聞當世往者有王陽貢公故長安語云蕭朱結綬王貢彈冠言其相薦達也育與博後有隙不能終世以友為難又曰成帝為太子及即位以張禹論語為師以上難數對己問經為論語章句獻之諸儒為之語曰欲為論念張文由是學者多從張氏餘家浸微又曰諸葛豐元帝擢為司隸校尉剌舉無所避京師語曰間何闊逢諸葛又曰王吉少時居長安其東家有棗樹臨吉庭中吉婦取以啖之吉知而去婦東家聞而欲伐樹鄰里止之因請吉還婦為之語曰東家有樹王陽婦去東家棗完去婦復還東觀漢記曰陳忠上䟽稱語曰迎新千里送故不出門又曰更始在長安中為之語曰竈下養中郎將爛羊胃騎都尉爛羊頭關內侯又曰楊震少學受歐陽尚書於太常桓郁經明情覽無不窮究諸儒為之語曰關西孔子楊伯起又曰明德馬后時上欲封諸舅外間白太后曰吾自念親屬皆無柱石之功俗語曰時無赭澆黃土又曰黃香字文疆京師號曰天下無雙江夏黃童又曰戴馮為侍中京師語曰說不窮戴侍中續漢書曰皇甫規歸安定鄉人有以貨買鴈門太守者亦還家書剌謁規規臥不迎有頃曰王符在門規驚遽而起屣履出迎時人為之語曰徒見二千石不如一縫掖又曰荀爽字慈明幼而好學躭思經書慶弔不行徵命不應潁川為之語曰荀氏八龍慈明無雙又曰陳蕃字仲舉諫桓帝曰鄙諺言盜不過五女門以貧家也今後宮之女豈不貧國乎又曰楊政字子行少好學京師語曰說經鏗鏗楊子行范曄後漢書曰井丹字太春通五經善談論京師語曰五經紛綸井太春又曰李固遺黃瓊書曰自生人以來平代少而亂俗多必待堯舜之君此為治終無時矣常聞語曰嶢嶢者易缺皦皦者易汙陽春之曲和者必寡謝承後漢書曰宋弘宴見上令主坐屏風後上謂弘曰諺言貴易交富易妻人情乎弘曰臣聞貧賤之知不可忘糟糠之妻不下堂上顧謂主曰事不諧矣又曰許慎字叔重性淳篤少博學經籍馬融常推敬之時人為之語曰五經無雙許叔重又曰馬后履行節儉事從簡約馬廖慮以美業難終上䟽長樂宮以勸成德政長安語曰城中好高髻四方且一尺城中好廣眉四方畫半額城中好大袖四方全疋帛斯言如戲有切事實又曰胡廣字伯始一為司空再作司徒三在太尉京師諺曰萬事不理詣胡伯始袁山松後漢書曰桓帝時京師稱曰李元禮巖巖如玉山陳仲舉軒軒如千里驥又曰桓帝時南陽語曰朱公叔肅肅如松柏下風又曰公沙穆有六子時人號曰公沙六龍天下無雙蜀志曰馬良字季常襄陽宜城人兄弟五人並有才名鄉里為之諺曰馬氏五常白眉㝡良良眉中有白毛故以稱之晉書曰歐陽建字堅石世為冀方碩族雅有理思才藻美贍擅名北州人為之語曰渤海赫赫歐陽堅石又曰王珉字季琰少有才藝善行書名出其兄時人為之語曰法護非不佳僧珍難為兄僧珍珉小字也又曰石苞字仲容渤海南皮人也雅曠有智局容儀偉麗不脩小節故時人為之語曰石仲容姣無雙又曰衛玠瑯邪王澄有高名少所推服每聞玠言輒歎息絕倒故時人為之語曰衛玠談道平子絕倒又曰阮瞻見司徒王戎戎問曰聖人貴名教老莊明自然其旨同異瞻曰將無同戎咨嗟良久即命辟之時人謂之三語掾又曰劉惔字真長沛國相人也祖宏字終嘏光祿勳宏兄粹字純嘏侍中弟潢字沖嘏吏部尚書並有名中朝時人語曰洛中雅雅有三嘏又曰劉與字慶孫俊朗有才局與琨並尚書郎弈之甥名著當時京師為之語曰洛中弈弈慶孫越石又曰裴秀少好學有風操時人語曰後進領袖有裴秀又曰荀闓字道明亦有名稱京都為之語曰洛中英英荀道明又曰羊祜傳曰王衍嘗詣枯陳事辭甚俊辯祜不然之衍拂衣而起祜顧謂賓客曰王夷甫方以盛名處大位然敗俗傷化必此人也步闡之役祜以軍法將斬王戎故戎衍並憾之每言論多毀祜時人為之語曰二王當國羊公無德又曰趙王倫傳云張林等諸黨皆登卿將並列大封其餘同謀者咸超階越次不可勝紀至於奴卒廝役亦加以爵位每朝會貂蟬盈坐時為之諺曰貂不足狗尾續又曰王坦之字文度弱冠與郄超俱有重名時人為之語曰盛德絕倫郄嘉賓江東獨步王文度嘉賓超小字也魏書曰夏侯淵為將赴急疾常出敵不意故軍中語曰典軍校尉夏侯淵三日五百六十千魏略曰韓暨韓宣為大鴻臚稱職語曰大鴻臚小鴻臚前後履行相曷如又曰賈洪字叔業好學有材特精於春秋左傳與馮翊敬危材學最高故眾人為之語曰州中曄曄賈叔業辯論洶洶敬文通又曰成都王穎伐長沙王乂募免奴為軍自稱四部司馬市郭人素謬語奴為尚故里語曰三部司馬階下兵四部司馬尚長明欲知太平須石鼈鳴又曰太祖使盧洪趙達撫軍主剌舉軍中語曰不畏曹公但畏盧洪曹公尚可趙達殺我晉中興書曰禇齊字季野桓彝目之季野皮裏陽秋又曰薛兼紀瞻閔鴻顧榮賀循同志友善號曰五俊又曰中宗渡江王導群從同心翼載時人語曰王與馬共天下又曰杜預在內七年損益不可勝數朝野稱之號曰杜武庫言無所不有宋書曰顏竣字士遜為吏部尚書留心選舉自強不息任遇既隆奏無不可其後謝莊代竣領選意多不行竣容貌嚴毅莊風姿甚美賓客喧訴常懽笑荅之時人為之語曰顏竣瞋而與人官謝莊笑而不與人官又曰高祖壯士丁旿有氣力時人語曰勿跋扈付丁旿又曰王玄謨御下少恩將士為之語曰寧作年徒不逐玄謨齊書曰長沙威王晃代兄映為寧朔將軍淮南宣成二郡太守初沈攸之事起晃便弓馬多從武客燻赫都街時人為之語曰煥煥蕭四繖崔鴻前秦錄曰梁讜字伯言博學有雋才與弟熙俱以文藻清麗見重一時時人為之語曰關東堂堂二申兩房未若二梁瓌文綺章崔鴻前涼錄曰辛攀字懷遠隴西狄道人父奭尚書郎兄鑒曠弟寶迅皆以才識知名秦雄為之語曰五龍一門金友玉昆後魏書曰濟南王元彧與從兄安豐王中山王齊名時人為之語曰三王楚楚盡琳瑯未若濟南備圓方又曰靈太后幸左藏賜諸臣儀同陳留公李崇章武王融並以所負多顛仆於地崇乃傷腰融至損腳時人為人語曰陳留章武傷腰折股貪人敗類穢我明主又曰初廣平人李波為逋逃之藪公私咸患百姓為之語曰李波小妹字雍容褰裙逐馬如卷蓬左射右射必疊雙婦女尚如此男子郍可逢刺史李安世設方略誘波諸子姪三十餘人斬于鄴市又曰祖瑩與陳郡袁飜齊名秀出時人為之語曰京師楚楚袁與祖洛中翩翩祖與袁又曰李謐字永和初師事小學博士孔璠數年之後璠還就謐請業同門生為之語曰青成藍藍謝青師何嘗在明經陳書張種少恬靜居處雅正不妄交遊傍無造請時人為之語曰宋稱敷演梁則卷充清處學尚種有其風隋書崔儦與頓丘李若俱見稱重時人為之語曰京師灼灼崔儦李若齊士歸鄉里仕郡為功曹又曰何妥少聰明時蘭陵蕭春亦雋才住青陽巷妥住白楊頭時人為之語曰世有兩俊白楊何妥青陽蕭春其見美如此
