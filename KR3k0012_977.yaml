body:
  text: 菜茹部一菜詩曰我有旨畜亦以御冬旨美御禦也蓄藂菜以禦冬月乏無時也又曰其蔌音速伊何維筍及蒲蔌菜殽也周禮春官曰入學釋菜合舞八學必釋菜禮先師也菜蘋蘩之屬儀禮婚禮曰舅姑既沒則婦入三月乃奠菜沒終也奠菜者韭祭菜也蓋用薰稱婦之姓曰某氏來婦敢奠嘉菜始為皇舅禮曰仲秋之月命有司趣民收斂務蓄菜始為禦冬之備也左傳曰蘋蘩蘊藻之菜可薦於鬼神可羞於王公爾雅曰菜謂之蔌蔬不熟為饉蔌菜總名見詩凡草菜可食通名為蔬也論語曰雖蔬食菜羹瓜祭必齊如也又曰飯蔬食飲水曲肱而枕之樂亦在其中矣尚書大傳曰煞君之室雖生美菜有義之士弗食後漢書曰劉平與母俱匿野澤中平朝出求食逢餓賊將烹之平叩頭曰今旦為老母求菜母老將平為命願得先歸食音嗣下同母畢還就死因涕泣賊見其至讓而遣之平還既食母訖因白曰屬與賊期義不可欺遂還詣賊衆皆大驚相謂曰常聞烈士乃今見之子去矣吾不忍食子於是得全又曰崔瑗愛士好賓客盛修肴膳殫極滋味不問餘産居常蔬食菜羹而已謝承後漢書曰汝南鍾南嚴海君少時鄉人有入其園竊菜者明日拔菜悉遺鄉里鄉里人相約無復取菜者又曰彭城刀曜字子卿為漁陽相前相所種菜悉付還外魏志曰倭國地溫冬夏食生菜吳書曰趙咨使魏魏人曰聞江東有專音端蹄菜作若為食咨曰當得倉助庾切鰷以作羹王隱晉書曰皇甫諡姑子梁柳為城陽太守或勸諡送之諡曰柳為布衣過吾吾送迎柳不出門食不過鹽菜貧不以酒肉為禮也今而送是貴城陽太守而賤梁鴻季也豈中古人之道哉又曰邵續為石勒所執身灌園鬻菜以供衣食勒屢遣察之歎曰此真高人矣不如是安足貴乎嘉其清苦賜穀帛每臨朝嗟歎以勵群官又曰桓溫性儉每宴唯下七奠拌菜果而已又曰吳隱之母喪哀毀嘗鹹葅以其味旨輟而棄之及為廣州清操踰勵常食不過菜及乾魚而已帷帳器服皆付外庫時人頗謂其矯然亦始終不易宋書曰張敷父在吳興亡成服凡十餘日始進水漿葬畢不進鹽菜遂毀瘠成疾又曰宗愨以軍功封洮陽侯先是鄉人庾業家豪富侈侯服玉食與賓客相對膳必方丈而為愨設粟飯菜葅謂客曰宗軍人慣噉粗食愨致飽而退初無異辭至是為愨長史帶梁郡愨待之甚厚不以昔事為嫌又曰柳元景為三公時在朝勳貴多事産業唯元景獨無所營南岸有數十畝菜得錢三萬還宅元景怒曰我立此園菜以供家啖耳乃復賣以取錢奪百姓之利耶乃以錢乞守園人又曰王玄謨柳元景桓護之雖並北人而玄謨獨受老傖之目凡諸稱為四方書疏亦如之嘗為玄謨作四時詩曰堇茹供春膳粟漿充夏餐匏醬調秋菜白醝解冬寒又曰朱修之姊在鄉里飢寒不立修之貴為刺史未曾供膳往姊為設菜羹粗飯以激之齊書曰晉永嘉五年曲陽縣市黃慶宅左右有園東南廣數丈每種菜輒鮮異雖加採拔更生夜恆有白光似懸絹道士傅德占使人掘之三尺獲玉印文曰長承萬福又曰宜都王鏗生三歲喪母及有識問母所在左右告以早亡便思慕蔬食自悲不識母又曰江泌性仁孝食菜不食心以其有生意唯食老葉而已南史隱逸傳曰沈道虔辟州府凡十二命皆不就有竊園菜者外還見之仍自逃隱待竊者去後乃出梁書曰武帝太官常膳唯以菜蔬圓案所陳不過三盞又武帝詔曰今雖無復牲腥猶有脯修之類即之幽明義為未盡可更詳定悉薦時蔬左丞司馬筠等參議大餅代大脯餘悉用蔬菜帝從之三國典略曰梁蕭棟字吉豫章安王權之子也侯景以法駕迎棟時棟與其妃執鋤種菜忽然見逼駭愕久之後魏書曰甄琛母曹氏有孝性夫氏去家路踰百里每得魚肉菜果珍羹口實者必令僮僕走奉其母乃後食焉又曰高閭曾造胡叟叟短褐曳柴從田歸舍為閭設濁酒蔬食皆手自辦案其館宇卑陋園疇褊局而飯菜精潔醯醬調美見其二妾並年衰跛眇衣布穿弊閭見其貧約以衣服直十餘匹贈之亦無辭愧又曰盧義僖性清儉不營財利雖居顯位每至困乏夌飯蔬食欣然甘之三國典略曰北齊主以鄴清風園賜穆提婆於是官無蔬菜賖買於人負錢三百萬其人訴焉斛律光曰此園賜提婆一家足不賜提婆百官足又曰庫狄士文為貝州刺史性清苦不受公料家無餘財其子嘗噉官廚餅士文枷之繫獄纍日杖之一百步送還京僮僕無敢出門所買菜必於外境凡有出入皆封署其門親故絶迹慶吊不通隋書曰姚察陳亡入隋詔授祕書丞別勑成梁陳二史又勑於朱華門長參文帝察蔬菲別曰召入內殿賜果菜指謂朝臣曰朕聞姚察學行當今無比我平陳只得此一人唐書曰太宗回次易州界司馬陳元璹令百姓種蔬坑上而微火煦之欲其速生以擬供進太宗聞之責其諂媚詔免官又曰太宗時健達獻佛土菜一莖五葉花赤中心正黃而蘂子紫色泥婆羅獻波稜菜葉類紅藍實如蒺藜火熟之能益食味又有酢菜狀似芹而味香渾提蔥其狀猶蔥而甘辛又曰高宗時司農欲以冬藏餘菜賣之百姓以墨勑示僕射蘇良嗣良嗣判曰昔公儀相魯拔去園葵況臨御萬邦而敗蔬鬻菜事遂不行又曰王升為刑部尚書性貪吝不常在公乃鬻公廨菜園收其價錢以自潤甚為時論所醜又曰中書園蔬日給於衆官者主事白常袞減其數崔祐甫怒訶主事曰此相公之命祐甫大詬曰門下侍郎安得理中書之蔬叱左右踣主事而拽之自是與袞常不平又曰貞元七年冬司農卿李模免官初司農當供三官冬菜二千車以度支給車直稍賤又阻雨菜敗模以度支為辭上責其不先聞故免之先是模奏司農菜不足請京兆府市之尹薛玨萬年令韋彤乃禁人私賣上命奪玨俸一月彤俸三月又曰貞元中奚陟為中書舍人以所得雜給均分省內官又躬親庶務下至園蔬皆悉自點閲人以為難而陟處之無倦莊子曰宣尼窮於陳蔡之間顏回擇菜孔藂子曰菜謂之蔬金樓子曰秦始皇聞鬼谷先生言因遣徐福入海求金菜玉蔬説苑曰楚文王伐鄧使王子革王子靈共捃菜二子出見老丈人戴畚乞焉不與搏而奪之王聞之令皆拘二子將煞之大夫辭曰取畚信有罪然煞之非其罪也君若何煞之言卒丈人造軍而言曰鄧為無道故伐之今君公之子搏而奪吾畚無道甚於鄧乎呼天而號群臣見之言曰討有罪而橫奪非所以禁暴也恃力虐老非所以教幼也愛子棄法非所以保國也私二子滅三行非所以從政也丈人舍之矣謝之軍門之外又曰楚莊王賜虞丘子菜田三百號曰國老以孫叔敖為今尹呂氏春秋曰菜之美者壽木之華枯姑之東赤木玄木之葉餘瞀之南有菜名嘉樹其色若碧桓談新論曰董仲舒專精於述古年至六十餘不窺園井菜論行亦云山東六賢傳曰袁下字叔隰陬慮人種菜一園左右竊取度溝瀆下乃為之橋其敦義如此漢武內傳曰西王母云上仙之藥有碧海之狼菜孝子傳曰北平陽公輦水作漿兼以給過者公補履屩不取其直天神化為書生問云何不種菜曰無菜種即與數升公種之化為白璧餘皆為錢公得以娶婦廣州先賢傳曰丁密蒼梧人非家織布不衣非己耕種菜果不食杜蘭香別傳曰香降張碩齎瓦榼酒七樏多菜而無他味亦有世間常菜輒有三種色或丹或紫一物與海蛤相類并有非時菜碩云食之亦不甘然一食七八日不飢荊楚歲時記曰正月七日謂為人日採七種菜以為羹兩京記曰隋大業六年諸夷來朝請入市交易煬帝許之於是修飾邸店皆使薨宇齊正卑高如一環貨充積人物華盛競崇侈麗至賣菜者亦以龍鬚席籍之魏王花木志曰吳郡邊海諸山悉生紫菜崔豹古今注曰葅荊楊州人謂葅為戢杜寶大業拾遺録曰徐孝頴性仁孝嘗在園中晝臥見人盜菜徐徐轉身向裏恐偷者見之仁行退讓皆此類也漢張竦奏曰古叛逆之國瀦其宮室以為汙池名曰凶墟雖生菜蔬而民不食韭詩曰四之日其蚤獻羔祭韭禮曰庶人春薦韭韭曰豐本爾雅曰霍山韭今山中多有孔菜皆如人家所種者説文曰菁韭華韭菜一種久而生也象形在地上北也通俗文曰韭根曰荄古人切山海經曰遏春山雞山韭丹重之山其草多韭穀梁傳曰古者公田為井居竈蔥韭盡取焉漢書曰龔遂為渤海太守民口種一畦韭晉書曰石崇為客作豆粥咄嗟便辦每冬得韭蓱音并齏王愷每以此事為恨乃密貨崇帳下問其所以答云豆至難煮豫作熟有客來作白粥以投之耳韭蓱齏是搗韭根雜以麥苗耳又曰溫嶠滅王敦先是童謠曰剪韭剪韭斷楊柳河東小子令我與子以為賊如韭柳尋得復生也晉書後略曰成都王圍京邑城中無菜採陳韭芥以為善菜齊書曰周顒隱鍾山王儉謂曰卿在山中何所食答曰赤米白鹽緑葵紫蓼又問何者最佳曰春初旱韭秋暮晚菘又曰庾呆之字景行為世祖征虜功曹清貧食唯韭葅瀹韭雜菜或戲之曰誰言庾郎貧食鮭嘗有二十七種韭言三九也三國世略曰北齊太上後宮無限衣皆珠玉一女歲費萬金寒月盡食韭牙莊子曰徐無鬼見武侯武侯曰先生居山食芋壓蔥韭今老病欲酒肉之味耶無鬼曰君為萬乘之主苦國以義耳目君病矣何勞吾乎列子曰老韭為莧老羭為猿魯連子曰市處者僕妾膾炙而食市饒也壅泉沃韭織屨之士從兄弟室父往而不得粗糒音備焉非愛其僕妾惡其室父也此其饒羡之與不足也説苑曰衛有一夫負缶入井灌韭終日一區鄧晢過教之曰有機重後輕前命曰桔槔終日訖九百區丈夫曰有機智必有機心我非不知不欲為也正論曰小民髮如韭剪復生頭如雞割復鳴吏不必可畏從來必可輕奈何欲望致州厝乎漢武內傳西王母曰仙次藥有八阮赤韭繆襲祭儀曰春祀和羹芼以韭水經曰交州平樂山多龍穴傍生野韭人往乞者神許則風吹制分隨偃而拔不得過越不偃而拔輒凶也楊衒知洛陽茄藍記曰李崇為尚書令儀同三司富傾天下僮僕千人而性多儉吝惡衣粗食食常無肉止有韭茹韭葅崇家客李元祐語人云李令公一食十八種人問其故元祐曰二九十八聞者大笑世以此為譏諸葛亮教張君嗣曰去婦不顧門萎韭不入園以婦人之性草菜之精猶有所恥想忠壯者意何所之
