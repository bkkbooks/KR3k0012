body:
  text: 工藝部四書上釋名曰書庶也紀庶物也亦言著也著之簡編永不滅也說文曰依類象形之謂文形聲相益之謂字著於竹帛之謂書廣雅曰書如紀也易曰上古結繩以治後世聖人易之以書契百官以治萬民以察蓋取諸夬夬決也書契所以決斷萬事也家語曰宓子賤字不齊仕魯為單父令恐君聽用讒人使己不得行其政故請君近吏二人與俱至官令二吏書輒掣其手書不善則從而怒之吏患焉辭歸魯子賤曰子書甚不善子勉而歸報於君曰宓子使臣書而掣搖臣肘書惡而又怒臣邑吏皆笑之所以去之而來也君以問孔子孔子曰不齊君子也其材任霸王之佐屈節治單父以自試意者其以此諫乎公寤太息歎曰寡人亂宓子之政而責其善數矣漢書曰陳遵長八尺餘長頭大鼻容貌甚偉略涉傳記贍於文辭性善書與人尺牘主皆藏去以為榮又曰宣帝時中郎將張彭祖少與帝微時同席研書及帝即尊位彭祖以舊恩封陽都侯又曰田蚡學盤盂諸書孔甲二十六篇雜家書後漢書曰孫敬字文寶少時畫地學書日進焉東觀漢記曰樂成靜王黨善吏書喜正文字也魏志曰胡昭善尺牘動見模楷衛覬好古文鳥篆隸草無所不善也晉書曰王羲之嘗詣門生家見棐几滑淨因書之真草相半後為其父刮去之門生驚懊者纍日又曰王羲之山陰有道士好養鵝羲之觀焉意甚悅固求市之道士云為寫道德經當舉群相贈耳羲之欣然寫畢籠鵝而歸又曰羲之每自稱我書比鍾繇當抗行比張芝猶當鴈行也曾與人書云張芝臨池學書池水盡黑使其人耽之若是未必後之也又曰羲之嘗在蕺音戢山老姥持六角竹扇賣之羲之因書其扇各為五字姥初有慍色乃謂姥曰但言是王右軍書以求百錢姥如其言人競買之他日姥又持扇來義之笑而不答又曰王獻之七八歲時學書父羲之從後掣其筆不得歎曰此兒後當復有大名常書壁為方丈字羲之甚以為能觀者數百人又曰謝安嘗問獻之君書何如君家尊答曰故當不同安曰外論不爾答曰人郍得知又曰衛常字巨山轉黃門郎常善草隸書為四體書勢曰昔在黃帝創制造物有沮側魚切誦蒼頡者始作書契以代結繩蓋覩鳥跡以興思也因而遂滋則為之字有六義焉一曰指事上下是也二曰象形日月是也三曰形聲江河是也四曰會意武信是也五曰轉注老考是也六曰假借令長是也又曰索靖作書狀其辭曰聖皇御世隨時之宜蒼頡既生書契是為科斗鳥篆類物象形睿哲變通意巧滋生損之隸草以崇簡易百官畢修事業正厲草書之為狀也婉若銀鉤漂若驚鸞舒翼未發若舉復安蟲蛇虬蟉力幽切或往或還頽阿郍以羸羸欻奮釁而桓桓及其逸遊盻乍正乍邪騏驥暴怒逼其轡海水窳隆揚其波芝草蒲萄還相結棠棣融融反其華玄熊對踞于山嶽飛燕相追而差池舉而察之又似乎和風吹林偃草扇樹枝條順氣轉相比附窈嬈奴鳥切廉苫隨體散布紛擾擾以綺靡中持疑而猶豫玄螭狡獸嬉其間騰猿飛鯢相奔趣凌魚奮尾蛟龍反據投空自竄張設互距或若登高望其類或若既往而中顧或若倜儻而不群或若自檢於常度於是多才之英篤藝之彥役心精微耽此文憲守道兼權觸類生變離拆八體靡形不判去繁存微本象末亂上理開元下周謹按騁辭放手兩行冰散高音翰厲溢越流漫忽班班而成章言奇妙之煥爛體磊落而壯麗姿光潤以璀璨命杜度運其指使伯英回其腕著絶勢於紈素垂百世之殊觀宋書劉穆之傳高祖書素拙穆之曰此雖小事然宣被四遠願公少復留意高祖既不能措意又稟分有在穆之乃曰公但縱筆為大字一字徑尺既足有所苞且其名亦美高祖從之一紙不過六十字便滿齊書曰太祖善書及登位篤好不已與王僧虔賭書畢謂虔曰誰為第一僧虔對曰臣書臣中第一陛下書帝中第一上笑曰卿可謂善自為謀矣宋書曰謝超宗謂王慈曰卿書可及虔公慈曰我之不及父猶雞之不及鳳也時人以為名答宋書曰江夏王鋒字宣頴高帝第十三子也四歲好學書畜於母張氏舍張氏無紙乃倚井欄為書滿則洗之己而復書如此纍月又每晨不肯去窗塵而就塵書帝嘗使學鳳尾詔一學即工帝大悅以玉麒麟賜之曰以麒麟賞鳳尾矣梁書曰武帝論蕭子雲書曰筆力徑駿心手相應巧踰杜度美過崔實當與元常鍾繇也並驅爭先其梁蕭子雲出為東陽太守百濟國使人至建業求書逢子雲維舟將發使人於渚次候之望船三十許步前行子雲遣問之答曰侍中尺牘之美遠流海外今日所求唯在名跡子雲乃為停船三日書三十紙與之獲金貨數百萬性吝自非答餉不書好事者重加賂遺以要其答又曰顏協博涉群書工於草隸飛白時吳人范懷約能隸書協學其書殆過真也荊楚碑碣皆協所書時人有會稽謝善勳能為八體六丈方寸千言京兆韋仲善飛白並在湘東王府善勛為録事參軍仲為中兵參軍府中以協優於韋仲而減於善勛善勛飲酒至數升醉後輒張眼大罵雖復貴賤親踈無所擇也時謂之謝方眼而胸襟夷坦有士君子之操焉後魏書曰崔潛為兄渾誄手筆草本會昌初著作佐郎王遵業買書於市而遇得之計誄至今將二百載寶其書跡深祕藏之武定中遵業子松年以遺黃門郎崔季舒人多摹榻之又曰崔玄伯尤善草隸行狎之書為世模楷玄伯祖悅與范陽盧諶並以博藝著名諶法鍾繇悅法衛瓘而俱習索靖諶傳子偃偃傳子邈悅傳子潛潛傳玄伯故魏初重崔盧之書唐書曰太宗嘗謂侍中魏徵曰虞世南死後無人可與論書徵曰禇遂良下筆遒徑甚得王逸少體太宗即日召令侍讀嘗以金帛購求王羲之書跡天下爭齎古書詣闕以獻當時莫能辨其真僞遂良備論所出一無所誤又曰虞世南字伯施同郡沙門釋智永智永羲之裔孫善學王羲之書世南師焉妙得其體由是聲名藉甚又曰柳公權字誠懸幼嗜學十二能為詞賦元和初進士擢第釋禢祕書省校書郎李聽鎮夏州辟為掌書記穆宗即位入奏事帝召見謂公權曰我於佛寺見卿筆蹟思之久矣即日拜右拾遺充翰林侍書學士遷右補闕司封員外郎穆宗政僻嘗問公權筆何盡善對曰用筆在心心正則筆正上改容知其筆諫也公權初學王書遍閲近代筆法體勢徑媚自成一家當時公卿大臣家碑板不得公權手筆者人以為不孝外夷入貢皆別署貨貝曰此購柳書上都西明寺金剛經碑備有鍾王歐虞禇陸之體尤為得意文宗夏日與學士聯句帝曰人皆苦炎熱我愛夏曰長公權續曰薰風自南來殿閣生微涼時丁袁五學士皆屬繼帝獨諷公權兩句曰詞清意足不可多得乃令公權題於殿壁字方圓五寸帝視之歎曰鍾王復生無以加焉又曰柳公權大中初轉少師中謝宣宗召升殿御前書三紙軍容使西門季玄捧硯樞密使崔巨源過筆一紙真書十宇曰衛夫人傳筆法於王右軍一紙行書十一字曰永禪師真草千字文得家法一紙草書八字曰謂語助者焉哉乎也賜錦綵瓶盤等銀器仍令自書謝狀勿拘真行帝尤奇惜之又曰歐陽詢潭州臨湘人也初學王羲之書後更漸變其體筆力險徑為一時之絶時人得其尺牘文字咸以為楷範焉高麗甚重其書嘗遣使求之高祖歎曰不意詢之書名遠播夷狄彼觀其跡固謂其形貌魁梧耶詢形體么麼故高祖有是言耳又曰歐陽通詢之子也早孤母徐氏教其父書每遺通錢紿云質汝父書跡之直通慕名甚悅晝夜精力無倦遂亞於詢唐書曰龍朔二年四月上自為書與遼東諸將謂許敬宗曰許圉師常自愛朕書可於朝堂開示圉師見驚喜私謂朝官曰圉師見古跡多矣魏晉已後唯稱二王然逸少少力而研子敬研而少力今觀聖跡兼絶二王鳳翥鸞回實古今書聖又曰太宗嘗於晉史右軍傳後論之曰鍾書布纖濃分疏密霞舒雲卷無所間然但其體古而不今字長而逾制獻之雖有父風殊非新巧疏瘦如陵冬之枯樹槎柵枿而無屈伸拘束若嚴家餓隸羈羸而不放縱蕭子雲無丈夫之氣行行如縈春蚓字字若綰秋蛇臥王濛於紙中坐徐偃於筆下以茲播美豈非濫名耶所以詳察古今研精篆素盡善盡美其唯王逸少乎又曰孔若思早孤母禇氏親自教訓遂以學行知名年少時有人齎禇遂良書跡數卷以遺若思唯受其一卷其人曰此書當今所重價比黃金何不揔取之若思曰若價比金寶此為多更截去半以還之矣又曰盧知猷器度長厚文詞美麗尤工書一落簡翰人爭摸倣又曰鍾紹京虔州贛人也初為司農録事以工書直鳳閣則天時明堂門額九鼎之銘及諸宮殿門榜皆紹京所題又曰王涯既誅涯家書數萬卷侔於書府前代法書名畫人所保惜者必以厚貨致之不受貨者必以官爵致之厚為垣竅而藏之覆壁至是人破其垣取之或剔取函奩金寶之飾與其玉軸而棄之蔡琰別傳曰琰對曹操曰乞給紙筆真草唯命也邴原別傳曰原年五六歲過書舍而泣師曰何泣原曰孤子易傷感夫書者皆有父母也今顧其書故惻然涕零也師哀原言而為之泣曰欲書不復費也遂就書江偉家傳曰偉性善書人得其手疏莫不藏之以為寶神仙傳曰東郭延服靈飛散能夜書言目明又曰王遠字方平東海人也博學尢明天文纖緯河洛之要逆知天下盛衰之期漢桓帝聞之連徵不出使郡國逼載詣京師低頭閉口不肯答乃題官門扇四百餘字皆說方來帝甚恐之使刮去外字復見墨皆徹入版裏石虎鄴中記曰石虎有馬妓著朱衣進賢冠立於馬上馬走而作書字皆端正永嘉郡記曰昔王右軍遊永嘉經於惡道右軍書南邊大石今猶見墨跡而字不甚了了抱朴子曰英葱實天雄鶴腦服之令人夜書孫卿子曰作書者衆而蒼頡獨傳用心一也淮南子曰昔蒼頡作書而天雨粟鬼夜哭高誘曰有書契作詐僞萌生去本趣末棄耕墾之業而務錐刀之利天知其將餓故為雨粟也鬼恐為文所劾故哭也鬼或作兔兔恐有取毫為筆害及之故哭又曰明月之光可以遠望而不可以細書也慎子曰書契所以識公信也隋巢子曰史皇産而能書三輔決録曰韋誕字仲將除武都太守以書不得之郡轉侍中典作魏書號散騎書一名大魏書凡五十篇洛陽鄴許三都宮觀始就命誕銘題以為永制以御筆墨皆不任用因奏曰夫工欲善其事必先利其器用張芝筆左伯紙及臣墨兼此三具又得臣手然後可以逞徑丈之勢方寸千言俗說曰桓玄取羊欣為征西行軍參軍玄愛書呼欣就坐仍遣信呼顧長康與共論書至夜良久乃罷世論曰鍾會有異志密白鄧艾有反狀又會善效人書於劍閣要艾章表皆易其言令倨傲多有矜伐以疑之論衡曰夫河出圖雒與洛同出書聖帝明王之瑞應也蒼頡作文字筆與天地同指與鬼神合何惡而致雨粟鬼哭之怪哉又曰書官諱丙日雲蒼頡以丙日死也世說曰韋仲將善書魏明帝起殿安榜使仲將登梯題之既下頭髮皓然因是勑誡兒孫勿復學書王升之懷舊序曰余與從甥孫道濟交好特至昔寓荊州同處一室冬多間暇長共學書余收而録之欲以為索居之愛道濟因記紙末曰舅還山之曰覽此相存間書見其手跡皎若平日悽悵傷心
