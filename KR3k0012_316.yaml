body:
  text: 兵部四十六水戰國語吳語曰越王軍于江南明日將舟戰於江晉書慕容超載記曰水戰國之所短吳之所長又曰陳敏作亂陶侃時鎮江夏以朱伺能水戰曉作舟艦乃遣作大艦署為右甄據江口摧破敏前鋒又曰何無忌傳曰盧循遣別將徐道覆順流而下舟艦皆重樓無忌將率衆拒之長史鄧潛之諫曰今以神武之師抗彼逆衆回山壓卵未足為譬然國家之計在此一舉聞其舟艦大盛勢居上流蜂蠆之毒邾魯成鑒宜決破南塘守二城以待之其必不敢捨我遠下蓄力俟其疲老然後擊之若棄萬全之長策而決成敗於一戰如其失利悔無及矣無忌不從遂以舟師拒之既及賊令強弩數百登西岸小山以邀射之而薄于山側俄而西風大起無忌所乘小艦被飄于東岸賊乘風以大艦逼之衆遂奔敗無忌尚厲聲曰取我蘇武節來節至乃躬執以督戰賊衆雲集登艦者數十人無忌辭色無撓遂握節死之梁書曰王琳帥兵東下陳遣太尉侯瑱司空侯安都等拒之瑱等以琳軍方盛引軍入蕪湖避之時西南風至急琳謂得天道將直取楊州侯瑱等徐出蕪湖躡其後比及兵交西南風翻為瑱用琳兵放火燧以擲瑱船者皆反燒其船琳艦潰亂兵士透水死士二三其餘皆棄船上岸為陳軍所殺殆盡隋書曰楊素伐陳率水軍東下舟艫被江旌甲曜日素坐平乘大船容貌雄偉陳人望之懼曰清河公即江神也陳南康內史呂仲肅屯歧亭正據江峽於北岸鑿巖綴鐵鎖三條橫絶上流以遏戰船素令登陵先攻其柵仲肅軍夜潰素徐去其鎖又李安傳曰伐陳之役蜀兵順流東下時陳人屯白沙安謂諸將曰水戰非北人所長今陳人依險泊船以夜襲屯賊可破也越絶書曰伍子胥水戰法大翼一艘廣丈六尺長十二丈容戰士二十六人櫂五十人舳艫三人操長鉤矛斧者四吏僕長各一人凡九十一人當用長鉤矛長斧各四弩各三十二矢三千三百甲兜鍪各三十二莊子曰宋人有善為不龜手之藥者世世以洴澼絖為事不過數金一朝而鬻伎百金請與之客得之以說吳王越有難吳王使之將冬與越人水戰大敗越人裂地而封能不龜手一也阮元瑜為曹公與孫權書曰若恃水戰臨江塞要欲令王師終不得渡亦未必也孫子荊為石仲恭與孫皓書曰自頃國家整治器械修造舟楫簡習水戰掩襲上白虎通曰襲者何謂行不假塗掩人不備也人銜枚馬纏勒晝伏夜行為襲也左傳曰凡師有鐘鼓曰伐無曰侵輕曰襲又曰初周人與范氏田公孫厖稅焉趙氏得而獻之吏請殺之趙孟曰為其主也何罪止而與之田及鐵之戰以徒五百人霄攻鄭師取蜂旗於子姚之幕下又曰齊侯還自晉不入遂襲莒門于且于莒子傷股而退明日將復戰期于壽舒又曰秦伯使大夫杞子戍鄭使告于秦曰鄭人使我掌其北門之管管鑰若潛師以來國可得也穆公訪諸蹇叔蹇叔曰勞師以襲遠非所聞也蹇叔秦大夫師勞力竭遠主備之無乃不可乎且師行千里其誰不知公辭焉辭不受其言召孟明西乞白乙使出師于東門之外蹇叔哭之曰孟子吾見師之出而不見其入也晉人禦師必於殽殽有二陵焉大阜曰陵其南陵夏后皋之墓皋夏桀之祖也其北陵文王之所避風雨此道在二殺之間南谷中各深委曲兩山相嶔故可以避風雨古道由此魏武帝西討巴漢惡其險而更開北山高道也必死是間余收爾骨焉秦師遂東晉原軫曰秦違蹇叔而以貪勤人天奉我也奉與奉不可失敵不可縱縱敵患生違天不祥必伐秦師欒枝曰未報秦施而伐其師其為死君乎先軫曰秦不哀吾喪而伐吾同姓秦則無禮何施之有吾聞之一日縱敵數代之患謀及子孫可謂死君乎言不可謂背君遂發命遽興姜戎子墨縗絰晉文未葬故襄公稱子子以凶服從戎故墨之也遂敗秦師于殽獲百里孟明視西乞術白乙丙以歸家語曰吳晉遂遇於黃池越王襲吳之國吳王歸與越戰滅焉戰國策曰蘇秦謂楚威王曰王興師襲秦此所謂兩虎相據也後漢書曰漁陽太守彭寵反自將二萬餘人攻幽州刺史朱浮於筋光武使將軍鄧隆救筋隆軍潞南浮軍雍奴遣吏奏狀帝讀檄怒謂使曰營相去百里其勢豈得相及比若若汝也還北軍必敗矣寵果盛軍臨河以拒隆又別發輕騎三千襲其後大破隆軍朱浮遠遂不能救引而去又曰蘇茂周建與馬武合戰良久王霸軍中壯士路潤等數十人斷髮請戰霸知士心鋭乃開營後出精騎襲其背茂建前後受敵驚亂走散又曰鄧訓發湟中六千人令長史任尚將之縫革為船置於簞上以渡河簞本殘也音步佳反掩擊迷唐廬落大豪多所斬獲又曰馬援討諸羌引精兵聚北山上援陳軍向山而分遣數百騎繞襲其後乘夜放火擊鼓叫譟虜遂大潰凡斬首千餘級援以兵少不得窮追收其穀糧畜産而還又曹瞞傳曰公聞許攸來跣出迎攸勸公襲紹將公大喜乃選精鋭步騎皆執袁軍旗幟銜枚縛馬口夜從間道出人把束薪所歷道問者語之曰袁公恐曹操鈔掠後軍還兵以益備問者信以為然既至圍屯大放火營中驚亂大破之盡燔其糧穀寶貨斬督將睢元晉等割得諸軍淳于仲簡鼻殺士卒千餘人皆取鼻牛馬割脣舌以示紹軍將士皆惶懼又曰曹公征張魯至陽平張魯使弟衛據陽平關橫山築城十餘里攻之不拔乃引軍還賊見大軍退其守備懈公乃密遣騎將等乘險夜襲大破之又曰廬江太守劉勳理明城今同安郡恃兵強士勇橫於江淮之間無出其右者孫策惡之時已有江左自領會稽太守使人卑辭厚幣而說之曰海昏上繚宗人數欺下國患之有年矣擊之路由不便幸因將軍之神武而臨之且上繚國富廩實吳姓越姬充於後庭明珠大貝被於帑藏帑他朗切取之可以資軍雖蜀郡成都金碧之府未能過也策願舉弊邑士卒以為外援勳然之劉曄諫曰上繚雖小而城堅池深守之則易攻之則難不可旬月而拔也且見疲於外而國虛於內孫策多謀而善用兵乘虛襲我將何禦之而將軍進屈於敵退無所歸羝羊觸藩羸其角不能退不能進其在茲乎勳不從遂大興師伐上繚其廬江果為策所襲勳窮蹙遂奔曹公魏志曰遣將鐘會鄧艾伐蜀蜀將姜維守劍閣鐘會攻維未能拔艾上言請從陰平江由邪徑經漢德陽亭趣涪出劍閣西四百里去成都三百里奇兵衝其腹心劍閣之守必還赴涪則會方軌而進劍閣之士不還則應涪之兵寡矣軍志有之曰攻其不備出其不意今掩其空虛破之必矣冬十月艾自陰平行無人之地七百餘里鑿山通道造作橋閣山高谷深至為艱嶮又糧運將匱頻於危殆艾以氈自裹推轉而下將士皆攀木緣崖魚貫而進先登至江油蜀守將馬邈降諸葛瞻自涪還綿竹列陳相拒大破之斬贍及尚書張遵等首進軍至成都蜀主劉禪面縛輿襯櫬詣軍門降又曰楊阜字義山天水蓽人也韋康以為別駕馬超率萬餘人攻冀城阜率國士大夫及宗族子弟勝兵千餘人使弟嶽於城上作偃月營與超接戰自正月至八月拒守而救兵不至超入拘嶽於冀殺刺史太守阜內有報超之志而未得其便外兄姜敘屯歷城阜少長敘家見敘母說前在冀中時事歔欷悲甚敘曰何乃爾阜曰守臣不能見君亡不能死亦何面目以視息天下乎時敘母慨然勑從阜計超聞阜等兵起自將出襲歷城得敘母罵之曰若背父之逆子弒君桀賊天地豈久容敢以面目視人乎超怒殺之阜與戰身被五瘡宗族昆季死者七人吳志曰蜀將關羽遣麋芳守南郡羽領兵圍樊吳主遣將呂蒙屯陸口外倍修恩厚與關羽結好羽多留兵備南郡恐蒙有變蒙上疏曰羽計樊而多留備兵必恐蒙圖其後故也蒙常有病乞分衆還建業以理病為名羽聞之必徹備徐以大軍泝江馳上襲其空虛則南郡可不戰而羽易擒耳吳主然之蒙遂稱病而還建業羽果稍徹備而悉衆赴樊城蒙遂發兵逆流而上伏甲於舟使更衣為啇人以理征棹達𥌓兼行過羽所置屯戍輒縛之羽遂失驚師次于南郡襲奪其城羽吏士攻樊城未下聞城以陷而家屬無恙見待甚於平時無復鬥心稍稍散羽竟為吳師所擒荊州遂平又曰建安二十四年關羽圍曹仁於襄陽曹公遣左將軍于禁救之會漢水暴起羽以舟兵盡生虜禁等步騎三萬送江陵唯城未拔權內憚羽外欲以為己功淺與曹公乞討羽自效權征羽先遣呂蒙襲公安獲將軍士仁蒙到南郡太守糜芳以城降蒙據江陵撫其老弱釋于禁之囚晉書曰王如京兆人也初為州武吏遇亂流移至宛時諸流人有詔並遣還鄉如等以關中荒殘不願歸征南將軍山簡南中郎將杜蕤各遣兵送之而促期令發如遂潛結無賴少年夜襲二軍大破之又陷攻襄城於是流人諸郡各率其黨攻諸城鎮多殺令長以應之未幾衆四五萬號大將軍後如連年種穀皆化為莠軍中大飢又曰石勒遣其將石良率精兵五千襲李矩矩逆擊不利郭誦弟元復為賊所執遣元以書說矩曰去東平曹嶷西平猗廬矩如牛角何不歸命矩以示誦誦曰昔王陵父母在賊猶不改意弟當何論勒復遺誦塵尾馬鞭以示殷勤誦不答又曰張駿為涼州牧咸和初駿遣武威太守竇濤金城太守張閬武興太守辛巖揚烈將軍宋輯等率衆來會韓璞攻討秦州諸郡劉曜遣其將劉胤來拒屯于狄道城韓璞進渡沃于嶺辛巖曰我握衆數萬籍氐羌之鋭宜速戰以滅之不可以久久則變生璞曰自夏末以來太白犯月辰逆行白虹貫日皆變之大者不可以輕動輕動而不捷為禍更深吾將久而斃之且躍與石勒相攻胤亦不能久也積十七日軍糧竭遣辛巖督於金城胤聞之大悅謂其將士曰韓璞之衆十倍於吾羌胡皆叛不為之用吾糧廩將懸難以持久今虜分兵運糧可謂天授吾也若敗辛巖璞等自潰彼衆我寡宜以死戰戰而不捷當無匹馬得還宜厲爾戈矛竭汝智力衆咸奮於是率騎二千襲巖于沃于嶺敗之璞軍遂潰死者二萬餘人面縛歸罪駿曰孤之罪也將軍何辱皆赦之王隱晉書曰祖逖軍大飢進據食犬丘城樊雅遣六十餘人入逖營拔戟大呼向逖逖軍人夜不知何賊多少皆欲散走逖疑非多人但摧左右拒之會督護董贍入共討賊賊散故道出
