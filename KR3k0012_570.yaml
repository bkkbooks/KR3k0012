body:
  text: 樂部七優倡春秋元命包曰翼星主南宮之羽儀文物聲明之所豐茂為樂庫為天倡先王以賓于四門而列天庭之衛主俳倡近太微而為尊家語曰魯定公與齊侯會於夾谷孔子攝相事齊奏宮中之樂優倡侏儒戲于前孔子趍進曰匹夫而熒侮諸侯有罪應誅於是斬侏儒手足異處齊侯懼有慚色史記曰優旃者秦侏儒也善為笑言然合於道秦始皇時置酒而天雨陛楯者沾寒優旃見而哀之謂之曰汝欲休乎陛楯者曰幸甚優旃曰我即呼汝汝疾應曰諾居殿上上壽呼萬歲旃大呼曰陛楯郎郎曰諾優旃曰汝雖長何益故雨中立我雖短也故休居於是乎使得半相代史記曰秦昭王臨朝嘆息應侯進曰臣聞主憂臣辱主辱臣死今王中朝而憂臣敢請其罪王曰吾聞楚之鐵劍利而倡優拙夫鐵劍利則士勇倡優拙則思慮遠夫以遠思慮而御勇士恐楚國之圖秦也漢書曰枚皋善為賦不如相如又言為賦多怪誕虛無不經有類倡者也又曰孝惠帝葬安陵徙閞東倡優樂人五千戶以為陵邑潘安仁閞中記曰善為啁戲故語稱安陵啁也又曰張禹成就弟子為人恭儉尤著淮陽彭宣至大司空沛郡戴崇至少府宣為人恭儉有法度而崇愷悌多智二人異行禹嘗置酒設樂與弟子娛禹將崇入後堂飲食婦人相對作優管絃鏗鎗極樂昏夜乃罷而宣之來禹見之於便坐講論經義日晏賜食不過一肉巵酒相對宣未嘗得至後堂晉成帝咸康七年散騎常侍郎顧臻表曰宋代之樂設禮外之觀逆行連倒四海朝覲言觀帝庭而足以蹈天道以履地紀反天地之順傷彝倫之大乃命太常悉罷之其後復高絙紫鹿又有天台山伎齊武帝遣主書董仲民按孫興公賦造作莓苔石石橋道士捫翠屏之狀尋省焉後魏書太武既平河西得西涼樂至魏周之際遂謂之國伎魏代至隋咸重之其曲項琵琶豎箜篌之徒並出自西域非華夏舊器楊澤新聲神白馬之類生於故歌非漢魏遺曲故其樂聲調悉與書史不同其歌曲有永代國諱改焉樂解曲有萬代豐曲有于置佛曲工人平上幘緋褶白舞一人方舞四人白舞令闕方舞四人假髫玉支叉紫絲布褶白大口袴五彩接袖烏皮鞾後魏道武帝天興六年冬詔太樂揔章鼓吹增修雜戲造五兵角抵麒麟鳳凰仙人長蛇白象武及諸畏獸魚龍辟邪鹿馬仙車高絙百尺長趫幢跳丸以備百戲大饗設之於殿前明元帝初又增修之撰合大曲更為鍾鼓之節北齊神武平中山有魚龍爛熳俳優侏儒山車巨象拔井種瓜殺馬剝驢等奇怪異端百有餘物名為百戲隋書曰文帝開皇初周齊百戲並放遣之煬帝大業二年突厥染干來朝帝欲誇之揔追四方散樂大集東都初於華林苑積翠池側帝惟宮女觀之有含利繩柱等如漢故事又為夏育扛鼎取車輪石臼大盆器等各於掌上而跳弄之并二人戴竿其上舞忽然騰之而換易千變萬化曠古莫儔染于大駭之自是皆於太常教習每歲正月萬國來朝留至十五日於端門外建國門內綿亙八里列為戲場百官起棚夾路從昏達曙以縱觀之至晦而罷伎人皆衣錦繡繒綵其歌者多為婦人服鳴環珮飾以花髦者殆三萬人初課京兆河南製此服而西京繒錦為之中虛六年諸夷大獻方物突厥啓人以下皆國主親來朝乃賀於天津街盛陳百戲自海內凡有伎藝無不揔萃崇侈器玩盛飾衣服皆用珠翠金銀錦罽絺繡其營費巨萬閞西以安德王雄揔之東都以齊王暕揔之金石匏革之聲聞數十里外彈弦㩎管以上萬八千人大列炬火光燭天地百戲之盛振古無比自是每年以為常焉大抵散樂雜戲多幻術皆出西域始以善幻人至中國漢安帝時天笁獻伎能自斷手足刳剔腸胃自是歷代有之趙書曰石勒參軍周延為館陶令斷官絹數百匹下獄以八議宥之後每大會使俳優著介幘黃絹單衣優問汝為何官在我輩中曰我本為館陶令斗數單衣曰政坐取是故入汝輩中以為笑列女傳曰夏桀既棄禮義淫於婦人求四方美人積之後宮於俳優侏儒而為奇偉戲者取之於房造爛熳之樂漢官典職曰正旦天子幸德陽殿作九賓樂舍利從東來戲於庭畢入殿門激水化成比目魚跳躍漱水作霧鄣日畢化成黃龍高丈八出水遨戲於庭炫耀日光以二丈絲繫兩柱中頭間相去數丈兩倡女對舞行於繩上又蹐局屈身藏形斗中鍾聲並唱樂畢作魚龍蔓延黃門鼓吹三通賈誼連語曰衛侯喜鶴鶴有飾以文繡而乘軒者賦斂繁多不顧其民貴優而輕大臣群臣或諫則面而叱之及翟伐衛寇挾域堞矣衛君泣而拜其臣民曰寇迫矣士民其逸之士民曰亦使君之貴優將君之愛鶴以君守戰矣我儕棄人也安能戰乃潰門而出走翟入衛君奔死遂喪其國梁元帝纂要曰古艷曲有北里靡靡激楚結風陽阿之曲又有百戲起於秦漢有魚龍蔓延假作獸以戲高絙鳳皇安息王案並石季龍所作見鄴中記都盧尋橦今之緣竿見西京賦九劍九一名鈴見西京賦戲車山車興雲動雷見李尤平樂觀賦跟挂腹旋並緣竿所作見傅玄西都賦吞刀見西京賦吐火見西京賦激水轉石漱霧杠鼎並見李尤長樂觀及傅玄西都賦象人見漢書韋昭曰今之假面怪獸含利之戲並見西京賦列子曰宋有孫子者以妓干宋元君以雙枝長倍其身屬其腫並趣並馳弄七劍迭而躍之五劍常在空中元君大驚立賜金帛又有蘭子能燕戲者復以干元君元君大怒曰昔以異伎干寡人伎無用遇寡人歡心彼必聞此而進乃拘而戮之燕戲若絶倒投也石虎鄴中記曰虎正會殿前作樂高絙龍魚鳳凰安息五案之屬莫不畢備有額上緣橦至上鳥飛左面右轉又以橦著口齒上亦如之誤馬車立木橦其車上長二丈橦頭安橦木兩伎兒各坐木一頭或鳥飛或倒掛又衣伎兒作獼候之形走馬上或在脅或在馬頭或在馬尾馬走如故名為猿騎樂府雜録曰弄參軍始因後漢館陶令石耽有贓犯和帝惜其才免罪每宴樂即令衣白夾衫命優伶戲弄辱之經年乃放後為參軍誤也開元中有李仙鶴善此戲明皇特授韶州同正參軍以食其祿是以陸鴻漸撰詞云韶州蓋由此大周正樂曰漢武帝通西域始以善幻人至中國安帝時天笁獻伎能自斷手足刳腹胃自是歷世有之唐高宗惡其驚俗勑西域開津不令入中國唐書樂志曰睿宗時婆羅門樂人倒行而足舞極銛刀鋒植於地低因就刃以歷臉中又植於背下吹篳篥立其腹上終曲而無傷又伏伸其手足躡之旋身繞手百轉無已漢世有橦末伎又有盤舞晉世如之以柸盤舞詩云妍妯凌七盤言舞用盤七枚也梁謂之盤舞伎梁又有長蹻伎跳鈴伎擲倒跳劍伎吞劍伎今並存又有舞輪伎蓋今之戲車輪者透三峽伎蓋今之透飛梯之類高絙伎蓋今之戲繩者是也梁有獼猴幢戲今有緣竿伎又獼猴緣竽未審何者為是今又有弄碗珠伎弄丹珠伎歌舞戲有大面撥頭踏搖娘窟儡子等戲置教坊於禁中以處之又曰散樂非部伍之聲俳優歌舞雜奏漢天子臨軒設樂舍利獸從西方來戲於殿前激水成比自魚跳躍漱水作霧翳日此成黃龍修丈八出水遊戲輝熠曰光繩繫兩柱相去數丈二倡女對舞繩上切肩而不傾如是雜變揔名百戲江東猶有高絙紫鹿跂行鱉食齊王卷衣笮鼠夏育杠鼎臣象行乳神龜抃足背負靈嶽柱樹曰雪畫地成川之伎明皇雜録曰上御勤政樓大張聲樂羅列百伎時教坊有王大娘善戰百尺竿竿上施木山狀瀛洲方丈仍令小兒持鋒節出入其間而舞不輟時劉晏為祕書省正字年方小形狀獰劣而惠悟過人上召於樓上簾下貴妃置於膝為施粉黛與之巾櫛上令詠王大娘戴竿晏應聲曰樓前百戲競爭新唯有長竿妙入神誰為綺羅翻有力猶自嫌輕更著人因命牙笏及黃紋袍以賜晏時有公孫大娘者善劍舞能為鄰里曲及裴將軍士謂之春秋設大張伎樂雖小大優劣不同而劇其華侈遐方僻郡歡縱亦然樂府雜録曰大面出於北齊齊蘭陵王長恭才武而貌美常著假面以對敵常擊周師金墉下勇冠三軍齊人壯之為此聲以效其指撝擊剌之容俗為之蘭陵王入陳曲淫樂左傳曰煩手淫聲慆堙心耳乃忘和平謂之鄭聲許真五經異義曰鄭國有溱洧之水男女聚會謳歌相感今鄭詩二十一篇婦人者十九故鄭聲淫也又云鄭重之音使人淫過也又曰惠王三年邊伯石遫蒍國出王立王頽王處干鄭三年子頽飲三大夫酒子國為客子國蒍國客上客樂及偏聲偏舞六代之樂一曰諸大夫偏舞鄭厲公見虢叔厲公鄭莊公之子厲公突也虢叔王卿士虢公林父也曰吾聞之司寇行戮君為之不舉不舉樂也而況敢樂禍乎今吾聞子頽歌舞不思憂夫出王而代其位禍孰大焉臨禍忘憂是謂樂禍禍必及之盍納王乎虢叔許諾鄭伯將王自圉門入虢叔自北門入二門王城門殺子頽及五大夫王乃入禮記曰姦聲亂色不留聰明淫樂慝禮不接心術又曰姦聲感人而逆氣應之逆氣成象而淫樂興焉又曰作奇伎淫巧以蕩上心者殺無赦又曰鄭音好濫淫志宋音燕女溺志衛音趍數煩志齊音傲僻驕志此四者淫於色而害於德論語曰惡紫之奪朱惡鄭聲之亂雅樂包曰鄭聲淫聲之哀者漢書曰王莽初獻新樂於明堂太廟群臣始冠麟韋之辨或聞其樂聲曰厲而哀非興國之聲也宋書曰廢帝元徽五年太樂雅鄭共千有餘人後堂雜伎不在其數裴子野宋略曰先王作樂崇德以格神人通天下之至和節群生之流放故天子達於士庶未曾去其樂而無非僻之心及周道襄微日失其序亂俗先之以怨怒國亡從之以哀思擾雜子女蕩悅淫志充庭廣奏則以魚龍靡漫為瓌瑋會同享覲則以吳趍楚舞為妖妍纖羅霧縠侈其衣踈金鏤玉砥其器在上班揚寵臣群下亦從風而靡王侯將相歌妓填室鴻商富賈舞女成群競相誇大玄有爭奪如恐不及莫為禁令傷物敗俗莫不在此隋書曰裴蘊煬帝徵為太常少卿初高祖不好聲妓遣牛弘定樂非正聲清商及孔部四舞之色皆罷遣從臣至是揣知帝意奏括天下周齊梁陳樂家子弟皆為樂戶其六品已下至於民庶有善音樂及倡優百戲者皆直太常是後異伎淫聲咸萃樂府皆置博士弟子相教傳增益樂人至三萬餘國語曰平公既作新聲新聲師涓新聽者也師曠曰公室其將卑乎君之萌兆襄矣樂以間山川之風輝德於廣遠也風德以廣風德者德各有風類也作樂各象其德韶夏護武之謂也風山川以遠之所樂以通山川之風類也遠其德也風物以聽之修詩以詠之修禮以節之夫德廣遠而有節是以遠服而邇不遷邇近說苑曰子路鼓瑟有北都之聲孔子聞之曰信矣由之不才也冉有侍孔子曰求來爾奚不謂由夫先王之制音也奏中聲為中節彼小人則不然執末以論本務剛以為基故其音湫厲而微末以象殺伐之氣夫殺者乃亂亡之風也冉有以告子路子路曰由之罪也後果不得其死焉淮南子曰揚鄭衛之浩樂結激楚之遺風此齊人之所以淫泳流湎列女傳曰夏桀既棄禮義淫於婦人求四方美人積之後宮造爛漫之樂呂氏春秋曰音樂之所由來遠矣故唯得道之人其可與言樂乎亡國戮民非無樂也其樂不樂溺者非不笑也溺人必笑雖笑不樂罪人非不歌也當死強歌歌不樂也亂世之樂有似於此夫樂有適心亦有過人之情欲壽而惡夭欲安而惡危欲榮而惡辱欲逸而惡勞四欲得四惡除則心適矣又曰楚之衰也作為巫音高誘注曰男曰鷡女曰巫華桓談新論曰夫不剪之室不如阿房之宮不琢之椽不如磨龍石之桶玄酒不如蒼梧之醇控楬不如流鄭之樂樂說曰聲放散則政荒崔氏云由君上驕逸則萬物荒散商聲欹散邪官不理政壞刑罰不法而威令不行角聲憂愁為政虐民民怨故也民不安業猶君失政徵聲哀苦事煩民勞君淫佚崔氏云由君邪民苦於役羽聲傾危則國不安崔氏云賦徭重其民困財物匱梁元帝纂要云古艷曲有北里靡靡激楚流風陽阿之曲皆非正聲之樂也流風亦曰結風也唐會要曰調露元年太子使樂工於東宮新作寶慶之曲成命工者奏于太清觀始平縣令李嗣真謂道士劉概輔儼曰此樂宮商不和君臣相阻之徵也角徵失位父子不協之兆也殺聲既多哀調又苦若國家無事太子受其咎矣數月太子廢又曰咸通中伶官李可久善音律尤能轉喉為新聲音辭曲折聽者忘倦京師屠沽少年效效之謂之拍彈時同昌公主除喪懿宗與郭淑妃悼念不已可久為歎百年舞曲舞人皆盛飾珠翠仍畫魚龍地衣以列之曲終樂闋珠翠履地詞語悽惻聞者流涕又常於安樂寺作菩薩蠻舞上益憐之可久常為子娶婦帝賜酒二銀鐏啓之乃金翠也時宰相曹確中尉西門季玄屢論之懿宗不納至僖宗即位宰相崔彥昭奏逆死於嶺表開元傳信記曰唐開元末年涼州進新曲上命諸王於便殿觀之曲終諸王皆稱萬歲獨寧王不賀玄宗徵其故憲曰此曲雖嘉臣有聞焉夫曲者始於宮散於商武於角徵羽莫不根柢囊括在於宮商也臣見此曲宮離而少徵商亂而加暴夫宮者君也商者臣也宮不勝則君體卑商有餘則臣事僣臣恐異曰臣下有悖亂之事陛下有播越之禍莫不兆於斯曲也洎祿山南犯玄宗西幸方明寧王審音之妙也大業記曰安公子是隋煬帝將幸江都宮中所撰時樂工笛中吹此曲其父疾廢於臥內聞泫然流涕問其子何得此曲對曰宮中新翻也謂其子曰宮者君也此曲雖在羽調後有一宮聲往而不返大駕東巡必不回耳可託疾勿去其精如此
