body:
  text: 文部十七著書上張華博物志曰聖人制作曰經賢者著述曰傳史記太史公自序曰夫詩書隱約者欲遂其志之思也昔西伯拘於羑里演周易孔子厄陳蔡作春秋屈原放逐著離騷左丘失明厥有國語孫子臏腳而論兵法此人皆意有所鬱結其不得通道也漢書曰公孫弘著公孫子言刑名謂字直百金也又曰淮南王安為人好書鼓琴不喜弋獵狗馬馳騁招致賓客方術之士數千人作為內書二十一篇外書甚衆又有中篇八卷言神仙黃白之術亦二十餘萬言初安入朝獻所作內篇新出上愛祕之使為離騷傳師古曰傳謂解說之若毛詩傳旦受詔日食時上又曰陸賈在高祖前時時稱說詩書帝罵之曰乃公馬上得之賈曰寧可以馬上治乎湯武逆取而順守之文武並用久長之術也帝乃令賈著古今成敗之書名曰新語每奏一篇帝未嘗不稱善又曰董仲舒作玉杯繁露清明竹林之書曲臺后倉之書禮射之書又曰王莽傳大司馬護軍褒奏言安漢公遭子宇陷於管蔡之辜愛至深為帝室故不敢顧私唯宇遭罪喟然憤發作書八篇誡子宇子孫宜班郡國令學官以教授請令天下吏能誦公誡者以著官薄比孝經師古曰著官者言用之得選舉也後漢書曰梁竦以經書自娛著書數篇名曰七序班固見而稱之曰昔孔子作春秋而賊臣亂子懼梁竦作七序而竊位素食者慚又曰王充好論說始詭異終有理實以為俗儒守文多失其真乃閉門潛思絶慶弔之禮戶牖牆壁各置刀筆著論衡八十五篇二十餘萬言後漢書列傳曰荀悅字仲豫儉之子悅志在獻替而謀無所用乃作申監五篇其所論辨通見政體既成而奏之帝覽而善焉帝好典籍常以班固漢書文繁難省乃令依左氏傳體以為漢紀詔尚書給筆札辭約事詳論辨多美晉書曰干寶性好陰陽術留思京房夏侯勝等傳寶父先有所寵侍婢母甚妒忌及亡母乃生埋婢於墓中寶兄弟年少不知審也後十餘年母喪開墓而婢伏棺如生載還經日乃蘇言其父常取飲食與之恩情如生家中吉凶輒語之考校悉驗地中亦不覺為惡既而嫁之生子又寶兄嘗病氣絶積日不冷後遂悟見天地間鬼神事如夢覺不自知死寶以此遂撰集古今神祇靈異人物變化名為搜神記凡三十卷以示劉惔惔曰卿可謂鬼之董狐也干寶表曰臣前聊欲撰記古今怪異非常之事會聚散逸使同一貫博訪知之者片紙殘鈌事事各畢又曰孫盛著晉陽秋詞直而理正咸稱良史焉既而桓溫見之怒謂盛子曰枋頭誠為失利何至乃如尊君所說其子遽拜謝曰請刪定之時盛年老還家性方嚴有軌憲雖子孫班白而庭訓愈峻至此諸子乃共號泣稽顙請為百口計盛大怒諸子遂爾改之盛寫定兩本寄於慕容雋泰元中孝武帝博求異聞始於遼東得之以相考校多有不同書遂兩存又曰曹志植之子也帝嘗閲六代論問志曰是卿先王所作耶志對曰先王有手所作自録請歸尋案還奏曰案録無此帝曰誰作志曰以臣所聞是臣族父冏所作以先王文高名著欲令書傳於後是以假託帝曰古來亦有是顧謂公卿曰父子證明足以為審自今已後可無復疑又曰王長文字德獻廣漢郪人也少以才學知名而放蕩不羈州府辟命皆不就州辟別駕乃微服竊出舉州莫知之後於成都市中蹲踞齧胡餅剌史知其不出屈禮遣之閉門自守不交人事著書四卷擬易名曰通玄經有文言卦象可用卜筮時人比之揚雄太玄同郡馬秀曰揚雄作太玄唯桓談以為必傳後世晚遭陸績玄道遂明長文通玄經未遭陸績君山耳又曰王隱字處叔太興初典章稍備乃召隱及郭璞俱為著作郎令撰晉史著作郎虞預私撰晉書而生長東南不知中朝事數訪於隱并借隱所著書竊寫之所聞漸廣是後更嫉隱形于言色預既豪族交結權貴共為朋黨以斥隱竟以謗免黜歸于家貧旡資用書遂不就乃依征西將軍庾亮供其紙筆書乃得成詣闕上之隱雖好著述而文辭鄙拙蕪舛不倫其書次弟可觀者皆其父所撰文體混雜義不可解者隱之作也宋書曰王淮之字元魯晉尚書僕射彬玄孫也曾祖彪之位尚書令博聞多見練悉朝儀自是家世並記江左舊事緘之有青箱世謂之王氏青箱學又曰高平郤紹作晉中興書數以示何法盛法盛有意圖之謂紹曰卿名位貴達不復俟此延譽我寒士無聞於時如袁宏干寶之徒賴有著述流聲於後宜以為惠紹不與至書成在齊內廚中法盛詣紹紹不在直入竊書紹還失之旡復兼本於是遂行何書齊春秋曰王儉字仲寶以四部衆書盈溢機閣自劉歆七略以來應更區別乃著七志上之時人以比相如封禪焉梁書曰武帝取鍾王真跡授周興嗣令選不重復者千字韻而文之興嗣一宿即上鬢髮皆白大被賞遇後興嗣目疾武帝親為之合藥又曰劉協字彥和自齊入梁撰文心雕龍五十篇論古今文體其序略云豫齒在逾立嘗夜夢執丹漆之禮器隨仲尼而南行寤而喜曰大哉聖人之難見也乃小子之垂夢歟自生靈已來未有如夫子者也敷讚聖旨莫若注經而馬鄭諸儒弘之已精唯文章之用實經典之條枝五禮資之以成文六典因之以致用由是搦筆和墨乃始論文其為文用四十九篇而已既成未為時流所稱協欲取定於沈約旡由自達乃負書候約於車前狀若欲貨鬻者約取讀大重之謂深得文理常陳諸几案後周書曰齊王憲嘗以古今兵書繁廣難求指要乃自列定為五篇表陳高祖覽而稱善陳書曰陸瓊字伯玉吳人初瓊父雲公奉武帝勑撰嘉瑞記瓊述其旨而續焉三國典略曰齊主如晉陽尚書右僕射祖珽等上言昔魏文帝命韋誕諸人撰著皇覽包括群言區分義別陛下聽覽餘日眷言緗素究蘭臺之籍窮策府之文以為觀書貴博博而貴要省日兼功期於易簡前者修文殿令臣等討尋舊典撰録斯書謹罄庸短登即編次放天地之數為五十部象乾坤之策成三百六十卷昔漢世諸儒集論經傳奏之白虎閣因名白虎通竊緣斯義仍曰修文殿御覽今繕寫已畢并目上呈伏願天鑒賜垂裁覽齊主命付史閣初齊武成令宋士素録古來帝王言行要事三卷名為御覽置於齊主巾箱陽休之創意取芳林遍略加十六國春秋六經拾遺録魏史第書以士素所撰之名稱為玄洲苑御覽後改為聖壽堂御覽至是珽等又改為修文殿上之徐之才謂人曰此可謂床上之床屋下之屋也三國典略齊魏收以子姪少年須誡厲遂著枕中篇以訓之隋書曰杜臺卿嘗採月令觸類而廣之為書名玉燭寶典十二卷奏之臺卿患聾不堪吏職請修國史上許之拜著作郎國朝傳記曰虞世南之為祕書也於省後堂集群書中事可為文用者號為北堂書鈔今北堂猶存而書益行於代唐書曰太宗以特進魏徵所撰類禮賜皇太子及諸王并藏本於祕府初徵以禮經遭秦滅學戴聖所編條流不次乃刪其所記以類相從為五十篇合二十卷太宗善之賜物一千段又曰太宗閲陸德明經典音義美其弘益學者歎曰德明雖亡此書可傳習因賜其家布帛百匹又曰高宗時太子賢敗太子洗馬劉訥言給事中唐之奇並坐私附庶人配流嶺外訥言博學有文詞以漢書授賢賢甚重之嘗撰續棑諧集十五卷賢覽之以為笑樂及賢廢宮中搜得之上怒曰經典誘人猶恐不能遷善排諧鄙說是導之以邪也遂徙于震州而死又曰天后聖曆中上以御覽及文思博要等書聚事多未周備令麟臺監張昌宗與麟臺少監李嶠廣召文學之士給事中徐彥伯水部郎中員半千等二十六人增損文思博要勒成一千三百卷於舊書外更加佛教道教及親屬姓氏方域等部至是畢功上親製名曰三教珠英彥伯已下改官加級賜物又曰天后自咸亨已後嘗召文學之士周思茂範履冰等入禁中令撰玄鑒百卷青宮要紀少陽政範各三十卷孝子傳及列女傳維城典訓鳳樓新誡各二十卷古今內範百卷樂書要録十卷百察新誡五卷垂拱格四卷臣軌二卷兆人本業五卷又有文集一百二十卷並藏於祕閣又曰劉允濟善屬文與絳州王勃齊名採托魯哀公後十二代至于戰國遺事撰魯後春秋一十卷表上之遷左右史又曰許叔牙嘗撰毛詩纂義十卷以進太子賜帛二百段兼令寫本付司經局其後御史大夫高智周謂人曰凡欲言詩者必須先讀此書始可也又曰大曆中刑部尚書顏真卿以陸法言切韻未弘乃纂九經子史字義著韻海鏡源三百六十卷獻之詔下祕閣及集賢書院貯之又曰馮伉為醴泉縣令患百姓多猾為著論蒙十四篇大略指明忠孝仁義勸學務農每鄉給一卷俾其傳習在縣七年韋渠牟薦為給事中充皇太子及諸王侍讀召見於別殿賜金紫著三傳異同三卷又曰貞元十三年韓談進統載三十卷其書採虞夏以來至于周隋録其事跡善於始終者六百六十八人為立傳又曰路隋為侍講學士採三代皇王興衰著六經法言二十卷奏之旋拜諫議大夫依前侍講學士將修憲宗實録復命兼充史職又曰貞元十一年左僕射平章事賈耽進海內華夷圖及古今郡國縣道四十卷圖廣三丈率以寸折成百里權德輿作序又曰韋處厚為中書舍人侍講學士時穆宗荒恣不親政務既居納誨之地宜有以啓導情虛乃銓擇經義雅言以類相從為二十卷謂之六經法言獻之錫以繒帛又曰唐次貶開州剌史在巴峽間十餘年不獲進用西川節度使韋皋抗表請為副使德宗密諭皋令罷之次滯蠻荒孤心抑鬱怨謗所積孰與申明乃採自古忠臣賢士遭罹讒謗放逐遂至殺身而君猶不悟其書三篇謂之辨謗略上之德宗省之猶怒謂左右曰唐次乃以吾為昏主何自諭如此次卒章武帝明哲嫉惡尤惡人朋比傾陷嘗閲書禁中得次所上書三篇覽而善之謂學士沈傳師曰唐次所集辨謗之書實君人者時宜觀之朕思古書中多有此事次編録未盡卿家傳史學以類例廣之傳師奉詔與令狐楚杜元穎等分功修續廣為十卷號元和辨謗略又曰鄭處誨方雅好古勤於著述撰集至多為校書郎時撰次明皇雜録三篇行於世又曰裴潾充集賢殿學士集歷代文章續梁昭明太子文選成三十卷目曰大和通選并音義目一卷上之當時文士非素與潾遊者其文章少在其選時論薄之又曰柳玭嘗著書誡其子弟曰夫門地高者可畏不可恃可畏者立身行己一事有墜先訓則罪大於它人雖生可以茍取名位死何以見祖先於地下不可恃者門高則自驕族盛則人之所嫉實藝懿行人未必信纖瑕微纍十手爭指矣又數其五條詞多不載
