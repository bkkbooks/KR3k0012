body:
  text: 東夷四高句驪范曄後漢書曰高句驪國節於飲食而好治宮室其俗淫皆潔淨自喜夜輒男女群聚為倡樂魏略曰高句驪國在遼東之東千里其王都於九都之下地方二千里戶三萬多山林無源澤其國貧儉土著為宮室宗廟祠靈星社稷其俗吉凶喜寇抄其國置官有相如軍盧沛者古鄒加尊卑各有等本捐奴部為王稍微弱今桂婁部代之大家不田作下戶給賦稅如奴客好歌舞其人自喜跪拜申一腳與夫餘異行步皆走又以十月會祭天名曰東盟有軍事亦祭天殺牛觀蹄以占吉凶加著幘如幘無後其小加著折風形如辨無牢獄有罪者即會加評議便殺之沒入妻子為奴婢盜一責十二婚姻之法女家作小屋於大屋之後名為壻屋壻暮至女家戶外自名跪拜乞得就女宿女家聽之至生子乃將婦歸其俗淫多相奔誘其死葬有槨無棺停喪百日好厚葬積石為封列種松柏兄死亦報㛐俗有氣力便弓矢刀矛有鎧習戰又有小水貊俗出好弓其馬小便登山夫餘不能臣也沃沮東穢皆屬之其國都依大水而居王莽時發句驪以伐胡不欲行亡出塞為寇害奔更名為下句驪後魏書曰高句驪者出於夫餘自言光祖朱蒙母河伯母夫餘王𨳲於室中為日所照引身避之日影又逐既而有孕生一卵大如五升夫餘王棄之與豕豕不食棄之於路牛馬避之又棄之野衆鳥以毛茹之夫餘王剖之不能破遂還其母其母以物裏之置於暖處有一男破殼而出及其長也字之曰朱蒙其俗言朱蒙者善射也夫餘國人以朱蒙非人所生將有異志請除之王不聽命之養馬朱蒙每私試知其善惡駿者減食令瘦駑者善養令肥夫餘王以肥者自乘以瘦者給朱蒙後狩于田以朱蒙善射射給以一矢朱蒙雖一矢殪獸甚多夫餘之臣又謀殺之朱蒙母陰知以告朱蒙朱蒙與烏餘二人棄夫餘東南走中道遇一大水欲濟無梁夫餘人追之甚急朱蒙告水曰我是日子河伯外孫今日逃走追兵垂及如何得濟於是魚鱉並浮為之成橋朱蒙得度魚鱉乃解追騎不得度朱蒙至普述水遇見三人其一人衣著麻一人著納衣一人著水藻衣與朱蒙至紇升骨城遂居焉號曰高句驪因以高為氏焉北史曰朱蒙在夫餘時其妻懷孕朱蒙逃後生子及長知朱蒙為國王即與母亡歸之名曰閭達委之國事朱蒙死至孫莫來立乃并夫餘漢武帝元封四年滅朝鮮置玄菟郡以高句驪為孫以屬之漢時賜之衣幘朝服鼓吹常從玄菟郡受之後稍驕不復詣郡但於東界築小城受之遂名此城為憤溝婁者句麗城名也又曰公孫度之雄海東也高句麗伯固與之通好伯固死伊夷摸五伊夷摸數寇遼東建安中公孫康出軍擊之大破其國焚燒邑落伊夷摸更作新國於九都山下又曰高句麗伊夷摸死其子位宮立始位宮曾祖宮生而目開能視國人惡之及長凶虐國以破殘及位宮生亦能視人高麗呼相似為位以為似其曾祖宮故名位宮亦有勇力便鞭馬善射獵魏正始中位宮寇西安平五年幽州刺史母丘儉將萬人出玄菟討位宮大戰於沸流敗走儉追至頳峴懸車束馬登丸都山屠其所都位宮單將妻子遠竄六年儉復討之位宮輕將諸加奔伏沷沮儉使將軍王頎追之絶沷沮千餘里到肅慎南界刻石紀功又刊丸都山銘不耐城而還又曰後魏太武帝時高麗王釗曾孫璉始遣使者詣安東奉表貢方物并請國諱太武嘉其誠款詔下帝系名諱於其國使員外散騎侍郎李敖拜璉為都督遼海諸軍事高句麗王敖至其所居平壤城訪其事云去遼東一千餘里至柵城南至小海北至舊夫餘人戶三倍於前魏時後貢使相尋歲致黃金二百斤白銀四百斤又曰後魏文明太后以獻文六宮未備勑璉令薦其女璉奉表云女己以出求以弟女應旨朝廷許焉會獻文崩乃止又曰後魏太和十五年璉死其孫雲立復賜以衣冠服物車旗之飾自比歲常貢獻至大統十年其王成遣使至西魏朝貢及齊受東魏之襌又朝于齊文宣加成使持節侍中驃騎大將軍高麗王如故又曰北齊天保三年文宣至營州使博陵崔柳使于高麗永魏末流人勑柳曰若不從者以便宜從事及至不見許柳張目叱之拳擊成墜於床下成左右雀息不敢動乃謝服柳以五千戶反命又曰高句驪東至新羅西度遼二千里南接百濟北鄰靺鞨一千餘里人皆土著隨山谷而居衣布帛及皮土田薄塉蠶農不足以自供故其人節飲食其王好修宮室都平壤城亦曰長安城其城隨山屈曲南臨浿水城內唯積倉儲器備寇至方入固守王別為宅於其側不常居之其外復有國內城及漢城亦別都也其國中呼為三京有遼東玄菟等數十城皆置官司以相統攝焉其置官有大對盧已下凡十二等分掌內外事復有內評五部褥薩人皆頭著折風形如辨土人加插二鳥羽貴者其冠曰蘇骨多用紫羅為之飾以金銀服大袖衫大口袴素皮帶黃革履婦人裙襦加襈書有五經三史三國志晉陽秋兵器與中國略同及春秋校獵王親臨之稅布五匹穀五石遊人則三年一稅十人共細布一匹其刑法峻罕有犯者樂有五絃琴箏篳篥橫吹蕭鼓之屬吹蘆以和曲每年初聚戲浿水上王乘腰輿列羽儀觀之事畢王以衣入水分為左右二部以水石相濺擲喧呼馳逐再三而止性多詭伏言辭鄙穢不簡親踈父子同川浴共室寢好歌舞常以十月祭天其公會衣服皆錦繡金銀以為飾好蹲踞食用俎豆出三尺馬云本朱蒙所乘馬種即果下也風俗尚淫不以為愧俗多遊女夫無常人夜則男女群聚而戲無有貴賤之節有婚嫁取男女相悅即為之男家送豬酒而已無財娉之禮或有受財者人共恥之以為賣婢死者殯在屋內殯三年擇吉日而葬居父母及夫喪皆三年兄弟三月初終哭泣葬則鼓舞作樂以送之埋訖取死者生時玩好車馬置墓側會葬者爭取而去又曰隋開皇中高麗王元率靺鞨萬餘騎寇遼東西營州揔管韋世冲擊走之帝大怒命漢王諒為元帥揔水陸討之下詔黜其爵位元亦惶懼遣使謝罪上表稱遼東糞土臣元云云上於是罷兵待之如初元亦歲遣朝貢煬帝嗣位天下全盛高昌王突厥啓人可汗並親詣闕貢獻於是徵元入朝元懼蕃禮頗闕大業七年帝將討元罪車駕度遼水止營於遼東又勑諸將高麗若降即宜撫納不得縱兵入城陷賊輒言降諸將奉旨不敢赴機每先馳奏比報賊守禦亦備復出拒戰如此者三帝不悟由是食盡師老轉輸不繼諸軍多敗績於是班師又曰隋大業九年煬帝復親征高麗勑諸軍以便宜從事諸將分道攻城賊勢日蹙會楊玄感作亂帝大懼即日六軍並還十年發天下兵會賊盜蜂起所在阻絶軍多失期至遼水高麗亦困弊遣使乞降帝許之頓懷遠鎮受其降仍以俘囚軍實歸至京師南史曰高麗本有五族有消奴部絶奴部慎奴部灌奴部桂婁部本消奴部為王微弱桂婁部代之其置官有對盧則不置沛者有沛者則不置對盧焉晉安帝義熙九年高翼奉表獻赭白馬宋元嘉十五年馮弘為魏所攻敗奔高麗北豐城表求迎接文帝遣使王白駒趙次興迎之并令高麗資遣璉不欲弘南乃遣將孫漱高仇等襲殺之白駒等率所領七千餘人生擒漱殺仇等二人十六年文帝欲侵魏詔璉獻馬八百匹大明二年又獻肅慎矢及楛矢石砮歷齊梁並授爵位遣使奉表獻方物不絶唐書曰高麗者出自扶餘之別種其國都於平壤城即漢樂浪郡之故地在京師東五千一百里其官大者號大對盧比一品揔知國事三年一代若稱職者不拘年限交替之日或不相祗服皆勒兵相攻勝者為之其王但閉宮自守不能制禦次曰太大兄比正二品對盧以下官揔十二級外置州縣六十餘城大城置傉薩一人比都督諸城置道使比刺史其下各有僚佐分掌曹事衣裳服食唯王五綵以白羅為冠白皮小帶其冠及帶咸以金飾官之貴者則青羅為冠次以緋羅插二鳥羽及金銀為飾衫簡袖袴大口白韋帶黃革履國人衣褐戴辨婦人首加巾幗好圍碁投壺之戲人能蹴鞠食用籩豆簠簋樽俎罍洗頗有箕子之遺風其所居必依山谷皆以茅草葺舍唯佛寺神廟及王宮官府乃用瓦其俗貧窶者多冬月皆作長坑下燃火熅以取暖種田養蠶略同中國城東有大穴名隧神皆以十月王自祭之俗愛書籍至於衡門廝養之家各於街衢造大屋謂之局堂子弟未婚之前晝夜於此讀書習射又曰武德二年高麗王建武遣使來朝四年又遣使朝貢高祖感隋末戰士多陷其地五年賜建書云在此所有高麗人等已令追括尋即遣送彼處有此國人者立可放還務盡綏育之方共弘仁恕之道於是建武悉搜括華人以禮賓送前後至者萬數高祖大喜七年遣使往冊建武為上柱國遼東郡王高麗王仍將天尊像及道士彼為之講老子其王及道俗等觀聽者數千人貞觀二年破突厥頡利可汗建武遣使奉賀并上封域圖五年詔遣廣州都督府司馬長孫師往收瘞隋時戰亡骸骨毀高麗所立京觀又曰貞觀十六年高麗西部大人蓋蘇文有罪其王建武議欲誅之蘇文乃召部兵於城南云將校閲諸大臣皆來臨視蘇文勒兵盡殺之因馳入王宮殺建武立其弟大陽子臧為王自立為莫離支猶中國兵部尚書兼中書令之職也自是專國政蘇文姓泉氏鬚面甚偉形體魁傑身佩五刀左右莫敢仰視恆令其屬官俯伏於地踐之上馬下亦如之出必先布隊仗導者長呼以辟行人百姓畏避皆自投坑谷太宗聞之遂出師弔伐十九年命刑部尚書張亮為平壤道行軍大揔管領將常何等率江淮嶺硤徑卒四萬戰船五百艘自菜州泛海趨平壤又以英國公李績為遼東道行軍大揔管江夏王道宗為副率步騎六萬趨遼東兩軍合勢太宗親御六軍以會之夏四月李績軍渡遼進攻蓋牟城拔之以其城置蓋州五月渡遼水詔徹橋梁以堅士卒志帝既至遼東城下見七卒負檐以填塹者帝分其尤重者於馬上載之從官悚動爭齎以送城下高麗聞我有拋車飛三百斤石於一里之外者甚懼之乃於城上積木為戰樓以拒飛石績列車發石以擊其城所遇盡潰又推撞車撞其樓閣無不傾倒拔其城為遼州初帝自定州命每十里置一烽屬于遼城與太子約剋遼東當舉烽是日帝命舉烽師次白崖城右衛太將軍李思摩中弩矢帝親為吮血將士聞之莫不感勵城主孫戊音遂乞降以其城置巖州授伐音為刺史我軍之渡遼也莫離支遣加戶城七百人戍蓋牟城李績盡虜之其人並請隨軍自效太宗謂曰詎不欲爾之力爾家悉在加尸爾為吾戰彼將為戮矣破一家之妻子取一人之力用吾不忍也悉令放還車駕進次安市城高麗北部耨薩高延壽南部高惠真率高麗靺鞨之衆十五萬來救引軍直進太宗夜召諸將躬自指麾因令所司張受降幕於朝堂之側曰明日午時納降虜於此矣遂率軍而進至時果敗二帥之衆太宗因按轡觀城營壘謂侍臣曰高麗傾國而來存亡所繫一麾而敗天祐我也因下馬再拜以謝天名所幸山為駐蹕山令中書侍郎許敬宗為文勒石以紀其功八月移營安市城東李績等攻之不拔乃詔班師初攻陷遼東城其中應沒為奴婢者一萬四千人並遣集沒為將分賞將士太宗愍其父母妻子一朝分散令有司准其直以布帛贖之赦為百姓其衆歡叫之聲三日不息又曰貞觀二十年高麗遣使來謝罪并獻二美女太宗謂其使曰歸謂爾主美色者人之所重爾之所獻信為美麗憫其離父母兄弟於本國留其身而忘其親愛其色而傷其心我不取也並還之又曰乾封元年高麗遣其子入朝陪位於太山之下其年蓋蘇文死其子男生代為莫離支與弟建不睦為其所逐走據國內城使其子獻城詣闕求哀十一月命英國公李績率郭侍封等以征之二年二月績至新城謂諸將曰新城是高麗西境鎮城最為要害若不先圖餘未易可下遂引兵於城西南據山築柵且攻且守城中窘急數有降者自此所向克捷高藏及男建將首領九十八人持帛幡出降請使入朝績以禮延接男建猶𨳲門固守十一月拔平壤城虜高藏男建等至京師獻俘于含元宮乃分其地置都督府九州四十二縣一百又置安東都護府以統之擢其酋渠有功者授都督刺史及縣令與華人參理仍遣左武衛將軍薛仁貴揔兵鎮之自是高氏君長遂絶
