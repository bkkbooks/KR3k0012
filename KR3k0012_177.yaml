body:
  text: 居處部四堂說文堂殿也釋名曰堂猶堂堂高顯貌也禮記曰堂上不趨堂上接武堂下布武又曰將上堂聲必楊又曰禮有以高為貴者天子之堂九尺諸侯七尺大夫五尺士三尺又曰覲禮天子不下堂而見諸侯下堂而見諸侯天子之失也由夷王以下尚書大傳曰天子堂廣九雉諸侯七雉伯子男五雉雉三尺也續漢書曰中平二年造萬金堂於西園三十國春秋西涼傳曰李皓於南門外臨水起堂名曰靖恭堂以議朝政閲武事堂成圖讚自古明王忠臣孝子貞女皓自為序以明鑒戒文武群寮亦皆圖焉是月白雀翔于靖恭堂皓頌之梁書曰高祖五年改閲武堂為德陽堂改聽訟堂為議賢堂後魏書任城王澄從高祖於觀德殿高祖曰躬以觀德次之凝間堂高祖曰名要有義此堂天子間居之義不可縱奢以忘儉自安以忘危故此堂後作茅茨堂謂李冲曰此東曰步元廡西日遊凱廡此坐雖非唐堯之君卿等當無愧於元凱冲對曰臣既遭唐堯之君不敢辭元凱之譽高祖曰光景垂落朕同宗則有載考之義卿等將出無遠何得默爾示聽德音即命黃門郎崔光郭雅邢巒崔休等賦詩言志燭至公辭高祖曰在夜載考宗族之義卿等且還朕與諸王宗室欲成此夜飲和苞漢趙記曰劉聰嘉平三年廷尉陳元達極諫聰怒將斬之聰時幸逍遙園李中堂元達抱堂下樹叫曰臣所言者社稷之計聰免之於是易李中堂為愧賢堂北史齊文襄於鄴東起山池遊觀河澗王孝瑜遂於第作水堂龍舟植幡矟於舟上數集諸弟宴射為樂武成幸其第見而悅之故盛興後園之玩習於是貴賤慕效處處營造又曰若干惠事母以孝聞周文嘗造射堂新成與諸將宴射惠歎曰親老矣何時辨此周文聞之即日徙堂於惠宅論衡曰王者之堂墨子稱堯舜堂高三尺儒家以為卑下假使之然高三尺之堂蓂莢生於階下須臨堂察之乃知莢數夫起視堂下之莢孰與懸日曆於扆坐顧輒見之也風俗通曰殿堂象東井形刻作荷蓤蓤水物也所以厭火晉宮閣名曰洛陽宮有則百堂螽斯堂休徵堂延祿堂仁壽堂綏福堂含芳堂樂日堂椒華堂芳音堂顯成堂承光堂五福堂嘉寧堂瑞應圖帝琴堂前有二橘樹連理改琴堂為連理堂華陽國志曰文翁立講堂作石室一曰玉堂在城南初堂遇火太守更修立又增二石室虞氏家記曰虞潭為右衛將軍太夫人年高求解職被詔不聽特假百日迎母東歸起養堂親親集會作詩言志齊地記曰臨淄城西門外有古講堂基柱猶存齊宣王修文學處也拾遺記曰董偃常臥延清之堂設火齊屏風又曰海人獻龍膏為燈於燕昭王王坐通雲之堂具澄王子年拾遺記漢武息於延涼室臥夢李夫人授帝蘅蕪之香帝驚起而香氣猶著衣枕歷月不歇帝彌思涕乃改延涼室為遺芬夢堂襄沔記白馬泉每年刺史三月上旬於此泉起曲水流杯堂引泉水為祓禊之所臨時構造事竟毀除其流杯堂本在壘城西郡國志王屋縣有孔子學堂西南七里有石室臨大河水勢湍急五里之間寂無水聲如似聽義又曰齊桓公宮城西門外有講堂齊宣王立此學也故稱為稷下學莒子如齊盟于稷門此也宋永初山川古今記永康縣縉雲堂黃帝練丹處又曰費北有積弩堂益州記文翁學堂在城南羊頭山記太學堂洛陽南開陽門外長十丈廣三丈堂前石經四部本碑凡四十八枚西尚書周易公羊十六碑南禮記五碑東論語三碑有諫議大夫馬日磾碑議郎蔡雍銘又曰聖壽堂石虎造玉佩八百大小鏡二萬枚丁香末為泥油瓦四面垂金鈴一萬枚去鄴三十里聞響十洲記曰崑崙山有光碧之堂西王母所居郡國志雞陂之側即春申君子假居之殿也後太守居之以數失火故塗以雌黃遂名黃堂說苑曰聖人之於天下譬如一堂之上也今有滿堂飲酒者一人獨纍然向隅而泣則一堂之人皆不樂矣管子曰堂上遠於百里門廷遠於萬里今步者一日百里之情通堂上有事十日而君不聞步者十日千里之情通堂下有事一月而君不聞步者百日萬里之情通門庭有事朞年而君不聞此謂遠於萬里也漢武內傳曰上元夫人言西王母有六甲之術用之可以遊景雲之宮登流霞之堂漢武故事曰玉堂去地十二丈基階皆用玉東京賦金華玉堂白虎麒麟潘尼詩曰鸞鳳棲堂廡不若翔廖廓文選天台山賦玉堂蔭映乎高隅楚辭曰魚鱗屋兮龍堂古詩云黃金為君門白玉為君堂庭中生桂樹華燈何煌煌堂皇附漢書曰坐堂皇上室而無四壁曰皇也廣雅曰堂皇合殿也洛陽記曰洛陽宮有桃間堂皇杏間堂皇杏間堂皇竹間堂皇李間堂皇魚梁堂皇醴泉堂皇百戲堂皇晉宮闕名曰洛陽宮有水碓堂皇擇果堂皇陸機四言詩序曰太子宴朝士於宣猷堂皇遂命機賦詩樓爾雅曰狹而修曲日樓說文曰樓重屋也樔澤中守草樓也釋名曰樓有戶牖諸孔婁婁然也史記曰方士言武帝曰黃帝為五城十二樓以候神人帝乃立神明臺井幹樓高五十丈輦道相屬漢書曰濟南人公玉帶上皇帝明堂圖圖中有一殿四面無壁以茅蓋通水園宮垣為復道上有樓從西南入蓋樓之始也又郊祀志云其南有玉堂壁門大鳥之屬立神明臺井幹樓高五十丈輦道相屬焉顏師古注云漢宮閣疏云神臺高五十丈上有九室東觀漢記云公孫述造十層赤樓也後漢書張奐傳初奐為武威太守其妻懷孕夢帶奐印綬登樓而歌占者曰必將生男復臨茲郡命終此樓既而生子猛以建安中為武威太守殺刺史州兵圍之急猛恥見擒乃登樓自焚而死又曰黃昌為郡守陜縣彭氏造高樓臨道昌行縣彭氏婦人輒升高樓而觀昌乃殺之蜀志曰周群作小樓多令奴更直臺上視天才有一氣即白群晉書曰石崇作樓令婢緑珠作歌舞於上孫秀求緑珠不得及崇被收方在樓上謂珠曰吾今為汝死矣珠乃墜樓而死又曰於石頭東城內起高樓加纍入於霄漢連堞帶於積水署曰入漢樓宋書曰大明元年五月壬子紫氣出景陽樓狀如煙回薄久之詔改景陽為景雲樓趙書云趙染襲長安秦王業奔射鴈樓格戰至天明不拔齊書曰東昏侯後宮起仙華神仙玉壽諸殿窮盡雕綵以麝香雜香塗壁時世祖於樓上施青漆世謂之青樓帝曰武帝不巧何不純用琉璃又曰焦度嘗戰敗逃于宮亭湖中江州刺史王景文誘降復拒沈攸之於郢城登樓詈辱攸之攸之攻不能下至今呼此樓為焦度樓也又魏虜傳云虜自佛貍世至萬民世增雕飾正殿西築臺謂之白樓樓南又有伺星樓梁書處士陶弘景傳云弘景止于句容之句曲山永明初更築三層樓弘景處其上弟子居其中賓客至其下又曰武帝大同十年幸蘭陵因賦歸舊鄉詩己酉幸京口城北固樓曰此不足以固守然北望江山實為壯觀乃改名北顧因幸回賓亭宴帝鄉故老及迎候者少長數千人各齎錢三千丈與之周書曰長孫儉傳云為荊州刺史人安其業吏人表請為儉構清德樓樹碑刻頌朝議許焉盛弘之荊州記云西鄂城東有三女稚歿三女造此樓於墓所老君本記云周康王時文始真人結草為樓占星候氣登真隱訣云長綿樓上太清上宮名玉晨道君所居吳越春秋云會稽郡小城勾踐築周千一百二十步西北立為龍翼樓世說云桓征西治江陵城甚麗顧長康曰遙望層城丹樓如霞墨子云偏城三十步置坐候樓樓出堞四尺百步一木樓樓前面九尺高七尺二百步一立樓去城中二丈五尺洛陽地記曰洛陽城內西北角有金墉城東北角有樓高百尺魏文帝造也盛弘之荊州記曰荊州城西百餘步有丹霞樓臨川康王之置吳越春秋曰范蠡為勾踐立飛翼樓以象天門為兩蟉繞棟以象龍甬羊頭山記曰原城西門南角有萬歲樓俗傳飛入江常以鐵鎖維之又樓上時見一道白氣如煙刺史必死輕者貶謫州人至今為常候郡國志定州安縣城上樓謂之神女樓又曰馬邑白樓即後魏納姚興女為后后悲思因造此樓登望飾以鉛粉故名之又曰金華縣因山為名城南臨溪水高阜上有樓名曰玄暢樓宋沈約造以吟詠於此處韋述兩京新記曰上陽宮有麗青臺浴曰樓十洲記曰崑崙山有玉樓十二層虞氏家記曰吳小城白門蓋吳王闔閭所作也至秦始皇帝守宮吏燭燕窟失火燒宮而此樓故存瀨鄉記曰老子廟有皇天樓九柱樓靜念樓皆畫仙人雲氣袁彥伯羅山疏曰仰望石樓眇然在雲中金陵地記吳嘉禾元年於桂林苑落星山起三重樓名曰落星樓吳都賦曰享戎旅於落星之樓世說曰凌雲臺樓觀極精巧先稱平衆材輕重當宜然後造構乃無錙銖相負揭臺雖高峻怕隨風搖動魏明帝登臺懼其勢危別以大材持之樓即便頽瓌論者謂輕重力偏故也九江録曰庾亮在武昌諸佐吏殷浩等乘秋夜佳景共登南樓俄而不覺亮至衆將避之公曰老子於此不淺便坐談詠至今名庾公樓幽明録曰鄴城鳳陽門五層樓去地二十丈安金鳳皇二頭於其上一頭飛入漳河清朗見在水底一頭今獨存水經鄧州伯陵山上有入鄉樓益州記曰成都有百尺樓晉宮閣名云洛陽有鳳皇樓詩曰西北有高樓上與浮雲齊樂府詩云日出東南隅照我秦氏樓漢宮閣名云長安有馬伯騫樓又有貞女樓晉宮閣名晉有伺星樓又曰總章觀儀鳳樓在觀上廣望觀之南又別有翔鳳樓又有慶雲樓
