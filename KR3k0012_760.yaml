body:
  text: 器物部四簠簋三禮圖曰簠受一升下足高一寸中方外圓漆丹中蓋龜形諸侯飾以象天子玉飾盛黍稷簋受一升足高一寸中圓外方挫其四角漆赤中蓋亦龜形其飾如簠盛稻梁易曰樽酒簋二用缶鄭玄曰唯北有斗不可以挹酒漿斗上有建星建星形似簋二副也建星上星又似缶也納約自牖無咎詩曰權輿刺康公與賢人有始無終也於我乎每食四簋今也每食不飽于嗟乎不承權與又曰於粲灑掃陳饋八簋周禮曰瓬音放人為簋實一觳音夫崇尺厚半寸脣寸儀禮曰佐食分簋士用敦言簋者客同姓之士得從周制禮曰管仲鏤簋而朱紘鄭玄曰刻而飾之大夫刻之為龜諸侯飾之以象天子飾之以玉君子以為濫矣又曰周之八簋黍稷器也傳曰衛孔文子之攻太叔也訪於仲尼仲尼曰簠簋之事則嘗聞之矣甲兵之事未之學也孝經曰陳其簠簋鄭玄曰方曰簠圓曰簋而哀戚之墨子曰堯飯土簋啜土鉶賈誼書曰古者大臣有坐不廉而廢者不謂不廉曰簠簋不飾瑚璉三禮圖曰瑚受一升形制未聞制度云如簋而平下璉受一升漆赤中蓋亦龜形大夫飾口以白金制度云如簋而兌下禮曰夏后氏之四璉殷之六瑚皆黍稷器論語曰子貢問賜也何如曰汝器也曰何器也曰瑚璉也盛黍稷之器夏曰瑚殷曰璉敦牟三禮圖曰敦有足其形如今酒樽法牟受一斗如敦形古牟受一升平下漆赤中飾口以白金蓋亦龜形周禮曰若合諸侯則共珠盤玉敦敦盤類也珠玉以為飾也古以盤盛血以敦盛食也禮曰敦牟危匜音移非餕莫敢用敦牟黍稷器也又曰有虞氏之兩敦黍稷器儀禮曰主婦設兩敦黍稷于俎南俎豆說文曰豆古食肉器也爾雅曰木豆謂之豆豆禮器也瓦豆謂之登即高登也三禮圖曰豆以木為之受四升高尺二寸漆赤中大夫以上亦雲畫諸侯加象飾口之天子玉飾登以几盛湆音泣受斗二升口徑尺二寸足徑八寸高二尺四寸小身有蓋似豆狀詩曰卬盛於豆于豆于登又曰邊豆大房大房飾俎周禮曰上公豆四十侯伯豆三十有二子男豆十有四儀禮曰宰夫自東房薦豆六設千醬東又曰太羹湆不加實于登也大戴禮曰武王踐祚於觴豆為銘焉禮曰魯季夏六月以禘禮祀周公於太廟俎用梡嶡梡音丸嶡居衛切又曰俎有虞氏以梡夏后氏以嶡殷以椇音矩周以房俎鄭玄曰梡斷木為之四足而已嶡之言蹶也謂中足為橫距之象周禮謂之距相之言積椇也謂曲橈之也房謂足下跗也上下兩間有似於堂房魯頌曰邊豆大房也夏后氏以楬苦戛切豆殷玉豆周獻息列切豆揭無異物之飾也獻疏剖之又曰禮有以多為貴者天子之豆二十有六諸公十有六諸侯十有二上大夫八下大夫六又曰子云觴酒豆肉讓而受惡民猶犯齒傳曰鳥獸之肉不登於俎皮革齒牙骨角毛羽不登於器則公不射古之制也論語曰衛靈公問陳音陳於孔子孔子曰俎豆之事則嘗聞之矣軍旅之事未之學也史記曰孔子為小兒時常陳俎豆以為戲國語曰晉侯使聘周王召士季曰汝今我王室之一二兄弟以相見將和協典禮以示民訓奉其犧息奇切象出其尊彝陳其俎豆漢書曰韓延壽為潁川太守令文學諸生皮辨執俎豆為吏民行喪娶之禮又曰劉向說上曰有司定法筆削救時務也至於禮樂則曰不敢是敢於殺人不敢於養人為其俎豆管絃之間小不備因絶不為是去小不備而就大不備東觀漢記曰劉昆教授弟子恆五百餘人每春秋饗射常備列典儀以素木瓠葉為俎豆莊子曰祝宗人說彘曰汝奚惡死吾將加汝肩尻乎雕俎之上賈誼新書曰昔周文王使太公望傅太子發嗜鮑步巧切魚而公弗與文王曰發嗜鮑魚何為弗與太公曰禮鮑魚不登乎俎豆豈有非禮而可以養太子乎籩說文曰籩竹豆也爾雅曰竹豆謂之籩禮器也書曰祀於周廟邦甸侯衛駿奔走執豆籩詩曰儐爾籩豆飲酒之飫又曰籩豆有楚殽核維旅禮曰鼎俎奇而籩豆偶陰陽之義也左傳曰楚子入享於鄭加籩豆六品又曰鄭伯饗趙孟為客具五獻籩豆幕下語曰籩豆之事則有司存焉韓子曰晉文公反國至河令籩豆捐之手足胼胝者後之咎犯聞之而哭公問之對曰籩豆所以食也而君捐之手足胼胝有功者也而君後之今臣與在後中不勝其哀故哭神異經曰西北荒中有玉饋之酒其上有玉樽玉籩樏晉太康起居注曰齊王出蕃詔賜榼樽樏杯盤各有差東宮舊事曰漆三十五子方樏二沓蓋二枚抱朴子曰世有使酒之客以杯樏相擲者有矣世說曰王夷甫嘗屬族之事族人大怒便舉樏擲其面陶侃表曰鹽塞荒儉唯作方九子樏趨以供事謹上五十葉曹毗杜蘭香傳曰蘭香隆張碩齎方九子樏七子樏鉶三禮圖曰鉶以盛羹受一升口徑六寸有足高一寸有兩耳蓋士以鐵大夫以銅諸侯以白金飾天子以黃金飾周禮曰上公鉶四十有二侯伯鉶二十有八子男鉶十有八鉶羹器也禮曰實其簠簋籩豆鉶羹墨子曰堯飯土軌啜尺劣切土鉶如淳曰鉶器之屬以土為之瓦器也鉢沈約宋書曰廬江王禕以銅鉢二枚餉宋祖珍齊書曰竟陵王子良與丘令楷江珙音拱等共打銅鉢立韻響滅則詩成可以觀覽北齊書曰元韶魏室奇寶多入韶家有三鉢相盛可轉而不可出二石僞事曰佛圖澄死以生所服金杖銀鉢送終後開棺視之唯見杖鉢存焉佛圖澄別傳曰澄以鉢盛水燒香呪之須臾鉢中生青蓮花西域諸國志曰佛鉢在乾陀越國青玉也受三升許彼國寶之供養乞願終日花香不滿則如言也滿亦如言也交州雜事曰太康四年刺史陶璜表林邑王范熊所獻銀鉢一口白水精鉢一口異苑曰司州衛士度苦行居士也其母常誦經長齊堂衆僧未食俱望見空中有一物下既落其前乃是大鉢滿中香飯度以晉惠懷之際得道齊王融謝安陸王賜銀鉢啓曰素金之貴有訪山經鐫刻可奇見符神鼎撤膳器於珍羞之席降寶於簞瓢之門窪俗說曰毛泰買一玉窪八十八萬甌方言曰甌甂音遍陳魏宋楚之間謂之㼵今河北人呼小盆為㼵子杜啓切自關而西謂之甂其大者謂之甌通俗文曰小甌曰㼵抱朴子曰取金液及水銀以黃土甌盛置之猛火上皆化為丹以此丹金為盤碗食其中令人長生諸葛恢集曰詔賜恢白甌二枚庾翼與燕王書曰今致白甌二枚袁彥伯羅山疏曰善道開尸在石室北壁下形體朽壞止有白骨在昔在都識此道士聞之使人慨然其業行殊異當蟬蛻解骨耳石室中先有甌盛香得便掃除燒香梁皇太子謝勑賚廣州甌等啓曰淮南承月之杯豈均符彩西國浮雲之碗非謂瓌奇臣南珍靡究未讀奏曹之表方物罕逢不識議郎之畫杯說文曰杯㔶小杯也㔶音貢盛二音通俗文曰醬杯曰盞或謂之䀀夫凡切又薄淹切方言曰㿿音雅緘音緘盞酒盞也䀀呼雅切楊音章𥂓音摩杯也秦晉之郊謂之㿿所謂伯㿿者也自關而東趙魏之間曰緘或曰盞最小杯也或曰䀀其大者謂之聞吳越之間曰𥂸齊右平原以東或謂之𥂓杯其通語也杯落盛杯器籠也陳楚宋魏之間謂之杯落又謂之豆筥自關而西謂之杯落禮曰母沒而杯圈巨阮切不能飲焉口澤之氣存焉爾史記曰文帝十七年新垣平使人持玉杯闕下獻之刻曰人主延壽平所言詐下吏誅漢書曰項羽置太公於高俎上曰不降烹汝翁高祖曰吾翁即汝翁儻烹遺我一杯羹又曰元帝徵貢禹為諫議大夫禹奏曰臣嘗從之東宮見賜柸案盡文畫金銀飾非當所以食臣下也又曰朱博為御史大夫為人廉儉食不重味案上不過三杯又曰王嘉為丞相數上言不宜封董賢上怒詔丞相詣廷尉詔獄吏和藥進嘉引藥杯以擊地謂官屬曰丞相幸得備位三公奉職負國當伏刑都市以示衆豈兒女子耶何謂咀藥而死續漢書曰鄭玄飲三百餘杯不醉又禮儀志曰天子明器有瓦大杯十六容三升瓦小杯二十受二升謝承後漢書曰豫章宋叔平為定陵令素杯食麥飲酒高弘為琅邪相桑杯盛漿唐書曰胡楚賓屬文敏速每飲酒半酣而後操筆高宗每令作文必以金銀杯盛酒令飲便以杯賜之吳越春秋曰闔閭女自殺以玉杯送之管子曰人君百杯而食又曰桓公管仲鮑叔牙寧戚四人飲叔牙奉杯而起曰願公無忘在莒時文子曰清之為明杯水而見眸子濁之為暗河水不見太山韓子曰智伯身死三國分其首以為杯又曰紂為象箸箕子怖以為象箸必不加於土鉶必將犀玉之杯象著玉杯必不美菽藿則必薦豹胎又曰樂羊為魏文侯攻中山其子在中山中山之君烹其子而遺之樂羊坐幕下而饗之盡一杯淮南子曰夫江河之腐胔音漬不可勝數也然祭者用之大也一杯酒蠅漬其中匹夫不嘗小也鹽鐵論曰古者汙樽杯飲蓋每爵樽觴豆及其後庶人器用即竹柳陶匏而已唯瑚璉觴豆而後雕文彤漆今富者銀口黃耳金壘玉鍾中者野玉紵器金錯屬杯夫一杯得銅杯十價錢而用不殊箕子之譏始在天子今在匹夫論衡曰項曼都好道學仙去家三年而反曰有仙人將我上天離月數里而止月之旁甚寒飢欲食輒飲我流霞一杯王逸子曰顏淵之簞瓢則勝慶封之玉杯何者德行高遠能絶殊也晉咸康起居注曰詔送遼東使假遼等鸚鵡杯東宮舊事曰漆四升杯四十漆杯子三百漢武故事曰上崩後鄠縣有一人於市貨玉杯吏欲捕之因忽不見縣送其器推問茂陵中物霍光呼問說市人形貌如先帝又曰武帝作承露盤仙人象擎玉杯以取雲表之露十洲記曰周穆王時西胡獻夜光常滿杯杯容三升是白玉之精光明照室夕以杯於庭中仰向天比明水便滿杯中水甘香異美斯實神靈之器葛仙公別傳曰仙公為客設酒不令人傳之見杯自至人前若不盡者則杯不去神仙傳曰左慈能分杯飲酒曹公聞試之慈拔簪以畫杯杯即斷飲畢以杯擲屋棟杯懸著屋棟動搖似飛鳥欲落不落良久乃墮地又曰劉剛未仙時姮娥降共語如人語不解其章又曰劉剛未仙時姮娥降共向留一明月杯云以示世人南州異物志曰鸚鵡螺狀以覆杯形如鳥頭向其腹視似鸚鵡故以為名南越志曰南海以蝦頭為長杯頭長數尺金銀鏤之晉廣州刺史嘗以杯獻簡文簡文用以盛藥未及飲無故酒躍於外時廬江太守曲安遠頗解術數即命筮之安遠曰卻三旬後庭將有告慶者永嘉郡記曰君鄣山袁君廟神降於祝史以神前杯灌地以大羹杯覆之有頃發杯而菌芝生於杯下後漢馮敬通杯銘曰樂則思舊燕則思歡民之失德乾餱以愆束晢貧家賦曰持缺耳之破杯班彪上啓事曰官吏二千石布襦羊裘以白木杯飲酒飾虛欲以求名采譽魏武帝上雜物疏曰有銀畫象牙杯盤五具陶侃故事曰侃上雜物疏有上成帝螺杯一枚棬方言曰孟海岱東齊北燕之間或謂之捲禮曰母沒而杯圈不能飲焉口澤之氣存焉耳圈者屈木所以謂巵匜之屬孟子曰告子云性猶杞柳也義猶杯捲也孟子曰能順杞柳之性以為杯捲乎檔吳越春秋曰越以甘蜜九檔報吳增封之禮
