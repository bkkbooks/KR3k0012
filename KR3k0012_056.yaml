body:
  text: 地部二十窟禮記曰古未有宮室冬居營窟夏居橧巢也左傳曰鄭伯有嗜酒為窟室而夜飲擊鍾焉朝至未已朝者曰公焉在曰吾公在壑谷壑谷窟室也史記曰吳公子光之謀王僚也專諸謂曰王僚可殺也公子光乃伏士於窟室中而具酒請王僚使專諸置匕首魚炙之中專諸擘魚因以刺王僚王僚立死戰國策曰馮暖謂孟嘗君曰兔有三窟僅得免死君始一窟未得高枕而臥也請為君復鑿二窟乃西遊於梁謂梁惠王曰齊於其臣孟嘗君諸侯先迎者國富兵強梁王乃聘以為相齊王聞之懼乃請反國馮暖使請先致祭器立宗廟於薛三窟已就暖之力也晉書曰王衍用弟澄為荊州從弟敦為青州曰荊有漢江之固青有負海之險吾留於此足為三窟王隱晉書曰魏末有孫登字公和汲郡共人也無家屬時人於汲縣北山土窟中得之崔鴻十六國春秋前秦録曰張忠字巨和中山人也永嘉之亂隱於秦山端拱若尸無琴書之適不修經典勸教但以至道虛無為宗其居也依崇巖幽谷鑿地為窟室弟子亦窟居去忠六十餘步五日一朝其教也以形不以言弟子受業觀形而退淮南子曰鳥飛反鄉兔走歸窟典略曰蘇秦與張儀始俱東學於齊鬼谷先生皆通經藝百家之言鬼谷弟子五百餘人為作窟深二丈曰有能獨下在窟中說使泣者則能分人主之地矣秦下說之鬼谷泣下沾𥘞秦與儀記一體也又曰董卓雖親愛呂布然時醉則罵以刀劍擊之不中而後止布恐終被害乃私與司徒王允及尚書今孫端謀養死士於窟室三年四月天子疾瘳卓詣宮賀布先置死士以邀之卓嚴駕出馬躓不肯行心怪之欲還布勸使行到宮門入掖門死士交戟刺卓墮車顧布所在布下馬曰有詔遂殺之列仙傳曰歷陽有彭祖仙窟請雨輒得也神仙傳曰李意其蜀人於成都角作一土窟居之冬夏單衣髮長剪去之皆使長五寸或百日二百日三百日不出窟郡國志曰相州隆慮山有一洞去地千仞俗謂聖人窟下有小山孤竦謂之玉女樓仙人臺亦曰香爐峰也又曰馬邑白道齊坂有土穴出泉即琴操謂飲馬長城窟也秦州記曰河崖傍有二窟一曰唐術窟深四十餘丈高四十餘丈中有三佛寺流泉浴池鑿石作丈六像三百餘區其西二里則曰時亮窟高百丈廣二十丈深三十丈亦有泉水藏古書五卷唐術時亮皆古之孝行士也又曰州圖經曰唐術窟在郡西龍支谷彼人亦罕有至者其窟內有物若似今書卷因謂之精巖巖內時見神人往還蓋古仙所居耳羌胡懼而莫敢近又謂鬼為唐術故指此為唐術窟豫章記曰豐城縣有雷孔章掘神劍窟方廣七八丈王韶之南康記曰神源下流百里有峽兩岸皆高山峽下數十里有蛟龍窟時時有霧氣耆宿云此通南康縣去此穴由百餘里嘗有宿其口者夜遇暴雨水器物乃流出彼此如其然野說文曰野郊外也周易曰龍戰于野其血玄黃又曰同人于野亨利涉大川乾行也王弼曰所以乃能同人于野亨利涉大川非二人之所能也是乾之所行也又曰上古穴居而野處後世聖人易之以宮室書曰啓與有扈戰于甘之野作甘誓又曰大野既瀦東原底平又曰伊尹相湯伐桀升自陑遂與桀戰于鳴條之野孔安國曰地在安邑之西又曰高宗夢得說審厥象傍求于天下說築傅巖之野惟肖又曰王曰來說台小子舊學于甘盤既乃遁于荒野入宅于河既學而中廢業遁居田野河洲也又曰歸馬于華山之陽放牛于桃林之野示天下弗復用又曰武王伐紂至于牧野乃誓毛詩曰野有死麕惡無禮也林有撲樕野有死鹿白茅純東又曰燕燕于飛差池其羽之子于歸送于野又曰野有蔓草零露團兮又曰葛生蒙楚蘞蔓于野豫美亡此誰與獨處毛萇曰喻婦人外成於它家謂其君子從軍未還未知死生又曰蜎蜎者蜀蒸在桑野敦彼獨宿亦在車下鄭玄曰蜀特行久處桑野有似勞苦者詩曰鴻雁于飛肅肅其羽之子于徵劬勞于野又曰鶴鳴于九皋聲聞于野又曰我行其野蔽芾其樗婚姻之故言就爾居又曰我征徂西至于艽野又曰殷啇之旅其會如林矢于牧野維豫侯興又曰京師之野于時處處干時廬旅于時言言于時語語鄭玄曰京地衆民所居之野舍其賓旅言其所當言語也又曰駉駉牧馬在坰之野韓詩外傳曰孔子出遊少原之野有婦人哭甚哀問之婦人曰向刈薪亡吾蓍簪是以哀也非傷亡簪其不忘故也禮記曰季春之月命司空曰時雨降下水上騰循行國邑周視原野修利堤防又曰舜勤衆事而野死鯀鄣洪水而殛死周禮曰大司徒之職掌建邦之土地之圖而辨其邦國都鄙之數制其畿疆而溝封之誤其社稷之壝而樹之田主各以其野之所宜木遂以名其社與其野壝壇與嵋埰也又曰惟王建國辨方正位體國經野又曰以九伐之法正邦國野荒民散則削之又曰甸師掌共野果蓏之薦又曰遂人掌邦之野凡事致野役而師田作野民師而至掌其政治禁令凡國祭祀共野牲野職凡賓客令修野道而委積委積於廬宿市經田野造縣鄙形體之法皆有地域溝樹之入野職野賦于王府又曰野廬氏掌達國道路至于四畿比國郊野之道路宿息井樹又曰大司寇之職以五刑糾萬民一曰野刑上功糾力刑亦法也功農功力勤力又曰縣士掌野合掌其縣之民數糾其戍令而聽其獄訟左傳曰辛有適伊川見被髮祭於野者曰不及百年此其戎乎其禮先亡矣又曰鄭伯亨趙孟于垂隴伯有賦鶉之賁賁趙孟曰床第之言不踰閾況在野乎非使人之所得聞又曰崔氏之亂申鮮虞僕賃於野以喪莊公楚人召之遂如楚為右尹又曰子産之從政也擇能而使之禆諶能謀謀於野則獲謀於邑則否鄭國將有諸侯之事子産乃令禆諶乘以適野使謀可否而告馮簡子使斷之又曰鸜鵒之羽公在外野往饋之焉又曰齊悼公使朱毛遷安孺子於駘不至殺諸野幕之下爾雅曰邑外謂之牧牧外謂之野春秋合成圖曰堯母慶都蓋大帝之女生於斗維之野常三河東南天大雷電有血流潤大石之中生慶都管子曰萬乘之國兵不可以無主地博大野不可以無吏野無吏則無蓄積野無田夫則人墮本業故無蓄積又曰行其田野視其耕耘計其農事而飢飽之國可知也其耕之不深耘之不謹地宜不任草田多穢耕者不必肥荒者不必墝其野草田多而闢田少者雖不水旱飢國之野淮南子曰孔子行於東野馬食農夫之稼野人怒取其馬而擊之使子貢往說之畢辭而弗能得乃使馬圉往說之野人大喜解馬而與之又曰上遊乎霄雿之野下出乎無垠鄂之門高誘曰霄雿高峻之貌也垠鄂無形之貌也霄讀縓綃雿讀若翟氏之翟也國語曰臼季使舍於冀野賈逵曰臼季晉臣冀野晉地冀缺耨其妻饁之敬相待如賓從而問之曰冀芮之子也與之歸家語曰叔孫氏之車士曰鉏啇車士將車者啇子姓也鉏啇名也採薪於大野獲麟焉折前左足載歸叔孫以為不祥棄郭外告孔子曰麇而角者何也孔子往觀曰麟也孰為來哉孰為來哉呂氏春秋曰禹東至搏木之地青差之野高誘曰青差東方之野也帝王世紀曰黃帝與神農氏戰於阪泉之野又曰炎帝殺蚩尤於中冀名其地曰絶轡之野又曰湯時大旱殷吏卜曰當以人禱湯曰吾所為謂自當遂齊戒剪髮斷爪己為牲禱於桑林之野告於上天已而雨大至又曰棄恤民勤稼蓋封地方百里巡教天下死於黑水之間潢渚之野又曰秦自非子受封至昭王滅周之歲在大梁前後七遷皆在禹貢雍州之域荊山終南敦物之野東井輿鬼之分鶉火之次也焦贛易林曰舜升大禹石夷之野徵詣王庭拜治水土又曰多載重負捐棄於野徒勞但苦顧無誰豫水經注曰自朝歌以南塈清水土地平衍據皋跨澤悉坶野矣郊說文曰距國百里曰郊爾雅曰邑外曰郊易曰密雲不雨自我西郊又曰同人于郊無悔詩曰子子干旄在浚之郊又曰逝將去汝適彼樂郊禮記月令曰立春之日天子親率公卿諸侯大夫以迎春於東郊又曰天子親耕於南郊以共粢盛王后蠶於北郊以共純服諸侯耕於東郊亦以共粢盛夫人蠶於北郊以共冕服又曰因吉土以饗帝于郊周禮曰閭師掌國中及四郊之民六畜之數以任其力以待其政今以時徵其賦又曰正歲帥其屬而慮禁令于國及郊野去國百里為郊郊外曰野又小宗伯之職掌建國之神位若大甸則帥有司而饁獸于郊有司大司馬之屬饁饋也以禽饋四方之神於郊漢書曰王莽天鳳四年八月莽親之南郊鑄作威斗其日大寒百官人馬有凍死者老子曰天下無道戎馬生於郊
