body:
  text: 刑法部十四黥尚書呂刑曰墨辟疑赦其罰百鍰孔安國曰刻其顙而涅之曰墨刑疑則赦從罰六兩曰鍰鍰黃鐵也尚書刑德放曰𣵠鹿者竿人顙也黥者馬羇竿人面也鄭玄曰𣵠鹿黥皆先次刀笠傷人墨市其中故後世謂之墨土民也尚書大傳曰非事之事入不以道義而誦不祥之辭者其刑墨注曰非事而事之今所不當得為也周禮秋官司刑職曰墨者使守門鄭玄曰墨黥也先刻面以墨窒之白虎通曰墨墨其額也取法火之勝金也得火亦變而墨也說文曰黥刑在面也史記曰秦太子犯法衛鞅曰法之不行自上犯之將刑太子君嗣也不可施刑刑其傅公子虔黥其師公孫賈明日秦民皆隨令行之十年秦民大悅道不拾遺山無盜賊民勇於公戰怯於私鬥又曰黥布秦時為布衣年少客相之當刑而王及壯坐黥布欣然笑曰人相我當刑而王幾是乎漢書曰文帝除肉刑當黥者髡為城旦舂律說曰男女論決髡鉗輸邊晝日防寇虜夜暮築長城女子無軍警之事但舂食徒者也又曰黥劓之罪不及大夫故里諺曰欲投鼠而忌器器君也大夫近於君晉令曰奴婢亡加銅青若墨黥黥兩眼後再亡黥兩頰上三亡撗點目下皆長一寸五分廣五分唐通典曰梁制劫身皆斬妻子補兵遇赦降死者黵面為劫字黵音都咸反十四年又除黵面之刑劓尚書呂刑曰劓辟疑赦其罰惟倍也孔安國曰劓截鼻者也尚書大傳曰觸易君命革與服制度姦兇攘傷人者其刑劓鄭玄曰攘竊也周禮秋官司刑職曰劓罪五百鄭玄曰劓截鼻令今東夷或以墨劓為俗古刑人亡逃者之類與劓者使守關禮統曰劓刑法木勝土決其皮革也白虎通曰劓劓其鼻也法木之穿土也去鼻亦孔見漢書曰文帝除肉刑當劓者笞三百楚漢春秋曰正疆數言事而當上使參乘解玉劍以佩之天下定出以為守有告之者上曰天下方急汝何在曰亡上曰正疆沐浴霜露與我從軍而汝亡告之何也下廷尉劓臏尚書大傳曰決關梁踰城郭而略盜者其刑臏尚書刑德放曰臏者脫去人之臏也臏罰之屬五百象七精七宿昏中變易節氣之精也禮統曰臏刑法金勝木去其節目也周禮秋官上司刑曰刖罪五百鄭玄注曰周改臏作刖白虎通曰臏者脫其臏也取法金之刻木也風俗通曰俗說臈正祖食得兔者名之曰幸幸者善祥令人吉利也或說兔髕者令人面皃生髕露見醜惡今覺得之嘉不為己疾也謹案尚書夏禹始作肉刑則天象而慎其過故穿踰盜竊者髕去其臏骨也逮至暴秦亂獄糺紛烹俎車裂黔首窮愁飲泣永歎凡人食得兔髕以為佳瑞物類以感冀全己之臏也刖尚書呂刑曰剕辟疑赦其罰倍差孔安國曰刖足曰剕也周禮秋官司刑職曰刖罪五百鄭玄曰刖斷足也周改臏作刖也刖者使守門家語曰季羔為衛士師刖人之足俄而衛亂李羔逃刖者守門焉曰被有缺季羔曰君子不踰曰彼有竇季羔曰君子不隊曰此有室季羔入焉既而問其故刖者曰斷足固我罪也臨當刑君愀然不樂見於顏色此臣之所以脫君也史記曰孫臏與龐涓學兵法龐涓既事魏得為惠王將軍而自以為能不及孫臏陰使召孫臏臏到龐恐其賢以刑法斷其兩足而黥之欲隱而勿見齊使者如梁孫臏以刑徒陰見說齊使以為奇竊載與之齊列子曰魯施氏有二子其一好學其一好兵好學者以術干齊侯齊侯以為公子傅好兵者以法干楚王楚王以為軍政鄰人孟氏有二子所業亦同問施氏之方施氏告之一子以術干秦王秦王曰今諸侯力爭安得用仁義遂宮而放之一子以法干衛侯衛侯曰吾弱國豈可稱兵遂以刖之二人讓施氏曰子不得時也韓子曰楚人和氏得璞玉於楚山之中獻之武王武王使玉人相之曰石也王以和為慢刖其左足及文王即位和又奉其璞王又使玉人相之又曰石也文王刖其右足文王薨成王即位和乃抱其璞而哭於荊山之下三日三夜泣盡而繼之血成王問其故曰天下刖者多矣子何哭之悲也和曰吾非悲刖也夫寶玉而題之以石直士命之以慢此吾之所以悲也王乃使玉人剖其璞而得寶焉遂名曰和氏之璧宮割尚書呂刑曰宮辟疑赦其罰六百鍰宮淫刑也男子割勢婦人幽閉次死之刑也尚書大傳曰男女不以義交者其刑宮尚書刑德放曰宮者女子淫亂執置宮中不得出割者丈夫淫割其勢也已周禮秋官上司刑職曰宮罪五百宮者丈夫割其勢女子閉於宮若今官男女也又掌戮曰宮者使守內也以其人道絕也今世或然禮曰文王世子曰公族無宮刑也漢書曰漢聞李陵降匈奴上怒甚群臣皆罪陵上以問太史令司馬遷遷盛言陵事親孝與士信嘗奮不顧身以殉國家之急彼之不死宜欲得當以報漢也初上遣貳師大軍出財令陵為助兵上以遷誣罔欲沮貳師為陵遊說下遷腐刑造肉刑尚書呂刑曰王享國百年耄荒度作刑以詰四方度時世所宜訓作贖刑以治天下四方之民王曰若古有訓蚩尤惟始作亂延及干平民罔不寇賊鴟義姦宄奪攘矯虔為鴟梟之義以宄奪攘苗民弗用靈制以刑惟作五虐之刑曰法殺戮無辜爰始淫為劓刖椓黥三苗之主頑凶苦吳敢行虐刑以殺戮無罪於是始大為截人耳鼻椓陰黥面以加無辜故曰五虐商君書曰斷人之足黥人之面非求傷民也以禁姦止過故禁姦止過莫若重刑除肉刑漢書曰齊太倉令淳于公有罪當刑詔獄還繫長安淳于公無男有五女當行會逮罵其女曰生子不生男緩急非有益也其少女緹縈自傷悲泣迺隨其父至長安上書曰妾父為吏齊中皆稱其廉平今坐法當刑妾傷夫死者不可復生刑者不可復屬雖欲改過自新其道無由天子憐悲其意遂下令曰制詔御史蓋聞有虞氏之時畫衣冠異章服以為戮而民不犯何法之至也今法有肉刑三孟康曰黥劓二左右趾合一凡三也而姦不止其咎安在無乃朕德之薄而教不明與夫刑至斷支體刻肌膚終身不息息生也何其刑之痛而不德也豈為民父母之意哉除肉刑者有以易之丞相張蒼御史大夫馮敬奏言肉刑所以禁姦所由來者久矣陛下下明詔憐萬民之一有過被刑者終身不息及罪人欲改行為善而道亡繇至於盛德臣等所不及也臣謹議請定律曰諸當完者完為城旦舂文帝除肉刑皆有以易之故以完易髡以笞代劓以左右趾代刑此言髡者完之也當黥者髡鉗為城旦舂當劓者笞三百當斬左趾者笞五百當斬右趾及殺人先自告及吏坐受賕枉法守縣官財物而即盜之已論命復有笞罪者皆棄市命者名也成其罪也趾足也當斬右足以其罪次重故從棄市也殺人先自告謂殺人而自首吏受賕枉法守縣官財物而盜之者此三罪已論名而又犯笞罪即皆棄市也罪人獄已決完為城旦舂滿三歲為鬼薪白粲鬼薪白粲一歲為隸臣妾隸臣妾一歲免為庶人應劭曰取薪給宗廟為鬼薪白粲生擇使正白粲然論肉刑續漢書曰時論者多欲復肉刑孔融乃建議曰古者敦庬善否區別吏端刑清政無過失百姓有罪皆自取之末世陵遲風化壞亂政撓其俗法害其民故曰上失其道民散久矣而欲繩之以古刑投之以殘棄非所謂與時消息者也紂斮朝涉之脛天下謂為無道夫九牧之地千八百君若各刑一人是天下常有千八百紂也求俗休和弗可得已且被刑之人慮不念生志在思死類多趣惡莫復歸正風沙亂齊伊戾禍宋趙高英布為世大患不能正人遂為非也故明德之君遠度深惟棄短就長不茍革其政者也朝廷善之卒不改焉魏志曰鍾繇上䟽曰大魏受命繼蹤虞夏孝文革法不合古道先帝聖德固天所縱典墳之業一以貫之是以繼世仍發明詔思復古刑為一代法連有軍事遂未施行陛下遠追二祖遺意惜斬趾可以禁惡恨入死之無辜使明習律令與群臣共議出本當右趾而入大辟者復行此刑書云皇帝清問下民鰥寡有辭於苗此言堯當除蚩尤有苗之刑先審問於下民之有辭者也若今蔽獄之時訊問三槐九棘群吏萬民使如孝景之令其當棄市欲斬右趾者許之其黥劓左趾宮刑者如孝文易以髡笞能為姦者率年二十至四五十雖斬其足猶任生育令天下人少於孝文之世下計所金歲三千人張蒼除肉刑所殺歲以萬計臣欲復肉害刑歲生三千人䟽奏詔曰太傅學廣才高留心政事文於刑理深遠此大事公卿群僚善共平議司徒王朗議以為繇欲輕減大辟之條增益刖刑之數此則起偃為豎化屍為人矣然臣之愚猶有未合微異之意夫五刑之屬著在科律科律自有減死一等之法不死即為減死施行已久不待遠假斧鑿於彼肉刑然後罪次也前世仁者不忍肉刑之慘酷是以廢而不用不用已來歷年數百今復行之恐其所減之文未彰於萬民之目而肉刑之問已宣於寇讎之耳非所以來遠人也議者百餘人與朗同者多帝以吳蜀未平且寢王隱晉書曰曹彥議云嚴刑以殺犯之者寡刑輕易犯蹈惡者多臣謂玩常茍免犯法乃眾黥刖彰刑而民甚恥且創黥刖見者知禁彰罪表惡亦足以畏所以易曰小懲犬大戒豈蹈惡者多耶假使惡多尚不至死無妨產育茍必行殺為惡縱寡而不已將至無人天無以神君無以尊矣故人寧過不殺是以為上寧寬得眾若乃于張聽訟刑以止刑可不革舊過此以往肉刑宜復肉刑於死為輕減死五百為重重不害生足以懲姦輕則知禁禁民為非所謂相濟經常之法議云不可或未知之也又曰尚書梅陶問光祿大夫祖納漢文帝故當為英雄既除肉刑而五六百歲無能復者納荅曰諸聖制肉刑而漢文擅除已來無勝漢文帝者故不能復非聖人者無法何足為英雄於是陶不能對隱白征西大將軍曰夫政未可立則思制度全育民命富國強兵叛盜之屬斷支而已是好生惡殺叛盜皆死是好殺惡生也斷支若謂之酷截頭更不謂之虐何其乖哉刑罰不中則民無所措手足也蠻夷猾夏則皋陶作士此欲善其末則先制其本也自古多人猶惜民命得以御寇況今千不遺一益宜存在以伐大賊今若得改之則歲活數萬生數亦如之若此十載生各數萬斷支之後隨刑使役不失民不乏用富國強兵此之謂也又曰劉頌上書曰古者刑以止刑及今反於刑生刑以徒生徒諸重犯亡者髮過三寸輒重髡之此以刑生刑亡加作一歲此以徒生徒也亡者積多繫囚猥蓄議者因曰不可不赦復從而赦之此為刑不制罪法不勝姦民知法之不勝相聚而謀為不軌故自頃以來姦惡陵暴所在充斥漸以滋蔓日積不已弊將所歸議者不深思此故而曰肉刑於名忤聽忤聽孰與盜賊不禁聖王之制肉刑遠有深重其事可得而言非徒懲其畏剝割之痛而不為也乃去其為惡之具使夫姦民無用不復肆其志止姦絕本理之盡也亡者刖其足無所用復亡盜者截其手無所用復盜淫者割其勢理亦如之除惡塞源莫善於此又非徒然也此等已刑之後便各歸家父母妻子共相養恤瘡愈可役上准古制隨宜業作雖已刑殘不為虐也生育繁阜之道自若也今宜取死刑之限輕及三犯逃亡淫恣悉以肉刑代之其三歲刑以下宜杖罰及宜制其罰數使有常限後刑不復生刑徒不復生徒而殘體為戮終身作誡民見其痛畏而不犯必數倍於今且為惡者隨發被刑去其為惡之具豈與全其為姦之手足而戚居必死之窮地同哉而猶曰肉刑不可用臣切以為識務之甚也博物志曰肉刑明王之制荀卿每論之漢興文帝感太倉公女之言而廢之班固著論云宜復之迄漢末魏初陳紀又論宜申古制孔融謂不可復魏武帝輔漢欲申之鍾繇王朗不同遂寢夏侯玄李勝曹義達丁謐建私議各有彼此多言時未可復故遂寢崔寔政論曰高祖非九章之律高后深三族之罪文帝去肉刑景帝減加笞由此言之世有所更何獨拘前
