body:
  text: 香部三槐香嵇含槐香賦序曰余以太簇之月登於歷山之陽仰眺崇巒俯視幽坂乃覩槐香生蒙楚之間曾見斯草殖於廣夏之庭或披帝王之圃怪其遐棄遂遷樹于中唐華麗則殊彩阿郍芳實則可以藏書又感其棄本高崖委身階庭似傳說顯殷四叟歸漢故因實制名蒙蒙綠葉搖搖弱莖蘭香易曰同心之言其臭如蘭蘭芳也易卦通驗曰冬至廣莫風至蘭始生說文曰蘭香草也韓詩曰溱與洧說文云詩人言溱與洧方盛流洹洹然謂三月桃花水下之時士與女方盛流秉蘭兮秉執也蘭簡也當此盛流之時眾姓與眾女方執蘭而拂除鄭國之俗三月上巳之日此兩水之上招魂續魄拂除不祥大戴禮夏小正曰五月蓄蘭為沐浴禮曰婦人或賜之茞蘭則受而獻諸舅姑左傳曰鄭文公有賤妾曰燕姞夢天使與己蘭曰余為伯儵余而祖也以是為而子以蘭有國香人服媚之既而文公見之與之蘭而御之辭曰妾不才幸而有子將不信敢徵蘭乎姞曰諾生穆公名之曰蘭論撰考讖曰漸於蘭則芳漸於鮑則臭史記曰冬至短極蘭根出蜀志曰先主殺張裕諸葛亮救之先主曰芳蘭當門不得不鋤晉書曰惠帝時溫縣有人如狂造書曰兩火沒地哀哉秋蘭歸形街郵終為人歎及楊駿已死楊后被廢賈后絕其膳八日而崩葬街郵亭北百姓哀之兩火武帝諱蘭楊后字也宋書曰劉湛欲袁淑附己而淑不為改意由是大相乖失淑乃賦詩曰種蘭忌當門懷壁莫向楚楚少別玉人門非種蘭所晏子春秋曰曾子將行晏子送之曰嬰聞君子贈人以財不若以言吾請以言乎夫蘭本三年而成湛之若滫則君子不近庶人不佩湛之麋醯而駕征馬矣非蘭本美也願子必求所湛蘇子曰蘭以芳自燒膏以肥自焫而悅切翠以羽殃身蚌以珠致破文子曰日月欲明浮雲蓋之叢蘭欲脩秋風敗之又曰蘭芷不為莫服而不芳與君子行遊苾兮如入蘭芷之室久而不聞則與之化矣范子計然曰大蘭出漢中蘭輔出河東弘農白者善孫卿子曰人之親我欣若父母其好我芬若椒蘭淮南子曰兩心不可以得一人一心可以得百人男子樹蘭美而不芳蘭芳草女之美芳也男子樹之蓋不繼子得食肥而不澤繼子假母也精不相與往來也淮南子曰蘭生幽宮不為莫服而不芳抱朴子曰人鼻無不樂香故流黃鬱金芝蘭蘇合玄膳索膠江籬揭車春蕙秋蘭價同瓊瑤而海上之女逐酷臭之夫家語孔子曰芝蘭生於深林不以無人而不芳君子修道立德不為困窮而改節為之者人也死生者命也語林曰謝太傅問諸子姪曰子弟何豫人事而政欲使其佳諸人莫有言者車騎荅曰譬如芝蘭玉樹欲使其生於庭階耳又曰毛伯成既負其才器常稱寧為蘭摧玉折不作蕭芳茇榮羅含別傳曰含致仁還家庭中忽自生蘭此德行幽感之應蔡質漢官儀曰尚書郎懷香握蘭趍走丹墀盛弘之荊州記曰都梁縣有小山山上水極淺其中悉生蘭草綠葉紫莖芳風藻谷俗謂蘭為都梁即以號縣云本草經曰草蘭一名水香久服益氣輕身不老楚辭曰余既滋蘭之九畹兮滋蒔也二十畝為畹又曰扈江離與辟芷兮扈被也楚人名披曰扈離薜芷皆香草名也紉秋蘭以為佩紉細又曰沅有芷澧有蘭言沅水之中有盛茂之芷禮水之中有芬芳之蘭喻湘夫人美好亦異於眾人也欲思公子未敢言又曰秋蘭兮蘪蕪羅生兮堂下綠葉兮素枝芳菲兮襲子秋蘭兮青青綠葉兮紫莖滿堂兮美人忽獨與余兮目成又曰光風轉蕙泛崇蘭趙壹疾邪賦曰勢家多所宜欬唾自成珠被褐懷珠玉蘭蕙化為芻張衡怨詩曰秋蘭嘉美人也嘉而不獲用故作是詩也猗猗秋蘭植彼中阿有馥其芳有黃其葩雖曰幽深厥美彌嘉之子之遠我勞如何酈炎詩曰靈芝生河洲動搖回洪波秋蘭榮何晚嚴霜害其柯哀哉之芳草不植太山阿琴操曰猗蘭操者孔子所作也孔子聘諸侯莫能任自衛反魯過億谷之中見薌蘭獨茂喟然歎曰夫蘭當為王者香今乃獨茂與眾草為伍乃止車援琴鼓之自傷不逢時託辭於香蘭云晉傳玄詠秋蘭詩曰秋蘭蔭玉池池水清且芳雙魚自踴躍兩鳥時徊翔晉王羲之蘭亭記曰永和九年歲在癸丑暮春之初會于會稽山陰之蘭亭修褉事也蘪蕪說文曰江蘺蘪蕪也楚謂之蘺晉謂之𧄤軒嬌切齊謂之茝爾雅曰蘄茝蘪蕪郭璞曰香草也葉小如萎狀淮南子曰似虵床山海經曰臭如蘪蕪春秋運斗樞曰維星散為蘪蕪淮南子曰亂人者若虵床之與蘪蕪山海經曰洞庭之山其草多蘪蕪廣志曰徵蕪香草魏武帝以藏衣中吳氏本草曰蘪蕪一名芎窮古詩曰上山採蘪蕪下山逢故夫郭璞讚曰蘪蕪善草亂之虵床不隕其貴自別以芳蕙草廣雅曰皇草蕙草也山海經曰天帝之山其下多菅蕙菅似茅升山其草多蕙廣志曰蕙草綠葉紫華魏武以為香燒之楚辭曰光風轉蕙泛崇蘭又曰既滋蘭九畹又樹惠之百畝司馬相如子虛賦曰於是乃相與撩於蕙圃盤姍勃窣皆草間行貌姍音蘇寒切窣蘇骨切上金隄䔾車爾雅曰䔾車䒗音乞輿也郭璞曰䔾車香草也見離騷說文曰䔾䔾輿也䔾音乞廣志曰䔾車黃葉白華出徐州楚辭曰畦留夷與䔾車雜杜蘅與芳芷杜蘅山海經曰天帝之山有草焉其狀如葵臭如蘪蕪名杜蘅香草也可以走馬郭璞曰帶之令人便或曰馬得之而健走食之而癭爾雅曰杜土鹵也郭璞曰杜衡也似葵而香也唐書曰貞觀中度支郎以宋謝朓詩云芳洲多杜若乃下坊州令貢州判司報云坊州不出杜若應由謝朓詩誤太宗聞之大笑判司改雍州司法度支郎免官廣雅曰杜蘅杜若也范子計然曰杜若出南郡漢中大者善本草經曰杜若一名杜衡白芷山海經曰號山其草多藥郭璞注曰藥白芷也一名香草也廣雅曰白芷葉謂之藥淮南子曰今鼓舞者便媚擬神擬象也身若秋藥被風藥白芷香草被風言其弱髮若結旌屈而復舒范子計然曰白芷出齊郡以春取黃澤者善也本草經曰白芷一名芳香味辛溫生河東吳氏本草曰白芷一名𧄤許嬌切一名符離一名澤分一名葩楚辭曰獻歲發春兮汨吾南征綠蘋葉齊兮白芷生又曰桂楝兮蘭撩辛夷楣兮藥房又曰掔木根以結芷兮掔持也貫薜荔之落蘂貫抬也薜荔香草蕊實也佩結香香拾其花心次表己之忠信也荃香楚辭曰荃不察余之中情兮荃香草以喻君被服芬香故以香草為喻反信讒而齊怒齊疾也又曰荃撓兮蘭旗薰香左傳曰晉獻公以驪姬為夫人卜人曰一薰一蕕十年尚猶有臭薰香草也山海經曰浮山有草焉麻葉而方莖赤華而黑實臭如麋無名曰薰草也廣雅曰鹵薰也其葉謂之惠魏略曰大秦出薰草蘇子曰象以牙喪身不能去其白薰以芳自燒不能去其香淮南子曰以潔白為汙辱譬猶沐浴而杼溷薰燧而負彘燒薰自香楚人謂之薰燧也抱朴子曰常以執日取天井上土以和柏葉薰草以泥門戶方一尺則盜賊不來西京雜記曰漢掖庭有綠熊席其席皆長一丈餘眠而擁毛自蔽望其不能見坐則沒膝其中雜諸薰香一坐此席餘香百日不歇成公綏宣清賦曰哀薰草之見焚兜末香漢武故事曰西王母當降上燒兜末香兜末香兜渠國所獻如大豆塗門香聞百里關中常大疾疫死者因生反生香真人關尹傳曰老子曰真人遊時各坐蓮華之上華徑一丈有反生靈香逆風聞三十里驚精香十洲記曰藂窟洲在西海中上有天山形似鳥之狀因名為人鳥山山中多大樹與桐相似而秀芳華蕊香聞百里因名返魂樹叩其樹樹能作聲如牛呴聞者必震駭伐其木根於玉釜中煮取汁更微微以火熟煎如黑飴令可丸名曰驚精香或名震靈丸亦名返生香亦名卻死香氣聞數百里死屍在地聞氣即活延和六年春西胡月氏國王遣使者獻香四兩大如雀卵黑如桑椹帝以香國中所乏以付庫白蛤貍異物志曰白蛤貍刳其外韋囊以酒洒而陰乾之其氣如麝若雜真麝中鮮有別者藁本香水經曰三城水又經香陘山山上悉生藁本香世故名焉神精香郭子橫洞冥記曰元朔二年波祗國亦名波弋國獻神精香草一名荃麋一名春蕪一根五百條其枝間如竹節柔軟其皮如絲可以為布所謂春蕪布亦曰香荃布堅密如紈也掘之一斤滿宮皆香婦人帶之彌為香馥龜甲香任昉述異記曰龜甲香即桂香嘉者一名紫木香一名金杜香一名蘪草香出蒼梧桂林二郡界今吳中有麋草似藍而甚芳香
