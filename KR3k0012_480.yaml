body:
  text: 人事部一百二十報恩毛詩曰投我以木瓜報之以瓊琚匪報也永以為好也又曰無言不酬無德不報左傳曰靈公將殺趙盾伏甲而饗之初宣子田於首山舍翳桑見靈輒餓問其病曰不食三日矣食之既而為公介倒戟以御公徒而免之問何故曰翳桑之餓人也又曰晉大夫魏武子有寵妾無子武子疾命其子顆曰我死必嫁之及其疾困曰以殉武子卒顆嫁之曰疾困則亂吾從其治也其後及秦戰於輔氏大敗秦師獲杜回方戰見一老父結草以抗杜回杜回秦之力士杜回躓而顛故獲之夜夢一老人謂己曰豫汝嫁妾之父也爾用先人治命故以是報戰國策曰中山君饗都大夫司馬子期在焉羊羹不遍子期怒而走於楚說楚以伐中山中山君亡走有二人挈戈隨其後者君顧二子奚為對曰臣父嘗餓且死君下壺飱餔臣父且死言曰中山有事汝必死之故來死為君也中山君慨然曰吾以一杯羹亡國以一壺飱得二人史記曰王稽載范睢入秦為相睢乃入言之王曰非王稽之忠莫能內臣於函谷關非大王之賢聖莫能貴臣今臣官至於相爵在列侯王稽之官尚止於謁者非所以內臣之意也王召稽拜以為河東太守又曰袁盎自為吳相時有從吏嘗盜盎侍兒文穎云婢盎知之不泄遇之如初人有告從吏言君知爾與侍者通乃亡歸盎自追還遂以侍者賜之及袁盎使吳見守從吏適為守盎校尉司馬乃悉以其齎裝置二石醇醪會天寒士卒飢渴飲酒醉西南陬卒皆臥司馬夜引袁盎起曰君可以去矣吳王期旦日斬君盎不信曰公何為者司馬曰臣故為從吏盜君侍兒者盎乃驚謝之而去又曰蘇秦既貴乃遍報諸所嘗見德者其從者有一人獨未得報乃前自言蘇秦曰我非忘子子之至燕再三欲去我易水上方是時我困故望子深是以後子子今亦得矣又曰項王使召韓信信謝曰臣事項王官不過郎中位不過執戟言不聽畫不用故去而歸漢漢王授我上將軍印與我數萬衆解衣衣我推食食我言聽計用故吾得以至於此夫人深親信我我背之不祥雖死不易漢書曰高祖為亭長送徒咸陽諸吏皆送錢三百蕭何獨以五百上定天下益何封三千戶以答其二又曰欒布彭越嘗與遊窮困賣傭為酒家保彭越贖布為梁大夫使干齊未反漢召彭越責以反夷三族梟首雒陽下詔有收視者輒捕之布還奏事彭頭下祠而哭之又曰高祖奪韓信齊轉為楚王都下邳信至國召所從食漂母賜千金及其下鄉亭長錢百曰公小人為德不竟史記云為惠不終也又曰張蒼陽武人有罪當斬解衣伏鑕身長大肥白如瓠時王陵見而怪其美士乃言沛公赦勿斬以為常山相蒼德王陵及貴父事陵陵死蒼為丞相洗沐常先朝陵夫人上食然後敢歸前列曰蓋寬饒左遷為衛司馬未出殿門斷其單衣令短離地冠大冠帶長劍躬按行士卒廬室視飲食居處有疾病者身自臨問加致醫藥遇之甚有恩及歲交代上臨饗罷衛卒數十人皆叩頭自請復留更一年以報寬饒厚德宣帝嘉之拜寬饒為太中大夫又曰朱買臣為會稽太守悉召見故人與飲食諸嘗有恩者皆報復焉又曰宣帝在長安獄中邴吉保護養視上知吉有舊恩而終不言時賢之詔曰御史大夫與朕有舊恩厥德茂焉詩不云乎無德不報其封吉為博陽侯食邑千三百戶又曰陳平既貴寵封侯乃詔高祖曰臣不因魏無知無以得見陛下請分報又曰張賀幸於衛太子太子敗賀下蠶室後為掖庭令而宣帝收養掖庭賀拊循恩甚密及宣帝即位而賀已死上追思德賀一子早子孺小男彭祖指欲封之先賜爵關內侯東觀漢記曰建武二十六年上延集內戚宴會諸夫人各前言為趙喜所濟活帝甚嘉之後徵嘉入為太僕引見謂曰卿非但為英雄所保也婦人亦懷卿之恩厚加賞賜袁宏後漢書曰鄭弘字巨君少事博士焦貺貺門徒數百人當舉明經其妻勸貺曰鄭生有卿相才應此舉者也從父楚王英之謀反遍誣天下知名者貺以楚徵疾病道死妻子閉詔獄考掠連年諸生故人皆易姓名以避其禍弘獨髡首負鑕為貺訟罪明帝感悟乃免貺家屬魏志曰太祖平幽州召孫禮為司空軍謀掾初荒亂時禮與母相失同郡馬臺求得禮母禮推家財盡以與台又曰楊沛字孔梁為新鄭長謂民益蓄桑椹勞豆積浸得千餘斛後為鄴令賜其生口十人絹百匹又曰曹真字子丹沛郡人本姓秦養曹氏或云其父伯南宿與太祖善興平袁術部黨與太祖相攻劫太祖出為寇所追走入秦氏伯南開門受寇問所在答云我是寇遂害之由此太祖思其功遂變其姓又曰郭援捕得賈達達不肯拜謂援曰王府君臨郡積年不知足下曷為者也援曰捉斬之諸將覆護乃囚之閉著土窟中以車輪蓋上使人圍守方且殺之達從窖中謂守者此間無健兒也而當使義士死時祝公道與達非故而適聞其言憐其守正乃夜盜引出折械遣去不語其姓名援破後達知前出己者是祝公道河南人後坐它事當伏法達救不能解為之改服吳録曰孫權既斬黃祖作二函欲以盛祖及都督蘇飛首甘寧之在祖軍也獨飛厚之寧為請叩頭流血主曰為君置之若走如何對曰飛受更生之恩豈圖去若有萬一寧頭當代入函也乃舍之蜀志曰法正為蜀郡太守楊武將軍外統都督內為謀主一餐之德睚眥之怨無不報復或謂諸葛亮曰法蜀郡太縱橫將軍宜啓主公抑其威福亮答曰主公之在公安也北畏曹操之強東憚孫權之逼近則懼孫夫人生變於肘腑之下當斯之時進退狼跋法孝直為之傳翼令翻苒不可復制如何禁法使不得行其意耶晉書顧榮與同寮宴飲見執炙者貌狀不凡有欲炙之色榮割炙啖之坐者問其故榮曰豈有終日執之而不知其味及倫敗榮被執將誅而執炙者為督救免之干寶晉紀曰王濬在巴郡兵民苦役生男多不舉濬乃嚴其殺子之防而厚恤之所育者數千人於此能稱兵矣父母戒之曰王府君生爾必勉之無愛死宋書王鎮惡嘗寄食澠池人李方家善遇之謂方曰若遭遇英雄主要取萬戶侯當厚相報方答曰君丞相孫人才如此何患不富貴陳書曰陰鏗釋褐梁湘東王法曹參軍天寒鏗嘗預賓友宴飲見行觴者因回酒炙以授之衆坐皆笑鏗曰吾儕終日酣飲而執爵者不知其味非人情也及侯景之亂鏗嘗為賊所擒或救之獲免鏗問其故乃前所行觴者唐書曰李晟嘗有恩者厚報之初談元澄為嵐州刺史有恩於晟後坐貶於嶽州比晟貴上疏理之詔贈元澄寧州刺史元澄三子晟撫侍勤至皆為成就官學人皆義之吳越春秋曰吳師入郢引軍擊鄭定公前既殺楚太子建而困子胥故怨鄭兵將入境定公大懼乃令於鄭邦中曰有能還吳軍者吾與之分邦而治漁者子聞而進之曰臣能還之不用兵戈升糧得一橈行歌道中即還矣定公大悅乃與一橈子胥軍將至漁者子當路叩橈行歌辭曰蘆中人蘆中人子胥聞之大驚曰何等人者即請與語曰吾是漁者子吾國君怖懼令於國中有能還吳軍吾與之分國而治臣念先人與君相遭於途今從君乞鄭之罪也子胥曰吾蒙子先人之恩自致於此上天蒼蒼豈敢忘子之功乎於是乃釋鄭不伐又曰伍子胥伐楚還溧陽瀨水之上長嘆曰吾嘗飢於此乞食而殺一婦人將欲報之金不知其家遂投金瀨水之中而去有頃一嫗行哭而來問曰嫗何哭之悲也嫗曰吾有女守吾年三十不嫁往年擊漂於此遇人窮飯之而恐泄事自投於瀨水中而死今聞伍君來不得其家自傷空而無為報者故行哭之悲也人曰子胥欲報嫗以百金不知嫗所在投金水中而去嫗乃取金以歸也劉向說苑曰吳赤布使於智氏假道於衛寧文子具紵絺三百製送之將歸吳智伯命造舟為梁赤布曰吾聞天子濟於水造舟為梁諸侯方舟大夫維舟臣之職也且敬大其必有故使人視之則用兵在後赤布曰衛假吾道而厚贈我我見難不告是與為謀也稱疾而留使人告衛衛人驚戒智伯乃止又曰楚莊王賜群官酒日暮燈燭滅有引妾衣者妾得其冠纓持之趍火來上視絶纓者王曰賜人酒使醉失禮奈何欲顯婦人節而辱士乎乃令曰夜飲不絶纓者不歡群臣百餘人皆絶纓乃大醉盡欣居二十年晉與楚戰有一臣常在前五合五獲甲首卻敵卒勝怪而問之對曰臣當死往醉失禮王隱不誅也終不敢以陰蔽之德而不顯報常願肝膽塗地用頸血湔敵人矣臣乃絶纓者也遂平晉軍楚得以強又曰陽虎得罪於衛北見簡子曰自今以來不復樹人矣簡子曰唯賢者為能報恩不肖者不能夫春樹桃李者夏得休息秋得食焉樹蒺藜者夏不得休息秋得其剌焉今所樹者蒺藜也異苑曰景平中東陽大水永康人蔡嘉夫避住南壟夜有大鼠形如浮水而來徑伏嘉夫床角奴愍而不犯每食轉以餘飯與之水勢退嘉夫得反居鼠以前腳棒青紙裏三斤許珠著奴前啾啾狀如欲語從此去來不絶也又曰始興楊山縣人行田忽遇一象以鼻卷之遙入深山見一象腳有巨剌此人牽挽得出病者即起相與局陸狀若歡喜前象復載就一汙濕地以鼻掘出數枝長牙送還本處彼境苗稷常為象所困其象俗呼大客因語云我田稼在此恆為大客所犯若念我者勿見侵便覺躑躅如相訓解於是一家業絶無其患三秦記曰白鹿原人釣魚於原綸絶而去夢於漢武求去其鉤明日戲於池見大白魚銜索帝曰豈非昨所夢取而去之間三日帝復遊池濱得明珠一雙武帝曰豈非昔魚之報桓沖之述異記曰陳留周氏婢名興進入山取樵夢見一女語之曰近在汝頭前目中有剌煩為拔之當有厚報婢見一朽棺頭穿壞髑髏墮地草生目中便為拔草內著棺中以甓塞穿即於髑髏處得一雙金指環吳均續齊諧記曰弘農楊寶見一黃雀為鴟梟所搏取之以歸置巾箱中養之百餘日毛羽成朝去暮還後寶夕讀書未臥有黃衣童子向寶再拜曰我王母使臣昔使蓬萊不慎為鴟梟所搏蒙君仁愛救拯今當受使南海不得奉侍以白環四枚與寶令君子孫潔白且位登三事當如此環矣東陽元凝齊諧記曰富陽董昭之嘗乘船過錢塘江中央見有一蟻著一短蘆甚迫遽昭之曰此畏死也便以繩繫此蘆著船頭蟻緣繩出中夜夢一人烏衣從百許人來謝云僕不慎墮江慚君濟活僕是蟻中王君若急難之日當見告後昭遇事繫獄蟻穴獄昭遂得脫盛弘之荊州記曰隨侯曾得大蛇不殺而遣之蛇後銜明月珠以報隨侯一名隨侯珠孔靈符會稽記曰射的山南有白鶴山此鶴為仙人取箭漢太尉鄭弘嘗採薪得一遺箭頃有人覔弘還之問何所欲弘曰常患若耶溪載薪為難願旦南風夕北風後果然劉義慶幽明録曰項縣人姚牛年十餘歲父為鄉人所殺牛手刃之於衆中吏捕得官長深矜孝節為推遷其事會赦得免令後出獵逐鹿入草中有古深穽數處馬將趣之忽見一公舉杖擊馬馬驚僻不得及鹿令怒引弓將射之公曰此中有穽恐君墮耳令曰汝為何人翁跪曰姚牛父也感君活牛故來謝恩遂滅不見又曰符堅時有射師經嵩山望見松上有一雙白鳥似鵠而大至樹下又見一蛇長五丈許上樹取鳥鳥欲飛蛇張口翕之鳥不去繽紛一餐頃射師彀弩射三矢蛇落鳥得去樹百餘步山邊整理毛羽須臾雲雷發射師懾不得旋踵見向鳥徘徊其上毛落紛紛似如相援如此數陳雲息電滅射師得免鳥亦高飛三輔決録曰高陵龐智伯名勃為郡小吏東平衡農字剽卿為書生窮乏客煆於勃家勃知其賢禮待顧待眷常去送十里過舅家復貸錢贈之農受曰為馮翊乃相報別七八年果為馮翊勃為門下書佐忘之矣農召問乃寤舉孝廉為尚書郎左右丞魏郡太守河內太守又曰趙歧避難於四方江海岱霍無所不到自匿姓名布衣巾絮賣餅北海市安丘孫嵩年二十餘遊市見趙歸微察知非常人駐車呼與共載曰我北海孫賓碩終不相負歧聞嵩即以實告遂與俱歸嵩先入白母曰今日出得死友在外歧即匿嵩家積年乃出後說劉表時北海孫嵩流離在劉表末座不為表所識歧遙識之表說嵩表甚重之同共表嵩為青州刺史干寶搜神記曰噲參寓居河內虔恭父母忽有單鶴趣之參撫視箭創甚重於是以膏藥摩之月餘漸愈放而飛去數十日間夜鶴雌雄二頭各銜一珠吐之而去搜神記曰羊公雍伯本以儈賣為業性篤孝父母終葬南山遂家焉山高無水公汲水作義漿於坂頭行者皆飲之三年有一人就飲以一升石子與之使至高平好地有石處種之得五雙白璧名玉田玉田起於此也續搜神記曰晉咸康中豫州刺史毛寶戍邾城有一軍人於武昌市見人賣一白龜子長四五寸色白可愛其人買取持歸著甕中養之日漸大近及尺許其人憐之持至江邊放於水中視其遊去後邾城遭石虎敗毛豫州既赴江莫不沉溺所養龜人於時被鎧持刀亦同自投入水中覺如墮一石上水裁至腰須臾浮去中流視之乃是先養白龜甲已長六七尺既送至東岸出頭視之徐游而去中江猶顧者數四焉陳壽益部耆舊傳曰王忳嘗詣京師於空舍中有一書生病因愍而視之書生謂忳曰我當到洛陽而病腰下有金十斤願以相贈死後乞藏骸骨未及問姓名而絶忳即鬻金營葬餘金悉置棺下後數年縣署大度亭長初到日有馬馳入亭而止其日大風飄一繡被復墮忳前張氏家傳曰禧字彥祥除效轂令嘗有鸛負矢集禧庭以甘草湯洗之傅藥留養十餘日瘡愈飛去月餘銜赤玉珠二枚置禧廳事晏子春秋曰北郭騷見晏子曰竊說先生之義願乞以養母晏子使人分粟府金以遺之辭金受粟有間晏子見疑景公乃出奔北郭子曰養及親者身更其難遂告公庭曰晏子天下之賢也去齊齊國必侵不若先死乃自殺公自追及郊而反晏子曰士以身明人者哉呂氏春秋曰秦繆公敗失右服馬公自往求見野人方食之於歧山之陽繆公笑曰食駿肉不飲酒余恐傷汝也遍飲而去居一年為韓原之戰晉人已環繆公之車晉梁由靡已扣繆公嘗食馬肉三百餘人疾鬭車下遂大克晉反獲晉惠公以歸又曰趙簡子有兩白騾甚愛之陽城胥渠處陽城姓胥渠名處猶病也廣門之官夜款門而謁曰主君之臣胥渠有疾醫教曰得白騾之肝則止不得則死請入通董安于御於側簡子曰殺白騾取其肝以豫陽城胥渠無幾何趙興兵而攻翟廣之門官七百人皆先登而獲甲首
