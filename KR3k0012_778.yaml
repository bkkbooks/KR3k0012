body:
  text: 奉使部一奉使上周禮小行人曰使適四方協九儀賓客之禮朝覲宗遇會同君之禮也存俯省聘問臣之禮也又掌邦國之禮籍以待四方之使者凡四方之使者大客則擯小客則受其弊而聽其辭凡使為旌節禮曰凡為君使者已受命君言不宿於家君言至則主人出拜君言之辱使者歸則必拜送於門外若使人於君所則必朝服而命之使者反則必下堂而受命詩曰四牡勞使臣之來也有功而見知則説矣四牡騑騑周道逶遲豈不懷歸王事靡盬我心傷悲又曰皇皇者華君遣使臣也送之以禮樂言遠而有光華也皇皇者華于彼原隰侁侁征夫每懷靡及左傳曰齊使仲孫湫來省難仲孫歸曰不去慶父魯難未已公曰若之何而去之對曰難不已將自斃君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以為本也臣聞之國將亡本必先顛而后枝葉從之魯不棄周禮未可動也君其務寧魯難而親有禮因重固能重固者因而成之間攜二覆昏亂霸王之器也又曰齊孝公伐我北鄙公使展喜犒師使受命于展禽柳下惠也齊侯未入境展喜從之曰寡君聞君親舉玉趾將辱弊邑使下臣犒執事又曰晉侯及秦伯圍鄭以其無禮於晉且二於楚也晉軍函陵秦軍汜南佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退公從之又文下曰秦伯使西乞術來聘且言將伐晉襄仲辭王曰君不忘先君之好照臨魯國鎮撫其社稷重之以大器寡君敢辭玉賓答曰不腆先君之敝器而使下臣結二國之好是以敢致之襄仲曰不有君子其能國乎國無陋矣厚賂之又宣十五年曰楚子圍宋宋人使樂嬰齊告急于晉晉侯使解楊如宋使無降楚曰晉師悉起將至矣鄭人囚之而獻於楚楚子厚賂之使反其言不許三而許之登諸樓車使呼宋人而告之遂致君命楚子將殺之使與之言曰爾既許不穀而反之何故非我無信汝則棄之速即爾刑對曰臣聞之君能制命為義臣能承命為信信載義而行之為利謀不失利以衛社稷民之主也義無二信信無二命義不行兩信不受二命也君之賂臣不知命也奉命以出有死無霣音殞又可賂乎臣之許君以成命也成其君命也死而成命臣之祿也寡君有信臣矣下臣獲考死又何求楚子舍之以歸考城又曰晉侯使郤克徵會于齊齊頃公惟婦人使觀之郤子登婦人笑於房獻子怒出而誓曰所不此報無能涉河郤克請伐齊晉侯弗許至成公三年衛孫桓子臧宣叔亦乞師以伐齊晉侯許之又曰齊叔老為季武子介自是晉人輕魯弊而益敬其使又曰吳公子札來聘見叔孫穆子説之謂穆子曰子其不得死乎好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不慎所舉何以堪之禍必及子聘于齊説晏平仲謂之曰子速納邑與政無邑無政乃免於難齊國之政將有所歸未狨所歸難未歇也故晏子因陳桓子以納政與邑是以免於欒高之難難在昭八年聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉大帶也吳地貴縞鄭地貴紵故各獻己所貴示損己而不為被貨利謂子産曰鄭之執政侈難將至矣政必及子為政慎以禮不然鄭國必敗敗謂伯有也又曰韓宣于如楚送女叔向為介鄭子皮子太叔勞諸索氏太叔謂叔向曰楚王汰侈已甚子其戒之叔向曰汰侈已甚身之災也焉能及人若奉吾幣帛慎吾威儀守之以信行之以禮敬始而思終終無不復行而不失儀敬而不失禮導之以訓詞奉之以舊法考之以先王度之以二國雖汰侈若我何又曰費楚無極譖太子建王使城父司馬奮楊殺太子建未至而使遣之太子奔宋王召奮楊使城父人執己以至王曰言出於余口入於耳爾誰告建也對曰臣告之君王命臣也事建如事余臣不佞不能茍二奉初以還不忍後命故遣之既而悔之亦無及也已王曰而敢來何也對曰使而失命召而不來是再姦也逃無所入王曰歸從政如他日姦犯也論語曰使於四方不辱君命可謂士矣又曰遽伯玉使人於孔子孔子與之坐而問焉曰夫子欲寡其過而未能也使者出子曰使乎使乎史記曰吳季札之為使北過徐君徐君初好札劍口雖弗言季札知之為使上國未獻還至徐徐君已死乃解其寶劍繫徐君冢樹而去從者曰徐君已死當誰與乎曰不然始吾心已許之豈以死背吾心哉又曰趙平原君使人於春申君趙使欲夸楚為玳瑁簪刀劍室悉以珠飾之春申君三千餘人上客皆鑷珠履以見趙使大慚又曰陸賈楚人以客從高祖定天下名為有口辨士居左右常使諸侯時中國初定尉他平南越因王之高祖使賈賜他印為南越王他魋結箕倨見賈賈因説他曰足下欲以區區之越與天子杭衡為敵國禍且及身矣他乃蹶然起坐謝賈曰生長蠻夷中久殊失禮義因問賈曰我與蕭何曹參韓信孰賢賈曰王似賢之復問曰我與皇帝孰賢賈曰皇帝起豐沛討暴秦誅強楚為天下興利除害繼五帝三王之業統理中國中國之人以億計地方萬里居天下之膏腴人衆車輿萬物殷富政由一家自天地剖判未始有也今王衆不過數十萬皆蠻夷崎嶇山海間譬若漢一郡王何乃比於漢他笑曰吾不起中國故王此使我居中國何遽不若漢乃大説至孝文帝元年詔丞相陳平舉可使南越者平言陸賈先帝時曾使南越乃召為太中大夫往使因讓他自立為帝賈至南越王甚怒為書謝於是乃下令國中曰吾聞兩雄不俱立兩賢不並世皇帝賢天子也自今已後去帝制黃屋左纛賈還報文帝大悅又曰汲黯為謁者東越相攻上使黯往視之不至至吳而還報曰越人相攻固其俗不足以辱天子之使河內失火燒千餘家上使黯往視之還報曰家人失火屋比延燒不足憂也臣過河南貧人傷水旱萬餘家或父子相食臣謹以便宜持節發河南倉粟以賑貧民臣請歸節伏矯制之罪上賢而釋之又曰司馬相如為郎數歲會唐蒙使略通夜郎西棘中發巴蜀吏卒千人郡又多為發轉漕萬餘人用興法誅其渠而巴蜀民大驚恐上聞之乃使相如責唐蒙等因喻告巴蜀民以非上意還報天子乃拜相如為中郎將建節持四乘之傳因巴蜀弊物以賂西夷至蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵於是卓王孫臨卭諸公皆因門下而獻牛酒又曰淳于髡者齊之贅壻也壻也者女之夫比於子餘剩故曰贅壻長不滿七尺滑稽音骨亂也稽者同也多辨數使諸侯未嘗詘辱威王八年楚大發兵加齊齊王使淳于髡之趙請兵齎金百斤馬千駟淳于髡仰天大笑冠纓索絶王曰先生少之乎髡曰何敢王曰先生笑豈有説乎髡曰今者臣從東來見道旁有穰田者操一肫蹄酒一杯而呪曰甌窶滿篝篝籠也音構甌窶猶柸樓也言豐年菜樹易可滿篝污耶滿車行耶下地田也則下地田之中有薪菜可滿車也五穀蕃熟穰穰滿家臣見所持者狹而欲者大奢故笑之於是齊王乃益齎黃金千鎰白璧十雙車馬百駟髡辭而行至趙趙與之精兵十萬革車千乘楚聞之夜引兵而去威王大悅漢書曰漢王曰孰能為我使淮南使之發兵背楚留項王於齊數月我之取天下可萬全隨何曰臣請使之乃與二十人俱使淮南至太宰主之淮南太宰作內主也三日不得見隨何因説太宰曰王之不見何必以楚為強以漢為弱使何得見言之而是耶是大王所欲聞言之而非耶使何等二十人伏斧質淮南市以明背漢而與楚也太宰乃言之王王見之隨何説淮南王王曰請奉命陰許叛楚與漢未敢泄楚使者在方急責布發兵隨何直入曰九江王歸漢楚何以得發兵布驚曰何至是楚使者出何曰事已搆可殺楚使無使歸而疾走漢併力布從之遂歸漢又曰張騫漢中人建元中為郎時胸奴降者言胸奴破月支氏擒其王以其頭為飲器月支遁而怨胸奴無與共擊之漢方欲滅胡聞之乃募使者騫應募與堂邑氏奴甘父俱往胸奴不聽去乃留騫十餘歲娶胡妻有子然騫持漢節不失居胸奴西騫因與其屬亡嚮月氏西走數十日至大宛後單于死國亂騫與胡妻及堂邑父俱亡歸漢拜騫太中大夫騫為人寬信蠻夷愛之騫曰臣在大夏時見卭竹杖蜀布問安得此國人曰吾賈人往市之身毒國一名天竺國在大夏東南數千里人乘象以戰臣度大夏去漢萬二千里有蜀物其去蜀不遠矣於是漢復事西南夷騫從大將軍擊胸奴嘗諳知水草處軍須不乏封博望侯又曰張騫使至安息王令將二萬騎迎於東界東界至王都數千里北至王都過數十城人民相屬甚衆使還即發使來隨欲觀漢廣大以大鳥卵黎軒善眩人獻於漢及宛西小國皆隨漢使獻見天子又曰傅介子昭帝使通西域樓蘭嘗邀漢使殺之後使介子往而讓衣旋謂將軍霍光曰彼王反覆不誅無以懲其惡臣嘗遇之近人易就耳願旦往刺之以示諸國光曰可矣遂奏介子行具卒乘齎重幣揚言賜外國而志在樓蘭樓蘭王意不親介子介子陽引去至其西界使譯者謂王曰漢使持重寶行賜諸國王不來我之西矣即出金幣以示譯譯者還報王王貪漢物來見介子與坐飲陳物示之飲酒皆醉介子謂王曰天子使我私報王王隨介子入帳中屏語壯士二人從後刺之刃交胸立死其貴人左右皆散走介子告諭以王負漢罪天子遣我來誅王當更立前太子質在漢者為王漢兵方至無得輒動動則滅國矣遂持王首而還詣闕朝廷嘉之封介子為義陽侯食邑七百戶又曰蘇武字子卿建次子也少以父任為郎中武帝遣以為中郎將使持節送胸奴使留在漢者武與副中郎將張勝友假吏常惠等募士斥堠百餘人俱既至胸奴致幣遺單于單于益驕非漢所望也方欲發使送武等會緱王與長水虞常等謀反胸奴中緱王是昆耶王姊子與昆耶王俱降漢後隨浞野侯沒胡中及衛律所將降者陰相與謀劫單于母閼氏歸漢會武等至胸奴虞常在漢時素與張勝善私候勝曰聞漢天子甚怨衛律常能為漢伏弩射殺之吾母與弟在漢幸蒙爵賞張勝許之事敗單于怒欲殺漢使左伊秩訾曰宜皆降之單于使衛律召武受辭武謂常惠曰屈節辱命雖生何面目以歸漢乃引佩刀自刺衛律大驚召醫瘡單于乃鑿地為坎置熅火覆武其上蹈其背以出血氣絶半日復息惠勝等號哭單于壯其節朝夕遣人候問武愈單于逾欲降之武不能屈乃幽武大窖中絶食天雨雪武臥囓雪與氈毛并咽之數日不死胸奴以為神乃徙武北海令牧羊不得食掘野鼠去草實食之杖漢節旄盡落積五六年昭帝即位與胸奴和親求武胸奴給言死後漢使復至胸奴常惠請其守者夜見漢使教使謂單于曰天子射上林中得鴈足有係帛書具言武在北海大澤中牧羊使者如惠語以讓單于單于視左右大驚謝漢使曰武等實在乃召武相隨官屬等九人歸漢武以元始六年春至京師拜典屬國常惠等皆為郎又曰鄭吉會稽人纍遷衛司馬神爵中日逐王亂胸奴欲降漢使人與吉相聞於是漢使吉迎之日逐王并口萬二千隨吉至河曲遂將詣京師吉既破車師降曰逐王威震西城遂護車師以西故號都護都護之置自吉始焉又曰陳湯為人沉勇有大慮多謀策喜奇功所過城邑山川常登望遠以觀形勢常患位卑權輕不決胸臆之謀時西方郅支單于常殺漢使侵撗諸國朝廷患之谷吉上書願往諭王遇害乃遣湯與甘延壽使于西域陽謂延壽曰郅支單于結怨諸夷屈辱漢使朝廷患之久矣雖然蠻夷無金城湯池之固堅弩之器恩義不行彼可取也若舉屯田吏士并發烏孫兵直抵城下彼亡無所保千載之功可致也延壽然之請奏湯曰不可不如矯詔而發之延壽不從會延壽疾臥湯因矯制發城郭諸國兵胡漢四萬餘騎置官吏而發也已行延壽聞而驚起止之湯按劍叱之曰大衆已集豎子胡敢沮衆耶乃上疏自劾矯制之狀因分兵蔥領赤谷兩道鼓行而西去單于城三十里止而營單于怪之使人問之曰漢兵何來湯曰見單于亡國本屈意康居故來護單于耳單于不知意旨猶豫無備因夜進兵圍城遲明拔之斬郅支單于以歸又曰蓋寬饒字次公魏郡人也明經為郡文學以孝廉為郎舉方正對策高第遷諫議大夫寬饒為衛司馬有厚德宣帝嘉之以寬饒為太中大夫使行風俗多所稱舉貶黜奉使稱旨擢為司隸校尉刺舉無所回避小大輒舉所劾奏衆多廷尉處其法半用半不用以其峻刻故有不用者公卿貴戚及郡國吏繇使至長安皆恐懼莫敢犯禁京師為之清平又曰終軍從濟南當詣博士步入關關吏豫軍繻軍問以此何為吏曰為復傳還當以合符軍曰大丈夫西遊終不復傳還棄繻而去軍後為謁者使行郡國建節東出關關吏識之曰此使者乃前棄繻生也軍行郡國所見便宜以聞還奏事上甚悅
