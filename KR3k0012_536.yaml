body:
  text: 禮儀部十四庠序禮記王制曰有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於左學養庶老於右學周人養國老於東膠養庶老於虞庠又學記曰古之教者家有塾黨有庠術有序國有學術當為遂萬二千五百家為遂也五經通義曰三王教化之宮揔名為學夏為學校校之言教也殷為庠周為序周家又兼用之故鄉為庠里為序家為塾白虎通曰鄉曰庠里曰序庠者禮義也序者序長幼也漢書曰鄉序庠置孝經師一人又儒林傳曰三代之道鄉里有教夏曰校殷曰庠周曰序所以勸善懲惡也南史曰梁武帝脩建庠序別開五館其一館在袁憲宅西憲常招引諸生與之談論新義出人意表同輩咸嗟服焉釋奠禮記月令仲春曰是月也命樂正習舞為將釋奠上丁釋奠於國學釋謂置也謂置牲幣之奠於文宣王天子及公卿諸侯大夫親往視之觀其禮也命有司上戊釋奠於太公廟亦用牲幣之奠又月令仲秋曰是月也命樂正習吹春夏尚舞秋冬尚吹習之為將釋奠上丁釋奠於國學天子乃率公卿諸侯大夫親往視之禮儀同仲春是月也命有司上戊釋奠於太公廟禮儀同仲春又文王世子曰凡始立學必先釋奠於先聖先師及行事必用幣天子親學大昕鼓懲所以警眾也晉書禮志曰昔武王入殷而封先代之後蓋追思其德也孔子大聖終於陪臣未有封爵至漢元帝時孔霸以帝師號襃成侯奉孔子後魏黃初三年以議郎孔羨為宗聖侯奉孔子祀魏齊王正始二年使太常釋奠以太牢祀孔子於辟雍以顏回配宋書禮志曰魏齊王正始中每講經使大常釋奠先聖先師於辟雍晉惠帝明帝之為太子及愍懷太子講經竟並親釋奠於太學太子進爵於先師中庶子進爵於顏淵成穆孝武三帝亦皆親釋奠又禮志曰元嘉二十二年太子釋奠採晉故事官有其注祭畢太祖親臨學宴會太子以下悉預唐六典曰仲春上丁釋奠于孔宣父以顏回配焉其七十二弟子及先儒並從祀仲秋之月亦如之仲春上戊釋奠于齊太公以留侯張良配焉仲秋之月亦如之凡州縣皆置孔宣父廟以顏回配仲春上丁州縣官行釋奠之禮仲秋上丁亦如之唐書曰開元七年十一月以貢舉人將謁先師質問疑義敕曰皇太子及諸子雖年未志學而道在尊師家行齒胄禮又曰開元七年皇太子入國學行齒胄禮謁先聖皇太子初獻其亞獻終獻並以胄子常侍褚旡量開講孝經及禮記文王太子篇又曰歸崇敬議春秋釋奠文宣王祝板御署北面揖以為其禮太重按大戴禮師尚父授周武王丹書武王東面而立今置祝板請准武王東面之禮輕重庶得其中晉博士成洽議曰釋奠奉先師唯皇太子業終乃禮不然則廢晉尚書大事曰尚書符太常曰按洛陽圖宮南自有太學國子辟雍不相預也捨辟雍以太學辟雍便為無事虛誕漢魏舊事皆言釋奠祠先聖於辟雍未有言太學者又咸和中成皇帝釋奠於中堂之前臺中故事亦曰辟雍是為漢魏之世初自兩立至釋奠使在辟雍猶存今廢辟雍而立二學中興以來相違太常王彪之荅魏帝齊王使有司釋奠於辟雍此是魏之大事非晉書舊典太始元康釋奠太學不在辟雍太始五年元康五年二行饗禮皆於辟雍不在太學是則釋奠於太學行饗於辟雍有晉已行之准也中朝有辟雍猶在太學況無辟雍唯有太學更當不在太學乎宰相從太常所荅晉范堅書問馮懷曰漢氏以來釋奠先師唯仲尼不及公且何也馮荅曰若如來談亦當憲章堯舜文武豈唯周旦乎摯虞釋奠頌曰如彼泉流不盈不運講業既終禮師釋奠升觴折俎上下惟善邕邕其來肅肅其見立廟鍾離意別傳曰意為魯相脩孔子廟孔子教授堂下床首有懸甕意召守廟孔訢問曰此何等甕訢曰夫子甕背有丹書自夫子亡後無敢發者意乃發索得書焉宋書禮志曰晉清河人李遼表曰亡父先臣回綏集邦邑歸誠本朝以太元十年遣臣奉表路經闕里過覲孔廟庭宇傾頹軌式頹圯萬世宗匠忽焉淪廢仰瞻俯慨不覺涕流既逵京輦表求興復聖祀脩建講學至十四年奉被明詔採臣鄙議勑兗州魯郡准舊營飾北齊書曰天保元年詔封崇聖侯邑一百戶以奉孔子之祀并下魯郡以時脩治廟宇務盡襃崇之至唐書曰武德中制祠典釋奠於太學以周公為先聖孔丘配饗房玄齡及朱子奢議云公旦尼父俱是聖人庠序置奠本緣夫子故魯宋至於梁陳爰及隋大業故事皆以孔丘為先聖顏回為先師歷代所行古今通允請停祭周公升夫子為先聖以顏回配饗又曰上元中制曰定禍亂者必先於武德極生靈者諒在於師貞周武創業克寧區夏惟師尚父實佐興王況德有可師義當禁暴稽諸古昔爰崇典禮太公望可追封為武成王有司依文宣王置廟擇古今名將置亞聖及十哲享祭之典一同文宣又曰開元十九年始於兩京置齊太公廟以張良配上元初特加封太公為武成王以歷代名將從其祀然有其制而未之行祠宇日荒至是宰臣盧𣏌京兆尹盧甚以盧者齊之裔乃鳩其裔孫若盧崔丁呂之族合錢以崇飾之請復舊典兼擇自古名將如孔門十哲皆配饗詔下史官乃定張良穰苴孫武吳起樂毅白起韓信諸葛亮李靖李勣配焉養老禮記祭義曰食三老五更於太學天子祖而割牲執醬而饋執爵而酳所以教諸侯之悌也蔡邕月令章句曰五更當為五叟叟長老之稱也其字似更書有轉誤嫂字女傍叟今皆以為更矣孝經援神契曰天子親臨辟雍尊事三老兄事五更三者道成於三五者訓於五品言其能以善道改己也三老五更皆取有妻男女完具者續漢書曰三老五更玉杖長九尺端以鳩為飾鳩者不噎之鳥欲老人之不噎也華嶠後漢書曰熙平中天子引袁逢為三老賜玉杖應劭漢書曰天子父事三老兄事五更天子親割三公設几九卿正履魏志高貴鄉公詔曰夫養老興教三代所以樹風化垂不朽也必有三老五更以崇至敬乞言納誨著在惇史然後六合承流下觀而化宜妙簡德行以充其選關內侯王祥履仁秉義雅志淳固關內侯鄭小同溫恭孝友師禮不忒其以祥為三老小同為五更車駕親率群司躬行古禮焉王隱晉書曰王祥字休徵魏帝高貴鄉公入學命祥為三老祥南面几杖以師道自居帝北面乞言祥於是陳明王聖帝之軌君臣政化之要俯以訓帝於時百辟卿士聞其格言莫不砥礪後魏書曰孝文帝以前司徒尉元為三老前鴻臚卿游明根為五更皇帝再拜肅拜五更乞言畢乃賜步輓一乘詔曰三老可給上公之祿五更可食九卿之俸後周書曰高祖保定三年乃下詔集太保燕公為三老又曰武帝以太傅燕國公于謹為三老賜延年杖太師宇文護設几司寇豆盧寧正舄又曰孝閔踐祚于謹以年老乞骸骨詔報不許有司宜斷表啟遂詔謹為三老有司具禮擇日又賜延年杖高祖幸太學以食之三老入門皇帝迎拜門屏之間三老荅拜有司設三老席於中楹南向太師晉公護升階設几於席三老升席南面憑几而坐以師道自居大司寇楚公寧升階正舄皇帝升立於斧扆之前西面有可進饌皇帝跪設醬豆親祖割三老食訖皇帝又親跪受爵以酳有司徹訖皇帝北面立訪道三老乃起立於席後皇帝曰猥當天下重任自惟不才不知政治之要公其誨之三老荅曰木受繩則正后從諫則聖自古明王聖主皆虛心納諫以知得失天下乃安惟陛下念之又曰為國之本在守忠信是以古人云去食去兵信不可失國家興廢莫不由之願陛下守而勿失又曰治國之道必須有法法者國之綱紀綱紀不可不正在於賞罰若有功必賞有罪必罰則為善者日益為惡者日止若有功不賞有罪不罰則天下善惡不分人無所指手足矣三老言畢皇帝再拜受之三老荅拜焉禮成而出隋書曰後齊仲春令辰陳養老禮先一日三老五更齊於國學皇帝進賢冠玄紗袍至辟雍入揔章堂列宮懸王公已下及國老名定位司徒以羽儀武賁安車迎三老五更于國學並進賢冠玄服黑舄素帶國子生黑介幘青衿單衣乘馬從之至皇帝釋劍執班迎於門內三老至門五更去門十步則降車以入皇帝拜三老五更攝齋荅拜皇帝揖進三老在前五更在後升自右階就筵三老坐五更立皇帝升堂北面公卿升自左階北面三公授几杖卿正履國老庶老各就位皇帝拜三老群臣皆拜不拜五更乃坐皇帝西向肅拜五更進珍羞酒食親祖割執醬以饋執爵以酳以次汝進五更又設酒醴於國老庶老皇帝升御坐三老乃論五孝六順典訓大綱皇帝虛躬請受禮畢而還又都下及外州人年七十已上賜鳩杖黃帽
