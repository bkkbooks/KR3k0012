body:
  text: 禮儀部二敘禮二禮記外傳曰吉凶賓軍嘉即五禮之目也吉禮者祭祀郊廟宗社之事是也起自神農氏始教民種穀禮始於飲食吹葦籥擊士鼓以迎田祖致敬鬼神祭皆用樂此伊耆氏即神農別號凶禮者喪紀之説年穀不登大夫去國之事也皇帝始養生送死也賓禮者貢獻朝聘之事是也軍禮者始黃帝與蚩尤戰於涿鹿之野嘉禮者好會之事起自伏羲以儷皮為幣始制嫁娶亨通者嘉會之事也其後有冠冠者代父之事者婚有繼世之道物有代謝之期悲發於裏乃非純吉故為喜尉之事也鄉飲酒鄉射食耆老王燕族人之事是也四者亦嘉會也伹前代象天其禮質而略後代法地其事煩而文唐虞之際五禮明備周公所制文物極矣左傳文下曰齊侯侵我西鄙遂伐曹入其郛討其來朝也季文子曰齊侯其不免乎己則無禮執王使而伐其罪而討於有禮者曰女何故行禮禮以順天天之道也己則反天而又以討人難以免矣又文公曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失隊曰見有禮於其君者事之如孝子之養父母也見無禮於其君者誅之如鷹鸇之逐鳥雀也又宣十六年晉侯使士會平王室定王享之原襄公相禮原襄公周大夫相佐也殽蒸蒸升也升殽於俎武子私問其故享當體薦而殽蒸怪故問之士會諡季其字王聞之召武子曰季氏而弗聞乎王享有體薦享則半解其體而薦之所示以共儉宴有折俎體解節折升之於俎物皆可食所以示慈惠也公當享卿當宴王室之禮也公謂諸侯武子歸而講求典禮以修晉國之法又昭二年曰晉侯使韓宣子來聘公即位故且告為政而來見禮也代趙武為政雖盟主而修好同盟故曰禮觀書於太史氏見易象與魯春秋曰周禮盡在魯矣易象上下經之象辭魯春秋史記之策書春秋遵周公之典以序事故曰周禮盡在魯也吾乃今知周公之德與周之所以王也易象春秋文王周公之制當此情儒道廢諸國多門唯魯備故宣子適魯而説之也又昭二曰楚靈王使問禮於左師與子産左師曰小國習之大國用之敢不薦聞言所聞謙示所未行獻公合諸侯之禮六其禮六儀也宋爵公故獻公禮子産曰小國共職敢不薦守獻伯子男會公之禮六鄭伯爵故獻伯子男會公之禮又昭二曰公如晉自郊勞至于贈賄往有郊勞去有贈賄無失禮揖讓之禮晉侯謂女叔齊曰魯侯不亦善於禮乎對曰魯侯焉知禮公曰何為自郊勞至於贈賄禮無違者何故不知對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也又昭二曰孟僖子病不能相禮不能相儀答郊勞以此為己疾乃講學之講習也茍能禮者從之及其將死也二十四年孟僖子卒傳終言之召其大夫曰禮人之幹也無禮無以立吾聞將有達者曰孔丘僖子卒時孔丘年三十五聖人之後也我若獲沒得以壽終必屬説與何忌於夫子使事之説南宮敬叔何忌孟懿子皆僖子之子也而學禮焉以定其位知禮則位安又昭六曰鄭子大叔見趙簡子簡子問揖讓周旋之禮焉對曰是儀也非禮也簡子曰敢問何謂禮對曰吉也聞諸先大夫子産曰夫禮天之經也經者道之常地之義也義者利之宜也民之行也行者人所履天地之經而民實則之簡子曰甚哉禮之大也對曰禮上下之紀天地之經緯也緯絰錯居以相成者民之所以生也是以先王尚之又昭六曰齊景公曰善哉吾今而後知禮之可以為國也對曰禮之可以為國也久矣與天地並有天地則禮義興君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣共而不二父慈而教子孝而針針諫也兄愛而友弟敬而順夫和而義妻柔而正姑慈而從從不自專婦聽而婉婉順也禮之善物也又定下曰公會齊侯于祝其實夾谷夾谷即祝其地孔丘相相會儀也犂彌言於齊侯曰孔丘知禮而無勇若使萊人以兵劫魯侯必得志焉又定下曰邾隱公來朝邾子益也子貢觀焉邾子執王高其容仰公受玉卑其容俯王朝者之贄子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之禮也將左右周旋進退俯仰於是乎觀之今正月相朝而皆不度不合法度心已亡矣又哀上曰太宰嚭召季康子嚭吳大夫康子使子貢辭太宰嚭曰國君道長大言君長於道路而大夫不出門此何禮也對曰豈以為禮畏大國也畏大國不敢虛國盡行大國不以禮命於諸侯茍不以禮豈可量也寡君既共命焉其老豈敢棄其國太伯端委以治周禮仲雍嗣之斷髮文身祼以為飾豈禮也哉春秋説題辭曰禮者所以設容明天地之體也論語曰有子曰禮之用和為貴先王之道斯為美小大由之有所不行知和而和不以禮節之亦不可行也又曰子曰導之以政齊之以刑民免而無恥導之以德齊之以禮有恥且格又曰子曰夏禮吾能言之𣏌不足徵也殷禮吾能言之宋不足徵也徵成也𣏌宋二國夏殷之後夏殷之禮吾能説之𣏌宋之君不足以成也又曰子張問十世可知也世謂易姓之世也問其制度變易如何子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也所損益可知也者據時篇目皆在可校數其或繼周者雖百世可知也自周之後以為變易損益之極極於三王亦不是過也又曰顏淵問仁子曰克己復禮為仁一日克己復禮天下歸仁焉為仁由己而由人乎哉顏淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顏淵曰回雖不敏請事斯語矣又曰子曰禮云禮云玉帛云乎哉言禮非但崇此玉帛而已所貴者乃貴其安上治民漢書曰漢王已并天下諸侯共尊為皇帝於定陶叔孫通就其儀號高帝悉去秦儀法為簡易群臣飲爭功醉或妄呼拔劍擊柱上患之通知上益饜之説上曰夫儒者難與進取可與守成臣願徵魯諸生與臣弟子共起朝儀上曰可試為之令易知度吾所能行為之七年長樂宮成諸侯群臣朝十月大行設九賓臚句傳上傳語告下為臚下告上為句於是皇帝輦出房百官執戟傳警引諸侯王以下至吏六百石以次奉賀自諸侯王以下莫不震恐肅敬至禮畢盡伏置法酒文頴曰作酒令法也蘇林曰常會須天子中起更衣然後入置酒諸侍坐殿上皆伏抑首如淳曰抑屈以尊卑次起上壽觴九行謁者言罷酒御史執法舉不如儀者輒引去竟朝置酒無敢歡譁失禮者於是高帝曰吾乃今日知為皇帝之貴也拜通為太常賜金五百斤通出皆以五百金賜諸生諸生乃喜曰叔孫生聖人知當世務也又曰王者必因前王之禮而順時施宜有所損益節人之心稍稍制作又曰宣帝時諫議大夫王吉上疏願述舊禮明王制驅一代之人躋之仁壽之域范曄後漢書曹褒傳曰詔召玄武司馬班固問改定禮制之宜固曰京師諸儒多能説禮宜廣招集共議失得帝曰諺言作舍道邊三年不成會禮之家名為聚訟牙生疑異筆不得下昔堯作大章一夔足矣章和元年正月乃召褒詣嘉德門令小黃門持班固所上叔孫通漢儀十二篇勑褒曰此制散略多不合經今宜依禮條正使可施行於南宮東觀盡心集作典略曰孔子過宋與弟子集禮於大樹下宋司馬桓魋使拔其樹去適鄭六韜曰太公對文王曰禮者治之粉澤也管子曰禮者因人之情緣義之理為之節文者也孟子曰惻隱之心仁之端也辭讓之心禮之端也孫卿子曰禮者人主以為群臣尺寸尋文檢式也禮有三本天地生之本先祖類之本君師治之本國之本在禮也又曰人生有欲欲則求求則爭爭則亂亂則窮先王惡其亂也故制禮義以養之禮者養也稻梁五味所以養口也椒蘭芬馨所以養鼻也雕琢刻鏤黼黻文章所以養自也椒房越席沐浴機筵所以養體也莊子曰三王五帝之禮儀法度不矜於同而矜於治故譬三王五帝之禮儀法度其猶柤梨橘柚果瓜之屬耶其味反而皆可於口文子曰老子云為禮者雕琢人性矯拂其情目雖欲之禁以法心雖樂之節以禮趍翔周旋屈節異儀肉凝而弗食酒敗而不飲外束其形中愁其意汨陰陽之和而迫生命之情慎子曰禮從俗政上國有貴賤之禮無賢不肖之禮有長幼之禮無勇怯之禮有親踈之禮無愛惡之禮也淮南子曰禮者體情而制文者也又曰夫水積則生相食之蟲言大魚食小魚士積則生食肉之獸禮飾則生偽慝之儒偽詐慝姦夫吹灰而欲無眯涉水而欲無濡不可得也説苑曰齊景公登酎晏子修食禮以待公曰禮寡人饜之矣吾欲得天下勇士與之圖國晏子對曰君子無禮是庶人也庶人無禮是禽獸也禮而治國所以御民也轡者所以馭馬也無禮而治國家者嬰未嘗聞也景公曰善乃飾酎更席以為上客尸子曰秋為禮西方為秋秋肅也萬物莫不肅敬禮之至也韓詩外傳曰晏子聘魯下堂則趍授立則跪子貢怪之問孔子孔子問晏子晏子對曰夫上堂之禮君行一臣行二也今君之受幣也畢臣敢不跪乎孔子曰善禮中又有禮董生書曰禮者天所為也文者人所為謂之禮者因人情以為節文以救其亂也夫隄者水之防也禮者人之防也刑防其末禮防其本也白虎通曰夫禮者陰陽之際也百事之會也所以尊天地賓鬼神序上下之道也袁淮書曰禮者緣人情而為之節度者也嚴父愛親之情也尊親敬長之義耳物理論云禮者履也律也義同而名異孫卿禮賦曰爰有大物非絲非帛文理成章非日非月為天下明生者以壽死者以葬城郭以固三軍以強粹而王駮而霸無一焉而亡也
