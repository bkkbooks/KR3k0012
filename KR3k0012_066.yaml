body:
  text: 關中諸水戲水水經注曰戲水出驪山鴻谷北歷戲亭即周幽王死處西征賦所謂兵敗戲水之上身死驪山之北是也漆水山海經曰榆次之山漆水出焉北流注于渭水經注曰漆水出扶風杜陽縣俞山東北入于渭周大王去邠度漆踰梁山止歧下故詩云自土沮漆又曰率西水滸至于歧下湫水史記曰朝郍有湫泉即華西名川也蘇林曰泉方四十里湛然不流冬夏不增不減不生草木能興云致雨民旱禱之周地記曰楊班為姚萇將居黃梁谷其西有小谷由來無水夜忽有人聲云湫神移徙借車牛如有影響至西谷中忽有水方二百步其水深淺不測冬夏湛然每水旱百姓祈福屢應也魚龍水水經注曰有一水出縣西山人謂曰小隴山其水東北流歷澗注以成潭出五色魚俗以為龍而莫敢捕採謂是水為魚龍水廉水宋書曰范柏年梓潼人宋明帝問卿土有貪泉否柏年曰臣梁益之地有廉水讓水不聞有貪泉帝嘉之即拜蜀郡太守一云此水飲之使人廉讓故以名之孱山水華陽國志曰涪縣有孱山水其源出金銀礦民得採之又郡國志云漢有金山縣縣東二里有一水瀨有金碎珠隨波東注傍水居人採以為業巴字水三巴記曰閬白二水合流自漢中至始寧城下入武陵曲折三曲有如巴字亦曰巴江經峻峽中謂之巴峽即此水也綿江遊蜀記曰左綿郡有小江三川所尚綿州左綿郡有汙江所染緋紅於此水濯後益鮮故人之所重粉水水經曰越嶲粉水導源東流經上粉縣取此水以淘粉則晧曜鮮潔有異衆流故縣人因此取名瀘水十道記曰瀘水出蕃中入黔府歷郡界出拓州至此有瀘津關關上有石峰高三千丈四時多瘴氣三四月間發人衝之立死非此時中則人多悶吐唯五月上伏即無害故諸葛武侯征越嶲上疏云五月渡瀘深入不毛之地又按地記云今昆明道渡所見有武侯道在又按十道記云水浚急而多巉石土人以牛皮為船方涉津涘弱水說文曰弱水自張掖刪丹西至酒泉合黎餘波入于流沙玄中記曰天下之弱者崑崙之弱水焉鳩毛不能起黑水張掖記曰黑水出縣界雞山亦名玄圃昔娥氏女簡狄浴於玄丘之水即黑水也大柳谷水魏氏春秋曰明帝青龍三年張掖郡刪舟縣金山大柳谷有玄川湓涌寶石出焉有石馬即魏為晉代之符也洮水漢書地理志曰洮水出西羌中北至枹音夫罕東入河又沙州記云洮水與墊江水俱出嵹臺山山南為墊江源山東即洮水源也馬池水關山圖曰隴西神馬山有泉池龍馬所出水經注云馬池水出上邽西南六十里謂之隴泉谷言神馬出水事同徐吾是此今有馬池之號也源出嶓冢山湟水漢書地理志曰臨羌縣西北至塞外有西王母石室西海鹽池北則湟水所出東至允吾入河湟河亦名樂都水也縣有土樓山無石而高在縣南又有養女嶺被羌多禱而祈女又有牛心堆皆湟水源山名沮水水經曰沮水出漢中房陵縣淮山東南過臨沮縣至枝江縣入于江注云沮陽縣西北景山即荊山之首也山海經曰金玉是出亦沮水之所導也漳水山海經曰漳水出臨沮縣東荊山東南過蓼亭又南過章鄉南至枝江縣北入于沮傳曰江漢沮漳楚之望也王仲宣登樓賦曰夾清漳之通浦倚曲沮之長江雷水水經曰南經大雷戍西注大江謂之大雷口一泒東南流入江謂之小雷口也宋鮑明遠登大雷岸與妹書乃此地又孝子傳云孟宗為雷池監作鮓一器以遺母母不納豫章圖經曰蜀水在豐城縣北按漢書地理志曰蜀水源出縣內小界山東東流入南昌縣漳水合耆老傳云仙人許遜為蜀旌陽縣令有奇術晉末人皆疾癘多往蜀詣遜請救遜與一器水投於上流疾者飲之無不愈也邑人敬其神異故以蜀水為名鄱陽源水鄱陽記曰鄱陽源是吳芮所居處鄉人祭之為立祠堂東有石澗深三尺鄉人將牲牢告啓擊鼓三通其水衝出大流隨用並足葛溪水鄱陽記葛溪水源出上饒縣靈山西昔歐冶子居其溪側以此水淬劍傳之於此後又有葛玄家焉因曰葛水湓浦水郡國志曰湓浦水有人此處洗銅盆忽水暴漲乃失盆遂投水取之即見一龍銜盆遂奮而出故曰盆水也蕭子顯齊書曰世祖治湓城得尺五刀十一口永明享曆之數也甘泉水九江圖經曰甘泉水在縣南甘泉驛之南其水味甘飲訖猶有餘香因以名焉其山即曰甘泉山按州圖經云昔山頂有船柂從頂沿流而下土人亦名為柂下溪桓伊為江州刺史常遣左右齎糧尋山之奧冀覩非常乃至一處見有大湖湖側有敗船當時聞有柁流下甚疑惑後聞有船方驗秦淮水江寧圖經曰淮水北去縣一里源從宣州東南漂水縣烏剎橋西入百五十里輿地志云秦始皇巡會稽鑿斷山阜此淮即所鑿也亦名秦淮孫盛晉春秋亦云是秦所鑿王導令郭璞筮即此淮也又稱未至方山有直瀆行三十許里以地形論之誰發源詰屈不類人功則始皇所掘宜此瀆也丹陽記云建康有淮源出華山入江徐爰釋問云淮水西北貫都輿地志云淮水發源於華山在丹陽湖姑熟之界西北流經建康秣陵二縣之間縈紆京邑之內至于石頭入江懸流三百許里浙江山海經曰浙江出三天子都在率東西北入海餘暨南郭璞注云按地理浙江出黔縣南率中東入海今之浙江是也率即歙耳餘暨縣名虞喜志林注曰今錢塘江口折山正居江中潮水投山下折而曲一云江有反濤水勢折歸故云浙江史記云江水至會稽山陰為浙江是也三江郡國志曰禹貢三江吳郡南松江錢塘江是也禹貢曰三江既入震澤砥定韋昭曰三江謂吳郡南松江錢塘江浦陽江虞氏志林云江於彭蠡分為三是即韋說為謬按江自太湖出于海屈曲七百里出鱸魚即吳左慈為王釣者縠江輿地志曰縠江其水波瀾交錯狀似羅縠之文因以為名若下水輿地志曰南岸曰上若北岸曰下若乃村名也村人取若下水以釀酒醇美勝於雲陽吳録曰長城若下酒張協七命云荊南烏程即此酒也霅水輿地志曰霅水亦若水之異名也水深不可測俗謂之洺水又山海經云浮玉之山茗水出其陰中多鮆魚今亦謂之霅鳥水是也紫溪吳興記曰邑有文山水東南流為紫溪輿地志云以為水紫色也又云紫溪中央水有赤色盤石長百餘丈望之如霞名曰赤瀨水公山江水郡國志曰公山江水有橘自然泛來行人噉之恣飽則可將去則病不竭泉永嘉地記曰山北有泉衆泉旱竭此泉不乾故以名山東有瀑布長數十丈遊者云山頂有大湖中有孤岩獨立皆號孤房臨水湘州記曰臨水經臨賀縣東又南至郡左以合賀水故有臨賀之稱焉靳江湘州記曰靳江在新東縣西八里水出衡山縣界紫嘉山東流入湘江二百八十里昔楚大夫靳向所封之地因以名之資水湘州記曰資水一名茱萸江又水經云資水東北過益陽應劭曰縣在益水之陽今無益水誠資水之殊目郡國志云資水岸有石頭城即吳將周瑜築也枉水湘州記曰枉山在郡東十七里有枉水出焉山西溪溪口有小灣謂之枉渚山上有楚祠存焉沅水水經曰沅水出牂牁且蘭縣為旁溝水東北至鐔城縣為沅水又曰沅水之北有奇山山有秀峰上枝緑蘿濛幕頽巖臨水實釣渚漁詠之勝也其幽響若鍾音信神仙之所居滄浪水永初山川記曰漢水古為滄浪即漁父所云滄浪之水清今滄浪水合流出鐔城北界山此蓋後人名之非古滄浪也湘水說文曰湘水出零陵陽海山北入江湘中記曰湘水至清雖深五六丈見底了了然石子如摴蒲矣五色鮮明白沙如雪赤岸如朝霞緑竹生焉上葉甚密下踈遼常如有風氣淮南子曰所謂樂者豈必躬釣瀟湘水經注曰湘水又經南津城西對橘洲諺曰昭潭無底橘洲浮又按郡國志云湘水邊有水魚山本名立石山高八十丈闊十里石色黑而重疊每發一重則有自然魚形女人多刻畫為戲長數寸燒之魚膏腥汨水水經注曰汨水西經玉笥山又西為屈潭即羅潭也屈原懷沙自沉於此故潭以屈為名賈誼史遷皆嘗經此弭楫沿波投弔於潭五美水湘中記曰五美水在長沙縣東二十五里光武時有五美女居於此溪之側後因為名灕水臨桂圖經曰灕水出縣南二十里柘山之陰西北流至縣西南合零渠五里始分為二水昔秦命御史監史祿自零陵鑿渠出零陵下灕水是也郡國志稱後漢伏波將軍馬援開湘水為渠六十里穿度城今城南流者是因秦舊瀆耳至寶曆初渠道崩壞舟楫不通觀察使李渤遂疊石造堤分二水每水置石斗門一使制之在人開閉開灕水則全入於桂江擁桂江則盡歸於湘水修仁水始興記曰修仁水西南注連水北有三楓亭五渡水齊范雲為始興太守至修仁水酌而飲之賦詩曰三楓何習習五渡何悠悠且飲修仁水不挹階邪流慈廉江交州記曰慈廉江者昔有李祖仁居此兄弟十人並慈孝廉讓因此名江
