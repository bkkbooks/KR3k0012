body:
  text: 刑法部十八赦易曰雷雨作解君子以赦過宥罪書曰眚災肆赦眚過災害肆緩言大過害當緩赦之又曰五刑之疑有赦五罰之疑有赦其審克之刑疑赦從罰罰疑赦從免其當伺察能得其禮周禮曰國君過市刑人赦又曰司剌掌三宥三赦之法一宥曰不識再宥曰過失三宥曰遺忘一赦曰幼弱再赦曰老耄三赦曰蠢愚爾雅曰赦舍也舍放置也論語曰子路問政子曰先有司赦小過舉賢才史記曰陶朱公子殺人囚於楚公曰煞人而死職也使少子往視之乃裝黃金千溢以置褐器中載以一牛車遣其少子長男固請欲行公不許長男曰長子家督也今弟有罪大人不遣是吾不肖欲自殺其母為言不得已而遣長子為一封書及金令遺故所善莊生生乃見楚王曰某星犯某宿獨以德為可以除之王乃使封三錢之府長男以赦弟固當出也重千金虛棄無所為也乃復見莊生曰弟今自赦故辭去生知其意曰自入室取金莊生恥為兒所賣乃入見楚王曰臣出道路皆言陶之富人朱公子多將金賂王左右王非能恤楚而恩赦乃以陶朱公子也楚王大怒遂殺陶朱公子明日乃赦令長子持其弟喪歸也漢書曰惠帝冠赦天下省法令妨吏民者除挾書律如淳曰秦皇令敢有挾持書偶語者為城旦舂又曰惠帝崩太子立為皇帝年幼太后臨朝稱制大赦天下又曰成帝元封二年四月臨決河塞隄作瓠子歌赦所過徒六月詔曰甘泉宮內銅池中産芝九莖連葉赦天下作芝房之歌五年冬行南巡還至泰山增修封禪赦天下六年詔曰朕禮首山昆田出珍物化為黃金祭后土神光三燭其赦汾陰殊死以下賜天下貧民布帛人一匹益州昆明反赦京師亡命令從軍擊之後元年三月詔曰朕郊見上帝巡于北邊見群鶴留止以不羅網靡所獲薦獻于泰畤光景並見其赦天下也又曰宣帝地節元年四月鳳凰集魯群鳥從之戊申立皇太子赦天下神爵四年春二月詔曰喜瑞並見修興太一五帝后土之祠祈為百姓蒙福鸞鳳萬舞集止于傍齊戒之暮神光顯著薦獻之夕神光交錯或降于天或登于地或從四方來集于壇上帝嘉饗海內承福其赦天下又曰成帝建始元年二月詔曰乃者火災降于祖廟有星孛于東井其大赦天下咸得自新永嘉元年丙寅立皇后趙氏大赦天下四年正月行幸甘泉郊泰畤神光降集紫殿大赦天下又曰哀帝建平二年四月詔曰漢家之制推親親以顯尊尊定陶恭皇之號不宜復稱定陶尊恭皇太后稱永信宮立恭皇后廟於京師赦天下東觀漢記曰吳漢疾篤上乃親自臨問所欲言對曰臣愚無所識知唯願無赦而已又曰郭躬家世掌法務在寬平章和赦天下繫囚在四月丙子以前減死罪一等勿笞詣金城而文不及亡命躬上封事曰伏惟大恩莫不蕩宥死罪以下並蒙更生而亡命捕得獨不沾澤臣以為赦前犯死罪而繫在赦後者可皆勿笞詣金城以全民命益邊上善之即下詔赦焉謝承後漢書曰學士中諸生與李膺等更相褒重莫不畏其貶議時河內張成善說風角推占當赦遂教子殺人李膺為河南尹督促收捕既而逢宥獲免膺愈懷憤疾竟案殺之又曰度尚為荊州剌史尚見胡蘭餘黨南走蒼梧懼為己負仍僞上言蒼梧賊入荊州界於是徵交趾剌史張磐下廷尉辭狀未正會赦見原磐不肯出獄方更牢持械節獄吏謂磐曰天恩曠然而君不出何乎磐因自列曰前長沙賊胡蘭作難荊州餘黨散入交趾磐身嬰甲胄涉危履險討擊凶患斬殄渠帥餘燼鳥竄冒遁還奔荊州剌史度尚懼磐先言怖畏罪戾伏奏見誣磐備位方伯為國爪牙而為尚所枉受罪牢獄夫事有虛實法有是非磐實不辜赦無所除如忍以茍免永受侵辱之恥生為惡吏死為弊鬼乞傳尚詣廷尉面對曲直廷尉以其狀上詔書徵尚到廷尉辭窮受罪以先有功得原又曰董卓死陝中諸將後共相要遣使詣長安相聞求乞大赦尚書令王允等以為殺卓時己赦今復求一歲不可再赦李𠐶等曰京師不赦我我當死不若決之若攻長安克之則可大得天下不克則盡鈔取三輔婦女財物西上隴歸鄉里作賊延命尚可數年於是帥兵西向長安魏志曰文帝延康元年受禪即位改延康為黃初大赦天下又曰陳留王奐即位咸熙二年二月加相國晉王冕十二旒天子旌旗出驚入蹕乘金銀車等癸未大赦八月辛卯晉王薨壬辰晉太子紹封襲位襄武縣言有大人見長三丈餘跡長尺二寸白髮著黃單衣黃巾柱杖呼人王始語云今當太平九月乙未大赦吳志曰呂蒙病發孫權迎置內廄夜不能寐病中有瘳為下赦令又曰孫皓天璽元年吳郡言臨平湖自漢末草穢擁塞今更開通長老相傳此湖邊石函中有小石青白色長四寸廣刻作皇帝字於是改年大赦蜀志曰孟光字孝𥙿河南人延熙九年秋大赦光責大將軍費禕曰夫赦者偏枯之物非明世所宜有也衰弊窮極必不得已然後乃可權而行之耳今主上仁賢百僚稱職有何旦夕之危倒懸之急而數施非常之恩以惠姦宄之惡乎又鷹隼始擊而更原宥有罪上犯天時下違人理老夫耄朽不達治體竊謂斯法難以經久豈具瞻之高美所望於明德哉禕但顧謝踧踖而已干寶晉紀曰庶人楊氏卒于金墉城陳留董仲道遊於太學喟然而歎曰建斯室也何為者乎每見國家赦書謀反大逆皆除其殺祖父母父母者不除以為道法所不容也何今日公卿而處議文飾禮典以至此事乎天人之理既惑大亂將作矣顧謂謝鯤阮千里等曰易稱知幾其神卿等各可深逃乃身荷檐妻子惟鹿車以入于蜀山莫知所至王隱晉書曰武帝咸熙二年十二月丙寅上乃設壇受命于郊即洛陽宮幸太極前殿大赦天下又曰愍帝建興元年夏四月壬申上即位于長安宮改年大赦天下與之更始前後不及者皆除之崔鴻前秦録曰王猛疾病未瘳符堅大赦死已下又曰永興元年符堅將為赦與尚書左僕射王猛右僕射符融密議於露堂屏左右為赦文有一大蒼蠅入自牖間鳴聲甚大集于筆端驅而復來久之乃去俄而長安市里相告曰官今大赦有司以聞堅驚謂猛融曰禁中何從泄也於是勑外推之咸言有一小人衣黑衣大呼于市曰官今大赦須臾不見堅歎曰其向者蒼蠅也後魏書曰崔玄伯太宗時郡國豪右大為人蠹乃優詔徵之人多戀本而長更逼遣於是輕薄少年因相扇動所在聚結討之不能禁太宗乃引玄伯及元成侯屈等議赦之屈曰人逃不罪而反赦之似若有求於下不如先誅首惡赦其黨類玄伯曰王者治天下安人為本何能顧小曲直也譬琴瑟不調必改絃而更張夫赦雖非正道而可以權行自秦漢已來莫不相踵屈言先誅後赦會於不能兩去孰與一行便定若其赦而不改者誅之不晚太宗從之後周書曰明帝三年夏詔比屢有糾發官司赦前事此雖意在疾惡但先王制肆眚之道令天下自新若又推問自新何由哉如此之徒有司勿為推究惟庫廄倉廩與海內所共漢帝有云朕天下守財耳若有侵盜公家財畜錢粟者魏朝之事年月既遠一不須問自周有天下以來雖經赦宥而事跡知者有司宜即推窮得實之日但免其罪徵備如法北齊書曰宋良字元友為清河太守甚有善政天保初大赦清河獄內蓬蒿但滿無囚可赦唯率將吏拜詔而已又曰後主將大赦時臨漳令李世業為臺所劾贓多至死世業即穆提婆對門陸令萱言於齊主所以大赦後由是頻赦遂以為常平恩縣功曹賀肫小人姦貪數犯刑憲但入狴牢無不遇赦故世人以肫為赦之候又曰赦日武庫令設金雞及鼓於閶闔門外之右勒集囚徒於闕前撾鼓千聲脫枷鎖遣之隋書曰張煚為天官司會與宗伯斛斯徵素不協徵出為齊州剌史坐事下獄自知罪重遂踰獄而走帝大怒購之急煚上密奏曰徵自以負罪深重懼死遁逃若不北竄胸奴則南投吳越徵雖愚陋久歷清顯奔波敵國無益聖朝今者炎旱為災可因茲大赦帝從之徵賴以獲免煚卒不言唐書曰太宗以法吏舞文尤留意於刑政每親録囚徒貞觀初時方發生乃悉放京城死罪繫囚徒歸家期以秋分還繫所囚勑天下皆放之是歲天下死罪囚如期而還者凡二百九十人太宗愍其奉法悉赦之自是犯法者鮮貞觀二年上謂侍臣曰凡赦唯及不軌之輩古語曰小人之幸君子不幸一歲再赦奴人喑啞凡養稂莠者傷禾稼惠奸宄者賊良人昔文王作罰刑茲無赦夫小仁者大仁之賊故我有天下以來不甚放赦今四海安靜禮義興行數赦則愚人常冀僥幸唯欲犯法不能改過當須慎赦尚書大傳曰有過必赦小罪勿增大罪勿增老弱不受刑有過不受罰故老而受刑謂之悖弱而受刑謂之克不赦有過謂之賊故與其殺不辜寧失有罪與其增以有罪寧失過以有赦家語曰孔子為司寇有父子訟者父子同狴狴獄也而執之三月而不別也其父請止夫子赦焉季孫聞之不悅曰司寇欺余曩告余曰為國家必先以孝余今戮一不孝以教民孝不亦可乎又赦之何哉冉有以其言告孔子喟然歎曰上失其道而煞其下非理也不教以孝而聽以獄是煞不辜三軍大敗不可斬也獄犴不理不可刑也何者上教之不行罪不在民故也管子曰凡赦者小利而大害也故久而不勝其禍無赦者小害而大利也故久而不勝其福故赦者奔馬之委轡也無赦者痤疽之砭石也又曰赦者先易後難法者先難後易故惠者民之仇讎也法者民之父母也莊子曰聞在宥天下不聞治天下郭象注曰宥使自有則治法治之則亂在也者恐天下之淫其性也宥也者恐天下之遷其德也天下不淫其性也不遷其德有治天下者哉無治乃不遷淫耳淮南子曰或曰知天且赦也而殺人或曰知天且赦而活人其望赦同其所利害異故或吹火而燈或吹火而滅所以吹者異也李燮別傳曰燮年逃亡匿臨淄男為酒家傭靈帝即位時月經陰道暈五車史官曰有流星升漢而北陽芒迫卯熒惑入大角犯帝座其占當有大臣被誅者故太尉李固西土人占在固今月經陰道圍五車宜有赦令以除此異上感此變大赦天下求公子孫酒家具車乘厚送之漢舊儀曰踐祚改元立皇后太子赦天下每赦自殊死以下及謀反大逆不道諸不當得赦者皆赦除之令下丞相御史復奏可分遣丞相御史乘傳駕行郡國解囚徒布詔書郡國各分遣吏傳廄車馬行屬縣解囚徒海內先賢傳曰王允字子師誅董卓卓將郭汜李𠐶等聞卓死引兵還圍長安燔掠官省死者萬數大赦天下允忠節三朝更赦書云其赦射帝營宮闕不從此令是日遂及於難華陽國志曰丞相諸葛亮時有言公惜赦亮答曰治世以大德不以小惠故匡衡吳漢不願為赦先帝亦言吾周旋陳元方鄭康成間每見啓亂之道悉矣曾不語赦也若劉景升父子歲歲赦宥何益於治也王符潛夫論曰凡治疾者必先知脈之虛實氣之所結然後為之方故疾可愈也為國者必先知人之所苦禍之所起然後為之禁故姦可塞也夫賊良人之甚者莫大數赦赦數則惡人昌而善人傷矣養稂莠者傷禾稼惠姦宄者賊良人書曰文王作罰刑茲無赦孝明帝時荊州舉茂才初過謝恩賜食事訖問何異聞曰巫有劇賊九人刺史數以牙郡訖不能得帝曰汝非部南郡從事耶對曰是帝乃震怒曰賊發部中不能擒然才何以為茂乃棰數百便免官而切讓州郡十日之間賊即伏誅由此觀之擒盜賊在於明法不在數赦崔實政論曰孝文皇帝即位二十三年乃赦示不廢舊章而已近永平建初之際亦六七年乃赦亡命之子皆老於草野窮困懲艾皆至於死頃間以來歲旦赦百姓輕為姦非前年一朞之中大小四赦諺曰一歲再赦奴兒喑啞況不軌之民孰不肆意遂赦為常俗赦以趣赦轉相驅踧而不得息雖日赦之亂捕擊耳郭子曰孫秀降晉武帝厚存寵之妻以姨妹蒯氏室家甚睦妻嘗怒乃罵秀為狢子秀大不平遂出不復入蒯氏自悔責遂請救於帝時大赦群臣咸見既出帝獨留秀從容言天下曠蕩蒯夫人可得從其例不秀免冠謝為夫婦如初傳子曰若親貴犯罪大者必議小者必赦是縱封豕於境內放長蛇於左右也荀悅漢紀論曰夫赦權時之宜非常典也漢興承兵革之後大過之代比屋可刑故設三章之法申以大赦之令蕩滌穢流與人更始時勢然也後代承業習而不革失時宜矣風角書曰春甲寅日風高去地三四丈鳴條從甲上來為大赦期六十日又曰候赦法冬至後盡丁巳之日南風從巳上來滿三日以上必有大赦望氣經曰黃氣四出注期五十日赦古樂府歌詩曰始出上西門遙望秦氏樓秦氏有好女自名為女休女休年十五為宗行報讎左執白楊刀右援宛景矛上山四五里問吏得女休女休前置辭平生為燕王婦於今為詔獄囚刀矛未及下𢤱橦擊鼓赦書下
