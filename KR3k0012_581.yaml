body:
  text: 樂部十八笛釋名曰笛滌滌然也史記曰黃帝使伶倫伐竹於昆溪斬而作笛吹之作鳳鳴風俗通曰笛漢武帝時工人丘仲所造也本出羌中笛滌也所以滌邪穢納之雅正也長尺四寸七孔樂書曰笛者滌也丘仲所作可以滌蕩邪氣出楊正聲是故列和善吹裁十二之音應律荀勗樞問依三尺二調成均剪雲夢之霜筠法龍吟之異韻三孔為籥文舞執之邠人吹也五孔為遂祴樂用周師掌之六孔為笛羌人吹之七孔下調漢部用也今之七星古之長笛一定為調合鍾磬之均各有短長應律呂之度雅樂部內咸用之也馬融自敘曰融性好音能鼓琴吹笛為督郵獨臥郿平陽塢中有洛客舍逆旅吹笛相和融去京師踰年暫聞甚悲而樂之逆慕簫琴皆有頌而笛獨無乃作笛賦晉書曰桓伊字叔夏善音樂有蔡雍柯亭笛嘗吹之王徽之越京泊舟青溪側伊素不相識於岸上過徽之便使人謂之曰聞君善吹笛試為我一奏伊時已貴顯素聞徽之名便下車踞胡床為作三調之弄便上車去客主不交一言晉書向秀作思舊賦曰鄰家有吹笛發聲寥亮追想疇昔遊宴之好晉中興書曰帝舅王愷嘗置酒王遵王敦俱往女妓吹笛小失聲愷意便令黃門歐殺之一坐改容敦神色自若沈約宋書曰晉太始十年中書監荀勖中書令張華令郝生鼓琴宋同吹笛以為新引相和唐書曰文宗時雲朝霞以善吹笛進上為新聲雅樂朝霞能承意變聲頗符上旨猶是有寵世說曰謝仁祖妾阿紀有國色善吹笛仁祖死阿紀誓死不嫁郗曇時為北中郎設權計遂得阿紀為妾阿紀終身不與曇言幽明記曰永嘉中泰山巢氏先為相縣令居在晉陵家婢採薪忽有一人隨追尋隨婢還家不使人見見形者唯婢而已每與婢飲宴輒吹笛而歌歌曰間夜寂以清長笛亮且鳴若欲知我者姓郭名長生又曰代郡界有一亭常有怪不可詣止有諸生壯勇行歌正宿鬼吹五孔笛有一手都不能得攝笛諸生不耐忽便笑謂汝止有一手郍得遍笛我為汝吹來鬼云為我少指耶乃數十指出諸生知其可擊拔劍斫之得一老雄雞從者並雞雛文士傳曰蔡雍告吳人曰吾昔常經會稽高遷亭見屋㭬竹東間第十六可為笛取用果有異聲古歌辭曰長笛續矩笛長願陛下保壽無極傳子曰列和善吹笛吳姬之聲無以加也西京雜記曰高祖初入咸陽宮周行府庫金玉珍寶不可稱言其尤驚異者玉笛長二尺三寸六孔銘曰昭華之琯樂纂曰唐玄宗時樂人孫處秀善吹笛好作犯聲當時皆以為新意流美樂人皆效之其聲變態日增因有犯調犯調即今之所尚也又曰太和十年中書監荀勗中書令張華出御府銅竹律二十五具命太樂郎劉秀等校試其三具與杜夔及左延年法律同其二十二具視其銘題尺寸是笛律也問協律中郎將列和辭昔魏明帝時令和永受笛聲以作此律欲使學者別居一坊歌詠講習依此律調但識其尺寸之名則竹絲歌詠皆得均含歌聲濁者用長笛長律歌聲清者用短笛短律凡絃歌調張清濁之制不依笛尺寸名之則不可知也又曰黃鍾笛晉時三尺八寸元嘉九年太樂令鍾宗之減為三尺七寸十四年治書令史奚縱又減五分為三尺六寸五分劉和之東箱長笛四尺二寸又曰蕤賓箱笛晉時二尺九寸宗之減為二尺六寸縱又減二分為二尺五寸八分又曰姑洗箱笛晉時三尺五寸宗之減為二尺九寸七分縱又減五分為二尺九寸二分又曰司馬法軍中之樂鼓笛為上使聞之者壯勇而樂和細絲高竹不可用也慮悲聲感人士卒思歸之故也又曰橫笛小箎也漢靈帝好胡笛有胡笛箎出於胡吹即此也梁胡歌云快馬不須鞭拗折揚柳枝下馬吹橫笛愁殺路傍兒此歌辭元出北國知撗笛是北國名今撗笛皆去義觜其有觜者謂之義觜笛國史補曰李舟好事嘗得村舍煙竹截以為笛堅如鐵石以遺李牟牟吹笛天下第一月夜泛江與舟吹之溜亮逸發俄有客立於岸呼船請載既至請笛而吹其為精壯山石可裂牟平生未嘗見及人破呼吸盤辟應指粉碎客散不知所之舟著記疑其蛟龍也又曰李牟秋夜吹笛於瓜州舟楫甚隘初發調群動皆息及數奏微風颯然而至俄頃舟人賈客有怨嗟悲泣之聲箎釋名曰箎啼也聲從孔出如嬰兒啼聲也毛詩曰彼何人斯伯氏吹塤仲氏吹箎周官曰笙師掌教吹箎爾雅曰大箎謂之沂郭璞曰箎以竹為之長一尺四寸圍三寸一孔上出寸三分名翹濮吹之小者尺二犍為舍人曰大箎其聲悲沂鏘然也詩云仲氏吹箎也廣雅曰箎以竹為之長大四寸有八孔前有一孔後有四孔頭有一孔月令仲夏之月命樂師調箎詩節南山云伯氏吹塤仲氏吹箎土曰塤竹曰箎箋云伯仲諭兄弟也我為汝思如兄如弟其相應和如塤箎言俱為王臣宜相親愛之史記曰伍子胥至於江上無以糊其口行蒲伏肉袒吹箎乞食於吳市東觀漢記曰明帝幸南陽舊宅召校宮子弟作雅樂奏鹿鳴上御塤箎和之以娛嘉賓齊書曰世祖於南康郡內作伎有絲無管空中聞有箎聲調節相應世本曰蘇成公造箎吹孔有觜如酸棗蘇成公平王時諸侯也古史考曰古有箎尚矣蘇成公善箎而記者因以為作謬也又曰暴新公所造舊志曰一曰管史臣案非也雖不知暴新公何代人而非舜前人明矣舜時西王母獻管則是已有器新公安得造箎洞冥記曰建元二年帝幸騰充臺以望四遠於臺上撞磬玉鍾懸黎之磬吹霜條之箎唱來雲依日之曲洛陽伽藍記曰後魏河間王琛有婢朝雲善吹箎能為圃扇歌隴上聲琛為秦州剌史羌叛屢討不勝琛令朝雲假為貧女吹箎而乞羌聞之皆流涕相謂曰何故捨墳井在山谷為寇耶即相率而降秦民語曰快馬健兒不如老嫗吹箎管蔡雍章句曰管者形長一尺圍寸有孔無底其器今亡風俗通曰管漆竹長一尺六孔十二月之音象物貫地而牙故謂之管爾雅曰大管謂之簥其中謂之篞小者謂之篎郭璞注曰管長尺圍寸併漆之有底賈氏為之如箎六孔犍為舍人曰大管者聲高大故曰篙者高也中者聲精密故曰䈌䈌密也小者聲音清妙也廣雅曰管象箎長尺圍寸有六孔無底班固曰黃帝作律以玉為管長尺六孔為十二月音至舜時西王母獻白玉管漢章十二年零陵營道舜祠下得笙白玉管則古者又以玉為管矣班氏用銅之言外然之義未為得也求律所生大極之數起於一在子以三乘之得三在丑以次至酉得一萬九千六百八十三篇黃鍾之母以為法周十二辰得十七萬七千一百四十七黃鍾之子以為實實始法而一得則九寸則諸律也大戴禮曰舜時西王母獻白玉琯說文管如箎六孔十二月之音物關地而牙故謂之管從竹管聲琯者古者有玉管焉樂法圖曰次主東律東律主黃鍾聖人承天樂用管宋均注曰管黃鍾九寸管也吹管者以知律管音調則律曆正周禮春官少師曰小師掌教簫管鄭司農曰管如箎六孔玄謂管如𥴦而小併兩而吹之又曰孤竹之管於圓丘奏之孫竹之管於方丘奏之陰竹之管於宗廟奏之鄭玄云孤竹竹特生者也孫竹竹枝根未生者也陰竹生山北籥釋名曰籥躍也氣躍出也爾雅曰大籥謂之産中者曰仲小者曰箹郭璞曰籥也笛三孔而短犍為舍人曰仲其聲適仲呂也小者形聲細小曰筠也禮記曰葦籥伊祁氏之樂也籥春分之音萬物振躍而出也周官笙師掌教吹籥籥師教國子舞羽吹籥籥章掌幽籥鄭玄曰卯地之竹也又曰籥師掌教國子秋冬教吹籥歷代文舞之樂所執羽籥毛詩曰左手執籥右手秉翟
