body:
  text: 人事部九脣吻說文曰脣口端也釋名曰脣緣也口之緣也吻免也入則碎止則免也又取枚也吹唾所出恒加枚栻因以為名也傳曰晉欲伐虢假道於虞虞君許之宮之奇諫曰諺有之輔車相依脣亡齒寒其虞虢之謂乎又曰吳將伐魯王問於子洩對曰諸侯將救之未可以得老焉夫魯齊晉之脣脣亡齒寒君所知也不救何為春秋元命苞曰脣者齒之垣所以扶神設端若有列星與外有限故曰脣亡齒寒春秋孔演圖曰八政不中則人無脣人恃脣乃語命無陰不制孝經鉤命決曰仲尼斗脣吐教陳機授度史記曰越王勾踐曰孤常不料力與吳戰困於會稽日夜焦脣乾舌徒欲與吳王接踵而死漢書曰張湯與顏異有隙人有告異以他議事下湯治異云異與客語客云初令下有不便者異不應徵反脣湯奏異九卿見令不便不入言而腹非論死自是後有腹非之法又薛宣傳曰博士申咸毀丞相宣家行不足宣子況賕音求客楊明斫咸宮門外申斷鼻脣況坐從宣免為庶人王隱晉書曰寒俊傳曰劉升龍須昌人赤色文脣少言語有大志自縣小吏至雍州刺史梁書曰侯景僭位入登太極殿其徒數萬吹脣唱吼而上莊子曰孔子謂盜跖曰將軍脣如激丹淮南子說山曰孕見兔而子缺脣見麋而四目物固有然不然也賈誼曰沸脣投塞垣之下匈奴號也通俗文曰脣不覆齒謂之齖音牙䶥粗家切廣志曰赤口濮嶄其脣以丹飾之瀨鄉記李母碑曰老君厚脣趙志自敘曰志長七尺四寸潔白黑髮明眉赤脣髭鬢不多燉煌實錄曰王棽音參又丑林切卒有盜開棽冢者見棽與人樗蒲舉杯酒賜盜者惶怖既飲見牽銅馬出其夜有神告城門我王孟曾使也人發孟曾冢以酒黑其脣明日入城有黑脣者是也須臾馬還流汗盜明詣城門不覺脣黑為吏所縛孟曾棽之字也宋玉神女賦朱脣若丹曹植洛神賦曰丹脣外朗皓齒內鮮又曰啟朱脣以徐言崔駰七依曰紫脣素齒雪白玉暉廣雅曰咡謂之吻咡音餌淮南子曰決吻治齲君子不與齲丘主切齒說文曰齓毀齒也男生八月生齒八歲而齓女七月生齒七歲而齓音引釋名曰齒始也少長之別始乎此也以齒食多者長食少者幼也禮曰母剌齒口口容止也又曰濡肉齒決決猶斷也乾肉不齒決壑宜用乎又曰高子皋之執親之喪也泣血三年未嘗見齒言笑之微君子以為難左傳曰陳僖子使召公子陽生立之將盟遂誣鮑子曰之命也鮑子曰汝忘君之為孺子牛而折其齒乎孺子荼也景公常銜繩為牛使荼牽之荼頓地折其齒也詩碩人曰齒如瓠犀又閟宮曰既受多祉黃髮兒齒公羊傳莊公曰仇牧聞閔公弒趨而至遇之于門手劍而叱之宋萬臂樧仇牧碎其首齒著乎門闔側手曰假袁葛切春秋元命苞曰武王駢齒是謂剛強取象參房誅害以從天心宋均注曰房為明堂主布政參為大辰主斬刈兼此二者故重者為表孝經鉤命決曰夫子駢齒象鉤星也史記曰顏回年二十九髮盡白齒早落又曰范睢事魏中大夫須賈賈使齊睢從齊襄王聞睢辯賜金及牛酒賈以為睢持魏事告齊故得饋以告魏相魏齊大怒使人笞擊睢折脇摺齒睢佯死漢書曰張蒼無齒唯飲乳百有餘歲而卒謝承後漢書曰豫章項誦字叔和為郡主簿太守為屬縣所誣章誦詣獄證要引自掾音斷血出滂流齒皆墮地太守獲免晉書曰溫嶠先有齒疾疾因拔齒中風而卒又曰成帝杜皇右少有姿色長猶無齒有求昏者輒中止及帝納采一夜齒盡生又曰謝鯤鄰家有美女鯤調之女以梭投鯤折其兩齒世俗為之謠曰任達不已幼輿折齒幼輿鯤字也山海經曰黑齒國為人黑齒河圖矩起曰帝嚳駢齒宋均曰所以駢齒齒星位白虎通曰帝嚳駢齒上法曰參秉度成紀以埋陰陽抱朴子內篇曰或問堅齒之道荅曰養以華池漱以濃液永不動次則服靈非散既脫更生楊泉物理論曰夫齒者年也身之寶也藏之斧鑿所以調諧五味以安性氣者也神仙傳曰老君䟽齒神仙服經曰服神丹三百歲齒化為石王閎本事曰閎為琅琊太守張步欲誅之閎出東武城門馬奔墮車折齒閎心惡移病歸府前得免字林曰䶜牛於切齒不相值也楚初舉齒切齒傷酢也齩午校切齧噬也齨老人齒如臼也齨音舅段國沙州記曰國人年五十以上四齒皆落將由地寒多障氣也異物志曰屠移在海外以草染齒因號黑齒袁子正書曰山梁氏泥於西屠而染其齒世說曰孫子荊少時欲隱語王武子曰吾當枕石漱流誤云漱石枕流王曰流非可枕石非可漱孫曰所以枕流欲洗其耳所以漱石欲礪其齒又曰王子猷詣謝玄林公先在坐王曰若林公髮鬢並全神情當復勝此不謝曰脣齒相須不可偏亡琴操曰聶政父為韓王冶劍過期不成王殺之時政未生及長入太山遇仙人學鼓琴漆身為厲吞炭變音七年琴成入韓逢其妻從買櫛對妻而笑妻泣曰君何以似政齒政乃入山援石擊落其齒楚辭曰美人皓齒嫮以姱臨海水土志曰夷州人俗女曰已嫁皆缺去前上一齒宋玉登徒子賦曰腰如束素齒如含貝司馬相如上林賦曰皓齒粲爛張協褉賦曰清哇發於素齒牙釋名曰牙植牙也隨形言之也干寶晉紀曰賈庶人未害慜懷太子時有謠曰南風烈烈吹白沙千歲髑髏生齒牙南風庶人名愍懷小名沙門三國典略曰齊太上主生齻音顛牙問於尚藥典御鄧宣以對太上主怒而撻之中書監徐之才拜賀曰此智牙生者聰明長壽太上悅而賞之喉咽說文曰咽嗌也喉嚨也釋名曰咽咽物也青徐謂之脰音豆物投其中受而下之也又謂之嗌音益氣所通流阨要之處也傳曰敗狄于鹹獲長狄僑如富父終生舂其喉以戈殺之孝經鉤命決曰夫子輔喉史記曰孫子曰夫救鬭者不搏撠音戟批亢擣虛形格勢禁則自為解耳亢音剛又音抗人喉也又曰貫高聞赦張王乃曰所以不死者白張王不反今王已出吾責已塞死不恨矣且人臣有篡弒之名何面目復事上哉縱上不殺我不媿心乎乃仰絕亢而死韋昭曰亢咽也漢書曰人有上書言息夫躬懷怨恨非笑朝廷所進候星宿視天子吉凶與巫共祝詛上遣侍御史廷尉監逮躬繫雒陽詔獄欲掠問躬仰天大謼火故反因僵仆吏就問云咽已絕師古曰咽喉嚨也音一千反後漢書曰霍諿音緝為舅宋光被誣上書曰譬猶療飢於附子止渴於酖毒未入腸胃已絕喉咽豈可為哉又曰王青字公然青父隆建武初為都尉功曹青為小吏與父俱從都尉行縣道遇賊隆以身衛全都尉遂死於難青亦被矢貫咽音聲流喝又曰李固對詔曰陛下有尚書猶天之有北斗北斗天之喉舌尚書陛下之喉舌魏志曰樂陵王茂兄東平王薨茂稱咽病不肯發哀詔削戶蜀志曰彭羕與葛亮書曰先民有言左手據天下之圖右手扼其喉愚夫不為也僕頗別菽麥哉唐書曰幽州朱融鎮州王庭湊叛東川節度王涯獻書曰臣聞用兵若鬭先扼其喉今瀛莫易定兩賊之咽喉也誠宜假之威柄戍以重兵俾其死生不相知間諜無所入而以大軍先進冀趙次臨井陘此一舉萬全之勢也抱朴子曰焦喉之渴遙指滄海列女傳曰齊鍾離春者宣王后也極醜邛鼻結喉益部耆舊傳曰犍為楊鳳珪者其妻陳姬珪早亡兄弟欲嫁之姬於是列刀割咽流血幾死九族驚異乃從其節又曰蜀郡史賢妻張昭儀賢既犯罪被誅儀取刀自割咽喉而死物理論曰咽喉生之要孔黃帝素問曰喉主天氣咽主地氣頤頷釋名曰頤或曰輔車其骨強所以輔持其口或曰牙車牙所載也或曰頷車頷含也韓詩曰有美一人碩大且媕薛君曰媕重頤也五檢切周易噬嗑卦曰頤中有物曰噬嗑又頤卦曰頤貞吉觀頤自求口實春秋元命苞曰后稷歧頤自求是謂好農蓋象角元載土食穀宋均注曰面皮有二象也頤面為下部下部為地巧於利也戰國策曰靜郭君善昆辨昆辯多疵門下不悅孟嘗君以諫靜郭君大怒舍之上舍令長子御旦暮進食威王薨宣王立太子不善靜郭君辭之薛昆辯至齊見宣王王曰子靜郭君所聽愛者乎曰愛即有之聽即無有王之為太子辯謂靜郭君曰太子相不仁過頤豕眎若是法背父不若廢太子更立衛姬子嬰兒郭師靜郭君泣而曰不可吾弗忍為聽辨而為之必無今患矣宣王曰寡人殊不知此乃迎靜郭君史記曰黃歇上書秦王曰本國殘社稷壞刳腹結膓折頸摺頤摺盧合切又曰蔡澤顩頤顩五撿切漢書曰王莽蹙頤范曄後漢書曰班超字仲升為人大志不脩小節嘗行詣相者相者曰祭酒布衣諸生而當封侯萬里之外超問其狀相者曰生燕頷虎頭飛而肉食此萬里侯相也江表傳曰孫權方頤大口三國略曰徐之才年十三劉孝綽見之言曰徐郎鷰頷班超之相也帝系曰帝嚳方頤莊子曰支疏頤隱於齊又曰孔子遊緇惟之林弦歌鼓琴奏曲未半有漁父下舡而來鬚眉交白被髮揄袂行原而上距陸而止左手據𣍿右手持頤以聽之韓子喻老曰白公勝慮亂罷朝到杖策錣貫頤血流至地而弗知鄭人聞之曰頤之忘何不忘哉策馬箠也有針似馬謂之錣音竹劣陟衛二切河圖曰黃帝兌頤說苑曰田單攻翟三月不克嬰兒謠曰大冠如箕長劍柱頤西京雜記曰匡衡字稚圭勤學能說詩時人為之語曰無說詩匡鼎來匡說詩解人頤鼎衡小字也王粲七釋曰揚蛾眉而頤指汝南先賢傳曰周爕顩頤折頞其貌甚醜也談藪曰北齊李恕無鬚崔諶玩之曰何不錐剌頤作數百孔拔左右好鬚者栽之承漿釋名曰口下曰承漿承水漿也針灸經曰承漿一名懸漿也
