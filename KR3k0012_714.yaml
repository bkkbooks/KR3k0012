body:
  text: 服用部十五匣說文曰匣匱也論語季氏曰孔子謂冉求曰虎兕出於匣拾遺錄曰含塗國人善服鳥獸雞犬皆使之能言雞犬牛豕死者以玉為匣埋海上其主遊戲海上於地中聞犬豕雞之聲主者猶識掘而取之還養如昔焉唯毛羽禿落久更悅弈魏武帝上雜物䟽曰銀鏤漆匣四枚古歌曰流塵生玉匣匱說文曰匱櫝也匣也論語子罕云韞櫝而藏諸求善價而沽諸櫝匱也論語季氏曰龜玉毀於櫝中左傳曰昭七年傳曰燕人歸燕姬以瑤甕玉櫝國語曰夏之衰也褒人之神化為二龍而言曰余褒之二君也夏后布幣而策告之龍亡而漦在櫝而藏之漦俟淄切龍涎也王隱晉書曰甘卓家金匱鳴聲似槌鏡清而悲師言金匱將離是以悲鳴尋而卓下將軍周慮等承望敦意害卓唐書曰王伾下劣闒茸不能如叔父有大志唯務金帛寶玩為無門大櫃上開一孔使足以受物夫妻寢止其上韓子曰楚人賣其珠於鄭者為木蘭之櫝薰以桂椒綴以珠玉飾以玫瑰緝以翡翠鄭人買櫝而還珠未可謂善鬻珠也李尤匱匣銘曰國有都邑家有匣匱貨賄之用我之利器廚魏略曰扈累字伯重京兆人常隨青牛先生先生字方正曉知星曆風角鳥情累得其術有婦無子後亦喪婦獨居道側以塼為障施一廚床食宿其中晉陽秋曰顧愷之尤好丹青嘗以一廚畫寄桓玄悉糊題其前玄乃發廚後而取之封題如舊以還之愷之見封題如初但失其畫直云妙畫通靈變化而去猶人登仙也沈約宋書曰收范曄家樂器服玩並皆珍麗妓妾亦盛飾母住止單陋唯有一廚盛樵薪齊書曰衡陽王鈞母區貴人卒鈞哀毀甚先是貴人花釵廚子賜鈞以為玩弄貴人亡後每歲時及朔望輒開禮再拜鯁咽見者皆為之悲又曰陸澄當世稱為碩學讀易三年不解文義欲撰宋書竟不成五儉戲之曰陸公書廚也南史記謝弘微臨終語左右曰有二廚書須劉領軍至可於前燒之慎勿開也拾遺錄曰郭況家富以玉器盛食故東京謂郭家為瓊廚金屈東宮舊事曰皇太子拜有柏書廚一梓書廚一范甯教曰籍官之大信而比散在眾曹此不可也可令作十五籍廚一縣一廚
