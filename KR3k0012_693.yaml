body:
  text: 服章部九珮説文曰珮大帶佩也珮必有巾故從巾故釋名曰珮倍也言其非一物有倍二也有珠有玉有容刀有帨巾有觿之屬也詩曰青青子珮悠悠我思佩玉也又曰有女同車顏如舜華將翱將翔佩玉瓊琚又曰知子之來之雜珮以贈之雜珮者珩璜琚瑀衡牙之類知子之順之雜珮以問之問遺也知子之好之雜珮以報之又曰彼留之子貽我珮玖又曰我送舅氏悠悠我思何以贈之瓊瑰玉佩又曰巧笑之瑳珮玉之儺又曰鞙鞙音蠲珮璲不以其長鞙鞙玉貌璲瑞也以瑞玉為佩佩之鞙然周禮曰玉府掌王之金玉玩好共王之服玉佩玉禮曰主珮倚則臣珮垂主佩垂則臣珮委又曰石駘仲卒無適子有庶子六人卜所以為後者曰沐浴珮玉則兆五人者皆沐浴珮玉石祁子曰孰有執親之喪而沐浴珮玉者乎不沐浴佩玉石祁子兆又曰古之君子必珮玉右徵角左宮羽趨以采齊路門之外樂節也行以肆夏證堂之樂節也周旋中規折旋中矩進則揖之退則揚之然後玉鏘鳴也故君子在車則聞和鸞之聲行則鳴珮玉是以非辟之心無自而入也君在不佩玉左結珮右設珮朝於君亦結左齊則綪結珮而爵韠凡帶必有佩玉唯喪否珮玉有衡牙居中央以前後觸君子無故玉不去身君子於玉比德焉天子佩白玉而玄組綬公侯佩山玄玉而朱組綬大夫珮水蒼玉而純組綬世子珮瑜玉而綦組綬士珮瓀玫而縕組綬孔子珮象環五寸而綦組綬大戴禮曰上車以和鸞為節下車以珮玉為度左傳曰蔡昭侯為兩佩與裘以如楚獻一珮一裘於昭王服之以享蔡侯亦服其一子常欲之弗與三年止之事具玉部又曰吳申叔儀乞糧於公孫有山氏申叔儀吳大夫公孫有山魯大夫舊相識曰珮玉蘂兮余無所繫之蘂然服飾備也無以繫佩言吳王不恤下也魚豢魏略曰有雙璜雙珩琚瑀衝牙琨珠為珮者乃漢明帝采古文始制也晉書曰王祥箸遺令子孫云吾氣絶不須沐浴勿纏尸皆浣故衣隨時所服所賜山玄玉珮衛氏玉玦綬笥皆勿以斂齊書曰永明元年有司奏貴妃淑妃並加金章紫綬珮于置玉隋書曰何稠參會古今多所改創從省之服初無珮綬稠曰此乃晦朔小朝之服安有人臣謁帝而除去印綬兼無珮玉之節乎乃加獸頭小綬及珮一隻國語曰秦穆公使公子縶弔公子夷吾于梁退而私於縶曰請以黃金三十鎰白玉之珩六雙不敢當公子納之左右又曰王孫韋聘於晉定公饗之趙簡子鳴玉以相鳴佩玉以相禮問於王孫韋楚之白珩猶在乎珩珮上之璜者對曰然簡子曰其為寶也幾何矣曰未嘗為寶先王之玩也周書曰武王俘商得舊寶玉萬四千珮玉億有八萬石擊虞決疑要注曰漢末喪亂絶無玉佩魏侍中王粲識舊珮始復作之今玉珮受法於粲三禮圖曰凡玉珮上有雙衡長五寸博一寸下有雙璜徑三寸衝牙蠙珠以納其間上下為衡半璧為璜璜中橫以衝牙以蒼珠為瑀董巴漢輿服志曰古者君臣珮玉三代同之五霸興兵珮非戰器去珮留其係穟以為章表秦乃以采組連結謂之綬漢承秦制用而弗改至孝明皇帝乃為大珮衝牙雙渠璜皆以白玉乘輿絡以白珠公卿諸貴以采絲其玉視冕旒蔡雍輿服志曰孝明帝作蠙珠之珮以郊祀天地白虎通曰所以必有珮者表意見所能故修道無窮即珮環能大道德即珮琨能決嫌疑即珮玦是以其所佩即知其所能若農夫佩其耒耜工匠珮其斧斤婦人珮其針縷也孔藂子曰子産死鄭人大夫舍玦珮婦女舍珠玉説死曰襄成君始封之日衣翠衣帶玉珮至流水之上大夫莊辛見而悅之又曰經侯過魏太子左服玉具劍右帶珮環左光照左右光照右太子不視經侯曰魏國有寶乎太子曰主信臣忠百姓戴上此魏國寶也經侯應聲解劍而去珮鹽鐵論曰子思銀珮尚書舊傳曰淑妃修媛修華修容婕妤佩彩瓊玉貴人珮於置玉鄴中記曰石虎後出行有女鼓吹尚書官屬皆著錦袴珮玉晉令曰皇太子妃珮瑜玉諸王郡公太宰太傅太保司空諸長公主諸王世子大司馬大將軍太尉珮玄玉晉宋舊事曰太后皇后白玉佩穆天子傳曰七萃之士天子賜以左佩玉華玉華之珮珮之精者又曰天子渴於沙中沙中無水七萃之士高奔戎剌其左驂之頰取其清血而飲天子天子美之乃賜奔戎珮玉一雙列仙傳曰江濱二女者不知何許人步遊江濱逢鄭交甫挑之不知神人也女遂解珮與之交甫悅乃受珮而去數十步空懷無珮女亦不見拾遺録曰燕昭王時西王母降與昭王遊乎燧林之下説炎皇鑽火之術取緑桂之膏然以照夜忽有飛蛾御火狀如丹雀來拂桂膏之上此蛾出員丘之穴穴洞達於九天中有細珠流沙可穿而結因用為珮又曰漢成帝時乘輿服皆尚黑宮中美女服皂班姬以下皆玄綬醫珮又曰漢昭帝元始元年穿林池廣千步中植分枝荷一莖四葉狀如駢蓋日照則葉低廕根莖若葵之衛足也名曰低光荷實如玄珠可以飾珮漢武內傳曰上元夫人帶六出火玉之珮搜神記曰元康中婦人之飾有五兵珮楚辭曰扈江離與薜荔扈被也紉秋蘭以為珮紉蘭索香草也又曰雲衣兮披披披披長貌玉珮兮陸離陸離光彩貌又曰連蕙若以為珮兮過鮑肆而失香又曰盍吾遊此春宮春宮東方青帝宮折瓊枝以繼珮潘嶽西征賦曰飛翠緌拖鳴玉出入禁門者衆矣想珮聲之遺響若鏗鎗之在耳劉梁七舉曰珮則結緑懸黎寶之妙微荷彩昭爛流景楊暉曹植與陳琳書曰帶蜿虹以為紳連日月以為珮殷仲堪與相王箋曰所致玉佩光潤清越傅玄大言賦曰腰珮六氣首戴天文環説文曰好倍肉謂之瑗肉好若一謂之環禮曰孔子佩象環五寸而綦組綬謙不比德亦不事也象有文環者也環者取其修無窮左傳曰穆叔之子仲壬與公御萊書觀於公宮公豫之環使才人入示之不示出命佩之又曰宣子有玉環其一在鄭商玉環同工共朴自共為雙宣子謁諸鄭伯謁請也子産弗與事具玉部宋書曰江夏王義恭孝武即位以其藩所服玉環大綬賜之梁書曰柳惔武帝之鎮襄陽惔祖道帝解玉環贈之天監二年元會帝謂曰卿珮玉環是新亭所贈耶對曰既瑞感神衷臣謹服之無斁白虎通曰修道無窮即珮環也瑞應圖曰黃帝時西王母乘白鹿來獻白環舜時復來獻白環王子年拾遺録曰顓頊時濱海之北有勒題國皆衣毛無翼而飛帝乃更衣以文豹為飾獻黑玉之環色如淳漆荀卿子曰大夫待放于境君賜以環即返以玦即去西京雜記曰趙飛燕為后女弟昭儀上五色玉環春秋後語曰秦始皇聞齊王后賢嘗使遺之連環曰齊人多智能解此乎后以示群臣莫能解乃引椎破之謝秦使曰謹以解矣以報始皇壯其志益不敢謀齊劉向列女傳曰齊桓公行霸諸侯朝之衛獨不至公謀伐衛衛姬脫簪珥解環再拜請徵之罪莊子內篇云彼是莫得其偶謂之道樞樞得其環中以應於無窮夫是非反覆相尋無窮故謂之環中空矣令以是非為環而得其中者也無是非者也無是非故能夫是非無窮故應亦無窮玦説文曰玦玉珮珮如環而有玦故云玦詩曰芃蘭之葉僮子佩韘韘玦也左傳曰狄人伐衛將戰衛懿公與石祁子玦與寧莊子矢使守莊子寧遠也玦玉玦曰以此贊國擇利而為之贊助也玦示以當決斷矢示以禦難又曰晉侯使申生伐山皋落氏珮之金玦狐穾曰金寒玦離胡可恃也罕夷曰金玦不復雖復何為君有心矣國語曰獻公使申生伐東山衣偏裻音篤之衣佩之金玦太子見理克曰君賜我以偏衣金玦何也克曰孺子懼乎衣金之偏而握金不偷矣太子遂行狐突御戎先友為右告先友曰君與我此衣何也先友曰中分而金玦之權在此行也狐突歎曰以厖衣純尨雜色純德謂太子而玦之以金銑者寒甚矣胡可恃也典略曰項羽與沛公飲范增數目羽舉所佩玉以示之者三羽默然後漢書曰更始謀殺升伯伯升光武兄乃會諸將以成其計繡衣御史申徒建隨獻玉玦更始竟不能殺東觀漢記曰明帝詔曰馮魴以忠孝出入八年數進忠言正諫賜以玉玦續漢書曰桓帝永興二年光祿勳吏舍壁下夜有青氣視之得玉鉤玦各一魏氏春秋曰明帝張掖郡金山玄川溢涌寶石負圖有玉匣開蓋於前上有玉玦二璜一魏略曰太祖征漢中太子在孟津聞鍾繇有玉玦使臨淄侯曹子建也因人説之繇遂送焉太子與繇書曰南陽宗惠叔稱君侯昔有美玦聞之驚喜笑與抃會當自白書恐傳言未審是以令舍弟子建因荀仲茂時從容喻鄙指鄴騎既到寶玦初至捧押跪發五內震駭繩窮押開爛然滿目偎以蒙鄙之姿得覩希世之寶不煩一介之使不捐連成之價既有秦昭章臺之觀而無藺生詭奪之誑嘉貺益腆敢不欽承謹奉賦一篇王隱晉書曰禮能使決疑者珮玦故遣其臣亦授之以玦今靈命有二玦其一當魏曆數既終當禪大晉故與之玦凡受命將即天子之位皆衆人之所疑以武皇帝能斷決應天順民受曹氏禪而無疑德應珮玦故以賜焉是以有二玦蕭子顯齊書曰太祖在淮陰治城得錫玦大數尺下有篆字人莫識紀僧真曰何須辨文此自久遠之物即九錫之徵也太祖曰卿勿妄言北齊書曰樂陵王百年傳博陵人賈德胄教百年嘗作數勑字德胄封以奏帝帝怒召百年百年知不免割帶玦留與妃斛律氏及百年被誅妃把玦哀號不食而死玦猶在手拳不可開其父自擘之乃開白虎通曰能決嫌疑則佩玦瑞應圖曰舜時西王母獻白環玦隨巢子曰召人以環絶人以玦莊子曰儒者綬佩玦者事至而斷西京雜記曰趙飛燕為皇后女弟昭儀上珊瑚玦孟達與諸葛亮書曰今送綸帽玉玦各一以徵意焉笏釋名曰笏忽也君有教命及所啓白則書其上備忽忘也或曰薄可以薄疏物禮曰笏天子以球玉諸侯以象大夫以魚須與鬚同文竹士竹本象可也見於天子與射無説音脫笏入太廟説笏非古也小功不説笏當事免則説之免悲哀哭踊之時凡有指畫於君前用笏造受命於君必書於笏笏畢用也因飾焉畢畫也笏度二尺有六寸其中博三寸其殺六分而去一殺猶抒也天子抒上終葵首諸侯不終葵首又曰將適公所書思對命思所思念將以告君書之於笏為失忘也又曰侍坐於君子君子欠伸運笏澤劍首還履問日之蚤音早暮請退可也運澤猶玩弄也大戴禮曰天子御珽珽言挺然方正於天下諸侯御荼荼前詘後直下天子也荼音舒大夫服笏前詘後詘無所不護也又曰五經要義曰天子之笏謂之珽珽然無所屈也周書曰武王不閉外門以示無懼去釰搢笏以示無仇後漢書曰陳蕃為光祿勳范滂為主事以公儀詣蕃執板入閣至坐不奪滂投板振衣而去郭泰責蕃曰以階級言滂宜有敬以類數推之至閣宜省所暴切吳志曰朱治領吳郡舉孫權為孝廉後權為吳王治每見權常執板交拜板即笏也晉書曰王敦表溫嶠為丹陽尹因餞會錢鳳自起行酒至鳳未飲嶠偽醉以手板擊鳳幘墜作色曰錢鳳何人溫太真行酒敦不悅兩釋之又曰桓溫秉政謝安王坦之往候之坦之倒持手板宋書曰建平王宏文帝子也元凶劭弒立孝武入討劭録宏殿內自拔莫由孝武先嘗以一手板於宏遣左右親信周法道齎手板詣孝武事以為尚書左僕射又曰庾道愍尤精相板宋明帝時山陽王休祐屢以言語忤顏見道愍託以己板為他物令道愍占之道愍曰此乃甚貴然使人多愆忤祐以禇彥同祥密求換其板他日彥回侍明帝自稱下官帝多忌甚不悅休祐具以狀言帝乃意解又曰綦母珍之在西州時有一手板相者云當貴每以此言動帝又圖黃門郎帝嘗問之曰西州時手板何在珍之曰此是黃門手板官何須問帝大笑齊書曰豫章王嶷薨見形於第居第也後園乘腰輿指麾處分呼直兵直兵無手板左右授一玉手板與之謂曰橘樹一株死可覔補之因出後園閣直兵倒地仍失手板宋書曰明帝起事諸方並舉兵帝謂蔡興宗曰頃日人情言何事當濟不興宗曰今米甚豐賤而人情更安以此論之清蕩可必伹臣之所憂更在事後猶羊公言既平之後方當勞聖慮耳尚書禇彥回以手板築興宗不已上曰如卿言北齊書曰爾朱榮既誅得其手板上有數牒啓皆左右去留人名非其腹心在出限帝曰豎子若過今日便不可制又曰文襄疑文宣佯愚慮其有後變將陰圖之以問崔暹暹曰嘗與二郎俱在行位試以手板柏其背而不瞋乃將犀手板換暹竹者自揩拭而玩視之以是知其實癡不足慮也帝既鎖暹責其往昔打背暹自陳所對文襄之言己功以贖死帝悟曰我免禍乃暹之力釋而勞之唐書曰高宗欲立武昭儀禇遂良諫不從置笏殿街曰還陛下此笏乃解巾叩頭流血又曰崔滌玄宗時嘗朝夕宮掖出入無間慮有所漏泄乃於滌笏上親札慎密二字以誡之又曰玄宗以張九齡體弱簪笏不勝命置笏囊又曰李絳面論吐突承瓘用兵無功合從顯責又論承瓘於軍中立聖政碑事不可許上初怒色變絳語不已詞旨懇切因泣下上察其意乃大開忤拜絳為中書舍人即命曳去所立碑曰微降言吾不知為損又面賜絳紫親為絳擇笏以賜之因謂之曰爾他時勿易此心又曰朱泚盜據宮闕乃遣將韓旻領兵疾趨奉天召段秀實與之謀議秀實從欲圖之陰説大將劉海賓何明禮等同謀殺泚明日泚召秀實議事秀實勃然而起奪源休笏以擊泚傷額流血海賓等不至秀實遂被害又曰魏謨文宗時為起居舍人上謂之曰卿家有何舊書詔對曰比多失墜唯簪笏獨存輒令進之鄭覃曰在人不在笏上曰覃不解我意乃此甘棠之義非在笏而已三禮圖曰士竹笏飾以象骨大夫飾以魚須輿服雜事曰古者貴賤皆執笏主書君上之政令有事則搢之於要帶中近代以來唯八座尚書執笏者白筆綴手板頭以紫囊褁之其餘王公卿士但執手板主于敬不執笏亦非記事官也周遷車服雜事曰應仲遠云昔荊軻逐秦王其後謁者持匕首以備不虞從此侍官執刀劍漢高祖偃武修文始制以手板代焉江表傳曰孫權既即尊位請會百官歸功周瑜初張昭勸迎曹公權不從而周瑜敗之及是昭舉笏欲褒贊功德未及言權曰如張公之計今已乞食矣昭大慚伏地流汗又曰獻帝嘗見郗慮及少府孔融問融曰鴻豫慮字鴻豫何所優長融曰可與適道未可與權慮舉笏曰融昔宰北海政散民流其權安在遂與融互相長短穆天子傳曰天子大服冕禕帗帶搢笏夾佩郭璞注云沃蹕也夾佩左右兩佩也奉壁南面立于塞下受何也郭子撗洞冥記曰孟歧清河之逸人也年可七百歲語及周初時事如目前歧時侍周公升壇上政以手摩成王之足周公以玉笏與之郡國志曰晉明為太子時嘗戲殿前以玉手板弄銅蟠螭口手傾溜入螭腹中不能出人後見一白鼠出入螭口世説曰王子猷作桓車騎騎兵參軍桓曰卿在府久此當相料理初不答高視以手板柱頰云西山朝來致有爽氣相手板經曰相手板法出蕭何或曰四皓初出殆不行世東方朔見而善之曰此非庸人所解至魏司空陳長史見此書歎伏以示許士宗韋仲將管輅見而推歎郭景純以夜兼晝方得其妙理相手板將以間太之時取五行尋四時定八節明二十四氣百不失一板長一尺五寸廣一寸五分上狹而薄下廣而厚八角十二芒並欲端平板形皆完淨板凶少吉多者可用吉少凶多者不可用服也舊用白直檀剌榆桑柘四材也番當令理通直從上至下直如絃不得出邊絶理板頭是君坐板頭缺與君共事必不得終分板作四分上一分為二親左為父右為母第二分都為婦第三分左為男右為女第四分左為奴右為婢婢之不辟方留為田宅財物牛馬豬羊雞犬之屬以五行十二時分若其處崩毀傷蹈破裂弔節蝎穿兆隨所屬物必損失死亡板兩邊左為城右為社寬博文彩班班光澤清淨必得封邑仲長子曰笏以書君教令記善剌過今之板以象焉劉義恭啓事曰聖恩優重猥賜華纓玉笏珍冠飾首琛板耀握非臣朽薄所宜服之
