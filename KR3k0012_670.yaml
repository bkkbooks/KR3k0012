body:
  text: 道部十一服餌上神農經曰上藥令人身安命延又云餌五芝丹砂曾青雲母太一禹餘糧各以單服令人長生中藥養性下藥除病此上聖之至言方術之實録也仙藥之上者丹砂次者黃金白銀衆芝五玉五雲明珠也黃精與朮餌之卻粒或遇凶年可以絶粒謂之米脯西極明科曰上清金液丹經九鼎神圖太一九轉大丹等凡一百四十卷五符經曰胡麻本生大宛又名巨勝服之不息與世長存五穀之長也服之可以知萬物通神明又曰真人謂黃精獲天地之淳精依山寄居神化者也天仙名此為戊己芝玉訣經曰元始五常氣以陽光初明散元始之暉真人食其景而無窮三光經曰三光者仙道鍊胎之術也泥丸者體形之上神也吐納經曰八公有言食草者力食肉者勇食穀者智食氣者神仙經曰丹為金服之上士也茹芝導引咽氣者中士也食餌草木者下士也食金丹大藥雖未去世百邪不近也若但服草木及餌八石適可令疾除命益耳不足卻外禍也惟守真一則劇性不犯昔仙公各服一物以得數百年乃合神丹金液韓衆服菖蒲十三年身生毛日視書萬言皆誦之冬𥘵不寒又菖蒲生須石上一寸九節已上紫花者尤善又曰煮石方東府左卿白石先生造也皆真人所授但未見真本世有兩本以省少者為佳又東華真人食石法即東府也亦是太清法又曰紫微夫人撰朮序其略曰吾俱察草木之勝負若速益於已者並已不及木之多驗乎所以長生久視遠而更靈我非謂諸物皆當減於朮也真以朮之用今之所要末世多疾宜當服餌夫道有內足猶畏外事之禍有外足者亦或中崩之弊我見山林隱逸得服朮者千年八百年比肩五嶽矣今撰朮數方以傳好尚若必信用庶無橫暴之災矣又曰南陽酈縣山中有甘谷水所以甘者谷山左右皆生甘菊菊花墮其中歷世彌久臨此谷中居民皆不穿井悉食甘谷水食者無不壽高者百四五十歲下者不失八九十歲故司空王暢太尉劉寬太傅袁隗皆為南陽太守每到官常使酈縣月送甘谷水四十斛以為飲食此諸公多患風痺及眩冒皆得愈但不能大得其益如甘谷上居民從幼便飲食此水又菊花與薏花相似直以甘苦別之耳菊甘而薏苦今真菊甚少耳率多生於水側緱氏山與酈縣最多仙方所謂曰精更生周盈皆一菊而根莖花實異名矣其說甚美而近來服之者略無所效正由不得真也八素經曰太上曰飛鍊之法未可得真人之門戶又四極明科云金液丹經九鼎神圖並真仙之祕書藏于名山太上太霄朗書曰除欲減私服御吐納上清列紀曰中黃之書皆白帝君所藏於瑤臺說丹藥祕法非有真籙不得其道也太上丹簡墨籙曰修金液之術當得太清丹經太丹隱書曰感召靈跡則天人下降上學之士服日月黃華金精飛根黃氣五廚經曰修奉和太不虧不盈天交上經曰太古之人所以壽考者不食穀也身安神樂修道易成五符經云食月之精可以長生食星之精上升太清登真隱訣云服雲牙可絶穀去尸蟲也可修真一之道裴真人曰喜怒損志哀樂損性榮華減德陰陽寇身皆學道之大忌仙法之所嫉也莫若知而不為為而不敢散此仙之要道生生之本業也欲得延年當吞日華食物多飲慎便臥多則生病臥則蕩心心蕩則失性病生則藥不行學道者慎此劉向列仙傳曰務光夏時人好琴服蒲韭根又彭祖多服水桂雲母中嶽人蘇林字子玄本衛人靈公末年師仇公教以服氣之法又尹喜之長沙服巨勝實又曰劉奉林周時人也學道嵩高山積年後之委羽山能閉氣三日不息但服黃連已及千歲不能有所役使又曰董威輦不知何許人晉武帝末在洛陽白社中藍縷不蔽恆吞一石子終日不食南嶽魏夫人內傳曰夫人名華存字賢安任城人也晉成帝時服金屑得道太元真人茅盈內傳曰金闕聖君命太極真人使正一玄玉郎王忠鮑丘等與茅盈四節燕胎流明神芝長躍雙飛夜光洞草使拜而食之佩璽服衣正冠北首帶符握鈴畢四使者告盈曰食太極四節隱芝者位為真卿食金闕燕胎玉芝者位為司命食東宮流明金英者位為司祿食長躍雙飛者位為真伯食夜光洞草者位為主惣左右御史之任子今盡食之矣壽畢夫地位當為司命上真東嶽卿君都統吳越之神仙真人周君內傳曰紫陽真人周義山字季道通汝陰人也漢丞相勃七世孫父浚官至陳留內史君年十六隨浚在郡為人沉重喜怒不形好獨坐靜處精思微密常以平旦出日之初面東嗽日服氣旦旦如此真誥曰衡山張正禮漢末受西城君虹景神丹方患丹砂難得去廣州為道士仙去颷室為上仙又曰張玄賓定襄人也魏武帝時曾舉茂才歸鄉里師事西河葪公受服餌朮方後遇真人樊子明於少室授以遁變隱景之道昔在天柱山今來華陽內為理禁伯又曰廬江潛山中有學道者鄭景世張重華並以晉初受仙人孟德然口訣以入山行守五藏含日法兼服胡麻又服玄丹又曰平仲節河東人也劉聰亂中夏仲節度江入括蒼山體有真氣服餌仙去又曰趙廣信陽城人魏末渡江入剡小白山受李法服氣又受左君守玄中之道如此積年或賣藥人間多來都下市丹砂作九華丹仙去又曰虞翁生會稽人也受仙人介君食日精法吳時來隱狼伍山兼行雲氣回形之道精思積久仙去又曰朱孺子吳末入赤水山中服菊華及朮後遇西歸子從乞度世西歸子授以要言仙去又曰明星王女者居華山服玉漿山中頂上有石龜其廣數畝高且三仞其側有梯磴達龜背見玉女祠前有五石臼號曰玉女洗頭盆其中水碧緑澄徹雨不加溢旱不減耗內有玉女馬一匹又曰華陰山中有學道者尹受子張石生李方回並晉武帝時人受仙人管成子蒸丹餌朮法又授蘇門周壽陵服丹霞之法又曰范幼冲遼西人恆服三氣法青白赤氣各如綖服之十年遂得仙此高元君太素內景法旦旦為之視日益佳其法簡其事驗又曰姜伯真在大橫山服石腦石腦如石小班色而軟又大茅山東亦有形狀員小如曾青而色似鐘乳繁陽子昔亦服此裴君內傳曰佛面道人支子元裴君授以長生內術又云尋藥之與存思雖致道同津而關源異緒服藥所以保形形康則神安存思所以安神神通則形保二理乃成相資而有道學傳曰許邁字叔玄少名映後改名遠遊與王羲之父子為世外之交羲之亦辭榮養生每造遠彌日忘歸詩書往復多論服餌又曰上清左卿黃觀子學道服金丹讀大洞經得道東府左卿白玉生有煮石方文德石仙監張叔隱受青精方太清右公李抱祖岷山人受青精䭀飯方葛洪神仙傳曰劉京從邯鄲張君受餌雲丸又曰封君達隴西人入鳥鼠山服餌年百餘歲常乘青牛又曰衛叔卿中山人也服雲母又曰孔元許昌人常服松脂伏苓又曰焦先字孝然河東人也常食白石以分人熟如煮芋又曰靈壽光扶風人年七十餘乃得未央丸方服之年二百餘歲不老又曰中候上仙范邈字度世舊名冰服虹景丹得道撰魏夫人傳又曰清虛真人王褒字子登前漢安國侯王陵七世孫主仙道君以雲碧陽水晨飛丹腴二斗賜褒服之視見甚遠坐在立亡役使群神
