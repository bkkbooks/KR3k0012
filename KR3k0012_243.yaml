body:
  text: 諸校尉屯騎校尉陶氏職官要錄曰屯騎越騎步兵長水射聲五校尉案晉官晉承漢置以為宿衛官各領千兵興寧三年桓溫奏省五校尉永初元年復置以敘勳舊東觀漢記曰劉磐字仲興兼屯騎校尉時五校官顯職閑府寺寬敞輿服光麗伎巧畢給故多宗室肺腑居之後漢書曰鄧閶妻耿氏有節操痛鄧氏誅廢子忠早卒乃養河南尹豹子嗣為閶後耿氏教之書學遂以通愽稱永壽中輿伏無忌延篤著書東觀官至屯騎校尉蜀志曰宗預字德艷為屯騎校尉鄧芝自江州來朝謂預曰禮六十不服戎而卿受兵何也預荅曰卿七十不還兵我六十何為不受耶復東聘吳孫權提預手涕泣遺大珠一斛晉書曰濮陽王允為屯騎校尉給千人營置長史司馬無忌讓屯騎校尉表曰屯騎之任職典禁旅禦衛事重必宜其人豈臣微弱所可克堪越騎校尉漢書百官表曰屯兵越騎校尉如淳曰越人內附以為騎也晉灼曰其才力超越後漢書曰越騎校尉鄧康以太后久臨朝政宗門盛滿數上書長樂宮諫爭宜崇公室自損私權言甚切至太后不從康心懷畏懼永寧元年遂謝病不朝又曰桓郁遷越騎校尉詔勑太子諸王各奉賀致禮郁數進忠言多見納錄又曰董卓傳越騎校尉汝南伍孚忿卓凶毒志手刃之乃朝服懷佩刀以見卓孚語畢辭去卓起送至閤以手撫其背孚因出刀刺之不中卓自奮得免急呼左右執殺孚而大詬曰虜欲反耶孚大言曰恨不得磔裂奸賊於都市以謝天地言未畢而斃謝承後漢書曰曹節弟破石為越騎校尉越騎營五伯妻有美色破石從求之五伯不敢違妻執意不肯行遂自殺破石淫暴無道多此類也步兵校尉漢書曰步兵校尉掌上林苑門東觀漢記曰崔篆王莽時為郡文學以明經徵詣公車太保甄豐舉為步兵校尉篆辭曰吾聞伐國不問仁人戰陣不訪儒士此舉奚至哉遂投劾歸又曰梁不疑拜步兵校尉上書曰刊校之職上應天工下厭群望實非過少所任梁史曰韋粲長八尺容觀甚偉初為雲麾晉安王行參軍後為外兵參軍兼中兵時頴川庾仲容吳郡張率前輩才名與粲同府並忘年交好及王為皇太子粲自記室遷步兵校尉後魏春秋曰阮籍以世多故祿仕而已聞步兵鈌廚多美酒營人善釀求為校尉遂縱酒昏酣遺落世事長水校尉釋名曰長水校尉長於水戰用船之事韋昭辯云長水校尉典胡騎不主水戰也其廄近水故以為名東觀漢記曰賈宗字武孺為長水校尉數言便宜賞賜殊特上美宗既有武節又兼經術每燕會令與當世大儒司徒丁鴻問難經傳蜀志曰秦密為長水校尉吳遣張溫來聘百官皆往餞而密後往既至溫曰彼何人也亮曰益州學者也及至溫問密曰君學乎荅曰五尺童子皆學何必小人荅問如響應聲而出溫大敬服之王隱晉書曰下邳王晃起家為長水校尉給千人營置長史司馬射聲校尉漢書曰射聲校尉掌待詔射聲應劭曰士工射者冥中聞聲射之則中因以名也須待所命而射故曰待詔射聲東觀漢記曰班超在西域三十一歲還洛陽拜為射聲校尉續漢書曰曹襃遷射聲校尉案行營舍不葬者悉為買空地葬之設祭吏士咸稱其仁王隱晉書曰武帝詔曰射聲校尉胡奮外掌方任內參九列不宜同之常例勿使入直何法盛晉中興書曰劉超字世踰中書郎遷為射聲校尉時軍校兵義興人多義隨超因領之號為君子營以實宿衛中壘校尉漢書曰中壘校尉武帝置世祖中興省更置北軍中候掌兵官掌北軍壘門內外胡騎校尉漢書曰胡騎校尉掌池陽胡騎不常置虎賁校尉漢書虎貴校尉掌輕車武帝初置有丞司馬秩二千石城門校尉後漢書曰赤眉與李松戰生得松時松弟汎為城門校尉赤眉使使謂之曰開城門活汝兄汎即開門環濟要略曰城門校尉高帝置秩二千石出從緹騎百二十人嫖姚校尉漢書曰霍去病以皇后姉子年十八為侍中善騎射為嫖姚校尉護羗校尉東觀漢記曰鄧訓為羗校尉諸胡皆喜義從羗胡俗恥病死每疾臨困輒以刀自刺訓聞其困者輒拘持纏束不與兵刀使醫藥療理愈者非一小大莫不感悅及訓病卒官吏人羗胡愛惜旦夕臨者數千人護烏桓校尉續漢書曰護烏桓校尉一人主烏桓校尉比二千石應劭漢官儀曰護烏桓校尉孝武帝時烏桓屬漢始於幽州置之擁節監領秩比二千石魏略曰毋丘儉字仲恭為荊幽二州刺史持節領護烏桓校尉戊巳校尉東觀漢記曰耿恭字伯宗永平中始置西域都護戊巳校尉乃以恭為戊巳校尉南蠻校尉傅暢晉諸公讚曰王戎為荊州刺史揚烈將軍領南蠻校尉南夷校尉沈約宋書曰護南夷校尉晉武帝立領治寧州江左改曰護鎮蠻校尉西夷校尉沈約宋書曰護西夷校尉晉武帝立治寧州江左平蜀後治涪城終晉世晉太康三年置永嘉中益州刺史領西夷校尉太元末殷荊州表复之又治洛城也西域校尉沈約宋書曰護西域校尉晉武帝立治雍州江左廢安帝元興中又置寄治西陽寧蠻校尉沈約宋書曰寧蠻校尉晉安帝置治襄陽郡以授魯宗之三巴校尉齊職儀曰三巴校尉銀印青綬虎冠絳朝服宋太始五年置以巴東巴西梓橦建平五郡隸焉建元二年省校尉改置巴州刺史忠義校尉吳志曰是儀從孫權討關羽拜忠義校尉儀上表陳謝權令曰孤雖非趙簡子卿安得不自屈為周舍耶懷義校尉吳志曰太傅馬日磾伏節案兵集東關在壽春以禮辟孫策表拜懷義校尉折衝校尉吳志曰袁術表孫策為折衝校尉行殊寇將軍翊軍校尉王隱晉書曰太康中伐吳還欲以王濬為五官校尉而無鈌始置翊軍校尉班同長水步兵以梁益所省兵為營材官校尉魏略曰材官校尉黃初中置秩比二千石主天下材官屬少府驍騎校尉魏略曰董卓表太祖為驍騎校尉又被徵為典軍校尉典農校尉魏略曰典農校尉太祖置秩比二千石司農度支校尉魏略曰司農度支校尉黃初四年置比二千石掌諸軍兵田建義校尉吳志曰朱據傳孫權咨嗟將帥追思呂蒙張溫以為據才兼文武可以繼之由是拜建義校尉領兵屯姑熟武衛校尉吳志曰朱才字君業為人精敏善騎射權愛異之常侍從游戲少以父任為武衛校尉滅虜校尉吳志曰賀景為滅虜校尉御眾嚴而有恩兵器精飾西園八校尉范曄後漢書曰中平五年初置西園八校尉東宮三校尉沈約宋書曰武帝永初二年置東宮屯騎步兵翊軍三校尉羽林監漢書百官表曰羽林佽飛期門武帝太初元年置名曰建章營騎後更名羽林取從軍死事之子孫教以五兵號曰羽林孤兒又曰甘延壽字君況以良家子善騎射為羽林投石拔距絕於等倫超踰羽林亭樓由是遷為郎續漢書曰羽林左右監皆冠鶡冠應劭漢官儀曰羽林者言其為國羽翼如林盛也一名為嚴郎言其禦侮嚴厲其後簡取五營高才別為左右監監羽林左右騎父死子繼與虎賁同漢雜事曰竇固以羽林監為中郎將征西羗還中郎印綬復為羽林監漢名臣奏曰曹襃上䟽王者莫不制禮樂詔襃即先序禮樂以帝新制一篇冠首擢襃監羽林左騎魏略曰桓範字元則為羽林左監以才學與王象等典集皇覽魏志曰夏侯玄字太初弱冠為黃門侍郎嘗進見與皇后弟毛曾並坐玄恥之不悅形於色明帝恨左遷羽林監梁冀別傳曰冀妻孫壽從弟安以童幼拜黃門侍郎羽林監期門僕射漢書曰建元三年上微行始出北至池陽西至黃山南獵長楊東遊宜春微行常用飲酎八九月中與侍中常侍武騎及待詔隴西北地良家子能射者期諸殿門故有期門之號自此始也後漢書曰陰興守期門僕射典將武騎從征伐平定郡國興每從出入常操持小蓋障翳風雨躬履塗泥率先期門光武所幸之處輒先入清宮甚見親信冗從僕射續漢志曰冗從僕射秩比六百石武帝置期門郎有僕射常從游獵或以官者為之號冗從黃門僕射居則直門戶行則騎從桓帝永壽三年置冗從僕射續漢志曰先臘一日大儺逐疫鬼冗從僕射將之逐惡鬼于禁中魏中曰冗從僕射畢軌表尚書僕射王思精勤舊吏計略不及辛毗宜以毗代思晉武起居注曰東莞王世子瑾貞固和詳有識見才幹以為冗從僕射傅暢晉諸公讚曰司馬滕字元邁文獻王泰之第三子也性沉壯起家為冗從僕射滕意欲業官以自顯出為郡守
