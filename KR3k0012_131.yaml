body:
  text: 偏霸部十四北齊高歡北齊書曰高祖神武皇帝姓高氏諱歡字賀六渾渤海蓨人也六世祖隱晉玄菟太守皇考樹性通率不事家業住居白道南數有赤光紫氣之異鄰人以為怪勸徙居以避之皇考曰安知非吉居之自若及神武生而皇妣韓氏殂養於同産姊壻鎮獄隊尉景家神武既纍世北邊故習其俗遂同鮮卑長而深沉有大度輕財重士為豪俠所宗目有精光長頭高權齒白如玉少有人傑素家貧及娉武明皇后始有馬得給鎮將遼西假長常奇神武貌謂曰君有康濟之才終不徒然便以子孫為託神武自隊主轉輪為函使嘗乘驛過建興雲霧晝晦雷聲隨之半日乃絶若有神應者每行道路往來無風塵之色又嘗夢履衆星而行覺而內喜為函使六年每至洛陽給令史麻祥使祥嘗以肉啖神武神武性不立食坐而進之祥以為慢已笞神武四十及自洛陽還傾産以結客親故怪問之答曰吾至洛陽宿衛羽林相率焚領軍張彝宅朝廷懼其亂而不問為政若此事可知也財物豈可常守耶自是乃有澄清天下之志與懷朔省事雲中司馬子如及秀容人劉貴中山人賈顯智為奔走之友懷朔戶曹史孫騰外兵史侯景亦相友結孝昌元年歸爾朱榮於秀容先是劉貴事榮盛言神武美至是始得見以憔悴故未之奇也貴乃為神武更衣復求見焉因隨榮之廄廄有惡馬榮命剪之神武乃不加羈絆而剪竟不蹄齧已而起曰御惡人亦如此馬矣榮遂坐神武於床下屏左右而訪時事神武曰聞公有馬十二谷色別為群將此竟何用也榮曰但言爾意神武曰方今天子愚弱太后淫亂孽寵擅命朝政不行以明公雄武乘時奮發討鄭儼徐紇而清帝側霸業可舉鞭而成此賀六渾之意也榮大悅語自日中至夜半乃出自是每參軍謀既而榮以神武為親信都督于時魏明帝銜鄭儼徐紇逼靈太后未敢制私使榮舉兵內向榮以神武為前鋒至上黨明帝又私詔停之及帝暴崩榮遂入洛邑將篡位神武諫恐不聽請鑄像卜之鑄不成乃止孝莊帝立以定策勳封銅鞮伯榮嘗問左右曰一日無我誰可主軍皆稱爾朱兆榮曰此正可統三千騎以還堪代我主衆者唯賀六渾耳因誡兆曰爾非其匹終當為其子穿鼻乃以神武為晉州刺史於是大聚斂因劉貴貨榮下要人盡得其意州庫角無故自鳴神武異之無幾而孝莊誅榮及爾朱兆自晉陽將舉兵赴洛召神武使長史孫騰辭以蜀汾胡欲反不可委去兆恨焉騰命神武曰兆舉兵犯上此大賊也吾不能久事之自是始有圖兆計及兆入洛執莊帝以北神武聞之大驚又使孫騰偽賀兆因密覘孝莊所在將劫以舉義不果乃以書喻之言不宜執天子以受惡名於海內兆不納殺帝而與爾朱世隆等立長廣王曄改元建明封神武為平陽郡公魏普泰元年二月神武自領軍次信都高乾封隆之開門以待遂據冀州是月爾朱度律廢元曄而立節閔帝欲羈縻神武三月乃白節閔帝封神武為勃海王徵使入覲神武辭四月癸巳又加授東道大行臺第一鎮人酋長龐蒼鷹自太原來奔神武以為行臺郎尋以為安州刺史神武自向山東養士繕甲禁兵侵掠百姓歸心乃詐為書云爾朱兆將以六鎮人配契胡為部曲衆皆愁為并州符徵兵討步落稽發萬人將遣之孫騰尉景為請留如此者再神武親送之郊雪涕執別人號慟哭聲動地神武乃喻之曰與爾俱失鄉客義同一家不意在上乃爾徵召直向西已當死後軍期又當死配國人又當死奈何衆曰唯有反耳神武曰反急計須推一人為主衆願奉神武神武曰爾鄉里難制不見葛榮乎雖百萬衆無刑法終自灰滅今以吾為主當與前異不得欺漢兒不得犯軍令生死任吾則可不爾不能為取笑天下衆皆頓顙死生唯命神武曰若不得已明日推牛饗士喻以討爾朱兆之意封隆之進曰千載一時普天幸甚神武曰討賊大順也極時大業也吾雖不武以死繼之何敢讓焉六月庚子建義於信都乃抗表罪狀爾朱氏世隆等祕表不通八月爾朱兆攻陷殷州李元忠來奔孫騰以為朝廷隔絶不權立天子則衆望無所係十月壬寅奉章武王融子渤海太守朗為皇帝年號中興是為廢帝十一月攻鄴相州刺史劉誕嬰城固守神武起土山為地道往往建大柱一時焚之城陷入地永熙元年正月壬午拔鄴城據之廢帝進神武大丞相柱國大將軍太師是時青州建義大都督崔靈珍大都督耿翔皆遣使歸附行汾州事劉貴棄城來降閏三月爾朱天光自長安兆自并州度律自洛陽仲遠自東郡同會鄴衆號二十萬挾洹水而軍節閔以長孫承業為大行臺揔總督焉神武令封隆之守鄴自出頓紫陌時馬不滿二千步兵不至三萬衆寡不敵乃於韓陵為圓陳連牛驢以塞歸道於是將士皆為死志四面合擊之爾朱兆責神武以背己神武曰本勠力者共輔王室今帝何在兆曰永安枉害天柱我報讎耳神武曰我昔日親聞天柱計汝在戶前立豈得言不反耶且以君殺臣何報之有今日義絶矣乃合戰大敗之四月斛斯椿執天光度律以送洛陽長孫承業遣都督賈顯智張歡入洛陽執世隆彥伯斬之兆奔并州仲遠奔梁州遂死焉時凶蠹既除朝廷慶悅既而神武至洛陽廢節閔及中興主而立孝武孝武既即位授神武大丞相天柱大將軍太師世襲定州刺史增封并前十五萬戶神武辭天柱減戶五萬壬辰還鄴魏帝餞于乾脯山執手而別七月壬寅神武帥師北伐爾朱兆封隆之言侍中斛斯椿賀拔勝賈顯智等往事爾朱普皆反噬今在京師寵任必構禍隙神武深以為然乃歸天光度律於京師斬之遂自滏口入爾朱兆大掠晉陽北保秀容并州平神武以晉陽四塞乃建大丞相府而定居焉爾朱兆既至秀容分兵守險出入冠抄神武揚聲討之師出止者數四兆意怠神武揣其歲首當宴會遣竇泰以精騎馳之一日一夜行三百里神武以大軍繼之二年正月竇泰奄至爾朱兆庭軍人因宴休惰忽見泰軍驚走追破之於赤洪嶺兆自縊神武親臨厚葬之慕容紹宗以爾朱榮妻子及餘衆自保焉突城降神武以義故待之甚厚神武之入洛也爾朱仲遠部下都督橋寧張子期自滑臺歸命神武以其助亂且數反覆皆斬之斛斯椿由是內不自安乃與南陵王寶炬及武衛將軍元毗魏光王思政構神武於魏帝帝舍人元士弼又奏神武受敕大不敬於是魏帝與神武隙矣天平元年正月魏帝下詔罪狀神武為北伐經營神武亦勒馬宣告曰孤遇爾朱擅權舉大義於四海奉戴主上義貫幽明橫為斛斯椿讒構以誠節為逆首昔晉趙鞅興晉陽之甲誅君側惡人今者南邁誅椿而已以高昂為前鋒曰若用司空言豈有今日之舉司馬子如答神武曰本欲立小者正為此耳魏帝徵兵關右召賀拔勝赴行在所遣大行臺長孫承業大都督頴川王斌之斛斯椿共鎮武牢七月魏帝躬率大衆屯河橋神武至河北十餘里再遣口申誠款魏帝不報神武乃引軍渡河魏帝問計於群臣或云南依賀拔勝或云西就關中或云守洛口死戰未決而元斌之與斛斯椿爭權不睦斌之棄椿徑還紿帝云神武兵至即日魏帝遜位於長安己酉神武入洛陽止於永寧寺八月神武以萬機不可曠廢乃與百僚議以清河王亶為大司馬居尚書下舍而承制決事焉神武尋至弘農遂西剋潼關九月庚寅神武還至洛陽乃遣僧道榮奉表關中又不答乃集百僚沙門耆老議所推立以為自孝昌衰亂國統中絶神主靡依昭穆夫序遂議立清河王世子善見議定白清河王王曰天子無父茍使兒立不惜餘生乃立之是為孝靜帝魏於是始分為二神武以孝武既西恐逼崤陜洛陽復在河外接近梁境如向晉陽形勢不能相接議遷鄴護軍祖營贊焉詔下三日車駕便發戶四十萬狼狽就道神武留洛陽部分事畢還晉陽自是軍國政務皆歸相府二年正月魏帝褒詔以神武為相國假黃鉞劍履上殿入朝不趨神武固辭四年十一月壬辰神武西討自蒲津濟衆二十萬周文軍於沙苑神武以地厄少卻西人鼓噪而進軍大亂棄器甲十有八萬神武跨橐駝候船以歸元象元年三月辛酉神武固請解丞相魏帝許之四月庚寅神武朝于鄴壬辰還晉陽興和元年七月丁丑魏帝進神武為相國録尚書事固讓乃止十一月神武以新宮成朝於鄴魏帝與神武宴射武定四年八月癸巳神武將西征自鄴會兵晉陽九月神武圍王壁以桃西師不敢西魏晉州刺史韋孝寬守王壁頓軍五旬城不拔死者七萬人聚為一冢有星墜於神武營衆驢並鳴士皆讋懼神武有疾十一月庚子輿疾班師庚戍遣太原公洋鎮鄴辛亥徵世子澄至晉陽有惡鳥集亭樹世子使斛斯律光射殺之己卯神武以無功表解都督中外諸軍事魏帝優詔許焉是時西魏言神武中弩神武聞之乃勉坐見諸貴使斛律金勑勤歌神武自和之哀感流涕侯景素輕世子嘗謂司馬子如曰王在吾不敢有異王無吾不能與鮮卑小兒共事子如掩其口至是世子為神武書召景景先與神武約得書書微點乃來書至無點景不至又聞神武疾遂擁兵自固神武謂世子曰我雖疾爾面更有餘憂色何也世子未對又問曰豈非憂侯景叛耶曰然神武曰景專制河南十四年矣常有飛揚跋扈志顧我能養豈為汝駕御也今四方未定勿遽發哀庫狄干鮮卑老公斛律金勑勤老公並性純道直終不負汝可朱渾道元劉豐生遠來投我必無異心賀拔焉過兒朴實無罪過潘樂和厚汝兄弟當得其力韓軌少戇宜寬借之彭樂心腹難得宜防護之少堪敵侯景者唯有慕容紹宗我故不貴之留以與汝宜深加殊禮委以經略之事五年正月朔日蝕神武曰日蝕其為我耶死亦何恨景午陳啓於魏帝是日崩於晉陽時年五十二祕不發喪天保初追崇為獻武帝廟號太祖高澄北齊書曰世祖文襄皇帝諱澄字子惠神武長子也母曰婁太后生而岐嶷神武異之魏中興元年立為渤海王世子就杜詢講學敏悟過人詢甚歎服二年加侍中開府儀同三司尚孝靜帝妹馮翊長公主時年十三神情俊雋爽便若成人神武試問以時事得失辨析無不中理自是軍國籌策皆預之天平元年加使持節尚書令大行臺并州刺史三年入輔朝政加領軍左右京畿大都督時人雖聞器識猶以少年期之而機略嚴明事無凝滯於是朝野振肅武定四年十一月神武西討不豫班師文襄馳赴軍所侍衛還晉陽五年正月丙午神武崩七月戊戌魏帝詔以文襄為使持節大丞相都督中外諸軍録尚書事大行臺渤海王文襄啓辭願停王爵壬寅魏帝詔太原公洋攝理軍國遣中使敦喻八月戊辰文襄啓申神武遺令請減國邑分封將督各有差辛未朝于鄴固辭丞相魏帝詔曰既朝野攸憑安危所繫不得令遂本懷須有權奪可復前大將軍餘如故七年五月文襄帥師赴頴川六月剋之獲西魏大將王思政等八月文襄遇盜崩初梁將蘭欽子京見虜文襄以配廚欽求贖之不許京與其黨六人謀作亂時京將進食文襄卻之謂人曰昨夜夢此奴殺我又曰急殺卻京聞之置刃於盤下冒言進食文襄怒曰我未索食何遽來京揮刀曰將殺汝文襄自投傷足入床下賊黨至去床遇弒時年二十九追諡文襄皇帝高洋北齊書曰顯祖文宣皇帝諱洋字子進高祖第二子世宗之母弟后初孕每夜有赤光照室后私常怪之初高祖之歸爾朱榮時經危亂家徒壁立后與親姻相對共憂寒餒帝時尚未能言欻然應曰得活太后及左右大驚而不敢言鱗身重踝不好戲弄深沉有大度晉陽曾有沙門乍愚乍智時人不測呼為阿禿師帝曾與諸童共見之歷問祿位至帝舉手再三指天而已口無所言見者異之高祖嘗試觀諸子意識各使治亂絲帝獨抽刀軿之曰亂者須斬高祖是之又各配兵四出而使甲騎偽攻之世宗等怖撓帝乃勒衆與彭樂敵樂免胄言情猶擒之以獻後從世宗行過遼陽山獨見天門開餘人無見者內雖明敏貌若不足世宗每嗤之云此人亦得富貴相法亦何由可解唯高祖異之天平二年授驃騎大將軍儀同三司武定元年加侍中五年授尚書令中書監京畿大都督七年八月世宗遇害事出倉卒內外震駭帝神色不變指麾部分自若臠斬群賊而漆其頭徐宣言曰奴反大將軍被傷無大苦也當時內外莫不驚異焉乃赴晉陽親揔庶政務從寬厚事有不便者咸蠲省焉八年正月戊辰魏帝詔進帝位使持節丞相都督中外諸軍録尚書事大行臺齊郡王食邑一萬戶三月辛酉又進封齊王邑十萬戶自居晉陽寢室夜有光如晝既為王夢人以筆點己額旦以告館客王曇哲曰吾其退乎曇哲再拜賀曰王上加點成主字乃當進也夏五月辛亥帝如鄴甲寅進位相國揔百揆加九鍚殊禮齊王如故魏帝遣兼太尉彭城王韶奉皇帝璽綬禪位于帝戊午乃即皇帝位於南郊升壇柴燎告天事畢還宮御太極前殿詔大赦天下改武定八年為天保元年辛酉尊王太后為皇太后辛未遣大使於四方觀察風俗問民疾苦嚴勒長吏厲以廉平興利除害務存安靜六月詔吉凶車服制度各為等差具立條式使儉而獲中又詔冀州之勃海長樂二郡先帝始封之國義旗初起之地并州之太原青州之齊郡霸業所在王命是基君子所作貴不忘本思申恩洽蠲復田租丁亥詔立王子殷為皇太子王后李氏為皇后八月詔曰有能直言正諫不避罪辜謇謇若朱雲諤諤若周舍開朕意沃朕心弼豫一人利兼百姓者必當寵以榮祿待以不次又諸牧民之官仰專意農桑勸課廣收天地之利以備水旱之災庚寅詔曰朕以虛寡嗣弘王業思所以贊揚盛績播之萬古雖史官執筆有聞無墜猶恐緒言遺美時或未書在位王公文武大小降及民庶爰至僧徒或親奉音旨或承傳旁説凡可載之文籍悉宜條録封上冬十月己卯備法駕御金輅入晉陽宮朝皇太后於內殿十一月周文帝率衆至陜城分騎北渡至建州景寅帝親戎出次城東周文帝聞帝軍嚴盛歎曰高歡不死矣遂退明年征契丹帝親踰山嶺為士卒先露頭袒身晝夜兼行千餘里唯食肉飲水壯氣彌厲竟大破契丹獲十餘萬口雜畜數十萬頭嘗於東山遊宴以關隴未平投杯震怒將俟西伐西人為之震恐帝素沉敏有遠亮初文襄崩祕不發喪其後漸露魏帝竊謂左右曰大將軍此殂似是天意威權當歸王室矣及帝將幸晉陽親入辭謁於昭陽殿從者千人居前持劍者十餘輩帝在殿下數十步立而衛士升階已二百許皆攘袂扣刃若對嚴敵帝令主者傳奏須詣晉陽言訖再拜而出魏帝失色目送帝曰此人似不能見容吾不知死在何日洎受禪之後留心政術御下肅清六七年後以天下無事便留連飲宴通日竟夜躬自鼓舞袒露形體傅粉塗黛乘馳牛驢不施鞍勒親戚貴臣雜錯侍從徵集媱嫗分付從官親看無禮以為戲樂貴妃薛氏甚被愛寵忽憶其經與清河王嶽私通命支解之弄其髀以為琵琶歎曰佳人難再得後又以刀子劃楊愔腹崔季舒托俳優言曰老小公子惡戲因掣刀子而去之又置愔於棺中載以轜車幾下釘者數焉發丁匠三十萬人營三臺於鄴構木高二十七丈兩棟相去二百餘步工匠危怯皆繫繩自防帝登脊疾走無怖畏時復雅舞折旋中節傍人見者莫不寒心帝沉湎日甚婁太后舉杖擊之曰如此父生如此兒帝曰天子母豈不如共壻眠時即當嫁老母與胡太后大怒自此不復開顏帝免冠辭謝乃設席於地脫背就罰苦請笞腳五十因此戒酒一旬還復如初又令元黃頭與諸國自金鳳臺各乘紙鴟以飛黃頭至紫陌乃墯於地凡所殺害或支解或火燒或投水蓋以萬數又誅元氏或父母為主或身常貴盛皆斬於東市凡七百餘人悉投尸漳水剖魚者多獲爪甲都下為之久不食魚七年秋自河西揔秦戍築長城東至於海前後所築東西凡三千餘里率十里一戍其要害置州鎮凡二十五所八年春帝在城東馬射勑京城婦女悉赴觀不赴者罪以軍法七日乃止是年於長城內築重城自庫洛拔而東至於塢紇戍凡四百餘里先是發丁匠三十餘萬營三臺於鄴下因其舊基而高博之大起宮室及遊豫園至是三臺成改銅爵曰金鳳金武曰聖應水井曰崇光十一月甲午帝登三臺御乾象殿朝宴群臣並命賦詩以新宮成故也十年春正月甲寅帝如遼陽甘露寺二月景戍帝於甘露寺禪居深觀唯軍國大政奏聞三月景辰帝至自遼陽十月甲午帝暴崩於晉陽宮還京師葬武寧陵諡曰文宣皇帝廟號高祖武平初又改廟號顯祖先是帝問泰山道士曰吾得幾年為天子答曰得三十年帝曰十年十月十日得非三十也吾甚畏之過此無慮人生有死又何致惜但憐正道尚幼人將奪之耳帝及期而崩年三十一
