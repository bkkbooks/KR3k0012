body:
  text: 飲食部三酒下孟子曰禹惡旨酒而好善言孔叢子曰平原君與子高飲強子高酒曰有諺云堯舜千鍾孔子飲百觚子路嗑嗑尚飲百榼古之賢聖無不能飲子何辭焉子高曰以子所聞聖賢以道德兼人未聞飲酒列子曰夫醉者之墜於車也雖疹不死骨節與人同犯害與人異其神全也乘亦不知也墜亦不知也死生驚懼不入乎其胸是故遌物而不懾彼得全於酒而猶若是況得全於天乎韓子曰晉平公與群臣飲飲酣乃喟然而歎曰莫樂為人君惟其言而莫之違師曠侍坐於前援琴撞之公披袵而避琴傷於臂公曰大師誰撞師曠曰今者有小人言於側者故撞之公曰寡人也師曠曰嘻是非君人者之言也左右請除之公曰釋之以為寡人戒又曰齊桓公飲酒醉遺其冠恥之三日不朝管仲曰此非有國之恥也公胡不雪之以政公曰善因發倉賜貧窮論囹圄出薄罪處三日而民歌之曰公胡不復遺冠乎又曰宋人有少者欲效善見長者飲無餘亦自飲而盡之王孫子新書曰楚莊王攻宋廚有臭肉樽有敗酒將軍子重諫曰今君廚肉臭而不可食樽酒敗而不可飲而三軍之士皆有飢色欲以勝敵不亦難乎莊王曰請有酒投之士有食饋之賢淮南子曰楚會諸侯魯趙皆獻酒於楚王主酒吏求酒於趙趙不與吏怒乃以趙厚酒易魯薄者奏之楚王以趙酒薄遂圍邯鄲抱朴子曰鄭君釀酒酒成因以附子甘草屠內酒中暴令乾如雞子大一丸投一斗水立成美酒又曰葛仙公每飲酒醉常入門前陂中竟日乃出曾從吳主到列州還大風仙公船沒吳主謂其已死須臾從水上來衣履不濕而有酒色云昨為伍子胥召設酒不能便歸以淹留也呂氏春秋曰肥肉厚酒務以自強命曰爛腸之食韓詩外傳曰夫飲食之禮不脫屨而即序者謂之禮跣而上坐者謂之宴能飲者飲之不能飲者已謂之醧齊顏色均衆寡謂之況閉門不出者謂之湎故君子可以宴可以醧不可以沉不可以湎黃石公記曰昔者良將用兵人有饋一單醪者使投之於河令將士迎流而飲之夫一單醪不能味一河水三軍思為之死非滋味及之也賈誼新書曰晉師伐虢虢公出奔至澤中曰吾飢渴甚其御者進清酒腵脯問御曰汝何故諂諛曰恐君必亡所以儲也虢公作色怒御者曰臣言誤也君所以亡者天下皆不肖疾公賢也虢公喜據軾而笑飢倦乃枕御者膝而臥御以塊代其膝而去虢公因餓死神異經曰西北海外有人長二千里兩腳中間相去千里腹圍一千六百里但日飲天酒五升不食五穀魚肉唯飲天酒忽有飢時向天仍飲好游山海間不犯百姓不干萬物與天地同生又曰西北荒中有酒泉此酒美如肉清如鏡其上有玉樽取一鐏復一鐏與天地同休無乾時飲此酒人不死不生東方朔別傳曰武帝幸甘泉長平阪道中有蟲赤如肝頭目口齒悉具先驅馳還以報上使視之莫知也時朔在屬車中令往視焉朔曰此謂怪氣是必秦獄處也上使案地圖果秦獄地上問朔何以去之朔曰夫積憂者得酒而解乃取蟲置酒中立消賜朔帛百匹後屬車上盛酒為此故也說苑曰魏文侯與大夫飲使公乘不仁為觴政曰飲若不盡浮之大白文侯不盡公乘不仁舉白浮君也又曰吳王從民飲酒子胥諫曰昔白龍下清泠之淵化為魚漁者射中其目白龍上告天王捨萬乘從布衣恐有射目之患也論衡曰東風至酒湛溢按酒味酸從東方木也味酸故酒湛溢也又曰文王飲酒千鍾孔子百觚聖人胸腹小大與人均等若飲千鍾宜食百牛能飲百觚則能食十羊使文王身如防風孔子身如長狄文王孔子率禮之人垂譽後世豈千鍾百觚耶紂車行酒騎行炙二十日為一夜按紂以酒為池因謂車行酒以肉為林因為騎行炙耳或是覆酒滂沱於地因以為池釀酒積糟因以為丘懸肉似林因言肉林耳西京雜記曰司馬相如還成都以所服鷫鸘裘就市陽昌貰酒與卓文君為歡典論曰孝靈末百司湎酒酒千文一斗常侍張讓子奉為太醫令與人飲輒去衣露形為戲樂也又曰洛陽令郭珍家有巨億每暑召客侍婢數十盛裝飾羅縠披之袒裸其中使進酒又曰劉表有酒爵三大曰伯雅次曰仲雅小曰季雅伯雅容七升仲雅六升季雅五升又設大針於杖端客有酒輒以劖之驗醉醒也博物志曰劉玄石曾於中山酒家沽酒酒家與千日酒飲之至家大醉其家不知以為死葬之後酒家計向千日往視之云已葬於是開棺醉始醒俗云玄石飲酒一醉千日又曰西域有蒲桃酒積年不敗彼俗傳云可至十年欲飲之醉彌日乃解古今記曰烏孫國有青田核得水則有酒味甚淳美如好酒飲盡隨更注水隨成不可久久則苦不可飲名曰青田酒世說曰鍾育鍾會少有令譽其父晝寢因共偷服散酒父時覺且託寐以觀之育拜而後飲會飲而不拜父問其故育曰酒以成禮不敢不拜問會會曰偷酒乃非禮所以不拜又曰阮籍遭母憂在晉文王座進酒肉司隸何曾亦在座曰明公方以孝理天下而阮籍以重哀顯於公座飲酒食肉宜流之海外以正風教文王曰嗣宗毀頓如此君不能共憂之宜且有疾而飲酒食肉固喪禮也籍飲噉不輟神色自若步兵校尉缺廚中有貯酒數百斛阮籍乃求為步兵或云籍與劉靈飲步兵廚中酒未盡並醉而物故皆好事者為之籍景元年卒太始中靈猶存焉又曰劉靈縱酒放達或脫衣倮形在室中人見譏之靈曰我以天地為棟宇室屋為褌衫諸君何以入我褌中又曰張季鷹縱任不拘時人號為江東步兵或謂之曰卿乃縱適一時獨不為身後名也張答曰使我有身後名不如即時一杯酒又曰阮宣子嘗步行以百錢掛杖頭至酒店便獨酣暢雖當世貴盛不肯詣也又曰山季倫為荊州時出酣暢人為之歌曰山公時一醉徑造高陽池日暮倒載歸酩酊無所知時復乘駿馬倒著白接籬舉手語葛強何如并州兒高陽池在襄陽是其愛將并州人也襄陽記曰漢侍中習郁於峴山南依范蠡養魚法作魚池池邊有高堤皆種竹及長梑芙蓉覆水是遊宴各家山季倫遊此池未嘗不大醉而還恆曰此是我高陽池也又曰鴻臚孔群好飲酒王丞相語云卿恆飲酒不見酒家覆瓶布日月久則糜爛群曰公不見糟中肉乃更堪久群常與親舊書云今年田得七百斛秫米不了麴蘗事又曰周顗字伯仁風德雅重深遠危亂還江東積年恆大飲酒嘗經三日不醒人謂之三日僕射又曰諸阮能飲酒仲容至宗人間若集不復用常杯酌以瓮盛酒賓坐相向大酌更飲時有群豬來飲酒去上便共飲之又曰桓公有主簿善別酒輒令先嘗好者謂青州從事惡者謂平原督郵青州有齊郡平原有革縣從事言至齊督郵言至革上住又曰王孝伯問王大阮籍何如司馬相如王大曰阮籍胸中壘隗故須澆之言同相如唯有酒異大悅小字王大歎曰三日不飲酒覺形神不復相親宋明帝文章志曰洸嗜酒一飲或連日不醒自號上頓也諺以大飲為上頓起於忱也王孝伯云名士不須奇才但使常得無事痛飲酒讀離騷便可稱名士也神仙傳曰孔元方者專修道術元方為人惡衣踈食飲酒不過一斗年百七十餘歲道成人或請元方同會人人作酒令次至元方作令元方無所說直以一杖柱地因把杖倒堅頭在下足在上以一手持酒倒飲之人莫能為也列仙傳曰酒客者梁市上酒家客也作酒常美日售萬錢有過逐之主人酒便酸敗異苑曰有虹食薛願釜中水盡願輦酒飲之虹吐金滿釜因置豐富也益部耆舊傳曰楊子拒妻劉臣公之女字奉漢有四男二女拒早亡教道閨門動有法則長子元珍嘗出飲酒自輿而歸母不見十日諸弟謝過乃見數責曰夫飲酒有節不至沉湎者禮也汝乃沉荒慢而無禮自為敗首何以帥先諸弟郭仲産湘州記云衡陽縣東南有酃湖土人取此水以釀酒其味醇美所謂酃酒每年嘗獻之晉平吳始薦酃酒於太廟是也時鏡新書曰晉海西令董勳云正旦飲酒先飲小者何也勳曰俗以小者得歲故先以酒賀之老者失時故後飲酒十洲記曰瀛州有玉膏如酒味名曰玉酒飲數斗輒醉令人長生南嶽夫人傳曰夫人設王子喬瓊蘇緑酒孝子傳曰蔡順字君仲母飲酒吐嘔顛倒恐母中毒嘗母吐驗之楚辭曰蕙肴設兮蘭籍奠桂酒兮椒漿又屈原曰衆人皆醉唯我獨醒漁父曰衆人皆醉何不餔其糟而啜其醨梁四公記曰高昌遣使獻乾蒲桃凍酒帝命杰公迓之謂其使曰蒲桃七是汙林三是無半凍酒非八風谷所凍者又無高寧酒和之使者曰其年風災蒲桃不熟故駮雜凍酒奉王急命故非時耳帝問杰公群物之異對曰蒲桃汙林者皮薄味美無半者皮厚味苦酒是八風谷凍成者終年不壞今臭其氣酸汙林酒滑而色淺故云然嶺表録異曰南中醞酒即先用諸藥別淘漉粳米漉乾旋入藥和米搗熟即緑紛矣熱水溲而團之形如餢飳以指中心刺作一竅布於簟席上以茍杞構葉罨之其體候好弱一如造麴法既而以藤篾貫之懸於煙火之上每醞一年用幾箇餅子固有恆準矣南中地暖春冬七日熟秋夏五日熟既熟貯以瓦甕用糞掃火燒之亦有不燒者為清酒也大抵廣州人多好酒晚市散男兒女人倒載者日有三二十輩生酒行即兩面羅列皆是女人招呼鄙夫先令嘗酒盎上白瓷甌謂之𤭇刮一𤭇三文不持一錢來去嘗酒致醉者當壚嫗伹笑弄而已蓋酒賤之故也
