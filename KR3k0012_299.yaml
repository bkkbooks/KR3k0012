body:
  text: 兵部二十九軍制禮記曰六十不豫服戎師出不踰時為怨思也踰時即內有怨女外有曠夫周禮曰五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍鄭玄曰兩二十五人卒百人旅五百人師二千五百人軍萬二千五百人也漢書武紀曰建武元年春二月赦天下賜民爵一級年八十復二算九十復甲卒張晏注云復甲卒不豫革車之賦也白虎通曰王命法三十受兵六十歸兵國有三軍何以誡非常伐無道尊宗廟重社稷安不忘危何以言有三軍也論語云子行三軍則誰與詩云周王于邁六師及之三軍者何法法天地人也以為五人為伍五伍為兩四兩為卒五卒為旅五旅為師師二千五百人二師為一軍三軍六師萬五千人也傳曰一人必死十人不能當百人必死千人不能當千人必死萬人不能當萬人必死橫行天下雖有萬人猶謙讓自以不足故復加五千人因法月數月群陰之長也十二月足以窮盡陰陽備物成功萬二千人亦足以征伐不義致天下太平穀梁傳曰天子六軍諸侯上國三軍次國二軍下國一軍諸侯所以一軍者何諸侯藩屏之臣也任兵革之重距一方之難故得有一軍也淮南子曰季武子為三軍為作也武子魯卿季文子之子季孫夙也周禮天子六軍諸侯大國三軍魯伯禽之封舊有三軍其後削弱二軍而已武子欲專公室故欲益中軍為三三家各征其一事在魯哀公十一年叔孫穆子曰不可天子作師公帥之以征不德師謂六軍之衆公謂諸侯為王卿士者為元帥也元侯作師卿帥之以承天子元侯大國之君師三軍之衆大國三卿皆命於天子一卿命於其君無軍無三軍也若元侯有事則命卿帥其所教武衛之士以佐元侯禮所云次國二軍小國一軍謂以賦出軍從征伐贊佐也自伯子男有大夫無卿無卿無命卿也王制小國二卿皆命於其君也帥賦以從諸侯賦國中出兵車甲士以從大國諸侯是以上能征下無姦慝征正慝惡今我小侯也言小侯削弱之日久矣處大國之間大國齊楚繕貢賦以共從猶懼有討猶懼以不給見誅討若為元侯之所之所謂作三軍元帥所為以怒大國無乃不可乎弗從遂作中軍中者明己有上下軍自是齊楚代討於魯代更襄昭皆如楚襄公昭公如楚朝事楚也穰苴兵法曰五人為伍十五為隊一軍凡二百五十人隊餘奇兵隊七十有五以為中壘守地六千尺積尺得四里以中壘四面乘之一面得地三百步壘內有地三頃餘百八十步正門為握奇大將軍居之六纛五麾金鼓府藏輜積皆中壘外餘八千七百五十人隊一百七十五分為八陳六陳各有一千九十四人六陳各減一人已為一陳之部署舉一軍則千軍可知凡兵者有四正四奇或合而為一或離而為八陳故以正合以奇勝通典曰每軍大將一人別奏八人傔十六人副二人分掌軍務奏傔減大將半判官二人典四人揔管四人二主左右虞候二主左右押衙傔各五人在衙官下子將八人委其分行陳辨金鼓及部署傔各二人執鼓十二人吹角十二人司兵司倉司騎司胄城局各一人每隊五十人押官一人隊頭一人副二人旗頭一人副二人火長五人六分支甲四分支戰袍一分支槍又曰周制萬有二千五百人為軍軍將皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十有五人為兩兩司馬皆中士五人為伍伍皆有長軍師旅卒兩伍皆衆名伍一比兩一閭卒一旅旅一黨師一州軍一卿家所出人也按司馬法二十五人為兩四兩為卒百人也五卒為旅五百人五旅為師二千五百人五師為軍一萬二千三百人萬二千象十有二月五百象閏管子言於齊桓公曰欲正卒伍修兵甲則大國亦將為之君有征戰之事則小國有守圍之備矣公欲速得意於天下諸侯則事有所隱而政有所寓不顯習於兵事故曰事有所隱軍政寓之田獵故有所寓公作內政而寓軍令焉三分齊國為高子之里為國子之里為公之里以為三軍擇其賢民使為里君每里皆使賢者為君鄉有行伍卒長則有制令且以田獵因以賞罰因曰獵之功過寄行賞罰則百姓通於軍事矣於是乃制五家以為軌軌為之長十軌為里里有司四里為連連為之長十連為鄉鄉有良人以為軍令是故五家為軌故五人為軌軌長率之十軌為里故五十人為小戎里有司率之四里為連故二百人為卒連長率之十連為鄉故二千人為族鄉良人率之三軍故有中軍之鼓中軍則公之里卒也有高子之鼓春以田曰搜振旅因寓軍政而且整旅秋以田曰獮理兵順殺氣因理兵是故卒伍定於里軍政定於郊內教既成令不得遷徙故伍之人人與人相保家與家相受少同居長同游祭祀同福死喪相恤災禍同憂居處同樂行作同和哭泣同哀是故夜戰其聲相聞足以無亂晝戰其目相見足以相識歡欣足以相死是故以守則固以戰則勝君有此教士三萬人以橫行於天下教士謂先教習之士又曰凡立軍一人曰獨二人曰比三人曰參比參曰伍伍人為列列有頭二列為火十人有長立火字子五火為隊五十人有頭二隊為官百人立長二官為曲二百人立候二曲為部四百人立司馬二部為校八百人立尉二校為禆千六百人立將軍二禆為軍三千二百人有將軍副將軍唐書曰高祖起義兵命太宗將兵徇西河郡下之癸巳建大將軍府以裴寂為長史劉文靜為司馬具設官屬始置三軍分為左右以公子建成為隴西公左領大都督左三軍悉隸焉命太宗為燉煌公右領大都督右三軍悉隸焉開倉庫以賑窮乏遠近響應又曰高祖二年秋七月壬申詔曰天生五材司物資其器用武有七德撥亂所以定功故黃帝垂衣尚有阪泉之戰放勛光宅猶稱丹浦之師禁暴安人率由茲道創業垂統莫此為先以是周置六軍每習搜狩漢增八校畢選驍勇故能化行九有威震百蠻奸宄不興虔劉息志季葉凌替軍政湮亡卒利不修旌旗舛雜部伍符籍空有調發之名逗撓之興竟無討襲之用遂使夷狄放命盜賊交侵戰爭多虞黔黎殄喪朕受天明命撫育萬方爰自義師克成帝業至如超乘之士莫匪百金彀騎之材豈惟七萃今雖關塞寧謐荒裔肅清伊洛猶蕪江湖尚梗役車未息戎馬載馳武備之方尤宜精練所以各因部校序其統屬改授鋋鼓創造徽章取象天官定其名號庶使前茅後徑類別區分玉帳絳宮刑德允備蹈茲湯火譬彼椒蘭大定戎衣止戈斯在於是置十二軍分關內諸府以隸焉萬年道為參旗軍長安道為鼓旗軍富平道為玄戎軍醴泉道為井鉞軍同州道為羽林軍華州道為騎官軍寧州道為折威軍歧州道為平道軍幽州道為招搖軍西麟道為苑游軍涇州道為天紀軍宜州道為天節軍時高祖以天下未定實資武力將舉關中之衆以臨四方故興此制也每軍一人副一人取威名素重者為之督以耕戰之務自是士馬精強無敵於天下矣五代周史曰顯德初世宗自高平還乃大閲帝親臨之帝自高平之役覩諸軍未甚嚴整遂有退却至是命太祖皇帝一概簡閲選武藝超絶者署為殿前諸班因是有散員散指揮內殿直散都頭鐵騎控鶴之號復命揔戎者目龍捷虎捷以降一一選之老弱羸小者去之諸軍士伍無不精當由是兵甲之盛近代無比偏將尚書曰司馬掌邦政統六師平邦國左傳曰趙朔趙嬰齊為中軍大夫鞏朔韓穿為上軍大夫荀息趙同為下軍大夫韓厥為司馬又曰晉侯請於王戊申以紱冕命士會將中軍且為太傅命卿之服於是晉國之盜逃奔于齊又曰楚子北師次于郔沈尹將中軍子西將左子反將右將飲馬於河而歸又曰魯宣公十年夏六月晉師救鄭荀林父將中軍先縠佐之士會將上軍郤克佐之趙朔將下軍欒書佐之公羊曰秋衛師入盛昌為或言帥師或不言帥師將尊師少稱將將卑師衆稱師論語曰王孫賈治軍旅奚其喪衛靈公無道得賈免喪也史記項羽本紀曰於是梁為會稽守籍為裨將又曰項王召宋義與計事而大說之因置以為上將軍項羽為魯公為次將范增為末將又灌嬰傳曰嬰擊陳狶受詔別攻狶丞相侯敝斬敝及特將五人文穎注云特一之將後漢書西域傳曰大秦國一名梨鞬所治城周百餘里各有官曹文書置三十六將皆會議國事晉書曰張光字景武江夏鐘武人也身長八尺明眉目美音聲少為郡吏家世有部曲以牙門將伐吳有功遷江夏西部都尉又曰羊祜在軍常輕裘緩帶身不被甲鈴閣之下侍衛者不過十數人而頗以田漁廢政嘗欲夜出軍司徐胤執棨當營門曰將軍都督萬里安可輕脫將軍之安危亦國家之安危也胤今日若死此門乃開耳祜改容謝之此後稀出矣又曰吾彥為小將級吳大司馬陸抗抗奇其勇略將拔用之患衆情不允乃會諸將密使人佯狂拔刀跳躍來坐諸將皆懼而走惟彥不動舉几拒之衆服其勇乃擢用焉又天文志曰太白為上將羽林為中軍又曰文昌六星在北斗魁前天府之六星也一曰上將建武威二曰次將尚書中書司隸賞功也又曰郎將位北主閲旗所以為武備也又曰畢八星主邊兵弋獵其大星曰天高一曰邊將又曰參白獸之體其中三星橫列三將也北曰左肩主左將西北曰右肩主右將故黃帝占參應七將七將大天下兵精又曰南三星騎陳將軍騎將也南三星車騎車騎之將也又曰狼一星在東南狼為野將主侵掠也色有常欲不動也後周書曰賀拔嶽事爾朱榮以定策功授前將軍時万俟醜奴僭稱大號關中騷動朝廷深以為憂榮將遣嶽討之嶽私謂其兄勝曰醜奴擁秦隴之兵足為勍敵若嶽往而無功罪責立至假克定恐讒訴生焉勝曰汝欲何計自安嶽曰請爾朱氏一人為元帥嶽副二之則可矣勝以為然乃請於榮榮大悅乃以天光為雍州刺史以嶽為衛將軍左都督隋書曰大業九年徵天下兵募民為驍果置折衝果毅武勇雄武等郎將官以領驍果唐書曰李質者汴之牙將李既為留後倚質為心腹及朝廷以為郡守志邀節鉞質勸諭不從會疽發首乃與監軍姚文壽謀斬傳首京師有詔以韓充鎮汴充未至質權知軍州事使衙兵二千人皆日給酒食物力為之損屈充將至質曰若韓公始至頓去二千人日膳人情必大去若不除之後當無繼不可留此弊以遺吾帥遂處分停日膳而後迎充
