body:
  text: 人事部六十八正直上易坤卦曰六二直方大不習無不利直方地之性也又曰夫乾其靜也專其動也直是以廣生焉尚書皋陶謨曰直而溫又洪範曰無反無側王道正直又曰三德一曰正直毛詩羔裘曰彼其之子邦之司直又小明曰靖共爾位好是正直神之聽之介爾景福左傳襄元曰恤民為德正直為正正曲為直參和為仁又昭四仲尼曰叔向古之遺直也事具刑法門論語為政曰哀公問何為則民服孔子對曰舉直措諸枉則民服舉枉措諸直則民不服措猶投也諸之也言投之於上位也又曰葉公曰吾黨有直躬者其父攘羊而子證之攘盜也我鄉黨有直人名躬父盜羊則證其罪孔子曰吾黨之直者異於是父為子隱子為父隱直在其中矣又衛靈公曰直哉史魚邦有道如矢邦無道如矢史魚衛大夫名鰌君有道無道行常如矢直不曲也又微子曰柳下惠為士師三黜柳下惠魯大夫展禽食菜柳下謚曰惠士師嶽官名黜貶退也人曰子未可以去乎曰直道而事人焉往而不三黜枉道而事人何必去父母之邦漢書曰周昌為人強力敢直言自蕭曹等皆卑下之昌嘗入奏事高帝方擁戚姬昌退走高帝退還騎昌項問曰我何如主昌仰曰陛下即桀紂之主也於是上笑之然尤憚昌及高帝欲廢太子而立戚姬子如意為太子群臣固爭莫能得而昌廷爭之上問其說昌為人口吃又盛怒曰臣雖口不能言然臣知其不可陛下欲廢太子臣期期不奉詔上欣然而笑即罷呂后側耳於東廂聽見昌為跪謝曰微君太子幾廢矣又曰申屠嘉為人廉直門不受私謁是時太中大夫鄧通方愛幸文帝嘗讌飲通家時嘉入朝而通居上旁有怠慢之禮嘉奏事畢因言陛下幸愛群臣則貴富之至於朝廷之禮不可不肅上曰君勿言吾私之罷朝嘉為檄召鄧通詣丞相府不來且斬通恐入言上上曰汝第往吾今使人召若通至詣丞相府免冠徒跣頓首謝嘉責曰朝廷者高皇帝之朝廷也通小臣戲殿上大不敬當斬通頓首首盡出血上使持節召通而謝丞相又曰單于嘗為書謾呂太后太后怒召諸將議討之上將軍樊噲曰臣願得十萬眾橫行匈奴中諸將皆阿太后以噲言為然季布曰樊噲可斬夫以高帝四十餘萬困於平城噲時亦在其中今噲奈何以十萬眾橫行匈奴中又曰諸葛豊字少康琅耶人以明經為郡文學特立剛直貢禹為御史大夫除豊為屬舉侍御史元帝擢為司隸校尉剌舉無所避京師為之語曰間何闊逢諸葛上嘉其節加豊秩光祿大夫時侍中許章以外屬貴幸奢淫不奉法度賓客犯事與章相連案劫章欲奏其事適逢許侍中私出豊駐車舉節欲收之章窘馳去豊追之許侍中因得入宮門自歸上豊亦上奏事於是收豊節司隸校尉去節自豊始也又曰安昌侯張禹以帝師位至特進甚尊重朱雲上書求見公卿在前雲曰今朝廷臣上不能匡主下無以益民皆尸位素飡臣願賜尚方斬馬劍斷佞臣一人頭以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上廷辱師傅罪不赦御史將雲下雲攀殿檻檻折雲呼曰臣得下從龍逢比干遊地下足矣未知聖朝何如耳於是左將軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直於世使其言是不可誅其言非固當容之上意然後已及後當治殿檻上曰勿易因而葺之以旌直言之臣東觀漢記曰戴憑為侍中數進見問得失上謂憑曰侍中當匡輔國政勿有隱情憑對曰陛下嚴曰朕何用嚴憑曰伏見前太尉西曹椽蔣遵清亮忠孝學通古今陛下納膚受之訴遂致禁錮世於是為嚴上怒曰汝南子欲復黨乎憑謝曰臣無蹇諤之節而有狂瞽之言不能以尸伏諫偷生茍活誠慚聖朝上即勑尚書解遵禁錮拜憑虎賁中郎將以侍中兼領之又曰朱暉字文季南陽苑人為臨淮太守表善黜惡抑強絕邪吏民懷而愛之歌曰強直自遂南陽朱季吏畏其威民懷其惠又曰祭遵從征河北為軍市令上舍中兒犯法遵格殺之上怒命收遵時主簿陳嗣諫曰明公欲眾整齊今遵奉法不避是教命行也上乃貰之以為剌奸將軍謂諸將曰當備祭遵吾舍中兒犯命尚殺之必不私諸卿也又曰鄭眾字仲師建武中太子及山陽王因虎賁將梁松請眾欲為通籍遺縑帛眾悉不受謂松曰太子儲君無外交義漢有舊防諸王不宜通客松諷以長者難逆不可不慮眾曰犯禁觸罪不如守正而死又曰吳良字太儀齊國臨淄人以清白方正稱於鄉里為郡議曹掾正旦掾入賀太守門下掾王望前言曰齊郡敗亂遭離盜賊人民飢餓不聞雞鳴狗吠之音明府視事五年土地開闢盜賊滅息五穀豊熟家給人足今日歲首誠上雅壽掾皆稱萬歲良跪曰門下掾佞謟明府無受其觴盜賊未弭人民困乏不能家給人足於今議曹掾尚無袴寧為家給人足耶太守曰此生言是遂不舉觴賜鰒魚百枚宴罷教署功曹良恥以言受官不拜又曰申屠剛字巨卿扶風人性剛直忠正志節抗厲常慕史鰌汲黯之為人涉獵書記果於行義元始中舉賢良對策言甚切直建武初徵拜侍御史遷尚書令謇多直無所屈撓時隴蜀未平上嘗欲近出剛諫上不聽剛以頭軔乘輿車輪馬不得前謝承後漢書曰李爕為議郎會西羗及邊章韓遂作亂隴右徵發天下役賦無已司徒崔烈以為宜棄涼州爕厲色言曰斬司徒天下安尚書郎楊贊奏爕廷辱大臣帝以問爕爕曰涼州天下衝要國家藩衛今牧御失和使一州叛逆烈為宰相不念為國思所以弭之之策乃欲割棄一方萬里之土臣竊惑之若烈不知之是極蔽也知而故言是不忠也帝從爕議由是朝廷重其方略每公卿有缺為眾議所歸又曰范滂字孟博汝南人太宗守資署功曹滂外甥西平李頌頑嚚濁穢鄉曲所棄常侍唐衡求屬仕官資勑曹召署文學史滂不聽極久衡復有書誚資資怒召功曹書佐朱零問不召頌意狀零以告滂滂謂曰若荅教當言頌則滂之姊子豈不樂其升進頌緣汙穢小人不宜玷塵清朝不敢以位私人是以不召又曰楊奇字公偉弘農人為侍中天子所問引經據義靡事不對靈帝嘗問朕何如桓帝對曰陛下躬秉藝文聖才雅藻有優先帝禮善慎刑或未之有今天下以陛下准桓帝猶謂堯舜比德者也上不悅其言謂曰奇所謂楊震子孫有強項遺風想死後又當致大鳥也袁山松後漢書曰李膺等下獄獄吏曰諸入獄當祭皋繇以祈福范滂曰皋繇古之賢臣知滂無罪將理之於天如其有罪祭之何益及訊獄王甫以次詰之滂年少在後越次而前甫曰夫合黨連群必有盟誓其所謀圖皆何等耶滂曰竊聞仲尼之言見善如不及見惡如探湯欲使善善齊其情惡惡同其行謂王政之所思不悟反以為黨乃仰天歎曰古之脩善自求多福今之脩善乃陷大戮死之日願賜一幡埋於首陽山側上不負皇天下不愧夷齊尚書霍諝以黨事無驗表陳赦之范曄後漢書曰高獲字敬公南陽人與世祖有素舊師事司徒歐陽歙歙下獄當斷獲冠鐵冠帶鈇鑕詣闕請歙帝雖不赦而引見之謂曰敬公朕用子為吏宜改常性獲對曰臣受性於天地父母不可改之於陛下出便辭去三公爭辟不應又曰任延字長孫南陽人為武威太守帝戒之曰善事上官無失於和延對曰臣聞忠臣不和和臣不忠上下雷同非陛下之福善事上官不敢奉詔帝曰卿言是也又曰樊鯈字長魚宏之子也廣陵王荊有罪詔與任隗雜治其獄事竟奏請誅引見宣明殿帝怒曰諸卿以我弟故欲誅之即我子卿等敢爾也鯈對曰春秋之義君親無將而誅焉是以周公誅弟季友鳩兄經傳大之臣等以荊屬託母弟陛下留聖心加惻隱故請耳如令陛下子臣等專誅而己帝歎息良久鯈益以此知名又曰張綱字文紀皓之子也漢安元年選八使徇風俗皆耆儒知名多歷顯位唯綱年少官次最微餘人受命之部而綱埋其車輪於洛陽都亭曰豺狼當路安問狐貍遂奏曰大將軍梁冀河南尹不疑蒙外戚之援荷國厚恩以芻蕘之姿居阿衡之任不能敷楊五教翼贊日月而專為封豕長虵肆其貪饕誠天威所不赦大辟所宜加書奏而京師震悚又曰奚延字秀平陳留外黃人桓帝時徵博士太尉楊秉舉賢良方正再遷為侍中帝遊上林苑從容問曰朕何如主也延對曰陛下為漢中主帝曰何以言之對曰尚書令陳蕃任事則治中常侍黃門預政則亂是知陛下可與為善可與為非帝曰昔朱雲折檻今侍中面稱朕違敬聞闕矣又曰趙喜字伯陽南陽人為太尉受遺詔典錄喪禮自王莽篡亂舊典不存皇太子與東海王等雜止同席喜乃正色橫劍扶下諸王以明尊卑又曰桓典字公雅榮之玄孫也拜御史執正無所廻避常乘驄馬京師畏憚為之語曰行行且止避驄馬御史又曰吳祐字季英陳留長垣人大將軍梁冀表為長史及冀誣奏太尉李固祐聞而請見與冀爭之不聽時扶風馬融為冀章祐因謂融曰李公之罪成於卿手李公即誅卿何面目見天下人乎冀起入祐亦徑去又曰李充遷侍中大將軍鄧騭貴戚傾時以充高節卑敬之嘗置酒請充賓客滿坐酒酣騭跪曰幸託椒房位列上將幕府初開欲辟天下奇偉以匡不逮唯諸君博求其器充乃為陳海內隱居懷道之士頗有不合騭欲絕其語以肉啖之充抵肉於地曰說士猶甘於肉遂出徑去又曰崔琦數引古今成敗戒梁冀琦以言不從失意復作白鵠賦以為諷梁冀見之呼琦問百官內外各有司存天下云云豈獨吾人之尤琦對曰將軍累世台輔任齊伊尹而德政未聞元元荼炭不能納貞良以救禍敗乃復欲鉗塞士口杜蔽主聽將玄黃改色馬鹿易形乎冀無以對又曰許敬字鴻卿汝南平輿人也有吏誣君者會於縣令坐敬拔佩刀斷席曰敬不忍與惡人同席魏志曰蘇則拜侍中與董昭同寮昭嘗枕𣍿臥則推下之曰蘇則之𣍿非佞人之枕又曰張承字公先範弟也避地楊州袁術問承曰周室凌遲則有桓文之霸秦失其政則高祖接而用之今孤以土地之廣士民之眾欲邀福齊桓擬跡高祖何如對曰在德不在強夫能用德以從天下之欲雖由疋夫之資而興霸王之功不足為難若茍僣擬于時而動眾之所棄誰能興之術不悅又曰陳泰為匈奴中郎將京邑貴人多致貨因市奴婢泰皆掛名於壁徵為尚書悉以還之又曰蔣濟入為散騎常侍時有詔征南將軍夏侯尚曰卿腹心重將當使恩施足死惠愛可懷可作威作福殺人活人尚以詔示濟濟既至帝問曰卿聞見天下風教何如濟對曰未有他善但見亡國之語耳帝忿然作色而問其故濟具以荅因曰夫作威作福書之明誡天子無戲古今所慎唯陛下察之於是帝意乃解追取前詔又曰辛毗字佐治頴川人嘗從帝射雉帝曰射雉樂哉毗曰於陛下甚樂而群下甚苦帝默然後為之稀出又曰王基字伯輿東萊人為荊州刺史書戒司馬景王曰許允傅嘏袁保崔贊皆一時正士有直質而無流心可與同政事者也景王納其言吳志曰張昭每朝見言論辭氣壯厲義形於色曾以直言逆旨中不進見後蜀使來稱蜀德美而群臣莫拒權歎曰使張公在坐彼不折則廢安得復自誇乎明日遣中使勞問因請見昭昭避席曰昔太后桓王不以老臣屬陛下而陛下屬老臣臣是以思盡臣節以報厚恩若乃變易思慮以偷榮取容此臣所不能也權辭謝焉
