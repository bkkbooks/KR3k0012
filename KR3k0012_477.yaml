body:
  text: 人事部一百一十七施恩上周易曰見龍在田德施普也雲行雨施天下治也周禮曰小司徒以歲時巡國野而賙萬人之艱厄以王命施惠左傳目冬晉薦飢使乞糴於秦秦伯謂子桑曰與諸乎對曰重施而不報其民必攜攜而討焉無衆必敗謂百里曰與諸乎對曰天災流行國家代有救災恤憐道也行道有福是以輸粟于晉自雍及絳相繼命之曰泛舟之役傳曰晉侯逆秦師使韓簡視師復曰師少於我鬭士倍我公曰何故對曰出因其資入用其寵飢食其粟三施無報是以來也傳曰宋公子鮑禮於國人宋飢竭其粟而貸之年七十以上無不饋詒也時加羞珍異無日不數於六卿之門國之賢人無不事也親自桓以下無不恤也公子鮑美而豔襄夫人欲通之鮑嫡祖母而不可乃助之施傳曰鄭子皮即位於是鄭飢而未及麥民病子皮以子展之命餼國人粟戶一鍾是以得鄭國之民故罕氏常掌國政以為上卿傳曰楚子伐蕭申公巫臣曰師人多寒王巡三軍拊而勉之三軍之士皆如挾纊傳曰晉公子重耳及曹僖負羈之妻曰吾觀晉公子從者皆足以相公子必反其國若反其國必得志於諸侯而誅無禮曹其首也子盍早自二焉乃饋盤餐置壁焉公子受餐反壁傳曰子西曰昔闔廬有國天有災厲親巡孤寡而供其乏困在軍熟食者分而後敢食語曰子華使於齊冉子為其母請粟子曰與之釜請益曰與之庾冉子與之粟五秉子曰赤之適齊也乘肥馬衣輕裘吾聞之君子周急不繼富史記曰范蠡之陶修産積居十九年中三致千金再散分與貧交友兄弟此謂富好行其德者也又曰田常以大斗出貸以小斗收齊人歌之曰嫗乎採芑歸乎田成子又曰蘇秦為從約長并相六國北報趙王乃行過雒陽周顯王使人郊勞於是蘇秦散千金以賜宗族貧友漢書曰韓信釣於城下諸母漂漂水擊拿為漂有一母見信飢飯信竟漂數十日信謂漂母曰吾必重報母怒曰大夫不能自食吾哀王孫而進食蘇林曰如言公子也豈望報乎前列曰吳楚反竇嬰為大將軍賜金千斤嬰言袁盎欒布諸名賢士在家進之所賜金陳廊廡下軍吏過輒令財取為用蘇林曰自令裁取為用金無入家者又曰李廣歷七郡太守前後四十年得賞賜輒分其麾下飲食與士卒共之家無餘財終不言生産事前列曰婁護字君卿為諫議大夫使郡國護貸多持幣帛至齊上書求上先人冢因會宗族人各以親踈與束帛一日散百金之費使還奏事事稱旨擢夫水太守前列曰韋玄成字少翁以父任為郎少好學修父業尤謙遜下士出遇相識步行輒下從者與載送之以為常其接人貧賤者益加由是名譽日廣以明經擢為諫議大夫遷大河都尉前列曰張臨安世曾孫亦謙儉每登閣殿常歎曰桑霍為我戒豈不厚且死分施宗族故舊薄葬不起墳又曰蘇武為右曹典屬國所得賞賜盡以施與昆弟故人又曰朱邑為人惇篤於故舊以愛和為行居處儉節賜以供九族鄉黨家無餘財後漢書曰趙典兄子溫字子恭初為京兆郡丞歎曰丈夫當雄飛安能雌伏遂棄官去遭歲大飢散家糧以賑窮餓所活萬餘人後列曰劉詡字子相頴川人家世豐産常能周施而有不其惠嘗行於汝南界中有陳國張季禮遠赴師喪遇寒冰車毀頓滯道路詡見而下車與之不告姓名自策馬去季禮意其子相也後故到頴陰還所假乘詡閉門辭行不與相見後黃巾賊起郡縣飢荒詡救給乏絶資糧者數百人又逢知故困餒於路不忍委去因殺所駕牛以救之衆人止之詡曰視沒不救非志也遂俱餓後列曰折像字伯式廣漢雒人父國有資財二億家僮八伯人像幼有仁心不殺昆蟲不折萌牙能通京氏易好黃老言及國卒感多藏厚亡之義乃散金帛資産周施親踈自知亡日召賓客飲食辭訣忽然而終又曰廖扶逆知歲荒乃藂穀數千斛悉用周給宗族姻親又斂葬遭疫死亡不能自收者常居先人冢側未曾入城市人因號為北郭袁宏後漢書曰种皓字景伯父為定陶令有財三千萬父卒皓皆以賑鄉里貧賤者其進趣名利者皆不與交通東觀漢記曰鄧弘收恤故舊無所失父所厚同郡郎中王臨年老貧乏弘常居業給足乞與衣裘輿馬施之終竟後列曰馬援少年處處田牧至有牛馬羊數千頭穀萬斛既而歎曰凡殖貨財産貴其能施賑也否則守錢虜耳乃盡散以班昆弟故舊又曰崔駰學於太學而糧盡鄧衛尉欲餼焉而未果季彥九歲以其父命往見衛尉曰施不必豐期於救乏崔生巨父之執也不幸而貧公許賑之有日矣嘉貺未至或欲豐之然後乃致之乎答曰家物少須租入曰是猶古人欲決江海以救牛蹄之類也鄧公曰諾又曰鄧琳字叔孫西羌反破郡縣上乃拜綝謁者屯田三輔琳臨發之日散千金之産分與兄弟甥舅親族各有差品又曰朱暉建初四年南陽大飢米石千錢初同縣張堪有名德每與相見常接以友道暉以堪宿望成名未敢安也堪至把暉臂曰欲妻子託朱生暉舉手不敢答後堪仕至蜀郡漁陽太守物故暉自為臨淮太守後遂絶不復相聞南陽飢時聞堪妻子貧窮暉乃自往候視困厄分所有以賑之又曰王丹字仲回京兆人王莽時連徵不至家纍千金隱居養志好施周急已具富部後列曰寇恂經明行修名重朝廷所得秩俸盡施朋友故人及所從吏士常曰吾因士大夫以致此其獨享之乎時人稱其長者後為宰相又曰竇固久歷大位甚見尊貴而性謙儉愛人好施士以此稱之又曰梁商飢年穀貴民餒輒遣蒼頭去幘著巾車載米鹽菜錢於四城門與貧乏不語主人知其陰德伏恩絶不望報匿名隱譽皆此類也司馬彪續漢書曰郭伋字細侯并州牧徵為太中大夫賜宅一區及帷帳錢穀伋輒散與宗親九族無遺餘又曰張純字奮少好學節儉行義常分損租奉貽恤宗親雖至傾匱而施與不怠又曰伏湛字惠公更始元年拜為平原太守遭倉卒兵起莫不驚擾而湛獨安然教授謂妻子曰一穀不升國君徹膳今人皆飢奈何獨飽且食粗糲盡分奉祿以賑活鄉里來客者百餘家司馬彪續漢書曰獻帝初百姓飢荒張儉資計差溫乃傾竭財産與邑里共之賴其差溫故存者以百數又曰肅宗崩廉范奔起敬陵時盧江郡椽嚴麟奉章俱會於路麟乘小車塗深馬死不能自進范見而愍然命從騎下馬與之不告而去麟事畢不知馬所歸乃沿路訪之或謂麟曰故蜀郡太守廉叔度好周人窮今奔國喪獨當是耳麟亦素聞范名以為然即牽馬造門謝而歸之世伏其義魏志曰楊俊字秀才以兵亂方起而河內處四達之衢必為戰場乃扶老弱去詣京密問同行者百餘家俊賑濟貧乏通共有無宗族知故為人所略作奴僕者凡六家俊皆傾財贖之魚豢魏略曰趙喜字伯陽為平原太守百官大食光武問喜在郡何如咸稱喜政有迹時親家諸夫人皆會會罷諸大夫言喜篤義多恩從長安還收護妾等衣食生活使得蒙今日之富貴非獨能臨人也吳志曰魯肅字子敬大散財貨摽賣地以賑窮人結士為務甚得鄉邑欣心周瑜為居巢長將數百人故過候肅并求資糧肅家有兩囷米各三千斛肅乃指一囷與瑜瑜益知其奇也遂相親結定僑札之分又曰朱據字子範吳郡人有姿貌膂力絶人又能論難黃武初徵拜五官中郎權遷建業據尚公拜左將軍封雲陽侯謙虛接士輕財好施吳志曰駱公緒時年八歲與親客歸會稽事嫡母甚謹時飢荒多有困乏公緒為之飲食衰少其姊仁愛有行寡歸無子見甚哀之數問其故公緒曰丈夫糟粳不足我亦何必獨飽姊曰誠如是何不告我而自苦若此乃自以私粟與公緒又以告母亦覺之遂使分施由是顯名晉書郤鑒時所在飢荒州中之士素有感其恩義者相與資贍鑒復分所得以恤宗族鄉曲孤老賴而全濟者甚多又曰紀瞻少與陸機兄弟親善及機被誅瞻恤其家周至及嫁女資送同於所生王隱晉書曰潘勗字元茂值年荒部曲之家健兒渠帥皆素服重名共相率送迎道路所在為儲以供行資勗隨主人多少口率均分無有尊卑優劣若所賦已盡偶有不足則推己之分以周未遍父老有頌之曰且貴且富有南山之壽吾仍得與潘元茂又曰恩不可忘無如我潘郎晉中興書曰應詹以孝稱年拾餘歲祖父母亡家富於財而詹年稚弱乃請宗中單貧者與共為居弱冠知名太宰何邵見而稱之曰質文之士也晉紀曰祖逖梗慨有大志年十五不知書輕財好施每至諸田舍輒稱兄意散帛以是嘉焉
