body:
  text: 果部七梅爾雅曰梅柟似杏實酢尚書説命曰若作和羹爾為鹽梅毛詩鵲巢標有梅曰標有梅男女及時也標有梅其實七兮標落也盛極則墮落者梅也求我庶士逮其吉兮詩義疏曰梅杏類也樹及葉皆如杏而黑煮而乾為蘇置羹臛齏中又可含以香口又谷風四月曰山有嘉卉侯栗侯梅又墓門曰墓門有梅有梟萃止大戴禮夏小正曰正月煮梅為豆實吳曆曰孫亮出西苑方食生梅使黃門至中藏取蜜以漬蜜中有鼠矢侍中請付獄推亮曰此易知耳令破鼠矢矢裏燥亮大笑曰久在蜜中中當濕今外濕裏燥必黃門為構黃門首服左右莫不驚悚宋書曰武帝女壽陽公主人日臥於含章簷下梅花落公主額上成五出之華拂之不去皇后留之自後有梅花粧後人多效之南史曰柳憚嘗與琅琊王瞻博射嫌其皮闊乃摘梅怗烏珠之上發必命中觀者驚駭梁書曰任昉為新安太守郡有蜜嶺及楊梅舊為太守所採昉以冒險多毒物故即時停之唐書曰蕭倣為嶺南節度使倣性公廉南海雖富珍奇月俸之外不入其門家人疾病醫工治藥須烏梅左右於公廚取之倣知而令遷之促買於市淮南子曰百梅足以為百人酸一梅不足以為百人酸喻衆能濟少少不能有所成也枹朴子曰綺里丹法以鉛百斤合五石煮之皆成銀以雄黃煮之皆成黃金金太剛以豬膏煮之太柔以梅煮之山海經曰靈山其木多梅郭朴注曰似杏而酢説苑曰越使諸發執一枝梅遺梁王梁王之臣韓子顧謂左右惡有一枝梅遺列國之君乎論衡實知篇曰使聖人空坐獨思則不知百世後有馬生牛牛生驢桃生李李生梅也世説曰魏武帝行失道三軍皆渴帝令曰前有大梅林饒子甘酸可以解渴士卒聞之口皆水出地理志曰南陵有梅根治風俗通曰夏禹廟中有梅梁忽一春生枝葉又曰五月有落梅風江淮以為信風又有霖霪號為梅雨沾衣服皆敗黦桂陽先賢傳曰有人謂蘇統後園梅樹下種藥可治百病吳氏本草曰梅核明目益氣不飢東方朔別傳曰朔與三門生俱行見一鳩占皆不同一生曰今日當得酒一生曰其酒必酸一生曰雖得酒不得飲也三生皆到主人須臾主人出酒樽中即安於地羸而覆之訖不得酒出門問見鳩飲水故知得酒鳩飛集梅樹上故知酒酸鳩飛去所集枝折墮地折者傷覆之象故知不得飲也西京雜記曰上林苑有朱梅同心梅紫蒂梅燕支梅麗枝梅紫花梅侯梅周處風土記曰夏至之雨名為黃梅雨廣志曰蜀名梅為䕩大如鴈子梅䕩皆可以為油脯黃梅以熟䕩作之䕩音老伍瑞休江陵記曰洪亭村下有白藉洲東南得邴洲上頭有枚回村舊云是梅槐合生成樹是以名之音訛謂之梅回荊州記曰陸凱與范曄相善自江南寄梅花一枝詣長安與曄并贈花詩曰折花逢驛使寄與隴頭人江南無所有聊贈一枝春神異經曰北方荒外有石胡焉方千里中有橫公魚夜化為人剌之不入煮之不死以烏梅二七煮之即熟可已邪病述異記曰嘉興縣睪陶村朱休之有弟朱元元嘉二十五年十月清旦兄弟對坐家中有一犬來向休蹲遍視二人而笑遂搖頭歌曰言我不能歌聽我歌梅花今年故復可奈汝明年何其家驚懼斬犬榜音滂首路側至歲末梅花時兄弟相忿奮戟傷兄官收治並被囚繫經歲得免至夏舉家時疾母及兄弟皆卒任昉述異記曰邯鄲有故邯鄲宮基存焉中有趙王果園梅李至冬而花春得食嶺南異物志曰同方梅繁如北杏十二月開語林曰范汪至能啖梅人嘗致一斛奩須臾啖盡潘嶽間居賦曰梅杏郁棣之屬左思蜀都賦曰梅杏羅生柏梁臺太官令曰柤梨橘栗李桃梅張協七命曰燀音闡以秋橙酢以春梅接以商王之箸承以帝辛之杯石榴廣雅曰若榴石榴也晉隆安起居注曰武陵臨沅縣安石榴子大如碗其味不酸一蒂六實宋書曰元嘉末魏太武征彭城遣使求甘蔗安石榴張暢曰石榴出自鄴下亦當非彼所乏北史曰齊安德王延宗納趙郡李祖收女為妃後帝幸李宅宴而妃母宋氏薦二石榴於帝前問諸人莫知其意帝投之問魏收曰此竟何意收曰石榴房中多子王新婚妃母欲子孫衆多帝大喜詔收卿還將來仍賜美錦二匹唐書曰孔紹安大業末為監察御史時高祖為隋討賊於河東詔紹安監高祖之軍深見接遇及高祖受禪紹安自洛陽間行奔高祖見之甚悅拜內史舍人時夏侯端亦嘗為御史監高祖軍先紹安歸朝授祕書監紹安因侍宴應詔詠石榴詩曰秪為來朝晚開花不及春時人稱之神仙傳曰劉馮者沛人也封桑鄉侯學道於樓丘子常服石桂英及中嶽石榴垂四百年如十五幼童瀨鄉記曰老子祠堂北有石榴二株鄴中記曰石虎苑中有安石榴子大如碗盞其味不酸廬山記曰香爐峰頭有大盤石可坐數百人石垂生山石榴三月中作花色似石榴而小淡紅敷紫萼輝曄可愛襄國記曰龍岡縣有好石榴博物志曰張騫使西域還得安石榴廣志曰安石榴有甜酢二種陸機與弟雲書曰張騫為漢使外國十八年得塗林安石榴也李尤德陽殿賦曰蒲桃安若曼延蒙籠應吉甫安石榴賦曰余往日為中書直廬上有安石榴枝葉甚茂故為之賦傅玄安石榴賦曰虎宿中而纖條結龍辰升而丹華繁其在晨也灼若九日栖扶桑其在夕也爽若燭龍吐潛光庾倏若石榴賦曰遠而望之粲若摛績被山阿迫而察之赫若龍輝耀淥波夏侯孝若石榴賦曰接翠萼於緑蒂冒紅牙於丹鬚赩然含蕤璀爾散珠雪酲解肴怡神實氣潘嶽間居賦曰若榴蒲陶之珍磊落蔓延於其側又安石榴賦曰實有嘉木名安石榴採條外暢縈幹內樛丹輝綴於朱房緗的點於紅鬚煌煌煒煒熠耀委纍似長離之栖鄧林苦珊瑚之映流水光明磷爛含丹耀紫味滋芳袖色麗瓊蕊潘嶽安石榴賦曰若榴者天下之奇樹九州之名果也是以屬文之士或敘而賦之遙而望之煥若隨珠耀重淵詳而察之灼若列宿出雲間千房同模十子如一御飢療渴解酲止醉左思吳都賦曰蒲桃亂潰若榴竟裂張載重作石榴賦曰於是天回節移龍火西夕流風晨激行露朝白紫房獨熟頳膚自坼剖之則珠散含之則冰釋充嘉味於庖籠極酸甜之滋液上薦清廟之靈下羞玉堂之客張協安石榴賦曰乃剖乃折金房緗隔范堅安石榴賦曰紅鬚肉艷頳牙外摽似華燈之映翠幕若丹瓊之廁碧瑤殷元安石榴賦曰余以暇日散愁翰林覩潘張若榴二賦雖有其美猶不盡善客復措辭故聊為之賦曰或珠離於琁琬或玉碎於雕觴璘彬灑映曄紫嬰緗璀若瑤英之攢鍾巘粲若靈蚌之含珠璫徐藻妻陳氏石榴賦曰惟木之珍莫美石榴擢鮮葩於青春結芳實於素秋王倫妻羊氏安石榴賦曰振緑葉於柔柯垂彤子之纍衰張載詩曰大谷石榴木滋之最膚如凝脂汁如清瀨渴者所思銘之裳帶曹植棄妻詩曰石榴植前庭緑葉搖縹青翠烏飛來集拊翼以悲鳴麋元詩曰蒼蒼陵上柏參差列成行童童安石榴列生神道傍奈晉書曰成帝杜皇后崩先是三吳女子相與簪白花望之如素奈傳言天公織女死為之著服至是而后崩三國典略曰楊愔一門四世同居家甚隆盛昆弟就學三十餘人庭有奈樹實落于地群兒咸爭愔獨坐不顧季父暐見之謂賓客曰此兒恬裕有我風蕭廣濟孝子傳曰王祥後母庭有奈樹始著子使守視祥晝驅鳥雀夜則驚鼠時雨忽至祥抱樹至曙母見惻然紫虛南嶽夫人傳曰夫人姓魏名華存性樂神仙季冬夜半有四真人並年可二十降夫人靖室因設酒饌陳玄雲紫奈夫人還王屋山王子喬等並降時夫人與真人為賓主設三玄紫奈玄晏春秋曰衛倫過豫論及於時味倫因命僕取糗進豫豫曰夌也有杏李奈味具杏部杜恕篤論曰日給之華與奈相似也奈結實而日給零落虛偽之然與真實相似也虛偽敗而真實成西京雜記曰上林苑有白奈紫奈花紫緑奈花緑廣志曰奈有白赤青三種張掖有白奈酒泉有赤奈西方例多奈家以為脯數十百斛以為蓄積如收藏棗栗若奈汁黑其方作羹以為豉用也漢武故事曰上握蘭園之金精摘圓丘之紫奈釋名曰奈油搗奈實也和以塗繒上燥而發之形似油也奈脯切奈曝乾之如脯也盧諶祭法曰夏祠法用白奈秋祠用赤奈晉太始起居注曰太始二年六月嘉奈一蒂十五實或七實生於酒泉王子年拾遺記曰崑崙山上有奈冬生子碧色須玉井之水洗方可食郭子橫洞冥記曰有紫奈大如升甜如蜜核紫花青虎丘山疏曰山下三面有春秋二奈本草經曰奈味苦令人臆脹病人不可多食晉宮閣名曰華林園有白奈四百株左太沖蜀都賦曰朱櫻春就素奈夏成潘安仁間居賦曰二奈耀丹白之色潘尼東武觀賦曰飛甘瓜於浚水投素奈於清渠曹植求祭先王表文帝曰乞請白奈二十枚又謝賜奈表曰即夕殿中虎賁宣詔賜臣等冬奈一奩詔使溫啖夜非食時而賜見及奈以夏熟今則冬至物以非時為珍甘以絶口為厚實非臣等所宜蒙荷詔曰此奈乃從梁州來道里既遠來轉暖故奈變色張載詩曰江南都蔗釀液豐霈三巴黃甘瓜州素奈凡此數品殊美絶快渴者所思銘之裳帶
