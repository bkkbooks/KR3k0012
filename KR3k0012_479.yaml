body:
  text: 人事部一百一十九贈遺毛詩曰雞鳴剌不説德也知子之來之雜佩以贈之知子之順之雜佩以問之又曰唯士與女伊其相謔贈之以芍藥又曰渭陽康公念母也康公之母晉獻公之女文公遭驪姬之難未返而秦姬卒穆公納文公康公時為太子贈送文公於渭之陽念母之不見也我見舅氏如母存焉我送舅氏曰至渭陽渭水名秦時都雍至渭陽者蓋東行送舅氏於咸陽之地何以贈之輅車乘黃我送舅氏悠悠我思何以贈之瓊瑰玉佩禮記曰孔子之衛遇舊館人之喪入而哭之哀出使子貢脫驂而賻之子貢曰無乃已重乎夫子曰余嚮者入而哭之遇於一哀而出涕余惡夫涕之無從也小子行之左傳曰鄢陵之戰郤至三遇楚子之卒必下免胄而趍風楚子使工尹襄問之以弓曰方事之殷有𩎟韋之跗注君子也適見不穀而趍無乃傷乎郤至見客免胄承命又曰越圍吳趙孟使楚隆使於吳王曰黃池之役君之先臣志父得承齊盟曰好惡同之今君在難無恤不敢憚勞非晉國之所能及也使陪臣敢展布之王拜稽首曰寡人不佞不能事越以為大夫憂拜命之辱與之一簞珠又曰吳公子札聘於鄭見子産如舊相識與之縞帶縞帶大帶也子産獻紵衣焉紵衣禪衣謂子産曰鄭之執政侈難將至矣政必及子子為政慎之以禮不然鄭國將敗又曰叔鮒欲求貨於衛淫芻蕘者淫放也使欲衛患之而致貨焉衛人使屠伯饋叔向羹與一篋錦屠伯衛大夫曰諸侯事晉未敢攜二況衛在君之宇下屋宇之下喻近而敢有異志芻蕘者異於它日敢請之請正之意叔向受羹反錦受羹示不逆其意且非貨賂也論語鄉黨曰康子饋藥拜而受之曰丘未達不敢嘗饋遺也拜受敬也曰丘未達言不服之意藥從中制外故當慎也又微子曰齊人饋女樂季桓子受之三日不朝孔子行漢書曰文帝賜趙它書上禇五十衣中禇三十衣遺王上禇下禇謂之多少厚薄夾復之名范曄後漢書曰李恂徵拜謁者領西域副校尉西域殷富多珍寶諸國侍子及督使賈胡數遺恂奴婢宛馬金銀香罽之屬一無所受東觀漢記曰陳遵為大司農護軍嘗使胸奴過辭於王丹臨決丹謂遵曰俱遭時反覆唯我二人為天地所遺今子當之絶域無以相贈贈子以不拜遂揖而別遵甚悅後列曰王丹字仲回資性清白少修節義時京師大豪陳遵朋友喪親遵為護喪事縛縑數百匹丹懷縑一匹至喪主前出縑授之謂曰如丹是縑出自機杼遵有慚色閔仲叔太原人好黃老清志潔行不仕王莽之世恬靜養神弗役於物與周黨相友黨過叔舍共含菽飲水無菜茹黨嘗遺其生麻叔歎曰我欲省煩耳受而不食後列曰光祿勳杜林與馬援鄉里親厚援南方還時林馬適死援遣子將馬一匹遺林曰朋友有車馬之餽可以備之居數月林還之後漢書曰或問第五倫曰公有私乎對曰昔人有與吾千里馬者雖不受每三公有所選舉心不能忘而亦終不用也吾兄子嘗病一夜十往退而安寢吾子有病雖不省視而竟夕不眠若是者豈謂無私乎又曰張奐少立志節常與士友言曰大丈夫處世當為國家立功邊境及為將帥果有勳名董卓慕之使其兄遺縑百匹奐惡卓為人絶而不受吳志曰太史慈字子義曹公聞其名遺慈書以篋封之發省無所道而但貯當歸蜀志曰宗預東聘吳孫權捉預手涕泣而別曰君每銜命結二國之好今君年長孤亦衰老恐不復相見遺預大珠一斛宋書曰王弘之徵為通直散騎常侍不就從兄敬弘常解貂裘與之即著以採藥又曰王弘之隱居性好釣日夕載魚入往上虞郭經親故門各以一兩頭置門內而去又曰陶潛傳顏延之為始安郡經過日日造潛每往必酣飲致醉臨去留二萬錢與潛潛悉送酒家稍就取酒飲宋書曰郭原平高陽許謠之居在永興罷建安郡丞還家以綿一斤遺原平不受送而復反者前後數十瑤之乃自往曰今歲過寒而建安綿好以此奉尊上耳原平乃拜而受之齊書庾易徵辟不就以文義自樂安西長史袁彖欽其風通書致遺易以連理機竹翹書格報之又曰張融字思光吳郡吳人也祖禕晉琅邪王國郎中令父暢宋會稽太守融年弱冠道士同郡陸修靜以白鷺羽尾扇遺融曰此既異物以奉異人又曰何點隱居不仕豫章王命駕造門點從後門逃去竟陵王子良聞之曰豫章王尚不屈非吾所議遺點嵇叔夜酒杯徐景山酒鎗以通意范享燕書曰高祖少有大度雄略傑出晉安北將軍張華鎮薊總御諸部高祖童冠往見華甚異之謂高祖曰君必為命時之器匡時濟難者也脫所著幘簪以遺高祖結殷勤而別崔鴻後燕録曰王猛伐洛陽將發謂慕容垂曰吾將遂清東夏或為東山之別見物思人卿將何以為信垂以佩刀遺之崔鴻前秦録曰慕容沖進逼長安符堅遣使送錦袍一遺沖使者稱有詔古人兵交使在其間卿遠來草創得無勞乎今送一袍以明本懷朕於卿恩分如何而於一朝忽為此變後魏書曰西域厭達波斯諸國各因公使並遺任城王澄駿馬一匹請付太僕以充國間詔曰王廉貞之行有過楚相可勑付廄以成君子大哉之美陳書賀德基少遊學於京邑積年不歸衣資罄乏又恥衣服故斃盛冬止衣夾襦袴嘗於白馬寺前逢一婦人容服甚盛呼德基入寺門脫白綸巾以贈之仍謂德基曰君方為重器不久貧寒故以此相遺耳德基問嫗姓名不答而去唐書陸贄以博學宏詞登科授華州鄭縣尉罷秩東歸省母路由壽州刺史張鎰有時名贄往謁之鎰初不甚知留三日再見與語遂大稱賞請結忘年之契及辭遺贄錢百萬曰願備太夫人一日之膳贄不納唯受新茶一串而已曰敢不承君厚意又曰陸贄丁母憂東歸洛陽寓居嵩山豐樂寺藩鎮賻贈乃別陳餉遺一無所取與韋皋布衣時相善唯西川致遺奏而受之家語曰子路將行辭於孔子子曰贈汝以車乎贈汝以言乎對曰請以言孔子曰不疆不達不勞無功不忠無親不信無復不恭失禮慎此五者而已矣子路曰由請終身奉之戰國策曰蘇秦説李兌抵掌而談李兌送蘇秦以明月之珠和氏之璧黑狐之裘黃金百鎰蘇秦得以為用西入於秦又曰張儀為秦破從連橫説楚王遺車百乘獻駭雞之犀夜光之璧於秦王梁祚魏國統曰初太祖過故人呂伯奢也遂行日暮道逢二人容貌威武太祖避之路二人笑曰觀君有奔懼之色何也太祖始覺其異乃悉告之臨別太祖解佩刀與之曰以此表吾丹心願二賢慎勿言劉向説苑曰田子方使人遺子思孤白之裘恐其不受因謂之曰吾與人也如棄之子思辭曰伋聞妄與不如遺棄於溝壑伋雖貧不忍以身為溝壑也説苑曰孔子之楚有漁者獻魚孔子不受獻漁者曰天暑市遠賣之不售思慮欲棄之不若獻之君子孔子再拜受謂弟子曰掃除將祭之弟子曰夫人將棄之今夫子將祭之何也孔子曰吾聞之務施而不腐餘財者聖人也今受聖人之賜可無祭乎劉向列仙傳曰安期先生者時人皆言千歲公秦始皇請與語三日三夜賜金璧數十萬出於阜鄉亭皆置去留書以赤玉舄一量為報曰後千歲求我於蓬萊山下費禕別傳曰孫權以手中嘗所執寶刀贈禕答曰臣不才何以堪明令然刀所以討不庭禁暴亂者也但願大王勉建功業同獎漢室臣雖暗弱不負采顧蜀王本紀曰蜀王獵於褒谷見秦王以金一笥遺蜀王報以禮物盡化為士秦王大怒臣下拜賀曰土者地也葛洪西京雜記曰朱買臣為會稽太守懷章綬至金亭而國人未知也所知錢勃見其曝露乃勞之曰得無罷乎遺以紈扇買臣至郡引為上客雜記曰公孫弘為國士所推上為賢良國人郵長贈以生芻一束素絲一繸撲玉一枚孟儀周載曰悼公時晉智伯為政強暴好侵伐欲謀襲衛乃遺衛君野馬四白璧一以結好韓子曰仲尼為政於魯齊景公患之黎鉏謂景公遺哀公女樂景公曰善乃以女樂二八遺哀公哀公果怠於政仲尼諫不聽去而之齊又曰晉獻公欲伐虞虢乃遺之屈産之乘垂棘之璧女樂二八以榮其心而亂其政孔叢子曰子思居貧其友有饋之粟者受二車焉或獻樽酒束修子思弗為當或曰子取人粟而辭吾酒是辭少取多也子思曰伋不幸而貧於財至乃困乏將絶先人祀夫所以受粟為周乏也酒脯則飲宴方乏於食而乃飲宴非義也吾豈以為介哉又曰孔子使宰豫於楚楚昭王以安車蒙飾因宰豫遺孔子焉宰豫曰夫子無以此為也臣竊見其行不離道動不違仁貴義尚德清素好儉仕而有祿不以為費不合則去退無吝心妻不服綵妾不衣帛車器不雕馬不食粟道行則樂其治不行則樂其身臣知夫子之不用此車也古詩曰客從遠方來贈我一端綺文作雙鴛鴦裁為合歡被謝惠連詩曰客從遠方來贈我鶴文綾裁為親身服著以便寢興古詩曰客從遠方來贈我一端綺相去萬餘里故人心尚爾張衡四愁詩曰美人贈我金錯刀何以報之英瓊瑤又云美人贈我翠琅玕何以報之雙玉盤又云美人贈我錦繡段何以報之青玉案又云美人贈我貂襜褕何以報之明月珠傅云四愁詩曰美人贈我明月珠何以報之比目魚又云美人贈我蘇合香何以要之翠鴛鴦張載擬四愁詩曰美人遺我緑綺琴何以贈之雙南金琴操曰許由無有杯器手掬水人見由無器以瓠瓢遺之由操飲飲訖挂以樹枝風吹樹動有歷歷聲由以為煩擾取損之楚辭曰折疏麻兮瑤華疏麻神麻也瑤王華將以遺兮離居離居隱者也皇甫規與劉司空箋曰明公至德佐國憂世雖贈兩梁冠及鮐魚一雙服厚尊貺榮施其弘班固集曰竇憲餉身所服物虎頭繡盤囊一雙又遺身所服襪三具錯鏤鐵一魏武帝與楊彪書曰今贈足下青氈床褥三具慕容晃與顧和書曰今致繡鞋一緉張敞集敞答朱登書曰登為東海相遺敞蟹醬敞答曰遽伯玉受孔子之賜必以及其鄉人敞謹分斯貺于三老尊行者曷敢獨享之
