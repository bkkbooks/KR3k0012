body:
  text: 器物部十箕帚世本曰少康作箕帚詩曰維南有箕不可以簸揚維南有箕載翕其舌禮曰凡為長者糞之禮必加帚於箕上以袂拘而退其塵不及長者以箕自向而扱之又曰汜埽曰埽埽席前曰拚拚弗運切席不以鬣執箕膺擖鬣謂帚也恒埽地不潔清也膺親也擖舌也持箕將去糞者以舌自卿擖以涉切又曰良弓之子必學為箕史記曰張儀說楚王曰大王誠能聽臣臣請使秦太子入質於楚楚太子質於秦請以秦女為大王箕箒之妾効萬室之都以為湯沐之邑又曰鄒子如燕昭王擁篲先驅請列子之坐而受業漢書曰秦為亂政虐刑殘滅天下比為長城之役南有五嶺之戍外內搔動百姓罷音皮弊頭會箕歛計人頭數出穀以箕斂之以供軍費又曰上歸櫟陽五日一朝太公家令說曰天無二日土無二王帝雖子人主也太公雖父人臣也奈何令人主拜人臣如此則威重不行後上朝太公太公擁篲迎門卻行上大驚下扶太公太公曰帝人主也奈何以我亂天下法也又曰魏勃欲見齊相曹參無因常早掃參之門又曰賈誼上書曰秦人借父櫌鋤而有得色母取箕帚立而誶語晉書曰王獻之善隸書有父風以掃帚沾泥書大字方一丈甚善王隱晉書曰庾兗孤兄女曰芳將嫁美其服矣兗刈荊苕為箕帚焉召諸子于堂男女以班而謂芳曰汝少孤今汝適人將事舅姑洒埽庭內婦人之道故賜汝此匪器之美欲汝之溫恭朝夕雖休勿休也齊書曰劉休妻王氏妬帝聞賜休妾勑與王氏杖二十令休於宅後開小店使王氏賣掃帚皂莢以辱之國語曰越王勾踐行成於吳曰一介適女執箕帚於王宮淮南子曰周鼎不爨而不可賤掃帚日用而不足貴南越志曰鮑靚為南海太守嘗夕飛往羅浮山曉還有小吏晨洒掃忽見兩鵲飛入小齊吏帚擲之墜於地視乃靚之履也西域志曰佛帚在月支國長三尺許似孔雀尾也異苑曰北海徐寔婢蘭義熙中忽患羸黃而自拂拭有異於常家共伺察見竹掃帚從壁角來趣婢取而焚之婢即平復雜五行書曰常以正月三日買箕四枚懸堂上四壁令人治生大得治田蠶萬倍錢財自入李尤箕銘曰神農殖穀以養蒸民箕主簸揚糠粃乃陳畚左傳曰晉靈公不君失君道宰夫臑音而熊蹯不熟殺之寘諸畚使婦人載以過朝又曰宋災樂喜為司城以為政陳畚梮具綆缶畚簣籠也晉中興書曰王猛少貧賤鬻畚為事常至洛陽貨畚有一人於市貴買其畚云家近在此可隨我取直猛隨去忽至深山中此人語猛且住樹下當先啟道君須臾猛進見一老公踞床髭鬢悉白侍從十許人引猛云大司馬公可進猛因拜老公曰王公何緣拜即十倍雇畚直遣人送猛出山既顧視乃是嵩高山也淮南子曰禹之時天下大水禹身執畚鍤以為民先韓詩外傳曰鮑焦衣弊膚見挈畚持蔬遇子貢曰吾子何以至於此鮑焦曰天下之遺德教者眾矣吾何以不至此子貢曰吾聞非其世者不至其利污其君者不履其土今子非其世而持其蔬乎鮑焦曰吾聞賢者易進而輕退廉士易愧而輕死乃捐其蔬立枯於洛水之上斛廣雅曰斛謂之鼓方斛謂之角書曰恊時月正日同律度量衡合四時之氣節月之大小月之甲乙齊一也律法制及尺丈斛斗斤兩皆均同周禮曰栗氏俗作栗為量改煎金賜則不耗不耗然後權之權之然後準之準之然後量之其銘曰時文思索允臻其極喜量既成以觀四國永啟厥後茲器維則漢書曰量者龠合升斗斛也所以量多少也本起於黃鍾之龠以子穀秬黍中者千有二百實其龠二龠為斛而五量嘉矣其法用銅方合十合為一升十升為斗十斗為斛而五量嘉矣其法用銅方尺而圍其外旁有庣音桃焉其上為斛下為斗左耳為升右耳為合為合龠之量也升者登合之量也斗者聚升之量也斛者角斗平多少之量也夫量者躍於龠合於合登於升聚於斗角於斛也職在太倉太司農掌之後漢書曰第伍倫為京兆主簿倫平銓衡正斗斛市無阿枉百姓悅服之魏志曰太祖常討賊廩穀不足私謂主者主者曰可小斛以是之太祖曰善後軍中言太祖欺眾太祖謂主者曰特當借汝死以厭眾不然事不解遂斬之題屍曰用小斛盜軍穀故斬之崔鴻十六國春秋後涼錄曰呂光與龜茲王戰大敗之故大奢侈富於養家有蒲桃酒或千斛經十年不敗士卒淪沒酒藏者相繼荀氏別傳曰荀遂字仲陽隱居不仕時歲飢荒來糴者遂妻常叩其斛糴者歸量輒過其本時人號為椓椽斛夫人莊子曰聖人不死大盜不止為之斗斛以量之則并與斗斛而竊之權衡以稱之則并與權衡而竊之雖有軒冕之賞弗能勸斧鉞之威弗能禁剖斗折衡而民不爭天文要集曰斗星卬則天下斗斛不平覆則歲稔雜令曰諸量以秬黍中者容一千二百為籥二籥為合十合為升十升為斗三斗為大一斗十斗為解楚辭曰世並舉而好朋一升斛而相量言今之人皆好朋黨並相薦舉將其貪佞之心以量清潔之士眾比周而肩隨賢者遠害而隱藏㪷史記曰鴻門之會沛公使張良以㪷一隻予亞父亞父受玉斗撞而破之又田乞仕齊景公為大夫其收賦稅於民以小斗受之其廩予民以大斗行陰德於民而景公弗禁由此田氏得眾心宗族益強人思田氏漢書曰王莽攝政鑄作威斗威斗者以五石銅為之形若北斗長二尺五寸欲以厭勝眾兵既成命有司負之莽出在前入則御旁說苑曰合升斗之微以滿倉廩王逸子曰自幽厲禮壞樂崩天綱弛絕諸侯力政轉相吞威德不能懷威不能制至於王𧹞遂喪玉斗升漢書律曆志曰嘉量法用銅方尺而圜其外左耳為升右耳為合左傳曰齊舊四量豆區釜鍾四升為豆各自其四以登於釜釜金十則鍾鍾乃大矣陳氏三量皆登一焉葛洪神仙傳曰王方平語蔡經家人曰吾欲賜汝等酒此乃出天廚其味醲非俗人所宜飲之或能爛人膓今當以水和之汝輩勿怪也乃以一升酒以一斛水攪之以賜經家家人飲之一升許皆醉良久蓑笠廣雅曰草謂之蓑簦音登謂之笠詩曰爾牧來思荷蓑荷笠蓑所以備雨笠所以御暑又曰被都人士臺笠緇撮臺所以御暑笠所以禦雨也禮曰大羅氏天子之掌鳥獸者也諸侯貢屬焉草笠而至尊野服也諸侯於使使者戴草笠貢鳥獸也國語曰越王勾踐栖於會稽乃令三軍求退矣王謀臣大夫種曰譬如蓑笠時雨至必求之令君既棲於會稽之上而求謀臣無乃後乎又曰吳夫差使王孫茍告勞于周曰齊人為不道不供承王事夫差不忍被甲帶劍簦笠相望於艾陵簦笠備雨器也天舍其裏齊師還言敗而還夫差豈敢自多又曰管仲曰今夫農群萃而州處察其四時時雨既至挾其槍刈耨鎛以旦暮從事於田野脫衣就功首戴茅蒲身衣襏襫音撥襫茅蒲簦笠也襏襫蓑也沾體塗足以從事於田野史記曰瞽瞍使舜上廩從下焚廩舜乃以雨笠自杆而下得不死之又曰虞卿解其相印與魏齊間行走大梁欲因信陵君以走楚信陵君未肯見曰卿何人齊曰虞卿躡履檐簦一見趙王賜白璧一雙黃金百鎰再見拜為上卿聞君急士之窮而歸公子吳志曰呂蒙汝南人代鄧當為將定南郊約軍中不得于人家有所求取蒙麾下士是汝南人取民家一笠以覆官鎧蒙以為犯軍令不可以鄉里故廢法遂斬之晏子曰景公出遊曰嗚呼使古而無死何如晏子曰若使古而無死丁公太公將有齊國吾將戴笠衣褐以行畎畝之中也風土記曰越人結交約曰卿雖乘車我戴笠後日相逢下車揖盛弘之荊州記曰宜都有風穴樵人有冬過者置笠穴口風吹吸之經日還涉長陽溪而得其笠則知溪穴潛通矣馮敬通詣鄧禹牋曰今日裘與蓑孰急見雨則裘不用上堂則蓑不御此更為適者也今敬通逢堂蓑之不御也本草曰敗天公主鬼注精魅此竹笠之敗也曹植九詠曰越江兮刈蘭暮秋兮薄寒被蓑兮戴笠置露兮踐雚王褒撞約曰雨墮如注瓮板薜戴子公薜蓑衣也子公笠也桔槔通俗文曰機汲曰桔槔禮曰捧席如橋衡鄭玄曰井上桔槔衡在上低仰者也莊子曰子貢南遊楚漢陰見一丈人為圃畦鑿隧而入井抱甕而灌用力多而見功寡子貢曰鑿木為機後重前輕挈水若流其名桔槔圃者曰聞有機事必有機心吾非不知羞不為也又曰獨不見夫桔槔者乎引之則俯舍之則仰彼人之所引非引人者也故俯仰而不得罪於人汝南先賢傳曰蔡君仲井桔槔壞在母年命上憂不敢治而扶老生繞之扶老藤也生繞桔槔不須治孝之感也椸枷禮曰男女不同椸枷又曰不敢懸於夫之揮音揮揓竿卒謂之揓爾雅曰日竿謂之椸郭璞注曰衣架也古詩曰甖中無升米架上無懸衣梯說文曰梯木階也禮曰復有林麓則虞人誤階無林麓則狄人設階蜀志曰劉琦問自安之計於諸葛亮亮不荅琦遊後園登樓去梯謂亮曰可以言未謂劉曰君不見申生在內而危重耳居外而安乎崔鴻十六國春秋後涼錄曰竇荀洛陽人也以壯勇知名從呂光攻龜茲登雲梯入地道或時墮落蘇而復上光深奇之孟子曰瞽瞍使舜完廩捐階搜神記曰和憙鄧后夢登梯以捫天體蕩蕩正青若鍾乳者后仰漱之石虎鄴中記曰石虎太子宣與母弟蔡公韜迭秉政事宣嫌終有代己之勢八月社日韜登東明觀遊暮還酣宴作女妓罷宣遣力士鉅鹿楊杯等十餘人夜緣梯入韜弟斫殺之鹽鐵論曰防塞利門而民猶為非況上之為利乎傳曰諸侯好利則大夫鄙大夫鄙則士貪士貪則庶人盜是開利室內民罪梯也世說曰韋仲將能書魏明帝起殿欲安牓使仲將登梯題之既下頭鬢皓然因是勑戒兒孫勿復學書嵇含雞賦曰余庭有栖雞而一雄㝡武常憑梯升栖守時告晨未常有殆郭璞遊仙詩曰靈溪可潛盤安事登雲梯杷朳方言曰杷無齒為朳宋魏之間謂之渠拏今江東名亦然或謂之渠䟽周生烈曰夫忠謇朝之杷朳正人國之掃篲也秉把執篲除兇掃穢國之福主之利也
