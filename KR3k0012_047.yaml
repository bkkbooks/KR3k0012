body:
  text: 江東諸山敬亭山郡國志及宋永初山川記曰宛陵北有敬亭山山有神祠即謝朓賽雨賦詩之所其神云梓華府君頗有靈驗蓋山紀義宣城記曰登蓋山一百許步有泉俗傳云昔有舒氏女未適人其父析薪於此女忽坐泉處牽挽不動父遽告家比來唯見清泉湛然其女性好音樂乃作絃歌即泉涌浪回復有赤鯉一雙躍出今作樂嬉遊泉猶故沸涌九華山九華山録曰此山奇秀高出雲表峰巒異狀其數有九故號九子山焉李白因遊江漢覩其山秀異遂更號曰九華又曰山之上有池塘數畝水田千石其池有魚長者半尋頒首頳尾朱鬐丹腹人欲觀之叩木魚即以可食之物散於池中食訖而藏焉其水流泄為龍池溢為瀑泉入龍潭溪有白墡窟其土如麵不墋歉歲人多食之顧野王輿地記曰九華山山高一千丈劉禹錫序曰余嘗愛終南太華以為此外無奇愛女几荊門以為此外無秀及見九華始悼前言之容易也幘山宣城圖經曰幘山北面迤邐連九華山其山層峰嵯峨遐睇狀如冠幘因號為幘山牛渚山宣城圖經曰牛渚山突出江中謂為牛渚圻古津渡處也江表傳云司馬徽論運命曆數云黃旗紫蓋見於東南終有天下者荊楊君子又壽春童謠言天子當西上孫皓大喜即載妻子及後宮數千從牛渚陸道西上云青蓋入洛陽適還大雪寒凍殆死輿地志云牛渚山首有人潛行云此處連洞庭傍達無底見有金牛狀異乃驚怪而出牛渚山北謂之採石按今對採石渡口上有謝將軍祠又按江源記云啇侶於此取石至都輸造石渚因名採石吳初以周瑜屯牛渚鎮西將軍謝尚亦鎮此城慈母山宣城圖經曰慈母山在當塗縣北臨江丹陽記云山生簫管竹王褒洞簫賦云原夫簫管之所生于江南之丘墟即此處也其竹圓緻異於衆處自伶倫採竹嶰谷已後唯此簳見珍歷代常給樂府而俗呼為鼓吹山山有慈母祠也蕪湖山宣城圖經曰蕪湖山在縣西南山因湖以名之漢末於湖側置蕪湖縣以其地卑畜水非深而生蕪藻故因以名縣焉晉為重鎮謝尚王敦皆鎮於此陳平縣廢以其地入當塗縣望夫山宣城圖經曰望夫山昔人往楚纍歲不還其妻登此山望夫乃化為石其山臨江周回五十里高一百丈博望山宣城圖經曰博望山有二山夾大江東曰博望西曰天門按郡國志云天門山亦曰峨嵋山楚獲吳艅艎於此按其山相對時人呼為東梁西梁山據縣圖為天門山輿地志云博望梁山東西隔江相對如門相去數里謂之天門宋孝武詔曰梁山天表象魏以旌國形仍以二山為立闕故曰天門陵陽山宣城圖經曰陵陽山在涇縣西南一百三十里列仙傳云陵陽子明釣得白龍放之後五年龍來迎子明上丹陽陵陽山一百餘年乃得仙山高一千餘丈又有子安仙人也來就子明二十年一旦忽死因葬山下常有黃鵠栖其處樹上鳴云子安子安也白紵山宣城圖經曰宣州白紵山在縣東五里本名楚山桓溫領妓遊此山奏樂好為白紵歌因改為白紵山中山宣城圖經曰宣州中山又名獨山有溧水縣東南一十里不與群山連接古老相傳云中山有白兔世稱為筆最精山前有水源號為獨水按輿地記云宣州溧水縣有獨山下有獨水流演不息即此山也三鶴山宣城圖經曰三鶴山在溧水縣東南六十里昔有潘氏兄弟三人於此山求仙後道成化為三白鶴於此冲天黟山歙縣圖經曰北黟山在縣西北一百六十八里高一千一百七十丈豐樂水出焉舊名黃山天寶六年勑改焉案江南諸山之大者有天台天目而天目近連浙江天台俯瞰滄海江海者實以地下為百川所歸然歙州則江之上游而海上濫觴也今計歙川之平地已合與二山齊矣況其山又有摩天戛日之高此則浙江東西宣歙池饒江等州山並是此山之支脈明矣其諸峰悉是積石有如削成煙嵐無際雷雨在下其霞城洞室符竇瀑泉則無峰不有若林澗之下巖巒之上奇屣異狀不可摸寫信靈仙之窟宅也山中峰有溪丘公仙壇彩霞靈禽捿止其上是浮丘公與容成子遊之處所昔有人到壇所忽見樓臺煥然樓前有蓮池左右有鹽積米積遂歸引村人上取了不知其處所山下人往往聞峰上有仙樂之聲靈山郡國志曰歙縣有靈山天欲雨先聞鼓角聲此山上有圓石如車蓋縣以鼓鳴為候一鳴令遷不鳴令不去山一名三姑山三年一野火燒數未蒲人燒之即雨新安記曰靈村有山生香草名曰靈香又有黃精山上有靈壇道士祈請不燒香自然芳馥村人常射獵經踐此土犯山神終無所獲又輿地志云靈山高峻有圓石高數丈上有石蓋也巖山山謙之丹陽記曰秣陵縣南三十里有巖山山西有石室山東大道左有方石長一丈刻勒銘題贊吳功德孫皓所建也三山山謙之丹陽記曰江寧縣北十二里濱江有三山相接即名三山舊時津濟道也橫山山謙之丹陽記曰丹陽縣東十八里有橫山連亙數十里或云楚子重至于橫山是也鐵峴山山謙之丹陽記曰永世記云縣南百餘里鐵峴山廣輪二百許里山出鐵楊州今鼓鑄之九井山姑熟記曰縣南十里有九井山即殷仲文九日從桓公遊九井賦詩處也石城山江乘地記曰石城山嶺鄣千里相重似若一遊歷者以為吳之石城猶楚之九疑也多生箭竹又有桑樹山上有城因以名焉攝山江乘地記曰扈村有攝山山多藥草可以攝生因名之方四面各起重嶺遊者名繖山形似繖也山頂舊有周江乘廟傳云吳時人未詳名字黃鶴山京口記曰有黃鶴山在縣界晉王恭為刺史改創西南樓名萬歲西北名芙蓉樓至今存焉又輿地志云俗傳此樓飛向江外以鐵鎖縻之方已覆船山梁武輿駕東行記曰有覆船山酒罌山南次高驪山傳云昔高驪國女來東海神乘船致酒禮娉之女不肯海神撥船覆酒流入曲阿故曲阿酒美也北固山南徐州記曰城西北有別嶺入江三面臨水號云北固劉楨京口記云回嶺入江懸水峻壁舊北固作固字梁高祖云作鎮作固誠有其語然北望海口實為壯觀以理而推宜改為顧望之顧輿地志云天景清明登之望見廣陵城如在青霄中虎丘山顧凱之虎丘山序曰吳城西北有虎丘山越絶書曰闔閭冢名虎丘銅槨三重女山山謙之南徐州記曰丹徒縣西九里臨江有女山山東許貢客刺孫策所也秦履山山謙之南徐州記曰暨陽縣西南可三十五里有秦履山傳云秦皇登之以望江海馬鞍山山謙之南州記曰暨陽縣北九里馬鞍山東有黃山郭璞葬所中州山山謙之南徐州記曰南沙縣北百里有中州山昔在海中去岸七十里義熙以來沙漲遂與岸連三白山山謙之南徐州記曰剡縣有三白出鐵常供戎器山東頭南面有石穴高丈餘容十數人恆津液流潤天將雨輒有雲群行從南來映山山亦出雲應之與同比就虞山即大雨矣馬蹄山劉損京口記曰石峴東連馬蹄山山上石有馬蹄跡因以為名算山劉損京口記曰算山無峰嶺臨江魏文帝南望致歎會骸山吳郡緣海四縣記曰帶海有會骸山傳云山有金牛昔有兄弟三人共鑿求之坎崩同死因以為名石姥山劉道真錢唐記曰石姥山有一石甑厥狀殊似居絶嶺之顛大數十圍下有三石足支之大辟山郡國志曰餘杭大辟山本名餘杭山一名由拳高峻為最旁有由拳村出藤紙晉書曰郭文字文舉隱於餘杭大辟山山中曾有猛獸殺一塵於菴側文舉因以語人人取賣之分錢以奉文舉白我若須此自當賣之所以相語不須故也花山陸道瞻吳郡記曰吳縣有花山太康中生千葉蓮花於上故曰花山虞山陸道瞻吳郡記曰海虞縣西六里有虞山上有仲雍冢陽城山董監吳地記曰富春有陽城山縣氏所葬漢末上有光雲氣天屬姑蘇山董監吳地記曰姑蘇山一名姑胥連橫山之北越絶書云吳地胥門外有九曲路闔閭造以遊姑胥之臺望湖中窺百姑淮南子亦謂之姑餘硯石山董監吳地記曰硯石山在縣西門外亦名石鼓山又有琴臺在其上越絶書云吳人於硯石置館娃宮劉逵注吳都賦引揚雄方言云吳有館娃宮吳人呼美女為娃故三都賦云幸乎館娃之宮張女樂而娛群臣今吳縣有館娃鄉香山董監吳地記曰香山吳王遣美人採香於山因以為名故有採香徑華山華山精舍記曰老子枕中記云吳西界有華山可以度難父老云山頂北有池上生千葉蓮花服之羽化因曰華山長林森大荒楚蔽日輿地志云山上有石鼓晉隆安中鳴乃有孫恩之亂山在縣西六十三里包山吳地記曰包山在縣西一百三十里中有洞庭深遠世莫能測吳王使靈威丈人入洞穴十七日不能盡因得玉葉上刻靈寶經二卷使示孔子云禹之書也又郡國志云洞庭山有宮五門東通林屋西達峨嵋南接羅浮北達岱嶽又按玄中記云吳國西有具區澤中包山有洞庭寶室入地下潛行通琅耶東武淮南子云斷修蛇於洞庭左傳云哀公元年夫羌敗越於夫椒今太湖中別有夫椒山下有大洞天宮潛涌五嶽包山上舊無三班謂蛇虎雉侯景亂後乃有虎蛇為人之害石鼓山郡國志曰吳王離宮在石鼓山越王獻西施於此山山有石馬望之如人騎南有石鼓鼓鳴即兵起粟山吳地記曰粟山一名新石頭山上有城下有飛泉石杵有吳先王刻題處石杵西有舍古老言古於此採金劉道真記云縣西有姥山絶嶺之上有石甑一人搖輒動與千人不異定山吳地志曰定山突出浙江中波濤所衝行侶為阻謝靈運詩曰朝發漁浦南暮宿富春郭定山杳雲霧赤亭無淹泊此山是也封山吳興記曰風渚在武康縣東十八里古防風國有風公廟水曰風渚山即封山也岝崿山吳興記曰於潛縣西二里有岝崿山有絶壁高三十許丈謝安嘗登之臨壁垂足曰伯昏無人何以過是當時稱以為難一云本在太湖中禹治水移於此孺子山吳興記曰東遷縣有孺子山徐孺子入吳哭友人嘗登之因以為名響山吳興記曰晚山北十八里有響山人於山下語無大小響則隨聲曲折應之晚山吳興記曰於潛縣西六十里有晚山悉是松木真墨所出也百丈流襄二山吳興記曰山墟村有山名曰百丈流襄二山堯遭洪水此山不沒但餘百丈因以名山水流襄山嶺因名流襄印渚山吳興記曰印渚山上承浮溪水從渚以上至縣悉石瀨惡道不可行船以下水道無險故行旅集焉晉王胡之為吳興太守至印中歎曰非唯使人心情開滌亦覺日月清朗傳云渚次石文似印因以為名天目山郡國志曰天目山上有數百年樹名曰翔鳳樹輿地志云上有兩湖謂左右目故名天目也山極高峻上多美石泉木名茶雜道書曰天目山左高於地七千五百丈右高於地七千丈從廣三千里上有淵中有魚可食無毒蟲水經注曰吳興郡於潛縣北有天目山山極高峻崖嶺竦疊西臨後澗山上有霜木皆是數百年樹謂之翔鳳林東面有瀑布下注數畝深沼名曰蛟龍池水南流經縣西為縣之西溪卞山郡國志曰卞山卞和採玉處山東足有一簣高數尺晉太康中人開之風雨晦冥遂止歷代莫知所封又宋書云蕭惠明為吳興太守郡界有卞山山下有項羽神廟相承云羽多居郡廳事前後七人太守不敢上廳惠明謂綱紀曰孔季恭曾為此郡未聞有災𨔵盛設筵榻接賓數日未幾惠明忽見一人長丈餘張弓挾矢向之既而不見因發背旬日而殞
