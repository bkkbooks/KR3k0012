body:
  text: 羽族部九燕春秋運斗樞曰搖光星散為燕禮記曰仲春之月玄鳥至之日以太牢祠于高禖天子親往左傳曰郯子云少皞鳥師而鳥名玄鳥氏司分者也玄鳥燕也春分來秋分去又曰吳公子禮自衛如晉將宿於戚戚豫文子之邑也聞鍾聲曰異哉夫子之在此也猶燕之巢於幕上也言至危也詩曰燕燕衛莊姜送歸妾也燕燕于飛差池其羽之子于歸遠送于野燕燕于飛下上其音又曰天命玄鳥降而生商宅殷土茫茫玄鳥乙鳥也春分鳥降湯之先祖有娀氏女簡狄配高辛與之祈于郊禖而生契故本以玄鳥至而祠焉茫茫大貌也爾雅曰燕燕乙也注云齊曰燕梁曰乙史記曰帝嚳少妃有娀氏娀音嵩曰簡狄以春分玄鳥至之日祠于高媒有玄鳥遺卵簡狄吞之生契又曰陳勝輟耕歎曰燕雀安知鴻鵠之志哉又曰臨江閔王榮坐侵廟壖為宮上徵榮詣中尉府郅都責訊王王恐自殺葬藍田燕數萬銜土置冢上百姓憐之漢書名臣奏曰丞相薛宣對曰茂陵寢上食日玄鳥來集吐所含大豆紫墨色翱翔殿上此陛下永與天無極天下幸甚又曰成帝和平二年秋大水有燕生雀又曰王莽開哀帝母丁姬冢有燕數千銜土投其穿中魏志曰館陶令諸葛原遷新興太守管輅祖餞之賓客並會自起取燕卵蜂窠蜘蛛著器中使輅覆射卦成輅曰含氣須變依于宇堂雄雌以分趐未舒張此燕卵也晉中興書曰中原喪亂鄉人遂共推郗鑒為主與千餘家俱避難於魯國嶧山山有重險百姓飢饉野無生草時或掘野鼠蟄燕而食之晉書載記曰慕容俊時燕巢于俊正陽殿之西椒生三雛頂上堅毛几城獻異鳥五色成章俊謂群僚曰是何祥也咸稱燕者燕鳥也首有毛冠者言大燕龍興冠通天冕章甫之象也巢正陽西椒者言至尊臨軒朝萬國之徵也三子者數應三統之驗也神鳥五色言聖朝將繼五行之籙以御四海者也俊覽之大悅南史曰襄陽霸城王整之姊嫁為衛敬瑜妻年十六而敬瑜亡父母舅姑咸欲嫁之誓而不許乃截耳置盤中為誓乃止所住戶有燕巢常雙來去後忽孤飛女感其偏栖乃以縷繫腳為志後歲此燕果復更來猶帶前縷女復為詩曰昔年無偶去今春猶獨歸故人恩既重不忍復雙飛雍州刺史西昌侯藻嘉其美節乃起樓於門題曰真義衛婦之閭又表於臺崔鴻北録曰昔魯人有浮海而失津者至于澶洲見仲尼及七十子遊于海中與魯人一木杖令閉目乘之使歸告魯侯築城以備寇魯人出海投杖水中乃龍也具以狀告魯侯不信俄而有群燕數萬銜土培城魯侯信之大城曲阜訖而齊寇至攻魯不克而還韓子曰天下無道攻擊不已甲胄生蟣虱燕雀處帷幄淮南子曰故先王之政四海之雲至而修封疆春分之後四海出雲蝦蟆鳴燕降而達路除道春分之後又曰大廈成而燕雀相賀呂氏春秋日有娀氏有二佚女為九成之臺飲食必鼓帝令燕往視之鳴若諡隘二女愛而爭搏之覆以玉筐少選高誘注曰少選須臾發而視之燕遺二卵北飛遂不反二女作歌曰燕往飛實始為北音北國之音也宣驗記曰程德度武昌人昔在潯陽夜見屋裏自明先有燕窠忽有小兒長尺餘潔白從窠出至床前曰卻後三年當得長生之道尋暗而滅甚祕密之又曰沛國周氏有三子瘖並不能言有人來乞飲聞其兒聲問之具以實對客曰君可還內思過既異其言知非常人良久云都不憶有罪過客曰試更思幼時事入內食頃出曰記小兒時當床有燕巢中有三子母還哺之輒出取食屋下舉手得及指內巢中燕子亦出口承受乃取三蒺藜各與之吞即死母還不見子悲鳴而去恆自悔責客變為道人之容曰君既自知悔罪今除矣便聞其兒言語周正即不見道人廣雅曰玄鳥燕也說文曰燕玄鳥也布翅拔尾象形也齊魯謂之鳦作巢避戊巳論衡曰燕鳥也形似非氣也安得生人且燕之長不過五寸安能成七尺之形契母適欲懷妊遭吞燕卵好奇因以為其生耳楊子法言曰朱鳥翾翾歸其肆矣侯苞注曰朱鳥燕別名四海肆也博物志曰人食燕肉不可入水為蛟龍所吞又曰燕戊巳日不銜泥塗巢此非才智自然得之吳地記曰春申君都吳宮因加巧飾春申死吏照燕窟失火遂焚越絶書曰吳路西宮在長秋周一里二百二十六步秦始皇十二年守宮者照燕失火燒之蘇州冢墓記曰宋青州刺史郁泰玄字義真好黃老故老相傳泰性仁恕德感禽獸初葬之日有群燕數千銜土於冢上今冢猶高大與他有異村鄉歲時迄今祭祀茅君內傳曰句曲山有神芝五種弟三名燕貽芝其色紫形如葵藿葉上有燕象如欲飛狀光明洞徹食一株拜為太清龍虎仙君崔豹古今注曰燕一名天女一名鷙鳥廣州志曰燕有三種乳於巖崖者為土燕湘中記曰零陵有石燕形似得雷風則飛鴶䲳如真燕談藪曰王景素嘗與劉璡同在小齊有燕集承塵飛鳴相追景素曰萬物各有性靈而獨賤於鱗羽乎若斯鳥也遊則參於雲煙之上止則隱於林木之下飢則啄渴則飲形體無纍乎物得失不關於心一何樂哉九章算術曰五雀六燕飛集于衡適平一雀一燕飛而易處則雀重而燕輕白燕宋元嘉起居注曰元年七月有白燕集於齊郡遊翔庭宇經九日乃去衆燕翼隨恆有數千陳書曰高士馬樞目常黃能視暗中物有白燕一雙巢其庭樹馴狎欄廡時上几案春來秋去幾三十年抱朴子曰千歲燕戶向北其色白而尾屈陰乾之服一頭得五百歲此肉芝也京房易占曰山見白燕其君且得貴女今俗名為天女也續異記曰孫氏妻見一童子當前以叉擲之躍入雲中夜聞戶外歌曰昔填夏家冢輦泥頭欲禿今寄黃氏居非意傷我目尋覔巢中得一白燕左目傷宣城記曰侍中紀昌睦初生有白燕一雙出巢既表素質官途亦通涼州記曰呂光大安三年白燕遊酒泉郡黑燕列從王威別傳曰時有白燕來翔被令為賦赤燕田俅子曰少昊氏之時赤燕一銜羽而飛集少昊氏之戶遺其丹書雀春秋運斗樞曰瑤光星散為雀禮記月令曰季秋鴻鴈來賓雀入大水化為蛤又內則曰雀晏蜩范鄭玄注云苑鋒又三年問曰凡生天地之間血氣之屬莫不知愛其類今失喪其匹至於燕雀猶有啁噍之頃焉然後乃能去之詩曰誰謂雀無角何以穿我屋春秋外傳趙簡子曰雀入淮而為蛤韓詩外傳曰夫鳳凰之初起也遙遙千里籬之雀喔咿而笑之及其升少陽一詘一信𨌑羽雲間藩籬之雀超然自知不及遠矣易通卦驗曰立夏雀子飛史記曰趙武靈王自號主父廢長子章而傳國於公子何主父遊沙丘公子章作亂與何戰敗章主父主父受之成兌遂圍主父主父飢探雀𪆪而食之月餘遂餓死沙丘范曄後漢書曰楊由字襄侯蜀郡人少習易為文學椽時有雀夜集庫門上太守廉范以問由對曰此占郡內當有小兵然不為害後二十餘日廣柔縣蠻夷反殺傷長吏宋書曰蕭思話在青州常所用銅斗覆在藥廚下忽於斗下得二死雀思話歎曰斗覆而雙雀殞其不祥乎俄而被繫北史曰後魏河南王曜五歲嘗射雀於道武前中之帝驚歎焉又曰潘樂字相貴初生有一雀止其母左肩占者咸言富貴之徵因名貴相後以為字唐書曰開元二十二年秋八月甲申幽州長史張守圭渝關界內虸蚄蟲食田稼曼入平州俄頃有群雀來食此蟲一日食盡平州稼穡無有傷者莊子曰一雀遇羿羿必得之或曰以天下為之籠則雀無所逃是故殷湯以庖人籠伊尹秦穆以五羊之皮籠百里奚抱朴子曰千羊不能捍獨虎萬雀不能抵一鷹戰國策曰莊辛謂楚王曰夫雀俯啄白粒仰栖茂樹鼓翅奮翼自以為無患不知夫公子王孫左挾彈右握丸以加其頸也晏子春秋曰齊景公探雀𪆪𪆪弱反之晏子再拜賀曰吾君有聖人之道矣君探𪆪而弱故反之是長幼也禽獸若此而況人乎此聖人之道也家語曰孔子見羅者所得雀皆黃口也孔子曰黃口盡得大雀獨不得何也羅者對曰黃口從大雀者不得大雀從黃口者得孔子顧語弟子曰君子慎所從孔藂子曰邯鄲民以正月旦獻雀於趙王而綴以五采王大悅申叔告子順曰王何以為也對曰正旦放之呂氏春秋曰燕雀爭處於一屋之下子母相哺詬詬焉相樂自以為安矣突決上焚棟宇燕雀顏色不變是何也不知禍之將及為人臣免燕雀之智者寡矣陳留耆舊傳曰圉人魏尚高帝時為大史有罪繫治獄有萬頭雀集獄棘樹上拆翼而鳴尚占曰雀爵命之祥其鳴即即復也我其復故官也有頃詔還故官說文曰雀依人小鳥也太玄經曰明珠彈雀貴不當也風俗通曰中平中懷陵上有雀萬餘亂鬭殺頭縣著樹也郭璞洞林曰丞相府有將雛雞雀飛集其背上驅之去復來如此再三令璞占之此晉王即祚之漸也崔豹古今注曰雀一名嘉賓言栖宿人家狀如賓客也王子年拾遺曰舜葬蒼梧之野有鳥如丹雀自來吐五色氣氛氳如雲名曰憑霄雀能群飛銜土成墳異苑曰上虞孫家奚奴多諸方術向空長嘯則群雀來萃夜呪蚊虻悉死於側又曰任城魏肇之初生有雀飛入其手占者以為封爵之祥益部耆舊傳曰楊宣為河西太守行縣有群雀鳴桑樹上宣謂吏曰前有覆車粟此雀相隨欲往食行數里果有覆車粟張顯析言曰萬雀不及一鳳凰衆星不如一明月沙州記曰寒嶺去太陽川三十里便有雀鼠同穴雀亦如家雀色小白鼠亦如家鼠色如黃瓦無尾舞雀述異記曰周成王元年貝多國人獻舞雀周公命返之神雀漢武內傳曰西王母仙藥有昆丘神崔漢書曰宣帝元康三年詔曰前年夏神雀集雍今春五色鳥以萬數飛屬縣翱翔而舞欲集未下其令三輔母得以春夏擲巢探卵彈射飛鳥具為令東觀漢記曰永安十七年公卿以神雀五色翔集京師奉觴上壽令賈逵作神雀頌崔豹古今注曰孝哀帝太初三年泰畦殿有雀五色頭冠長寸餘始到時鳥環其旁也隋書曰開皇十六年有神雀降於含章闥高祖召百官賜宴告以此瑞許善心於座請紙筆製神雀頌奏之高祖甚悅曰我見神雀共皇后觀之今且召公等入適述此事善心於座始知即能成頌文不加點筆不停毫常聞此言今見其事因賜物二百段赤雀春秋孔演圖曰鳥化為書孔子奉以告天赤雀書上化為黃玉刻曰孔提命作法為制赤雀集將受命制尚書中候曰赤雀銜丹書入豐止於昌前謝承後漢書曰琅琊董仲為不其令赤雀乳廳事前桑上民為作歌頌吳録曰景帝永安六年赤雀見於豫章北齊書曰天保元年京師獲赤雀獻於南郊唐書曰武德中赤雀巢於殿門宴五品以上頌者十餘人極歡而罷抱朴子曰靈寶經仙術也吳王伐石治宮室而合石之中得紫文金簡之書不能讀之使使者以問仲尼曰吳王間居有赤雀銜書以置殿前不知其義故遠咨呈仲尼視之曰此乃靈寶方長生之法禹所服之禹將仙化封之名山石函之中今乃赤雀銜之殆天授也孫氏瑞應圖曰赤雀者王者動作應天時則銜書來遁甲曰赤雀不見則國無賢白雀不降則無後嗣赤雀書陽精也白雀主銜鐵券陰主銜精也不來則國主無後嗣也尚書中候曰維天降紀秦伯出狩至于咸陽天振大雷有火下化為白雀銜籙集于公車孝經援神契曰王者奉己約儉臺榭不侈尊事耆老則白雀見典略曰泰伯出獵於咸陽大雷有火流下化為白雀銜丹書集于公車書曰泰伯霸世魏略曰文帝欲授禪白雀十九見吳志曰莘核上孫皓表曰明珠既覿白雀繼見燕書曰愍帝時有異雀素質緑頭集于端門東樹棲翔二旬而去夏四月以異雀故大赦名東園為白雀園涼州記曰呂光大安三年白雀巢陽川令郭敏室燉煌實録曰侯瑾字子瑜解鳥語嘗出門見白雀與群雀同行慨然歎曰今天下大亂君子小人相與雜北齊書曰臨漳縣令裴鑒蒞官清苦致白雀之瑞樊遜上清德頌十首唐書曰初高祖於太原斬王威有白雀飛入高祖之懷又曰武德九年江州都督太子衛副率侯君集於納義門獻白雀一又曰開元十三年兗州奏白雀見景戍上謂宰臣曰往昔史官唯記災異將令王者懼而循得故春秋不書祥瑞唯記有年聖人之意明矣勑天下諸州府不得更奏祥瑞南越志曰魯城縣多白雀大如鳩素質凝映先賢傳曰周不疑曹公欲以為議郎不就時有白雀瑞不疑已作頌授紙筆立令復作操奇異之羅含傳曰含在家中時有白雀集堂宇此德行幽感所致豫章舊志曰太守孔笁臨郡三月白雀出南昌太守夏侯嵩臨郡六年白雀見黃雀禮稽命徵曰祭五嶽四瀆得其宜則黃雀見黃雀土精春秋考異郵曰黃帝將起有黃雀赤頭占曰黃者土精赤者火榮雀者賞萌余當立古詩曰桂樹華不實黃雀巢其顛說苑曰吳王欲伐荊有諫者死舍人少孺子欲諫不敢即懷操彈於後園露沾其衣如是三旦王曰子何來沾衣如此對曰園中有樹其上有蟬蟬高居悲鳴飲露不知螳蜋在其後螳蜋委身曲附欲取蟬而不知黃雀在其旁黃雀延頸欲啄螳蜋不知彈丸在其下臣挾彈欲取黃雀不知露霑衣如此皆務欲得於前不顧於後患吳王乃罷漢武故事曰拜孫卿為郎持節候神自大室至於東萊云見一人長五丈自稱巨公牽黃犬持黃雀欲謁天子因忽不見續齊諧記曰弘農楊寶字文淵後漢名士也年九歲時至華陰北見一黃雀為鵄梟所搏墜于樹下為螻蟻所困寶見之愍然命左右取之歸致巾箱中養之唯食黃花百餘日毛羽成朝去暮還後忽與群雀俱來哀鳴繞堂數日乃去及夕三更寶讀書未臥有黃衣童子向寶拜曰我王母使臣昔使蓬萊不慎為鵄梟所搏君仁愛極救實成德濟今當受使南海不得奉侍極以悲傷以白環四枚與寶曰令君子孫潔白且位登三事當如此環矣於此遂絶寶生震震生秉秉生賜賜生彪四世名公為東京盛族袁山松後漢書曰陳弇字叔明陳留人學尚書躬自耕種常有黃雀飛來隨弇翱翔風俗記曰六月東南長風俗名黃雀風時海魚化為黃雀因以為名異苑曰永康王曠家井上有一浣衣石時時見有赤氣後有二胡人寄居忽求買石未及受錢曠子婦孫氏覩二黃雀鬭於石上疾往取之變成黃金蕭廣濟孝子傳曰王祥後母病欲得黃雀炙祥思念卒難致須臾忽有數十黃雀飛入其幕臨海異物志曰黃雀魚常以八月化為黃雀到十月入海為魚廣志曰黃雀體純脂江夏竟陵常獻給大官青雀禮記曲禮曰前有水則載青旌鄭玄注載舉於旌首以驚衆青雀水鳥也劉禎詩曰翩翩野青雀栖竄茨棘蕃朝拾平田粒夕飲曲池泉猥出蔚萊中乃至丹丘邊司馬彪與山巨源詩曰翩翩野青雀受性孤且微昔生三河側鼓翼帝王畿麋元詩曰青雀西飛別鵠東翔大雀廣志曰安息大雀鴈身蹄似橐駝色蒼舉頭高八九尺張翅丈餘卵如甕東觀漢記曰永祚元年安息王獻條枝大雀曹大家集兄超為西域都護獻大雀詔大家作頌
