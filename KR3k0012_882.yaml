body:
  text: 神鬼部一神上易曰陰陽不測之謂神神者變化之極妙萬物而為言不可以形詰者也又曰知變化之道者其知神之所為乎夫變化之道不為而自然故知變化者則知神之所為唯神也故不疾而速不行而至毛詩嵩高曰維嶽降神生甫及申禮記孔子間居曰清明在躬氣志如神又中庸曰鬼神之為德也其盛矣乎視之而弗見聽之而弗聞體物而不可遺體猶生也可猶所也不有所遺言萬物無不以鬼神之氣生也使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右詩曰神之格思不可度思矧可射思格來也蚓況也射厭也言神之來其形象不可億度況可厭倦乎又祭法曰山林川谷丘陵能出雲為風雨見怪物皆曰神又祭義宰我曰吾聞鬼神之名不知其所謂子曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也衆生必死死必歸土此之謂鬼骨肉斃于下陰為野土其氣發揚于上為昭明焄蒿悽愴此百物之精也神之著也因物之精制為之極明命鬼神以為黔首則百衆以畏萬民以服又樂記曰明則有禮樂幽則有鬼神聖人之精氣謂之神賢智之精氣謂之鬼左傳曰莊公有神降于莘有神聲以接人莘號地惠王問諸內史過曰是何故也對曰國之將興明神降之監其德也將亡神又降之觀其惡也故有得神以興亦有以亡虞夏商周皆有之王曰若之何對曰以其物享焉其至之日亦其物也三從之內史過往聞虢請命反曰虢必亡矣虐於民而聽於神神居莘虢公使祝應宗區史嚚亨焉神賜之土田史嚚曰虢其亡乎吾聞之國將興聽於民將亡聽於神神聰明正直而一者也依人而行虢多涼德其何土之能得涼薄也為僖二年晉滅下陽傳又宣上曰昔夏之方有德也遠方圖物圖畫山川奇異之物獻之貢金九牧鑄鼎象物象所圖物著之於鼎百物為之備使民知神姦圖鬼神百物之形使民逆備之故民入川澤山林不逢不若若順也螭魅罔兩螭山神獸形魅怪物罔兩水神莫能逢之又昭元曰晉侯有疾鄭伯使公孫僑如晉聘且問疾叔向問焉曰寡君之疾病卜人曰實沈臺駘為祟敢問此何神也子産曰昔高辛氏有二子長曰閼伯季曰實沈居于曠林不相能也日尋干戈以相征討后帝不臧遷閼伯于商丘主辰遷實沈于大身主參由是觀之則實沈參神也昔金天氏有裔子曰昧為玄冥師生允格臺駘臺駘能業其官宣汾洮障大澤以處大原帝用嘉之封諸汾川由是觀之則臺駘汾神也又昭三曰石言于晉魏榆魏榆晉也晉侯問於師曠曰石何故言對曰石不能言神或馮焉謂有精神馮依石而言不然民聽濫也抑臣又聞之曰作事不時怨讟動於民則有非言之物而言今宮室崇侈民力凋盡怨讟並作莫保其性石言不亦宜乎論語曰子不語怪力亂神神謂鬼神之事又曰子路問事鬼神子曰未能事人焉能事鬼鬼神難明語之無益故不答家語曰不食者不死而神國語曰虢公夢在廟有神人面白色虎瓜執鉞立於西阿之下公懼而走神曰無走帝命曰使晉襲于爾門公拜稽首覺召史嚚占之對曰如君之言則蓐收也天之刑神也天事官成公使囚之且使國人賀夢舟之僑告其族曰衆謂虢不久吾乃今知之又曰有神降於莘王問內史過曰是何故對曰昔夏之興祝融降於崇山其亡也回祿信於聆隧商之興也檮杌次於丕山其亡也夷羊在牧周之興也鸑鷟鳴於歧山其衰也杜伯射王於鄗宣王殺杜伯不辜後宣王田于囿中杜伯起於道左衣朱冠操朱弓矢射宣王中心拆脊而死今則丹朱之神也虢其亡也賈逵注曰祝融回掾火之神也檮杌鯀也丹朱堯子又曰長勺之役曹劌問所以戰於莊公公曰余不愛衣食於民不愛牲玉於神對曰夫惠本而後民歸之志民和而後神降之福今將惠以小賜祀以獨恭小賜不咸民弗歸也獨恭不優神弗福也又曰夏之衰也褒人之神降化為二龍以同于王庭而言曰余褒之二君也夏后卜殺之與去之與止之莫吉卜請其漦而藏之吉乃布幣焉而策告之龍亡其漦在櫝而藏之又曰古者民神不雜謂司民司神之官各異民之精爽不攜二者而又能齊肅衷正其智能上下比義其聖能光遠宣朗其明能光照之其聰能聽徹之如是則明神降之在男曰覡在女曰巫河圖曰東方蒼帝神名靈威仰精為青龍南方赤帝神名赤熛怒精為朱鳥中央黃帝神名含樞紐其精為麟西方白帝神名白招矩精為白虎北方黑帝神名叶光紀精為玄武龍魚河圖曰天歲星主德慶其精下為大社之神天太白星主兵凶其精下為雨師之神天熒惑星主司非其精下為風伯之神天辰星之氣司災其精下為先農之神天鎮星主得士之慶其精下為靈星之神又曰東方太山君神姓圓名常龍南方衡山君神姓丹名靈峙西方華山君神姓浩名鬱狩北方恆山君神姓登名僧中央嵩山君神姓壽名逸群呼之令人不病東方太山將軍姓唐名臣南方霍山將軍姓朱名丹西嶽華陰將軍姓鄒名尚北嶽恆山將軍姓莫名惠中嶽嵩高山將軍姓石名玄恆存之卻百邪東海君姓馮名修青夫人姓朱名隱娥南海君姓視名赤夫人姓翳名逸寥西海君姓勾大名丘百夫人姓靈名素簡北海君姓是名禹帳里夫人姓結名連翹河伯公名子夫人姓馮名夷君有四海河神名並可請之呼之卻鬼氣又曰髮神名壽長耳神名嬌女目神名珠殃鼻神名勇盧齒神名丹朱夜臥三呼之有患亦便呼之九過惡鬼自卻史記曰趙襄子為智伯所敗走棄晉陽原過從後至於王澤見三神人自帶以上可見自帶以下不可見與原過竹二節莫通曰為我以是遺趙無恤原過既至以告襄子襄子齊三日親自剖竹有朱書曰趙無恤余霍太山之陽侯天使也三月丙戊余將使汝反滅智氏汝亦立我百邑余將賜汝林胡之地襄子再拜受如三神之令果以丙戍滅智氏又曰始皇夢與海神戰如人狀問占夢博士曰水神不可見以大魚鮫龍為候今上禱祠謹而有此惡神當除去而善神可致又曰始皇西南渡淮水之衡山南郡浮江至湘山神逢大風幾不得渡上問博士曰湘君何神博士對曰聞堯女舜之妻也而葬此於是始皇大怒使刑徒三千人伐湘山樹赭其山漢書曰高祖夜徑澤中有大蛇當徑乃前拔劍斬蛇後人來至蛇所見一老嫗夜哭人問何哭嫗曰人殺吾子人曰嫗子何為見殺曰吾子白帝子也化為蛇當道今赤帝子斬之因忽不見又曰張良嘗遊下邳圯上有老父至良所直墮其履道下謂良曰孺子下取履良因取之父笑而去良殊大驚父去里餘復還曰孺子可教矣後五日平明與我會良怪之跪曰諾五日平明往父已先在怒曰與老人期後何也後五日復會早來良半夜往有頃父亦來喜曰當如是出一編書曰讀此當為王者師矣後十三年孺子見我濟北穀城下黃石即我矣視其書即太公兵法也又郊祀志曰秦文公九年獲若石云于陳蒼北阪城祠其神或歲不至或歲數來來常以夜輝若流星從東方來集于祠城若雄雉其聲殷殷云野雞夜鳴又曰始皇遊海上行禮祠名山大川及八神將自古而有之或曰太公以來作之八神一曰天主二曰地主三曰兵主四曰陰主五曰陽主六曰日主七曰月主八曰四時主又曰武帝初即位尤敬鬼神之祀上求神君舍之上林中磃氏館音蹄神君者長陵女子以乳死見神於先後宛若産乳而死也兄弟妻相謂先後宛若祠之其室平原君亦往祠之其後子孫以尊顯平原君武帝外祖冉又曰毫人繆忌奏曰天神貴者太一大一佐曰五帝謂青帝靈威仰赤帝赤熛黃帝含樞紐白招矩黑帝叶光紀也又曰遊水發根言上郡有巫病鬼而下之上召置之甘泉及病使人問神君神君言曰天子無憂病病少愈強與我會甘泉於是上病愈遂起幸甘泉病良已大赦置壽宮神君神君最貴者曰太一其佐曰大禁司命之屬皆從之非可得見聞其言言與人音時去時來則風肅然居室帷中時晝言然常以夜天子祓然後入因巫為主人關飲食所欲言行下又置壽官北官張羽旗設共具以禮神君所言上使受書其名曰盡法其所言世俗之所知也無絶殊者而天子心獨喜其事祕世莫知也又曰公孫卿言見神人東萊山若云欲見天子天子於是幸緱氏城拜卿為中大夫遂至東萊宿留之數日無所見見大人迹云又曰祠神人於交門宮若有鄉坐拜者師古曰如有神景象嚮祠坐而拜也或言益州有金馬碧雞之神可醮祭而致於是遣諫大夫王褒使持節而求之又曰谷永説成帝曰昔周史萇弘欲以鬼神之術輔導靈王會朝諸侯而周愈微諸侯叛楚懷王隆祭祀事鬼神欲以獲福助卻秦師而兵挫地削身辱國危秦始皇并天下甘心於神仙之道遣徐福韓終之屬多齎童男童女入海求神采藥因逃不還天下怨恨漢書曰文帝思賈誼徵之至入見上方受釐坐宣室上因感鬼神事而問鬼神之本誼具道所以然之故至夜半文帝前席後漢書曰光武渡呼沱河至下博城西遑惑不知所之有白衣老父在道傍指曰努力信都郡為長安守光武即馳赴之又曰何敞祖父比干字少卿經明行修為汝陰縣獄吏決曹掾平活數千人淮汝號曰何公征和三年三月天大陰而比干在家日中夢見貴客車騎滿門覺以語妻語未竟而門有老嫗八十餘頭白求寄避雨雨甚而衣履不霑漬雨止遂謂比干曰公有陰德今天錫君策以廣公之子孫因出懷中符策狀如簡長九寸凡九百九十枚以授比干曰子孫佩印綬者如此算比干幹年五十八有六男又生三子本始元年自汝陰徙平陵代為名族又曰宣帝時陰子方者至孝有仁恩嘗臘日晨炊見竈神形見雜五行書曰竈神長衣黃衣夜被髮從灶中出知其名呼之而可除凶惡子方再拜受慶家有黃羊因以祀之自是已後暴至巨富田有七百餘頃輿馬僕隸比於邦君子方常言我子孫必將強大至孫識三世而遂繁昌故後常以臘日祀竈而薦黃羊焉又曰班超至于置王廣德禮意甚踈且其俗信巫巫言神怒何故欲向漢漢使有顒馬急求取以祠我廣乃遣使就超請馬超密知其狀報許之而令巫自來取馬有頃巫至超斬其首以送廣德吳志曰臨海羅陽縣有神自稱王表語言飲食與人無異然不見其形又一婢名績紡遣中書郎李崇齎輔國將軍羅陽王印綬迎表表隨崇俱出所歷山川輒遣婢與其神相聞表至權於倉龍門外為立第舍表説水旱小事往往有驗何法盛晉中興書曰王猛北海人少貧賤嘗至洛陽貨畚有一人於市買其畚而云無直家近在此可隨我取利猛隨去行不覺遠而忽至深山中此人語猛且住樹下當先啓道君來須臾猛進見一公踞床頭鬚悉白侍從十許人有一人引猛云大司馬公可進猛因拜老公公曰王公何緣拜即十倍償畚直遣人送猛出既顧視乃嵩山也晉書曰符堅入寇會稽王道子以威儀鼓吹求於鍾山之神奉以相國之號及堅至壽春望八公山草木皆類人形若有力焉後魏書曰初聖武皇帝嘗率數萬騎田於山澤歘見輜軿自天而下既至見美人侍衛甚盛帝異而問之對曰我天帝女受命相偶遂同寢宿且請還曰明年周時復會此言終而別去如風雨及周歲前所由處果復相見天女以所生男授帝曰此君之子也善養視之子孫相承當世為帝語訖而去子即世祖也又曰假暉師事歐陽湯湯甚器愛之有童子與暉同志後二年童子辭歸從暉請馬暉戲作木馬與之童子甚悅謝暉曰吾太山府君子奉勑遊學今將欲歸煩子厚贈無以報德子後位至常伯封侯非報也且以為好言終乘木馬騰空而去暉乃自知必將貴也
