body:
  text: 服用部十八手巾漢名臣奏曰王莽斥出王閎太后憐之閎伏泣失聲太后親自以手巾拭閎泣英雄記曰在尊者前宜各具一手巾不宜借人巾用江表傳曰孫權剋荊州將吏悉皆歸附而潘濬涕泣交橫慰勞與語使親近手巾拭其面東宮舊事曰太子納妃有百濟白手巾也廣志曰炎州以火浣布為手巾博物志曰魏文帝善彈碁能用手巾角竹林七賢論曰王戎雖為三司率爾私行巡省園田不從一人以手巾插腰戎故吏多大官相逢輒下道避之名山略記曰鬱州道祭酒徐誕常以治席為事有吳人姓夏侯來師誕忽暴病死終冬涉春有長沙門從北來於道中見夏侯云被崑崙召不得辭師寄手巾為信誕得手巾乃本所送入棺者志怪曰會稽人吳詳見一女子溪邊洗腳呼詳共宿明旦別去女贈詳以紫巾詳荅以白布手巾神仙服食經曰伏苓如拳者著手巾中百鬼消滅秦嘉婦與嘉書曰今奉越布手巾二枚絮巾漢書儀曰皇后親蚕絲絮織室作祭服皇后得以作絮巾魏略曰趙歧避難至北海著絮巾市賣餅鄴中記曰石虎皇后出以女騎一千為鹵簿冬月皆絮綸巾博物志曰蜀人以絮巾為帽絮
