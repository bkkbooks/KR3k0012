body:
  text: 飲食部二十五茗爾雅曰檟苦茶矮小似梔子冬至生葉可煮作羹飯今早采者為茶晚采者為茗一名茆蜀人名為苦茶吳志曰孫皓每宴席無不能酒率以七升為限雖不悉入口澆灌取盡韋曜飲酒不過二升初見禮異密賜茶茗以當酒晉中興書曰陸納為吳興太守時衛將軍謝安嘗欲詣納納兄子俶怪納無所備不敢問之乃私蓄十數人饌安既至納所設唯茶果而已俶遂陳盛饌珍羞必具及安去納杖俶四十云汝既不能光益叔父奈何穢吾素業晉書曰夏侯愷亡後形見就家人求茶又曰桓溫為楊州牧性儉素每宴唯下漆萯撲茶果而已宋録曰新安王子鸞豫章王子尚詣曇濟道人於八公山道人設茶茗尚味之曰此甘露也何言茶茗焉南齊書曰武帝遺詁靈坐勿以牲為祭唯設餅果茶飯酒脯而已唐史曰風俗貴茶之名品益衆劍南有蒙頂石花或散牙號為第一湖州顧渚之紫笋東川有神泉昌明硤州有碧澗明月房茱萸寮福州有方山之生牙夔州有香山江陵有南木湖南有衡山嶽州有灉湖之舍膏常州有義興之紫笋婺州有東白睦州有鳩坑洪州有西山之白露壽州有霍山之黃芽蘄門之商貨不在焉又曰竟陵僧有於水濱得嬰兒者育為弟子稍長自筮遇蹇之漸繇曰鴻漸于陸羽可用為儀乃姓陸氏字鴻漸名羽羽有文學多意思恥一物不盡其妙茶術最著鞏縣為瓷偶人號陸鴻漸買十器得一鴻漸市人沽茗不利輒灌之羽於江湖稱竟陵人於南越稱桑苧翁貞元末卒又曰韓滉聞奉天之難以采練囊緘茶末健步其以進也又曰貞元九年春初稅茶先是諸道鹽鐵使張滂奏曰伏以去秋水災詔令減稅今之國用須有供備伏請出茶州縣及茶山外商人要略委所由定二等時估每十稅一價錢充所放兩稅其明年已後所得稅外收貯若諸州遭水旱賦稅不辨以此代之詔曰可仍委張滂具處置條奏自是每歲得錢四十萬貫茶之有稅自此始也然稅茶無虛歲遭水旱處未嘗以茶稅錢拯贍又曰大和七年正月吳蜀貢新茶皆於冬中作法為之上務恭儉不欲逆其物性詔所貢新茶宜於立春後造又曰大和九年十月王涯獻茶以涯為榷茶使茶之有稅自涯始又曰大和九年十二月諸道鹽鐵轉運榷茶使令狐楚奏榷茶不便於民請停從之又曰元和十四年歸光州茶園於百姓從刺史房克讓之請又曰初常魯使西蕃烹茶帳中蕃人問曰何為者魯曰滌煩療濁所謂茶也蕃人曰我此亦有命取以出指曰此壽州者此顧渚者此蘄門者晏子春秋曰嬰相齊景公時食脫粟之飯炙三弋五卯茗菜而已廣雅曰荊巴間采茶作餅成以米膏出之若飲先炙令色赤搗末置瓷器中以湯澆覆之用蔥薑芼之其飲醒酒令人不眠博物志曰飲真茶令少眠睡神農食經曰茶茗宜久服令人有力悅志又曰茗苦茶味甘苦微寒無毒主瘻瘡利小便少睡去痰渴消宿食冬生益州川谷山陵道傍凌冬不死三月二日採乾華他食論曰苦茶久食益意思壺居士食志曰苦茶久食羽化與韭同食令人身重陶弘景新録曰茗茶輕身換骨丹丘子黃山君服之王浮神異記曰餘姚人虞洪入山采茗遇一道士牽三青牛引洪至瀑布山曰吾丹丘子也聞子善具飯常思見惠山中有大茗可以相給祈子他日有甌蟻之餘不相遺也因立奠祀後令家人入山獲大茗焉廣陵耆老傳曰晉元帝時有老姥每旦擎一器茗往市鬻之市人競買自旦至暮其器不減茗所得錢散路傍孤貧乞人人或異之執而繫之於獄夜擎所賣茗器自牖飛去廣志曰茶叢生直煮飲為茗茶茱萸檄子之屬膏煎之或以茱萸煮脯冒汁為之曰茶有赤色者亦米和膏煎曰無酒茶晉書藝術傳曰燉煌人單道開不畏寒暑常服小石子所服者有桂花心氣兼服茶酥而已續搜神記曰晉孝武世宣城人秦精入武昌山中採茗忽見一人身長一丈通體毛精見之大怖自謂必死毛人牽其臂將至山中大叢茗處放之便去精因留採須臾復來乃採懷中橘與精精甚怖負茗而歸又曰桓宣武有一督將因時行病後虛熱更能飲復茗必一斛二斗乃飽裁減升合便以為大不足非復一日家貧後有客造之正遇其飲復茗亦先聞世有此病仍令更進五升乃大吐有一物出如升大有口形質縮皺狀似牛肚客乃令置之於盆中以一斛二斗復茗澆之此物吸之都盡而止覺小腹又增五升便悉混然從口中涌出既吐此物病遂差苦問之此何病答云此病名斛茗瘕異苑曰剡縣陳矜妻少寡與二子同居好飲茶家有古冢每飲輒先祠之二子欲掘之母止之夜夢人云吾止此冢三百餘年今二子恆欲見毀賴相保護又享吾佳茗雖潛朽壞豈忘翳桑之報及曉於庭中獲錢十萬似久埋者唯貫新母告二子禱祠愈切世説曰任瞻少時有令名自過江失志既不飲茗問人云此為茶為茗覺人有怪色乃自申明之曰向問飲為熱為冷又曰晉司徒長史王濛好飲茶人至輒命飲之士大夫皆患之每欲往候必云今日有水厄江氏傳曰統遷愍懷太子洗馬嘗上疏諫云今西園賣醯麵茶菜藍子之屬虧敗國體晉四王起事曰惠帝蒙塵洛陽黃門以瓦盂盛茶上至尊晉劉琨與兄子南兗州刺史演書曰前得安州乾茶二斤薑一斤桂一斤皆所須也吾體中煩悶怕假負茶汝可信信致之傳咸司隸教曰聞南方有蜀嫗作茶粥賣廉事歐其器具無為又賣餅於市而禁茶粥以囷蜀姥何哉坤元録曰辰州漵浦縣山上多茶樹括地圖曰臨城縣東北一百四十里有茶山茶溪天台記曰丹丘出大茗服之生羽翼夷陵圖經曰黃木女觀望州等山茶茗出焉楊衒之洛陽伽藍記曰彭城王協戲謂王肅曰卿不重齊魯大邦而愛邾莒小國肅對曰鄉曲所美不得不好協復謂曰卿明日顧我為卿設邾莒之餐亦有酪奴因此復號茗取飲為酪奴時給事中劉縞慕肅之風專習茗飲彭城王謂縞曰卿不慕王侯八珍如好蒼頭水厄海上有逐臭之夫里內有學嚬之婦以卿言之是也其彭城王家有吳嫗以此言戲之自是朝貴宴會雖設茗飲皆恥不復食雖江表殘民遠來降者侍中元叉欲為之設茗先問卿於水厄多少蕭正德不曉人意答下官雖生水鄉立身已來不遭陽侯之難舉坐笑焉桐君録曰西陽武昌晉陵皆出好茗巴東別有真香茗煎飲令人不眠又曰茶花狀如梔子其色稍白永嘉圖經曰縣東有白茶山吳興記曰烏程縣西有溫山出御茆淮陰圖經曰山陽縣南二十里有茶坡茶陵縣圖經曰茶陵者謂陵谷生茶茗本草拾遺曰皋盧茗作飲止渴除疫不睡利水道明目生南海諸山中南人極重之廣州記曰酉平縣出皋盧茗之利茗葉大而澀南人以為飲南越志曰茗苦澀亦謂之過羅陸羽茶經曰茶者南方嘉木自尺二尺至數十尺其巴川峽山有兩合抱者伐而掇之其樹如瓜蘆葉如梔子花如白薔薇實如栟櫚蒂如丁香根如胡桃其名一曰茶二曰檟三曰蔎四曰茗五曰荈周公云檟苦茶楊執戟云蜀西南人謂茶曰蔎郭弘農云早取為茶晚取為茗一曰荈蔎音設荈音昌兗切其上者生爛石中者生櫟壤下者生黃土凡藝而不茂法如種苽三歲可採陽岸陰林紫者上緑者次笋者上牙者次葉卷者上葉舒者次凡採茶在二月三月四月之間茶之笋者生爛石沃土長四五寸若薇蕨始抽陵露采為茶之牙發於藂薄之上有三枝四枝五枝者選中枝頴枝者采焉其日雨不採晴有雲不採蒸拍焙穿封乾矣有千類萬狀鹵莽而言之如胡人鞾者蹙縮然犎牛臆者廉憺然浮雲出山者輪囷然輕颷拂水者涵淡然有如陶家之子羅膏土以水澄泚之又如新治田者過暴雨流潦之經此皆茶之精腴也有如竹籜者枝幹堅實難於蒸搗故其形籭篩上音離下音帥如霜荷者莖葉凋趄易其狀白故其萎萃然此皆茶之塉老也自采至于封曰七經自胡人至于霜荷八等唐新語曰右補闕母景博學有著述才性不飲茶著代茶飲序其略曰釋滯消擁一日之利暫佳瘠氣侵精終身之纍斯大獲益則歸功茶力貽患則不謂茶災豈非福近易知福遠難見者乎雲南記曰名山縣出茶有山曰蒙山聯延數十里在縣西南按拾道志尚書所謂蔡蒙旅平者蒙山也在雅州凡蜀茶盡出此魏王花木志曰茶葉似梔子可煮為飲其老葉謂之茆細葉謂之茗杜育荈賦曰調神和內倦懈康除張孟陽登成都樓詩云芳茶冠六清溢味播九區人生茍安樂茲土聊可娛左思嬌女詩曰吾家有好女皎皎常白晳小字為紈素口齒自清歷其始字蕙芳眉目粲如畫馳鶩翔園林草木皆生摘貪走風雨中條忽數百適心為茶荈劇吹噓對鼎䥶孫楚出歌曰茱萸出芳樹顛鯉魚出洛水泉白鹽出河東美鼓出魯川薑桂茶荈出巴蜀椒橘木蘭出高山蓼蘇出溝渠秕稗出中田
