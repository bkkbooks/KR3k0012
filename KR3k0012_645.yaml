body:
  text: 刑法部十械易蒙卦曰利用刑人用說桎梏又噬嗑曰初九屨校滅趾無咎校者以木絞者也即械也校者取其通名也傳曰卻犨與長魚矯爭田執而梏之梏械也與其父母妻子同一轅繫之車轅又曰宋華弱樂轡少相狎長相優又相謗也優調戲也子蕩怒以弓梏華弱于朝子蕩樂轡也張弓以貫其頸若械之在手故曰梏平公見之曰司武而梏於朝難以勝矣司武司馬也言其懦弱不足以勝敵也說文曰梏手械所以告天桎足械所以質地也史記曰桓公乃徉為召管仲欲甘心焉實欲用之鮑叔牙迎受管仲及堂阜而脫之桎梏漢書曰有罪當盜械者皆頌繫應劭曰智略令各有當盜但頌繫者言見寬容但處曹吏舍不入堅牢盜著也恐亡故著械不謂盜竊乃械也謝沈後漢書曰赤眉入長安時式侯恭以弟盆子為赤眉所尊故自繫赤眉至更始奔走式侯從獄中參械出街中具獄門中魏略曰賈逵為丞相主簿王欲征吳逵諫之王怒付獄獄吏以逵主簿不即著械逵曰促我械王且疑我在近職求緩於卿將遣來察著械適訖而果遣視之江表記曰孫策得太史慈即勑破械使沐浴賜衣巾并設酒食魏志曰田豫為汝南太守先是郡人侯音反前太守收其黨五百餘人皆當死豫悉見慰喻破械遣之諸囚叩頭願效即相報語群賊解散吳志曰陳表傾意待士皆樂為用命時有盜官物者疑無難士施明明壯悍收考極毒雖死不伏廷尉以聞權以表使自以意求其情實表便破械沐浴易其衣服厚設酒食欲以誘之明乃首服晉書曰范廣為堂邑令丞劉榮坐事當死郡以付縣榮即縣人家有老母至節廣輒暫還榮亦如期而返縣堂為野火所及榮脫械救火事畢還自著械又曰并州剌史司馬騰執諸胡於山東賣充軍實將詣冀州兩胡一枷石勒亦在中又載記曰符丕敗徐義為慕容永所獲械埋其足將殺之義誦觀世音經至夜土開械脫出於重禁之中若有人脫之者遂奔後魏書曰孝文太和初時法官及州郡縣多為重枷復以縋石懸於囚頸傷肉至骨勒以誣服吏以為能帝聞而傷之乃制非大逆有明證而不疑辭者不得大枷又曰宋翻為河南令縣舊有大枷時人號曰彆方結切尾青及翻為縣主吏請焚之翻曰且置南墻下以待豪猾未幾有內監楊小駒詣縣請事辭色不遜翻命取青尾以鎮之小駒既免入訴於宣武宣武大怒勑河南尹推之翻具自陳伏詔曰卿固違朝法豈不欲作威以買名翻對曰造具亦非臣所以留者非敢施於百姓欲待凶暴之徒如駒者耳由是威振京師三國典略曰東魏中尉宋遊道限外受故選狀詞渤海王怒而禁之獄掾欲為之脫枷遊道不肯曰此王命所著不可輒脫王聞而宥之北齊書曰庫狄遷封武章郡王其子士文為貝州剌史性孤直其子啖官廚餅枷於獄纍日杖之二百步送還京蕭子顯齊書曰戴僧靜會稽永興人也少有膽力便弓馬於都載錦為歐陽式所得繫兗州獄太祖遣薛淵餉僧靜酒食以刀子置魚腸中僧靜與吏飲醉以刀刻械手自折鎖發屋而出歸太祖後周書曰柳慶為雍州別駕廣陵王元欣魏之懿親其甥孟氏屢為凶橫或有告其盜牛慶捕推得實趣令就禁孟氏殊無懼容乃謂慶曰今若加以桎梏後復何以脫之欣亦遣使辨其無罪孟氏由此益驕慶於是大集僚吏盛言孟氏依倚權戚侵虐之狀言畢便令笞殺之此後貴戚斂手不敢侵暴唐書曰酷吏來俊臣所作大枷凡有十號一曰定百脈二曰喘不得三曰突地吼四曰著即臣五曰失魂膽六曰實同反七曰反是實八曰死豬愁九曰求即死十曰求破家又令寢處糞穢備諸苦毒自非身死終不得出山海經曰二負之臣曰危與二負煞窫窳帝乃梏之疏屬之山桎其右足桎械也反縛兩手與髮繫之山上郭璞注曰漢宣帝使人作上郡發盤石石室得一人徒役被髮反縛械一足以問群臣莫能知劉子政案此對之帝大驚於是時人爭學山海經也又曰大荒之中有宋山者有木生山上名楓木蚩尤所棄桎梏蚩尤黃帝所得械之煞已擲棄其械化而為樹也異苑曰新野庾紹之少子道遐與南陽宋協中表之親桓玄時庾為湘東太守病亡協以義熙中晨起服茱萸酒一小兒通云庾湘東須臾便至兩腳著械脫之而坐孟子曰盡其道而死者正命也桎梏死者非正命也呂氏春秋曰齊有善相狗者其鄰畜之數年不取鼠以告相者相者曰此良狗也志在麞豕鹿不在鼠也欲其鼠則桎之其鄰桎其後足則狗取鼠矣賈誼書曰紂作梏數千睨諸侯之不諂己者而桎梏之文王桎梏囚于羑里七年而後得免及武王剋殷既定令殷之民連梏而流之於河民輸梏者以手撤之弗敢敗之跪入之水不敢投也昔者文王擁此故思愛文王猶敬其梏況其法教乎風俗通曰延嘉中京師長者皆著木屐婦人始嫁至作漆畫五采為系謹案黨事始發傳詣黃門北寺臨時惶恐不能信天任命多有逃亡不就栲者九族拘繫及所過歷長少婦女皆被桎梏應木屐之像矣又曰械戒也所以警戒使為善也桎實也言其下垂至地然後吐情首實語林曰嵇中散夜彈琴忽有一鬼著械來歎其手快曰君一絃不調中散與琴調之聲更清婉問姓名不對疑是蔡伯喈伯喈將亡亦被桎梏拲周禮秋官上曰掌囚掌守盜賊凡囚上罪梏拲而桎王之同族拲有爵者桎以待弊罪拲者兩手共入一木王同性及命上已上雖有上罪或拲或桎而已弊猶斷也晉令曰死罪二械加拲手趙書曰後石率精騎五千襲邵續一戰生禽續於青丘鉗頸拲手於襄國青陽城門頓頭稱囚鎖說文曰銀鐺鎖也漢書食貨志曰王莽為貨有誹詛者郡國檻車鐵鎖傳送長安鍾官又王莽傳曰民犯錢伍人相坐沒官為奴婢其檻車兒女步以鐵鎖銀鎖其頸傳至鍾官奴以千萬數華嶠後漢書曰崔鈞為西河太守與袁紹起兵董卓收鈞父烈下之郿獄銀鐺卓誅烈得歸長安也王隱晉書曰石勒鎖敬晞頸以為司馬而反煞之南史曰丹徒縣令沈巑之以清廉抵罪巑之吳興武康人性踈直在縣自以清廉不事左右浸潤日至遂鎖繫尚方歎曰一見天子足矣上召問曰復欲何陳答臣坐清所以獲罪上曰清復何以獲罪曰無以承奉要人上曰要人為誰巑之以手扶四面指曰此赤衣諸賢皆是若臣得更鳴必令清譽日至巑之雖危言上亦不責後知其無罪重除丹徒令又曰禇玠除山陰令縣人張次的王休達等與諸猾吏賄賂通姦全丁戶類多隱沒玠鎖次的等具狀啓臺宣帝手勑慰勞并遣使助玠搜括所出軍人八百餘戶三國典略曰梁湘東王以鮑泉圍湘州久不陷使平南將軍王僧辨代為都督數泉十罪舍人羅重歡帥三百與僧辨俱發先令通泉曰羅舍人被令送王竟陵來泉愕然顧左右曰得王竟陵助我賊不足平俄而重歡先入僧辨繼之泉方拂席而坐僧辨曰鮑郎卿有罪令旨令我鎖卿勿以故意相待羅重歡宣令即鎖之於床側泉舉止自若謂重歡曰稽緩王師甘受其罪但恐後人更思鮑泉之憤耳僧辨意甚不平泉乃為啓自申并謝淹遲之罪湘東怒解遂釋之宋躬孝子傳曰繆斐字文雅東海蘭陵人父忽得患醫藥不給斐晝夜叩頭不寢不食氣息將盡至三更中忽有二神引鎖而至求哀曰尊府君昔經見侵故有怒報君至孝所感昨為天曹所攝鎖銀鐺斐驚視父已差父云吾病恆見二人見持向來忽不見斐乃具說父曰吾曾過五子胥廟引二神像置地當此是也劉欣期交州記曰居風山去郡四里夷人從太守裴庠求市此山云出金既不許尋有一嫗行田見金牛出食斫得鼻鎖長丈餘人後往往見牛夜出其色光耀數十里鉗說文曰鉗鐵有所劫束也脛鉗也音遞史記曰衛青平陽人其父為吏與給事平陽侯家妾通生青為侯家人少時歸其父使牧羊先母之子皆奴畜之不以為兄弟青嘗至衆居室有一鉗徒相青曰貴人也官至封侯青歎曰人奴得無笞罵即足矣安得封侯晉令曰徒著鉗者刑竟録輸所送獄官晉律曰鉗重二斤翹長一尺五寸
