body:
  text: 人事部四十七敘交友釋名曰友有也相保有也說文曰友愛也同志為友周易曰君子上交不諂下交不黷又曰朋從爾思又曰君子以朋友講習又曰西南得朋東北喪朋又曰二人同心其利斷金同心之言其臭如蘭又曰上下交而其志同由此觀之交乃人倫之本務王道之大義非特士友之私志也又曰出門同人又曰君子定其交而後求又曰嗟爾朋友又曰朋來無咎毛詩曰伐木宴朋友故舊也自天子至于庶人未有不須友以成者也親親以睦友賢不棄則民德歸厚矣伐木丁丁鳥鳴嚶嚶嚶其鳴矣求其友聲又曰雖有兄弟不如友生又曰朋友攸攝攝以威儀攝助也又曰既見君子我心則喜又曰豈無他人唯子之好又曰言念君子溫其如玉又曰未見君子憂心忡忡禮記曰君子不盡人之歡不竭人之忠以全交又曰君子之交淡如水小人之交甘如醴君子淡以成小人甘以壞又曰儒有合志同方營道同術相下不厭久不相見聞流言不信義同而進不同而退其交友有如此者同方同術志行也門流言不信不信其友所行被毀而謗之又曰隨武子利其君子忘其身忘其身不遺其友又曰父母在不許友以死又曰寡婦之子不有見焉弗與為友又曰見父之執友不謂之進不敢進又曰子夏曰吾離群而索居亦已久矣又曰僚友稱其弟也執友稱其仁也交遊稱其信也周禮曰司諫紏萬民之德而勸之朋友又曰孝友任恤注任信於友道恤憂患也論語曰益者三友損者三友友直友諒友多聞益矣友便僻友便佞友善柔損矣便僻巧譬俞也善柔誇毗也便佞辨以為佞也又曰晏平仲善與人交久而敬之又衛靈公曰居是邦也事其大夫之賢者友其士之仁者又曰子貢問友子曰忠告而善道之不可則止無自辱焉忠言以告之不從則止之又曰君子以文會友以友輔仁又曰故舊無大故則不棄又曰子夏之門人問交於子張子張曰子夏云何曰可者與之其不可者拒之子張曰君子尊賢而容衆嘉善而矜不能我之大賢與於人何所不容我之不賢與人將拒我如之何其拒人也又曰朋友交言而有信雖曰未學吾必謂之學矣又曰有朋自遠方來不亦樂乎又曰老者安之朋友信之又曰子路曰願車馬衣輕裘與朋友共弊之而無憾又曰事君數斯辱矣朋友數斯踈矣又曰無友不如己者又曰朋友切切偲偲又曰匿怨而友其人禮記曰獨學而無友則孤陋而寡聞孝經曰士有爭友則身不離於令名大戴禮曰上親賢則下擇友又曰與君子遊如入蘭芷之室久而不聞其芳則與之化矣與小人遊如人鮑魚之肆久而不聞其臭則與之化矣是故君子慎其去就家語曰孔子曰吾死之後商也日益謂與賢己者交賜也日損好悅不若己者交故君子慎所交又曰孔子曰自季氏賜我千鐘而友益親又曰孔子曰夫子産於民為惠主於學為博物晏子於君為忠臣於行為恭敏故吾皆以兄事之而加愛敬焉又曰夫內行不修身之罪也行修而名不彰友之罪也故君子入則篤行出則友賢漢書曰下邳翟公為廷尉賓客亦填門廢外可設雀羅復為廷尉賓客又來翟公大署其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見魏志曰胡質云古人之交也取多知其不貪奔北知其不怯聞流言而不信故可終也莊子曰凡交近則必相靡以信遠則必忠之以言孟子曰萬章曰敢問友孟子曰不挾長不挾貴不挾兄弟而友者友其德也不可以有挾也又曰舜尚見帝帝館甥于二室迭為賓主是天子而友於匹夫也譙子齊交曰譬之於物猶素之白也染之以藍則青遊居交友亦人之所染也韓起與田蘇處而成好仁之名甘茂事史舉用顯齊秦之功曹參師蓋公致清靜之治竇長君兄弟出於賤隸謹恭師友皆為退讓君子語曰蓬生麻中不扶自直此言雖小可以喻大必得其人千里同好固於膠漆堅於金石窮達不阻其分毀譽不疑其實鄒子曰昔邢高呂安飲於市仰天泣二子非有喪之哀傷相知之晚耳君子所以勤於接賢汲汲於結善欲以立名者也呂氏春秋曰荊有善相人者言無遺策聞於楚國莊王見而問焉曰臣非得相人能觀人之友也布衣其友皆孝悌純謹如此者家必日益此謂吉人也居官事君其友皆誠信有行好善如此者事君日益此謂吉臣也人主也朝臣多賢左右多忠主有失皆敢交爭此謂吉主也臣非能相人能觀人之友王曰善於是取士不解乃大霸晉陽春秋曰知幾其神乎古人以為難交踈而吐誠今人以為難風土記曰越性率朴意親好合即脫頭上手巾解要間五尺刀以與之為交拜親跪妻定交有禮俗皆當於山間大樹下封土為壇祭以白犬一丹雞一雞子三名曰木下雞犬五其壇地人畏不敢犯也祝曰卿雖乘車我戴笠後日相逢下車揖我雖步行卿乘馬後日相逢卿當下白虎通曰朋友之道有四焉近則正之遠則稱之樂則思之患則死之仲長子昌言曰幽間則攻己之短會同則述人之長負我者我加厚焉未有與人交若此而見憎者也要覽曰諸葛亮曰勢利之交難以經遠士之相知溫不增華寒不改葉能貫四時而不衰歷夷險而益固劉欽新議曰夫交接者人道之始紀綱之大要名由之成事由之立又曰交之於人也猶脣齒之相濟又曰才非交不用名非交不發身非交不立楊子法言曰朋而不心面朋也友而不心面友也周昭新撰曰交之為道起自羲皇造化之初君臣始立而有人倫上下之敘象天地交泰以左右於民也唐虞三代莫不因之故交全情親則國安治強交敗情乖則國危治弱立交者欲其親也是故百姓不親禹作司徒踈者能睦廉頗相如忍忿以崇厚陳平周勃感陸生而相親所以安趙於強敵定漢於幾殆此交接之大義帝王之極務聞之於易曰交乃人倫之本務王道之大義也魏文帝集論曰夫陰陽交萬物成君臣交邦國治士庶交德行光同憂樂共富貴而交道備矣阮子政論曰夫交遊者儔黨結於家威權傾其國或以利厚而比或以名高相求同則譽廣異則毀深朝有兩端之議家有不協之論至令父子不同好兄弟異交友破和穆之道長諍訟之源鍾會芻蕘論曰凡人之結交誠宜盛不忘衰達不棄窮不疑惑於讒構不信受於流言經長歷遠久而逾固而人多初隆而後薄始密而終疏斯何故也皆由交靜不發於神氣道數乖而不同權以一時之術取倉卒之利有貪其財而交有慕其勢而交有愛其色而交三者既衰疏薄由生東方朔與公孫弘書曰蓋聞爵祿不相責以禮同類之遊不以遠近為是故東門先生居蓬戶空穴之中而魏公子一朝以百騎日造之呂望未嘗與文王同席而坐一朝讓以天下半夫丈夫相知何必以撫塵而遊垂髮齊年偃伏以日數哉離騷曰交不忠信兮怨長晉潘嶽陽肇誄曰余以頑蔽覆露重陰仰追先達執友之心也古歌辭曰結交在相知骨肉何必親甘言無忠實世薄多蘇秦又曰採葵莫傷根結交莫羞貧傷根葵不生羞貧交不成交友一左傳曰吳公子劄聘于齊說晏平仲躬於鄭見子産如舊相識又曰鄭子皮卒子産哭且曰吾己無為為善矣唯夫子知我注云無人知己之善故曰吾己又曰伍員與申包胥友包胥楚大夫其亡也謂申包胥曰我必復楚國復執也申包胥曰勉之能復之我必能興之及昭王在隨申包胥如秦乞師尚書大傳曰散宜生閎夭南宮括三子者學乎太公大公見三子知為賢人遂酌酒切脯除為師學之禮約為朋友家語曰孔子遇程子傾蓋而語終日甚相悅顧謂子路曰程子天下之賢士取束帛以贈之史記曰趙有處士毛公藏於博徒薛公藏於賣漿家魏公子無忌從此二人結交遊也又曰蘇秦之先達張儀候之數日乃見坐於堂下食以僕妾之餐告舍人曰儀才吾不及恐以小利忘求進故辱之儀怒入秦蘇君使舍人齊金帛車馬陰結助之卒相秦也又曰蘭相如望見廉頗引車避匿廉頗聞之肉袒負荊至蘭相如門謝罪曰鄙賤之人不知將軍寬之至此也卒相與歡為刎頸之交漢書曰漢王與韓信為金石之交又曰衛青姊子夫得入宮幸上皇后大長公主女也無子妒之大長公主捕青囚欲殺之其友公孫武與壯士往奪之故得不死上聞乃召青為建章監侍中賞賜數日間纍千金又曰盧綰豐人與高祖同里綰親與太上皇相愛高祖綰同日生里中持羊酒賀兩家親相愛生子同日壯又相愛又曰兩龔皆楚人勝字君賓舍字君倩二人相友著名節故時號之楚兩龔又曰王吉字子陽京兆人也少與貢禹為友及陽仕至益州刺史貢聞之拂冠以待之陽遂薦稱焉世稱王陽在位貢公彈冠言其取舍同也又曰張耳大梁人陳餘亦大梁人也好儒術餘年少父事耳相與為刎頸之父又曰鄭崇弟立與高武侯傅喜同門學相友善喜為大司馬薦崇哀帝擢為尚書僕射又曰陳遵少孤與張竦俱為京兆吏竦學通達以廉儉自守而遵放縱不拘操行雖異然而相友善之
