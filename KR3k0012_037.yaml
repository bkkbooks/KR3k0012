body:
  text: 地部一地上釋名曰地底也言其底下載萬物也亦言諦也五土所生莫不審諦也亦謂之坤坤順乾也說文曰元氣初分重濁為地萬物所陳列也易曰坤元亨利牝馬之貞馬在下而居者也而必牝者順之至也至順而後乃亨又曰至哉坤元萬物資始乃順承天坤厚載物德合無疆含弘光大品物咸亨牝馬地類行地無疆象曰地勢坤地形不順其勢順也君子以厚德載物文言曰坤至柔而動也剛至靜而德方後得主而有常含萬物而化光坤道其順乎承天而時行又云陰雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也又曰夫玄黃者天地之雜色也天玄而地黃又曰立地之道曰柔與剛又曰坤地也故稱乎母陸績注曰取含養也又曰本乎地者親下又曰在地成形鄭玄注形謂草木鳥獸王廣注形謂山川等禮記曰人道敏政地道敏樹鄭玄注云樹謂植草木又曰今夫地一撮土之多及其廣厚載華岳而不重振河海而不泄萬物載焉此言地之博厚本由撮土山之廣大本由拳石水之不測皆由一勺皆合少成多自少至大至誠者亦如此乎又曰地載物天垂象取財於地取法於天是以尊天而親地又曰博厚所以載物也高明所以覆物也愽厚配地高明配天又曰成子高謂慶遺曰生無益於人死不害於人我死則擇不食之地而葬我焉又曰燔柴於泰壇祭天也瘞埋於泰折祭地也又曰天地不合萬物不生又曰子夏曰三王之德絫於天地敢問如何斯可謂參天地矣孔子曰奉三無私以勞天下子夏曰敢問何謂三無私子曰天無私覆地無私載日月無私照又曰凡四海之內斷長補短方三千里為田八十萬億一萬億畝九州之大計方百里者為田九十億畝山陵林麓川澤溝瀆城郭宮室塗巷三分去一其餘六十億畝周禮曰土訓掌道地圖以詔地事道說也說地圖九州形勢山川所宜告王以施其事也又曰以天產作陰德以中禮防之以地產作陽德以和樂防之以禮樂合天地之化百物之產又曰大司徒掌天下土地之圖周知九州之地域廣輪之數東西為廣南北為輪辯五地之生物一曰山林其動物宜毛其植物宜皁二曰川澤動物宜鱗植物宜膏三曰丘陵動物宜羽植物宜覈四曰墳衍動物宜介植物宜萊五曰原隰動物宜蠃植物宜藂爾雅曰東至泰遠西至邠國南至濮鈆北至祝栗謂之四極觚竹北戶西王母日下謂之四荒九夷八狄七戎六謂之四海距齊州以南戴日為丹穴北戴斗極為空桐東至日所出為太平西至日所入為太蒙郭璞注曰極四方極遠國也觚竹在北北戶在南西王母在西日下在東皆四方昏荒之地次四極者九夷在東入狄在北七戎在北六蠻在南次四荒者距去也齊中也犍為含人注曰晦冥無識不可教晦故曰四海自中州以南日光所照故曰丹穴尚書考靈異曰地有四遊冬至地上北而西三萬里夏至地下南而東復三萬里春秋分則其中矣地恒動不止人不知譬如人在大舟中閉牖而坐舟行不覺也詩含神霧曰天地相去億里春秋感精符曰冬至成天文夏至成地理春秋元命苞曰神農世怪義生白阜怪義白阜之母名也圖地形脈道白阜為神農圖畫地形通水道之脈使不壅塞也又曰土無位而道在故太一不興化人主不任部地出雲起雨以合從天下勤勞出於地功名歸於主土以謙自正以卑自歛終不自伐生養之苦乃興雲雨不以為功天一歸於天中又曰地所以右轉者氣濁精少含陰而起遲故轉迎天佐其道地生於離既而不敢當陽動退居少陰則亦宜右行而迎陽者受其施育而成陽故曰佐其道也又曰地不足東南陰右動終而入靈門地不足東故言立子午以相明之子午者陰陽之眾所見處也故以二辰廻轉所不同以為門也右動動而東也靈門巳也陰藏於以也又曰地者易也言養物懷任交易變化含吐應節故其立字土力於一者為地地加土以力又加一者言奉大一也春秋說題辭曰地之為言婉也承天行其義也居下以山為位道之經也山陵之大非地不制含功以牧生故其立字土力於一者為地力勤也即天也春秋內事曰地有十三分王侯之所居也孝經援神契曰地順受澤謙虛開張開張九覈受流灑潤是其謙虛也又曰計校九州之別土壤山陵之大川澤所注萊沛所生鳥獸所聚凡九百一十萬八千二十四頃磽埆不懇者千五百萬二千頃家語曰子夏曰啇聞山書曰地東西為緯南北為經山為積德川為積刑高者為生下者為死丘陵為牡川谷為牝蚌蛤龜珠與月盈虛是故堅土之人剛弱土之人肥虛土之人妙實土之人細息土之人美磽土之人醜史記曰顓頊養材以任地載時以象天漢書曰天道貴信地道貴貞不信不貞萬物不生又曰秦地於天官東井輿鬼之分野周地柳七星張之分野韓地角亢氐之分野趙地昴畢之分野燕地尾箕之分野齊地虛危之分野魯地奎婁之分野宋地房心之分野衛地營室東壁之分野楚地翼軫之分野吳地斗牛之分野晉書曰裴秀禹貢九州地域圖論曰圖書之設由來尚矣自古垂象立制而賴其用三代置其官國史掌其職暨漢祖屠咸陽丞相蕭何盡收秦之圖籍今秘書既無古之地圖又無蕭何所得秦之圖籍唯有漢氏輿地及括地諸雜圖各不設分率又不考正准望亦不備載名山大川其所載列雖有麤形皆不精審不可依據或稱外荒迂誕之言不合事實於義無取今制地圖之體有六一曰分率所以辯廣輪之度也二曰准望所以正彼此之體也三曰道里所以定所由之數也四曰高下五曰方雅六曰迂直此三者各因地而制以校夷險之數也有圖象而無分率則無以審遠近之差有分率而無准望雖得之於一隅必失之於佗方有准望而無道里則施於山海絕隔之地不能以相通有道里而無高下方斜迂直之校則徑路之數必與遠近之實相違失准望之正矣故必以此六者參而考之然后遠近之實定於高下方邪迂直之筭故雖有峻山巨海之隔絕域殊方之過登降詭曲之回皆可得舉而定者准望之法既正則曲直遠近無所隱其形也抱朴子云太極初構清濁始分故天先成而地後定河圖括地象曰八極之廣東西二億三萬三千里南北二億三萬一千五百里夏禹所治四海內地東西二萬八千里南北二萬六千里又曰天有五行地有五岳天有七星地有七表天有四維地有四瀆天有八氣地有八風天有九道地有九州又曰崑崙山為柱氣上通天崑崙者地之中也下有八柱柱廣十萬里有三千六百軸互相牽制名山大川孔穴相通又曰地廣東西二萬八千南北二萬六千有君長之州有九阻中土之文德及而不治河圖挺佐輔曰百世之後地高天下不風不雨不寒不暑民復食土皆知其母不如其父知此千歲之後而天可倚杵匈匈隆隆莫知始終河圖曰元氣無形匈匈蒙蒙偃者為地伏者為天黃帝素問曰積陰為地故地者濁陰也洪範五行傳曰地者成萬物者也周髀筭經曰天不可階而升地不可尺寸而度楚辭曰地方九則何以墳之王逸注曰墳分也謂九州之地凡九品禹貢何以能分別之也康廻馮怒地何以東南傾康廻共工也昔共工與顓頊爭為帝怒而觸不周山天柱折地維絕故傾也見淮南天道篇也鹽鐵論曰古者制地足以養民民以承其上千乘之國百里之地公侯伯子男各充其欲秦兼萬國之地有四海之富而意不贍者嗜欲多而下不堪其求也太玄經曰天以不見為玄地以不形為玄人以心腹為玄天奧西北鬱化精也地奧黃泉隱魄榮也人奧思慮含至精也又曰九地一為沙泥二澤浼三征崖四下田五中田六上田七下山八中山九上山蔡邕月令章句曰揔丘陵原隰孤險曰地范子計然曰夫地有五土之宜各有高下鄭玄注孝經曰分別五土視其高下若高田宜黍稷下田宜稻麥丘陵坂險宜種棗栗楊泉物理論曰凡居地有大利而無小害者上地也山海經曰帝令豎亥步自東極至于西極五億十選郭璞注曰豎亥健行人選萬物也九千八百八十步豎亥左手抱筭右手指青丘北又曰天地之東西二萬八千里南北二萬六千里出水者八千里受水者八千里物理論曰地者底也底之言著也陰體下著也其神曰祇祇成也育生萬物備成也其卦為坤其德曰母地形有高下氣有剛柔物有巨細味有甘苦鎮之以五岳積之以丘陵播之以四瀆流之以四川蓋氣自然之體也地發黃泉周伏廻轉以生萬物地天之根本也形西北高而東南下東西長南北短其盡四海者也又曰地者其卦曰坤其德曰母其神曰祇亦曰媼大而名之曰黃地祇小而名之曰神州亦名后土黃地祇舉八極之內地神州王畿方千里內地神也后土祇也社地主也所在皆得言之詩推度災曰上清下濁號曰天地愽物志曰地氏之位起形於崑崙從廣萬里高萬一千里神物之所生聖人仙人之所集崑崙之東北地轉下三千六百里有八玄幽都方二十餘萬里下有四柱柱廣十萬里地有三千六百軸互相牽制也又曰地以名山為之輔佐石為之骨川為之脈草木為其毛土為其肉三尺以上為糞三尺以下為地重陰之性也又曰中國之域左濱海右通流沙方而言之萬五千里面二千五百里東至蓬萊山西至隴右後跨荊北前及衡岳若計共四隅有三億之餘降朝鮮岷山東治可西也隴川以南及北海之國此是堯舜土及萬里湯時七千里此後亦無常隨德優劣也論衡曰地戶在東南曰地之最下者有楊兗二川洪水之時此二土最被水害又曰山川陵谷為之地里又曰地性生草山性生水白虎通曰地者元氣所生萬物之祖也地之言施也諦也應施變化審諦不誤敬始重終故謂之地也老子曰地得一以寧地無以寧將恐發莊子曰天地非不廣且大也人所容足耳又曰海水三歲一周流波相薄故地動列子曰共工與顓頊爭為帝怒而觸不周之山天柱折地維絕地不滿東南故百川歸焉又曰地積塊耳充塞四虛無處無塊文子曰地承天故定寧地定寧萬物形地廣厚萬物聚定寧無不載廣厚無不容又曰地方而無涯故莫能闚其門管子曰地或維之地莫之維地亡必矣又曰地者政之本也是地可以正地不均平和調則政不可正也桓公問管子曰地數可得聞乎曰東西二萬六千里出水者八千里受水者八千里出銅山四百六十七出鐵山三千六百九處封禪之王七十二家墨子曰禽子問天與地孰仁墨子曰翟以地為仁民衣焉食焉死焉家焉地終不責德焉故翟以地為仁淮南子曰禹使大章步自東極至于西極二億三萬三千五百七十里使豎亥步自北極至于南極二億三萬三千五百七十里又曰重濁者淹滯而為地又曰天有九部八紀地有九州八柱九州之外有八埏東方曰沙海東南方曰沅澤南方曰浩澤西南方曰丹澤西方曰泉澤西北方曰海澤北方曰塞澤東北方曰無通澤又曰扶桑之上眾帝所自上下日中無景呼而無嚮蓋天地之中也弱水在東建木在西末有十日其華照地九州之大純純緣邊也方千里九州之外乃有八寅一日不溫曰寅澤亦方千里自東北方曰大澤無漸茄曰澤也曰無通東方曰大渚曰少海東南曰其區曰厄澤南方曰大夢曰浩澤西南方曰注資曰丹澤西方曰九甌曰泉澤西北方曰大夏曰海澤北方曰大冥曰寒澤凡八寅八澤之雲是雨九州八寅之外乃有八紘紘維紘也亦方千里自東北方曰和丘曰荒土東方曰棘林曰桑野東南方曰大窮曰眾女民少男多女也南方曰都廣曰反戶在日之南為北嚮戶西南方曰焦僥曰炎土焦僥人長三尺衣冠帶劍西方曰金丘曰沃野金丘金所出也西北方曰一目曰少所其人一目北方曰積冰曰委羽積冰至寒也委羽山名委羽之北蓋不見日也凡八紘之氣是出寒暑以合八正必以風雨八紘之外乃有八極自東北方曰方土之山曰蒼門東方曰東極之山曰開明之門東南方曰波海之山曰陽門南方曰南極之山曰暑門西南方曰南極編駒之山曰白門西方曰西極之山曰閶闔之門西北方曰不周之山曰幽都之門北方曰北極之山曰寒門凡八極之雲是雨天下八門之風是節寒暑八紘八夤八澤之雲以雨九州而和中土東方之美者有醫無閭之珣玗琪焉醫無閭東夷之山也珣玗其玉名也東方之美者有會稽之竹箭焉南方之美者有梁山之犀象焉西南之美者有華山之金石焉西方之美者有霍山之珠玉焉西北方之美者有崑崙虛之璆琳瑯玕焉璆琳瑯玕珠名也北方之美者有幽都之䈥角焉東北方之美者有徒格山之文皮焉文皮虎豹之皮也
