body:
  text: 東夷三俀後漢書曰俀在韓東南大海中依山島為居凡百餘國武帝滅朝鮮使驛通於漢者三十許國俀王居邪馬臺國俀今名邪魔惟音之訛反樂浪郡徼去其國萬二千里其地大較在會稽東冶與朱崖儋耳相近故其俗多同土宜禾稻麻紵蠶桑知織績為縑布出白珠青玉其山有丹土氣溫暖冬夏生菜茹無牛馬虎豹羊鵲鵲或作雞其兵有矛楯木弓竹矢或以骨為鏃男子皆黥面文身以其文左右大小別尊卑之差其男衣皆橫幅結束相連女人被髮屈紒衣如單被貫頭而著之並以丹朱坌身說文曰坌塵也音蒲頓切如中國之用粉也有城柵屋宇父母兄弟異處唯會同男女無別飲食以手而用籩豆俗皆徒跣以蹲踞為恭敬其人性嗜酒多壽考至百餘歲者甚衆國多女子大人皆有四五妻其餘或兩或三女人不淫不妬又俗不盜竊少爭訟犯法者沒其妻子重者滅其門族其死者停喪十餘日家人哭泣不進酒食而等類就歌舞為樂灼骨以為卜用決吉凶行來渡海令一人不櫛沐不食肉不近婦人名曰持衰若在塗吉利則雇以財物如病疾遭害以為持衰不謹便共殺之魏志曰倭國在帶方東南大海中依山島為舊國百餘小國漢時有朝見者今令使譯所通其三十國從帶方至倭循海岸水行歷韓國從乍南乍東到其北岸拘耶韓國七千餘里至對馬國戶千餘里大官曰卑狗副曰卑奴母離所居絶島方四百餘里地多山林無良田食海物自活乘船南北市糴又南渡一海一千里名曰瀚海至一大國置官與對馬同地方三百里多竹木叢林有三千許家亦有田地耕田不足食方行市糴又渡海千餘裏至未盧國戶四千濱山海居人善捕魚水無深淺皆能沉沒取之東南陸行五百里到伊都國官曰爾支副曰泄謨觚柄渠觚有千餘戶世有王皆統屬女王帶方使往來常止住又東南至奴國百里置官曰先馬觚副曰卑奴母離有二萬餘戶又東行百里至不彌國戶千餘置官曰多模副曰卑奴母離又南水行二十日至於投馬國戶五萬置官曰彌彌副曰彌彌郍利又南水行十日陸行一月至耶馬臺國戶七萬女王之所都其置官曰伊支馬次曰彌馬叔次曰彌馬獲支次曰奴佳鞮其屬小國有二十一皆統之女王之南又有狗奴國男子為王其官曰狗石智卑狗者不屬女王也自帶方至女國萬二千餘里其俗男子無大小皆黥面文身聞其舊語自謂太伯之後又云自上古以來其使詣中國草傳辭說事或蹲或跪兩手據地謂之恭敬其呼應聲曰噫噫如然諾矣又曰倭國本以男子為王漢靈帝光和中倭國亂相攻伐無定乃立一女子為王名卑彌呼事鬼道能惑衆自謂年已長大無夫壻有男弟佐治國以婢千人自侍唯有男子一人給飲食傳辭出入其居處宮室樓觀城柵守衛嚴峻景初三年公孫淵死倭女王遣大夫難升米等言帶方郡求詣天子朝見太守劉夏送詣京師難升米致所獻男生口四人女生口六人班布二匹詔書賜以雜錦采七種五尺刀二口銅鏡百枚真珠鉛丹之屬付使還又封下倭王印綬女王死大作冢殉葬者百餘人更立男王國中不伏更相殺數千人於是復更立卑彌呼宗女臺舉年十三為王國中遂定其倭國之東渡海千里復有國皆倭種也又有朱儒國在其南人長三四尺去倭國四千餘里又有裸國墨齒國復在其南船行可一年至南史曰倭國風俗不淫男女皆露髻富貴者以錦繡鄉雜來為帽似中國胡公頭晉安帝時有倭王讚遣使朝貢宋武帝永初二年詔曰倭王讚遠誠宜甄可賜除授文帝元嘉二年讚又遣使奉表獻方物讚死弟珍立遣使貢獻自稱使持節都督倭百濟新羅任郍秦韓六國諸軍事安東大將軍倭國王詔除安東將軍倭國王珍又求除正倭洧等十三人平西征虜冠軍號詔並聽之自此朝貢不絶至順帝升明二年倭王武遣使上表言自昔祖禰躬擐甲胄跋涉山川不遑寧處東征毛人五十五國西服衆夷六十六國陵平海北九十五國王道融泰廓土遐畿纍葉朝宗不愆于歲道過百濟裝飾船舫而句麗無道圖欲見吞臣亡考濟方欲大舉奄喪父兄使垂成之功不獲一簣今欲練兵甲父凡之志竊自假開府儀同三司其餘咸各假授以勸忠節詔除武使持節督倭新羅任郍加羅秦韓六國諸軍事安東大將軍倭國王至齊建元中及梁武帝時並來朝貢北史曰隋開皇二十年倭王姓何每宇多利思比孤號河輩雞彌遣使詣闕上令所司訪其風俗使者言倭王以天為兄以日為弟天明時出聽政跏趺坐日坐便理務云委我弟文帝曰此大無義理於是訓令改之王妻姓雞彌沒官有女六七百人名太子為利歌彌多弗利又曰倭國內官有十二等一曰大德次小德次大仁次小仁次大義次小義次大禮次小禮次大智次小智次大信次小信員無定數有軍尼一百二十人猶中國牧宰八十戶置一伊尼翼如今里長也十伊尼翼屬一軍尼又曰倭國男子服飾衣裙襦其袖微小履如屨形漆其上繫之腳人庶多跣足不得用金銀為飾故時衣橫幅結束相連而無縫頭亦無冠但垂髮於兩耳上至隋時王始制冠以錦綵為之以金銀鏤花為飾婦人束髮於後亦衣裙襦裳皆有襈纖竹聚以為編草為薦雜皮為表緣以雜文皮文曰倭國兵有弓矢䂎斧漆皮為甲骨為矢鏑雖有兵無征戰其王朝會必陳設儀仗其國樂戶戶可十萬俗殺人強盜及姦皆死盜者計贓酬物無財者沒身為奴自餘輕重或流或杖每訊冤獄不承引者以木壓膝或置小石於沸湯中令所竟者探之云理曲者即手爛或置蛇甕中令取之云曲者即螫手人頗恬靜罕爭訟少盜賊樂有五弦琴笛男女多黥面文身沒水捕魚無文字唯刻木結繩後於百濟求得佛經始有文字知卜筮尤信巫覡每至正月一日必射戲飲酒其餘節略與華同好棊博握槊樗蒲之戲氣候溫暖草木冬青土地膏腴水多陸少以水環挂鸕鷀項令入水捕魚日得百餘頭俗無盤俎藉以槲葉性質直有雅風女多男少婚嫁不取同姓男女相悅者即為婚婦入夫家必先跨火乃與夫相見婦人不淫妬死者斂以棺槨親賓就尸歌舞妻子兄弟以白布製服貴人三年殯庶人卜日而瘞及葬置尸船上陸地牽之或以小輿又曰倭國有阿蘇山其石無故大起接天者俗以為異因行禱祭有如意寶珠其色青大如雞卵夜則有光新羅百濟皆以倭為大國多珍物並仰之恆通使往來又曰隋大業三年倭國王多利思比孤遣朝貢使者曰聞海西菩薩天子重興佛法國書曰日出處天子致書日沒處天子無恙云云帝覽不悅謂鴻臚卿曰夷書有無禮者勿復以聞明年上遣文林郎裴世清使倭國王遣小德何輩台從數百人設儀仗鳴鼓角來迎後十日又遣大禮歌多毗從三百餘騎郊勞既至彼都其王與世清來貢方物此後遂絶唐書曰倭國土風頗類新羅貞觀五年遣使獻方物太宗矜其道遠勑所司無令歲貢又遣新州刺史高表仁持節往撫之表仁無綏遠之才與王子爭禮不宣朝命而還至二十二年又附新羅奉表以通起居日本國唐書曰日本國者倭國之別種也以其國在日邊故以日本為名或云倭國自惡其名不雅改為日本或云日本舊小國併倭國之地其人入朝者多自矜大不以實對故中國疑焉又云其國界東西南北皆數千里西界南界咸至大海東界北界有大山為限山外即毛人之國長安三年其大臣朝臣真人來貢方物朝臣真人者猶中國戶部尚書冠進德冠其頂為花分而四散身服紫袍以帛為腰帶真人好讀經史解屬文容止溫雅則天宴之於麟德殿授司膳卿放還本國又曰開元初日本國遣使來朝因請儒士授經詔四門助教趙玄默就鴻臚寺教之乃遺玄默闊幅布以為束修之禮題云白龜元年調布人亦疑其僞為此題所得錫賚盡市文籍泛海而還其偏使朝臣仲滿慕中國之風因留不去改姓名為朝衡仕歷左補闕儀王友衡留京師五十年好書籍放歸鄉逗留不去又曰貞元二十一年日本國遣使來朝留學生橘免勢學問僧空海元和元年朝貢使判官高階真人上言前件學生藝業稍成願歸本國便請與臣同歸從之開成四年又遣使朝貢南海經曰南倭北倭屬倭國在帶方東大海中以女為王其俗零結衣服無針功以丹朱塗身不妬忌一男子數十婦紵嶼人外國記曰周詳瀙泛海落紵嶼上多紵有三千餘家云是徐福僮男之後風俗似吳人蝦夷國唐書曰蝦夷國海島中小國也其使鬚長四尺尤善弓矢插箭於首令人戴觚而立數十步射之無不中者明慶四年十月隨倭國使入朝
