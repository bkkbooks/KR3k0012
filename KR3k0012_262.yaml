body:
  text: 職官部五十九良太守中魏略曰顏斐字文林為京兆太守到官乃令屬縣整阡陌樹桑菓又是時人多無車牛斐課人閑月取車材使轉相教作車又課民無牛者命畜豬貴時賣以買牛始人以為煩一二年間家家有丁車大牛遷為平原太守吏人啼哭遮道車馬不得前十餘日乃出魏志曰賈逵為弘農太守太祖召見計事大悅之謂左右曰使天下二千石皆如賈逵則吾何憂又曰杜畿為河東郡守寬惠與民無為民嘗辭訟有相告者親為陳大義遣令歸諦思之若意有所不盡更來詣府鄉邑父老自相責怒曰有君如此柰何不從其教自是少辭訟詔曰昔蕭何定關中寇恂平河內卿有奇功間將授卿以納言之職顧念河東吾股肱郡充實之足以制天下故且煩卿臥而鎮之畿在河東十六年常為天下最又曰胡質字文德為常山太守遷任東莞士盧顯為人所殺質曰此士無讎而有少妻所以死乎悉見其比居年少書吏李若見問而色動遂窮詰情狀遂即自首罪人斯得每軍功賞賜皆散之於眾無入家者在郡九年吏民便安將士用命又曰倉慈字孝仁淮南人太和中遷燉煌太守郡在西陲以喪亂隔絕曠無太守二十歲大姓雄豪遂以為俗前太守尹奉等脩政而已無所匡革慈到大抑挫權右撫恤貧羸甚得其理舊大族田地有餘而小民無立錐之土慈皆隨口割賦稍稍使畢其本直先是屬城獄訟眾猥縣不能決多集治下慈躬往省閱斟酌輕重自非殊死便杖而遣之一歲決刑曾不滿十人又曰令狐邵字孔叔為弘農太守所在清如冰雪妻子希到官省舉善而教恕以待人不好獄訟與下無忌也又曰田豫字國讓遷南陽太守先時郡人侯音反眾數千人在山中為群盜大為郡患前太守收其黨與五百餘人表奏皆當死豫悉見諸繫囚慰諭開其自新之路一時破械遣之諸囚皆叩頭願自効即相告語群賊一朝解散郡內清靜具以狀聞太祖善之又曰自太祖迄于咸熙魏郡太守陳國吳璀清河太守樂安任燠京兆太守濟北顏斐弘農太守太原令狐邵濟南相魯國孔義或哀矜折獄或推誠惠愛或治身清白或擿姦發伏咸為良二千石又曰涼茂守伯方時泰山多盜賊以茂為泰山太守旬月之間繈負而至者千餘家又曰鄭渾字文公遷沛郡太守郡界下濕常患水澇百姓飢乏渾於瀟湘三縣界興陂開稻田郡人皆以為不便渾曰地勢洿下宜溉灌終成稻田經久之利此豐民之本也遂躬率吏民興立功夫一冬間皆成比年大收頃畝歲增租入倍常民賴其利刻石頌之號曰鄭陂魏略曰孟康正始中出為弘農太守康到官清平嘉善而矜不能省息獄訟緣民所欲而利之郡領吏二百餘人涉春遣休常四分遣一事無宿諾時出案行不欲煩損吏民常豫勑卒行各持鎌所在自刈馬草不止亭傳露宿樹下蜀志何祗字君肅汶山夷不安以祗為汶山太守民夷服信遷廣陵後夷反叛辭曰令得前何府君乃能安我耳時難復屈祗挾族人為之汶山復得安吳志曰顧邵字孝時年二十七起家為豫章太守下車祀先賢徐孺子之墓優待其後禁淫祀非禮之祭看相小吏資質佳者輒令就學擇其先進擢置右職學善以教風化大行又曰孫權授諸葛恪撫越將軍領丹陽太守拜畢令恪備威儀作鼓吹導引歸家恪到府乃移書四郡屬城長令各保其疆界明立部伍於是山民漸出降王隱晉書曰廣平太守𡙇宣帝謂鄭袤曰賢叔大匠垂稱於陽平魏郡並蒙惠化且盧子家王子雍繼踵此郡吾欲令郡世不乏賢故復相屈袤在郡先以德化善作條教百姓愛之又曰鄭默為東郡太守值歲荒民飢默輒開倉賑給自上待罪朝廷嘉默憂國恤人詔書襃歎比之汲黯又曰應詹為南平太守天下分崩征鎮州郡已失城邑簷獨保境外攘狂狡內除塗炭甚便百姓之情郡人歌曰亂離既普殆為灰朽僥倖之運賴茲應后潤同江海恩猶父母晉書曰范粲遷武威太守到郡選良吏立學校勸農桑是時戎夷頗侵壃場粲明設防備敵不敢侵西域流通無烽燧之警又曰劉頌為河內守郡界多公王水碓遏塞流水轉為浸害頌表罷之百姓獲其利又曰吳隱之為晉陵太守在郡清儉妻自負薪又曰鄧攸字伯道為淮南太守夢行水邊見一女子猛獸自後斷其盤囊占者以為水邊有女汝字也斷盤囊者新獸頭代故獸頭也不作汝陰當汝南也果遷汝陰太守又曰鄧攸元帝以攸為太子中庶子時吳郡闕少人多欲之帝以授攸攸載米之郡俸祿無所受唯飲吳水而已時郡中大飢攸賑貸未報乃輒開倉救之臺遣散騎常侍桓彝慰勞飢人觀聽善不乃劾攸以擅出穀俄而有詔原之攸在郡州政清明百姓歡悅為中興良守又曰鄧攸為吳郡太守稱疾去職郡常有送迎錢數百萬攸去郡不受一錢百姓數千人留牽攸舡不得進攸乃止停中夜發去吳人歌之曰紞如打五鼓雞鳴天欲曙鄧侯挽不留謝令推不去百姓詣臺乞留一歲不聽又曰陸納為吳興太守至郡不受俸祿頃之徵拜左氏尚書領州大中正將應召外白宜裝幾舡納曰私奴裝糧食來無所復須也臨發止有被幞而已其餘並封以還宮晉中興書曰王蘊字叔仁為吳興太守時郡荒民飢蘊輒開倉賑䘏主簿執諫云宜先列上蘊曰行仁義而敗者尠矣於是以米賑貸賴蘊活者十室而八然後具自表聞朝廷以違科免飢民多誦之詔特左遷晉陵太守又曰諸葛恢字道明中宗選為會稽太守臨行上為置酒謂之曰今之會稽昔關中足食足兵在於良守以君有蒞任之方是以相屈恢陳謝曰今天下喪亂之餘風俗陵遲宜尊五美屏四惡進忠實之士退浮華之黨中宗深納焉南史曰宋江秉之為臨海太守以簡約見稱卒於官所得祿秩悉散之親故妻子常飢寒人有勸其營田秉之正色荅曰食祿之家豈可與人競利在郡作書案一枚去官留以付庫齊書曰劉懷慰拜齊郡太守上謂懷慰曰齊邦是王業所基吾方以為顯任經理之事一以委卿又手勑曰有文事者必有武備今賜卿王環刀一口懷慰至郡修治城郭安集居民墾廢田二百頃決沈湖灌溉不受禮謁民有餉其新米一斛者懷慰出所食麥飯示之曰旦食有餘幸不煩此因著廉吏論以達其意又曰虞愿為晉平太守海邊有越王石常隨雲霧相傳云清廉太守乃得見愿往觀視清徹無隱蔽後琅耶王秀之為郡與朝士書此郡承虞公之後善政猶在遺風易遵差得無事又曰王秀之為晉平太守至郡朞年謂人曰此邦豐壤祿俸常充吾山資已足豈可久留以妨賢路上表請代時人謂王晉平恐富求歸又曰裴昭明歷郡皆有善政常謂人曰人生何事須聚蓄一身之外亦復何須子孫若不才我聚彼散若能自立則不如一經故終身不治產又曰蕭介字茂鏡少頴悟有器識梁大明中武陵王紀為楊州刺史以介為府長吏在職以清白稱武帝謂何敬容曰蕭介甚貧可以處一郡復曰始興郡頻無良守可以介為之由是出焉齊春秋曰崔元祖父景真為平昌太守有惠政常懸一蒲鞭而未嘗用梁書曰褚翔為義興太守翔在政潔己省繁苛去游費百姓安之郡之西亭有古樹積年枯死翔至郡忽更生枝葉百姓咸以為善政感及秩滿吏民詣闕請之勑許焉又曰何敬容為吳郡太守為政勤恤民隱辯訟如神視事四年治為天下第一吏民詣闕請樹碑詔許之又曰劉亨字嘉會之遴弟也代之遴為南郡太守在郡有異績數年卒於官時年五十荊士至今懷之不忍其名號為大南郡小南郡又曰何胤字子季為建安太守民不忍欺伏臘放囚還家及期而至又曰傅昭遷臨海太守郡有密巖前後太守皆自封固專收其利昭以周文之囿與百姓共之大可喻小乃教勿封縣令常餉粟寘絹于簿下昭笑而還之又曰徐摛東海郯人高祖問五經大義次問歷代史及百家雜說末論釋教摛啇較縱橫荅應如響高祖寵遇日隆領軍朱異不悅謂所親曰徐叟出入兩宮漸來逼我須早為之所遂承間白高祖曰摛年老又愛泉石意在一郡以自頤養高祖謂摛欲之乃召摛曰新安大好山水任昉等並經為之卿為我臥治此郡遂出為新安守周月之中風俗便改又曰張緬出為淮南太守時年十八武帝疑其年少未閑吏事遣主書封取郡曹文案見斷決允愜甚稱賞之崔鴻十六國春秋前秦錄曰索稜字孟則燉煌人好學愽聞姚萇甚重之委以機密文章詔檄皆稜之文也後為平原太守以德化民民畏而愛之歌曰懿矣明守庶績允釐剖符作宰實獲我思又曰前涼晉昌太守陰繇卒郡人思其政化縗絰送喪至武威者千餘人後魏書曰羊敦字元禮太山平陽人為廣平太守甚有能名姦吏跼蹐秋毫無犯屬歲飢饉家饋未至使人尋陂澤拔藕而食之遇有疾苦解衣質米朝廷以其清白賜穀千斛絹百疋又曰張長年為汝南太守郡人劉崇之兄弟分拆家唯有一牛爭之不決訟于郡庭長年曰汝曹當以一牛故致此競有二牛各應得一豈有訟理即以家牛一頭賜之于是郡境之中各相誡約咸敦敬讓又曰柳崇出為河北太守崇初屆郡郡民張明失馬疑十餘人崇見之不問賊事人別借以溫顏更問其親老存不農桑多少而微察其辭色即獲真賊呂穆等二人餘皆放遣郡中畏服境內帖然又曰呂顯拜鉅鹿太守清身奉公務存贍䘏妻子不免飢寒民頌之曰時惟府君克清克明緝我荒土民胥樂生願壽無疆以享長齡又曰韋崇字洪基除南潁川太守不好發摘細事常云何用小察以傷大道吏民感之郡中大治高祖聞而嘉賞賜帛二百疋又曰辛穆字叔宗轉汝陽太守值水澇民飢上表請輕租賦帝從之遂勑汝陽一郡聽以小絹為調又曰房景伯除清河太守郡民劉簡虛曾失禮於景伯聞其臨郡闔家逃亡景伯督切屬縣追捕擒之即署其子為西曹掾命諭山賊賊以景伯不念舊惡一時俱下論者稱之
