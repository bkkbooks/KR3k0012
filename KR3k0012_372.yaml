body:
  text: 人事部十二胸說文曰膺胸也臆胸骨也廣雅曰臆膺胸也釋名曰胸猶啌啌氣所衝啌許江切左傳僖下曰魏犨爇僖負羈氏魏犨傷於胸公欲殺之而愛其材使問且視之病將殺之魏犨束胸見使者曰以君之靈不有寧也距躍三百曲踊三百乃舍之論語摘輔象曰孔子胸應矩是謂儀古春秋演孔圖曰孔胸文曰制作定世符運春秋後語曰荊軻謂樊於期曰願得將軍之首以獻秦王秦王必喜而見臣臣左手把其袖右手揕其胸漢書曰高祖與項羽對軍數羽十罪羽伏弩射漢王中胸高祖詐捫足曰虜中吾指又曰王莽好反膺高視京房易妖占曰人生子有二胸民謀其主帝王世紀曰禹母吞神珠胸坼而生禹淮南子曰文王汙膺許慎注曰汙廬也南州異物志曰獠民亦謂文身國刻其胸前作華文以為飾山海經曰結胸國為人結胸郭璞注曰臆前膚出如人結喉貫胸國為人胸有竅世說曰王孝伯問王大忱阮籍何如司馬相如王大忱曰阮籍胸中壘塊故須酒澆之言同相如唯有酒異大忱小字録異傳曰漢武帝時蒼梧賈雍為豫章太守有神術出界計賊為賊所殺失頭雍上馬還營營中咸走來視雍雍胸語曰有頭為佳吏涕泣曰有頭佳雍曰無亦佳言畢遂死志怪集曰石季倫母喪洛下豪俊赴殯者傾都王戎亦入臨殯便見鬼攘臂打捶鑿甚惶惶有一人當棺立此鬼披胸陷之此人即應鑿而倒人便早去得病半日死故世間相傳不宜當棺由戎所見膈說文曰胸心上膈也釋名曰膈塞也膈塞上下使不與穀氣相亂世說曰桓公有主簿善別酒輒令先嘗好者謂青州從事惡者謂平原督郵青州有齊郡平原有膈縣從事言至臍督郵言至膈上住乳廣雅曰湩謂之乳說文曰湩乳汁也湩音凍又竹仲切通俗文曰乳病曰𤴱丁故切河圖曰蒼帝并乳宋均曰法房星也春秋元命苞曰文王四乳是為含良蓋法酒旗布恩舒明宋均曰乳酒也漢書曰張蒼免相後口中無齒食乳以女子為乳母也謝承後漢書曰南陽李善本濟陽李元家奴元遭病死唯有孤孫續有資千萬奴婢欲謀殺續分其財産善夜抱續逃瑕丘界親自哺養乳為生湩遂至成長吳書曰潁川馮熙使魏辭意不屈魏留之熙懼見迫乃引刀刺中乳房上聞嘉之賜鹽米復其門後魏書曰朱循之為劉義隆司徒從事中郎守滑臺安頡圍之其母在家乳汁忽出母號慟告家人曰我年老非復有乳汁之時今忽如此兒必沒矣果以其日為頡所擒又曰昭成皇帝諱什翼臥則乳至席齊書曰太祖母陳皇后生太祖二年乳人乏乳后夢人以兩甌麻粥與之覺乳遂大出淮南子曰文王四乳是謂太仁天下所歸百姓所親山海經曰形夭與帝爭神帝斷其首罪葬之常羊山乃以乳為目齊為口益部耆舊傳曰蜀郡張寬字叔文漢武帝時為侍中從祀甘泉至渭橋有女子浴於渭水乳長七尺上怪問之女曰帝後第七車者知我所來時寬在第七車對曰天星主祭祀者齊戒不嚴時則女人見劉欣期交州記曰趙嫗者九真軍安縣女子也乳長數尺不嫁入山藂群盜遂攻郡常著金㩉蹤屐戰退輒張帷幕與少男通數十侍側刺史吳郡陸胤平之王子年拾遺録曰無老國其人皆千歲百歲一老齒落髮禿又年少嫗者乳養還復若幼稚神仙服食經曰仙藥有陽丹陰丹陰丹婦人乳汁也婦人十五已上下為月客有身月客絶上為乳汁養性經曰乳者意之府也世說曰王武子蒸肫肥美異常味武帝怪問何由乃爾云以人乳飲之武帝色甚不平所以飲食未畢便去異苑曰賈充妻郭氏為人凶妒生兒黎民年始二歲充外入就乳母抱中嗚撮郭遙見謂充愛乳嫗即殺之兒恆啼泣不飲他乳經日遂死郭於是終身無子唐新語曰韓思彥以侍御史巡察于蜀成都有富商兄弟三人分資不平爭訴纍年不決思彥推案數日令廚者奉乳自飲以其餘賜爭者竊相語遂號哭攀援不解俱言曰侍御豈不以兄弟同乳母耶悲號不自勝請同居如初相書許負曰乳間闊富貴足壽乳黑如墨公侯之相腹說文曰腹厚也釋名曰腹復也富也腹胃之屬已自裹盛復於外復之其中多品似富者也自齊已下曰水腹水汋所藂也又曰少腹少小也比齊已上為小也易說卦曰坤為腹離其於人也為大腹尚書盤庚曰今豫其敷心腹腎腸歷告爾百姓于朕志左傳宣十三年傳曰楚子圍蕭司馬卯言號申叔展曰有麥麴乎曰無有山芎窮乎曰無河魚腹疾奈何曰目於眢井而出之國語曰叔魚牛腹其母歎曰必以賄死史記曰薄姬曰昨夜夢蒼龍據妾腹帝曰此貴徵也吾為汝成之一幸生男是為代王史記曰范睢說秦昭王曰伍子胥橐載而出昭門夜行晝伏至於陵水無以糊其口𣍿行匍匐稽首肉袒鼓腹吹簫乞食於吳市卒興吳國闔閭為伯東觀漢記曰光武降銅馬諸將未能信賊賊亦兩心上勑賊各歸勒兵上輕騎入賊營賊曰蕭王推赤心置人腹中安得不投死又曰帝問東平王蒼在家何等最樂對曰為善最樂後詔與諸國述之曰王言甚大副其腰腹矣謝承後漢書曰濟陰戎良字子恭年十八為郡門下幹良儀容佳麗太守諸葛禮使寫書從者誣良與婢通良刳腹引出肝腸示禮赤心後漢書曰邊韶字孝先教授數百人韶口辨曾晝眠臥弟子嘲曰邊孝先腹便便懶讀書但欲眠韶潛聞之應之曰吾以邊為姓先為字腹便便五經笥但欲眠思經義寐與周公通夢靜與孔子同意師而可嘲出何典記嘲者大慚魏志曰管輅弟展謂輅曰大將軍待君意厚冀當富貴輅長歎曰天與我明才不與我年壽恐四十七八間不見女嫁男娶吾背無三甲腹無三壬此皆不壽之驗明年四十八卒吳録曰丁固夢腹上生松趙達謂之曰松字十八公後果然夢門已具齊書曰高帝為領軍蒼梧王深相猜忌屢欲害帝常帥數十人直入領軍府時暑熱帝晝臥裸袒蒼梧立帝於室內畫腹為射的自引滿將射之帝神色不動斂袂曰老臣無罪蒼梧左右王天恩諫曰領軍腹大是佳射堋而一箭便死後無可復射不如髇射之乃取髇箭一發即中帝臍蒼梧投弓於地大笑曰此手如何崔鴻十六國春秋後趙録曰佛圖澄腹傍有一孔常以絮塞之每夜書則拔絮孔中出光照于一室又當齊時平旦至流水側復腹傍孔中引出五藏六腑洗之訖還內腹中老子曰虛其心實其腹又曰聖人為腹不為目莊子曰夫赫胥氏之民含餔而熙鼓腹而遊唐子曰人君以江海為腹山為面如此則下不知其量畏而懷之帝王世紀曰紂刳孕婦之腹中以觀其胎吳越春秋曰子胥鞭平王尸三百右手決其目左手踐其腹京房易占曰人生有二腹其國分王子年拾遺録曰孫策母夢腸出委地有神女夜來為其收內腹裏云必生才雄之子方興吳國神女負策母繞吳昌門三匝曰當錫爾此土鼎足於天下談藪曰楊玠娶博陵崔季讓女崔家富圖籍殆將萬卷成婚之後頗亦遊其書齊既而告人曰崔氏書被人盜盡曾不之覺崔遽令檢之玠捫腹曰已藏之經笥矣世說曰郝隆七月七日出日中仰臥人問其故答曰我曬腹中書耳又曰張華既貴有少時賓客來候之華與共飲九醞為酣暢其夜醉眠張常飲此酒眠輒使人左右轉倒其夜客臥志勑左右而左右依常為張公轉側至明起友人猶不起視之酒果穿腹流床下滂沱又曰劉真長始見王丞相時盛暑之月丞相以腹尉彈碁局曰何乃𧥺吳人以吟為𧥺或作訇音與鄭相近劉既出人問見王公如何劉曰未見他異唯作吳語耳又曰郤太尉在京日遣門生與王丞相書求女壻丞相語郤信曰君往東廊下任意選之門生歸白郤云王家諸郎皆可喜聞某來覔女壻咸自矜持唯有一郎在東床坦腹而食如不聞郤云正好比訪之乃是逸少因嫁女與之俗說曰有人指周伯仁腹曰此中何有答此中洪洞容卿等數百人背說文曰背脊也釋名曰背陪也在後稱也廣雅曰背謂之骶音帝背北也左傳莊公曰齊襄公田于貝丘見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼墜于車傷足喪屨反誅屨於徒人費弗得鞭之見血走出遇賊于門劫而束之費曰我奚御哉袒而示之背信之費請先入伏公而出鬭死于門中史記曰婁敬說高祖曰夫與人鬭不扼其亢張晏曰亢喉嚨也拊其背未能全勝也今陛下入關而都秦之故地此亦扼天下之亢而拊其背又曰蒯通知天下權在韓信說之曰相君之面不過封侯相君之背貴乃不可言漢書曰吳王濞高帝兄仲之子上患吳會輕悍無壯王鎮之乃立濞為吳王王三郡五十二城高祖召濞相之曰爾狀有反相因拊其背曰漢帝後五十年東南有亂豈非若耶天下一家慎無反濞頓首曰不敢又曰武帝過平陽主既飲謳者進帝起更衣子夫侍尚衣軒中得幸還坐欣甚賜平陽主金千斤主因奉子夫送入宮子夫上車主拊其背曰行矣強飯勉之即貴願無相忘元朔元年生男據遂立為皇后後漢書曰越騎校尉伍子孚怒董卓凶毒乃朝服懷刃見卓語畢辭去卓送至閣以手撫其背孚因出刀剌之不中卓自奮得免呼左右執殺孚魏略曰孟達降文帝乘小輦執手拊其背戲之曰卿得無為劉備剌客耶又曰太祖丁夫人養劉夫人子修修士於穰下常言將我兒殺之遂哭泣無節太祖忿之遣歸家後太祖就見之夫人方織踞機如故太祖拊其背曰顧我共載歸乎夫人不應太祖卻行戶外遂不應太祖曰真決矣遂與之絶吳志曰魯肅代周瑜之當陸口過呂蒙屯下肅常輕蒙蒙問肅君受重任與關羽為鄰將何計略以備不虞肅造次應曰臨時施宜蒙曰今東西雖一家而關羽實熊虎因為畫五策於是越席就之拊其背曰呂子明吾不知卿才略所及於此子明蒙之字也車頻秦書曰苻堅生肩背赤色隱起狀若篆文付因為苻氏又曰堅背文曰草付之祥因為符氏唐書曰貞觀四年制決罪人不得鞭背以明堂孔穴針灸之所又曰呂溫者以小吏事崔漢衡貞元初吐蕃背盟漢衡為吐蕃所虜將殺之溫趨往以背受刃吐蕃義之由是與漢衡俱免尸子曰醫竘者秦之良醫為宣王割痤為惠王治痔皆愈張子之背腫謂竘曰背非吾背也子製焉醫竘善治疾張子委製焉夫為身與國亦猶此必有所要製然後治矣竘音叩又音齲孔叢子曰仲尼龜背帝王世紀曰簡翟浴玄丘之水燕遺卵吞之剖背生契白虎通曰傳稱周公背僂是謂強後成就周道輔相幼主又孫卿子曰周公傴背不伸也博物志曰宋有田夫自曝背於日其妻曰負日之暄今獻必蒙重賞田夫曰昔人有美戎菽甘芹子獻之鄉豪嘗苦於口笑而棄之論衡曰書言齊桓公負婦人以朝諸侯管仲曰吾君背疽瘡不得婦人瘡不愈此虛也桓公設庭燎夜坐以致賢士豈反以白日負婦人於背乎幽明録曰王子猷先有背疾子敬疾篤恆禁來往聞子敬亡撫心悲惋都不一聲背即潰裂脊說文曰脊背𦛗也釋名曰脊積也積續骨節終上下也春秋元命苞曰陽立於三故人脊三寸而結宋均曰結節結也孝經鉤命決曰仲尼龜脊墨子曰周宣王殺其臣杜伯不辜後三年王田於圃田車徒滿野杜伯乘白馬素車衣朱衣朱冠弓矢射王車上中心折脊王殪車中伏韔而死韔音暢脅說文曰骿并脅也膀兩脅旁也從內脅聲通俗文曰腋下謂之脅釋名曰脅挾也在兩旁臂所挾也春秋元命苞曰陰極於八故人旁八幹長八寸又曰顓頊駢幹上法月參集成紀以理陰陽左傳僖中曰晉公子重耳及曹曹共公聞其駢脅欲觀其裸浴薄而觀之公羊傳曰齊公子彭生送魯莊公拉幹而殺之也史記曰范睢先事魏中大夫須賈賈使齊睢從齊王聞睢辨賜金及牛須賈以為睢持陰事告齊既歸以告魏相魏大怒使人笞擊睢折脅摺齒睢佯死棄於廁吳志曰曹仁攻圍甘寧周瑜救寧圍解乃渡屯北剋期大戰瑜跨馬略陳會流矢中右脅瘡甚便還後仁聞瑜臥瘡未起勒兵就陳瑜乃自輿按行激揚吏士仁遂退晉書曰周顗在中朝時能飲一石及過江雖醉每稱無對偶有舊對從北來顗亦出二石酒共飲各大醉及顗醒使視客已腐脅而死世本曰陸終娶于鬼方氏之妹謂之女嬇音蒯生六子孕而不育三年啓其左脅三人出焉啓其右脅三人出焉王充論衡曰張儀駢脅卒相秦魏外國圖曰大秦國人長脅肋釋名曰肋勒也檢肋五藏也廣雅曰幹謂之肋竹林七賢論曰劉伶嘗醉與俗人相忤其人攘袂而往必欲歐之伶顧而笑曰雞肋不足以安尊拳臍說文曰臍肚臍也釋名曰齊劑也腸端之所限劑也春秋元命苞曰齊者下流並會合為齊腹宋均曰齊中也四方並湊者也左傳莊公曰楚文王過鄧鄧祁侯享之三甥曰亡鄧國者必此人也若不早圖後君噬臍若齧腹齊喻不可及後漢書曰董卓既誅乃尸於市天時始熱卓充肥脂流於地守尸吏燃火置卓臍中光明達曙如是積日漢晉陽秋曰齊王冏之方盛也有婦人詣大司馬門求寄産吏詰之婦人曰我截齊罷便去耳有識者聞而惡其言南燕録曰慕容德其母夢日入臍中晝寢而生德莊子曰支離疏熙隱於臍笑林曰趙伯翁肥大夏日醉臥孫兒緣其肚上戲因以李八九枚內臍中至後日李大爛汁出乃泣謂家人曰我腸爛將死明日李核出乃知孫兒所內李子也腰說文曰腰身中也釋名曰腰約也在體之中約繼大而小也春秋元命苞曰腰而上者為天尊高陽之狀腰而下者為陰豐厚地之重數合於四故腰周四尺後漢書曰東平憲王蒼腰帶八圍顯宗甚重之詔曰日者問東平王處家何等最樂王曰為善最樂其言甚大副是腰腹矣又曰梁冀妻能作折腰步晉書曰陶潛曰不能為五斗米折腰於鄉里小人干寶晉紀曰中書令李豐謀廢大將軍世宗使舍人王羡請之豐來辭不遜左右以刀環築腰死南史曰羊侃有妓張靜琬腰一尺六寸能掌中舞孫荊玉能反腰帖地銜得地上簪二石僞事曰石虎攻中山得鄭略之妹生二男更要崔為妻至相敬待無兒鄭復生男崔求養鄭不許一月卒病死鄭讒崔謂妾多養胡子虎時踞胡床於庭中大怒索弓箭崔聞欲殺之徒跣至虎前曰公勿枉殺妾乞聽妾言虎不聽但言促還坐無預卿崔便去未至虎於後射之中腰而覆墨子曰楚靈王好士細腰故其臣皆三飯為節脅息然後帶扶墻然後起韓子曰楚靈王好細腰國有餓死人尹子曰楚莊王好細腰一國皆有飢色西京雜記曰趙后體腰柔弱善行步進止女弟昭儀不能及也
