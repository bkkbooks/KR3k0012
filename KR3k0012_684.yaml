body:
  text: 儀式部四印許慎說文曰印執政所持信也劉熙釋名曰印信也所以封物為驗也亦言因也封物相因付也史記蘇秦曰使我有洛陽負郭田二頃豈能佩印乎又曰犀首司馬彪曰魏官名也如今虎牙將軍也姓公孫名衍張儀卒後犀首入相秦佩五國相印為從約長又曰漢王與酈食其謀撓楚權食其曰今秦失德棄義侵伐諸侯滅六國之後無立錐之地聞陛下德義莫不嚮風慕義願為臣妾莫若立六國後漢王曰善趣刻印先生因行佩之矣張良從外謁漢王方食具以酈生語告子房曰誰為陛下畫此計者陛下事去矣漢王曰何哉良曰臣請借前箸為大王籌之漢王輟食吐哺罵曰豎儒幾敗乃公事令趣銷印又曰酈寄與典客劉揭說呂祿曰帝使太尉守北軍欲足下之國急歸將印辭去不然禍且起呂祿遂解印屬典客而以兵授太尉太尉將之行令軍中又曰欒大言方伎乃拜大為五利將軍居月餘得四印佩天士將軍地士將軍大通將軍印又封大樂通侯天子刻玉印曰大通將軍使者衣羽衣夜立白茅上五利亦衣羽衣立白茅上受印以示不臣也數月佩六印貴振天下漢書藝文志曰六體者古文奇字篆書隸書繆書蟲書師古曰繆篆謂古文屈曲纏繞所以摹印章也皆所以通知古今文字摹印章書幡信也又曰酈食其說齊王曰項氏為人刻印玩而不能授臣瓚曰項羽吝於爵賞玩惜侯印不能封人韓信傳作刑義兩通又曰張耳責讓陳餘餘怒曰不意君之望臣深也豈以臣重去將哉乃脫解印綬與耳耳不敢受餘走如廁客有說耳天子不取返受不祥急取之耳乃佩其印遂收其兵由此大有隙又曰夏侯嬰從捕虜降卒得印一匱又趙堯傳曰御史大夫周昌為趙相高祖持御史大夫印弄之曰誰可以為御史大夫者熟視堯曰無以易堯遂拜為御史大夫又曰嚴助曰陛下以方寸之印丈二之組鎮撫方外不勞一卒不損一戟而威德並行如使越人蒙死徼幸以逆執事之顏行文頴曰顏行為鴈行在前故曰顏也斯輿之卒有一不備而歸者雖得越王之首臣猶竊為大漢羞之又曰武帝遺詔以討莽何羅功封金日磾為秺侯日磾以帝少不受封輔政歲餘病困大將軍光自封日磾臥受印綬又曰王莽篡位遺謁者即拜龔勝太子師友祭酒以印綬就加勝輒推不受曰吾受漢家厚恩無以報今老矣旦暮入地豈宜以一身事二姓下見故主哉又曰王莽篡位遣五威將王駿率甄阜等六人多齎金帛遺單于諭曉以受命代漢狀因易單于印故文曰胸奴單于璽莽更曰新胸奴單于章詔命令上故印左姑夕侯蘇從旁謂單于曰未見新印文宜勿與單于曰印文何由變更遂解故印綬奉上將率受著新綬不能視印飲食至夜乃罷右率陳饒謂諸將率曰嚮者姑夕侯疑印文幾令單于不與人如令視印見其變改必求故印此非辭說所能距也即引斧椎壞之明日單于果遣右骨都侯當白將率曰漢賜單于璽言璽不言章又無漢字諸王以下乃有漢言章今即去璽加新與臣下無別願得故印將率示以故印謂曰新室順天制作單于宜承天命奉新室之制當還白單于知已無可奈何又多得賂遣即遣弟右賢王奉馬牛隨將率入謝又曰王莽篡位莽皇孫功崇公宗坐自畫容貌被服天子衣冠刻印三一曰維祉冠存巳夏處南山藏薄水祉福也冠存巳夏處南山就陰涼也藏薄冰亦陰二曰肅聖寶繼莽自謂舜後能肅敬得天寶龜宗欲繼之也三曰德封昌圖宗自言以德見封當昌熾受圖籍也後事發案驗宗自殺東觀漢記曰更始立以上為太常偏將軍時無印得定武侯家丞印佩之又曰馬援上書曰印書成睪令而睪為白下羊丞印四下羊尉印白下人人下牛正一縣長吏文不同恐天下不正者多符印所以為信宜齊同事下大司空正郡國印章奏可又段熲上書曰掠得羌侯君長金印三十一錫印一枚皆簿入後漢書曰寇恂初為功曹太守耿況甚重之王莽敗更始立使使者徇郡國曰先降者復爵位恂從耿況迎使者於界上況上印綬使者納之宿無還意恂勒兵入見使者就請之使者不與曰天王使者功曹欲脅之邪恂曰非敢脅使君君者尊之之稱也竊傷計之不詳也今天下初定國信未宣使君建節御命以臨四方郡國莫不延頸傾耳望風歸命今始至上谷而先隳大信隳毀也沮向化之心生離叛之隙將復何以號令它郡乎且耿府君在上谷久為吏人所親今易之得賢則造次未安不賢祗更生亂為使君計莫若復之以安百姓使者不應恂叱左右以使者命召況至恂進印綬帶於況使者不得已乃承制誥之況受而歸又曰獻帝遷許徐以廷尉徵當詣京道為袁術所劫術死軍破璆送前所假汝南東海二郡印綬司徒趙溫謂璆曰君遭大難猶存此邪璆曰昔蘇武困於胸奴不墜七尺之節況此方寸印乎又曰延熹八年沛國戴異得黃釜印無文字遂與廣陵人龍尚等共祭并作符書稱太上皇伏誅又曰張魯在漢中民有地中得玉印者群下欲尊魯為漢寧王功曹閻諫以必為禍先魯從而止魏志曰袁紹欲立幽州牧劉虞為帝太祖拒之紹又嘗得一玉印於太祖坐中舉向其肘太祖笑而惡焉又曰楊奉以天子都安邑醫師走卒皆為校尉御史刻印不供乃以錐畫示有文字或不時得又曰許允善相印出為鎮北將軍將拜以印不善使更刻之如此者三允曰印雖始成而已被辱問送印者果懷之而墜于廁又曰平原太守劉邠取印囊及山雞毛著器中使管輅筮之輅曰內方外圓五色成文合寶守信出則有章此印囊也又曰咸熙元年鎮西將軍衛瓘上雍州兵於成都縣得璧玉印各一印文似成信字依周成王歸禾之義宣示百官相國府吳志曰劉禪襲位諸葛亮秉政與權連和時事所宜權輒輒令陸遜報語并刻權印以置其所權每與禪亮書常過示遜輕重可否有所不安便令改以封行之晉書曰孔愈封餘不亭侯愈曾行經餘不亭見籠龜於路者買而放之溪中流左顧者數四及是鑄侯印而左顧三改如初印工告愈愈悟乃佩焉又曰趙王倫僣位而以茍且之惠取悅人情金銀冶鑄不給於印故有白板之侯君子恥服其章宋書曰孔琳之為尚書左丞楊州中從事史所居著績時責衆官獻便宜琳建言曰夫璽印者所以辨章官爵立契符信官莫大於皇帝爵莫尊於公侯而傳國之璽歷代遞用襲封之印奕世相傳貴在仍舊無取改作今世唯尉一職獨用一印至內外群官每遷悉改討尋其義私所未達若謂官各異姓與傳襲不同則未若異代之為殊也若論其名器雖有公卿之貴未若帝王之重若以或有誅夷之臣忌其凶穢則漢用秦璽延祚四百未聞以子嬰身戮國亡而棄之不佩帝王公侯之尊不疑於傳璽人臣衆僚之卑何嫌於即印載籍未聞其說推別自乖其准而終年刻鑄喪功消實金銀銅炭之費不可稱言非所以因循舊貫易簡之道愚請衆官即用一印無煩改作若新置官官多印少又或零失然後乃鑄則仰禆天府非唯小益齊書曰巴西人趙續伯反奉其鄉人李弘為聖王弘乘佛輿以五綵裹青石誑百姓云天與己玉印當王蜀後敗梁書曰何思澄自廷尉正遷治書侍御史宋齊已來此職甚輕天監初始重其選車前依尚書二丞給三騶執盛印青囊舊事糾彈印綬在前故也又曰王瑩拜將軍印工鑄其印六鑄而龜六毀既成鎮空不實補而用之居職六日暴卒後魏書曰祖瑩為散騎侍郎孝昌中於廣干王第掘得古玉印勑召瑩與黃門侍郎李琰之令辨何世之物瑩云此是于闐國王晉太康中所獻乃以墨塗字觀之果如瑩言時人稱為博物又曰高祖詔軍警給雀印傳符次給馬印又曰高祖承明元年上谷郡人獻玉印有蛟龍之文唐書曰朱泚遣其將韓旻領兵三千趣奉天時奉天未有武備泚召段秀實與謀秀實詐從之乃與將吏謀殺泚且欲追韓旻兵回竊姚令言印不遂乃以司農寺印倒印符牒旻莫辨其印遑遽而回應劭漢官儀曰印者因也正所以虎紐者陽類虎獸之長取其威猛以執伏群下龜者陰物隨時蟄藏以示臣道功成而退也孝武皇帝元狩四年令通官印五分王公侯金二千石銀千石以下銅漢舊儀曰諸侯王黃金橐駝印文曰璽列侯黃金龜紐文曰之印丞相大將軍黃金印龜紐文曰章御史大夫章胸奴單于黃金印橐駝紐文曰章御史二千石銀印龜紐文曰章千石六百石四百石皆銅印鼻紐文曰印章二百石以上皆為通官印續漢禮儀志曰印璽柙金鏤大貴人長公主銅鏤江表傳曰吳歷陵縣有名山臨水高百丈其上三十丈有七穿相傳謂之石印石印神有三郎時歷陵長表言石印文發孫皓大喜遣使祭歷陵使者以高梯上省印文詐以朱書曰楚九州都楊作天子還以印文啓皓皓曰太平之主非孫復誰以印綬拜三郎為王又曰諸葛恪被誅弟融刮金龜印服之而死抱朴子曰古之入山者佩黃神越章印其闊四寸其字百二十以封泥著所住之四方各百步則虎狼不敢近崔豹古今注曰奏劾者絺為囊盛印於前示奉法而行非奏劾者以青繒為囊盛印於後郭子曰大將軍王敦起事丞相導兄弟詣門謝甚有憂色尚書周顗始入丞相呼顗曰伯仁以百口賴卿顗直過不應既入苦相申救甚至既釋顗大悅飲酒致醉而出導等猶在門又呼顗顗不與言顧左右曰今年殺諸賊奴當取一金印如斗大繫肘也列仙傳曰方面者堯時人至夏桀末為官士為人所劫閉之宮中從求道因化而得去更以方回印封其戶時人言得方回一丸泥門戶不可開拾遺録曰禹治水黃龍曳尾於前玄龜負青泥於後玄龜河精之使者龜頷下有印文皆古文作九州山水之字禹所穿鑿之處皆使青泥封記其所使玄龜印其上今之人聚土為界乃遺象也又曰王溥即王吉之後也傭書於洛美形貌又多文辭來僦其書者丈夫贈其衣冠婦人遺其珠玉一日之中衣寶盈車而歸積粟十廩九族莫不仰其衣食洛陽稱其為善而得富也溥先時家貧穿井得鐵印銘曰傭力得富錢至億庾一土三田軍門主簿後以一億庾錢輸官得中壘校尉三田一土壘字也中壘校尉掌北軍壘門故曰軍門主簿也善積降福明神之報也博物志曰常山張皓為梁相天新雨後有烏如山鵲飛翔近地令人擲之墮地為圓石皓令椎破得一金印文曰忠孝侯印皓上之藏之祕府後議郎汝南樊行校書東觀表上言堯舜之時舊有此官今天降印宜可復置述異記曰張字士彥為使持節護羌校尉涼州剌史客相印曰祚傳子孫長有西夏關洛傾陷而涼土獨全在職十三年傳國三世八主一十六載風土記曰豫章新淦縣令刻印而誤作塗相印書曰相印法本出陳長文長文以語韋仲將印士楊利從仲將受法以語許士宗私以法術占吉凶十可八九仲將問長文從誰得法長文曰本出漢世又印工宗養以法語程申伯相印經曰印有八角十二芒印欲得周正上穩下平光明潔清如此皆吉夢書曰印鉤為人子所保也夢見印鉤人得子含吞印鉤懷妊婦也失印子傷墮傅玄印銘曰惟昔先王配天垂則乃設印章作信萬國取象晷儀是銘是刻文明慎密直方其德本立道生歸乎玄黑
