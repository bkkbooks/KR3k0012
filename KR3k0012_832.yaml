body:
  text: 資産部十一獵上周禮地官曰鄉師凡四時之田前期出田法于州里簡其鼓鐸旗物兵器修其卒伍田法人徒及所當有及期以司徒之大旗致衆庶而陳之以旗物辨鄉邑而治其政刑禁巡其前後之屯而戮其犯命者斷其爭禽之訟又曰跡人掌邦田之地政為之厲禁而守之凡田獵者受令焉又曰小司徒凡起徒役母過家一人以其餘為羡唯田與追胥竭作鄭司農云羡饒也田謂獵也追寇賊也竭作盡行又夏官大司馬之職曰中春遂以搜田有司表貉誓民鼓遂圍禁火弊獻禽以祭社春田為搜有司大司徒也掌大田役治徒庶之政令表貉立表而貉祭也誓氏誓以犯田法之罰也中夏遂以苗田如搜之法車弊獻禽以享礿夏田為苗釋取不孕任者若治苗去不秀實者云車弊驅獸之車止中秋遂以獮田如搜田之法羅弊致禽以祀祊秋田為獮獮殺也羅弊罔止也秋田主用罔中殺者多也皆殺而罔止中冬遂以狩田以旌為左右和之門群吏各帥其車徒以敘和出左右陳車徒有司平之旗車卒間以分地前後有屯百步有司巡其前後險野人為主易野車為主冬田為野言守取之無所擇也軍門曰和今謂之壘門立兩旌以為之敘和出用次第出和門也旗軍吏所載分地調其部曲踈數前後有屯百步車徒異群相去之數也險野人為主人居前易野車為主車居前既陳乃設驅逆之車有司表貉于陳前驅驅出禽獸使趨田者也逆逆要不得令走設此車者田僕也中軍以鼙令鼓人皆三鼓群司馬振鐸車徒皆作遂鼓行徒銜枚而進大獸公之小禽私之獲者取左耳又曰田僕掌馭田路以田以鄙田路木路也田田獵也鄙循行縣鄙掌佐車之政佐亦副設驅逆之車驅驅禽使前趨獲逆銜還之使不出圍令獲者植旌以告獲也植樹也及獻比禽田弊獲者各獻其禽比種物相從次數之禮記月令仲冬曰山林藪澤有能取蔬食田獵禽獸者有司教導之又季冬曰乃教田獵以習五戎又曲禮曰國君春田不圍澤大夫不掩群士不取麛卵生乳之時重傷其類又王制曰天子諸侯無事則歲三田一為乾豆二為賓客三為充君之庖三田夏不用無事而不田曰不敬田不以禮曰暴天物天子不合圍諸侯不掩群天子殺則下大綏諸侯殺則下小綏綏當為綏綏有虞氏之旌旗也大夫殺則止佐車佐車止則百姓田獵佐車驅送之車獺祭魚然後虞人入澤梁豺祭獸然後田獵鳩化為鷹然後設罻羅草木零落然後入山林昆蟲未蟄不以火田取物必順時候不麛卵不殺胎不殃夭不覆巢覆敗左傳文公上曰宋華御事逆楚子勞且聽命時楚欲誘呼宋共戰御事華元父遂道以田孟諸孟諸宋大藪也在梁國睢陽縣東北宋公為右盂鄭伯為右盂盂田獵陳名期思公復遂為右司馬復遂楚期思邑公今弋陽期思縣子朱及文之無畏為左司馬將獵張兩甄故置二左司馬然則右司馬一人當中央命夙駕載燧燧取火然者也又襄四年曰昔周辛甲之為太史也命百官官針王闕辛甲周武王大史闕過也使百官各為針辭戒王過於虞人之針虞人掌田獵曰芒芒禹跡畫為九州芒芒遠貌畫分也經啓九道啓開九州之道民有寢廟獸有茂草各有攸處德用不擾人神各有所歸故得不亂在帝后羿冒于原獸冒貪也忘其國恤而思其麀牡言但念獸武不可重重猶數也用不恢于夏家羿以好武雖有家而不能恢大之獸臣司原敢告僕夫獸臣虞人僕夫不取斥尊虞針如是可不懲乎於是晉侯好田故魏絳及之及后羿事又襄十七年曰衛孫蒯田于曹隧越竟而獵孫蒯林父之子飲馬于重丘重丘曹邑毀其瓶重丘人閉門而詬之詬罵也曰親逐其君爾父為厲厲惡鬼林父逐君在十四年是之不憂而何以田為又襄三十年曰鄭豐卷將祭請田焉弗許田獵也田唯君用鮮鮮野獸衆給而已衆臣祭以芻豢為足又昭公曰齊侯田于沛言疾愈行獵沛澤名招虞人以弓不進虞人掌山澤之官公使執之辭曰昔我先君之田旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之仲尼曰守道不如守官君招當往道之常也非物不進官之制也君子韙之韙是也又定公上曰魏獻役於韓簡子及原壽過簡子韓起孫不信也原壽過周大夫而田於大陸焚焉禹貢大陸在巨鹿地嫌絶遠疑此田在汲郡吳澤荒蕪之地大田并見燒也爾雅廣平曰陸還卒於寧寧今修武縣近澤范獻子去其柏槨以其未復命而田也范獻子代魏子為政去其柏槨示貶之又哀公下曰西狩於大野叔孫氏之車子鉏商獲麟大野在高平巨野縣東北大澤是也車子微者鉏商之名以為不祥以賜虞人時所未嘗見故怪虞人掌山澤之官仲尼觀之曰麟也然後取之言魯史所以得書獲麟之也穀梁傳昭公曰秋獀于鴻正也獀狩以習用戎事禮之大者也艾蘭以為防置旃以為轅門禽雖多天子取三十焉其餘射於宮射而中田不得禽則得禽田得禽射而不中則不得禽以是知貴仁義而賤勇力也毛詩鵲巢曰騶虞鵲巢之應也鵲巢之化行人倫既正朝廷既治天下純被文王之化則庶類蕃殖搜田以時仁如騶虞則王道成也彼茁者葭茁出也葭蘆也記蘆始出者著春田之早晚也一發五豝虞人翼五豝以待公之發于嗟乎騶虞騶虞義獸有至信之德則應彼茁者蓬蓬草一發五豵豕一歲曰從于嗟乎騶虞又緇衣叔于田曰叔于田巷無居人不如叔也洵美且仁又雞鳴曰還刺荒也襄公好田獵從禽獸而無厭國人化之遂成風俗習於田獵謂之賢間於馳遂謂之好焉子之還兮遭我乎峱之間兮並驅從兩肩兮揖我謂我儇兮從逐也獸三歲曰肩儇利也又雞鳴盧令曰盧令刺荒也襄公好田獵畢弋不修民事百姓苦之故陳古以風焉盧令令其人美且仁又嘉魚曰吉日美宣王田也吉日維戊既伯既禱田車既好四牡孔阜升彼大阜從其群醜吉日庚午既差我馬獸之所同麀鹿麌麌漆沮之從天子之所周易曰比卦王用三驅失前禽也尚書五子之歌曰太康尸位以逸豫滅厥德黎民咸二乃盤遊無度畋于有洛之表十旬弗反尚書歸藏曰穆王獵于戈之墅韓詩內傳曰春曰畋夏曰獀秋曰獀冬曰狩天子抗大綏諸侯小綏辟小獻禽其下天子親射之旍門夫田獵因以講道習武簡兵也爾雅曰春獵為搜郭璞注曰搜索取不任者夏獵為苗為苗稼除害也秋獵為獮鮮少者從殺氣也冬獵為狩得獸取之無所擇宵田為獠管子曰獠獵畢弋今江東亦呼獵為獠音為遼或曰即今夜獵載爐縣也火田為狩放火燒草獵亦為狩史記曰西伯將畋卜之曰所獲非熊非羆霸王之輔西伯果遇呂望釣于渭濱遂載歸號太公望又曰任安字少卿邑中人民俱出獵安常為人分麋鹿雉兔部署老小劇易衆人皆喜又曰今上為膠東王時韓嫣與上學書相愛及上為太子愈益親嫣善騎射上即位欲事代胸奴而嫣先習胡兵以故益尊貴嫣常與上臥起江都王入朝有詔得從入獵上林中天子車駕馬未行而先使嫣乘副車從數十百騎馳騖視獸江都王望見以為天子避從者伏謁道旁嫣驅不見既過江都王怒為皇太后泣請得歸國入宿衛比韓嫣太后由此嫌嫣戰國策曰魏文侯與虞人期獵是日飲酒樂天雨文侯將出左右曰今日飲酒樂天又雨君焉出文侯曰吾與虞人期獵雖樂豈可不一會期哉乃往漢書曰李廣被黜與故頴陰侯屏居藍田南山中射獵嘗夜從一騎出從人田間飲還至亭霸陵尉醉呵止廣廣騎曰故李將軍也尉曰今將軍尚不得夜行何故也宿廣亭下魏志曰夏侯淵之子稱年十六淵與之畋見奔虎執楯驅馬逐之禁之不可一箭而中名聞太祖太祖把其手喜曰我得將矣又曰文帝將出遊獵鮑勛停車上疏曰五帝三王靡不明本立教以孝治天下奈何在諒暗之中修馳騁之事乎毀其表而竟行獵中道頓息問侍臣獵之與樂何樂八音也侍中劉曄對曰獵勝於樂勛抗辭曰夫樂上通神明下和人理故移風易俗莫善於樂況獵暴華蓋於原野因奏劉曄佞諛不忠又曰蘇則從文帝獵蹉跮失鹿帝大怒踞胡床拔刀悉收督吏將斬之則稽首曰臣聞古之聖王不以禽獸害人今陛下方隆唐堯之化而以獵戲多殺群吏愚臣以為不可敢以死請帝曰卿直臣也遂皆赦之又曰清河令徐季龍使人行獵令管輅筮其所得輅曰當獲小獸復非食禽雖有爪牙微而不彊雖有文章蔚而不明非虎非雉其名曰貍獵人暮歸果如輅言魏末傳曰初帝以母廢未立為嗣文帝與俱獵見子母鹿文帝彎弓射其母令帝復射其子帝置弓泣曰陛下已殺其母臣不忍殺其子帝曰汝語動人心遂定為嗣也吳志曰孫權每日獵常乘馬射虎虎嘗突前攀持馬鞍張昭變色而前曰將軍何有當爾夫為人君者謂能駕御英雄驅使群賢豈謂馳逐於原野校勇於猛獸者乎如有一旦之患奈天下笑何權詔曰年少慮事不過遠以此慚君然猶不能已江表傳曰曹公與孫權書曰兵者奉辭伐罪旍麾南指劉琮束手今水軍八十萬衆與將軍會獵於吳王隱晉書曰魏舒字陽元少工射著韋衣入山澤每獵大獲南史曰宋衡陽王義季鎮荊州嘗大搜於郊有野老帶苫而耕命左右斥之老人擁耒對曰昔楚子盤遊受譏令尹今陽和扇氣播厥之始一日不作人失其時大王馳騁為樂驅斥老夫非勸農之意義季止馬曰此賢者也命賜之食齊書曰王僧達為宣城太守性好遊獵而山郡無事僧達肆意馳騁或三五日不歸受辭辨訟多在獵所人或逢不識問府君所在僧達報曰在近梁書曰曹景宗幼善騎射好畋獵常與少年數十人澤中逐麞鹿每衆騎趁鹿馬相亂景宗於衆中射之人皆懼中馬足應弦輒斃以此為樂後景宗為楊州刺史出行常欲褰車帷幔左右輒諫以位望隆重人所重瞻不宜然景宗謂所親曰我昔在鄉里騎快馬如龍與年少輩數十騎拍弓弦作霹靂聲箭如餓鴟叫平澤中逐麞數助射之渴飲其血饑食其胃甜如甘露漿覺耳後風生鼻頭出火此樂使人忘死不知老之將至今來楊州作貴人動轉不得路行開車幔小人輒言不可閉置車中如三日新婦此邑邑使人無氣南史曰宋臧熹常與溧陽令阮崇獵遇猛獸突圍獵徒並散熹射之應弦而倒崔鴻十六國春秋後趙録曰石虎遣司農中郎將費霸帥工匠四千於東平罡山造獵車千乘轅長三丈高丈八尺格虎車四十乘立級行樓二層於其上自靈昌津南至滎陽東極陽都而還使御史監司其中禽獸有犯者罪至大辟又曰石虎命太子宣行祈山川遊獵藪澤乘大輅羽葆華蓋建天子旌旗十有六軍戎卒八萬出金明馳逐終夕所在陳列行宮四面各以百里為度驅圍禽獸皆暮集行宮文武跪立圍守重行烽炬星羅光燭如晝徑騎百餘馳射其中宣與顯德美人乘輦觀之嬉娛忘反獸殫乃止禽獸奔逸當之者坐有爵者奪又秦録曰姚興性好遊田頗損農要京兆杜延以左僕射齊難無匡輔之益著豐草詩以針之難具以聞馮翊相靈作德獵賦以風焉興皆覽而善之賜以金帛然終不能改也後魏書曰于栗磾隨新安公道武田於白登山見熊將數子顧栗磾曰能搏之乎對曰若搏之不勝豈不虛斃一壯士自可驅致御前而制之尋皆擒獲帝顧而謝之又曰宿石常從獵文成親欲射猛獸石叩馬諫引帝至高原上後猛獸騰躍殺人詔褒美其忠許後有犯罪宥而勿坐又曰來大千常從明元校獵見獸在巖上持矟直刺之應手而死帝嘉其勇壯北史曰齊元恆字集和自言寧三日不食不能一日不獵又曰齊崔子植位冀州別駕走馬從禽髮掛木而死後周書曰達奚震武之子也少驍勇便騎射太祖嘗於渭北校獵時兔過太祖前震與諸將競射之馬倒而墜震足不傾躓因步走射之矢發中兔顧馬才趨遂回身騰上太祖喜曰非此父不生此子乃賜震雜綵百假唐書曰武德七年十二月庚辰臘上曰臘者獵也膢臘以供宗廟朕當躬親其事以申孝享之誠於是出狩於鳴犢泉又曰蘇世長拜諫議大夫嘗從幸涇陽校獵至高陵合圍是日大獲陳禽獸於旌門上入御營顧謂朝臣田畋樂乎世長進曰陛下游獵薄廢萬機不滿十旬未為大樂上色變既而笑曰狂態發也又對曰為臣私計則狂為陛下國計則忠矣又曰唐儉授民部尚書從太宗於洛陽苑射猛獸儉見群豕突出林中太宗引弓四發殪四豕有一雄彘及馬鐙儉懼將搏之太宗拔劍斷豕頭笑曰天策長史不見上將擊賊耶何懼之甚儉對曰漢高祖以馬上得之不可以馬上理之陛下以神武定四方豈復逞雄心於一豕太宗納之因罷獵又曰貞觀十四年太宗欲親幸同州遊獵櫟陽縣丞劉仁軌上疏曰四時搜狩前王恆典事有沿革未必因循今年甘雨應時秋稼甚盛盡力收穫月半猶未畢功貧家無力禾下始擬種麥直據尋常料喚田家以有所妨今既祗供頓事兼之修理橋道縱謂大簡動費一二萬工百姓收斂實為狼狽臣願陛下少留萬乘之尊垂聽一介之說退延旬日收刈揔了則盡間暇家得康寧鑾駕徐動公私交泰上降璽書勞之又曰太宗謂高昌王麴文泰曰丈夫在生樂事有三天下太平家給人足一樂也草淺獸肥以禮田狩弓不虛發箭不妄中二樂也六合大同萬方咸慶張樂高宴上下歡洽三樂也今日王可從禽明日當飲宴耳又曰高宗狩于陸渾縣六日止飛山顛高宗親御弧矢獵四鹿及兔數十頭晚次御營望見太官烹宰欲供百官之膳因問侍中許圉師曰朕目擊彼羊在於格下見其無罪就戮非無憫惻之情今欲以死獸易之可乎圉師對曰昔者宋文侯見人欲將牛釁鍾因曰吾觀此牛觳觫似無罪而就死也乃不釁鍾陛下取已死之鹿代欲刲之羊則堯舜之用心地遂釋其羊不殺九日又於山南布圍大順府果毅王萬興以輒先促圍集衆欲斬之上謂侍臣曰軍令有犯罪在不赦恐外人謂我玩好畋獵輕斷人命又以其從征遼有功特令放免又曰高宗出獵在路遇雨因問諫議大夫谷郍律曰油衣若為不漏對曰能瓦為之必不漏矣上大悅因此不復出獵又曰高宗駕幸自九成宮還宮仍西狩校習自麟遊西北繞歧梁歷普潤止雍為兩圍殿中侍御史杜易簡賈言忠監圍山阜懸危杖策不得暫停凡五日而合劾奏將軍劉玄意黃河上等斷圍玄意抵罪黃河上圍曰軍容齊整詔特原之又曰吳王恪好畋獵損居人田苗侍御史柳範奏彈之上因謂侍御臣曰權萬紀事我兒不能匡正其罪合死範進曰房玄齡事陛下猶不能諫止畋獵豈可獨非萬紀
