body:
  text: 皇親部五敘后事後魏書魏故事將立皇后必令手鑄金人以成者為吉不成則不得立也又世祖高宗緣報母劬勞之恩極尊崇之義雖事乖典禮而觀過知仁後魏神元竇皇后後魏書曰神元竇皇后沒鹿回部大人賓之女賓臨終誡其二子速侯回題令其善事帝及賓卒速侯等欲因帝會喪為變語頗漏泄帝聞之知其終不奉順乃先圖之於是使勇士於中營晨起以佩刀殺后馳使告速侯等言曰后暴崩速侯等驚走赴因執而殺之文封皇后後魏書曰文帝皇后封氏生桓穆二帝後早崩桓帝立乃葬高宗初穿天淵池獲一石銘稱桓帝葬母氏遠近赴會二十餘萬人有司以聞命藏之太廟次妃蘭氏生二子長子曰藍早卒次子思帝也桓維皇后後魏書曰桓帝后維氏生三子長曰普根次惠帝次煬帝平文崩后攝國事時人謂之曰女國后性猛忌平文之崩后所為也平文王皇后後魏書曰平文皇后王氏廣寧人平十三因事入宮得幸於平文生昭成平文崩昭成在襁褓時國有內難將害諸皇子后匿帝於袴中懼人知祝曰若天祚未終者汝便無聲遂良久不啼得免於難烈帝之崩國祚殆危興復大業后之力也十八年崩葬雲中金陵太祖即位配饗太廟昭成慕容皇后後魏書曰昭成皇后慕容氏慕容天真之女也有寵生獻明帝及秦明王后性聰敏多智沉厚善決斷專理內每事多從建國二十三年崩太祖即位配饗太廟獻明賀皇后後魏書曰獻明皇后賀氏父野干東部大人后少以容儀選入東宮生太祖符洛之內侮也后與太祖及故臣民避難北徙俄而高車奄來抄掠后乘車與太祖避賊而南輅失轄后懼仰天告曰國家胤胄豈正爾絶滅也唯神靈扶助遂馳輪正不傾而免難其後劉顯使人將害太祖帝姑為顯弟亢埿妻知之密以告后后乃令太祖去之后夜飲顯使醉之向晨故驚廄中群馬使起視馬后泣而謂曰吾諸子始皆在此今盡亡失汝等誰殺之也故顯不使急追太祖至賀蘭部顯怒將害后后夜奔亢埿家匿神車中三日元埿舉室請救乃得免會劉顯部亂始得亡去皇始元年崩時年四十六祔葬于盛樂金陵追尊諡配饗焉道武慕容皇后後魏書曰道武皇后慕容寶之季女也中山平後入充掖庭得幸左相丞相衛王儀等奏請立后帝從群臣議后鑄金人成乃立之告於郊廟封后母孟為溧陽君後崩道武劉皇后後魏書曰道武宣穆皇后劉眷女也登國初納為夫人生華陰公主後生明元后專理內事寵待有加鑄金人不成故不得登后位魏故事後宮産子將為儲二其母皆賜死太祖末年后以舊法薨太宗即位追尊諡號配饗太祖自此後宮子為帝母加正位配饗焉明元姚皇后後魏書曰明元昭哀皇后姚興女也興封西平長公主太宗以后禮納之後為夫人后以鑄金人不成未升尊位然帝寵幸之出入居處如后焉是後猶欲正位而后謙讓不當五年薨帝追恨之贈皇后璽綬而加諡葬雲中金陵後魏書曰明元密皇后杜氏魏郡鄴人陽平王超之妹也初以良家子選入太子宮有寵生世祖太宗即位拜為貴嬪太常五年薨諡密貴嬪葬雲中金陵世祖即位追尊號諡配饗太廟又立后廟于鄴刺史四時薦祀後甘露降於后廟庭高祖時相州刺史高閎表修后廟詔婦人外成理無獨祀陰必配陽以成天地未聞有莘之國立太姒之饗使罷祀先是世祖保母竇氏初以夫家坐事誅與二女俱入宮操行純備進退以禮太宗命為世祖母性仁慈勤撫導世祖感其恩訓奉養不異所生及即位尊為保太后後尊為皇太后真君元年崩時年六十三諡曰惠葬崞音郭山從后意也初后嘗謂左右曰吾於先朝本無位次不可違禮以從園陵北山之上可以終託故葬焉別立后寢廟於崞山建碑頌德太武赫連皇后後魏書曰太武皇后赫連氏屈萬女也世祖平統萬納后及二妹俱為貴人後立為皇后高宗初崩祔葬金陵太武賀皇后後魏書曰太武敬皇后賀氏代人也初為夫人生恭宗神麚音加元年薨追贈貴嬪葬雲中金陵後追加號諡配饗太廟景穆閭皇后後魏書曰景穆恭皇后郁久閭氏河東王毗妹也少選以入東宮有寵真君元年生高宗世祖末年薨高宗即位追尊號諡葬於雲中金陵是時高宗乳母常氏本遼西人太延中以事入宮世祖選乳高宗慈和履順有劬勞保護之功高宗即位為保太后尋尊為皇太后謁於郊廟和平元年崩諡曰昭葬於廣寧磨笄山俗謂之鳴雞山太后遺志也文成馮皇后後魏書曰文成文明皇后馮氏父朗秦雍二州刺史西郡公母樂浪王氏生后於長安有神光之異朗唑事誅后遂入宮世祖昭儀后之姑也雅有母德撫養教訓年十四高宗踐極以選為貴人後立為皇后高宗崩故事國有大喪三日之後御服器物一以燒焚百官及中宮號泣而臨之后悲叫自投火中左右救之良久乃蘇顯祖即位尊后為皇太后丞相乙渾謀逆顯祖年十三居于諒暗太后密定大策誅渾遂臨朝聽政及高祖生太后躬親撫養是後罷令不聽政事太后行不正內寵李奕顯祖因事誅之太后不得意顯祖暴崩時言太后為之也承明元年尊號曰太皇太后復臨朝聽政太后性聰達自入宮掖粗學書計及登尊極省決萬機高祖詔曰朕以虛寡幼纂寶曆仰恃慈明緝寧四海欲報之德正覺是憑諸鷙音至傷生之類宜放山林其以此地為太皇太后經始靈塔是時罵鷹師曹以其地為報德佛寺太后與高祖遊于方山顧瞻川阜有終焉之志因謂群臣曰舜葬蒼梧二妃不從豈必遠祔山陵然後為貴哉吾百年之後神其安此高祖乃詔有司營建壽陵於方山又起永固石室將終為清廟焉刊石立碑頌太后功德太后以高祖富於春秋乃作勸戒歌三百餘章又作皇誥十八篇太后又制內屬五廟之孫外戚本親緦麻皆受復除素儉性不好華飾躬御縵繒而太后多智略猜忌能行大事是以威福兼作震動內外故王遇張祐符丞祖等拔自微閹歲中而至王公王睿出入臥內數年之間便為宰輔賞齎財帛以千萬億計金書鐵券許以不死之誓李冲雖以器能受任亦由見寵帷幄密加賜齎不可勝數太后曾與高祖幸靈泉池宴群臣及蕃國使人諸方渠帥各令為其方舞高祖率群臣上壽於太后欣然自歌高祖亦和歌遂命群官各言其志於是和歌者九十人太后外禮民望元丕游明根等頒賜金帛輿馬每至褒美睿等皆引丕等而參之以示無私也十四年崩於太和殿年四十九其日有雌雉集于太華殿高祖酌飲不入口五日毀慕過禮諡曰文明太皇太后葬於永固陵高祖毀瘠絶酒肉不肉御者三年初高祖孝於太后乃於永固陵東北里餘營壽宮有終焉瞻望之志及遷洛陽乃自表瀍西以為山園之所而方山靈宮石室至今猶存號曰千年堂文成李皇后後魏書曰文成皇后李氏梁國蒙縣人也頓丘王峻之妹也后之生也有異於常父方叔恆云此女當大貴及長姿質美麗世祖南征永昌王仁出壽春軍至后宅內得后及仁鎮長安遇事誅后與其家人送平城宮高祖登白樓望見之謂左右曰此婦人佳乎左右咸曰然乃下臺后得幸於齊庫中遂有娠常侍太后後問后后云為帝所幸仍有娠時守庫者亦私書壁記之別加驗問皆相符同生顯祖拜貴人薨後諡曰元皇后葬金陵配饗太廟獻文李皇后後魏書曰獻文思皇后李氏中山安壽人南郡王惠之女也姿德婉淑年十八選入東宮顯祖即位為夫人生高祖皇興三年薨上下莫不悼惜葬金陵承明元年追崇號諡配饗大廟孝文林皇后後魏書曰孝文貞皇后林氏平涼人叔父金閭起自閹官有寵於帝太后位至尚書射平涼公金閭兄勝為平涼太守金閭顯祖初為定州刺史未幾為乙渾所誅兄弟皆死勝無子有二女入掖庭后容色美麗得幸於高祖生皇子恂音荀將為儲二太和七年后依舊制薨諡曰貞皇后葬金陵及恂以罪賜死有司奏廢后為庶人孝文廢皇后後魏書曰孝文廢后馮氏太師熙之女太和十七年立為后高祖遵經典禮后及夫人嬪已下接御皆以次進車駕南伐后留京師高祖又南伐后率六宮遷洛陽及后父熙兄誕薨高祖為書慰以敘哀情及車駕還洛恩遇甚厚高祖後重引后姊昭儀至洛稍有寵后禮愛漸衰昭儀自以年長且前入宮掖素見待念輕后而不率妾禮后雖性不妬忌時有愧恨之色昭儀規為內主譖搆百端尋詔廢為庶人后貞謹有德操遂為練行尼孝文馮皇后後魏書曰孝文幽皇后亦馮熙女也母曰常氏本微賤得幸於熙元妃公主薨後遂主家事生后與北平公夙文明太皇太后欲家世貴寵乃簡熙二女俱入掖庭時年十四其一早卒后有姿媚見愛幸未幾疾病文明太后乃遣還家為尼高祖猶留念焉歲餘而文明太后崩高祖服終後頗存訪之又聞后素疾痊除遺璽書勞問遂迎赴洛陽及至寵愛過本專寢當夕宮人稀復進見拜為左昭儀後立為皇后後高祖頻歲南征后遂與閹官高菩薩私亂及高祖在汝南不豫后便公然酸恣中常侍雙蒙等為其心腹中常侍劇鵬諫而不從憤懼致死是時彭城公主宋王劉昶子婦也年少釐居北平公馮夙后之同母弟后求婚於高祖高祖許之而公主志所不願后欲強婚之有日矣公主密與侍婢及家僮十餘人乘輕車冒霖雨赴懸瓠奉見高祖自陳本意因言后與菩薩亂狀高祖聞因駭愕未之全信而祕匿之惟彭城王侍疾左右乃具言其事此後后漸憂懼與母常氏求託女巫禱厭無所不至願高祖疾不起一旦得如文明太后輔少主稱令者許賞報不資音髭乃取三牲宮中妖祠假言祈福專為左道高祖自豫州北幸鄴后慮還見治撿彌懷危怖驟令閹人託參起居皆賜之衣服殷勤託寄勿使漏泄亦令雙蒙充行皆其信者也唯小黃門蘇興壽密陳委曲高祖問其本末勑以勿泄至洛執問菩薩雙蒙六人迭相證舉具得情狀高祖臥含溫室夜引后并列菩薩等於戶外后臨入令閹人搜衣中稱有寸刃便斬后頓首泣謝乃賜坐東楹去御筵二丈餘高祖令菩薩等陳狀讓后曰汝母妖術可具言之后乞屏左右有所密啓高祖勑中侍悉出唯令長秋卿白整在側后猶不言高祖乃令以綿堅塞整耳小語呼整再三無所應乃命后言事隱人莫知之高祖乃呼彭城北海二王令入唑言昔是爾㛐今乃他人俱入勿避二王固辭不獲命及入高祖云此老嫗乃欲白刃捶我肋汝可窮問本末白有所難高祖深自引過致愧二王又云馮家女不能復相廢逐且使在宮中空坐有心乃能自死汝等勿謂吾猶有情也高祖素至孝猶以文明太后故未便行廢良久二王出乃賜后辭決再拜稽首泣涕欷歔令宿東房高祖疾甚謂彭城王協曰後宮久乖陰政自絶于天若不早為之所恐成漢末故事吾死之後可賜自盡別宮可葬以后禮庶掩馮門之大過高祖崩北海王祥奉宣遺旨長秋卿白整等入授后藥后走呼不肯引決執持強之乃含椒而盡殯以后禮諡曰幽后葬長陵營內孝文高皇后後魏書曰孝文昭皇后高氏司徒公肇妹也父揚母蓋氏凡四男三女皆生於東裔高祖初乃舉室西歸達龍城鎮表后德色婉艷任充宮掖及至文明太后親幸北部見后姿貌奇之遂入掖庭年十三初后之幼也曾夢在堂內立而日光自窗中照之灼灼而熱后東西避之光猶斜照不已如是數夕后自怪之以白其父揚揚以問遼東人閔宗曰此奇徵也貴不可言揚曰何以知之宗曰夫日者君之德帝王之象也光照女身將被帝命誕育人君之象遂生世宗後生廣平王懷次長樂公主及馮昭儀寵盛密有母養世宗之意后自代如洛陽暴薨於汲郡之共縣或云昭儀遣人賊后也世祖之為皇太子三日一朝幽后后遂撫念慈愛有加親視櫛沐母道隆備其後有司奏請加諡曰貴人高祖從之世宗踐祚追尊配饗肅宗詔曰文昭皇太后德協坤儀美符大姒作合高祖實誕英聖而夙世淪暉孤瑩弗祔先帝孝感自衷遷奉未遂永言哀恨義結幽明廢呂尊薄禮申漢代又詔曰文帝昭皇太后尊配高祖廟定號促令遷奉自然及始太后當主可更上尊號稱太皇太后初開終寧陵數丈於梓宮上獲大蛇長丈餘黑色頭有王字蟄而不動靈櫬遷還置蛇舊處
