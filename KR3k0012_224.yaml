body:
  text: 職官部二十一諫議大夫六典曰諫議大夫掌侍從贊相規諫諷諭凡諫有五一曰風諫二曰順諫三曰規諫四曰致諫五曰直諫漢書曰韋玄成字少翁以父任為郎少好修文業尤謙遜其接人貧賤者益加由是名譽日廣以明經擢為諫議大夫又曰劉輔以美才擢為諫議大夫成帝欲立趙婕妤為皇后輔上書曰陛下乃觸情縱欲以卑賤之女母天下乎里語曰腐木不可以為柱卑人不可以為主臣辱諫諍之官不敢不盡死言又曰貢禹字少翁元帝徵禹為諫議大夫數虛巳問以政事是時年榖不登禹奏言宮室制度宜從儉省天子納其善言又曰夏侯勝字長公明洪範五行為諫議大夫為人簡易無威儀見時謂上為君誤相字於上前上以此親信之又曰王褒字子淵蜀人也益州刺史王襄欲宣風化於眾庶聞褒有俊材請與相見使褒作中和樂職如淳曰言王政中和在官者樂其職也宣布詩如淳曰國語所謂宣布哲人之令德也蘇林曰歌之名也選好事者令依鹿鳴之聲習而歌之時何武為童子選在歌中武歌於太學宣帝召見曰此盛德之事吾何足以當之益州刺史因奏言襃有軼材上乃徵襃既至詔襃為聖主得賢臣頌擢為諫議大夫又曰揚雄字子雲以耆老久次轉為諫議大夫疾免復召為諫議大夫家至貧嗜酒人稀至其門時有好事者載肴酒以從遊學又曰孔光字子夏經學尤明舉止方正為諫議大夫東觀漢記曰郭丹字少卿從師長安買符入函谷關乃慨然而歎曰丹不乘使者車不出此關既至京師嘗為都講更始二年為諫議大夫持節歸南陽自去家十三年果乘高車出關後漢書曰陳禪字紀山為諫議大夫西南禪國王獻樂及幻人能吐火自支解易牛馬頭大會作之於庭禪離席舉手曰帝王之庭不宜作夷狄之樂又曰韋彪字孟達上䟽曰諫議之職應用公直之士通才謇正有補益於朝者今或從徵試輩為大夫動舉州郡並宜清選其任責以言績其二千石視事雖久而為吏人所便安者宜增秩重賞勿妄遷徙惟留聖心又曰江革轉諫議大夫賜告歸天子思革篤行詔齊相曰諫議大夫江革前以病歸今起居何如夫孝者百行之冠眾善之始也縣以見榖千斛賜巨孝常以八月長吏存問致羊酒以終厥身又曰劉陶字子奇拜諫議大夫靈帝世天下日危陶上䟽言天下亂皆由於宦豎官豎見事急共讒陶詔收黃門北寺獄陶自知必死對使者曰讒邪相求考掠日深臣恨不列稷卨伊周之蹤而與比干龍逢為儔事敗乃悔復何可及閉氣而死續漢書曰周舉字宣光梁啇表為從事中郎啇疾甚帝問遺言對曰臣從事中郎周舉清慎高亮可任諫議大夫謝承後漢書曰傅翻字君成轉諫議大夫天性諒直數陳讜言武帝嘉之又曰虞承字叔明拜諫議大夫雅性忠謇在朝堂犯顏諫爭終不曲撓散祿賑給諸生言德無比魏志曰賈逵字梁道河東襄陵人也自為兒童戲常設部伍祖父習異之曰汝大必為將帥口授兵法數萬言為丞相主簿太祖善之拜諫議大夫與夏侯尚並掌軍計又曰賈逵字梁道太祖征劉備先遣逵至斜谷觀形勢道逢水衡載囚數十逵以軍事急輒竟重者一人皆放其餘太祖善之拜諫議大夫蜀志曰尹默字思潛以左氏傳教授後主踐阼拜諫議大夫晉書曰李尤字伯仁侍中賈逵薦尤有揚雄之才明帝召作東壁雍德陽諸觀銘拜諫議大夫後魏書曰張普惠字洪賑常山九門人為諫議大夫任城王澄謂普惠曰不喜得諫議唯喜諫議得君唐書曰高祖嘗嘲蘇世長曰名長意短口正心邪棄忠貞於鄭國忘信義於吾家世長對曰名長意短實如聖旨口正心邪未敢奉詔昔竇融以河西降漢十世封侯臣以山南歸國唯蒙屯監於是拜為諫議大夫又曰蘇世長擢拜諫議大夫從幸涇陽校獵大獲禽獸於旌門高祖入御營顧謂朝臣曰今日畋樂乎世長進曰陛下遊獵薄廢萬機不滿十旬未為大樂高祖色變既而笑曰狂態發耶世長曰為臣私計則狂為陛下國計則忠矣又曰王珪為諫議大夫嘗有論諫太宗稱善遂詔每宰相入內平章大計必使諫官隨入與聞政事又曰太宗問諫議大夫褚遂良曰舜造漆器禹雕其俎當時諫舜十有餘人食器之間苦諫何也遂良對曰雕琢害農事綦組傷女工首創奢淫危亡之漸漆器不巳必金為之金器不巳必玉為之所以諫臣必諫其漸及其滿盈無所復諫上然之又曰蕭鈞遷諫議大夫時有左武候引駕盧文操踰垣盜左藏庫物高宗以引駕職在糺繩身行盜竊命有司殺之鈞進諫曰文操所犯情實難原然恐天下聞之必謂陛下輕法律賤人命任喜怒貴財物臣之所職以諫為名愚衷所懷不敢不奏帝謂曰卿職在司諫能盡忠規遂特免其死罪顧謂侍臣曰此乃真諫議也又曰武后臨朝置匭四區共為一室列於朝堂東方春色青有能告以養人及勸農可投書於青匭銘之曰延恩南方夏色赤有能正諫論時政之得失可投書於丹匭銘之曰招諫西方秋色白有能自陳抑屈可投書於素匭銘之曰申冤北方水色玄有謀智者可投書於玄匭銘之曰通玄宜令正諫大夫補闕拾遺等一人充使知匭事每日所有投書至暮即進天寶九載三月改匭為獻納又曰李景伯遷諫議大夫中宗嘗宴侍臣及朝集使酒酣令各為廻波詞眾皆為謟佞之詞及自要榮位次至景伯曰廻波爾時酒巵微臣職在箴規侍宴既過三爵諠譁竊恐非儀中宗不悅中書令蕭至忠稱之曰此真諫官也又曰至德元年制諫議大夫論事自今巳後不須令宰相先知又曰乾元二年四月兩省諫官十日一上封事直論得失無假文言既成殿最用存沮勸又曰陽城為諫議大夫裴延齡讒譖陸贄等坐貶黜德宗怒不解在朝無救者城聞而起曰吾諫官也不可天子煞無罪人而信用姦臣即率拾遺王仲舒等數人守延英門上䟽論延齡姦佞贄等無罪狀德宗大怒召宰相入語將加城等罪良久乃解令宰相論遣之於是金吾將軍張萬福聞諫官伏閤諫趍往至延英門大言賀曰朝廷有直臣天下必太平矣遂遍拜城及王仲舒等曰諸諫議能如此言事天下安得不太平巳而連呼太平太平萬福武人時年八十餘自此名重天下又曰崔郾遷諫議大夫穆宗即位荒於禽酒坐朝恒晚郾與同列鄭覃等延英切諫穆宗甚喜之畋遊稍簡又曰文宗嘗於便殿召柳公權周墀對公權論事切直忤旨周墀為之惴慓公權詞氣益堅上徐謂公權曰朕知舍人不合卻作諫議以卿論事有爭臣之風今授卿諫議大夫又曰孔戣為諫議上䟽以事四條陳諷後有李涉投匭上言吐突承璀公忠戣為匭使覽副狀大怒逐之因上䟽苦諫遂貶涉倖臣聞之側目人皆為危之高步公卿間以方嚴見憚又曰馮定為諫議大夫李訓事敗伏誅衣冠撗罹其禍中外危疑及改元御殿中尉仇士良請用神策仗衛在殿門定抗䟽論罷人情危之又請許左右史隨宰臣入延英記事又曰會昌元年中書門下奏據六典隋置諫議大夫七人從四品上大曆二年昇門下侍郎為正三品兩省遂闕四品建官之道有所未周詩云袞職有闕仲山甫補之周漢大臣願入禁闥補過拾遺張衡為侍中常居帷幄從容諷諫此皆大臣之任故其秩峻其任重則君敬其言而行其道况謇諤之地宜有老成之人秩未優崇則難用耆德其諫議大夫望依隋書舊制昇為從四品分為左右以備兩省四品之闕向後與丞郎出入迭用以重其選從之五代史周書曰顯德五年勑諫議大夫宜依舊正五品上仍班位在給事中之下按唐六典諫議大夫四員正五品上皆隸門下省班在給事中之下會昌二年十一月中書門下奏升為正四品下仍分為左右以備兩省四品之闕故其班亦升在給事中之上近朝自諫議大夫拜給事中者官雖序遷位則降等至是以其遷次不倫故改正焉三輔決錄曰第五頡字子陵為諫議大夫洛陽無主人鄉里無田宅寄止靈臺中或十日不炊補闕六典曰補闕唐垂拱中創立四員左右各二天授年初左右各加三員通前為十員其或才職相當不待闕而授言國家有過闕而補正之故以名官焉又曰左右補闕掌供奉諷諫扈從乘輿凡發令舉事有不便於時不合於道大則廷議小則上封若賢良之遺滯於下忠孝之不聞於上則條其事狀而薦言之唐書曰王源中字正蒙早以文學知名升進士第宏詞科累遷至左補闕時典禁軍者不循法度至有臺府人吏皆為追擒源中上䟽其略曰夫臺憲者紀綱之地府縣者責成之所設有罪犯宜歸司存安有北軍勢重於南衙輦下權傾於仗內乞還法司庶守職分憲宗可其請又曰裴垍在中書有獨孤郁李正辭嚴休復自拾遺轉補闕及參謝之際垍廷語之曰獨孤與李二補闕孜孜獻納今之遷轉可謂酬勞無愧矣嚴補闕宮業或異於斯昨者進擬不無疑緩休復悚恧而退又曰文宗以魏謨為補闕上嘗言於宰臣曰太宗皇帝得魏徵採拾闕失弼成聖政今我得魏謨於疑似之間必極匡諫雖不敢希及貞觀之政庶幾處於無過之地命授謨左補闕於內狀備述諫䟽激切詔申書善為之詞唐書曰貞元中韋渠牟為右補闕內供奉僚列初輕之上在延英既對宰相多使中貴人召渠牟於官次同輩始注目矣歲中遷左諫議大夫時延英對秉政財賦之臣晝漏率下二三刻為常渠牟奏御率下五六刻上笑語款洽往往外聞又曰韋溫為右補闕忠鯁救時宋申錫被誣溫昌言曰宋公履行有素身居台輔不當有此是姦人䧟害也吾輩諫官豈避一時之雷電而致聖君賢相蒙蔽惑之咎耶因率同列伏閤切爭之由是知名拾遺六典曰拾遺唐垂拱中創立四員左右各二天授初左右各加二員通前為十員才可則登不拘階敘言國家有遺事拾而論之故以名官焉又曰左右拾遺掌供奉諷諫扈從乘輿凡發今舉事有不便於時不合於道大則廷議小則上封若賢良之遺滯於下忠孝之不聞於上則條其事狀而薦言之唐書曰李邕少知名長安初內史李嶠及監察御史張廷珪並薦邕詞高行直堪為諫諍之官由是召拜左拾遺又曰李邕為左拾遺御史中丞宋璟奏侍臣張昌宗兄弟有不順之言請付法推斷則天初不應邕在陛下進曰臣觀宋璟之言事關社稷望陛下可其奏則天色稍解始允宋璟所請既出或謂邕曰吾子名位尚卑若不稱旨禍將不測何為造次如是邕曰不顛不狂其名不彰若不如此後代何以稱也又曰李邕為左拾遺及中宗即位以沃人鄭普思為祕書監邕上書諫曰蓋人感一飱之惠殞七尺之身况臣為陛下官受陛下祿而得目有所見口不言之是負恩矣自陛下親政日近復在九重所以未聞在外群下竊議道路籍籍皆云普思多行詭惑妄說妖祥唯陛下不知尚見驅使此道若行必撓亂朝政臣至愚至賤不敢以胸臆對揚天庭請以古事明證孔丘云詩三百一言以蔽之曰思無邪陛下今若以普思有奇術可致長生久視之道則爽鳩氏久應得之永有天下非陛下今日可得而求若以普思可致仙方則秦皇漢武久應得之永有天下亦非陛下今日可得而求若以普思可致佛法則漢明梁武久應得之永有天下亦非陛下今日可得而求若以普思可致鬼道則墨翟干寶各獻於至尊矣而二王得之永為天下亦非陛下今日可得而求此皆事涉虛妄歷代無効臣愚不願陛下復行之於明時唯堯舜二帝自古稱聖臣觀所行故在人事敦睦九族平章百姓不聞以鬼神之道聽理天下伏願陛下察之則天下幸甚䟽奏不納又曰許景先常州義興人後徙家洛陽少舉進士授夏陽尉神龍初東都起聖善寺報慈閣景先詣闕獻大像閣賦詞甚美麗擢拜左拾遺又曰蕭昕為左拾遺昕常與布衣張鎬為友館而禮之表薦曰如鎬者用之為王者師不用則幽谷一叟爾玄宗擢鎬拾遺不數年出入將相又曰元和中以左拾遺杜從郁為祕書丞從郁司徒佑之子也初自司議郎為左補闕崔群韋貫之左拾遺獨孤郁等上䟽以為宰相之子不合為諫諍之官於是降為左拾遺群等又奏云拾遺與補闕雖資品不同而皆是諫官父為宰相而子為諫官若政有得失不可使子論父於是改授之又曰元和中延英宰臣對訖左拾遺楊歸厚次請對時上坐久宣令後坐日對來歸厚堅詞固請宰相諭之不退上乃召見歸厚首論中官許遂振次歷詆宰輔皆過激切然而自衒求試其詞甚繁逾刻而罷又曰元稹除左拾遺稹性鋒銳見事風生既居諫垣不欲碌碌自滯事無不言即日上䟽論諫職又曰寶曆中左拾遺李漢右拾遺舒元褒薛廷老等五人於閤內諫曰臣伏見近日除授往往不由中書進擬或是宣出臣恐自此紀綱寖壞姦邪恣行伏乞聖恩詳察上厲聲曰更有何事舒元褒進曰陛下近日修造亦太多上色變曰何處修造元褒俛首不能對薛廷老奏曰臣等是諫臣有所聞即合論奏亦豈知陛下修造之所但見般輦瓦木絕多即知修造不巳伏乞稍留聖慮上曰所奏知然後各復位議者以為不廢其職又曰大和三年左拾遺舒元褒等論中丞溫造凌供奉官事今月四日左補闕李虞與溫造街中相逢造怒不廻避遂捉李虞祇承人禁身一宿決眷杖十下者臣等謹案國朝政故事供奉官街中除宰相外無所廻避今溫造蔑朝廷典故凌陛下近臣恣行胸臆曾無畏忌伏以事有雖小而關分理者即不可失也分理一失亂由之生遺補官秩雖卑乃陛下侍臣也中丞雖高乃法吏也侍臣見凌是不廣敬法吏壞法何以持繩前時中書舍人李虞仲與造相逢造乃曳去引馬知制誥崔咸與造相逢又捉其從人當時緣不上聞所以強暴益甚臣等又聞元和長慶中中丞行李不過半坊今乃遠至兩坊謂之籠街喝道但以尊崇自處不思僣擬之嫌陛下若不因此特有懲革伏恐從此供奉官輩便須廻避中丞累朝制度失自陛下臣等官忝諫列實為陛下惜之奉勑憲官之職在指佞觸邪不在行李自大侍臣之職在獻可替否不在道途相高並列通班合知名分如聞喧競亦以再三既招人言甚損朝體其臺官與供奉官同道聽先後而行道途任祗揖而過其參從人則各隨本官之後少相僻避勿信衝突又聞近日巳來應合有導從官手力多者街衢之中行李太過自今傳呼前後不過三百步唐書曰歸登為右拾遺裴延齡以姦佞有恩欲為相諫議大夫陽城上䟽切直德宗赫怒右補闕熊執易等亦以危言忤旨初執易草䟽成示登登慘然曰願寄一名雷電之下安忍令足下獨當自是同列切諫登每聯署其奏無所廻避時人稱重又曰王仲舒字弘中貞元十年策試賢良方正能直言極諫等科仲舒登乙第超拜右拾遺裴延齡領度支矯誕大言中傷良善仲舒上䟽極論之又曰趙宗儒拜右拾遺翰林學士父驊改祕書少監與父並命出於中旨當時榮之
