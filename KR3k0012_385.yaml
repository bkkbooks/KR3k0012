body:
  text: 人事部二十五幼智上說文曰幼小也釋名曰兒始能行曰孺子懦弱也十五曰童故禮有陽童牛羊之無角者曰童山無草木亦曰童言未巾冠似之左傳僖下曰楚子將圍宋使子文治兵於睽終朝而畢不戮一人子玉復治兵於蒍終日而畢鞭七人貫三人耳國老皆賀子文飲之酒蒍賈尚幼後至不賀子文問之對曰不知所賀子之傳政於子玉曰以靖國也靖諸內而敗諸外所獲幾何子玉之敗子之舉也舉以敗國將何賀焉且子玉剛而無禮不可以治民過三百乘其不能以入矣茍入而賀何後之有又曰秦師過周北門左右免胄而下超乘王孫滿尚幼觀之曰秦師輕而無禮必敗輕則寡謀無禮則脫脫易也入險而脫又不能謀能無敗乎又成公下曰晉欒書中行偃使程滑殺厲公使荀罌士魴逆周子于京師而立之悼公周公生十四年矣大夫逆于清原周子曰孤始願不及此雖及此豈非天乎抑人之求君使出令也立而不從將安用君二三子用我今日否亦今日恭而從之神之所福也傳言火而有才所以能自固對曰群臣之願也敢不唯命是聽戰國策曰文侯疾故使張唐相燕弗肯行少庶子甘羅請行之文侯叱甘羅羅曰夫項橐七歲為孔子師今臣年十二君其試焉奚遽言叱乃見張卿說而行之又曰王孫賈年十五事閔王其母曰汝朝出而晚還則吾倚門而望汝暮出不還則吾倚廬而望汝汝事王王出走不知其處汝尚歸王孫賈乃入市中曰淖齒亂齊殺王欲與我誅者袒右市人從者四百人與之誅淖齒史記曰項羽擊陳留外黃不下數日已降項王令男子年十五以上詣城東欲抗之外黃令舍人兒年十三往說項王曰彭越強劫外黃外黃恐故且降待大王大王至又皆坑之百姓豈有所歸心從此以東梁地十餘城皆恐莫肯下矣項王然其言乃赦外黃當坑者漢書曰賈誼洛陽人年十八以能誦詩書稱於郡中河南守吳公聞其秀才召置門下甚愛之乃言賈誼年少頗通諸家之書文帝召以為博士又曰翟方進汝南上蔡人年十三失父給事太守府為小吏號遲鈍不及事數為掾史所辱方進自傷乃詣京師受經學後漢書曰任延字長孫南陽宛人也年十二為諸生學於長安明詩易春秋顯名太學學中號為任聖童續漢書曰黃琬字子琰江夏人少失父母而辨惠祖父瓊初為魏郡太守建和元年正月日蝕京師不見梁太后詔問所蝕多少琬年七歲在傍曰何不言日蝕之餘如月之初瓊大驚即以其言應詔後深奇愛之時司空盛元疾瓊遣琬候問會江夏上蠻賊事到府元發書視畢微戲琬曰江夏大邦而蠻多士少琬舉手對曰蠻夷猾夏責在司空又曰應奉字世叔聰明自為童兒及長凡所經歷莫不暗記讀書五行並下又曰樂恢字伯奇京兆長陵人父為縣吏得罪令收將殺之恢時年十一常于府寺門晝夜號泣令聞之即解出父又曰陳蕃字仲舉汝南平輿人年十五常閑處一室而庭宇蕪穢父友同郡薛勤來候之謂蕃曰孺子何不洒掃以待賓客蕃曰丈夫處世當除天下安事一室乎勤知其有清世志東觀漢記曰馬援字客卿幼而岐嶷年六歲能應接諸公專對賓客嘗有死罪亡命者來過客卿逃匿不令人知外若訥而沉敏兄甚奇之以為將相器故以客卿字焉又曰班固字孟堅年九歲能屬文誦詩賦及長遂博貫載籍九流百家之言無不窮究學無常師不為章句大義而已性寬和容眾不以才能高人諸儒以此慕之又曰丁鴻年十三從桓榮受歐陽尚書三年而明章句善論難為都講遂篤志精銳布衣荷檐不遠千里又曰張堪字君遊年六歲受業長安治梁丘易才美而高京師號曰聖童又曰鄧禹字仲華南陽新野人年十三能誦詩受業長安時上亦遊學京師禹年雖幼而見上知非常人遂相親附及漢兵起即策杖北渡追及上於鄴又曰承宮琅琊姑蘇人少孤年八歲為人牧豬鄉里徐子盛明春秋經授諸生數百人宮過其廬下見諸生講誦好因棄其豬而聽經豬主怪其不還來索見宮欲笞之門下生共禁止因留精舍門下樵薪又曰魯恭父建武初為甘陵太守卒官時年十二弟平年七歲晝夜號踴不絕聲郡中賻贈無所受歸服喪禮過成人又曰吳祐字季英陳留長垣人父恢為南海太守祐年十二恢欲殺青簡以寫經書祐諫曰今大人逾越五嶺遠在海濱其俗舊多珍怪此書若成則載之兼兩昔馬援以薏苡興謗其陽以衣囊邀名嫌疑之間誠先賢所慎也恢乃止撫其首曰吳世不乏季子矣又曰和熹鄧后年五歲太夫人為斷髮夫人年耆目寘并中后額雖痛忍而不言左右怪問之后言曰難傷老人意故忍之又曰黃香字文強江夏安陸人年九歲失母思慕憔悴殆不免喪鄉人稱其至孝年十二博覽傳記京師號曰日下無雙江夏黃香英雄記曰曹純字子和年十四喪父業富於財僮使人僕以百數純綱紀督御之不失其理好樂學問敬愛學士學士多歸焉由是為遠近所稱年十六為黃門郎漢雜事曰陳寔字仲弓漢末太史家瞻星有德星見當有英才賢德同遊者書下諸郡縣問頴川郡上事其日有陳太丘父子四人俱共會社小兒季方御大兒元方從抱孫子長文此是也魏氏春秋曰袁氏之敗也孔融與太祖書曰武王伐紂以妲己賜周公太祖後見問之對曰以今度之想其當爾融被收二子年八歲時方弈棊端坐不起左右曰而父見執不起何也二子曰安有巢毀而卵不破者乎魏志曰鍾會字士季頴川長社人太傅繇小子也少敏惠夙成中護軍蔣濟著論曰觀其眸子足以知人會年五歲繇遣見濟濟甚異之曰非常人又曰賈逵字梁道河東襄陵人自為童戲弄常設部伍祖父習異之曰汝大必為將帥口授兵法數萬言又曰楊俊同郡王象少孤時為人樸隸年十七八見使牧羊而私讀書因獲捶楚俊美其才質即贖象著家娉娶立屋然後與別又曰劉廙字恭嗣南陽安眾人年七歲戲講堂上頴川司馬德操撫其頭曰孺子孺子黃中通理寧自知不又曰司馬朗字伯達河內溫縣人年九歲人有稱其父字者朗曰慢人者不敬其親客謝之十二試為童子郎又曰王粲為中郎蔡邕見而奇之時邕顯著貴重朝廷常車騎填巷賓客盈坐聞粲在門倒屣迎之及至年既幼弱容狀短小一坐盡驚邕曰此王公孫也有異才吾不如也吾家書籍文章盡當與之又曰陳群字長文頴川許昌人祖父寔父紀叔父諶皆有盛名群為兒時寔常奇之謂宗人父老曰此兒必興吾宗又曰常林字伯槐河內溫人年七歲父黨造門問林曰伯先在不汝何不拜林曰對子字父何拜之有於是咸共嘉之又曰曹休字文烈太祖族子年十餘歲見太祖太祖謂左右曰此吾家千里駒也使與文帝同止見侍如子常從征討使領虎豹騎又曰夏侯惇字元讓沛國譙人年四歲求師就學人有辱其師者惇殺之由是以烈氣聞吳書曰虞翻少好學有才氣年十二客有候其凡者不過翻翻追與書曰僕聞琥珀不授腐草礠石不授曲針過而不存不亦宜乎客得書異之又曰沈友字子正吳郡人年十一華歆行風俗見而異之因呼沈郎可登車語乎友逡巡卻曰先生銜命將以裨補先王之教齊風俗也而輕脫威儀猶負薪救火無乃更崇其熾乎歆慚曰自桓靈來未有幼童若此者又曰陸績年六歲於九江見袁術術出橘與績績懷三枚去拜辤墮地術曰陸郎作賓客而懷橘乎績跪荅曰欲歸遺母術大奇之蜀志曰諸葛亮子膽字思遠亮與兄瑾書曰瞻今已八歲聰惠可愛嫌其早成不為重器耳晉書曰王戎幼而潁悟神彩秀徹視日不眩裴楷見而目之曰戎眼爛爛如巖下電年六七歲於宣武場觀戲猛獸在檻中虓闞震地眾皆奔走戎獨立不動神色自若魏明帝於閤上見而奇之又曰王澄字平子生而警悟雖未能言見人舉動便識其意衍妻郭性貪鄙欲令婢路上擔糞澄年十四諫郭以為不可又曰中宗太子紹幼而聰哲年數歲嘗置中宗睞上會長安使來中宗因問曰汝謂日與長安孰遠對曰日遠中宗問其故荅曰不聞人從日邊來然可知耳中宗異之明日會群臣又問之對曰日近中宗失色曰何異昨日之言對曰舉目見日不見長安由是益奇之又曰王舒字允之總角時嘗從從伯敦敦與錢鳳謀逆而允之時飲酒帳中臥悉聞其言慮敦疑之便於臥處吐涕狼藉敦果疑遣看之見吐唾以為醉又曰謝尚字仁祖豫章太守鯤之子幼有至性八歲風神夙悟鯤嘗攜之送客或曰此兒一座之顏回也尚應聲曰座無尼父焉識顏回賓客莫不歎異年十歲遭父憂丹陽尹溫嶠吊之尚號哭極哀既而收涕告訴舉止有異常童嶠甚奇之又曰韓康伯早孤家貧年數歲母為作襦子令康伯捉熨母謂曰且著尋為汝作袴伯曰已足不復煩母問其故荅曰如火在熨斗中而柄亦熱今既著襦皆當暖也母異之未有幼童若王隱晉書曰王儉字元衡內史下邳陳邵擅名徐州邵聞儉年十四善屬文請作祝文邵謂郡客曰此生為文有可觀采命為督郵主簿邵遷給事儉每為定表晉中興書曰謝安字安石年四歲桓彝見而歎曰此兒風神秀徹後當不減王東海總角神識深敏氣宇條暢丞相王導知之由是著名又曰范宣陳留人年十歲能誦詩書嘗以刀傷手捧手改容人問痛耶荅曰受全之體而致毀傷不可處耳少好學手不釋卷博覽眾書善三禮又曰戴逵字安道譙國人少博學好談論善屬文能鼓琴工書畫晝其餘巧藝靡不畢綜總角時以雞卵汁溲白瓦屑作鄭玄碑又為文手自刻字文既綺藻器亦妙絕時人莫不驚歎知其深敏宋書曰劉秀之字道寶少孤貧有志操十許歲時與諸兒戲於前渚忽有大虵來勢甚猛無不顛怖驚呼秀之猶不動眾並異焉又曰王僧達幼聰敏弘為州縣僧達六七歲遇有通訟者竊覽其辤謂為有理及入訟者亦進弘意其小留左右僧達為申理闇誦不失一句又曰徐湛之幼與弟淳之共車行牛奔車左右人馳來赴之湛之先令取弟眾咸歎其幼而有識又曰蔡興宗字興宗幼為父廊所重謂有己風與親故書曰小兒四歲神氣似可不入非類室不與小人遊故以興宗為之名興宗為之字齊書曰王慈字伯寶琅耶臨沂人司空僧虔子也八歲外祖宋江夏王義恭施寶物恣聽所取慈唯取素琴石硯義恭善之又曰傳昭六歲而孤哀毀如成人為外祖所養十歲於朱雀航賣歷日雍州刺史袁顗見而奇之顗嘗來昭所昭讀書自若神色不改顗歎曰此兒神情不凡必成佳器又曰顧協從祖右光祿大夫張永嘗攜內外孫姪遊武丘山協年數歲永撫之曰兒欲何戲協曰兒正欲枕石漱流永歎息曰顧氏興於此子及長好學以精力稱又曰顧歡年六七歲父使驅田中雀遂作黃雀賦而歸雀食稻過半父怒將撻之見賦乃止梁史曰沈璞字道真童孺神意閑審武帝召見奇璞應對謂林子曰此非常兒也初除南平王左常侍陳書曰王元規八歲而孤兄弟三人隨母依舅氏往臨海郡時年十二郡土豪劉瑱者資財巨萬欲妻以女母以其兄弟幼弱欲結強援元規泣謂曰姻不失親古人所重豈得茍安異壤輒婚非類母感其言而止崔鴻十六國春秋前涼錄曰辛攀字懷遠年七歲隨父爽在京師北地程曉爽之親友目攀而笑曰犁牛騂犢孺子之謂攀曰戲及人親非雅訓也曉及眾賓大奇異之又後趙錄曰徐光字季武頓丘人父聰以牛醫為業光幼好學有文才年十三嘉平中王陽攻頓丘掠之令主抹馬光但書柱為詩賦而不親馬事陽怒撻之啼呼終夜不止左右以白陽陽召光付紙筆光立為頌陽奇之又夏錄曰吐谷渾拾寅者虔國之弟也年數歲猶大啼笑母氏念憂其不惠父樹洛于曰此兒吾家驪肩馴駒伯樂尚不能目之而況庸人哉終成吾門戶者必在此子年六七歲而器識不恒或謂之神童後魏書曰裴駿字神駒河東聞喜人幼而聰惠親表異之稱為神駒因以為字駿從弟子安祖少而聰惠年八九歲就師講誦詩至鹿鳴篇語兄云鹿雖禽獸得食相呼而況人也自此之後未嘗獨食又曰任城王澄之子順字子和年九歲師事樂安陳豐初書王羲之小學篇數千言晝夜誦旬有五日一皆通利豐奇之白澄曰豐十五從師迄于白首耳目所經未見此江夏黃童不得無雙也澄笑曰藍田生玉何容不爾三國典略曰趙隱字彥深年五歲母傅便孀居傅謂之曰家貧兒小何以能濟隱泣而言曰若天矜兒大當仰報年十歲司徒崔光奇之謂賓客曰古人云觀眸子足以知之此兒必當遠至
