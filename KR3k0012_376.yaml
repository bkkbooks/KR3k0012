body:
  text: 人事部十六肉説文曰脢音梅背肉也胂音身夾脊肉也瘜寄肉也瘜音息釋名曰肉柔也禮記檀弓下曰延陵季子適齊長子死葬於嬴博之間號之曰骨肉歸於土魂氣無不之左傳宣公十二年曰楚子北師次于郔將飲馬於河而歸聞晉師既濟王欲還嬖人伍參欲戰令尹孫叔敖弗欲曰昔歲入陳今茲入鄭不無事矣戰而不捷參之肉其足食乎參曰若事之捷孫叔為無謀矣戰若不捷參之肉將在晉軍可得食乎史記曰晉公子重耳在齊五年趙衰等謀醉重耳載以行行遠而覺重耳引戈欲殺咎犯咎犯曰殺臣成子偃之願也重耳曰事不成我食舅氏之肉咎犯曰事不成犯肉腥臊何足食乃止偃咎犯名也呂氏春秋曰齊有人一居東郭一居西郭幸而相遇飲酒曰須肉各抽刀自割相啖乃至于死交州名士傳曰張重字仲篤舉計漢明帝易重問何短小重曰陛下欲得其才將稱骨度肉也唐書曰先天中有王知道母患骨蒸醫云須得生人肉食之知道遂密割股上肉半斤許加五味以進母食之便愈黃帝素問曰脾主肉久坐傷肉脾熱者色黃而肉軟楚辭大招曰豐肉微骨體更狷皮膚釋名曰皮被也被覆體也膚布也布在表也禮記曰古者深衣蓋有制度以應規矩繩權衡短母見膚衣取蔽形長無被土毛詩碩人曰手如柔荑膚如凝脂孝經曰身體髮膚受之父母不敢毀傷孝之始也莊子曰藐姑射之山有神人居之肌膚若冰雪商子曰上世之士衣不暖膚食不滿腹苦其心意勞其四肢抱朴子曰素顏紅膚惑其目清商流徵亂其聽列異傳曰蔡經與神交神將去家人見經詣井上飲水上馬而去視井上俱見經皮如蛇蛻遂不還西京雜記曰文君姣好眉色如望遠山臉際常若芙蓉肌膚柔滑如脂十七而寡為人放誕風流悅長卿之才而越禮焉新論語曰髮生於皮去髮而皮不知王子年拾遺録曰燕昭王三年廣延之國去燕七萬里或云在扶桑之東獻善儛者二人一名提波一名攜漢並玉晢凝膚骨輕氣馥綽約婉妙絶古無倫語林曰賈充問孫皓何以剝人面皮皓曰憎其顏之厚也骨説文曰骨體之質也肉之核也釋名曰骨堅而滑也似木枝格孝經援神契曰周道衰路有飢骨血成池史記曰楚圍宋五月不解宋城中急無食華元乃夜私見楚將子反告莊王王問曰城中何如曰析骨而炊易子而食又曰孔子適周將問禮於老子老子曰子所言者其人與骨皆已朽矣獨其言在耳帝王世紀曰殷時有仙女名昌容隔肉見骨東觀漢記曰陳寵字昭公為廣漢太守先是雒縣城南每陰雨常有鬼哭聲寵使案行昔歲倉卒時骸骨不葬者多寵乃勑縣葬埋由是即絶晉書曰桓溫生未期溫嶠見曰此兒有奇骨相可使啼嶠曰真英物也因名溫尸子曰徐偃王有筋無骨公孫尼子曰多食甘者有益於肉而骨不利燕丹子曰田光曰竊觀太子客無可用者武陽骨勇之人怒而面白賈子曰文王晝臥夢人登城呼曰我東北陬稿骨也速以人君葬我文王曰諾覺召吏令以人君葬之吏曰以五大夫葬之文王曰吾夢中已許之民聞之曰我君不以夢故背稿骨況生人乎乃下信其上孔叢子曰孔附謂陳王曰梁人有揚由者伎巧過人骨騰肉飛國語曰吳伐越隳會稽獲骨焉一節專車使問仲尼曰禹致群臣於會稽防風氏後至戮之其骨專車此為大矣新序曰文王之葬枯骨無益衆庶衆庶悅之恩義動人也列仙傳曰寧封黃帝時陶正有神人過之為其掌火能出五色煙久之教封子積火自燒而隨煙氣上下視其灰燼猶有骨時人葬之謂之封子列異傳曰蔣子文漢末為秣陵尉自謂骨青死當為神西京雜記曰戚姬以百鍊金為彄環照見指上骨彄革侯王子年拾遺録曰沐胥國人忽復化為老叟俄而即死臭爛盈屋人有除燒其骸骨於糞土之中復還為人矣搜神記曰有談生無婦有女來為其婦三年生一兒曰慎勿以火照我三年後可照生盜照之腰已上皆肉腰以下但枯骨婦求去續搜神記曰司徒蔡謨親有王蒙者單獨常為蔡公所收養蒙長才五尺似為無骨登床輒令抱上扶南傳曰頓遜國人死鳥葬或火葬鳥葬者病困便歌舞送郭外有鳥如鵝緑色飛來萬許啄食都盡斂骨焚之沉於海水此必生天上鳥若不食自悲傷乃就火葬取骨埋之世説曰王右軍目陳玄伯塊壘有正骨司馬相如美人賦曰皓體陳露弱骨豐肌筋説文曰筋體之力也可以相連屬作用也釋名曰筋力也肉中之力氣之元也禮記曲禮曰老者不以體力為禮左傳哀公上曰衛太子禱曰敢告無絶筋無折骨無面傷以集大事無作三祖羞公孫尼子曰多食苦者而筋不利多食辛者有益於筋而氣不利韓子曰淖齒之用齊擢閔王之筋縣之廟梁宿昔而死論衡曰命富之人筋力自強命貴之人才智自高物理論曰夫清忠之士乃千人之表萬人之英得其人則事易於反手不得其人則難於拔筋脈釋名曰脈幕也絡一體也史記曰扁鵲以長桑君言飲藥三十日視見垣一方人以此視病盡見五藏病結特以診脈為名耳又曰趙簡子為大夫專國事簡子疾五日不知人於是召扁鵲扁鵲入視病出董安于問扁鵲扁鵲曰血脈治也而何怪秦穆公嘗如此七日而寤今主君之病與之同不出三日必間居二日半簡子寤又曰扁鵲過虢虢太子死扁鵲至虢宮門下曰聞太子不幸而死臣能生之中庶子曰先生得無誕乎何以言太子可生也扁鵲曰越人之為方也不待切脈望色聽聲寫形言病之所在子以吾言為不誠試入診太子當聞其耳鳴而鼻張揗其兩股以至於陰當尚溫也中庶子聞入報虢君虢君大驚出見扁鵲於中闕扁鵲曰若太子病者所謂尸蹶者也是以陽脈下遂音隊陰脈上爭會氣閉而不通陰上而陽內行下內鼓而不起上外絶而不為使上有絶陽之絡下有破陰之細破陰絶陽色廢脈亂形靜如死狀太子未死也又曰扁鵲過齊齊桓侯客之入朝見曰君有疾在血脈不治恐深桓侯曰寡人無疾又曰齊太倉公淳于意少而喜醫更師同郡元里陽公受其脈書上下經五診奇音羈咳音咳術揆度陰陽診病知人死生漢書曰王莽得翟義黨王孫度使太醫與巧屠共刳剝之量度五藏以竹筳音庭導其脈知其所終始云可以治病後漢書曰郭玉為人善別脈知人生死章帝令童男著女子之衣詐云其病使玉診脈玉曰此女雖言病據脈陽盛陰微臣謂非女子帝善之三國典略曰周武帝不豫止於雲陽宮內史柳升私問姚僧坦曰至尊貶膳日久脈候何如對曰天子上應天心非愚所及凡庶如此萬無一全鶡冠子曰魏文侯問扁鵲曰子昆弟三人並醫其孰最善扁鵲曰長兄視神故名不出家仲兄視毫毛故名不出閭鵲針人血脈救人生死名聞天下燕丹子曰田光竊觀太子客無可用者宋意脈勇之人怒而面青論衡曰王莽時省五經平章句弟子郭略夜定舊記死於燭下精思不任脈絶氣滅崔元始正論曰風俗者國之脈診也年穀如其肌膚肌膚雖和而脈診不和亦未為休也髓説文曰髓骨中脂也史記曰扁鵲過齊桓侯客之後五日復見望桓侯而退走桓侯使人問其故扁鵲曰疾之居腠理也湯尉之所能及在血脈針石所能及在腸胃酒醪之所能及其在骨髓雖司命無奈之何也今疾在骨髓臣是以無請也後五日桓侯體病使人召扁鵲鵲已逃去桓侯遂死又曰勾踐頓首再拜答子貢曰孤嘗不料力乃與吳戰困於會稽痛入於骨髓帝王世紀曰紂斬朝涉之脛而觀其髓酈善長水經注曰淇水歷汲郡西南出朝歌城西北東南徑朝歌臺下俗謂之陽河水也紂在臺見老人晨將渡水而沉吟難濟紂問其故左右曰老者髓不實故畏寒紂乃於此斫脛而視髓腦左傳僖下曰晉文公夢與楚王搏楚子伏己而鹽其腦子犯曰吉我得天楚伏其罪吾且柔之矣杜預注云腦能柔物春秋元命苞曰腦之為言在也人精在腦韓詩外傳曰禽息秦大夫薦百里奚不見納繆公出當車以頭擊闑五結切腦乃精出曰臣生無補於國不如死也繆公感寤而用百里奚秦以大化史記曰昔趙襄子以其姊為代王妻後與王遇於句注之塞廚人進斟因反斗以擊代王殺之王腦塗地三國典略曰齊南陽王綽與齊主俱五月五日生武成以綽母李夫人非嫡故貶之為弟俗云其日生者腦不壞爛死後踰一年方許收殮毛髮不落如生人焉神異經曰西荒中有人長短如人著百結敗衣手足虎瓜名摸豹見人獨自輒就人欲食腦先捕虱人伺其臥舌出槃地丈餘便燒石投其舌於是絶氣而死若不如此寤而輒食人腦列異傳曰陳倉有得異物其形不類豬不似羊莫能名以獻秦穆公道遇二童子曰此名為蝹述常在地下食死人腦若欲殺之以柏燒其頭蝹音襖西京雜記曰廣陵王胥有勇力恆於別囿學格熊後遂空手搏之陷腦而死血釋名曰血濊也流濊濊也濊乎會切禮記檀弓曰高子皋之執親之喪也泣血三年左傳莊公八年曰齊侯田于貝丘傷足喪屨反誅屨於徒人費弗得鞭之見血又成公上曰齊晉將戰郤克傷於矢流血及屨未絶鼓音張侯曰余病矣郤至曰自師始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之張侯解張也朱血色血色久則殷今人謂朱黑殷也言血多汙車輪後不敢息也春秋考異郵曰龍門之下血如江宋均曰龍門戰在魯桓十三年易屯卦曰乘馬班如泣血漣如尚書武成曰紂前徒倒戈攻于後以北血流漂杵孔安國注曰流漂舂杵論語季氏曰君子有三誡血氣未定誡之在色血氣方剛誡之在鬭血氣既衰誡之在得漢書曰申屠嘉為丞相鄧通居上傍怠慢嘉為擊召通責曰朝廷者高帝朝廷也通小臣戲殿上大不敬當斬通頓首血出不解文帝度嘉已困通持節召通而謝嘉漢書曰息夫躬坐咒詛下獄仰天大呼血從鼻出食頃而死東觀漢記曰逢萌隱琅琊不勞山非禮不動藂落化之北海太守遣吏奉謁萌不諾太守遣吏捕之民相率以石擲吏皆流血奔走又曰耿秉為征西將軍鎮撫單于以下及薨南單于舉國發哀犁面流血謝承後漢書曰吳郡媯皓字元起父為南郡太守坐事繫獄皓懷小石至公卿間輒出石叩頭其上流血覆面父繫得免虞預晉書曰元康元年河間成都二王舉兵向京都朝廷北討徵嵇紹為侍中王旅不振敗績於蕩陰百官侍衛莫不潰散唯紹以身捍寇兵突御輦飛矢雨集紹遂被害於帝側血濺御服及定左右欲浣衣帝曰此嵇侍中血勿去又曰丞相府斬督運令史淳于伯血逆流著柱終柱末二丈三尺旋復流下四尺五寸百姓咸稱其冤晉書張軌傳曰漢末金城人陽成遠殺太守以叛郡人馮忠赴尸號哭歐血而死又曰桓溫父彝為韓晃所害涇令江播預焉溫時年十五枕戈泣血志在復讎崔鴻十六國春秋後趙録曰伏都有膂力善尺牘攻石閔不剋為閔所殺橫尸相枕血流成渠誅諸胡羯無貴賤男女皆斬之死者二十餘萬于時高鼻多鬚至有濫死者又北燕録曰馮躍宴郡僚忽有血流左臂躍惡之從事中郎王乘因陳符命之應躍戒其勿言南史曰蕭睿明母病風積年沉臥睿明晝夜禱祈時寒下淚為冰叩頭血出亦為冰不溜陳書曰吳明徹殺王琳有一叟以酒脯來至號酹盡哀收其血懷之而去三國典略曰齊主於涼風堂召孝昭第二子百年遣左右亂捶擊之又令曳以繞堂所行之處血皆遍地又曰齊主將殺開府高德正召而謂之曰聞爾病我為爾針以刀子剌之血流霑地又曰周師圍江陵謝答仁請守子城梁主即授城內大都督既而召王裒謀之裒以為不可答仁請入不得歐血而去唐書曰王君廓鎮幽州會突厥入寇君廓邀擊破之高祖大悅徵入朝賜以御馬令於殿庭乘之而出因謂侍臣曰吾聞藺相如叱秦皇目眥出血君廓往擊竇建德將出戰李績遏之君廓發憤大呼目及鼻耳一時流血此之壯氣何謝古人不可以常例賞之復賜錦袍金帶又曰輔公祏據江東反發兵寇壽陽命李孝恭為行軍元帥以擊之孝恭自荊州趣九江將發與諸將宴集命取水忽變為血在坐者皆失色孝恭舉止自若徐諭之曰禍福無門唯人所召自顧無負於物諸君何見憂之深公祏惡積禍盈今承廟算以致討碗音碗中之血乃公祏授首之徵又曰李思摩頡利族人也授右衛將軍從征遼東為流矢所中太宗親為吮血又曰李子慎誣告其舅以獲五品其母見其著緋衫覆面床下泣涕曰此是汝舅血染者耶又曰玄宗幸蜀次馬嵬召左相韋見素見素出店為亂兵所撾頭血流地上遽令壽王傳詔止之又曰天寶十五年安祿山下將蔡希德攻陷常山郡執太守顏杲卿長史袁履謙殺掠人吏萬餘人城中流血又曰竇軌每臨戎對寇或經旬月身不解甲其部衆無貴賤少長不恭命即立斬之每日被事多所鞭撻流血滿庭見者莫不股栗又曰劉審禮丁父憂去職及葬跣足隨車流血灑地行路稱之又曰牛徽為吏部員外郎巢賊犯京師父蔚方病徽與其子自扶籃音監輿投竄山南閣路險狹盜賊縱橫谷中盜擊徽破首血流被體而捉輿不輟莊子曰萇弘死乎蜀藏其血三年化為碧燕丹子曰竊觀太子客無可用者夏扶血勇之人怒而面赤賈子曰炎帝黃帝異母兄弟各有天下之半戰於涿鹿之野血流漂杵山海經曰禹堙洪水殺相繇其血腥臭不可生五穀以其地為臺相繇一名相仰春秋後語曰燕太子丹豫求天下名利匕首得趙人徐夫人匕首取之百金使工以藥淬之以試人血濡縷無不立死者裴駰曰言以匕首傷人血出霑濡絲縷便立死讀如儒也説苑曰蔡威公閉門而哭三日泣盡而繼之以血幽明録曰王伯陽亡其子營墓得三漆棺移置南缸夜夢魯肅瞋云當殺汝父尋復夢見伯陽云魯肅與弟爭墓後於坐褥上見數升血疑魯肅殺之故也墓今在長廣橋東一里汝南先賢傳曰陽安令趙規與朗陵太守黃萌爭水規割指詛曰隨血所流入陽安界萌忿殺規小吏王朔復剌殺萌朗陵官屬又殺朔民於京山上為朔作祠壇每水旱輒往祈禱博物志曰戰鬭死亡處有人馬血積年化為磷磷著地及草木如霜露略不可見人行或有觸著體便有光拂拭便分散無數又細吒聲如沙豆住久乃滅其人忽忽如失魂經日乃差憐音鄰又音吝三輔舊事曰武帝發兵攻太子連鬭五日白虎闕前溝中血沒足世説曰阮步兵居喪不率禮而志孝稱當葬母先食肫飲酒然後臨訣而哭直云人言窮我將窮矣因吐血一升氣絶不知人彌時乃蘇膏春秋元命苞曰膏者神之液文子曰人受變化一月而膏三月而脈異苑曰滿奮豐肥膚肉潰裂每暑夏輒膏汗流溢
