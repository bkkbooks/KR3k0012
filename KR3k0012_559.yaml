body:
  text: 禮儀部三十七冢墓二宋書曰王玄謨從弟玄象位下邳太守好發冢地無完槨時人間垣內有小冢墳上殆平朝日初升見一女子立冢上近視則亡或以告玄象便命發之有一棺尚全有金蠶銅人以百數剖棺見一女子可二十姿質若生臥而言曰我東海王家女應生資財相奉幸勿見害女臂有玉釧斬臂取之於是女復死又曰大明三年孝武幸籍田經袁湛墓使致祭增守墓五戶又曰何承天博見古今為一時所重張永嘗開玄武湖遇古冢冢上得一銅斗有柄文帝以訪於朝士承天曰此亡新威斗王莽時三公亡皆賜之一在冢外一在冢內時三台居江左者唯甄邯為大司徒必邯之墓俄而又啓冢內更得一斗復有一石銘云大司徒甄邯之墓又曰張𥙿曾祖澄當葬父郭璞為占墓地葬某豦年過百歲位至三司而子孫不蕃某豦年幾減半裁卿校而後纍世貴顯澄乃葬其劣豦位至光祿年六十四而亡其子孫遂昌又曰周山圖為淮南太守時盜發桓溫冢大獲寶物客竊取以遺山圖山圖不受簿以還官齊書曰柳世隆曉數術於倪塘創墓與賓客踐履十往五往常坐豦及卒墓工圖墓取其坐豦焉又曰王倫之為豫章太守下車祭徐孺子許子將墓又曰初荀伯玉微時有善相墓者謂其父曰君墓當出暴貴者但不得久耳又出失行女子伯玉聞之曰朝聞道夕死可矣頃之伯玉姑當嫁明日應行今夕逃隨人去尋求不能得後出家為尼伯玉卒敗亡又曰富陽人唐宇之僑居桐廬父祖相傳啚墓為業宇之自云其冢墓有王氣山中得金轉相誑惑永明二年冬宇之聚黨遂陷富陽至錢塘又曰始興王鑑鎮蜀於州園地得古冢無復棺但有石槨銅器十餘種並古形玉璧三枚珍寶甚多不可皆識金銀為蠶形者數斗又以朱砂為阜水銀為池左右咸勸取之鑑曰皇太子昔在雍有發古冢者得玉鏡玉屏風玉匣之屬皆將還都吾意常不同乃遣功曹何佇之為起墳諸寶物一不得犯又曰宜都王鑑鎮姑熟于時人發桓溫女冢得金巾箱織金篾為嚴器又有金蠶銀繭等物甚多條以啓聞鬱林勑以賜之鑑曰今取往物後取今物如此循環豈可熟念使長史蔡約自往修復纖毫不犯又曰文惠太子鎮雍州有盜發古冢者相傳云是楚王冢大獲寶物玉履玉屏風竹書青絲綸簡廣數分長二丈皮節如新有得十餘簡以示王僧虔云是科斗書考工記周官所闕文也南史曰齊前將軍陳天福坐討唐寓之於錢塘掠奪百姓財物棄市先是天福將行令家人預作壽冢未至東又信催速就冢成而得罪因以葬焉梁書曰丁貴嬪薨昭明太子遣人求得善墓地將斬草有賣地者因閫人俞三副求市若得錢三百萬與之三副密啓武帝言太子所得地不如今所得地於帝吉帝末年多忌便命市之葬畢有道士善圖墓云地不利長子若厭伏或可申延乃為蠟鵝及諸物埋墓側長子位有宮監鮑邈之魏雅者二人初並為太子所愛邈之晚見踈於雅密啓武帝云雅為太子厭禱帝密遣檢點果得鵝等物大驚將窮其事徐勉固諫得止唯誅道士又曰蕭斆太清初為梁州長史梁州有古墓名曰尖冢或云張騫墳欲有發者輒聞鼓角與外相拒堆埋者懼而退斆謂無此理求自監督及開唯有銀鏤銅鏡方尺唐書曰代宗時號州剌史王奇光上言閿鄉縣女媧墓去天寶末失所在今一夜河上側近忽聞風雷聲曉見其墓踊出上有雙柳樹下有巨石其柳各高丈餘又曰天后西幸京師路經楊玄感墓上誦李百藥過玄感墓詩云劍有萬人敵文為一代英除昏志不遂僣亂道難平歎曰百藥唯解綴文不識大義又曰韓恩復則天朝為太常博士定南郊儀注云太妃鼓吹排群邪守大體國家賴之睿宗朝為給事活嚴善思於雷霆之下拒武三思於陷附之中玄宗御筆題碑云有唐忠孝韓長公之墓又曰伊慎兗州人善騎始為果毅喪母將營合附不識其父之墓晝夜號哭未浹日夢寐有指導焉遂發壠果得舊記驗又曰盧坦為侍御史會李錡反有司請毀錡祖父廟墓坦嘗為錡從事乃上言曰淮安王神通有功於草昧且古之父子兄弟罪不相及況以錡故可纍五代祖乎乃不毀因賜神通墓五戶以備灑掃白虎通曰春秋之義王者墳高三仞樹以松諸侯半之樹以柏大夫八尺樹以欒士四尺樹以槐庶人無墳樹以楊柳晏子曰梁丘據死景公召晏子告之據曰忠臣愛我欲厚葬之高大其壟晏子對曰不可公遂止列子曰燕人長於楚老而還過晉國同行者紿之指城曰此燕國之城其人愀然變容指社曰此若里之社若猶汝也乃喟然而歎指舍曰此君先人之廬乃泫然而泣指壠曰若先人冢其哭不自禁同行者啞然大笑曰余等紿君乃晉國耳其人慚及至燕國之城社真見先人之廬冢悲心更微傅子曰太原民發冢破棺中有婦人將出與語生人也視其冢上木三十歲不知此婦人三十歲常生地中也將一朝欻然生偶與發冢者會也抱朴子曰吳景帝時於江陵掘冢取板治城後發一大冢內有重閣石扉皆樞轉開閉四周徼道通事具高可乘馬又鑄銅為人數十枚長五尺皆大冠衣執劍列侍靈坐皆刻銅人背後石壁言殿中將軍或言侍郎似公王冢也破其棺棺中有人鬢已班白鮮明面體如生人棺中有白玉壁三十枚藉尸兵人舉出死人以倚冢壁一玉長一尺形似冬瓜從死人懷中出墮地兩耳中及鼻中有黃金如棗此則骨骸有假物而不朽之效也呂氏春秋曰世之為丘壟也其大若山其樹若林以此觀世示富則可矣以此為死則不可自古及今未有不亡之國者則是無不掘之墓也是故大墓無不掘者而世爭為之豈不悲哉堯葬於穀林通樹枝舜葬於紀市不變其肆禹葬於會稽不變人徒是故先王以儉葬也非愛其費非惡其勞以為死者虛也越絶書曰宋大夫華元冢在華原陳留小黃縣城北吳越春秋曰虎丘者吳王闔閭墓也下池廣六十步深一丈五赤銅槨三重中池廣六尺金鴈玉鳧專諸魚腸之劍以送焉取士臨海潮千萬人築治之以葬後金精上地為白虎據墳故以為虎丘越傳曰禹到大越上苗山更名山曰會稽因死葬焉穿壙深七尺上無寫泄下無流水壇高三尺土階三等周方一畝華陽國志曰周失綱紀蜀先稱王有名蠶藂其目縱死作石階石棺國人化之故俗以石棺槨為縱目人冢又曰蜀有五丁能移山舉萬鈞其王薨輒立大石長三丈重千鈞為墓志又曰蜀遣使朝秦秦惠王許嫁五女於蜀蜀遣五丁力士奉迎蛇山崩同時壓殺五丁及秦五女蜀王痛傷命曰五婦冢今其人或名五丁冢又曰武都有一丈夫化為女子美而艷蓋山精也蜀王納為妃不習水土欲去王必留之乃作東平之歌以樂之無幾歿故王哀之乃遣五丁之武都擔土為妃作冢三輔決録曰竇后父名猗遭秦亂隱身鉤魚墜淵而卒后登尊號遣使者於父墜所築起大墳世說曰戴公見林法師墓曰德音未遠而拱不已積冀神理綿綿不與氣運俱盡耳又曰黃初末吳人發長沙王吳芮冢以其材於臨湘為孫堅立廟容貌如生衣服不朽後預發者見綱曰君何類長沙王芮但微短耳綱瞿然曰是先祖也自芮之卒至冢發四百餘年綱芮之十六世孫也又曰有人相羊祜應出受命君忌其言遂使掘斷墓後以壞之相者云墓勢相讓猶有折臂三公俄而祜墜馬折臂後至三公又曰郭景純過江居于暨陽母亡安墓不盈百步時人以為近水景純曰將當為陵今沙漲去數十里皆為人居家桑田博物志曰漢末發范明友冢奴猶活明友是霍光女壻奴記言光家事廢立之際多與漢書相應又曰漢末有發前漢時宮人冢者宮人獨活既出平如復舊列士傳曰羊角哀葬友人在柏桃與荊將軍冢比他日角哀夢柏桃語己曰蒙子之恩而獲原厚葬荊將軍自以豪欲役伏吾吾不聽與連戰不勝期十五日大合戰以決勝負得子則勝不得則負矣角哀至期日陳兵詣其冢上三輔決録曰趙嘉年三十餘有重疾七年不樂乃為令勑兒曰丈夫生一世豦無箕山二公之操仕無伊擊呂尚之勳天不我與復何言哉聊立一圓石樹吾墓前刻之曰漢有逸民姓趙名嘉有志無時命也奈何後病愈楚國先賢傳曰李善字次孫南陽人也本同縣李元蒼頭建武中元家死沒唯孤兒續始生善親自哺養世祖拜善及續並為太子舍人善顯宗時辟公府以能治劇再遷日南太守從京師之官道經南陽李元冢未至一里乃脫服持劍去草及拜墓哭泣甚悲身炊爨自執姐鼎以修祭揚雄家諜曰子雲天鳳五年卒葬安陵阪上所厚沛郡桓君山平陵如子禮弟子巨鹿侯子芭共為治喪諸公遣世子朝郎更行事者會送桓君山為斂賻起祠塋侯芭負土作墳號曰玄冢七略曰揚雄死弟子共為起冢號曰楊冢趙歧別傳曰歧字臺卿年九十餘建安六年卒先自為壽藏圖季札子産晏嬰叔向四像居賓位又自像其像居主位皆為讚頌勑其子曰我死之日墓中聚沙為床布簟白衣散髮其上覆以單被即曰便下下訖便掩王子年拾遺記曰舜葬蒼梧之野有鳥如丹雀自丹州而來吐五色之氣氣如雲白日憑霄雀能群飛銜土以成墳
