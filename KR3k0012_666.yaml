body:
  text: 道部七劍解太極真人石精金光藏景錄形神經曰制劍之法上宰惣真西域王君昔授之於紫陽公施行道成揔真昔用劍解之道又授九轉丹方於長里先生此即周人也東鄉序云漱龍胎而死決服瓊英先師王西城此是飲丹後用劍解而不言服九轉者當是雖授而不遂合用後以付門弟子茅君亦是受而不用故云付耳茅君傳南岳魏夫人傳楊君故安妃云可尋劍解之道但不知遂用不耳許長史既服腴石或當不必為其事掾從鎮南夜解則又非此法掾許長史子也若是太清解及單用劍者應不得反望故鄉而掾遊處方臺還本居邦也神劍用之而解化則能遊宴太極採五星之靈軌煥七元之威光以範儀烈映真氣故軒轅喬山之葬劍烏在焉王子渤海之家劍鳴空槨王喬有京陵之墓劍飛冲霄斯實真驗九玄精應太靈神方靈致威劍之妙化也諸以劍尸解者以劍代身五百年之後此劍皆自然還其處諸以劍解者不必止是用丹書者空劍亦可幽響無間恍惚難尋不可得言矣不可得為之者見之者惟當應之於心耳神奇歘怳變動無方非復物理所期正當心任化即事從宜耳為之者亦不覺其所以見之者固莫測其所然軒轅採百山之銅以鑄鼎虎豹百禽為之視火參鑪鼎而軒轅疾崩葬喬山五百年後山崩寶劍赤舄在焉一旦又失王子喬者曾詣鍾山獲九化十變經以隱遁日月遊行星辰後一旦疾終營家渤海山夏襄時有發王子墓者一劍在北寢上自作龍鳴人無敢近後亦失所之王子喬墓在景陵戰國時復有發其墓者見一劍人適欲取視其劍忽然上飛去王子喬事舊說浮丘公儁與乘鶴共登嵩山此事不同解化時年五十五六耳故戴遠遊冠者昔葛洪云陰君授鮑靚尸解之法後死埋石子崗有人發其棺見一大刀冢左右有人馬之聲遂不敢取此似劍解法而不能飛去此是用靈寶太玄陰生符朱書刀矣太清之下故得生者而已按玉清靈傳說揔真帶劍揚君說桐柏帶劍此並應是先解劍化也真人用寶劍以尸解蟬蛻化之上品也夫尸解之法多如蟬蛻今此劍非蛻也故云上品明變遁之高道營造劍之時先齋戒百日乃於幽隱處近清泉立西向屋作灶口亦西向善鍛人鍊好鐵生鋌合鍊成令得八斤為足也若欲窮其精理當用竹炭又以銅錫柔澳如此用歲月功夫殊多所以古人作劍三年然後成也薛燭云甌冶鑄劍赤鍾之山破而出錫若耶之溪涸而出銅今以此合燒則煉多而不燥剛利而銷其鍛人亦須溫良新衣沐浴造劍之日尤不得飲酒食肉及遊履淹穢用七月庚申日八月辛酉日使長三尺九寸廣一寸四分厚三分半謂背脊上近柄閒令厚三分半也至兩刃際可減一二釐耳又向刃邊先殺背二分乃立刃至杪亦以漸令薄也杪九寸為左右刃處當從鐶項定度整三尺刻背為刃亦廣三分八釐必使中脊餘六分也杪九分合殺兩邊令尖殺杪鋒令有兩稜如戟杪殺鋒也其柄用長短適令鐶高二寸四分身長二尺四寸則餘一尺二寸六分以為柄鐵因當中央令廣九分厚二分與鐶相連柄操梓材近環圍四寸九分刃圍三寸九分皆以釦竟為正若作劍裝則促扁於此也劍頭可安籙鐶謂發始鍊剛仍使鐶身相連勿別作模合作釘連之都使外形大小厚薄相似乃鑿除應空之內亦可先鑽作數孔鑿為易其伏基處鑿鏝之都畢令大鐶高二寸四分橫分廣處對中徑二寸八分內方員徑四分鐶形古今多法或正圓或狹長或如鼎耳乃有十許皇今此經中所圖亦是顯其左右法耳非正定形也謹准製古今取其合度立圖如右又鐶之內不得正圓如竹亦不得正方如界尺當令內面小方面外落稜角必令得刻己刃字不甚邪轉惟使長三尺九寸耳尺寸度數厚薄形制並備如別圖尋古今尺長短不同九章筭法皆積毫釐之度晉中書監茍勗善音律伎藝常恨八音不調後有人掘地得一玉律銘題周世短晉尺四分半以改定音律聲韻合度今宜用此尺為准所以爾者揔真桐柏並以周時作劍用周尺也籙鐶者鏤刻劍鐶鐶左右面刻之作刃字面有九刃字也鐶背上刻作九己字也深刻字皆從刃背而下順刃謂兩邊刃及己字皆對從刃皆邊起俱下就刃故曰順刃也順環而刻之隨鐶曲轉故曰順鐶也謂刻處得以金銀閒之益分明佳也劍身刻象鐶中央復有豎起如小手鐶者名之曰伏基伏基之義謂為日月之基隱秋光景也內鐶左面為日字內鐶者即小環之中伏基也刻右面為月字先又圓刻日月之外為郭也五百年還出以揮五岳入以藏無閒謂潛靈遁跡隱影藏形也下以制九陰謂可以攝召九陰之神也上以承玄冥謂北斗玄冥星主隱變也衛足以逐邪魔威足以鑒七精謂控威秉勢鑒照七星也仰以映五氣謂五行之氣常栖映也俯以代身化形矣欲知劍之左右內外以劍正指南使劍背在上使劍刃在下也於是以東而為右西面為左東為內面西為外面此劍尺度長短廣狹厚薄刻鏤文字乃太極四真人靈劍之模範也上清真人亦皆帶劍上清之劍並是太極所造耳故此經為太極之法乃四真人定範何必須昆吾之金割玉之鋌耶此蓋明不必須精鐵所存者模範而已王子喬劍乃凡下之鐵耳喬山尸解之劍非昆吾之流金也此太極真人紫陽公詞以告王君也軒轅駕龍玄圃是步綱之術為解化後乃行前真多有此例此劍經前章也太極上化符以飛精書紙盛以紫囊欲去時以係劍鐶右以曲晨飛精書劍左面令至劍抄也又太極藏景符飛精書紙盛以絳囊欲去時以係劍鞘右以曲晨飛精書劍右面令至劍杪也又太極籙形符以飛精書紙臨去之日服之身生七色之雲自有電光右以曲晨飛精書劍背令皆兩刃之際也又太極解化符恒日服一符七年化去朱書竹中帛祕要也是合曲晨丹成臨欲解化時以題劍七年以後朱題劍亦能解化陶隱居曰晉永嘉中劉㦎呼麥切多奇識亦云是異人作此劍乃方佛符字殊細設婁羅鐶曰大乘法而鐵甚快利宋來便恒供御衛名曰劉㦎鈸尚千牛刀同寶女已易去鐶麾刻處亦漸漸欲滅又見有四五故鐶並相似如一不知其劍身何在東山顧居上亦造此劍諸人有同時共襲者今猶存焉大抵違謬不可具說乃有銅鑄作鐶以釘鑄著故刀如此並可以類推今此儀式惟是陶隱居所匠深搆心解亦謂理極未知必同太極模範不耳凡試刃之利鈍取中形芒數枚急束以一髮懸其抄繫於杖頭令一人執之乃以刃一斫芒斷而髮猶連計芒多少為優劣劉㦎鈸千牛刀皆舊斫十三芒又有一百鍊剛刀斫十二芒國中惟稱此為絕而近造神劍斫十五芒觀其鐵色青憿光采有異蓋薛燭所謂渙如冰之將釋者矣頃來有作者十餘人皆不及此作剛朴是上虞謝平鑿鏤裝治平聲是石尚方師黃文慶並是中國絕手以齊建武元年甲戍歲八月十九日辛酉建於茅山造至梁天監四年乙酉歲勑令造刀劍形供御用窮極精功奇麗絕世別有橫法剛公家自作百鍊黃文慶因此得免隸役為山館道士也周禮制劍長三尺柄居五寸是六分之一也內刃廣二寸半重古秤一斤四兩今秤三斤十兩也今公家劍長四尺七寸柄居一尺五寸是三分之一小減也刃廣一寸六分輕重不定此寶劍長三尺九寸廣一寸四分而經有刀劍兩名晉武帝大始十年中書監荀勗及張華等校定鍾律八音不與古樂相諧由漢來用尺漸長乃更依周禮積黍法制尺以量鑄新器募求古物得周世正玉律比之毫釐無差因擊古鍾以律命之亦皆響合兼以七種古物相課皆會又得汲冢竹簡亦長二尺四寸於是施用謂之古尺阮咸聽荀樂聲以為高功非興國之音咸亡後有人掘地得銅尺長荀尺古尺之四分半時人以阮咸之解音遂復施行謂之官尺令司農相承以制五尺并取積寸以作㪷斛也宗元嘉中大將軍彭城王義康製物每欲廣大又加官尺寸半民閒復有相與用之至今謂之為尚方御府都水材官用尺乃復長民一分推如眾例則以古尺為勝鍾律宮商自然嚮會是合神精冥數且周世又二真製劍之時兼荀張窮極精功時又有束晢雷煥之徒妙貫神鬼阮咸雖善音樂而性度縱誕不能清切故以單緩為好耳掘地銅尺猶應是後漢時物也梁天監四年又更校尺以調正鍾律定用張荀古尺半分於事合衷今施用名曰法尺又曰若欲潛遁名山隨時觀化不願真官隱浪自足者當修劍尸解之道以曲晨飛精書劍左右面先逆自託疾然後當抱劍而臥也謂先偽稱疾寢臥數日乃密脫劍青囊拔出題書及繫符都畢於是抱之而祝須天馬迎至解衣而遊勿令人知覺也又以飛精藥密拭劍鐶呼劍名字祝畢忽見太一以天馬來迎於寢臥之前於是上馬若女子則以輜軿來迎古來諸仙多有託以餘物或用竹杖或巾屨惟鮑靚用太清刀法此神變欻怳假類會形不可以理趣相求真奇事矣天馬者吉光騰黃之獸也古畫圖有此獸形皆昔真人所顯相傳示也吉光似鹿騰黃類馬男則單騎女則駕軿也太極真人命太一使者齎馬執控并迎以寶衣欻忽而來不知所以然也太一主仙變也馬去之時雖眾醫侍疾子孫滿側則我易服束劍流景變跡而不覺我之云為也所謂化遁三辰巔徊月精呼吸萬變非復故形者也又曰極上化符以飛精書紙盛以紫囊欲去時以係劍鐶藏景符以飛精書紙盛以絳囊欲去時以係劍鞘諸仙人多以竹杖不必盡得劍法或是太清術耳假物變化不可一類求之又曰夫修下尸解者皆不得反望故鄉上解之道名配紫簡三官不得復窺其隟但畜神劍與之起居相隨十三年自能化形不必須藥書之若不辨作藥七年之後但以丹書劍亦能潛化也單行此法似不得反故鄉矣自不及曲晨之妙精吉光騰黃之延控也雖單此猶賢於太清雜法兼得改形練化遊宴太極其用他藥得尸解非是靈丸之化者皆不得反故鄉反故鄉三官執之也太清尸解之法那得比太極之化遁乎太清尸解法五符中有太玄陰生符又用牛脂煎錫藥丸兩事耳無復餘方也佩用制劍之法具在符圖訣中其後用解化之道又非常修之事故並不載
