body:
  text: 飲食部八飯周禮曰黃帝始蒸穀為飯周禮天官食醫曰食齊視春時飯宜溫也禮記曰飯曰諸飯也黍稷稻梁白黍黃梁稰穛熟獲曰稰生獲曰穛黍黃黍也又曰文王有疾武王不脫冠帶而養言常在側文王一飯亦一飯文王再飯亦再飯欲知氣力針藥所勝又曰燕侍食於君子則先飯而後已所以勸也母放飯母流啜小飯而亟之亟疾也備噦噎若見問也數噍母為口容口容弄口論語曰子曰飯蔬食飲水曲肱而枕之樂亦在其中矣爾雅曰饙餾稔也今呼飯為饙熟為餾稔或作飪也饙音甫云切餾力又切音修食饙謂之餲飯穢臭博者謂之爛爛飯相著也米者謂之檗飯中有未熟者春秋運斗樞曰粟五變而以陽化生為苗秀為禾三變而祭謂之粟四變入臼米出甲五變而蒸飯可食説文曰饙飯也餾飯氣蒸也饡音贊以羹澆飯也饖一月切飯傷熟也饐一煎切飯傷濕也釋名曰飯分也使其粒各自分也乾飯而暴乾之也史記曰廉頗之奔魏也魏不能用而趙數困於秦趙人思復得廉頗廉頗亦思復為趙用趙王因使使魏視頗尚可用不郭開怨頗郭開頗之仇也不欲令還多與使者金令毀之使者視頗為之一飯一斗米十斤肉被甲上馬以示可用使者還報曰廉將軍年雖老尚善飯然與臣少頃三遺尿矣王以為老遂不召又曰孟嘗君待客夜食有人蔽火光客怒以為飯不等輟食辭去孟嘗君起自持其飯比之客慚自刎漢書曰公孫弘為丞相食脫粟之飯又曰王莽使中黃門王葉領長安莽聞城中飢饉以問葉葉業取市所賣梁飯肉羹持入視莽曰民食咸如此莽信之續漢書曰羊陟拜河南尹常食乾飯後漢書曰王郎起光武至南宮遇大風雨引車入道傍空舍馮異抱薪鄧禹熱火光武對竈燎衣異進麥飯兔肩謝丞後漢書曰左雄為冀州刺史長食乾飯司馬苞為太尉常食漉飯李固為太尉常食麥飯王暢為南陽太守作飯鹽豉菜茹羊茂為東郡太守常食乾飯胡劭為淮南太守使鈐下閣外炊曝作乾飯漢舊儀曰齊法二人施案陳三十六肉食九穀飯魏書曰卞太后左右食菜粟飯魏略曰王朗會稽敗太祖盛會啁之曰不能效君昔在會稽折粳米飯朗曰宜適難值如朗者未可折而折明公今日可折而不折也吳書曰袁術在壽春百姓飢窮以桑椹蝗蟲為乾飯又曰是儀服不精細食不重膳家無儲蓄孫權聞之幸儀舍求視蔬飯親嘗之歎息即增俸賜晉書曰石崇家稻米飯在地經宿皆化為螺時人以為族滅之應又曰衛瓘家人炊飯墮地盡化為螺歲餘而及禍也又曰殷仲堪自在荊州連年水旱百姓飢饉仲堪食常五碗盤餘肴飯粒落席間輒拾以噉之雖欲率物亦緣其性真素也宋書曰衡陽王義季都督荊州嘗大搜於郊有野老帶苫而耕命左右斥之老人擁來對曰昔有楚子盤遊受譏令尹今陽和扇氣播厥之始一日不作人失其時大王馳騁為樂驅斥老夫非勸農之意義季止馬曰此賢者也命賜之食老人曰吁願大王均其賜也茍不奪人時則一時皆享王賜老人不偏其私矣斯飯也弗敢當問其名不言而退南史曰宋初吳郡人陳遺少為郡吏母好食鐺底飯遺在役恆帶一囊每煮食輒録其焦以貽母後孫息亂聚得數斗恆帶自隨及敗逃竄多有餓死遺因此得活母晝夜泣涕目為失明耳無所聞遺還入戶再拜號咽母豁然即明梁書曰謝蘭五歲時父亡未食乳媼欲令飯蘭終不進舅阮孝緒聞之歎曰此兒在家則曾子之流事君則藺生之匹因名曰藺稍授以經史過日便能諷誦孝緒每曰吾家陽元也袁淑家陽元又曰齊荀兒之役臨汝侯嘲羅研之曰卿蜀人樂禍貪亂一至於此對曰蜀中積弊實非一朝百家為村不過數家有食窮迫之人十有八九縛束之使旬有二三貪亂樂禍無足多怪若令家畜五母之雞一母之豕床上有百錢布被甑中有數升麥飯雖蘇張巧説於前韓白按劍於後將不能使一夫為盜況貪亂乎又曰魚弘為湘東王鎮西司馬述職西上道中乏食緣路採麥米飯給所部弘度之所後人覔一麥不得又於窮洲之上捕得數百獼猴以為脯以供酒食又曰傅翽代劉玄明為山陰令問玄明曰願以舊政造新令尹答曰我有奇術卿家譜所不載臨別當相示既而曰作縣唯日食一升飯而莫飲酒此第一策也又曰裴元禮為西豫州刺史母憂居喪唯食麥飯又曰沈衆永定二年兼兵部尚書監起太極殿恆衣布袍芒屩以麻繩為帶又囊麥飯粄以噉之朝士咸共誚其所為陳書曰孔奐為武康令武帝剋日決戰乃令奐多營麥飯以荷葉褁之一宿之間得數萬褁軍人食訖盡棄其餘崔鴻前秦録曰符堅以乞活夏點為左鎮郎胡人護磨那為右鎮郎奄人申香為拂蓋郎點等身長一丈八尺並多力善射三人每食飯一石肉三十斤後魏書曰楊播兄弟雍睦播每出或日斜不至不先飯待還然後食又曰盧義僖為都官尚書性清儉不營財利雖居顯位每至困乏麥飯蔬食然亦甘之也又曰闞因甚貧弊不免飢寒性能多食一飯至三斗乃飽卒無後唐書曰太宗謂侍臣曰朕自皇太子立也遇物必誨見其將飯告稼穡艱難不奪農時乃可常有又曰蔣沅乾元後授陸渾盩厔咸陽高陵西令當軍旋之後瘡痍未平沅竭心撫勞所至安輯副元帥郭子儀每統兵由其縣必誡軍吏曰蔣令清嚴幹辦供億固當有素士衆得蔬飯見饋則已無撓清政其為時人所知如此墨子守備曰乾飯人二升以備陰雨晏子春秋曰晏子相齊食脫粟之飯尹文子曰晉國俗奢文公儉以矯之因食脫粟之飯莊子曰子輿與子桑友而霖雨十日子輿曰子桑殆病矣裹飯而往食之又曰鈃尹文其為人太多其自為太少日請置五升之飯足矣斯明自為之大少也列子曰楚靈王好細腰臣皆以三飯為節期年有黧黑之色孟子曰齊人有一妻一妾其良人出行則饜酒肉而後返欺其妻云富貴人共飲食也其後妻向其所之乃就郊外乞人祭飯韓子曰堯糲蒸之飯又曰孫叔敖為令尹糲飯菜羹枯魚之膳又曰嬰兒之相與戲以塵為飯以水為飲以泥為羹以木為胾淮南子曰為客治飯而自食藜名尊於實仁義之名重於治飯之實也六韜曰堯王天下滋味重纍弗食溫飯暖羹不酸餒不易也家語曰孔子厄於陳蔡從者七日不食飯子貢以所齎貨竊犯圍出告糴於野人得米一石焉顏回仲由炊之于壞屋之下有埃塵墮飯中顏回取而食之呂氏春秋曰飯之美者玄山之禾不周之粟陽山之穄南海之稻吳越春秋曰勾踐載飯與羹以遊國中行子戲之遇孤孤即脯而啜之神異經曰東南有人名黃父以鬼為飯以霧為漿説苑曰呂望行年五十賣飯棘津論衡曰鼠涉飯中捐而不食風俗通曰俗説不大餓不在車飯謂正得一車飯不復活也或曰輔車上飯小小不足濟也案吳郡名酒杯為𥂸音章言大餓人得一𥂸飯無所益也寧相六不守熟案蒸飯更泥謂之餾音與六相似也潛夫論曰夫梁飯食肉有好於面目不若糲粢藜蒸之可食於口也物理論曰忿之未熟覆甑而棄之所害亦多矣西京雜記曰公孫弘起家徒步為丞相故人齊賀從之弘食以脫粟覆以布被賀怨曰何用故人富貴乎脫粟布被我自有之弘大慚賀乃告人曰公孫弘內服貂蟬外衣麻枲內廚五鼎外膳二肴豈可以示天下哉於是朝廷自此疑矯焉弘聞之歎曰寧逢惡賓不逢故人風土記曰精浙米十取七八浙使香蒸而飯色乃紫紺於東流水飯食而洗除不祥通俗文曰飯臭曰饐沙入飯曰慘録異傳曰袁公路年十八常飯乳食蜜飯異苑曰衛士度苦行居士也其母常誦經曾出自齋空中下大鉢蒲中香飯母分賦齊人皆七日不飢禰衡別傳曰劉表嘗作上事極以為快衡見之便滅投地曰作此筆者為食飯不孟宗別傳曰宗為光祿勳大會醉吐麥飯察者以聞詔問食麥飯意宗答臣家足有米麥飯直愚臣所安是以食之孔衍在窮記曰彭城王送橡飯十斛葛仙公傳曰仙公與客對食吐口中飯盡成飛蜂良久乃張口蜂皆飛還入口中成飯安成記曰安成郡毛亭二十里田疇膏腴厥稻馨香飯若凝脂四王起事曰惠帝還洛陽路中作飲食宮人有持升餘米飯者澆以供至尊世説曰葛公曾在武帝坐上食進飯曰此是勞薪炊也帝密遣問外云實是故車腳時鏡新書曰歲暮家家具有肴蔌謂為宿歲之儲以入新年也相聚酣歌名為送歲留宿飯至新年十二則棄於街衢以為去故取新除貧取富陶朱公猗頓此事無輟又留此飯須驚蟄雷鳴擲之屋上令雷聲遠焦贛易林曰南箕無舌飯多沙糖離騷曰精瓊靡以為飯精鑿玉屑以為飯也宋玉風賦曰主人之女為臣炊雕胡之飯潘尼釣賦曰紅麵之飯精以菰梁五味道洽餘氣芬芳枚乘七發曰楚苗之食安胡之飯搏之不解一啜而散桓麟七説曰香箕為飯雜以粳菰散如細蚳摶似凝膚應璩薪詩曰竈下炊牛矢甑中莊豆飯孫子楚祀介子推祝文曰棗飯一盤王粲七釋曰西旅遊梁御宿素祭瓜州紅麴參糅相半軟滑膏潤入口流散傅選七誨曰孟冬香粳上秋膏梁雕胡菰子丹貝東牆濡潤細滑流澤芬芳飧釋名曰飧散也投飯於水中各散也通俗文曰水澆飯曰飧音孫春秋左氏傳曰晉公子重耳及曹曹共公聞其駢脅欲觀其裸薄而觀之薄迫也駢脅合幹僖負羈之妻曰吾觀晉公子之從者皆足以相國若以相若遂以為傅相夫子必反其國反其國必得志於諸侯得志於諸侯而誅無禮曹其首也子盍早自二焉自二自別異於曹乃饋盤飧置璧焉臣無境外之交故用盤載璧飧中不欲令人見也公子受飧反璧又曰晉侯問原守於寺人勃鞮對曰昔趙衰以壺飧從徑餧而不食遂使處原韓子曰晉文出亡箕鄭挈壺飧而從迷失道與公相失飢而道泣不敢食及公反國克原而使為原之守曰夫經飢餧之患而必全壺飧是將不以原畔也渾軒聞而非曰以不動壺飧之故其不以原畔不亦無術乎夫明主不恃其不我畔吾不可畔也不恃其不我畔恃吾不可欺也戰國策曰中山君走有二人隨其後曰臣父嘗戲君下壺飧餔臣父故來死君也國語曰越王召范蠡而問焉曰諺有之諺俗之善語曰觥飯不及壺飧觥大也大飯盛饌也盛饌未具不徒以虛待之不及壺飧之救飢疾也己欲滅吳取快意得之而已不能待有餘力又曰敵國賓至關尹以告膳宰致飧熟食曰飧廩人獻餼沈約宋書曰文帝為王玄謨作四時詩曰粟飧充夏餐顧和與蔡謨書曰夏侯家言食漿酪飧猶勝於羹飯耳黍釋名曰黍汝也相黏汝也禮記曲禮上曰飯黍無以箸又曲禮下曰祭宗廟黍曰薌合論語微子曰文人止子路宿殺雞為黍食之家語曰孔子侍坐於哀公賜之桃與黍孔子先食黍而後食桃左右皆掩口而笑公曰黍者所以雪桃非為食之也孔子對曰丘知之矣夫黍者五穀之長也郊祀宗廟以為上盛果屬有六而桃為其下祭祀不登郊廟丘聞之也君子以賤雪貴不聞以貴雪賤今以五穀之長雪果之下者是從上雪下也臣以為妨於教害於義故不敢公曰善謝承後漢書曰范式與張元伯為友春別京師以秋為期至九月十五日殺雞為黍言未絶而巨卿至魏略曰沐並字德信名有志介嘗過姊姊為殺雞為黍而不留北齊書曰李士謙自以少孤未嘗飲酒食肉口無殺害之言親賓至輒陳樽俎對之危坐終日不倦李氏宗族豪盛每春秋二社必高會極宴無不沉醉誼亂嘗集士謙所盛饌盈前而先為設黍謂群從曰孔子稱黍為五穀之長荀卿亦云食先黍稷古人所尚寧可違乎少長肅然無敢弛惰退而相謂曰既見君子方覺吾徒之不德也又曰盧道虔為尚書會同寮於草屋下設雞黍之膳談者以為高幽明録曰漢武帝與近臣宴于未央殿噉黍臛也襄陽記曰司馬德操嘗造龐德公值其渡沔上先人墓徑入上堂呼德公妻子使速作黍禰衡別傳曰黃祖在蒙衝舟賓客作黍臛衡得便自飽食不顧左右復搏弄以戲竹林七賢論曰阮咸兄子簡亦曠達自居大喪行過大雪寒凍遂詣浚儀令令為他賓設黍臛簡又食之以致清議廢頓三十年孟子曰葛伯率其民要其有酒肉黍稻者而奪之有一童子以黍肉餉又殺而奪之淮南萬畢術曰取冢墓黍啖兒不思母取新冢前祠黍用啖兒則不思母也風俗通曰今宴飲大會皆先黍臛盧諶祭法曰祠用白黍黃黍
