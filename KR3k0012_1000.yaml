body:
  text: 百卉部六芙蕖爾雅曰荷扶蕖別名芙蓉江南呼荷其莖茄其葉蕸其本蔤莖下白蒻在泥中者其華菡萏其實蓮其根藕其中的蓮中子也的中薏中心苦者也薏音億廣雅曰菡萏芙蓉周書曰魚龍成則藪澤竭即蓮藕掘毛詩澤陂曰彼澤之陂有蒲與荷荷芙渠也又山有扶蘇曰山有扶蘇隰有荷華荷華扶渠也毛詩義䟽曰芙蕖莖為荷其華未發為菡萏已發為芙渠其實蓮蓮青皮裏白子為的的有青長三分如鉤為薏語曰苦如薏也的五月中生生啖脆其秋表皮黑的成食或可磨以為飯輕身益氣令人強健幽荊楊豫取備飢年其根為藕幽州人謂之光為光如牛角謝承後漢書曰鄭敬為新遷功曹嘗與同郡鄧敬因折芰為坐以荷獻肉瓠瓢盈酒言談彌日宋書曰臧質說南郡王義宣反兵敗無所歸乃入南湖逃竄無食摘蓮噉之追兵至窘急以荷覆頭自沉於水唯出鼻軍主鄭俱兒望見射子中心兵刃亂至腸胃纏縈水草沈約宋書曰文帝元嘉二十一年天泉池樂遊苑池玄圃池生蓮同榦宋起居注曰泰始二年嘉蓮一雙駢花實合跗同莖生豫州鱧湖宋紀曰文帝元嘉年蓮生建康額擔湖一莖兩華齊書曰涪陵王鑿金蓮花以貼地令潘妃行其上曰此步出芙蓉三國典略曰齊師伐梁梁以糧運不繼調市人餽軍建康令孔奐以夌屑為飯用荷葉裹之一宿之間得數萬裹又曰梁江從簡光祿大夫革之子也頗有才學年十七為採荷調以剌何敬容其文曰欲持荷作柱荷弱不勝梁欲持荷作鏡荷暗本無光敬容弗覺唯唯嗟其工管子曰五沃之士生蓮王子年拾遺記曰漢昭帝遊柳池有芙蓉紫色大如斗花葉柔甘可食芬氣聞十里之內蓮實如珠郭子橫洞冥記曰北及玄坂去崆峒十七萬里日月不至其地自明有紫河萬里流珠千文中有寒荷霜下方香茂抱朴子曰千歲神龜巢於蓮葉之上萬歲歷曰齊太和二年烏程縣閣下生蓮華顧啟期婁地記曰婁門東南有華墽口殼切陂中生千葉蓮花其荷無異菡萏色白豈佛經所載者乎古今注曰芙蓉一名荷華生池澤中一名澤芝一名水花色有赤白紅紫青黃紅白二色苦多華大者至百葉華山記曰山頂有池池中生千葉蓮華服之羽化因名華山諸草木方曰七月七日採蓮華七分八月八日採蓮根八分九月九日採蓮實九分陰乾下簇服方寸匕令人不老真人閞尹傳曰老子語喜天崖之淵真人所遊各各坐蓮華之上一華輒徑十丈說文曰茄芙蕖莖也荷芙蕖實也蓉芙蕖本也搜神記曰王敦在武昌鈴下儀仗生蓮華五六日而落說曰易稱枯楊生華何可及也今狂華生枯木敦終逆而身死王韶之神境記曰九嶷山過半路皆行竹松下夾路有青澗澗中有黃色蓮蓮華芳氣盈谷幽明錄曰晉末黃祖至孝母病篤庭中稽顙俄頃天漢開明有一老翁以兩丸藥賜母服之眾患頓消翁曰汝入三月可汎河而來依期行見門題曰善福門內有水曰湎源池有芙蕖如車輪浮圖澄傳曰澄以缽盛水燒香呪之須臾青蓮華出外國事曰私訶條國大洲上有大山上有石井井自生千葉白蓮華及眾蓮華出陶隱居本草注曰宋時太官作羊䘓空紺切削藕誤落中遂皆散不凝醫仍用治血多效神農本草注曰血藕實莖一名水芝所在池澤皆有生豫章汝南郡者良苗高五六尺葉團青大如扇其花赤名蓮荷子黑狀如羊矢范甯為豫章表曰新涂令孟佃民解列縣廳事前二丈陸地生蓮華入冬死至陽更生四枝今年三月復生故處繁殖轉多華有二十五杖鮮明可愛有異常蓮古詩曰涉江採芙蓉蘭澤多芳草採之欲遺誰思之在遠道楚辭曰芙蓉始發雜芰荷些紫莖屏風屏風水葵文綠波些言復有水葵生於中也莖紫色風起動波綠其葉而生紋也或曰紫莖言荷莖紫色屏風謂荷葉如屏風張奐芙蓉賦曰黃螺圓出垂蕤散舒纓以金牙點以素珠曹植美芙蓉賦曰竦芳柯以從風兮奮纖枝之璀璨其始榮也曒若夜光尋扶木其揚煇也晃若九日出晹谷芙蕖騫產菡萏星屬絲條垂珠丹莖加綠混混兮韡韡爛若龍燭潘尼芙蓉賦曰或擢莖以高立似彫輦之翠蓋或委波而布體擬連壁之攢會古詩曰江南可採蓮蓮葉何田田楚辭曰令薜荔以為理兮憚舉趾而緣木因芙蓉而為媒兮憚褰裳而濡足又曰製芰荷以為衣集芙蓉以為裳又曰築室兮水中葺芝兮以荷蓋傳玄歌曰曲池何澹澹芙蓉敞清源榮華盛壯時見者誰不歎一朝光采落故人不廻顏蒲爾雅曰莞苻蘺其上蒚今西方人呼蒲為莧蒲蒚謂其頭臺首也今江東謂之芙蘺西方亦名蒲中莖為蒚謂之為席蒚音翮毛詩澤陂曰彼澤之陂有蒲與蕳又魚藻曰魚在在藻依于其蒲左傳文公曰仲尼曰臧文仲其不仁者三下展禽廢六關妾織蒲三不仁也又昭公二十年晏子對齊侯曰澤之萑蒲丹鮫守之漢書曰蒲輪安車以徵賢晉灼曰以蒲褁車輪又曰路溫舒字長君父使牧羊溫舒取澤中蒲截以為編用寫書又曰元帝病數問景帝立膠東王故事史丹侍疾候上獨寢直入臥內頓首伏青蒲上服虔曰青綠蒲也孟康曰以蒲為廢蔽也太子由是得不廢東觀漢記曰劉寬遷南陽太守溫仁多恕吏民有過但蒲鞭罰之示辱而已晉書曰王育字伯春京兆人也少孤貧為傭牧羊每過小學必歔欷流涕時有暇即折蒲學書忘而失羊為羊主所責將鬻己以償之東郡許子章敏達之士也聞而嘉之代育償羊給其衣食使與子同學遂博通經史齊書曰崔景真為平昌太守有惠政常懸一蒲鞭而未嘗用去任之日土人思之為立祠焉北齊書曰尉瑾少威儀子德載以蒲鞭責之便自投井瑾自臨井上呼云兒出聞者皆笑三齊略記曰鬲城東南有蒲臺秦始皇東遊海上於臺下繙音煩蒲繫馬至今歲歲蒲生榮委猶若有繫狀蒲似水楊可以為箭穆天子傳曰天子于珠澤之藪方三十里爰有萑蒲莞葦說文曰蒲草也以作席蒻蒲子也以為平席世謂蒲蒻風土記曰蒲生於陸葉如烏扇而紫蘤于詭切一曰獲蒲好草也續述征記曰烏常沉湖齊人謂湖為沉中有九臺皆生結蒲云秦始皇遊此臺結蒲繫馬自此蒲生則結前秦記曰符洪家生蒲長五丈節狀如竹咸以異之謂之蒲家因氏焉洪後以讖文草付應王遂改姓為符幽明錄曰河東常醜奴寓居章安縣以採蒲為業將一小兒湖邊拔蒲見一女子容姿殊美乘一小船載蒪徑前投醜奴舍寄住醜奴嘲之滅火共臥覺有腥氣又指甚短惕然疑是魅女已知人意便求出戶變而為獺嵇康集序曰孫登夏嘗編蒲為裳冬披髮自覆淮南萬畢術曰酒薄復厚漬以宛蒲斷蒲漬酒中有須出之即酒厚也楚詞曰抽蒲兮陳坐援堇兮為蓋菖蒲左傳僖下曰王使周公閱來聘饗有昌歜歜菖蒲菹也春秋運斗樞曰玉衡星散為菖蒲遠雅頌著倡優則玉衡不明菖蒲冠環也梁書曰太祖后張氏諱尚柔嘗於室內忽見庭前菖蒲生花光彩照灼非世所有后驚異之謂侍者曰汝見否皆云不見后曰嘗聞見菖蒲花當貴因取食之生高祖呂氏春秋曰冬至五旬七月昌本者百草之先生也說苑曰文公好食昌本葅本草即菖蒲風俗通曰菖蒲放花人得食之長年神仙傳曰王興咸陽人採菖蒲食以得長生一寸九節者羅浮山記曰宣山中菖蒲一寸二十節堅芬之極方言曰菖蒲得石上生九寸節以上紫花尤善吳氏本草曰菖蒲一名堯時薤本草經曰菖蒲生石上一寸九節者久服輕身明耳目不忘不迷惑生上洛典術曰聖王仁功濟天下者堯也夫降精於庭為薤感百陰為菖蒲焉今之菖蒲是也菰廣雅曰菰蔣也其米謂之彫胡周官曰鳥宜菰鄭玄注曰菰彫胡說文曰蔣菰也彫胡一名蔣晉中興書曰毛璩為譙王司馬時海陵縣地多菰蒲處所幽邃亡戶保之璩請討放火而進天既旱地皆菰封封燃叛人走出近得萬戶廣志曰菰可食以為席溫於蒲生南方莊子曰孔子之楚舍於蟻丘之蔣宋玉賦曰主人之女為臣炊彫胡之飲馬藻爾雅曰莙牛藻似藻菜大江東呼為馬藻毛詩采蘋曰于以采藻于彼行潦陸機毛詩䟽義曰藻水草也生於水底葉似鷄蘇可食荊楊人食以當榖救飢飢荒時蒸而食之顏氏家訓曰或問東宮舊事六色罽䋿是何等物當作何音荅曰案說文云莙牛藻也讀若威音塢瑰切即陸機所謂蘊藻葉如蓬者也又郭璞注三蒼亦云薀藻之類也細葉蓬茸然生今水中有此物一節長數寸細茸絲圓繞可愛長者二三十節猶呼為莙又寸斷五色絲橫著線股間繩之以象莙草用以飾物名為莙於時當紲六色罽此莙以飾緄帶張敞因造絲傍畏耳作隈郭子橫洞冥記曰昆靈池有倒藻枝葉橫倒水上長九尺餘縱橫而生狀如結網有野鴨鵝鳧及鷗鷁來翔觀水池上入此草障皆不得出如入罾網也亦曰水綱草鳧葵說文曰苑鳧葵也纂文曰鳧葵其實可作醬馬蓼爾雅曰紅蘢古其大者蘬俗呼紅草為龍殼語轉耳毛詩緇衣山有扶蘇曰山有橋松隰有遊龍毛云紅草也毛詩義䟽曰紅草一名馬蓼葉麤大赤白色生外澤中蕣爾雅曰椵木槿櫬木橫別二名也似李樹華朝生夕殞可食或呼為日及亦曰王蒸廣雅曰日及木槿也一名朱槿一名赤槿說文曰蕣木槿也毛詩有女同車曰有女同車顏如蕣華蕣木槿也禮記月令曰仲夏之月木槿榮傅玄曰蕣華麗木也謂之曰洽或謂之洽容或謂之愛老潘尼以為朝菌
