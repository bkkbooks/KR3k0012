body:
  text: 職官部四十八司隸校尉通典曰司隸周官也掌五隸之法辨其物而掌其政令五隸謂罪隸蠻隸閩隸夷隸貉隸也物謂衣服兵器之屬帥其民而捕其盜賊漢書曰諸葛豐為司隸無所廻避京師為之語曰間何闊逢諸葛言間者何久闊不相見以逢諸葛故也侍中許章以外屬貴幸賓客犯法與章相連豐欲劾奏適逢章出豐駐車舉節招章曰下欲收之章馳去豐奔車逐之章突入殿得免由此成帝遂收豐節也又曰鮑宣字子都明經為司隸丞相孔光行園陵官屬行馳道中宣使鉤止丞相椽史沒入其車馬以摧辱宰相事下御史中丞官欲捕從事閉門不內宣坐閉拒使者大不敬下獄愽士弟子王咸舉幡太學下曰欲救鮑司隸者會此下諸生會者千餘人朝日遮丞相孔光自言丞相車不得行宣罪減死一等又曰蓋寬饒字次公為司隸校尉子常步行好直言犯上無所廻避又曰王駿為司隸校尉奏免丞相匡衡東觀漢記曰鮑永為司隸校尉時趙王良從上送中郎將來歙喪還入夏城門中與五官將軍相逢道迫良怒召門候岑尊叩頭馬前永劾奏良曰今月二十七日車駕臨故中郎將來歙喪還車駕過須臾趙王良從後到與右中郎將張邯相逢城門中道迫狹叱邯旋車又召門候岑尊詰責使前走數十步按良諸侯藩臣蒙恩入侍知尊帝城門使候吏六百石而肆意加怒令叩頭都道走馬頭前無藩臣之禮大不敬也後漢書曰鮑昱為隸在職奉法守正有父風永平五年坐救火遟免又曰鮑永為司隸鮑恢為都官從事並不避強禦詔策曰貴戚且當歛手以避二鮑其見憚如此永子昱復為司隸初拜使封胡降檄世祖遣問昱曰有所怪否對曰臣聞故事通官文書不著姓名又當司徒露布怪使司隸下書而著姓也上曰吾故欲令天下知忠臣之子復為司隸又曰李膺字元禮拜司隸校尉張讓弟朔為野王令貪殘無道畏膺而逃藏讓舍柱中膺率將吏破柱取朔付獄殺之讓訴冤於帝帝詔詰膺膺曰昔仲尼為魯司寇七日而誅少正卯今臣到官已積旬懼以淹留為不意獲速疾之罪乞留五日克殄元惡帝謂讓曰汝弟之罪也自是宦官屏氣休沐不敢復出帝問其故並叩頭泣曰畏李司隸也又曰司隸校尉下邳趙興亦不卹諱忌䘏憂也每入官舍輒更繕脩館宇移穿改築故犯妖禁而家人爵祿益用豐熾官至頴川太守子峻太傅以才器稱孫安代魯相三葉皆為司隸時稱其盛又曰江馮上言宜令司隸校尉督察三公陳元議以為不宜使有司省察公輔乃止續漢書曰陽球字方正漁陽人也少有勇氣尚書令中常侍王甫曹節等秉權勢球常唾手拊髀曰陽球作司隸此曹子何得爾耶尋為司隸明日詣闕謝恩甫時休下在舍球表甫罪收送洛陽詔獄自臨栲之甫子萌亦見收又曰牟融拜司隸校尉典司京都執憲持平多所舉正百僚莫不敬憚又曰百官志曰司隸校尉一人比千石孝武持節常察舉百僚以下及京師近都犯法者謝承後漢書曰華松擢為司隸校尉是時貴戚專勢有司軟弱莫敢糺罰松下車閉閤不通私書不與豪右相見姦慝犯者輒死奏馬氏三侯群豪歛手應劭漢官儀曰司隸校尉糺皇太子三公以下及旁州郡國無不統陛坐見諸卿皆獨席魏志曰徐宣遷司隸校尉從至廣陵大軍乘舟風浪暴起帝舩迴到宣舩在後凌波而前群寮無至者帝壯之又曰鍾會為司隸校尉雖在外司時政損益當世與奪無不畢綜晉書曰傅玄轉司隸校尉獻皇后崩於弘訓宮設喪位舊制司隸於端門外坐在諸卿上絕席而入殿按本品秩在諸卿下以次坐不絕席而謁者以弘訓宮為殿內制玄位在卿下玄恚怒厲聲色而責謁者妄稱尚書所處玄對百寮而罵尚書以下御史中丞庾純奏玄不敬玄又自表不以實坐免官然玄天性峻急不能有所容每有奏劾或值日暮捧白簡整簪帶竦踴不寐坐而待旦於是貴游懾伏臺閣生風臧榮緒晉書曰傅咸以議郎長兼司隸校尉咸前後固辭辭旨懇切上不聽切勑使者逼就拜授咸悲鯁傷咽以身無兄弟職無假到官之日喪祭無主重自陳乞遂不見聽聽於官舍設靈坐朔望秦祭咸臥病治職時朝廷寬弛豪右放恣郡縣容縱寇盜充仞攻篡囚徒掠奪市道交私情託朝野溷淆咸於是奏免河南尹京都肅然貴戚憚之數月之間三奏免選官奏按謇諤終無曲撓雖不見從有司肅然晉志曰漢武帝初置十三州刺史各一人又置司隸校尉察三輔三河弘農七郡晉諸公贊曰劉毅字仲雄為司隸奏太尉何曾尚書劉寔父子及羊琇張他等所犯狼藉司部守令事相連及覩風投印綬者甚眾皆以為毅能繼諸葛豐蓋寬饒也崔鴻十六國春秋前秦錄曰王猛望燕師之眾惡之謂鄧羗曰今日之事非將軍莫可以捷也成敗之機在斯一舉將軍其勉之羗曰若以司隸見與者公無以為憂唐書官品志曰司隸臺大夫一人正四品掌諸巡察其所掌六條一察品官以上理政能不二察官人貪殘害政三察豪強奸猾侵害下人及田宅踰制官司不能禁止者四察水旱蟲災不以實言枉徵賦役及無災妄蠲免者五察部內賊盜不能窮逐隱而不申者六察德行孝悌茂才異行隱而不貢者每年二月乘軺巡郡縣十月入奏英雄記曰董卓謂王允曰欲得一快司隸校尉誰可作者允曰唯有蓋勳元周京兆耳卓曰此明智有餘不可假以雄職列異傳曰故司隸校尉上黨鮑子都少時上計掾於道中遇一書生獨行時無伴卒得心痛子都下車為按摩奄忽而亡不知姓名有素書一卷銀十鉼即賣一鉼以殯其餘銀及素書著腹上呪之曰若子魂靈有知當令子家知子在此今使命不獲久留遂辭而去至京師有驄馬隨之人莫能得近唯子都得近子都歸行失道遇一關內侯家日暮住宿見主人呼奴通刺奴出見馬入白侯曰外客盜騎昔所失驄馬侯曰鮑子都上黨高士必應有語侯曰若此乃吾馬昔年無故失之子都曰昔年上計遇一書生卒死道中具述其事侯乃驚愕曰此吾兒也侯迎喪開椁視銀書如言侯乃舉家詣闕上薦子都聲名遂顯至子永孫昱並為司隸及其為公皆乘驄馬故京師歌曰鮑氏驄三入司隸再入公馬雖疲行步轉工傅咸集敘曰司隸校尉舊號臥虎誠以舉綱而萬目理提領而眾毛順州牧漢書曰何武與翟方進奏曰古選諸侯賢者以為州伯今部刺史居牧伯之位選第大吏所為位高至九卿所惡立退任重職大春秋之義用貴治賤不以卑臨尊刺史位下大夫而臨二千石輕重不相準請罷刺史更置州牧以應古制奏可續漢書曰皇甫嵩領冀州牧奏請一年租以賑飢民民歌曰天下亂兮市為墟母不保子兮妻失夫賴有皇甫兮復安居吳志曰呂範拜楊州牧性好威儀州民如陸遜全琮及貴公子皆脩敬虔肅不敢輕脫也其居家服飾於時奢靡然勤事奉法故懽悅其忠不怪其侈又曰呂岱傅廖式作亂圍城邑零陵蒼梧鬱林諸郡騷擾岱自表輒行星夜兼路權遣使追拜岱交州牧晉書曰張茂為涼州牧武公軌之子也築靈鈞臺周輪八十餘堵其高九仞武陵人閻曾夜叩門呼曰武公遣我來曰何故勞百姓而築臺乎姑臧令辛巖以曾妖妄請殺之茂曰吾信勞人曾稱先君之令何為妖乎太府主簿馬魴諫曰今世難未夷唯當弘道業不宜勞役崇飾臺榭比年已來轉覺眾務日奢於往每所經營輕違雅度實非士女所望於明公也茂曰吾過也命止作役又曰張駿為涼州牧刑清國富群寮勸進稱涼王領秦涼二州牧置公卿百官如魏武晉文故事駿曰此非人臣所宜言也敢有言此者罪在不赦然境內皆稱之為王北史曰裴俠嘗與諸牧守俱謁周文文命俠別立謂諸牧守曰裴俠清慎奉公為天下之㝡令眾中有如俠者可與之俱立眾皆默然無敢應者周文乃厚賜俠朝野歡服焉號為獨立使君北史曰後魏廣陽王嘉遷司州牧嘉表請於京四面築坊三百二十三各周一千二百步乞發三正復丁以充茲役雖有暫勞奸盜永止詔從之後周書曰蘇綽為六條詔書奏施行之太祖甚重之常置諸座右又令百司習誦之其牧守令長非通六條計帳者不得居守
