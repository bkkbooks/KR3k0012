body:
  text: 刑法部六決獄易曰澤上有風中孚君子以議獄緩死信發於中雖過可亮傳曰晉邢侯與雍爭鄐田久而無成士景伯如楚士景伯晉理官叔魚攝理攝代景伯韓宣子命斷舊獄罪在雍子雍子納其女於叔魚叔魚蔽罪邢侯蔽斷也邢侯怒殺叔魚與雍子於朝宣子問其罪於叔向叔向曰三人同罪施生戮死可也施行罪也雍子自知其罪而賂以賈直鮒也鬻獄邢侯專殺其罪一也已惡而掠美為昏掠取也昏亂也貪以敗官為墨墨不潔之稱殺人不忌為賊夏書曰昏墨賊殺皋陶之刑也請從之乃施邢侯而尸雍子與叔魚於市漢書曰高帝詔曰獄之疑者吏或不敢決有罪者久而不論無罪者久繫不決自今已後縣道官獄疑者各讞所屬二千石官長二千石官長以其罪名當報之當謂處斷也讞平議也所不能決者皆移廷尉亦當報之廷尉所不能決謹具為奏附所當比律令以聞又曰景帝詔曰獄重事也人有智愚官有上下獄疑者讞有司有司所不能決移廷尉有令讞而後不當讞者不為失假令讞訖其理不當所讞之人不為罪失欲令理獄者務先寬自此之後獄刑益詳近於五聽三宥之意又曰張釋之為廷尉頃之上行出中渭橋有一人從橋下走乘輿馬驚於是使騎捕之屬廷尉釋之治問曰縣人來聞蹕匿橋下久以為行過既出見車騎即走耳釋之奏此人犯蹕當罰金上怒曰此人親驚吾馬賴和柔令他馬固不敗傷我乎而廷尉當云罰金釋之曰法者天子所與天下公共也今法如是更重之是法不信於民也且方其時上使誅之則已今已下廷尉廷尉天下平也一傾天下用法皆為之輕重民安所措其手足惟陛下察之帝良久曰廷尉是也又曰于定國父于公決獄平羅文法者於公所決皆不恨郡中為立生祠東海有孝婦少寡無子養姑甚謹姑告鄰人曰孝婦養我勤苦哀其無子守寡我老久纍丁壯奈何遂自死姑女告吏婦殺我母吏捕孝婦孝婦自誣服于公以為不殺爭之弗能乃抱其獄具哭於府上太守竟殺婦郡中枯旱三年後太守至卜筮其故于公曰咎其殺孝婦太守殺牛祭孝婦墓天乃大兩後于公令高大門閭容駟馬高蓋車我治獄多陰德子孫必有興者至定國為丞相于定國為廷尉人自以不冤張釋之為廷尉天下無冤人又曰班固云今之聽獄者求所以殺之古之聽獄者求所以生之與其殺不辜寧失有罪今之獄吏上下相驅以刻為明深者獲功名平者多後患諺曰鬻棺者欲歲之疫非憎人欲殺之利在於人死也今治獄吏欲陷害人亦猶此矣續漢書曰郭躬字仲孫頴川人辟公府以明法律特預朝議時有兄弟共以繩絞殺人各持一端辜不可分中常侍孫章傳詔命兄不教導弟報兄重弟減死章誤言兩報重獄已斷尚書奏矯制當斬上問躬躬曰當罰金上曰矯殺人如何罰金躬曰法令有故有誤章不故指傳命誤即報重是故為無所放也周道如砥其直如矢君子不逆詐王法大刑不可委曲生意上曰善後魏書曰吳良為議郎永平中車駕近出而信陽侯陰就于突禁衛車府令徐匡鉤就車收御者送獄鉤留也詔書遣匡乃自繫良上言曰信陽侯就倚持外戚平犯乘輿無人臣禮為大不敬匡執法守正反下于理臣恐聖化由是而弛帝雖赦匡猶左轉良為即丘長又曰寒朗字伯奇永平中以謁者守侍御史與三府掾共按楚獄顏忠王平辭及隧鄉侯耿建曲成侯劉建等辭未嘗與忠平相見是時顯宗怒甚吏皆惶恐諸所連及率一切陷入無敢以情恕者朗心傷其冤試以建等物色獨問忠平而二人錯愕不能對朗知其詐乃上言建等無姦專為忠平所誣疑天下無辜類多如此帝曰即如是四侯無事何不早奏久繫至今耶朗曰臣恐海內別有發其姦者故未敢時上怒罵曰吏持兩端促提下左右方引去朗曰願一言而死小臣不敢欺欲助國耳臣見拷囚者咸共言妖惡大故臣子所宜同嫉今出之不如入之可無後責是以考一連十考十連百又公卿朝會陛下問以得失皆言舊制大罪禍及九族陛下大恩才上於身天下幸甚及其歸舍口雖不言而仰屋竊歎臣今所陳誠死無悔帝意解詔遣朗出後二日車駕幸洛陽獄録囚徒理出者千餘人又曰虞翊為司隸校尉臨終謂其子曰吾為朝歌長殺賊數百其中必有冤者自此二十餘年家門不增一口斯獲罪於天也又曰法雄為青州剌史每行部録囚徒察顏色多得情僞長吏不奉法者皆解印綬去又曰三府舉袁安能理劇拜楚郡太守是時楚王英反辭所連及繫者數千人顯宗怒甚吏案之急迫痛自誣死者甚衆安到郡不入府先往案獄理其無明驗者條上出之府丞掾史皆叩頭爭以為阿附反虜法與同罪不可安曰如有不合太守自當坐之不以相及也遂分別具奏帝感悟即報許得出者四百餘人又曰郭躬家代衣冠父弘習小杜律前書杜周武帝時為廷尉御史大夫斷獄深刻少子延年亦明法律宣帝時又為御史大夫對父故言小太守寇恂以弘為決曹掾斷獄至三十年用法平諸為弘所決者退無怨情郡內比之東海于公年九十五卒晉書曰周處為廣平太守有三十年滯獄一到悉惣決遣之理無不當又曰安帝義熙中劉毅鎮姑熟嘗出行南陵縣吏陳滿射烏箭誤中直師雖不傷人處法棄市何承天議曰獄貴情斷疑則從輕昔有驚漢文帝乘輿馬者張釋之斷以犯蹕罪止罰金何者明其無心於驚馬也故不以乘輿之重而加異制今滿意在射烏非有心於中人按律過誤傷人三歲刑況不傷乎後魏書曰真君中以獄訟留滯始令中書以中經義斷諸疑事高允據律評刑三十餘載內外稱平允獄者民之命也常嘆曰皋陶至德也其後英蓼先亡劉項之際英布黥而王經世雖久猶有刑餘之釁況丸人能無咎乎宋書曰謝莊為都官尚書奏改定刑獄曰舊官長竟囚畢郡遣督郵案驗仍就施刑督郵賤吏非能異於官長雖有案驗之名而無研窮之實愚謂此制宜革自今入重之囚縣考正畢以事言郡并送囚身委二千石親臨覆辨必收聲吞亹然後就戮若二千石不能決乃度廷尉神州統外移之剌史有疑亦歸臺獄必令死者不怨坐者無恨又曰沛郡相縣唐賜往比村彭家飲酒還因得病吐蠱蟲二十餘物賜妻張從賜臨終言死後親刳腹視五藏悉縻碎以張忍行刳剖賜子副又不禁止論妻傷夫五歲刑子不孝父母棄市並非科例三公郎劉協議賜妻痛往遵言兒識謝及理孝事源存心非忍害謂宜哀矜顧覬之議以為妻子而行忍酷不宜曲通小情謂副為不孝張同不道詔如覬之議隋書曰裴蘊授御史夫夫與裴矩虞世基參掌機密善候伺人主微意若欲罪者則曲法順情假成其罪所欲宥者則附從輕典因而釋之是後大小之獄皆以付蘊憲部大理莫敢與奪必稟進止然後決斷蘊亦機辨所論法理言若懸河或重或輕皆由其口剖析明敏時人不能致詰又曰裴政為少司憲用法寬平無有冤濫囚徒犯極刑者乃許其妻子入獄就之至冬將行決皆曰裴大夫致我於死死無所恨其處法詳平如此又曰郎茂衛國令時有繫囚二百茂親自究審數日釋免百餘人歷年辭訟不詣州省魏州剌史元暉謂茂曰長史言衛國民不敢申訴者畏明府耳茂進曰民猶水也法令為隄防隄防不固必致奔突茍無決溢使君何患哉暉無以應之又曰于仲文字次武為安固太守始州剌史屈突尚宇文護之黨也先坐事下獄無敢繩者仲文至郡窮治遂竟其獄蜀中為之語曰明斷無雙有于公不避強禦有次武未幾徵為御正下大夫又曰梁敬真大業之世為大理司直時帝欲成光祿大夫魚俱羅之罪令敬真治其獄遂希旨陷之極刑未幾敬真有疾見俱羅為之厲數日而死唐書曰貞觀初太宗謂侍臣曰死者不可再生用法務從寬恕古人云賣棺者願歲之病非憎於人利棺之售耳今司覆一獄必求深刻欲成其考課作何道理令得平允侍中王圭曰但任公正善人為法官若斷獄允當則增祑賜金如此則姦僞息矣太宗曰古者斷獄必訊於三槐九棘之官今三公九卿是也今後大辟罪結正更取公卿議之如是四年斷死刑二十九人天下幾致刑措矣又曰吏部尚書長孫無忌嘗被召不解佩刀入東上閣門待罪僕射封德彝議云監門校尉不之覺罪當死無忌誤帶刀入罰銅二十斤從之大理卿帶胄執奏曰校尉不覺與無忌帶入同為誤耳臣子之於尊極不得稱誤准律云供御湯藥飲舟船誤不如律者皆死陛下若録其功非憲司所決若當據法罰銅未為得理太宗嘉之免校尉死又曰李日知天授中遷司刑丞時用法嚴急日知獨寬平無冤濫嘗免一死囚少卿胡元禮斷請殺之與日知往復至于數四元禮怒曰元禮不離刑曹此囚終無生禮答曰日知不離刑曹此囚終無死法竟以兩狀列上日知果直又曰潤州剌史竇孝諶妻龐氏為奴誣告云夜解祈福則天令給事中薛季昶鞠之季昶斷鍊成其罪龐氏坐斬侍御史徐有功執論龐氏罪不至死季昶又劾有功黨惡逆法司結刑有功當棄市方視事令史垂泣以告有功曰豈吾獨死諸人長不死耶乃徐起而歸則天覽法司所劾召有功誥之曰卿此斷獄失出何多耶對曰失出臣下之小過好生聖人之大德願陛下捨小過弘大德則天下幸甚則天默然龐氏竟減罪流干嶺表又曰杜景佺為司刑丞天授年與徐有功來俊臣侯思正專理制獄時人稱云遇徐杜者必生遇來侯者必死又曰李勉為膳部員外時關東獻俘百人詔並處斬囚有仰天歎者勉偶過問之對曰某被脅制守官非逆者勉哀而上言曰元惡未殄遭點污者半天下皆欲澡心歸化若盡殺之是驅天下以資凶逆也肅宗遽令奔騎宥釋由是歸化日至又曰顏真卿為監察御史五原有冤獄久不決真卿至辨之天方旱獄決乃雨郡人呼之為御史雨又曰寶曆中京兆人有姑以小過鞭婦至死者府上其獄刑部郎中竇參斷合償死刑部尚書柳公綽議曰尊歐卑非鬥且其子在以妻而戮其母非教也竟從公綽之議得減死又曰竇參為奉先尉縣人曹芬隸北軍素凶暴與弟歐其女弟芬父救之不得遂投井死參捕理芬兄弟當死衆官皆請俟免喪參曰子因父生父由子死若以喪延罪是殺父不坐也皆正其罪而殺之一縣皆伏又曰德宗於朝堂別置三司以決庶獄辨爭者輒擊登聞鼓裴諝上疏曰夫諫鼓謗木之設所以達幽枉延直言今輕猾之徒援桴鳴鼓始動天聽竟因纖微若然者安用吏理乎上然之悉歸有司風俗通曰南郡讞女子何侍為許遠妻侍父何陽素酗酒從遠假求不悉如意陽數罵詈遠謂侍汝翁復罵者吾必揣之侍曰共作夫妻奈何相辱揣我翁者搏若母矣其後陽復罵遠遂揣之侍因上堂搏姑耳再三下司徒鮑宣決事曰夫妻所以養姑者也今壻自辱其父非姑所使君子之於凡庸不遷怒況所尊重乎當減死論又曰趙相汝南李統為冀牧阮況奏統耳目不聰宜免職任無幾冀州有疑獄章帝問統統處當剋厭上心帝曰君大聰明剌史不親君耳即日免況拜統侍中董仲舒決獄曰甲父乙與丙爭言相鬥丙以佩刀剌乙甲即以杖擊丙誤傷乙甲當何論或曰毆父也當梟首議曰臣愚以父子至親也聞其鬥莫不有怵悵之心扶伏而救之非所以欲詬父也春秋之義許止父病進藥於其父而卒君子原心赦而不誅甲非律所謂歐父也不當坐又曰甲夫乙將船會海盛風船沒溺流死亡不得葬四月甲母丙即嫁甲欲當何論或曰甲夫死未葬法無許嫁以私為人妻當棄市議曰臣愚以為春秋之義言夫人歸於齊言夫死無男有更嫁之道也婦人無專剌擅恣之行聽從為順嫁之者歸也甲又尊者所嫁無淫衍之心非私為人妻也明於決事皆無罪名不當坐
