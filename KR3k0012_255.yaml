body:
  text: 職官部五十二刺史上漢書曰監察御史秦官掌監郡漢省丞相遣刺史不常置武帝元封五年初部刺史掌奉詔條察州郡祑六百石員十三人又曰刺史以六條問事非條所問不省一條強宗豪石田宅踰制以強凌弱以衆暴寡二條二千石不奉詔書遵承典制背公向私旁詔守利侵漁百姓聚斂為姦三條二千石不恤疑獄風厲殺人怒則任刑喜則任賞煩擾刻暴剝截𥠖元為百姓所疾山崩石裂妖祥訛言四條二千石選署不平茍阿所愛蔽賢寵頑五條二千石子弟恃怙榮勢請託所監六條二千石違公下比阿附豪強通行貨賂割剝民人又曰王遵遷益州刺史先是琅邪王陽為益州刺史行部至九折阪歎曰奉先人遺體奈何數乘此險後以病去及遵為刺史至其坂問吏曰此王陽所畏道耶吏對曰是遵叱其馭曰驅之王陽為孝子王遵為忠臣又曰漢家立置郡縣部刺史奉使典州督察郡國吏人安寧故事居部九歲舉守相其有異材功著者聊登擢秩卑而賞厚咸勸功樂進今增秩為牧以高第補九卿其中材則茍自守而已恐功效陵夷姦軌不禁臣請罷牧置刺史如故奏可東觀漢記曰州牧刺史漢舊官建元元年復置牧十八年改為刺史督二千石又曰假熲起於徒中為并州刺史有功徵還京師熲乘車介士鼓吹曲蓋朱旗騎馬殷天蔽日連騎相繼數十里後漢書曰馬嚴上書云臣伏見方今刺史太守專州典郡不務奉事盡心為國而司察偏阿取與自己同則舉為尤異則中以刑法不即垂頭塞耳採求財賂又曰郭伋為并州牧過京師謝恩帝即引見并召皇太子諸王宴語終日賞賜車馬衣服什物伋因言選補衆職當簡天下賢俊不宜專用南陽人帝納之謝承後漢書云王宏遷冀州刺史宏性刻不發私書不容豪族賓客號曰王獨坐又曰李壽為青州刺史發璽書於本縣傳舍乘法駕騑騬朱軒就路奏免四郡相百城怖懼悉豫棄官魏志曰賈逵自梁道為豫州刺史是時天下初復州郡多不懾逵曰州本以御史出監諸郡以六條詔書察長吏二千石已下故其狀皆言嚴毅鷹揚有督察之才不言安靜寬仁有愷悌之德也今長吏慢法盜賊公行州知而不糾天子復何所取正乎逵到官數月乃還考竟其二千石以下阿縱不如法者皆舉奏免之帝曰逵真刺史矣布告天下當以豫州為法又曰張既字德容出為雍州刺史太祖謂既曰君還本州可謂衣繡晝行矣又曰呂虔字子恪任城人也遷徐州刺史加破虜將軍請琅耶王祥為別駕民事一以委之世多其能任賢晉書曰向雄太始中纍遷秦州刺史假赤幢曲蓋鼓吹又曰劉卞東平須昌人也後為嶽州刺史昔同時為須昌小吏者百餘人祖餞之其一人輕卞卞遣扶出之人以此少之又曰王機入廣州刺史郭訥握節而避機遂入城就訥求節訥曰昔蘇武不失其節前史以為美談此節天朝所假義不相與自可遣兵取之機慚而止又曰石苞為徐州刺史文帝之敗於東關也苞獨全軍而退帝指所持節謂苞曰恨不以此付卿晉陽春秋云胡質為荊州刺史子威自洛陽至荊州定省家貧自驅驢單行見父停十餘日臨歸質賜絹一匹為道糧威跪拜曰大人清高不審安得此質曰吾俸祿之餘故以為汝糧耳又曰晉武嘗問威曰卿清孰與卿父清威曰臣不如也帝曰何以為不如威曰臣父清畏人知之臣清畏人不知陸機晉武紀曰王濬之在巴郡也夢懸四刀於其上甚惡之璿主簿李毅拜賀曰三刀為州而見益一明府其臨益州乎濬果為益州刺史晉中興書曰荀羡字令則為徐州刺史時年二十中興方伯未有如羡少者梁書曰夏侯詳遷湘州刺史詳善吏事在州四載為百姓所稱州城南臨水有峻峰舊傳云刺史登此山輒代是山歷政莫敢至詳於其地起臺榭延僚屬以表損揖之志三國典略曰梁太祖制以南汾州刺史韋孝寬為雍州刺史先是路側一里置一土堠經雨頽毀每須修補孝寬臨州乃勒部內當土堆之處植樹以代之既免修復之勞旋又得庇蔭太祖後見之怪而問焉人以狀對太祖嘉之豈得一州獨爾當令天下同之於是令諸州夾道一里種一樹十里種二樹百里五樹焉又曰梁蕭恪字敬則南平元襄王偉之子也初恪為雍州刺史賓客有江仲舉蔡薳王臺卿庾仲容四人俱被接遇並有蓄積故樊鄧歌之云江千萬蔡五百正新車庾大宅梁武聞而接之曰主人憒憒不如客及恪還梁武問之恪甚慚恧後魏書曰高陽王雍為相州刺史帝誡曰為牧之道亦易亦難其身正不令而行故曰是易其身不正雖令不從故曰是難又曰高允為懷州刺史允秋日巡境問民疾苦至郡縣見邵公廟廢毀不立乃曰邵公之德闕而不禮為善者何望乃表聞修葺之又曰李崇為并州刺史多劫盜崇乃村置一樓樓懸一鼓盜發則擊之俄頃之間聲布百里遂多擒獲諸州鼓樓自崇始也又曰南安王禎出為相州刺史高祖餞之於林都亭詔曰今者之集雖曰分歧實為曲宴並可賦詩申意射者可以觀德不能賦詩者可聽射也當使武士彎弓文士下筆又曰汝陰王子修義字壽安涉獵書傳高才為高祖所知除右將軍齊州刺史修義以齊州頻喪刺史纍表固辭詔曰修短有命吉凶由人何過致憂憚以乖維城之寄違凶就吉時亦有之可聽更立廨宇修義於是移治東城又曰畢終敬父子相代為本州當世榮之時終敬以老還鄉常呼其子元賓為史君每於元賓聽政之時與出元賓所先遣左右勑不聽起觀其斷決欣欣然喜見顏色又曰邢巒征梁漢諸郡之民相繼而至遂平漢中詔曰巒至彼有以懷和附衆高下品第可依義陽都督之格也拜巒西安梁秦州刺史北齊書曰張亮武定初拜太中大夫薛琡嘗夢亮於山上挂絲以告亮且占之曰山上絲幽字也君其為幽州乎數日亮出為幽州刺史北史曰齊平鑒為楊州刺史其妻生男鑒因喜飲醉擅免境內囚誤免關中細作二人醒而知之上表自劾文宣原其罪賜牛羊酒令作樂又曰慕容三藏為郭州刺史州界連雲山響稱萬年者三詔頒郡國仍遣使醮山所其日景雲浮於上雉免馴壇側使還以聞上大悅後周書曰蘇亮出為岐州刺史朝廷以其牧本州特給路車鼓吹先還其宅并給騎士三千列羽儀遊鄉黨經過故人歡飲旬日然後入州世以為榮又曰獨孤信為秦州刺史嘗因獵日暮馳入城其帽微側詰旦而更人有戴帽者咸慕信而側帽焉其為鄰境及士庶所重如此又曰劉雄字猛雀高祖嘗從容謂雄曰古人云富貴不歸故鄉猶衣錦夜遊今以卿為本州何如雄稽首拜謝於是詔以雄為河州刺史雄先已為本縣令復有此授鄉里榮之又曰史寧為涼州刺史遣使詣太祖請事太祖即以所服冠履衣被及弓箭甲矟等賜寧謂其使人曰為我謝涼州孤解衣以衣公推心以委公公其善始令終無損功名也又曰長孫儉為荊州刺史時梁嶽陽王蕭察內附初遣使入朝至荊州儉於廳事列軍儀具戎服與使人以賓主禮相見儉容貌魁偉音聲如鍾大為鮮卑語遣人傳譯以問客客惶恐不敢仰視日晚儉乃著裙襦紗帽引客宴於別齊因序梁國喪亂朝廷招攜之意發言可觀使人大悅出曰吾所不能測也三國典略曰周陸逞字季明嘗為宜州刺史故事刺史奉辭例備鹵簿逞以時屬農要奏請停之制曰逞雖未臨人已存優恤宜遂所請彰其雅操又曰周帝制於玉壁置勳州以孝寬為刺史為其立勳於此因以名之又曰賀拔嶽引軍西次平涼嶽以夏州鄰接寇賊欲求良牧以鎮之衆咸曰宇文左丞即其人也嶽曰宇文左丞吾之左右手不可廢也沉吟纍日乃從衆議表太祖為夏州刺史陳書曰侯景平元帝遍問朝宰曰今天下始定極須良才請卿各舉所知群臣未有對者帝曰吾已得一人矣侍中王褒進曰未審為誰帝曰歐陽顧公有匡濟之才恐蕭廣州不肯致之乃授武州刺史
