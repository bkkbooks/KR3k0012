body:
  text: 皇王部二十四東晉康皇帝晉書曰康皇帝諱岳字世同成帝母弟咸和元年封吳王二年徙封琅耶王九年拜散騎常侍加驃騎將軍咸康五年遷侍中司徒八年六月庚寅成帝不豫詔以琅耶王為嗣癸巳成帝崩甲午即皇帝位大赦己亥封成帝子丕為琅耶王弈為東海王時帝諒陰不言委政于庾冰何充十二月壬子立皇后禇氏建元元年春正月改元賑恤鰥寡孤獨三月以中書監庾冰為車騎將軍二年九月丙申立皇子聃為皇太子戊戍帝崩于式乾殿在位三年時年二十三葬崇平陵初成帝有疾中書令庾冰自以舅氏當朝權侔人主恐異世之後戚屬將踈乃言國有強敵宜立長君遂以帝為嗣制度年號再興中朝因改元曰建元或謂冰曰郭璞讖云立始之際丘山傾立者建也始者元也丘山諱也冰瞿然既而歎曰如有吉凶豈改易所能救乎至是果驗云世說曰何次道庾季堅二人並為元輔成帝初崩于時嗣君未定何欲立子庾及朝議以外方強寇嗣子幼欲立康帝康帝既登祚會群臣謂何曰朕今所以承大統為誰之議何曰陛下龍飛臣冰之功使于時用微臣今不覩聖明之世上有慚色穆皇帝晉書曰穆皇帝諱聃字彭子康帝子也建元二年九月景申立為皇太子戊戍康帝崩己亥即皇帝位時年二歲大赦尊皇后為皇太后壬寅皇太后臨朝攝政永和元年春正月甲戍朔皇太后設白紗帷於太極殿抱帝臨軒改元二年十一月辛未安西將軍桓溫師虜將軍周撫輔國將軍譙王元忌建武將軍袁喬伐蜀拜表輒行十二月枉矢自東南流于西北其長半天三年春三月桓溫攻成都剋之李勢降益州平十年二月己丑太尉征西將軍桓溫帥師伐關中廢楊州刺史殷浩為庶人六月符健將符雄悉眾及桓溫戰于白鹿原王師敗績九月桓溫以糧盡遂還升平元年春正月壬戍朔帝加元服告于太廟始親萬機大赦改元增文武位一等皇太后居崇德宮五年五月丁巳帝崩顯陽殿在位十七年時年十九葬永平陵廟號孝宗哀皇帝晉書曰哀皇帝諱丕字千齡成帝長子也咸康八年封為琅耶王永和九年拜散騎常侍十二年加中軍將軍升平三年除驃騎將軍五月丁巳穆帝崩皇太后令曰帝奄不救疾胤嗣未建琅耶王丕本中興正統明德懋親昔在咸康屬當儲貳以年在幼冲未堪國難故顯宗高讓今議望情地莫與為比其以王奉天統於是百官備法駕迎于琅耶第庾申即皇帝位大赦八月己卯夜天裂廣數文有聲如雷九月戊申立皇后王氏穆帝皇后何氏稱永安宮興寧元年九月壬戍大司馬桓溫師眾北伐癸亥以皇子生大赦二年二月癸卯帝親耕籍田三月庚戍朔大閱人戶嚴法禁辛亥帝不豫帝雅好黃老斷穀餌長生藥服食過多遂中毒不識萬機崇德太后復臨朝攝政三年二月景申帝崩于西堂在位四年時年二十五葬安平陵廢帝海西公晉書曰廢帝諱弈字延齡哀帝母弟也咸康八年封為東海王永和八年拜散騎常侍尋加鎮軍將軍升平四年拜車騎將軍五年改封琅耶王隆和初轉侍中驃騎大將軍開府儀同三司興寧三年二月景申哀帝崩無嗣丁酉皇太后詔曰帝遂不救厥疾艱禍仍臻遺緒泯然哀慟切心琅耶王弈明德茂親屬當儲副宜奉祖宗纂承大統便速正大禮以寧人神於是百官奉迎于琅耶第是日即皇帝位大赦太和四年大司馬桓溫帥眾伐慕容暐秋七月辛卯暐將慕容垂帥眾拒溫溫擊敗之九月戊寅桓溫禆將鄧遐朱序遇暐將傅末波於林渚又大破之戊子溫至枋頭景申以糧運不焚舟而歸六年十一月癸卯桓溫自廣陵屯于白石丁未詣闕因圖廢立誣帝在藩夙有痿疾嬖人相寵計好朱靈寶等參侍內寢而二美人田氏孟氏生三男長欲封樹時人惑之溫因諷太后以伊霍之舉己酉集百官于朝堂宣崇德太后令曰王室艱難穆哀短祚國嗣不育儲宮靡立琅耶王弈親則母弟故以入纂大位大圖德之不建乃至於斯昏濁潰亂動違禮度有此三孽莫知誰子人倫道喪醜聲遐布既不可以奉守社稷敬承宗廟且昏孽並大便欲建樹儲藩誣罔祖宗傾移皇基是而可忍孰不可懷今廢弈為東海王以王還弟供衛之儀皆如漢朝昌邑故事初桓溫有不臣之志欲先立功河朔以收時望及枋頭之敗威名頓挫遂潛謀廢立以長威權然憚帝守道恐招時議以宮闈重閟床笫易誣乃言帝為閹遂行廢辱初帝平生每以為慮嘗召術人扈謙筮之卦成荅曰晉室有盤石之固陛下有出宮之象竟如其言咸安二年正月降封帝為海西縣公臧榮緒晉書曰太和元年桓溫表率方伯北伐秋九月溫以王帥敗績于枋頭溫自廣陵屯于白石集百宮于朝堂稱崇德太后詔廢帝為東海王妖賊盧悚遣弟殿中監許龍晨到稱太后密詔奉迎稱覆帝曰我得罪在此幸蒙寬宥豈敢妄動且太后有詔使應官屬來迎何得如此必狂亂因叱左右縛之龍懼逸走由是朝廷以帝安於屈辱無僥倖之望不復懷疑帝亦知天命不再而深慮人禍乃閉聰塞明無思無慮終日酣暢耽于內寵有子不養庶保天年吳民憐之為作歌謠帝崩于吳宮年三十五因葬吳地續晉陽秋曰帝少同閹人之疾而昵比左右初在東海琅耶因親近嬖人相寵計好朱靈寶等並侍臥內美人田氏遂生三男眾致疑惑然莫能審其虛實至是將建儲貳大司馬溫因之以定廢立之計遂率百僚並還朝堂本省溫平旦以眾入分兵屯宮門呈草於皇太后曰今廢弈為東海王以還弟供衛之儀如漢朝昌邑故事丞相錄尚書事會稽王昱體自中宗明德劭令民望依係為日已久宜順天人以統皇極主者明依舊典以時施行但未亡人不幸罹此百憂感念存沒心焉如割社稷大計議者不獲已臨紙悲塞如何可言時太后在佛屋燒香內侍啟云外有急奏太后乃出堂倚戶前視表數行乃曰我本自疑比至半便止求筆題奏後云未亡人離此百憂感念存沒心焉如割溫奏未有此五十字即奏遂廻換內之簡文皇帝晉中興書曰太宗簡文帝諱昱字道成中宗少子也母曰鄭夫人永昌二年封琅耶王咸和元年鄭夫人薨上時年七歲哀號守誠乞得服重朝議哀之故從封會稽王康獻皇后臨朝建位撫軍大將軍錄尚書六條事二年驃騎將軍何充薨皇太后詔上內總萬機海西公即位七月以琅耶王封絕復徙上為琅耶王封子昌明為會稽王固讓不受太和元年十月詔以為丞相尚書入朝不趍讚拜不名劍履上殿給羽葆鼓吹班劍六十人固讓不受海西公廢於是大司馬溫及百官進太極前殿具乘輿法駕奉迎於朝堂變服著平巾幘單衣東向拜受璽流涕即位改太和六年為咸安元年乙卯廢太宰武陵王為庶人二年七月上不豫己未立皇太子昌明為皇太子封皇子道子為琅耶王領會稽國是日帝崩于東堂在位一年時年五十二續晉陽秋曰桓溫始以雄盛入輔係以廢立帝雖登祚內不自安初熒惑入太微尋廢海西公至是熒惑猶在太微帝惡之謂郗超曰命之脩短本所不計故當無復近日事耶超云大司馬臣溫方內固社稷外布經略非常之事臣以百口保之假還東帝謂之曰致意尊公家國事一至於此由吾不能以道自衛思患預防愧歎之深言何能喻又誦庾闡詩云士痛朝危臣哀主辱因泣下及不預詔溫曰吾遂委頓足下便入冀得相見又詔曰不謂疾患遂至於此今者惙然勢不復久且雖有詔豈復相及慨恨兼深如何可言天下艱難而昌明幼冲眇然非阿衡輔導之計當何以寧濟社稷國事家計一託之於公又曰帝以太興三年生弱而慧異中宗深器焉及長美風姿好清言舉止端詳器服陳素與劉恢王濛等為布衣之友由登庸歷位散騎常侍右將軍撫軍將軍以懿親民望任登宰輔值穆帝幼冲母后臨朝桓溫有平蜀洛之勳檀強西陜帝於家國之寄具瞻所歸而自斷之弱無以抗之陳郡人殷浩素有盛名時論比之管葛又琅耶王洽承相導子既是名公子少有聲望乃以浩為湘州刺史屈洽為長史徐州刺史葛羨亦以清貴居藩同心憂國溫見此樹置知在抗已溫既以雄武專朝任兼將相悉眾北討以成樂推之勢及枋頭奔敗知民望之乃屠豫州刺史袁真於壽陽城既而問郄超曰足下以何雪枋頭之恥乎超因說溫以廢立之事溫既宿有此謀深納超言既廢昏立明民人悅服然恭已南面政自溫出帝性韻深沉雅有局鎮常與太宰武陵王晞桓溫同乘至板橋溫密勑令無因而鳴角鼓譟部伍並皆驚馳溫佯為駭異而晞大震驚急求下車帝舉止自若音顏不變溫每以此稱其德量故論者謂服憚之深若假帝脩年則溫纂逆之圖絕矣世說曰桓公既廢太宰武陵王晞父子仍上表云應割近情以存遠計欲除太宰父子可無后憂簡文手荅表云所不忍言況過於言桓公得此荅又重有表亂轉苦切為家國之計必應行事簡文復手荅云若使晉室靈長明公便應奉詔書若大運去矣請避賢路桓公讀詔手戰汗流而止遠徙新安而已孝武皇帝晉書曰孝武皇帝諱曜字昌明簡文帝第三子也興寧三年七月甲申封會稽王咸安二年秋七月己未立為皇太子是日簡文帝崩太子即皇帝位詔曰朕以不造奄丁憫凶號天扣地靡知所訴藐然幼冲眇若綴旒深為社稷之重大懼不剋負荷仰憑祖宗之靈積德之祀先帝淳風玄德遺詠在民宰輔英賢勳隆德盛顧命之託寔賴匡訓群后率職百僚勤政冀孤弱之躬有寄皇極之基不墜先恩遺惠播于四海思弘餘潤以康黎庶其大赦天下與民更始九月甲寅追尊皇妣會稽王妃曰順皇后冬十一月甲午妖賊盧悚晨入殿庭游擊將軍毛安之討擒之是歲三吳大旱人多餓死詔所在賑給寧康元年春正月改元二月大司馬桓溫來朝秋七月己亥使持節侍中都督中外諸軍事丞相錄尚書大司馬楊州牧平北將軍徐兗二州刺史南郡公桓溫薨三年九月帝講孝經冬十月癸酉日有蝕之十二月甲申神獸門災癸未皇太后詔曰傾者日蝕告變水旱不適雖剋己思救未盡其方賜百姓窮者米人五斛癸巳帝釋奠于中室祠孔子以顏回配泰元元年春正月帝加元服見于太廟皇太后歸政甲辰大赦改元景午帝始臨朝六年春正月帝初奉佛法立精舍于殿內引諸沙門以居之八年八月符堅帥眾渡淮遣征討都督謝石冠軍將軍謝玄輔國將軍謝琰西中郎將桓伊等拒之九月詔司徒琅耶王道子錄尚書六條事冬十月符堅弟融陷壽春乙亥諸將及苻堅戰於肥水大破之俘斬數萬計獲堅輿輦及雲母車十二年六月癸卯束帛聘處士戴逵龔玄之秋八月辛已立皇子德宗為皇太子大赦二十一年九月庚申帝崩于清暑殿在位二十四年時年三十五葬平陵帝幼稱聰悟簡文之崩也時年十歲至晡不臨左右進諫荅曰哀至則哭何常之有謝安嘗歎以為精理不減先帝既威權已出雅有人主之量既而溺於酒色殆為長夜之飲末年長星見帝心甚惡之夜於華林園舉酒祝之曰長星勸汝一柸酒自古何有萬歲天子耶太白連年晝見地震水旱為變者相屬醒日既少而傍無正人竟不能改焉時張貴人有寵年三十帝戲之曰汝以年當廢矣貴人潛怒向夕帝醉遂暴崩時道子昏惑元顯專權竟不推其罪初以簡文帝見讖云晉祚盡昌明及帝之在孕也李太后夢神人謂之曰汝生男以昌明為字及產東方始明因以名焉簡文帝後悟乃流涕及為清暑殿識者以為清暑反為楚聲哀楚之徵也俄而帝崩晉祚自此傾矣續晉陽秋曰初帝躭於色末殆為長夜之飲醒治既少多居內殿留連於盤鐏之間時張貴人寵冠後宮威行閫內年幾三十帝妙列伎樂陪侍嬪少乃笑而戲之云汝已年廢矣吾已屬諸妹少矣貴人潛怒上不覺上稍醉臥貴人遂令其婢蒙之以被既絕云以魘崩至丑時方遷登太極前殿異苑曰晉孝武太元末帝每聞手巾箱中有鼓吹鼙角之饗於是請僧齋會夜見一臂長三丈許手長數尺來摸經案晉祚自此而衰
