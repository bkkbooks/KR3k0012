body:
  text: 羽族部二鳳春秋演孔圖曰鳳火精春秋元命苞曰火離為鳳禮運曰鳳以為畜故鳥不獝況必切又曰升中于天而鳳皇降龜龍假又曰四靈為畜何謂四靈麟鳳龜龍之謂又曰無水旱昆蟲之災凶飢妭孽之疾故天不愛其道地不愛其寶人不愛其情則鳳凰在郊藪其餘鳥獸卵胎皆可俯而窺也左傳曰陳大夫卜妻敬仲妻占之曰吉鳳皇于飛和鳴鏘鏘有媯之後將育于姜又曰我高祖少皞摯之立也鳳鳥適至故紀於鳥為鳥師而鳥名鳳鳥氏司曆者也杜預注曰鳳知時故以名曆官詩曰鳳皇于飛翽翽其羽亦傳於天鳳皇鳴矣於彼高崗梧桐生矣于彼朝陽又䟽曰鳳鳥一名鸑鷟非梧桐不栖非竹實不食書曰蕭韶九成鳳皇來儀論語曰鳳鳥不至河不出圖吾已矣夫又曰鳳兮鳳兮何德之衰爾雅曰鶠鳳其雌皇郭璞注瑞應鳥雞頭虵頸燕領龜背魚彩色高六尺大戴禮曰羽蟲三百六十而鳳皇為之長禮斗威儀曰君乘土而王其政太平則鳳集於林菀春秋感精符曰王者上感皇天則鸞鳳至春秋繁露曰恩及羽蟲則鳳皇翔春秋運斗樞曰天樞得鳳皇翔春秋合成圖曰黃帝遊玄扈雒上與大司馬容光等臨觀鳳皇銜圖置帝再拜受圖又曰堯坐舟中與太尉舜臨觀鳳皇負圖授堯圖以赤玉為柙長三尺廣八寸厚五寸黃玉檢白玉檢白玉繩封兩端其章曰天赤帝符璽五字呂氏春秋曰帝嚳有聖德作樂六英乃令人卞使鳳皇鼓翼而舞又曰黃帝聽鳳皇之鳴以別十二律又曰鷰雀為鴻鵠鳳皇慮則必弗得矣其所求者瓦孔之間隟屋之翳蔚也韓詩外傳曰黃帝即位施聖仁恩承天明命一道脩德唯仁是行宇內和平未見鳳皇乃召天老而問之曰鳳皇何如天老對曰天鳳象鴻前而麟後虵頸而魚尾龍文而龜身鷰𪁟而鷄喙首戴德頸揭義背負仁心入信翼採義足履正尾繫武小音金大音鼓延頸奮翼五光備舉食有質飲有儀住即文來則喜游必擇所飢不妄下其鳴也雄曰節節雌曰足足昏鳴曰固常晨鳴曰發明晝鳴曰保章舉鳴曰上翔集鳴曰歸昌夫唯鳳為能究萬物通天地象百物達乎道律五音成九德覽九州觀八極則有福備文武王下國故得鳳象之一則鳳過之得鳳象之二則鳳翔之得鳳象之三則鳳集之得鳳象之四則鳳春秋下就之得鳳象之五則鳳沒身居之黃帝曰於戲允哉朕何敢與焉於是黃帝乃服黃衣帶黃紳戴黃冠齊于中宮鳳乃蔽日而至黃帝降于東階西面再拜稽首皇天降祉不敢不承命鳳乃止帝東園集梧樹食竹實沒身不去尚書考靈曜曰通天文者明於明天道也審地理者昌昌猶盛也盛於萬物明者天之時也昌者地之財也明王治鳳皇下之尚書中候曰黃帝時天氣休通五行期化鳳皇巢阿閣讙樹注曰阿榮名宮中之御門曰閣鳳皇於榮屋徒而出讙鳴於朝廷之樹又曰堯即政七十年鳳皇止庭伯禹拜曰黃帝軒提象鳳皇巢阿閣又曰帝舜云朕惟不乂百獸鳳晨百獸率舞鳳皇司晨鳴也又曰周文王作豐一朝扶老至八十萬戶草居陋然歌即曰鳳皇下豐也尚書帝命驗曰舜授終赤鳳來儀尚書大傳曰舜好生惡殺鳳皇巢其樹論語摘襄聖曰鳳有六像九苞一曰頭像天二曰目像日三曰背像月四曰翼像鳳五曰足像地六曰尾像緯九苞一曰頭符命二曰眼合度三曰耳聰達四曰舌詘伸五曰色彩光六曰冠短周七曰距銳鉤八曰音激揚九曰腹文戶行鳴曰歸嬉上鳴曰提扶夜鳴曰善哉晨鳴曰賀世飛鳴曰即都知我者唯黃持竹實來故子欲居九夷從鳳嬉宋均注曰緯五緯也度天度數也固當作朱米色好也戶所由出入陰陽出入亦閉戶善哉應天下興平也賀世慶賀於時也黃帝中通理者也鳳遇亂則潛居夷狄也孝經援神契曰王者德至鳥獸則鳳皇翔孝經鉤命決曰孝悌之至通於神明則鳳皇巢樂動聲儀曰鎮星不逆行則鳳皇至樂計圖曰五音克諧各得其倫則鳳皇至冠類鷄頭鷰喙虵頸龍形麟翼魚尾五彩不喙生蟲帝王世紀曰黃帝服齊于中宮坐于玄扈洛上乃有大鳥鷄頭鷰喙龜頸龍形麟翼魚尾其狀如鶴體備五色三文成字首文曰順德背文曰信義膺文曰仁智不食生蟲不履生草或止帝之東園或巢阿閣其飲食也必自歌舞音如簫笙又曰國安其主好文則鳳皇翔史記曰四海之內咸戴舜功興九韶之樂而鳳皇翔天下明德自虞帝始漢書曰昭帝始元三年鳳皇集東海遣使祠其處又曰宣帝幸河東之明年春鳳皇集於所集處得玉寶迺下詔赦天下又曰鳳皇集上林乃作鳳皇殿以荅嘉瑞又曰幸甘泉郊泰畤改元曰五鳳論衡云宣帝時鳳皇五至又曰本始元年鳳皇集膠東十四年鳳皇集魯群鳥從之詔曰威鳳為寶鳳皇有威儀也神爵四年鳳皇十一集社稷又曰帝祠后土鸞鳳翱翔又曰五鳳三年鸞鳳又集長樂宮東園樹上飛下至地文章五色留十餘刻吏民並觀之東觀漢記曰光武生於濟陽先是鳳皇集濟陽故宮皆畫鳳皇聖瑞始於此又曰建武十七年鳳皇五高八九尺毛羽五采集頴川郡鳥從之蓋地數頃留十七日乃去章帝時鳳皇三十九見又曰安帝延光三年鳳皇集濟南臺丞霍穆舍樹上賜帛各有差魏略曰文帝欲受禪郡國奏鳳皇十三見明帝鑄銅鳳皇高三丈餘置殿前吳曆曰太元元年有鳥集苑中似鴈高足長尾毛羽五色咸以為鳳皇改年為鳳皇元年晉書曰荀勗自中書監遷守尚書令勗久在中書專管機事及失之甚罔罔悵倀或有賀之者勗曰奪我鳳皇池諸君賀我耶晉陽春秋曰升平四年鳳皇將九子見鄖鄉之豐城冬復見眾鳥從焉宋書曰王曇首與兄弟集會子孫任其戲適僧達跳下地作彪子僧虔累十二博基既墜落亦不重作僧綽採蠟燭珠為鳳皇僧達奪取於懷亦復不惜伯父弘稱其長者又曰王僧虔子慈少與從弟儉共書謝鳳子超宗嘗候僧虔仍往東齊詣慈正學書未即放筆超宗曰卿書何如虔乃荅曰慈書比大人猶雞之比鳳又曰謝鳳子超宗有文辭盛得名譽選補新安王子鸞國常侍王母殷淑儀卒超宗作誄奏之帝大嗟賞謂謝莊曰超宗殊有鳳毛時右衛將軍劉道隆在御坐出候超宗曰聞君有異物可見乎超宗曰懸罄之室復有異物耶道隆武人無識正觸其父名曰旦恃宴至尊說君有鳳毛超宗徒跣還內道隆謂檢覔毛至闇待不得乃去又曰元嘉十四年春鳳皇二見于都下眾鳥隨之改其地曰鳳皇里又曰何承天為著作佐郎年已老而諸佐郎並名家年少頴川荀伯子嘲之常呼為妳母承天曰卿當云鳳皇生九子妳母何言耶齊書曰江夏王鋒年五歲性方整好學書高帝使學鳳尾詔一學即工高帝大悅以玉騏驎賜之曰以騏驎賞鳳尾矣梁書曰武帝初平東昏入于閱武堂是日鳳皇見又曰天監初鳳皇見建康縣同夏里又集南蘭陵崔鴻十六國春秋前秦錄曰永興三年九月鳳皇集于東闕民因歌之曰鳳皇于飛其羽翼翼淵哉聖后其齡萬億陸翽鄴中記曰石季龍與皇后在觀上為詔書五色紙著鳳口中鳳既衘詔侍人放數百文緋繩轆轤佪轉鳳皇飛下鳳以木作之五色漆畫腳皆用金又曰鳳陽門五層樓去地三十丈安金鳳皇二頭石虎將衰一頭飛入漳河會晴日見於水中一頭以鐵釘釘足今存二石偽事曰石昆降說鄴中有鳳皇將九鶵在延明門外道西後魏書曰彭城王勰與帝昇金墉顧見堂後桐竹曰鳳皇非梧桐不栖非竹實不食今桐竹並茂詎能降鳳乎勰曰鳳皇應德而來豈桐竹能降帝曰朕亦望降之唐書曰薛收從子元敬選部郎邁之子也亦有文學為收之亞初大業末薛德音及收元敬俱有才名時人謂之河東三鳳又曰武德九年海州言鳳見于城上群鳥數百隨之東北飛向蒼梧山又曰太宗時莒州言鳳皇二見群鳥隨之其聲若八音之奏又曰太宗嘗追思王業艱難佐命之臣乃作威鳳賦以賜長孫無忌其辭曰有一威鳳憩翮朝陽晨遊紫霧夕飲玄霜資長風以舉翰戾天衢而遠翔徐整正曆曰黃帝之時以鳳為雞莊子曰老子見孔子從弟子五人問曰前為誰對曰子路勇且多力其次子貢為智曾子為孝顏回為仁子張為武老子歎曰吾聞南方有鳥名為鳳所居積石千里天為生食其樹名瓊枝高百仞以璆琳瑯玕為寶天又為生離珠一人三頭起以伺琅玕鳳鳥之文戴聖嬰仁右智左賢文子曰主有積道德天與之地助之神鬼輔之則鳳皇翔其庭也孫卿子曰古之王者其政好生惡殺鳳在列樹又曰鳳鳥啾啾其翼若竿其聲若簫有皇有鳳樂帝之心此聖不蔽福也韓子曰昔者黃帝合鬼神於西大山鳳皇覆上作為清角淮南子曰鳳皇之翔至德必也過崑崙之䟽圃飲砥柱之涔瀨邅廻濛汜之渚當此之時鴻鵠蒼鶴莫不憚驚伏竄注喙江介又況鷰雀之類乎昔者二皇鳳至於庭二皇宓羲神農三代鳳至於門三代堯舜禹周室鳳至於澤德彌確所至彌遠德彌精所至彌近抱朴子曰夫木行為仁為青鳳頭上青故曰戴仁也金行為義為白鳳纓白故曰纓義也火行為禮為赤鳳赤故曰負禮也水行為智為黑鳳胸黑故曰尚智也土行為信為黃鳳足下黃故曰蹈信也古者太平之世鳳皇常居其國而生乳焉又曰夫麟鳳以形為別始食鳳卵而鳳去則鳳有種明矣又曰鸞鳳競粒於庭則授辱於鷄騖也鶡冠子曰鳳火鳥鶉火之禽陽之精也德能致之其精畢至任子曰鳳為羽族之美麟為毛類之俊龜龍為介蟲之長楩楠為眾材之最是物之貴也山海經曰軒轅之丘鷰鳥自歌鳳鳥自舞皇卵民食之又曰丹穴之山有鳥焉其狀如鶴五采而文名曰鳳鳥首文曰德翼文曰順背文曰義膺文曰仁腹文曰信是鳥也飲食自歌自舞見則天下大安楚辭曰鳧鴈皆唼夫梁藻兮鳳逾翱而高舉眾鳥皆有所登棲兮鳳獨皇皇而無所集欲衘枚而亡言兮嘗君之渥洽驥不驟進而求服兮鳳亦不貪餧而忘食又曰為鳳皇作鶉籠雖歙翼而不容又曰獨不見鸞鳳之高翔大皇之野循四極而周回見盛德而後下宋玉對曰聞鳳鳥上九千里絕雲霓負蒼天呼窈冥之中藩籬之鷃豈能與之料天地之高哉說文曰鳳神鳥也天老曰鳳像麟前鹿後虵頸魚尾龍文龜背燕頷鷄喙五色備舉出東方君子之國翱翔四海之外過崑崙砥柱濯羽弱水暮宿丹穴見則天下安寧從鳥凡聲也飛則群鳥從以萬數故古鳳作鵰字鷗鳥也其雌皇一曰即鳳皇也鳳者羽蟲之長也漢武內傳曰西王母曰仙之上藥有九色鳳腦次藥有蒙山白鳳之脯白虎通曰鳳皇禽之長上有明王太平乃來西京雜記曰揚雄讀書有語之曰無為自若苦玄故難傳忽不見雄著太玄經夢吐白鳳皇集其項上而滅楊子法言曰鳳鳥蹌蹌匪堯之庭或問君子在治曰若鳳治則見亂則隱太元經曰鸞鳳不遷甘於竹實騶虞不移於生物醜婦以明鏡為害無所逃其陋論衡曰瑞指篇鳳皇麒麟為聖人來即是聖人之禽也按聖人遊於人間麟鳳亦應與眾鳥同何故遠去中國處於邊外崔贛易林曰神鳥五色鳳凰為主集於王谷使君得所又曰鳳有十子同巢共母懽以相保又曰鳳生五鶵長于南郭君子康寧悅樂身榮括地圖曰孟虧人首鳥身其先為虞氏馴百禽夏后之未世民始食卵孟虧去之鳳凰隨焉止于此山多竹長千仞鳳凰食竹實孟虧食木實去九疑萬八千里十洲記曰鳳麟洲在西海之中四面有弱水繞之鴻毛不浮不越也上多鳳麟數萬餘群仙家煮鳳喙及麟角合煎作膠名之為集絃膠或名連金泥能連弓弩斷弦連刀劍斷斫蔡邕琴操曰周成王時天下大治鳳皇來舞於庭成王乃援琴而歌曰鳳皇翔于紫庭余何德兮以感靈列仙傳曰簫史教弄玉作鳳鳴居數十年吹簫作鳳聲鳳皇來至其屋為作鳳臺夫婦止其上一日一夜皆隨鳳皇飛去王子年拾遺記曰周昭王以青鳳之毛為二裘一曰燠質二曰暄肌常以禦寒至厲王末猶寶此物及厲王流于彘人得而珍之人罪有陷大辟者以青鳳毛贖罪免死片毛則准千金異苑曰東莞劉穆之字道民素居京口晉隆安中鳳皇集其庭相人韋藪調之曰子必協贊大猷李彤四部曰吊鳥山俗傳曰鳳死於上歲七月至九月群鳥常來集其上鸑鷟國語曰周之興鸑鷟鳴于歧山說文曰鸑鷟鳳屬神鳥也三輔決錄注曰太史令蔡衡云毛色多紫者為鸑鷟後漢書曰永平中有神雀集宮殿官府冠羽有五采色帝異之以問臨邑侯劉復復不能對薦賈逵博物多識帝乃召見逵問之對曰昔武王終父之業鸑鷟在歧鸑鷟鳳之別名也周大夫內史過對周宣王曰周之興也鸑鷟鳴歧山事見國語宣帝威懷戎狄神雀仍集此胡降之徵也唐書曰張鷟字文成聰警絕倫書無不覽為兒童時夢紫色大鳥五色成文降于家庭其祖謂之曰五色赤文鳳也紫文鸑鷟也為鳳之佐兒當以文章瑞於明廷因以為名字鵷鶵山海經曰南禺之山其鳥鵷鶵莊子曰惠子相梁莊子往見之惠子恐代其相搜國中三日三夜莊子伏主人馬棧下往見之曰南方有鳥名鵷鶵南海而飛之北海非梧桐不栖非竹實不食非醴泉不飲於是鴟得腐鼠鵷鶵過仰而視之曰嚇子欲以梁國嚇我耶鵕鸃倉頡解詁曰鵕鸃神鳥飛竟天漢以為侍中冠雜字解詁曰鵕鸃似鳳凰史記曰孝惠郎中皆冠鵕鸃南越志曰曾城縣多鵕鸃鵕鸃山鷄也利距善鬭光色鮮明五色炫耀楚辭曰曳彗星之皓肝兮撫朱雀與鵕鸃朱雀鵕鸃神俊之鳥也動以神物自喻當差鵕鸃飛能冲天司馬相如子虛賦曰掩翡翠射鵕鸃
