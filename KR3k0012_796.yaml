body:
  text: 西戎西烏孫史記曰烏孫在大宛東北可二千里行國隨畜牧與匈奴同俗漢書曰烏孫國多馬富人至四五千疋民貪狼無信多寇盜最為強國北史曰烏孫居赤谷城在龜茲西北去代一萬八百里其國數為蠕蠕所侵西徙葱嶺山中無城郭隨畜牧水草後魏太延中遣使者董琬等使其國後每來朝貢通典曰烏孫漢時國號大昆彌理赤谷城烏孫於西域諸戎其形最異青眼赤鬚獼猴者本其種也其國謂王曰昆彌亦曰昆莫去長安八千九百里內地五千里莽平多雨寒山多松樠音武丸切其心似松不田作種樹隨畜逐水草與匈奴同俗又曰烏孫昆莫彌皆王號也故烏孫國有塞種大月氐種始張騫言烏孫本與大月氐共在燉煌間今烏孫強大可厚賂招令東居故地妻以公主以制匈奴武帝即位令騫齎金幣往賜昆莫於是使獻馬願尚公主元封中遣江都王建女細君為公主以妻焉公主別理宮室居歲時一再與昆莫會置酒飲食昆莫年老語言不通公主悲愁自作歌曰吾家嫁我兮天一方遠託異國兮烏孫王穹廬為室兮氈為墻以肉為食兮酪為漿天子聞而矜怜之又曰宣帝時都護鄭吉請分烏孫為大昆彌小昆彌後叚會宗為都護時為烏孫兵圍騎上書願發城郭燉煌以自救丞相王商大將軍王鳳及百寮議數日不決上召陳湯問對曰臣以為此必無可憂夫胡兵五而當漢兵一刃札鈍弓弩不利今聞頗得漢工然而猶三當一又兵法曰客倍而主人半然後料敵今烏孫人眾不足以勝會宗惟陛下勿憂且兵輕行五十里重行三十里今會宗發城郭燉煌兵歷時而至所謂報讎之兵非救急之用也烏孫瓦合不能久攻不過五日當有吉語聞居四日軍書至言已解悅般北史曰悅般國在烏孫西北去代一萬九百三十里其先匈奴北軍單于之部落也為漢車騎將軍竇憲所逐北單于度金微山西走康居其羸弱不能去者住龜茲北地方數千里眾可二十餘萬涼州人猶謂之單于王其風俗言語與高昌同而其人清潔於胡俗剪髮齊眉以醍醐塗之昱昱然光澤日三澡漱然後飲食其國南界有大山山傍石皆燋鎔流地數十里乃凝堅人取以為藥即石流黃也與蠕蠕結好其王嘗將數千人入蠕蠕國欲與大檀相見入界百餘里見其部人不浣衣不絆髮不洗手婦人口舐器物王謂其從臣曰汝曹誑我將我入此狗國中乃馳還大檀遣騎追之不及自是相仇讎數相征討後魏大武真君九年遣使朝獻并送幻人稱能割人喉脈令斷擊人頭令骨陷皆血出數升或盈斗以草藥內其口中令嚼咽之須臾血止養瘡一月復常又無痕瘢世疑其虛乃取死罪囚試之皆驗云中國諸名山皆有此草乃使人受其術而厚遇之又言其國有大術者蠕蠕凍死漂亡者十二三是歲再遣使朝貢求與官軍東西齊契討蠕蠕太武嘉其意命中外諸軍戒嚴以淮南王他為前鋒襲蠕蠕仍詔有司以其鼓儛之節施於樂府自後每使朝貢迷蜜北史曰迷密國都迷密城在者至拔西去代萬二千一百里後魏正平元年遣使獻一峰黑橐駞其國東有山名都悉滿山出金玉多鐵党項隋書曰党項羗者三苗之後也其種有宕昌白狼皆自稱獮猴種東接臨洮西平西拒葉護南北數千里處山谷間每姓別為部落大者五千餘騎小者千餘騎織犛牛尾及𦍩䍽羊毛以為屋服裘褐被氈以為上飾俗尚武力無法令各為生業有戰則相屯聚無徭賦不相往來牧養犛牛豬以為供食不知稼穡無文字但推草木以記年歲時三年一聚會殺牛羊以祭天人年八十已上死者以為令終親戚不哭少而死者則云夭枉共悲哭之有琵琶撗吹擊缶為節唐書曰党項羗在古析支之地漢西羗之別種也魏晉之後西羗微弱或臣中國或竄山野自周氏滅宕昌鄧至之後党項始強其界東至松州西接葉護南雜舂桑迷桑等羗北連吐谷渾處山谷間延亙三千里其種每姓別為部落一姓之中復為小部落大者萬騎小者千騎不相統一有細封氏費聽氏頗超氏野辭氏采擒氏拓拔氏最為強族俗皆土著居有棟宇其屋織犛毛及羊毛覆之每年一易俗尚武無法令賦役其人多壽年至百五六十歲不事產業好為盜互相凌劫尤重復讎若讎人未得必蓬頭垢面跣足蔬食要斬讎人而後復常男女並衣裘褐仍披大氈養驢羊以供其食不知耕稼土無五穀氣候多風寒五月草始生八月霜雪降求大麥於他界醞以為酒妻其庶母及伯叔母嫂子弟之婦淫穢蒸報諸夷中最為甚自周及隋或叛或朝常為邊患貞觀三年南會州都督鄭元璹遣使招諭其酋長細封步賴舉部內附太宗降璽書慰撫之步賴因即來朝宴賜甚厚列其地為軌州拜步賴為刺史仍請率所部封吐谷渾其後諸姓酋長相次率部落皆來內屬請同編戶太宗厚加撫慰列其地為崌音居奉巖遠四州各拜其首領為刺史又曰有黑党項在於赤水之西李靖之擊吐谷渾也渾主伏允奔于黑党項居以空閑之地及吐谷渾舉國內屬黑党項酋長號敦善王因貢方物又有雪山之下及白狗舂桑白蘭等諸羗焉耆北史曰焉耆國在車師南都員渠城白山南七十里漢時舊國也去代一萬二百里其王姓龍名鳩尸畢郍即前涼張軌所討龍熙之嗣所都城方二里國內凡有九城國小人貧無綱紀法令又曰其丈夫剪髮以為首飾文字與婆羅門同俗事天神並崇信佛法尤重二月八日四月八日是日也其國咸依釋教齋戒行道焉又曰其國養蚕不以為絲唯充綿纊俗尚蒲桃酒兼愛音樂南去海十餘里有魚鹽蒲葦之饒又曰後魏太武怒之詔成周公万度歸討之鳩尸畢郍以四五萬人出城守險以距度歸募壯勇短兵直往衝鳩尸畢郍眾大潰進屠其城西鄙諸戎皆來降服獲其珍奇異翫殊方譎詭難識之物巨萬時太武幸陰山北宮度歸破焉耆露板至帝省訖賜司徒崔浩書曰万度歸以五千騎經五千里拔焉耆三城獲其珍奇異物及諸委積不可勝數自古帝王雖云西戎即序有如指注不能控引也朕今手把而有之如何浩書上稱美隋書曰焉耆國俗奉佛書類婆羅門婚姻之禮有同華夏男子剪髮有魚鹽蒲葦之利唐書曰焉耆在京師西七千三百里其地良沃貞觀六年其王突騎支遣使貢方物復請開大磧路以便行李太宗許之自隋末離亂磧路遂閉西域朝貢者皆由高昌及是高昌大怒遂與焉耆結怨遣兵襲焉耆大掠而去又曰貞觀十四年侯君集討高昌遣使與之相結焉耆王大喜請為聲援乃破高昌其王詣軍門稱謁焉耆人先為高昌所虜者悉歸之由是遣使謝恩并貢方物小月氏北史曰小月氏國都富樓沙城其王本大月氏王寄多羅子也寄多羅為匈奴所逐西徙後令其子守此城因號小月氏被服頗與羗同其俗以金錢為貨又曰其城東十里有佛塔周三百五十步高八十丈自佛塔初建計至後魏武定八年八百四十二年所謂百丈佛圖也佛䔉唐書曰佛䔉國一名大秦在西海之上東南與波斯接地方萬餘里列城四百邑連屬其宮宇柱梲多以水精瑠璃為之有貴臣十二人共理國政常使一人將囊隨王車百姓有事即以書投囊中王還宮省發理其枉直其王無常人簡賢者而立之國中災異及風雨不時輒廢而更立王冠形如烏舉翼冠及纓絡皆綴以珠寶著錦繡衣前不開襟坐金花床有一鳥似鵝其毛綠色常在王邊倚枕上坐每進食有毒其鳥輒鳴其都城疊石為之尤絕高峻凡有十萬餘戶南臨大海城東面有一大門其高二十餘丈自上及下飾以黃金光輝昭爛連曜數里自外至王室凡有大門三重列異寶雕飾第二門之樓中懸一大金秤以金九十二枚屬於衡端以候日之十二時焉為一金人其大如人立於側每至一時其金丸輒落鏗然發聲引唱以紀日時毫釐無失其殿以瑟瑟為柱黃金為地象牙為門扇香木為棟梁其俗無瓦擣白石為末羅之塗握上其堅密光潤還如玉石至於盛暑之節人厭囂熱乃引水潛流上遍於屋宇機制巧密人莫之知觀者唯聞屋上泉鳴俄見四簷飛溜懸波如瀑布激氣成涼風其巧妙如此風俗男子剪髮披帔而右袓婦人不開衿錦為頭巾家資滿億封以上位有羊羔生於土中其國人候其欲萌乃築墻以院之防外獸所食也然其臍與地連割之則死唯人著甲走馬及擊鼓以駭之其羔驚鳴而臍絕便逐水草俗皆髡而衣繡乘輜軿白蓋小車出入擊鼓建旌旗幡幟土多金銀奇寶有夜光璧明月珠駭雞犀大貝車渠馬腦孔翠珊瑚虎魄凡西域諸珍異多出其國又曰貞觀十七年佛䔉王波多力遣使獻赤頗黎綠頗黎石綠金精等物太宗降璽書荅慰賜以綾綺又曰開元七年正月其王遣吐火羅大首領獻師子零羊各二不數月又遣大德僧來朝貢吐火羅北史曰吐火羅國都葱嶺西五百里與挹恒雜居都城方二里勝兵十萬人皆善戰其俗奉佛兄弟同一妻迭寢焉每一人入房戶外挂其衣以為志生子屬其長兄其山穴中有神馬每歲牧牝馬於穴所必產名駒隋大業中遣使朝貢通典曰高宗永徽初遣使獻大鳥高七尺其色玄足如駞鼓翼而行日三百里能噉錢夷謂之駞鳥又曰龍朔元年吐火羅置州縣使王名遠進西城圖記并請于圖以西波斯以東十六國分置都督府及州八十縣一百軍府百二十六仍於其國立碑以紀聖德帝從之泥婆羅唐書曰泥婆羅在吐蕃西其俗剪髮與眉齊穿耳揎以竹筒牛角緩至肩者以為姣麗食用手無匙筯其器皆銅多商賈少田作以銅為錢皆文為馬牛不穿孔衣服以一幅布蔽身日數盥漱以板為屋壁皆雕畫俗重愽戲好吹蠡擊鼓頗解推測盈虛兼通歷術事五天神鑴石為像每日清水浴神烹羊而祭其王郍陵提婆身著真珠頗黎車渠珊瑚琥珀纓絡耳垂金鉤玉璫佩寶裝服突坐師子床其堂內散花香大臣及諸左右並坐於地持兵數百列侍其側宮中有七層之樓覆以銅瓦欄檻楹柱皆飾珠寶樓之四角各懸銅槽下有金龍激水上樓注於槽中從龍口而出狀若飛泉又曰貞觀中衛尉丞李義表往使天笁塗經其國郍陵提婆見之大喜與義表同出觀阿耆婆沴池周廻二十餘步水常沸涌雖流潦暴集爍石焦金未嘗增減以物投之即生煙熖懸釜而炊須臾而熟大食唐書曰大食國本在波斯之西大業中有波斯胡人牧駞於俱紛摩地郍之山忽有師子人語謂之曰此山西有三穴穴中有大兵器汝可取之穴中并有異石白文讀之便作王位胡人依言果見穴中有石及矟刃甚多上有文教其反叛於是糺合亡命渡常曷水劫奪商旅其眾漸盛遂割據波斯西境自立為王永徽二年始遣使朝貢其王姓大食氏名噉音呼懢反密莫未膩自云有國已三十四年歷三主矣其國男夫黑色多鬢鼻大而長似婆羅門婦人白晢亦有文字出駞馬大於諸國兵刃勁利其俗勇於戰鬭好事天神土多沙石不堪耕種唯食駞馬等肉國西鄰於大海其王移穴中異石寶之於圖又曰其王常遣人乘船將衣糧入海經八年而未極西岸海中見一方石石上有樹幹赤葉青樹上揔生小兒長六七寸見人皆笑動其手腳頭著樹枝其使摘取一枝小兒便死收在大食王宮又曰龍朔中滅波斯拂䔉其國始有米麪之屬又將兵南侵婆羅門吞併諸胡勝兵四十餘萬長安中遣使獻良馬景雲二年又獻方物開元初遣使來朝及進馬并寶鈿帶等方物其使謁見唯平立不拜憲司欲糺之中書令張說奏曰大食殊俗遠來慕義不可寘罪上特許之尋又遣使朝獻自云在本國唯拜天神雖見王亦無致拜之法所司屢詰責之其使遂請依漢法致拜杜還經行記云一名亞俱羅其大食王號慕門都其士女瓌偉長大衣常鮮潔容止閑麗女子出必擁面無問貴賤一日五時禮天食肉作齋以殺生為功德繫銀束佩銀刀斷飲酒禁音樂人相爭者不至歐擊又曰其菓有偏桃千年棗其蔓菁根大如斗而圓味甚美蒲桃大者如鷄卵
