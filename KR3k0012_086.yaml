body:
  text: 皇王部十周康王紀年曰成康之際天下安寧刑措四十餘年不用帝王世紀曰康王元年釋喪冕作誥申諸侯命畢公作策分民之居里于成周之郊王在位二十六年崩子瑕代立是謂昭王述異記曰廬山上有康王谷巔有一城號為劉城天每欲雨輒聞山上鼓角笳簫之聲聲漸至城而風雨晦合時人以為常候傳云此周康王之城康王愛奇好異巡歷名山不遠而至城中每得古器大鼎及弓弩金之屬知非常人之所處也而山有康王之號城又以釗為稱斯言將有徵昭王傳曰齊侯伐楚楚子使與師言管仲對曰爾貢苞茅不入王祭不供無以縮酒寡人是徵昭王南征不復寡人是問對曰貢之不入寡君之罪也敢不供給昭王之不復君其問諸水濱昭王時漢水非楚境故不受罪也帝王世紀曰昭王在位五十一年以德衰南征及濟于漢舡人惡之乃膠船進王王御船至中流膠液解王及祭公俱沒水而崩其右辛游靡長臂且多力拯得王周人諱之王室於是乎大微王娶於房曰房后生太子滿代立是謂穆王漢上記曰咋額至橫桑三十里桑字本作喪辛游靡取昭王喪處呂氏春秋曰周昭王親征荊高誘注曰秦莊王名楚故曰荊還及涉漢梁敗王杜於漢中杜尤粉切訓墜也辛餘靡振王北濟穆王歸藏曰昔穆王天子筮出於西征不吉曰龍降於天而道里脩遠飛而中天蒼蒼其羽傳曰穆王有塗山之會周穆王會諸侯於塗山又曰昔穆王欲肆其心周行天下將必皆有車轍馬跡焉祭父作祈招之詩以止王心王是以獲歿於祗宮史記曰穆王即位春秋已五十矣而王道衰微王將征犬戎祭公謀父諫不可王遂征之得四白狼四白鹿以歸自是荒服者不至諸侯有不睦者甫候言於王作脩刑辟命曰甫刑穆王立五十五年年一百五歲而崩子恭王翳扈立穆天子傳曰天子北征乃絕漳水郭璞注曰絕猶截也水今在鄴縣也於是即井鈃山之下即井鈃山也今在常山石邑縣鈃音刑癸未雨雪天子獵于鈃山之西河河山足坡乃至于崑崙之丘以觀春山之寶乃披圖視典用觀天子之寶器肖河所出禮圖玉果石似美玉所謂如果者也璿珠璿玉類也音琁燭銀有精光如燭也黃金之膏金膏亦猶玉膏皆其精汋宿於崑崙之阿赤水之陽崑崙山有赤水東北流見山海經也升于崑崙之丘以觀黃帝之宮黃帝巡遊四海登崑崙山而起宮室其上見新涪也天子北征舍乎珠澤此澤出珠乃因名之今越舊乎舊出青海北昇于舂山之上以望四野曰春山是惟天下之高山者也癸丑天子乃遂西征吉日甲子天子賓于西王母西王母如人虎齒蓬髮載勝善嘯紀年曰穆王十七年西征于崑崙之丘見西王母其年辛丑來賓于昭宮乃執白珪玄璧以見西王母執贄者致敬也獻錦組百純乙丑天子觴西王母于瑤池之上西王母為天子謠謠徒歌也曰白雲在天山陵自出道里悠遠山川間之將子無死將請尚能復來尚庶幾也己酉天子飲于溽水之上音汙溽也六師之人畢至于曠原乃奏廣樂六師之人翔畋于曠原翔猶遊也得獲無疆無疆猶無限也鳥獸絕群言取盡也帝王世紀曰穆王修德教會諸侯於塗山命呂侯為相或謂之甫侯五十一年王已百歲老耄以呂侯有賢能之德於是乃命呂侯作呂刑之書五十五年王年百歲崩于祗宮楊子法言曰周穆王少不好學至乎耄長抱朴子曰周穆王南征一軍盡化君子為猨為鵠小人為蟲為沙恭王帝王世紀曰恭王能庇昭穆之闕故春秋稱之周自恭至夷王四世年紀不明是以曆依魯為正王在位二十年崩子堅代立懿王史記曰懿王時王室遂衰懿王在位二十五年崩恭王弟辟方立是為孝王帝王世紀曰懿王二年徙都犬丘孝王史記曰孝王在位十五年崩諸侯復立懿王太子變是為夷王夷王禮曰禮天子不下堂而見諸侯下堂而見諸侯天子之失禮也由夷王已下也史記曰夷王崩子厲王胡立紀年曰夷王二年蜀人呂人來獻瓊賓于河用介珪三年王致諸侯烹齊哀公于鼎帝王世紀曰夷王即位諸侯來朝王降與抗禮諸侯德之三年王有惡疾愆于厥身諸侯莫不並走群望以祈王身十六年王崩厲王史記曰厲王即位三十年好利近榮夷公大夫芮良諫王不聽卒以榮為卿士用事王行暴虐侈傲國人謗王召公諫曰民不堪命王怒得衛巫使監謗以告則殺之諸侯不朝三十四年王益嚴國人莫敢言道路以目三年相與叛襲厲王出奔于彘太子靜匿召公之家國人聞乃圍之召公以其子代太子竟得脫召公周公二人相共行政號曰共和共和十四年厲王死于彘太子靜長於召公家二相乃共立之是為宣王帝王世紀曰厲王荒沉于酒淫於婦人宣王史記曰宣王即位二相輔之修政法文武成康之遺風諸侯復宗周十二年魯武公來朝宣王不脩籍於千畝虢文公諫曰不可王弗聽三十九年戰于千畝王師敗績于姜戎王在位四十六年崩子幽王宮涅立帝王世紀曰宣王元年以邵穆公為相秦仲為大夫誅西戎是時天大旱王以不雨遇災而懼整身修行欲以消去之祈于群神六月乃得雨大夫仍叔美而歌之今雲漢之詩是也是歲西戎殺秦仲王於是進用賢良樊仲山父尹吉父程伯休父虢文公申伯韓侯顯父南仲方叔仍叔邵穆公張仲之屬並為卿佐自厲王失政獫狁荊蠻交侵中國官政隳廢百姓離散王乃脩復宮室納規諫安集兆民命南仲邵虎方叔吉父並征定之復先王境土繕車徒興畋狩禮天下喜王化復行號稱中興墨子曰周宣王殺杜伯不辜杜伯曰死若有知三年必使君知之宣王田於圃田從人滿野日中杜伯乘白馬素車朱衣朱冠手執朱弓挾朱矢射王而中其心折脊伏弢而死從者莫不聞見幽王國語曰幽王之二年西周三川皆震伯陽父曰周將亡矣夫天地之氣不失其序若過其序民亂之也陽伏而不能出陰迫而不能蒸於是有地震今三川寔震陽失其所而鎮於陰也史記曰幽王得褒姒而篤愛之乃欲廢后并太子用褒姒為后以其子伯服為太子褒姒為人不好笑悅之萬方猶不笑幽王為烽燧火鼓寇至則舉烽火於是諸侯悉至至而無寇褒姒乃大笑幽王悅之為數舉烽火其後諸侯不信並不至幽王以虢石父為卿用事國人皆怨之石父為人佞巧善諛好利今王用之幽王之廢后去太子也申侯怒乃與繒西夷大戎共攻幽王王舉烽火徵兵兵莫至遂殺幽王驪山之下虜褒姒盡取周之財而去於是諸侯乃即申侯而共立故太子宜臼是為平王以奉周祀平王乃東徙洛邑避戎寇也幽王在位凡一十一年紀年曰幽王立褒姒之子伯盤以為太子瑣語曰宣王之元妃獻后生子不恒朞月而生后弗敢舉天子召問群王之元史史皆荅曰若男子也身體有不全諸骨節有不備者則可身體全骨節備不利於天子也將必喪邦天子曰若而不利余一人命棄之仲山父曰天子年長矣而未有子或者天將以是棄周雖棄之何益天子弗棄之平王史記曰平王之時王室微弱而諸侯以強并弱齊楚秦晉始大政由方伯五十一年平王崩太子泄父早死立其子林是為桓王桓王平王孫也帝王世紀曰平王元年鄭武公為司徒與晉文侯股肱周室夾輔平王率諸侯戮力一心東遷洛邑桓王史記曰桓王在位二十三年崩子莊王他立帝王世紀曰桓王既失於信禮義陵遲男子淫奔讒偽並作諸侯背叛構怨連禍九族不親故詩人刺之莊王史記曰莊王四年周公黑肩欲殺莊王而立王子克辛伯告王王殺周公王子克奔燕十五年莊王崩子僖王胡齊立僖王史記曰僖王三年齊桓公始霸五年僖王崩子惠王閬立帝王世紀曰僖王自即位以來變文武之制作玄黃華麗之飾宮室峻而奢侈故孔子譏焉五年王崩子涼洪代立惠王傳曰有神降於莘惠王問內史過曰是何故也對曰國興明神降之監其德也將亡神又降之觀其惡也故有得神以興亦有以亡虞夏商周皆有之史記曰初莊王嬖姬姚生子頹有寵及惠王即位奪其大臣蒍國之田以為囿故大夫邊伯等五人作亂謀召燕衛之師伐惠王惠王奔溫居鄭之櫟立僖王弟子頹為王遂享諸大夫樂及徧儛虢君怒四年鄭與虢君伐殺子頹復立惠王惠王在位二十五年崩子襄王鄭立襄王史記曰襄王母蚤死後母曰惠后后生叔帶有寵襄王畏之三年叔帶與戎翟謀伐襄王襄王欲誅叔帶叔帶奔齊齊桓公使管仲平戎于王十五年王以翟師伐鄭王德翟人將以其女為后富辰諫不聽十六年王絀翟后翟人來誅殺譚伯富辰曰吾數諫不從乃以其屬死之初惠后欲立王子帶故以其黨開翟翟人遂入周襄王出奔於鄭鄭居於汜子帶立為王取襄王所絀翟后與居溫十七年襄王乃告急於晉晉文納王而誅叔帶襄王於是賜晉文公秬鬯弓矢為伯以河內地與晉二十年晉文公又召襄王襄王會之河陽書曰天王狩于河陽三十二年襄王崩子頃王壬臣立頃王史記曰頃王六年崩子匡王班立匡王史記曰匡王六年崩弟瑜代立是為定王定王史記曰定王元年楚伐陸渾之戎次於洛使人問九鼎之重輕王使王孫滿應設以辭楚兵乃去二十一年定王崩子簡王夷代立簡王史記曰簡王十三年晉殺其君厲公迎子周於周立之為悼公十四年簡王崩子靈王泄心立靈王傳曰王子朝使告于諸侯曰定王六年秦人降祓曰周其有髭王亦克能脩其職至于靈王生而有髭王甚神聖無惡於諸侯國語曰靈王二十年穀雒鬥將毀王宮賈逵注曰穀雒二水合有似鬥洛在王城南穀在城北者王欲壅之太子晉諫曰不可晉聞古之長民者不隳山不崇藪不竇澤竇決也夫山土之聚也藪物之歸也川氣之導也澤水之鍾也天地成聚於高歸物於下䟽為川谷以導其氣陂塘汙原以鍾其美聚萬物合之美大也伯屬封崇九山決汨九川陂障九澤豐殖九原故天無伏陰地無散陽觀之詩書與民之憲言則皆亡王之為也王其圖之王卒壅之亂於是始史記曰靈王在位二十七年崩子景王貴立景王傳曰天王將鑄無射周景王也無射鍾名泠州鳩曰王其以心疾死乎泠樂官州鳩其名也夫樂天子之職職主也夫音樂之輿也樂因音而行而鍾音之器也音由器以發天子省風以作樂省風俗作樂以移之器以鍾之鍾聚之與以行之樂須音而行小者不窕窕細也他彫切大者不槬槬橫大不入也音畫則和於物物和則嘉成喜樂成也故和聲入於耳而和於心心僖則樂僖安也窕則不咸不充滿人心大則不容心不堪容心是以感感實生疾今鍾摦矣王心弗堪其能久父乎史記曰景王太子聖而早卒王愛子朝欲立之會崩子丐之黨與爭立國人立長子猛為王子朝攻殺猛猛為悼王晉人攻子朝而立丐是為敬王帝王世紀曰景王遇心疾崩于榮錡氏單穆公與劉文公立太子猛是為悼王景王在位二十五年悼王帝王世紀曰悼王以景王二十五年四月始即位十一月崩王立凡二百日故春秋稱王子猛卒不成喪故不言天王崩也立王母弟是為敬王敬王史記曰晉定公遂入敬王于周四十三年敬王崩子元王仁立元王史記曰元王八年崩子定王介立貞定王史記曰定王十六年三晉滅智伯分其地二十八年崩子去疾立是為哀王皇甫謐曰貞定王哀王帝王世紀曰哀王即位三月弟叔襲殺王而立是為思王思王帝王世紀曰思王即位五月弟隗攻殺王而代立是為考哲王考王史記曰考王十五年崩子威烈王午立威烈王帝王世紀曰威烈王崩子躭立是為元安王安王史記曰安王立二十六年而崩子烈王喜代立帝王世紀曰安王子喜立是為烈王烈王史記曰烈王十年崩弟扁立是為顯王顯王史記曰顯王三十五年致文武昨於秦惠王四十四年秦惠王稱王其後諸侯皆為王四十八年顯王崩子慎王定立帝王世紀曰顯王元年趙成侯韓哀侯來攻周二年西周威公之嗣曰惠公始封惠公少子班於鞏以奉王是為東周惠公周於是始分為東西王微弱政在西周慎靚王帝王世紀曰慎靚王六年崩子延代立是為𧹞王赧王史記曰東西周分治赧王徙都西周五十九年秦攻西周王奔秦頓首受罪盡獻其邑三十六口三十萬秦受其獻而歸其君於周周王赧卒周民遂東亡秦取九鼎寶器而遷西周公於𢠸音憚狐後七歲秦莊襄王滅東西周皆入於秦周既不祀既盡也漢書曰幽平之後日以陵夷至乎崎嶇河洛之間分為二周然天下謂之共主雖後微弱猶云以為主強大弗之敢傾歷載八百餘年數極德盡暨於𧹞王降為庶人號位以絕於天下尚枝葉相持莫得居其虛位四海亡主三十餘年帝王世紀曰𧹞王二十七年冬十月秦昭襄王仍僣號西帝齊閔王稱東帝十一月齊各復去帝號為王四十五年王如秦得罪於秦秦攻周或說秦王乃止王雖居天子之位為諸侯之所侵逼與家人無異多貰於民無以歸之乃上臺以避之故周人因名其臺曰逃債之臺洛陽南宮謻臺謻音夷又音尸移切是也五十九年秦攻韓魏趙大破之王懼乃背秦與諸侯合從將天下銳師出伊門攻秦秦昭襄王大怒使將軍摎音虬攻周王王恐乃入秦頓首受罪盡獻其邑秦盡納其獻使赧王歸于周降為庶人以壽終王逸正部曰幽厲禮樂崩壞諸侯力政轉相吞滅德不能懷威不能制至於王赧遂喪王計
