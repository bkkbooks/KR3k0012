body:
  text: 皇王部三十二隋恭皇帝隋書曰恭皇帝諱侑元德太子之子也母曰韋妃性聰敏有器度大業三年立為陳王後數載徙為代王邑万戶及煬帝親征遼東令於京師總留事十一年從幸晉陽拜太原太守尋鎮京師義兵入長安尊煬帝為太上皇奉帝纂業大業十三年十一月壬戌上即皇帝位於大興殿詔大赦天下改義寧元年大辟罪已下咸赦除之甲子以光祿大夫大將軍太尉唐公為假黃鉞使持節大都督內外諸軍事尚書令大丞相進封唐王二年三月丙辰右屯衛將軍宇文化及弒太上皇於江都宮立秦王浩為帝戊辰詔唐王備九錫之禮加璽紱遠遊冠緑綟緩位在諸侯王上唐國置丞相以下一依舊式五月戊午詔曰天禍隋國大行太上皇過盜江都酷甚望夷釁深驪北惘豫小子奄逮不愆哀號永感心情麋潰仰惟荼毒仇復靡申形影相吊罔知啓處相國唐王膺期命世扶危拯溺自北徂南東征西怨總九合於一匡決百勝於千里糾率夷夏大庇氓黎保乂朕躬繄王是賴德侔造化工格蒼旻兆庶歸心曆數斯在屈為人臣載違天命在昔虞夏揖讓相推茍非重華誰堪命禹當今九服崩離三靈改卜大運去矣請避賢路兆謀布德顧已莫能私僮命駕須歸蕃國子本代王及子而代天之所廢豈其如是庶憑稽古之聖以誅四凶幸值惟新之恩預充三恪雪冤恥於皇祖守禋祀於孝孫朝聞夕殞及泉旡恨今遵故事遜于舊邸庶官群辟改事唐朝宜依前典趣上尊號若釋重負感泰兼懷假手真人俾除醜逆濟濟多士明知朕意仍勑有司凡有表奏皆不得以聞是日上遜位于大唐唐以上為酅國公武德二年夏五月崩時年十五史臣曰恭帝年在幼沖遭家多難一人失德四海土崩群盜蜂起豺狼塞路南巢遂往流彘不歸既鍾百六之期躬踐數終之運謳歌有屬笙鏞變響雖欲不遵堯舜之迹其庸可得乎李密唐書曰李密字玄邃本遼東襄平人也父寬隋上柱國蒲山公密以父蔭為左親侍常在仗下煬帝顧見之退謂許公宇文述曰向者左仗下黑色小兒為誰許公對曰故蒲山公李寬子密也帝曰箇小兒視瞻異常勿令宿衛他日述謂密曰弟聰今如此當以才學取官三衛叢脞非養賢之所密大喜因謝病專以讀書為事時人希見其面嘗欲尋包愷乘一黃牛被以蒲韉仍將漢書一帙挂於角上一手捉牛靷一手翻卷書讀之尚書令越國公楊素見於道從後按轡躡之既及問曰何處書生耽學若此密識越公乃下再拜自言姓名又問所讀書答曰項羽傳越公奇之與語大悅謂其子玄感等曰吾觀李密識度汝等不及於是玄感傾心結託大業九年煬帝伐高麗使玄感於麗陽監運時天下騷動玄感將謀舉兵潛遣人入關迎密以為謀主密至謂玄感曰今天子出征遠在遼外今公擁兵出其不意長驅入蘇直扼其喉前有高麗退無歸路不過旬朔齎糧必盡舉麾一召其衆自降不戰而擒此計之上也關中四塞天府之國若西入長安掩其無備天子雖還失其襟帶據險臨之故當必剋万全之勢此計之中也若隨近逐便先向東都頓堅城之下勝負殊未可知此計之下也玄感曰公之下計乃上策也密計遂不行及玄感敗密乃間行入關為捕者所獲時煬帝在高麗密與其黨俱送帝所及出關外防禁漸弛密請通市酒食每夜宴飲喧譁竟夕使者不以為意行至邯鄲密等七人夜穿墻而遁詣淮陽隱姓名自稱劉智遠聚徒教授經數月蜜鬱鬱不得志為詩曰金風蕩初節玉露凋晚林此夕窮塗士鬱陶傷寸心野平葭葦合村落藿䔧深眺聽良多感徙倚獨霑襟霑襟何所為悵然懷古意秦俗猶末平漢道將何冀樊噲市井屠蕭何刀筆吏一朝時運會萬古傳名諡寄言世上英虛生真可愧詩成而泣下數行會東郡賊帥翟讓聚黨萬餘人密往歸之密因王伯當以策干讓曰當今主昏於上人怨於下鋭兵盡於遼東和親絶於突厥方乃巡遊楊越委棄京都此亦劉項奮起之會以足下雄才大略席卷二京誅滅暴虐則隋氏之不足亡也讓深加敬異遣説諸小賊所至皆降密又説讓曰今兵衆既多糧無所出若直取滎陽休兵館穀待士馬肥充然可與人爭利讓以為然於是破金堤關掠滎陽諸縣城堡多下之滎陽太守楊慶及通守張須陀以兵討讓讓大懼將遠避之密曰須陀勇而無謀兵又驟勝既驕且佷可一戰而擒之公但列陳以待為公破之將戰密分兵千餘人於林木間設伏讓與戰不利稍卻密發伏自後掩之須陀衆潰與讓合擊大破之遂斬須陀於陳讓於是令密別統所部密尋復説讓曰昏主蒙塵播蕩吳越群兵竟起海內飢荒明公以英傑之才統驍雄之旅宜當廓清天下誅剪群凶豈可求食草間常為小盜而已今東都士庶中外離心留守諸官政令不一明公親率大衆直掩興洛倉發粟以賑窮乏遠近孰不歸附百万之衆一朝可集先發制人此機不可失也讓曰請君先發僕領諸軍便為後殿得倉之日當別議之大業十三年春密與讓領精兵七千人出陽城北踰方山自羅口襲興洛倉破之開倉恣人所取老弱襁負道路不絶衆至數千萬隋越王侗遣虎賁郎將劉長恭率步騎二萬五千討密密一戰破之長恭僅以身免讓於是推密為主號為魏公二月於鞏南設壇場即位稱元年其文書行下稱行軍元帥魏公府拜翟讓為司徒封東郡公於是城洛口以居之隋虎賁郎將裴仁基率其子行儼以武牢歸密因遣仁基與孟讓率兵二万餘人襲興洛倉破之入東都郛郭掠居人燒天津橋東都出兵乘之仁基等大敗密復親率兵三万逼東都將軍假達等出兵七万拒之戰於故都城隋軍敗走密復下興洛倉而據之大修營塹以逼東都仍作書數煬帝十罪以移郡縣密兵鋒甚鋭每入苑與隋軍連戰會密為流矢所中臥於營內東都復出兵乘之密衆大潰棄興洛倉歸于洛口煬帝遣王世充率徑卒五万擊之與戰不利世充營於洛西與密相拒百餘日大小六十餘戰武陽郡丞元寶藏黎陽賊帥李文相平原賊帥郝孝德等並歸於密共襲破黎陽倉據之翟讓部將王儒信勸讓為大冢宰總統衆務以奪密之權讓兄寬復謂讓曰天子止可自作安得與人若汝不能作我當為之密聞其言陰有圖讓之計會世充列陳而至讓出拒之為世充所擊讓軍少失利密率精鋭赴之世充敗走明日讓至密所欲為宴樂具饌以待之密引讓而坐以良弓示讓讓方引滿密遣壯士自後斬之并殺其兄寬及王儒信讓部將徐世績單雄信等頓首永哀密並釋而慰諭之乃命徐世績單雄信王伯當分統其衆末幾世充襲倉城密復破之世充復移營洛北造浮橋悉衆以擊密密與千餘騎拒之不利而退世充因薄其城下密簡鋭卒數百人以邀之世充大潰乘勝陷偃師於是修金墉城居之有衆三十餘萬將作大匠宇文愷叛東都降于密東至海岱南至江淮郡縣莫不遣使歸密竇建德朱粲楊士林孟海公徐圖朗盧祖尚周法明等並隨使通表於密勸進於是密下官屬咸勸密即尊號密曰東都未平不可議此及義旗建密負其強盛欲自為盟主乃致書于高祖為請兄合從以滅隋高祖覽書笑曰李密陸梁於肆不可以折簡致之吾方安輯京師末遑東討即相阻絶便是更生一秦密今適所以為吾南幸恐同永嘉之勢顧此中原鞠為茂草興言感嘆實疚于懷脫知動靜遲數貽報未面虛襟用增勞軫名利之地鋒鏑縱橫深慎垂堂勉茲鴻業密得書甚悅示其部下曰唐公見推天下不足可定於是不虞義師而專意於世充俄而宇文化及率衆自江都北指黎陽兵十餘萬密乃自將步騎二萬拒之隋越王侗稱尊號遣使者授密太尉尚書令東南道大行臺行軍元帥魏國公令先平化及然後入朝輔政密將與化及相抗恐前後授敵因卑辭以報謝焉化及至黎陽與密相遇密遣徐世績守倉城化及攻之不能下密知化及糧且盡因偽與和以弊其衆化及弗之悟大喜恣其兵食冀密饋之後知其計化及怒與密大戰于衛州之童山下密為流矢所中頓於汲縣化及力竭糧盡衆多叛之掠汲縣北趣魏縣密引兵而西遣使朝于東都執弒煬帝者于弘達以獻越王侗侗召密入朝至溫縣聞世充作難而止乃歸金墉城密雖據倉而無府庫兵數戰皆不獲賞又厚撫初附之兵由是衆心漸怨武德元年九月世充以其衆五千來決戰密留王伯當守金墉自引精兵就偃師北阻邙山以待之世充軍至密遂敗績於萬餘人馳向洛密將入洛口倉城邴元真以遣人潛引世充密陰知之不發其事欲待世充兵半渡洛水然後擊之及世充軍至密候騎不時覺比將出戰世充軍已濟矣密自度不能支引騎而遁徑赴武牢元真以城降於世充密將如黎陽或謂密曰殺翟讓之際徐世績幾至於死今向其所安可保乎時王伯當棄金墉保河陽密以輕騎自武牢歸之謂伯當曰兵敗矣久苦諸君我今自刎請以謝衆伯當抱密號叫慟絶衆皆泣莫能仰視密復曰諸軍幸不相棄當共歸關中密身雖愧無功諸君必保富貴於是從入關者尚二萬人高祖遣使迎勞相望於道密大喜謂其徒曰我有衆百萬一朝至此命也今事敗歸國幸蒙殊遇當思竭忠以事所奉耳且山東連城數百知吾至此遣使招之盡當歸國比於竇融勳亦不細豈不以一台司見處乎及至京師禮數益薄尋拜光祿卿封邢國公未幾聞其所部將師皆不附世充高祖使密領本兵往黎陽招集故時將仕經略世充時王伯當為左武衛將軍亦令為副密行至桃林高祖復徵之密大懼謀將叛伯當頗止之密不從因謂密曰義士之立志也不以存亡易心伯當荷公恩禮期以性命相報乃簡驍勇數十人著婦人衣戴羃㒿藏刀裙下詐為妻妾自率之入桃林縣舍須臾變服突出因據縣城驅掠畜産直趣南山時右翊衛將軍史万寶留鎮熊州遣副將盛彥師率步騎數千追躡至陸渾縣南七十里與密相及彥師伏兵山谷密軍半渡橫出擊敗之遂斬密時年三十七王世充又曰王世充字行滿本姓支西域胡人也世充頗涉經史尤好兵法及龜策推步之術開皇中以軍功拜儀同善敷奏明習法律然舞弄文法高下其心或有駮難之者世充利口飾非辭議鋒起衆雖知其不可而莫能屈大業中纍遷江都郡丞兼領江都宮監時煬帝數幸江都世充善候人主顏色阿諛順旨每入言事帝必稱善乃雕飾池臺陰奏遠方珍物以媚於帝由是益昵之十年齊郡賊帥孟讓自長白山寇掠諸郡至旴𣅿有衆十餘萬世充以兵拒大破之煬帝以世充有將帥才略復遣領兵討諸小盜所向盡平十一年突厥圍煬帝於鴈門世充盡發江都人將往赴難在軍中蓬首垢面悲泣無度曉夜不解甲藉草而臥煬帝聞之以為忠益信任之十二年遷江都通守及李密攻陷洛口倉進逼東都煬帝特詔世充大發兵於洛口以拒密又遣就軍拜世充為將軍趣令破賊世充引軍渡洛水與李密戰世充軍敗績乃率餘衆歸河陽時天寒大雪北至河陽才以千數世充自繫獄請罪越王侗遣使赦之徵還洛陽置營於含嘉倉城收合亡散復得萬餘人俄而宇文化及作難越王侗嗣位於東都拜世充為吏部尚書封鄭國公進拜尚書左僕射揔督內外諸軍事世充去含嘉城移居尚書省專宰朝政以其兄世惲為內史令入居禁中子弟咸擁兵馬鎮諸城邑未幾李密破宇文化及還其徑兵良馬多戰死士卒疲倦世充欲乘其弊而擊之恐人心不一乃假託鬼神言夢見周公乃立祠於洛水遣巫宣言周公欲令僕射急討李密當有大功不音否則兵皆疫死充兵多楚人俗信妖言衆皆請戰世充簡練精勇得二萬餘人馬二千餘匹軍於洛水南密軍偃師北山上世充令軍人秣馬蓐食遲明而薄密密軍潰以數十騎走河陽率餘衆入朝世充盡收其衆振旅而還侗進世充太尉以尚書省為府備置官屬世充嘗於侗前賜食還家遂大嘔吐疑遇毒所致自是不復朝請與侗絶矣遣雲定興假達入奏於侗請加九錫之禮二年三月遂策授相國總百揆封鄭王加九錫備物假達雲定興等入見於侗曰天命不常鄭王功德甚盛願陛下揖讓告禪遵唐虞之迹侗怒四月假為侗詔策禪位遣兄世惲廢侗於含涼殿僣即皇帝位建元曰開明國號鄭立子玄應為皇太子世充每聽朝必殷勤誨諭言詞重復千端萬緒或輕騎遊歷街衢亦不請道百姓但避路而已按轡徐行謂百姓曰昔時天子深唑九重下情無由聞徹世充非貪寶位本欲救時今當如一州刺史每事親覽當與士庶共評朝政今止於順天門外置座聽朝又令西朝當受抑屈東朝堂受直諫於是獻書上事日有數百條流既煩省覽難遍數日後不復更出世充遣其姪行本鴆殺侗諡曰恭皇帝十月世充率東衆徇地至于滑州仍以兵臨黎陽世充屯兵不散倉粟日盡城中人相食七月秦王率兵攻之陳兵於青城宮世充悉兵來拒隔澗而言曰隋末喪亂天下分崩長安洛陽各有分地世充唯願自守不敢西侵王乃盛相侵軼遠入吾地三崤之道千里饋糧以此出師未見其可太宗謂曰四海之內皆承正朔唯公執迷獨阻聲教東都士庶亟請王師關中義勇咸思致力至尊重違衆願有斯吊伐若轉禍來降則富貴可保如欲相抗無假多言世充無以報太宗分遣諸將攻其城鎮所至輒下九月王君廓攻拔世充之轘轅縣於是河南州縣相次降附十一月竇建德遣人結好并陳救援之意世充乃遣其兄子琬及內史令長孫安世報聘且乞師四年二月世充率兵出方諸門與王師相抗世充軍敗因乘勝追之屯其城門世充不復敢出但嬰城自守以待建德之援三月秦王擒建德并王琬長孫安世等于武牢回至東都城下以示之且遣安世入城使言敗狀世充惶惑不知所為將潰圍而出南走襄陽問於諸將皆不答乃率其將吏詣軍門請降秦王以世充至長安高祖數其罪世充對曰計臣之罪誠不容誅但陛下愛子秦王許臣不死高祖乃釋之與兄芮妻子同徒于蜀將行為讎人獨孤修德所殺世充自篡位凡三歲而滅竇建德又曰竇建德貝州漳南人也少時頗以然諾為事初里長犯法亡去會赦得歸父卒送葬者千餘人有所贈皆讓而不受大業七年募人討高麗本郡遂補建德為二百長時山東大水人多流散同縣有孫安祖家為水所漂妻子餒死縣以安祖驍勇亦選在行中安祖辭貧自言于漳南令令怒笞之安祖刺殺令亡投建德建德舍之是歲山東大飢建德謂安祖曰丈夫不死當立大功豈可為逃亡之虜也我知高雞泊中廣大數百里莞蒲阻深可以逃難承間而出虜掠足以自資既得聚人且觀時變必有大功於天下矣安祖然其計建德招誘逃兵及無産者得數百人令安祖率之入泊中為群盜安祖自稱將軍時鄃人張金稱亦結聚得万人在河阻中蓨人高士達又起兵得千餘人在清河界中時諸盜往來漳南者所過皆殺掠居人焚燒舍宅獨不入建德之閭由是郡縣意建德與賊徒交結收繫家屬無少長皆殺之建德聞其家被屠滅率麾下二百人亡歸士達士達自稱東海公以建德為司兵後安祖為張金稱所殺其兵數千人又盡歸于建德自此漸盛兵至萬餘人猶往來高雞泊中十二年涿郡通守郭絢卒兵萬餘人來討士達士達自以智略不及建德乃推為軍司馬咸以兵受焉建德既初統衆欲立奇功以威群賊請士達守輜重自簡精兵七千人以拒絢大破絢軍絢以數十騎遁走遣將追及於平原斬其首以獻士達由是建德之勢益振隋遣太僕卿楊義臣率兵萬餘人討張金稱破之於清河所獲賊衆皆屠滅餘散在草澤間者復相聚而投建德義臣乘勝至平原欲入高雞泊建德謂士達曰歷觀隋將善用兵者唯義臣耳新破金稱遠來襲我其鋒不可當請引兵避之令其欲戰不得空延歲月必將疲倦乘便襲擊可有大功今與爭鋒恐公不能敵也士達不從其言因留建德守壁自率精兵逆擊義臣義臣果大破士達於陳前斬之乘勢追奔將圍建德守兵既少聞士達敗衆皆潰散建德率百餘騎亡去義臣既殺士達以為建德不足憂建德復還平原招集亡卒得數千人軍復大振始自稱將軍此後隋郡縣長吏稍以城降之軍容益盛勝兵十餘萬人十三年正月築壇場於河間樂壽界中自稱長樂王年號丁丑署官屬於是建德進攻河間頻戰不下其後城中食盡又聞煬帝被殺郡丞王琮率士吏發喪建德遣使吊之琮因使者請降始都樂壽號曰金城宮自是郡縣多下之武德二年宇文化及僣號於魏縣建德即日引兵討化及連戰大破之化及保聊城建德四面攻城陷之建德入城先謁隋蕭皇后與語稱臣悉收弒煬帝元謀者斬之梟首轅門之外囚化及并其二子同攻以檻車至大陸縣斬之攻陷洺州虜刺史袁子幹遷都于洺州號萬春宮又與王世充結好遣使朝隋越王侗於洛陽後世充廢侗自立乃絶之始自尊大建天子旌旗出入警蹕下書言詔追諡隋煬帝為閔帝然猶依倚突厥隋義城公主先嫁突厥又傳化及首以獻公主既與突厥相連兵鋒益盛南侵相州河北大使淮安王神通不能拒退奔黎陽相州陷又進攻衛州陷黎陽九月建德自帥師圍幽州羅藝出與戰大破之斬首千二百級先是曹州濟陰人孟海公擁精兵三萬據周橋城以掠河南之地其年十一月建德自率兵渡河以擊之四年二月建德剋周橋虜海公留其將范願守曹州悉發海公及徐圓朗之衆來救世充軍至滑州世充行臺僕射韓洪開城納之遂進逼元州梁州管州皆陷之屯于滎陽三月春秦王入武牢進薄其營多所傷殺并擒其將殷秋石瓚時世充弟世辨為徐州行臺遣其將郭士衡領兵千人從之合衆十餘號為三十萬次城皋築宮于板堵以示必戰又遣間使約世充共為表裏秦王遣將軍王君廓領輕騎千餘抄其糧運獲其大將張青特虜獲其衆建德數不利人情危駭將帥已下破孟海公皆有所獲思歸洺州凌敬進説曰宜悉兵濟河攻取懷州河陽使重將居守更率衆鳴鼓建旗踰太行入上黨先聲後實傳檄而定漸趨壺口稍駭蒲津收河東之地此策之上也行此必有三利一則入無人之境師有萬全二則拓土得兵三則鄭圍自解建德將從之而世充之使長孫安世陰齎金王啖其諸將以亂其謀衆咸進諫曰凌敬書生耳豈可與言戰乎建德從之敬固爭建德怒扶出焉於是悉衆進逼武牢官軍按甲挫其鋭建德結陳於汜水秦王遣騎挑之建德進軍而戰竇抗當之建德少卻秦王馳騎深入大破之建德中瘡竄於牛口渚車騎將軍白士讓楊武威生獲之建德所領兵衆一時奔潰妻曹氏及其左僕射齊善行將數百騎遁于洛州餘黨欲立建德養子為主善行曰夏王平定河朔士馬精強一朝既被擒如此豈非天命有所歸也不如委心清命無為塗炭生人遂以府庫財物悉分與故將各令散去善行乃與建德右仆射裴矩行臺曹旦及建德妻率偽官屬舉山東之地奉傳國八璽來降七月秦王俘建德至京師斬于長安市年四十九自起軍至滅凡六歲河北悉平
