body:
  text: 人事部八十五知人下唐書曰王圭幼孤性雅淡少嗜欲志量沉深能安於貧賤體道履正交不茍人叔父頗當時通儒有人倫之鑒嘗謂所親曰門戶所寄唯在此兒耳又曰裴行儉有人倫之鑒自掌選及為大總管凡遇賢俊無不甄採每制敵摧凶必先期捷日時有後進楊炯王勃盧昭鄰駱賓王並以文章見稱吏部侍郎李敬玄盛為延譽引以示行儉行儉曰才名有之爵祿蓋寡楊應至令長餘並鮮能令終是時蘇味道王勮未知名因調選行儉一見深禮異之仍謂曰有晚年子息恨不見其成長二公十數年當居衡石願記識此輩其後相繼為吏部皆如其言行儉嘗所引偏裨有程務挺張虔勗崔智辨王方翼黨金毗劉敬同郭待封李多祚黑齒之盡為名將位至刺史將軍者數十人其所知賞多此類也又曰狄仁傑授汴州判佐時工部尚書閻立本為河南道黜陟使仁傑為吏人誣告立本見而謝曰仲尼云觀過知仁矣足下可謂海曲之明珠東南之遺寶薦授并州都督府法曹又曰張守圭儀形瓌壯善騎射性慷慨有節義時盧齊卿為豳州刺史深禮遇之常共榻而坐謂曰足下數年外必節度豳涼為國之良將方以子孫相託豈得以寮屬常禮相期耶又曰李勉以故吏前密縣尉王晬子對切勤幹俾攝南鄭令俄有詔處死勉問其故乃為權幸所誣勉詢將吏曰上方藉牧宰為人父母豈以譖言而殺不辜乎即亭詔拘晬飛表上聞晬遂獲宥而勉竟為執政所非追入為大理少卿謁見面陳王晬無罪政事修舉盡力吏也肅宗嘉其守正即日除太常少卿王晬後以推擇拜大理評事龍門令終有能名時稱知人又曰李晟德宗之幸山南既入駱谷謂渾瑊曰渭橋在賊腹內兵勢懸隔李晟可辦事乎瑊對曰李晟秉義執志臨事不可奪以臣計之破賊必矣帝意始安又曰楊嗣復字繼之僕射於陵之子也初於陵十九登進士第二十再登博學宏詞科調補潤州句容尉浙西觀察使韓滉有知人之鑒見之甚悅滉有愛女方擇佳壻謂其妻柳氏曰吾閲人多矣無如楊生貴而壽生子必為宰相於陵秩滿寓居楊子而生嗣復後滉見之撫其首曰名位果踰於父楊門之慶也因字曰慶門竟如其言又曰于邵傳云樊澤嘗舉賢良方正邵一見之於京師謂樊將相之材也不五年擇為節將又曰李德裕與牛僧孺有隙或以韋溫厚於牛僧孺言於德裕裕曰此人堅正中立君子也又曰劉三復長慶中李德裕拜浙西觀察使三復以德裕禁密文臣以所業文詣郡干謁德裕閲其文倒屣迎之乃辟為從事後魏書曰崔亮傳云崔亮字敬儒清河東武城人也時隴西李冲當朝任事亮從兄言之於冲冲與亮語因謂亮曰比見卿先人相命語使人胸中無復怵迫之念奇之延為館客冲謂兄子奇曰大崔寬和篤雅汝宜友之小崔生峭整清徹汝宜敬之二人終將大至孔叢子曰魏安釐王問子順馬回之為人雖少文然梗直有丈夫之節吾欲以為相可乎答曰知臣莫若君何有不可至於亮直之節臣未之明也曰何故答曰臣聞諸孫卿其為人長目而永視者必體方而心圓每以其法相人千百不失臣見回非不偉其體幹然甚疑其目王卒用之三月果以諂得罪淮南子曰寧戚欲干齊桓公困窮無以自達於是為商旅將牛車暮宿於郭門之外桓公郊迎客夜爝火甚盛從者甚衆戚飯牛車下望見桓公而悲擊角而疾商歌桓公聞之撫其僕之手曰異哉歌者非常人也命後車載之賜衣冠說苑曰楚令尹虞丘子復相莊王曰臣聞奉公行法可以得榮能淺行薄無望上位臣為令尹十年矣國故不治獄訟不息臣竊選國俊士孫叔敖秀才多能其性無欲君舉而授之政則國可使寧而士民可使附莊王從之虞丘子萊田三畝號曰國老以孫叔敖為令尹虞丘子家干法叔敖執而戮之虞丘子喜曰叔敖果可使持正矣傅子曰劉備襲蜀丞相掾趙幾曰劉備其不濟乎拙於用兵每戰每敗奔亡不暇何以圖人徵士傅朝曰劉備寬仁有度能得人死力諸葛亮達治知變正而有謀而為之相張飛關羽勇而有義皆萬人之敵而為之將此三人者皆人傑也以劉備之略三傑佐之何為而不濟也郭子曰冀州刺史楊淮字彥清二子喬髦有識俱總角為成器淮與裴頠樂廣友善遣見之頠謂淮曰喬當及卿髦小減也廣謂淮曰喬自及卿髦尤精出淮笑曰我二兒之優劣乃裴樂之優劣議者皆許之又曰王仲祖云真長知我勝我自知又曰王渾妻鍾生女甚賢明令武子為妹擇嘉壻而未有其人兵家子有才欲以妻之獨與母議初不告事定乃白母曰誠是地也自可貴要當令我見之於是武子令此兵與群小雜處使母帷察之母曰刑衣者汝可拔乎武子曰是母曰此才足以拔萃然地寒非長年不足展其才用觀其形骨恐不可與婚數年果死呂氏春秋曰魏公叔座疾惠王往問之曰公叔之病甚矣將奈社稷何對曰臣之御庶子鞅也願王以國聽之若不能聽勿使出境王不應出而謂左右曰豈不悲哉以叔之賢而今謂寡人以聽鞅悖也公叔死公叔鞅西遊秦秦孝公聽之秦果強魏果弱竹林七賢論曰山濤與阮籍嵇康皆一面而契若金蘭濤妻韓氏嘗以問濤濤曰當年可為友者唯此二人耳妻曰負羇之妻亦觀狐趙意欲一窺之可乎濤曰可也二人至妻勸濤留之宿其酒食夜穿牖而窺之濤入曰所見何如吾妻曰君才殊不如也正當以識度相友濤曰然伊輩亦當謂我識度勝世說曰袁宏少貧常為人傭載運謝鎮西常夜泊舟江渚清風明月聞賈客舫上有詠聲甚有清致聽所詠詩又所未嘗聞歎美不能已即遣人委曲訊問乃是袁宏自誦其詠史詩遂厚相賞重又曰郤太尉遣門生與王丞相書求女壻曰請往東齊中選之門生歸白郤云王家諸郎亦皆可然聞覔女壻咸自矜持唯有一郎在東床上坦腹食如不聞郤云此正嘉壻既而訪焉乃逸少也又曰顧和始為楊州從事月旦當朝停車州門外周侯詣丞相歷和車邊過和覔虱夷然不動周既過返還指顧心曰此中何所有顧擇虱如故徐應曰此中最是難量地周侯既入語丞相曰卿州吏有一令僕才語林曰夏少明在陳國不知名聞裴逸民知人乃褁糧寄載入洛從之未至裴家少許見一人著黃皮袴褶乘馬將獵夏問逸民家遠邇答曰君何以問夏曰聞其名知人故從會稽來投之裴曰身是逸民明可更來明往逸民果知之又嘉其志扃乃用為西門候於此遂知名又曰魏武將見胸奴使自以形陋不足雄遠國使崔季圭代乃自捉刀立床頭坐既畢使僕問曰魏王何如使答曰魏王信自雅望非常然床頭捉刀人此乃英雄魏王聞之馳遣殺此使世說曰王濬沖裴叔則二人於總角時詣鍾士季須臾去後客問向二童子是誰曰裴王客曰何如鍾曰裴楷清通王戎簡要須三十年此二賢當為吏部尚書冀爾時天下無復滯才崔鴻前燕録曰慕容廆幼而魁岸美姿貌身長八尺雄桀有大度晉安北張華一見奇之謂廆曰君長必為命世之器定難濟時者也遺廆冠簪以結殷勤崔鴻前秦録曰姜宇字子居天水冀人也少孤貧為河北陳不識家牧羊年十五身長七尺九寸聰惠美風儀每夜專讀書睡則縣頭于屋梁達旦而止不識奇之將妻以女其妻弗聽不識乃置酒引宇令女潛觀之問女曰姜宇人士才明吾欲以汝妻之汝母難曰宇家之牧人汝意云何女曰觀宇之姿才豈復為人牧羊也遂妻之宇後歷位京兆尹御史中丞郭林宗別傳曰郭泰字林宗入頴川則友李元禮至陳留則結符偉明之外黃則親韓子助過蒲亭則師仇季智止學舍則收魏德公觀耕者則拔茅季偉皆為名士至汝南見袁閎不宿而去從黃憲三日乃去過新蔡薛勤問之曰足下見袁奉高不宿而去從黃叔度乃彌日何也泰曰奉高之流雖清而易挹叔度汪汪若千畝之陂澄之不清撓之不濁難測量也何顒別傳曰顒字伯求有人倫鑒同郡張仲景總角造顒顒謂曰君用思精而韻不高將為良醫卒如其言顧和別傳曰和字君孝總角時顧榮曰此吾家驥興衰宗必此子也顧珠亦有令問榮謂珠曰卿速步君孝超卿矣孟嘉別傳曰庾亮拔孟嘉為勸學從事褚褒為豫章太守出朝亮正旦大會州府人士率嘉集坐第甚遠問亮曰江州有孟嘉其人何在亮曰在坐卿但自覔褒歷觀之久指嘉謂亮曰此君小異將無是乎衛玠別傳曰劉真長謝仁祖並知名時人商略中朝人士或問弘治可得方衛洗馬不謝曰安得相比其間可容數人三輔決録曰龐知伯名勃為郡小吏東平衛農為書生窮乏乃客煆於勃家知伯知其賢尤加禮待雇直過償及去送十里過舅家復貸錢贈之農不肯受勃曰不受令勃不告農乃受曰為馮翊乃相報後果為馮翊太守勃子為門下書佐又曰游殷字幼齊與司隸校尉胡軫有隙輕誣構殺之初殷為郡功曹有童子張既者時未知名為郡書佐殷察異之既過家具設賓饌及既至殷妻笑曰君甚勃乎張德容童昏小兒何異殷曰卿勿怪乃方伯之器也殷遂與既論霸王之事饗訖以楚子託之軫害殷月餘得病目脫但言伏罪游幼齊將鬼來於是遂死諺曰生有知人之明死有鬼靈之驗又曰王諶字子嗣博學有才辨洛陽种景伯武原吳季高未知名諶數稱二人於朱伯厚有宰輔之器退語二人曰卿必為公而景伯至司徒季高至司空世以是服諶之知人也會稽典録曰盛憲字孝章嘗出行逢一童容貌非常憲怪而問之是魯國孔融融時年十餘歲憲下車執手載以歸舍與融談宴知其不凡便結為兄弟因升堂見親汝南先賢傳曰薛勤字恭祖仕郡功曹陳仲舉時年十五為父齎書詣勤勤見而察之明日往造焉仲舉父出見勤勤曰足下有不凡子吾來候之不從卿也言議盡日乃歎曰陳仲舉有命世才王才之具又見黃叔度於童幼云當為內盛德其後二賢英名並耀於世又曰謝甄稟氣聰爽明識達理見許子將兄弟弱冠之歲曰平輿之淵有二龍出焉察其昐睞則賞其心覩其顧步則知其道襄陽耆舊記曰劉備訪世事於司馬德操操曰儒生俗士豈識時務哉此間自有伏龍鳳雛備問誰曰諸葛孔明龐士元也並用為軍師中郎又曰潘記見溫習十數歲時曰此兒名士必為吾州里議主勑子弟與善溫後果為荊州太公平令又曰李衡字叔平漢末父將走入吳以下戶調為武昌渡民聞羊道有人物往干之道曰多士之世尚書劇曹郎才也勸習筮仕以女配之
