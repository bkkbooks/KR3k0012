body:
  text: 禮儀部二十六喪服周禮春官司服曰凡凶事服辨服服辨喪冠也其服斬纕齊縗也凡弔事辨絰服辨絰者如爵辨而素加環絰也論語曰羔裘玄冠不以弔絰大如緦之絰其服錫襄疑襄疑襄也者諸侯及大夫亦以錫襄為弔也凡喪為天王斬纕為王后齊纕王后小君也諸侯為之杖期也王為三公六卿錫纕為諸侯緦纕為大夫士疑纕其首服皆辨絰君為臣服也疑襄十四升疑之擬擬於吉也儀禮喪服曰喪服斬襄裳苴絰杖絞帶冠繩纓菅屨者為父諸侯天子君父為長子為人後者妻為夫女子子在室為父女子子嫁及在父之室為父公士大夫之衆臣為君布帶繩屨又曰疏襄裳齊壯麻絰冠布纓削杖布帶疏屨三年者父卒則為母繼母慈母如母母為長又曰疏襄裳齊壯麻絰冠布纓削杖布帶疏屨期者父在為母妻出妻之子為母卒繼母嫁從為之服報不杖麻屨者祖父母世父母叔父母又曰疏襄裳齊壯麻絰無受者無受者服足而除不以經服而受也寄公為所寓丈夫婦人為宗子宗子之母妻為舊君之母妻庶人為國君大夫在外其長子為舊國又曰大功布襄裳壯麻絰無受者子女子子之長殤中殤叔父之長殤中殤姑姊妹之長殤中殤昆弟之長殤中殤夫之昆弟之子女子子之長殤中殤嫡孫之長殤中殤大夫之庶子為嫡昆弟之長殤中殤公為嫡子之長殤中殤大夫為嫡子之長殤中殤其長殤皆九月纓絰其中殤七月不纓絰大功布襄裳壯麻絰纓布帶三月受以小功襄即葛九月者姑姊妹女子子適人者又曰繐襄裳壯麻絰既葬除之者傳曰繐襄者何以小功之繐也諸侯之大夫為大子傳曰何以繐襄也諸侯之大夫以時接見乎天子小功布襄裳澡麻帶絰五月者叔父嫡孫昆弟之下殤又曰小功布襄裳壯麻絰即葛五月者從祖祖父母從祖父母報從祖昆弟從父姊妹孫適人者為人後者為姊妹適人者為外祖父母又曰緦麻三月者族曾祖父母族祖父母族父母族昆弟庶孫之婦庶孫之中殤又曰公子為其母練冠麻麻衣縓緣為其妻縓冠葛絰帶麻衣縓皆既葬除之又曰凡妾為私兄弟如邦人大夫弔於命婦錫襄命婦弔於大夫亦錫襄禮記檀弓上曰喪服兄弟之子猶子也蓋引而進之嫂叔之無服蓋推而遠之姑姊妹之薄也蓋有受我而厚之者欲其一心厚之者姑姊妹嫁大功夫為妻期又檀弓曰成人有兄死而不為襄者聞子皋將為成宰遂為襄成人曰蠶則績而蟹有匡范則冠而蟬有緌兄則死而子皋為之襄蚩兄死者言其襄之不為兄死如蟹有匡蟬有緌不為蠶之績范之冠也范蜂也蟬蜩也緌謂蜩喙長在賜下又喪服小記曰近臣君服斯服矣其餘從而服不從而稅除喪者先重者易服者易輕者斬襄之葛齊襄之葛與大功之麻同又曰服問曰三年之喪已練矣有期之喪既葬矣則帶其故葛帶絰期之絰服其功襄有大功之喪亦如之小功無變也無所變於大功齊斬之服不用輕纍重麻之有本者變三年之葛有本謂大功以上也小功以下澡麻斷本既練遇麻斷本者於免絰之既免去絰每可以絰必絰既絰則去之禮統曰天子諸侯皆為貴臣妾服三月適夫人為八妾服三月八妾為夫人服與舅姑同家語曰門人疑所以服夫子者子貢曰昔夫子之喪顏淵若喪子而無服喪子路亦然請喪夫子若喪父而無服於是弟子皆服而加麻出有所之則猶絰孔叢子曰秦莊子死孟武伯問於孔子曰古者同僚有服乎曰然同僚有相友之義貴賤殊等不為同官聞諸老聃昔虢叔閎夭友太顛散宜生南宮括五臣者同僚比德以贊文武及虢叔死四人者為服友之服古達禮者行之又曰子思居衛魯穆公卒縣子使乎衛聞喪而服謂子思曰子雖未臣魯父母之國也先君宗廟在焉奈何弗服子思曰吾豈愛乎禮弗得也縣子曰請問之答曰臣而出國君不掃其宗廟則不為之服又曰司徒文子改葬其叔父問服於子思子思曰禮父母改葬緦既葬而除不忍無服送至親也非父母無服無服則弔服加麻又曰魯人有同歲上計而卒欲為之服問於季立季立曰思好者其緦乎昔諸侯大夫共會事於王及以君命同盟霸主其死也則皆有哭臨之禮今之上計上覲天子有交宴之欣同名綈素上記先君下祿子弟相敦以好相厲以義又數相往來特有思親比之朋友不亦重乎白虎通曰弟子為師服者弟子有君臣父子朋友之道也故生竭敬而親之死則哀痛之恩深義重故為之服入則絰出則否習鑿齒漢晉春秋曰初文帝之崩也羊祜謂傅玄曰三年之喪雖貴遂服自天子達而漢文除之毀禮傷義常以為歎今上天縱至孝有曾閔之性雖奪其服而實行喪禮喪禮行除服何為耶若因此革魏之薄而興先王之法以敦厚風俗垂之百代不亦美乎玄曰漢文以來世乃淺薄不能行國君之喪因而除之數百年一旦復古恐難行也祜曰就不能使天下如禮且使主上遂服不猶善乎玄曰若主上不除而下除此為但有父子無君臣三綱之道虧矣君子曰傅玄知無君臣之傷教而不知兼無父子之為重豈不蔽惑哉漢廢君臣之喪不降父子之服故四海黎庶莫不盡於其新三綱之道二服恆用於私室而王者獨盡廢之豈所以孝治天下乎詩云猶之未遠其傅玄之謂也摯虞新禮議曰虞謹案古者諸侯臨君其國臣諸父兄之諸侯未同于古未同于古則其尊未全不宜使絶期之制而令傍親服斬襄之重也諸侯既然則公孫之爵亦宜如舊又曰喪無弟子為師服之制新禮弟子為師襄臣虞謹案自古無服師之禮故仲尼之喪門人疑所服子貢曰昔夫子喪顏淵若喪子而無服請喪夫子若父而無服遂心喪三年此則懷三年之哀而無齊襄之制也出則絰居則否所謂弔加麻也先聖為禮必易從而可傳師從之義誠重而服制之若歷代相襲不以為疑宜定親新禮無服如舊摯虞決疑要注曰禮故臣為舊君齊襄三月謂策名委質稱臣吏者也見察舉而不為吏者弔服加麻襄冠毛詩羔裘曰素冠剌不能三年也庶見素冠兮棘人欒欒兮箋云時無三年之恩於父母廢其喪禮故冀幸一見素冠急於哀戚也周禮春官小宗伯曰王崩懸襄冠之式于路門之外肆師之職大喪禁外內男女之衰不中法者又夏官太僕曰大喪懸首服之法於宮酋服之法謂免髽笄總長短之數於宮門示四方也又天官內司服曰共后之衣服及九殯世婦凡命婦共其服共喪襄亦如之儀禮喪服曰斬襄者不緝也冠繩纓條屬冠六升外畢煆而勿灰齊襄者緝也又曰疏襄裳齊傳曰問者曰何冠也曰齊襄大功冠其襄也緦麻小功冠其襄也帶緣各視其冠又曰緦者十五升抽其半有事其縷無事其布曰緦也錫襄者何也麻之有錫者也者十五升抽其半無事其縷有事其布曰錫又曰凡襄外削幅裳內削幅幅三枸削殺也若齊裳內襄外員廣出於適寸員在背上適辟領也員出於辟領外傍一寸也適博四寸出於襄襄長六寸博四寸禮記檀弓曰襄與其不當物也寧無襄惡其亂禮不當物謂精粗廣狹不應法制齊襄不以邊坐又檀弓曰古者冠縮縫今也衡縫縮從也今禮制衡讀為橫今冠橫縫以其辟積多故喪冠之反吉非古也解時人之惑喪冠編縫古冠耳又間傳曰斬衰三升齊襄四升五升六升大功七升八升九升小功十升十一升十二升緦麻十五升去其半有其事縷無事其布曰緦此哀之發於衣服者也禮記外傳曰凡言斬襄者以六寸之布廣四寸為襄帖於心前剪而不緝也襄者言悲摧也緝者縫緶之名齊之言齊也加針縷其黨下之縫使齊半也凡言有事其縷者先加灰錫治其麻縷為布則不治也哀在外故有事其布者則不治其縷哀在內也為布之從即先治也緦者如絲也錫襄者先緝錫白之謂也疑襄者疑其布是絲也疑襄錫襄二者君之弔服也又曰吉冠之布倍於衣也朝服十五升則冠三十升是也今喪冠升數少喪禮簡斬襄三升冠六升升者登也轉祖訓耳凡麻八十縷為十升至六升即為成布也凡言受以成布者既葬之後漸去粗受細齊衰四升冠七升又有疏襄即三升半之襄也疏亦粗也其布在齊斬之間左傳僖上曰許僖公見楚子於武城許男面縛銜壁大夫襄絰士輿櫬櫬棺楚子問諸逢伯對曰武王克殷微子啓如是又襄六曰魯昭公立十九年矣猶有童心比及葬三易襄襄袵如故襄言其嬉戲無度吳録曰諸葛恪將誅有著襄衣入其閣令人詰答曰不自知入時外內守備亦不見也鄭玄別傳曰玄卒受業者襄絰于餘人郭子曰劉王共在航南酣宴謝鎮西往尚書墓還是葬後三日諸人欲要之真長云仁祖應來便遣要之果即回駕諸人迎之把臂便下裁得脫幘酣宴坐乃覺未得脫襄釋名曰襄摧也絰實也傷摧實也斬襄下緝其末翦斬而已也大功其布加粗大之功不善治之也小功精細之小功轉有飾也緦絲也錫也治其麻使滑易也繐繐如流如繐也絰帶周禮夏官曰辨師王之辨經辨而加環絰辨絰王吊所服也其辨如爵辨而素所謂素冠也而加環絰環者大如緦之麻絰纏而不紏司服識曰凡弔事辨絰事儀禮喪服曰苴絰者麻之有蕡者也苴絰大槅搹手搹圍九寸左本在下去五分一以為帶齊襄之絰斬良之帶也去五分一以為帶絞者垂帶也鄭玄注曰凡服上曰襄下曰裳在首在腰皆曰絰絰之言實也首絰象幘布冠之幘腰絰象大帶又有絞帶革帶也壯麻者枲麻也牡麻絰右本在上又曰斬襄絞帶七寸三分齊之帶五寸六分大功之帶四寸五分小功之帶三寸七分緦麻之帶二寸九分鄭注絞帶象革帶斬之絰五分去一以為帶繩帶也禮記外傳曰絰者實也表其有喪戚之情實也喪服襄之與絰因象平裳之時冠帶吉凶相變也有首絰有腰絰有絞帶斬襄首絰圍九寸向下皆五分去一用為腰絰則七分五分五分去一者從斬至緦緣有五服相減窮其數也然則絞帶又小於腰絰齊襄首絰七寸五分之一腰絰五寸八分大功首絰五寸八分腰絰四寸六分小功首絰三寸七分緦首絰三寸七分腰絰二寸九分左傳僖下曰晉襄公擊秦師於殽子墨襄絰晉文公未葬故襄公稱子以凶服從戎故墨之又襄四曰晉侯有姻喪王駙使宣子墨纕昌絰晉自郩之役遂常墨襄絰也二婦人輦以如公奉公以如固宮後漢書曰胡廣年八十三熹平元年薨故吏自公卿大夫慱士議郎以下數百人皆襄絰殯位自終及葬漢興已來人臣之盛未嘗有也宋書曰王誕為吳國史母憂去職武帝伐劉毅起為輔國將軍誕固辭以墨絰從行
