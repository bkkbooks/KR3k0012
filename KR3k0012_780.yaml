body:
  text: 奉使部三奉使下三輔故事曰婁敬曰臣願為高車使者持節往至胸奴庭與其分土定界敬至曰汝本處北海之濱秦亂汝侵其界居中國地今婚姻已成當還汝本牧還我中國地作舟書鐵券曰自海以南冠蓋之士處焉自海以北控弦之士處焉割土盟誓然後求還華陽李郃別傳曰郃字孟君漢中人和帝即位分遣使者循州郡觀風俗皆微服單行使者二人當到益州投公舍宿時夏月露坐為出酒與談公仰視問曰二君發京師時寧知二使者何日發耶二人驚相視而曰不聞問公何以知之公指星有二使星向益部二人知其深明遂共談甚嘉異焉風俗通曰周秦常以歲八月遣輶車之使采異代方言還奏之事藏祕室晏子春秋曰晏子使吳吳稱曰天子請見晏子蹴然曰臣受命弊邑使於吳王臣迷惑入于天子之朝敢問吳王惡存吳王夫差請見以諸侯之禮又曰晏子使楚楚王進橘置削晏子不剖而并食王曰橘去剖對曰臣聞之賜人主者瓜桃不削橘柚不剖臣故不敢剖臣非不知又曰晏子使楚楚人為小門而延晏子晏子不入曰使狗國者從狗門入今臣使楚不當狗門入也王曰齊無人耶對曰齊之臨淄三萬戶張袂成帷揮汗成雨何為無人齊以賢者使賢主不肖者使不肖主嬰不肖是故使王耳又曰晏子聘楚楚王知其賢智欲辱之使人縛一人從殿前過佯問之此何罪也左右答曰此齊人也今犯盜王謂晏子曰齊國善盜也晏子答曰臣聞江南生橘江北為枳土地使其然也臣察此人在齊不為盜今來楚而盜亦土地使然也楚王大慚漢雜事曰吳楚七國反齊孝王城守膠西濟南三國圍齊齊使路中大夫告於天子還報曰堅守此至三國圍齊已數重矣無從入三國將與路中大夫盟若反言漢已破大夫許之至城下望見齊王曰漢已發兵百萬使太尉周亞夫擊破吳楚引兵救齊齊必堅守三國將誅路中大夫韓詩外傳曰越王勾踐使廉稽獻民於荊使者越夷狄之國也臣請欺其使者荊王越曰王賢人也其使者亦賢子慎之使者出見廉稽曰冠則得以見廉稽曰夫越亦周室之列封也不得處中國則處江海之陂與黿鱣魚鱉為伍文身剪髮而後處焉今來至上國必曰冠乃得見不冠不得如此則大國使適越亦將劓墨文身剪髮而後得見乎荊王披衣出謝又曰魏文侯有子曰擊次曰欣欣少而立以為嗣封太子擊於中山三年不往來其傅趙倉唐諫曰父忘子子不可忘父何不遣使乎擊曰願之久矣未有所使倉唐對曰為之使則臣請使擊曰諾於是乃問君何所好與所嗜曰君嗜晨鳧好北大遂求晨鳧北大齎行倉唐至曰北藩中山之君有北大晨鳧使倉唐再拜獻之文侯曰嘻擊知吾好北大晨鳧也即見使者文侯曰擊無恙乎倉唐唯唯三問而不對文侯曰不對何也倉唐曰臣聞諸侯下名君既已賜弊邑使得小侯國不敢對也文侯曰中山君無恙乎倉唐曰今者之來拜送於郊文侯曰中山君長短若何矣倉唐曰聞諸侯比諸侯不朝則側者皆人臣也臣無所比之然則所賜之裘幾能勝之矣文侯曰中山之君亦何好乎對曰好詩文侯曰於詩何好曰好黍離與晨風文侯曰黍離詩何哉對曰彼黍離離彼稷之苗行邁靡靡中心搖搖知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉文侯曰怨乎曰非敢怨也時思也文侯曰晨風謂何對曰詩云鴆彼晨風鬱彼北林未見君子憂心欽欽如何如何忘我實多此以忘我者也於是大悅曰欲知其子視其母欲知其君視其使中山君若不賢惡能使其使賢遂廢太子欣而召中山君以為嗣説苑曰秦王以五百里地封鄢陵君君不受使虞且謝秦王忿然作色謂且曰亦嘗見天子之怒乎曰臣未嘗見也王曰天子之怒伏尸百萬流血千里且曰大王亦嘗見布衣韋帶之士怒乎王曰布衣韋帶之士怒則解冠徒跣以頭槍地耳何難知者且曰此乃庸夫之怒耳布衣之士怒伏尸二人流血五步即持其匕首起視秦王曰今將是矣秦王變色長跪曰先生就坐寡人諭矣又曰趙王遣使者之楚方鼓瑟而送之誡之曰必如吾言注事具瑟門又曰齊使淳于髡聘楚髡為人形貌短小楚王薄賤之曰謂之齊無人耶而使子來乎何長也髡對曰臣無所長要中七尺之劍欲斬無狀王王曰止吾但戲子耳與髡共飲酒又曰晉楚之君為好會苑丘之上宋使人臣晉楚大夫曰趣以天子禮見吾我將見子使者曰冠雖弊義居上履雖新義居下周室微諸侯未之能易也師雖升未城臣猶不更臣之服也遂以諸侯禮見之又曰楚使者聘齊齊王享之梧宮使者曰大哉梧乎王曰江海之魚吞舟國之樹巨使者曰昔燕攻齊遵雄路渡濟橋楚雍問擊齊左而虛其右王鼎絶頭乎杜山公孫羌格死于龍門飲馬乎淄澠宣獲乎琅琊王與太后奔乎莒逃城陽之山此時梧之大小何如矣力渤對曰使者問梧之年即昔荊州王為無道加諸申氏殺子胥父與兄子胥被髮食於吳闔廬以為相三年將兵復讎于楚戰勝舉級頭百萬囊瓦奔鄭王保於隨師入郢胥行郢都親射宮臨于王冡笞其墓若此則梧可為拊也又曰明君之使人也任之以事不制之以辭王逸子曰或問張騫可謂名使者歟曰周流斷城東西數萬里其中胡貊皆知其習俗得始大蒜蒲萄首蓿等語林曰魏武將見胸奴使自以形陋不足雄遠國使崔季圭代當坐自捉刀床頭座既畢令人問魏王何如使答曰魏王信雅望非常然床頭捉刀人此乃英雄也魏王聞馳遣殺此使天文要集曰天節星主奉使小而明則使中正也梁元帝鄭衆論曰漢世銜命胸奴困而不食者二人而己子卿手持漢節臥伏冰霜仲師固無下拜陽絶太水況復風生稽落日隱龍堆翰海飛沙皋蘭走霰豈不酸鼻痛心憶雒陽之宮陛屑泣撗悲想長安之城闕直以為臣之道義不為生事君之節生為義盡豈望拔幽泉出重仞經長樂抵未央及還望塞亭來依候火傍觀上郡側眺雲中雖在己之自隆而於時之報未重梁劉孝儀北使還與永豐侯書曰足踐寒地身犯朔風暮宿客亭晨炊謁舍飄颻辛苦迄屆氈鄉雜種覃化頗幕中國兵傳李緒之法樓擬衛律所治而毳幕難淹酪漿易厭王程有限時反玉關射鹿胡奴乃共歸國刻龍漢節還待入塞馬銜苜蓿嘶逗故墟人獲蒲萄歸種舊里稚子出迎善鄰相勞倦握蟹螯亟覆蝦碗每取朱顏略多自醉用此終日亦自娛
