body:
  text: 偏霸部五前燕慕容廆崔鴻十六國春秋前燕錄曰慕容廆字弈洛瓌昌黎棘城人昔高辛氏遊於海濱留少子厭越以君北夷世居遼左號曰東胡秦漢之際為匈奴所敗分保鮮卑山因復以為號曾祖莫護跋於魏初率其諸部入居遼西從司馬宣王討公孫淵拜率義王始建國於大棘城之北見燕代少年多冠步搖冠意甚好之遂歛髮襲冠諸部因呼之步搖其後音訛遂為慕容焉祖木延從母丘儉征高麗有功加號大都督父涉歸以全柳城勳進拜單于遷邑遼東於是漸變胡風自云慕二儀之德繼三光之容遂以慕容為姓廆身長八尺有大度晉安北將軍張華一見奇之謂曰君後必為命世之器匡難濟時者也涉卒弟耐立將謀殺廆廆亡潛於遼東徐郁家太康元年國人殺耐迎廆立之太康十年又還于徒河之青山元康四年定都大棘城所謂紫蒙之邑也永嘉六年王沉承制以廆為散騎常侍冠軍將軍前鋒大都督大單于皆讓不授擢舉賢才官方授任魯國孔纂宿德清望請為賓友平原劉讚儒學洽通為東牟祭酒世子率國冑受業焉太興四年晉遣謁者拜廆使持節督幽平東夷諸軍事車騎將軍平州牧封遼東郡公丹書鐵券承制海東咸和元年加侍中特進八年夏五月薨于文德殿年六十五葬於青山晉遣使者贈車騎大將軍開府儀同三司謚襄公皝為燕王追謚武宣王儁稱尊追尊武宣帝廟號高祖晉書曰廆在位四十九年慕容皝崔鴻十六國春秋前燕錄曰慕容皝字元真廆第二子小字萬年長七尺八寸雄毅善權略博學多才藝晉建武元年拜振武將軍永昌初拜左賢王太寧末拜平北將軍朝鮮公咸和八年六月即遼東公位行平州刺史督攝部內九年八月晉遣謁者拜皝鎮軍大將軍平州刺史大單于遼東公承制一如廆故事二年七月立子儁為世子四年以左司馬封弈為左長史九月弈等以皝任重位輕宜稱燕王於是上議十月僣即燕王位于文德殿大赦境內改備郡司以封弈為相國追尊先公為武宣王先妣為王后起文昌殿出入警蹕立夫人叚氏為王后世子儁為太子是歲棘城黑石谷有大石自立而行八年七月晉使鴻臚郭恡持節拜皝侍中大都督河北諸軍事大將軍燕王餘如故封諸功臣百餘人九月遷都龍城宮闕十二年四月黑龍一白龍一見于龍山皝率群寮觀龍去龍二百步祭以太牢二龍交首嬉翔解角而去皝大悅赦境內號新宮曰和龍立龍翔寺于山皝雅好文籍親造太上章以代急就又著典誡十五篇並以教冑子十四年皝親臨東庠考試學生其通經秀異者擢充近侍十月饗群僚于承乾殿右長史宋諺性貪賜布百匹令自負而歸以愧其心十五年八月皝因見白兔馳射馬倒輦而還宮引太子儁囑以後事謂曰今中原未平方須經建委賢任哲此其時也恪智勇兼濟方堪任重汝其委之以成吾志九月薨于承乾殿年五十二冬十月葬龍山謚文明王儁稱尊追尊曰文明皇帝廟號太祖陵曰龍平晉書曰皝嘗田于西鄙將濟河見一老父服朱衣乘白馬舉手麾皝曰此非獵所王其還也祕之不言遂濟河連日大獲後見白兔馳射之馬倒被傷乃說所見輦而還宮引儁囑以後事以永和四年死在位十五年慕容儁崔鴻十六國春秋前燕錄曰慕容儁字宣英皝第二子小字賀賴跋十三月而生有神光之異身長八尺一寸善屬文雅長辭賦至於器服車室皆著銘讚以為勸戒皝之八年晉遣使者拜皝燕王以攜為安北將軍東夷校尉十一年進拜使持節鎮東將軍皝薨即燕王位赦其境內元年春正月儁依春秋列國故事稱元年五月聞趙亂乃嚴兵將為進取之計七月晉使謁者陳沈拜儁侍中河北諸軍事幽冀并平四州牧大將軍燕王承制封拜一如廆皝故事元璽元年正月司南車成儁大悅告于皝廟四月遣輔國恪相國弈討冉閔戰于魏昌廉臺閔師大敗擒送之閔大將軍蔣幹輔閔子智固守鄴城遣輔弼評等帥騎一萬以討之鄴北郡縣悉降輔國弈等二百一十人勸稱尊號令曰非常之事匪寡德所宜聞也八月剋鄴輔弼評等送閔后董氏太子智太尉申鍾并乘輿服物及六璽送于中山傳國璽蔣幹先已送晉儁欲神其事業言曆運在己乃詐云得之賜閔妻號奉璽君封冉智為海濱侯以輔弼評為司州刺史鎮鄴十月輔國恪等三百五人奉皇帝璽十一月僣即皇帝位于正陽前殿大赦改年時晉遣使詣儁謂之曰還白汝天子我承人乏為中國所推已為帝矣庚午書曰追崇祖考古人之令典武宣王尊為高武宣皇帝文明王為太祖文明皇帝二年正月立后可足渾氏為皇后光臺元年正月立中山王暐為皇太子赦改年初廆有駿馬曰赭白有奇相逸力石虎之伐棘城皝將出避難欲乘之馬悲鳴踶嚙人莫能近皝曰此馬見異先朝孤嘗仗之濟難今不欲出者蓋先君之旨也乃止虎尋奔退皝益奇之至是年四十九歲而駿逸不虧儁比之於鮑氏驄命鑄銅以圖其像親為銘讚鐫頌其旁置薊城東掖門是月像成而馬死十一月自薊遷鄴十二月入鄴宮大赦繕宮殿復銅雀臺以吳王垂為東夷樣尉平州刺史鎮遼東二年三月常山寺大樹自拔根出璧七十三光色精奇有異常玉以為岳神之命遣尚書郎叚勤以太牢祀之五月遼西獲黑兔三年三月儁夢石虎齧其𦜜寤而惡之命發其墓剖棺出屍踏而罵之曰死胡安敢夢生天子遣御史中尉陽約數其殘酷之罪鞭而投之漳水十二月儁寢疾謂大司馬恪曰吾患惙頓恐不濟脩短命也復何所恨但二寇未除景茂冲幼慮其未堪家國多難吾欲遠追宋宣以社稷屬汝恪曰太子雖幼天縱聰聖必能勝殘致治不可以亂正統儁怒曰兄弟之間豈虛飾乎恪曰陛下若以臣堪荷天下之任者寧不能輔少主也儁曰若汝行周公之事吾復何憂四年正月儁薨於應福前殿年五十三偽謚景昭皇帝廟號烈祖葬龍陵儁雅好文籍性嚴重未曾以慢服臨朝雖閑居宴處亦無懈怠之色晉書曰儁在位十一年自初即位至于末年講論不倦覽政之暇唯與侍臣錯綜義理凡所著述四十餘篇也慕容暐崔鴻十六國春秋前燕錄曰慕容暐字景茂儁之弟三子元璽三年封中山王尋立為皇太子光壽四年僣即帝位大赦改元建熙元年以太原王恪為太宰錄尚書行周公事專百揆上庸王評為太傅副贊朝政司空楊騖為太保吳王垂為河南大都督十州諸軍事兗州牧鎮梁國四年正月暐南郊十月太尉弈迎神王和龍初暐委政太宰恪專受經于愽士王勸助教尚鋒祕書郎杜詮竝以明經講論左右至是通諸經祀孔子于東堂以勸為國子祭酒鋒國子愽士詮散騎侍郎其執經侍講皆有拜授八年太宰恪卒九年十二月有神降于鄴自稱湘女有聲與人相接數日而去十年四月立貴妃可朱渾氏為皇后六月晉大司馬桓溫率眾五萬來伐遂至方頭吳王垂大敗之軒獲三萬餘級溫奔還淮南垂既敗溫威德彌振太傅評大不使之太后遂與評謀殺垂十二月垂出奔秦十一年六月秦輔國將軍王猛鎮南將軍楊安率眾六萬來伐以太傅評下邳王厲等帥精卒三十萬拒秦師于潞川州郡盜賊大起鄴中怪異非常十月評及猛戰于潞川評師敗績單騎遁還猛乘勝追奔長驅至鄴十月符堅帥眾會猛來攻拔鄴城外亂散騎侍郎徐蔚等率扶餘句麗及上黨質民子弟五百人夜開城北門引納秦師暐與太傅評左衛將軍孟高等數十騎出奔昌黎堅遣將軍郭慶帥騎五千追之及暐于高陽秦將巨虎執暐將縛之暐曰汝何小人而敢縛天子虎曰我梁山巨虎受詔縛賊何謂天子也執暐送鄴堅問其本狀暐曰狐死首丘欲歸死于先人陵墓堅哀而釋之令還宮率文武出降堅入鄴宮昇正陽殿徙暐及王公已下并諸鮮卑四萬餘戶于長安封暐新興郡侯邑五千戶尋拜尚書堅征臺城為平南將軍別部都督淮南之敗隨堅還長安既而吳王垂攻符丕于鄴中山王冲起兵關中暐謀殺堅事發為堅所誅年三十五德稱尊號偽謚幽皇帝晉書曰始廆以武帝太康六年稱公至暐四世暐在位十一年以海西公太和五年滅通皝凡八十五年前秦符洪崔鴻十六國春秋前秦錄曰符洪字廣世略陽臨渭氐人其先有扈氏之苗裔子孫強盛世為氐酋其後家池生蒲長五丈節如竹形于時咸異之謂之蒲家因以氏焉父懷歸為部落小帥母姜氏寢產洪先是隴右大雨霖百姓苦之謠曰雨若不止洪水必起故名之曰洪年十二父卒代為部帥好學多權略嘗騎射屬劉氏之亂散千金招延儁傑戎晉繈負奔之推為盟主劉聰遣使拜平遠將軍不受自稱護氐校尉秦州刺史略陽公群氐推為首劉曜以洪為氐王及曜敗於洛陽洪率部人西堡隴山石虎將軍攻上邽洪詣虎降虎跣出迎之拜冠軍將軍監六夷諸軍事涇陽伯趙建平四年石生起兵於關中洪遂西結張駿自稱晉北平將軍雍州刺史石虎既滅生洪率戶二萬下隴東如馮翊虎拜洪護氐校尉進爵為侯徙秦雍州民羗十餘萬戶于關東遷洪龍驤將軍流民都督處之方頭從征叚遼有功進封西平郡公佛圖澄言符氏有王氣虎陰欲殺之洪稱疾不朝太寧元年進位侍中車騎大將軍開府儀同三司雍州刺史進封本國略陽郡公時姚弋仲亦圖據關中恐洪先之遣子襄率眾五萬來伐洪洪逆擊敗之於是安定梁擾等並關西民望說洪曰今胡運已終中原喪亂明公神武自天必繼蹤周漢宜稱尊號以副四海之望洪以讖文有草付應王又孫堅之生背有符字遂改姓符氏自稱大將軍單于三秦王初趙將軍麻秋西鎮抱音符牢聞冉閔之亂率眾歸鄴洪使子龍驤雄逆擊獲之以為軍師將軍秋說洪西都長安既而秋因讌酖洪將併其眾世子健收而殺之洪將死謂健曰關中周漢舊都形勝之國吾亡之後便可鼓行而西言終而薨年六十六符健崔鴻十六國春秋前秦錄曰健字建業洪第三子母姜氏夢感大羆而生生之夜洪夢族曾氐王蒲建謂之曰是兒興家門可以吾名字之於是名羆字世健後避石虎外祖張羆之名故改焉晉永和六年自稱晉征西大將軍開府都督關西諸軍事雍州刺史於是盡眾西行至盟津起浮橋以濟濟訖焚橋三輔堡壁悉降十一月入都長安於是左長史賈玄碩等依諸葛亮劉備故事表健為秦王玄碩等乃上尊號健偽讓再三乃從之皇始元年正月僣即天王位于南郊大赦改晉永和七年為皇始元年追尊父洪為太祖武惠皇帝繕宗廟社稷於長安立妻強氏為皇后子萇為皇太子靚為平原公生為淮南公弟雄丞相東海公其餘封授各有差是年野蠶成繭野禾被原百姓採野繭而衣收野粟而食關西家給人足二年正月丞相雄等固請宜依漢晉兼皇王之美不可過自謙冲同趙之初號健從之僣即皇帝位于太極殿大赦諸公進爵為王立五等之封以次進之三年正月下書曰其令公卿已下歲舉賢良方正孝廉清才多略博學秀才異行各一人或獻書規諫或面陳朕過其速以聞勿俱貴賤四年丞相東海王雄卒贈相國進封魏王謚敬武王雄字元才洪之季子趙建武中拜龍驤將軍雄頭大足短故軍中稱為大頭龍驤健甚重之曰元才吾之姬旦五年四月立淮南王生為皇太子六月健寢疾引太師魚尊丞相雷弱兒太傅毛貴司空王隨等囑以後事受遺輔政乙酉薨于大極前殿年四十九葬原陵偽謚明皇帝廟號世宗永興初追尊曰景明皇帝廟號高祖符生崔鴻十六國春秋前秦錄曰符生字長生健第三子幼而麤暴昏酒無賴祖洪甚惡之生無一目七歲洪戲之問侍者曰吾聞瞎兒一淚信乎侍者曰然生怒引佩刀自刺出血曰此亦一淚耶洪大驚鞭之生曰性耐刀槊不堪鞭捶洪曰汝為爾不已吾將以汝為奴生曰可不如石勒也及長力舉千鈞走及奔馬皇始五年僣即皇帝位大赦改年群臣奏先帝晏駕甫爾不宜改號生怒不從窮推議主壽光元年七月殺右僕射叚純以太子門大天趙韶為僕射太子舍人趙誨為中護軍著作佐郎董榮為尚書竝以佞倖進也九月中書監胡文言於生昆頻有客星孛于大角榮惑入東井大角為帝坐東井秦之分野不出三年國有大喪大臣戮死願陛下遠追周文脩德以攘之生曰皇后與朕對臨天下足塞大喪之變於是殺皇后梁氏誅太傅錄尚書毛貴車騎尚書令梁楞左僕射梁安后安之女孫又誅丞相雷弱兒諸羗悉殺弱兒南安羗酋也生雖諒闇遊飲荒淫殺戮無道彎弓露刃以見朝臣錘鉗鋸鑿備置左右未幾后妃公卿已下至于僕隸誅五百餘人二年正月嬖臣右僕射董榮言於生曰日蝕之災宜以貴臣應之生曰唯有大司馬國之懿戚不可其在王司空生從之誅司空王隨壬戍饗群臣于太極殿樂奏生親歌以和之命尚書令辛牢典勸生怒曰何不強酒猶有坐者引弓矢射牢殺之於是百僚大懼無不引滿昏醉汙服蓬頭僵仆生以為樂三年四月姚襄遣姚蘭等眾二萬七千進據黃洛生遣平王黃眉東海王堅建節將軍鄧羌等步騎萬五千以討之羌偽不勝引騎而退襄追之至於三原羌廻騎拒襄大戰獲襄襄有駿馬日行千里是戰也馬倒而擒之眉等振旅而歸初長安謠曰東海大魚化為龍男為王女為公問在何所洛門東東海即堅封也第在洛門東生荒暴日滋殘虐彌甚群臣朔望漏盡請見生曰知盡乎須待飲訖或日暮而不出百僚飢弊或至申酉之間方出臨朝酒怒色厲多有殺戮或連月昏醉弗堪省覽或使宮人與男子躶交於殿前引群臣臨而觀之或生剝牛羊驢馬爛雞鴨三五千為群放之殿中或生剝死囚面皮令其歌舞觀以為樂勳戚忠良殺害略盡朝士奔逃草野皆曰從虎口出左右得度一日如過十年至於截脛刳胎拉脇鋸頭殺者動有千數生夜對侍婢曰阿法兄弟亦不可信明當除之是夜清河王符法夢神告之旦將禍集汝門先覺可以免寤而心悸會侍婢來告乃與特進梁平老等帥壯士數百人潛入雲龍門東海王堅帥麾下三百人繼集宿衛將士皆捨仗歸堅生猶昏寢不悟堅眾既至生驚問左右曰此輩何等人引生置別室廢為越王俄而殺之時年二十三謚厲王封子馗為越侯
