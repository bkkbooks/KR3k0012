body:
  text: 地部三十九塘録異傳曰文翁者廬江人為兒童時乃有神異及長當起歷下陂以作田文翁晝日斫伐柴薪以為陂塘其夜忽有數百頭野豬以鼻一戴土著柴中比曉成塘吳地記曰壇塘一名陌城夫羌十二年既殺子胥後悔之與群臣臨江作塘創設祭奠百姓因以立廟吳越春秋云夫差設祭杯動酒盡劉道真錢塘記曰防海大塘在縣東去邑一里往時郡議曹華家信富乃議立此塘以防海水始開募有能運土石一斛即與錢一升旬日之間來者雲集塘未成而譎不復取於是載土石者棄置而去塘以之成既遏絶潮源一境蒙利也述異記曰今烏江長亭亭下有騅馬塘即當時烏江亭長艤舟待項王處南越志曰丹城縣有釜塘金沙自是而出裴淵廣州記曰彰平縣朱沙塘水如絳魚鱉皆赤荊州記曰長沙郡東十餘里有郡人劉壽墓有石闕四所壽漢順帝時為司徒其東有龜塘周回四十五里有靈龜出其中故塘因名焉盛弘之荊州記曰始安熙平縣東南有山山西其形長狹水從下注塘一日再減盈縮因名為朝夕塘幽明録又載幽明録曰耒陽縣東北有蘆塘淹地八頃其深不可測中有大魚常至五日一躍奮出水大可三圍其狀異常每躍出水則小魚奔迸隨水上岸不可勝計異記云蘆塘有鮫魚五日一化或為美異婦人或為男子至於變亂尤多郡人相戒故不敢有害心鮫亦不能為計後為雷電殺之此塘遂涸劉欣期交州記曰鑿南塘者九真路之所經去州五百里焉援積石為塘以通於海達於象浦建標為南極之界淮南子曰壞塘取龜發屋求狸桀跖之徒君子不為堤爾雅曰墳大防也謂隄梁書曰始興忠武王憺音淡字僧達為荊州刺史遇大江溢堤壞憺親率將吏冒雨築之雨勢甚猛人皆恐懼或請避之憺曰王尊尚欲身塞河堤我心何獨以危登堤歎息遂輟膳而刑白馬以祭江神以身為百姓請命言終而水退堤出郡國志曰長沙金牛堤漢武時有異人牽金牛走入此堤內因以名焉水經注曰涿郡王尊自益州刺史遷東郡太守河水盛溢泛浸瓠子金堤尊躬率吏民投沉白馬祈水神河伯親執圭璧請身填堤廬居其上吏民皆走尊立不動水齊足而止公私壯其勇節水經曰漢安帝永初七年今謁者太山于岑於石門東積石八所皆如小山以捍衝波謂之八激堤島釋名曰海中可居曰島到也人所奔到漢書曰田橫懼誅入居海島中孟康海中山曰島魏志曰王傾討句驪入沃沮人云嘗乘船捕魚風吹十日東得一島上有人常以七月取童女沉海齊地記曰嶗山東北五里入海有管彥島是黃巾賊帥管承後也又曰東牟城東有盤島城東北有牛島常以五月海牛及海狸與島産乳其上嶼臨海記曰去郡七里東有樊續嶼嶼上空冢裏猶餘敗鼓角或呼為樊府君墓今郡公田在此嶼下滸爾雅曰岸下地曰滸詩曰綿綿葛藟在河之滸岸爾雅曰重涯曰岸詩曰高岸為谷又曰淇則有岸晉書曰殷仲堪於江濱見流棺而葬焉旬日之間門溝忽起為岸其夕有人自稱感君之恩堪因問岸何祥也答曰水中有岸曰洲君將牧州言終而沒至是果得荊州也水經注曰船官浦東即黃鵠山林澗甚美譙郡戴仲若野服居之山下謂之黃鵠岸又曰昆明池有金堤石岸益州有金堤左思曰西踰金堤東曰玉津孫卿子曰泉生珠而岸不枯泥說文曰泥黑土在水中者也易曰井泥不食舊井無禽在井之下故稱泥井而泥則不可食書曰淮海惟楊州厥土惟塗泥詩含舍神霧曰夫齊之地處孟春之位海岱之間土地汙泥流之所歸利之所聚傳曰晉楚將戰呂錡夢射之中之退入於泥論語曰子夏云雖小道必有可觀者焉致遠恐泥是以君子不為小道令諸子書泥滯陷不通也漢書溝洫志曰涇水一石其泥數斗且溉且番長我禾黍又曰禹泥行乘橇東觀漢記曰隗囂將王元說囂將背漢曰請以一丸泥為大王東封函谷關此萬世一時也又曰鄧訓將黎陽宮兵屯漁陽遷護烏丸校尉黎陽宮故吏皆戀慕知訓好以青泥封書從黎陽步推鹿車載青泥至上谷遺訓其得人心如此隴石記曰武都紫水有泥其色亦紫而粘貢之用封璽書故詔誥有紫泥之美帝王世紀曰周穆王征犬戎得鍊剛赤刀用之割玉如割泥焉神仙傳曰董奉居廬山嘗大旱縣令于士彥詣奉說大旱之意奉因仰視其屋曰貧家屋皆見天不可以得雨如何令解其意身率將吏為起屋屋成當泥壁作人已掘土欲取江水沃泥奉曰不須日暮當雨也其夜果大雨聚壤成泥顧微廣州記曰鬱林郡山東南有池有石牛在池下民常祀之歲旱百姓殺牛祀之以牛血和泥泥石牛背祠畢天雨洪注洗背泥盡而後晴曾子曰白沙在泥與之皆黑淮南子曰琬琰之玉在汙泥之中雖廉者不釋也世說曰石崇以椒為泥泥屋王君夫以赤石脂泥壁雜五行書曰二月上壬取土泥屋四角宜蠶吉礫釋名曰小石曰礫礫析也小石相支其間析析然抱朴子曰軍術曰地生瓦礫不去有大禍蔡伯喈青衣賦曰金生沙礫珠出蚌泥盧子雲相風賦曰楚石雜結緑沙礫廁隋珠沙龍魚河圖曰蚩尤兄弟八十一人並銅頭鐵額食沙石韓詩外傳曰孔子南遊適楚至於阿谷之隧有女子佩瑱而浣者孔子曰彼婦人其可與言乎執觴以授子貢曰善為之辭婦人其曰阿谷之隧隱曲之汜欲飲則飲何問於婢子授子貢觴跪坐置之沙上曰禮不親授禮曰自西河至於流沙千里而遙雍州是也家語曰得其人如聚沙而雨之非其人如會聾而鼓之史記曰張良以鐵椎擊秦始皇於博浪沙中其副車又曰上在雒陽南宮從復道望見諸將往往相與坐沙中語又曰武帝元封元年旱於是天子乃禱萬里沙應劭注曰万里沙祠戰國策曰齊襄王立田單相之過淄水有老人涉水而寒不能行坐沙中田單見其寒也解裘而衣之襄王曰弗早圖恐後悔之疑單有異心也漢書曰韓信擊龍且夾睢水夜令人為萬餘囊盛沙以壅水上流東觀漢記曰朱鮪等共會洧水上沙中設壇立聖公為天子博物志曰石蕃衛臣也背能負千二百石沙廣志曰流沙在玉門關外南北二千東西數百里有三斷名曰三隴列子曰牛缺者上地之大儒也之邯鄲遇盜於耦沙魯連子曰朝露之蒲工女不能治淄澠之沙計兒不能數韓子曰孫叔敖請漢間之地沙石之處曾子曰白沙在泥與之皆黑淮南子曰河水欲清沙瀼穢之又曰寒凝水熱焦沙抱朴子曰穆王南征一軍盡化小人為蟲沙說苑曰湯之時大旱七年焦沙爛石葛洪肘後方曰治溺死方熬沙以覆死人使上下有沙但出口鼻古今注曰宣帝地節元年上都沙中夜風有火如粟曹瞞傳曰操征馬超隔渭水婁子伯說曰今天寒可起沙為城以水灌之可一夜而成劉根別傳曰潁川太守高府君到官民人疫郡中掾吏死者過半夫人郎君悉得病從根求消除病氣之術根曰於廳事之亥上穿地取沙三斛著中以淳酒三升沃其上府君從之病者悉得愈疫氣絶搜神記曰有物處于江水其名曰蜮一曰短狐能含沙射人以術方抑之則得沙石於肉中假國沙州記曰澆河西有黃沙沙南北一百二十里東西七里西極大楊川望黃沙猶人委乾糒地不生草木黃沙蕩然沙州取號焉豫章記曰龍沙在郡北帶江沙甚潔白高峻而峙陂陀有龍形舊俗九月九日登高上處也新安記曰錦沙村傍山依壑素波澄膜錦石舒文冠軍吳喜聞之而造焉鼓柂遊泛彌旬忘返歎曰名山美石故不虛賞使人喪朱門之志王孚記曰袁州有水春交則上白沙如米於兩岸九十餘里呼為米沙若一岸遍米其方豐熟湘中記曰白沙如霜雪赤岸似朝霞遁甲開山圖曰沙土之福雲陽之墟可以長生可以隱居沙土即長沙也雲陽古仙人也郡國志曰杭州浙江有江沙漲昔武列為郡吏赴府鄉人餞之會此沙上父老曰此沙狹而長君必為長沙太守果然又曰伊州鐵勒國也而路多沙磧磧內時聞叫喚聲不見人或聞歌笑之聲蓋鬼物也鄱陽記曰新昌水有一砂堆在縣東北五十里其形狀如覆船鮮淨特異每年豐稔其沙即堆積如舊若砂移向岸其年儉古來相傳以為常驗
