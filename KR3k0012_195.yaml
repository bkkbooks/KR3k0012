body:
  text: 居處部二十二館驛説文云館客舍也從食官聲周禮曰五十里有市市有館館有積以待朝聘之客廣雅釋宮云館舍也桂苑云客舍也待賓之舍曰館開元文字云凡事之賓客館焉舍也館有積以待朝聘之官是也客舍逆旅名候館也公館者公宮與公所為也私館者自卿大夫以下之家禮記曰舊館人之喪脫驂而賻左傳曰敢辱大館又莊公曰楚令尹子元欲蠱文夫人為館於其宮側而振萬焉萬舞又僖上曰改館晉侯饋七牢焉詩國風鄭緇衣曰適子之館兮還子授子之粲兮又大雅云篤公劉于豳斯館周禮地官司徒下云國野之道十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有候館館有積注云候樓館可以觀望也又秋官司寇下云凡諸侯入王則逆勞于畿及郊勞視館注云視館致館也又司儀云主君郊勞交擯三辭車送拜三揖三辭受拜車送三辭再拜致館亦如之注云館舍也使大夫授之君又以禮親致之儀禮聘禮云卿致館注云致至也至此館主人以禮致之所以安之也又環人云掌送迎邦國之通賓客以路節達諸四方舍則授館又云至于國賓入館次于舍門注云次待事于客儀禮公食大夫禮云有司卷三牲之俎歸于賓館注云牲之俎正饌尤尊盡以歸尊賓之至也又聘禮云厥明訝迎于館注云此訝下大夫以君命迎賓謂之訝訝迎亦皮辨也禮記曲禮上云問疾弗能遺不問其所欲見人弗能館不問其所舍又檀弓上云賓客至無所館夫子曰生於我乎館死於我乎殯又云子貢曰於門人之喪未有所説驂於舊館無乃以重乎又曾子問云卿大夫之家曰私館公館與公所為曰公館注云公館若今縣官舍也左傳莊元年經云夏單伯送王姬秋築王姬之館于外注云公在諒暗慮齊侯當親迎不忍便以禮接於廟又不敢逆王命故改築舍於外也又僖三十年傳云晉分曹衛之田公使臧文仲往宿於重館重館人告曰晉新得諸侯必親其恭不速行將無及也又襄三十一年傳云子産相鄭伯如晉晉侯以我喪故未之見也子産使壞其館之垣而納車馬士文伯讓之曰斃邑以政刑之不修寇盜充斥是以令吏人完客所館今吾子壞之其若異客何子産曰僑聞之文公之為盟主也宮室無觀卑庳臺榭以崇大諸侯之館今銅鞮之宮數里而諸侯舍於隸人門不容車不可踰越士文伯不能對晉侯見鄭伯有加禮厚其宴好而歸之乃築諸侯之館又昭十三年傳云宣子謂叔向曰子能歸季孫乎對曰不能鮒也能乃使叔魚見季孫曰鮒聞諸吏將為子除館於西河其若之何且泣又曰叔孫所館雖一日必葺其牆屋去之如始至漢書薛宣子惠為彭城令宣過之橋梁郵驛不修宣知其不能又郊祀志曰孫卿曰仙人可見上往常遽以故不見今陛下可為館如維氏城置脯酒神人可致且仙人好樓居於是上令長安作飛廉桂館甘泉作延壽館又曰鄭莊置驛以延賓客又曰公孫弘起徒步數年至宰相封侯於是起客館開東閣以延賢人與絫謀議又元后傳曰王莽又知太后婦人饜居深宮中莽欲娛樂以示其權乃令太后四時車駕巡狩四郊存見孤寡婦人春幸璽館率皇后列侯夫人桑遵霸水而祓除又外戚傳曰成帝許美人在上林鹿館數召入飾室中元延二年懷子漢書敘傳述元紀云宮不新館陵不崇墓又揚雄傳長楊賦云張網置罘捕熊豪豬狖玃狐兔麋鹿載以檻車輸長楊射熊館又羽獵賦云於是禽彈中衰相與集於靖冥之館魏志曰文昭甄宣后明帝母也后已早廢父逸上蔡令早卒及明帝即位追封逸為上蔡侯諡敬侯適孫蒙襲爵薨子暢嗣上為暢起大第車駕自臨之世説曰魏明帝為外祖母築館于甄氏自行視謂左右曰館當以何為名侍中繆襲對曰陛下聖恩齊于哲王罔極過于曾閔此館之興情鍾舅氏宜以渭陽為名魏書曰帝於後園為母起觀及宮名其里曰渭陽里晉書天文志云傳舍九星在莖善上近河賓客之館主胡人入中國客星守之備姦使亦曰胡兵起宋書文帝本紀云帝臨玄武館閲武又隱逸雷次宗傳云徵詣京邑為築室於鍾山西巖下謂之招隱館齊書禇伯玉傳云高帝即位手詔吳會二郡以禮迎伯玉伯玉辭疾上不欲違其志勑於剡白石山立太平館以居之梁書高祖紀云大統七年幸於宮城西立士林館延集學徒置集雅館以招遠學沖虛真經黃帝云黃帝於是放萬機舍寢室去直待徹鍾縣減廚膳退而間居大庭之館齋心服形三月不親政事漢武帝故事云上自封禪後夢高祖坐明堂群臣亦夢於是祀高祖於明堂以配天還作高陵館郡國志台州仙石山有館土人謂之黃公客堂堂兩邊有石步廊觸石雲起崇朝必有雨有四竿筋竹風吹自成陰拂石皆淨即王方平遊處荊州圖記云襄陽縣南水行四十里陸道六十里有桃林館建康地記云顯仁館在江寧縣東南五里青溪中橋東湘宮巷下古高麗使處西京雜記云公孫弘自以布衣為宰相乃開東閣營客館以招天下之士其外曰欽賢館以待大賢翹材館以待大材接士館以待國士又曰梁孝王遊於忘憂之館進諸遊士各使為賦隱訣易遷館含真臺有女真二人為主一曰張微子二曰傅禮和晉宮閣名云華林館有繁昌館建康館顯昌館延祚館壽安館干祿館班孟堅西都賦云於是天子乃登屬王之館歷長楊之榭子生夏五月余之長安壬寅于新安之千秋亭甲辰而弱子失越翌旦乙巳瘞于亭高允塞上公亭詩序曰延和三年余赴京師發石門北行失道夜寓宿代之快馬亭其俗云古塞上公所貴之邑也曰公有良馬因以命之此其所貴也負長城而面南山皋澤帶其側涌波灌其前停騑策以流目抱遺風以依然仰德音於在昔遂揮毫以寄言代人云塞上公姓李代之李氏並其後也張平子西京賦曰顧往昔之遺館獲林光於秦餘又云郡國宮館百四十五右極盩屋并卷酆鄠又云豫樟珍館揭焉中峙班婕妤自傷賦曰痛陽祿與柘館皆宮名生二子處此二館皆失也仍襁褓而罹災豈妾人之殃咎兮將天命之不可求也張衡西京賦曰既新作於迎風增露寒與儲胥託高基於山岡直摕霓以高居薜綜注曰此二皆館名張衡東京賦曰其西則有平樂都場示遠之館龍省盤蜿天馬半漢劉邵趙都賦曰置酒乎黃華之館左思魏都賦曰營密館以周坊飾賓侶之所集潘尼東都館賦曰東館者蓋東武陽侯之館也我而遷居謂余曰吾將老焉故有終焉之心而無移易之意子且為我賦之傳舍釋名曰傳傳也人所止息而去後人復來轉相傳無常人也史記相如為趙王奉璧使秦王舍之廣成傳舍古縣也或云秦始皇因為望海臺傳載曰鄭審開元中為殿中侍御史充館驛使令每傳舍立十二辰候自審始也亭釋名曰亭停也人所停集也風俗通曰謹案春秋國語有寓望謂金亭也民所安定也亭有樓從高省丁聲也漢家因秦大率十里一亭亭留也今語有亭留亭待蓋行旅宿食之所館也亭亦平也民有訟諍吏留辨處勿失其正也漢書項羽傳曰烏江亭長艤船待羽又曰武帝元封元年幸緱氏登太室上聞萬歲聲者三故立萬歲亭又韓信傳曰信從下鄉南昌亭長食張晏曰下鄉屬淮陰亭長妻苦之乃晨炊蓐食又曰李廣嘗夜從一騎至霸陵亭霸陵尉酢呵止廣宿亭下續漢書曰靈帝到夏門亭使竇武持節以王青蓋迎入殿中又曰蔡雍避難在吳告人曰吾昔至會稽高遷亭見竹椽從東間數第十六可以為籥取用果有異聲東觀漢記曰王郎起光武自薊東南馳晨夜至饒陽無蔞亭時天寒衆皆飢馮異上豆粥又曰趙孝父為田禾將軍孝嘗從長安來欲止亭亭長難之言有貴客過掃灑不欲穢汙地良久乃聽止吏因問曰田將軍子從長安來何時發幾日至孝曰尋到矣張璠漢記曰楚曄為天水太守之官與故太守喪會於隴亭堂吏移喪避曄曄讓喪於正堂關西稱之謝承後漢書曰倉梧廣信女子蘇娥行宿鵲巢亭為亭長龔壽所殺及婢致富取財物埋置樓下交址刺史周敞行部宿亭覺壽姦罪奏之殺壽列異傳云鵠奔亭漢官典職曰洛陽二十四街街一亭十二城門門一亭魏略曰從長安至大秦人民連屬十里一亭魏書曰元皇后以漢延熹三年二月生齊郡白亭有黃氣滿室移日不散吳志曰孫權將如吳親乘馬射虎庱亭馬為虎所傷權投以雙戟虎即斃又曰大史慈與劉繇住縣立屯府大為山越所附孫策躬自攻討遂見囚執策即解縛捉其手曰寧識神亭戰時耶若卿爾得我云何慈曰未可量也策大笑王隱晉書曰徐苗字叔胄高密淳于人也曾祖華至行感靈夜有神人告亭欲崩苗出亭崩得免又曰王羲之初渡江會稽有佳山水名士多居之與孫綽許詢謝尚支遁等宴集於山陰之蘭亭崔鴻十六國春秋曰慕容垂請入鄴城拜廟符不許乃潛服而入亭吏禁之垂怒斬吏燒亭而去沈約宋書曰孔寧子與王華並有富貴之願自徐羡之等秉權日夜構之於太祖寧子嘗東歸至金昌亭左右欲泊船寧子命去之曰此弒君亭不可泊也又曰徐湛之為廣陵郡守善為政威惠並行廣陵城舊有高樓湛之更加修整更起風亭月觀吹臺琴室果竹繁茂花藥成行帝王世紀曰桀敗於鳴條之野案孟子舜卒鳴條乃在東夷之地或言陳留平丘今有鳴條亭在安邑之西世説曰過江諸人每至暇日輒相要出新亭藉卉飲宴周侯在坐而歎風景不殊舉目有江河之異皆相視流淚唯丞相愀然變色曰當共勠力王室克復神州何至作楚囚相對泣耶夢書曰亭為積功民所成也夢築亭者功積成也夢亭壞敗恩澤傷也韋耀雲陽賦曰八鄉九市亭候三六列樹表塗路有廬宿丹陽記曰京師三亭新亭吳舊亭也故基淪毀隆安中有丹陽尹司馬恢移創今地謝石創征虜亭三吳搢紳創治亭並太元中尋陽記曰稽亭北瞰大江南望高嶽淹留遠客因以為名焉劉楨京口記曰劫亭湖亭通阿湖陵郡治丹徒縣八縣來往經過此湖中多劫於邊立亭因以為名裴淵明廣州記曰尉他築臺以朔望升拜號為朝拜臺傍江構起華館以送陸賈因稱朝亭永嘉記曰樂城縣三京亭此亭是祖送行人之所王韶之始興記曰淘水源有堯山長嶺衡亙遠望如陳雲山下有平陵陵上有古大堂基十餘處雖巳夷漫而猶可識謂曰堯故亭父老相傳堯南巡登此山故亭即其行宮三齊略記曰曲城齊城東有萬歲水水北有萬歲亭漢武帝所造伏琛齊地記曰平壽城西北有平望亭亦古縣也或云秦始皇因為望海臺莊子曰仁義者先王之蘧廬也注傳舍也華延俊洛陽記曰城內都亭華林奉常廣世昌益廣莫定陽遮要暴室廣陽西明萬歲文陽東明視中東因建奉止姦德宮東陽千秋安衆孝敬清明二十四亭河陰界東出戶鄉亭南泉亭街郵亭孔蹕會稽記云江夏太守宋輔於重山南白樓亭立學教授又郡國志云沛國桓儼避地至會稽聞陳業賢而往候之不見臨去入交州留書繫白樓亭柱而別翻陽記曰白雲亭在縣西南旁對干越亭而峙焉跨古城之危瞰長江之深隋州刺史劉長卿題詩曰孤城上與白雲齊因以白雲為名豫章記曰徐孺子墓在郡南十四里曰白杜亭吳嘉禾中太守長沙徐熙於墓隧種松太守南陽謝景於墓側立碑永安中太守梁郡夏侯嵩於碑邊立思賢亭松碑亭今並在松大合抱亭世世修治至今謂之謝君亭越絶書曰女陽亭者勾踐入宦於吳夫人從道産女於亭養於雋李謂之語兒鄉郡國志皇甫謐云鳴條之野立鳴條亭又曰涼州候馬亭二師伐大宛得天馬感西風頓羈而逸至燉煌北塞下鳴而去二師候於此遂名之又曰韶州潼溪里有三楓亭又曰濟州周首亭即埋長狄喬如首於山西是也又曰冀州華陽亭即嵇叔夜學琴於此又曰幽州督亢亭即荊軻以地圖獻秦處又曰郴州武丁岡有欒亭即太守欒巴所建也又曰柯亭一名千秋亭又名高遷亭會稽記云漢議郎蔡雍避難宿於此亭仰觀榱竹知有奇響因取為笛果有異聲又曰潤州覆舟山有閬風亭襄江記峴山亭在襄陽縣東一十里今基迹尚存兩京新記曰西京苑內有望雲亭鞠場亭柳園亭真興亭神皋亭園桃亭臨渭亭永泰亭南昌園園北昌國亭流杯亭青門亭邵平種瓜之所也又曰東京上陽宮有曜掌亭九洲亭又曰東都苑內有金谷亭凝碧池建安記曰止馬亭在飛猿嶺口馬之登降於此止息故名之
