body:
  text: 道部二真人上太上經曰大微天中有二十四氣混黃雜聚結有名無氣變化為真人道之積成托形立影與時翱翔有名無體謂之真人八素真經日若精勤得道者皆當書以蘂簡刻以瓊文位為上清左真公又曰龍衣鳳帔虎帶皆是群真所獻於帝皇真誥曰中皇君者天帝君之弟子也生知長生之要天仙之法夙會玄感於是太上授以帝君九真之經八道祕言之章道成授書為太極真人又曰清虛真人於太素真人受三奔之道桐柏真人修解劍之法有太上奔日之文得為下元真人又曰不知回元隱道者不得刻名上真回元者太上更新之日也常以其日思存吉事又曰虛妄者德之病華衒者身之災執滯者失之由恥辱者行之玷遣此四者然後可以問道耳有淫衒之心不可行上真之道也昨見清虛官正除落此輩人名又考付三官推之可不慎乎紫微真仙之才內明外知録名太極金書東州內纍既息積之勿休又曰審道之本則為上清真人仙真妙方能盡梗概之道者便為九宮真人若各備具其道則為太極真人又曰練形於太陰易貌於三官受學化神濯景易氣俯仰四運得為真人金根經曰天圖玉關主監衆真遊宴之所也又曰天關上有六層玉臺太上真人集宴之處也又曰玉保青宮北殿上有金格格上有金章鳳璽玉札丹青羽蓋升仙法服以給成真之人大有經曰玉華青宮有寶經玉訣應有為真人者授之又曰太上素靈洞玄經上化三真又大洞真經云道有三真不可去身紫霞變景三光映真大洞玉經曰太無山中有洞宮玉戶在峨嵋之上諸得道真仙之名刊列此宮也又曰云上清有宮門有兩闕左金闕右玉闕有羽衣守士內有玉芝流霞之泉刻金題衆真飛仙之號又云玉清中有太暉殿玉真遊宴之所也又曰九真仙伯上帝司禁之君濯纓帝川之池也又曰太一上元君者萬仙之司主方嶽真氣太上真人步五星之道以致降于室大洞真經曰赤城朱窗上清絶境乃帝一內宅三真寶堂又曰上清真人揔仙大司馬長生法師登大帝滄浪山洞臺中雙玉穴酣飲紫明芝液又曰長生存神者好山水之人仁知動靜所依也依仁者靜而壽依智者動而樂當投簡送名俾崇仁智朱書白簡移籍太清發爐拜手用青紙青絲裹絡巖石上詣水泛舟中流讀簡以名係之必能降真也上清九真中經內訣曰有玉保公太素遣下迎九真之人也又曰欲行九真之法者齋戒淨室並為天帝君所見記録也太真科曰羽仙侍郎上都官典格列其職位都統玉真太上真人在五嶽華房之內非有仙籍不得聞見丹簡校定名入南宮又曰虛皇金闕玉帝最貴最尊號曰自然莫能使之然莫能使之不然也和光於人似同而異惟得道者乃能知之又曰上清禹餘天有三官真人主治過刑殺伐陰賊不軌嫉害賢哲心懷進退穢慢真人之罪者玉清隱書曰玉名金格當為上真三天真皇佩神虎之符在太極上位上真則飛龍翼轅中真則紫毛持節下真則太極參軒又曰太微天帝君命太微上真勑使群靈又曰上皇玉帝命玄羽真人出迎太微天帝又命太上真人開瓊珠之篋出玉真隱書玄羽之經以傳太微天帝之君內音玉字經曰真人散香於玉庭又云飛散百和之香流五雲之華以觀飛天真人又曰四極真人主人命常乘蒙真之車校人罪籙又曰九華真人治於南上宮中校人功過善三官列言又曰天真皇人曰諸天內音自然玉字其大梵隱語上帝命天真皇人注解其正音足以開度天人登真隱訣曰崑崙瑤臺刊定真經之所也上品居上清擬帝皇之尊中品處中道皆公卿之位下品居三元之末並大夫之流三真品經各有條次又曰三昧真人乘風雲龍車下衛齋戒之士太素真人辟始學者惡夢之法金華真人刻大洞上經於天帝紫微宮玄琳玉殿東壁牖上太虛真人説鴻鳥之經太極真人誦王母之辭典禁真人察人之善惡妙行真人推劫會之數又曰太極真人常以立春日日中會諸仙人於太極宮刻玉簡記仙名至春分之日日中崑崙瑤臺太素真人會諸仙人刊定真經也崑崙瑤臺是西母之宮所謂西瑤上臺天真祕文盡在其中矣太素真人治白水沙洲之上定其真經也至立夏日日中上清五帝會諸仙於紫微宮見四真人論求道之功罪至夏至日日中天上三官會于司命河候校定萬民罪福增減年算至立秋日日中五嶽諸真人詣中央黃房定天下祀圖靈藥至立冬日日中陽臺真人會集列仙定新得道人始入名仙録至冬至日日中諸仙詣方諸官東海青童君刻其仙籙金書內字凡學道之人常以夕半日中謝罪罪名自除剋身歸善以求長生神仙秋分之節氣處清虛太和正日也衆真諸仙是日聽訟又剌姦吏及部內諸仙官並紏奏在處道士之功過及含生有罪應死生者故仙忌真記曰子欲升天慎秋分罪無大小皆上聞此朱火丹陵宮仲陰先生之要言也又云此辭出列紀是青童君述古真人之言以傳龔氏言罪禍纖介刻于丹城之籍也伏匿之善惡陰德之細功無不縷陳也又曰上真人之道有七第一太上鬱儀奔日文二太上結鄰奔月章三太上八素奔辰章四太微飛天上經五高上太洞真經六金闕靈書紫文七九真中經也上真之位為諸天帝行則三七色節萬真前導中真之道有六大丹隱書九真玄文太上金策方諸上經三皇內文紫書訣籙中真之位上清卿相之列也紫毛持節玉帝參轅下真之道有八上清七變隱地八術玄皇玉書神州洞經紫庭中方降籙黃道素奏中章上元玉書下真之位上清大夫之流五色節旄飛行倒景又曰有得見聖列紀者玄籙書名奏之上清位為仙卿若能行金闕真事則拜為大夫此謂列紀重於紫文也既見之非真受佩而已謂知其中經目之輕重求道之梯級依此尋學故勝於守紫文之單事也上皇玉籙曰二十四真人有佩玉籙以行山川者則河海上神奉迎啓道靈寶隱書曰中極真人主人命籍九華真人主九幽之下宿對生死太元真人受天之符度長夜之魂太極真人治赤城玉洞之府司校太山死生之籙三元真人主紫微行道赤書玉訣經曰凡月十四日上帝真皇敕太一使者下與北酆都伯使者同行天地司察人神功過深淺列言上官又勑太一八神使者下與三官司察天人善惡列言也又遣九部剌姦周行五嶽三宮水府條正鬼事司人功過列言上天白羽經曰太真丈人登白鸞之車駕黑鳳於九源自天己下莫不範德又太極真人有仙真相好者要在慈心觸物以輔相好然後得仙矣不能忍性則仙相敗矣故修道會真必以精思為本神為本存神入觀剋以靜念為先大劫經曰上景真人將天下力上元洪水母決逆萬川海空經曰何監者天人之隱名處玉樓之上列真仙之館又高真者體有真氣玉眸詵詵南真傳曰昨與叔甲詣清虛宮校定真仙得失之事近頓除落四十七人復上三人耳內明真正乃良材也九宮真人出入皆從黃闕絳臺中間為道故以道之左右置臺闕者以伺非之氣真人往來者太上正法經曰九真者九天之真氣凝而成也上中下三真生於太清是元始之澄氣也各置官室次第上清宮衛之官太上大道君萬真之主也居玉殿造上帝之章以為寶經於玉清宮中以度後學得真之士三元品戒經曰紫微宮有延生之儀格又云赤帝玉司君玉景度治南方朱陽之臺揔統上真之士景林真人曰勤感纍世念真期靈皇鑒其用思太極注名玉劄於是細書紫虛之宮朱書東華之閣刻名上清丹文錦籍空洞靈章曰真人彈雲璈吹九鳳之簫神州之笙其音逸響流激千尋後聖列紀曰上清金闕後聖君少好道樂真紫微上真天帝玉清宮賜紫蘂剛丹鳳璽得在上清中遊太極下治諸天封掌兆民仙志曰凡修行太一之事真人之道不得有所拜伹心拜而已不形屈也思真行道通而無窮顯驗應期登真必速也黑籙上篇曰聖真仙者共行道德俱宗太玄戒文經曰太上真人居仙府中世人得仙者皆先過此自然玉字經曰七寶林中有上真之遊圃真人之戲園太霄琅書曰元皇玉靈之胄位登太真理二儀於玄圃掌玉籙於萬仙揔地司於五嶽領上真於三關上統無涯下攝洞源自天以下莫不咸隸又曰太素三元君稟靈和玉宸上氣故結生虛無含真秀景機洞妙無神齊廣暉道周九玄呼吸未兆觸物對應太上之凝結也太上四明玉經日真仙之道以耳目為主淫色則目暗廣愛則耳閉此二病從中來而外奔也非復有他今令其聰明益易耳但不為之當洗心絶念放棄淫貪所謂嚴其始矣保利雙闕啓徹九門朝液泥丸列為上真視徹甚遠聽於絶響此真仙之高不伹明耳目而已三洞珠囊曰高上玉清刻石隱銘曰酆都山在北內有空洞洞中有六宮書此銘於宮北壁制檢群凶不使橫暴生民學者得佩此刻石文則北酆落名南宮度命為其真人太平經曰後學得道各有品階至于指極聖真仙人定真玉籙經曰凡欲定心當受上皇民籍定真玉籙此至要為學之先也先能定心仙名乃定是三天正一先生所佩以定得仙之名太上經曰玉清者如玉堅不可毀淨不可污也堅淳無變穢纍都盡一而無雜故名為真人太上丹簡曰凡學道居真人之位者名入南宮三五順行經曰合德入道號曰真人太上遣四極真人來迎授三天靈籙之文於上清宮上清八景經曰精思百日真人降形也葛玄五千文序曰精思遠感而上遠則太上遣真人下授希微之旨又云靜思期真則衆妙感會內觀形影則神氣長有體洽道德則百神震服大洞雌一篇曰金姿曜於東華玉形悅於帝門神映五老騰躍三元頂負寶曜浮遊九晨分形散景位為上真升玄經曰惟須忠直尋道求真改惡從善得為真人三元玉檢經曰歲庚寅九月九日甲辰元始於上清宮告盟授三元玉檢使付後學有玄名應為上清真人者
