body:
  text: 居處部二十一城下丹陽記曰石頭城吳時悉土塢義熙始加磚纍石頭因山以為城因江以為池形險固有奇勢故諸葛亮曰鍾山龍盤石城虎踞良有之矣又曰越城去宮八里案越絶書則東甌越王所立也又曰江寧縣北三十里有白馬城吳時為烽火之所太康地記曰梁孝王築睢陽城十二里以鼓唱節杵而下和者稱睢陽因以為縣又曰鴈門馬邑縣秦時建此城輒崩不成有馬周旋馳走反覆父老異之因以築城遂名馬邑云搜神記亦載也述征記曰思子城漢武帝延和二年衛太子遇江充之亂奔湖自縊壺關三老太廟令田千秋訴太子之冤築思子宮於湖其城存焉續述征記曰廣固城有大澗甚廣阻之為固謂之廣固又曰白馬城魏黃初中曹彪封白馬王治于此城又曰小城陽城在陽城西南半里許實中俗説囚堯城羊頭山記邯鄲城邯山名鄲盡也邯山至此而盡也又曰曲阜城城內有曲阜逶迆長八九里東方朔十洲記曰崑崙山有積金為天城四面千里關中記曰長安城其形似北斗其土本皆黑壤今城赤如火堅如金父老所傳鑿龍首山土以為城也幽明録曰始興縣有皋天子廟因山崎嶇十有餘里坑塹數重阡陌交通城內堂基碎瓦柱穿猶存東有皋夫子冢皋天子未之聞也劉植京口記曰有小升城鄧德明南康記曰歸美山下有石城高數丈有一門門外有二石夾左右高數百丈遠望嵯峨雲闕騰空故老謂之神仙遊焉江寧圖曰石頭城吳之金陵城為石城郡國志曰兗州兩觀城即仲尼為魯司寇誅少正卯之處又曰陜州魏城即芮伯萬母惡芮伯逐之出居于魏此也晉獻公滅之以賜畢萬山河之間土地迫隘故魏周著十畝之詩又曰雲中府快馬城有綾羅泉即塞上翁所居之邑有快馬亭塞上翁六國前人姓李也又曰雍州霸陵城在通化門東二十里秦襄王葬於其坂謂之霸上又曰汴之高陵城即高陽之墟也繁陽城漢云外黃縣有繁陽亭張耳為外黃令有夏后祠神井能興雨雹又曰徐州薛城高厚無比多出暴桀子弟蓋孟嘗君餘風也又曰六壁府後魏太平真君五年討胡於六壁即此城俗以城有六面因以為名焉又有虢城虞城相傳云晉既滅虞虢遷其人於此築城以居之又曰幽州無終縣西平城即李廣射石虎之處又曰復州竟陵城雲夢城城西大澤即古雲夢澤也卻月城在河口魏將黃祖所守處又曰媯州涿鹿城即黃帝擒蚩尤處黃帝泉今枯而不流即古之版泉也又曰涼州昌松縣有鸞鳥城魏改為神鳥城張軌時有五色鳥集於其處築城又曰衛州有狗城蓋紂養狗之處也又曰洛州夫人城即趙武靈王夫人築也又曰衛州有酒城又曰涼州臥龍城又云鳥城亦名多翅城又曰登州文登縣有不夜城尚書城有石橋即秦始皇造欲觀日處文登山始皇召文士而登此山又曰齊有士鄉城鄭玄云齊有士鄉城越有君子軍又曰同州韓城即韓原也詩所謂韓侯受命是此韓地春秋時秦擒晉惠公處也又曰肅州福祿城因謝艾所築也又曰廉州宋太始年陳伯紹平夷至合浦見三青牛圍之不獲即其處置城俗號青牛城又曰箕子城石勒每破一州必簡別衣冠號為君子城泊乎幽州擢荀綽裴憲等還襄國路經此後俗訛為箕子城又曰平州孤竹城即孤竹國也漢靈帝時遼西守廉翻夢人云余孤竹君之子也今遼海漂吾棺明日見浮棺因葬之又曰雲中府齊柳牙舒城有道人城初築時有仙人遊其地遂名城焉又曰成都郡城秦惠王二十七年張儀築以象咸陽沃野千里號曰陸海有萬歲池即築城取土之處也又曰定州博陵縣唐城堯為唐侯國於此又曰陽翟縣舊屬汝州有雞鳴城又曰隨州博望城即張騫封侯之國也又曰許州雍城即黃帝臣雍父始作杵臼處又曰朔州太平城後魏穆帝治也太極殿琉璃臺瓦及鴟尾悉以琉璃為之又曰鄭州博浪城即張良為韓報仇擊秦王處又曰雍州杜城在安仙門南七里春秋范宣子云在周為唐杜氏即是此也又曰益陽城魯肅築也云登之望見長沙城邑人馬形色宛然相去三百里故老云長沙益陽一時相望又曰廣州萬人城即尉他故城也又曰張掖郡竇融築千秋城萬歲城又曰洛陽澠池縣有秦趙二王城號為俱利城又曰定州博陵縣樂羊城魏文侯使樂羊取中山造又曰重泉城漢武為李夫人所築又曰藍田有青維泥城亦曰柳城又曰賀州蕪城池隍中頗出珠玉寶器即尉他拒防之所也又曰曹州漆園城莊周為吏處又曰曹州白鴈城即衛侯伐鄭至于鳴鴈是此也又曰洛州王城宮城西入苑故郟鄏城也周武王伐殷遷九鼎此地也夏至之影尺有五寸謂之土中焉泉亭即春秋時泉皋伊洛之戎同伐京師又曰坊州鄜城即高奴城俗謂高樓城又曰汴有浚城鄘詩云孑孑干旌在浚之城又曰爰有寒泉在浚之下水冬夏常冷因曰寒泉又曰滑州鹿鳴城城內有鳴鹿臺又曰陳官城周二十里東晉所築號曰六門城宣陽門楣上作虎刻木相對又施雲楣藻井言武門上作重樓號曰西辰觀吳初築在府宮南號太初宮正殿曰神龍殿又有臨海赤烏殿孫皓起顯明宮引水激之飾以珠玉有彎崎臨硎之觀門及樓皆擊鼓持夜以齊以鼓多驚眠改為鐵磬過秦論曰秦踐華以為城因河以為池越絶書曰石城者吳王闔閭所置美人離城也又曰樓門外馬寧溪止復城者故越王餘復君所治也又曰樓門外鴻城者故越王城也去縣百五十里吳雞籠山外雞陂故吳王所畜雞使李保之養去縣二十里闔閭姑胥臺外有九曲路闔閭造以遊姑胥之臺太湖中窺百姓去縣三十里又曰吳大城周四十七里二百一十步陸門二有樓水門八南面十四里四十二步西面七里百一十二步北面八里二百六十步東面一十里七十九步闔閭所造也吳郭周六十八里六十步吳小城周一十二里其下廣二丈七尺高四丈門三皆有樓東宮周一里二百步路西宮在長秋門周一里二百二十六步秦始皇帝二十一年守宮者照燕失火燒之吳越春秋曰鯀築城以衛君造郭以居人此城郭之始也又曰范蠡觀天文法於紫宮築作小城周千一百二十二步一員三方西北立飛翼之樓以象天門東南服漏石竇以象地戶陵門四達以象八風外郭築城而缺西北示服事吳也不敢壅塞內以取吳故缺西北而吳不知也又曰伍子胥為吳相土嘗水象天法地造築大城周回四十七里陸門八以象天之八風水門八以象地之八窗築小城十里陸門三東面者欲以絶越明矣立閶門者以象天門通閶闔風立地門者以象地戶也闔閭欲西破㢰強楚楚在西北故立閶門以通天氣也因復名破楚門水經注云葉東界有故城犨縣東至瀙水達泚陽縣界南北聯聯數百里號為方城一謂之長城云酈縣有故城一面未詳里數號為長城即此城之西隅其間相去六百里北南雖無基築皆連山相接而漢水流其南故屈完答齊桓公云楚方城以為城漢水以為池郡國志曰葉縣有長城曰方城指此城也吳地記曰袁山松城晉書云左將軍袁山松陳郡人時為吳郡太守隆安五年築此城在法瀆邊江城之以禦孫恩圍山松於此城陷害山松城今為波潮所衝以半毀江中山松城東夾江又有二城相對闔閭所築以備越處鄱陽記曰仙人城在縣東南其城皆峭壁危石直上千仞自古呼為仙人城每天空無雲秋日清徹其上宮殿倉廩歷歷可見趙曄吳越春秋曰堯聽四嶽之言用鯀修水鯀曰帝之遭天災厥黎及康乃築城造郭以為國固淮南子曰崑崙山上有層城九重列女傳曰齊人杞梁殖襲莒戰而死其妻無所歸乃就夫尸於城下而哭之七日城崩妻遂投淄水而死郭説文曰郭廓也廓落在城也禮記月令曰孟秋之月修宮室補城郭又禮記曰正月無置城郭妨農也國語曰火見而清風戒寒而修城郭月令曰孟夏坯城郭漢書曰馬援所過為郡縣治城郭謝承後漢書曰汝南廖扶畢志衡門死葬北郭號曰北郭先生風俗通曰郭郛者亦大也莊子曰孔子謂顏回曰回來家貧居卑胡不仕乎顏回對曰不願仕回有郭外之田五十畝足以給饘粥郭內之田十畝足以為絲麻鼓琴足以自娛學夫子之道足以自樂回故不仕矣魏略曰秦國石為城郭管子曰內謂之城外謂之郭焦貢易林曰金城鐵郭上下同力寇不敢賊王肅表曰夫城之有郭猶裏之有表骨之有皮表裏各異則保障不完皮骨分離則一體不具壕釋名曰城下謂之壕壕翱也言都邑內所翱翔祖駕處也禮曰今大道既隱天下為家各親其親各子其子貨力為巳城郭溝池以為固謀用是作兵由是起漢書神農之教曰有石城十仞湯池百步帶甲百萬而無粟不能守櫓釋名曰櫓露也露上無覆屋也孫子兵法曰攻城之法修櫓枌榲其器械三月而後成陸機洛陽城周公所制東西十里南北十三里城上百步有一樓櫓外有溝渠
