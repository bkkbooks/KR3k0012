body:
  text: 兵部四十五突圍漢書曰趙充國武帝時以假司馬從二師將軍擊胸奴大為虜所圍漢軍乏食數日充國乃與壯士百餘人潰圍陷陳二師引軍隨之遂得解身被二十餘瘡又曰灌夫父張孟嘗為頴陰侯灌嬰舍人蒙灌氏姓為灌孟師古曰蒙冒也孟年老頴陰侯強請之鬱鬱不得意故戰嘗陷堅遂死吳軍中軍法父子俱有死事得與喪歸夫奮曰願得吳王下將軍頭以報父仇於是夫被甲持戟募中軍壯士所善願從數十人及出壁門莫敢前獨兩人及從奴十餘騎馳入吳軍至戲下師古曰戲大將之旗音與麾同所殺傷數十人不得前復還走漢壁亡其奴獨與兩騎歸又曰袁尚征袁談於平原使其將審配守鄴曹公攻鄴城尚聞鄴急棄平原而求入城以計事者主簿李孚請行尚曰當何所辦李曰今鄴圍甚急多人則不可孚乃自選溫信者三人不示其謀各給駿馬令釋戎器著平上冠持問事杖投暮直抵鄴下自稱曹公都督巡歷圍壘所過呵責失候者輒捶之自東歷西徑出曹公營當城門復怒守闈者收縛之因開圍馳入城下配以縋引之孚得入城中鼓噪皆呼萬歲守圍者以狀聞公笑曰此非徒入方且復出孚計事訖欲還而外圍益急謂配曰城中穀少無用老弱為不如驅出之省穀配乃夜簡得一千人皆令秉白幡持脂燭從三門而出請降孚所將來騎隨降人而出時守圍吏聞城中悉降火光照曜但共觀火不復視圍孚出北門突圍而歸尚明日曹公聞孚以得去曰果如吾言又曰公孫瓚除遼東屬國長史常從數十騎出行塞下卒逢鮮卑數百騎瓚乃退入空亭納其從者曰今不奔之則死盡矣乃自持兩刃矛馳出衝賊殺傷數十人瓚左右亦亡其半遂得免又曰賈復從征伐未嘗喪敗數與諸將潰圍解急身被十二瘡帝以復敢深入希令遠征而壯其勇節嘗自從之魏志曰張遼為雜號將軍守合肥為孫權所圍獨出麾下從者千餘人潰圍刺之已出復入復出權衆破走由是威震江東又曰曹仁字子孝太祖從弟也行征南將軍留屯江陵拒吳將周瑜瑜未渡前鋒數千人始至仁募得三百人遣部曲將軍牛金逆與挑戰遂為所圍長史陳矯在城上望見金等垂沒左右皆失色仁氣奮怒遂被甲上馬將其麾下壯士數十騎出城徑前衝入陳金等乃解餘衆未盡出仁復直還突之拔出金兵賊衆乃退矯等初見仁出皆懼及見仁還乃歎曰將軍真天人也三軍服其勇太祖益壯之晉書曰李矩將張友與劉粲戰於盟津矩進救之使壯士三千泛舟迎友賊臨河列陳作長鉤以鉤船連戰數日不得渡夜遣部將格增濟入友壘與友選精騎千餘而殺所獲牛馬焚燒器械夜突圍而出奔武牢宋書曰劉康祖世居京口便弓馬膂力絶人浮蕩蒲酒為事每犯法為郡縣所録輒越屋踰墻莫能擒之夜入人家為有司所圍突圍去並莫能追因夜還京半夕便至明日守門詣府州要職俄而建康移書録之府州執事者並證康祖其夕在京遂得無恙追奔孫子曰歸師勿遏若窮寇退還依險而行人人懷歸敢能死戰徐觀其變勿遠截也後漢書曰曹公圍張繡於穰劉表遣兵救繡以絶軍後公將引還繡兵來追公軍不得進連營稍前到安衆繡與兵合守險公軍前後受敵公乃夜鑿險為地道悉過輜重設奇兵會明賊謂公為遁也悉軍來追縱奇兵步騎夾攻大破之公謂荀彧曰虜遏吾歸師而與吾死地吾是以知勝矣又曰曹公征張繡於攘一朝引軍退繡自追之賈詡謂繡曰不可追必敗繡不從大敗而還詡謂繡曰更追之必勝繡曰不用公言以至於此今已敗奈何復追詡曰兵勢有變亟往必利亟記力切繡信之遂收散卒赴追戰果勝以問詡曰繡以精兵追退軍而公曰必敗乃以敗卒擊勝兵而公曰必勝悉如公言何其皆驗詡曰此易知耳將軍雖善用兵非曹公敵也軍新退曹公必自斷後追兵雖精將既不敵彼士亦鋭故知必敗曹公攻將軍無失策力未盡而退必國內有故故以破必輕軍速進留諸將斷後諸將雖勇亦非將軍敵故雖用敗兵而戰必勝也繡大服又曰睢陽復返城迎劉永蓋延復率諸將圍之百餘日收其野穀永乏食突走延追擊盡得輜重永為其將所殺永弟防舉城降又曰璽書拜馬援為伏波將軍以扶樂侯劉隆為副扶樂縣名屬九真郡督樓船將軍假志等南擊交址軍至合浦而志病卒詔援并將其兵遂緣海而進隨山刊道千餘里刊除也十八年春軍至浪泊上與賊戰破之斬首數千級降者萬餘人援追徵側等至禁溪數敗之賊遂散走明年正月徵側徵二傳首洛陽又曰陳俊與五校戰於安次俊下馬手接短兵所向必破追奔二十餘里斬其渠帥而還光武望而歎曰戰將盡如是豈有憂哉又曰鮮卑萬餘騎寇遼東祭彤率數千人迎擊之自披甲陷陳虜大奔投水死過半遂窮追出虜急皆棄兵祼身散走斬首三千餘級獲馬數千匹又曰鄧禹進圍安邑更始遣將王匡成丹劉均等合軍十餘萬復共擊禹禹軍不利樊崇戰死會日暮戰罷軍帥韓歆及諸將見兵勢已摧皆勸禹夜去禹不聽明日癸亥匡等以甲窮日不出禹因得更理兵勒衆明旦匡悉軍出攻禹禹令軍中無妄動既至營下因傳發諸將鼓而並進大破之匡等皆棄軍亡走禹率輕騎急追獲劉均及河東太守楊寶持節中郎將弭強皆斬之收得節六印綬五百兵器不可勝數遂定河東又曰竇固與耿忠引兵出酒泉塞至天山即祁連山也今在西州交河縣東北今名祁縣羅浸山擊呼衍王斬首千餘級呼衍王走追至蒲類海蒲類海今名蒲悉海在今庭州蒲昌縣東南留吏士屯伊吾廬城伊吾今伊州縣也又曰馬防拜車騎將軍擊羌軍到冀而羌豪布橋等圍南部都尉於臨洮防欲救之臨洮道險車騎不得方駕防乃別使兩司馬將數百騎分為前後軍去臨洮十餘里為大營多樹幡幟揚言大兵且當進羌候見之馳還言漢兵盛不可當明旦遂鼓噪而前羌虜驚走因走擊破之斬首虜四千餘人遂解臨洮圍晉書曰王遜為寧州刺史越嶲李驤寇寧州遜使將軍姚崇爨琛拒之戰于堂狼犬破驤等崇追至瀘水透水死者千餘人崇以道遠不敢渡水遜以崇不窮追也怒囚于郡執崇鞭之怒甚髮上衝冠冠為之裂夜中遂卒又載記曰慕容寶與魏戰謀還中山乃引歸魏軍追擊之寶棄大軍率騎二萬奔還時大風雪凍死者相枕於道寶恐為魏軍所及命去袍仗戎器寸刃無返崔鴻十六國春秋曰前秦符堅自征晉於壽春敗還長安慕容泓起兵于華澤堅將符睿竇衝姚萇討之睿以苪切符睿勇果輕敵不恤士衆泓聞其至也懼率衆將奔關東睿馳兵邀之姚萇諫曰鮮卑有思歸之心宜馳令出關不可遏也睿弗從戰于華澤睿敗績被殺又曰夏赫連勃勃伐南涼禿髮傉檀大敗之驅掠二萬七千口牛馬羊數十萬而還傉檀率衆追之其將焦朗曰勃勃天姿雄警御軍齊肅未可輕也今因抄掠之資率思歸之士人自為戰難與爭鋒不如從溫圍北趣萬解惟阻水結營制其咽喉百戰百勝之術也傉檀不從勃勃聞而大喜乃於楊武下峽鑿凌埋車以塞路勃勃乃勒衆逆擊大敗之殺傷萬計又曰後涼呂弘攻假業於張掖不勝將東走業議欲擊之其將沮渠蒙遜諫曰歸師勿遏窮寇弗追此兵家之戒也不如縱之以為後圖業曰一日縱敵悔將無及遂率衆追之為弘所敗業歎曰不能用子房之言以至於此後周書曰晉公護東伐高齊遣將尉遲逈圍洛陽為敵所敗周將達奚武與齊王憲於邙山禦之至夜收軍憲欲待明更戰武欲還固爭未決武曰洛陽軍散人情駭動若不因夜速還明日欲歸不得武在軍旅久矣備見形勢大王少年未經軍事豈可將數營士衆一旦棄之乎憲從之遂全軍而返隋書曰張金初既敗將數百人遁逃後歸漳南招集餘黨楊善會追捕斬之傳首行在所帝賜以尚方甲矟弓劍進拜清河通守唐書曰武德初劉武周入寇僕射裴寂拒戰于度索原寂軍敗周進過河東太宗出兵拒之江夏王道宗年十七從征太宗登玉壁城望賊謂道宗曰賊恃其衆來邀我戰汝謂如何對曰賊乘勝而來其鋒不可當易以計屈難與力競但深溝高壘以挫其鋒烏合之徒安得持久糧餉既竭自當離潰可不戰而擒也太宗曰汝意暗與我合武周食盡夜遁追及會州一戰滅之又曰德操領延州道行軍揔管鎮北境梁師都與突厥之衆數千騎來寇延安營於野豬嶺德操以衆寡不敵按甲以挫其鋭後伺賊稍怠遣副總管梁禮率衆擊之德操以輕騎出其不意賊與禮酣戰久之德操多張旗幟掩至其後賊大潰逐北二百餘里剋其魏州虜男女二千餘口經數月師都又以步騎五千來寇德操擊之俘斬略盡師都與百餘騎而遁以功拜上柱國封平原郡公邑一千戶賜以貂裘金帶布帛千匹衛公兵法曰諸戰鋒等隊打賊敗其駐隊隊別量抽驍健二十人逐北其輜重隊遙叫作聲不得輒動跳蕩隊奇兵隊趁賊退不得過百步如審知賊徒敗散仍須取機追逐乘勢左傳曰晉侯圍曹門焉多死攻曹城門曹人尸諸城上磔晉死人於城上也晉侯患之聽輿人之誦稱舍於墓輿衆也舍墓為將發冢也師遷焉曹人凶懼遷至曹人墓也凶凶恐懼聲也音吁勇切為其所得者棺而出因其凶也而攻之遂入曹也史記曰漢王遣將韓信破陳餘後信購致廣武君李左車師事之韓信曰僕欲北伐燕東攻齊何若而有功對曰今將軍涉西河虜魏王擒夏説閼與一舉而下井陘不終朝破趙二十萬衆誅成安君名聞海內威振天下此將軍之所長也然而衆勞卒罷其實難用今將軍欲舉倦弊之兵頓之燕堅城之下欲戰恐力不能拔情見勢屈曠日糧竭而弱燕不服齊必距境以自強也燕齊相持而不下劉項之權未有所分也若此者將軍所短也故善用兵者不以短擊長而以長擊短為將軍計莫如案甲休兵鎮趙撫其孤弱百里之內牛酒日至以饗士大夫醳兵魏都賦曰醳者順時劉逵曰醳酒也北首燕路而後遣辨士奉咫尺之書暴其所長於燕燕必不敢不聽從燕以東告齊齊必從風而服雖有智者亦不知為齊計矣如是則天下事可圖也兵固有先聲而後實者此之謂也韓信並從之燕齊從風而靡後漢書曰王莽兵攻昆陽光武自將步騎千餘前去大軍四五里而陳尋邑亦遣人數千合戰光武奔之斬首十級秦法斬首一賜爵一級故因謂斬首為級諸部喜曰劉將軍平生見小敵怯今見大敵勇甚可怪也且復居前請助將軍光武復進尋邑兵却諸部共乘之斬首數百千級連勝遂前時伯升拔宛已三日而光武尚未知乃偽使持書報城中云宛下兵到而陽墮其書尋邑得之不喜喜音許記切諸將既經纍捷膽氣益壯無不一當百光武乃與敢死者三千人從城西水上衝其中堅敢死謂敢而死者凡軍事中軍最尊居以堅鋭自輔故曰中堅也尋邑陳亂乘鋭崩之遂殺尋邑城中亦鼓噪而出中外合勢震動天地莽兵大敗走者相騰踐奔殪百餘里間殪仆也會大雷風屋瓦皆飛雨下如注滍川盛溢水經曰滍水出南陽魯陽縣西堯山南經崑陽城北東入汝滍音直理也虎豹皆股戰士卒爭赴溺死者以萬數水為不流數過於萬故以萬為數王邑嚴尤陳茂輕騎乘死人渡逃去盡獲其輜重車甲珍寶不可勝算又曰曹公征張魯定漢中劉曄進説曰明公以步卒五千將誅董卓北破袁紹南征劉表九州百郡十并其八威震天下勢懾內外今舉漢中蜀人觀風破膽失守推此而前蜀可傳檄而定也劉備人傑也有智度而遲新得蜀人猶未附今破漢中蜀人震恐其勢自傾以公之神明因其傾而厭之無不剋也若小緩之諸葛亮明於理而為相關羽張飛勇冠三軍而為將蜀人既定據險守要則不可犯也今不取必為後憂曹公不從居數月蜀降者説蜀中一日數十驚備斬之而不能禁也曹公悔之又問曄曰今已小定未可擊也晉書曰何無忌南追桓玄與振武將軍劉道規俱受劉毅節度留其龍驤將軍何淡之前將軍郭鈐江州刺史郭昶之守盆口無忌等次桑落洲淡之等率軍來戰淡之常所乘舫旌旗甚盛無忌曰賊帥必不居此欲詐我耳宜亟攻之衆咸曰淡之不在其中徒得無益無忌謂道規曰今衆寡不敵戰不全勝淡之雖不居此舫取則易獲因縱兵勝之可一鼓而敗之也道規從之遂獲賊舫因傳呼曰已得何淡之矣賊中驚擾無忌之衆亦為喟然道規乘勝徑進無忌又鼓噪赴之淡之遂潰又曰鎮南將軍都督荊州杜元凱襲吳樂鄉在今江陵郡松滋縣東六十里虜都督孫歆沆湖以南至于交廣覩風送款時衆會議或曰百年之寇未可盡剋今將暑熱水潦方降疾疫將起宜俟來冬大舉凱曰昔燕樂毅籍濟西一戰以并強齊今王師兵威已震譬如破竹數節之後皆迎刃而解也遂指授群帥直指抹陵所過城邑莫不束手遂平吳國先議者慚而謝焉又曰朱齡石伐蜀賊譙縱縱將譙道福重兵守涪齡石師次平摸去成都二百里縱遣將侯暉譙悅屯平摸夾岸連城立柵齡石謂禆將劉鐘曰天方暑熱賊今固險攻之難拔祗困我師吾欲蓄鋭息兵伺隙而進卿以為何如鐘曰不然前揚聲言大衆由涪水故譙道福不敢捨涪今重軍逼之出其不意侯暉之徒已破膽矣只可因其凶懼而攻之勢當必剋剋平摸之後自可鼓行而前成都必不能守若緩兵相持虛實相見涪軍復來難為敵也進不能戰退無所資二萬餘人悉為蜀子虜耳從之翌日進攻皆剋斬侯暉等縱之城守相次瓦解又曰盧循率衆數萬方艦而下劉裕率兵拒之出輕利鬥艦躬提憣鼓命衆軍齊力擊之又上步騎於西岸右軍參軍庾樂生乘艦不進斬而徇之於是衆軍並騰踊爭先軍中多萬鈞神弩所至莫不摧陷裕自於中流蹙之因風水勢艦悉泊西岸上軍先備火具乃投火焚之煙焰翳天賊衆大敗追奔至夜乃歸循等還尋陽初分遣步兵莫不疑怪及燒賊艦衆乃悅服又曰周訪討賊杜曾曾大潰殺千餘人訪夜追之諸將請待明訪曰曾驍勇能戰向之敗也彼勞我逸是以剋之宜及其衰乘之可滅鼓行而進遂定漢沔崔鴻十六國春秋蜀李特攻晉將張徽敗徽軍特議欲釋徽還涪音浮諸將進曰微軍連戰士卒傷減智勇俱竭宜因其弊遂擒之若舍而寬之徽養病收亡餘衆更合圖之未易也特從之復進攻徽潰圍走特遣將水陸追之遂害徽生擒徽子存以徽喪還之也唐書曰太宗進逼西河宋金剛果遁走太宗追之身先士卒奮擊大破之乘勝逐北一日一夜行二百餘里轉戰數十合士卒疲弊至高壁嶺揔管劉弘基執馬而諫曰大王功效於此足矣亦宜思自安之計方今草創敵可盡乎且喉糧已竭士卒疲頓更欲何之願且停營待兵糧咸集而後決戰太宗曰功者難成易敗機者難得易失金剛走到汾州衆心已沮我及其未定當乘勢擊之此破竹之義也如更遲留必為賊計此失機之道吾國家之事當竭忠盡力豈顧身之安危乎遂策馬去諸軍乃進莫敢以飢乏為辭夜宿於雀鼠谷之西原太宗不食二日不解甲三日矣軍中若飢此夕惟有一羊太宗撫將士與之同食三軍感悅皆飽而思奮激明日趍汾州金剛列陳南北七里以抗官軍太宗遣揔管李績程咬金秦叔寶當其北翟長孫秦武通當其南親御中軍以臨之諸軍戰小却為賊所乘太宗率精騎三千直趣金剛賊衆大潰斬首三千餘級追奔數十里至張難堡有浩州行軍揔管樊伯通張德政先據此堡望見太宗輕騎而來初未識之太宗免胄曰我也堡人歡譟既而涕泣曰不圖今日生謁大王死無所恨左右以太宗不食告之乃奉濁酒脫粟飯太宗曰今日飢渴並解雖公孫豆粥何以加之又曰武德初太宗征薛仁果大破之乘勝遂逼折撫城竇抗等苦諫曰賊主猶據堅城雖破其將宗羅侯未可即逼請按兵以候其變太宗曰算之久矣破竹之勢不可失也賊大軍以敗餘衆何足為虞凶魁之計盡於此矣遂率衆而進至夜半軍臨賊城守陴者皆亂爭自投而下仁果窮蹙開門請降
