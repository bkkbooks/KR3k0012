body:
  text: 刑法部十二斬釋名曰斬暫也暫加兵即斷也周書曰武王使尚父以士卒馳商師大崩商辛乃內登于鹿臺之上自燔王崩于火武王先入乃射三發而後下車擊之以輕呂劍名也斬之黃鉞懸諸大白旗乃適二女之所射之三發擊之以輕呂斬之以玄鉞懸諸小白旗左傳成上曰韓獻子將斬人郤獻子馳將救之至則既斬之矣郤子使速以徇告其僕曰吾以分謗也家語曰郟谷之會齊侯奏宮中之樂俳優侏儒戲於公前孔子趍進歷階而上不盡一等曰匹夫而焚侮諸侯者罪應誅請有司速加法焉於是斬侏儒手足異處齊侯懼有慚色史記韓信亡楚歸漢未知名為連敖坐法當斬其輩十三人已斬次當至信信乃仰視適見滕公曰上不欲就天下乎何為斬壯士滕公奇其言狀其貌釋而不斬與語大悅之又曰張蒼坐法當斬解衣身長肥白如瓠時王陵見而怪其美士乃言沛公救勿斬漢書曰王欣濟南人以郡縣吏積功稍遷為被音罷陽令武帝末軍旅數發郡國盜賊群起繡衣御史暴勝之逐捕盜賊以軍興從事誅二千石以下勝之過被陽欲斬欣欣解衣伏鑕仰天言曰使君專殺生之柄威震郡國今復斬一欣不足以增威不如時有所寬以明恩貸令盡死力勝之壯其言貰不誅因與相結厚也東觀漢記曰任光字伯卿初為鄉嗇夫漢兵攻宛軍人見光冠服鮮明令解衣將斬而奪之會光祿勳劉賜適至視光容貌長者乃救全之後漢書曰趙王在長安為赤眉所得赤眉欲斬之白馬從事見趙王儀狀鬚眉美好絶衆護而活之又曰獻帝疾愈大會未央殿董卓朝服升車而馬驚墜泥還入更衣其少妻止之卓不從遂行乃陳兵夾道自壘及宮左騎右步屯衛周匝令呂布扞前後王允乃與士孫瑞密表其事使瑞自書詔以授布令騎都尉李肅與同心勇士七十餘人僞著衛士服於北掖門內以待卓卓將至馬驚不行怪懼欲還呂布勸令進遂入門肅以戟剌之卓衣甲不入傷臂墜車顧大呼曰呂布何在布曰有詔討賊臣卓大罵曰庸狗敢如是耶布應聲持矛剌卓趣兵斬之主簿田儀及卓倉頭前赴其尸布又殺之馳齎赦書以令宮陛內外士卒皆稱萬歲魏略曰京兆鮑出字文才值世飢餓出覔食後噉人賊以繩貫其母手掌驅去出走追斬賊得其母還魏志曰于禁字文則昌狶叛太祖遣禁征之禁急進攻狶與禁有舊詣禁降諸將皆以為狶已降當送太祖也禁曰諸君不知公常令先圍而後降者不赦夫奉法行令事上之節也狶雖舊交禁可失節乎自臨與狶訣霣涕而斬之郡中震栗無求不獲又曰夏侯玄雅量弘濟臨斬東市顏色不變舉動自若又曰鄧艾父子既囚鍾會至成都先送艾然後作亂會已死本營將士追艾檻車迎還衛瓘遣田續等計艾遇於綿竹西斬之蜀志曰魏延夢頭上生角以問占夢趙直直詐延曰夫麟有角而不用此不戰而賊欲自破之象也退而告人曰角之為字刀下用也頭上用刀其凶甚矣後為馬岱所斬又曰劉璋勑關戍諸將文書勿復通先主先主大怒召璋白水軍督陽琛責以無禮斬之又曰張松書與先主及法正曰今日大事垂可立功如何釋此去乎松兄廣漢太守肅懼禍退以白璋發其謀於是璋收斬松晉書曰楚王瑋既誅汝南王亮衛瓘尋又詔解嚴云瑋矯詔解嚴斬刑臨死出其懷中青紙詔以示監刑尚書劉頌流涕言此詔書也奉此而行謂為社稷今更為罪託體先帝受枉如此幸見申列頌亦歔欷不能仰視又曰荀晞字道將河南山陽人為兗州剌史斷決如流人不敢欺以從母子為都護犯法晞斬之既而素服哭曰殺汝者兗州剌史哭弟者荀道將以嚴刻斬戮號曰屠伯後為石勒所殺又曰石閔仕僞趙石鑒為侍中録尚書事鑒使石苞夜誅閔不剋反為閔攻殺鑒等殺胡人斬關踰城不可勝數閔知胡人不為己用頒令下每人斬一胡文官賜爵一級武官立拜牙門于時一日之中斬胡萬人於是鼻高多鬚濫死者甚衆胡人死至二十餘萬又曰皇甫謐字子方少遵父操永嘉中博士徵不起避亂荊州閉門居未嘗入城府蠶而後衣耕而後食南土人士咸尊敬之剌史陶侃禮之甚厚王敦弟王廙代侃廙至荊州大失物情百姓叛廙大行誅戮立威以方回為侃所禮責其不來詣己乃收而斬焉荊土華夷莫不流涕三十國春秋曰丙寅丞相府斬督運令史淳于伯于建康於是以刀拭柱血逆流上二丈三尺下四尺五寸其直如絃後魏書曰段暉從世祖至長安有人告暉欲南奔世祖問曰何以知之告者曰暉置金於馬韉中不欲逃走何由爾也世祖密遣視之果如告者之言斬之於市齊書曰庾弘遠字士操清實有士譽仕齊為江州長史剌史陳顯達舉兵敗斬於朱雀航將刑索帽著之曰子路結纓吾不可以不冠而死又曰陳顯達起兵官軍繼至顯達不能抗退走至西州趙談注矟剌落馬斬之於籬側血涌湔籬似淳于伯之被刑也崔鴻前趙録曰卜栩隱于龍門山嘗與郭璞論易栩曰吾大厄在四十一亦未見子之令終璞曰戮吾禍在江南不在此也鎮北靳冲攻太原不剋歸罪於栩輒斬之劉聰大怒曰此人朕所不得加刑冲何人哉遣御史丞誥衍持節斬冲也隋書曰刑部侍郎辛亶嘗衣緋禈俗云利於官上以為厭蠱將斬之蘇綽曰據法不當死臣不敢奉詔上怒甚謂綽曰卿惜辛亶而不自惜也命左僕射高頴將綽斬之綽曰陛下寧可殺臣不得殺辛亶至朝堂解衣當斬上使人謂綽曰竟何如對曰執法一心不敢惜死上拂衣而入良久乃釋之明日謝綽勞勉之賜物三百段漢新事曰奉車都尉竇固征胸奴騎都尉秦彭副固令彭別屯彭擅斬軍司馬固奏彭不由督率賊殺人公卿議皆以為固議是公府掾郭躬以為彭得專斬人上曰軍正校尉一統督何以得專殺躬對曰一統將者謂在部曲也今彭別將兵軍事至急勢不得關督將有詔躬上殿令尚書令與公卿雜難躬曰督將授斧鉞稱令故得擅行法都尉別得行軍法何以明之躬對曰軍正校尉別將兵假斧鉞即得專軍法難者曰今不假故不得擅殺躬曰漢制假棨戟以當斧鉞議者皆屈上從之晉朝雜事曰夜遣通事令史張林黃門令史駱休開神虎門迎故太傅趙王至太極前召收中書監張華侍中朝謐尚書裴危解結侍郎杜斌等斬之於東鍾下華等大呼自稱忠臣張林詰之曰公等知太子無罪何不諫諫若不從何不去也遂斬之華陽國志曰王濬自成都帥水陸軍及梁州又率七萬人伐吳臨發斬牙門將李延延所愛將也以爭騎斬之衆莫不肅商君書曰晉文公將欲明刑以親百姓顛頡後至吏請其罪君曰用事焉吏遂斷顛頡之首以徇晉國之士皆懼曰顛頡之有寵斬以徇而況我乎韓子曰禹遇諸侯會稽之上防風後至禹斬之王韶孝子傳曰周青東郡人也母患積年青扶侍左右五體羸瘦村里乃斂錢營助湯藥母痊許嫁同郡周小君小君疾未獲成禮乃求見青屬纍父母青許之俄而命終青供養為務十年中翁姑感之勸令更嫁青誓以匪石翁姑並自殺女姑告青害殺收考遂以誣款七月刑青於市青謂監殺者曰乞樹長竿擊白幡青若殺翁姑血入泉不殺血上天既斬血乃緣竿上天梟首傳曰叔孫昭子殺豎牛投其首於寧風棘上漢書曰三族令先黥劓斬左右趾梟首葅其骨謂之具五刑又曰漢王病愈西入關至櫟陽存問父老梟故塞王欣頭櫟陽市又五行志曰江充掘巫蠱太子宮太子乃斬充舉兵與丞相劉屈釐戰太子敗走自殺明年屈氂復坐祝詛腰斬妻子梟首續漢書曰張濟為河南令中常侍段圭奴乘犢車于道濟即收捕梟首懸尸圭門也後魏書曰宋鴻貴為定州平北府參軍送戍兵於荊州坐取兵絹四百匹兵欲告之乃斬兵十人又踈凡不達律令見律有梟首之非乃生斷兵手以水洗然後斬決尋坐伏法時人哀兵之苦嘆鴻貴之愚也廷尉決事曰河內太守上民張太有狂病病發殺母弟應梟首遇赦議不當除之梟首如故棄市禮曰刑人於市與衆棄之史記秦皇平六國制天下藏詩書及偶語棄市漢書曰中元二年改磔曰棄市應劭曰先諸死刑皆死之市令改曰棄市自非妖道不復磔也又曰竇嬰矯先帝詔當棄市嬰陽病痱不食欲死或聞上無意殺嬰復食治病晉書曰范堅遷尚書右丞時廷尉奏殿中吏劭廣盜官慢二張合布三十匹有司正刑棄市廣二子宗年十三雲年十一操黃幡撾登聞鼓乞恩辭求自沒為奚官奴以贖父命尚書朱映議以為天下之人無子者少事遂行便成永制堅亦同映議又曰咸和二年句容令孔恢罪棄市詔曰恢自陷刑網罪當大辟但以其父年老而有一子以為惻然可特原之隋書曰文帝意每尚慘急奸回不止京市白日公行掣盜人間強盜亦往往而有帝患之問群臣斷禁之法楊素等未及言帝曰朕知之矣詔有人能糾告者沒賊家産業以賞糾人時月之間內外寧息其後無賴之徒候富人子弟出路者而故遺物於其前偶拾取則擒以送官而取其賞大柢被陷者甚衆帝知乃命盜一錢已上皆棄市行旅皆晏起早宿天下懍懍焉考竟釋名曰獄死曰考竟考竟者考得其情竟其命於獄也後漢書曰陽嘉三年春詔以久旱京師諸獄無輕重皆且勿考竟須得澍雨又曰丹陽方儲明風角為洛陽令功曹是竇憲客客為憲所諷夜殺人斷頭著奩中置廄門下欲令儲去官儲摩死者耳邊問誰所殺有頃曰死人言為功曹所殺收功曹考竟又曰向相字甫興性卓詭不倫狀如學道又似狂生張角起相不欲國家興兵但遣將河上北向讀孝經賊自滅張讓讒相與角同心收送黃門北寺獄考竟之又曰董卓被誅蔡雍在司徒王允坐殊不意言之而歎有動於色允勃然叱之曰董卓國之大賊幾傾漢室君為王臣所宜同忿而懷其私遇以忘大節今天誅有罪而反相傷痛豈不與為逆哉即收付廷尉考竟其罪雍陳辭謝乞黔首刖足繼成漢史士大夫多矜救之不能得太尉馬日磾馳往謂允曰伯喈曠世逸才多識漢事當續成史為一代典且忠孝素著而所坐無名之誅無乃失名望乎允曰昔武帝不殺司馬遷使作謗書流於後世方今國祚中衰不可令佞臣執筆在幼主左右既無益聖德復使吾黨蒙其訕議曰磾退而告人曰王公其不長世乎善人國之紀制作國之典滅紀廢典其能久乎雍遂死獄中晉書曰王豹上書勸齊王與成都王頴如分陝之利會長沙王乂至於案上見豹箋謂冏曰小子離間骨肉何不銅駝下打殺既不能嘉豹之策遂納乂言乃奏為臣不忠不順不義輒都街考竟以明邪正豹將死曰懸吾頭大司馬門見兵之攻齊也衆庶冤之俄而敗三國典略曰齊兗州剌史武城縣公崔陵恃預舊恩頗自矜縱寵妾馮氏假其威刑恣情取納風政不立為御史所劾召收繫廷尉考竟遂死獄中
