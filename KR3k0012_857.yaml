body:
  text: 飲食部十四茹史記曰公儀休食茹而美拔其園葵後漢書曰孔奮為姑臧長時每居縣者不盈數月輒致豐積奮在職四年財産無所增事母孝謹雖自儉約而奉養極求珍膳躬率妻子同甘菜茹沈約宋書曰文帝為王玄謨作四時茹詩云堇茹供春膳粟飧充夏餐傳玄詩曰廚人進藿茹有酒不盈柸枚乘七發曰白露之茹菹周禮曰朝事之豆其實韭菹昌本菁菹茆菹昌本昌蒲祖也切之四寸為之菁菹韭菹鄭大夫讀茆為茅或曰茆水草杜子春讀茆為卯玄謂菁蔓菁也茆鳧葵也饋食之豆其實葵菹加豆之實芹菹深蒲菭菹筍菹芹楚葵也鄭司農云深蒲弱入水深故曰深蒲或曰深蒲桑耳菭水中魚衣也玄謂深蒲蒲始生水中子也菭箭葫荀竹萌王舉則共七葅韭菁茆葵芹菭筍菹凡醯醢所和細切為齏今物若䐑為菹齏菹之稱菜肉通稱矣記曰麋鹿為菹野豕為軒皆聶而不切麕為辟雞菟為宛脾皆聶而切之切葱若薤實之醯以柔之此軒辟雞宛脾皆菹類也其作之狀以醢與薰菜淹之殺肉及醒氣也又曰水草之菹陸産之醯小物備矣三牲之俎八簋之實美物備矣昆蟲之異草木之實陰陽之物備矣水草之菹芹茆屬陸産之醯蚳蝝之屬天子之祭八簋昆蟲謂溫生寒死之蟲也內則可食之物有蜩范草木之實菱茨榛栗之屬傳曰王使周公閲來聘饗有昌歜昌菹毛詩曰中田有廬疆場有瓜是剝是菹剝瓜為菹也箋云中田土也農人作廬焉以便其田事於畔上種瓜瓜成又入其稅天子剝削淹漬以為菹貴四時之異物毛詩義疏曰蒲周禮以為菹謂蒲始生取其中心入地蒻大如指白生噉之甘脆又煮以苦酒受之如食筍法大美今吳人以為菹廣雅曰齏墜䖆䔯菹也墜大內切䔯口故切蒼頡解詁曰䔯酢菹也說文曰菹菜酢也蘫瓜菹也蘫力甘切釋名曰菹阻也生釀之遂使阻於寒溫之間不得爛也呂氏春秋曰文王好菹孔子聞之蹙頞而食之三年然後美之賈誼新書曰楚惠王食寒菹而得蛭因遂吞之腹有病而不能食之令尹入問曰王安得此疾王曰我食寒菹而得蛭念譴之而不得其罪乎是法廢而威不立非所以使國聞也譴而行其誅乎則庖宰監者皆當死心又弗忍也故吾恐蛭之見也因遂吞之令尹避席再拜而賀曰臣聞天道無親唯德是輔王有仁德天之所奉也是昔也惠王之後而蛭出其夕病心腹之積皆愈晉書曰吳隱之年十餘歲丁父母憂食鹹菹以其味甘掇而棄之盧諶祭法曰秋祠有菹消食經有此法也范汪祠制曰孟冬不鹹菹甕釋名曰生𤅢葱薤曰甕言柔滑兌兌然也
