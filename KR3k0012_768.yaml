body:
  text: 雜物部二板葛洪神仙傳曰王遠字太平東海人也博學六經尤明天文圖讖河洛之要逆知天人盛衰之期九州吉凶漢桓帝聞之連徵不出使郡國逼載以詣京師低頭閉口不肯答乃題宮門扇板四百餘字皆説方來帝甚怒之使人削之外字去內字復見黑皆徹入板裏續搜神記曰聶支豫章新滏古暗切人少時貧常夜照見一白鹿射中之明尋蹤血既盡不知所在且已飢極便臥一梓樹下仰見箭著樹枝視之乃是昨射箭怪其如此於是還家齎糧命子姪持斧以伐之樹微有血遂裁截為板二板牽著破塘中板常沉地然時復浮出輒家有吉慶每欲致賓客輒便此板於中流欲沒客大懼聶君呵之還復浮出仕宦大如意位至丹陽太守在郡經時外司白云濤入石頭聶然聶君以板破中板來耳視之果然聶君以板來必有意即解職歸家下船便閉戶二板挾兩邊一日至豫章自爾之後板出便反有凶禍家大轗軻幽明録曰義熙中江乘聶湖忽有一板廣數尺長二丈餘恆停在此川溪採菱及捕魚者資此以自濟後有數人共乘板入湖試以刀斫即有血出板仍沒數人溺死瓦古史考曰夏世昆吾氏作屋瓦禮曰慕賢而容衆毀方而瓦合去己之大圭角下與衆人小合也史記曰秦攻韓軍於武安西秦軍鼓噪勒兵武安屋瓦盡震漢書曰霍禹弟卷端人見禹居堂屋上撤瓦投地就視亡有大怪之舉家憂愁未幾被誅續漢書曰董卓作亂燒南北宮雒陽城無隻瓦尺木吳時外國傳曰大秦國以水精為瓦晉起居注曰成都王討長沙王使陸機都督三十七萬衆圍洛陽四匝夜鼓譟京師屋瓦皆裂晉中興書曰泰寧元年五月大回風吹劉曜太廟瓦垣外數十步其欒梁拱捂無離者瓦亦不毀曜素服五月繕治之淮南子曰以磁石之能連鐵也而求其引瓦則難矣漢武故事曰武帝起神明殿砌以文石用布為瓦而淳漆其外四門並如之語林曰晉張載字孟陽甚醜每出為小兒擲瓦盈車葛洪神仙傳曰孫博者河東人也有藏人亡奴在軍中者因以求之不得博語奴主曰吾為卿燒其營舍奴出走卿但諦伺取之於是博以一赤瓦擲之須臾火起張天奴果出走而得之博乃以青瓦擲之火即滅屋舍百物向已燋燃者悉復如故靈鬼志曰有士人姓鄒唑齋中忽有一人通刺詣之題刺云舒甄仲既去疑其非人尋其刺曰吾知之矣是子舍西土瓦中人耳便往令人將鏵掘之果於瓦器中得桐人長尺餘管子曰棟橈不勝任則屋覆而人不怨者其理然也弱子慈母之所愛也不以其理而下瓦則慈母笞之故其理動者雖覆屋不為怨不以其理動者下瓦必笞莊子曰師曠為晉平公作清角一奏有雲從西北起再奏大雨大風隨之裂帷幕破俎豆墮廊瓦平公懼伏于室內抱朴子曰土柈瓦胾不可救飢甎爾雅曰瓴謂之甓甎也今江東呼甓甓音蒲歷切古史考曰烏曹氏作甎魏略曰扈纍獨居道側以㼾甎為障施一廚床食宿其中晉書曰吳興吳陸經痑癘死者十三在青唯逵夫妻家貧冬無被袴晝傭賃夜還燒甎伐木期年中成七墓葬十二喪宋書曰范曄字蔚宗母如廁産之額為磚所傷故以磚為小字鄭緝之東陽記曰獨公冢在縣東八十里有冢臨溪其甎文曰筮言吉龜言凶三百年墮水中義熙中冢猶半在自後稍已崩盡續搜神記曰順陽范啓母喪當葬前母墓在順陽往迎之既至而墳壟沓難可識別不知何許袁彥仁時為豫州往看之因云間有一人見鬼范即如言令物色覔之云此墓中一人衣服顏狀如之即開墓棺物皆爛冢中灰壤深尺餘意甚疑試令人以足撥灰中土冀得舊物果得一甎銘云順陽范堅之妻然後信之述異記曰豫章胡茲家在郡治宋泰始四年空中忽有故冢墓甎青笞石灰著之礚然擲其母前其數或五三俱至舉家驚懼然終不中人旬日乃止語林曰陶太尉既作廣州優遊無事常朝自運甓甎也於齋外暮運於齋內人問之陶曰吾方致力中原恐為爾優遊不復堪事塹東觀漢記曰周紆字文通為渤海太守坐事免家貧身築塹以自給食芻茭書曰峙乃芻茭亡敢弗多詩曰生芻一束其人如玉禮曰以足蹙路馬芻有誅聲類曰茭乾芻也老子曰天地不仁以萬物為芻狗聖人不仁以百姓為芻狗趙一嫉邪賦曰勢家多所宜咳唾自成珠被褐懷金玉蘭蕙化為芻堊禮曰在堊室之中不與唑焉山海經曰慈聾之山其中有大谷是多白墨青堊謂有雜色之堊太公六韜曰昔帝堯王天下上世謂賢君其治則宮恆室屋不堊也莊子曰郢人堊漫其鼻端若蠅翼使匠石斫之運斤成風盡堊而鼻不傷郢人立而不失容竿詩曰籊籊竹竿以釣于淇籊籊長而殺也説文曰竿竹挺也漢書曰斬木為兵揭竿為旗揭音竭負也續漢書曰高鳳字文通南陽人妻將之田曝麥於庭令鳳護雞忽然天暴風大雨鳳持竿誦經不覺潦水流麥妻還怪問鳳方悟博物志曰詹何以獨繭之絲為綸芒針為鉤荊篠息了切為竿剖粒為餌引盈車之魚於百仞之淵莊子曰楚王聘莊周於濮水之上莊子持竿不顧鉤史記曰桀有功能伸鉤索鐵搜神記曰京兆長安有張氏晝獨處室有鳩自外入止前床張氏惡之披懷而祝曰鳩爾來為我禍耶飛上承塵為我福耶來入我懷鳩翻入懷以手探之則不知鳩之所在而得一金鉤焉遂寶之自是之後子孫昌盛資財萬倍蜀賈客至長安中聞之乃厚賂內婢婢竊鉤以與客張氏既失鉤漸貧死喪而蜀客亦數罹窮厄不為己利或告之天命也不可以力求於是齎鉤以返張氏張氏復昌故關西稱張氏鉤風俗通曰順帝時京師謠曰直如弦死道邊曲如鉤乃封侯張衡賦曰仰飛纖繳俯鉤長流觸矢而斃貪餌吞釣釘魏略曰晉宣王討王陵陵自知罪重試索棺釘以觀太傅意太傅給之陵夜呼掾屬與訣曰行年八十身名並滅遂自殺盛弘之荊州記曰冠軍縣東有魏征南司馬張詹墓元嘉初尚儼然六年民飢始被發金銀朱漆之器爛然有二朱漆棺棺前垂竹薄簾以金釘釘之楊龍驤洛陽記曰石牛一頭在城西北九重里耆舊傳説者云石虎當襄國石牛夜喚聲三十里事奏虎虎遣人打落牛兩耳及尾以鐵釘釘四腳今見存抱朴子曰吳有趙炳以大釘釘柱入尺許以氣刀吹之即釘躍出如弩箭之發鐷廣雅曰鏶音集謂之鐷弋涉切説文曰鏶鐷也礪詩曰周道如砥書曰楊州厥貢礪砥砥細於礪皆磨石也又曰若金用汝作礪史記曰封爵之誓曰黃河如帶太山如礪言河山如帶礪國乃絶耳蔡雍觀學曰木以繩直金以淬剛必須砥礪就其鋒鋩魏志曰殺幽州牧劉虞有童謠曰燕南垂趙北際中央不合如礪唯有此中可避世公孫瓚以己當之乃築京固守積三萬斛廣志曰礪石出首陽山有紫白彩色出南昌者最善今武庫有數枚治御刀山海經曰高梁之山多砥礪尸子曰鐵使干越之工鑄之以為劍而勿加砥礪則以刺不入擊不斷磨之以礱礪加之以黃砥則刺也無前擊也無下自是觀之礪之與弗礪其相去遠矣今人皆礪其劍而弗知礪其身夫學身之砥礪也
