body:
  text: 職官部五十三刺史下隋書曰楊尚希素有足疾上謂之曰蒲州出美酒足堪養病屈公臥治之於是出拜蒲州刺史又曰高勵拜楚州刺史吏民安之先是城北有伍子胥廟其俗敬鬼祈禱者必以牛酒至破産業勵歎曰子胥賢者豈宜損百姓乃告諭所部自此遂止百姓賴之又曰張威以罪免後從上祠泰山至洛陽上謂威曰自朕之有天下每委公以重鎮可謂推赤心矣何乃不修名行唯利是視豈直孤負朕心亦且纍卿名德因問威曰公所執笏今安在威頓首曰臣負罪虧失無顏復執謹藏於家上曰可持來威明日奉笏以見上曰雖不遵法度功效實多朕不忘之今還公笏於是復拜洛州刺史又曰梁彥光拜趙州刺史彥光言於上曰臣前待罪相州百姓呼為戴帽𩛿臣自分廢黜無復衣冠之望不謂天恩復垂收採請復為相州改弦易調庶有以變其風俗上答隆恩上從之復為相州刺史豪猾者聞彥光自請而來莫不嗤笑彥光下車發擲奸隱有若神明於是狡猾之徒莫不潛竄合境大駭唐書曰天授二年正月天后內出繡袍賜新除都督刺史其袍皆刺繡作山形繞山勒回文銘曰德政惟明職令思平清信忠勤勞進躬親自此每新除都督刺史必以袍賜之又曰李擇言開元中為漢褒相岐四州刺史安德郡公所歷皆以嚴幹聞其在漢州張嘉貞為益州長史判都督事性簡貴待管內刺史禮隔而引擇言同搨坐談正理時人榮之又曰袁光庭者河西戌將天寶末為伊州刺史祿山之亂西北邊戍兵入赴難關隴郡邑皆為吐藩所拔唯光廷守伊州纍年外救不至虜百端誘說終不屈部下如一及矢石既盡糧儲並竭城將陷沒光廷手殺其妻子自焚而死朝廷聞之贈工部尚書又曰曹王皋上書言理道拜為衡州刺史坐小法貶潮州刺史楊炎作相復以皋為衡州刺史初皋為御史覆訊懼貽太妃憂出則素服入則公服言貌如平常太妃不之知也及為潮州詭詞謂遷官至是復為衡州方具以事白太妃因泣下具言非疾不敢有聞其沉密重慎如此又曰貞元初德宗以奉先縣令鄭珣瑜為饒州刺史昭應縣令韋武為遂州刺史華原縣令崔琮為汝州刺史藍田縣令韋貞伯為舒州刺史盩厔令李曾為郢州刺史録善政也各賜馬一匹并綵物衣服以遣之又曰元和十四年十月上欲以潮州刺史韓愈為袁州刺史愈至潮州獻上表上對宰臣曰昨日韓愈表因思當時所論佛骨大是愛我我豈不知然為人臣不當言人主事佛乃年促也我以是惡之是時上深欲擢用愈候宰臣啓之耳皇甫鏄素嫉愈乃曰終是狂踈且與移一郡故有是命又曰劉禹錫移授播州刺史御史中丞裴度奏禹錫母年八十今播州乃猿狖所居人跡罕至禹錫誠合得罪然其老母必至不得行則須與子為死別傷陛下孝理之風伏請屈法稍移近處使得終養上曰夫為人子每事尤須修謹常恐貽親之憂今禹錫所坐更合重於他人豈可以此論度不能對上曰我所言是責人子之事然終不能傷其所親之心明日改授禹錫為連州刺史又曰崔珙大和七年正月拜廣州刺史兼嶺南節度使延英中謝帝問以撫理南海之宜珙奉對明辨帝深嘉之時高瑀鎮徐州承智興之後軍驕難制軍士數犯法上欲擇威望之帥以臨之久難其才會珙言事慷慨謂宰臣曰崔珙言事神氣精爽此可以臨徐人即以王茂先代珙鎮廣南授珙檢校工部尚書徐州刺史又曰張賈出守衢州辭日文宗謂賈曰聞卿大善長行賈知上不喜博遂自解說乃曰臣公事之餘聊與賓客為戲非有所妨也上曰豈謂好之而不妨事耶自後刺史面辭日上必殷勤戒飭曰無嗜博無飲酒又曰渾鐬瑊之子開成初年相擬壽州刺史文宗曰鐬勳臣子弟豈可以委牧民仲尼有言不如多與之邑今我念其先人之功與之致富可也宰臣曰鐬常歷名郡有政能乃從之又曰開成二年幽州節度使史元忠奏當管八州准門下牒追刺史古魚各一隻臣勘自天寶末年頻有兵戈並多失墜伏乞各賜新銅魚可之又曰李皓授汝州刺史為政嚴簡州境肅然與兄升弟暈尤相篤睦升等每月自東都省皓往來微行州人不之覺其清慎如此又曰孔若思為衡州刺史先是諸州別駕皆以宗室為之不為刺史致敬由是多行不法若思至州舉奏別駕李道欽罪犯請加鞠訊乃詔別駕於刺史致禮自若思始也又曰蕭復纍遷同州刺史時州人阻饑有京畿觀察使儲廩在境內復輒以賙貧人為有司所劾詔下削階受代親友唁之復怡然曰茍利於人敢憚薄責又曰趙昌除華州刺史辭於麟德殿時年八十有餘趨拜輕捷占對詳明上退而歎異宣令宰臣密訪其頤養之道以奏焉又曰咸通中衛洙奏狀稱蒙恩除授滑州刺史官號中一宇而臣家諱音同雖文字有殊而聲韻難別請改授間官者勑曰嫌名不諱著在禮文成命已行固難依允五代史後唐書曰李嗣肱克修之子也少有膽略時朱溫將賀德倫急攻蓨縣朱溫率師五萬合勢營於蓨之西嗣肱自下博率騎三百薄晚與賊之樵芻者相雜日既晡入朱溫營門諸騎相合大譟弓矢星發虓闞馳突汴人不知所為營中大擾既暝斂騎而退是夜朱溫燒營而遁解蓨縣之圍以功特授蔚州刺史又曰莊宗以教坊使陳俊為景州刺史內園栽接使儲德源為憲州刺史伶人剖符非制也上初平汴州陳俊德源皆為樂官周匝所薦上許之典郡郭崇韜以為不可遂寢伶官言之者衆上密召崇韜謂之曰豫已許陳俊一郡今經年未行卿雖以正言匡諫我每慚見二人卿當屈意行之故有斯命又曰前洋州節度副使程乂徽陳利見請於瀛莫兩州界起置營田以備邊因授乂徽莫州刺史充兩州營田使五代史梁書開平四年九月詔曰魏博管內刺史比來州務並委督郵遂使曹官擅其威權州牧同於間冗俾循通制宜塞異端並河南諸州例刺史得以專達時議者曰唐朝憲宗烏重裔為滄州節度使嘗稱河朔六十年能抗拒朝命者以奪刺史權與縣令職而自作威福耳若二千石各得其柄又有鎮兵雖安史挾奸豈能據一墉而叛哉遂奏以所管德棣景三州各還刺史職分州兵並隸收管是後雖幽鎮魏三道以河北舊風自相傳襲唯滄州一道獨稟命受代自重裔制置使然也則梁氏之更張正合其事矣五代史曰晉少帝開運中沈斌為祁州刺史契丹自恆州驅牛羊過城下斌乃出州兵擊之為契丹精騎剗門邀擊之州兵陷賊趙延壽知其無兵遂與蕃賊急攻之仍呼謂斌曰沈使君我故人也擇禍莫若輕早以城降無自辱也斌登城呼而報曰侍中父子誤計陷於腥膻忍以大羊殘害父母之邦不自羞慚反有德色沈斌弓折箭盡寧為國家死耳不俲公所為也翌日城陷斌自殺三輔決録曰韋康代父為涼州刺史父出止傳舍康入官宇時人榮之桓石秀別傳曰石秀為竟陵太守遷江州刺史非其志也治稱不煩在州郡弋釣山澤縱心游覽而已善馳射望之若畫桓氏家傳云範為兗州刺史表謝曰喜於復見選擢慚於不堪所職悲於戀慕闕廷三者交集不知所裁黃泰交廣記曰秦兼天下改州牧為刺史朱明之時則出巡行封部玄英之月則還詣天府表奏刺史言其刺舉不法史者使也異苑曰晉陵韋朗家在延陵元嘉初忽見庭前井中有人長尺餘所被帶組甲麾伍相應相隨出門良久乃盡朗兄藪頗善占筮常云吾子弟當至刺史朗歷清廣二州郭子曰王丞相治楊州廨舍案行而言我正為次道理此耳何次道少為王公所知重故有此歎
