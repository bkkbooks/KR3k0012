body:
  text: 禮儀部十八宴會毛詩曰鹿鳴宴群臣嘉賓也又曰鹿鳴棠棣曰宴兄弟也又嘉魚曰湛露天子宴諸侯也又伐木曰伐木宴朋友故舊也自天子至於庶人未有不須友以成者也親親以睦友賢不棄不遺故舊則民德歸厚矣周禮春官上大宗伯掌饗宴之禮親四方之賓客禮記曰諸侯宴禮之義俎豆牲體薦羞皆有等差所以明貴賤也左傳文上曰魯文公四年衛寧武子來聘公與之宴為賦湛露及彤弓不辭又不答賦使行人私問對曰臣以為肄業及之也昔諸侯朝正於王王宴之於是乎賦湛露則天子當陽諸侯用命也若諸侯敵王所愾而獻其功王於是乎賜之彤弓一彤矢百玈弓十玈矢千以覺報宴今陪臣來繼舊好君辱貺之豈敢于大禮以自取戾又宣公曰晉侯飲趙盾酒伏甲將攻之其右提彌明知之趍登曰臣侍君宴過三爵非禮也又成公曰衛侯饗苦成叔寧武子相苦成叔傲寧子曰苦成家其亡乎古之為饗食也以觀威儀省禍福也今夫子傲取禍之道也又昭二曰楚靈王享昭公於新臺好以大屈宴好好賜也大屈弓名也既而悔之又昭公曰穆有塗山之會周穆王會諸侯於塗山在壽春東北漢書曰高祖擊英布還過沛置酒悉召故人父老發沛中兒百二十人教之歌酒酣上自擊築曰大風起兮雲飛揚威加四內兮歸故鄉安得猛士兮守四方自起舞慷慨傷懷泣下數行謂父老曰遊子悲故鄉吾雖都關中萬歲後吾魂魄猶樂思沛也與沛父老諸母樂飲道舊故為笑晉書禮志曰漢建安中將正會而太史上言正旦當日蝕朝士疑會否共咨尚書令荀彧時廣平計吏劉邵在彧坐曰梓慎禆竈古之良史猶占水火錯失天時諸侯旅見天子入門不得終禮者五日蝕在一然則聖人垂制不為變異豫廢朝禮或者災消異伏或推術謬誤也彧及衆人咸善而從之遂朝會如舊亦不蝕魏書曰文帝為魏王南征次譙大饗六軍及譙父老自娛樂伎列百戲魏志曰黃初元年郭淮奉使賀文帝踐祚而道路疾病故計遠近為稽留及群臣在會帝正色責之曰昔禹會諸侯塗山防風後至便行大戮今溥天同慶而最遲留何也對曰臣聞五帝先教導民以德夏后政衰始用刑辟今臣遭唐虞之世是以免於防風之誅帝悅之晉書禮志曰漢儀有正會禮正旦夜漏未盡七刻鐘鳴受賀公侯以下執贄來庭二千石以上升殿稱萬歲然後作樂宴饗魏武帝都鄴正會文昌殿用漢儀又設百華燈晉氏受命武帝更定元會儀咸寧注是也晉起居注曰太常張華上書按舊事拜公建始殿因以小會蓋所以崇宰輔也宋書禮志曰正旦元會設白虎樽於殿庭樽蓋上施白虎若有能獻直言則發此樽飲酒東宮舊事曰正會儀太子著遠遊冠絳紗袍登輿至丞華門前設位拜二傅二傅交拜禮畢不復登車太傅訓道在前少傅訓順在後太子入崇賢門樂作太子登殿西向坐世説曰孝武在西堂會伏韜預坐還下車使呼其兒語之曰天子百人高會臨會未得他語先問伏韜何在在不此故未易為人作父如此何如摯虞決疑要注曰宴之與會威儀不同也會則隨五時朝服庭設金石懸虎賁著旄頭文衣鶡尾以列陛宴則服常服設絲竹之樂唯宿衛者列伏大會於太極殿小會於東堂世説曰過江諸人每至暇日相要出新亭藉卉飲宴周侯中坐而歎曰風景不殊舉目有江河之異皆流淚唯丞相愀然作色曰當共勠力王室剋復神州何至作楚因相對而泣也傅玄元會賦曰考夏后之遺訓綜殷周之典藝採秦漢之舊儀定元正之嘉會潘嶽間居賦曰席長筳列孫子柳垂陰車結軌陸樀紫房水佳頳鯉或宴于林或禊於汜昆弟班白兒童稚齒稱萬壽以獻觴咸一懼而一喜壽觴舉慈顏和浮水樂飲絲竹駢羅頓足起舞柷音高歌人生安樂熟知其他古詩曰今日良宴會歡樂難具陳彈箏奮逸饗新聲妙人神古豔詩曰今日樂上樂相從天公出美酒河伯出鯉魚青龍前鋪席白虎持榼壺南斗工鼓琴北斗吹笙竿曹植侍太子坐詩曰白日耀青天微雨靜飛塵寒水辟炎暑涼風飄我身清醴盈金觴肴饌縱撗陳齊人進奇樂歌者出西秦翩翩我公子機巧忽若神曹植與丁廙詩曰嘉賓填城闕豐膳出中廚吾與二三子曲宴此城隅秦箏發西氣齊瑟楊東嘔肴來不虛歸觴至反無餘陸機皇太子請宴詩序曰感聖恩之罔極退而賦此詩也上壽毛詩大雅江漢曰虎拜稽首天子萬年虎拜稽首對楊王休作召公考天子萬壽左傳哀公宴於五梧武伯為祝祝上壽酒也漢書曰高祖與項羽鴻門會項莊入為壽進爵於尊者獻無疆之壽也史記曰武帝王太后在民間時所生一女者父為金王孫王已死韓王孫名媯乘間而言曰太后有女在長陵武帝曰何不早言武帝乃自往迎取乘輿至金氏門外使騎圍其宅女亡匿內中床下扶持出詔副車載之馳還入長樂宮太后曰帝何從來帝曰今者至長陵得臣姊與俱來帝奉酒前為壽賜錢千萬奴婢三百人公田百頃甲第以奉姊太后謝曰為帝費漢書衛青傳曰時王夫人方幸於上寧乘説青曰今王夫人幸而宗族未富貴願將軍奉所賜千金為夫人親壽青以五百金為壽上聞問青以實對上乃拜寧乘為東海都尉又曰倪寬為御史大夫從東封泰山登明堂寬奉觴再拜上千萬歲壽制曰敬舉君之觴又曰隆慮公主子昭平君尚帝女夷安公主隆慮主病困以金千斤錢十萬為昭平君豫贖死罪上許之隆慮王卒昭平君日驕醉殺主傅繫獄廷尉上請上良久曰法令者先帝所造也因弟故而誣先帝之法吾何面目入高廟乎又下負萬民乃奏其可哀不能自止左右盡悲東方朔前上壽曰臣聞聖王為政賞不避仇讎誅不擇骨肉書曰不偏不黨王道蕩蕩此二者五帝所重三王所難也陛下行之是以四海之內元元之民各得其所天下幸甚臣朔奉觴昧死再拜上萬歲壽上乃起入省中久時召讓朔免冠頓首曰臣聞樂大甚則陽溢哀大甚則陰頓陽變則心氣動心氣動則精神散而邪氣入銷憂者莫若酒臣朔以上壽者明陛下正而不阿思以止哀也後漢書班超傳曰臣超區區特蒙神靈竊冀未便僵仆目見西域平定陛下舉萬年之觴薦勳祖廟布大喜於天下東觀漢記曰吳良濟郡人為郡議曹掾正旦史入賀太守門下掾王望前言曰齊郡敗亂遭離盜賊人民飢餓不聞雞鳴狗吠之音明府視事五年五穀豐熟家給人足今日歲首請上雅壽掾史皆稱萬歲良跪曰門下掾侒諂明府勿受其觴盜賊未盡人民困乏良曹掾尚無褲望曰議曹憜寙自無褲寧足不為家給人足耶太守曰此生言是也遂不舉觴賜鰒魚百枚署功曹後漢書曰竇后定策立靈帝帝以太后有授立之功率群臣朝于南朝親饋上壽也魏書曰文帝為魏王南征次譙大饗六軍及譙父老設伎樂百戲令曰先王云樂其所自生禮不忘其本譙霸王之邦真人本土其復譙租稅二年三老上壽日久而罷晉書禮志曰元正上壽謁者引王詣樽酌壽酒跪授侍中侍中跪置卿座前王還王自酌置位前謁者跪奏藩王臣某等奉觴再拜上千萬歲四箱樂作百官再拜已飲又再拜唐書曰元和十四年齊魯初平宴文武百寮裴度舉觴獻壽跪而言曰陛下德配天地明並日月神武獨斷寇逆削平錫宴群臣當茲令節臣備位台司幸逢昌運願與四海九州之人同上千萬歲壽上執酒為飲之管子曰桓公管仲鮑叔牙寧戚四人飲飲酣桓公謂鮑叔牙曰盍不起為寡人壽乎鮑叔牙奉杯而起曰使公母忘出在莒時也使管子母忘束縛在於魯也使寧戚母忘其飯牛車下也桓公避席再拜曰寡人與二大夫能毋忘夫子之言則齊國之社稷不危也燕丹子曰太子置酒請荊軻酒酣太子起為壽贄尚書曰五玉三帛二牲一死贄三帛諸侯世子執緟公之孤執玄附庸之君執黃二生卿執羔大夫執鴈一死士執雉玉帛生死所為以贄以見之儀禮曰士相見之禮摯冬用雉夏用腒下大夫相見以鴈飾之以布維之以索如執雉上大夫相見以羔飾之以布四維之結于面左頭如麛執之如士相見之禮周禮春官上大宗伯曰以玉作六瑞以等邦國王執鎮圭公執桓圭侯執信圭伯執躬圭子執穀璧男執蒱璧鄭玄注曰鎮安也以四鎮之山為琢飾長一尺二寸公二王後及王之上公雙植謂之桓桓宮室之象所以安其上也信當為身身圭躬圭蓋皆象人形為琢飾家長七寸穀所以養人蒱為席所以安人二王或以穀為飾或以蒱為琢飾璧皆徑五寸不執圭者未成國也以禽作六摯以等諸臣執之言致也所執以自致孤執皮帛卿執羔大夫執鴈士執雉庶人執鶩工商執雞皮帛束帛也表以皮為之虎豹皮也帛如璧色繒也羔小羊取其群而不失其類也鴈取其候時而行雉取其守介而死不失其節鶩取其節鶩取其不飛遷雞取其守時而動禮記曲禮下曰凡贄天子鬯諸侯圭卿羔大夫鴈士雉庶人之贄匹童子委贄而退贄之言至也天子無客禮以鬯為贄者所以唯用告神為至也童子委贄而退不與成人為禮也説者以匹為鶩也野外軍中無贄以纓拾矢可也非為禮之處用時物而已纓馬縏纓也拾謂射韝婦人之贄梖榛脯修棗栗春秋莊公曰哀薑至公使宗婦覿用幣非禮也御孫曰男贄大者玉帛公侯伯子男執玉諸侯世子附庸孤執帛小者禽鳥卿執羔大夫執鴈七執雉以章物也章所執之物別貴賤女贄不過榛栗棗修以告虔也榛小栗修脯虔敬也皆取其名以示敬又定公下曰公會晉師于耳范獻子執羔趙簡子中行文子皆執鴈魯於是乎始尚羔禮卿執羔大夫執鴈魯則同之今始知執羔之尊也穀梁傳莊公曰大夫宗婦覿用幣宗婦同宗大夫之婦覿見也禮大夫不見夫人不言及不正其行婦道故列數之也男子之一贄羔鴈雉腒贄所以至者也上大夫用羔取其從群帥而不黨也下大夫用鴈取其知時飛翔有行列也士冬用雉夏用腒取其耿介交有時別有倫也腒臘也雉必用死為其不可生膳也夏用腒備腐臭也婦人之贄棗栗腵修棗取其早自矜莊栗取其敬栗腵修取斷斷自修整用幣非禮也用者不宜用者也大夫國體也國體謂為君股肱而行婦道惡之故謹而日之也公羊傳莊公曰戊寅大夫宗婦覿用幣宗婦者何大夫之妻也覿者何見也用者何用者不宜用也不宜用幣為贄也見用幣非禮也以文在覿下不使齎見知非禮也然則曷用棗栗云暇修云乎禮記外傳曰王者朝臣諸侯之朝臣非南面之尊地不成國德不比玉故不執玉孤卿執皮帛虎豹之皮與束帛天子之孤卿少師少傅少保卿執羔天子六卿即諸侯之上大夫羔取其不亂群大夫執鴈鴈飛有行列士執雉雉性剛有死節夏執乾雉餘三時皆執死雉工商執雞雞司而鳴庶人執鶩鶩家鳴不遠飛庶人不出鄉諸侯太子非天子所命者有列會之事則執皮帛繼子男之下婦人初見舅姑執榛栗棗修脯棗進於姑榛栗進於舅也執贄幣相見相敬也白虎通曰臣見君有贄者何贄者質己之誠王者緣臣子心以為之制差有尊卑以副其意也公侯以玉為質玉者取其燥不輕濕不重明公侯之德全也卿以羔為贄羔者取其群而不黨卿職在盡忠率下不黨大夫以鴈為贄者取其飛成行列大夫職在奉命適四方動作當能自正以事君也士雉為贄者雉取不可誘之以食脅之以威必死不可畜士行耿介守節也又曰公執玉取其暢達也卿執羔取其跪乳有禮也書曰五玉三帛二牲一死贄又曰至正月朔日乃執贄而朝賀正月何歲竟氣改興新長相保重本正始也群臣贄賀其君父之五經異義曰謹按周禮説五玉贄自孤卿以下執禽尊卑有差也禮不下庶人工商又無朝儀五經無朝義五經無説庶人工商有贄穆天子傳曰天子賓于西王母乃執白圭玄璧以見西王母執贄致敬獻錦組百純説苑曰鶩無他心故庶人以為贄也
