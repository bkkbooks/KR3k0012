body:
  text: 服用部十簟説文曰簟竹席也釋名曰簟簟也布之簟然正平禮曰莞簟之安藁秸之談又曰父母舅姑之簟席枕几不傳詩曰下莞上簟乃安斯寢莞蒲曰席蒲竹葦曰簟方言曰簟宋魏之間謂之笙或謂之蘧曲自關而東謂之簟其粗者謂之蘧蒢行唐以蘧蒢直文而粗也自關而東周楚魏之間謂之倚佯音陽自關而西謂之行唐東觀漢記曰殤帝詔省荏弱平簟又曰馬稜為會稽太守詔詰會稽車牛不務堅強車皆以桃枝細簟又曰尚書令王允奏曰太史令王立説孝經六隱事能消卻姦邪常以良月允與立入為獻帝誦孝經一章以杖二竹簟畫九宮其上隨日時入焉及允被害乃不復行也晉書曰王恭字孝伯與王忱齊名友善恭有六尺簟枕見之謂其有餘因求之恭輟以送遂坐薦上忱聞而大驚恭曰吾平生無長物王隱晉書曰車永為廣州剌史永子溢使工作象牙細簟工患之晉公卿禮秩曰太宰何曾遜位賜簟褥一具蕭子顯齊書曰林邑王永明九年遣使貢獻金簟等物孫卿子曰輕暖平簟而體不知其安淮南子曰席之上先雚簟尊之上先玄酒王貴之先本而後末也東宮舊事曰太子納妃有赤花雙文簟西京雜記曰武帝以象牙為簟賜李大夫又曰會稽獻竹簟供御世號為流黃簟諸葛亮轉教曰計一歲運用蓬旅簟十萬具庾翼與王書曰今致八尺丈二細桃枝簟十枚黃薎雙文簟二領黃薎獨坐雙文簟一枚王廙春可樂曰弱簟平端潘嶽悼亡詩曰展轉睇枕席長簟竟床空左思吳都賦曰桃笙象簟韜於筒中王鑒竹簟賦曰楚簟陳於玉房巴箱列於椒臺褥爾雅曰褥謂之茲釋名曰褥人所坐褻辱也又曰茵車中所坐用虎皮也詩曰文茵暢轂駕我騏馵文茵虎皮漢書曰霍禹廣治第室作乘輿輦加繡茵憑黃金塗如淳曰馮謂所馮者也金塗以黃金塗飾之也韋絮豸輪晉灼曰御輦以韋緣輪貯之如絮也東觀漢記曰祭遵有疾詔賜重茵魏略曰焦先字孝然河東人也高尚不仕自作蝸牛廬淨掃其中榮木為床布蓐其上天寒搆火以自炙魏志曰太祖性節儉帷帳屏風壞則補衲茵褥取溫無有緣飾又曰王朗上疏曰老臣慺慺願國家同祚於軒轅之伍某少小常苦被褥泰溫則不能使軟膚弱體是以難可防護而易用感慨若常全小縕袍不至於甚厚則必咸保金石之性而比壽於南山矣吳録曰孟仁字恭武江夏人也從李肅學其母為作厚褥大被人問其故母曰小兒無德客多貧故為廣被大褥齊書曰宗測高尚不仕王儉亦雅重之贈以蒲褥筍席又曰禇彥回弟澄為左戶尚書彥回薨澄以錢一萬一千就招提寺贖高帝所賜彥回白豹坐褥又柳慶遠為儀同初慶遠從父兄世隆嘗謂慶遠曰吾夢太尉以褥席見賜吾遂亞台司適又夢以吾褥席與汝汝必光我門族至是慶遠亦繼世隆焉太尉謂元景也後魏書曰爾朱世隆將被誅此年正月晦日令僕並不上省西門不開忽有河內太守田帖家奴告省門亭長云今且為令王借車牛一乘終日於洛濱遊觀至晚王還省將軍自東掖門始覺車上無褥請為之記識世説曰晉孝武年十三四時冬天晝日不著衣夜則纍茵褥謝公云體宜令常和陛下晝過冷夜過熱恐非攝生之術帝曰夜靜宜溫謝公出歎之也南越傳曰尉他臥象床錦茵茵褥也東宮舊事曰皇太子拜有八尺禱一重中褥一步輿褥一納妃有承床禱三會稽後賢傳曰丁潭以光祿大夫還第詔賜床帳席褥鄴中記曰石虎作褥長三丈用綿緣之神異經曰北方有冰萬里厚百丈奚鼠在冰下土中其毛長八尺可以為褥也西京雜記曰趙飛燕為皇后其女弟上遺鴛鴦褥拾遺録曰周穆王時紫羅文褥者壇孫國獻之語林曰大將軍收周侯至石頭坐南門石盤上將戮之送己褥與周司馬相如美人賦曰高茵重設氈説文曰蛩毛可以為氈釋名曰氈旃也毛相著旃旃然也韻集曰氈細罽也周禮春官掌次曰五大旅上帝則張氈案大旅上帝祭天於圓丘也張氈案以氈為林於堀中又曰掌皮供其毳為氈以待邦用事漢書曰蘇武使胸奴胸奴絶不與食天雨雪武臥齧雪與氈毛裹咽之也漢書曰王吉諫昌邑王遊獵曰夫廣廈之下細氈之上明師居前勸誦在後上論唐虞之際下及殷周之盛其樂豈徒銜撅之間也哉又曰江都王女細君歌云遠適異國烏孫王穹廬為室氈為壇魏志曰李勝為荊州剌史往辭太傅曹爽因察之太傅謬問勝曰并州有佳氈可致之勝出曰太傅耄無能為也又曰鄧艾伐蜀自陰平行無人之地鑿山通道作橋以氈自裹推轉而下魏武帝與楊彪書曰今贈足下青氈床褥三具也晉書曰杜預子錫為愍懷太子舍人屢直諫於太子太子患之置針於鍚坐處氈中鍚上剌足血出又曰戴記曰慕容熙后符氏卒慕容隆妻張氏熙之嫂也美姿容有巧思熙將以符氏之殉欲以罪殺之乃毀其檖鞾有中弊氈遂賜死三女叩頭求哀熙不許齊書曰孔奐為晉陵太守清白自守妻子並不之官唯以單船臨郡所得秩俸隨即分贍孤寡郡中號曰神君曲阿富人殷綺見奐居處儉素乃餉以衣氈一具奐辭不受北齊書曰裴寬與東魏將彭樂戰於新城因傷被擒至河陰見齊文襄寬舉止間雅善於占對文襄甚賞異之解鎖付館厚加禮遇寬乃裁所臥氈夜縋而出因得遁還又曰清河三年周師及突厥至并州突厥謂周人曰爾言齊亂故我伐之今齊人眼中有鐵何可當耶乃還至陘嶺凍滑乃鋪氈以渡之又曰綦俊佞巧能候當途斛斯椿賀拔勝皆與友善性多詐賀拔勝出鎮荊州過俊別因辭俊故見敗氈弊被更遺之錢物廣志曰羌女人披大華氈以為盛服拾遺録曰漢武帝以氈綈藉地惡輶之喧也搜神記曰太康中天下以氈為陌頭及帶身袴口於是百姓相戲曰中國其必為胡所破也夫氈胡之産者也而今天下以為陌頭帶身袴口胡既三制之矣淮南子曰夫胡人見麻不知其可以為布越人見毳不知其可以為氈故不通於物者不可與言俗俗説曰桓豹奴病勞冷無氈可臥桓車騎自撤己眠氈與之語林曰王子敬在齋中臥偷人取物一室之內略盡子敬臥而不動偷遂登褟欲有所覔子敬因呼曰偷兒石染青氈是我家舊物可特置否於是群偷置物驚走南傳曰調斯國有青石染氈絳染氈也王褒聖主得賢臣頌曰夫荷氈被毳者難與道純錦之麗密陸雲詩曰冬坐比肩氈比肩獸名也取其毛為氈臥具風俗通曰扶風蘇不違父為司隸李皓所遷司農不違穿府北垣徑上廳事斫皓臥具皓一宿數遷沈約宋書曰朱百年隱居山陰家素貧母以冬月亡衣並無絮自此不衣綿帛嘗寒時就孔顗飲酒醉眠顗以臥具覆之百年不覺也既覺引臥具去體謂覬曰綿定奇溫因流涕悲慟覬亦為之感傷齊書曰謝眺嘗行還過候江革時大寒雪見革弊絮單席而耽覺不倦眺嗟歎久之乃脫其所著襦并手割半氈與革充臥具而去又曰劉孝綽與到溉兄弟甚狎溉少孤宅近僧寺孝綽往溉宅適見黃臥具孝綽謂僧物色也撫手笑溉知其旨奮拳擊之傷口而去氍㲣通俗文曰織毛褥謂之氍㲣聲類曰氍㲣毛席也廣志曰氍㲣田㲲毛織也近出南海文稱北漢之氍㲣非其所生魏略曰大秦國以野繭作織成氍㲣文出黃白黑緑氍㲣後周書波斯國大月氏之別種也其地出氍㲣吳時外國傳曰天笁國出細靡氍㲣陶侃別傳曰外國獻氍㲣公舉之曰我還國當與牙共眠牙名惔之字處靜是公庶孫小而被知以為後嗣南州異物志曰氍㲣以羊毛雜群獸之毳為之鳥獸人物草木雲氣作鸜鵡遠望軒若飛也古樂府詩曰請客上北堂坐氈及氍㲣張衡四愁詩曰美人贈我氈氍㲣諸葛亮集詔答恢曰行當離別以為惆悵今致氍㲣一以達心也毾㲪通俗文曰氍㲣細者謂之毾㲪名毾㲪者施大床之前小榻之上所以登而上床也東觀漢記曰景丹率衆至廣阿光武出城外馬坐按氈毾㲪上設酒肉魏略曰大秦國以羊毳木皮野絲作毾㲪之屬有五色九色毾㲪其毛鮮於海東諸國所作也南史中天笁國出好裘毾㲪世説曰王子猷詣郤雍州雍州在內未出王見鋪毾㲪云阿乞那得此令左右送向家郤出王曰向有大力者負之以趍郤無忤郤愔為雍州剌史阿乞愔小字異苑曰沙門有法存者生廣州善醫術遂富有八尺毾㲪作百種形像又有沉香八尺板床太原王淡為剌史大兒邵之屢求二物法存不與王殺而藉焉法存後形見於府內經日王尋得疾亡邵之又喪杜篤邊論曰胸奴請降毾㲪罽褥帳幔氈裘積如丘山班固與弟超書曰月支毾㲪大小相雜但細好而已馬融奏馬賢於軍中帳內施毾㲪士卒飄於風雪
