body:
  text: 文部七御製上尚書皋陶曰帝庸作歌曰勑天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉皋陶拜手稽首揚言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱隋哉萬事隳哉漢書曰高祖還歸過沛置酒沛宮悉召故人父老子弟佐酒發沛中兒得百二十人教之歌酒酣高祖擊筑自為歌曰大風起兮雲飛揚威加海內兮歸故鄉安得猛士兮守四方又曰武帝求賢詔曰蓋有非常之功必待非常之人故馬或奔踶而致千里士或有負俗之纍而立功名夫泛駕之馬弛斥之士亦在御之而已泛覆也方腫反弛廢也斥逐也其令州縣察吏民有茂才異等可為將相及使絶國者又曰武帝幸河東祠后土顧帝京欣然中流與君臣宴飲上歡甚乃自作秋風辭云秋風起兮白雲飛草木黃落兮鴈南歸蘭有秀兮菊有芳攜佳人兮不能忘泛樓船兮濟汾河橫中流兮揚素波蕭鼓鳴兮發棹歌歡樂極兮哀情多少壯幾時兮奈老何後漢書東平憲王蒼傳曰顯宗以所自作光武本紀示蒼蒼因上世祖受命中興頌上甚善之令校書郎賈逵為之訓解又曰顯宗自制五家要說章句令桓郁定於宣明殿華嶠書曰帝自制五行章句此言五家即謂五行之家也魏志曰武帝御軍三十餘年手不捨書晝講軍策夜則思經傳登高必賦遇物必詩及造詩被之管弦皆成樂章魏志曰文帝行幸廣陵故城臨江觀兵戎卒十餘萬旌旗數百里帝馬上為詩曰觀兵臨江水水流何湯湯戈矛成山林玄甲曜日光猛將懷暴怒膽氣正縱橫誰云江水廣一葦可以航不戰能屈敵戢兵稱賢良古公宅歧邑實始剪殷商孟子營虎牢鄭人懼稽顙充國務耕植先零自破亡興農淮甸間築室都徐方量運宜權略六軍咸悅康豈如東山詩悠悠多悲傷魏文帝紀曰帝好文學以著述為務自所勒成垂百篇又使諸儒撰集經傳隨類柤從凡百篇號曰皇覽晉書曰殷仲堪為黃門郎孝武嘗戰士仲堪詩曰勿以己才而笑不才宋書曰高祖過彭城置酒命紙筆為詩曰先蕩臨淄穢卻清河洛塵華陽有逸驥桃林無伏輪於是群才並作也後魏書曰孝文帝雅好讀書手不釋卷五經之義覽之便講學不師授探其精奧史傳百家無不該涉才藻富贍好為文章詩賦銘頌有興而作有大手筆馬上口授及其成也不改一字自太和已後詔策皆帝文也自餘文章百有餘篇三國典略曰周明帝幼而好學詞彩溫麗捃托衆書自羲農已來訖于魏末敘為世譜凡百卷所著文章十卷行於世後周書曰明帝三年秋九月幸同州過故宅賦詩曰玉燭調秋氣金輿歷舊宮還如過白水更似入新豐霜潭漬晚菊寒井落踈桐舉杯延故老令聞歌大風梁書曰武帝賜張率詩曰東南有才子故能服官政余雖慚夙昔得人斯為盛率承詔往復六首又曰高祖製春景明志詩五百字勑在朝辭人沈約已下同作高祖以王僧孺詩為工隋書曰陳禎明初後主作新歌詞甚哀思令後宮美人習而歌之其辭曰玉樹後庭花花開不復久時人以歌讖此其不久兆又曰大業三年幸榆林啓民可汗奉觴上壽拜伏甚恭帝大悅賦詩曰鹿塞鴻旗駐龍庭翠輦回氈惟望風舉穹廬向日開呼韓稽顙至休屠繼踵來索辦擎羶肉韋韝獻酒杯何如漢天子空上單于臺國朝傳記曰煬帝善屬文而不欲人出其右司隸薛道衡由是得罪後因事誅之曰更能作空梁落燕泥否煬帝為燕歌行文士皆和著作郎王胄獨不下帝帝每御之胄竟坐此見害而誦其警句曰庭草無人隨意緑復能作此語耶又曰牛弘煬帝之在東宮也數有詩書遺弘弘亦有答及嗣位之後嘗賜弘詩曰晉家山吏部魏世盧尚書莫言先哲異奇才亦佐余學行敦時俗道素乃冲虛納言雲閣上禮儀皇運初彝倫欣有敘垂拱事端居唐書曰太宗以武功定海內櫛風沐雨不暇於詩書洎於嗣業進引忠良鋭精思政多孜孜求之若不及數年之後天下晏和遂於聽覽之暇留精文史敘事言懷時有制作天才宏麗興記玄遠著作鄧隆請編次之詔不許又曰太宗著金鏡述以示群臣其辭曰朕以萬機暇日遊心前文仰六代之高風觀百王之遺跡興亡之運可得言焉每至軒昊之無為唐虞之至治未嘗不留連贊詠不能已矣及於夏殷末世秦漢暴君使人凜然競懼如履朽薄然人君皆欲其永享萬乘之尊以垂百王之後而得失異跡興滅不同何也蓋短於自見不聞逆耳之言至於滅亡終身不悟豈不懼哉觀理亂之本原足為明鏡之鑒戒亂未常不任不肖理未嘗不任忠賢任忠賢則享天下之福用不肖則受天下之禍社稷臨危之主各師其臣若使覺悟安有危亡之禍特由不留心於任使翻屬意於遨遊豈不哀哉以遨遊將為任使以任使將為遨遊豈不善哉古人言舜禹不愛於聲不貪於色豫謂不然將為愛也人云桀紂耽於聲色豫將為不好也何以然桀紂命不終於天年樂不終於一世以此知為不好也舜禹命壽於終樂畢於世豫謂之愛也且夫人有寬躁強柔之志愁樂貪欲之心性有善不善者也由是觀之堯舜禹湯躬行仁義治致隆平此稟其善性也幽厲桀紂乃為炮烙之刑刳孕婦割人心斫朝涉脯鬼侯造酒池糟丘為長夜之飲此其受於不善之性也夫立身之道在於折衷不在於偏耽吳起曰昔桑氏之君修德廢武以滅其國有扈之君恃衆好勇以喪社稷仲尼曰寬濟猛猛濟寬仁義之道猶不得偏何況於左道乎況於不仁乎為君之道處至極之尊以億兆為心以萬邦為意安民必以文德防邊必以武功孔子曰夫文之所加者深武之所服者大德之所施者博則威之所制者廣不可以武威安民不可以文德備塞大鯨出水必廢遊波之功鴻鵠沉泥定無凌空之效若各令遂志並不失其能古人云構大廈者先擇木然後簡材治國者先擇佐然後定民大匠構屋必以大材為棟梁小材為榱撩茍有所中尺寸之木無棄此善理木者也非獨屋有棟梁國家亦然大德為宰相亦國之棟梁也豫思三代以來君有所好民必從之在上留心臺榭奇巧之人必至致情遊獵馳騁之人遠臻存意管弦鄭衛多進降懷脂粉燕趙斯來塞切直之路為忠者必少開諂諛之道為佞者必多古人云君猶器也民猶水也方圓在於器不在於水以此而言足為永戒夫玉不琢不成器人不學不知道仲尼好於郯子文王學於虢叔聖人且猶如此何況於凡人乎治主思賢如農夫之望歲哲后求人若旱苗之思雨亂君嫉勝己如讎視不肖如子懷之中心何日暫忘王莽僞行仁義之道有始無終孫皓權施恩惠之風有初無末二子猶船之泛巨浪毀在不遙若駑馬之奔千里困其將至古人云升量不以盛碩小智不可謀大巧詐不如拙誠信無廖矣有明主有暗主漢祖攝衣於酈生比干剖心於辛紂殷湯留情於伊尹龍逢被戮於夏桀楚莊暇隙而懷憂武侯罷朝而含喜暗主護短而永愚明主思短而長善覩漢祖殷湯仰其有德行譬若陰陽調四時會法令均萬民樂則騏驎呈其祥漢祖殷湯豈非騏驎之類乎觀夏癸商辛嗟其悖惡之甚猶政令不行寒暄失序則猛獸肆毒螽螟為害夏癸商辛豈非猛獸之儔乎豫以此觀之豈非天道也雖曰天時抑亦人事成湯之世有七年之旱剪髮為犧千里雨降太戊之時桑穀生朝懼而修德遂使十有六國重譯而來此豈非人事者也或云為君難為臣不易君處尊高之位執賞罰之權録人之材因人之力何為不成何求不得此言似易論之實難何者輕凌天地衆精顯其妖忽慢神靈風雨應其暴是以帝乙有雷震之禍殷紂致分砂之災多營池觀遠求異寶民不得耕女不得蠶田荒業廢兆庶凋殘見其飢寒不為之哀覩其勞苦不為之戚苦民之君也非治民之主也薄賦輕徭百姓家給上無急命之徵下有謳歌之詠屈一身之欲樂四海之民憂國之主也樂民之君也此其所以為難也且用人之道又為未易己之所賢未必盡賢衆之所毀未必全惡知能不舉即為失才知惡不黜則為禍胎又人才互有長短不必兼通是以公綽優於大國之卿子産善為小邦之相綘侯木訥卒安劉氏之宗嗇夫利口不任上林之令捨短從長然後為美夫人剛柔之情各異曲直之性不同不可不察也逆主耳而履道戮孔懷以安國周公是也順上心以安身隨君情而殺之易牙是也棄己之命存君之身紀信是也挾國謀事以報公讎袁盎是也損身而執節孤立而自毀屈原是也外顯和穆之端內懷湯火之意宰嚭是也忠諂之道以此觀之足以永鏡白起為秦平趙乃被昭王所殺亞夫定七國之亂卒為景帝所誅文種設策滅吳翻遭越王之戮五員竭誠為國終罹賜劍之禍乃君之過也非臣之罪焉至如趙高韓信黥布陳狶之儔此自貽厥釁非君之濫刑之也高祖失於存功之能光武獲於置將之妙臣安君社稷之國君處臣危亡之地豈是相酬之道也為天下之君處萬民之上安可易乎背道違禮非惟損己乃為賢人之所笑卑身厲行實為君子又為凡夫之所譏越品進官其類必為深怨偏與人語衆以為曲私任使賢良則謂偶委伏凡才則言愚暗數言則謂太繁辭寡則謂道薄恣情忿怒則朝野戰栗留心寬恕則法令不行民樂則官苦官樂則民勞四海之內莫非王土要荒為枝葉畿內為根本古人云皮之不存毛將安傳深根固本之內相而伊尹傳說世所希逢至如鎮積冰之塞守飛雪之邊而魏尚李牧當今罕遇遣人遠撫則眷戀而不忍愍而不遺則枝葉而不存二宜之間致心何所是以晨興夕惕無忘斯事為上猶然何況臣下易云書不盡言言不盡意今略陳梗概以示心之所存耳古語云勞者必歌其事朕非故煩翰墨以見天藻但學以為己聊書所懷想達見群賢不以為嗤也又曰太宗思隋氏失道皇運開基因而序之以明誡慎神筆書石命工刻之以賜皇太子其詞曰昔隋季崩離天綱弛紊波濤沸四海氣霧塞三光鬼哭石言人怨神怒丁壯疲於兵甲老弱斃於飢寒爨骨百城流血千里宮闕變為禾黍中原化為寇場余以弱齡屬當厄運思靜大難以濟蒼生秣馬揮戈風驅電掃剋平八表臨撫萬方聊因暇景載懷興亂歷想前代暗君庸王莫不恃其智力則輕侮聖賢騁其文才則不尊道德縱其口辨以飾非肆其姦言以拒諫昏迷酒色習近讒邪暴疾黎元窮其轍跡傾危莫悟以至滅亡明鏡不遠於焉自鑒又曰魏徵葬日太宗登苑西樓臨路哭祭太宗復為製碑文并御書公卿士庶競來摸寫車馬填噎日有數千時人號其碑為二絶文與書也又曰太宗幸積翠池宴五品以上太宗曰今茲年穀大登水潦不能為害天下既安邊方靜息因此農隙與公等舉酒酒既酣各宜賦一事太宗賦尚書其詞曰日昊玩百篇臨登被五典夏康既逸預商辛亦流湎恣情昏主多剋己明君鮮滅身資纍惡成名由積善又曰太宗征高麗回次營州詔遼東戰死骸骨並集柳城東南有司設太牢以祭之大宗臨哭盡哀從臣無不流淚帝親為文祭之曰忠烈蓋世往賢明軌忘身徇國先哲良規惟爾等懷忠立節重義輕生奮劍提戈摧城陷陳冒鋒刃而不顧赴湯火以如歸殞命戰場殘形寇壘膏原潤鉞身喪名存搖落寒關遂非生入蒼茫雷野無復餘蹤山川宛其不殊存亡颯焉非昔然則身者今之所重名者後之所貴身乃常有而愚夫怯焉功則難立惟烈士成焉去一生之短期收千載之令譽此聖賢之操也豈直忠勇者乎所以按轡停輿撫膺一慟嘉乃誠節痛爾遺靈酒俎既陳魂其斯享又曰貞觀十一年太宗幸洛陽遣使祭漢太師楊震墓太宗自為文曰惟君資華巖之奇氣稟金方之秀質艷忠篤以成性應時運而挺生彈冠贊務弼諧帝道正色立朝周行以肅坐槐燮理鼎飪載調值安德不升政由近習氣舛玉衡日微黃道君慨然忠憤乃心王室昌言正議屢犯於逆鱗霜簡且繩志祛於時蠹而運屬陵夷道消賢哲不納嘉猷遂嬰嚴綱方弘至治遽夭天年英傑云亡邦國彌瘁斯乃緬想高蹤可為長歎朕省方班瑞言事東巡瞻墳隧於道周想風徽於前代若使九原可作吾將與歸千載如存依然何遠行潦致屬君其饗之又曰高宗製元首前星維城股肱等誡以示侍臣禮部尚書弘文館學士許敬宗又上表請揔名為天訓并請注解許之及注畢敬宗為之序又曰咸亨中上自製樂章有上元二儀三材四時五行六律七政八風九宮十洲得一慶雲之曲以示群臣令太常行用之又曰咸亨中御書飛白書贊以賜中書門下三品戶部尚書戴至德詞曰泛洪源俟舟楫中書侍郎郝處俊曰飛九霄假六翮吏部侍郎李敬玄曰資啓沃罄丹誠中書侍郎崔知悌曰竭忠節贊皇猷議者以戴郝寬厚而李崔忠勤故上以此言褒美之又曰顯慶中上以琴中雅曲古人歌之近代已來此聲頓絶令所司簡樂工解琴笙者修習舊曲冬十月辛亥太常上書謹案禮記及家語云舜彈五弦之琴歌南風之詩是知琴操曲弄皆合於歌又張華博物志云白雪是太帝使素女鼓五十絃琴曲名又楚大夫宋玉對襄王云有客於郢中歌楊春白雪國中和者數十人是知白雪琴曲本宜合歌以其調高人和遂寡自宋玉已來迄今千祀未有能歌白雪曲臣今准勑依於琴中舊曲定其宮商然後教習並合於歌輒以御製雪詩為白雪歌詞又按古今樂府奏正曲之後皆別有聲君唱臣和事彰前史輒取侍中許敬宗等奉和雪詩以為送聲各十六節令悉教訖並皆諧韻上善之乃付太常編於樂府又曰玄宗製令長新誡一篇頒賜天下縣令其詞曰我求令長保義下人人之所為必有所因侵漁浸廣賦役不均使夫離散莫保其身徵諸善理寄爾良臣與之革故政在惟新調風變俗背僞歸真教先為富惠恤於貧無大無小以躬以親青旌勸農其唯在勤墨綬行令孰不攸遵曷云被之我澤如春又曰玄宗親製春臺望一章二十八句起居舍人蔡孚奏曰伏見所製氣雄詞美德音相屬鄙炎漢之奢侈徇有唐之儉陋知作勞而居逸念中人之家産用心如此天下斯安臣職在司言請宣示百寮及編國史又曰端午日玄宗自賦詩曰端午臨中夏時清日復良鹽梅已佐鼎麴藥且傳觴事古人留跡年深縷續長當軒知槿茂向水覺蘆香億兆同歸壽群公共保昌忠貞如不替貽厥後昆芳又曰玄宗幸寧王憲宅與諸王宴探韻賦詩上詩曰魯衛情先重親賢受轉多冕旒豐暇日乘景暫經過戚里申高宴平臺奏雅歌復尋為善樂方驗保山河又曰天寶八載九月甲午是日皇太子生日上製仁孝詩六章親札於步障以賜太子令中官高力士以示朝臣
