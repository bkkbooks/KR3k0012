body:
  text: 樂部二十鼓風俗通曰鼓不知誰所造鼓者郭也春分之音萬物皆郭皮甲而出故謂之鼓爾雅曰大鼓謂之鼖小者謂之應大鼗謂之麻小者謂之料徒擊鼓謂之咢郭璞注曰詩云或歌或咢鼖長八尺應在大鼓側也周易通卦驗曰冬至鼓用馬革圓徑八尺一寸夏至鼓用牛皮圓徑五尺七寸尚書曰周成王崩鼖鼓在西方長八尺尚書益稷曰下管鞀鼓禮記曰廟堂之上罍樽在阼犧樽在西廟堂之下懸鼓在西應鼓在東又曰懸鼓周鼓也其小者曰胤先擊小鼓為大鼓導引故曰胤一名鞞又曰春官小師掌教鼓朦播鞀眩瞭播鞀又曰王執路侯執鼖將軍執晉鼓師帥執提旅師執鼙又曰夏后足鼓殷人置鼓置植也亦作樹周人鼓懸又曰籥章氏掌出土鼓杜子春曰以毛土為匡以革為面可擊者也又曰除水蟲以炮土之鼓鼓之以焚石投之狐蜮之屬也又曰地官鼓人掌教六鼓四金之音聲以節聲樂以和軍旅以正田役音五聲合和者也教為鼓而辨其聲用教為鼓鼓擊鼓者大小之數又別其聲所用事以雷鼓鼓神祀雷鼓八面鼓神祀鼓天神以靈鼓鼓社祭靈鼓六面鼓社祭及地祗以路鼓鼓鬼享路鼓四面鼓鬼享享宗廟以鼖鼓鼓軍事大鼓調之鼖長八尺鼖音扶云切以鼛鼓鼓役事鼛鼓長丈二尺鼛音古刀切以晉鼓鼓金奏晉鼓長六尺六寸者是也金奏謂樂作擊繡鍾又冬官考工記韗人為皋陶鄭司農曰皋陶鼓木鄭玄謂鞠者以皋陶名官陶從草耳韗音況萬切又音運鞠音陶長六尺有六寸左右端廣六寸中尺厚三寸板中廣頭挾為穹崇鄭衆云鼓木一判者其兩端廣六寸而中央廣尺如此乃得有腹矣穹者三之一鄭衆云穹讀為志無穹耶之穹謂鼓木腹穹崇者居鼓面三之一玄讀如穹蒼之穹穹崇者居鼓面三之一則其鼓四尺者板一尺三寸三分寸之一倍之為二尺六寸三分寸之二加鼓四尺穹之徑六尺六寸三分寸之二此鼓合二十板上三正鄭玄云謂兩頭一半中央一平鄭玄讀三當為參正言直也參直者穹上一直兩端又直名居二尺二寸不孤曲也此數兩以六鼓差之賈侍中云晉鼓大而短近晉鼓也以晉鼓鼓金奏也鼓長八尺鼓四尺中圍加三之一謂之鼖鼓中圍加三之一者加於面之圍以三分一也面四尺其圍十二尺加以三分一四又則中圍十六尺徑五尺三寸三分寸之一今鼓亦合二十板則板微穹六寸三分寸之二爾雅云鼓謂之鼖鼓以鼖鼓鼓軍事鄭衆云鼓四尺謂革所象者廣四尺也為皋陶長尋有四尺鼓四尺倨勾磬折以皋鼓鼓役事磬折中曲之不參正中圍與鼖鼓同以磬折為異也凡冒鼓必以啓蟄之日啓蟄孟春之中蟄蟲始聞雷聲而動鼓所以取象為象鼓以革者也良鼓瑕如積環革調急也鼓大而短則其聲疾而短聞音問下同小而長則其聲舒而遠聞禮記明堂位曰土鼓蕢桴葦籥伊耆氏之樂也蕢當為凶伊耆古天子號令有耆氏也左傳成上曰師之耳目在吾旗鼓又僖中曰三軍以利用也金鼓以聲氣也又昭三曰分唐叔以密須之鼓注密須國名也毛詩曰鄁風擊鼓其鏜踊躍用兵又采芑曰方叔率止鉦人伐鼓陳師鞫旅顯允方叔伐鼓淵淵振旅闐闐又靈臺曰鼉鼓蓬蓬矇瞍奏公又執競曰鍾鼓喤喤磬管將將又山有樞曰子有鍾鼓不擊不考宛其死矣他人是保又有瞽曰有瞽有瞽在周之廷設業設簴崇牙樹羽應田懸鼓又那曰猗歟那歟置我鞉鼓奏鼓簡簡衎我烈祖又甫田曰琴瑟擊鼓以御田祖又有駜曰振振鷺鷺于飛鼓咽咽醉言歸又宛丘曰坎其擊鼓宛丘之下論語曰季氏富於周公而求也為之聚斂而附益之子曰非吾徒也小子鳴鼓而攻之可也漢書曰李陵擊胸奴夜擊鼓起士鼓不鳴陵曰吾士氣少襄而鼓不起何耶軍中豈有女子乎搜軍中得卒妻皆斬之又曰元帝疾不親政事留好音樂或置鼙殿下天子自軒檻上聵銅丸以撾鼓聲中嚴鼓之節後宮及左右習知音者莫能為之後漢書曰王喬為葉令每當朝鄴門下鼓不擊自鳴聞於京昭帝取置其都亭無復有聲又曰禰衡字正平孔融雅愛其才數稱賞於曹操操欲見之衡不肯往操懷忿而以其才不欲殺之聞衡善鼓召為鼓吏因會賓客閲試音節諸吏過者皆令脫其故衣更著岑單絞之服次至衡方操撾踊躍而前吏呵之曰鼓吏何不改服而輕進衡於是先解褒衣次釋餘服祼身而立徐取岑牟單絞而著之復操撾顏色不怍操笑曰本欲辱衡衡反辱孤衡對曰不敢以先王之法服為伶倫之衣沈約宋書曰蕭思話年十許歲好騎屋楝打細腰鼓也南史曰孫抱為延陵縣令國子助教高爽詣之抱了無故人懷爽出從閣下過取筆書鼓面云徒有此大腹了自無肝腸面皮如許厚被打未遽央唐書曰張玄素太子承乾又嘗於宮中擊鼓聲聞於外玄素叩閣請見極言切諫承乾乃出宮內鼓對玄素毀之唐書鄭餘慶兼判太常卿事初德宗自山南還宮關輔有懷光吐蕃之虞都下驚擾遂詔太常習樂去大鼓至是餘慶始奏復用大鼓世本曰王大將軍年少時舊有田舍之名語音亦楚武帝喚時賢共言伎藝之事人人皆有所能唯王都無所解意色殊惡自言解打鼓帝即令取鼓令擊之於坐振袖而起揚槌奮擊音節諧捷傍若無人舉坐歎其雄爽春秋孔演圖曰有人金豐擊玉鼓駕六龍鼓喻所行清嚴人服其威勢也古今注曰漢有黃門鼓吹一名樓車帝王世紀曰黃帝殺夔以其皮為鼓聲聞五百後秦記曰姚泓永和元年天水冀石鼓鳴聞數百里野雉皆雊神異經曰八方之荒有石鼓焉蒙之以皮其音如雷韓子曰楚厲王有驚鼓與百姓為戒飲酒過之而擊民大驚使人止之曰吾醉戲而擊之民皆罷居數月警而擊鼓民不起也穆天子傳曰天子讀書于梨丘奏廣樂遺其靈鼓虞喜志林曰建武二十四年南郡男子獻銅鼓有銘五經要義曰鼓所以撿樂為群音之長也異苑曰晉武帝時吳郡臨平岸崩出一石鼓打之無聲問張華華曰可取蜀人桐材刻作魚形扣之則鳴矣於是如其言聲聞數十里劉道民詩云亦有遠而合蜀桐鳴吳石郭緣生述征記曰逢山在廣固南三十里有祠并石人石鼓齊世將亂石人輒打鼓聞數十里羅浮山記曰浮山東石樓下有兩石鼓扣之清越所謂神鉦也盛弘之荊州記曰始興郡陽山縣有豫章木本徑可二丈名為聖木秦時伐此木為鼓顙顙成忽有奔逸北至桂陽又王韶之始興記云息於臨武遂之洛陽因名聖鼓城今在臨武臨海記曰郡西有白鵠山山上有石鼓元嘉中居人志祭祀山神乃推此鼓數十里聞如金石之響相傳云此云有鵠飛入會稽郡雷門鼓中打鼓聲洛陽聞之後逆賊孫恩斫破此鼓見一白鵠飛出去通禮義纂曰建鼓大鼓也少昊氏作焉為衆樂之節夏加四足謂之節鼓商人挂而貫之謂之盈鼓周人縣而擊之謂之懸鼓近代相承植而建之謂之建鼓本出於商制也唐禮設於四隅劉瓛定軍禮曰鼓吹未知其始也漢以雄朔野而有之矣鳴笳以和簫聲非八音也騷人曰鳴箎笳竽鼓吹樓車也昔蕭史吹簫於秦秦人為之築鳳臺故鼓吹陸則樓車水則樓船其在庭也則以虡為樓或曰鷺鼓精也昔吳夫差啓蛇門以厭越越人雷為門以禳之擊大鼓於雷門之下而蛇門聞焉其後移鼓建康宮之端門有雙鷺呪鼓而飛乎雲末或曰皆非也詩曰振振鷺鷺于飛鼓咽咽醉言歸古之君子仕於伶官悲周道之為榛傷頌之棳音故飾鼓以鷺欲其流風好焉今有龍頭大抗中鼓獨揭小鼓隨品秩焉短簫鐃歌軍樂也帝歧伯所作以建武揚德風韶勸土地古今樂録曰鎛師掌金奏之鼓謂主擊晉鼓以奏其鍾鎛又卒長執鐃奴交切兩司馬執鐸公司馬執鐲音蜀又金鐃止鼓以金鐸通鼓以金鐲節鼓以鍾鼓者前擊鍾次擊鼓也大周正樂曰劉貺曰鼓動也冬至之音萬物含陽氣而動雷鼓八面以祀天靈鼓六面以祀地路鼓四面以祀鬼神夏后加之以足謂之足鼓殷人貫之以柱謂之柱鼓周人懸之謂之懸鼓後世復殷制建之謂之建鼓鼓高六尺六寸金奏則鼓之傍有小鼓謂之應鼓以和大鼓小鼓有柄曰鞉搖以和鼓大曰鼙也腰鼓大者瓦小者木皆廣首而纖腹齊鼓如漆桶大一頭設齊於鼓面如麝齊故曰齊鼓又曰馬上之鼓曰提鼓有木可提執施於朝則登聞之鼓敢諫之鼓是也施於府寺曰朝鼓在村墅曰枹鼓抱一作桴調擊鼓物也在邊徼曰警鼓又曰銅鼓鑄銅為之虛其一面覆而擊其上南蠻扶南天笁類皆如此嶺南豪家則有之大者廣尺餘又曰節鼓如博局中開圓孔適容其鼓擊之以節樂也又曰毛員鼓似都曇而稍大又曰有鼉鼓節鼓不知誰所造又曰檐鼓如小甕先冒以革而漆之又曰羯鼓正如漆桶兩手俱擊以其出羯中故號羯鼓亦謂兩杖鼓板又曰正鼓和鼓一以正而一以和皆腰鼓也又曰都曇鼓似腰鼓而小以小槌擊之又曰答臘鼓制廣於羯鼓而鼓以指揩之其聲甚震俗謂之揩鼓又曰雞婁鼓正而員首尾可擊之處平可數寸又曰方鼓大曆元年司馬滔進廣平樂兼此鼓以應黃鍾一均聲樂書曰雷鞉者周禮瞽矇掌播鞉鞉如鼓而小以木貫之作柄柄各四枚為八面也旁以結皮為耳搖之還自擊禮書云掌之人左手播鞉右手擊鼓之是也柷敔釋名曰柷如物始見柷柷然也敔止也所以止樂尚書夔曰戛擊鳴球下管鼗鼓合止柷敔孔安國曰憂擊柷敔也下管堂下樂也上下合心樂名有柷敔也禮記德音之音控揭天子賜諸侯樂則以柷將之樂記曰聖人作控揭塤箎則所起矣柷衆也立夏之音萬物衆形皆成也方面各二尺傍開員孔內手於孔擊之以舉衆樂也爾雅曰所以鼓柷謂之止所以鼓敔謂之甄郭璞注曰柷如漆筒方二尺四寸深尺八寸中有推柄連底桐之令左右擊止者其椎名也敔如伏虎皆上有二十七鉏鋙刻以木長尺甄者其也樂汁圖曰乾主立冬陰陽終始故聖人承天以制柷刑法使死者不恨生者不怨宋均曰柷圉從中發聲人情死恨亦從中起爾雅曰敔謂之甄音真注云敔如伏虎背上二十七鉏鋙刻以木長尺櫟之甄其名也筍簴爾雅曰木謂之簴郭璞注曰懸磬之本曰簴方言几其高者謂之簴郭璞注曰筍簴也釋名曰所以懸鍾鼓者撗曰簨簨峻也在上高峻也縱曰簴簴舉也在旁舉簨者也毛詩曰設業設簴崇牙樹羽周禮冬官梓人為筍簴嬴者羽者鮮者以為筍簴外骨內骨卻行仄行紆行連行以脰鳴以翼鳴以為雕琢厚唇弇口出目短耳大胸耀後者以為鍾簴鋭喙決吻小體騫腹者以為磬簴小首而長搏身而鴻者以為筍注曰為鍾簴者有力而不走宜於任重也為磬簴者其聲清楊宜遠聞也外骨龜內骨鱉卻行蚓仄行蟹紆行蛇連行魚脰鳴蛙黽翼鳴發皇也蚓蚰蜒皆以刻晝彝器搏庶物貴野聲禮明堂位曰夏后氏之龍簨簨殷之崇牙周之壁翣注云龍上刻畫為重才又盡繒為翣載之以壁臿五羽於其下也賈誼真簴賦曰櫻攣拳以蟉虬負大鍾而欲飛楚詞曰簫鼓兮瑤簴說苑曰秦始皇建千石之鍾立萬石之簴三輔舊事曰秦始皇斂天下銅鐵皆著咸陽鑄作銅簴高廟簴二枚魏明帝徙詣洛陽尚在
