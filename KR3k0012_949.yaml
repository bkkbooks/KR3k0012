body:
  text: 蟲豸部五蜘蛛焦贛易林未濟之蠱曰蜘蛛作網以司行旅青蠅饞噉以求膏腴又井之遁曰蜘蛛南北巡行罔罟杜季利兵傷我心膂毛詩豳七月東山曰蠨蛸在戶蠨蛸長踦也詩義疏曰一名長腳荊州河內謂之喜子云此蟲來著人當有親客至亦如蜘蛛為罔羅居之詩義問曰蠨蛸長足蜘蛛也劉芳毛詩義筌曰蠨蛸長𦭶音崎嶇之崎小蜘蛛長腳者俗呼為喜子爾雅曰次蟗音秋䵹蛛䵹蛛蛛蝥音矛土䵹蛛布地中布罔草䵹蛛絡幕草間蠨蛸長踦音崎小蜘蛛長腳者俗呼為喜子張揖廣雅曰蛛蝥罔工蠾𧍳毒蜍也魏志曰館陶令諸葛原遷新與太守管輅往祖餞之賓客並會原自起取燕卵蜂巢蜘蛛著器中使射覆卦成輅曰第三物觳觫長足吐絲成羅尋網求食利在昏夜此蜘蛛也舉坐驚喜抱朴子曰太吳師蜘蛛而結網又曰或以赤班蜘蛛及七種水馬以合馮夷水仙丸服之亦可以居水中又以塗足下則可以步行水上也符子曰晉公子重耳奔齊與五臣而遊乎大澤之中見蜘蛛布其網曳其網而執豸以食之公子重耳觀之顧謂其臣咎犯曰此蟲也智之薄者矣而猶役其智曳其網而執豸以食之況乎人之有智而不能廓垂天之網布絡地之網以供方丈之御是曾不如蜘蛛之智孰可謂之人乎咎犯曰公子慎勿言也終行之則有邦有嗣矣金樓子曰楚國龔舍初隨楚王朝宿未央宮見蜘蛛焉有赤蜘蛛大如栗四面縈羅網有蟲觸之而死者退而不能得出焉舍乃歎曰吾生亦如是耳仕官者人之網羅也豈可淹歲於是挂冠而退時人笑之謂舍為蜘蛛之隱揚雄方言曰䵹蛛郭璞曰知蛛兩音朱蝥也音無自關而西秦晉之間謂之蛛蝥今江東呼蝃蝥音掇自關而東趙魏之郊謂之䵹蛛或謂之蠾蝓燭臾兩音蠾蝓者侏儒語之轉北燕朝鮮冽水之間謂之毒蛇齊人又呼為杜公亦言罔工音毒束晳發蒙記曰蠅生積灰蜂出蜘蛛腐木為螢火蠐螬出朽芻皇甫謐帝王世紀曰湯出見羅者湯下車命解其三面而置其一面更教之祝曰昔蛛蝥作罔今人學結欲左者左欲右者右欲高者高欲下者下吾取其犯命者郭璞洞林曰流移道路諸人並欲令郭璞射覆人人自持五月五日蜘蛛者物悉驗遂不復射淮南萬畢術曰蜘蛛塗布而雨自晞取蜘蛛置甕中食以膏百日煞以塗布而雨不能濡也又曰取蜘蛛與水狗及豬肪置甕中密以新縑仍懸室後百日視之蜘蛛肥殺之以塗足涉水不沒矣又一法取蜘蛛二七枚內甕中合肪百日以塗足得行水上故曰蜘蛛塗足不用橋梁王充論衡曰觀夫蜘蛛之絲以罔飛蟲也人之用詐安過之郭義恭廣志曰草蜘蛛在草上色青土䵹蛛在地上春行草間索索履地西京雜記曰樊噲問陸賈曰古帝王人君皆云受命於天云有瑞應豈然乎賈曰有之夫目瞤得酒食火花得錢財乾鵲噪行人至蜘蛛集百事喜小故猶徵大亦宜然故目瞤則呪之乾鵲噪則餧之蜘蛛集則放之況天下大寶人君重位非天命何以得之劉敬叔異苑曰陳郡殷家養子名琅與一婢結好經年婢死後猶往來不絶後夕見大蜘蛛形如斗拌緣床就琅便宴爾怡悅母取而殺之琅性理遂僻劉義慶幽明録曰某郡張甲者與司徒蔡謨有親僑住謨家暫行數宿過期不反謨晝眼夢甲云暫行忽暴病患心腹病痛脹滿不得吐下某時死主人殯殮謨悲涕相對又云我病名乾霍亂自可治之但人莫知其藥故令死耳謨曰何以治之甲曰取蜘蛛生斷去腳吞之則愈謨覺使人往甲行所驗之果死問主人病時日皆與夢符後有乾霍亂者試用輒差廣五行記曰蜘蛛集於軍中及人家有喜事夢書曰䵹蛛為大腹其性然也夢見蜘蛛憂懷任婦人也葛洪治瘧方曰取蜘蛛一枚著飯中吞即愈成公綏蜘蛛賦曰獨高懸以浮處遂設罔於四隅南連大廡北接華堂左憑廣廈右依高廊吐絲屬緒目引結網纖羅絡漠綺錯交張雲舉霧綴以待無方張望蜘蛛賦曰余嘯詠蓬蘆遨步丘園覽蜘蛛之為蟲焉乘虛運巧構不假物欲足性命蕭然靖逸良可玩也伊蜘蛛之為蟲縱微性乎天壤稟妙造於化靈忽無礙而無想吐自然之纖緒先皇羲而結網憑輕羅以隱顯應大明之幽朗縊女爾雅曰蜆縊女也孫炎曰小黑蟲赤頭三輔謂之縊女此蟲多民多縊死郭璞注曰喜自經死故曰縊女異苑曰縊女蟲也一名蜆長寸許頭赤身黑恆吐絲自懸昔齊東郭姜既亂崔杼之室慶封殺其二子姜亦自經俗傳此婦骸化而為蟲故以縊女為名馬蚿爾雅曰蛝音間馬踐仕板切也郭璞曰馬蠲虳也俗呼馬蚰虳音均張揖廣雅曰蛆子魚切蟝強魚切馬蚰音逐馬蚰馬蚿也宋書曰王素聲譽甚高山中有蚿其聲清長聽之使人不厭而其形甚醜素乃為蚿賦以自況魯仲連子曰諺云百足蟲三斷不蹶者持之者衆文子曰善用人者若蚿之足衆不相害淮南子同莊子曰夔憐蚿蚿憐蛇夔謂蚿曰吾以一足趻士今切踔勑卓切而行豫無如矣今子使萬足獨奈何蚿曰不然子不見夫唾乎噴則大者如珠小者如露今子動吾天機不知所以然司馬彪曰北燕謂蚿為且渠也淮南子曰季夏草為蚈草得陰而死極陰中反陽故化為蚈蚈馬蠸也蠸音權又曰良將之卒若虎之牙若兕之角若鳥之羽若蚈音牽之足蚈馬蠸也又曰蚈足衆走不及蛇物固有小不如大也明堂月令曰腐草為蠲揚雄方言曰北燕馬蚿謂之蛆蟝張茂先博物志曰馬蚿一名百足中斷則頭尾各異行而去本草經曰馬陸一名百足吳氏本草經曰一名馬軸蝔淮南子曰蝔知將雨高誘曰蝔蟲也大如筆管長三寸餘蝔音皆竹蟲淮南萬畢術曰竹蟲飲人自言其誠竹蟲三枚竹黃十枚治之欲得人情取藥如大豆燒酒中飲之不令醉以問其事必得其實也蓼蟲孔藂蓼蟲賦曰覩茲茂蓼紛葩吐榮爰有蠕而切蟲厥狀似螟群藂其間食之以生悟物託事以況乎人幼長斯蓼莫知其辛蠐螬毛詩碩人曰膚如凝脂領如蝤蠐蝤蠐蝎蟲也陸機毛詩疏義曰蠐螬生糞中爾雅曰蟦音汾蠐螬也郭璞注曰在糞土中者蝤蠐蝎在木中有也今雖通名之為蝎所在異也莊子曰烏足根為蠐螬司馬彪曰烏足草名生水邊曹齊曹也淮南萬畢術曰黍成蠐螬以秋冬穫黍置溝中即生蠐螬也王充論衡曰蠐螬化為復育復育轉為蟬揚雄方言曰蠀螬謂之蟦蜚翠自關而東謂之蝤蠀酋資兩音或謂之卷屬書卷或謂之蝖螜亦呼堂齊或呼地蠶宣斛兩音梁益之間謂之蛒音格或謂之蝎或謂之蛭音質蛒秦晉之間或謂蠹或謂之天螻按爾雅曰螜天螻謂蛞螻耳而方言以為蝎未詳其義也博物志曰蠐螬以背行駛於用足也祖台之志怪曰吳中書郎盛冲至孝母王氏失明冲暫行勑婢食母婢乃取蠐螬蒸食之王氏甚以為美而不知是何物兒還王氏語曰汝行婢進吾一食甚甘美然非魚非肉汝試問之既而問婢服食是蠐螬冲抱母慟哭母目霍然立開本草經曰蠐螬一名蟦齊主治血痺螻蛄子然曰有一人身著練單衣恰直造席捧手與子然語子然問其姓名即答云僕姓盧名鉤家在壈溪邊臨水復經半旬中其作人掘田塍西溝邊蟻垤忽見大坎滿中螻蛄將近斗許而有數頭極壯一箇彌大子然至是始悟曰近日客盧鉤反音則螻蛄也家在壈溪即西坎也悉灌以沸湯自是遂絶搜神記曰廬陵太守平原龐企字子及自說其乃祖非罪繫獄時有螻蛄蟲行其左右謂曰爾有神當活我因投飯與之食盡復來形稍大數日形如豚及當刑螻蛄夜掘壁為孔以出故龐氏常祠螻蛄葛洪治箭鉤在咽喉不出方曰用螻蛄腦塗之即出范注治不得小便方曰取螻蛄大者二枚斷取體下以一升水漬之去皮飲之須臾便通本草經曰䗜蛄一名天螻一名螜産難出剌在肉中潰癰腫下哽咽解毒愈惡瘡陶洪景本草經曰螻蛄味鹹寒取自出者其自腰以前甚澀主大小便尺蠖周易下繫辭曰尺蠖之屈以求伸也龍蛇之蟄以存身也爾雅曰蠖蚗蠖今蝍𧑙也晏子春秋曰弦章謂景公曰尺蠖食黃即身黃食蒼即身蒼說文曰尺蠖曲信蟲信音申方言曰蠀音資𧑙子六切謂之尺蠖郭璞曰步屈也曹子建長歌行曰尺蠖知屈申體道識窮達傅休奕潛通賦曰蠖屈體以求伸兮龍階木而升雲鮑明遠尺蠖賦曰智哉尺蠖觀機而作申非向厚詘非今薄靜值泉渟機躁遇風驚起軒軀而曠莽伏纍氣而併形冰炭弗觸韋刃靡忤逢嶮蹙跡值夷舒步忌好退之見猜哀必進之為蠹每驤首以瞰塗常景行而翻路故身不豫托地無前期從方而應何慮何思是以軍算慕其權國容擬其變高賢圖之隱淪智士以之藏見笑蛇靈之久蟄羞龍德之方戰郭璞尺蠖讚曰貴有可賤賤有不珍嗟茲尺蠖體此屈申論配龍蛇見歎聖人張協七命曰鷦飛而生風尺蠖動而成響
