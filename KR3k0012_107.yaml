body:
  text: 皇王部三十一隋高祖文皇帝隋書曰高祖文帝姓楊氏諱堅弘農郡華陰人也漢太尉震八代孫鉉仕燕為北平太守鉉生元壽後魏代為武川鎮司馬子孫因家焉元壽生太原太守惠嘏惠嘏生平原太守烈烈生寧遠將軍禎禎生忠忠即皇考也皇考從周太祖起義關西賜姓普大茹氏位至柱國大司空隋國公薨贈太保諡曰桓皇妣呂氏以大統七年六月癸丑夜生高祖於馮翊般若寺紫氣充庭有尼來自河東謂皇妣曰此兒所從來甚異不可於俗間處之尼將高祖舍於別館躬自撫養皇妣嘗抱高祖忽見頭上角出遍體鱗起皇妣大駭墜高祖於地尼自外入見曰已驚我兒致令晚得天下為人龍顏額有五柱入頂目光外射有文在手曰王長上短下沉深嚴重初入太學雖至親昵不敢狎也年十四京兆尹薛善辟為功曹十五以太祖勳授散騎常侍車騎大將軍儀同三司封成紀縣公武帝即位遷左小宮伯出為隋州刺史進位大將軍後徵還遇皇妣寢疾三年晝夜不離左右世稱純孝宇文護執政尤忌高祖屢將害焉大將軍侯伏侯壽等匡護得免其後襲爵隋國公武帝娉高祖長女為皇太子妃益加禮重齊王憲言於帝曰普六茹堅相貌非常臣每見之不覺自失恐非人下請早除之帝曰此止可為將耳內史王軌驟言於帝曰皇太子非社稷主普六茹堅貌有反相帝不悅曰必天命有在將若之何高祖甚懼深自晦匿建德中率水軍三萬破齊師於河橋明年從帝平齊進位柱國與宇文憲破齊任城王高湝於冀州除定州總管宣帝即位以后父徵拜上柱國大司馬大象初遷太僕丞右司武俄轉大府丞帝每巡幸恆委以居守大象二年五月以高祖為楊州總管將發暴有足疾不果行乙未宣帝崩時靜帝幼沖未能親理政事內史大夫鄭譯御正大夫劉昉以高祖皇后之父衆望所歸遂矯詔引高祖入總朝政都督內外諸軍事周氏諸王在藩者高祖恐其生變稱趙王招將嫁女於突厥為詞以徵之丁末發喪庚戍周帝拜高祖假黃鉞左丞相百官總已而聽焉十二月甲子周帝詔以郢州之漢東二十郡為隋國劍履上殿入朝不趨贊拜不名備九錫之禮加璽紱遠遊冠相國緑綟綬位在諸王上隋國置丞相已下一依舊式高祖再讓不許於是建臺置官大定元年二月丙辰詔王冕十有二旒建天子旌旗出警入蹕乘金根車駕六馬備五特副車置旄頭雲罕樂儛八佾設鍾簴宮懸王妃為王后長子為太子前後三讓乃授俄而周帝以衆望有歸乃下詔遣大宗伯大將軍金城公趙煚奉皇帝璽紱百官勸進高祖乃受焉開皇元年二月甲子上自相府常服入宮備禮即皇帝位於臨光殿設壇於南郊遣使柴燎告天是日大赦改元為開皇六月癸未詔以初受天命赤雀降祥五德相生赤為火色其郊及社廟依服冕之儀而朝會之服旗幟犧牲各令尚赤戎服以黃秋七月乙卯上始服黃百寮畢賀二年六月景申詔曰龍首山川原秀麗卉物滋阜卜食相土宜建都邑定鼎之基永固無窮之業所在公私府宅規模遠近營構資費隨事條奏仍詔左僕射高熲將作大匠劉龍巨鹿郡公賀婁子幹太府少卿高龍乂等創造新都三年春正月庚子將入新都大赦天下六年二月丁亥發丁男十一萬修築長城三旬而罷七年春正月癸巳有事於太廟乙未制諸州歲貢三人丁已祀朝日於東郊己巳陳遣兼散騎常侍王亨兼通直散騎常侍王慎來聘壬申車駕幸醴泉宮是月發丁男十萬餘修築長城二旬而罷夏四月己酉幸晉王第庚戍於楊州開山陽瀆以通運漕八年冬十月甲子將伐陳有事於太廟命晉王廣秦王俊清河公楊素並為行軍元帥以伐陳九年春正月己巳白虹夾日辛未賀若弼拔陳京口韓擒虎拔陳南豫州癸酉以尚書右僕射虞慶則為右衛大將軍景子賀若弼敗陳師於蔣山獲其將蕭摩訶韓擒虎進師入建業獲其將任蠻奴獲陳主叔寶陳國平得州三十郡一百縣四百癸巳遣使持節巡撫之夏四月己亥幸驪山親勞旋師乙巳三軍凱入獻俘於太廟拜晉王廣為太尉五月己卯以吏部尚書蘇威為尚書右僕射六月乙丑以荊州總管楊素為納言丁丑以吏部侍郎盧愷為禮部尚書時朝野物議咸願登封秋七月景午詔曰豈可命一將軍除一小國遐邇注意便謂太平豫以薄德而封名山用虛言而干上帝非朕攸聞而今以後言及封禪宜即禁絶二十年冬十月乙丑皇太子勇及其諸子並廢為庶人殺柱國太平縣公史萬歲己巳殺左衛大將軍五原郡公元旻十一月戊子天下地震京師大風雪以晉王廣為皇太子十二月戊午詔東宮官屬不得稱臣於皇太子仁壽元年春正月乙酉朔大赦改元以尚書右僕射楊素為尚書左僕射納言蘇威為尚書右僕射丁酉徙河南王昭為晉王三年七月詔令州縣搜揚賢哲皆取明知今古通識治亂究政教之本達禮樂之源不限多少不得不舉以三旬咸令進路徵召將送必須以禮四年春正月景辰大赦甲子幸於仁壽宮乙丑詔賞罰支度事無巨細並付皇太子夏四月乙卯上不豫六月庚申大赦天下八月甲辰上疾甚臥於仁壽宮與百寮辭訣並握手歔欷是時唯太子及陳宣華夫人侍疾太子無禮宣華訴之帝怒曰死狗郍堪付後事遽令召勇楊素祕不宣乃屏左右令張衡入拉帝血濺屏風冤痛之聲聞于外年六十四在位二十四年史臣曰高祖龍德在田奇表見異晦明藏用故知我者稀始以外戚之尊受託孤之任與能之議未為當時所許是以周室舊臣咸懷憤惋既而王謙固三蜀之阻不踰期月尉遲逈舉全齊之衆一戰而亡斯乃非止人謀抑亦天之所贊也乘茲機運遂遷周鼎于時蠻夷猾夏荊楊未一劬勞日昃經營四方樓船南邁則金陵失險驃騎北指則單于款塞職方所載並入疆理禹貢所圖咸受正朔雖晉武之克平吳會漢宣之推亡固存比義論功不能尚也七德既敷九歌已洽要荒咸暨尉侯無警於是躬節儉平徭賦倉廩實法令行君子咸樂其生小人各安其業強無陵弱衆不暴寡人物殷阜朝野歡娛二十年間天下無事區宇之內晏如也考之前王足以參蹤盛烈但素無學術不能任下無寬仁之度有刻薄之資暨乎暮年此風逾扇又雅好符瑞暗於大道建彼維城權侔京室人皆同帝制靡所適從聽哲婦之言惑邪臣之説溺寵廢嫡託付失人滅父子之道開昆弟之隙縱其尋斧剪伐本枝墳土未乾子孫繼踵屠戮松檟絻列天下皆非隋有惜哉迹其衰怠之源稽其亂亡之兆起自高祖成於煬帝所由來遠矣非一朝一夕其不祀忽諸未為不幸也煬皇帝隋書曰煬皇帝諱廣一名英小字阿嬤高祖第二子也母曰文獻獨孤皇后上美姿儀少敏慧高祖及后於諸子中特所鍾愛在周以高祖勳封雁門郡公開皇元年立為晉王拜柱國并州揔管時年十三尋授武衛大將軍進位上柱國河北道行臺尚書令大將軍如故高祖令項城公韶安道公李徹輔導之上好學善屬文沉深嚴重朝野屬望高祖密令善相者來和遍視諸子和曰晉王眉上雙骨隆起貴不可言既而高祖幸上居第見樂器絃多斷絶又有塵埃若不用者以為不好聲妓善之上尤自矯飾當時稱為仁孝嘗觀獵遇雨左右進油衣上曰士卒皆霑濕我獨衣此乎乃令持去六年轉淮南道行臺尚書令其年徵拜雍州牧內史令八年冬大舉伐陳以上為行軍元帥及陳平進位太尉賜輅車乘馬兗冕之服玄圭白璧各一復拜并州揔管高祖之祠太山領武候大將軍明年歸藩後數載突厥寇邊復為行軍元帥出靈武無虜而還及太子勇廢立上為皇太子是月當受册高祖曰吾以大興公成帝業令上出舍大興縣其夜烈風大雪地震山崩民舍多壞壓死者百餘口仁壽初奉詔巡撫東南是後高祖每避暑仁壽宮恆令上監國四年七月高祖崩上即皇帝位於仁壽宮八月奉梓宮還京師并州揔管漢王諒舉兵反詔尚書左仆射楊素討平之十一月癸丑詔可於伊雒營建東京即設官分職以為民極也大業元年正月壬辰朔大赦改元立妃蕭氏為皇后改豫州為秦州洛州為豫州廢諸州揔管府景申立晉王昭為皇太子三月丁未詔尚書令楊素納言楊達將作大匠宇文愷營建東京徙豫州郭下居民以實之辛亥發河南諸郡男女萬餘開通濟渠自西苑引穀洛水達於河自板渚引河通於淮庚申遣黃門侍郎王弘上儀同於士澄往江南採木造龍舟鳳舸黃龍赤艦樓船等數萬艘七月景子詔曰今宇宙平一文軌攸同十步之內必有芳草四海之中豈無奇秀諸在家及見入學者若有篤志好古耽悅典墳學行優敏堪膺時務所在採訪具以名聞即當隨其器能擢以不次八月壬寅上御龍舟幸江都以左武衛大將軍郭衍為前軍李景為後軍文武官五品已上給樓船九品已上給黃薎舳艫相接二百餘里冬十月己丑赦江淮已南陽州給復五年舊揔總管內給復三年二年春正月辛酉東京成賜監督者各有差三月庚午車駕發江都夏四月庚戍上自伊闕陳法駕備千乘萬騎入於東京辛亥上御端門大赦免天下今年租賦三年四月甲午詔曰夫孝悌有聞人倫之本德行敦厚立身之基或節義可稱或操履清潔所以激貪厲俗有益風化強毅正直執憲不撓學業優敏文才美秀並為廊廟之用實乃瑚璉之資才堪將略則拔之以禦侮膂力驍壯則任之爪牙爰及一藝可取亦宜採録衆善畢舉與時無棄以此求治庶幾非遠文武有職事者五品已上宜依今十科舉人有一於此不必求備朕當待以不次隨才升擢景申車駕北巡狩六月戊子次榆林郡丁酉啓民可汗來朝己亥吐谷渾高昌並遣使貢方物甲辰上御北樓觀漁於河北宴百僚秋七月辛亥啓民可汗上表請變服襲冠帶詔啓民贊拜不名位在諸侯王上甲寅上於郡城東御大帳其下備儀衛建旌旗宴啓民及其部落三千五百人奏百戲之樂賜啓民及其部各有差八月壬午車駕發榆林乙酉啓民飾廬清道以候乘輿帝幸其帳啓民奉觴上壽宴賜極厚上謂高麗使者曰歸語爾王當早來朝見不然者吾與啓民巡彼土矣皇后亦幸義城公主帳己丑啓民可汗歸蕃癸巳入樓煩關壬寅次太原詔營晉陽宮九月己未次濟源幸御史大夫張衡宅宴享極歡己巳至于東都五年三月己巳車駕西巡河右乙亥幸扶風舊宅夏四月己亥大獵於隴西壬寅高昌吐谷渾伊吾並遣使來朝乙巳狄道黨項羌來貢方物癸亥出臨津關渡黃河至西平陳兵講武五月乙亥上獵於拔延山長圍周亙二千里庚辰入長寧谷度星領甲申宴群臣於金山之上六月景午次張掖辛亥詔諸郡學業該通才藝優敏膂力驍壯超絶等倫在官勤舊堪理政事立性正直不避強禁四科舉人壬子高昌王麴伯雅來朝伊吾吐屯設等獻西域數千里之地上大悅景辰上御觀風行殿盛陳文物奏九部樂設魚龍曼延宴高昌王吐屯設於殿上以寵異之其蠻夷陪列者三十餘國戊午大赦天下文皇已來流配悉放還鄉晉陽逆黨不在此例寵右諸郡給復一年行經之所給復二年秋七月丁卯置馬牧於青海渚中以求龍種無效而止九月癸未車駕入長安六年二月庚申徵征魏齊周陳樂人悉配太常三月癸亥幸江都宮甲子以鴻臚卿史祥為左驍衛大將軍夏四月丁未宴江淮已南父老頒賜各有差七年二月己未上升釣臺臨楊子津大宴百寮頒賜各有差庚申百濟遣使朝貢乙亥上自江都御龍舟入通濟渠遂幸於涿郡八年正月辛巳大軍集於涿郡壬午下詔曰高麗小醜昏迷不恭崇聚渤碣之間荐食遼穢之境親總六師用伸九伐拯厥阽危協從天意若高麗泥首轅門自歸司寇即宜解縛焚櫬弘之以恩其餘臣人歸朝奉順咸加撫慰各安生業隨才任用無隔夷夏營壘所次務在整肅芻蕘有禁秋毫勿犯布以恩宥喻以禍福若其同惡相濟抗拒官軍國有常刑俾無遺類明加曉示稱朕意焉揔管一百一十三萬三千八百號二百萬其餽運者倍之癸未第一軍發終四十日引師乃盡旌旗亙千里近古出師之盛未之有也三月癸巳上御師甲子臨戎於遼水橋戊戍大軍為賊所拒不果濟右屯衛大將軍左光祿大夫麥鐵杖武賁郎將錢士雄孟金乂等皆死之甲午車駕渡遼大戰於東岸擊賊破之進圍遼東時諸將各奉旨不敢赴機既而高麗各城守攻之不下六月己未幸遼東責怒諸將止城西數里御六合城七月壬寅宇文述等敗績於薩水右屯衛將軍辛世雄死之九軍並陷將帥奔還亡者二千餘騎癸卯班師九月庚寅上至東都九年春正月丁丑徹天下兵募民為驍果集於涿郡二月戊寅幸遼東以越王侗民部尚書樊子蓋留守東都庚子北海人郭方預聚徒為盜自號盧公衆至三萬攻陷城大掠而去夏四月庚午車駕渡遼壬申遣宇文述楊義臣趣平壤五月丁丑熒惑入南斗己卯濟北人甄寶車聚衆萬餘寇掠城邑六月乙巳禮部尚書楊玄感反於黎陽丙辰玄感逼東都河南贊治裴弘策拒之反為賊所敗戊辰兵部侍郎斛斯政奔於高麗庚午上班師高麗犯後軍八月壬寅左詡衛大將軍宇文述等破楊玄感於閿鄉斬之餘黨悉平十年二月辛卯詔曰菆爾高麗僻居荒表鴟張狼噬侮慢不恭抄竊我邊陲侵軼我城鎮是以去歲出軍問罪遼碣殪長蛇於玄莬戮封豕於襄平扶餘衆軍風馳電逝追奔逐北徑踰沮水滄海舟楫衝賊腹心焚其城郭污其宮室高元伏鑕泥首送款軍門尋請入朝歸罪司寇朕以許其改過乃詔班師而長惡靡悛宴安鴆毒此而可忍孰不可容便可分命六師百道俱進朕當親執武節臨御諸軍秣馬九都觀兵遼水順天誅於海外救窮民於倒懸征伐以正之明德以誅之止除元惡餘無所問三月壬子行幸涿郡癸亥次臨渝宮親御戎服禡祭黃帝斬叛軍者以釁鼓秋七月甲子高麗遣使降囚送斛斯政上大悅八月己巳班師二月壬申上如東都其日大赦天下戊子入東都十二年七月甲子幸江都宮以越王侗光祿大夫假達太府卿元文都檢校民部尚書韋津右武衛將軍皇甫無逸右司郎盧楚等總留後事十三年二月己丑馬邑校尉劉武周殺太守王仁恭舉兵作亂北連突厥自稱定楊可汗庚寅賊帥李密翟讓等陷興洛倉越王侗遣武賁郎將劉長恭光祿少卿房崱擊之反為所敗死者十五六庚子李密自號魏公稱元年開倉以賑群盜衆至數十萬河南諸郡相繼皆陷焉五月甲子唐公起義師於太原丙寅突厥數千寇太原唐公擊破之秋七月壬子熒惑守積尸丙辰武威人李軌舉兵反攻陷河西諸郡自稱涼王建元安東八月辛巳唐公破武牙郎將宋老生於霍邑斬之十一月景辰唐公入京師辛酉遙尊帝為太上皇立代王侑為帝改元義寧帝在江都聞唐公舉兵動容者久之以手琢按曰渠有奇相渠得之矣如此者再三遂欲渡江幸丹陽時宿衛諸將皆是秦人各有懷土之志宇文化及因人之心與裴虔通作亂入犯宮闈宿衛皆走遂執帝將出示衆數以十罪復引帝入求鴆不得令狐行達牽帝使坐以練布縊之時年五十蕭后令宮人撤床簀為棺以埋之化及發後右禦衛將軍陳稜奉梓宮於成象殿葬吳公臺下發斂之始容貌若生衆咸異之唐平江南之後改葬雷塘初上自以蕃王次不當立每矯情飾行以釣虛名陰有奪宗之計時高祖雅信文獻皇后而性忌媵妾皇太子勇內多嬖幸以此失愛帝後庭有子皆不育之示無私寵取媚於后大臣用事者傾心與交中使至第無貴賤皆曲承顏色伸以厚禮婢僕往來者無不稱其仁孝又常私入宮掖密謀於獻后楊素等因機構扇遂成廢立
