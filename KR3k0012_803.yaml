body:
  text: 珍寶部一寶尚書湯誓曰遂伐三朡俘厥寶玉孔安國曰俘取也玉以禮神使無水旱之災故取而寶之誼伯仲伯作典寶二臣作典寶一篇言國之常寶也又盤庚曰無總于貨寶孔安國注曰無總貨寶以求位也又旅獒曰分寶玉于伯叔之國時庸展親孔安國注云以寶玉分同姓之國是用誠信親親之道弗寶遠物則遠人格不侵奪其利其來服所寶惟賢則邇人安寶賢任能則近人安近人安則遠人安也又顧命曰越玉五重陳寶於東西序坐北列玉五重又陳先王所寶之器物赤刀大訓弘璧琬琰在西序大玉夷玉天球河圖在東序胤之舞衣大貝鼖鼓在西房兌之戈和之弓垂之竹矢在東房皆歷代所傳之寶毛詩嵩高曰王遣申伯路車乘馬錫爾介圭以作爾寶寶瑞詩含神霧曰聖人受命必順斗張握命圖授漢寶宋均曰聖人謂高祖也受天命而王必順旋衡法故張良受兵鈐之圖命以授漢為珍寶也禮記檀弓曰南弓敬叔反必載寶而朝敬叔魯孟僖子常失位去魯得反載其寶來朝君也夫子曰若是其貨也喪不如速貧之愈也又曰天不愛其道地不愛其寶又曰儒有不寶金玉而以忠信為寶左傳莊公曰齊人來歸衛寶文姜請之也又莊公曰王及鄭伯入于鄭遂入成周取其寶器而還又文下曰宋昭公盡以寶行又襄公曰宋人得玉獻諸子罕子罕不受曰我以不貪為寶爾以玉為寶若與我皆喪寶也不若人有其寶也又昭六曰吳太子諸樊入鄖諸樊吳王僚之太子取楚夫人與其寶器以歸公羊傳僖公曰虞公貪而好寶及為晉所滅抱寶牽馬而去又定公曰盜竊寶玉大弓盜者何陽虎也史記曰趙簡子告諸子曰吾藏寶符於常山之上先得者賞諸子馳之常山上求無所得母恤還曰已得符矣登常山而臨代代可取也又曰晉使郤克以車八百乘伐齊陳于鞍於是晉軍追齊至馬陵齊侯請以寶器謝不聽必得笑克者蕭同叔子又曰魯昭公八年楚靈王就章華臺召昭公往焉賜昭公寶器已悔復詐取之又曰衛叔名封成王長用事舉康叔為周司冠賜衛寶祭器又曰秦逐客李斯書曰陛下致崑山之玉有隨和之寶乘明月之珠服太阿之劍乘纖離之馬建翠鳳之旗樹靈鼉之鼓此數寶者秦不生一焉而陛下說之又曰樂毅伐齊入臨淄盡取齊寶也又曰梁惠王與齊威王會田於梁問齊王亦有寶乎威王曰無有梁王曰若寡人國小尚有徑寸之珠照車前後各十二乘者十枚奈何以萬乘之國而無寶乎威王曰寡人以為寶與王異吾臣有檀子者使守南城則楚人不敢為寇東取泗上十二諸侯皆來朝吾臣有檀子者使守高堂則趙人不敢東漁於河吾更有黔夫者使守徐州則燕人祭北門趙人祭西門齊之北門也言燕趙之人畏其侵伐故祭以求福徙而從者七千餘家吾臣有種首者使備盜賊則道不拾遺將以照千里豈特十二乘哉梁惠王慚不懌而去梁或作魏字漢書曰沛公西入武關欲擊秦嶢下軍張良曰臣聞其將者賈豎子易動以利令酈食其持重寶啖秦將秦將果欲連和沛公乃擊秦軍大破之謝承後漢書曰鄭弘為鄒令縣人王逢得路遺寶物懸於衢道求主還之後漢書曰世祖遣衛尉銚期持珍寶繒帛賜隗嚚期至鄭被盜張璠漢記曰朱雋為郡吏太守尹端有罪應死雋為買珍寶賂主章吏端得免死范曄後漢書曰帝常召見諸郡計吏問其風俗及前後守令能不蜀郡計掾樊顯進曰漁陽太守張堪昔在蜀其仁以惠下威能討姦前公孫述破時珍寶山積捲握之物足富十世而堪去職之日乘折轅車布被而已帝聞良久歎息魏氏春秋載袁紹檄州郡文曰曹操父嵩乞丐攜養因贓假位輿金輦寶輸貨權門魏志曰陳泰為胸奴中郎將京邑貴人多寄寶貨因市奴婢泰皆掛於壁及徵為尚書悉以還吳志曰士燮為交址太守每遣使詣權致雜香細葛輒以千數明珠大貝琉璃翡翠玳瑁犀象之珍奇物異果蕉耶龍眼之屬無歲不至晉中興書曰姚萇試諸子謂曰吾有一寶物萬金不易汝等伎藝勝者吾以與之諸子皆索好馬欲於父前試之唯略不動萇以為賢故越諸兄立為嗣子晉安帝記曰桓玄尤愛珍寶常玩弄珠玉不離於手晉書殷仲文傳曰桓玄為劉裕所敗仲文隨玄西走其寶玩悉藏地中皆變為土晉書呂纂載記曰即序胡安據盜發張駿墓見駿貌如生得真珠簾琉璃榼白玉樽赤玉簫紫玉笛珊瑚馬鞭馬腦鍾水陸奇珍不可勝紀齊書曰始興王鑑鎮益州於州園地得古冢無復棺但有石槨銅器十種並古形玉璧三枚珍寶甚多不可皆識金銀為蠶形者數萬計又以朱砂為阜水銀為池左右咸勸取之鑑曰皇太子昔在雍有發古冢者得玉屏風玉匣之屬皆將還都吾意嘗不同乃遣功曹何佇之為起墳諸寶物一不得犯梁書曰羊侃大同中魏使陽斐與侃在比嘗同學有詔令侃延斐同賞賓客三百餘人食器皆金玉雜寶奏三部女樂至夕侍婢百餘人俱執金花燭崔鴻十六國春秋前趙録曰曜平陳安長驅至于西河張茂懼遣使稱蕃獻諸珍寶珠玉不可勝紀後魏書曰元乂既專政乃於禁中自別作庫掌握之寶充牣其中北史曰齊神武後以孝武帝后配彭城王孫韶魏室奇寶多隨后入韶家有二玉鉢相盛轉而不可出馬瑙榼三斗玉縫之皆稱西域鬼作也北齊書曰高德正嘗辭疾除冀州刺史即起顯祖怒禁門下其妻出寶物滿四床欲以寄人帝掩見大怒曰我府藏無此物詰其得由皆諸元賂之帝乃斬德正并妻子伯堅隋書曰開皇十二年突厥遣使獻七寶碗唐書曰師子國在西海之中出奇寶商賈到則不見人但置寶物價直於洲上寶依價質之而去以能養師子故以為國名又曰天寶中師子國遣婆羅門僧灌頂三藏來獻金寶瓔珞老子曰我有三寶保而持之一曰慈二曰儉三曰不敢為天下先輕敵則幾喪吾寶晏子春秋曰和氏之璧井里之朴耳良工修之則為荐國之寶孫卿子云井里之璞又云玉人琢之為天下寶魯連子曰楚王成章華臺酌諸侯酒魯君先至與之大曲之弓不琢之璧既而悔之伍舉見魯君曰大曲之弓不琢之璧楚王之寶也吳求之弗與舉兵伐楚魯懼奉而歸之墨子曰周公見申徒狄曰賤人強氣則罰至申徒狄曰周之靈圭出於土楚之明月出蚌五象出於汙澤和氏之璧夜光之珠三棘六里此諸侯所謂良寶也淮南子說山云周之簡圭産於石大象神龜出於溝壑孟子曰諸侯之寶三土地人民政事寶珠玉者殃必及身淮南子曰夫夏后氏之璜不能無考考班璺明月之珠不能無類夜光之珠白似月光故曰明月類若絲之有結類也然天下寶之者何也小惡不及妨大美傅子曰夫齎不資之寶獨宿曠野其危甚於纍卵比之秦猶泰山之安也戰國策曰周有砥厄宋有結緑梁有懸犁楚有和璞此四寶者玉之所美也已為天下名器國語曰晉定公享楚王孫圍趙簡子鳴玉以相問圍曰楚之白珩猶在乎為寶也幾何對曰未嘗為寶也楚有觀射父能作訓辭以行諸侯有左史倚相能道訓典以敘百物有夢曰雲金木竹箭之生也此楚國寶也若白珩先王之玩何寶焉夢澤也穆天子傳曰天子西征至陽紆之山河伯無夷所都是惟河宗氏乃至於崑崙之丘觀舂山之寶呂氏春秋曰世皆以珠玉為寶寶逾多而民逾貧失其所寶也陸賈新語曰聖人不用珠玉而寶其身也鹽鐵論曰汝漢之合鐵誘外國鉤羌胡之寶也說文曰琛寶也犍為舍人曰美寶為琛說苑曰經侯過魏左帶玉具劍右帶環佩左光照右右光照左太子不視又不問經曰魏國亦有寶乎太子曰主信臣忠百姓戴上此魏國之寶也經左解玉具右解佩委之而起阮子曰雖金玉滿堂明珠滿室飢不為寶非國之用新序曰晉平公浮西河中流而歎曰嗟乎安得賢士大夫與共此憂樂乎船人固桑對曰夫劍産於越珠産江漢玉産崑岡此三寶者皆無足而致今君茍好士則賢士至矣西京雜記曰武帝以七寶床雜寶案廁寶屏風列寶帳設於桂宮時人謂之四寶宮也又曰高祖入咸陽宮行庫藏見有琴長六尺十三絃二十六微皆用七寶飾之銘曰渥璵之樂漢武故事曰上雜錯天下珍寶為帳其次甲乙三輔黃圖曰金寶一銀二龜三貝四布寶五泉寶六凡寶貨六種二十八品地鏡圖曰夫寶物在城郭丘牆之中樹木為之變視柯偏有折枯是其候也視折枯所向寶在其方凡有金寶常變作積蛇見此輦便脫隻履若衣以擲之溺之即得凡藏寶忘不知處以大銅盤盛水著所疑地行照之見人影者物在下也又曰視屋上瓦獨無霜其下有寶藏蔡氏化清論曰經云寶者衆之所利也茍利其利害必存焉郭璞奏曰臣以為珍奇靡麗之物誠是玩弄之所寶然非經國之至寶張衡東京賦曰所貴惟賢所寶惟穀明皇雜録曰楊國忠驕奢僣侈之態復紛然未滿持盈公主玉葉冠虢國夫人夜光枕楊國忠鎖子帳皆希代之寶莫能計其直珠上說文曰珠蚌之陰精也尚書禹貢曰徐州厥貢淮夷蠙蛛淮夷二水出蠙蛛也周禮天官玉府曰若王合諸侯則共珠盤玉敦鄭玄曰敦盤類珠玉以為飾左傳哀公曰衛太叔疾出奔宋臣向為宋向魋臣納美珠焉與之城鉏城鉏宋邑宋公求珠魋不與由是得罪又哀下曰越圍吳晉趙鞅使楚隆告于吳王曰寡君之老無恤使陪臣隆敢展謝其不共展陳也黃池之役君之先臣志父得承齊盟曰好惡同之今君在難無恤不敢憚勞非晉國之所能及也使陪臣敢展布之王拜稽首曰寡人不佞不能事越以為大夫憂拜命之辱與之一簞珠簞小笥爾雅曰西方之美者有霍山之多珠玉焉霍山今在平陽永安縣東北也尚書考靈曜曰卯金出軫握命孔符赤用藏龍吐珠也鄭玄注曰藏祕也珠寶物俞道也赤漢將用天之祕道尚書考靈曜曰甲子冬至日月五緯俱起牽牛日月若編珠春秋保乾圖曰吐珠於澤誰能不含宋均注曰珠出於野澤之中誰能不含取以為寶也禮斗威儀曰王者政平德至淵泉則江海出明珠又戴禮曰玉居山而木能潤淵生珠而岸不枯韓詩外傳曰良珠度寸雖有百仞之水不能奄其耀也韓詩內傳曰漢女所弄珠如荊雞卵孝經援神契曰神靈滋液百寶用則珠母見珠母璣鏡宋均曰事神明得則大珠有光可以為鏡德至淵則海出名珠史記曰樂毅遺燕王書曰齊王遁走莒僅以身免珠玉財寶盡收入於燕又曰魏王與齊威王會田於郊魏王曰若寡人國小尚有徑寸之珠照車前後各十二乘者十枚奈何以萬乘國而無寶乎事具寶門又曰漢王賜張良金百溢白珠二升良具以獻項伯又曰鄒陽上書曰臣聞明月之珠夜光之璧以暗投人於道路人無不案劍相盻者何則無因而至前也漢書景帝詔曰黃金珠玉飢不可食寒不可衣吏發民若取黃金者坐贓為盜又曰董偃與母賣珠為事偃十三隨母養館陶公主家左右言其姣好召見曰吾為養之得幸又地理志曰武帝時使使入海市明珠到國圍二寸已下又曰霍光廢昌邑王太后被珠襦坐武帳召王伏前聽詔又曰成帝時王章死妻子皆徙合浦王商輔政曰還章妻子故鄉其家屬皆採珠致産數百萬范曄後漢書曰光武耳不聽鄭衛之音手不持珠玉之玩又曰董卓擅朝政呂布斬之長安中民悉賣珠玉市酒肉相慶填滿街肆又曰馬援在交址常餌薏苡實及軍還載之一車後有上書譖之者以為前所載還皆明珠文犀也司馬彪續漢書曰天笁國一名身毒出琉璃珠璣又曰扶風人士孫奮居富而性吝梁冀認奮母為其守藏婢云盜白珠十斛也後漢書曰珠蚌中陰精也玓瓅明珠色也璣珠不圓也夫餘出珠大如酸棗東觀漢記曰永建四年漢陽太守文礱獻大珠詔曰海內頗有災異而礱不推忠竭誠而喻明珠之瑞求媚今封珠卻還又曰顯宗時鍾離意為尚書時交址太守坐贓千金徵還伏法以其資物頒賜群臣意得珠璣悉以委地而不拜賜上怪而問其故對曰臣聞孔子忍渴於盜泉之水曾參回車於勝母之閭惡名也此贓穢之物誠不敢拜帝嗟嘆曰清乎尚書之言乃更以庫錢三十萬賜意又曰和熹后時新遭大憂法禁未設宮中亡大珠一篋主名不立太后乃親自臨見宮人一一間鬩察其顏色開示恩信宮人盜者即時首服謝承後漢書曰孟嘗為合浦太守郡俗舊採珠以易采先時二千石貪穢使人採珠積以自入珠忽徙去合浦無珠餓死者盈路孟嘗化行一年之間去珠復還又曰汝南李敬少時遷趙相奴於鼠穴中得繫珠及璫珥相連以問主簿主簿曰前相夫人昔亡珠不知所在疑其子婦竊之因去婦敬送珠付前相慚乃還去婦又曰豫章黃向辰步路中得珠琪一囊可直三百餘萬求主還之主欲以半物謝向向委去不顧也魏書曰卞皇后性儉約不尚華麗無文繡珠玉器皆黑漆太祖嘗得名璫數具命后自選一具后取其中者太祖問其故對曰取其上者為貪取其下者為僞故取其中者魏志曰文帝問蘇則曰前西域通使燉煌獻徑寸大珠可復求市得不則曰若陛下德流沙漠不求自至求而得之不足貴也帝默然又曰公孫淵以遼東叛遣田豫以本官督青州刺史程喜喜內懷不服軍事之際多相違錯喜知帝寶愛明珠乃密上豫雖有戰功而禁令寬弛所得器仗珠銀甚多放散不皆簿管由是功不見列又曰文帝作終制曰飯含無以珠玉無施珠襦玉押典略曰臨淄侯曹植與楊修書曰今世作者可略而言人人自謂握靈蛇之珠魏略曰大秦國出夜光珠真白珠夫餘出珠大如酸棗魏志曰東夷俗以瓔珠為財寶或以綴衣為飾或以懸頸垂耳至於袂不以金銀錦罽為珍又曰倭國女王一與遣大夫率善等獻真白珠五十孔青大勾珠二枚也蜀志曰秦密奏記益州牧劉焉薦儒士任定祖曰甫欲剖蚌求蛛今乃隨和炳然復何歎哉又曰宗預復東聘吳孫權握預手曰今君年長孤亦衰老恐不復相見遺預大珠一斛吳録地理志曰朱崖珠宮縣出明月珠又曰袁博字君遊為淮陵長其女得壞牆中璫珠百餘博封上之詔以賜博吳志曰魏文帝遣使以馬永易明珠翡翠權曰此皆孤所不用而可得馬何若而不聽其交易王隱晉書武帝詔曰御府內省珠玉玩好之物皆以賜王公也晉書陶璜自交州上表曰合浦郡土地墝埆無有田農百姓唯以採珠為業商賈去來以珠𧵍米而吳時珠禁甚嚴慮百姓私散好珠禁絶來去人以飢困又所調猥多限每不充今請上珠輸二次者輸一粗者蠲除自十月訖二月非採珠之時聽商旅往來如舊並從之晉令曰士卒百工不得服真珠璫珥沈約宋書曰文帝詔太史令錢樂之作小渾天安二十八宿中外以白真珠及青黃三色珠為三家星日月五星悉居黃道南史曰中天笁國在大月支東南數千里出火齊狀如雲母色如紫金有光耀列之則蟬翼積之則如紗穀之重沓也崔鴻十六國春秋前秦録曰建元十年正月懸珠簾於正殿後魏書曰爾朱世隆將敗洛中先謠曰三月末四月初陽灰簸土覔真珠至是並驗又曰畢衆敬以篤老乞還桑梓朝廷許之衆敬臨還獻真珠璫四具
