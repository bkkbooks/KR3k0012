body:
  text: 刑法部十七除名何法盛晉中興書曰胡毋崇為永康令多受貨賂政治苛暴詔都街頓鞭一百除名為民隋書曰賀若敦被除名每出怨言晉公護徵還令自殺臨刑呼子弼謂曰吾欲必平江南然此心不果汝當成之吾以舌死汝不可不思引錐剌弼舌出血誡以慎口又曰賀若弼坐免官弼怨望愈甚後數年下弼獄上謂之曰我以高熲楊素為宰相汝唱言云此二人唯堪啖飯耳是何意也弼曰熲臣之故人素臣之舅子臣並知其為人誠有此語公卿奏弼怨望罪當死上惜其功於是除名為民又曰高熲得罪除名為民潁初為僕射其母誡之曰汝富貴已極但有一斫頭耳爾其慎之潁由是常恐禍變及此潁歡然無恨色以為得免於禍又曰權武為潭州惣管晚生子與親客宴集酒酣遂擅赦所部內獄囚武帝以南越邊遠治從其俗務適便宜不依律令而每言當今法急官不可為上令有司案其事皆驗上大怒命斬之武於獄中上書言其父為武元皇帝戰死於馬前以此求哀由是除名為民晉律曰吏犯不孝謀殺其國王侯伯子男官長誣偷受財枉法及掠人和賣誘藏亡奴婢雖遇赦皆除名為民又曰除名比三歲刑又曰其當除名而所取飲食之用之物非以為財利者應罰金四兩以下勿除名晉潘嶽間居賦敘曰今天子諒暗之際領太傅主簿府誅除名為民俄而復官免官後漢書曰梁松遷太僕數為私書請託郡縣二年發覺免官遂懷怨望四年冬乃懸飛書誹謗下獄免宋書曰庾登之為司徒長史南東海太守府公彭城王義康專覽政事不欲自下厝意而登之性剛每陳己志義康不悅出為吳郡太守以贓貨免官又曰謝靈運在會稽亦多徒衆驚動縣邑太守孟顗因靈運撗恣表其異志靈運馳詣闕上表自陳本末文帝知其見誣不罪也以為臨川內史在郡遊放不異永嘉為有司遣使隨州從事鄭望生收靈運興兵叛逸遂有逆志為詩曰韓亡子房奮秦帝魯連恥本自江海人忠義感君子追討禽之送廷尉廷尉論上斬刑上愛其才欲免官而己彭城王義康堅執謂不宜恕詔以謝玄勳參微管宜宥及後嗣降死徙廣州晉律曰免官比三歲刑其無真官而應免者正刑召還也又曰有罪應免官而有文武加官者皆免所居職官又曰其犯免官之罪不得減也又曰其當免官者先上免官謂不聽應收治者也收贖書曰金作贖刑又曰墨辟疑赦其罰百鍰六兩曰鍰鍰黃鐵也劓辟疑赦其罰惟倍倍百為二百也剕辟疑赦其罰倍差倍差謂俗之文半為五百鍰宮辟疑赦其罰六百鍰大辟疑赦其罰千鍰國語曰桓公問齊國寡甲兵為之若何甲鎧兵弓矢之屬管仲對曰輕過而移諸甲兵諸之也謂輕其過使以甲兵贖罪制重罪贖以犀甲一戟重罪死罪犀犀皮可為甲戟戰戟也祕長二丈六尺輕罪贖以鞼劬位切盾一戟輕罪劓刖之屬鞼盾綴革有文加續小罪謫以金分小罪不入五刑者以金贖分兩之差今之罪金是也書曰金作贖刑也家語曰魯國之政法贖人臣妾於諸侯者皆取金於府子貢贖之而辭不取孔子聞之曰賜失之矣夫聖人舉事可以移風易俗而教導不可施於百姓非獨適身之行也今魯國富者寡貧者多贖人受之益金則為不廉則何以相贖乎自今已後魯人不復贖人法於諸侯矣漢書曰文帝常行中渭橋有一人聞蹕匿橋下久以為蹕過走出乘輿馬驚廷尉張釋之奏犯蹕當罰金帝怒曰賴吾馬和柔他馬已傷敗我廷尉乃罰金耶又曰張敞上書論死刑以下出粟贖罪以給軍用蕭望之以為父兄囚執子弟將不顧死亡之患敗亂之行以赴財利求救一人得生十人以喪且富者得生貧者獨死刑法不一也又曰禹貢上言孝文皇帝時貴廉潔賤貪行賈人贅壻及吏坐贓者皆禁錮不得為吏無贖罪之法欲令禁止海內大化武帝始臨天下尊賢用正開地廣境日見功大遂縱嗜欲乃行一時之變使犯法者贖罪入穀者補吏是以官民貧盜賊並起又曰衛青為太中大夫元光六年拜為車騎將軍擊胸奴出上谷公孫敖出代郡李廣出鴈門敖以七千騎廣為虜所得得脫歸皆當斬贖為庶人又曰趙食其祋栩人也祋丁外切栩許羽切為右將軍從大將軍出定襄迷失道當斬贖為庶人又曰博望侯張騫郎中令李廣俱出右北平異道胸奴左貢王將數萬騎圍廣廣與戰二日騫至胸奴引兵出騫坐行留當斬贖為庶人又曰右衛將軍蘇建亡軍獨身脫還贖為庶人後漢書曰孝明時詔亡命自殊死以下贖死罪縑四十匹左趾至髡鉗城旦舂十匹定城旦至司寇五匹犯罪未發覺詔書到日自告者半入贖晉書曰王宏有政績後為河南尹苛碎坐桎梏罪人以泥墨塗面置深坑中餓不與食又擅縱五歲刑以下二十人為有司所劾帝以宏纍有功績聽以贖論又曰烈王無忌閔王承之子也承為荊州剌史王廙所害江州剌史禇褒當之鎮無忌及丹陽尹桓景等餞於版橋時王廙子丹陽丞耆之在坐無忌志欲復讎拔刀將手刃之褒景命左右救捍獲免御史中丞車灌奏無忌欲專殺人付廷尉科罪成帝詔曰王當以體國為大豈可尋繹由來以亂朝憲主者其申明法令自今已往有犯必誅於是聽以贖論齊書曰到撝永明元年為御史中丞車駕幸丹陽郡宴飲撝恃舊酒後狎侮同列謂庾景之蠢爾蠻荊其俗鄙復謂虞悰曰斷髮文身其風陋王晏既貴雅步從容又問曰王散騎復可故爾晏先為國常侍轉員外散騎郎此二職清華所不為故以此嘲之王敬則執榠查以刀子削之又曰此非元徽頭何事自喫之為左丞庾景之所糾以贖論唐書曰後魏起自北方屬晉室之亂部落漸盛其主乃峻刑法每以軍令從事人乘寬政多以違令得罪死者以萬計於是國落騷然其後當死者聽其家獻金馬以贖會稽典録曰楊矯為右丞詣南宮取急案條閣舊事於復道中逢太常羊柔不避車又下矯糾奏柔以為知丞郎應行威儀有序九列外官而公干犯請廷尉治柔罪詔勿治以三月俸贖罪晉律曰其年老小篤癃病及女徒皆收贖又曰諸應收贖者皆月入中絹一匹老小女人半之又曰贖死金二斤也又曰失贖罪囚罰金四兩也又曰以金罰相代者率金一兩以當罰十也禁錮傳曰楚共王即位將為陽楊橋之役使屈巫聘于齊且告師期巫臣盡室以行遂奔晉晉人使為刑大夫子反請以重幣錮之禁錮勿令仕王曰其自為謀也則過矣其為吾先君謀也則忠忠社稷之固也所蓋多矣蓋覆也旦彼若能利國家雖重幣晉將可乎言不許若無益於晉晉將棄之何勞錮焉又曰會於商任錮欒氏也禁錮欒盈使諸侯不得受之二十二年會於沙隨復錮欒氏也晉知樂盈在齊故復錮也後漢書曰河內張成善說風角推占當赦遂教子殺人李膺為河南尹督促收捕既而逢宥獲免膺愈懷憤疾竟案殺之初成以方伎交通宦官帝亦頗訊其占成弟子牢循因上書誣告膺等養太學遊士交結諸郡生徒更相驅馳共為部黨誹訕朝廷疑亂風俗於是天子震怒班下郡國逮捕黨人布告天下使同忿疾遂收執膺等其辭所連及陳實之徒二百餘人或有逃遁不獲皆懸金構購募使者四出相望於道明年尚書霍諝城門校尉竇武並表為請帝意稍解乃皆赦歸田里禁錮終身而黨人之名猶書王府熹平五年永昌太守曹鸞上書大訟黨人言甚方切帝省奏大怒即詔司隸益州檻車收鸞送槐里獄掠殺之於是又詔州郡更考黨人門生故吏父子兄弟其在位者免官禁錮爰及五屬謂斬縗齊縗大功小功緦麻也又韓稜初為郡功曹太守葛興中風病不能聽政稜陰代興視事出入二年令無違者興子嘗發教欲署吏稜拒執不從因令怨者章之章謂令上章告言之事下案驗吏以稜掩蔽興病專典郡職遂致禁錮顯宗知其忠後詔特原之又曰第五倫上疏云三輔論議者至云以貴戚廢錮當復以貴戚浣濯之猶解酲當以酒也病酒曰酲詖險趍勢之徒誠不可親近齊書曰王晏弟詡位少府卿勑未登黃門郎不得畜女伎詡與射聲校尉陰玄知坐畜伎免官禁錮十年勑特原典略曰馬騁在東觀十六年以為久費精思非養生之道擅去離署免官禁六年崔鴻前燕録曰遼東內史宋該舉侍郎韓偏為孝廉慕容俊令曰夫孝廉者道德沉敏責之王庭偏往助叛徒迷固之罪及王威臨討憑城醜詈此則勃之甚奈何舉之該下吏可正四歲刑偏行財祈進虧亂王典可免官禁錮終身晉令曰犯免官禁錮三年鄭玄別傳曰玄病篤與益恩書曰吾預黨禁錮十四年也
