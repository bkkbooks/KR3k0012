body:
  text: 文部八御製下唐書曰德宗製中書麟德殿會百寮觀新樂詩仍令皇太子書以示百寮其序曰朕聞天地之德莫大於和萬物以生九功乃敘是以中春之首紀為令節布陽和之政暢亭育之功式宴且歡順時而舉蓋取象於交泰之義也今歲華載陽嘉雪呈慶君臣同樂實獲我心近以聽政之餘參比音律播於絲竹韻於歌詩象中和之容作中和之樂教習甫就畢陳于茲於是闢廣庭臨內殿張大會示群臣千載成文威儀有序禮洽歡浹中心是嘉上下之志通乾坤之理得善固未盡和莫甚焉聊復成篇以言其志詩曰芳歲肇佳節物華當仲春乾坤既昭泰煙景含絪縕德淺荷玄貺樂成思治人前庭列鍾鼎廣殿延群臣八卦隨意舞五音傳曲新顧非咸池奏庶叶南風薰式宴禮所重浹歡情必均同和諒在茲萬國希可親又曰貞元六年二月戊辰朔中和節宴百寮於曲江亭上賦詩賜之曰東春變梅柳萬寓生春光中和紀月令方與天地長耽樂豈子尚懿茲時景良庶遂亭育恩同致寰海康君臣永終始交泰符陰陽曲沼水新碧華林桃稍芳勝賞信多歡戒之在無荒又曰貞元六年春三月庚子百寮宴於曲江亭上賦詩以賜之曰歲閏節華晚衆芳繁暮春霽日天地晴元巳風景新禊飲傳舊俗古今歡此辰至樂在同和絲竹奚所陳薰琴是賞心姑射可凝神何必尚耽湎浮觴曲水濱又曰貞元七年秋七月癸酉上幸章敬寺賦詩序皇太子在侍進和兼題干壁百寮畢和以班列焉其後京兆尹薛玨請皇太子書上詩序刻石而填之以金又曰貞元九年春正月庚辰朔上御含元殿受朝賀禮畢上賦退朝觀軍仗歸營詩以示宰臣曰獻歲視元朔萬邦咸在庭端旒揖群后回輩閲師貞分行左右出轉斾風雲生眷此戍旅節載嘉良士誠順時頒宴賞亦以助文經又曰貞元十年秋九月戊子以重陽日宴餞賜百寮追賞初九日以雨罷宴及是方會宴上賦詩以賜百官曰雨霽霜氣肅天高雲日明繁林已墜葉寒菊仍舒榮懿此秋節晚更延遐賞情池臺列廣宴絲竹傳新聲至樂非外獎浹歡同中誠庶敦朝野意永使風化清又曰德宗至自興元御宣政殿册拜李晟為司徒上思晟勳力為製紀功碑俾皇太子勒于石立於渭橋與天地悠久方多不載又曰德宗以馬燧平河中詔賜上所撰宸扆台衡二銘并序曰朕每讀上古之事及唐虞之際君臣相得聖賢同時日夕孜孜講論至道或陳其鑒戒或諷以詠歌煥乎典謨百代之式有以見啓沃之道理化之端意甚慕之而未能逮也頃鹽節度杜希全著文上獻多所規陳聊為君臣針用答其意河東等道副元帥司徒燧固請勒石貽厥後人朕以文既非工義又未備垂諸來裔良所恧焉起豫者商因之有作庶乎朝夕自警且俾後代知我有文武殿邦之臣也其宸扆銘曰天生蒸人性本元淳嗜欲交馳利害紏紛無主乃亂樹之以君九域茫茫萬情云云目不備覩耳難遍聞覩之聞之矧又非真事失其源道遠莫親理得其要化行如神失源惟何不正其身得要惟何在能任人正身之方先誠其意罔從爾欲罔載爾偽體道崇德本仁率義必信若寒暑無私象天地感而遂通百慮一致任人之術各當其器捨短從長理難求備多士揔集衆材咸遂知而必任任而勿二以天下之目為我鑒我鑒斯明以天下之心為我謀我謀則智求賢惟廣辨理惟精逆耳咈心必嘉乃誠順旨茍容亦察其情斥去姦庾全固忠貞先人立言為代作程諤諤者昌唯唯者傾繫以興亡曷云其輕承天子人夫豈不貴伊昔哲王夙夜祇畏馭朽為戒納隍在志神將害盈天匪假易四海為家夫豈不富伊昔哲王勤儉固陋土階罔飾露臺罷構遠奇技淫巧放珍禽怪獸敬之慎之天命必祐欲令必行順人之情欲誠必著清己之慮心無億詐事必忠恕凡將有為靡不三思喜怒以節動靜以時毫釐或差禍害亦隨慢易於初悔其曷追刑不可長武不可恃作威逞力厲階斯起垂旒蔽聰黈䌙塞耳含弘光大是以為美覆之如天愛之如子仁心感人率土自理嗟余寡昧嗣守丕圖寇戎薦興德化未敷業業兢兢其敢以愈俯察物情上稽典謨作斯式言置于座隅其台衡銘曰天列台星垂象於人聖人則天亦立輔臣以翼以佐為衡為鈞如耳目應心如股肱運身是則同體孰云非親陰陽相推四序成歲君臣相得萬邦作乂感同風雲應若符契以道匡救盡規獻替木必從繩金其用礪帝者之盛時惟陶唐乃聞疇咨仄陋明揚洎乎有虞二八騰芳爰逮伊尹相于成湯載生薑牙諒彼武王道無不臧君聖臣賢運泰時康漢高既興簫曹亦彰昭烈我祖膺期而昌剗滅群凶砥平四方惟衛及英啓闢封壃維綱亦有魏徵忠謇昂昂茲衆材為國棟梁蕩蕩巍巍邦家有光是知道之廢興繫于時主主之得失資乎台輔經之以文緯之以武出為方邵入作申甫絶維載張闕袞斯補惟德是倚惟才是求才不易知德亦難周傳説板築夷吾射鉤任之不疑千載垂休體於至公何鄙何讎其惟哲王必賴良弼矧子不德暗於理術師旅繁起政刑多失遘茲艱屯夙夜祇栗翊我戴我實惟勳賢內熙庶績外揔十連威武載楊謀猷日宣長城壓境巨艦濟川同心同德扶危持顛子嘉爾誠爾相子理惟后失道亦臣之恥自昔格言慎終如始功載鼎彝道冠圖史無俾伊夔克專厥美作鑒勒銘永代是紀尋有詔命勒石於起義堂西偏上為題額又曰貞元二十二年上以聽政之餘深思理本乃著刑政針并序序曰朕以南面勵精理道雖及和平之際未臻玄古之風夙夜孜孜勤求不怠夫安人以政輔政以刑蓋為之立中非使人從欲也是以務兼聽以酌群情擇庶官以咨共理恆勉不足而遏其過我欲仁矣尚逮夫意哉然萬務是殷必戒其失聽政之暇常志所存聊綴斯文庶乎自警爾大朴既散利欲是生惟辟御時建極作程導以仁政齊以典刑惠此下人致之和平立政伊何必循道德詳刑伊何必去煩刻不以人從欲不以枉傷直故百度惟貞萬物作式匪陽不生匪陰不成寬則致慢猛亦取怨酌于大猷戒厥偏見罔咈人志罔興人患邇言必察芻蕘必詢奉無私之心以誠其意廣無情之聽思得其真喜怒有節措置有倫是以令肅如秋化行如春無邇憸人無信側言憸人則敗政側言乃惑聽罔攻異端慎乃出令知人不易在觀其行事實求理法乃因時法非生斃聖哲不為導物類之情以通其變相天地之道咸盡其宜教必明於順動必慮於違是以天覆之德日用不知六馬並馳在鈞銜策五音並奏在理金石茍去回邪可行蠻貊因人而理自古不易唐堯赭服夏禹泣辜以弼于理冀遷其愚寧漏吞舟豈求噬膚陷之於過是曰毒痛天監孔明無自無聲罔載爾偽必先爾誠蟻壤不防太山可傾患生所急禍起所輕故作事謀始而戒於未形子臨兆人道存化育祇荷玄貺幸清九服一夫不獲若履深谷思正其源庶登於撲監于往躅書以自勗又曰杜希全將赴靈州獻體要八章多所規諫德宗深納之乃著君臣針以賜之其詞曰惟天惠人惟辟奉天從諫則聖共理惟賢皇立有極駿命不易揔萬機以成務齊六合之殊致一心不能獨鑑一目不能周視敷求哲人式序在位於戲君之任臣必求一德臣之事君咸思正直何啓沃之所宜亙古今而未得良以讜言者逆耳讒諛者伺側故下情未通而上聽已惑俾夫忠賢敗於凶慝譬彼涇舟蒸徒楫之亦有和羹宰夫膳之孰云理國不自得師覆車之軌豫其懲而高以下升和由甘受惟君無良亦臣之咎聞諸辛毗牽裾魏后則有禽息竭忠碎首勉思獻替以平可否勿謂無傷自微而彰勿謂何害積小成大事有隱而必見令既出而焉悔鼓鍾在宮聲聞于外浩然涉水朕未有艾將貞扆以虛心期盡忠而納誨在昔稷契實匡舜禹近茲魏徵佑我大祖君臣叶德混一區宇肆豫寡昧獲纘丕緒臣哉鄰哉爾翼爾輔高秋始肅我武惟揚輟此禁衛殿于大邦戀聞方甚嘉言乃昌是規是諫金玉其相詞高理要入德知方總彼千慮備于八章宣父有言起豫者商殷有盤銘周有欹器或誡以詞或警以事披圖演義發于爾志與全鏡而高懸將座右而同置人皆有初鮮慎厥終汝其夙夜明保朕躬無曰爾身在外而爾誠不通一言之應千里攸同導彼遐俗達余四聰華夷仰德時乃之功既往既來懷賢忡忡唱豫和汝式示深衷又曰貞元中上賜群臣會宴于曲江上令中使劉希昂宣慰上賜詩曰令節曉澄霽四郊煙靄空天清白露潔菊散黃金叢寡德荷玄貺順時休百工豈懷歌鍾樂思與君臣同至化在亭育相成資始終未知康衢詠所仰唯年豐又曰張建封來朝覲還鎮德宗賜詩曰牧守寄所重才賢生為時宣風自淮甸授鉞膺藩維入覲展遐戀臨軒慰來思忠誠在方寸感激陳情詞報國爾所尚恤人子是資歡宴不盡懷車馬當還期穀雨將應候行春猶未遲勿以千里遙而云無己知又曰貞元十八年九月賜宰臣及中書門下兩省官宴于故馬璘池亭御製豐年多慶九日示懷詩以賜群臣曰爽氣肅時令早衣聞朔鴻重陽有佳節具物欣年豐皎潔暮潭色芬敷新菊叢芳樽滿衢室繁吹凝煙空惠洽信吾道保和惟爾同推誠致玄化天下期為公又曰憲宗以天下無事留意典墳每覽前代興亡得失之事皆三復其言又讀貞觀開元實録見太宗撰金鏡書及帝範上下篇玄宗撰開元訓誡思繼前躅遂採尚書春秋後傳史記班范漢書三國志晉書晏子春秋吳越春秋新序説苑等書君臣行事可為龜鏡者集成十四篇一曰君臣道可合二曰辨邪正三曰戒權幸四曰戒微行五曰任賢臣六曰納忠諫七曰慎征伐八曰慎刑法九曰去奢泰十曰崇節儉十一曰獎忠直十二曰修德政十三曰諫畋獵十四曰録勳賢分為上下卷上自製其目曰前代君臣事迹至是以其書寫於屏風列之御座之右復遣中使程文幹以書屏六扇至中書宣示宰臣李藩裴垍曰朕近撰此屏風常所觀覽故令暫將示卿藩等上表稱賀又曰文宗嘗夏日與學士聯句帝曰人皆苦炎熱我愛夏日長柳公權續之曰薰風自南來殿閣生微涼帝嘉之又曰裴度臥疾文宗遣中使賜度詩曰注想待元老識君恨不早我家柱石衰憂來學丘禱又曰文宗開成中駕幸龍首池觀內人賽雨自春不雨上孜孜憂勤遍禮群望至是甘澤屢降中外感悅上賦喜雨詩云風雲喜際會雷雨遂流滋薦弊虛陳禮動天實精思漸侵又夏節復在三春時霡深垂朱闕飄颻入緑墀郊埛既霑足黍稷有豐期百辟同憂樂萬方佇雍熙宰臣洎文武百官咸有屬和家語曰昔者舜彈五弦之琴造南風之詩其語曰南風之薰兮可以解吾民之慍兮薰風至之貌也南風之時兮可以阜吾民之財兮時得其時阜盛穆天子傳曰丙辰天子南遊于黃室之丘天子乃休曰中天子北風雨雪有凍人天子作詩三章以哀民哀愍也我徂黃竹員閟塞閟閉也帝收九行九行九道也傳曰經啓九道嗟我公侯百辟冢卿皇我萬民皇正也旦夕勿忘恆念也我徂黃竹員閟寒帝收九行嗟我公侯百辟冢卿皇我萬民旦夕勿窮有皎者鵒鵒鳥名音路翩翩其飛嗟我公侯勿則遷居樂其寡言守一居少樂不如遷土居無求安也禮樂其民言當以禮樂化其民天子曰余一人則淫淫于遊樂不皇萬民漢武帝集曰奉車子侯暴病一日死上甚悼之乃自為歌詩西京雜記曰始元元年黃鶴下太液池上為歌曰黃鶴飛兮下建章羽肅肅兮行蹌蹌金為衣兮菊為裳唼喋荷荇出入蒹葭自顧菲薄愧爾嘉祥漢武帝柏梁詩曰日月星辰和四時梁王曰驂駕駟馬從梁來於是群臣各賦一句魏文帝典論自敘曰初平之元董卓弒主鴆后蕩覆王室是時家家思亂人人自危名豪大俠富宇強族飄揚雲會萬里相赴袞豫之師戰於滎陽河內之甲軍於孟津卓遂遷大駕西都長安而山東大者連郡國中者嬰城邑小者聚阡陌百姓死亡暴骨如莽時余年五歲上以世方擾亂教余學射六歲而知射又教余騎馬八歲而能騎射矣是以少好弓馬于今不衰建安十年始定冀州獩貊貢良弓燕代獻名馬時歲之暮春弓燥手柔草淺獸肥與族兄子丹獵于鄴西終日手獲麞鹿九雉兔三餘又學擊劍桓靈時有虎賁王越善斯術河南史何得其法於越余從何學之甚精嘗與平虜將軍劉勳奮威鄧展共飲展有手臂曉五兵法其能空手入白刃時酒後耳熱方食蔗以蔗為枚下殿數交三中其臂左右大笑展意不平更求為之復正截其顙坐中驚視余還坐笑曰昔陽慶使淳于意去其敵方授以祕術余亦願鄧將軍損棄故伎更受要道也一坐盡歡余於它戲弄之事少所喜唯於彈棊略盡其巧少為之賦上雅好書籍雖在軍旅手不釋卷每定省從容常言人少學則思專長則善忘長大而能勤學者唯吾與袁伯業耳余是以習詩論及此而備歷五經四部史漢諸子百家之言靡不畢覽魏文帝芙蓉池詩曰乘輦夜行遊逍遙步西園雙渠相灌溉佳木繞通川卑枝拂羽蓋修條摩蒼天驚風扶輪轂飛鳥翔我前丹霞夾明月華星出雲間上天垂光彩五色一何鮮壽命非松喬誰能得神仙遨遊快心意保己終百年魏文帝遊宴詩曰置酒坐飛閣逍遙臨華池神飆自遠至左右芙蓉披緑竹映清水秋蘭被幽崖月出照園中冠佩相追隨客從南方來為我吹參差潛魚猶伏浦聽者未云疲高文一何綺小儒安足為肅肅廣殿陰雀聲愁北林衆賓還城邑何以慰吾心
