body:
  text: 學部九講説廣雅曰講讀也説文曰講和解也易曰麗澤兌君子以朋友講習論語曰德之不修學之不講聞義不能徙不善不能改是吾憂也漢書曰夏侯勝每講常謂諸生曰士病不能明經經術茍明其取青紫如俯拾地芥學經不明不如歸耕又曰孔光居公輔位前後十七年時會門下大生講問疑難舉大義其弟子多成就為博士又曰董仲舒治春秋孝景時為博士下帷講誦弟子以次授業或莫見其面又曰班伯為中常侍成帝方嚮學鄭寬中與張禹朝夕入説尚書論語於金華殿中詔伯授焉又曰元帝時少府五鹿充宗貴幸為梁丘易充宗乘貴辨口諸儒莫能與抗皆稱疾不敢會有薦朱雲者召入攝齋升堂抗首而説音動左右既論難連柱五鹿君文穎曰柱閣也諸儒為之語曰五鹿嶽嶽朱雲折其角由是為博士遷杜陵令又西京雜記曰長安有儒生惠莊聞朱雲折五鹿充宗之角乃歎息曰繭栗犢反能爾耶吾終恥溺死溝中遂褁糧從雲雲與言莊不能對逡巡而去拊心語人曰吾不能劇談此中多有人東觀漢記曰朱祐字仲先初光武學長安時過朱祐祐嘗留上須講竟乃談語乃車駕幸祐家問主人得無去我講乎又曰建初四年詔諸儒會白虎觀講五經同異又曰桓榮為博士顯宗即位乘輿幸太常府令榮坐東面設几杖會百官數百人天子親自執業又曰桓榮拜議郎入侍太子每朝會輒令榮於公卿前敷奏經書帝稱善又曰顯宗親於辟雍自講所制五行章句已復令桓郁説一篇上謂郁曰我為孔子卿為子夏起我者商也又問郁曰子幾能傳學郁曰臣子皆未能傳覺孤兄子一人學方起上曰努力教之有起者即白之又曰楊政字子行治梁丘易與京兆祁聖元同好俱名善説京師號曰説經鏗鏗楊子行論難僠僠祁聖元又周舉字宣光姿貌短陋而博學洽聞為儒者所宗京師語曰五經縱撗周宣光也又曰井丹字大春通五經時人謂之語曰五經紛綸井之大春又陳囂字君期明韓詩時語曰關東説詩陳君期又曰魯平字叔陵兼通五經關東號曰五經復興魯叔陵也又曰賈逵字景伯能講左氏及五經本文以大小夏侯尚書教授諸儒為之語曰問事不休賈長頭後漢書曰鄭玄西入關因涿郡盧植事扶風馬融融門徒四百餘人升堂者五十餘生融素驕貴玄在門下三年不得見乃使高業弟子傳授於玄玄日夜尋誦未嘗怠倦會融集諸生考論圖緯聞玄善算乃召見於樓下玄因質諸疑義問畢辭歸融喟然謂門人曰鄭生今去吾道東矣又盧植於馬融受學融列女樂於前植侍講積年未曾轉眄馬融是以敬之又曰大將軍袁紹總兵冀州造使要鄭玄大會賓客玄最後至乃延升上座玄身八尺飲酒一斛秀眉明目容儀溫偉紹客多豪俊見玄儒者未以通人許之競設異端百家互起玄依方辨對咸出問表皆得所未聞莫不嗟服謝承後漢書曰董春字紀陽少好學究極聖旨後還歸立精舍遠方門徒學者常數百人諸生每升講堂鳴鼓三通撗經捧手請問者百人追隨上堂難問者百餘人又曰戴馮字次仲徵拜郎中公卿大會群臣就席馮獨立世祖問之對曰博士説經皆不如臣坐居臣上是以不得就席正旦朝賀帝令群臣説經義有不通輒奪其席以益通者馮重五十席京師諺曰解經不窮戴侍中後漢書曰丁鴻字孝公少好尚書十六能論難永平中引見説文侯一篇賜衣被章帝會諸儒白虎觀上善鴻難説號之曰殿中無雙丁孝公魏書曰文帝初在東宮氛癘大起時人凋傷帝深感難與素所敬者大理正郎書云人生有七尺之形死為一棺之土唯立德揚名可以不朽其次莫如著篇籍疫癘數起士人凋落余獨何人能全其壽故論撰所著典論詩賦蓋百餘篇集諸儒於肅成門內講論大義侃侃無倦晉書曰鄭玄為散騎常侍光祿勳嘉平三年拜司空及高貴鄉公講尚書沖執經親授沈約宋書曰魏齊王每講肆經通輒使太常釋奠先聖先師於辟雍又曰元嘉十五年徵雷次宗至京師開館聚徒授教使丹陽尹何尚之立玄學太子率更令何承天立史學司徒參軍謝元立文學凡四學並建之梁書曰中宗於敬賢殿講老子僕射王褒執經百僚皆預講席中宗談折摙辨間以嘲謔在座者相顧解頤又曰沈峻字士嵩武康人也博通五經尤長周禮時吏部郎中陸倕與僕射徐勉書薦峻曰凡聖可講之書必以周官立義然則周官一書實為群經源本此學不傳多歷年所唯助教沈峻特精此書比日開講群儒劉巖沈熊之徒皆執經下座北面受業莫不歎服人無間言也又伏曼傳曰宋明帝好周易常集朝臣於清暑殿講詔曼容執經曼容素美風采明帝恆以方嵇叔夜使吳人陸探微畫叔夜像以賜之為尚書外兵郎嘗與袁粲罷朝會言玄理時論以為一臺絶又曰盧黃范陽涿人少明經有儒術天監中歸梁位步兵校尉兼國子博士遍講五經時北來人儒學者有崔靈恩孫詳蔣顯並聚徒講説而音辭鄙拙唯廣言論清雅不類北人僕射徐勉兼通經術深相賞好後為尋陽太守武陵王長史卒官又曰賀琛字國寶幼孤伯父瑒授其經業一聞便通義理瑒異之常曰此兒當以明經致貴瑒卒後琛家貧常往還諸暨敗栗以養母雖自執舟楫間則習業尤精三禮年二十餘瑒之門徒稍從問道初瑒於鄉里聚徒教授四方受業者三千餘人瑒天監中亡至是復集琛矣琛乃築室郊郭之際茅茨數間年將三十便事講授既世習禮學究其微精占術先儒吐言辨潔坐之聽受終日不疲後周書梁晉熙郡王蕭大圜當元帝時以世多忌恐讒訴生焉乃屏絶人事門客左右不過三兩人不妄遊狎恆以講詩書易為事梁元帝嘗自問五經要事數十條大圜辭約指明應答無滯梁元帝甚歎美之因曰昔河間好學爾既有之臨淄好文爾亦兼之然東平為善彌高前載吾重之愛之爾當效焉北史曰後魏元善遷國子祭酒上嘗親臨釋奠令善講孝經於是敷陳義理兼之以諫上大悅曰聞江陽之説更起朕心賚絹一百匹衣一襲又曰盧景裕博通經典齊文襄入相於第開講招延時俊令景裕解所注易景裕理義精微吐發間雅時有問難或相詆訶大聲厲色言至不遜而景裕神彩儼然風調如一從容往復無際可尋由是士君子嗟羡之後周書曰呂思禮東平壽張人也性溫潤不雜交遊年十四受學於徐遵明長於論難諸生為之語曰講書論易鋒難敵隋書曰後齊將講於天子先定經於孔父廟置執經一人侍講二人執讀一人擲句二人録義六人奉經二人講之旦皇帝服通天冠玄紗袍乘象略至學坐廟堂上講訖還便殿改服綘紗袍乘象輅還宮講畢以一太牢釋奠孔父配以顏回列軒懸樂六佾舞行三獻禮畢皇帝服通天冠綘紗袍升阼即座宴畢還宮皇太子每通一經亦釋奠又曰馬光為太子博士嘗因釋奠高祖親幸國子學主公已下畢集光升座講禮啓發章句已而諸儒生以次論難者十餘人皆當時碩學光剖析凝滯雖辭非俊辨而理義引贍論者莫測其淺深咸共推服上嘉而勞焉又曰元善通博在何妥之下然以風流醞藉俯仰可觀音韻清明聽者忘倦由是為後進所歸妥每懷不平心欲屈善因善講春秋初發題諸儒畢集善私謂妥曰名望已定幸無相苦妥然之及就講肆妥遂引古今滯義以難善多不能對善深銜之二人由是有隙唐書曰太宗幸國子學視釋奠祭酒孔頴達講孝經右庶子趙弘智問之曰夫子門人曾閔俱稱大孝而今獨為曾説不為閔説何耶答曰曾孝特優門人不能逮也制旨駮之曰朕聞家語云昔曾晢使曾參鋤瓜而誤斷其本晳怒授大杖以擊其背參手撲地絶而後蘇孔子聞之告門人曰參來勿內既而曾子請焉孔子曰舜之事父也使之常在側欲殺乃不可得小箠則受大杖則走今參誤於父委身以待暴怒陷父於不義不孝莫大焉由斯而言孰愈於閔子騫也頴達不能對太宗又謂侍臣曰諸儒各生異意皆非聖人論孝之本旨也夫孝者善事父母自家刑國忠於其君戰陳勇朋友信揚名顯親此之謂孝具在經典而論者多離其文逈出事外以此為教勞而非法何謂孝之道耶語林曰劉真長與桓公宣武共聽講禮記桓公云時有入心處便覺咫尺玄門殷氏世傳曰殷亮建武中徵拜博士諸儒講論勝者賜席亮重至八九三國典略曰東魏崔暹子達拿年十三暹令儒者教其説周易兩字乃集朝貴名流達拿升高坐開講趙郡睦仲讓陽屈服之暹大悅擢仲讓為司徒中郎鄴下為之語曰解義兩行得中郎
