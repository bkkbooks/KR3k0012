body:
  text: 禮儀部二十七杖屨儀禮喪服曰苴杖竹也削杖桐也各齊其心皆下本杖者何爵也非爵而杖者何擔主也非主而杖者何輔病童子何不杖不能病也婦人何以不杖不能病也又曰斬齊裳菅屨者菅菲也公士大夫之衆臣為其君繩屨者繩菲也疏襄裳齊疏屨者藨蔗蒯之菲也禮記喪服小記曰虞杖不入室附杖不升堂鄭玄注曰哀益襄敬多也婦人不為主而杖者姑在為夫杖姑不厭婦母為長子削杖嫌服男子當杖竹也母為長子服不可以重於子為己也女子子在室為父母其主喪者不杖則子一人杖女子子在室亦童子也無男昆弟使同姓為攝主不杖則子一人杖謂長女也許嫁二十而笄笄為成人成人正杖也又喪服小記曰庶子不以杖即位下適子也位朝夕哭位也父不主庶子之喪則孫以杖即位可也祖不厭孫孫得神也父在庶子為妻以杖即位可也舅不主妾之喪子得神也又雜記上曰古者貴賤皆杖叔孫武叔朝見輪人以其杖關轂而輠輪者於是有爵而后杖也又喪大紀曰大夫之喪三日之朝既殯主人主婦室老皆杖大夫有君命則去杖大夫之命則輯杖內子為夫人之命去杖為世婦之命授人杖大夫有君命去杖此指大夫之子也而云大夫者通實大夫有父母之喪也授杖與使人執之同也士之喪二日而殯三日之朝主人杖婦人皆杖於君命夫人之命如大夫於大夫世婦之命如大夫士二日而殯者下大夫也士之禮死與往日生與來日此二日於死者亦得三日也婦人皆杖謂主婦容妾為君女子子在室者子皆杖不以即位才謂凡庶子也不以即位與去秋同也大夫士哭殯則杖哭柩則輯杖哭殯謂既塗也哭柩謂啓後也大夫士之子於父父也尊近哭殯可以杖子哭諸侯之子於父父也君也尊遠杖不入廟門也棄杖者斷而棄之於隱者杖以喪至尊為人得而褒之又問喪曰或問曰杖者何也怪其義各異曰竹桐一也故為父苴杖竹也為母削杖削桐也言所以杖者義一也顧所用異耳或問曰杖者以何為也怪所為施曰孝子喪親哭泣無數服勤三年身病體羸以杖扶病也言得杖乃能起也則父在不敢杖矣尊者在故也堂上不杖辟尊之處也堂上不趨示不遽也此孝子之志也人情之實也禮義之經也非從天降也非從地出也人情而已矣父在不杖謂為母也尊者不杖辟尊渚之處不杖有事不趨皆為其感動使之憂歲也矣又喪服四制曰杖者何也爵也三日授子杖五日授大夫杖七日授士杖或曰擔主或曰輔病婦人童子不杖不能病也白虎通曰所以杖竹桐何取其名也竹戚也桐痛也父以竹母以桐竹陽也桐陰也竹斷而用之質故為陰也韓子曰儒執喪三年大毀扶杖世主以為孝而禮之幗髽儀禮喪服曰女子子在室為父布總箭笄髽襄三年總束髽也謂總者既束其本又總其未箭篠也髽露紒也猶男子之括髽以麻則髽上用麻也用麻者自頭交額上卻繞紒如若幧頭小記曰男子冠而婦人笄男子免而婦人髽但言襄不言裳者婦人不雖裳也又曰女子子之適人者為其父母婦人為舅姑惡笄有首以髽卒哭子折笄首以笄布總傳曰笄有首者惡笄之有首也惡笄者櫛笄也折笄首者折吉笄之首也吉笄者象笄也禮記檀弓上曰南宮縚之妻之姑喪孔子誨之髽曰爾無從從爾爾無扈扈爾誨教也爾汝也縱縱謂太高扈扈謂太廣爾助語又檀弓上曰魯婦人之髽而弔自敗於臺鮐也時家家有喪髽而相弔去纚而紒曰髽也禮記外傳曰髽者婦人有喪者髽古人重髽男子吉時皆有縱以韜其髽然後加笄加冠也去纚而髽曰髽魯婦人遭升陘之戰也露髽相弔以代喪冠也有麻髽女子在室遭父母之喪用麻合髽以對兄弟括髽時也有布髽齊襄已下以布束髮也髽者開散之名也既去有縱髽形葩髽左傳襄公曰臧紇救魯侵邾敗於狐駘國人逆喪者皆髽魯於是乎始髽髽麻髮合結也遭喪者多故不能備凶服髽而已廣雅曰幗謂之帺音忌魏氏春秋曰諸葛亮挑司馬宣王戰致巾幗婦人之飭以怒宣王廬周禮天宮宮正曰掌王宮之戒令大喪則授廬舍辨其親踈貴賤之居鄭玄注曰廬舍堊室也親者貴者居倚廬踈者踐者居堊室儀禮喪服傳曰喪服斬襄居倚廬寢苦枕塊馬融曰倚木以為廬於東墻下西向開北端也禮記雜記曰大夫居廬士居堊室又喪大記曰父母之喪居倚廬不塗寢苫枕凷非喪事不言君為廬宮之大夫士禪之宮謂圍障既葬柱楣塗廬不於顯者君大夫士皆宮之不於顯者不塗見面又曰問喪成壙而歸不敢入處室居於倚廬哀親之在外也白虎通曰父母之喪倚廬於中門外東牆下戶北又曰婦人不居倚廬天子七日諸侯五日卿大夫三日而成服居門外東壁為廬王肅喪服要記曰魯哀公葬父孔子問曰寧設菰廬乎哀公曰菰廬起太伯太伯出奔聞古公崩還赴喪故作菰廬以彰其尸吾父無太伯之罪何用此為孝子傳曰王琳汝南上蔡人十歲失父母弟季年七歲兄弟二人哭泣哀聲不絶在冢側作廬不妄出入餘見孝部重儀禮士喪禮曰重木刊鑿之甸人置重于中庭參分庭一在南夏祝取鬻餘飯盛用二鬲于西牆下冪用疏布久之擊用靲懸于重冪用葦席北面左衽帶用靲賀之結于後祝取銘置于重鄭玄曰重木也懸物也馬曰重木也刊斫治之也鑿之為懸簪孔士重木長三尺也禮記雜記曰重既虞而埋之就所倚處里之禮記外傳曰重者未葬之前以代主也猶以生事之未忍作木主主以存神也設重於庭懸瓦鬲以養病之米淅之為沐則煮之為粥實之重用葦席蓋之鬼神依而飲食始死之奠但用但未有黍稷故也黍稷在下之中如生時也殷人作主之後聯其重懸之於廟梁去高祖之廟親盡則埋之周人將葬重隨柩而朝廟之外柩而埋之於階間而後作主也凶門南史孔琳之議曰凶門柏裝不出禮典起自末代積習生常遂成舊俗兄人士喪儀多出閭里每有此須動十數萬損人財力而義無所取至於寒庶則人思自竭雖復室如懸磬莫不傾産殫財所謂葬之以禮其此之謂乎宜一罷凶門之式王肅喪服要記曰魯哀公葬父孔子問寧設襄門乎哀公曰襄門起於禹禹治水故表其門閭以紀其功吾父無功何用此焉韋弘與蔡謨箋問凶門曰父在母喪應立凶門不又問與父別止立凶門愚意猶所疑厭於父故也今於父大門之內別立凶門便為父一家有二門以名義言之門者父之有也今子復立門豈合聖人之典訓茍不出於禮其所不曰故以咨白蔡答曰禮以二瓦器盛始死之祭擊木襄之葦席置於庭中近南名為重今之凶門是其象也禮既虞而作主今未有主故以重當主本為喪設非以表其門恐不應以尊卑厭降也禮命士以上父子異宮今卑私之喪皆別開門亦不知今人如此者皆有凶門不范堅答凶門問曰簿帳似不出禮文何由行此答曰凶門非禮禮有縣重於庭以席覆之其形似凶門後出之於門外表喪由比俗遂行之耳禮論曰問改葬立凶門否蔡謨答云改葬若停喪謂應有凶門死周禮春官大宗伯四以喪禮哀死亡禮記曲禮上曰天子曰崩諸侯曰薨大夫曰卒士曰不祿庶人曰死鄭玄注曰山巔壞曰崩薨崩之聲也卒終也不祿不充其祿也死之言澌也精神澌盡也死寇曰兵異於凡人當饗祿其後也壽考曰卒短折曰不祿老而死從大夫之稱少而死從士之稱也又檀弓下曰孔子過太山側有婦人哭於墓者而哀使子路問之曰子之哭也一似重有憂者而曰然昔者吾舅死於虎吾夫又死焉今吾子又死焉夫子曰何為不去也曰無苛政夫子曰小子識之苛政猛於虎也又喪大記曰男子不死於婦人之手婦人不死於男子之手君夫人卒於路寢大夫世婦卒於適寢內子未命死於下室士之妻死於寢左傳定下曰齊侯伐晉敝無存之父將室之辭以與其弟曰此役也不死反必娶於高國先登求自門出死於霤下又哀上曰簡子巡列曰畢萬匹夫也七戰皆獲有馬百乘死於牖下畢萬晉獻公卿也死於牖下言得壽中群子勉之死不在寇言有命也又哀下曰太子聞之懼下石乞盂壓敬子路以戈擊之斷纓子路曰君子死冠不免結纓而死孔子聞衛亂曰柴也其來乎由其死矣又哀下曰晉荀瑤帥師圍鄭人浮酅魁壘賂之以知政閉其口而死穀梁傳隱公曰高厚曰崩尊曰崩天子之崩以尊之也其崩之何也以在民上故崩之也春秋説題辭曰天子曰崩崩之為言殞也諸侯稱薨薨之為言奄然而亡大夫曰卒精輝終卒卒之為言絶絶於邦也士曰不祿失其忠也不祿之言削名章也庶人曰死魂魄去心死之為言精爽窮也白虎通又載爾雅曰崩薨無祿卒殂落殪死也論語里仁曰子曰朝聞道夕死可矣言將至死不聞世之有道又子罕曰子疾病子路使門人為臣病間曰久矣哉由之行詐也且豫與其死於臣之手也無寧死於二三子之手乎且豫縱不得大葬豫死於道路乎又先進曰顏淵死子曰噫天喪豫天喪豫子哭之慟從者曰子慟矣曰有慟乎非夫人之為慟而誰為又先進曰季路曰敢問死曰未知生焉知死鬼神及死事難明語之無益故不答又季氏曰齊景公有馬千駟死之日民無德而稱焉伯夷叔齊餓于首陽之下民到于今稱之五經通義曰崩薨從何王以來乎曰從周何以言之尚書曰放勳乃殂落舜曰陟方乃死武王既王是以知武王以前未稱崩薨也至成王太平乃制崩薨之著尚書曰翌日乙丑成王崩釋名曰漢以來謂死為物故言其諸物皆就朽故史記曰秦武王與孟説舉龍文鼎絶臏而死徐廣曰臏或作脈矣又曰范睢説秦昭王曰夫以烏獲任鄙之力荊成孟賁許慎曰荊成勇士也孟賁衛人慶忌夏育之勇焉而死者人之所必不免也後漢書曰馬援謂孟冀曰方今胸奴烏丸尚擾北邊欲自請擊之男兒要當死於邊野以馬革褁尸還葬耳何能臥床上在兒女子手中耶冀曰諒為烈士當如此矣後魏書曰張預每羡古人餐玉之法乃採訪藍田躬往攻掘得若環璧雜器形者大小百餘至而觀之皆光潤可玩預乃椎七十枚為屑日服食之餘多惠人後乃聞者更求玉於故處皆無所見馮翊公源懷等得其玉琢為器珮皆鮮明可寶預服延年云有效驗而世事寢食皆不禁節又加之好酒損志及疾篤謂妻子曰服玉若能屏居山林棑棄嗜欲或當大得柛力而吾酒色不絶自致於死非藥過也然吾尸體必當有異勿使速殯令後人知餐服之妙時七月中旬長安毒熱預停尸四宿而體色不變其妻常氏以玉珠二枚唅之口閉常謂之曰君自云餐玉有神驗何故不受唅也言訖齒啓納珠因噓屬其口都無穢氣舉斂於棺堅直不傾委死猶有遺玉屑數升囊盛納諸棺中文子曰老子曰聖人同死生愚人亦同死生聖人之同死生知於分理也愚人同死生不知利害所在莊子曰人之生氣也聚則為生散則為死又曰夫大塊載我以形勞我以生佚我以老息我以死故善吾生者乃所以善吾死也又曰莊子之楚見空髑髏髐然有形檄以馬捶因而問之曰夫子貪生失理而為此乎將子有亡國之事鈇鉞之誅而為此乎於是語卒援髑髏枕而臥夜半髑髏見夢曰子之談者似辨士諸子所言皆生人之纍也死則無此矣子欲聞死之説乎莊子曰然髑髏曰死無君於上無臣於下亦無四時之事縱然以天地為春秋雖南面王樂不能過也説苑曰齊景公出而見殣謂晏子曰此何死對曰餧而死公曰噫寡人之無德也亦甚矣晏子曰君之德著而不彰何為無德景公曰何謂也對曰君之德及後宮與臺榭之玩君之鴈食以菽粟君之宮內自樂延及後宮之族何為其無德也顧臣有請於君由君之意自樂之心推與百姓同之則何殣之有又曰子貢問孔子人死有知將無知也孔子曰吾欲言死人有知也恐孝子妨生以送死也吾欲言死人無知也恐不孝子孫棄親不葬也賜欲知人死有時將無知也死徐自知之猶未晚也又曰魯哀公問孔子曰有智者壽乎對曰然人有三死而非命也者人自取之也夫寢處不時飲食不節勞逸過度者疾共殺之居下位而上干其君嗜酒欲物而求不止者刑共殺之少以犯衆弱以侮強忿怒不量力者兵共殺之此三死者非命也又曰民有五死聖人能去三不能除其二飢渴死者可去也凍寒死者可去也雖五兵死者可去也壽命死者不可去也癰疽死者不可去也三者可去二者不可去論衡曰人之死也猶火之滅也而耀不照人死而智不慧二者不齊論者猶謂死有知惑也又曰王莽之時省五經章句皆為二十萬慱士弟子郭略夜定舊説死於燭下精思不任脈絶氣滅也楊泉物理論曰人含氣而生精盡而死猶澌也滅也譬如火焉薪盡而火滅則無光矣故滅火之餘無遺炎矣人死之後無遺魂矣
