body:
  text: 器物部一器皿説文曰皿飲食之用器也盛黍稷在器中也齊黍稷之器以祀者盧飯器也鐈巨招反似鼎而長足鏖一刀切溫器也方言曰器破而不殊其音謂之𤺊音西聲也器破而未離謂之璺音問南楚之間謂之𢻹凡以器盛而滿謂之涌與恐切言涌出也通俗文曰金銀鏤飾器謂之錯鏤竹器謂之笭箵笭郎鼎切箵桑鼎切竹器邊緣曰匴先管切書曰遲任有言曰人惟求舊器非求舊惟新言人貴舊器貴新又曰武王既勝殷邦諸侯班宗彝作分器賦宗廟彝器酒鐏賜諸侯禮曰孟春之月其器疏以達孟夏之月其器高以粗孟秋之月其器廉以深孟冬之月其器閎以掩又曰侍食於君君賜餘器之溉者不寫陶淬之器其餘皆寫雚行之器又曰作奇巧之器以疑衆殺宗廟之器不鬻於市錦文珠玉成器不鬻於市又曰玉不琢不成器人不學不知道論語曰工欲善其事必先利其器史記曰舜陶於河濱器不苦窳以主切舜作什器於壽丘又曰通邑大都木器髹者千伏徐廣曰髹音休漆也漢書曰木器千伏銅器千鈞素木鐵器千石此亦千乘之家也又曰武帝有故銅器李少君曰此器齊桓公十年陳於柏寢案其刻果然漢書曰賈誼言夫天下大器也今人之置器置諸安處則安置諸危處則危天下之情與器無以異在天子之所置之又曰里諺曰欲投鼠而忌器此善諭也鼠近於器尚憚不投恐傷其器況於臣之近主乎又曰罽賓國以金銀銅錫為器續漢書曰桓帝祠老子於濯龍用淳金釭器魏氏春秋曰武王過故人呂伯奢家聞其動食器之聲疑其圖己是夜手劍殺八人後魏書曰獠鑄銅為器大口寬腹名曰銅既薄且輕易於熟食晉令曰欲作漆器物賣者各先移主吏者名乃得作皆當淳漆著布器器成以朱題年月姓名車頻秦書曰符堅建元十八年新平縣民耕地獲玉器初有金雕者頗知圖記王猛以為左道勸堅誅之雕臨死表堅曰新平地古顓頊墟其故有白雞閭記言此里應出古帝王寶至是果得之家語曰孔子觀於魯桓公之廟有欹器焉孔子問於守廟者曰此為何器曰此蓋宥坐之器孔子曰吾聞宥坐之器者虛則欹中則正滿則覆顧謂弟子曰試注水焉即挹水而注之中而正滿而覆虛而欹孔子喟然而歎曰鳴呼物焉有滿而不覆者乎老子曰埏埴以為器當其無有器之用韓子曰堯有天下飯於土軌飲於土鉶舜作食器斬山木而材之削踞修其迹流漆墨其上諸侯以為益侈國之下伏者十三禹作為祭器黑漆其外朱畫其內觴酌有采而樽俎有飾殷人食器雕琢觴酌刻鏤淮南子曰崑崙旁有九井玉橫橫或作彭器名也受不死藥世説曰晉武帝嘗際王武子供饌悉用琉璃器涼州異物志曰方外殊珍車渠馬瑙器無常形為時之寶隨其大小以作盂碗杯槃也視之目眩希世之巧羅剎所作非人所造羅利鬼遠外國巧成器物與人交市非人能所造地鏡圖曰銅器之屬見其狀如望馬輝輝然齊器之見為牛楚器之見為馬越器之見為蝦蟆宋器之見為白狗秦器之見為豚燕器之見為豕揚雄蜀都賦曰雕鐫扣器百伎千工魏武內誡令曰孤有逆氣病常儲水臥頭以銅器盛臭惡前以銀作小方器人不解謂孤喜銀物令以木作鼎爾雅曰鼎絶大謂之鼐圓弇上謂之鼎附耳外謂之才鼎説文曰鼎三足兩耳和五味之寶器也昔禹貢九牧之金鑄鼎荊山之下民入山林川澤魑魅蝄蜽莫能逢之易曰鼎元吉亨彖曰鼎象也九四鼎折足覆公餗六五鼎黃耳金鉉利貞上九鼎玉鉉大吉無不利詩曰鼐鼎及鼒大鼎謂之鼐小鼎謂之鼒周禮曰王一日三舉鼎十有二物皆有俎牢鼎九陪鼎三禮曰故衛孔悝乏鼎銘曰六月丁亥公假于太廟公曰叔舅乃祖莊叔左右成公成公乃命莊叔隨難干漢陽即宮于宗周奔走無射啓右獻公獻公乃命成叔纂乃祖服乃考文叔興舊嗜欲作率慶士躬恤衛國其勤公家夙夜不解民咸曰休哉公曰叔舅子女銘若纂乃服悝拜稽首曰對揚以辟之勤大命施于蒸彝鼎施猶著也言我將行君之命又刻著於蒸祭之彝鼎也又曰崇鼎貫鼎夫子之器崇貫皆國名左傳曰宋華父督殺殤公召莊公于鄭而立之以郜大鼎賂公郜國所造器也四月取郜大鼎于宋納于太廟非禮也臧哀伯諫曰武王克商遷九鼎于洛邑義士猶或非之而況將昭違亂之賂器於太廟其若之何公弗聽又曰楚子伐陸渾之戎遂至于雒定王使王孫蒲勞楚子楚子使問鼎之大小輕重焉對曰在鼎不在鼎昔夏之方有德也遠方圖物貢金九牧鑄鼎象物桀有昏德鼎遷于商商紂暴虐鼎遷于周德之休明雖小重也其姦固昏亂雖大輕也天祚明德有所底止成王定鼎于郟鄏卜世三十卜年七百天所命也周德雖衰天命未改鼎之輕重未可問也又曰魯襄公享晉六卿賄荀偃束錦加壁乘馬先吳壽夢之鼎壽夢吳子也獻鼎於魯因以為名又曰晉叔向謂晏子曰然雖吾公室今亦季世也君日不悛以樂慆憂公室之卑其何日之有讒鼎之銘曰昧旦丕顯後世猶怠讒鼎鼎銘也況日不悛其能久乎又曰楚薳啓強曰是以聖王朝聘有圭享眺他弔切有璋宴有好貨飧有陪鼎飧饔飧也熟食為飧陪加也加鼎所以厚殷勤之又曰鄭人鑄刑書鑄刑書於鼎以為國之常法又曰宋正考父佐戴武宣三命茲益恭故其鼎銘云鼎正考父之廟鼎也一命而僂再命而傴三命而俯循墻而走亦莫余敢侮饘於是粥於是以糊余口又曰鄭子産聘于晉晉侯有疾韓宣子逆客私焉曰寡君寢疾於今三日矣並走群望有加而無瘳今夢黃熊入於寢門其何厲鬼也對曰昔堯殛鯀于羽山其神化為黃熊以入羽淵實為夏郊三代祀之晉為盟主其或未之祀也乎韓子祀夏郊晉侯有間賜子産莒之二方鼎方鼎莒所貢又曰楚子次於乾溪僕析父從右尹子革夕王語曰昔我先王熊繹與呂仍王孫牟燮父禽父並事康王四國皆有分器我獨無有今吾使人於周求鼎以為分器王其與我乎對曰與君王哉今周與四國服事君王將唯命是聽豈其愛鼎又曰齊侯伐徐徐人行成賂以甲父之鼎甲父古國名也又曰晉趙鞅荀寅率師城汝濱遂賦晉國一鼓鐵以鑄刑鼎刑書之鼎著范宣子所為刑書焉穀梁傳曰桓公二年夏四月取郜大鼎于宋戊申納于太廟郜鼎者郜之所為也孔子曰器從邑名從主人故曰郜大鼎史記曰黃帝採首山銅鑄鼎於荊山下鼎既成有龍垂胡髯下迎黃帝又曰伊尹欲干湯而無由乃為有莘氏媵臣負鼎俎以滋味説湯致於王道又曰周末有九鼎徙秦氏曰太丘社亡而鼎沒于泗水彭城下其後百一十五年而秦兼天下始皇二十八年過彭城齋戒禱祀欲出周鼎使千人沒水求之不得又曰秦武王與孟説舉龍文之鼎絶臏而死又曰孝文帝時新垣平言周鼎亡在泗水中今河溢通泗臣望東北汾陰直有金寶氣意周鼎其出乎兆見不迎則不至於是上使使治廟汾陰南臨河欲祠出周鼎漢書曰項羽身長八尺二寸目重瞳力能扛鼎又曰漢得汾陰寶鼎武帝嘉之藏於甘泉群臣上壽賀陛下得周鼎廬丘壽王曰非周鼎上怒對曰周德始乎后稷成於文武上天報應鼎為周出名曰周鼎今漢自高祖繼周至陛下功德愈盛天瑞並是至昔秦始皇欲出鼎於彭城而不得天祚有德而寶鼎自出此天之所以與漢是漢鼎非周鼎也上曰善又曰主父偃曰丈夫生不五鼎食死則五鼎烹又曰宣帝時美陽得鼎獻之京兆尹張敞上議曰案鼎有刻書曰王命尸臣官此㧦邑賜爾旗鸞黼黻雕弋李奇曰雕鏤也尸臣拜稽首曰敢對揚天子丕顯休命此鼎殆周之所以褒賜子孫刻銘其先功藏之于宮廟也又曰質氏以灑削而鼎食東觀漢記曰廬江獻鼎詔召鄭衆問齊桓公之鼎在柏寢臺見何書春秋左氏有鼎事幾衆對狀除為郎中後漢書曰孝明帝永平六年二月王雒山出寶鼎廬江太守獻之詔曰祥瑞之降以應有德方今政化多僻何以致茲易曰鼎象三日豈公卿奉職得其理耶太常其以初祭之日陳鼎於祖廟以備器用賜三公帛五十匹九卿二千石半之晉中興書曰成帝咸和元年宣城春榖山崩得古鼎重三百斤容可三斛餘郡官畢賀又曰神鼎見神鼎者仁器也能輕能重能息能行不炊而沸不汲自盈煙熅之氣自然所生也亂則藏於深山文明應運而至故禹鑄鼎以擬之晉陽秋曰穀城人劉圭夜見門有光取得玉鼎沈約宋書曰秦始七年義陽獲銅鼎受一斛并蓋並隱起鏤戰國策曰秦興師於周求九鼎顏率謂齊王曰周之君臣內自畫計與秦不若歸之大國願大王圖之齊王發師救周秦兵罷率至齊曰願獻九鼎不識大國何塗之從而致之齊王曰寡人將寄塗於梁對曰不可梁之君臣欲得九鼎謀之灘徒旱切臺之下少海之上其日久矣
