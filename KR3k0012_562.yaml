body:
  text: 禮儀部四十弔周禮喪祝曰王弔則與巫前鄭司農注云喪祝與巫以桃茢執戈在王前又司巫曰男巫王弔則與祝前女巫后弔則與祝前女巫鉍況前后如王之禮又太僕曰太僕掌三公孤卿之弔勞王使往也小臣掌士大夫之弔勞禮曰知生者弔知死者傷知生而不知死弔而不傷知死而不知生傷而不弔弔喪不能賻弗問其所費又曰將軍文子之喪既除喪而後越人來弔主人深衣練冠待于廟垂涕洟子遊觀之曰將軍文氏之子其庶幾乎亡於禮者之禮也其動也中中禮之變也又曰死而不弔者三謂輕身亡孝也畏人或時以非罪攻己不能有以説之死之者孔子畏於國是也猒行止危險之下溺不乘橋船又曰曾子弔於負夏負夏衛也主人既祖填池祖謂移柩車去載處為行始也填池當為奠徹聲之誤奠徹遣奠設祖奠推柩而反之反於載處榮曾子弔欲更始降婦人而后行禮禮既祖而婦人降今反柩婦人辟之復升堂矣柩無反而反之又降婦人蓋欲矜賓於此婦人皆非也從者曰禮與怪之曾子曰夫祖者且也且未定之辭且胡為其不可以反宿也曾子襲裘而弔子遊裼裘而弔曾子指子遊而示人曰夫夫也為習於禮者如之何其裼裘而弔也又曰哀公使人弔簣尚遇諸道辟於路畫宮而受弔焉哀公魯君也畫地為宮象曾子曰蕢尚不如𣏌梁之妻知禮也齊莊公襲莒于奪𣏌梁死焉其妻迎其柩於路而哭之哀莊公使人弔之對曰君之臣不免於罪則將肆諸市朝而妻妾執肆陳尸地大夫以上於朝士以下於市執拘也君之臣免於罪則有先人之敝廬在君無所辱命無所辱命辭不受也春秋傳曰齊侯弔諸其室又曰季孫之母死哀公弔焉曾子與子貢弔焉閽人為君禮弗內也閽人守門者曾子與子貢入於其廄而修容焉更鼎飾子貢先入閽人曰鄉者已告矣既不敢止以言下之曾子後入閽人辟之見兩賢相隨彌益恭也涉內霤鄉大夫皆辟位公降一等而揖之又曰殷既封而弔周反哭而弔封當為空窆下棺也孔子曰殷已愨吾從周又曰曾子與客立於門側其徒趍而出徒謂客之旅曾子曰爾將何之曰吾父死將出哭於巷以為不可發凶於人館曰反哭於爾次次舍也禮館人使專之若其自有然曾子北面而弔焉又曰五十無車者不越疆而弔人氣力始勷又曰婦人不越疆而弔人不通於外行弔之日不飲酒食肉焉以全哀也弔於葬者必執引若從柩及壙皆執紼示助之以力車曰引棺曰紼喪公弔之必有拜者往謝之雖朋友州里舍人可也謂旡主後弔曰寡君承事示亦為執事來主人曰臨君辱臨其臣之喪君遇柩於路必使人弔之君於民臣有父母之恩大夫之喪庶子不受弔不以賤者為有爵者主又曰子張死曾子有母之喪齊襄而往哭之或曰齊襄不以弔以其無服非之曾子曰我弔也與哉於朋友哀痛甚而往哭之非若凡弔又曰晉獻公之喪秦穆公使人弔公子重耳獻公殺其子申生重耳避難出奔是時在翟就弔之且曰寡人聞之亡國恆於斯得國恆於斯言在喪代之際雖吾子儼然在憂服之中喪亦不可久也時亦不可失也孺子其圖之勸其反國意欲納之喪亡失位孺徲也以告舅犯舅犯是重耳之舅狐偃也字子犯舅犯曰孺子其辭焉喪人無寶仁親以為寶寶謂善道可守者仁親親行仁義父死之謂何又因以為利欲反國求為後是利父死而天下其孰能説之孺子其辭焉説猶解也又曰羔裘玄冠夫子不以弔不以吉服弔喪也又曰衛司徒敬子死子夏弔焉主人未小斂絰而往子遊弔焉主人既小斂出絰反哭子夏曰聞之也與曰聞諸夫子主人未改服則不絰又曰曾子問曰三年之喪弔乎孔子曰三年之喪練不群立不旅行君子禮以飾情三年之喪而弔哭不亦虛乎為彼哀不專於其親也為親哀則是妄弔又曰諸侯非問疾弔喪而入諸臣之家是謂君臣為謔又曰弔者即位于門西東面其介在其東南北面西上於西門賓立門外不當門主孤西面立於阼階下相者受命曰孤某使某請事客曰寡君使某如何不淑受命受主人命必出也不言殯者喪無接賓淑善也如何不善言君痛之甚使某弔相者入告出曰孤某須矣稱其君名者君薨稱子某使人知通嗣也須矣不出逆也弔者入主人升堂西面弔者升自西階東面致命曰寡君聞君之喪寡君使某如何不淑子拜稽顙弔者降反位子孤子也降反位者出反門外位又曰婦人非三年之喪不踰封而弔踰封越竟也或為越疆又曰諸侯弔於異國之君則其君為主君為之主弔臣恩為己也子不敢當主中庭北面哭不拜諸侯弔必皮辨錫襄所弔雖已葬主人必免主人未喪服則君亦不錫襄必免者尊人君為之變也未喪服未成服也既殯成服又曰殷人弔於壙周人弔於家示民不偝也既葬哀而哭踊於是弔之傳曰宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱臧文仲曰宋其興乎禹湯罪己其興也勃焉桀紂罪人其亡也忽焉又曰齊侯歸遇𣏌梁之妻於郊梁戰死妻行迎喪使弔之辭曰殖之有罪何辱命焉言若有罪不足弔若免於罪則有先人之敝廬在下妾不得與郊弔婦人無外事故下猶賤也齊侯弔諸其室傳善婦人有禮又曰遊吉相鄭伯以如晉亦賀虒祁也史趙見子太叔曰甚哉其相蒙也蒙欺也可弔也而又賀之子太叔曰若何弔也豈特唯我賀將天下實賀又曰琴張間宗魯死琴張孔子弟子字子開名牢將往弔之仲尼曰齊豹之盜而孟縶之賊女何弔焉言齊豹所以為盜孟縶所以見賊皆由宗魯又曰晉頃公卒秋八月葬鄭遊吉弔且送葬魏獻子使士景伯詰之曰悼公之喪子西弔子蟜送葬在家十五年今吾子無二何故漢書曰龔勝死有老父來弔其哭甚哀既而曰吁薰以香自燒膏以明自消龔生竟夭天年非吾徒也又曰蔣許自元卿遭父憂有弔者盈門後母疾之不與席不得止舊廬於側作小菴往如舊也續漢書曰郭太字林宗退身隱居教授徒衆甚盛喪母友人或千里來弔之東觀漢記曰祭遵病薨喪至河南詔遣百官皆詣喪所上車駕素服往弔望城門舉音遂哭而至哀慟復幸城門遇喪車瞻望涕泣上親臨祠以太牢儀如孝宣帝臨霍將軍故事謝承後漢書曰徐孺子不就諸公之辟及有喪者萬里赴弔常於家預炙雞一隻以一兩綿絮浸酒中暴乾以褁雞徑到所赴冢遂以水漬綿使有酒氣以雞置前祭畢便去王隱晉書曰何劭為司徒薨養子歧為嗣袁粲弔歧歧辭以疾粲獨笑而出曰今年決下歧品王詮謂之曰知死弔死何必見生歧前多罪爾時不下今何公新亡便下歧品人謂中正畏強侮弱粲乃止也鄧粲晉紀曰阮藉能為青白眼禮俗之士輒以白眼對之宗正嵇喜康之兄也聞藉喪弔焉籍以不哭見其白眼喜不懌而退也晉中興書曰周嵩兄顗既被害王敦便入弔嵩嵩曰亡兄天下之罪人為天下所殺復何弔敦甚銜之家語曰季桓子死魯大夫朝服而弔子遊問孔子曰禮乎孔子不答他日又問孔子曰始死則羔裘玄冠者易之而已又何疑焉又曰孔子有母之喪既練陽虎弔焉私於孔子曰今季氏將大饗境內之士聞諸乎曰丘弗聞之雖在襄絰亦欲與往陽虎曰子謂不然乎季氏饗士不及子禮統曰弔生曰唁弔死曰弔生謂之唁何非有喪之位哭之事但嗟嘆以言故謂之嗟弔死謂之弔何弔者毒也致有恩厚禮無服屬但致傷哀痛毒故謂之弔白虎通曰檀弓記曰天子哭諸侯爵辨純衣又曰遣大夫弔辭曰皇天降災子獨遭離之鳴呼哀哉莊子曰孔子圍於陳蔡之間七日不火食太公任弔之曰幾死乎曰然子惡乎曰然任曰直木先伐甘井先竭子其意者飾智以驚愚修身以明汙昭昭乎若揭日月而行故不免又曰莊子妻死惠子弔之則方箕踞鼓盆而歌曰察其始本無生非徒無生也本無形非徒無形也本無氣變而有生今變而之死人且寢於巨室我噭噭隨而哭之自以為不通乎命故止之又曰老聃死秦失弔之三號而出弟子曰非夫子之友耶曰然然則弔焉若此可乎曰然始也吾以為其人也而今非也向吾入而弔焉有老者哭之如哭其子少者哭之如哭其母彼其所以會之必有不蘄言而言不蘄哭而哭者是遁天倍情忘其所受淮南子曰北塞上之人有喜遊者其馬無故亡入胡中人皆弔之其父曰此何知乃不為福居數月其馬將胡駿馬而歸人皆賀之其父曰此何知乃不為禍家富良馬其子好騎隨馬而折髀人皆弔之其父曰此何知乃不為福居一年胡夷大出丁壯者控弦而戰塞上之人死者十九此獨以跛之故子父相保符子曰陶之富者朱公喪其中子鄰人往弔之朱公方擁膝蹲踞捧頭而笑鄰人曰聞有喪將唁子之哀朱公曰生不致哀死而唁何鄰人之不通也説苑曰孫叔敖為楚令尹一國吏民皆來賀有老父衣粗衣冠白冠後來弔曰身已貴而驕人者民去之位已高檀權者君惡之祿已尊厚而不知足者患處之叔敖再拜敬受命願聞餘教父曰位已高意益下官益高而心益小祿已厚而慎不敢取君謹守此三者足以治楚矣世説曰顧彥先性好琴及喪家人常以琴置靈床上張季鷹往哭顧不勝其慟徑上床鼓琴作數曲意撫琴曰彥先頗復賞此不因又慟哭下執孝子手而去賀循喪服要記曰始弔朝玄端之服也皮辨絰素辨而加環絰也始死而往朝服者主人未變賓未可以變也又曰古之弔者皆因朝夕哭而入弔賓至主人出即中門外西面北上拜賓入門即位於堂下當阼階西面賓入即位皆哭哭止主人拜之又曰大夫弔於大夫始死而往朝服禓裘如吉時也當斂之時而至則辨絰服皮辨之服以襲裘也主人成服而往則皮辨絰而加錫襄也大夫於士有朋友之恩乃得棄絰謝茲喪服圖曰天王弔三公及三孤辨絰錫襄弔六鄉辨絰錫襄弔大夫辨絰疑襄弔士辨絰緦襄弔畿內諸侯辨絰緦襄郭太別傳曰賈淑字子厚林亭鄉人雖世有冠冕而性險害邑里患之林宗遭母憂淑來弔之而巨鹿孫咸直亦至咸直以林宗賢而受惡人弔心怪之不進而去林宗遽追而謝曰賈子厚誠凶德然洗心同善仲尼不逆互鄉故許其進也淑聞之改過自厲終成善士又林宗有母喪徐稚往弔置生芻一束於廬前而去林宗曰此必南州徐孺子也詩不云乎生芻一束其人如玉吾無德以堪之裴楷別傳曰裴楷少知名而風情朗悟初陳留阮籍遭母喪楷弱冠往弔籍乃離喪位神志晏然至乃縱情嘯詠傍若無人楷不為改容行止自若遂便率情獨哭哭畢而退威容舉動無異陶侃傳曰侃丁母艱在墓下忽有二客來弔不哭而退儀服鱗異知非常人遣隨而看之但見雙鶴孤而沖天也列女傳曰魯黔婁先生之死曾子與門人往弔焉隱門而入立於堂下其妻出衣褐袍曾子弔之上堂見先生尸在牖下枕墼席藁縕袍無表覆以布被首足不盡斂覆頭則足見覆足則頭見皇覽逸禮曰君使大夫弔於國君禮錫襄裳辨絰有下大夫為介亦如之士介者將命者緦襄裳辨絰異姓葛同姓麻語林曰陳元方遭父喪形體骨立其母哀之以錦蒙其上郭林宗往弔見錦被而責之賓客絶百許日
