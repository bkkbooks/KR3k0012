body:
  text: 人事部四十六賓客尚書大傳曰舜為賓客禹為主人于時卿雲藂俊乂集百工相和而歌卿雲尚書洪範曰三八政七曰賓禮賓客無不敬周禮天官上曰太宰之職以八統詔王八曰禮賓小宰以官府之六聯合邦治二曰賓客之聯事凡朝覲會同賓客以牢禮之法掌其牢禮委積又曰膳夫凡王祭祀賓客食則徹王之胙俎又春官大宗伯職曰以饗燕之禮親四方之賓客賓客朝聘者也禮記曲禮上曰凡與客入者每門讓於客客至於寢門則主人請入為席然後出迎客客固辭主人肅客而入肅進也進謂導也主人入門而右客入門而左禮記王制曰天子諸侯無事則歲三田一為乾豆二為賓客左傳曰襄四曰季武子無適子公彌長而愛悼子欲立之誘於臧紇曰飲我酒吾為子立之季氏飲大夫酒臧紇為客為上賓既獻臧孫命北面重席新樽潔之召悼子降逆之又昭元曰趙孟孫豹曹大夫入于鄭鄭伯兼享之及享具五獻籩豆於幕下趙孟辭私於子産曰武請於冢宰矣乃用一獻趙孟為客禮終乃宴又昭六曰會于黃父謀王室也王室有子朝亂謀定之趙簡子令輸王粟具戍人明年將納王納王於王城也宋樂大心曰我不輸粟我於周為客二王後後為賓客若之何使客史記曰孟嘗君名文姓田氏父曰靖郭君田嬰使主家待賓客賓客日進名聲聞於諸侯嬰卒文代立是為孟嘗君孟嘗君在薛招致賓客以故傾天下之士食客數千人無貴賤一與文等孟嘗君待客坐語而屏風後嘗有侍史主記君所與客語問親戚居處客去孟嘗君已使使存問獻遺其親戚孟嘗君曾待客夜食有一人蔽火光客怒以飯不等輟食辭去孟嘗君起自持其飯比之客慚自刎士以此多歸孟嘗君客無所擇皆善遇之人人各自以為孟嘗君親己又曰平原君趙勝者趙之諸公子也諸子中勝最賢喜賓客賓客蓋至者數千人又曰魏公子母忌者魏昭王少子安釐王異母弟也公子為人仁而下士士無賢不肖皆謙而禮交之士以此方數千里爭往歸之致食客三千人當是時諸侯以公子賢多客不敢加兵謀魏十餘年又曰春申君者楚人也名歇姓黃氏考烈王元年以黃歇為相是時齊有孟嘗趙有平原魏有信陵方爭下士招致賓客以相傾奪輔國權是時楚復彊趙平原君使人於春申君春申君舍之於上舍趙使欲夸楚為玳瑁簪刀劍室以珠玉飾之請命春申君客春申君客三千餘人其上客皆躡珠履以見趙使趙使大慚又曰呂不韋陽翟大賈人也秦太子政立為王尊不韋為相國是時魏有信陵君楚有春申君趙有平原君齊有孟嘗君皆下士喜賓客以相傾不韋以秦之強羞不如亦招致士厚遇之至食客三千人是時諸侯多辨士如荀卿之徒著書布天下不韋乃使其客人人著其聞集論曰呂氏春秋又曰單父人呂公善沛令避仇從之客因家沛焉沛中豪傑吏聞令有客皆往賀蕭何為主吏孟康曰主吏功曹也主進文穎曰主斂禮進諸大夫曰不滿千錢坐之堂下高祖為亭長素易諸吏乃紿為謁曰賀錢萬實不持一錢又曰司馬相如字長卿素與臨邛令王吉善吉曰長卿久客旅遊不遂可來過我舍於是相如後往臨邛中富人卓王孫程鄭相謂曰令有貴客為具召之戰國策曰汙明見春申君候間三月而後得見談卒春申君大說之汙明欲復談春申君曰僕已知先生悉矣汙明慨然曰臣請為說之君之賢實不如堯臣之能不及舜夫以賢舜事聖堯三年而後乃相知也今君一旦而知臣是君聖於堯而臣賢於舜也春申君曰善乃召門吏為先生著客籍五日一見漢書曰蒯通見曹相國曰婦人有夫死三日而嫁者有幽居守寡不嫁者足下即欲求婦何取曰取不嫁者通曰然則求臣亦猶是也彼東郭先生梁石君齊之俊士也隱居不嫁未嘗卑節下意以求仕也願足下使人禮之曹相國曰敬受命以為上客又曰公孫弘徒步數年至宰相封侯於是起客館開東閣以延賢人與參謀議弘身食一肉脫粟之飯故人賓客仰衣食奉祿皆以給之家無所餘其後李蔡與石慶為丞相府客館丘墟而已又曰蘇建嘗責大將軍至尊重天下之賢士大夫無稱焉願將軍觀古名將所招選者勉之哉青謝曰自魏其武安之厚賓客天子常切齒彼親待士大夫招黜賢不肖者人主之柄也人臣奉法遵職而已何與招士又曰大將軍既益尊姊為皇后然汲黯與抗禮或說黯自天子欲群臣下大將軍大將軍尊貴誠重君不可以不拜黯曰夫以大將軍有揖客反不重也大將軍聞愈賢黯大將軍衛青也又曰樓護字君卿為人短小精辨論聽之者皆竦然與谷永俱為五侯上客又曰成都侯王商子邑為大司馬貴重商故人皆敬事邑唯樓護自安如舊節邑亦父事之不敢有闕時請召賓客邑居樽下稱賤子上壽坐者百數皆離席伏唯護獨東向正坐又曰鄭當時為太子舍人每五日洗沐常置驛馬諸郊請謝賓客以夜繼日常恐不遍年少官薄然其知交皆天下名士又曰鄭當時始與汲黯列為九卿中廢賓客益少當時死家亡餘財先是下邳翟公為廷尉賓客亦填門及廢門外可設雀羅後復為廷尉賓客欲往翟公大署其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見又曰陳遵嗜酒每大飲賓客滿堂輒關門取客車轄投井中雖有急終不得去又曰張竦免官以列侯居長安貧無賓客時時好事者從之質疑問事論道經書而已又曰張楷治嚴氏春秋古文尚書門徒常數百人賓客慕之自父黨宿儒皆造門謝承後漢書曰傅賢遷廷尉賢素廉正自掌法官無私賓客袁山松後漢書曰陳蕃遷豫章在郡下接賓客獨坐一室唯徐孺子來為置對榻去則懸之及徵為尚書令送之者亦不出郭門東觀漢記曰崔瑗愛士好賓客盛修殽膳殫極滋味不問餘産張璠漢記曰孔融拜太中大夫雖居家失勢賓客日蒲其門愛才樂士常若不足每歎曰坐上客常滿樽中酒不空吾無憂矣英雄記曰袁紹居雒陽西北陬不妄通賓客非海內知名不得相見魏略曰劉備屯於樊城諸葛亮見備備以諸生意待之坐集既畢衆賓皆去而亮獨留備亦不問其所言備性好毦時適有旄牛尾與備者備因手自結之亮乃進曰明將軍當復有遠志但結毦而已備知亮非常人乃投毦而答由此知亮乃以上客禮之魏志曰蔡雍貴重朝廷常車騎填巷賓客盈里坐聞王粲在門外倒屣迎之蜀志曰簡雍字憲和涿郡人少與先主有舊隨從先主至荊州雍與麋笁孫乾共為從事中郎常為談客吳志曰孫權以魯肅諸葛瑾等為賓客又曰諸葛融每會賓合鐏促席問衆客所能或有博奕或有樗蒲投壺於是甘果繼進清酒徐行融周流觀之終日不倦王隱晉書曰嵇喜為太仆廄長馮陵知其英俊待以賓友之禮以狀表上宋書曰袁粲字景倩陳郡人間默寡言善吟諷獨酌園庭以此自適居負南郭時策杖獨遊素寡往來門無雜客文士過見不過一兩人南史曰謝瞻兄晦時宋臺右衛權遇己重於彭城還都迎家賓客輻湊時瞻在家驚駭謂晦曰吾家以遠退為業汝遂勢傾朝野此豈門戶福耶蕭子顯齊書曰謝超宗坐公事免詣東府門自通其日風寒慘厲太祖謂四座曰此客至使人不衣自暖矣超宗既坐飲酒數甌辭氣橫出太祖對之甚欣拔為驃騎咨議及即位轉黃門郎後魏書曰崔道固為劉義隆諸子參軍事使向青州募人長史已下皆詣道固道固諸兄逼道固所生母自致酒炙於客前道固驚起接取謂客曰人家無力老親自執劬勞諸客皆知其兄等所作咸起拜謝其母母謂道固曰我不足以報貴賓汝宜答拜諸客皆歎美三國典略曰周獲梁俘王褒王克劉瑴宗凛殷不害等至長安太祖喜曰晉氏平吳之利二陸而已今定楚之功群賢畢至可謂過之矣乃謂褒及克曰吾即王氏甥也卿等並吾之舅氏當以親戚為情勿以去鄉分意皆厚禮待引為賓客尹文子曰康衢長者字僮曰善搏字犬曰善噬賓客不過其門者三年長者怪而問之人以實對於是改之賓客復往淮南子曰客有見人於孚子者客出孚子曰子之客獨有過望我而笑之是慢也談論而不稱師是叛也交淺而言深是亂也客曰望君而笑是公也談論不稱師是通也交淺而言深是忠也故客一體也或以為君子或以為小人從視之異說苑曰魏文侯與大夫飲酒使公乘不仁為觴政曰飲不釂子曜切者浮以大白文侯飲而釂公乘不仁舉白浮君君視而不應侍者曰不仁退君已醉矣公乘不仁曰前車覆後車誡蓋言其危為人臣者不易為君亦不易今君已設令令可不行乎君曰善白而飲之以公乘不仁為上客又曰燕昭王問於郭隗曰寡人地狹民寡齊人削取八城胸奴驅馳樓煩之下以孤之不肖得承宗廟恐亡社禝存之有道乎隗曰帝者之臣其名臣也其實友也霸者之臣其名臣也其實僕也危國之臣其名臣也其實虜也今王將東面目指氣使以求臣則廝役之臣至矣南面聽朝不失揖讓之禮求臣則人臣之臣至矣北面等禮相亢下之以色不乘勢以求臣則朋友之臣至矣西面拘指逡巡而退以求臣則師傅之才至矣王誠欲興道隗請為天下之士開路於是燕王常置郭隗為上客三輔決録曰頻陽游殷字季齊初為郡功曹有童子張既者時未知名為郡書佐殷察異之勑既過家具設賓饌及既至妻笑曰君甚勃乎張德容童昏小兒何異客哉殷曰卿勿怪乃方伯之器也殷遂與論霸王之事饗訖以子楚託之列女傳曰孟嘗君食客三千人廚有三列上客食肉中客食魚下客食菜齊市中有乞食人馮暖經冬無袴面有飢色願得上廚又曰漢中楊子拒妻字大英子仲珍有高名常請客母盛為供具從窗中窺客罷讓之曰吾視汝所交皆不及己此自損之道也後歲餘復請賓客皆耆德秀士母觀之喜曰吾無憂矣華陽國志曰任熙字伯遠開門待賓客朝無少長必有供膳陸績別傳曰孫策在吳張紘為上客共論四海未安當用武治而平之績年少未坐遙大聲言曰昔管仲相齊桓公九合諸侯一匡天下不用兵車孔子曰遠人不服修文德以來之今論者不務道德之術而唯當用武績雖童蒙竊所未安世說曰孫長樂兄弟就謝公宿言至駿雜劉大夫在壁後聽之具聞其論謝公明還問劉昨客何以劉答曰亡兄未有如此賓客謝深有愧色郭子曰桓大司馬病篤桓溫字子元也謝公省病謝安字安石也從東門入桓遙矚而歎曰吾門中不久復見如此客蘇州志曰通賢橋東有吳丞相顧雍宅自雍至孟名著四代常居此宅門無雜賓投剌攝齊者不過一時英俊俗說曰謝僕射陶太常詣吳領軍坐久吳留客作食日已申使婢賣狗供客比得一頓食殆無復氣可語
