body:
  text: 兵部六十一警備孫子曰用兵之法無恃其不來也恃吾有能以待之也無恃其不攻吾也恃吾不可攻也安則思危存則思亡常有備也左傳曰不備不虞不可以師又曰諸侯相見軍衛不徹警也又曰晉欒書伐楚將戰楚晨壓晉軍而陣壓窄其未備也軍吏患之晉將范丐趨進曰塞井夷竈陳於軍中而踈行首踈行有當陣前戶決開壘戰道行部切晉楚唯天所受何患焉楚師輕窕固壘而待之三日必退退而擊之必獲勝焉終敗楚師戰國策曰蘇秦將從說燕文侯曰燕地方二千里帶甲十万車七百騎六千粟支十年南有碣石門鴈之饒北有棗粟之利又曰張儀為秦連橫說韓王曰秦帶甲百餘萬虎賁之士不勝計秦卒猶孟賁之與怯夫又曰江乙對江宣王曰今王之地方五千里帶甲百万而專屬之於昭奚恤故北方之畏昭奚恤也春秋後語曰蘇秦南說楚威王曰楚天下之強國也王天地之賢主也西有黔中巫郡東有夏周海陽南有洞庭蒼梧北有汾陰地方五千里帶甲百萬車千乘騎万疋粟支十年此霸王之質也史記曰周末荊人伐陳吳救之軍行三千里雨十日夜見星左史倚相謂荊大將子期曰雨十日甲輯兵聚吳人必至不如備之乃為陣而吳人至見荊有備而反史曰其反覆六十里其君子休小人為食我行三十里擊之必克從之遂破吳軍又曰秦將王翦率兵六十萬伐楚楚王悉國中兵以拒之王翦至堅壁而守之不肯戰楚兵數挑戰終不出王翦曰休士洗沐而善飲食拊循之親與士卒同食久之王翦使人問軍中戲乎對曰方投石超距於是王翦曰士卒可用矣楚又數挑戰而秦不出乃引而東翦因舉兵追之大破楚軍蘄南因滅其國又曰漢景帝初吳王濞反惣兵度淮與楚王戰遂敗棘壁乘勝前銳甚梁孝王恐六將軍擊吳又敗梁將士卒皆還走梁數使使報漢大將周亞夫求救亞夫不許又使使惡亞夫於上上使人告之救梁惡烏路切亞夫復守便宜不行梁使韓安國及楚死事相弟張羽為將軍楚相張尚諫吳王而死乃得頗敗吳兵西梁城守堅不敢西即走亞夫軍會下邑矣師欲戰亞夫壁不肯戰吳糧絕卒飢數挑遂死奔亞夫壁亞夫終不出中夜驚內相擾亂至帳下亞夫臥不起頃之復定吳士卒多飢死遂以叛散漢書曰傅喜以光祿大夫養病大司空何武尚書唐林皆上書言喜行義曰忠臣社稷之衛魯以季友治亂師古曰謂季氏亡則魯不昌楚以子玉輕重師古曰謂楚殺子玉而晉侯喜可知也魏以無知折衡師古曰信陵君也項以范增存亡故楚跨有南土帶甲百万鄰國不以為難子玉為將則文公側席而坐及其老也君臣相慶百萬之眾不如一賢也後漢書曰更始初光武在河北擊銅馬賊於鄔吳漢將突騎來會清陽城賊挑戰鹵武堅營自守有出𢲸掠者輒擊取之鹵與虜同掠奪取之也絕其糧道積月餘日賊食盡夜遁去追至館陶大破之受降未盡而高湖重連賊從東南來與銅馬餘眾合光武復與大戰於滿陽悉破降也又曰王霸馬武既破周建蘇茂營賊復聚挑戰霸堅臥不出軍吏皆曰茂前日已破今易擊也霸曰不然蘇茂客兵遠來糧食不足故數挑戰以徼一切之勝徼要也一切猶權時也徼古堯切今閉營休士所謂不戰而屈人之兵善之善者也茂建既不得戰乃引還營其夜建兄子誦反閉城拒之茂建遁去誦以城降又曰公孫瓚既為鮮于輔所敗慮有非常乃告於高京以鐵為門斥去左右男人七歲以上不得入門專侍姬妾其文簿書皆及而上之令婦人習為大言聲使聞數百步以傳宣教令踈遠賓客無所親信故謀臣猛將稍有乖散自此之後希復攻戰九州春秋曰公孫瓚曰始天下兵起我謂唾掌而決至於今日兵革方始觀此非我所決不如休兵力耕以救凶年兵法百樓不攻今吾諸營樓櫓千里櫓即魯字見說文釋名曰擼露也上元覆屋也積穀三百萬斛食此足以待天下慶也魏志曰冀州牧韓馥長史耿武別駕閔純治中李歷諫馥曰冀州雖鄙帶甲百萬穀支十年又曰大軍南征吳到積湖大將滿寵帥諸軍在前與賊隔水相對令諸將曰今夕風甚猛賊必來燒營宜為之備諸軍皆驚夜半賊果遣十部來燒營寵掩擊破之又曰吳將諸葛恪圍新城司馬景王使鎮東將軍毋丘儉陽州刺史文欽等距之儉欽請戰景王曰恪卷甲深入投兵死地其鋒未易當且新城小而固攻之未可拔遂命諸將高壘以弊之相持數月恪攻城力屈死傷太半景王乃令欽督銳卒趣合榆斷要其歸路儉帥諸軍以為後繼恪懼而遁欽逆擊大破之斬首萬餘級吳書曰趙咨字德度南陽人愽學多智應對辯捷孫權為吳王擢至太中大夫使魏文帝嘲咨曰吳王頗知學乎咨曰浮江萬艘帶甲百萬任賢使能志在經略雖有餘閑愽覽書傳歷史籍採奇異不效書生尋章摘句而已又曰吳難魏不咨曰帶甲百萬江漢為池何難之有蜀志曰先主率大眾東伐吳吳將陸遜拒之蜀主從建平連圍至夷陵界立數十屯以金帛爵賞誘動諸夷先遣將吳班以數千人於平地立營欲以挑戰諸將皆欲擊之遜曰備舉軍東下銳氣始盛且乘高阻險難可卒攻攻之縱下猶難盡剋若有不利損我大勢非小故也今但奬厲將士廣施方略以觀其變若此間是平原廣野當恐有焱沛交馳之憂焱音標今緣山行軍勢不得展自當疲於木石之間徐制其弊耳備知其計不行乃引伏兵八千人從谷中出遜曰所以不聽諸君擊班者揣之必有巧故也諸將並曰攻備當在初今乃令入五六百里相銜持經七八月其諸要害皆已固守擊之必無利矣遜曰備是猾虜更嘗事多其軍始集思慮精專未可干也今住已久不得我便兵疲意沮計不復生掎角此寇正在今日乃先攻一營不利遜曰已曉破之術乃令各持一把茅以火攻拔之俄爾成勢遂率諸軍同時俱攻破四十餘營備升馬鞍山陳兵自繞遜督促諸軍四面蹙之土崩瓦解死者萬數備因夜遁晉書曰王戎謂齊王曰公首舉眾匡定大業開闢已來未始有也然論功報賞不及有勞朝野失望人懷二志今二王帶甲百萬其鋒不可當若以王就弟不失故委此求安之計也又曰大將羅尚遣廣漢都尉曾元牙門張顯等潛率步騎三萬襲蜀賊李特營特素知之乃繕甲厲兵戒嚴以待之元等至特安臥不起待其眾半入發伏擊之殺傷者甚眾遂害曾元張顯等又曰安平王孚初為魏度支尚書以為禽敵制勝宜有備預每諸葛亮入寇關中邊兵不能制敵中軍奔赴輒不及事機宜預選步騎二萬以為二部為賊之備又以關中連賊寇穀帛不足遣冀州農丁五千屯於上邽秋冬習戰春夏脩田桑由是關中軍國有備矣崔鴻十六國春秋曰前趙劉曜遣將討氐羌大酋權渠率眾保險阻曜將游子遠頻敗之權渠欲降其子伊餘大言於眾中往日劉曜自來猶無若我何况此偏師自欲降乎遂率勁卒五萬人晨壓子遠壘門左右勸出戰子遠曰吾聞伊餘有專諸之勇慶忌之捷士馬之強人百匪敵其父新敗怒氣甚盛且西戎勁捍其鋒不可擬也不如緩之使氣竭而擊之此曹劌之勝也乃堅壁不戰伊餘有彊驕色子遠候其無備夜分誓眾秣馬蓐食先晨具甲掃壘而出遟明設覆而戰遟直吏切生擒餘伊于陣盡俘其眾又曰北燕馮跋據遼東其弟万泥阻兵以叛跋遣將馮弘與將軍張興討之弘遣使諭之曰昔者兄弟乘風雲之運撫翼而起群公天意所鍾逼奉主上先踐寶位裂土䟽爵當與兄弟共之奈何欲尋干戈於蕭墻棄友于而為閼伯過貴能改善莫大焉宜舍茲嫌同獎王室万泥不從剋期出戰興謂弘曰賊明曰出戰今夜必來驚營宜備不虞弘乃各嚴備仍人課草十束束火伏兵以待之是夜萬泥果遣壯士十餘人斫營眾火俱起伏兵邀擊俘斬無遺遂平万泥等宋書曰桂楊王休範舉兵於尋陽已發東下朝廷惶駭宋相齊高祖議曰昔上流謀逆皆因淹緩至於覆敗休範必遠懲前失輕兵急下乘我無備今應變之術不宜在遠若偏師失律則大沮眾心請頓新亭堅守宮掖東府石頭以待賊至千里孤軍後無委積求戰不得自然瓦解請頓新亭以當其鋒休範果敗又高祖紀曰時議者欲分兵屯守諸津帝曰賊眾我寡分兵測人虛實一處失利則沮三軍之心若聚眾石頭則力不分也三國典略曰梁武陸王蕭紀在蜀一十七年開拓土宇器甲殷積有馬八千疋既便騎射尤工舞矟後魏書曰任城王澄時四中郎將兵數寡弱不足以襟帶京師澄奏宜以東中帶滎陽郡南中帶魯陽郡西中帶恒農郡北中帶河內郡選二品三品親賢兼稱者居之省非急之作配以強兵如此則深根固本強幹弱枝之義也靈太后初將從之後議者不得乃止唐書曰武德中太宗領兵征薛仁果於析摭城析音思歷切摭竟之石切賊有十餘萬兵鋒甚銳數來挑戰諸將咸請戰太宗曰我士卒新經挫衂銳氣猶少賊驟勝必輕進好鬥我且閉壁以待其氣衰而後擊可一戰而破此万全計也因令軍中曰敢言戰者斬相持者久之賊糧盡軍中頗攜其將翟長孫梁胡郎率所部相繼來降太宗知仁果心腸內離謂諸將曰可以戰矣因令行軍總管梁實營於淺水原以誘之賊大將宗羅侯曰恃驍悍求戰不得氣憤者久之及是盡銳攻梁實冀逞其志梁實固險下以挫其鋒羅緱攻之愈急太宗度賊已疲復謂諸將曰彼氣將衰吾當取之必矣申令諸軍遟明合戰復令將軍龐玉陣於淺水原南出賊之右以先拒之羅侯併軍共戰玉軍幾敗太宗親御大軍奄自原北出其不意羅侯廻師相拒我師表裏齊奮呼聲動天羅侯氣奪於是大潰又曰武德中太宗率師往河東討劉武周江夏王道宗時年十七從軍太宗登玉壁城覩賊顧謂道宗曰賊恃其眾來邀我戰汝謂何如對曰群賊鋒不可當易以計屈難與力竟令深壁高壘以挫其鋒烏合之徒莫能持久糧運致竭自當離散可不戰而擒太宗曰汝意暗與我合賊果食盡夜遁追及介州一戰破之又曰薛萬均從李靖等擊吐谷渾軍次青海與弟万徹率軍先路道遇虜於赤海萬均將十數騎擊走之追奔至積石山南道大風折旗拔木万均謂左右曰虜將至矣宜各設備俄而虜至万均直前斬一賊將於是大潰殺傷略盡又曰廣德中安史故將分據河北吐蕃數犯京畿故郭子儀魚朝恩常統重兵守河中以備倉卒欲兵權在京師乃以魚朝恩元載王縉建議請於河中府置中都創置積兵五萬以為禁旅取關輔河東等十州稅物以奉京師車駕常以秋杪行幸春首還京即河北西蕃無憂越軼代宗以為然載已潛遣人於河中料度創造宮殿及營私第既而言事者以為無故示賊以怯國計非便事竟不行又曰李晟討朱泚德宗幸奉天日詔以晟為左僕射平章事晟拜哭受命且曰長安宗廟所在為天下本若皆扈蹕誰復京師乃浚隍壁繕兵粟馬以誅泚興復為己任初軍無蒭蒿乃令檢校戶部郎中張彧假京兆少尹擇官吏以賦渭北畿縣不數日蒭糧皆足乃陳說三軍曰今國步多艱亂逆繼興屬車西幸關中無主吾等皆受國恩見危死節臣子之分况當此時不能清寇以取富貴非士也渭橋跨大川吾與公等戮力一心擇利而進復大業建不世之功能從我乎軍士皆泣下曰唯公所命晟亦歔欷流涕是時朱泚盜天邑懷光反咸陽河北偽稱國者三希烈李納交逼陳宋晟內無貨財外無疆土以孤軍守危城為秉節嚮義者所歸於是戴休顏舉奉天之兵韓遊瓌悉邠寧之師尚可孤守藍田駱元光固華州皆歸款於晟軍大振又曰李元諒貞元初將本軍與侍中渾瑊會吐蕃盟於平源元諒謂瑊曰戎狄多詐不可無備公奉國命輕重宜有以防之瑊不從且不設備及會元諒令軍中皆衣甲持兵整部隊以俟變去壇十里虜果衷甲乘瑊無備伏精騎以圍瑊士大夫皆衣朝服就執及軍士死者不可勝數所脫者百無一二瑊挺身走虜騎逐瑊至元諒軍士皆堅陣持滿虜騎望見之乃引去是日無元諒軍瑊幾不免元諒乃徐引軍而歸
