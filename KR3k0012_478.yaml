body:
  text: 人事部一百一十八施惠下宋書曰范叔孫少而仁厚周窮濟急鄉曲貴其義行無有呼其名者又劉凝之傳曰衡陽王義季荊州年饑義季慮凝之餒餉錢十萬凝之大喜將錢至市門觀其飢色者悉分與之俄頃立盡又曰張進之少有志歷郡五官主簿永甯安固二縣領校尉家世富足經荒蕪年散其財救贍鄉里遂以貧罄全濟者甚多又曰嚴世期會稽山陰人也好施慕善出自天然同里張邁三人妻子各產子時歲飢儉慮不相存欲棄而不舉世期聞之馳往拯救分食解衣以贍其乏三子並得成長又曰蕭惠開為益州牧太始四年還至京師初惠開府錄事參軍劉希微負蜀人債將百萬為債主所制未得俱還惠開甚恥之輒之廄中凡有馬六十疋悉以與希微償債其意趣不常皆如此齊書曰劉善明平原人懷珍族弟但徐州刺史鎮北將軍父懷民宋世為齊北海二郡太守元嘉末青州飢荒人相食善明家有積粟躬食饘粥開倉以救鄉里多獲全濟百姓呼其家田為續命田崔鴻前涼錄曰張衝字長思燉煌人散家財巨萬施之鄉閭時人為之謠曰推財不疑張長思又後燕錄曰趙秋字子武汲郡朝歌人少而輕財好施鄰人李玄度母死家貧無以葬秋謂其兄曰起死生救不足人之本也家有二牛以一與之玄度得以葬它年秋夜行見一老母遺金一餅曰子能葬我是以相報子五十已後當富貴不可言勿忘玄度也後魏書曰祖巖字洪山於固安縣世有積粟至數萬石自延昌已來北州頻經災儉巖兄弟傾家瞻遺嘗見州郡徵租甚急巖遂以家粟萬解代輸聞者莫不唴歎又曰張普惠不營財業好有進舉敦於故舊冀州人侯堅固少時與其遊學早終其子長瑜普惠每於四時請祿無不減贍其衣食隋書郭衍授瀛州刺史遇秋霖大水其屬縣多漂沒民皆上高樹依大塚衍親備舡栰并齎糧拯救之民多獲濟衍先開倉賑卹後始聞奏上大善之唐書曰孟簡性俊拔尚義早歲交友先歿者視其孤每厚於周卹議者以為有前輩風又曰李藩少恬淡修撿雅容儀好學父卒家富於財親族弔者有挈去不禁愈務散施不數年而貧年四十餘未仕讀書楊州困於自給妻子怨尤之晏如也又曰盧鈞為嶺南節度使自貞元已來衣冠得罪流放嶺表者因物故子孫貧悴雖遇赦不能自還凡在封境者鈞減俸錢為營槥櫝其家疾病死喪則為之毉藥殯歛孤兒稚女為之婚嫁凡數百家李皋貶溫州長史無幾攝行州事歲儉州有官粟數十萬斛欲行賑救掾吏叩頭乞候上旨皋曰夫人一日不再食當死安暇稟命若殺我一身活數千命利莫大焉於是開倉盡散之以擅貸之罪飛章自劾天子聞而嘉之荅以優詔崔氏家傳座右銘曰無論人之短無道己之長施人慎勿念受施慎勿忘隱心而後動謗議庸何傷虛譽不足慕古誡不可抗家語曰子游問於孔子曰夫子亟言子產之惠也可得聞乎孔子曰夫子產者猶眾人之母也能食之不能教以其乘車濟冬涉者盡愛而無教也又曰孔子曰好學則智恤孤則惠恭則近禮勸則有繼尚書大傳曰老而無妻謂之鰥老而無夫謂之寡幼而無父謂之孤老而無子謂之獨行而無資謂之乏居而無食謂之困此皆天民之至悲哀而無告者故聖人在上君子在位能者任職必先施此無使失職戰國策曰襄王立田單相之過淄有老人涉淄而寒出不能行坐涉中田單見其寒也解裘而衣之王乃賜田單牛酒召單而揖於庭勞之乃布令求百姓之飢寒者收穀之乃使人聽於閭里聞大夫相與語曰單之愛人乃王之教也江表傳曰全琮罷東安郡還錢唐修祭墳墓麾幢節蓋曜於舊里請會邑人平生知舊宗族六親施散惠與千有餘萬本土以為榮司馬徽字德操人有臨蠶求簇者徽便與之自棄其蠶或有難之者曰凡人有損己以贍人謂彼事急己事緩耳今彼此正等何為急之以與人邪徽曰人不當求耳人已求拒之將慚何有以財貨令人慚者也董卓別傳曰太常張奐將師北征表卓為軍司馬從軍行卓手斬購募羌酋拜五官中郎賜縑九十疋卓歎曰為者則已有者則士悉以縑分與兵吏葛洪神仙傳曰焦先日日入山伐薪以布施從西村頭一家起周而復始秦書曰尚書令符雅為人樂施乞人填門嘗曰天下物何常吾今日富後日貧耳忽一日不施則意不泰時人為之語曰不為權異富甯作符雅貧賈誼新書曰楚昭王當房而立愀然有寒色是日也出府之裘以衣寒者出倉之粟以賑飢者二年吳襲郢當房賜者請還戰死闔閭曰昔吾徒當房之德也三輔決錄曰摯茂字子華以茂才為郡去治財致大富悉散以分宗人先從貧始以壽終虞預會稽典錄曰駱俊字遠孝靈皇帝擢拜陳相汝南葛陂盜賊並起與接境四面受敵俊整厲吏人為之保鄣出倉見穀以贍貧乏劉邵人物志曰中材之人財隨損益是故籍富貴則貨財充於內施惠周於外見贍者求可稱而譽之見援者闡小美而太之雖無異材猶行成而名立也英雄記曰王匡字公節泰山人輕財好施以任俠聞辟大將軍何進府使匡於徐州發強弩五百詣京師會進敗匡還鄉里劉義慶世說曰顧榮在洛嘗應人請覺行炙人有欲炙之色因輟己施焉後遭亂渡江每經危急常有一小人左右問其故乃受炙人也顏延之庭詰曰善施者豈唯發自人心乃出天財裴啟語林曰大將軍王敦尚武帝女此主特所重愛遣送十倍諸主主既亡人就王乞始猶分物與之後乞者多遂指庫屋間數以施孔叢子曰衛公子友饋馬四乘於子思為賓主之餼焉子思曰伋寄命以來度身以服衛之衣量腹以食衛之粟且又朝夕受酒脯及祭膰之賜衣食已優意氣已足以無行志未敢當車馬貺禮雖有爵賜人不踰父兄今重違公子之盛指則有陷禮之愆焉若何公子曰友已言於君矣又曰季桓子以粟千鍾餼夫子受之而不辭既而以班門人之無者子貢進曰季孫以夫子貧故致粟夫子受之而以施人無乃非季孫之意乎子曰受人財不以成富與季孫之惠於一人豈若惠數百之人哉列子曰衛端木叔者子貢之世父也藉其先資家累萬金奉養之餘先散之宗族次散之邑里乃散一國行年六十氣幹衰棄其家事都散其庫藏珍寶車服妾媵一年之中盡焉及其病也無藥石之儲及其死也無理葬之資一國之人受其施者相與賦而藏之及其子孫之財焉金屈氂聞之曰端木叔狂人也辱其祖矣段干生聞之曰端木叔達人也德過其祖矣莊子曰青青之麥生於陵陂生不布施死何含珠為孟子曰子產聽鄭國之政以其乘輿濟人於溱洧孟子曰惠而不知為政歲十一月徒杠成十二月輿梁成民未病涉韓子曰吳起為魏將而攻中山軍人有病疽者吳起跪而自吮其膿傷者母立而泣人曰將軍於若子如是何為泣對曰昔吳子吮其父傷而殺之涇水之上今又將安知不殺是乎呂氏春秋曰秦繆公乘馬車敗右服失公自往求馬見野人方將食之於岐山之陽繆公笑曰食馬肉而不飲酒余恐其傷生也遍飲而去居一年為韓原之戰晉人以環繆公之車矣嘗食馬肉者三百餘人疾鬭車下遂大剋晉反獲晉公以歸呂覽曰魯國之法魯人為人臣妾於諸侯有能贖之者取其金於府子貢贖魯人於諸侯來辭不受其金孔子曰賜失之矣自今以往魯人不贖人也淮南子曰為魚德者非挈而入淵也為猨賜者非負於緣木也縱其所之利之而已矣
