body:
  text: 兵部六十九角徐廣車服儀制曰角前世書記所不載或云本出羌胡吹以驚中國之馬或云本出吳越晉書安帝記曰桓玄製龍頭角或曰所謂亢龍角者也晉中興書曰大司馬桓溫屯中堂夜吹警角御史中丞司馬恬奏劾大不敬請治罪明日溫見奏事歎曰此兒乃敢彈我真可畏也又庾翼與燕王書曰今致畫長鳴角一雙幡毦副毦音餌宋書曰張興世父仲子由興世致位給事中興世欲將往襄陽受鄉里不肯去嘗謂興世曰我雖田舍老公樂聞鼓角汝可送一部行田時欲吹之興世素恭謹畏法譬之曰此是天子鼓角非田舍公所吹三國典略曰初魏世山崩得三石角藏於武庫至是齊主入庫賜從臣兵器持此角賜平秦王歸彥曰爾事常山不得反事長廣得反反時將此角嚇漢也史苓武昌記曰武昌有龍山欲陰雨上有聲如吹角辛氏三秦記曰河西有沙角山山頭頽沙則鼓角鳴異苑曰晉孝武太元末帝每聞手巾箱中有鼓吹鞞角響於是請僧齊會夜見一臂長三丈許手長數尺來摹經案帝是歲崩天下大亂幽明録曰晉司空郗方回葬婦於離山使會稽郡吏史澤治墓多平夷古墳後壞一冢構制甚偉器物殊盛冢發聞鼓角聲角聲自是多如此陶侃表云奉獻金口角石勒別傳曰石勒永康中流宕山東寄旅平原師勸家庸耕耳恆聞鼓角鞞鐸之音勒私異之世說曰樂令有數客闊不復來樂問所以答曰前在坐蒙賜酒方欲飲見杯中有蛇意甚惡之既飲而疾于時河南廳事上壁有角角邊漆畫作蛇樂而疑是角影入杯中復令置杯酒於前處謂曰君更看酒中復有所見不答曰所見如初樂乃告其所以客豁然意解沉痾頓消又一本云角弓語林曰陸士衡為河北督已被間構內懷憂悶聞衆軍驚角鼓吹謂其司馬孫極曰我今聞此不如華亭鶴鳴谷儉角賦曰夫角以類推之蓋黃帝會群臣於太山作清角之音似兩鳳之雙鳴若二龍之齊吟如丹蛇之翹首似雄蛇之帶天衛公兵法曰夫軍城及野營行軍在外日出日沒時撾鼓一千捶三百三十三推為通鼓音止角音動吹十二聲為一疊角音止鼓音動如此三角三鼓而昏明畢又曰諸大將置鼓四十面子總管給鼓十面營別給鼓一面行即負隨纛下擬晝夜及在道有警急擊之傳響今諸軍嚴警兼用防備賊侵逼如軍行引之時先軍卒逢賊寇先軍即急擊鼓救中腰逢賊即須擊鼓前軍聞聲便往後軍聞聲須急向前赴救後頭逢賊即擊鼓前頭中腰聞聲即須住並量抽兵相救如發引稍長鼓聲不徹中腰支料更須置鼓傳響使前後得聞其諸營自須著鼓一面用防夜中有賊犯營即急擊令諸軍有警備又曰諸行軍立營數則萬計或逢泥溺或阻山河同聽角聲俱共齊發路狹難進徒餓馬驢應發營第一角聲絶右虞候捉馬驢第二角聲絶即被駕右一軍捉馬驢第三角聲絶右虞候即發引右一軍被駕右二軍捉馬驢第四角聲絶右一軍即發引右二軍被駕以後諸軍每聽角聲裝束被駕准此每營各出一戰隊今取虞候進止防有賊至便用騰擊後如其路更細小即須更有角聲仍令虞候及營官人虞候子排比催督急過不得停擁過訖以後軍准前排比催迫急過金鼓釋名曰校號也將帥號令之所在也節為號令賞罰之節也鐸度也號令之限度也金鼓金禁也為進退之禁也詩曰方叔率止鉦人伐鼓陳師鞫旅又曰顯允方叔伐鼓淵淵振旅闐闐又曰擊鼓其鏜踊躍用兵周禮曰鼓人掌教六鼓以雷鼓鼓神祀雷鼓八面鼓也以靈鼓鼓社祭靈鼓六面鼓也社祭祭地祗也以路鼓鼓鬼享路鼓四面鼓也享宗廟也以賁鼓鼓軍事大鼓渭之賁鼓長八尺以鼛鼓鼓軍事鼛大鼓也長丈二尺也以晉鼓鼓金奏晉鼓長六尺六寸金奏謂樂正擊編鍾也左傳曰凡師有鍾鼓曰伐無曰侵又曰吳子使其弟蹶由犒師犒勞也楚人執之將以釁鼓王使問曰汝卜來吉乎對曰吉寡君聞君將治於弊邑卜之以守龜曰余亟使人犒師請行以觀王怒之疾徐而為之備尚克知之龜兆告吉曰克可知也君若歡好逆使臣茲弊邑休怠而忘其死亡無日矣今君奮焉震電憑怒虐執使臣將以釁鼓則吳知所備矣乃釋之又曰密須之鼓與其大輅文王所以大搜也又曰簡子曰吳伏韜歐血鼓音不衰今日我上也功為上也又曰吳伐齊將戰公孫夏命其徒歌虞殯陳子行命其徒具唅玉陳書曰此行也吾聞鼓而已不聞金矣鼓以進軍金以退軍不聞金言將死以也國語曰越甲至齊雍門子狄請死之齊王曰鼓鐸之聲未聞矢石未交長兵未接子何務死焉後漢書曰光武徇河內韓歆議欲城守岑彭止不聽既而光武至懷歆迫急迎降光武知其謀大怒收歆置鼓下將斬之中將軍最尊自執旗鼓若置營則立旗以為軍門并設鼓戮人必於其下召見彭彭因進說俱獲免東觀漢記曰假潁起於徒中為并州刺史有功徵還京師潁乘輕車介士鼓吹曲蓋朱旗騎馬殷天蔽日錚鐸金鼓雷振動地連騎繼跡彌數十里齊地記曰城東有上祠山上有石鼓舊說云將有寇難則鼓自鳴所以豫驚備也吳興記曰長城縣有夏架山石鼓盤石為足長老云鳴聲如金鼓鳴則三吳有兵東方朔傳曰朔初上書曰臣朔少失父母長養兄㛐年十三而學三冬文史足用十五學擊劍十六學詩書誦二十二萬言十九學孫吳兵法戰陳之事鉦鼓之教周髀曰十人之長執銅百人之師執鐸千人之師執鼙萬人之將執大鼓吳氏春秋曰金鼓所以一耳也法令所以一心也又曰周宅酆鄗近戎人與諸侯約為高堡置鼓其上遠近相聞戎寇至傳鼓相告諸侯之兵皆至救天子褒姒大悅笑之王欲褒姒之笑也因數擊鼓諸侯兵數至而無寇後戎寇真至幽王擊鼓諸侯兵不至幽王之身乃死驪山之下為天下笑韓侯曰吳使沮衛獻蟲蠹於荊師荊師將殺之以釁鼓衛曰死者無知則釁無益若有知戰之時臣使鼓不鳴因不殺之孫子曰是故軍政曰言不相聞故為鼓鐸視不相見故為旌旗故夜戰多金鼓晝戰多旌旗夫金鼓旌旗所以一人之耳目也人既專一則勇者不得獨進怯者不得獨退此用衆之法也抱朴子曰軍始發大風甚雨起於後旌旗前指金鼓清鳴大勝黃帝出軍決曰牙旗者將軍之精金鼓者將軍之氣一軍之形候也唐子曰將勿離鼓旗鼓旗將之耳目也徐幹齊都賦曰王乃垂華玉之路駕玄駮之駿翠幄浮遊金光皓旰公旦切戎車雲布武騎星散鉦鼓雷動旌旗虹亂陸雲南征賦曰戎士肅而啓行三軍分而雜遝長角哀吟以命旅金鼓訇隱而砰礚孫惠祭金鼓文曰赫矣皇威用伐不庭金鼓麾旗以昭其聲鞞釋名曰鞞禆也禆助鼓節也鞞補彌功呂氏春秋曰倕作鞞鼓鄭緝之東陽記曰晉隆安中孫恩遣偏師謝咸攻東陽東陽岑山下民聞嶺上有鼓鞞聲若數萬人咸破潰而山上鼓鞞亦絶鞀鬻子曰禹之治天下也懸五聲以聽之曰語寡人以獄訟者揮鞀音挑呂氏春秋曰倕作鞀又曰武王有誡慎之鞀欲誡者捶鞀鼓鐃說文曰鐃小鉦也鐃女交切周禮曰六鼓四金以金錞和鼓以金鐲節鼓以金鐸通鼓鐲音濁鉦也軍行鳴之以為鼓節鈴說文曰鈴丁也從金令聲左傳曰揚鑾和鈴昭其聲也魏志曰安平太守宅老鈴下作怪為鳥鵲鬥蓋公府閣有繩鈴以傳呼鈴下有吏者也風俗通曰鈴柄施懸魚魚者欲君臣沉靜如魚之入水不可復得聞見耳集異記曰廣陵士甲市得一宅但聞中有搖鈴聲夜輒止後遂見其真形乃是其故人問曰何以常搖鈴答曰我典使君藥物故夜持時耳問曰晝日何以不持時曰白日是死道之夜因別而去鐸三禮圖曰鐸今之鈴其鑄銅為之木舌為木鐸金舌為金鐸也說文曰鐸大鈴也釋名曰鐸度也號令之限度也王隱晉書曰荀勗逢趙郡啇賈於路懸鐸於牛識其聲焉及後為樂勗曰趙之牛鐸則善諧矣於是下郡悉送果有諧者世伏其才明晉書載記曰石勒少時嘗耕每聞鞞鐸之音歸以告其母母曰作勞耳鳴非不祥也鬻子曰禹之治天下也以五聲聽銘於簨虡曰教寡人以事者振鐸文子曰老子云鳴鐸以聲自毀膏燭以明自消刁斗纂文曰刁斗持時鈴也漢書曰李廣行師不擊刁斗以自衛孟康曰以銅為鐎器受一斗晝炊飲食夜擊持行夜銘曰刁斗在滎陽庫譙音譙形如銷銷火玄切即銚也今俗呼銅銚二音桃漢名臣奏曰漢興已來深存古義宮殿省闥至五六重周衛刁斗柝說文曰𣟄行夜所擊木也易擊辭曰重門擊柝以待暴客蓋取諸豫周禮曰野廬氏賓客宿息則聚𣟄漢書舊儀曰中宮衛宮城門擊刀斗傳五夜衡衛士周廬擊木柝張衡東京賦曰故亟谷擊柝於東西柝守夜所擊木也
