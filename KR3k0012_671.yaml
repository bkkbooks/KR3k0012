body:
  text: 道部十二服餌中真誥曰七月十五日夜清虛真人與許玉斧言曰五公石腴彼體所便急宜服之可以少顏朮散除疾是爾所宜次服䭀飯兼穀勿違又曰明大洞為仙卿服金丹為大夫服衆芝為御史若得太極隱芝服之便為左仙公又曰性幾乎道用之真來紫陽真人云可令許玉斧數沐浴濯其水疾之氣消其積考之瑕此致真之階也學養生之道不可泣淚涕唾所損甚多是以真人道士常吐納咽味以和六液又曰昔漢成帝獵於終南山中見一人無衣身生毛飛騰不可及乃圍得之問之乃秦宮人説秦王子嬰軹道之事因宮室燒燔驚走入山飢無所食垂當餓死有一老人令食松葉松實其獵者將歸以穀食之歐吐纍日乃安一年餘死向不為人獲即仙矣又曰龍述字伯高京兆人也後漢從仙人刀道林受胎氣之法又受䭀飯方託形醉亡隱處又曰武當山道士戴孟者本姓燕名濟字仲微漢明帝時人也少修道德不仕入華山餌芝朮黃精雲母丹砂受法於清靈真人王君得長生之道又裴真人授以玉佩金璫經并石精金光符又曰食草木之藥不知行氣導引服藥無益也終不得道若志之感靈所存必至者亦不須草藥之益也若但知行氣不知神丹之法亦不仙也若得金液神丹不須他術也若大洞真經不須得金丹之道而仙也人生有骨籙必有篤志道使之然故不學而仙道自來也過此以下皆須篤志又曰東海玉華妃青童君之妹降授張微子服霧之法又曰柏成納氣腸胃三腐三五順行經曰廣平真人頂負圓光執華幡於上帝前問修鍊之法又曰羅江大霍山洞臺中有五色隱芝華陽山亦有五種夜光芝良常山有螢火芝其實似草其在地如螢狀大如豆如紫華夜視有光得食之者心明可夜書計得食四十七枚者壽又曰包山中有白芝又有隱泉其色紫華陽雷平山有田公泉且玉沙之流津用以浣衣佳又曰服九靈日月華者得降太極之家玄真之法也又曰郎宗字仲綏北海安丘人少士宦後漢時人也為吳令學精道術占候風氣後一旦有暴風庭起占知洛陽大火燒長夏門遣人往參問果爾朝廷聞之以博士徵宗宗恥以占術就徵夜解印綬負笈遁去居華山下服胡麻得道今在洞中又曰傅禮和漢桓帝外孫傅建安也常服五星氣得道為含真臺主抱朴子曰余祖鴻臚少時嘗為臨沆令云此縣有民家皆壽考後徙去子孫轉多夭折他人居其故宅又纍世眉壽疑其井水殊赤乃試掘井左右得古人埋丹砂數十斛況餌丹砂者乎又曰上黨趙瞿者病癩歷年衆治之不愈垂死其家興載棄之齎糧送置山谷中瞿自怨不幸晝夜悲歎涕泣彌月有仙人行過穴口見而哀之具問訊瞿知異人乃叩頭自陳乞哀於是仙人以囊藥賜之教其服法瞿服以病愈顏色豐悅肌膚玉澤仙人又過視之瞿謝之乞其方仙人告曰此松脂耳此山中多汝鍊之可以長生瞿乃歸家家甚駭問得愈狀瞿年百七十歲齒髮豪健在人間二百餘年入抱犢山去又曰要於長生去留各從所好耳服還丹金液之後若且欲世間者但服其半若求仙去當盡服之昔安期先生龍眉寧公修羊公陰長生皆服金丹半劑者也其止人間或近千年然後去耳又曰按玉鈐經中篇云立功為上除過次之為道者以救人危為上功也欲求仙者要當以忠孝和順仁信為本若德行不修而但務方術終不得長生也行惡事大者奪紀小過奪算積善未滿雖服仙藥亦無益也余覽養生之書莫不以還丹金液為大要蓋仙道之極也昔左慈字元放於天柱山中精思積久乃神人授以金丹仙經會漢末大亂不遑修鍊而避地來渡江東志欲投名山以修斯道從祖仙公又從元放受之凡授太清丹經三卷及九鼎丹經一卷金液經一卷豫師鄭君者仙公之弟子也又於從祖受之而家貧無用買藥豫親事之酒掃積久乃於馬迹山中立壇盟受之并具諸口訣之不書者江東先無此書出於左慈慈授從祖仙公仙公授鄭君鄭君授豫故它道士了無知者此益假求於外物以自堅固復有太清神丹其法出於元君元君者老子師也太清觀天經有十篇云其上七篇不可以教授其下三篇世無足傳當沉之三泉也下三篇者正是丹經其經曰上士得道升為天官中士得道栖集崑崙下士得道長生世間近後漢末新野陰君合此太清丹其人有才氣著詩及丹經讚序言初學道隨師本末列己所知識之得道者四十餘人甚分明也又有九光丹與九轉異法又有岷山丹法道士張盍踏精思於岷山石室中得此方也至於諸丹法各別也金液者太一所服而仙者也又曰長生制在大藥非祠醮之所定也秦漢二代大興祈禱所祭太一五帝陳寶八神之屬動費億萬絶無所益況匹夫無德欲以三牲妄祝以祈延年惑亦甚矣又曰合金丹之大藥鍊八石之氣英者尤忌凡俗聞見則仙物不成或云上士得道於軍旅中士得道於都市下士得道於山林此謂仙藥已成未欲輕舉雖三軍兵刃不能傷都市凶禍不能加下士未及於此故上山林耳古之道士飛鍊神藥必入名山又按入山經可以精思修餌其藥有太華恆霍嵩少太白終南女凡地肺王屋抱犢安丘衡灊青城峨嵋雲臺羅浮陽駕黃金大小天咸蓋竹括蒼四望山皆是正神在其中其上皆生芝草可以避大兵大水不但中以合藥也若有道者登之則此山之神必助之為福其藥必成若不登此諸山者海中大島嶼亦可合藥又曰余師鄭君年出八十先鬚髮班白數年間復黑又顏色豐澤能引強弩日行數百里飲酒二斗不醉上山又體力輕便年少追之不及飲食與凡人無異又不見其絶穀余問先生隨之弟子黃章言鄭君常從豫章還於浦中連值大風遇盜君推糧以給諸人己不復食五十日亦不飢又不見其所施為不知以何事也燈下細書過少年性解音律間夜鼓琴侍坐數人口答咨聞其言不輟響而耳益料聽左右操弦者數譴長短無毫氂得逃余晚為鄭君門人請見方書告余曰要道不過尺素上足以度世又曰君所知者雖多而未精又意存於外學不能專一未可以經深涉遠耳自當以佳書相示也久許漸得見短書縑素所寫者積年之中合集所見當出二百許卷經不可頓得了也又曰語余曰新書卷卷有佳事但當校其精粗擇所施行若金丹一成此書等一切不用也亦或當有所教授宜得本末先從淺始以勸進學者無所希準階由也鄭君亦不肯悉令人寫其書皆當訣其意雖久借之然莫有敢盜寫一字者也鄭君本大儒晚而好道由以禮記尚書教授不絶其體望高亮風格方整接見者肅然每咨問恆待其溫顏不敢輕脫也門人五十餘人惟余見受金丹之經及三皇內文枕中五行記其餘人不得一觀此書首題者集仙録曰夫茂實者翹春之明珠也巨勝者玄秋之沉靈也丹棗者盛陽之雲芝也伏苓者絳神之伏胎也五華含煙三氣陶精調安六氣養魄護神又曰太玄玉女者帝少昊時人也居蜀之長松山修長生之道遇山中人授以八天隱文使之修佩謂曰修道之要以無為為本八天之書真無為也而道自成然而琅玕曲晨之液八瓊九華之丹使鍊而餌之即太極所祕可以入侍帝宸下覽萬化授九華方於江上鍊丹江畔有金砂泉是其遺迹又曰高辛時有仙人展上公常説昔在華陽下食白李異美憶之未久而忽已三千年矣又曰李脫居蜀金堂山龍橋峰下修道蜀人歷代見之約其來往八百餘年因號曰李八百初以周穆王時來居廣漢栖玄山合九華丹成去遊五嶽十二洞二百餘年於海上遇紫陽君授水玉之道又來龍橋峰作金鼎鍊九丹丹成三於此山學道故世號此山為三學山亦號為栖賢山又曰南陽文氏説其先祖漢末大亂逃壺山中飢困殆絶有一人教食朮遂不飢十年來歸鄉里顏色更少身輕欲飛履險不倦行冰雪內了不知寒朮一名山葪一名山精又曰薛女真者不知何許人也晉室亂離人多栖寓林藪服餌避世因居衡山尋真臺外出行常有黃鳥白猿白豹隨之不知所修何道又曰玉薑者毛女也居華山自言秦人始學食松葉朮飢寒止巖中其行如飛今號其處為毛女峰又曰涓子齊人子餌朮著三才經淮南王劉安得其文不解其旨又著琴書三篇甚有條理又曰張微子漢昭帝時將作大匠張慶女也微子好道常服霧氣自云務是山澤水火之精金石之盈氣久服之則能散形入空與雲氣合體微子自言受此法於東海東華玉妃淳文期青童君妹也微子亦以此霧法教諸學者九真華妃曰日者霞之實霞者日之精人惟聞服日實之法未見其知霞之精也夫餐霞之經甚祕致霞之道甚易此謂體生玉光霞映上清之法也
