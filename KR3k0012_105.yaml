body:
  text: 皇王部二十九後魏敬宗孝莊皇帝後魏書曰孝莊皇帝諱子攸彭城王協音協之第三子母曰李妃肅宗初以協有魯陽翼衛之功封帝武城縣開國公幼侍肅宗書於禁內及長風神秀慧姿貌甚美拜中書侍郎城門校尉兼給事黃門侍郎雅為肅宗所親待長直禁中遷散騎常侍御史中尉孝昌二年八月進封長樂王轉侍中中軍將軍及武太元年春二月肅宗崩大都督爾朱榮將兵向京師謀欲廢立以帝家有忠勳且兼人望陰與帝通榮乃帥衆來赴夏四月帝與兄弟夜北渡河會榮於河陽南濟河即帝位以兄彭城王紹為無上王弟霸成公子正為始平王榮為侍中都督中外諸軍事大將軍尚書令領軍將軍領左右衛封太原王百僚相率有司奉璽綬備法駕奉迎於河梁車駕巡河西至淘渚榮以兵權在已遂有異志乃害靈太后及幼主次害無上王紹始平王子正公卿已下二千餘人列騎衛帝遷於便幕車駕入宮御太極殿大赦天下改武太為建義元年是月汝南王悅北海王皓臨淮王彧前後奔蕭衍郢州史元願達據城叛五月加大將軍爾朱榮北道大行臺以尚書右僕射元榮為東道大使征東將軍光祿勳元欣副之循方黜陟先行後聞大將軍爾朱榮還晉陽帝餞於邙陰六月通直散騎常侍高乾雍及弟帥合流民起兵於齊州之太原頻破州軍詔東道大使元欣喻旨乃降是月葛榮飢使其僕射任褒帥車三萬餘乘南寇至沁水幽州平北府主簿河開邢果帥河北流民十餘萬戶反於青州之北海自署濮王年號天統詔諸有司馬伏從戎者職人優兩大階詔當親御六戎掃清燕代大將軍太原王爾朱榮帥精鋭十萬為左軍上黨王天穆總衆八萬為前軍司徒公楊椿勒兵十萬為右軍司空公穆紹統卒八萬為後軍是月葛榮衆退屯相州之北七月齊獻武王於鄴西北招慰葛榮別帥稱王者七人衆萬餘降之加大將軍爾朱榮柱國大將軍録尚書事光州人劉舉聚衆數千反於濮陽自稱皇武大將軍是月高平鎮人万俟墨其二音醜奴僣大位署置百官八月葛榮帥衆圍相州九月詔太尉公上黨王天穆討葛榮次於朝歌以征東將軍齊州刺史元欣為沛郡王柱國大將軍爾朱榮率騎七千討葛榮於滏口破擒之餘衆帥降冀定滄瀛殷五州平大赦天下已改為永安元年以柱國大將軍太原王爾朱榮為大丞相都督河北畿外諸軍事冬十月蕭衍以北海王皓為魏主年號孝基入據南兗之銍音質城二年夏四月上黨王天穆齊獻武王大破邢果於齊州之濟南果降送京師五月元皓剋梁國內外戒嚴癸酉元皓陷滎陽甲戍夜車駕北巡幸河內景子元皓入洛戊寅太原王爾朱榮會車駕於長子即日反斾上黨王天穆北渡河會車駕於河內秋七月都督爾朱兆賀拔勝從硤石夜濟破皓子冠受及安豐王延明軍元皓敗走車駕入居華林園升大夏門大赦天下宴勞天柱大將軍爾朱榮上黨王天穆及北平來督於都亭出宮人三百繒錦雜綵數萬匹班賜有差三年春三月雍州刺史爾朱天光討醜奴蕭寶寅於安定破擒之囚送京師六月嚈噠國獻師子九月天柱大將軍爾朱榮上黨王天穆自晉陽來朝帝殺榮及天穆於明光殿大赦天下遣武衛將軍奚毅前燕州刺史侯淵帥衆鎮北中是夜左僕射爾朱世隆榮妻鄉郡長公主帥榮部曲焚西陽門出屯河陰攻河橋擒毅等屠害之據北中城南逼京邑十月通直散騎常侍假平西將軍都督李苗以火船焚河橋爾朱世隆退走壬寅爾朱世隆停建興之高都爾朱兆自晉陽來會之共推太原太守行并州刺史長廣王曄為主大赦所部號年建明十二月爾朱兆寇丹谷都督崔伯鳳戰歿都督羊文義史五龍降兆大都督源子恭奔退爾朱兆爾朱度律自富平津上率騎涉渡以襲京城事出倉卒禁衛不守帝步出雲龍門兆逼帝幸永寧之佛寺殺皇子亂兵殺司徒公臨淮王彧僕射范陽王誨戊申元曄大赦天下爾朱度律自鎮京師爾朱兆遷帝於晉陽崩於城內三級佛寺時年二十四中興二年諡為武懷皇帝太昌元年又諡孝莊皇帝廟號敬宗葬靜陵節閔皇帝後魏書曰節閔皇帝諱恭自修業廣惠王之子也母曰王氏王少端謹有志度長而好學事祖母嫡母以孝聞正始中襲爵延昌中拜通直散騎常侍正光三年加散騎常侍領給事黃門侍郎以元乂擅權遂稱疾不起久之因託瘖病五年就除金紫光祿大夫建義元年除儀同三司既絶言垂將一紀居於龍華佛寺無所交通永安末有白莊帝者言王不語將有異圖民間遊聲又云有天子之氣王懼禍逃匿上洛尋見追躡執送京師拘執多日以無狀獲免及莊帝崩爾朱世隆等以元曄踈遠又非人望所推以王潛默晦身有過人量將謀廢立恐實不語乃令王所親申其意旨且兼迫䝱王遂答曰天何言哉世隆等大悅春三月曄迫至邙南世隆等奉王東郭之外行禪讓之禮太尉公爾朱度律進璽綬兗冕之服及就輅車百官侍衛入自建春雲龍門升太極殿前群臣拜禮畢遂登閶闔門詔大赦天下以魏為大魏改建明二年為普泰是月幽州刺史劉靈助起兵於薊撫軍將軍金紫光祿大夫兼侍中河北大使高乾雍及弟平北將軍通直散騎常侍高敖曹率衆夜襲冀州執刺史元嶷魚力切共推前河內太守對隆之行州事三月封長廣王為東海王潁川王爾朱兆為天柱將軍晉州刺史平陽郡開國公高歡封勃海信都王夏四月詔有司不得復稱僞梁罷細作之條無禁鄰國還往高歡以爾朱逆亂始興義兵於信都西定殷州斬其刺史爾朱羽生命南趙郡太守李元忠為刺史鎮廣阿八月追尊皇考為先帝皇妣為先太妃封皇弟永業為高密王皇子子恕為青州渤海王既而高歡推立安定王為帝於信都二年三月高歡敗爾朱天光等於韓陵夏四月高歡使魏蘭根慰喻洛邑且觀帝之為人蘭根忌帝雅德還致毀謗竟從崔㥄音陵議廢帝於崇訓佛寺而立平陽王修是為孝武帝五月帝殂於門下外省時年三十孝武帝詔百司赴會大鴻臚監護事葬用王禮加以九旒鑾輅黃屋左纛班劍百二十人後西魏追諡節閔皇帝後廢帝安定王後魏書曰後廢帝諱朗字仲哲章武王融第三子也母曰程氏少稱明司永安二年為肆州魯郡王後軍府司馬元曄之建明二年正月為冀州渤海太守及高歡起義兵將誅暴逆乃推載之冬十月即皇帝位於信都城西升壇柴燎大赦稱中興元年以高歡為侍中丞相都督中外諸軍事大將軍録尚書大行臺增邑三萬戶以兼侍中撫河北大使高乾雍為侍中司空以前平北將軍通直散騎常侍高敖曹為驃騎大將軍儀同三司冀州刺史以終其身十一月高歡率師攻鄴城二年春正月拔鄴擒刺史劉誕二月以高歡為大丞相柱國大將軍太師增封三萬戶并前為六萬戶三月以齊文襄王起家為驃騎大將軍儀同三司車駕幸鄴閏月爾朱天光兆度律仲遠等屯於洹水之南高歡出頓紫陌爾朱兆率輕騎三千夜襲鄴城叩西門不剋退走高歡大破爾朱天光等四胡於韓陵前廢帝鎮軍將軍賀拔勝徐州刺史杜德於陳降爾朱兆走并州仲遠奔東郡天光度律將赴洛陽大都督斛斯椿賈顯智倍道先還夏四月椿等據河橋懼罪自效尋擒天光度律於河橋西北大行臺長孫稚都督賈顯智等率騎入京師執爾朱世隆彥伯斬於都街口送天光度律於高歡爾朱仲遠奔蕭衍車駕至河陽仍遜於別邸太昌元年五月封安定郡王邑一萬戶後以罪殂於門下外省時年二十永熙二年葬鄴西南野馬岡孝武皇帝後魏書曰孝武皇帝諱修字孝則廣平武穆王懷之第三子母曰李氏性沉厚少言好武治封汝陽縣公拜通直散騎侍郎轉中書侍郎建義初除散騎常侍尋遷平東將軍兼太常卿又為鎮東將軍宗正卿永安三年封平陽王普泰初轉侍中鎮東將軍儀同三司兼尚書左僕射又加侍中尚書右僕射中興二年夏四月安定王自以踈遠未允四海之心請遜大位齊獻武王高歡與百寮會謂僉謂高祖不可無後乃共奉王即帝位於東郭之外自來陽雲龍門御太極前殿群臣朝賀禮畢升閶闔門大赦天下改中興二年為太昌元年帝以世易除復齊獻武王為大丞相大將軍還鄴車駕餞別於乾脯山殺大司馬汝南王悅大赦天下改太昌為永興以同太宗時號尋改為永熙二年春正月車駕幸嵩高石窟靈巖寺十二月車駕狩於嵩陽遂幸溫湯車駕還宮三年春二月壬子大赦壬午封左衛將軍元斌之為頴川王夏四月癸丑日有蝕之五月丙戌直勳府庶子箱別六百人騎官箱別二百人閣內部曲數千人帝內圖高歡乃以斛斯椿為領軍使興王思玫等統之以為心膂軍謀朝政咸決於椿分置督將及河南關西諸刺史辛卯下詔戒嚴楊聲伐梁實謀北討秋七月己丑帝親總六軍率南陽王寶炬清河王亶廣陽王湛斛斯椿以五千騎宿於瀍西陽王別舍沙門都維郍惠臻負璽持千牛刀以從有牛百頭盡殺以食軍士衆知帝將出其夜亡者過半清河廣陽二王亦逃歸略陽公宇文泰遣都督駱超李賢和各領數百騎赴駱超先至甲戍賢和會帝於崤中己酉高歡入洛遣匹屢昭及河南尹元子思領左右侍官追帝請回駕高昂率徑卒及帝於陜西帝楊鞭長騖至湖城飢渴甚有王思村人以麥飯壺漿獻帝甘之復一村十年帝至稠桑潼關大都督毛洪賓迎獻食八月宇文泰遣大都督趙貴梁禦甲騎二千來赴乃奉迎帝過河謂禦曰此水東流而朕西上若得重謁洛陽廟是卿等功也帝及左右皆流涕宇文泰迎於東陽帝勞之將士皆呼萬歲遂入長安以雍州公廨為宮大赦甲寅高歡推司徒清河王亶為大司馬承制總萬機居尚書省歡追車駕至潼關九月己酉歡東還洛陽帝親督衆攻潼關斬其行臺華長瑜冬十月高歡推清河王亶子善見為主徙都鄴是為東魏魏於此始分為二十二月帝崩時年二十五諡曰孝武葬雲陵文皇帝後魏書曰文皇帝諱寶炬孝文皇帝之孫京兆王愈之子也母曰楊氏帝正始初坐父愈罪兄弟皆幽宗正寺及宣武崩乃得雪正光中拜直問將軍時胡太后嬖寵帝與明帝謀誅之事泄免官武泰中封劭縣侯永安三年進封南陽王孝武即位拜太尉加侍中永熙二年進位太保開府尚書令三年孝武與高歡構難以帝中軍四面大都督及從入關拜太宰録尚書事孝武崩丞相略陽公宇文泰率群公卿士奉表勸進三讓乃許焉大統元年春三月戊申帝即位於城西大赦改元追尊皇考為文景皇妣楊氏為后己酉進丞相略陽公宇文泰都督中外諸軍録尚書事大行臺改封安定郡公以尚書令斛斯椿為太保廣平王贊為司徒乙卯立妃乙氏為皇后二年春正月辛亥祀南郊改以神元皇帝配東魏攻陷夏州三年冬十月安定公宇文泰大破東魏軍於沙苑拜泰柱國大將軍四年春正月辛酉拜天於清暉室終帝世遂為常二月東魏攻陷南汾頴豫廣四州廢皇后乙氏三月立蠕蠕而蠢切女都九閭氏為皇后大赦秋七月東魏將侯景等圍洛陽帝與安定公宇文泰東伐九月車駕至東伐五年冬十月於陽武門外懸鼓置紙筆以求得失六年春正月庚戌朝群臣自西遷至此禮樂始備七年十二月御憑雲觀引見諸王敘家人之禮手詔為宗誡十條以賜之八年春正月初置六軍十六年五月東魏靜帝遜位於齊秋七月安定公宇文泰東伐至恆農齊師不出乃還九月大赦十七年春正月庚戍帝崩于乾安殿時年四十五葬於永陵諡曰文皇帝廢帝後魏書曰廢帝名欽文皇帝之長子也母曰乙皇后大統元年正月乙卯立為皇太子十七年三月即皇帝位二年秋八月大將軍尉遲逈剋成都劍南平冬十一月安定公宇文泰殺尚書元烈三年正月安定公宇文泰廢而立齊王廓帝自元烈之誅有怨言淮安王育廣平王贊等并垂泣諫帝不聽故及於辱恭皇帝後魏書曰恭皇帝諱廓文帝之第四子也大統十四年封為齊王廢帝三年正月即皇帝位改元十一月師滅梁戕土良切梁元帝梁太尉王僧辨奉元帝子方智為王承制居建業三年春正月丁丑初行周禮建六官以安定公宇文泰為太師冢宰以柱國李弼為大司徒以趙貴為太保大宗伯以尚書令獨狐信為大司馬以于謹為大司寇以侯莫陳榮為司空冬十月乙亥安定公宇文泰薨十二月庚子帝遜位於周閔帝元年正月東魏封帝為宋公尋殂東魏孝靜皇帝後魏書曰孝靜皇帝諱善見清河文宣王亶之世子也母曰胡妃永熙二年拜通直散騎侍郎秋八月為驃騎大將軍開府儀同三司孝武既入關渤海王高歡奉迎不克乃與百僚會議推帝以奉肅宗之後時年十一月冬十月即位大赦天下改永熙三年為天平元年有事於太廟詔曰安安能遷自古之明典所居靡定往昔之成規是以殷遷八城周卜三地吉凶有數隆替無恆事由於通變理出於不得已故也高祖孝文皇帝式觀乾象俯協人謀發自武州來幸嵩縣魏雖舊國其命惟新及正光之季國步孔棘喪亂不已寇賊相侵俾我生民無所措手今遠遵古式深驗時事考龜襲吉遷澤漳滏庶克隆洪基再昌寶曆主者明為條格及時發邁車駕北遷詔渤海三高歡留後部分以衛軍大將軍尚書令元弼為驃騎大將軍儀同三司洛州刺史鎮洛陽十一月車駕幸鄴是冬蕭衍以元慶和為鎮北將軍魏王入據平瀨鄉孝武崩於長安二年春正月渤海王高歡襲擊山胡劉蠡升大破之詔以高歡為相國假黃鉞劍履上殿入朝不趨王固讓不受三月高歡討劉蠡升斬之蠡升子南海王復僣帝號高歡進擊破擒之及其第西海王皇后夫人王公已下四百餘人并獲逋逃之民二萬餘戶八月發七萬六千人營新宮十二月車駕狩於鄴是歲西魏文帝大統元年三月春正月詔加渤海王高歡九錫之禮遣侍中元子思敦喻固讓乃止二月詔加渤海王世子澄使持節尚書令大行臺大都督秋七月大赦天下四年夏四月遷七帝神主入新廟大赦天下先是蕭衍因益州刺史傅和請好遣李諧等使於蕭衍冬十月西魏遣其大行臺元季海大都督獨孤如願逼洛州行軍事廣陽王湛棄城退還季海如願遂據金墉頴川長史賀若徽執刺史田迅西叛引西魏都督梁回據城西魏又遣其都督趙繼宗右丞韋孝寬等攻陷豫州大象元年春正月巨象至自碭郡陂中南兗州獲送大赦改年大都督賀拔仁攻西魏南汾州拔之率豫州刺史堯雄等與大行臺侯景司徒高敖曹大都督万俟受洛于等於北豫相會俱討頴州梁回等棄城遁走頴川平秋七月行臺侯景司徒高敖曹圍西魏將獨孤如願於金墉城八月大敗西魏於河陰司徒高敖曹儀同三司大都督李猛宗顯並戰歿西魏留其長孫子彥守金墉渤海王高歡濟河子彥棄城走興和元年五月立皇后高氏大赦天下秋七月詔渤海王高歡為相國録尚書事大行臺固辭相國九月發畿內民夫十萬人城鄴城四十日罷十一月以新宮成大赦改元二年春正月徙新宮大赦天下三年冬十月詔群官於麟趾閣議新定制令頒於天下發夫五萬人築漳濱堰四年夏五月渤海王高歡請令百官月一面敷政事明揚仄陋納諫屏邪親理獄訟武定元年春正月大赦改年車駕搜於邯鄲之西山三月渤海王高歡討宇文黑獺於邙山大破之擒西魏臨洮王森蜀郡王榮宗江夏王升巨鹿王闡譙郡王亮追奔至恆農而還豫洛二州平二年春正月渤海王高歡請在并州置晉陽宮以處配沒之口三月渤海王世子高澄為大將軍五年春正月渤海王高歡薨於晉陽司徒侯景反頴州刺史司馬世雲以城附之景入據頴城誘執豫州刺史高元成廣州刺史暴顯等司空韓軌驃騎大將軍儀同三司賀技仁驃騎大將軍儀同三司可朱渾道元左衛將軍劉豐等率衆討之景乃遣使降於西魏請師救援西魏遣其將李景和王思政帥騎赴之思政等入據頴川景乃出走豫州侯景復背西魏歸於蕭衍衍置景為河南王大將軍承制六月司徒韓軌司空可朱渾道元等自頴川班師大將軍高澄迎勞於石濟高澄還晉陽秋七月以大將軍高澄為使持節大丞相都督中外諸軍事録尚書事大行臺渤海王九月蕭衍遣其兄子貞陽侯淵明率衆寇徐州堰泗州於寒山以灌彭城冬十月以尚書左僕射慕容紹宗為東南道行臺與驃騎大將軍儀同三司大都督高嶽潘相樂討淵明十一月大破之擒淵明及其二子六年正月大都督高嶽等戰於渦陽大破侯景俘斬五萬餘人溺於渦水水為之不流景走淮南冬十月侯景濟江推蕭衍弟子臨賀王正德為主以攻建業蕭衍弟子北徐州刺史封山侯蕭正表以鍾離內屬三月侯景剋建業還以蕭衍為主衍第子北袞州刺史定襄侯蕭祇湘潭侯蕭退來降夏四月詔渤海王高澄緑綬紱讚拜不名入朝不趨劍履上殿是月侯景殺蕭衍立子綱為主六月剋頴州擒西魏大將軍尚書左僕射東道大行臺太原郡開國公王思政頴州刺史皇甫僧顯及戰士男女數萬口八月盜殺渤海王高澄甲午太原公高洋如晉陽八年春正月帝為渤海王高澄舉哀於東堂詔太原公高洋嗣事三月進爵為齊王夏五月詔齊王為相國揔總百揆備九錫之禮以齊國太妃為王太后詔歸帝位於齊國即日遜於別宮齊天保元年封中山王二年冬十二月殂時年二十八諡曰孝靜皇帝葬於漳西山岡
