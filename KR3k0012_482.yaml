body:
  text: 人事部一百二十二仇讎上周禮地官調人曰調人掌司萬民之難而諧和之馬融曰難謂相與為仇也凡和難父之讎避諸海外兄弟之讎避諸千里之外從父兄弟之讎不同國君之讎視父師長之讎視兄弟交友之讎視從父兄弟禮記曰子夏問於孔子曰居父母之仇如之何夫子曰寢苫枕于不仕弗與共天下也遇諸市朝不反兵而鬭曰請問居昆弟之仇如之何曰仕弗與共國銜君命而使雖遇之不鬭曰請問居從父昆弟之仇如之何曰不為魁主人能則執兵而陪其後左傳曰祁奚請老晉侯問嗣焉稱解狐其讎也將立之而卒事具薦舉部又曰齊高發帥師伐莒莒不仕齊故也莒子奔紀鄣紀鄣莒邑使孫書孫書陳無字子占也伐之初莒有婦人莒子殺其夫已為嫠婦及老託於紀鄣紡焉以度而去之曰紡纑連所以度城而藏之以待外攻者及師至則投諸外投繩城外隨之而出或獻諸子占子占使師夜縋而登緣繩登城也登者六十人縋絕師鼓譟城上之人亦譟莒共公懼啟西門而出齊入紀傳言怨不在天又曰吳伐越越子勾踐禦之陣于攜李靈姑浮以戈擊闔廬傷將指取其一履其大足指見斬遂失履姑浮取之也還卒於陘去攜李七里夫差使人立於庭茍出入必謂己曰夫差而忘越王之殺汝父乎則對曰唯不敢忘三年乃報越也又曰五年春晉圍柏人士吉射奔齊初范氏之臣王生惡張柳朔言諸昭子使為柏人令柳朔為柏人宰也昭子范吉射也昭子曰夫非而讎乎對曰私讎不及公好不廢過惡不去善義之經也臣敢違之及笵氏出柏人奔齊張柳朔謂其子爾從主免之我將止死王生授我矣授我以死節也公羊傳曰齊哀公享乎周紀侯譖之襄公將復讎乎紀遠祖九世矣九世猶可以復讎乎雖百代可也家亦可乎曰不可國何以可國君一體也先君之恥猶今君之恥也戰國策曰晉畢陽之孫豫讓始事范中行氏不說去而就知伯知伯寵之及三晉分知氏趙襄子最怨知伯而將其頭以為飲器讓遁逃山中曰嗟乎士為知己者死女為悅己者容吾其報知氏之讎矣乃變姓名為刑人入宮塗廁欲以剌襄子襄子如廁心動執問塗者讓刃其扞曰欲為知伯報讎左右欲殺之襄子曰彼義士也吾謹避之耳知伯己死無後而其臣報讎此天下之賢人也卒釋之讓又漆身為癩滅鬚去眉自刑以變其容為乞人而往乞其妻不識曰狀貌不似吾夫其音何類吾夫之甚也又吞炭為啞變其音有謂之曰子之道甚難而無功謂子有志則然矣謂子智則否以子之才而善事襄子襄子必近子子之得近而行所欲此甚見而功必成讓乃笑而應之曰是為先知報後知為故君賊新君大亂君臣之義者無此矣凡吾所謂此者以明君臣之義非從易也且夫委質而事人而求弒之懷二心以事君也吾所為難亦將以愧天下後世人臣懷二心者頃之襄子當出讓伏所當過橋下襄子至橋而馬驚襄子曰此必豫讓也使人問之果讓於是襄子數讓曰子不嘗事范中行氏乎知伯滅范中行氏而子不為報讎反委質事知伯知伯已死子獨何為報之深也讓曰臣事范中行氏中行氏以眾人遇我我故眾人報之知伯以國土遇我我故國士報之襄子乃喟然泣曰嗟乎豫子豫子為知伯名既成矣寡人舍子亦以足矣子自為計使兵環之讓曰臣聞明主不掩人之義忠臣以死為名君前以寬舍臣天下莫不稱君之賢今日之事臣故伏誅然願請君之衣而擊之則死不恨非所望也敢布腹心於是襄子義之乃使使者持衣與讓讓拔劍三躍擊之曰可以報知伯矣遂伏劍而死死之日趙國之士聞者皆為涕泣史記曰秦昭王聞魏齊在平原君所欲為笵睢必報其仇乃佯為好書遺平原君曰願與君為布衣之交十日飲也又曰項梁殺人與項籍避仇吳中吳中賢大夫皆出項梁下又曰留侯張良者其先韓人也秦滅韓良家僮三百人弟死不葬悉以家財求客剌秦王為韓報仇以大父五代相韓故乃變姓名之東海得力士以鐵椎椎秦始皇中其副車又曰河東李文故嘗與張湯有隙己而為御史中丞湯有所愛史魯謁居知文與湯弗平使人上飛變告文姦事事下湯湯治論殺文袁山松後漢書曰蘇謙字仲讓為郡督郵李暠為美陽令貪暴謙案得其贓謙遷金城太守治有異跡延熙九年至京師暠時為司隸收謙誣陷之死獄中謙子不韋字公先變名姓以家財求劍客邀暠不得暠之大司農乃於司農府旁買舍夜為地突入暠室中暠適出不值破其臥具暠大怖棘屋上以板棧地而臥一宿數徙不韋乃至魏郡掘暠父冢斬級以祭父墓級首又曰樂府左延年秦女休行曰始出上西門遙望秦氏家秦氏有好女自名曰女休女休年十五為宗行報讎左執白陽刀右據宛景矛讎家東南僵女休西上山上山四五里關吏不得休女休前置辭生為燕王婦今為詔獄囚刀矛未及下攏障擊鼓赦書下東觀漢記曰海曲有呂母者子為縣吏犯小罪宰論殺之呂母怨宰密藂客規以報仇母家素豐貲產數百萬乃益釀醇酒買刀劍衣服少年來沽者皆貰與之視其乏者輒假衣裘不問多少少年欲相與償之呂母泣曰縣宰枉殺吾子欲為報怨耳諸君甯肯哀之乎少年許諾相藂得數十百人因與呂母入海自稱將軍遂破海曲執縣宰殺之以祭其子冢也又曰趙喜字伯陽南宛人也少有節操從兄為人所殺無子喜十五常思欲報之乃挾兵結客後遂往復仇而仇家皆疾病無相拒者喜以因疾報殺非仁者心且釋之而去顧謂仇曰爾曹若健遠相避也後病愈悉自縛詣喜不與相見後竟殺之又曰周黨字伯況太原人至長安遊學初鄉佐嘗眾中辱黨父黨懷之後讀春秋聞復讎之義更輟講而還與鄉佐剋日交刃黨為其所復困頓鄉佐服義與歸養之數月方蘇既悟而去整身修志州里稱其高也又曰申屠蟠同郡緱氏女玉為父報讎殺夫氏之黨吏執玉以告外黃令梁配欲論殺玉蟠時年十五為書生進諫曰玉之節義足以感無恥之孫激忍辱之子不遭明時當表旌廬墓況在清聽而不加哀矜配善其言乃為讞得減死論鄉人稱美之又曰酒泉龐涓母者趙氏之女字娥父為同縣人所殺而娥兄弟三人俱疾物故讎乃喜而自賀以為莫己報也娥陰懷感憤乃潛備刀兵常推車以候讎家十餘年不能得後遇於都亭剌殺之因詣縣自首曰父仇已報請就刑戮福富長尹喜義之解印綬欲與俱亡娥不肯去曰怨塞身死妾之明分結罪治獄君之常理何敢茍生以枉公法後遇赦得免州郡表其閭太常張奐嘉歎以束帛禮之又曰彭寵故舊渤海趙寬妻子家屬依託寵居寬仇家趙伯有好奴以賕寵寵貪之為盡殺寬家屬寵之勃德不仁貪狼如此又曰郅惲友人董子張病將終惲候之子張視惲戲欷不能言惲曰吾知子不悲天命痛讎不復也惲即起將客遮仇人取其頭以示子張子張見而氣絕惲即詣縣以狀自首漢書曰原涉與新豐富人祁大伯友大伯同母弟王游公素嫉涉時為縣門下掾說尹公曰君以守令辱原涉如是一旦真令至君復單車歸為府史涉剌客如雲殺人皆不知主民可為寒心今為君計莫若條奏其舊惡君必得真令如此涉亦不敢怨矣尹公如其計王莽果以尹公為真令涉繇此怨王游公遂殺游公及子斷兩頭去謝承後漢書曰橋玄遷齊國相郡有孝子為父報讎繫臨淄獄玄愍其至孝欲上讞減罪縣令路芝酷烈苛暴因殺之懼玄收錄佩印綬欲走玄自以為深負孝子捕得芝束縛藉械以還笞殺以謝孝子冤魂范曄後漢書曰劉鯉更始子也得幸於劉輔鯉怨劉盆子害其父因輔結客殺盆子兄故式侯恭輔坐繫詔獄三日乃得釋魏志曰楊阿若後名豐字伯陽少遊俠常以報仇解怨為事至建安中太守徐揖誅郡中強族黃氏時黃昂得脫在外乃募眾得千餘以攻揖揖城守豐時在外以昂為不義乃捐妻子入南羌中合眾得千餘騎昂獨走出羗捕得之豐遂殺之又曰韓暨字公至同縣豪右陳茂譖暨父兄幾致大辟暨陽不以為言庸賃積資陰結死士遂追尋擒茂以首祭父墓由是顯名又曰典韋形貌魁梧膂力過人好節俠襄邑劉氏與睢陽李禮為讎韋為報之禮故富春長備怨甚謹韋乘車載雞酒偽為候者門開懷匕首入殺禮并殺其妻徐出取車吳志曰孫翊之妻徐氏甚美賊媯覽殺翊悉取其嬪妾而復欲逼徐氏恐違之見害時月垂竟乃使人謂覽乞至晦日設祭除服覽許之徐氏遂潛使親信者語翊舊所委任將孫高傅嬰二人具白逼己之狀欲徵立計以求助焉高嬰等聞之涕泣言舊蒙翊恩許之乃密結翊平時所侍養二十餘人以徐氏之言語之仍皆盟誓合謀至晦日徐氏遂設祭除服薰衣沐浴內施帷帳以候覽焉大小怪其如此無不悽愴覽密遣偵之無復疑慮徐氏乃命高嬰輩羅住戶外使人報覽言已除凶畢矣覽遂盛飾而入徐氏出拜戶外覽纔下拜徐氏即呼二郡可起高嬰等齊出即時殺覽徐氏卻服縗絰使持覽首以祭墓舉軍震駭以為神韋昭吳書曰淩統怨甘甯殺其父操甯常避統不與相見孫權亦命統不得讎之嘗於呂蒙舍酒酣統乃以刀舞甯起曰甯能雙戟舞蒙曰甯雖能未若蒙之功也因操刀楯以身分之王隱晉書曰趙誘為杜曾所害誘子胤斬曾食其肝肺又曰桓溫父被害之時溫年十五枕戈泣血密欲報仇經年方知乃提刀直進手刃仇人由是名重當時又曰龔壯字子偉值惠懷末天下大亂李特為寇壯父叔並為特所害壯欲報仇會李壽鎮漢中壽時與李期有嫌壯因說壽討期壽然之遂帥眾還討期特孫也故壯假以復讎壽既捷因欲官壯誓不仕又曰沈充敗於吳興吳興人吳儒充之將也充亡失道誤入儒家誘內充重壁因笑謂充曰三千戶侯也充曰封侯不足貪也爾大義全我我宗族必厚報若必殺我汝族滅矣儒遂殺之充子勁字世堅即潛報仇族滅吳氏沈約宋書曰沈林子以仇讎未復從高祖剋京城進平都邑時年十八身長七尺五寸仇沈預慮林子為害常被甲持戈至是林子與兄田子還東報讎五月夏節直入預男女無長幼悉屠之以預首祭父祖墓孫嚴宋書曰宋越父為蠻所殺其讎嘗出郡越白日於市口剌殺之太守夏侯穆嘉之擢為隊主後魏書曰淳于誕字靈遠年十二隨父向楊州父於路為盜所害誕雖童稚而哀感奮發傾資結客旬朔之內遂得復讎由是州里歎異之又曰孫益德其母為人所害益德童幼為母復仇還家哭於殯以待縣官高祖文明太后以其幼而孝決又不逃罪特免之梁書曰張景仁廣平人也父天監初為同縣違法所殺景仁時年八歲及長志在復讎普通七年遇法公田渚手斬其首以祭父墓事竟詣郡自縛乞依刑法太守蔡天起上言乃下教褒美之原其罪下屬長蠲其一戶租調以旌孝行唐書曰絳州孝女衛氏子無忌夏縣人也初其父為鄉人衛長則所殺無忌時年六歲母又嫁更無弟兄及長常思復讎無忌從伯嘗設宴為樂長則時亦預坐無忌以搏擊殺之既而詣吏稱父讎既報請就刑戮巡察大使黃門侍郎褚遂良以聞太宗嘉其孝烈特令免罪給傳乘徙於雍州并給田宅仍令州縣以禮嫁之
