body:
  text: 百穀部四稷毛詩駉頌閟宮曰有稷有黍有稻有秬禮記曲禮下曰凡祭宗廟稷曰明粢又內則曰豕宜稷國語曰稷為稷不能蕃殖爾雅曰粢稷也郭璞注曰今江東呼粟為粢也孫英曰稷粟也說文曰稷五穀之長也山海經曰廣都之野爰有膏稷廣志曰破減稷逼麥稷此二者以四月熟本草曰稷米甘而無毒益志氣補不足鄭氏婚禮謁文讚曰稷為天官盧育冀州論曰真定好稷地産不為無珍也粟歸藏曰剝良人得其玉小人得其粟河圖說微曰蒼帝起天雨粟也說文曰粟嘉穀實也粟之為言續也爾雅曰虋赤苗芭白苗虋赤粱粟也芑白粱粟也虋音門芑音起尚書仲虺之誥曰肇我邦于有夏若苗之有莠若粟之有粃孔安國注曰始我商家國於夏世欲見剪除若莠生苗粃在粟恐被鋤治傷之也毛詩曰握粟出卜自何能穀又小宛曰交交桑扈率場啄粟周禮地官下曰倉人掌粟入之藏鄭玄注曰九穀盡藏以粟為主禮記曲禮上曰獻粟者執右契契券要古尊也禮記祭法曰父母既歿必求仁者之粟以祀之謂禮終左傳僖上曰冬晉荐饑乞糴于秦秦輸粟于晉自雍及絳相繼命之曰泛舟之役又襄元曰季文子卒大夫入斂無衣帛之妾無食粟之馬又襄六曰鄭子皮即位於是鄭飢而未及麥民病子皮以子展之命餼國人粟戶一鍾又昭六曰夏會于黃父謀王室也王室有子朝亂謀定之也趙簡子令諸侯之大夫輸王粟春秋佐助期曰粟神名許給姓慶天又說題辭曰高而平者為原平者和故宜粟又曰粟助陽扶性粟之為言續也粟五變一變而以陽生為苗二變而秀為禾三變而粲然謂之粟四變入臼米出甲五變而蒸飯可食宋均注曰粟受五行氣而五變故乃成可食陽以一立為法故粟積大一分穗長一尺文以七烈精以五立故其字粟為粟西者金所立米者陽精故西字合米而為粟宋均注曰續為續陽生長也受五行氣故有變春秋潛潭巴曰天雨粟無德者興有德者不祿小人進大臣辱公羊傳僖上曰秋齊侯宋公江人黃人會於陽穀桓公無障谷無貯粟何休注曰有無相通穀梁傳莊公曰諸侯無粟諸侯相歸粟正也論語雍也曰子華使於齊冉有為其母請粟子曰與之釜請益曰與之庾原思為之宰與之粟九百辭子曰無以與爾鄰里鄉黨乎周書曰神農之時天雨粟神農耕而種之作陶冶斤斧破木為耜鉏耨以墾草莽然後五穀興以助果蓏之實史記曰武王平殷亂天下宗周伯夷叔齊恥之義不食周粟又曰宣曲任氏之先為督道倉吏秦之敗豪傑皆爭金玉而任氏獨害倉粟楚漢相拒滎陽民不得耕種米石至萬金而豪傑金玉盡歸任氏任氏以此起富又曰漢興七十餘年之間國家無事非遇水旱之災太倉之粟新陳相因充溢露積於外至腐敗不可食也又曰文帝徙淮南王道死民歌曰一斗粟尚可舂一尺帛尚可縫兄弟兩人不能相容又汲黯傳曰河內失火上使黯往視之還報曰河內人或父子相食臣謹發河南倉粟以賑貧乏上賢而釋之史記曰大將軍青遂至填顏山趙信城得胸奴積粟食軍軍留一月而還悉燒其城餘粟以歸漢書曰酈食其說齊王曰漢英豪賢才皆樂為之用諸侯之兵四面而至蜀漢之粟方船而下又曰公孫弘起家徒步為丞相故人高賀從之食以脫粟米飯覆以布被賀怨曰何用故人富貴為脫粟布被我自有之乃退又曰主父偃諫伐胸奴曰秦皇使天下飛芻挽粟起於東睡琅耶負海之郡轉月北河率三十鍾而致一石又曰秦將王離涉河圍巨鹿章邯軍其南築通道而輸之粟又曰神農之教曰有石城十仞湯池百步帶甲百萬而亡粟弗能守汜勝之書又又東方朔傳曰侏儒長三尺俸一囊粟錢二百四十臣長九尺餘亦俸一囊粟錢二百四十侏儒飽欲死臣朔飢欲死又曰賈捐之上書曰武帝元狩六年太倉之粟紅腐不可食謝承後漢書曰丹易方儲字聖明曉風角占候為章句長民田還置餘粟二石及刀鋤於田陌聖明曰求亡去疑其鄰家儲曰此人非偷自呼縣功曹語曰君何取粟置家後積茭中功曹款服後漢書王符潛夫論曰富貴則背親捐舊喪其本心朽貫千萬而不忍賜人一錢積粟腐倉不忍貸人一升後魏書曰任城王雲為冀州刺史雲留心政事甚得下情於是合城長吏請輸絹五尺粟五升以報雲恩高祖嘉之又曰世祖引高允與論刑政言甚稱旨因問允曰萬機之務何者為先是時多禁封良田又京師遊食者衆允因言曰地方一里則為田三頃若勤之則畝益三升不勤則畝損三升方百里損益數率為粟二百二十二萬斛況以天下之廣乎若公私有儲雖遇飢年復何憂哉世祖善之遂除田禁又曰韋朏字尊顯少有志業年十八辟州主簿時屬歲儉朏以家粟造粥以飼飢人所活甚衆後周書曰王罷為華州刺史時關中大飢徵稅民間穀食以供軍費或隱匿者令遞相告多被篣捶以是人有逃散唯罷信著於人莫有隱者得粟不少唐書曰始平人宗士朓負粟一石委於大倉而去云願少益軍國高祖嘉之賚物百假晉史曰高祖明而難犯事多親決嘗有店婦與軍士墾訴無以自明帝為鞠吏曰雖屬官吾可市而代之兩訟未分何以為斷可殺馬刳腸而視其粟有則軍士誅無則婦人死遂殺馬馬腸無粟因戮其婦境內肅然莫敢以欺漢實録曰王周性寬恕不忤物情初刺信都州城西橋敗覆民租車周曰橋梁不飾子之過也乃還其所沉粟出私財以修之孔叢子曰子思居貧其友饋之粟者受二車焉或獻樽酒束修子思曰為費而無當也或曰子取人粟而辭酒是辭少而受多也於義則無名於分則不全行之何也子思曰然伋不幸而貧於財及至困乏將絶先人之祀夫所以受粟為周乏也酒酺則所以飲宴也方乏於食而乃飲宴非義也吾豈以為介哉度義而行之又曰季桓子以粟十鍾餼夫子夫子受而班門人之無者子貢曰季孫以夫子貧故致粟今而施人無乃乖彼意乎子曰吾受而不辭為季孫之惠受不為富惠於一人豈若數百人哉管子曰桓公觀於野曰何物可比君子之德隰朋曰粟可比君子之德管仲曰苗始出生也昫昫音昫乎以孺子安之則安不得則危故命之曰禾此可比君子桓公曰善晏子春秋曰北郭騷見晏子曰願託所以養母晏子分倉粟府金以遺之辭金受粟晏子見疑出奔北郭子遂造公庭曰晏子天下賢人去齊敵必來侵臣見國之侵不若死請以頭白晏子因自殺景公聞大駭自追晏子又曰寸之管無當天下不能足粟今齊國丈夫耕女子織夜以接日不足以奉上而君側雕文刻鏤之觀此無當之管也曾子曰曾子魯君饋之粟辭不受使者曰子無求於人人自致之曰與人者驕人受人者畏人縱子不以是驕我我能無畏乎與富而畏人不若貧而無屈墨子曰世俗之君子視義士不若視負粟者今有人於此負粟息於路側欲起而不能君子見之無長少貴賤必起之何重故也今為義之君子奉承先王之道以語之縱不說而行又從而非毀之則是世俗之君子視義士不若視負粟者莊子曰周家貧貸粟於監河侯侯曰待我得邑金將貸子周作色曰周昨來有呼周者視轍中有一鮒魚曰我東海之波臣也君豈有斗升水活我哉周曰諾我且南遊吳越激西江之水迎子可乎鮒魚曰不如早索我於枯魚之肆呂氏春秋伍子胥諫吳王曰非吳喪越越必喪吳今將輸之粟是長吾讎而券吾仇也又曰飯之美者玄山之禾不周之粟不周山在崑崙山北陽山之穄南海之秬崑崙之南故曰陽山穄關西為之麋秬黑黍也商君書曰金一兩生於境內粟十二石死於境外粟十二石生於境內金一兩死於境外國好生金於境內則金粟兩死倉府兩虛國弱好生粟於境內金粟兩生倉府兩實國強荀卿子曰仁義禮善之於人也譬之若貨財粟米之於家也多有之者富少有之者貧至無有者窮淮南子曰鬻棺者欲民之疾疫畜粟者欲歲之飢荒也又曰黃帝治天下力牧太山稽輔之狗彘吐菽粟於道路而無分爭之心又曰昔者蒼頡作書而天雨粟高誘注曰蒼頡始視鳥跡之文而造書者也有書契則詐僞萌生去本走末棄耕作之業也務錐刀之利天知其將餓故雨粟也又曰量粟而舂數米而炊可以治家而不可以治國又曰馬不食脂桑扈不啄粟非廉也又曰未嘗稼穡粟滿倉未嘗桑蟲絲滿囊得之不以道用之橫橫放也又曰粟得水而熱甑得火而液水中有火火中有水疾雷破石陰陽相薄自然之熱又曰闔盧伐楚五戰入郢燒高府之粟六韜曰武王入殷發巨橋之粟以與殷民說苑曰十粟為一分十分為一寸又曰墨語禽滑氂曰今凶年與子隋侯珠又與子一鍾粟子將何擇氂曰粟可耳亦具珠部又曰高平王遣使者從魏文侯貸粟文侯曰須吾租收邑粟至乃得也使者曰臣初來時見瀆中有魚張口謂臣曰吾窮水魚命在呼吸可得灌乎臣謂之曰待吾南見河堤之君決江河之水灌汝口魚曰謂命在須臾乃須決江淮之水比至君還必求吾於枯魚肆今高平貧窮故遣從君貸速乃須租收大王必求臣於死人之墓風俗通曰燕太子丹仰歎天為雨粟賈誼書曰鄒穆公有令食鳧鴈者必以秕無敢以粟於是倉無秕而求易於民二石粟得一石秕民請曰秕食鳧鴈為無費也今求秕於二石粟而易一石粃食鳧鴈則費甚矣請以粟食之穆公由去非爾所知也夫百姓朐牛而耕暴背而藝勤而不敢隋者豈謂鳥獸哉粟米人之食也奈何以其食養鳥且汝知小計而不知大害朝錯書曰利民欲者莫如用爵致粟能以粟拜爵者皆民之有余者也汜勝之書曰欲知歲宜以布囊盛粟等量埋於陰地冬至後取量最多者多種之桓階別傳曰階為趙郡太守路有遺粟一囊耕者得之舉以繫樹數日其主聞還取之桂陽先賢畫讚曰成子郴中人能達鳥鳴為郡主簿與衆人俱坐聞雀鳴而笑曰東市輦粟車覆雀相呼往食之衆人遣視信然益部耆舊又載王子年拾遺記曰東極之東有龍枝之粟言其枝屈曲游龍食之善走又有鳳冠粟似鳳之冠食者令人多力有雲渠粟叢生葉似扶蕖食之益顏色粟莖赤黃皆長二丈千株叢生博物志曰鴈食粟則翼垂不能飛鄒子曰董仲舒三年不窺園嘗乘馬不沉牝牡朱買臣貧賤之時孳孳修藝不知雨之流粟志在經傳也京房易祅占曰天雨粟不肖者食祿與三公易位天雨稻黍者亡天雨稻大臣當誅古今注曰武帝建元四年天雨粟宣帝地節三年長安雨黑粟元帝竟寧元年南陽山郡縣雨粟色青黑味苦大者如豆小者如麻子赤黃味如麥建初二年九江壽春雨粟光武建武二十年清河廣川雨粟大如莧實色黑吳氏本草曰陳粟神農黃帝苦無毒治痺熱渴粟養腎氣杜寶大業拾遺録曰吏部侍郎楊恭仁欲改葬學士舒綽曰此所擬之處掘深五尺之外亦有五穀若得一穀即是福德之地公侯世世不絶恭仁即將綽向京令人掘深七尺得一穴如五石甕大有粟七八斗此地經為粟田蟻運粟下於此穴當時朝野之士以綽為聖任昉述異記曰光武興洛陽斗粟萬錢人死者相枕漢末大飢江淮間童謠曰大兵如市人死如林持金易粟粟貴於金洛中謠云雖有千黃金無如我斗粟斗粟自可飽千金何所直袁紹在冀州時滿市黃金而無斗粟餓者相食人為之語虎豹之口不如飢人劉備在荊州粟與金同價永嘉之亂洛中飢荒懷帝遣人觀市珠玉金銀填委市門而無粟麥袁宏上表云田畝由是丘墟都市化為珠玉又曰晉末荊州久雨粟化為蟲蟲害民春秋云穀之飛為蟲是也中郎王義興表曰臣聞堯生神禾而晉有蟲粟陛下自以聖德何如也帝有慚色又曰宋高祖之初當晉末飢饉之後既即位而江表二千餘里野粟生焉又曰淮南諸山石穀生石上生穀也袁安公云石穀藥名穗之尤小者是也應翊像讚序曰赤眉賊攻其所居城翊盡以私穀數十萬賑城中于時粟斗數萬不稱其仁
