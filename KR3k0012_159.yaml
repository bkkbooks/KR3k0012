body:
  text: 河南道上東京開封府元和郡國志曰禹貢兗州之域春秋時為鄭地戰國時為魏都史記曰魏惠王自安邑里徙大梁今浚儀縣按後漢書大梁城魏惠王所築漢書曰酈食其説高祖曰陳留天下之衝四通五達之郊又曰文帝以皇子武為梁王都大梁後東徙睢陽注曰睢陽今宋州也後漢書曰明帝永平十五年東巡至大梁春秋後語曰蘇秦去韓之魏説襄王曰大王之地南有鴻溝陳留汝南郾邵陵舞陽新都東譙潁煮棗無疏鴻溝今在譙縣潁今潁州煮棗今曹州宛可地無疏或作無咠未詳所在西有長蛇之地史記作長城之地今武原縣有長城北有河水卷燕酸棗地方千里田舍廬廡之數無所不畜牧人民之衆牛馬之多夜行不絶𨋮𨋮殷殷車馬聲也𨋮火宏切夫魏天下之強國也王天下之賢王也郡國志曰東魏孝靜帝以此置梁州周宣帝改為汴州以其臨汴水為名也隋大業十三年州廢以開封浚儀屬鄭州隋亂陷賊唐武德四年平王世充復置汴州五代史曰梁開平元年梁祖初開國升汴州為開封府建名東京元管開封浚儀陳留雍丘封丘尉氏六縣至是割滑州之酸棗長垣鄭州之中牟武陽宋州之襄邑曹州之戴邑許州之扶溝鄢陵陳州之太康九縣隸焉天后唐復降為汴州以宣武軍為額其陽武長垣扶溝考城等四縣仍且隸汴州其天余五縣卻還本部晉天復中復升為東京復以前五縣隸之漢周並因之太康地記曰豫州之分其人得中和之氣性安舒其俗阜其人和今俗多寬慢漢志曰開封逢池在東北或曰宋之逢澤也瓚曰汲郡古文梁惠王廢逢忌之藪以賜民今浚儀是也史記曰王稽與范睢言曰先王待我于三亭之南三亭今屬浚儀陳留風俗儀傳曰阮簡為開封令有劫賊外白甚急簡方圍棊長嘯曰局上有天動甚急徐廣史記音義曰秦孝公會諸侯於蓬澤圖經曰浚儀有高陽故城顓頊高陽氏佐少昊有功封於此城又曰浚儀有信陵亭在城內即魏公子無忌勝天慨之地左傳曰韓起送女於楚還過鄭鄭伯勞諸國今圍城是也漢志曰陳留郡鄭邑天后為陳所併故曰陳留瓚曰宋亦有留彭城留是也留屬陳故稱陳留也古史考曰伊尹生於空桑陳留有空桑故城家語曰孔子南遊於楚至阿谷之隧使子貢奉觴從女子乞飲今陳留有阿谷水漢志曰雍丘屬陳留故杞國周武王封禹天后東樓公左傳曰衛侯伐鄭至于鳴天雁在雍丘有鳴天雁亭左傳曰齊桓公會諸侯于葵丘今在雍丘縣漢志曰東昏陳留郡莽改曰東明又曰襄邑屬陳留有服官莽曰襄平師古曰襄邑宋地本承匡襄陵鄉宋葬公所葬故曰襄陵秦始皇以承匡卑濕故徙縣於襄陵謂之襄邑縣陳留風俗傳曰襄邑縣南有渙水睢水傳曰睢渙之水出文章故有黻黻藻錦日月華蟲以奉天子宗廟御服焉左傳曰宣二年鄭破宋師于大棘杜預曰在襄邑天后漢地理志曰陳留郡已吾有大棘鄉國都記云封丘衛地故燕之延鄉也高祖與項羽戰戰於延鄉有翟母免其難故以延鄉封翟母焉漢志曰封丘屬陳留郡孟康曰春秋時敗翟于長丘今翟溝是也漢志曰尉氏屬陳留郡應劭曰古獄官曰尉氏鄭之別邑也瓚曰鄭大夫尉氏之邑遂以為邑師古曰鄭大夫尉氏亦以掌獄之官故為族耳後漢地理志曰陳留郡尉氏有陵樹鄉鄉北有澤澤有天子苑囿有秦樂廄漢以馴養猛獸漢志曰外黃屬陳留郡張晏曰魏郡有內黃故加外耳瓚曰縣有黃溝故依之也左傳曰惠公敗宋師于黃杜注外黃縣東有黃城陳留風俗傳曰沛公起兵野戰喪皇妣於皇鄉天下平定乃使使者以梓宮招魂於野有丹蛇自天灑濯入梓宮其俗處仍有遺天發其處在小黃屬陳留漢志曰長垣屬陳留郡莽曰長固孟康曰春秋會于匡今匡城是晉地道記云長垣故衛故匡城地孔子厄處也地道記曰承匡城在縣西左傳文十一年會晉卻缺于承匡是也漢志曰鄢屬陳留莽曰順通左傳隱公曰鄭伯克假于鄢又鄭太叔侵鄭至于廩延注曰縣北有延津天后漢地理志曰即酸棗也戰國策云齊欲發卒取周九鼎顏率曰夫梁之君臣欲得九鼎謀於沙海之上為日久矣沙海屬浚儀陳留風俗傳曰縣有蒼頡師曠城其城有列仙吹臺梁王增天築之以為吹臺俗號繁臺史記曰大梁城有十二門東門曰夷門隱士侯嬴年七十家貧為大梁夷門抱關者魏公子無忌厚遺之不肯受水經曰大禹塞滎陽澤開渠以通淮泗名莨菪渠至汴渠也漢平帝時河汴決壞後明帝遣使者修治汴渠至隋大業中更令開導名通濟渠引河水入汴口自大梁之東引入泗連于淮至江都宮入于海亦謂之御河河畔築御道植柳煬帝巡幸乘龍舟而往江都自楊益湘南至交廣閩中公私漕運商旅軸轤相接隋書曰大業元年以汴水迂曲回復稍難自大梁城西南鑿渠引汴水入號通濟渠西京河南府十道志曰洛州周之舊都禹貢豫州之域尚書洛誥曰召公既相宅周公往營成周使來告卜作洛誥豫惟乙卯朝至于洛師我卜河朔黎水我乃卜澗水車瀍水西惟洛食又卜湹水東亦惟洛食言先卜河北黎水不吉又卜澗瀍之間乃吉周禮司徒職曰以土圭之法測土深正日影以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多陰日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所會也陰陽之所和也然則百物阜安乃建王國焉又曰午為鶉午周之分野自柳九度至張十七度七星周之分野周書曰周公將致政乃作大邑于洛北因邙山以為天下之湊也孝經援神契曰八方之廣周洛為中於是遂築新邑營定九鼎以為王之東都漢書曰高祖欲都洛陽戍卒婁敬求見上曰陛下都洛陽欲與周室比隆哉上曰然敬曰陛下取天下與周室異周之先自后稷積德十餘世公劉避狄居豳大王以狄伐故去豳之歧國人爭歸之文王為西伯武王伐紂八百諸侯不期而會成王即位周公之屬輔相焉乃營成周於洛邑以為天下中四方納貢道里均有德則以王無德則易以亡凡居此者欲務以德致人不令後世驕奢以虐民也及周之襄乃分為二天下莫朝周不能制形勢弱也今陛下用兵取天下百姓肝塗地而欲比隆周室臣以為不侔矣不如都秦帝以問張良良曰洛陽雖險其中不過百里四面受敵此非用武之國不如都關中婁敬之説是也博物志曰周在中樞三河之分風雨所起四險之國武王克殷定鼎郟鄏以為東都皇甫謐帝王世紀曰周公相成王以酆鎬偏在西方職貢不均乃使邵公卜居洛水之陽以即中土元和郡縣志曰河南府三代皆為都邑周公營之為成周秦為三川郡漢為河南郡後漢光武都之左傳曰初平王東遷辛有適伊川見被髮而祭於野者曰不及百年此其戎乎其禮先亡矣帝王世紀曰周襄王十五年秦晉遷陸渾之戎于伊川果辛有之言又曰晉趙鞅納王使汝寬守闕塞服虔曰闕塞南山伊闕也史記曰秦武王謂甘茂曰寡人欲通三川以窺周室死且不朽矣漢志曰雒陽周公遷殷民是為成周春秋昭三十二年晉合諸侯于狄泉以其地大成周之城王莽曰宜陽後漢書曰時天下墾田不以實戶口互有增減詔下郡國檢覆其事而州郡多不均平百姓嗟怨帝見陳留牘上有書視之云潁川弘農可問河南南陽不可問帝怒時顯宗為東海公年十二言曰吏受郡勑當欲以墾田相方耳帝問曰何故言河陽南陽不可問對曰河南帝城多近臣南陽帝鄉多近親又曰梁鴻登北邙山作五噫之歌曰登彼北邙兮噫覽觀帝京兮噫宮室崔嵬兮噫寥寥未央兮噫人之劬勞兮噫魏志曰明帝即位欲平北邙山令登觀臺見孟津廷尉辛毗諫曰天地之性高高下下今而反之既非其理若九河盛溢洪水為害丘陵皆夷何以禦之乃止晉書曰武帝問尚書郎虞摯三日曲水事摯曰漢章帝時平原徐肇以三月初生三女至三日俱亡一村以為怪乃相攜至水邊洗除因流水以濫觴遂以成俗帝曰若如所説非嘉事也尚書郎束晳對曰虞摯小生未究其本此事起自周公卜成洛邑因流水泛酒故逸詩羽觴隨波流及秦昭王時三月上巳日置酒河曲遂有金人自泉而出捧水心劍於王曰令君制有西夏此即其處因立為曲水焉二漢相沿為盛集帝嘉晳對隋書曰煬帝命僕射楊素等營構宮室大業元年遂成新都而徙居之今洛陽宮是也洛陽地圖曰鞏在洛水之間鞏固也言四面有山可以鞏固也朱超石與兄書曰洛下道路本好青槐映蔭可愛陸機洛陽記曰洛陽有銅駝街漢鑄銅駝二枚在宮南四會道相對俗語曰金馬門外集衆賢銅駝陌上集少年水經曰伊水東北過伊闕昔大禹疏龍門以通水兩山相對望之如闕伊水歷其間謂之伊闕穆天子傳曰天子射鳥有獸在葭中七萃之士高賁戎擒之以獻天子命畜之東虞曰虎牢唐諱虎故改武其後又名成皋十道志曰壽安縣漢宜陽縣也史記曰張儀為秦説韓王曰大王今不事秦秦下甲據宜陽斷韓之上地東取成皋滎陽則鴻臺之宮非大王有也又蘇秦説韓宣惠王曰韓北有鞏成皋之固東有宛穰洧水南有陘山密縣有徑山西有宜陽商坂之塞地方九百里帶甲數十萬陜州十道志曰陜州陜郡禹貢豫州之域周為二伯分陜之地即古虢國地戰國時屬韓秦併天下屬三川郡史記曰周成王時召公為三公自陜以西召公主之自陜以東周公主之後漢書曰獻帝東歸至陜議者欲令天子浮河東下太尉楊彪曰臣弘農人從此已下東有三十六難非萬乘所當從乃止史記曰芮國在今馮翊界魯桓公三年芮伯萬為母薑氏所逐遂居于魏今芮城是也詩曰虞芮質厥成文王蹶厥生毛萇注曰虞芮之君相與爭田而久不平乃相謂曰西伯仁人盍往質焉及入境見行者讓路耕者讓畔咸相謂曰我等小人不可以履君子之庭乃相讓所爭之地以為間田天下聞之歸周者四十餘國唐書曰天寶元年陵郡太守李齊物鑿三門山路所通深便於漕運於所開瀆中得古鏵鉏上有古篆平陸二字由是其年改為平陸縣山海經曰夸父之山其北有林名曰桃林廣圍三百里中多馬造父於其中得驊騶騄耳之乘以獻穆王尚書曰放牛於桃林之野春秋曰處桃林之塞桃林在鑿寶縣
