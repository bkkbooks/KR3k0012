seq: 36
front:
  text: 時序部二十豐稔詩序曰華黍時和歲豐宜黍稷也詩曰我黍與與我稷翼翼我箱既盈我庾維億露積為庾十萬曰億又曰彼有不穫徲此有不斂穧彼有遺秉此有滯穗伊寡婦之利秉把也鄭箋云成王之時言百穀既多穗同齊然收刈促遽力皆不足而有不獲不斂遺秉滯穗寡婦取之以利也又詩序曰豐年秋冬報也報者謂嘗也蒸也詩曰豐年多黍多稌亦有高廩萬億及秭數萬至萬曰億數億至萬曰秭箋云豐年大有年也萬億及秭言穀多也為酒為醴蒸畀祖妣以洽百禮降福孔偕偕遍也箋云蒸進也畀與也穀梁傳曰宣公十六年冬大有年五穀大熟漢書曰宣帝即位用吏多選百姓安土歲數豐穰穀每石數錢漢記曰鮑得修志節有名績纍官為南陽太守歲荒災唯南陽豐稔吏民愛悅號為神父又曰建武二年秋天下野穀旅生麻菽尤盛或生苽菜果實野蠶成璽被山民收其絮採穫穀果以為畜積京房易逆刺曰天雨穀歲大熟尚書考靈耀曰春政不失五穀孳初夏政不失甘雨時季夏政不失地無災災謂土不稼穡秋政不失人民昌冬政不失少疾喪五政不失百穀稚熟日月光明晚熟曰稚詩曰稙稚菽麥禮稽命徵曰天子祭天地宗廟六宗五嶽得其宜則五穀豐雷雨時至四夷貢物禮斗威儀曰君乘木而王則草木豐茂嘉穀並生春秋元命苞曰咸池主五穀其星五者各以有職以精委為穀也宋均曰穀有五故五星主之咸池之為言皆多也言穀生於子水含秀懷實至秋精垂故一名五車以載歸之為言扶而化之孝經援神契曰歲星守心年穀豐晏子春秋景公伐魯得東門無澤公問魯年穀對曰陰冰厥陽冰厚五寸公問晏子晏子曰君問年穀穀答以冰禮也陰冰厥陽冰厚五寸者寒溫節寒溫節則政平政平則上下和上下和則年穀熟臣恐疲兵而無成君盍盍何不也禮魯以息吾怨遂不伐魯汝南先賢傳曰袁安為楚相會楚王坐事互相牽引拘繫者千餘人安受命即奔轡而行先決獄應時理遣一旬之中延千人之命其時甘雨滂沛歲大豐稔南越志曰高興縣野多客雞其形如雞而五彩至則年穰臨海異物志曰獨舂鳥聲有似舂鳴聲多者五穀傷鳴聲少者五穀熟袁子正書曰語曰歲在辛酉乞漿得酒梅陶書曰古人就食於安里今三州米流出門無如今年豐也若以古人用之則纍年之儲也廣雅曰年稔秋穀熟也桓子新論曰世俗咸曰漢文帝躬儉約修道德以先天下天下化之故致充實殷富澤加黎庶穀至石數十錢上下饒羡物理論曰正月朝四面黃氣其歲大豐此黃帝用事土氣均和四方並熟鹽鐵論曰周公時天下太平丘陵高下皆熟山海經曰鰩魚見天下大穰古歌詞曰長安城西雙員闕上有一雙銅雀宿一鳴五穀生再鳴五穀熟凶荒禮曰歲凶年穀不登君膳不祭胏馬不食穀馳道不除祭事不懸大夫不食梁士飲酒不樂皆為自損憂民禮殺生則祭先有虞氏以首夏后氏以心殷人以肝周人胏不祭胏則不殺生也天子食曰少牢朔曰大牢諸侯食曰特牲朔曰少牢除治道為妨民取蔬食懸樂器鐘聲之屬也梁嘉食也不樂去琴瑟也又曰凶年則乘駑馬祀以下牲自貶損亦取易供也駑馬六種最下也下牲少牢若時豕特豚也傳曰五年春無冰梓慎曰今茲宋其飢乎歲在星紀而淫於玄枵以有時災陰不堪陽時災無水也陰盛用事而溫無水是陰不勝陽地氣發泄也蛇乘龍蛇玄武之宿虛危之星龍歲星歲星木也為青龍星失次為蛇所乘龍宋鄭之星宋鄭必飢又曰晉荐飢麥未皆不熟也使乞糴于秦秦伯謂百里奚與諸乎對曰天災流行國家代有救災恤鄰道也行道有福丕鄭之子豹在秦請伐晉秦伯曰其君是惡其民何罪秦於是乎輪粟于晉自雍及綘相繼命之曰泛舟之役後秦飢晉閉之糴又曰宋公子鮑禮於國人宋飢竭其粟以貸之年自七十已上無不饋飴也穀梁傳曰一穀不熟謂之歉歉食不足二穀不熟謂之飢三穀不熟謂之饉爾雅曰穀不熟為飢蔬不熟為饉果不熟為荒仍飢為荐漢書曰高祖二年關中大飢米斛萬錢又曰漢興接秦之弊諸侯並起民失作業而大飢饉米石五千相食死者過半高祖乃命民得賣子就食蜀漢又曰歲飢民貧卒食半菽或曰半五升器名也目瓚案士卒食蔬菜以菽莽半之又曰元帝二年齊地飢米石三千餘又曰王莽時雒陽以東米石二千莽遣三公將運關東諸侯倉賑貸窮乏又分遣大夫謁者教民煮木為酪服虔曰煮木實為酪酪不可食重為煩擾流民入關者數十萬人置養贍官以廩之盜發其廩民餓死者十七八東觀漢記曰王莽末南方枯旱民多飢餓郡人野澤掘鳧水草實也茨而食又曰赤眉還入長安鄧禹與戰敗走至高陵軍士飢餓皆食藻菜帝乃徵禹還勑曰赤眉無穀自當來降吾折之舌反捶笞之非諸將憂也謝承後漢書曰趙典兄子溫遭歲大飢散家糧以賑窮餓所活萬餘人王隱晉書曰永嘉五年洛中大飢五月摯虞餓死又曰劉琨與丞相箋曰夏則桑椹冬則瑩音勞豆視此哀歎使人氣盡晉中興書曰中原亂中宗初鎮江左假郗鑒龍驤將軍兗州刺史鎮鄒山又徐龕石勒左右交侵百姓飢饉野無生草時或掘野鼠蟄燕而食之又曰太興元年詔曰亢旱穀貴百姓嗷嗷有資者貴糴貧羸之民益困漢世穀貴官賤糴使價不超越謂之平準今雖無此可出邸閣米萬斛使三分減一以平其價令貧困者悉得足以至秋也吳志曰駱公緒年八歲與親客歸會稽事嫡母甚謹時飢荒多有困乏公緒為之飢飲食衰少其姊仁愛有行寡婦無子公緒見甚哀之娣問其故公緒曰士大夫糟粳不足我亦何必獨飽姊誠知如是何不告我而自苦若此乃自以私粟與公緒又以告母母亦賢之遂使分施由是願名周書曰天有四殃水旱飢荒其至無時非積畜何以備之夏歸藏曰士無兼年之食遇天飢妻子非其妻子也大夫無兼年之食遇天飢輿馬臣妾非其有也國無兼年之食遇天飢百姓非所有也戒之哉國語曰越大夫種謀曰今吳既罷音疲罷勞也而大荒荐飢市無赤米米之惡也而囷簏空虛圓者為囷方者為簏其民必移就蒲嬴於東海之濱蒲蒲子嬴蚌蛤之屬也賓海涯又曰魯飢臧文仲以玉罄如齊告糴宋廟罄鳴球也典略曰從興平元年至建安二年其間四歲中咸陽蕭條後賊李堪等始將部曲入長安居卓故塢中拔取酸棗䔧藋藋從吊切以給食發冢取衣蓋形崔鴻三十國春秋曰諸州自建武元年十一月不雨雪至十二年八月穀價踴貴金斤直米二升民流散死者十有五六百姓嗷然人無生賴又曰建元元年襄國大飢穀二升直銀一斤肉一斤直銀一兩韓子曰秦大飢應侯請發五菀果棗栗以活民王曰秦法賞有功誅有罪今發五菀是有功無功俱賞也墨子曰百穀不收謂之旱三穀不收謂之凶四穀不收謂之餽音匱五穀不收謂之飢淮南子曰畜者欲歲之荒飢謂將取厚利袁子正書曰滑釐也今當凶年有欲與子隨侯之珠者又有欲與子一鍾之粟者子將何擇釐曰吾取粟可以救窮河圖曰日月兩重暈者飢之祥也魏名臣奏曰太尉司馬懿奏云秋潦傷五穀又無菜蔬北方民已有食桑皮者英雄記曰李催等相次戰長安中盜賊不禁白日虜掠是時穀一斛五十萬豆麥二萬人相食啖白骨委積臭穢蒲路又曰幽州歲歲不登人相食有蝗旱之災民人始知採以棗堪為糧穀一石十萬錢公孫伯圭開置屯田稍稍得自供給音呂又曰建安七年鄴中大飢芋一畝二萬錢博物志曰荒年暫碎穀法但食蠟半斤輒支十日不飢漢應享應立豫讚序曰王莽居攝以病告歸後赤眉賊攻其所居城粒盡以私穀數十萬斛賑城中于時賑粟十數萬莫不稱其仁晉王洽集曰洽臨吳郡上表曰編戶僵尸葬埋無主或闔門餓餒煙火不舉旱春秋考異郵曰旱之言悍也陽驕蹇所致也詩曰旱既太甚悠悠山川又曰旱魃為虐如惔如焚我心疸暑瘴病也憂心如熏熏灼也又曰旱既大甚蘊隆蟲雷而非雨書説命曰若歲大旱用汝作霖雨又曰僣恆暘若君行僭差則常陽順之禮曰繆公召孩子問曰天久不雨吾欲暴尫而奚若對曰天則不雨而暴人之病子虐無乃不可乎暴巫而奚若對曰天則不雨望之愚婦人於以求之無乃已踈乎周禮曰司空掌群巫之政令若國大旱則率巫而舞雩又曰女巫旱暵則舞雩傳曰衛大旱寧莊子曰昔周飢克殷而年豐今邢方無道天其或者欲使衛討邢乎從之師興而雨又曰魯僖公三年自十月不雨至于五月不曰旱不為災又曰衛大旱卜有事於山川不吉又曰僖公二十一年夏大旱公欲焚巫尫臧文仲曰非旱備也修城郭貶食省用務嗇儉也勸分無有相濟此其務也巫尫何為天欲殺之則如勿生若能為旱焚之滋甚公從之是歲飢而不害又曰魯文十年正月不雨至于七月周正月今之十一月周十月今之五月又曰魯宣公九年葬我小君敬羸旱無麻始用葛茀茀所以引柩也又曰魯昭公十六年秋鄭大旱使屠擊有事於桑山祭山也斬其木不雨子産曰有事於山蓻山林也養護令繁植也而斬其木其罪大矣奪之官邑漢書曰百里嵩字景山為徐州刺史時旱嵩行部傳車所經甘雨輒澍東海祝其合鄉二縣在山間嵩不往二縣獨不得雨父老請之入界即雨澍又曰和帝永元六年秋旱時洛陽有冤囚帝録囚理冤未還宮雨澍鄒太后事同續漢書曰郡國旱公卿行雩禮求雨閉諸陽門衣皂衣興土龍立土人舞童二佾七日一處又曰郡國旱各掃除社稷公卿官長以次行雩禮求雨也魏志曰衛玠見黥面者其妻子沒為官僮玠曰使天下不雨者蓋由此也太祖乃怒玠晉書曰督運令史淳于伯刑於建康市百姓喧譁咸曰伯冤於是大旱三年京氏易曰人君無惠澤於下則小旱管子曰春不收枯骨杇胔伐枯木而去之則夏旱至矣尸子曰湯之救旱也乘素車白馬著布衣身嬰白茅為牲禱於桑麻之野此時弦歌鼓舞者禁之孟子曰七月八月之間旱則苗稿稿乾也晏子春秋曰齊景公時旱欲祀靈山及河伯晏子曰夫山以石為身以草木為毛髮今久不雨毛髮將焦身且熱豈山不欲雨乎祀之何益君宜避殿暴露其索雨也公從之出野果大雨世説曰湯時大旱七年雒川竭煎沙爛石乃使持三鼎祝山川教祀曰政不節邪使人疾邪賄賂行邪讒夫昌邪宮室榮華也邪女謁成邪何不雨之甚洪範五行傳曰魯宣十年秋大旱時公興師而與齊伐葉失代國亢陽蓋師旅百姓所不欲也應是而大旱益都耆舊傳曰趙瑤為閬中令大旱瑤請雨於靈星應時降雨搜神記曰周暢為河南尹元初二年大旱暢乃葬路旁露骸為立義冢應時注雨又曰諒輔字洪儒新都人為郡五官掾時大旱太守自暴中庭而雨不降輔自誓曰日中雨不降請以身塞無狀無狀謂祈雨不降乃積薪柴自焚至日中時大雨一郡沾潤神農求雨書曰春甲乙不雨東為青龍又為大龍東方老人舞之壬癸黑又曰北不雨命巫祝雨曝之不雨禱山神積薪其擊鼓而焚之瑞應圖曰遇旱責躬引咎理察冤枉退去貪殘側修惠政則降以零雨如其有道術禱祝山川致龍轉石閉陽從陰之類誠非瑞應是以魯侯有暴尫之消齊景以祠山見譏董仲舒曰春旱求雨令縣邑以水日令民禱社家人祠戶無伐名木無斬山林曝巫聚蛇八日於邑東門外為四通之壇方八尺植蒼繒八其神共工祭以魚八夏求雨亦以水日家人祠戶無舉土功浚井曝釜鬲杵臼于街七日為四通壇於邑南門外方七尺植赤繒七其神蚩尤祭以赤雄雞七凡求雨之大禮丈夫欲藏匿女子欲和而樂師曠占旱曰歲欲旱旱草先生旱草者蒺䔧是也山海經曰太華之山削成四方有蛇名肥遺六足四翼見則天下大旱湯時也東荒之北隅有山名凶犁應龍處南極殺蚩尤與夸父不得復上故下數旱旱而作應龍之狀乃得大雨上無作雨者故也令云土龍大此又曰傒昆之山有人衣青衣名曰黃帝女妖音魅蚩尤伐黃帝請風伯雨師帝乃下天女曰妖雨止遂殺蚩尤妖不得復上所居不雨又曰鱄珍魚雞山黑水多焉彘尾音如豚出則天下大旱東荒之北隅有焉有子德元中牟平秩秋人也姑夫
