body:
  text: 封建部三以公相封漢書曰高祖撥亂誅暴庶事草創行賞授位以能為次至于孝武元功宿將略盡上亦興文學進拔幽隱公孫弘自海濱而登宰相自是之後宰臣畢侯又曰漢帝以列侯為丞相唯公孫弘無爵為丞相上於是下詔封丞相平津侯其後以為故事丞相封侯自弘始也又曰武帝時車千秋為高廟郎上書訟衛太子冤上亦頗知太子惶恐感悟召千秋曰父子之間人所難言此高廟神靈使公教我當遂為吾輔拜千秋大鴻臚數月為丞相封富民侯又曰朱博以丞相封二千五百戶上書故事不過千戶還千五百戶魏志曰王朗字景興文帝即位授司空進封平鄉侯子肅嗣初文帝分朗邑封一子列朗乞封兄子詳又曰崔林為司空封陽安亭侯邑六百戶三公封列侯自林始也臣松之有為漢封丞相巳為荀悅所譏魏封三公其末同也又曰曹爽以大將軍輔政封武安侯邑萬二千戶又曰陳群以鎮軍録尚書受遺詔進封頴陰侯又曰何夔字叔龍為太子少傅太僕文帝踐祚封陽亭侯三百戶病乞遜位詔曰以親則君有輔弼之勳以賢則君有淳固之茂又曰劉放字子棄為中書監掌機密進封魏壽亭侯孫資為中書令封樂陽亭侯太和末資決策伐公孫淵進左鄉侯遼東平定又以參謀之功各封大縣放方城侯資中郡侯齊王即位以決定大謀並增邑子一人亭侯又曰衛覬為漢侍中勸讚禪代之義為文誥之命文帝踐祚封陽告亭侯明帝即位進閿鄉侯又曰桓楷為尚書令封亭鄉侯及病文帝自臨省謂之曰吾方託六尺之孤寄天下之命卿勉之徙封安樂鄉侯又曰胡質薨家無餘財唯賜衣書篋而巳追封陽陵亭侯又曰盧育衛臻徐宣陳矯和洽常林杜襲裴潛韓暨高文惠王觀辛毗劉靖王基並以列卿尚書封侯又曰漢制凡人君特所寵念皆賜之封邑及丞相初拜亦錫茅土號曰恩澤出自私情非至公之封也中興以來無有封者功臣封周禮夏官曰司勳掌六卿賞地之法以等其功王功曰勳國功曰功民功曰庸事功曰勞治功曰力戰功曰多克敵出奇若韓信陳平者凡有功者銘書於王之太常史記曰古之人功有五品以德立宗廟定社稷曰勳以言曰勞用力曰功明其等曰閥積功曰閲又曰太公望文王立以為師文王作酆邑天下三分有其二及武王克紂太公之謀居多於是武王封尚父於齊營丘成王時及管蔡作亂淮夷叛周乃使邵康公封太公東至海西至河南至穆陵北至無棣五侯九伯汝實征之齊由此得征伐為大國二十八世又曰邵公奭與周同姓武王之滅殷封邵公於燕其在成王時自陜以西邵公主之自陜以東周公主之四十三世秦始皇滅之又曰楚出自帝顓頊高陽後吳回居火正為祝融吳回生陸終陸終子六人少曰季連季連之苗胤曰鬻子鬻子事周文王早卒當成王之時舉文武勤勞之嗣乃封其後熊繹於楚以子男之國三十世至負芻而秦滅楚又曰魏者畢公高之後畢公高與周同姓武王封之於畢其後曰畢萬事晉獻公伐霍耿魏滅之因以魏封畢萬為大夫卜偃曰畢萬之後必大萬盈數也魏大名也以是始賞天啓之矣其後魏獻子並為晉卿至魏文侯為諸侯子武立與韓趙共滅晉而三分其地又七世至王假秦滅魏又曰韓與周同姓其後世事晉得封於韓原曰韓武子武子三世有韓厥從封姓為韓氏六世至景侯虔始列為諸侯及孫哀侯與趙魏共滅晉三分其地八世至王安而秦滅韓又曰趙氏之先與秦共祖造父事周穆王攻徐破之乃賜以趙城七世叔帶去周入晉趙氏五世而至趙夙夙生襄襄生盾並為大夫其後趙鞅是為簡子始大又四世而至列侯籍始立為諸侯三世至敬與韓魏共滅晉分其地又七世至幽王繆降秦而趙滅又曰陳完者陳厲公他之子完後奔齊為田氏齊懿氏欲妻之卜之曰是謂鳳皇于飛和鳴鏘鏘有媯之後將育于姜八世之後莫之與京卒妻之完卒諡為敬仲六世而至田常田常殺齊敬公立簡公弟平乃割齊安平以東為巳封封邑大於齊至曾孫和遂遷齊康公於海上而田和立為齊侯五世至王建為秦所滅又曰西戎與申侯伐周殺幽王驪山下為秦襄公將兵救周周避犬戎難東徙雒邑襄公以兵送周平王平王封襄公為諸侯賜之歧以西之地於是始國與諸侯通又曰樂毅并趙楚韓魏燕之兵以伐齊破之追至于臨淄齊涽王走保於莒樂毅獨留徇齊攻入臨淄盡以寶貨財物祭器輸之燕昭王大悅親至濟上勞軍行賞饗士封毅於昌國號為昌國君漢書曰項羽佯尊懷王為義帝實不用其命二月羽自立為西楚霸王王梁楚地九郡都彭城背約更立沛公為漢王王巴蜀漢中四十一縣都南鄭三分關中立秦三將章邯為雍王都廢丘縣名今槐里是司馬欣為塞王韋昭曰在長安東名桃林塞也都櫟陽董翳為翟王文頴曰本上縣秦所置項羽更名為翟也都高奴楚將瑕丘申陽為河南王都雒陽趙將司馬卬為殷王都朝歌當陽君英布為九江王都六懷王柱國共敖為臨江王本南郡改為臨江國都江陵番君吳芮為衡山王都邾文頴曰邾音朱縣名故齊王建孫田安為濟北王徙魏王豹為西魏王都平陽徙燕王韓廣為遼王燕將臧荼為燕王都薊徙齊王田市為膠東王齊將田都為齊王趙歇為代王趙相張耳為常山王也又曰漢四年立韓信為齊王後徙為楚王五年以九江王英布為淮南王盧綰為燕王韓王信為代王彭越為梁王又曰克項八載天下乃平始論功侯者四十有三人時人民散亡大侯不過萬家封爵之誓曰使黃河如帶太山如礪於是申以丹書之信重以白馬之盟藏諸宗廟副在有司逮文景四五世間流民既歸戶口亦息列侯大者三四萬戶小國自倍其後子孫驕恣忘其先祖之艱難多陷法禁訖于孝武後元之年靡有孑遺又曰漢封功臣張良未嘗有戰鬥功高帝曰運籌策帷幄中決勝千里外子房功也乃封良為留侯與蕭何等俱封六年上巳封大功臣二十餘人其餘日夜爭功未決未得行封上在雒陽南宮從復道如淳曰上下有道故謂之復也韋昭曰間道也望見諸將往往相與坐沙中語上曰此何語留侯曰此謀反耳上曰為之奈何留侯曰上平生所憎群臣所共知誰最甚者上曰雍齒數嘗窘辱我留侯曰今急先封雍齒以示群臣於是上置酒封雍齒為什方侯皆曰雍齒且侯我屬無患矣又曰高祖以蕭何功最盛封為酇侯所食邑多功臣皆曰蕭何未嘗有汗馬之勞反居臣等上何也帝曰諸君知獵乎追殺獸者狗也而發蹤指示獸處者人也今諸君徒能得獸耳功狗也至如蕭何發蹤功人也且諸君獨以隨我多者兩三人何舉宗數十人皆隨我功不可忘也皆曰平陽侯曹參身被七十創攻城略地功最多宜第一鄂君進曰群臣議皆誤陛下雖亡山東何常全關中以待陛下此萬世之功奈何以一旦之功而加萬世之功哉蕭何第一曹參次之上曰吾聞進賢受上賞蕭何功雖高得鄂君乃益明封鄂君故所食關內侯邑封為安平侯又曰高祖封項伯等四人為列侯賜姓劉氏又曰項羽被十餘瘡顧見漢騎司馬呂馬童曰若非吾故人乎馬童面之指王翳曰此項王也羽乃曰吾聞漢購我頭千金邑萬戶吾為公得之乃自剄王翳取其頭亂相蹂蹈爭羽相殺者數十人最後楊喜呂馬童呂勝楊武各得一體故分其地以封五人皆為列侯又曰陳豨反上自至邯鄲喜曰豨不南據邯鄲北阻漳水吾知其無能為矣上令周昌選趙壯士可令將者因見四人上嫚罵曰豎子能為將乎四人慚皆伏地上封各千戶以為將又曰淮陰侯韓信舍人樂說告信反封順陽侯又曰文帝詔曰方大臣諸呂迫朕朕狐疑皆止朕唯中尉宋昌勸朕巳得保守宗廟巳尊昌為衛將軍其封昌為壯武侯又曰韓王信入胸奴與太子俱至頽當城生子因名頽當至孝文時降封弓高侯頽當孽孫嫣貴幸顯當時世嫣弟說以校尉征胸奴封龍額侯又曰景帝封功臣衛綰直不疑等十九人綰封建陵侯不疑塞侯又曰張賀為掖庭令而宣帝以皇曾孫時收養掖庭恩甚密焉及宣帝即位而賀巳死宣帝追恩乃封其家為恩德侯置守冢二百人東觀漢記曰光武功臣鄧禹等二十八人皆為侯封餘功臣一百八十九人又曰李通上司空印綬以特進奉朝請久之有司奏請付諸皇子上感通首創大謀因封通少子雄為邵陵侯又曰建武二年定封景丹櫟陽侯上謂丹曰今關東故王國雖數縣不過櫟陽萬戶富貴不歸故鄉如衣錦夜行故以封卿又詔封竇融曰行河西五郡大將軍涼州牧張掖屬國都尉竇融執志忠孝扶微救危仇疾反虜隗囂率厲五郡精兵羌胡畢集兵不血刃而虜土崩瓦解功既大矣篤意分明斷之不疑吾甚嘉之春以六安安豐陽原蓼安凡四縣封融為安豐侯又曰三輔豪傑入長安攻未央宮杜虞殺莽於漸臺東海公賓就得其首傳詣宛封猾侯又曰申屠志以功封汝陰王上書以非劉氏還玉璽改為頳陽侯又曰班超定西域五十餘國乃詔封超為定遠侯後漢書曰單超左綰徐璜貝瑗唐衡桓帝時共誅梁冀同日封侯謂之五侯於是朝庭日亂超薨之後其四侯轉橫天下為之語曰左回天具獨坐徐臥虎唐兩墮魏志曰夏侯淵字妙才以功封博昌亭侯太祖下令曰夏侯淵虎步關右所向無前仲尼有言吾與爾俱不如也後戰死黃初太和中賜淵子五人皆爵關內侯又太祖令曰吾起義兵誅暴亂於今十九年所征必克豈吾功哉乃賢士大夫之力也天下雖未悉定吾要與賢士大夫共定之而專饗其勞吾何以安焉其保定功行封於是大封功臣二十餘人皆為列侯其餘各以次受封及復死事之孤輕重各有差又曰曹洪字子廉以功封野王侯文帝時坐事削明帝即位更封樂成侯又曰曹沐字文烈自荊州北歸太祖曰此吾家千里駒也文帝録前後功封為東亭侯又曰曹真字子丹以功封邵陵侯真少舉宗人遵鄉人朱讚並事太祖遵讚早亡真愍之乞分食邑封遵子等詔曰大司馬有叔向撫孤之仁晏平久要之分聽分賜遵等子爵開內侯及真薨明帝悉封真五子皆列侯又曰太祖自柳城還稱荀攸前後謀謨曰昔高祖使張子房自擇齊三萬戶今孤亦欲君自擇所封又曰太祖見賈詡執手曰使我信重於天下者子也表為執金吾封都亭侯文帝即位又封詡小子訪為列侯又曰郭嘉字奉孝冀州平封齊陽亭侯及薨太祖表曰臣策未決嘉輔成之平定天下謀功為最增邑并前千戶又曰張既字德容詔曰卿勳非但破胡乃永寧河右使吾長無西顧之念徙封西鄉侯又曰任峻字伯遠為典農中郎大興屯田軍國致饒太祖以峻功高表封都亭侯又曰張遼字文遠為蕩寇將軍以功封都亭侯又討陳蘭梅成等入灊山中蘭等壁其上遼力戰平之太祖論諸將功曰登天山以取蘭成蕩寇功也乃增邑文帝又分封兄泛及一子列侯帝踐祚進封晉陽侯及薨詔曰合肥之役遼以步卒八百破賊十萬自古未之有也其分遼邑賜一子爵關內侯又曰太祖表封荀攸曰前克敵皆攸之謀也於是封攸陵樹亭侯又曰太祖謂于禁曰清水之難吾焉能也將軍在亂能整雖古之名將何以加之乃録前後功封壽亭侯又曰文帝踐祚進張郃為鄭侯明帝詔曰賊亮以巴蜀之衆將軍所向克定乃益戶并前四千三百戶郃前後有功明帝分郃戶封四子列侯又曰朱靈字文博先封鄃侯文帝詔曰將軍佐命先帝威過方邵平生所志願勿難色靈謝曰高唐宿所鎮乃更封高唐侯又曰龐惠以衆降太祖聞其驍勇封關內亭侯為關羽所得罵羽而死太祖悲之封其二子為列侯又曰徐邈字景山西域流通荒戎入貢皆邈勳也以功封都亭侯又曰王昶字文舒討諸葛誕誕誅韶曰昔孫臏佐趙直湊大梁兵驟進亦所以成兵勢也增邑四千七百戶矣吳志曰駱統字公緒初曹仁攻濡須使別將常雕等襲中洲統與嚴圭共拒破之封新陽亭侯晉書曰符堅南寇桓伊與冠軍將軍謝玄輔國將軍謝琰俱破堅於肥水以功封永循縣侯進號右軍將軍賜錢百萬袍表千端王隱晉書曰封宣帝為武平侯公孫淵平又增封舞陽昆陽二縣又曰封文帝為高都侯太始元年詔曰昔唐虞三代之盛暨于漢魏創制褒崇元勳班爵行賞與國同禮施祿逮下萬邦咸乂朕以寡德登于天位託于王公之上腹心股肱文武之臣光齊帝業余嘉乃勳慶賞之行其用宜速又張華傳曰華以建策加華右光祿大夫開府儀同三司固辭不受府詔聽乃更論平吳之功封華郡公三千戶王者擇近郡平土詳依典制施行華讓前後十餘頻繁懇誠詔不聽遂受封晉中興書曰元帝以佐命功封周玘烏程公又封王敦武昌公又曰孔愈字敬康以討華軼功封餘不亭侯初愈少時嘗得一龜放於餘不溪中流左顧者數過及鑄侯印而龜左顧更鑄猶然印工以聞愈悟遂佩焉又曰明帝以平錢鳳功封始興公溫嶠建寧公庾亮永昌公郗鑒南平公卞壺建興公蘇峻邵陵侯劉泉泉陵侯應詹觀寧侯卞郭益陽侯趙胤湘南侯又曰成帝以平蘇峻功封公者三人侯者八人又以討郭默功者三人穆帝以平蜀功封桓溫臨賀公又曰哀帝以平關洛功封桓冲豐城公海西公以平袁真功賜桓溫子偉為西昌公又曰安帝以興復功封劉裕等二十三人裕唱謀封豫章公萬戶劉毅南平公五千戶何無忌安成公劉道規華容公晉起居注曰太康元年詔曰張華前與故太傅創謀大計部分方算有謀謨之勳封廣武侯邑萬戶又曰惠帝追封衛瓘為郡公會稽典録曰鄭吉既破車師降日逐威震西域日逐并護車以北道故號都護之置自吉始焉上嘉其效乃下詔日都護西域騎都尉鄭吉撫循外蠻宣明威信功效茂著其封吉為安遠侯華陽國志曰漢高帝滅秦為漢王王巴蜀閬中人范自有恩信方略為帝募發賨民西與定秦地既定封自為長安建章郡侯帝將征關東賨民皆思歸嘉其功難傷其意遂聽還謂曰富貴不歸故鄉如衣繡夜行可徙封自閬中慈鄉侯自固辭乃封度汗縣侯
