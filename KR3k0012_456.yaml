body:
  text: 人事部九十六諫諍五鍾離意別傳曰孝明帝作北宮意復諫曰頃天旱不雨陛下躬自勑責避正殿之榮今日雨而不濡豈政有改耶是天威未消也愚以為可命大匠止功作諸室減省不急以助時氣奏聞有詔曰朕之不德敢不如教即日中沛然大雨列女傳曰魏曲沃負者魏曲沃大夫如耳之母也曲沃邑也魏哀王為太子納妃而將自納焉負謂如耳曰王亂於不別何故不匡之如耳未遇間會使於齊未值王之清間而受使行也負因詣王門請見曰妾聞男女之別國之大節也婦人脆於志窳於心不可以邪開脆窳不堅固不宜以邪事開誘也是故十五而笄二十而嫁早成其號諡所以就之號諡笄嫁之名聘則為妻奔則為妾所以開善遏淫也節成然後許嫁親迎而後隨貞女之義也今大王為太子求妃匹而自納之此毀貞女之行而亂男女之別妾恐王之國危也王曰然寡人不知也遂與太子而賜負粟三十鍾六石四升曰鍾又曰楚處莊姪者楚縣邑之女也頃襄王好遊觀之樂焉王左右謂王曰南遊於唐五百里有樂焉王將行姪年十二王既見出操幟伏於南郊道傍王車至姪舉其幟王使人問之姪曰願謁隱事於王王召之子何以成寡人對曰大魚失水有龍無尾牆欲內崩而王不視王曰不知對曰大魚失水者離國五百里也有龍無尾者年三十無太子牆欲內崩王不視者禍亂且成而王不改王曰何對曰王好臺榭而不恤衆庶出入不時耳目不聰強奏聞王左右使王日以滋甚王不亟反且及禍雖悔無逮三曰善命後車載之立反國比至國門已閉反者已定王乃發鄢郢之師以擊之僅而得勝乃立姪為夫人說苑曰齊晏子復於景公曰朝居嚴平公曰朝居嚴則曷害於治國哉晏子對曰朝居嚴則下無言下無言則上無聞矣下無言則謂之喑上無聞則謂之聾聾喑則非害治國家如何且泰山之高非一石也纍卑然後高也夫治天下者非用一士之言也又曰秦始皇時侯生諫始皇望見侯生大怒曰老虜不良誹謗而至乃敢復見我侯生曰陛下奢侈失本淫佚趨末人力殫盡尚不知臣等恐言之無益而自取死也故逃而不敢言又曰趙簡子舉兵攻齊令軍中諫者罪至死被甲之士名曰公盧望見簡子而笑曰臣有宿笑當桑之時臣鄰家父與妻俱之田見桑中女因往追之不能得還反其妻怒而去之臣笑其曠也簡子還師而歸又曰左儒友於杜伯皆臣周宣王宣王將殺杜伯而非其罪也左儒爭之王不許也王曰黨友也易而言則生不易而死左儒對曰臣聞古之士不枉義以從邪不易言以求生王殺杜伯而儒死之又曰有能盡言於君用則留不用則去謂之諫又曰秦始皇帝太后不謹幸郎嫪毐封以為長信侯為生兩子毐專國事浸益驕奢與侍中左右貴臣俱博飲酒醉爭言而鬭瞋目大叱曰吾乃皇帝之假父也窶人子何敢乃與我抗所與鬭者走行白皇帝皇帝太怒毐懼誅因作亂戰咸陽宮敗始皇乃取毐四支車裂之取其兩弟囊撲殺之諫而死者二十七人矣齊客茅蕉乃往上謁曰齊客茅蕉願上諫皇帝皇帝使使者出問客得無以太后事諫也茅蕉曰然使者還白曰果以太后事諫皇帝曰走往告之若不見闕下積死人耶使者問茅焦茅焦曰臣聞之天有二十八宿今死者已有二十七人矣臣所以來者欲滿其數耳臣非畏死人也走入白之茅焦邑子同食者盡負其衣物行亡使者入白之皇帝大怒曰是子故來犯吾禁趨炊鑊湯煮之是安得積闕下乎趨召之入皇帝按劍而坐口正沫出使者召之入茅焦不肯疾行足趣相過耳使者趨之茅焦曰臣至前則死矣君獨不能忍吾須臾乎使者極哀之茅焦至前再拜謁起稱曰臣聞之夫有生者不諱死有國者不諱亡諱死者不可以得生諱亡者不可以得存死生存亡聖主所欲急聞也不審陛下欲聞之不皇帝曰何謂也茅焦對曰陛下有狂悖之行不自知耶皇帝曰何等也願聞之茅焦對曰陛下車裂假父有嫉妒之心囊撲兩弟有不慈之心遷母棫陽宮有不孝之行從蒺藜於諫士有桀紂之治今天下聞之盡瓦解無嚮秦者臣竊為陛下危之所言已畢乞行就鑕乃解衣伏鑕皇帝下殿左手接之右手麾左右曰赦之先生就衣今願受事乃立焦為仲父爵之為上卿皇帝立駕千乘萬騎空左方自行迎太后棫陽宮歸於咸陽太后大喜乃置酒待茅焦及飲太后曰抗枉令直使敗更成安秦之社稷使妾母子復得相會者盡茅君之力也又曰楚莊王築層臺延石千里延壤百里士有反三月之糧者大臣諫七十二人諫者皆死矣有諸御己者違楚百里而耕謂其耦曰吾將入見於王其耦曰以身乎吾聞說人主者皆間暇之人也然且至而死矣今子持草茅之人耳諸御己曰若與子同耕而比方也至於說人主不與子比智矣委其耕入見莊王莊王謂之曰諸御己來汝將諫耶諸御己曰君有義之用有法之行且己聞之土負水者平木負繩者正君受諫者聖君築層臺延石千里延壤百里民之釁咎血成通於塗然且未敢諫也己何敢諫乎顧臣愚竊以虞不用宮之奇而晉并之陳不用子家羈而楚并之曹不用僖負羈而宋并之萊不用子猛而齊并之吳不用子胥而越并之秦不用蹇叔之言而秦國危桀殺關龍逢而湯得之紂殺王子比干而武王得之宣王殺杜伯而周室卑此三天子六諸侯皆不能尊用賢辨士之言故身死而國亡遂趨而出楚王遽而追之曰己子反矣吾將用子之諫先日說寡人者其說也不足以動寡人之心又危加諸寡人故皆至而死矣今子說足以動寡人之心又不危加諸寡人故將用子之諫明日令曰有能入諫者吾與為兄弟遂解層臺而罷民楚人歌之曰薪乎萊乎無諸御己訖無子乎萊乎薪乎無諸御己訖無人乎又曰齊桓公謂鮑叔曰寡人欲鑄大鍾昭寡人之名焉寡人之行豈避堯舜哉鮑叔曰敢問君之行桓公曰昔者吾圍談三年得而不自與者仁也吾北伐孤竹剗令支而反者武也吾為葵丘之會以偃天下之兵者文也諸侯抱美玉而朝者九國寡人不受者義也然則文武仁義寡人盡有之矣寡人之行豈避堯舜哉鮑叔曰君好直言臣以直言封昔者公子糾在上位而不讓非仁也背太公之言而侵魯境非義也壃場之士上詘於一劍非武也姪娣不離懷衽非文也為不善遍於物不自知者無天禍必有人害天處甚高其聽甚下今君過言天且聞之桓公曰寡人有過子幸記之是社稷之福也子不幸教幾有大罪以辱社稷又曰楚昭王欲之荊臺游司馬子綦進諫曰荊臺之游左洞庭之陂右彭蠡之水南望猲山下臨方淮樂其使人遺老而忘死人君游者盡以亡其國願大王勿往游焉王曰荊臺乃吾地也有地而游之子何為絶我游乎怒而擊之於是令尹子西駕安車駟馬至於殿下曰今日荊臺之游不可不觀也王登車而拊其背曰荊臺之游與子共樂之矣步馬十里引轡而止曰臣不敢下車願得有道大王肯聽之乎王曰第言之令尹子西曰臣聞之為人臣而忠其君爵祿不足以賞也若司馬子綦者忠臣也若臣者諛臣也願大王殺臣之軀罰臣之家而祿司馬子綦王曰若我能止聽公子獨能禁我游後世游之無有極時奈何乎令尹子西曰欲禁後世易耳願大王山陵崩陀為陵於荊臺未嘗有持鍾鼓管弦之樂而游於父之墓上者也於是王還卒不游於荊臺令罷先置孔子從魯聞之曰悲哉令尹子西諫之十里之前而催之於百世之後者也又曰荊文王得如黃之狗菌蕗之矰以畋於雲夢三月不反得舟之姬淫之朞年不聽朝保申謀曰先王卜以臣為保吉今王得如黃之狗菌蕗之矰畋於雲夢三月不反得舟之姬淫之朞年不聽朝王之罪當笞匍伏將笞王王曰不穀免於繈褓託諸侯矣願請變更無笞保申曰臣承先王之命不敢廢王不受笞是廢先王之命也臣寧得罪於王無負於先王王曰敬諾乃席王王伏保申承細箭五十跪而加之王背如此者再謂王起矣王曰有笞之名一也遂致之保申曰臣聞之君子恥之小人痛之恥之不變痛之何益保申趨出欲自流乃請罪於王王曰此不穀之過保申將何罪王乃變行從保申殺如黃之狗折菌蕗之矰逐舟之姬務治乎荊兼國三十令荊國廣大至於此者保申敢極言之功也蕭何王陵聞之曰聖主能奉先世之業而以成功名者其唯荊文王乎故天下譽之至今明主忠臣孝子以為法又曰晉平公使叔向聘於吳吳人拭船以送之左五百人右五百人有繡衣豹裘者叔向歸以告平公平公曰吳其亡乎奚以敬舟奚以敬民叔向對曰君為馳底之臺上可以發千兵下可以陳鍾鼓諸侯聞君者亦曰奚以敬臺奚以敬民所敬各異也於是平公乃罷臺又曰齊景公好弋使燭鄒主鳥而亡之景公怒而欲殺之晏子曰燭鄒有罪請數之以其罪乃殺之景公曰可於是乃召燭鄒數之景公前曰汝為君主鳥而亡之是一罪也使吾君以鳥之故殺人是二罪也使諸侯聞之以吾君重鳥而輕士是三罪也數燭鄒罪已畢殺之景公曰止勿殺而謝之又曰齊景公正晝被髮乘六馬御婦人以出正閨刖跪擊其馬而反之曰爾非吾君也公慚而不朝晏子睹裔敖而問曰君何故不朝對曰昔者君正晝被髮乘六馬御婦人出閨刖跪擊其馬而反之曰爾非吾君也公慚而反不果出是以不朝晏子入公見曰昔者寡人有罪被髮乘六馬以出正閨刖跪擊馬而反之曰爾非吾君也寡人以子大夫之賜得率百姓以守宗廟今見戮刖跪以辱社稷吾猶可以齊於諸侯乎晏子對曰民無直辭上有隱惡民多諱言君有驕行古者明君在上下有直辭君上好善民無諱言今君有失行而刖跪有直禁是君之福也故臣來慶請賞之以明君之好善禮之以明君之受諫公笑曰可乎晏子曰可於是刖跪倍資時朝無事又曰景公飲酒移於晏子家前驅報門曰君至晏子被朝衣立於門曰諸侯得微有諫乎國家得微有事乎君何為非時而夜辱公曰酒醴之味金石之聲願與夫子樂之晏子對曰布薦席陳簠簋者有人臣不敢與焉公曰移於司馬穰苴之家前驅報門曰君至司馬穰苴介胄操戟立於門曰諸侯微有兵乎大臣得微有叛者乎君何為非時而夜辱公曰酒醴之味金石之聲願與夫子樂之對曰布薦席陳簠簋者有人臣不敢與焉公曰移於梁丘據之家前驅報門曰君至梁丘據左操瑟右挈竽行歌而至公曰樂哉今夕吾飲酒也微彼二子者何以治吾國微此一臣者何以樂吾身聖賢之君皆有益友無偷樂之臣景公弗能及故兩用之僅得不亡又曰吳王濞反梁孝王中郎枚乘字叔聞之為書諫王其辭曰君王之外臣乘竊聞得全者昌失全者亡舜無立錐之地以有天下禹無百戶之衆以王諸侯湯武之地方不過百里上不絶三光之明下不傷百姓之心者有王術之故父子之道天性也忠臣不敢避誅以直諫故事無廢業而功流於萬世也臣乘願披腸心而效愚忠恐大王不能用也臣乘願大王聽臣乘之言夫一縷之任係千鈞之重上懸之無極之高下垂之不測之淵雖甚愚之人且猶知哀其絶也馬方駭而重驚之係方絶而重鎮之係絶於天不可復結墜入深淵難以復出其出不出間不容髮誠能用臣乘言以百舉必脫必若所欲為危於纍卵難於上天變所欲為易於反掌安於泰山今欲極天命之壽弊無窮之樂保萬乘之勢不出反掌之易以居泰山之安乃欲乘纍卵之危走上天之難此愚臣之所大惑也人生有畏其影而惡其跡者乃背而走無益也不如就陰而止影滅跡絶欲人勿聞莫若勿言欲人勿知莫若勿為欲湯之冷令一人炊之百人揚之無益也不如絶薪止火而已不絶之於彼而救之於此譬猶抱薪救火也故武王諤諤而昌紂默默而亡君無諤諤之臣父無諤諤之子兄無諤諤之弟夫無諤諤之婦士無諤諤之友其亡可待故曰君失之臣得之父失之子得之兄失之弟得之夫失之婦得之士失之友得之故無亡國破家悖父亂子放兄棄弟狂夫淫婦絶交敗友者也又曰易曰王臣謇謇匪躬之故人臣之所以謇謇為難而諫其君者非為身也將欲以匡君之過矯君之失也君有過失者危亡之萌也見君之過失而不諫是輕君之危亡也夫輕君之危亡者忠臣不忍為也三諫而不用則去不去則亡身亡身者仁人所為也是故諫有五一曰正諫二曰降諫三曰忠諫四曰戇諫五曰風諫孔子曰吾其從風諫夫不諫則危君固諫則危身與其危君寧危身危身終不用則諫亦無功矣智者度君權時調其緩急而處其宜上不敢危君下不為危身故在國而國不危在身而身不殆昔陳靈公不聽泄冶之諫而殺之曹羈三諫曹君不聽而去春秋序義雖俱賢而曹羈合禮
