body:
  text: 禮儀部三十二葬送一易下繫曰古之葬者厚衣之以薪葬之中野衣之以薪而理之於中野不封不樹喪其無數後世聖人易之以棺槨蓋取諸大過尚書曰周公在豐致政老在豐也將沒欲葬成周周公薨成王葬于畢成王不敢臣周公故歸於武王葬畢也禮記曲禮上曰助葬必執紼紼引車索禮記檀弓上曰太公封於營丘比及五世皆反葬於周君子曰樂樂其所自生禮不忘其本古之人有言曰狐死正丘首仁也正丘首正首丘也仁思也又曰舜葬於蒼梧之野蓋三妃未之從也古不合葬又曰葬於北方北首三代之達禮也之幽之故也北方北首國北也又曰子柳之母死子碩請具具喪之器用也子柳魯叔仲皮之子子碩兄子柳曰何以哉言無其財子碩曰請粥庶弟之母粥謂嫁之也妾賤取之曰買之也子柳曰如之何其粥人之母以葬其母也不可又曰公叔文子升於瑕丘蘧伯玉從二子衛大夫也文子獻公之孫名拔也文子曰樂哉斯丘也死則我欲葬馬伯玉曰吾子樂之則瑗請前剌其欲害人良田瑗伯玉名也又曰成子高寢疾成子高齊大夫國成伯高慶遺入請曰夫子病革矣如至大病則如之何觀其意也革急也慶遺封之族子高曰吾聞之也生有益於人死不害於人吾縱生無益於人吾可以死害於人哉我死則擇不食之地而葬我焉不食謂不墾耕又曰國子高曰葬也者藏也藏也者欲人弗得見也是故衣足以飭身棺周於衣土周於槨反壤樹之哉又曰孔子之喪有自燕來觀者舍於子夏氏子夏曰聖人之葬人與人之葬聖人也子何觀焉昔者夫子言之曰吾見封之若堂者矣見若防者矣防形旁殺平上而長見若覆夏屋者矣覆謂茨瓦也夏屋今之門廡也其形傍廣而卑見若斧者矣從若斧者焉馬鬣封之謂也禮記檀弓上曰季武子成寢杜氏之葬在西階之下請合葬焉許之入宮而不敢哭武子曰合葬非古也自周公以來未之有改也吾許其大而不許其細何居命之哭又曰子游問喪具夫子曰稱家之有亡子游曰有亡惡乎齊惡乎齊問豐省之比天子曰有無過禮茍亡矣斂首足形還葬懸棺而封不設碑緯不備禮也人豈有非之者哉又曰宋襄公葬其夫人醯醢百甕禮記檀弓下曰季子皋葬其妻犯人之禾申祥以告曰請庚之申詳子張子也庚償子皋曰孟氏不以是罪豫朋友不以是棄豫以吾為邑長於斯也買道而葬後難繼也恃寵虐民非也又曰延陵季子適齊於其反也其長子死葬於羸博之間羸博齊地今泰山縣是也孔子曰延陵季子吳之習於禮者也往而觀其葬焉其坎深不至於泉以生恕死其斂以時服既葬封廣輪掩坎其高可隱也輪從也隱據也既封左祖右還其封且號者三曰骨肉歸復於土命也若魂氣則無不之也無不之也還回而遂行孔子曰延陵季子之於禮其合矣乎又曰子路曰傷哉貧也生無以為養死無以為禮也孔子曰啜菽飲水盡其歡斯之謂孝斂手足形還葬而無槨稱其財斯之謂禮還猶疾也禮記王制曰天子七日而殯七月而葬諸侯五日而殯五月而葬大夫士庶人三日而殯三月而葬尊者舒卑者速春秋傳曰天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至三年之喪自天子達庶人縣封葬不為雨止不封不樹喪不二事禮記曾子問曰葬引至于堩日有食之則有變乎且不乎堩道也變謂異禮孔子曰昔吾從老聃助葬於巷黨及堩曰有食之老聃曰丘止柩就道右止哭以聽變既明反而后行曰禮也巷黨黨名也反葬丘問之曰夫柩不可以反也日有食之不知其已之遲也則豈如行哉已止也數讀為速老聃曰夫柩不早出不暮宿侵晨夜則近奸寇也見星而行者唯罪人與奔父母之喪者乎日有食之安知其不見星也為無日而慝祚豫止且君子行禮不以人之親痁患痁患病也以人之父母行禮而恐懼其有患害不為也禮記曾子問曰並有喪如之何何先何後並謂父母若親同者同月死孔子曰葬先輕而後重其奠也先重而後輕禮也自啓及葬不奠不奠務於當葬者行葬不哀次不哀次輕於在殯者反葬奠而后辭於殯遂修葬事殯當為賓聲之誤也辭於賓謂告將葬啓期也其虞也先重而後輕禮也禮記喪大記曰君葬用輴四綍二碑御棺用羽葆大夫葬用輴二綍二碑御棺用茅士葬用國車二綍無碑比出宮御棺用功布大夫廢輴此言輴非也禮記中庸曰父為大夫子為士葬以大夫祭以士父為士子為大夫葬以士祭以大夫左傳隱公曰公將如棠觀魚者臧僖伯諫不從冬臧僖伯卒公曰叔父有憾於寡人叔父有諫觀魚不聽也寡人弗敢忘葬之加一等又曰元年冬十月庚申改葬惠公公弗臨賈達曰改葬改備禮也葬嗣君之事公不臨言無恩禮曰改葬細也故不書惠公之薨也有宋師太子少葬故有闕是以改葬言是以明禮闕故也又曰天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至左傳僖上曰許穆公卒于師葬之以侯禮也男而侯禮加一等凡諸侯薨于朝會加一等諸侯命有三等公為上等侯伯為中等子男為下等死王事加二等於是有以袞斂死王事謂朝天子以命用師袞斂者上公九命服袞也左傳宣上曰葬敬羸旱無麻始用葛茀記禮變之所由第所以引柩殯則有之以備火葬則以下柩雨不克葬禮也禮卜葬先遠日辟不懷也懷思也左傳成上曰宋文公卒始厚葬用蜃炭益車馬始用殉重器備槨有四阿棺有翰檜君子謂華元樂莒於是乎不臣臣治煩去惑者也今二子者君生則縱其惑死又益其侈是棄君於惡何臣之為左傳昭二曰叔孫卒杜泄將以路葬且盡卿禮路王所賜欸孫車南遺謂季孫曰叔孫未乘路葬焉用之且冢卿無路介卿以葬不亦左乎左傳昭三曰鄭簡公卒將為葬除除葬道及游氏之廟游氏子太叔族將毀焉子太叔使其除徒執用以立而無庸毀用毀廟具曰子産過女而問何故不毀乃曰不忍廟也諾將毀矣教毀廟者之辭既如是子産乃使辟之毀之則朝堋弗毀則曰中而堋春秋說題辭曰葬尸下藏也人生於陰含陽充死入地歸所與也宋均注人生陰謂在胞胎中論語先進曰顏淵死門人欲厚葬之子曰不可門人厚葬之子曰回也視豫猶父也豫不得視猶子也非我也夫二三子也言顏路在聽門人厚葬之白虎通曰周公以王禮葬何以為周公踐祚理政與天同志原天之意子愛周公與文武不異故以王禮爾雅曰葬藏謂之壙宅兆塋域地也說文曰窆葬下棺也史記曰項王已死楚地皆降漢獨魯不下漢乃引天下兵欲屠之為其守禮義為主死節乃持項王頭示魯魯父兄乃降始楚懷王初封項籍為魯公及其死魯最後下故以魯公禮葬項籍彭城史記曰臨江閔王榮以孝景前四年為太子四歲廢為臨江王四年坐侵廟壖為宮上徵榮詣中尉府中尉郅都責訊王王恐自殺葬藍田燕數萬銜土置冢上百姓憐之又曰郭解姊子負解之勢與人飲強灌之人怒拔刀剌殺解姊子去亡解姊怒曰以翁伯之義人殺吾子賊不得棄其尸於道不葬欲以辱解解使人徵知賊處賊窘自歸具以實告解解曰殺之固當吾兒不直遂去其罪其姨乃收而葬之諸公聞之皆多解之義戰國策曰秦宣太后愛魏餘病且死令曰我死必以魏子為殉庸芮為之說后曰以死者為有知乎曰無知芮曰何乃空以生之所愛葬無知之死人哉若死者有知先王之積怒久矣太后救過不暇何得私魏子乎太后乃止漢書曰韓信淮陰人家貧無行不得推擇為吏又不能治生為商賈常從人寄食其母死無以葬乃行營高燥地傍可置萬家者為冢又曰張良始所見下邳圮上老父與書者後十三歲從高帝過濟北果得穀城山下黃石取而寶祠之及良死并葬黃石每上冢伏臘祠黃石又曰衛青貴而平陽侯曹壽有惡疾就國長公主問列侯賢者左右皆言大將軍主嘆曰此出吾家常從我奈何左右曰於今尊貴無比於是主諷皇后言之上乃詔青尚平陽主合葬起冢又曰三長史害張湯自殺昆弟欲厚葬湯母曰湯為天子大臣被惡言而死何厚葬為載以牛車有棺而無槨上聞之曰非此母不生此子乃盡誅三長史又曰王父偃方貴幸時客以千數及死無一人視獨孔車收葬焉上聞之以車為長者又曰霍光薨上及皇后太后親臨光喪太中大夫任宣與侍御史五人持節護喪事賜金錢繒絮繡被百領衣五十篋璧珠璣王衣如淳曰漢儀注以王為孺如鎧狀連綴之以黃金為縷腰以下王為禮長尺廣二寸半押下至足亦綴以金縷也便房黃腸題湊各一具蘇林曰以柏木黃心致纍棺外曰黃腸木頭皆內向故曰題湊如淳曰便房冢壙中室也漢儀天子陵中明中高丈二尺四周二丈二丈內梓宮次楩槨柏黃腸題湊也東園溫明服虔曰東園處此器象如棺開一端漆畫之以鏡置其中以尸上大斂并蓋之矣皆如乘輿制度載光尸柩以轀輬車黃屋左纛發材官輕車北軍五校士軍陳至茂陵以送其葬諡曰宣成侯發三河卒穿土起冢祠堂置園邑三百家又曰金日殫薨賜葬其冢地送以輕車介士軍至茂陵諡曰敬侯又曰楊王孫者孝武時人也學黃老之術家業千金厚自奉養生亡所不致及病且終先令其子曰吾欲倮葬以反吾真必亡易吾意死則為囊盛尸尸入地七尺既下從足引脫其囊以身櫬土其子欲默而不從重廢父命欲從之心又不忍乃往見王孫友人祁侯祁侯與王孫書王孫報曰蓋聞古之聖王緣人不忍其親故為制禮今則越之吾是以倮葬將以矯世吾聞之神精者天之有形骸者地之有精神離形各歸其真故謂之鬼鬼之為言歸也尸塊然獨處豈有知哉褁以幣帛隔以棺槨支體結束口含玉石欲化不得鬱為枯臘千載之後棺槨朽腐乃得歸土就其真宅祁侯曰善遂倮葬又曰朱雲年七十餘終於家病不呼醫藥遺言以身服斂棺周於身土為槨韋昭曰燒土為槨也為丈五墳葬平陵東郭外又曰韋玄成為相病且死因使者自白曰不勝父子私願乞體骨歸葬父墓上許焉又曰朱邑病且死囑其子曰我故為桐鄉吏其民愛我必葬桐鄉後世子孫奉我不如桐鄉民及死其子葬之桐鄉西郭外民果共為邑起冢立祠歲祠祭至今不絶又曰孔光薨王莽白太后使九卿策贈以太師博山侯印綬賜乘輿祕器金錢雜帛少府供帳公卿百官會弔送葬載以乘輿及副各一乘羽林孤兒諸生合四百人挽送車萬餘兩將作穿復土河東卒五百人起墳如大將軍王鳳制度又曰董賢死見廢倮𧭉其尸因埋獄中賢所厚吏沛人朱詡自劾去大司馬府備棺衣收賢尸葬之王莽聞之大怒以他罪繫殺詡又曰楚王戊女解憂妻烏孫公主上書言年老思願得歸骸骨葬漢地天子愍而迎之公主與孫男女三人俱來後二歲卒三孫因留守墳墓又曰樓護字君卿結交士大夫無所不傾甚交士長者尤見親敬母死送葬者致車二三千兩後漢書曰永平十二年詔曰昔曾閔奉親竭歡致養仲尼葬子有棺無槨喪貴致哀禮存寧儉今百姓送終之制競為奢靡生者無擔石而財力盡於墳土伏臘無糟糠而牲牢兼於一奠靡破積代之業以供朝夕之費豈孝之意哉有司其申明科禁宣下郡國范曄後漢書曰孔僖拜臨晉令卒官遺令即葬二子長彥並十餘歲蒲坂令許君然勸令反魯對曰今載柩而歸則違父令舍墓而去心所不忍遂留華陰續漢書曰張奐光和四年卒遺令曰吾前後仕進十腰銀艾不能和光同塵為讒邪所忌但地底冥冥長無曉期而復纏以纊綿牢以釘密為不喜耳今幸有前穿朝隕夕下揩尸靈床幅巾而已奢非桓文儉非王孫推情從意庶免咎吝諸子從之又曰周暢字伯持性仁慈為河南尹永初二年夏旱久禱無應暢因收葬洛城傍客死骸骨凡萬餘人應時澍雨歲乃豐稔位至光祿勳東觀漢記曰光武發薊還士衆喜樂鼓聲歌詠八荒震動過范陽命諸將收葬吏士又東平王蒼葬章帝訪詔有司加賜鸞路乘馬龍旗九旒虎賁百人又曰東海王彊薨追念彊雅性恭儉不欲令厚葬以違其意詔中常侍杜岑東海相傳曰王恭謙好禮以德自終勑官屬遣送務行約省茅車瓦器以成王志又曰王丹閭里有喪憂輒度其資用教之儉約因為其制日定葬其親喪不過留殯一月其下以輕重為羌又曰梁鴻病困與高伯通及會稽士大夫語曰昔延陵季子葬於羸博之間不歸其鄉慎勿聽妻子持尸柩去終後伯通等為求葬處有要離冢高燥衆人曰要離古烈士今伯鸞亦清高令相近遂葬要離家旁子孫歸扶風
