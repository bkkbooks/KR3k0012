body:
  text: 職官部三丞相下唐書曰貞觀二年太宗謂侍臣曰中書門下機要之司擢才而居任委實重詔勑如有不便皆須執論比來唯覺阿旨順情遂無一言諫諍者豈是道理若惟署勑行文書而巳人誰不堪何須揀擇以相委付自今以後詔勑疑有不穩必須執之又曰來恆及弟濟相次知政事時以為榮初濟父護兒在隋為猛將而恆濟俱以學行見稱時虞世南子昶既無才術歷將作少匠工部侍郎纍居工作之司濟初升相位許敬宗歎曰士之登庸不繫世業履道則為衣冠失緒則為匹庶來護兒兒作宰相虞世南男作木匠忠賢文武固無種也又曰杜景儉為相則天常以季秋內出梨花一枝示宰臣曰是何祥也諸宰臣曰陛下德及草木故能秋木再花雖周文德及行葦無以過也景儉獨曰謹按洪範五行傳陰陽不相奪倫瀆之即為災又春秋云冬無愆陽夏無伏陰春無凄風秋無苦雨今巳秋矣草木黃落而忽生此花瀆陰陽也臣慮陛下布教施令有虧禮典又臣等忝為宰臣助天理物理而不和臣之罪也於是再拜謝罪則天曰卿真宰相也又曰武太后嘗召陸元方問以外事對曰臣備位宰相有大事即奏人間碎務不敢以煩聖覽又曰蘇味道遷鳳閣侍郎同鳳閣鸞臺三品味道善敷奏多識臺閣故事然而前後居相位數載竟不能有所發明但脂韋其間茍度取容而巳故時人號為摸稜手以為口實又曰宇文融既居相位欲以天下為巳任謂人曰使吾居此數月庶令海內無事矣於是薦宋璟為右丞相裴耀卿為戶部侍郎許景先為工部侍郎甚允朝廷之望又曰牛仙客既居相位獨潔其身唯諾而巳所有錫賚皆緘封不敢費之百司或有所咨決輒對曰但依令式即可若不依文非所知也又曰開元二十二年十一月制宰相兼官者並兩給俸祿又曰楊綰素以德行著聞質性貞廉車服儉朴居廟堂未數日人心自化御史中丞崔寬劍南西川節度使寧之弟家富於財有別墅在皇城之南池館臺榭當時第一寬即日潛遣毀坼中書令郭子儀在邠州行營聞綰拜相座內音樂咸散五分之四京兆尹黎幹以承恩每出入騶馭百餘亦即日減損車馬唯留十騎而巳其餘望風變奢從儉者不可勝數其鎮俗移風若此又曰肅宗時天下事殷而宰相不減三四員更直掌事若休沐各在第有詔旨出入非大事不欲歷抵諸第肅宗許令直事者一人假署同列之名以進遂為故事又曰李峴為黃門侍郎同中書門下平章事宰臣不於政事堂邀客時海內多務宰相元載等見中官宣傳恩詔至中書者引之政事堂上仍置榻坐焉峴至叱左右去其榻又曰柳渾與張延賞同在相位延賞怙權矜巳而嫉渾守正俾其所厚謂渾曰相公舊德但節言於廟堂則重位可久答曰為吾謝張相公柳渾頭可斷也言不可絶自是竟為延賞所擠尋除右散騎常侍罷知政事又曰柳渾為相而韓滉自浙西入覲朝廷委政待之至於調兵食籠鹽鐵勾官吏贓罰鉏豪強兼并上委仗焉每奏事或日旰他相充位而巳公卿救過不能暇無敢枝梧者滉於省中榜吏至死渾雖滉所引心惡其專政正色讓之曰先相公狷察為相不滿歲而罷今相公榜吏於省中至死况省闥且非刑人之地相公奈何蹈前非行於今朝專立威福豈尊主卑臣之義也滉感悟愧悔為霽威焉又曰李晟之在鳳翔也謂賓介曰魏徵能直言極諫致太宗於堯舜之上真忠臣也僕所慕之行軍司馬李叔度對曰此搢紳儒者之事非勳德所宜晟斂容曰行軍失言傳稱邦有道危言危行今休明之期晟幸得備位將相心有不可忍而不言豈所謂有犯無隱知而不為者耶是非在人主所擇耳叔度慚而退故晟為相每當上所顧問必極言匪躬盡大臣之節性沈默未嘗泄於所親又曰閻立本為右相與左相薑恪對掌樞密恪既歷任將軍立功塞外立本惟善於圖畫非宰輔之器故時人以千字文為之語曰左相宣威沙漠右相馳譽丹青又曰皇甫鎛陰結權幸以求宰相崔群纍疏其姦邪嘗因對面論語及天寶開元中事群曰安危在出令存亡繫所任玄宗用姚崇宋璟張九齡韓休李元紘杜暹則理用李林甫楊國忠則亂人皆以天寶十五年祿山自范陽起兵是理亂分時臣以為開元二十年罷賢相張九齡專任姦臣李林甫理亂自此巳分矣用人得失所繫非小詞意激切左右為之感動鎛深御之而憲宗終用鎛為宰相又曰李絳為相同列李吉甫便僻善逢迎上意絳梗直多所規諫故與吉甫不協時議者以吉甫通於承璀故絳尢惡之絳性剛訐每與吉甫爭論人多直絳憲宗察絳忠正自立故絳論奏多所允從又曰貞元九年詔宰相以旬秉筆決事初至德中宰相迭秉筆處斷每十月一易及賈耽趙憬陸贄盧邁同平章政事百寮有所關白更相讓不言於是奏議請旬秉筆者出應之其後又請每日更秉其筆迭以應事皆從之又曰李藩拜門下侍郎時王鍔領太原用錢千萬賂貴幸求兼相藩與權德輿在中書有密旨曰王鍔可兼宰相宜即擬來藩遂以筆塗兼相字卻奏上云不可德輿失色曰縱不可宜別作奏豈有以筆塗詔耶曰勢迫矣出今日便不可止日又暮何暇別作奏事果寢又曰韓弘入朝以宣武舊事人多流言其子公武以家財厚賂權幸及多言者班列之中悉受其遺俄而父子俱卒孤孫幼小穆宗恐為厮養竊盜乃令中使至其家閲其宅簿以付家老而簿上具有納賂之所唯於牛僧孺官側朱書曰某月日送牛侍郎物若干不受即付訖穆宗按簿甚悅居無何議命相帝首可僧孺之名又曰李程為相敬宗沖幼好治宮室畋遊無度欲於宮中營新殿程諫曰自古聖帝明王以慈儉化天下陛下在諒暗之中不宜興作願以瓦木回奉園陵上欣然從之又曰文宗問宰相曰天下何由太平卿等有意於此乎牛僧孺奏曰臣等待罪輔弼無能康濟然臣思太平亦無象今四夷不至交侵百姓不至流散上無淫虐下無怨讟私室無強家公議無壅滯雖未及至理亦謂小康陛下若別求太平非臣等所及既退至中書謂同列曰吾輩為宰相天子責成如是安可久處茲地邪旬日間三上章請退不許又曰韋處厚為相時文宗勤於聽政然浮於決斷宰臣奏事得請往往中變處厚常獨論奏曰陛下不以臣等不肖用為宰相參議大政凡有奏請初蒙聽納尋易聖懷若出自宸衷即示臣等不信若出於橫議臣等何名鼎司且裴度元勳宿德歷輔四朝孜孜竭誠人望所屬陛下固宜親重竇易直良厚忠事先朝陛下固當委信微臣才薄首蒙陛下擢用非出他門言既不從臣宜先退即趍下再拜陳乞上矍然曰何至此耶卿之志業朕素自知登庸作輔百職斯舉縱朕有所失安可遽辭以彰吾薄德處厚謝之而去出延英門復令召還謂曰凡卿所欲言並宜啓諭處厚因對彰善疸惡歸之法制凡數百言又言裴度勳高望重為人盡心切直宜久任可以壯國威帝皆聽納自是宰臣敷奏人不敢橫議又曰文宗朝宰臣楊嗣復因對奏曰使府判官今人數猥多徒有糜費臣欲條疏上曰莫限及才人否嗣復曰有才人自別但澄去滓弊者菁華自出上曰蕭復為相難言者必言貞元之名相也卿其志之又曰宋申錫為相尤以公廉為巳任四方問遺悉無受者既被罪為有司驗劾多獲其四方受領所還問遺之狀朝野為之歎息又曰宋申錫以障王事申錫既被罪怡然不以為意自中書歸私第止于外廳素服以俟命其妻出謂之曰公為宰相人臣位極於此何負天子反乎申錫對曰吾自書生被厚恩擢相位不能鋤去姦亂反為所羅網夫人察申錫豈反者乎因相與泣下數行又曰李德裕父吉甫年五十一出鎮淮南五十四自淮南復相今德裕自鎮南復入相一如父之年又曰會昌元年中書奏請依姚璹故事宰臣每月修時政記送史館從之又曰宣宗時魏謨為相奏曰臣無夔契之才驟叨夔契之任將何以仰報鴻私今邊戍粗安海內寧息臣愚所切陛下未立東宮俾正人傳導以存副二之重因泣下上感而聽之先是纍朝人君不欲人言立儲二若非人主己欲臣下不敢獻言宣宗春秋高嫡嗣未辦謨作相之日率先啓奏人士重之又曰曹礭與畢諴俱以儒術進用並居相位廉潔貞苦君子多之稱為曹畢又曰蕭遘與王鐸並居相位帝常召宰相鐸年高升階足跌踣勾陳中遘旁掖起帝目之喜曰輔弼之臣和豫之幸也謂遘曰適見卿扶王鐸子喜卿善事長矣遘對曰臣扶王鐸不獨司長臣應舉歲鐸為主司以臣中選門生也上笑曰王鐸選進士朕選宰相於卿無負矣遘謝之而退
