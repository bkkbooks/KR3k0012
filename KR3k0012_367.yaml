body:
  text: 人事部七耳釋名曰耳耐也耳有一體屬著兩邊耐耐然也耐音而禮曰是故先王之孝也色不忘乎耳目不絶乎聲傳富辰諫曰耳不聽五聲之和為聾又曰晉襄公卒靈公少晉人以難故欲立長君使先蔑士會如秦逆公子雍秦康公送公子雍于晉曰文公之入也無衛故有呂郤之難乃多與之徒穆嬴日抱太子以啼于朝曰先君何罪其嗣亦何罪舍適嗣不立而外求君將焉置此出朝則抱以適趙氏頓首於宣子曰先君奉此子也以屬諸子曰此子也才吾受子之賜不才吾唯子之怨今君雖終言猶在耳而棄之若何宣子與諸大夫皆患穆嬴且畏逼畏國人以大義來逼也乃背先蔑而立靈公以禦秦師又曰攝叔曰吾聞致師者右入壘折馘折馘斷耳執俘而還皆行其所聞而復又曰林雍羞為顏鳴右下羞為右改下車戰也苑何忌取其耳不欲殺雍但截其耳以辱之詩曰君子無易由言耳屬于垣又曰匪手雋之言示之事匪面命之言提其耳我非且以手攜挈之親視以其事之是非我非旦語之親提撕其耳此言教道易曰荷校滅耳聰不明也又曰巽而耳目聰明語曰六十而耳順穀梁傳曰梁自亡湎於酒淫於色心昏耳塞上無正長之治大臣背叛春秋元命苞曰耳者心之候尚書大傳曰孔子曰自吾得由也惡言不至於耳史記曰呂太后遂斷戚夫人手足去眼輝耳又淮陰傳曰韓信使人言於漢王曰齊反覆之國南邊楚不為假王鎮之其勢不定漢王大怒張良陳平躡漢王足因附耳語曰寧能禁信之王乎戰國策曰蘇秦説李兌明日復來舍人謂兌曰臣竊觀蘇公説也其辨過於君君能聽乎兌曰不能曰君即不能願君豎塞而耳無聽其談明日復見終日談而去秦謂舍人曰昨日我談薄而君動今精而君不動何也舍人曰我為塞兩耳無聽談也漢書曰楊輝報孫會宗書曰家本秦也能為秦聲婦趙女也雅善鼓瑟奴婢歌者數人酒後耳熱仰天拊缶而呼烏烏英雄記曰曹公擒呂布布顧謂劉備曰玄德卿為座上客我為降虜繩縛我急獨不可一言邪操曰縛虎不得不急乃命緩布縛備曰不可公不見布事丁建陽董太師乎操領之布目備曰大耳兒最叵信叵普火切魏書曰荀攸年七八歲父衢曾醉誤傷攸耳而攸出入遊戲常避護不欲令衢見衢後聞之乃驚其宿智如此吳録曰關羽走孫權使虞翻筮之曰必當斷頭傷其耳果如翻言蜀志曰先主長七尺五寸垂臂下膝顧自見其耳晉書曰王導多疾每自憂陳訓曰耳豎必壽亦大貴又曰殷仲堪父患耳聞床下蟻動謂是牛鬭王隱晉書曰張軌為涼州刺史燉音煌曹祛上言軌老病更請刺史軌治中率數十人皆割耳於盤流血訴枉得停蜀書曰武皇帝李雄美容貌相工相之曰此君口如方器耳如相望位必過三公不疑也唐書曰汴州節度李忠臣嘗因奏對德宗謂之曰卿耳甚大貴人也忠臣對曰臣聞驢耳甚大龍耳即小臣耳雖大乃驢耳也上悅之老子曰五音令人耳聾孟子曰伯夷耳不聽惡聲鶡冠子曰夫耳主聽兩豆塞之則上不聞雷霆淮南子曰禹耳三漏是謂大通興利除害決江疏河抱朴子曰老子耳長七寸又曰耳能聞雷霆而不聞蟻虱之音呂氏春秋曰雷則掩耳電則掩目耳聞所惡不如無聞目見所惡不如無見又曰且天生人而使其耳可以聞不學其聞不若聾使其目可以見不學其見不若盲使其口可以言不學其言曲以爽使其心可以知不學其知暗以狂凡學非為能益也達天性也説苑曰昔費仲惡來膠革長鼻決耳從紂之心武王誅之博物志曰南方落頭民其頭能飛以耳為翼瀨鄉記曰老子耳有三門王子年拾遺録曰沐胥國人左耳中出青龍右耳中出白虎龍虎初出之時如繩緣頰手捋面而龍虎皆飛去地十餘丈而雲氣繞龍風來吹虎俄而以手一揮龍虎皆還入耳高士傳曰堯聘許由為九州牧由聞之洗耳於河列仙傳曰務光夏時人耳長七寸陽都女耳細而長衆皆言此天人也又曰寧先生毛身廣耳阮丘耳長六七寸列士傳曰燕丹師田光往候荊軻值軻醉唾其耳中軻覺曰此出口入耳之言必大事也即往見光列女後傳曰劉仲敬妻者沛國桓林之姊也仲敬早亡桓乃引刀割耳宗婦問之桓曰吾自五代以來世知名男以忠孝顯女以貞順稱家以我年少必相嫁故預自裁割以信我心又曰曹文叔妻譙國夏侯寧之女文叔早亡妻斷髮自誓其家欲嫁之又截兩耳司馬太傅美之乞為曹氏後又曰陽華穆妻者下邳劉方之女字桃樹生一男而穆早亡吳丁諿音緝求之諿知名之士家將許焉桃樹乃操刀割耳其子又亡桃樹乃安身守正動不愆禮愆音徭長沙耆舊傳曰太尉劉壽少遇相師相師曰耳為天柱今君耳城郭必典家邦樊氏相法曰耳門不容麥歲至百兼富目釋名曰目默也謂默而內識也眼限也童子限限而出也禮曰目者氣之清明者也又玉藻曰目容端不睇視也又曾子曰十目所視十手所指其嚴乎傳曰宋華父督見孔父之妻于路目逆而送之曰美而艷又曰富辰曰目不別五色之章為昧又曰子王使鬭勃請戰曰請與君之士戲君憑軾而觀之得臣與寓目焉又曰楚子將以啇臣為太子訪諸令尹子上子上曰楚國之舉恆在少者且是人也蜂目而豺聲忍人也不可立也又曰秦伯伐晉取羈馬乃出戰交綏古名退軍為交綏秦晉志未敢堅戰兵未致爭而兩軍退故曰交綏秦行人夜戒晉師曰兩軍之士皆未憖也明日請相見憖缺也庾駢曰使者目動而言肆懼我也將遁矣薄諸河必敗之又曰宋華元為植巡功植將主也城者謳曰睅其目皤其腹棄甲而復睅出目皤大腹棄甲謂師也于思于思棄甲復來于思多鬚之貌又曰潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目又曰晉楚將戰晉侯筮之卜史曰吉卦遇復曰南國蹙射其元王中厥目及戰共王中目又曰叔孫豹會晉士丐于柯盟于督陽荀偃疸疽生瘍於頭疸疽惡瘡濟河及著雍病目出卒而視不可唅目開口禁也宣子盥而撫之曰事吳敢不如事主猶視大夫稱主欒懷子曰其為未卒事於齊故也懷子欒盈也乃復撫之曰茍終所不嗣事于齊者有如河乃瞑受唅嗣續也又曰宋公子地有白馬四公嬖向魋欲之向魋司馬植魋卜也公取而朱其尾鬣以與之與魋之地怒使其徒奪之魋懼將走公閉門而泣之目盡腫又曰公侵齊門于陽州顏息射人中眉退曰我無勇吾志其目也詩曰美目盼兮巧笑倩兮素以為絢兮書曰正月元日舜格于文祖詢于四嶽闢四門明四目達四聰咨十有二牧曰食惟時易小畜曰輿説輻夫妻反目象曰夫妻反目不能正室也又説卦曰離為目春秋孔演圖曰蒼頡四目是謂並明春秋元命苞曰目肝之使又曰舜重瞳子是謂慈原上應攝提下應三元尚書大傳曰舜目四瞳子論語隱義曰衛蒯聵亂子路興師往有孤黯者當師曰子欲入耶曰然黯從城上下麻繩釣子路半城問曰為師耶為君耶曰在君為君在師為師黯因投之折其左股不死黯開城欲殺之子路目如明星之光曜黯不能前謂曰畏子之目願覆之子路以衣袂覆目黯遂殺之史記曰吳王賜子胥屬鏤之劍以死子胥仰天歎曰嗟乎抉吾眼著吳東門上以觀越寇之入滅吳也又曰趙王與秦王會沔池秦王不肯擊缶相如曰五步之內請得以頸血濺大王矣左右欲刃相如相如張目叱之左右皆靡秦王不懌為一擊缶又曰越王無殭與中國爭強北伐齊齊威王使人説越王越王不納齊使者曰幸也越之不亡也吾不貴其用智如目之見毫毛而不自見睫也今王知晉之失計不知越之過是目論也又曰大梁人尉繚曰秦王為人蜂準蜂一作隆長目又曰漢王詣鴻門謝項羽羽欲殺漢王樊噲帶劍擁戟楯入軍門披帷西向而立瞋目視羽鬢髮上指目眥盡裂又曰項王大呼馳下漢軍皆披靡時赤泉侯為騎將追項王項王瞋目而叱之人馬俱驚辟易數里楚漢春秋曰上過陳留酈生求見使者入通公方洗足問何如人曰狀類大儒上曰吾方以天下為事未暇見大儒也使者出酈生瞋目案劍曰入言高陽酒徒非儒者漢書曰東方朔上書曰臣朔目若懸珠齒如編貝東觀漢記曰杜根諫和喜音喜又許忌切鄧后以安帝宜親政事太后大怒囊盛撲殺之根詐死三日目中生蛆魏志曰太祖與韓遂馬超等軍馬會語左右皆不得從唯將許褚超負其力陰欲前突太祖素聞褚勇疑從騎是乃問公有虎侯者安在太祖顧指褚瞋目眄之超不敢動又曰張繡反襲太祖營典韋戰於門中韋乃雙挾兩賊擊殺之餘賊不敢進復前突殺數人瘡重瞋目大罵而死又曰夏侯燉音敦從征呂布為流矢所中傷左目時夏侯淵與燉俱為將軍軍中號燉為盲夏侯晉書曰王衍嘗因宴集為族人所怒舉擂音壘擲其面衍初無言引王導共載而去然心不能平在車中攬鏡自照謂爾看吾目光乃在牛背上矣王隱晉書曰甘卓為揚威將軍歷陽內史郡人陳訓私語人曰甘公頭低視仰目中有赤脈當危於兵勿為將可也果為王敦所害又曰王敦枉害刀協及敦病白日見協乘軺音遙車從吏騶詣敦而仰頭瞋目鄧粲晉紀阮籍能為青白眼禮俗士輒以白眼對之嵇喜康之兄聞籍不哭見白眼喜不憚而退蕭子顯齊書曰褚淵有器度不妄舉動宅常失火煙焰甚遍左右驚擾淵神氣怡然索舉來徐去輕薄子頗以名節譏之以淵眼多白睛謂之白虹貫日也崔鴻十六國春秋前秦録曰符生驍果粗暴昏酒無賴祖洪甚惡之生無一目年七歲洪戲之問侍者曰吾聞瞎兒一淚信乎侍者曰然生怒引佩刀自剌出血曰此亦一淚也洪大驚三國典略曰齊韓鳳穆提婆高阿郍肱共處衡軸號曰三貴瞋目張拳有噉人勢又曰和士開常言曰琅琊王目光奕奕數步射人向者暫對不覺汗出又曰周武帝還自東伐初遇疾口不能言臉垂覆目老子曰五色令人目盲韓非子曰目見有百步之外而不能見其眥莊子曰溫伯雪子適齊舍於魯仲尼見之不言子路問焉仲尼曰若夫人者目擊而道存也又曰孔子見老聃而語仁義老聃曰夫播粳眯目則天地四方易位矣夫仁義翻然乃憒吾心亂莫大焉孟子曰伯夷目不視惡色又曰存乎人莫良於眸子眸子不能掩其惡胸中正則眸子膫焉胸中不正則眸子眊焉范子曰掩目別黑白雖一時中猶不知天道也慎子曰離朱之明察毫末於百步之外尺水不能見淺深非目不明其勢難覩也尸子曰使目在足下則不可以視又曰舜兩眸子是謂重明孫卿子曰厭目而視者視一以為兩燕丹子曰樊於期聞荊軻之言於是自剄頭墮背后兩目不瞋韓子曰田駟欺鄒君將殺之田駟恐告惠子見鄒君曰有人見君則睫大叶切閉目也其一目奚如君曰我必殺之惠子曰瞽睫兩目君奚弗殺駟東欺齊侯南欺荊王駟之於人瞽也君奚惡乃弗殺又曰古人目短於自見故以鑑觀面又曰刻削之道鼻莫如大目莫如小鼻大可小小不可大目小可大大不可小舉事亦然又曰楚莊王子曰王之伐越何也王曰政亂兵弱莊子曰臣患知之如目也能見百步之外而不能自見其睫王之弱亂非越王之下也而欲伐越此知之如目也淮南子曰夫目察秋毫之末而耳不聞雷霆之音耳調玉石之聲而目不見太山之高何則不小有所志而大有所志也孔叢子曰夫子適周見萇弘言終而退萇弘語劉文公曰吾觀仲尼有聖人之表其狀河目而隆顙是黃帝之形貌也郭子曰劉尹道桓溫鬚如反蝟毛眼如紫石稜自是孫仲謀一流人也抱朴子曰眼能察天衢而不能周項領之間蔣子語曰兩目不相為視昔吳有二人共評王者一人曰好一人曰醜久之不決二人各曰爾可來入吾目中則好醜分矣王有定形二人察之有得失非茍相反眼睛異耳袁準正書曰目以見小為明耳以聽大為聰顧子義訓曰假天下之目以視則四海毫末可見也山海經曰一臂國為人一目中其面而居括地圖同太公金匱曰一目視則不明一耳聽則不聰呂氏春秋曰孟賁過於先其伍船人怒以楫虓音乂其頭中河孟賁瞋目視船人髮植目烈鬚指指直舟人盡惕駭播入於河使船人知孟賁不敢直視涉無先者又辱之乎此不知故也又曰管子縛束於魯鮑叔曰君欲霸王則臣不若管夷吾桓公曰夷吾寡人之賊也射我者也不可鮑叔曰夷吾為其君射人若得之則彼亦將為君射人君不聽鮑叔固讓果聽之於是使告魯曰管仲寡人讎也願得而親加手焉魯許諾乃使吏鞹其拳膠其目以革囊其手也盛之以鴟夷置之車中至齊境桓公使人以朝車迎之又曰使其目可以見不學其見不若盲春秋後語曰平原君對趙王曰沔池之會臣察安君之為人也小頭而鋭瞳子白黑分明小頭而鋭斷敢行也瞳子白黑分明者見事明也列仙傳曰秦召魏公子無忌不行使朱亥奉壁一雙秦王大怒將朱亥著虎圈中亥瞋目視虎眥血出濺虎虎終不敢以視鄭玄別傳曰玄笑眉明目董卓別傳曰卓會公卿召諸降賊飯行責降者曰何不鑿眼應聲眼皆落地趙至自敘曰嵇康謂至曰卿頭小鋭瞳子白黑分明覘占停諦有白起風列仙傳曰偓於角切佺音筌槐山人採藥好食松實而目更方又曰赤斧戎人也為碧雞祠主簿餌丹身及瞳子皆赤神仙傳曰涉正巴東人入吳常閉目弟子隨之數十年莫有見開目者有一弟子固請之正為開目音如霹靂光如電照弟子頓伏良久乃起竹林七賢傳曰王戎眸子洞徹視日而眼照不虧世説曰顧長康云其哭桓宣武眼如懸河決溜又曰康僧淵目深而鼻高王承每調之僧淵曰鼻者面之山目者面之淵山不高則不靈淵不深則不清又曰裴令俊有姿容時人名之為王人有疾至困武帝使王夷甫往視之王出語人曰眸子閃閃如巖下電精神挺動體中故如惡耳語林曰王右軍見杜弘冶歎曰面如凝脂眼如點漆此神仙中人談藪曰王肅初歸國謂陽大眼曰在南聞君之名以為眼如車輪今見乃不異人大眼曰若旗鼓相望瞋眸奮發足使君亡魂喪膽何必大如車輪又曰後魏昭成帝常擊賊流失中目賊破執射者至左右欲剝割之常曰彼各為主何罪乃釋之
