body:
  text: 皇王部二十七後魏太宗明元皇帝後魏書曰太宗明元皇帝諱嗣太祖道武皇帝之長子母曰劉貴人登國七年生雲中宮太祖晚有男聞而大悅乃大赦天下帝明叡寬毅非禮不動太祖甚奇之天興六年封曰齊王加車騎大將軍拜相國初帝母既賜死太祖乃召帝告曰昔漢武帝將立其子而殺其母不令婦人預國政使外家為亂汝當繼統故吾遠同漢武為長久之計帝素純孝哀泣不能自勝太祖怒之帝還宮哀不自止日夜號泣太祖知又召之帝欲入左右諫曰孝子事父小杖則受大杖則避之今陛下怒盛入或不測陷帝於不義不如且出待和解而進不晚也帝從之乃遊行於外天賜六年冬十月即皇帝位大赦改元為永興元年追尊皇妣為宣穆皇后公卿大臣先罷歸第不與朝者悉復登用之是年乞伏乾歸自稱秦王海夷馮跋僣號天王國稱大燕三年春二月詔曰衣食足知榮辱夫人飢寒切已惟恐朝夕不濟所急者溫飽而已何暇及於仁義之事乎主教之多違蓋由於此非夫耕婦織內外相承何以家給人足矣其簡宮人非所當御及執作伎巧自餘悉出以賜鰥民三月詔侍臣常佩歛四年二月登虎圈射虎夏四月宴群臣於西宮使各獻言勿有所諱秋七月東巡置四廂大將又於十二時置十二小將以山陽侯奚斤元城公元屈行左右丞相是歲沮渠蒙遜僣稱河西王神瑞元年春正月以慎瑞頻集改年大赦二年六月幸去畿陂觀漁次于濡源立蜯臺遂射白熊于頹牛山獲之幸赤城親見長老問民之疾苦復租一年南次石亭幸上谷問百年訪賢俊復田租之半壬申幸涿鹿登橋山觀溫泉使以太牢祠黃帝唐堯廟幸廣甯事如上谷登廣甯之曆山以太牢祠虞舜廟帝親加禮焉泰常元年六月帝自鹿陂西行大獵于牛川發金山臨殷繁水而南觀于九十九泉三年春正月帝自長川詔護高車郎將薛繁率高車十零十二部大人眾二萬北至弱水招懷伐叛降者二千餘落獲牛馬二萬餘頭是年赫連勃勃僣稱皇帝四年夏四月車駕有事於東廟遠蕃助祭者數百國五月詔曰宣武皇帝體得一之玄遠應自然之冲妙配純化而御世演大道以宣風大行大名未盡盛羨其政宣曰道更上尊謚曰道武皇帝是年劉裕廢殺其主司馬德文僣稱皇帝自號為宋七年夏四月封皇子壽為太平王拜相國初帝服寒食散頻年動發不堪萬機五月詔皇太子臨朝聽政冬十月車駕南巡出自天門關路恒嶺四方蕃附大人各率所部從者五萬餘人十有一月皇太子親統六軍出鎮塞上八年二月築長城於長川之南起自赤城西至五原延袤二千餘里備置戍衛三月田於鄴南韓陵山幸汲郡至于坊頭濟自靈昌津幸陳留東郡濟河而北西之河內造浮橋於治坂津夏四月幸成皋觀虎牢而城內乏水懸綆汲河帝令連艦上施轒轀絕其汲路轒符分切轀於云切兵車也又穿地道以奪其井丁丑幸洛陽觀石經蠻王梅安率渠帥數千人來朝閏月還幸河內北登太行幸高都晉陽賜百官王公已下至於廝賤無不霑洽五月還次鴈門皇太子率留臺王公迎于句注之北庚寅車駕至自南巡冬十月廣西宮起外牆周廻二十里是歲民飢詔所在開倉賑給十有一月帝崩於西宮在位十五年時年三十二遣詔以司空奚斤所獲軍實賜大臣自司徒長孫嵩已下至于士卒各有差十二月上謚曰明元皇帝葬于雲中金陵廟稱太宗帝禮愛儒生好覽史傳以劉向所撰說苑新序於經典正義多有所闕乃撰新集三十篇採摭經史該洽古義兼資文武焉世祖太武皇帝後魏書曰世祖太武皇帝諱壽太宗明元皇帝長子也母曰杜貴嬪天賜五年生於東宮體貌瓌異太祖奇而悅之曰成吾業者此子也泰常七年四月封太平王五月為監國太宗有疾命帝總攝百揆聰明大度意豁如也八年十一月即皇帝位大赦天下十有二月追尊皇妣為密皇太后進司徒長孫嵩爵為北平王司空奚斤為宜城王藍田公長孫翰為平陽王其餘普增爵位各有差始光元年夏四月東巡幸太甯二年三月尊保母竇氏曰保太后營故東宮為萬壽宮起永安安樂二殿臨望觀九華堂初造新字千餘詔曰昔帝軒刱制造物乃命倉頡因鳥獸之跡以立文字繼歷久遠傳習多失其真今制定文字世所用者頒下遠近永為揩拭是年赫連屈丐死子昌僣立三年春二月起太學於城東祠孔子以顏淵配十有一月帝率輕騎二萬襲赫連昌至其城下徙萬餘家而還十有二月武都氐王楊玄及沮渠蒙遜等皆遣使內附四年春正月赫連昌遣其弟平原公定率眾二萬向長安帝聞之乃遣就陰山伐木大造攻具二月車駕還宮三月遣高源王禮鎮長安詔執金吾桓貸造橋於君子津五月車駕西討赫連昌濟君子津至于黑水帝親祈天告祖宗之靈而誓眾焉六月昌引眾出城大破之車駕入城虜昌群弟及其諸母姊妹妻妾宮人萬數府庫珍寶車旗器物不可勝計八月車駕至自征飲至策勳告於宗廟班軍實以賜留臺百寮各有差冬十一月以氐王楊玄為都督荊梁益寧四州諸軍事假征南大將軍梁州刺史南秦王神麚音加元年春正月以天下守令多行非法精選忠良悉代之二月改元是歲皇子晃生三年春正月行幸廣甯臨溫泉作溫泉之歌三月帝聞劉義隆將寇邊乃詔冀定相三州造船三千艘簡幽州已南戍兵集于河上以備之秋七月詔諸征鎮將軍王公仗節邊遠者聽開府辟召其次增置吏員詔大鴻臚卿杜超假節都督冀定相三州諸軍事行征南大將軍太宰進爵為王鎮鄴為諸軍節度九月立密皇太后廟于鄴甲辰行幸統萬遂往平涼十一月車駕至平涼先是赫連定將數萬人東御於鄜城留其弟上谷公杜于廣陽公度洛孤城守帝至于涼登北原使赫連昌招喻之杜于不降遂掘壍圍守之十二月定弟杜于度洛孤面縛出降涼平收其珍寶定長安臨晉武功守將皆奔走關中平車駕東還留巴東公延等鎮安定四年九月加太尉長孫嵩柱國大將軍特進左光祿大夫崔浩為司徒征西大將軍長孫道生為司空詔曰頃逆命縱逸方夏未寧戎軍屢駕不遑休息今二寇摧殄士馬無為方將偃武修文遵太平之化昧旦思求想遇師輔訪諸有司咸稱范陽盧玄愽陵崔綽趙郡李靈河間邢潁滄水高允廣平游雅太原張偉等皆賢儁之胄冠冕州邦羽儀之用庶得其人任之政事共臻邕熙之美易曰我有好爵吾與爾靡之如玄之比隱跡衡門不曜名譽者盡勑州郡以禮發遣遂徵玄等及州郡所遣至者數百人皆差次敘用冬十月詔司徒崔浩改定律令延和元年春正月尊保太后為皇太后立皇后赫連氏立皇子晃為皇太子謁於太廟太赦改年大延元年出太祖太宗宮人令得嫁大赦改年六月詔曰去春小旱冬作不茂憂勤剋已祈請靈祗上下咸秩豈朕精誠有感何報應之速雲雨震洒流澤沾渥有鄙婦人持方寸王印詣潞縣侯孫家既而亡去莫知所在玉色鮮白光照內映印有三字為龍鳥之形要妙奇巧不類人跡文曰旱疫平推尋其理蓋神靈之報應也朕用嘉焉比者以來禎瑞仍臻所在非一天降嘉貺將何德以酬之所以內省警震欣懼交懷其令天下大酺五日禮報百神守宰祭界內名山大川上荅天意以求福祿二年十一月行幸棝音固陽驅野馬於雲中置野馬苑三年高麗契丹國龜茲悅般焉耆車師栗特䟽勒烏孫渴槃陁鄯善諸國各遣使朝獻奉汗血馬四年春罷沙門年五十已下五年六月車駕西討沮渠牧犍侍中宜都王穆壽輔皇太子決留臺事八月車駕至姑臧牧犍兄子祖踰城來降乃分軍圍之九月牧犍兄子萬年率麾下來降是日牧犍與左右文武五千人面縛軍門帝解其縛待之以蕃臣之禮收其城內戶口二十餘萬倉庫珍寶不可稱計冬十月車駕東還宮徙涼州民三萬餘家于京師太平真君元年六月皇孫濬生大赦改元三年春正月帝至道壇親受符籙備法駕旗幟盡青十月封皇子伏羅為晉王翰為秦王譚為燕王建為楚王余為吳王四年冬十一月詔曰朕承祖宗重光之緒思闡洪基恢隆萬世自經營天下剪暴除亂掃清不順二十年矣夫陰陽有往復四時有代謝授子任賢所以休息優隆功臣式固長久蓋古今不易之令典也其令皇太子副理萬機楤統百揆諸朕功臣勤勞日久皆當以爵歸第隨時朝請饗宴朕前論道陳謨而已不宜復煩劇職更舉賢俊以備百官主者明為科制以稱朕心五年春正月皇太子始總百揆諸上書者皆稱臣詔曰愚民無識信惑妖邪私養師巫挾藏讖記陰陽圖緯方伎之書又沙門之假西戎虛誕生致妖孽非所以一齊政化布淳德于天下也自王公已下至於庶人有養沙門師巫及金銀工巧之人在其家者皆遣詣曹不得容匿限今年二月十五日過期不出師巫沙門身死主人門誅明相宣告咸使知聞詔曰自頃已來軍國多事未宣文教非所以整齊風俗示軌則於天下也今制自王公已下至於卿士其子息皆詣太學其百工伎巧騶卒子息當習其父兄所業不聽私立學校違者師身死主人門誅六年春正月車駕行幸定州引見長老存問之二月遂西幸上黨觀連理樹於玄氏十一月遣殿中尚書安定公韓茂率騎屯相州之陽平郡發冀州民造浮橋於碻苦交切磝五交切津七年二月幸長安存問父老丁亥幸昆明池三月詔諸州坑沙門毀諸佛像徙長安城內工巧二千家於京師車駕旋軫幸洛水夏四月車駕至自長安毀鄴城五層佛圖於泥像中得玉璽二其文皆曰受命於天既壽永昌其一刻其旁曰魏所受漢傳國璽八年六月西征諸將扶風公元處真等八將坐盜沒軍資所在虜掠贓各千萬計並斬之九年冬十月以婚姻奢靡喪葬過度詔有司更為科限十有一年春正月行幸洛陽所過郡國皆親對高年存恤孤寡遂征懸瓠夏四月車駕還宮賜從者及留臺郎吏已下生口各有差六月誅司徒崔浩九月車駕南伐冬十月車駕濟河詔諸將分道並進使征西大將軍永昌王仁自洛陽出壽春尚書長孫真趨馬頭楚王建趨鍾離高涼王郍自青州趨下邳車駕自中道十一月至鄒山劉義隆魯郡太守崔耶利率屬城降使使者以太牢祀孔子次于彭城遂趨盱音吁眙音怡三月車駕至淮詔刈雚葦作筏數萬而濟義隆盱眙守將臧質閉門距守將軍胡崇之等率眾二萬援盱眙燕王譚大破之梟崇之等斬首萬餘級淮南皆降是月永昌王仁攻懸瓠拔之獲義隆守將趙淮送京師斬之車駕臨江起行宮於瓜步山義隆使獻百牢貢其方物又請進女於皇孫帝以師婚非禮許和而不許婚使散騎侍郎夏侯野報之帝詔皇孫為書致馬通問焉正平元年二月車駕濟河次于魯口皇太子朝於行宮十二月車駕至自南伐飲至策勳告於宗廟夏五月大赦六月改年十月封皇孫濬為高陽王尋以皇孫世嫡不宜在藩乃止改封秦王翰為東平王燕王譚為臨淮王楚王建為廣陽王吳王余為南安王二年二月帝崩於永安宮在位二十九年時年四十五秘不發喪中常侍宗愛矯皇后令殺東平王翰迎南安王余入而立之大赦改元為承平三月上尊謚曰太武皇帝葬于雲中金陵廟號世祖冬十月余為宗愛所賊殿中尚書長孫渴侯與尚書陸麗迎立皇孫是為高宗帝生不逮密太后及有所識言則悲慟哀感傍人太宗聞而嘉歎暨太宗不豫衣不釋帶性清儉率素服御飲饍取給而已不好珍麗食不二味所幸昭儀貴人衣無縑綵群臣白帝更峻京邑城隍以從周易設險之義又陳蕭何壯麗之說帝曰古人有言在德不在險屈丐蒸土築城而朕滅之豈在城也天下未平方須民力土功之事朕所未為蕭何之對非雅言也每以財者軍國之本無所輕費至於賞賜皆是死事勳績之家親戚愛寵未曾撗有所及高宗文成皇帝後魏書曰高宗文成皇帝諱濬景穆皇帝之長子也母曰閭氏真君元年六月生於東宮帝少聰達世祖愛之常置左右號世嫡皇孫年五歲世祖北巡帝在後逢慮帥桎一奴欲加其罰常謂之曰奴今遭我汝宜釋之帥奉命解縛世祖聞之曰此兒雖小欲以天子自處意奇之既長風格異常每有大政常參決可否正乎二年二月中常侍宗愛弒逆立南安王余十月又賊余於殿中尚書長孫渴侯與尚書陸麗奉迎皇孫即帝位於永安前殿改元興安元年十二月初復佛法二年二月發京師五千人穿天淵池是月劉義隆子劭殺其父而自立夏五月行幸崞音郭山是月劉邵弟駿殺劭而自立閏月太后赫連氏崩八月詔曰朕以眇身纂承大業即位以來百姓宴安風雨順序邊方無事眾瑞兼呈不可稱數又於內苑獲方寸玉印其文曰子孫長壽群公卿士咸曰休哉豈朕一人剋臻斯應實由天地祖宗降祐之所致也思與兆庶共茲嘉慶其令民大酺三日諸殊苑已下各降罪一等興光元年二月帝至道壇受圖七月皇子弘生大赦改元太安元年遣尚書穆伏真等二十人巡行州郡觀察風俗二年春正月立皇后馮氏二月丁巳立皇子弘為皇太子大赦天下三年冬十月將東巡狩詔太宰常英起行宮於遼西黃山四年春正月至遼西黃山宮二月登碣石山觀滄海大饗群臣於山上班賞進爵各有差改碣石為樂遊山築壇記日行於海濱冬十月北巡至陰山有古塚毀發詔曰昔姬文葬枯骨天下歸仁自今有穿毀墳塚者斬之和平二年正月詔曰刺史牧民為萬里之表自項每因發調逼民假貸大商富賈射時利旬日之間增嬴十倍上下同通分以閏屋故編戶之家困於凍餒豪富之門日有兼積為政之弊莫過於此其一切禁絕犯者十疋以上皆死布告天下咸令知禁二月行幸中山遂幸信都車駕所過皆親對高年問民疾苦詔民年八十以上一子不從役靈丘南有山高四百餘丈乃詔群臣仰射山峰無能踰者帝彎弧發矢出山三十餘丈過山南二百二十步遂刊石勒銘三年冬十月詔曰夫三代之隆莫不崇尚年齒今選舉之官多不以次令班白處後晚進居先豈所謂彝倫攸敘者也諸曹選補宜各先盡勞舊才能十二月制戰陣之法十有餘條因大灘曜兵有飛龍騰虵魚麗之變以示威武四年春三月賜京師民年七十已上太官廚食以終其年夏四月上幸西苑觀射虎三頭五月行幸陰山秋七月詔曰朕每歲閏月命群臣講武平壤所幸之處必立宮壇縻費之功損勞非一宜仍舊貫何必改作也八月遂由於河西詔曰朕順時田獵而從官殺獲過度既殫禽獸乖不圍之義其勑從官及典圍者將校自今已後不聽濫殺其田獲皮肉別目頒賴十二月詔曰名位不同禮亦異數所以殊等級示軌儀今喪葬嫁娶之禮未備貴勢豪富越度奢靡非所謂式昭典憲者也有司可為之條格使貴賤有章上下咸序著之于令詔曰夫婚姻者人道之始尊卑高下宜令區別然中古以來貴族之門多不率法或貪利財賄或因緣私好在於茍合無所擇選今貴賤不分巨細同貫塵穢清化虧損人倫將何以宣示典謨垂于來裔今制皇族肺腑王公侯伯及士民之家不得與百工伎巧卑姓為婚犯者加罪六年四月破洛郍國獻汗血馬普嵐國獻寶劍五月帝崩於太華殿在位十四年時年二十六六月上尊謚曰文成皇帝廟號高宗葬雲中之金陵
