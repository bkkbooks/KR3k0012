body:
  text: 珍寶部九金中東觀漢記曰郭況遷為大鴻臚上數幸其第賞賜金帛京師號況家為金穴言其富貴謝承後漢書曰豫章張載字仲宗為廣陵太守舉孝子吳奉為孝廉奉齎金為禮載閉門不受奉以囊盛投載園中而逝載追不及齎金至廣陵還奉又曰雷義字仲公常濟人死罪者後以金二斤謝之義不受金主候義不在默投金於承塵上後葺治屋得金主已死義乃以付縣曹張璠漢記曰永昌太守鑄黃金之蛇獻之梁冀益州刺史种皓發其事後漢書曰中興初有應嫗者生四子而寡見神光照社試探之乃得黃金自是諸子宦學並有才名至瑒七代通顯又曰益州金銀之所出魏略曰田豫為并州胡密懷金三十斤曰以此上公張袖受之答其厚意胡去之後皆悉付外具狀聞於是詔褒之曰昔魏絳開懷以納戎今卿舉袖以受狄金朕甚嘉焉又曰大秦國出金織成帳也魏志曰繁昌縣授禪石碑中生金表送上群臣盡賀蜀志曰先主平蜀賜諸葛亮等金數百斤王隱晉書曰永嘉初陳國項縣賈逵石碑中生金人盜鑿取賣賣已復生此江東之瑞也又曰咸寧三年起居注載燉煌郡上釜銅生金中百陶不消可以切玉又曰鄱陽樂安出黃金鑿土十餘丈披沙之中所得者大如豆小者如粱米南郡象林南有四國皆稱漢人貢金供稅晉後略曰載賈后以鹿車詣金墉城餐金屑而死晉書曰清河王覃初為清河世子所佩金鈴歘生隱起如麻粟者祖母本陳大妃以為不祥毀而賣之占者以金是晉行大興之祥覃為皇胤是其瑞也毀而賣之象覃見廢不終之驗也晉永和起居注曰廬江太守路永表言於穀城北見水岸邊紫赤光得金一枚文如印齒宋書曰褚彥回為吏部尚書有人求官密袖中將一餅金因求清間出金示之曰人無知者彥回曰卿自應得官無假此物若必見與不得不相啓此人大懼收金而去彥回敘其事而不言其名時人莫之知也南史曰南海扶南國王諸農死子陽邁立陽邁初在孕其母夢生兒有人以金席籍之其色光麗夷人謂金之精者為陽邁中國云紫磨者因以為名宋永初二年遣使貢獻以陽邁為林邑王宋書曰齊武帝常至劉悛宅晝臥覺悛自捧金澡灌受四升以沃盥因以與帝齊書曰金車王者至孝則出金人王者有盛德則遊於後池林邑有金山金汁流於浦又曰梁武帝於襄陽起兵蕭穎胄以荊州應焉時長沙寺僧鑄黃金為龍數千兩埋土中歷相傳付稱為下方黃鐵穎胄因取此龍以充軍實梁書曰武陵王紀鎮蜀既東下黃金一斤為一餅百餅為簉至百簉銀五倍之其他錦罽稱是每戰則懸金以示將士終不賞賜又曰廬陵王續之子應不惠王薨至庫內閲珍物見金鋋問左右曰此可食不答曰不可應曰既不可食並揔乞汝南史曰林邑國有山皆赤色其中生金金夜則出飛狀如螢火又曰甄法崇之孫彬有行業鄉黨稱善嘗以一束苧就州長沙寺庫質錢後贖苧還於苧束中得五兩金以手巾裏之彬得送還寺庫道人大驚云近有人以此金質錢時有事不得舉而失擅越乃能見還輒以金半仰酬往復十餘彬堅然不受詠曰五月披羊裘而負薪豈拾遺金者耶卒還金梁武帝布衣而聞之及踐祚以西昌侯藻為益州刺史乃以彬為府録事參軍帶郫縣令將行同列五人帝誡以廉慎至彬獨曰卿昔有還金之美故不復以此言相屬由此名德益彰陳書曰歐陽頠在嶺南交州刺史袁曇綬密以金五百兩寄頠令以百兩還合浦太守龔為四百兩付兒智矩餘人弗之知頠尋為蕭勃所破資財並盡唯所寄金獨存曇緩亦尋卒至是頠並依信還之時人莫不歎伏之崔鴻十六國春秋後趙録曰建武元年十一月不雨雪至二年八月穀價湧貴金一斤直米二升又前燕録曰汜昭字嗣先燉煌人辟州主簿志在理枉申滯人有於夜中報昭黃金者昭責而遣之後魏書曰趙柔字元順嘗在路得人所遺金珠一貫價直百縑柔呼主還之又曰孫軌字元慶為諸軍司馬太武平赫連昌引諸帥入其府藏各令任意取金玉諸將取之盈懷軌獨不取帝把手親探金賜之謂之曰卿臨財廉朕所以增賜者欲顯廉於衆人又曰假揮自慕容璝歸魏太武至長安人告暉欲南奔云置金於馬韉中帝密遣視之果如告者斬之於市又曰李安世為主客令每有江南使至多出藏內珍寶令都下富室好容服者貨之令使任情交易時齊劉纘至金玉肆問價纘曰北方金玉太賤當是山川所出安世曰聖朝不貴金玉所以同於瓦礫又皇上德通神明地不愛寶故川無金山無玉纘初將大市得安世言慚而罷又曰副貨國城周匝七十里國王有黃金殿殿下有駝七頭高三尺又曰拔豆國出金銀河鉤羌國出金珠北史齊李幼廉少寡欲為兒童時初不從家人所求請故嘗以金寶授之終不取強付輒擲之地後為南青州刺史主簿徐乾富而暴橫歷政不能禁幼廉初至因其有犯收繫之乾密通疏奉黃金百挺奴婢二十人幼廉不受遂殺之北史隋獻皇后山陵後帝賜楊素金鉢一實以金銀鉢一實以珠隋書曰上賜王公已下射楊素箭為第一上手以外國所獻金精盤價直巨萬以賜之唐書曰太宗謂侍臣曰水旱不調皆為人君失德朕德不修天當責朕百姓何罪而尚多窮困聞有鬻男女者朕甚愍焉於是遣御史大夫杜淹巡關內諸州出御府金寶贖還父母又曰開元中杜暹為監察御史往西覆屯蕃人齎金以遺暹因辭不受左右以不可失蕃人之情暹受而埋於幕下既出境乃移牒令收取之又曰德宗詔曰朕聞王者不貴遠物所寶惟賢故堯設茅茨禹卑宮室光武捨去寶劍順帝封還大珠朕仰企前王思齊太素雍州所奏金坑誠為潤國語人於利非朕素懷方以不貪為寶惟德其物豈尚茲難得之貨生其可欲之心耶其金坑任人採斸官不得占又曰貞元元年四月南詔王異牟尋與其酋長定計遣使趙莫羅眉由南安使凡三輩致書於韋皋各齎生金丹砂為贄三分前皋所與牟尋書各持其一為信歲中三至京師且曰牟尋請歸大國永為藩臣所獻生金以喻向化之意堅如金也丹沙示其赤心耳上嘉之乃賜牟尋詔書又曰韋執誼時為翰林學士受賕為人求科第夏卿不應執誼乃探懷中出金以內夏卿袖夏卿驚曰吾與若賴先人德致名位幸各己達豈可如此自毀壞擺袖而去執誼大慚又曰路隨為翰林學士乃兼金紫有以金帛謝除制者必比之曰吾以公事接私賄耶終無所納管子曰玉起於禺氏山金起於汝漢珠起於赤野此寶相去各七千里湯以杜山之金以贖民之賣子者禹以歷山之金贖賣子者江陽之珠天下一美上有丹砂下有黃金上有慈石下有銅金上有陵石下有鉛錫上有赭下有鐵葛盧山發而出金蚩尤取以為劍鎧雍狐山發而出金蚩尤取以為戟楚有汝漢之黃金晏子曰景公為履黃金之綦僅能舉之列子曰齊人有鬻金者清旦衣冠之市適鬻金者之所因攫其金而去吏捕得之問曰人皆在焉子攫人之金何故對曰取金之時不見人徒見金魯連子曰秦圍趙邯鄲魏使將軍新垣衍入邯鄲令趙尊秦為帝魯連子説罷之秦軍退平原君以千金為先生壽笑曰若即有取商賈之事連不忍為也莊子曰今大冶鑄金金踊躍曰我且必為鏌鋣大冶必以為不祥之金又曰以瓦注者巧以黃金注者昏所要重則心矜又曰至仁無親至信辟金金玉小信之質耳至信則隆又曰金石有聲不考不鳴也韓子曰荊南麗水之中生金又曰魯丹三説中山之君而不受也因散五十金事其左右復見未語而君與之食魯丹出不及舍遂去中山其御曰交乃始善我何故去之魯丹曰夫以人言善我必以人言罪我未出境而公子惡之曰為趙來間中山君因索而罪之又曰張譴相韓病將死公乘無正懷三十金而問之其疾居一月公自問張譴曰君子死將誰使代子答曰無正法而畏上雖然不如公子食我之得民也張譴死因相公乘無正又曰荊王弟在秦秦不出也中尉之士曰資臣百金臣能出之因載百金之晉見叔向曰荊王弟在秦秦不出也請以百金委之叔向受金而見平公曰可以城壺丘矣平公曰何以對曰荊王弟在秦秦不出是秦荊惡也必不敢禁我城壺丘若禁之我曰為我出荊王之弟吾不城也彼如出之可以得禁彼不出是卒惡也不敢禁我城壺丘矣曰善乃城壺丘謂秦公曰為出荊王之弟吾不城也秦因出之荊王大説以鍊金百鎰遺之墨子曰昔夏使飛廉折金於山鑄昆吾鼎成而方不炊自烹不舉自藏不遷自行以祭昆吾之墟其兆繇曰蓬蓬白雲一南一北一東一西九鼎使成遷三國夏失殷受殷失周受孟子曰齊王以兼金一百遺孟子兼金好金也列子曰夏華殷謂湯曰渤海之東不知幾億萬里有大壑中有山一曰岱輿二曰方壺三曰員嶠四曰瀛洲五曰蓬萊其上高觀皆金闕淮南子曰玦五百歲生黃澒五百歲生黃金黃金千歲為黃龍玦石也中夾數五故五百歲一化澒音胡貢反澒黃金水銀也秦以一鎰為一金而重一斤漢以一斤為一金又曰舜藏金千斤於嶄巖之山所以塞貪鄙之心又曰子拯溺者金玉不若得尋常纏傅子曰懸千金於市人不敢取者分定矣委一錢於路童子爭者分不定矣抱朴子曰合金液用古稱黃金一斤都合用四十萬而成一劑可令八人仙也其次餌黃金一斤可得地仙又內篇曰山中亥日稱人字者金玉知其物則不能為害又曰吳景帝時戍將於廣陵掘一大冢棺中人面如生兩耳及鼻孔中皆有黃金大如棗許此假物不朽之效也
