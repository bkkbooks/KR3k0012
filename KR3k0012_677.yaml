body:
  text: 道部十八簡章玉帝七聖玄記曰七聖定簡五帝記名登真隱訣曰小有天王太素清虛真人登白空册詣紫虛太真三元君受流金火鈴豁落七元八景飛晨策玉璽又曰太一有玉璽金丹虎符玉清隱書曰有太上飛行九晨玉經金簡內文又曰玉璽鳳函金真玉光紫文單章在其內九幽經曰帝尊在三元宮中惣校圖籙又曰善功注名黃籙金格玉簡陳列三清四極明科經曰若有玄名帝圖紫簡緑字千年得傳也又曰五老寶經青緑為字以書其章又八素真經太上之隱書也八色采筆金闕帝君自書之為致真之法以付太虛真人南嶽赤松子使下授學道宿有真金玉字刻在金閣當為真人者不得越傳地仙又五符經一道通書以南和丹繒封以金英之函印以玄都之章付震水洞室之君又靈寶真一自然經衆真佩此經者以黃錦為地丹金書之永谷道真享之無期也元始説經中所言並是諸天上帝內名隱韻之音非世之常辭也又曰雌一玉檢五寶經祕在九天之上大有之宮太玄靈寶臺玉房之中紫金為素以撰其文青緑為字以書其章又曰有妙經刻玉為簡傳於天帝君太上八素真經曰司命著藉玉簡丹書編以金縷纏以青絲千億萬年無所復疑又曰太上吉日即以三元之章又印以太玄之章又印以高皇之章又印以中黃之章又曰西華宮有琅簡蘂書也又曰太上以白玉為簡丹玉書亦用青碧玄王黃金為之八素經曰八素真經玄文生於太空之內見於西龜之山玄圃之上積石之陰高玄羽章衆真宴禮稱慶上清上清經曰三天玉童帶朱精禁天之章高玉皇佩丹皇玉章又曰紫映九霄真玉佩金鳳璽又曰太素三元君有雲瓊之板九變虎書又曰高靈九帝帶元光紫綬流精飛瓊之章又曰三天玉童帶九天之章又曰高上虛皇君佩丹皇玉章又曰玉真九天丈人佩九元通真之策又曰紫靈皇上元皇佩封靈召真玉策帶流光鳳章又曰上皇玉虛君佩丹文紫綬又曰三元大明上皇君帶神虎紫章又曰皇上萬始先生佩金虎鳳文帶丹皇紫章又曰皇上帝君帶神虎玉章又曰上極紫皇君佩六山玉帶神精交蛇之章綬太霄琅書曰太微天帝君以紫簡結紫度經篇目也又曰有帝章之印又曰瓊文帝章當刻書棗心之木受於絶巖之中又曰太霄琅書乃九天飛霄之典瓊文帝章乃上文也並以元始生於自然空洞之中靈皇玉帝受於九玄鑄金為簡刻玉結篇金鏤玉字以明寶文祕於九天之上洞神經曰有三都印三皇印九天印巨天下又曰有三皇玉券一名金契又曰受三皇法須玉簡長一尺二寸廣一寸厚三分無者槿桐準也又曰通謁三皇之簡以青玉作之赤金為字金根經曰金簡玉札出自大上靈都之宮書以朱文編以朱繩又曰有神華玉門真人投金簡之處又曰領仙玉郎齎金簡紫籍來於東華青宮校定玉名又曰玉皇刻降丹精玉芝金璽鳳章也玉寶青宮之內有金章鳳璽又曰青宮北殿上有金章鳳璽真人得之又曰青宮之內北殿上有仙格金架也格上有學仙簿籙及玄名年月深淺金簡玉札有十萬篇領仙王郎之典也又曰青宮無金簡之籙玉格無玄編之名神經亦不可得披大洞玉經曰讀玄一洞經者神臺刊名於福連之簡太上金簡玉札名為福連之書也又曰真陽者上清之宮名福連之簡刊其內五符經曰真一食五牙天文西母刻以黃金之札封以丹芝光草印以太上中章茅君內傳曰茅盈在恆山內夢太玄玉女把玉札攜之又曰天上道君有玉輿鳳璽又曰太元真人有一人帶録章囊又一人帶繡章囊一人帶錦囊書金真玉光經曰有昭靈之章保生玉章又曰此經高妙衆經之尊總御萬真匡御群仙玄符流映洞明紫晨祕於九天之宮鑄金為簡以撰靈文刻玉丹書八明其篇也又靈寶自然經曰太上諸仙真以黃金為簡丹玉書之又太真科以玉牒金書七寶為簡玉帝七聖玄紀曰刻以白銀之簡結以飛青之文又曰廣靈之堂回天九霄白簡青籙刻其內太真科曰丹簡者以朱漆簡明火立陽也墨籙者以墨書文明水主陰人學長生故名丹簡墨籙祕不安傳又曰天皇執飛仙玉策人皇執上皇保命王策地皇執元皇定籙之策三華寶曜內真上經曰太帝靈都宮中有二十四萬上真仙人皆鑄金為簡白銀結編紫華書文誦詠此篇三天正法曰三天九微玄都大真靈籙者祕在太上靈都之宮刻以紫玉為簡黃金為文付五老上真仙都左公封以紫蘂玉芨盛以雲錦之囊南嶽夫人內傳曰白簡素籙以白玉為簡以青玉為字故謂之白簡青籙皆記得道之人名姓道學傳曰金簡有王元規之筆迹太上素經曰凡受太上黃素經者傳盟用玉札一枚長一尺五分廣一寸四分又云有三元秀簡真誥曰清虛真人詣三元君受玉璽金真龜山元籙曰丹文紫章神虎玉章七元交光之章流金紫章太上命神之章夜光寶章九色離羅之章靈書紫文經曰靈書紫文上經刻以紫玉為簡青金為文黃籙簡文經曰投金龍一枚丹書玉札青絲纏之以關靈五帝升度之信封於絶巖之中一依舊法又曰丹書玉札一枚金龍一以青絲繫石沉三河以關水帝升度之信一依玉訣舊文太洞玉經曰太上經簡玉札名為福連之書又曰太上書以彤玉之札則玉映之堂可見四明之門可入也後聖道君列紀曰刻以紫玉為簡青金為文龜母按筆真童拂筵玉童結編名之曰靈書龍飛尺素隱訣曰太微天帝君命羽仙侍郎奉金按以請飛行羽章太一洞真玄經曰白元司命五人朱衣絳巾各捧一白玉案上有所主簡紫度炎光經曰龜母捧筆太一拂筵天妃侍香玉筆結綸以白玉為簡金書保仙上符仙都也左公封以玉笈雲錦之囊變化經曰金光立空之案雲錦之囊封九赤班符於玄元之中南極長生司命君得之玉佩金璫上經曰九老仙都捧金精立空之案上請寶文以授衆真空洞靈章經曰白簡度品青籙定仙太元上上經曰非有瓊籙玉名刻簡三清者不得金虎內符靈書經曰東方九氣天中靈寶度命品章出自元始東華青童君封之青玉寶函之中印以元始九氣之章神仙中經曰老子度關時為尹喜著五千言解五十五章是手所書也能行此道知元氣父母天地之先不知此者徒自苦耳太微天帝君以紫簡注紫度炎光經篇目金簡書其正文玄章在焉玉皇譜籙曰高上衆真結自然之章金玄羽章經曰玉清八景隱書金玄內文生於元始之先即天之書也以威百神諸天內音經曰天有飛玄自然之氣合和五音以成天中無量洞章赤書玉訣上曰無始靈寶告水帝削除罪簡上聞九天金龍驛傳在朱書銀木簡以投三河之淵初用金鈕九雙連簡沉之於清泠之泉埋本命之嶽三官九府書人功過其理甚明隱元內文經曰青童君延萬帝於曲宇講寶訣之妙章洞真經曰六層玉臺在九天圖之上臺上有金簡玉扎及紫鳳丹章十萬篇太上真文玉郎典之玉光八景經曰玉寶臺太空之章封其內飛行羽經曰上皇九轉之道絳簡紫書祕於紫天元臺二十四生圖曰披九光玉蘊出金書紫字玉文丹章三部八景二十四生圖置白玉案上靈寶隱書曰玉誕者曇誓天十都名也上有大洞之章紫書玉字煥乎上清玉京山齋曰諸高仙真人會太上玄都披空洞歌章靈書經曰東方九氣天中靈書度命品章出自天元始東華青宮青童君封之青玉寶函之中印以元始九氣之章又南方三氣丹天靈書度命玉章出自元始朱陵上宮南極上元君封之赤玉寶函之中印以太丹三氣之章又西方七氣天中靈書度命玉章出自元始西華宮中金母封之白玉寶函之中印以太素七氣之章又云北方五氣天靈書度命玉章出自元始北上宮中玉晨君封之玄玉變之中印以太玄五氣之章三元布經曰高上三元經者乃三清真書也上真玉撿飛空之篇上元檢天大籙中元撿仙真書下元撿地玉文如是寶篇高上皆刻金丹書盛以自然雲錦囊封以三元寶神之章藏於九天之上大有之宮金臺玉室九曲丹房靈寶赤書曰元始命太真按筆玉妃拂筵鑄金為簡刻書玉篇五老賞籙祕於九天靈都之宮回天九霄經曰於是大一拂筵天妃持香玉華執巾丹書紫字刻於白金隱起靈顏結於玉篇題以青籙得道之名龍景九文紫鳳赤書經曰太上命太極真人授以玉簡金書寶洞飛霄絶玄之章玉帝玄記曰中皇元年九月七日七聖齋靈清長宮記其得道之篇刻以白銀之簡藏於雲錦之囊封以啓命之章付以五老仙都左公掌籙瓊宮又曰古空洞之中有回天上文四司所保五帝所詮七聖定簡舉形合先大有經曰太上玉章刻玉為簡惣御萬真真經曰東方歲星青帝勾芒佩通明之印南方熒惑赤帝太昊佩太陽之印西方太白白帝少昊佩通陰之印北方辰星黑帝顓頊佩通神之印中央鎮星大帝文昌佩方神之印本際經曰有十二法印紫書金根經曰有青精玉璽金房上經曰大帝靈神都宮中有金房度命延年之訣鑄金為簡刻白銀之編紫筆書文消魔經曰發九天之朱匱望上清之瓊扎玄書既刻於玉章絳名始刊於靈闕大洞真經曰八景玉籙藏於太素瑤臺玄雲羽室封以鬱森之笈玉清三元之章簡扎品曰青童君曰無金簡者銀木亦可當也無玉扎者桐木亦可當但令精好也真理無有暗節當取扎於雲錦之囊此上真之至號玉帝之靈篇也上清九真中經內訣有玄靈元君寶祕奔日月之玉章神州七變經曰大陰玉晨九天真妃紫晨君受流精飛景寶章太清中經曰有天一八極璽龜山元籙曰有流金鳳璽又曰天皇太帝遣繡衣使者冷廣子期授茅盈以神璽玉章金闕聖君命太極真人使正一上玄玉郎王忠鮑兵等與茅盈佩璽太上飛行羽經曰太真丈人衣九色飛雲曜光羽章靈飛六甲經曰玉真青君帶流金鳳章太上九赤班符五帝內真經曰封靈制魔之章黃神中皇之章三皇經曰三皇自然之文皆以金玉為用天皇所授玄玉為簡青玉為文地皇所授黃玉為簡白玉為文綴以金鉤聯以金鎖置以玉案覆以珠巾寶蓋珍床安之青宮閉之紫閣芬以五香侍以十華也神州七轉七變經曰流金鳳璽紫宸上皇先生所佩三皇序目曰九天印文以召九天校事也上清變化經曰高上虛皇君佩丹皇玉章又云三元大明上皇君帶神虎紫章又有皇上帝君佩金虎鳳文帶神虎玉章又曰九霄真王佩金鳳璽歷藏經曰天王侯帶紫綬金印五嶽真圖曰太山君佩通陽大明之印衡山君佩夜光天真之印嵩山君佩神宗陽和之印華山君佩開天通真之印恆山君佩長津悟真之印青城丈人佩三庭之印後聖列紀曰紫微上真天帝玉清君遣八景瓊輿來迎聖君以登上清宮賜蘂剛丹玉鳳璽後聖九玄道君列紀曰太陰法有死生有黑籙白簿真青丹編簡受生先後之相次也後聖道君列紀曰玉清君賜道君玉鳳璽飛行三界經曰下有太一紫綬金印威喜天帝信璽修靈寶飛行三界之道真人所佩五稱符上經曰五星通靈之印印五星靈符道學傳曰吳王闔閭得真文不解封以黃金之檢印以玉皇之章以問魯大夫孔子又曰禹封五符以金英之函檢以玄都之印神仙傳曰衛叔卿語其子度世云可於室西北桂下取我仙方按而服之令人長生度世握得玉函封以飛仙之印取按之服五色靈母仙去北帝經曰酆都祕印用救世間攝制鬼神集仙籙曰杜蘭香女仙也於洞庭包山降張碩家碩蓋修道者也授以飛化之道留玉簡玉唾盂又齎黃麟羽帔此上仙之所服非洞天之所有也
