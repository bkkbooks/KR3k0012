body:
  text: 人事部三十三吟釋名曰吟嚴也其聲本出於憂愁故聲嚴肅使聽之悽歎也説文曰吟歎也毛詩關睢序曰吟詠情性以諷其上東觀漢記曰梁鴻常閉戶吟詠書記遂潛思著書十餘篇魏志曰管輅隨軍而行過母丘儉墓下倚樹哀吟精神不樂人問其故輅曰林木雖茂無形可久碑誄雖美無後可守玄武臧頭蒼龍無足白虎銜尸朱雀悲哭四危以備法當滅族不過二載應至矣卒如其言蜀志曰諸葛亮字孔明早孤躬耕壠畝好為梁甫吟每自比於管樂唐書曰蔡允恭荊州江陵人有風彩解綴文雅善吟詠煬帝所屬詞賦多令諷誦之莊子曰北門成問黃帝曰帝張咸池之樂於洞庭之野吾聞之藹藹默默乃不自得帝曰吾奏以陰陽之和燭以日月之明其聲能長慮之不知望之不見曭然立於四虛之通倚稿梧而吟又曰莊子謂惠子曰今子外乎子之神勞乎子之精依樹而吟處稿梧而瞑文士傳曰李康清廉有志節不能和俗為卿里豪右之所共害故官塗不進作遊山九吟辭曰蓋人生天地之間若流電之過戶牖輕塵之棲弱草矣湘中記曰涉湘千里但聞漁父吟中流相和其聲綿邈也盛弘之荊州記曰新城郡瀙初覲切水別有一溪其傍有白馬塞孟達登之歎曰金城千里遂為上瀙吟彼方人猶傳此聲韻悽激其哀思之音乎西京雜記曰相如將娉茂陵人為妾文君作白頭吟鹽鐵論曰曾子倚山而吟山鳥下翔世説曰韓壽美姿容賈公辟為掾充每藂會其女於青璅中看見壽心甚悅之乃問其婢識此人不婢説是其先主女內懷存想發於吟詠婢後往壽家具説如此并言女色麗壽聞之心動乃因婢通意婢以白女女大喜乃期往宿壽趫捷絶人乃踰墻而入家中莫知自是賈公覺女悅暢有異於常陳武別傳曰陳武字國本休屠胡人常騎驢牧羊諸家牧豎十數人或有知歌謠者武遂學太山梁父幽州馬客吟及行路難之屬阮籍樂論曰漢順帝上恭陵過樊濯聞鳴鳥而悲泣下橫流曰善哉鳥鳴使左右吟之使聲若是豈不佳乎此謂以悲為樂也王粲登樓賦曰鍾儀幽而楚奏莊寫顯而越吟嘯説文曰嘯吟也雜字解詁曰嘯吹聲也毛詩江有汜曰之子歸不我過不我過其嘯也歌箋大嘯蹙口而出聲也又白華曰嘯歌傷懷念彼碩人後漢書曰南陽太守成瑨委功曹岑晊郡中謠曰南陽太守岑公孝弘農成瑨但坐嘯漢晉春秋曰桓帝幸樊城百姓莫不觀有一老父獨耕不輟議郎張溫使問焉父嘯而不答魏略曰諸葛亮在荊州遊學每晨夜常抱膝長嘯魏氏春秋曰阮籍少時嘗遊蘇門山山有隱者莫知其姓名有竹實數斛曰杵而已籍從之與談太古無為之道五帝三王之義蕭然曾不經聽籍乃對之長笑清韻響亮蘇門生逌爾而笑籍既降蘇門生亦嘯若鸞鳳之音晉陽春秋曰嵇康見孫登對之長嘯逾時不言康辭還曰先王竟無言乎登曰惜哉晉中興書曰桓石秀風韻秀徹叔父沖嘗與石秀共獵獵徒甚盛觀者傾坐石秀未嘗瞻盼嘯詠而己晉書曰石勒年十四隨邑人行販洛陽倚嘯上東門王衍見而異之謂左右曰向胡雛吾觀其聲視有奇志將恐為天下之患馳遣收之會勒去又曰謝奕桓溫辟為安西司馬猶推布衣之好在溫座岸幘嘯詠無異常日溫曰我方外司馬又曰王徽之在吳中一士大夫家有好竹欲往觀之乃遙造竹下諷嘯良久主人灑掃請坐徽之不顧將去主人乃閉門徽之盡歡而去又曰謝鯤鄰家高氏有女常往挑之女方織以梭投折鯤齒既歸微然長嘯曰猶不廢我嘯也趙書曰石勒屯葛陂值天雨不息勒長史刀應勸勒降晉勒愀然而嘯張賓勸勒還北勒攘臂曰賓計是也應宜斬吳越春秋曰越王念吳欲復之乃中夜抱拄而哭哭訖承之以嘯於是群臣咸曰君王何愁心之甚也夫復仇誅敵非君王之憂自是臣下之急務又曰吳王闔閭將欲伐楚登臺南向而嘯有頃而歎群臣莫有曉王意者子胥乃薦孫子孫子者吳人名武善為兵法僻隱幽居世人莫知其能英雄記曰向栩為性卓詭不凡好讀老子狀如學道又復似狂居嘗竈北坐被髮喜長嘯人客從就輒伏不視人有於栩前獨拜栩不答山海經曰玉山者是西王母所居也西王母其狀如人豹尾虎齒而善嘯蓬髮戴勝蓬髮亂髮勝玉勝也莊子曰童子夜嘯鬼數若齒孫登列傳曰孫登字公和汲郡共縣人清靜無為其情志悄如也好讀芴彈琴頽然自得觀其風神若遊六合之外當魏末共處北山中以石室為宇編草自覆阮嗣宗聞登而往焉適見公和苫蓋被髮端坐巖下鼓琴嗣宗自下趨進既坐莫得與言嗣宗乃嘹嘈長嘯與琴音諧會雍雍然登乃逌爾而笑因嘯和之妙響動林壑風氣清太玄竹林七賢論曰阮籍字嗣宗性樂酒善嘯聲聞百步箕踞嘯歌酣放自若時蘇門山中忽有真人在焉籍親往尋其人於巖巔遂登嶺從之箕坐相對籍乃商略終古以問之仡然不應籍因對之長嘯有頃彼乃斷然嘆曰可更作籍又嘯意盡退還半嶺聞嶺巔然有聲若數部鼓吹顧瞻乃向人之嘯也世説同王廙別傳曰王道與庾亮遊于石頭會遇廙至是日迅風飛帆廙倚樓而長嘯神氣甚逸王子年拾遺記曰太始二年南方有因霄之國人皆善嘯大丈夫嘯聞百里婦人嘯聞五十里如笙竽之音秋冬則聲清高春夏則聲沉下人舌尖處倒向喉內亦云有兩舌重沓以爪徐徐刮之則嘯聲踰遠故呂氏春秋云反舌殊鄉之國即此之謂也列女傳曰魯漆室之女者過時未適人當穆公之時君老太子幼女倚柱而嘯鄰人婦從謂曰何嘯之悲也子欲嫁乎女曰吾憂魯君老而太子少也西京雜記曰東方生善嘯每一曼聲長嘯塵落瓦飛郭子曰劉道真少時劉寶字道真高平人安北將軍漁釣而憊於草澤善歌嘯聞之者無不留連有一老嫗識其非常甚樂歌嘯乃殺豚進道真食豚盡了不謝世説曰晉文王德盛功大坐席嚴敬擬於王者唯阮籍在坐箕踞嘯歌酣飲自若又曰劉越石為胡騎所圍數重窘迫無計劉依夕乘月登樓清嘯胡賊聞之皆悽悲長歎又曰謝太傅盤桓東山時與孫興公諸人泛海戲風起浪湧諸人色動並唱使還太傅神情方雅王逸少吟嘯不言又曰王子猷嘗寄人空宅便令種竹嘯詠良久直指竹曰何可一日無此君又曰謝萬北征嘗以嘯詠自高未嘗撫慰衆士謝公謂曰汝為元帥宜數喚諸將慰勞之萬都無其説直以如意指四座曰諸公皆是徑卒諸將甚怨之搜神記曰趙炳嘗臨水從船人乞渡船人不許炳乃張蓋坐其中長嘯呼風亂流而濟潯陽記曰桓宣穆使人尋廬山見一人謂之曰君過前嶺必逢二年少相隨長嘯試要問之若不與言者可速去此人過嶺果見二年少以袂掩鼻長嘯狀如惡獸呼不與言神境記曰營道郡西有靈源山有石髓紫芝者有採藥此山聞林谷間有長嘯者今樵人往往猶聞焉異苑曰潯陽姑石在江之坻初桓玄西下令人登之中嶺便聞長嘯聲甚清徹至峰頂見一人踑踞石上嘯旨曰嘯者其氣激於喉中而濁謂之言激於舌端而清謂之嘯言之濁可以通人事達情性嘯之清可以感鬼神致不死出其言善千里應之出其嘯清萬靈授職故古之學道者重矣又曰太上道君授於西王母西王母授於南極真人南極真人授於廣成子廣成子授於嘯父嘯父授於務光務光授於舜舜演之為琴以授禹自後而廢續有晉太行山仙君孫公得之乃得道而無所授焉阮嗣宗所得少分其後堙滅不復聞矣又曰嘯有一十五章一曰權輿嘯之始也二曰流雲乃古之善嘯者聽韓娥之聲而寫之三曰深溪虎古之善嘯者聽溪中虎聲而寫之四曰高柳蟬古之善嘯者聽而寫之五曰空林夜鬼古之善嘯者夜過空林聞而寫之六曰巫峽猿古之善嘯者聞而寫之七曰下鴻鵠出於師曠演清角之音善嘯者寫之八曰古木鳶九曰龍吟皆嘯者聞而寫之十曰動地出於孫公其音亦師曠清徵也十一曰蘇門孫公隱蘇門山之作也十二曰劉公命鬼仙人劉根之所為也十三曰阮氏逸韻阮籍所作也十四曰正章深遠極大非常聲也十五曰畢音五音之極而大道畢矣晉成公綏嘯賦曰逸群公子體奇好異傲世忘榮絶棄人事於是延友生集同好精性命之至機研道德之玄奧邈跨俗而遺身乃慷慨而長嘯發妙聲於丹脣激哀音於皓齒響抑揚而潛轉氣衝鬱而熛起協黃宮於清角雜商羽於流徵飄遊雲於泰清集長風乎萬里諒自然之至音非絲竹之所擬桓玄與袁宜都書論嘯曰讀卿歌賦序詠音聲皆有清味然以嘯為髣佛有限不足以致幽旨將未至耶夫契神之音既不俟多瞻而通其致茍一音足以究清和之極阮公之言不動蘇門之聽而微嘯一鼓玄默為之解顏若人之興逸響惟深也哉袁山松答書曰嘯有清浮之美而無控引之深歌窮淵根之致用之彌覺其遠至乎吐辭送意曲究其奧豈脣吻之切發一往之清吟而已若夫阮公之嘯蘇門之和蓋感其一奇何為徵此一至大疑嘯歌所拘邪嚬韓子曰韓昭侯使人藏弊袴或曰君亦不仁矣弊袴不以賜左右而藏之昭侯曰吾聞明君嚬有為嚬笑有為笑袴之與嚬笑相去遠矣吾必待有功故藏之未有與也莊子曰西施病心而嚬其里之醜人見而美之歸亦捧心而嚬其里之富人見之堅閉門而不出貧人見之挈妻子而走之夫彼知美嚬而不知嚬之所以美嵇康高士傳曰於陵仲子齊人常歸省母人饋其兄鵝仲子嚬蹙曰惡用是鶂鶂者哉
