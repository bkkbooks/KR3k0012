body:
  text: 咎徵部五雪左傳曰昭公四年正月大雪劉向以為昭公娶吳婚於同姓董仲舒以為季孫宿專政陰氣盛也漢書曰武帝時十二月大雨雪人凍死時衡山王謀反廢而殺之又曰元帝時十一月齊楚大雪深五尺時石顯陷魏郡太守京房殺之又曰王莽天鳳中地震大雨雪深一丈竹柏枯死其年瑯邪女子呂母為子報仇黨至數萬時天下大亂飢晉書曰吳孫權時正月大雨雪平地三尺鳥獸死者大半將軍全琮於淮南戰死者數十萬又曰孫亮時春大雨雪震電既雷則雪不當復降而亮見廢宋書曰孝武帝時大雪平地二尺明年虜侵冀州後魏書曰世祖太平真君八年北鎮大雪人畜凍死時正嚴急司徒崔浩濫被誅不時雪左傳曰桓公八年八月雨雪劉向以為夫人有淫行將弒象桓公不覺與夫人如齊而弒死雪又雨之陰出非其時迫近象陰氣盛也易通卦驗曰乾得坎之蹇則夏雨雪詩推度災曰逆天地絕人倫則夏雨雪京房曰夏雨雪臣為亂漢書曰文帝時六月大雨雪後二年淮南王長謀反遷蜀道死又曰武帝時三月雨雪平地厚五尺是歲御史大夫張湯有罪自殺丞相翟嚴青坐與三長史棄市又曰成帝陽朔四年四月雨雪燕雀死後二年許皇后廢晉書曰武帝時大雪其年吳將步闡敗死傷甚眾後又八月大雪折木又曰穆帝時八月大雪人馬凍死時政由臣下崔鴻十六國春秋曰前涼張祚和平元年大會黑風冥闇五月雨雪行人凍死祚廣征兵三十餘道入擊南山諸種時入千里張掖人王鸞上書諫言軍不可行行有大變祚怒以為妖言斬之祚與嚴展吳綽升飛鸞觀征虜趙長校尉張璹入謙光殿拜張玄靜為主咸稱萬歲祚愕然便下曰欲殺我耶長曰然遂刺祚傷額殺之又曰後蜀李雄以晉咸康六年八月死之曰宮內積雪自外則否石虎鄴中記曰虎以五月發五百里內萬人營華林苑至八月天暴雨雪雪深三尺作者凍死數千人太史奏作役非時天降此變虎誅起部尚書朱軌以塞天災廣五行記曰梁武帝時三月大雪平地三尺時義州刺史文僧朗以州叛於魏大同中七月青州雪害苗稼交州刺史李賁舉兵僣號後魏書曰靜帝興和年五月大雪時北齊神武發卒十萬築鄴城又有無君之心又曰武定時二月大雪人畜凍死道路相望時高歡專政帝政臨虛器隋書曰北齊武成河清年二月大雪連月南北千里平地數尺時匈奴與周師入并州殺掠吏人又曰武成任用和士開至後主復寵之隴東王胡長仁元舅之尊欲理政被士開所譖出為齊州刺史武平二年三月天忽降雪一尺餘時生苗已出雪覆之蓋壟禾頭後微萎而不死百姓相謂曰禾不死及壟凍長仁在齊州密遣刺客殺士開事發勑遣使於齊州賜死則隴凍之驗赤雪晉書曰武帝太康七年河陰雨赤雪二頃霜謝承後漢書曰郎顗上事曰入歲常有霜氣月不舒光日不宣耀陛下倦於萬機政有闕也抱朴子曰若霜氣有圍城或入於城則外兵得入若霜氣從內出主人出戰京房易傳曰興兵妄誅厥災夏霜殺五穀誅不原情茲謂不仁冬先雨乃隕霜有芒角賢聖遭害其霜附木不入地毛詩曰正月繁霜我心憂傷正月夏之四月也繁多也四月建巳純陽用事霜多急恒寒苦之異傷害萬物故心憂也春秋考異郵曰魯僖公即位隕霜不殺草李梅實梅李大樹比草為貴是君不能伐也定公即位隕霜不殺菽菽者稼最強李氏之萌又曰穆公即位仲夏霜殺草日中不消春秋命曆序曰桀無道夏出霜師曠占曰春夏一日有霜者君父母治政大嚴大殺天以示之何以言之霜威殺萬草坐大殺也見變如此宜損威殺重人之命漢書五行志曰左傳僖公時八月霜不殺草謂襄仲專權殺嫡立庶公室遂弱至三十三年冬霜不殺草劉向以為君誅不行舒緩之應是時公子遂專政三桓繼為卿皆為亂矣又曰定公元年八月霜殺菽劉向以為誅罰不由君出在臣下之象是時季氏逐昭公死于外又曰武帝時四月霜殺草木是時天下戶口減耗又曰元帝時三月九月隕霜殺稼時弘恭石顯專政迫逐忠烈進用邪佞又曰王莽天鳳六年四月霜殺草木則專政已亂至地皇四年秋霜關東人相食馬適王匡等兵起群盜大亂晉書曰武帝時八月霜害豆又五月隕雪傷穀時大舉征吳又五月霜殺桑麥時王濬大功被陷無辜又曰惠帝時三月霜傷木五月雨雹時賈后廢愍懷太子隋書曰梁武帝時三月六月降霜殺草時發卒拒魏百姓勞苦唐書曰太宗貞觀初突厥頡利可汗部落五月霜降至四年為僕射李靖所滅晝霜隋書曰北齊武成時晝霜下其年傳位於太子緯雹京房易飛候曰雹下盡樹木枝害五穀者君賦歛剋民禮記月令曰仲夏行冬令則雹凍傷穀左傳曰昭公四年正月大雨雹季武子問於申豊曰雹可禦乎對曰聖人在上無雹雖有不為災古者日在北陸而藏冰西陸朝覿而出之其出入也時今棄而不用雹之為災誰能禦之春秋考異郵曰僖公九年秋昭三年冬並大雨雹時僖公專樂齊女綺畫珠璣之好掩月光陰精凝為災異昭公事晉陰精用密故災史記曰周孝王七年厲王生冬大雹牛馬死江漢俱動及孝王崩厲王立王室大亂漢書曰宣帝太始中山陽濟陽雨雹如鷄子深二尺五寸殺飛鳥牛馬皆死七月大司馬霍禹謀反皆伏誅八月霍皇后廢成帝時四月楚國雨雹太如斧飛鳥死時王氏專政又曰王莽時雨雹殺牛羊莽殺其少子咸時天下大亂百姓窮愁起為盜賊後漢書曰安帝初元四年六月郡國三雨雹大如鷄子殺六畜時鄧太后以陰盛專於陽政又曰獻帝初平四年六月扶風雨雹大如升殺人時天下潰亂曹操專政帝臨虛器吳志曰孫權時雨雹權聽讒太子和見廢晉書曰武帝時五月雹傷禾麥壞屋時王濬有大功被陷帝不斷陰愶陽之應又曰惠帝時六月雨雹深三尺時賈氏專政遂廢愍懷太子又曰元帝時風雹殺人時王敦擁兵不朝內外戒嚴又曰明帝時京都大雨雹鷰雀死又曰四月大雨雹是年蘇峻為亂又曰穆帝時六月雨雹大如升後四年張祚在涼州為宋混所滅宋書曰文帝元嘉三十年五月盱眙雨雹大如鷄卵明年冬太子劭兵亂隋書曰梁武帝大通年四月雹時帝數捨身作奴為沙門所制陰愶陽之應崔鴻十六國春秋曰後趙石勒時暴風大雨雹震建德殿端門襄國市西門倒殺五行電起西河大如鷄子平地三尺洿下丈餘行人禽獸死者萬數歷千餘里樹禾催折禾稼蕩然勒問徐光光曰去年不禁寒食介推帝鄉之神也歷代所尊故有此災又曰石遵時雨雹大如盂升立百餘日為石鑒所殺鑒為冉閔殺之隋書曰陳宣帝太建二年六月大雨雹十年四月又大雨雹始興王叔陵刺後主於喪次據東府反俄而伏誅霧禮記月令曰仲冬行夏令則氣霧冥冥霜霧之氣也散相亂也晉書曰成帝咸和元年大霧步武不相見會稽王道子專政之應國志曆曰晉咸和元年三月霧殺桑果宋書曰晉安王子勛帝子業景和年中即偽位其日雲霧四合旬日被殺齊書曰武帝時大霧竟天如煙入人眼鼻後二年皇太子死後魏書曰靜帝武定年冬大霧六旬晝夜不解明年常侍荀濟華山王大器及元思僅等謀殺大將軍高洋事洩荀濟等並戮於市隋書曰陳後主末年正月朔大會群官大霧四塞人眼鼻卒酸明年降隋陸機別傳曰機被誅日大風折木天地霧合抱朴子曰伊尹受戮大霧三日兵書曰霧四面圍城必有兵到城下不出其月黃霧尚書中候曰桀為無道地吐黃霧漢書曰成帝初即位封舅王鳳王根等五人關內侯其月黃霧四塞終日竟夜著地者如黃土塵奪日光王鳳等大懼又曰王莽天鳳元年六月黃霧四塞其年緣邊大飢人相食晉書曰惠帝時冬黃霧四塞六日乃止明年趙王倫篡位時朝昏兵亂帝屢蒙塵又曰明帝初潁有黃霧四塞時王敦害尚書刀恊僕射周顗又曰穆帝時涼州黃霧下如塵時張重華納譖後年重華死嗣子見殺又曰孝武帝時黃霧四塞時會稽王道子專政親近佞人又曰安帝時黃霧昏濁不雨時桓玄謀逆帝返正頻年大霧時帝室衰微臣下擁兵反土地非君之有晉中興書徵祥說曰太寧元年黃霧四塞王敦之應宋書曰文帝元嘉二十九年十二月黃霧四塞崔鴻十六國春秋曰前涼張茂四年正月黃霧四塞其年茂死也又曰前趙劉聰元年十月聰將趙固與晉車騎將軍王申相拒於延津時黃霧晝夜人不相見固軍大敗又曰後趙石勒建平四年黃霧四塞氛障蔽天十月大疫死赤霧春秋運斗樞曰血濁霧天下小冤血濁霧濁如血後魏書曰世宗正始二年正月夜陰霧四塞初黑後赤又延昌元年黃霧蔽塞時帝舅肇擅權矯詔害諸王公之應黑霧晉書曰愍帝建興二年春霧著人如墨連夜五日時天下兵起後二年帝降劉曜又曰元帝永昌元年十月京師大霧黑氣蔽天日月無光十一月王敦舉兵崔鴻十六國春秋曰前趙劉聰建元元年正月朔日黑霧四塞終日竟夜著人如墨五日而止後三年聰子粲殺其弟虹蜺易通卦驗曰虹不時見女謁亂公虹者陰陽交接之氣陽倡陰和之象今失節不見者似人君心在房內不循外事廢禮失義夫人淫恣而不制故曰女謁亂公京房易妖占曰虹出君池若飲君井其君無後春秋潛潭巴曰虹五色迭至照于宮殿有兵革之事春秋感精符曰九女並譌則九虹並見黃帝占軍氣訣曰攻城有虹欲攻之勝京氏別對災異曰虹蜺近日則姦臣謀貫日客代主其服也釋安樂試非常正股肱入賢良漢書曰虹蜺陰陽之精如淳曰雄曰虹雌曰蜺也又曰兩虹下屬燕王旦井中飲井水竭其後誅續漢書曰靈帝光和元年有黑氣墮北宮溫殿東庭中如車隆起奮迅五色有頭長十餘丈形似龍上問蔡邕對曰所謂天投蜺者也不見足尾不得稱龍中平元年黃巾賊張角等起東觀漢記曰光和中有虹蜺降嘉德殿上引楊腸等入金商門崇德署問以祥異對曰天投蜺天下恐海內亂晉書曰愍帝建興五年正月帝在平陽虹蜺彌天其年帝為劉聰所殺崔鴻十六國春秋曰前趙劉聰麟嘉元年時東西赤虹經天南有一岐隋書曰周武帝建德五年圍北齊後主於晉片是夜州城上有虹首南向尾入紫宮長十餘丈六月晉州陷被擒白虹詩推度災曰撓弱不立邪臣蔽主則白虹刺日為政無常天下疑則蜺逆行周禮春官眂祲曰掌十煇之法以觀妖祥七日彌鄭司農云彌白虹彌天也玄謂彌氣貫日也史記曰鄒陽上書曰荊軻慕燕丹之義白虹貫日太子畏之應邵曰燕太子丹秦始皇遇之旡禮丹亡去故厚養荊軻令刺秦王精誠感天白虹為之貫日烈士傳曰太子丹見虹貫日不徹曰吾事不成矣漢書曰成帝即位時年二十委政諸舅王鳳王愔等兄弟五人為宰相五人同拜封號五侯五侯專權賢者屏退京兆尹王章以直言被誅正月有白虹出于營室後漢書曰唐檀永建五年舉孝廉除郎中是時白虹貫日擅因上便宜三事陳其咎徵書奏乃棄官去吳志曰諸葛恪自新城出住東興有虹見其舡還拜蔣陵白虹繞其車後遂被誅崔鴻十六國春秋曰後趙石季龍建武六年大旱白虹經天建武九年白虹出太社連天至十四年國亂紫蜺太玄經曰紫蜺圍日其疾不割
