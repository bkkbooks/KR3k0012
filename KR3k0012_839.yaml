body:
  text: 百穀部二米後漢書曰帝因西征隗囂至漆漆縣屬右扶風諸將多以王師之重不宜遠入險阻計猶豫未決會召馬援夜至帝大喜引入具以群議質之援因説隗囂將帥有土崩之勢兵進有必破之狀又於帝前聚米為山谷指畫形勢開示衆軍所從道徑往來分析昭然可曉帝曰虜在吾目中矣明旦遂進軍囂衆大潰又曰獻帝時三輔大旱帝避正殿請雨遣使者洗囚徒原輕繫洗謂蕩滌也是時穀一斛五十萬豆麥一斛二十萬人相食啖白骨委積帝使御史侯汶出太倉米豆為飢人作麋粥經日而死者無數帝疑賑恤有虛乃親於御坐前量試作麋乃知非實袁宏漢記曰時勑侍中劉艾取米豆五升於御前作麋得滿三盂於是謂尚書曰米豆五升得麋三盂而人委頓何也使侍中劉艾出讓有司於是尚書令以下皆詣省閣謝奏收侯汶考實詔曰未忍致汶于理可杖五十自是之後多得全濟宋書曰晉平王休祐素無才能強梁自用大明之世年尚少未得自專至是貪淫好財色在荊州裒刻所在多營財貨以短錢一百賦民田登就求白米一斛米粒皆令徹白若有破折者悉郍簡不受民間糴此米一升一百至時又不受米評米責錢凡諸求利皆悉如此又曰徐齊耕晉陵人也元嘉二十一年大旱人飢耕詣縣陳辭以米千斛助官振貸縣為言上當時議以耕比漢卜式詔書褒美酬以縣令大明八年東土飢東海嚴成東苑王道益各以私穀五百餘斛助官振恤梁書曰任昉為新安太守為政清省吏民便之卒於官唯有桃花米二十斛無以為斂遺言不許將新安一物還都南史曰孔覬後為司徒左長史弟道存代覬為後軍長史江夏內史時東土大旱都邑米貴一升將百錢道存慮覬甚乏遣使載五百斛米餉之覬呼使謂之曰我在彼三載去官之日不辦有路糧卿至彼未幾郍能便得此米即可載還彼吏曰自古已來無有載米上水者都下米貴乞於此貨之不聽吏乃載米而去梁書曰庾詵嘗乘舟從𣸭中山舍還載米一百五十石有人寄載四十石及至宅寄載者曰君四十斛我百五十斛詵默然不言恣其取足鄰人有被執為盜見劾妄疑詵矜之乃以書質錢二萬令門生詐為其親代之酬備鄰人獲免謝詵曰矜天下無辜豈其謝也又曰張率嗜酒不事於家務尤忘懷在新安遣家僮載米三千石還吳宅及至耗太多率問其故答曰雀鼠耗率笑而言曰壯哉雀鼠竟不研問南史隱逸傳曰陶潛為彭澤令郡遣督郵至縣吏白應束帶見之潛歎曰我不能為五斗米折腰向鄉里小人即日解印綬去職賦歸去來以遂其志後魏書曰崔浩自饌食經序曰余備位台鉉與參大謀賞獲豐厚牛羊蓋澤貨纍巨萬衣則重錦食必梁肉遠惟平生思季路負米之時可復得乎故序遺文垂示來世北史曰齊文宣帝崩當朝文士各作拘歌十首擇其善者而用之魏收陽休之祖孝徵等不過得一二首唯盧思道獨有八篇故時人稱為八美盧郎唐書曰李峴為京兆尹所在皆著聲績天寶十三載連雨六十餘日宰臣楊國忠惡其不附己以雨災歸咎京兆尹乃為長沙郡太守時京師米麥踴貴百姓謠言曰欲得米粟賤無過追李峴為其政得人心如此又曰張萬福為泗州刺史魏州飢父子相賣餓死者接道萬福曰魏州吾鄉里也安可不救令其兄子將米百車往餧之又使人於汴口求魏人自賣者給車牛贖而遣之又曰陽城嘗約其二弟云吾所得月俸汝可度吾家有幾口月食米當幾何買薪菜鹽米凡用幾錢先具之其餘悉以付酒媼無留也未嘗有所蓄積説苑曰子路曰負重道遠者不擇地而休家貧親老者不擇祿而仕昔者由事二親之時常食藜藿之實而為親負米百里之外親沒之後南遊於楚從車乘積粟萬鍾纍茵而坐列鼎而食願食藜藿為親負米之時不可復得也枯魚御索幾何不蠹二親之壽忽如過隙草木欲長霜露不停賢者欲養二親不待故曰家貧親老不擇祿而仕也呂氏春秋曰孔子窮於陳蔡之間藜羹不糝七日不嘗粒晝寢顏回索米得而來爨之幾熟孔子望見顏回攫其甑中而飯之選間食熟謁孔子而進食孔子起曰今者夢見先君食潔欲饋回曰可向者㶼煤入甑中回以為棄之則不可置之則不潔因攫而食之孔子歎曰人所信者目也而目猶不可信所恃者心也而心猶不足恃弟子記之知人固不易水經曰會稽有射的山遠望狀若射侯故謂射的的之西有石室名之為射堂年登否常占射的以為貴賤之準的明則米賤的暗則米貴故諺云射的白斛米百射的玄斛米千麥毛詩鄘柏舟桑中曰爰採麥矣沫之北矣又載馳曰我行其野芃芃其麥又思文曰思文后稷克配彼天立我蒸民莫匪爾極貽我來牟牟麥也禮記月令曰孟夏之月天子以彘嘗麥孟春行冬令則首種不入蔡雍章句曰首種為宿麥也左傳桓公曰夏四月鄭祭足帥師取溫之麥溫周蘇氏之地又文下曰魯襄仲如鄭拜穀之盟復曰臣聞齊人將食魯之麥又成上曰晉侯夢大厲公召桑田巫巫曰不食新麥矣六月丙午晉侯欲麥使甸人獻麥召桑田巫示而殺之將食張如廁陷而卒春秋佐助期曰麥神名含福姓習春秋説題辭曰麥之為言殖也寢生觸凍而不息精射刺直故麥含芒生且立也尚書大傳曰秋昏虛星中可以種麥孝經援神契曰黑墳宜黍麥周書曰四月孟夏王初祈禱于岱宗乃嘗麥于廟史記曰箕子朝周過故殷墟咸生禾黍箕子傷之欲哭則不可欲泣為其近婦人乃作麥秀之詩以歌詠之其詩曰麥秀漸漸兮禾黍油油漢書曰武帝外事四夷而民去本董仲舒説上曰春秋他穀不書至於麥禾不成則書之以此見聖人於五穀最重宿麥今關中俗不好種麥願陛下幸詔大司農使關中民益種宿麥無令後時東觀漢記曰高鳳字文通南陽苑人誦讀晝夜不絶妻嘗之田暴麥於池以竿授鳳令護鳥雀鳳受竿誦經如故天大雷暴雨流潦鳳留意在經忽不視麥麥隨水漂去又曰第五倫免歸田躬與奴共發株棘田種麥又曰董宣為洛陽令卒官詔遣使視唯見布被覆尸妻子對哭有大麥數斛又曰鄧禹平三輔糧乏王丹上麥二千斛禹高其節義表丹領左馮翊又曰張堪為漁陽太守勸民耕種以致殷富百姓歌曰桑無附枝麥穗兩歧張君為政樂不可支續漢書曰羊續為南陽太守妻與子祕俱往郡舍續閉門不納妻自將祕行其資藏唯布衾弊裯鹽麥數斛又曰桓帝時童謠曰小麥青青大麥枯誰當穫者婦與姑丈夫何在西擊胡後西羌大至抽丁以征之袁山松後漢書曰范丹字史雲外黃人使兒捃麥得五斛鄉人尹臺遺之一斛屬兒莫道丹後知即令并送六斛言麥已雜遂誓不取王隱晉書曰王褒字偉元諸生有密為褒刈麥者褒遂棄之於是莫敢復佐晉書載記曰京兆杜洪竊據長安自稱晉征北將軍雍州刺史戎夏多歸之符健密圖關中懼洪知之乃偽愛石祗宮室於枋頭課所部種麥示無西意有知而不耕種者健殺之以徇晉起居注曰咸康三年河北謠曰麥入土殺石虎又曰太康十年嘉麥生扶風郿一莖四穟收實三倍崔鴻十六國春秋前涼録曰張駿九年雨五稼穀于於武威燉煌種之皆生因名天麥又前秦録曰初符健聞桓溫之來伐也芟麥以待之故溫掠無所得軍人大飢又曰新羅王遣使貢其方物在百濟東去長安九千八百里其人食麥又前涼録曰永嘉元年嘉麥一莖九穗生姑臧三國典略曰李嶽字祖仁官至中散大夫嘗為門客所説舉錢營生廣收大麥載赴晉陽候其寒食以求高價清明之日其車方達又從晉陽載化生向鄴城路逢大雨並化為泥息利既少乃至貧迫當世人士莫不笑之陳書曰侯景亂時吳明徹有粟麥三千餘斛而鄰里飢餒乃白諸兄曰今人不圖久奈何不與鄉里共此於是計口平分同其豐儉群盜聞而避焉賴以存者甚衆後周書曰大象末有強練師以無底囊歷長安市告乞市以米麥遺之隨即漏地人或問其故強練曰但令諸人見盛空耳及隋初遷都龍首山長安遂空矣隋書曰張文詡隱居嘗有人夜中竊刈其麥者見而避之盜因感悟棄麥而謝慰諭之自誓不言固令持去經數年盜者向鄉人論之始為遠近所悉鄰家築牆心有不直文詡因毀舊堵以應之唐書曰開元十三年河南府壽安縣人劉懷家有大麥六畝先熟與衆麥殊色其中有兩歧三歧四歧六歧者又曰元和九年六月三日宰臣武元衡為盜所害先是長安謠曰打麥麥打三三三既而旋其袖曰舞了也解者謂打麥者打麥時也麥打者蓋謂暗中突擊也三三三謂六月三日也舞了者謂元衡之卒也又曰西女國每十月令巫者齎肴詣山中散糟麥於空犬呪呼鳥俄而鳥如雞飛入巫者之懷因割腹而視之每有一穀來歲必登若有霜雪必有災異其俗信之名為鳥卜又曰吐谷渾地氣大寒不生粳稻有青稞還瓦切麥䝁音勞豆小麥喬麥莊子曰大儒以詩禮發冢小儒曰口中有珠詩曰青青之麥生於陵坂生不布施死何含珠為淮南子曰濟水通和而宜麥又曰三春之月天子衣青衣乘青龍食麥與羊秦子曰孔文舉為北海相有人母病差思食新麥家無乃盜鄰熟麥而進之文舉聞特償之家語曰宓子賤為單父宰百姓化之齊人攻魯道由單父老謂曰麥已熟矣今齊寇至不及人人自收其麥請放民皆使出穫傅郭之麥可以益糧且不資寇三請而宓子不聽俄而寇逮于麥季孫聞之怒使人讓之密蹙然曰今茲無麥明年可樹若使不耕者得穫是民樂有寇也且單父一歲之麥於魯不加強喪之不加弱使民有自取之心其瘡必數世不悉季孫聞之敝然愧曰地若可入吾豈忍見宓子哉賈誼書同廣雅曰大麥牟也小麥䅘也呂氏春秋曰得時之麥長秱而頸墨二七以為行西服薄穗而赤色稱之重食之致香以息使人肥且有力范子計然曰東方多麥南方多稷西方多麻北方多菽中央多禾五土之所宜也説文曰麥芒穀秋種厚薶故謂之麥麥金也金王而生火王而死從來有穗者從父思惟切牟周所受來牟也一麥二縫象其芒刺之形天所來也麧音紇堅麥也䵀音瑣小麥屑覆也䴾磨麥也䵂麥覆屑也十三斤為三斗從麥商聲麷煮麥也麮麥白煮也稍麥莖也廣志曰虜小麥其實大牟似大麥形有二縫𥟶麥似大麥出涼州旋麥三月種八月熟出西方赤麥赤而肥出鄭縣有半夏小麥有秀芒大麥有黑穬麥吳氏本草曰大麥一名穬麥五穀之盛無毒治消渴除熱益氣食蜜為使麥種一名小麥無毒治利而不中汜勝之書曰凡田六道種麥為首子欲富黃金覆謂曳柴壅麥根也夏至後七十日寒地可種宿麥又曰麥早種而蟲有節晚種穗小而少漬麥種以酢漿無蟲冬雪止掩其雪忽從風飛去則麥耐旱崔實四民月令曰六月初伏薦麥瓜於祖禰陳留耆舊傳曰高順字孝父敦厚少華子式至孝蝝蝗為災不食式麥英雄記曰呂布令韓暹楊奉取劉備地麥以為軍資曹瞞傳曰太祖曾行麥中令士卒無敗麥犯者死騎士皆下馬持麥以相付太祖馬騰入麥中太祖曰孤為軍帥不可殺請自刑因援劍割髮以置地諸葛恪別傳曰孫權嘗饗蜀使費禕禕停食餅索筆作麥賦恪亦請筆作磨賦咸稱善西域諸國志曰天竺以十一月六日為冬至則麥秀十二月十六日為臘則麥熟博物志曰啖麥令人多力又曰近世有田夫至巧削木為麥入市糴之糴者無疑歸磨乃覺非麥搜神記曰麥之為蛺蝶由干濕也爾則萬物之變皆有也農夫止麥之化者區之以灰聖人理萬物之化者濟之以道孔融教高密令曰高密侯圖箋言鄭國增門之崇令容高車結駟之路出麥五斛以酬執事者之勞
