body:
  text: 方術部五醫四唐書曰孫思邈京兆華原人也七歲就學日誦千餘言弱冠善談莊老及百家之說周宣帝時思邈以王室多故乃隱居太白山隋文帝輔政徵為國子博士稱疾不起嘗謂所親曰過五十年當有聖人出吾方助之以濟人及太宗即位召詣京師嗟其容色甚少謂曰故知有道者誠可尊重羨門廣成豈虛言哉將授以爵位固辭不受顯慶四年高宗召見拜諫議大夫又固辭不受上元元年辭疾請歸特賜良馬及鄱陽公主邑司以居焉當時知名之士宋令文孟詵廬照鄰等執師資之禮以事焉照鄰有惡疾醫所不能愈乃問思邈名醫愈疾其道何如思邈曰吾聞善言天者必質之於人善言人者亦本之於天天有四時五行寒暑迭代其轉運也和而為雨怒而為風凝而為雪霜張而為虹蜺此天地之常數也人有四肢五藏一覺一寢呼吸吐納精氣往來流而為榮衛彰而為氣色發而為音聲此人之常數也陽用其形陰用其精天人之所同也及其失也蒸則生熱否則生寒結而為瘤贅陷而為癰疽奔而為喘乏竭而為燋枯診發乎面變動乎形推此以及天地亦如之故五緯盈縮星辰錯行日月薄蝕孛彗飛流此天地之危診也寒暑不時天地之蒸否也石立上踊天地之瘤贅也山崩土陷天地之癰疽也奔風暴雨天地之喘乏也川瀆竭涸天地之燋枯也良醫導之以藥石救之以鍼音針齊才齊切聖人和之以至德輔之以人事故形體有可愈之疾天地有可消之災又曰膽欲大而心欲小智欲圓而仁欲方詩曰如臨深淵如履薄冰謂小心也赳赳武夫公俟干城謂大膽也不為利回不為義疚仁之方也見幾而作不俟終日智之圓也思邈自云開皇幸酉歲生至今年九十三矣詢之鄉里咸云數百歲人話周齊閒事歷歷如眼見以此參之不啻百歲人矣然猶視聽不衰神彩甚茂可謂古之聰明博達不死者也撰千金方三十卷行於代又曰張文仲洛州洛陽人也少與鄉人李虔縱京兆人韋慈藏並以醫術知名文仲則天初為侍御醫時特進蘇良嗣於殿庭因拜跪絕倒則天令文仲慈藏隨至宅候之文仲曰此因憂憤邪氣激也若痛衝脅則劇難救自朝候之未及食時苦衝脅絞痛文仲曰若入心不可療俄頃心痛不復下藥日旰而卒文仲尢善療風疾其後則天令文仲集當時名醫共撰療風氣諸方仍令麟臺監王方慶監其修撰文仲奏曰風有一百二十種氣有八十種大體醫藥雖同人性各異庸醫不達藥之行使冬夏失節因此殺人唯腳氣頭風上氣常須服藥不絕自餘則隨其發動臨時消息之伹有風氣之人春末夏初及秋暮要得通洩即不困劇於是撰四時常服及輕重大小諸方十八首表上之文仲久視年終於尚藥奉御撰隨身備急方三卷行於代又曰孟詵汝州梁人也以進士擢第垂拱初累遷鳳閣舍人詵學方術嘗於鳳閣侍郎劉禕音暉之家見其勑賜金盤謂禕之曰此藥金也若燒之上有五色試之果然則天聞之不悅因事出為台州司馬撰補養方必効方各三卷又曰王方慶太原人也雅有材度博學多聞篤好經方精於藥性則天令監領尚藥奉御張文仲侍醫李虔縱光祿韋慈藏等撰諸藥方方慶撰隨身左右百發百中備急方十卷大行於代又曰天寶中詔曰朕頃者所撰廣濟方救人疾患頒行已久傳習亦多猶慮單貧之家未能繕寫閭閻之內或有不知儻醫療失時因致夭撗性命之際寧忘惻隱宜命郡縣長官就廣濟方中逐要者於大板上仵錄當村方要路牓示仍委採訪使勾當無令脫錯又曰德宗撰貞元集要廣利方親為之制序敢題於天下通衢其方惣六千三種五百八十六首莊子曰秦王有病召醫舐痔者得車五乘也韓子曰醫善吮人腸含人血非有肌骨之親也利之所加也列子曰龍叔謂文摯曰子之術微矣吾有疾子能已乎文摯即命龍叔背明而立文摯從向明望之既而曰嘻吾見子之心矣方寸之地虛矣幾聖人也子心六孔流通一孔不達舊說聖人心七孔今以聖智為疾者或由此乎矣又曰楊朱之友季梁得疾七日大漸其子請三醫一曰矯氏二曰俞氏三曰廬氏脈其所疾矯氏謂季梁曰汝寒溫不節虛實失度疾由飢飽色欲精虛非人非鬼雖漸可攻也季梁曰眾醫也亟屏之俞氏曰汝始則胎氣不足乳湩多貢切有餘病非一朝一夕之故其所由來者漸矣弗可已也季梁曰良醫也且食之盧氏曰汝病不由天亦不由人亦不由鬼稟生受形既有制之者亦有知之者矣藥石其如汝何季梁曰神醫也重貺遣之俄而季梁病自瘳又曰魯公扈趙齊嬰二人有疾同請扁鵲求治扁鵲治之同愈謂曰汝曩之所疾自外而干腑藏固藥石之所已今有偕生之病與體偕長為汝攻之何如二人曰願先聞其驗扁鵲謂公扈曰汝志強而氣弱故足於謀而寡於斷齊嬰志弱而氣強故少於慮而傷於專若換汝之心則均於善矣遂飲二人毒酒迷死三日剖胸探心易而置之投以神藥既寤如初尸子曰有醫竘音驅主反者秦之良醫也為宣王割痤音在戈反為惠王療痔皆愈張子之背腫命竘治之謂醫竘曰背非吾背也任子制焉治之遂愈竘誠善治疾也張子委制焉夫身與國亦猶此必有所委制然後治孔藂子日宰我使齊反見夫子曰梁丘據遇虺毒三旬而後瘳朝齊君齊君會大夫眾賓而慶焉弟子與在賓列大夫眾賓並復獻攻療之方弟子謂之曰夫所獻方者將為病也今梁丘子已瘳矣而諸夫子復驟獻方意欲梁丘大夫後有虺害當用之乎眾座默然無辭弟子此言何如孔子曰女說非也夫三折股而後為醫梁丘子遇虺害而獲瘳慮有與之同疾者必問所以已之方焉眾人為此之故各言其方欲售之以己人疾也凡言其方者稱其良也且以參處所以己之方之優劣也公孫尼子曰孔子有疾哀公使醫視之醫曰居處飲食何如子曰丘春之居葛籠夏居密陽秋不風冬不煬飲食不饋飲洒不勸醫曰是良藥也鶡冠子曰扁鵲兄弟三人並善醫魏文侯問曰子昆弟三人孰最善對曰長兄視色故名不出家仲兄視亳毛故名不出門鵲鍼人血脈投人毒藥故名聞諸侯呂氏春秋曰齊王疾使人之宋迎文摯文摯至視王疾謂太子曰非怒則王疾不可治怒王則文摯死太子曰苟已王疾臣與母以死爭之願先生勿患也文摯曰諾與太子期而將往不當者三齊王固已怒文摯至不解履登床履王衣問疾王怒不與言摯因出固辭以重怒王王吐而起疾乃遂已王不悅果以鼎生烹摯太子與母合爭之不得夫忠於平世易忠於濁世難也又曰魯有公孫綽者告人曰我能治偏枯今吾倍為偏枯之藥則可以起死人矣又曰用藥者得良藥則活人得惡藥則殺人楚辭九章曰九折臂而成醫兮吾今而知其信然神仙傳曰李少君與議郎董仲舒相親見仲舒宿有固疾體枯氣少少君乃與其成藥二劑并方用戊己之草后土胎黃良獸沉肪先義之根百卉華釀亥月上旬合煎銅鼎中童男沐浴潔淨調其湯火合藥成服如雞子三劑齒落更生服盡五劑命不復傾又曰鳳綱者漁陽人也常採百藥華以水漬封泥之自正月始盡五月末埋之百日煎丸之卒死者以此藥內口中皆立生綱服此藥得數百歲不老又曰士爕為交州剌史得毒病死經三日董奉時在南方乃往以三丸藥內死人口中以寒水含之令人舉死人頭搖逍之食頃士燮開目動手足半日能起坐遂活活後四日能語云死時奄然有數十馬卒收之將載輅車上去入大赤門住以付獄獄中人各一戶戶纔容一人以燮內一戶中以土從外封之不復見外恍惚聞人言太一遣使者來召士爕急開出之聞人以鏵堀其居戶良久引之見外有馬赤蓋三人共坐車上一人持節呼爕上車將還至門而活奉還盧山了不田作為人治病亦不取錢重病愈者令種杏五株輕者種一株數年之閒杏樹成林縣令親故有女病醫療不差令謂奉曰若能治之便以妻君奉使勑召鬼魅有大白鼉長數尺陸行詣病者門奉使人斬之女病即愈遂以妻子又曰封居達年百餘歲往來鄉里視之年三十許人常騎青牛行聞有疾病死者識與不識遇便以藥治之應手皆愈不以姓字語人能騎乘青牛故號青牛道士列仙傳曰負局先生者吳郡人莫知姓名負石磨鏡局循吳中磨鏡輒問人得無有疾苦乎有即出紫丸赤丸與之服服藥病無不差如此數年後吳有大疫先生家至戶到與藥活數萬許人後上吳山絕崖懸藥與人欲去時語人曰吾欲還蓬萊山為汝曹下神水崖頭一日有水色白從石閒流下服之疾愈玉匱針經序曰呂博少以醫術知名善診脈論疾多所著述吳赤烏二年為太醫令撰玉匱針經及注八十一難經大行於代千金序曰沙門支法存嶺表人性敦方藥自永嘉南渡士大夫不襲水土多患腳弱唯法存能拯濟之又曰仰道人嶺表僧也雖以聰惠入道長以醫術開懷因晉朝南移衣纓士族不襲水土皆患軟腳之疾染者無不斃踣而此僧獨能療之天下知名焉又曰僧深齊宋閒道人善療腳弱氣之疾撰錄法在存等諸家醫方三十餘卷經用多効時人號曰深師方焉龔慶鬼遺方序曰劉涓子不知何許人也晉末於丹陽郊外照射忽見一物高二丈許因射而中之走如電激聲若風雨夜不敢追明旦率門人弟子鄰伍數十人尋其縱跡至山見一小兒問之何姓小兒云主人昨夜為涓子所射今欲取水以洗瘡因問小兒主人是誰荅曰是黃父鬼乃將小兒還來至聞擣藥聲遙見三人一人臥一人開書一人擣藥比及齊叫突而前三人並走遺一帙癰疽方并一臼藥人有云癰者塗之隨手而愈
