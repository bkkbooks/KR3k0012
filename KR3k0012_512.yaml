body:
  text: 宗親部一祖父母釋曰祖祚也祚先也禮記曲禮曰逮事父母則諱王父母不逮事父母則不諱王父母毛詩商頌曰無念爾祖聿修厥德漢書曰路溫舒字長君從祖父受曆數天文也後漢書曰虞詡陳國人祖父為郡縣獄吏務在寬恕常稱曰東海于公高其里門定國卒至丞相吾治獄六十年雖不及于公子孫何得不為九卿故字詡曰升卿後遷僕射尚書令晉書曰何曾侍武帝宴退告其子道曰國家應天受命創業垂統吾每侍宴未嘗聞經國遠圖唯説平生常事非貽厥孫謀之兆也後嗣其殆乎此吾子孫之憂汝等猶可沒指孫曰此輩必遇亂亡及遵之子綏死兄嵩哭之曰吾祖其殆聖乎又曰李密字令伯父早亡母改醮祖母劉撫養密奉事以孝謹聞有暇則講學亡疲師事譙周門人方之遊夏太始初徵為太子洗馬密以祖母老上表云臣無祖母難以至於今日祖母無以終餘年母孫二人更相為命臣密今年四十四祖母年九十六是臣盡節於陛下之日長而恭事於劉之日短劉終後復為太子洗馬又曰王爽字季明強正有志歷侍中嘗與會稽王道子飲道子醉呼爽為小子爽曰亡祖長史與簡文帝為布衣之交亡姑亡姊伉儷二宮何小子之有又曰符生字長生健第二子幼而無賴祖洪甚惡之生而無一目為童兒洪戲之曰吾聞瞎兒一淚信乎生怒引佩刀自剌出血曰此亦一淚洪大驚鞭之生曰性耐刀槊不堪杖箠洪曰吾將以爾為奴生曰可不如石勒也洪懼跣而掩其口陳留志曰范喬字伯山年二歲祖父馨臨終執其手曰恨不見汝成人因以所用硯與之至五歲祖母以告喬喬便執硯流涕江蕤別傳曰蕤年十一始樗蒲祖母費為説往事有博奕破業廢身於是棄五木終身不以為戲父母爾雅曰父為考母為妣毛詩陟岵曰孝子行役思念父母也陟彼岵兮瞻望父兮陟彼屺兮瞻望母兮又蓼莪曰蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞蓼蓼者莪匪莪伊蔚哀哀父母生我勞瘁無父何怙無母何恃出則銜恤入則靡至父兮生我母兮鞠我撫我畜我長我育我顧我復我出入腹我欲報之德昊天罔極禮記曲禮曰生曰父曰母死曰妣曰考左傳隱公曰鄭莊公母弟共叔段以母之寵請邑居之涼段遂以京叛公伐京段出奔遂置母薑氏於城潁而誓之曰不及黃泉無相見也既而悔之頴考叔曰若闕地及泉隧而相見其誰曰不然公從之遂為母子如初又莊公曰宋南宮長萬作亂奔陳以乘車輦其母一日而至又成上曰晉敗秦師于鞍齊請平晉人曰必以蕭同叔子為質對曰蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也吾子布大命於諸侯而曰必質其母以為信其若王命何且是以不孝令也又襄三曰晉叔向之母妒叔虎之母美而不使視寢其子皆諫其母母曰深山大澤實生龍蛇彼美余懼其生龍蛇以禍汝汝斃族也余何愛焉使往視寢生叔虎美而有勇欒盈嬖之故羊舌氏之族及於難公羊傳曰惠公者何隱之考也仲子者何桓之母也史記曰趙括奢之子趙孝成王欲以括為將母曰不可使也王曰母何以知之對曰妾事其父時其父為將王之所賞賜盡分散與軍吏士大夫受命之日不問家事令括一朝為將軍吏不敢仰視王之所賜悉藏於家而視利便田宅父子異心願王勿遣王曰母致之吾已決矣母曰王必遣忽有不稱妾乞不坐王許之後果敗為白起所坑漢書曰王陵沛人以兵屬漢王項羽得陵母置於軍中以招陵後漢使至陵母謂使者曰為老妾語陵漢王長者必有天下善事之無以老妾在故懷持二心遂伏劍而死羽怒烹之又曰陸賈使南越趙他賜陸生橐中裝直千金他送亦千金呂后時病免歸家有五男乃出所使得越橐中裝賣千金分與其子各二百金令為生産賈常乘安車駟馬從歌舞鼓吹琴瑟侍者十人有寶劍直百金謂其子曰與汝約過汝給吾人馬酒食極歡十日而更所死家得寶劍及車騎從者又曰金日磾字翁叔休屠王太子也父以降漢見殺與母閼氏弟俱沒入宮後拜光祿大夫既親近未嘗有過武帝甚信愛之日磾母教誨兩子甚有法度上嘉之及死詔圖形于甘泉宮曰休屠王閼氏也日磾每見畫常拜泣不止又曰霍去病父仲孺河東人以縣吏給事平陽侯家與侯侍者衛少兒私通生去病仲孺吏畢歸家娶婦生子不相聞久之去病為驃騎將軍擊胸奴道出河東至平陽傳舍遣迎仲孺趍入拜謁將軍迎拜因跪曰去病不早知為大人之遣體也仲孺扶服叩頭曰老臣得訖命將軍此天力也去病大買田宅奴婢而去又曰嚴延平字次卿東海下邳人為河南太守冬日行屬縣刑戮囚徒流血數里河號屠伯母見責之曰汝宣化千里不聞仁愛而殺人立威名豈為人父母哉天道神明人不可獨殺我不意老見壯子被刑戮也行矣去東歸掃墓地耳歲餘果敗延年兄弟五人皆有吏才並至大官東海號為萬石嚴嫗又曰雋不疑為京兆尹每行縣録囚徒還其母輒問有所平反活幾人即不疑多有平反母喜而為之食或無所出母怒而不食故不疑為吏嚴而不殘後漢書曰竇武字遊平扶風人初武母産武并産一蛇送之林中後母卒葬有一大蛇自榛草出至擊柩流血若哀泣之容時人以為竇氏之祥又曰楊彪為太尉子修為曹操所殺操見彪問曰君何瘦之甚也彪曰愧無日磾先見之明猶懷老牛舐犢之愛操為改容又曰范滂字孟博汝南征羌人也建寧二年大誅黨人滂母就與之訣滂白母曰仲博孝敬足以供養仲博滂弟也滂從龍舒君歸之黃泉存亡各得其所惟大人割不可忍之恩勿增感戚母曰汝今得與李杜齊名死何恨滂跪受教再拜而辭顧謂其子曰吾欲使汝為惡則惡不可為使汝為善則我不為惡行路聞之莫不流涕又曰黃憲字叔度汝南人世貧賤父為牛醫袁閬母謂閬曰汝從牛醫兒來耶對曰閬不見叔度自以為及既覩其人則瞻之在前忽然在後固難測矣又曰廬江蔡宗字孟承兢廉嚴正其子未嘗見面子為二千石求謁宗宗下帷不許子伏於庭其母穿壁使其子窺之乃識儀貌又曰崔發仕王莽位至大司空母師氏通百家之言莽以殊禮之號義成夫人金印紫綬乘文軒丹轂又曰張甫字孟侯汝南人為太尉雖在公位父常居田里每有遷職輒一詣京師公卿罷朝俱詣甫府奉酒上壽時人榮之吳志曰蔣欽母踈帳縹被妻妾布裙孫權歎其在位能守約儉勑御府為母作被乃幃帳晉書曰劉惔字真長沛人少清遠有奇才與母任氏寓居京口家貧織芒屩以為養雖蓽門圭竇晏如也又曰伏滔字玄度平昌人甚有才學知名拜著作郎孝武會西堂滔預坐還下車先呼子系曰百人高會天子先問伏滔在座不此固未易得為人作父如此如何又曰汜育字稚春濟北盧人奕世儒素敦睦九族時人號之兒無常父衣無常主又曰荀羡字令則清和有準才年七歲遇蘇峻難隨父在石頭峻甚愛之惜置羡於膝上羡乃陰白其母曰得一利刀子足以殺賊母掩其口又曰虞談母孫氏訓子以節義朝廷嘉之拜武昌太守丞相已下皆拜之年九十五談立養堂於家又曰郤詵濟陰人對策高第拜議郎母憂去職母在日苦病車及亡不欲車載家貧無以市馬乃於住堂北壁外假葬朝夕拜哭養雞種蒜竭其方術喪過三年得馬八匹輿棺至冢負土成墳又曰韓康伯潁川長社人母殷氏高明有行家恆貧伯年數歲大塞母為作布襦令伯捉尉斗而謂之曰且著布襦尋復作袴伯曰不須母問故曰火在斗中柄熱今上著襦下亦當暖矣又曰羊耽妻辛氏隴西人侍中毗之女有才鑒鍾會為鎮西請其子琇為參軍母曰吾為國憂今日難至吾家行矣戒之軍旅之間可以濟者惟仁恕乎古之君子入則致孝於親出則盡忠於國在職思其所司在義思其所立無貽父母憂患而己後會至蜀果反琇竟以道全身又曰桑虞字子深魏郡黎陽人五代義居閨門雍睦青州刺史符朗甚重之嘗詣虞家升堂拜時以為榮又曰周顗母李氏名洛秀汝南人中興時顗等並列顯位嘗冬至置酒洛秀舉酒賜三子曰吾本渡江託足無所不謂爾等並居貴位在吾目前吾身後何憂嵩起曰恐不如尊旨伯仁志大而才短名重而識暗好因人之斃此非自全之道嵩性抗直亦不容於世唯阿奴碌碌在阿母前耳後果如其言阿奴即謨小字也又曰劉琨為并州刺史母謂之曰汝能弘濟經略驅駕豪傑專欲除於勝己以自安當何以濟禍必及我也後父母並為劉聰所害又曰朱序字次倫義陽人鎮襄陽符堅令符丕圍序序母韓氏自登城履行謂西北角必先破受斃遂領百餘婢及城中女同丁築三十餘丈後賊果從西北角攻衆潰城破遂固新築丕用引退得免城破襄陽人謂此城為夫人城宋書曰張興世字文德竟陵人以平江陵功轉右將軍父仲字子由興世致位給事中欲往襄陽又愛戀鄉里不肯去嘗謂興世曰雖田舍翁樂聞鼓角汝可送一部與吾行田時吹之興世素儉謹畏玄白父曰此乃天子鼓角非田舍翁所吹乃止興世欲拜墓仲子曰汝衛從甚多恐先人驚怖興世減撤而行又曰朱修之義陽人加建武將軍留戍滑臺為索虜所攻母悲憂一旦乳汁驚出因號慟告家人曰我老非有乳汁之時今忽如此我兒必歿矣後數日凶問至修之果其日陷歿梁書曰王僧孺幼貧其母鬻紗布以自業常攜孺於市道途中逢中丞鹵簿驅迫落溝中及孺拜中丞日引孺清道悲不自勝劉璠梁典曰張充字延符吳人父緒特進有重名充少不拘細行肆意畋放時緒請假還吳始入西郭值充正獵左手臂鷹右手牽犬遙望見父乃脫韝放膺紲犬向舟而拜緒曰一身兩役無亦勞乎充跪對曰充聞三十而立今二十九歲矣請至來歲終身折節緒曰若過而能改乃顏子矣及明年乃一朝易操尋師就學博覽今古鬱為名士蕭方等三十國春秋曰蘇峻作逆領軍卞壺以王師敗績遂單騎赴難二子眕盱隨之俱歿母裴氏撫尸而哭之父為忠臣子為孝子夫何恨乎徵士翟陽聞之歎曰父死于前子歿于後忠孝之道萃于一門可謂賢矣又曰吳司徒孟宗少從南陽李肅學母為作厚褥大被或問其故曰小兒無德可容而學者多貧故為廣被可得氣類相接也列女傳曰鄒氏孟軻之母見孟子少而學歸母方織問之曰子之廢學若吾斷織孟子懼因更勤不息遂為大儒世説曰華歆遇子弟甚整雖暗室之內儼然若朝典也又曰陳元方遭父憂哭泣哀慟容體骨立其母愍之竊以錦被蒙之郭林宗吊而見之謂曰卿海內之俊四方是則如何當喪以錦被焉孔子曰衣夫錦食夫稻於汝安乎吾不取也因奮衣而去自後賓客絶數百日繼母儀禮子夏傳曰繼母如母何以如母繼母之配父與因母同故孝子不敢殊也東觀漢記曰應慎字仲華為東平相事後母至孝精誠感應梓樹生廳前屋上徙置府庭繁茂長大後漢書曰鮑永字君長上黨人事後母至孝妻于母前叱狗永遂去之晉書曰涼武昭王李玄盛后尹氏初適扶風馬元元卒為玄繼室以再醮之故三年不言撫前妻子如己所生又曰王祥字休徵琅琊人至孝繼母朱氏不慈由是失愛於父令掃除牛下祥愈恭謹父母有疾衣不解帶母令守丹奈實每風雨則抱而泣母常思黃雀炙忽有黃雀數十飛入幕遂以供母三十國春秋曰王延九歲喪母孝行有聞後母卜氏御之無道延恭事彌謹卜常取蒲穰敗麻與之貯衣延知而不言卜冬月杖之流血令求生魚延扣冰慟哭而得與之卜乃心悟撫之如所生也又曰晉安帝時郭逸妻以大竹杖打逸前妻之子子死妻因棄市如常刑家語曰曾參武城人志存孝道後母遇之無恩其妻藜蒸不熟出之人曰此非七出也答曰藜蒸小物不用吾命況大事遂遣之終身不娶其子請焉告之曰高宗以後婦出孝己尹吉甫以後妻嫉伯奇容知其得免非乎琴操曰尹吉甫周卿也子伯奇母早亡吉甫更娶後妻妻乃譖之於吉甫曰伯奇見妾美欲有邪心吉甫曰伯奇慈仁豈有此也妻曰置妾空房中君登樓察之妻乃取毒蜂綴衣領令伯奇掇之於是吉甫大怒放伯奇於野宣王出遊吉甫從之伯奇作歌以感之宣王聞之曰此放子之辭也吉甫乃求伯奇而感悟遂射殺其妻搜神記曰衡農字剽卿東平人少孤事繼母至孝常宿于他舍值雷兩頻夢虎嚙其足農呼妻相與出於庭叩頭屋忽然而壞壓死者三十餘人唯農夫妻獲免
