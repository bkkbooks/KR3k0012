body:
  text: 人事部一百三十二慚愧尚書仲虺之誥曰成湯放桀於南巢惟有慚德又五子之歌曰萬姓仇予予將疇依鬱陶乎予心顏厚有忸怩鬱陶言哀思也顏厚色愧忸怩心慚也慚愧於仁人賢士也左傳曰吳公子札請觀周樂見舞韶濩者殷湯樂也曰聖人之引也而猶有慚色聖人之難也家語曰孔子適衛顏刻衛靈公夫人南子同車出而令宦者雍渠驂乘使孔子次車遊過市孔子恥之顏刻曰夫子何恥子曰詩云覯爾新婚以慰我心乃嘆曰吾未見好德如好色者也漢書曰項羽至烏江亭長艤舡待羽應劭曰艤止也孟康曰艤音蟻附舡著岸如淳曰南方謂整舡向岸曰艤謂羽曰江東雖小地方千里眾數十萬亦足王也願大王急渡今獨臣有舩漢軍至亡以渡羽歎曰乃天亡我何渡為且籍與江東子弟八千人渡而西今亡一人還縱江東父兄憐而王我我何面目見之哉縱彼不言籍獨不愧於心乎又曰文帝嘗病癰鄧通為上嗽吮之上不樂從容問曰天下誰㝡愛我者乎通曰莫若太子太子入問疾上使太子齰癰而難之已而聞通嘗為上齰之太子慚由是心恨通又曰直不疑南陽人也為郎事文帝其同舍有告歸誤持其同舍郎金去已而同舍郎覺亡金意不疑不疑曰有之買金償後告歸者至而歸金亡金郎大慚又曰朱買臣字翁子會稽人家貧好讀書不治產業常刈薪樵負戴相隨婦數止買臣無歌謳道中買臣逾益疾歌妻羞之求去又曰建始三年秋京師民無故相驚言大水至百姓奔走相蹂躪韋昭曰眾踐躪轢也老弱號呼長安中大亂天子親御前殿召公卿議大將軍鳳以為太后與上及後宮可御舟船令吏民上長安城以避水群臣皆從鳳議左將軍王商獨曰自古無道之國水猶不冒城郭今政治平世無兵革上下相安何因當有大水一日暴至此必訛言也不宜令上城重驚百姓上乃止有頃長安中稍定問之果訛言上於是美壯商之固守數稱其議而鳳大慚自恨失言東觀漢記曰王郎起上在薊郎移購上令王霸至市中募人將以擊郎市人皆大笑舉手耶榆之霸慚而去又曰汝南薛苞字孟嘗喪母以至孝聞父娶後妻而憎苞分出日夜號泣不能去至被歐杖不得已廬於舍外旦入而洒掃父怒又逐之乃廬於里門晨昏不廢積歲餘父母慚而還之又曰王丹字仲固京兆人也時河南太守同郡陳遵關西之大俠也其友人喪親遵為護喪事賻助甚厚丹乃懷縑一疋陳之於主人前曰如丹此縑出自機杼遵聞而有慚色又曰樊重外孫何氏兄弟爭財重恥之以田二頃解其忿訟縣中稱美推為三老年八十餘臨終其素所假貸人間數百萬遺令焚削文契債家聞者皆慚爭往償之諸子從勑竟不肯受又曰魏霸字延年仕為光祿大夫霸妻死長兄伯為霸取妻送至官舍霸笑曰年老兒子備具矣何空養他家老為即自入辭其妻奉案前因跪曰夫人視老夫復何中而遂失計義不敢屈即拜而出妻慚求去又曰卓茂為丞相史嘗出道中人有認茂馬者茂問亡馬幾時乎曰月餘矣茂自知畜馬數年解馬與之挽車而去後日馬主自得其馬慚愧詣府叩頭謝歸焉又曰淳于恭字孟孫北海人以謙儉雅讓為節家有山田橡樹有盜取之恭助為收拾載之歸乃知其所盜載橡還之恭不受人有盜刈恭禾者恭見之念其愧自伏草中至去乃起謝承後漢書曰梁冀奏誅李固固臨命與胡廣趙戒書曰梁氏迷謬公等曲從以吉為凶成事為敗漢家衰微從此始矣公等受主厚祿傾覆大事後之良史豈有所私固身已矣於義得矣夫復何言廣戒得書悲慚皆長歎袁山松後漢書曰皇甫嵩字義安定朝郍人善用兵飲食舍止必先將士然後乃安兵曹有受賂者嵩曰公素廉清必資用乏乃出錢賜之吏羞慚而自殺由是眾皆樂為致死魏志曰曹仁討關羽於樊于禁助仁秋大霖雨漢水溢禁等七軍沒禁遂降吳文帝踐祚權遣禁還引見禁髮皓白形容憔悴欲遣使吳先令謁高陵帝豫於陵圖畫禁降服之狀禁見慚恚發病薨又曰陳矯為尚書令明帝即位車駕常卒至尚書省門矯跪問曰陛下欲何之帝曰欲案行文書耳矯曰此自臣職分非陛下所宜臨也若臣不稱其職則請就黜退陛下宜還帝慚廻車而返晉書曰朱沖字巨容南安人也少有志行閑靜寡欲好學而貧常以耕蓻為事鄰人失犢乃認沖犢以歸後得犢於冰下大慚以犢還沖又曰王羲之傳時劉琰之為丹陽尹許詢嘗就琰之宿床帷新麗飲食豐甘詢曰若此保全殊勝東山劉曰卿若知吉凶由人吾安得保此羲之在坐曰令巢許遇稷契當必無此言二人並有愧色又曰嵇紹嘗詣齊王冏咨事遇冏燕會召董艾葛旟等共論時政艾言於冏曰嵇侍中善於絲竹公可令操之左右進琴紹推不受冏曰今日為歡卿何希此耶紹對曰公匡復社稷當軌物作則垂之於後紹虛鄙忝備常伯腰紱冠冕鳴玉殿省豈有操執絲竹以為伶人之事若釋公服從私宴所不敢辭也冏大慚又曰庾亮傳初亮所乘馬有的顱殷浩以為不利於主勸亮賣之亮曰曷有己之不安而移之於人浩慚而退又曰王羲之傳素與王述不協先是王羲之常謂賓友曰懷祖正當作尚書恥投老可得僕射更求會稽便自邈然及述蒙顯授羲之恥為其下遣使詣朝廷求分會稽為越州行人失辭大為時賢所笑既而內懷愧歎謂其諸子曰吾不減懷祖而位遇懸邈當由汝等不及坦之晉中興書曰王恭嘗宴於司馬道子室尚書謝石為吳歌恭曰居端右之重集宰相之座而放妖俗之音乎並有慚色又曰熒惑守南斗經旬王導謂陶回曰南斗揚州分而熒惑守之吾當遜位以厭此謫回荅曰公以明德作相輔弼聖主宜親忠貞遠邪佞而與桓景造膝熒惑何由退舍導深愧之宋書曰王惠陳郡謝瞻才辯有風氣嘗與兄弟群從造惠談論鋒起文史間發惠時相酬應言清理遠瞻等慚而退又曰謝誨為荊州都督甚有自矜之色將之鎮詣從叔光祿大夫瞻別問晦年荅曰三十五瞻笑曰昔荀中郎年二十七為北府都督卿比之已為老矣晦有慚色又曰何尚之在家常著鹿皮帽及拜開府天子臨軒百僚陪位沈慶之於殿廷戲之曰今何不著鹿皮冠慶之累辭爵命朝廷敦勸甚切尚之謂曰主上虛懷側席詎宜固辭慶之曰沈公不效何公去而復還也尚之有愧色又曰顧凱之為尚書吏部郎嘗於慶祖坐論江左人言顧榮袁淑謂凱之曰卿南人性怯懦豈作賊凱之正色曰卿反以忠義笑人淑有慚色唐書婁師德初狄仁傑未為宰相時師德嘗薦之及為宰相不知師德薦己數排師德令充外使則天嘗出師德書表示之仁傑大慚謂人曰吾為婁公所含如此方知不逮婁公遠矣晏子春秋曰景公置酒太山之陽酒酣公四面望喟然嘆泣數行曰寡人將去此堂堂國死耶左右泣者三人曰吾細人也猶將難死而況公乎晏子搏髀仰天而大笑曰樂哉今日之飲也公怒曰子何笑也對曰怯君一諛臣三是以大笑公慚而更辭吳越春秋曰季札去徐而歸行於道逢男子五月被裘採薪於道傍有委金一器季札見之忽不入意顧為薪者曰來取此金薪者曰君舉止何高視何下也五月被裘採薪寧是拾金者乎札慚於斯言下車禮之曰何子衣之鄙而言之雅也子姓為何薪者曰君皮相之士何足以告姓字乎季札有慚色又曰吳師入郢闔閭既妻昭王夫人又及於伯嬴伯嬴秦康公之女平王之夫人昭王之母也伯嬴操刃曰妾聞天子天下之表也公侯一國之儀也天子失制則天下亂諸侯失節則國危今夫婦之道固人倫之始王教之端也今吳去儀表之行從亂亡之欲犯誅絕之事何以行訓民乎妾聞生以辱者不如死以榮者使吳王棄儀表則無以生存一舉而兩儀辱妾以死守之不敢命也且凡欲近妾者為樂也近妾而死何樂之有先殺妾又何益於君王於是吳王慚恥遂退還舍博物志曰宋國有田夫謂其妻曰負日之暄人莫知者以獻吾君將有重賞里之富室告之曰昔人有美戎菽甘枲莖芹子者對鄉豪稱之鄉豪取而嘗之哲於口懆於腹眾哂而怨之其人大慚而止列女傳曰河南羊子妻不知何氏女羊子嘗行路得遺金一餅還以與妻妻曰妾聞志士不飲盜泉之水廉者不受嗟來之食況拾遺求利以汙其行乎羊子大慚鄭玄傳曰玄在袁紹坐汝南應邵因自贊曰故太山太守應仲遠北面稱弟子何如玄笑曰仲尼之門考以四科回賜之徒不稱官閥邵有慚色江表傳曰孫權既即尊位請會百官歸功周瑜張昭舉笏欲襃讚功德未及言權曰如公計今已乞食矣昭大慚伏地流汗會稽典錄曰邵員字德方餘姚人與同縣虞俊鄰居員先不知俊十餘年俊至吳與張溫朱據等會清談干雲溫等敬服於是吳中盛為俊談員聞而愧曰吾與仲明遊居此屋曾不能甄其英秀播其風烈而令他邦稱我之傑又曰鄭弘守陽羨郡鄉民有弟用兄錢者為嫂所責未還之嫂詣弘弘為叔還錢兄聞之慚愧自繫於獄遂遣其婦齎錢還弘弘不受也又曰沈勳身自耕耘以供衣食人有盜獲其禾勳見而避之明日更收拾送致其盜者愧懼齎還不受又曰陳囂與民紀伯為鄰伯夜竊蕃囂地自益囂見之伺伯去後密拔其蕃一丈以益伯伯覺之慚懼既還所侵又卻一丈桓子新論曰昔宣帝時公卿大夫朝會庭中丞相語次言聞梟生子子長食其母乃能飛寧然耶有德賢者應曰但聞烏子反哺耳丞相太尉自悔其言之非也群士皆少丞相而多彼賢人之言有益於德化是故君子掩惡揚善鳥獸尚為之諱而況於人乎風俗通曰陳國有張伯階弟仲婦炊於竈下至井上謂伯階我今日粧寧好不曰我伯階婦大慚愧其夕時伯階到更衣婦復逐牽其背曰今且大誤謂伯階為卿荅曰故伯階語林曰明帝函封與王公開詔末云勿使治城公知既視表荅曰伏讀明詔似不在臣臣開臣閉無有見者明帝甚愧數月不欲見王公孔叢子曰陳勝既立為王其妻之父兄往焉勝以眾賓待之長揖不拜無加禮其妻之父怒曰怙亂僣號而慠長者不能久矣不辭而去陳王跪送不顧王心慚焉吳王春秋曰管仲病桓公問惡乎屬國管仲曰使隰朋可盡逐易牙豎刁等管仲死盡逐之而食不甘官不治朝不肅三年公皆召而返之公病常之巫從中出曰公將以某日薨易牙豎刁相與作亂塞宮門築高牆不通人有婦人踰垣入而至公所公曰我欲食婦人曰吾無所得曰何對曰帝之巫相與作亂塞宮門築高墻不通人故無所得公慨然出涕曰嗟乎聖人所見豈不遠哉死者有知我將何面目見仲父乎蒙衣袂而絕乎壽宮
