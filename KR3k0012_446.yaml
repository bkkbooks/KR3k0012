body:
  text: 人事部八十六品藻上論語子曰管仲之器小哉又子貢問曰賜也何如子曰汝器也言女器用之人也曰何器也曰瑚璉也瑚璉黍稷之器夏曰瑚商曰璉周曰簋簋宗廟之貴器又曰由也千乘之國可使治其賦也求也千乘之邑百乘之家可使為之宰赤也束帶立於朝可使與賓客言也又曰子謂子産有君子之道四焉其行己也恭其事上也敬其養民也惠其使民也義又曰子張問令尹子文三仕為令尹無喜色三已之無慍色舊令尹之政必以告新令尹何如子曰忠矣曰仁矣乎曰未知焉得仁崔子弒齊君陳文子有馬十乘棄而違之至於他邦則曰猶吾大夫崔子也違之何如子曰清矣曰仁矣乎曰未知焉得仁又曰子曰雍也可使南面仲弓問子桑伯子子曰可也簡仲弓曰居敬而行簡以臨其民不亦可乎居簡而行簡無乃太簡乎又曰季康子問仲由可使從政也與子曰由也果於從政乎何有曰賜也可使從政也與曰賜也達於從政乎何有曰求也可使從政也與曰求也藝於從政乎何有家語曰子貢曰陳靈公君臣宣淫於朝泄冶諫而殺之是與比干同也可謂仁乎子曰比干於紂親則叔父官則少師忠疑之心在於宗廟而已固必死爭之冀身死之後紂悔寤其本志情在乎仁者也泄冶位下大夫無骨肉之親懷寵不去以區區之一身欲正一國之淫昏死而無益可謂懷矣詩曰民之多僻無自立辟其泄冶之謂也又曰孔子北遊農山顏回侍曰願得明王聖主而輔相之敷其五教道之以禮樂使城郭不修溝渠不越鑄劍戟為農器放牛馬於原藪室家無怨曠之思千歲無鬭戰之患子曰美德也不傷財不害人不繁辭則顏氏之子有矣又曰顏回問於孔子曰臧文仲武仲孰賢孔子曰武仲賢哉回曰武仲世稱聖人而身不免於罪是智不足稱好言兵計而挫鋭於邾是勇不足名也夫文仲其身雖沒而言不朽惡有未賢孔子曰身沒言立所以為文猶有不仁者三不智者三是則不及武仲也回曰可得聞乎孔子曰下展禽置六關六閞閞名置之以稅行者妾織席三不仁也設虛器縱道祀祀海鳥三不智也武仲在齊齊將有禍不受更其國以避其難是智難之也又曰淡臺子羽有君子之容而行不勝其貌宰我有文雅之辭而智不充其辨孔子曰以容取人則失之子羽以言取人則失之宰豫又曰子夏三年之喪畢見於孔子孔子與之琴使之弦侃侃而樂子曰君子也閔子三年喪畢見孔子孔子與之琴使之絃切切而悲子曰君子也子貢曰閔子哀未盡矣子曰君子也子夏哀已盡矣子曰君子也二者殊情而俱君子賜也惑之敢問孔子曰閔子哀未盡能遊之以禮子夏哀已盡能引之及禮均之君子不亦可哉又曰孔子曰不遷怒不深怨不録舊罪冉雍之行也不畏強禦不侮鰥寡才任治戎仲由之行也文勝其質好學博藝省物而動是冉求之行也齊莊而能肅志通而好禮篤雅而有節是公西華之行也滿而不盈實而不虛其德敢言於人無所不信是曾參之行也送迎必敬上交下接是卜商之行也先成其慮及事而行故動則非妄是言偃之行也三復白圭之玷是南容之行也執親之喪未嘗見齒是高柴之行也不念舊惡蓋伯夷叔齊之行也畏天而敬人蓋趙文子之行也臨其難不愛其死謀其身不遺其友君若用則進蓋隨武子之行也國家有道其言之足以治無道其默之足以生蓋伯華之行也外寬而內亡直已而不直人以善自終蓋蘧伯玉之行也孝恭慈仁允德圖義終貧去怨輕財不道蓋柳下惠之行也君有道從命無道衡命蓋平仲之行也漢書曰高帝置酒洛陽南宮上曰吾所以有天下者何項氏之所以失天下者何王陵對曰陛下嫚而侮人項羽仁而敬人然陛下使人攻城略地所降下者因以與之天下同利也項羽疾能妒賢有功者害之賢者疑之戰勝而不與人功得地而不與人利此所以失天下也上曰公知其一不知其二夫運籌於帷幄之中決勝於千里之外吾不如張子房鎮國家撫百姓吾不如蕭何連百萬之衆戰必勝攻必取吾不如韓信三者人傑也吾能用之此吾能以取天下也項羽有一范增而不能用此其所以為我擒也群臣皆悅服又曰公孫傳贊云儒雅則公孫弘董仲舒倪寬篤行則石建石慶質直則汲黯卜式推賢則韓安國鄭當時律令則趙禹張湯文章則司馬遷相如滑稽則東方朔枚皋應對則嚴助朱買臣歷數則唐都洛下閎協律則李延年運籌則桑弘羊奉使則張騫蘇武將師則衛青霍去病受遺則霍光金日磾其餘不可勝記是以興造功業制度遺文後世莫及孝宣承統纂循洪業招選茂異而蕭望之梁丘賀夏侯勝韋玄成嚴彭祖尹始以儒術進劉向王褒以文章顯將相則張安世趙充國魏相邴吉于定國杜延年治民則黃霸王成龔遂鄭弘邵信臣韓延壽尹翁歸趙廣漢嚴延年張敞之屬皆有功迹見述於世參其名臣亦莫次也謝承後漢書曰桓帝徵徐稚等不至因問陳蕃曰徐稚袁閎韋著誰為先後蕃對曰閎生公族聞道漸訓長於三輔仁義之俗所謂不扶自直不鏤自雕至於稚者爰自江南卑薄之城而角立傑出宜當為先袁山松後漢書曰王允字子師太原人世仕州郡郭林宗嘗見允而奇之曰王生一日千里王佐才也遂與友善允至司徒范曄後漢書曰許劭嘗到潁川多長者之遊唯不詣陳蕃蕃喪妻還葬鄉人畢至而劭獨不往或問其故劭曰太丘道廣廣則難周仲舉性峻峻則少通故不造其多所裁量若此曹操微時常卑辭厚禮求為己助劭鄙其為人而不肯對操乃伺隙脅劭不得已曰君清平之姦賊亂世之英雄操大悅而劭與從兄靖俱有高名好共核論鄉黨人物每月更其品題故汝南俗有月旦評焉魏志曰盧欽著書稱徐邈曰徐公志高行潔才綽氣猛聖人以清為難而徐公之所易也或問欽徐公當武帝之時為通自在涼州及還京都人以為介何也欽答曰往者毛孝先崔季圭用事貴清素之士徐公不改其常故人以為通比來天下奢靡轉相放效而徐公雅尚自若不與俗同故前日之通乃今日之介也又曰司馬文王與陳泰親友武陔亦與泰善文王問陔曰玄伯何如其父陔曰通雅博暢能以天下聲教為己任者不如也明統簡至立事過之又曰文帝問賈翊曰吾欲伐不從命以一天下吳蜀何先對曰攻取者先立權建本者尚德化但用兵之道先勝後戰量敵論將故舉無遺焉臣宿料群臣無備權之對也雖以天威臨之未見萬全之勢今宜先文後武文帝不納後興江陵之役士卒多死典略曰禰衡自荊州北遊許都書一卷懷之漫滅無所適或問之曰何不從陳長文司馬仲達乎衡曰卿欲我從屠酤兒輩耶又問曰當今復誰可衡曰大兒孔文舉小兒楊德祖又問荀令君趙蕩寇皆蓋世乎衡見荀有儀容趙有腹尺因答曰文若可借面弔喪稚長可監廚請客其意以為荀但有貌趙但啖肉也又曰趙戩遭三輔亂客於荊州劉表以為賓榮是時禰衡來遊京師詆訿朝士及南見戩歎之曰劍則于將莫耶本則椅桐梓漆人則顏冉仲弓也建安中丞相南取荊州執戩手曰何相見之晚魏氏春秋曰高貴鄉公即位神明爽俊德音宣朗罷朝景王私曰上何如主也鍾會對曰才同陳思武類太祖景王曰若如卿言社稷之福也又曰高貴鄉公為宴群臣於泰極東堂與侍中荀顗崔贊袁亮鍾育虞松等講述因帝問顗等曰有夏既衰后相殄滅少康收集夏衆復禹之績高祖拔起壠畝驅帥豪俊芟夷秦項苞舉宇內斯二主可謂殊才異略命世大賢者也考其功德誰宜為先顗等對曰造之與因難易不同少康功德雖美至如高祖臣等以為優帝曰未必創業者皆優紹繼者咸劣少康中宗中興之美論德核實諸漢祖吾見其優未聞其劣少康生於滅亡之後降為諸侯能布其德而兆其謀卒滅過戈復禹之績非至德豈能濟斯漢祖因土崩之勢專任智力為人子則數危其親為人君則囚擊賢相為人父則不能衛其子身沒之後社稷幾傾若與少康易時而處或未能復大禹之績推此言之宜高夏康而下漢祖矣帝又曰夫太上立德其次立功漢祖功高未若少康武烈之威豈必降於漢祖哉但夏書淪亡舊文殘缺故勳美闕而罔載向令墳典俱存行事詳備亦豈有異同之論哉於是群臣咸悅服也又曰胡綜論吳朝俊士英才卓越超踰倫匹則諸葛恪清識知機達究幽微則顧談淑辨宏達言能釋結則謝景究學甄微遊夏同科則范慎羊道恪才而踈談精而俱景辨而校後恪談果以強吳人論綜言而有徵蜀志曰大鴻臚張征作默記諸葛亮與司馬宣王書曰漢朝傾覆天下分崩豪傑之士竟希神器魏氏跨中土劉氏據益州並稱兵海內為世霸王諸葛司馬二相遭值際會託身盟主或收功於蜀漢或聞名於伊洛丕備既沒後嗣即統各受保阿之任輔翼幼主亦一國之守臣霸王之賢佐也歷前世以觀近事二相優劣可得而詳也孔明起巴蜀之地蹈一州之士方之大國其戰士人民蓋有九分之一也提步卒數萬長驅祁山慨然有飲馬河雒之志仲達據天下十倍之地仗兼并之衆據牢城擁精鋭無擒敵之意務自保而已使彼孔明若此而不亡則涼雍不解甲中國不解鞍勝負之策亦決矣方之司馬不亦優乎吳志曰孫權與陸遜論周瑜魯肅及呂蒙曰公瑾雄烈膽略兼人遂破孟德開拓荊州邈焉難繼君今繼之子敬東來孤與宴語便及大略帝王之策一決也後孟德率數十萬衆水步俱下孤請諸將問其所宜子布文表俱言而遣迎之子敬即駮言不可勸孤呼公瑾付兵衆逆而擊之此二決也勸吾借玄德地是其一短不足以損二長也孤忘其短而不遺其長子明少果敢有膽而長大學問籌略可以次公瑾但言議不及耳又曰周昭著書稱步騭及嚴畯等曰古今賢士大夫所以失名喪身者其由非一也大歸四者而已急論議一也爭名勢二也重朋黨三也務欲速四也急論議則傷人爭名勢則敗友重朋黨則蔽主務欲速則失德此四者不除未有能全者也當世君子能不然者亦比有之豈獨古人乎然論其絶異未若顧豫章諸葛使君步丞相嚴衛尉張奮威之為美也論語言夫子恂恂然善誘人又曰成人之美不成人之惡豫章有之矣望之儼然即之也溫聽其言也厲使君體之矣恭而不猛丞相嚴履之矣學不求祿心無茍得衛尉奮威蹈之矣此吾君雖德實有差輕重不同至於趨舍大檢不犯四者俱一揆也昔丁謂出於孤家吳粲由於牧豎豫章楊其美以並隆全之列是以人無幽滯而風俗厚焉使君丞相衛尉三君昔以布衣俱相友善論者因名敘其優劣初先衛尉次丞相而後使君也其後並事明主經營世務出處之才儀有不同先後之名須反其初比世常人所決勤也至於三君分好卒無虧損豈非古哉又魯橫江昔仗萬兵屯據陸口當世之美業也能與不能孰不願焉而橫江既亡衛尉應其選自以才非將帥深辭固讓終於不就後徙九列遷典八座榮不足以自奉至於二君皆位為上將窮富極貴衛尉既無求欲二君又不稱薦各守所志保其名好孔子曰君子矜而不爭群而不黨斯有風矣又奮威之名亦三君之次也當一方之戍受上將之任與使君丞相不異也然歷國事論功勞實有先後故爵位之榮殊焉而奮威將處此決能明其部分心無失道之欲事無充詘之求每升朝堂循禮而動辭氣蹇蹇罔不惟忠叔嗣雖親貴言憂其敗蔡文雖疏賤談稱其賢女配太子受禮若弔慷慨之趨唯篤人物成敗得失皆如所慮可謂守道見機好古之士也若乃經國家當軍旅於馳騖之際立霸王之功此五君者未為過人至其純粹履道求不茍得升降當世保全名行邈然絶俗實有所師故粗論其事以示後之君子又曰薛瑩王蕃器量綽異弘博多通樓玄清白節操文理條暢賀邵厲行貞潔機理清要韋曜篤學好古博見群籍有記述之才胡沖以為玄邵蕃一時清妙略無優劣必不得已玄宜在先邵當次之華核詩賦之才有過於曜典誥不及也王隱晉書曰河南郭象著文稱嵇紹父死在非罪曾無耿介貪位死暗主義不足多曾以問郤公曰王褒之父亦非罪死褒猶辭徵紹不辭用誰為多少郤公曰王勝於嵇或曰魏晉所殺子皆仕官何以無非也答曰殛鯀興禹禹不辭興者以鯀犯罪也若以時君所殺為當耶則同於禹以不當耶則同於嵇又曰世皆以嵇見危授命答曰紀信代漢高之死可謂見危授命如嵇偏善其一可也以備體論之則未得也又曰顧榮謂中宗曰陸士元貞正清貴金相玉質甘季思忠款誠盡加以膽幹殊快殷慶元質略有明規文武可用榮族兄公讓明亮守節困不易操會楊彥明謝行言皆服膺儒教足為民望賀生沉潛青雲之士陶恭兄弟才力雖少實事極佳凡此諸人皆南金也中宗納之又曰衛玠妻父樂廣有海內重名議者以為婦公冰清女壻玉潤又曰裴憲字景思陳郡謝鯤潁川庾鼓皆俊朗士也見而奇之相謂曰裴憲鯁亮宏達通機識命不知其何如父然至於深弘保素不以世物嬰心者其殆過之又曰裴楷嘗目夏侯玄云肅肅如入宗廟中但見禮樂器鍾會如觀武庫森森迫見矛戟在前傅嘏汪翔靡所不見山濤若登山臨下幽然深遠又曰杜預在內七年損益萬機不可勝數朝野稱美號曰杜武庫言其無所不有也又杜預傳云時王濟解相馬又甚愛之而和嶠頗聚斂預常稱濟有馬癖嶠有錢癖武帝聞之謂預曰卿有何癖對曰臣有左傳癖又曰裴楷風神高邁容儀俊爽博涉群書特精理義時人謂之玉人又曰見裴叔則如近玉山映照于人也又裴楷傳云吏部郎缺文帝問其人於鍾會會曰裴楷清通王戎簡要皆其選也又曰阮裕除東陽太守尋徵侍中不就還剡山有肥遁之志有以問王羲之羲之曰此公近不驚寵辱雖古之沉冥何以過此時人云裕骨氣不如逸少簡秀不如真長韶潤不如仲祖思致不如殷浩而兼有諸人之美又曰謝安義在輔導雖會稽王道子亦賴弼諧之益時強敵寇境邊書續至梁益不守樊鄧陷沒安每鎮以和靖御以長算德政既行文武用命不存小察弘以大綱威懷外著人皆比之王導而文雅過之
