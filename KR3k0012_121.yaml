body:
  text: 偏霸部四後趙石勒崔鴻十六國春秋後趙録曰石勒字世龍上黨武鄉羯人父周易朱勒生時赤光滿室白氣自天屬于庭中長而壯健有膽力雄武好騎射幼而力耕每聞鞞鐸之聲或在前後懼以告父母曰勞耳鳴無不祥也會并州刺史司馬騰執諸胡山東賣充軍實將詣冀州兩胡一枷勒亦在中東至平原賣茌平人師權為奴每夜於野嘗聞鼓角之聲諸奴亦聞歸以白歡歡奇而免之鄰於馬牧率汲桑往來勒以能馬自託於桑而傭武安臨水為遊軍所囚會有群鹿傍過軍人競逐之勒乃獲免俄而見一老父謂勒曰群鹿者我也君應為中州主故相救耳勒拜而受命遂招集王陽夔安等十八騎復東如赤龍騎諸苑中乘苑馬遠掠繒寶以賂汲桑永興元年關東所在兵起二年陽平人公師蕃等自稱將軍起兵趙魏衆至數萬勒與汲桑率牧人乘苑馬數百騎以赴之桑始命勒以石為姓以勒為名永嘉元年勒歸劉淵淵拜為輔漢將軍平晉王淵薨聰襲位劉曜王彌圍洛陽勒帥精騎三萬會之王彌既平洛陽將先誅勒請彌宴于已營手斬并其衆將軍郭默獲沙門笁浮圖澄以其有道術進之於勒試澄有效甚尊重之前趙嘉平二年張賓説勒曰邯鄲襄國趙之舊都依山憑險形勢之國可擇此二邑而都之然後命將四出授以奇略王業可圖勒於是進據襄國聰授勒都督幽冀并營四州諸軍事冀州牧進封本郡上黨公邑萬戶三年以征虜將軍為魏郡太守鎮業三臺基謀之萌逃於此矣前趙麟嘉元年劉琨遣姬淡帥衆來討勒與戰淡軍大敗琨長史李弘以并州來降七月劉聰疾甚以勒為大將軍録尚書事受遺輔政勒固辭乃止劉曜稱尊號將授勒太宰大將軍加九錫增封十郡并前二十郡出入警蹕如曹公輔故事曜聞曹平樂之言停太宰之授勒大怒曰趙王趙帝孤自取之名號大小豈爾所呼耶征虜虎與左右長史張敬張賓等上疏曰大司馬雖位冠九台非霸者之號請改稱大將軍大單于領冀州牧趙王依魏王在鄴故事以二十四郡戶十九萬為趙國十一月勒即位改光初二年為趙王元年建社稷宗廟主書司典胡人出內重其禁法不聽侮易衣冠華族號胡為國人二年令曰國人不聽執嫂在喪婚娶至於燒葬令如本俗八月繕軒懸儛八佾作金根大輅黃屋左纛天子禮樂於斯備矣三年黎陽民陳武妻産三男一女上書自陳令曰昔周之興也四乳八子今武妻乳四子可謂慶過姬祥美加曩日其賜乳婢一人穀百石雜繒四十匹庶以肅迎嘉祥冬十月勒與鄉親齒坐語及平生勒曰李陽壯士也孤方任之何以不來父老歸語令速來漚麻麻之忿是布衣之恨孤方崇信于天下寧讎匹夫乎令曰武鄉吾之豐沛也其復之三世十一月李陽至引入歡酣宣楊臂笑視之曰卿雖老臂中猶有力頗復與人鬥不孤住曰厭卿老拳卿亦飽孤毒手賜甲第一拜為都尉陽與勒鄰居歲常爭漚麻池迭相驅擊四年二月拜子弘為世子勒雅好文學雖在軍旅之中常令儒生讀春秋史漢諸傳而聽之聞酈食其勸立六國後大驚曰此法當失何以得成天下至留侯諫乃曰賴有此侯耳其天資英達如此八年八月修三臺十月以世子衛將軍弘鎮鄴太和十年劉曜圍洛陽襄國大震勒統步騎四萬趙金墉濟河先是流澌風猛軍至冰泮清和濟畢流澌大至以為神靈之助命曰靈昌津戰于西陽門曜軍大潰石堪執曜送之二年曜子熙等去長安奔于上邽車騎虎剋上封遣主簿趙封奉傳國玉璽送之秦隴悉平建元元年二月車騎虎等上尊號勒不許固請勒以趙天王行皇帝事大赦八月群臣又固請以名位不正宜即尊號九月僣即皇帝位大赦改年正月勒南郊有白氣自壇屬天勒大悅四月勒如鄴議營新宮廷尉續咸諫曰臣聞唐虞之治採掾茅茨土階三尺美彰于詩書漢文惜百金不營露臺稱之於千古逮夏商之瓊臺瑤室楚秦章華阿房資財內竭華夷外叛詔曰且勑停作申吾直臣之氣九月以太尉中山王虎為大司馬程遐開府儀同是月大雨霖中山西北暴水流巨木萬餘根集于堂陽勒大悅謂公卿曰此非為災天意欲吾營鄴都耳於是營之勒以成周漢晉舊京欲有移都之意乃命洛陽為南都置行臺治書侍御史于洛陽三年正月大饗于建德殿酒酣勒謂徐光曰朕方自古開基何等主也光對曰陛下神武籌略邁于高皇雄藝卓犖超絶魏祖自三王已來無可比也其軒轅之亞乎勒笑曰人豈不自知卿言亦已太過朕若逢高皇當北面而事之然猶與韓彭競鞭而爭先耳脫遇光武者當並驅于中原未知鹿死誰手丈夫行事當礧礧落落如日月皎然終不能如曹孟德司馬仲達父子欺他孤兒寡婦狐媚以取天下朕在二劉之間軒轅豈所擬乎群臣皆稱萬歲四年雍州刺史石生上言西鄉竹死蛇鼠鬥于安定府間二日蛇死臨涇馬生角長安城中雞鳴音皆曰基茲安定廳事前夜聞誦書聲求之不得七日乃止隕石于肥鄉六月勒寢疾召中山王虎太子弘中常侍嚴震等侍疾禁中七月薨于西閣偽諡明皇帝廟號高祖晉書曰勒年十四隨邑人行敗洛陽倚嘯上東門王衍見而異之顧謂左右曰向胡雛吾觀其聲視有奇志恐將為天下之患馳遣收之會勒已去石弘崔鴻十六國春秋後趙録曰石弘字大雅第三子母程夫人右光祿遐之妹建平元年立為太子虛襟受士好為文詠其所親昵莫非儒素勒謂徐光曰大雅愔愔殊不似將家子光曰漢祖以馬上取天下孝文以玄默治之聖人之後必世勝殘天之道也勒大悅程遐言於勒曰中山怏怏不可以輔少主宜早除之以便大計勒不從勒薨虎執政臨軒召子冀州刺史遂帥兵入禁宿衛文武無不奔散弘大懼策拜中山王虎丞相以十三邵封為魏王又加九錫虎偽讓後乃授之延熙元年七月改頓丘為衛國分魏郡立黎陽十月弘齎璽綬親詣魏宮喻禪意虎曰弘昏昧愚暗處喪無禮不可以君臨萬國奉承宗廟便當廢之云何禪讓也十一月廢弘為海陽王弘就車容色自若幽弘及太后南陽王恢于崇訓宮煞之時年二十二石虎崔鴻十六國春秋後趙録曰石虎字季龍勒之從子勒父朱幼而子之故或謂之為勒弟晉永興中與勒相之嘉平元年劉琨送勒母王及虎于葛陂時年十七殘忍好馳獵喧遊無紀度尤善彈人軍中毒患之勒白王曰此兒凶暴無使軍人煞之聲名可惜宜自除也王曰快牛犢子小時多能破車為復小忍勿怯之至十八檢攝恭謹嚴重愛士弓馬迅健勇冠當時勒深嘉焉拜征虜將軍性酷虐無道軍中勇幹策略與己侔者輒因事害之至於降城陷壘坑斬士女鮮有遺類勒屢加責誨而行意自若然御衆嚴而不頗莫敢犯者指授攻討所向無前故勒寵信彌隆杖以專征之任既廢殺弘稱居攝趙大王建武元年正月大赦改年虎志荒內遊外耽營繕使太子邃省可尚書奏事選守牧祀郊廟征伐刑斷乃親覽之三月南遊臨江而還江東大震是日鶴省臺成賜匠有羌九月遷都鄴宮二年徙洛陽鍾簴九龍等于鄴是歲大武殿東西宮皆就大武殿基二丈八尺穿為伏室置衛士五百人於其中東西七十五步南北六十五步皆漆瓦金璫銀楹珠簾玉壁窮極伎巧起靈臺之殿于顯陽後採召百官州郡民女以充之後庭服綺穀珍奇者萬餘人內置宮女十八等教宮人星占及馬步射置女太史靈臺仰觀災祥以考外太史虛實禁郡國不得私知學星讖左校令成公假造庭燎于崇杠之末高十餘丈上置繚下盤置人絙繳上下虎試而悅之三年太保安夔等文武五百九十人上皇帝尊號勸進方入而庭燎油灌下盤死者七人虎大怒腰斬成公假于閶闔門即天王位南郊大赦親王貶為郡公蕃王為縣侯太子邃總百揆其後荒酒淫色驕恣無道或盤于遊畋懸管而入或夜百騎宿于宮臣家淫其妻妾裝飾宮人美淑者斬首洗血置盤上傳首視之又內諸比丘尼有姿色者與其交褻後煞之合牛羊肉煮而食亦賜左右所以識其味也虎荒耽內遊威怒違度邃以事可呈之怒曰此小事何足呈也時有所不聞復怒曰何以不呈誚責杖捶月至再三邃甚慍私謂中庶子李顏等曰官家難稱吾欲行冒頓之事卿從我乎顏等伏不敢對事發幽邃于東宮殺之及妃張氏男女二十六人盡賜死合一棺埋之誅其宮臣友黨二百餘人立河間公宣為太子建武六年追尊號考樂平孝公為太宗孝皇帝八年六月上黨孟門上有神人之像坐坐于山上三日而去虎遣使以太牢祀之九年十二月武鄉送雄虎變為雌乳一狼子七日噬虎腦而殺之後三日狼子亦死佛圖澄聞之流涕十年虎起河橋於靈昌津採石為中濟石無大小輒隨流用功五百餘萬不成虎如靈昌津沉壁告誠壁浮于渚上水波騰上津所殿觀莫不傾壞壓死者百餘人虎恚甚斬工匠而還十一年發雍梁十六萬人城長安未央宮又發司豫荊兗二十六萬人城洛陽宮十三年二月虎親耕籍田于桑梓苑十四年三月虎夢龍飛西南自天落地旦而問澄公公曰禍將至矣陛下宜父慈子和深以慎之四月秦公韜起宣光殿于太尉府梁長九丈太子宣視而惡之斬匠截梁而去韜怒增之十丈宣聞之恚甚謂楊柸牟成等曰韜凶豎勃逆敢違我如是汝等能殺之者吾入宮盡以韜之國邑分封汝等韜既死主上必親臨喪因行大事無不濟矣柸等許諾八月煞韜宣奏之虎哀絶久之乃蘇召太子宣鎖繫於鄴北火焚殺之議立太子于東堂虎曰吾欲以純灰三斗洗吾腹穢惡故生凶子兒年二十便欲煞父今世方十歲比其二十吾已老矣齊公世為皇世子立昭儀劉氏為皇后十一月饗群臣于大武前殿佛圖澄殿上褰衣而行吟曰棘子成林將壞人衣虎發石而視之有棘子生焉冉閔小字棘奴也十二月辛巳雷大雨霖虎問佛圖澄澄曰其為我乎至戊子而澄卒大寧元年正月虎僣即皇帝位于南郊大赦改年二月有沙門從雍州來稱見佛圖澄西入關虎掘之無尸唯有一石虎惡之曰石者朕也葬我而去吾將死矣因而寢疾四月薨于金華殿晉書曰季龍始咸康元年僣位至此太和六年凡在位十五歲子世即位尊劉后為太后彭城王遵先鎮關右至是勒兵而還戎卒九萬次于湯陰石閔為前鋒都督太后令授遵丞相加九錫增封十郡己丑至安陽亭庚申曜兵入自鳳陽門升太武前殿盡哀退如東閣群臣敦勸即位大赦封世為譙王邑萬戶廢太后劉氏為昭儀尋皆殺之世立凡三十三日尊其母鄭氏為皇太后立妃張氏為皇后大司馬義陽王鑒為太傅沛王沖為太保石閔為都督中外諸軍事録尚書事甲午太武殿災諸門觀閣蕩然服御燒者太半光炎照天月餘乃滅乙未雨血周遍鄴城六月葬虎顯原陵偽諡武皇帝廟號太祖十一月石閔劫司空李農右衛王基等謀共廢遵閔使將軍蘇彥周成帥甲士三一人執于南臺如意觀遵時方與婦人彈碁問成等曰反者誰也成曰義陽王鑒當立遵曰我尚如是汝等立鑒復幾時遂殺之于琨華殿并誅鄭太后張皇后遵字太祗虎第九子凡在位百八十三日鑒即位大赦以石閔為將軍封武德王李農為大司馬鑒使中書令李松殿中將軍張才等夜誅閔農于琨華殿不克禁中擾亂鑒偽不知夜斬松才於西中華門龍驤將軍孫伏都劉誅等結羯士三千人伏于胡天亦欲誅閔等鑒在中臺伏都帥三十人將升臺挾鑒以攻之鑒見問其故伏都曰閔農等反己在都掖門臣嚴帥衛士謹先啓知鑒曰卿好陳力勿憂無報也伏都等攻閔農不克閔農攻斬伏都等自鳳陽門至琨華撗尸相枕諸胡羯無少長斬之死者二十餘萬人于時高鼻多鬚至有濫死者青龍初元年正月石閔欲滅二石之號議曰孔子曰死姓而王七月者七十有二國繼趙李上讖書炳然且德星鎮衛宜改號大衛易姓李氏又大赦改元閏月廢鑒煞之誅虎孫三十八人盡殪石氏鑒在位一百三日鑒字太朗虎第三子也晉書曰季龍十三子五人為冉閔所殺八人自殘害讖言滅石者陵尋而徙封蘭陵公字龍惡之改蘭陵為武興郡至是終為閔所滅石勒以成帝咸和三年僣立二主四子凡二十三年以穆帝永和五年滅石閔崔鴻十六國春秋後趙録曰石閔字永曾虎之養孫也父瞻字弘武本姓冉名良魏郡內黃人也其先漢黎陽騎督纍世牙門勒破陳午於河內獲贍時年十二長而勇悍便弓馬臨陳不顧勒奇之曰此兒壯健可嘉命虎子之歷位左積射將軍封西華侯閔幼而果鋭虎撫之如孫及身長八尺善謀勇力絶人虎即位為修武侯歷北中郎將虎之敗昌黎閔軍獨全由此功名大顯永興元年閏月司徒申鍾司空郎闓等四十八人上尊號於閔僣皇帝位于南郊大赦改元號稱大魏復姓冉氏追尊祖隆元皇帝考贍烈祖皇帝母王氏為皇太后妻董氏為皇后子智為皇太子以司馬李農為太宰諸子皆為縣公新興王祗聞石鑒之死稱尊號于襄國改年永寧石祗遣相國汝陰王石琨帥衆十萬伐鄴六月進據邯鄲閔盡衆拒之琨軍大敗二年三月閔改襄國百餘日祗懼乃去皇帝之號改稱趙王遣太尉張舉乞師于慕容雋中軍張春請救于姚弋仲三月祗相國汝陰王琨自冀州救祗弋仲遣子襄帥騎三萬八千俊遣將軍悅綰帥甲士三萬徑卒十三萬四方攻之祗衛其後閔師大敗閔與十餘騎奔還鄴祗使劉顯師衆七萬追奔伐鄴閔盡衆出戰大敗之追奔至于陽平顯懼密使請降求煞石祗為效四月劉顯煞祗及其丞相樂安王炳太保張舉等遣拜顯上大將軍大單于冀州牧祗炳皆虎之庶子也七月劉顯稱尊號襄國三年二月劉顯帥衆伐常山守蘇彥告難閔率騎八千救彥敗顯于常山追奔及于襄國顯大將軍曹伏駒開門為應遂入襄國誅顯及其公卿已下百餘人焚襄國宮室遷其民于鄴三月慕容俊已剋幽葪略地至于冀州閔帥騎擊之與慕容恪遇于廣臺恪方陳而前閔衆寡不敵所乘赤馬曰朱龍日行千里潰圍出東奔二十餘里馬無故而死遂為恪所擒送之于薊俊立閔而問之曰汝奴僕下才何敢妄稱天子閔曰天下大亂爾曹夷狄人面獸心尚欲篡逆我一時英雄何為不可作王耶俊怒鞭之三日遣慕容評帥衆圍鄴五月送閔龍城告廆而煞之鄴中餓人相食虎時宮人略盡冉智尚幼蔣幹遣詹事劉猗奏表降晉八月長水校尉馬願龍驤將軍田香開門降評蔣幹懸而投出于倉垣評送閔后董氏太子智太尉申鍾及諸王公卿于薊初慕容俊斬閔于遏陘山山左右七里草木悉枯蝗蟲大起自五月不雨至于十二月俊遣使者祀之諡曰武悼天王其曰大雨雪是歲太和八年也
