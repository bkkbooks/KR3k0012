body:
  text: 兵部五十七擒獲下晉書載記曰劉曜光祿大夫遊子遠與氐羌伊餘戰伊餘有驕色子遠候其無備夜誓衆蓐食晨大風震霧子遠曰天贊我也躬先士卒掃壁而出遲明覆之生擒伊餘悉俘其衆二石偽事曰劉曜躬領將士二十七萬衆大舉征勒勒養子生為衛將軍領三千人鎮洛金墉城曜攻生城不能下不覺勒軍卒至天曉曜軍當攻金城勒軍入正與曜軍相遇即交戰曜軍大破登時生擒曜身三十六國春秋曰丁亥中軍劉𥙿悉衆攻燕衆咸諫曰今往亡日兵家所忌𥙿曰我往被亡吉孰大焉乃命悉登遂剋之燕王慕容超走追獲焉𥙿責之不降之罪超神色自若無餘言唯以母託劉敬宣而已蕭方等曰美哉其言也以言必己親終不忘孝可謂人之將死其言也善信乎三國典略曰侯景晝息夜行追軍漸逼使謂慕容紹宗曰景若被擒公復何所用紹宗乃緩之又曰北齊平任城王湝音諧據冀州與廣寧王孝珩召募得四万餘人以拒我軍齊王憲率衆討之仍令太上主手書與湝曰朝廷遇緯甚厚諸王無恙叔若釋甲則無所憂湝不納及大開賞募多出金帛沙門求為戰者亦數千人候騎執湝間諜二人以白于憲乃集齊之舊將遍示之曰吾所爭者大不在汝等今放還可即充我使乃與湝書曰一木不維大廈三諫可以逃身微子去啇侯服周代項伯背楚賜姓漢朝兵交命使古今通典不俟終日所望知機湝得書沉之于井憲至信都湝陳於城南憲登張耳冢以望之俄而湝領軍尉相願遂以衆降湝大怒殺其妻子明日復戰憲遂破之俘斬三萬人湝被擒見憲不拜呼之為弟北史曰後魏元遙遷左光祿大夫仍領護軍時冀州沙門法慶既為妖幻遂説渤海人李歸伯合家從之歸伯招率鄉人推法慶為王法慶以歸伯為十住菩薩平魔軍司定漢王自號大乘殺一人者為一住菩薩殺十人者為十住菩薩又合狂藥令人服之父子兄弟不相知識唯以殺害為事於是聚衆殺阜城令破渤海郡殺害吏人刺史蕭寶京遣兼長史崔伯驎討之敗於煮棗城伯驎戰沒凶衆遂盛所在屠滅寺舍斬戮尼僧焚燒經像云新佛出世除去衆魔詔以遙為使持節督北征諸軍事率步騎十万以討之法慶相率攻遙遙並擊破之遙遣輔國將軍張虬等擒法慶并尼惠暉等斬之傳首京師後擒歸伯戮於都市後周書曰裴寬與東魏將彭樂恂戰於新城因傷被擒至河陰見齊文襄寬舉止詳於占對文襄甚賞異之謂寬司卿三河冠蓋材識如此我必使卿富貴關中貧狹何足可依勿懷異圖也因解鎖付館厚加其禮寬乃裁所臥氈夜縱縋而出因得遁還見於太祖太祖顧謂諸公曰被堅執鋭或有其人疾風徑草歲寒方驗裴寬為高澄如此厚遇乃能冒死歸我雖古之竹帛所載何以加之又曰太祖時梁元帝遣使請舊圖以定疆界又連結於齊言辭悖慢太祖曰古人有言天之所棄誰能興之其蕭繹之謂乎冬十月壬戍遣柱國于謹中山公護大將軍楊忠韋孝寬等步騎五萬討之十一月癸未師濟於漢中公護與楊忠率鋭騎先屯其城下據江津以備其逸甲申謹至江陵列營圍守辛亥進攻城其日克之擒梁元帝殺之并虜其百官及士民以歸沒為奴婢者十餘萬其免者二百餘冢立蕭察為梁主居江陵為魏附庸又曰侯莫陳崇隨賀拔嶽征討以功除建威將軍從嶽入關破萬俟醜奴崇與輕騎逐北至涇長坑及之賊未成列崇單騎入賊中於馬上生擒醜奴於是大呼衆悉披靡莫敢當之後騎集遂破之嶽以醜奴所乘馬及寶劍金帶賞之又曰李廣會稽人早事察以敢勇聞沇口之役先察力戰及華皎軍敗為吳明徹所擒將降之廣辭色不屈遂被害又曰柳檜除魏興華陽二郡守安康人黃衆寶謀反連結黨與將圍州城乃相謂曰常聞柳君勇悍其鋒不可當今既在外方為吾徒腹心之病也不如先擊之遂圍檜郡郡城卑下士衆寡弱人無守御之備連戰積十餘日士卒僅有存者於是力屈城陷身被十數瘡遂為賊所獲既而衆寶等進圍東梁州乃縛檜置城下欲令誘説城中檜乃大呼曰群賊烏合糧食已罄行即退散各宜勉之衆寶大怒乃臨檜以兵曰速更汝辭不爾便就戮矣檜守節不變遂害之棄尸水中人皆為之流涕隋書曰漢王諒之作亂也煬帝將發幽州兵以討之時竇杭為幽州惣管帝恐其有二心問可任者於楊素素進李子雄授上大將軍拜廣州刺史馳至幽州止傳舍召募得千餘人杭恃素貴不時相見子雄遣人諭之後二日抗從鐵騎二千來詣子雄所子雄伏甲請與相見因擒抗遂發幽州兵步騎三万自陘以討諒時諒遣大將軍劉建略地燕趙正攻井陘相遇於抱犢山下力戰破之遷幽州總管又曰獨孤揩字修則不知何許人也本姓李氏父屯從齊神武帝與周師戰于沙苑齊師敗績因為柱國獨孤信所擒配為士伍給使信家漸得親近因賜姓獨孤氏楷少謹厚便弄馬槊為宇文護執刀纍轉車騎將軍其後數從征伐賜爵廣阿縣公邑千戶唐書曰長平王叔良遣驃騎劉感擊薛仁果却為所敗感歿於賊感不知何許人初以本官鎮涇州為仁果所圍感拒戰久之城中糧盡無可食感殺馬以分士卒感一無所噉唯煮馬骨取汁和木屑而自食之城垂陷者數矣會長平王叔良援兵至仁果解去感與叔良復出戰因為賊所擒又曰王行敏鎮潞州劉黑闥來攻行敏自歷亭出兵拒戰擊賊破之既而憩於野不設備賊知而掩之左右皆遁因為黑闥所擒竟不拜黑闥怒斬之臨死西向而言曰行敏大唐忠臣也願陛下知之高祖聞而痛惜焉又曰劉世讓檢校并州總管時突厥可汗遣俱儉特勤以所部千人居我并州甚為民患前總管李仲文不能制世讓到官以計擒之馳使以聞高祖大悅嘉歎久之又曰薑寶誼武德初拜武衛大將軍尋為井鉞將軍劉武周將黃子英住來崔鼠谷高祖令寶誼擊之子英數以輕兵挑戰寶誼兵才接子英輕遁如此者再三寶誼悉衆以逐之伏兵發軍遂大敗寶誼為賊所擒後得逃歸至是與斐寂拒宋金對戰始合寂棄軍而走兵遂大潰寶誼復為賊所擒高祖初聞其沒也泣曰寶誼烈士必不生降賜其家物千假米三百石寶誼後謀背賊事泄遇害臨死西向大言曰臣無狀負陛下被屠潰是所甘心但敗軍喪師九泉所恨及賊退高祖遣使迎其柩諡曰剛又曰恆州節度李寶臣使人謂朱滔曰吾聞朱公貌如神安得而識之願因繢事以觀可乎滔乃圖其形以示之錦衣金鉤甚偉寶臣懸於射堂命諸將熟視之曰朱公信神人也他日滔出獵寶臣密選精卒劫之戒其將曰取彼貌如射堂所懸者是時二軍方共事不相虞而卒變暴至滔駭然與戰於瓦橋適衣他服以不識免又曰蔡州賊將吳秀琳以文城柵兵三千降李訴訴從秀琳於新興柵遂以琳之衆攻吳房夏四月庚寅朔辛卯李訴奏師至嵖岈山擒賊將柳世于李湊等二人李光顏敗元濟之衆三萬於郾城其將張伯良奔于蔡州殺其卒十二三獲馬千餘匹器甲三萬其甲上悉畫作雷公符北斗星文又云速破城北軍急急如律令周史曰皇甫暉正陽敗八保滁州太祖皇帝麾兵涉水踰城而入盡戮其黨生擒暉及其偽命都監姚鳳等送于行在世宗召見之暉曰臣力備矣欲暫坐及坐又曰臣欲暫臥不俟命而臥神色自若世宗亦復容之乃言曰臣非不盡忠於本國實以甲兵勇怯不敵臣早事晉朝纍將兵與契丹相持未如大朝此日甲馬之盛昨者退守滁州不謂天兵便能踰城攻取如履平地臣力所不加故就擒耳因盛稱太祖之武勇世宗命釋之賜衣服帶鞍馬後數日暉以金瘡尋卒于洛陽暉本驍將唐莊宗之基業因暉而敗焉故暉有名於天下虜掠左傳曰鄭祭足帥師取溫之麥秋又取成周之禾後漢書曰馮異謂苗萌曰今諸將皆壯士屈起多暴橫獨有劉將軍所到不虜掠觀其言語舉止非庸人也可以歸身苗萌曰死生同命敬從子計又曰郅惲至廬江因遇積弩將軍傅俊東徇楊州俊素聞惲名乃禮請上之上為將兵長史授以軍政惲乃誓衆曰無掩人不備窮人於厄不得斷人支體裸人形骸放淫婦女俊軍士猶發冢陳尸掠奪百姓惲諫俊曰昔文王不忍露白骨武王不以天下易一人之命呂氏春秋曰武王伐紂至鮪水紂使膠鬲候周問武王曰何日至武王曰將以甲子日至膠鬲行天大雨日夜不休武王疾行不輟軍吏諫之武王曰吾疾行以救膠鬲之死也故能獲天地之應剋啇如林之旅天地之應謂夜雨止畢陳白魚入府之類剋勝也啇殷號也於旅衆也如林言衆多尚書曰武王伐紂紂率其旅若林會於牧野將軍如何不師法文王而犯逆天地之禁多傷人害物虐及枯尸取罪神明今不謝天改政無以全命願將軍親率士卒收傷葬死哭所殘暴以明非將軍本意也從之百姓悅服所向皆下晉書曰官人孟玖弟超並為成都王頴所嬖寵超領萬人為小都督未戰縱兵大掠陸機録其主者超將鐵騎百餘人直入機麾下奪之顧謂機曰貉奴能作督不機司馬孫極勸機殺之機不能用超宣言於衆曰陸機將反又曰惠帝末妖賊劉柏根起於東萊王彌率家僮從之柏根死亡入長廣山為群盜彌多權略凡有所掠必預圖成敗舉無遺策弓馬迅捷膂力過人青土號為飛豹十六國春秋曰南涼禿髮傉檀伐北涼沮渠蒙遜於姑臧至番禾苕藋苕徒聊切藋徒吊切掠五千餘戶其將窟古進曰陛下轉戰千里前無完陳徙戶資財盈溢衢路宜倍道遊師早度峻嶮蒙遊善於用兵士衆習戰若輕軍卒至出吾不慮大敵外逼徙戶內攻危道也衛尉伊力延曰我軍勢方盛將士勇氣自倍彼徒我騎勢不相及若倍道遊師必捐棄資財示人以弱非計也俄而昏霧風雨蒙遊軍大至傉檀大敗而還三國典略曰齊主以契丹犯塞親征至于平州取其西道直指長漸司徒潘相樂率精騎五千自東道趣青山向白狼城安德王韓軌率精騎四千斷其走路追奔至于遼水齊主露髮袒身晝夜不息行千餘里唯食肉飲水壯氣彌厲親踰山嶺為士卒先指揮奮擊大破之虜獲十萬餘口後魏書曰濟陰王新城頗有武略庫莫奚侵擾詔新城率衆討之新城乃多為毒酒賊漸逼便棄營而去賊至喜而競飲聊無所備遂簡輕騎因醉縱擊俘馘甚多又曰天水梁會守東城謀欲逃遁先是封勑文掘重塹於東城之外斷賊走路夜中會乃陳飛梯騰塹而走勑文先嚴兵於塹外拒鬥從夜至旦勑文謀於衆曰困獸猶鬥而況於人賊衆知無生路人自致死必傷士衆未易可平若開其生路賊必上下離心剋之易矣衆咸以為然勑文以白虎幡宣告賊衆曰若能歸降原其生命應時降者六百餘人會知人心沮壞於是分遁勑文縱騎騰躡死者太半俘獲四千五百餘口後周書曰賀拔嶽副爾朱天光討万侯醜奴時醜奴自率大衆圍歧州遣行臺尉遲菩薩等向武功南渡渭水天光望嶽率騎赴之嶽身先率擊之退走嶽號令部賊下馬者皆不聽殺賊顧見之便悉投馬俄而虜獲三千餘人人馬無遺遂擒菩薩降卒万餘並收其輜重醜奴棄歧州走安定平亭隋書曰南寧夷玩來降拜昆州刺史既而復叛遂以史萬歲為行軍總管率衆擊之入自蜻音精蛉音靈川經弄揀次小勃弄大勃弄至于南中賊前猿屯據要害万歲皆擊破之行數百里見諸葛亮紀功碑銘其皆曰万歲之後勝我者過此万歲令左右倒其碑而進渡西二河入渠濫川行千餘里破其三十餘部虜獲男女二万餘口諸夷大懼遣使請降獻明珠徑寸於是勒美隨德萬歲遣使馳奏請將玩入朝詔許之又曰達奚長儒與鳥丸軌圍陳將吳明徹於呂梁陳遣驍將劉景率徑勇七千來為聲援軌令長儒逆拒之長儒於是取車輪數百擊以大石沉之清水連轂相次以待景軍至船艦礙輪不得進長儒乃縱奇兵水陸俱發大取之俘數千人又曰周法尚初仕陳背陳歸周陳將樊猛濟江討之法尚遣部曲督韓朗詐為背己奔于陳偽告猛曰法尚部兵不願降人皆竊議盡欲叛還若得來軍必無鬥者自當於陳倒戈耳猛以為然引師急進法尚乃佯為畏懼自保於江曲猛陳兵挑戰法尚先伏輕舸於浦中又伏精鋭於古村之北自張旗幟迎流拒之戰數合偽退登岸投古村猛捨舟逐之法尚又疾走行數里與村北軍合復前擊猛猛退走船既而浦中伏舸取其舟楫建周旗幟猛於是大敗僅以身免虜八千人
