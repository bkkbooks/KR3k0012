body:
  text: 資産部十三陶禮記檀弓曰有虞氏瓦棺始不用薪也有虞氏上陶夏后氏堲周火熟曰堲燒士冶以周於棺也或謂之士周又喪大記曰甸人為垼于西牆下陶人出重鬲左傳襄公二十五年鄭子産曰昔虞閼父為周陶正以服事我先王閼父舜之後當周之興閼父為武王陶正我先王賴其利器用也與其神明之後也舜聖故謂之神明庸以元女大姬配胡公庸用也元女武王之長女胡公閼父之子滿也而封諸陳以備三恪周得天下封夏殷二王後又封舜後謂之恪并二王後為三國其體轉降示敬而已故曰三恪毛詩文王綿曰古公亶甫陶復陶穴未有家室續漢書曰董卓欲遷都長安楊彪不從卓作色曰楊公欲沮國家計耶關東方亂所在賊起崤函險固國之重防又隴右取材功夫不難杜陵南山下有孝武故陶處作磚瓦一朝可辦宮室官府蓋何足言吳書曰鄭泉宇文淵臨卒謂同類曰必葬我於陶家之側庶百歲之後化而成土幸見取為酒壺實獲我心矣宋書曰文帝欲誅徐羡之羡之乘內人問訊車出郭步走至新林入陶竈中自經而死尸子曰昆吾作陶呂氏春秋同淮南子曰陶人埏埴也其取之地而以為盆盎也無離於地其已成器而破碎漫瀾而復歸其故也與其為盆盎無以異矣周書曰神農耕而作陶呂氏春秋曰夫舜遇堯天也舜耕於歷山陶於河濱釣於雷澤天下悅之列仙傳曰寧封子者黃帝時人為黃帝陶正有人過之為其掌火能出入五色煙久則以教封子積火自燒而隨煙氣上下視其灰燼猶有骨時人葬之北山中謂之寧封子焉嶺表異録曰廣州陶家皆作土鍋鑊燒熟以土油之其潔淨則愈於鐵器尤宜煮藥一斗者才直十錢愛護者或得數日若迫以巨熖涸之則立見破烈斯亦濟貧之物冶禮記學記曰良冶之子必學為裘仍見其家錮補穿鑿之器也補器者其金柔乃合有似於為裘史記曰邯鄲郭順以鐵冶業與王者埒富又曰宛丘氏之先梁人也用鐵冶為業秦代魏遷孔氏南陽大鼓鑄規陂池連車騎遊諸侯因通商賈之利有遊間公子之名又曰魯人邴氏以鑄冶起富至巨萬然家自父兄子弟約俯有拾仰有取師古曰俯古俯宇也俯仰必有取捨無巨細字惡也張璠漢記曰杜詩為太守為冶作水排教化大行魏志曰韓暨字公至辟為丞相士曹屬後遷樂陵太守徙監冶謁者舊時冶作馬排每一熟石用馬百匹更作人排又費功力暨乃因長流為水排計其利益參倍於前在職七年器用充實詔書褒歎就加司金都尉晉書曰王沉字彥伯作釋時論云融融者皆趨熱之士得其爐冶之門者唯挾炭之子茍非斯人不如其已南史曰齊袁彖監吳興郡事彖到郡坐逆用祿錢免官付東冶彖妹為竟陵王子良妃子良世子昭胄時年八歲見武帝而形容慘悴帝問其故昭胄流涕曰臣舅負罪今在尚方臣母悲泣不食已積日臣所以不寧帝曰特為兒赦之既而帝遊孫陵遙望東冶曰中有一好貴囚數日與朝臣幸冶履行庫因宴飲賜囚徒酒肉勑見彖與語明日釋之梁書曰侯景據壽陽懷反計以臺所給仗多不能精啓請治煆工欲更營造勑並給之後魏書曰崔鑒為東徐州刺史於州內銅冶為農且丘人獲利北史曰後周薛善為行臺郎中時欲廣置屯田以供軍費乃除善司農少卿領同州夏陽縣二十七監又於夏陽置鐵冶復令善於監每月役八千人營造軍器善自督課兼加慰撫甲兵稍利而皆忘其苦焉唐書曰侍中魏徵乞解所職請為散官陪奉左右拾遺補闕太宗曰朕拔卿於讎虜之中任卿以樞要之職見朕之非未嘗不諫公獨不見金之在礦也何足貴哉良冶煆而為器便為人所寶朕方自比於金以卿為良匠卿雖有疾未為衰老豈得便爾耶徵乃止尸子曰造冶者蚩尤也淮南子曰夫宋工畫吳冶刻形鏤法其為微妙堯舜之聖不能及也列仙傳曰陶安公者六安冶師也數行火一旦散上紫色衡天安公伏冶下求哀須臾朱雀至冶上曰安公冶安公冶與天通七月七日迎汝以赤龍至時龍到安公騎之東南上來武昌記曰北濟湖本是新興冶塘湖元嘉初發水冶水冶者以水排冶令顏茂以塘數破壞難為功力茂因廢水冶以人鼓排謂之步冶湖曰因破壞不復修治冬月則涸王子年拾遺記曰漢太上皇微時嘗佩一刀長三尺有銘其字雖難識疑是殷高宗伐鬼方時作此物也上皇遊酆沛山中遇有人冶鑄上皇息其旁問曰此鑄何物工笑曰為天子鑄劍慎勿泄上皇謂為戲辭無疑色工曰今所鑄鐵剛厲製器難成若得公腰間佩刀雜而治之即成神器可以剋定天下皇精為輔佐以殲三猾木長火盛此為興兆上皇曰余此物名為匕首其利難儔水斷蛇龍陸斬虎兕工曰若不得此匕首雖歐治專精越砥斂鍔終為鄙器上皇即解腰間匕首投於爐中俄而煙炎衝天日為之晦及劍成釁以三牲工問上皇何時得匕首上皇曰秦昭襄王時余行逢一野人於野授余云是殷時物世世相傳上有古字記其年月工人視之其鏌耶尚在葉前疑也工人持劍授上皇上皇以賜高祖又曰漢郭況光武皇后之弟也纍金數億家僮四百人黃金為器功冶之聲震於都鄙時人謂郭氏之室不雨而雷言鑄煆之聲盛也曹毗詠冶賦曰冶石為器千爐齊設煆魏略曰太祖遣邯鄲淳詣臨淄侯植植得淳喜延入坐不與談先為五椎煆鄧粲晉紀曰嵇康曾煆於長林之下鍾會造焉康坐坐以鹿皮嶷然正容不與之酬對會恨而去文士傳曰嵇康性巧能煆家有柳樹乃激水以圍之夏月甚清涼居其下傲戲及自煆禰衡傳曰衡字正平十月朝黃祖在艨衝舟上賓客皆會作黍臛既至先在衡前衡得便飽食初不顧左右既畢復搏弄以戲時江夏有張伯雲亦在座調之曰禮教云何而食此正平不答弄黍如故祖曰處士不當答之也衡謂祖曰君子寧聞車前馬屁祖呵之衡熟視祖罵曰死煆錫公祖大怒令五伯將出欲杖之而罵不止遂令絞殺黃射來救無所復及悽愴流涕曰此有異才曹操及劉荊州不殺大人奈何殺之祖曰人罵汝父作煆錫公奈何不殺向秀別傳曰秀嘗與嵇康偶煆於洛邑與呂安灌山於山陽收其餘利以供酒食之費韓子曰椎煆者所以平不夷也榜檠者所以矯不直也聖人之為法也所以平不夷矯不直也牧周禮地官曰牧人掌牧六牲而阜蕃其物以共祭祀之牲牷六牲謂牛馬羊豕犬雞鄭司農云牷純也玄謂牷體完具又夏官曰牧師掌牧地皆有厲禁而頒之頒馬授圉者所牧處孟春焚牧焚牧地以除陳生新草中春通淫中春陰陽交萬物生之時可以合馬之牝牧也禮記月令季春曰是月也乃合纍牛騰馬遊牝于牧纍繫也騰躍也其牝欲遊則就牧而合仲夏曰是月也命有司祭先牧謂仲夏祭先牧於大澤用剛日毛詩小雅曰無羊宣王考牧也厲王之時牧人之職廢宣王始興而復之至此而成謂復先王牛羊之數誰謂爾無羊三百維群誰謂爾無牛九十其犉黃牛黑唇曰犉箋云爾女也宣王復古之牧法汲汲於其數故歌此詩以解之也爾羊來思其角濈濈聚其角而息濈濈然云此者美富産得其所爾牛來思其耳濕濕動其耳濕濕然或降于阿或飲于池或寢或訛訛動也言此者美其無所驚畏爾牧來思何蘘何笠或負其餱何揭也蓑所以備雨笠所以御暑言此者美牧人寒暑飲食有備三十維物爾牲則具又魯頌曰駉頌僖公也僖公能遵伯禽之法儉以足用寬以愛民務農重穀牧于坰野魯人尊之於是季孫行父請命于周而史克作頌季孫行父季文于也史克魯史也駉駉牧馬在坰之野駉駉良馬腹幹肥張也坰遠野也箋云必牧於坰野者辟知民居與良田者也史記曰卜式河南人少與弟別居脫身出分獨取畜羊百餘田宅財物盡與弟式入山牧羊十餘歲羊致千餘上召之曰吾有羊上林中欲令子牧之乃布衣牧羊歲餘羊悉肥上過見其羊善之式曰非獨羊也治民亦猶是也以時起居惡者輒去無令敗群上以式為奇拜為郎又曰衛青平陽人也其父為平陽侯家給使與妾通生青為侯家人少時歸其父父使牧羊民母之子皆奴畜之不以為兄弟又曰范增説項梁曰以君代為楚將必能立楚之後梁乃求懷王孫在人間為人牧羊立以為楚懷王後從人望也又曰公孫弘淄川人家貧牧豕海上年四十餘乃學春秋雜記漢書曰蘇武使胸奴欲降之乃徙武北海上無人處使牧羝羊曰羊乳乃得歸武仗漢節牧羊臥起操持節旄盡落又曰路溫舒字長君巨鹿人父為里監門使溫舒牧羊又曰王尊字子貢涿郡高陽人少孤歸諸父使牧羊澤中後漢書曰馬援轉遊隴漢間常謂賓客曰丈夫為志窮當益堅老當益壯因處田牧至有牛馬羊數千頭穀數萬斛既而歎曰凡殖貨財産貴其能施賑也否則守錢虜耳仍盡散以班昆弟故舊身衣羊裘皮袴又曰承宮年八歲為人牧豬鄉里徐子威明春秋授諸生數百人宮過其廬下見諸生誦好之因亡其豬豬主欲笞諸生禁乃止之謝承後漢書曰孫期字仲式事母至孝牧豕於大澤中賣之以奉供養遠人從其學者皆執經追於澤畔范曄後漢書曰梁鴻字伯鸞扶風平陵人也家貧牧豕上林苑中曾誤遺失火延燒及他舍鴻乃尋訪燒者問所失去悉以豕償之其主者猶以為少鄰家耆老見鴻非常人乃共責讓主人於是始敬異焉悉還豕鴻不受魏志曰楊俊字季才避地并州同郡王象孩少孤特為人僕隸年十七八見使牧羊而私讀書用獲箠楚俊嘉美其才質即贖象著家娉娶立屋然後與別也晉書曰張華字茂先少家貧常以牧羊為事三十國春秋曰沮渠蒙遜其先世為胸奴左沮渠因以官為氏少牧羊臥息田畔忽見沙門以手摩其頭曰爾後當王此土不久苦焉言終而滅崔鴻前趙録曰李景字延祐少貧見養叔父常使牧羊景見其叔子講誦羡之後從博士乞得百餘字牧羊之睱折草木書之叔乃誤曰吾家千里駒也而令騏驎久躓鹽坂乃為娶妻教學又曰薑宇天水冀北人也少孤貧為河北陳不識家牧羊年十五身長七尺九寸聰惠美風儀不識奇之妻之以女後魏書曰遊明根字志遠幼年遭亂為櫟陽王氏奴主使牧羊明根以漿倩人書字路邊書地學之長安鎮將竇瑾見之呼問知其姓名乃告遊雅使人贖之列子曰楊朱見梁惠王言治天下猶運諸掌王曰先王有一妻一妾而不能治言天下何也對曰君見夫牧羊者乎百羊為群使五尺童子荷箠而隨之欲東而東欲西而西使堯牽一羊舜荷箠而隨之則不能矣符子曰漢王聞宋勝子方牧羊于巨澤鼓而歌南風之詩使者進謂宋勝子曰漢王聞先生之賢使使者致命于先生而委國政焉宋勝子矍然而顧謂使者曰是何言歟今漢王待四海之士與十群之羊其於職司也奚以異乎而大王廢牧羊之任委以四海之政是錯亂天位倒置人倫勝不願為也乃逃于陰山之陽公孫尼子曰舜牧羊於潢陽還堯舉為天子説文曰羌西戎牧羊人也字從羊人列仙傳曰商丘子瑕吹笙牧豕七十不娶妻而死吳越春秋曰婁門外雞墟者吳王牧雞處陳武別傳曰武休屠胡人也常騎驢牧羊諸家牧豎十數人或有和歌者武遂學太山梁父吟及行路難之屬也漁説文曰漁捕魚也周禮天官上曰漁人掌以時漁為梁月令季冬命漁師為梁鄭司農云梁水偃也偃水為闊空以笱承其空詩曰敝笱在梁春獻王鮪王鮪鮪之大者辨魚物為鮮薧以共王膳羞鮮生也薧乾也凡祭祀賓客喪紀共其魚之鮮薧凡漁者掌其政令凡漁征入于王府鄭司農云漁征魚者之租稅漁人主收之入千王府禮記月令季冬曰命有司始漁天子親往嘗魚先薦寢廟天子親往視魚非常事重之此時魚潔美又坊記曰故君子仕則不稼田則不漁左傳隱公曰公將如棠觀漁臧僖伯諫公曰吾將略地焉遂往陳漁而觀之又襄公二十五年曰崔杼弒其君申蒯待漁者侍漁監取魚之官退謂其宰曰免是反子之義也與之皆死反死君之義周易下擊曰庖犧氏之王天下也結繩而為網罟以田以漁蓋取諸離尚書大傳曰舜漁雷澤之中後漢書曰明帝時下令禁人二業而吏下檢結多失其實百姓患之劉般上言郡國以官禁二業至有田者不得漁捕今濱江湖郡率少蠶桑人資漁採以助口實且以冬春間月不妨農事夫漁獵之利為田除害有助穀食無關二業也北史曰後周裴俠除河北郡守此郡舊制有漁獵夫三十人以供郡守俠曰以口腹役人吾不為也乃悉罷之管子曰漁人入海海深百仞就波逆流乘危百里宿夜不出者利水也故利之所在雖千仞之山無不上焉深源之下無不入焉魯連子曰古善漁者宿沙瞿子使漁于山則雖十宿沙子不得一漁焉宿沙非暗於漁道也彼山者非魚之所生尸子曰燧人之世天下多水故教人之漁文子曰堯使水處者漁山處者木事宜其械械宜其人呂氏春秋曰雍季對晉文公曰竭澤而漁豈不獲得而明年無魚矣家語曰密子賤治單父三年孔子使巫馬期往觀政焉期陰免衣弊裘入界見漁者得漁輒捨之期問焉曰凡漁者為得也何以得魚卻捨之曰魚之大者名為鱄䲖吾大夫愛其小者名為鱦鱄宜為鱣新序作鱨鱦者魚之懷仁也吾大夫欲長之是以得二者輒捨之期返告孔子曰宓子之德至矣使民暗行若嚴刑之於一方也訪問宓子何行而得於此子曰吾嘗與之言曰誠於此者刑於彼宓子志行此術於單父也又曰孔子之楚有漁者獻魚焉孔子不受漁者曰天暑市遠無處鬻焉思欲棄之糞壤不若獻之君子故取以進之於是夫子再拜受之使弟子掃地將以祭享焉門人曰彼將棄之矣而夫子祭之何也子曰吾聞惜其腐餘欲以務施者仁人之偶也惡有受仁人之饋而無祭者乎劉向新序曰楚人有獻餘魚於王者曰今日獲魚食之不盡賣之不售棄之可惜故來獻王也楚王曰漁者仁人也境內多貧寡人聞之未能行漁者知之以此喻寡人也乃出倉粟去後宮以妻寡夫郭璞江賦曰蘆人漁于儐落江山衣則羽褐食惟疏鮮忽忘夕而宵歸詠採菱以扣舷倣自足於一區尋風波以窮年
