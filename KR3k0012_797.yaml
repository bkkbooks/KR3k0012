body:
  text: 西戎五莎車漢書曰莎車王治莎車城去長安九千九百五十里有鐵山出青玉又曰宣帝時烏孫公主小子万年莎車王愛之莎車王無子死時万年在漢莎車國人計欲自託於漢又欲得公孫心即上書請万年為莎車王漢許之遣使者奚充國送萬年万年初立暴惡國人不説莎車王弟呼屠微殺万年并漢使者自立為王約諸國背漢會衛侯馮奉世使送大宛客即以便宜發諸國兵擊殺之更立他昆弟子為莎車王又曰馮奉世至宛宛聞其斬莎車王禮之異於他使得其名馬象龍而還馬形如龍帝甚悅下議封奉世關內侯少府蕭望之以奉世矯制發諸國兵雖有功效不可以為後代法若即封奉世則為使者利以奉世為比爭逐發兵要功萬里之外為國家生事於夷狄漸不可長不宜授封帝善其議以奉世為光祿大夫波知北史曰波知國在鉢和西南土狹人貧依託山谷其王不能揔攝有大池傳曰大池有龍王次者有龍婦小者有龍子行人經之設祭乃得過不祭多值風雪之困栗弋通典曰栗弋後魏通焉在蔥嶺西大國一名栗特一名拘夢出名馬牛羊珍果蒲陶酒其土地水美故也有大禾高丈餘子如胡豆在安息北五千里附庸小國四百餘城太武帝時遣使朝貢悉居半北史曰悉居半國故西夜國也一名子合其王號子治呼揵在于闐西去代萬二千九百七十里後魏大延初遣使來獻自後不絶越底延通典曰越氐延國隋時聞焉治辛頭河北西北去賖彌國千餘里東北至瓜州五千四百里其婆羅門種類戶數萬餘有弓矢刀矟皮甲國法不數人重罪流輕者杖國無課稅其俗事佛王及庶人剪髮衣錦袍不開縫貧者自疊婦人為髻衣裙衫帔長巾俗清潔氣候溫多稻有羊馬牛鍮石訶梨勒石蜜鹿皮細疊等波路北史曰波路國在阿鉤羌西北去代一萬三千九百里其地濕熱有蜀馬土平物産國俗與阿鉤羌同三童通典曰三童國在軒渠國西南千里人皆眼有三精珠或有四舌者能為一種聲亦能俱語常貨多用犀象作金幣率效國王之面亦效王后之面若丈夫交易則用國王之面者王死則更鑄蒲山北史曰蒲山國故皮山國也居皮城在于闐南去代一萬二千里其國西南三里有凍凌山後役屬于闐劫國通典曰劫國隋時聞焉在蔥嶺中南西與俱賖彌國界接西北至悒怚國去長安萬二千里有戶數萬氣候熱有稻麥粟豆羊馬出洛沙青黛婚姻同突厥死亡棄於山谷又曰大唐武德二年遣使貢寶帶金鎖頗梨水精杯各一頗梨四百九十枚大小有差獠魏書曰獠之初也出自梁益之間種類甚多散居山谷略無氏族之別依樹積水以居其上名曰干蘭干蘭大小隨其家之口數往往推一長者為王父死則子繼若中國之黨族也僚王各有鼓角一雙使其子弟自吹擊之好相殺害多仇怨不敢遠行性同禽獸至於忿怒父子不相避唯手有兵刃者先殺之若殺其父走避於外求得一狗以謝其母然後敢歸母得狗謝不復嫌恨若報怨相攻擊必殺而食之平常劫掠責取豬狗而已親戚比鄰指授相賣亡兒女哭止便不復追思唯執楯持矛不識弓矢用竹為簧群聚鼓之以為音節能為細布色鮮淨大狗一頭買一生口其俗畏鬼神尤尚淫祀所殺之人美髯髯者剝其面皮籠之於竹及燥號曰鬼鼓舞祀之以求福也北史曰獠者蓋南蠻之別種自漢中達于卭笮川洞之間所在皆有種類甚多所生男女無名字唯以長幼次第呼之其丈夫稱阿謨阿假婦人阿夷阿等之類皆語之次第稱謂也鑄銅為器大口寬腹名曰銅爨既薄且輕易於熟食建國中李勢在蜀諸獠始出巴西渠川廣漢陽安資中攻破郡縣為益州大患自桓溫破蜀之後蜀人東流山險之地多空獠遂挾山傍谷與夏人參居者頗輸租賦在深山者不為編戶梁益二州歲伐獠以裨潤公私頗藉為利正始中夏侯道遷舉漢中內附宣武遣尚書邢蠻為梁益二州刺史以鎮之近夏人者安堵樂業在山谷者不敢為寇其後朝廷以梁益二州控攝嶮遠方乃立巴州以統諸獠後以巴酋嚴始欣為刺史又立隆城鎮所綰獠二十萬戶及周文平梁益令在所撫慰然天性暴亂旋致擾動每歲命隨近州鎮出兵討之獲其生口以充賤隸謂之為壓獠焉永昌郡傳曰獠民喜食人以為至珍美不自食其種類也怨仇乃相害食耳能水中潛行行數十里能水底持刀刺捕取魚其人以口嚼食並以鼻飲水死人有棺其葬豎棺埋之丁令後魏書曰丁令在康居北勝兵六萬人隨畜牧依處土出貂鼠皮貚子皮西南去康居界二千里又曰丁令北有馬腦國其人音聲似鴈鶩從膝以上至頭人也膝已下生毛馬腦馬蹄走疾於馬勇健敢戰且彌北史曰且彌國都天山東臨於大谷在車師北去代一萬五百七十里本役屬車師陀羅伊羅通典曰陀羅伊羅國隋時聞焉在烏蔡國北大雪山坡上緣梯登山接七百梯方到其國賖彌北史曰賖彌國在波知之南山居不信佛法專事諸神亦附濅噠東有鉢盧勒國路嶮緣鐵鎖而度下不見底後魏熙平中宋雲等使終不能達澤散通典曰澤散國魏時聞焉屬大秦其治在海中央最與安息城谷相近西南詣大秦不知里數女國北史曰女國在蔥嶺南其國世以女為王姓蘇毗字末羯在位二十年女王夫號曰金聚不知政事國內丈夫唯以征伐為務山上為城方五六里人有萬家王居九層之樓侍女數百人五日一聽朝復有小女王共知國政其俗婦人輕丈夫而性不妬忌男女皆以彩色塗面一日中或數度變改之皆披髮以皮為鞋課稅無常氣候多寒以射獵為業出鍮石朱砂麝香犛牛驄馬蜀馬猶多鹽恆將鹽向天笁興販其利數倍亦數與天笁黨項戰爭其女王死國中厚斂金錢求死者族之中賢女二人一為女王次為小王貴人死剝皮以金屑和骨內置瓶中埋之經一年又以其皮內鐵器埋之俗事阿修羅神又有樹神歲初以人祭或用獼猴祭呼得通典曰呼得魏時聞焉在蔥嶺北烏孫西北康居東北勝兵萬餘人隨畜牧出名馬多貂鼠曹國北史曰曹國都郍蜜水南數里舊是康居之地也國無主康國王令子烏建領之都城方三里勝兵千餘人國中有得悉神自西海以東諸國並事之其神有金人馬金波羅闊丈有五尺高下相稱每月以駝五頭馬十匹羊一百口祭之南去康國百里大業中遣使貢方物漕國北史曰漕國在蔥嶺之北漢時罽賓國也其王姓昭武字順達康國王之宗族也都城方四里勝兵萬餘人國法嚴峻俗重淫祠蔥嶺山順天神者儀制極華以金為屋以銀為地祠者曰有千餘人祠前有一魚骨其孔中通馬出入國王戴金牛頭冠坐金烏座土多稻粟豆麥饒象馬封牛金銀鑌鐵氍㲣朱砂青黛安息青木等香黑鹽阿魏東去劫國七百里大業中遣使貢方物何國隋書曰何國都郍密水南數里舊是康居地也其王姓昭武亦康國王之族類都城方二里勝兵千人其王坐金羊床東去曹國百五十里西去安國三百里大業中遣使貢方物短人通典曰短人魏時聞焉在康居西北男女皆長三尺人衆甚多去奄蔡諸國甚遠康居長老傳聞嘗有遣商旅行北方迷惑失道而到此國國中甚多真珠夜光明月珠其國去康居可萬餘遣裏突厥本末記云自突厥北行一月有短人國長者不踰三尺亦有二尺者頭少毛髮若羊胞之狀突厥呼為羊胞頭其傍無它種類相侵俗無寇盜但有大鳥高七八尺恆祠短人啄而食之短人皆持弓矢以為之備按此亦在西北即魏略之短人國也小人通典曰小人在秦之南軀才三尺其耕稼之時懼鵠所食大秦之南每衛助之小人竭其珍貨以酬報軒渠通典曰軒渠國多九色鳥青口緑頸紫翼紅膺紺頂丹足碧身緗背玄尾亦名九尾鳥亦名錦鳳其青多紅少謂之繡鸞恆從弱水西來或云是西王母之禽也其國幣貨同三童國溫宿北史曰溫宿國居溫宿城在姑默西北去代一萬五百五十里朱俱波通典曰朱俱國後魏時通焉亦名朱居槃國漢子合國也今并有西夜蒲犁依耐德若四國之地在於闐國西千餘里其西至蔥嶺二百里其王渴槃國南至女國三千里北至踈勒九百里其王本疏勒國人後魏宣武永平中朱居槃國遣使朝貢其言音與于闐相似其間小異人貌多同華夏亦類踈勒大唐武德以後頻遣使朝貢尉頭北史曰尉頭國居尉頭城在溫宿北去代一萬六百五十里滑國通典曰滑國車師之別種後漢順帝永建初八滑從班勇擊北虜有功漢以八滑為後部親漢侯自魏晉以來不通中國至梁武帝普通初其王厭帶夷粟陀始遣使獻黃師子白貂裘波斯錦物等後魏之居桑乾也滑猶小國屬蠕蠕後稍強大征其傍國波斯渴槃罽賓龜茲踈勒姑墨于闐等國焉其獸有師子兩腳駝人皆善騎射著小袖長身袍用金王為帶女人被裘頭上刻木為角長咫尺以金銀飾之兄弟共妻無城以氈屋為居東向開戶其王金床隨太歲轉無文字以木為契與旁國通用胡書羊皮為紙無職官事天神火神每日出祀神而後食其跪一拜而止死以木為槨父母死其子截一耳葬訖即吉其言語待譯然後通至後魏時謂之濅噠國或云高車之別種或云大月氐之種其源出於塞北自金山至後魏文帝時已八九十年矣在于闐之西東去長安萬一千里衣服類胡加以纓絡頭皆剪髮其語與蠕蠕高車及諸諸胡不同部衆可十萬依隨水草其國無車輿多駝馬用刑嚴急盜無多少皆腰斬盜一責十死者富家纍石為藏貧事者掘地而埋隨身諸物皆置冢內又兄弟共聚一妻無兄弟者其妻戴一角帽若有兄弟者依其多少之數更加帽角焉西城康居于闐沙勒安息及諸小國三十許皆役屬之號為大國每遣使朝貢孝明帝熙明中遣使伏子統宋雲使西域所經諸國不能知其本末及山川里數今舉其略云至隋時又謂挹怛國都烏滸水南二百餘里大月氐之種類也勝兵五六萬人俗善戰先時國亂突厥遣通設字誥強領其國俗同吐火羅南去漕國千五百里東去瓜州六千五百里大業中遣使來貢按劉璠梁典滑國姓濅達後裔以姓為國號轉訛又謂之悒怚焉姑默北史曰姑默國居南城在龜茲西去代一萬五百里疊伏羅通典曰疊伏羅後魏時通焉去代三萬一千里國中有勿悉城城北有壃奇水西流有白象土宜五穀宣武時遣使獻方物阿鉤羌通典曰阿鉤羌後魏時通焉在莎車西南國西有縣度山其間四百里中往往有棧道下臨不測之深人行以繩索相持而度山有五穀諸果市用錢為貨居止立宮室有兵器蔥茈羌通典曰燉煌西西城之南山中從婼羌西至蔥嶺數千里有月氐餘種日蔥茈羌白馬羌黃牛羌各有酋豪北與諸國接不知其道里廣狹傳聞黃牛羌種類孕身六月生南與白馬羌鄰並魏時聞焉
