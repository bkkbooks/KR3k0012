body:
  text: 資産部一田釋名曰土已耕者曰田田填也五稼填滿其中心也尚書禹貢曰冀州厥田惟中中孔安國曰田之高下肥瘠九州之中為第五兗州厥田惟中下第六青州厥田惟上下第三徐州厥田惟上中第二楊州厥田惟下下第九荊州厥田惟下中第八豫州厥田惟中上第四梁州厥田惟下上第七雍州厥田惟上下第一周禮春官下籥章曰凡國祈年於田祖歌豳雅擊土鼓以樂田畯祁年祁豐年也田祖始耕田者謂神農也田畯古先教田者爾雅曰畯農夫也又地官司徒之職曰均土地以稽其人衆而周知其數上地家七人可任者家三人中地家六人可任者家二人下地家五人可任者家一人鄭玄曰均平也周猶遍也一家男女七人以上則授上地所養者衆也男女五人以下則授之以下地所養者寡也正以七人六人五人為率者有夫有婦然後為家二人以至於十人為九等乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事而令貢賦凡稅斂之事此謂造都鄙也采地制井田異於鄉遂也重立國小司徒為經之立其五溝五途之界其制似井之字因取名焉又曰載師掌任土之法以物地事授地職而待其政令任土者任其力勢所能生育旦以制貢賦也物物色之以知其所宜之事而授農牧衡虞使職之也以廛里任國中之地以場圃任園地以宅田土田賈田任近郊之地以官田牛田賞田牧田任遠郊之地以公邑之田任甸地以家邑之田任稍地以小都之田任縣地以大都之田任疆地謂廛里裏者若今邑若居之田矣廛人居之區域也里居也園樹果蓏之屬也蓏音力果反季秋於中為場樊圃謂之園宅田者致仕者家所授之田也孟子曰卿已下必有圭田五十畝賈田在市賈人其家所受田也官田庶人在官者其家所受田也牛田牧田蓄牧者之家所受田也賞田者賞賜之田也公邑謂六遂餘地也天子使大夫治之自此以外餘地皆然禮記月令季夏日大雨時行乃燒剃行水利以殺草可以糞田疇可以美土疆剃謂迫地芟草也此謂欲耕菜田先剃其草草乾燒之此月大雨流水潦蓄其中則草死不復生而地美可耕稼也又王制曰方一里者為田九百畝一里方三百步方十里者為方一里者百為田九萬畝方百里者為方十里者百為田九十億畝億今十萬方千里者為方百里者百為田九萬億畝萬億今萬萬也自恆山至於南河千里而近冀州域自南河至於江千里而近豫州域自江至於衡山千里而遙荊州域自東河至於東海千里而遙徐州域自東河至於西河千里而近亦冀州域自西河至於流沙千里而遙雍州域西不盡流沙南不盡衡山東不盡東海北不盡恆山凡四海之內斷長補短方三千里為田八十萬億一萬億畝九州之大計方百里者為田九十億畝山陵林麓川澤溝瀆城郭宮室塗巷三分去一其餘六十億畝以一大國為率其餘所以授民也又曰古者公田籍而不稅籍之言借也借民力治公田美惡取於此不稅民之所自始也古者謂殷時左傳僖公三十一年曰春取濟西田分曹地也二十八年晉文討曹分其地境界未定至是乃以賜諸侯使臧文仲往宿於重館高平方與縣西北有重鄉城重館人告曰晉新得諸侯必親其共不速行將無及也從之分曹地自洮以東傅于濟盡曹地也文仲不書請田而已非聘享會同也襄仲如晉拜曹田也又宣公下十五年曰初稅畝非禮也穀出不過籍周法民耕百畝公田十畝借民力而治之稅不過此以豐財也又襄公六曰子産治鄭使田有封洫封界洫溝從政一年輿人誦曰取我衣冠而禇之取我田疇而伍之孰殺子産吾其與之及三年民又誦之曰我有子弟子産誨之我有田疇子産闢之子産而死誰其嗣之又哀公上曰季孫欲以田賦兵賦之法因其田財通出馬一匹牛三頭今欲別其田及家財各為一賦故言田賦使冉有訪諸仲尼仲尼曰后不識也三發三發問卒曰卒終也子為國老待子而行若之何子之不言也仲尼不對不公答而私於冉有曰君子之行也行政事度於禮施取其厚事舉其中斂從其薄如是則以丘亦足矣丘十六井出戎馬一匹牛三頭是賦之常法若不度於禮而貪冒無厭則雖以田賦將又不足且子季孫若欲行而法則周公之典在若欲茍而行又何訪焉弗聽為明年用田賦傳又哀公上曰子胥曰得志於齊猶獲石田也無所用之石田不可耕穀梁傳宣公五年曰初稅畝宣公履畝擇而稅之也古者田什一而籍言借民力十井而為公耕一謂之什一而稅也初稅非正也毛詩小雅白華曰滮池北流浸彼稻田滮流貌箋云池澤浸潤稻田使之生殖又甫田曰倬彼甫田歲取十千倬明貌甫田謂天下田也十千言多也又大雅嵩高曰王命召伯徹申伯土田徹治也箋云治者正其井牧定其賦稅爾雅曰田一歲曰菑今江東呼初耕地反草為菑二歲曰新田詩曰于彼新田三歲曰畬易曰不菑畬史記曰魏文侯使李悝作盡地力之教悝苦回反以為地方百里提封九萬畝理田勤謹則畝益三斗不勤則損亦如之地方百里之增減輒為粟百八十萬碩矣必雜五種以備災害力耕數耘收獲如寇盜之至謂促遽之甚恐為風雨損也又曰秦孝公任商鞅鞅以三晉地狹人貧三晉謂韓魏趙三卿今河東道之地秦地廣人寡故草不盡墾地利不盡出於是誘三晉之人利其田宅復三代無知兵事而務本於內而使秦人應敵於外故廢井田制阡陌任其所耕不限多少數年之間國富兵強天下無敵其後韓聞秦之好興事欲疲之乃使水工鄭國聞說秦令鑿涇水自中山西抵瓠口為渠並北山東注洛三百餘里欲以溉田中作而覺秦欲殺國國曰始臣為間然渠成亦秦之利也秦以為然卒使就渠用注慎閼之水溉澤鹵之地四萬頃收背畝一種於是關中為沃野無凶年命曰鄭國渠閼音於據切又曰王翦將行請善田宅園池甚衆始皇曰將行矣何憂貧乎戰國策曰魏叔座為將攻韓趙勝之魏王賞田百萬座曰使士卒不崩直而不倚撓揀不辟者此吳起餘教也鼓之不敢怠倦者臣也王特為臣右手之倦賞臣可也若以有功臣何力之有焉王曰善於是索吳起之後賞田二十萬以座不掩士之跡又與田二十萬漢書朝錯奏曰古者稅民不過什一至秦則不然用商鞅之法改帝王之制一歲屯戍萬計力役三十倍於古田租口賦鹽鐵之利二十倍於古如淳曰秦賣鹽鐵貴故下民受其困或耕豪民之田稅十五如淳曰稅其五故貧民常衣馬牛衣而食犬彘之食又董仲舒說上曰秦用商鞅之法改帝王之制除井田人得賣買富者田連阡陌貧無立錐之地漢興循而未改古井田法雖難猝行宜少近古限人占田以贍不足塞兼井之路然後可善治也上不能用又曰是時富豪皆爭匿財唯卜式尤欲助費於是以式終長者乃召拜為中郎賜爵左庶長田十頃布告天下尊顯以諷百姓又曰貢禹上書曰臣禹年老貧窮家資不滿萬錢妻子糠豆不贍短褐不完有田百三十畝陛下過意徵臣臣賣田十畝以供車馬又曰楊惲免官常不得志乃歌曰田彼南山蕪穢不治種一頃豆落而為萁人生行樂耳須富貴何時又曰張禹為人謙願內殖貨財家以田為業及富貴多買田至四百頃皆涇渭溉灌極膏腴上價又曰寧成曰仕不至二千石賈不至千萬安可比於人乎乃貰貸陂田千餘頃假貧民役使數千家致産數千萬為任俠持吏長短從數十騎其使民威重於郡守又溝洫志曰太始三年趙中大夫白公復奏穿渠引涇水首起谷穀口尾入櫟陽涇渭中溉四千五百餘頃田名曰白渠民歌田曰於河許池陽谷口鄭國在前白渠起後舉鍾為雲決渠為雨涇水一石其泥數斗且溉且糞長我稷黍後漢書曰光武時天下墾田多不以實又戶口年紀互有增減十五年詔下州郡檢覆其事而刺史太守多不平均或優饒豪右侵刻羸弱百姓嗟愁遮道號呼時諸郡各遣使奏事帝見陳留吏牘上有書視之云潁川弘農可問河南南陽不可問帝詰吏由趣吏不肯服抵言長壽街上得之抵欺也帝怒時顯宗為東海公年十二在幄後言曰吏受郡勑當欲以墾田相方耳帝曰即如此何故言河南南陽不可問對曰河南帝城多近臣南陽帝鄉多近親田宅踰制不可為准帝令虎賁將詰問吏吏乃實首服如顯宗對於是遣謁者考實具知奸狀又曰樊重開廣田土三百餘頃其所起廬舍皆有重堂高閣陂渠灌注資至巨萬而賑贍宗族恩加鄉閭外孫何氏兄弟爭財重恥之以田二頃解其忿訟縣中稱美推為三老又曰馬援辭兄況欲就邊郡田牧東觀記曰援以況出為河南太守次兩兄為吏京師見家用不足乃辭況欲就邊郡畜牧也況曰汝大才當晚成良工不示人以朴旦從所好後援辭隗囂歸洛陽居數月而無他職任援以三輔地曠土沃而所將賓客猥多乃上書求屯田上林苑中帝許之東觀漢記曰司隸校尉梁松奏特進防光廖廖子豫兄弟父子並受爵土榮顯冠世多買京師膏腴美田作大廬近帶城郭妨困小民又曰郭丹字少卿南陽人纍世千石父稚為丹買田宅居業丹為司徒視事五年薨詔問丹家時宗正劉匡對曰郭丹為三公典牧州郡田畝不增張璠漢記曰鄭泰字公業少有才略多謀家富於財有田四百頃而食常不足名聞山東華嶠後漢書曰范遷為司徒在公輔有宅數畝田不過一頃推與兄子又曰周燮專精禮易不讀非聖之書不修賀問之好有先人草廬結于岡畔下有陂田常肆力自勤以給非身所耕漁則不食魏志曰夫定國之術在於強兵足食秦人以急農兼天下孝武以屯田定西域此先世之良式也是歲乃募民屯田於許得穀數百萬斛於是州郡例置田官所在積穀征伐四方無軍糧之患遂得以兼滅群凶克平天下又曰鄧艾遷尚書郎時欲廣田蓄穀為滅賊資使艾行陳項已東至壽春艾以為田良水少不足以盡地利宜開河渠可以大積軍糧又通運漕之道乃著濟河論以喻其指又以為昔破黃巾因為屯田積穀許都以制四方今三隅已定事在淮南每大軍征舉運兵過半功費巨億以為大役陳蔡之間土下田良可省許昌左右諸稻田并水東下今淮北二萬人淮南三萬人十二分休常有四萬人且田且守水豐常收三倍於西計除衆費歲完五百萬斛以為軍資六七年間可積三千萬斛於淮上此則十萬之衆五年食也以此乘吳無不克矣宣王善之事皆施行正始三年乃開廣漕渠每東南有事大軍興衆汛舟而下達于江淮資食有儲而無水害艾所建也又曰司馬郎為丞相主簿以為宜復井田往者以民各有纍世之業難中奪之是以至今承大亂之後民人分散土業無主皆為公田宜及此時復之又曰鄭渾遷陽平沛郡太守郡界下濕患水潦百姓饑乏渾於蕭相二縣界興陂堨開稻田郡人皆以為不便渾曰地勢汙下宜溉灌終有魚稻經久之利此豐民之本也遂躬率吏民興立功夫一冬間皆成比年大收頃畝歲增租入倍常民賴其利刻石頌之號曰鄭陂又曰劉靖都督河北諸軍事又修廣戾渠陵大遏水溉灌薊南北三百里使種稻邊民利之蜀志曰初諸葛亮自來成都有田十五頃子弟食自餘饒晉要事曰安帝義熙九年右丞張須元議琅琅及湖熟界有皇后脂澤田四十餘頃參詳悉以借食民南史曰宋王惠兄鑒頗好聚斂惠意不同謂曰何用田為鑒怒曰無田何由得食惠又曰何用食為齊書曰王騫歷黃門郎司徒右長史不事産業有舊田在鍾山八十頃與諸宅及故舊共佃之常謂人曰我不如鄭公業有田四百頃而食常不周以此為愧梁書曰夏侯夔為豫州刺史率軍人於蒼陵立堨溉田千餘頃歲收穀百餘萬石以充儲備兼贍貧人境內賴之也又曰鄧元起少時嘗至西沮田舍有沙門造之乞元起有稻幾二千斛悉以施之時人稱其有大度後魏書曰高允為著作郎太武引見因問允萬機何者為先時多禁封良田又京師游食者衆允因曰臣少也賤所知唯田請言農事古人云地方一里則為田三頃七十畝萬里則田三萬七千頃若勸之則畝益三升不勸則畝損亦如之損益之率為粟二百二十二萬斛況以天下之廣乎若公私有儲雖遇饑年復何憂哉帝善之除田禁悉以授百姓又曰裴延雋遷幽州刺史范陽郡有舊督亢渠徑五十里陽燕郡有故戾陵諸堨廣袤三十里皆廢毀多時水旱不調延雋乃表求營造遂躬自履行相度形勢隨力分督未幾而就溉田百萬餘畝為利十倍百姓賴之北齊書曰帝賜穆提婆晉陽之田斛律光言於朝曰此田神武帝以來常種禾飼馬數千匹以擬寇難今賜提婆無乃闕軍務也由是提婆怨光唐書曰貞元十六年廬群為義成軍節度鄭滑觀察營田使群先寄寓鄭州典質得良田數頃及授節度各以本地契書分付所管令長令召還本主時人稱美又曰起居郎崔覲隱居城固山所有良田分給奴婢令遞日供飲食之費覲與妻家事一不以問但水石自婢而已又曰溫造為河陽節度觀察使復懷州古秦渠三縣棄地悉為良田後造左遷出為朗州刺史至則開後鄉渠九十七里溉田二千頃郡人名其渠曰右史渠范子計然曰請問九田隨世盛衰有水旱貴賤願聞其情計然曰諸田各有名其從一官始以終九官所以設諸田差高下始進退也假令一直錢百金一直錢九百此略可知從一畝至百畝直是大貴之極也孟子曰百畝之田勿奪其時數口之家可以無饑矣又曰易其田疇薄其稅斂民可使富也傅子曰陸田者命懸於天也人力雖修水旱不時則一年功棄矣田制之由人人力茍修則地利可盡天時不如地利地利不如人事呂氏春秋曰魏襄王與群臣飲酒酣王為群臣祝令群臣皆得志史起對曰群臣不肖者得志則不可王曰如西門豹之為人臣也史起對曰魏氏之田也漳水存其傍西門豹不知用是過也明日召史起問漳水猶可以灌鄴田乎對曰臣為之民必大怨臣臣雖死願王使他人遂之王使之為鄴令史起因往為之鄴民大怨欲籍史起史起不敢出避之乃使他人遂為之水已行民大得其利相與歌之曰鄴有聖令號為史公決漳水兮灌鄴旁終古斥鹵生稻梁春秋後語曰趙列侯謂其相公仲建曰寡人所愛可以貴之乎曰富可也貴之則不列侯乃命以田萬畝賜善歌者二人公仲建許諾而不與居一月列侯之代還問曰與之乎曰未有可者家語曰虞芮二國爭田而訟連年不決乃相謂曰西伯仁人盍往質焉入其境則耕者讓畔行者讓路入其朝則士讓為大夫大夫讓為卿虞芮之君曰嘻吾儕小人不可以入君子之朝遂自相與成以其所爭為間田蕭廣濟孝子傳曰郭原平墓下有數十畝田不屬原平每至農月耕者恆裸袒原平不欲使慢其墳墓乃貨家資買此田三農之月輒束帶垂泣躬自耕墾之汜勝之奏曰昔湯有旱災伊尹為區田教民糞種負水澆稼收至畝百石勝之試為之收至畝四十石越絶書曰吳北野禺櫟東所舍大疁者吳王田也又曰富中大塘者勾踐治以為義田也肥饒謂之富中盛弘之荊州記曰桂陽郡界有溫泉其下流有田恆資以浸灌常十二月種至明年三月新穀便登溫液所周正可數畝過此水氣輒泠不復生苗豫章記曰郡江之西岸有槃石下多良田極膏腴者一畝二十斛稻米之精者如玉映徹於器中續搜神記曰陽人姓何忘其名隱遁養志常至田舍人收穫在場上忽有一人長一丈黃踈單衣角巾來詣之翩翻舉其兩手並儛而來語何云君常見韶舞不足舞也便去何尋逐遙向一山山有一穴裁容人其人即入穴何亦隨之初入甚急前輒開廣便失人見良田數十頃何遂墾作以為世業子孫於今賴之崔實政論曰昔者聖王立井田之制分口耦地各相副適使人饑飽不偏勞逸齊均富者不足僣差貧者無所企慕王朗上求賑貸民表曰昔在西京有鄠杜膏腴之饒池陽谷口之利涇渭二川之水鄭國白渠之溉雲雨年成糞與灌並畝貨一金號為陸海應璩書曰是以忽此蘇子帶郭之業求彼孫叔寢丘之地故求遠田在關之西南臨洛水北據芒山曹植表曰乞城內田及城邊好田盡所賜百年力者臣雖生自至尊然心甘田野性樂稼穡又籍田論曰營疇萬畝厥田上上經以大陌帶以橫阡奇柳夾路名果被園宰農實掌是謂公田唐明皇雜録曰上命宇文融為招田使融方恣睢稍不己附者必加誣譖密奏以為盧從願廣致田園有地數百頃上素器重亦倚為相者數矣而又族望官婚鼎盛於一時故上亦重言其罪但目從願為多田翁
