body:
  text: 飲食部九粽晉書曰廣州刺史盧循遣使遺劉裕益智粽子裕荅以續命湯宋書曰後魏太武至彭城永酒及甘橘張暢宣孝武帝旨致螺盃雜粽南土所珍齊書曰范雲永明十年使魏魏人李彪宣命至雲所甚見稱美彪為設甘蔗黃粽隨盡復益彪謂曰范散騎小儉之一盡不可復得梁書曰張纘初往雍州資產悉留江陵性既貪婪南中貲賄填積及死湘東王皆使收之書二萬卷並摙還齊摙音輦珍寶財貨悉付庫以粽密之屬還其家風土記曰俗以菰葉褁黍米以淳濃灰汁煮之令爛熟於五月五日及夏至啖之一名粽一名角黍蓋取陰陽尚相裏未分散之時像也續齊諧記曰屈原以五月五日投汨羅而死楚人哀之每至此日取竹筒貯米投水以祭之漢建武中長沙區迴白日忽見士人自稱三閭大夫謂迴曰君常見祭甚誠但常年所遺俱為蛟龍所竊今君惠可以練樹葉塞其上以綵絲纏縛之此二物蛟龍所憚也迴謹依旨今世人五日作粽并帶練葉及五綵絲皆汨羅之遺風異苑云粽屈原婦所作也䬳宋書曰文帝崩郭原平號慟日食麥䬳一枚如此五日人曰誰非王臣何獨如此原平泣而荅曰吾家見異先朝蒙褒贊之賞不能報恩私心感慟耳齊書曰衡陽王鈞年五歲所生嫗貴人病便知慘悴左右依常以五色䬳飴之不肯食曰須待姨差又曰虞悰少以孝聞父病不欲見人雖子弟亦不得前時悰年十二三晝夜伏戶外問內豎消息未知輒嗚咽流涕如此者百餘日及亡終喪唯日食麥䬳二枚南史曰沈眾陳武帝時兼起部尚書監起太極殿恒臥布袍芒履以麻繩為帶又囊麥䬳以噉范汪祠制曰仲夏薦角黍䬳夏統別傳注曰蘞初生合米擣作䬳䭔埤蒼曰䭔膏䭔也笑林曰南方人至京師者人戒之曰汝得物唯食慎勿問主人入門內見馬屎便食之覺臭乃止後詣貴官為設䭔因視曰戒故昔且當勿食時鏡新書曰粔籹密餌即糖䭔龍山食有糖䭔菊酒
