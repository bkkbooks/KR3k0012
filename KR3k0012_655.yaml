body:
  text: 釋部二奉佛袁宏後漢紀曰楚王英好遊俠交通賓客晚節喜黃老修浮圖祠八年上臨辟雍禮畢詔天下死罪得以縑贖罪英遣郎中令詣彭城曰臣託在藩蔽無以率先天下過惡素積喜聞大恩謹奉黃縑二十五匹白紈五匹以贖其愆楚相以聞詔曰楚王誦黃老之微言尚浮圖之仁祠潔齋三月與神為誓有何嫌懼而贖其罪令還縑紈以供桑門之盛饌晉書曰何充性好釋典崇修佛寺供給沙門以數百縻費巨億而不吝也親友至貧乏無所施遺以此獲譏於世阮𥙿常戲之曰卿志大宇宙男邁終古充問其故𥙿曰我圖數千戶郡尚不能得卿圖作佛不亦大乎于時郗愔及弟曇奉天師道而充與弟準崇信釋氏謝萬譏之云一郗諂於道二何佞於佛世説亦云又曰王恭性雖抗直而暗於機會自矜貴不間用兵尤信佛道臨刑猶誦經神色無懼宋書謝靈運傳曰會稽太守孟顗事佛精懇而為靈運所譏嘗謂顗曰得道應須惠業文人生天當在靈運前成佛必在靈運後顗深恨此言又曰袁粲字景倩幼孤祖哀之名曰愍孫孝武即位稍遷尚書吏部郎文帝諱日君臣並於中興寺八關齋中食竟愍孫別與黃門郎張淹更進魚肉食尚書令何尚之奉法素謹密以白孝武並免官又曰范泰暮年事佛甚精於宅西立祗洹精舍又曰宋明帝頗好玄理以周顒有辭義引入殿內親近宿直帝所為慘毒之事顒不敢顯誦經中因緣罪福事帝亦為之止顒音辭辨麗長於佛理著三宗論言空假義西涼州智林道人遺顒書深相贊美言捉塵尾來四十餘載頗見宗録唯此途白黑無一又得者為之發病非意此音猥來入耳其見重如此齊書曰竟陵王子良嘗招致名僧講論佛法造經唄新聲又文惠太子同好釋氏甚相友悌子良敬信尤篤數於邸園營齋戒大集朝臣衆僧至賦食行水或躬親其事世頗以為失宰相體武帝不豫子良啓進沙門於殿戶前誦經武帝為感夢見優曇鉢花于經案宣旨使御府以銅為華插御床四角又曰晉安王子懋字雲昌武帝第七子也廉讓好學年七歲時母阮淑媛嘗病危篤請僧行道有獻花供佛者衆僧以銅罌盛水漬其莖欲花不萎子懋流涕禮佛曰若使阿姨因此和勝願諸佛令花竟齋不萎七日齋畢花更鮮紅視罌中稍有根鬚又曰吳興有項羽神護郡廳太守到郡必須祀以軛下牛李安人奉佛法不與神牛著履上廳事又於廳上設入關齋俄而牛死又曰滕曇恭南昌人也年五歲母楊氏患熱思食寒瓜土俗所不産曇恭歷訪不能得銜悲哀切俄遇一桑門問其故曇恭具以告桑門曰我有兩瓜分一相遺還以與母舉室驚異尋訪桑門莫知所在及父母卒晝夜哀慟時忽有神光自門而起俄見佛像及夾侍之儀容光顯著自門而入曇恭家人大小咸共禮拜久之乃滅遠近道俗咸傳之梁書曰廬江何伯璵與弟幼璵俱厲節操伯璵卒幼璵好佛法剪落長齋持行精苦兄弟年並八十餘又曰范雲從父母兄縝字子真時竟陵王子良盛招賓客縝亦預焉子良精信釋教而縝盛稱無佛子良曰君不信因果何得有富貴貧賤縝答曰人生如樹花同發隨風而墮自有拂簾幌墮於茵席之上有閡籬墻落於溷糞之中墮茵席者殿下是也落糞溷者下官是也貴賤雖復殊途因果竟在何處乎子良不能屈又曰武帝大弘佛教而親自講説太子亦素信三寶遍覽衆經乃於宮內別立慧義殿專為法集之所招引名僧自立三諦法義普通元年甘露降於慧義殿咸以為至德所感又曰何胤居虎丘西寺講經學僧徒隨之常禁殺有虞人逐鹿徑來趍胤伏不動又有異鳥如鶴紅色集講堂馴狎如家禽初開善寺藏法師與胤遇於秦望山後還都卒於鍾山死曰胤在波若寺見一名僧授胤香爐奩并函書曰貧道發自楊都呈何居士言訖失所在開函乃是大莊嚴論世中未有訪之香爐乃藏公所常用又於寺內立明珠柱柱乃七日夜放光昭明太子欽其德遣舍人何思澄致手令以褒美之又曰建平王大球簡文第十七子也性明惠夙成初侯景圍臺城武帝素歸心釋教每發誓願恆云若有衆生應受諸苦諱身當代時大球年甫七歲聞而驚謂母曰官家尚爾兒安敢辭乃六時禮佛亦曰凡有衆生應獲苦報悉大球代受其早惠如此又曰大中元年都下疫甚帝於重雲殿為萬姓設救苦齋以身為禱九日辛未幸同泰寺設四部無遮大會上釋服御法衣清淨大捨以便省為房用素瓦器乘小車私人執役甲午升法座為大衆講涅槃經癸卯群臣以億萬奉贖衆僧默然乙酉百辟詣寺東門奉表請還宮三請乃許帝三答書前後並稱頓首中大同元年三月幸同泰寺講三惠經乃捨身為奴皇太子已下群臣出錢億億萬奉贖是夜同泰寺為天火所燒略盡二年帝升光嚴殿講三惠經又捨身群臣以億萬奉贖僧衆默然百辟詣鳳莊門上表請帝帝三答皆稱頓首丁亥服袞冕還宮高祖自初捨身後或書經坐禪盡日不食又於元光殿坐師子座講金字經又曰貞陽侯明俘執至魏魏帝引見明及諸將送晉陽渤海王高澄禮明甚重謂曰王與梁主和好十有餘年聞彼禮佛文常云為魏主及先王此甚是梁主厚意不謂一朝失信致使紛擾因欲與梁通和又曰初武帝軍東下用不足建安王偉取襄陽寺銅佛以為錢富僧藏鏹多加毒害後遂惡疾性多恩惠尤愍窮之每祁寒積雪則遣人載樵米隨乏絶者賦給之晚年崇信佛理尤精玄學著二暗義製性情幾神等論義僧寵及周捨殷鈞陸倕並名精解而不能屈又曰到溉少有美名家門雍睦兄弟特相友愛初與弟洽洹同居一齋洽卒後便捨宅為寺蔣山有延賢寺溉家世所立溉所得祿俸皆充二寺因斷腥膻終身蔬食別營小室朝夕僧徒禮誦武帝每月三致淨饌恩禮甚篤性不好交遊及臥疾門可羅雀太清二年卒臨終勒子孫薄葬之禮言訖便屏家人請僧讀經讚唄及卒顏色如恆手屈二指即佛道所云得果也又曰周弘正善玄理為當世所宗藏法師於開善寺講説門徒數百弘正年少未知名著紅禈錦絞髻踞門而聽衆人蔑之弗譴也既而乘間進難舉座盡傾聽法師疑非世人覘知大相賞狎又曰劉慧斐字宣文彭城人也少博學能屬文起家梁安成王法曹行參軍常還都途經尋陽遊於匡山遇處士張孝秀相得甚歡遂有終焉之志因不仕居東林寺又於山北構園一所號曰離垢園時人仍謂為離垢先生慧斐先明釋典攻篆隸在山手寫佛經二千餘卷常所續者百餘卷晝夜行道孜孜不怠遠近欽慕之簡文臨江州遺以几杖論者云自遠法師沒後將二百年始有張劉之盛矣又曰庾詵普通中詔以為黃門侍郎稱疾不起晚年尤遵釋教宅內立道場環繞禮懺六時不輟誦法華經每日一遍後夜中忽見一道人自稱願公容止甚異呼詵為上行先生授香而去中大通四年因寢忽驚覺曰願公復來不可久駐顏色不變言終而亡舉室咸聞空中唱上行先生已去彌弛淨域矣武帝聞而下詔諡節處士以顯高烈又曰張孝秀字文逸長六尺餘白晳美鬚眉仕州中從事史後歸山居東林寺有田數十頃部曲數百人率以力田盡供山衆博涉群書專精釋典僧有虧戒律者集衆佛前作羯磨而笞之多能改過又曰馬樞字理要扶風郿人也博極經史尤善佛教邵陵王綸為南徐州剌史素聞其名引為學士綸時自講大品經令樞講維摩老子周易同日發題道俗聽者二千人王欲極觀優劣乃謂衆曰與馬學士論議必使屈服不得空立主客於是學者各起問端樞依次剖判開其宗旨論者拱默聽授而已綸甚佳之陳書曰後主沈皇后諱婺華身居儉約唯尋閲圖史及釋典為事常遇歲旱自暴而誦佛經應時雨降陳亡入隋及煬帝崩自廣陵過江於毗陵天靜寺為尼名觀音又曰孫瑒常於山齋設講肆集玄儒之士冬夏資奉為學者所稱而處己率易不以名位驕物時皇興寺朗法師該通釋典瑒每造講筵時有抗論法侶莫不傾心又曰徐陵少而崇信釋教經論多所解釋後主在東宮令陵講大品經義學名僧自遠雲集每講筵商較四座莫能與之抗又曰徐孝克後東遊居錢塘之仕義里與論釋典遂通三論每日二時旦講佛經晚講禮傳道俗受旨數百人天嘉中除剡令非其好也太建四年徵為祕書丞不就乃蔬食長齋持菩薩戒晝夜講誦法華經陳亡入長安隋文帝聞名行召令於尚書都堂講金剛般若經尋授國子博士以疾卒年七十三臨終正坐念佛室內有非常香氣鄰里皆驚異之又曰傅縡幼聰敏七歲誦古詩賦至十餘萬言長好學能屬文陳文帝召為撰史學士縡篤信佛教從與皇惠明法師三論盡通其學初有大心寺曇法師著無諍論以詆之縡乃為明道論用釋其難隋書曰姚察煬帝即位授太子內舍人大業二年終于東都遺命薄葬每日設清水齋食菜果菜初察欲讀一藏經並已究竟將終曾無痛惱但西向坐正念云一切空寂其後身體柔軟顏色如恆唐書曰白居易會昌中罷太子少傅致仕與香山僧如滿結香火社每肩輿往來自稱香山居士常寫其文集送江州東西二林寺洛城香山聖善寺如佛書雜傳例流行之遺命葬於香山如滿師塔之側又曰裴休家世奉佛休尤深於釋典太原鳳翔近名山多僧寺視事之隙遊踐山林與義學僧講求佛理中年後不食葷血恆齋戒屏嗜欲香爐貝典不離齋中詠歌贊唄以為法樂與尚書紇干泉皆以法號相字時人重其高潔而鄙其太過又曰元和中憲宗迎鳳翔法門寺佛骨至京師留禁中三日乃送諸寺王公士庶奔走施捨如不及韓愈上疏極陳其弊貶潮州剌史洛陽伽藍記曰奉朝請孟仲暉者武威人也父金城太守暉志性聰朗學兼釋氏四諦之義窮其指歸恆與沙門論議時號為玄宗先生談藪曰王玄謨爽邁不群北征失律法當死夢人謂之曰汝誦觀音經千遍可免禍謨曰命懸旦夕千遍何由可得乃口授云觀世音南無佛與佛有因與佛有緣佛法相緣常樂我淨朝念觀世音暮念觀世音念念從心起念佛不離心而誦滿千遍將就戮將軍沈慶之諫遂免又曰梁高祖崇信佛道於建業起同泰寺又於故宅立光宅寺皆窮極工巧殫竭財力百姓怨苦殆不聊生自以其身施同泰寺為奴朝廷共斂珍寶贖之有事佛精苦者輒加以菩薩之號其下書皆云皇帝菩薩又曰崔光常晝坐讀佛經有鴿入懷緣臂上肩久之道俗嗟異
