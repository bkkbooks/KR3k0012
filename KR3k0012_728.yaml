body:
  text: 方術部八筮上說文曰木筭易卦用蓍也從竹古文也周禮春官上曰筮人掌三易以辨九筮之名一曰連山二曰歸藏三曰周易九筮之名一曰巫更二曰巫咸三曰巫式四曰巫目五曰巫易六曰巫比七曰巫祠八曰巫參九曰巫𡑡以辨吉凶鄭玄曰此九巫讀皆當為筮字之誤也更謂筮遷都邑也凡國之事先筮而後卜禮記典禮曰假爾大龜有常假爾太筮有常卜筮不過三求吉不過三也卜筮不相襲也卜不吉則又筮筮不吉則又卜是瀆龜筮卜筮者先聖之所以使民信時日敬鬼神畏法令決嫌疑定猶豫也又表記曰天子無筮謂出征巡狩也天子至尊大事皆用卜春秋傳曰先王卜征伍年襲其祥也諸侯有守筮守筮守國之筮也有事則用天子道以筮諸侯非其國不以筮左傳莊公日初懿氏卜妻敬仲懿氏陳大夫也龜曰卜其妻占之曰吉是謂鳳皇于飛和鳴鏘鏘雄曰鳳雌雄相和而鳴鏘鏘然猶敬仲夫妻相隨適齊有聲譽有媯之後將育于姜媯陳姓也姜齊姓也五世其昌並為正卿八世之後莫之與京京大也陳厲公蔡出也姊妹之子曰出也故蔡人殺五父而立之五父陳它生敬仲其少也周內史有以周易見陳侯者周太史也陳侯使筮之遇觀之否曰是謂觀國之光利用賓于王此其代陳有國乎不在此其在異國乎非在其身在其子孫光遠而自他有耀者也坤土也巽風也乾天也風為天於土上山也巽髮為乾故曰風為天自二至四有艮象艮為山也有山之材而照之以天光於是乎居土上故曰觀國之光利用賓于王庭實旅百奉之以玉帛天地之美具焉故曰利用賓于王艮為門庭乾為金玉坤為布帛諸侯朝王陳贄幣之象也旅陳也百言物備也已矣猶有觀焉故曰其在後乎因觀文以博占故言猶有觀非在已之言故知在子孫也風行而著於土故曰其在異國乎若在異國必姜姓也姜太嶽之後也山嶽則配天物莫能兩大陳衰此其昌乎變而象艮故知當興於太嶽之後也得太嶽之權則有配天之大功故知陳必衰也又閔公曰晉獻公以魏賜畢萬卜偃曰畢萬之後必大卜偃晉掌卜大夫也萬盈數也魏大名也以是始賞天啟之矣天子曰兆民諸侯曰萬民今名之大以從盈數其必有眾初畢萬筮仕於晉遇屯之比辛廖占之吉辛廖晉大夫也屯固比入吉孰大焉其必蕃昌震為土車從馬足居之兄長之母覆之眾歸之六體不可易合而能固安而能殺此公侯之封也公侯之子孫必復其始又閔公曰成季之將生也桓公使卜楚丘之父卜之曰男也其名曰友在公之右在右言用事閒于兩社為公室輔兩社同社毫社也兩社之閒朝廷執政所在季氏亡則魯不昌又筮之遇大有之乾曰同復于父敬如君所及生有文在其手曰友遂以命之又僖上曰秦伯伐晉卜徙父筮之吉涉河侯車敗詰之秦伯涉河則晉侯車敗則秦伯不解謂敗在己故詰之對曰乃大吉也三敗必獲晉君其卦遇蠱曰千乘三去三去之餘獲其雄狐夫蠱必其君也於周易卦利涉大川往有事也亦秦勝晉之卦也今此所言蓋卜筮書雜辭以狐蟲為君其義欲以喻晉惠公其象未聞蠱之貞風也其悔山也內卦為貞外卦為悔歲云秋矣我落具實而取其材所以克也今歲已秋風吹落山木之實則為人所取實落材亡不敗何待三敗及韓晉侯車三壞也又日初晉獻公筮嫁伯姬於秦遇歸妹之睽史蘇占之曰不吉其繇曰士卦羊亦無血也女承筐亦無貺也周易歸妹上六爻辭也衁血也貺賜也刲羊士之功承筐筐女之力也離為中女震為長男故稱上女也西鄰責言不可償也將嫁女於西而遇不吉之卦故知有責讓之言不可報償也歸妹之睽猶無相也歸妹女嫁之卦也睽乖離之象故曰無相相助也震之離亦離之震為雷為火為嬴敗姬車說其輹火焚其旗不利行師敗于宗丘歸妹睽孤寇之張弧姪其從姑六年其逋逃歸其國而棄其家明年其死於高梁之虛及惠公之在秦曰先君若從史蘇之占吾不及此矣韓𥳑侍曰龜象也筮數也物生而後有象象而後有滋滋而後有數先君之敗德其可數乎史蘇是占勿從何益又僖中曰狐偃言於晉侯曰求諸侯莫如勤王諸侯信之且大義也繼文之業而信宣於諸侯今為可矣使卜偃卜之曰吉遇黃帝戰于阪泉之兆公曰吾不堪也對曰周禮未改今之王古之帝也公曰筮之遇大有之睽曰吉遇公用享于天子之卦戰克而王饗吉孰大焉且是卦也天為澤以當日天子降心以逆公不亦可乎大有去睽而復亦其所也又成下曰晉楚將戰苗賁皇言於晉侯曰楚之良在其中軍王族而已請分良以擊其左右而三軍萃於王卒必大敗之公曰筮之史曰吉其卦遇復曰南國蹙射其元王中厥目復陽長之卦陽氣起子南行推陰故曰南國蹙也南國蹙勢則離受其咎離為諸侯又為日陽氣激南飛失之象故曰射其元國蹙王傷不敗何待公從之又襄元曰穆姜薨于東宮太子宮也穆姜嬌淫僑如欲廢成公徙從居東宮事在成十六年始往而筮之遇艮之八艮下艮上艮周禮大卜掌三易然則雜用連山歸藏周易也二易皆亡以八為占故言遇艮之八也史曰是謂艮之隨震下兌上隨史疑占易遇八為不利故更以周易占變爻得隨卦而論之隨其出也史謂隨非閑固之卦君必速出姜曰亡亡無也是於周易有曰隨元亨利貞無咎元善之長也亨嘉之會也利義之和也貞事之幹也體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事然故不可誣也是以雖隨旡咎今我婦人而與於亂固在下位婦人卑於丈夫而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利棄位而姣姣淫之別名不可謂貞有四德者雖隨而無咎我皆無之豈隨也哉我則取惡能無咎乎必死於此弗得出矣又襄四曰齊棠公之妻東郭偃之姊也棠公齊棠邑大夫可也偃臣崔武子棠公死偃御武子以弔焉見棠姜而美之使偃娶之為已娶也偃曰男女辨姓今君出自丁成出自桓不可武子筮之遇困之太過史皆曰吉示陳文子曰夫從風坎為中男故曰夫也變而為巽故曰從風也風隕妻不可娶也風能隕落變隕落故不可也且其繇曰困于石據于蒺䔧入于其宮不見其妻凶用六三爻辭也困于石往不濟也據于䔧蒺所恃傷也入于其宮不見其妻凶無所歸也崔子曰嫠也何害先夫當之矣寡婦曰嫠言棠公己當此凶也遂取之又昭二曰初穆子之生也莊叔以周易筮之莊叔穆子父得臣也遇明夷之謙以示卜楚丘楚丘卜人姓名也楚丘曰是將行行出奔也而歸為子祀奉祭祀也以讒人入其名曰牛卒以餒死明夷日也曰之數十故有十時亦當十位自王已下其二為公其三為卿曰上其中食日為二旦日為三明夷之謙明而未融其當旦乎故曰為子祀曰之謙當鳥故曰明夷于飛明而未融故曰垂其翼象日之動故曰君子于行當三在旦故曰三日不食離火也艮山也離為火火焚山山敗於人為言敗言為讒故曰有攸往主人有言言必讒也純離為牛世亂讒勝勝將適離山焚則離勝故曰其名曰牛謙不足飛不翔垂不峻翼不廣故曰其為子後乎吾子亞卿也抑少不終又曰衛襄公嬖人媚姶上音周下音闔生子名之曰元孔成子以周易筮之曰元尚享衛國主其社稷遇屯又曰余尚立縶尚克嘉之遇屯之比以示史朝史朝曰元亨又何疑焉成子曰非長之謂乎對曰康叔名之可謂長矣孟非人也將不列於宗不可謂長且其繇曰利建侯嗣吉何建建非嗣也二卦皆云子其建之康叔命之二卦告之筮襲於夢武王所用也弗從何為又昭三日南蒯之將叛也枚筮之遇坤之比曰黃裳元吉以為大吉也示子服惠伯曰即欲有事何如惠伯曰吾嘗學此矣忠信之事則可不然必敗外疆內溫忠也和以卒貞信也故曰黃裳元吉黃中之色也裳下之飾也元善之長也中不忠不得其色下不共不得其飾事不善不得其極外內倡和為忠率事以信為共供養三德為善非此三者弗當且夫易不可以占險將何事也且可飾乎中美能黃上美為元下美則裳參成可筮猶有闕也筮雖吉未也又哀下曰衛侯夢于北宮見人登昆吾之觀被髮北面而譟曰登此昆吾之虛緜緜生之爪余為渾良夫叫天無辜公親筮之胥彌赦占之曰不害與之邑寘之而逃奔宋衛侯貞卜其繇曰如魚竀音赬尾衡流而方羊裔焉大國滅之將亡闔門塞竇乃自後踰又曰巴人伐楚圍鄾初右司馬子國之卜也觀瞻曰如志故命之及巴師至將卜帥王曰寧如志何卜焉使帥師而行敗巴師于鄾故封子國於析君子曰惠王知志夏書曰官占惟先蔽志昆命于元龜其是之謂乎志曰聖人不煩卜筮惠王其有焉又曰晉荀瑤伐齊將戰長武子請卜知伯曰君告于天子而卜之以守龜於宗祧吉矣吾又何卜焉且齊人取我英丘君命瑤非敢燿武也治英丘也以辭伐罪足矣何必卜周易上繫辭曰大衍之數五十其用四十有九王弼曰演天地之數所賴者五十也其用四十有九則其一不用而用以之通非數而數以之成斯易之大極也四十有九數之極也夫無不可以無明必因於有故常於有物之極而必明其所由之宗也分而為二以象兩掛一以象三揲之以四以象四時歸奇於扐以象閏五歲再閏故再扐而後掛奇凡四揲之餘不足復揲者也分而為二既揲之餘合掛於一故曰再扐而後掛几閏十九年七閏為一章五歲再閏者二故略舉其凡也天數五五奇也地數五五奇合為二十五五位相得而各有合天數二十有五地數三十五耦合為三十凡天地之數五十有五此所以成變化而行鬼神也變化以此成鬼神以此行乾之策二百一十有六陽爻六一爻三十六策六爻二百一十六策坤之策百四十有四陰爻六一爻二十四策六爻百四十四策凡三百有六十當期之日二篇之策萬有一千五百二十當萬物之數也二篇三百八十四爻陰陽各半合萬一千五百二十策是故四營而成易分而為二以象兩一營也卦一以象三二營也揲之以四三營也歸奇於扐四營也十有八變而成卦八卦而小成引而伸之伸之六十四卦觸類而長之天下之能事畢矣顯道顯明也神德行由神以成其用是故可與酬酢可與祐神矣可以應對萬物之求助成神化之助也酬酢應對也又曰耆之德圓而神卦之德方以知神以知來知以藏往探賾索隱鉤深致遠以定天下之吉凶成天下之亹亹者莫大乎蓍龜歸藏曰蓍末大於本為上吉蒿末大於本次吉荊末大於本次吉箭末大於本次吉竹未大於本次吉蓍一五神蒿二四神荊三三神箭四二神竹五一神筮五犯皆臧五筮之神明皆聚焉洪範五行傳曰若煩數溷瀆或不精嚴神不告也或觀卦察兆占不得也或龜不神蓍不靈此其所以過差聖人不得專用也龜筮共違于人神靈不祐也漢書曰宣帝八月飲酎行祠孝昭廟先驅旄頭劍挺墮首拂泥中刃向乘輿車馬驚於是召梁丘賀筮之有兵謀不吉上還使有司行祠是時霍氏外孫代郡太守任宣坐謀反誅宣子章為公車丞亡在渭城中夜玄服入廟居郎閒執戟立廟門待上至欲為逆事發伏誅後漢書曰許曼者汝南平輿人也祖父峻字季山善卜占之術多有顯驗時人方之前代京房自云少嘗篤病三年不愈乃謁太山請命太山主人生死故請命也行遇道士張巨君授以方術所著易林至今行於代曼少傳峻學桓帝時隴西太守馬緄始拜郡開綬筒有兩赤虵分南北走緄令曼筮之卦成象曼曰三歲之後君當為邊將官有東名當東北行三千里復五年更為大將軍南征延熹元年緄出為遼東太守討鮮卑至五年復拜車騎將軍擊武陵蠻賊皆如占其餘多此類云東觀漢記曰沛獻王輔善京氏易永平五年京師少雨上饗雲臺自作卦以周易林占之其䟽曰蟻封穴戶大雨將至上以問輔輔上書曰蹇艮下坎上艮為山坎為水山出雲為雨蟻穴居知雨將至故以蟻為興又曰孝順梁皇后永建三年春三月丙午選入掖庭相工通見之瞿然驚駭卻再拜賀曰此所謂日角偃月相之極貴臣所未嘗見太史卜之兆得戴房又筮之得坤之比又曰明德皇后嘗久病至卜者家為卦問咎祟所在卜者卦定釋蓍仰天歎息卜者乃曰此女明年小疾必將貴遂為帝妃不可言也魏志曰管輅父為利漕利漕民郭恩兄弟三人皆得躄疾不知何故使輅筮其所由輅曰卦中有君本墓中有女鬼非君伯母當叔母也昔飢荒之世當有利其數斗米者排著井中嘖嘖有聲推一大石下破其頭孤魂冤痛自訴於天於是恩涕泣服罪又曰管輅往見安平太守王基基令作卦輅曰當有賤婦人生一男兒墮地便走入竈中死又床上當有一大蛇銜筆小大共視須臾便去又烏來入室與鷰共鬥鷰死烏去有此三怪基大驚問其吉凶輅曰直官舍久遠魑魅魍魎為怪耳兒生便走非能自走直宋無忌之妖將其入竈也大蛇銜筆直老書佐耳鳥與鷰鬥直老鈴下耳今卦見其象而不見其凶非妖咎之徵自無所憂也後卒無患又曰館陶令諸葛原遷新興太守管輅往祖餞賓客並會原自起取鷰卵蜂窠蜘蛛著於器中使射覆卦成輅曰第一物含氣須變依于宇堂雄雌以形分翼翅舒張此鷰卵也第二物家室倒懸門戶眾多藏精育毒得秋乃化此蜂窠也第三物觳觫長足吐絲成羅尋網求食利在昏夜此蜘蛛也舉坐驚歎又日管輅舉秀才吏部尚書何晏請之曰聞君蓍爻神妙試為作一卦知位當至三公不又問連夜夢青蠅數十頭來鼻上驅之不肯去有何意故輅曰夫飛號天下賤鳥及其在林食椹則懷我好普況輅心非草木不敢不盡忠昔元凱之弼重華宣慈惠和周公之翼成王坐而待旦故能流光六合萬國咸寧此乃履道之休應非卜筮之所明也今君侯位重山嶽勢若雷電而懷德者鮮畏威者眾殆非小心翼翼多福之人又鼻者艮此天中之山臣松之案相書鼻為天中鼻有山象故曰天中之山高而不危所以長守貴也今青蠅臭惡而集之焉位峻者顛輕豪者亡不可不思害盈之數盛衰之期是故山在地中曰謙雷在天上曰壯謙則裒多益寡壯則非禮不履未有損己而不光大行非而不傷敗願君侯上追文王六爻之旨下思尼父彖象之義然後三公可決青蠅可驅也又管輅過魏郡太守鍾毓共論易議輅因言卜可知君生死之日毓使筮其生日月如言無蹉跌毓大愕曰君可畏人也命以付天不以付君遂不復問又曰平原太守劉邠取印囊及山雞毛著器中使筮輅曰內方外圓五色成文含寶守信出則有章此印囊也高岳巖巖有鳥朱身羽翼玄黃鳴不失晨此山雞毛也又曰清河令徐季龍使人行獵令管輅筮其所得輅曰當獲其小獸復非食禽雖有爪牙微而不疆雖有文章蔚而不明非虎非雉其名曰狸獵人暮歸果如輅言又曰鄧艾當伐蜀夢坐山上而有流水以問殄虜護軍袁紹紹曰易卦山上有水曰蹇蹇繇曰蹇利西南不利東北孔子曰蹇利西南往有功也不利東北其道窮也往必剋蜀殆不還乎艾憮然不樂吳志曰虞翻字仲翔會稽人嘗與孔融書示以所著易注融荅書曰聞延陵之理樂覩吾子之理易乃知東南之美者非徒會稽之竹箭也可謂探賾窮通矣關羽既敗權使筮遇節之臨翻曰不出三日必當斷頭果如其言權曰卿不及伏義可與東方朔為比矣又曰陸杭之克步闡孫皓意張乃使尚廣筮并天下遇同人之頤對曰吉庚子歲青蓋當入洛陽故皓不脩其政而常有窺上國之志王隱晉書曰淳于智字叔平濟北人也性沉深有思義少為諸生善易高平劉柔夜臥鼠齧其左手中指意甚惡之以問智智為筮之曰鼠本欲殺君而不能當相為使之反死乃以朱書其手腕橫文後二寸為田字辟方一寸二分使夜露手臥以其明有大鼠伏死手前譙國夏侯藻母病因五鼓中出詣智卜有一狐當門向之嗥喚藻愁愕遂馳詣智智曰其禍甚急君速歸在狐嗥處撫心啼哭令家人驚怪大小畢出一人不出啼哭勿休然後其禍僅可救也藻如之母亦扶病而出啼家人既集堂屋五閒捽然暴崩護軍張劭母病篤智筮之使西出市外猴繫母臂令傍人搥拍恒使作聲三日三夜放去劭從之其猴出門即為犬所咋死母於此漸差又曰上黨鮑瑗家多喪病貧苦或謂之曰淳于叔平神人也君何不試就卜知禍所在瑗性質直不信卜筮曰人生有命豈卜筮所移會智適來應思遠謂之曰君有通靈之思而但為貴人用此君寒士貧苦多屯蹇可為一卦智乃令詹作卦卦成謂瑗曰為君安宅者女子耶瑗曰是也此人安宅失宜既害其身又令君不利君舍東北有大桑樹君徑至市入門數十步當有一人持新馬鞭者便就請買還以懸此桑樹三年當暴得財也瑗承其言詣市果得馬鞭懸之正三年浚井得錢十萬銅鐵雜器復可二十餘萬於是家業用展病者亦愈按神記同又曰韓友字光景廬江舒人也善卜占行京費厭勝之術龍舒長鄧子林婦病積年垂死醫巫皆息友為筮之使畫作野豬象著臥處屏風上一宿覺佳於是遂差舒縣廷椽王睦病卒已復魄友為卜之令以丹畫板作日月置床頭及臥虎皮馬鄣泥登時大愈劉世則女病鬼魅積年巫為祈禱伐空冢故城閒得鼉數十猶不差友筮之令作布囊女發時張囊著䆫牖閒友閉戶作氣若有所驅逐斯須之閒囊大脹如吹葱葉因便敗女仍大發友乃便作皮囊二枚沓張之施如前囊復脹滿因急縛囊口懸著樹閒二十許日漸消下開視有一二斤毛狀如狐毛女遂大差
