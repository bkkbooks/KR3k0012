body:
  text: 兵部七十六刀上釋名曰刀到也以斬伐到其所乃擊之也其末曰鋒言若蜂刺之毒利也其本曰環形似環也其室曰削削峭也其形峭殼褁刀體也室口之飾曰琫琫捧也捧來口也下末之飾曰琕琕卑也在下之言也短刀曰拍髀帶時拍體旁也又曰露拍言露見也佩刀在佩旁之刀也或曰容刀為刀形而幾刃備容儀而已剪刀剪進前也書刀給書簡札有所刊削之刀也封刀鉸刀皆隨時名之也説文曰刀兵也象形也鍔五各切刀劍刃也削髀也欹劂曲刀也鞞布頂切剞居綺切劂居衛切字林曰琫佩刀下飾也天子以玉諸侯以金琕佩刀飾也太公兵法曰刀之神名曰脫光尚書曰赤刀大訓弘壁琬琰在西序孔安國注曰寶刀赤刀削也大訓虞書也詩曰執其鸞刀又曰何以舟之維玉及瑤鞞琫容刀舟帶也禮記曰割刀之用鸞刀之貴貴其義也左傳曰子皮欲使尹何為宰子産曰猶未能操刀而使割也穀梁曰孟勞魯之寶刀也論語曰孔子之武城聞弦歌之聲夫子莞爾而笑曰割雞焉用牛刀春秋繁露曰禮之所為興也刀之在右白虎之象也春秋演孔圖曰八政不中則天雨刀史記曰郭解姊子負解之勢與人飲使之釂子削切非其任強灌之人怒拔刀刺殺解姊子亡去漢書曰昭帝遣李陵故人隴西任立政等三人俱至胸奴招陵立政等至單于置酒賜漢使者李陵衛律皆侍坐立政等見陵未得私語即目視陵而數自循其刀環握其足陰諭之言可歸漢也又曰龔遂為渤海太守民有帶持刀劍者使賣劍買牛賣刀買犢可為帶牛而佩犢者也又曰蓋寬饒奏事上以為怨謗下吏寬饒引佩刀自剄北闕下衆莫不憐之又曰李廣利為二師將軍征大宛軍中無水拔佩刀刺山飛泉涌出又曰王尊為東平王相王曰願觀相國佩刀尊前引刀視王後漢書班固與弟超書曰竇侍中遺仲升楚騰陵錯橫刀皂音皂削一枚金錯半垂刀一枚又曰河南尹朱俊為董卓陳軍事卓折俊曰我百戰百勝決之於心卿勿妄説且污我刀續漢書輿服志曰佩刀乘輿黃金通身雕錯半蛟魚鱗金染錯雌黃室五色諸侯黃金錯環狹半枚墨室公卿百官皆淳墨不半杖小黃郎雌黃室中黃門郎朱室童子皆虎爪文虎賁黃室虎文其將白虎文皆以白珠蛟為標口之飾乘輿者加翡翠山紆嬰其側謝承後漢書曰丹陽方儲為郎中章帝使文郎居左武郎居右儲正住中曰臣文武兼備在所用施上嘉其才以繁亂絲付儲使理之儲拔佩刀三斷之對曰反經任勢臨事宜然又曰應奉得賜金錯把刀東觀漢記曰朱暉字文季年十三與舅母家屬入宛城道遇賊欲奪婦女衣暉拔刀曰錢物可得諸母衣不可奪今日朱暉死也賊義之笑曰童子內刀遂放遣又曰賜鄧遵金對鮮卑緄帶一具金錯刀五十辟把刀墨再屈環撗刀金錯屈尺八佩刀各一又曰祭遵襲略陽遣護軍王忠皆持鹵刀斧伐樹開道至略陽襲隗囂又曰班超曰臣乘聖威神出萬死之志冀立鉛刀一割之用又曰馬嚴為陳留太守建初中嚴病遣功曹史李襲奉章詣闕上親召見襲問疾病形狀以黃金十斤佩刀書刀革帶付龔賜嚴遣太醫送方藥又曰張步攻耿弇營飛矢中弇股以佩刀截之左右無知者獻帝春秋曰越騎校尉汝南伍孚忿董卓無道欲身自殺之挾佩刀詣卓孚語畢辭出卓至閣執手孚因引刀刺卓卓多力却不中即殺孚英雄記曰董卓謂袁紹曰劉氏種不足復遺紹勃然曰禾下健者豈唯董公撗刀長揖徑出懸節於上東門而奔冀州漢魏春秋曰劉琮乞降不敢告備備亦不知久而覺之遣所親問琮琮令宋忠詣備宣白是時曹公在宛備乃驚駭謂忠曰卿諸人作事如此不早相語今禍至告我不亦大劇乎引刀向忠曰今斷卿頭誠不足以解忿亦恥大丈夫臨別復殺卿輩也魏志曰王祥事後母至孝後母嫉之伺祥臥以刀斫之值祥出外持刀斫著被祥知不言如故又曰許禇從討袁紹於官渡時常從士徐他等謀為逆以禇常侍左右憚之不敢發伺禇休下日他等懷刀入禇至下舍心動即還侍他等不知入帳見禇大驚愕他色變禇覺之即擊殺他等太祖益親信之出入同行不離左右又曰典韋陳留人形貌魁梧膂力過人好節俠襄邑劉氏與睢陽李禮為讎韋為報之禮故富春長備怨甚謹韋乘車載雞酒偽為候者門開懷匕首入殺禮并殺其妻徐出取車上刀戟步去禮居近市一市盡駭追者數百莫敢近之魏武帝令曰往歲作百辟刀五枚適成先以一與五官將其餘四吾諸子中有不好武而文學將以次與之吳志曰孫堅至錢塘會海賊掠賈人堅行操刀上岸以手東西指麾若分部人兵以邏遮收賊賊望見以為官兵捕之即委財物散走又曰孫權以公孫淵稱蕃遣張彌許晏至遼東拜淵為燕王張昭諫切權不能堪按刀而怒曰吳國士人入宮則拜孤出宮則拜君孤之敬君亦為至矣而數於衆折孤孤常恐失計昭熟視權曰臣雖知言不見用而每竭愚忠者誠以太后臨崩呼老臣於床下遺詔顧命之言故耳因泣涕撗流權擲刀置地與昭對泣吳書曰凌統怨甘寧殺其父操寧常備統不得讎之嘗於呂蒙舍會酒酣統乃以刀儛寧起曰寧能雙戟儛蒙曰寧雖能未若蒙之巧也因操刀持楯以身分之後權知統意因令寧將兵徙屯江表傳曰孫權拔刀斫前奏案曰諸將吏敢復有言當迎曹操者與此案同蜀志曰初孫權以妹妻先主妹才捷剛猛有諸兄風侍婢百餘人皆親執刀侍立先主每入心常凛凛王隱晉書曰衛瓘監軍護軍鍾會素與瓘至厚坐則同床行則同輿會書板上欲殺胡烈等示瓘瓘言不可會自削棄反問瓘何許聞消息相疑益露瓘廁上見烈故給使令出語三軍會逼瓘不得議定經宿不眠各撗刀膝上陸機晉書曰王濬之在巴郡也夢懸四刀於其上甚惡之濬主簿李毅拜賀曰夫三刀為州而見四刀為益一也明府其臨益州乎後果為益州晉中興書曰初魏徐州刺史任城呂虔有佩刀工相之以為必三公可服此刀虔謂別駕王祥曰茍非其人刀或為害卿有公輔之量故以相與祥始辭之固強乃受祥為司空祥死之日以刀授弟覽曰吾兒皆凡汝後必興足稱此刀故以相與覽後奕世賢興於江東又曰孫恩者亦名靈秀琅邪人孫秀之族也世奉事北斗之道恩叔泰字敬遠師事錢塘杜子恭弟子子恭有祕術嘗就人借爪刀其主求之子恭曰當送相還刀主行至嘉興有魚躍入船中破魚得爪刀其為神效往往如此又曰郭翻武昌人墜刀於水路人為取翻仍以與之路人不取至於三四固辭翻曰爾尚不取我豈能復得路人曰我若取此將為天地鬼神之所責矣翻知其終不受復沈刀於水路人悵然乃復驚汲為取之翻於是不逆其意十倍刀價與之其廉不受惠皆此類矣晉書曰元帝以劉琨為侍中太尉其餘如故并贈名刀琨答曰謹當躬自執佩馘截二虜又載記曰慕容翰北投宇文歸既而逃還歸乃遣徑騎百餘追之翰遙謂追者曰吾既思戀而歸理無反面吾之弓矢汝曹足知無為相逼自取死也汝可百步豎刀吾射中者汝便宜反不者可來前也歸騎解刀豎之翰一發便中刀鐶追騎乃散又曰赫連勃勃以叱干阿利領將作大匠發嶺北夷夏十萬人於朔方之北黑水之南營起都城勃勃自言朕方統一天下君臨萬邦可以統萬為名阿利性尤工巧然殘忍刻暴乃蒸土築城錐入一寸即殺作者而并築之勃勃以為忠故委營繕之任又造五兵之器精鋭尤甚既成呈之工匠必有死者射甲不入即斬弓人如其入也便斬鎧匠又造百鍊剛刀為龍雀大環號曰大夏龍雀銘其背曰古之利器吳楚湛盧大夏龍雀名冠神都可以懷遠可以柔逋如風靡草威服九區世甚珍之復鑄銅為大鼓飛廉翁仲銅駝龍獸之屬皆以黃金飾之列於宮殿之前凡殺工匠數千以是器物莫不精麗蕭子顯齊書曰世祖武皇帝諱賾字宣遠不豫徙御延昌殿乘輿始登階而殿屋鳴吒上惡之詔曰我識滅之後身上著畫天衣純鳥犀導常所服身刀長短二口鐵環者隨我入梓宮北齊書曰綦母懷文造宿鐵刀其法燒生鐵精以重柔鋌數宿則成鋼以柔鋌為刀脊浴以五牲之溺淬以五特之脂斬甲三十札今襄國治家所鑄宿鐵柔鋌是其遺法也刀猶甚快利但不能截札耳梁書曰席闡文為西中郎中兵參軍領城扄梁武帝之將起兵闡主勸頴曹同焉仍遣客田祖恭私報帝并獻銀裝刀帝報以金如意南史曰韓子高會稽山陰人也家本微賤侯景之亂寓都下景平陳文帝出守吳興子高年十六為揔角容貌美麗狀似婦人於淮渚附部伍寄載還鄉里文帝見而問曰能事我乎子高許諾子高本名蠻子帝改名之性恭謹恆執備身刀唐書曰李嗣業京兆高陵人也身長七尺壯勇絶倫天寶初隨募至安西頻經戰鬭于時諸軍初用陌刀業善用之每為隊頭所向必陷又曰王及善初除右千牛衛將軍高宗曰朕以卿忠謹故與卿三品要職他人非搜辟不得至朕所卿佩大橫刀在朕側知此官貴否河圖曰怪目勇敢重瞳天雨刀楚之邦宋均注曰項羽遁甲開山圖曰神芝五色生於名山之陰五色雲氣覆之其味甘苦以銅刀收之又曰霍山有玉石芝生大石上萬人牽終不拔以竹刀割之即斷太公六韜曰大擼刀重一斤長四尺三百枚傅咸奏事曰尚書舊奏給介士二百人人給大銅口刀各一枚博物志曰周書云西域獻火浣布昆吾氏獻切玉刀浣布汙燒之則潔切玉刀切玉如泥一云切玉如蠟蜜布漢魏世有獻者刀則未聞崔豹輿服注曰吳大皇帝有寶刀三一曰百鍊二曰青犢三曰漏影拾遺記曰帝解鳴鴻刀賜東方朔朔曰此刀黃帝時採首陽之金鑄為此刀雄者已飛雌者獨在一出洞冥記林邑記曰林邑王范文先是夷奴初收牛洞中得鱧魚私將還欲食之其主撿求文恐因曰將礪石還非魚也主往看果是石文知異看石有鐵鑄石為兩刀呪曰魚為刀若斫石入者文當為此國王斫石即入人情漸附之裴淵廣州記曰石林竹徑利削為刀切象皮如纖茅楊泉物理論曰古有阮師之刀天下之所寶貴也阮之作刀受法於金精之靈七月庚辛見金神於治監之門其人光色煒耀向而再拜神執其手曰子可教也阮致之間宴設饌而問焉神教以水火之齊五精之陶用陰陽之候取剛軟之和行其術三年作刀千七百七十口而喪其明其刀平背狹刃方口洪首截輕微絶絲髮之系斫堅剛無變動之異世不吝百金精求不可得也其次有蘇家刀雖不及阮家亦一時之利器也次有陽紀趙青間皆不能繼虞喜志林曰古人鑄刀以五月丙午取純火精以協其數也魏武帝內戒令曰百鍊利器以辟不祥攝服姦宄者也搜神記曰宮亭湖孤石有估客下都徑其下見二女子云可為買兩量絲履自厚相報估客至都有好絲履并箱盛之自市一書刀亦在箱中既還以箱及香置廟中而去忘取刀湖中正泛忽有鯉魚跳入船中破魚得刀祖台志怪曰廷尉徐元禮嫁女從祖與外兄孔正陽共詣徐家道中有土墻見一小兒倮身正赤手持刀長五六寸坐墻上磨甚駃獨語因跳車上曲蘭中坐反覆視刀輒舐之至徐家門前桑樹下又跳下坐灰中復更磨刀日晡新婦就車中見小兒持刀入室便刺新婦新婦應刀而倒扶還解衣視心腹紫色如酒槃大有頃便亡鬼子出門儛刀上有血塗桑樹火燃斯須燒盡神異經曰南荒之中有如之何樹三百歲作華九百歲作實實有核形如棗子長五尺金刀割之則飴木刀割之則辛食之得地仙列仙傳曰丁次卿者不知何許人也漢順帝賣刀遼東市時人名之丁氏次卿有寶刀神仙傳曰蜀人李阿傳世不老有古強者隨阿入青城山恐有虎狼取父大刀阿見而怒取強刀以擊石刀折敗強竊憂刀敗阿復取刀左右擊地刀復如故還強也列異傳曰有神王方平降陳節方家以刀一口長五尺一長五尺三寸名泰山環語節方曰此刀不能為餘益然獨臥可使無鬼入軍不傷勿以入廁溷且不宜久服三年後求者急與果有戴卓以錢百萬請刀録異傳曰有王更生者為漢中太守郡界有袁氏廟靈響更生過廟祭去而遺其刀而遣小史李高還取刀高見刀在廟床上高進取去仰見座上有一君著大冠袍衣頭鬢半白謂高曰可取還勿道見我後吾當祐汝高還如言不道後高仕為郡守當復遷為郡高時年已六十餘祖高者百餘人高乃道昔為更生小吏見遣至廟所取遺刀見廟神使吾莫道至今不敢道然心常以欺君為慚言畢此刀立刺高心下須臾死廬江七賢傳曰漢武帝出淮陽到舒州不覽城問曰此鄉名何陳翼對曰鄉名不覽上曰萬乘主所問不祥耶欲舉燔之翼曰臣言不欺佩刀當生毛欺則無毛也視之刀有毛長寸乃不燔列士傳曰專諸持一剛刀置魚腹中以刺王僚列女傳曰龐娥親者酒泉龐子夏妻趙君安女君安為同縣李壽所殺三子遭疫而死壽大喜娥親聞曰李壽汝莫喜焉知娥親不手刃汝耶乃陰市刀志在殺壽後於都亭奮刀斫壽刀折拔壽佩刀斷壽頭詣獄求死詔赦之吳時外國傳曰扶南諸王殺其國人以刀斫刺往往有不入者以汗露塗刀刃斫之乃入國人名之曰蟬也蒲元傳曰君性多奇思得之天然象類之事出若神不嘗見煆功忽於斜谷為諸葛亮鑄刀三千口鎔金造器特異常法刀成白言漢水鈍弱不任淬用蜀江爽烈是謂大金之元精天分其野乃命人於成都取之有一人前至君以淬乃言雜涪水不可用取水者猶悍言不雜君以刀畫水云雜八升何故言不取水者方叩頭首伏云實於涪津渡負倒覆水懼怖遂以涪水八升益之於是咸共驚服稱為神妙刀成以竹筒密內鐵珠滿其中舉刀斷之應手靈落若剃生芻故稱絶當世因曰神刀今之屈耳環者是其遺範也費禕別傳曰孫權以手中嘗所執寶刀贈之禕答曰臣不才何以堪明命然刀所以討不庭禁暴亂者也但願大王勉建功業同獎漢室臣雖暗弱不負來顧桂陽先賢畫讚曰成武丁以疾而終殮畢其友從臨武縣來至郡道與武丁相逢友曰子欲何之而不將人答曰今吾南遊為過報小兒善護大刀到其門見其妻哭泣問之答曰夫沒友大驚曰吾適與相逢乃發棺視了無所見遂除縗絰而心喪之咸以武丁得神仙
