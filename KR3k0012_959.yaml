body:
  text: 木部七楠尋陽記曰黃金山有楠樹一年東邊榮西邊枯後年西邊榮東邊枯年年如此張華云交讓樹者此是也檜爾雅曰檜柏葉松身尚書禹貢曰杶幹栝柏柏葉松身曰栝毛詩竹竿曰檜楫松舟檜柏葉松身楫所以棹舟也柞爾雅曰栩杼柞樹也毛詩車舝曰陟彼高岡析其柞薪析其柞薪其葉湑兮又曰維柞之枝其葉蓬蓬疏曰栩今柞殼為斗可以染皂今俗及河內云杼斗或橡斗陸機毛詩疏義曰芃芃棫朴爾雅曰棫白挼注音蕤三倉說棫即柞也其柞理純白無赤心為白挼直理易破故可為犢車軸又可為矛戟鎩西京雜記曰五柞宮有五柞樹皆連抱五株樹枝覆蔭數十畝崔豹古今注曰鑿木出交州林邑國也色黑而有文亦謂之文木周處風土記曰舊說舜葬上虞又記云耕于歷山而始寧剡二縣界上舜所耕田在於山下山多柞樹吳越之間名柞為櫪故曰歷山檀毛詩將仲子曰將仲子兮無踰我園無折我樹檀檀彊忍之木又曰伐檀剌貪也在位貪鄙無功而受祿君子不得進仕爾坎坎伐檀兮置之河之干兮聖賢冢墓記曰孔子墓有檀樹柘禮記月令曰季春無伐桑柘又投壺曰矢以柘若棘無去其皮周禮冬官曰弓人辨六材一曰柘古史考曰烏號弓以柘枝為也譙周曰野柘枝徑烏集之飛起枝彈之烏乃驚號伐取為弓故稱烏號弓周書曰季夏取桑柘之火風俗通曰柘材為弓彈而放快崔實四民月令曰柘染色黃赤人君所服黃者中尊赤者南方人君之所向也雲南記曰會川室屋相次皆是板及茅舍滿川坡盡是花木亦有赤柘杞爾雅曰杞枸檵音計今枸杞也毛詩將仲子曰將仲子兮無伐我樹杞杞木名疏曰狗骨也又湛露曰湛湛露斯在彼杞棘左傳昭公曰聲子聘于晉還令尹子木與之語問晉政焉且曰晉大夫與楚孰賢對曰晉卿不如楚其大夫則賢皆卿材也如杞梓皮革自楚往也雖楚有材晉實用之周書曰太姒夢梓化為杞梓爾雅曰楰音俞鼠梓楸屬也今江東有虎梓毛詩小辨曰惟桑與梓必恭敬止又定之方中曰樹之榛栗椅桐梓漆陸機毛詩疏義曰北山有楰爾雅曰楰鼠梓其樹葉木理如楸山楸之異也今人謂之昔楸濕時脆燥而堅今永昌人謂鼠梓漢人謂之楰禮斗威儀曰君乘火而王其政和平楸梓為常生周書曰太姒夢太子發取周庭之梓樹於商闕間化為松杞史記曰子胥將死告舍人曰必樹吾墓上以梓梓可為器而抉吾眼於吳之東門上以觀越兵入吳也漢書曰元帝初元四年皇后曾祖父濟南平陵王伯墓門梓柱卒生枝葉上出劉向以為王氏代漢之象後漢書曰應順為冀州刺史廉直無私遷東平相賞罰必信吏不敢犯有梓樹生於聽事室上事後母至孝衆以為孝感之應說苑曰伯禽與康叔封朝于成王見周公三見而三笞康叔有駭色謂伯禽曰有商子者賢人也與子見之康叔封與伯禽見商子曰吾二子者朝乎成王見周公三見而三笞其說何也商子曰二子盍相與觀乎南山之陽有木焉名曰橋二子者往觀乎南山之陽見橋竦焉實而仰反以告乎商子商子曰橋者父道也商子曰二子盍相與觀乎南山之陰有木焉名曰梓二子者往觀乎南山之陰見梓勃焉實而俯反以告商子曰梓者子道也二子者明日見乎周公入門而趍登堂而跪周公拂其首勞而食之曰安見君子二子對曰見商子周公曰君子哉商子也樂資春秋後傳曰使者鄭客入函谷至平舒見素車白馬曰吾華山君願以一牘致滈池君子之咸陽過滈池見一大梓樹有文石取以扣樹當有應者以書與之鄭客如其言見宮闕如王者居謁者出受書入有頃云今年祖龍死山海經曰玉山碧山多梓木雞山美梓孟子曰拱把之桐梓人欲生之皆知所以養之者至於身不知所以養之者豈愛身不若桐梓哉漢武故事曰衛子夫入宮上曰吾昨夜夢子夫庭中生梓樹數株豈非天乎是日幸之有娠郭氏玄中記曰秦文公造長安宮面四百里南至終南山山有梓樹大數百圍蔭宮中公惡而伐之連日不剋輒大風雨夜有鬼問梓樹樹曰豈奈吾何鬼曰若使三百人披頭以絲繞樹豈不敗汝樹默然不應明日人上言秦王依此言伐之中有青牛逐之入澧水豫章記曰松陽門內有大梓樹大四十五圍樹先枯永嘉中一旦忽更榮華太興中元帝果繼大業楸爾雅曰槄音滔山檟今之山楸楸小葉曰檟音賈大而皵音鵲楸老乃皮粗皵者為楸也小而皵檟小而皮粗皵者為檟漢書曰淮北滎南河濟之間千樹楸與千戶侯等任昉述異記曰吳中有陸家白蓮種顧家班竹趙有韓氏酸棗中山有楸尸掌楸木者楸可為什器漢書貨殖志有千樹楸樅爾雅曰樅松葉松身郭璞注云今太廟梁用此木尸子所謂松柏之鼠不知堂室之有美樅魯連子曰松樅高千仞而無枝非憂王室無柱椒春秋運斗樞曰玉衡星散為椒援神契曰椒薑禦溫菖蒲益聰爾雅曰檓音毀大椒也今椒樹叢生實大者名為檓也椒樧醜莍莍蓃子藂生成房貌今江東亦呼莍椒似茱萸而小赤色莍蓃音求搜山海經曰琴鼓之山其木多椒景山多秦椒毛詩椒聊曰椒聊刺晉昭公也君子見沃之盛彊能修其政知其蕃衍盛大子孫將有晉國焉椒聊之實蕃衍盈升彼已之子碩大無朋椒聊椒也陸機毛詩疏義曰椒聊聊語助也椒樹似茱萸有針剌葉堅而滑澤蜀人作茶吳人作茗皆煮其葉以為香今成皋諸近山間謂竹葉椒樹亦如蜀椒小毒熱不中合藥也可著飲食中用蒸雞豚佳香東海諸島上椒樹枝葉皆相似子長而不圓甚香其味似橘皮島山麞鹿食此椒葉其肉自然作橘香也又東門之枌曰貽我握椒椒芬香也續漢書曰天笁國出石蜜胡椒黑鹽孫卿子曰民之親我歡若父母其好我芬若椒蘭應劭漢官儀曰皇后稱椒房取其實蔓延盈升以椒塗屋亦取其溫暖張璠漢記曰桓帝竇皇后崩中常侍曹節王甫欲以貴人禮葬太尉李固自扶輿起搗椒自隨謂妻子曰若太后不得配桓帝吾不生還矣魏氏春秋同異曰鍾繇嬖庶子會之母黜嫡夫人文帝命復焉繇恚忿餐椒致噤帝乃止齊書曰建武中王敬則於會稽反奉子恪為名而子恪奔走未知所在始安王遙光勸上併誅高武諸子孫於是並勑竟陵王昭胃等六十餘人入永福省令太醫煮椒二斛并命辦數十具棺材謂舍人沈徽孚曰椒熟則一時賜死期三更當殺之會上暫臥主書單攜啓依旨斃之徽孚堅執曰事須更審爾夕三更子恪徒跣奔至建陽門上聞驚覺曰故當未賜諸侯命耶徽孚以答上撫床曰遙光幾誤人事及見子恪顧問流涕諸侯悉賜供饌世說曰石崇以椒為泥泥屋三君夫以赤石脂泥壁崔實四民月令曰正月之旦進酒降神畢室家無大小次坐先祖之前子孫各上椒酒於家長稱觴舉白范子計然曰蜀椒出武都赤色者善秦椒出隴西天水細者善風土記曰三香椒檔薑離騷曰雜申椒與菌桂播椒房兮成堂布椒於堂上晉成公綏椒花銘曰嘉哉芳樹載繁其實厥味唯珍蠲除百疾肇惟歲首月正元日以介眉壽祈以初吉晉劉臻妻陳氏正旦獻椒花頌曰璇穹周回三朝肇建美哉靈葩爰採爰獻聖容服之永壽於萬木蘭漢書曰孝桓帝元嘉元年芝生後庭木蘭上神仙傳曰北海于君病癩見市賣公姓白問之公云明日木蘭樹下當見卿明日往授素書二卷以消炎救病無不愈者郭子橫洞冥記曰元封三年大秦國獻花蹄牛飴以木蘭之葉使方國貢此葉此牛不甚食食一葉則纍月不飢任昉述異記曰木蘭川在尋陽江中多木蘭樹昔吳王闔閭植木蘭於此用搆宮殿又曰七里洲中有魯班刻木蘭為舟至今在洲中詩家所云木蘭舟出於此離騷曰鴟梟集於木蘭兮又曰朝飲木蘭之墜露夕餐秋菊之落英夜合風土記曰夜合葉晨舒而暮合一名合昏甘棠爾雅曰杜甘棠今之杜黎杜赤棠白赤棠棠色赤白各異其名毛詩曰甘棠美召伯也蔽芾甘棠勿剪勿伐召伯所茇思其人愛其樹又杕杜曰有杕之杜生于道周杜赤棠也檔宋春秋曰義熙八年太社檔樹生于壇側檔尚黑也宋水德忽生此一樹櫟爾雅曰櫟其實梂有梂彙自裹毛詩晨風曰山有苞櫟櫟木也莊子曰匠石之齊至曲園見櫟杜樹曰是不材木故若是之壽淮南子曰十二月官獄其樹櫟水經曰若耶溪孤潭上有一櫟樹謝靈運與從弟惠連嘗遊之作連句題刻樹側橡後漢書曰李恂詣洛陽時歲荒司空張敏司徒魯恭等各遣子饋糧悉無所受徙居新關下拾橡實以自資橡櫟實也晉書曰摯虞從惠帝幸長安及東軍來迎百官奔散遂流離鄠杜之間轉入南山中糧絶飢甚拾橡實而食之又曰司馬元顯之討桓玄于時楊土飢虛運漕不繼玄斷江路商旅遂絶於是公私匱乏士卒唯給桴橡說苑曰莒穆公有臣朱厲附事穆公不見識焉冬處於山林食橡栗夏處於洲澤食菱藕穆公以難死朱厲附將往死之其友曰子事君而不見識焉今君難吾子死之意者其不可乎朱厲附曰始我以為君不吾知也今君死而我不死是果不知我也吾將死之以激天下不知其臣者遂往死淮南子曰高臺增榭接屋連桅非不麗也然而民無窟室狹廬所託於身者則明主不樂也肥膿甘脆非不香美也然而民有糟糠橡栗不接於口者則明主不甘也抱朴子曰假穀於夷齊之門告寒於黔婁之家所得者不過橡栗縕褐必無太牢之膳衣狐裘矣
