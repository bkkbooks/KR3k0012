body:
  text: 學部五勤學史記曰蘇秦洛陽人與魏人張儀同師事鬼谷先生讀書至睡秦輒引錐剌股血流至踝漢書曰董仲舒廣川人景帝時為博士少耽學業下幃讀書弟子傳以相受莫見其面十年不窺園圃乘馬三十年知牝牡又曰路溫舒字長君父使牧羊溫舒取澤中蒲截以為牒編用寫書後漢書曰桓榮字春卿沛國龍亢人也少與兄元卿俱在田捃拾而榮開書讀之講誦不息元卿嗤榮曰但自苦氣力何時復施用乎榮笑不應日夜不倦世祖聞召拜議郎使入教授太子帝稱善曰得生幾晚後為太子少傅帝賜其車馬衣服榮得之陳於庭謂父兄曰此吾稽古之力也元卿歎曰我本農家子豈意學之為利乎又曰法真隱居大澤講論術藝歷年不窺園圃又曰何休作公羊解詁覃思不窺園者十有七年又曰趙昱常就處士東莞綦母公受公羊傳至歷年潛思不窺園門親踈稀見其面又曰張霸字伯饒成都人好學七歲通春秋復欲進餘經父母曰汝小未能也霸曰我饒為之故字伯饒四遷侍中謝承後漢書曰戴封字平仲年十五詣太學師事東海申君申君卒送喪到東海道經其家父母以封當還豫為娶妻封暫過拜親不宿而去又曰高鳳字文通南陽蔡人家以農畝為業而勤學專精讀誦妻嘗之田曝麥於庭令鳳護之懼雞以竿授之時天暴雨而鳳持竿讀書不覺潦水大至流其麥矣又曰袁閎傳黃巾賊起攻沒郡縣百姓驚散閎誦不移賊相約語不入其閭鄉人就閎避難皆得全免又曰曹褒博雅踈通尤好禮事常感朝廷制度未備慕叔孫通為漢禮儀晝夜研精沉吟專思寢則懷抱筆扎行則誦習文書當其念至忘所之適又曰承宮少孤年八歲為人牧豕鄉里徐子盛者以春秋經授諸生數百承宮過息廬下樂其業因就聽經遂請留門下續漢書曰宮過徐子盛好之因棄其渚而留聽經主怪其不還求索得宮欲笞之門下生共禁止因留之為諸生拾薪執苦數年勤學不倦又曰崔琦字子瑋濟北相瑗之宗也引古今成敗以誡梁冀冀不能受乃作外戚針又作鵠賦以為諷後除臨濟令不敢之職解印而去冀令剌客求之見琦耕於陌上懷書一卷息輒偃而詠之剌客賢之以實告琦因得脫走又曰荀爽字慈明幼好學太尉杜喬見而稱曰可為人師爽遂耽思經籍慶弔不行徵命不應司馬彪續漢書曰杜喬字叔榮纍祖二千石以孝稱雖二千石子常步擔求師又曰李固少有俊才雅志好學為三公子常躬步驅驢負書隨師魏志曰楊浚同郡王蒙少孤為人僕隸年十七見使牧羊而私讀書因獲捶楚浚美其才即贖著家中聘娶立屋然後與別居官至散騎常侍魏略曰常林少單貧為諸生耕帶經鋤其妻自擔餉餽之相敬如賓又曰賈逵字梁道好春秋左傳及為牧守常自課讀之月一遍蜀志曰譙周字元南耽古篤學家貧未嘗營産業誦讀典籍欣然獨笑以忘寢食研精六經頗曉天文而不留意諸子文章非心所存吳志曰魯肅為人方嚴寡於玩飾治軍整頓禁令必行雖在軍陳手不釋卷又曰闞澤字德潤山陰人常為人傭書所寫畢誦之亦遍虞溥江表傳曰張紘事父至孝居貧躬耕稼帶經而鋤孜孜汲汲以夜繼日至於弱冠無不窮覽晉書曰王育少孤貧為人傭牧羊豕近學堂育常有暇拾薪以雇書生抄書後截蒲以學書日夜不止亡失羊豕其主笞之育甚有慚色將鬻己以償於是郭子敬聞而嘉之代育還羊豕給其衣食令育與其子同學育遂博通經史仕僞漢官至太傅又曰車胤字武子南平人勤學不倦家貧嘗不得油夏月則練囊盛數十螢火蟲以照書晉中興書曰孫盛字安國為祕書監好學自少及長手常不釋卷既居史官乃著三國晉陽秋又曰劉實長不滿七尺精學不倦雖居官職至于皓首手不釋卷崔鴻春秋前燕録曰豫州剌史張悕字文祖清河武城人也悕少孤貧隨母長於舅氏令其牧牛悕幼而好學事母以孝聞每日必於牧暇採樵二束菜二本一以供母一以雇人書晝則折木葉學晝夜則誦所書者宋書曰沈攸之字仲達晚好讀書史漢事多所諳憶常歎曰早知窮達有命恨不七年讀書又曰鄭鮮之字道子滎陽開封人鮮之下帷讀書絶交遊之務又曰王歆字休泰琅邪人家貧好學嘗三日絶糧執書不輟父母家人或謂之曰困窮如此何不耕農為求活乎歆答曰我當以典籍自耕耳武帝以其博學有文才纍遷中書侍郎揚州牧後魏曰甄琛中山人也舉秀才入都纍歲常以奕碁通夜不止手下蒼頭奴常令執燭或時睡則加杖之如此非一奴不勝痛楚乃曰郎君父母仕官若為讀書執燭不敢辭罪今博奕是何事也琛惕然大慚遂寫書研習經史聞見日優仕至侍中蕭子顯齊書曰顧歡字景怡吳郡鹽官人也年六十歲書甲子有蘭三篇歡推計遂知六甲家貧父使驅田中雀歡作黃雀賦雀食稻過半父怒欲撻之見賦乃止鄉中有學舍歡貧無以受業於舍壁後倚聽無遺忘者八歲誦孝經詩論及長篤志好學母年老躬耕誦書夜則燃糠自照又曰隱士沈驎士火燒書數千卷驎士年過八十耳目猶聰明乃故手抄寫火下細書復成二三千卷滿數十篋南齊春秋曰江泌字士清少貧晝日斫屧夜讀書隨月光握卷升堂北齊書曰杜弼字輔玄高祖令弼帶州驃騎府長史弼性好名理探味玄宗自在軍旅帶經從役又曰李鉉字實鼎家貧苦學春夏務農秋冬入學三冬不畜枕每至睡時假寐而已後魏書曰李道固頓丘衛國人高祖賜名焉家寒少孤有大志好學不倦初受業於長樂監伯陽伯陽稱美之晚與漁陽高悅北平陽尼等將隱於名山不果而罷悅兄閭博學高才家富典籍彪遂於悅家手抄口讀不暇寢食三國典略曰齊右僕射富平子魏收字伯起巨鹿曲陽人幼習騎射欲以武藝自達太學博士鄭伯猷調之曰魏郎弄戟多少收慚悟乃折節讀書坐版床積年版亦為之鋭收嘗為庭竹賦以自發名伯猷謂之曰卿不值老夫猶當逐兔後周書曰樊深博物性好學老而不怠朝暮還往常據鞍讀書至馬驚墜地損折支體終亦不改後除國子博士梁史曰沈約十三而遭家難潛竄會赦乃免既而流寓孤貧篤志好學晝夜不釋卷母恐其以勞生疾常遣減油滅火而晝之所讀夜輒誦之遂博通群籍善屬文濟陽蔡興宗聞其才而善之及為郢州引為安西外兵參軍兼記室興宗常謂其諸子曰沈記室人倫師表宜善師之梁書曰韋睿族弟受字孝友沉毅有器局年十二嘗遊京師值天子出遊南苑邑里喧譁老幼爭觀受坐讀書不釋卷宗族莫不異之沈峻字士嵩師事宗人沈驎士嵩在門下積年晝夜自課或睡寢輒以杖自擊其為志如此又曰江革字休映考城人吏部郎謝眺常過革第時大寒雪革斃絮單席而耽學不倦眺乃脫其所著衣并手割半氈與革後建安王為雍州剌史表求記室人或薦之以為征北記室參軍與弟觀少長共居不忍離別苦求同行參軍沈約任昉同與革書曰此雍府妙選英才文房之職揔卿昆弟可謂馭二龍於長途騁騏驥於千里又曰劉峻字孝標平原人勤學去學五六里常行讀書不息地有坑坎每常倒蹶然後始悟隋書曰皇甫繢字功明三歲而孤為外祖韋孝寬所鞠養嘗與諸外兄博奕孝寬以其惰業篤以嚴訓繢歎曰我無庭訓養於外氏不能克躬何以成立深自感激命在左右自杖孝寬聞而對之流於是學問涉經史又曰盧思道字子行年十六遇中山劉松為人作碑以示思道讀之多所不解於是感激閉戶讀書師事河間邢子才後思道為文以示劉松松又不能甚解思道乃喟然歎曰學之有益豈徒然哉又曰劉炫字光伯少以聰敏見稱與信都劉焯閉戶讀書十年不出又曰王邵篤學好經史遺落世事用思既專性頗恍忽至對食閉目凝思盤中之肉輒為僕從之所噉邵弗之覺唯責肉少數罰廚人廚人以情白依前閉目伺而獲之廚人方免笞辱其專固如此唐書曰李磎昭宗朝為宰相磎自在臺省聚書至多手不釋卷時人號曰李書樓所撰文章及注解書傳之闕疑近百餘卷經亂悉亡世說曰管寧華歆嘗同席讀書有乘軒冕過門者寧讀書如故歆出觀寧割席分坐曰子非吾友也邴原別傳曰原字根矩家貧早孤鄰有書舍原過其傍而泣師問曰童子何悲原曰一則顧其少孤二則羡其未學師亦哀原之言而為之泣曰童子茍有志我從相教不之求費也楚國先賢傳曰孫敬好學時欲寤寐懸頭至屋梁以自課常閉戶號為閉戶先生廬江七賢傳曰文黨字翁仲欲之學時與人俱入藂木謂侶人曰吾欲遠學先試投我斧高木上斧當掛乃仰投之斧果上掛因之長安受經七賢傳曰阮籍有奇才異質或閉戶讀書連月不出或遊行丘林經日不返益都耆舊記曰朱倉字雲卿廣漢人畜錢八百文之蜀從處士張寧受春秋糴小豆十斛屑之為糧閉戶精誦寧矜之斂得米二十石倉不受嵇康高士傳曰逢真王莽辟不至嘗為杜陵門下掾終身不窺長安城但閉門讀書未嘗問政呂氏春秋曰寧越中牟之鄙人也苦耕稼之勞謂其友曰何為而可以逸此苦也其友曰莫如學學三十年則可以達矣寧越曰請以十五歲人將休吾不休人將臥吾不臥學十五歲而周威公師之世要論曰有讀書倦而剌其掌墨子曰墨子使衛載書甚多強唐子見而怪之墨子曰昔周公旦朝讀書百篇夕見七十士相天子猶如此況無事敢廢此乎鄒子曰朱買臣孜孜修學不知雨之流粟漢武帝洞冥記曰董謁字仲玄出隱無常常息人家於座以筆題掌還以竹籜寫之書竟舐掌中加以少來精勤舐之纍爛世謂之董仲玄掌録西京雜記云匡衡好學貧無燭鄰家甚富穿壁引光照書漢書曰倪寬千乘人受業孔安國貧無資傭作帶經而鋤在太學為弟子都養
