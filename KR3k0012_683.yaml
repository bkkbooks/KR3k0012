body:
  text: 儀式部三璽説文曰璽王者印也以守土故字從土籀文從玉春秋後語曰秦破魏軍於華陽走我將軍孟卯王使段干木子崇與秦南陽以千金和蘇代謂王曰欲璽者段干木子也欲地者秦也今王使欲地者制璽欲璽者制地魏地不盡則不和言段子木子以地兌秦而求相印且夫以地事秦譬猶以薪救火薪不盡火不滅也王曰是則然矣雖然事始已行不可更矣史記曰沛公先至霸上秦王子嬰係徑以組封皇帝璽符節降軹道旁又曰人有告絳侯周勃欲反下捕勃治之文帝曰絳侯綰皇帝璽將兵於北軍不以此時反今居一小縣顧欲反耶漢書曰初高祖入咸陽得秦璽及即天子位因御服其璽世世傳受號曰傳國璽以孺子未立璽藏長樂宮及莽即位請璽元后后不肯以授莽莽使安陽侯王舜諭旨太后怒罵之曰而屬父子宗族蒙漢家力富貴纍世既無以報受人孤寄便奪取其國為人如此者狗不食其餘若自以金匱符命為新皇帝當自更作璽何以用此亡國不祥璽我為漢家老寡婦旦暮且死欲與此璽俱葬終不可得也太后因涕泣舜曰莽必欲得傳國璽寧能終不與耶太后聞舜語切乃出璽投之地以授舜曰我老已知而兄弟今族滅也又王莽傳曰梓橦人哀章素無行好為大言見莽居攝即作銅匱為兩檢署其一曰天帝行璽金匱其二署曰赤帝行璽莽至高廟拜授又曰王閎王莽叔父哀帝世為中常侍時董賢為大司馬帝臨崩以璽綬付賢曰無妄以與人時國無嗣主內外恐懼閎白元后請奪之即帶劍至宣德闥謂賢曰宮車晏駕國嗣未立君受恩深重當俯伏號泣何事久持璽綬以待禍至耶賢不敢拒乃跪授璽綬後漢書曰涿郡太守張豐執使者舉兵反自稱無上大將軍與彭寵連兵四年祭遵朱祐破之初豐好方術有道士言豐當為天子以五綵囊裹石繫豐肘云石中有玉璽豐信之遂反及執當斬猶曰肘石有玉璽遵為椎破之豐乃知被詐仰天歎曰當死無所恨又曰延嘉八年渤海妖賊蓋登等稱太上皇帝有玉印圭璧鐵券相署置皆伏誅續漢書曰時登等有玉印五皆如白石文曰皇帝信璽皇帝行璽其三無文字續漢書曰獻穆曹后曹操之女也魏受禪遣使求璽綬后怒以璽綬抵軒下因涕泣橫流曰天不祚此璽魏志曰太祖崩洛陽時隱陵侯彰行越騎將軍從長安來赴問賈逵先王璽綬所在逵正色曰太子在鄴國有儲副先君璽綬非君所宜問也又曰太和元年以中山魏昌之安城鄉追封甄逸諡曰敬俟孫豫襲爵初營宗廟掘地得玉璽方一寸九分其文曰天子羡思慈親明帝為之改容魏略曰司馬景王廢齊王芳使郭芝入白太后取璽綬太后取璽綬置坐側及迎高貴鄉公又請璽綬太后曰我見高貴鄉公小時識之明白我欲自以璽綬手付之吳書曰漢大亂天子北詣河上六璽不自隨掌璽者以投井孫堅討董卓頓軍洛南其井每有五色氣從井中出堅使人浚之得漢傳國玉璽其文曰受命于天既壽永昌方圓四寸上綏交蟠五龍龍上一角缺蜀志曰太傅許靖等上言先主曰前關羽圍于禁襄陽襄陽子張嘉王休獻玉璽潛漢水伏於淵泉暉影燭耀靈光徹天夫漢者高祖本所起定天下之國號也大王襲先帝軌迹興於漢中也今天子玉璽神光見璽出襄陽漢水之未明大王承其下流授與以天子位瑞命符應非人力所致鄧粲晉紀曰江寧民虞迪墾地得白玉驎璽一鈿以獻文曰長壽萬年晉書曰義陽王威無操行諂附趙王倫倫將篡使威與黃門郎駱休逼帝奪璽綬倫敗惠帝反正曰阿皮捩吾指奪吾璽綬不可不殺阿皮威小字也於是誅威又曰冉閔子智以鄴來降安西將軍謝尚使濮陽太守戴施應之進據枋頭會冉智行人劉猗至施乃止使猗求傳國璽猗歸以告智智猶豫不許施因遣參軍何融率壯士百人入鄴登三臺助戍譎之曰今且出璽付我凶寇在外道路梗澀亦未敢即送當遣單使馳告天子天子聞璽已在吾邊知卿至誠當遣重兵相援智信之乃出璽付融融詣施施使齎璽馳還璽自秦傳漢漢入魏魏入西晉永嘉末洛京不守璽為劉聰所得及石勒滅劉氏璽入偽趙冉閔誅石氏又入閔及是四十二年而璽復歸於晉晉中興書曰義熙十二年左衛兵陳陽於府前淮水中得璽王者不隱其過則玉壁見璽亦璧也崔鴻十六國春秋前趙録曰河瑞元年汾水中得玉璽高一寸二分方四寸文曰有新保之蓋王莽時璽也獻者因增深海光三字淵以為己瑞大赦又前趙録曰光初五年并州牧安定王策獻玉璽一文曰趙盛又前涼録曰張實元年蘭池趙嬰上言於青澗水中得一玉璽鉗鈕光照水外文曰皇帝璽群寮上賀實曰何忽有此言乃送之於京師晉書載記曰石季龍剋上邽遣主簿趙封送傳國玉璽太子玉璽各一于勒又曰符堅奔五將山姚萇遣將軍吳忠圍之堅衆奔散獨侍御十數人而已神色自若坐而待之召宰人進食俄而忠至執堅以歸新平幽之于別室萇求傳國璽於堅曰萇次膺符曆可以為惠堅瞋目叱之曰小羌乃敢干逼天子豈以傳國璽授汝羌也圖緯符命何所依據五胡次序無汝羌名違天不祥其能久乎璽已送晉不可得也又曰冉閔殺石祇僣大號遣其使人常煒聘慕容俊俊便記室封𥙿詰之曰石祇去歲使張舉請援云璽在襄國其言信不煒曰誅胡之日在鄴者略無所遺璽何從而向襄國此求救之辭耳又曰冉閔敗蔣幹以傳國璽送于建鄴慕容俊欲神其事業言曆運在己乃詐云閔妻得之以獻賜號曰奉璽君因以永和八年僣即皇帝位大赦境內建元曰元璽宋書曰元凶劭既敗時不見傳國璽問劭云在嚴道育處就取得之又曰蔡興宗拜侍中每正言得失無所顧憚孝武新拜陵興宗負璽陪乘齊書曰謝朏為宋侍郎領祕書監及高帝受禪朏當日在直百僚陪位侍中當解璽朏陽不知曰有何公事傳詔云解璽授齊王朏曰齊自應有侍中乃引枕臥傳詔懼乃使稱疾欲取兼人朏曰我無疾何所道遂朝服步出東掖門乃得車仍還宅是日遂以王儉為侍中解璽既而武帝請誅朏高帝曰殺之則成其名正應容之度外北史后妃傳典琮三人掌琮璽玩器北齊書曰辛術鎮廣陵獲傳國璽送鄴文宣以璽告於太廟此璽即秦所制方四寸上紐交盤龍其文曰受命于天既壽永昌二漢相傳又應魏晉晉懷帝敗設於劉聰聰敗沒於石氏石氏敗晉穆帝永和中濮陽太守戴僧施得之遣督護何融送于建鄴歷宋齊梁敗侯景得之景敗侍中趙思賢以璽投景南兗州剌史郭元建送于術故術以進焉又曰元暉業天保二年從駕至晉陽於宮門外罵元韶曰爾不及一老嫗背負璽與人何不打碎之我出此言知即死然爾詎得幾時文宣聞而殺之後周書曰宇文氏其先曰普回因狩得玉璽三鈕有文曰皇帝璽普回異之以為天授其俗謂天曰宇因號宇文國并以為氏唐書曰貞元二年神策將溫嘉順得白玉印其文曰天子之寶獻之即傳國八寶之一上幸奉天後失之及是方獲玉璽譜曰傳國璽是秦始皇所刻其玉出藍田山是丞相李斯所書其文曰受命于天既壽永昌漢高祖定三秦秦王子嬰獻此璽及漢高即位仍佩之因以相傳故號曰傳國璽漢昭帝時殿中一夜相驚霍光即召持節郎取璽郎不與光欲奪之郎案劍曰頭可得璽不可得光善之明日遷郎秩二等光後廢昌邑王賀立宣帝光自手解取賀璽扶令下殿至漢平帝王莽篡位就元后求璽乃出璽投之於地璽上螭一角缺及莽敗時帶璽綬避火於漸臺商人杜吳殺莽取綬不知取璽及莽頭公賓就見綬問綬主所在乃斬莽首并璽與王憲憲得無所送又自乘天子車輦李松入長安斬憲送璽詣宛上更始赤眉大司馬謝祿至高陵更始奉璽赤眉赤眉立劉盆子建武三年盆子敗於宜陽璽還光武孫堅從桂陽入討董卓卓時已焚燒洛邑徒都長安堅軍於城南見井中旦旦有光軍人莫敢汲堅乃探得璽初卓作亂掌璽者投于井中故堅得之袁紹有僣盜意乃拘堅妻逼求之紹得璽見魏舉以向肘魏武惡之紹敗得璽還漢以禪魏魏以禪晉趙王倫篡立使義陽王威就惠帝取璽帝不與強奪之晉懷帝永嘉五年王彌入洛陽執懷帝及傳國六璽詣劉曜後為石勒所井璽復屬勒勒刻一邊云天命石氏此題今不復存勒為冉閔所滅此璽屬閔閔敗璽存閔大將軍蔣幹晉鎮西將軍謝尚遣督護何融至購賞得之以晉穆帝永和八年還江南晉元帝東度歷數帝無玉璽北人皆云司馬家是白板天子又曰雍州璽者晉泰光十九年雍州剌史郗恢表慕容永稱藩奉璽方六寸厚七分上蟠螭為鼻合高四寸六分四邊龜文下有八字其文曰受天之命皇帝壽昌烏篆隱起巧麗驚絶是慕容所制源其所由未詳厥始也呂氏春秋曰民之於上若璽於塗印方則方印圓則圓山陽公載記曰袁術將僣號聞孫堅得傳國璽乃拘堅夫人而奪之玉璽譜云袁紹拘堅夫人奪之應劭漢官儀曰孔子稱封泰山禪梁父可得而數七十有二傳曰封者以金泥銀繩印之以璽璽施也信也古者尊卑共之月令曰固封璽春秋傳襄公在楚武子使季冶問璽書而與之是也秦漢以來尊者以為名乃始避又曰天子有傳國璽文曰受命於天既壽且康漢舊儀曰秦已前民皆以金玉銀銅犀象為方寸璽各服所好漢已來天子獨稱璽又以玉群臣莫敢用也又曰皇帝六璽皆白玉螭虎劍文曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽凡六璽皇帝行璽賜諸侯王書信璽發兵徵大臣天子行璽外國事天子之璽事天地鬼神璽皆以武都紫泥封青布囊白表裏兩端尺一匱中約署崔浩漢紀音義曰傳國璽是和氏璧作之趙書曰劉曜於龍門河水中得玉璽文融剋昌曜以為天錫神璽齋而受之石虎別傳曰武鄉長城縣民韓強在長城西山巖石間得玄璽一方四寸厚二寸與璽同文曰受命于天既壽永昌虎以為瑞燕書曰元璽六年蔣幹遣太子詹事劉猗齎傳國璽詣晉求救猗負璽行數里天黃霧四塞不得進易取行璽始得去段龜龍涼州記曰呂光時州人陳沖得玉璽廣三寸長四寸直看無文字向曰視之字在腹裏言光當王王彪之議曰未詳傳國璽造創之始歷代以來揖讓禪位以茲相授故是傳國之守器也拾遺録曰武王滅紂樵夫牧豎探鳥巢得赤玉璽文曰水德方滅火祚方盛文皆大篆故三分天下而二分歸周又曰晉太康元年孫皓送六金璽云時無玉工故以金為印璽漢武內傳曰西王母佩金剛靈璽鄧析書曰為之符璽以信之則并與符璽而竊之綬爾雅曰繸綬也即佩玉之組也所以連繫瑞玉者因通謂之繸也禮記玉藻曰天子佩白玉而玄組綬公侯佩山玄玉而朱組綬大夫佩水倉玉而純組綬世子佩瑜玉而綦組綬士佩瓀玫縕組綬説文曰緺紫青色綬也應劭漢官儀云綬者有所受以別尊卑彰有德也又云綬長一丈二尺法十二月闊三尺法天地人董巴輿服志曰戰國解去紱珮留其絲以為章表秦乃以采組連結於禭光明章表轉相結綬故謂之綬乘輿黃赤綬四采黃赤縹紺淳黃圭長二丈九尺五百首太皇太后皇太后皇后皆同又漢官儀云乘輿綬黃地骨白羽青絳緑五采四百首長二丈三尺王赤綬四采赤黃縹紺淳赤圭長二丈八尺三百首公主大貴人諸侯皆同又漢官儀云四采絳地骨白羽青黃赤緣二丈一尺二百六首諸國貴人相國緑綬三采緑紫白淳緑圭長二丈一尺百四十首將軍紫綬二采紫白淳紫圭長一丈七尺百八十首公主封君同又漢官儀云丞相御史大夫胸奴亦同九卿中二千石一云青緺綬緺紫青色緺音瓜二千石青綬三采青白紅淳青圭長一丈八尺一百二十首又漢官儀綬羽青桃花縹長丈八尺自青綬已上縌音逆皆長三尺二寸與綬同采而首半之縌者古佩禭也佩禭相迎受故曰縌紫綬之間得施玉環玦千石六百黑綬三采青赤紺淳青圭長丈六尺八十首漢官儀云墨綬白羽青地絳二採長丈七尺四百丞尉三百長相二百石皆黃綬一采淳黃圭長丈五尺六十首又漢官儀云黃綬絲八十首長文七尺自黑綬以下縌長三尺綬同采而首半之百石青紺綬一采宛轉繆織圭長丈二尺凡先合單紡為一絲四絲為一扶五扶為一首五首成一文文采淳為一圭首多者絲細少者粗皆廣六寸史記曰武帝召東郭先生出拜為郡都尉先生久待詔公車行雪中履有上無下及其拜為二千石佩青緺之綬也漢書曰諸侯王高帝初置金璽盩綬如淳曰盩音戾緑也晉灼曰盩草也出琅耶平昌縣又曰朱買臣字翁子拜會稽太守上謂之曰富貴不歸故鄉如衣錦夜行買臣頓首謝乃微行懷其印綬步歸郡邸邸吏方與群飲不視買臣買臣共飲醉飽少間守邸微見其綬而引之即會稽太守章也守邸驚出相語掾吏皆云妄誕守邸曰試觀之素輕買臣者入見皆驚走大呼曰實然乃推排庭中拜謁又曰蕭育字次君與朱博友善人稱曰蕭朱結綬又曰南越反楊僕拜樓船將軍東越反上復欲使為將僕甚伐前勞勑責之曰士卒暴露連歲將軍不念其勤勞而造佞巧請乘傳行塞因用歸家懷銀黃垂三組誇鄉里是三過也又曰金日磾兩子賞建俱侍中與昭帝同共臥起賞為奉車都尉建附馬都尉及賞嗣侯佩侯綬上謂霍將軍曰金氏兄弟兩人不可使俱兩綬耶霍光曰賞自嗣為侯耳上笑曰侯不在我與將軍乎光曰高帝之約有功乃得封侯時年俱八九歲又曰莽上漸臺商人杜吳殺莽取其綬漢名臣奏云大司空朱浮奏曰車府承宏受詔乘輿綬五采何多黃也可更用赤絲為地東觀漢記曰沛王楚王來朝就國明帝告諸王傳相王之子年五歲以上皆令帶列侯綬復送綬十九枚為諸子在道欲急帶之也又曰李忠仲都發兵奉世祖封武固侯時無綬上自解所佩綬以賜忠又曰弟五倫諸王當歸國詔書選三署郎補王家長史除倫為淮陽王醫工長時輩除者多綬盡但假印倫請於王王賜之綬又曰馬防為車騎將軍城門校尉置掾史位在九卿上絶席詔封頴陽侯持以前參醫藥勤勞省闥以襄城美亭千二百五十戶增防身帶三綬寵貴至盛又曰掠得羌侯君長紫綬十七艾綬二十八黃綬二枚皆入簿貴人相國緑綬三綵緑紫白純緑圭公侯將軍紫綬二彩紫白純紫圭公主封君同九卿中二千石青綬三彩青白紅純青圭千石六百石黑綬二彩青紺純青圭四百三百二百石黃綬純黃一彩百石青紺綬一彩宛轉繆織魏志曰太祖與呂布書國家無好金孤自取家好金更相為作印國家無紫綬自取所帶綬以藉心又曰丁諡父斐字文侯建安末太祖征吳斐隨行自以家牛羸困私易官牛被收送獄奪官後太祖啁斐曰文侯印綬何在斐亦知見戲也對曰以易餅晉輿服志曰諸假印綬而官不給鞶囊得自具作其但假印不假綬者不得佩綬也晉書曰衛瓘録尚書事加緑緣綬履上殿入朝不趍晉令曰皇太子及妃諸王纁朱綬郡公主朱綬郡侯青朱綬梁書曰張纘為尚書僕射議南郊印綬官若備朝服宜並著綬時並施行博物志曰光武嫌二千石綬不青而細朱浮議更用青羽又曰太僕朱浮言詔書曰百官皆帶王莽時綬又不齊因前袁安故綬二李涉等六家所織綬不能具丙丁文能如組狀募能為丙丁文謹圖畫一綬丙丁制度賜縑五十匹今王莽時六安都尉留應募能為丙丁文謹處武庫給食留晝夜思念諷誦狂癡三十日病愈今文以成請賜縑五十匹西京雜記曰昭陽殿上設五色流蘇帶以緑文紫綬又曰趙飛燕為皇后其弟上遣五色文綬蔡雍獨斷曰皇后赤紱王璽貴人緺綬金印五色也蔡雍雜章曰相國金印緑綬位在公上所以殊異休烈群臣莫得而齊新序曰昌邑王取侯王二千石黑綬黃綬與左右佩之龔遂諫曰高皇帝造花綬五等陛下取之而與賤人臣以為不可願陛下收之風俗通曰車騎將軍馮緄字鴻卿為議郎發綬笥有二赤蛇可長二尺分南北走大用憂怖季山孫字寧方得其先人祕要緄請使卜云君後三歲當為邊將東北四五千里官以東為名復五年為大將軍南征此吉祥也居無幾拜遼東太守會武陵蠻夷黃高攻燒南郡鴻卿以威名素著選登亞將奮虓虎之勢又曰秦昭王遣李冰為蜀郡太守開成都兩江闢田萬頃江神每歲須童女二人不然為水災冰曰以女與神因責之良久有蒼牛鬥於岸上有間冰還謂官屬曰鬥太極可相助也若欲知向南腰中正白者我綬也主簿刺殺北向者神遂絶管氏易林曰遘鼠咋紫綬衣服皆遷之象新五行書曰懸虎鼻門上子孫帶綬張衡集曰南陽太守鮑得有詔所賜先公綬笥傳世用之時得更治笥平子為主簿作銘陸機吊魏武曰今為著作郎遊祕閣見魏武遺令云吾衣裳可為一藏歷官所著者綬內藏中
