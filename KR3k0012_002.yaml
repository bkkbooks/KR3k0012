body:
  text: 天部一元氣三五曆紀曰未有天地之時混沌狀如雞子溟涬始牙濛莫孔切鴻胡孔切滋萌歲在攝提元氣肇始又曰清輕者上為天濁重者下為地沖和氣者為人故天地含精萬物化生河圖曰元氣闓音開陽為天又曰元氣無形洶洶蒙蒙偃者為地伏者為天也禮統曰天地者元氣之所生萬物之所自焉孝經左契曰元氣混沌孝在其中漢書律曆志曰黃鍾黃者中之色故陽氣施於下泉孳萌萬物為六氣元也故以黃色名元氣焉又曰太極運三辰五星於上元氣轉三統五行於下家語曰夫禮必本之太一太一分為天地轉為陰陽變為四時列為鬼神太一謂元氣也淮南子曰道始生虛霩生宇宙宇宙生元氣有涯垠清陽者薄音博劘音摩而為天又曰古未有天地之時唯象無形幽幽冥冥茫茫昧昧幕幕閔閔鴻濛澒洞莫知其門有二神混沌生高誘注曰二神經天營地之神經地營天孔深也乎莫知其終滔乎莫知其所止息於是乃別為陰陽離為八極剛柔相成萬物乃形遁甲開山圖曰有巨靈者遍得元神之道故與元氣一時生混沌又曰南溟之山金堂玉室上無元氣實滋神化又曰麗山氏分布元氣各生次序産生山谷帝系譜曰天地初起溟涬濛鴻即生天皇始萬八千歲以木德王十洲記曰崑陵崑崙山也上有金臺玉闕亦元氣之所合天帝之居治處六韜曰天之為天遠矣地之為地久矣萬物在其間各自利何世莫之有乎夫使世俗皆能順其有是乃溟涬濛鴻之時為王故莫之能有七十六聖發起其所繫天下而有之豈一日哉楊泉物理論曰揚雄非渾天而作蓋天圓其蓋左轉日月星辰隨而東西桓談難之雄不解此蓋天者復難知也元氣皓大則稱皓天皓天元氣也皓然而已無他物焉揚雄檄靈賦曰自今推古至於元氣始化古不覽今名號迭毀請以詩春秋言之又解嘲曰太玄五千文支葉扶疏獨説十餘萬言深者入地底高者出蒼天大者涵元氣纖者入無倫等也班固東都賦曰萬樂備百禮暨皇情浹群臣醉降煙熅調元氣又漢頌論功歌詩曰后土化育兮四時行修靈液養兮氣覆冬同雲兮春霡霂膏澤洽兮殖嘉穀張衡玄圖曰玄者包含道德構掩乾坤櫜籥元氣稟受無原陳思王魏德論曰元氣否塞玄黃漬薄星辰逆行陰陽舛錯國無完邑陵無掩槨四海歸沸蕭條沙漠又七啓曰有形必杇有端必窮茫茫元氣誰知其終孫楚石人銘曰大象無形元氣為母杳兮冥兮陶冶衆有陸機雲賦曰攄神景於八幽合洪化於煙熅充宇宙以播象協元氣而齊勳潘嶽西征賦曰古往今來邈矣悠哉寥廓惚恍化一氣而甄三才太易老子曰有物混成先天地生易乾鑿度曰夫有形者生於無形故有太易者未見氣也帝王世紀曰天地未分謂之太易列子曰夫有形者生於無形則天地安從生自然而生故有太易太初太始太素此有物之始自微至著變化自相因襲太易者未見氣也易者不窮滯之稱凝寂於太虛之域將何見乎即如易繫之太極老氏之混成太初者氣之始也陰陽未判下句所謂渾淪太始者形之始也陰陽既判品物流形太素者質之始也質性也既為物矣則方圓剛柔靜躁各有其性氣質具未相離此直論氣之形質不復説太易為三者宗本下句別自明之故曰渾淪渾淪者言萬物相渾淪而未相離雖渾然一氣不相離襲而三才之道實潛兆乎其中淪語助也視之不見聽之不聞循之不得故曰易也易無形畔老子曰視之不見名曰希而曰易易簡之別稱也太易之義如此而已故能為萬物宗性真一而不變也易變而為一所謂易者窈冥忽恍不可變也一氣持之而化變故寄名變也一變而為七七變而為九九變者之究也究窮也一變而為七九不足以次數者全舉陽數顧其都會也乃復變而為一一者形變之始既涉於有形之域理數既終乃復反而為一反而為一歸形變之始也此蓋明變化往復無極太初易乾鑿度曰太初者氣之始也帝王世紀曰元氣始萌謂之太初詩推度災曰陽本為雄陰本為雌物本為魂宋均注曰本即原也變陰陽為雄雌魂也亦言未有形也皆無兆朕故謂之氣雄生八月仲節號曰太初行三節節猶氣也太初者氣之始也必知生八月仲者據此時薺夌生以為驗也陽生物行三節者須雌俱行物乃著也廣雅曰太初氣之始也清濁未分莊子曰太初有無言太古之初上下未形所有者無無有無名既無有形人無有名一之所起有一而未形一謂道也物得以生謂之德淮南子曰稽古太初人生於無當太初天地之始人生於無形無形生有形也成形於有有形而制於物為物所制揚雄檄靈賦曰太易之始太初之先馮馮沉沉奮搏無端王阜老子聖母碑曰老子者道也乃生於無形之先起於太初之前行於太素之元浮遊六虛出入幽冥觀混合之未別窺清濁之未分陳思王魏德論曰在昔太初玄黃混并渾沌濛鴻兆朕未形阮籍孔子誄曰養徒三千外堂七十潛神演思因史作書考混元於無形本造化於太初又大人先生傳曰太初真人惟太之根專氣一志萬物以存又曰馳騖乎太初之中休息乎無為之宮太初何始無後無先太始易乾鑿度曰太始者形之始也又曰雌生戍仲號曰太始雄雌俱行三節俱行起自戍仲至亥帝王世紀曰氣形之初謂之太始楚辭天問曰遂古之初誰傳道之王逸注曰初始也太始之元虛廓無形神物未生誰傳此道上下未形何由考之言天地未分混沌無根誰考述而知也張衡玄圖曰玄者無形之類自然之根作於太始莫之與先阮籍大人先生傳曰登乎太始之前覽乎忽漠之初慮周旋於無外志浩蕩而遂舒太素易乾鑿度曰太素質之始也又曰雄含物魂號曰太素雌雄俱行故能含物魂而生物也獨吉雄雌主於陽故也帝王世紀曰形變有質謂之太素太素之前幽清寂寞不可為象惟虛惟無蓋道之根自道既建猶無生有太素質始萌萌而未兆謂之龐洪蓋道之幹既育萬物成體於是剛柔始分清濁始位天成於外而體陽故圓以動蓋道之實禮斗威儀曰二十九萬一千八百四十歲而反太素冥莖蓋乃道之根也禮含文嘉曰推之以上元為始起十一月甲子朔旦夜半冬至日月五星俱起牽牛之初鄭玄注上元太素已來至所求年廣雅曰太素質之始也已有素朴而未散也樂動聲儀曰作樂制禮時有五音始於上元戊辰夜半冬至北方子鄭玄注曰戊辰土位土為宮宮為君故作樂尚之以為始也夜半子亦天時之始禮稽命微起於太素十一月閼逢之曰歲在攝提格之紀是云作樂制禮蓋作樂則有禮通其文耳張衡靈憲注曰太素之前幽清玄靜寂寞冥默不可為象厥中惟靈如是者永久焉斯謂冥莖蓋乃道根既建由無生有太素始萌萌而未兆并體同色坤屯不分坤屯音渾沌陳思王髑髏説曰昔太素氏不仁勞我以體苦我以生今也幸變而之死是反吾真也又魏德論曰不能貫道義之清英窮混元於太素亦以明矣又魏文帝誄曰皓皓太素兩儀始分沖和産物肇有人倫又大暑賦曰壯皇居之瑰瑋兮步八閎而為宇節四運之常氣兮踰太素之儀矩阮籍通老論曰聖人明於天人之理達於自然之分通於治化之體審於大慎之訓故君臣垂拱太素之撲百姓熙怡保性命之和又詩曰焉得松喬頤神太素逍遙區外登我年祚又老子讚曰陰陽不測變化無倫飄颻太素歸虛反祚陸機孫權誄曰皇聖膺期有命太素承亂下萌清難天步又浮雲賦曰集輕浮之衆采廁五色之藻氣貫元虛於太素薄紫微而竦戾又詩曰太素卜令宅希微啓奧基玄沖慕懿文虛無承先師又詩曰澄神玄漠流樓心太素域弭節欣高視俟我大夢覺顧公直答陸機曰恢恢太素萬物初基在昔哲人觀衆濟時太極易繫辭曰易有太極是生兩儀兩儀生四象四象生八卦漢書律曆志曰太極元氣函三為一又曰太極中央元氣故為黃鍾又曰元以統始易太極之首也帝王世紀曰質形已具謂之太極樂動聲儀曰神守於心遊於目窮於耳往乎萬里而至疾故不得而不速從胸臆之中而徹太極援引無題人神皆感神明之應音聲相和班固典引曰太極之先兩儀始分煙煙熅熅有沉而奧有浮而清陳思王七啓曰夫太極之初混沌未分萬物純純與道俱運又晝讚敘曰上形太極混元之前却列將來未萌之事阮籍通老論曰道者法自然而為化侯王能守之萬物將自化易謂之太極春秋謂之元老子謂之道陸機雲賦曰覽太極之初化判玄黃於乾坤考天壤之靈變莫稽美乎慶雲傅玄風賦曰嘉太極之開元美天地之定位樂雷風之相薄悅山澤之通氣張華詩曰混沌無形氣奚從生兩儀元一是能分太極焉得離玄為誰翁子道是誰家兒天行自西回日月曷東馳陸士龍答士衡詩曰伊我世族太極降精昔在上代軒虞篤生天部釋名曰天顯也在上高顯也天坦也坦然高而遠也易曰天垂象見吉凶聖人則之又曰觀乎天文以察時變觀乎人文以化成天下又曰立天之道曰陰與陽又曰天行健君子以自強不息又曰本乎天者親上本乎地者親下又曰天地之道貞觀者也又曰天道虧盈而益謙又曰天地設位而易行乎其中又曰乾為天又曰時乘六龍以御天又曰天尊地卑異乾坤定矣又曰在天成象在地成形又曰大哉乾元萬物資始乃統天書曰高明柔克沉潛剛克高明謂天也又曰乃命羲和欽若昊天又曰皇天無親惟德是輔又曰皇天震怒命我文考肅將天威詩曰敬天之威不敢馳驅又曰天步艱難之子不猶又曰悠悠蒼天此何人哉又曰謂天蓋高不敢不局謂地蓋厚不敢不蹐局典也蹐纍足也箋云局蹐者天高而有雷電地厚而有淪陷此民疾若王政上下皆可畏怖之言禮曰天地之道博也厚也高也明也悠也久也今夫天斯昭昭之多及其無窮也日月星辰繫焉萬物覆焉又曰天則不言而信天無私覆是天道也無為而物成又曰天秉陽垂日星秉待也又曰天不愛其道故天降甘露又曰天有四時春夏秋冬風雨霜露無非教也又曰著不息者天也聖人作樂以應天又曰燔柴於泰壇以祭天也又曰孟冬之月天氣上騰地氣下降又曰祭天於南郊就陽之義也祭天掃地而祭於其質而已矣又曰清明象天傳曰天有六氣降生五味六氣者陰陽風雨晦明又曰叔孫穆子夢天壓己弗勝又曰公孫歸父會楚子於宋宋人告急於晉晉侯欲殺之伯宗曰不可天方授楚未可與爭雖晉之強能違天乎又曰晉侯賜畢萬魏卜偃曰畢萬之後必大萬盈數也魏大名也以是始賞天啓之矣爾雅曰穹蒼天也天形穹隆其色蒼蒼因以名云春為蒼天萬物蒼蒼生也夏為昊天言氣皓旰秋為旻天旻猶愍悠也愍萬物凋落也冬為上天言時無事在上臨下而已語曰天何言哉四時行焉百物生焉又曰惟天為大惟堯則之又曰夫子之不可及也猶天之不可階而升也易乾鑿度曰天動而施曰仁地靜而理曰義又曰輕清者上為天重濁者下為地又曰天有陰陽地有柔剛人有仁義是謂三才京房易傳曰地動陰有餘天裂陽不足此臣下盛強害君上之變也景帝三年天東北有赤氣廣長十餘丈或曰天裂其後七國兵起春秋説題辭曰天之為言顛也居高理下為人經也白虎通亦云群陽精也合為太一分為殊名故立字一大為天禮統曰天地者元氣之所生萬物之祖也天之為言鎮也神也珍也施生為本運轉精神功效加列陳其道可珍重也尚書考靈耀曰中央鈞天其星角亢東方皋天呂氏春秋曰蒼天廣雅曰上天其星房心東北變天其星斗箕北方玄天其星須女西北幽天其星奎婁西方成天呂氏春秋曰皓天其星胃昴西南朱天其星參狼南方赤天呂氏春秋廣雅皆曰炎天其星輿鬼柳東南陽天其星張翼軫呂氏春秋曰天有九野東方曰蒼天西方曰皓天南方曰炎天其餘悉同周書曰神農之時天雨粟神農耕而種之尚書中候曰天地開闢甲子冬至日月若懸壁五星若編珠詩記曆樞曰箕為天口主出氣大戴禮曰放勛其仁如天其智如神就之如日望之如雲春秋感精符曰人主與日月同明四時合信故父天母地兄日姊月父天於圜丘之禮也母地於方澤之祭也兄日於東郊姊月於西郊也春秋繁露曰天有十端天為一端地為一端陽為一端陰為一端水為一端土為一端人為一端金為一端木為一端火為一端凡十端天亦有喜怒之氣哀樂之心與人相副以類合之天人一也春喜氣故生秋怒氣故殺夏樂氣故養冬哀氣故藏四者天人同有之春秋內事曰天有十二分次日月之所躔也春秋元命包曰天不足西北陽極於九故周天九九八十一萬里孝經援神契曰周天七衡六間者相去萬九千八百三十三里三分里之一合十一萬九千里從內衡以至中衡中衡以至外衡名五萬九千五里史記曰叔虞母夢天謂武王曰余命汝生子名虞余與之唐及生子有文在手曰虞遂因命之漢書東方朔答難曰以管窺天以蠡測海豈能考其文理哉又曰漢惠帝二年天開北廣十餘丈後漢書曰和熹鄧皇后嘗夢捫天天體蕩蕩正青滑如磄有若鍾乳狀乃仰嗽飲之以訊占夢言堯夢攀天而上湯夢及天而舐之此皆聖王之前占吉不言也蜀志曰吳使張溫來聘秦密在諸葛亮座溫曰何人亮曰學者溫問曰天有頭乎密曰有詩曰乃眷西顧天若無頭何以顧之又曰有耳乎曰有詩云鶴鳴于九皋聲聞于天無耳何以聞之天有足乎曰有詩云天步艱難若無足何以步天有姓乎曰有曰何姓曰姓劉何以知之曰其子姓劉故以知之溫大敬之晉書曰世祖登祚探策得一群臣失色吏部郎中裴揩進曰天得一以清王侯得一為天下貞上大悅又曰惠帝末天裂為二無雲有聲如雷晉中興書徵祥説曰大興二年天鳴東南有聲如水相薄三年又鳴後哀帝廢後魏書曰聖武田於野見輜軿自天而下至則見美女曰天使我偶君遂寢宿旦乃還期周年復會於此既而以所生男授帝曰善養之世為帝王子即始祖也齊書曰王摛史學博聞永明中天忽黃色照地衆莫能解摛云是榮光世祖大悅用為永陽郡守陳書曰高祖夢天開數丈有一人朱衣捧日令帝張口納之及覺猶熱後二百日為帝
