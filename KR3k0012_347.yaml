body:
  text: 兵部七十七刀下陶弘景刀劍録曰董卓少時耕野得一刀無文字四面隱起作山雲文斫玉如木及貴示五官郎蔡雍雍曰此項羽刀也又曰袁紹在黎陽夢有人授一寶刀及覺果在床前銘曰思紹思紹字也又曰郭璞於太原得一刀文曰宜為將後遂為將軍及與蜀戰敗走遂失此刀又曰王雙曾於市中買得一刀賣人曰得之者貴因之不見雙後佩之果為將將此刀與曹真真以一刀換之又曰鍾會克蜀於成都土中得一刀文曰太一刀會死入帳下王伯升後渡浮江刀遂飛入水又曰鄧女年十二曾讀太山碑碑下掘得一刀黑如漆色長三尺餘上常有風氣冷凄凄然時人以為神賜又曰孫權遣張昭代周瑜為南郡太守曾作一刀背上有蕩寇將軍四字八分書又曰蔣欽拜別部司馬造一刀文曰司馬古隸書又曰周幼平擊曹公勝拜平虜將軍因造一刀遂銘曰幼平又曰董元代少果勇自打鐵作刀後討黃祖蒙衝俠河元代引刀斷蒙衝纜分為二流大司馬號刀曰斷蒙刀又曰潘文圭偏將軍為擒關羽拜固陵太守因刻刀曰固陵又曰朱理君少愛征討黃武中纍功拜安國將軍作佩刀文曰安國又曰關羽為先主所重不惜身命自採武都山鐵為二刀銘曰萬人及羽敗惜刀投於水又曰張益德初受新亭侯自命匠鍊赤珠山鐵為一刀銘刃曰新亭侯蜀帝大將也後被范強將此刀入吳又曰黃中從先主定南郡得一刀赤如血於漢中擊夏侯軍一日之中手刃數百又曰諸葛亮定黔中從青石祠過拔刀刺山沒刃不拔而去行者莫測又曰蜀主劉備令蒲元造刀五千口皆連環及刃口刻七十二鍊柄中通之兼有二字又曰西晉司馬炎咸寧元年造刀八千口銘曰司馬又曰東晉司馬聃永和五年於房山造五口刀銘曰五方單符隸書又曰前趙劉元海元熙二年造滅賊刀長三尺九寸隸字又曰後蜀主李雄晏平元年造騰馬刀五百口隸字又曰前涼張實造刀一百口無故盡生文曰霸又曰後趙石勒建平元年造一刀用五金工用萬人尖頭長三尺六寸銘曰建平隸書又曰石勒未貴時耕得一刀銘曰石氏昌篆書又曰石季龍建武十四年造一刀長五尺銘曰皇帝石勒氏隸書又曰西涼李皓玄威元造珠碧刀銘曰百勝隸書又曰前秦符堅甘露四年造一刀用五千功銘曰神術隸書又曰前燕慕容俊元年造二十八口刀銘曰二十八將又曰後燕慕容垂興元元年於中山造刀一口長三尺六寸隸書又曰後秦姚萇建初元年造二刀長七尺一銘曰雄一曰雌隸字若叩即鳴又曰西秦乞伏國仁建義三年造刀一口銘曰建義隸字又曰後涼呂光麟嘉元年造一刀銘曰背麟長三尺六寸又曰南涼禿髮烏孤大初三年造一刀狹小長三尺五寸青色匠云當作之時夢見一人被朱衣云吾是太一神故看爾作此刀有敵至刀必鳴後落突厥可汗處又曰南涼慕容去明建平元年造刀四口文曰建平隸書又曰北涼沮渠蒙遜永安三年造刀百口銘曰永安隸書又曰夏赫連勃勃龍升二年造五刀背上有龍雀環兼金鏤作一龍形長三尺九寸劉𥙿破長安得此刀後入梁又曰北燕馮跋太平八年造一刀銘曰太平隸書又曰宋高祖劉𥙿永初元年造一刀銘其背曰定國小篆書長八尺後入梁又曰宋劉義符景平元年造一刀銘曰五色小篆書又曰劉淮升明元年掘得一刀銘曰上血其刀光照一室帝奇之常服至二年七月帝使楊玉夫候織女玉夫候不得懼死因用弒帝果如其銘故知吉凶其兆見矣又曰齊高祖蕭道成建元二年克位造一刀銘曰定業長五尺篆書帝自制之又曰明帝鸞建武二年造一刀銘曰朝儀刀小篆書長四尺又曰後魏宣武帝以景明元年於白鹿山造白鹿刀隸書又曰後魏元昭成帝建國元年於赤冶城鑄刀十口金鏤赤冶二字隸書莊子曰庖丁為惠文君解牛丁曰今臣之刀十九年矣所解數千牛矣而刃若新發於硎彼節者有間而刀刃者無厚以無厚入無間恢恢乎其游刃必有餘地是以十九年而刀刃如新發於硎列子曰周穆王征西戎獻赤刀切玉如切泥墨子曰墨子見齊王曰有刀於此試之人頭倅然斷之可謂利也王曰利墨子曰刀則利矣孰將受其不祥王曰刀受其利試者受其不祥墨子曰并國覆軍賊殺百姓孰謂受其不祥王俯仰曰我受其不祥孔叢子曰秦王得西戎利刀以之割玉如割木淮南子曰屠牛坦一朝解九牛而刀可以剃毛又曰鉛不可以為刀銅不可以為弩鐵不可以為弓木不可以為斧又曰金勝木者非以一刀殘林也土勝水者非以一墣塞江也墣塊也法言曰刀不利筆不銛宜加諸礪阮子曰裁國無利器猶鉛刀而望其巧抱朴子曰金丹以塗刀辟兵萬里論衡曰世諱厲刀井上恐刀墮井中或說以為刑之字井與刀也厲刀井上井刃相見恐被刑也典論曰魏太子丕造百辟寶刀三其一長四尺三寸六分重三斤六兩文似靈龜名曰靈寶其二采似丹霞名曰含章長四尺四寸三分重三斤十兩其三鑒似崩霜刀身劍鋏名曰素質長四尺三寸重二斤九兩又造百辟露陌刀一長三尺二寸重二斤二兩狀似龍文名曰龍鱗聖證論曰昔國家有優曰史利漢氏舊優也云梁冀有火浣布切玉刀一朝以為誕而不信也正始初得火浣布乃信楚辭曰師望在肆昌何識師望謂太公也昌文王名也言太公在市肆而屠何似知識之鼓刀楊聲后乃喜后謂文王又曰鉛刀進御違棄太阿太阿劍名張衡西京賦曰吞刀吐火雲霧杳冥畫地成川流渭通涇劉楨瓜賦曰折以金刀四剖三離曹植寶刀賦曰建安中家父魏王乃命有司造寶刀五枚三年乃就以龍虎熊馬雀為識太子得一余及余弟饒陽侯各得一焉其餘二枚家王自杖之賦曰有皇漢之明后思潛達而玄通飛文義以博致揚武備以禦凶乃熾火炎爐融鐵挺英烏獲奮椎歐冶是營扇景風以激氣飛光鑑於天庭爰告祠於太乙乃感夢而通靈然後礪以五方之石鑿以中黃之壤規員景以定衆攄神思而造像垂華紛之葳蕤流翠采之晃漾陸斬犀象水斷龍舟輕擊浮截刃不瀸流踰南越之巨闕超有楚之太阿實真人之攸御永天祿而是荷樂府歌曰秦家有好女自名曰女休休年十四五為宗行報讎左執白陽刀右據宛景矛張華詩曰吳刀鳴手中利劍嚴秋霜古詩曰美人贈我金錯刀何以報之雙瓊瑤後漢馬敬通刀陽銘曰修爾甲兵用戒不虞見危授命臨事而懼又刀陰銘曰溫溫穆穆配天之威苗裔無疆福祿來綏後漢李元錯佩刀銘曰佩之有錯抑武揚文豈為麗好將戒其身又金馬書刀銘曰巧冶練剛金馬託形黃文錯鏤兼勒工名魏文帝露陌刀銘曰於鑠良刀胡練亶時譬諸麟角靡所任茲不逢不若永世寶持曹植寶刀銘曰造茲寶刀既礱既礪匪以尚武豫身是衛麟角匪觸鸞距匪蹶王粲刀銘曰相時陰陽制法利兵陸剸犀兕水截鯢鯨君子服之式章威靈何晏斫猛獸刀銘曰徒摶不共作戒宣丘用造斯器螭獸是劉制禽允良昏明亶時永釐厥後蠲民之災一作斬虎刀銘曰螭虎是劉晉張協把刀銘曰赫赫名金昆吾遺璞裁為把刀利亞切玉時文斯偃含精內燭威助雖化武不可黷裴景聲文身刀銘曰良金百鍊名工展巧寶刀既成窮理盡妙文繁波回流光霆一作電照在我皇世戢而不耀張協露陌刀銘曰露陌在服威靈遠振遵養時晦曜得崇信魏武策軍令曰孤先在襄邑有起兵意興工師共作卑手刀時北海孫賓碩來候孤譏孤曰當慕其大者乃與工師共作刀耶孤答曰能小復能大何苦曹植表曰昔歐冶改視鉛刀易價伯樂所眄駑馬百倍王濬表曰孫皓出案行石頭還左右兵皆跳刀大呼云要當為國家一死戰決之勝魏帝尚以千人定天下况今有數萬衆自足辨事晧意大喜便開庫藏盡出金寶以賜與之小人無狀得便持走陶侃表曰伏承大官廚器損失謹奉獻狼炙刀槃二具張衡與特進書曰以為鉛刀強可一割謝尚與張涼州書曰今致五尺金斷頭刀一口班固與竇憲箋曰今月中以令賜固刀曰此將軍少小時所服今賜固伏念大恩且喜且慚謝尚與楊征南書曰云今餉五尺金頭刀碧綾車中盾梁簡文帝謝勑賚善勝威勝刀啓曰冰鍔含采雕琰表飾名均素質神號脫光五寶初成曹丕先荷其一二勝今造愚臣揔被其恩錫韓非之書未足為比給博山之筆方此更輕梁劉孝儀為晉安王謝東宮賜玉環刀啓曰苗峰珍鋌利極銛鋩謹當擁以雄身藉而安體匕首通俗文曰匕首劍屬其頭類匕故曰匕首短而便用周禮冬官無桃氏曰桃氏為劍廣臘二寸有半寸臘謂兩刀也兩從半之鄭司農云謂劍脊兩面殺趣鄂者也以其臘廣為之莖圍長倍之鄭司農云莖謂劍夾人所握鐔以上也玄謂莖在夾中者莖長五寸也參分其臘廣去一以為首廣而圍之身長五其莖長重九鋝音刷謂之上制上士服之身長四其莖長重七鋝謂之中制中士服之身長三其莖長重五鋝謂之下制下士服之上制長三尺重三斤十二兩中制長二尺五寸重二斤十四兩三分兩分下制長二尺重二斤一兩三分兩之一此今之匕首也各以其形貌大小帶之此上謂國勇力之士能用五兵者也樂記武正克啇碑冕搢笏而虎賁之士說劍也史記曰燕丹使荊軻刺秦王預求天下名匕首趙人徐夫人匕首取之百金使工以藥淬之以試人血濡縷無不亡死者摘秦王不中見誅漢書曰王莽避火宣室持虞帝匕首東觀漢記曰鄧遵破胸奴得劍匕首二三千枚魏志曰典韋好節俠襄邑劉氏與睢陽李禮為讎韋為報之懷匕首入殺禮徐步而去後魏書曰叔孫俊少聰敏十五內侍左右以便弓馬轉獵郎太宗初以俊爪牙與磨渾等拾遺左右遷衛將軍賜爵安城公朱堤王悅懷刃入禁欲為大逆俊覺悅動有異便引手於悅懷中得兩刃匕首遂執悅殺之太宗以俊功重軍國大計皆委之說苑曰秦王以五十里封𨻳陵君𨻳陵君辭不受使唐且謝秦王秦王怒曰嘗見天子之怒乎一怒伏尸百萬流血千里唐且曰大王嘗聞布衣韋帶之士怒乎一怒伏尸二人流血五步即案其匕首起曰今將是矣王變色長跪曰先生就坐寡人喻矣秦破韓滅魏𨻳陵獨以五十里存者徒用先生故乎零陵先賢傳曰劉章請劉備璋將楊懷數諫備誤主人請璋子禕及懷酒酣備見懷佩匕首備出其匕首謂曰將軍匕首好孤亦有可得觀之懷與之備得匕首謂懷曰汝小子何敢間我兄弟之好邪懷罵言未訖備斬之典論曰昔周魯之寶赤刀孟勞楚越稱太阿純鈞余善擊劍能以短乘長故選茲良金命彼國工精而鍊之至于百辟其始成也五色充爐臣囊自鼓靈物倣佛飛鳥翔舞以為三劍三刀三匕首因姿定名以銘其拊惜乎不遇薛燭青萍也其三劍一曰飛景長四尺二寸二曰流采長四尺二寸三曰華鋌色似綵虹長四尺二寸其三刀一曰靈寶長四尺二寸似靈龜二曰含章采似丹霞長四尺四寸三曰素質長四尺三寸刀身而劍鋏其三匕首一曰清剛長二尺三寸光似堅冰二曰楊文長二尺一寸重一斤六兩曜似朝日三曰龍鱗狀似龍文又曰昔周魯寶鹿狐之戟屈盧之矛狐父之戈徐氏匕首凡斯皆上世名器用子雖有文事必有武備矣諸葛亮教曰作部仲匕首五百枚以給騎士鹽鐵論曰荊軻懷數年之謀事不就者以尺八匕首不足恃也神仙傳曰有書生姓張就李仲文學隱術久無所得患之張懷匕首斫之仲文笑曰我寧可殺拾遺記曰漢太上皇微時常佩一刀長三尺上有名字雖難識疑是殷高宗伐鬼方時物也上皇遊豐沛山中寓居窮谷裏有冶鑄上皇息其傍問曰此鑄何器工笑答曰天子鑄劍慎勿泄上皇謂戲辭無疑色工人曰今所鑄剛礪製器難成若得翁腰間佩刀雜而冶之即成神器可以剋定天下昂星為輔以殲三猾木衰火盛此為興何上皇曰余此物為匕首其利難儔水斷虬龍陸斬虎豹魑魅魍魎莫能逢之切玉鐫金其刃不卷工人曰若不得此匕首以和鑄雖歐冶專精越礪劍鍔終為鄙器上皇即解之以投爐中俄而煙焰衝天日為之晦及乎劍成殺三牲以釁祭工問上皇曰何時得此匕首答曰秦昭襄王時余時行逢一野人於野授余云是殷高宗初時物此世世相傳上有古書字記其年月及成劍工人視之其銘尚存叶前疑也工人即持以授上皇上皇賜高祖高祖長佩於身以殲三猾天下已定呂后藏於寶庫之中守藏者見白氣如雲出戶外如龍蛇庫名曰靈禽藏及諸呂擅權白氣亦滅案鉤命決蕭何為昂星精項羽陳勝胡亥為之三猾晉張載匕首銘曰先民造制戒豫惟謹匕首之設應速用近既不忽備亦無輕忿利以形彰功以道隱鋏史記曰馮暖聞孟嘗好客見之君置之傳舍五日彈其劍鋏而歌曰長鋏歸來兮食無魚君遷之幸舍五日彈其鋏歌曰長鋏歸來兮出無輿又遷之代舍五日又彈其劍歌曰長鋏歸來兮無以為家一出戰國策曹子建詩曰長鋏鳴鞘中晉張協長鋏銘曰五才並建金作明威長鋏陸離弭凶防違素刃霜厲溢景橫飛又短鋏銘曰器用名品詭制殊觀亦有短鋏清暉載爛昔在光明戢兵靜亂惟皇寶之優而弗玩左思吳都賦曰毛群以齒角為矛鋏劉淵林注曰鋏刀身劍鋒有長有短也鈹說文曰鎩鈹有鐔也鈹普皮切左傳昭七年曰吳公子光伏甲於窟室而享王門階戶席皆王親也夾之以鈹羞者薦體抽劍刺王鈹交於胸左思吳都賦曰羽族以觜距為刀鈹鈹兩刃小刀也
