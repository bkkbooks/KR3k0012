body:
  text: 兵部二十五示弱孫子曰兵者詭道也無常形以詭詐為道若息侯誘蔡楚子謀宋也故能而示之不能用而示之不用言己實能用師外示之怯也若孫臏示弱而制龐涓近而示之遠遠而示之近欲進而理去道也言多疑設其近誑曜敵軍示之以遠本從其近若韓信之襲安邑陳舟臨晉而渡夏陽又曰古之善用兵者能使敵人前後不相及衆寡不相待貴賤不相求上下不相扶卒離而不集兵合而不齊多設詐變出東見西攻南引北亂之使彼張惶離亂而不集聚也合於利而動暴之使離亂之使不齊動兵而戰之不合於利而止左傳曰蔡聲子謂楚令尹屈建曰若敖之亂伯賁之子苗賁皇奔晉以為謀主及鄢陵之役楚晨壓晉軍而陳苗賁皇曰楚師之良在中軍王族而已若塞井夷竈成陳以當之欒范易行以誘之欒書時將中軍范燮佐之易行謂簡兵備欲令楚貪己而不復顧二穆之兵易以豉反行胡郎反中行二郤必克二穆郤錡時將上軍中行偃佐之郤至左新軍令此三人分良以攻二穆之兵楚子重子辛皆出穆王故曰二穆吾乃四萃於王族必大敗之四萃四面集攻之也晉人從之楚師大敗王夷師熸夷傷也吳楚之間謂火滅為熸子廉切子反死之鄭叛吳興則苗賁皇之為也戰國策曰趙將李牧常居代鴈門備胸奴以便宜置吏市租皆輸入于幕府為士卒費日擊數牛饗士習騎射謹烽火多間諜厚遇戰士為約曰胸奴即入盜急入收保有敢捕虜者斬胸奴每入烽火謹趣入收保不敢戰如是數歲亦不亡失然胸奴謂牧為怯趙王讓牧牧如故王怒使人代將歲餘胸奴每來出戰數不利復遣牧牧至如故約胸奴數來無所得終以為怯邊士日得賞賜而不用皆願一戰於是乃具選車得千三百乘選騎得萬三千匹百金之士五萬人彀弓弩者十萬人悉勒習戰大縱畜牧人衆滿野胸奴小入佯北不勝以數千人委之單于聞之大喜率衆來入牧多為奇陳張左右翼擊大破之煞胸奴十餘萬騎單于奔走十餘歲不敢近邊也又曰韓魏相攻齊將田忌率兵伐魏魏將龐涓聞之去韓而歸孫臏謂田忌曰彼三晉之兵素悍勇而輕齊齊號為怯善戰者因其勢而利導之兵法百里而趨利者蹶上將軍蹶猶挫也五十里走者半至使齊軍入魏地為十萬竈明日為五萬竈又明日為二萬竈龐涓行三日大喜曰我故知齊卒怯入吾地三日士卒亡者過半矣乃棄其步兵與其輕鋭倍日并行逐之并畢正切孫子度其行暮當至馬陵馬陵道狹而旁多阻隘可伏兵乃斫大樹白而書之曰龐涓死于此樹之下於是令萬弩夾道而伏期曰暮見火舉而俱發龐涓夜至斫木下見白書乃鑽火燭之讀書未畢齊軍萬弩俱發軍大亂龐涓乃自剄曰遂成豎子之名漢書曰韓王信反高帝自往擊至晉陽聞信與胸奴欲擊漢帝使人使胸奴胸奴匿其壯士肥牛馬徒見其老弱及羸畜使者十輩來皆言胸奴易擊帝使劉敬復往使胸奴還報曰兩國相擊此宜誇矜見所長見示也今臣往徒見羸胔老弱胔音漬一説讀曰瘠瘠瘦也此欲見短伏奇兵以爭利愚以為胸奴不可擊也是時漢兵以踰句注三十餘萬衆兵已業行帝怒以為沮吾軍阻謂止壞也械繫敬廣武遂往至平城胸奴果出奇兵圍高帝白登七日然後得解漢書曰孫策遣軍攻陳登於匡琦城賊初到旌甲覆水郡下衆寡不敵登乃閉門自守示弱不戰將士銜聲寂若無人登乘城觀形勢知其可擊乃申命士衆宿整兵器昧爽開門引軍指賊營步騎抄其後賊周章方結陳不得還船登縱兵乘之賊遂大敗晉書曰李矩守滎陽城前趙劉聰將劉暢步騎三萬討矩屯于韓王故壘相去七里遣使招矩時暢卒至矩未暇為備遣使奉牛酒詐降于暢潛匿精勇見其老弱暢不以為虞大饗渠帥人皆醉飽矩謀夜襲之暢僅以身免又曰慕容寶載記曰魏伐并州驃騎李農逆戰敗績寶引群臣于東堂議之尚書封懿曰今魏師十萬天下之徑敵也示之以弱岨關拒戰計之上也陳書曰武帝東討杜龕侯安都軍守北齊軍人據石頭遊騎至于闕下安都閉門偃旗幟示之以弱且令城中曰有登陴看賊者斬及夕賊收軍還石頭安都夜令士卒密營禦敵之具明辰賊又至安都率甲士三百人開東西掖門與戰大敗之賊乃退還石頭不敢復逼臺城後周書曰隋文帝作相之初尉遲逈拒命遣將崔仲文率兵定關東軍次蓼隄逈將檀讓擁衆數萬仲文以羸師戰讓悉衆來拒仲文偽北讓軍頗驕於是遣精兵左右翼擊之大敗讓軍進攻梁郡逈守將劉子寬棄城遁走隋書曰煬帝大業中彭城賊張大彪宋世模等衆至數萬作保縣薄山寇掠徐兗隋將董純討之純初閉營不與戰賊屢桃之不出賊以純為怯不設備縱兵大掠純選精鋭擊賊合戰於昌慮大破之斬首萬餘級築為京觀又曰隋末山賊孟讓衆號十萬屯盱眙煬帝遣王充保都梁山以拒之久不與戰乃宣言士卒亡叛使賊中聞之讓果大笑曰王充文法吏何能為將吾當生縛之於是進攻其柵充與戰佯不勝讓益輕之乃分兵虜掠充知其可擊令軍中移竈撤幕設方陳四面而出戰大破之虜男女十萬餘口讓僅以身免六韜曰武王問太公曰敵人先至已據便地形勢又強則如之何對曰當示以怯弱設伏徉走自投死地敵見之必疾而赴擾亂失次必離固所入我伏兵齊起急擊前後衝其兩旁示強左傳曰楚將子元以車六百乘伐鄭師入桔祑之門桔祑鄭遠郊之門也又入自純門及逵市純門鄭外郭門也逵市郭內道上市也懸門不發楚言而出子元曰鄭有人焉懸門施於內城門鄭示楚以間暇故不間城門出兵而效楚言故子元畏不敢進也諸侯救鄭楚師夜遁鄭人將奔桐丘諜言曰楚幕楚國有烏乃止幕帳也又曰楚大飢戎伐其西南戎山夷也庸人帥群蠻以叛楚庸楚屬之小國麇人率百濮將伐楚百濮夷也於是申息之北門不啓備中國也楚人謀徙於阪高楚險地也蒍賈曰不可我能往寇亦能往不如伐庸夫麇與百濮謂我飢不能師故伐我我若出師必懼而歸百濮離居將各走其邑誰暇謀人乃出師旬有五日百濮乃罷自廬以往振廩同食往往伐庸也振發也廩倉也同食上下無異饌也又曰晉文公率諸侯伐楚楚將子玉從晉師晉退三舍楚師不止又次于城濮楚師背酅而舍酅丘陵險阻名也酅音攜文公患之聽輿人之誦恐衆畏險故聽其歌誦也曰原田莓莓舍其舊而新是謀高平曰原喻晉軍美盛若原田草也莓然可以謀立新功不足念舊惠也晉大夫狐偃曰戰也戰而捷必得諸侯若其不捷表裏山河必無害也晉國外河而內山也晉車七百乘韅靷鞅靽五萬二千五百人也在背曰韅在胸曰靷在腹曰鞅在後曰靽言駕乘修備韅呼見切靷與進切晉侯登有莘之墟以觀師曰少長有禮其可用也有莘故國名也遂伐其木以益其兵伐木以益攻戰之具蓋亦示強也終敗楚師又曰晉侯伐齊齊侯登巫山以觀晉人使司馬斥山澤之險雖所不至必斾而疏陳之斥候也疏建旌旗以為陳示衆也使乘車者左實右偽以斾先偽以衣物為人形也建斾以先驅輿曳柴而從之以揚麈齊侯見之畏其衆也乃脫歸脫不張旌幟也又曰蔡聲子聘楚謂令尹屈建曰子儀之亂折公奔晉以為謀主繞角之役析公曰楚師輕佻易震蕩也若多鼓鈞聲以夜軍之鈞同其聲楚師必遁晉人從之楚師宵潰晉遂侵蔡襲沈獲其君敗申息之師于桑隧獲申麗而還鄭於是不敢南面楚失諸華則析公之為也漢書曰景帝時胸奴大入上郡天子使中貴人從李廣中官之幸貴也勒習兵擊胸奴貴人將數十騎出獵見胸奴三人與戰被射傷中貴人煞其騎且盡中貴人走廣廣曰是必胸奴射雕者也雕善飛故使善射者射之廣乃遂從百騎往馳三人令騎左右翼而廣身射彼三者殺其二人生得一人果射雕者也遙見胸奴有數千騎廣以為誘騎驚上山陳廣之百騎皆大恐還馳走廣曰吾去大軍數十里今若走胸奴追射我立盡今我留胸奴必以我為大軍誘之必不敢擊我廣令諸騎曰前到胸奴陳二里所止令曰皆下馬解鞍其騎曰虜多且近即急奈何廣曰彼虜以我為走今皆解鞍以示不走用堅其意胡騎遂不敢擊有白馬將出護其兵於是廣上馬與十餘騎奔射殺之而復還至其騎中解鞍令士皆縱馬臥是時會暮胡兵終怪之卒不敢擊向夜半時胡兵以為漢有伏軍於旁欲夜取之皆引兵去詰朝廣乃歸其軍後漢書曰廉范為雲中太守會胸奴大入塞范自率士卒拒之虜衆盛不敵會日暮令軍士各交縛兩炬三頭然火虜遙見火多謂漢兵救至待朝將退范乃令軍中蓐食晨往擊之斬首數百級虜自此不敢復向雲中又曰虞詡為武郡太守以討叛羌羌乃率衆數千遮詡於陳倉崤谷詡即停軍不進而宣言上書請兵須到當發聞之乃分抄傍縣詡因其兵散日夜進道兼行百餘里令吏士各作兩竈或曰孫臏減竈而君增之兵法日行不過三十里以戒不虞而今日且二百里何也詡曰虜衆多吾兵少徐行則易為所及速進則彼所不測虜見吾竈日增必謂郡兵來迎衆多行速必憚追我孫臏見弱吾今示強勢有不同故也既到郡兵不滿三千而羌衆萬餘攻圍赤亭數十日詡乃令中使強弩勿發先用小弩羌以為矢力弱不能至并兵急攻詡於是使二十強弩共射一人發無不中羌大震退詡因出城奮擊多所傷殺明日悉陳其衆令從東郭門出北郭門入換易衣服回轉數周羌不知其數更相恐動詡計賊當退乃潛遣五百餘人於淺水設伏候其走路虜果奔因掩擊大破之通典曰後漢末陳登為廣陵守孫策遣軍攻登於匡琦城登使人求救於曹公而密去城十里理軍營處所令多取柴薪兩束一聚相去十步從橫成行令俱起火牙燃其聚城上稱慶若大軍到賊覩火驚潰登勒兵追奔斬首萬級也又曰蜀大將諸葛亮屯于陽平并兵東下亮唯留萬人守城魏將司馬宣王率二十萬衆拒亮當亮六十里所候邏白宣王説亮在城中力弱將士失色亮是時意氣自若勑軍皆臥旗息鼓不得輒出卷幔開四門掃地却灑宣王疑其有伏於是引軍北趣山亮謂參佐曰司馬懿謂吾有強伏循山走矣候邏還白亮所言宣王深以為恨又曰西晉將杜元凱伐吳陳兵于江陵遣牙門管定周旨伍巢等率奇兵八百泛舟夜度以襲樂鄉多張旗幟起火巴山出於要害之地以奪賊心吳都督孫歆震恐與吳將伍延書曰北來諸軍乃飛渡江也皆破之又曰東晉末宋武帝為將討海賊孫恩恩在扈瀆海鹽令鮑陋遣子嗣之以吳兵一千請為前驅宋武曰賊兵甚精吳人不習戰若前驅失利必敗我軍可在後為聲援不從是夜宋武多設伏兵兼置旗鼓然一處不過數人明日賊率衆乃萬餘迎戰前驅既交諸伏皆舉旗鳴鼓謂四面有軍乃引退嗣之追奔為賊所沒宋武且戰且退賊既盛所領死傷且盡宋武慮不免至向伏兵處乃止令左右脫取死人衣賊謂當走反停疑猶有伏宋武因呼更戰氣色甚猛賊以為然乃引軍去宋武徐歸然後散兵稍集又曰東齊末桓玄篡晉宋武帝起義討玄使將桓謙何湛之屯覆舟山武帝使羸弱登蔣山多張旗幟玄不之測大懼武帝與劉毅等分為數隊進突謙陳皆殊死戰無不一當百東北風急義軍放火煙塵漲天鼓譟之音震駭京邑謙等諸軍一時奔散又曰蕭齊將馮道根守阜陵城戍初到阜陵理城隍遠斥候有如敵將至者衆頗笑之道根曰怯防勇戰此之謂也理城未畢會魏將黨法宗傅堅眼率衆二萬奄至城下道根塹壘未固城中衆少失色道根命廣開門緩服登城選精鋭二百人出與魏軍戰敗之魏人見意間且戰又不利因退走又曰後魏將宇文測行綏州事每歲河冰合後突厥即來寇先是常遣居人入城堡以避之測至皆令安堵如舊乃於要路數百處並多積柴仍遠遣斥候知其動靜是年十二月突厥從連谷入寇去界數十里測命積柴之處一時縱火突厥謂有大軍至懼而遁走自相蹂踐委棄雜畜及輜重不可勝數測徐率所部收之分給百姓自是突厥不敢復至又曰梁雍州刺史嶽陽王蕭登雖稱藩附於西魏而尚有二心西魏將楊忠自樊城觀兵於漢濱易旗進實騎二千察登樓覩之以為三萬也懼而伏焉崔鴻十六國春秋曰後趙石勒荊州監軍郭敬寇晉襄陽勒驛令敬退屯樊城戒之使偃藏旗幟寂若無人彼若使人觀察則告之曰自愛堅守後七八日大騎將至相禁不復得走矣敬使人浴馬于津周而復始晝夜不絶偵諜還告晉南中郎將周撫撫以為勒軍大至懼而奔于武昌敬遂入襄陽焉又曰前涼張重華以謝艾為軍師將軍率騎三萬進軍臨河後趙石勒將麻秋以三萬衆拒之艾乘軺車寇白慆慆苦洽切鳴鼓而行秋遙覩而怒曰艾年少書生冠服如此輕我也令黑矟龍騰三千人馳擊之艾左右大擾或勸乘馬艾不從乃下車踞胡床指麾分處賊以為伏兵發也懼不敢進艾又遣將緣河截其後秋軍乃退艾乘擊遂大敗之斬秋將杜勳汲魚俘斬首三千級秋匹馬奔大夏
