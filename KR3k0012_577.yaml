body:
  text: 樂部十四磬說文曰磬樂石也古者母句氏作磬爾雅曰大磬謂之毊徒鼓磬謂之蹇郭璞曰毊音囂以玉飾之禮記明堂位曰垂之和鍾叔之離磬又曰諸侯之宮懸祭以白牡擊玉磬諸侯之僣禮也周禮春官胝膫掌擊頌聲笙磬磬在東方曰笙生也在西方曰頌或在庸功也磬師掌教擊磬又曰鳧氏為磬也毛詩即頌曰既和且平依我磬聲左傳曰晉師從齊師入自丘輿擊馬陘齊侯使賓媚人賂以紀甗贏玉磬尚書曰徐州泗濱浮磬孔安國注曰泗水涯水中見石可以為磬論語曰擊磬襄入于海又曰子擊磬於衛有荷蕢而過孔氏之門者曰有心哉擊磬乎子擊磬者樂也蕢草器也荷此器賢人避山也有心哉善其音有所病於世國語曰魯餓臧文仲以玉磬如齊以糴東觀漢記曰王阜為重泉令鸞集學宮阜擊磬鸞應磬而舞焉魏志曰武帝至漢中得杜夔說舊法始復設擊軒懸磬于今用之受之於杜夔也陳書曰吳明徹自壽陽入朝輿駕幸其第賜鍾磬一部三禮圖曰膠廣長三寸長尺三寸半十六枚同一筍簴謂之編磬在東方曰笙磬在四方曰頌磬山海經曰鳥危之山其陽多磬又曰小華之山其陰多磬石高山涇水出焉其中多磬白虎通曰磬者夷則之氣萬物之成其氣磬故曰磬有貴賤焉有親踈焉有長幼焉此三者行然後王道得王道得然後萬物成天下樂之故樂用磬也王子年拾遺記曰浮瀛即瀛洲也上有青石可為磬長一丈而輕若鴻毛洞冥記曰漢武帝起招仙靈閣於甘泉宮西其上懸浮金輕玉之磬也王韶之始興記曰縣下流有石室內有懸石扣之聲若磬響十餘里淮南子曰孟冬之月北宮御女衣黑綵擊磬石又曰禹以五音聽政懸鍾鼓磬鐸置鞀以待四方之士為號曰教寡人以道者擊鼓喻寡人以義者擊鍾告寡人以事者振鐸語寡人以憂者擊磬五經要義曰磬立秋之樂也呂氏春秋曰堯命夔拊石擊石以象上帝玉磬之音以舞百獸代本云叔所造不知何代人又曰無句作磬古史考曰堯時人周禮冬官考工記磬氏為磬倨句一矩有半必先度一矩為句一矩為股而求其絃既而以一矩有半觸其弦則磬之倨句也磬之制有大小此假矩以定倨句非用其度也其博為一博謂服博博廣也服為二鼓為三三分其股博去一以為鼓博三分其鼓博以其一為之厚鄭眾云股磬之上者也鼓其下小者所當擊也鄭玄謂服外面鼓內面也假令磬服廣四寸半者股長九寸服廣三寸長尺三半厚一寸已上則摩其旁鄭玄云磬聲太上則摩鑢其旁也鄭玄謂太上聲清也薄而廣則濁也已下則摩其端太下聲濁也矩而厚則清又曰磬師掌教擊磬教教視瞭磬亦編於鍾也教縵樂讌樂之鍾磬鄭玄云縵謂雜聲之和樂者學記曰不學操縵不能安絃宴謂房中之樂所謂陰聲二樂皆教其鍾磬通禮義纂曰晉賀脩奏登歌之簴采玉造小磬宗廟殿用玉郊丘用石本法堂上樂以歌為故名歌鍾歌磬唐制設磬於壇上之西歌鍾於東近南北向至匏竹立於壇下又曰黃帝使伶倫造磬又曰天地尚質用石磬宗廟及殿庭尚文用玉磬必用之者聲清正者陰陽之察主於金石也又曰唐禮皇后享先蚕設十二磬於辰位陰陽之察主於清濁是以用磬而不用鍾也瑟白虎通曰瑟者閑也所以懲忿窒欲正人之德也故曰瑟有君父之節臣子法商角則君父有節臣子有義然後四時和然後萬物生故謂之瑟大瑟謂之灑長八尺一寸廣一尺八寸二十七絃爾雅曰徒鼓瑟謂之步三禮圖曰雅瑟長八尺一寸廣二尺八寸二十三絃其常用者十九絃其餘四絃謂之蕃羸也頌瑟七尺二寸廣尺八寸二十五絃盡用也蔡邕月令章句曰瑟前其柱則清卻其柱則濁毛詩鹿鳴篇曰呦呦鹿鳴食野之苹我有嘉賓鼓瑟吹笙又車鄰曰既見君子並坐鼓瑟禮記曰清廟之瑟朱絃而䟽越一唱而三歎有遺音者也此雅淡之樂也言至和不在於音故不須絙絃促柱以慆人心也論語曰由之瑟奚為於丘之門陽貨曰孺悲欲見孔子孔子辭之以疾將命者出戶取瑟而歌使之聞之又曰仲尼問曾哲曰點爾何如鼓瑟希鏗爾捨瑟而作曰暮春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸周書曰師曠見太子晉師曠束躅其足曰善哉善哉王子曰太師乎何舉足驟師曠曰天寒之躅是以數舉也王子曰請入坐遂敷席注瑟師曠曰歌無射曰國誠寧矣遠人來觀脩義經矣好樂無荒乃注瑟於王子漢書曰萬石君石奮其父趙人姊能鼓瑟高祖曰若能從我乎曰願盡力於是高祖召其姊為美人又楊惲報孫會宗書曰惲本秦人能為秦聲婦趙女也雅善鼓瑟又曰莽何羅及走趍臥內顧入行觸寶瑟僵仆金日磾得抱何羅因呼曰何羅反呂氏春秋曰古朱襄氏之治天下多風陽氣畜積果實不成故王建作為五絃之瑟以來陰以定群瞽瞍制五絃之瑟作十五之絃舞益以八絃為二十三絃高誘曰王建朱襄之臣慎子曰公輸子巧用材也不能以檀為瑟韓詩外傳曰趙王使人於楚鼓瑟遣之曰無失吾言使者受命伏而不起曰大王鼓瑟未嘗若今日之悲也王曰然鼓瑟者固方調也使者曰調則可記其柱王曰不可天有燥濕絲有緩急柱有推移不可記也使者曰臣請此以輸楚之去趙千有餘里亦有吉凶之變凶則弔之吉則賀之猶柱之有推移不可記典略曰百里奚虞大夫晉君以女為秦穆夫人用奚為媵奚亡走宛楚人執之秦穆公知其賢欲厚貨以求之恐楚不與乃以羖羊皮贖之號五羖大夫秦遂以霸奚相秦其妻傭浣入宮見琴者之自言能鼓瑟歌曰百里奚母已死葬南溪墳已覆以紫春莫黎搤伏雞西入秦五羖皮今日富貴捐我為百里奚乃識之尸子曰夫瑟二十五絃其僕人鼓之則為笑賢者以其義鼓之欲樂則樂欲悲則悲雖有暴君為之立變世本曰庖羲氏作瑟瑟潔也一使人精潔於心淳一於行也王子年拾遺錄白圓山其形圓也有木林疾風震地而林木不動以其木為瑟故曰靜瑟也黃帝使素女鼓庖羲氏之瑟滿席悲不能已後破為七尺二寸二十五絃韓子曰齊宣王問巨倩曰儒者鼓瑟乎對曰不也瑟者也以小絃為大聲以大絃為小聲是細大以易序貴賤易位儒者為害義故不能宣王曰善箏說文曰箏鼓絃筑身樂也風俗通曰謹按樂記箏五絃筑身也今并涼州箏形如瑟不知誰作也按京房制五音唯加瑟十三絃此乃箏也今雅樂箏十二絃他樂皆十三絃如箏稍小曰雲和樂府不用史記曰秦逐客李斯上書曰夫擊甕缶彈箏搏髀而歌嗚嗚使快耳者真秦之聲晉書曰謝安壻王國寶專利無檢行安惡其人每抑之武帝末年嗜酒而會稽王道子昏醟尤甚於是國寶讒諛之計稍行於王相之間而好利險陂之徒以安功名盛極構之嫌隙遂成帝召桓伊飲讌謝安侍坐帝令伊吹笛伊神色無迕即吹為一弄乃放笛云臣於箏分乃不及笛然自以韻合歌管請箏歌并請吹笛人帝善其調達乃勑御府對曰御府於臣必自不合臣有一奴善相便串帝彌賞其放率乃許召之奴既吹笛伊便撫箏而歌曰為君既不易為臣良獨難忠信事不顯乃有見疑患周旦佐文武金縢功不刊推心輔王政二叔反流言其聲慷慨俯仰可觀安泣下沾衿乃越席而就之捋其鬚曰使君於此不凡帝甚有愧色梁書曰羊侃字祖忻身長七尺八寸雅愛文史及孫吳兵法姬妾列侍窮極奢靡有彈箏人陸大喜著鹿角爪長七寸舞人張淨琬腰圍一尺六寸時人咸云能掌上舞俗說曰謝仁祖為豫州主簿在桓溫閣下聞其善彈箏便呼之既至取箏與令彈謝即理絃撫箏因歌曰秋風意殊道桓大以此知之取謝引詣府襄沔記曰辛居士名宣仲隴西人大明末寓居襄陽縣西六里多植松竹栖遲其下靜嘿不交塵俗林中起一草廬容膝而已善彈箏與淮南胡陶京兆駱惠度同志為友常共讌集此林陶能吹笛惠度工歌拾林下絃管道韻時人謂之三公樂宋邵陵王休若為南雍州剌史躬往造焉宣仲正在林中彈箏了不廻顧逡巡致箏於席延邵陵與語纔述寒溫而已時邵陵客有述其旨者授箏令彈再三固請荅曰幸非王門伶人何事見逼所勝於君者正舉止自由若聞君鞠躬復與君何異占對詳雅眾不能屈齊文惠臨州吳興沈約奉教聘引並不降志約乃共論文章宣仲輒言莊老既各言其志不能相屈建武中遇疾卒惠度及陶並不知所終英雄記曰呂布詣袁紹紹患之布不自安因求還洛陽紹聽之丞制使領司隸校尉遣壯士送布而陰殺之布疑其圖己乃使人鼓箏於悵中潛自遁出夜中兵起而布己亡紹聞懼為患募追之皆莫敢近遂復歸燉煌實錄曰索丞宗伯夷成善鼓箏悲歌能使喜者墮淚改調易謳能使戚者起舞時人號曰雍門周魏略曰游楚好音樂乃畜琵琶箏每行將以自隨吳質別傳曰魏文帝與吳質書曰斬泗濱之梓以為箏傳子曰郝素善彈箏雖伯牙妙手吳姬奇聲何以加之傅玄箏賦序曰以為蒙恬所造今觀其器上崇似天下圓似地中空准六合絃柱擬十二月設之則四象在鼓之則五音發斯乃智仁之器豈蒙恬亡國之臣所能閞思哉合清樂箏並十有二絃他樂皆十三絃軋箏以行竹潤其端而軋之彈箏以骨爪長寸餘以代指也筑樂書曰筑者形如頌琴施十三絃頂細肩圓品聲按柱鼓法以左手扼之右手以竹尺擊之隨調應律唐代編入雅樂也釋名曰筑以竹鼓之也如箏細項案今制身長四尺二寸項長三寸圍四寸五分項七寸五分闊七寸五分下闊六寸五分史記曰高漸離善擊筑與荊軻友見軻剌秦王不中而死乃變姓名入秦欲為軻報讎市中擊筑而乞人觀而美奏之秦王聞召之於前擊之王悅猶以疑焉熏其兩目置於帳中王躭之親近於漸離漸離望秦王歎息之聲舉筑以擊中王膝王怒之又曰高祖過沛大享故人父老酒酣高祖擊筑而歌曰大風起兮雲飛揚威加海內兮歸故鄉又曰荊軻之燕與屠狗高漸離飲於燕市酒酣高漸離擊筑荊軻和而於市中相樂也己而相泣旁若無人準京房曰準竹聲不可以度調故作準以定數準之狀如瑟長一丈而十三絃隱間九尺以應黃鍾之九寸中央一絃下有書分寸以為六十律清濁之節矣
