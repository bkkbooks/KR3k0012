body:
  text: 文部十九史傳上文心雕龍曰史者使也執筆左右使之謂也古者左史記言右史書事言經尚書事經春秋也説文曰史記事者也釋名曰傳傳也以傳示後人也博物志曰賢者著述曰傳禮記曰五帝憲養氣體而不乞言有善則記之為惇史詩序曰國史明乎得失之迹韓詩外傳曰周舍對趙簡子曰臣操牘秉筆從君之後司君過而書之周禮曰外史掌四方之志鄭玄注曰志記也謂若魯之春秋晉之乘楚之檮杌左傳昭十五年曰荀躒如周籍談為介王謂籍談曰昔而高祖孫自黶司晉之典籍以為大政曰籍氏及辛有之二子董之晉於是乎有董史汝司典之後也何故忘之籍談不能對又宣二年傳曰晉趙穿弒靈公宣子未出境而復太史書曰趙盾弒其君以示於朝宣子曰不然對曰子為正卿亡不越境反不討賊非子而誰宣子曰嗚呼我之懷矣自詒伊戚其我之謂矣孔子曰董狐古之良史也書法不隱趙宣子古之良大夫也為法受屈惜也越境乃免又襄二十五年傳曰齊崔杼弒莊公太史書曰崔杼弒其君崔子殺之其弟嗣書而死者二人其弟又書乃舍之南史聞太史盡死執簡以往聞既書矣乃還又昭十二年傳曰楚王與右尹子革語左史倚相趍而過王曰此良史也能讀三墳五典八索九丘史記曰秦趙澠池之會其君相為鼓瑟扣缶皆命御史書之漢書曰司馬喜生談為太史公談生遷遷為太史令掌紬史記紬綴集也又曰武帝始置太史天下計書先上太史副上丞相故司馬談父子世居此職得撰史記又曰劉向揚雄皆稱遷有良史之才服其善序事理辨而不華質而不俚其文直其事該不虛美不隱惡故謂之實録後漢書曰班彪續司馬遷後傳數十篇未成而卒明帝命其子固續之固以史遷所記乃以漢氏繼百王之末非其義也大漢當可獨立一史故上自高祖下終王莽為紀表傳志九十九篇又曰明德馬后能誦易好讀春秋楚辭尤善周官董仲舒書周官周禮也仲舒有王柸繁露清明竹林之屬自撰顯宗起居注削去兄防參醫藥事章帝請曰黃門舅且夕供養且一年既無褒異又不録勤勞無乃過乎太后曰吾不欲後代聞先帝數親後宮之家故不録也東觀漢記曰時人有上言班固私改作史記詔下京兆收繫固弟超詣闕上書具陳固不敢妄作但續父所記述漢事晉書曰王沉仕魏正元中遷散騎常侍侍中與荀顗阮籍共撰魏書多為時諱未若陳壽之實録也又曰華嶠常沉醉所撰書十典未成而終祕書監何劭奏嶠中子徹為佐著作郎使踵成之未竟而卒後監繆徽又奏嶠少子暢為佐著作郎剋成十典并草魏晉紀傳與著作郎張載等俱在史官又曰陳壽撰魏吳蜀三國志凡六十五篇時人稱其善敘事有良史之才夏侯湛時著魏書見壽所作便壞己書而罷張華善之謂壽曰當以晉書相付耳其為時重如此宋書曰王韶之琅耶臨沂人也私撰晉陽秋成時人謂之宜居史職即除著作郎使續後事訖義熙九年善敘事辭論可觀為後世佳史又曰裴松之字世期注陳壽三國志松之鳩集傳記廣增異聞既成奏之上覽之曰裴世期為不朽矣又曰范曄獄中與諸生姪書曰既造後漢轉得統緒詳觀古今著述及評論殆少可意者班氏最有高名既任情無例唯志所推耳博贍不可及之整理未必愧也吾雖傳論皆有精意深旨至於循吏已下及六夷諸序論筆勢縱放實天下之奇作中合者往往不減過秦篇當共比班氏所作俱不愧之而已欲遍作諸志前漢所有者悉令備雖事不必多且使見文得盡此書行故應有嘗意者自古體大而思精未有此也梁書曰吳均欲撰齊書求借齊起居注及群臣行狀武帝不許遂私撰奏之稱帝為齊明帝佐命帝惡其書不實録以其書不實使中書舍人劉之遴詰問數十條竟支離無對勑付省焚之坐免職又曰裴子野曾祖松之宋元嘉中受詔續修何承天宋史未成而卒子野常欲繼成先業及齊永明末沈約所撰宋書稱松之已後無聞焉子野更撰為宋略二十卷其敘事評論多善而去戮淮南太守沈璞以其不從義師故也約懼徒跣謝之請兩釋焉歎其述作曰吾弗逮也蘭陵蕭琛言其評論可與過秦王命分路楊鑣後魏書曰毛循之位次崔浩之下浩以其中國舊門雖學不博洽而猶涉獵書傳每期重之與論説言次遂及陳壽三國志有古良史之風其所著述文義典正皆楊于王庭之言微而顯婉而成章班史以來無及壽者循之曰昔在蜀中聞長老言壽曾為諸葛門下書佐得撻百下故其論武侯云應變將略非其所長浩乃與論曰夫亮之相劉備當九州鼎沸之會英雄奮發之時君臣相得魚水為喻而不能與曹氏爭天下委棄荊州退入巴蜀誘奪劉璋偽連孫氏守窮崎嶇之地僣號邊夷之間此策之下者可與趙它為偶而以為蕭曹亞匹不亦過乎謂壽貶亮非為失實三國典略曰齊主以魏收之卒也命中書監陽休之裁正其所撰魏書休之以收敘其家事稍美且寡才學淹延歲時竟不措手唯削去嫡庶一百餘字又曰周蕭大圜為滕王逌友逌問於大圜曰吾聞湘東王作梁史有之乎餘傳乃可抑揚帝紀奚若隱則非實記則攘羊對曰言之者妄也如使有亦不足怪昔漢明為世祖紀章帝為顯宗紀殷鑒不遠足為成例且君子之過如日月之蝕彰於四海安得隱之如有亦安得而不隱蓋子為父隱直在其中諱國之惡抑又禮也逌乃大笑又曰齊主命魏收撰魏史至是未成常令群臣各言其志收曰臣願得直筆東觀早出魏書齊主乃令收專在史閣不知郡事謂收曰當直筆我終不學魏太武誅史官於是廣徵百官傳惣斟酌既成上之凡十二袟一百三十卷尚書陸操謂楊愔曰魏收可謂博物宏才有大功於魏室愔曰此不刊之書傳之萬古但恨論及諸家枝葉過為繁碎時論收為爾朱榮作傳以榮比韓彭伊霍者蓋由得其子文賂黃金故也邢劭父兄書事皆優劭唯笑曰列女傳悉是史官祖母尚書左丞盧斐臨漳令李庶度支郎中王松年中書舍人盧潛等言曰魏收誣罔一代其罪合誅盧思道曰東觀筆殊不直斐庶等與收面相毀辱無所不至齊主大怒乃親自詰問斐曰臣父位至儀同收附於族祖中書郎玄傳之下收之外親博陵崔綽位止功曹乃為傳首齊主問收曰崔綽有何事迹卿為之立傳收曰雖無爵位而道義可嘉魏司空高允曾為其贊稱有道德臣所以知之齊主曰司空才士為人作贊理合稱楊亦如卿為人作文章道其好者豈能皆實收不能對以其才名不欲加罪高德正其家傳甚美乃言於齊主曰國史一定當流天下人情何由悉稱謗者當加重罪不然不止齊主於是禁止諸人各杖二百斐庶死於臨漳獄中又北史收所引史官恐其陵逼唯取學流先相依附者其房延祐辛元植睦仲讓雖夙涉朝伍並非史才刀柔裴昂之以儒業見知全不堪編緝高孝幹以左道求進修史諸人父祖姻戚多被書録飾以美言收性頗不甚能平夙有怨者多沒其善每言何物小子敢共魏收作隙若舉之則使上天按之當使入地收在神武時為太常少卿修國史得陽休之助因謂休之曰無以謝德當為卿作佳傳休之父固魏世為北平太守以貪虐為中尉李平所彈獲罪收書云固為北平甚有惠政坐公事免官又云李平深相敬重群口沸騰勑魏史且勿施行號為穢史唐書曰杜正倫知起居注太宗嘗謂侍臣曰朕每日坐朝欲出一言即思此言於百姓有所益不所以不敢多言正倫進曰君舉必書言存在史臣職當修起居注不敢不盡愚直陛下若一言乖於道理則千載纍於聖德非直當今有損於百姓願陛下慎之太宗大悅又曰許敬宗初虞世基與敬宗父同為宇文化及所害封德彝時為內史舍人備見其事因謂人曰世基被戮世南匍匐而請代善心之死敬宗舞蹈以求生敬宗聞而銜之及為德彝立傳盛加其罪惡在監門大將軍錢九隴皇家之隸也敬宗與之結婚乃為九隴曲敘門閥妄加功績又蠻首龐孝泰率兵從征高麗賊知其怯懦先擊破之敬宗納其家寶貨妄稱其頻破賊徒斬獲數萬漢將驍健者唯蘇定方龐孝泰耳曹繼叔劉伯英皆出其下虛美如此又曰太宗謂諫議大夫禇遂良曰卿猶知起居皆書何等事大底人君得見否遂良曰今之起居古之左右史書人君言事且記善惡以為鑒誡庶幾人主不為非法不聞帝王躬自觀史太宗曰朕有不善卿必記之耶遂良曰守道不如守官臣職當載筆君舉必記黃門侍郎劉洎曰設令遂良不記天下之人皆記之矣帝曰然又曰貞觀十年尚書左僕射房玄齡侍中魏徵散騎常侍姚思廉太子右庶子李百藥孔潁達守禮部侍郎令狐德棻守中書侍郎岑文本中書舍人許敬宗等撰成周隋梁陳齊等五代史詣闕上之太宗勞之曰朕覩前代史書彰善疸惡足為將來之誡秦始皇奢淫無度焚書坑儒用緘談者之口隋煬帝雖好文儒尤疾學者前世史籍竟無所成數代之事殆將泯絶朕意則不然將欲覽前王之得失為在身之龜鏡公輩以數年之間勒成五代之史副朕深懷極可嘉尚又詔司空房玄齡等修晉書以臧榮緒書為本採托諸家傳記而益附之爰及晉代文集罔不畢舉為十本紀二十志七十列傳三十載記其太宗所著宣武二帝及陸機王羲之四論皆稱制焉房玄齡以下為論皆稱史臣後數載而書就藏之祕府頒賜加級各有差以其書賜皇太子及新羅使者各一部焉又曰顯慶中高宗以許敬宗所撰太宗實録所紀多非實乃謂劉仁軌曰朕昨觀國史所書多不周悉卿等必須窮微索隱原始要終盛業鴻勳咸使詳備至如先聖作威鳳賦意屬阿舅及士廉敬宗乃移向尉遲敬德傳內又嘗溫湯教習長圍四合萬隊俱前忽然雲霧晝昏部伍亂錯先聖既覩斯事恐其挂法者多遂潛隱不出待其整理然後臨觀顧謂朕曰振旅訓兵國之大典此之錯失於法不輕我若見之必須行法我今不出良為於此今乃移向魏徵傳稱是徵之諫語此既乖於實何以垂之後昆朕嘗從幸未央宮辟仗已過忽於草中見一人身帶撗刀其人云聞辟伏至怕不敢出仗家搜索不覺遂伏不敢動先聖斂轡即還顧謂朕曰此事若發數人合死汝可後伺看早放出之史家唯此一事差似不失其真郝處俊曰先聖仁恩觸類皆是臣弟傑往年宿衛之日被羌腰輿供奉見有三衛誤拂御衣此人怕懼五情無主先聖謂之曰此間無御史我不為汝作罪過不須怕懼上謂處俊曰此亦須入史於是處俊等引左史李仁實專掌其事
