body:
  text: 人事部一百四十一傭保史記曰荊軻死高漸離乃變名姓為人傭保作於宋子徐廣曰宋子縣名也今屬巨鹿久之作苦聞其家堂上客擊築仿徨不能去每出言曰彼有善不善從者以告其主曰彼傭乃知音召使擊築一座稱善又曰欒布始與彭越為家人時窮困賣傭於齊為人酒保後漢書曰公沙穆來遊太學無資糧乃變服客傭為吳祐賃舂祐與語大驚遂共定交於杵臼之間又曰杜根字伯永初元年舉孝廉為郎中時和熹鄧后臨朝權在外戚根以帝年長宜親政事乃與同時郎上書直諫太后大怒收執根等令盛以縑囊於殿上撲殺之執法者以根知名私語行事人使不加力既而載出城外根得蘇因得逃竄為宜城山中酒家保保使也言為人傭力保任而使也積十五年酒家知其賢厚敬待之神仙傳曰仙人李八伯者欲授唐公房仙術乃為作傭客身作惡瘡膿潰臭惡使公房夫人舐之瘡愈乃授以丹經一卷奴婢説文曰奴婢皆古之罪人也方言曰荊淮海岱雜齊之間俗不純為雜罵奴曰臧罵婢曰獲齊之北鄙燕之北郊凡民男而壻婢謂之臧女而婦奴謂之獲亡奴謂之臧亡婢謂之獲皆異方罵奴婢之醜稱也周禮天官上酒人職曰女酒三十人奚三百人女酒女故曉酒者古者徒男女沒入縣官曰奴其少才智者以為奚今之侍史官奴是也又秋官上司厲職曰其奴男子入於罪隸女子入於舂稿鄭司農云謂坐為盜賊而為奴者輸於罪隸舂人稿人之官也由是觀之今之奴婢古之為人也凡有爵者與七十者與未齓者皆不為奴有爵謂命士以上也齔毀也男年八歲女七歲而毀齒左傳襄四年曰斐豹隸也著於丹書隸罪隸斐豹有罪沒官為奴丹書罪約也論語微子曰殷有三仁焉微子去之箕子為之奴比干諫而死史記曰季布者楚人也項籍使將兵數窘漢王及項羽滅季布匿濮陽周氏周氏曰漢求將軍急且至臣家能聽臣臣敢進計季布許之乃髡鉗季布賣之朱家朱家心知是季布乃買而置之因誡其子曰田事聽此奴必與同食又曰欒布為人所略賣為奴於燕燕將臧茶舉以為都尉又曰衛青為侯家人少時歸其父使牧羊先母之子皆畜奴之不以為兄弟有鉗徒相青官至封侯青笑曰人奴之生得無笞罵即足矣安得封侯又曰漢武帝時東置滄海郡人徙之費府庫並虛募民能入奴婢得以終身為郎增秩又曰霍光愛幸監奴馮子都常與計事又曰薛宣奏張於驕縱奴者並乘勢為暴至求吏妻不得殺其夫又曰原涉遣奴至市買肉奴秉涉氣與屠爭言斫傷屠者亡是時茂陵令尹翁歸新視事知涉名豪欲以厲俗遣兩使脅守涉至日中奴不出吏欲殺涉涉肉袒自縛箭貫耳詣廷尉門謝罪又曰張安世家僮七百人皆有手技又曰齊俗賤奴虜而刀間獨愛貴之桀黠奴人之所患唯刀間收取使之終得其力又曰王鳳群弟爭為驕侈奴僮以千數又曰孝宣皇帝詔曰夫褒有德賞元功古今通議也大司馬大將軍霍光宿衛忠正宣德明恩守節秉義以安宗廟賞賜前後奴婢百七十人又曰王丹盡得父財家纍千金奴僮數百又曰傅太后使謁者置諸官婢賤取之復取執金吾官婢八人東觀漢記曰彭寵奴子密等三人共謀劫寵寵時齋獨在便坐室中晝臥子密等三奴縛寵著床板告外吏大王解齋吏皆便休又用寵聲呼其妻入室見寵寵曰趍為諸將軍辨裝兩奴將妻入取寵物一奴守寵寵謂奴曰若小兒我素所愛今解我縛當以女珠妻若小奴見子密聽其語遂不得解子密收金玉衣物使寵妻縫兩縑囊夜解寵手令作記告城門將軍云今遣子密等詣蘭卿子后所其開門出勿稽留書成即斷寵及妻頭置縑囊中西入上告又曰劉寬嘗有客遣蒼頭市酒迂久大醉而還罵曰畜生遣人視奴疑必自殺寬嘗朝會莊嚴已訖妻使婢奉羹翻汙朝衣婢遽收之寬徐曰羹爛汝手又曰司隸校尉梁松奏特進馬防兄廖廖子孫三家奴婢千人又曰鄧弘字叔紀奴醉擊長壽亭長亭長將詣第白之弘即見亭長賞錢五千異日奴復與宮中衛士忿爭衛士歐箠奴弘問復賞五千又曰朱暉為郡督郵太守阮況當嫁女欲買暉婢不與及況卒暉送金三斤人問其故暉曰前不與婢者恐以財貨汙府君耳今重送者以明己心也又曰祝良為洛陽令常侍樊豐妻殺侍婢置井中良收其妻殺之又曰韓卓臘日奴竊食祭其母卓義其心即日勉之魏志曰晉室踐阼下詔曰故司空王基著德立勳不營産業其以官奴二人賜其家又曰陳泰護胸奴中郎京邑貴人多寄寶貨因泰市奴婢泰皆挂之於壁不發其封及徵為尚書悉以還之蜀志曰劉琰侈靡侍婢能為聲樂又教誦靈光殿賦又曰初孫權以妹妻先主妹才捷剛猛有諸兄風侍婢百餘人執刀立先主每入心常懍懍晉書曰石崇有蒼頭八百餘又崇有婢緑珠美而豔善吹笛孫秀使人求之崇時在金谷別館方登涼臺臨清流婦人侍側使者以告崇盡出婢妾數十人以示之皆蘊蘭麝被羅縠曰在所擇使者曰君侯服御麗矣然本受命止索緑珠不識孰是崇勃然曰緑珠吾所愛不可得也秀遂誅崇又曰郭璞愛主人婢無由而得乃取小豆三斗繞主人宅散之主人晨起見赤衣人數千圍其家就視則滅甚惡之請璞為卦璞曰君家不宜畜此婢可於東南二十里賣之慎勿爭價則此祓可除也主人從之璞陰令人賤買此婢復為符投井中數千赤衣人皆反縛一一自投於井主人大悅璞攜婢去又曰祖納少孤貧自炊以養母平北將軍王敦聞之遺其二婢辟為從事中郎有戲之曰奴價倍婢納曰百里奚何必輕於五羖皮又曰劉惔性簡貴與王羲之雅相友善郤愔有傖奴善知文章羲之愛之每稱奴于惔惔問何如方回耶羲之曰小人耳何比郤公惔曰若不如方回故常奴耳又曰桓溫自以雄姿風氣是宣帝劉琨之儔有以比王敦者意甚不平及是征還於北方得一巧作老婢訪之乃琨妓女也一見溫便潛然而泣溫問其故答曰公甚似劉司空溫大悅出外整理衣冠又呼婢問之婢云脣甚似恨薄眼甚似恨小鬢甚似恨赤形甚似恨短聲甚似恨雌溫於是褫冠解帶昏然而睡不怡者數日又曰幸靈周旋江州間謂其士人曰天地之於人物一也咸欲不失其性奈何制服人以為奴婢乎諸君若欲享多福以保姓命可悉免遣之又曰干寶父先有所寵侍婢母甚妒忌及父亡母乃生推婢於墓中寶兄弟年小不審之也後十餘年母喪開墓而婢伏棺如生載還經日乃蘇言其父常取餘食與之息情如生家中吉凶輒語之考校悉驗地中亦不覺為惡既而嫁又生子又曰桓伊傳晉孝武帝召伊飲帝命伊吹笛伊即吹為一弄乃放笛云臣於箏分乃不及笛然自足以韻合歌管請以箏歌并請一吹笛人帝善其調達乃勑御妓奏笛伊又云御府人於臣自不合臣有一奴善相便串帝彌賞其放率乃許召之奴既吹笛伊便撫箏而歌晉中興書曰祖約為丞相從事中郎於府內為婢所傷司真劉隗奏約患生婢僕身被刑傷約甚慚恥遂解職還家齊書曰虞悰治家富殖奴婢無遊手雖在南土而會稽海味無不畢致焉又曰陸澄弟鮮揚州主簿顧測以兩奴就鮮質錢鮮死子晫誣為買券澄為中丞測與書相往反後又箋與太守蕭緬云澄欲成子弟之非未近義方之訓此趍販所不為況搢紳領袖儒宗勝達乎崔鴻十六國春秋前秦録曰慕容沖進逼長安堅登城觀之歎曰此虜何從出也其強若斯大言責沖曰爾輩群奴正可牧牛羊何為送死沖曰奴則奴矣既猒奴苦復欲取爾見代唐書曰哥舒翰有家奴曰左車年十五六亦有膂力翰善使槍追賊及之以槍搭其肩而喝之賊驚顧翰從而剌其喉皆剔高三丈而墮無不死者左車輒下馬斬首率以為常又曰德宗初即位詔曰雍府歲貢奴婢使其離父母之鄉絶骨肉之戀非仁也罷之又曰羅讓纍遷至福建觀察使兼御史中丞甚著仁惠有以女奴遺讓者讓訪其所自曰本某寺家人兄姊九人皆為官所鬻其留者唯老母耳讓慘然焚其丹書以歸其母又曰李玄道纍遷給事中封姑臧縣男時王君廓為幽州都督朝廷以其武將不習時事拜玄道幽州長史以維持府事廓在郡屢為非法玄道數正議裁之嘗又遺玄道一婢玄道問婢所由云本良家子為君廓所掠玄道因放遣之管子曰齊桓公使管仲求寧戚應之曰浩浩乎管仲不能知婢子問之仲曰非婢子所知也婢子曰詩有之浩浩之水遊遊之魚未有室家我將安居寧子其欲室乎仲以言告桓公風俗通曰南陽龐儉少失其父後居閭里鑿井得錢千餘萬行求老蒼頭使主牛馬耕直錢二萬有賓婚大會奴在竈下竊言堂上母我婦也婢即白其母母使驗問曰是我公也因下堂抱其頸啼泣遂為夫婦儉及子歷二千石刺史七八人時人為之語曰廬里龐公鑿井得銅買奴得公又曰將作大匠陳國公孫志節有蒼頭地餘年十七情性聰惠儀狀端正工書疏志節為戶曹史令地餘歸取資用因持車馬亡去到丹陽自云姓王名斌字文高遂留為諸曹史志節拜揚州刺史郡選曹史衣冠子弟皆出斌下乃用之斌乞屏左右叩頭涕洟曰斌即明使君地餘也斌後為蒼梧太守三輔決録曰平陵孟他盡以家財賂張讓監奴奴慚問所欲他曰欲得卿曹拜時賓客求見讓者車常數百乘纍日不得通他後至諸奴迎拜徑將他車獨入衆謂他與讓善爭以物賂他他得以賂讓魏武遺令吾婢皆勤苦使著銅雀臺善待之石虎鄴中記曰石勒字世龍上黨郭季子奴也勒未生之前襄國有讖曰古在左月在右讓言退或入口襄國字也遂治襄國新序曰昌邑王冶側鑄冠十枚以冠賜之師及儒者後以冠冠奴龔遂免冠歸之曰王賜儒者冠下至臣今以餘冠冠奴是大王奴虜畜臣也郭子曰賈公問女悅韓壽問婢識不一婢云是其故主女內懷存想婢後往壽家説如此壽乃令婢通己意女大喜遂與通世説曰鄭玄家奴婢皆讀書玄嘗使一婢不稱旨將撻之方自陳説玄怒使人曳著泥中須臾復一婢來問曰胡為乎泥中答曰薄言往訴逢彼之怒誥林曰裴秀年十八有令望母是婢而嫡母妒猶令秀母親役後大集客秀母下食衆賓見並起拜之答曰微賤豈宜如此當為小兒故耳於是大母乃不敢復使之又曰石崇廁有十餘婢侍列莫不畢備又與新衣出客多羞不能如廁王敦大將軍往脫故衣著新衣意慠然群婢謂曰此客必能作賊又曰宗岱為青州刺史禁淫祀著無鬼論甚精莫能屈後有書生詣岱岱與談論書生乃振衣而去曰絶我輩血食二十餘年君有青牛髯奴所以未得相困耳奴已叛牛已死今日得相制矣言絶而失明日而岱亡搜神記曰諸葛恪已被殺其妻在室問婢曰汝何故血臭婢蹶然起躍至於棟榱臂切齒而言曰諸葛恪公乃為孫峻所殺又曰晉杜世嘏家葬而婢誤不得出十餘年開墓而婢尚生云其始如眠有頃漸覺自謂一再宿初婢之埋年十五六及開冢更生猶十五六也嫁之有子續搜神記曰勾章張然滯役在都有少婦遂與奴通然養一狗甚快後還奴欲謀殺然張弓拔刀當戶然大喚曰烏龍狗遂咋奴頭然因取刀殺奴以婦付官梁冀別傳曰梁冀愛監奴秦宮官至太倉令得出入妻所每見輒屏御者託以言事因通焉內外兼寵刺史二千石皆謁拜之扶風人士孫奮居富冀從貸錢五千萬奮以三千萬與之冀大怒乃告郡縣認奮母為守臧婢云盜白珠十斛紫磨金千斤以叛遂牧考奮兄弟死於獄中悉沒貨財顧談別傳曰談為太常録尚書事從交州家無私積奴婢不滿十人杜蘭香傳曰晉太康中蘭香降張碩為詩贈碩云縱轡代摩奴須臾就尹喜摩奴是香御車奴曾忤其旨是以自御碩説如此異録傳曰廬陵歐明商行經彭澤湖每以物投湖中為禮後見湖中有吏著單衣乘馬云青洪君使要明過至一府舍吏曰青洪感君以禮必有重送者皆勿取但求如願明從之青洪君不得已呼如願送明去如願者神婢也所願輒得數年大富列女傳曰周室大夫仕於周妻淫於鄰人恐主父還覺之為毒藥使媵婢進之婢恐進之則殺主父言之則殺主母因僵仆覆酒主父怒而笞妻恐婢言之因他過欲殺婢婢就杖將死而不言主父之弟聞之具以告主人殺其妻將納婢以為妻婢辭欲自殺主父乃厚幣嫁之列女後傳曰會稽翟素者翟氏之女受娉未及配適遭賊欲犯之臨以刃曰不從者今即死矣素曰我可得而殺不可得而辱素婢名青青乞代素賊遂殺素復欲犯青青曰向欲代素者恐彼恥獲害今素已死我豈有欲哉賊復殺之漢王褒僮約曰蜀郡王褒以事止寡婦楊惠舍有一奴名便倩行酤酒便曰大夫買便時但要守家不約為他家男子酤酒也褒大怒曰寧欲賣耶奴復曰欲使便皆當上券不上券便不能為也褒乃為券曰奴百役不得有二言晨起早掃飲食洗滌居當穿臼縛帚裁盂鑿斗出入不得騎馬載車踑坐大呶下床振頭垂鉤刈芻織履作粗黏雀張鳥結網捕魚繳鴈彈鳧登山射鹿入水捕龜後園縱魚鴈騖百餘驅逐鴟鳥持梢牧豬種薑養羊長育豚駒糞除堂廡飲馬食牛鼓四起坐夜半益芻舍中有客提壺行酤汲水作餔滌杯整按奴但當飯豆飲水不得嗜酒欲飲美酒唯得染脣口不得傾盂覆斗不得晨出夜入交關伴偶多取蒲茅益作繩索雨墮無所為當編蔣織植種桃李梨柿柘桑三丈一樹八尺為行果類相從縱橫相當果熟收斂不得吮嘗犬吠當起驚告鄰里槍門柱戶上樓擊柝持楯曳矛還落三周勤心疾作不得遨遊奴老力索種莞織席事訖欲休當舂一石夜半無事浣衣當白若有私錢主給賓客奴不得有姦私事當聞白奴不聽教當笞一百讀券文訖辭窮咋索仡仡叩頭兩手自搏目淚下落鼻涕長尺審如王大夫言不如早歸黃土陌丘蚓鑽額早知當爾為王大夫酤酒真不敢作惡
