body:
  text: 皇親部七唐高祖竇皇后唐書高祖太穆皇后竇氏京兆始平人隋定州揔管神武公毅之女也后母周武帝姊襄陽長公主后生而髮垂過頸三歲與身齊周武帝特愛重之養於宮中時武帝納突厥女為后無寵后尚幼竊言於帝曰四邊未靜突厥尚強願舅抑情撫慰以蒼生為念但得突厥之助則江南關東不能為患矣武帝深納之毅聞之謂長公主曰此女才貌如此不可妄以許人當為求賢夫乃於門屏畫二孔雀諸公子有求婚者輒與兩箭射之潛約中目者許之前後數十輩莫能中高祖後至兩發各中一目毅大悅遂歸于我及周武帝崩后追思如喪所生隋文帝受禪后聞而流涕自投於床曰恨我不為男以救舅氏之難毅與長公主遽掩口曰汝勿妄言滅吾族矣后事元貞太后以孝聞太后素有羸疾時或危篤諸姒以太后性嚴懼譴皆稱疾而退唯后晝夜扶侍不脫衣履者動淹旬月焉善書學類高祖之書人莫能辨工篇章而好存規誡大業中高祖為扶風太守有駿馬數匹常言於高祖曰上好鷹愛馬公之所知此堪進御不可久留人或言者必為身纍願熟思之高祖未決竟以此獲譴未幾后崩於涿郡時年四十五高祖追思后言方為自安之計數求鷹犬以進之俄而擢拜將軍因流涕謂諸子曰我早從汝母之言居此官久矣初葬壽安陵後祔葬獻陵上元元年八月改上尊號曰太穆順聖皇后太宗長孫皇后唐書曰太宗文德順聖皇后長孫氏長安人隋右驍衛將軍晟之女也后少好讀書造次必循禮則年十三嬪于太宗武德元年冊為秦王妃九年冊拜皇太子妃太宗即位立為皇后后性尤儉約凡所服御取給而已太宗彌加禮待十年六月己卯崩于立政殿時年三十六葬於昭陵后嘗撰古婦人善事勸戒十卷名曰女則自為之序又著論駮漢明德馬皇后以為不能抑退外戚令其當朝貴盛乃戒其龍馬水車此乃開其禍源而防其末事耳且誡主守者曰此吾以自防間耳婦人著述無條貫不欲至尊見之慎勿言崩後宮司以聞太宗覽而增慟以示近臣曰皇后此書足可垂於後代我豈不達天命而不能割情乎以其每能規諫補朕之闕今不復聞善言是內失一良佐以此益令人哀耳上元元年改上尊號曰文德順聖皇后徐妃附唐書曰太宗賢妃徐氏名惠右散騎常侍堅之姑也生五月而能言四歲誦論語毛詩八歲好屬文其父孝德試擬楚辭云山中不可以久留詞甚典美自此遍涉經史手不釋卷太宗聞之納為才人其所屬文揮翰立成詞華綺贍俄拜婕妤再遷充容時軍旅函動宮室玄興百姓頗倦勞役上疏諫之太宗善其言優賜甚厚及太宗崩追思顧遇之恩哀慕愈甚發疾不自醫病甚謂所親曰吾荷顧實深志在早歿魂其有靈得侍園寢吾之志也因為七言詩及連珠以見其志永徽元年卒時年二十四詔贈賢妃陪葬於昭陵之石室高宗廢王皇后唐書曰高宗廢后王氏并州祁人也父仁祐同安長公主即后之從祖母也公主以后有美色言於太宗遂納為晉王妃高宗登儲冊為皇太子妃永徽初立為皇后初武皇后貞觀末隨太宗嬪御居於感業寺后及左右數為之言高宗由是復召入宮立為昭儀俄而漸承恩寵遂與后及良娣蕭氏遞相譖毀帝終不納后言而武昭儀寵遇日厚后懼不自安密與母柳氏求巫祝厭勝事發帝大怒斷柳氏不許入宮將廢后長孫無忌褚遂良等固諫乃止俄又納李義府之策永徽六年廢后及蕭良娣皆為庶人囚之別院武昭儀令人皆縊殺之中宗趙皇后唐書曰中宗和思皇后趙氏京兆長安人父瓌尚高祖女常樂公主中宗為英王時納后為妃既而妃母公主得罪妃亦坐廢幽死於內侍省則天臨朝瓌為壽州刺史坐與越王貞連謀被誅公主亦坐死神龍元年贈后諡為恭皇后及中宗崩將葬于定陵追諡后為和思莫知瘞所以皇后禕衣於陵所寢宮招魂置衣於魂輿以太牢告祭遷衣於寢宮舒於御榻之右覆以夷衾而祔葬焉中宗廢韋皇后唐書曰中宗韋庶人京兆萬年人也中宗為太子時納后為妃仍擢后父玄貞為豫州刺史嗣聖元年立為皇后其年中宗見廢后隨從房州時中宗懼不自安每聞制使至惶恐欲自殺后勸王曰禍福倚伏何常之有豈失一死何遽如是也纍年同艱危情義甚篤所生懿德太子永泰永壽長寧安樂四公主安樂最幼生於房州帝自脫衣裹之遂名曰裹兒特寵異焉及中宗復立為太子又立后為妃中興初復立為皇后帝在房州時常謂后曰一朝見天日誓不相禁忌及得志乃受上官昭容邪說引武三思入宮中升御床與后雙陸帝為點籌以為歡笑醜聲日聞于外景龍四年六月帝遇毒暴崩后懼祕不發喪及臨淄王勒兵入內后惶駭遁入殿前飛騎營及武延秀安樂公主皆為亂兵所殺追貶為庶人上官昭容唐書曰中宗上官昭容名婉兒西臺侍郎儀之孫也父庭芝與儀同被誅婉兒時在襁褓隨配入掖庭及長有文詞明習吏事則天時婉兒忤旨當誅則天惜其才不殺但黥其面而已自聖曆已後百司表奏多令參決中宗即位又令專掌制命深被信任尋拜為昭容婉兒既與武三思淫亂每下制勑多因事推尊武氏而排抑皇家節愍太子深惡之及舉兵至肅章門扣閣索婉兒婉兒大言曰觀其此意即當次索皇后以及大家帝與后遂激怒并將婉兒登玄武門樓以避兵鋒俄而事定婉兒常勸帝廣置昭文學士盛引當朝詞學之臣數賜遊宴賦詩唱和婉兒每代帝及后長寧安樂二公主數首並作辭甚綺麗時人咸諷誦之婉兒俄又通於吏部侍郎崔湜引知政事湜嘗充使開商山新路功未半而中宗崩婉兒草遺制曲敘其功而加褒賞及韋庶人敗婉兒亦斬於旗下睿宗劉皇后唐書曰睿宗肅明順聖皇后劉氏父延景陜州刺史儀鳳中睿宗居藩納后為孺人尋立為妃生寧王憲壽昌代國二公主睿宗即位冊為皇后及降為皇嗣后從降為妃長壽中與昭成皇后同被譴為則天所殺景雲元年追諡肅明皇后招魂葬於東都城南陵曰惠陵睿宗竇皇后唐書曰睿宗昭成順聖皇后竇氏父孝諶潤州刺史后姿容婉順動循禮則睿宗為相王時為孺人甚見禮異光宅元年立為德妃生玄宗及金仙玉真二公主長壽二年為戶婢團兒誣讚與肅明皇后厭蠱呪詛正月二日朝則天皇后於嘉豫殿既退而同時遇害梓宮祕密莫知所在睿宗即位諡曰昭成皇后招魂葬於都城之南陵曰靖陵玄宗廢王皇后唐書曰玄宗廢后王氏同州下邳人梁冀州刺史神念之後上為臨淄王時納后為妃上將起事頗預密謀贊成大業先天元年立為皇后以父仁皎為太僕卿后兄守一以后無子嘗懼有廢立導以符厭之事有左道僧明悟為祭南北斗刻霹靂木書天地字及上諱合而佩之且呪曰佩此有子當與則天皇后為此事發上親究之皆驗下制廢為庶人守一賜死其年十月庶人卒以一品禮葬於無相寺寶應元年雪冤復尊為皇后玄宗武皇后唐書曰玄宗貞順皇后武氏則天從父兄子恆安王攸正女也攸正卒後尚幼隨例入宮上即位漸承恩寵及王庶人廢後特賜號為惠妃宮中禮秩一同皇后惠妃開元初産夏悼王及懷安哀王上仙公主並襁褓不育上特垂傷悼及生壽王瑁不敢養於宮中命寧王憲於外養之又生盛王琦咸宜太華二公主惠妃以開元二十五年薨年四十餘楊貴妃唐書曰玄宗楊貴妃父玄琰蜀州司戶妃早孤養於叔父玄璬開元初武惠妃特承寵遇故王皇后廢黜二十四年惠妃薨帝哀悼久之後庭數千無可意者或奏玄琰女姿色冠代宜蒙召見時妃衣道士服號曰太真既進見玄宗大悅不朞歲恩禮如惠妃太真姿質豐艷善歌舞通音律智算過人每倩盻承迎動移上意宮中呼為娘子禮數實同皇后有姊三人皆有才貌玄宗並封國夫人天寶中安祿山大立邊功上深寵之祿山來朝帝令貴妃姊妹與祿山結為兄弟祿山母事妃每宴賜錫齎稠沓及祿山叛露檄數國忠之罪河北盜起玄宗以皇太子為天下兵馬元帥監撫軍國事國忠大懼諸楊聚哭貴妃銜土陳請帝遂不行內禪及潼關失守從幸至馬嵬禁軍大將陳玄禮密啓太子誅國忠父子既而六軍不散玄宗遣力士宣問對曰賊本尚在蓋指貴妃也力士復奏帝不獲已與妃決遂縊死於佛室時年三十八瘞於驛西道側玄宗楊皇后唐書曰玄宗元獻皇后楊氏弘農華陰人后景雲元年八月選入太子宮時太平公主用事尤忌東宮宮中左右持兩端而潛附太平者必陰伺察事雖纖芥皆聞於上太子心不自安后時方娠太子密謂侍讀張說曰用事者不欲吾多息恐禍及此婦人其如之何密令說懷去胎藥而入太子於曲室躬自煮藥醺然似寐夢神人覆鼎既寤如夢如是者三太子異之告說說曰天命也無宜他慮既而太平誅后果生肅宗皇帝太子妃王氏無子后班在下后不敢母肅宗王妃撫鞠慈甚所生開元中肅宗為忠王后為妃又生寧親公主張說以舊恩特承寵異說亦奇忠王儀表心知運曆所鍾故寧親公主降說子垍開元十七年后薨葬細柳原肅宗張皇后唐書曰肅宗張皇后本南陽西鄂人後徙家昭應祖母竇氏玄宗母昭成皇太后之妹也昭成為天后所殺玄宗幼失所恃為竇姨鞠養景雲中封鄧國夫人父去逸天寶中選入太子宮為良娣后辨惠豐碩巧中上旨祿山之亂玄宗幸蜀太子與良娣俱從車駕渡渭百姓遮道請留太子收復長安肅宗姓仁孝以上皇播越不欲違離左右官者李靖忠啓太子請留良娣贊成之白於玄宗太子如靈武時賊已陷京師從官單寡道路多虞每太子次舍宿止良娣必居其前太子曰捍禦非婦人之事何以居前良娣曰今大家跋履險難兵衛非多恐有倉卒妾自當之大家可由後而出庶幾無患及至靈武産子三日起縫戰士衣太子勞之曰産忌作勞安可容易后曰此非妾自養之時須辦大家事肅宗即位冊為淑妃贈父去逸左僕射母竇氏封義章縣主乾元元年冊為皇后肅宗崩太子監國遂移后於別殿幽宮崩肅宗吳皇后唐書曰肅宗章敬皇后吳氏濮陽人后父坐事沒入掖庭開元二十二年玄宗幸忠王邸見王服御蕭然傍無媵侍命將軍高力士選掖庭宮人賜之而吳后在籍中容止端麗性多謙抑寵遇益隆明年生代宗皇帝二十八年薨葬於春明門外代宗即位群臣以肅宗山陵有期准禮以先太后祔代宗沈皇后唐書曰代宗睿真皇后沈氏吳興人世為冠族父易直祕書監開元末以良家子選入東宮賜太子生男廣平王天寶元年生德宗皇帝祿山之亂玄宗幸蜀諸王妃主從幸不及者多陷於賊后被拘於東都掖庭及代宗破賊收東都見之留后於宮中方經略北征未暇迎歸長安俄而史思明再陷河洛及朝義敗復收東都失后所在莫測存亡代宗遣使求訪十餘年寂無所聞德宗即位下詔遙尊為皇太后代宗獨孤皇后唐書曰代宗貞懿皇后獨孤氏父頴左威衛録事參軍后以美麗入宮嬖幸專房故長秋虛位諸姬罕所進御后始冊為貴妃生韓王迥華陽公主大曆十年五月薨追諡曰貞懿皇后於殯於內殿纍年不忍出宮十三年十月方葬命宰臣常袞為哀冊德宗王皇后唐書曰德宗昭德皇后王氏父遇官至祕書監德宗為魯王時納后為嬪上元二年生順宗皇帝特承寵異德宗即位冊為淑妃貞元二年妃病十一月甲午冊為皇后是日崩於兩儀殿韋賢妃唐書曰德宗韋賢妃不知氏族所出初為良娣貞元二年冊為賢妃性敏惠言無茍容動必由禮德宗深重之六宮師其德行及德宗崩請於崇陵終喪紀因侍於寢園元和四年薨順宗王皇后唐書曰順宗莊憲皇后王氏琅琊人父顏衛尉卿后幼以良家子選入宮為才人順宗在蕃時代宗以才人賜之時年十三大曆十三年生憲宗皇帝立為宣王孺人順宗升儲冊為良娣后言容恭謹宮中稱其德行順宗即位疾恙未平后供侍醫藥不離左右屬帝不能言冊禮將行復止及永貞內禪冊為太上皇后中和元年正月順宗晏駕五月尊太上皇后為皇太后冊禮畢憲宗御紫宸宣赦太后居興慶宮后性仁和恭遜深抑外戚無絲毫假貸訓厲內職有母儀之風焉元和十一年三月崩於咸寧殿諡曰莊憲憲宗郭皇后唐書曰憲宗懿安皇后郭氏尚父子儀之孫駙馬都尉曖之女母代宗長女升平公主憲宗為廣陵王時納后為妃以母貴父祖有大勳於王室順宗深寵異之貞元十一年生穆宗皇帝元和元年冊為貴妃時帝後庭多私愛以后門族華盛慮正位之後不容嬖幸以是冊拜後時穆宗嗣位冊為皇太后敬宗即位尊為太皇太后宣宗繼統即后之諸子也恩禮愈異於前朝大中年崩於興慶宮諡曰懿安祔葬於景陵后歷位七朝五居太母之尊人君行子孫之禮福壽隆貴四十餘年雖漢之馬鄧無以加焉女學士宋尚宮附唐書曰女學士尚宮宋氏者名若昭貝州清陽人父庭芬世為儒學至庭芬有詞藻生五女皆聰惠庭芬始教以經藝既而課為詩賦年未及笄皆能屬文長曰若華次曰若昭若倫若憲若荀若華若昭文尤淡麗性復貞素間雅不尚芳華之飾嘗白父母誓不從人願以藝學揚名顯親若華教誨四妹有如嚴師著女論語十篇其言摸倣論語以韋逞母宣文君宋氏代仲尼以曹大家等代顏閔其間問答悉以婦道所尚若昭注解皆有理致貞元四年昭義節度使李抱真表薦以聞德宗俱召入宮試以詩賦兼問經史中大義深加賞歎德宗能詩與侍臣唱和相屬亦令若華姊妹應制每進御無不稱善嘉其節概不群不以宮妾遇之呼為學士先生庭芬起家受饒州司馬習藝館內教賜第一區給俸料元和末若華卒贈河內郡君自貞元七年已後宮中記注簿籍若華掌其事穆宗復令若昭代司其職拜尚宮姊妹中若昭尤通曉人事自憲穆敬三帝皆呼為先生六宮嬪媛諸王公主駙馬皆師之為之致敬進封梁國夫人寶歷初卒將葬詔所司供鹵簿敬宗復令若憲代司宮籍文宗好文以若憲善屬文能論議奏對尤重之大和中坐駙馬沈光事幽若憲於外第賜死穆宗王太后唐書曰穆宗恭僖皇太后王氏越人父紹卿婺州金華令后少入太子宮元和四年生敬宗穆宗皇帝即位立為妃長慶四年二月尊為皇太后文宗即位之初號寶歷太后穆宗蕭皇后唐書曰穆宗貞獻皇后蕭氏福建人初入十六宅為建安王侍者元和四年生文宗皇帝寶歷三年敬宗崩中尉王守澄率兵討賊迎江王即位文宗踐祚之月奉冊上尊號曰皇太后武宗即位供養彌謹徙居積慶殿號積慶太后會昌中崩諡曰貞獻敬宗郭貴妃唐書曰敬宗郭貴妃父義右威衛將軍長慶末以姿貌選入太子宮敬宗即位為才人生晉王普帝以少年有子復以才人容德冠絶特寵異之俄冊為貴妃及昭愍遇盜宮闈變起文宗即位尤憐晉王有若己子故貴妃禮遇不衰昭宗何皇后唐書曰昭宗積善皇后何氏東蜀人侍壽王邸婉麗多智特承恩顧生德王輝王昭宗即位立為淑妃乾寧中車駕在華州冊為皇后自乾符已後盜滿天下妖生九重宮廟榛蕪奔播不暇景福之際奸臣內侮后於蒙塵薄狩之中嘗膳禦侮不離左右天祐初朱全忠逼遷輿駕東幸洛陽其年八月昭宗遇弒翌日宰相柳璨獨孤損等詐宣皇后令云帝為宮人所害輝王祚宜升帝位仍尊后為皇太后遭罹變故迫以凶威宮中哭泣不敢聲聞于外明年十二月全忠將僭位先行九錫然後受禪全忠牙將蔣玄暉在洛陽宮知樞密宣徽副使趙殷衡素與不叶且欲代知樞密事因使于梁誣告云玄暉私於何太后相與盟詛誓復唐室不欲王受九錫全忠大怒即日遣使至洛陽誅玄暉太后亦被害於積善宮又殺宮人阿秋阿虔仍廢太后為庶人
