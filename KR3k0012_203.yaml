body:
  text: 封建部五婦人封左傳成公上曰晉敗齊師齊侯遂自徐關入見保者曰勉之齊師敗矣避女子使避君也齊侯單還婦人不知之也女子曰君免乎曰免矣曰鋭司徒免乎曰免矣曰茍君與吾父免矣可若何乃奔齊侯以為有禮既而問之壁司徒之妻也壁司徒主壘壁豫之石窖石窖邑名濟北盧縣東有地名石窖音溜陳留風俗傳曰高祖與項氏戰厄於延鄉有翟母者免其難故以延鄉為封丘縣以封翟母焉夫人後漢書曰崔篆母師氏能通經學百家之言王莽寵以殊禮賜號義成夫人金印紫綬文軒丹轂顯於新代唐書曰魏衡妻王氏梓州郪人也武德初薛仁果舊將旁仚地侵掠梁部因獲王氏通而妻之後企地漸強盛衡謀以城應賊企地領衆將趨梁州未至數十里飲酒醉臥王氏取其佩刀斬之攜其首入城賊衆乃散高祖大悅封為崇義夫人又曰咸亨中燕山道揔管右領軍大將軍李謹行大破高麗叛徒於瓠廬河之西俘獲數千人自是平壤餘衆走投新羅時謹行妻劉氏留在代奴城高麗引靺羯攻之劉氏環甲率衆守城久之賊乃退上嘉其功特封為燕郡夫人又曰鄒保英妻奚氏不知何許人也萬歲通天年中契丹賊李盡忠來寇平州保英時任刺史領兵討擊既而城孤援寡勢將欲陷奚氏乃率家僮及城內女丁相助固守賊退所司以聞優制封為誠節夫人又曰王君㚟上嘗於廣達樓引君㚟及妻夏氏設宴賜以帛夏氏亦有戰功故特賞之封為武威郡夫人五代史晉史曰鎮州節度使安重榮妻彭城郡夫人劉氏封魯國夫人南陽郡夫人韓氏封陳國夫人重榮立二嫡妻非禮也朝廷並命之亦非制也郡君漢書曰武帝尊王太后母臧兒為平原君後漢書曰弘農人宰宣素性佞邪欲取媚於梁冀乃上言大將軍有周公之功今既封諸子則其妻宜為邑君詔遂封冀妻孫壽為襄城君兼食陽翟租歲入五千萬加賜赤紱比長公主長公主儀服同藩王又曰安思閶皇后追尊后母宗為滎陽君晉中興書曰肅祖太妃豫章恭惠君茍氏初以微入宮生肅祖中宗以母賤命虞妃母養肅祖而出嫁茍為馬氏妻太寧元年馬氏無疾而卒肅祖迎母還宮養稱建安君追贈豫章君諡曰恭惠後魏書曰景明初世追舅氏封外祖母蓋氏為清河郡君又曰靈太后臨朝以元乂妹封乂妻新平君後遷馮翊君縣君漢書曰王太后微時為金王孫婦婦生在民間蓋諱之也武帝始立韓嫣白之帝曰何為不蚤言乃車駕自往迎之其家在長陵小市直至其門使左右入求之家人驚恐女逃匿床下扶持出拜帝下車立曰大姊何藏之深也載至長樂宮與俱謁太后太后垂涕女亦悲泣帝奉酒前為壽錢千萬奴婢三百人公田百頃甲第以賜姊太后謝曰為帝費因賜湯沐邑號修成君又曰宣帝賜外祖母號為博平君以博平蠡吾兩縣戶萬一千為湯沐邑范曄後漢書曰靈思何皇后追封父真為車騎將軍舞陽宣德侯封后母與為舞陽君魏志曰文德郭皇后安平廣宗人也母董為郡君追改封父永為灌津敬侯世婦董為常陽君又曰青龍二年春追諡后兄儼曰安成郭穆侯封儼世婦劉為東鄉君又追封逸世婦張為安嘉君又曰明元郭皇后西平人也齊王即位尊后皇太后封太后母杜為郃陽君又曰明悼毛皇后河內人黃初中以選入東宮明帝時為平原王進御有寵出入與同輿輦追封后母夏氏為野王君又曰太始三年詔曰漢文追崇靈文之號武宣有平原博平之封咸所以奉尊尊之敬廣親親之恩宜追封故衛將軍景侯夫人羊氏為平陽君也臧榮緒晉書曰武悼楊皇后廢在金墉城與母高都君龐氏共止高都君臨刑后抱持號叫不食而崩晉中興書曰穆皇后庾氏字文君左將軍琛第三女贈琛為車騎將軍母丘氏封安陽縣君從母荀氏永宣縣君又曰簡文順皇后王氏字蘭始驃騎將軍述之再從妹追贈前夫人成氏東豐縣君後夫人成氏東興君沈約宋書曰孝穆趙皇后諱安宗下邳僮人也父裔永初二年有司奏裔命婦孫可建昌縣君又曰孝穆蕭皇后名文壽蘭陵人父卓初與裔俱贈金紫光祿大夫妻下邳趙氏封吳郡壽昌縣君唐書曰古玄應妻高氏固守飛狐縣城卒免為突厥所陷下詔曰頃屬默啜攻城咸憂陷沒丈夫固守猶不能堅婦人懷忠不憚流矢由茲感激危城重安如不褒升何以獎勸古玄應妻可封為徇忠縣君又曰衡方厚妻程氏方厚太和中任雍州都督府録事參軍為招討使董昌齡誣枉殺之方厚妻程氏力不能免乃抑其哀如非冤者昌齡雅不疑慮聽其歸喪程氏故得以徒行詣闕截耳於右銀臺門告夫被殺之冤御史臺鞠之得實諫官亦有章疏故昌齡再授譴逐程氏開成元年降勑曰乃者吏為不道虐殺爾夫詣闕申冤徒行萬里崎嶇逼畏濱於危亡血誠既昭幽憤果雪雖古之烈婦何以加焉如聞孤孀無依晝哭待盡俾榮祿養仍錫疏封可武昌縣君英雄記曰董卓孫女名白時尚未笄封為渭陽君於郿城起壇從廣二丈餘高五六尺使白乘金華青蓋車都尉中郎將刺史二千石在郿者各令乘軒簪筆為白導從之壇上使兄子橫為使者授印綬也潘嶽宜城宣君誄曰行成于巳名生於人考終定諡實曰宣君祝宗蒞事卿相奉引輕車整駕介士列陳鸞輅依容轀車升襯鄉君魏志曰卞隆以后父封睢陽鄉侯隆妻王氏為顯陽君追封隆前妻劉氏為仁慎鄉君后親母故也又曰甄儼孫女為齊王皇后后父巳沒封后母為廣陽鄉君晉書曰立皇后楊氏母太原龐氏為安昌鄉君追外曾祖母故司徒王朗夫人夏氏為滎陽鄉君晉中興書曰哀靖皇后王氏字穆之司徒左長史濛之女也初為琅琊王妃哀帝即位拜為皇后追贈父濛金紫光祿大夫封晉安縣侯母愛氏為安國鄉君也又曰元敬皇后虞氏字孟母濟陽外黃人也祖壽撫軍大將軍椽父豫太傅參軍中宗之為琅琊王納后為妃豫妻王氏為邢陽縣君從母散騎常侍新野王罕妻為平陽鄉君又曰康獻皇后禇氏太傅褒之女封母謝氏為尋陽鄉君又曰成恭皇后杜氏陵陽京兆人也母裴氏為廣德縣高安鄉君賜錢百萬布五百匹又曰穆章皇后何氏字法倪司空充之女追贈父充光祿大夫封晉興侯母孔氏長樂鄉君又曰王蘊以后父徵拜金紫光祿大夫封建昌侯母劉氏平樂君沈約宋書曰武敬臧皇后諱受東莞人也父俊追贈金紫光祿大夫妻高密叔孫氏遷永平鄉君唐書曰獨孤武都謀叛王世充歸國事覺誅死武都子師仁年始三歲世充以其年幼不殺使禁掌之乳母王氏號蘭英請髡鉗求入保養世充許之蘭英撫育提攜備盡筋力時喪亂年饑人多餓死蘭英扶路乞丐捃拾遇有所得便歸與師仁蘭英唯啖土飲水而巳後詐採拾乃竊師仁歸于京師高祖嘉其義下詔曰師仁乳母王氏慈惠有聞撫鞠無倦提攜遺幼背逆歸朝宜有褒隆以錫其號可封永壽鄉君錫命尚書曰平王錫晉文侯秬鬯圭瓚作文侯之命左傳曰王命尹氏策命晉文公為侯伯錫之大路之服戎路之服彤弓一彤矢百玈弓矢千秬鬯一卣虎賁三百人左傳曰文元年天王使榮叔來錫公命杜預注曰諸侯即位天子錫以命圭合瑞為信若僖二十八年王賜晉侯命亦其比也又曰襄十四年王使劉定公賜齊靈公命曰昔伯舅太公佑我先王股肱周室師保萬民世胙太師以表東海王室之不壞繄伯舅是賴余今命汝環環齊靈公名也茲帥舅氏之典纂乃祖考無忝乃舊勳敬之哉無廢朕命纂繼也因昏而加褒顯傳言王室不能命有功國語曰襄王使邵伯過及內史過賜晉惠公命呂甥卻芮相晉侯不敬晉侯執玉卑拜不稽首內史過歸以告王曰晉不亡其君必無後且呂卻將不免王曰何故對曰夏書有之曰衆非元后何戴后非衆無以守邑邑國在湯誓曰余一人有罪無以爾萬方萬方有罪在子一人在余一人乃我教道之過在盤庚曰國之臧則維汝衆今商書盤庚是也臧善國俗之善則維汝衆歸功天下也國之不臧則維余一人是有逸罰逸過罰罪也國俗之不善則維一人是我有過其罪當在我也如是則長衆使人不可不慎人之所急在大事大事戎祀也先王知大事之必以衆濟故祓除其心以和惠人祓拂也考中度衷以蒞之蒞臨考中省巳之中必以度人之中心恕以臨之也昭明物則以訓之制義庶孚以行之義宜庶衆孚信當制立事宜為衆所信也祓除其心精也精潔考中度衷忠也忠恕也昭明物則禮也制義庶孚信也然則長衆使人之道非精不和非忠不立非禮不順非信不行今晉侯即位而背內外之賂背外不與秦也背內不與里丕田也虐其處者棄其信虐其處者殺里丕之黨不敬王命棄其禮施其所惡棄其忠已所不欲勿施於人所惡於下旡以事上今晉侯皆施之於人故曰棄其忠也以惡實心棄其精實滿四者皆棄則遠不至而近不和矣四者精忠禮信將何以守國古者先王既有天下又崇立上帝明神而敬事之於是乎有朝日月以教人事禮天子以春分朝日以秋分夕月諸侯春秋受職于王以臨其人大夫士曰恪位著以警其官中庭之左右曰位門屏之間曰著也庶人工商各守其業以共其上猶恐有墜失也故為車服旗章以旌之為班爵貴賤以別之為令聞嘉譽以聲之猶有散遷懈慢而著在刑辟流在裔土於是乎有蠻夷之國有斧鉞刀墨之人而況可以淫縱其身乎夫晉侯非嗣也而得其位嗣適嗣也舋亹怵愓保位戒懼猶曰未也若將廣其心而遠其鄰凌其人而卑其上將何以固守夫執玉卑替其摯拜不稽首誣其王摯替無鎮誣王無人夫天事恆蒙任重享大者必速及故晉侯誣王人亦將誣之欲替其鎮人亦將替之大臣享其祿不諫而阿之亦必及焉襄王三年而立晉侯八年而隕於韓十六年而晉人殺懷公無胄秦人殺子金子公子金呂甥子公卻苪之宇又曰襄王使太宰文公及內史興錫晉文公命上卿逆於境晉侯郊勞館諸宗廟饋九牢設庭燎及期命于武宮設桑主布機筵太宰蒞之晉侯端委以入太宰以王命冕服內史贊之三命而後即冕服既畢賓饗贈餞如公命侯伯之禮而加之以宴好內史興歸以告王曰晉不可不善也其君必霸逆王命敬奉禮義成敬王命順之道成禮義德之則德以道諸侯必歸之且禮所以觀忠信仁義忠所以分也仁所以行也信所以守也義所以節也忠分則均仁行則報信守則固義節則度分均無怨行報無匱守固不偷節度不攜若人不怨而財不匱令不偷而動不攜其何事不濟中能應外忠也施三服義仁也守法不淫信也行禮不疚義也臣入晉境四者不失臣故曰晉侯其能禮矣王其善之樹於有禮艾人必豐王從之使於晉者道相逮及惠后之難王出在鄭惠后惠王之后襄王繼母陳媯有寵生子帶將立子帶未及而卒子帶奔齊王復之又通于襄王之后隗氏王廢隗氏周大夫頽叔姚子奉子帶以翟師伐周王出適鄭處于記事在魯僖二十四年晉侯納之襄王十六年立晉文公二十一年以諸侯朝于衡雍且獻楚捷遂為踐土之盟於是乎始霸范曄後漢書曰董昭等欲共進曹操爵國公九錫備物密以訪荀彧彧曰曹公本興義兵以匡振漢朝雖勳庸崇著猶稟忠貞之節君子愛人以德不宜如此事遂寢操心不能平會南征孫權彧勞軍于譙表留彧晉中興書曰烈宗冲幼桓溫威震內外人情噂沓牙生同異謝安與王坦之盡忠匡翼溫諷朝廷欲為九錫使驍騎將軍袁宏具草時溫巳病篤宏以呈安安視輒云不好更改之使彌歷旬日至于溫薨錫命遂寢
