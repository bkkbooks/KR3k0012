body:
  text: 居處部十八倉說文曰倉榖藏也倉黃取而藏之故謂之倉周禮注曰藏米曰廩釋名曰倉藏物也詩云乃求千斯倉乃求萬斯箱以峙其粻又曰豐年多黍多稌亦有高廩萬億及秭又曰我倉既盈我庾惟億尚書曰武王克商發巨橋之粟大賴于萬姓巨橋紂倉也傳曰楚莊王賑廩周食注賑廩開倉同食上下無異禮記月令曰季春發倉廩賜貧窮又曰五榖皆入必量於歲又曰循行積聚無有不斂又曰孟冬命有司穿竇窖修囷倉謹蓋藏務積聚又曰國無九年之畜為不足無三年之畜曰急周禮曰儲畜以待凶荒又曰倉人掌粟入之藏辦九榖之物以待邦用若榖不足則止餘法用有餘則藏之以待凶而頒之又曰廩人掌九榖之數以待國之匪頒賜稍食以歲之上下數邦用以知足否以詔榖用以治年之豐凶公羊傳桓公曰御廩災御廩者何粢盛之所藏也論語曰舊榖既沒新榖既升春秋佐助期曰天廩倉神名均明史記曰舜母嫉舜舜父使舜塗泥倉放火而燒舜舜垂席而下得無傷又曰李斯年少時入倉觀倉中鼠食粟居大廡下斯乃嘆曰人之賢不肖譬如鼠矣在所處耳乃從荀卿學帝王之術又曰宣曲任氏之先為督道倉吏秦之敗也豪桀皆爭取金玉而任氏獨窖倉粟及楚漢交兵民不得田而豪桀金玉盡歸任氏又曰高帝七年立太倉漢書曰汲黯因使矯制發倉救河內飢民上釋罪又曰武帝之初民給家足太倉之粟陳陳相因詩曰如岡如阜如山如陵又宣紀曰耿壽昌奏設常平倉豐則糴儉則糶以利民又曰王嘉奏事曰孝文時吏居官者或長子孫以官為氏倉氏庫氏則倉庫吏之後也又鄒陽上書吳王曰吳有諸侯之位而實富於天子轉粟西鄉陸行不絶水行滿河如淳曰言漢京師仰須山東漕運以自給耳不如海陵之倉又賈捐之上書曰武帝元狩六年太倉粟紅腐不可食又食貨志曰漢宣帝時年豐人少利時大司農中丞耿壽昌上計令郡國皆築倉以榖賤時增其價而糴以利農榖貴時減其價而糶以利人名曰常平倉百姓利之也後漢書曰韓韶字仲黃潁川舞陽人也少仕郡辟司徒府秦山賊公孫舉僞號歷年守令不能破多為坐法尚書選三府掾屬能治劇者乃以韶為羸長羸縣故城在今兗州磚城縣東北也賊聞其賢相戒不入羸境餘縣多被寇廢耕桑其流入縣界求索衣糧者甚衆韶愍其飢困乃開倉賑之所廩贍萬餘戶主者爭謂不可韶曰長活溝壑之民而以此伏罪含笑入地矣太守素知韶名德竟無所坐又曰隗囂既敗公孫述欲安衆以成都郭外有秦時舊倉述改名白帝倉述以色尚白故改之自王莽已來常空述即使人言白帝倉出榖如山陵百姓空市里往觀之述乃大會群臣問曰白帝倉竟出榖乎皆對言無述曰訛言不可信道隗王破者復如此矣俄而囂將王元降述以為將軍又曰虞詡時朝歌賊寧季等數千人攻殺長吏屯聚連年州郡不能禁乃以詡為朝歌長故舊皆弔詡曰得朝歌何衰詡笑曰志不求易事不避難臣之職也不遇盤根錯節何以別利器乎始到河內太守馬棱勉之曰君儒者當謨謀廟堂之上反在朝歌邪詡曰初除之日士大夫皆見弔勉詡籌之知其能為也朝歌者韓魏之郊背太行臨黃河去敖倉百里而青冀之人流亡萬數賊不知開倉招衆劫庫兵守成皋斷天下右臂此不足憂也今其衆新盛難與爭鋒兵不厭權願寬假轡策勿令有所舉閡而已及到官設令三科以募求壯士自掾吏已下各舉所知攻劫者為上偷盜為次帶喪服而不事家業者為下收得百餘人詡為之饗會悉負其罪使入賊中誘令劫掠乃伏兵以待之遂殺賊數百人及潛遣貧民能縫者傭作賊衣以綵縫其裾為幟幟記也續漢書曰以縫縷其裾也有市里者吏輒擒之賊由是駭散咸稱神明魏志曰袁渙字耀卿為魏國郎中令及卒太祖為之流涕以榖二千斛一教以太倉榖千斛賜郎中令家一教以垣下榖千斛與曜卿家外不解其意教曰以太倉榖者官法也垣下榖者新舊也吳書曰建康宮城即吳苑城城內有倉名曰苑倉故開北瀆通轉運於倉所時人亦呼為倉城晉咸和中修苑城為宮惟倉不毀故名太倉在西華門內道北晉書鄭默出為東郡太守值歲荒人飢默輒開倉賑給乃舍都亭自表待罪朝廷嘉默憂國詔書褒歎比之汲黯班告天下若郡縣有此北者聽出給入為散騎常侍又曰王渾武帝受禪加揚烈將軍遷徐州刺史時年荒饑渾開倉賑贍百姓賴之又曰王蘊為吳興太守民飢輒開倉贍恤主簿請先列上待報蘊曰行仁義敗無恨坐違科免官士庶詣闕左降晉陵太守郡國志曰衡山石廩峰一如倉庾有二戶一開一閉閉者亦有關鑰之形王子年拾遺記曰曹曾遇世亂家家焚廬曾畜書萬卷慮其先文湮沒乃積石如倉廩以藏書世謂曹家書倉焉水經注云汾陽故城積粟所在名之曰羊腸倉在晉門閭陽北石磴縈委若羊腸故以為名即今羊腸坂是也越絶書曰郡均東倉春申君造西倉名曰君均西倉門周一里八步又曰吳兩倉春申君所造一名均輸洛陽記曰有常滿倉天門集曰廩星主倉說苑曰子路為蒲令備水災興民春修溝瀆為民煩苦故人豫一簞食一壺漿孔子聞之使子貢止之子路忿然不悅往見夫子曰由也以暴雨將至恐有水災故與民修溝瀆以備之而民多匱於食故與人一簞食一壺漿而夫子使賜止之何也夫子止由之行仁也夫子以仁教而禁其行仁由也不受子曰爾以為餓何不告於君發倉廩以給食之而以爾私饋之是汝不明君之惠見汝之私義也速已則可矣否則爾受責不久矣子路心服而退又曰北郭騷踵見晏子曰竊悅先生之義願乞所以養母者晏子使人分倉粟府金而遺之辭金而受粟有間晏子見疑於景公出奔北郭子召其友而告之曰吾悅晏子之義而嘗乞所以養母者吾聞之曰養及親者身更其難今晏子見疑吾將以身白之遂造公庭求復之曰晏子天下之賢者也今去齊國國必侵矣方必見國之侵也不若先死請絶頸以白晏子逡巡而退因自殺也公聞之大駭乘馳而自追晏子及之郊請而反之晏子不得已而反之聞北郭子之以死白已也太息而嘆曰嬰不肖罪過固其所也而士以身明之哀哉晉陽秋曰泰始四年七月立常平倉豐則糴儉則糶以利民也管子曰錯國不傾之地積不涸之倉藏不竭之府注不涸之倉言務五榖也述征記曰東城二石橋舊於王城之東北開渠引洛水名曰陽渠東流經洛陽於城之東南然後北回通運至建春門以輸常滿倉永嘉郡記曰青田溪發源太湖湖是白土無復細石中生蘊藻冬天水熱如湯故衆魚歸之名為魚倉益州記曰今成都縣東有頽城毀垣土人云古白帝倉也異苑曰餘姚縣倉封閉完密而年年輒大損耗是富陽縣桓王陵上雙石龜所食即斫毀龜口於是無復虧減三輔故事曰漢大將軍周亞夫軍於細柳今石激是也石激西有細柳倉城東嘉禾倉老子曰田甚蕪倉甚虛管子曰倉廩實知禮節又曰不務地利則倉不盈莊子曰諸中國之在海內不似稊米之在太倉乎韓子曰韓昭侯之時黍種貴昭侯令人覆廩吏果竊黍種糶之淮南子曰近敖倉者不為之多飯期滿腹而已鹽鐵論曰胸奴因山谷為城池水草為倉廩地理志曰敖倉在河南廣武山鄭國所置漢王與項羽爭天下運敖倉之粟囷西京雜記曰曹元理善算友人陳廣漢有二囷忘其石數後算缺一斗乃有鼠大如斗在其中吳志曰周瑜過魯肅求資肅有米三千石乃指一囷與之續異記曰晉陵無錫尉嚴無欲貯榖後開乃成蛇以草焚之便貧詩曰胡取禾三百囷兮庾韓詩外傳曰王者藏於天下諸侯藏於百姓農夫藏於囷庾商賈藏於篋笥毛詩曰曾孫之庾如坻如京注曰庾露積也
