body:
  text: 火部三燈漢書曰王莽好變改制度政令煩多莽常御燈火至明東觀漢記曰上從長安東歸過汧幸祭遵營士衆作黃門武樂至夜御燈火晉書曰溫嶠往武昌至牛渚磯水深不可測世云其下多怪物嶠遂燬犀燈而照之須臾見水中奇形異狀或乘車馬著赤衣者嶠其夜夢人謂曰與君幽明道隔何故相照意甚惡至鎮踰旬而卒唐書曰皇甫無逸為益州長史嘗夜宿人家遇燈炷盡主人將續之無逸抽佩刀斷衣帶以為炷其廉分如此又曰睿宗好樂聽之忘倦玄宗又善音律先天二年正月望日胡僧娑陀婆請夜開門燃百千燈睿宗御延喜門觀樂凡經四日從大酺睿宗御安福門樓觀百司酺宴以夜繼晝經月餘日河武內傳曰西王母遣使謂帝曰七月七日當暫來帝日掃除宮內然九光之燈荀采傳曰采荀爽女為陰瑜妻而夫早亡爽逼嫁與太原郭奕采入郭氏室暮乃去帷帳建四燈斂衽正坐郭氏不敢逼三秦記曰始皇墓中燃鯨魚膏為燈鄴中記曰石虎正平聲會於殿前設百二十枝燈以鐵為之西京雜記曰長安巧人丁緩者為帕滿燈七龍五鳳雜以芙蓉蓮藕之奇又曰高祖初入咸陽宮周行府庫金玉珍寶不可稱言其尤異者有青玉枝燈高七尺五寸下作蟠螭以口銜燈燈燃則鱗甲皆動炳爛若列星而盈室焉洞冥記曰漢武帝燃芳苡燈於閣上有白鳳黑龍馵足來戲於閣上芳苡草出奔盧國又曰丹豹髓白鳳膏磨青錫為屑以淳蘇油和之照於神壇夜暴雨燈光不滅羊頭山記曰漢有常滿燈不添常滿光明不絶也法顯山記曰舍衛國精舍道東有外道天寺名曰影覆與佛論議處精舍夾道相對亦高六丈許所以名影覆者日在西時佛精舍影則照外道天寺日在東時外道天寺影比映不得照佛精舍也外道常遣人守天寺灑掃燒香燃燈供養至明旦其燈輒移在佛精舍中娑羅門恚言諸沙門取我燈自供養佛婆羅門於夜自伺候見其所天神持燈繞佛精舍三匝供養佛己忽然不見婆羅門乃知佛神即捨家入道王子年拾遺記曰董偃常臥於室中以書石為榻高三尺廣六尺石體甚輕郅支國所獻也上設紫琉璃屏風列金麻油燭如屈龍形雜采為之侍人唯見燈明以言無礙乃於屏風外扇之偃曰玉石豈扇而後消涼侍者乃以手摸之知有屏風之礙又曰穆王東至大𣟵晉奇之谷起春霄之宮集諸方士問佛道法時已將夜聞殷然雷聲伏蟄皆動俄而有流光照於宮內王更設常生之燈一名恆明亦有鳳腦之燈綴水蓮冰谷之花上去燈七八尺不欲使煙光遠照也西王母來乘翠鳳之輦共王飲會又曰燕昭王時海人乘霞舟以雕壺盛升龍膏以獻昭王王坐通雲之堂亦曰通霞臺以龍膏為燈耀百里煙色丹紫國人望之咸言瑞光遙加拜之以火浣布為纏炷光滿於宮內孫子曰火光明于天者燈燭何施焉符子曰不安其昧而樂其明也是猶夕蛾去暗赴燈而死秦子曰智惠多則引血氣如燈火消暗膏炷大而朗朗則膏消炷小而暗暗則息膏至久也説苑曰楚莊王賜群臣酒日暮燈燭既滅乃有人引美人者美人挽絶其冠纓桓談新論曰余與劉伯師夜坐燈中脂炷燋禿將滅余謂伯師曰人衰老亦如彼禿炷矣伯師曰人衰老應自續余曰益性可使白髮更生黑至壽極亦死耳王朗秦故事曰五華燈樹正月朔朝賀設於下三階之前月照星明雖夜猶晝淮南萬畢術曰取蚢脂為燈置火中即見諸物語林曰嵇中散燈下彈琴忽有一人面甚小斯須轉大遂長丈餘單衣革帶嵇視之既熟吹其燈滅曰吾恥與鬼魅爭光燭記曰侍坐於所尊敬燭至起異晝夜又曰燭不見跋跋本燭盡則去之嫌若燼多有獻倦也又曰曾子寢疾童子隅坐而執燭隅坐不與成人並也又曰孔子曰嫁女之家三夜不息燭思相離也親骨肉也又曰祭之曰泛掃反道鄉為田燭反道剗令新土在上田燭田首為燭又曰凡飲酒為獻主者執燭抱燋主人親執燭敬賓示不倦也執燭不讓不辭不歌以燭繼盡禮殺又曰禮者何也即事之治也君子有其事必有其禮治國而無禮譬如終夜有求於幽室之中非燭何見又曰女子夜行以燭無燭則止周禮曰司几筵掌吉凶之事祖廟之中汥與執燭吉事四時祭也凶事后王喪朝于祖廟之奠又曰凡邦之大事共墳燭庭燎庭燎故書墳為蕡鄭司農云蕡燭麻燭也玄謂墳大也樹於門外曰大燭於門內曰庭燎皆所以照衆為明也儀禮曰主人爵辨纁裳從車二乘執燭前焉大夫已上親迎執燭前焉又曰霄則庶子執燭於阼階上司宮執燭於西階上旬人執燭於庭中閽人執燭於門外尚書大傳曰后夫人將侍君前息燭後舉燭戰國策曰甘茂去秦之齊出門遇蘇子曰君聞夫江上夜女乎夫江上夜女有家貧無燭者夜女相與欲去之無燭者曰女以無燭之故常先至掃室布席何愛東壁上餘光照西壁者幸以賜女何為去我諸女以為然而留之今臣棄逐於秦而出關為足下掃室布席幸無我逐也蘇子曰善史記曰始皇冢中以人膏為燭謝承後漢書曰巴秪為楊州刺史與客坐暗瞑之中不燃官燭晉書曰周顗弟嵩嘗因酒瞑目謂顗日君才不及弟何乃橫得重名以所執蠟燭投之顗神色無忤徐曰阿奴火攻固出下策耳齊書曰竟陵王子良常集學士刻燭為詩四韻者具刻一寸以此為奇蕭文琛曰燒一寸濁為四韻詩何難之有乃與丘楷江洪共打銅鉢為五韻詩響滅皆可觀覽後魏書曰高祖嘗幸清徽堂命黃門郎崔光鄴郭雅邢巒崔休等賦詩言志燭至公卿辭退高祖曰燭至辭退無同姓之禮在夜載考宗族之義卿等且還朕與諸王宗室欲成此夜飲北齊書曰郎茂年十五師事國子博士河間權會受詩易三禮玄象刑名之學至忘寢食家人恐成病恆節其燭唐書曰劉沔為忠武小校從李光顏討淮西為捉生將前後與賊血戰鋒刃所傷幾死者數四嘗傷重臥草中月黑不知歸路昏然而睡夢人授之雙燭曰子方大貴此行無患可持而還既行然有雙光在前自後破虜危難每行嘗有此光及罷鎮後雙光遂息又曰柳公權充翰林侍書學士每居堂召對繼燭見跋語猶未盡不欲取外宮人以蠟淚揉紙繼之會稽典録曰盛吉拜廷尉吉性多仁恕務在寬矜每至冬月罪囚當斷其妻執燭吉手持丹筆夫妻相對垂泣又曰陳修字奉遷鳥傷人也為豫章太守修性清潔履約恭儉十日一炊不然官燭神仙傳曰漢章帝問劉馮曰殿下有怪常著朱衣被髮持燭相隨而走為可劾否馮曰可帝因使人偽為之馮以符擲之數人頓地帝驚曰以相試耳乃解之列女傳曰齊女徐吾者東海上貧婦人與其鄰婦李吾之屬合燭夜績徐吾最貧而無燭李吾曰徐吾燭數不屬請無與夜作吾曰妾以貧故起常先灑掃陳席以待來者今一室之中益一人燭不為益明去一人燭不為益暗何愛餘光莫之能應遂復與夜績西京雜記曰閩越王獻高帝石密五斛密燭二百枝又曰匡衡勤而無燭鄰舍有燭乃穿壁引其光以書映光而讀矣王子年拾遺記曰融皋西有銷明之草叢生千葉陰覆地夜視之如列燭晝則滅矣又曰崑崙者是西方日彌山對七星之下出碧海之中夜望水上光焰如燭抱朴子曰慕惡者猶宵蟲之赴明燭焉又曰夫明燭宵舉則飛蟲群起又曰有自無而生焉形須神而立焉有者無之宮形者神之宅故譬之於堤堤壞則水不留方之於燭燭盡則火不居也文子曰鳴鐸以聲自毀膏燭以明自銷韓子曰鄭人有遺燕相國書者夜書火不明因謂持燭者曰舉燭而設書舉燭非書意也燕相國受書而悅之曰舉燭者高明高明者舉賢而任之國以治也淮南子曰天下時有盲妄自失之患此高燭之類也火愈燃而消愈亟愈益也亟疾也説苑曰晉平公問於師曠曰吾年七十欲學恐已暮矣師曠曰臣聞少而學者如日出之陽壯而學者如日中之光老而學者如秉燭之明老而不學昧昧如夜行焉秉燭之明孰與昧行公曰善世説曰君夫王愷字以粘糖澳釜石季倫以蠟燭灼炊玄晏春秋曰子讀漢書凶奴傳不識撑黎孤塗之字有故奴執燭顧而問之奴曰撑黎天子也言胸奴之號單于猶漢人有天子也豫於是乎曠然發悟潛夫論曰隅燭之施明於幽室也前燭則盡照之後燭而益明二者相因而成大火論衡曰太公陰謀書稱武王伐紂兵至牧野晨舉脂燭權掩不備地鏡圖曰相玉見美女子載燭行壇陰從其所出入處尋之石中有玉矣蔡氏化清論曰伏龍非我馬白日非我燭藏之默之保此小朴楚辭曰室中之觀多珍怪蘭膏明燭華容備古詩曰人生不滿百常懷千載憂晝短苦夜長何不秉燭遊魏明帝樂府詩曰晝作不輟手猛燭繼望舒劉禎詩曰天地無期竟民生甚局促為稱百年壽誰能應此録低昂倏忽去炯若風中燭傅玄燭銘曰煌煌丹燭焰焰飛光取則龍景擬象扶桑照彼玄夜炳若朝陽焚形監世無隱不彰炬東觀漢記曰光武平河北任光伯卿暮入堂陽懸騎皆炬火天地赫然盡赤堂陽驚怖即夜降魏志曰滿寵字伯寧以前將軍都督楊州諸軍事孫權自將號十萬至合淝新城寵馳往赴募壯士十數人折松為炬灌以麻油從上風放火燒賊攻具射殺權弟泰賊於是引退宋書曰王懿字仲德太原人也符氏之敗仲德年十七與兄睿同起義兵與慕容垂戰敗仲德被瘡退走至滑臺復為翟遼所留使為將師仲德志欲南歸乃棄遼奔太山遼追騎甚急夜行忽見前有猛炬導之乘火夜行百里許得以免難六韜曰三軍有行臨領士衆旦則有雲梯遠望夜則設雲火萬炬淮南子曰亡者不敢夜揭炬為人見也又曰寧戚欲干齊桓公困窮無以自達於是為商任車任載也商於齊暮至於郭門外桓公郊迎客夜開門爝火甚盛爝火炬火戚飯牛車下望見桓公擊牛角而疾商歌汝南先賢傳曰許嘉字德珍事郡功曹為小吏常持劍侍功曹月日朝并持炬嘉於是忿然曰男兒為吏不免賤役投火於池以劍帶槐樹趍詣府門主者問其故對曰本去芻牧來入大朝觀庠序之化今右手持劍左手把炬此等之事乞得受罰而歸神仙傳曰王遙字伯遼夜大雨晦冥遙出行不霑雨有炬火常在於前英雄記曰公孫瓚與破虜校尉鄒靖俱追胡靖為所圍瓚回師奔救胡即破散解靖之圍乘勝窮追日入之後把炬逐北又曰周瑜敗曹操於赤壁密使輕船走舸百餘艘艘有五十人拖掉人持炬火
