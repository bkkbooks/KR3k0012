body:
  text: 道部四天仙天仙品日飛行雲中神化輕舉以為天仙亦云飛仙神仙衆真戒經曰大方諸山對會稽之東上有天仙宮室金玉雜為棟宇金根經曰天闕上有層樓玉臺主衆仙出入之所也玉清刻石隱銘曰佩玉帝隱文者得為上仙戒文經曰天西北有仙堂差次職署則度名著九宮五斗仙府中天上有東西南北及中央也皆有石城應其方位百官曹局皆在斗中列紀後聖列紀曰若斗中有玄玉籙籍者皆為上仙登真隱訣曰三清九宮並有僚屬例左勝於右其高揔稱曰道君次真人真公真卿其中有御史玉郎諸小號官位甚多也女真則稱元君夫人其名仙夫人之秩比仙公也夫人亦隨仙之大小男女皆取所治處以為署號並有左右凡稱太上者皆一宮之所尊又有太清右仙公蓬萊左仙公太極仙侯真伯仙監仙郎仙賓皇民譜録曰自三象明曜已來至于纍億劫會天地成敗非可勝載數極唐堯是為小劫丁亥之後甲申之年陽九百六之氣離合壬辰之始數有九周至庚子之年赤星見于東方白彗見于月窟唐堯之後四十六丁亥是小劫之周又五十五丁亥至壬辰癸巳是大劫之周也六合冥一二道盈虧時運周劫始轉一仙階金根下經曰有學仙品目進敘退降簿録侍仙玉晨之典祀集仙籙曰後漢南陽公主降駙馬都尉王咸公主素尚至道屬漢末亂離謂咸曰伹當自保必可延生若碌碌隨時與世進退恐不免乖離之苦奔迫之患也咸黽俯世利未從其言公主遂入華陰山長往咸入山追之無見忽於嶺上見朱履一雙前取之化為石謂其山為公主峰又曰張正禮漢末在衡山學道服黃精受西城君虹景丹患藥之難得至廣州為道士遂得內外洞徹砂兼修守一之法仙去真詰曰章震南郡人少學經晝周幽王時人而常歎曰人生世閒日失一日去生轉遠乃著道書百餘篇精於五行演其微妙以養性治病為旨後入崆峒山仙去又曰王遠字方平東海人舉孝廉除郎中纍遷至中散大夫博學尢明天文圖讖河洛之要逆知天下盛衰之期漢桓帝嗣位聞之連詔不出使郡國逼載以至京師但低頭閉口不答詔乃題宮門板四百餘字皆說方來帝惡之歸鄉里同郡故太尉公陳耽為方平駕道室旦夕事之方平在耽家四十餘年後語耽云吾當去明日日中發至明日果卒耽知仙去曰先生捨我矣又曰嚴青會稽人家貧常於山中作炭忽有一人與青語不知其異人也臨別以一卷書與青曰汝得長生故以相授當以潔器盛之置于高處青受之後得其術入霍山仙去又曰張陵字輔漢沛國豐人也本大儒晚學長生之道得九鼎丹經聞蜀中多名山乃入嗚鵠山著道書二十餘篇仙去又曰趙廣信陽城人魏末來渡江入剡小白山中學道受左慈玄中之道并徹視法如此積年周行郡國或賣藥人莫知也多來都下市丹砂作九華丹仙去又曰郭景世晉初學道於廬江灊山中受孟德然口訣兼服胡麻玄丹仙去矣又曰趙伯威東郡人也少學於邯鄲張先生晚在中缶受玉珮金璫經道成仙去籍并記學道者又曰李方回晉武帝時人也學道在華山受管成子蒸丹餌朮法又受蘇門周壽陵丹霞之法五十年清心內視仙去又曰李修著書四十篇名曰道源其書曰弱能制強陰能蔽陽常若臨深履危御奔乘朽長生之道也年四百歲顏色不衰後仙去劉向列仙傳曰馬師皇者黃帝馬師後數有病龍出於水治之一旦仙去又曰王子喬周靈王太子晉也好吹笙作鳳鳴浮丘公接上嵩山三十餘年仙去葛洪神仙傳曰蘇仙公名林字子玄周武王時人也家濮陽曲水林少孤以仁孝聞貧常自牧牛得道母食思鮓仙公以匕著置器中攜錢去即以鮓至母曰便縣有魚去此百餘里汝欺我哉仙公跪曰不妄明日舅至云昨見仙公便縣市鮓母方駭其神異後仙去有白鶴來止郡城東北樓以爪畫樓板似漆書云城郭是人民非于今仙公故第猶在丁令威亦如此又曰沈文泰者九疑人得紅泉神丹法去土符還年之道服之甚效欲之崑崙留息積年以傳李文淵曰土符不去服藥行道無益也文淵遂受其祕要後亦仙去令以竹根汁煮丹及黃神去三尸法又曰沉羲吳郡人學道於蜀能治病救人甚有恩德後遇羽衣持節人以白玉版青玉丹書授羲羲不能讀須臾大霧霧解失其人羲還後仙去又曰陳安世京兆人為灌叔本傭稟性慈仁叔本好道有二道人託為書生從叔本遊以觀試之叔本不知其異人也久而益怠書生乃問安世曰爾好道否曰無緣知之曰審好道明日早會道北大樹下安世承言早往無所見曰書生詐我哉三期安世輒早至乃以藥授安世後仙去又曰吳睦長安人少為縣吏掌局枉剋人民訟之睦逃去入山林飢纍日行至石室遇孫先生令學種黍及胡麻掃除驅使經四年先生遂授其道後服丹仙去又曰董威輦不知何許人晉武帝末在洛陽白社中寢息土上衣服籃縷常吞一石子經日不食或市乞傭作人或往觀之亦不與言時或著詩莫知所終又曰蕭史秦繆公時人善吹蕭能致孔雀白鵠公女字弄玉好之以妻焉遂教弄玉作鳳鳴居十數年鳳凰來止公為作鳳臺夫婦止其上數年仙去故秦人為作鳳女祠雍宮世有蕭聲又曰河上公莫知姓名也漢孝景時結草菴於河上帝讀老子經景帝好其言有所不解聞公以問之以素書二卷與帝曰讀此析疑勿示於非人公後仙去又曰黃子陽少知長生之道隱博落山中九十餘年伹食桃飲石泉後逢司馬季主季主以導仙八方與之遂度世仙去又曰王生陽城人居壺谷中不知時漢武帝登嵩山東方朔等從忽見一神人長丈餘帝禮面問之曰某九疑山人也聞中嶽有石菖蒲一寸九節食可長生故來採之忽失神人帝遂採服之帝性熱煩悶不快從官皆服皆能遲久惟王生聞神人教服遂採食之仙去又曰劉根字君安京兆長安人少明五經漢成帝時人也入嵩山石室峻絶之處嘗曰上藥有九轉還丹太一金液次有雲母雄黃之屬亦可長生次乃草木之藥能治病益氣上可數百歲下即全其所稟而已必欲長生即先定心志除嗜欲乃可授神方五色篇根後入雞頭山仙去又曰陰長生新野人後漢陰皇后之屬籍也少居富貴不好榮利知馬明生得度世之術乃尋求之遂相見執御者之禮事之十餘年不懈明生曰子真得道矣乃入青城山授以太清神丹經告別後於平都山仙去風俗通曰漢明帝時尚書郎王喬為葉令月朔常詣朝堂明帝知其來而無車騎密令太史候望言其臨至時常有雙鳧從東南飛來使因見鳧舉羅得一舄使尚方識之乃四年所賜尚書官履也每朝葉門下鼓不擊自鳴聞於京師後天上乃下一玉棺於廳前喬曰天帝召我沐浴寢其中蓋便上覆葬於城東土自成墳百姓為立祠號葉君祠三洞珠囊曰壺公謝元歷陽人賣藥於市不二價治病皆愈語人曰服此藥必吐某物某日當愈事無不效日收錢數萬施市內貧乏飢凍者費長房為市令知其人後詣公公攜長房去授以治病之術令還壺公後仙去戴公柏有太微黃書十餘卷即壺公之師也又曰樂子長齊人也少好道到霍林山服巨勝赤松散方去仙又曰衛叔卿中山人服雲母子度世入山見父叔卿語曰吾齊書室西北墉大柱下有玉函中有書取而按合服之度世歸果如言餌五色雲母仙去又曰魏伯陽者吳人也好道不仕封己養高後入山餌神丹仙去撰參同契其說以周易爻象論作丹之意而世不知神丹之事多作陰陽注之殊失其旨又曰尹軌字公度太原人博極群書晚乃學道常服黃精年百餘歲言天下盛衰安危吉凶未嘗不效入太和山仙去又曰東郭延年者山陽人也服靈飛散能在暗室中夜書又身生光遠照小物見其采色一旦數十人乘虎豹來迎之延年遂詣崑崙山仙去又曰王真上黨人七十九乃學道徐行若飛有兼人之力郤元節事真十餘年真以蒸丹小餌法授之容常不衰鄉人計真之年以四百餘歲後登女几山仙去又曰平中節河東人晉以羯胡亂華遂隱蒼梧山受宋君存心之道積四十五年精思不懈體有真氣後仙去又曰葛玄善於變幻拙於用身初在長山近入蓋竹亦能乘虎使鬼但未得受職耳常與謝稚堅黃子陽郭聲子相隨也葛玄是抱朴子從祖即鄭思遠之師也時人莫測所處傳言東海中仙人寄書呼為仙公又曰魯妙典者九疑山女道士也生而好道忽謂母曰人之上壽所傳得者稀喜樂悲哀日以相害況埋沒真性混于流浴乎有道士過其門授以大洞黃庭經謂曰所患人不能知知不能修修不能精精不能久不惟有玄科之責亦將苦報無窮也妙典奉其言入九疑山纍有魔試介特不撓山上一石盆中有泉用之不竭又有大鐵臼不知何虛來今並在山中石壇上宛然有仙履跡及古鏡一廣三尺古鍾一形如偃月在無為觀中妙典後仙去又曰謝自然女道士也果州人詞氣高異其家在大方山下頂有古像老君其形自然因拜禮不願下山母從之乃遷居山頂自此常誦道德經黃庭內篇於開元觀受紫虛寶籙於金泉山居之山有石壇煙籮修竹一十三年晝夜不寐兩膝上忽有印似小於人閒官印四壖若朱有古篆六字粲如白玉忽於金泉道場有雲氣遮匝一川散漫彌久仙去其金泉碑略曰天上有白玉堂壁上列高仙真仙之名如人閒壁記時有朱書注其字下曰降世為某官某職又自然於所居堂東壁上書數字皆道德之意真跡有焉又曰王奉仙宣州當塗縣民家女也得其道嘗以忠孝正直之道清淨儉約之言修身密行之要訓于人故遠近瞻仰金玉委前棄而不顧後入洞庭山無病而化有雲鶴異香之瑞仙去
