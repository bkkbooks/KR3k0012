body:
  text: 人事部八十一貞女中唐書曰魏衡妻王氏梓州郪人也武德初薛仁果舊將旁企地侵掠梁部因獲王氏逼而妻之後企地漸強盛衡謀以城應賊企地領衆將趍梁州未至數里飲酒醉臥王氏取其佩刀斬之攜其首入城賊衆乃散高祖大悅封為崇義大夫人又曰絳州孝女衛氏字無忌夏縣人也初其父為鄉人衛長則所殺無忌時年六歲母又改嫁更無弟兄及長常思復讎無忌從伯嘗設宴為樂長則時亦預坐無忌以搏擊殺之既而詣吏稱父讎既報請就刑戮巡察大使黃門侍郎褚遂良以聞太宗嘉其孝烈特令免罪又曰鄒侍徵妻薄氏待徵大曆中為常州江陰縣尉其妻為海賊所掠薄氏守節出待徵官告於懷中託付村人使謂待徵曰義不受辱乃投江而死賊退潮落待征於江岸得妻尸焉江左文士多著節婦文以紀之又曰奉天縣竇升朝二女伯娘仲娘雖長於村野而幼有志操住與邠州接界永泰中草賊數千人持兵刃入其村落行剽劫聞二女有容色姊年十九妹年十六藏於巖窟間賊徒擬為逼辱乃先曳伯娘出行數十步又曳仲娘出賊相顧自慰行臨深谷伯娘曰我豈受賊污辱乃投之於谷賊方驚駭仲娘又投於谷谷深數百尺姊尋卒仲娘腳折面破血流被體氣絶良久而蘇賊義而去又曰崔玄暐博陵安平人也父行謹為胡蘇令本名畢以字下體有則天祖諱乃改為玄暐少有學行深為叔父祕書監行功所器重龍朔中舉明經纍補庫部員外郎其母盧氏嘗誡之曰吾見姨兄屯田郎中辛玄馭云兒子從官者有人來云貧乏能有立此是好消息若聞資貨充足衣馬輕肥此是惡消息吾嘗重此言以為確論比見親表中仕官者多將錢物上其父母但知喜悅竟不問此從何而來必是祿俸餘資誡以善事如其非理所得此與盜賊何別縱無大咎獨不內愧於心孟母不受魚鮓之饋蓋為此也汝今坐食祿俸榮幸已多若其不能忠清何以戴天履地孔子云雖日用三牲之飬猶為不孝又曰父母唯其疾之憂特宜修身潔己勿纍吾此意也玄暐遵奉母氏教誡以清謹見稱又曰于琮尚廣德公主琮為黃寇所害而赦公主主視琮受禍為賊曰妾李氏女也義不獨存願與于公并命賊不許公主入室自經而死又曰幽州兵亂殺判官韋雍雍妻蕭氏聞難號呼專執夫袂左右格去以死不從及雍臨刃蕭氏泣而告曰妾不幸年少義不茍活今日之事願先就死執刃者斷其臂詞氣不撓雖凶捍圜視無不傷歎其夕蕭氏亦卒趙畢吳越春秋曰子胥至吳乞食至於溧陽溧陽有女子浣紗瀨水之上簞中有少飯子胥遇見長跪而請之曰夫人豈可乞一餐乎女子曰妾獨與母居年三十不嫁飯不可得也子胥曰夫人賑窮者少飯有何嫌乎女知非恆人言曰妾豈可逆人情乎即發其簞飯清其壺漿長跪而與子胥子胥去顧見女子自沉孔演漢魏春秋曰龐濟外祖父酒泉趙君安為同縣李壽所殺濟舅兄弟三人同時病死壽家喜相賀濟母娥自傷讎不報乃推車袖劍白日刺壽於都亭前訖徐詣縣顏色不變曰父讎已報請受戮祿福長尹嘉解印綬縱娥娥不肯去遂強載還會赦得免州郡莫不嗟歎嘉其烈義刊石以表其閭張勃吳録曰吳入郢也自王以下位班處宮而妻其室次及伯嬴伯嬴者昭王之也伯嬴操刃曰公侯一國之儀表也有失則其邦危亂夫婦之禮人倫之始王教之端若君王棄儀表則無以臨民妾犯非禮則無以自存貪生受辱固不如死王乃止和苞漢趙記曰今上殺晉散騎常侍梁緯召妻辛氏伏地大哭仰白今上曰妾聞女不再醮男以義烈聞妾夫已死理無獨生乞就辟有司地下以事舅姑且婦人再娉明公亦安用哉遂號哭不止上曰貞婦也其任之亦自殺又曰魯陽侯王廣字廣之為西楊州刺史晉末藂衆避世為蠻梅芳扇動山夷圍廣城陷蠻囚廣將詣芳廣女有美色芳引入甚有寵入經一旬王伺芳睡引刀斬芳芳驚起曰何故反耶王罵曰蠻畜我欲誅反賊何謂我反乎吾聞父仇不同天母仇不同地汝反逆無狀害我父母而復無禮凌人吾所以不死者欲誅汝耳今死自吾分不待汝殺我但恨不得梟汝首於通逵以塞大恥辭氣猛厲色無變容乃自殺時年十五劉義慶幽明録曰武昌陽新縣北山上有望夫石狀若人立者傳云昔有貞婦其夫從役遠赴國難婦攜弱子餞送此山立望而死形化為石列女傳曰息夫人者息君之夫人伐息破之虜其君使守門將其夫人而納之於宮楚王出遊夫人遂出見息君謂之曰人生要一死而已何自苦乃作詩曰穀則異室死則同穴謂豫不信有如皎日息君止之夫人不聽遂自殺息君亦自殺又曰安定陳仲妻者同郡張叔明之妹名芝字李張年十四適仲期年而寡執節不嫁叔明從軍芝與二嫂沒賊恐見侵略而相謂曰婦人以不汙身為高不虧節為美豈可委身待辱哉於是自刺二嫂既死芝獨不死叔明言於將軍耿弇耿弇以駙馬負芝芝曰女子亡之餘汙將軍服乘不可也弇奇其言更以他馬負芝至營為致醫藥因乃得全郡表其閭九十壽終又曰譙國曹文叔妻者同郡夏侯文寧之女字令女文叔早死無子喪畢斷髮自誓不二其後家欲嫁之又截兩耳依文叔從兄爽爽後被誅文寧上書與曹氏絶婚復欲嫁之乃割鼻其母謂曰曹氏夷滅已盡守此欲為譙乎令女曰仁者不以盛衰改節義者不以存亡易心曹氏前盛尚欲保終況今衰滅何忍棄之太傅司馬公聞而嘉嘆聽乞子為曹氏後又曰吳孫奇妻者廣陵范慎女名姬十八配奇一年而奇亡慎以姬少寡無子起還其家姬不肯歸迎者以父命迫之姬遂操刀割耳及鼻曰父迎我者不過以我年少色美今已殘矣行將焉之於是迎者空反又曰丹陽華穆妻者下邳劉方之女字桃樹生一男而早亡吳丁諝相與反知名之士家將嫁許焉桃樹聞之乃操刀割耳其子又亡樹桃安身守正動不踰禮又曰吳沈伯陽妻者顧文宣之女字昭君早寡無嗣盡禮供養其父陰許人姑聞之而哭昭君乃引刀剪髮割兩耳以明其志又曰吳許升妻呂氏之女名榮升遊誕博戲不治操行榮躬勤家業以養其姑勸升學問未嘗不垂淚而言榮父疾升呼榮欲改嫁之榮曰命之所遭義無離二終不肯歸升後感悔尋師遠學四年乃歸遂致名譽為州所辟遇劫害歲餘姑亡夫族多欲娉之誓不肯嫁後黃巾賊欲犯之榮踰垣而走賊拔刀追榮曰從我則生不從立死榮曰義不畏死而見虜辱也賊遂殺之又曰河南貞義者樂羊子之妻羊子出學七年不歸鄰人欲犯貞義而劫其姑貞義操刀而出鄰人曰從者可不從者殺汝姑貞義仰天而歎以刀刎頸而死太守以大夫葬之號曰貞義皇甫謐列女傳曰漢中趙嵩妻者同郡張氏之女也字禮修遭賊嵩死君難理修以碧塗面亂髮稱病懷刀在身意氣列決賊不迫也叔父矜其年少又世方喪亂欲更嫁禮修慷慨以死為誓又曰丹陽羅靜者廣德羅勤之女為同縣朱曠所婚禮未成勤遇疫疾喪沒鄰比斷絶曠觸冒經營尋復病亡靜感其義遂誓不嫁與弟妹共居求者過十餘志無傾移有楊祚者多將人衆自往納幣靜乃逃竄祚劫其弟妹靜懼為祚所害乃出見之曰實感朱曠為妾父而死是以託身亡者自誓不二辛苦之人願君哀而舍之如其不然請守之以死祚乃舍之靜守純固年六十餘卒又曰蜀景奇妻者羅氏之女字貢羅奇亡無嗣貢羅專心供養父青以許同郡宰詩貢羅與父母書陳其情志曆年不歸後青使詩白州告縣發遣貢羅乃由徑道詣州自訴言意慷慨請死不從州嘉而許焉貢羅恐詩於道路迫脅乃請吏兵自衛還家執義終身又曰犍為相登妻者周氏之女名度適登一年而寡牢令吳厚因人問度心執匪石引刀截髮縣長吏復遣媒欲娉度曰前已斷髮謂足表心何誤復有斯言哉取刀欲割鼻左右救止表其閭又曰廣漢馮季宰妻者季氏之女名珥字進娥早寡無嗣奉飬繼姑及宰兄顯守心純固以義自防珥母愍其姑苦陰有所許珥斷髮自明遂乞飬男女各一率道有法鄉人稱之又曰廣漢王輔妻彭氏之女也名非輔遊學數年遂卒京師迎喪葬訖事姑孝敬彌篤非叔父以許蘇孟非叩心泣血訴情九族猶不見聽乃剪髮諸府乞終供養遂乞養子靜居年踰七十而卒又曰沛國劉長卿妻者同郡桓始春之女少有名於桓宗嫁於劉氏生一男字玉玉五歲而長卿卒懼見誘嫁既不歸寧兄弟時往防漸遠疑言不及外玉年十五死其弟會喪援刀割耳明己不二在喪側者無不感傷宗婦謂之曰家未有相嫁之計若其有也徐可因姊妹以喻意何貴義輕身之甚耶答曰昔我君五更學為儒宗尊為帝師歷世不替以忠孝顯女以貞順稱是以懼忝諸姑或以我年未衰又喪子卒迫之間非所能防豈可不豫見其意哉郡表其閭號曰景行義桓皇甫謐列女傳曰沛公孫去病妻者同郡戴元世之女既嫁久而無子謂其夫曰妾不才得奉巾櫛歷年無嗣禮有七出請願受訣以其夫不許復進曰福莫大於昌熾禍莫大於絶嗣君不忍見遣當更廣室夫復不肯夫死服除父母欲嫁之女遂操刀割鼻郡表其閭又曰梁夏文生妻者沛國劉景賓之女名娥生一女而寡娥誓不再嫁父以配同郡衡氏逼迫入門娥謂衡氏曰妾聞婦人不改嫁越義失節妾所不為君可見遣衡氏曰相取有媒禮何遣之有衡氏妻服未闋娥因數之曰君衰麻在身犯禮納室雖顏之厚奈相鼠何妾必死不為君妻相留不知辱乎奮衣而出衡氏不敢強留父復以許臨睢倪氏強扶上船俄陽不憂書與女別乃以刀割耳鼻曰所以不死者老姑在堂孤女尚幼故耳執義終身
