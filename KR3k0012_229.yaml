body:
  text: 職官部二十六敘卿韋昭辨釋名曰卿慶也言萬國皆慶賴之也帝王世紀曰九卿者所以參三公也白虎通曰卿章也善明理也韋昭辨釋名曰漢置十二卿一曰太常二曰太僕三日太衛尉四曰光祿五曰宗正六曰執金吾七曰大司農八曰少府九曰大鴻臚十曰廷尉十一曰大長秋十二曰將作大匠辨云漢正卿九一曰太常二曰光祿勳三曰衛尉四曰太僕五曰廷尉六曰鴻臚七曰宗正八曰司農九曰少府是為九卿通典曰後漢九卿而分屬三司太常光祿勳衛尉三卿並太常所部太卿廷尉大鴻臚三卿並司徒所部宗正大司農少府三卿並司空所部尚書周官曰六卿分職各帥其屬以倡九牧阜成兆民六卿各帥其屬官大夫止治其所分之職倡遵九州牧伯為政大成兆民之性命漢官儀曰卿中秩二千石綬青地桃花三彩又曰衣裳公侯華蟲卿大夫藻火左傳曰齊侯使敬仲為卿辭曰羈旅之臣幸若獲宥宥赦及於寬政赦其不間於教訓而免於罪戾弛於負擔君之惠也所獲多矣敢辱高位以速官謗請以死告以死為誓又曰卿非君命不越境又曰晉搜于被盧命趙衰為卿讓於先軫杜預曰先軫晉下軍之佐原軫周禮曰朝士掌外朝之法左九棘孤卿大夫位焉樹棘以為位者取其赤心而外刺象赤心三刺春秋漢含孳曰故三公象五嶽九卿法河海三公在天法三台九卿法北斗國語曰晉悼公使張老為卿辭曰臣不如魏綘之智能治大官其仁可以利公室若在卿位外內必平漢官曰司馬安巧宦四至九卿謝承後漢書曰李叔諫更始曰夫三公上應台宿九卿下括河內梁書曰武帝天監七年以太常卿加置宗正卿以司農為司農卿三卿是為春卿加置太府卿以少府為少府卿加太僕卿三卿是為夏卿以衛尉卿廷尉卿將作大匠卿三卿是為秋卿以光祿勳為光祿卿大鴻臚為鴻臚卿都水使者為大舟卿三卿是為冬卿凡十三卿皆置丞及功曹主簿北齊書曰以太常光祿衛尉宗正太僕大理鴻臚司農太府是為九寺莊子曰楚昭王迎屠羊説以圭之位馬彪曰諸侯三卿皆執圭説苑曰秦繆公使賈人載鹽於衛賈人買百里奚使將軍至秦繆公觀鹽見百里奚牛肥公問之對曰臣牛食之以時使之不暴是以肥也公知其君子以為上卿又曰九卿者不失四時通於溝渠補隄防種樹木美五榖如是舉以為九卿之事常在於德又曰齊桓公使管仲治國對曰賤不能臨貴桓公以為上卿而國不治對曰貧不能使富桓公賜之齊市租一年而國不治桓公曰何故對曰踈不能成近桓公立以為仲父國大安孔子曰管仲之貴不得此權者亦不能使其君面南而伯矣太常卿六典曰太常卿之職掌邦國禮樂郊廟社稷之事以八音分而理焉一曰郊社二曰太廟三曰諸陵四曰太極五曰鼓吹六曰大醫七曰太卜八曰廩犧揔其屬行其政令尚書堯典曰伯夷汝作秩宗典朕三禮周禮春官曰大宗伯一人掌天地神祇人鬼之禮史記曰高祖滅秦登尊號群臣飲爭功醉或怨妄呼拔劍擊柱上患之於是叔孫通進説遂為綿蕝子悅切野外習之月餘通曰可試觀上使行禮帝輦出房百官執職傳警引諸侯王以下次奉賀莫不震恐肅敬諸侍坐殿上皆伏抑首以尊卑起上壽觴九行謁者言罷御史執法與不儀者趣輒引去竟朝置酒無敢歡譁失禮者於是高祖曰吾今日乃知為皇帝之貴也拜通太常賜金五百斤通因進言曰諸弟子儒生隨臣久矣與共為儀願陛下官之高帝悉以為郎通出皆以五百斤金賜諸生諸生曰叔孫生聖人也知當世務漢書曰太常古官云伯夷秩宗典三禮欲令國家盛大社稷常存故稱太常又曰奉常官掌宗廟禮儀有丞景帝六年更名太常又曰杜業有才能選為太常數言得失不事權貴又曰宣帝地節四年任官為太常坐盜茂陵園中物免又曰武帝元鼎四年酇侯蕭壽成為太常坐犧牲不如令論又孝武帝元朔元年孔臧為太常坐南陵橋壞衣冠道絶免東觀漢記曰周澤少修高節耿介特立好學問治嚴氏春秋門徒數百人隱居山野不汲汲於時俗拜太常果敢數有直言朝廷嘉其清廉後漢書曰桓榮拜太常榮初遭倉卒與族人桓元卿同飢厄而榮講誦不息元卿嗤榮曰但自苦氣力何時復施用乎榮笑不應及為太常元卿歎曰我農家子豈意學之為利乃若是哉乘輿嘗幸太常府令榮坐東西設几杖會百官驃騎將軍東平王蒼以下及榮門生數百人天子親自執業既罷悉以太官供具賜太常家其恩禮若此又曰桓榮及子郁皆為太常初榮受學章句減其煩辭後郁又刪之由是有桓君大小太常章句又曰靈帝欲以羊續為太尉時拜三公者皆輸東園禮錢千萬令中使督之名為左騶騶騎土也其所之往輒迎致禮敬厚加贈賂續乃坐使人於單席舉縕袍以示之曰臣之所資唯斯而巳左騶白之帝不悅以此故不登位而徵為太常又曰楊賜以病罷居無何拜太常詔賜御府衣一襲衣單服具曰襲所服冠幘綬玉壺革帶金錯鉤佩金錯以金間錯其文續後漢書曰張奐字然明拜太常卿奐有清節可否之間強禦不敢奪也該覽群籍古今詳備又百官志曰太常卿每祭祀先奏禮儀及行事則贊天子大射養老喪皆奏其禮儀秩比中二千石華嶠後漢書曰劉愷為太常論議常弘正大義諸儒為之語曰難經伉伉劉太常魏書曰和洽字士陽汝南西平人轉為太常清貧守約至賣田宅以自給明帝聞之加賜榖帛又曰常林從光祿勳為太常晉宣王以林鄉邑耆老每為之拜或謂林曰司馬公貴重君宜且止之林曰司馬公自欲敦長幼之序以為後生之法貴非吾之所制也言者慚而蹜蹜又曰刑顒字子升時人稱德行堂堂刑子升文帝以為太常晉書曰鄭默字思元遷太常山濤欲舉一親為博士見默語曰卿尹翁歸令吾不敢復言謂其柔而能整也又曰張華為太常以太廟屋棟折免官臧榮緒晉書曰咸熙五年詔曰華表字偉容清賢履道內貞外順歷位忠恪言行不玷其以表為太常卿晉起居注曰安帝三年太常臨川王寶啓府舍窄狹不足移家母鍾年高違離靡寧乞還第攝事詔聽之晉中興書曰蔡謨字道明拜太常咸康四年臨軒門下奏非祭祀宴饗則無設樂謨奏宜有金石顯宗納焉臨軒作樂自此始也又曰建元元年詔曰太常職典天地兼掌宗廟其為任也謂重矣是以古今選建未嘗不妙簡時望兼之儒雅會稽王叔履尚清虛志道無倦優遊諷議朕所咨仰其以王領太常本官如故又曰元帝以賀循為太常而散騎常侍如故循以九卿舊不如官唯拜太常而巳中宗踐祚下令曰循冰清玉潔行為俗表加以位處上卿服物蓋身而巳屋裁庇風雨孤常造其廬特以為賜以六尺床席褥并錢二十萬以表至德齊書曰張瓌以雍州刺史拜太常自謂間職武帝曰卿輩未富貴謂人不與既富貴復欲委去之瓌曰陛下御臣等若養馬無事就間廄有事復牽來帝猶怒遂以為散騎常侍北齊書曰趙彥深五歲母傅氏謂之曰家貧兒小何以能濟彥深泣而言曰若天哀矜兒大當仰報傅感其意對之流涕及彥深拜太常卿還不脫朝服先入見母跪陳幼小孤露蒙訓得至於此母子相泣久之然後改服後周書曰長孫紹遠為太常廣召工人制樂器土木絲竹各得其宜唯黃鍾不調紹遠每以為意常因退朝經韓使君佛寺前過浮圖三層之上有鳴鐸焉忽聞其音雅合官調取而配奏方始克諧又曰斛斯徵遷太常卿自魏孝武西遷雅樂廢缺徵博採遺逸稽諸典故創改舊方始備焉又樂有淳音淳于者近代絶無此器或有自蜀得之皆莫之識徵見之曰此錞于也衆弗之信徵遂徵干寶周禮注以芒茼將之其聲極振衆乃歎服徵乃取以合樂焉又曰建六官置太宗伯卿一人掌邦禮以佑皇帝和邦國是為春官唐書曰趙宗儒長慶初為太常有師子樂備五色之方非會朝聘享不作幼君荒誕伶官縱肆中人掌教坊者移牒取之宗歸宰相以宗儒懦怯不事改太子少師又曰崔邠拜太常卿故事太常卿初上大閲四部樂於宮署觀者縱焉邠自私第去帽親導母輿公卿避之文宗以樂府之音鄭衛太甚欲開古樂命王涯詢於舊工取開元時重按之名曰雲韶樂樂曲成涯與太常丞李廓少府監庾丞憲押樂工獻於黎園亭帝按之於會昌殿上悅賜涯等錦綵又曰竇誕為太常奏用音聲博士皆為太樂鼓吹官僚於後彈胡琵琶胡人白胡達竹伯夷積勞計考並至太官自是以聲伎入流品者蓋以百數應劭漢官曰北海周澤為太常恆齊其妻憐其年老瘦弱窺內問之澤大怒以為干齊掾吏扣頭爭之不聽遂收送詔獄并自劾論者非其激發諺曰居代不諧為太常妻一歲三百六十日三百五十九日齊一日不齊醉如泥既作事復低迷漢官典職曰惠帝改太常為奉常景帝復為太常蓋周官宗伯也漢官解詁曰太常社稷郊祀事重職尊故在九卿之首衛宏曰太常主導贊助祭皆平冕七旒玄上纁下華蟲七章漢陵屬三輔太常月一行漢書注顏師古曰太常者王之旌也晝日月焉王有大事則建以行禮官主奉持之故曰奉常後改曰太尊大之義也齊職儀曰太常卿一人品第三秩中二千石銀章綬進賢兩梁冠絳朝服佩水蒼玉王朗云西京太常行陵赤車千乘益部耆舊傳曰趙典字仲經為太常雖身處上卿而布被瓦器梁陸陲為光祿讓太常表曰昔者楚德方盛叔敖濯衣漢道克昌王陽結綬故拜命無辭受爵不讓况宗卿清重歷選所難漢晉巳降莫非素範辭爵則桓郁張奮讓封則丁鴻劉愷潘尼音夷之文雅純深華表之從容退默自此迄茲風流繼軌以臣況之曾無等級陳沈炯為周弘正讓太常表曰臣聞玉舄雕楹不取材於蟠木丹朱繡黼豈襲冕於薜蘿何則適用各有其宜朝野不可一指叔孫之野外定禮資典實刁協之躬為唱引豈易其儀儻九賓闕相對禪失儀責以司存云誰之咎况南史執簡轉見違才君舉必書尤難妄冒
