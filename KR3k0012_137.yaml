body:
  text: 皇親部二漢太上昭靈后詩含神霧曰含始吞赤珠刻曰玉英生皇刻刻漏有玉英文出後赤龍感女媼劉季興春秋握成圖曰執嘉妻含始遊雒池赤珠出刻曰玉英吞此者為王客以其年生劉季為漢皇為王客者為王者所賓客史記曰高祖母媼嘗息大澤之陂夢與神遇時雷電晦冥父太公往視則見蛟龍於上已而有娠遂産高祖帝王世紀曰太上皇名執嘉妃曰媼為昭靈后陳留風俗傳曰沛公起兵野戰喪皇妣于黃鄉天下平定乃使使者以梓宮招魂於幽野於是有丹蛇在水自灑濯入于梓宮其浴處有遺髮故諡曰昭靈后黃鄉今小黃縣也高祖呂皇后漢書曰高祖后呂皇后父呂公單父人也好相人高祖微時呂公見而異之乃以女妻高祖生惠帝魯元公主後漢王得定陶戚夫人愛幸生趙王如意呂后為人剛毅佐高帝定天下高祖崩惠帝立呂后為太后乃令永巷囚戚夫人髡鉗衣赭衣令舂戚夫人舂且歌曰子為王母為虜終日舂薄暮常與死為伍相離三千里當誰使告汝太后聞之大怒曰乃欲倚汝子邪乃召趙王欲誅之使者三反趙相周昌不遣太后召趙相相至長安使人復召趙王王來惠帝慈仁知太后怒自迎趙王灞上入挾趙王與起居飲食數月帝晨出射趙王不能早起太后伺其獨居使持鴆飲之逮帝還趙王死太后遂斷戚夫人手足去眼燻耳飲瘖藥使居鞠域中名曰人彘居數月召惠帝視人彘帝視而問知其戚夫人乃大哭因病歲餘不能起使人請太后曰此非人所為臣為太后子終不能復治天下以此日飲為淫樂不聽政七年而崩立孝惠後宮子為帝太后臨朝稱制后治天下八年病大禍而崩高祖薄皇后漢書曰高祖薄姬文帝母也父吳人秦時與故魏王宗女魏媼通生薄姬魏豹立為王而魏媼內其女於魏宮許負相薄姬當生天子曹參等虜魏主薄姬輸織室詔內後宮歲餘不得幸始姬少時與管夫人趙子兒相愛約曰先貴無相忘已而管趙先幸漢王四年唑河南城皋靈臺此兩美人侍相與笑薄姬初時約漢王問其故兩人俱以實告漢王心悽然憐薄姬是日召欲幸之對曰昨暮夢龍據妾胸上曰是貴徵也吾為汝成之遂幸有娠歲中生文帝高帝幸姬戚夫人之屬呂后怒皆幽之不得出宮而薄姬以希見故出從子之代代王為帝尊為皇太后東觀漢記曰中元元年告祠高廟曰高皇呂后不宜配食薄太姬慈仁孝文皇帝賢明子孫賴福延至于今宜配食地祇高廟今上薄太后尊號為高皇后遷呂太后于園孝惠張皇后漢書曰孝惠張皇后宣平侯敖女也敖尚帝姊魯元公主有女惠帝即位呂太后欲為重親以公主女配帝為皇后欲其生子萬方終無子乃使陽為有身取後宮美人子名之殺其母立所名子為太子惠帝崩太子立為帝呂后崩大臣正之以非孝惠子誅之孝惠后廢處北宮孝文竇皇后漢書曰孝文竇皇后景帝母也呂太后時以良家子選入宮會太后出宮人以賜諸王各五人竇姬家在清河乃求其主者願歸清河而主者誤置於代籍中竇姬泣涕而行及至代代王獨幸竇姬生子文帝立數月公卿請立太子而竇姬為皇后景帝立為皇太后好黃帝老子言景帝及諸竇不得不讀老子以尊其術孝景薄皇后漢書曰孝景薄皇后孝文薄太后家女也景帝立立薄妃為皇后無子無寵立六年薄太后崩皇后廢孝景王皇后漢書曰孝景王皇后武帝母也父仲槐里人初嫁為金王孫婦生一女矣而母臧兒卜筮曰兩女當貴欲倚兩女奪于金氏金氏怒不肯與決乃內太子宮太子幸愛之生三女一男男方在身夢日入其懷中以告太子太子曰此貴徵也景帝即位立為皇后男為太子景帝崩武帝即位為皇太后也孝武陳皇后漢書曰孝武陳皇后長公主嫖女也武帝得立為太子長公主有力取主女為妃及帝即位妃立為皇后擅寵驕貴十餘年而無子聞衛子夫得幸幾死者數焉上愈怒后又挾婦人媚道頗覺元光五年上遂窮治之女子楚服等唑為皇后巫蠱祠祭祝詛大逆無道相連及誅者三百餘人楚服梟首於市退居長門宮司馬相如長門賦序曰孝武皇帝陳皇后得幸頗為妬別在長門宮愁悶悲思聞相如天下工為文奉黃金百斤為相如文君取酒因求解悲愁之辭而相如為頌以奏主上皇后復得親幸孝武衛皇后漢書曰孝武衛皇后字子夫生微賤為平陽主謳者武帝即位數年無子平陽主求良家女子十餘人飾置家帝祓灞上祓除也於灞水上自祓除今三月上已祓禊也還過平陽主主見所侍美人帝不悅既飲謳者進帝獨悅子夫帝起更衣子夫侍尚衣軒中得幸還唑欣甚賜平陽主金千斤主因奏子夫送入宮子夫上車主拊其背曰行矣強飯勉之即貴願無相忘入宮歲餘不復幸武帝擇宮人不中用者斥出之子夫得見涕泣請出上憐之復幸遂有身尊寵元朔元年生男據遂立為皇后據即戾太子也孝武李皇后漢書曰孝武李夫人本以倡進初夫人兄延年性知音善歌舞武帝愛之每為新聲曲聞者莫不感動延年侍上起舞歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國寧知傾城傾國佳人不可再得上歎息曰善世豈有此人乎平陽主因言延年有女弟上乃召見之實妙麗善舞由是得幸生一男是為昌邑哀王李夫人少而蚤卒上憐閔焉圖畫其形於甘泉宮及衛思后廢後四年武帝崩大將軍霍光緣上雅意以李夫人配食追上尊號曰孝武皇后初李夫人病篤上自臨候之夫人蒙被謝曰妾久病形貌毀壞不可以見帝願以王及兄弟為託上曰夫人病甚殆將不起一見屬託王及兄弟豈不快哉夫人曰婦人貌不修飾不見君父妾不敢以燕墮見帝上曰夫人若一見我將加賜千金而子兄弟尊官夫人曰尊官在帝不在一見上復言欲必見之夫人遂轉向壁欷歔而不復言於是上不悅而起夫人姊讓之曰貴人獨不可見上屬託兄弟耶何為恨上如此夫人曰所以不欲見帝者乃欲以深託兄弟也我以容貌之好得從微賤愛幸於上夫以色事人者色衰則愛絶愛絶則恩絶上所以戀戀顧念我者乃以平生容貌也今見我毀壞顏色非故必且畏惡有吐棄我意尚肯復追思憫録其兄弟哉及夫人卒上以厚禮葬焉孝昭趙太后史記曰鉤弋夫人姓趙氏河間人也得幸武帝生子一人即昭帝也武帝年七十乃生昭帝昭帝立時年五歲衛太子廢上居甘泉宮召畫工圖畫周公負成王於是左右群臣知武帝意欲立少子後數日帝譴責鉤弋夫人脫簪珥叩頭帝曰引將去送掖庭獄夫人還顧帝曰趨行女不得活夫人死雲陽宮時暴風揚塵百姓感傷使者夜持棺往葬之封識其處其後帝間居問左右曰人言何云左右對曰人言以為且立其子何為去其母乎帝曰然是非兒曹愚人所知也往古國家所以亂也由主少母壯女主獨居驕蹇淫亂自恣莫能禁也汝不聞呂后邪故諸為武帝生子者無男女其母莫不譴死豈可謂非賢聖哉漢書曰孝武鉤弋趙婕妤家在河間武帝巡狩過河間望氣者言此室有奇女天子氣使使召之既至兩手皆拳上自披之手即時伸由是得幸號曰拳夫人進為婕妤居鉤弋宮大有寵元始三年生昭帝號鉤弋子妊身十四月乃生上曰聞昔堯十四月而生今鉤弋亦然乃命其生門曰堯母門昭帝即位追尊為皇太后漢武故事曰拳夫人進為婕妤居鉤弋宮解黃帝素女之術從上至甘泉因幸告上曰妾相運正應為陛下生一男男七歲妾當死今年必死宮中多蠱氣必傷聖體言終而臥遂卒既殯香聞十餘里因葬雲陵上哀悼又疑非常人發冢室棺無尸唯履存為起通靈臺於甘泉常有一青鳥集臺上往來至宣帝時乃止列仙傳曰鉤翼夫人姓趙少好學沉靜病臥六年右手拳飲食少望氣云東方有貴人氣推而到姿色甚偉帝披其手得一鉤而手尋拳生昭帝既而帝害之殯尸不臭而香數月昭帝即位更葬之棺空但有衣履故名其宮曰鉤翼後避諱改為弋孝昭上官皇后漢書曰孝昭上官皇后隴西上邽人祖父桀因材力親近為侍中昭帝始立年八歲帝姊鄂邑長公主居禁中共養后父安因主親近丁外人聞之長公主召入為婕妤月餘為皇后年甫六歲安以后父封侯後桀謀反發覺后以少不預謀亦以霍光外孫不廢宣帝即位合葬平陵衛太子史戾后漢書曰衛太子史良娣宣帝祖母也太子有妃有良娣有孺子妻妾凡三等子皆稱皇孫史良娣生男進號史皇孫武帝末巫蠱事起衛太子及良娣史皇孫皆遭害史皇孫王悼后漢書曰史皇孫王夫人宣帝母也名公碩太始中得幸於史皇孫皇孫妻妾無號位皆稱家人子征和二年生宣帝帝生數月衛太子皇孫敗家人子皆唑誅莫有收葬者唯宣帝得全即尊母位後追尊母夫人諡曰悼后祖母史良娣曰戾后皆改葬孝宣許皇后漢書曰孝宣許皇后元帝母也父廣漢昌邑人為暴室嗇夫廣漢有女平君十四五當為內者令歐侯氏子婦臨當入門歐侯子死其母將行卜相言當大貴母獨喜張賀聞許嗇夫有女乃置酒請之酒酣為言曾孫可妻也廣漢許諾明日嫗聞之怒廣漢重令為媒介遂與曾孫及立為帝平君為婕妤是時霍將軍有小女與皇太后有親公卿議更立皇后皆心議霍將軍女亦未有言上乃詔求微時故劍大臣知旨白立許婕妤為皇后孝宣霍皇后漢書曰孝宣霍皇后光女也母顯既使女醫陰殺許后顯因為女成君衣補治入宮漢書曰孝宣許后起微賤登至尊從官車服甚節儉五日一朝皇太后於長樂宮親奉案上食以婦道供養及霍后立亦循許后故事而皇太后親霍后之姊子故常竦體敬而禮之皇后輿駕侍從甚盛賞賜官屬以千萬計與許后時懸絶矣孝宣王皇后漢書曰孝宣王皇后父奉光少時好鬭雞宣帝在人間數與奉光會相識奉光有女年十餘每欲適人所當適者輒死故久不行及宣帝即位召入後宮稱為婕妤霍皇后廢後上憐太子蚤失母幾為霍氏所害於是乃選後宮素謹朴而無子者遂立王婕妤為皇后令母養太子元帝即位為皇太后成帝即位為太皇太后時成帝母亦姓王氏故號太皇太后為邛城太后年七十餘崩以后父奉光封邛城侯故號之孝元王皇后漢書曰孝元王皇后王莽之姑也王賀字翁孺為武帝繡衣御史逮捕魏郡盜皆縱不誅以奉使不稱免歎曰吾聞活千人者有封吾所活者萬餘人後世其興乎翁孺既免而與東平陵終氏為怨乃徙魏郡元城委粟里為三老魏郡人德之元城建公曰元城縣建公姓名也昔春秋沙麓崩晉史卜之曰陰為陽雄土火相乘此龜繇文陰元后陽漢也王氏舜後土也漢火故曰土火相乘陰盛而沙麓崩故有沙麓崩後六百四十五年宜有聖女興其齊田乎今王翁孺徙正值其地日月當之元城郭東有五麓之墟即沙麓地也後八十年有貴女興天下云翁孺生禁字雅君禁生女政君即元后也初母李親妊政君在身夢月入其懷及壯大婉順得婦人道常許嫁未行所許者死後東平王娉政君為姬未入王薨禁獨怪之使卜數者相政君當大貴不可言禁心以為然乃教書學鼓琴五鳳中獻政君年十八矣入掖庭為家人子皇后擇後宮可以娛侍太子者政君與在其中及太子朝皇后乃見政君等五人微令旁長御問知太子所欲太子殊無意於五人者不得已於皇后強應曰此中一人可是時政君坐近太子又獨衣絳緣遂送政君於太子宮見內殿得御幸有娠甘露三年生成帝於甲館畫堂為世嫡皇孫宣帝崩太子即位是為孝元皇帝立太孫為太子以母王妃為皇后哀帝即位為太皇太后哀帝崩無子以莽為大司馬共徵立中山王奉哀帝後是為平帝平帝年九歲常被病太皇太后臨朝漢傳國璽以孺子未立璽藏長樂宮及莽即位請璽太后不肯以授莽莽使安陽侯舜諭旨舜素謹飭太后雅愛信之舜既見太后知其為莽求璽怒罵之曰而屬父子宗族蒙漢家力富貴纍代既無以報受人寄託乘便利時奪取其國不復顧恩義為人如此者狗豬不食其餘天下豈有而兄弟耶且若自以金匱符命為新皇帝變更正朔服制亦當自更作璽傳之萬世何以用此亡國不祥璽為欲求之我漢家老寡婦旦暮且死欲與此璽俱葬終不可得太后因泣涕莽欲脅之乃出璽投之地莽改號太后為新室文母絶之於漢太后年八十四建國五年二月癸丑崩三月乙酉合葬渭陵孝元傅皇后漢書曰孝元傅昭儀哀帝祖母也父河內溫人昭儀少為上官太后才人自元帝為太子得進漢書曰孝元傅皇后帝即位為婕妤甚有寵為人有才下至宮人左右飲酒酹地皆祝延之信都馮太后漢書曰孝元馮昭儀平帝祖母也元帝即位二年以選入後宮就館生男拜為婕妤父奉世婕妤內寵與傅昭儀等建始中上幸虎圈鬭獸後宮皆唑熊佚出圈攀檻欲上殿左右貴人傅昭儀等皆驚走馮婕妤直前當熊而立左右格殺熊上問人情驚懼何故前當熊婕妤對曰妾聞猛獸得人而止妾恐熊至御坐故以身當之元帝嗟嘆以此倍敬重焉孝成許皇后漢書曰孝成許皇后平恩侯嘉女元帝悼傷母恭哀后居位日淺而遭霍氏之辜故選嘉女以配皇太子侍送者還白太子欣説狀元帝喜謂左右酌酒賀我左右皆稱萬歲久之及成帝即位立許妃為皇后后聰慧善史書自為妃至即帝位后常寵於上後宮稀得進見久之皇后寵亦益衰而後宮多新愛姊平安侯夫人謁等為媚道祝詛後宮有娠者太后大怒下吏考問謁等誅死許后唑廢處昭臺宮孝成帝趙皇后漢書曰孝成趙皇后本長安宮人初屬陽阿主家學歌舞號曰飛燕成帝嘗微行出過陽阿主作樂上見飛燕而説之召入宮大幸有女弟復召入俱為婕妤貴傾後宮父臨為咸陽侯後月餘乃立婕妤為皇后寵以衰而弟絶幸為昭儀居昭儀舍其中庭彤朱而殿上髹漆切皆銅沓冒黃金塗白玉階壁帶往往為黃金釭函謂璧中之橫帶承藍田璧明珠翠羽飾之自後宮未嘗有焉孝哀丁太后漢書曰定陶丁姬哀帝母也河平四年生哀帝丁姬為太后建平三年丁太后崩起陵恭皇之園王莽秉政乃奏貶傅太后號曰定陶恭王母丁太后號曰丁姬元始五年莽復奏恭王母及丁姬葬渭陵冢高與元帝山齊禮有改葬謂發王母及丁姬冢徙歸定陶太后以為既已之事不須發莽固爭之太后詔曰因故棺為致槨作冢祠以太牢既發傅太后冢崩壓殺數百人開丁姬槨戶火出炎四五文吏卒以水沃滅乃得入燒燔槨中器物莽復奏言前恭王母生僭居桂宮皇天震怒災其正殿丁姬死莽踰制度今火焚其槨此天見變以告當改如媵妾也共王母及丁姬槨棺皆名梓宮珠玉之衣非藩妾服請更以木槨代去珠玉葬丁姬媵妾之禮奏可既開傅太后棺臭聞數里掘平恭王母丁姬故冢二旬間皆平莽又周棘其處以為時戒云時有群燕數千御土投冢中孝哀傅皇后漢書曰孝哀傅皇后定陶傅太后弟子也哀帝為定陶王時傅太后欲重視取以配王帝崩王莽白太后令孝哀皇后退就桂宮後月餘復與孝成趙皇后俱廢為庶人就其園自殺孝平母衛姬漢書曰中山衛姬平帝母也父曰子豪子豪女弟為宣帝婕妤生楚孝王長女又為元帝婕妤生平陽公主成帝時中山孝王無子上以衛氏吉祥以子豪少女配孝王生平帝平帝年二歲孝王薨代為王哀帝崩無嗣太皇太后與莽迎中山王立為帝莽欲顓國權衛姬及外家不當得至京師乃賜衛姬璽綬即拜為中山王后莽長子宇非莽隔絶衛氏日夜啼泣思見帝而但益戶邑宇復教令上書求至京師會事發覺莽殺宇盡誅衛氏支屬莽篡國廢為家人後歲餘卒葬孝王旁孝平王皇后漢書曰孝平王皇后莽女也莽欲依霍光故事以女配帝帝崩莽立孝宣帝玄孫嬰為孺子莽即真以嬰為定安公王皇太后號為定安公太后時年十八為人婉嫕有節操自劉氏廢常稱疾不朝會莽敬憚傷哀欲嫁之乃號為皇室主令立國將軍成新公孫建世子豫飾將醫往問疾后大怒笞鞭其旁侍御因發病不肯起莽遂不敢強也及漢兵誅莽焚燒未央宮后曰何面目以見漢家自投火中而死
