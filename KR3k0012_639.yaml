body:
  text: 刑法部四律令下科附齊書曰初江左用晉世張杜律二十卷孔稚圭刪注修改與竟陵王議務從輕曰仲尼有言古之聽獄者求所以生之今之聽獄者求所以殺之與殺不辜寧殺有罪則斷獄之職古所難矣寫律上國學置律助教依五經例策試上高第便擢用之北齊書曰武成帝河清中有司奏上齊律其不可為定法者別制權令二卷與之並行後平秦王高歸彥謀反須有約罪律無正條於是遂有別條權令與律並行大理明法上下比附欲出則附依輕議欲入則附從重法姦吏因之舞文出沒至于後主權幸用事有不附之者陰中以法綱紀紊亂卒至於亡三國典略曰齊封述渤海蓨人廷尉卿軌之子也久為法官明解律令議斷平允時人稱之隋書曰李德林開皇元年勑令與太尉任國公于翼高頴等同修律令事訖別賜九環金帶一駿馬一匹賞損益之多也又曰劉行本為侍御史雍州別駕元肇言於上曰有一州吏受人餽錢二百文依律令合杖一百然臣下車之始與其為約此吏故違請加徒一年行本駮之曰律令之行並發明詔與民約束今肇乃敢重其教命輕忽憲章欲申乞言之必行忌朝廷之大信虧法取罪非人臣之禮上嘉之唐書曰高祖入關除隋苛政為約法十二條唯制殺人劫盜背軍叛逆餘並蠲除之及受禪又用開皇律令除其苛細五十三條格務存寬簡取便於時仍遣裴寂殷開山郎楚之沈叔安崔善為之徒撰定律令太宗即位命長孫無忌房玄齡與當朝通議之士更加釐改戴胃魏徵又言舊律太重於是議絞刑之五十條斷其右趾焉應死者多蒙全活得罪者咸稱賴之又曰太宗問大理卿劉德威曰近來刑網稍密何也對曰誠在君上不由臣下主好寬則寬好急則急律文失入減三等失出減五等今則反是失入則無辜失出則獲大罪所以吏各自愛競執深文畏罪之所致耳太宗然其言又曰神龍元年趙冬曦上書曰臣聞夫今之律者乃有千餘條近有隋之姦臣將弄其法故著律曰犯罪而律無正條者應出罪則舉重以明輕應入罪即舉輕以明重立夫一言而廢其數百條自是迄今竟無刊革遂使死生罔由乎法律輕重必因乎愛憎受罰者不知其然舉事者不知其犯臣恐賈誼見之必為之慟哭矣又曰時所用舊律其文起自魏文侯師李悝悝撰攻諸國法著經以為王者之政莫急於盜賊盜賊須刻捕故著囚捕二篇其輕狡越城博戲借假不廉淫多踰制以為雜律一篇又以具其加減是故所著六篇而已然皆罪名之制也六韜曰文王問太公曰願聞治國之所貴太公曰貴法令必行法令必行則治道通治道通則民大利民大利則君德彰文王曰法令必行大利人民奈何太公曰法令必行則民俗利民俗利則利天下是法令必行大利人也又曰願聞為國之大失太公曰為國之大失者為上作事不法君不覺悟是大失也文王曰願聞不法公曰不法法則令不行則主威傷不法法則邪不正邪不正則禍亂起不法法則刑妄行刑妄行則賞無功不法法則國昏亂國昏亂則臣為變君不悟則兵革起兵革起則失天下文王曰誡哉管子曰法者所以興功懼暴律者所以定分止事又曰凡國無法則衆不知為無度則事無儀有法不正有度不直則治僻治僻則國亂故曰正法直度罪殺不赦誅戮必信民畏而懼武威既明令不再行又曰凡君國之重器莫重乎令令重君尊君尊國安令輕君卑君卑國危故安國存乎尊君存乎行令行令存乎嚴罰嚴罰令行則百吏皆恐罰不嚴令不行則百吏皆喜故明君察於治人之本本莫要乎令故曰虧令者死益令者死增益令者殺無赦不行令者死又曰凡牧民者欲民之可御也欲民之可御則法不可不重也法者將立朝廷將立朝廷則爵服不可不貴也爵服不可不貴也爵服加於不義則人賤其爵服民賤其爵服則人主不尊人主不尊則令不行矣又曰法者法天地之位象四時之行所以治天下四時之行有寒有暑聖人法之故有文有武天地之位有前有後有左有右聖人法之以建經紀春生於左秋殺於右夏長於前冬藏於後生長之事文也收藏之事武也是故文事在左武事在右聖人法之以行法令又曰正月之朝百吏在朝君乃出令布憲于國五鄉之師五屬大夫皆受憲於上大夫安子曰君之以尊者令令不行是無君也故明君慎令文子曰文子問老子曰法安所生曰法生於義義生於衆適衆適合乎人心此治之要也法非從天生非從地出發於人間反己自正商君書曰凡人主德行非出人也勇力非過人也然民雖有聖智弗敢謀有勇力弗敢殺雖衆弗勝其制民無億萬之數雖行重賞而民弗敢爭行重罰而民弗敢怨者法也又曰法令者民之則也為治之本也所以備民也知者不得過過者不得不及名分不定而欲天下之治也是猶欲無飢而去食欲無寒而去衣也欲至東而西行其不幾亦明矣一兔走而百人逐之非兔一可以分百也由名之未定也夫賣兔在市盜不敢取分之定也今法令不明其名不定天下之人得議之也慎子曰法之功莫大使私不行君之功莫大使民不爭今立法而行私是私與法爭其亂甚於無法立君而尊賢是與君爭其亂甚於無君故有道之國法立則私義不行君立則賢者不尊民一於君事斷於法是國之大道也又曰法雖不善猶愈於無投鉤分財投策分馬非以鉤策為均也使得榮者不知所以德得惡者不知所以怨乃以塞怨望也又曰堯為匹夫不能使鄰家至為主則令行禁止由此觀之賢未足以服不肖而勢位足以屈賢申子曰君必有明法正義若懸權衡以稱輕重所以一群臣也又曰堯之治也蓋明法察令而已聖君任法而不任智任數而不任説黃帝之治天下置法而不變使民安樂其法也又曰昔七十九代之君法制不一號令不同然而俱王天下何也必國富而粟多也韓子曰魯燒積澤天北風火南向恐燒國哀公自將衆趍救火人盡逐獸而火不救乃召仲尼仲尼下令曰不救火而逐獸者比入禁之罪令下未遍火遂救矣又曰治大國而數變法則民苦之是以有道之君貴虛靜重變法也又曰釋法術而為治堯不能正一國使中正守法術拙匠執規矩尺寸則萬不失一也又曰董安于為趙上地之守行石阜山中見深澗峭如墻深百仞因問其鄉左右曰人嘗有入此者乎對曰無有曰嬰兒癡聲狂亂人嘗有入此者乎對曰無有馬羊牛嘗有入此乎對曰無有安于喟然嘆曰吾能治矣使吾法之無赦猶入澗之必死也則民莫知犯何為不治也又曰荊莊王有弟門者立法群臣大夫諸侯公子入朝馬蹄踐霤者廷理斬其輈戮其御於是太子入朝馬蹄踐霤廷理依法太子怒入為王泣曰必為誅戮廷理王曰法者所以敬宗廟尊社稷故臣受命尊敬社稷者社稷之臣焉可誅也太子乃還走避舍露宿三曰北面再拜請罪又曰夫人臣之侵其主也如地形焉即漸以往使人主失端東西易面而不自知故先王立教司南以端朝夕明王使其群臣不遊意於法之外不為惠於法之內虎所以能服狗者爪牙也使虎釋其爪牙使狗用之則虎反服於狗矣人主者以形德制臣也今君釋其刑德而臣用之則臣反制於君矣又曰奔車之上無仲尼覆舟之下無伯夷故號令者國之舟車也安則智廉生危則鄙爭起又曰越王問於大夫種曰吾欲伐吳可乎對曰可以吾賞厚而信罰嚴而必君必欲知之何不試焚於是遂焚宮室民莫救火乃下令曰民之救火而死者比死敵者之賞勝火而死者比勝敵之賞不救火者比降北之罪民之塗其體被濡衣赴火者左三千人右三千人始知必勝之勢也又曰吳起為魏武侯西河之守秦有小亭臨境起欲攻之乃倚一車轅於北門之外而令曰有能徙北南門之外賜之上田上宅民莫之徙也及有徙之者遂賜之如令俄又置一石赤忝東門之外而令之曰有能徙之於西門之外者賜之如初民則爭徙之乃下令大夫曰攻亭有能先登者仕之國大夫賜之上田宅民爭上於是攻亭一朝而拔之阮子曰漁人張網於淵以制吞舟之魚明主張法於天以制強良之人立法以隄民百姓不能干立防以隄水江河不能犯傅子曰律是咎繇遺訓漢命蕭何廣之又曰天為有形之主君為有國之主天以春生猶君之有仁令也天以秋殺猶君之有威令也故仁令之發天下樂之威令之發天下畏之樂之故樂從其令畏之故不敢違其令若寬令發而人不樂無以稱仁矣威令發而下不畏無以言威矣無仁可樂無威可畏而能保國致治者未之有也會稽典録曰董昆字文通餘姚人也少遊學師事頴川荀季卿受春秋治律令明達法理又才能撥煩縣長潘松署功曹史剌史盧孟行部垂念冤結松以孟明察於法令轉署昆為獄史孟到昆斷正刑法甚得其平孟問昆本學律令所師為誰昆對事荀季卿孟曰史與剌史同師孟又問昆從何職為獄史松具以實對孟歎曰剌史學律猶不及昆召之署文學杜預律序曰律以正罪名令以存事制張斐律序曰張湯制越官律趙禹作朝會正見律鹽鐵論曰夫善言天者合之於人善言古者考之於今二尺四寸之律古今一也又曰昔秦法繁於秋荼而網密於凝脂然而上下相趍姦偽萌生崔實政論曰君以審令為明臣以奉令為忠故背制而行賞謂之作福背令而行罪謂之作威作威則人畏之作福則人歸之夫威福者人主之神器也譬之操莫耶矣執其柄則人莫敢抗失其柄則還見害也風俗通曰皋陶謨虞始造律蕭何成以九章此關諸百王不易之道也夫吏者治也當先自正然後正人故承憲履繩動不失律令也科後漢書曰章帝時陳寵代郭躬為廷尉帝納寵言制除鉆琴嚴切鑽諸慘酷之科又曰明帝永平十二年詔曰車服制度恣極耳目田荒不耕遊食者衆有司其中明科禁宜於今者宣下郡國魏志曰曹仁少時不修行檢及長為將嚴邪正奉法令常置科於左右案以從事宋書曰顧深之子寶先大明中為尚書水部郎先深之為左承荀萬秋所劾及寶先為郎萬秋猶在職自陳不拜世祖詔曰憲司之職理有釐釐正而頃刻無輕重輒致私絶此風難長主者可嚴為其科劉邵律略曰刪舊科採漢律為魏律懸之象魏揚雄劇秦美新曰金科玉條科條謂所施法律金玉珍之也説文曰科程也程品也十發為程十程為寸
