body:
  text: 兵部二十機略八隋書曰楊義臣與漢王將喬鍾葵相拒義臣自以兵少悉取軍中牛驢得數千頭復令兵數百人人持一鼓潛驅之澗谷間出其不意義臣晡後復與鍾葵戰兵初合命驅牛驢者疾進一時鳴鼓塵埃張天鍾葵軍不知以為伏兵發因而大潰縱擊破之以功進位上大將軍又曰長孫晟計突厥達頭晟進策曰突厥飲泉易可行毒因取諸藥毒水上流達頭人畜飲之多死於是大驚曰天雨惡水其亡我乎因夜遁晟追之斬首千餘級又曰高熲獻取陳之策曰江北地寒田收差晚江南土熱水田早熟量彼收穫之際徵集士馬聲言掩襲必屯兵禦守足得廢其農時彼既聚兵我便解甲再三若此賊以為常後雖集兵彼必不信持疑之頃我乃濟師登陸而戰兵氣益壯文帝行其策陳人益弊又曰賀若弼鎮淮南先是弼請緣江防人每交代之際必集歷陽於是大列旗幟營幕被野陳人以為大兵至悉發國中士馬既知防人交代其衆復散後以為常不復設備其後弼以大軍濟江陳人弗之覺也遂滅陳通典曰隋末王世充與李密相持於東都充夜渡陳於洛水之北其時密亦渡洛水陳兵與充相對月城西至石窟密兵多馬騎長槍宜路寬放縱充兵多戈矛䂎宜隘險然南逼洛水北限大山地形褊促騎不成列縱䂎蹙之密軍失利密與數子登船南濟自餘兵馬皆東走月城充乘勝長驅直至月城下密既渡南岸即策馬西上直向充本營左右麾旌相繼而至充營內見密兵來逼急連舉六烽充乃捨月城之圍收兵西退自洛北達於黑石中間四十餘里奔赴顛狽大喪師徒密之行也東北之圍不救而自解西南之寇不戰而成功充伏其權奇不復輕出又曰隋漢王諒據并州及隋將楊素率衆數萬討諒時晉絳呂三州並為諒城守素各以二千人縻之而去諒遣將趙子開擁衆十餘萬柟絶徑路屯據高壁嶺布陳五十里素令諸將以兵臨之自引兵入霍山緣崖谷而進直指其營一戰破之殺獲數萬又曰隋開皇中文帝大議伐陳諸將皆云大江闊遠兵不習水以此為疑若一登南岸秦兵一可當百襄邑公賀若弼獻十策其一事請多造船須船既多賊必防擬更甚今南地無馬請付傍江諸州二十歲已上老馬令飼以平陳為名賊必懼求馬擬戰密勑刺史私賣博大船江南下濕特不宜馬不逾周年並當死盡終不為彼用陳主陳叔寶果大造船市馬輸船既多方覺不便而止高頴請所博得船運諸州米貯壽陽城役徒於壽陽穿大池以魚蓮遨游為名造船教水戰仍以賀若弼為壽州揔管終以此平陳又曰隋將軍劉方率兵討林邑國其王梵志率其徒乘巨象而戰方軍不利方於是多掘小坑草覆其上因以兵挑之梵志悉衆而陳方以戰僞奔北梵志逐之至坑所其衆多陷轉相驚駭軍遂亂縱兵擊大破之又曰隋末宇文化及殺煬帝後率兵來攻李密於黎陽密知化及糧且盡因僞與和弊其衆化及弗之悟大喜恣其兵食冀密饋之會密下有人獲罪亡投化及具以告密情化及大怒其食又盡乃度永濟渠與密戰于童山之下自辰達酉密為流矢所中頓於汲縣化及掠汲郡北趣魏縣其將王智略張童仁等率所部兵歸于密者前後相繼又曰隋末楊玄感反攻東都刑部尚書衛玄感戰兵始會玄感詐令人大呼曰官軍已得玄感矣官軍稍怠玄感與數千騎乘之玄感兵於是大潰又曰隋煬帝征高麗隋將于仲文率軍從樂浪道軍次烏骨城仲文揀羸馬驢數千置於軍後既而率衆東過高麗出兵掩襲輜重仲文回擊大破之又曰隋漢王諒作亂遣其將余公理自太行下河內隋將史祥討之軍於河陰久不得濟祥謂軍吏曰余公理輕而無謀才用素不足稱又新得志謂其衆可恃恃衆必驕且河北人先不習兵所謂擁市人而戰不足圖也乃令軍中修攻具攻河陽公理使諜知之果屯兵於陽內城以備祥祥於是船河南公理聚申以當之祥乃簡精鋭於下流潛度公理率衆拒之祥至浿水浿古間切兩軍相對公理未成列祥縱擊大破之又曰隋末李密破宇文化及還其徑兵良馬多死隋將王充守東都欲乘其弊練精勇得二萬餘人馬千餘匹於洛水南密軍偃師北山上時密新得志於化及有輕充之心不設壁壘充夜遣二百餘騎潛入北山伏溪谷中令軍士秣馬蓐食既而霄濟人奔馬馳遲明而薄密出兵應之陳未成列而兩軍合戰其伏兵蔽山而上潛登北原乘高而下馳壓密營營中亂無能拒之者即入縱火密軍大驚而潰唐書曰太宗屯武牢竇建德悉衆而南陳兵於汜水王充將郭士衡陳於南周亘數里鼓譟請戰諸將大懼太宗數騎升高丘安坐以望之謂諸將曰賊起山東未見大敵今度險而囂是無正令逼城而陳有輕我心我按兵不出彼乃氣衰陳久卒飢勢將自退追而擊之何往不剋吾與公等為約必以午後破之如或不然寡人為無謀矣建德乃遣兵涉汜水太宗令揔管王君廓以少擊之待河北馬渡方欲與戰建德列陳自辰至午士卒飢倦人皆坐列又爭飲水太宗乃令宇文士及將三百騎經賊陳之西馳而南上誡之曰賊若不動汝宜引歸如覺動宜出東面士及才過賊衆果動逡巡欲退太宗曰可以擊也親率輕騎追而誘之衆軍繼至建德回師陳未及整列太宗先登以擊之所向皆靡俄而衆軍合戰囂塵四起太宗率史大奈程咬金秦叔寶宇文歆等纏幡而入出其陳後張我旗幟賊顧見之衆乃大潰追奔三十里斬首三千餘級虜其衆五萬餘人一時放散又曰太宗討劉黑闥相持兩月餘黑闥率步騎二萬南渡洺水結陳而至晨壓我營太宗遣輕騎當之賊皆殊死戰於是親率精騎擊賊馬軍破之因乘勝蹂其步卒自午及昏戰數合賊大潰斬首萬餘級溺水死者數千人黑闥與二百人北走悉虜其衆先是太宗遣兵堰洺上流令黑闥得渡及戰之日遽令決堰水大至深丈餘賊衆以為神由是敗走又曰武德中突厥頡利二可汗到原州太宗率兵拒之雨甚太宗乃召諸將謂之曰虜控弦鳴鏑弓馬是憑今雨彌時弧矢俱弊突厥人衆如鳥矢所介切羽我屋宿火食搶槊犀利料我之逸揣敵所勞此而不乘夫復何待今欲先令徑兵亂其陳乃率突騎驅其後虜俗進不相讓退不相救自以北澗谷深長時有一道魚貫以度因而迫之彼十萬騎坑穽中物耳追至黃河縱不盡擒必當十獲八九此曉兵者所以解諸君勿疑於是潛師夜出冒雨而進醜徒震駭因縱反間於突利悅而歸心二可汗內離頡利欲戰不可因請和而去又曰貞觀中蘇定方率兵討突厥賀魯大雪平地二尺軍中咸請停兵候晴定方曰虜恃雪深謂我不能前進必當憩息追之可及若緩以縱之則漸遠難追省日兼功在此舉也於是勒兵陵雪晝夜兼進所經收其人衆遂至雙河去賀魯所居二百餘里布陳長驅徑至金牙山賀魯牙帳時賀魯集衆欲獵定方縱兵擊之盡破其牙帳生擒數萬人賀魯脫走投石國定方於是悉命諸部歸其所居埋瘞骸骨存問疾苦復其産業賀魯所虜掠者悉撿責還之於是西域諸國安堵如故令副將蕭嗣業往石國以追賀魯遂擒歸于京師又曰貞觀中突厥諸部離叛朝庭將圖進取以李靖為代州道行軍揔管率驍騎三千自馬邑出其不意直趨惡陽嶺以逼之突利可汗不虞於靖見官軍掩至相謂曰唐兵若不傾國而來靖豈孤軍而至一日數驚四年靖進擊定襄城破之突厥諸部落並走磧北突利可汗來奔又曰貞觀中吐谷渾寇邊以李靖為西海道行軍大揔管統兵部尚書侯君集刑部尚書任城王道宗等五揔管征之軍次伏埃城吐谷渾燒去野草以餧我師退保大非川諸將咸言春草未生馬已羸疲不可赴敵唯靖決計而進深入敵境遂踰積石山前後戰數十合殺傷甚衆大破其國又曰武德中突厥突利頡利二可汗到原州太宗率兵拒之兩陳將交太宗以數騎出謂之曰不念昔者香火之言乃來相侵知二可汗外同內異故以此言疑之頡利見太宗輕出又聞香火之言乃陰猜突利因遣使曰王不須慮我無惡意更欲與王自斷當耳於是斂軍引却又曰貞觀中北狄鐵勒薛延陀發同羅僕骨回紇等衆合二十萬度漢屯白道川據善陽嶺以擊突厥可汗李思摩之部思摩引其種落走朔州留精騎以拒戰延陀乘之及塞太宗令張儉李績等率兵數道擊之時太宗誡之曰延陀負其兵力踰漠而來經途數千馬已疲瘦夫用兵之道見利速進不利速退其掩思摩不能疾擊思摩既入長城又不能速退吾先勑思摩燒剃殺草延陀糧食日盡野無所獲頃者偵人來云其馬齧噉林木枝皮略盡卿等椅角思摩不須前戰俟其將退一時奮擊制勝之舉也於是李績擊延陀之衆破之先是延陀擊突厥沙鉢羅及杜爾皆以步兵戰而勝及其將來寇也先講武於國中教習步戰每五人以一人經習戰陳者使執馬而四人前戰克勝即授馬以追奔失於應接罪至於死沒其家口以賞戰人至是遂行其法突厥先合趣退延陀乘勝而逐之績兵拒擊而延陀萬矢俱發傷我戰馬李績乃令去馬步陳率長矟數百為隊齊奮以衝之其衆潰散副揔管薛萬徹率數千騎收其執馬者其衆失馬莫知所從因擊之乃大敗又曰武后初徐敬業起兵於楊州武太后令將軍李孝逸討之敬業拒于高卸之下阿溪敬業置陳既久士卒多疲怠皆顧瞻陳不能整孝逸遂率衆擊之因風縱火敬業懼燒而退孝逸進擊大破之又曰武德中薛萬均與羅藝守幽燕竇建德率衆十萬來至范陽萬均謂藝曰衆寡不敵今若兵鬭百戰百敗當以計取可令羸兵弱馬阻水背城為陳以誘之賊若度水請公精騎百人伏於城側待其半度而擊之破之必矣從之建德引兵度水萬均擊之大破又曰武德初王世充據東都太宗往征之屯青城宮營壘未立王世充衆二萬自方諸門出臨穀水以禦大軍諸將甚懼太宗以精騎陳於北邙登後魏宣武陵以觀賊陳謂左右曰賊勢迫矣悉衆而出利在一戰今日破之其後不能出矣乃令屈突通率步卒五千度水布陳以當之因戒通曰待兵交即放煙吾當率馬軍南下兵才接太宗以騎衝之挺身先進表裏合勢賊衆殊死戰散而復合者數焉地既險隘賊多䂎䂎鋌也算也騎戰稍難太宗親自射之莫不應弦而倒起辰及午賊衆始退因乘之迫于城塹俘斬七千人自是不敢復出又曰高宗遣將軍裴行儉討突厥於黑山至朔川謂其下曰兵法尚詐者以權謀制敵也若御其下則非誠信不可行遣副將蕭嗣業運糧被掠兵多餧死所以敗也狡寇狃忲不可以不備乃詐為糧車三百乘每車伏壯士五人各齎陌刀徑弩以羸兵數百人援之兼伏精兵居險以待之賊果大下羸兵棄車散走賊驅馬就泉井解鞍牧馬方擬取糧車中壯士齊發伏兵亦至殺獲殆盡賊衆奔潰自是續遣糧運無敢近之者又曰馬燧為魏博招討使田悅求救於淄青恆州李納遣大將衛俊將兵僅萬人以救悅李惟嶽亦遣三千餘人救悅收合散兵二萬餘壁於洹水淄青軍其東恆州軍其西首尾相應燧帥諸軍進屯於鄴奏請益河陽兵詔遣河陽節度使李芃將兵會之軍次於漳悅遣將王光進以兵守長橋築月城以為固軍不得渡燧乃於下流以兵車數百乘維鐵鎖絶中流實以土囊以遏水水稍淺諸軍畢渡是時軍糧少悅深壁不戰欲老燧軍燧令諸軍持十日糧以前進次倉口與悅等夾洹水而軍李抱真等問曰糧少深入何也燧曰糧少利速戰兵法善於致人而不致於人今田悅與淄青恆州三軍為首尾計以老我師若分軍擊其左右兵少未可必破悅且來救是前後受敵也兵法所謂攻其必救固當戰也燧為諸公合而破之燧乃造三橋逾洹水日挑戰悅不敢出恆州兵自以軍少懼為燧所并引軍合於田悅燧又令於軍中曰悅死傷之餘安敢出戰所恃者淄青軍爾吾當先破納軍則田悅坐受降也淄青軍聞懼亦引軍合於田悅謂燧明日復挑戰乃伏兵萬人欲邀之燧乃令諸軍半夜皆食先雞鳴時擊鼓鳴潛師旁洹水西徑趨魏州令曰聞賊至即止為陳又令百騎鳴鼓角留於後仍抱薪持火待軍止鼓角匿其旁伺悅軍渡焚其橋軍行十數里悅乃率淄青恆州兵步騎四萬餘踰掩其後乘風縱火鼓噪而進燧乃坐軍前除草斬榛棘廣百步以為陳募勇士得五千餘人分為前引以俟賊至比悅軍至則火滅氣乏力少衰乃縱擊之悅大敗時神策昭義河陽軍小却河東軍勝諸軍還鬭合擊又大破迫切洹水悅軍走橋橋已焚矣悅軍亂赴水斬首二萬殺賊大將孫晉卿安墨啜生獲三千餘人溺水死者不可勝數淄青軍殆盡死者相枕藉三十里悅收兵得千餘人走夜至魏州又曰元和十二年唐鄧節度使李訴奏以九月二十六日圍蔡州吳房縣攻其外城毀之斬首千餘級初將出攻左右白以往亡日請避之訴曰賊以往亡謂吾不能來正可擊也及戰勝而歸賊以梟騎五百追訴訴下馬據胡床令於衆曰後回戈者斬由是衆悉力戰射殺賊將孫忠憲賊衆乃退或勸訴曰乘其退可遂柭吳房訴曰取之賊必合勢而固其穴不如留之使分其力
