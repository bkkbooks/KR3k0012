body:
  text: 果部一果易解卦曰天地解而雷雨作雷雨作而百果草木皆甲坼爾雅曰果不熟曰荒周禮天官上甸師職曰甸師供野果之屬禮記曲禮上曰賜果於君前其有核者懷其核又王藻曰果實未熟不鬻於市凡食果實後君子火熟者先君子春秋元命苞曰織女星主果謝承後漢書曰劉祐字伯祖中山安國人仕郡為主簿郡將小子常出錢付之市買果實祐悉以買筆墨書具與之華嶠後漢書曰桓榮為博士會庭中詔賜奇果受賜者懷之榮獨舉手奉以拜光武笑指之曰此真儒生也陳書曰徐孝克侍宴無所食啖至食散當其前膳羞損減帝密記以問中書舍人管斌斌自是伺之見孝克以珍果內紳帶中斌當時莫識其意後尋訪方知其以遺母斌以啓宣帝嗟嘆良久乃勑自今宴享孝克前饌並遣將還以餉其母時論美之北史曰後魏淮陽王欣好營産業多所樹藝京師名果皆出其園唐書曰李泳為河陽所至以貪殘為務犒宴所陳果實以木刻彩繢之説文曰在木曰果在草曰蓏郎果切山海經曰不周之山爰有嘉果其實如桃李其葉華赤食之不飢符子曰趙之相者曰林氏有九子皆賢國人美而稱之號曰九德之父十德之門趙王疾之王乃使擇其果之煩者伐之其父曰果之茂者猶伐之況其人乎吾將以爾為纍矣去之則免乃攜老持子逃趙相於白雲之巖終身不返趙人思之郭子曰王丞相儉帳下甘果盈溢涉春敗爛呂氏春秋曰昔古朱襄氏治天下也炎帝別號多風陽氣畜積萬物散解果實不成故士達作為五絃之瑟以來陰氣以定群生士達朱襄氏臣杜蘭香傳曰神女姓杜名蘭香降張碩常食粟飯并有非時果碩食之亦不甘然一食可七八日不飢鄴中記曰石虎有華林園種衆果民間有名果虎作蝦蟆車四搏掘根面去一丈深一丈合土載之植之無不生闞駰十三州記曰舍衛國在月氏南萬里果大如三斗坩音杜食經曰種名果法取好直枝內著芋瑰中種之張衡東京賦曰奇樹珍果鉤盾所職左思魏都賦曰馳道周屈於果下劉逵注曰漢廄舊有樂浪所獻果下馬高三尺以駕輦車又蜀都賦曰百果甲坼異色同榮劉楨魯都賦曰芳果萬名攢羅廣庭霜滋露熟時至則零石崇金谷詩序曰雜果幾乎萬株陸機與弟雲書曰天淵池東南角有果各作一林無處不有縱橫成行一果之間輒作一堂郭璞五果讚曰果蓏之品剖噬因宜雖曰微肴貴賤有差栗毛詩山有樞曰山有漆隰有栗韓詩曰東門之栗有靖家室栗木名靖善也言東門之外栗樹之下有善人可與成為室家者毛詩疏義曰五方皆有栗周秦吳楊特饒唯漁陽范陽栗甜美長味倭韓國上栗大如雞子亦短味不美桂楊有栗叢生大如杼子儀禮士喪禮曰設豆右葅南栗東脯大戴禮曰八月栗零零也者降也零而後取之故不言剝也周禮天官籩人曰饋食之籩其實栗禮記內則曰栗有撰之左傳曰女贄不過榛栗棗修以告虔也論語曰哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗曰使民戰栗謂廟主也爾雅曰栵例列二音栭樹似桷樕而卑小子如細栗可食今江東亦呼為栭栗漢書曰種千樹栗其人與千戶侯等謝承後漢書曰豫章宗度拜定陵令縣人杜伯夷清高不仕度與談論致棗栗而已魏略曰太子與鍾繇書曰竊見玉書稱美玉赤擬雞冠黃侔蒸栗魏志曰東夷韓國出大栗如梨宋書曰劉秀之為丹陽尹先是秀之從叔穆之為丹陽與子弟廳事上宴廳事柱有一穿穆之謂子弟及秀之曰汝等試以栗遙擲柱入穿者後必得此郡唯秀之獨入焉其言遂驗又曰王恭幼敏悟年數歲時祖母諸孫姪散栗於床群兒競之泰獨不取問其故對曰不取自當得賜由是中表異之梁書曰沈約嘗侍宴會豫州獻栗徑寸半奇之問衆栗事多少與約各疏所知約少帝三事約出謂人曰此公護前不讓即羞死帝以其言不遜欲抵其罪徐勉固諫乃止又曰蕭琛嘗預御筵醉伏上以棗投琛琛乃取栗擲上中面御史中丞在席帝動色曰席中有人不得如此豈有説也琛曰陛下投臣以赤心臣敢報之以戰栗莊子曰宋有狙公者好養猴者恐衆狙之不馴於己也先誑之曰與若茅茅栗也朝三而暮四足乎衆狙皆超然而怒范子計然曰栗出三輔莊子曰莊周遊乎調陵之樊樊蕃睹一異鵲感周之顙而集于栗林感觸也又曰古者禽獸多而人民少於是皆巢居以避之晝拾橡栗暮棲木上故命曰有巢氏之民國語曰夫婦贄不過棗栗以告虔也棗取蚤起栗取欲栗虔敬也曲禮婦人之贄脯修棗栗也韓子曰秦餓應侯謂王曰五苑之果蔬橡棗栗以活民請發之王曰今發五苑以活民是使有功與無功爭取也人生而亂不如死治説苑曰田饒曰果園梨栗後宮婦人托以相擲而士曾不得一嘗且夫財者君之所輕也死者士之所重也呂氏春秋曰伊尹説曰果之美者江浦之橘箕山之栗正部曰玉府云赤如雞冠黃如蒸栗盧育冀州論曰中山好栗地産不為無珍盧諶祭法曰春秋冬祠皆用栗會稽先賢傳曰光武詔嚴遵詣行所遇蜀郡獻橘栗上令公卿以下各以手所及取遵獨不取上曰不敢取者誰尊對曰君賜臣以禮臣奉君以忠今賜無所主臣是以不取西京雜記曰上林苑有侯栗榛栗瑰栗嶧陽栗嶧陽太守曹寵所獻大如拳三秦記曰漢武帝果園有大栗十五枚及一升水經注曰汝水灣中有地數須上有栗園栗小殊不並固安之實也然歲貢三百石以充天府水渚即栗洲也樹高茂望若屯雲積氣矣林中有栗堂甚間敞牧宰及英彥多所遊薄山海經曰南山其上多栗葛山銅上其木多栗廣志曰栗有侯栗關中大栗大如雞子晉宮閣名曰華林園中栗一株侯栗六株華山記曰西山麓中有栗林藝植以來蕭森繁茂神異經曰東北荒有栗樹高三十丈栗徑三尺其殼赤肉黃白味甜食之令短氣而渴地理記曰諸暨如拳之栗案出會稽部也杜寶大業拾遺録曰洛陽儀鸞殿南有烏林栗林有蒲桃架四行行長百餘步嶺表録異曰廣州無栗唯勒州山中有石栗一年方熟皮厚而肉少味似胡桃人熟時或為群鸚鵡至喙食略盡只此石栗亦甚稀少王彪之賦曰王檀侯栗王逸荔支賦曰北燕薦朔濱之巨栗蔡雍傷故栗賦曰人有折蔡氏祠前故栗者故作斯賦王褒僮約曰南安拾栗採橘南安縣名
