body:
  text: 職官部十六刑部尚書六典曰刑部尚書侍郎之職掌天下刑法及徒隸勾覆關禁之政令其屬有四一曰刑部二曰都官三曰比部四曰司門揔其職務而行其制命凡中外百司之事由於所屬咸質正焉唐書曰柳公綽為刑部尚書京兆人有姑鞭婦致死者府斷以償死公綽議曰尊毆卑非鬭且其子在以妻而戮其母非教也竟減死又曰李適之拜刑部尚書適之雅好賓友飲酒一斗不亂夜則宴賞晝決公務庭無留事刑部侍郎唐書曰太宗謂侍臣曰張亮有義兒五百畜養此輩將何為也正欲反耳命百寮議其獄多言亮當誅唯將作少匠李道裕言亮反形未具明其無罪太宗既盛怒竟斬于市籍沒其家歲餘刑部侍郎有闕令執政者妙擇其人纍奏皆不可太宗曰朕得其人也往者李道裕議張亮云反形未具此言當矣當時雖不即從至今追悔遂授道裕刑部侍郎又曰劉瑑轉刑部侍郎瑑精於法律選大中巳前二百四十四年制勑可行用者二千八百六十五條分為六百四十六門議其輕重別成一家法書號大中統類奏行用之刑部郎中刑部員外郎六典曰刑部郎中員外郎各二員掌舉其典憲而辨其輕重凡文法之名有四一曰律二曰令三曰格四曰式凡律一十有二章一曰名例二曰衛禁三曰職制四曰戶婚五曰廄庫六曰擅興七曰盜賊八曰鬭訟九曰詐僞十曰雜律十一曰捕亡十二曰斷獄而大凡五百條焉唐書曰長慶中刑部員外郎孫革奏准京兆府雲陽縣人力張蒞缺羽林官騎康憲錢米憲徵之蒞乘醉拉憲氣息將絶憲男買德年十四將救其父以蒞角觗力人不敢撝解遂持木鍤擊蒞之首見血後三日致死者准律文為人所毆人往救擊其人折傷減凡鬭三等至死依常律即買德救父難是性孝非暴擊張蒞是功非凶以髫丱之歲正父子之親若非聖化所加童子安能及此王制稱五刑之理必原父子之親以權之測淺深之量以別之春秋之義原心定罪周書訓諸罰有權今買德生被皇風幼符至孝哀矜之宥伏在聖慈職當讞刑合分善惡先具事由陳奏伏冀賜下中書門下啇量勑旨康買德尚在童年得知子道雖殺人當死而為父可哀若從沉命之科是失原情之義宜付法司減死罪一等處分都官尚書南史曰徐孝克為都官尚書自晉巳來尚書官僚皆攜家屬居省省在臺城內下舍門中有閣道東西跨路通于朝堂其第一即都官省西抵閣道年代久遠多有鬼怪每夜昏之際無故有聲光或見人著衣冠從井中出須臾復沒或門閣自然開閉居者多死云尚書周確卒於此省孝克代確便即居之經兩載祅變皆息時人咸以為貞正所致梁書曰羊侃遷都官尚書時尚書令何敬容用事與之並居未嘗遊造有宦者張僧胤候侃曰我床非閹人所坐竟不前之時論美其貞正後周書曰梁元帝以沈重領江陵遷都官尚書領羽林監察又令重於合歡殿講周禮比部郎中比部員外郎六典曰比部郎中員外郎掌勾諸司百寮俸料公廨贓贖調斂徒役課程逋懸數物以周知內外之經費而揔勾之凡內官料俸以品第高下為差外官以州縣府之上中下為差魏志曰何貞奏許都賦明帝奇之擢為比部郎中李綽尚書故實曰杜牧嘗於宰執求小儀不遂請小秋又不遂嘗夢人謂曰辭春不及秋昆腳與皆頭後果得比部員外司門郎中司門員外郎六典曰司門郎中員外掌天下諸門及關出入往來之籍賦而審其政凡關二十有六而為上中下之差所以限中外隔華夷設險作固間邪正禁者周禮司徒職司門下大夫掌授管鍵以啓閉國門幾出入不物者正其賄貨凡財物犯禁者舉之以財養死政之老與其孤禮部尚書六典曰禮部尚書侍郎之職掌天下禮儀祭饗貢舉之政令其屬有四一曰禮部二曰祠部三曰膳部四曰主客揔其職務而行其制命凡中外百司之事由於所屬皆質正焉尚書堯典帝曰咨四嶽有能典朕三禮僉曰伯夷帝曰俞伯夷汝作秩宗家語曰父子不親長幼失序君臣上下乖離異志曰不和不和則飭宗伯飭謂整攝後魏書曰孝文車駕征馬圈留宋辨以本官兼祠部尚書攝七兵事及行執其手曰國之大事在祀與戎故令卿綰攝二曹辨頓首辭謝東晉始置祠部尚書宋齊梁陳後魏北齊皆同東晉至隋乃更為禮部尚書禮部侍郎唐書曰韋陟為禮部侍郎陟好引接後輩尤鑒于文雖詞人後生靡不諳練曩者主司取與皆以一場之善登其科目不盡其才陟先責舊乃令舉人自通所工詩筆先試一日知其所長然後依常式考覆片善無遺美聲盈路又曰賈至轉禮部侍郎是歲至以時艱歲歉舉人赴省者奏請兩都分試從之兩都試舉人自此始也又曰高郢拜禮部侍郎時應進士舉者多務朋游馳聲名每歲冬州府薦送後唯追奉宴集罕隸其業郢性剛正尤嫉其風既領職拒絶請託雖同列通熟無敢言者志在經藝專考程試凡掌貢部三歲進幽獨抑浮華朋濫之風翕然一變又曰貶劉太真為信州刺史太真為禮部侍郎性愜懦詭隨其掌貢舉宰臣姻族方鎮子弟先收擢之又嘗敘陳少遊勳績擬之桓文大招物議因斯貶禮部郎中六典曰禮部郎中員外郎掌二尚書侍郎舉其儀制而辨其名數梁書曰武帝謂徐勉云今帝業初構須一人有學藝解朝儀者為尚書儀曹郎勉曰孔休源識見清通詳練故事自晉宋起居注略誦上口遂拜為儀曹郎禮部員外郎唐書曰韋叔夏授春官員外郎則天將拜洛及享明堂皆別受制共當時大儒祝欽明郭山惲撰定儀注凡所立議衆咸推服之祠部郎中祠部員外郎六典曰祠部郎中員外郎掌祠祀享祭天文漏刻國忌廟諱卜筮醫藥僧尼之事凡祭祀之名有四一曰祀天神二曰祭地祇三曰享人鬼四曰釋奠于先聖先師其差有三若昊天上帝五方帝皇地祇神州宗廟為大祀日月星辰社稷先代帝王嶽鎮海瀆帝社先蠶孔宣父齊太公諸太子廟為中祀司中司命風師雨師衆星山林川澤五龍祠等及州縣社稷釋奠為小祀梁書曰賀德基少遊學都下積年不歸衣資罄乏又車服故弊盛冬止衣夾襦袴嘗於白馬寺前逢一婦人容服甚盛呼德基入寺門脫白綸巾以贈之仍謂曰君方為重器不久貧寒故以此相遺耳問姓名不答而去德基於禮記稱為精明位尚書祠部郎雖不至大官而三世儒學俱為祠部郎時論美其不墜主客郎中主客員外郎六典曰主客郎中員外郎掌二王後及諸蕃朝聘之事後漢書何遠少有美望公府中十辟一無所就由是名重華夏起家為尚書主客郎膳部郎中膳部員外郎六典曰膳部郎中員外掌邦之牲豆酒膳辨其品數凡郊祀天地日月星辰嶽瀆享祀宗廟百神在京都者用牛羊豕滌養之數省閲之儀皆載於廩犧之職焉五代史後唐書曰膳部郎中鄭兟先奏諸司諸使職掌人吏乘暖坐帶銀魚席帽輕衣肥馬參雜庭臣尊卑無別汙染時風請下禁止上嘉其事促行之中書覆為不可趙鳳亟言於執政曰此禮誡人不可不切為權吏所庇竟寢其事工部尚書工部侍郎六典曰工部尚書侍郎之職掌天下百工屯田山澤之政令其屬有四一曰工部二曰屯田三曰虞部四曰水部揔其職務而行其制命凡中外百司之事由於所屬咸質正焉隋書曰長孫平為工部尚書名為稱職時有人告大都督邴紹非毀朝廷為憒憒者上怒將斬之平進諫曰川澤納汙所以成其深山嶽藏疾所以就其大臣不勝至願願陛下弘山海之量茂寬裕之德鄙諺曰不癡不聾未堪作大家翁此言雖小可以喻大邴紹之言不應聞奏陛下又復誅之臣恐百代之後有虧聖德上於是赦紹唐書曰閻立本代兄立德為工部尚書兄弟相代為八座時論榮之五代史晉書曰裴皞知貢舉擢桑維翰進士第後維翰居相位徵拜皞工部尚書舍於相國寺維翰謁之不迎不送或問之答曰皞見維翰於中書則庶寮也維翰見皞於館則門生也何送迎之有人重其耿介五代史周書曰盧文紀嗣業之子為工部尚書時新除工部郎中于鄴公參文紀文紀以父名同音不見或謂鄴曰南宮故事郎中入省如本行尚書侍郎不容參何以省上鄴憂畏太過一夕醉歸遂經于室其甥鄭鐐以事聞謫文紀為石州司馬工部郎中工部員外郎六典曰工部郎中員外掌經營興造之衆務凡城池之修濬土木之繕葺工匠之程式咸經度之凡興建修築材木工匠則下少府將作以奉其事屯田郎中屯田員外郎六典曰屯田郎中員外郎掌天下屯田之政令凡軍州邊防鎮守轉運不給則設屯田以益軍儲其水陸腴瘠播植地宜功庸煩省收率等咸取決焉諸屯田役力各有程數三國典略曰裴讓之十七舉秀才為屯田郎中與祖班俱聘宋邢劭省中語曰多奇多能祖孝徵能賦能詩裴讓之讓之弟讞之謀之訥之謁之並清立楊愔曰河東士族京官不少裴讓兄弟都無鄉音裴文季為不亡也隋書曰柳彧為屯田郎時三品以上門皆列戟左僕射高頴子弘德封應國公申牒請戟彧判曰僕射之子更不異居父之戟槊已列外門尊有厭卑之義子有避父之禮豈有外門既設內閣又施事竟不行頴聞而歎伏唐書曰沈扶字雲翔太和初為屯田郎中五年充山南道宣撫使至鄧州奏內鄉縣行市黃澗兩場倉督鄧琬等先主掌湖南江西運到糙米至浙川縣於荒野中囤貯除支用外六千九百四十五石裛爛成灰塵度支牒徵元掌所由自貞元二年鄧琬父子兄弟至玄孫相承繫二十八年前後禁死九人今琬孫及玄孫見在枷禁者勑曰如聞鹽鐵度支兩使此類極多其鄧琬等四人資産全巳賣納禁擊三代瘐音庾死獄中實傷和氣鄧琬等並疏放天下州府監院如有此類不得禁經三年巳上速便疏理以聞物議嘉扶有宣撫之才虞部郎中虞部員外郎六典曰虞部郎中員外郎掌天下虞衡山澤之事辨其時禁凡採捕畋獵必以其時水部郎中水部員外郎六典曰水部郎中員外掌天下川瀆陂池之政令以導達溝洫堰坎河渠凡舟楫溉灌之利咸揔而舉梁書劉孝綽兼尚書水部郎奉啓陳謝手勑答曰美錦未可便製簿領亦宜稍習頃之即真
