body:
  text: 禮儀部六郊丘尚書召誥曰翼日乙卯周公朝至于洛則達觀於新邑營越三日丁巳用牲于郊牛周書作雒曰乃設兆于南郊祀以上帝配以后稷農星先王皆與食毛詩清廟昊天有成命曰昊天有成命郊祀天地也昊天有成命二后受之成王不敢康夙夜基命宥密昊天昊大號也有成命者言周自后稷之生而已有王命也文王武王受其業施行道德成此王功周禮春官上大宗伯曰以禋祀祀昊天上帝禋之言煙煙者周人尚臭煙氣之臭聞也昊天上帝冬至祀于圓丘天皇大帝也以實柴祀日月星辰星五緯也辰日月所會十二次以槱燎祀司中司命風師雨師槱積也司中文昌宮中星也風師箕星也雨師畢星也鄭云司中司命文昌第四第五星也又春官上大宗伯曰蒼璧禮天禮天以冬至謂天皇大帝在北極者禮神必以其類璧圓象天黃琮禮地禮地以夏至謂神在崑崙方象地也又春官上典瑞曰四圭有邸以祀天旅上帝鄭衆云於中央為璧圭著其四面一玉俱成故曰四邸圭未四出或説四圭有邸有四角也上帝玄天地鄭玄曰祀天夏正郊上天也上帝五帝所郊亦猶五帝殊言天者尊異兩圭有邸以祀地旅四望兩圭者象地數二也謂所祀於北郊神州之神又春官下大司樂曰大司樂乃奏黃鍾歌大呂舞雲門以祀天神天神謂五帝及日月星辰也王者各以夏正月祀其受命之帝於南郊尊也奏太蔟歌應鍾舞咸池以祭地只地只祭於北郊謂神州之神及社稷也靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬至日於地上之圓丘奏之若樂六變則天神皆降可得禮矣此褅大祭也天神主北神靈鼓靈鼗孤竹之管空桑之琴瑟咸池之舞夏至日於澤中之方丘奏之若樂八變則地祇皆出可得而禮矣地祇主崑崙禮記禮運曰孔子曰魯之郊禘非禮也周公其衰矣𣏌之郊也禹也宋之郊也契也是天子之事守也先祖法度子孫所當守故天子祭天地諸侯祭社稷祝嘏莫敢易其常古是謂大嘏嘏亦大也不敢改其常古之法度是謂之大也又禮運曰祭帝於郊所以定天位也祀社於國所以列地利也又郊特牲曰郊之祭也迎長日之至大報天而主日也兆於南郊就陽位也掃地而祭於其質也器用陶匏以象天地之性也於郊故謂之郊牲用騂尚赤也用犢貴誠也尚赤者周也郊之用辛也自周之始郊日以至言日以至周郊天之月而日至陽氣新用事順之而用辛曰三王之郊一用夏正魯以無冬至祭天圓丘之是事以建子月郊天是先有事也用辛日者凡為人君當齋戒自新耳卜郊受命于祖廟作龜於禰宮尊祖親考之義也郊所以明天道也萬物本乎天人本乎祖此所以配上帝郊之祭也大報本反始也又明堂位曰成王封周公於魯命魯公世世祀周公以天子之禮樂是以魯君孟春乘大輅戴弧韣旗十有二旒日月之章祀帝于郊配以后稷天子之禮也又大傳曰禮不王不禘王者禘其祖之所自出以其祖配之凡大祭曰禘自由也大祭其先祖先所由生謂郊祭天王者之先祖皆感太微五帝之精蒼則靈威仰赤則赤熛怒黃則含樞紐白則白招拒黑則汁光紀皆正歲之正郊祭之蓋特尊焉孝經曰郊祀后稷以配天配靈威仰也宗祀文王於明堂以配上帝泛配五帝也又祭法曰有虞氏禘黃帝而郊嚳祖顓頊而宗堯夏后氏亦禘黃帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人亦禘嚳而郊稷祖文王而宗武王禘郊祖宗謂祭祀以配食也此禘謂祭昊天於圓丘又祭義曰郊之祭大報天而主日配以月夏后氏祭其暗殷人祭其陽周人祭日以朝及暗祭日於壇祭月於坎以別幽明以制上下祭日於東祭月於西以別內外以端其位日出於東月生於西陰陽長短終始相巡以致天下之和天下之禮致反始也致鬼神也致和用也致義也致讓也禮含文嘉曰五祀南郊北郊西郊東郊中郊兆正謀東郊去都城八里南郊九里北郊六里中郊西南去城五里兆者作封畔兆域也謀者方欲迎氣齋戒自端正謀慮其事也五者天子公侯伯子男卿大夫士所以承天也禮記外傳曰王者冬至之日祭昊天上帝於圓丘冬至一陽生非人力所為謂之丘自然高大也天體圓諸侯不祭天魯無圓丘之祭及二王之後各祭其感生帝於南郊王肅云天雄一帝鄭玄以天有六帝據周禮祀昊天又旅五帝是六星辰之位列于壇下正祭之時天尸在壇上也掃地而祭以下為貴燔牲玉於壇上又曰夏至日祭皇地祇於方澤配以后土地禮方也謂祭崑崙山之神也地之正祭歲有二此一祭也立冬之日祭神州地祇於北郊配以后稷此周制也神州即王者所居在崑崙東南五千里封域之內土地之神州此即吉士可以享帝於郊也左傳襄上曰三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事郊祀后稷以配天后稷周始祖能播植是故啓蟄而郊郊而後耕今既耕而後卜郊宜其不從也穀梁傳宣公曰郊牛之口傷之口綬辭也鼷鼠齧郊牛角不言之危辭也角者兵之象故給養不謹敬鬼神不享故緩也傷自牛作也改卜牛死乃不郊春秋繁露曰王者歲一祭天於郊天者百神之君王者所最尊也又曰春秋之義國有大喪者止宗廟之祭而不止郊祭不止郊祭者不敢以父母之喪廢事天之禮也孝經曰昔者周公郊禮后稷以配天宗祀文王於明堂以配上帝也五經異義曰春秋公羊説禮郊及日皆不卜常以正月上丁也魯與天子並事變禮今成王命魯使卜從乃郊不從即已下天子也魯以上辛郊不敢與天子同也又曰今尚書夏侯歐陽説類祭天名也以事類祭之奈何天位在南方就南郊祭之是也五經通義曰王者所以祭天地何王者父事天母事地故以子道事之也祭日以丁與辛何丁者反覆自丁寧辛者當自剋辛也爾雅曰祭天曰燔柴祭地曰瘞埋廣雅曰圓丘太壇祭天也方澤太折祭地也漢書曰高祖入關問故泰畤上帝祀何帝對曰四帝有白黃青赤之祀高祖曰吾聞天有五帝而四何也莫知其説於是高祖曰吾知之矣待我而具五也乃立黑帝之祠名曰黑畤又郊祀志曰遂郊雍至隴西登崆洞幸甘泉令祠官寬舒等具太一祠壇祠壇放亳忌太一壇壇三垓五帝壇環居其下各如其方黃帝西南除八通鬼道太一所用如雍五畤物而加醴棗脯之屬殺一狸牛以為俎豆牢具又郊祀志曰三年一郊秦以十月為歲首故常以十月上宿郊見通權火張晏曰權火烽火也狀若井桔槔矣其法類稱故謂之權欲令光明遠照通於祀所也漢祀五畤於雍五里一烽火如淳曰權舉也拜於咸陽之旁而衣上白其用如經祠云服虎曰經常又郊祀志曰武帝立后土祠於汾陰立太一祠於甘泉祭日以牛祝宰衣赤祭月以羊祝宰衣白宣帝於聖成山祠曰於芥山祭月又郊祀志曰成帝初即位丞相衡御史大夫談奏言祭天於南郊就陽之義也瘞地於北郊即陰之象也因其所都而各饗焉昔者周公文武郊於酆鎬成王郊于雒邑由此觀之天隨王者所居而饗之可見也甘泉泰畤河東后土之祠宜可徙置長安續漢書祭祀志曰建武元年光武帝即位于鄗為壇營于鄗之陽祭告天地採用元始中郊祭事二年正月初制郊兆於雒陽城南七里依鄗採元始中故事為圓壇八陛中又為皇壇天地位其上皆南嚮又祭祀志曰北郊在雒陽城北四里為方壇四階二年初別祠地祗位南面西上高皇后配西面北上皆在壇上地理群神從食皆在壇下東觀漢記曰上都雒陽制兆於城南七里北郊四里行夏之時時以平旦服色犧牲尚黑明火德之運常服徽熾尚赤四時隨色季夏黃色議者曰昔周公郊祀后稷以配天宗祀文王以配上帝圖讖著伊堯赤帝之子俱與后稷並受命而為王漢劉祖令宜郊祀帝堯以配天宗祀高祖以配上帝有司奏議曰追迹先代無郊其五運之祖者故禹不郊白帝周不郊帝嚳漢雖唐之苗堯以歷數命舜高祖自感赤龍火德承運而起當以高祖配堯之後還復於漢宜修奉濟陽成陽縣堯冢雲臺致敬祭祀禮亦宜之又曰光武中元年起明堂璧雍靈臺及北郊謝承後漢書曰丹陽方儲聰明善天文為洛陽令章帝欲出南郊儲上言當有疾雨暴風乘輿不可以出上疑其妄儲飲鴆而死果有大風暴雨洛中晝暝後漢書曰光武嘗問鄭興郊祀事曰吾欲以讖斷之何如興對曰臣不為讖帝怒曰卿之不為讖非之邪興惶恐曰臣於書有所未學而無所非也帝意乃解漢舊儀曰漢制天地以下群臣所祭凡千五百四十新益為萬五千四十漢法三歲一祭天於雲陽宮甘泉壇以冬至日祭天天神下三歲一祭地於河東汾陰后土宮以夏至日祭地地神出五帝祭於雍五畤又曰祭天用六綵綺席六重長一丈中一幅四周緣之玉飾器凡器七千三百物備具養牛五歲至三千斤又曰皇帝祭天居雲陽宮齋百日上甘泉通天臺高三十丈以候天神之下見如流火舞女童三百皆年八歲天神下壇所舉烽火皇帝就竹宮中不至壇所甘泉臺去長安三百里望見長安城黃帝以來所祭天之圓丘也又曰祭地河東汾陰后土宮宮曲入河古之祭地澤中方丘也禮儀如祭天名曰汾葵一曰葵丘也宋書禮志曰魏文帝黃初二年正月郊祀天地明堂是時魏都洛京而神祇兆域明堂靈臺皆因漢舊事四年帝將東巡以大軍當出使太常以一特牛告祠南郊自後以為常又禮志曰太和元年正月郊祀武皇帝以配天宗祀文皇帝於明堂以配上帝是時二漢郊禋之制具存魏所損益可知也又禮志曰魏景初元年始營洛陽南委粟山為圓丘詔曰昔漢氏之初承秦滅學之後採托殘缺以備郊祀自甘泉后土雍宮五畤神祇兆位多不經見並以興廢無常一彼一此四百餘年廢無禘禮古代之所更立者遂有闕焉曹氏世繫出自有虞氏今祀圓丘以始祖帝舜配地以舜妃伊氏配天郊所祭曰皇天之神以太祖武皇帝配地郊所祭曰皇地之祗以武宣皇后配宗祀皇考高祖文皇帝於明堂以配上帝江表傳曰群臣以孫權未郊祀奏議曰頃者嘉瑞屢臻遠國慕義宜備郊祀以承天意權曰郊祀當於中土今非其所於何施此重奏曰普天之下莫非王土王者以天下為家周文武郊酆鄗非必中土權曰武王伐紂即作鄗京而郊其所也文王未為天子立郊于酆見何經典復奏曰伏見漢書郊祀志匡衡奏徙甘泉河東郊於長安言文王郊於酆權曰文王德性謙讓處諸侯之位明未郊也經傳無明文匡衡俗儒臆説非典籍正義不可用志林曰吳主糾駮郊祀之奏追貶匡衡謂之俗儒凡在見者莫不慨然以為妙盡物理達於事宜至於稽之典籍乃更不通毛氏之説云堯見天因以邰而生后稷故國之於邰命使事天故詩曰后稷肇祀庶無罪悔以迄于今言自后稷以來皆得祭天猶魯人郊祀也是以棫朴之作有積燎之薪文王郊酆經有文匡衡豈俗而柱之哉文王雖未為天子然三分天下有二伐崇龕黎祖伊奔告天既棄殷乃眷西顧太伯三讓以有天下文王為王於義何疑然則匡衡之奏有所未盡案世宗立甘泉汾陽之祠皆出方士之言非據經典者也方士以甘泉汾陽黃帝祭天地之處故孝武因之遂立二畤漢治長安而甘泉在北謂就乾位而衡云武帝居甘泉祭於宮南此既誤矣祭地汾陽在水之間呼為澤中而衡云東之少陽失其本意矣晉起居注曰武帝太始元年十二月太常諸葛緒上言知士祭酒劉喜等議帝王各尊其祖所自出大晉禮天郊當以宣皇帝配地郊宣皇后配明堂以景皇帝文皇帝配博士孔朝議禮王者郊天以其祖配周公以后稷配天於南郊以文王配五精上帝於明堂經典無配地文魏以先妃配不合禮制周配祭不及武王禮制有斷今晉郊天宜以宣皇帝配明堂宜以文皇帝配有司奏大晉初建庶事未定且如魏詔郊祀大事速議為定晉書禮志曰晉太始二年詔群臣議五帝即天也王氣時異故殊其號雖名有五其實一神明堂南郊宜除五帝之坐五郊改五精之號皆同稱昊天上帝各設一坐而已又禮志曰康帝建元元年正月將北郊有疑議太常顧和表北郊之月古無明文漢光武正月辛未始建北郊則與南郊同月咸和中北郊同共正月周禮三王之郊一用夏正於是從和議是月辛未南郊辛巳北郊帝皆親奉宋書禮志曰晉孝武帝詔曰郊祀國之大事而稽古之制闕然便可詳議祠部郎徐邈議圓丘郊祀經典無二宣皇帝嘗辨斯義而撿以聖典爰及中興備加研極以定南北二郊誠非異學所可輕改也謂仍舊為安晉起居注曰明帝大寧三年上親祠七月又詔自中興以來雖南郊未嘗北郊五嶽四瀆名山大川應望祑者廢而未舉居其官者舉其職司其事勿令一代之典闕而不備主者詳依舊處又曰安帝元興三年十二月明年應郊乘輿未反博訪內外左丞王納之議曰議者謂應郊故承制中事納之謂大饗大祀大樂皆是承制不可得命三公行者郊天極尊唯一而已故非天子不祀也又案武皇受禪用二月郊元年中興亦以二月今郊時未過日望鑾駕無為欲速而據皇輿旋反更不得親奉不如緩而盡美於是異同難明遂從納之議宋書禮志曰晉太始二年十一月有司又議古者丘郊不異宜并圓丘方丘於南北郊更修治壇兆其二至之祀合於二郊帝又從之一如宣帝所用王肅議也是月庚寅冬至帝親祀圓丘於南郊自是後圓丘方澤不別立又曰孫權始都武昌及建業不立郊兆至未年太元元年十一月祭南郊其地今秣陵縣南十餘里郊中是也晉氏南遷立南郊於己地非禮所謂陽位之義也宋武大明三年尚書右丞徐爰議郊祀之位遠古薎聞禮記燔柴於太一祭天也兆於南郊就陽位也漢初甘泉河東禋埋易位終亦徙於長安南北光武紹祚定二郊洛陽南北晉氏過江悉在北及郊兆之議紛然不一又南出道狹未議開闡遂於東南己地創立丘壇皇宋受命因而弗改且居民之中非邑外之謂今聖圖重造舊章畢新南驛開塗陽路修遠謂宜郊正午以定天位博士司馬興之傳郁太常丞陸澄並同爰議乃移郊兆於秣陵牛頭山西正在宮之午地也傳玄正都賦曰建乎禋祀祈福上帝天子乃反古服襲大裘綖紐五采平冕垂旒質文斌斌帝容孔修列大駕於郊畛升八通之靈壇執鎮圭而進蒼壁思致美乎上乾爾乃太蔟為徵圓鍾為宮吹孤竹而拊雲和修軒轅之遺風類於圓丘六變既終則天神斯降可得而禮矣司馬相如封禪書曰濯濯之麟遊彼靈畤孟冬十月君徂郊祀馳我君車帝以享祉郭璞上疏曰臣歲首粗有所占得解之既濟案解卦繇云君子以赦過宥罪既濟云思患而預防之郊祀者以通天人之誠感因農祥而祈事上乃致敬於皇靈下以播惠於萌黎者也臣愚以為於卦之義既郊之後宜發哀矜之詔引在豫之責蕩除瑕釁贊陽布惠使幽弊之民應養生以悅育否滯之氣隨谷風而舒散此亦寄時事以制用藉開塞而曲成者也
