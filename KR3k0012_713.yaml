body:
  text: 服用部十四尉斗通俗文曰火斗曰尉帝王世紀曰紂欲重刑乃先作大尉斗以火爇之使人舉不能勝輒爛手與妲己為戲笑魏末傳曰優人欲使幼帝取大將軍昭昌尉斗柄帝不敢發晉書曰韓康伯年數歲殷氏高明時大寒母方為作袴令康伯捉尉斗而謂之曰且著襦尋當作復袴康伯曰火在斗中而柄尚熱今既著襦下亦當暖又張蕪別傳曰蕪小時母謂其寒且作袴蕪曰且作襦如尉斗著火柄亦熱隋書曰尉遲逈反於鄴時李穆在并州高祖慮其為逈所誘遣使往布腹心穆遽奉尉斗於高祖曰願以此慰安天下也高祖大悅三輔故事曰董卓壞銅人十枚為小錢尉斗淮南子曰糟丘生於象箸炮烙始於熱斗許慎曰熱斗尉斗也爛人手遂作炮烙之刑也晉東宮舊事曰皇太子納妃有金塗尉斗三枚魏武帝集上騰所得順帝賜物銅尉斗二枚澡盤魏武上雜物疏曰御物有純銀盤又有容五石銅澡盤也杜預奏事曰澡盤尉斗民間要用世説曰大將軍王敦至石崇家如廁還有數十婢曳羅縠擎金澡盤盛水琉璃盛澡豆因令著水調而飲之謂是乾飯群婢莫不大笑也述征記云長安逍遙宮門裏有澡盤面徑丈二也異苑曰中朝有人畜銅澡盤旦夕恆鳴張華曰與洛鍾宮商相諧故聲相應錯鑢之乃止傅玄澡盤銘曰與其澡於水寧澡於德水之清猶可穢也德之興不可塵也澡灌四王起事曰惠帝征成都軍敗帝渴帳下齎五升銅灌就民家取水就灌飲之齊書曰劉悛少與齊武款好帝常至悛宅晝臥覺悛自奉金澡灌受四升水以沃盥因以與帝前後所納稱此東宮舊事曰皇太子初拜有金塗澡灌一枚青絲三合繩一枚長二丈五尺又曰皇太子納妃有金澡灌二枚西域諸國志曰月支國有佛澡灌受二升許青石名羅勒色碧玉班白受水無定隨其多少惠遠法師澡灌銘序曰得摩羅偷石澡灌一枚故以此銘答之伏虎周禮天官曰大尉掌王燕衣服凡褻器鄭司農云褻器溺器虎子也春秋後語曰智伯圍趙襄子於晉陽襄子大敗智伯軍殺智伯漆其頭以為飲器穢器虎子也史記曰凶奴破月氏王以其頭為飲器魏略曰蘇則為侍中舊侍中親省起居故俗因謂執虎子始蘇則同隱吉茂後見嘲之曰仕宦不己執虎子録異傳曰吳時嘉興倪彥思忽有鬼魅其家能與人語飲食如人唯不見形思乃延道士逐之酒肴既設道士便擊鼓召請諸神魅乃取伏虎於神坐吹作角聲以亂音頃道士忽覺背中冷驚起解衣乃伏虎也馬融遺令曰穿中不得下銅虎況它銅物
