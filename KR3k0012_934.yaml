body:
  text: 鱗介部五蛇上周易繫辭下曰尺蠖之屈以求信也龍蛇之蟄以存身也爾雅曰螣螣蛇龍類也能興雲霧而遊其中淮南云蟒蛇蟒王蛇郭璞注曰蟒蛇最大者故曰王蛇左傳莊公曰初內蛇與外蛇鬭於鄭南門之中內蛇死六年而厲公入又文下曰有蛇自泉宮出入于國如先君之數自伯禽至僖公十七君秋八月辛未聲薑薨毀泉臺魯人以為蛇妖所出而聲薑薨故壞之又襄三叔向母曰深山大澤實生龍蛇又襄五梓慎曰今茲宋鄭其飢乎蛇乘龍蛇玄武之宿虛危之星史記曰秦文公夢黃蛇自天下屬地其口出於鄜衍文公問史敦敦曰此上帝之徵君其祠之於是作鄜峙漢書曰高祖以亭長送徒驪山夜行經豐西大澤中有大蛇當道拔劍斬之遂行後人至者見一老嫗哭蛇曰此白帝子也向赤帝子過而殺之媼因忽然不復見後漢書曰華他嘗行道見有病咽塞者咽喉也因語之曰向來道隅有賣餅人䓑齏甚酸可取三升飲之病自當去即如他言乃立吐一蛇晉書曰杜預先在荊州因宴集醉臥齋中外人聞嘔吐聲竊窺於戶而見一大蛇垂頭而吐聞者異之又曰樂廣常有親客久闕不復來廣問其故答曰前在坐蒙賜酒方欲飲見杯中有蛇意甚惡之既飲而疾于時河南廳事壁上角漆畫作蛇廣意杯中蛇即角影也復置酒於處謂客曰酒中復有所見不答曰所見如初廣乃告其所以客豁然而解沉痾頓愈又曰趙王倫篡位殿上有大蟒及小蟒耳間垂肉似重孝幘小蟒亦然又曰慕容熙遊于城南止大柳樹下若有人呼曰大王且止熙惡之伐其樹乃有蛇長丈餘從樹中而出又曰沮渠蒙遜攻浩舋而蛇盤於帳前蒙遜笑曰前為一騰蛇今盤在吾帳天意欲吾回師先定酒泉燒攻具而還沈約宋書曰劉秀之少孤貧有志操十許歲時與諸兒戲於前渚忽有大蛇來勢甚猛莫不顛沛驚呼秀之獨不動衆並異焉南史曰梁主衣庫見黑蛇長丈許數十小蛇隨之舉頭高丈餘南望俄失所在帝又與宮人幸玄州苑復見大蛇盤屈於道群小蛇繞之並黑色帝惡之宮人曰此非怪也恐是錢龍帝勑所司即日取數十萬錢鎮於蛇處以厭之因設法會赦囚徒賑窮乏退居栖心省又有蛇從屋墜落帝帽上忽然便失又龍光殿上所御肩輿復見小蛇縈屈輿中以頭駕夾膝前金龍頭上見人走逐之不及梁書曰倭國有獸如牛名山鼠又有大蛇吞此獸蛇皮堅不可斫其上有孔乍開乍閉時或有光射中之蛇則死矣陳書曰後主末年昏淫政亂祕書監傅縡上書諫諍後主逼令自盡死後有惡蛇上屋來靈床當前受祭酹而去復來百有餘日時有彈指聲俄而陳滅後魏書曰東魏孝靜帝武定中有大蛇見武牢城上時北豫州刺史高仲蜜以孝牢叛死者數千人後武消難之任武牢蛇又見消難亦叛土人謂之雌龍隋書曰煬帝大業末年翟讓初見李密衣在格上密腰帶化為赤蛇讓心異之竟為密所殺又曰薛濬初為童兒時與宗中諸兒遊戲于澗濱見一黃蛇有角及足召群兒共視了無見者濬以為不祥歸而憂悴母逼而問之濬以賓對時有胡僧詣宅乞食濬母怖而告之僧曰此乃兒之吉應且是兒也早有名位然壽不過六七耳言終而出忽然不見時咸異之既而壽終於四十二六七之言於是驗矣又曰李密據偃師王世充領兵討之夜有班蛇長丈餘向寢屋作聲如牛吼執伏者斬之明日戰大潰匹馬歸國唐書曰太宗屯桓壁常欲覘敵潛軍遠抄騎皆四散太宗與一甲士登丘而睡俄然賊兵四面雲合不之覺也會有蛇逐鼠觸甲士驚起因見賊至遽白太宗而俱上馬馳百餘步為賊所及發大羽箭射之殪其驍將賊騎乃退當時以為神異焉又曰建中三年趙州寧晉縣仁孝里沙北有棠樹甚茂百姓禱之為神忽有群蛇數千自東南來趨北岸集棠樹下為二積留居南岸者為一積俄有三龜徑寸繞行積傍積蛇盡死而後各登其積野人以告蛇腹皆有瘡若矢所中又曰元和中五坊小使每群藂於賣酒食家肆情飲啖將去留蛇一篋誡之曰吾以此蛇致供奉鳥雀可善飼之無使飢渴主人賂而謝之方肯攜蛇篋而去又曰李朝晟為邠州刺史城方渠無水師徒囂然遽有青蛇乘高而下視其迹水隨而流朝晟令築防環之遂為停泉軍人仰飲以足圖其事上聞詔致祠焉又曰罽賓國有鼠喙尖而尾赤能食蛇有被蛇螫者鼠輒嗅而尿之其瘡立愈後唐史曰清泰三年春有蛇鼠鬭于師子門外而鼠殺蛇晉史曰高祖即位之前一年歲在乙未鄴西李固橋下鼠與蛇鬭鬭及日之中蛇不勝而死行人觀者志之後唐果滅於申周史曰太祖常寢柴后見五色小蛇入顴鼻間心異之知其必貴敬奉愈厚戰國策曰昭陽為楚伐魏覆軍殺將移師攻齊陳軫為齊王使見昭陽曰楚有祠者賜其舍人酒一巵巵酒器也受四升巵章移切舍人相謂曰數人飲之不足一人飲之有餘請各畫地為蛇蛇先成者飲酒一人先成引酒且飲之乃左手持巵右手畫蛇曰吾能為之足為足未成一人蛇後成奪其巵曰蛇故無足子安能為之足遂飲其酒為蛇足者終亡其酒今公攻魏破軍殺將又將移師攻齊齊畏公甚戰勝不知止猶為蛇足昭陽解軍而歸孫子兵法曰善用兵者譬如率然率然常山之蛇也擊其首則尾至擊其尾則首至擊其中身則首尾俱至慎子曰騰蛇遊霧飛龍乘雲雲罷霧散與蚯蚓同韓子曰昔黃帝合鬼神於西太山作為青角虎狼在前蟲蛇伏後又曰蟺似蛇而蠶似蠋音屬人見蛇則驚駭見蠋則毛起漁者持蟺婦人拾蠶利之所在皆為賁諸又曰鴟夷子皮事田成子成子去齊亡之燕鴟夷子皮負傳而從至望邑曰子獨不聞涸澤之蛇乎澤涸將徙有小蛇謂大蛇曰大蛇行而小蛇隨之人以為蛇之行者耳必有殺子子不如相銜負我以行人必以我為神也乃相負越公道而行人皆避之今子美而我惡以子為我上客一乘之君也以子為我使者萬乘之卿也不如為我舍人田成子負傳而隨之至逆旅君待之甚敬因獻酒肉淮南子曰越人得蚺蛇以為上肴中國得而棄之無用蚺蛇大蛇也其長數丈又曰犧牛騂毛宜於牲其象以致雨不若黑戾黑戾黑色蛇屬也戾潛於水神象能致雨也又曰神蛇能斷而復屬而不能使人勿斷也又曰昔容成氏之時道路鴈作行而處容成黃帝時造曆上記嬰兒於巢上致餘糧於畝首虎豹可尾蛇虺可蹶又曰虎豹不可使緣木蝮蛇不可以安足淮南萬畢術曰烏喙蛇肝病病作不苦取烏喙蛇肝各等治和丸如梧桐實作吞一丸人不倦矣抱朴子曰巳日山中稱寡人者社中蛇也又曰或問隱居山澤治蛇蝮之道曰昔員丘多大蛇又生好藥黃帝將登焉廣成子教之佩雄黃而蛇去也今帶武都雄黃色如雞冠者五兩以入山林則不畏蛇蛇若中人以少許雄黃末傳之瘡中登愈又曰蛇類雖多唯有蛇蝮中人至急一日不治則殺人若不曉方術而為此蛇所中者但以刀割瘡肉投地其肉沸如火須臾燋盡而人得活也山海經曰泰華山有蛇名曰肥遺六足四翼見則天下大旱又曰巴蛇吞象三歲而出骨君子服之已心腹之疾今南方蚺蛇吞鹿已爛自絞於樹腹中骨皆穿鱗甲間出此類也又曰大同之山有蛇名曰長蛇其毛如彘豪其音如鼓柝如鼓人擊柝身音吒又曰鱗山多鳴蛇其狀如蛇四翼音如磬見則大旱又曰黑齒人為人黑齒有蛇一赤一青在其傍又曰雨師為人黑手各操一蛇星經曰騰蛇二十二星在室北近河主蟲蛇説苑曰齊景公獵上山見虎下澤見蛇問晏子曰此不祥耶曰有賢不知知而不用用而不任此不祥耶山是虎室澤是蛇窟何不祥乎新序曰太子申生至靈臺蛇繞左輪御曰速得國之祥太子遂不反伏劍而死賈誼書曰晉文公出田前驅還曰前有大蛇其高如隄橫道而處文公曰還車而歸其御曰臣聞祥則迎之妖則凌之今前有妖請攻之公曰不可吾聞天子夢惡則修道諸侯夢惡則修政大夫夢惡則修身善是則禍不至今我有失行而天戒以妖我若攻之是逆天令也乃歸齋宿而請於廟退而修政居三日夢天誅蛇曰爾何敢當聖君之路文公覺令人視之蛇已魚爛矣新序同又曰孫叔敖之為兒出遊還憂而不食其母問其故泣而對曰今旦見兩頭之蛇恐死母問曰今蛇安在曰聞見兩頭蛇者死恐他人復見之已殺而埋之母曰無憂汝不死矣吾聞之有陰德者天報以福新序同列仙傳曰玄俗者自言河間人餌巴豆雲母賣藥於都市七丸一錢治百病河間王病買服之下蛇十餘頭酈善長水經注曰南鄉故城城南外舊有郡社柏樹大三十圍蕭欣為郡伐之言有大蛇從樹腹中墜下大數十圍長三丈小蛇數十隨之入南山聲如風雨伐樹之前見夢於欣欣不以厝意及伐之少日果死又曰漢水又東合洛水水有二源合注壑於神蛇戍西左右山溪多五色蛇性馴良不為物毒又曰交州山多大蛇名曰蚺蛇長十丈圍七八尺常在樹上伺鹿獸鹿獸過便低頭繞之有頃鹿死先濡令濕訖便合頭角噉之骨皆鑽皮出山夷始見蛇不動時便以大竹籤籤蛇頭至尾殺而食之以為珍異故楊氏南裔異物志曰蚺唯大蛇既洪且長采色駮犖其文錦章食灰吞鹿腴成養創賓享嘉宴是豆是觴言其養創之時昉腴甚肥
