body:
  text: 鱗介部五虵上周易繫辭下曰尺蠖之屈以求信也龍虵之蟄以存身也爾雅曰螣螣虵龍類也能興雲霧而遊其中淮南云蟒虵蟒王虵郭璞注曰蟒虵最大者故曰王虵左傳莊公曰初內虵與外虵鬭於鄭南門之中內虵死六年而厲公入又文下曰有虵自泉宮出入于國如先君之數自伯禽至僖公十七君秋八月辛未聲姜薨毀泉臺魯人以為虵妖所出而聲姜薨故壞之又襄三叔向母曰深山大澤實生龍虵又襄五梓慎曰今茲宋鄭其饑乎虵乘龍虵玄武之宿虛危之星史記曰秦文公夢黃虵自天下屬地其口出於鄜衍文公問史敦敦曰此上帝之徵君其祠之於是作鄜峙漢書曰高祖以亭長送徒驪山夜行經豐西大澤中有大虵當道拔劍斬之遂行後人至者見一老嫗哭虵曰此白帝子也向赤帝子過而殺之媼因忽然不復見後漢書曰華他嘗行道見有病咽塞者咽喉也因語之曰向來道隅有賣餅人䓑齏甚酸可取三升飲之病自當去即如他言乃立吐一虵晉書曰杜預先在荊州因宴集醉臥齋中外人聞嘔吐聲竊窺於戶而見一大虵垂頭而吐聞者異之又曰樂廣常有親客久闕不復來廣問其故荅曰前在坐蒙賜酒方欲飲見盃中有虵意甚惡之既飲而疾于時河南廳事壁上角漆畫作虵廣意盃中虵即角影也復置酒於處謂客曰酒中復有所見不荅曰所見如初廣乃告其所以客豁然而解沉痾頓愈又曰趙王倫篡位殿上有大蟒及小蟒耳間垂肉似重孝幘小蟒亦然又曰慕容熙遊于城南止大柳樹下若有人呼曰大王且止熙惡之伐其樹乃有虵長丈餘從樹中而出又曰沮渠蒙遜攻浩舋而虵盤於帳前蒙遜笑曰前為一騰虵今盤在吾帳天意欲吾回師先定酒泉燒攻具而還沈約宋書曰劉秀之少孤貧有志操十許歲時與諸兒戲於前渚忽有大虵來勢甚猛莫不顛沛驚呼秀之獨不動眾並異焉南史曰梁主衣庫見黑虵長丈許數十小虵隨之舉頭高丈餘南望俄失所在帝又與宮人幸玄州苑復見大虵盤屈於道群小虵遶之並黑色帝惡之宮人曰此非怪也恐是錢龍帝勑所司即日取數十萬錢鎮於虵處以厭之因設法會赦囚徒賑窮乏退居栖心省又有虵從屋墜落帝帽上忽然便失又龍光殿上所御肩輿復見小虵縈屈輿中以頭駕夾膝前金龍頭上見人走逐之不及梁書曰倭國有獸如牛名山鼠又有大虵吞此獸虵皮堅不可斫其上有孔乍開乍閉時或有光射中之虵則死矣陳書曰後主末年昏淫政亂秘書監傅縡上書諫諍後主逼令自盡死後有惡虵上屋來靈床當前受祭酹而去復來百有餘日時有彈指聲俄而陳滅後魏書曰東魏孝靜帝武定中有大虵見武牢城上時北豫州刺史高仲蜜以孝牢叛死者數千人後武消難之任武牢虵又見消難亦叛土人謂之雌龍隋書曰煬帝大業末年翟讓初見李密衣在格上密腰帶化為赤虵讓心異之竟為密所殺又曰薛濬初為童兒時與宗中諸兒遊戲于澗濱見一黃虵有角及足召群兒共視了無見者濬以為不祥歸而憂悴母逼而問之濬以賓對時有胡僧詣宅乞食濬母怖而告之僧曰此乃兒之吉應且是兒也早有名位然壽不過六七耳言終而出忽然不見時咸異之既而壽終於四十二六七之言於是驗矣又曰李密據偃師王世充領兵討之夜有班虵長丈餘向寢屋作聲如牛吼執伏者斬之明日戰大潰疋馬歸國唐書曰太宗屯桓壁常欲覘敵潛軍遠抄騎皆四散太宗與一甲士登丘而睡俄然賊兵四面雲合不之覺也會有虵逐鼠觸甲士驚起因見賊至遽白太宗而俱上馬馳百餘步為賊所及發大羽箭射之殪其驍將賊騎乃退當時以為神異焉又曰建中三年趙州寧晉縣仁孝里沙北有棠樹甚茂百姓禱之為神忽有群虵數千自東南來趨北岸集棠樹下為二積留居南岸者為一積俄有三龜徑寸繞行積傍積虵盡死而後各登其積野人以告虵腹皆有瘡若矢所中又曰元和中五坊小使每群藂於賣酒食家肆情飲啖將去留虵一篋誡之曰吾以此虵致供奉鳥雀可善飼之無使飢渴主人賂而謝之方肯攜虵篋而去又曰李朝晟為邠州刺史城方渠無水師徒囂然遽有青虵乘高而下視其跡水隨而流朝晟令築防環之遂為停泉軍人仰飲以足圖其事上聞詔致祠焉又曰罽賓國有鼠喙尖而尾赤能食虵有被虵螫者鼠輒嗅而尿之其瘡立愈後唐史曰清泰三年春有虵鼠鬭于師子門外而鼠殺虵晉史曰高祖即位之前一年歲在乙未鄴西李固橋下鼠與虵鬭鬭及日之中虵不勝而死行人觀者志之後唐果滅於申周史曰太祖常寢柴后見五色小虵入顴鼻間心異之知其必貴敬奉愈厚戰國策曰昭陽為楚伐魏覆軍殺將移師攻齊陳軫為齊王使見昭陽曰楚有祠者賜其舍人酒一巵巵酒器也受四升巵章移切舍人相謂曰數人飲之不足一人飲之有餘請各畫地為虵虵先成者飲酒一人先成引酒且飲之乃左手持巵右手畫虵曰吾能為之足為足未成一人虵後成奪其巵曰虵故無足子安能為之足遂飲其酒為虵足者終亡其酒今公攻魏破軍殺將又將移師攻齊齊畏公甚戰勝不知止猶為虵足昭陽解軍而歸孫子兵法曰善用兵者譬如率然率然常山之虵也擊其首則尾至擊其尾則首至擊其中身則首尾俱至慎子曰騰虵游霧飛龍乘雲雲罷霧散與蚯蚓同韓子曰昔黃帝合鬼神於西太山作為青角虎狼在前蟲虵伏後又曰蟺似虵而蠶似蠋音屬人見虵則驚駭見蠋則毛起漁者持蟺婦人拾蠶利之所在皆為賁諸又曰鴟夷子皮事田成子成子去齊亡之燕鴟夷子皮負傳而從至望邑曰子獨不聞涸澤之虵乎澤涸將徙有小虵謂大虵曰大虵行而小虵隨之人以為虵之行者耳必有殺子子不如相衘負我以行人必以我為神也乃相負越公道而行人皆避之今子美而我惡以子為我上客一乘之君也以子為我使者萬乘之卿也不如為我舍人田成子負傳而隨之至逆旅君待之甚敬因獻酒肉淮南子曰越人得蚺虵以為上肴中國得而棄之無用蚺虵大虵也其長數丈又曰犧牛騂毛宜於牲其象以致雨不若黑戾黑戾黑色虵屬也戾潛於水神象能致雨也又曰神虵能斷而復屬而不能使人勿斷也又曰昔容成氏之時道路鴈作行而處容成黃帝時造曆上記嬰兒於巢上致餘糧於畝首虎豹可尾虵虺可蹶又曰虎豹不可使緣木蝮虵不可以安足淮南萬畢術曰烏喙虵肝病病作不苦取烏喙虵肝各等治和丸如梧桐實作吞一丸人不倦矣抱朴子曰巳日山中稱寡人者社中虵也又曰或問隱居山澤治虵蝮之道曰昔員丘多大虵又生好藥黃帝將登焉廣成子教之佩雄黃而虵去也今帶武都雄黃色如鷄冠者五兩以入山林則不畏虵虵若中人以少許雄黃末傳之瘡中登愈又曰虵類雖多唯有虵蝮中人至急一日不治則殺人若不曉方術而為此虵所中者但以刀割瘡肉投地其肉沸如火須臾燋盡而人得活也山海經曰泰華山有虵名曰肥遺六足四翼見則天下大旱又曰巴虵吞象三歲而出骨君子服之已心腹之疾今南方蚺虵吞鹿已爛自絞於樹腹中骨皆穿鱗甲間出此類也又曰大同之山有虵名曰長虵其毛如彘豪其音如鼓柝如鼓人擊柝身音吒又曰鱗山多鳴虵其狀如虵四翼音如磬見則大旱又曰黑齒人為人黑齒有虵一赤一青在其傍又曰雨師為人黑手各操一虵星經曰騰虵二十二星在室北近河主蟲虵說苑曰齊景公獵上山見虎下澤見虵問晏子曰此不祥耶曰有賢不知知而不用用而不任此不祥耶山是虎室澤是虵窟何不祥乎新序曰太子申生至靈臺虵遶左輪御曰速得國之祥太子遂不反伏劍而死賈誼書曰晉文公出田前驅還曰前有大虵其高如隄橫道而處文公曰還車而歸其御曰臣聞祥則迎之妖則凌之今前有妖請攻之公曰不可吾聞天子夢惡則脩道諸侯夢惡則脩政大夫夢惡則脩身善是則禍不至今我有失行而天戒以妖我若攻之是逆天令也乃歸齋宿而請於廟退而脩政居三日夢天誅虵曰爾何敢當聖君之路文公覺令人視之虵已魚爛矣新序同又曰孫叔敖之為兒出遊還憂而不食其母問其故泣而對曰今旦見兩頭之虵恐死母問曰今虵安在曰聞見兩頭虵者死恐他人復見之已殺而埋之母曰無憂汝不死矣吾聞之有陰德者天報以福新序同列仙傳曰玄俗者自言河間人餌巴豆雲母賣藥於都市七丸一錢治百病河間王病買服之下虵十餘頭酈善長水經注曰南鄉故城城南外舊有郡社柏樹大三十圍蕭欣為郡伐之言有大虵從樹腹中墜下大數十圍長三丈小虵數十隨之入南山聲如風雨伐樹之前見夢於欣欣不以厝意及伐之少日果死又曰漢水又東合洛水水有二源合注壑於神虵戍西左右山溪多五色虵性馴良不為物毒又曰交州山多大虵名曰蚺虵長十丈圍七八尺常在樹上伺鹿獸鹿獸過便低頭繞之有頃鹿死先濡令濕訖便合頭角噉之骨皆鑽皮出山夷始見虵不動時便以大竹籤籤虵頭至尾殺而食之以為珍異故楊氏南裔異物志曰蚺唯大虵既洪且長采色駮犖其文錦章食灰吞鹿腴成養創賓享嘉宴是豆是𨢩言其養創之時昉腴甚肥
