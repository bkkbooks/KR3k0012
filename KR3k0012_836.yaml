body:
  text: 資産部十五錢上周禮天官下曰外府掌邦布之入出以共百物而待邦之用凡有法者布泉也布讀為宣布之布其藏曰泉其行曰布取名於水泉其流行無不偏泉始蓋一品周景王鑄大泉而有二品後數變易不復識本制至漢唯有五銖久行王莽改貨而易作泉布多至十品今存於民間多者有貨布大泉貨泉貨布長二寸五分廣寸首長八分有奇廣八分其圜好徑二分半足枝長八分其右文曰貨左文曰布重二十五銖直貨泉二十五大泉徑一寸二分重十二銖文曰大泉直十五貨泉貨泉徑一寸重五銖右文曰貨左文曰泉直一也國語曰周景王二十一年將鑄大錢景王周靈王之子錢者金幣之名所以質買物通財用也古曰泉後轉曰錢大錢大於舊其價重也單穆公曰不可穆公王卿士單靖公曾孫古者天災降戾於是乎量資幣權輕重以振救民量度資財也權稱振拯也民患輕則為這作重幣以行之民患幣輕而物貴則作重幣以行其輕也於是乎有母權子而行民皆得焉重曰母輕曰子以子貨物物輕則子獨行物重則以母權而行之也子母相通民皆得其欲也若不堪重則多作輕而行之亦不廢重於是乎有子權母而行小大利之堪任也不任者幣重物輕則妨其用也故雜而用之子權母者母不足則以子平而行之故民皆以為利今王廢輕而作重民失其資能無匱乎廢輕而作重則大竭而未寡故民失其資若匱王用將有所乏民財匱無以供上故王用將乏乏則將厚取於民民不給將有遠志是離民也給供也遠志通逃也若民離而財匱災至而備亡王其若之何病亡無救災之備也王其圖之王弗聽卒鑄大錢歸藏曰有人將來遺我錢財曰夜望之周書曰武王剋商發鹿臺之錢散巨橋之粟韓詩曰既詐我德賈用不售一錢之物舉賣百何時當售乎史記曰初蘇秦之燕貸百錢為資及得資以百金償之又曰高祖以愛繇咸陽吏皆送奉錢三李奇注或三百或五百蕭何獨以五後益封二千戶又曰單父人呂公善沛令避仇從之沛中豪傑吏聞令有客皆往賀蕭何為主吏主進令諸大夫曰不滿千錢坐堂下高祖為亭長素易諸吏乃紿為謁曰賀錢萬實不持一錢又曰上使善相者相鄧通曰當貧餓死文帝曰能富通者在我何謂貧於是賜通蜀嚴道銅山自鑄錢鄧氏錢布天下又曰安息在大月氏西以銀為錢錢如其王面王死轉更錢效王面焉又曰今上即位武帝數歲漢興七十餘年之間國家無事京師之錢纍百巨萬貫朽而不可校自孝文造四銖錢至是歲三十餘年從建元以來用少縣官往多即銅山鑄錢民益盜鑄不可勝數錢益少而貴漢書曰秦兼天下幣為三等黃金以鎰為名孟子曰二十兩為鎰臣瓚按秦以一鎰為一金漢以一斤為一金上幣銅錢漢興以為秦錢重難用更令民鑄莢錢如淳曰如榆莢又曰凡貨金錢布泉之用夏殷以前其詳靡記太公為周立九府員法李奇曰員即錢黃金方寸重一斤錢圓函方輕重以銖布泉廣二尺二寸為幅長四丈為匹故貨寶於金利於刀流於泉布於門行如流泉布於民間束於帛束又曰孝惠帝時天下初定吳有豫章銅山即招致天下亡命者盜鑄錢又曰高后二年秋七月行八銖錢又曰文帝五年除盜鑄錢令應劭曰聽放鑄更造四銖應劭曰文帝以五分錢泰輕小更作四銖錢文亦曰半兩錢今民間半兩錢最輕小又曰建元元年春行三銖錢五年春罷三銖錢行半兩錢又曰成帝時郡國鑄錢民多姦錢多輕而公卿請令京師鑄官赤仄如淳曰銅為其郭也今錢見有赤仄者不知作法云何是又曰宣帝二年春出水衡錢應劭曰水衡與沙府皆天子私錢耳縣當仰給司農今世水衡錢言宣帝即位為異政又曰自孝武元狩五年三官初鑄五銖錢至平帝元始中成二百八十億萬餘又曰韓信為楚王都下邳信至國召下鄉亭長賜錢百曰公小人為德不竟又曰東方朔曰侏儒長三尺餘奉一囊粟錢二百四十臣朔長九赤餘亦一囊粟錢二百四十侏儒飽欲死臣朔飢欲死又曰張安世以父子封侯在位太盛乃避不受祿詔都內別藏張氏無名錢以百萬數文預曰都內主藏官也張晏曰安世出以選官官不薄又曰貢禹上書曰臣禹年老家貧不滿萬錢又曰王嘉奏事云孝元皇帝奉承大業溫恭少欲都內錢三十萬水衡錢二十五萬少府錢十八萬內錢上林後宮貴人從上林獸圈猛獸驚出馮貴人當之文帝嘉其義賜錢五萬掖庭見親加賜親屬其人勿衆謝重失人心賞賜節約是時外戚資千萬者少是故少府水衡錢多又曰王莽居攝欲防民盜鑄乃禁不得挾銅炭又曰罽賓國以銀為錢騎馬漫為人面楚漢春秋曰項梁陰養生士九十人參木者所與計謀者也木佯疾於室中鑄大錢以具甲兵後漢書曰明帝時館陶公主光武女為子求郎不許而賜錢千萬謂群臣曰郎官上應列宿出宰百里史記曰太微宮後二十五星郎位也有非其人則民受其殃是以難之又曰樊倏卒帝遣小黃門張音問所遺言先是河南縣亡失官錢典負者典謂主典負謂欠負坐死及罪徙者甚衆遂委責於人以償其耗鄉部吏司因此為姦倏常疾之欲奏罷之疾病未及得上音歸具以聞帝覽之而悲歎勑郡並從之又曰京兆尹閻興召第五倫為主簿時長安鑄錢多姦巧乃署倫為督鑄錢掾領長安市東觀漢記曰時長安市未有祑又鑄錢官輕姦所集無能整齊理之者興署倫督鑄錢掾領長安市其復小人爭頌皆云第五掾所平亦無姦枉又曰初馬援在隴西上書言宜如舊鑄五銖錢事三府三府奏以為未可事遂寢及援還從公府求得前奏難十餘條乃隨牒解釋東觀漢記曰十三難援一一解之條奏其狀也更具表言帝從之天下賴其便又曰公孫述廢銅錢用鐵官錢置鐵以鐵錢百姓貨幣不行蜀中童謠言黃牛白腹五銖當復好事者竊言王莽稱黃述自號白五銖錢漢貨也言天下當并還劉氏又曰江革建武末年與母歸鄉里每至歲時縣當案比安驗以比之猶今貌閲也革以母老不欲搖動自在轅中挽車不用牛馬由是鄉里稱之曰江巨孝臨淄令楊音高之設特席顯異巨孝於稠人廣衆中親奉錢以助供養又曰楊秉免歸雅素清儉家至貧窶并日而食任城故孝廉景虜齎錢百餘萬以餉秉秉閉拒絶不受又曰鍾離意薦劉平王望等書奏有詔徵平等特賜辨裝錢至皆拜議即又曰崔實從兄烈有重名於北州歷位郡守九卿靈帝時開鴻都門榜賣官爵公卿州郡下至黃綬各有差其富者則先入錢貧者到官而後悟輸是時假熲樊陵張溫等雖有功勤名譽然皆先輸貨財而後登公位烈時因傳母入錢五百萬得為司徒及拜日天子臨軒百僚畢會帝顧謂親幸者曰悔不小靳可至千萬靳固惜之也程夫人於傍應曰崔公冀州名士豈買官賴我得是反不知姝邪姝美也言反不可斯事之美也姝或作株株根本也又曰董卓壞五銖錢更鑄小錢悉取洛陽及長安銅人鍾虞飛廉銅馬之屬以充鑄焉故貨錢物貴穀不數萬又錢無輪郭文章不便人用魏志曰卓鑄小錢大五分無文章肉好無輪郭不磨鑢也時人以為秦始皇見長人於臨洮乃鑄銅人卓臨洮人也而今毀之雖成毀不同凶暴相類焉又曰車駕西巡乃厚賜韋彪錢珍羞食物使歸平陵上家又曰鄭弘為陽羡令都鄉部民有弟用兄錢者為嫂所責叔未還嫂詣弘言之弘賣中單為叔還錢兄慚自繫婦即去又王符論曰夫竊位之人天奪其鑒寧見朽千萬而不忍賜人一錢續漢書曰劉寵字祖榮遷會稽太守正身率下郡中大治徵入為將作大匠山陰民去治數拾里有若郍水在山谷間五六老翁年七八十聞遷相率共送寵人齎百錢寵見勞來曰父老何乃自苦遠來皆對曰山父鄙老生未嘗到郡縣他時吏發求不已民間或夜行不絶狗吠竟夕人不得安自明府下車以來狗不吠夜吏希至人間年老遭值聖化聞當見棄去故戮力來送寵謝之為選受一大錢故寵在會稽號為取一錢其清如是又曰扶風人事孫奮居富而慳吝梁冀因以馬乘遺之從賃錢二十萬奮以錢十萬與之冀大怒又曰靈帝中平二年二月己酉南宮靈臺災庚戍樂中城殿門災延及北闕燒嘉德和歡殿收天下田畝十錢以治宮加調刺史二千石遷除皆責治宮錢大郡至二千萬帝本侯家居貧即帝曰桓帝不能作家曾無私錢財故於西園造萬金堂以為私藏復寄小黃門常侍家私錢至數千萬東觀漢記曰光祿勳杜林與馬援鄉里親厚援南方還時林馬適死援遣子持一匹馬遺林曰朋友有車馬之饋可以備之居數日林遣子奉書曰將軍內施九族外有賓客望恩者多林父子食卿祿祿常有盈今奉錢五萬援謂兒曰當以此為法杜伯山所以勝我者也又曰趙勤字益卿劉賜姊子勤童幼有志操往來賜家國租適到時勤在旁賜指錢示勤曰拜乞汝三十萬勤曰拜而得錢非義所取終不肯拜又曰鄭均字仲虞兄仲為縣吏受禮遺均數諫止不聽即脫身出作歲餘得數萬錢歸以與兄曰錢盡可復得為吏坐贓終身損棄兄感其言遂廉潔稱清吏又曰王阜為益州太守大將軍竇憲貴盛嘗移書益州取六百萬阜疑有姦詐以狀上憲追奴騶帳下吏李文迎錢阜以詔書末報距不與文積二十餘日詔書報給文以錢市馬獻帝春秋曰靈帝作錢猶五銖而有四道連於邊輪識者以為妖竊言錢有四道京師將破壞此錢四出散於四方於還如其言范曄後漢書云四出錢應劭漢官曰王莽篡位以劉字金刀罷五銖更作小錢文曰貨泉其文反白水真人此則世祖中興之瑞也魏書曰劉虞在幽州清淨儉約以禮義化民靈帝時南宮災吏遷補州郡者皆責助治宮錢或一千萬或三千萬富者以私財辨或發民錢備之貧而清慎者無以充調或至自殺靈帝以虞清貧特不使出錢也又曰劉類為弘農太守使人掘地求錢所在市里皆有孔穴又曰文帝夢磨錢文欲令滅而更明周宣占之曰陛下家事時帝欲治第植逼太后加貶守吳書曰嘉禾五年春鑄大錢一當五百詔使吏民輸銅討銅卑直設盜鑄之科蜀志曰先主攻劉璋與士衆約若事定府庫百物孤無豫焉及援成都士衆捨干戈赴庫藏競取寶物軍用不足備甚憂之劉巴曰易耳但當鑄直百錢平諸物價令吏為官市備從之數月之間府庫充實晉陽秋曰朝士以牛酒勞齊王冏平原王幹獨齎百錢晉書曰阮宣子常杖頭挂百錢造市店酣飲而歸又曰王衍疾其妻郭氏之貪鄙故口末嘗言錢郭氏欲試之令婢以錢繞床使不得行衍晨起見錢謂婢曰舉阿堵物卻其措意如此又曰王導子悅少侍講東宮歷吳王友中書侍郎導夢人以百萬錢買悅意甚惡之後掘地得錢二皆藏閉而悅果以疾終又曰張軌為涼州參軍索輔言於軌曰古以金貝皮幣為貨息穀帛量度之耗二漢制五銖錢通易不滯太始中河西荒廢遂不用錢裂匹以為假數縑布既壞市易又難徒壞女工不任衣用弊之甚也今中州雖亂此方安全宜優五銖以濟通變之會軌納之立制準布用錢錢遂大行人賴其利南史曰宋文袁皇后家本貧薄后每就上求錢帛以贍之上性儉所得不過錢三五萬帛三五十匹後潘淑妃有寵愛傾後宮咸言所求無不得后聞之未知信否乃因潘求三十萬錢與家以觀上意宿昔便得因此恚恨成疾不復見上宋書曰劉秀之為南秦州刺史加都督漢飢饉秀之躬自儉約先是漢川悉以絹為貨秀之限令用錢百姓利之又曰始興王濬嘗送錢三萬餉袁淑一宿復遣追取謂為使人謬誤欲以戲淑淑與濬書曰聞之前志七年之中一與一奪義士猶或非之況密邇旬次何其裒益之亟也竊恐二三諸侯何以觀之又曰廢帝即位鑄二銖錢形式轉細官錢每出人間即摸效之而大小厚薄皆不及也無郭不磨鑄如今之剪鑿者謂之耒子錢景和元年沈慶之啓通私鑄錢一千錢長不盈三寸大小稱此謂之鵝眼錢劣於此者謂之綖環錢貫之以縷入水不沉隨手破碎市井不復料數十萬錢盈一掬斗米一萬商貨不行明帝初唯禁鵝眼綖環其餘皆通用又曰張融解褐為新安王子鸞行參軍王母殷淑儀薨後四月八日建齋并權佛僚佐襯者多至一萬少者不減五千融獨注襯百錢帝不悅曰融貧當序以佳祿出為封溪令又曰郭世通嘗與人共於山陰市貨物誤得一千錢當時不覺分背方誤追還本主驚歎以半直與之世通委之而去又曰蔡廓罷豫章郡還起二宅先成東宅以與兄軌之廓亡後軌之罷長沙郡還送錢五十萬以裨宅直廓子興宗年十一白母曰一家由來豐儉必共今日宅直不宜受也母悅而從焉軌之深有愧色謂其子談曰我年六十行事不及十歲小兒又曰劉凝之隱居荊州年飢衡陽王義季慮凝之餒斃餉錢十萬凝之大喜將錢至市門觀有飢色者悉分與之俄頃而盡又曰山陰人孔祐至行通神隱於四明山嘗見山谷中有數百斛錢視之如瓦石不異又曰戴法興父碩子法與二兄延壽延興並修立延壽善書延興好學山陰有陳戴者家富有錢三千萬鄉人或云戴碩子兒敵陳戴三千萬錢齊書曰曹武為右衛將軍晚節在雍州致見錢七千萬皆厚輪大郭又曰丘冠先使于蠕蠕執節不拜為所殺武帝以冠先不辱命賜其子雄錢一萬布三十匹雄不受又曰范述曾任永嘉太守勵志清白不受饋遺明帝下詔褒美徵為遊擊將軍郡故舊送錢二十餘萬一無所受又曰趙僧巖栖遲山谷常以一壺自隨一旦謂弟子曰吾今夕當死壺中大錢一千以通九泉之路蠟燭一梃以照七尺之尸至夜而亡梁書曰顧協為舍人常有門生始來事協知其廉潔不敢厚餉止送錢二千協發怒杖二十因此事者絶於饋遺又曰庾丹父景休位御史中丞丹少有才俊與伏挺何子明俱為周捨所狎初景休罷巴東郡頗有資産丹負錢數百萬責者填門景休怒不為之償既而朝賢之丹不之景休景休悅乃悉為還之梁書曰宋季雅罷南康郡市宅居呂僧珍宅側僧珍問宅價曰千一百萬怪其貴季雅曰一百萬買宅千萬買鄰及僧珍生子季雅往賀署函曰錢一千閽人少之不為通強之乃進僧珍疑其故親自發乃金錢又曰江祿為武寧郡頗有資産積錢於壁壁為之倒迮銅物皆鳴人戲之曰所謂銅山西傾洛鍾東應者也又曰何遠為武昌太守武昌俗皆汲江水盛夏遠患水溫每以錢買人井寒水不受錢者則摙水還之其他事率多如此南史曰蕭惠明子聄素梁天監中位丹陽尹丞初拜日武帝賜錢八萬聄素一朝散之親友又曰謝譓為東陽內史及還五官送錢一萬止留一百答書曰數多留少更以為愧又曰梁謝舉兄子僑素貴嘗一朝無食其子啓欲以班史質錢答曰寧餓死豈可以此充食乎
