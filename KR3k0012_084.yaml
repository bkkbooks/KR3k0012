body:
  text: 皇王部八殷帝成湯史記曰殷之祖契音薛母曰簡狄有娀氏之女為帝嚳次妃三人行浴見玄鳥墯其卵簡狄取吞之因孕生契契長佐禹治水有功舜乃命契曰百姓不親五品不遜汝為司徒而敬敷五教五教在寬封於啇賜姓子氏契興於唐虞大禹之際功業著於百姓百姓以平契卒子昭明立昭明卒子相土立相土卒子昌若立昌若卒子曹圉立曹圉卒子冥立子冥卒子振立子振卒子微立微卒子報丁立報丁卒子報乙立報乙卒子報丙立報丙卒子主壬立主壬卒子主癸立主癸卒子天乙立是為成湯帝王世紀曰成湯一名帝乙豐下兌上指有胼倨身揚聲長九尺臂四肘有聖德諸侯有不義者湯從而征之誅其君吊其民天下咸悅故東征則西夷怨南征則北狄怨曰奚為而後我故仲虺誥曰徯我后后來其蘇者也凡二十七征而德施於諸侯焉及夏桀無道湯使人哭之桀囚湯於夏臺而後釋之諸侯由是咸叛桀附湯同日貢職者五百國三年而天下悉服湯自伐桀後大旱七年洛川竭使人持三足鼎祝於山川曰欲不節耶使民疾耶苞苴行耶讒夫昌耶宮室營耶女謁行耶何不雨之極也殷史卜曰當以人禱湯曰吾所為請雨者民也若必以人禱吾請自當遂齋戒剪髮斷爪以己為牲禱於桑林之社曰唯豫小子履敢用玄牲告于上天后土曰萬方有罪罪在朕躬朕躬有罪無及萬方無以一人之不敏使上帝鬼神傷民之命言未已而大雨至方數千里河圖曰扶都見白氣貫月感生黑帝湯詩含神霧帝王世紀並同雒書靈準聽曰黑帝豫湯長八尺一寸或曰七尺連珠庭臂二肘春秋元命包曰湯臂二肘是謂神剛又曰湯之時其民大樂其救之於患害故樂名大護護者救也尚書琁璣鈐曰湯受金符金符禹録白狼銜鉤入殷朝鉤縛束之要明湯得天下之要也尚書中候曰天乙在亳諸鄰圖襁負歸德東觀乎洛降三分沉璧降下也以厚三分之璧玉沉雒水退立榮光不起沉畢退而立侯神榮光不起黃魚雙躍出濟于壇魚者無足翼言桀孤時無黨可伐也黃者所以遏水今土歸湯則金助矣濟上也雖祭猶為位告神故有壇黑鳥以雄隨魚亦止黑鳥黑帝叶光紀之使以用也化為黑玉赤勒曰玄精天乙受神福伐桀克化變也勒劾也玄水也三年天下悉合諸侯悉給歸之又曰玄鳥翔水遺卵于流娀簡拾吞生契封商玄鳥燕也翔水徘徊於水上娀娀氏也簡二狄也契母名商國名詩云天命玄鳥降而生商是也書曰伊尹相湯伐桀升自聏遂與桀戰于鳴條之野又曰自契至于成湯八遷湯始居亳從先王居尚書大傳曰湯之君民聽寬而獄省又曰夏人飲醉者持不醉者不醉者相和而歌曰盍歸于亳盍歸于亳亳亦大矣故伊尹退而間居深聽樂聲思其故也是時伊尹仕桀更曰覺兮較兮吾大命格兮覺兮為先知者較兮謂直道者也格至也去不善而就善何樂兮伊尹入告于桀曰大命之亡有日矣桀啞然笑曰天之有日猶吾之有民也日亡吾亦亡矣是以伊尹遂去夏適湯又曰湯放桀也居中野士民皆奔湯桀與其屬五百人南徙千里止於不齊不齊民往奔湯桀與其屬五百人徙於魯魯士民復奔湯桀曰國君之有也吾聞海外有人與五百人俱去又曰湯放桀而歸於亳三千諸侯大會湯取天子之璽置之於天子之坐左復而再拜從諸侯之位湯曰此天子之位有道者可以處之矣夫天下非一家之有也唯有道者之有也唯有道者宜處之湯以此三讓三千諸侯莫敢即位然後湯即天子之位韓詩內傳曰湯為天子十三年年百歲而崩葬於徵今扶風徵陌是也春秋演孔圖曰夏民不康天果命湯白虎戲朝白雲入房白虎白雲皆金精也逸書曰成湯自契至湯八遷湯始居亳紀年曰湯有七名而九征説苑曰湯欲伐桀伊尹請且乏貢職以觀夏動桀怒起九夷之師伊尹曰未可彼尚能起九夷之師是罪在我也湯乃謝服入貢職明年又乏貢職桀起九夷之師九夷之師不起伊尹曰可矣湯乃興師越絶書曰湯行仁義敬鬼神天下皆一心歸之孟子曰湯居亳與葛伯為鄰葛伯不祀湯使人問曰何為不祀曰無以供犧牲湯遺之牛羊葛伯得而食之又不祀湯又問之曰無以供粢盛湯使亳民為之耕老弱饋食葛伯率衆要其酒肉黍稻者遮而奪之不授則殺之有童子以黍肉餉殺而奪之書曰葛伯仇餉此之謂也為其殺是童子湯乃興師伐葛四海之內皆曰非富天下也為匹夫匹婦復讎言湯不今見天下富為一夫報仇也又曰湯始征自葛始十一征而無敵於天下東征而西夷怨南征而北夷怨曰奚為後我民望之若大旱之望雨也歸市者不止耕者不變誅其君吊其民如時雨降民大悅書曰徯我后后來其無罰尸子曰湯之救旱素車白馬布衣身嬰白茅以身為牲當此時也絃歌鼓舞者禁之呂氏春秋曰湯見祝網者置四面其祝曰從天墜者從地出者從四方來者皆羅吾網湯曰嘻盡之矣非桀其孰能為此湯收其三面置其一面更教之祝曰昔蛛蝥作網罟今之人學紓欲左者左欲右者右欲高者高欲下者下吾取其犯命者漢南之國聞之曰湯之德及禽獸矣於是四十國同時歸之夫人置四面未必得鳥湯去三面以網四十國非徒網鳥也又曰成湯之時有穀生於庭夜而生比旦而大拱史請卜其故湯曰吾聞祥者福之先也見祥而為不善則福不至妖者禍之先也見妖而為善則禍不至於是早朝晏退問疾吊喪鎮撫百姓三日而穀亡又曰湯誅桀功名大成乃命伊尹作為大護歌晨露修九韶六列以見其善淮南子曰湯夙興夜寐以致聰明輕賦薄斂以寬民泯布德施惠以賑困窮吊死問疾以養孤霜百姓親附政令流行帝外丙史記曰帝外丙即位三年崩立外丙之弟是為帝仲壬紀年曰外丙勝居亳帝仲壬史記曰帝仲壬即位四年崩伊尹乃立太丁之子太甲成湯嫡長孫也璅語曰仲壬崩伊尹放太甲乃自立四年帝太甲史記曰帝太甲立三年不明暴虐不遵湯法伊尹放之桐宮伊尹攝行政當國以朝諸侯太甲居桐宮三年悔過自責反善於是伊尹乃迎帝太甲而授之政帝太甲修德諸侯咸歸殷百姓以寧伊尹嘉之乃作太甲三篇褒帝太甲稱太宗尚書曰太甲既立不明伊尹放諸桐三年復歸于亳思庸念帝道也帝王世紀曰太甲反位又不怨故更尊伊尹曰保衡即春秋傳所謂伊尹放太甲卒為明王是也太田修政殷道中興號曰太宗孔藂所謂憂思三年追悔前愆起而即政謂之明王者也一名祖甲享國三十三年帝王紀曰桐宮蓋殷之墓地有離宮可居在鄴西南杜預春秋後序曰紀年稱殷仲壬即位居亳其卿士伊尹仲壬崩伊尹放太甲于桐乃自立也伊尹即位於太甲十年太甲潛出自桐殺伊尹帝沃丁史記曰帝沃丁之時伊尹卒既葬伊尹於亳咎單遂訓伊尹事作沃丁紀年曰沃丁絢即位居亳帝王世紀曰伊尹卒大霧三日沃丁葬以天子禮資之三年以報大德帝太庚史記曰帝太庚在位二十五年崩子帝小甲立紀年曰小庚辨即位居亳即大庚也帝小甲史記曰帝小甲在位十七年崩弟雍己立紀年曰小甲高即位居亳帝雍己史記曰帝雍己在位十二年崩弟太戊立紀年曰雍己胄即位居亳帝太戊書敘傳曰伊陟相太戊伊陟伊尹子也亳有祥桑穀共生于朝祥妖怪也二木合生七曰供不恭之罰詩序曰烈祖祀中宗也祀中宗殷王太戊湯之玄孫也嗟嗟烈祖有秩斯祜秩常也嗟嗟歎美之深也史記曰帝太戊立亳有祥桑穀共生於朝一暮大拱帝太戊懼問伊陟伊陟曰臣聞妖不勝德帝之政其有闕歟帝其修德太戊從之而祥桑枯死殷復興諸侯歸之故稱中宗中宗在位七十五年帝仲丁史記曰帝仲丁遷于敖河亶甲居相值祖乙遷于刑帝仲丁在位十一年紀年曰仲丁即位元年自亳遷于囂帝王世紀曰仲丁徙囂或曰敖今河南之敖倉是也帝外壬史記曰帝外壬在位五年崩弟河亶甲立紀年曰外壬居囂帝河亶甲書敘傳曰河亶甲居相孔安國曰相地在河北史記曰帝河亶甲時殷復衰河亶甲在位九年崩子帝乙立紀年曰河亶甲整即位自囂遷于相征藍夷再征班方帝祖乙書敘傳曰祖乙圯于耿曰圯於祖遷于耿也河水所毀曰圯也帝王世紀曰今河東皮氏有卿史記曰帝祖乙立殷復興巫賢任職祖乙在位十九年紀年曰祖乙勝即位是為中宗帝王世紀曰帝祖乙以乙日生故謂之帝乙孔子所謂五世之外天之錫命疏可同名者也是以祖乙不為諱蓋殷禮也帝祖辛史記曰帝祖辛在位十六年崩弟沃甲立帝沃甲史記曰帝沃甲在位二十五年崩立祖辛之子祖丁紀年曰帝開甲踰即位居庇帝祖丁史記曰帝祖丁在位三十二年崩立沃甲之子是為南庚紀年曰祖丁即位居庇帝南庚史記曰帝南庚在位二十九年崩立祖丁之子陽甲紀年曰南庚自庇遷于奄帝陽甲史記曰帝陽甲之時殷衰自仲丁以來廢嫡而更立諸弟子弟子或爭相代立比九世亂諸侯莫朝帝陽甲在位十七年紀年曰陽甲即位居奄帝盤庚書曰盤庚五遷將治亳殷自湯至盤庚凡五遷都治亳殷也民咨胥怨胥怨相也民不欲徙乃咨嗟憂愁相與怨其上也史記曰帝盤庚之時殷已都河北盤庚渡河南復居成湯之故國乃五遷無定處殷民咨胥皆怨不欲徙遂涉河南治毫行湯之政然後百姓由寧殷道復興諸侯來朝以其遵成湯之德也在位十八年紀年曰盤庚旬自奄遷于北蒙曰殷帝王世紀曰帝盤庚徙都殷始改商曰殷又曰亳殷今偃師是也然則殷有三亳二亳在梁國一亳在河南穀熟為南亳即今都也蒙為北亳即景亳湯所盟地偃師為西亳即盤庚所徙者帝小辛史記曰帝小辛殷道復衰百姓思盤庚乃作盤庚三篇小辛在位二十一年紀年曰小辛頌位居殷帝小乙史記曰帝小乙在位二十年崩子武丁立紀年曰小乙斂居殷帝武丁書敘傳曰高宗夢得説盤庚弟小乙子也名武丁夢得賢相其名説使百工營求諸野得諸傅巖書大傳曰桑穀俱生于朝一日而大拱兩手撿之曰拱武丁召其相而問焉其相曰吾雖知之吾不能言也問諸祖乙曰桑穀野草也此木也而云草未聞劉民以為屬草妖野草生于朝亡乎武丁側身修行思昔先王之政興滅國繼絶世舉逸民明養老之禮諸侯重譯來朝者六國九州之外國武丁祭成湯有飛雉升鼎耳而雊武丁問祖乙祖乙曰野鳥不當升鼎欲為用也則遠方將有來朝者乎三年編髮重譯來朝者六國孔子曰吾於高宗肜日見德有報之疾肜日尚書篇名史記曰帝武丁即位思復興殷而未得其佐三年不言政事事決定於冢宰以觀國風武丁夜夢得聖人名曰説以夢所見視群臣百吏皆非也於是使百工營求之野得説於傅巖中是時説為胥靡築於傅巖見於武丁武丁曰是也得而與之語果聖人舉以為相殷國大治武丁祭成湯明日有飛雉登鼎耳而雊武丁懼祖己曰王勿憂先修政事祖己乃訓王武丁崩祖己嘉其德立其廟為高宗帝王世紀曰武丁即位諒暗居凶廬百官揔己聽於冢宰三年不言既免喪猶不言群臣諫武丁於是思建良輔夢天賜賢人姓傅名説乃使百工寫其像求諸天下見築者胥靡衣禢帶索執役于虞虢之間傅巖之野名説登以為相享國五十有九年年百歲初高宗有賢子孝己其母早死高宗惑后妻之言放而死天下哀之帝祖庚史記曰帝祖庚在位七年崩弟祖甲立紀年曰祖庚躍居殷帝祖甲史記曰帝祖甲淫亂殷復衰在位十六年崩子廩辛紀年曰帝甲載居殷帝王世紀曰春秋外傳所謂玄王勤商十有四世帝甲亂之七世而隕是也帝廩辛史記曰帝廩辛在位六年崩弟庚丁立紀年曰馮辛先君殷帝庚丁史記曰帝庚丁在位三十一年崩子武乙立殷復去亳徙河北紀年曰庚丁居殷帝武乙史記曰帝武乙無道為偶人謂之天神與之博令人為行天神不勝乃戮辱之為革囊盛血仰而射之命曰射天武乙獵於河渭之間暴雷震死子太丁立紀年曰武乙即位居殷三十四年周王季歷來朝武乙賜地三十里玉十瑴馬八匹帝王世紀曰帝武乙復濟河北徙朝歌帝太丁史記曰帝太丁在位三年崩子帝乙立紀年曰太丁三年洹水一日三絶帝王世紀曰帝文丁一日大丁帝乙史記曰帝乙立殷益衰帝乙長子曰微子啓母賤不得嗣少于辛辛母正后辛為嗣帝乙崩子辛立天下謂之紂紀年曰帝乙處殷二年周人伐商帝王世紀曰帝乙有二妃正妃生三子長曰微子啓中曰微仲行小曰受庶妃生箕子年次啓皆賢初啓母之生啓及行也尚為妾及立為后乃生辛帝乙以啓賢且長欲以啓為太子史據法爭之帝乙乃立辛為太子帝乙即位三十七年帝紂書曰武王戎車三百兩虎賁三百人與受戰于牧野周書曰商王紂取天智玉琰五班環身以自焚天智王之上黃者班環身以自原之春秋文耀鉤曰牧野之戰鬼哭牧地鬼先哭喻紂將死語曰子貢曰紂之不善不如是之甚也是以君子惡居下流天下之惡皆歸焉史記曰紂資辨捷疾聞見甚敏材力過人手格猛獸智足以拒諫言足以飾非矜人臣以能高天下以聲以為人皆出己之下好酒淫樂嬖於婦人愛妲己使師涓作淫聲北里之舞靡靡之樂厚賦稅以實鹿臺之錢而盈巨橋之粟鹿臺臺名巨橋倉名以西伯昌鬼侯邢侯為三公鬼侯有好女入之紂鬼侯女不憘希記㦦淫紂殺之而醢鬼侯邢侯爭之并脯之西伯昌聞之竊歎崇侯虎知之以告紂紂囚西伯羑里及武王伐紂紂兵敗績入登鹿臺衣其寶玉衣赴火而死紀年曰帝辛受居殷帝王世紀曰帝紂能倒曳九牛撫梁易柱有蘇氏叛紂因伐蘇蘇人以美女妲己奉紂紂大悅赦蘇而納妲己為妃常與沉醉于酒所譽者貴所憎者誅淫縱愈甚始作象著箕子為父師歎曰象著不必更於土匭必將犀玉之柸食能蹯豹胎必不衣短褐處茅屋之下必將衣文繡之衣遊於九層之臺居於廣室之中矣居五年紂果造傾宮作瓊室瑤臺飾以美玉七年乃成其大三里其高千丈其大宮百其小宮七十三處宮中九市車行酒馬行炙以百二十日為一夜六月發民獵於西山居期年天下大風雨飄牛馬壞屋樹天火燒其宮兩日並或鬼哭或山鳴紂不懼愈慢神誅諫士為長夜之飲七日七夜失忘曆數不知甲乙問於左右莫知使問箕子謂其私人曰為天下主而一國皆失日天下危矣一國不知而我其危矣亦亂以醉熊蹯不熟紂怒殺宰人斫朝涉之脛而視其髓刳孕婦之腹而觀其胎又殺人以食虎諸侯或叛妲己以罰輕紂欲重刑乃先為大尉斗以火爇之使人舉輒爛手不能勝紂怒乃更為銅柱以膏塗之加于爇炭之上使有罪者緣焉足滑跌墮火中紂與妲己笑為樂名曰炮烙之刑武王乃率諸侯來伐紂紂有億兆夷人起師自容閭至浦水與同惡諸侯五十國凡十七萬人距周于商郊之牧野紂師皆倒戈而戰紂即位三十三年正月甲子敗績赴宮登鹿臺蒙寶衣玉席自投于火而死周武王封其子武庚為殷後六韜曰武王伐殷得二大夫而問之曰殷國將亡亦有妖乎一人曰殷國常雨血雨血雨石小者如雞子大者如箕嘗六月而雨雪深尺餘武王曰大哉妖也一人對曰非殷國之大妖也殷國大妖三十七章殷君喜射人喜以人食餒虎喜剖人心喜殺孕婦以信者為不信以誣者為真以忠者為不忠忠諫者死阿諛者賞以君子為下以小人為上以佞辨為相以女子為政急令暴取萬民愁苦喜田弋走狗試馬出入不時不避大風甚雨不避寒暑喜修治池臺日夜無已喜為酒池糟丘牛飲者三千飲人為輩坐起之以金鼓無長幼之序貴賤之禮聽讒用譽無功者賞無德者富所愛專制擅令無禮義無聖人無賢士無衡概無升斛無尺寸無錙銖有罪放無罪誅此殷國之大妖者其餘不可勝數臣言不能盡墨子曰昔殷王紂貴為天子富有天下上訶天侮鬼神不殃傲天下萬民武王遂奔入王宮誓紂而出擊之赤瓌載之白旗以為天下諸侯僇又曰紂之時十日雨土于亳有鬼霄吟有男女為孟子曰桀紂逆天暴萬物故天棄之故民去之湯武從天理萬物故天下欲之故民歸之紂昏昏以亡武王諤諤以昌淮南子曰紂之城左東海右流沙前交址後幽都師起容閭至浦水億有餘萬武王左操黃銊右執白旄而麾之則瓦解而走遂土崩而亡有南面之名而無一人之譽此失天下也夏侯孝若新論曰紂亂大熟爛矣武王乃往伐之
