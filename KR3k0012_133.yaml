body:
  text: 偏霸部十六梁蕭衍梁書曰高祖武皇帝諱衍字叔達小字練兒蘭陵中都里人漢相國何之後也皇考諱順之齊高帝族弟也參預佐命封臨湘縣侯高祖以宋大明八年生于秣陵同夏里三橋宅生而有奇異兩骻駢骨頂上隆起有文在右手曰武帝及長博學多誦好籌略有文武才幹時流名輩咸推許焉所居室常若雲氣人或遇者體輒肅然起家巴陵王南中郎法曹遷衛將軍王儉東閤祭酒儉一見深相器異謂廬江何憲曰此蕭郎三十內當作侍中出此則貴不可言竟陵王子良開西邸招文學高祖與沈約謝眺王融等並遊焉隆昌初明帝輔政起高祖為寧朔將軍鎮壽春除太子庶子給事黃門侍郎入直殿省預蕭諶氏任切等定策勳封建陽縣男邑三百戶建武二年魏遣將劉昶王肅帥眾冠司州高祖為冠軍將軍帥所領自外進戰魏軍表裏受敵乃棄圍退走軍罷以高祖為右軍晉安王司馬淮陵太守還為太子中庶子領軍羽林監頃之出鎮石頭四年魏帝自率大眾寇雍州明帝令高祖赴援又遣崔惠景督諸軍高祖等並受節度明年三月惠景與高祖進行鄧城魏主率十萬餘騎奄至惠景軍死傷略盡唯高祖全師而歸俄以高祖行雍州府事明帝崩東昏即位始安王遙光徐孝嗣江杞更直內省分日帖勑高祖聞之謂從舅張弘策曰政出多門亂其階矣時高祖長兄懿罷益州還仍行郢州事乃使弘策詣郢陳計於懿曰若隙開釁起必中外土崩今得守外藩幸圖身計郢州控帶荊湘西注漢沔雍州士馬呼吸數萬虎視其間以觀天下此蓋萬全之策如不早圖之悔無及也懿聞之色變心不之許弘策還是歲至襄陽於是潛造器械多伐竹木沉於檀溪密為舟裝之備二年冬懿被害信至高祖密召長史王茂中兵呂僧珍等謀之以十一月召僚佐集於廳事謂之曰昔武王會盟津皆曰紂可伐今昏主惡稔窮虐極暴誅戮朝賢罕有遺育生人塗炭天命殛之卿等同心疾惡共興義舉公侯將相良在茲日各盡勳效我不食言是日建牙於是收集得甲士萬餘人馬千餘匹船三百艘音騷出檀溪竹木裝艦東昏以劉山陽為巴西太守配精兵三千使過荊州就行事蕭頴胄以襲襄陽頴胄伏甲斬之送首於高祖仍以南康王尊號之議來告且曰時月未到當須來年二月遽便進兵恐非廟筭高祖荅曰所藉義心一時驍銳事事相接猶恐疑怠天時人謀有何不利處分已定安可中息三年二月南康王為相國以高祖為征東將軍高祖發襄陽移檄京邑高祖至竟陵命長史王茂與太守曹景宗為前軍輕兵濟江逼郢城張冲出軍迎戰茂等邀擊大破之三月南康王即帝位於江陵改永元三年為中興元年遙廢東昏為涪陵王以高祖為尚書左僕射加征東將軍都督征討諸軍事假黃鉞五月東昏遣寧朔將軍吳子陽等救郢州六月子陽進據加湖去郢三十里傍山帶水築壘以自固七月高祖命王茂潛師襲加湖俄而大潰子陽竄走眾盡溺于江王茂虜其餘而旋郢城主程茂以城降高祖又遣軍王唐脩期攻隋郡並剋之司州刺史王僧景遣子入質司部悉平八月天子遣黃門勞軍九月詔高祖平定東夏並以便宜從事是月豫州刺史申胄棄姑熟走大軍進據之遣曹景宗蕭頴達領馬步進頓江寧東昏遣李居士率步軍迎戰景宗擊走之大軍次新林命王茂進據越城曹景宗據皂莢橋十月東昏又遣征虜將軍王珍國等列陣於航南大路精手利器尚萬人閹人王倀楮羊切子持白虎幡督率諸軍王茂曹景宗等掎居綺切角奔之鼓噪震天地珍國之眾一時土崩諸軍望之皆潰茂軍追至宣陽門李居士以新亭壘徐元瑜以東府城降右頭白下諸軍並霄潰高祖鎮石頭命眾軍圍六門東昏悉焚燒門內驅逼營府署官並入城有眾二十萬青州刺史桓和紿徒亥切東昏出戰因以眾來降高祖令諸軍築長圍十二月衛尉張稷北徐州刺史王珍國斬東昏送首茂師高祖命呂僧珍勒兵封府庫及圖籍收嬖妾潘淑妃及凶黨王咺況晚切之以下四十八人屬吏宣德皇后今追廢涪陵王為東昏侯依漢海昏侯故事授高祖中書監都督楊徐二州諸軍事大司錄尚書驃騎大將軍楊州刺史封建安郡公食邑萬戶給班劍四十人黃鉞侍中征討諸軍事並如故高祖入屯閱武堂下令大赦二年天子遣慰勞京邑贈高祖散騎常侍左光祿大夫考侍中丞相宣德皇后臨朝入居內殿詔進高祖都督中外諸軍事劍履上殿入朝不趨譖拜不名加前後部羽葆鼓吹置左右長史司馬從事中郎掾屬各四人又詔進位相國揔百揆楊州刺史封十郡為梁公備九鍚之禮高祖固辭二月進梁公爵為王以豫州之南譙廬江永嘉等十郡益梁國并前為二十郡三月命王冕十有二旒建天子旍旗出警入蹕景辰齊帝禪位于梁高祖謙讓不受大史令蔣道秀陳天文符讖六十四條並明著群臣固請乃從之夏四月景寅高祖即皇帝位于南郊設壇柴燎告類于天大赦改齊中興二年為天監元年封齊帝為巴陵王八月詔中書監王瑩等八人參定律令十一月立皇子統為皇太子四年正月詔九流常選年未三十不通一經不得解褐若有才同甘顏勿限年次是歲大穰米斛三十五年三月魏宣武帝從弟翼率其諸弟來降陳伯之自壽陽率眾歸降八年正月輿駕親祠南郊赦天下九年三月幸國子學親臨講肆詔皇太子及王侯之子年在從師者可令入學十年親祠南郊大赦三月鄧晣旨熱切以昫山引魏軍遣振遠將軍馬仙琕按梁書幼名仙婢及長以婢名不典遂去女從琕補鼎切字書又音駢討之十月馬仙琕大破魏軍斬馘古獲切十餘萬復剋昫山城十八年親祠南郊普通元年正月改元大赦五年六月龍鬥于曲阿王陂因西行至建陵城所經處樹木倒折七年赦死罪已下大通元年三月幸同泰寺捨身甲戍還宮赦天下改元二年十月以魏北海王元顥為魏主遣東宮直閤將軍陳慶之衛送還北魏豫州刺史鄧獻以地內屬中大通元年九月幸同泰寺捨身公已下以錢一億萬奉贖十月輿駕還宮大赦改元三年十月幸同泰寺昇法座為四部眾說大般若涅槃經義六年春親耕籍田四月熒惑在南鬥大同元年正月改元大赦二年三月詔文武在位舉爾所知公侯將相隨才擢用十年三月幸蘭陵謁建寧陵十一年四月魏遣使來聘中大同元年四月於同泰寺講說法會大赦改元十月以前東楊州刺史岳陽王詧音察為雍州刺史太清元年二月魏司徒侯景以豫章廣頴洛陽等十三州內屬以景為大將軍封河南大行臺承詔如鄧禹故事四月大赦改元八月以大將軍侯景錄行臺尚書事二年八月侯景舉兵反十月景自橫江濟于採石景至京師臨賀王正德率眾附賊十月攻陷東府城三年三月前司州刺史羊鴉仁等進軍東府北與賊戰大敗賊攻陷宮城縱兵大掠侯景自為都督中外諸軍事大丞相錄尚書四月高祖以所求不供憂憤寢疾五月景辰崩于凈居殿時年八十六十一月進尊為武皇帝廟號高祖葬于脩陵梁書曰高祖生知淳孝少而篤學洞達儒立雖萬機多務猶卷不輟手後宮職司貴妃已下皆衣不曳地傍無錦綺不飲酒不聽音樂歷觀古昔帝主人君恭儉莊敬藝能博學罕或有焉蕭網梁書曰太宗簡文皇帝諱網字世讚小字六通高祖第三子天監五年封晉安王中大通三年四月昭明太子薨五月立為皇太子太清三年五月高祖崩即皇帝位大寶元年正月大赦改元西魏寇安陸執同州刺史柳仲禮盡沒漢東之地二月邵陵王綸自尋陽至于夏口郢州刺史南平王恪以州讓綸侯景逼帝幸西州夏大飢人相食京師尤甚前司州刺史羊鴉仁自尚書省出奔西州八月湘東王繹遣領軍將軍王僧辨率眾逼郢州侯景自進位相國封二十郡為漢王邵陵王綸棄郢州走十月侯景自加宇宙大將軍都督六合諸軍事二年三月侯景自率眾西寇自石頭至新林舳艫相接四月西陽景分遣魏將宋子仙任約襲郢州閏月景進寇巴陵王僧辨連戰不能剋五月湘東王遣遊擊將軍胡僧祐信州刺史陸法和援巴陵景遣任約帥眾拒援軍六月僧祐等擊破任約擒之景解圍霄遁王僧辯督眾軍追景攻魯山城剋之七月景還至京師王僧辯軍次湓城八月侯景遣衛尉卿彭雋率兵入殿廢帝為晉安王幽于永福省害皇太子大器潯陽王大心及潯陽王諸子二十人矯詔禪于豫章嗣王棟大赦改元十月帝崩于永福省時年四十九賊偽謚曰明皇帝廟稱高宗明年三月王僧辯率百官奉梓宮昇朝堂世祖追崇為簡文皇帝廟曰太宗葬莊陵梁書曰太宗見幽縶題自序云有梁正士蘭陵蕭世讚立身行道終始如一風雨如晦雞鳴不已弗欺暗室豈況三光數至於此命也如何又為連珠二首文甚悽愴蕭繹梁書曰世祖孝元皇帝諱繹字世誠小字七符高祖第七子也天監十三年封湘東郡王大同六年出為都督江州諸軍事江州刺史太清元年徙為都督荊雍湘司郢等九州諸軍事鎮西將軍荊州刺史三年三月侯景寇沒京師太子舍人蕭歆至江陵宣密詔以世祖為侍中假黃鉞大都督中外諸軍事司徒承制餘如故是月世祖徵兵於湘州湘州刺史河東王譽拒而不遣七月遣世子方等帥眾討譽戰敗又遣將軍鮑泉伐討譽九月雍州刺史岳陽王詧舉兵反來寇江陵世祖嬰城拒守詧將杜崱七力切及楊混各率其眾來降詧遁走鮑泉攻湘州不剋又遣左衛將軍王僧辯代將大寶元年五月王僧辯剋湘州斬河東王譽湘州平二年二月魏遣使來聘三月侯景悉兵西上會任約軍王僧辯帥眾屯巴陵景進寇巴陵世祖遣將軍胡僧祐陸法和帥眾下據任約敗景遂遁走僧辯帥軍追景所至皆捷八月僧辯下次湓城十月王僧辯等表稱侯景拭逆皇帝賊害太子宗室在寇庭者竝罹禍酷世祖奉諱大臨三月百官縞素司空南平王恪率宗室將軍胡僧祐率群寮並奉牋勸進世祖固讓三年二月王僧辯眾軍發自潯陽世祖馳檄告四方有能縛侯景及送首者封萬戶開國公三月王僧辯等平侯景傳其首於江陵告明堂太社四月益州刺史新除假黃鉞太尉武陵王紀竊位於蜀改號天正元年世祖遣司空蕭太拜謁塋陵修復社廟五月以尚書令征東將軍江州刺史王僧辯為司徒斬賊左僕射王偉尚書呂季略於江陵市是月魏遣太師潘洛辛等寇秦郡王僧辯遣杜崱帥眾拒之以陳霸先為征北大將軍南徐州刺史是月魏遣使賀平侯景八月蕭紀率巴蜀大眾東下遣護軍陸法和屯巴峽以拒之是月四方征鎮王公卿士復勸世祖即尊號表三上乃從之承聖元年十一月景子即皇帝位於江陵立太子方拒為皇太子追尊所生妣阮脩容為文宣太后二年西魏遣大將尉遲逈襲蹈益州三月以郢州刺史陸法和為司徒四月以征北大將軍陳霸先為司空九月魏遣其柱國萬紐于謹率大眾來寇冬十月魏軍至于襄陽蕭詧率眾會之內外戒嚴輿駕出行柵徵王僧辯等軍十一月魏軍至柵下徵廣州刺史王琳入援辛卯魏軍大攻世祖出枇杷門親臨陣督戰六軍敗績反者斬西門以納魏師城陷于西魏世祖見執十二月西魏害世祖遂崩焉時年四十七太子皆見害明年四月追尊元皇帝廟曰世祖梁書曰世祖聰悟俊朗天才英發年五六歲高祖問汝讀何書對曰能誦曲禮高祖曰汝試言之即誦上篇左右莫不驚歎既長好學愽揔群書下筆成章出言為論才辯敏速冠絕一時也侯景附侯景河朔人也少不羈高歡以為將軍雄勇冠時征伐數有大功嘗謂歡曰若假景三萬人當橫行天下要須縛取蕭衍老翁遣作太平寺主後高歡死景乃以河南降于梁高澄使慕容紹宗圍於長社景謂紹宗曰欲送客耶將定雄雌耶紹宗曰吾將決戰景乃令戰士皆被甲持短刀但低視斫人脛足遂敗紹宗軍禆將斛律光尤之紹宗曰吾戰多矣未見此賊之難相持連月景食盡其將暴顯等降紹宗景眾乃潰景與腹心數騎濟淮稍收散卒得馬步八百人晝夜兼行追軍不敢逼使謂紹宗曰景若就擒公復何用紹宗乃縱之遂攻壽陽下之而據其城梁武以為河南王招集戰士乃請錦萬匹為軍人作袍帝不與以青布給之又請娶於王謝武帝曰王謝門高非其偶可朱張已下訪之景恚曰會將吳兒女以配奴景既為朝廷所疑武帝使謂景曰譬如貧家畜十客尚能得志朕惟有一客致有忿言是朕之失也明日遂將兵於瀝陽濟江聞邵陵王綸督眾軍景乃謀於王偉偉曰莫若直掩京都臨賀反於內大王攻於外天下不足定也兵法曰遲巧不如拙速今便須進路不然邵陵及人景遂晨夜兼行至都百道攻城縱火焚諸城城中倉卒未有備乃鑿門樓下水沃火久之方滅景又於城南城西各起土山以臨城內內亦作兩山以應之簡文以下皆親執畚音本鍤楚洽切景又募人先為奴賞以不次朱异家黥奴踰城投賊景以為儀同使至闕下以誘城內乘馬披錦袍詬曰朱异五十年仕宦方得中領軍我始事侯王已為儀同使於是奴僮競出盡皆得志景決石闕前百道攻城晝夜不息城陷景自為丞相以甲士五百人自衛帶劍昇殿帝謂景曰卿父在戎得無勞乎景不對帝曰卿是何州人而至此又默然左右任約代對及出景謂約曰吾嘗據鞍對敵矢刃交下而意無怖今見蕭公使人自慴豈非天威難犯吾不可以再見之矣先是城中積屍不暇理瘞又有已死未斂或將死未絕景悉命聚而焚之尚書郎鮑正疾篤賊曳出而焚之宛轉火中久而方絕武帝崩立簡文又立豫章王景皆殺之遂篡位國號漢年稱太始王偉請立七廟景問何謂七廟偉曰古者天子祭七代祖考故致七廟并請七代諱勑太常具祭祀之禮景曰前代吾不復憶唯記得阿爺名大褾且在朔州伊郍得來噉眾聞咸笑景頻為王僧辯所破將走王偉按劍諫曰自古豈有走天子今宮中衛士尚可一戰寧可便走景曰我在此時打賀拔勝破葛榮揚名河朔與高王一種人今來直渡大江取臺城如反掌打邵陵王於北山摧柳仲禮於南岸皆爾所親見也今日之事恐是天士爾好守城吾當一決乃與百騎東走至松江乃與腹心數十人乘舸入海至湖豆州舍人羊鯤殺景景左足上有肉瘤狀似龜戰勝應剋捷則隱起分明如不勝則低是日瘤陷肉中遂傳首於江陵
