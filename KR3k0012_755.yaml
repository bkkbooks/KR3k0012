body:
  text: 工藝部十一博説文曰博局戲六箸十二碁也論語曰飽食終日無所用心難矣哉不有博奕者乎為之猶賢乎已家語曰哀公問於孔子曰吾聞君子不博有之乎孔子曰有之為其二乘也公曰有二乘何為不博孔子曰為其兼行惡道也史記曰宋湣公與南宮長萬博爭公怒辱之曰吾始敬若若汝今子魯虜也長萬病此言遂以局殺湣公又曰魏王與信陵君博北境舉烽火言趙寇入界信陵君曰臣有客能知趙王陰事言趙王獵非寇也又曰劇孟好博多少年之戲又曰蔡澤説范睢曰君獨不觀夫博者乎或欲大投或欲出分功班固奕指田博懸於投不必在行崔駰曰投瓊也此皆君之所明知也漢書曰孝文帝時吳太子侍博爭道不恭皇太子以博局提吳太子殺之或云雲提音抵抵擲也又曰吾丘壽王字子贛少年以善格五召待詔蘇林曰博之類也孟康曰格者行忤相周故言各或曰塞法至立各不得故云格五也又曰陳遵祖父遂字長子宣帝微時與遂有故相隨博奕數負債及宣帝即位遂稍遷至太守賜遂璽書曰制詔太原太守官尊祿厚可以償博債矣范曄後漢書曰耿恭為戊巳校尉恭至部移檄烏孫示漢威德昆彌以下皆喜遣使獻名馬及奉宣帝所賜公主博具願遣子入侍又曰客星經帝座或問袁延延因上封事曰河南尹鄧萬有龍潛之舊封為通侯恩重公卿惠豐宗室加禮引見與之對博上下泄音薛黷有虧尊嚴魏略曰孔桂性便妍曉博奕太祖愛之每在左右又曰杜畿與衛固少相狎侮共博爭道畿曰我今作河東也固發衣罵之及畿之官而固為功曹晉中興書曰桓玄強與人博奕取其田宅穆天子傳曰天子北入邴邴鄭邑也音枋與井公博三日而決疑井公賢人而隱者故主就戲梁冀別傳曰冀好格五六博神仙傳曰中山衛叔卿服雲母得仙漢武使其子度世往華山求之度世望見父上有紫雲白玉為床與數人博戲度世問父所與博者是誰曰洪崖先生許由巢父也秦記曰呂光破龜茲始獲鳩摩羅什光死子纘立戲弄羅什或共碁博及殺子云斫胡奴頭什曰不斫胡奴頭其胡奴斫人頭後纘弟越字胡奴果斬纘頭涼州記曰呂光太安二年龜茲國使至獻寶貨奇珍汗血馬光臨正殿設會文武博戲西域胡曰諸博戲取人牛馬財物者胡俗皆陪償述征記曰極西南端門外有石石色青而細修之作博碁以遺江東甚可珍玩西京雜記曰許博昌安陵人也善大博竇嬰好之常與居處其術曰方畔揭道張玄究屈高高玄究屈張又曰張道揭畔方方畔揭道張究屈玄高高屈究張居三輔兒誦之法用六箸或謂之究以竹為之長六分或用二箸博昌又作太博經一篇今世傳之莊子曰臧與穀牧羊而俱亡其羊問臧奚事則挾策讀書問穀奚事則博塞以遊事業不同其亡羊均也列子曰虞氏者梁之富人也登高樓大路設樂飲酒擊博樓上抱朴子曰南陽文氏求食入山見高岩上有數人對博淮南子曰善博者不欲牟博以不傷為牟牟大也進也不恐不勝平心定意投得其齊齊得其適行由其理雖不必勝得籌必多韓子曰薛公之相魏昭侯也有陽胡蕃者於王甚重而不為薛公薛公患之於是乃與之博與之百金令與昆弟博戲俄又益之二百金又曰齊宣王問匡倩曰儒者博乎對曰博也者貴梟勝者必殺梟是殺其所貴也儒者以為害義故不博尹文子曰博者盡開塞之宜得用通之路揚子法言曰或問侍君子博乎曰侍坐則聽言有酒則觀禮焉事博乎説苑曰秦始皇時嫪毒驕奢後與帝左右博爭行乃瞋目太呼又曰晉靈公驕奢造九層之臺謂左右曰敢諫者斬孫息孫息即荀息也聞之求見公曰子何能孫息曰臣能纍十二博碁加九雞子於其上公曰吾少學未嘗見也子為寡人為之孫息即正顏色定志氣以棊子置於下而加九雞子於其上左右懾息靈公俯伏氣息不續公曰危哉孫息曰公為九層之臺三年不成危甚於此風俗通曰漢武帝與仙人共博其投石中馬蹄處于今尚在典略曰荊軻與魯勾踐博爭道勾踐怒而叱之軻去而逃婁春秋舊事曰倪寬為漢司農卿與太子博爭局犯罪而還遁甲經曰天一亭遊六行亭亭天一之貴神也戰鬭博戲漁獵但可皆不可向也薛孝通譜曰烏曹作博其所由來尚矣雙箭以象日月之照臨十二碁以象十二辰之躔次則天地之運動法陰陽之消息表人事之窮達窮變化之幾微履謙謝則知沖謝以致福觀殺罰則知當路而速禍行其道則掎鹿有歸保其家乃瞻烏爰集隱顯藏用莫不合道龍潛鵲起率皆趣良足以諧暢至娛始協妙賞者也魏曹植治子等讚曰齊強接子勇節徇虎門之博忽晏置釁矜而自伐輕死重分魏王粲彈碁賦序曰因行騁志通權達理六博是也晉李尤博銘曰夫無用心博奕猶賢方平處下有不邪偏樗蒱晉書曰桓玄見人有好園宅悉欲取之勒以樗博而賭之玄微聞義軍起憂懼弗能寢食或曰劉裕等狂惑事必無成玄曰裕足為一世之雄加以果於用兵劉毅家無簷石之儲樗蒱一擲百萬何無忌劉牢之外生酷似其舅共舉大事往無不成又曰葛洪字雉川性寡欲無所愛玩不知碁局幾道樗蒱齒名又曰王獻之年數歲嘗觀門生樗蒱曰南風不競門生曰此郎亦管中窺豹時見一班又曰武帝胡貴嬪帝嘗與之樗蒱爭道遂傷上指帝怒曰此固將種也對曰北伐公孫西拒諸葛非將種而何帝甚有慚色又曰謝鯤壻殷睿好樗蒱奪其妹裝物以還戲債劉湛謂謝弘微曰謝氏纍代財産充殷君一朝戲債卿視而不言譬棄物江海以為廉耳又曰陶侃字士衡見諸參佐或以談戲廢事乃取其樗蒱博具悉以投于江乃曰樗蒱者牧豬奴戲耳又曰劉毅於東府聚樗蒱大擲一判應至數百萬餘人並黑犢以還唯劉裕及毅在後毅次擲得雉太喜褰衣繞床叫謂同座曰非不能盧不事此耳裕惡之因挼五木久之曰老兄試為卿答既而四子俱黑其一子轉躍未定裕厲聲喝之即成盧焉毅意殊不快然素黑其面如鐵色焉既而乃和言曰亦知公不能以此見借又曰周顗之死也王敦坐有一參軍樗蒱馬於博頭被殺因謂敦曰周家奕世令望而位不至公及伯仁將登而墜有似下官此馬伯仁顗之字也又曰慕容寶初在長安與韓黃李根等因宴樗蒱寶危坐整容誓之曰世云樗蒱有神豈虛也哉若富貴可期頻得三盧於是三擲三盧宋書曰何尚之時頗輕薄好樗蒱既長折節蹈道以操立見稱為陳郡謝琨所知與之遊處齊書曰李安民擊鵲尾江城有功明帝大會新亭樓勞諸軍令樗蒱共賭安民五擲皆盧帝大驚目安民曰卿面方如田封侯狀也安民少時貧窶有一人從門過相之曰君後當大富貴與天子交手共戲至是果驗後周書曰王思政雖被任委自以非相府之舊每不自安太祖曾在同州與群公宴集出錦罽及雜綾絹數假命將樗蒱取之物既盡太祖又解所服金帶令諸人遍擲曰先得盧者即與之群公將遍莫有得者次至思政乃斂容跪坐而自誓曰王思政羇旅歸胡蒙宰相國士之遇方願盡心效命上報知己若此誠有實令宰相賜知者願擲即為盧若內懷不盡神靈亦當明之便使不作也便當殺身以謝所奉辭氣慷慨一坐盡驚即拔所佩刀橫於膝上覽樗蒱拊髀擲之比太祖止之已擲為盧矣徐乃拜而受之江蕤別傳曰蕤年十一始學樗蒱祖母為説往事有以博奕破業廢身者於是即棄五木終身不為戲抱朴子曰林盧山中有一亭其中有鬼每有宿者常有十許人衣袍或白或黑或男或女有王伯夷過宿而坐誦經夜有十餘人與伯夷對坐自持樗蒱伯夷密以鏡照之乃群犬也郭子曰恆公宣武也年少至貧嘗樗蒱失數百斛米齒既惡意亦沮自審不復振乃請救於袁彥道桓具以情告袁欣然無忤便即俱去出門云我不但拔卿要為卿破之我必作快齒卿但快喚既戲袁形勢呼咀音恆咀相呵慨牡擲必盧雉二人齊叫敵家震懼喪氣俄頃獲數百萬博物志曰老子入胡日作樗蒱焉俗説曰殷伯弟為何無忌參軍在潯陽與何共樗蒱得何百萬便住何大怒罵殷世説曰溫嶠位未高時屢與楊州淮中賈客樗蒱每輒不競嘗一過大輸物盡戲屈無因得反與太尉庾亮友善嶠於舫中大喚庾亮卿可贖我庾即送直然後得還異苑曰穎川陳寂元嘉中晝忽有一足鬼長三尺許為寂驅使欲與鄰人樗蒱而無五木鬼乃取刀斫庭中楊枝於戶間作之即燒灼黑白雖分明但朴爾又曰昔有人乘馬出行於岫裏見二老公相對樗蒱遂下馬以策拄地而觀之自謂俄頃望視其馬鞭漼然已爛顧瞻其馬鞍亦枯朽既還無復親識一慟而絶庾翼集曰頃聞諸君有樗蒱過差者初為是政事間暇以娛意耳故未有言也今知大相聚集漸以成俗聞之能不憮然繁欽威儀針曰其有退朝偃息間居操橩瞿營切橩博子弄碁文局樗蒱言不及義勝負是圖塞説文曰塞行碁相塞謂之塞齊書曰沈文季字仲達吳興武康人也尤善塞用五子穆天子傳曰天子北入邴音枋與井公塞魏王朗塞勢曰余所與遊處唯東萊徐先生素習九章能為計數問可以代博奕者乎曰塞其次也乃試習其術以驚睡焉邊韶塞賦序曰余離群索居無講誦之事欲學無友欲農無耒欲奕無塞欲博無楮問可以代博奕者乎曰塞其次也書曰始作塞者其明哲乎故其用物也約其為樂也大藏鉤辛氏三秦記曰昭帝母鉤弋夫人手拳而有國色先帝寵之世人藏鉤法此也法其拳乎西京雜記曰戚夫人以百鍊金為彄環照見指骨上惡之以賜侍兒荊楚歲時記曰為藏彄之戲辛氏以為鉤弋夫人所起周鈞成公綏並作彄字藝經庾闡則作鉤字其事同也俗去此戲令人生離有禁忌之家廢不修也風土記曰臘日飲祭之後嫂嫗兒童為藏彄之戲分二曹以效勝負若人偶即敵對人奇居宜切奇獨也即使奇人為遊附或屬上曹或屬下曹名為飛烏以齊二曹人數一彄藏在數十手中曹人當射常益切知所在一藏為籌五籌為一賭異苑曰晉海西公時有貴人會因藏彄欻有一手間在衆臂之中修骨巨指毛色粗黑舉坐咸驚尋為桓大司馬所誅舊傳藏彄令人生離斯驗深矣晉庾闡藏彄賦曰歎延夜之藏彄賞一時之戲望以道生為元師以子仁為佐相盛翁子藏彄賦序曰余以臘後要命中外以行鉤為戲心悅其事故賦之云蹴鞠風俗通曰九毛謂之鞠郭璞三蒼解詁曰鞠毛丸可踏戲史記蘇秦傳曰臨淄民無不吹竽鼓瑟擊築鬭雞走狗六博蹴鞠漢書曰東方朔云董君董偃也貴寵天下莫不聞郡國走馬蹴鞠客輻湊於董氏焉魏略曰孔桂字叔林性便妍好蹴鞠故太祖愛之每在左右唐書曰薑皎玄宗即位召拜殿中少監數召入臥內侍宴私以后妃連榻間以擊毬常呼之為薑七梁冀別傳曰冀好蹴鞠西京雜記曰成帝好蹴鞠群臣以蹴鞠勞體非至尊所宜帝曰朕好之可擇似不勞者奏之家君作彈碁以獻帝大悅賜青羔裘紫絲履以服朝覲焉又曰太上皇徙長安居深宮悽悵不樂高祖竊因左右問正以生平所好皆屠販少年鬭雞蹴鞠以為欣今皆無此故不樂也劉向別録曰蹴鞠者傳言黃帝所作或曰起戰國時記黃帝蹴鞠兵勢也所以練武士知有才也今軍事無事得使蹴鞠有書二十五篇會稽典録曰唐庠字漢序三國鼎跱牙興金革士以弓馬為務家以蹴鞠為學於是名儒洪筆絶而不續
