body:
  text: 珍寶部五圭說文曰圭端玉也上員下方以封諸侯楚爵有執圭尚書禹貢曰禹錫玄圭告厥成功又金縢曰既克商二年王有疾弗豫二公曰我其為王穆卜周公曰未可以戚我先生公乃自以為功為三壇同墠為壇於南方北面周公立焉植璧秉圭乃告大王王季文王又顧命曰康主即位太保承介圭上宗奉同瑁由阼階躋大圭尺二寸天子守之同爵名瑁所以冒者侯以齊瑞信方四寸邪刻之也尚書大傳曰古者圭必有冒故圭冒者天子與諸侯為瑞諸侯執所受圭以朝天子無過者復得以歸有過者留其三年周禮春官上大宗伯曰以玉作六瑞以守邦國王執鎮圭公執桓圭諸侯執信圭伯執躬圭子執穀璧男執蒲璧馬融曰瑞信鎮圭尺有二寸王者執以事天地桓圭九寸信圭七寸躬圭七寸殼圭五寸蒲圭柔滑又春官上宗伯曰以青圭禮東方又典瑞曰王搢大圭執鎮圭繅籍五采五就以朝日四圭有邸以禮天旅上帝四圭相連皆外嚮共一邸長尺二寸旅陳兩圭有邸以祀地旅四望兩圭五寸祼圭有瓚以肆先王以裸賓客灌鬯之圭尺二寸肆陳陳牲器以祭也圭璧以祀日月星辰土圭以致四時日月封國則以土地土圭尺有五寸以求土中故謂土圭也鎮圭以徵守以恤凶荒守邦國都鄙者穀圭以和難以聘女槃圭七寸槃善琬圭以治德以結好琬圭九寸琬順也又秋官下小行人曰合六幣圭以馬也儀禮聘禮曰上介受圭屈受賈人禮記禮器曰諸侯以龜為寶以圭為瑞家不寶龜不藏圭又禮器曰禮有以素為貴者大圭而使所以申信也又雜記曰贊大行曰圭公九寸侯伯七寸子男五寸博三寸厚半寸剡上左右各寸半玉也藻三采六等贊大行者書說大行人之禮者名也藻薦玉者也三采六等以朱白蒼畫之再行也三禮射侯圖曰信圭七寸謂圭上琢為人頭身之形侯所執也躬圭七寸謂圭上琢為四體之形伯所執也左傳昭六曰王子朝用成周之寶圭于河津人得諸河上又襄三十年曰鄭伯有之難游吉晉還聞難不入懼禍并及復命于介八月甲子奔晉駟帶追之及棗與子上盟用兩圭質于河子上駟帶也沈圭於河為信也棗陳留縣又昭十二年楚公尹路請曰君王命剝圭以為鏚祕鏚斧也祕柏也玉以飾斧柄敢請命請制度之命穀梁定公傳曰定公八年盜竊玉玉者制圭也毛詩生民曰顒顒卬卬如圭如璋又柳曰白圭之砧尚可磨也斯言之砧不可為也又韓奕曰韓侯入覲以其介圭入覲于王又嵩高曰王遣申伯錫爾介圭圭長尺二寸謂之介非諸侯之圭故以為寶諸侯之瑞圭自九寸而下論語鄉黨曰執圭鞠躬如也如不勝又雍也曰南容三復白圭孔子以其兄之子妻之墨子曰赤烏御圭降周之歧社曰天命周文王伐殷墨子申徒狄曰周之靈圭出於土石莊子曰楚昭王延屠羊說以三圭之位司馬彪曰諸侯三卿皆執圭也山海經曰羭山之神祠以皇圭穆天子傳曰天子乃執曰圭玄璧以見西王母也瑞應圖曰四海會同則玄圭出白虎通曰諸侯薨使臣歸圭於天子推讓之義也又曰東方為圭之制上小下大狀如梨鋒太玄經曰破璧毀圭逢不幸楚辭曰三璋圭雜於甑窐兮璋圭玉石也窐首攜也楚辭曰三圭重侯三圭謂公侯伯璧說文曰璧瑞玉環也瑗太孔璧也璜半璧也爾雅曰肉倍好謂之璧好倍肉謂之瑗尚書金縢曰周公植璧秉圭乃告大王王季文王曰爾不許我我乃屏璧與圭又顧命曰弘璧琬琰在西序大璧琬琰之圭為二重也尚書中候曰堯沉璧於河白雲起也毛詩淇澳曰有斐君子如金如錫如圭如璧又雲漢曰靡神不舉靡愛斯牲圭璧既卒寧莫我聽周禮春官上大宗伯曰子執穀璧男執蒲璧以蒼璧禮天禮記曲禮下曰操幣圭璧則尚左手又禮器曰束帛加璧尊德也左傳桓公曰鄭伯以璧假許田為周公祊故也又曰匹夫無罪懷璧其罪又僖上曰晉荀息請以屈産之乘與垂棘之璧假道於虞以伐虢又曰楚子圍許許男面縛御璧又曰初申侯有寵於楚文王文王將死與之璧使行曰唯我知汝專利而無猒我死汝必速行又曰秦伯納重耳及河子犯以璧受公子曰臣負羈紲從君於天下臣之罪多矣臣猶知之而況君乎請由此亡公子曰所不與舅氏同心者有如白水投其璧於河又僖中曰晉公子重耳及曹僖負羈之妻饋盤飱置璧焉公子受飱反璧又文下曰秦伯以璧祈戰于河又成公上曰丑父寢於轏車轏士車蛇出於其下以肱擊之傷而匿之故不能推車而及為韓厥所及欲為右故匿其傷韓厥執縶馬前縶馬絆也執之修臣僕之職再拜稽首奉觴加璧以進進觴璧亦以示敬又襄三曰諸侯取邾田自漷水歸之於我晉侯先歸公享晉六卿于蒲圃賄荀偃束錦加璧又襄六曰公薨于楚宮叔仲帶竊其拱璧以與御人納諸其懷而從取之由是得罪又襄二十八曰齊人求崔杼之尸將戮之不得叔孫穆子曰必得之武王有亂臣十人崔杼其有乎不十人不足以葬葬必須十人崔氏不能令十人同必得既崔氏之臣曰與我其拱璧崔抒大璧吾獻其柩於是得之又昭四年曰楚子以諸侯滅賴賴子面縛銜璧士袒輿櫬從之造於中軍中軍王所將王問諸椒舉對曰成王克許在僖六年許僖公如是親釋其縛受其璧焚其櫬王從之從舉言遷賴於鄢鄢楚邑又曰楚共王無冢嫡有寵子五人無適立焉乃大有事於群望而祈曰請神擇於五人者使主社稷乃遍以璧見於群望曰當璧而拜者神所立也誰敢違之既乃與巴姬密埋璧於太室之庭使五人齊而長入拜康王跨之靈王肘加焉子干子晳皆遠之平王弱抱入再拜皆壓紐又哀下曰衛人出莊公入於戎州己氏初公自城上見己氏之妻髮美使髡之以為呂姜髢既入焉而視之璧曰活我吾與汝璧己氏曰殺汝璧將焉往遂殺之而取其璧史記曰鄒陽上書曰白圭顯於中山人惡之於魏文侯文侯賜以夜光之璧又曰臣聞明月之珠夜光之璧以暗投於道衆莫不按劍相眄者何則無因而至前也又曰趙惠文王得楚王和氏璧秦昭王使人遺趙王書願以十五城請易璧遂遣藺相如奉璧西入秦相如見秦王無意償趙城乃前曰璧有瑕請指示王王授璧相如因持璧卻立倚柱怒髮上穿冠謂秦王曰趙王齊戒五日使臣奉璧今大王得璧傳之美人以戲弄臣觀王無意趙王城邑臣復取璧大王必欲急臣頭今與璧俱碎於柱矣王恐其破璧乃辭謝固請相如使從他道以璧還趙又曰張儀已學而游諸侯常從楚相飲已而楚相亡璧門下意儀掠笞數百不服釋之又曰虞卿躡履擔橙一見趙王賜白璧一雙黃金百溢又曰始皇三十年有使者從關東夜過華陰平舒道有人持璧遮使者曰為吾遺滈池君因言曰今年祖龍死使者問其故因忽不見使者奉璧具以聞始皇使御府視璧乃二十八年行渡江所沉璧也漢書曰乃以白鹿皮為弊王侯朝對必以皮弊薦璧又天文志曰日月如合璧五星如連珠又曰沛公從百餘騎見項羽鴻門沛公如廁間道走軍服虔口走音奏使張良謝羽問沛公安在良曰聞將軍有意督過已脫身去間至軍矣故使獻璧羽受之又曰文帝賜尉他書及依他因使者獻白璧一雙又曰王夫人者趙人幸武帝生子閎夫子死而帝痛之使者拜之曰皇帝謹使使太中大夫明奉璧一賜夫人為齊王太后又曰王莽篡位冠軍張永獻符命銅璧言元后當為宣室丈母後漢書曰驃騎將軍東平王蒼聞朱暉有義行辟為掾正月旦蒼將朝當奉璧賀故事少府給璧是時陰就為少府卿貴驕傲吏不奉法蒼坐朝堂漏且盡而求璧不可得顧謂掾屬曰若之何暉望見就主簿持璧即往給之曰我數聞璧而未嘗見試借觀之主簿授暉暉顧召令使奉之奉之於蒼主簿遽白就就曰朱掾義士勿復求更取璧蒼罷朝謂暉曰掾自視孰與藺相如晉書載記曰燕常山大樹自拔根下得璧七十三光色精奇有異常玉慕容攜以為嶽神之命遣其尚書郎假勤以太牢祀之又石季龍起河橋於靈昌津採石為中濟石無大小下輒隨流用功五百餘万而不成季龍遣致祭沉璧于河俄而所沉璧浮于渚上晏子春秋曰和氏之璧井里之朴耳老子曰雖有拱璧以先駟馬不如坐進此道孫卿子曰聘人以圭問士以璧魯連子曰楚成章華之臺酌諸侯酒魯君先至王悅之與不琢之璧莊子曰孔子問子桑雩曰吾見逐於魯伐樹於宋親而益踈何也對曰子獨不聞假之亡與假國名也林回棄千金之璧負赤子而趍彼以利合者迫窮相棄也天屬者迫窮相收韓子曰楚人和氏得璞玉於荊山而獻之遂名和氏之璧又曰和氏之璧不飾以五采隨侯之珠不飾以黃金其質至美物不足以飾之文子曰聖人不貴赤璧而貴寸陰不布施以求得不高下以相假此古人之德也淮南子曰禹之趍時冠掛不顧故曰不貴尺璧而重寸陰又曰和氏之璧夏后之璜揖讓而進以合欣夜以投人則為恐時與不時又曰得和氏之璧不若以事之所適又曰璧瑗成器礛諸之功礛治玉石抱朴子曰安期先生者賣藥於海邊始皇賜之金璧可直數千萬又曰虞舜之承禪也損璧於谷中又曰景帝時戍將廣陵掘冡有人如生棺中有雲母厚丈許白璧三十枚以籍身山海經曰招搖之神祠用一璧穆天子傳曰天子賓於西王母乃執圭璧以見之帝王世紀曰堯刻璧為書東次於洛言當傳舜之意戰國策曰張儀為秦破從連橫說楚王楚王遣車百乘獻駭雞之犀夜光之璧於秦王又曰齊欲伐魏魏使謂淳于髡曰弊邑寶璧二雙天馬二駟請致之髡入說齊王曰魏齊之與國今伐之名醜而實危齊王乃不伐客謂齊王曰髡受魏璧馬王謂髡曰先生有之乎曰有之伐之事便魏雖刺髡於王何益若誠不便魏雖封臣於王何損百姓無被兵之患髡有璧馬之寶於主何傷又曰蘇秦說趙王於華屋之下抵掌而談趙君封為武安君受白璧百雙黃金萬溢河圖天靈曰趙王政以白璧沉河者有一黑公從河出謂政曰祖龍來天寶開中有二玉牘也呂氏春秋曰后成子為魯聘於晉過衛右宰穀臣觴之陳樂而不樂乃送以璧后成子曰觴我與我歡也陳樂而不樂告我憂也送我璧寄託之也衛其有亂乎背衛行三十里聞寧喜之難作右宰穀臣死之后成子使人迎其妻子隔宅居之分祿食之其子長反其璧賈誼新書曰梁有疑獄乃問陶朱公朱公曰臣之家有二白璧其色相如其徑相如其澤相如然其價不相如一者千金一者五百金何則側而視之其一者厚倍之是以千金漢武帝內傳曰西王母上藥有赤河絳璧韓詩外傳曰楚襄王遣使以金千斤白璧百雙聘莊子以為相莊子固辭白虎通曰方中員外璧內方象天地列異傳曰秦召公子無忌無忌不行使朱亥奉璧一雙秦王大怒將朱亥著虎圈中亥瞋目視虎眥裂血出濺虎虎終不敢動鍾離意別傳曰意為魯相省視孔子教授堂男子張伯剗草階下土中得璧七枚懷藏其一以六白意意開甕中素書文曰後世修吾書董仲舒摸吾車拭吾履發吾笥會稽鍾離意璧有七張取一意召伯問璧有七何藏一耶伯叩頭出之物理論曰語曰士非玉璧談者為價晉中興徵祥說曰王者不隱過則玉璧見不斫自成光若月明石虎鄴中記曰石虎太武殿懸大綬於梁柱綴玉璧於綬范享燕書曰昭文帝時左部民得紫璧以獻戴延之西征記曰宋公咨議王智先停柏谷遣騎送道人惠義疏曰有金璧之瑞公遣迎取軍次于崤東金璧至修壇拜受之又云冀州博陵郡王次寺道人法稱告弟子普巖曰嵩高皇帝語吾言江東有劉將軍是漢家苗裔當受天命吾以四十二璧金一餅與之璧數是劉氏卜世之數也惠義以義熙十三年入嵩高山即得璧金獻馬具嵩山門琴操曰楚昭王得和氏璧使大夫明光奉璧於趙郡中羊申甫知趙無反遺乃讒之於王明光常背楚同趙今使奉璧何能述楚功德及明光還王怒之明光乃作歌曰楚明光魏文帝蔡伯喈女賦序曰家公與蔡伯喈有管鮑之好乃命使者周近持玄玉璧於胸奴贖其女還以妻屯田郡都尉董祀張載擬四愁詩曰佳人遺我雲中翮何以贈之連城璧
