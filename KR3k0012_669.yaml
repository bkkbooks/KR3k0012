body:
  text: 道部十養生太平經曰養生之道安身養氣不欲喜怒也人無憂故自壽也又曰一者數之始也生之道也元氣所起也天之大綱也故守而思一也子欲養老守一最壽平氣徐臥與一相守氣若泉源其身何咎是謂真寶老衰襄自去又曰古者三皇之時人皆氣清深知天地之至情故悉學真道乃復得天地之公求道之法靜為基先心神已明與道為一開蒙洞白類如晝日不學其道若處暗室而迷方也故聖賢遑駭太上經曰守一則諦定心源守靜則存神忘形定氣通無道成真降三元真一經曰體百神者耳為帝君之窗門目者太一之日月鼻者三元之丘山口者絳宮之朱淵眉者白元之華蓋髮者明堂之林精舌者元英之龍轅齒者胃宮之威力手者膽神之外援足者腎元之靈關陰極者洞房之真機也又曰涓子授蘇林守三真一之道後林復詣涓子寢靜之室無復之矣留一紙書置臥內以與林也其文曰五斗三一大帝所祕精思十二年三一見相授子書矣但有三一長生不滅況復守之乎能守三一名刊玉札況與三一相見乎加存洞房為上清公加知三元為五帝君後金闕帝君所以乘景迅雲周行十天者實由洞房三元真一之道也世之學者皆尊守一當令心朴神凝體專誠感所以百念不生精意不散但有三月內視注心一神繫念不散專氣致和由朴之至也得之速也自朴散真離華僞玄起爭競亂生故一不卒感神不即應非不欲往存之者不專思之者不審故起積年之功絶有髣佛耳三一之法上清真書之首篇高上之玉道神仙之津途衆真之妙訣子能守一一亦守子子能見一一亦見子一須身而立身須一而生守一之戒戒於不專專復不久久不能精精不能固固而不恆則三一去矣身為空宅五符經曰知一者無一不知也不知一者無一能知也一者至貴無偶之號必欲長生三一當明思一至飢一與之糧思一至渴一與之漿一能成陰生陽推行寒暑其大不可以六合隱其小不可以毫芒兆能暇能豫一乃不去存一至勤一能通神少飲約食一乃留息知一不難難在於終知真不為與不知同求之不已登彼玉清又曰養其氣所以全其身又曰食氣者常有少容老子曰道言微深子未能別撮其樞略慎戒勿失先損諸欲莫令意逸間居靜處精細齊室丹書萬卷不如守一當制念以定志靜身以安神寶氣以存血思慮兼忘宜想內視則身神並一靜思期真則衆妙感會專精積神不與物雜謂之清反神服氣安而不動謂之道又曰善攝生者陸行不遇兕虎入軍不被甲兵兕無所投其角虎無所措其爪兵無所容其刃太上真經曰一乃無像求之難得守之易失易失由識劣貪欲滯心廓然無為惟在守一積而未極皆由漸升當在三元諦識神氣狀貌名字出入有無生鎮三宮尸毒自去聖真仙經隨因授之八素經曰凡學至道諦定其心除患清身知變革慮正身清然後心定心定則道成道成則真降凡存一守神要在正化正化由定心心定則識清識清則會于道又太極真人曰古人為道也玄寂靜神念真存元示漸引末歸識源神知而能見見而能從從而能習習而能堅堅而能成成而不居善人在於天下如橐籥乎非與萬物交爭其德常歸焉以其謙虛無欲也欲者凶害之根也無者天地之元也莫知其根莫知其源聖人者去欲入無以輔其身也太一洞真經曰兩耳名為六合之高窗也又云齊中名曰受命之宮也又曰養生之道耳目為主雜視則目暗廣聽則耳閉裴君內傳曰夫求道者要先令目清耳聰為主也且耳目是尋真之梯級綜靈之門戶得失繫之仙經曰養生以不傷為本此要言也大清真經日一切含氣莫不貴生生為天地之大德德莫過於長生長生者必其外身也不以身害物非惟不害而已乃濟物忘其身忘其身而身不忘是為善攝生者也真道養神神能飛化太上三元經曰養生之道必愛氣存神不可劇語大呼使神勞氣損是以真人道士常吐納以和六液玄示經曰夫形體者特生之具也非所以生生也生生乃以素朴為體以氣為元以神為形此乃生之宮庭也以無為育其神舒釋玄妙之門往來無形之間休息於無鄰此所謂得玄明之生源又云外想宜絶內注玄真然後長生可保妙真經曰道人謀生不謀於名胸中絶白意無所傾志若流水居若空城積守無為乃能長生衆真戒曰性躁暴者一身之劇賊求道之散梯也用之者真去改之者道來每事觸類皆當柔遲而盡精潔之理如此幾乎道也神者天地之所馳也頤神養性行生道氣以度難也此乃上聖真人達識也夫為道者當行此以載其身太一帝君經曰若能常行九晨照洞房泥丸之法者檢魂魄制萬邪清淨行之以致靈仙之氣降于寢室所謂引三光九星以照百神者也上清列紀曰胎閉靜息內保百神吞景咽液飲食自然身必壽考可得陸仙矣太上真人祕要曰夫氣者神明之器清濁之宗處玄則天清在人則身存夫生死虧盈蓋順乎攝御之間也太洞玉經曰食玄根之氣者使人體中清朗神明八聰身有日映面有玉澤服餌朝液懸糧絶粒道要於金醴事妙於水玉所謂吐納自然之太和御九精之靈氣者也抱朴子曰長生之要在乎還年之道也延年除病其次焉有不以自伐若年尚少壯而知還年陰丹以補腦采七益於長谷者不服餌藥亦不失一二百歲凡傷之道有數焉才所不達而困思之力所不勝而張舉之深憂重怨悲哀喜樂汲汲所欲戚戚所患寢息失時沉醉吐嘔飽食即臥跳走喘息歡呼哭泣陰陽不交積傷至盡乖養性之方耳不極聽目不久視坐不至疲先寒而衣先熱而解不欲極飢而食食不過飽極渴而飲飲不過多不欲甚勞不欲多汗及多唾奔車走馬極目遠望多食生冷冬不欲極溫夏不欲極涼大寒大熱大風大霧不欲冒之五味不可偏多凡言傷者亦不便覺久則損壽耳是以善攝生者臥起有四時之早晚興居有至和之常制調利筋骨有偃仰之方杜疾間邪有吞吐之術流衝營胃有補瀉之法節宣勞逸有與奪之要忍怒以全陰抑喜以養陽然後先將服草木以救虧缺後服金丹以定無窮長生之理盡於此矣若有欲決意任懷自謂達識知命不泥異端極情不營久生者安可告養生之言哉登真隱訣曰方諸青童云人學道亦苦不學亦苦二苦之始乃同為苦之終則異為道者緣苦得樂不為道者從辛苦而已矣惟人自生至老自老至病獲身至死其苦甚矣心腦積罪生死不絶其苦難說況復不終其天之年老哉此不為道之苦也為道亦苦者清淨存真守玄思靈尋師勞苦歷試數百用志不墮亦苦之至也此為道之苦數十年中為苦之理乃有甚於彼得道之日乃頓忘此苦猶百日之飢一朝而飽豈復覺向者之餒乏耶非道則不可右英真人曰夫內接家業以自羈外綜王事以雜役此亦道之不專也夫抱道不行猶無道也握寶不用猶無寶也紫微元君曰疾之所生生乎念多邪之所兆兆於心散念多則事廣事廣則纍繁浮泛莫撿紛竟不息內煎萬慮外勞百役形神弊矣衆病安得不興高墉重關猶恐冠至況闢扉去防自我致寇也智以無涯傷性心以為惡蕩真形來在眼聲發入聽其為閞意屬想實有增羡魂者正神神貴明信魄者邪鬼鬼尚狂悖飛仙之想觸見必念慈護之情遇物斯極以此為心心即道矣九華經曰眼者身之鏡耳者體之牖視多則鏡昏聽衆則牖閉磨鏡決牖則能徹洞萬靈眇察絶響面者神之庭髮者腦之華心悲則面焦腦減則髮素所以精氣內喪丹津損竭精者體之神明者身之寶勞多則精散營竟則明消所以老隨氣落耄已及之真誥曰富貴者破骨之斧載罪之舟車適足誨愆要辱為伐命之兵非佳事也是故古之高人覽罪咎之難豫知富貴之不可享矣遂肥遁長林栖景名山欲遠此跡自求多福保全至素者也裴君曰三關常調是長生之道也口為天關手為人關足為地關調則五藏安安則無病又存五神於體謂兩手兩足頭也頭想恆青兩手俱赤二足常白者則去仙近矣昔徐季道學仙於鵠鳴山中亦時時出市道間忽見一人著皮袴褶柱桃杖季道乃拜之因語季道曰欲學道者當巾天青詠大曆踏雙白佪二赤此五神之事其語隱也大曆三皇文也此即太素五神事別有經品黃老經曰士能遺物乃可議生生本無邪為物所嬰久久易志志欲外無能守以道為貴生太上太真科曰一在人身鎮定三處能守三一動止不忘三尸自去九蟲自消不假藥餌不須禁防久視之要守一為先次行師教授職隨才依功進位積德居尊宣楊妙氣開導後生三皇經曰天能守一覆而不舉地能守一靜而能處嶽能守一不避寒暑海能守一流而不還人能守一必得真仙升玄經曰道有大法得之立得是謂三一之道當有將軍吏兵斷絶惡道上清玉皇曰三真者兆一身之帝君百神之內始變化離合與真洞靈微哉難言非仙不傳太上素靈經曰三一者一身之靈宗百神之命根津液之山源魂精之玉室是以胃池體方而受物腦宮圓靈而適真太上曰真人所以貴一為真者一而已一之所契元氣造化一之變通天地冥合是以上一為身之天帝中一為絳宮之丹皇下一為黃庭之元主而三之一真並統身內二十四氣以授生生立一於身上應太微二十四氣真真氣徊和品物流形玄神渾分紫房杳冥上一真帝之極也中一真皇之主也下一真王之妙也天皇得極故上成皇極地皇得主故上成正一人皇得妙故上成衆妙三皇體真而守一其真極也得一而已集仙籙曰凡動作視息飲食語言好惡是非人各有歲月日時隨其所屬以定其分此物理之常數也身有應敗之患神有應散之期命有必盡之勢夫神在則人神去則尸蓋由嗜欲亂心不能忘色味之適夫修其道者在適而無纍和而常通善惡各在報應之理毫釐無失長生之本惟善為基人生天地間各成其性夫氣清者聰明賢達氣濁者凶虐癡戇氣剛者高嚴壯烈氣柔者慈仁淳馬夫明者伏其性以延命暗者恣其欲而傷性性者命之原命者生之根勉而修之所以營生以養其性守神以養其命人之生也皆由於神神鎮則生神斷則死所以積氣為精積精為神故仙者內求內密則道來真者修寂修靜則合真神者須積感則靈通常能守一則仙近矣則與天地共寄於太無中矣又能洞靈體無則太無共寄於寂寥中矣能洞寂則聽視不聞見與道冥矣道者靈通之至真也術者變化之伎玄也道無形因術以濟人人之有靈因修而契道道之要者在深簡易功術之祕者惟藥與氣也上士服之升為仙官中士服之栖集崑崙下士服之長生人間於是太一元君述還丹金液之要行於世又曰木公金母者二氣之祖宗陰陽之原本仙真之主宰造化之元先疑氣成真與道合體且氣之彌綸天地經營動植在人為人在物為物發大蘊散無窮性發乎天而命成乎人立之者天行之者道玄老云致虛極守靜篤萬物將自復復謂歸於道而常存也長久之要者天保其玄地守其物人養其氣又曰商王聞彭祖有道拜為大夫每稱疾間居不預政事服雲母粉麋鹿角水挂常有少容性深靜不自言有道王詣問莫之告王於掖庭立華屋紫閣使祖居之問延年益壽之道答曰欲登天上補仙官者當服元君太一金丹此道至大其次當愛精養神服食草藥可以長生其次陰陽運氣導養屈伸使百節氣行關機無滯此可以無使病所侵思神念真坐忌鍊液皆可以令人長壽若泝流補腦之要此甚難行有懷棘履刃之危又非王之所為也吾所聞淺薄道止於此不足宣傳人生於世伹養之得宜可至百餘歲不及此者是皆傷之也大醉大喜大怒大溫大寒大勞大極皆傷也至樂至憂至畏至怖至撓至躁至奢至淫皆傷也甚飢甚渴甚思甚慮皆傷也久坐久立久臥久行皆傷也寒溫得節飢飽適宜無思無為惟清惟靜此可與言修身耳已得其壽復養之得宜則宜長壽但要莫傷也冬溫夏涼不失四時之和者所以適身也美色曼態不至思欲之感者所以通神也車服威儀知足不求者所以一其志也八音五色不至耽溺者所以導心也凡此之物本以養人人之不能斟酌得中反以為患故聖賢垂戒懼下才溺之流遁忘返用之失所故修道之士皆令禁之欲以檢制之易也亦由水火用之過當反為害耳人不知經脈損血氣不足內理空踈髓腦不實體已先病故為外物所犯因風寒酒欲以發之若本充實豈有病耶凡遠思羡願傷人也憂恚悲哀人情過樂忿怒不解汲汲所愛戚戚所患寒溫失節陰陽不交皆所傷也男女相成猶天地相生也所以導養神氣使人不失其和天地晝離而夜合一歲三百六十交故四時均而萬物生生成不知窮極所以天不失其動地不失其和物不失其生而能長久也人不能法天地而有常減衣絶食自取死病愚之甚也去此修攝節宣之外則有服元和之氣得其道則邪不能入此理身之本也其餘含景思神歷藏導引吞餌服御之事千七百餘條及四時首月責己謝過臥起早晏之法可以教初學之士引進向善之門漸正其心而徐息其罪咎非便能致人得道也若血脈枯竭神氣凋敗豈鬼神念真而能守之固未知其益矣此由凡人為道而求其末不務其本也又曰內不養神外勞其形元精漸虛神氣困竭而晝夜服勤讀誦經訣此亦無益也諸經萬三千首皆示以始涉之門庭耳商王具受諸要行彭祖之亦壽但不能戒其淫欲耳集仙籙曰女凡者陳市上酒婦也作酒美有仙人過其家飲酒即以素書五卷貰酒凡開視之乃仙方養性長生之術也凡私寫其要訣依而修之三年顏色更少數歲貰酒仙人復來笑謂之曰盜道無師有翅不飛女凡隨仙人去不知所之又日太陽女朱翼得吐納之道事絶洞子李修修著書四十篇名曰道源常行之道以柔勝剛弱制強如臨深履危御奔乘朽差之毫釐喪爾之策勤而行之可以長壽又曰太陰女盧金學道未成當道沽酒密訪其師會客過使問客土數為歲但南三北五東九西北中耳一還報曰客大賢者至得道人也我始問一知五矣遂問長生之道得補導之要蒸丹之方又曰太玄女顓和常曰人之處世一失不可復得一死不可復生況壽限之促非修道不可延也遂洗心求道而得其術
