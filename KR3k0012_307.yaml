body:
  text: 兵部三十七請征伐家語曰孔子北遊登於農山子路子貢顏回侍側孔子四望喟然而歎曰二三子各言爾志吾將擇焉子路進曰由願得白羽若月赤羽若日鍾鼓之音上震于天旌旍繽紛下蟠于地蟠委也由當一隊而敵之必也攘地千里攘却也搴取也旗執馘唯由能之使夫二子從我焉孔子曰勇哉史記曰終軍請願受長纓必羈南越王而致之闕下又曰單于為書慢罵太后樊噲曰臣願得十萬衆橫行胸奴中季布曰高皇帝以三十萬困於平城噲亦在其中且秦以事胡陳勝等起後漢書曰劉尚擊武陵五溪蠻深入軍沒援因復請行時年六十二帝恐其老未許之援自請曰臣尚能被甲上馬帝令試之援據鞍顧盻以示可用笑曰矍鑠哉是翁也矍鑠勇貌也東觀記作獲哉是翁獲音許約反遂遣援援馬援也又曰更始郾王尹尊及諸大將在南方未降者尚多帝召諸將議兵事未有信言沉吟久之乃以檄叩地曰郾最強宛為次誰當擊之賈復率然對曰臣請擊郾帝笑曰執金吾擊郾吾復何憂唐書曰李晟以軍功授特進光祿卿尋轉試太常卿大曆初李抱玉鎮鳳翔署晟為左軍都將四年吐蕃圍靈州抱玉遣晟將兵五千以擊吐蕃晟辭曰以衆則不足以謀則太多乃請將兵二千人疾出大霰闕至臨洮屠定秦堡焚其積聚虜堡師慕容谷鍾而還吐蕃因解靈州圍而去也又曰馬隧討李懷光師次於焦離堡其夜賊將吳冏棄太原堡走其下皆降燧率諸軍濟河兵凡八萬陳於城下是日賊將牛俊斬懷光首以降降者一萬六千斬賊將閻晏孟寶張清吳冏等七人以徇為懷光所虜脅捨之燧自從京師至河中凡二十七日上乃下詔褒美遷光祿大夫兼侍中初德宗欲罷兵燧不可請得一月芻糧足以平河中至是果然矣又曰德宗幸奉天詔李晟與李懷光合軍拒朱泚時每將出合戰晟必自異衣錦裘繡帽於前親自指導懷光望見之乃謂晟曰將師當持重豈宜自裘飾以啖賊耶晟曰前久在涇源軍士頗相畏服故欲令其先識以奪其心耳懷光益不悅陰有異志兵遷延不進晟因入説懷光曰寇賊偷據天子行在近縣兵柄廟略屬在於公公宜以時速進晟願以所部得奉嚴令為公前驅雖死不悔懷光益拒之又曰史敬奉靈武人少事本軍為衙將元和十四年敬奉大破吐蕃於鹽州城下賜實封五千戶先是西戎頻歲犯邊敬奉白節度使杜叔良請兵三千人備一月糧深入蕃界叔良以二千五百人授之敬奉既行十餘日人莫知其所向皆謂吐蕃盡殺之矣乃由他道深入突出蕃衆之後戎人驚潰敬奉率衆大破之殺戮不可勝紀驅其餘衆於蘆河獲羊馬駝牛萬數敬奉形甚短小若不能勝衣至於野外馳逐能擒奔馬自執鞍勒隨鞍躍上然後羈帶矛失在手前無強敵甥姪及僮使僅二百人每以自隨臨入敵輒分其隊為四五隨逐水草每數日各不相知及相遇己皆有獲虜矣三國典略曰北齊平廣陵王孝珩曰奈何嗣君無獨見之明宰相非柱石之寄內參群豎離間骨肉恨不得握兵符受廟算出萬死身先士卒展我力耳又曰齊主曰今日飲酒樂哉武衛將軍斛光進曰關西未平人為仇敵陛下亦何樂哉會當馬步十萬三道渡由平道陷玉璧拔長安自瓜涼一帶悉在掌握使百官襲冠冕軍士釋介胄然後稱樂齊主謂群臣曰明月常有此意憂國如家卿輩無及之者平原王假韶出謂光曰卿勝先帝耶先帝以四十萬攻玉璧不利而還將兵如盤擎水誤即傾覆何容易而輕言之光笑曰非卿所知出師易曰師出以律失律凶也書曰張皇六師肅將天威兼弱攻昧推亡固存無作神羞詩曰維師尚父時維鷹揚禮記曰師出不踰時為怨思也踰時即內有怨女外有曠夫又曰天子將出征類于上帝宜乎社造乎禰禡於所征之地禡師祭也受命于祖告祖受成於學充兵謀也出征執有罪反釋奠於學以訊馘告周禮曰牙璋以起軍旅又曰類祭先出師告天祭也造祭將興兵造於先祖祭也穀梁曰甲午治兵出曰治兵習戰入曰振旅習戰也後漢書曰光武起王莽徵天下能為兵法者六十三家數百人並以為軍吏選練武衛招募猛士説文云慕廣求也旌旗輜重千里不絶時有長人巨無霸王莽連率韓博上言有奇土長一丈大十圍自謂巨無霸出於蓬萊東南五城西北昭如海濱軺車不能載三馬不能勝臥則枕鼓以鐵箸食見前書長一丈大十圍以為壘尉鄭玄注周禮六軍壁三壘崔瑗中壘校尉針曰堂堂皇帝設為壘尉尉者主壘壁之事又驅諸猛獸猛或作獷獷猛貌音古猛反虎豹犀象之屬以助威武自奏漢出師之盛未嘗有也又曰車駕東歸勑岑彭書曰兩城若下便可將兵南擊蜀虜人若不知足既平隴復望蜀每一發兵彭頭鬚為白又曰馬嚴拜將軍長史將北軍五校士羽林禁兵三千人屯西河美稷美稷縣名衛護南單于聽置司馬從事牧守謁敬同之將軍勑嚴過武庫祭𧈪尤武庫掌兵器令一人秩六百石前書音義曰𧈪尤古夫子好五兵故合祭之見高袒紀過帝親御阿閣阿曲觀其士衆時人榮之又曰馬成拜揚武將軍督誅虜將軍劉隆振威將軍宋登射聲校尉王賞發會稽丹陽九江六安四郡兵擊李憲時帝幸壽春設壇場祖禮遣之又曰涼部叛羌搖蕩四州朝廷憂之於是詔鄧騭將左右羽林北軍五校士及諸部兵擊之車駕幸平樂餞近又曰馬援出師詔百官祖道又曰光武籌赤眉必破長安欲乘舋并入關中而方自事山東未知所寄以鄧禹沉深有大度故授以西討之略乃拜為前將軍持節中分麾下精兵二萬人遣西入關令自選偏禆以下可與俱者晉書曰何曾正始中為鎮北將軍都督河北諸軍事假節將之鎮文帝使武帝齊王攸辭送數千里曾盛為賓主備太牢之饌侍從吏騶莫不醉飽又載記曰符堅以符融為鎮東大將軍代王猛為冀州牧融將發堅祖于霸東奏樂賦詩堅母茍氏以融少子甚愛之比發王至灞上其夕又竊如融所內外莫知是夜堅寢于前殿魏延上言天市南門屏內后妃星失明左右閽守不見后妃移動之象堅推問知之驚曰天道與人何其不遠遂重星官後魏書曰車駕南伐以劉藻為征虜將軍督統軍高聰等四軍為東道別將辭於洛水之南孝文曰與卿石頭相見藻對曰臣雖才非古人度亦不留賊虜而陛下輒當釃曲阿之酒以待百官帝大笑曰今未及曲阿且以河東數石賜卿後周書曰武帝保定四年冬十月甲子詔大將軍大冢宰晉國公護率軍伐齊帝於太廟庭授以斧鉞護總大軍出潼關大將軍權景宣率山南諸軍出豫州少師楊檦出枳關丁卯幸沙苑勞師三國典略曰侯景西逼梁湘東王遣晉州刺史蕭惠正率兵援于巴陵惠正辭以不堪舉天門郡守胡僧祐以自代王以為武猛將軍令其進發僧祐謂其子玘曰汝可開兩高門一朱一白吾當以死決之不捷不歸也王聞而壯之厚撫其家謂僧祐曰景便於陸道不間水鬥賊若水戰但以大艦臨之自當必克若其步戰自可鼓棹直就巴丘不須交鋒又曰周遣常山郡公子謹率中山公宇文護大將軍楊忠等步騎五萬南伐太祖餞於青泥谷時庾信來聘未返太祖問之曰我遣此兵馬縛取湘東關西作博士卿以為得不信曰必得之後王勿以為不忠太祖笑而頷之白虎通曰王者之伐所以皮辨素幘何服皮辨素幘也王者將出辭於禰還假禰祖言辭反之禮尊親之義王制曰王者將出類于上帝宜于社造于禰尚書曰歸假于蓻祖出以告天至告祖也先告廟後告天者示不敢留尊者之命也告天何示不敢專也非出辭反面道也與宗廟異義還不復告天者天道質無內外故不復告也尚書言歸假于祖社不見告天知不告也又曰遣將軍必於廟何示不敢自專獨於祖廟何制法度者祖也王制曰受命于祖受成于學此言於祖廟命遣之也摯虞決疑要注曰古者帝王出征以齊車載遷廟之主及社主以行故尚書甘誓曰用命賞于祖不用命戮于社秦漢及魏行不載王也衛公兵法曰諸大將出征且約授兵二萬人而即分為七軍如或多或少臨時更定大率十分之中以三分為奇兵太白陰經曰參七星伐三星連體十星為十將西方白虎宿也主殺伐此星出而天下秋草木搖落有若軍威故兵出而法焉張平子南都賦曰爾其則有謀臣武將皆能獲戾執猛破堅摧剛虞子陽霍將軍北伐詩曰擁旄為漢將汗馬出長城魏明帝善哉行曰我祖我征伐被蠻虜練師簡卒爰整其旅輕舟竟川傍江依浦桓桓猛毅如熊如虎發桴若雷吐氣成雨旌旄指麾進退合矩軍行禮記曰軍行在青龍而右白虎前朱雀而後玄武招搖在上急繕其怒前有水則載青旌前有車騎則載飛鴻前有塵埃則載鳴鳶左傳曰凡師出一宿為舍再宿為信過信為次後魏書曰于栗磾太宗南臨孟津請衆磾曰可作橋乎對曰杜預造橋遺事可相乃編次大船搆橋於野坂六軍既濟太宗深歎焉隋書曰煬帝征高麗宇文述為扶餘道將軍臨發帝謂述曰禮七十者行役以婦人從公宜以家纍自隨古稱婦人不入軍臨戰時耳至於營壘之間無所傷也項籍虞姬即其故事唐書曰太宗率衆平汾晉趨龍門闕履冰而渡進屯柏璧白虎通曰王法年四十受兵法何重不絶人世也師行不必反戰不必勝故須其有世也年六十歸者何不忍並門人父子也孫子曰凡用兵之法馳車千乘輕車也駕駟千乘也革車千乘重車也言萬騎之重也一車駕四卒十騎一重養一人主炊冢子一人主保國守衣裝廝二人主養馬凡五人步兵十人重以大車駕牛養二人主炊冢子一人主保國守裝凡三人也帶甲十萬士卒數也千里而饋糧境越千里則外內之費資費賓客之用膠漆之財車甲之奉日千金然後十萬之衆舉矣又曰出其所必趣使敵不得往相救也行千里而不勞者行於無人之地出空擊虛擊其不意又曰凡用兵之法將受命於君合軍聚衆聚因人結行位也交利而舍軍門為利門左右門為期門以軍營為轅門以人為營為人門兩軍相當為交利也莫難於軍爭從始受命至於交利軍爭難也又曰凡處軍相敵絶山依谷近水草也視生處高向陽也處視謂目前生世處軍當在高戰降無登無迎高也降下也謂山下也戰於山下敵引之上山無登遂也此處山谷之軍也絶水必遠水引敵使渡客絶水而來迎之於水內令之半渡而擊之利欲戰無附於水而迎於客也視在處高水上亦當處其高也無迎水流恐溉我也處水上之軍也絶斥澤唯亟去無流交軍於斥澤之中必依水草而倍衆樹不得已與敵戰而會斥澤之中此處斥澤之軍也平陸處易車之利也而左右倍高前死後生戰便此處平陸之軍也凡四軍之利黃帝所以勝四帝者也黃帝始立四方諸侯亦稱帝以此四地勝之也凡軍喜高而惡下貴陽而賤陰喜一作好山南曰陽山北曰陰養生處實是為必勝軍無百疾丘陵隄防必處其高陽而右背也堤者積土所背當處其陽而右之戰之便也此兵之利而地之助也故用兵之法高陵勿向也敵若據山陵依附險阻陳待敵勿輕攻趣也既地勢不便有損右之衝也背丘勿迎敵背丘陵為陳無有後患則當引置平地勿迎而擊之又曰上雨水水沫至欲渡者待其定恐半渡而水便漲也絶澗過天井天牢天羅天陷天郤去逆切大害必亟去之勿近也山也深大為絶澗四方高中央下為天井深水所居朦朧者為天牢四維絶人者為天羅地形陷者為天陷山澗夾地深數尺長數尺者謂之天郤也吾遠之敵近之吾迎之敵倍之也用兵常遠六害令敵近倍則利敵凶軍旁有險阻蔣潢井生葭葦小林翳薈鳥會反者必謹覆索之此伏姦之所藏處也險者一高一下之地阻者必水草也潢者池也井生葭葦者衆草所聚也小林者衆木所居也翳薈者所以屏蔽之處也衛公兵法曰軍馬行動須知次第出先右虞候馬軍為首次右虞候步軍次右軍馬軍次右軍步次前軍馬軍次前軍步軍次右軍馬軍次中軍步軍次右軍馬軍次右軍步軍次左軍馬軍次左軍步軍次左虞候馬軍次左虞候步軍其馬軍去步軍一二里外行每有高處即令三五騎馬於上立顧以候不虞以後餘軍準前立馬四顧右虞候既先發安營踏水道路修理泥溺橋津檢行水草左虞候排比隊仗整齊軍次使不交雜若軍回入先左虞候馬軍次左虞候步軍次左馬軍次左步軍其次第準前却轉其虞候軍職掌初發交換諸軍營各量虞候子並使排比依軍次行如此發引卒逢寇賊部伍甚易若零疊散行牽率難就萬一賊至並非所管又曰諸軍討伐例有數營發引逢賊首尾難救行引之時須先為方陳應行之兵分為四輜重為兩道引戰鋒等隊亦為兩道引其第一分初發輜重及戰鋒分為四道行兩行戶郎切下同輜重在心雙引兩行戰鋒隊並合各在輜重外左右夾雙引其次一分戰鋒隊與前般左右行戰鋒隊相當輜重隊與前行輜重隊相當又其次一分準上最後一分亦準上初發第一分別戰鋒輜重相當如其逢賊前分四行兩行輜重抽縮兩行戰鋒橫列作前面甚易其次兩分先作四行長引其戰鋒既在外便充兩面其後分亦先作四行其輜重進前其戰鋒隊橫列相接使充後面亦易其方陳立即可成如此發引縱使狹路急緩亦得成陳每軍戰鋒等隊須過本軍輜重尾輜重稠行戰鋒等隊稠引常令輜重併近前頭戰鋒隊相去十步下一隊輜重隊相去十步下一隊輜重隊相去兩步下一隊如此即須相裏得若逢川陸平坦彌加穩便其戰鋒輜重等隊分布使均又曰諸兵馬發行或逢泥溺或阻山河其路有須填補有須開拓左右虞候軍兵先多於軍取充虞候子右虞候先將此兵修理橋梁泥濘開拓窄路左虞候排窄路捍後收拾闌遺諸兵士每下營訖先令兩隊共掘一廁又曰軍行沙磧鹹鹵之中有野馬黃羊蹤尋之有水鳥烏所集處有水地生葭葦蘆菼吐敢反菰蒲之處下有伏泉地有蟻壤之處下有伏泉太白陰經濟水具篇曰軍行過大水河渠溝澗無津梁舟筏難以濟渡太公以天艎天船皆質朴不便於用令隨事逐物變化而用之以濟巨川又曰木罌以木縛甕為筏甕受二石力勝一人甕間闊五寸底以繩勾聯編槍於其上形長而方前置柭頭後置梢左右置棹又曰槍茷槍十根為一束力勝一人四千一百六十六根即為一筏皆去鑽刃以束為魚鱗以橫栝而縛之可渡四百一十六人為三筏計用槍一萬二千五百根率渡一千二百五十人十渡則一軍必濟又曰蒲筏以蒲九尺圍顛倒為束十道縛之似束鎗為筏量長短多少隨蒲豐儉無蒲亦用葦筏量大小以濟人又曰挾緪以善水者繼小繩先浮渡水次引大緪於兩岸立大橛急定緪使人挾緪浮渡大軍可為數十道又曰浮囊以渾脫羊皮吹氣令滿擊其孔束於腋下而浮渡
