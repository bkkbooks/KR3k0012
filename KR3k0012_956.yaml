body:
  text: 木部四桑易曰其亡其亡繫于苞桑苞桑藂生桑也書曰青州厥篚檿絲孔安國曰檿桑蠶絲中琴瑟絃檿於琰切又曰伊陟相大戊毫有祥桑穀共生於朝妖怪也二木合七日大拱不恭罰詩曰桑之未落其葉沃若桑女功之所起沃若猶沃然于鳩兮無食桑椹桑之落矣其黃而隕又曰交交黃鳥止于桑又曰星言夙駕稅于桑田教民稼穡務農急也又曰女執懿筐爰求柔桑柔桑稚桑也又曰蠶日條桑條桑枝落採其葉也又曰猗彼女桑女桑少枝長條不枝落者棟而採之又曰肅肅鴇行集于苞桑又曰將仲子兮無踰我牆無折我樹桑又曰隰桑有阿其葉有儺阿然美貌也儺然盛貌也有以利人也箋云隰中之桑條之阿阿然長美其葉又茂盛可庇蔭人興者喻時賢人君子不用而處有覆養之得既見君子其樂如何禮記曰季春之月命野虞無伐桑柘又曰古者天子諸侯必有公桑蠶室近川而為之左傳曰晉重耳及齊桓公妻之有馬二十乘公子欲安之從者以為不可將行謀於桑下蠶妾在其上以告薑氏薑氏殺之又宣上曰趙宣子田於首山舍於翳桑田獵也翳桑桑之多蔭翳者也見靈輒餓問其病應之曰不食三日矣食之捨其半問之曰宦三年矣未知母之存否今近焉去家近也請以遺之使盡之而為之簞食與肉簞笥置諸橐以與之既而與為公介靈輒為公甲士倒戟以禦公徒而免問其故曰翳桑之餓人也問其名居問所居也不告而退春秋元命苞曰薑嫄遊閟宮其地扶桑履大人迹生稷扶桑日所出也春秋孔演圖曰孔子母徵在遊大冢之陂睡夢黑帝使請己往夢交語女乳必於空桑之中覺則若感生丘於空桑之中乳生爾雅曰女桑桋桑郭璞注曰谷呼小桑長條者為女桑樹桋音根又音夷檿鳥點切桑山桑詩曰其檿其柘林中弓也桑柳醜條阿郍垂條也史記曰齊魯千畝桑其人與千戶侯等又曰吳公子光伐楚拔居巢鐘離初楚邊邑卑梁氏之處女與吳邊邑之女爭桑二女家怒相滅兩邊邑長聞之怒而相攻滅吳之邊邑吳王怒故遂伐楚漢書曰息夫躬免官歸國未有第宅寄居丘亭姦人以為侯家富常夜守之賈惠往過躬教以祝盜方以桑東南枝為七畫北斗七星其上躬夜自被髮立中庭向北斗持匕招指祝盜人有上書言躬懷怨恨繫雒陽詔獄死東觀漢記曰蔡君仲汝南人王莽亂人相食君仲取桑椹赤黑異器賊問所以君仲云黑與母赤自食賊義之遺鹽二斗受而不食謝承後漢書曰陳留申屠蟠恥郡無處士遂閉門飬志處蓬室依大桑樹以為棟梁又曰河內高弘為琅琊相妻子不歷官舍桑杯盛漿又曰汝南尹昆為汝陰功曹令新到官問曰園中有桑以飯蠶何如昆曰非初政所務令嘉其言又曰張湛為漁陽太守勸民耕種百姓歌曰桑無附枝麥穗兩岐張君為政樂不可支又曰陳曄為巫令有惠政桑生二萬餘株民以為給魏略曰楊沛為新鄭長課民益蓄桑椹䝁豆積浸得千餘斛太祖遷天子軍無糧沛乃進乾椹後為鄴令賜其生口十人絹百匹以報乾椹也蜀志曰先主舍東南角籬上有桑樹生高丈餘遙望童童如小車蓋往來者皆怪此樹非凡或謂當出貴人先主少時同宗中諸兒於樹下戲言吾必當乘此羽葆車蓋晉書曰賈后將廢愍懷太子時有桑生於西廂長數日而枯十二月后廢太子又曰劉驎之尚書質素好道車騎將軍桓沖聞名辟為長史固辭沖嘗到其家驎之於樹條桑使者致命驎之曰使君既枉駕光臨宜先詣家君沖愧詣其父又載記曰北燕馮跋下書曰今疆守無虞百姓寧業而田畝荒穢有司不隨時督察欲令家給人足不亦難乎桑柘之益有生之本此土少桑人未見其利可令百姓人植桑一百二十根崔鴻前涼録曰張天錫為符堅破後歸晉孝武帝問之曰北方何物為美錫對曰桑椹甘香鴟梟革響淳酪養性人無疾心崔鴻十六國春秋後燕録曰初晃之遷于龍城也植松為社主及秦滅燕大風吹拔之後數年社處忽有桑二根生焉先是遼川無桑及廆通于晉晉求種江南平川之桑悉由吳來齊書曰太祖宅在武進宅南有桑樹擢本三丈橫出四枝狀如車蓋上年數歲遊其下從兄敬宗謂曰此樹為汝生也又曰沈瑀為建德令教人一丁種十五株桑四株柿栗女丁半之人咸歡悅頃之成林又曰韓係伯襄陽人也事父母孝謹襄陽土俗鄰居種桑樹於界上為志係伯以桑枝蔭妨他邊界上開數尺鄰畔隨侵之係伯輒更段種久鄰人慚愧還所侵地躬往謝之又曰扶桑國在大漢國東二萬餘里地在中國之東其土多扶桑木故以為名扶桑似桐初生如笋國人食之實如梨而赤績其皮為布以為衣亦以為錦以扶桑皮為紙三國典略曰宋子仙召吳令沈景令掌書記景固辭以疾子仙怒命斬之景解衣就戮礙於路間桑樹乃更牽往他處或救之獲免又曰齊長廣郡廳梁木忽作人像太守惡而刷去之明日復出鄉人伐枯桑樹於中得死龍長尺餘識者以為長廣齊太上主太封也齊氏木得龍為吉象木枯龍死非吉徵焉隋書曰齊河清中定令丁給永業二十畝為桑田其中種桑五十根榆三根棗五根土不宜桑者給麻田如桑田法唐書曰李龍譽居家以儉約自處每謂子孫曰吾性不好貨財遂至貧乏然吾近京城有賜田十頃耕之可以充食桑若干根採之可以充衣家語曰殷太戊之時道缺法圮以致天孽桑穀生朝七日大栱占者曰桑穀野木而生于朝意者朝亡乎太戊恐駭側身修德范子計然曰桑葉出三輔列子曰晉文公會欲伐衛公子鉏仰而笑公問何笑曰臣之鄰人有送妻適私家者道見桑婦悅而與言然顧視其妻亦有招之者臣竊笑此也公寤其言乃止引師還未至而有伐其北鄙者孟子曰孟子謂梁惠王曰五畝之宅樹之以桑五十者可以衣帛矣孫卿子曰孔子適楚於陳蔡之間七日不食曰居不隱者思不生身不佚者志不廣汝庸知吾不得之桑落之韓子曰子産開畝樹桑鄭人謗訾鄒子曰季夏取桑柘之火呂氏春秋曰伊尹之母居伊水上孕夢有神告之曰臼出水而東走無顧明日視臼中出水告其鄰東走顧其邑盡為水身因化為桑有莘氏採桑得嬰兒於桑之中獻之於君君命乳之命之曰伊尹又曰季春之月也命野虞母伐桑柘野虞主林官也桑與柘皆可養蠶故命其官使民不得斫伐鳴鳩拂其羽戴勝降於桑淮南子曰原蠶一歲再登非不利也登成也然王法禁之者為其殘桑也殘害也又曰扶桑在晹州日所拂此東方十日所出扶桑在賜谷中九日無下枝一日君上枝也山海經曰宣山上有桑大五十匹圍五丈其枝四衢枝交四出葉大尺赤理青葉名曰帝女之桑郭璞曰婦人主桑故以名為桑又曰東北海外圓丘南有三桑無枝皆高萬仞又曰暘谷上有扶木郭璞曰扶桑十日所浴穆天子傳曰甲寅天子作居范宮范離宮別名以觀桑者詩曰桑者間間兮乃飲于桑中桑林之中天子命桑虞主桑者也出桑者用禁暴民不得令妾犯桑也神異經曰東方有樹焉高八十尺敷張自輔葉長一丈廣六七尺曰扶桑有椹焉長三尺五寸任昉述異記曰桓沖為江州刺史遣人周行廬山冀覩靈異陟崇巘有一湖匝生桑樹湖有敗艑赤鱗魚使者渴極欲往飲水赤鱗張鬣向之使者不敢飲列女傳曰魯秋胡子納妻五日而官於陳後歸未至家見路傍有美婦人方採桑秋胡悅之下車願託桑陰下婦人採桑不輟秋胡曰力田不如逢年力桑不如見郎今吾有金願與夫人婦人不受胡乃歸母呼其婦乃向採桑者也數胡之罪而自投于河又曰齊瘤女者齊東郭採桑之女項有大瘤閔王遊至東郭百姓盡觀獨瘤女採桑如故王怪召問之對曰受父母教採桑不受教觀大王王曰此奇女悅娉迎之又曰東辨女者陳國採桑之女也晉大夫解居甫使於宋解居甫宋大夫道過陳遇採桑之女止而戲之曰女為我哥吾將捨女捨置不留女也採桑女乃歌曰墓門有棘斧以斯之夫也不良國人知之益部耆舊傳曰何祗夢桑生井之中解桑字四十八君壽恐不可過此祗四十八而卒荊州先賢傳曰龐士元師事司馬德操不矜小名衆莫知之德操蠶月躬採桑後園士元助之因與談斷世廢興其言若神遂移日忘餐德操於是異之甄異傳曰沛國張伯遠年十歲時病亡見泰山下有十餘小兒共推一大車車高數丈伯遠亦推之時天風暴起揚塵伯遠因桑枝而住聞呼聲便歸遂蘇髮中皆有沙塵後年大至泰山識桑如死時所見十洲記曰扶桑在碧海中上有天帝宮東王公所治有椹樹長數千丈二千圍兩兩同根更相依倚故曰扶桑仙人食其椹椹體作金色其樹雖大椹如中夏桑椹也稀而色赤九千歲一生實耳味甘香玄中記曰天下之高者扶桑無枝木焉上至天盤蜿而下屈通三泉括地圖曰化民食桑二十七年化而自裹九年生翼十年而死石虎鄴中記曰幸梓苑中盡種桑三月三日及蠶時虎皇后將宮人數千出採桑遊戲其下汜勝之書曰種桑五月取椹著水中濯灑取子陰乾之好治肥田十畝荒久不耕者先好耕治之黍椹子各三升合和種之黍桑當頃俱生鉏之桑令稀疏調適黍熟穫之桑生正與黍高下平因以利鎌歷地刈之曝令燥後有風調放火燒之常逆起火桑至春生一畝食三簿蠶神仙傳曰麻姑謂王方平云吾見東海三為桑田本草經曰桑根旁行出土上者名伏蛇治心痛神農本草曰桑根白皮是今桑樹根上白皮常以四月採或採無時出見地上名馬領勿取毒殺人典術曰桑木者箕星之精楚辭曰衣攝棄以儲與兮攝棄儲與不舒展之貌左祛絓於扶桑祛袖也得已衣服長大攝棄儲與不得舒展得能弘廣不得施用東行則左袖繼於扶桑無所不伏右衽拂於不周兮六合不足以肆行又曰路室女之方桑路室客室孔子過之以自待言孔子出過於客舍其女方採桑一心不視若貞信故以自待古詩曰柘桑知天風海水知天寒繁欽桑賦曰上似華蓋紫極比形下象鳳闕萬桷一楹陸機桑賦曰初世祖武皇帝為中壘將軍植桑一株世更三代年漸三紀緑葉興而盈尺崇條曼而增尋曹植艷歌曰出自蒯北門遙望胡池桑枝枝自相植葉葉自相當
