body:
  text: 刑法部八囚易坎卦曰上六係用徽纆置于叢棘三歲不得凶險峭之極不可升也嚴法峻整難可犯也宜其囚執置于思過之地書武成曰釋箕子囚封比于基又泰誓曰屏棄典刑囚奴正士屏棄常法而不顧箕子正諫而以為囚奴又康誥曰囚服念五六日至于旬時丕蔽要囚要囚謂察其要囚辭以斷獄既得其辭服應思念五六日至於十日至于三月乃大斷之言必反覆思念重刑之至也詩泮水曰矯矯虎臣在泮獻馘淑問如皋陶在泮獻囚囚拘也僖公既伐淮奭而反在泮宮使武臣獻馘又使善聽獄之吏如皋陶者獻囚言伐之有功所以任者得其人也周禮秋官上曰掌囚掌守盜賊凡囚者凡囚者謂非盜賊自以他罪拘者也禮月令仲夏小暑至挻重囚出輕繫挺猶寬也重囚寬之至秋方決輕輕繫出而舍之也傳莊公曰乘丘之役公以金僕姑射南宮長萬公右歂孫生搏之宋人請之宋公靳之曰始吾敬子今子魯囚也吾不敬子矣又曰晉襄公縛秦囚使萊駒以戈斬之囚呼萊駒失戈狼瞫音審取戈以斬囚遂以為右又曰鄭公子歸生受命于楚伐宋宋華元樂呂禦之戰于大棘宋師敗績囚華元獲樂呂又曰晉侯觀于軍府見鍾儀問之曰南冠而縶者誰也南冠楚冠也縶拘繫也有司對曰鄭人所獻楚囚也使稅之召而弔之再拜稽首問其族對曰伶人也公曰能樂乎對曰先父之職官也敢有二事使與之琴操南音公曰君王何如對曰非小人之所得知也固問之對曰其為太子也師保奉之以朝于嬰齊而夕于側也嬰子齊令丑子重也側司馬子反也言其尊卿敬老也不知其他公語范文子文子曰楚囚君子也君盍歸之使合晉楚之成公從之又曰楚子侵鄭鄭皇頡戍之出與楚師戰敗穿封戍囚皇頡公子圍與之爭之公子圍共王子靈王也正於伯州犁正典直也伯州犁曰請問於囚乃立囚伯州犁曰所爭君子也其何不知上其手曰夫子為王子圍寡君之貴介弟也介大也下其手曰此子為穿封戍方城外之縣尹也誰獲子上下手以道囚意囚曰頡遇王子弱焉弱敗也言為王子所得也戍怒抽戈逐王子圍又曰衛侯如晉晉人執而囚之于士弱氏土弱晉主獄大夫也又曰紂囚文王七年諸侯皆從之囚紂於是乎懼而歸史記曰孟嘗君入秦秦王欲留之人或説秦必先齊而後秦秦其危矣於是秦昭王乃囚孟嘗君漢書曰雋不疑為京兆尹每行縣録囚徒不疑多有所乎反音翻母喜笑為飲食語言異於他時或無所出母怒為之不食故不疑為吏嚴而不殘又曰呂后為皇太后乃令求巷囚戚夫人又天文志曰有勾圜十五星屬杓曰賊人之牢牢中星實則囚多虛則囚出又曰王章下廷尉獄妻子皆繫小女年十二起號哭曰平常獄上夜呼囚數常至九今八而止我君素剛先死者必君果死又曰蕭育當繫乃欲棄官按佩刀曰蕭育杜陵男子何詣曹也東觀漢記曰和熹鄧后京師旱自三月至五月太后幸洛陽寺省庶獄舉冤囚徒杜洽不殺人自誣被掠羸困便舉見畏吏不敢白吏將去舉頭若有言太后察視覺之即呼還問狀遂得申列即時收令下獄抵罪尹左遷行未還宮澍雨大降又曰和帝永元六年七月京師旱幸洛陽寺録囚徒舉冤獄未還宮而澍雨又曰馬援為郡督郵送囚至府囚有重罪援哀而縱之亡命北地遇赦留後漢書曰陸續字智初會稽吳人也太守尹興辟為郡門下掾是時楚王英謀反陰疏天下善士及楚事覺顯宗得其録有尹興名興詣廷尉獄續與主簿梁宏及掾史五百餘人詣洛陽詔獄續母遠至京師覘候消息獄事持急無緣與續相聞母但作饋食付門卒以進之對食悲泣不能自勝使者怪而問其故續曰母來不得相見故但使泣耳使者大怒以為門吏通傳意氣將召案之續曰因食餉羹識母所自調和故知來耳非人告也母嘗截肉未嘗不方斷蔥以寸為度是以知之魏志曰太祖征劉備先遣賈逵至斜谷視形勢道逢水衡載囚數十車逵以運急輒載重者一人皆放其餘太祖善之晉書曰曹攄為臨淄令獄有死囚歲夕攄行獄愍之曰卿等不幸至此非所如何新歲人情所重豈欲暫見家耶衆囚皆泣曰若得暫歸死無恨也攄悉開獄出之剋日令還掾史固爭咸謂不可攄曰此雖小人義不見負自為諸君任之至日相率而還並無違者一縣歎服號曰聖君北史曰後魏元麗拜雍州剌史為政嚴酷吏人惡之其妻崔氏誕一男麗遂出州獄囚死及徒流案未由臺者一時放免宋書曰王志纍遷宣城內史清謹有恩惠郡人張倪吳慶爭囚經年不決志到官父老相謂曰王府君有德政吾鄉里乃有如此爭倪慶因相攜請罪所訟地遂成間田後為東陽太守郡獄有重囚十餘冬至日悉遣還家過節皆反唯一人失期志曰此自太守事主者勿憂明旦果至以婦孕吏人又益歎服之又曰謝方明為驃騎長史理南郡年終江陵縣獄囚事無輕重悉放歸家使過正三日還到罪重者二十餘人綱紀已下莫不疑懼時晉陵郡送故主簿弘季咸徐壽之並隨在西固諫以為昔人雖有事或是記籍過言且當今人情薄不可以古義相許方明不納一時遣之囚及父兄並驚喜涕泣以為就死無恨至期有重罪二人其一醉不能歸逮二日反餘一囚十日不來五官朱千期請見自討之方明知為囚事使左右謝五官不須入囚當自反囚逡巡墟里不能自歸鄉村責讓率領將送意逃者遠近歎服焉北齊書曰梁湘東王繹遣世子方諸出鎮郢州顏之推常管記室值侯景陷郢之推被執頻欲殺之賴其行臺郎中王則屢護救免囚送建鄴北史曰蕭撝入周為上州剌史為政以禮讓為本嘗至元日獄中囚繫悉放歸家聽三日然後赴獄主者爭之撝曰昔王長虞延見稱前史吾雖寡德竊懷景行以之獲罪彌所甘心諸囚荷恩並依限而至吏人稱其惠化陳書曰張種以外戚賜無錫嘉興縣秩嘗於無錫見有重囚在獄天寒呼囚曝日遂失之陳文帝聞之笑而不責南史曰吉翰遷豫州梁郡諸軍時有死罪囚典籤意欲活之因翰入閣齋呈事翰省説語令且去明可更呈典籤不敢復入呼之乃來取昨所呈事視訖謂曰卿意當欲宥此囚死命昨於齋坐見其事亦有心活之但此囚罪重不可全貸既欲加恩卿便當代任其罪因命左右收典籤付獄殺之原此囚生命唐書曰韋仁壽隋大業末為蜀郡法司書佐獄無冤囚其有得罪者臨將就戮猶西向為仁壽禮佛而死又曰太宗親録囚徒多所原宥見死罪者憫之放歸于家限至來秋即戮乃勑天下死囚皆放令入京並依期而集於是天下死罪囚三百九十人皆釋禁自至朝堂不勞督領一無逃散太宗感其奉法竟盡赦之又曰高宗遵貞觀故事務在恤刑嘗問大理卿唐臨在獄繫囚之數臨對曰見囚五十餘人唯二人合死上以囚數少甚喜又曰呂元膺為蘄州剌史頗著恩信嘗歲終閲郡囚囚有自告者曰某有父母在明日元正不得相見因泣下元膺憫焉盡脫其械縱之與為期守吏曰賊不可縱元膺曰吾以忠信待之及期無後到者由是群盜感義相引而去韓子曰溫人入周周不內問之曰客耶對曰主人也問其巷而不知也史曰囚之君使人問之曰子非周人也而自謂非客何也對曰臣少也誦詩云普天之下莫非王土率土之濱莫非王臣今君天下則我天子臣也淮南子曰拘囹圄者以日為修當市死者以日為短吳越春秋曰吳王拘越王勾踐與大夫范蠡於石室吳王疾越王謂太宰嚭曰囚臣請一見問疾太宰入言吳王乃見越王也列女傳曰嚴延年為河南太守河南號曰屠伯以其刑殺為主若屠者也其母嘗從東海來欲就延年臘到洛陽適見執囚所執決刑戮之囚也母大驚便止都亭不肯入府會稽典録曰盛吉拜廷尉吉性多仁恩務在哀矜每至冬月罪囚當斷夜省刑狀其妻執燭吉持筆夫妻相向垂泣妻常謂吉曰君為天下執法不可使一人濫罪太公金匱曰文王問太公曰天下失道忠諫者死豫子伯邑考為王僕御無故烹之囚豫於羑里以其羹啜豫風俗通曰囚遒也言辭窮得罪誅遒也禮罪人置諸圜土故囚字為口中人此其象也陳留耆舊傳曰虞延除細陽令每至歲時伏臘輒休遣囚各歸家囚並感其恩應期而還韓陽天文要集曰流星入昂貴人有繫囚也論衡曰李子長為政欲知囚情以梧桐為人象囚之形鑿地為塪臥木囚其中罪正者木囚不動冤侵奪者木囚動出不知囚之精神著木人耶將天神之氣動木囚也徒史記曰秦始皇至湘山逢大風不得渡上問博士曰湘君何神對曰堯女舜妻也死而葬此始皇大怒使刑徒三千伐湘山樹赭其山上又曰高祖以亭長為縣送徒驪山徒多道亡自度比至多亡之到豐西澤中止飲夜乃解縱所送徒曰公等皆去吾亦從此逝矣徒中壯士願從者十餘人漢書曰胸奴侵寇王莽大募天下囚徒乃名曰豬突狶勇服虔曰突者逐也惟觸突人故取以為喻也范曄後漢書曰尚書郎張俊自獄中上書訟罪而俊獄已報廷尉將出穀門臨行刑鄧太后詔馳騎以減死論俊上書謝曰孤恩負義自陷重刑請斷竟訖無所復望廷尉鞠遣刀斧在前棺絮在後魂魄飛揚形容已枯陛下聖澤以臣嘗在近密識其狀貌復其眼目留心曲慮特加偏覆喪車復還白骨更肉披棺發槨起見白日天地父母能生臣俊不能使臣俊當死復生陛下德過天地恩重父母誠非臣俊破碎骸骨舉宗腐爛所報萬一臣俊徒也不得上書不勝去死就生驚死踊躍冒昧拜章世皆哀其文魏略曰人得崔琰書以褁情籠持其籠行都道中時有與琰宿不平遙見琰名著幘籠從而視之遂白太祖以為琰腹誹心謗乃收付獄髡刑輸徒前所白琰者又白云琰為徒虬鬚直視心似不平太祖亦以為然遂殺之又曰王陵字彥雲太原人陵為發干長遇事髡刑五年當道掃除時太祖下車過問此何徒左右以狀對太祖曰此所坐亦公耳於是選為驍騎主簿三國典略曰太原公洋之赴晉陽也陽休之勸崔季舒曰一日不朝其間容刀季舒性好聲色心在間放遂不請行欲恣其淫樂司馬子如等緣宿憾乃奏暹及季舒過狀各鞭二百徒於馬城晝則供役夜置地牢璅語曰晉治氏女徒病棄之舞嚚之馬僮飲馬而見之病徒曰吾良夢馬僮曰汝奚夢乎曰吾夢乘水如河汾三馬當以告舞僮舞嚚自往視之曰尚可活吾買汝答曰既棄之矣猶未死乎舞嚚曰未遂買之至舞嚚氏而疾有間而生荀林父神異記又載之鍾離意別傳曰司徒侯霸辟意署議曹掾以詔書送囚徒三百餘人到河北連陰冬盛寒徒皆貫連械不復能行到弘農縣使令出見錢為徒作𥜗袴各有升數令對曰被詔書不敢妄出錢意曰使者奉詔命寧私行耶出錢便上尚書使者亦當上之光武皇帝得上狀見司徒侯霸曰所使吏何乃仁怒用心乎誠良吏也𥜗袴既且悉到前縣給賜糜粥後謂徒曰使者不忍善人嬰刑飢寒感惻於心今以得衣矣欲悉解善人械桎得逃去耶皆曰明使君哀徒恩過慈父身成灰土不敢逃亡意復曰徒中無欲歸候親者耶其有節義名者五六十人悉解械桎先遣之與期日會作所徒皆先期至也劉楨京口記曰有龍目湖秦始皇東遊觀地勢曰有天子氣使赭衣徒三千人鑿此中間長堽使斷因改名為丹徒風俗通曰徒不上墓説新遭刑罪原解者不可以上墓祠祀令人死亡謹案孝經身體髮膚受之父母曾子病困啓手足以歸全也今遭刑者髡首剔髮身被加笞新出狴犴臭穢不潔凡祭祀者孝子致齋貴馨香如親存也時見子被刑心有惻愴緣生事死恐明不歆承當不上墓耳郭子曰劉道真嘗為徒扶風王司馬駿以五匹布贖之既而用為從事中郎當時以為美談孔融肉刑論曰今之洛陽道橋作徒囚於廝役十死一生故國家常遣三府請詔月一案行又置南甄官使者主養病徒僅能存之語所謂洛陽豪徒韓伯密加笞三百不中一髡頭至耳髮詣膝此自為刑非國法之意徒作年數周禮秋官上大司寇曰以嘉石平罷民凡萬民之有罪過而未麗於法而害於州里者桎梏而坐諸嘉石役諸司空重罪旬有三日坐期役其次九日坐九月役其次七日坐七月役其次五日坐五月役其下罪三日坐三月役使州里任之則宥而舍之又秋官上曰司圜掌收教罷民凡害人者弗使冠飾而加明刑焉任之以事而收教之能改者上罪三年而舍中罪二年而舍下罪一年而舍其不能改出圜土者殺漢書曰罪人獄已決完為城旦舂滿三歲為鬼薪白粲應邵注曰鬼薪為宗廟取薪白粲澤米使正白鬼薪白粲一歲為隸臣妾隸臣妾一歲免為庶人晉律曰髡鉗五歲刑笞二百若諸亡詐偽將吏越武庫垣兵守逃歸家兄弟保人之屬並五歲刑也四歲刑若復上聞入殿門上變事漏露泄選舉事誤發密事歐兄姊之屬並四歲刑三歲刑若傷人上而謗偽造官印不憂軍事戲殺人之屬並三歲刑也二歲刑二歲刑減一等入罰金二歲以至五歲刑皆耐罪若越城作奕走馬衆中有挾天文圖識之屬並為二歲刑張斐律序曰徒加不過六囚加不過五罪已定為徒未定為囚纍作不過十一歲五歲徒犯一等加六歲犯六等加為十一歲作纍笞不過千二百五歲徒加六等笞一千二百
