body:
  text: 道部九齋戒太上經曰思神錄氣習法登階名之為齋太極真人曰齋莫過乎靈寶其法高妙不宣於世仙聖口訣祕而不書太一齋法玄之又玄指教經曰奉道不齋戒如無燭夜行失道自苦耳太真科曰修三守一齋為本基學道以齋戒為本太上所重老氏所營仙真所賴又曰道士能日中一食不飧穢惡隨月齋戒晝夜不怠不害一切拔度蜎飛當得至道又曰道士修經習業以道德二篇為先齋戒受之度人濟己也又曰救解父母疾病當齋官露臺齋中奏子午章苦到必感又曰玄清玉皇之道上皇天帝授太微天帝君三元紫精君真陽元老君後以付太上道君以傳金闕李君李君傳太靈真人南岳赤君又紫元夫人以傳清靈王君王君傳南岳魏夫人夫人傳楊君使授許長史及掾授受者齋戒七日又曰眾真授道先齋戒百日或三十日或十日又當先告齋一日以洗素心三千年六傳尋上經齋戒無如此者行之十四年太上迎以玉輪登上清為上真三皇經曰凡齋戒三事以定心口身之業也又曰凡齋戒講讀元譜大經佩服內文以成其道又曰凡齋者佩服三皇內文以成隱顯道登真隱訣曰道齋謂之守靜謂齋定其心潔靜其體在乎澄神遣務檢隔內外心齋者也又曰修道之人須齋戒禮謝七世之愆又曰上清每以吉日會五真凡修道之人當其吉日思存吉事心願飛仙立德施惠振救窮乏此太上之事也當須齋戒遣諸雜念密處靜室真誥曰齋戒不可雜處必亂正道也凡甲寅庚申之日是尸鬼競亂精神躁穢之日當齋戒不寢遣諸可欲凡五卯之曰常當齋戒入室東向心拜在神念氣適意所陳又曰漢建安中左慈聞句曲山在金陵通峨眉羅浮故渡江尋之遂齋戒三月而登此山乃得其門入茅君受以三種神芝宿啟功儀曰捧香仙女下衛齋戒之人又曰太極真人受太上口訣千歲五傳依隱書之制齋戒五日乃授立約珠囊曰凡入五岳以甲子上旬之日沐浴齋戒七日乃行若名山有芝英奇藥者奉之作素奏丹書其文乞登仙度世飛行上清再拜放自鷄犬各一於石上而去然後求芝英奇藥所欲必獲惡鬼老魅不敢試人若學道不知此術入山多厄抱朴子曰家有三皇圖必先齋戒百日乃召致天地五岳社稷之神後聖君命清虛小有真人撰集上仙真籙總名為上真正法以慴萬邪百年再授于人須齋戒方得三元品經曰學道之本當先修中元齋戒之法贖罪謝過於太真則書名玄圖靈寶赤書曰元始五老諸天帝皇帝以歲六齋之月會於上三天靈都宮元陽紫微之臺集筭天元推校運度又云紫微宮舊格丹書白素齋戒百日誦之太素玉籙經曰齋戒存思誦習此經精進無怠神通智達位為太素真人太平經曰真人云人之精神常居空閑之處不居汙濁之間也欲思還神皆當齋戒香室中百病自除不齋戒則精神不肯返人也皆上天共訴人所以人病積多死者不絕八素奔辰訣曰七曜五星審識形色見之早晚於庭伺之若晦冥之夕皆於寢室存念齋戒修行如存奔日月之法日中赤氣紫芒者為曜靈九神華芒也月中黃氣白光八朗之芒是為月華夜精道人皆知服日月之氣而吸九華靈芒能修存奔日月之道安妃授楊君書二卷皆是奇法日是月之道甚多高妙上清金闕靈書曰太上之吉會日者高真集宴慶獻之日也廻元者太上之更始日也甲子陰陽之首氣月晦改度之初萌故為新日也不知此日者不得解罪除過不得刻簡上真當須齋戒於是日思存吉事此廻元訣也又曰黃庭內景經一名太上琴心文又名大帝金書扶葉大帝君宮中盡誦此經金簡刻書之故曰金書又名東華玉篇東華者方諸宮名東海青童君所居也其中仙曹多齋戒誦詠刻玉書之又曰太極左真人曲素訣辭一名九天鳳氣玄丘大真書太上授太極左真人真人傳東海方諸宮青童大君使傳道士宿有名應神仙真人者佩之二十年得見三元君齋戒青金之誓以代盟約八道祕言曰欲行九真之法者齋戒靜室至須專寂心禱飛仙上登紫庭又曰九天鳳氣玄丘真書玄都丈人仙科授佩齋戒三日佩之者得仙道德經序訣曰尹喜知紫氣西邁齋戒想見道真及老子度關授二篇經義靈書經曰十部妙經金字玉簡諸天真仙齋戒月日上詣玉京誦其文威儀經曰齋戒景福度人先為先人後己與志玄同一本行書曰授靈寶赤書者必先齋戒東卿司命經曰先師王君昔見授太上明堂玄真上經齋戒休糧存念日月咽服光芒之液常密行之此上真道也太上玄真經先盟而後行行之然後可聞玉佩金璫之道耳季偉昔長齋三年竭誠殫思乃能得之神光映身然後受書此真玄之道要而不煩吾常祕寶藏之囊肘故以相示慎密者也好道者欲求神山宜先齋戒登山昔左慈齋戒三月拜禮靈山竭誠三年然後二茅君引前又曰黃庭內景玉經曰扶桑太帝君命賜谷神王傳南岳夫人授受齋戒九日又曰三元真一經金闕帝君所守東海小童以傳涓子涓子傳蘇君蘇君傳周君授受齋百日或五十日或三十日或七日四十年傳一人十人止後聖道君命清靈小有天王修集上仙真籙總名紫元夫人傳王君王君傳南岳魏夫人夫人傳楊君楊君傳許掾授受齋三日或七日鳳真之文大上授太極左真人真人傳東海方諸君青童君此亦眾真相傳授受齋三日佩之九年得見二元君於上清金闕又曰太上智慧經太上付上相又紫元夫人傳王君而王君傳南真南真傳楊君今授許長史掾授受齋戒五十日又曰太丹隱書飛真之道存想之法也此蓋楊君止抄一經誦以與長史耳亦獨九真之龍書也未見齋戒之法不可遵行真誥有朝太素法云受洞決旋行太丹隱書存三元洞房者即謂此也但不具耳世有周君學注洞房事亦是抄耳此經語而注之為施修之法未見真本而事旨不具名山記曰大茅山有小穴口石填之但精心齋戒可得而遊中茅山東亦有小穴穴口如狗竇劣容人入耳愈入愈闊外以盤石掩塞穴口故餘小穿如杯大使山靈守衛之此磐石亦時開發若勤懇齋戒尋之得從而入易於常洞口好道者欲求神仙宜預齋戒則三茅君於句曲見之授以要道入洞門句曲有五門立志齋戒三月尋登此門者可入矣九天經曰玉輔上宰齋戒建節侍於太清法輪經曰仙公齋戒未及歲年而感召天真下降淨室又曰念真齋戒緘口慎言靈寶大戒經曰不受大戒徒為長齋四極明科經曰凡學上清之道奉其宗師入室齋戒太上科曰凡經從師受皆真官侍衛須齋戒講誦雌一五老經曰長修善行日中乃飯齋戒三年乃得受太洞真經大上丹簡墨籙曰道之去聖日已遠矣傳寫科戒謬誤者眾若有所疑師不能解者可齋戒一月求靈應之審靈仙感降報語於人傳授經曰齋者簡素為上神先映身集仙籙曰崑崙玄圃見正一真人勤苦齋戒讀經崇道太宵琅書曰立三本書一為長鎮一為供齋一為研習者常自隨所住室中別置格上躬自出入勿使委非其所寫經之時須先齋戒經中有圖圖或別卷各有侍官典圖真吏請問經曰道不存師齋誦無感玉佩金璫經曰眾真登太瓊臺齋戒三月崆峒經曰太上道君齋戒於西那玉國羅浮之岳又曰青精䭀飵方太極真人傳王君授受之際齋戒十日二千六百年傳十人雲牙玉方王君傳南岳魏夫人齋戒五日服之可以絕穀去尸虫王君遊觀天下詣龜山齋三月又齋戒三年詣太素還西城又齋三月受書周君少遇中央黃老君遊丹城乞長生度世之道授以上真之道乃還登常山石室中齋戒念慮久歷歲時後仙去道學傳曰左敦字尚隱雲陽人雲陽山即茅山也敦所居山舍西十五里有一石室西南二里復有一石室皆容數十人西南室父老傳云有銅牛出皆銅靷銅卷相傳號為銅室曲入至深立北通潢池而洞崑崙每三元齋戒之日敦往二室祈禱皆髣髴真形又曰陸脩靜字元德吳興人太始七年率眾建三元露齋太真上倉元上錄經曰凡有生之域清少濁多穢障相纏行善不立邪氣來侵強魔守試上學之人齋戒存思禁隔囂塵非類之物唐突去來皆是穢濁當擇日齋戒佩破淹之符以昇玉清
