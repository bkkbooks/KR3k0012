body:
  text: 道部九齊戒太上經曰思神録氣習法登階名之為齊太極真人曰齊莫過乎靈寶其法高妙不宣於世仙聖口訣祕而不書太一齊法玄之又玄指教經曰奉道不齊戒如無燭夜行失道自苦耳太真科曰修三守一齊為本基學道以齊戒為本太上所重老氏所營仙真所賴又曰道士能日中一食不飧穢惡隨月齊戒晝夜不怠不害一切拔度蜎飛當得至道又曰道士修經習業以道德二篇為先齊戒受之度人濟己也又曰救解父母疾病當齊官露臺齊中奏子午章苦到必感又曰玄清玉皇之道上皇天帝授太微天帝君三元紫精君真陽元老君後以付太上道君以傳金闕李君李君傳太靈真人南嶽赤君又紫元夫人以傳清靈王君王君傳南嶽魏夫人夫人傳楊君使授許長史及掾授受者齊戒七日又曰衆真授道先齊戒百日或三十日或十日又當先告齊一日以洗素心三千年六傳尋上經齊戒無如此者行之十四年太上迎以玉輪登上清為上真三皇經曰凡齊戒三事以定心口身之業也又曰凡齊戒講讀元譜大經佩服內文以成其道又曰凡齊者佩服三皇內文以成隱顯道登真隱訣曰道齊謂之守靜謂齊定其心潔靜其體在乎澄神遣務檢隔內外心齊者也又曰修道之人須齊戒禮謝七世之愆又曰上清每以吉日會五真凡修道之人當其吉日思存吉事心願飛仙立德施惠振救窮乏此太上之事也當須齊戒遣諸雜念密處靜室真誥曰齊戒不可雜處必亂正道也凡甲寅庚申之日是尸鬼競亂精神躁穢之日當齊戒不寢遣諸可欲凡五卯之曰常當齊戒入室東向心拜在神念氣適意所陳又曰漢建安中左慈聞句曲山在金陵通峨眉羅浮故渡江尋之遂齊戒三月而登此山乃得其門入茅君受以三種神芝宿啓功儀曰捧香仙女下衛齊戒之人又曰太極真人受太上口訣千歲五傳依隱書之制齊戒五日乃授立約珠囊曰凡入五嶽以甲子上旬之日沐浴齊戒七日乃行若名山有芝英奇藥者奉之作素奏丹書其文乞登仙度世飛行上清再拜放自雞犬各一於石上而去然後求芝英奇藥所欲必獲惡鬼老魅不敢試人若學道不知此術入山多厄抱朴子曰家有三皇圖必先齊戒百日乃召致天地五嶽社稷之神後聖君命清虛小有真人撰集上仙真籙總名為上真正法以懾萬邪百年再授于人須齊戒方得三元品經曰學道之本當先修中元齊戒之法贖罪謝過於太真則書名玄圖靈寶赤書曰元始五老諸天帝皇帝以歲六齊之月會於上三天靈都宮元陽紫微之臺集算天元推校運度又云紫微宮舊格丹書白素齊戒百日誦之太素玉籙經曰齊戒存思誦習此經精進無怠神通智達位為太素真人太平經曰真人云人之精神常居空間之處不居汙濁之間也欲思還神皆當齊戒香室中百病自除不齊戒則精神不肯返人也皆上天共訴人所以人病積多死者不絶八素奔辰訣曰七曜五星審識形色見之早晚於庭伺之若晦冥之夕皆於寢室存念齊戒修行如存奔日月之法日中赤氣紫芒者為曜靈九神華芒也月中黃氣白光八朗之芒是為月華夜精道人皆知服日月之氣而吸九華靈芒能修存奔日月之道安妃授楊君書二卷皆是奇法日是月之道甚多高妙上清金闕靈書曰太上之吉會日者高真集宴慶獻之日也回元者太上之更始日也甲子陰陽之首氣月晦改度之初萌故為新日也不知此日者不得解罪除過不得刻簡上真當須齊戒於是日思存吉事此回元訣也又曰黃庭內景經一名太上琴心文又名大帝金書扶葉大帝君宮中盡誦此經金簡刻書之故曰金書又名東華玉篇東華者方諸宮名東海青童君所居也其中仙曹多齊戒誦詠刻玉書之又曰太極左真人曲素訣辭一名九天鳳氣玄丘大真書太上授太極左真人真人傳東海方諸宮青童大君使傳道士宿有名應神仙真人者佩之二十年得見三元君齊戒青金之誓以代盟約八道祕言曰欲行九真之法者齊戒靜室至須專寂心禱飛仙上登紫庭又曰九天鳳氣玄丘真書玄都丈人仙科授佩齊戒三日佩之者得仙道德經序訣曰尹喜知紫氣西邁齊戒想見道真及老子度關授二篇經義靈書經曰十部妙經金字玉簡諸天真仙齊戒月日上詣玉京誦其文威儀經曰齊戒景福度人先為先人後己與志玄同一本行書曰授靈寶赤書者必先齊戒東卿司命經曰先師王君昔見授太上明堂玄真上經齊戒休糧存念日月咽服光芒之液常密行之此上真道也太上玄真經先盟而後行行之然後可聞玉佩金璫之道耳季偉昔長齊三年竭誠殫思乃能得之神光映身然後受書此真玄之道要而不煩吾常祕寶藏之囊肘故以相示慎密者也好道者欲求神山宜先齊戒登山昔左慈齊戒三月拜禮靈山竭誠三年然後二茅君引前又曰黃庭內景玉經曰扶桑太帝君命賜谷神王傳南嶽夫人授受齊戒九日又曰三元真一經金闕帝君所守東海小童以傳涓子涓子傳蘇君蘇君傳周君授受齊百日或五十日或三十日或七日四十年傳一人十人止後聖道君命清靈小有天王修集上仙真籙總名紫元夫人傳王君王君傳南嶽魏夫人夫人傳楊君楊君傳許掾授受齊三日或七日鳳真之文大上授太極左真人真人傳東海方諸君青童君此亦衆真相傳授受齊三日佩之九年得見二元君於上清金闕又曰太上智慧經太上付上相又紫元夫人傳王君而王君傳南真南真傳楊君今授許長史掾授受齊戒五十日又曰太丹隱書飛真之道存想之法也此蓋楊君止抄一經誦以與長史耳亦獨九真之龍書也未見齊戒之法不可遵行真誥有朝太素法云受洞決旋行太丹隱書存三元洞房者即謂此也但不具耳世有周君學注洞房事亦是抄耳此經語而注之為施修之法未見真本而事旨不具名山記曰大茅山有小穴口石填之但精心齊戒可得而遊中茅山東亦有小穴穴口如狗竇劣容人入耳愈入愈闊外以盤石掩塞穴口故餘小穿如杯大使山靈守衛之此磐石亦時開發若勤懇齊戒尋之得從而入易於常洞口好道者欲求神仙宜預齊戒則三茅君於句曲見之授以要道入洞門句曲有五門立志齊戒三月尋登此門者可入矣九天經曰玉輔上宰齊戒建節侍於太清法輪經曰仙公齊戒未及歲年而感召天真下降淨室又曰念真齊戒緘口慎言靈寶大戒經曰不受大戒徒為長齊四極明科經曰凡學上清之道奉其宗師入室齊戒太上科曰凡經從師受皆真官侍衛須齊戒講誦雌一五老經曰長修善行日中乃飯齊戒三年乃得受太洞真經大上丹簡墨籙曰道之去聖日已遠矣傳寫科戒謬誤者衆若有所疑師不能解者可齊戒一月求靈應之審靈仙感降報語於人傳授經曰齊者簡素為上神先映身集仙籙曰崑崙玄圃見正一真人勤苦齊戒讀經崇道太宵琅書曰立三本書一為長鎮一為供齊一為研習者常自隨所住室中別置格上躬自出入勿使委非其所寫經之時須先齊戒經中有圖圖或別卷各有侍官典圖真吏請問經曰道不存師齊誦無感玉佩金璫經曰衆真登太瓊臺齊戒三月崆峒經曰太上道君齊戒於西那玉國羅浮之嶽又曰青精䭀飵方太極真人傳王君授受之際齊戒十日二千六百年傳十人雲牙玉方王君傳南嶽魏夫人齊戒五日服之可以絶穀去尸蟲王君遊觀天下詣龜山齊三月又齊戒三年詣太素還西城又齊三月受書周君少遇中央黃老君遊丹城乞長生度世之道授以上真之道乃還登常山石室中齊戒念慮久歷歲時後仙去道學傳曰左敦字尚隱雲陽人雲陽山即茅山也敦所居山舍西十五里有一石室西南二里復有一石室皆容數十人西南室父老傳云有銅牛出皆銅靷銅卷相傳號為銅室曲入至深立北通潢池而洞崑崙每三元齊戒之日敦往二室祈禱皆髣佛真形又曰陸修靜字元德吳興人太始七年率衆建三元露齊太真上倉元上録經曰凡有生之域清少濁多穢障相纏行善不立邪氣來侵強魔守試上學之人齊戒存思禁隔囂塵非類之物唐突去來皆是穢濁當擇日齊戒佩破淹之符以升玉清
