body:
  text: 職官部三十三太史令春秋元命苞云屈中挾一而起者為史史之為言紀也天度文法以此起也尚書酒誥曰太史友內史友太史內史掌國典法所賓友者也周書曰維正月王在成周昧爽召三公右史戎夫曰今夕朕寤遂事其驚余乃取遂事之要戒甲戎夫主之朔望以聞也禮記曲禮下曰天子建六太曰太宰太宗太史太祝太工太卜典司六典又玉藻曰動則左史書之言則右史書之春秋宣上曰趙穿攻靈公於桃園宣子未出而復太史書曰趙盾弒其君以示於朝宣子曰不然對曰子為正卿亡不越境返不討賊非子而誰宣子曰嗚呼我之懷矣自貽伊戚其我之謂矣孔子曰董孤古之良史也書法不隱又襄四曰太史書崔杼殺其君崔子殺之其弟嗣書而死者二人嗣續其弟又書乃舍之南史氏聞太史盡死執簡以往聞既書矣乃還又曰魯昭公二年晉韓宣子聘魯觀書於太史氏見易象與魯春秋曰周禮盡在魯矣周禮春官下曰太史掌建國之六典太史日官也春秋傳曰天子有日官諸侯有日卿大戴禮曰太子既冠成人免於保傅則有司過之史春秋文耀鉤曰楚立唐氏以為史官蒼雲如霓圍軫七蟠中有荷斧之人嚮軫而蹲蟠猶周也蹲踞也楚驚唐史曰君慢命又簡宗廟命天命也軫於天文楚之分也向之而踞是慢命踞簡宗廟於是晝遺炎煙耀于蒼雲精消無文軫火精雲水氣圍軫水也晝日陽也炎火亦陽也遺之者象蟠所也水難勝火三陽併氣且火炎上宜消滅也文則霓也唐史之冊上滅蒼雲告神以史功也韓詩外傳曰據法守職而不敢為非者太史也毛詩序曰國史明乎得失之迹傷人倫之廢哀刑政之苛吟詠情性以諷其上達於事變而懷其舊俗者也春秋後語曰晉太史屠黍見晉之亂以其國法歸周國語曰鄭桓公為司徒問於史伯曰王室多故史伯周太史也余懼及之焉漢書曰司馬喜生談談為太史公如淳曰漢儀注太史公武帝置位在丞相上天下計書先上太史公副上丞相序事如古春秋遷死宣帝以其官為令行太史文書而已臣瓚案百官表無太史公茂陵中書司馬談為太史令遷仕為郎中使西征巴蜀以南略卭筰音昨昆明還報命是歲天子始建漢家之封而太史公留滯周南如淳曰周南洛陽也不得與從事發憤且卒而子遷適反見父於河洛之間太史公執遷手而泣曰豫先周室之太史也自上世嘗顯功名虞夏典天官事後世中衰絶於豫乎汝復為太史則續吾祖矣今天子接千歲之緒封秦山而豫不得行是命也夫是命也夫豫死汝必為太史為太史無忘吾所欲論著矣遷俯首流涕曰小子不敏請述論先人所次舊聞不敢闕卒三歲而遷為太史令又藝文志曰古之王者世有史官君舉必書所以慎言行昭法式也又曰青史子注古史官記事也又曰孔甲盤盂篇黃帝史官又曰史籀周宣王大史作大篆又曰秦太史令胡母敬作博學章東觀漢記曰陰猛以博通古今為太史令司馬彪續漢書曰張衡字平子以郎中遷太史令妙善璣衡之正紀渾天儀復造候風地動儀以精銅鑄成員徑八尺合蓋隆起形如酒杯如有地動樽則震尋其方面知震所在驗之以事合契若神張璠漢記曰初王師敗於曹陽欲浮河東下侍御史太史令王立曰去春太白犯鎮星於斗過天津熒惑又逆行守河北不可犯也由是遂北渡河將自軹關東出立又謂宗正劉艾曰前太白守天關與熒惑會金火交會革命之象也漢祚終矣晉魏必有興者後立數言於帝曰天命有去就五行不常盛代者土也丞漢魏也能安天下者曹姓唯委任曹氏而已曹公聞之使人語立曰知忠於朝廷天道深遠幸勿多言應劭曰太史令秩六百石掌天時星曆凡歲奏新年曆凡國祭祀喪娶之事奏良日國有瑞應災異記之又曰太史令秩六百石望郎三十人掌故三十人昔在顓頊南正重司天火正黎司地唐虞之際分命羲和曆象日月星辰敬授民時至于夏后殷周世敘其官皆精研術數窮神知化當春秋時魯有梓慎晉有卜偃宋有子韋鄭有裨竈觀乎天文以察時變其言屢中有備無害漢興甘石唐都司馬父子抑亦次焉未塗偷進茍忝茲階既暗候望競飾邪僞以凶為吉莫之懲糾漢舊儀曰承周史官至武帝置太史公司馬遷父談世為太史遷年十三使乘傳行天下求古諸侯之史記魏志曰黃龍見譙橋桓玄問太史令單揚揚曰其國當有王者吳志曰吳範字文則會稽上虞人也劉盛兵西陵範曰後當和親終皆如言其占驗明審如此權以範為騎都尉領太史令數從訪問欲知其訣範祕惜其術不以至要語權權由是恨也又曰韋曜字弘嗣孫亮即位諸葛恪輔政表曜為太史令撰吳書沈約宋書曰太史掌曆數靈臺專候日月星氣焉世本曰沮誦蒼頡作書宋裒注曰沮誦蒼頡黃帝之史唐書曰乾元元年改太史局為司天臺掌天文曆數風雲氣色有異則密封以聞其小吏有司曆保章正靈臺郎挈壺正等官各有差呂氏春秋曰夏太史令終古見夏桀惑亂載其圖法而泣乃出奔啇啇太史高勢見紂之迷亂載其圖法出之周晉太史屠乘見晉之亂以其圖法歸周帝王世紀曰黃帝使蒼頡取象鳥跡始作文字之篆史官之作蓋自此始記其言行冊而藏之文士傳曰張衡性精微有巧藝特留意於天文陰陽笇數由是遷太史令環濟要略曰太史令取善紀述者使記時事天子圖書計最典籍皆副焉賈誼書曰不知日月之時節不知先王之諱與國之忌不知風雨雷電之眚凡此屬太史之任也揚雄太史令針曰昔在太古爰初肇記天地之紀重離是司降及唐虞乃命羲和欽若昊天百政攸亘夏帝不慎羲和不令湎時亂日帝旅爰征庶寮至殷唯天為難夏氏黷德而明神不蠲荀悅申鑒曰古者天子諸侯有事必告廟左右二史臧否成敗無不存焉得失一朝榮辱千載善人勸焉悖人懼焉故先王重之以副賞罰以輔法教宜於今者官以其方各書其事歲盡則集之於尚書殿中監六典曰殿中監掌服御之事惣尚食尚藥尚衣尚乘尚舍尚輦六局之官屬備其禮物而供其職事少監為之二尚食奉御掌常謹其儲供辨其名數直長為之二尚藥奉御掌合和藥物辨藥上中下之三品直長為之二尚衣奉御掌衣服詳其制度辨其名數尚乘奉御掌內外間廄之馬辨其粗良而率其習馭直長為之二尚舍奉御掌殿庭張設湯沐而潔其灑掃直長為之二尚輦奉御掌輿輦繖扇之分分其次敘而辨其名數直長為之二大長秋天官書有宦者四星在帝座之西周官有宮正宮伯皆主王宮中官之長宮人掌王之六寢也內宰理王內之政令以陰禮教六宮陰禮婦禮也閹人寺人官戰國時有宦者令秦有將作尉衛少府各一人並皇后卿也漢景帝中六年改將作為大長秋顏師古秋收成之時長者恆久之義故以為皇后宮名或用中人或用士人中人閹人也成帝加置太僕一人掌太后輿焉通謂之皇太后卿皆隨太后宮為官號無太后則闕至後漢復增置丞中宮謁者令中宮尚書中宮私府中宮永巷令中宮黃門冗從僕射虎賁官騎中宮官署令藥長並隸大長秋歷魏晉宋梁陳後魏皆有長秋之號而官屬省置不同北齊有長秋寺置卿中尹各一人掌諸宮問掖庭等並用官者隋改曰內侍省煬帝改為長秋監置令一人丞二人並用士人唐武德初復為內侍省皆用宦者後漢書曰鄭衆字季産南陽犨人也為人謹敏有心永平中初給事太子家肅宗即位拜小黃門遷中常侍和帝初竇太后秉政后兄大將軍憲等並竊威權朝臣上下莫不附之而衆獨一心王室不事豪黨帝親信焉及憲兄弟圖作不軌衆遂首謨誅之以功遷大長秋又曰良賀位為大長秋清儉退厚陽嘉中詔九卿舉武猛賀獨無所薦帝引問其故對曰臣生自草茅長於宮掖既無知人之明又未嘗交加士類昔衛因景監以見有識知其不終今得臣舉者匪榮伊辱固辭之又曰曹勝字季興順帝在東宮鄧太后以騰年少謹厚使侍皇太子書特見親愛及即位騰為小黃門遷中帝侍桓帝得立騰與長樂太僕州輔等七人以定冊功皆封亭侯騰遷大長秋用事省闥三十餘年奉事四帝未嘗有過其所進達皆海內名人又曰曹節字漢豐南陽新野人也靈帝即位以定冊功封長安鄉侯時竇太后臨朝后父大將軍武興太傅陳蕃謀誅中官節等與長樂五官史朱瑀等矯詔誅武蕃等節遷長樂衛尉後轉大長秋
