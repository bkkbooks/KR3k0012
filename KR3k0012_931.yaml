body:
  text: 鱗介部二龍下孫氏瑞應圖曰黃龍者神之精四龍之長也王者不漉池而漁德達深淵則應氣而遊池沼酈善長水經注曰浮圖澄別傳曰石虎時自正月不雨至六月澄詣滏口祠稽首曝露即日二白龍降於祠下於是雨遍千里又曰石勒時天旱沙門佛圖澄於石井岡掘得死龍長尺餘漬之以水良久乃蘇呪而祭之龍騰空而上天即雨降因名龍岡又曰交州丹淵有神龍每旱村人以𦱌草置淵上流魚則多死龍怒當時大雨豫章記曰吳猛坐郭璞事被收寄載往南令船勾開戶船主聞船下有聲如在樹杪試窺之有二龍負船一宿至宮亭湖還豫章三秦記曰河津一名龍門巨靈迹猶存去長安九百里水懸船而行旁有山水陸不通龜魚之屬莫能上江海大魚集門下數千不得上下即為龍故云曝鰓龍門垂耳轅下又曰龍首山長六十里頭入於渭尾達樊川頭高二十丈尾漸下高五六尺土赤不毛云昔有黑龍從山南出飲渭其行道因成土山故因名也西河記曰張駿立謙光殿成後池中水有五龍晝日見移時乃滅水通變緑色駿即為銅龍以猒之駿卒不勝此殿廣雅曰有鱗曰蛟龍有翼曰應龍有角曰虬龍無角曰螭龍方言曰龍未升天曰蟠龍齊諧記曰蛟龍畏練樹葉五色絲漢武帝內傳曰王母乘紫雲之輦又駕九色之班龍葛洪神仙傳曰費長房與壺公俱去後壺公謝而遣之長房憂不能到家公與所用竹杖騎之忽然如睡已到家以所騎竹投葛陂中顧之乃青龍也管輅別傳曰龍者陽精以潛于陰幽靈上通和氣感神二物相扶故能興楚國先賢傳曰宋玉對楚王曰神龍朝發崑崙之墟暮宿於孟諸超騰雲漢之表婉轉四瀆之裏夫尺澤之鯢豈能料江海之大哉王子年拾遺録曰方文山一名蠻雉山東有龍場方千里有龍皮骨如山阜膚血如流水燕昭王時以龍膏為燈光清澄若水光焰五色人以為瑞沈懷遠南越志曰蟠龍身長四丈青黑色赤帶如錦文常隨水而下入于海有毒傷人即死人物志曰龍神不處罔罟之水鳳凰不翔罻羅之鄉博物志曰昔禹平天下會群臣於會稽之野防風氏後至殺之夏德之盛二龍降之禹使范成光御之以行域外既周而還至南海經防風防風之神見禹使怒而使射之有迅雷風雨二龍升去二臣恐以刃自貫其心而死禹哀之乃拔其刃療以不死之草而皆活是為穿胸民又曰龍肉以醢漬之則文章生異苑曰陶侃嘗捕魚得一織梭還挂於壁有頃雷雨梭變成赤龍從屋騰躍而去任昉述異記曰漢和帝元年大雨有一青龍墯於宮中帝命烹之賜群臣龍羹各一柸故李尤七命曰味兼龍羹楊衒之洛陽伽藍記曰西方烏場國西有池龍王居之池邊有一寺五十餘僧龍王每作神變國王祈請以金玉珍寶投之池中在後涌出令僧取之北寺衣食恃龍而濟世人名曰龍王寺又曰西方不可依山甚寒冬夏積雪山中有池毒龍居之昔五百商人止宿池側值龍忿怒泛殺商人槃陀王聞之捨位與子向烏場國學婆羅門呪四年之中善得其術還復王位就池呪龍龍變為人悔過向王王乃捨之楚辭曰神龍失水而陸居為螻蟻之所裁蛟禮記月令曰季秋伐蛟取鼉史記曰劉媼嘗息大澤之陂夢與神遇是時雷電冥晦太公往視則見蛟龍於其上已而有身遂産高祖漢書曰武帝元封五年帝自潯陽浮江親射蛟江中獲之晉書曰周處字子隱義興陽羡人也父魴吳鄱陽太守處少孤未弱冠膂力絶人好馳騁田獵不修細行縱情肆欲州里患之處自知為人所惡乃慨然有改勵之志謂父老曰今時和歲豐何苦而不樂耶父老歎曰三害未除何樂之有處曰何謂也答曰南山白額猛獸長橋下蛟并子為三矣處曰若此為患吾能除之父老曰子若除之則一郡之大慶非徒去害而已處乃入山射殺猛獸因投水搏蛟蛟或浮或沉行數十里而處與之俱經三日三夜人謂之死皆相慶賀處果殺蛟而反家語曰竭澤而漁則蛟不處其淵山海經曰蛟似蛇而四腳小頭細頸有白嬰大者十數圍卵生子如一二斛甕能吞人又曰禱過山有虎蛟魚身蛟尾音如鴛鴦淮南子曰蛟龍寢於泉而卵剖陵又曰一淵不兩蛟蛟魚之長其皮有珠今世以為刀劍之口是也一説魚二千斤鮫也一捿不兩雄一則定兩則爭以喻日月不得並明一國不可兩君也又曰流源千里深淵百仞非為蛟龍也又曰山致其高而雲雨起焉水致其深而蛟龍生焉君子致其道而福祿歸焉又曰君子之居民上若以腐索御奔馬雍容恐失民意若展足薄冰蛟在其下蛟龍屬皮有珠能害人故曰蛟在其下孫卿子曰積水成川蛟龍生焉呂氏春秋曰前有佽飛者得寶劍於干將遂還及涉江至於中流有兩蛟夾繞其船佽飛仗寶劍曰此中腐骨朽肉也赴江剌蛟殺之荊王聞之仕以執圭馬明生別傳曰明生捕賊為賊所傷道間見神女以肘後管中一丸藥與服即愈隨女入岱宗山石室金床玉几安期生從六七仙人見神女稱下官請陽九百六之數神女曰自頃四海水減溟湖成山連城之鯨萬丈之蛟不達斯運之度唯叩天索水辭訟紛紜有於上府三反煩於省察司陰亦疲於謹案矣西京雜記曰瓠子河決有蛟龍從九子自決中逆上人河濆沫流波凡數十里又曰董仲舒夢蛟龍入懷乃作春秋繁露裴淵廣州記曰新寧郡東溪甚饒蛟及時害人曾於魚梁上得之其長丈餘形廣如楯修頸小頭胸前赭背上青班脅邊若錦尋陽記曰城東門通大橋常有蛟為百姓害董奉疏一符與水中少時見一蛟死浮出博物志曰淡臺子羽齎千金之璧渡河河伯欲之陽候波起兩蛟夾船子羽左操璧右操劍擊蛟皆死既濟三投璧於河河伯三躍而歸之子羽毀璧而去又曰荊佽飛渡江兩蛟夾其船佽飛下劍盡斷其頭而風波靜又曰東海上有勇士災丘欣者過神淵強使飲馬馬沉欣朝服拔劍入水三日三夜殺二蛟一龍而出雷電隨而擊之七日七夜眇其左目韓詩外傳同又曰燕太子丹質於秦見遣而為機橋於渭將殺之蛟龍夾舉機不得發又曰人食燕肉者不可入水為蛟龍所吞王子年拾遺録曰漢昭帝常遊渭水使群臣漁釣為樂時有大夫任緒釣得白蛟長三丈若大蛇無鱗甲頭有一角長二尺軟如肉焉牙如脣外帝曰此魚鱔之類非珍祥也乃命太官為鮓骨青肉紫味甚美帝後思之使罾者復覔終不得也郭子橫洞冥記曰文犀國去長安萬里在日南之南人長七尺被髮至踵乘犀象以為車船乘象入海底取寶宿蛟人之舍夕得淚珠則蛟人所泣淚而成珠也亦曰泣珠續齊諧記曰屈原五月五日投汨羅而死楚人哀之每至此日以竹筒貯粉米祭之漢武建中長沙區回白日忽見一士人自稱三閭大夫謂曰聞君常見祭甚善但常年所遺為蛟龍所竊若今有惠可以練葉塞其上五色絲縛之此二物是蛟龍所憚説文曰蛟龍屬也魚滿三千六百歲蛟為之長率魚而飛去幼童傳曰魏太祖年十歲浴於譙水蛟來逼自奮水擊蛟乃退畢浴而還王韶之始興記曰雲水源有湯泉下流多蛟害厲濟者遇之必笑而沒盛弘之荊州記曰襄城北污水極深有蛟為害太守鄧遐勇果時人方樊噲拔劍入水蛟繞其足遐自揮劍截蛟數段流血丹水自此無害劉敬叔異苑曰承陽人李增行經大溪見兩蛟在川引弓射之中一即死增歸因復出市有一女子素服銜涕捉所射箭增怪之問焉答曰何用問為若是君箭便以相還授矢而滅增惡而驟返未達家暴死於路劉義慶幽明録曰晉安帝隆安初曲阿民謝盛乘船入湖採菱見一蛟來向船船回避蛟又從其後盛便以義殺之懼而還家經年無患至元興中普天亢旱盛與同旅數人步至湖中見先義在地拾取之云是我義人問其故具以實對行數步乃得心痛還家一宿便死續搜神記曰長沙有人忘其姓名家住邊江有女子渚次浣紗覺身中有異復不以為患遂妊身生三物皆如鮧夷提二音魚甚憐異之乃著藻槃水中養之經三月此物遂大乃是蛟子字大者為當洪次者名破祖小者名揉岸天暴雨水三蛟一時俱出遂失所在後天欲雨此物輒來女亦知當來便出望之蛟子亦出頭望母良久方復去經年後女亡三蛟子至其墓所哭之經日乃去聞其哭聲狀如狗號又曰安城平都縣尹氏居在郡東十里曰黃屯尹佃舍在焉元嘉二十三年六月中尹兒年十三守舍見一人可年二十許騎白馬張繖及從者四人衣並黃色從東方而來於門呼尹兒來暫寄息因入舍中庭下坐床一人捉繖覆之尹兒看其衣悉無縫馬五色班似鱗甲而毛有頃雨氣至此人上馬去顧遇尹兒曰明日當更來尹兒觀其去西行躡虛而漸升須臾雲四合白晝為之晦暝明日大水暴出山谷沸涌丘壑渺漫將掩尹舍忽見大蛟長三丈餘盤屈庇其舍頭焉任昉述異記曰夏桀之末宮中有女子化為龍不可近俄而復為婦人甚麗而食人桀命為蛟妾告桀吉凶之事唐明皇雜録曰開元中有黃門奉使自交廣而至方拜舞於殿下時國醫紀周顧之謂上曰此人腹中有蛟龍明日當産一子則不可活也上驚問黃門曰有疾否曰臣馳馬大庾嶺時當大熱既困且渴因於路傍飲野水遂腹中堅痞如石周即以消石雄黃煮而飲之立吐一物不數寸其大如指細視之鱗甲具備楚辭曰麋何食兮庭中蛟何為兮木上螭淮南子曰乘雲車雲雷之車服應龍服轅中也應龍有翼之龍參青蟉青虬青龍屬絶瑞席蘿圖蘿圖車上席也雲黃路雲黃所乘路車前白螭白螭先導後賁蛇呂氏春秋曰季孫氏劫公家奪公家政事而自專孔子欲論術則見外孔子欲以進而見遠外於是受飬而便説孔子欲受其飬而季子便説魯國以訾孔子訾毀孔子曰龍食乎清而遊乎清螭食乎清而遊乎濁魚食乎濁而遊乎濁今丘上不及龍下不若魚丘螭耶夫欲立功者豈得中繩哉救溺者濡追逃者趨王子年拾遺録曰崑崙山第三層有螭潭百里多龍螭皆白色千歲一蛻其五藏此潭左側有五色后石云是白螭之腸化為石楚辭曰乘水車兮荷蓋駕兩龍兮驂螭又曰駕青虬兮驂白螭吾與重華遊兮瑤之圓宋玉高唐賦曰乘玉輿兮駟蒼螭
