body:
  text: 菜茹部四瓠詩碩人曰齒如瓠犀犀瓠中瓣也又曰八月斷壺壺也瓠又曰匏有苦葉濟有深涉匏謂之瓠瓠葉苦不可食陸機毛詩疏義曰匏有苦葉匏瓠也葉小可為羹楊州人恆食至八月葉即苦故云苦葉論語曰吾豈瓠瓜也哉焉能繫而不食爾雅曰瓠犀瓣瓠中瓣也詩曰齒如瓠犀魏略曰高辛氏有老婦人居王宮得耳疾醫為挑之得物大如繭盛以瓠覆以盤化為犬五色因名盤瓠晉書曰杜預病癭吳人憚其智計以瓠繫狗之頸每大樹有癭則斬使白乃題曰杜預頸及城平盡捕殺之又曰祖逖在河南百姓感悅嘗置酒大會耆老坐中流涕曰吾等老矣更得父母死將何恨乃歌曰幸哉遺黎免俘虜三辰既朗遇慈父玄酒忘勞甘瓠脯何以詠思歌且舞其得人心如此宋書曰徐文伯曾祖熙好黃老隱於秦望山有過求飲留一瓠瓢與之曰君子孫宜以道術救世當得二千石熙開之乃扁鵲醫經一卷齊書曰卞彬性好飲酒瓠壼瓢久坑皮為肴著帛冠十二年不改易以大瓠為籠什物多諸詭異自號卞田居後周書曰強練師不知何許人所至之處人皆敬而信之晉公護未誅之前曾手持一大瓠到護弟門外抵而破之乃大言曰瓠破子苦未幾而護誅諸子並伏法管子曰一年之計莫若樹榖十年之計莫若樹木終身之計莫若樹人瓜瓠葷菜不備國之貧也莊子曰惠子曰魏王貽我大瓠之種我樹之而成實五石以盛水漿其堅不能自舉剖之以為則廓落無所容非不大也吾為其無用剖之莊子曰夫子固拙於用大也國語曰諸侯伐秦及涇莫濟叔向見叔孫穆子穆子曰豹之業乃匏有苦葉矣不知其他叔向退召舟虞與司馬曰夫苦瓠不材於人共濟而已是行魯人與莒人先濟新序曰魏文侯見萁李牆壞不治問其故曰不時也又進瓠羹文侯曰牆壞不築教我無奪民農功飴我瓠羹教我無多斂百姓王充論衡曰千將之刃未磨瓜瓠不能傷又曰婦人踈孕者子活乳數者子死譬若瓠華多實少也風俗通曰燒穰殺瓠俗說家人燒黍穰則使田中瓠枯死也水經曰今豫州汝南郡城西北汝水左出西北流又屈而東轉又西南會汝形若垂瓠耆老云城取名焉太康地記曰朱崖儋耳無水唯種大瓠藤斷其汁用之亦足嶺南異物志曰儋崖種瓠成實率皆石餘壺盧蜀志曰張裔字君嗣如瓠壺外澤而內粗三國典略曰齊武成帝皇后胡氏安定人魏中書令兗州刺史延之女也母盧氏懷孕廷之初有胡僧來詣門曰此宅瓠盧中有月崔豹古今注曰匏壺盧也壺盧瓠之無柄者匏有柄者懸匏可作笙曲沃者尤善秋乃可用則漆其裏又曰瓢瓠也其總曰匏瓠其別名世說曰陸士衡初入洛咨張公所宜曰詣劉道真是其一既往劉尚哀制中性嗜酒禮畢初無他言唯問東吳有長柄壺盧卿得種來否陸兄弟殊失望乃云悔去廣五行記曰西域夷國有石駱駝腹下出水以金鐵器取便即漏下唯匏盧盛之則不漏飲之令人體滑香淨其國神祕不可數遇嶺異録異曰胡盧笙交趾人多取無柄之瓠割而為笙上安十三簧吹之音韻清響雅合律呂蓼爾雅曰薔虞蓼虞蓼澤蓼也薔音即力切詩曰閔子小子未堪家多難子又集于蓼言辛苦也禮曰膾秋用蓼鶉羹雞羹鴽釀之蓼釀謂切雜之也吳越春秋曰越王欲復怨非一旦也苦思勤心夜以接日臥則以蓼劉向別傳曰尹都尉書有種蓼篇魏子曰君以臣為本以民為根猶室與柱梁相持也梁不強則上下俱亡故蓼蟲在蓼則生在芥則死非蓼仁而芥賊也本不可失也任昉述異記曰長沙定王故宮有蓼園云定王故園也菜之辛者謂之蓼吳氏本草曰蓼實一名野蓼一名澤蓼葵廣雅曰蘬丘軌切葵也詩曰七月烹葵及菽爾雅曰莃音希莬葵似葵而小葉狀如藜有毛汋啖之滑菺音肩戎葵今蜀葵也似葵華如木槿華荍音翹蚍音毗阜房尤切今荊葵也似葵紫色也韓詩外傳曰魯監門女相從績中夜而泣其偶問其故曰宋司馬得罪於宋出於魯馬佚食吾園葵是歲吾園亡一半越攻吳諸侯畏其威魯往獻女吾姊預焉兄往視之道畏而死由此觀之禍福相及也陸機毛詩疏義曰荍音翹一名比不一名楚葵似蕪菁英華紫緑色可食微苦也左傳曰齊慶克通于聲孟子鮑牽見之告國武子武子召慶克謂之夫人訴之乃刖鮑牽仲尼曰鮑莊子之智不如葵猶能衛其足葵葉葉向日以蔽其根也史記曰公儀休為魯相食茹而美拔去園葵也晉書曰江統上太子書曰今西園賣葵菜藍子雞麵之屬虧敗國體貶損政令北齊書曰王攸字子深少孤獨種葵三畝數被人盜之王攸密令人書葵葉下明旦市中看之遂得偷者管子曰桓公北伐山戎出冬葵布之天下桓公憂北郭民貧管子請禁去市三百步者不得樹葵菜此則空有以相給淮南子曰聖人之於道猶葵之與日雖不能與終始其鄉之誠也鄉仰誠實也繆襲祭儀曰夏祀和羹芼以葵列仙傳曰丁次都不知何許人也為遼東丁氏作人丁氏嘗使買葵冬得生葵問冬何得有葵云從日南買來列女傳曰魯漆室有女過時未適人倚柱而嘆鄰婦謂曰何悲也欲嫁乎女曰吾憂魯君老而太子少也婦曰此魯大夫憂焉女曰昔有晉客舍吾家繫馬於園馬佚踐吾園葵使吾終歲不猒葵味鄰女奔亡借吾兄追霧出以求溺流而死使吾終身無兄吾聞河潤九里漸洳三百步今魯國微弱亂將及人三年魯果亂師曠占曰黃帝問師曠曰欲知牛馬貴賤秋葵下小葵生牛馬貴大葵不蟲牛馬賤博物志曰陳葵子微火炒令爆咤散著熟地中遍踏朝種暮生遠不過宿陳葵子秋種覆蓋令經冬不死至春有子是也潘嶽間居賦曰緑葵含露白薤負霜鮑明遠葵賦曰別有鴨腳肫耳言葵似之古歌辭曰採葵莫傷根傷根葵不生結交莫羞貧羞貧交不成蕪菁爾雅曰須葑蓯音總也須未聞江東呼蕪菁為菘菘須音相近故也須即蕪菁也尚書曰荊州厥貢苞匭菁茅菁似為葅也詩曰採葑採菲無以下體葑蕦也菲芴也下體根莖也箋云葑蔓菁與葍之類皆上下可食然其根有美時有惡時又曰爰采葑矣沫之東矣箋云葑蔓菁也又曰采苓好聽讒也采葑采葑首陽之東人之為言茍亦無從葑菜也陸機毛詩疏義曰菜葑蕪菁也郭玄今菘菜也可食少味東觀漢記曰桓帝永興二年詔司隸蝗水為災五榖不登令所傷郡國皆種蕪菁以助民食吳曆曰劉備歸曹公曹公使親近覘視諸將有賓客酒食者輒因事害之備時閉門將人種蕪菁公使人窺門即去備謂張飛曰吾豈種菜者乎曹公必有疑意不可復留其夜輕馬而去吳録曰陸遜諸葛瑾攻襄陽遜遣親人韓扁抄掠瑾聞之欲急去遜方催人種豆菘與諸將圍碁以示間暇齊書曰武陵王曄性清簡尚書令王儉詣曄留儉設食盤中菘菜鮑魚而已儉重其真率為飽食盡歡而去又曰周顒清貧寡欲終日蔬食雖有妻子獨處山舍甚機辨文惠太子問顒菜食何味最勝顒曰春初早韭秋末晚菘梁書曰范元琰家貧唯以園蔬為業嘗出行見人盜其菘元琰遽退走母問其故乃以實答問盜者為誰答曰向所以退畏其愧恥今啓其名願不泄也於是母子祕之或有涉溝盜其筍者元琰因伐木為橋以渡之自是盜大慚一鄉無復草竊北史曰孟信為趙郡太守政尚寬和權豪無犯山中老人曾以㹠酒饋之信和顏接引殷勤勞問乃自出酒以鐵鐺溫之素木盤盛蕪菁葅而已呂氏春秋曰菜之美者具區之菁浸淵之草名曰土英荊楚歲時記曰仲冬是月也菜結霜蕪菁葵等雜菜乾之並為鹹葅有得其和者並作金叉色今南人作鹹葅以糯米熬搗為末並研胡麻汁和釀之石笮音責令熟葅既甜脆汁亦酸美呼其莖為金叉股醒酒所宜也急就篇曰老菁蘘荷冬日藏並藏蓄之以禦冬也
