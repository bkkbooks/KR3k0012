body:
  text: 文部二十史傳下唐書曰于休烈脩國史肅宗自鳳翔還京勵精聽受嘗謂休烈曰君舉必書良史也朕有過失卿書之否對曰禹湯罪己其興也勃焉有德之君不忘規過臣不勝大慶又曰貞元十二年賈躭盧邁皆假故趙憬獨對於延英上問曰近日起居注所記何事憬奏曰古左史記事右史記言人君動止有事言隨即記錄今起居之職也國朝自永徽已後起居唯得對仗承旨仗下後謀議皆不得聞其事注記但出於己行制勑內採錄更無它事所以長壽中姚璹知政事以為親承德音謨訓若不宣自宰相史官無由得書遂請仗下後所言軍國政要宰相專知撰錄號為時政記每月送史館無何此事又廢上曰君舉必書義存勸誡既有時政記宰臣宜依故事為之又曰李翱以史官記事不實奏狀曰臣謬得秉筆史館以記注為職夫勸善懲惡正言直筆紀聖朝功德述忠賢事業載姦臣醜行以傳無窮者史宮之任也凡人事跡非大善大惡則眾人無由得知舊例皆訪於人又取行狀謚議以為一據今之作行狀者多是其門生故吏莫不虛加仁義禮智妄言忠肅惠和此不唯處其心不實茍欲虛美於受恩之地耳蓋為文者又非游夏遷雄之列務於華而忘其實溺於文而棄其理故為文則失六經之古風紀事則非史遷之實錄臣今請作行狀者但指事說實直載事功假如作魏徵傳伹記其諫諍之詞足以為正直段秀實伹記其倒用司農印以追逆兵以象笏擊朱泚足以為忠烈若考功視行狀不依此者不得受依此則考功下太常牒史館然後定謚伏乞以臣此奏下考功從之又曰元和中宰臣已下候到于延英殿上以時政記問於宰臣脩國史李元甫對曰是宰相記天子事以授史官之實錄也古者左史記言今起居舍人是也右史記事今起居郎是也永徽中宰相姚璹監脩國史慮造膝之言或不下聞因請隨奏對而記是也上曰其間或脩或不脩者何也吉甫對曰凡面奉德音未及施行惣為機密固不可書以送史官其間謀議有發自臣下者又不可自書以付史官及事已行者制令昭然天下皆得聞知即史官之記不待書以授也且臣觀時政記者姚璹脩之於長壽及璹罷而事廢賈躭齊杭脩之於貞元躭抗罷而事廢然則關於政化者不虛美不隱惡謂之良史也又曰憲宗銳意於為理徧讀列聖實錄見貞觀關元故事竦慕不能釋卷嘗謂宰臣曰太宗之創業如此玄宗之致理如此我讀國史始知萬倍不如先聖焉又曰長慶中中書門下請脩聖政紀云古之王者必置史官以紀善惡國朝貞觀永徽以前宰臣及百官正衙奏事史官載筆於階戺之下所有奏議悉約書之自永徽以後許敬宗李義府作相事多姦蔽遂奏史官與庶僚俱退然後宰臣請事由是君臣之間咨謀啟沃不復知矣左右史唯寫詔誥除授以脩注記長壽二年宰相姚璹以為史官踈遠不得參聞政事然帝王謨訓不可遂無紀述乃請自今已後所論軍國政要委宰相一人撰錄號為時政記事亦尋廢又路隨傳曰初韓愈撰順宗實錄說禁中事頗切直內官惡之往往於上前言其不實累朝有詔改脩及脩憲宗實錄後文宗復令改正永貞時事隨奏曰臣昨面奉聖旨以順宗實錄頗非詳實委臣等重加刊正伏以史冊之作勸誡所存事有當書理宜歸實疋夫美惡尚不可誣人君得失無容虛載聖旨以前件實錄記貞元末數事稍非摭實蓋出傳聞審知差舛更令刊正頃因坐日屢形聖言通計前後至于數日臣等伏以貞觀已來累朝實錄有輕重撰不敢固辭但欲粗刪深悞亦固盡存諸說宗閔僧孺相與商量緣此書成於韓愈今史官李漢蔣係皆愈之子壻若遣參撰或致私嫌縱臣獲脩成必懼終為時累且韓愈所書亦非己出元和之後已是相循伏望條示舊記最錯悞者宣付史官委之脩定詔曰其實錄中所書德宗順宗朝禁中事尋訪根柢蓋起謬傳諒非信史宜令史官詳正刊去其它不要更脩又曰文宗嘗問曰順宗實錄似未詳實史官韓愈不是當時屈人否李石曰韓愈貞元末為四門博士上曰司馬遷與任安書全是怨望所以漢武本紀事多不實鄭覃曰漢武中年後大發戎馬拓土開邊生人耗竭糧饟不給本紀所述亦非過言石曰史筆不直率多無後鄭覃所陳志在譏諫欲陛下究竟盛德故言漢武不屈上曰靡不有初鮮克有終此誠可為戒覃因曰伏知陛下乙夜觀書無不該涉然經典切切不過一二百言聖意所存靡不有初鮮克有終此兩句實可寢食佩服又曰張次宗有文學稽古厲行開成中為起居舍人文宗復故事每入閤左右史執筆立于螭頭之下宰相奏事得以備錄宰臣既退上召左右更質證所奏是非故開成政事詳於史氏又曰文宗朝對宰臣退上命起居郎鄭朗等適所紀錄者將來一觀鄭朗對曰臣執筆所紀便目為史臣聞自古帝王不合觀史上曰故事何在朗曰臣不敢遠徵故實嘗聞太宗皇帝欲親覽國史用知得失諫議大夫朱子奢上表云史官所述義歸盡善若至會玄已後或非上智中主庸君飾非護短見極陳善惡致怨史官何地逃刑又問禇遂良對曰今之起居古之左右史以記人君言行善惡必書庶幾不為非法不聞帝王躬自觀史上又謂朗曰適之所紀且是直書未有否臧一見無爽朗乃進所紀上略覽曰卿宜門外重寫錄進其日晚內出詔示宰臣曰適鄭朗奏朝來所紀之事擬不進本人君之言良史善惡必書或有平生之閑話不關理道之體要垂諸將來實為愧恥異日臨朝庶幾稍改何妨一見得戒醜言又嘗於紫宸殿對百寮遣閤門使就起居舍人魏謨取注記謨奏曰臣以自古置此以為聖王鑒戒陛下但為善勿畏臣不書如陛下所行錯誤臣不書之天下之人皆得書之臣願以陛下為太宗文皇陛下許臣比禇遂良上曰我前亦嘗觀之謨曰是前起居不詳故事臣今豈得陷陛下為非若陛下一覽之後自此文字須有廻避如此則善惡不直如何遣後代取信上遂止周書曰賈緯乾祐中受詔與王伸竇儼脩晉高祖少帝漢高祖三朝實錄緯以筆削為己任然而褒貶任情記注不實晉宰相桑維翰執政嘗薄緯之為人不甚見禮緯深銜之及敘維翰傳稱維翰身沒之後有白金八千鋌他物稱是翰林學士徐台符緯邑人也與緯相善謂緯曰聞吾友書桑魏公白金之數不亦多乎乃改為白金數千鋌太史公自序云夫詩書隱約者欲遂其志之思也故述往事思來者於是乎述陶唐以來至麟德自黃帝始原始察終考之行事著十二本紀三十世家十表八書七十列傳凡一百三十篇成一家言是也西京雜記曰司馬遷發憤作史記一百三十篇先達為良史之才其以伯夷居列傳之首以為善而無報也為項羽本紀以據高位者非關有德也及其敘屈原賈誼辭旨抑揚惡事不避亦一代之偉才又曰漢承周史官至武帝太史公司馬談世為太史子遷年十三使乘傳行天下求諸侯史記讀孔氏古文序世事作百二十卷五十萬字談子遷以世官復為太史公序事如古春秋司馬氏本古周佚後也作景帝本紀極言其短及武帝之過帝怒而削去坐舉李陵降匈奴下遷蚕室有怨言下獄死宣帝以其官為太史令行太史公文書而已不復用其子孫班固典引曰永平十七年詔曰司馬遷著書成一家揚名後世至以身陷刑之故反微文諷剌貶損當代非誼士也又魏志曰明帝問王肅司馬遷以受刑之故內懷隱切著史記非貶孝武令人切齒又晉張輔嘗著論論班固司馬遷之著述辭約而事舉敘三千年事唯五十萬言班固敘二百年事乃八十萬言煩省不同不如遷一也良史述事善足以獎勸惡足以鑒誡人道之常中流小事亦無取焉而班皆書之不如二也毀貶朝錯傷忠臣之道不如三也遷既造創固又因循難易益不同矣又遷為蘇秦張儀范睢蔡澤作傳逞辭流離亦足以明其大才故述辯士則藻辭華靡敘實錄則隱核名撿此所以遷稱良史也文心雕龍曰昔者夫子慜王道之缺傷斯文之墜靜居以歎鳳臨衢而泣麟於是就大師以正雅頌因魯史以脩春秋舉得失以表黜陟徵存亡以標勸戒然叡旨幽祕經文婉約丘明同恥實得微言乃原始要終創為傳體傳者轉也轉授經旨以授於後實聖文之羽翮記籍之冠冕也及至縱橫之世史職猶存秦并七王而戰國有策蓋錄而不序故即簡為名也漢滅嬴項武功積年陸賈稽古作楚漢春秋爰及史談世惟執簡子長經志甄序帝續比堯稱典則位雜中賢法孔題經則文非元聖故取式呂覽通號曰紀紀綱之號亦宏稱也故本紀以述皇王列傳以揔侯伯八書以鋪政體十表以譜年爵雖殊古式而得事序焉爾其實錄無隱之旨博雅弘辯之才愛奇反經之尤條例踳落之失叔皮論之詳矣及班固述漢因循前業觀史遷之辭思實過半其十志該富讚序弘麗儒雅彬彬信有遺味至於宗經規聖之典端緒豊瞻之功遺親攘善之罪徵賄鬻筆之愆公理辦之究矣至于後漢紀傳發源東觀袁張所制偏駮不倫薛謝之作踈謬少信若司馬彪之祥實華嶠之准當則其冠也及魏代三雄記傳並出陽秋魏略之屬江表吳錄之類或激抗難徵或踈闊寡要惟陳壽三志文質辨洽荀張比之於遷固非妄譽也至於晉代之書繁乎著作陸機肇始而未備王韶續末而不終干寶述紀以審正明序孫盛陽秋以約舉為能案春秋經傳舉例發目史漢以下莫不准的至鄧粲晉紀始立條例又擺落漢魏憲章殷周雖湘川曲學亦有心放典謨及安國立例乃鄧氏之規焉又曰傳託為式編年經事文非記論按實而書歲遠則周曲難密事積則起記易踈斯固惣合之為難也或有同歸一事數人分功兩紀則失於複重偏舉則漏於不周此又銓配之易也故張衡擿史班之舛濫傅玄譏後漢之尤煩皆類也若夫追述遠代代遠多偽公羊皋云傳聞異詞荀悅稱錄遠略近蓋文疑則闕貴信史也然俗皆愛奇莫顧理實傳聞而欲偉其事錄遠而欲詳其跡於是棄同即異穿鑿傍說舊史所無我書則博此訛濫之本源而述遠之巨蠹也至於記編同時時同多詭雖定哀徵詞而世情利害勳榮之家雖庸夫而盡飾屯貶之士雖令德而蚩埋吹霜煦露寒暑筆端此又同時之枉論可為歎息者也故述遠則誣矯如彼略近則回邪如此折理居正唯懿上心乎談藪曰後魏太保清河崔光樂陵太守曠之孫長廣太守靈延之子光博學有史才本名孝伯字長仁高祖賜名焉除著作郎撰國史遷黃門侍郎為高祖所重帝曰孝伯之才渾渾如黃河東注今之文宗也及魏收為史改渾渾為浩浩光有大度喜慍不形於色有毀之者必善言以報之雖見誣謗終不自申曲直士君子以此稱之光脩國史第敬友子鴻復撰十六國春秋一門二史當代為榮
