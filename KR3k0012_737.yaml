body:
  text: 方術部十七祝說文曰祝祭主贊詞者周禮曰大祝掌六祝之辭以事鬼神示祈福祥求永貞一曰順祝二曰年祝三曰吉祝四曰化祝五曰瑞祝六曰策祝又曰掌六祈以同鬼神示作六辭以通上下親踈遠近辨六號辨九𢷎與拜同又曰小祝掌小祭祀喪祝掌大喪勸防之事甸祝掌四時之田詛祝掌盟詛類造攻說禬禜之祝號左傳曰晉范文子反自鄢陵使其祝宗祈死曰君驕侈而克敵是天益其疾也難將作矣愛我者唯祝我使我速死無及於難范氏之福也六月戊辰士燮卒又曰宋皇國父為太宰為平公築臺妨於農功子罕請俟農功之畢公弗許築者謳之曰澤門之晢實興我役邑中之黔實慰我心子罕聞之親執朴以行築者而抶其不勉者曰吾儕小人皆有闔廬以避燥濕寒暑今君為一臺而不速成何以為役謳者乃止或問其故子罕曰宋國區區而有詛有祝禍之本也又襄二十七年曰楚子木問於趙孟曰范武子之德何如對曰夫子家事治言於晉國無隱情其祝史陳信於鬼神無愧辭又曰齊侯疥遂痁期而不瘳諸侯之賓問疾者多在梁丘據與裔款言於公曰吾事鬼神豐於先君有加矣今君疾病為諸侯憂是祝史之罪也諸侯不知其謂我不敬君盍誅於祝固史嚚以辭賓公說先告晏子曰日宋之盟屈建問范會之德於趙武趙武曰夫子家事治言於晉國竭情私其祝史祭祝陳信不愧其家事無猜其祝史不祈建以語康王曰神人無怨宜夫子之光輔五君以為諸侯主也公曰據與款謂寡人能事鬼神欲誅於祝史子稱是語何對曰若有德之君內外不廢上下無怨動無違事其祝史薦信愧心矣是以鬼神用饗國受其福祿祝史與焉其所以蕃祉老壽者為信君使也其言於鬼神其適遇淫君內外傾邪上下怨疾動作辟違從欲厭私高臺深池撞鍾舞女斬刈民力輸掠其聚以成其違不恤後人暴虐淫縱肆行非度無所還忌不思謗言不憚鬼神神怒民痛無悛於心其祝史薦信是言罪也其蓋失數美是矯誣也進退無辭則虛以求媚是以鬼神不饗其國以禍之祝史與焉所以夭昏孤疾者為暴君使也其言僣嫚於鬼神公曰然則若之何對曰不可為也言非誅祝史所能治山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之縣鄙之人人從其政福介之關暴征其私丞嗣大夫強易其賄布常無藝徵斂無度宮室日更淫樂不違內寵之妾肆奪於市外寵之臣僣令於鄙私欲養求不給則應人民苦病夫婦皆詛祝有益也詛亦有損聊攝以東姑尢以西其為人也多矣雖其善祝豈能勝億兆人之詛君若誅於祝史修德而後可公說使有司寬政毀關去禁薄斂責己又曰衛太子禱曰曾孫蒯聵敢昭告皇祖文王烈祖康叔文祖襄公鄭勝亂從晉午在難不能治亂使鞅討之蒯聵不敢自佚備持矛焉敢告無絶筋無折骨無面傷以集大事無作三祖羞大命不敢請佩玉不敢愛韓詩外傳曰齊桓公至海丘見封人曰爾何為者也對曰臣海丘封人也桓公曰叟年幾何曰臣八十有三矣桓公曰美哉壽也叟盍為寡人壽也對曰野臣不知為君王之壽桓公曰盍叟之壽祝寡人封人奉觴再拜曰使吾君罔壽金玉之賤人民是寶桓公曰善哉祝乎叟盍復祝乎封人曰使吾君好學而不惡問賢者在側諫者得入桓公曰善哉祝乎封人曰無使群臣百姓得罪於吾君亦無使吾君得罪於群臣百姓桓公不悅曰此言非夫前二言之善也叟其革之封人瀾然涕下曰願與吾君終言之此言乃夫前二言之上也臣聞子得罪於父母可因姑姊妹而謝也父乃赦之臣得罪於君可因便僻之左右而謝也君乃赦之昔桀得罪於湯紂得罪於武王此君得罪於臣也至今未有為謝者公曰善扶而載之自御以歸禮外篇成王冠周公使祝雍曰辭達而已勿多也祝雍曰近於民遠於佞近於義嗇於時惠於財任賢使能陛下摛顯先帝之光耀以承皇天之嘉祿欽順仲春之吉日遵並大道邦域康阜萬福之休靈始加昭明之元服推遠邪佞之忠弘積文武之龍德肅勤高祖之清廟六合之內靡不蒙德永永與天無極又曰大夫成群立社祝曰今某月日君為某立社社祭上而主陰氣也五穀用成萬民以生敢用肥豚嘉蔬清酒敬致大神自今日已來祈請止雨惟靈是聽子孫眉壽萬神含靈止雨祝曰天生五穀以養人民今天雨不止用傷五穀如何神靈而行而止殺牲以賽神靈雨則不止鳴鼓攻之朱緣繩索而脅之史記曰楚大發兵如齊齊王使淳于髡之趙請救兵遺金百斤車馬十駟淳于髡仰天大笑冠纓索絶王曰先生少之髡曰何敢王曰笑豈有說乎髡曰今者臣從東方來見道傍有禳田者操一豚蹄酒一盂而祝曰甌窶滿篝甌窶猶杯樓也言豐年採掇易滿篝籠也篝音汙耶滿車汙耶下地有薪草也五穀蕃熟穰穰滿家臣見其所持者狹而所欲者奢故笑之吳越春秋曰勾踐五年夏五月將與大夫種范蠡入臣於吳群臣皆送臨水祖道大夫種前為祝其辭曰皇天祐助先沉後揚禍為德根憂為福嘗威人者滅服從者昌王雖牽致其後無殃君臣生離感動上皇衆夫哀悲莫不感傷臣謹再拜伏稱萬歲上灑三觴勾踐仰天大息舉杯垂涕默無所言宋書曰王悅之宋明帝泰始中為黃門郎上以其廉介賜良田五頃以為侍中在門下盡心力檢校御府太官太醫諸署時承奢忲之後奸竊者衆悅之案意刻覆無所避得奸巧甚多於是衆署共呪詛悅之病甚恆見兩烏衣人捶之及卒上乃收典掌者十許人桎梏之送淮陰密令渡瓜步江投之中流北史曰後魏時有沙門惠憐自云呪水飲人能差諸病病人就之者日有千數靈太后詔給衣食事力使於西南療百姓北齊書曰婁太后為博陵王納崔陵妹為妃勑中使曰好作法用勿使崔家笑人婚夕顯祖舉酒祝曰新婦宜男孝順富貴陵奏曰孝順出自臣門富貴恩由陛下尸子曰鮑叔為桓公祝曰使公無忘在莒時管子無忘在魯時寧武子無忘車下時靈鬼志曰石虎時有胡道人驅驢作估於外國深山中行有一絶澗窈然無底行者恃山為道魚貫相連忽有惡鬼牽之下入澗中胡人急性便大嗔恚尋跡澗中並祝誓呼諸鬼神下遠忽然出一平地城門外有一鬼大鎖項腳著大鐵桎鬼見道人便乞食曰得食當與汝既至門乃是鬼王所治前見王道人便自說驅驢載物為鬼所奪尋跡至此須臾即得其驢載物如故賈誼新書曰湯見設網者四面張網而祝之曰自天下者自四方至者皆羅我網湯曰嘻盡之矣非桀其孰能如此合去三面教之曰蛛蝥作網今之人修緒欲左者左欲右者右欲高者高欲下者下吾請受其犯命者民聞之曰德及禽獸而況我乎於是下親其上說苑曰齊遣淳于髡到楚為人短小楚王甚薄之謂曰齊無人耶而使子來子何長也對曰臣無長腰中七尺之劍欲斬無狀王曰止吾但戲子耳即與髡曰飲酒謂髡曰吾有仇在吳國子定能為報之乎對曰來見道傍鄙民持一頭魚上田祝曰上得萬木下得千斛臣竊笑之以為禮薄而辭多祭輕而望重王今與吾半日之樂而委以吳王非其計楚王默然新序曰中行寅將軍召其大祝而欲加罪曰子為我祝辭令不精耶犧牲不肥澤也威儀不謹敬耶齊戒不潔清也乃使吾國將亡何也祝簡對曰昔吾先君中行密子有車十乘不憂其薄憂其德義之不足也今之主君有車百乘不憂德義之薄唯患車之不足也且船車飭則賦斂厚賦斂厚則民怨而謗詛矣君苟以為祝之有益於國則謗詛亦將為亡矣一人祝之一國詛之一人祝不勝萬人詛國亡不亦宜乎祝其何罪中行子默然而慚風俗通論曰案明帝起居注東巡太山到滎陽有烏飛鳴乘車上虎賁王吉射之中而祝曰烏鳴啞啞引弓射洞右腋陛下壽萬歲臣為二千石明帝賜錢二百萬世說曰劉靈嗜酒其婦止之靈祝曰天生劉靈以酒為名一飲一斛五㪷解酲婦人之言慎不可聽蔡雍祖餞祝曰令歲淑月日吉時良爽應孔嘉君當遷行神龜吉兆休氣煌煌著卦利貞天見三光鸞鳴噰噰四牝彭彭君既升輿道路開張風伯雨師灑道中央陽遂求福蚩尢辟兵倉龍夾轂白虎扶行朱雀道引玄武作侶勾陳居中厭伏四方君往臨邦長樂無疆符黃帝出軍訣曰昔者蚩尢揔政無道殘酷無己黃帝討之於涿鹿之野暴兵中原黃帝仰天歎息愀然而睡夢西王母遣人披玄狐之裘以符受之曰太一在前天一備後得兵契信戰則剋矣黃帝悟思其符立壇請而祈之祭以太牢用求神祐須臾玄龜巨鼇銜符出從水中置壇中而去黃帝再拜稽首親自受符視之乃所夢也於是黃帝佩之以攻即日擒蚩尢龍魚河圖曰玄女出兵符付黃帝制蚩尢葛仙公別傳曰仙公丹書符投江中順流而下次又投一符逆流而上次投一符不上不下停住水中而向二符皆還就之神仙傳曰漢章帝問劉馮殿下有怪常有朱衣被髮持燭相隨而走為可劾不馮曰可帝因使人僞為之馮以符擲之使人頓地帝驚曰以相試耳乃解之又曰仙人帛和弟子孫真舅氏當葬路遠不得車馬和以一函符與真誡曰汝持此行二十里當有以車牛給汝者又有廚供不可發此函真行果有一少年御一車牛給真并送酒食即到舅家以函著衣箱中真弟不知發函函有紙畫車牛一人御之因失車牛所在列仙傳曰涓子釣於河澤得符於鯉魚腸中續搜神記曰吳猛字世雲有道術狂風暴起猛擲符上便有一飛鳥接符去須臾風靜人問之答云南湖有遭此風者兩舫人是道士呼天求救故符以止風抱朴子曰劉安君用藥及符能令人含笑則為婦人蹙面則為老夫踞地則為小兒葛洪神仙傳曰葛玄見賣大魚者謂曰暫煩此魚往河伯處魚主曰魚已死玄曰無苦乃丹書紙內魚口中投水有頃魚化禁而飛術後漢書曰郭憲字子橫建武七年伐張堪為光祿動從駕南郊憲在位忽乃向東北含酒三噀埤蒼曰噀也音執法奏為不敬詔問其故憲對曰齊國失火故以厭之比後齊果有火災與郊同日又曰樊英字季齊善風角算河洛七緯常有暴風從西方來起英謂學者曰成都市火甚盛因含水西向漱之乃令記其日時客後有從蜀都來云是日大火有黑雲卒從東起須臾大雨火遂得滅於是天下稱其術藝邵氏家傳曰邵信臣為少府南陽遭火燒數萬人信臣時在丞相匡衡坐心動含酒東向漱之遭火處見雲西北來冥晦大雨以滅火雨中酒香桂陽列仙傳曰成武丁正且大會以酒沃廷中有司問其故對曰臨武縣失火以酒救之遣騎果然神仙傳曰欒巴為尚書正旦會得酒西南漱云成都失火作雨救之後使至果如其言抱朴子曰外國方士能祝龍臨淵禹步龍浮出長數十丈方士吹之則縮短數寸掇取著壺中輒四五寸以水養之餘國少雨屢旱者輒齎一龍往賣之一龍千金取一頭著淵中即興雲雨也又曰廬江太守華念思就道士學微視術未滿百日夜見天文及四鄰不復有屋舍籬障有妾死已久亦見其形與語如平生念思方信道術又曰李阿者行道逢奔車阿兩腳中車腳即折弟子古弼見之驚怖阿須臾取斷腳相續如故也淮南萬畢術曰慈石提棊取雞磨針鐵以相和慈石棊頭置局上自相投也又曰鵲腦令人相思取雌雄鵲各一燔之四通道丙寅日與人共飲酒置腦酒中則相思也又曰老槐生火膠撓水則清弊箕止醎取箕以內醫中鹹著箕矣又曰首澤浮針取頭中垢以塗針塞其孔置水即浮又曰燒角入山則虎豹自遠惡其臭也又曰赤布在戶婦人留連取婦人月事布七月七日燒為灰置楣上即不復去勿令婦人知取苓皮置罌中自沸如雨也又曰梧木成雲取梧木置十碩瓦罌中氣盡則出雲又曰銅甕雷鳴取沸湯置甕中沉之井裏則鳴數十里取家祠黍以啖兒兒不思母又曰取門冬赤黍漬以狐血陰乾之欲飲酒取一丸置舌下酒吞之令人不醉又曰門冬赤忝薏苡為丸令婦人不妒又曰取雞子去汁然艾火內空中疾風高舉自飛去取亡人衣裹磁石懸井中亡者自歸矣又曰取蜘蛛塗布天雨不能濡之又曰取馬尾犬尾置朋友夫妻衣中自相憎矣又曰削冰令圓舉以向日以艾承其影則火生又曰取牛膽塗熱釜即鳴矣又曰取伯勞血塗金令人不取化為石也又曰拔劍倚門兒不驚又曰狼皮在戶羊不出牢羊畏狼故也又曰燒木賣酒人民自聚取失火家木刻作人形朝朝祭之人聚也又曰取守宮蟲餌以丹陰乾塗女人身男合即滅又曰蝟膏塗鐵柔不折甑瓦止鳥鳴取甑底抵之則止又曰犀角置狐穴中狐不歸又曰鴟脛血塗雞頭不能起又曰馬齧人取僵蠶塗上脣即止復不齧人
