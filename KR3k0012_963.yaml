body:
  text: 竹部一竹上易曰震為蒼琅竹尚書禹貢曰荊州厥貢惟箘簵楛箘簵美竹又禹貢楊州曰篠簜既敷篠竹箭簜大竹禹治水敷布也厥貢瑤琨篠簜毛詩斯干曰如竹苞矣如松茂矣又竹竿曰竹竿衛女思歸也適異國而不見答思而能以禮者也籊籊竹竿以釣于淇韓詩外傳曰黃帝時鳳皇栖帝梧桐食帝竹實周禮春官曰孤竹之管孫竹之管陰竹之管鄭玄注曰孤竹竹特生孫竹杖根之來生者陰竹生山北者禮記月令曰仲冬日長至則伐木取竹箭左傳文下曰賊殺齊懿公於申池納諸竹中又襄三曰晉伐齊劉難士弱率諸侯之師焚申池之竹木二子晉大夫也又曰東南之美者有會稽之竹箭焉會稽山名今在山陰縣竹箭篠也孝經河圖曰少室之山大竹堪為釜甑此竹亦爨器也安思縣多苦竹竹之醜有四有青苦有白苦有紫苦有黃苦汲冢周書王會曰成王時路人獻大竹史記曰智伯率韓魏攻趙襄子襄子奔晉陽原過後至見三人自帶以上可見自帶以下不可見與原過竹三節莫通曰我以是遺趙旡恤襄子自割竹有朱書又貨殖傳曰渭川千畝竹其人與千戶侯等漢書曰高祖為亭長乃以竹皮為冠應劭注曰以竹始生皮作冠今鵲尾冠也又曰上使發卒數萬人塞瓠子河下淇園之竹以為楗又曰竹大者一節受一斛小者數斗以為柙音匣榼又曰梁孝王修兔園多植竹又地理志曰秦地有鄠杜竹林南山檀柘號陸海後漢書曰郭伋為并州刺史出行郡童子乘竹馬相待又曰寇恂為河內太守移書屬縣講兵肆射伐淇園之竹為矢百餘萬前書音義曰淇園衛之苑多竹篠也養馬二千匹收租四百萬斛轉以給軍晉書曰杜預討吳州郡多望風歸命衆軍會議或曰百年之寇未可盡剋今向暑水潦方降疾疫將起候來冬更為大舉預曰昔樂毅籍濟西一戰以併強齊今兵威已振譬如破竹數節之後皆迎刃而解無復著手豦也又曰武帝平吳之後復納孫皓宮人數千自此掖庭殆將萬餘人而並寵者甚衆帝莫知所適乘羊車恣其所之至便宴寢宮人乃取竹葉插戶以鹽汁灑地而引帝車又曰王徽之常居空宅中便令種竹聞其聲徽之嘯詠指竹曰不可一日無此君謝靈運晉書曰元康二年巴西界竹花紫色結實如麥晉書載記曰長安謠曰鳳皇鳳皇止阿房符堅以鳳皇非梧桐不棲非竹實不食乃植桐竹數十萬株于阿房宮城以待之慕容冲小字鳳皇至是終為堅賊入止阿城焉宋書曰卜天興弟天生少為隊將十人同火屋後有一坑廣二丈餘十人共跳之皆度唯天生墜天生乃取實中苦竹削其端使利交橫布坑內更呼等類共跳並懼不敢天生乃復跳之往反十餘曾無留礙衆並歎服南史曰南海王子罕字雲華武帝第十一子也頗有學問母尚容華有寵故武帝留心母常寢疾子罕晝夜祈禱于時以竹為燈纘照夜此纘宿昔枝葉大茂母病亦愈咸以為孝感所致又曰徐伯珍少孤貧學書無紙常以竹葉箭箬音若其蔗及地上學書南史隱逸傳曰沈麟士字雲禎居貧織簾誦書鄉里號為織簾先生嘗為人作竹誤傷手便流淚而還同作者謂曰此不足損何至涕零答曰此本不痛但遺體毀傷感而悲耳梁書曰武帝臨雍州命呂僧珍為中兵參軍委以心膂僧珍陰養死士歸之者甚衆武帝頗招武猛士庶饗從會者萬餘人因命按行城西空地將起數千間屋為止舍多伐林竹沉於檀溪積茅蓋若山阜皆未之用僧珍獨悟其旨因私具櫓數百張及兵起悉取檀溪林竹裝為船艦葺之以茅並立辦衆軍將發患諸將須櫓甚多僧珍乃出先所具每船付二張爭者乃息隋書曰明克讓字弘道平原鬲人也父山賓梁侍中克讓少好儒善談論博涉書史所覽將萬卷三禮禮論尤所研精龜策曆象咸得其妙年十四釋褐湘東王法曹參軍時舍人朱异在儀賢堂講老子克讓預焉堂邊有修竹异令克讓詠之克讓攬筆輒成其卒章曰非君多愛賞誰貴此貞心异甚奇之唐書曰南詔理無刑名桎梏之其罪以竹五本束之伏犯者撻其背又曰開成四年襄陽三縣山竹結實成米百姓採食莊子曰鵷雛非練實而不食練實竹實也取其潔白淮南子曰太清之治也鳳麟降蓍龜兆甘露下竹實盈竹實鳳皇食又曰瓦以火成不可以得火竹以水生不可以得水瓦得火則破竹得水浸則死也又曰槁竹有火弗鑽不燃音然土中有水弗掘無泉掘猶窮也梅子曰弘農宜陽縣金門山竹為律管河內葭莩以為灰可以候氣取灰實管端置之深宮覆以緹幕勿令見風日節至則灰飛管通矣唐子曰希見食笋歸煮竹根家語曰子路見孔子孔子曰君子不可學子路曰南山有竹不揉自直斬而為用射達於犀革以此言之何學之為孔子曰括而羽之鏃而礪之其入不益深乎呂氏春秋曰昔黃帝命伶倫作為律伶倫自大廈之西西方山名乃之沅渝之陰山名取竹于嶰溪之谷以生空竅厚釣者斷兩節間竹生溪谷者取其釣厚以為律溪或作嶰其長三寸九分而吹之山海經曰長石之山西有共谷其中多竹衛丘山南帝俊郭璞曰俊舜字假借音竹林在焉大可為舟言舜林中竹一節則可以為船又曰竹生花其年便枯竹六十年一易根易根必經結實而枯死實落土復生六年還成町穆天子傳曰天子西征至于玄池天子休于玄池之上乃奏廣樂三日而終是曰樂池乃樹之竹是曰竹林吳越春秋曰越王問范蠡用兵對曰越有處女願君王問之處女北見於王道逢老人自稱袁公跪披林杪竹未折墮地處女即捷其未公操其本而剌處女處女舉杖擊之飛上樹變為白猿具猿部三輔舊事曰武帝作延陵及廟竇將軍有青竹田在廟南恐犯蹈之言作陵不便世說曰魏武征袁本初治餘有數十斛竹片咸長數寸衆並謂不堪用正合燒除太祖意甚惜思所以用之謂可為竹甲而未顯其言馳使以問楊主簿德祖德祖意懸同風俗通曰殺青按殺青作簡書之新竹有汁後加於火上故作簡者於火上炙乾之水經曰東陽定縣夾岸緣溪悉生支竹及芳枳木連雜以霜菊金橙說文曰竹冬生草也華陽國志曰有竹王者興於遁水有一女浣於水濱有三節大竹流入女足間推之不去聞有兒聲持歸破竹得男長養有武才遂雄夷狄氏竹為姓所破竹於野成林今王祠竹林是也又曰何隨家養竹園人盜其竹何隨遇行見恐盜者覺怖走竹傷其足挈履徐步而歸文士傳曰蔡雍經會稽高遷亭見屋椽竹從東間數第十六可以為籥取用果有異聲神仙傳曰離婁公服竹汁餌桂得仙又曰壺公欲與費長房俱去長房畏家人覺公乃書一青竹戒曰卿以此竹歸家便稱病以此置卿臥處默便來還長房如言家人見此竹云是尸哭泣行喪荊楚歲時記曰夏至節日食粽周豦謂為角黍人並以新竹為筒粽練葉插五絲繫臂謂為長命縷王子年拾遺記曰蓬山有浮筠之簳葉青莖紫子如大珠有青鸞集其上下有砂礰細如粉暴風至竹條翻起拂細砂如雪霰仙者來觀戲焉風吹竹折聲如鍾磬之音南越志曰羅浮山生竹皆七八圍節長一二尺謂之鍾龍湘州記曰邵陵高平縣有文竹山上有石床四面緑竹扶踈常隨風委拂此床永嘉記曰陽嶼仙山有平石方十餘丈名仙壇有一筋竹垂壇旁風來輒掃拂壇上東陽記曰崑山去蕪城山十里峰嶺高峻故老傳云嶺上有圓池魚鱉具有池邊有竹極大風至垂屈掃地恆潔如人掃之丹陽記曰江寧縣南二十里慈姥山積石臨江生筲管竹王子淵洞蕭賦所稱即此也其竹圓緻音稚異於他處自伶倫採竹嶰谷其後唯此簳見珍故歷代常給樂府而俗呼曰鼓吹山風土記曰陽羡縣有袁君豚壇邊有數枚大竹高二三丈枝皆兩兩枝下垂如有塵穢則掃拂壇上恆淨潔袁山松宜都山川記曰佷山縣方山上有靈祠祠中有特生一竹擅美高危其妙下垂忽有塵穢起風動竹拂蕩如掃荊州記曰臨賀謝休縣東山有小竹生其旁皆四五寸圍下有盤石徑四五丈極高方正青滑如彈碁局兩竹屈垂掃其上初無塵穢未至數十里聞風吹此竹如簫管之音武昌記曰陽新縣有朔山山有兩大竹長十餘丈圍數尺有聲如風雨為官長凶候縣人占之有驗雲南記曰雲南有實心竹文采班駮殊好可為器物其土以為槍簳交床述征記曰仙陽縣城東北二十里有中散大夫嵇康宅今悉為田墟而父老猶種竹木崔豹古今注曰牛亨問曰籍者何也答曰籍者尺二竹牒記人之年名字物色懸之宮門按省相應乃得入也劉敬叔異苑曰吳郡桐廬人嘗伐竹見一竹竿雉頭蛇身猶未變此亦竹為蛇蛇為雉也任昉述異記曰湘水去岸三十許里有相思宮望帝臺舜南巡不返歿葬於蒼梧之野堯之二女娥皇女英追之不及相思慟哭淚下沾竹文悉為之班班然又曰衛有淇園出竹在淇水之上詩云瞻彼淇澳緑竹猗猗又曰南中生子母竹今慈竹是也漢章帝三年子母竹笋生白虎殿前謂之孝竹群臣作孝竹頌又曰東海畔孤竹生焉斬而復生中為管周武王時孤竹人獻笋一株楊泉物理論曰宜陽金門竹為律管河內葭為灰可謂同氣宜陽洛州西北故縣名本草曰竹花一名華草夢書曰竹為處士田居夢見竹者憂處士也楚詞七諫曰便娟之竹寄生江潭上葳蕤而防露下泠泠而來風江逌竹賦曰含虛中以象道體圓質以儀天古詩曰種竹深井中三年乃成竿
