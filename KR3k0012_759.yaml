body:
  text: 器物部三盆爾雅曰盎謂之缶盆也易曰初六有孚盈缶王肅曰缶者下民質素之器又曰九三日昊之離不鼓缶而歌則大耋之嗟凶詩曰坎其擊缶宛丘之道盎謂之缶周禮曰盆實二釜厚半寸禮曰夫奧者老婦之祭也盛於盆尊於瓶盆瓶炊器也又曰世婦卒蠶遂獻繭于夫人及良日夫人繅三盆手三盆手者三淹也史記曰秦趙會澠池藺相如曰趙王竊聞秦王善為秦聲請奏盆缶音缶皆瓦器竹以盛酒秦人鼓之以節歌於是秦王不懌為一擊缶趙御書曰某年某月秦王為趙王擊缶又曰王惲書云醉後仰天撫缶而歌又曰司馬遷書云僕以為戴盆何以望天續晉陽秋曰桓宣武與妻妾坐月下流星墜下銅盆水中光如二寸珠顃然妾酌飲之生玄晏子春秋曰景公飲酒自鼓盆甕也莊子曰莊子妻死惠子吊之莊子箕踞鼓盆而歌淮南子曰今夫窮鄙之社也扣盆拊瓴相和而歌自以為樂矣嘗試為之擊建鼓撞巨鍾然知其盆瓴之足羞藏詩書修文學而不知至論之旨則拊盆扣瓴之徒也又曰屠者藿羹車者步行陶人用缺盆匠人處狹廬又曰今盆水在庭清之終日未能見目睫濁之不用一橈而不能察方圓人神易濁而難清猶盆水之類乎學同又曰日冬至則盆水溢世説曰阮仲容至宗人聞共集以大盆盛酒王韶之始興記曰林源山有石室室盤石上行羅十甕皆蓋以青盆中悉是瓶銀交州雜記曰夷俗以銅盆甕贖罪潘嶽笙賦曰傾縹盆以酌酃甕説文曰罌於耕切甀直為切説文亦作垂也甀小口罌也瓨下江切以罌與罌字同長頸受十甕罌也通俗文曰甕下孔曰姑縣切方言曰瓬音剛瓭都貪切一音波甒音武䍃音由㽀音鄭㼻士雙切甕瓿甊瓿音部甊郎口切㽈魚記切罌也酃桂之郊謂之缸今江東通名大甕為缸也其小者謂之瓭周魏之間謂之甒今江東亦呼罌甒子秦之舊都謂之㽀江淮之間謂之䍃江湖之間謂之㼻自關而西晉之舊都河汾之間其大者謂之甀其中者謂之瓿甊自關而東趙魏之間謂之甕或謂之罌東齊海岱之間謂之㽈罌其通語也爾雅曰甌瓿謂之瓵瓿小罌也長沙曰瓵瓵音也易曰井谷射鮒甕弊漏禮曰宋襄公葬其夫人醯醢百甕又曰儒有蓬戶甕牖易衣而出併日而食左傳曰齊侯伐燕燕人歸燕姬賂以瑤甕玉櫝斝耳不克而還玉甕也孝經援神契曰銀甕也不汲自隨不盛自盈瑞應圖同漢書曰陳平家貧居甕牖家語原憲同東觀漢記曰王渙為洛陽令盜賊發不得遠走或藏溝渠或伏甕下渙以方略取之皆稱神明王隱晉書曰太孫臧外祖蔣迪吳興人後迪作酪當釀未成大甕自行迪打酪甕破問景養養曰當生太子儲副又曰畢卓為吏部郎性嗜酒比舍郎酒熟卓因醉夜至其甕間盜飲之為掌酒者所縛旦視之乃畢吏部也墨子曰備城百步一井井十甕莊子曰子貢過漢陰見一丈夫方將為圃畦鑿隧而入井抱甕而出灌志怪曰建康小史曹著為廬山府君所迎見門有一丈甕可受數百斛但見風雲出其中鍾離意別傳曰意為魯相孔子堂有甕皆有丹書自夫子亡後無敢發者意乃發甕得素書為學華陽國志曰趙琰青州刺史廳置水甕得貴要之書投於其中淮南萬畢術曰銅甕雷鳴取沸湯著銅甕中堅密塞內之井中則雷鳴聞數十里語林曰羊稚舒冬月釀酒令人抱甕為暖羊琇字稚舒世説曰胡廣本姓黃五月五日生父母惡之乃置甕投於江胡公見甕流下聞兒啼取兒養之遂七登三司廣不持本親服云於本親以我為死人深譏之罃説文曰罃備火長頸瓶也方言曰罃陳魏宋楚之間謂之瓦音俞臾或謂之㼡音殊燕之東北朝鮮冽水之間謂之瓺音暢亦音腸齊之東北海岱之間謂之儋所謂家無儋石之儲者也音擔或作甔周洛韓鄭之間謂之甀或謂之罃罃謂之野音鼙史記曰韓信擊魏從夏陽以木罌渡軍襲安邑服虔曰以木捭縛罌缶以為渡異苑曰月支國有佛髮盛以琉璃罌幽明録曰清河崔茂伯女結婚裴氏剋期未至女暴亡提一金罌受二升許徑到裴床前立以罌贈裴甄異傳曰晉隆安中吳縣張君才忽有鬼來令才取一白罌盛水半以絹覆頭明日視之錢滿罌才家先貧因此遂富墨子守備曰用瓦大罌容十升以上者步而十盛水旦用之蔡謨與何驃騎書曰昔墨翟以瓦罌濟國也淮南萬畢術曰馬蹄破罌取馬蹄燒如炭置罌中有頃破矣坩纂文曰大坩為坊音塤東宮舊事曰白坩五枚世説曰陶侃少時作魚梁吏嘗以一坩鮓餉母母責侃曰汝為吏以官物見餉非唯不能益吾乃以增吾憂裴淵廣州記曰董奉至晉興五里封一白坩置高崖中而去人欲取不能得今猶在瓶説文曰甕也甕壅也汲瓶也瓴形似瓶易曰汔至亦未繘井羸其瓶凶詩曰瓶之罄矣傳曰衛孫蒯田于曹隧飲馬於重丘毀其鉼重丘人閉門而詬之親逐其君爾父為厲衛石買孫蒯伐曹取重丘又曰晉人來治杞田季孫將以成與之盛孟氏邑本杞曰謝息為孟孫守不可曰人有言曰雖有挈瓶之知守不假器禮也又曰邾子在門臺閽以瓶水沃廷事具爐門中史記曰田肯説高祖曰秦形勝之國也地勢便利其以下兵於諸侯譬猶居高屋之上建瓴水也如淳曰瓴盛水瓶也建音蹇漢書曰揚雄作酒賦以諷諫成帝其文為酒客難法度士譬之於物曰子猶瓶矣觀瓶之居居井之湄處高臨深動常近危酒醪不入藏水滿懷不得左右牽於纏徽一旦擊礙為黨所櫑音雷身投黃泉骨肉為泥自用如此不如鴟夷前涼録曰張軌時西胡致金胡瓶皆拂蒜力禁切作奇狀並人高二杖魯子曰一井五瓶泄之可待分流者衆也呂氏春秋曰見瓶水之冰而知天下之寒魚鱉之藏也淮南子曰古者抱瓶而汲唐子曰猛將之發觀于虎而覽于鷹故攻如擊電避如收霧閉之如在瓶開之如散星西域記曰踈勒王致魏文帝金胡瓶二枚銀胡瓶二枚雜五行書曰懸瓶井中除邪鬼楚辭曰瓶甌登於明堂瓶甌瓦器也周鼎潛乎深泉古樂府詞曰後園鑿井銀作床金瓶素綆汲寒漿甒方言曰甒甕罌也禮曰君尊瓦甒此以小為貴也瓦甒五斗儀禮曰東方之饌兩瓦甒三禮圖曰醴甒以瓦為之受五斗口高二寸徑一尺六寸中身甕下平有蓋魁易洞林曰太子洗馬荀子驥家中以龍銅魁作食歘鳴東宮舊事曰一升銅魁一漆二升魁三漆注醬五升魁二李尤羹魁銘曰羊羹不遍駟馬長驅槃説文曰槃承槃也榹音奇盤也周禮曰若合諸侯則共珠槃玉敦合諸侯者必割牛耳取其血歃秋之以盟珠槃以盛牛耳大戴禮曰隨武子槃之銘曰與其溺於人也寧溺於淵禮曰湯之槃銘曰茍日新日日新又日新左傳曰晉文公及曹僖負羈之妻曰吾觀晉公子之從者皆足以相國若以相國公子必反其國反其國必得志於諸侯得志於諸侯而誅無禮曹其首也子盍蚤音早與早同自二焉乃饋槃飧置璧焉又曰莒人伐我東鄙圍台季武子救台遂入鄆取其鍾以為公槃史記曰平原君與楚王合從音縱言利害毛遂謂楚王之左右曰取雞狗馬之血來毛遂捧銅槃血跪進曰當喋血盟而定之又曰武帝作柏梁銅柱承露槃仙人掌蘇林曰仙人以手掌檠槃承甘露也後漢書曰左慈有術於銅槃鈞鯔魚漢官儀曰封禪壇南有玉槃槃中有玉龜焉晉陽秋曰武帝時御府令蕭談承徐循儀疏作漆畫銀槃詔殺之晉四王起事曰惠帝還洛陽道中有老公蒸雞素木槃中盛以奉帝沈約宋書曰高祖儉諸子食不過五盞槃後魏書曰太武帝作黃金槃十二具鏤以白銀鈿以玫瑰珠玉隋書曰上賜王公已下射楊素箭為第一上以外國所獻金精槃價直巨萬賜之荀卿子曰君者槃也水者民也槃圓則水圓槃方則水方燕丹子曰太子出美人能琴者荊軻曰好手太子即斷手以玉槃奉之淮南子曰窺面於槃水則圓於杯水則修面形不變其故有所圓修者皆所自窺之異也抱朴子曰以丹金為槃碗食其中令人長生郭子曰王光祿曰正得殘槃冷炙修復山陵故事曰武帝悼后玄宮漆烏瓦槃一枚東宮舊事曰長槃五漆尺槃三十漆柏炙拌二拌音與槃同漢武內傳曰西王母以玉槃盛桃神異經曰西北荒有金山上有金銀槃廣五十丈搜神記曰高辛氏有老婦人得耳疾醫為桃治得卵大如繭盛以瓠離覆之以槃俄而卵化犬因名槃瓠王子年拾遺録曰董偃以玉精為槃承冰而進則冰玉等色侍者謂冰無柈必融濕席上乃拂之玉盤落於階上冰玉皆碎偃更以為樂玉精干塗國獻也武帝以此器賜董偃又曰漢明帝夜宴群臣於華昭國詔太官進櫻桃以赤瑕瑛為槃賜群臣而去其葉月下視槃與櫻桃共一色衆臣皆笑云是空槃時帝夜坐於庭中欲以承露詔使舉燭復照衆坐乃知槃中不空也皆起拜謝為樂風土記曰越俗飲燕即懿槃為樂取大素圓槃抱以著腹上以右手五指彈之以為節舞者應槃節而作舞鄴中記曰石虎正會御食遊槃兩重皆金銀參帶百二十盞雕飾並同其參帶之間茱萸盡微如破髮近看乃得見動遊槃則圓轉也又曰石虎皇后浴室中雙長生樹又安玉槃受十斛於二樹之間交州雜事曰太康四年刺史陶璜表送林邑王范熊所獻縹紺水精槃各一枚述征記曰逍遙宮門裏有銅浴槃面徑丈二尺魏景初中所鑄妬記曰武歷陽女嫁阮宣子無道妬忌禁婢甌覆槃蓋不得相合神仙傳曰沈義為人所迎見老君以金案玉槃賜之俗説曰桓玄寵丁牛期食畢便回槃與之母丘儉承露槃賦曰偉神槃之殊異邈迢以秀峙古樂府曰琉璃琥珀象牙槃張衡四愁詩曰美人贈我翠琅玕何以報之雙玉槃李尤槃銘曰或以承觴或以受物既與清觴又盛口食蔡雍槃銘曰華槃就用以享嘉賓內丹其實外若玄真陳思王集曰明帝承露槃在芳林園中上槃徑四尺九寸下槃徑五尺銅龍繞其根劉義恭啓事曰恩旨以犀鏤金廁酒杯槃垂賜
