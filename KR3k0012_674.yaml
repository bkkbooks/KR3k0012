body:
  text: 道部十五仙經下玉帝七聖玄記曰舊文有十萬玉言自非上聖莫能意通題崑崙之堂北洞之源又曰崑崙之室北洞之真源廻九乙天霄白簡青籙在其內也本行經曰九都之上金格玉書並題得道人名展轉劫數又曰紫蘭臺瓊文紫字在其中西極明科曰龜山西室王屋南洞天經備足也又曰玉清洞房三氣金章封於玉京紫戶之內又曰玉籙寶章藏紫房九戶之內大洞雌一經云有玄琳玉殿五老鎮生上經藏在其中又曰四極明科封於金闕紫臺又曰華耀景真經祕在九天之上大有之宮金映七寶臺又有三寶玄臺上清隱書祕其中登真隱訣曰上清仙臺金書在其中太極九玄臺碧簡文在其中玄真皇龜臺明堂玄真經在其中又曰崑崙瑤臺西母之宮所謂西瑤上臺天真祕文在其中金書王字上經曰西玄洞臺有金書洞房經又曰骨命已定於玄閣綠字已有生名仙籍故也洞玄經曰有始陽臺在阮樂天中內音書在其上又曰三層玉臺在九天闕之上臺上有太清寶經三百卷及真人學仙簿籙簡目大帝監真玉司郎典之又曰瑤臺者高上帝藏金玄羽章萬神隱音在其內紫書金根經曰凡學者勤尚苦志則玉皇三元東華太上當遣真人授其真經後聖眾真莫不先奏金簡於東華投玉札於上清然後得授大洞真經而或青宮無金簡之籙玉格無玄編之名則神經亦不可得而授也金根經曰開雲鳳之蘊紫錦之囊出紫書真訣玉篇太有經曰帝卿執大洞真經盛以紫玉函又曰太一君執素靈洞玄大有妙經盛以黃玉函又曰大有經金縷玉字以明其篇又曰大有妙經九真科檢校祕於金藏玉匱大洞雌一篇目曰大洞真經在九天之上大有宮太玄靈臺又曰華玉堂仙母金丹在其內奔日月二景隱文曰西玄山下洞臺中有鬱儀結鄰經也王屋山清虛中亦有此經也而不備惟太上玄宮高上臺及蓬萊府北室金柱玉壁刻此並備八素經日太上曰諸學真人而受玄清八素經皆有太帝篇目西華宮有玉簡藻書當為真人者乃得此文也又曰西龜之山玄圃之上積石之陰八素真經在其內龜山元籙曰龜山丹皇飛玄紫文西母常所寶祕其旨隱奧自無仙名不得眄其篇目得者皆九天書籙名題龜山又曰玉華之室丹景玉文在其內飛行羽經曰峨嵋山金臺之室飛玄羽經祕其內又曰太上飛經藏於玉清上宮七映紫臺五寶經曰靈寶紫文祕在九天之上太玄靈臺又曰神州七轉舞天經祕於紫天元臺三元玉檢曰九天三關之門九天龍書三元空洞玉檢飛玄之文刻題其內又曰三玄臺玉檢紫文九天真書在其內又曰西沙方臺上真三元之檢在其中也又曰晨燈之臺飛天檢文在其中明照九天之上又曰金牖臺三元玉檢刻題其中又曰鳳生臺太真金書在其內金簡玉字經曰有洞天陽臺玉佩金璫經在其內洞景金玄經曰自非真仙之名帝圖玉籙者不得聞見此經得見此經者飛仙上清法輪經曰太上玄一真人曰吾昔受無極太上大道君無上八門經道成位加真人此文與元始同生包含天地億劫長存自非仙籙不得妄傳天地綱紀經曰太上玉經隱書皆盛以別笈道跡經曰東井華林堂元洞天中內音玉書置其上大有經曰太玄靈臺玄都九真明科在其內飛龍隱訣曰飛行羽經封之峨嵋山金臺室道學傳曰洞室中有金城玉屋真文所在上清九真中經內訣曰太上宮高上臺有太上玉晨鬱儀奔日赤玉文及太上玉晨結鄰奔月黃景玉章此二經刻以玉簡金字內音玉字經曰內音封於南河洞室石匱之中五符經曰九天靈書封於石匱玉訣經曰南圃丹霍之河三元洞室封題玉匱消魔經曰仙經一藏於荒山觀試凡心也像天地品曰後漢順帝時曲陽泉上得神仙經一百卷內七十卷皆白素朱界青慓朱書號曰太平青道陰行品曰度代君司馬生以白玉板青玉界丹玉字以授吳郡沈羲又曰上清以丹金書之紫金為界三元真一經曰琳霄之室者三元真一之法藏在其中也玉光八景經曰金輝紫殿金真玉光八景經藏其內上清經曰南極藏上清經於瑤臺茅君傳曰金臺者上真內經封其中三道順行經曰南洞之室王君封三道經在其中玄真經曰高玄之妙道玉清之祕篇皆授金名玉字高仙之人九真中經曰奔日月之道太上上清太極九皇四司真人之所寶祕玄元君之玉章也自非有金闕玉名及東華紫字皆不得聞見此鬱儀奔日結鄰奔月二章之篇目三元布經曰南極上上寶祕玉檢之文自無玄名帝圖不得見其篇第也又金羽玄章經此文隱藏不傳於世自無蘭臺丹字不得見聞靈寶真一訣曰洞玄自然經本文出乎太上道也者彌綸無極微妙無形老子曰天下莫柔弱於氣氣莫柔弱於道道之所以柔弱者苞乎天地萬物夫柔之生剛弱之生強而天下莫能知其根本所從生者乎是故有以無為母無以虛為母虛以道為母自然者道之根本也人能以自然為道真則道可得而通也太上經曰道實無形隱為化本經有文字顯為教端師有形言出處為法語默隨時為存為最期至乎道白經與師師經及道號為三寶又云化本有三道經師也大道無形須經為階經文玄妙非凡所知聖降為師示人旨訣老子云道者萬物之奧善人之寶賢者得之以為真寶愚者得之不敢失道道無常術德無常方神無常體和無常容道為中主與靜為友又曰龍景九文紫鳳赤書經舊文藏在大上六合紫房之內天人侍衛其經太微黃書經曰天真三皇藏八會之文於委羽山太微天帝藏一通於龜山其靈書八會字無正形趣究乎奧難可尋詳得為天書自然至真斯八會之氣全五和之音非淺近者所能洞明天真皇人竭其所見注解其意八會多文者生天立地開化人神萬物之本主召九天上帝校定神仙圖籙政天分度安國息民攝制酆都降魔伏鬼勑命水帝召龍上雲論天地劫期辨聖真名氏所理城臺種種因緣廣宣區別五方元精服御求仙化形之法皆演玄妙自然虛無正真妙趣明了具足也又有玉訣者天真上聖述釋天書八會之文以為正音又有靈圖者玄聖表化示以靈變像形述理令物易悟也玉皇譜籙者眾聖紀述聖君名姓宗本繼嗣神官位緒也誡律者玄聖製勑詮量罪福輕重科條防檢過失也威儀自然經者具示齋戒奉法俯仰進止容式軌範節度也方法者眾聖著述丹藥祕要神草靈芝柔金水玉修養之道也術數者明辨思神存真念道齋心虛志遊空飛步飡吸元和導引三光仙度之法也記傳者眾聖載述學業得道成真證果眾事之跡也昇玄經曰太上以靈寶內教經者咸信著萬民乃可傳授奉戒完具內無毀滅賑恤孤弱遠惡修善不求名譽稱毀如一幽僻之處勤行其道使人信之如四時不欺與賢者論議不自專執者可傳授也又有好求勝法從善如流好近賢智無猜疑行聰明而賞別真偽謹慎而言不過行柔弱而無過惡能師勝己而無悖慢重其師教如貧之得寶尊奉師長而不辭勤勞請益之心夙夜不懈如此之類方可授經又曰有上清列紀經者得為太極仙人益能誦之者遂為上清之君也有玉清隱書者旦夕當致真仙論道講妙有四極明科經者則玉帝遣五方神兵左右三官檢制靈文靈寶經曰元始洞玄靈寶赤書五篇真文者於元始之先空洞之中天地未根日月未光幽幽冥冥無祖無宗靈文闇藹乍存乍亡二儀待之以分太陽待之以明靈圖革運玄象推遷乘機應運於是存焉天地得之而分判三景得之而發光靈文鬱秀洞映上清發乎始青之天而色無定方支勢曲折不可尋究元始鍊之於洞陽之館冶于飛火之庭鮮其正文瑩發光芒洞陽氣赤故號赤書天寶之以致浮地祕之以致安五帝賞之以得鎮三光乘之以高明上聖奉之以致真五岳從之以得靈天子得之以致治國享之太平寔靈文之妙德摽天地之玄根威靈恢廓普加無窮蕩蕩大化為神明之宗其量莫測巍巍太空生天立地開化神明上謂之靈施鎮五岳安國長存下謂之寶靈寶玄妙為萬物之尊又曰太上八威策文今靈寶五符後有一符名太上八威策以制虎豹山精也太上隱書金真玉光經即太上玉晨傳也素靈洞玄大有妙經即西王母傳也玉佩金璫太極金書即扶桑大帝君傳也飛行羽經即中央黃老君傳也太宵隱書瓊文玉章即太帝傳也凡諸傳並有真經或人高而法下或術重而位輕此傳雖有新法以黃庭內經為主是為太極經也赤丹金精石景水母經此似紫文照日精法天皇象符以合元氣黃書赤界長生之要洞真玄經曰無太一金閣五星隱籙後聖七符空山石函丹臺章玄黃五行天母抱圖者皆不得聞見至道也洞真經曰玉室者三九素語玄丹上化三真洞元之道藏於內又曰高上藏三元玉撿三元布經於其內曲室者太微天帝君祕九丹上仙文之所也元始五老又祕五篇真文於其內又曰東海青華小童治玉革青宮內其東殿架上有寶經三百卷玉訣九千篇主學仙簿籙應為真人者授之玉晨監仙侍郎典之又曰玄靈臺五老寶經及玄母八門金臺玄丹三真洞元之經藏其內又曰九天關臺上有上皇太真高帝玉名及後聖真人簿籙太虛玉晨監典之太洞玉經曰玉晨延以金華之堂太上書以明玉之札又曰龍山是玉清天中高臺名也天帝玉字在其中又曰萬華宮有上帝寶經玉清隱書大洞經曰有玄雲羽室黃老元君經封在其中又曰黃老元君經封在素瑤臺及北寒金臺又曰有聞風玉臺惣司學道仙籍又曰雌一玉檢祕在九天之上大有之名太玄靈臺又曰有混成玉堂大洞真經在其中又曰大洞真經者三五之祕號真道之至精三一之極章並玉清之禁訣高上之祕篇也又太上九真明科經云大洞真經雌一寶經素靈妙經三奇之章高上玉皇寶篇祕在九天之上大有之宮太玄靈臺玉房之中也三籙者眾經之端也金籙黃籙玉籙也夫靈寶經者有內外外教雜教隨人所悟說之不必盡言也趣令前人受悟為限也內教者真一妙術發自內心行善得道非從外來若道可假外而得者便應以道授至真不變湛然常存也三皇經者玉清洞真上清洞玄太清洞神又太極隱注寶訣經云受三洞經當絕人事而行之也惣三洞名太上洞一高上之經矣大洞真經或曰太真道經或曰太清上道觀天內經上清之高旨極真之微辭飛仙之妙經也靈寶經或曰洞玄或云太上昇玄經曰皆高仙之上品虛無之至真大道之幽贊也三皇天文或云洞神或云洞仙或云太上玉策此三洞經符道之綱紀太虛之玄宗上真之首經矣豈中仙之所聞哉又金籙簡文經曰三洞寶經自然天文也又太上太真科經云大化始立人風真淳故三寶度三品人洞神名仙寶之道接三皇之世洞玄名靈寶之道明三才度五帝之世洞真名天寶之道紀清正之方濟三代之後又太上倉元經云三洞經者洞真上清也洞玄靈寶也洞神三皇也又靈書經曰元始以龍漢之年撰十部經告西母曰太上紫微宮中金格玉書靈寶真文篇目有妙經其篇目今以相示皆刻金為字書於玉簡題其篇目於紫微宮南軒太玄都玉京山亦具記其文道君列紀曰若三元宮有珠札青書者則紫腦錦舌北為仙相也
