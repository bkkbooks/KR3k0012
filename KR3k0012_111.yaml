body:
  text: 皇王部三十五唐高宗天皇大帝唐書曰高宗天皇帝諱治太宗第九子也母曰文德順聖皇后長孫氏以貞觀二年六月生於東宮之麗正殿五年封晉王七年遙授并州都督幼而岐嶷端審寬仁孝友初授孝經於著作郎蕭德言太宗問曰此書中何言為善對曰夫孝始於事親中於事君終於立身君子之事上也進思盡忠退思補過將順其美臣救其惡太宗悅曰行此足以事父兄為臣子矣及文德皇后崩晉王時年九歲哀慕感動左右太宗屢加慰撫由是特深寵異尋拜右武候大將軍十七年皇太子承乾廢魏王泰亦以罪黜太宗與長孫無忌房玄齡李世績等計議立晉王為皇太子太宗每視朝常令在側觀決庶政或令參議太宗數稱其善十八年太宗將伐高麗命太子留鎮定州及駕發有期悲啼纍日因請飛驛遞表起居并遞勑垂報並許之及軍旋太子從至并州時太宗患疽太子親吮徂兗切之扶輦步從數日二十三年五月己巳太宗崩六月甲戍皇太子即皇帝位時年二十二詔大赦天下內外文武賜勳官一級永徽元年春正月辛丑朔上不受朝詔改元景午立妃王氏為皇后二年春正月戊戍詔曰去歲關輔之地頗弊蝗螟音冥天下諸州或遭水旱百姓之間致有罄乏此由朕之不德兆庶何辜矜物罪已載深憂惕今獻歲肇春東作方始糧廩或空事資賑給其遭蟲水處有貧乏者量以正義倉賑貸五年春三月戊午幸萬年宮辛未曲赦所經州縣繫囚以工部尚書閻立德領丁夫四萬築長安羅郭八月大理奏決死囚揔總有七十餘人六年九月庚午尚書右仆射禇遂良以諫立武昭儀貶授潭州都督乙酉洛州大水毀天津橋冬十月己酉廢皇后王氏為庶人立昭儀武氏為皇后大赦天下七年正月辛未廢皇太子忠為梁王立代王弘為皇太子壬申大赦改元為顯慶元年五月己卯太尉長孫無忌進史館所撰梁陳周齊隋五代史志三十卷五年八月庚辰蘇定方等討平百濟面縛其王扶餘義慈國分為五部郡三十七城二百戶七十六萬以其地分置熊津等五都督府麟德元年三月辛亥展大射禮十二月景戍殺西臺侍郎上官儀戊子庶人忠坐與儀交通賜死二年十月司禮太常伯劉常道上疏請封禪癸亥高麗王高藏遣其子福男來朝丁卯將封泰山發自東都是歲大稔米㪷五錢牟音牟麥不列于市麟德三年春正月戊辰朔車駕至泰山頓是日親祀昊天上帝於封祀壇以高祖太宗配饗己巳帝升山行封禪之禮庚午禪於社首祭皇地祇以太穆太皇太后文德皇太后配饗皇后為亞獻越國太妃燕氏為終獻辛未御降禪壇壬申御朝覲壇受朝賀改麟德三年為乾封元年正月景戍發自泰山甲午次曲阜縣幸孔子廟追贈太師增修祠宇以少牢致祭其褒聖侯德倫子孫並免賦役二月己未次亳州幸老君廟追號曰太上玄元皇帝創造祠堂改谷陽縣為真源縣縣內宗姓特給復一年夏四月甲辰車駕至自泰山先謁太廟而後入庚寅改鑄乾封泉寶錢冬十月己酉司空英國公績為遼東道行軍大揔管以伐高麗三年二月戊寅以明堂制度歷代不同漢魏以還彌更訛舛遂增損古今新制其圖下詔大赦改元為總章元年二月戊寅幸九成宮九月癸巳司空英國公績破高麗拔平壤城擒其王高藏及其大臣男建等以歸境內盡降其城一百七十上元二年三月丁巳天后親蠶於邙山之陽時帝風疹不能聽朝政事皆決於天后自誅上官儀後上每視朝天后垂簾於御座後政事大小皆預聞之內外稱為二聖帝欲下詔令天后攝國政中書侍郎郝處俊諫止之調露元年十月單于大都護府突厥阿史德溫傅及奉職二部相率反叛二年八月甲子廢皇太子賢為庶人幽於別所乙丑立英王哲為皇太子改調露二年為永隆元年大赦天下二年閏七月庚申上以服餌令皇太子監國景寅雍州大風害稼米價翔踊是月裴行儉大破突厥史伏念之衆伏念為程務挺急追來降行儉於是盡平突厥餘黨行儉執伏念振旅凱旋永淳二年春正月甲午朔幸奉天宮遣使祭嵩嶽少室箕山具茨等山西王母啓母巢父許由等祠十一月丁未自奉天宮還東都上疾甚宰臣巳下並不得謁見十二月丁巳詔改永淳二年為弘道元年將宣赦書上欲親御則天門樓氣逆不能上馬遂召百姓於殿前宣之禮畢上問侍臣曰民庶喜否曰百姓蒙赦無不感悅上曰蒼生雖喜我命危篤天地神祗若延吾一兩月之命得還長安死亦無恨是夕帝崩於貞觀殿時年五十六諡曰天皇大帝廟號高宗文明元年八月葬于乾陵天寶十三載改諡曰天皇大弘孝皇帝則天皇后唐書曰則天皇后武氏諱明空并州文水人也父士彠憂縛切隋大業末為鷹楊府隊正高祖行軍於汾晉每休止其家義旗初起從平京城貞觀中纍遷工部尚書荊州都督封應國公初則天年十四時太宗聞其美容止召入宮立為才人及太宗崩遂為尼居感業寺大帝於寺見之復召入宮拜昭儀時皇后王氏良娣蕭氏頻與武昭儀爭寵互讒毀之帝皆不納進號宸妃永徽六年廢王皇后而立武宸妃為皇后高宗稱天皇武后亦稱天后后素多智計兼涉文史帝自顯慶已後多苦風疾百司表奏皆委天后詳決自此內輔國政數十年威勢與帝無異當時稱為二聖弘道元年十二月大帝崩皇太子顯即位尊天后為皇太后既將篡奪是日自臨朝稱制嗣聖元年春正月甲申朔改元二月戊午廢皇帝為廬陵王幽于別所仍改名哲己未立豫王輪為皇帝令居於別殿大赦天下改為文明皇太后仍臨朝稱制庚申廢皇太孫重照為庶人九月柳州司馬徐敬業殺楊州長史陳敞之舉兵移檄天下左玉鈐衛大將軍李孝逸討平之垂拱四年五月皇太后加尊號曰聖母神皇秋七月大赦天下八月壬寅博州刺史琅琊王冲據博州起兵命左金吾大將軍丘神績為行軍揔管討之庚戍冲父豫州刺史越王貞又舉兵與冲相應九月命內史岑長倩鳳閣侍郎張光輔左監門大將軍麴崇裕率兵討之景寅斬貞及冲等傅首神都改姓為虺音卉氏曲赦博州韓王元嘉魯王靈夔元嘉子黃國公撰音選靈夔子左散騎常侍范陽王藹霍王元軌及子江都王緒故虢王元鳳子東莞音管公融坐與貞通謀元嘉靈夔自殺元軌配流黔州撰等伏誅改姓虺氏自是宗室諸王相繼誅死者殆將盡矣其子孫年幼者咸配流嶺外并誅其親黨數百餘家載初元年春正月神皇親享明堂大赦天下依周制建子月為正月改十二月為臘月改舊正月為臺月大酺三日神皇以曌字為名遂改詔書為制書秋九月革唐命改國號為周改元為天授大赦天下乙酉加尊號為聖神皇帝降皇帝輪為皇嗣景戍立武氏七廟追尊神皇父士彠為孝明皇帝證聖元年春正月加尊號曰慈氏越古金輪聖神皇帝大赦天下改元大酺七日二月上去慈氏越古尊號秋九月親祀南郊加尊號天冊金輪聖神皇帝大赦天下改元為天冊萬歲大辟罪已下及犯十惡常赦所不原者咸赦除之大酺九日萬歲登封元年臘月甲申上登封于嵩嶽大赦天下改元大酺九日丁亥禪于少室山聖歷元年正月親享明堂大赦天下改元大酺九日三月召廬陵王哲於房州九月景子廬陵王哲為皇太子令依舊名顯大赦天下神龍元年春正月大赦改元上不豫制自文明元年已後得罪人除楊豫博三州及諸逆魁首咸赦除之癸卯麟臺監張易之與弟司僕卿昌宗謀反皇太子率左右羽林軍桓彥范敬暉等以羽林兵入禁中誅之甲辰皇太子監國大赦天下是日上傳皇帝位于皇太子徙居上陽宮戊申皇帝上尊號曰則天大聖皇帝冬十一月壬寅則天將大漸遺制祔廟歸陵令去帝號稱則天大聖皇后是日崩于洛陽宮之仙居殿年八十三諡曰則天大聖皇后祔葬于乾陵中宗孝和皇帝唐書曰中宗孝和皇帝諱顯高宗第七子母曰則天順聖后顯慶元年十一月生於長安明年封周王授洛州牧儀鳳二年徙封英王改名哲授雍州牧永隆元年章懷太子廢其年立為皇太子弘道元年十二月高宗崩皇太子即帝位皇太后臨朝稱制改元嗣聖元年二月皇太后廢帝為廬陵王幽於別所其年五月遷於均州尋徙居房陵聖曆元年召還東都立為皇太子依舊名顯時張易之與弟昌宗潛圖逆亂神龍元年鳳閣侍郎張柬之鸞臺侍郎崔玄暐音韋左羽林將軍敬暉右羽林將軍桓彥範司刑少卿袁恕己等定策率羽林兵誅易之昌宗迎皇太子赦天下鳳閣侍郎韋承慶正諫大夫房融司禮卿崔慶等下獄甲辰命地官侍郎樊忱音諶往京師告陵廟乙巳則天傳位於皇太子景午即皇帝位於通天宮大赦天下唯易之黨與不在原限二月甲寅復國號依舊為唐社稷宗廟陵寢郊祀行軍旗幟服色天地日月等字臺閣官名並依永淳已前故事甲子立妃韋氏為皇后大赦天下詔九品以上及朝集使極言朝政得失兼舉賢良方正直言極諫之士景龍三年十一月乙丑親祀南郊皇后登壇亞獻左僕射舒國公韋巨源為終獻大赦天下四年五月丁卯前許州司兵參軍燕欽融上書言皇后干預國政安樂公主武延秀宗楚客等同危宗社帝怒召欽融庭見撲殺之時安樂公主志欲皇后臨朝稱制而求立為皇太女由是與后合謀進鴆六月壬午帝遇毒崩于神龍殿年五十五祕不發喪皇后親揔庶政立溫王重茂為皇太子甲申發喪于太極殿宣遺制皇太后臨朝大赦天下改元為唐隆丁亥皇太子即帝位時年十六皇太后韋氏臨朝稱制大赦天下常赦所不原者咸赦除之內外兵馬令諸親王掌仍令韋溫揔知時召諸府折衝兵五萬人分屯京城列為左右營諸軍子姪分統之庚子夜臨淄王諱舉兵誅諸韋諸武皆梟首於安福門外韋太后為亂兵所殺九月丁卯上諡曰孝和皇帝廟號中宗葬定陵天寶十三載二月改諡曰大和大聖大昭孝皇帝睿宗玄真皇帝唐書曰睿宗玄真皇帝諱旦高宗第八子中宗母弟龍朔二年六月己未生於長安其年封殷王遙領冀州大都督單于大都護右金吾衛大將軍及長謙恭孝友好學工草隸尢愛文字訓詁之書乾封元年徙封豫王總章二年徙封冀王上初名旭輪至是去旭字上元二年徙封相王拜右衛大將軍儀鳳三年遷洛州牧改名旦徙徒封豫王嗣聖元年則天臨朝廢中宗為廬陵王立豫王為皇帝仍臨朝稱制及革命改國號為周降帝為皇嗣令依舊名輪徙居東宮其儀一比皇太子聖曆元年中宗自房陵還帝數稱疾不朝請讓位於中宗則天遂立中宗為皇太子封帝為相王又改名旦授太子右衛率長安中拜司徒右羽林衛大將軍自則天初臨朝及革命之際王室屢有變故帝每恭險退讓竟免于禍神龍元年以誅張易之兄弟功進號安國相王遷太尉加寶封其年立為皇太弟固辭不受景龍四年夏六月中宗崩韋庶人臨朝引用其黨分握政柄忌帝望實素高潛謀危害庚子夜臨淄王與太平公主子薛崇簡前朝邑尉劉幽求長上果毅麻嗣宗宮苑揔監鍾紹京等率兵入北軍誅韋溫紀處訥宗楚客武延秀馬秦客葉靜能趙履溫楊均等諸韋武黨與皆誅之辛丑帝挾少主御安福門樓慰諭百姓大赦天下其日王公百寮上表咸以國家多難宜立長君以帝衆望所歸請即尊位甲辰少帝詔曰叔父相王高宗之子昔以天下讓于先帝孝友寬簡彰信兆人神龍之初已有明旨將立太弟以為嗣君為王懇辭未行冊命所以東宮虛位至于歷年撤綴涉衛切在辰禍變倉卒然後稱制計立沖人欽奉前懷願遵理命上申先聖之旨下遂蒼生之心俯稽國緯之文仰峻祖宗之烈起今日請叔父相王即皇帝位朕退守本藩歸于舊邸凡百卿士敬承朕言克贊我天人之休期光我有唐之勳業布告遐邇咸使聞知相王上表讓曰臣以宗社事重國家情深誅鋤巨逆奉戴嗣主今承制旨猥推宸極在臣虛薄不敢祗膺循環震驚無任感哽制答曰皇極大寶天下至公王者臨之蓋非獲己王先聖舊意蒼生推仰龍光紫宸實允係望請遵前旨勿或讓推於是少帝遜于別宮是日即皇帝位御承天門樓大赦天下景雲三年春正月辛未朔親謁太廟癸酉上始釋慘七慘切服御正殿受朝賀甲戌并汾絳三州地震壞人廬舍辛巳親祀南郊戊子躬耕籍田己丑大赦天下改元為太極二月丁亥皇太子釋奠於國學追贈顏回為太子太師曾參為太子太保每年春秋釋奠以四科弟子及會參從祀列于二十三賢之上八月庚子帝傳位于皇太子自稱曰太上皇帝五日一受朝于太極殿自稱曰朕三品已上除授及大刑獄並自決之其處分事稱誥令皇帝每日受朝於武德殿自稱曰豫三品已下除授及徒罪並令決之其處分事稱制勑甲辰大赦天下改元為先天二年秋七月甲子太平公主與左僕射竇懷貞侍中岑羲等謀逆事覺皇帝率兵誅之窮其黨與太子少保薛稷左散騎常侍賈膺福右羽林將軍李慈李欽中書舍人李猷中書令崔湜尚書左丞廬藏用太史令傅孝忠僧惠範等皆誅之兵部尚書郭元振從上御承天門樓大赦天下自大辟罪已下無輕重咸赦除之翌日太上皇誥曰朕將高居無為自今後軍國刑政一事已上並取皇帝處分開元四年夏六月甲子太上皇帝崩于百福殿時年五十五諡曰大聖真皇帝廟曰睿宗冬十月葬于橋陵天寶十三載改諡曰玄真大聖大興孝皇帝
