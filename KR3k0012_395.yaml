body:
  text: 人事部三十五行易困卦曰臀無膚其行趑趄毛詩谷風曰行道遲遲中心有違遲遲舒行貌又黍離曰彼黍離離彼稷之苗行邁靡靡中心搖搖又載驅曰汶水湯湯行人彭彭又我行其野曰我行其野蔽芾其樗昏姻之故言就爾居又蟋蟀枤杜曰獨行蝺蝺禮記仲尼燕居曰行則有隨行而無隨則亂於塗也又王藻曰君與尸行接武尊者尚徐蹈半迹大夫繼武迹相及也士中武迹間容迹端行頤霤如矢辨行剡剡起屨凡行容惕惕直疾貌也凡行謂道路也左傳襄五曰衛獻公使與寧喜言寧喜告蘧伯玉伯玉曰瑗不得聞君之出敢聞其入遂行從近關出論述而曰子曰三人行必有我師焉史記曰伍子胥曰為我謝申包胥吾日暮途遠吾故倒行而逆施之譬如人行前塗尚遠日勢已暮救在顛倒疾行何得責吾順行禮漢書曰袁盎使吳見守從史適在守盎校為司馬司馬曰君第去臣亦且亡辟吾親君何患乃以刀決帳盎解節旄履步行七十里著屐步行而逃亡吳書曰孫策討山越斬其渠帥悉令左右分行逐賊獨騎與虞翻相得山中翻曰危事也令策下馬此草深卒有警急馬不及人翻善用矛請在前行得平地勸策乘馬策曰卿無馬奈何答曰翻能步行日可三百里明府試鞭馬翻能疏步屬之東方朔別傳曰武帝問朔曰公孫丞相倪大夫等先生自視何與此哉朔曰臣觀其臿齒牙樹頰胲音改吐脣吻擢項頤結股肱連脽音誰居逶蛇其迹行步偊旅臣朔雖不肖尚兼此數子神仙傳曰黃盧子者姓葛名越年二百八十歲行及走馬王真者上黨人也年十七八乃學道服食胎息之術行及走馬力兼數人河上公者莫知其姓名也又能行及走馬頭上常有五色氣高丈餘孔安者魯人也行氣服鉛舟有陳和者樂安人也重之求事安遂受其方合藥服之二百餘年頭色轉黑氣力百倍行及走馬也列仙傳曰沈建者丹陽人也世為長史建獨好導引服食之術一日行五百里能舉千斤葛仙公別傳曰孫堅欲害仙公馳馬往遂見仙公徐行逐之不及步釋名曰徐行曰步步捕也如有所司捕務安詳也爾雅曰堂下謂之步禮記王制曰古者以周尺八尺為步今以周尺六尺四寸為步又祭義曰故君子跬步而弗敢忘孝也漢書曰息夫躬曰胸奴飲馬於渭水邊境雷動四野風起京師雖有武螽音鋒精兵末有能窺左足而先應者也窺音跬半步曰跬步也言一舉足也又曰蔡義河內溫人也以明經為給事大將軍幕府家貧常步行禮不逮衆門下好事者相合為義置犢車令乘之又曰蓋寬饒為人剛直高節家貧俸祿數千半以給吏人為耳目為司隸常步行續漢書曰李固少有俊才雅志好學為三公子常躬步行驅驢負書從師范曄後漢書曰楊震轉涿郡太守子孫常蔬食步行魏志曰崔林字德儒清河東武城人也除鄢陵長家貧無單車匹馬步行之官莊子曰壽陵餘子學步於邯鄲未得其能失其故步匍匐而歸以此效彼兩失之白虎通曰人踐三尺法天地人也再舉足為步備陰陽也郭子曰王丞相拜司空廷尉作兩角髻葛裙柱杖臨路邊窺之歎曰人言阿龍超導小名赤龍阿龍故自超不覺步至臺門方言曰半步為跬世説曰阮宣子常步行以百錢桂杖頭至酒店上便獨酌酣暢趨説文曰趨低頭疾行也赴直行也釋名曰疾行曰趨趨赴也赴所斯也毛詩魚藻曰綿蠻黃鳥止于丘隅豈敢憚行畏不能趨禮記曲禮曰遭先生於道趨而進正立拱手不與之言則趨而退又曰帷薄之外不趨堂上不趨執玉不趨論語鄉黨曰沒階趨進翼如也爾雅曰門外謂之趨漢書曰上欲自擊陳豨周昌泣曰始皇攻破天下未曾自行今上行是無人可使者乎上以為愛我賜入殿門不趨又曰萬石君諸子入里門趨至家走釋名曰疾趨曰走走奏也促有所奏至禮記玉藻曰凡君召以三節二節以走一節以趨節所以明信也使使召臣急則持三緩則持一周禮曰鎮圭以檄守其餘未聞也如今漢使者持之節左傳僖下曰衛叔武將沐聞君至而喜捉髮走出前驅射而殺之又昭七年曰荀躒以晉侯之命唁公且曰寡君使躒以君命討於意如意如不敢逃死君其入也公曰君惠顧先君之好施及亡人將使歸糞除宗祧以事君則不能見夫人己能見夫人有如河夫人謂季孫也荀躒掩耳而走公羊傳定公曰陽虎竊寶玉而走又哀公曰齊景公謂陳乞曰吾欲立舍何如陳乞曰君欲立臣請立之陳乞欲言不可恐景公殺陽生陽生曰吾聞子將不立我也陳乞曰吾不立子者所以生子也與之玉節而走之節信也折王與陽生為後當迎之爾雅曰中庭謂之走史記曰周昌常入奏事高帝方擁戚姬昌還走帝逐得騎昌項問曰我如何主也昌仰曰桀紂主也東觀漢記曰上降頴陽雖得入意不安門下有擊馬著鼓者馬驚硠音郎磕音搕鄧晨起走出視之乃馬也魏略曰曹真字子丹沛郡人本姓秦養曹氏或云其伯父南宿與太祖善共平袁術部黨與太祖相攻劫太祖出為寇所追走入秦氏伯南開門受之寇問所在答云我是寇遂害之由此太祖思其功遂變其姓江表傳曰陸遜破劉備於夷陵備捨船步走燒皮鎧以斷道使挽車走入白帝晉書曰陳安字虎侯驍壯果毅武幹過人多力善射持七尺刀貫甲奔及馳馬又曰唐彬字儒宗魯國鄒人也少便弓馬好遊獵身長八尺走及奔鹿強力絶人後魏書曰伊馛扶拂切代人也少而勇健走及奔馬善射多力曳牛卻行趙書曰劉靈陽平人也年二十餘常廝役於縣走及馳馬前秦録曰符堅大敗為流矢所中遁走甚飢民有進壺飧豚髀者堅食之大悅隋書曰麥鐵杖始興人也驍勇有膐力日行五百里走及奔馬每以漁獵為事不治産業吳越春秋曰慶忌僚子也勇為人所聞走及奔馬吳氏春秋曰今與俱走則人不勝驥矣居其車上則驥不勝人又曰有莘氏女子採桑得嬰兒於空桑之中獻之其君令養之察其所以然曰其母居伊水之上孕夢神告曰臼出水而東走千里邑盡為水身化為空桑故命之曰伊尹戰國策曰昔曾參處費魯人有與曾參同姓名者殺人人告其母曰曾參殺人曾參母投杼踰墻而走楚漢春秋曰淮陰武王反上自擊之張良居守上體不安臥轀車中行三四里留侯走東追上簪墮被髮及轀車排戶曰陛下即棄天下欲以王葬乎以布衣葬乎上罵曰若翁天子也何故以王及布衣葬乎良曰淮南反於東淮陰害於西恐陛下倚溝壑而終也莊子曰藏舟於壑藏山於澤謂之固矣然則夜半有力者負之走而昧者不知荀卿子曰伯禽將歸國周公謂之曰君子力如牛不與牛爭力走如馬不與馬爭走智如士不與士爭智淮南子曰漁者走淵木者走山又曰躄者見虎不走非勇也又曰飛不以尾挫尾則飛不能遠走不以手縛手則走不能疾抱朴子曰檸木實之赤者餌之一年老者少昔道士梁須年七十服之年百三十歲能夜讀書走及馬檸丁呂切又音褚世説曰鍾會撰四本論始畢甚欲使嵇公見一置懷中既詣定畏其有難不敢相示因出戶遙擲面便走俗説曰桓公豹奴善騎乘亦有極快馬時有一諸葛郎自云能走與馬等桓車騎以百匹布置埒頭令豹奴乘與諸葛竟走先至者得布便俱走諸葛常與馬齊欲至埒頭去布三丈許諸葛一跳坐布上遂得之魯女生別傳曰魯女生長樂人也少好學道初服餌胡麻乃求絶穀八十餘年日更少壯面如桃花日行三百里走及獐鹿跳釋名曰跳條也如草木枝條務上行也左傳僖下曰魏犨束胸見使者曰以君之靈不有寧也距躍三百曲踊三百距躍超越也曲踊跳踊也崔鴻十六國春秋前趙録曰劉翌驍幹過人能一手舉殿柱跳過平陽門出神仙傳曰壺公者不知何許人也從遠方來賣藥得錢與飢凍者常懸一壺於坐上日入後跳入壺市掾費長房於樓上見之知非常人身為掃除并進餅餌公令房共跳入壺中但見樓觀重門侍者數十人蹲王隱晉書曰王長文字德睿州辟別駕不就追求之乃於成都賣熟市見長文蹲地齧胡餅州知不屈乃送還家山海經曰大荒之外有大人之堂有一大人踆其上張其兩臂踆古蹲字郭璞遊仙詩曰安見山林士擁膝對巖蹲王褒僮約曰奴入市不得夷蹲旁臥惡言醜罵
