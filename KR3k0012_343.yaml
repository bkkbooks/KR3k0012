body:
  text: 兵部七十三劍上釋名曰劍撿也所以防檢非常也又斂也以其在身拱時斂在臂內也其旁鼻曰鐔音尋鐔尋也帶所貫尋也其末曰鋒末之言也韻集曰鐔音覃劍口也方言曰鞘音肖謂之室説文曰韜謂之衣亦曰襓襓音繞字林曰璏直例反劍鼻也禮記曰武王克商後散軍而郊射左射狸首右射騶虞而貫革之射息也禆冕搢笏而虎賁之士脫劍又曰進劍者左首尊也又曰受弓劍以袂敬也周禮曰周官桃氏為劍臘廣二寸有半寸臘謂兩刃音臘兩從半之劍脊兩殺趍鍔者以其臘廣為之莖圍長倍之莖謂劍天人之所握以上中其莖設其後謂從中以却稍大之身長五其莖長重九鋝音刷謂之上制上士服之身長四其莖長重七鋝謂之中制中士服之身長三其莖長重五鋝謂之下制下士服之今之上首也各以形貌大小帶之士勇士也又曰鄭之刀宋之斤魯之削吳越之劍遷乎其地而弗能為良地氣然也左傳曰初虞叔有玉虞叔虞公之弟虞公求旃弗獻既而悔之曰周諺有之匹夫無罪懷壁其罪吾焉用此以賈害也乃獻之又求其寶劍叔曰是無厭無厭將及我遂伐虞故虞公出奔洪池洪池地名又曰莒子庚輿虐而好劍茍鑄劍必試諸人國人患之又將叛齊烏存帥國人以逐之烏存莒大夫也又曰吳公子光伏甲於掘室而享王掘地為室王使甲坐於道及其門門階戶席皆王親也夾之以鈹羞者獻體改服於門外進羞者獻體解衣也執羞者坐行而入執鈹者夾承之承執羞者也光偽足疾入法掘室恐難作王黨殺已豫避之也專諸置劍魚中以進遂殺王又曰吳將伐齊越子率其衆以朝吳人皆喜唯子胥懼曰是豢吳也吳王聞之使賜之屬鏤以死屬鏤劍也又曰楚太子建為鄭人殺之其子勝在鄭晉人伐鄭楚救之與之盟勝怒曰鄭人在此讎不遠矣勝自厲劍子平見之曰王孫何以自厲也曰將以殺汝父也又曰宋殺申再楚子聞之劍及寢門之外怒也家語曰子路戎服見孔子拔劍舞之曰古之君子以劍自衛子曰古之君子忠以為質仁以為衛不出環堵之室而知千里之外有不善則以忠化之寇暴則以仁圉之何必持劍子路曰由乃得聞此言也請攝齊以受教又曰顏回曰願鑄劍戟為農器戰國策曰韓卒之劍皆出於冥山棠溪墨陽宛馮龍泉太阿皆陸斷馬牛水擊鴻鴈當敵於甲盾耳此天下名器也國語曰齊桓公問曰齊國寡甲兵為之若何管子曰小罪謫以金美金以鑄劍戟試諸狗馬惡金以鑄鉏夷試諸壤土乃甲兵大足也史記曰吳季札之初使北過徐君好季扎劍口弗敢言季扎知之為使上國未獻還至徐徐君已死乃解其寶劍繫徐冢樹而去從者曰徐君已死當誰豫乎曰不然始吾心已許之豈以死背吾心哉又曰平原君及毛遂與楚合從言其利害日出而言日中不決遂按劍而上請平原君曰從者利害兩言而決耳令日出而言日中不決何也楚王謂平原君曰客何為者也平原君曰是勝之舍人也楚王叱之胡不下吾乃與君言汝何為者也毛遂按劍而前曰今十步之內王不得恃楚國之衆也王之命懸於遂且遂聞湯以七十里之地而王天下文王以百里之壤而臣諸侯今楚地方五千里持戟百萬此霸王之資也白起小豎子耳率數萬之衆興師以與楚戰一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人此百世之怨而趙之所羞而王弗知惡合從者為楚非為趙也吾君在前叱者何也諸侯乃定從又曰范睢傳云秦昭王臨朝歎息應侯進曰臣聞主憂臣辱主辱臣死今大王中朝而憂臣敢請其罪王曰吾聞楚之鐵劍利而倡優拙夫鐵劍利則士勇倡優拙則思慮遠夫以遠思慮而御勇士恐楚之圖秦也又曰李斯上書云今陛下服太阿之劍乘纖離之馬此數寶者秦不生一焉又曰陳平間行杖劍亡渡河船人見其美丈夫獨行疑其亡將腰中當有金寶目之欲殺平平恐乃解衣裸而佐刺船船人知無有乃止又曰鄒陽上書梁王云臣聞明月之珠夜光之璧以暗投人於道路人無不按劍相眄者何則無因而至前也又曰高祖送徒驪山夜徑澤中令一人行前行前者還報曰前有大蛇當徑願還高祖曰壯士行何畏乃前拔劍斬蛇又曰高祖置酒雒陽宮曰吾有三傑而能用之故吾以布衣提三尺劍取天下也項羽有一范增而不能用所以為吾擒也又曰高祖擊英布時為流矢所中高祖問醫曰病可治於醫曰可治於是高祖慢罵之曰吾以布衣提三尺劍取天下此非天命乎命乃在天雖扁鵲何益又曰伍員奔吳船人濟之員感其德解寶劍賜之船人曰子達吳勿相忘劍則不敢以當又曰魏相為丞相好武皆令諸吏有奏事者帶劍而前奏或有不帶劍者入奏事乃借錯劍而方敢入又曰荊軻衛人之燕燕人謂之軻卿軻卿好讀書學擊劍以術説元君元君不用又曰司馬相如好讀書學擊劍故母名曰犬子漢書曰雋不疑字曼倩渤海人治春秋為郡文學進退必以禮名聞州郡武帝末暴勝之為直指使者衣繡衣素聞不疑賢至渤海遣吏請與相見不疑冠進賢冠帶擂具劍應劭曰擂具摽首之擂磊落壯大之貌又曰時中國初定尉他平南越回王之高祖使中大夫陸賈賜他印為南越王王賜賈橐中裝千金賈有五男乃出所使橐中裝賣千金分其子子二百金賈常乘安車駟馬從歌鼓瑟侍者十人寶劍直百金謂其子曰與汝約過汝汝給人馬酒食極歡十日而更約所死家得寶劍其遊漢庭名聲籍甚言狼籍甚盛也又曰朱博奏王莽為庶人莽就國南陽太守以莽貴重選門下掾孔休守新都伯休謁見莽莽盡禮自納休亦聞其名莽後疾休候之莽緣恩意進其玉具劍欲以為好休不肯受莽因見誠見君面有瘢美玉可以滅瘢休復辭讓莽曰君嫌其價耶遂椎碎自裹以進休乃受之又曰朱雲曰臣願請上方斬馬劍斷佞臣一人首上問誰對曰安昌侯張禹上怒又曰龔遂為渤海太守務農勸人賣劍買牛曰可為佩牛乎又曰沛公從百餘騎見羽於鴻門羽因留沛公飲范增數目羽擊沛公羽不應范增起出謂項莊曰君王為人不忍汝入以劍舞因擊殺之莊入為壽壽畢曰軍中無以為樂請以劍舞因拔劍起舞項伯亦起舞常以身翼蔽沛公獲免又曰孝景帝賜衛綰曰先帝賜臣劍凡六不敢奉詔上曰劍人之所施獨亦至今乎綰曰具在上使取六劍尚盛未嘗服之也又曰質氏以治削而鼎食注治刀劍也又曰王莽使武賁以斬馬劍挫音銼董忠又曰梁冀帶劍入省尚書張凌呵叱令出冀跪謝凌不應因劾奏詔以一歲俸贖罪楚漢春秋曰上過陳留酈生求見使者入通公方洗足問如何人曰狀類大儒上曰吾方以天下為事未暇見大儒也使者出告酈生瞋目按劍入言高陽酒徒非儒者也後漢書曰韓稄為尚書令與僕射郅壽尚書陳寵同時俱以才能稱肅宗嘗賜諸尚書劍唯此三人特以寵劍自手署其名曰韓稜楚龍泉晉太康記曰汝南西平縣有龍泉可淬刀劍特堅利汝南即楚分野也郅壽蜀漢文陳寵濟南椎成椎音宜追切漢官椎成作鍛成時論者為之説以稜深有謀故得龍泉壽明達有文章故得漢文寵敦朴善不見外故得椎成謝承後漢書曰延熹中詔應奉曰蠻夷叛逆作難積惡放恣鑊中之魚火熾湯盡當急燋爛以刷國恥朝廷以奉昔守南土威名播越故復式序重任奉之廢興期在於今賜奉錢十萬駮犀方具劍金錯把刃劍革帶各一奉其勉之又曰吳郡張業字仲叔為郡門下掾逐太守歸鄉里至河內遇賊業拔劍與賊交戰而死子武時幼不識父傷父喪不還每至節日持業遺劍至河內到業死處醊祭悲哀感動路人東觀漢記曰世祖十三年王國有獻名馬寶劍直百金馬以駕鼓車劍以賜騎士又曰馮石襲母公主封獲嘉亦為侍中稍遷衛尉能取悅當世為安帝所寵帝嘗幸其府留飲十數日賜駮犀具劍紫艾授玉玦各一又曰建武二年遣馮異西擊赤眉平關中上自河南賜異乘輿七尺玉具劍又曰光武有駭犀之劍以賜陳遵魏志曰文帝為太子時與鄧展飲酣論及劍術不決時方食甘蔗因以習之下殿數交三中其臂魏略曰嚴翰字公仲器性重厚篤好擊劍魏氏春秋曰魏武過城皋故人呂伯奢伯奢不在家人為供王聞其食器聲疑其圖己夜手劍殺八人既見食飲而悽愴曰寧我負人無令人負我吳書曰太史慈臨亡歎息曰丈夫生世當帶七尺之劍以升天子之階今所志未從奈何而死乎權甚悼惜之晉書曰上公九命則劍履上殿又曰張軌遣主簿令狐亞聘南陽王模甚悅遺軌以帝所賜劍謂軌曰自隴已西征伐斷割悉以相委如此劍矣又曰武庫火歷代之寶孔子履漢高斬白蛇劍王莽頭皆失所在張華見龍劍排戶而飛去又曰何攀除兗州刺史錫班劍赤舄又曰王如初聚衆作逆敗王敦弟稜愛驍武請敦配麾下稜甚加寵遇如數與敦將角射鬥爭為過稜杖之如甚以為恥初敦有不臣之迹稜每諫之敦常怒異色乃密使人激怒如勸令殺稜因稜間晏如請劍儛為勸稜從之如於是儛刀為戲漸來前稜惡而呵之不止遂直前斬稜敦聞而佯驚亦捕如誅之又曰張華傳吳之未滅也斗牛之間常有紫氣道術者皆以吳方強盛未可圖也唯司空張華以為不然及吳平之後紫氣愈明華聞豫章人雷煥妙達緯象乃要煥宿屏人曰可共尋天文知將來吉凶因登樓仰觀煥曰僕察之久矣唯牛斗之間頗有異氣華曰是何祥也煥曰寶劍之精上徹於天耳華曰君言得之吾少時有相者言吾年出六十位登三事當得寶劍佩之斯言效歟因問曰在何郡煥曰在豫章豐城華曰欲屈君為宰密共尋之可乎煥許之華大喜即補煥豐城令煥到縣掘獄屋基入地四丈餘得一石函光氣非常中有雙劍並刻題一曰龍泉一曰太阿其夕斗牛間氣不復見焉煥以南昌西山北巖下土以拭劍光芒艷發大盆盛水置劍其上視之者精芒炫目遣使送一劍并土與華留一自佩或謂煥曰得兩送一張公豈可欺乎煥曰大朝將亂張公當受其禍此劍當繫徐君墓樹耳靈異之物終當化去不永為人服也華得劍寶愛之常置坐側華以南昌土不如華陰赤土報煥書曰詳觀劍文乃干將也莫邪以復不至雖然天生神物終當合耳因以華陰土一斤致煥煥更以拭劍倍益精明華誅失劍所在煥子華為州從事持劍行經延平津劍忽於腰間躍出墮水使人沒水取之不見劍但見兩龍各長數丈蟠縈有文章沒者懼而返須臾光彩照水波浪驚沸於是失劍華歎曰先君化去之言張公終合之論此其驗乎華之博物多此類又曰載記云劉曜自以形質異衆恐不容于俗隱迹管涔山以琴書為事嘗夜間居二童子入跪曰管涔王使小臣奉謁趙皇帝獻劍一口置前再拜而去以燭視之劍長二尺光澤非常赤玉為室背有銘云神劍服御除衆毒曜遂服之劍隨四時變為五色崔鴻後趙録曰張賓闊達有大節嘗自謂昆弟曰吾自言智笇鑒識不後張子房但不遇高祖耳勒與諸將下山東賓曰吾歷覽諸將獨胡將軍可與共成大事者乃提劍軍門大呼請見宋書曰初世祖嘗賜謝莊寶劍莊以與豫州刺史魯爽別後爽反叛世祖因宴集問劍所在答曰昔以與魯爽別竊為陛下杜郵之賜上甚悅當時以為知言梁書曰天監五年廬陵太守王希聃於高昌縣獲銅瑞劍二口以聞曰薄伐凶醜而龍淵耀質胸奴將滅白旗表徵又曰七年會稽太守衡陽王元簡上言餘姚縣掘地得劍二口又於縣東江水中得劍一口文漫若雌雄又曰羊侃初為尚書郎以勇聞魏帝嘗謂曰郎官謂卿為虎豈羊質虎皮乎試作虎狀侃因以手抉殿柱沒指魏帝壯之賜以珠劍三國典略曰侯景篡位遷豫章王揀別宮白虹貫日三重其夜月入太微掩帝坐景所帶劍水精標無故墜落景身自俯拾心極惡之五代周史曰鄭仁誨字日新晉陽人父霸纍贈太子太師仁誨幼事唐驍將陳紹光紹光恃勇使酒嘗乘醉抽佩劍將剚刃於仁誨左右無不奔避唯仁誨端立以俟略無懼色紹光因擲劍於地謂仁誨曰汝有此器度必當享人間富貴
