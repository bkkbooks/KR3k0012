body:
  text: 咎徵部四雲周禮春官曰眂祲掌十輝之法以觀妖祥四曰監八曰敘鄭司農曰監雲氣臨日也敘者雲有次敘如山在日上也又曰保章氏以五雲之物辨吉凶水旱降豐荒之祲象鄭玄曰物色也視曰旁氣雲之色降下也知水旱所下之國鄭司農曰以二至二分觀雲色青為蟲白為喪赤為兵荒黑為水春秋傳曰凡分至咎閉必書雲物為備故也京房易妖占曰天無雲雲自出且有兵出邑且有水如帚如鳥其下有兵洪範五行傳曰雲者起於山彌於天雲陰也王者失中臣下咸蔽君不明則雲陰衆多蔽天光有雲如衆謂風師法有大兵呂氏春秋曰亂國之主衆邪之所積其雲狀有若犬若馬若白鵠若衆軍其狀若人蒼衣赤首不動其名天衝其狀若懸旌而赤其名曰雲旌有狀衆馬以鬥其名曰渭春秋潛潭巴曰雲氣沐沐不濁賢人去位小人得祿東觀漢記曰二公圍昆陽正晝有雲直營而隕不及地而散吏皆壓佐袁山松後漢書曰中平四年雲氣如足相次重疊彌天國志曆曰晉咸和元年七月雲鬥聲如暴風雨五色雲宋書曰前廢帝景平二年有雲五色如錦其年五月司空徐羡之廢帝為滎陽王青雲河圖曰青雲刺月五穀不熟傍多赤雲如人頭大戰月旁有白雲如杵者三貫月六十日內有兵戰月始出有黑雲貫名激雲不出三日暴雨黃雲崔鴻十六國春秋曰後趙石勒建平四年有赤黃雲如幕長數十匹其年勒死又曰冉閔永興三年有雲黃赤色起東北長百餘丈是歲閔為慕容雋所殺春秋運斗樞曰勢集於后族群妃之黨僣黃雲四合女訛驚邦春秋感精符曰妻黨翔則黃雲入國候今冬至日見雲黑有水雲赤白如人頭懸鏡之狀禍流赤雲左傳曰哀公六年有雲如衆赤鳥夾日而飛三日楚昭王使問周太史太史曰其當王身乎若禜之可移於令尹司馬王弗禜策而卒孔子曰楚昭王知天道矣不失國宜哉黑雲趙書曰石虎建武四年東南卒有雲黑稍分為三匹又貫日日沒後分為七枚相去數十丈其間有白雲如魚鱗虎子韜曰當有刺客後果為太子宣所殺氣釋名曰祲祲也赤黑之氣相侵也周禮曰春官眂祲掌十輝之法以觀妖祥一曰祲鄭司農云祲陰陽氣相侵也左傳曰昭公十五年春將褅于武公戒百官梓慎曰禘之日其有咎乎吾見赤黑之祲非祭祥也喪氣也其在蒞事乎二月祭貞禘叔弓蒞事籥入而卒春秋運斗樞曰赤人刺房赤人賊氣而刺房房在王之明堂火星也呂氏春秋曰亂國之王其氣有豐上斂下有若水之狀有若山之狀春黃夏黑秋蒼冬赤崔鴻十六國春秋北涼録曰玄始十一年春正月饗群臣于謙光殿沮渠蒙遜曰南方有惡氣經天暴兵衆也不出一旬必有寇問命治兵東苑以備之西秦遣騎七千來襲至縣孫猴嶺聞有備而還三輔舊事曰漢作靈臺以四孟之月登臺而觀黃氣為疾病赤氣為兵黑氣為水也白氣漢書曰哀帝建平元年有白氣從地至天出參下貫太廟廣如匹布長十餘丈哀帝陰病候也續漢書曰孝和永元十六年四月丁未紫宮中生白氣如粉絮占為喪又曰孝靈嘉平二年八月辛未白氣如匹練衝北斗第四星占為大戰明年冬楊州刺史臧旻攻盜賊於建康斬首數千級蜀李書曰哀帝即位有白氣二道帶天望氣者言宮中有伏兵果為卭都公所害也晉書曰懷帝永嘉三年十二月有白氣如帶自地升天南北各二至五年石勒劉曜王彌皆寇洛陽帝蒙塵于平陽劉聰封帝為會稽公又曰成帝咸和元年後蜀李雄玉衡二十四年雄死太子班立有白氣如帶經天太史占有陰謀班不悟為李期所殺宋書曰文帝元嘉二十六年十二月夜有白氣貫於北斗屬子地至明年魏太武至瓜步江陳書曰文帝天嘉五年六月夜有白氣兩道出于北斗東南屬子地後年四月帝崩太子伯宗立廢為臨海王又曰宣帝太建五年二月夜有白氣貫于北斗紫宮屬于地至明年北齊兵至于江隋書曰蕭吉煬帝嗣位拜太府少卿行經華陰見楊素家上有白氣屬天密言於帝帝問其故吉曰其後素家當兵禍絶滅之象改葬可免帝後謂玄感曰公家宜改葬玄感亦微知其故以為吉祥託以遼東未滅不遑私門之事未幾玄感以反族誅赤氣漢書曰成帝永始三年二月癸未夜東方有赤白色氣大三四圍長二三丈索索如樹南方有大樹四五圍下莖十五餘丈皆不至地讖占曰東客之變氣狀如樹木以此知四方欲動者明年十二月己卯尉氏男子楚並等謀反庚子山陽讖官亡徙蘇令等為大賊一日有兩氣同時起而並令等同月而俱發又曰王莽建國四年夏赤氣出東南竟天明年二月元帝王皇后崩後漢書曰獻帝興平末年夜有赤氣貫紫宮明年改元建安政歸曹氏晉書曰惠帝大安二年赤氣竟天又永興二年十一月夜有赤氣竟天其年十二月成都王頴攻洛陽又曰懷帝永嘉元年正月天氣晝赤氣有聲如雷明年劉元海僣位宋書曰文帝元嘉七年十一月西北有赤氣中黑如旌旗至八年滑臺為魏軍圍糧盡城中燻鼠而食之後魏書曰莊帝永安三年十一月己丑有赤氣如霧從顯陽殿階西南角斜屬廊高一丈連地如絳紗自未至戍不滅帝見而惡之隋書曰周靜帝大定元年有赤氣起西方東行遍天下七月隋公堅禪又曰隋大業末越王侗東都留守為王世充所幽世充自立為丞相百官惣已於尚書省受册設樂文武陪位於廳西有赤氣如絳慢自辰至戌而滅旬日世充乃殺朝士元文都盧楚遂篡位黑氣史記曰周靈王二十年有五黑氣如日至景王五大夫爭權後漢書曰靈帝光和元年六月有黑氣墮所御溫德殿庭十月皇后宋氏廢至中平元年巨鹿人張角稱黃巾帥部三十六萬同反叛宋書曰明帝太始二年二月夜有黑氣五東西經天南行隋書曰梁元帝承聖三年六月有黑氣如龍見殿內其年元帝為西魏所擒又曰陳廢帝臨海王時十月日入時有黑氣如雲入日中其年見廢雨史記曰夏桀末年大雨水俄為湯所放京房易妖占曰雨鳴瓦任威武大臣專檀霖雨壞道尚書洪範咎徵曰狂恆雨若君行妄則常雨左傳曰莊公十一年秋宋大水公使吊焉曰天作淫雨害於粢盛若之何不吊對曰孤實不敬天降之災又以為君憂拜命之辱春秋繁露曰木有變則春多雨此徭役衆賦斂重故也京氏別對災異曰人君擅私恩恣意縱情不與臣下同謀即致偏雨夜墮也不救致苦雨降萬民愁勞水絶道其救也興公道無私黨此災消矣漢書曰文帝後三年秋大雨晝夜不絶三十五日流殺民家新垣平謀反之徵又曰昭帝時秋大雨自七月至十月時帝幼霍光專政又曰成帝時秋大雨四十餘日時王氏舉宗在朝之應又曰哀帝時夏大雨雹又冬大風雨雹其年郡國四十一雨水明年京師及郡國又四十一雨水海賊張伯路與平原劉文光等攻厭次殺令長又曰王莽地皇中赤眉殺太師羲仲莽遣太師王匡討之莽兵出東都門外天大雨沾衣長安父老歎曰是為軍泣時百姓飢荒莽令煮草為酪不可食重於煩費又曰四年六月光武兵至昆陽莽使司徒王尋司空王邑將兵百萬圍之會天大風飛屋瓦雨下如注二公兵亂敗自相殘殺滍水為之不流後漢書曰靈帝時夏京師大雨水其秋中常侍曹節矯詔誅太傅陳蕃將軍竇武遷太后於北宮至後年京師又雨水暴出其年竇太后崩是苦雨之應也又曰獻帝初平初董卓逼帝入長安將入宮日大雨晝昏卓殺太傅袁隗太僕袁基及男女宗族五十餘人又曰獻帝時夏大雨水時曹操殺皇后伏氏又曰獻帝末司徒王允殺董卓卓將李傕郭汜攻陷長安殺戮甚衆乃收卓尸葬於郿葬日大風雨雨水從藏溢漂卓棺出於穴俄而傕汜皆被殺續漢書曰建光元年京都及郡國二十九淫雨傷稼是時羌反久未平百姓屯戍不解愁苦又曰桓帝延熹二年夏霖雨五十餘日是時大將軍梁冀秉政又曰靈帝建寧元年夏霖雨六十餘日是時大將軍竇武謀廢中官其年九月長樂五官史朱瑀等共中常侍曹節起兵闕下武敗追斬武兄弟死者數百人魏志曰明帝時大雨殺鳥雀時帝居喪不哀出入弋獵故有恆雨為罰之變晉書曰元帝時大雨四十餘日晝夜雷電時王敦興兵王師敗續又曰成帝時頻年大雨恆雷時蘇峻餘黨猶據石頭帝幼權在臣下也齊書曰明帝時王敬則為大司馬拜日大雨洪注文武失色敬則後竟被誅崔鴻十六國春秋曰後趙石勒將寇鄴霖雨三月不止王師敗季龍于臣靈口赴水死者五百餘人勒軍大飢相食又曰石勒元年大霖雨滂沱泛溢衝山陷谷巨松僵拔東至于海原隰之間皆如山積後文騫擊勒孔萇大敗而歸後又霖雨中山暴水流漂巨木百萬後有季龍篡奪之事隋書曰魏靜帝時大雨七十餘日後元瑾荀濟劉思逸謀殺齊文宣不遂咸被誅又曰北齊武成清河年大雨晝夜不息數十日山東大水人多餓死是年胸奴來寇并州又曰後主大統三年積陰大雨時太后淫亂也隋書曰文帝仁壽元年夏驟雨震雷大風拔木宜君湫水移於始平明年獨孤后崩唐書曰則天長安四年九月霖雨兼雪凡陰一百五十餘日至神龍元年正月五王誅二張孝和反正方見晴霽又曰德宗貞元二十一年順宗風病王叔文用事連月陰雨不霽乃以憲宗為皇太子制出日即晴傳所謂皇之不極厥罰恆陰皆此類也無雲而雨春秋感精符曰失陽事則無雲而雨宋均注曰四月純陽用事失陽故無雲而雨也河圖祕徵曰主急妄怒失陽事則主無雲而雨京氏別對災異曰無雲暴雨何人君封拜無功進無德則致不雲而暴雨過惡暴楊誅反受罪密雲而不雨其救也誅疆恤弱信及兆民雲雨時也隋書曰梁武帝時雨自七月至十月是時頻年興師士卒疲弊又曰元帝承聖中湘州賊陸納推李洪雅為王羽儀器甲甚精徒黨勇鋭時天日晴明初無雲霧軍發之際忽然風雨時人謂為軍泣百姓竊言知其敗也元帝命竟陵太守王僧辨討平之京房曰若出軍之日無雲而雨此天泣軍沒不還雨不沾衣名曰鬼泣其軍必敗抱朴子曰無雲而雨是為雨血將軍當揚兵講武以應之大雨軍中甚必無功雨土京房易傳曰內淫亂百姓勞苦則天雨土此小人將起是謂黃生目土失其性則雨塵土沙灰皆土之類尚書中候曰夏桀無道山亡土崩殷紂時十日雨土於毫紂竟國滅伏侯古今注曰漢武帝元朔四年雨土又曰昭帝始元二年雨土晝昏又曰元帝建昭四年雨土梁書曰武帝大同元年雨土二年又雨黃塵如雪攬之盈掬時帝溺於佛法興造尤甚後魏書曰世宗景明四年涼州雨土如霧時舅尚書令高肇專政俄而被殺隋書曰隋文帝開皇二年京師雨土四年關中亂飢諸王各謀為逆時內營都邑後起仁壽宮丁匠死者太半雨沙隋書曰梁簡文時雨黃沙時侯景陵上其年人相食雨灰隋書曰梁武大同年雨灰色黃時帝惡人勝己又信佛法捨身為奴蔽賢絶道後有侯景之亂雨血戰國策曰齊湣王三十一年侵伐鄰國窮兵極武外怨於諸侯內失於百姓燕將樂毅連五國兵以伐之湣王出走楚使淖齒救齊淖齒謂王曰夫千乘博昌間地方數百里雨血沾衣嬴博之地坼及至泉有人當闕而哭求之不得去則又聞其聲王悉知之乎王曰不知淖齒曰天地人皆以告矣而王不知何得無誅遂殺湣王以與燕鬥而敗漢書曰惠帝時宜陽雨血一頃時諸呂用事殺三皇子建立非嗣退大臣王陵趙堯周昌后崩大臣共誅滅諸呂僵尸流血之應又曰哀帝時山陽雨血廣三尺長五尺大者如錢小者如麻後二年王莽擅朝誅貴戚丁傅董賢用事晉書曰惠帝永康元年三月尉氏雨血明年正月趙王倫篡位遷帝於金墉城其後天下大兵禍流王室崔鴻十六國春秋曰前趙劉聰建元元年十二月雨血於左司隸寺覆地其月又雨血東宮延明殿徹瓦在地者深五寸二年四月雨血於東宮其年十二月又雨血於東宮廣袤頃餘麟嘉元年二月雨血東宮其月又雨血於光極殿來年雨血平陽廣袤十里其月聰死劉璨為靳淮所殺又曰後趙石遵時雨血周遍鄴城俄為石鑒冉閔所廢閔遂滅石氏誅胡人又曰南燕慕容超將敗東萊雨血俄而國亡又曰後蜀李勢末年天雨血俄降於桓溫也隋書曰文帝時突厥雍閭可汗境內雨血三日俄而為隋師所滅唐書曰高祖武德初突厥處羅可汗欲侵中夏會天雨血三日乃止而處羅疽發而死雨肉後漢書曰桓帝時廉縣雨肉似羊肺大如手時梁冀專政盜賊攻掠明年梁大后崩冀亦敗魏志曰公孫淵將亡襄平北市生肉長圍各數丈有頭目口喙無手足而動搖占曰有形不成有體無聲其國滅亡其年司馬宣王討平之晉書曰愍帝建興元年十二月河東雨肉劉石擁兵帝竟沒遇害崔鴻十六國春秋曰前趙劉聰時有流星起于牽牛入紫宮龍形委曲蛇行光照地落于平陽北十里視之則肉臭聞平陽長三十步旁常有哭聲墨子曰殷紂滅年天雨肉其年為周武王所滅雨毛京房曰邪進賢退前樂後憂金失其性則雨毛也漢書曰武帝時天雨白毛明年又雨之時征役繁興戶口凋散晉書曰武帝時蜀雨白毛益州刺史皇甫晏為牙門張弘謀害隋書曰文帝開皇六年京師雨毛如馬尾長者二尺餘六七寸其月梁士彥宇文欣劉昉以謀反誅明年發十萬人築長城又於楊州開山造瀆以通運衆役繁興雨毛之應雨冰漢書曰桓帝時京師雨冰其年皇后梁氏崩梁冀與妻自殺崔鴻十六國春秋曰涼張駿二年九月雨冰狀若絲纊皆著草雨花隋書曰文帝仁壽年在仁壽宮頻天雨花大者徑寸小者如榆莢又曰毛州天雨金銀花遍四十餘里雨草京房曰君吝祿信衰厥妖雨草火失其性則草妖漢書曰元帝時雨草而葉相摎結大如彈丸時帝外氏權盛京房曰國破亡若雨孽人主殃又曰平帝時雨草狀如元帝時王氏專政至於莽乃篡位政在私門之家宋書曰明帝太始四年雨草于宮明年魏侵青州殺太守雨穀史記曰梁惠成王八年雨黍于齊京房曰雨五穀人相食又曰燕丹囚於秦天雨粟於燕後秦滅之後漢書曰光武末陳留雨粟形如稗實雨魚漢書曰成帝時雨魚長五寸已下時王氏專政崔鴻十六國春秋曰後蜀李期末年大雨魚於宮中其色黃其年為李壽廢殺之又曰夏赫連勃勃鳳翔元年五月雨魚于統萬時興役尤甚雨螽史記曰魯文公三年雨螽劉向以為宋殺大夫而無罪有暴虐賦斂之應雨錢廣五行記曰後魏宣武景明年海陵人黃尋家貧忽風雨錢飛至家後巨富錢數萬其後被誅雨水銀隋書曰文帝仁壽四年八月仁壽宮內再雨水銀又陝州雨水銀奏高祖高祖知非祥其年太子逆殺漢王諒舉兵天下將亂之應雨金史記曰晉惠公二年雨金至六年秦穆公涉河伐晉雨續宋書曰孝武大明七年會稽雨續委於山澤續如麻紵脆似地毛至八年大餓橫尸原野雨原宋書曰文帝元嘉十七年七月張仲舒晨夕輒見門側有赤氣赫然空中忽雨絳羅於庭中廣七八分長五六寸皆以箋紙繫之紙廣長與羅等紛紛甚駛舒惡而焚之舒經宿暴死
