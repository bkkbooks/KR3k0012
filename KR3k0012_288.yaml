body:
  text: 兵部十八機略六宋書曰武帝遣將朱齡石伐譙縱於蜀帝曰往年劉敬宣黃武無功而退賊謂我今應從外水往而料我當出其不意猶從內水來也如此必重兵守涪城音浮以備內道若向黃武正墮其計今以大衆自外水取成都疑兵出內水此制敵之奇也而慮此聲先馳賊審虛實別有亟書全封付齡石署其邊曰至白帝乃開諸軍雖進未知處分所由至白帝發書曰衆軍悉從外水取成都臧喜出於中外漢廣使羸弱乘高艦十餘由內水向黃武衆軍乃倍道兼行譙縱果備內水使其大將譙道福以重兵戍涪城遣其將侯耀譙詵等率衆萬餘屯彭摸夾水為城齡石至彭摸諸將以賊水北城險衆多咸欲先攻其南城齡石曰不然雖寇在北今屠南城不足以破北若盡鋭以拔北壘南城不麾而自散也遂攻北城詰朝戰至日昃焚其樓櫓四面並登斬侯耀譙詵仍回軍以麾南城即時散潰又曰劉道濟為益州刺史政刑失中群盜蜂起攻圍州城道濟將裴方明出東門破賊三營斬首數百級賊雖敗已復還合方明復偽出北門回擊城東大營殺千餘人時天大霧方明等復揚聲出東門而潛自北門出攻城西諸營賊衆大潰於是奔散又曰柳元景為隋郡太守既至而蠻反斷驛道欲攻郡郡內力少糧杖又乏元景設方略得六七百人乃分五百人屯驛道或曰蠻將逼城不宜分衆元景曰蠻聞郡遣重戍豈悟城內兵少且表裏合勢於計為長會蠻垂至乃使驛道兵潛出其後戒曰火舉馳進前後俱發蠻衆驚擾投鄖水死者千餘人斬獲數百郡境肅然無復寇抄又曰檀祗為廣陵相亡命司馬國璠兄弟自北徐州界聚衆數百潛過淮因天夜陰暗率百許人緣廣陵城得入叫喚直上廳事祇驚起出門將處分賊射之傷敗却入只密語左右曰賊乘暗得入掩我不備但打五鼓懼明謂曉於是奔散追討盡獲之又曰宗愨征林邑圍區粟城林邑王范陽邁遣將范毗沙達率萬餘人來救愨謂諸將曰寇衆我寡難與爭鋒乃分軍為數道偃旗臥鼓愨潛進令曰聽吾鼓噪乃出山路榛深賊了不為備卒見軍至驚懼退走愨乘勝追討散歸林邑仍攻區粟拔之泛海陵山至八象浦有大渠南來注浦宋師沮渠置陳林邑王傾國來逆沮渠不得渡以具裝被象諸將憚之請待前後軍進然後擊之愨曰不然吾已屠其堅城破其鋭衆我氣方厲彼已破膽一戰可定何疑焉愨以為外國有師子威服百獸乃制其形與象相禦象果驚奔衆因此潰亂愨率兵直度渠奮擊陽邁遁走其衆一時奔散遂剋林邑南史曰蕭齊將魯康祚趙公政衆號一萬侵後魏荊河州之太倉口魏將傅永率三千人擊之時康祚等軍於淮南永舍於淮北十有餘里永量吳楚之兵好夜斫營即夜分兵為二部出於營外又以賊若夜來必應於渡淮之所以火記其淺處永既設伏乃密令人以瓠盛火度淮南岸當深處置之教云若有火起即亦然之其夜康祚公政等果親領兵來斫永營東西二仗夾擊之康祚等奔趣淮水火既竟起不能記其本濟遂覩永所置之火而爭度焉水深溺而死斬首者數千級生擒公政康祚人馬墜淮曉而獲其尸又曰東昏侯以劉山陽為巴西太守配精兵三千使過荊州就行事蕭頴胄以襲襄陽梁武帝時為雍州刺史知其謀乃遣參軍王天獸龐慶國詣江陵遍與州府人書及山陽西上梁武謂諸將曰荊州本畏襄陽又加以脣亡齒寒自有傷弦之急寧不暗同耶我若總荊州之兵掃定東夏韓白重出不能為計況以無笇之昏主哉我能使山陽至荊州便即授首諸君試觀何如及山陽至巴兵梁武復令天獸齎書與頴胄兄弟去後梁武謂張弘策曰夫用兵之道攻心為上攻城次之心戰為上兵戰次之今日是也先遣天獸往州府人皆有書令乘驛甚急止有兩封與行事兄弟云天獸口具及問天獸而口無所説行事不暗相聞不容矯有所道天獸是行事心膐彼聞必謂行事與天獸共隱其事必人人疑山陽惑於衆口必相嫌二則行事進無以自明必恐漏吾謀內是馳兩空亟定一州矣山陽至江安聞之果疑不上頴胃大懼乃斬天獸送首山陽信之將數十人馳入頴胄伏甲斬之送首梁武以州歸又曰梁武帝發雍州東下雍州今襄陽郡大軍次江寧梁武使呂僧珍與王茂率精兵先登梁武頓於越城呂僧珍猶守白坂齊主東昏將李居士密覘知城中衆少率鋭卒萬人直來薄城僧珍謂將士曰今力既不敵不可與戰可勿遙射須至塹裏當并力破之俄而皆越塹拔柵僧珍分人上城矢石俱發自率馬步三百人出其後守陴者復踰城而下內外齊擊居士等應時奔散三國典略曰侯景叛假韶夾渦而軍潛於上風縱火景衆騎入水出而卻走草濕火不復然梁書曰司州刺史陳慶之率兵圍東魏南荊州東魏將堯雄行臺侯景救之雄曰茍堆梁之北面重鎮因其空虛攻之必剋彼若聞難荊圍自解此所謂機不可失也遂率衆攻之慶之果棄荊州來未至雄陷其城擒梁鎮將茍元廣又曰陳慶之曹仲宗伐後魏之渦陽渦孤和切魏遣將元昭等率兵來援前軍至駝澗去渦陽四十里慶之欲逆戰諸將以賊之前鋒必是輕鋭與戰若捷不足為功如其不利沮我軍勢兵法所謂以逸待勞不如勿擊慶之曰魏人遠來皆以疲倦去我既遠必不見疑及其未集須挫其氣出其不意必無敗理且聞虜所據營林甚盛必不夜出諸君若皆疑惑慶之請獨取之於是與麾下五百騎奔擊破其前軍魏人震恐又曰梁襄州刺史柳仲禮留其長史馬岫守安陸自率步騎一萬寇西魏魏將楊忠帥衆南伐攻梁隨剋之進圍安陸仲禮聞隨郡陷恐安陵不可守遂馳歸赴援諸將恐仲禮至則安陸難下請急攻之忠曰攻守勢殊未可卒拔若引日勞師表裏受敵非計也南人多習水軍不間野戰仲禮回師已在近路吾出其不意以奇兵襲之彼怠我奮一舉必剋則安陵不攻自拔諸城可傳檄而定也於是選騎二千銜枚夜進遇仲禮於漴頭漴音崇水所衝曰漴忠親自陷陳擒仲禮悉俘其衆安陸及竟陵郡如忠所策陳書曰周炅鎮安蘄等州高齊遣將陸騫以衆二萬出自巴蘄與炅戰炅留羸弱輜重設疑兵以當之身率精鋭由間道邀其後大敗騫軍虜獲器械馬驢不可勝數北史曰後魏濟陰王新成頗有武略庫莫奚侵擾詔新成討之新成乃多為毒酒賊逼便棄營而去賊至竟飲遂簡輕騎擊之俘馘甚多又曰梁將趙祖悅率水軍偷據峽石後魏將崔延伯率兵討之延伯夾淮為營遂取車輪去輞削鋭其輻兩接對揉竹為絙揉人久切貫連相屬並十餘道橫水為橋兩頭施大轆轤出沒任情不可燒斫既斷祖悅走路又令舟舸不通梁氏援軍不能赴救祖悅合軍咸見俘虜後魏書曰太武征夏赫連昌於統萬城師次城下收衆偽退昌鼓譟而前會有風雨從東南來沙塵昏冥宦者趙兒進曰今風雨從賊後來我向彼背天助人將士飢渴願陛下避之更待後日崔浩曰是何言歟千日制勝一日之中豈得變易賊前行不止後以離絶宜分軍隱出掩擊不意風雨在人豈有常也帝從之分騎奮擊昌軍大潰又曰雍州刺史蕭寶寅據州反魏大將長孫稚討之軍次弘農副將楊侃曰昔魏武與韓遂馬超挾關為壘勝負之理久而無決豈才雄相類算路抗衡當以河山險阻難用智力今賊守潼關全據形勝縱曹操更出亦無所逞奇必須北取蒲坂飛棹西岸置兵死地人有鬥心潼關之賊必覩風而散諸處既平長安自剋稚曰賊黨薛修義已圍河東薛風賢又保安邑都督宗正珍孫停虞坂久不能進雖有此計猶用為疑侃曰珍孫本行陳一夫因緣進達可為人使未可使人一旦受元帥之任處分三軍精神亂矣寧堪圖賊河東理在蒲坂西帶河湄所部之人多在東境修義驅率壯勇西圍郡邑父老妻弱尚保舊村若卒一臨方寸各亂人人思歸則郡圍自解不戰而勝昭然在目稚從之令其子彥等領騎與侃於弘農北度所統悉是騎士習於野戰未可攻城便據石錐壁侃乃班告曰今且停軍於此以待步卒兼觀人情向背然後行若送降名者各自還村候臺軍舉烽火亦舉烽應之以明降疑其無應烽者即是不降之村理須殄戮賞賚軍士民遂傳相告報未實降者亦許舉烽一宿之間火遍數百里內寶寅將時圍河東不測所以各自散歸長安賊平侃頗有力又曰河北賊葛榮別帥韓樓郝長等有衆數萬屯據薊城遣將侯泉率騎七百討之泉遂廣張聲勢多設供具親以數百騎深入樓境欲執行人以問虛實去薊百餘里值賊帥陳周馬步萬餘泉遂潛伏以乘其背大破之虜其卒五千餘人尋還其馬伏縱令入城左右諫曰既獲賊衆何為復資遣之也泉曰我兵既少不可力戰事須為計以離隙之泉度其已至遂率騎夜進昧且叩其城門韓樓果疑降卒為泉內應遂遁走追擒之又曰河北賊葛榮率衆將向洛陽衆號百萬大將軍爾朱榮率精騎七千馬皆有副倍道兼行東出滏口葛榮自鄴以北列陳數十里箕張而進榮潛軍山谷為奇兵分督將已上三人為一處有數百騎令所在揚塵鼓譟使賊不測多少又以人馬逼戰刀不如棒密勒軍士各齎棒一枚置於馬側至於戰時不聽斬級以棒棒之而已虜沸騰逐北乃分命壯勇所當衝突號令嚴明將士同奮榮身自陷陳出於賊後表裏合擊大破之於鄴擒葛榮又曰傅永守楚王戍蕭齊將裴叔業來攻永令填塞外塹夜伏戰士千人於城外曉而叔業至頓於城東列陳將置長圍永所伏兵於道左擊其後軍破之叔業乃令將佐守所列之陳自率精甲數千救之永上門樓觀叔業南行五六里許便開門奮擊遂摧破之叔業進退失圖於是奔走左右欲追之永曰弱卒不滿三千彼精甲猶盛非力屈而敗直墮吾計中耳既不測我之虛實足喪其膽俘此足矣何假逐之又曰太武帝親征後燕將慕容德于鄴戰前軍敗績德又欲攻之別駕韓𧨳進曰今魏不可擊者四燕不宜動者三魏懸軍遠入利在野戰一不可擊也深入近畿致兵死地二不可擊也前鋒既敗後陳方固三不可擊也彼衆我寡四不可擊也官軍自戰其地一不可動動而不勝衆心不固二不宜動隍池夫修敵來無備三不宜動此皆兵機也深溝高壘以逸待勞彼千里饋糧野無所掠久則三軍糜資攻則衆旅多斃師老釁生詳而圖之可以捷也德曰韓別駕之言良平之策也又曰大將廣陽王元深伐北狄使于謹單騎入賊中示以恩信於是西部鐵勒酋長也列河等三萬餘戶並款附相率南遷廣陽欲與謹至折敦嶺迎接之謹曰破六汗拔陸兵衆不少聞也列河等歸附必來要擊彼若先據險要則難與爭鋒今以列河等餌之當竟來抄掠然後設伏而待必指掌破之廣陽然其計拔陵果來要擊破也列河於嶺上部衆皆沒謹伏兵發賊遂大敗悉收列河之衆也
