body:
  text: 職官部十三吏部侍郎隋書曰陸彥師為吏部侍郎隋承周制官無清濁彥師在職凡所任人頗甄別於士庶論者美之又曰高孝基為吏部侍郎房玄齡杜如晦與選孝基特加賞異後以為知人又曰煬帝以尚書六曹吏部禮部兵部刑部民部工部各置侍郎一人以貳尚書之職唐書曰高季輔為吏部侍郎凡所銓敘時稱允當從幸翠微宮太宗賜金背鏡一面以表其清鑒焉又曰天后以許子儒為天官侍郎儒不以藻飾為意其補官悉委令史勾直時謂勾直曰平配後崔玄暐為之介然自守絕於請謁為職政者所忌轉文昌左丞選司令史乃設齋自慶武太后聞之復拜為天官侍郎又曰席豫為吏部侍郎玄宗謂之曰以卿前為考功職事平允故有此授豫典選六年復有令譽又曰房頴叔拜天官侍郎自其高祖景伯至頴叔四代咸居選部時論榮之又曰韋陟為吏部侍郎常病選人冒名接腳竊授闕員既少取士良難正調者被擠偽集者冒進陟剛腸嫉惡風彩嚴正見選人疑其有瑕按聲盤詰無不首伏每歲皆贖得數百員闕以待淹滯常謂所親曰使陟知銓衡一二年則無人可選矣又曰崔群徵拜吏部侍郎穆宗召見別殿謂群曰我昇儲位知卿為羽翼群曰先帝意元在陛下頃者授陛下淮西節度使臣奉命草制且曰能辨南陽之牘允符東海之賢若不知先帝深旨臣豈敢輕言又曰崔鄲為兵部侍郎本官判吏部東銓事文宗勤於政道每苦選曹訛弊延英謂宰臣曰吏部殊不選才安得摭實無濫可釐革否李石對曰令錄可以啇量他官且宜循舊上曰循舊如配官耳賢不肖安能甄別乃召三銓謂之曰卿等比選令錄如何注擬鄲對曰資敘相當問其為治之術視可否而擬之帝曰依資合得而才劣者何授對曰與邊遠慢官帝曰如以不肖之才治邊民則疾苦可知也凡朝廷求理遠近皆須得人茍非其才人受其弊矣又曰楊纂除吏部侍郎前後典選十餘載銓敘人倫稱為允當然而抑文雅進黠吏觀時任數頗為時論所譏又曰鄧玄挺為吏部侍郎既不稱職甚為時談所鄙又時患消渴病選人因目為鄧渴牓於衢路自有唐巳來掌選之失未有如玄挺者坐此左遷灃州刺史唐新語曰裴行儉為吏部侍郎賞拔蘇味道王勵曰二公後當相次掌鈞衡之任卒如其言又曰韋陟嘗任吏部侍郎有一致仕官敘五品陟判之曰青壇展慶曾不立班朱紱承榮無宜臥拜時人推其強直又曰姜晦為吏部侍郎性聰晤識理體舊制吏曹舍宇悉布棘以防令史與選人交通及晦領選事盡除之大開銓門示無所禁私引致者晦輒知之召問莫不首伏初朝廷以晦改革前規咸以為不可竟銓綜得所賄賂不行舉朝歎伏又曰馬載為吏部侍郎時考功員外劉思立子憲為河內尉思立今日亡明日選人有索憲闕者載深咨嗟以為名教所不容乃書其無行注於集朝廷咸曰真銓綜流品之司可謂振理風俗也其人比出選門為眾目所視眾口所訐趑趄失步揔敘尚書郎漢書曰南宮二十五星應臺郎位故明帝云郎官上應列宿即此也又曰主父偃詣闕上書朝奏暮召人見所言九事其八事為律令其一事諫匈奴上謂曰公等安在何相見之晚乃拜偃為郎中又曰韓信為項羽郎中數干以策而弗用東觀漢記曰樊梵字文高為郎每嘗直事駐車待漏雖在閑署冠劍不解於身每齋祠恐失時張燈俯伏為郎二十三歲未嘗被奏三署服其慎重又曰黃香為尚書郎嘗獨止宿臺上晝夜不離省闥上聞善之又曰陽嘉二年汝南童子謝廉河南趙建年十二各通一經以太學初繕應化而至皆除郎中又曰黃香知古今記群書無不涉獵兼好圖讖天官星氣鍾律曆筭窮極道術京師號曰天下無雙江夏黃童京師貴戚慕其聲名更饋衣物拜尚書郎後漢書曰馮豹拜尚書郎忠勤不懈每事未報常俯伏省閤或從昏至明肅宗聞而嘉之使黃門持被覆豹勑令勿驚由是數加賞賜又曰馮勤除為郎中給事尚書以圖議軍糧在事精勤遂見親識每引進帝輒顧謂左右曰佳乎吏也由是使典諸侯封事勤善量功次輕重國土遠近地勢豐薄不相踰越莫不厭服焉自是封爵之制非勤不定帝益以為能又曰藥崧天性朴忠家貧為郎常獨直臺上無被枕杫杫思漬反謂俎几也方言云蜀漢之郊曰杫食糟糠帝每夜入臺輒見崧問其故甚嘉之自此詔太官賜尚書以下朝夕飡給帷被皂袍又曰桓彬拜尚書郎時中常侍曹節女壻馮方亦為郎彬厲志操與左丞劉歆右丞杜希同好交善未嘗與方共酒食之會方深怨之遂彰言彬等為酒黨事下尚書令劉猛猛雅善彬等不舉正其事節大怒劾奏猛以為阿黨請收下詔獄在朝者為之寒心猛意氣自若旬日得出免官禁錮彬遂見廢又曰王譯為尚書侍郎臺閣議奏常依義據法為三臺之表又曰陳忠䟽曰尚書為王喉舌而諸郎多文俗鮮有雅才每為詔文宣示內外轉相求請也續漢書曰胡廣字伯始舉孝廉試為天下第一旬日拜尚書郎又曰徐防為尚書郎性周密畏慎在臺閣典職十年奏事三世未嘗有過謝承後漢書曰尚書郎舊典秩滿遷令長鄭弘為僕射奏以臺職任尊而賞薄人無樂者請使郎補二千石自此始也又曰方儲為郎中章帝使文郎居左武郎居右儲正位中曰臣文武兼備在所施用上嘉其才以繁亂絲付儲使理儲拔佩刀而斷之曰反經任勢臨事宜然又曰何湯拜郎中守關陽門候上微行夜還湯閉門不納更從中東門入明旦召詣太官賜食諸門候皆奪俸華嶠後漢書曰館陶公主為子求郎不許賜錢千萬明帝謂群臣曰郎官上應列宿非其人則民受其殃又曰竇攸篤學退居舉孝廉為郎世祖會百寮於靈臺得鼠如豹文問群臣攸曰鼮鼠詔曰何以知曰見爾雅詔書如攸言賜帛三百更勑諸王子從攸受爾雅又曰明帝性褊察嘗以事怒郎樂崧崧逕入床下上怒甚疾呼曰郎出郎出崧曰天子穆穆諸侯皇皇未聞人君自起撞郎上乃舍之漢官儀曰尚書郎四人一主匈奴單于營部一主羌夷吏民一主天下戶口土田墾作一主錢帛貢獻委輸又曰尚書郎主作文書起草夜更直五日於建禮門內又曰尚書郎給青縑白綾被以錦被帷帳氈褥通中枕太官供食湯官供餅餌五熟菓實下天子一等級尚書史二人女侍史二人皆選端正從直女侍執香鑪燒薰從入臺護衣奏事明光殿省皆胡粉塗畫古賢人烈女郎握蘭含香趣走丹墀奏事黃門郎與對揖天子五時賜服若郎處曹二年賜遷二千石刺史又曰尚書郎初上詣臺稱守尚書郎滿歲稱尚書郎中三年稱侍郎續漢書百官志曰尚書郎三十六人四百石魏志曰明帝太和四年詔曰世之質文隨教而變兵亂以來經學廢絕後生進趣不由謨典豈朕訓導未洽將進用者不以德顯乎其郎吏學通一經才任牧民愽士課試擢其高第者亟用其浮華不務道本者皆罷退之又曰賈詡字文和武威姑臧人也少時人莫知唯漢陽閻忠異之謂有良平之計察孝廉為郎魏略曰韓宣字景然為尚書郎嘗以職事當受罰已縛束竟杖未行文帝輦過問是誰左右以實對帝曰是子建所道韓宣耶特原之又曰姜維字伯約郡欲表維以為將維家本衣冠不願為將郡因表拜郎中吳志曰張純字元基少厲操行學愽才秀而切問捷對容止可觀擢拜郎中又曰士爕字威彥蒼梧廣信人少遊學京師事頴川劉子奇治左氏春秋察孝廉補尚書郎又曰孫皓降晉賜號歸命侯諸子為王者皆拜郎中晉書曰魏舒字陽元為尚書郎時選郎或有非其人論者欲有沙汰之言舒曰吾即其人也乃幞被遙出同寮素無清議者咸有自愧之色談者莫不詠其高又曰索靖同郡張勃特表靖以才藝絕人宜在臺閣不宜遠出邊塞武帝納之擢為尚書郎又曰樂廣為尚書郎與何晏鄧颺等談講衛瓘見而奇之曰常恐微言將絕今復聞之命諸子造焉謂曰此人之水鏡也每見此人瑩然猶披雲霧而覩青天也又曰索靖子綝字巨秀少有逸群之量靖每曰綝廊廟之材非簡札之用州郡吏不足汙吾兒也舉秀才除郎中嘗報兄讎手殺三十七人時人壯之又曰吳隱之兄坦之為袁真功曹真敗將及禍隱之詣桓溫乞代兄命溫矜而釋之遂為溫所知賞拜奉朝請尚書郎中又曰嵇含言於長沙王乂曰昔魏武每有軍事增置掾屬尚書令陳矯以有軍事亦奏增郎況今都官中騎三曹晝出督戰夜還理事一人兩役內外廢之含謂之各有主師委之大將不宜復令臺僚雜與其門乂從之乃增郎及令史也又曰賈充改為律令以裴楷為定科郎晉中興書曰王彪之字叔虎從伯遵謂曰選官欲以汝達可作諸王佐郎彪曰位之多少既不足計自當任之於時至於超遷是所不願遂為郎又曰王坦之字文度選曹將擬為尚書郎坦之聞曰自過江尚書郎正用第二人何得以此見擬其子國寶好傾側婦父謝安惡之除尚書郎國寶以為中興膏腴之族唯作吏部不作餘曹郎怨之辭不拜晉太康起居注曰故司空王基夙為先帝授任基子冲尚書郎中雖在清途猶未免楚撻其以冲為治書侍御史齊書曰陸惠曉除尚書殿中郎鄰族來相賀惠曉舉酒曰陸惠曉年踰三十婦父領選始作尚書郎卿輩乃復以為慶耶梁書天監元年詔曰自禮闈陵替歷茲永久郎署備員無取職事糠粃文案貴尚虛閑空有趨墀之名了無握蘭之實曹郎可依昔奏事自是始奏事又曰王筠除尚書殿中郎王氏過江以來未有居郎署者或勸不就筠曰陸平原東南之秀王文度獨步江東吾得比蹤昔人何所多恨乃忻然就職又曰劉洽為尚書殿中郎洽兄弟群從遞居此職時人榮之又曰殿中郎缺武帝曰此曹舊用文學且居鴈行之首宜詳擇其人以張緬為之後魏書曰高允為郎二十七年不徙官時百官無祿允恒使諸子樵采自給初尚書竇瑾坐事誅瑾子遵亡在山澤遵母焦沒入縣官後焦以老得免瑾之親故莫有恤者允愍焦年老保護在家積六年遵始蒙赦其篤行如此三國典略曰齊主命百司各列勤惰尚書郎皇甫亮三日不上齊主親詰其故亮對曰一日雨一日病酒齊主以其言實遂優容之令杖脛三十唐書曰韋虛舟家有禮則父子兄弟更踐郎省時稱郎官家又曰趙曄字雲卿鄧州穰人早擅高名在宦途五十年累經貶謫蹇躓備至入仕三十年方霑省官身在郎署子嘗徒步官既散曹俸祿單寡衣食不充以至亡歿撿者為之歎息三輔決錄曰田鳳字季宗為尚書郎容儀端正入奏事靈帝目送之因題柱曰堂堂乎張京兆田郎又曰陳重與其友雷義俱拜尚書郎義以左黜重見義去官亦以病免汝南先賢傳曰陳蕃上書云昔明帝時公主為子求郎不許賜錢千萬左右問之帝曰郎天官也以當敘德何可妄與人耶今陛下以郎比一把菜臣以為反側也又曰屈霸字子卿拜尚書郎當五侯之時貴戚傾天下在朝者莫不慎睫承風子卿終不屈撓王處冲別傳曰處冲為尚書郎外望簡縱若有遺漏然事要機輒執其中中外之間亡所辨明臺閣益歸重之通典曰故事叔父兄弟不許同省為郎官格令不載亦無正勑貞觀二年十一月韋叔謹除刑部員外三年四月韋季武除主爵郎中其年七月韋叔諧除庫部都中太宗謂曰知卿兄弟近在尚書省故授卿此官欲成一家之美無辭稍屈階資也其後同省者甚多近日非特恩除拜即須相廻避抱朴子曰漢末有禰衡者年二十三孔文舉齒過知命身居九列才學冠群名位殊絕始友衡於布衣又薦之於朝以為宜使起家作臺郎世語曰青龍中石苞鬻鐵於長安得見司馬宣王知焉擢為郎又曰曹爽解印綬將出主簿楊綜止之爽不從有司奏綜導爽反宣王曰各為其主宥之為郎桓譚新論曰余年十七為奉車郎中衛殿中小苑西門魏武集選舉令曰國家舊法選尚書郎取年未五十者使文筆真草有才能謹慎典曹治事起草立義又以草呈示令僕訖乃付令史書之耳書訖共省讀內之事本來臺郎統之令史不行知也書之不好令史坐之至於謬誤讀省者之責若郎不能為文書當御令史是為牽牛不可以服箱而當取辯於繭角也魏名臣奏駙馬都尉甄毅奏曰漢時公卿皆奏事選尚書郎試然後得為之其在職自齎所發書詣天子前發省便處當事輕重口自決定或天子難問據案處正乃見郎之割斷材伎魏則不然今尚書郎皆天下之選材伎鋒出亦欲騁其能於萬乘之前宜如故事令郎口自奏事自處當山濤啟事曰雍州久無郎前尚書傅祗坐事免官在職日淺其州人才無先之者不審可復用否又曰皇太子東宮多用雜材為官屬宜令純取清德太子舍人夏侯孝若有盛文德而不長理民有益臺閣在東宮巳久命殿中郎𡙇宜得才學不審孝若可遷此否陸機謝吳王表曰殿中以臣為郎中命轉中兵郎復以頗涉文學見轉為殿中郎
