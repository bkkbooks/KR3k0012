body:
  text: 道部十七冠真誥曰有一老人著繡裳戴芙蓉冠倚赤九節杖而立芙蓉冠即禮之爵弁粗欲相似但不知真人以何物作之耳自非已成真不得冠此又曰遠遊冠桐柏真人戴此冠女真已笄者亦戴冠惟西王母首戴玉勝又女真未笄者則三環角結或飛雲編結餘髮垂兩肩至腰中也龍冠金精巾虎巾青巾虎文巾金巾此天真冠巾之名不詳其製又曰男真冠真並飛天交結道學傳曰王母二玉女侍王母上殿戴太真晨纓之冠履玄瓊鳳文之舄又曰孟景翼字輔明義嘉構難景翼星夜往赴經行失道時一人黃衣黃冠在其前引路既得道乃失所在海空經曰真仙道士並戴玄冠披翠帔太真科曰解褐披絳綃之衣釋巾著遠遊之冠又曰人皇著七寶珠冠上清經曰元始皇上丈人戴紫曜之冠佩九色自然之綬又曰高靈九天建金華七曜之冠又曰王真九天丈人建飛精百變之冠佩九元道真之策又曰上三天玉童建三華寶曜洞天玉冠四明科曰凡脩上清道經大洞真經入宣之日當身冠法服又曰凡女子學上清之法受寶經玉訣脩行大洞皆元君夫人之位入宣之曰當冠元君之服萬真束帶玉童玉女各二十人其掌法服無此服不得升於上清洞神經曰受道之人皆玄冠草履傳授經曰老子去周左慈在魏並葛巾單裙不著褐又曰陸先生云對上下接謂之俯仰之格披褐二服也又云冠戴二儀衣被四象故謂之法服道學傳曰西母結大華之髻戴太真晨纓之冠履玄瓊鳳文之舄上清變化經云紫映玉霄真玉建華夫冠帶交金之鉤又曰上皇玉靈君建七曜華冠佩舟文紫綬又曰皇上帝君建七色朱精華冠又曰太素高虛上極紫皇建七寶冠帶神精交蛇之綬又曰虛明紫蘭中元高嵉君建三華之冠帶流金紫章又曰太素真君建紫晨巾乘青龍紫羽蓋玉珮金璫經曰元始天王披九色離羅之帔帶寶冠又曰太帝建七氣朱冠又曰太岳君建三寶九光夜冠又曰華山君建六元通神飛冠佩交靈之綬又曰嵩高君建中元黃晨玉冠佩黃神中皇之章又曰玉佩帝君建紫冠真誥曰上元夫人服赤霜袍披青毛錦裘頭作三角髻散髮至於腰戴元晨夜月之冠帶六山火玉之佩腰鳳文琳華太綬執流黃揮精之釰上清變化經曰太元真人巾芙蓉冠上清元籙曰九天元父戴寶天之冠太上五帝內真經曰青帝君建九天通天冠又曰赤帝君建三氣玄梁寶冠又曰白帝君建七氣明光寶冠又曰黑帝君建五氣玄晨之冠又曰黃帝建黃晨通天冠佩黃晨越元之策帶靈飛紫綬太上飛行羽經曰九晨君建飛精玉冠衣九色之鳳帔又曰元晨君建飛天玉冠衣九龍天衣又曰蓋晨君建三晨寶冠衣丹錦飛裳又曰上晨君建玄精玉冠衣玄羽飛裳又曰華晨君建飛晨寶冠衣青羽飛裳太上飛行羽經曰靈妃元皇夫人建晨纓寶冠昇玄經曰仙人定子著黃褐玄巾大洞玉訣曰皇初紫元天中真人披朱錦之服巾綠霞之冠山西經曰玉女建白冠洞神經曰天皇君戴九元冠地皇君戴二晨玉冠執元皇定籙策人皇君戴七色冠執上皇保命玉策又曰上清瓊宮南極玉真赤帝君建進賢之冠又曰北極玉真黑帝君建玄寶之冠西極王真白帝君建通天寶冠中極玉真黃帝君建通元五氣之冠土精真訣曰東方九靈真人戴九氣冠南極真人戴進賢冠衣絳章之衣西方素靈真人戴三寶玄冠北方玄靈真人戴玄冠中央總元三靈真人戴黃晨玉冠玉光八景經曰東元景道君冠七色耀天玉冠躡九色之履金根經曰九天元父戴七色朱玉之幘無極進賢之冠又曰九天玄母著青寶神光錦繡霜羅九色之綬戴紫元玄黃寶冠大有經曰玉清之母戴七神朱玉之髻巾無極進賢之冠著玄黃素靈之綬在太極朱宮又曰九天真女戴玄黃七稱進賢之冠又曰上清真女戴玉冠著九色之綬居太幽宮中又曰太極帝妃冠無極進賢之冠衣五色鳳文之綬在太清極玄宮中又曰太上君戴三寶玉冠著九色之綬在無極真宮中又曰啟明天君冠青精進晨玉冠太一洞真玄經曰三素老君服錦衣建龍虎冠又曰太一公子白元司命桃君五人皆著朱衣絳巾典主符籍在太微紫房宮中登真隱訣曰太玄上丹霞玉女戴紫巾又戴紫華芙蓉巾及金精巾飛巾虎文巾金巾龜山元籙曰元始皇上文人冠九氣紫曜之冠衣九光錦袍佩九色無縫自然之綬帶六山火玉在上清之上又帶九天仙鍊之劍衣九色班文袍常乘十二飛麟帶金虎鳳文之綬金真玉光經曰元景道君曳玄黃之綬建七色玉冠又曰元景道君衣丹錦之綬戴進賢玉冠乘玄景綠與參駕鳳皇又太陽上府紫微宮中道君曳絳錦丹綬戴玉冠躡九色之履執制魔之章又元景太一君曳玄黃素綬戴七寶冠執命神之策乘玉輦五采蓋紫雲車參駕六龍又曰桐柏山真人王子喬年甚少整頓非常建芙蓉冠著朱衣以白珠綴衣縫帶劍多論金庭山中事言於眾真太上素靈經曰太上神仙戴飛晨寶冠又戴青精辰玉冠遊雲寶冠玉精寶冠通天玉寶冠三玄寶冠上清仙公並建扶華沓霞大冠道君冠九德之冠太極左仙公起居注曰太上三天鍚仙公芙蓉晨冠靈飛六甲經曰上清瓊宮東極玉真建九氣通精之冠玉京真人戴通陽玉晨冠少陽真人戴通曜之冠太素三元君建寶琅扶晨羽冠紫素元君建太真晨纓之冠三角髻餘髮散之於腰太極金書曰元始建洞天之冠上君建青精天玉之冠太真丈人建三寶玉冠三天童建三華寶曜洞天玉冠太洞玉經云紫元真人被朱錦之服巾綠霞之冠五岳真形圖曰東岳太山戴倉碧七稱之冠南岳衡山戴九丹日精之冠中岳嵩山冠黃玉太玄之冠西岳華山建太初九流之冠北岳恒山建太冥靈陰之冠青城丈人戴蓋天之冠昇玄經曰昔有仙人豆子明建黃褐玄巾幘紫書金根經曰九天元父戴七稱珠玉之幘敷齊經曰正一功曹冠朱陽之幘帔太極金書曰元始天帝被九色羅帔丹絳之裾珠繡霞帔太極左仙公起居注曰太上三天鍚仙公丹錦繡帔靈書紫文經曰青童大君衣飛青翠羽龍帔雌一五老經曰太素三元君服紫氣浮雲錦帔又紫繡毛帔又鳳文錦帔無上真人內傳曰九色錦繡華文之帔太元真人茅君內傳曰繡羽紫帔九真中經云青玉錦帔絳玉素玉玄玉黃玉錦帔又云青華丹蘂玉白琳四出龍帔玄玉九道雲錦帔黃雲山文錦帔褐仙公請問經曰太極真人曰夫學道當潔淨衣服備巾褐制度名曰道之法服靈寶真一自然經訣曰至真已得道人披九光七色法服靈飛六甲經曰南極玉真著緋羅法服上清紫宸經曰修七轉之道者上皇君以法服飛仙羽章授之仍戴以紫元飛霜七色之冠褵上清經曰高上玉皇衣玉文明光飛雲之褵龜山元籙曰九天玄母衣霜羅九色之褵又衣青羅之褵五岳真形圖曰五岳使者服緋褵三元布經曰紫素元君衣紫錦裌褵曰素元君衣白錦光明之褵龜山元籙曰九色飛雲錦褵九色自然之褵玉文明光飛錦之褵九色珠絳雲光錦褵丹錦七色文光之褵袍太極金書曰元始披霜珠之袍上清經曰三天玉童衣青黃錦袍五岳真形圖曰東岳君服朱光袍龜山元籙曰有明光飛錦珠袍五色雲羅之袍七色鳳雲之袍九色班文羽袍茅君內傳曰有赤霜之袍裘大洞玉經曰司禁真伯乘日月之軿披虎文之裘八表經曰白素元君衣黃緣曜光雲文之裘五帝內真經曰有玄文明光之裘九色班裘龜山元籙曰有雲文丹錦之裘衣三道順行經曰玉景真人衣玄雲錦衣老子歷藏中經曰東父者清陽之氣萬神之先衣五采衣龜山元籙曰有明光錦九朱飛文法衣三素飛文錦衣五色班衣九色龍衣又有青黃紫三色羽衣又有九色鳳衣亦有九天鳳衣珮大戒經曰太極真人曰凡謹事法服則者冠冕玉珮三元布經曰六山大玉之珮綬八素經曰太素元君衣流光雲文綬始素元君衣紫光雲文素綬玄素元君衣飛雲九變綬紫素元君衣玄黃九色素羅之綬黃素九君衣飛雲素錦之綬三元布經云紫素元君交帶靈飛大綬白素元君珮文琳華之綬太上飛行羽經曰九鈴之綬飛靈紫綬六山飛晨之綬九光之綬金真玉光經云紫青之綬丹錦之綬絳丹綬玄黃素綬白文素靈之綬玄靈五色之綬元始經曰九天玄母帶流蘇紫綬又曰九元光延紫綬靈飛紫綬交靈素綬九色自然之綬金虎鳳文之綬又曰太上九氣命靈之章帶翠羽交靈之綬板昇玄經曰太上曰十方奉經真官五帝真事符童傳言謁者皆冠帶垂纓齊執玉板羅列鹵簿對我前後左右笏昇玄經曰太上勑陵陽監受教稽首而起執笏戶東面西而立帬太上飛行羽經曰上君衣鳳衣班文虎帬太上素靈經曰太上神仙衣青錦單帬青綾帬雲錦絳章丹帬絳衣飛帬黃雲錦帬三元布經曰太素三元君服九色龍錦羽帬紫素元君衣飛霜羅帬太極左仙公起居注曰太上三天錫仙公緋羅帬龜山元籙曰有丹錦飛帬九色龍錦羽帬太上飛行羽經曰七色夜光雲錦帬九真中經曰蒼華飛羽帬丹華飛羽帬白羽飛華帬亦有黑羽黃羽飛華帬又曰翠龍華文飛羽帬朱華鳳帬素羽寫章帬黑羽龍文帬綠羽鳳華繡帬鈐移度曰南方真皇君垂靈霜鳳華龍鈐帶虎書建玄晨之冠飛青錦衣乘丹霞絳輿龜山元籙曰有玉鈴又有晨光明月之鈴列仙傳曰北元中玄道君李慶賓女為靈昭夫人著紫錦衣帶神虎符握流金鈴有兩侍女侍女年可二十許夫人年可十三四聞呼一侍女名隱暉侍女皆青綾衣捧赤玉箱二枚青帶絡之題白玉檢曰太上章一檢曰太上文夫人帶青玉色綬如世人帶章囊狀隱章當長五丈許大三四尺又曰太極有四真人中黃君處其左佩神虎之符帶流金之鈴埶紫毛之節頂金精之巾又曰仙道有紫繡毛帔丹青飛裙翠羽華衣金鈴青帶曲晨飛蓋御之自飛杖龜山元籙曰冬三月三天玉童化為老人手把九節金杖洞耀玉清之中聖紀經曰有老人握青竹杖與老子談天地之數赤書玉訣上經曰當取靈山向陽竹令長丈有七節作神杖使長上下通直甘竹乃佳印以元始之章動息坐起恒以自隨有五帝真符吏輔翼上真茅君傳曰朱官使者把綠節杖瓊干羽旄又曰太素真人把八景飛杖九色之節出入上清三天玉童頭連三角黃巾手把九節金杖節列仙傳曰太元真人杖紫毛之節紫微王夫人與一神女俱降神女著雲錦褵上丹下青文采相照腰有綠繡帶帶係十餘小鈴鈴青色黃色更相參廁左帶玉珮珮如人間珮珮但幾小耳衣服倏倏有光照映室內如日中視雲母也雲髮鬒鬢整頓絕倫髻在頂中垂餘髮至腰指著金鐶白珠約臂視之年可堪十三四左右兩侍女其一侍女著朱衣帶青章囊手中又持一錦囊囊長尺餘以盛書十餘卷以白玉檢上刻字云玉清神虎內真紫元丹章其一侍女著青衣捧一白箱以絳帶絡之箱似象牙箱形二侍女年可堪十七八整飾非常又曰裴真人從者持青毛之節一童帶繡囊周君從者持黃毛之節無囊二君各有六童又曰東卿大臣見降侍從七人一人執紫毛節一人執華幡一名十絕靈幡一人帶綠章囊三人捧牙箱一人握流金鈴侍者並朱衣東卿形甚少於二弟二弟著青錦繡帬紫毛帔巾芙蓉冠二弟並同來倚立東卿命坐言語良久時乙丑歲晉興寧三年七月四日降於楊君之家也又曰先道有三十七種色之節以給仙人履九真中經曰凡學道者勿令人犯屐履行道尤多禁忌金真玉光經曰有五色九色師子之履玉光八景經曰東北始陽宮牛元景足躡五色履舄龜山元籙曰領仙王奉元始命使資晨纓玉冠鳳雲之舄給上真仙母又有神雲鳳舄列仙傳曰安期先生賣藥海邊時人言千歲翁秦始皇召見與語三日夕賜金壁數千萬出於峊鄉亭皆置去留書以赤玉舄一量為報曰後千歲求我蓬萊山下始皇即遣使者入海未至蓬萊山輒風波而還上真元籙曰九天元父曳神雲鳳舄帶素雲之綬帷帳神州經曰九河帝君坐玉床五色帷帳內外光明玉珮千垂席玉珮金璫經曰仙人鄭段者坐玉華之席
