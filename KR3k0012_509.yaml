body:
  text: 逸民部八逸民八皇甫士安高士傳曰摯峻字伯陵京兆長安人少治清節與太史令司馬遷交好峻獨退身修德隱於阱山遷既親貴乃以書勸峻進曰遷聞君子所貴乎道者三太上立德其次立言其次立功伏惟伯陵材能絶人高尚其志以善厥身冰清玉潔不以細行纍其名固已貴矣然未盡太上之所由也願先生少致意焉峻報書曰峻聞古之君子料能而行度德而處故悔吝去於身利不可以虛受名不可以茍得漢興已來帝王之道於斯始顯能者見利不肖者自屏亦其時也周易大君有命小人勿用徒欲偃仰從容以送餘齒耳峻之守節不移如此遷居太史官為李陵遊説下腐刑果以悔吝被辱峻遂高尚不仕卒於阱阱人立祠號曰阱君又曰韓福者涿人也以行義修潔著名昭帝時將軍霍光秉政表顯義士郡國條奏行狀天子得福等五人行義最高以德行徵至京兆病不得進元鳳元年詔策曰朕愍勞福以官職之事賜帛五十匹遣歸其務修孝悌以教鄉里福歸終身不仕卒于家又曰安丘望之京兆長陵人也少治老子經恬靜不求進官號曰安丘丈人成帝聞欲見之望之辭不肯見上以其道德深重常宗師焉望之不以見敬為高愈自損退為巫醫於民間著老子章句故老氏有安丘之學扶風耿況王伋等皆師事之從受老子終身不仕道家宗焉又曰丘欣字季春扶風人也少有大材傲世不能與俗人為群郡召始見曰明府欲臣欣耶交欣耶師欣耶明府所以尊寵人者極於功曹所以榮祿人者已於孝廉一極一已皆欣所不用也府君異之遂不敢屈三輔決録曰丘欣傲俗自謂無伍又曰荀靖字叔慈父淑有名績靖兄弟八人號曰八龍靖至孝闔門悌睦隱身修道弟爽字慈明亦有材學汝南許章稱二人皆玉也慈明外朗叔慈內潤太尉辟不就及終頴陽令丘禎號靖曰玄行先生頴川太守王懷亦諡曰昭定先生又曰任棠字季卿以春秋教授隱身不仕龐參為漢陽太守就家候棠以薤一本水一盆置戶屏前自抱孫兒伏戶下參曰棠是欲諭太守也水欲太守清也拔一本薤欲太守擊強宗也抱孫兒當戶者欲太守開門恤孤也終參去不言詔徵不至及卒鄉人圖畫其形至今稱任徵君也又曰張仲蔚平陵人與同郡魏景卿俱修道德隱身不仕明天官博物善屬詩賦所處蓬蒿沒人閉門養性不治榮名時人莫識惟劉龔知之又曰高恢字伯遠少治老子經恬虛不營世務與梁鴻善隱於華陰山又曰薑肱字伯淮彭城廣戚人也家世名族肱兄弟三人皆孝行著肱年最長與二弟仲海季江同被臥甚相親友及長各娶兄弟相愛不能相離習學五經兼明星緯弟子自遠方至者三千餘人聲重於時凡一舉孝廉十辟公府九舉有道至孝賢良公車三徵皆不就仲季亦不應徵辟建寧三年靈帝詔徵為犍為太守肱得詔乃告其友曰吾以為虛獲實遂藉聲價盛明之世尚不委質況今政在私門哉乃隱遁命乘船浮海使者追之不及再以玄纁聘不就即拜太中大夫又逃不受詔名振天下年七十卒于家又曰徐稚字孺子豫章南昌人也少以經行高於南州桓帝時汝南陳蕃為豫章太守因惟薦稚於朝廷由是三舉孝廉賢良皆不就連辟公府不詣未嘗答命公薨輒身自赴弔太守黃瓊亦嘗辟稚至瓊薨歸葬江夏稚既聞即負笈徒步豫章三十餘里夏瓊墓前致酹而哭之後公車三徵不就以壽終又曰夏馥字子治陳留圉人也少為諸生質直不茍動必依道同縣高儉及蔡氏凡二家豪富郡人畏事之唯馥閉門不與高蔡通桓帝即位災異數發詔百司舉直言之士各一人太尉趙戒舉馥不詣遂隱身久之靈帝即位中常侍曹節等專朝禁錮善士謂之黨人馥雖不交官然聲名為節等所憚遂以汝南范滂山陽張儉等數百人並為節所誣悉在黨中詔下郡縣各捕以為黨魁馥於是頓足而歎曰孽自己作空汙良善一人逃死禍及百家何以生為乃剪鬚變服易形改姓入相慮山中為冶工客作形貌毀悴積傭三年而無知者後詔悉放儉等皆出馥獨歎曰以為人所棄不宜復齒鄉里矣留賃作不歸家人求不知所處其後人有識其聲者以告同郡上黨太守濮陽潛潛使人以車迎馥馥自匿不肯見潛車三返乃得馥又曰申屠蟠字子龍陳留外黃人也少有名節同縣大女雖玉為父報仇外黃令梁醜欲論殺玉蟠時年十五為書生進諫曰玉之節義足以感無恥之孫激忍辱之子不遭明時尚當追旌廬表況在清聽而不加哀矜醜善其言乃為讞減死論人稱之及父母卒蟠思慕不飲酒食肉十餘年遂隱居學治京氏易嚴氏春秋小戴禮三業先通因博貫五經兼明圖緯學無常師始與濟陰王子居在太學子居病困以身託蟠蟠即步負其喪至濟陰遇司隸從事於河鞏之間從事義之為符傳護送蟠蟠不肯投傳於地而去事畢還家前後凡一察蒲車特徵皆不就年七十四以壽終又曰郭泰字林宗太原人也少事父母以孝聞身長八尺餘家貧郡縣欲以為吏歎曰大夫何能執鞭斗筲哉乃辭母與同郡宗仲至京師從屈伯彥學春秋博洽無不通又審於人物由是名著於陳梁之間步行遇雨巾一角蟄衆人慕之皆折巾角士爭往從之載策盈車凡泰知之於無名之中六十餘人皆先言後驗以母喪歸徐稚來吊以生芻一束頓泰廬前而去泰曰南州高士徐孺子也詩曰生芻一束其人如玉吾不堪此喻後辟司徒府有道徵皆不就又曰袁閎字夏甫汝南人也築室於庭中閉門不見客旦於室中向母拜雖子往不得見也子亦向戶拜而去首不著巾身無單衣足著木履母死不列服位公車再徵不詣范滂美而稱之曰隱不違親身不絶俗可謂至賢也又曰牛牢字君直世祖為布衣時與牢遊夜講訖共言讖劉秀當為天子世祖曰安知非我萬一各言爾志牢獨默然世祖問之牢曰丈夫立義不與帝友衆大笑及世祖即位徵牢稱疾不至詔曰朕幼交牛君直清高士也恆有疾州郡之官者常先到家致意焉刺史郡守是以每輒奉詔就家存問牢恆被髮稱疾不答詔命又曰成公者成帝時自隱姓名嘗誦經不交世利時人號曰成公成帝時出遊問之成公不屈節上曰朕能富貴人能殺人子何逆朕哉成公曰陛下能貴人臣能不受陛下之官陛下能富人臣能不受陛下之祿陛下能殺人臣能不犯陛下之法上不能折使郎二人就受政事十二篇又曰彭城老父者楚之隱人也見漢室衰乃自隱修道不治名利至年九十餘王莽時徵故光祿大夫龔勝欲為太子師友祭酒恥事二姓莽迫之勝遂不食而死莽使者及郡守已下會斂者數百人先生痛勝以名致禍乃獨入哭勝甚悲既而曰嗟乎薰以香自燒膏以明自煎龔先生夭天年非吾徒也哭畢而起出衆莫知其誰又曰宋勝之字即子南陽安衆人也少孤年十五失父母家於穀城陬中孝慕甚篤陬中化之少長有禮勝之每行見老人簷負輒以身代之獵得禽獸嘗分肉與有親者貧依姊居數歲乃至長安受易通明以信義見稱從兄裒為東平內史遣吏召之勝之曰衆人所樂者非勝之願也乃去遊太原從郇越牧羊以琴書自娛丞相孔光聞而就太原辟之不至元始三年病卒于太原又曰東海隱者漢故司直王良友人建武中良以清節徵用歷位至一年復徵還見友不肯見而讓之曰不有忠信奇謀而取大位自知無德曷為致此而復遽玄何往來屑屑不憚煩也遂距良終不納論者高之又曰韓順字子良天水成紀人也以經行清白辟州宰不就王莽未隱於南山地黃四年漢兵起於南陽順同縣隗囂等起兵自稱上將軍西州大震唯順修道山居執操不回囂以道術深遠使人齎璧帛車辭厚禮聘順欲以為師順因使謝囂曰禮有來學義無往教即欲相師但入深山來囂聞矍然不敢強屈其後囂等諸姓皆滅唯順山栖安然以貧潔自終焉又曰擊恂字季直伯陵之十二世孫也明禮易遂治五經博通百家之言又善屬文詞論清美渭濱弟子扶風馬融沛國桓驎等自遠方至十餘人既通古今而性溫敏不恥下問故學者宗之常慕其先人之高遂隱於南山之陰初馬融始從恂受業恂愛其才因以女妻之融後果為大儒文冠當世以是服恂之知人永和中和帝博求名儒公卿薦恂行侔曾閔學擬仲舒文參長卿才同賈誼實瑚璉器也宜在宗廟為國真輔由是公車徵不詣大將軍竇憲舉賢良不就清名顯於世以壽終三輔稱焉又曰薑歧字子平漢陽上郡人也少失父獨與母兄居治書易春秋恬居守道名重西州延熹中沛國橋玄為漢陽太守召歧欲以為功曹歧稱疾不就玄怒勑督郵尹益收歧若實不起者欲嫁其母而後殺歧益爭之玄怒益撾之益得杖且諫曰歧少修學孝義栖遲衡廬鄉里歸仁名宣州里實無罪杖益敢以死守之玄心乃止歧於是高名逾廣及母死喪禮畢盡讓平水田與兄岑遂隱以畜蜂豕為事教授者滿於天下營業者三百餘人辟州從事不詣民從而居之者數千家後舉賢良公府辟以為茂才為蒲阪令皆不就以壽終於家
