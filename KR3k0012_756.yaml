body:
  text: 工藝部十二彈碁東觀漢記曰安帝詔曰樂成王居諒暗音陰衰服在身彈棊為戲不肯謁陵沈約宋書曰晉平刺王休祐文帝第十三子也在荊州時左右范景達善彈棊上召之休祐留不遣上怒詰責之趙書曰冉閔收石遵遵方與女子彈棊兵至殺之梁冀別傳曰冀好彈棊抱朴子曰暑夏之月露首袒體唯在樗蒱彈棊不離綺繻紈袴之側世說曰劉真長始見王丞相時暑之月丞相以腹尉彈棊局曰何如乃㵾吳人以冷為㵾也音楚敬切劉既出人問見王公何如劉曰未見他異唯作吳語耳王丞相遵也又曰彈棊始自魏文帝宮內裝器戲也文帝於此伎特妙用手巾拂之無不中者有客自云能帝使為之客著葛巾拂棊妙逾於帝魏文帝典論曰余於他戲弄之事少所喜唯彈棊略盡其功乃為之賦昔京師先工有馬合鄉侯東方世安張公子常恨不得與彼數子者對藝經曰彈棊二人對局黑白棊各六枚先列棊相當下呼上擊之彈棊經序曰彈棊者仙家之戲也昔漢武帝平西域得胡人善蹴鞠者蓋衒其便平聲捷跳躍帝好而為之群臣不能諫侍臣東方朔因以此藝進之帝就捨蹴鞠而上彈棊焉習之者多在宮禁中故時人莫得而傳至王莽末赤眉凌亂西京傾覆此藝因宮人所傳故散落人間及章帝御宇好諸伎藝此戲乃盛於當時彈棊經後序曰自後漢冲質已後此藝中絶至獻帝建安中曹公執政禁闌幽密至於博奕之具皆不得妄置宮中宮人因以金叉玉梳戲於粧奩之上即取類於彈棊也及魏文帝受禪宮人所為更習彈碁焉當時朝臣名士無不爭能故帝與吳季量吳質字季量書曰彈碁間設者也又曰彈棊者雅戲也非同乎五白梟橛梟橛並樗蒲彩之數不游乎紛競詆欺之間淡薄自如固趨名近利之人多不尚焉蓋道家所為欲習其偃亞導引之法擊博騰擲之妙自暢耳又曰唐順宗在春宮日甚好之時有吉達高釴崔同揚同願之徒悉為名手後有竇深崔長孺甄顒獨孤遼亦為亞焉至于長慶之末好事之家猶見有局尚多解者後漢蔡雍彈棊賦曰夫張局陳棊取法式備因嬉戲以肄業託歡宴以講事設茲矢石其夷如砥采若錦繢平若停水肌理光澤滑不可履乘色行巧據險用智魏文帝彈棊賦曰局則荊山妙璞滑如柔荑碁則玄木北幹桑樹西枝象籌列植下據雙螭王粲彈碁賦曰文石為局金碧齊精隆中夷外理緻肌平晉傅玄彈碁賦序曰漢武帝好蹴鞠劉向以為蹴鞠勞人體竭人力非至尊所宜乃因其體而作彈碁以解之儒碁後魏書曰侍中游肇性謙廉不競曾撰儒碁以表其志焉肇述儒碁曰儒碁者蓋博奕之流所以遊思於文亦猶投壺之習武也故聖人因物設教有實有權情禮稱宜有張有弛孔子云不有博奕者乎為之猶賢乎己若夫井公之對周穆叔卿之接許由此或示存恐非有待然則君子之處世也豈遂耽於所適徒費時日者哉至於几杖盤鑑猶裁銘戒矧乃諧神之器而不加勸也但古之為玩者莫不競進其功塞殺與樂殊途異勢並傳於時未有以謙退為勝通生為樂者故因暇隟聊復措意此即儒碁之一名蓋遊義之所統本諸謙淨銓名撰德略依儒行起捨遵道軌法中庸時然後玩人不厭其遊讓而後勝人逾愜其負矜勇所以知殘冲遜以之彌隆豈唯崇謙止競而已諒亦階善全德之所因矣積名會理其殆庶幾致泥之戒寧不愧乎儒碁曰投二方二分六彩也智一禮二仁三義四信五各法生數所以記彩而行於道豈唯名義而已籍物以為差也謙行數無准名顯義耳進退之異唯在梟伏棊十生成之數亦不是過白黑半各用五分方五分長寸分寸所以記法善六敬七德八忠九順十各據成數所以記算而兼名義名義雖異亦符五德陰陽配合數盡也方局尺五周道四十其用三十六取捨途異四維之道通數而碁處惡其雅也謙退為尚故高彩者先投恥為道也彼此二位謂之淨淨者謂仁義也左右二道謂之中中者謂禮智之道也其淨中四道彼此左右互有二不得相干干則鬭也行碁之法始附淨起轉互相順終因淨出初不淨出必曲之者避相涉也通生為務不存塞殺志仁恕也彩越淨中者休則立梟梟者不伏彩不會也會淨中者梟折為伏伏者不梟行不越也若彩雖會而于彼擬以過之有碁則不得擬非干彼者則自居矣居擬不同以于彼也行伏碁者得異彩依數而行兩彩同者唯行一常柔齊也一謙者停兩謙退一等貴重損也行梟碁者得異彩亦依數而行兩彩同者盡行其數鄙勇均也一謙行一道兩謙者停梟致異也行伏不得行梟行梟不得行伏殊謙競也折梟伏者皆從後定重行終也因綵而閲者屈而申之謂初得謙信也緣行致纍者越而通足皆不限道數進退皆爾梟伏兩閲者但行於梟先梟者進恥之義道尤多故也行碁之體不相凌觸所蹈皆靈行務靈淨唯焚觸鬭孤明自在不以強弱生而懼也絶於跪巧而順消息審理中也悉遇中道勝負乃分先梟後伏驗之於淨謙勇之辨實標先後處淨不安方顯其竟道梟若促不盡二彩者則全行伏先後用永防其為也自貽全進邊之義成也梟伏兩少者行於梟示不盡彩理無兼也彼既出盡此有不出者即許以為勝者之算以後退為勝也若全未出則為之虛投損己益人謙者所崇次局負仍先梟勇故也得十算立一爵三爵立則成勝矣既尚冲淨豈假務於多算但謙並見跡故假以勝為名也擊壤釋名曰擊壤野老之戲也玄晏皇甫謐號玄晏先生曰十七年與從姑子果柳等擊壤于路逸士傳曰堯時有壤父五十人擊壤於康衢或有觀者曰大哉堯之為君壤父作色曰吾日出而作日入而息鑿井而飲耕田而食帝何力於我哉風土記曰擊壤者以森作之前廣後鋭長可尺三四寸其形如履臘節僮少以為戲分部如擲博也藝經曰擊壤古戲也又曰壤以木為之前廣後鋭長尺四闊三寸其形如履將戲先側一壤於地遙於三四十步以手中壤敲之中者為上吳盛彥翁子擊壤賦曰論衆戲之為樂獨擊壤之可娛因風託勢罪一殺兩角抵左傳曰晉侯夢與楚子搏搏手相搏楚子伏己而盬其腦是以懼漢書曰武帝元封三年春作角抵戲應劭曰戰國之時稍增講之以為戲樂用相誇亦至秦更名角抵者也武帝大復增廣之至元帝元初五年罷三百里內皆觀王隱晉書曰潁川襄城二郡班宣相會纍欲作樂襄城太守責功曹劉子篤曰卿郡人不如潁川人相撲篤曰相撲下伎不足以別兩國優劣請使二郡更對論經國大理人物得失唐書曰裴矩帝幸東都矩以蠻夷朝貢者多諷帝大徵四方奇技作魚龍曼延角抵於洛邑以誇諸戎秋月而罷西京雜記曰三輔人俗用以赤刀為戲漢朝亦取以為角抵之戲焉漢武故事曰未央庭中設角抵戲角者六國所造也秦并天下兼而增廣之漢興雖罷然猶不都絶至上復採用之并四夷之樂雜以奇幻有若鬼神角抵者使角力相抵觸也彈廣雅曰彈行丸也左傳曰晉靈公臺上彈人觀其避丸者魏書曰齊王芳為帝常喜以彈彈人齊書曰桓榮祖善彈登西樓見翔鵠謂左右曰當生取之乃彈其兩翅毛脫盡墮地無傷飬之毛生後飛去其妙如此隋書曰長孫晟洛陽人也有鳶群飛上謂晟曰公善彈為我取之十發俱中並應丸而落吳越春秋曰陳音百對越王曰弩生於弓弓生於彈彈生於古之孝子古者人死投之中野孝子不忍父母為禽獸所食則作彈以守之故古人歌之曰斷竹屬木飛土逐肉西京雜記曰韓嫣好彈常以金為丸一日所失者十餘長安為之語曰苦飢寒逐金丸京師兒童每聞嫣出彈輒隨之望丸之所落而輒拾取莊子曰以隋侯珠彈千仞之雀必笑所用至重所取至輕又曰見卵而求時夜見彈而思梟炙世說曰潘嶽少時挾彈洛陽道婦人見之無不連手縈之談藪曰齊蕭遙欣為童子時見一小兒左右彈飛禽未有不應弦而落者遙欣謂之曰凡戲多端何急彈此鳥自雲中高翔何關人事小兒感之終身不捉時少年士庶競為此戲欣之一說此戲遂廢之又曰梁王謂惠子曰先生直言無得引喻惠子曰今有人不識彈問彈狀如何答曰彈狀如彈則能了否王曰不了又曰彈狀如弓以竹為弦可知之乎王曰知矣惠子曰夫說者欲人知之無諭則不知也王曰善顧子義訓曰人有善於射而高於顧子顧子曰子之射雖百中猶不若我之一彈或曰何以為然顧子曰子之所射老狸之皮耳我之所彈彈狐之心潛夫論曰懷丸挾彈攜手遨遊外不足防寇盜內不足禁鼷鼠四維晉李秀四維賦序曰四維戲者衛尉贄侯所造也畫紙為局截木為棊取無一分而為二准陰陽之位擬剛柔之棊而變動無為生乎其中象戲周武帝造象戲王褒為象經序曰一曰天文以觀其象天日月星辰是也二曰地理以法其形地水火木金土是也三曰陰陽以順其本陽數為先本於天陰數為先本於地是也四曰時以政其序東方之色青其餘三色例亦如之是也五曰算數以通其變俯仰則為天地日月星變通則為水火金木土是也六曰律呂以宣其氣在子取未在午取丑是也七曰八卦以定其位至震取兌至離取坎是也八曰忠孝以惇其教出則盡忠入則盡孝是也九曰君臣以事其禮不可以貴凌賤直而為曲不可以卑畏尊隱而無犯是也十曰文武以率其務武修七德文表四教是也十一曰禮像以制其居上不驕為下盡敬進退有度可法是也十二曰以考其行定而後求求而後取時然後言樂然後笑是也或升遷以報言義存遷善或黜退以貶過事在懲惡或以沈審為貴正其瞻視或以徇齊為功明其糾察得失表於隆替在賤必申怠敬彰於觀沮處尊思屈片善崇於拱璧一言踰於華袞夾食藝經曰夾食者二人黃黑各十七其撗列於前第四道上甲乙迭推二棊夾一為食棊不得食兩不得邊食不由道則不行碁入夾不取食一棊為籌賭多少隨人所制悁悶藝經曰悁悶者先布本位以十二時相從文曰同有文章虎不如龍豕者何為來入莬宮王孫晝卜乃造黃鍾大往就馬非類相從羊奔蛇穴牛入雞籠射數纂文曰詭億一曰射數梁冀別傳曰冀好意錢簸子藝經曰子之多少人之明數隨戲者制始十子爭先以落多為不妙抃漢書曰甘延壽字君況以良家子善騎射試抃為期門以材力愛幸又曰哀帝時覽抃射武戲孟康注曰手搏為抃角力為武左思吳都賦曰抃壺搏擲磚續搜神記曰夏侯綜為庾安西參軍說常見鬼乘車騎馬滿道與人無異常與人載行忽牽人語指道上一小兒云此兒正爾大病須臾此兒果病殆死其母聞之請綜綜云無他汝兒向於道中擲塗塗蓋磚也誤中一鬼腳鬼瞋故病汝兒耳但以酒飯貽鬼即差母如言兒即愈藝經曰以磚二枚長七寸相去三十步立為摽各以磚一枚方圓一尺擲之主人持籌隨多少甲先擲破則得乙籌後破則奪先破者
