seq: 26
front:
  text: 時序部十秋下蔡雍月令章句曰仲秋白露節盲風至秦人謂蓼風為盲風崔實政論曰秋風厲而賞武臣顏氏家訓曰或問何故名治獄參軍為長流乎答曰帝王代紀云帝少昊崩其神降于長流之山事出山海經於祀主秋按周禮秋官司寇主刑罰長流之職也漢魏捕賊椽耳晉宋已來始為參軍上屬司寇故取秋帝所居為嘉名焉夏小正曰八月丹鳥羞白鳥羞進也白鳥蚊蚋辰則伏辰房星鴽為鼠也九月內火漢舊儀曰八月飲酎車駕夕牲以繡衣之皇帝暮視牲以陰燧取水於月以陽燧取火於日為明水火左袒以水沃牛右肩手執鸞刀以切牛毛血薦之而即更衣李雕四部曰弔鳥山俗傳曰鳳死其上每至七月九日晦望群鳥常來集其上鳴呼也應劭風俗通曰周秦常以八月輶軒使采異俗方言藏之祕府劉歆鍾律書曰春宮秋律百卉必凋秋宮春律萬物必榮魏丁儀刑禮論曰上天垂象聖人則之歲先春而後秋宮之為理先禮而後刑論衡曰秋氣繫殺穀草不任凋傷而死此言失實夫物以春生夏榮秋而熟老適自枯死陰氣適盛與之會遇何以驗之物有秋不死者生性未極也陸機要覽曰秋樹名成秋雨名愁地鏡經曰八月中草木獨有葉枝下垂者必有美玉又云八月後草木死者亦有玉梁元帝纂要曰秋曰白藏氣白而收藏万物亦曰收成万物成而收斂亦曰三秋九秋素秋素啇高啇天曰旻天旻愍也愍万物之雕零風曰啇風素風凄風高風涼風激風悲風景曰朗景澄景清景時曰凄辰霜辰霜辰可施九月節曰素節啇節草曰衰草木曰踈木衰林霜柯霜條七月孟秋亦曰初秋首秋上秋肇秋蘭秋八月仲秋亦曰仲啇九月季秋亦曰暮秋末暮啇季啇抄秋亦曰授衣此時婦功畢始授衣亦曰玄月盧公範饋餉儀曰凡八月旦上承露盤赤松子柏上露為囊以膏面皮古人用點炙枝以梨枝為之反銀盞中有朱砂銀枝子也盧公范者盧懷慎之家臨海異物志曰黃雀常以八月入海化為魚博物志曰舊說天河與海通近世有人居海渚者年年至八月浮查來至甚大往返不失期其人乃至查上齎糧食乘查而去至天河世說曰張季鷹辟齊王東曹掾在洛見秋風起因思吳中蓴菜羹鱸魚鱠曰人生貴適志耳何能從官數千里以要名爵遂命駕便歸俄而齊王敗人皆謂見機而作又曰王子敬云從山陰道士行山川自相映發使人應接不暇若值秋冬之時尤難為懷陰陽五行曆曰一時皆三月一月為一秋三月為三秋又以十月為一秋故三月有九秋之名也明堂之制曰秋治以矩矩之為度也肅而不勃剛而不匱取而無怨內而無害威厲而不懾令行而不廢殺伐既得仇敵乃克矩正不失百誅乃服乙巳占曰太白主秋人君當秋之時順太白以施政則吉逆則凶秋時行冬令則辰星之氣干於大白色黑而有芒角陰氣大勝戎兵乃來風災數起國多盜賊邊境不寧亡地震坼而國有大喪重獄秋時行春令則歲星之氣干於太白色青昧小則國旱君有大憂陽氣陵遲五穀不實秋雨不降草木生榮非時矣以秋時行夏令則熒惑之氣干於大白色赤而怒國多火寒熱不節人多瘧疾蟄蟲不藏矣大衍星分圖曰八月酉日月會于壽星天文録曰胃昴趙之分野自胃七度止畢十二度於辰在酉大梁之疆也八月之時白露始降萬物堅成而疆大故曰大梁漢李陵與蘇武書曰窮秋九月塞外草表夜不能寐側耳遠聽胡笳牙動牧馬悲鳴吟嘯成群邊聲四起晨坐聽之不覺流淚楚詞曰嫋嫋兮秋風洞庭兮木葉下言秋風疾則草木搖湖水波而樹葉落矣又曰悲哉秋之為氣也蕭瑟兮草木搖落而變衰憀栗兮若在遠行登山臨水兮送將歸泬寥兮天高而氣清寂寥兮收潦而水清憯悽增欷兮薄寒之中人愴恍曠浪兮去故而就新坎壈兮貧士失職而志不平廓落兮羈旅而無友生惆悵兮而私自憐燕翩翩其辭歸蟬寂寞而無聲鴈嗈嗈而南遊鵾雞啁哳上張流下陟轄切鳥鳴聲也而悲鳴獨申旦而不寐哀蟋蟀之霄征又曰皇天平分四時兮竊獨悲此凜秋白露既下降百草兮奄離被梧楸去白日之昭昭兮襲長夜之悠悠魏曹植秋思賦曰四節更王兮秋氣悲遙思惝恍兮若有遺雲高氣靜露凝衣野草變色莖葉稀鳴蜩抱木鴈南飛西風悽悷郎計切朝夕臻扇篷屏棄絺𥿭捐晉潘嶽秋興賦曰嗟秋月之可哀良無愁而不盡野有歸燕隰有翔隼遊氣朝興槁葉夕殞於時乃屏輕篷釋纖絺藉莞蒻御夾衣庭樹槭所責切殞落貌以灑落徑風戾而吹帷蟬嘒嘒以寒吟鴈噰噰而南飛天晃朗而彌高日游腸而浸微何微陽之短晷覺涼夜之方永月朣朧以含光露凄清以凝冷熠耀熠耀螢也粲於階闥蟋蟀鳴于軒屏聽離鴻之晨吟望流火之餘景王期懷秋賦曰哀時來之慘悽悼秋氣之可悲古樂府歌詩曰秋風蕭蕭殺人出亦愁入亦愁胡地多飆風樹木何蕭蕭離家日趣遠衣帶日趣緩心思不能言腸中車輪轉魏應璩雜詩曰秋日苦促短遙夜邈綿綿貧士感此時慷慨不能眠晉陸機為顧彥先作詩曰肅肅素秋節湛湛濃露凝太陽夙夜降少陰忽已升又悼亡詩曰皎皎窗中月照我室南端清啇應秋至溽暑隨節闌凛凛涼氣升始覺夏衾單晉張載詩曰靈象運天機日月如激電秋風兼夜式微霜凄舊院嘉木殞蘭圃芳草悴芝菀嚶嚶南翔雁翩翩辭歸燕玉肌隨爪素噓氣應口見斂襟思輕衣出入忘華扇覩物識時移顧己知節變晉孫綽詩曰蕭瑟仲秋月飂戾風雲高山居感時變遠詠興長謠踈林積涼氣虛岫結凝霄零露灑庭林密葉辭榮條撫茵悲先落攀松羡後凋宋劉鑠詩曰旻天清旦高秋氣發初涼白露下微津明月流素光凝煙泛城闕凄風入軒房朱華先零落緑草就藝黃纖羅還笥篋輕紈改衣裳宋江逌詩曰祝融解炎轡蓐收起涼駕長林悲素秋茂草思朱夏鳴鴈薄雲嶺蟋蟀吟深榭寒蟬向夕號驚飆激中夜感物增人懷悽然無欣暇宋謝惠連懷秋詩曰平生懷苦心矧復值秋晏皎皎天月明奕奕河宿爛蕭瑟含風蟬嘹唳度雲鴈寒啇動清閨孤燈曖幽幔又搗衣詩曰衡紀無淹度晷運倏如催白露滋園菊秋風落庭槐肅肅莎雞羽烈烈寒螿啼夕陰結空幕霄月皓中閨美人式常服端飭相招攜簪玉出北房鳴金步南階簷高砧響發楹長杵聲哀宋湯惠休白紵舞歌詩曰秋風嫋嫋入曲房羅帳含月思心傷蟋蟀夜鳴斷人腸長夜思君心飛揚它人相思君相忘錦衾瑤席為誰芳又古歌八變曰北風初秋至吹我章華臺浮云多暮色似從崦嵫來宋鮑昭答湯惠休曰枯桑葉易零疲客心易驚今茲亦何早已聞絡緯鳴回風滅且起卷蓬息復征愴愴簟上寒凄凄帳裏清物色延暮思霜露逼朝榮百物方蕭瑟長嘆從此生又和王護軍秋夕詩曰散漫秋雲遠蕭蕭霜月寒驚風西北起孤鴈夜往還金氣方徑殺降陽微且殫泉涸甘井竭節役芳草殘何瑾悲秋夜曰欣莫欣兮春日悲莫悲兮秋夜立秋易說曰坤西南也主立秋京房易占曰立秋坤王主涼風用事易通卦驗曰立秋日涼風至白露下春秋考異郵曰立秋趣音促織鳴女功急趣之春秋元命苞曰瑤光星也散為鷹立秋之日鷹鸇擊三禮義宗曰七月立秋秋之言揫音湫聚也縮之意陰氣出地始殺万物故以秋為節名五經要義曰磬立秋之樂也白虎通曰磬者夷則之氣象万物之成月令占候圖曰立秋坤卦用事其神攝提二宮荊州分也晡時申西南涼風至黃雲如群羊宜粟穀若晴朗風雲不至万物不成望西南坤上有黃雲氣是正氣立秋應節万物皆榮豆穀熟赤氣出其右万物半死豆穀半收地動人民不安坤氣萬物不成地頻動牛馬多病應在十二月坤氣見於江湖乍存乍亡坤氣退則地裂泉涌申時西南有赤黃氣或白潤厚白澤者粟大熟又曰立秋日午時豎八尺竿影得四尺五寸二分半五穀熟立秋後四十五日內主去氣在坤不得修造動土及遠行出軍事凶漢書曰孫寶為京兆尹請侯文為椽進見如賓禮數月以立秋日署文東部郵且曰今日鷹隼始擊當順天氣取姦惡以成嚴霜之誅椽部詎有其人乎文曰無其人不敢受職寶曰誰也文曰霸陵杜稚季寶問其次文曰豺狼撗道不宜復問狐狸後漢書曰申屠建等與御史大夫隗囂合欲以立秋日貙膢時共劫更始前書音義曰貙獸以其立秋日祭獸王者亦此日出獵用祭宗廟冀州北八月朝作飲食為膢其俗謂曰膢獵杜伏貙音丑于歹媵音婁續漢書曰立秋之日夜漏未盡五刻京都百官皆衣白絁皂領緣中衣迎氣於西郊又曰立秋之日西郊畢始有司斬牲於部東門以薦陵廟其儀乘輿御戎輅白馬朱鬣躬執弩射牲牲以鹿麛大宰令謁者令一人獲馳駟送陵廟還宮遣使者齎束帛以賜武官隸兵習戰陳之儀斬牲之禮名曰貙劉如淳曰膢漢儀注立秋貙膢許慎曰俗以二月祭飲食冀州北部或以八月作飲食為膢也祠令曰立秋祀白帝於西郊帝少昊配蓐收從祠又曰立秋後辰祀靈星於國城東南登真隱訣曰立秋之日日中五嶽諸真人諸黃老君於黃房靈庭山會仙官於日中定天下神圖靈藥符瑞圖曰立秋西方閶闔風至一名飂風白虎通曰涼風立秋至王者報地德禮西郊周書時訓曰立秋之日涼風至又五日白露降又五日寒蟬鳴涼風不至國無嚴政白露不降民多咳病寒蟬不鳴人臣力爭白露之日鴻鴈來又五日玄鳥歸又五日群鳥養羞鴻鴈不來遠人背叛玄鳥不歸室家離散群鳥不羞臣下驕慢秋分之日雷始收聲又五日蟄蟲附戶又五日水始涸雷不收聲諸侯淫汰蟄蟲不附民靡有賴水不始涸介蟲為害五行休王論曰立秋坤王兌相乾胎坎沒艮死震困巽廢離休陸機要覽曰列子遇風常以立春歸乎八荒立秋遊乎風穴是風至草木皆生去則搖落謂之離合風秋分說文曰龍春分而登天秋分而入淵易說曰秋分閶闔風至雷始收聲鷙鳥擊玄鳥歸又曰兌西方也主秋分孝經說曰斗指酉為秋分又曰秋分日在內衡文子曰陰陽調日夜分故万物春分而生秋分而成生與成必得和之精故積陰不生積陽不化陰陽交接乃能成和此天地之氣和平故万物得以生成故也京房易候曰虹八月出西方粟貴京房易占曰秋分而人君釋種鼓之懸孔安國尚書注曰虛玄武之中星皆以秋分日見以正三秋天文録曰仲秋秋分暮出角亢氏房東四舍為漢中周書時訓曰秋分八月中雷乃收聲不收聲即人民不安又云諸侯驕逸放蕩於上蟄蟲坯戶不坯戶即邊方不寧又云人靡有賴水始涸水不涸即人多痼疾曆日疏曰秋分八月之中氣也秋分之時日出於卯入於酉分天之中陰陽氣等晝五十刻夜五十刻一晝一夜二氣中分故謂之秋分也
