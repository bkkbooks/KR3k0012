body:
  text: 刑法部二敘刑下晉書曰羊亮為太傅楊駿參軍時京邑多盜竊駿欲更重其法盜百錢加大辟請官屬會議亮曰昔楚江乙母失布以為盜由令尹公若欲無盜將自止何重法為駿慚而止後魏書曰韓騏驎為齊州剌史寬刑罰從事劉普慶説曰明公杖節分憂無所斬戮何以示威答曰人不犯何以戮乎若須立威當以卿始慶慚懼而退梁書曰武帝敦睦九族優借朝士有犯罪者皆諷臣下屈法申之百姓有罪即按以法其緣坐老幼不免一人逃亡舉家質作人既窮急姦宄益深後帝親南郊秣陵老人遮帝曰陛下為法急於黎庶緩於權貴非長久之術誠能反是天下幸甚帝鋭意儒雅踈簡刑法自公卿大臣咸不以鞠獄留意姦吏招權巧文弄法貨賄成市多致枉濫大率二歲刑以上歲至五千人是時徒居作者具五任其無任者著斗械任即保也若疾病權解之後周書曰大象元年詔罷高祖所約法初高祖作刑書要制用法嚴重及帝即位以海內初平恐物情未附乃除之隋書曰後周大象元年詔高祖所立刑書用法深重其一切除之然帝數行肆赦為姦者皆輕犯刑法政令不一下無適從於是又廣刑書要制而更峻其法謂之刑經聖制宿衛之官一日不直罪至削除逃亡者皆死而家口籍沒上書自誤者科其罪鞭杖皆百二十為度名曰天杖其後人加至二百四十又作礔礰車以威婦人其決人罪云與杖者即一百二十多打者即二百四十又曰開皇十六年八月景戍詔決死罪者三奏而後行刑唐書曰貞觀五年詔京師諸司比來奏決死囚雖立五覆一日即了未暇審思五奏何益縱有追悔又無所及自今後宜二日中五覆奏下諸州三覆奏又手勑曰比來斷獄多據律文雖情有可矜而不敢違法守文定罪或恐有冤今後門下省覆奏有據法合死而情可矜者宜録狀以聞又曰太宗嘗録囚徒憫其將死為之動容顧謂侍臣曰刑典仍用蓋風化未洽之咎愚人何罪而肆重刑乎更彰朕之不德也用刑之道當審事理之輕重然後加之以刑罰何有不察其本而一概加誅非所以恤刑重人命之謂也又曰貞觀中制從立春至秋分不得奏決死刑其大祭祀及致齋日朔望上下弦二十四氣雨未晴夜未明斷屠日月及假日並不得奏決死刑又曰貞觀中制古者行刑君為徹樂減膳今庭無恆設之樂莫知何徹然對食即不啖酒肉自今己後刑人日勿進酒肉內教及太常並宜停教又曰永徽中高宗謂侍臣曰獄訟繁多皆由刑罰枉濫故禮曰刑者成也一成而不可變末代斷獄之吏皆以苛刻為明是以秦氏網密秋荼而獲罪者衆今天下無事四海乂安欲與公等共行寬政今日刑罰得無枉濫乎太尉無忌對曰陛下欲致刑網寬平臣下猶不識聖意此法斃來已久非止今日若情存體國即共號癡人意在深文便為能吏所以罪雖合杖必致遣徒理有可生務入於死非憎前人陷於死刑務取名耳陛下矜而令放法司亦肯固請但陛下喜怒不妄加於人刑罰自然適中高宗曰卿言是矣又曰神功初天后謂侍臣曰近者朝臣多被周興來俊臣等推勘相牽引咸自承服國家有法朕豈能違中間疑有枉濫更使近者就獄親問皆自承引不虛朕不以為疑即可其奏自周興俊臣死後更無聞有反逆者然則已前就戮者不有冤濫耶姚元崇對曰自垂拱已後被告身死破家者皆是枉酷自誣而死告者持以為功天下號為羅織甚於漢之黨錮陛下令近臣就獄問者近臣亦不保何敢輒有動搖被問者若翻言懼遭其毒手賴上天降靈聖情發寤誅鋤凶豎朝廷乂安今日已後臣以微驅及一門百口保見在內外官更無反逆者若後有徵驗反逆有實臣請受知而不告之罪上大悅曰前宰相皆順成其事陷朕為淫刑之主聞卿所説甚合朕心又曰陸象先為益州長史在官務以寬仁為政司馬韋抱貞言望明公稍行杖罰以立威名不然恐下人怠惰無所懼也象先曰為政者理則可矣何必嚴刑樹威損人益己恐非仁恕之道又曰開元二十五年刑部斷獄天下死罪惟有五十八人大理少卿徐嶠上言大理獄院由來相傳殺氣大盛鳥雀不栖槱至是鵲巢其樹於是百寮上表賀以為幾至刑措又曰大宗性仁恕言事者諫曰陛下為政傷於太寬朝典由是不肅上笑而答曰今時運艱難凡人臣事朕者窺少祿利耳今府庫空竭無俸入俾之優足但峻刑科是君上有威無恩朕所不忍行也管子曰夫爭強之國先爭刑令國之輕重者刑也文子曰道狹然後任智德薄然後任刑明淺然後任察任智者心亂任刑者上下恐任察者下求善以事其上莊子曰賞罰利害五刑之辟教之末禮法度數刑名比詳治之末也又曰民為外刑者金與木也為內刑者動與過也霄人之離外刑也金木訊之離內刑也陰陽食之免內外之刑者唯真人能之司馬法曰先王之治從天之道設地之宜乃作五刑以禁民僻乃興甲兵以討不義制瑞節以通使巡狩省方以會諸侯考不同正禮月正時歷考不同者正法度齊於天子法度也正禮者上下之禮也月正時歷者月正朔名也時歷時氣正月相應也名文章車服名月爵稱文章車服所以顯有德異尊卑使不踰制度也天子法度不從命為亂常法也比德逆天之時比敗德不行也不順時生殺之敘也乃徵師於諸侯征之不會朝過聘則劉劉殺也諸侯背數不會朝過聘則殺之廢貢職擅稱兵相侵削廢天子之命則黜不從王者法度則征其罪而黜之也改曆史衣服文章易禮變刑則放若奉王法則不之遠方娶同姓以妾為妻變太子專罪大夫擅立關絶降交則幽幽繫慢神省哀奪民之時重稅粟畜貨重罰暴虐自佚宮室過度宮婦過數則削地損爵尸子曰秦穆公明於聽獄斷刑之日揖士大夫曰寡人不敏使民入於刑寡人與有戾焉二三子各據爾官無使民困于刑繆公非樂刑民不得已也此其所以善刑也又曰車輕道近則鞭策不用鞭策之所用遠道重任也刑罰也者民之鞭策也商君書曰晉文將欲明刑於是合諸卿大夫於冀宮顛頡後至吏請其罪遂斷顛頡之脊人皆懼曰顛頡之有寵也斷脊以徇而況於我乎乃無犯禁者晉國大理呂氏春秋曰皋陶作士刑韓子曰殷之法灰棄於術者刑子貢以為重問之仲尼仲尼曰灰棄於術必燔人燔人怒則鬥鬥則三族相殺雖刑之可也又曰楚國法太子不得乘車王弟門時天大雨至急召太子庭中有淖太子遂馳第門庭理以殳擊馬遂敗其駕太子泣請王誅之王乃益廷理爵三級淮南子曰聖人因民之所喜而勸善因民之所惡以禁姦故賞一人而天下譽之罰一人而天下畏之故至賞不費至刑不濫孔子誅少正卿而魯國之耶塞子産誅鄧析而鄭國之姦禁又曰趙政晝決獄夜理書趙政秦皇帝也御史冠蓋接於郡縣覆督稽留戍五嶺以備越築城以守胡然姦邪萌生盜賊群居事愈煩而亂愈多故法者治之具也而非所以中也又曰子發為上蔡令民有當刑獄斷論定決於令前子發喟然有慘恤之心罪人以刑而不忘其恩子發楚威王臣也在春秋後日此其後子發得罪於威王而奔於刑者於城下之盧追者至蹀足而怒曰子發親決吾罪而吾怨之憯於骨體使我得肉而食之其知厭乎追者皆以為然不索其內果活子發白虎通曰聖人治天下必有刑罰何所以助治順天之度也故懸爵賞者示有所勸也設刑罰者明有所懼也傳曰三王肉刑應世以立刑者五帝之鞭策刑所以五何法五行也五帝畫其衣象五行也世本曰伯夷作五刑會稽典録曰闞澤字德潤山陰人也初呂一姦罪發聞有司窮治奏以大辟或以為宜加焚烈用彰其惡吳王以問澤澤曰盛明之世不宜有此刑遂從之徐幹中論曰政之大綱有二二者何賞罰之謂也君明於賞罰之道則治不難矣賞罰者不在乎必重而在於必行必行則雖不重而人肅不行則雖重而人怠故先王務賞罰之必行書曰爾無不信朕不食言汝不從誓言豫則孥戮汝桓範世要論曰德多刑少者五帝也刑德相半者三王也刑多德少者五霸也純用刑而亡者秦也又曰夫刑辟之作所從來尚矣聖人以治亂人以亡是以古屬帝王莫不詳慎之者以為人命至重一死不生一斷不屬故堯舜之明猶惟刑之恤是以後聖制法設三槐九棘之吏肺石嘉石之訴然由復三剌僉曰可煞然後殺之罪若有疑即從其輕此蓋詳慎之至也杜恕篤論曰聖王之制刑也非以害民也將以利民也故民從而安之非以陷民也將以導民也故民從而化之斷一人之獄而天下義之是安之也斷一人之獄而天下伏之是化之也當於民心合於道理所斷於民者不行於身公之也君臣正論曰書稱欽哉惟刑之恤又曰宥過無大刑故無小此前王明德慎罰之意也昔漢文感緹縈之孝遂去肉刑近則太宗明堂之圖欲寬背罰于公以陰德救物袁安恥職罪鞫人此前代聖主賢臣欽恤之志也
