body:
  text: 隴右道秦州十道志曰秦州天水郡禹貢雍州之域古西戎地秦始封之邑秦為隴西郡漢武置天水郡史記秦本紀曰周孝王時非子好馬及善畜養孝王曰昔柏翳為舜主畜多息故有土賜姓嬴今其後世亦為朕息馬遂分土地為附庸邑之秦使續嬴氏漢志曰天水郡莽曰填戎明帝改曰漢陽秦州記曰郡前有湖水冬夏無增減或說天水取名由此湖也漢志曰上邽屬隴西郡戎邑也又曰成紀清水並屬天水郡莽改清水曰識時輿地志曰石紐地名夏禹所生之地續漢書郡國志曰成紀古帝庖犧氏所生之地漢志曰略陽道屬天水郡十三州志曰略陽即故冀城也又曰街泉戎邑道屬天水郡續漢書地里志有街泉亭渭州十道志曰渭州隴西郡春秋及戰國時羗戎所居秦昭王伐得義渠戎王始置隴西郡禹貢曰導渭自鳥鼠同穴又曰終南敦物至于鳥鼠漢志豲道戎邑也屬天水郡即今隴西縣地豲音桓地道記曰漢陽有大坂名曰隴坻亦曰隴山郡處其西故曰隴西其山堆旁崩聲聞數百里揚雄所謂響若坻頹是也蘭州十道志曰蘭州金城郡禹貢雍州之域古西戎地秦併天下為隴西郡後漢書西羗傳曰羗無戈援劍曾孫忽留湟中忽子研立研最豪健故羗中號為研種秦始皇時務併六國兵不西行故羗人得蕃息及秦併天下築長城以界之眾羗不復南渡漢興匈奴冐頓強盛臣伏諸羗景帝時研種留何率人求守隴西於是徙留何於狄道漢志曰狄道屬隴西郡以其地有狄種故云狄道又曰浩亹水若西塞外東至允吾入湟水詩大雅曰鳧鷖在亹亦其義也蘭州有浩亹故城浩亹音閤門漢志曰金城郡領縣十三應劭曰初築城得金故曰金城瓚曰金取其堅固也故墨子曰金城湯池會州十道志曰會州會寧郡禹貢雍州之域古西羗地秦併天下屬隴西郡漢屬金城郡唐武德二年平李軌置西會州貞觀八年改為會州元和郡縣志曰後周太祖為西魏相來巡會師於此因置州為名唐貞觀中亦為粟州河州十道志曰河州安鄉郡禹貢雍州之域古西羗地秦併天下為隴西郡漢分置天水郡漢志曰枹罕屬金城郡故罕羗侯邑也抱音孚其子從木禹貢曰道河積石至于龍門積石山在金城西南西域傳曰河注蒲昌海潛行地下南出於積石山洮州十道志曰洮州臨洮郡禹貢雍州之域秦漢諸羗之地漢志曰洮水出西羗中北至抱罕東入河沙岷州十道志曰岷州和政郡禹貢雍州之域六國時屬秦秦併天下為隴西之臨洮縣史記曰蒙恬築長城起臨洮廓州十道志曰廓州寧塞郡禹貢雍州之域古西羗地漢書曰宣帝時諸羗數背叛後將軍趙充國屯隴西羇縻之諸羗不敢動後漢書叚熲傳曰延熹中燒當煎河勒姐等八種羗寇隴西金城熲追討大破之明年澆河大豪寇張掖熲斬澆河大帥五千餘人西羗於是弭定疊州十道志曰疊州合川郡禹貢梁州之域歷秦漢魏晉為諸羗所據後周書曰建德六年西逐諸戎始統有其地因置恒香郡尋改為疊州蓋以其地多山重疊以名郡也又於三交口築城置甘松防又為三川縣以隸恒香郡至建德元年改三川縣為常芬縣仍立芳州以邑隸焉取其地多芳草為郡之名鄯州十道志曰鄯州西平郡禹貢雍州之域古西戎之地漢志曰允吾屬金城郡今龍攴縣即其地涼州十道志曰涼州武威郡禹貢雍州之域六國至秦戎狄月攴居焉漢初為匈奴右地釋名曰西方寒凍或云河西土田薄故曰涼晉書曰姑臧城匈奴所築舊蓋臧城語訛後云姑臧又曰惠帝末張軌求為涼州於是大城此地為一會府以據之號前涼後呂光復據之號後涼禹貢曰原隰厎績至于豬野織皮崑崙析支渠搜西戎即敘續漢書曰西羗自賜支以西濱河首左右居今河關西可十餘里有河曲羗謂之賜支異物志曰古渠搜國當大宛北界豬野今姑臧界豬野澤是劉昞燉煌實錄曰晉安帝隆安元年涼州牧李暠微服出城逢虎道邊虎化為人遙呼暠為西涼君暠因彎弧待之又遙呼暠曰有事告汝無疑也暠知其異投弓於地人乃前曰燉煌空虛不是福地君之子孫王於西涼不如徙酒泉言訖乃失暠乃移都酒泉後漢書曰安帝時匈奴寇常山於是西北有事民飢民用不足大將軍鄧騭欲棄涼州專務北邊曰譬若家人衣壞敗一以相補猶有所完若不如此將兩無所保郎中虞討曰大將軍之策不可者三先帝闢境而今棄之不可一也棄涼州即以三輔為塞園陵單外不可二也諺曰關西出將關東出相烈士武臣多出涼州風土壯猛便習兵事今羗所以不過三輔為腹心害者以涼州在其後也甘州十道志曰甘州張掖郡禹貢雍州之域六國至秦戎狄月支居焉漢為匈奴右地尚書禹貢曰道弱水至于合黎十道志曰今張掖有合黎水漢志西域傳日月支本居祁連燉煌間霍去病傳曰濟居延遂臻小月支攻祁連即此道也漢志曰張掖郡匈奴昆邪王地武帝時開之莽曰設屏應劭曰張國臂掖故曰張掖也又曰鱳得屬張掖郡有千金渠西至樂涫入澤中莽曰官式涫音官音鹿又曰刪丹屬張莽曰貫虜肅州十道志曰肅州酒泉郡禹貢雍州之域古西戎地月支所居漢為武威酒泉郡也漢書曰武帝元狩二年昆邪王殺休屠王將其眾來降以其地為武威酒泉郡又匈奴傳曰漢置酒泉郡以隔絕故與羗通路又西通月支大夏以公主妻烏孫王以分匈奴西方之援國其水甘若酒故名酒泉後漢書曰班超久在西域年老思土上書曰臣不敢望到酒泉郡但願生入玉門關玉門屬燉煌今沙州也去長安三千六百里酒泉今肅州也去長安二千八百五十里路瓜州十道志曰瓜州晉昌郡禹貢雍州之域古西戎地戰國時烏孫月支居焉漢初為匈奴右地後為武威酒泉二郡漢志曰寘安屬燉煌郡寘水出焉又名籍端水出羗中西入澤寘安即晉昌地又曰廣至宜禾都尉治昆侖障莽曰廣桓即常樂地有宜禾故城沙州十道志曰沙州燉煌郡禹貢雍州之域古西戎地秦屬西戎漢置燉煌郡左傳范宣子數戎子駒支曰昔秦人迫逐乃祖吾離于瓜州蒙犯荊棘以來歸我先君惠公有不腆之田與汝剖分而食之瓜州地在燉煌漢書曰武帝元鼎六年分酒泉置燉煌郡徙人以實之應劭曰燉大也皇盛也又西域傳曰東則接漢扼以玉門陽關今壽昌有陽關及玉門故關漢志曰燉煌郡龍勒縣有陽關玉門關伊州十道志曰伊吾郡本伊吾盧地在燉煌之北大磧之外南去玉門八百里後漢書曰永平十六年明帝命將北征取伊吾盧地置宜禾都尉以屯田又西羗傳曰伊吾地宜五穀桑麻蒲陶其北有柳中皆膏膄之地故漢與匈奴爭車師伊吾之地以制西戎西州十道志曰西州交河郡漢書西域傳曰車師後王國有新道通玉門關戊已校尉徐普欲開以省道里半以避白龍堆之扼車師後王姑勾以道通為不便即馳突出高昌壁入匈奴後魏書曰以其地勢高峻人物昌盛因名高昌庭州十道志曰庭州雍州之外流沙之西北前漢烏孫舊地東與匈奴接歷代為胡慮所居漢書西域傳曰貳師伐西域諸國震懼自燉煌西至鹽澤往往起亭而輪臺渠黎多有田卒後漢書曰班超將兵擊伊吾於蒲類海
