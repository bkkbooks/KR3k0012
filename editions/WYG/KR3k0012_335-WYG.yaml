  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_335-1a, image: WYG0896/WYG0896-0022c.png}
body:
  text: 太平御覽卷三百三十五宋李昉等撰兵部六十六營壘烽燧京觀營壘孫子曰絶斥澤唯亟去無留為交軍於斥岸之中必依水草背衆樹此處斥澤之軍也平陸處易車之利也而右背髙前死后生㦸便也此處平陸軍也禮記曰四郊多壘卿大夫之辱也左傳曰許伯致師御靡旌摩壘而還史記曰黄帝修徳振兵與神農戰于阪泉之野以師兵為營衛漢書曰周亞夫軍於細栁天子入壁門而不得進上曰此真將軍又曰李陵浚稽山與單于相值可三萬陵軍居兩山間以大車為營陵引士出營外為陣前行持弓弩令曰聞金聲而止虜還見漢軍少直前就營陵搏戰攻之如淳曰手對戰也千弩俱發應弦而倒虜還走上山漢軍追擊殺數千人單于大驚後漢書曰岑彭伐蜀所營地名彭亡聞而惡之欲徙㑹日暮蜀刺客詐為可奴䧏夜刺殺彭又曰樊宏王莽末與宗家親屬作營塹自守老弱歸之者千餘家時赤眉賊欲前攻宏營宏遣人持牛酒米榖勞遺赤眉赤眉長老聞宏仁厚背稱曰樊君素善且今見待如此何必攻之引兵而去遂免冦難又曰第五倫少介烈有義行王莽末盗賊起宗族閭里爭徃附之倫乃依險固築營壁有賊輙奮厲有衆引彊持滿以拒之又曰吳漢自將􅇍騎二萬餘人進逼成都去城十餘里阻江北為營作浮橋使副將軍劉尚將萬餘人屯於江南漢記曰龎萌攻蓋延延與戰破之詔書勞延曰龎萌一旦反叛相去不逺營壁不堅殆令人齒欲相擊而將軍有不可動之節吾甚美之魏志曰鄧艾毎見髙山大澤輙規謀相度指畫軍營處所時人皆笑之又曰諸葛亮死軍退司馬宣王幸其營壘曰天下竒才也又曰曹公征馬超於關中軍於渭南為賊衝突營不得立地又純沙不得版築其將婁伯説公曰今天寒可起沙為城以水灌之湏臾冰堅如鐵石不俟達曙百堵可立雖金湯之固未能過也公從之比明已就又曰蜀先主帥兵東下伐吳魏文帝聞其樹柵連營七百餘里謂羣臣曰彼不曉兵豈有七百里營可以拒敵者乎苞原隰險阻而為軍者為敵所擒此兵忌也緩急不相救一軍潰則衆心恐矣數日果有吳㨗書至晋書曰沮渠䝉遜載記曰改業築西安城以其將臧莫孩為太守蒙遜曰莫孩勇而無謀知進忘退所謂為之築家非築城池也業不從俄而為吕纂所滅又曰姚萇破魏褐飛於杏城萇命其將當城扵營處一柵孔中蒔樹一根以旌戰功嵗餘間之城曰營所至小已廣之矣萇曰少來鬭戰無如此快以一千六百人破三萬衆國之事業由此剋舉小乃為竒大何足貴又曰成都王潁憚長沙王乂在内遂與河間王顒表請誅后父羊元之左將軍皇甫商等檄又使就第乃與顒將張方伐京都以平原内史陸機為前將軍假節潁至朝歌每夜矛㦸有光若火其壘井中皆有龍像進軍屯河南阻清水為壘造浮橋以通河北以大小凾盛石沉之以擊橋名曰石鼈崔鴻後趙錄曰河瑞元年石勒下冀州郡縣堡壁有衆至十餘萬其衣冠人物集為君子營宋書曰宗越善立營陣毎數萬人止頓自騎馬前行使軍人隨其後馬至營合未嘗叅差梁書曰王僧辨陳覇先之破侯景也耀軍于張公洲髙旗巨艦過江蔽日乗潮順流景登石頭城而覩之不悦曰彼軍上有如是之氣不可易也因率鐡騎萬人聲鼓而進覇先謂辨曰善用兵者如常山之蛇首尾相應賊今送死欲為一戰我衆彼寡宜分其勢僧辨然之乃以强弩攻其前輕鋭蹂其後徑衝其中景遂大潰棄城而遁後周書曰楊猛征潼關封郃陽伯邑百七戸俄而潼關不守猛于善渚谷立柵收集義徒授征東將軍揚州刺史大都督武衛將軍仍鎮善渚大統三年為竇㤗所襲猛脱身得免太柤以衆寡不敵弗之責也仍配兵千人守牛尾堡唐書曰徳宗幸奉天李晟赴難李懐光以朔方軍屯咸陽不欲晟獨當一面以分功乃奏請晟兵詔令晟将兵合懐光軍晟引兵至陳陶斜軍壘未周賊出兵來攻晟乃出陣且言於懐光曰賊堅保宫苑攻之未必克今出穴而欲一戰此殆天以賊賜明公也懐光恐晟有功乃曰馬未銜秣士不素飽不若歛兵俟時而發晟乃收軍入壘又曰髙宗遣將軍裴行儉討突厥軍至戰于都䕶府之北際晚下營壕壍方周遽令移就崇岡將士云衆已就安堵不可勞擾行儉不從更令徙之此夜風雨暴至前設營所水深丈餘將吏驚服問行儉曰何以知風雨也行儉笑曰自今但依我節制何湏問我所由知也三國典畧曰蕭紀兵次西陵艫舳干戈翳川曜日䕶軍陸法和于硤兩岸築二壘運石填江鐡鏁斷之梁主令法和壘北斷白鴈城道别立小柵孟子曰天時不如地利地利不如人和三里之城七里之郭環而攻之而不勝夫環而攻之必有得天時者矣然而不勝者是天時不如地利也城非不髙也池非不深也兵革非不堅利也米粟非不多也委而去之是地利不如人和也博物志曰處士東鬼塊責禹亂天下事禹退作三章强者攻弱者守敵者戰城蓋禹始也太公兵法曰張軍處將必避七舍七殃武王曰何謂七舍七殃太公曰張軍勿居天社勿居地社勿居虛噐勿居宿死勿居吞害勿居蜚鋒勿居枯泉武王曰何謂天社太公曰地髙而仰者也何謂地社卑而下者也何謂虛噐攻敗邑人莫居之者也何謂宿死冡墓丘陵間也何謂枯泉枯澤無水者也何謂吞害即人所聚五榖處也何謂蜚鋒地斥鹵而不生草木也所謂七舍七殃不張軍處將也太白陽經曰偃月營形象偃月背背山岡面陂澤輪逐山勢弦隨面直地窄山狹之所營又曰偃月外營右置上弦門中置偃月門左置下弦門文選曰夜薄休屠營盧思道從軍行曰平明偃月屯右地薄暮魚麗逐左賢烽燧説文曰烽燧候火也邊有警則舉火也漢書音義曰髙臺上作桔槔頭置兠零以薪草置其中常懸之有冦則火然舉之曰烽下多積薪冦至則燔之望其煙曰燧晝則燔燧夜乃舉烽廣雅曰兠零箭也史記曰周幽王后褒姒好舉烽火叩賊鼔方喜王欲后喜輙詐為之後犬戎兵至舉烽火叩賊鼓羣臣不救皆曰王欲后喜耳遂殺幽王及褒姒又曰魏王與信陵君愽北境舉烽火言冦入界信陵君曰臣有客能知趙王隂事言趙王獵非冦也漢書曰單于立四嵗匈奴復絶和親大入上郡雲中烽火通於甘泉東觀漢記曰郭伋為并州伋知盧芳賊難卒以力制常嚴烽候明購賞以結冦心又曰馬成繕治障塞自西河至渭橋河上至安邑太原至井陘中山至鄴皆築堡壁起烽燧十里一候後漢書曰亷范為雲中太守㑹匈奴入塞烽火日通故事虜入度五千人乃移書傍郡求助吏白今虜兵度出五千人請移檄范不聼遂選精兵自率士卒拒之又曰驃騎大將軍杜茂屯北邊築亭候修烽燧後周書曰宇文貴性聰敏過目就記嘗道逢二人謂其左右曰此人是縣黨何因就行左右不識貴便説其姓名莫不嗟伏白獸烽經為商人所燒烽師納貨不言其罪他日此師隨例來叅貴乃問云商人燒烽何因私放烽師愕然遂自首伏明察如此隋書曰突厥染干為雍閭所敗與長孫晟獨以五騎逼夜南走至旦行百餘里收得數百騎乃相與謀曰今兵敗入朝一降人耳夫隋天子豈禮我乎突厥雖來本無寃隙若徃投之必相存濟晟知其懐二心乃宻遣從者入伏逺鎮令速舉烽染于見四烽俱發問晟曰城上然烽何也晟紿之曰城髙地逈必遥見賊來我國家法若賊少舉二烽來多舉三烽大逼舉四烽使見賊多而又近耳染于大懼謂其衆曰追兵已逼且可投城既入鎮晟留其達官執質以領其衆自将染于馳驛入朝唐書曰元和中京兆尹李􅅠奏三原髙陵涇陽興平等四縣共管􅇏二十八所每年差烽子烽師九百七十五人今逺近無虞畿内烽燧請停從之𤣥女戰經曰諸見舉烽火傳言虜且起欲知審來否以言者時所加之得陽者不得陽者為來法晉令曰誤舉􅇏燧罰金一斤八兩故不舉者棄市甘氏天文占曰權舉烽表逺近沉浮權四星在轅尾西邊地警備烽候相望虜至則舉烽火十丈如今之井桔橰火錘其頭若警備急燃火放之權重本低則末仰見烽火吳時縁江戍圖曰每刺姦屯有五兵賊曹一人皆作烽火有急以光傳之黄帝出軍决法曰行軍行兵兩燧相要地形不便望見烽火不得為客衛公兵法曰烽臺於髙山四顧險絶處置之無山亦於孤逈道平地置下染羊馬城髙下任便常以三五為准臺髙五丈下闊一丈形圖又曰諸軍馬擬停三五日即湏去軍一二百里以來安置爟烽如有動静舉相見其烽並於賊路左側逐要置毎二十里置一置應接令遣到軍其逰奕馬騎晝日逰奕候視至暮速即分食喫即移十里外止宿慮防賊徒暮間見烟火夜間掩襲捉將其賊路左右草中着人宿止以聼賊徒如覽來報燧家舉烽逓報軍司如覺十騎以上五騎以下即放火炬火箭前烽應訖即滅火若百騎以上二百以下即放兩炬火准前應滅賊若五百騎以上五千騎以下即同放三炬火准前應滅前烽應訖即赴軍若慮走不到軍即且投山谷逐空方可赴烽如以次烽候視不覺其舉火之烽即湏差人急走告知既置爟烽軍内即須應接又置一都烽應接四山諸燧其都烽如見烟火急報大總管云某道烟火起大總管須當嚴備収拾生畜遣人逺拓每燧令别奏一人押一道烽令折衝果毅一人都押庾闡楊都賦注曰烽火以置於孤山頭縁江相望或百里或五十里或三十里冦至則舉以相告一夕可行萬里孫權時合暮舉燧於西陵鼓三竟達吳都南徐敬業古意曰甘泉警烽侯上谷抵樓蘭北門行曰羽檄起邊庭烽燧入咸陽張景陽雜書曰長鋏鳴鞘中烽火烈邊庭蔡邕徙朔方上書曰既到徙所乗塞守烽職在候望憂怖燋灼無心復能操筆成草致章闕庭蔡謨與弟書曰軍之耳目當用烽鼓烽可遙見鼓可遙聞須臾百里京觀左傳曰丙辰楚軍於邲遂次于衡雍潘黨曰君盍築武軍築武軍營以章武功而収晋屍以為京觀臣聞剋敵必視子孫以無忘武功楚子曰非爾所知也夫文止戈為武武王克商作頌曰載戢干戈載櫜弓矢我求懿徳肆于時夏古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀懲淫慝又曰齊侯伐晉取朝歌為二隊入孟門登太行張武軍於榮庭戍郫邵封少水以報平隂之役乃還又曰秦伯伐晉濟河焚舟封殽尸而還遂霸西戎崔鴻夏録曰赫連勃勃大破南凉殺衆數萬以人頭為京觀號曰髑髏臺梁書曰天殱醜類宜為京觀用旌武功太平御覧卷三百三十五
