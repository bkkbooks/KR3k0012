  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_597-1a, image: WYG0898/WYG0898-0433a.png}
body:
  text: 太平御覽卷五百九十七宋李昉等撰文部十三檄露布檄說文曰檄二尺書也從木敫聲釋名曰檄激也下官所以激迎其上之書文也李充翰林論曰盟檄發於師旅相如喻蜀父老可謂徳音矣又起居戒曰軍書文檄非儒者之事且家奉道法言不及殺語不虛誕而檄不切厲則敵心陵言不誇壯則軍容弱請姑舍之以待能者文心雕龍曰昔有虞氏始戒於國夏后初誓於軍殷誓軍門之外周將交刃而誓之故知帝世戒兵三王誓師宣訓我衆未及敵人也至周穆西征祭公謀父稱古有威讓之令有文誥之詞即檄之本源也及春秋征伐自諸侯出懼敵不服故兵出湏名振此威風暴彼昏亂劉獻公所謂告之以文詞董之以師武者也齊桓征楚詰菁茅之闕晉厲伐秦責箕郜之焚管仲吕相奉詞先路詳其意義即今之檄文暨乎戰國始稱為檄檄者皦也宣布於外皎然明白也張儀檄楚書以尺二明白之文或稱露布夫兵以定亂莫敢自專天子親戎則稱㳟行天罰諸侯禦師則云肅將王誅故分閫推轂奉詞伐罪非唯致果為毅亦且勵詞為武使聲如衡風所擊氣似欃槍所掃􅁬其武怒總其罪人乗其惡稔之時顯其貫盈之數揺姦宄之膽訂信慎之心使百尺之衝摧折於咫書萬雉之城顛墜於一檄者也觀隗􅅝之檄亡新布其三逆文不雕餙而詞切事明隴右文士得檄之體也陳琳之檄壯有骨鯁雖姦閹携養章宻太甚發丘模金誣過其虐然抗詞書釁皦然暴露鍾㑹檄蜀徴騐甚明桓溫檄胡觀釁尤切並壯筆也凡檄之大體或述此休明或叙彼苛虐指天時審人事筭强弱角權勢摽蓍龜於前騐懸鞶鑑於已然雖本國信實叅兵詐詭譎以馳㫖煒􅁮以騰說凡此衆條莫之或違者也故其植義颺詞務在剛徤挿羽以示迅不可使詞緩露板以宣衆不可使義隠必事昭而理辨氣盛而詞斷此其要也若曲趣宻巧無所取才矣史記曰張儀魏人嘗從楚相飲相亡璧意儀盗之掠笞數百後儀既相秦為檄告楚相曰吾從汝飲不盗汝璧善守汝國我且盗汝城漢書曰申屠嘉為丞相鄧通在上旁怠慢嘉奏事因言曰陛下幸愛羣臣則富貴之至於朝廷之禮不可以不肅上曰君勿言吾思之罷朝嘉為檄召通曰不來且斬通恐言於上上曰速徃吾令召汝通至丞相府免冠徒跣頓首謝嘉嘉不為禮責曰朝廷者髙帝朝廷也通小臣戯殿上大不敬當斬勑吏令决行斬之通頓首血出不觧文帝度嘉已困通持節召通而謝嘉曰此吾弄臣君釋之東觀漢記曰光武數召諸將置酒賞賜坐席之間以要其死力當此之時賊檄日以百數憂不可勝上猶以餘閒講經藝又曰廬江毛義性恭儉謙約家貧以孝行稱南陽張奉聞其名徃候之坐有頃府檄適至以義守安陽令義捧檄持入白母喜動顔色後漢書曰耿恭為戊巳校尉移檄烏孫示漢威徳大昆彌已下皆喜遣使獻名馬又曰隗􅅝故宰府掾吏善為文書每上移檄士大夫莫不諷誦魏書曰陳琳作檄草成呈太祖太祖先苦頭風是日疾發卧讀琳所作翕然而起曰此愈我疾初太祖平鄴謂陳琳曰君昔為本初作檄書但罪孤而已何乃上及父祖乎琳謝曰矢在弦上不得不發太祖愛其才不咎又曰劉放善為書檄太祖詔命有所招喻多放之所為張華别傳曰駕西征鍾會次長安華兼中書侍郎從行掌軍中書䟽表檄文帝善之晉書曰易雄長沙人也為舂陵令刺史譙王承既拒王敦將謀起兵以赴朝廷雄承符馳檄遠近列王敦罪惡城䧟為其所虜意氣慷慨神色無忤送到武昌敦遣人持檄示雄而數之曰此實有之惜雄位微力弱不能救國之難王室如燬安用生為今日即戮得作忠鬼乃所願也敦憚其辭正釋之衆人皆賀雄笑曰昨夜夢乗車掛肉其傍夫肉必有筋筋者斤也車傍有斤吾其戮乎㝷而敦遣殺之當時見者無不傷惋又曰張軌為凉州刺史時晉昌張越凉州大族䜟言張氏覇凉自以才力應之越初為梁州刺史而志在涼州遂托病歸河西隂謀代軌乃遣兄鎮及曹袪麴佩移檄廢軌軌遣主簿奉表詣闕將歸老宜陽長史王融叅軍孟暢蹹折鎮檄排閣入諫軌黙然從之又曰元帝遣揚威將軍甘卓建威將軍郭逸攻周馥於壽春安豐太守孫惠率衆應之使謝摛為檄摛馥之故將也馥見檄流涕曰必謝摛之辭摛聞之遂毁草旬日馥衆潰續晉陽秋曰何無忌母劉牢之女弟也無忌與高祖謀夜於屏風裏製檄文母潜於屏風上窺既知其謀大喜謂曰汝能如此吾讐耻雪矣嵇氏世家曰含字君道為中書郎書檄雲集含不起草北齊書曰髙祖西討命中外府司馬李義深知相府城局李士畧共作檄文二人皆辭請以孫搴自代髙祖引塞入帳自為吹火催促之搴援筆立成其文甚美髙祖大恱即署相府主簿専典文筆梁書曰元帝擒宋子仙及丁和送之江陵並下於獄子仙檄湘東曰既瞎且尰爾勇伊何即書記沈炯之文也有司焚燬湘東弗知僧辨購炯獲之酧錢十萬炯既不敢謁見惟謟事於僧辨自此軍書咸出於炯又曰王偉洛陽人也學通周易嘗在掲陽賦詩曰平明聼戰鼔薄暮叙存亡楚漢方龍闘秦關陣未央既至江陵繫之於獄以詩贈湘東嬖人曰趙壹能為賦鄒陽觧獻書何惜西江水不救轍中魚又上五十韻詩以希不死湘東愛其詞翰猶欲未誅左右嫉之乃曰偉前檄文言湘東不順湘東取視其檄云項羽重瞳尚有烏江之敗湘東二目寧為赤縣所歸湘東大怒釘其舌於柱剜其臍抽其腸出乃斬之陳書曰趙知禮渉獵文史善書翰武帝之討元景仲也或薦之引為記室知禮為文贍速每召製書下筆便就率皆稱㫖又曰顧野王愽識洽聞侯景之冦率鄉黨隨郡守舉兵赴援文檄皆以委之口占便就未嘗起草國朝傳記曰元萬頃初為李勣記室勣征遼東令作檄書云不知守鴨緑之險莫離支報曰謹聞命矣遂移兵固守官軍不得入萬頃坐流嶺南唐書曰李巨川為華州掌書記時李茂貞犯京師天子駐蹕於華韓建以一州之力供億萬乗恐其不濟遣巨川傳檄天下請助轉餉同匡王室完葺京城四方書檄酬報輻輳巨川灑翰陳叙文理俱愜昭宗深重之時巨川之名聞於天下移文心雕龍曰移者易也移風易俗令徃而民隨者也相如之難蜀老文曉而喻博有移檄之骨焉及劉歆之移太常詞剛而義辨文移之首也陸機之移百官言簡而事顯武移之要者也故檄移為用事兼文武其在金革則逆黨用檄順命資移所以洗濯民心堅同符契意用小異而體義大同漢書曰劉歆字子駿成帝時與父尚俱領校書講六藝傳記後王莽篡位為京兆尹哀帝時與五經博士講論諸儒博士不肯置對歆因移書太常博士後漢書曰韓馥見民情歸袁紹忌其得衆恐將圖已嘗遺從事守紹門不聽發兵喬瑁乃詐為三公移書傳檄州郡說董卓罪惡企望義兵以釋國難馥於是方聼紹舉兵齊書曰孔稚珪字徳璋會稽人也周彦倫隠於北山後應詔出為鹽官令欲過北山乃假山靈之意移文於北山三國典畧曰衛襄字叔遼河東人脩行至孝州郡嘉之時有白波賊衆数萬人官兵誅伐不能平賊曰使叔遼要我願散於是襄為移書即平定王隠晉書曰毛寳㨿邾城城䧟寳尸沉江不出戴洋移告河伯寳尸立出梁書裴子野傳曰普通七年大舉北侵勑子野為移魏文受詔立成武帝以其事體大召尚書僕射徐勉太子詹事周捨鴻臚卿劉之遴中書侍郎朱异集壽光殿以觀之時並歎服武帝目子野曰其形雖弱其文甚壯勑為書喻魏相元乂其夜受㫖子野謂可待旦方奏未之為也及五皷勑催令速上子野徐起操筆撰之昧爽便就既奏武帝深嘉焉自是凡諸符檄皆令具草子野為文典而雅不尚靡麗其制作多法古與今文體異當時或有詆訶者及既見翕然重之或問其為文速者子野答言曰人皆成於手我獨成於心露布文心雕龍曰露布者葢露板不封布諸視聼也後漢書曰鮑永為司𨽻校尉子昱復拜焉後詔昱詣尚書使封胡降檄光武遣小黄門問昱有所怪不對曰臣聞故事通官文書不著姓又當司徒露布怪使司𨽻下書而著姓也帝報曰吾故令天下知忠臣之子復為司𨽻也後魏書曰邢巒從征漢北巒後至髙祖曰至此以來雖未擒㓕城隍已崩想在不遠所以緩攻者正待中書為露布耳又曰髙祖每嘆曰上馬能擊賊下馬作露布惟傅修期耳又曰髙祖車駕南伐以韓顯宗統大軍破蕭鸞軍斬其將高法援等顯宗至新野高祖曰卿破賊斬帥殊益軍勢朕方攻堅城何為不作露布也顯宗曰臣頃聞鎮南將軍王肅獲賊二三驢馬數疋皆為露布臣在東觀私每哂之近雖仰憑威靈得摧醜虜斬擒不多脫復髙曵長縑虛張功捷尤而效之其罪彌甚所以歛毫卷帛解上而已又曰彭城王勰從征齊軍帝令勰為露布勰曰露布者布於四海露之羣臣以臣小才豈足大用帝曰汝亦才逹但可為之及就猶類帝文人咸謂御筆帝曰非兄即弟誰能辦之勰對曰子夏被嗤於先聖臣又荷責於來今後周書曰宇文神舉幽州人盧昌期祖英伯等聚衆㨿范陽反詔神舉率兵討之齊黄門侍郎盧思道亦在反中賊平見獲觧衣將伏法誅神舉素欽其才名乃釋而禮之即令草露布其待士禮賢如此又曰周人吕思禮好學有文才雖務兼軍國而手不釋卷晝理政事夜則讀書令蒼頭執燭燭燼夜有數升沙苑之㨗命為露布食頃便成周文歎其工而且速北齊書曰杜弼從高祖破西魏於邙山命為露布弼即書絹曾不起草世說曰桓武北征袁虎時從被責免官會湏露布文喚袁倚馬前令作手不蹔輟俄頃得七紙殊可觀王東亭亦在側絶歎其才國史補曰李晟破朱泚徳宗覽收城露布之文云臣已肅清宫禁祗謁寢園鍾虡不移廟貌如故上感泣失聲左右六宫皆嗚咽論者以國朝捷書露布無如此者于公異之詞也公異後為陸贄所忌誣以家行不至賜孝經一卷坎􅇄而終太平御覽卷五百九十七
