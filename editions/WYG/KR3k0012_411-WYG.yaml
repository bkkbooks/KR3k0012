body:
  text: 太平御覽卷四百一十一宋李昉等撰人事部五十二孝感孝經左契曰元氣混沌孝在其中天子孝天龍負圖地龜出書大孽消滅雲景出遊孝經援神契曰庶人孝則木澤茂浮珍舒恪草秀水出神魚此庶人謂有徳不仕若曾子之孝千里感母能使其域致珍也東觀漢記曰明帝光武第四子隂后所生即祚長思逺慕至踰年廼率諸王侯公主外戚郡國計吏上陵如㑹殿前禮正月上謁原陵夢先帝太后如平生親率百官上陵其日降甘露積於樹百官取以薦㑹畢上伏御牀視太后鏡奩中物感慟悲涕令易脂澤粧具左右皆泣莫能仰視又曰姜詩字士逰廣漢雒人遭値年荒與婦傭作養母賊經其里束兵安歩云不可驚孝子母好飲江水兒常取水溺死夫婦痛恐母知詐云行學嵗作衣投于江中俄而涌泉出於舍側味如江水井旦出雙鯉魚謝承後漢書曰方儲字聖明丹陽歙人㓜喪父事母母終自負土成墳種竒樹千株白兎逰其下魏略曰程堅字謀甫南陽人居貧以磨鏡給養母喪哀號􅇫下有馬每聞堅哭輒淚出暫輟芻草晉書曰王祥性至孝繼母朱氏不慈常令掃除牛下祥愈恭謹父母有疾衣帶不解母令守柰實每風雨至抱樹而泣母又思黄雀炙忽有十數黄雀飛入幕以供母食又母冬月欲食生魚祥脱衣剖冰求之雙鯉躍出鄉里以為孝感所致又曰呉隠之字處黙年十嵗丁父憂每號哭行人為流涕家貧無人鳴鼔每至號哭之時有雙鶴驚呌及祥練之夕復有群鴈俱集時人咸以孝感所致晉中興書曰何璋字萬倫遭母憂停柩在殯為隣火所逼烟焰已交家乏僮役計無從出乃匍匐棺所號哭而已俄而風止火息堂屋一間乃免又曰烏程呉達往經饑饉父母兄嫂及群小從㓜之親十有三人達病篤鄰里咸葦裹布而埋之親屬皆盡存者唯達夫妻而已家徒四壁晝則傭賃夜還燒磚伐木夜在山草屢遇虎虎下道避之夫妻勤苦期年中成七墓十二棺鄰里嘉尚其志義葬日悉出助之太守張崇之義其志行加羔鴈之禮命補功曹吏達以門寒固辭不就蕭子顯齊書曰永興王氏女年五嵗得毒病兩目皆盲性至孝年三十父死臨尸一呌眼皆血出小妹娥䑛其血左目即開時人稱為孝感崔鴻十六國春秋前趙録曰劉殷七嵗喪父哀毁過禮曾祖母王氏盛冬思堇殷年九嵗乃詣澤中慟哭忽若有人云止止聲殷收淚視地見有堇生焉得斛餘而歸食而不減至堇生乃盡其夜夢神謂殷曰西籬下有粟寤而掘之得粟十五鍾焉銘曰七年粟百石以賜孝子劉殷自是食之七年乃盡又曰王延元西河人也九嵗喪母後母卜氏遇之無道延供事彌謹卜恒取蒲穰及敗麻頭與延貯衣其姑聞而問之延知不言卜盛冬勑延云思生魚延求魚不獲卜抶之流血延㝷汾扣凌而哭得生魚一雙長五尺卜食之積日不盡卜乃心寤撫延如親子秦記曰苻健皇始元年晉梁州刺史司馬勲入秦州獲尚書趙琨殺而棄其尸琨子煥求父尸不得乃悲號不已俄有羣鳥悲鳴從山而來來而復反㝷鳥向山而得父尸南史曰潘綜呉興烏程人也孫恩之亂妖黨破村邑綜與父驃共走避賊驃年老行遲賊轉逼驃語我不能去汝走可脱幸勿俱死驃因坐地綜迎賊叩頭曰父年老乞賜生命賊至驃亦請賊曰兒年少自能走今為孝子不去老子不惜死乞活此兒賊因斫驃綜抱父於腹下賊斫綜頭面凡四創綜當時悶絶又一賊從傍來相謂曰卿欲舉大事此兒以死救父不去何可殺殺孝子不祥賊乃止父子乃得免齊書曰匡昕字令先廬陵人有至性隠金華山服食不與俗人交母病已經七月昕奔還號呌母即蘇皆謂孝感所致齊春秋曰宗元卿字希符早孤為祖母所養祖母病元卿在遠輒心痛大病則大痛小病則小痛如此常也又曰焦華父遺曾病甚冬中思𤓰華忽夢人謂之曰聞爾父思𤓰故送助養呼從者進之華跪受寤而𤓰在手香非常也父食之而病愈乂曰劉靈哲字文明母病祈禱至多忽夢一人以藥與之曰煎服之即差驚寤於枕間得所夢之藥以竹根煎服之立差餘根於齋前種葉似鳬茨莫有識者又曰蕭叡明字景懠在計切母風病積年晝夜祈禱時寒叡明下淚為冰筋額上叩血出冰不流忽有一人以小石函授之曰此能治丈夫百病叡明受忽不見人以函奉母唯有三寸絹丹書為日月字母即平愈又曰解叔謙字楚梁母有疾於夜庭中祈禱聞空中云此疾無他得丁公藤為酒便差即詣醫及本草皆無識者乃求訪至宜都遥覩山中一老翁伐木問其所用答曰此丁公藤治風尤驗叔謙伏地流涕具欵求意此翁與之四叚并示漬酒法叔謙拜領受之復視翁不見依法為酒母疾頓愈梁書曰陸襄字師卿襄母嘗卒患心痛醫方須三升粟漿是時冬月日又逼暮求乞無所忽有老人詣門貨漿量如方劑始欲酬直無何失之時以襄孝感致焉又曰臧盾有孝性隨父宿直於廷尉母劉氏在宅暴亡盾左手中指忽痛不得寢及曉宅信果報凶問其感通如此又曰甄恬字彦約數嵗喪父哀戚有如成人年八嵗問其母恨不識父悲泣累日忽若有見言其形狀則其父也及母亡廬于墓有鳥𤣥黄色集于廬樹恬哭則鳴止則無聲陳書曰呉明徹㓜孤性至孝年十四感墳塋未備家貧無以取給乃勤力耕種時天下亢旱苖稼燋枯明徹哀憤每之田中號哭仰天自訴居數日自田還者云苖已更生明徹疑其欺已及往如言秋而大獲足充葬用三國典略曰柳遐母嘗乳間發疽醫云須人吮膿遐應聲即吮旬日遂瘳咸以孝感所致後魏書曰王崇字乾邕陽夏雍邱人也母亡杖而後起鬂髮墮落未及還葬柩殯宅西崇廬於殯所晝夜哭泣鳩鴿羣至有一小鳥素質黑眸形大於雀栖於崇廬朝夕不去母喪始闋復丁父憂哀毁過禮是年陽夏風雹所經之處禽獸暴死草木摧折至崇田畔風雹便止禾麥十頃無所損落及過崇地風雹如初咸稱至行所感乂曰呉悉達河東聞喜人父母為人所殺四時號慕悲感鄉鄰及長報仇避地永安後欲改葬嵗月淹久亡失墳墓連年於聞喜舊鄉推㝷弗獲號哭之聲晝夜不止周遊廵歴呌訴神祗忽於悉達足下地䧟得父銘記因葬曾祖已下三世九喪後周書云張元字孝始芮城人年十六祖喪明三年元居憂泣遂請七僧燃七燈七日七夜轉藥師經行道言曰元為孫不孝使祖喪明今日燃燈光普施法界願祖目見明元求代闇如此七日其夜夢見一老翁以金鎞療其祖目謂元曰勿憂悲也三日之後祖目必差如期果明唐書曰豫州人許坦年十嵗餘隨父入山採藥父為猛獸所噬即號呌以杖擊之獸遂奔走父以得全太宗聞而謂侍臣曰坦雖㓜童遂能致命救親至孝自𠂻深可嘉尚授文林郎賜物五十段又曰博州梁文貞虢州閿鄉人少從征役北廻父母皆卒文貞恨不獲終養乃穿壙為門磴道出入晨夕灑掃其中結廬墓側未嘗蹔息自是不言三十年家人有所問但書字以對其後山水衝斷驛路更於原上開道經文貞墓前由是行旅之遠近莫不欽歎有甘露降塋前樹白馴擾開元初縣令崔季友刋石以記之十四年刺史許景先奏文貞孝行特絶泣血廬墓三十餘年請宣付史官又曰安金藏神龍初喪母葬於都南口之北廬於墓側躬造石墳石塔晝夜不息原上舊無水忽有湧泉自出又有李樹盛冬花開犬鹿相擾蕭廣濟孝子傳曰杜孝巴郡人也少失父與母居至孝􅂶役在成都母喜食生魚孝於蜀截大竹筒盛魚二頭塞之以草祝曰我母必得此因投中流婦出渚乃見筒横來觸岸異而取視有二魚含笑曰必我壻所寄熟而進之聞者歎駭又曰邢渠失母與父仲居性至孝貧無子傭以給父父老齒落不能食渠常自哺之專專然代其喘息仲遂康休齒落更生百餘嵗乃卒也又曰隗通字君相母好飲江水常乘舟擑置之漂浚艱辛忽有横石特起直趨江脊後取水無復勞劇又曰辛繕字㓜文母喪精廬旁有大鳥頭高五丈雞首鸞領魚尾虵頸備五色而青棲于門樹又曰文讓養母至孝及喪不用僮僕之力兄弟二人營築其墳暫取歸糧羣鹿數千衘壤俄而成墳小説曰宋宜都王鑑三嵗喪母及有識問母所在左右告以早亡便慕蔬食祈請幽冥求一夢至六嵗夢見一婦人謂之曰我是汝之母鑑悲泣旦説之容貎衣服事事如平生也世説曰鄭子産善事母奉命聘晉道中心痛遣人還家起居問母母曰吾忽身體不調憶想汝耳更無他也祖洽志怪曰呉中書郎盛仲至孝母王氏失明仲蹔行勑婢食母婢乃取蠐螬蒸食之母甚以為美不知是何物兒還母曰汝行後婢進吾食甚甘然非魚肉汝試問之既而問婢婢服曰實是蠐螬仲抱慟哭母目霍然立開宋躬孝子傳曰邱傑字偉跱呉興烏程人也遭母喪以熟菜有味不嘗於口病嵗餘忽夢見母曰死正是分别耳何事乃爾荼苦汝噉生菜遇鰕蟆毒靈牀前有甌甌中三丸藥可取服之傑驚起果得甌甌中有藥服之下科斗子數升邱氏世寶此甌宋大明七年灾火焚失又曰陳遺呉郡人少為郡吏母好鐺底燋飯遺在役常帶一囊每煮食輒録其燋以貽母後孫恩亂聚得數升常帶自隨及逃竄多有餓死遺食此得活母晝夜涕泣目為失明耳無所聞遺還入户再拜號咽母豁然有聞見又曰韓靈珍東海郯人喪母三年貧無所葬與弟靈敏共種𤓰半畝欲以營殯及𤓰熟採賣毎朝取暮復生大小如初遂得充葬又曰夏侯訴字長泥梁國寜陵人也母疾屢經危困訴衣不釋帶二年母不忍見其辛苦使出便寢息訴出便卧忽夢見其父來曰汝母病源深痼天帝矜汝至孝賜藥在屋後桑樹上訴乃驚起如言得藥而取水和進之便得痊差又曰宋承字世林父資喪𦵏舊塋負土作墳不役僮僕一夕間土壤自高五尺松栢生焉又曰韋俊字文高京兆杜陵人嘗與父共有所之夜宿逆旅時多虎將曉虎遶屋號吼俊乃出户當之虎弭耳屈膝伏而不動俊跪曰汝饑可食我不宜驚吾老親虎逡廵而退屋人皆安全又曰伍襲字世茂武陵人父没羌中乃學羌語言衣服與賔客入構諸羌令相攻襲乘其仇羌負喪而歸葬畢回居墓所每哭輒有鹿踞墳而鳴漢法死事之孤皆拜郎中而襲不忍受吏廹之乃掘室逃其中吏不知處又曰繆裴東海蘭陵人父忽患病醫藥不給裴夜叩頭不寢不食氣息將盡至三更中忽有二神引鏁而至求裴曰尊君昔經見侵故有怨報君至孝所感昨為天曹攝録裴驚起視父已差父云吾昔過伍子胥廟引二神像置地當是此耳又曰紀邁廬江人本姓舒以五月五日生母棄之村人紀淳妻趙氏養之年六嵗本父母時來看語曰汝是我生邁泣涕告趙趙乃具言始末及年十嵗傭力所得輒分二母各半淳亡無子邁乃斬衰三年本父母繼亡又並齊衰心喪三年趙欲為娶齎酒米往婚家逢醉人打趙體悶忽有一狗直至銜邁衣者三邁心動走赴婚家逢醉適共舉酌於草中邁乃以擔殺二醉人趙歸得平乃詣縣首令宥之邁乃誓不娶後邁嘗寢忽有一女言姓衛昨忽暴死天神矜愍君無妻故使相報邁具説其狀母子至衛門外果如言送喪上車牛不肯動趙乃與主人具叙説之主人開柩女有氣息至晚便語具説始末如趙所言遂為夫婦趙卒邁絶復蘇者數四邁五十嘗病幾死夢神曰君行至孝延歴將得百嵗果九十七而卒又曰王靈之年十三喪父二十年鹽醋不入口被病在牀忽有一人來問病謂之曰飡橘當差俄而不見庭中橘樹隆冬乃有三實食之病愈咸以至孝所感㑹稽典録曰虞國少有孝行後為日南太守常有雙鴈宿㕔事每出行縣飛逐其車既卒於官逐喪還至餘姚於墓前歴三年乃去又曰沈震字彦威烏城人十嵗遭飢荒忽夜中有人告震曰西籬下地中有米五十石可供養旦夕即掘之果獲焉風俗通曰楊範字文端齊人齊宋之亂母在賊中採椹藏於地夜取之進母如是非一忽於地中得米十斛上有字云米十斛賜孝子楊範以資給母劉向孝子圖曰郭巨河内溫人甚富父没分財二千萬餘兩分與兩弟已獨取母供養寄住隣有凶宅無人居者共推與之居無禍患妻産男慮舉之則妨供養乃令妻抱兒欲掘地埋之於土中得金一釡上有鐵劵云賜孝子郭巨巨還宅主宅主不敢受遂以聞官官依劵題還巨遂得兼養兒又曰前漢董永千乘人少失母獨養父父亡無以葬乃從人貸錢一萬永謂錢主曰後若無錢還君當以身作奴主甚愍之永得錢葬父畢將往為奴於路忽逢一婦人求為永妻永曰今貧若是身為奴何敢屈夫人為妻婦人曰願為君婦不耻貧賤永遂將婦人至錢主曰本言一人今何有二永曰言一得二於理乖乎主問永妻曰何能妻曰能織耳主曰為我織千疋絹即放爾夫妻於是索絲十日之内千疋絹足主驚遂放夫婦二人而去行至本相逢處乃謂永曰我是天之織女感君至孝天使我償之今君事了不得久停語訖雲霧四垂忽飛而去廣州先賢傳曰丁宻字靖公遭父憂寢於塜側致飛鳬一雙逰宻廬旁小池後遭母喪宻至所居一宿故時雙鳬來時人服其至孝朝野僉載曰崔渾為侍御史清白温恭能盡色養父母母小不康輒祈幽請以身代母嘗有病渾跪請病受已有頃覺疾從十指入俄而遍身母所苦遂愈丁父艱勺飲不入口毁瘠骨立不勝哀而卒朝野傷心御史臺記曰崔希喬清河人也以孝悌稱解褐臨清尉丁内憂哀毁殆至滅性服闋補鄭縣尉清介公方聞乎京邑轉鄭丞所居堂芝草生焉一暝而葩葢盈尺矣州以狀申嵗餘遷監察出授并州兵曹轉馮翊令人吏畏愛風化大行貧弱之軰稱其仁恕時有雲如葢當其㕔事須臾五色雜綵周於縣郭道路仰望久之狀聞勅編諸國史㝷遷司勲員外其并州㕔前有叢葦小鳥來巢如鷦鷯矣孕卵纔數日􅀈毁而見已踰於母矣枝且不勝墜於地月餘五色成文如鵝馴擾閒暇無復驚懼洎能飛翔時歸舊所人到于今稱為兵曹鳥所居喪管城每一哭羣鳥畢集至千萬牆宇皆遍至有樹梢折者周於原野村鄰嗟稱之每所居其巢燕乳敷必返哺踰旬後分飛矣此孝義通也史系曰趙雋字子竒平陽岳陽人也父稱為縣西曹書佐嗜酒夜歸里墅横卧途中雋年十八見父歸遲即尋迎之父醉負而不勝脱己衣覆之時中冬沍寒方甚雋單衣而已岳陽山多鷙獸夜有豹視之為之岐道而去將旦與父同歸縣吏異之時人以雋孝感所致父卒不呼相者自營邱封有白鵲嘗逰於其家棗樹雋每朝夕臨鵲鳥為之悲鳴終喪而去㑹潞帥劉稹反家近潞發軍士齊討民散走時雋母年八十餘唯一子乃平其父墓别以物識之輦其母入文城西山妻蹇歩從之住數宿妻方至逃難者多糇糧踴貴雋拾橡實飴之以木實供膳者終嵗逮稹滅復輦其母東歸岳陽邱隴悉為軍士所發唯雋家墓得完復起塜焉母卒哀毁過制縣令京兆常伯倫知之給米粟蠲其家雋將𦵏母貧鬻其子質劑已定其夜夢一人謂曰爾舍東有錢百萬可自發之及旦雋自舍東手掘之果得錢符夢數焉太平御覽卷四百一十一
