  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_175-1a, image: WYG0894/WYG0894-0574c.png}
body:
  text: 太平御覽卷一百七十五宋李昉等撰居處部三殿殿説文曰殿堂之髙大者也又釋名曰殿典也摯虞决疑要註曰凡太極殿乃有陛堂則有階無陛也右磩左平平者以文塼相亞次磩者為陛級也九錫之禮納陛以登謂受此陛以上殿堂之正者為路寢凡殿堂坐位以近尊為上無尊者則東向者以北為上南向者以西為上西向者以南為上北向者以東為上也殿堂之上惟天子居牀其餘皆鋪幅席席前設筵几天子之殿東西九筵南北七筵史記秦始皇以咸陽人多先王之宫庭小乃營作朝宫渭南楚苑中先作前殿阿房東西五百步南北五十丈上可以坐萬人下可以建五丈旗周馳為閣道自殿下直指南山表南山之巔以為闕為復道自阿房渡渭屬之咸陽漢書曰宣帝幸河東之明年鳯凰集上林廼建鳯凰殿以答嘉瑞事具祥瑞部鳯凰篇後漢書曰董卓傳云建安元年七月帝還至洛陽幸陽安殿張陽以為己功故因以陽為殿名范曄後漢書曰中平三年復脩玉堂殿東觀漢記曰明帝欲起北宫尚書僕射鍾離意上書諫出為魯相後欲起德陽殿成百官大㑹上謂公卿曰鍾離尚書若在不得成此殿魏志曰青龍三年丁巳還洛陽宮命有司復崇華殿改名九龍殿又髙堂隆傳云帝遂復崇華殿時郡國有九龍見故改曰九龍殿又張遼傳曰文帝引遼㑹建始殿親問破吳狀帝嘆息顧左右曰此亦古之名將也為起殿舍又特為遼母作殿晉書曰張駿霸西河於姑臧起謙光殿畫以五色飾以金玉窮盡珍巧四面各起一殿東方曰宜陽青殿南方曰朱陽赤殿西方曰德政白殿北方曰元武黒殿各隨方色以時居之晉載記曰石虎於襄國起太武殿於鄴造東西宫至是皆就太武殿基髙二丈八尺以文石綷之下穿伏室置衛士五百人於其中東西七十五歩南北六十五步皆漆瓦金鐺銀楹金柱珠簾玉壁窮極伎巧又起靈風䑓於顯陽殿後選士庶之女以充之後庭服綺縠珍玩者萬餘人内置女官十有八等敎宫人星占及馬歩射置女太史于靈臺仰視災祥以考外太史之虛實魏畧曰青龍三年起太極殿洛陽諸故宫名曰洛陽南宫有玉堂前殿却非殿銅馬殿敬法殿清凉殿鳯凰殿黄龍殿壽安殿行殿嘉徳殿晉中興書曰烈宗起清暑殿䜟者曰清暑者反語楚也為殿以酸楚之聲為號非吉祥也頃烈宗崩桓𤣥自號楚又孝武帝造太極殿郭璞筮云二百一十年此殿為奴所壞後梁武帝毁之捨身為奴燕書咸康八年秋七月丁卯營新殿昌黎大棘城縣河岸崩出鐡築頭一千一百七十四枚永樂民郭陵見之詣闕言狀以是日到詔曰經始崇殿而築具出神人允恊之應也趙書曰劉曜召搆殿巧手三千人發陽平等十郡車牛五千乘運土築建德殿基齊書武穆裴皇后傳云寵姬荀昭華居鳯華栢殿宫内御所居壽昌畫殿南閣置白鷺鼓吹二部又魏虜傳云虜主宏率衆至壽陽軍中黒氈行殿皆烏漆楯為漆槊綴以黒蝦蟇幡登八公山賦詩而去又魏志云魏文脩洛陽宫室權都許昌殿狹小元日於城南立氊殿青帷為門又蕭赤斧子穎胄傳曰建武中荆州大風兩龍入栢齋中柱壁上有爪足處刺史蕭欣恐畏不敢居之穎胄改為嘉福殿隋書宇文愷傳云時上北巡愷造觀風行殿上容侍衛者數百人離合為之下施輪軸推移倐忽有若神功戎狄見之莫不驚駭唐太宗謂侍臣曰今天下無事四夷賓服惟須守此成功以養百姓因指殿而言曰安百姓者如造此舍經始斯畢安可改移若易一榱增一瓦人足競踐良工揮墨揺其梁棟所壞益多亦猶百姓既安因而撫養若慕奇巧變法制不恒其德必致勞擾又曰太宗謂侍臣曰朕頃觀劉聰傳聰將為劉后起䳨儀殿廷尉陳元達諌聰大怒命斬之劉后手疏啟請甚切聰怒解而甚愧人之讀書欲廣聞見然非知之難也朕近於藍田市木將别為一殿取制兩儀仍搆重閣其木已具逺想聰事斯作遂止又曰髙祖引蘇世長宴於披香殿世長酒酣奏曰此隋煬帝之所作也何雕麗之若此髙祖曰卿好諫以直其心實詐豈不知此殿是吾所造何須姦説疑煬帝乎對曰臣實不知但見傾宫鹿臺琉璃之瓦並非受命帝王愛民節用之所為也若是陛下作此誠非所宜臣昔在武功幸獲陪侍見陛下宅宇纔蔽風霜當彼時亦以為足今自隋之侈民不堪命數歸有道而陛下得之實謂懲其奢滛不忘儉約今初有天下而於隋宫之内又加雕餙欲撥其亂寧可得乎髙祖毎優容之又曰𤣥宗嘗召張説及禮官學士等賜宴於集仙殿上謂説曰今與卿等賢才同宴於此宜改殿為集賢殿因下制改麗正書院為集賢殿書院又曰麗正殿髙宗降誕之所開元中繕冩圖箱貯之洛陽宫殿簿有明光殿三秦記云明光殿在桂宫中皆以金玉珠璣為簾晝夜光明太冲吳都賦曰飾赤烏之韡曄三輔宫殿名曰未央宫有麒麟殿椒房殿又曰長樂宫前殿宣德殿通化殿髙明殿漢宫閣名曰長安有臨華殿神仙殿臯門殿朱鳥殿増城殿宣室殿承明殿鳯凰殿飛雲殿昭陽殿鴛鴦殿鈞臺殿合歡殿蕭何殿曹叅殿韓信殿成都記曰隋蜀王秀常造一殿飛鳥不止其上戴延之西征記曰太極殿上有金井䦨金博山鹿盧蛟龍負山於井上又有金獅子伏滔北征記曰梁城東有韓馬墓去城三里東蘭殿是朱王行殿山謙之丹陽記曰太極殿周制路寢也秦漢曰前殿今稱太極曰前殿宮之號始自魏按史記秦皇改命宮為廟以擬太極魏號正殿為太極蓋採其義而加以太亦猶漢夏門魏加曰太夏咸康中散騎侍郎庾闡議求改太為泰蓋謬矣東西堂亦魏制於周小寢也皇后正殿曰顯陽東曰含章西曰徽音又洛宫之舊也含章名起後漢顯陽徽音亦起魏曰明陽晉避文帝諱改為此周禮亦有路寢小寢又其制度也登真隱訣云寥陽殿太和殿皆云玉清宫中殿名兩京雜記云漢成帝設雲帳雲幄幕於甘泉紫殿謂之三雲殿漢官典職曰德陽殿周旋容萬餘人激洛水於殿下郡國志曰秦州上邽縣北十六里有無疆殿後魏太武築也王子年拾遺記曰漢成帝造飛行殿方丈如今之輦選期門羽林之士負之而趨一名雲雷宫兩京記曰東京五殿䕃殿也壁厚五尺髙九十尺東西房廊皆五十餘間西院有庫厨東院有敎坊内庫髙宗嘗御此殿又曰流盃殿東西廊殿南頭兩邊皆有亭子以間山池此殿上作漆渠九曲從陶光園引水入渠隋煬帝常於此為曲水之飲在東都又曰含元殿陛土髙於平地四十餘丈南去丹鳯門四百步王文考魯靈光殿賦序曰魯靈光殿者蓋漢景帝程姬之子恭王餘之所立也初恭王始都下國好治宫室遂因魯僖基兆而營焉遭漢中微盜賦奔突自西京未央建章之殿皆見隳壞而靈光巋然獨存意者豈非神明依慿支持以保漢室者耶晉宫閣名曰太極殿十二間徽音殿顯陽殿暉章殿含章殿建始殿仁壽殿百福殿清暑殿章華殿嘉福殿宣光殿修明殿嘉樂殿芙蓉殿崇光殿華光殿蔬圃殿九華殿在五殿有華林圃章陽殿百兒殿芳德殿靈圃殿承光殿永寧殿景福殿延休殿百子殿虞清殿淵冥殿安昌殿建康宫殿簿云林光殿在縣東北十里潮溝村覆舟山前晉以為藥圃又曰陳永初中於臺城中起昭德嘉德壽安乾明有覺等殿又曰光嚴殿在縣東北六里景陽山東嶺南起重雲光嚴二殿前為兩樓又曰梁於臺城中立魯城觀觀歴四代修理大起重閣閣上名重雲殿下名光嚴殿又曰太初宫中有神龍殿去縣三里左太冲吳都賦曰抗神龍之華殿是也又曰臺城温德門内又起三善長春勝辨等殿又曰鳯光殿在縣東北五里一百步舊臺城内又曰宋於臺城立正福清曜等殿又曰臺城中有麗譙閤麗日殿飛香三重閤又曰臺城温德門内有温文文思壽安等殿輿地志曰未央宫後有鴛鴦昭陽飛翔曽城合歡蘭林披香鳯凰等八殿又曰丹陽郡建康縣文德殿梁武帝移張衡渾儀置此殿又曰洛陽有顯陽殿皇后正殿也魏明帝所建又曰丹陽郡建康縣臺城華光殿梁武帝大通中毁施與草堂寺人洗取諸貨直百萬以其地起重閣九間又曰丹陽郡建康縣臺城寳雲殿梁武帝以施佛寺又曰丹陽郡建康縣臺城惠輪殿梁武帝亦供養佛又曰洛陽昭陽殿魏明帝所治在太極殿之北鑄黄龍髙四丈鳯凰二丈置殿前又曰新安郡新治縣西十里有太宰殿晉武陵王晞為太宰桓温詐言其反新安太宰立第於此塟第側後䘮還都今空宅在楊龍驤洛城記曰顯陽殿北有雲氣殿洛陽宫殿簿曰明光殿徽音殿式乾殿暉章殿含章殿建始殿仁壽殿嘉福殿百福殿芙蓉殿九華殿蔬圃殿華光殿崇光殿建康宫闕簿曰赤烏殿在縣東北五里吳昭明宫内制度上應星宿求所以永安也水經注曰孔子廟東南去百歩有雙石門即靈光之南闕北百餘歩即靈光殿基東西二十餘丈南北十二丈髙丈餘東西廊廡别舍十間方七百餘步闕之東北有池池方四十二歩池中有臺方十歩池臺之基岸悉石也遺基尚整故王延壽賦曰周行數里仰不見日是也是漢景帝程姬子魯恭王之所造也殿之東南即泮宫也在髙門直北道西宫中有臺髙八十尺臺南水東西一百歩南北六十歩臺西水南北四百歩東西六十歩臺池咸結石為之太平御覽卷一百七十五
