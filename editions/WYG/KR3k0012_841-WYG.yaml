body:
  text: 太平御覽卷八百四十一宋李昉等撰百榖部五豆麻豆焦贑易林漸之乾曰旦種菽豆暮成藿葉心之所願志快意惬毛詩豳風曰七月烹葵及菽又魚藻采菽曰采菽采菽筐之筥之又后稷曰蓻之荏菽荏菽斾斾左𫝊成公曰晉周子有兄而無慧不能辨菽麥春秋佐助期曰豆神名靈殖姓藥樂春秋説題辭曰菽者屬也春生秋熟理通體屬也菽赤黑隂生陽大體應節小變象陽色也宋均注曰隂陽謂春夏也大體謂多黑也小變謂時之然也孝經援神契曰赤土宜菽爾雅曰戎菽謂之荏菽郭璞注曰孫炎以為大豆按春秋齊侯獻戎㨗穀梁傳曰戎菽也管子亦云北戎山出冬葱及戎菽布之天下今胡豆是也龍魚河圖曰歳暮夕四更取二十豆子二十七麻子家人頭髪少合麻豆著井中呪𠡠井使其家竟年不遭傷寒辟五瘟鬼史記曰張儀説韓王曰韓地險惡山居五榖所生非菽而麥民之食大抵飯菽藿羮一歳不收民不饜糟糠又曰棄為兒時好種樹麻菽麻菽美東觀漢記曰閔仲叔太原人也與周黨相友黨每過仲叔共啜菽飲水無菜茹又曰赤眉平後百姓飢餓人相食黄金一斤易豆五升又曰光武二十年㓂恂為潁川郡大生旅豆收得一萬餘斛以應給諸營又曰鄧禹攻赤眉陽敗棄輜重走車皆載土以豆覆其上軍士飢爭取之又曰劉平嘗為餓賊所得平叩頭曰老母飢少氣待平為命願得還飯母馳來就死賊即遣去母已食平曰向與賊期義不可欺乃復往賊驚怪其信義曰不忍食汝平既免脫乃摭莢得三升豆以謝恩又曰倪萌字子明齊國臨淄人兄為赤眉賊所得賊欲殺啖之萌詣賊叩頭言兄年老羸瘠不肥徤願代兄賊義而不啖命歸求豆来贖兄萌歸不能得豆復自縛詣賊賊遂放之後漢書曰世祖自薊東南至饒陽蕪蔞亭馮異獻豆粥又曰馮異擊延岑時百姓饑餓人相食黄金一斤易豆五升道路隔斷委輸不至軍士悉以果實為糧又曰獻帝在長安榖貴豆一斛二十餘萬又曰汝南有舊鴻郄陂成帝時丞相翟方進毁之時人歌曰敗我陂者翟子威飴我大豆烹我芋魁方進字子威芋魁芋根也漢名臣奏曰丞相薛宣曰陛下八月酎祠嘉美上昇皇天報應茂陵寢廟薦食日𤣥鳥来至集吐所含大豆紫黑色食物之象也蜀志曰彭羕與諸葛亮書先民有言左手據天下之圖右手折咽喉愚夫不為况僕頗别菽麥魏志曰華佗還家太祖累書呼佗佗恃能饜事猶不上道託妻疾太祖大怒使人往視若妻信疾賜小豆四十斛呉志曰孫權北征使陸遜與諸葛瑾攻襄陽陸遜遣親人韓扁賫表奉報遇敵於江中邏得扁瑾聞之甚懼書與遜云大駕已旋賊得韓扁具知吾濶狹且當急去遜未答方催人種豆與諸將奕棊射戲如常又曰趙逹善筭使人取小豆數升播之席上立處其數驗覆果信計飛蝗射隠伏無不中王隠晉書曰時王浚稱制邉郵􅅗使人問霍原原不逹浚既銜之又有遼東内徙三十餘人依山為賊意欲刦浚為首者霍也浚遂害原懸其首諸生悲哭其中宋書曰廢帝子業景和初人種紫花草及豆皆化為白花俄而帝見廢之應南史曰傅琰為山隂令有二野父爭雞琰各問雞所食一人云粟一人云豆乃破得粟罪言豆者縣内稱神明北齊書曰庫狄伏連之家口百數盛夏之日料以倉米二升不給鹽菜嘗有飢色冬至之日親表稱賀其妻為設豆餅伏連問此豆因何而得妻對向於飼馬豆中分减充用伏連大怒典馬掌食之人並加杖罰唐書曰裴諝為河東道租庸等使時大旱諝請入計代宗召見問𣙜酤之利一歳㡬何諝久而不對帝復問之對曰臣有所思帝曰何思對曰臣自河東来其間三百里見農夫愁歎菽粟未種誠為陛下憂之而乃責臣以利故臣未敢即對又曰貞元中李元諒為隴右節度使開部下荒田數十里勸軍士樹蓻歳收菽粟數十萬斛山海經曰廣都之野爰有膏菽管子曰桓公伐山戎得戎菽以布天下鶡冠子曰兩葉蔽目不見泰山兩豆塞耳不聞雷霆孟子曰易其田疇薄其稅歛民可使富也民非水火不生活聖人治天下使菽粟如水火淮南子曰河中水調而宜菽又曰孟夏仲夏天子衣赤衣乗赤騮騮赤馬黑髪也食菽與鷄説苑曰齊景公嘗賞賜及後宫文繡被䑓榭菽粟食鳬雁出而見殣謂晏子曰此何為死晏子曰此餒而死公曰嘻寡人之無徳也何甚矣對曰君之徳著而彰何為無徳也景公曰何為也對曰君之徳及後宫與䑓榭君之玩物衣以文繡君之鳬厭食以菽粟君之營内自樂延及後宫之族何為其無徳也頃臣願有請於君由君自樂之心推而與百姓同之則何殣之有君不推此而苟營内好私使財貨偏有所聚菽粟幣帛腐於内府恵不遍加于百姓公心不周乎萬國則桀紂之所以亡也夫士民之所以叛由偏之也君如察臣嬰之言推君之盛徳公布之於天下則湯武可為也一殣何足恤哉呂氏春秋曰得時之粟長莖而短足其莢二七以為族多枝數節競葉蕃實二七十四實也大菽則圓小菽則摶以芳稱之重食之息以香如此者不蟲先時者必長以蔓浮葉䟽節小英不實後時者短莖䟽節本虛不實世説曰魏文帝使東阿王七歩作詩不成當行大法王應聲曰箕在釡下燃豆在釡中泣本是同根生相煎何太急又曰石崇為客作豆粥咄嗟便辦恒冬天得韮以平葅汜勝之書曰大豆保歳易為宜古所以備㐫年也種大豆率人五畆大豆忌申夘三月榆莢時雨髙田可種大豆夏至後二十日尚可種小豆不保歳難得宜椹黑時種畆五升豆生布葉鋤之生五六葉又鋤之治養莱田畆可得十石一斗大豆有萬千粒又曰夏至二十日可種豆𢃄甲而生不用深耕豆花憎見日則黄爛而根焦矣知歳所宜以嚢盛種平量埋隂地冬至後五十日以發取量之最多者種焉説文曰小豆菽也箕豆莖藿菽之少也物理論曰菽者衆豆之總名嵇康養生論曰豆令人重榆令人暝雜五行書曰常以正月旦亦用月半以麻子七枚赤豆二十七枚著井中辟瘟病甚神效與龍魚河圖語少異故重出又曰正月七日男吞赤豆七枚女吞十四枚竟年無病益部耆舊𫝊曰米倉字卿雲之蜀從處士張寧受春秋糴小豆十斛屑之為糧閉户精誦寧矜之歛得米二十石倉不受一粒陳留耆舊𫝊曰小黄桓枚為都尉功曹與郎君共歸鄉里為赤眉所得欲殺啖之枚求先死賊義釋之送䝁豆一斛又曰八月雨為豆花雨廣雅曰大豆菽也小豆荅都合切也􅀈丘迷切豆豌豆䝀豆也胡豆䜶雙龍切􅀈也音雙豆角謂之莢其葉謂之藿也巴菽巴豆也廣志曰種小豆一歳三熟味甘白豆麤大可食刺豆亦可食秬豆苖似小豆紫華可為麵生朱提建寧胡豆有青有黄者神農本草經曰赤小豆下水排癰腫古今注曰宣帝元康四年南昌雨豆光武建武三年春縑一疋易一斗夏野生旅豆民收取之明帝永平十八年下邳雨大豆似槐實王子年拾遺記曰東極之東有傾離豆見日即傾葉食者歴年不飢豆莖皆大若指而緑一莖爛漫四野博物志曰左元放度荒年法擇六豆麤細調均種之必先煮熟挼令有光使煖氣徹豆必先一日不食以冷水頓服三升服訖其魚肉菜果酒醬鹹酢甘苦之物一不得服經口渇則飲水慎不可煖飲初小困極數十日後身力便壯徤不復思食大較法服三升為劑亦當随人先食多少増損之歳豐欲還食者煮葵子及脂蘇肥肉羮漸漸飲之須豆下乃可食豆未下盡而食實物腸塞則殺人此未試於理或可耳又曰人食豆三年則身重行止動難恒食小豆令人肥燥麤理本草經曰大豆黄卷味甘平澤生平治温痺筋攣膝痛張騫使外國得胡麻胡豆或曰戎菽塗癰腫煮汁飲之殺鬼毒止痛吳氏本草曰大豆黄卷神農黄帝雷公無毒採無時去面䵟得前胡鳥啄杏子牡礪天雄䑕屎共蜜和佳不欲海藻龍膽此法大豆初出土黄芽是也生大豆神農岐伯生熟寒九月採殺烏豆毒並不用元参赤小豆神農黄帝鹹雷公甘九月採小豆花一名應累一名付月神農甘無毒七月採隂乾四十日治頭痛止渴魏王花木志曰交州記木豆出徐潼間子美似烏頭大葉似栁一年種數年生唐明皇雜録曰盧懐慎清貞素不營産業常器重宋璟及盧従愿見之甚喜留連永日命設食有蒸豆兩甌葉數爼而已此外蕭然無辦孔融教髙宻令曰志士鄧子然吿困焉得愛釡庾之問以惕烈士之心與豆三斛曹子建鷂雀賦曰言雀者但食牛矢中豆馬矢中粟葛龔薦戴昱曰兄弟同居二十餘年及為宗老所分昱持妻子逃舊業入虞澤捃穫野豆以自賑給麻毛詩丘中有麻曰丘中有麻彼留子嗟禮記月令曰仲秋之月天子乃以犬嘗麻先薦寢廟鄭𤣥注曰麻新曰黂爾雅曰黂枲實孫炎注曰黂字音汾吕氏春秋曰得時之麻必莖長䟽節而危陽少本而莖堅厚枲以均後熟多榮日夜分復生如此者不蝗蝗蟲不食麻節也東觀漢記曰周黨遺閔仲叔生麻叔嘆曰我欲省煩耳受而不食齊書曰宣帝陳皇后生髙帝髙帝年二歳乳人乏乳后夢人以兩甌麻粥與之覺而驚乳因此豐足淮南子曰三秋之月天子衣白衣乗白駱食麻與犬又曰汾水濛濁而宜麻王子年拾遺記曰有飛明麻葉黑實如玊風吹之如塵亦名明塵麻又曰東極之東有紫麻粒如粟色紫迮為油則汁如清水食之目視鬼魅又有倒葉麻葉如倒苣色紅紫亦名紅氷麻言氷麻乃有實食之顔色潔白鹽鐡論曰大夫李斯與鮑丘子俱事孫卿鮑丘飯麻􅅾藜脩道白屋之下李斯為秦丞相終致五刑本草經曰麻子味甘無毒主補中益氣令人肥徤養生要集曰麻子味甘無毒主補中益氣服之令人肥徤麻子一名蕡一名麻勃太平御覽巻八百四十一
