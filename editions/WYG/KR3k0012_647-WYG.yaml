body:
  text: 太平御覽卷六百四十七宋李昉等撰刑法部十三殺三族刑雜死刑附殺釋名曰殺竄也埋之使不復見也周禮掌戮曰掌斬殺賊諜而摶之斬以鉞若今腰斬殺以刀刃若今棄市諜為姦㓂反間者大者斬之小者殺之凡殺其親者焚之殺王之親者辜之焚燒也易曰焚如死如棄如辜之言枯也謂磔之凡殺人者踣諸市肆之三日刑盜于市踣僵尸肆陳也又司刑職曰殺罪五百鄭𤣥曰兹死刑尚書大傳曰武王殺紂封紂公子禄父使管叔康叔監禄父武王死成王㓜周公盛養成王盛猶長也使召公奭為傅周公身居位聴天下為政管叔疑周公流言於國曰公將不利王奄君薄姑謂禄父曰武王已死矣成王㓜周公見疑矣此世之將亂也請舉事言周弱且不知欲伐之而復政也然后禄父三監反周公以成王之命殺禄父禮曰邾婁定公時有殺其父者有司以告公矍然失席曰是寡人之罪也寡人嘗學斷斯獄矣臣弑君凡在官者殺無赦子弑父凡在官者殺無赦言諸臣子孫無尊卑皆得殺之罪無赦也殺其人壊其室洿其宫而瀦焉明其大逆不欲人復之也蓋君踰月而後舉爵自貶損也又王制曰析言破律亂名改作執左道以亂政者殺析言破律巧賣法令也亂名改作謂變易官與物之名更作法度也左道若誣蠱及俗禁也作淫聲異服奇技奇器以疑衆殺淫聲鄭衛之聲異服若聚鷸冠瓊弁奇技竒器若公輸般請以機􅉎也行偽而堅言偽而辨學非而博順非而澤以疑衆殺皆謂虛華捷給無誠也假於鬼神日時卜筮以疑衆殺今用時喪𦵏築蓋家聚卜數文書使民倍禮違制者也此四誅者不以聴左傳襄六年曰齊子尾害閭丘嬰欲殺之使帥師以伐陽州我問師故魯以師往問齊何故伐我子尾殺閭丘嬰以説于我師又昭四年曰楚子謂成虎若敖之餘也遂殺之書曰楚殺其大夫成虎懐寵也又昭四年曰楚子伏甲而饗蔡侯於申醉執而殺之刑其士七十人論語季康子曰如殺無道以就有道何如子曰子為政焉用殺子欲善而民善矣史記曰二世使使殺公子将閭将閭曰朝廷之禮吾未嘗敢不從賔贊也廊廟之位吾未嘗敢失節也仰天而大呼天者三昆弟皆流涕自殺又曰二世又遣使者之陽周令蒙恬曰君之過多矣而卿弟毅有大罪法及内史蒙恬喟然太息曰我何罪於天無過而死良久徐曰恬罪固當死矣起臨洮塹萬餘里此其中不能無斷地脉此乃恬之罪也吞藥自殺又曰秦昭王賜白起劍令自死武安君曰我固當死矣長平之戰趙卒降者數十萬人我詐而坑之是以死乃引劍自殺秦人憐之鄉邑皆祭祀華嶠後漢書曰梁冀聞崔琦才請與交冀行多不軌琦數誡之不能受琦以言不從失意為白鵠賦冀知刺己大怒幽之室谷數月得出後竟殺之范煜後漢書曰陳蕃上疏欲急誅侯覽等太后不納朝廷聞者莫不震怒蕃因與竇武謀之及事泄曹節等矯詔誅武等蕃時年七十餘聞難作将官屬諸生八十餘人拔刃入承明門攘臂呼曰大將軍忠以衛國黄門反逆何云竇氏不道耶王甫時出與蕃相迕讓蕃曰先帝新弃天下山陵未成竇武何功弟兄父子一門三侯又多取掖庭宫人作樂飲醼旬月之間貲財億計大臣若此是為道耶公為棟梁枉撓阿黨復焉求賊使令收蕃蕃拔劍叱甫甫兵不敢近乃蹴蕃曰死老魅復能損我曹員數奪我曹廩假否即害之吳志曰人詐告樓𤣥謗毁政事華覈上疏乞𤣥自新孫皓疾𤣥名聲復徙𤣥及子男據付交阯將張奕使以戰自効隂别勅奕令殺之據到交阯病死𤣥一身隨奕討賊持劍步見奕輒拜奕不忍殺𤣥會奕暴疾卒𤣥殯奕於器中見勅書還自殺也王隠晉書曰周處字子隠陽羨人始為中書省事時女子李忽覺父北叛遂叛父處奏曰叛父以偷生破家以邀福子圉告歸懐嬴結舌忽無人子之道證父攘羊傷化汙俗宜在投畀以彰凶逆典刑市朝不足塞責奏可處斬唐書曰宰相宋申錫為鄭注所搆獄自内起崔𤣥亮首率諫官請對與文宗往復數百言文宗不省其諫欲寘申錫於法𤣥亮泣曰孟軻有言衆人皆曰殺之未可也左右皆曰殺之未可也天下皆言殺之然後察之方寘於法今至聖之代殺一凡庶尚須合於典法况無辜殺一宰相乎臣為陛下惜天下法實不為申錫也文宗為之感悟𤣥亮由此名重於朝又曰興平縣人上官興因醉格殺人亡竄吏執其父下獄興自首請罪以出其父京兆尹杜悰以其首罪免父有光教義請減死配流王彦威曰殺人者死百王共守若許殺人不死是教殺人興雖免父不合減死山海經曰共工之臣曰相柳氏九首以食於九山相柳之所抵厥為澤谿禹殺相柳其血腥不可以樹五穀乃以為衆帝之臺曹操别傳曰始袁忠為沛相薄待操沛公桓邵亦輕之及在兖州陳留邊讓頗笑操操殺讓族其家忠邵俱避難交州操逺遣使就太守士燮盡族劭劭得出首拜謝於中庭操謂曰跪可解死耶遂殺之孟子曰孟子謂齊宣王曰左右皆曰可殺勿聴諸大夫皆曰可殺勿聴國人皆曰可殺然後察之見可殺焉然後殺之故曰國人殺之也言當其刑大辟之罪如此而後可以為民父母又曰或問勸齊伐燕有諸曰未也今有殺人者或問之曰人可殺與則将應之曰可彼如曰孰可以殺之則将應之曰為士師則可以殺之今以燕伐燕何為勸之哉燕有罪王者當誅之至於齊則不可搜神記曰漢宣帝之世燕代之間有三男共取一婦生四子及其将分妻子而不可均遂致紛争訟廷尉范延夀斷之曰此非人類當以禽獸從母不從父也請戮三男以兒還母帝嗟嘆曰何必古若此則可謂當於理而厭人情也延夀蓋見人事而知用刑矣太公金匱曰殺一人而千人恐者殺之殺二人而萬人動者殺之殺三人而君振者殺之三族刑尚書秦誓曰今商王受弗敬上天降災下民沉湎冒色敢行暴虐罪人以族官人以世史記曰秦始皇平六國制天下以古非今者族吏見知不舉與同罪又曰陳豨反韓信欲謀發兵欲以襲吕后太子其舍人得罪於信吿信欲反於吕后吕后使武士縛信斬之長樂鍾室信方斬歎曰吾悔不用蒯通計乃為兒女子所詐豈非天哉遂夷信三族漢書刑法志曰漢興尚有夷三族之令令曰當三族者先黥劓斬左右趾笞殺之梟其首葅其骨肉於市其誹謗者又先斷舌故謂之具五刑彭越韓信之屬皆受誅至髙后元年乃除三族罪妖言令後新垣平謀逆復行三族之誅又五行志曰趙人新垣平以望氣得幸請祠汾隂作渭陽五帝廟欲出周鼎夏四月郊見上帝嵗餘懼誅遂謀為逆發覺腰斬夷三族後漢書曰少府耿紀丞相司直韋晃起兵誅曹操不尅夷三族又曰建安五年車騎将軍董承越騎校尉种輯受密詔誅曹操事泄壬午曹操殺董承夷三族魏志曰建安二年遣謁者僕射裴茂率關西諸将誅李傕夷三族又曰太傅司馬宣王奏免大将軍曹爽又尚書丁謐鄧颺何晏司𨽻校尉畢軌荆州刺史李勝大司農桓範皆與爽通姦夷三族三十國春秋曰魏帝謁陵曹爽及弟羲訓彦皆從髙祖命授兵召公卿於朝堂奏皇太后廢爽丁酉斬爽羲訓彦夷三族雜死刑韓子曰齊國好厚𦵏布帛盡於衣裘林木盡於棺槨桓公患之以告管仲曰布帛盡則無以為衣林木盡則無以為守備如民之厚𦵏不休奈何管仲對曰凡民之有為也非名之則利之於是乃下令曰棺過度者戮其尸罪當喪者夫戮尸無名罪當喪者無利無名無利何故為之吕氏春秋曰趙簡子沉鸞繳於河曰吾嘗好聲色矣而鸞繳致之吾嘗好宫室臺榭矣而鸞繳來之今吾好士六年矣而鸞繳未嘗進一人也是長吾過而絀吾善也淮南子曰夏桀殷紂生燔人辜頡者為炮烙鑄金柱鑄金柱然火其下以人置上入火中而對笑也符子曰桀觀炮烙於瑶臺謂龍逢曰樂乎龍逢曰樂桀曰觀刑何無惻怛之心龍逢曰天下苦之而君以為樂臣君之股肱何不悦乎桀曰聴子諫諫得我改之諫不得我刑之龍逢曰臣觀君冠危石也臣觀君履春氷也未有冠石而不壓蹈春氷而不陷桀笑曰是日亡則與俱亡子知我之亡而不自知乎亡子就炮烙之刑吾觀子龍逢歌曰造物勞我以生息我以炮烙去故渉新我樂而人不知赴火而死太平御覽卷六百四十七
