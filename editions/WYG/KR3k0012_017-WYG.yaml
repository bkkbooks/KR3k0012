body:
  text: 太平御覽卷十七宋李昉等撰時序部二五行四時閏歲歲除五行釋名曰五行者言五氣于其方各施行也尚書洪範曰五行一曰水二曰火三曰木四曰金五曰土皆其生數水曰潤下火曰炎上言其自然之常性也木曰曲直金曰從革木可以操曲直金可以改更者土爰稼穡種曰稼歛曰穡土可以種可以歛也潤下作鹹水鹵炎所生上作苦焦氣之味曲直作酸木實之性從革作辛金之氣味稼穡作甘甘味生于百榖五行以下箕子之所陳也禮曰五行之動迭相竭也五行四時十二月還相為本也又曰五行之秀氣也傳曰秋龍見于絳郊魏獻子問于蔡墨蔡墨對曰古有豢龍氏有御龍氏獻子曰今何故知之對曰五行之官是謂五官實列受氏姓封為上公祀為貴神社稷五祀是尊是奉木正曰勾芒正官長也取木生勾曲而有芒角火正曰祝融融明見也金正曰蓐收初秋摧蓐而可收也水正曰𤣥冥水正而隂幽𠖇也土正曰后土土為羣物之主故曰后土獻子曰社稷五行祀誰氏之官也對曰少皥氏有四叔曰重曰修曰該曰熈實能理金木水火土使重為勾芒該為蓐收脩及熈為𤣥冥二子相代為水正也世不失職遂濟窮桑此三祀也窮桑少昊之號四子能治其官顓頊氏有子號曰黎為祝融共工氏有子曰勾龍為后土此其二祀也后土為社稷田正也掌播殖也有烈氏之子曰柱為稷自夏以上祀之周棄亦為稷成周之始祖能播百榖湯既勝夏廢柱而以棄代之也自商以來祀之漢書曰五行者五帝之形氣也又律厯志曰天以一生水地以二生火天以三生木地以四生金天以五生土魏畧曰詔以漢德為火忌水故去洛水而加佳魏于行次為土水得土而流土得水而軟故除佳加水變雒為洛家語曰季康子問于孔子曰舊聞五帝之名而不知其實請問何謂孔子曰昔丘也聞諸老耼天有五行金木水火土分時化育以成萬物一嵗三百六十日五行行至七十三日化生長育萬物莫不成也其神謂之五帝五帝五行之神佐天理物者也而説皆謂之名字亦為妖怪而妄也古之王者易代改號取法五行更王終始相生亦象其義也法五行更王終始相生以木徳王天下其次所生之行轉相承故其生為明王者死配五行是以太皥配木炎帝配火少皥配金顓頊配水黄帝配土康子曰太皥氏其始之木何也孔子曰五行用事先起于木木東方也萬物之始皆出焉是故王者則而首以木徳王天下則以所生之行轉相承也康子曰吾聞勾芒為木正祝融為火正蓐收為金正𤣥㝠為水正后土為土正此則五行之主也而不稱何孔子曰凡五正者五行之官名也言但正五行之官名安得即名為帝五行佐成上帝而稱五帝太皥之屬配焉亦云帝從其號昔者少皥氏之子有四叔曰重曰該曰修曰熈實能理金木水火土使重為勾芒該為蓐收修及熈為𤣥冥顓頊氏之子曰黎為祝融共工氏子曰勾龍為后土此五行者各以所能業為官職生為上公死為貴神别稱五祀不得同地也五祀上公之神耳故不得稱帝五正不及五帝五帝不及天地也遁甲開山圖榮氏解曰五龍受爰皇後君也兄弟四人皆人面龍身長曰角龍木仙也次曰羽龍水仙也父曰宫龍上仙也父子同得仙治在五方今五行之神也白虎通曰五行者何謂也謂金木水火土言行者猶言為天行氣之義也地之承天猶婦之事夫臣之事君也其位卑卑者親事是故自周于一行尊于天也尚書一曰水二曰火三曰木四曰金五曰土水位在北方者隂氣在黄泉之下任飬萬物水之為言准也隂化沾濡任生木木在東方者陽氣始動萬物始生木之為言觸也陽氣動躍火在南方陽在上萬物垂枝火之為言委随也萬物布施火之為言化也陽氣用事萬物變化也金在西方者隂始起萬物禁止金之為言禁也土在中央者主吐􅅤萬物土之為言吐也樂記曰春生夏長秋收冬藏土所以不名時者地土之别名也比于五行尊故自居部職也白虎通曰萬物懐任交易變化始起先有太初然後有太始形兆既成名曰太素混沌相連視之不見聽之不聞然後剖判清濁既分精出曜布度物施生精者為三光號者為五行五行生情性情性生汁中汁中生神明神明生道徳道徳生文章四時釋名曰四時四方各一時時期也不失期也書曰以閏月定四時成嵗禮曰天有四時春秋冬夏無非教也周禮曰典瑞掌玉噐之藏土圭以致日月四時度其影至不至也爾雅曰四時和為玉燭又曰春為青陽夏為朱明秋為白藏冬為𤣥英論語曰天何言哉四時行焉百物生焉汲冡周書曰凡時成嵗有春秋冬夏各有孟仲季以名十有二月月中氣以著時應春三中氣雨水春分榖雨夏三中氣小滿夏至大暑秋三中氣處暑秋分霜䧏冬三中氣小雪冬至大寒閏無中氣斗指両辰之間萬物春生夏長秋收冬藏天地之正四時之極不易之道春秋繁露曰四時天之四選春者少陽之選夏者太陽之選秋者少隂之選冬者太隂之選四時之行父子之道也天地之至君臣之義也隂陽之理聖人之法也爾雅曰四時者四方各一時時期也物之生死各應節期而止也又曰時空也司空主也各主一方物之生死京房易妖占曰海燕自来衆燕随之榖不登失春政則蒼燕見于邑民多流亡失夏政則赤燕見于邑失秋政則白燕見于邑失冬政則黑燕見于邑皆如春占管子曰嵗有四秋而分四時故曰農事即成農夫賦其耜鐡此之謂春之秋大夏且至絲纊之所作此之謂夏之秋秋成五榖之所㑹此之謂秋之秋營室中女事紡績緝縷之所作也此之謂冬之秋又曰東方曰嵗星其時曰春其氣曰風風生木南方曰熒惑其時曰夏其氣曰陽陽生火西方曰辰其時曰秋其氣曰隂隂生金北方曰月其時曰冬其氣曰寒寒生水淮南子曰六合孟春與孟秋為合仲春與仲秋為合季春與季秋為合孟夏與孟冬為合仲夏與仲冬為合季夏與季冬為合孟春始盈孟秋始縮盈長也縮短也仲春始出仲秋始内出二月播殖也内八月收歛也季春大出季秋大内孟夏始緩孟冬始急緩四月陽安急十月寒肅仲夏至修仲冬至短季夏徳畢季冬刑畢徳畢陽施窮也刑畢隂殺盡也又曰隂陽之専精為四時四時之㪚精為萬物四時者天之吏也又曰以天為蓋以地為輿四時為馬又曰日廻而月周時不與人游徐整三五記曰厯北斗當崑崙氣運注天下春夏為露秋冬為霜晋張華詩曰四氣鱗次寒暑環周晋陸機詩曰年往信勁矢時來諒急絃閏説文曰餘分之日五嵗再閏也告朔之禮天子居宗廟門中故其字從王在門中也白虎通曰月有閏何周天三百六十五度四分度之一十二月日過十二度是故三年一閏五嵗再閏也明隂不足陽有餘閏者陽之餘也書堯典曰帝曰咨汝羲暨和朞三百有六旬有六日以閏月定四時成嵗咨嗟暨及也匝四時曰朞一嵗十二月月三十日三百六十日除小月六日是為一嵗三嵗足得一月則置閏焉以四時之節氣成一歲之厯象傳曰閏月不告朔非禮也先王之正時也履端于始舉正于中歸餘于終杜預注曰歩厯之始以為述之端首也日月之行有遲有速必分十二月舉中氣以正月也餘日則歸于終積為閏也履端于始序則不愆舉正于中人則不惑歸餘于終事則不悖又曰閏月戊寅濟于隂阪注以為門五百蓋悞以門字與五字合為閏月也公羊傳曰閏月不告朔曷為不告朔天無是月也閏月者何以謂之天無是月月非常月也所在無常故非正也榖梁傳曰閏月者附月之餘日也一嵗三百六十日餘六日又有小月積五嵗得六十日而再閏故曰附月之餘日也積分而成于是月者也天子不以告朔而䘮事不數也禮玉藻曰聽朔于南門之外諸侯聽朔于廟天子聽朔于明堂諸侯告朔于天子則天子告朔于文武也閏月則闔門左扉立乎其中閏無中氣無全時故不聼于堂也門謂廟門立其中當親朝也周禮春官曰閏月太史詔王居門終月門謂路寝門也鄭司農云月令十二月分在青陽明堂總章𤣥堂左右之位惟閏月無所居于門故于文王在門謂之閏春秋元命苞曰三年一閏以起紀宋均注曰紀法也三年加以一閏以㑹成嵗也史記曰黄帝起消息正閏餘漢書音義曰嵗之餘為閏文士傳曰陸續字公紀作渾天說曰閏月無中氣斗斜指二辰荆楚嵗時記曰周禮云王出居寢門故為閏字門中從王也是月也不舉百事以中氣也歲釋名曰歲越也越故限也年進也進而前也祀已也新氣生故氣已也載載生也白虎通曰嵗者以紀氣物據日為嵗據月言年載之為言成也載成萬物終始也五帝言載三王言年世本曰后益作占嵗易曰寒往則暑来暑往則寒来寒暑相推而嵗成焉洪範曰恊用五紀一曰嵗孔安國曰所以紀四時也禮曰日窮于次月窮于紀星廽于天數將㡬終嵗且更始嵗者四時一終日一周天之名也言前至孟春之月日復在營室月復見寅昏復参中旦復尾中故日月更始也爾雅曰太嵗在甲曰閼逢在乙曰旃蒙在丙曰柔兆在丁曰強圉在戊曰著雍著孫炎音猪賂切郭璞音義曰著者或作祀黎是也在己曰屠維在庚曰上章在辛曰重光在壬曰𤣥􅘬郭璞音翼在癸曰昭陽太嵗在寅曰攝提格在邜曰单閼在辰曰執徐在巳曰大荒落在午曰敦牂郭璞音孑郎反在未曰恊洽在申曰涒灘郭璞曰涒音湯昆反灘音湯干反在酉曰作噩孫炎音愕在戌曰閹茂在亥曰大淵獻在子曰困敦在丑曰赤奮若又曰夏曰嵗商曰祀周曰年唐虞曰載郭璞注曰嵗取星行一次也祀取四時一終也年取禾一熟也載取物終更始也史記曰天官書臘之明日人衆卒嵗一㑹飲酒發陽氣故曰初嵗魏畧曰董遇好學讀書常惜三餘冬嵗之餘夜日之餘隂雨時之餘晋書曰博士張亮議曰俗謂臘之明日為初嵗秦漢以来有賀此古昔之遺語也易乾鑿度曰孔子曰嵗三百六十日而天氣周八卦用事各四十五日而備嵗用事尚書大傳曰凡六沴之作嵗之朝月之朝日之朝后王受之嵗之中月之中日之中則正卿受之嵗之夕月之夕日之夕則庶民受之鄭𤣥曰自正月盡四月為嵗之朝後志曰凡六氣相傷謂之沴尚書考靈曜曰天地開闢元厯紀名月首甲子冬至日月五緯俱起牽牛初日月若懸璧五星若編珠青龍甲子攝提格孳青龍嵗也嵗在寅曰攝提格孳猶生也春秋元命苞曰嵗之為言遂也遂出也出行事于所直辰也淮南子曰太隂治春則欲行仁惠温良木徳仁故柔良太隂治夏則欲布施宣明火徳陽故布徳徧明太隂治秋則欲修備繕兵金徳剛斷故脩兵也太隂治冬則欲猛毅剛強三嵗而改節六嵗而易常故三嵗而一饑六嵗而一衰衰疫疾也十二嵗而一康淮南子曰見一葉之落知嵗之將暮吕氏春秋曰天行不信莫能成嵗師曠占曰黄帝問子野曰吾欲知嵗苦樂吾惡可以知否子野對曰嵗欲豐甘草先生薺也嵗欲饑苦草先生葶藶也嵗欲惡惡草先生水藻也嵗欲旱旱草先生蒺藜也嵗欲溜溜草先生蓬也嵗欲疫病草先生艾也廣志曰青龍天一太隂太嵗也袁子正書語曰嵗在申酉乞漿得酒嵗在辰巳嫁妻賣子夫盛衰更代豐荒相半天之常道也楚辭曰獻嵗發春兮獻進也又曰開春發嵗兮承陽施惠養百姓也嵗除吕氏春秋注曰前嵗一日擊鼓驅疫癘之鬼謂之逐除亦曰儺論語曰鄉人儺孔子朝服立于阼階張衡東京賦曰新嵗大儺荆楚記曰嵗暮家家具肴䔩諸宿嵗之儲以迎新年相聚酣飲又曰嵗前又為藏鈎之戲辛氏三秦記曰昭帝母鈎弋夫人手卷而國色帝披之即時伸人學藏鈎亦法此鈎亦作彄又曰留宿嵗飯至新年十二月則棄之街衢以為去故内新也唐太宗文皇帝守嵗詩曰暮景斜芳殿年華麗綺宫寒辭去冬雪暖帶入春風階馥舒梅素盤花卷燭紅共歡新故嵗迎送一宵中又曰嵗隂窮暮紀獻節啓新芳冬盡今朝促年開明日長氷消出鏡水梅㪚入風香對飲歡經夜傾壺待曙光又於太原召侍臣賜宴守嵗詩曰四時運灰琯一夕變冬春送寒餘雪盡迎嵗早梅新梁庾肩吾嵗盡應令詩曰嵗序已云殫春心不自安聊開柏葉酒試殿五辛盤金箔圗神燕朱泥印鬼丸梅花應可折惜為雪中看隋薛道衡嵗窮應敎詩曰故年隨夜盡初春逐晩生方驗從軍樂飲至入西京太平御覽卷十七
