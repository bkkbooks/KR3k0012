  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_955-1a, image: WYG0901/WYG0901-0437c.png}
body:
  text: 太平御覽卷九百五十五宋李昉等撰木部四桑易曰其亡其亡繋于苞桑書曰青州厥篚檿絲又曰伊陟相太戊亳有祥桑穀共生於朝詩曰桑之未落其葉沃若吁嗟鳩兮無食桑椹桑之落矣其黄而隕又曰交交黄鳥止于桑又曰星言夙駕税于桑田又曰女執懿筐爰求柔桑又曰蠶月條桑又曰猗彼女桑又曰肅肅鴇行集于苞桑又曰將仲子兮無踰我牆無折我樹桑又曰隰桑有阿其葉有難既見君子其樂如何禮記曰季春之月命野虞無伐桑柘又曰古者天子諸侯必有公桑蠶室近川而為之左傳曰晉重耳及齊齊桓公妻之有馬二十乗公子欲安之從者以為不可將行謀於桑下蠶妾在其上以告姜氏姜氏殺之又宣上曰初宣子田於首山舍於翳桑田獵也翳桑之多隂翳者也見靈輙餓問其病曰不食三日矣食之舍其半問之曰宦三年矣未知母之存否今近焉去家近也請以遺之使盡之而為之簞食與肉寘諸槖以與之既而與為公介靈輙為公甲士倒㦸以禦公徒而免之問何故對曰翳桑之餓人也問其名居不告而退春秋元命苞曰姜嫄逰閟宫其地扶桑履大人迹生稷春秋孔演圖曰孔子母徴在逰大冡之陂睡夢黑帝使請已往夢交語女乳必於空桑之中覺則若感生丘於空桑之中爾雅曰女桑桋桑郭璞曰俗呼小桑長條者為女桑桋音根又音夷詩曰其檿其柘材中弓也桑柳醜條史記曰齊魯千畝桑其人與千户侯等又曰呉公子光伐楚㧞居巢鍾離初楚邉邑卑梁氏之處女與呉邉邑之女争桑二女家相怒喧兩邉邑長聞之怒而相攻滅呉之邉邑呉王怒故遂伐楚漢書曰息夫躬免官歸國未有第宅寄居立亭姦人以為侯家富常夜守之賈惠往過躬教以咒盗方以桑東南枝七􅀞北斗七星其上躬夜自被髪立中庭向北斗時以指招祝盗人有上書言躬懐怨恨繋洛陽詔獄死東觀漢記曰蔡君仲汝南人王莽亂人相食君仲取桑椹赤黑異器賊問所以君仲云黑與毋赤自食賊義之遺米二斗受而不食謝承後漢書曰陳留申屠蟠耻郡無處士遂閉門養志處蓬室依大桑樹以為棟梁又曰河内高𢎞為瑯琊相妻子不歴官舍桑杯盛漿又曰汝南尹昆為汝隂功曹令新到官問曰園中有桑以飯蠶何如昆曰非初政所務令嘉其言又曰張湛為漁陽太守勸民耕種百姓歌曰桑無附枝麥穗兩歧張君為政樂不可支又曰陳􅁮為巫令有惠政桑生二萬餘株民以為給魏畧曰楊沛為新鄭長課民益蓄桑椹䝁豆積浸得千餘斛太祖迎天子軍無糧沛乃進乾椹後為鄴令賜其生口十人絹百疋以報乾椹也蜀志曰先主舎東南角籬傍有桑樹髙丈餘遥望童童如車葢往來者皆怪此樹非凡或謂當出貴人先主少時與宗中諸兒於樹下戲言吾必當乘此羽葆車葢晉書曰賈后將廢愍懐太子時有桑生於西廂長數月而枯十二月后廢太子又曰劉驎之尚書質素好道車騎將軍栢冲聞名辟為長史固辭冲嘗到其家驎之方躬採桑使者致命驎之曰使君既枉駕光臨宜先詣家君冲愧詣其父又載記曰北燕馮跋下書曰今疆宇無虞百姓寜業而田畝荒穢有司不隨時督察欲令家給人足不亦難乎桑柘之益有生之本此土少桑人未見其利可令百姓人植桑一百二十株崔鴻前凉録曰張天錫為苻堅破後歸晉孝武帝問之曰北方何物為美錫對曰桑椹甘香鵁鶄革響淳酪養性人無妬心崔鴻十六國春秋後燕録曰初晃之遷於龍城也植松為社主及秦滅燕大風吹拔之後數年社處忽有桑二根生焉先是遼川無桑及廆通於晉求種江南平川之桑悉由呉來齊書曰太祖宅在武進宅南有桑樹本髙三丈横出四枝狀如車葢上年數嵗逰其下從兄敬宗謂曰此樹為汝生也又曰沈瑀為建徳令教人一丁種十五株桑四株柿栗女丁半之人咸歡悦頃之成林又曰韓係伯襄陽人事父母孝謹襄陽土俗鄰居種桑樹於界上為誌係伯以桑隂妨他人地遂遷開數尺鄰畔隨侵之係伯輙更叚種久之鄰人慙愧還所侵地躬往謝之又曰扶桑國在大漢國東二萬餘里地在中國之東其土多扶桑木故以為名扶桑似桐初生如笋國人食之實如棃而赤績其皮為布以為衣亦以為綿又以其皮為紙三國典畧曰賊宋子仙召呉令沈公景令掌書記景固辭以疾子仙怒命斬之景解衣就戮礙於路間桑樹乃更牽往他處或救之獲免又曰齊長廣郡㕔梁木忽作像人形太守惡而刷去之明日復出鄉人伐枯桑樹於中得死龍長尺餘識者以為長廣齊太上王本封也齊氏木徳龍為吉象木枯龍死非吉徴焉隋書曰齊河清中定令丁給永業二十畝為桑田給其種桑五十根榆三根棗五根土不宜桑者給麻田如桑法家語曰殷太戊之時道缺法圯以致殃孽桑榖生朝范子計然曰桑葉出出三輔列子曰晉文公㑹欲伐衛公子鉏仰而笑公問何笑對曰臣之隣有送妻適婦家者道見桑婦悦而與言然顧視其妻亦有招之者臣竊笑此也公悟其言乃止引師還未至而有伐其北鄙者孟子曰孟子謂梁惠王曰五畝之宅樹之以桑五十者可以衣帛矣孫子卿曰孔子適楚於陳蔡之間七日不食曰居不隠者思不生身不佚者志不廣汝痛之吾不得之桑落之韓子曰子産開畝樹桑鄭人謗訾鄒子曰季夏取桑柘之火吕氏春秋曰伊尹之母居伊水上孕夢有神告之曰臼出水而東走無顧明日視臼中出水告其隣東走顧其邑盡為水身因化為桑有莘氏採桑得嬰兒於桑之中獻之於君君命乳之命之曰伊尹淮南子曰原蠶一嵗再登非不利也登成也然王法禁之者為其殘桑也殘害也又曰扶桑在陽州日所拂注東方十日所出扶桑𤾉谷中九日居下枝一日居上枝也山海經曰宣山上有桑大五十尺圍五丈其枝四衢枝交四出葉大尺赤黑色名曰帝女之桑郭璞曰婦人主桑故以名也又曰東北海外圓丘南有三桑無枝皆高百仞又曰暘谷上有扶木郭璞曰扶桑十日所浴穆天子傳曰甲寅天子居范宫范離宫别名以觀桑者詩曰桑者閑閑兮乃飲於桑中桑林之中天子命桑虞主桑者也出桑者用禁暴民不得令妾割犯桑也神異經曰東方有樹焉高八十尺敷張自輔葉長一丈廣六七尺曰扶桑有椹焉長三尺五寸列女傳曰魯秋胡子納妻五日而宦於陳後歸未至家見路傍有美婦人方採桑秋胡悦之下車願託桑隂下婦人採桑不輟胡曰力田不如逢年採桑不如逢郎今吾有金願與夫人婦人不受胡乃歸母呼其婦乃向採桑者也數胡之罪而自投於河又曰齊宿瘤女者東郭採桑之女項有大瘤閔王逰至東郭百姓盡觀宿瘤女採桑如故王怪召問之對曰受父母教採桑不受教觀大王王曰此竒女也聘迎之又曰東辨女者東國採桑之女也晉大夫解居甫使於宋解居甫宋大夫道過採桑之女止而戲之曰若為我歌吾將捨女採桑女乃歌曰墓門有棘斧以斯之夫也不良國人知之益都耆舊傳曰何祗夢桑生於井中解者曰桑字四十八君夀恐不可過此祗四十八而卒荆州先賢傳曰龎士元師事司馬徳操不務小名衆莫之知徳操蠶月躬採桑後園士元助之因與談當世廢興其言若神遂移日忘食德操於是異之甄異傳曰沛國張伯逺年十嵗時病亡見太山下有十餘小兒共推一大車車高數丈伯逺亦推之時天風暴起揚塵伯逺絓桑枝而住聞呼聲便歸遂蘇髪中皆有沙塵后年大至泰山識桑如死時所見也十洲記曰扶桑在碧海中上有天帝宫東王公所植有椹樹長數千丈大一千圍兩兩同根更相依倚故曰扶桑仙人食椹體作金色其樹雖大椹如中夏桑椹也稀而色赤九十嵗一生實味甘𤣥中記曰天下之高者扶桑無枝木焉上至天盤屈蜿蜒而下括地圖曰化民食桑二十七年化而自裹九年生翼十年而死石虎節中記曰桑梓苑中盡種桑三月三及蠶時虎皇后宫人數十出遊􅃧桑樹下神仙傳曰麻姑謂王方平云吾見東海三為桑田本草經曰桑根傍行出土上者名伏蛇治心痛神農本草曰桑根白皮是今桑樹根上白皮常以四月採或採時見岀地上者慎勿取有毒殺人古詩曰枯桑知天風海水知天寒繁欽桑賦曰上似華葢紫極比形下象鳳闕萬桷一楹陸機桑賦曰初世祖皇帝為中壘將軍植桑一株世更三代年漸三紀緑葉興而盈尺崇條蔓而增㝷曹植艷歌曰出自薊北門遥望胡池桑枝枝自相值葉葉自相當太平御覽卷九百五十五
