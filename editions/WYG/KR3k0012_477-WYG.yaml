body:
  text: 太平御覽卷四百七十七宋李昉等撰人事部一百十八施惠下宋書曰范叔孫少而仁厚周窮濟急鄉曲貴其義行無有呼其名者又曰劉凝之傅衡陽王義季荆州年饑義季慮凝之餒餉錢十萬凝之大喜將錢至市門觀其饑色者悉分與之俄頃立盡又曰張進之少有志厯郡五官主簿永寧安固二縣領校尉家世富足經荒蕪年散其財救贍鄉里遂以貧罄全濟者甚多又曰嚴世期㑹稽山陰人也好施慕善出自天然同里張邁三人妻子各産子時歲饑儉慮不相存欲棄而不舉期聞之馳往拯救分食解衣以贍其乏三子竝得成長又曰蕭惠開為益州牧太始四年還至京師初惠開府録事叅軍劉希㣲假蜀人債將百萬為債主所制未得俱還惠開甚耻之輙之廐中凡有馬六十疋悉以與希㣲償債其意趣不常皆如此齊書曰劉善明平原人懐珍族弟祖徐州刺史鎮北將軍父懐民宋世為齊北海二郡太守元嘉末青州饑荒人相食善明家有積粟躬食饘粥開倉以救鄉里多獲全濟百姓呼其家田為續命田崔鴻前凉録曰張冲字長思燉煌人散家財巨萬施之鄉閭時人為之謡曰推財不疑張長思後燕録曰趙狄字子武汲郡朝歌人少而輕財好施隣人李元度母死家貧無以葬狄謂其兄曰起死生救不足人之本也家有二牛以一與之元度得以葬他年狄夜行見一老母遺金一餅曰子能葬我是以相報子五十已後當富貴不可言勿忘元度也後魏書曰祖巖字洪山家固安縣世有積粟至數萬石自延昌以來北州頻經災儉巖兄弟傾家贍遺常見州郡徴租甚急巗遂以家粟萬斛代輸聞者莫不嗟嘆又曰張普惠不營財業好有進舉敦於故舊冀州人侯堅固少時與共遊學早終其子長瑜普惠每於四時請禄無不减贍給其衣食隋書郭衍授瀛州刺史遇秋霖大水其屬縣多漂没民皆上髙樹依大塜衍親備船栰并賫粮拯救之民多獲濟衍先開倉䘏後始聞奏上大善之唐書曰孟簡性俊㧞尚義早嵗交友先没者視其孤每厚於周䘏議者以為有前輩風又曰李藩少恬淡脩儉雅容儀好學父卒家富於財親族弔者有挈去不禁愈務散施不數年而貧年四十餘未仕讀書揚州困於自給妻子怨尤之晏如也又曰盧鈞為嶺南節度使自貞元已來衣冠得罪流放嶺表者因物故子孫貧悴雖遇赦不能自還凡在封境者鈞减俸錢為營槥櫝其家疾病死䘮則為之醫藥殯殮孤兒稚女為之婚嫁凡數百家又曰李臯貶温州長史攝行州事嵗儉州有官粟數十萬斛欲行賑救掾吏叩頭乞候上㫖臯曰夫人一日不再食當死安暇禀命若殺我一身活數千命利莫大焉於是開倉盡散之以擅貸之罪飛章自劾天子聞而嘉之荅以優詔崔氏家傳座右銘曰無論人之短無道己之長施人慎勿念受施慎勿忘隱心而後動謗議庸何傷虛譽不足慕古戒不可忘家語曰子游問於孔子曰夫子亟言子産之惠也可得聞乎孔子曰夫子産者猶衆人之母也食之不能教之以其乘車濟冬渉者盖愛而無教也又曰孔子曰好學則智恤孤則惠恭則近禮勸則有經又尚書大𫝊曰老而無妻謂之鰥老而無夫謂之寡㓜而無父謂之孤老而無子謂之獨行而無資謂之乏居而無食謂之困此皆天下之至悲哀而無告者故聖人在上君子在位能者任職必先施此無使失職戰國策曰襄王立田單相之過淄有老人渉淄而寒出不能行坐沙中田單見其寒也解裘而衣之王乃賜田單牛酒召單而揖於庭勞之乃布令求百姓之饑寒者收榖之乃使人聽於閭里聞大夫相與語曰單之愛人乃王之教之也江表傳曰全琮罷東安郡還錢塘修祭墳墓麾幢節葢曜於舊里請㑹邑人平生知舊宗族八親施散惠與千有餘萬本土以為榮又曰司馬徽有臨蠶向其求簇者徽便與之自棄其蠶或有難之者凡人有損己以贍人謂彼事急己事緩耳今彼此正等何為急損己以與人邪徽曰人不當求耳人己求拒之將慙何有以財貨令人慙者也董卓别傳曰太常張奐將師北征表卓為軍司馬從軍行卓手斬購募羌酋拜五官中郎賜縑九千疋卓歎曰為者則已有者則士悉以縑分與兵吏葛洪神仙傳曰焦先日日入山伐薪以布施從西村頭一家起周而復始秦書曰尚書令苻雅為人樂施乞人填門嘗曰天下物何常吾今日富後日貧耳忽一日不施則意不泰時人為之語曰不為權異富寧作苻雅貧賈誼新書曰楚昭王當房而立愀然有寒色是日也出府衣裘以衣寒者出倉之粟以賑饑者二年呉襲郢當房賜者請還戰死闔閭曰皆當房之德也三輔决録曰摯茂字子華以茂才為郡法曹治財致大富悉散以分宗人先從貧始以夀終虞預㑹稽典録曰駱俊字逺孝靈皇帝擢拜陳相汝南葛陂盗賊並起與接境四面受敵俊整厲吏人為之保障出倉見糓以贍貧乏劉劭人物志曰中材之人隨財損益是故籍富貴則貨財充於内施惠周於外見贍者求可稱而譽之見授者闡小美而大之雖無異材猶行成而名立也英雄記曰王匡字公節㤗山人輕財好施以任俠聞辟大將軍何進府使匡於徐州發强弩五百詣京師㑹進敗匡還鄉里劉義慶世說曰顧榮在洛嘗應人請覺行炙人有欲炙之色因輟已施焉後遭亂渡江每經危急常有一小人左右問其所以乃受炙人也顔延之庭誥曰善施者豈唯發自人心乃出天才裴啟語林曰大將軍王敦尚武帝女此主特所重愛遣送倍於諸主主既亡人就王乞始猶分物與之後乞者多遂指庫屋間數以施孔藂子曰衛公子友饋馬四乘於子思為賔主之餼焉子思曰伋寄命以來度身以服衛之衣量腹以食衛之粟且又朝夕受酒脯及祭膰之賜衣食已優意氣已足以無行志未敢當車馬貺禮雖有爵賜人不踰父兄今重違公子之盛指則有䧟禮之愆焉若何公子曰友已言於君矣又曰季桓子以粟千鍾餼夫子受之而不辭旣而以頒門人之無者子貢進曰季孫以夫子貧故致粟夫子受之而以施人無乃非季孫之意乎子曰受人財不以成富與季孫之惠於一人豈若惠數百之人哉列子曰衛端木叔者子貢之世父也籍其先資家累萬金奉養之餘先散之宗族次散之邑里乃散一國行年六十氣幹衰弃其家事都散其庫藏珎寳車服妾媵一年之中盡焉及其病也無藥石之儲及其死也無埋葬之資一國之人受其施者相與賦而藏之及其子孫之財焉金屈㲠聞之曰端木叔狂人也辱其祖矣叚干生聞之曰端木叔逹人也德過其祖矣莊子曰青青之麥生於陵陂生不布施死何含珠也孟子曰子産聽鄭國之政以其乘輿濟人於溱洧孟子曰惠而不知為政嵗十一月徒杠成十二月輿梁成民未病渉韓子曰呉起為魏將攻中山軍人有病疽者呉起跪而自吮其膿傷者母立而泣人曰將軍於若子如是何為泣母對曰昔呉子吮其父傷而殺之涇水之上今又將安知不殺是乎吕氏春秋曰秦繆公乘馬車敗右服失公自往求馬見野人方將食之於岐山之陽繆公笑曰食馬肉而不飲酒余恐其傷生也遍以飲之居一年為韓原之戰晉人已環繆公之車矣嘗食馬肉三百餘人疾闘車下遂大尅晉反獲晉公以歸吕覽曰魯國之法魯人為人臣妾於諸侯有能贖之者取其金於府子貢贖魯人於諸侯而辭不受其金孔子曰賜失之矣自今以往魯人不贖人也淮南子曰為魚德者非挈而入淵也為猿賜者非負以縁木也縱其所之而已矣太平御覽卷四百七十七
