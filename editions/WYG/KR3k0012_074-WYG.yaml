body:
  text: 太平御覽卷七十四宋李昉等撰地部三十九塘隄島嶼滸岸泥礫沙塘録異傳曰文翁者廬江人為兒童時乃有神異及長當初厯下岐以作田文翁盡日斫伐柴薪以為陂塘其夜忽有數百頭野猪以鼻戴土著柴中比曉成塘吳地記曰壇塘一名陌城夫差十二年既殺子胥後悔之與群臣臨江作塘創設祭奠百姓因以立廟吴越春秋云夫差設祭杯動酒盡劉道真錢塘記曰防海大塘在縣東去邑一里往時郡議曹華家甚富乃議立此塘以防海水始開募有能運土石一斛即與錢一升旬日之間來者雲集塘未成而譎不復取於是載土石者棄置而去塘以之成既遏絶潮源一境蒙利也述異記曰今烏江長亭亭下有騅馬塘即當時烏江亭長艤舟待項王處南越志曰丹城縣有釜塘金沙自是而出裴淵廣州記曰彰平縣朱沙塘水如絳魚鼈皆赤荆州記曰長沙郡東十餘里有郡人劉夀墓有石闕四所夀漢順帝時為司徒其東有龜塘周廽四十五里有靈龜出其中故塘因名焉盛𢎞之荆州記曰始安熈平縣東南有山山西其形長狹水從下注塘一日再見盈縮因名為潮汐塘幽明録曰耒陽縣東北有廬塘淹地八頃其深不可測中有大魚常至五日一躍奮出水大可三圍其狀異常每躍出水則小魚奔迸隨水上岸不可勝計述異記云廬塘有蛟魚五日一化或為美婦人或為男子至於變亂尤多郡人相畏故不敢有害心蛟亦不能為計後為雷電殺之此塘遂涸劉欣期交州記曰鑿南塘者九真路之所經去州五百里馬援積石為塘以通於海達於象浦建標為南極之界淮南子曰壞塘取龜發屋求狸桀跖之徒君子不為堤爾雅䟽墳大防也謂堤雖水所皆有而河墳最大也梁書曰始興忠武王憺音炎字僧達為荆州刺史遇大江溢堤壞憺親率將吏冐雨築之水勢甚猛人皆恐懼或請避之憺曰王尊尚欲身塞河堤我心何獨以危避登堤嘆息遂輟膳而刑白馬以祭江神以身為百姓請命言終而水退堤出郡國志曰長沙金牛堤漢武時有異人牽金牛走入此堤内因以名焉水經注曰涿郡王尊自益州刺史遷東郡太守河水盛溢泛浸瓠子金堤尊躬率吏民投沉白馬祈水神河伯親執圭璧請身填堤廬居其上吏民皆走尊立不動水齊足而止公私壯其勇節又曰漢安帝永初七年令謁者太山矛岑於石門東積石八所皆如小山以捍衝波謂之八激堤島釋名曰海中可居曰島到也人所奔到漢書曰田横懼誅入居海島中魏志曰王傾討句驪入沃沮人云嘗乗船捕魚風吹十日東得一島上有人常以七月取童女沉海齊地記曰嶗山東北五里入海有管彦島是黄巾賊帥管承後也又曰東牟城東有盤島城東北有牛島常以五月海牛及海狸與鳥產乳其上嶼臨海記曰去郡七里東有樊續嶼嶼上空冢裡猶餘敗鼓角或呼為樊府君墓今郡公田在此嶼下滸爾雅曰岸下地曰滸詩曰綿綿葛藟在河之滸岸爾雅曰重涯曰岸詩曰髙岸為谷又曰淇則有岸晉書曰殷仲堪於江濵見流棺而葬焉旬日之間門溝忽起為岸其夕有人自稱感君之恩堪因問岸何祥也答曰水中有岸曰州君將得州言終而沒至是果得荆州也水經注曰船官浦東即黄鵠山林間甚美譙郡戴仲若野服居之山下謂之黄鵠岸又曰昆明池有金堤石岸益州有金堤左思曰西踰金堤東越玉津孫卿子曰泉生珠而岸不枯泥說文曰泥黑土在水中者也易曰井泥不食舊井无禽在井之下故稱泥井而泥則不可食書曰淮海惟揚州厥土惟塗泥詩含神霧曰夫齊之地處孟春之位海岱之間土地汚泥流之所歸利之所聚傳曰晉楚將戰吕錡夢射月中之退入於泥論語曰子夏云雖小道必有可觀者焉致遠恐泥是以君子不為小道今諸子書泥滯䧟不通也去聲漢書溝洫志曰涇水一石其泥數斗且漑且糞長我禾黍又曰禹泥行乗橇東觀漢記曰隗囂將王元說囂使背漢曰請以一丸泥為大王東封函谷關此萬世一時也又曰鄧訓將黎陽宫兵屯漁陽遷䕶烏丸校尉黎陽宫故吏皆戀慕知訓好以青泥封書從黎陽歩推鹿車載青泥至上谷遺訓其得人心如此隴右記曰武都紫水有泥其色亦紫而粘貢之用封璽書故詔誥有紫泥之封帝王世紀曰周穆王征犬戎得錬剛赤刀用之割玉如割泥焉神仙傳曰童奉君居廬山嘗大旱縣令于士彥詣奉說大旱之意奉因仰視其屋曰貧家屋皆見天不可以得雨如何令解其意身率將吏為起屋屋成當泥壁作人已掘土欲取江水沃泥奉曰不湏日暮當雨也其夜果大雨聚壤成泥顧㣲廣州記曰鬰林郡山東南有池有石牛在池下民常祀之嵗旱百姓殺牛祀之以牛血和泥泥石牛背祀畢天雨洪注洗背泥盡而後晴曾子曰白沙在泥與之皆黑淮南子曰琬琰之玉在汚泥之中雖亷者不釋也世說曰石崇以椒為泥泥屋王君夫以赤石脂泥壁雜五行書曰二月上壬取土泥屋四角蠶吉礫釋名曰小石曰礫礫者析也小石相支其間析析然抱朴子曰軍術曰地生瓦礫不去有大禍蔡伯喈青衣賦曰金生沙礫珠出蚌泥盧子雲相風賦曰楚石雜結緑沙礫厠隋珠沙龍魚河圖曰蚩尤兄弟八十一人並銅頭鐵額食沙石韓詩外傳曰孔子南逰適楚至於阿谷之隧有女子佩瑱而浣者孔子曰彼婦人其可與言乎執觴以授子貢曰善為之辭婦人答曰阿谷之隧隱曲之泥欲飲則飲何問於婢子授子貢觴跪坐置之沙上曰禮不親授又曰西河至於流沙千里而遙雍州是也家語曰得其人如聚沙而雨之非其人如㑹聾而鼓之史記曰張良以鐵椎擊秦始皇於博浪沙中其副車又曰上在雒陽南宫從複道望見諸將往往相與坐沙中語又曰武帝元封元年旱於是天子乃禱萬里沙應劭注曰萬里沙祠戰國䇿曰齊襄王立田單相之過淄水有老人渉淄而寒不能行坐沙中田單見其寒也解裘而衣之襄王曰弗早圖恐後悔之疑單有異心也漢書曰韓信擊龍且夾睢水夜令人為萬餘囊盛沙以壅水上流東觀漢記曰朱鮪等共㑹洧水上沙中設壇立聖公為天子博物志曰石蕃衛臣也背能負千二百石沙廣志曰流沙在玉門關外南北二千里東西數百里有三斷名曰三隴列子曰牛􅆙者上地之大儒過邯鄲遇盜於耦沙魯連子曰朝露之蒲工女不能治淄澠之沙計兒不能數韓子曰孫叔敖請漢間之地沙石之處曾子曰白沙在泥與之皆黑淮南子曰河水欲清沙壤穢之又曰寒凝水熱焦沙抱朴子曰穆王南征一軍盡化小人為蟲沙說苑曰湯之時大旱七年焦沙爛石葛洪肘後方曰治溺水方熬沙以覆死人使上下有水俱出口鼻古今注曰宣帝地節元年上都沙中夜風有火如粟曹瞞傳曰操征馬超隔渭水婁子伯說曰今天寒可起沙為城以水灌之可一夜而成劉根别傳曰潁川太守髙府君到官民人疫郡中吏民死者過半夫人郎君悉得病從根求消除病氣之術根曰於㕔事之亥上穿地取沙三斛著室中醇酒三升沃其上府君從之病者悉得愈疫氣絶搜神記曰有物處于江水其名曰蜮一曰短狐能含沙射人以術方抑之則得沙石於肉中叚國沙州記曰澆河西有黄沙沙南北一百二十里東西七里西極大楊川望黄沙猶人委乾糒地不生草木黄沙蕩然沙州取號焉豫章記曰龍沙在郡北帶江沙甚潔白髙峻而峙陂陁有龍形舊俗九月九日登高新安記曰錦沙村傍山依壑素波澄漾錦石舒文冠軍吳喜聞之而造焉皷柂逰泛彌旬忘返歎曰名山美石故不虚賞使人䘮朱門之志王孚記曰袁州有水春交則上白沙如米於两岸九十餘里呼為米沙若一岸徧米其方豐熟湘中記曰白沙如霜雪赤岸似朝霞遁甲開山圖曰沙土之浦雲陽之墟可以長生可以隱居沙土即長沙也雲陽古仙人也郡國志曰浙江杭州有江沙漲昔武烈為郡吏赴府鄉人餞之㑹此沙上父老曰此沙狹而長君必為長沙太守果然又曰伊州鐵勒國也而路多沙磧磧内時聞呌喚聲不見人或聞歌笑之聲蓋鬼物也鄱陽記曰新昌水有一沙堆在縣東北五十里其形狀如釜然鮮净特異每年豐稔其沙郡堆積如舊若沙移河岸其年儉古來相傳以為常驗太平御覽卷七十四
