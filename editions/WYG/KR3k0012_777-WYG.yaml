body:
  text: 太平御覽卷七百七十七宋李昉等撰奉使部一奉使上周禮小行人曰使適四方協九儀賔客之禮朝覲宗遇㑹同君之禮也存頫省聘問臣之禮也又掌邦國賓客之禮籍以待四方之使者凡四方之使者大客則擯小客則受其幣而聼其辭禮曰凡為君使者已受命君言不宿於家君言至則主人出拜君言之辱使者歸則必拜送於門外若使人於君所則必朝服而命之使者反則必下堂而受命詩曰四牡勞使臣之來也有功而見知則説矣四牡騑騑周道逶遲豈不懐歸王事靡盬我心傷悲又曰皇皇者華君遣使臣也送之以禮樂言逺而有光華皇皇者華於彼原隰駪駪征夫毎懐靡及左傳曰齊使仲孫湫來省難仲孫歸曰不去慶父魯難未已公曰若之何而去之對曰難不已将自斃君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以為本也臣聞之國将亡本必先顛而後枝葉從之魯不棄周禮未可動也君其務寜魯難而親有禮因重固能重固者因而成之間擕貳覆昏亂覇王之器也又曰齊孝公伐我北鄙公使展喜犒師使受命於展禽栁下恵也齊侯未入境展喜從之曰寡君聞君親舉玉趾將辱於敝邑使下臣犒執事又曰晉侯及秦伯圍鄭以其無禮於晉且貳於楚也晉軍函陵秦軍汜南佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退公從之又文下曰秦伯使西乞術來聘且言将伐晉襄仲辭玉曰君不忘先君之好照臨魯國鎮撫其社稷重之以大器寡君敢辭玉賔荅曰不腆先君之弊器而使下臣結二國之好是以敢致之襄仲曰不有君子其能國乎國無陋矣厚賄之又宣十五年曰楚子圍宋宋人使樂嬰齊告急於晉晉侯使解楊如宋使無降楚曰晉師悉起将至矣鄭人囚而獻諸楚楚子厚賂之使反其言不許三而許之登諸樓車使呼宋人而告之遂致其君命楚子将殺之使與之言曰爾既許不榖而反之何故非我無信汝則棄之速即爾刑對曰臣聞之君能制命為義臣能承命為信信載義而行之為利謀不失利以衛社稷民之主也義無二信信無二命義本信而行不受二命也君之賂臣不知命也奉命以出有死無霣音殞又可賂乎臣之許君以成命也成其君命也死而成命臣之禄也寡君有信臣下臣獲考死又奚求楚子舎之以歸又曰晉侯使郤克徴㑹于齊齊頃公帷婦人使觀之郤子登婦人笑於房獻子怒出而誓曰所不此報無能渉河郤子請伐齊晉侯弗許至成公三年衛孫桓子臧宣叔亦乞師以伐齊晉侯許之又曰齊叔老為季武子介自是晉人輕魯幣而益敬其使又曰呉公子札來聘見叔孫穆子説之謂穆子曰子其不得死乎好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不慎所與何以堪之禍必及子聘于齊説晏平仲謂之曰子速納邑與政無邑無政乃免於難齊國之政将有所歸未獲所歸難未歇也故晏平仲因陳桓子以納政與邑是以免於欒髙之難事在昭八年聘于鄭見子産如舊相識與之縞帶子産獻紵衣焉大帶呉地貴縞鄭地貴紵故各獻己所貴示損己而不為彼貨利謂子産曰鄭之執政侈難将至矣政必及子為政慎以禮不然鄭國将敗又曰韓宣子如楚送女叔向為介鄭子皮子太叔勞諸索氏太叔謂向曰楚王侈已甚子其戒之叔向曰汰侈已甚身之災也焉能及人若奉吾幣帛慎吾威儀守之以信行之以禮敬始而思終終無不復行而不失儀敬而不失禮尊之以訓詞奉之以舊法考之以先王度之以二國雖汰侈若我何又曰楚費無極譛太子建王使城父司馬奮楊殺太子建未至而使遣之太子奔宋王召奮楊使城父人執巳而至王曰言出於余口入於爾耳誰告建也對曰臣告之君王命臣曰事建如事余臣不佞不能苟貳奉初以還不忍後命故遣之既而悔之亦無及也已王曰而敢來何也對曰使而失命召而不來是再奸也逃無所入王曰歸從政如他日論語曰使於四方不辱君命可謂士矣又曰蘧伯玉使人於孔子孔子與之坐而問焉曰夫子欲寡其過而未能也使者出子曰使乎使乎史記曰呉季札之為使北遇徐君徐君初好札劍口雖弗言季札知之為使上國未獻還至徐君徐君已死乃解其寳劍繫徐君塜樹而去之從者曰徐君已死當誰與乎曰不然始吾已心許之豈以死背吾心哉又曰趙平原君使人於春申君趙使欲夸楚為瑇瑁簮刃劒室悉以珠飾之春申君三千餘人上客皆躡珠履以見趙使大慙又曰陸賈楚人以客從髙祖定天下名為有口辯士居左右常使諸侯時中國初定佗平南越因王之髙祖使賈賜佗印為南越王佗魋結箕踞見賈賈因説佗曰足下以區區之越與天子抗衡為敵國禍且及身矣佗乃蹶然起坐謝賈曰生長蠻夷中久殊失禮義因問賈曰我與蕭何曹參韓信孰賢賈曰王似賢之復問曰我與皇帝孰賢賈曰皇帝起豐沛討暴秦誅强楚為天下興利除害繼五帝三王之業統理中國中國之人以億計地方萬里居天下之膏腴人衆車轝萬物殷富政由一家自天下剖判未始有也今王衆不過數十萬皆蠻夷﨑嶇山海間譬若漢一郡王何乃比於漢佗笑曰吾不起中國故王此使我居中國何遽不若漢迺大恱賈至孝文帝元年召丞相陳平舉可使南越者平言陸賈先帝時習使南越乃召為太中大夫往使因讓佗自立為帝南越王甚恐為書謝於是乃下命國中曰吾聞兩雄不俱立兩賢不並世皇帝賢天子也自今以後去帝制黄屋左纛賈還贄文帝大恱又曰汲黯為謁者東越相攻上使黯往視之不至至呉而還報曰越人相攻固其俗然不足以辱天子之使河南失火燒千餘家上使黯往視之還報曰家人失火屋比延燒不足憂也臣過河南貧人傷水旱萬餘家或父子相食臣謹以便宜持莭發河南倉粟以賑貧民臣請歸莭伏矯制之罪上賢而釋之又曰司馬相如為郎數嵗㑹唐蒙使畧通夜郎西僰中發巴蜀吏卒千人郡又多為發轉漕萬餘人用軍興法誅其渠而巴蜀民大驚恐上聞之乃使相如責唐䝉等因喻告巴蜀民以非上意還報天子拜相如為中郎将建莭馳四乗之傳因巴蜀幣物以賂西南夷至蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵於是卓王孫臨卭諸公皆因門下而獻牛酒又曰淳于髠者齊之贅壻也壻比于子如人疣贅也長不滿七尺滑稽滑音骨亂也稽同也多辯數使諸侯未嘗詘辱威王八年楚大發兵加齊齊王使淳于髠之趙請兵齎金百斤馬千駟淳于髠仰天大笑冠纓索絶王曰先生少之乎髠曰何敢王曰先生笑豈有説乎髠曰今者臣從東來見道旁有穰田者操一㹠蹄酒一盂而祝曰甌窶滿篝篝籠也音溝甌窶猶柸樓也言豐年收掇易可滿篝汚耶滿車汚耶下地田也即下地田之中有薪萊可滿車也五榖蕃熟穰穰滿家臣見所持者狹而欲者奢故笑於是齊王乃益齎黄金千鎰白璧十雙車馬百駟髠辭而行至趙趙與之精兵十萬革車千乗楚聞之夜引兵而去威王大悦漢書曰漢王曰孰能為我使淮南使之發兵背楚留項王於齊數月我之取天下可萬全隨何曰臣請使之乃與二十人俱使淮南至太宰主之淮南太宰作内主也三日不得見隨何因説太宰曰王之不見何必以楚為强以漢為弱使何得見言之而是耶是大王所欲聞言之而非耶使何等二十人伏斧鑕淮南市以明背漢而與楚也太宰乃言之王王見之隨何説淮南王王曰請奉命隂許叛楚與漢未敢泄楚使者在方急責布發兵隨何直入曰九江王歸漢楚何以得發兵布驚曰何至是楚使者出何曰事已搆可殺楚使歸而疾走漢併力布從之遂歸漢又曰張騫漢中人建元中為郎時匈奴降者言匈奴破月支氏擒其王以其頭為飲器月攴遁而怨匈奴無對與共擊之漢方欲滅胡聞之乃募使者騫應募與堂邑氏奴甘父俱往匈奴不聼去乃留騫十餘嵗娶胡妻有子然騫持漢莭不失居匈奴西騫因與其屬亡鄉月支氏西走數十日至大宛後單于死國亂騫與胡妻及堂邑父俱亡歸漢拜騫太中大夫騫為人寛信蠻夷愛之騫曰臣在大夏時見卭竹杖蜀布問安得此國人曰吾賈人往市之身毒國一名天竺國在大夏東南數千里人乗象以戰臣度大夏去漢萬二千里有蜀物其去蜀不逺矣於是漢復事西南夷騫從大将軍擊匈奴嘗諳知水草處軍得不乏封博望侯又曰張騫使至安息王令将二萬騎迎於東界自界至王都數千里比至過數十城人民相屬甚衆使還即發使來隨欲觀漢廣大以大鳥卵黎軒善眩人獻於漢及宛西小國皆隨漢使獻見天子又曰傅介子昭帝使道西域樓蘭嘗邀漢使殺之後使介子往而讓之旋謂将軍霍光曰彼王反覆不誅無以懲其惡臣嘗遇之近人易就耳願往刺之以示諸國光曰可矣遂奏介子行具卒乗賫重幣陽言賜外國而志在樓蘭樓蘭王意不親介子介子陽引去至其西界使譯者謂王曰漢使持重寳行賜諸國王不來我之西矣即出金幣以示譯者譯者還報王王貪漢物來見介子與坐飲陳物示之飲酒皆醉介子謂王曰天子使我私報王王隨介子入帳中屏語壯士二人從後刺之刃交胷立死其貴人左右皆散走介子告諭以王負漢罪天子遣我來討王當更立前太子質在漢者為王漢兵方至無得輙動動則滅國矣遂持王首而還詣闕朝廷嘉之封介子為義陽侯食邑七百户又曰蘇武字子卿建次子也少以父任為郎中武帝遣以為郎將使持節送匈奴使留在漢者武與副中郎将張勝及假吏常惠等募士斥候百餘人俱既至匈奴致幣遺單于單于益驕非漢所望也方欲發使送武等㑹緱王與長水虞常等謀反匈奴中緱王是昆耶王姊子與昆耶王俱降漢後隨浞野侯没胡中及衛律所将降者隂相與謀刼單于母閼氏歸漢㑹武等至匈奴虞常在漢時素與張勝善私候勝曰聞漢天子甚怨衛律常能為漢伏弩射殺之吾母與弟在漢幸䝉爵賞張勝許之事敗單于怒欲殺漢使左伊狄訾曰宜皆降之單于使衛律召武受辭武謂常惠曰屈莭辱命雖生何面目以歸漢乃引佩刀自刺衛律大驚召醫瘡單于鑿地為坎置煴火覆武其上蹈其背以出血氣絶半日復息惠勝等號哭單于壯其莭朝夕遣人候問武愈單于愈欲降之武不能屈乃幽武大窖中絶食天雨雪武卧囓雪與氊毛并吞之數日不死匈奴以為神乃徙武於北海令牧羊不得食掘野鼠去草實食之杖漢莭旄盡落積五六年昭帝即位與匈奴和親求武匈奴紿言死後漢使復至匈奴常惠請其守者夜見漢使教使謂單于曰天子射上林中得鴈足有係帛書言武在北海大澤中牧羊使者如惠言以讓單于單于視左右大驚謝漢使曰武等實在乃召武相隨官屬等九人歸漢武以元始六年春至京師拜典屬國常惠䓁皆為郎又曰鄭吉㑹稽人累遷衛司馬神爵中匈奴亂日逐王欲降漢使人與吉相聞於是漢使吉迎之日逐王并口萬二千人隨吉至河曲遂将詣京師吉既破車師降日逐王威震西域遂䕶車師以西北道故號都䕶都䕶之置自吉始焉又曰陳湯為人沉勇有大慮多謀䇿喜竒功所過城邑山川常登望以觀形勢常患位卑權輕不決胷億之謀時西方郅支單于常殺漢使侵横諸國朝廷患之谷吉上書願徃諭王遇害乃遣湯與甘延夀使于西域湯謂延夀曰郅攴單于結怨諸夷屈辱漢使朝廷患之久矣雖然蠻夷無金城湯池之固堅弩之器恩義不行彼可取也若舉屯田吏士并發烏孫兵直招抵城下彼亡無所保千載之功可致也延夀然之請奏湯曰不可不如矯詔而發之延夀不從㑹延夀卧疾湯因矯制發城郭諸國兵胡漢四萬餘騎置官吏而發之已行延夀聞而驚起止之湯按劒叱之曰大衆已集䜿子胡敢阻衆耶乃上疏自劾矯詔之状因分兵葱嶺赤谷兩道鼓行而西去單于城三十里止而營單于怪之使人問之曰漢兵何以來湯曰見單于棄大國屈意康居故來䕶單于耳單于不知意㫖猶豫無備因夜進兵圍城遲明㧞之斬郅支單于以歸又曰盖寛饒字次公魏郡人也明經為郡文學以孝亷為郎舉方正對䇿髙第遷諫議大夫寛饒為衛司馬有厚徳宣帝嘉之以寛饒為太中大夫使行風俗多所稱舉貶黜奉使稱㫖擢為司𨽻校尉刺舉無所廽避小大輙舉所劾奏衆多廷尉處其法半用半不用以其峻刻故有不用者公卿所劾及郡國吏繇使至長安皆恐懼不敢犯禁京師為之清平又曰終軍從濟南當詣博士歩入闗闗吏予軍繻軍問以此何為吏曰為傳復日當以合符軍曰大丈夫西逰終不復傳還棄繻而去軍後為謁者使行郡國建莭東出闗闗吏識之曰此使者乃前棄繻生也軍行郡國所見便宜以聞還奏事上甚悦太平御覽卷七百七十七
