  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_610-1a, image: WYG0898/WYG0898-0521c.png}
body:
  text: 太平御覽卷六百十宋李昉等撰學部四禮春秋孝經禮釋名曰禮體也言得事之體也太公六韜曰禮者理之粉澤莊子曰三王五帝之禮儀法度其猶樝梨橘柚雖其味相反而皆可於口也論語曰不學禮無以立禮記曰簠簋俎豆制度文章禮之器也升降上下周旋裼襲禮之文也又燕居曰禮者何也即事之治也君子有其事必有其治治國而無禮譬猶瞽之無相與倀倀乎其何之譬如終夜有求於幽室之中非燭何見若無禮則手足無所措耳目無所加進退揖讓無所制倀丑良反又曲禮曰君子恭敬樽節退讓以明禮鸚鵡能言不離飛鳥猩猩能言不離禽獸今人而無禮雖能言不亦禽獸之心乎又禮運曰禮之於人也猶酒之有糵也君子以厚小人以薄又樂記曰樂者非謂黄鍾大吕弦歌干揚也樂之末節也故童者舞之鋪筵席陳樽俎列籩豆以升降為禮者禮之末節也故有司掌之又禮器曰君子之行禮也不可不慎也衆之紀也紀散而衆亂又曰先王之立禮也有本有文忠信禮之本也義理禮之文也無本不立無文不行又經解曰夫禮禁亂之所由生猶坊止水之自來也故以舊坊為無所用而去之者必有水敗以舊禮為無所用而去之者必有亂患又禮運曰夫禮先王以承天之道以治人之情故失之者死得之者生詩曰相䑕有體人而無禮人而無禮胡不遄死是故夫禮必本於天殽於地列於鬼神逹於喪祭射御冠昏朝聘故聖人以禮示之故天下國家可得而正也春秋説題辭曰禮者體也人情有哀樂五行有興滅故立鄉飲之禮終始之哀婚姻之宜朝聘之表尊卑有序上下有體王者行禮得天中和斗居天中而有威儀王者法而備之是亦得天之中和也禮得則天下咸得厥宜隂陽滋液萬物調四時和動靜常用不可須臾惰也三禮正義曰周禮儀禮並周公所作記所謂經禮三百威儀三千經禮則周禮也威儀則儀禮也周禮遭秦滅學藏於山巖屋壁以故不亡漢武帝時有季氏獲之以上河間獻王獨闕冬官一篇購之千金不得乃以考工記補之遂奏入於秘府時儒以為非是不行至劉歆獨識其書知周公致太平之跡始奏立學官後鄭𤣥為之注儀禮周衰當戰國之世其書並亡至漢高堂生所傳十七篇惟士禮存焉後世推士禮以致天子之禮而行之至馬融鄭𤣥王肅並為之注解禮記正義曰禮記者本孔子門徒共撰所聞也後通儒各有損益子思伋作中庸公孫尼子作緇衣鄭康成云月令吕不韋所修盧植云王制為漢文時博士所録其餘衆篇皆如此例但未能盡知所記之人也唐書曰開元十四年上令太子賓客元行沖撰類禮義疏將立學官疏成左相張説駁奏曰今之禮記是前漢戴徳戴聖所編録厯代傳習已向千年著為經教不可刋削至魏孫炎始改舊本以類相比有同抄書先儒所非竟不行用貞觀中魏徵因炎所修更加整比兼為之注先朝雖厚加賞錫其書亦不行今行沖等奉詔修撰勒成一家然與先儒義乖章句隔絶若欲行用竊恐未可上然其奏遂不得立學行沖意諸儒排己退著論以自釋春秋杜預序云春秋者魯史記之名也楚謂之檮杌晉謂之乗魯謂之春秋其實一也釋名曰言春秋冬夏終以成嵗舉春秋則冬夏可知也春秋正義曰孔子授春秋於卜商卜商又授之弟子公羊髙榖梁赤又各為之傳則今公羊榖梁二傳是也左氏傳有賈逵訓詁服䖍杜預注公羊傳有何休解詁榖梁傳有范甯集解春秋孔演圖曰作法五經運之天地稽之圖像質於三王施之四海史記太史公曰先人有言自周公卒五百嵗而有孔子孔子卒後至於今五百歳有能紹明世正易傳繼春秋本詩書禮樂之際意在斯乎意在斯乎小子何敢讓焉上大夫壺遂曰昔孔子何為而作春秋哉太史公曰余聞董生曰周道衰廢孔子為魯司冦諸侯害之大夫壅之孔子知言之不用道之不行也是非二百四十二年之中以為天下儀表貶天子退諸侯討大夫以達王事而已矣子曰我欲載之空言不如見之於行事之深切著明也夫春秋上明三王之道下辨人事之紀别嫌疑明是非定猶豫善善惡惡賢賢賤不肖存亡國繼絶世補敝起廢王道之大者也撥亂世反之正莫近于春秋春秋文成數萬其指數千萬物之散聚皆在春秋春秋之中弑君三十六亡國五十二諸侯奔走不得保其社稷者不可勝數察其所以皆失其本已故易曰失之毫釐差以千里故曰臣弑君子弑父非一朝一夕之故也其漸久矣故有國者不可以不知春秋前有讒而不見後有賊而不知為人臣者不可以不知春秋守經事而不知其宜遭變事而不知其權為人君父而不通於春秋之義者必蒙首惡之名為人臣子而不通於春秋之義者必陷簒弑之誅死罪之名其實皆以為善為之不知其義被之空言而不敢辭夫不通禮義之㫖至於君不君臣不臣父不父子不子君不君則犯臣不臣則誅父不父則無道子不子則不孝此四行者天下之大過也以天下之大過予之則受而不敢辭故春秋者禮義之大宗也漢書藝文志曰古之王者世有史官君舉必書所以慎言行昭法式也左史記言右史記事其事為春秋言為尚書帝王靡不同之周室既微載籍殘闕仲尼思存前聖之業以魯周公之國禮文備物史官有法故與左丘明觀其史記據行事仍人道因興以立功就敗以成罰假日月以定厯數藉朝聘以正禮樂有所褒諱貶損不可書見口授弟子退而異言丘明恐失其真故論本意而作傳明夫子不以空言説經也晉書曰杜預大觀羣典謂公羊榖梁詭辯之言又非先儒説左氏未究丘明意而横以二傳亂之乃錯綜微言著春秋長厯備成一家之學至老乃成秘書監摰虞賞之曰左丘明本為春秋作傳而傳遂自孤行釋例本為傳設而所發明何但左傳故亦孤行也三國典畧曰張曜好讀春秋每月一遍時人比之賈梁道趙隱嘗謂曜曰君研尋左氏豈求服䖍杜預之紕繆耶曜曰何為其然乎左氏之書備序言事惡者可以自戒善者可以庶幾故厲己温習非欲詆訶古人之得失也梁書曰崔靈恩清河東武城人也少篤學遍習五經尤精三禮三傳仕魏為太常博士天監十三年歸梁累遷歩兵校尉兼國子博士靈恩聚徒講授聽者常數百人性拙朴無風采及解經析理甚有精致都下舊儒咸稱重之助教孔僉尤好其學靈恩先習左傳服解不為江東所行乃解説杜義每文句常申服以難杜遂著左氏條義以明之時助教虞僧誕又精杜學因作申杜難服以荅靈恩世並傳之顔延之庭誥曰褒貶之書取其正言晦義輔制衰王春秋為上三輔决録曰賈逵建初元年受詔列春秋公羊榖梁不如左氏四十事春秋傳左氏為長帝大善賜布五百疋又魏畧曰逵好學左傳及為牧守常課之月一遍桓譚新論曰左氏傳世後百餘年魯榖梁赤為春秋殘畧多所遺失又有齊公羊髙縁經文作傳彌離其本事矣左氏經之與傳猶衣之表裏相持而成經而無傳使聖人閉門思之十年不能知也又曰劉子政子駿伯王三人尤珍重左氏下至婦女無不讀誦者江表傳曰闗公好左氏畧諷皆上口孝經孝經序曰吾志在春秋行在孝經是知孝者徳之本歟春秋説題辭曰孝經者所以明君父之尊人道之素天地開闢皆在孝人非父不生非母不長天地開闢而生人承天地是故親生膝下以養父母孝經鈎命决曰孝經者篇題就號也所以表指括意序中書名出義見道曰著就成也孝為一篇之目十八章也成號序忠之事使孝義見於外一字苞十八章為天地喉襟道要徳本故挺以題符篇冠就又曰曾子撰斯問曰孝文乎駮不同何撰撰經異同也子曰吾作孝經以素王無爵之賞斧鉞之誅故稱辟席復坐吾語汝順孫以避禍災與先王以託權託先王以為己權勢力首至徳要道以題行題行題天子徳行致羣瑞己行所及也首仲尼以立情性情性猶天地己不正為天地子故行冠子以立之也首子曰以開號若夫子所以自開於受命也列魯子示撰輔使若得録圖之故行冠子以立之也佐與共治天下也矣詩書以合謀二人同心其利斷金同心之言其臭如蘭也孝經中契曰孔著孝經文成道立齊以白天則𤣥靈踊北紫宫開北門角元星北落司命天使書題號孝經篇云神星裳孔子知元命使陽衢乗紫麟下告地主要道之君後年麟至口吐圖文北落郎服書魯端門隱形不見子夏往觀寫得十七餘字滅消文其餘飛為赤烏翔摩青雲漢書藝文志曰孝經者孔子為曾子陳孝道也夫孝天之經地之義也民之行也舉大者言故曰孝經後漢書曰向栩字甫興張角之亂栩上便宜頗譏刺左右不欲國家興兵但遣人於河上北向讀孝經賊自當消滅中常侍張讀奏栩不欲命將出師疑與角圖欲為内應收送黄門北寺獄殺之謝承後漢書曰仇覽字季智一名香陳留考城人也為縣陽遂亭長有陳元者凶惡不孝其母詣覽告之覽呼元誚責元以子道與孝經一卷使誦讀之元深改悔至母前謝罪曰少孤為母所驕諺曰孤犢觸乳驕子詈母乞今自改卒成佳士王隱晉書曰皇甫謐篤終論曰氣絶之後以蘧蒢裹屍擇不毛之地葬焉無以物自隨唯齎孝經一卷示不忘孝道也吳均齊春秋曰沈麟士字雲禎臨終遺命曰棺中依皇甫謐用孝經既殯不須立靈座士安亦然也南史曰顧歡字景怡有病邪者問歡歡曰家有何書答曰唯有孝經歡曰可取仲尼居置病人枕邊恭敬之自瘥也病者果愈後人問其故歡曰善禳惡正勝邪此病者所以瘥也蕭方等三十六國春秋曰漢大將軍東平王約漢王聰戲之曰汝誦何書味何句也約曰臣誦孝經每詠身體髮膚受之父母不敢毁傷至於在上不驕髙而不危未嘗不反覆誦之聰大悦後周書曰宇文貴字乾福少聰敏渉獵經史尤便騎射始讀孝經便謂人曰讀此一經足為身之本三國典畧曰徐陵子份陵嘗遇疾甚篤份燒香泣涕跪誦孝經晝夜不息如此者三陵疾忽然而愈隋書曰鄭譯性輕險髙祖以其定䇿功不忍廢而隂疎之乃隂呼道士章醮以祈福助其婢奏譯猒蠱左道上謂譯曰我不負公此何意也譯無以對後憲司劾以不孝由是除名下詔曰譯嘉謀良䇿寂爾無聞鬻獄賣官沸騰盈耳若留之於世在人為不道之臣戮之於朝入地為不孝之鬼有累幽顯無以置之宜賜以孝經令其熟讀後復其爵位又曰韋師字公頴京兆杜陵人也少沉謹有至性初就學始讀孝經捨書而嘆曰名教之極其在兹乎又曰蘇威嘗謂煬帝曰先人誡臣唯讀孝經一卷可以立身何用多為帝亦然之何妥曰蘇威所學非止孝經厥父若信有斯言威不從命是其不孝若無斯言而面欺陛下是其不誠不誠不孝何以事君且夫子曰不學詩無以言不學禮無以立豈容蘇綽教子獨反聖人之㫖乎唐書曰永徽中上命陳王師趙𢎞智於百福殿講孝經召中書門下三品及𢎞文館學士國子監學官並令與坐𢎞智演暢微言備陳五孝之義學士等難問連環𢎞智酬應如響上謂𢎞智曰宜畧陳此經要道以輔不逮對曰昔者天子爰及諸侯卿大夫皆有諍臣願以此言奉獻上甚悦𢎞智及學士儒官並賚以繒帛漢實録曰田敏使於湖南途出江陵以五經遺髙從誨謝曰祭酒惠及經書從誨所識不過孝經十八章爾敏曰讀書不在多至徳要道十八章足矣敏記諸侯章云在上不驕髙而不危制節謹度滿而不溢此一章皆經要言也時從誨兵敗於郢謂敏見諷罰以巨巵太平御覽卷六百十
