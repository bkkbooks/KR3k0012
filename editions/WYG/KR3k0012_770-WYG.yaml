  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_770-1a, image: WYG0899/WYG0899-0726a.png}
body:
  text: 太平御覽卷七百七十宋李昉等撰舟部三舟下艦艨衝䑦􅑳音句鹿艑航舫舟下周處風土記曰小曰舟大曰船温庥五㑹者永寧縣出豫林合五板以為大船因以五㑹為名也晨鳬即青桐大船名諸葛恪所造鴨頭船也魏樟􅀈㭠音先􅀥木諸木皆以多曲理盤節為堅勁也浩漂者言船之在水如蓮花散落浮於川也武昌記曰樊口北有敗舶灣孫權甞裝一船名大船容敵士三千人與羣臣泛舶中流值風起至樊口十里餘便敗故因名其處為敗舶灣也戴延之西征記曰檀山凡去洛城水道五百三十里由親安澠池冝陽三樂三樂男女老㓜未甞見船既聞晉使溯流皆相引蟻聚川側俯仰傾笑越絶書曰闔閭見子胥敢問船運之備何如對曰船名大翼小翼突冒樓船橋船以船軍之教比陸軍之法乃可用之大翼者當陸軍之車小翼者當陸軍之輕車突胃者當陸軍之衝車樓船者當陸軍之行樓車也橋船者當陸軍之輕足驃騎也瑞應圖曰王者徳盛則金人下乗船遊王後池郡國誌曰越州白塗山有石船大禹所來乗者宋元嘉中有人於船側得鐡履一量一云有聖姑從海中乗舟張石帆至此二物廟中有周時樂器名淳于銅作似鐘而有頸映水用芒刜音弗則鳴又曰硤州逺安縣江有狼尾灘有陸抗故城南有孤山袁山松為郡甞登以四望大江如索帶舟船如鳬雁焉又曰相州魏縣景穆寺西有遭官有石竇橋鳴鶴飛隼赤馬飛龍等舟西京雜記曰昆明池中有戈船樓船各數百艘樓船建樓櫓戈船建戈矛四角悉垂幡旄旌葆麾盖照灼涯涘又曰太液池中有鳴鶴舟容與舟清曠舟采菱舟說苑曰吳赤市使於知氏假道於衛寗文子具紵絺三百製將以送之大夫豹曰吳雖大國也不壤交假之道則亦敬矣又何禮焉甯文子不聴遂致之吳赤市至於知氏既得事將歸吳智伯命造舟為梁吳赤市曰吾聞天子濟於水造舟為梁諸侯維舟為梁大夫方舟方舟臣之職也且敬太甚必有故使人視之則兵在後矣將以襲衛矣赤市曰衛假吾道而厚贈我我見難而不吿是與為謀也稱疾而留使人告衛衛人警戒智伯聞之乃止也列女傳曰趙簡子至河津津吏醉吏女乃持檝而前為王棹舟餘具下檝門中江表傳曰孫權於昌新裝大船名為長安又曰孫權乗飛雲大船與張昭魯肅等共追送叙别又曰周瑜破魏軍曹公復書與權曰赤壁之役值有疾疫孤燒船自退横使周瑜虛獲此名又劉備進駐鄂縣之樊口諸葛居吳未還聞曹公軍下恐懼曰逭邏吏於水次候權軍吏望見周瑜船馳還白備備曰何以知非青徐軍耶吏對曰以船知之備遣人慰勞瑜瑜曰有軍任不得委署倘能屈威過其所望備謂張飛關羽曰彼欲致我今自託於東而不徃非同盟之意也乃乗單舸徃見瑜問曰今距曹氏深為得計戰交有機瑜曰此自足用豫州但觀瑜破之吳厯曰曹公出濡湏作油船夜渡洲上權乃自乗從濡須口入公軍行五六里廻環作鼔吹公見舟船器仗軍伍整肅喟然嘆曰生子當如孫仲謀劉景升子若豚犬耳又曰孫綝上疏景帝曰少帝於宫内作小船三百餘艘飾以金銀師工晝夜不息王粲海賦曰乗菌桂之舟晨鳬之舸庾闡楊都賦曰龍坻筆屋晨鳬之舸鷁首鋪於芙蓉盤蛟纒於赤馬晉令曰水戰有飛雲蒼隼船說苑楚鄂君乗青輪之舟張翠羽之鷁楚辭曰船容與而不進奄回水以凝滯又曰羙要妙兮宜修沛吾乗兮桂舟桂櫂兮蘭枻増氷兮積雪魏文帝沂淮賦曰建安十四年王師東征泛舟萬艘楊修出征賦曰汎順風而廻艫徐日轉而月移斾已入乎河口殿都練切尚集於園池張衡西京賦曰命舟牧為水嬉浮鷁首翳雲芝班固西都賦曰東郊則有通溝大漕潰渭洞河泛舟山東控引淮湖與海通波漕水運也蒼頡篇曰潰傍決也漢書武帝紀穿漕渠通渭史記曰滎陽下引河東南為鴻溝以與淮泗㑹也袁宏東征賦曰驚瀾嶾音隠嶙力軫切而嶽轉頽波嵔音猥􅐑力猥切以嶺沒咨余舟之小狹衝奔湍以杌擢弱檝之弗施授洪流以藏骨夏侯弼吳都賦曰嚴嚴船艫汎汎楊舟權河髙跱風駭雲浮堅壁金扶有若髙樓劉謐之與公牋曰昔申之際遭湯旱流烟今子亥之嵗值堯水滔天火延燒其廬水突壊其園何小人兮頓偷雙船由是行無擔石室如磬懸魏文與孫權書曰知巳選擇見船最大樟林者六艘受五百里石從沔水送付樊口王粲詩曰方舟浮大江日暮愁我心曹植詩曰何以汎舟媿無榜人嵇康詩曰淵淵緑水淪滑而逝汎汎虛舟載停載滯鼔枻投竿優遊卒嵗梁王筠詠輕利船應臨汝侯教詩曰君侯飾輕利揺蕩送飛雲淩漾浮鷁采映水煥蛟文雷流已冠絶鳥遊復超羣倐忽方千里戀兹岐路分陳張正見後湖泛舟詩曰上苑奢行樂滄池聊薄遊泛荇移蘭櫂汳槎觸桂舟殘收度雨缺岸上水新流欲知有髙趣長楊送凌秋又别韋諒賦得江潮泛别舟詩曰千里尋楊岸三翼木蘭船鷁泛青鳬後雞鳴白鷺前涵花沒淺纜帶葉動深船不言朝夕水獨自限神仙又與錢元智泛舟詩曰髙門事休沐朝野念逢迎還乗金谷水俱望洛陽城舟移洛女度檝動渭橋横風高鴈已落雨霽水還清葉盡桐門浄花秋菊岸明欲奏江南曲聊習棹歌行晉棗據船賦曰嘉聖王之神化理通㣲而達幽悼民生之隔塞愍王教之不周立成器以備用因垂象以造舟濟迅波之絶軌越巨川之互流運重固之滯質雖載沒而必浮且論器而比象似君子之淑清外質朴而無飾内空虛以受盈不辭勞而惡動不偷安以自寧且其行無轍跡止無所根不疾而速忽若馳奔晉王叔之舟賛曰塗則騁車水惟用舟弱檝輕棹利渉濟求緬彼漁人鼓枻清謳後漢李尤舟檝銘曰舟檝之利譬猶輿馬載重歴逺以濟天下相風視波窮䆒川野安審懼慎終無不可艦釋名曰上下重牀曰艦四方施板以禦矢如牢檻也洞冥記曰昆靈池中有凌波艦掖電艦吳志曰周瑜逆曹公部將黄盖取艨衝鬭艦數十艘實以薪草膏灌其中裹以幃幙上建牙旗同時發火時風猛甚悉延燒岸上營曹公軍敗退晉中興書曰建興九年冬左將軍王敦遣振威將軍周訪廣武將軍趙誘授陶侃節度征蜀賊杜􅌢音韜大戰蜀賊以桔槹打没侃船二十餘艘人皆投水義熈起居注曰盧循新作八槽檻九枚起四層高十餘丈營繕令曰諸私家不得有戰艦等船艨衝釋名曰外狹而長曰艨衝吳志曰董襲討黄祖祖横兩艨衝夾守沔口栟音并櫚音閭大紲繫石為矴軍不得前襲與凌統俱為前部各將敢死百人人被兩鎧乗大船突入艨衝裏身以刀斷兩紲艨衝方横大兵遂進又曰周瑜逆曹公部將黄盖取艨衝鬭艦數十艘餘見上艦門又曰將軍賀齊性奢綺好軍事所乗船雕刻丹縷青盖絳襜艨衝鬭艦之屬望之若山營繕令曰諸私家不得有艨衝等船餘具叙舟門中䑦􅑳雜字解詁曰䑦􅑳雜船也吳志曰呂蒙襲關羽至尋陽盡伏精兵於􅖻􅑳中使白衣揺櫓作啇賈服晝夜兼行故羽不聞知遂到南郡物理論曰夫工匠徑渉河海為䑦􅑳以浮大淵皆成於巧手出乎聖意艑廣雅曰艑舟也荆州記曰湘州七郡大艑之所出皆受萬斛吳志曰呂蒙襲關羽至尋陽盡伏精兵於艑􅑳中餘具上䑦􅑳門温嶠教曰稟者無米受得艑下濕米豈是吾遇兵衆無異之懐乎雖是數合米欲令齊均若有不如教鞭五十也荆州土地記曰桓宣穆遣人尋廬山下有一湖中有敗艑航說文曰航方舟也詩曰誰謂河廣一葦杭之異苑曰晉時錢塘浙江有大樟林桁毎有乗者軌漂盪揺揚不可禁嘗鳴鼓錢塘江頭淩浪如故惟船吏章粤能相制伏及粤死遂長廢淮南子曰公孫龍在趙之時謂弟子曰人而無能者龍與遊有客衣褐帶索而見曰臣能呼航來公孫龍顧謂弟子曰門下故有能呼者乎對曰無有公孫龍曰與之弟子之籍后數日徃說燕王至於河上而航在北使客呼之一呼而航來揚子法言曰舎舟航而濟乎瀆者末矣舎五經而濟乎道者末矣注曰末無之也乗國者如乗航乎航安則民斯安矣孫綽子曰仲尼見滄海横流故務為舟航左思吳都賦曰長鯨吞航脩鯢吐浪也舫說文曰舫併船吳書陸遜破曹休當還西陵公卿並為祖道上賜御船一舫繒綵舟也晉書曰王廙性雋率甞從南下旦自尋陽迅風飛帆暮至都倚舫樓長嘯神氣自逸梁書曰安成康王秀為江州刺史將發主者求堅船以為齋舫秀曰吾豈愛財而不愛士乃教以牢者給參佐下者載齋物既而遭風齋舫遂破舠釋名曰船三百斛曰舠舠貂也短也江南所名短而廣安不傾危也詩曰誰謂河廣曾不容舠舸王隠晉書曰顧榮徴侍中見王路塞絶便乗船而還過下邳遂解舫為單舸一日一夜行五六百里遂得免沈約宋書曰垣䕶之隨王𤣥謨入河𤣥謨攻滑臺䕶之以三百舸為前鋒進據石濟石濟在滑臺西南百二十里𤣥謨敗退不暇報䕶之及䕶之聞知而虜悉已牽𤣥謨水軍大艚連以鐡鎻三重欲以絶䕶之還路䕶之中流而下毎至鐡鎻輒以長柯斧斷之虜不能禁唯失一舸吳志曰甘寧厨下児有過走投呂蒙蒙恐寧殺之故不即還後寧齎禮禮蒙母蒙臨當與升堂乃出厨下児出還寧寧許不殺斯湏還船縳置桑樹自挽弓射殺之勅船人更增舸纜解衣而卧船中蒙大怒擊鼓㑹兵欲攻寧蒙母諫乃止江表傳曰劉備進住鄂縣之樊口聞曹公軍下恐懼俄周瑜船軍至備乃乗單舸徃見瑜已具船門又曰孫權名舸為馬言飛馳如馬之走陸地也洞㝠記曰昆靈池中有橦雷舸太平御覽卷七百七十
