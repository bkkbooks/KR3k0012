  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_755-1a, image: WYG0899/WYG0899-0621a.png}
body:
  text: 太平御覽卷七百五十五宋李昉等撰工藝部十二彈棊儒碁擊壤角抵彈四維象戲夾食悁悶射數􅉫子抃擲磚彈棊東觀漢記曰安語曰樂成王居諒闇衰服在身彈棊為戲不肯謁陵沈約宋書曰晉平刺王休祐文帝第十三子也在荆州時左右范景達善彈碁上召之休祐留不遣上怒詰責之後趙録曰石閔使將軍蘇彦周成執石遵於南臺如意觀遵時方與婦人彈棊梁冀别傳曰冀好彈棊暑夏之月露首袒體惟在摴蒱彈棊不離綺襦紈袴之側世說曰劉真長始見王丞相時盛暑丞相以腹熨彈棋局曰何乃渹劉既出人問見王何如劉曰未見他異唯作吴語耳又曰彈棊始自魏文帝宫内裝器戲也文帝於此技特妙用手巾拂之無不中者有客自云能乃使為客著葛巾拂棊妙逾於帝魏文帝典論曰余於他戲弄之事少所喜唯彈棊略盡其妙乃為之賦昔京師先工有馬合鄉侯東方安世張公子常恨不得與彼數子者對藝經曰彈棊二人對局黒白棊各六枚先列棊相當下呼上擊之彈棊經序曰彈棊者仙家之戲也昔漢武帝平西域得胡人善蹴鞠者盡􅃷其便捷跳躍帝好而為之羣臣不能諌侍臣東方朔因以此藝進之帝乃捨蹴鞠而就彈棊焉習之者多在宫禁中故時人莫得而𫝊至王莽末赤眉凌亂西京傾覆此藝為宫人所𫝊故散落人間及章帝御宇好諸伎藝此戲乃盛於當時彈棊經後序曰自後漢沖質以後此藝中絶至獻帝建安中曹公執政愽奕之具皆得寘之宫中宫人因以金釵玉梳戲於粧奩之上即取類於彈碁也及魏文帝受禪宫人因更習彈棊焉當時朝臣名士無不争能故帝與吴季重書曰彈棊間設者也又曰彈棊者雅戲也非事乎千百梟橛之數不㳺乎紛競詆欺之間淡薄自如故趨名近利之人多不尚焉盖道家所為欲習其偃亞導引之法撃摶騰擲之妙以自暢耳又曰唐順宗在春宫日甚好之時有吉達髙釴崔同楊愿之徒委為名手後有竇深崔長孺甄顒孤獨遼亦為亞焉至於長慶之末好事之家猶見有局尚多解者後漢蔡邕彈碁賦曰夫張局陳棊取法武備因嬉戲以肄業託懽冥以講事設兹矢石其夷如砥采若錦繢平若停水肌理光澤滑不可履乗色行巧據險用智魏文帝彈棊賦曰文石為局金碧齊精隆中夷外理緻肌平晉傅𤣥彈棊賦序曰漢成帝好蹴鞠劉向以為蹴鞠勞人體竭人力非至尊所宜乃因其體而作彈碁以代之儒碁後魏書曰侍中游肇謙廉不競曽撰儒棋者盖􅀶奕之流所以逰思於文亦猶投壺之習武也故聖人因物設教有實有權情禮稱宜有張有弛孔子云不有􅀶奕者乎為之猶賢乎已者若夫井公之對支同穆叔卿之接許由此或示存恐非有待然則君子之處世也豈遂耽於所適徒費時日者哉至於几杖盤檻猶載銘戒矧乃諧神之品而不加勸也但古之為玩者莫不競進其功塞殺與樂殊途異勢並𫝊於時未有以謙退為勝通生為悅者故因閒暇聊復措意此即儒碁之一名盖遊藝之所統本諸謙浄詮名撰得畧依儒行起捨遵道執法中庸時然後玩人不厭其遊讓而後勝人逾惬其負私忿以之悉化沖遜以之彌隆豈唯崇謙止敬而已諒亦諧善全徳之所因夫稽名㑹理其殆庶幾致泥之戒寜不愧乎儒碁曰投二智一禮二仁三義四信五棋下白黒半方五分長寸方寸所以記法善六敬七徳八忠九順十方局尺五周道四十其用三十六取捨途異四維之道通數而棊謙退為尚故髙彩者先投恥為道也彼此二位謂之浄浄者行義也左右二道謂之中其浄中四道彼此左右牙有二不得相干干則鬭也行碁之法始附浄起轉牙相順經因浄中出初不浄出必曲之進避相渉也通生為務不存塞殺志仁恕也彩越浄中者休則立梟梟者不伏彩不念也㑹浄者梟折為伏伏者不梟行不越也若彩雖㑹而干彼擬過之非干彼者則自居矣居擬不同以干彼也行伏棋者得以彩依數而行兩彩同者唯行一一謙者停兩謙退一等行梟碁者得異彩亦候數而行兩彩同者盡行其數一謙一行道兩謙者停行伏不得行梟不得行伏折梟伏者皆從后定因彩而閟者屋而申之不初得謙信也縁行致累者閱而通足皆不限道數進退皆爾梟伏而閱者但行于梟先梟者廷之又道尤恥多過也行碁之體不相凌觸所蹈皆靈孤明自在不强弱生以忻懼也絶於詭巧而順消息悉遇中道勝負乃分先梟後伏驗之於浄謙勇之辨實標先后竟處净不安方顯其道梟若從不盡二彩者則全行伏先后用伏防歸也自貽全進退之義成也梟伏兩少者行於梟雖不盡彩理元兼也彼既出盡此有不出者即許以為勝者之筭若全未出則為之露投損己益人謙者所崇次局負仍先得十算立一爵三爵立則成勝矣擊壤釋名曰擊壤野老之戲也𤣥晏曰十七年與從姑子果栁等擊壤於路逸士𫝊曰堯時有壤父五十人擊壤於康衢或有觀者曰大哉堯之為君也壤父作色曰吾日出而作日入而息鑿井而飲耕田而食帝何力於我哉風土記曰擊壤者以木作之前廣後銳長可尺三四寸其形如履臘節僮少以為戲分部如撾􅀶也藝經曰擊壤古戲也又曰壤以木為之前廣後銳長尺四濶三寸其形如履將戲先側一壤於地遥於四十三步以手中壤搞之中者為上吴盛彦翁子擊壤賦曰論衆戲之為樂獨擊壤之可娱角抵左𫝊曰晉侯夢與楚子搏手相摶楚子伏已而盬其腦是以懼漢書曰武帝元封三年春作角觝戲三百里内皆来觀王隠晉書曰潁川襄城二郡班宣相㑹累欲作樂襄城人首責功曹劉子篤曰卿郡人不如潁川人相撲篤曰相撲下技不足以别兩國下劣請使二郡更論經國大理人物得失唐書曰隋煬帝幸東都裴矩以蠻夷朝貢者多諷帝大徴四方竒技作魚龍曼延角抵於洛邑以誇諸戎終月而罷西京雜記曰三輔人俗每以持刀為戲漢朝亦取以為抵角之戲焉漢武故事曰未央庭中設角抵戲者六國所造也秦并天下兼而増廣之漢興雖罷猶不都絶至上復採用之并四夷之樂雜以竒幻有若鬼神角抵者使角力相抵觸者也彈廣雅曰彈行丸也左𫝊曰晉靈公臺上彈人觀其避丸者魏書曰齊王芳為帝常喜以彈彈人齊書曰桓榮祖善彈登西樓見翔鵠謂左右曰當生取之乃彈其兩翅毛脫盡墮地無傷養之毛生復飛出其妙如此隋書曰長孫晟洛陽人也有鳶羣飛上謂晟曰公善彈為我取之十發俱中並應丸而落吴越春秋曰陳音對越王曰弩生於弓弓生於彈彈生於古之孝子古者人死投之中野孝子不忍父母為禽獸所食則作彈以守之故古之歌曰斷竹續竹飛土逐肉西京雜記曰韓嫣好彈常以金為丸一日所失者十餘長安為之語曰苦飢寒逐金丸京師兒童每聞嫣出彈輒隨之望丸之所落而輒拾取莊子曰以隋侯之珠彈千仭之雀必笑所用至重所取至輕又曰見卵而求時夜見彈而求鴞炙世說曰潘岳少時挟彈洛陽道婦人見之無不連手縈之談藪曰齊蕭遥欣為童子時見一小兒左右彈飛鳥未有不應弦而落者遥欣謂之曰凡戲多端何急彈此鳥自雲中髙翔何闗人事小兒感之終身不為時少年士庶競為此戲聞欣說此戲遂廢之又曰梁王謂恵子曰先生直言無得引喻恵子曰今有人不識彈問彈狀如何荅曰彈狀如彈則能了否王曰不了又曰彈狀為弓以竹為繳可知之乎王曰知矣恵子曰夫說者欲人知之無喻則不知也王曰善顧子羲訓曰人有善於射而髙於顧子顧子曰子之射雖百中猶不若我之以彈或曰何以為然顧子曰子之所射射貍之皮耳我之所彈彈狐之心潛夫論曰懐丸挾彈携手以遊外不足防冦盗内不足禁鼷䑕四維東晉李秀四維賦序曰四維戲者衛尉摯侯所造也畫紙為局截木為棊取象一原分而為二准隂陽之位擬剛柔之策而變動云為成乎其中象戲周武帝造象戲王褒為象經序曰一曰天文以觀其象天日月星是也二曰地理以法其行地水火金木土是也三曰隂陽以順其本陽數為先本於天隂數為後本於地是也四曰時令以正其序東方之色青餘三色例亦如之是也五曰筭數以通其變俯仰則為天地日月星變通則為水火金木土是也六曰律吕以宣其氣在子取未在午取丑是也七曰八卦以定其位至震取兌至離取坎是也八曰忠孝以惇其教出則盡忠入則盡孝是也九曰君臣以定其禮不可以貴凌賤直而為曲不可以卑䙝尊隠而無犯是也十曰文武以成其務武論七徳文表四教是也十一曰禮儀以制其則居上不驕為下盡敬進退有度可法是也十二曰觀徳以考其行定而後求義而後取時然後言樂然後笑是也或升進以報徳義取遷善或黜退以貶過事在懲惡或以沈審為貴正其瞻視或以狥齊為功明其糾察得失表於隆替在賤必申怠敬彰於勸沮處尊思屈片善崇於拱璧一徳踰於華袞夾食藝經曰夾食者二人黄黒各七十棋横列於前第四道上甲乙迭推二棋夾一為食棋不得食十兩不得過食不由道則不行棋如挟不取食一棋為籌賭多少隨人所為悁悶藝經曰悁悶先悶其位以十二時相從文曰同有文章虎不如龍豕者何為来如兔宫王孫盡卜乃造黄鍾大往兢馬非類相從羊奔蛇宂牛入雞籠射數纂文曰詭億一曰射意一曰射數即擲錢也梁冀别𫝊曰冀好意錢􅉫子藝經曰子之多少人之朋數隨戲者制如十子争先以落多為不妙抃漢書曰甘延夀字君况以良家子善騎射試抃為期門以材力愛幸又曰哀帝時覽抃射武戲左思吴都賦曰抃壺搏擲磚續捜神記曰夏侯綜為庾安西參軍說常見鬼騎馬滿道與人無異常與人載行忽牽人語指道上一小兒云此兒正湏大病須臾此兒果病殆死其母聞之語綜綜云無他此兒向於道中擲塗誤中一鬼脚鬼怒故病汝兒耳得以酒飯貽鬼即差母如言即愈藝經曰以磚二枚長七寸相去三十步立為標各以磚一技方圓一尺擲之主人持籌隨多少甲先擲破則得籌乙後破則奪先破者太平御覽卷七百五十五
