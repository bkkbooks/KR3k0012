  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_961-1a, image: WYG0901/WYG0901-0475c.png}
body:
  text: 太平御覽巻九百六十一宋李昉等撰木部十交讓建木若木姑繇丹木蓂靈椿迷穀帝休雒常返魂如何仙樹棆机木鹿椵椋橝繫彌杭梁乙木求郍衛男青尋木玉樹疎麻樠榔玕蘆頭櫰桬棠􅀢音諸帝屋六駮漆槲樺柟石南婆郍娑枹牧婆羅青田都念娑羅兒樹酒樹都勾鳥文比閭制木交讓大魏諸州記曰益州汶山郡平康縣界東北接䍧牱有都安縣有交讓樹兩兩相對嵗更半枯半生不俱盛左思蜀都賦曰交讓所植建木山海經曰有木若牛引之有皮若纓黄蛇其實如欒其木若蓲名曰建木在弱水上青葉紫莖𤣥華赤實百仞無枝上有欘下有九枸黄帝所為欘曲也為治護之也淮南子曰建木在廣都若木山海經曰泂野之山有赤樹青葉赤華名曰若木郭璞記曰生崑崙西隅其華光赤照下地也楚辭曰羲和之未陽若華何光又曰折若木以拂日姑繇穆天子傳曰天子釣于河以觀姑繇之木丹木山海經曰崦嵫山有丹木葉如糓其實大如𤓰赤附而黑理食之已癉痺可以禦火又曰宻山上多丹木圓葉而赤莖黄華而赤實味如飴食之人不饑玉膏以灌丹木丹木五嵗五色乃清言光明也五味乃馨蓂靈列子曰荆之南有蓂靈者以五百嵗為春以八千嵗為秋椿左傳曰襄公十八年為諸侯伐齊孟莊子斬雍門之槆為公琴莊子曰上古有大椿以八千嵗為秋曹毘魏都賦曰桱栢振露緑椿停霜迷穀山海經曰招揺之山有木焉其狀如穀而黑理其花四照其名迷穀佩之不迷帝休山海經曰少室之山木名帝休其葉狀如楊其枝五衢黄華黑實服之不怒雒常山海經曰肅慎之國有樹名雒常聖人代立於此取衣其俗無衣聖帝代立則此木皮可衣也返魂十洲記曰聚窟洲在西海中申未地上有大樹與楓木相似而華葉香聞數百里名為返魂樹叩其樹樹亦能自鳴聲如牛吼聞之者皆心振神駭伐其根置於玉釡中煮取汁微火熟煎之合為丸名曰驚精香或曰震靈丸或名反生香或名人鳥精或名却死香斯靈物也香氣聞數百里死屍在地聞氣仍活如何神異經曰南方荒中如何之樹三百嵗開花三百嵗作實有核形如棗子長五尺金刀割之則味飴或辛食之則地仙顧凱之啟䝉記曰如何隨刀而改味仙樹西河舊事曰連山有仙樹人行山中饑渴者輙得之可飽不得持去平居時亦不得見棆爾雅曰棆無疵也楰屬如豫章也机山海經曰單狐之山其木多机木鹿荆州土地記曰武陵城中社中木鹿樹及南岸二木鹿樹光武所種椵説文曰椵木可作杖椋音艮爾雅曰椋郎來椋有隨熊折而乳之又曰今椋材中車橝音單廣志曰橝樹葉似蘇繫彌毛詩疏義曰繫迷一名契似檀廣志曰繫迷樹子赤如糯粟可食杭梁異物志曰有木洪直厥名杭梁乙木徐𠂻南方記曰乙樹葉𢷬之和繻葉汁煮之再沸味辛曝乾可投魚􅅅中求郍衛羅浮山記曰求郍衛外國樹英華粉紅至可愛翫男青羅浮山記曰男青條蘂之属莫不朱色尤易植立折挿土中因便開榮㝷木山海經曰㝷木長十丈生河邉玉樹山海經曰開明北有文樹五彩括地圖曰崑崙墟北有玉樹世説曰謝安嘗謂子姪曰汝等何豫人事諸子莫言𤣥答曰譬如芝蘭玉樹欲生庭堦耳唐書曰雲陽縣界多漢宫故地有似槐而葉細士人謂之玉樹楊子雲甘泉賦云玉樹青葱後左思以雄為假稱珍怪也踈麻南越志曰踈麻大二圍高數丈四時結實落無瓤騷人所謂折踈麻兮瑶華樠山海經曰樠樹生蜀中七八月吐穗成有鹽梅粉可以酢􅅅榔玕山海經曰崑崙山有瑯玕樹蘆頭南越志曰南海江岸間有蘆頭木葉如甘蔗織以為帆以其踈暢懐風吹帆不似布櫰山海經曰中曲山有櫰音環木如棠而圓葉赤實如木𤓰食之多力桬棠山海經曰桬棠木出崑崙山華黄赤實味如李而無核食之使人不溺􅀢山海經曰前山其木多􅀢似柞子可食冬夏恒青作柱難腐帝屋山海經曰講山有木名帝屋葉似椒反傷赤實可以禦㐫反傷刺下勾也六駁陸機毛詩疏義曰六駁馬梓其樹皮青白駁犖遥視似馬故謂之駁馬下章云山有苞棣隰有樹檖皆山隰木相配不宜謂獸崔豹古今注曰六駁山中有木葉似豫章皮多癬駁名六駁木漆淮南子曰茧昔積血斷木愈茧駈主齒切耳此類之推者也推行缺之殺鼈鵲中矢蝟爛灰生蠅爛腐漆見蠏而不乾又曰染者先青而後黑則可先黑而後青則不可工人下漆而上丹則可下丹而上漆則不可萬事由已也所先後上下不可不審也崔豹古今注曰漆樹以剛斧其皮開以竹管承之汁滴則成也槲齊書曰樂預為永世令人懐其徳卒官時有一媪年可六七十擔槲􅈪葉造市貨之聞預卒大泣棄溪中曰失樂令我軰孤獨老姥故應就死爾市人皆泣其惠化如此三國典略曰齊斛律光之入冦也周將韋孝寛忌之孝寛叅軍曲巖頗知卜筮謂孝寛曰來年東朝必大相殺孝寛因令巖作謡言曰百升飛上天明月耀長安又曰高山不推自崩槲樹不扶自竪乃間諜遺其文於鄴中齊人用是而殺斛律光明月光字也隋書曰倭國草木冬青土地膏腴水多鸕鶿以小環挂鸕鶿項令入水捕魚得百餘頭俗無盤爼藉以槲葉食用手餔之性質直有古風唐書曰萬嵗登封元年春封嵩山御朝覲壇受朝賀登封壇南有槲樹大赦日於其杪置金雞改名為金雞樹樺隋書曰鉢室韋衣胡布而山居人衆多北室韋不知為幾部落用樺皮葢屋杜寳大業拾遺録曰二年汾州起汾陽宫宫南外平林率是大樺木高百餘尺從行文武皆剥取皮覆巷舍柟陸機毛詩疏義曰梅柟其樹及葉似豫章葉大如牛耳一頭尖其葉與子不可食柟木理細於豫章而子赤者材堅白者脆荆州人曰梅多江南及魏興新城上庸蜀皆多樟柟三國典略曰初陳文帝以湘州出杉柟使營造大艦金翅等二百許艘并諸水戰之具石南魏王花木志曰南方記石南樹野生二月花仍連着實如燕子八月熟民採之日炙乾取皮作魚􅃵和之尤美出九真任昉述異記曰曲阜古城有顔回墓墓上石南二株可三四十圍土人云顔回手植之木婆郍娑隋書曰真獵國土俗與日南九真相類異者有㜑郍娑樹無花葉似冬𤓰菴羅樹花花似棗實似李毗野樹花似木𤓰葉似杏實似楮婆田羅樹花葉實並似􅀥而小生歌畢他樹花似李葉似榆而厚大實似李其大如外似金多同九真枹嶺表録異曰枹木産江溪中葉細如檜身堅類柏惟根軟不勝刀鋸今潮循多用其根刳而為履當木濕時刻削易如割𤓰木乾之後柔刀不可理也或油􅀞或漆其輕如通草暑月着之隔卑濕地氣如力杉木今廣州賔從諸郡牧守初到任皆有油􅀞枹木履也牧婆羅南夷志曰南詔多牧婆羅樹子破其殻中白如絮紉為絲織為方幅裁之為籠叚男子婦人皆服之縹國彌臣諸夷皆披婆羅籠叚青田崔豹古今注曰烏孫國有青田核莫測其樹之形實中國得其核取漿漬水則成酒其味淳美核大如五六升瓠空之以盛水俄而成酒味劉章時得兩核集賔客設之常供二十八人之飲一核所盛方盡一核所盛已成酒飲盡隨便注水隨成即飲不可久置久置則苦不堪飲名曰青田壺亦曰青田酒都念杜寳大業拾遺録曰十二年四月南海郡送都念子樹一百株敕付西苑十六院内種此樹高一丈許葉如白楊枝柯長細花金色花葉正赤似蜀葵而大其子小於柿子甘酸至美蜜漬為棕益佳嶺表録異曰倒捻子窠叢不大葉如苦李花似蜀葵小而深紫南中婦女得以染色有子如軟柿頭上有四葉如柿蔕食者必捻其蔕故謂之倒捻子或呼謂都捻子益語訛也其子外紫肉赤無核食之甜軟甚暖腹兼益肌肉娑羅魏王花木志曰娑羅樹緗葉子似椒木如羅勒嶺北人呼為大娑羅盛𢎞之荆州記曰巴陵縣僧寺牀下忽生一木不旬日勢凌軒棟道人移居避之木既長旦晚俱極香有西域僧見之曰娑羅樹也彼僧所憇之䕃常着花至元嘉十一年忽生一花狀如芙蓉兒樹唐書曰波斯於西海中見一方石上有樹幹赤葉青樹上忽生小兒長六七寸見人則笑動其手脚頭着樹枝上使摘取一枝小兒便死今在大食王處酒樹梁書曰南方頓遜國有酒樹似安石榴取花汁着盃中數日成酒美而醉人酒出無遜國都勾劉欣期交州記曰都勾樹木中出屑如麵可啖魏王花木志曰交州記都勾似栟櫚木中出屑如麵可取為餌食如桄榔鳥文崔豹古今註曰鳥文木出波斯國每舶上將來就中鳥文爛然中國亦有出温括婺等州比閭汲冡周書王㑹曰白洲比閭者其華若羽伐其木為車終行不敗白州東南蠻與白文接也水中可居白洲洲中出此珍木制木崔豹古今註曰制木潤州最多有子如栗木有白皮波斯國來者皆去其皮人多不别太平御覽巻九百六十一
