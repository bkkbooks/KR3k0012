body:
  text: 太平御覽卷八百七十六宋李昉等撰咎徴部三風暴風黒風赤風雷冬雷霹靂無雲而雷風尚書洪範咎徴曰䝉恒風若禮記月令曰孟春行夏令飄風暴雨總至季秋行春令則煖風來至京房易傳曰后專拜厥風疾而樹不揺不循道厥風不揺草京房别對災異曰廻風起何風者天之號令也當直而正並而不偏佞人衆君迷惑則廻風起不救則至逆風起其救也用公直黜邪枉此災消矣春秋潛潭巴曰疾風㧞木䜛臣恣忠臣辱史記曰殷紂末年大風飄牛馬壊屋㧞樹飛颺數十里周滅之又曰秦始皇二十八年渡淮至衡山浮江至湘遇大風博士云堯女舜妻葬於此始皇怒使刑徒三千人伐湘山樹明年東遊至博浪沙中爲盗所驚乃令天下大索焉又曰項羽背約擊漢軍至彭城圍漢王三匝大風從西北起折木發屋楚軍大亂漢書曰吕后崩後吕産執北軍朱虛侯劉章入宫衛帝見産廷中遂擊産走天大風從官莫敢鬭章逐産殺之又曰昭帝時燕王旦都薊大風㧞宫樹十六吹壊城樓王反伏誅又曰濟北王興居反始舉兵大風從東吹其旌旗飛上墮城井中馬皆悲鳴不進李廓切諫王不聽俄而兵敗自殺又曰平帝元始四年冬大風吹長安城東門屋瓦且盡又曰王莾天鳯中大風㧞樹飛北闕城門屋瓦縁邊大饑人相食又曰地皇四年大風毁王路門其年司徒王尋司空王邑守昆陽光武起兵南陽至昆陽攻之大風雷屋瓦皆飛雨下如注滍川水溢尋邑乗死人而渡王尋見殺軍人皆散走王邑還長安莾敗俱戰死後漢書曰安帝時京師大風㧞南郊梓樹九十六後海賊張伯路畧九郡魏畧曰正始元年商風大起數十日發屋㧞樹動太極殿東閣正㑹又大風雨傾盆按曹爽將誅之徴毌丘儉反景王率衆征之晉書曰吳孫權太元初大風江海湧溢平地水深八尺拔髙陵樹二千株吳城兩門飛落是時賦役繁重明年權死又曰孫休永安元年十二月孫綝出屯武昌衛士施朔告綝欲反聞之大懼是夜大風四轉五復發屋折木揚沙石綝益恐明日臈㑹稱疾休强起之不得已乃至㑹張布丁奉自左右縛之綝叩頭請爲奴不許乃斬之又曰孫皓末年狂暴丞相陸抗與大司馬丁奉謀欲廢皓太史令陳苗奏乆隂不雨風氣廻逆將有隂謀皓深驚懼抗遂寢其事又曰晉武帝咸寧三年八月大風㧞木暴寒且氷其年吳將孫慎入江夏太康末京都風大㧞木又曰惠帝永康中六月飄風吹賈謐朝衣飛數百尺明年謐誅其年十一月京都大風發屋折木十二月愍懐太子幽於金墉又曰永康元年四月張華舎颻風起折木飛甑轉六七枚是月趙王倫矯制廢賈后害張華裴頠等又曰趙王倫簒位改元建始祀太廟風大起黄塵四合其年倫誅又曰元帝永昌中大風㧞木壊屋㧞御道栁百餘株時王敦害尚書刁協僕射周顗等又曰成帝時劉𦙍鎮尋陽有廻風從東來入𦙍船中西出狀如疋練長五六丈術人戴洋曰有刀兵死䘮之亂𦙍頃爲郭黙所害王隠晉書曰王澄在荆州率衆軍次江陵之東射堂北救國難飄風折其節後為王敦所殺晉中興書曰桓𤣥營建康逆風迅激旌旗不立儀飾一皆傾偃是月酷寒此日尤甚急恒寒若之應也出遊門外飄風飛其儀蓋沈約宋書曰孝武帝大明七年風吹初寧陵隧口左標折鍾山通天臺新成飛倒散落山澗又曰徐羨之文帝初作揚州有飄風自西明門須臾合城直至㕔前繞㡌及席遥逺雲際尋羨之爲文帝所誅又曰文帝元嘉九年壽陽驟雨有廻風雲霧廣二三十歩從南來至城西廻散滅當其衝者宫室樹木皆摧倒其年晉寧太寧㸑松子反又曰元嘉三十年正月朔上㑹羣臣於太極殿有大風㧞木雷雹晦冥凍殺牛馬明年太子謀逆又曰孝武帝時柳太尉乘車行還於庭中洗車有大風從南而入直來衝車蓋復向天其年明帝立合門被殺又曰竟陵王誕文帝子孝武時鎮京口夜大風吹落屋瓦城門鹿床倒覆及鎮廣陵將入城衝風暴起俄而反伏誅又曰順帝昇明二年飄風起建康縣吹帛一疋入雲風止下於御道上俄宋授禪其君爲匹夫之象齊書曰明帝建武末大風㧞東宫門外楊樹齊徳行東木位其衰乎至東昏侯立狂亂被害又曰東昏侯寳卷永元元年始安王遥光知政入殿有飄風飄儀繖出城外少日而反被殺又曰崔惠景圍臺城有一五色幡風吹飛翔在雲中半日乃下衆見皆驚恠相謂曰幡者事當翻覆數日惠景敗南史曰梁武帝太清二年九月邵陵王綸軍出頓丘其日天色隂慘風塵蕭瑟咸以出軍不祥十一月綸至江遇風幾溺人馬多損又曰大寳元年邵陵携王綸出鎮南浦僭擬施幄帳無何風起吹投於江後爲侯景將任約所襲綸敗走保汝南爲魏將侯幾通所攻城破被殺又曰元帝承聖三年帝親講武於津陽門風雨總集普天昏暗旗幟飄亂趣駕而返無復次序還宫至城風雨隨息羣臣竊驚俄為魏軍所執送岳陽殺之又曰元帝徐妃初嫁夕車至州西疾風大起發屋折木無何雪霰交下帷簾皆白及還之日又大雷震西州㕔兩柱碎以爲不祥妃竟以淫穢自殺又曰梁岳陽王詧昭明太子之子西魏立爲梁王其年至江陵結營夜疾風甚雨水平地數尺其月詧乃夜遁爲諸蠻斷於山路墜馬僅得脱又曰侯景􅆲梁拜南郊登壇大風㧞木物盡吹散見者莫不驚駭俄而景被殺崔鴻十六國春秋曰北燕馮䟦太平二十一年二月飄風入征南大將軍上黨公姚昭宅至於司徒中山公宅而散上黨公家人問太史闗尚曰風者天之號令所以吹塵去穢除姦慝之禍至二十二年䟦弟𢎞􅆲立以姚昭爲大司馬昭貪暴其子肇諫曰大人不聞飄風之怪乎昭不納明年馮𢎞殺昭并子姪四十餘人又曰前秦苻生壽光元年長安大風發屋㧞樹行人顛頓宫中奔擾或稱賊至門晝閉五日乃止生推告賊者殺之刳出其心左光禄大夫强平諫曰元正盛曉日有蝕之正陽神朔風昏大起願陛下務養元元生大怒鑿其頂而殺之又曰苻堅建元十八年三月大風吹壊長安西門㧞宫中大樹倒根於上至二十二年堅爲姚萇所殺又曰李期玉恒四年三月大風㧞樹發屋四月爲李壽所殺又曰蜀李夀漢興三年二月大風暴雨震端門至六年夀死子勢立三年爲晉將桓温所滅又曰前趙劉曜塟其父母費用億計發掘古冡暴骸原野哭聲盈衢大霖雨震曜父墓門屋大風飄發其父寢堂于外垣五十餘歩松栢衆木植已成林至是悉枯死曜竟爲石勒所擒又曰劉曜末年與石季龍對軍不撫士衆專與嬖臣博飲左右諫之以爲妖言斬之大風㧞木昏霧四塞須臾見擒又曰前凉張𤣥靚四年六月大風震雷晦冥宫中雨水深四尺時宋昆兄弟擅權𤣥靚虛坐而已後魏書曰孝文太和中安定王禎出爲相州刺史至日暴風大雨凍死者數十人是月禎發背死後宣武延昌三年章武王熈除相州刺史七月入治其日大風雨凍死者二十餘人驢馬凍死數十匹熈聞祖父楨前事心惡之俄而舉兵反伏誅北齊書曰後主天統年大風晝晦發屋拔木和士開譖趙郡王叡坐死士開出入宫掖胡太后幸之瑯瑘王儼矯詔殺士開於南臺儼伏誅又曰後主末年安徳王延宗鄴下宅被風吹其㕔棟榱相連置數百步外後主敗王亦被擒入周賜死陳書曰陳文帝天嘉三年梁永嘉王將司空王琳與陳將侯禎對軍其日東北風吹琳舟檻琳軍大敗又曰天嘉六年大風西南吹靈臺後樓倒又曰後主至徳年風吹朱雀門倒又明年大風自西北激濤水入石頭城時後主昏誅諫臣沈客卿明年大雨風又曰隋文帝開皇中東都大風發屋折木時獨孤皇后干預政事後宫多有濫死又楊素邪侫隂氣盛之象也又曰開皇末秦州商胡乘騾遇暴風飄上空數百丈俄而墜下人騾俱碎時晉王廣矯詐取媚謀危太子勇勇竟廢死立廣爲太子淮南子曰人主之精通於天故誅暴則多飄風暴風京房易妖占曰獄吏暴害人臣專政暴風折木又曰暴風折柱大邑憂暴風折木次草上屋且有急令獨禄風入宫人主死飄數相從入殿門有㓙疾憂以此亡飄留君門一日一夜不去亂兵在門獨禄風者回轉風也京房别對災異曰狂風發何人君政教無法爲下所逆則致狂風發泄其救也修政教聘賢士風消矣又曰人君賊罰良善政教無常使命數變則致暴風折木發屋鳴瓦或害殺人其救也修舊典任忠臣思過自改則風災消六韜曰人主好田獵畢弋則嵗多大風飄牛馬發屋㧞木民人飛揚數十里漢書曰文帝時吳暴風雨壊城門吳王濞反卒服誅其年楚王都彭城大風毁市門殺人後王與吳王濞謀反同誅京房曰衆逆同志暴風將起晉書曰孝武太元二年春暴風折木發屋夏又暴風揚沙石三年又暴風折木發屋時苻堅强盛又曰安帝元興初夜大風雨大航門飛落明年桓𤣥􅆲位沈約宋書曰前廢帝義符時正月朔朝暴風發殿前㑹席翻揚數十丈至五月帝廢爲榮陽王梁書曰昭明太子孫棟簡文大寳二年八月爲候景廢棟時與妃張氏鋤菜而法駕至驚懼而泣升輦及即位升武徳殿備陳文物於庭有暴風自東來吹旌旗悉倒又有廻風從地踊起折竿翻飛華蓋經出端門不見陪列者驚駭時人知其不終十一月景廢棟景乃􅆲立崔鴻十六國春秋曰南燕慕容超僭位祀南郊將登壇大風暴起天地晝昏行宫羽儀皆壊裂後超爲晉將劉裕所滅斬於建康市又曰慕容盛建平元年八月暴風㧞闕前大樹七其月歩兵校尉馬勒謀反伏誅至長樂三年盛爲段讚子泰所殺又曰後燕慕容垂遣太子寳伐魏次參合陂忽大風黑氣狀若隄防臨覆軍上沙門支曇猛言於寳曰風氣暴逆魏軍將至宜遣兵禦之寳笑而不納俄黄霧四塞日月晦冥魏師至三軍奔潰其年垂死又曰石季龍死子遵立其月夜暴風㧞木震雷雨雹俄而遵見殺隋書曰太子勇朝髙祖於仁壽宫還至岐山偕元妃止於周太王廟因縱騎獵須臾暴風折樹雨雪深至没膝天晦暝咫尺不相見妃因心痛再宿而死勇後廢爲庶人煬帝殺之又曰太子勇廢立晉王爲皇太子當受册髙祖曰吾以大興公成帝業令出舍大興縣其夜烈風大雪地裂山崩民舎多壊死者百餘又曰煬帝大業十四年三月在江都蜀王秀囚於右驍勇營暴風塵吹晝昏識者皆以爲異秀謂防者曰吾生年以來未見斯變亡國之禍應在旦夕其夜宇文化及司馬徳戡裴䖍通反唐書曰𤣥宗天寳十一年潼闗口女媧墓因風雨失所在後至肅宗乾元二年五月一日其墓復黒風後魏書曰世祖太常元年二月京師有黒風竟天廣五十餘丈其年四月沮渠䝉遜㓂張掖古今五行志曰大業十三年二月李密於鞏縣南設壇刑白馬祭天稱魏公置僚佐改元升壇時有黒風從壇北暴至吹密衣冠及僚屬皆匍匐於壇下沙塵暗天咫尺不相見良乆乃息漢軍伐之而密敗赤風春秋潛潭巴曰天赤有大風發屋折木兵大起行千里漢書曰建元四年夏有風赤如血六月旱崔鴻十六國春秋曰張天錫十二年有赤風昏闇至十三年苻堅滅之雷古今五行記曰夏桀末年雷震殺人其年湯放之左傳曰僖公十五年九月晦震夷伯之廟董仲舒以爲夷伯季氏之陪臣不當有廟明絶去僭差之類河圖曰臣僭奢下犯主則雷電撃朝京氏易五星占曰雷霆殺人何夫雷天拒難之折衝也人君承用節度即雷風以節暴行威福則雷霆殺人其救也議獄緩死則災消矣京房别對災異曰雷鳴連而不絶者何夫雷鳴萬里懼今鳴不絶此謂人君行政事民不恐懼也故致遊雷之災雷當先電而鳴雷今與電俱出或鳴而後電何此謂執法者貪所致災也後漢書曰桓帝建和三年六月雷震憲陵寢屋先是太后聽兄梁冀擅殺李固杜喬魏志曰魏明帝景初中洛陽水橋同日俱震時勞役大起古今五行記曰吳孫權赤烏八年夏雷震宫門柱又撃南津橋至十三年廢太子和立子亮又曰晉惠帝永康初六月震崇陽陵標西南五百步標破時賈后䧟害大臣終見殺晉中興書徴祥説曰元興三年永安皇后至自巴防將設威儀入宫天大雷震人馬多死沈約宋書曰元嘉十四年震初寧陵標四破至地十七年廢大將軍彭城王義康後魏書曰太祖天賜六年震天安殿東序帝惡之令左校以衝車攻殿東西兩序屋毁之唐書曰太宗貞觀十四年四月雷震乾元殿前槐樹冬雷京房易妖占曰天冬雷地必震教令撓則冬雷民饑漢書曰昭帝五年十一月大雷震十二月丞相王訢薨後漢書曰安帝永初六年十月郡國火雷延光四年十月郡國凡三十雷時鄧太后專政帝不親萬機晉書曰吳孫亮建興初十二月大風雷亮見廢又曰愍帝建興初十一月大雨雷震劉向以雷二月出八月入今此月雷電者陽不閉藏失節之異是時九州幅裂至四年帝降劉曜害之晉中興書徴祥説曰太興元年十一月京都雷震時未應雷而恒燠也又曰昇平二年十一月雷時皇太后朝舒緩也崔鴻十六國春秋後趙録曰建武十三年十二月雷大雨霖石虎問佛圖澄此何災也澄曰其爲我耳至戊子而葬霹靂春秋合誠圖曰霹靂擊於宫殿者妃后爭政春秋潛潭巴曰霹靂擊宫失君精池下有謀起春秋繁露曰王者言不從則金不從革而秋多霹靂霹靂者金氣也其音商故應之續晉陽春秋曰太元五年霹靂破含章殿四柱殺内侍二人晉朝雜事曰元康七年霹靂破高禖石占爲賈后將殺愍懐之兆趙書曰前石時暴風雷雨霹靂震臺壊署婦人震死瘞之三日重霹靂出之蔡邕封事曰臣聞天降災異縁象而至霹靂數發殆刑誅繁多之所生無雲而雷洪範五行傳曰秦二世元年無雲而雷雷陽也雲隂也有雲然後有雷有臣然後有君無雲而雷示君獨處無民臣也竹書紀年晉莊伯八年無雲而雷十月莊伯以曲沃叛又曰幽公元年無雲而雷至六年晉夫人秦嬴弑君於髙寢又曰秦二世時無雲而雷二世不恤天下有怨叛之心是嵗陳勝起兵天下亂漢書曰武帝征和四年天清晏無雲而雷聲聞四里至後年侍中莾何羅反又曰成帝元延元年夏無雲而雷光耀四照昏乃止是嵗趙飛燕害後宫皇太子後漢書曰獻帝初平四年無雲而雷時天下大饑人民相食晉書曰惠帝太安二年四月諸將立李特子雄爲王八月天中裂爲二無雲而雷成都王頴舉兵逼京師又曰太安二年無雲而雷其年張方入京燒服御死者萬計石超逼帝幸於緱氏王師不利大饑人相食梁書曰大通六年十二月西南無雲有聲而雷至大同年魏分爲二東西各主崔鴻十六國春秋曰張重華三十九年十月無雲而雷聲皆東南引四十一年重華死子曜靈立爲叔祚簒之又曰南燕慕容超太上二年無雲而雷七年爲晉將劉裕所殺隋書曰文帝開皇二十年二月無雲而雷四月有聲如瀉水自南而北其年皇太子勇廢為庻人立晉王為太子唐書曰則天時宗楚客以佞幸為内史受命之日無雲而雷太平御覽卷八百七十六
