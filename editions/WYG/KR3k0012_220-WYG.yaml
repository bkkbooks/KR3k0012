body:
  text: 太平御覽巻二百二十宋李昉等撰職官部十八中書令中書監中書侍郎中書令六典曰中書令之職掌國之政令緝熈帝載綂和天人入則告之岀則奉之以釐萬邦以度百揆蓋以佐天子而執大政者也漢書曰司馬遷旣被刑之後爲中書令尊寵任職又曰石君防與𢎞恭皆少坐腐刑爲黄門以選爲中尚書宣帝時任中書官以恭爲令君防爲僕射恭死君防代爲令貴倖傾朝百寮皆敬事應劭漢官儀曰左右曹受尚書事前世文士以中書在右因謂中書爲右曹又稱西掖吳録曰紀隲字子上景皇時隲父亮爲尚書令隲爲中書令每朝會詔以屏風隔其坐吳志曰胡冲平和有文幹天紀中爲中書令又曰張尚有俊才孫皓時爲侍郎以言語辯㨗見知擢爲侍中中書令又曰蔡欵字文德厯位内外以清貞顯於當世衞尉領中書令晉書曰王獻之爲中書令少而標邁不循常貫文義並所不長而能撮其勝會故爲一時風流之冠獻之卒以王珉代之世謂之大王令小王令也珉父洽永和中嘗爲此官至珉復居之時人以爲弈世令望又曰王獻之爲中書令啓瑯琊王爲中書監表曰中書職掌詔命固非輕才所能獨任自晉建國常命宰相叅領中興以來益重其任故能王言彌徽德音四塞又曰和嶠爲中書令荀朂爲監嶠意抗直鄙荀巧佞以意氣加之專車而坐自此監令乃使異車臧榮緒晉書曰潘尼性淡退唯以著述爲事永興末爲中書令晉陽秋曰王洽除中書令時年二十九將辭之從兄朗之遺書曰弟今二十九便居清顯要任敢不敬以先㫖爲弟啓義讓之路乎若吾年至四五十之間雖復令超豋公輔亦非吾所豫况降此以還者耶洽遂不拜又曰温嶠上疏曰臣才短學淺文義不通中書之職酬對無方斟酌重輕豈唯文疏而已自非望士良才何可妄居斯任累辭得止晉中興書曰肅祖以温嶠爲散騎常侍侍講大寧初手詔曰卿既以令望忠允之懷著於周旋且文清而㫖遠宜居深密今欲以卿爲中書令朝論咸以爲宜又曰王洽字敬和顯宗加王洽爲中書令帝曰敬和清裁昔爲中書郎吾尚小數呼見意甚親之今以爲中書令欲共講文章之事也又曰禇裒授衞將軍中書令裒以中書銓管詔命不宜以親居之固讓晉令曰中書爲詔令記會時事典作文書也晉制曰中書令銅印墨綬進賢兩梁冠絳朝服佩水蒼玉乗軺車晉諸公讃曰陳准爲中書令張華爲監准與華俱處機密而推崇之每直日有詔書無小大輙先示華了不措意華得詔書不以示准省中號准爲中書五郎其從容如此又曰懷帝以繆播爲中書令朝事莫不諮之人君之所取信於臣下無以尚也宋書曰傅亮永初元年爲中書令直中書省專典詔命以亮任總國權聽於省見客神虎門外每旦車常數百兩宋泰始起居注曰王言之職總司清要中將軍丹陽尹王景文夙尚𢎞簡情度淹粹忠規茂績實宣國道宜兼管内樞以重其任可中書令齊書曰王延之代張緒爲中書令何㸃嘆曰晉以子敬季琰爲此職今以王延之張緒爲之可謂清官後接之者實爲未易崔鴻後趙録曰徐光字季武頓丘人㓜有文才年十三王陽攻頓丘掠之而令主秣馬光但書柱作詩賦左右以白勒勒令召光付紙筆光立爲頌賜衣服遷爲中書令後魏書曰任城王澄爲中書令蕭賾使庾蓽來朝見澄音韻道雅風儀秀逸謂主客郎張彛曰往魏任城以武著稱今魏任城乃以文見美也又曰髙允髙祖禮敬甚重晨入暮岀或積日居中朝臣莫知所論或有上書言得失者髙宗省而謂群臣曰君父一也父有是非子何爲不能書諫之懼人知惡而於家内隱處也豈不以父親恐惡彰於外也今國家善惡不能面陳而上表顯諫此豈不彰君之短明已之美至如髙允者真忠臣矣朕有非恒正言面論至朕所不周聞者皆言説無避就朕聞其過而天下不知其諫豈不忠乎汝等在左右曾不聞一正言但向朕喜時求官乞職汝等把弓刀侍朕左右徒力勞耳皆至公王此人把筆匡我國家不過作郎汝等不自媿乎於是拜允中書令又曰高允字伯恭爲中書令高宗重之不名恒呼爲令公又曰高允拜中書令司徒陸麗曰高允雖蒙寵待而家貧布衣妻子不粒高宗怒曰何不先言今見朕用之方言其貧是日幸允第惟草屋數間布衣被褞袍厨中鹽菜而已高宗歎息曰古人之清豈有此乎即賜帛五百疋粟千斛唐書曰武德年嘗有勅而中書門下不時宣行高祖責其遲由内史令蕭瑀曰臣大業之日見内史宣勅或前後相乖者百司行之不知何所承用所謂易雖在前難必在後臣在中書日乆備見其事今皇階初搆事渉安危若遠方有疑恐失機會比每授一勅臣必審勘使與前勅不相乖背者始敢宣行遲晚之􅄽實由於此上善之又曰褚遂良拜中書令太宗寢疾召遂良及長孫無忌入卧内謂之曰卿等忠烈簡在朕心昔漢武寄霍光蜀主託葛亮朕之後事一以委卿太子仁孝卿之所悉必湏盡誠輔佐永保宗社又顧謂太子曰無忌遂良在國家之事汝無憂矣又曰神龍元年改中書令曰紫微令又曰開元二年紫微舎人六員每一頭商量事諸舎人同押連署状進訖凡事有是非理均與奪人心既異所見或殊抑使雷同情有不盡臣今商量其事執見不同者望請别作商量状連本状同奏若状語交牙恐煩聖思臣既是官長望於兩状後畧言二理優劣奏聽進止則人各盡能官無留事勅曰可又曰張九齡爲中書令時天長節百寮上壽多獻珍異唯九齡進金鏡録五卷言前古興廢之道上賞異之薛瑩條列吳事曰胡冲意性調美心趣解暢有刀筆才嫻於時事爲中書令雖不能匡矯亦自守不苟求容媚王珉别傳曰珉字季琰詔曰新除侍中王珉才學廣贍理識清通宜處機近以叅時務其以珉爲長兼中書令郭頒魏晉世語曰劉放孫資共典樞要夏侯獻曹肇心内不平殿中有雞棲樹二人相謂此亦乆矣其能復幾指謂中書監劉放中書令孫資又曰司馬景王令中書令虞松作表輙不可意令松更定思竭不能改鍾會爲定五字松深悦服宋謝莊讓中書令表曰伏惟陛下登馭震維臨齊璿政澤與風翔恩從雲動臣聞壁門天􅃉鳯沼神深􅁝綸王言出納帝命自非望允當時譽宣庠塾未有繆垂曲寵空席兹榮在於平壯猶不可勉况今綿痼百志俱淪中書監魏志曰黄初中改秘書爲中書監劉放爲監孫資爲令遂並掌機密厯文明齊王三世又曰蔣濟字子通時中書令監號爲專任濟上疏曰大臣太重者國危左右太親者身蔽古之至戒也往者大臣秉事外内扇動陛下卓然自覽萬機莫不祗肅夫人臣匪不忠也然威權在下則衆心慢上勢之常也陛下既已察之於大臣願無忘於左右晉書曰荀朂守中書監毗賛朝政及遷尚書令朂乆在中書管機事失之甚愠人有賀者朂恚曰奪我鳯凰池諸公何賀焉又曰太安元年有胡人入雲龍門殿前再拜云我當作中書監付都虞候斬之晉陽秋曰朱整少有名行官至中書監魏禪晉使整與中書令劉良共爲詔世祖踐祚權即用之晉中興書曰肅宗欲使庾亮爲中書監亮上疏曰陛下踐祚復以臣領中書則示天下有私矣晉諸公讚曰華廙爲中書監時事多不泄啓世祖乞授子薈荅詔先時荀朂爲中書監末年亦使息組書詔草傅祗爲中書監病風復使息暢書啓事皆前後相承以子弟管之後魏書曰孝文時蠕蠕如袁反國有䘮帝遣高閭爲書與之不叙㓙事孝文謂曰卿爲中書監職典文詞若情思不至應謝所任環濟要畧曰中書掌内事密詔下州郡及邉將不由尚書者也後關百官岀益重有令僕射丞郎令史秩與尚書同陶氏職官要録曰中書監舊視僕射梁選簿書自宋已來比尚書令特進之流而無事任清貴華重大位多領之王導表曰臣乞得除中書監持節專壹所司竭誠保傅惟力是視詔曰昔者筍公曾從中書監爲尚書令人賀之乃發恚云奪我鳯凰池諸人何賀耶願足下處之勿疑王敦表曰中書令領軍庾亮清雅履正可中書監領軍如故中書侍郎六典曰中書侍郎掌貳令之職凡邦國之庶務朝廷之大政皆叅議焉凡臨軒冊命大臣令爲之使則持冊書以授之凡四夷來朝臨軒則授其表疏升於西階而奉之若獻贄幣則受之以授於所司魏志曰明帝詔舉中書郎謂吏部尚書盧毓曰得其人與不在盧生耳選舉莫取有名有名如畫地作餅不可噉也毓舉韓曁敦篤至行帝乃用之吳志曰孫琳求中書兩郎典知荆州諸事主者奏中書不應外岀休特聽之其所請求一皆給與也晉書曰華廙字長俊爲人清簡𢎞雅加以名家子孫以婦父盧毓典選至年四十五爲中書通事郎又曰華表子簡字奉駿有智器文藻官至中書郎又曰衞瓘爲中書郎時權臣專政瓘優游其間無所親疎甚爲傅嘏所重謂之寗武子臧榮緒晉書曰夏侯孝若爲野王令居邑累歲朝野多歎其屈除中書郎晉起居注曰今之士大夫多不樂岀宰牧而好内官今皆先經外官治民著績然後入爲常伯中書郎曹嘉之晉紀曰汝南史曜字季茂爲山濤所知爲征南府小吏鄉人周浚見曜而友之配之妹官至中書郎晉中興書曰孔演字元舒晉國初建與庾亮俱補中書侍郎於時中興肇建庶事草創演經學博通又練識舊典朝儀軌制多取正焉由是元明二帝並親愛之又曰顧榮齊王冏召爲主簿冏自擅威權知其必敗唯終日昏酒冏以榮爲中書郎又曰范寗爲臨淮太守徴拜中書侍郎專掌西省以職在機近固辭不許多所獻替有益治道又曰范寗拜中書侍郎時烈宗雅好文學而寗明習五經甚見親愛朝廷疑議輙諮訪之寗指朝士直言無諱又曰王濛字仲祖恬暢能言名理善𨽻書與劉恢爲中書侍郎太宗輔政濛恢並數侍接對號爲入室之賔恢字真長少清峻時人以濛比袁曜卿以恢比荀奉倩宋書曰王㣲與從弟僧綽書曰闔門皆蒙時私吾高卧家巷遂至中書侍郎此足以闔棺矣又曰裴瓚風神高邁遂爲中書侍郎岀入禁門皆肅然改容北史曰趙彦深諷朝廷以子堅為中書侍郎頗招物議時馮子琮子慈明祖珽子君信並相繼居中書故時語云馮祖及趙穢我鳯池隋書曰元善拜内史侍郎上每望之曰人倫儀表也凡有敷奏毅氣抑揚觀者矚目唐書曰郭正一永淳二年除中書侍郎正一在中書累年明習舊事兼有詞學制勅多岀其手當時號爲稱職又曰崔沔拜中書侍郎或謂沔曰今之中書皆是宰相承宣制命侍郎雖是副貳但署位而已甚無事也沔曰不然設官分職上下相維各申所見方爲濟理豈可俛黙偷安而爲懷禄士也自每有制勅及曹事沔多所異同王濛别傳曰濛爲中書郎在職四年無人對以濛難與比肩故也鍾會母傳曰嘉平元年車駕朝高平陵會爲中書郎從行宣王始舉兵衆人恐懼而夫人自若嵇氏世家曰嵇含爲中書侍郎書檄雲集莫不立草通典曰隋初爲内史侍郎四員煬帝减二員改爲内書侍郎陸士衡轉中書侍郎齊王収士衡付廷尉衡岀後謝表曰臣以職在中書制命所岀而臣本以筆札見知慮不獲已乃詐發内妹䘮岀就第去哭泣受弔片言隻字文不關其間梁庾肩吾爲寧國公讓中書郎表曰臣聞陟彼大行伯后之車屢怠望兹吳坂少遊之馬難追是知美非流水立致摧轅駿靡浮雲便期頓轡起登天漢寧陪九萬之風坐濟星橋非使千年之翼豈有幼稱辯慧足對元禮弱標俊頴能嘲子淑玉重組長空見休寵深宫䆳宇孰知懷憂太平御覽卷二百二十
