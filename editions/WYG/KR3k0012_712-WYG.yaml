  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_712-1a, image: WYG0899/WYG0899-0336a.png}
body:
  text: 太平御覽卷七百十二宋李昉等撰服用部十四熨斗澡盤澡灌伏虎熨斗通俗文曰火斗曰熨帝王世紀曰紂欲重刑乃先作大熨斗以火熱之使人舉不能勝輒爛手與妲己為戱笑魏末𫝊曰優人欲使記㓜帝取大将軍昭昌熨斗柄帝不敢發晉書曰韓康伯年數嵗母殷氏以時大寒方為作襦令康捉熨斗而謂之曰且著襦尋當作複袴康伯曰火在斗中而柄尚熱今既著襦下亦當煖又張蕪别𫝊曰蕪小時母謂其寒且作袴蕪曰且作襦如熨斗著火柄亦熱隋書曰尉遲迥及於鄴時李穆在并州高祖獻慮其為迥所誘遣使往布腹心穆遽奉熨斗於高祖曰願以此熨安天下也高祖大悦三輔故事曰董卓壞銅人十杖為小錢熨斗淮南子曰糟丘生於象箸炮烙始於熱斗許類曰熱斗熨手也爛人手遂作炮烙之刑也晉東宫舊事曰皇太子納妃有金塗熨斗三枚魏武帝集上勝所得順帝賜物銅熨斗二枚澡盤魏武上雜物疏曰御物有純銀盤又有容五石銅澡盤也杜預奏事曰澡盤熨斗民間要用世説曰大將軍王敦至石崇家如厠還有數十婢曵羅縠擎金澡盤盛水琉璃盛澡豆因令著水調而飲之謂是乾飯羣婢莫不大笑也述征記云長安逍遙宫門裏有澡盤面徑丈二也異􅁐曰中朝有人畜銅澡盤旦夕恒鳴張華曰與洛鍾宫啇相諧故聲應錯鑢之乃止傅𤣥澡盤銘曰與其澡於水寧澡於徳水之清猶可穢也徳之修不可塵也澡灌四王起事曰惠帝征成都君敗帝渴帳下齎五升銅灌就民家取水就灌飲之齊書曰劉悛少與齊武欵好帝常至悛宅晝卧覺悛自奉金澡灌受四升水以沃􅏕因以與帝前後所納稱此東宫舊事曰皇太子初拜有金塗澡灌一枚青絲三合繩一枚長二丈五尺又曰皇太子納妃有澡灌二枚西域諸國志曰月支國有佛澡灌受二升許青石名羅勒色碧玉班受水無定隨其多少逺惠法師澡灌銘序曰得摩羅勒石澡灌一枚故以此銘荅之伏虎周禮天官曰太尉掌王燕衣服凡䙝器鄭司農云褻溺器虎子也春秋後語曰智伯圍趙襄子於晉陽襄子大敗智伯軍殺智伯漆其頭以為飲器史記曰匈奴破月氐王以其頭為飲器魏略曰蘇則為侍中舊侍中親省起居故俗因謂執虎子始蘇則同吉茂隠茂後見則嘲之曰士宦不已執虎子録異𫝊曰吳時嘉興倪彦思忽見鬼魅入其家能與人語飲食如人唯不見形彦思乃延道士逐之酒餚既設道士便擊鼓召諸神魅乃取伏虎於神坐吹作角聲以亂音頃道士忽覺背中冷驚起觧衣乃伏虎也馬融遺令曰穴中不得下銅虎况他銅物太平御覽卷七百十二
