body:
  text: 太平御覽卷七百十六宋李昉等撰服用部十八手巾絮巾手巾漢名臣奏曰王莾斥出王閎太后憐之閎伏泣失聲太后親自以手巾拭閎淚英雄記曰在尊者前宜各具一手巾不宜借人巾用江表𫝊曰孫權尅荆州将吏悉皆歸附而潘濬涕泣交横權慰勞與語使親近以手巾拭其靣東宫舊事曰太子納妃有百濟白手巾也廣志曰炎州以火浣布為手巾博物志曰魏文帝善彈碁能用手巾角竹林七賢論曰王戎患為三公卒爾私行廵省園田不從一人以手巾挿腰戎故吏多大官相逢輒下道避之名山畧記曰鬱州道祭酒徐誕常以治病為事有吳人姓夏侯來師誕忽暴病死終冬渉春有長沙門從北來於道中見夏侯云被崑崙召不得辭師寄手巾為信誕得手巾乃本所送入棺者志怪曰㑹稽人吳詳見一女子溪邊洗脚呼詳共宿明旦别去女贈詳以紫巾荅以白布手巾神仙服食經曰伏苓如拳者着手巾中百鬼消㓕秦嘉婦與書曰今奉越布手巾二枚絮巾漢書儀曰皇后親蠶絲絮織室作祭服皇后得以作絮巾魏畧曰趙岐避難至北海着絮巾市賣餅鄴中記曰石虎皇后田以女騎一千為鹵簿冬月皆綸巾􅀶物志曰蜀人以絮巾為㡌絮太平御覽卷七百十六
  hash: sha256:144fd75ef1a0af860e1c15a9fecfa1e2749654c8b47258f17ed815c87020c8ba
