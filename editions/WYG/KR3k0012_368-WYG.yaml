body:
  text: 太平御覽卷三百六十八宋李昉等撰人事部九脣吻齒牙喉咽頤頷承漿脣吻説文曰脣口端也釋名曰脣縁也口之縁也吻免也入則碎止則免也又取枚也吹唾所出恒加枚栻因以為名也傳曰晉欲伐虢假道于虞虞君許之宫之竒諫曰諺有之輔車相依脣亡齒寒其虞虢之謂乎又曰吴將伐魯王問于子洩對曰諸侯將救之未可以得志焉夫魯齊晉之唇唇亡齒寒君所知也不救何為春秋元命苞曰唇者齒之垣所以扶神設端若有列星與外有限故曰唇亡齒寒春秋孔演圖曰八政不中則人無唇人恃唇乃語命無隂不制孝經鈎命决曰仲尼斗唇吐教陳機授度史記曰越王勾踐曰孤常不料力與吴戰困于㑹稽日夜焦唇乾舌徒欲與吴王接踵而死漢書曰張湯與顔異有隙人有告異以他議事下湯治異云異與客語客云初令下有不便者異不應㣲反唇湯奏異九卿見令不便不入言而腹非論死自是後有腹非之法又薛宣傳曰博士申咸毁丞相宣家行不足宣子况賕客楊明斫咸宫門外斷鼻唇况坐従宣免為庶人王隠晉書載寒雋傳曰列升龍湏昌人赤色文唇少言語有大志自縣小吏至雍州刺史梁書曰侯景僣位入登太極殿其徒數萬吹唇唱吼而上荘子曰孔子謂盗跖曰將軍唇如􅈭丹淮南子說山曰孕見兎而子缺唇見麋而四目物固有然有不然也賈誼曰沸唇投塞垣下匈奴號也通俗文曰唇不覆齒謂之齖廣志曰赤口濮嶃其唇以丹飭之瀨鄉記曰李母碑曰老君厚唇趙志自叙曰志自景其長七尺四寸潔白黒髮明眉赤唇髭鬢不多燉煌實録曰王琴卒有盗開琴冢者見琴與人樗蒲與杯酒賜盗者惶怖既飲見牽銅馬出其夜有神告城門我王孟曽使也人發孟曽冢以酒黒其唇明日入城有黑者是也湏叟馬還流汗盗明詣城門不覺唇黑為吏所縳孟曽琴之字也宋玉神女賦朱唇若丹曹植洛神賦曰丹唇外朗皓齒内鮮又曰啓朱唇以徐言崔駰七依曰紫唇素齒雪白玉暉廣雅曰咡謂之吻淮南子曰决吻治齲君子不齒齒說文曰齔毁齒也男八月生齒八嵗而齔女七月生齒七嵗而齔釋名曰齒始也少長之别始乎此也以齒食多者長食少者幼也禮曰毋刺齒謂口容止又曰濡肉齒决决猶斷也乾肉不齒决又曰髙子皋之執親之䘮也泣血三年未嘗見齒言笑之㣲君子以為難左傳曰陳僖子使召公子陽生立之將盟遂誣曰鮑子之命也鮑子曰汝忘君之孺子牛而折其齒乎孺子荼也景公常啣䋲為牛使荼牽之恭湏地救折其齒也詩碩人曰齒如瓠犀又閟宫曰既多受祉黄髮兒齒公羊傳荘公曰仇牧聞閔公弑趨而至遇之于門手劒而比之宋萬臂殺仇牧碎其首齒著乎門闔春秋元命苞曰武王駢齒是謂剛强取象叅房誅害以従天心宋均注曰房為明堂主布政叅為大辰主斬刈兼此二者故重齒為表孝經鈎命决曰夫子駢齒象鈎星也史記曰顔囘二十九髮盡白齒早落又曰范睢事魏中大夫湏賈賈使齊睢従襄王聞睢辨賜金及牛酒賈以為睢持魏事告齊故得饋以告魏相魏相大怒使人笞擊睢折脇摺齒睢佯死漢書曰張倉無齒惟飲乳百有餘嵗而卒謝承後漢書曰豫章項誦字叔和為郡主簿太守為屬縣所誣章誦詣獄證要引自掾血出滂流齒皆堕地太守獲免晉書曰温嶠先有齒疾因拔齒中風而卒又曰成帝杜皇后少有姿色長猶無齒有求昏者輙中止及帝納采一夜齒盡生又曰謝鯤隣家有美女鯤調之女以梭投鯤折其兩齒世俗為之謡曰作達不已幼輿折齒幼輿鯤字也山海經曰黒齒國為人黒齒河圖矩起曰帝嚳駢齒白虎通曰帝嚳駢齒上法曰叅秉度成紀以理隂陽抱朴子内篇曰或問堅齒之道答曰養以華池漱以濃液永不動永不動次則服靈非散既脫更生楊泉物理論曰夫齒者年也身之寳也藏之斧鑿所以調諧五味以安性氣者也神僊傳曰老君䟽齒神仙服經曰服神丹三百嵗齒化為石王閎本事曰閎為瑯琊太守張歩欲誅之閎出東武城門馬奔堕車折齒閎心惡移病歸府遂得免字林䶜牛於反齒不相值也齼初舉反齒傷酢也齩午交反齧噬也齨音舅老人齒如臼也叚國沙州記曰國人年五十以上四齒皆落將由地寒多障氣也冀物志曰屠移在海外以草染齒因號黒齒袁子正書曰山梁氏泥於西屠而染其齒世說曰孫子荆少時欲隠語王武子曰吾當枕石潄流誤云潄石枕流王曰流非可枕石非可潄孫曰所以枕流欲洗其耳所以潄石欲礪其齒又曰王子猷詣謝𤣥林公先在坐王曰若林公髮鬢並全神情當復勝此否謝曰唇齒相湏不可偏亡琴操曰聶政父為韓王治劍過期不成王殺之時政未生及長入太山遇仙人學鼓琴漆身為癘吞炭為啞七年琴成入韓逢其妻従買櫛對妻而笑妻泣曰君何以似政乃入山援石擊落其齒楚辭曰美人皓齒嫮以姱臨海水土志曰夷州人俗語曰已嫁皆缺去前上一齒宋玉登徒子賦曰腰如束素齒如含貝司馬相如上林賦曰皓齒粲爛張協禊賦曰清哇發於素齒牙釋名曰牙植牙也随形言之也于寳晉紀曰賈庶人未害愍懐太子時有謡曰南風烈烈吹白沙千嵗髑髏生齒牙南風庶人名愍懐小名沙門三國典畧曰齊太上主生齻牙問於尚藥典御鄧宣以對太上主怒而撻之中書監徐之才拜賀曰此智牙生者聰明長夀太上恱而賞之喉咽說文曰咽嗌也喉嚨也釋名曰咽咽物也青徐謂之脰音豆物投其中受而下之也又謂之嗌音益氣所以通流阨要之處也傳曰敗狄于鹹獲長狄僑如富父終生舂其喉以戈殺之矣孝經鈎命决曰夫子輔喉史記曰孫子曰夫救鬭者不摶擑批亢𢷬虛形格勢禁則自為觧耳亢人喉也又曰貫髙聞赦張王乃曰所以不死者白張王不反今王已出吾責已塞死不恨矣且人臣而有簒弑之名何靣目復事上哉縦上不殺我不媿心乎乃仰絶吭而死韋昭曰吭咽也漢書曰人有上書言息夫躬懐怨恨非笑朝廷所進候星視天子吉㓙與巫共祝詛上遣侍御史廷尉監棣躬擊雒陽詔獄欲掠問躬仰天大謼火故反因僵仆吏就問云咽已絶後漢書曰霍諿為舅宋光被謡上書曰譬猶療饑於附子止渇於酖毒未入膓胃已絶喉咽豈可為哉又曰王青字公然青父隆建武初為都尉功曹青為小吏與父俱従都尉行縣道遇賊隆以身衛全都尉遂死為難青亦被矢貫咽又曰李固對詔曰陛下有尚書猶天之有北斗北斗天之喉舌尚書陛下之喉舌魏志曰樂陵王茂兄東平王薨茂稱咽病不肯發哀詔削户蜀志曰彭羕與諸葛亮書曰先民有言左手據天下之圖右手扼其喉愚夫不為唐書曰幽州朱克融鎮州王庭湊反東川節度王涯獻書曰臣聞用兵若鬭先扼其喉今瀛莫易定兩賊之咽喉也誠宜假之威柄戍以重兵俾其死生不相知間諜無所入而以大軍先進冀趙次臨井陘此一舉萬全之勢也抱朴子曰焦喉之渇遥指滄海列女傳曰齊鍾離春者宣王后也極醜卭鼻結喉益都耆舊傳曰犍為楊鳯珪者其妻陳姬珪早亡兄弟欲嫁之姬於是引刀割咽流血幾死九族驚異乃従其節又曰蜀郡史賢妻張昭儀賢既犯罪被誅儀取刀自割咽喉而死物理論曰咽喉生之要孔黄帝素問曰喉主天氣咽主地氣頥頷釋名曰頤或曰輔車其骨强所以輔持其口或曰牙車牙所載也或曰頷車頷含也韓詩曰有美一人碩大且㜝薛君曰㜝重頤也五檢反周易噬嗑卦曰頤中有物曰噬嗑又頤卦曰頤貞吉觀頤自求口食春秋元命苞曰后稷岐頤自求是謂好農盖象角元載土食榖宋均注曰靣皮二象也頤靣為下部下部為地巧于利也戰國策曰静郭君善昆辨昆辨多疵門下不恱孟嘗君以諌静郭君大怒含之上舍令長子御旦暮進食威王薨宣王立太子不善静郭君辭之薛昆辨至齊見宣王王子曰子静郭君所聴愛者乎曰愛即有之聽即無有王之為太子辨謂静郭君曰太子相不仁過頤豕若是法背父不若廢太子更立衛姬子嬰兒杸師静君泣而曰不可吾弗忍為聽辨而為之必無今患矣宣王曰寡人殊不知此乃迎静郭君史記曰黄歇上書秦王曰本國殘社稷刳腹結膓折頸摺頤又曰蔡澤顩頤漢書曰王莽蹙頤范曄後漢書曰班超字仲升為人大志不修小節嘗行詣相者相者曰祭酒布衣諸生而當封侯萬里之外超問其状相者曰生燕頷虎頭飛而肉食此萬里侯相也江表傳曰孫權方頤大口三國畧曰徐之才年十三劉孝綽見之言曰徐郎燕頷班超之相也帝系曰帝嚳方頤荘子曰支䟽頤隠於齊又曰孔子逰緇帷之林弦歌鼓琴奏曲未半有漁父刺船而来鬚眉交白被髮揄袂行原而上距陸而止左手據膝右手持頤以聴之韓子喻老曰白公勝慮罷朝杖䇿鍜貫頤而血流至地而弗知鄭人聞之曰頤之忘何不忘哉䇿馬堇也有針似頬馬謂之鍜音竹劣陟衛二切河圖曰黄帝兊頤說苑曰田單攻翟三月不克嬰兒謡曰大冠如箕長劍柱頤西京雜記曰匡衡字稚圭勤學能說詩時人為之語曰無說詩匡鼎来匡說詩觧人頤鼎衡之小字也王粲七釋曰揚娥眉而頤指汝南先賢傳曰周奕顩折頞其貌甚醜也談藪曰北齊李恕無鬚崔諶玩之曰何不錐頬頤作數百孔拔左右好鬚者栽之承漿釋名曰口下曰承漿承水漿也針灸經曰承漿一名懸漿也太平御覽卷三百六十八
