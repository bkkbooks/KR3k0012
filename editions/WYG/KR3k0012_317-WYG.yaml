body:
  text: 太平御覽卷三百十七宋李昉等撰兵部四十八攻圍攻圍上孫子曰下政攻城攻之法為不得已修櫓橨輼具噐械三月而後城距闉又三月而後已修治也櫓大楯也橨輼車也其下四輪從中權之噐械者機關攻守總名雲梯之屬距闉勇士積而前以附其城也將不勝心忿而蟻附之則殺士三分之一而城不㧞者攻之灾也將忿不得攻噐而使卒縁城上如蟻縁城殺士也善用兵者屈人之兵而非戰㧞人之城而非攻毁人之國而非久必以全争於天下故兵不鈍而利可全此謀攻之法也不以敵戰而必全得之意勝於天下不頓兵血刃也又曰不可勝則守可勝則攻敵攻已不可勝守則不足攻則有餘吾所守者力不足也所以攻者力有餘也所以善守者藏於九地之下因其山水丘林之固善攻者動於九天之上因天時地利之變若動於九天之上也故能自保而全勝也又曰攻而必取者攻其所不守也守而必固者守其所必攻也知敵之情者也故善攻者敵不知其所守善守者敵不知其所攻情不洩也微乎微乎故能隠於常形神乎神乎故能為敵司命進不可禦者衝其虛也退而不可追者逹而不可及也卒往攻其虛解退又疾也故我欲戰雖髙壘深溝不得不與我戰者攻其所必救也絶粮道守歸路攻君王也我不欲戰畫地而守之軍不煩也敵不得與我戰者乖其所之乖戾也戾其道示以利害使敵疑之左傳曰晉荀吳帥師伐鮮虞圍鼓鼔白狄之種也鉅鹿郡曲陽縣有鼔聚鼔人或請以城叛穆子弗許曰或以吾城叛吾所惡也人以城來吾獨何好焉使敵殺叛人而繕守備圍鼓三月鼓人請降使其民見曰猶有食色姑修而城軍吏曰獲城而弗取何以事君穆子曰吾以事君也獲一邑而教民怠將焉用邑人能事其君我亦能事吾君卒義不爽爽差好惡不愆城可獲而民知義所有死命而無二心不亦可乎鼓人告食竭力盡而取之克鼓不戮一人以鼔子䳒鞮歸又曰齊髙發帥師伐莒初莒有婦人莒子殺其夫已為嫠婦及老託於紀鄣紀鄣莒邑紡焉以度而去之以所紡纑度城藏其纑待外攻以報讐也及師至則投諸外投繩城外或獻諸子占子占使師夜縋而登縁繩登城登者六十人縋絶師鼓譟城上之人亦譟莒共公懼啟西門而出七月丙子齊師入莒傳言怨不在大又曰晉侯秦伯圍鄭晉軍函陵秦軍汜南佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退佚之狐燭之武皆鄭大夫也公從之辭曰臣之壯也猶不如人今老矣無能為也已公曰然鄭亡子亦有不利焉許之夜縋而出見秦伯又曰齊侯曰以此衆戰誰能禦之以此攻城何城不克又曰楚子圍鄭旬有七日鄭卜行成不吉卜臨于大宫臨哭也大宫鄭之祖廟且巷出車吉國人大臨守陴者皆哭陴者城上睥睨皆哭所以告楚窮也楚子退師鄭人修城進復圍之三月克之哀其窮故為退師尚不服故復圍九十日入自皇門至于逵路方九軌曰逵鄭伯肉袒牽羊以逆肉􅃝牽羊示為臣僕曰孤不天不為天所祐不能事君使君懐怒以及敝邑孤之罪也敢不唯命是聽其俘諸江南以實海濵亦唯命其翦以賜諸侯使臣妾之亦唯命若惠顧前好世有盟誓使改事君夷於九縣楚滅九國以為縣也君之惠也孤之願也非所敢望也敢布腹心君實圖之又曰齊侯伐我北鄙圍龍魯邑頃公之嬖人盧蒲就魁門焉攻龍門也龍人囚之齊人曰弗殺吾與而盟弗聽殺而膊諸城上齊侯怒親鼔士臨城三日取龍國語曰晉獻公見翟相之氛歸寢不寐翟相國名也言有亡國之氣也或曰敵國有災氛則國凶惡也郗叔虎朝公語之遂伐翟相叔虎乗城被羽先登克之戰國策曰平原君謂馮忌曰寡人欲出兵攻燕何如對曰不可夫昔以秦將武安君公孫起乗十勝之威與馬服子戰於長平之下大敗趙師自以餘兵圍邯鄲之城趙以十敗之餘收破軍之弊秦罷於邯鄲之下趙守而不可㧞者攻難而守易也今非有十剋之威而燕非有長平之禍也今一敗之禍未復而欲以罷趙攻强燕秦以兵承趙之弊此乃强吳所以亡而弱越所以霸也故臣未見燕之所攻也平原曰善又曰樂羊為魏將攻中山其子在中山中山之君烹其子而遺羮樂羊坐於幕下啜之盡一杯文侯曰樂羊以我故食其子因賞其功而疑其心又曰秦攻趙蘓子説秦王曰臣聞王之于民也多聽而時用之是故事無敗也臣聞懐重寳者不夜行任大功者不輕敵是以賢者任重而行恭智者功大而辭順故民不惡其尊世不妬其業秦乃解兵諸侯休天下安不相伐者二十九年史記曰秦末沛公破南陽南陽守齮走保城守宛沛公引兵過宛西張良諫曰沛公雖欲急入關秦兵尚衆距險今不下宛宛從後擊强秦在前此危道也於是沛公乃夜引軍從他道還更張旗幟黎明圍宛城三匝黎未也未明之貎頃已圍之事必方明又言黎黑色亦未明也南陽守欲自剄其舍人陳恢曰死未晚也乃踰城見沛公曰臣聞足下約先入咸陽者王之今足下留守宛宛大郡之都也連城數十人民衆積蓄多吏人自以為降必死故皆堅守乗城今足下盡日止攻士死傷者必多引兵去宛宛必隨足下後足下前則失咸陽之約後又有强宛之患為足下計莫若約降封其守因使上守引其甲卒與之西諸城未下者聞聲争開門而待足下通行無所累矣沛公曰善乃以宛守為殷侯封陳恢千戸引兵西無不下者又曰武安君白起攻韓㧞九城斬首五萬又周本紀曰古公積徳行義國人皆戴之獯育戎狄攻之欲得財物與之已復攻欲得地與民民皆怒欲戰古公曰今戎狄所為攻戰以吾地與民民之在我與其在彼何異民欲以我故戰殺人父子而君之子不忍為漢書李陵傳曰單于急攻陵陵居谷中虜在山上四面射矢下如雨又曰李廣利及郡國惡少年數萬人至貳師取善馬故號貳師將軍當道小國各堅守不肯給食攻郁城殺傷甚衆引而還天子聞之大怒使使遮玉關軍有敢入輙斬之貳師恐益發惡少年及邊騎六萬人伐宛宛城外流水於是遣水工徙其城下水空以穴其城攻之三十餘日宛貴人相與謀遣人到貳師約漢無攻我我盡出善馬貳師許之取善馬中馬以三千餘匹後漢書曰河南賊董憲招誘五校餘賊歩騎數千人屯建陽去昌慮三十里光武親征至番音波去憲百餘里諸將請進帝不聽知校乏食當退勅各堅壁以待其弊頃之五校糧盡果引去帝乃親臨四面攻憲三日大破之又曰王郎起兵光武自薊至信都使鄧禹發奔命得數千人令自將之别攻㧞樂陽又曰龎萌董憲反與蘓茂佼音郊强合兵三萬急圍桃城光武時在䝉聞之乃留輜重自將輕騎二千步騎數萬晨夜馳赴師次任城去桃城六十里旦日諸將請進賊亦挑戰帝不聽乃休士養鋭以挫其鋒城中聞車駕至衆心益固時漢等在東郡馳使召之萌等乃悉兵攻城二十餘日衆疲困而不能下及吳漢等到乃率衆軍進桃城帝親自搏戰大破之又曰張步據齊地漢耿弇總兵討之張步使其大將費邑軍厯下又分守祝阿鍾城弇先擊祝阿自晨攻城未中而㧞之故開圍一角令其衆得奔歸鍾城人聞祝阿已潰大恐懼遂空壁亡去又曰漢將朱雋與荆州刺史徐璆共討黄巾擊賊帥趙宏斬之賊餘帥韓忠復據宛乞降司馬張超請聽之􅖿曰兵有形同而勢異者昔秦項之際人無定主故賞降附勸以來耳今海内一同唯黄巾造冦納降無以勸善討之足以懲惡今若受之更開逆意賊利則進戰鈍則乞降縱敵長冦非良計也因急攻連戰不剋􅖿登土山觀之顧謂張超曰吾知之矣賊今外圍周固内營逼急乞降不受欲出不得故以死戰也萬人一心猶不可當况十萬乎其害甚矣不如撒圍并兵入城忠見圍解勢必自出則意散易破之道也既而解圍忠果出戰巂因擊大破之忠等皆降魏志曰曹公破袁尚㧞鄴進圍壺關令曰城㧞皆坑之連日不下曹仁謂公曰圍城必示之以活門所以開其生路也今告之必死將人自為守且城固而粮多攻則士卒傷守則曠日持久今頓兵堅城之下攻必死之虜非良計也曹公從之遂降其城東觀漢記曰張步都臨淄使弟𤣥武將軍藍將兵守西安去臨淄四十里耿弇引軍營臨淄西安之間弇視西安城小而堅藍兵又精未易攻也臨淄諸郡太守相與雜居人不専一其聲雖大而虛易攻弇内欲攻之告令軍中治攻具後五日攻西安復縱生口令歸藍聞之晨夜守城至期日夜半令軍皆食㑹明求乞攻西安臨淄不能救也弇曰然吾固揚言欲攻西安今方自憂治城具而吾攻臨淄一日必㧞何救之有吾得臨淄即西安孤必復亡矣所謂一舉而兩得者也且西安城堅精兵二萬人攻之未可卒下卒必多死傷正使得其城張藍引兵突臨淄更强勒兵憑城觀人虛實吾深入敵城後無轉輸旬月之間不戰而困諸軍不見是爾弇遂擊臨淄至日破之張藍聞臨淄破果將其衆亡江表傳曰郭典字君業為鉅鹿太守與中郎將董卓攻黄巾賊張寳于下曲陽典作圍塹而卓不肯典曰受詔攻賊有死而已使諸將引兵屯東典獨於西當賊之衝晝夜進攻寳由是城守不敢出時為之語曰郭君為塹董將不許㡬令狐狸化為豺虎賴我郭君不畏强禦轉機之間敵為窮虜猗猗惠君實克疆土英雄記曰袁尚使審配守鄴曹操進軍攻鄴審配將馮禮為内應開突門内操兵三百餘人配覺之從城上以大石擊門門閉入者皆死操乃鑿塹周廻四十里初令淺示若可越配望見笑而不出操令一夜濬之廣深二丈決漳水灌之自五月城中餓死者過半尚聞鄴急將兵萬餘人還救操逆擊破之尚走依曲漳為營操復圍之尚懼遣隂䕫陳球請降不聽尚還走濫口操復進擊圍之尚將馬延等臨陣降衆大潰尚奔中山盡收其輜重得尚印綬節鉞及衣物以示城中城中崩沮審配命士卒曰堅守死戰操軍疲矣幽州方至何憂無主以其兄子榮為東門校尉榮夜開門内操兵配猶拒戰城陷生獲配操意活之配意氣壯烈終無撓辭見者莫不歎息遂斬之魏志曰袁紹圍太祖於官渡糧乏問計於賈詡詡曰公明勝紹勇勝紹用人勝紹决機勝紹有此四勝而半年不定者但顧萬全故也必决其機湏㬰可定太祖曰善乃棄兵出圍擊紹紹軍大亂河北平太平御覽卷三百十七
