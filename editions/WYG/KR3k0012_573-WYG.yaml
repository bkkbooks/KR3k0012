  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_573-1a, image: WYG0898/WYG0898-0268a.png}
body:
  text: 太平御覽巻五百七十三宋李昉等撰樂部十一歌四司馬相如琴歌曰鳯兮鳯兮歸故鄉遨遊四海索我凰時未遇兮無所將何悟今夕昇斯堂有艶淑女在此房室邇人遐毒我膓何縁交頸為鴛鴦崔琦四皓頌曰昔商山四皓者葢甪里先生綺里季夏黄公東園公是也秦之博士遭世闇昧道滅徳消坑黜儒術詩書是焚於是四公退而作歌曰漠漠髙山深谷逶迤􅁮􅁮紫芝可以療饑唐虞世逺吾將何歸駟馬髙葢其憂甚大富貴畏人兮不如貧賤之肆志曹植琴調曰予嗟此轉運夙夜無休閒東西經七陌南北越七阡願為林中草秋隨野火燔䃺滅豈不痛願與株葉連司馬相如美人賦曰有女獨處婉然在牀竒葩逸麗素姿艶光覩臣微笑而言曰上客何國之君子無乃逺乎遂設㫖酒進鳴琴玉釵挂臣冠羅袖拂臣衣撫絃而為幽蘭之曲女乃歌曰獨處室兮廓無依思佳人兮傷情悲彼君子兮來何遲日将暮兮華髪衰魏文與繁欽書曰守宫王孫世有女曰璅姑年九歳夢與神通寤而悲吟哀聲急切體若飛仙于今十五是日戊午祖于此園博延衆賔迭奏名倡世女須臾而至厥状甚美於是振袂徐進揚蛾微眺衆倡騰遊羣賔失席然後修容飾粧改曲變席激清角揚白雪接孤聲赴危節於是鄉風振條飛霧成霜可謂聲協鐘石氣應風律網羅韶濩囊括鄭衛者也繁欽牋與魏文帝曰都尉薛訪車子年始十四能喉囀引聲與笳同音自上呈見果如所言即日使其觀試乃知天壤之所生誠有自然之物也潛氣内囀哀音外激大不抗越細不幽散聲悲舊笳曲美常均國史補曰李衮善歌於江外而名動京師崔昭入朝密載而至乃邀致賔客請第一部樂及京師之名倡以為盛㑹紿言表弟請登末座令衮被衣而出滿座皆笑少頃命酒昭曰請表弟歌座中又笑及喉囀一發樂人皆大驚曰是李八郎也乃羅拜之樂府雜録曰踏揺娘者生於隋末夫河内人醜貌而好酒常自號郎中醉歸必毆其妻妻色美善歌乃自歌為怨苦之詞河朔演其曲而被之管絃因寫其夫妻之容妻悲訴每揺其身故號為踏揺娘近代優人頗改其制度非舊㫖也又曰開元中有人許子和者本吉州永新縣樂家女也開元末進入宫因以永新名之籍於宜春院既美且惠善歌能變新聲韓娥李延年歿後千載曠其人至永新始繼其能遇髙秋朗月臺殿清虛喉囀一聲響傳九陌明皇嘗獨召李謨吹笛逐其歌曲終管裂其妙如此一日賜大脯於勤政樓觀者數十萬衆諠譁聚語莫得聞魚龍百戲之音上怒欲罷宴髙力士奏請永新出樓歌一曲必可止喧上從之永新乃撩鬢舉袂直奏慢聲至是廣塲寂寂若無一人噫者聞之血湧愁者聞之腸絶自漁陽之亂六宫星散永新為一士人所得韋青避地廣陵因月夜憑欄於小河上忽聞舟中唱水調者曰此永新故歌也乃登舟省之因與永新對泣久之青始晦其事後士人卒與其母之京師終於狹斜間又曰古之能歌者即有韓娥李延年莫愁莫愁者女子也樂府詩云莫愁在何處莫愁石城西船子打兩槳催送莫愁來善歌者必先調其氣氤氲自臍間發至喉乃噎其詞即分抗墜之音既得其術即可致遏雲響谷之妙也又曰大厯初有才人張紅者本與父唱歌丐於衢路因過将軍韋青所居在昭國坊南門也青於看街忩中聞其歌喉嘹亮仍有美色即納為姬其父亦舎於後户優給之乃自得其藝頴悟絶倫常有樂工自撰一曲即古曲長命西河女也加减其節奏頗有新聲未進間先印可於青青潛令紅於屏風後聴之紅乃以小豆數合以記其節拍樂工歌罷青因入問紅何如紅曰巳唱得矣青出紿云某有女子弟久曽唱非新曲也即令隔屏唱之一聲不失樂工大驚異遂請相見歎伏不已且云此曲先有一聲不穩今已正矣尋逹上聴翌日召入宜春院寵澤隆異宫中號為記曲娘子尋為才人一日内使奏韋青卒上告紅紅乃於上前嗚咽奏云妾本風塵丐者一旦老父死有所歸致身入内皆自韋青妾不忍忘其恩一慟而絶上嘉歎之久之即贈昭儀韋青者本士人也嘗自為詩云三代掌綸誥一身能唱歌青官至金吾将軍明皇雜録曰唐𤣥宗自蜀回夜闌登勤政樓憑欄南望煙雲滿目上因自歌曰庭前琪樹已堪攀塞外征夫久未還葢慮思道之詞也歌歇上問有舊人乎逮明為我訪來翌日力士潛求於里中因召與同至則果梨園子弟也其夜上復與乗月登樓左右唯力士及貴妃侍者紅桃在焉遂命歌凉州詞貴妃所制上親御玉笛為之倚曲曲罷相覩無不掩泣上因廣其曲今凉州傳於人間者益加怨切焉又曰樂工李龜年恃恩遇於東都大起第宅僭侈之制逾於公侯宅在東都通遠里中制度甲於都下今裴晉公移於定鼎門南别墅號緑野堂也其後龜年流落江南每遇良辰勝景常為人歌數闋座客聞之莫不掩泣而罷劉叔敬異苑曰臨川聶包死數年忽遇南豐相沈道襲共飲其歌笑甚有倫序每歌云花盈盈止聞行當歸不聞死復生祖台志怪曰建康小吏曹著見廬山夫人夫人命女婉出著相見婉見著忻悦命婢瓊林取琴出婉撫琴歌曰登廬山兮鬱嵳峩晞陽風兮拂紫霞招若人兮濯靈波欣良㑹兮暢雲柯彈鳴琴兮樂莫過雲龍㑹兮樂太和歌畢婉便還去搜神記曰淮南王安設厨宰以候賔客正月上午有八老公詣門求見王曰郡蛾子復求也公始不見乃更形為八童子王便見之盛禮設樂以享八公援琴而絃歌曰明明上天照四海兮知我好道公來下兮公将與余生羽毛兮升騰青雲蹈梁甫兮觀見三光遇北斗兮驅乗風雲使玉女兮今所謂淮南操是也幽明録曰句章人至東野還暮不至門見路傍有小屋燈火因投寄宿有一小女不欲與丈夫共宿呼鄰家止宿女自伴夜共彈琴箜篌至曉此人謝去問其姓字女不答彈絃而歌曰連綿葛上藤一援復一絙欲知我姓名姓陳名阿登又曰呉縣費升為九里亭吏向暮見一女從郭中來素衣哭入埭向一新塜哭曰暮不得入門便寄亭宿升作酒食至夜升彈琵琶令歌女曰有喪儀勿笑人也歌音甚媚云精氣感𡨕昧所降若有縁嗟我遘良契寄忻宵夢間中曲云成公從儀起蘭香降張碩苟云㝠分結纒綿在今夕下曲云佇我風雲㑹正俟今夕遊神交雖未久中心已綢繆寝處向明升去顧謂曰且至御亭女便驚怖獵人至羣狗入屋於牀咬死成大狸搜神記曰呉王夫差小女名玉悦童子韓重韓重乃學於齊魯之間臨去屬其父求婚王怒不與女玉結氣亡𦵏閶門之外重三年歸聞其死哀慟至玉墓所玉忽見重與言乃左顧宛頸而歌曰南山有鳥北山張羅志欲從君䜛言恐多悲結生疾殁命黄壚命之不造寃如之何羽族之長名為鳳凰一日失雄三年感傷故見鄙姿逢君輝光身逺心近何嘗暫忘又曰太康末京洛始為折楊柳之歌有兵車辛苦之辭後楊駿被誅太后幽死折楊之應也續搜神記曰廬江杜謙為諸暨令縣西山下有一鬼長三丈着赭衣袴布褶在草中拍張又脱褶擲草上作懊惱歌百姓皆看之古樂志曰齊歌曰謳呉歌曰歈楚歌曰艶滛歌曰哇歌有清歌髙歌安歌緩歌長歌浩歌雅歌酣歌怨歌勞歌韓詩曰飢者歌食勞者歌事振旅而歌曰凱歌堂上奏樂而歌曰登歌亦曰升歌古之善歌者有咸里帝唐時善歌者見吕氏春秋秦青響遏行雲聲振林木薛談秦青弟子韓娥齊人餘音遶梁三日已上三人見列子王豹處於淇而河西善謳綿駒處髙堂而齊右善歌瓠梁見淮南子魯人虞公見劉向别録李延年見漢書古歌曲有陽陵白露朝日魚麗白水白雲江南陽春淮南駕辨緑水陽阿採菱下里巴陵並見襄陽耆舊傳及梁元帝纂要八闋葛天氏之歌而見吕氏春秋也唐歌帝嚳之歌南風卿雲並虞舜歌漢歌曲有大風髙祖所作芝房白麟朱鴈交門天馬房中已上並武帝歌見漢書也盛唐縱陽武帝歌見漢人内傳古樂府有歌行艶歌行長歌行短歌行魏武帝作朝歌行怨歌行前緩聲歌行後緩聲歌行櫂歌行鞠歌行放歌行蔡歌行陳歌行又古今樂録晉宋已後歌曲有淫豫歌楊叛兒歌南齊有楊賢母為師入官童謡呼為楊婆兒婆轉為反扶風歌晉列琨作百年歌晉王道中陸機並作白日歌宋沈攸之所作亦曰落日歌其歌曰白日落西山九曲歌宋何承天作採葛婦歌越人作桃葉歌晉王獻之所作碧玉歌晉孫綽作同聲歌漢張衡作四時歌出於子夜子夜歌古有女名子夜造此歌子聲歌亦名捉柱哀悲之古曲白紵歌起於呉孫皓時作襄陽白銅鞮歌前溪歌晉車騎将軍沈元所作歡聞歌晉穆帝初歌畢輒呼歡聞因以為名團扇歌晉書曰中令王珉與嫂婢芳姿有私愛甚篤苦捶撻之婢素善歌而珉之好提白團扇因見珉之歌曰白團扇顦顇非昔容羞與郎相見願得隨郎手因風從方便後人因歌之丁督䕶歌彭城内史徐逵之為魯軌所殺府内督䕶丁旿收殯殮之逵之妻晋公主呼問事每問輒歎息曰丁督䕶其聲哀切後人因為曲焉懊惱歌崇安初人間訛謡之曲又云石崇為緑珠作古有絲布澁難縫一曲而已宋太祖謂之中朝曲也太平御覽卷五百七十三
