body:
  text: 太平御覽卷七百六十一宋李昉等撰器物部六觥觚巵􅓢􅊦斚鍾瓉罇滑稽榼壺洗觥三禮圖曰觥受七升以兕角為之詩曰我姑酌彼兕觥維以不永傷又曰躋彼公堂稱彼兕觥萬壽無疆又曰兕觥其觩㫖酒思柔彼交匪敖萬福来求左傳曰晉趙孟叔孫豹曹大夫入于鄭鄭伯兼享之趙孟賦棠棣穆叔子皮及曹大夫興拜舉兕爵曰小國頼子知免於戾矣兕爵所以罸不敬言小國蒙趙孟德自知此罰戮觚三禮圖曰觚受三升兊音銳下方足漆赤中青雲飾小其尾周禮曰梓人為飲酒器觚三升獻以爵而酬以觚論語曰子曰觚不觚觚哉觚哉周地圖記曰秦使䝉恬北築長城又於原上築城以觚尊酒而祭鶉飛止觚上因名鶉觚縣劉伶酒德頌曰止則操巵執觥巵說文曰巵圓器也觛小巵也禮曰父母舅姑之敦音堆牟巵匜非餕莫敢用史記曰髙祖奉玉巵起為太上皇壽也漢書曰沛公與項羽㑹鴻門樊噲居营外聞事危急乃持楯直入帳下羽問為誰張良曰沛公驂乗羽曰壯士哉賜巵酒彘肩噲飲酒㧞劒切肉食之羽曰復能飲乎曰死且不避巵酒安足辭韓子曰棠谿空見韓昭侯曰今有白玉巵而無當有瓦巵而有當君渴將何以飲君曰以瓦巵棠谿空曰玉巵至貴君不以飲者以其無當耶君曰然空曰為人君漏泄羣臣之語猶玉巵無當也空每見而出昭侯必獨卧惟恐夢言泄於妻妾戰國䇿曰昭陽為楚伐魏覆軍殺將得入城移師而攻齊陳軫為齊王使見昭陽冄拜賀戰勝起而言曰臣竊譬之楚有祠者賜其舎人酒一巵舎人相謂曰數人飲不足一人飲有餘請畫地為虵虵先成者飲酒一人虵先成引酒且飲之乃左手持巵右手畫虵曰吾能為之足足未成一人蛇成奪其巵曰虵固無足子安能為之足遂飲酒今子伐齊為虵畫足也淮南子曰霤水足以溢壺榼而江河不能實漏巵鹽鐡論曰川源不能實漏巵魏文帝荅楊修書曰重惠琉璃巵昭厚意晉𫝊咸汙巵賦曰人有遺余琉璃巵者小兒竊弄墮之不潔意旣惜之又感寶物之汙辱乃喪其所以為寶况君子行身而可以有玷乎􅓢音移說文曰􅓢似􅅅魁柄中有道可以注水纂文曰􅓢水器也儀禮曰嫡入室媵御奉􅓢沃盥左𫝊曰晉公子過秦秦伯納女五人懷嬴與焉奉􅓢沃盥而揮之國語曰勾踐命諸稽郢行成於呉曰勾踐願請盟一介適女執箕箒以賅備也音該姓於王宫一介適男奉盤匜以隨諸御醆斝醆與盞同說文曰斝玉爵也或說斝受十六升詩曰或献或酢洗爵奠斝禮曰醆斝及尸君非禮也是謂僣君醆斝先王之爵又曰季夏六月魯以禘禮祀周公爵用玉琖仍雕左傳曰齊侯伐燕燕人賂以瑶甕玉櫝斝耳不克而還又曰鄭火禆竈言於子産曰若我用瓘斝玊鑚鄭必不火子産不許曰天道逺人道邇非所及也竈焉知天道鍾孔叢子曰平原君强子髙酒曰昔有遺諺堯舜千鍾孔子百觚子路嗑嗑日飲百榼君何辭焉子髙曰以予所聞賢聖以道德兼人未聞以飲食也沈約宋書曰蕭思話常從太祖登鍾山道着盤石清泉上使於石上彈琴因賜以銀鍾酒曰相賞有松石間意凉州記曰胡安據等發張駿冢得瑪瑙鍾論衡曰文王飲千鍾孔子百􅒀若酒用千鍾則冝用百牛酒用百􅒀則冝用千羊則文王身如防風孔子體如長狄乃能堪之瓉三禮圖曰圭瓉受四升徑八寸形如盤其柄以圭有流前注書曰平王錫晉文侯秬鬯圭瓉詩曰釐爾圭瓉秬鬯一卣又曰瑟彼玉瓉黄流在中周禮曰祼圭有瓉又曰祼圭尺有二寸有圭以祀宗廟也禮曰賜珪瓉然後祭又曰祀周公於太廟灌用玉瓚大圭瓚形如盤容五升以圭為柄是謂圭瓚白虎通曰圭瓉器之名所以受灌之器以圭瓉飾其柄樽彛說文曰樽酒器也罍龜目酒尊也木刻為雲象其施不窮爾雅曰彛卣罍器也皆酒樽彛異名也卣中尊也書曰用賚爾秬鬯一卣詩曰我姑酌彼金罍惟以不永懷易曰樽酒簋二用缶納約自牖終無咎周禮曰司尊彛掌六尊六彛之位春祠夏禴祼用鷄彛鳥彛皆有舟其朝踐用兩獻尊其冄獻用兩象尊皆有罍秋嘗冬蒸祼用斚彛黄彛皆有舟其朝獻用兩著尊其饋獻用兩壺尊皆有罍彛亦尊也彛法也言則法之正也鷄彛為彛謂刻而畵之蓋鷄鳳之形也皆有舟鄭司農云舟尊下臺也若今時承盤也獻讀曰犧犧尊飾以翡翠象尊以象鳳凰或曰以象骨飾尊也斚讀為嫁彛􅀞禾榢也黄彛黄目尊也著尊者著地旡足壺尊以壺為尊禮曰五献之尊門外缶門内壺君樽瓦甒音武此以小為貴也犧樽䟽布羃禪勺此以素為貴也又曰夫禮之初始諸飲食其燔黍捭豚汙尊而杯飲又曰黄目鬰氣之上尊也黄者中目者氣之清明者也言酌於中而清明於外也又曰魯季夏六月以禘禮祀周公於太廟尊用犧象山罍欝尊用黄目又曰泰有虞氏之尊也山罍夏后氏之尊也著殷之尊也犧象周之尊也傳曰犧象不出門嘉樂不野合漢書曰梁孝王有罍尊上刻雲雷象也直千金戒後代善寶之任后聞而欲得之王襄大母李太后曰先王有命無得以樽予人他物雖百鉅萬猶自恣任后絶欲得之王襄直使人開府取樽賜任后天子下吏驗問公卿治奏以為不孝襄誅東觀漢記曰王覇擊賊作倡樂賊射营中覇前酒樽覇坐不動又曰章帝時羙陽得銅酒樽朱色青黄有古文後漢書曰章帝初元七年槐里岐山得銅罇一枚晉起居注曰穆帝升平二年尚書左丞相劉兖元㑹日彭城計佐虞興發白虎樽而羣觀輻凑中蘭臺令史張𤣥不禁免𤣥令史沈約宋書曰正旦元㑹設白虎樽於殿庭樽蓋上施白虎有能獻直言者則發此樽飲酒蓋杜舉之遺式也蓋為白虎疑是後人所加欲令猛如虎無所忌憚也晏子春秋曰晉欲攻齊使范昭觀焉景公觴之范昭曰請君幸樽酌晏子命撤樽革具范昭歸曰齊不可伐也吾欲慙其君晏子知之孔子聞之曰不越於樽爼之間折衝千里也莊子曰市上之人有善戴尊者酒尊也累千尊而行有與之更者行道未半而以其尊顛又曰百年之木破為犧尊青黄而文之其一斷在溝中比犧樽於溝之斷則羙惡有間矣其於失性一也桀跖與曽史行義有間矣然其失性均也又曰純朴不殘孰為犧樽白玉不毁孰為珪璋道德不廢安取仁義淮南子曰百圍之木斬而為犧樽龍蛇虎豹曲成文章又曰夫聖人之道猶中衢而設樽耶過者斟酌多少不同各得其所冝又曰夫奉一爵酒不知於色言其輕也挈一石樽則白汗交流言其重也又况羸天下之憂而任海内之事者乎重於樽亦逺矣風俗通曰坐不移樽俗說凡晏飲者移轉樽酒令人訟諍志林曰先代不識犧樽但云沙􅀞之飾以翠羽至魏明帝時魯郡於地中得齊大夫子尾送女器有犧樽作犧牛形自爾乃知其定形呉越春秋曰闔閭女自殺以銀樽送之鄴中記曰石虎正㑹殿前有白龍樽作金龍於東箱西向龍口金樽受五十斛凉州記曰胡安據等發張駿陵得白玉樽受三升戴延之西征記曰太極殿中有銅龍長三丈銅樽容三十斛正旦大㑹龍從土中受酒口吐之於樽中傅𤣥朝㑹賦曰跱􅃫虎之二樽清酤背以停淵蔡邕論銘曰漢獲齊侯寶樽於槐里也孫綽陽燧樽銘曰詳觀茲器妙巧竒絶酌焉則注受滿則側吐㵼適㑹未見其竭滑稽崔浩漢記音義曰滑稽酒器也轉注吐酒終日不已若今之燧樽史記曰呉王夫差取子胥尸盛以鴟夷革而浮之江中應劭曰馬革為鴟夷鴟夷榼形前漢揚雄酒賦曰鴟夷滑稽腹大如壺盡日盛酒人復藉酤常為國器託於属車榼說文曰榼酒器也椑圜榼也左傳曰晉欒鍼使行人執榼承飲造于子重謝承後漢書曰陳茂為豫州别駕與刺史周敞行部到頴川楊翟傳車有羙酒一椑敞勑載酒以行荗取椑撃破之曰使君傳車榼載酒非冝王隱晉書曰宣帝旣滅公孫淵還作榼兩口二種酒持着馬上先飲佳酒塞口而開毒酒與牛金士飲而死北齊書曰元韶字世胄魏室竒寶多入韶家有瑪瑙榼容三升皆稱西域鬼作凉州記曰胡安據等發張駿陵得琉璃榼孔叢子曰子路嗑嗑日飲百榼列異傳曰濟北神女来逰車上有壺榼青白琉璃五具續齊諧記曰王敬伯夜見一女命婢取酒提一渌沉漆榼曹毗杜蘭香傳曰蘭香降張實輙齎𤣥榼馬融奏事曰楚將呉起或遺之一榼酒注之上流使士卒迎流飲其下明不獨也劉伶酒德頌曰止則操巵執觚動則挈榼提壺壺三禮圖曰洗壺受一斛口徑一尺頭髙五寸大中身兊下赤漆中𤣥上加青雲氣方壺受一斛腹圜足口方圜壺受一斛腹方足口圜兊音銳詩曰顯父餞之清酒百壺周禮曰挈壺氏以令軍井壺所以盛飲故以壺表井中凡軍事懸壺以序聚􅈀懸壺以為備也􅈀音託禮曰其以乗壺酒賜人亦曰乗壺酒乗壺四壺尊壺者面其鼻鼻在面面言向人也左傳曰晉侯問原守於寺人勃鞮對曰昔趙衰以壺飱從經餒而弗食故處原漢書曰東方朔曰壺者所以盛也晏子春秋曰景公逰於紀得金壺發視之中有丹書韓子曰晉公子重耳過曹僖負羈盛黄金於壺充之以食令人遺公子也說苑曰五大夫衞人也負壺入井終日灌一區國語曰勾踐召范蠡而問焉曰諺有之曰觥飲不及壺飱言志在觥飲慮不至壺喻己德小不能逺圖今嵗晚矣子將奈何曰臣聞追亡人也蹶而趣之唯恐不及王曰諾遂伐呉神仙傳曰壺公賣藥常懸一壺於坐上日入之後公輙跳入壺中搜神記曰呉王夫差女恱童子韓重結氣死形見重將入塜取崑崙玉壺與之琴操曰伍員奔呉過溧陽瀨溪見一女擊漂於水中旁有壺漿乃就乞飲飲畢謂女子曰掩夫人壺口女子知其意自投瀨溪而死洗三禮圖曰洗髙三尺口徑尺五寸足徑三尺士鉄大夫以上銅為之諸侯白金飾天子黄金飾儀禮曰設洗于阼階東南禮曰其水在洗東祖天地之左海也魏武令曰臨祭就執洗以手擬水而不盥以㓗為敬未聞向不敬之禮親受水而盥太平御覽卷七百六十一
