  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_997-1a, image: WYG0901/WYG0901-0714a.png}
body:
  text: 太平御覽卷九百九十七宋李昉等撰百卉部四荼䓞蒿青蒿莪蒿蔞王芻蓍蓬蕭艾王瓜薇莎蒺藜荼爾雅曰荼苦菜苦菜可食毛詩谷風曰誰謂荼苦其甘如薺又唐風采苓曰采苦采苦首陽之下苦苦菜禮記月令曰孟夏之月苦菜秀蔡邕章句曰苦菜也不榮而實謂之秀廣雅曰遊冬苦菜也䓞來計反説文曰䓞草可以染留黄漢書曰諸侯王􅉦音䓞綬如淳曰􅉦綠出晉灼曰􅉦草名也出瑯琊平昌縣似艾可染黄因以為綬名蒿爾雅曰蘩皤蒿郭璞注白蒿也蒿菣也郭璞注曰今人採青蒿香中炙啗者為菣也愆刀切蔚牡菣無子者又曰蘩之醜秋為蒿醜類也春時各有種名至秋老成皆通呼為蒿大戴記曰周時徳澤和洽蒿茂大以為宫柱名為蒿宫此天子之路寢也陸機毛詩疏義曰蒿青蒿也爾雅疏陸機云凡艾色白為皤蒿今白蒿也春生秋乃香美可生食又可蒸一名游胡北海人謂之旁勃又曰匪莪伊蔚蔚牡蒿也似蒿三月始生七月花花似胡麻花而紫赤八月為角角似小豆角鋭而長一名馬新蒿毛詩鹿鳴曰呦呦鹿鳴食野之蒿毛云葭也青蒿詩䟽義曰蒿青蒿也荆豫汝隂皆謂之菣東觀漢記曰杜林寄隗囂地終不降志辱身至簮蒿蓆草不食其粟也隋書曰初唐高祖欲遣李宻東征朝士諫曰李宻性多輕狡好為反叛願勿遣之帝曰蒿箭射蒿蘺耳吾豈不知三輔决録曰孫晨字元公冬月無被以蒿一束暮臥旦収之神仙食經曰十一月採彭㪍彭㪍白蒿也兎食之夀八百嵗莪蒿爾雅曰莪蘿今莪蒿也亦曰廪蒿毛詩曰菁菁者莪樂育材也菁菁者莪在彼中阿又小雅蓼莪曰蓼蓼者莪匪莪伊蒿詩義䟽曰莪蒿也生澤田漸洳處葉似邪蒿細科三月中生莖葉可生食又可蒸香美頗似蔞蒿說文曰莪蒿也從草我聲廣志曰莪蒿廪蒿錢塘記曰靈隠山榖樹樹下生莪欝茂若沃土所生蔞毛詩周南漢廣曰言刈其蔞蔞蒿也陸機毛詩䟽義曰蔞葉似艾色白長數寸髙丈餘好生水邉脆美可食王芻爾雅曰菉王芻也菉蓐也今呼鴟脚莎吴氏本草曰王芻一名黄草神農雷公經生太山山谷治身熱邪氣小児身熱蓍洪範五行傳曰蓍之為言耆也百年一本生百莖此草木之夀知吉凶者也聖人以問鬼神焉說文曰蓍蒿屬也生千嵗三百莖易以為數天子蓍九尺諸候七尺大夫五尺士三尺史記傳曰天下和平王道得而蓍莖長文其叢生滿百莖今世取八十莖長八尺即難得矣六十莖長六尺即可用也淮南子曰上有叢蓍下有神龜論衡曰蓍生七十嵗生一莖七百嵗生十莖神靈之物故遲也蓬爾雅曰齧彫蓬薦黍蓬别蓬種類尚書大傳曰子夏於壤室編蓬戸彈琴瑟以歌先王之風可以發憤矣毛詩召南騶虞曰彼茁者蓬蓬萆名也又衞風伯兮曰自伯之東首如飛蓬禮記内則曰射人以桑弧蓬矢六射天地四方桑弧蓬矢本諸太古也天地四方男子所有事也禮記儒行篇曰蓬戸甕牖編蓬為户也魏畧曰鮑出值飢餓採蓬實得數斗為母作食三輔决録曰張仲蔚平陵人也與同郡魏景卿俱隠身不仕明天官愽物好屬詩賦所居蓬蒿没人管子曰無法程式飄揺而無所定謂之飛蓬之間明王聴此言曽子曰蓬生麻中不扶自直白沙在泥與之皆黒晏子曰魯哀公失國走齊景公問焉曰子之年甚少矣道至于此乎哀公對曰吾少之時人多愛我者吾體不能親人多諫我者吾忌不能從以内無弼外無輔弼輔無一人謟諛者甚衆譬之猶秋蓬也孤其根本宻其枝葉也說苑不載莊子曰列子食於道見百嵗髑髏攓蓬而指之曰唯予與汝知末曽死未曽生也商君書曰今夫飛蓬遇飄風而行千里者乘風之勢也淮南子曰見飛蓬轉而知為車楚辭曰蓬艾親入御干第兮弟床簀也喻親宻曹植詩曰轉􅅫離本根飄䬙隨長風何意廻颷舉吹我入雲中高高上無極天路安可窮類此流宕子捐軀逺從戎司馬彪詩曰百草應節生含氣有淺染秋蓬獨何華飄䬙隨風轉王朗諌行役夜表曰司空臣朗言朗聞飛蓬隨風集于王梁之衡而駟馬為之奔乳虎為之走蓬非馬之策馬非蓬之敵所以或奔走者驚也蕭爾雅曰蕭荻即蒿音荻毛詩黍離採葛曰彼採蕭兮一日不見如三秋兮詩義疏曰蕭荻蒿也或謂牛尾莖可作燭有香氣故祭祀脂爇之為香也許慎以為艾蒿非也禮王度記曰士蕭庶人艾艾蕭不同明矣毛詩小雅蓼蕭澤及四海也曰蓼彼蕭斯零露湑兮周禮天官上曰甸師祭祀供蕭茅說文曰蕭艾蒿也莊子曰河上有家貧窮緯蕭為箔司馬彪曰蕭蒿也緯織也蒿為箔山海經曰嚢山之隂多蕭郭璞詩曰得意在蘭蓀忘懐寄蕭艾艾爾雅曰艾氷臺今艾蒿也毛詩曰黍離採葛曰彼採艾兮一日不見如三嵗兮齊書曰紀僧真為髙帝冠軍府參軍主簿僧真夢蒿艾生滿江驚而白之髙帝曰詩人採蕭蕭即艾也蕭生斷流卿勿廣言陳書曰陳暄素通脫以俳優自居慠弄轉甚後主稍不能容後遂搏艾為㡌加于其首以火􅋹之燃及於髪垂涕求哀聲聞於外而弗之釋莊子曰越王子捜逃乎丹穴越國無君求王子搜不得從之丹穴不肯出越人薰之以艾孟子曰七年之病求三年之艾博物志曰削氷令正圓舉以向日以艾於後承其影得火師曠占曰嵗疫病草先生病草者艾也崔實四民月令曰三月可菜艾王𤓰周書曰立夏之日螻蟈鳴又五日丘蚓出又五日王𤓰生禮記月令曰孟夏之月王瓜生春秋運斗樞曰機星散為菝葜薇爾雅曰薇垂水註生於水邊毛詩召南草蟲曰陟彼南山言採其薇又小雅采薇遣戍役也采薇采薇薇亦柔止史記曰伯夷叔齊義不食周粟隠首陽山採薇而食之廣志曰薇葉似䓅可蒸食三秦記曰伯夷食薇三年顔色不異武王戒之不食而死莎爾雅曰薃胡老切侯莎其實媞廣雅曰地毛莎䔺也廣志曰莎可以為雨衣毛詩題綱曰南山有䑓臺一名夫湏莎草也言山生䑓及莎以自䕃喻人君得賢以自尊也後周書曰豆盧寕嘗與梁人企定遇于平凉川相與肄射乃于百歩懸莎草以射之七發五中企定時以為能贈遺甚厚任昉述異記曰昔戰國時魏國苦秦之難有民從征戍秦不返其妻思之而卒既葬塜上生木枝葉皆向夫所在而傾因謂之相思木今秦趙間有相思草狀若石竹而節節相續一名斷膓草又名愁婦草亦名孀草人呼為寡婦莎盖相思之流也蒺蔾爾雅曰茨蒺蔾也布地葛生細葉子有三角刺人易困卦曰困于石據于蒺藜入于其宫不見其妻凶毛詩牆有茨衞人刺其上也曰牆有茨不可掃也晉中興書徴祥説曰義熈中宫城上及御道左右皆生蒺藜亦草妖也說苑曰晉平公置酒虒祁之臺使郎中馬章布蒺藜於階上令召師曠師曠至履而上堂仰天歎曰夫肉生蟲還自食木生蠧還自刻人興妖還自賊五鼎之具不當生藜藿人主堂不當生蒺藜來月八日修百官立太子君將死矣至期果死又曰陽虎得罪于衛北見簡子曰自今以來不復樹人矣簡子曰何哉陽虎對曰夫堂上之人吾所樹者過半朝廷之吏邉境之士臣所立者亦過半矣今夫堂上之人親却臣於君朝廷之吏親危臣於法邉境之士親刼臣於外簡子曰唯賢者為能報恩不肖者不能夫樹桃李者夏得其休息秋得其食馬樹蒺藜者夏不得休息秋得其刺焉今子之所樹者蒺藜也非桃李也自今以來擇人而樹毋己樹而擇也續搜神記曰沛國一士人姓周生三兒向應可語便啞有一人逕門過乞飲曰君有罪可還内自思我於外待君主人異其言乃知非常人便入内思諐􅄽同出謂客曰昔為小兒時鷰巢中有三子試以指内巢中鷰子亦出口承之乃取三蒺藜與其子其子吞之即死其母尋還不復見其子出徘徊悲鳴而去有此事今甚悔之客曰是矣便聞其兒言語周正客乃去不知所在也本草經曰蒺藜一名行止一名升推一名旁通一名休羽離騷曰江蘺棄於窮巷兮蒺藜蔓乎東廂太平御覧卷九百九十七
