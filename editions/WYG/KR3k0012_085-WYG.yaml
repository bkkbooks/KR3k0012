  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_085-1a, image: WYG0893/WYG0893-0679a.png}
body:
  text: 太平御覽卷八十五宋李昉等撰皇王部十周康王昭王穆王恭王懿王孝王夷王厲王宣王幽王平王桓王莊王僖王惠王襄王頃王匡王定王簡王靈王景王悼王敬王元王貞定王哀王思王考王威烈王安王烈王顯王慎靚王赧王周康王紀年曰成康之際天下安寧刑措四十餘年不用帝王世紀曰康王元年釋喪冕作誥申諸侯命畢公作䇿分民之居里于成周之郊王在位二十六年崩子瑕代立是謂昭王述異記曰廬山有康王谷巔有一城號為釗城天毎欲雨輙聞山上鼓角笳簫之聲聲漸至城而風雨晦合村人以為常候傳云此周康王之城康王愛竒好異巡厯名山無逺不至城中每得古噐大鼎及弓弩金之屬知非常人之所處也而山有康王之號城又以釗為稱斯言將有徵昭王左傳僖公四年齊侯伐楚楚子使與師言管仲對曰爾貢包茅不入王祭不共無以縮酒寡人是徴昭王南征不復寡人是問對曰貢之不入寡君之罪也敢不共給昭王之不復君其問諸水濵昭王時漢水非楚境故不受罪也帝王世紀曰昭王在位五十一年以徳衰南征及濟于漢船人惡之乃膠船進王王御船至中流膠液解王及祭公俱沒水而崩其佐辛游靡長臂且多力拯得王周人諱之王室於是乎大微王娶於房曰房后生太子滿代立是謂穆王漢上記曰咋額至橫桑三十里桑字本作喪辛游靡取昭王喪處吕氏春秋曰周昭王親征荆髙誘注曰秦莊王名楚故曰荆還及渉漢梁敗王隕於漢中隕尤粉切傾墜也辛游靡拯王北濟穆王歸藏曰昔穆王天子筮西征卜吉日龍降於天而道里脩逺飛而冲天蒼其羽傳曰穆王有塗山之㑹周穆王㑹諸侯於塗山又曰昔穆王欲肆其心周行天下將必皆有車轍馬跡焉祭父作祁招之詩以止王心王是以獲殁於祗宫史記曰穆王即位春秋已五十矣王道衰微王將征犬戎祭公謀父諌曰不可王遂征之得四白狼四白鹿以歸自是荒服者不至諸侯有不睦者甫侯言於王作修刑辟命曰甫刑穆王立五十五年年一百五歲而崩子恭王繄扈穆天子傳曰天子北征乃絶漳水於是即井鈃山之下癸未雨雪天子獵于鈃山之西河乃至于崑崙之丘以觀脊山之寶乃披圖視典用觀天子之寶噐省河所出禮圖玉果石似美玉所謂如果者也璿珠璿玉類也今音璇燭銀有精光如燭也黃金之膏金膏亦猶玉膏皆其精液宿於崑崙之阿赤水之陽崑崙山有赤水東北流見山海經也升于崑崙之丘以觀黃帝之宫黃帝巡視四海登崑崙山而起宫室其上見新語也天子北征舍乎珠澤此澤出珠乃因名之穆王北征舍于此也北昇于脊山之上以望四野曰脊山是惟天下之髙山者也癸丑天子乃遂西征吉日甲子天子賔于西王母西王母如人虎齒蓬髮戴勝善嘯紀年曰穆王十七年西征于崑崙之丘見西王母其年辛丑乃賔于招宫乃執白珪𤣥璧以見西王母執贄者致敬也獻錦組百純乙丑天子觴西王母于瑶池之上西王母為天子謡謡徒歌也曰白雲在天丘陵自出道里悠逺山川間之子將無死將請尚能復來尚庶幾也己酉天子飲于溽水之上六師之人畢至于曠原乃奏廣樂六師之人翔畋于􅀈原翔猶遊也得獲無疆無疆猶無限也鳥獸絶羣言取盡也帝王世紀曰穆王修徳教會諸侯於塗山命吕侯為相或謂之甫侯五十一年王一百歲老耄以吕侯有賢能之徳於是乃命吕侯作吕刑之書五十五年王年百五歲崩于祗宫楊子法言曰周穆王少不好學至乎耄長抱朴子曰周穆王南征一軍盡化君子為猿為鶴小人為蟲為沙共王帝王世紀曰共王能庇昭穆之闕故春秋稱之周自共王至夷王四世年紀不明是以厯依魯為正王在位二十年崩子囏代立懿王史記曰懿王之時王室遂衰詩人作刺懿王在位二十五年崩共王弟辟方立為孝王帝王世紀曰懿王二年徙都犬丘孝王史記曰孝王在位十五年崩諸侯復立懿王太子燮是為夷王夷王禮曰禮天子不下堂而見諸侯下堂而見諸侯天子之失禮也由夷王已下史記曰夷王崩子厲王胡立紀年曰夷王二年蜀人吕人來獻瓊賔于河用介珪三年王致諸侯烹齊哀公于鼎帝王世紀曰夷王即位諸侯來朝王降與抗禮諸侯徳之三年王有惡疾愆于厥身諸侯莫不並走羣望以祈王身十六年王崩厲王史記曰厲王即位三十年好利近榮夷公大夫芮良諌王不聽卒以榮為卿士用事王行暴虐侈傲國人謗王召公諫曰民不堪命王怒得衛巫使監謗以告則殺之諸侯不朝三十四年王益嚴國人莫敢言道路以目三年相與叛襲厲王出奔于彘太子靜匿召公之家國人聞乃圍之召公以其子代太子竟得脱召公周公二人相共行政號曰共和共和十四年厲王死于彘太子静長於召公家二相乃共立之是為宣王帝王世紀曰厲王荒耽于酒淫婦人宣王史記曰宣王即位二相輔之修政法文武成康之遺風諸侯復宗周十二年魯武公來朝宣王不修籍於千畝虢文公諌曰不可王弗聽三十九年戰于千畝王師敗績于姜戎王在位四十六年崩子幽王宫湼立帝王世紀曰宣王元年以召穆公為相秦仲為大夫誅西戎是時天大旱王以不雨遇灾而懼整身修行欲以消去之祈于羣神六月乃得雨大夫仍叔美而歌之今雲漢之詩是也是歲西戎殺秦仲王於是進用賢良樊侯仲甫尹吉甫程伯休父虢文公申伯韓侯顯父南仲方叔仍叔召穆公張仲之屬並為卿佐自厲王失政玁狁荆蠻交侵中國官政墮廢百姓離散王乃修復宫室興賢人納規諌安集兆民命南宫仲召虎方叔吉甫並正四方復先王境土繕車徒興畋狩禮天下喜王化復行號稱中興墨子曰周宣王殺杜伯不辜杜伯曰死若有知三年必使君知之宣王田於圃田從人滿野日中杜伯乘白馬素車朱衣朱冠手執朱弓挾朱天射王而中其心折脊伏弦而死從者莫不見聞幽王國語曰幽王之二年西周三川皆震伯陽父曰周將亡矣夫天地之氣不失其序若過其序民亂之也陽伏而不能出隂迫而不能蒸於是有地震今三川實震陽失其所而填於隂也史記曰幽王愛褒姒生子伯服竟廢申后及太子以褒姒為后以其子伯服為太子褒姒為人不好笑悦之萬方故不笑幽王為烽燧大鼓冦至則舉烽火於是諸侯悉至至而無冦褒姒乃大笑幽王恱之為數舉烽火其後諸侯並不至幽王以虢石父為卿用事國人皆怨之石父為人佞巧善䛕好利王用之幽王又廢申后去太子也申侯怒乃與西夷犬戎共攻幽王王舉烽火徵兵兵莫至遂殺幽王驪山之下虜褒姒盡取周之賂而去於是諸侯乃即申侯而共立故太子宜臼是為平王以奉周祀平王乃東遷洛邑避戎冦也幽王在位一十一年紀年曰幽王立褒姒之子伯服以為太子瑣録曰宣王元后不恒朞月生子后弗敢舉天子召問羣臣及元史史臣荅曰若男子也身體有不全諸骨節有不備立為天子也將必喪邦天子曰若而不利余一人命棄之仲山父曰天子年長也而未有子或者天將以是棄周雖棄之何益天子弗棄之平王史記曰平王之時王室微弱而諸侯以強倂弱齊楚秦晉始大政由方伯五十一年平王崩太子泄父早死立其子林是為桓王桓王平王之孫也帝王世紀曰平王元年鄭武公為司徒與晉文侯股肱周室夾輔平王率諸侯戮力一心東遷洛邑桓王史記曰桓王在位二十三年崩子莊王佗立帝王世紀曰桓王既失於信禮義陵遲男子淫奔䜛偽並作諸侯背叛搆怨連禍九族不親故詩人刺之莊王史記曰莊王四年周公黒肩欲殺莊王而立王子克辛伯告王王殺周公王子克奔燕十五年莊王崩子僖王胡齊立僖王史記曰僖王三年齊桓公始伯五年僖王崩子惠王閬立帝王世紀曰僖王自即位以來變文武之制作元黃華麗之飾宫室峻而奢侈故孔子譏焉五年王崩子凉洪代立惠王左傳有神降於莘惠王問内史過曰是何故也對曰國之將興明神降之監其徳也將亡又降之觀其惡也故有得神以興亦有以亡虞夏商周皆有之史記曰初莊王嬖姬姚生子頽頽有寵及惠王即位奪其大臣園圃之田以為囿故大夫邊伯等五人作亂謀召燕衛之師伐惠王惠王奔温居鄭之櫟立僖王弟子頽為王遂享諸大夫樂及徧舞鄭虢君怒四年鄭與虢君伐殺子頽復入惠王惠王二十五年崩子襄王鄭立襄王史記曰襄王母早死後母曰惠后后生叔帶有寵襄王畏之三年叔帶與戎翟謀伐襄王襄王欲誅叔帶叔帶奔齊齊桓公使管仲平戎于周十五年王以翟師伐鄭王德翟人將以其女為后富辰諌不聽十六年王絀翟后翟人來誅殺譚伯富辰以其屬死之初惠后欲立王子帶故以其黨開翟翟人遂入周襄王出奔于鄭鄭居王于鄭帶立為王取襄王所絀翟后與居温十七年襄王乃告急於晉晉文納王而誅叔帶襄王於是賜晉文公秬鬯弓矢為伯以河内地與晉二十年晉文公乃召襄王襄王會之河陽書曰天王狩于河陽三十二年襄王崩子頃王壬臣立頃王史記曰頃王六年崩子匡王班立匡王史記曰匡王六年崩弟瑜代立是為定王定王史記曰定王元年楚伐陸渾之戎次於洛使人問九鼎之輕重王使王孫滿應設以辭楚兵乃去二十一年定王崩子簡王夷代立簡王史記曰簡王十三年晉殺其君厲公迎子周於周立之為悼公十四年簡王崩子靈王泄心立靈王傳曰王子朝使告白諸侯曰定王六年秦人降妖曰周其有頿王亦克能修其職至于靈王生而有頿王甚神聖無惡於諸侯國語曰靈王二十二年榖雒鬭將毁王宫賈逵注曰榖雒二水似鬬洛在王城南榖在城北王欲壅之太子晉諌曰不可晉聞古之長民者不墮山不崇藪不竇澤竇决也夫山土之聚也藪物之歸也川氣之導也澤水之鍾也天地成聚於髙歸物於下疏為川谷以導其氣陂塘汚庳以鍾其美聚合萬物之美也伯禹封崇九山决泊九川陂障九澤豐殖九原故天無伏隂地無散陽觀之詩書與民之憲言則皆亡主之為也王其圖之王卒壅之亂於是始史記曰靈王在位二十七年崩子景王貴立景王左傳天王將鑄無射周景王也無射鐘名伶州鳩曰王其以心疾死乎夫樂天子之職也夫音樂之輿也樂曰音而行而鐘音之噐也音由噐以發天子省風以作樂省風俗作樂以移之噐以鍾之鍾聚也輿以行之樂須音而行小者不窕窕細也他彫切大者不槬槬横大不入也音畫則和於物物和則嘉成喜樂成也故和聲入於耳而藏於心心億則樂億安也窕則不咸不充滿人心槬則不容心不堪容心是以感感實生疾今鐘槬矣王心弗堪其能久乎史記曰景王太子聖而早卒王愛子朝欲立之㑹崩子丐之黨與爭立國人立長子猛為王子朝攻殺猛猛為悼王晉人攻子朝而立丐是為敬王帝王世紀曰景王遇心疾崩于榮錡氏單穆公與劉文公立太子猛是為悼王景王在位二十五年悼王帝王世紀曰悼王以景王二十五年四月始即位十一月崩王立凡二百日故春秋稱王子猛卒不成喪故不言天王崩也立王母弟丐是為敬王敬王史記曰晉定公遂入敬王于周四十四年敬王崩子元王仁立元王史記曰元王八年崩子貞定王介立貞定王史記曰貞定王十六年三晉滅智伯分其地二十八年崩子去疾立是為哀王皇甫謐曰真定哀王帝王世紀曰哀王即位三月弟叔襲殺王而立是為思王思王帝王世紀曰思王即位五月弟嵬攻殺王而自立是為考王考王史記曰考王十五年崩子威烈王午立威烈王帝王世紀曰威烈王在位二十四年崩子驕立是為安王安王史記曰安王二十六年而崩子烈王喜代立帝王世紀曰安王子喜立是為烈王烈王史記曰烈王十年崩弟扁立是為顯王顯王史記曰顯王三十五年致文武胙於秦惠王四十四年秦惠王稱王其後諸侯皆為王四十八年顯王崩子慎靚王定立帝王世紀曰顯王元年趙成侯韓哀侯來攻周二年西周威公之嗣曰惠公始封惠公少子班於鞏以奉王號東周惠公周於是始分為東西王室微弱政在西周慎靚王帝王世紀曰慎靚王六年崩子延代立是為赧王赧王史記曰東周西周分治赧王徙都西周五十九年秦攻西周王奔秦頓首受罪盡獻其邑三十六口三十萬秦受其獻而歸其君於周周王赧卒東周遂以亡秦取九鼎寶噐而遷西周公於􅓆音憚狐後七歲秦莊襄王滅東西周皆入於秦周遂不祀漢書曰幽平之後日以陵夷至乎﨑嶇河洛之間分為二周然天下謂之共主雖後微弱猶共以為主強大弗之敢傾厯載八百餘年數極德盡暨於赧王降為庶人號位已絶於天下尚枝葉相持莫得居其虛位四海亡主三十餘年帝王世紀曰赧王二十七年冬十月秦昭襄王乃僣號西帝齊閔王稱東帝十一月齊秦復去帝號為王四十五年王如秦得罪於秦秦攻周或說秦王乃止王號雖居天下之位為諸侯之所侵逼與家人無異多貰於民無以歸之乃上臺以避之故周人因名其臺曰逃債之臺洛陽南宫謻臺謻音夷又音尸移切是也五十九年秦攻韓魏趙大破之王懼乃背秦與諸侯合從將天下銳師出伊闕攻秦秦昭襄王大怒使將軍樛攻周王王恐乃入秦頓首受罪盡獻其邑秦盡納其獻使赧王歸于周降為庶人以夀終王逸正部曰幽厲禮樂崩壊諸侯力攻轉相吞滅德不能懐威不能制至於王赧遂喪王計太平御覽卷八十五
