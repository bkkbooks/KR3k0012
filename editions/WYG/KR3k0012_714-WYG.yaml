  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_714-1a, image: WYG0899/WYG0899-0340a.png}
body:
  text: 太平御覽卷七百十四宋李昉等撰服用部十六梳箆刷鑷觽剔齒纎梳篦説文曰櫛梳枇名也釋名曰梳言其齒疏也禮記曲禮上曰男女不同巾櫛又玉藻曰櫛用椑櫛髪晞用象櫛左𫝊僖公中曰晉太子圉為質於秦将逃歸謂嬴氏曰與子歸乎對曰寡君之使婢子侍執巾櫛以固子也從子而歸棄君命也不敢從亦不敢言漢書曰孝文帝遺匈奴襦袍梳篦各一也續漢書曰季文徳素善延篤謂公卿曰延篤有王佐之才欲引進之篤聞為書止文徳曰吾嘗昧爽櫛梳坐於客堂朝則誦虞夏之書厯公旦之典禮覽仲尼之春秋當此之時不知天之為盖地之為輿慎勿迷其本棄其生也魏志曰徐季龍取十三種物著大篋中使管輅占之輅先説雞子從道蠶蛹遂一一名之唯以梳為枇耳脩復山陵故事曰梓宫用象牙五枚后梓宫用象牙梳六枚瑇瑁梳六枚東宫舊事曰太子納妃有瑇瑁梳三枚盛𢎞之荆州記曰臨賀興安縣東邊有平石其上有櫛履各一具俗云越王渡溪脱履墜櫛於此崔寔政論曰無賞罰而欲世之治是猶不畜梳枇而欲髪之治也物理論曰威行法明漏吞舟之魚法不明則類於細櫛細櫛則苛慝生也夢書曰夢梳枇為憂解也虱盡去百病愈也傅咸櫛賦叙曰大才治世猶櫛之理髪也徐岑詩曰思見君巾櫛以弭我勞慙蔡邕女誡曰用櫛則思其心之理高文惠與婦書曰今致瑇瑁梳一枚陸雲與兄機書曰按行視曹公器物梳枇者皆然四愁詩曰美人遺我旃檀梳晉𫝊咸櫛賦曰我嘉茲櫛惡亂好理一髪不順實以為恥雖日用而匪懈不吿勞而自己苟以理而委任斯竭力以没齒刷説文曰荔草似蒲而小根可作刷通俗文曰所以理髪謂之刷釋名曰刷帥也帥髪長短皆令上從也東宫舊事曰太子納妃有漆畫豬氂刷大小三枚嵇康養生論曰勁刷理髪僅乃得之陸雲與兄機書曰按行視曹公器物刷處尚識鑷釋名曰鑷攝也攝髪也通俗文曰攝减髪鬚謂之鑷説文作籋曰籋箝也洞林曰卷縣令施安置鑷令郭璞射之璞曰􅁂髪餙物是有兩岐沈約宋書曰彭城王義康餉沈熈光銅鑷脩復山陵故事梓宫中用鉄鏤鑷五枚臨海水土記曰鑷魚長七寸頭如鑷齊書曰高祖令左右拔白髪隆王昌高祖之孫年五嵗戱於牀前帝曰兒言我是誰答曰太翁也帝曰豈有為人曽祖拔白髪乎即擲去鑷觿説文曰觿角鋭端可以解結毛詩淇澳曰芄蘭之支童子佩觿禮記内則曰子事父母左佩小觿金遂右佩大觿木遂剔齒纎陸雲與兄機書曰一日行曹公器物有剔齒纎今以一枚寄兄太平御覽卷七百十四
