  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_575-1a, image: WYG0898/WYG0898-0282a.png}
body:
  text: 太平御覽卷五百七十五宋李昉等撰樂部十三鐘錞于鐘釋名曰鐘空也空内受氣多故聲大説文曰鐘秋分之音物中成也易通卦驗曰人主冬至日縱八能之士擊黄鐘之宫則人主敬善公卿大夫誠信禮記曰知悼子卒未𦵏平公飲酒師曠李調侍鼓鐘杜蕢自外來聞鐘聲曰安在曰在寢杜蕢入寢厯階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐飲之又樂記曰鐘聲鏗鏗以立號號以立横横以立武君子聴鐘聲則思武臣周禮冬官鳬氏曰鳬氏為鐘薄厚之所震動清濁之所由出侈弇之所由興有説鐘已厚則石太厚則聲不發已薄則播太薄則聲散侈則柞柞讀為咋咋然之咋聲太外也弇則鬱聲不舒揚長甬則震鐘掉則聲不正鐘大而短則其聲疾而短聞淺則躁躁易竭也鐘小而長則其聲舒而遠聞深則安安難息又曰鳬氏為鐘兩欒謂之銑又曰磬師掌教擊編鐘又春官曰鐘掌教金奏擊金以為奏金謂鐘鑄也左傳襄二曰莒人伐我東鄙圍台季武子救台遂入鄆取其鐘以為公盤又襄六曰呉公子札自衛如晉将宿於戚戚孫文子之邑聞鐘聲曰異哉吾聞之辨而不徳必加於戮夫子獲罪於其君以在此也懼猶不足而又何樂夫子之在此也猶燕之巢於幕上也君又在殯而可以樂乎獻公卒未𦵏也文子聞之終身不聴琴瑟又曰鄭伯有嗜酒為窟室而夜飲酒擊鐘焉朝至而未己也又曰秦人賂晉侯歌鐘二肆注曰肆列也懸鐘十六為一肆二肆三十二板又昭五曰天王将鑄無射周景王無射鐘名律中無射伶州鳩曰夫樂天子之職也夫音樂之輿也而鐘音之器也天子省風以作樂器以鐘之鐘聚也以器聚音輿以行之小者不窕大者不槬窕則不咸不充滿人心也槬則不容心不堪容心是以感感實生疾今鐘槬矣王心不堪其能久乎又曰宋左師每飯擊鐘又曰鄭伯始朝于楚楚子賜之金既而悔與之盟曰無以鑄兵故以鑄三鐘爾雅大鐘曰鏞其中謂之剽音瓢其小者謂之棧音醆郭璞曰鏞一曰鏄國語曰晉克潞之後秦杜回敗晉攻魏顆以身却退秦於輔氏親止杜回其勲銘之景鐘又曰周景王二十三年鑄無射而為之大林鐘成伶人告和王謂伶州鳩曰鐘果和矣對曰上作器民樂之則為和今民莫不怨恨諺曰衆心成城衆口鑠金臣不知其和賈逵曰大林無射副也漢書曰髙祖廟有十鐘受千石撞之聲聞百里後漢書鄭司農曰于鐘脣之上祛也鼓所以擊處也舞縣謂之旋旋蠱謂之幹旋屬鐘柄所以懸之魏志曰初漢銅鐘王柴巧意多所造作杜䕫令工鑄鐘其聲濁清不多故毁改作王甚厭之白太祖太祖所取鑄鐘雜錯更試然後知䕫為精而王之妄也晉書裴頠令荀藩終父朂之任鑄鐘鑿磬以備郊廟宋書曰漢中城固縣漢水崖際有聲如雷俄頃崕崩有銅鐘十二趙書曰将軍張珎領郡縣民丁萬人徙洛陽六鐘鐘簴九龍翁仲銅駞飛亷鐘一没盟津中蕭子顯齊書曰張環字祖逸呉郡呉人父永右光禄大夫曉音律宋孝武問永以為太極殿前鐘聲嘶永答曰鐘有突處鑿而去之聲遂清越十六國春秋曰石勒耕輒聞鐘鐸音或在前後懼以問翼伽伽曰作勞耳鳴無不祥也勒至平原常在平人師驩家為奴有老父謂勒曰君龍魚成際四道已成富貴為人主甲戌之嵗王彭祖可圖勒曰若如公言不敢忘徳忽然不見每耕又聞鼔角之聲勒又以告諸奴又聞之曰吾初在家恒聞如是韓子曰叔孫相魯有子曰孟丙竪牛妬之叔孫為丙鑄鐘鐘成丙不敢擊使竪牛請之叔孫竪牛不為之請又欺之曰吾已為爾請之矣使爾擊之叔孫聞之曰丙不請而擅擊鐘遂怒之丙出奔齊尸子曰鐘鼓之聲怒而擊之則武憂而擊之則悲喜而擊之則樂其意變其聲亦變意誠感之逹於金石而况於人乎晏子曰景公為大鐘将懸之仲伯常騫晏子三人俱朝曰鐘将毁之鐘果毁公見三子問之晏子對曰鐘大不以禮故曰将毁仲伯曰鐘大懸下氣上薄故曰将毁常騫曰今日庚申雷日也隂莫勝於雷故曰将毁韓子曰智伯将伐仇由而道難不通鑄大鐘遺之方車二軌仇由大悦除塗将内之赤章曼之諫曰此小所以事大也今以大事小兵必隨之仇由不聴曼之因斷轂而馳至齊十月仇由亡淮南子曰闔閭伐楚破九龍之鐘許慎注曰刻簴為九龍懸鐘也賈子云毁十龍之鐘又曰齊景公族鑄大鐘撞之於庭下郊雉皆雊許慎注曰族聚也鐘聲如雷震雉皆應之又曰孟秋之日西舒御好白色白采撞白鐘鼓處西宫又曰鐘之與磬也近之則鐘音亮遠之則磬音彰磬石也音清明遠而彰著物固有近不若遠遠則不若近者矣山海經云豐山有九鐘霜降則鳴又曰炎帝之孫伯峻生鼓延是為鐘吕氏春秋曰黄帝又命伶倫鑄十二鐘和五音始奏之曰咸池東方朔傳曰漢武帝未央宫殿前鐘無故自鳴三日三夜不止大怪之召待詔王朔問之朔對曰有兵器上更問東方朔朔對曰王知其一不知其二臣昔聞銅土之子以隂陽氣類言之子母相感山恐有崩弛者故鐘先鳴易曰鶴鳴在隂其子和之上曰應在幾日朔曰五日内居三日南郡太守言有山崩延袤二十餘里上大笑賜帛三十疋郭縁生述征記曰洛陽太極殿前大鐘六枚父老云曽有欲移此鐘者聚百數長絙輓之鐘聲震地咸懼不敢復犯陸翽鄴中記大面廣外一丈二尺小面廣七尺或作蛟龍或作鳥獸遶其上何法盛晉中興書曰義熈十一年霍山崩毁出銅鐘六枚上有古文科斗書人莫能識晉潘岳關中記曰漢昭帝平陵宣帝杜陵鐘在長安夏侯征西欲徙詣洛陽重不能致懸清明門裏道南其西者平陵鐘東者杜陵鐘也王子年拾遺記曰帝顓頊居位文徳者則錫以鐘磬武徳者錫以干戈戴延之西征記曰鐘大者三十二􅀶山頭形瓌紐作獅子頭鐘大者三十二􅀶山頭二丈厚八尺大面廣一丈二尺小面廣七尺或作蛟龍或作鳥獸周繞其外唐書制曰凡私家不設鐘磬三品以上女樂五人五品已上不過三人也虞喜志林曰呉時於江水中得鐘有百餘字募求讀者並無人曉樂叶圖徴曰君子鑠金為鐘四時九乳是以撞鐘以知君鐘調則君道得宋均注曰九乳法九州又曰聖王往承天定爵禄人者不過其能尊卑有位位有物物有宜功成者賞功敗者罰故樂用鐘宋均注曰不過能謂量能授爵者有罪鳴鐘以攻之也白虎通曰鐘之為言動也隂氣用事萬物動成鐘為氣用金為聲也鏄者時之氣聲也節度之所生也君臣有節度則萬物昌無節度則萬物亡異苑曰魏時殿前鐘忽鳴張華曰蜀銅山崩説苑曰鼓法天鐘法地秦始皇建千石之鐘立萬石之簴傅𤣥歌辭曰雷師鳴鐘皷風伯吹笙簧西母出穴聴王父唫東廂三禮圖曰凡鐘十六枚同為一筍簴為編鐘特懸者謂之鏄又曰鏄鐘者鐘之大者也形如鐘而大耳其筍簴亦一而已三輔黄圖曰如筍簴髙三丈鐘小者千石通禮義纂曰鐘磬半為堵全為肆軒懸三面歌鐘三肆判憑懸兩面歌鐘二肆特懸一面惟磬而已又曰圜鐘夾鐘也於位在卯氣生於房心為宫天帝之明堂故奏樂先奏圜鐘為宫又曰駕入撞㽔賔之鐘左右鐘皆應之按㽔賔位居午午主陽主動象王自外動而入方居之始故先作之而東廂應者東為陽陽主動明以靜主動使之相應也駕出撞黄鐘右五鐘皆應黄鐘位居子子為陽陽主動象王自内動而出方行之始故先作之西廂應之者西為隂隂主靜明以動告靜使之相和也廣古今五行記曰㑹稽人陳清於井中得小鐘長七寸二分上有古文十八字其四字可識云會稽岳命郭璞云愍懷喪覆元帝中興之應自宣帝至恭帝數十八又曰陜州黄河銅鐘在水水大小恒自浮出每晦朔隂雨之日鳴聲響悲亮行客聞之莫不愴然又曰晉中朝有人畜銅為盤晨夕恒鳴如人扣打以白張華華曰此盤與洛鐘宫商相諧故聲相應可錯令輕則韻乖自止古今樂録曰髙廣中四鐘皆秦時廟鐘也重千二百斤明帝徙二鐘南宫張衡東京賦曰發鯨魚鑑華鐘薛綜注曰天子出則鳴蒲牢海中大魚名鯨海島中又有大獸名蒲牢畏鯨魚鯨魚一擊蒲牢輒大鳴呼凡鐘欲令大鳴故作蒲牢於上所以撃之者為鯨魚有篆刻文故曰華鐘也戴延之西征記曰洛陽太極殿前左右各三銅鐘相對鐘大者三十二圍小者二十五圍唐書曰唐太宗召張文收於太常令與卿祖孝孫㕘定雅樂有古鐘十二近代唯用其七餘有五鐘俗號啞鐘莫能通者文收吹律調之聲皆響徹時人咸服其妙錞于周禮曰以金錞和鼓宋史云廣漢什邡人段祖以錞于獻始興王鑑其器髙三尺六寸六分圍二寸四分圓如筩色黒如漆甚薄上有銅馬以繩懸馬令去地尺餘灌之以水又以器盛水於下以芒當心跪注錞于以手振芒則其聲如雷清響良久乃絶後周書斛斯徴太常卿樂有錞于者近代絶無此器或有自蜀得之皆莫之識徴見之曰此錞于也衆弗之信徴遂引於室周禮注以芒筒将之其聲極振衆乃歡服乃取以合樂焉樂書曰錞于者以銅為之其銅象鐘頂大腹􅰐口弇上以伏獸為鼻内懸子鈴銅舌凡作樂振而鳴之與皷相和又曰凡金為樂器有六皆鐘之類也曰鐘曰鏄曰錞曰鐲曰鐃奴交切曰鐸鏄如鐘而大錞于也圓如椎頭上大下小所謂金錞和鼓鐲鉦也形如小鐘軍行為鼓節鐃鈴而無舌有柄而執之鐸如大鈴太平御覽卷五百七十五
