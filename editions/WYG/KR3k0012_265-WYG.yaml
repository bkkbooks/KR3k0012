body:
  text: 太平御覽卷二百六十五宋李昉等撰職官部六十三州主簿從事中正州主簿韋昭辯釋名曰主簿主諸簿文書普閲諸事漢書曰王尊遷東郡太守河水盛溢泛没瓠子金隄尊躬率吏民沉白馬祀水神河伯尊親執珪璧使巫祝請以身填金因止宿廬于堤上及水盛堤壊吏民皆走唯一主簿泣在尊旁尊立不動而水波稍􅂞却還吏民嘉壯尊之勇節白馬三老朱英等奏其狀東觀漢記曰周喜仕郡為主簿王莽末羣賊入汝陽城喜從太守何敞討賊為流矢所中謂賊衆曰卿曺皆民𨽻也豈有還害其君者耶喜請以死贖君命因仰天號泣賊於是相視曰此義士也給其車馬遣送之後漢書曰朱儁㑹稽人也太守尹端以儁為主簿熹平二年端坐討賊許昭失利為州所奏罪應棄市儁乃羸服間行私齎數百金到京師賂主章吏還得刋定州奏故端得輸作左校端喜於降免而不知其由儁亦終無所言魏志曰盧毓字子家涿郡人也崔琰舉為冀州主簿時天下草創多逋逃故重士亡法罪及妻子亡士妻白等始適夫家數日皆未與夫相見大理奏棄市毓駮之曰夫女子之情以接見而恩生成婦而義重故詩曰未見君子我心傷悲亦既見止我心則夷又禮未廟見之婦而死歸葬女氏之黨以未成婦也今白等生有未見之悲死有非婦之痛而吏議欲肆之大辟若同牢合卺之後罪何所加􅈟音謹且記曰附從輕言附人之罪以輕者為比也又書云與其殺不辜寧失不經恐過重也苟以白等皆受禮聘已入門庭刑之為可殺之為重太祖曰毓之所執是又引經典有意使孤歎息又曰龎淯字子異太守徐楫請為主簿後郡人黄昻反圍城淯棄妻子夜踰城圍告急於張掖燉煌二郡初疑未發兵淯欲伏劍二郡感其義遂興兵軍未至而郡邑已䧟楫死淯乃收斂楫喪送還夲郡行服三年乃還又曰崔林字德儒清河人少時晚成宗族莫知唯從兄琰異之太祖定冀州擢為州主簿蜀志曰杜微字國輔梓潼涪人丞相領益州牧以㣲為主簿㣲固辭輿而致之既至亮引見而㣲自陳謝亮以微不聞人言於座上作書與之吴録曰荀咸字子良為郡主簿太守黄君行春留咸守郡郡掾吏採雀卵咸責数以春月不宜破卵杖之三十王隐晉書曰陶侃字士行鄱陽人為郡主簿夫人病欲使主簿迎醫于数百里天大雪人各辭疾召侃使行侃曰資於事父以事君夫人亦當父母安有父母病而不急迎醫者乎晉書曰潘京字世長武陵漢夀人也弱冠郡辟主簿太守趙廞甚噐之嘗問京貴郡何以名武陵京曰鄙郡本名義陵在辰陽縣界與夷相接數為所攻光武時移東出遂得全完共議易號𫝊曰止戈為武詩稱高平曰陵於是名焉為州所辟因謁見問筞探得不孝字刺史戲京曰辟士為不孝耶舉板答曰今為忠臣不得復為孝子其機辯皆如此類又曰易雄長沙瀏陽人也仕郡為主簿張昌之亂執太守萬嗣欲斬之雄與賊争論曲直賊怒叱使牽雄斬之雄顔色自若賊人又呼之雄論如初如此者三賊乃並嗣捨之又曰潘京武陵人也郡辟為主簿後太廟立州郡皆遣使賀京白太守曰夫太廟立移神主應問訊不應賀遂遣京作文使詣京師以為永式又曰習鑿齒字彦威為桓温荆州主簿親遇隆宻時語曰徒三十年看儒書不如一詣習主簿也宋書曰王思遠宋建平王景素辟南徐州主簿深見禮遇景素被誅左右離散思遠親視殯𦵏手種松栢與廬江昌寓上表理之事感朝廷景素女廢為庶人思逺分衣食以相資贍年長為備笄總訪求偶對傾家送遣之三國典畧曰梁李膺字公𦙍廣漢人也西昌侯藻為益州以為主簿使至建昌梁武恱之謂曰卿何如昔日李膺對曰勝問其故對曰昔事桓靈之主今逢堯舜之君梁武嘉其對以如意擊席者久之後魏書曰裴安祖弱冠州辟為主簿民有兄弟争財詣州相訟安祖召其兄弟以禮義責讓之此人兄弟明日相率謝罪郡内欽服之又曰韋朏字尊顯少有志業年十八辟州主簿時屬嵗儉朏以家粟造粥以餌飢人所活甚衆又曰杜暹補婺州叅軍秩滿将歸州吏以紙萬餘張以贈之暹唯受一紙餘者悉還之時州寮别者見而歎曰昔清吏受一大錢復何異也唐書曰顔杲卿以廕授官性剛直有吏幹開元中為魏州録事叅軍振舉綱目政稱第一三輔决録曰韋元将年十五身長八尺五寸為郡主簿楊彪稱曰韋主簿年雖少有老成之風昻昻千里之駒陳留耆舊𫝊曰戴斌為郡主簿送故將䘮歸鄉里蠡吾里人距之孝子臣吏脫絰叩頭求哀終不見聴斌乃投絰放縗操手劍瞋目厲聲距踊而前曰哭不哀者郎君也䘮車不前者戴斌也里人服其義乃内之廣陵列士𫝊曰劉雋為郡主簿郡将為賊所得雋知言辭不能動賊因叩頭流血乞得代之賊不聴前砍府君雋因投身䕶之正與刃㑹斫左肩瘡尺餘賊又欲更下刃雋號呼抱持不置賊因相謂曰此義士殺之不祥遂俱縱遣黄義仲交廣二州記曰合浦之士有尹牙為郡主簿太守嘆曰重仇未報牙即變姓易名為報之天子竒其義因赦不問世說曰謝景仁為豫州主簿在𤣥閤下桓聞其善彈筝便呼之既至取筝令彈謝即理弦撫筝因歌秋風意氣殊邁桓𤣥以此竒之從事漢書曰丙吉字少卿為廷尉右監坐法失官歸為州從事又曰趙廣漢涿郡人為州從事以嚴潔通敏下士為名又曰揚雄數為朝廷在位賢者稱嚴君平徳杜陵李強為益州牧喜謂雄曰吾真得嚴君平矣雄曰備禮以待之彼人可見而不可詘也強心以為不然及至蜀致禮與相見卒不敢言以為從事乃歎曰揚子雲誠知人也東觀漢記曰鮑永為司隸校尉矜嚴公正以平陵鮑恢為從事恢亦抗直詔曰貴戚且斂手以避二鮑又曰樊凖字幼陵為州從事臨職介正不發私書又曰班彪避地河西大将軍竇融以為從事深敬待之接以師友之道後漢書曰朱震字伯厚為州從事奏濟隂太守贓罪三府諺曰車如雞栖馬如狗疾惡如風朱伯厚續漢書曰楊球為幽州從事部分邊塞職事脩理謝承後漢書曰陳衆辟州從事有劇賊淳于臨等數千人攻縣殺吏光武遣司空李通率師擊之州牧惶怖恐獲罪戾衆於是自請以恩信曉諭降之乘單車駕白馬往到賊所以義告諭臨素服名徳即降服民生立祠名曰白馬從事華嶠後漢書曰衛羽為州從事時中常侍單超兄子匡為濟隂太守負其勢大為貪放刺史第五種欲取之聞羽素抗厲乃召羽問曰聞公不畏強禦今欲相委以重事若何對曰願庶幾於一割羽出遂馳至定陶閉城門収匡賓客親吏四十餘人七日中起發其贓五六千萬即舉奏一州震慄魏志曰賈洪字叔業家貧好學應州辟其時州中自叅軍以下百餘人唯洪與嚴苞字文通才學最髙故衆為之語曰州中曅曅賈叔業辨論洶洶嚴文通又曰袁紹領冀州得從事沮授喜曰吾腹心也又曰張遼字文逺雁門馬邑人也本聶壹之後以避怨變姓漢并州刺史丁原以遼武力過人召為從事又曰邢顒太祖辟為冀州從事時人稱之徳行堂堂邢子昻蜀志曰張松説劉璋交通先主從事廣漢王累自倒懸於門以諫璋無所納又曰馬謖字幼常以荆州從事隨先主入蜀材力過人好論軍計又曰譙周字允南身長八尺體貎素朴推誠不飾無造次辨論之方然潜識内明建興中丞相亮領益州牧命周為建學從事王隐晉書曰山濤字巨源河内人年四十始為州郡部河南從事又曰劉毅辟為司州都官從事京邑肅然彈河南尹事司𨽻不許曰躩虎之犬鼷䑕蹈其背毅曰既能躩虎又能殺䑕何損於犬投傳而去晉中興書曰華譚字令思生未期而父殁母年十八執節養譚弱冠知名揚州刺史周俊禮辟署從事史愛其才器以為賓友益都耆舊傳曰李𢎞字仲元為州從事揚雄稱之曰不屈其志不累其身不夷不恵可否之間見其貌肅如也觀其行穆如也聞其言戚如也陳留耆舊傳曰髙慎字孝甫敦質少華口不能劇譚嘿而好深沉之謀為從事號曰卧虎故人謂之嶷然不語高孝甫又曰巴郡任文公有道術為州從事時越嶲欲反州遣五從事案虛實止𫝊舍食未半有風發案文公起曰當有逆變因卒駕去諸從事未能發為郡兵所殺鍾離意别𫝊曰揚州刺史夏君三辟意九江從事三府側席夏君見意曰刺史得京師書聞從事有令聞刺史何惜王家之爵不貢賢者乃表上尚書李固别傳曰益州及司𨽻辟皆不就門徒或稱從事掾固曰未曽受其位不宜獲其號孟嘉别傳曰庾亮辟嘉為勸學從事亮盛修學斆髙選儒官正旦大㑹褚裒問亮嘉何在亮曰但自覓之裒厯觀之指嘉曰將無是乎亮欣然羅含别𫝊曰含字君章刺史庾廙以親賢之重作鎮方岳搜揚荆楚匪蘭弗刈仍辟含荆州部從事潜夫論曰孝明帝時荆州舉茂才過闕謝恩賜食既訖問何異聞對曰巫地有劇賊九人刺史不能得帝曰汝非部郡從事耶對曰是也帝乃振怒曰賊發部中而不能擒何以為茂才乃捶數百而切讓州郡十日之間賊即伏誅由此觀之擒賊在明法不在數赦也世說曰顧和為州從事月旦朝未入停車周侯厯和車邊過和風貌夷然不動周指顧心曰此中何有徐應曰此中最是難測地周入遇丞相曰卿州吏中有令僕才又曰羅含為宣武從事謝鎮西作江夏使往檢校之羅既至初不問郡家事乃遙就謝數日飲酒而還桓公問何事羅云未審公謂謝尚是何似人桓公答仁祖是勝我許人羅云豈有勝公人而有行非者故一無所問桓公竒其意而不責王丞相集教曰丹陽從事陳耽器局𢎞正可轉主簿吳興從事謝鸞才幹正直可轉西曹中正魏畧曰時苖字徳胄鉅鹿人也為大官令領其郡中正定九品至於叙人才不能寛大其紀人之短雖在久逺銜之不置吳志曰習温為荆州大公平大公平即州都也後潘秘為尚書僕射代温為大公平甚得其譽晉書曰楊晫陶侃共載詣顧榮州大中正温雅責晫與小人共載晫曰江州名少風俗卿已不能養進寒雋且不可毁之楊晫代雅為大中正舉侃為鄱陽小中正又曰諸葛瞻領丹陽宣城新安三郡大中正時中州人士多寓焉又曰劉毅字仲雄年七十已告老後舉為青州大中正尚書以毅懸車致仕不宜勞以碎務孫尹曰司徒魏舒司𨽻嚴詢與毅年齒相近管四十萬户州兼董司百寮總攝機要舒所統殷廣兼執九品銓十六州議者不以為劇昔鄭武年過八十入為司徒毅志氣聰明一州品第不足勞其思慮遂為州都銓正人流清濁區别其所彈貶自親貴始焉又曰解結問别駕治中河北白壤髙良何故少人士每以三品為中正皆云不審陳碩對曰詩稱惟岳降神生甫及申英偉大賢多出山澤河北地平氣均蓬蒿裁六尺不足成林故也又曰干寳稱晉宣帝除九品置大中正晉令云大小中正為内官者聴月三㑹議上東門外設幔陳席又曰劉毅上表刺史初臨州大中正選州里才業髙者兼主簿從事迎刺史若吏部選用猶下中正問人事所在父祖位狀晉起居注曰僕射諸葛恢啓稱州都大中正為吏部尚書侍郎司徒左長史屬掾皆為中正臣今領吏部請解大中正以為都中正職局司理不宜兼者也蕭子顯齊書曰張緒字思曼吳郡人轉太子中庶子本州大中正長沙王晃屬選用吳興聞人邕為州議曹緒以資籍不當執不許晃遣書往固請之緒正色謂晃信曰此是家州鄉殿下何得見逼梁書曰沈約遷侍中光禄大夫領太子詹事揚州大中正闗尚書八條事後魏書曰房堅遷齊州大中正髙祖臨朝令諸州中正各舉所知千秋與幽州中正楊尼各舉其子髙祖曰昔有一祁名垂往史今有二奚當聞來牒北齊書曰乾明中邢劭為中書監同郡許惇與劭競本州中正遂慿附宋欽道出劭為刺史三國典略曰陳以孔奐為御史中丞領揚州大中正晉陵自宋齊以來為大郡奐清白自守妻子並不之官所得秩俸隨即分贍孤寡郡中大恱號曰神君襄陽耆舊傳曰晉朝以江表始通人物未悉使江南别立大中正通典曰魏司空陳羣以天臺選用不盡人才擇州之才優有昭鑒者除為中正自抜人才銓定九品州郡皆置吳有大公平亦其任也郭子曰孫子荆應上品㧞王武子時為大中正謂訪問址人非卿莫能㧞可自為之目曰天才英雄亮㧞不羣傅子曰魏司空陳羣始立九品之制郡置中正平次人才之髙下各為階目州置州都而總其察議晉宣帝除九品州置大中正議曰案九品之状諸中正既未能料䆒人才以為可除九品制州置大中正曹議集九品議曰伏見明論欲除九品而置州中正欲撿虚實一州闊逺路不相識請不得知㑹復轉訪本郡先逹者耳此為問州中正而實决於郡人孫楚集奏曰九品漢氏本無班固著漢書序先往代賢智此九條比葢記鬼録次第耳而陳羣輒取之以品生人又魏武㧞部次於胷臆収才不問階次豈賴九品而後得人今可令長守為大小中正各自品其論户也劉毅集論九品曰臣聞用治理者以官才為本官才有三難而治亂之所由人物難知一也愛憎難訪二也情偽難明三也今立中正定九品操人主之威福奪天朝之權柄上品無寒門下品無勢族今職名中正實為姦府事名九品而有八損宜罷中正除九品棄魏弊法更立一代之美制荀朂集表讓豫州大中正曰被勅以臣為豫州大中正臣與州閭鄉黨初不相接臣本州十郡方於他州人數倍多品藻人物以正一州清論此乃臧否之本風俗所重傅暢自序曰時請定九品以余為中正僉以祖考厯代掌州鄉之論又兄宣年三十五立為揚州都令今以少年復為此任故至於上品以宿年為先是以鄉里素滯屈者漸得叙也應璩新論曰百郡立中正九置州都士州閭與郡縣希疎如馬齒生不相識面何縁别義理太平御覽卷二百六十五
