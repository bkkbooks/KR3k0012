body:
  text: 太平御覽巻八百三十八宋李昉等撰百榖部二米麥米後漢書曰帝因西征隗囂至􅃮􅃮縣屬古扶風諸將多以王師之重不宜逺入險阻計猶豫未决會召馬援夜至帝大喜引入具以羣議質之援因説隗囂將帥有土崩之勢兵進有必破之狀又於帝前聚米為山谷指畫形勢開示衆軍所従道徑往来分析昭然可曉帝曰虜在吾目中矣明旦遂進軍囂衆大潰又獻帝時三輔大旱帝避正殿請雨遣使者洗囚徒原輕繫洗謂蕩滌也是時榖一斗五十萬豆麥一斛二十萬人相食啖白骨委積帝使御史侯汶出太倉米豆為飢人作糜粥經日而死者無數帝疑賑䘏有虛乃親於御座前量試作糜乃知非實袁宏漢記曰時敕侍中劉文取米豆五升於御座前作糜得滿三盂於是詔尚書曰米豆五升得糜三盂而人委頓何也使侍中劉艾出讓有司於是尚書令以下皆詣省閤奏收侯汶考實詔曰未忍致汶于理可杖五十自是之後多得全濟宋書曰晋平王休祐素無才能强梁自用大明之世年尚少未得自專至是貪滛好財色在荆州裒刻所在多營財貨以短錢一百賦民曰登就求白米一斛米粒皆令徹白若有破折者悉刪簡不受民糴此米一升一日至時又不受米評米責錢凡諸求利皆悉如此南史曰徐耕晉陵人也元嘉二十一年大旱人飢耕詣縣陳辭以米千斛助官振貸縣為言上當時議以耕比漢卜式詔書褒美酧以縣令大明八年東土飢東海嚴成東莞王道益各以私榖五百餘斛助官賑䘏梁書曰任昉為新安太守為政清省吏民便之卒於官唯有桃花米二十斛無以為歛遺言不許將新安一物還都南史曰孔顗後為司徒左長史弟道存代顗為後軍長史江夏内史時東土大旱都邑米貴一升將百錢道存慮顗甚乏遣使載五百斛米餉之顗呼吏謂之曰我在彼三載去官之日不辦有路糧郎至彼未㡬那能便得此耶可載還彼吏曰自古以来無有載米上水者都下米貴乞扵此貨之不聽吏乃載米而去梁書曰庾詵常乗舟自中山還舍載米一百五十石有人寄載四十石及至宅寄載者曰君四十斛我百五十斛詵嘿然不言恣其取足鄰人有被執為盗見劾妄欵詵矜之乃以書質錢二萬令門生詐為其親代之酬鄰人獲免謝詵曰矜天下無辜豈期謝也又曰張率嗜酒不事於家務尤忘懐在新安遣家僮載米三千石還呉宅及至耗一半率問其故答曰省䑕耗率笑而言曰壯哉雀䑕竟不追問南史隱逸傳曰陶􅅗為彭澤令郡遣督郵至縣吏白應束帶見之潜歎曰我不能為五斗米折腰向鄉里小兒即日觧印綬賦歸去来辭以遂其志後魏書曰崔浩自撰食經序曰余備位台鉉與叅大謀賞獲豐厚牛羊盖澤貨累巨萬衣則重錦食必粱肉逺惟平生思季路負米之時可復得乎故序遺文垂示來世北史曰齊文宣帝崩當朝文士各作挽歌十首擇其善者而用之魏收陽休之祖孝徴等不過得一二首惟盧思道獨有八篇故時人稱為八美盧郎唐書曰李峴為京兆尹所在皆著聲績天寳十三載連雨六十餘日宰臣楊國忠惡其不附己以雨災歸咎京兆尹乃為長沙郡太守時京師米麥踴貴百姓謡言曰欲得米粟賤無過追李峴其為政得人心如此又曰張萬福為泗州刺史魏州飢父子相賣餓死者接道福曰魏州吾鄉里也安可不救令其兄子將米百車往饟於汴口求魏人自賣者給車牛贖而遣之又曰陽城常約其二弟云吾所得月俸汝可度吾家有㡬口月食米當㡬何買薪菜鹽米凡用㡬錢先具之其餘悉以付酒媪無留也未嘗有所蓄積説苑子路曰負重道逺不擇地而休家貧親老不擇禄而仕昔者由事二親之時常食藜藿之實而為親負米百里之外親沒之後南遊於楚従車百乗積粟萬鍾累茵而坐列鼎而食願食藜藿為親負米之時不可復得也枯魚銜索幾何不蠧二親之壽忽如過隙草木欲長霜露不停賢者欲養二親不待故曰家貧親老不擇禄而仕也呂氏春秋曰孔子窮於陳蔡之間藜羮不糁七日不嘗粒晝寐顔回索米得而来㸑之㡬熟孔子望見顔回攫其甑中而飯之選間食熟謁孔子而進食孔子起曰今者夢見先君食潔欲饋回曰不可嚮者㶼煤入甑中囘以為棄之則不可置之則不潔因攫而食之孔子歎曰人所信者目也而目猶不可信所恃者心也而心猶不足恃弟子記之知人故不易水經注會稽有射的山逺望狀若射侯故謂射的的之西有石室名之為射堂年登否常占射的以為貴賤之准的明則米賤的闇則米貴故諺云射的白斛米百射的𤣥斛米千麥毛詩􅅠栢舟桑中曰爰采麥矣沬之北矣又載馳曰我行其野芃芃其麥又思文曰思文后稷克配彼天立我蒸民莫匪爾極貽我来牟牟麥也禮記月令曰孟夏之月天子乃以彘嘗麥孟夏行冬令則首粟不入左傳桓公曰夏四月鄭祭足帥師取温之麥又文下曰魯襄仲如鄭拜榖之盟復曰臣聞齊人將食魯之麥又成上曰晉侯夢大厲公召桑田巫卜之曰不食新矣六月丙午晉侯欲麥使甸人獻麥召桑田巫示而殺之將食張如厠䧟而卒春秋佐助期曰麥神名含福姓習春秋説題辭曰麥之為言殖也寢生觸凍而不息精射刺直故麥含芒事且立也周書曰四月孟夏王初祈禱于岱宗乃嘗麥于廟史記曰箕子朝周過故殷墟咸生禾黍箕子傷之欲哭則不可欲泣為其近婦人乃作麥秀之書以歌詠之其詩曰麥秀漸漸兮禾黍油油漢書曰武帝外事四夷而民去本業董仲舒説上曰春秋他榖不書至於麥禾不成則書之以此見聖人於五榖最重宿麥今闗中俗不好種麥願陛下幸詔大司農使闗中民益種宿麥無令後時東觀漢記曰髙鳯字文通南陽人誦讀夜不絶妻嘗之田曝麥欲他往以竿授鳯令䕶鳯受竿誦經如故天大雷暴雨流潦鳳留意在經忽不見視麥麥隨水漂去又曰第五倫免歸田躬與奴共發株棘田得麥又曰董宣為洛陽令卒於官詔遣使視唯見布被覆屍妻子對哭有大麥數斛又曰鄧禹平三輔糧乏王丹上麥二千斛禹髙其義表丹領左馮翊又曰張堪為漁陽太守勸農耕種以致殷富百姓歌曰桑無附枝麥穂兩岐張君為政樂不可支續漢書曰羊續為南陽太守妻與子秘俱往郡舍續閉門不納妻自將秘行其資蔵唯布衾弊禂鹽麥數斛又曰桓帝時童謡曰小麥青青大麥枯誰當穫者婦與姑丈夫何在西擊胡袁山松後漢書曰范丹字史雲外黄人使兒捃麥得五斛郷人尹䑓遺之一斛囑兒莫道丹後知即令并送六斛言麥已雜遂誓不取王隱晋書曰王裒字偉元諸生有宻為裒刈麥者裒遂棄之於是莫敢復佐晋書載記曰京兆杜洪竊據長安自稱晉征北將軍雍州刺史戎夏多歸之苻徤宻圖闗中懼洪知之乃偽受石祗宫室於枋頭課所部種麥示無西意有知而不耕種者徤殺之以徇晉起居注曰咸康三年河北謡曰麥入土殺石虎又曰太康十年嘉麥生扶風郡一莖四穂收實三倍崔洪十六國春秋前涼録曰張駿九年雨稼榖于武威燉煌種之皆生因名天麥又前秦録曰初符健聞桓温之來伐也芟麥以待之故温掠無所得軍人大飢又曰新羅王遣使貢其方物在百濟東去長安九千八百里其人食麥又前涼録曰永嘉元年嘉麥一莖九穂生姑臧三國典畧曰李岳字祖仁官至中散大夫嘗為門客所説舉錢營生廣收大麥載赴晉陽候其寒食以求髙價清明之日其車方逹又従晉陽載囘鄴城路逢大雨並化為泥利息既少乃至貧廹當時人士莫不笑之陳書曰侯景亂時呉明徹有粟麥三千餘斛而鄰里飢餒乃白諸兄曰今人不圖久奈何不與鄊里共此於是計口平分同其豐儉郡盗聞而避焉頼以存者甚衆後周書曰大象末有强練師以無底嚢歴長安市吿乞市人以米麥遺之隨即漏地人或問其故强練曰但令諸人見盛空耳及隋初遷都龍首山長安遂空矣隋書曰張文詡隠居嘗有人夜中竊刈其麥見而慰諭之自誓不言因令持去經數年盗者向鄉人論之始為逺近所悉鄰家築牆心有不直文翊因毁舊堵以應之唐書曰開元十三年河南府夀安縣人劉懐家有大麥六畆先熟與衆麥殊色其中有兩岐三岐四岐六岐者又曰元和九年六月三日宰臣武元衡為盗所害先是長安謡曰打麥麥打三三三既而旋其袖曰舞了也解者謂打麥者打麥時也麥打者盖謂闇中掊擊也三三三謂六月三日也舞了者謂元衡之卒也又曰西女國每十月令巫者賫肴詣山中散糟麥於空大呪呼鳥俄而鳥如雞飛入巫者之懐因割腹而視之每有一榖来歳必登若有霜雪必有災異其俗信之名為鳥卜又曰吐谷地氣大寒不生秔稻有青䴹還瓦切麥䝁音勞豆小麥蒿麥莊子曰大儒以詩禮發冡小儒口中有珠詩曰青青之麥生於陵陂生不布施死何含珠為淮南子曰濟水通河而宜麥又曰三春之月天子衣青衣乗青龍食麥與羊秦子曰孔文舉為北海相有人母病瘥思食新麥家無有乃盗隣熟麥而進之孔舉聞特賞之家語曰宓子賤為單父宰百姓化之齊人攻魯道由單父父老謂曰麥已熟矣今齊冦至不及人人自収其麥請放民皆使出穫傅郭之麥可以益糧且不資㓂三請而宓子不聽俄而㓂逮扵麥季孫聞之怒使人譲之宓子蹙然曰今兹無麥明年可樹若使不耕者得穫是民樂有㓂也且單父一歳之麥於魯不加强䘮之不加弱使民有自取之心其瘡必數世不息季孫聞之赧然媿曰邑若可入吾豈忍見宓子哉廣雅曰大麥麰也小麥麳也呂氏春秋曰得時之麥長穂而頸黑二七以為行西服薄穂而赤色稱之重食之致香以息使人肥且有力范子計然曰東方多麥南方多稷西方多麻北方多菽中央多禾五土之所宜也説文曰麥芒榖秋種厚薶故謂之麥麥金也金王而生火王而死従来有穂者従久思惟切麰周所受来牟也一麥二縫象其芒刺之形天所來也麧音紇堅麥也􅂒音瓉小麥屑覈也䴾磨麥也䵂麥覈屑也十斤為三斗從麥啇聲䵄煮麥也麮麥白煮也稍麥莖也廣志曰虜小麥其實大麰似大麥形有二縫􅀈麥似大麥出涼州旋麥三月種八月熟出西方赤麥赤而肥也出鄭縣有半夏小麥有秀芒大麥有黑穬麥呉氏本草曰大麥一名穬麥五榖之盛無毒治消渇除熱益氣食蜜為使麥種一名小麥無毒治利而不中汜勝之書曰凡田六道種麥為首子欲富黄金覆謂曵柴壅麥根也夏至後七十日寒地可種宿麥又曰麥早種穂强而有節晩種穂小而少實漬麥種以酢漿無蟲冬雪止掩其雪忽従風飛去則麥耐旱崔寔四民月令曰六月初伏薦麥𤓰於祖禰陳留耆舊傳曰髙順字孝甫敦厚少華子式至孝蝝蝗為災不食式麥英雄記曰吕布令韓暹楊奉取西蜀地麥以為軍資曹暪傳曰太祖曽行麥中令士卒無敗麥犯者死騎士皆下馬持麥以相付太祖馬騰入麥中太祖曰孤為軍帥不可殺請自刑因㧞劔割髮以置地諸葛恪别傳曰孫權常饗蜀使費禕禕停食䴵索筆作麥賦恪亦請筆作磨賦咸稱善西域諸國志曰天竺以十一月六日為冬至則麥秀十二月十六日為臘則麥熟博物志曰啖麥令人多力又曰近世有田夫至巧削木為麥入市糶之糴者無疑歸磨乃覺非麥捜神記曰麥之為蛺蝶由于濕也爾則萬物之變皆有也農夫止麥之化者區之以灰聖人理萬物之化者濟之以道孔融教髙宻令曰髙宻侯國牋言鄭國増門之崇令容髙車結駟之路出麥五斛以酧執事之勞太平御覽巻八百三十八
