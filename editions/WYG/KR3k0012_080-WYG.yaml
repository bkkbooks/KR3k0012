body:
  text: 太平御覽卷八十宋李昉等撰皇王部五帝嚳髙辛氏帝摯帝堯陶唐氏帝嚳髙辛氏史記曰帝嚳髙辛氏者黄帝之曽孫也父曰蟜極蟜極父曰𤣥囂𤣥囂父曰黄帝自𤣥囂與蟜極皆不得在位至髙辛即位髙辛於顓頊為族子其色郁郁其德嶷嶷日月所照風雨所至莫不服從帝嚳娶陳鋒氏女生放勛娶娵訾氏女生摯帝嚳崩而摯代立帝王世紀曰帝嚳髙辛氏姬姓也其母不見生而神異自言其名曰逡􅀈齒有聖德年十五而佐顓頊三十登帝位都亳以人事紀官故以勾芒為木正祝融為火正蓐收為金正𤣥㝠為水正后土為土正是五行之官分職而治諸侯於是化被天下遂作樂六莖以康位世有才子八人號曰八元亦納四妃卜其子皆有天下元妃有邰氏女曰姜嫄生后稷次有娀氏女曰簡翟生卨次陳豐氏女曰慶都生放勛次娵訾氏女曰常儀生帝摯帝嚳在位七十五年一百五嵗而崩葬東郡頓丘廣陽里陶𢎞景云在位六十三年年九十二大戴禮曰宰我曰請問帝嚳孔子曰𤣥囂之孫蟜極之子曰髙辛氏生而神靈自言其名取地之財而節用之撫教萬民而利誨之厯日月而迎送之明鬼神而敬事之其色郁郁其德嶷嶷其動也時其服也士春夏乗龍秋冬乗馬黄斧黻衣執中而獲天下禮記祭法曰帝嚳能序星辰以著衆春秋元命苞曰帝嚳戴干是謂清明發節移蓋像招揺干楯也招揺為天戈楯相副戴之像見天下以為表古史考曰髙辛氏或曰房姓以木德王張顯析言曰髙辛氏初生自言其名其居民終無迷謬魏陳王曹植帝嚳賛曰祖自軒轅𤣥囂之裔生言其名木德帝世撫寧天地神靈察物教彌四海明並日月帝摯帝王世紀曰帝摯之母於四人之中其班最下而摯年兄弟最長故得登帝位封異母弟放勛為唐侯摯在位九年政軟弱而唐侯德盛諸侯歸之摯服其義乃率其羣臣造唐朝而致禪因委志心願為臣唐侯於是知有天命乃受帝禪而封摯於髙辛氏事不經見漢故議郎東海衞宏所傳云耳帝堯陶唐氏帝王世紀曰帝堯陶唐氏祁姓也母曰慶都孕十四月而生堯於丹陵名曰放勛或從母姓伊祁氏年十五而佐帝摯授封於唐為諸侯身長十尺常夢攀天而上故年二十而登帝位以火承木都平陽置敢諫之鼔天下大和命羲和四子羲仲羲叔和仲和叔分掌四岳諸侯有苗氏處南蠻而不服堯征而克之于丹水之浦乃以尹壽許由為師命伯䕫訪山川谿谷之音作樂大章天下大和百姓無事有八十老人擊壤歌于道觀者歎曰大哉帝之德也老人曰吾日出而作日入而息鑿井而飲耕田而食帝力何有於我哉有僬僥氏來貢沒羽厨中自生肉脯如翣形揺鼔自生風使食物寒自不臭名曰翣脯又有草夾階而生隨月生死王者以是占日月之數惟盛德之君應和而生故堯有之名蓂莢一名厯莢始封稷契咎繇褒進伯禹納舜于大􅅢後年二月又率羣臣刻璧為書東沉于洛言天命當傳舜之意今中候運衡之篇是也舜攝政二十八年堯與方迴遊陽城而崩尚書所謂二十有八載放勛乃殂落是也百姓如喪考妣三載四海遏宻八音凡堯即位九十八年年百一十八嵗墨子以為堯堂髙三尺土階三等堯取散宜氏女曰皇生丹朱又有庻子九人皆不肖故以天下命舜又曰帝堯氏始封於唐今中山唐縣是也堯山在北唐水在西北入河南有望都縣有都山即堯母慶都之所居也相去五十里都山一名豆山北登堯山南望都山故名其縣曰望都春秋合誠圖曰堯母慶都有名於世蓋天帝之女生於斗維之野常在三河之南天火雷電有血流潤大石之中生慶都長大形像天帝常有黄雲覆蓋之夢食不飢及年二十寄伊長孺家出觀三河之首常若有神隨之者三河之首東河北端有赤龍負圖出慶都讀之赤受天運運録運也下有圖人衣赤光面八彩鬚鬢長七尺二寸兌上豐下足履翼翼署曰赤帝起誠天寶衣赤光光像而又著衣也八彩彩色有八也翼翼星大位宿也圖人傍有此署文七十也奄然隂風雨赤龍與慶都合婚有娠龍消不見龍乗風雲故先隂風乃龍至也婚猶㑹合或為結也既乳視堯如圖表及堯有知慶都以圖予堯如圖人儀表也孝經援神契曰堯鳥庭荷勝八眉堯火精人也鳥庭庭有鳥眉表取像朱鳥與太微庭也朱鳥戴聖荷勝似之八眉眉彩色有八論語曰大哉堯之為君也巍巍乎唯天為大唯堯則之孔安國曰側法也美堯則法天而行之也蕩蕩乎民無能名焉蕩蕩廣逺之稱言布德廣逺民無能名巍巍乎其有成功也功成化隆髙大巍巍煥乎其有文章孔叢子曰堯身脩十尺眉乃八彩實聖也龍魚河圖曰堯時與羣臣賢者到翠媯之淵大龜負圖來出授堯勑臣下冩取畢龜還水中易坤靈圖曰其母萌之𤣥雲入户蛟龍守門母為慶都也天皇之女天帝以𤣥雲覆御之故曰時乗六龍以御天也又曰堯之精陽萬物莫不從者言堯在天陽精所在帝世有洪水之灾天生聖人使救之故言乃統天也書曰若稽古帝堯孔安國曰若順稽考也能順考道而行之者帝堯曰放勲欽明文思安安勲功欽敬也言堯放上世之初化而以敬明文思之四德安安當安者也允恭克讓光被四表格于上下允信也克能也光充格至也既有四德又信恭能讓故其名聞充溢四外至于天地也克明峻德以親九族能明峻德之士任用之以睦髙祖至𤣥孫之親九族既睦平章百姓既已也百姓畿内民也言化九族而平章百姓也百姓昭明協和萬邦黎民於變時雍昭亦明也協和黎衆時是雍和也言天下衆民皆變是以風俗大和也尚書中候曰帝堯即政七十載景星出翼鳯凰來庭鄭𤣥注曰翼朱鳥宿朱草生郊嘉禾孳連甘露潤液醴泉出山朱草可以染服者嘉美也書序曰唐叔得禾異畝同穎因名之為孳連醴亦甘修壇河雒榮光起河休氣四塞休美也榮光五色從河出美氣四塞燭燿熠熠也白雲起回風揺龍馬御甲赤文緑色龍形像馬也赤熛怒之使也甲所以藏圖赤文色而緑地也臨壇止霽吐甲圖而帶足霽齊赤止也帶足者帶去也又中候運行篇曰帝堯率羣臣東沉刻璧于雒又曰天子臣放勛德薄施行不元元善也尚書大傳曰堯八眉舜四瞳子八者如八字也又曰堯之王天下一人不刑而四海治春秋元命苞曰堯眉八彩是謂通明厯象日月璇璣玉衡大戴禮曰宰我曰請問帝堯孔子曰髙辛之子也曰放勛其仁如天其智如神就之如日望之如雲富而不驕貴而不豫黄斧紼衣彤車白馬六韜太公曰帝堯王天下之時金銀珠玉弗服錦繡文綺弗衣竒怪異物弗御宫垣屋室弗崇桷椽柱楹不藻茅茨之堦弗剪黼黻之絓履不弊盡不更為也滋味不重糝弗食也温飯煖羮不酸餧不易也不以私曲之故留耕種之時削心約志從事于國政莊子曰昔堯之治天下也使天下之人欣欣焉人樂其生又曰堯治天下之民平海内之政往見四子於姑射之山汾水之陽窅然喪其天下四子許由齧缺被衣王倪也窅然猶幽然自失之貌言堯以有事之心至於無為之人故亦無所用也又曰堯觀于華封華封人曰嘻請祝聖人使聖人壽使聖人富使聖人多男子堯曰多男子則多懼多富則多事多壽則多辱封人曰夫聖人鶉居而鷇音扣食鳥行而無章天下有道則與物皆昌無道則修德就閒千嵗厭世去而上僊乗彼白雲至于帝鄉三患莫至身常無殃又曰堯治天下伯成子髙立為諸侯及堯授舜舜授禹伯成子髙辭為諸侯而耕禹往見之曰堯治天下吾子立為諸侯堯授舜舜授余吾子辭而耕敢問何也子髙曰昔堯治天下不賞而民勸不罰而民畏子今賞罰而民且不仁德自此衰刑自此立後世之亂自此始矣無落吾事俋俋音邑乎耕而不顧尸子曰人之言君天下者瑶臺九累而堯白屋黼衣九種而堯大布宫中三市而堯鶉居糲飯菜粥麒麟青龍而堯素車𤣥駒又曰堯舜有天下四海之内皆治而丹朱商均不與焉而謂皆治者妄也又曰舜受天下顔色不變堯以天下與舜顔色不變知天下無能損益於己也又曰人戴冠躡履譽堯非桀而士或侮慢之知毁譽非其取也韓子曰堯之王天下冬日鹿裘夏日葛衣茅茨不剪桷椽不斵糲粱之食藜藿之羮雖監門之養不敵於此矣又曰由余謂秦穆公曰昔堯有天下飯於土簋飲於土鉶其土南至交阯北至幽都東西日月所出入者無不賔服吕氏春秋曰堯有子十八人不與其子而授舜孟子曰堯使九男二女事舜也又曰堯以天下讓於子州支父對曰以我為天子猶之可也雖然我適有幽憂之病將治之未暇在天下也幽隱也詩云如有隱憂天下重物也而不以天下害其生者故可託天下淮南子曰堯之治天下也舜為司徒契為司馬禹為司空后稷為大田師奚仲為工其導萬民也水處者木谷處者牧陸處者農地宜其事事宜其械械宜其用用宜其人澤臯織網陵阪耕田得以所有易所無以工易所拙是故離叛者寡而聽從者衆譬若播棊於地員者走屋方者處髙各從其所安又曰人之所以樂為天子者以窮耳目之欲而適身體之便也今髙臺層榭人之所麗也而堯採椽不斵素題不枅言梁柱相折矩不著枅櫨也珍怪竒味人之所美也堯糲粱之飯藜藿之羮文錦狐白人之所好也而堯布衣掩形鹿裘禦寒養生之具不加厚而増之以大任重之以憂故舉天下而傳之舜若解重負然非直辭讓也又曰堯治天下政教平德潤洽在位七十載乃求所屬天下之統令四嶽明揚側陋四嶽舉舜而薦之堯堯乃妻以二女以觀其内任以百官以觀其外既入大麓烈風雷雨不迷林屬於川曰麓堯使舜入林麓之中遭大風雨不迷也乃屬以九子堯有九男贈以昭華之玉而傳天下焉又曰堯之有天下也非貪萬民之富也而寧人主之位也以為萬姓力屈强弱相乗衆寡相暴於是堯乃身服節儉之行而明愛之仁以和輯之是故茅茨而不剗採椽而不斵大輅不畫大輅天子車也越席不縁越席束蒲席也大羮不和無有味也粢飯不鑿巡狩行教勤勞天下周流五嶽豈其奉養不足樂哉舉天下以為社稷非有利焉年衰志閔舉天下之重而傳之舜也猶却行而釋蹤也又曰堯之時十日並出焦禾穗殺草木而民無所食窫窳九嬰大風脩蛇封豕鑿齒為民害堯弋鑿齒於疇華之澤疇華南方澤也鑿齒獸持戈楯羿持弓箭射殺也殺九嬰於凶水之上九嬰水之大怪為人之害者北杖之地有凶水者也繳大風於青丘之澤大風大鷙鳥也繳以石磻繳繫矢射之青丘東方也上射十日羿射日墮日中鳥羽而下殺窫音乾窳音庾窫窳狀如龍形人齒食人也斬脩蛇於洞庭洞庭南方水也其蛇食象三嵗而其骨出也禽封豕於桑林封豕大彘也桑林湯禱旱地萬民皆喜置堯為天子也又曰堯王天下而憂不解授舜而憂乃釋說苑曰河間獻王曰堯存心於天下有一人飢曰我飢之也有一人寒曰我寒之也一民有罪曰我陷之也仁昭而義立德博而化廣故不賞而人勸不罰而人懼先生而後殺是堯道也揚子法言曰堯能則天者以其能臣二聖二聖舜禹也又曰堯舜之德輕於鴻毛潜夫論曰堯舜之德譬猶偶燭施明於幽室也前燭照之後燭益明非前燭昧後燭彰也乃二燭相因而成大光荀悅申鑒曰思唐虞於上世瞻仲尼於中古乃知小道足羞也譙子法訓曰唐虞之衣裳文法禹稷之溝洫耕稼人至今被之袁子法書曰堯避舜於濟隂今定陶有堯冢信乎符子曰許由謂堯曰坐于華殿之上面雙闕之下君之榮願亦已足矣夫堯曰余坐華殿之上森然而松生于棟立於櫺扉之内霏焉而雲生于牖雖面雙闕無異乎崔嵬之冠蓬萊雖背墉郭無異乎迴巒之縈崑崙余安知其所以安榮鄧析言曰古詩云堯舜至聖身如脯腊桀紂無道肌膚二尺夢書曰堯夢乘龍上天舜夢擊天鼔續述征記曰城陽縣有堯冡自漢晉二千石及丞尉刋名甚衆堯即位至永嘉三年二千七百二十有一載記於堯碑魏陳王曹植帝堯賛曰火德統位父則髙辛克流共工萬國同臣調適隂陽其惠如春巍巍成功則天之神太平御覽卷八十
