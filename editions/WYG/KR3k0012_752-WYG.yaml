body:
  text: 太平御覽卷七百五十二宋李昉等撰工藝部九巧釋名曰巧者合異􅁼成一體禮曰無作淫巧以蕩上心又曰季康子之母死公輸若方小公輸若匠師方小言年尚㓜未知禮也歛般請以機封歛下棺於椁般若之族多伎巧也見若掌歛事而年尚㓜請代之而欲嘗其伎巧將從之時人服般之巧公肩假曰不可般爾以人之母嘗巧則豈不得以以已字言寧有強使爾者爾借於禮作機巧非也以與已字本同又曰目巧之室則有奥阼周禮曰國有六職百工與居一焉百工司空事官之属於天地四時之職亦處其一也知者創物謂使闓端造器物若世本作者是也巧者述之守之世謂之工父子世以相敎百工之事皆聖人之作也事無非聖人所為也爍金以為刃凝土以為器作車以行陸作舟以行水此皆聖人之所作也凝堅也天有時地有氣材有美工有巧合此四者然後可以為良時寒溫也氣剛柔也良善也續漢書曰張衡性情微有工藝作地動儀以精銅鑄其器圜徑八尺銅形似傾尊其蓋穹隆餙以篆文外有八龍首啣銅丸下有蟾蜍承之其牙發機皆隱在樽中周際無餘如一體焉地動機發龍即吐丸蟾蜍張口受丸聲乃振楊司者覺知即省龍機其餘七首不發則知地振所從起來也合契若神觀之莫不服其竒麗自古以來未嘗有也蜀志曰諸葛亮性巧損益連弩木牛流馬皆出意自為晉書曰嵇康性絶巧而好鍜宅中有一柳樹甚茂乃激水環之每夏月居其下以鍜晉紀曰宋王為圍慕容超張綱巧絶於人乃使綱大治攻具於是城上火石弓弩無所用之晉陽秋曰呉葛衡字思直明達天官能為機巧改作渾天儀又曰衡陽區紙者甚有巧思造作木室作一婦人居其中人扣其戸婦人開户而出當戸再拜還入户内閉戸又作鼠市於中四方丈餘有四門門中有一木人縱四五鼠欲出門木人輙推木掩之門門如此鼠不得出又作指南車及木奴令舂糓作米中宗聞其巧詔補尚方左校沈約宋書曰石虎使解飛姚興令狐生造指南車宋武帝平長安始得此車戎狄所制不甚精緻雖指南多不審正廻曲平聚猶須人力正之范陽人祖冲之甚有巧思常謂宜更構造順帝昇明末齊王為相命冲之造為其制甚精百屈千迴未嘗移變北齊書曰髙隆之性小巧至於公家羽儀百戯服制時有改易不循舊典時論非之文士傳曰張衡嘗作木鳥假以羽翮腹中施機能飛數里後趙録曰邴輔櫟陵人也好學多才藝巧思機智妙於當時襄國宫殿臺榭皆輔所營也馬鈞别傳曰鈞子衡扶風人巧思絶世不自知其為巧也居貧舊綾機伍十綜者伍十躡六十綜者六十躡鈞乃易以十二躡其異文竒變因而作猶自然而成形隂陽之無窮葛洪神仙傳曰葛田者蜀人也刻木作羊能行一旦騎羊入山遂云得仙未知指實也鄴中記曰石虎有指南車及司里車又有舂車木人及作行碓於車上動則人蹋碓行十里成米一斛又有磨車置石磨於車上行十里輙磨一斛此車皆以朱彩為餙唯用將軍一人車行則衆巧並發車止則止中御史解飛尚方人朱猛變所造虎至性好佛衆巧奢靡不可紀也嘗作檀車廣丈餘安四輪作金佛像坐於車上九龍吐水灌之又作一木道人恒以手摩佛心腹之間又十餘木道人長二尺餘皆披袈裟繞佛行當佛前輙揖禮佛又以手撮香投爐中與人無異車行則木人行龍吐水車止則止亦解飛所造也𤣥中記曰魯班以石為禹九州圖今在格城石室山東地巖述異記曰竒肱氏善竒巧能為飛車從風遠行西京雜記曰長安巧工人丁緩者為恒滿燈七龍五鳳雜以芙蓉蓮藕之竒又作卧褥香爐一名被中香爐其法度本出房風至緩更始為之環轉四周而爐體常平可置之被褥故取被褥為名又作九層博山鑪鏤為竒禽怪獸諸靈皆自然運動又作七輪扇連以七輪大皆徑丈並相連續一人運之滿堂皆生風寒焉又曰昭陽殿椽桷皆刻作龍蛇縈繞之狀匠人丁緩李菊所作也其巧為天下第一凉州記曰吕光時有任射者自匿為王欣家奴發覺應死射有竒巧王􅈛魯般之儔也故赦之及大殿歲久傾敗射運巧致思土木俱正王子年拾遺記曰因祇國去王都九萬里其國婦人善織以五色絲内於口中手引結之則成文錦似列燈燭又曰始皇起逰雲臺窮四方之珍材捜天下之巧工人皆能騰虛縁木揮斤斧於空中又曰始皇二年騫霄國獻善畫之工名裔刻白玉為兩虎削玉為毛如真矣不㸃兩目睛始皇㸃之即飛去明年南郡有獻白虎二頭始皇使視之乃是先刻玉者始命去目睛二虎不復能去歴代名畫記曰呉王趙夫人丞相趙達之妹善畫巧妙無雙能於指間以綵織為龍鳳之錦宫中號為機絶孫權嘗歎巴蜀未平思得善畫者圖山川地形夫人乃進寫江湖九州山岳之勢夫人又於方帛之上繡作五岳列國地形宫中號為針絶又以膠續絲髮作為輕幔宫中號為絲絶又曰宋謝莊字希逸性多巧思制木方丈圖天下山川土地各有分理離之則州别郡殊合之則宇内為一老子曰大巧若拙又曰絶巧棄利盜賊無有莊子曰陶者曰我善治埴圓者中規方者中矩匠人曰我善治木曲者中鈎直者應繩夫埴木之性豈欲中規矩鈎繩哉陶道刀反謂窑也埴徐時力反崔云土也司馬云埴土可以為陶器尚書傳云土黏曰埴釋名曰埴膱也又曰百工有器械之巧則壯又曰巧者勞而智者憂無能者無所求又曰無為也而笑巧又曰覆載天地刻雕衆形而不為巧巧者為之妙而物皆自得故無所稱巧也此之謂天樂又曰以瓦注者巧以鈎注者憚以黄金注者昏所要愈重則其心愈矜也又曰郢人堊漫其鼻端若蠅翼使匠石斵之匠石運斤成風而斵之盡堊而鼻不傷郢人立不失容宋元君聞之召匠石曰嘗試為寡人為之匠石曰臣則常能斵之雖然臣質死之矣列子曰周穆王西巡有獻工人名偃師曰臣惟命所試然臣已有所造願王先觀之穆王曰以若俱來吾與若俱觀之翌日偃師謁見王王曰若與偕者何人也對曰臣之所造能倡者穆王驚視之趨歩俯仰言語皆人也巧夫領其頥則歌合律捧其手則舞應節千變百化惟意所適王以為實人也與盛姬内御並觀之伎將終倡者瞬其目而招王之左右侍妾王怒立便欲誅偃師偃師大懼立剖散倡者以示王皆革木膠漆白黑丹青之所為也自内則肝膽心肺脾腎腸胃外則筋骨支節皮毛齒髮皆假物也無不畢具者合㑹復如初王試廢其心則口不能言廢其肝則目不能視廢其腎則足不能歩穆王曰人之巧乃與造化同功乎詔貳車載之以歸夫班輸之雲梯墨翟之飛鳶自謂能之極也弟子東門賈禽滑釐間以偃師之巧告於二子二子終身不敢語藝而時執規矩焉又曰宋人有為其君以玉為楮葉者三年而後成亂之楮葉中而不可别也此人遂以巧食宋國列子聞之曰使天地生物三年而成一葉則物之有葉者寡矣故聖人恃道化而不恃智巧又曰老成子學幻於尹文先生三年不告老成子請其過而求退尹文先生曰昔老􅆅之徂西也顧而告余曰有生之氣有形之狀盡幻也造化之所始隂陽之所變者謂之生謂之死窮數達變因形移易者謂之化謂之幻造物者其巧妙其功深故難終難窮因形者其巧顯其功淺故隨起隨滅知幻化之不異生死也始可與學幻矣吾與汝亦幻也奚須學哉墨子曰公輸子削竹木為鵲成而飛之三日不下自以為至巧墨子謂曰子之為鵲也不如匠之為車轄也須臾豎三寸之木而任五十石之重故利於人謂之巧不利於人謂之拙孟子曰公輸子之巧不以規矩不能成方圓也淮南子曰昔者楚欲攻宋墨子聞而悼之墨子名翟宋大夫悼傷也自魯趨而往十日十夜而不休息裂衣裳裹足至於郢見楚王自從趨走也郢楚都也今南郡江陵七里郢是也曰臣聞大王舉兵將攻宋計必得宋而後攻之乎忘其苦衆勞民頓兵剉銳負天下以不義之名而不得咫尺之地猶且攻之乎王曰必不得宋又且為不義曷為攻之墨子曰臣見大王之必傷義而不得宋王曰公輸子天下之巧士作雲梯之械以攻宋曷為弗取墨子曰公輸設攻臣請守之於是令公輸般設攻宋之械墨子設守宋之備公輸九攻而墨子九拒之終弗能入於是乃偃兵輟不攻宋又曰神機隂開剞劂無迹人巧之妙也而治世不以為民業又曰工人下漆而上丹則可下丹而上漆則不可萬事由此也又曰神明鈎繩者乃巧之具也而非所以為巧又曰神明之事不可以智巧為也不可以筋力致也天地所包隂陽所嘔雨露所濡以生萬殊翡翠瑇瑁瑶碧玉珠文采明朗澤若濡摩而不玩乆而不渝奚仲不能旅魯般弗能造此之謂大巧又曰夫至巧不用劒又曰大匠不斵又曰夫物有以自然而後人事有治也故良匠不能斵金巧冶不能鑠木金之勢不可斵而木之性不可鑠也埏埴而為器刳木而為舟爍鐵而為刃鑄金而為鍾因其可也尹子曰古者創為規矩凖繩使天下倣焉愼子曰百工之子不學而能者非生而巧也言有常事傅子曰馬先生鈞天下之巧者也二子謂古無指南車記言之虛也先生曰古有之二子以白明帝詔先生作之而指南車成此一異也從是天下服其巧矣居京都城内有地可為園患無水以漑之先生乃作飜車令童兒轉之而灌水自覆其功百倍於常此二異也後人有上百戯者能設而不能動帝以問先生可動否鈞曰可動帝曰其巧可益否對曰可益受詔作之以大木雕構使形若輸平潛以自入百官行署變巧發焉設為女樂無象使木人擊鼓吹簫木跳丸擲自出自入百官行署變巧百端此三異也先生見諸葛連弩曰巧則巧矣未盡善也言作之可令加伍倍嘗試一車輪懸瓴甓數十飛之數百歩馬先生之巧雖古般輸墨翟王爾漢世張平子不能過也又曰馬先生為機器未成裴世子疑而難之先生口屈不能對𫝊子謂裴子善乎言而不巧馬氏長於巧而短於言巧者天下之微事抱朴子曰善圍碁者世謂之碁聖故嚴子卿馬綏明有碁聖之名書聖皇象胡昭是也畫聖衛恊張墨是也巧聖張衡馬鈞是也孔叢子曰孔鮒謂陳玉曰梁人有楊田者智巧過人骨勝肉飛博物志曰近世有田夫至巧而不覺也其婦稱之猶不自知乃削木為小麥試糶之糴者無疑歸磨乃覺非麥論衡曰傳稱魯般墨子之巧刻木為鳶飛之三日而不集夫言以木為鳶飛之可也言其三日不集增之也猶世傳言魯般巧亡其母矣言其巧工為母作木車馬木人御者機闗備具載母上臺去去而不還失其母焉楊泉物理論曰夫蜘蛛之羅網蜂之作巢其巧妙矣而况於人乎故工匠之方矩圓規出乎心巧成於手迹非睿敏精宻孰能著􅈴形成器用哉晉讚曰陳勰以工巧見知太平御覽卷七百五十二
