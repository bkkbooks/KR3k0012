body:
  text: 太平御覽卷一百五十七宋李昉等撰州郡部三叙州叙郡叙縣邑郷黨閭里坊鄰附叙州釋名曰州注也郡國所仰注説文曰州疇也疇其土而生之也河圖括地象曰長城者為州又曰崑崙東南地方五千里名神州中有五山帝王居之又曰天有九道地有九州天有九部八紀地有九州八柱河圖曰九州殊題水泉剛柔各異青徐角羽集寛舒遲人聲緩其泉鹹以酸荆揚角徵㑹氣漂輕人聲急其泉酸以苦梁州商徵接剛勇漂人聲騫其泉苦以辛兖豫宫徵合平靜有慮人聲端其泉甘以苦雍冀合商羽端駃烈人聲㨗其泉辛以酸尚書舜典曰肇十有二州范寧注曰禹平水土置九州舜爲冀州廣大分爲并州燕置幽州分齊爲營州始爲十二州咸有一德曰以有九有之師爰革夏正九有者九州也尚書大傳曰古之處師八家而爲隣三隣而爲朋三朋而爲里五里而爲邑十邑而爲都十都而爲師州有十師焉鄭𤣥注曰州凡四十三萬二千家此蓋虞夏之數也毛詩商頌曰帝命式于九圍九圍九州也詩含神霧曰邶􅅠衛王鄭此五國者千里之域處州之中名曰地軸周禮地官大司徒曰五黨爲州使之相賙鄭𤣥注曰州二千五百家賙其困乏五州爲鄉使之相賓又周禮春官保章氏以星土辨九州之地所封之域皆有分星以觀妖祥又夏官職方氏曰職方氏掌天下之圖以掌天下之地辨其邦國都鄙天下之圖如今司空輿地圖乃辨九州之國使同貫利貫事也禮記王制曰凡四海之内九州州方千里春秋説題辭曰州之言殊也合同類異其界也爾雅曰兩河間曰冀州自東河至西河河南曰豫州自河南至漢也河西曰雍州自河西至黑水漢南曰荆州自漢南至衡山之陽江南曰楊州自江至南海也濟河間曰兖州自河東至濟也濟東曰徐州自濟東至海也燕曰幽州自易水至北狄齊曰營州自岱東至海也孝經援神契曰計校九州之别土壤山陵大川澤所注莱沛所生鳥獸所聚九百十一萬八千二十四頃言民少不足以盡地利莱沛水傍沮洳不可耕者磽确不墾者其餘提封千五百萬二千頃論語摘輔象曰兖豫屬上台九州繫三台荆揚屬下級下級上之下等一台各有上下梁雍屬上中中台之上冀州屬下級錯雜也屬中台之下下台之上青州屬下上下台之上徐州屬下下下台之下也五經異義曰地有九州足以承天史記曰鄒衍云中國於天下乃八十一分居其一分名曰赤縣神州赤縣神州内自有九州禹之序九州是也下得為州數中國外如赤縣神州者九乃所謂九州也於是有禆海環之人民禽獸莫能相通如一區中者乃為一州如此者九乃有大瀛海環其外天地之際焉後漢書曰獻帝建安十八年復禹貢九州獻帝春秋曰時省幽并州以其郡國倂於冀州省司𨽻校尉及涼州以其郡國併於雍州省交州倂荆州益州於是有兖豫青徐荆揚冀益雍也九數雖同禹貢無益州有梁州然梁益亦一地也又曰順帝時李同上書曰夫天下之大譬之一人之身本朝者心腹也州郡者四支也心腹病則四支不舉故臣之憂在心腹之疾非四支之患應劭漢官儀曰孝武皇帝南平百越北攘戎狄置交阯朔方之州復徐梁之地改雍曰梁改梁曰益凡十三州所以交朔獨不稱州明示帝王未必相襲始開地方遂交南方為子孫基址也漢官改詁曰冀趙常山胡廣注曰經曰冀州既載居趙國今治常山兖衛濟河經曰濟河惟兖州衛國今治山陽青齊海岱經曰海岱惟青州居齊國今治焉徐魯淮沂經曰海岱及淮惟徐州又曰淮沂其又居魯國今居豫州而治東海揚吳彭蠡經曰淮海惟揚州又曰彭蠡既瀦居吳國今治九江荆楚衡陽經曰荆及衡陽惟荆州居楚國今治武陵益庸岷梁經曰華陽黒水惟梁州漢改梁州爲益州今治廣漢凉邠黑水經曰黑水西河惟雍州居邠國漢改雍州爲邠州國右扶風其邑縣屬司隷部不復屬州今治漢陽雍别朔方漢别雍州之地置朔方刺史交趾南越漢平南越之地置交趾刺史别諸州治蒼梧幽燕朝鮮經無幽州而周官有焉蓋冀之别也居燕國今廣陽是并代晉翟經無并州而周官有蓋州之别也居燕國今廣陽是淮南子曰天地之間九州八柱又曰九州大統方千里九州之外乃有八􅶝亦千里又曰何謂九州東南神州曰農土東南農土后稷所經緯也故曰神州也正南次州曰沃土沃盛也五月建午稼穡長故曰沃土西南戎州曰滔土滔大也七月建申萬物壯大故曰滔土正西弇州曰并土并猶成八月建酉百穀成熟故曰并也正中冀州曰中土冀大也爲四方内主故曰中土西北台州曰肥土正北濟州曰成土説未聞東北薄州曰隠土薄猶平也隂氣所隠伏也故曰隠土正東揚州曰申土申復也隂氣盡伏東北陽氣復起東方故曰申土輿地志曰周成王之時周公作輔定官分職改禹九州以徐梁合之青雍分冀州之域爲幽并二州風俗通曰周禮五爲州州疇也州有長使之相賙是也物理論曰九州變易交錯不同禹貢有梁州周官有并州爾雅有營州無青州漢興武帝開拓三方立十三州通并梁之數而増益焉太乙式占周公城名錄曰黃帝受命風后受圖割地布九州置十二圖張衡靈憲曰崑崙東南有赤縣之州風雨有時寒暑有節茍非此州南則多暑北則多寒東則多陽西則多隂故聖王不處焉敘郡釋名曰郡羣也人所羣聚也秦改諸侯置郡縣隨其所在山川土形而立其名苖恭十四州記曰秦始皇廢五等之爵立郡縣之官以公國為大郡以侯伯為小郡大郡曰守小郡曰都尉漢書地理志曰漢孝平時凡郡國一百三十二侯國二百四十一又曰六郡者金城隴西天水安定北地上郡也續漢書郡國志曰光武中興命併省郡國明章和至於順帝凡郡國一百五仍爲十三郡又曰光武以官多役煩乃併省郡國十凡縣道侯國四百餘所後爲十三州部司𨽻理河南今洛陽豫州理洛陽亳州兖州理昌邑今兖州金鄉縣徐州理剡今泗州下邳縣青州理臨淄今青州臨淄縣凉州理隴今秦州隴城縣并州理晉陽今太原冀州理鄗音郝今趙州高邑縣幽州理薊今幽州薊縣揚州理厯陽今和州縣荆州理漢壽今朗州武陵縣交州理廣信今梧州蒼梧縣至於末加置郡國百有五凡縣道侯國千一百八十東有樂浪郡西有燉煌郡南有日南郡北有雁門郡西有永昌郡廣袤如前漢通典曰秦始皇帝併天下分置三十六郡三十六者三川河南東陽南郡九江漳郡㑹稽潁川碭郡泗水薛郡琅琊齊郡上谷漁陽右北平遼西遼東代郡鉅鹿邯鄲上黨太原雲中九原鴈門上郡隴西北地漢中巴郡蜀郡黔中長沙凡三十五與内史爲三十六郡郡各領縣縣萬户已上爲令减萬戸為長平百越又置西郡閩中南海桂林象郡合四十郡郡置一守一丞兩尉以典之監侍御史掌監諸郡漢有天下王侯郡國並置焉迄於平帝户口繁劇凡新置郡國六十七與秦三十六合一百三改周雍州曰凉州復置夏之徐梁三州而改梁曰益北置朔方南有交趾别置二刺史凡十三部京益荆揚青豫兖徐幽并冀十一州交趾朔方二刺史合十三部刺史十三人各掌一州括地志曰魏武輔政吳蜀三方鼎峙疆埸不定建安中置郡十二新興樂平西平新平略陽隂平帶方譙郡樂陵章武南陽襄陵等是也又省上郡朔方五原雲中定襄漁陽廬江等七郡文帝受禪又置七郡朝歌陽平弋陽魏興新城義陽安豐也明帝置六郡平公孫度得遼西遼東帶方𤣥莬樂浪又置上庸一郡少帝又置平陽一郡并得漢舊郡國五十四蜀得二十郡先主初置九郡巴東巴西梓潼江陽汶山漢嘉朱提雲南涪陵并得漢舊巴郡廣漢犍爲牂牱越嶲益州漢中永昌南安武都也晉太康平吳之後天下一統平吳得州四交廣荆陽也郡四十三凡州十六太康地記曰司冀兖豫荆揚徐青幽并雍梁凉益交廣也晉自湯隂敗後羌羯交侵至於劉曜陷洛陽於是司冀雍凉青并豫幽平秦營十二州並淪没矣後魏漢文帝都洛陽開拓土宇明帝熙平元年凡州六十八至武定年凡州一百一十郡五百一十九周明帝受魏禪至大象二年凡州二百一十一隋文帝受周禪至開皇三年罷天下郡其縣但𨽻州而已九年平陳已後四海一家大業三年罷州爲郡四年大簿凡郡國一百八十三唐貞觀十三年大簿凡州府三百五十八叙之為十道應劭漢官儀曰秦用李斯議分天下爲三十六郡凡郡或以列國陳魯齊吳是也或以舊邑長沙丹陽是也或以山泰山山陽是也或以川原西河河東是也或以所岀金城城下有金酒泉泉味如酒豫章章樹生庭中鴈門鴈之所育是也或以號令禹合諸侯大計東冶之山㑹稽是也京兆絶高曰京京大也十億曰兆欲令帝都殷盈也左輔右弼蕃翊承風也張掖始開垂張臂掖也苗恭十四州記曰秦兼天下始皇二十六年廢五等之爵立郡縣之官以公國爲大郡侯伯為小郡大郡曰守小郡曰都尉改公侯之封而言郡郡者君也君至尊也言郡守專權君臣之禮更崇也今之郡字君在其左邑在其右君爲元首邑以載民故取名於君而謂之郡也風俗通曰周制天子方千里分爲百縣縣有四郡故左氏傳曰上大夫受縣下大夫受郡敘縣釋名曰縣懸也懸係於郡也説文曰縣邑也周書曰交田方六百里因四方爲千里分以百縣縣有四郡郡有鄙鄙不過百室以便野事周禮地官遂人曰五家爲隣五隣爲里五里爲酇五酇爲鄙五鄙爲縣五縣爲遂禮記王制曰天子之縣内方百里之國九七十里之國凡二十有一五十里之國六十有三凡九十三國縣内夏時天子所居州界也苗恭十四州記曰縣萬户以上爲令則子國也千户爲長男國也今人呼縣爲百里之男本方百里也故言今之百里古之諸侯又曰縣者絃也言施繩用法狀如絃絃聲近縣故以取其名風俗通曰周禮百里曰同所以奬王室協風俗總名縣縣𤣥也言當𤣥靜平徭役邑附尚書大傳曰五里爲邑周禮地官曰四井爲邑易訟卦曰逋其邑人三百户周書曰周公乃作大邑于成周左傳曰凡邑有宗廟先君之主曰都曰邑穀梁傳曰齊人取子糾殺之十室之邑可以隱死以千乗之魯而不能存子糾公爲病矣論語曰十室之邑必有忠信如丘者焉不如丘之好學也史記曰黃帝邑于涿鹿之阿遷徙往来無常處以師兵為營衛張華詩曰駕言遊東邑東邑紛穰穰婚姻及良時嫁娶避當梁鄉附釋名曰鄉向也衆所向也周禮地官司徒曰五州爲鄉使之相賓論語曰孔子於鄉黨恂恂如也似不能言者又曰互鄉難與言童子見門人惑後漢書曰張湛爲左馮翊告歸平陵望寺門而歩主簿進曰明府位尊德重不宜自輕湛曰禮下公門軾路馬孔子於鄉黨恂恂如也父母之國所宜盡禮何爲輕哉唐書曰張道源并州祁人也年十五父死居喪以行孝稱縣令郭湛改其所居爲復禮鄉至孝里老子曰以鄉觀卿莊子曰遊於無何有之鄉鄭𤣥别傳曰國相孔文舉教高密縣曰公者人德之正號不必三事大夫也今鄭君鄉宜曰鄭公鄉黃公交廣記曰秦兼天下改附庸爲鄉鄉則有族今嗇夫是也鄉之言境言其在人境域内非天王所置故言鄉零陵先賢傳曰鄭産泉陵人爲白土嗇夫漢末産子一歲輒岀口錢民多不舉産乃敕民勿得殺子口錢自當代岀因名其鄉曰更生鄉萬歲厯曰黃帝六年正月獲彭綺是歲由拳西鄉人産兒墮便語云天方明河欲清鼎脚折金乃生於是因曰語兒鄉郡國志曰秭歸縣屈原鄉里南岸曰歸鄉西岸曰秭歸屈原蹔歸鄉里因曰歸鄉曰屈原姊女嬃聞原還亦來喻之因曰姊歸也王子年拾遺記曰張掖郡郅竒字君珍居喪盡禮以淚灑石石即成痕著枯木枯草在冬必茂浸地成鹹俗謂之鹹鄉漢帝嘉其孝異表銘其邑改曰孝行之鄉歲時使立廟祭祀黨附周禮地官司徒曰四閭爲族使之相葬五族爲黨使之相助釋名曰五百家爲黨黨長也一聚所尊名也六韜曰友之友謂之朋朋之朋謂之黨黨之黨謂之羣閭附周禮地官司徒曰五家爲比使之相保五比爲閭使之相愛説文曰閭里門也周禮謂比爲閭閭侣也二十五家相羣侣也尚書曰武王克商式商容閭范曄後漢書曰袁忠子秘爲郡門下義生黃巾起秘從太守趙謙以侍繫之軍敗秘與功曹封觀等七人以身扞刃皆死於陣謙以得免詔復秘等閭號曰七賢閭戰國䇿曰王孫賈年十五齊閔王岀走失王之處其母曰汝朝岀而晩來則吾倚閭而望又曰齊桓公宫中七市女閭七百管仲故爲三歸之臺以掩桓公之罪吕氏春秋曰魏文侯過段干木之閭而式之里附周禮地官遂人曰五家爲隣五隣爲里風俗通曰里者止也五十家共居止也禮記曲禮上曰里有殯不巷歌春秋潛譚巴曰里社鼔自鳴此里有聖人論語曰里仁爲美又曰東里子産潤色之論語撰考䜟曰里名勝母曽子斂襟漢書曰禮古經者岀魯淹中蘓林曰里名也又曰盧綰與高祖同里閈又曰宣帝舍長安尚冠里東觀漢記曰鮑永字君長爲魯平太守時彭豐等不肯降後孔子闕里無故荆棘自闢從講室掃除至孔里永異之召郡府丞謂曰方今阨急而闕里無故自滌意豈夫子欲令太守大行饗誅無狀也乃修學校理請豐等㑹手格殺之張璠漢記曰荀爽兄弟八人時人謂之八龍舊居西豪里縣令苑康曰昔髙陽氏有才子八人今荀氏亦有子八人因改其里曰髙陽宋書曰太原王知𤣥者僑居㑹稽郯縣居家以孝聞及丁憂哀毁而卒帝嘉之改所居青苦里爲孝家里宋畧曰張敷幼樹風規貞心簡立居喪滅性孝道淳深宜追甄異以旌厥里改所居里曰孝張里又曰散騎常侍袁瑜薦㑹稽郭世道詔改所居曰孝行里又曰太祖十三年春鳯凰見于京師衆鳥隨之改其地曰鳯凰里唐書曰劉禕之貞觀元年詔追入京以母老固辭太宗許其終養江南道大使龔譽嘉其至孝賜以米帛因上表旌其門閭改所居為孝慈里典畧曰衛襄字叔遼河東人也修行至孝州郡嘉之改其里謂之孝德里晉宫閣名曰洛陽城中諸里年和里宜壽里永年里宜都里太學里富儲里德官里大雅里孝敬里永安里安城里左池里東臺里安民里延壽里日中里歩廣里西國里東半里穀陽里北恢里安武里孝西里太始里光林里石市里宜秋里葛西里西河里宣賜里延壽里攸陽里南孝里中恢里宜年里渭陽里利名里西樂里北溪里西義里東統里宣都里石羊里中安里右池里潘岳西征賦曰所謂尚冠修城河棘宣明建陽昌隂北煥南平皆夷漫滌蕩亡其處而有其名注云皆里名也杜祭酒别傳曰桓宣武舘於赤欄橋南曰延賢里荆州記曰峴山南至宜城百餘里舊説其間雕牆崇峻漢靈帝末其中有卿士刺史二千石數十人朱輪駢燿華蓋接隂㑹於太山廟荆州刺史行部見其雅嘆其盛勑縣號爲冠蓋里荆州圖記曰秭歸縣北有屈原故宅方七頃累石爲屋其里名樂平里伏琛齊地記曰臨淄有梧臺里益州記曰州南蜀時故錦澗也其處號錦里伍輯之從征記曰譙周云孔子後魯人就冡次而居者百有餘家曰孔里郡國志曰齊臨淄縣東有蕩隂里諸葛亮梁父吟云歩岀齊城門遥望蕩隂里里内有三墳纍纍皆相似借問誰家墳田疆古冶子㑹稽典錄曰陳囂與民紀伯爲隣伯夜竊藩囂地自益囂見之伺伯去後密枝其藩一丈以地益伯伯覺之慙惶既還所侵又却一丈太守周府君高囂德義刻石旌表其閭號曰義里坊附漢宫閣名曰洛陽故北宫有九子坊晉宫閣名曰洛陽宫有顯昌坊修城坊緩福坊延祿坊休徵坊承慶坊桂芬坊椒房坊舒蘭坊藝文坊隣附尚書曰睦乃四隣以蕃王室毛詩曰洽比其隣周禮五家爲隣五隣爲里周易曰東隣殺牛不如西隣之禴祭左傳僖公曰棄德不祥怒隣不義又曰棄信背隣患孰恤之又曰救災恤隣天之道也又曰親仁善隣國之寳也又昭元年曰晏子如晉景公使更其宅還而毁之曰諺曰非宅是卜惟隣是卜又曰諸侯守在四隣論語曰孰謂微生高直或乞醯焉乞諸其隣而與之又曰德不孤必有隣後漢書曰張霸字伯饒博覽五經諸生孫林劉固段著等慕之皆市宅其傍以就學焉南史曰宋季雅市宅在吕僧珍宅側吕問宅價曰千一百萬吕怪其貴宋曰一百萬買宅千萬買隣也物理論曰買宅者先定隣焉又曰置隣之直貴於買宅也太平御覽卷一百五十七
