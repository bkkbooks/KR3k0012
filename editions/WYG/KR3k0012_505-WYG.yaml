  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_505-1a, image: WYG0897/WYG0897-0535c.png}
body:
  text: 太平御覽卷五百五宋李昉等撰逸民部五逸民五蕭子顯齊書曰禇伯玉字元璩吳郡錢塘人也年十八父為婚婦入前門伯玉從後門出遂徃剡居瀑布山時人比之王仲都在山三十餘年隔絶人物王僧達為吳郡備禮致之伯玉不得已停郡信宿纔交數言而退寧朔將軍丘珍孫與僧達書曰聞禇先生出居貴館此子滅影雲棲不事王侯抗髙不食有年載矣自非折節好士何以致之望其還策之日蹔紆清塵亦願助為轡答曰禇先生従白雲逰舊矣此子索然唯朋松石介孤峯絶嶺者積數十載近故要其來此冀日夜比談討芝桂借訪荔蘿若己窺煙波臨滄洲矣知君欲見當為申譬太祖即位手詔吳會二郡以禮迎遣又辭疾上不欲違其志勅於剡白石山立太平館居之又曰明僧紹字承列平原鬲人隱長廣郡嶗山詔徴為正員郎稱疾不就其後止與崔思祖書曰不食周粟而食周薇古猶發議在今寧得息談耶僧紹弟慶符為青州刺史罷任僧紹隨歸住江乗聶山太祖謂慶符曰卿兄髙尚其事亦堯之外臣與朕雖不相接有時通夢乃贈紹竹根如意南史曰郭希林武昌人也曽祖翻晉世髙尚不仕希林少守家業徴召一無所就卒于家亦隠居不仕又曰辛普明字文達少就闗康之受業至性過人居貧與兄共處一帳兄亡仍施帳於靈蚊甚多通夕不得寢而終不道侵螫僑居會稽會稽士子髙其行當塟兄皆送金為贈後至者不復肯受人問其故答曰本以兄墓不周故不逆親友之意今實以足豈可受世人餘贈耶齊豫章王嶷為揚州徴為議曹從事不應又曰樓恵明字智逺立性貞固有道術居金華山舊多毒害自恵明居之無復辛螫之苦藏名匿迹人莫知之宋明帝召不至齊髙帝徴又不至文恵太子在宫苦延方至仍又辭歸俄自金華輕棹西下及就路迴之豐安旬日間俄賊起唯豐安獨全時人以為有先覺齊武帝勅為立館又曰漁父者不知姓名亦不知何許人也太康孫􅃡為潯陽太守落日逍遥渚際見一輕舟凌波隠顯俄而漁父至神韻瀟洒垂綸長嘯緬甚異之乃問有魚賣乎漁父笑而答曰其釣非釣寧賣魚者耶􅃡忿怪焉遂褰裳涉水謂曰竊觀先生有道者也終朝鼔枻良亦勞止吾聞黄金白璧重利也駟馬髙盖榮勢也今方王道文明守在海外隱淪之士靡然向風子胡不贊緝熈之美何晦其用若是也漁父曰僕山海狂人不達世務未辯貴賤無論榮貴乃歌曰竹竿籊籊河水悠悠相忘為樂貪餌吞鈎非夷非恵聊以忘憂於是悠然鼔棹而去又曰顧歡字景伯吳興鹽官人也家世寒賤父祖並務農歡獨好學年六七嵗知推六甲家貧父使田中驅雀歡作黄雀賦而歸雀食稻過半父怒欲撻之見賦乃止鄉中有學舍歡貧無以受業於舍壁後倚聽無遺忘者夕則燃松節讀書自照及長篤志不倦聞吳興東遷邵𤣥之能𫝊五經文句假為書師從之受業同郡顧凱之臨縣見而異之遣諸子與遊從豫章雷次宗諮𤣥儒諸義母亡水漿不入口廬於墓側遂隠不仕於剡天台山開館聚徒受業者常近百人歡早孤讀書至哀哀父母生我劬勞輒執書慟哭由是受業者廢蓼莪篇不復講焉又曰杜京産字景齊吳郡錢塘人也父道鞠州從事善彈琴京産少恬靜閉意榮宦頗涉文義専修黄老會稽孔凱清剛有峻節一見而為交郡命主簿州辟從事皆稱疾不去與郡顧歡同契始寧東山開舍受學齊建元中武陵王曄為會稽齊髙帝遣儒士劉瓛入東為曄講瓛故徃與之遊曰杜生當今之臺尚也永明十年孔珪陸澄沈約表薦京産徴為奉朝請不至於會稽聚徒教授建武初徴員外散騎常侍郎京産曰莊生持釣豈為白璧所迴辭疾不就又曰孔道徽會稽山隂人守志業不仕與杜京産友道徽父祐志行通神隠於四明山谷有數百斛錢視之如瓦石太守王僧䖍與張緒書曰孔祐敬康曽孫也行動幽祗徳標松桂引為主簿遂不可屈此古之遺徳也道徽少厲髙行能世其家風隱居南山終身不窺都邑豫章王嶷為州辟西曹書佐不至鄉宗慕之又曰臧榮緒京莞莒人也少孤窮自灌園以供祭祀母喪灑掃堂室置筵席朔望輒拜薦焉甘珍未嘗先食純好學括東西晉為一紀録志𫝊一百一十卷隠居京口教授齊髙帝為揚州刺史徴榮緒為主簿不至建元中司徒禇彦回啓髙帝稱述其美以置祕閣榮緒謂人曰昔吕尚奉丹書武王致齊降位學釋教誡並有禮敬之儀因甄明至道乃拜著五經序論常以宣尼庚子日生其日陳五經拜之自號披褐先生又以飲酒亂徳言常為誡永明六年卒初榮緒與闗康之俱隠在京口時號為二隱又曰吳苞字天盖濮陽鄄城人也儒學善三禮及老莊宋泰始中過江聚徒教學冠黄葛巾蔬食二十餘年與劉瓛俱於褚彦回宅講授齊隆昌元年徴為太學博士不就始安王遥光及江祐徐孝嗣共為立館於中山下教授朝士多到門焉當時稱其儒者自劉瓛已後聚徒講授唯苞一人而已以夀終又曰蔡會字休明陳留人清抗不與俗人交李偽謂江斆曰古人稱安平清白曰夷湼而不緇曰白至如蔡休明者不可謂之夷白乎又曰徐伯珍字文楚東陽太和人也少孤貧無紙常以竹葉箭箬䉀及地上學書山水瀑出漂溺宅舍村鄰皆奔走伯珍累牀而坐讀書不輟叔父璠之與顔延之友善還去蒙山五精舍講授伯珍移従積學十年究尋經史遊學者多依之太守琅琊王曇生吳郡張淹並加禮辟伯珍應召便退如此者凡十二焉好釋氏老莊兼明道術嵗常旱伯珍筮之如期而雨舉動有禮過曲木之下趨而避早喪妻晩不復重娶自比曽參宅南九里有山伯珍移居之階戸之間木生皆連理門前梓樹一年便合抱白雀一雙栖其戸牖論者以為隠徳之感也又曰沈麟士字雲禎吳興武康人也父䖍之宋樂安令麟士幼而俊敏年七嵗聽叔父岳言𤣥賔散言無所遺失岳撫其肩曰若斯文不絶其爾乎及長博通經史有髙尚之志親亡喪盡禮服闋忌日輒涕泣彌旬居貧織簾誦書日夜不息鄉里號為織簾先生常行路隣人認其所著屐麟士曰是卿屐耶跣而返行人得屐送前者還之麟士笑而受之宋文帝令何尚之抄撰五經訪舉學士縣以麟士應選不得已至都尚之深相接及去尚之謂子偃曰山藪固多竒士沈麟士黄叔度之流也汝師之麟士常苦無書因遊都下厯觀四部畢歎曰古人亦何人哉少時稱疾歸鄉不與人物通或勸之仕答曰魚懸獸檻天下一契聖人𤣥悟所以毎履吉先吾誠未能景行坐忘何為不希企日損乃作𤣥散賦以絶世隠居於吳差山講經從學之士數百人各營屋宇依止其側時為之語曰吳差山中有賢士開門教授居成市又曰諸葛璩字幼玫琅琊人也世居京口璩幼事徴士闗康之博涉經史復就徴士臧榮緒者晉陽稱璩有發摘之功方之壺遂齊建武初江把薦璩于明帝言璩安貧守道閲禮敦詩如其簡退可揚清激濁為議曹從事帝許之璩辭不赴陳羣謝朓為東海太守下教揚其風槩餉榖百斛梁天監中舉秀才不就璩性勤于誨誘後生就學者日至居宅狹陋無以容身太守張文為起講舍璩處身正清妻子不見喜愠之色旦夕孜孜講讀不輟時人益以此宗之又曰劉恵斐字宣文彭城人也少博學能屬文起家梁安成王法曹行叅軍常還都途經潯陽逰于匡山遇處士張孝秀相與甚勤遂有終焉之志因不仕居東林寺又於山北搆園一所號曰離垢園時人目為離垢先生逺近敬慕之簡文遺以几杖論云自逺法師殁後將二百年始有張劉之盛也又曰范元琰字伯珪居父憂時童孺哀慕盡禮親黨異之及長好學博通經史兼精佛義祖母患癰常自含吮與人言常恐傷物居家不出城市雖獨居如對賔客見者莫不改容憚之家八負唯以園蔬為業常行山見人盜其松元琰遽退走母問其故具以實答問盜者為誰答曰向所退畏其愧恥舍其名願不泄也於是母子祕之或有涉溝盜其筍者元琰因伐木為橋以渡之自是盜大慙一鄉無復草竊齊建武初徵為曹武平西參軍不至於是始安王遥光為揚州謂徐孝嗣曰曹武參軍豈是禮賢之職欲以西曹書佐聘之會遥光敗不果時人以為恨梁書曰阮孝緒字士宗尉氏人父彦之誡曰宜思自勗以庻爾躬答曰願追赤松子於滄海逐許由於窮谷耳自是屏居一室非晨昏定省未嘗出戸外兄王宴貴顯緒度必顛覆聞笳聲至閭孝緒乃穿籬逃避及宴誅竟獲免時中丞任昉欲徃見之不肯乃歎曰其室雖邇其人何逺自是聞風者莫不歛袵望塵而息也又曰陶𢎞景字通明丹陽人生十嵗讀葛洪神仙𫝊曰仰青雲覩白日不覺為逺齊髙祖作相引為侍讀永明初脱朝服掛神武門上表辭禄詔乃許之居句容曲上自號華陽隠居武帝即位有吉凶征討大事皆使咨問時人號為山中宰相預知梁祚覆沒乃製詩曰夷甫任散誕平叔坐論空豈知昭陽殿遂作單于宫及侯景傾陷簒位果在昭陽殿皆如其言大同初卒八十五顔色不變屋中有異香氣累日氛氲諡貞白先生後有詩方枕中術及本草又曰沈顗吳興人也性有至介常慕黄叔度徐孺子之為人每獨處一室罕見其面從叔彀貴顯當朝每還其賔客迎送填咽顗送迎不出城彀乃歎曰吾乃今知貴不如賤也又曰何㸃字士哲廬江人也㸃雖不出入城府而遨遊於外不簮不帶駕柴車躡草履隨心所適致醉而歸士大夫多慕送之時人謂之通隠後周書曰韋夐字敬逺孝寛之兄也志尚夷簡淡於榮利太祖經畧王業側席求賢備禮辟之終不能起彌加敬重世宗即位禮遇逾厚勅有司日給河東酒一斛號曰逍遥公年七十而卒陳書曰馬樞字要理扶風人初為梁邵陵王綸學士綸舉兵援臺城留書二萬卷樞肆意尋覽將遍乃喟然歎曰吾常聞貴爵位者以巢由為桎梏愛山林者以吕伊為管庫今乃稽諸典史質論其義亦各從其所好乃隠於白茒山清白洞太平御覽卷五百五
