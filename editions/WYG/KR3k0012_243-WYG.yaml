body:
  text: 太平御覽卷二百四十三宋李昉等撰職官部四十一儀同特進總敘大夫金紫光禄大夫光禄大夫大中大夫中大夫中散大夫柱國奉朝請致仕官儀同東觀漢記曰鄧隲字昭伯延平元年拜為車騎将軍儀同三司儀同三司始自隲也蜀志曰黄權降魏文帝善之景初三年拜車騎将軍儀同三司王隠晉書曰泰始七年以鄭袤為司馬天子臨軒遣使就第拜授袤遣息稱疾上送印綬至于十數久之見許以疾就第拜儀同三司置舎人官騎賜牀帳簟褥錢五十萬又曰華廙為太子少傅甚得輔導之義河南尹韓夀賈后之妹夫欲以女配廙孫陶不許由是有恨故不正三司及疾篤拜儀同三司晉起居注曰泰始八年詔曰衛將軍羊祜厯文武有佐命之勲其為車騎将軍開府如三司之儀又曰元年詔曰中書監光禄大夫張華厯世腹心朕所憑賴故酬其勲績使儀同三司而虛冲挹損難違髙尚其以光禄大夫儀同三司本職如故又給親信滿百人又曰元康元年詔曰光禄大夫王戎光禄大夫裴楷開府辟召儀同三司晉中興書曰郗愔咸安元年拜都督浙江東五郡諸軍事進位鎮軍開府儀同三司又曰蔡謨免皇太后以謨為左光禄大夫開府儀同三司遣謁者孟洪就加册命謨上書陳謝遂以疾篤不朝賜几杖門施行馬齊書曰徐孝嗣加開府儀同三司孝嗣聞有詔歛容謂左右曰吾徳慙古人位登衮職将何以堪之明君可以理奪必當死請若不獲命正當角巾丘園待罪家巷耳固譲不受齊職儀曰開府儀同三司置舎人官騎建初三年馬防為車騎将軍儀同三司魏以黄權為車騎開府此後甚衆将軍開府依大司馬朱服光禄大夫開府依司徒皂服北史曰裴文舉武成二年就加使持節驃騎大将軍儀同三司蜀土沃饒商販百倍或有勸文舉規利文舉答之曰利之為貴莫若安身安道非貨之謂是以不為之非惡財也後周書曰李賢遷驃騎大将軍開府儀同三司太祖之奉魏太子西巡也至原州遂幸賢第譲齒而坐行鄉飲酒禮焉其後太祖又至原州令賢乘輅備儀服以諸侯㑹遇禮相見然後幸賢第歡宴終日凡是親族頒賜有差陳書曰張昭達以平晉異功授鎮前将軍開府儀同三司初文帝嘗夢昭達升台鉉及旦以夢告之至是侍宴酒酣顧昭達曰卿憶夢不何以償夢昭達曰當効犬馬之用以盡臣節自餘無以奉償隋書曰何稠安集嶺南有欽州刺史甯猛力師還迎軍初猛力掘山洞欲圗為逆至是惶懼請身入朝稠以其疾篤固示無猜貳遂放還州與之約曰八九月間可詣京師相見稠還奏状上意不懌其年十月猛力卒上謂稠曰汝前不将猛力来今竟死矣稠曰猛力共臣為約假令身死當遣子入侍越人性直其子必來初猛力臨終誡其子長真曰我與天使為約不可失信於國士汝葬我訖即宜上路長真如言入朝上大悦曰何稠著信蠻夷乃至於此以勲授開府齊王儉拜儀同三司章曰聞日中則昃盈虚之定分器滿則傾往復之常理遂乃班同衮章燮和台曜外參論道内總百司物議惟塵自識非據梁庾肩吾為武陵王拜儀同章曰臣宅慶紫霄聫休皇極地均西月既無跡而成髙仕若乘風故不行而自逺今者四郊無壘天下同文都尉春田猶居塞外單于冬獵不入漁陽臣坐牧三邊非勞七戰豈能屯兵大夏封萬里之侯飛箭聊城受千金之夀論其才望有懼茂𢎞先佩印綬常羞叔度隋江總為太保蕭公謝儀同三司表曰阪泉野戰曽無汗馬之勞代邸運籌又闕前驅之勇薄伐專征早遊邊外執玉奉酧久􅉻朝則王人降止朝冊逺臨奉述勑書曲停表奏滄波阻夐既杜敬仲之辭闕路修長致絶趙衰之譲心馳紫路登文石而莫由目送白雲拜承明之未果特進東觀漢記曰鄧禹右将軍官罷以特進奉朝請漢雜事曰諸侯功徳優盛朝廷所敬異者賜位特進在三公下無秩後漢書曰梁商以女立為皇后妹為貴人加商位特進更増國七賜安車駟馬謝承後漢書曰趙典道懿尊為國師位特進七為列卿寝布被瓦器食也晉書百官表曰特進官品苐二漢制皇后之父率為此官傅咸奏曰公品苐一執珪坐侍臣之上特進品苐二執皮帛坐侍臣之下今啓特進宜執璧繼沈約宋書曰特進衛驃騎将軍劉放衛将軍孫資等遜位以侯就第位特進其諸官加特進者從本官供給特進但為班位而已不别有吏卒車服也齊職儀曰特進以功徳特進見之後魏書曰刁廱拜特進皇興中廱與隴西王源賀及中書監髙允等並以耆年特見優禮錫廱几杖劍履上殿日致珍羞焉北史曰穆紹加特進侍中元順與紹同官順嘗因醉入紹寝所紹擁被而起正色譲順曰老身二十年侍中與卿先君亟連職事縱卿後進何宜相排突也遂謝事還家詔諭乃起唐書官品志曰特進左右光禄金紫銀青等光禄大夫用人俱以舊徳就閒者居之總敘大夫白虎通曰大夫為言扶大進人也毛詩衛淇澳碩人曰大夫夙退無使君勞大夫未退君聽朝於路寝夫人聽内事於正寝大夫退然後罷也箋云荘姜始来時諸位大夫朝久者皆早退無使我君之勞倦以君夫人新為配偶宜親之也毛詩節雨無正曰正大夫離居莫知我勩勩勞也箋云正官長也官長之大夫因厲王流於彘而皆散處無復知我之勞苦也三事大夫莫肯夙夜邦君諸侯莫肯朝夕箋云王流在外三公及大夫隨而行者皆無君臣之禮不肯朂志朝暮省王也周禮秋官朝大夫之職掌都家之國治都家王子弟公卿及大夫之采地也凡都家之治於國者必因其朝大夫然後聽禮記曲禮上曰大夫七十而致仕若不得謝謝去也君念其德而留之則必賜之几杖行役以婦人適四方乘安車自稱曰老夫於其國則稱名越國而問焉必告之以其制他國問其老者必以制度告也左傳成上曰衛侯使孫良夫來聘且尋盟公問諸臧宣叔曰中行伯之於晉也其位在三卿下孫子之於衛也位為上卿将誰先對曰次國之上卿當大國之中中當其下下當其上大夫小國之上卿當大國之下卿中當其上大夫下當其下大夫上下如是古之制也金紫光禄大夫晉書曰左右光禄大夫假金章紫綬光禄大夫加金章紫綬者品秩第二禄賜班位冠幘車服佩玉置吏卒羽林及卒諸所賜給皆與特進同其以為加官者唯假章綬禄賜班位而已不别給車服吏卒也又卒贈此位本已有卿官者不復重給吏卒其餘皆給光禄大夫漢百官表曰光禄勲屬官有大夫掌議論漢書曰谷永既為大将軍王鳳擢為光禄大夫永奏書謝鳳曰永斗筲之材質薄學朽無一日之雅左右之方将軍悦其狂言擢之皂衣之吏厠之爭臣之末又曰金日磾為光禄大夫親近未嘗有過上親愛之又曰貢禹上書云貧老家貲不滿萬錢拜光禄大夫賜益富伏自念無報厚德日夜慚愧又曰杜陵王仲翁霍光以為光禄大夫仲翁出入蒼頭廬兒傳呼甚尊寵又曰蔡義上書曰臣山東草萊之人行能無所比容貌不及衆然而不棄人倫者以聞道於先師願賜清閑之讌得舒精思於前上即見説詩甚悦擢為光禄大夫東觀漢記曰張湛字子孝為光禄大夫數諫湛乘白馬光武每有異政輒曰白馬生且復諫矣又曰樊宏字靡卿為光禄大夫為人謙素畏慎每朝㑹迎期先到俯伏待事時至乃起帝聞之勅臨朝乃告勿令預到後漢書曰鄧太后從樊准議悉以公田賦與貧人即擢准與議郎吕倉並守光禄大夫准使冀州倉使兖州准到部開倉廪賑濟慰安生業流人咸得蘓息又曰魏文帝受禪欲以楊彪為太尉先遣使示旨彪辭曰彪備漢三公遭代傾亂不能有所損益耄年被病豈可贊惟新之朝遂固辭乃授光禄大夫賜几杖衣袍因朝㑹引見令彪着布衣鹿皮冠而入待以賔客之禮華嶠後漢書曰鄧彪遭後母憂毁瘠過禮因疾乞身以光禄大夫行服漢書解詁曰武帝以中大夫為光禄大夫與博士俱以儒雅之選異官通職周官所謂官聨者也温故知新率由舊章皆能明古今辨章句習舊聞者也漢官儀曰光禄大夫秩比二千石掌議論屬光禄勲門外特施行馬以旌别之漢書百官表注曰光禄大夫古官也銀章青綬魏志曰常林字伯槐河内温人也時論節操清峻欲致之公輔而林遂稱疾篤拜光禄大夫又曰黄初四年詔給光禄大夫楊彪吏卒門施行馬吳志曰八月遣光禄大夫周奕石偉巡行風俗察将吏清濁民所疾苦為黜陟之詔王隠晉書曰劉毅字仲雄年七十告老以光禄大夫致仕門施行馬賜錢百三十萬晉書曰王覽為宗正卿致仕詔遣殿中醫療疾給藥後轉光禄大夫門施行馬又曰鄭褒景元初疾病失明屢乞骸骨不許遷光禄大夫又曰華表字偉容歆子太始中拜太子少傅轉光禄勲以老病乞骸骨詔以為大中大夫禄賜與卿同門施行馬晉陽秋曰李喜乞老以為光禄大夫門施行馬晉中興書曰王藴字叔仁烈宗将納后訪於公卿僕射安曰王藴地望可與國婚定后既立徵拜光禄大夫又曰祖納字士言少時操行能言名理遷右光禄大夫又曰荀組字太章潁川人也弱冠太尉王夷甫見而稱之為光禄大夫又曰荀崧字景猷組族子也弱冠太原王濟甚相器重拜右光禄大夫又曰賀循字士彦㑹稽人也節操尚厲童齓不羣言行舉動必以禮譲行有餘力則精書學由是博覽羣書尤明三禮為江表儒宗拜右光禄大夫又曰顧和字君季榮族子也和二嵗失父總角便有清操弱冠知名叔父榮雅器之曰此吾家千里駒也興吾宗者必此子矣康帝即位為尚書僕射更拜銀青光禄大夫又遷左光禄大夫晉諸公贊衛尉𫝊祗以風疾遜位加光禄大夫開府儀同門施行馬齊書曰周盤龍世祖講武令盤龍領軍校尉騁矟後以疾為光禄大夫後魏書曰李茂字仲宗為光禄大夫茂性謙慎以弟寵盛懼盈滿遂乞以老病固請遜位髙祖從之聽食大夫禄還私第汝南先賢傳曰郭憲為光禄大夫上欲到三輔憲諫曰天下初定車駕未可以巡上遂行憲當車拔佩刀以斷靷上不止到𢎞農兵起潁川上恨不用光禄之言於是帝乃還京樊英别傳曰詔書告南陽太守五官中郎将樊英委榮辭禄不降其節志不可奪今以英為光禄賜還家在所縣給穀千斛常以八月存髙年給羊一頭酒三斛荀氏家傳曰闓字道明性清浄善談論遷光禄大夫以君面似胡帝謂為神明胡子太中大夫韋昭辨釋名曰太中大夫在中最髙大也漢書曰陸賈楚人也以客從髙祖定天下以口辨居左右常使諸侯中國初定尉佗平南越因王之髙祖使賈賜尉佗印為南越王賈説他令稱臣奉漢約歸報髙帝大悦拜賈為太中大夫又曰東方朔字曼倩平原厭次人也拜太中大夫觀察顔色直言切諫上常用之東觀漢記曰來歙字君叔南陽新野人也歙有大志慷慨治左氏春秋東詣洛陽見上大喜曰君叔獨勞苦即解被襜襦衣歙拜太中大夫後漢書曰徵郭伋為太中大夫賜宅一區及帷帳錢穀以充其家伋輙散與宗親九族無所遺餘司馬彪續漢書曰張湛拜太中大夫病居中東門人號中東門君上數存問賞賜魏志曰管寧字㓜安北海朱虚人也年十六喪父中表愍其孤貧咸共贈賻悉辭不受長八尺美鬚眉與平原華歆同縣邴原相友黄初四年詔公卿舉獨行君子司徒華歆薦寕文帝以寧為太中大夫固辭不受又曰韓暨字公至明帝詔曰太中大夫暨澡身浴徳志節髙潔年逾七十守道彌固可謂純篤老而益劭者也其以暨為司徒吳志曰裴𤣥字彦黄下邳人也少有學行官至太中大夫齊書曰顧憲之字士思風疾求還吳天監二年授太中夫雖累年宰郡資無儋石及歸環堵不免飢寒中大夫漢書曰晁錯對䇿書百人唯錯為髙最乃遷為中大夫又曰倪寛以侍御史見上語經學從問尚書一篇擢為中大夫中散大夫東觀漢記曰牟長字君髙少篤學治歐陽尚書諸生著録前後萬人建武十四年徵為中散大夫後漢書曰魯丕字叔陵遷中散大夫時賈逵薦丕道藝深明宜見任因和帝朝㑹召見諸儒丕與侍中賈逵尚書令黄香等相難數事帝善丕説朝罷特賜幘履襪衣一襲續漢書曰譙𤣥字君黄能説春秋遷中散大夫柱國北史曰李敏美姿容善騎射開皇初周宣后樂平公主有女娥英妙擇婚對勑貴公子弟集𢎞聖宫者日以百數公主選取敏禮如儀尚帝女後將侍宴公主謂敏曰我以天下與至尊唯一女夫當為汝求柱國若授餘官慎無謝及進見上親御琵琶敏舞大悦謂公主曰敏何官對曰一白丁耳謂敏可授儀同敏不答上曰不滿爾意邪令授開府又不謝上曰公主有大功於我今授卿柱國敏乃拜蹈舞遂於坐發詔授敏柱國五代史後唐天成三年五月詔曰開府儀同三司階之極太師官之極封王爵之極柱國勲之極近代已來文臣官階稍髙便授柱國嵗月未深便轉上柱國武資不計何人初官便授上柱國官爵非無次第階勲備有等差宜自此時重修舊制今後凢是加勲先自武騎尉經十二轉乃授上柱國永作成規不令踰越雖有是命竟不革前例奉朝請漢書曰王陵為太傅杜門謝疾竟不朝請續漢書曰前漢列侯奉朝請在長安位三公漢武帝之時宣帝為皇曽孫令奉朝請東觀漢記曰建武中鄧禹失司徒特進奉朝請漢官解詁曰三輔職郡守獨奉朝請成帝丞相張禹遜位特進奉朝請又以關内侯蕭望之奉朝請奉朝請之號則非為官如淳曰諸侯春朝天子曰朝秋曰請雖國戚及勲門子弟為之但預朝請而已晉起居注曰孝武寧康三年詔隴西王世子越駙馬都尉楊邈並可奉朝請侍從左右與太子遊處沈約宋書曰奉朝請無員外不為官漢東京罷三省公外戚宗室多奉朝請奉朝請者奉㑹朝請召而已又曰王敬𢎞子恢之被召為秘書郎敬𢎞求為奉朝請與子恢之書曰秘書有限故有競朝請無限故無競吾欲使汝處於不競之地太祖嘉而許之北齊書曰祖鴻勲為州主簿僕射臨淮王彧表薦鴻勲有文學宜試一官勑除奉朝請人謂之曰臨淮舉卿便以得調竟不相謝恐非鴻勲曰為國舉才臨淮之務祖鴻勲何事從而謝之彧聞而喜曰吾得其人矣後魏書曰崔光韶事親以孝聞初除奉朝請光韶與弟光伯雙生操業相侔特相友愛遂經吏部尚書李冲譲官於光伯辭色懇至冲為奏聞髙祖嘉而許之又曰裴詢字敬叔美儀貌多藝能音律博奕咸所閑解起家奉朝請又曰梁景伯生於乾桑少喪父以孝聞家貧傭書自給養母甚謹尚書盧淵稱之於李冲冲時典選授為奉朝請致仕官晉書曰王祥致仕詔賜几杖牀帳簟褥以舍人六人為睢陵公舍人又曰鄭冲致仕詔賜安車駟馬牀帳簟褥五代史曰鄭韜以户部尚書致仕自襁褓迨於懸車事真偽十一君凢七十載所仕無官謗無私過三持使節不辱君命士無賢不肖皆恭已接納晚年背傴時人咸曰鄭傴不迂平生交友之中無隙怨親族之間無愛憎恬和自如性尚閒簡及致政歸洛甚愜終焉之㫖太平御覽卷二百四十三
