body:
  text: 太平御覽卷六百七十九宋李昉等撰道部二十傳授下金簡玉字經曰黄帝受襄城小童步六犯之法又曰黄累小童受步三經之法也又曰廣成受東中元童步六官之法也文始内傳曰太上遣綉衣使者𫝊命尹喜玉帝七聖𤣥紀曰七聖撰上𤣥之章以付五老上真仙都左公藏於紫蘂玉笈封以啓命之章西龜定籙東華校名三天正法曰太真靈籙在太上靈都之宫付五老上真仙都左公四極明科曰帝嚳之時九天真王駕九龍之輿降牧徳之臺授帝此真文也又曰凡授上清寳經皆當備信信以誓心以寶於道無信而受經謂之越天道無盟而傳經謂之泄天寳玉清隱書曰有帝簡金書𤣥玉籙籍可以傳𤣥羽玉經𤣥羽玉經付𤣥羽玉郎以授上清真人又曰傳授上皇玉惠玉清之隱書金𤣥隱𤣥之羽書經者皆五老校圖太一式觀又曰上皇玉帝命太老真人開瓊珠之篋出玉清隱書𤣥羽玉經以傳太㣲天帝君二十四生圖曰元始天帝於長桑碧林園中聞帝尊普告元聖尊神洞𤣥天文靈寳玉奥也又曰依舊典府仰之格付度道君女青律云太真玉帝上宫府仰之格舊經億刼不傳也又曰帝尊在恊晨靈觀登白玉座具宣秘要開闡妙門太𤣥經曰老子傳授經戒籙儀註訣曰以局脚小案置經綵巾覆上明真經曰元始尊在香林園中説明真經太清中經曰道曰慎無賣吾以求寳也慎無傳吾非其人也慎無閉吾絶吾學也又曰大真經曰師之傳授選其上有仙相中有仁孝下有才能篤志者然後授之太上真經曰太上曰成道歸本混無初出三界外濟九天中接生與善授記德人𤣥羽經曰元鑄金爲簡刻玉篇授葛𤣥金根經曰太上以大洞真經付上相青童君掌録於東華青宫使傳後聖應爲真人者此金簡金札出自太上靈都之宫刻玉爲札結金爲簡書以朱文編以朱繩之結太真科曰太上告張陵天師曰内外法契與天地水三官折石飲丹爲誓也張陵受命爲天師命弟子扶翼爲嗣師上崇虛之堂登白虛之壇醮奏太一傳授曰訣傳命嗣師承代基業行教天人真誥曰裴君曰太洞具經讀之者輕舉昔中央黄君隱秘此經世不知也若知之秘而不傳又曰紫陽真人受蘇君三一𤣥丹之道又曰有北海公涓子受守一𤣥丹之道又曰東宫中候真夫人受桐柏真人飛觧脱網之道又曰昔周君學道常山中積年精思忽見老人知是神異乃叩頭請道老人出素書七篇令誦之周君仙去又曰趙叔期學道王屋山時出民間聞有卜者在市肆叔期曰欲入天門調三闗存朱衣正崑崙叔期知神人因拜乞要訣因出一書與之是胎精中記拜此書入山誦之後合神丹服而昇天王君内傳曰王子登得太上丈人授以瓊藴隱書并雲碧陽水飛丹法君服之絶見逺物坐在立已役使羣神又曰太素三元君遣西華靈妃甄幽蕭齎成命之書以雲瓊爲板紫金刻之以授王君子豋後聖道君列紀曰道君命五老上真開紫蘂玉笈雲錦嚢出靈書紫文上經以付青童君八素真經曰若精勤皆當書以蘂簡刻以瓊文位爲上清左真公昇𤣥經曰張道陵曰不敢以身傳此教太上曰何得願難廢不通法汝當建意無謂不可傳若世有道士得此仙經披尋首尾知是真要無師可授更得奉行天戒經曰葛𤣥告弟子鄭隱云吾昔所授善道太上所貴今爲師友是以相授吾去世也将有樂道慈心居士來生吾門者子當以今道業事一通付之法應世世傳授也子以一通依科傳付弟子佳者也若無其人一通封五岳名山可也又曰劉珝字子朔頴川人有道德家世子仁感濟於人遇師黄先生告珝曰子仁感天地隂德鬼神太上嘉子之用心使我授以長生之道吾仙官也爾能從我去否珝曰願從教乃特入桐栢山中授以隱地八術服五星之華而今度名東華來在洞中爲定籙府右理中監又曰淳于斟字叔通㑹稽人漢桓帝時爲徐縣令好道術數服餌胡麻黄精後入吳烏目山中隱居人授以虹景丹經脩行得道在洞中爲典栢執法郎主誠有道者又曰姚俊錢塘人少爲郡吏漢末入増城山中學道遇東郭㓜平㓜平秦時人乆隱増城得道者也㓜平授俊服九精練氣輔星存心之術俊修之道戒在東華宫中爲北河司命又曰張奉字公先河内人也太傅袁隗常歎其髙操後入剡山遇山圖公子授奉九雲水彊梁錬柱法在東華宫爲太極仙侯又曰夏馥字子治陳留人也少好道服术餌和雲母後入吳山從赤湏先生受錬魂法又遇桐栢真人授以黄水雲漿法得道在洞中爲明晨侍郎又曰後漢劉寛字文饒少好道爲司徒太尉年十三遇青谷先生降於􅆍室授其杖觧法入太華山行九息服氣及授以爐丹方修之道成在洞中作童初府上師至始學者又曰劉少翁數入太華山中遇西岳丈人授其仙道又曰黄景華司空黄瓊女韓衆授以岷山丹服得仙法又曰趙威伯東郡人少好道師邯鄲張先生晚在中岳受玉珮金璫經於邱林乃漢樓船将軍衞行道婦也遂受行挹日月之景又服九靈明鏡華遂得道在華陽内爲保命丞主仙籍并記學道者并主暴雨水領五芝金玉章又曰張𤣥賔魏武帝時人也遇真人樊子明於少室授以道變隱景之道在天柱山靈寳經曰迦羅山樹下有三天人講元陽經明真科曰元始尊在香林園中與衆教化諸法内音玉字經曰大梵隱語西母以上皇元年七月丙午於洞室下教以授青虛真人王君傳於夏禹封文於南浮洞室石匱故五符經云九天靈書猶封於石匱是也玉訣下雲五宛真人封題玉匱亦其例也孔靈符云㑹稽山南有宛委山其上石俗呼爲石匱壁立于雲累梯然後至焉昔禹治洪水其功未就乃齊於此山發石匱得金簡玉字以知山河體勢於是䟽導百川各盡其宜上清經曰元始天帝與南極元君登太空瓊臺五老上真仙都公開欝林之笈雲錦之嚢上清變化七十四方觧形之道三元布經以授於元君道學傳曰王母云此靈光先生經聽四千年傳一人無其人聽八千年􅉐傳二人授非其人是爲泄天道可傳而不授是爲閉天寳不計限而妄授之是爲輕天老受而不敬是爲慢天藻泄閉輕慢四者延禍之事也同道謂之天親同心謂之地愛傳授當相親愛共均榮辱又曰漢武帝自撰西王母所説集爲一卷及所與經圖之屬盛以黄金之几封以白玉之函安着栢梁臺上像名經曰東方上尊凭七寳鳳文之曲几敷説道要真經太上黄素經曰凢修授太洞真經雌一竒文常置經於几格潔净處法輪經曰夫欲授經皆當齎金寳之信詣師請受道貴法貴財重道非言不行輕傳則爲非寳空修則爲賤道經衆篇經曰古人非心不仙末世非財不度所以爾者末世貴財賤道也以黄金萬斤仙經一部施於窮山末世乃取金棄經黄金刻爲身患仙經刻得長生公知如此不能免貪也非道宏人此之謂也太有經曰太上寳章傳太帝君太帝君傳天帝君天帝君傳太㣲天帝太㣲天帝傳金闕帝君金闕帝君傳東海青受之以金爲盟長九寸廣四寸厚三分刻而書之以封山川五岳之真精也三元真一經曰盟三官三官委帛血壇割革大約乃得授付受者盟者保神以堅心故萬物不能犯天地不能違以素絲一兩齋百日或五十日或三十日或二十日十日也法以四十年得傳一受𤣥丹玉經曰青布三十二尺朱帛三十二尺明鏡二枚告誓爲不泄之約八術神虎隱文曰欲受八術隱文者齎金龍玉魚盟誓而受之受大洞真經亦用此又曰上金十兩以爲神真之信也錦九十尺以誓九天青繒四十尺以盟其文好道樂真勤心注𤣥輕物貴道者始可與言又曰受三天虎書者齎金虎玉鈴素錦𤣥羅各四十尺以爲金真之誓盟於天地不宣之約也太一洞真𤣥經曰古者傳經盟誓皆軟血斷髪立壇盟天金自可以金青代髪膚之體又云違此者失兩明𤣥母八門經曰琅玕華丹五石𤣥腴之法皆結盟真一脩檢經曰受太一法二十四年得傳又曰東海玉華妃停文期青童君之妹降授張㣲子服霧之方又曰主仙道君即命侍女范運華趙峻珠玉抱臺等發瓊笈披籙藴出上清隱書龍文八靈真經二卷授范襄平太行經曰仁安逺遊山林於寒靈洞冗遇𤣥和先生授靈寳黒帝真文又曰西方有九光靈童以白帝真文授皇妃又曰央有無生童子於色之國授元君信然靈寳赤帝真文三元經曰元始於明霞觀以上真玉檢下授三天玉童馬明生内傳曰龔仲陽授嵩髙小童歩紀之法珠嚢曰陸元德吳興東遷人宋文帝召入内服膺尊異時太后王氏雅信黄老降母后之尊執門徒之禮又曰陶宏景字通明魏郡平陽人也自云華陽隱居梁髙祖太子從而受道梁簡文郡陵諸王謝覽沈約阮忻虞權並服膺師事之又曰劉法先彭城人也爲宋明帝崇靈舘主帝先師陸元德元德卒又師事法先盡北靣之禮又曰薛彪之晉陵人也煙爐神鼎之法無不辯其精麄䆒其難易門人有所請益必誨示勤懇隨量而退又曰謝暄字元映陳郡陽夏人也年十二辭親入髙壽山師朱天賜菜食長齋專務修道朱性嚴厲入室者惟暄一人也隱虞山雖居幽寂逺近歸向林谷常滿又曰庾承仙字崇光頴川鄢陵人也㓜聰悟􅀶極羣書時處士劉宏顧學尤明老荘隱於荆州之沙州承仙師之講習多所該䆒家貧無書每事假借一覽便誦又曰孫逰岳字𤣥達東陽永康人也宋泰始中陸元德自廬岳下都闡揚至教逰岳乃出京師問道親侍帷席預入室之流其寵言奥㫖非逰岳不傳太一記曰裴君精思五年五帝曰君登八極城明真靈臺受揮神九有之術玉皇譜籙曰元始丈人登玉虛之壇受九天譜籙葛洪神仙傳曰嚴青者㑹稽人也居貧常於山逄一人與青語臨别贈素書一軸但以潔噐盛之置髙處并教青服石腦法太平御覽卷六百七十九
