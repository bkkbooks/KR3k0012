body:
  text: 太平御覽卷六百八十九宋李昉等撰服章部六衣白虎通曰衣者隐也裳者鄣也所以隐引行自鄣蔽也釋名曰衣者依也人所依以芘寒暑也爾雅曰衣裗音旒謂之䘽音霓衣縷也齊人謂之攣或曰袿衣之飾也黼領謂之襮繡刺黼文以褗領也襮音􅀶縁謂之純衣縁飾也袕謂之褮衣開孔也袕胡汱反褮音滎衣皆謂之襟交領衱居業切謂之裾衣後裾也衿謂之袸辭見切衣小帶也佩衿謂之褑佩玉之𢃄上屬執袵謂之袺掎衣上袵扱衽謂之襭音襭扱衣丄衽於𢃄衣蔽前謂之襜今蔽膝也婦人之褘謂之縭縭緌也即今之香纓也褘邪交絡帶繁於體因名為褘裳削幅謂之纀滿木切削取其幅深衣之裳世本曰胡曹作衣宗𠂻注曰黄帝臣也易曰黄帝堯舜垂衣裳而天下治盖取諸乾坤上衣下裳乾坤之象又曰訟卦上九錫之鞶𢃄終朝三裭之象曰以訟受服亦不足敬也書曰予欲觀古人之象日月星辰山龍華蟲作㑹宗彛藻火粉米黼黻絺綉以五采彰施于五色作服汝明又說命曰唯衣裳在笥禮曰夫為人子者父母存冠衣不純素孤子當室冠衣不純采又曰季康之母死陳䙝衣䙝衣上服敬姜曰婦人不飾不敢見舅姑將有四方之賔來䙝衣何為陳於斯衆徹之又曰孔子曰昔先王未有大化食草木之實鳥獸之肉飲其血茹其毛未有絲麻衣其羽皮後聖有作治其絲麻以為布帛又曰朝𤣥端夕深衣深衣三袪謂大夫士也縫齊倍要衽當旁袂可以回肘長中繼揜尺袷二寸袪尺二寸縁廣寸半以帛裏布非禮也士不衣織無君者不貳采衣正色裳閒色非列采不入公門袗絺綌不入公門表裘不入公門襲裘不入公門纊為繭緼為袍禪為綗帛為褶又緇衣曰子曰長民者衣服不貳從容有常以齊其民則民徳壹左傳曰衮冕黻珽黻􅅊􅔖以敝膝也珽玉笏也帶裳幅舄帶革帶也衣下曰裳幅若今行縢者舄複履衡紞紘綖衡持冠者紞冠之垂者紘纓從下而上者綖冠上覆昭其度也藻率鞞鞛藻以􅅊為之所以籍王鞞佩刀削上飾鞛下飾鞶厲游纓鞶紳帶也一名大帶厲大帶之垂者游旌旗之游纓在馬膺前昭其文也又曰狄人伐衞衞懿公與石祁子玦與寗莊子矢使守曰以此賛國擇利而為之與夫人繡衣曰聽於二子取其文章順序又曰欒武子曰若敖蚡冐篳路藍縷以啓山林若敖蚡冐皆楚之先君蓽路柴車一藍縷弊衣也又曰吳季札聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉詩曰碩人其頎衣錦褧衣褧單也尚以禪衣謂其文之大著又曰縞衣綦巾聊樂我員又曰蜉蝣之羽衣裳楚楚蜉蝣之翼采采衣服蜉蝣掘閲麻衣如雪又曰青青子衿悠悠我心青衿青領也孝子之所服又曰山有樞隰有榆子有衣裳弗曳弗婁又曰緇衣美鄭武公也緇衣之冝兮敝予又改為兮緇衣之好兮敝予又改造兮緇衣之蓆兮敝予又改作兮蓆大也又曰衣錦褧衣裳錦褧裳又曰豈曰無衣七兮不如子之衣安且吉兮豈曰無衣六兮不如子之衣安且燠兮又曰豈曰無衣與子同袍豈曰無衣與子同澤澤䙝衣豈曰無衣與子同裳又曰君子至止黻衣繡裳又曰七月流火九月授衣一之日觱發二之日栗烈無衣無褐何以卒嵗史記曰文帝衣弋綈所幸慎夫人令衣不得曳地漢書曰齊國有三服之官春獻冠幘縱為首服紈素為冬服輕綃為夏服又曰韓信既平齊項羽使武渉說信背漢歸楚信曰臣事項王官不過郎中位不過執㦸漢王與我上將軍印授我兵數萬觧衣衣我推食食我夫人深親信我我背之不祥雖死不易幸為信謝項王又曰武帝末郡國賊盗羣起暴勝之為直指使者衣繡衣持斧捕之又曰朱愽為瑯琊太守勅官屬多作襃衣大袑音紹裙袴也不中節度自令掾吏令去地三寸又曰帝賜南越王佗上褚五十衣中褚三十衣下褚二十以綿裝衣曰褚上中下者綿之多少厚薄差又曰江充初召見犬臺宫自請願以所常被服冠見上上許之充衣紗縠襌衣曲裾後垂交輸如淳曰交輸割正幅使一頭狹狀若燕尾垂之兩旁見於後也冠襌纚步揺冠飛翮之纓服䖍曰冠禪纚故行歩則揺以鳥羽作纓也容貎甚壯帝望而異之謂左右曰燕趙固多奇士又曰􅖿不疑佩環玦褎衣博帶服至門下謁暴勝之又曰王吉字子陽好車馬衣服自奉養極為鮮明而遷徙所載不過嚢衣天下服其亷而怪其奢世傳陽能作黄金後漢書曰更始時授官爵皆羣小賈豎膳夫庖人多着繡而衣錦袴襜褕諸于罵詈道中時智者見之以為服之不中身之災也漢書音義曰諸于大掖衣也如婦人之袿衣揚雄方言曰襜褕其短者自閔而西謂之裗郭璞注曰俗名裾掖㨿此即是諸于上加繡裙如今之手臂也裗音充䘿音屈又曰光武見来歙大歡即觧衣以衣之又曰祭遵為人儉約家無私財常衣韋袴寢布被夫人裳不加縁又曰祭彤在遼東幾三十年衣無兼副顯宗美其清約賜之衣被什物無不悉備又曰耿恭自䟽勒廽衣屨穿決形容枯槁又曰東平憲王蒼侍肅宗饗衞士於南宫因從皇太后周行掖庭池閲隂太后舊時器服愴然動容乃衆留五時衣各一襲五時衣謂春青夏朱季夏黄秋白冬黑也衣單􅃨其曰襲及常所御衣合五十篋餘悉分布諸王王及子孫在京師者各有差時賜蒼及琅琊王京書曰間饗衛士於南宫因閱視舊時衣物惟王孝友之徳今送光烈皇后假髻帛各一及衣一篋可時奉瞻以慰凱風寒泉之思又欲令後生子孫得見先后衣服之製又曰明徳馬后身長七尺二寸方口羙髪能誦易好讀春秋常衣大練裾不加縁大練大帛也杜預注左傳曰大帛厚繒也朔望諸王朝請望見后袍衣麄疎或以為綺縠就視乃笑后辭曰此繒特宜深色故用之耳六宫莫不嘆息謝承後漢書曰袁忠乗船戴笠詣王郎見郎左右僮從皆着青絳米衣非其奢麗即辭疾發而退又曰郭賀拜荆州刺史有殊政顯宗廵狩到南陽特見嗟嘆賜以三公之服黼黻冕旒勅行部去幨幃令百姓見其容服以彰有徳魏志曰文帝詔曰三世長者知被服五世長者知飲食此言被服飲食難曉也又曰明帝徴管寧為光禄勲辭不就詔問青州刺史程喜寧守節髙乎審疾尫頓耶喜上言寧恒着皂㡌布襦袴布裙時單複出入閨庭能自拄杖不湏扶持四時祭祀輙自力强改加衣服着絮巾故在遼東所有白布單衣親薦饋饌跪拜成禮魏畧曰文昭甄后以漢光和五年十二月丁酉生每寢寐家中髣髴見有人持玊衣覆其上者常共怪之魏氏春秋曰王允為吏部郎中選郡太守明帝疑其所用非人召入將加罪允妻阮出謂曰明主可以理奪難以請求允頷之而入帝怒詰之允對曰某郡太守雖限滿文書先至年限在後月限在前帝取事視之乃釋遣出望其衣敗曰清吏也吳書曰孫權每賜周瑜衣寒暑皆百領諸將不及晉書曰石崇以奢豪矜物厠常有十餘婢列侍置香粉有客如厠皆易新衣而出客多羞脱故而王敦脱故着新意氣無怍諸婢相謂曰此客必能作賊又曰髙士郭文字文舉河内軹人也洛陽䧟奔吳居大滌山恒着鹿裘葛巾餘杭令頋颺與葛洪造之颺使致􅅊衣不納使置室中乃爛於内竟不服用王隠晉書曰董威輦不知何許人忽見洛陽止宿白社中於市得殘碎繒􅂺結以為衣號曰百結衣宋書曰沈慶之領隊防東掖門劉湛被収之夕上開門召慶之慶之戎服履韎縛袴入上見而驚曰卿何意乃尔急裝慶之曰夜半喚隊主不容換服又曰明帝體肥憎風夏月常着小皮衣又曰明帝疾召褚彦回入帝坐帳中流涕曰吾近危篤故召卿欲使着黄羅來可切耳指床頡大函曰文書皆函封不復開彦回亦悲不自勝黄羅乳母服也又曰范曄性精微有思致觸類多善衣裳器服莫不増損制度世人皆法事之又曰江湛字徽淵為吏部尚書家甚貧不營財利餉饋盈門一無所受無兼衣餘食嘗為上所召遇澣衣稱疾經日衣成然後起又曰謝超宗為義興太守昇明二年公事免詣東府門自通其日風寒髙帝謂四座曰此客至使人不衣自暖矣齊書曰宋元嘉制諸侯入閤得自服裾帽見人主唯出太極西廂乃備朝衣車駕幸其第乃身服烏紗㡌以侍宴焉至於衣服制度動皆陳啓事無專制又曰髙帝即位後手詔賜張融衣曰見卿衣服麄故誠乃素懐有本交尔藍縷亦虧朝望今送一通故衣意謂雖故乃勝新也是吾所着已令裁减稱卿之體并履一量又曰陶𢎞景永明十年脱朝服挂神武門上表辭禄詔許之又曰王思逺立身簡潔諸客詣已者覘知衣服垢穢方便不前形儀新楚乃興促膝雖然及去之後猶令二人帚拂其坐處又曰王崐性儉約景和中討義陽王昶六軍誡嚴應須紫服左右欲營辦琨曰元嘉初征謝晦有紫服在匣不須更製檢取果得焉梁書曰到溉性率儉不好聲色庭室單牀傍無姬侍冠履十年一易朝服或至穿補又曰波斯國婚姻法一聘財訖女壻將數十人迎婦壻着金綎錦袴戴天冠婦亦如之又曰新羅呼其冠曰遺子禮襦曰尉觧袴曰柯半靴曰洗百濟呼㡌曰冠襦曰複衫袴曰襌又曰張嵊音盛稷之子也稷初為剡令至嵊亭生之因名嵊字四山少敦孝行年三十餘猶班衣受稷杖動至數百収淚歡然又曰胡緭緭貴隨切隋陳伯之入魏時元㑹緭戯為詩曰㡌上着籠冠袴上着朱衣不知是今是不知非昔非又曰何敬容為吏部尚書侍中領太子中庻子敬容身長八尺白晢美鬚眉性矜莊衣冠鮮麗武帝雖儉而左右衣必須潔嘗有侍臣衣帶巻摺帝怒曰卿衣帶如繩欲何所縛敬容希㫖故益鮮明常以膠清刷鬚衣裳不整伏牀熨之或暑月背為之焦又曰任昉有子東里西華南容北叟西華冬月着葛帔練裙服具交友部又曰任昉為義興太守友人彭城到溉弟洽從昉共為山澤遊及被代登舟止有絹七疋米五石至都無衣鎮將軍沈約遺裾衫迎之後魏書曰樂浪王萬夀孫忠明帝時位太常少卿孝武帝汎舟天泉池命宗室諸王陪宴忠愚而無智性好衣服着紅羅襦繡作領碧納袴錦為縁帝謂曰朝廷衣冠應有常式何為着百戯衣忠曰臣少来所愛情存綺羅歌衣儛服是臣所願帝曰人之無良乃至此乎又曰胡叟於髙允館見中書侍郎李璨被服華靡叟貧老衣褐璨頗忽之叟謂曰老子今若相脱體上袴褶衣㡌若欲作何計也譏其惟假盛服璨惕然失色又曰文宣囚元韶幽於京畿地牢絶食㗖衣袖而死北齊書曰爾朱敝字乾羅彦伯之誅敝小隨母養於宫中年十二嵗敝自竇走至大街見童兒羣戯觧所着綺羅金翠服易衣而遁追騎至不識敝便執綺衣兒比究問知非㑹日已暮由是免陳書曰徐陵為吏部尚書精簡人物搢紳之士皆向慕焉陳暄以玊㡌簮挿髻紅絲布裹頭袍拂踝靴至膝下陳爵里直上陵坐陵不知識命吏持下暄徐步而出舉止自若竟無怍容作書謗陵陵甚病之隋書曰齊後主於􅁐内作貧兒村親衣藍縷之服而行乞其間以為笑樂多令人服烏衣以為執縛後主果為周所敗皮膚困至以賣燭為業唐書曰太宗詔冠冕制度已備令文尋常服飾未為差等於是三品已上服紫四品已上服緋六品七品以緑八品九品以青婦人從夫之色仍通服又曰楊妃寵愛特甚宫中主貴妃刺繡者七百人楊益及諸戚里每嵗進衣服布之於庭光奪人目又曰肅宗世節儉嘗出衣袖示近臣曰此衣已三浣矣又曰貞元六年徳宗初賜節度觀察使新製時服尚方織作呈閱所宜上曰須来賜衣文綵不恒非制也朕今思之節度使以雕銜綬帶取武毅以靖封内觀察使以㕍銜威儀委威儀委瑞草也取其行列有序牧人有威儀也又曰文宗朝淮南節度使李徳裕奏比以婦人長裾大袖朝廷制度尚未頒行微臣之分合副天心比聞閭閻之間袖闊四尺今令闊一尺五寸裙曵四尺今曵三尺五寸初延安公主以衣服踰制駙馬竇澣得罪徳裕因而奏之六韜曰武王伐紂紂蒙寳衣投火而死國語曰晉獻公使太子申生伐東山衣之偏裻音督之衣又魯語曰季文子相宣成無衣帛之妾無食粟之馬仲孫它諌曰仲孫它孟獻子之子子服也子為上卿妾不衣帛馬不食粟人其以子為愛且不華國乎愛吝也文子以告孟獻子獻子囚之七日囚子服也自是子服之妾衣不過七升之布春秋後語曰田文謂其父靖郭君曰君後宮蹈綺縠之衣而士不得短褐又曰趙襄子既滅智伯智伯之臣豫讓變姓名入宫塗厠以刺襄子襄子覺而赦之後讓伏於橋下襄子至橋馬驚使視之復得襄子嘆曰嗟乎豫讓之為智伯名既成矣寡人赦子名亦足矣子為自計寡人不釋子矣讓曰臣固伏誅願得君衣而擊之於是襄子義之脱付身之衣以與之讓抜劔三躍呼而擊之曰吾可以下報智伯矣遂伏劍而死漢雜事曰髙祖時大謁者臣章受詔長樂宫令羣臣議天子所衣服以安天下謁者趙堯舉春李舜舉夏倪湯舉秋貢禹舉冬四人各職一時制曰可舉者以各舉一時之事白之五時衣始於此董巴漢輿服志曰上古冗居衣毛未有制度後聖人易之以絲麻觀乎翬翟之文榮華之色乃染帛以效之始作五采成以為服凡十二章莊子曰莊子衣大布之衣而過魏王魏王曰何先生之憊耶莊子曰士有道徳不能行憊也衣弊履穿而貧非憊也商君書曰上世之人衣不暖膚食不滿腹孫卿子曰子夏家貧衣若懸鶉人曰子何不仕曰諸侯之驕我者吾不為臣大夫驕我者吾不復見尹文子曰昔晉國苦奢文公以儉矯之乃衣不重帛食不兼肉無幾時國人皆大布之衣脱粟之飯韓子曰晏嬰相齊妾不衣帛馬不食粟又曰齊桓公好服紫國人盡服之公患之管仲曰君謂左右甚惡紫臭於是三日境内莫有紫衣者又曰楊朱之弟楊布衣素衣而出天雨緇衣而反其狗吠之布恐將擊之朱曰使汝狗白而往黑而來能不怪哉墨子曰古之人未知衣服之制故聖人作之冬則絹帛輕且温夏則絺綌清且涼所以􅃴身體和肌膚也又曰晉文公好士之惡衣者故文公之臣皆牂羊之裳韋以為帶吕氏春秋曰戎夷違齊如魯天大寒而後與門弟子一人宿於郭外寒逾急謂其弟子曰子與我衣我活我與子衣子活我國士也為天下惜死子不肖也不足愛子與我衣弟子曰夫不肖之人安能與國士衣哉戎夷觧衣與弟子夜半而死弟子遂活淮南子曰林類榮啓期衣若懸蓑說􅁐曰齊林既者衣葦朝景公公曰何乃服小人衣耶林既曰衣狗裘者不必狗吠令君衣狐裘能不狐鳴乎又曰魏文侯封太子擊於中山三年使不徃来舎人趙倉唐奉使文侯問子之君長大孰與寡人倉唐曰君賜之外府之衣則能勝之文侯遣倉唐賜太子衣一襲令倉唐鷄鳴時至太子迎拜賜發箧衣盡顛倒太子趣具駕曰賜之衣非以為寒也欲召擊也無誰與謀故遺子以衣詩曰東方未明顛倒衣裳顛之倒之自公召之事具奉使門鹽鐡論曰古者庻人老耋而後衣絲其餘則麻枲而已拾遺記曰宋景公之時懸四時衣春夏以珠玊為飾秋冬以翡翠為飾又曰禮敬國其俗人年百歲而織芳茅以為衣盖尚書云島夷卉服之類也又曰任末年十四好學觀書有合意處則題其衣裳及掌記以記其事門徒恱其勤學更以静物衣易之又曰太始元年魏帝為陳留王之歲有頻斯國人来朝以五色玊為衣如今之鎧又曰天漢二年渠搜國之西有祈淪國其俗淳和人夀三百歲有大林一樹千尋若經此木下皆不死不病或有泛海繩山来㑹其國綴草毛為繩結網為衣如今之羅紈也至元狩六年獻網衣一襲帝焚於九逹之道恐後人徴求此物故燒之烟如金石之氣又曰員嶠山南有池移國人長三尺夀萬歲茅為衣衣服皆長裾大袖因風以昇煙霞若鳥用羽毛也鍾㑹母傳曰夫人幼少衣不過青紺世說曰齊王冏為大司馬輔政稽紹為侍中詣冏諮事冏召葛旟董艾等共論時宜旟等白冏曰稽侍中善於絲竹公可能操之遂進樂噐紹推却不受冏曰今共為歡何為却耶紹曰公恊輔皇室今作事可法紹雖職卑忝備常伯豈可以先王之服為伶人之業今逼髙衆不敢有辭當釋冠冕就私服此紹之心旟等不自得而退又曰桓車騎不好着新衣浴既婦故送新衣車騎大怒催使將去婦使持還琅邪王恬女也傳語云衣不經新何由而故桓大笑而着之又阮宣子論鬼神有無或以人死有鬼阮子獨以為無曰今見者云着生時衣服若人死有鬼衣服亦有鬼乎孝子傳曰老莱子年七十父母猶在莱常服斑爛衣為嬰兒戯曹肇傳曰明帝寵愛肇與帝戯睹衣服有所獲輙入御帳服之遥出其親狎如此襄陽耆舊記曰王昌字公伯為東平相散騎常侍早卒婦是任城王曹子大女昌弟式字公儀為渡遼将軍長史婦是尚書令桓階女昌母聦明有典教二婦入門皆令變服下車不得踰侈後階子嘉尚魏主欲金縷衣見王式婦嘉止之曰其嫗嚴固不聴善爾不須持徃犯人家法列仙傳曰道士徐延年平陽人也見人持新黄羅衣云延年五日夜半月明如晝從五億萬人登仙也古艶歌曰熒熒白兎東走西顧衣不如新人不如故離騷屈原曰新沐者必彈冠新浴者必振衣太平御覽卷六百八十九
