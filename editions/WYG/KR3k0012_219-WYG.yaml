body:
  text: 太平御覽􅃃二百一十九宋李昉等撰職官部十七侍中侍中六典曰侍中之職掌出納帝命緝熈皇極總典吏職贊相禮儀以和萬邦以弼庶務蓋以佐天子而統大政者也凡軍國之務與中書令叅而總焉坐而論之舉而行之此其大較也應劭漢官儀曰侍中周官也金蟬有貂金取堅剛百鍊不耗蟬居髙食潔目在掖下貂内勁悍而外温潤侍中便蕃左右與帝升降卒思近對拾遺補闕百僚之中莫密於兹秦始皇破趙得其冠以賜侍中史記曰二世用趙高計不悉廷見大臣居禁中趙高常侍中用事漢書曰張彭祖宣帝時爲侍中少與帝微時同硯席書以舊恩封侯出常叅乗又曰史丹元帝世爲侍中出常陪乗甚有寵九男皆以丹任爲侍中又曰桑𢎞羊雒陽賈人子以心計年十五爲侍中又曰霍去病以皇后姊子年十八爲侍中善騎射又曰孝惠時侍中皆冠鵕鸃具𢃄𫝊脂粉矣又曰張良子辟疆年十五爲侍中又曰上官桀隴西人爲中廐令上嘗疾及愈見馬多瘦怒曰汝以我不復見馬耶桀頓首曰臣聞聖體不安日夜憂惶意誠不在馬言未卒泣數行下帝以爲忠親近之爲侍中又曰衞尉金敞疾甚成帝拜子渉爲侍中緑車載送衞尉府如淳曰載以皇孫車寵之也東觀漢記曰戴慿字次仲爲侍中正旦朝賀百僚畢㑹帝令群臣能説經者更相難詰義有不通輒奪其席以益通者慿遂重坐五十餘席故京師爲之語曰解經不窮戴侍中又曰馮魴字孝孫父子兄弟並𢃄青紫三代侍中後漢書曰趙典再遷爲侍中時帝欲廣開鴻池典諫曰鴻池泥漑已且百頃猶復增而深之非所以崇唐虞之約已遵孝文之愛人也帝納其言而止又曰楊震孫竒靈帝時爲侍中帝常從容問竒曰朕何如桓帝對曰陛下之於桓帝亦猶虞舜比德唐堯帝不悅曰卿强項真楊震子孫强項言不低屈也光武謂董宣爲强項令也又曰朱穆因進見復陳曰臣聞漢家舊典置侍中常侍各一人省尚書事省覽黄門侍郎一人傳發書奏傳通皆用姓族引用士人有族望者自和熹太后以女主稱制不接公卿乃以閹人爲常侍小黄門通命兩宫自此以來權傾人主窮困天下宜皆罷遣博選耆儒宿德與叅政事帝怒不應穆伏不肯起左右傳出傳聲令出也良乆乃趨而去又曰爰延爲侍中帝遊上林苑從容問延曰朕何如主也對曰陛下爲漢中主帝曰何以言之對曰尚書令陳蕃任事則治中常侍黄門豫政則亂是以知陛下可與爲善可與爲非此中主之謂也帝曰昔朱雲廷折欄檻今侍中面稱朕違敬聞命矣又曰桓帝末侍中皇蟬叅上問貂璫何法不知所出又問地震云不爲灾還宫乃左遷議郎又曰王逸字叔師南郡宜城人也順帝時爲侍中著楚辭章句行於代其賦誄書論及雜文凡二十一篇又作漢詩百二十三篇續漢書曰侍中比二千石無員漢官儀曰侍中左蟬右貂本秦丞相史往來殿内故謂之侍中分掌乗輿服物下至褻器虎子之屬武帝時孔安國爲侍中以其儒者特聽掌御唾壺朝廷榮之至東京時屬少府亦無員駕出則一人負傳國璽操斬蛇劔叅乗與中官俱止禁中謝承後漢書曰公孫曄拜博士侍中國有疑事常使進見問其得失所陳皆據經依義補益國家深見省納又曰劉淑爲侍中朝夕建議竭忠於朝補政二百餘事悉有篇章朝廷有疑事密詔問焉又曰周舉字宣光時詔遣八使廵行風俗皆選有威名者乃拜舉侍中與杜喬周翊馮羨欒巴張綱郭遵太尉長史劉班分行天下使同日而拜號曰八俊應劭漢官儀曰侍中廼存年耆口臭上出雞舌使含之雞舌香頗小辛螫不敢咀咽自嫌有過得賜毒藥歸舎辭訣欲就便宜家人哀泣不知其故頼僚友諸賢問其得失求視其藥及口香共笑之更爲吞食其意遂解存鄙儒蔽於此耳漢官曰侍中殿下稱制出則叅乗佩璽抱劔又曰史丹爲侍中元帝寢疾丹以親密近臣得視疾候上間獨寢時丹直入卧内頓首伏青蒲上應邵曰以青規地曰青蒲漢官儀曰侍中秩千石黄門有畫室署玉堂署各有長一人漢舊儀曰侍中無員或列侯將軍衞尉光禄大夫爲之得舉非法又曰侍中左右近臣見皇后如見帝見媫妤行則對壁坐則伏茵漢書典職曰侍中常伯選舊儒高德博學洞達仰瞻俯視切問近對喻指公卿員八人在尚書僕射下尚書上漢雜事曰金敞爲元帝侍中帝崩故事近臣皆隨陵爲園敞世名忠孝太后使侍成帝魏志曰盧毓爲侍中先是散騎常侍劉劭受詔定律未就毓上論曰古今制律之意以爲法宜一正不宜有兩端使奸吏得容情及侍中高堂隆數以宫室事切諫帝不悦毓曰君明臣直古之聖王恐不聞其過故有敢諫之鼓近臣盡規此乃臣等所以不及隆隆諸生名爲狂直陛下宜容之毓在職三年多所駮易又曰劉􅁮字子陽爲侍中在朝畧不交接時人或問其故􅁮荅曰魏室即祚尚新智者知命俗或未成僕在漢爲支葉於魏備腹心寡偶少徒於宜未失也又曰王粲字仲宣山陽高平人拜侍中博物强識問無不對時舊儀弛廢方興造制度粲恒典之又曰蘇則拜侍中與董昭同寮嘗枕則膝卧則推之曰蘇則之膝非佞人之枕也又曰辛毗遷侍中於時帝欲徙兾州戸十萬實於河南毗曰陛下不以臣不肖置之左右安得不與臣議帝不荅起入内毗隨而引其裾帝遂奮衣不還又曰蘇則與吉茂同隱於太白山後則爲侍中侍中舊親省起居故俗謂之執虎子茂見則嘲曰仕進不止執虎子則笑曰誠不能效汝蹇蹇鹿車驅也蜀志曰宗預字德艷南陽人也預將命使吳孫權問預曰東之與西譬猶一家而聞西更増白帝之守何也預對曰臣以爲東益巴丘之戍西增白帝之守皆事勢宜然俱不足以相問也權大笑嘉其抗藎甚愛待之見敬亞於鄧芝費褘遷爲侍中又曰關興字安國少有令問丞相諸葛亮深器異之弱冠爲侍中又曰董扶字茂安靈帝徴扶即拜侍中在朝稱爲儒宗甚見器用又曰馬良字季常襄陽宜城人也先主稱尊號以良爲侍中及東征吳遣良入武陵招納五谿蠻夷蠻夷渠帥皆受印號咸如意指晉書曰王濟字武子累遷侍中與侍中孔恂楊濟同列爲一時秀彦武帝常㑹公卿藩牧於式乾殿顧濟恂而謂諸公曰朕左右可謂恂恂濟濟矣又曰沈演之爲侍中衞將軍文帝謂之曰侍中領衞俱爲優重此蓋宰相便座卿其勉之又曰陸玩遷侍中玩雖豋公輔謙不辟掾屬成帝聞而勸之玩不得已而從命所辟皆寒素有行之士玩翼亮累世常以𢎞重爲人主所貴加性通雅不以名位格物誘納後進謙若布衣由是縉紳之徒莫不廕其德宇又曰韋誕以能書畱補侍中魏氏寳器銘題皆誕書也又曰安平王孚初爲魏太子中庶子魏文帝初即位選侍中常侍等官太子左右舊人頗風主者便欲就用不調餘人孚曰雖堯舜必有稷契今嗣王新立當進用海内英賢猶患不得如何欲因際㑹自相薦舉邪官失其任得者亦不足貴遂更他選又曰王戎爲侍中南郡太守劉肇賂戎筒中細布五十端爲司𨽻所糾以知而未納故得不坐然議者尤之帝謂朝臣曰戎之爲行豈懷私苟得正當不欲爲異耳帝雖以是言釋之然爲清慎者所鄙又曰褚翼字謀遠爲侍中蘇峻作亂王師敗績火及宫室翼手抱天子豋太極峻兵入叱翼令下翼不動曰蘇冠軍未覲至尊軍人豈得逼斥宫禁於是兵士不敢上太極峻執政猶以爲侍中宋書曰陸仲元者晉太尉玩曾孫也爲侍中吳郡太守自玩至仲元四世爲侍中時人方之金張二族又曰劉湛爲侍中時王華王曇首殷景仁亦爲侍中文帝於六合殿與四人宴飲甚悦華等岀帝目送良乆歎曰此四賢一時之秀同管喉舌恐後世難繼又曰殷景仁遷侍中與王華王曇首劉湛四人並時爲侍中俱居門下皆以風力局幹冠冕一時同升之美近代莫及又曰王僧綽遷侍中任以機密時年二十九始興王濬嘗問其年僧綽自謙早達逡巡良乆乃荅其謙虛自退若此又曰謝莊爲侍中領前將軍時孝武岀行夜還勅開門莊居守以棨信或虛須墨詔乃開上後因酒宴從容曰卿效郅君章邪對曰臣聞蒐廵有度郊祀有節盤於遊田著之前誡陛下今蒙犯塵露晨往宵還容致不逞之徒妄生矯詐臣是以伏須神筆又曰孝武時侍中何偃南郊陪乘鑾軺過白門閫偃將匐帝反手接之曰朕反陪卿也又曰王華等每與帝接膝共語貂拂帝手㧞貂置案上語畢復手揷之齊書曰江淹累遷侍中初淹年十三時孤貧常採薪以養母曾於樵所得貂蟬一具鬻以供養其母曰此故汝之休徴也汝才行若此豈長貧賤耶可留待得侍中著之至是果如母言南史曰謝朏音斐爲侍中及齊受禪胐當日在直百僚陪位侍中當解璽胐佯不知曰有何公事傳詔云解璽授齊王朏曰齊自應有侍中乃引枕卧傳詔懼乃使稱疾欲取兼人朏曰我無疾何所道遂朝服歩岀東掖門乃得車仍還宅是日遂以王儉爲侍中解璽旣而武帝請誅朏高帝曰殺之則成其名正應容之度外齊職儀曰魏侍中掌儐賛大駕出則次直侍中䕶駕正直侍中負璽陪乗不𢃄劔皆騎從御豋殿與散騎侍郎對挾帝侍中居左常侍居右備切問近對拾遺補闕也又曰東漢侍中便蕃左右與帝升降法駕岀多識者一人叅乗兼負傳國璽操斬蛇劔南史曰朱异居權要三十餘年善承上㫖故特被寵任歴官自員外常侍至侍中四官皆珥貂自右衞率至領軍四職並驅鹵簿近代未之有也梁書曰蕭玠會侍中闕選司舉王筠等四人並不稱㫖高祖曰我門中乆無此職宜用蕭玠爲之玠博物强識應對左右多所匡正高祖任重之又曰王訓字懷範爲侍中武帝問何敬容曰禇彦回年幾爲宰相對曰少過三十帝曰今之王訓無謝彦回彦回宋明帝時爲侍中又曰栁慶遠爲侍中嘗失火禁中驚懼帝悉歛諸門鑰問栁侍中何在至即悉付之後魏書曰羅結世祖初遷侍中外都大官總三十六曹事年一百七歲精爽不衰世祖以其忠慤甚見信待監典後宫岀入卧内又曰甄琛拜侍中以其衰老詔賜御府杖朝直杖以岀入五代史百官志曰北齊侍中因後魏置六人掌獻納諫正及進御之職叅與諸公論國政也唐書曰魏徴代王珪爲侍中尚書省滯訟有不决者詔徴評理之徴性非習法但存大體以情處斷無不悦服又曰楊師道爲侍中性周慎謹密未嘗漏泄内事親友或問禁中之言乃更對以他語嘗曰吾少窺漢史至孔光不言温室之樹每欽其餘風可庶幾也唐書官品志曰侍中高功者在職一年詔加侍中祭酒與侍郎高功者一人對掌禁令華陽國志曰譙隆爲上林令武帝欲廣上林苑隆言堯舜至治廣德不務林苑帝後思其言徴爲侍中益部耆舊傳曰蜀郡張寛字叔文漢武帝時爲侍中從祀甘泉至渭橋有女人浴於渭水乳長七尺上怪其異遣問之女曰帝後第七車者知我所來時寛在第七車對曰天星主祭祀者齊戒不嚴則女人見又曰李固字子堅諫帝云臣一日會朝中見諸侍中皆諸家年少無一宿儒可顧問者乃進楊厚黄瓊三輔故事曰金日磾字翁叔封秺侯有忠勤之節七葉侍中文士傳曰張衡拜侍中恒居帷幄從容風議拾遺左右竹林七賢傳曰山濤大始七年爲侍中詔書曰濤清風淳履思心通遠宜侍帷幄盡規左右顔含别傳曰顔髦字君道儀状嚴整風貌端美大司馬桓公歎曰顔侍中廊廟之望喉舌機要魏明帝先賢傳曰盧植字子幹拜侍中逆臣董卓議欲廢帝群僚之士唯卓是順獨植正色卓遂大怒欲害植議郎彭伯群與卓親入爲卓議曰夫善人者天下之紀盧侍中海内大儒天下之望今先害之則天下怖卓遂止孔叢子曰孔臧與子琳書侍中安國特見崇禮不供褻事獨得掌御唾壺朝廷之士莫不榮之此親汝所見環濟要略曰侍中古官也或曰風后爲黄帝侍中周時號常伯常者言其道德可常遵也秦始皇復古冠貂蟬漢因而不改侍帷幄受顧問拾遺於左右岀則負璽以從秩二千石語林曰晉孝武好與虞嘯父飲酒不醉不出後臨岀拜殆不復能起帝因呼人扶上殿扶虞侍中嘯父答曰臣位未及扶醉未及亂非分之賜所不敢當帝美之勅左右疏其語續搜神記曰程咸字延休其母始懷咸夢老公授藥與之服此當生貴子晉武帝時厯位至侍中有名於世摯虞决疑要注曰晉武帝時彭權爲侍中帝問侍臣旄頭之義何謂邪權對曰秦紀云秦國有竒怪觸山截水無不崩潰唯畏旄頭故使虎士執之以衛至尊山公啓事曰侍中太常河南尹並缺皆顯職宜必得其人右軍裴偕通理有才義僉論以爲侍中才又啓云詔侍中缺當復得人誰可者雍州刺史郭奕左衞将軍王濟皆忠亮有美才侍中之最高者也傅咸詩序曰朗陵公何敬祖咸之從内也國子祭酒王武子咸從姑之外孫何公既豋侍中武子俄而亦作二賢相得甚欣咸亦慶之乃賦詩以申懷曰吾兄既鳯翔王子亦龍飛雙鸞游蘭渚二難揚清輝梁王筠爲從兄讓侍中表曰至如先勲舊儒之胄積德累仁之基九世七葉之華相韓事漢之貴不然則子駿之學洞古今平子之思侔造化仲宣之辨識無滯次仲之解經不窮然後可以喻㫖公卿問對帷扆陪六尺之輿通四方之意求之㣲臣此途頓隔梁丘遲爲范衞軍讓梁臺侍中表曰是以懷鉛早歲不以隕穫累心躡屩晩年豈以充詘有念易農伊泰仕焉已幸遂復分竹九疑擁旄百越値天地中開神武再廓麻絲是蓄菅蒯靡遺今伯運肇基四海明目樞機規闢實在得人况在庸㣲何用膺荷北齊邢子才爲彭城王韶讓侍中表曰貂鼲映首日月在躬冠蓋庶寮跨躡多士雖智慙量力明闕自知在梁之譏無待諠譁之議素飡之貞豈湏噂􅊱之口何悟天情方眷復延今寵遂總録百揆寅亮萬機文昌治本得失所繫用才長短隆替以之何容以斯寡薄用膺兹位太平御覽卷二百一十九
