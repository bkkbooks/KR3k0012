body:
  text: 太平御覽卷八百七十五宋李昉等撰咎徴部二五星客星孛天狗枉矢蚩尤旗獄漢五殘國皇格澤旬始營頭漢􅅾星五星京氏易五星占曰嵗星失度何人君不仁春殺無辜則嵗星失度其救也慈仁敬讓廣施恩惠無犯四時則嵗星承度熒惑失度何人君内無禮法輕薄房室外行慢易歛奪民財則熒惑失度其救也爵賢位徳養㓜廩孤命樂師趣鞉皷含歡欣熒惑還度天心得矣太白失度何人君薄恩無義懦弱不勝任則太白失度其救也舉有義任威用武則太白復兵氣消矣鎮星失度何人君内無仁義外多華飾則鎮星失度其救也治社稷修明堂近方直之人此災自消也辰星失度何人君内無仁義外多華飾則辰星失度其救也明刑慎罰審法必中尚書考靈耀曰太白經天水决江河春秋元命苞曰昴畢間爲天街日月五星以出入熒惑守之而不通天下危又曰卷舌主口語熒惑臨之下多亂謀國君以口舌之害㓂起又曰熒惑守軒轅貴妾爭又曰熒惑守宫室羣妃鬭漢書天文志曰五星所行合散犯守陵歴鬭食彗孛飛流皆隂陽之精本於地而發於天也孟康曰合同舍也散謂五星有變則其精散為祅星也犯七寸以内光芒相及也陵相冒過也食星月相陵不見者則所食也韋昭曰自下徃觸之曰犯居其旁曰守經之為歴突掩為陵相擊為鬭張晏曰彗所以除舊布新也孛氣似彗飛流謂飛星流星也孟康曰飛絶迹而去也流光跡相連也又曰孝昭元始中太白入太㣲西藩第一星北出東藩第一星北東下去太㣲者天庭也太白行其中宫門當閉大將被甲兵邪臣伏誅後有流星下燕萬載宫極東去極屋梁也法曰國恐有誅其後左將軍上官桀驃騎將軍安與長公主燕刺王謀作亂咸㐲誅又曰建始四年七月熒惑隃嵗星居其東北半寸所如連李時嵗星在闗星西四尺所熒惑初從畢口大星東東北徃數日至徃疾去遲占曰熒惑與嵗星鬭有病君饑嵗其後旱傷麥民食榆皮二年十月壬申太皇太后避時昆明東觀又曰綏和二年春熒惑守心丞相翟方進欲塞災異自殺客星左傳曰昭十年春王正月有星出于婺女客星也鄭禆竈言於子産曰七月戊子晉侯將死今兹嵗在顓頊之虛嵗嵗星也顓頊之虛謂𤣥枵姜氏任氏實守其地姜齊姓任薛姓二國守𤣥枵之地居其維首而有妖星焉告邑姜也客星居𤣥枵之維首邑姜齊太公女晉唐叔之母星占婺女爲既嫁之女織女爲處女邑姜齊之既嫁女妖星在婺女齊得嵗故知禍歸邑姜邑姜晉之妣也天以七紀二十八宿四七戊子逄公以登星斯於是乎出逄公殷諸侯居齊地者逄公將死妖星出婺女時非嵗星所在故齊自當禍而以戊子日卒吾是以譏之至時晉平公卒漢書曰初元元年四月客星大如瓜色青白在南斗第二星東可四尺占曰爲水饑其五月渤海水大溢六月關東大饑民多饑死琅邪郡人相食二年五月客星見昴分居卷舌東可五尺青白色炎長三寸占曰天下有妄言者其十二月鉅鹿都尉謝君男詐爲神人論死後漢書曰天文志曰孝安永初四年六月丙子客星大如李蒼白芒氣長二尺西南指上階星上階爲三公後太尉張敏免官又曰中平五年六月丁夘客星如三升椀出貫索西南行入天市至尾而消占曰客星入天市爲貴人喪謝承後漢書曰吳郡周敞師事京房爲石顯所譖謂敞曰吾死後三十日客星必出天市即吾無辜也死後果如言孛星左傳曰文十四年有孛星入于北斗周内史叔服曰不出七年宋齊晉之君皆將死亂又曰昭十七年冬有星孛于大辰西及漢申須曰彗所以除舊布新也天事恒象今除于火火出必布焉諸侯其有火災乎梓慎曰徃年吾見之是其徴也火出而見今兹火出而章必火入而伏其居火也乆矣其與不然乎火出於夏爲三月於商爲四月於周為五月夏數得天若火作其四國當之在宋衛陳鄭乎宋大辰之墟也陳大皥之墟也鄭祝融之墟也皆火房也星孛及漢漢水祥也衛顓頊之墟也故爲帝丘其星爲大水水火之牡也其以丙子若壬午作乎水火所以合也若火入而伏必以壬午不過其見之月鄭禆竈言於子産曰宋衛陳鄭將同日火若我用瓘犖玉瓚鄭必不火子産弗與後四國皆火春秋孔演圖曰海精死彗星出海精鯨魚彗星出則國樞橛春秋考異郵曰鯨魚死彗星合鯨魚隂物生於水今出而死是為有兵相殺之兆也故天應之以妖彗春秋合誠圖曰赤彗火精如火曜長七尺孝經鈎命决曰周襄王不能事其母弟彗入斗亡其度孝經内記曰彗星北斗禍大起在三台臣害君在太㣲君害臣在天獄諸侯作禍彗行所指其國大惡四彗在月中者君有徳天下欣心大豐盛爾雅曰彗星爲欃槍河圖帝通紀曰彗星者天之旗河圖稽燿鈎曰五星散爲五色之彗戰國䇿曰唐雎謂秦王曰專諸刺王僚彗星襲月史記曰秦始皇之時十五年彗星四見久者八十日長或竟天其後秦遂滅六王并中國外攘四夷死人如麻漢書曰建元六年彗星見淮南王心恠之以爲上無太子天下有變諸侯並爭愈益治攻戰具遂反又曰哀帝建平二年二月彗星出牽牛日月五星所從起歴數之元三正之始彗而出之改更之象也其後卒有王莾簒國之禍後漢書曰獻帝建安二十三年正月孛星辰見東方二十餘日夕出西方紀歴五車東井五諸侯文昌軒轅后妃太微鋒炎指帝座占曰除舊布新之象續漢書天文志曰王莾地皇三年十一月有星孛於張東南行五日不見孛星者惡氣所生爲亂兵又參然孛焉兵之類也故名之曰孛孛之爲名猶有所傷害有所妨蔽或謂之彗星所以除穢而布新也張為周地星孛於張東南行即翼軫之分翼軫為楚是周楚地將有兵亂後一年正月光武起兵舂陵都雒居周地除穢布新之象也又曰孝明永平三年六月丁卯彗星出天船北長二尺所稍北行至亢南百三十五日去天船為水彗星出之為大水是嵗伊雒水溢到津城門壊伊橋郡七縣三十二皆大水又曰永和六年二月丁巳彗星見東方長六七尺色青西南指營室及墳墓營室者天子常宫墳墓主死彗星起而向營室至墳墓不出五六年天下有大䘮又曰光和元年八月彗星出亢北入天市中長數尺稍長至五六丈赤色經歴十餘宿八十餘乃消於天苑中彗除天市天帝將徙帝將易都至初平元年獻帝遷都長安又曰獻帝建安九年十一月有星孛于東井輿鬼入軒轅太㣲十一年正月有星孛于斗首在斗中尾貫紫宫及北辰占曰彗掃太㣲紫宫人主易位其後魏文帝受禪十二月辛卯有星孛于鶉尾荆州分也時荆州牧劉表専據荆州從事周羣以爲荆州牧將死而失土明年秋表卒以小子琮自代曹公將攻荆州琮懼舉州詣公降晏子春秋曰景公謂晏子曰彗星向吾國我是以悲晏子曰君穿池欲深廣爲臺欲髙大誅戮如仇讎孛將又至彗星容可拒乎公懼緩刑罰三十七日彗去尉繚子曰昔楚將公子心與齊人戰未合夜彗星出明日與齊人戰大破之淮南子曰鯨魚死彗星出天狗占曰狗者守禦之類天狗所降以戒守禦也出入無時下則有伏屍流血其流星墮地有聲野雉皆鳴或羣狗皆吠或流散化爲雲一曰流星有聲如雷下地中一日無雲而雷一曰星赤白有光下地爲狗狗無足一曰如火光炎衝天其上瓮下地如數頃田一曰大流星其有光見人而墜無音有足一曰星狀如奔星有聲望之如火一曰其色白甚熒熒如遺火狀皆曰兵起國易攻人相食千里流血四方相射破軍殺將兵䘮並起國破㓕已河圖稽燿鈎曰太白散爲天狗主候兵洪範五行傳曰七國之兵戰於梁地故天狗先降梁壘見以其象也狗者守禦之類也所降以戒守禦也史記曰秦孝公十二年星晝墜有聲至十七年秦韓大戰擒晉惠王又天官書曰天狗狀大如奔星有聲其止地類狗所堕及炎火望之如火光炎炎衝天其下圓如數頃田處上兌者則有黄色千里破軍殺將漢書天文志曰孝昭元平元年二月乙酉牂雲如狗赤色長尾三枚夾漢西行漢書星行占曰太白散爲天狗爲卒起卒起見禍無時四月昌邑王賀行淫僻大將軍霍光白皇太后廢賀又曰成帝元延元年四月日晡時天暒晏殷殷如雷聲有流星頭大如缶長十餘丈皎然赤白色從日下東南去四面或大如盂或如鷄子燿燿如雨下至昏止郡國皆言星隕為王者失勢諸侯起伯之異其後王莾專政簒位又曰哀帝建平元年正月日出時有物著天白廣如一疋布長四丈餘西南行聲如雷一刻止名曰天狗後漢書曰光武建武十年三月有流星大如月從太㣲出入北斗魁中第六星色白傍有小星射者十餘枚後有聲如雷食頃止斗魁主殺伐是年吳漢臧宫破公孫述於成都十二月有大星如缶出桞西南行入軫將滅時分爲十餘叚如遺火狀須臾有聲殷殷如雷柳爲周軫爲秦蜀是年使大司馬吳漢從洛陽發南陽沂江而上擊公孫述殺數萬人又曰中元二年冬有大流星從西南向東北行有聲如雷其年中郎將竇固將西征又曰順帝永和三年有流星大如斗從西北東行長八九尺色赤黄有聲隆隆如雷是時大將軍梁商父子秉勢中常侍張逵等與曹騰孟賁爭權矯制收騰順帝寤解騰賁縛逵等奔走或自刺或解貂蟬投草中逃亡之應漢獻帝春秋曰初平四年六月流星起織女東南行天市中蛇行有尾長七八尺色赤照地又流星如斛長六七尺小者六七枚隨之光照地又流星西北行有聲如雷望之如火入照地是曰天狗晉書曰惠帝永興元年七月星隕有聲二年又隕星隕有聲後二年懐帝愍帝䝉塵劉元海石勒攻掠逃亡中夏又曰懐帝永嘉元年有大流星如日自西南流於東北小者如斗相隨天盡赤有聲如雷是年汲桑殺東燕王騰明年劉元海僭號又曰穆帝永和十年流星大如斗色赤黄出織女沒造父有聲如雷其年慕容雋據臨漳諸將奔散又曰海西公太和四年十月有大流星西下有聲如雷明年廣漢妖賊李洪反自稱聖王又慕容暐尅鄴盡有其地明年桓温廢帝又曰孝武太元十三年天狗東北下有聲占曰有大戰流血是後慕容垂翟遼姚萇苻登慕容永並阻兵爭强宋書曰後廢帝元徽五年四月星隕於東南有聲如雷崔鴻十六國春秋曰後趙石勒建平四年有流星大如尾足形自北極西南流五十餘丈光明燭地墜於河聲聞九百餘里其年石勒死而季龍殺勒諸子而簒位隋書曰北齊孝昭皇建二年十月天狗下於郿山於其下講武厭之帝將至有兎驚馬帝墜馬而死又曰武成清河三年春天狗南流下宋地彭城其年妖人反於鄴入北城刼太師彭城王浟爲主浟不從見害又曰周宣帝大象二年五月有流星大如三斗器出太微端門流入翼聲若風吹幡旗其月靜帝立隋公楊堅專政俄而禪位又曰靜帝大定元年七月有流星大如斗出五車東北流光明燭地是月趙王招越王盛以謀執政被誅又曰隋煬帝大業十二年八月夜有大流星如斗出王良閣道聲如頽墻其日又有大流星如甕出羽林有聲明年帝幸江都天下大亂山海經曰金門之山有赤犬名曰天犬其所下者有兵周書天狗所止地盡傾餘光燭天為流星長十數丈其疾如風其聲如雷其光如電吳楚七國反時吠過梁國者是也兵書曰兩敵相望其雲氣如牛馬狀頭低尾仰曰天狗勿與戰也枉矢河圖稽燿鈎曰辰星散爲枉矢流枉矢所射可誅河圖曰枉矢東流天下恐尚書期運授曰帝之治闕十四世其亡也枉矢射參尚書中候曰夏桀無道枉矢射洪範五行傳曰枉矢者弓矢之象也枉矢之所觸天下之所伐㓕亡之象也春秋運斗樞曰黄帝行天樞則枉矢出射所謀春秋潛潭巴曰枉矢出臣不忠又曰枉矢或南北無聚衆伐戰國論語摘輔象曰虛王反度枉矢合史記天官書曰枉矢類大流星蛇行而蒼黒望之如有毛羽然又曰項羽救鉅鹿枉矢西流山東遂合從諸侯西坑秦人誅屠咸陽説苑曰秦二世立枉矢夜光俄而天下大亂二世被殺晉書曰武帝元康四年枉矢北行竟天次年夜枉矢自北斗魁東南行占曰以亂伐亂北斗主殺伐是後趙王倫殺司空張華廢賈后又曰太熈元年有枉矢西南流懐帝永嘉四年劉聰嘉平三年星起牽牛委曲蛇形入紫宫其光照地其年帝爲劉聰所害後三年聰死國亡又曰愍帝建興三年枉矢自文昌北流至斗東如一疋布降地行有手足因變爲雲氣如人象二臂一足至五年北平人吳祚聚衆千人立沙門爲太子四年帝降劉曜又曰元帝大興三年枉矢出虛危沒翼大寧三年王敦殺譙王承及甘卓又曰穆帝昇平二年枉矢自東南流於西北其長半天時所在擁兵政非已出隋書曰齊昏侯永光三年春枉矢晝見西方長十餘丈其年梁武舉兵東昏遇害又曰隋煬帝大業十二年枉矢二出北斗魁委曲蛇行注於南斗後二年宇文化及於江都僭號許王世充於東都殺恭帝僭號鄭蚩尤旗河圖稽燿鈎曰熒惑散爲蚩尤旗主惑亂河圖提劉子曰帝將怒蚩尤出乎四野史記曰天官書曰蚩尤之旗類彗而後曲象旗見則王者征伐四方魏志曰嘉平四年六月持節奉法駕迎髙貴鄉公於元城是嵗白氣經天大將軍司馬景王問王肅其故肅曰此蚩尤之旗也東南其有亂乎君若修己以安百姓則天下樂安者歸徳倡亂者先亡矣明年鎮東將軍毌丘儉楊州刺史文欽果反皇覽冢墓記曰蚩尤冢在東郡壽張縣闗鄉城中髙七丈民常十月祠之有赤氣出如絳名爲蚩尤旗獄漢河圖稽燿鈎曰鎮星散爲獄漢春秋合誠圖曰獄漢主逐王獄漢鎮星之精史記天官書曰獄漢星出正北北方之野星去地可六丈而赤數動察之中青此四野星所出出非其方其下有兵衝不利五殘河圖稽燿鈎曰鎮星散爲五殘主奔亡春秋合誠圖曰五殘主出亡春秋考異郵曰五殘類辰星有角見則政在伯史記天官書曰五殘星出正東東方之野其星狀類辰星去地可五六丈大所出非其方其下有兵衡不利山海經曰西王母是司天之五殘國皇河圖稽燿鈎曰嵗星之精流爲國皇主内難春秋考異郵曰國皇大而赤類南極見則兵起天下急南極老人星也續漢書天文志曰靈帝光和中國皇見東南角去地一二丈如炬火十餘日占曰國皇爲内亂外兵䘮其後黄巾張角何進袁紹董卓亂燔燒宫室遷西京格澤廣雅曰格澤妖氣史記天官書曰格澤星者如炎火之狀黄白起地而上下大上兊其見不種而獲不有土功必有大咎旬始河圖稽燿鈎曰鎮星散爲旬始主招横春秋合誠圖曰旬始主爭兵春秋考異郵曰旬始照其下必有滅主廣雅曰旬始妖氣也史記天官書曰旬始出於北斗旁狀如雄鷄其怒青黒象伏鼈楚辭逺遊篇曰集重陽入帝宫兮造旬始而觀清都司馬相如大人賦曰垂旬始以爲幓旬始氣如雄鷄在北斗旁幓旒也縣旬始于葆下以為十二旒營頭占曰流星晝行亡君之戒一曰流星晝名營頭營頭而下流血滂滂一曰有雲如壊山墮所謂營頭之星其所墮覆軍流血續漢書天文志曰王莾地皇四年遣王尋王邑將兵至昆陽圍城數重有雲氣如壊山墮軍上軍人皆厭所謂營頭之星也占曰營頭之所墮其下覆軍流血三千里是時光武將兵數千人赴救昆陽擊二公㑹天大風飛屋瓦雨如注水二公亂敗死者數萬人晉書曰惠帝太安二年有星晝隕中天北下光變白有如雷占曰爲營首營首所在其下有大兵流血又曰穆帝永和八年日未入有流星大如三斗魁從辰巳上東南行在箕斗間占曰營首之下流血滂沲是年慕容雋稱大燕攻伐無己漢詩推度災曰逆天地絶人倫則天漢滅史記天官書曰漢者金之散氣其本曰水漢星多多少則旱竹書記年曰晉定六年漢不見于天􅅾星漢書天文志曰孝景中三年六月壬戌􅅾星見西南在房南大如二斗器色白癸亥在心東北甲子在尾北丁卯在箕北近漢稍小旦去時大如桃壬申去凡十日占曰􅅾星出必有亂臣房心間天子宫也是時梁王欲爲漢嗣使人殺漢諍臣袁盎晉中興書曰太元二十年九月有􅅾星如粉絮東行歴女虛危及哭星太平御覽卷八百七十五
