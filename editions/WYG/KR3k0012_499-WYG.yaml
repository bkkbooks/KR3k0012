body:
  text: 太平御覽卷四百九十九宋李昉等撰人事部一百四十真愚如愚附愚怯知怯盜竊真愚毛詩鴻雁曰惟彼愚人謂我宣驕韓詩外𫝊曰盤石千里不為有地愚人千億不為有民論語曰唯上知與下愚不移又曰柴也愚參也魯又曰孔子謂仲由汝聞六言六蔽矣乎對曰未也居吾語汝好仁不好學其蔽也愚家語曰孔子曰勇而好問必勝智而好謀必成愚者反是是以非其人告之弗聽非其地樹之弗生得其人如聚沙而雨之言立入也非其人如㑹聾而鼓之處重擅寵專事如賢愚者之情也東觀漢記曰上破賊入漁陽諸將上尊號上不許議曹掾張祉言俗以為燕人愚方定大事反與愚人相守非計也上大笑漢晉陽秋曰司馬文王問劉禪曰頗思蜀不禪曰此間樂不思蜀也卻正聞之求見禪曰若王後問宜泣而後答㑹王復問禪曰先人墳墓逺在隴蜀乃心西望無日不思因閉其眼王曰何以似卻正語耶禪驚視曰如尊命左右皆大笑王隱晉書曰䜟書有蝦蟇當貴惠帝在宫時出問左右此鳴蛙為官乎為私乎賈𦙍對曰在官地中為官蝦蟇在私地中為私蝦蟇於是世間遂傳此語後魏書曰宋弁族弟鴻貴為定州北平府參軍送戍兵於荆州坐取兵絹四百疋兵欲告之乃斬兵十人又疏凡不達律令見律有梟首之罪乃生斷其手以水澆之然後斬決尋坐伏法時人哀兵之苦笑鴻貴之愚續晉陽秋曰顧愷之於夜月下長詠自云得先賢風致謝瞻遙稱讚之愷之得此彌自力忘倦瞻將眠語搥脚人令代焉愷之不覺其異遂幾旦而後止沈約宋書曰劉義基封營道縣侯凡鄙無識毎為始興王濬兄弟所戯濬嘗謂義基曰陸士衡詩曰營道無烈心其何意苦阿父如此義基曰下官初不識士衡何忽見苦廣陵列士傳曰呉武字季濟篤學好古師事陳仲考子升性頑愚考曰父子情重不忍戮之卿可為吾敎也趙書曰石肇前石之昆弟也前石既貴肇在軍中不能自達人送詣前石前石哀之拜建威將軍以肇無才力毎髙選參佐補之為聘廣川劉興兄女肇甚懼之拜長樂太守治官毎入門動稱阿劉敎可爾不可爾時人以為嗤謠鬻子曰愚者不自謂愚見於言語者雖自謂智人皆謂之愚也列子曰宋人有於道得人遺契者歸而藏之宻數其齒告鄰人曰吾富可得矣又曰把國有人憂天崩地墜身無所寄廢寢與食又有憂彼所憂往曉之曰天積氣耳其人曰天果積氣日月星宿不當墜耶對曰日月星宿亦積氣中之有光耀者只使墜亦不能中傷其人曰奈地壊何對曰地積塊耳充塞四虛何憂其壊其人大喜荀卿子曰宋之愚人得燕石於梧臺之東歸而藏之以為大寳周客觀之掩口而笑曰此燕石也其與瓦甓不差主人大怒曰商賈之言醫匠之口藏之愈固守之彌謹莊子曰人有畏影惡迹而去之走者舉足愈數而迹愈多走疾而影不離自以為尚遲疾走不休絶力而死韓子曰燕李季好逺出其妻有士李季至士在内中妻患之乃令士裸而解髮直出門吾屬陽不見也於是士從其計疾走出門季曰是何人也家室皆曰無有季曰吾見鬼也季婦曰為之奈何宜取五牲之矢浴之季曰諾乃浴矢又曰鄭有人身買履者先自度其足而買之及至市得履乃曰吾忘度乃歸取之頃返市罷遂不得履人曰何不試以足曰寧信度數無自信也又曰宋人有耕者田中有株走松株折頸而死因釋耕而守株為宋國笑今欲以先王之政治當世民皆守株之心也吕氏春秋曰范氏之亡也百姓有得鐘者欲負之則鐘大不可負以搥毁之恐人聞而奪已也遽掩其耳惡人聞也又曰楚人有涉江者其劒自舟中墜於水遽刻其舟曰是吾劒之所從墜處舟止從其所刻入水求之淮南子曰楚人有東家母死其子哭而不悲西家子見之歸謂其母曰社何憂速死吾必悲哭社淮南間謂母為社又曰故聖人同死生愚人亦同死生聖人同死生通於分理也愚人之同死生不知利害之所在也符子曰鄭人有逃暑於孤林之下者日流影移而徙袵以從隂及至暮反席於樹下及月流影移復徙袵以從隂而患露之濡於身其隂逾去而其身逾濕是巧於用晝而拙於用夕奚不處曜而辭隂反林自露此亦愚之至也笑林曰漢司徒崔烈辟上黨鮑堅為掾將謁鮑自慮不過問先到者儀適有答曰隨典儀口喝既謁讚曰可拜堅亦曰可拜讚者曰就位堅亦曰就位因復着履上座將離席不知履所在讚者曰履着脚堅亦曰履着脚也又曰平原陶邱氏取渤海墨台氏女女色甚美才甚令復相敬已生一男而歸母丁氏年老進見女聓女聓既歸而遣婦婦臨去請罪夫曰曩見夫人年德以衰非昔日比亦恐新婦老後必復如此是以遣實無他故崔駰與竇憲牋曰交淺而言深者愚也在賤而望貴者惑也如愚論語為政曰吾與回言終日不違如愚退而省其私亦足以發回也不愚又公冶長曰甯武子邦有道則智邦無道則愚其智可及其愚不可及也華陽國志曰王長文字德雋天姿聰警察孝廉不就遂陽愚嘗着絳衣帽牽猪過市中乞人與語偽不聞常騎牛周遊説苑曰齊桓公獵逐鹿入谷中見一老公問是為何谷對曰為愚公之谷以臣名之臣故畜㹀牛生子大賣之而買馬少年曰牛不能生馬遂持駒去家鄰以臣為愚故名愚公之谷愚怯釋名曰怯脅也見敵恐脅也焦贛易林曰任將力薄駑孱思怯如蝟見鵲不敢拒格韓詩外傳曰崔杼殺莊公陳不占東觀漁者聞君難將往死之飡則失哺上車失軾僕曰敵在數百里外今食則失哺上車失軾雖往其有益乎陳不占曰死君義也無勇私也遂驅車比至門聞鼓鐘之音闕㦸之聲遂駭而死君子聞之曰陳不占可謂志士矣無勇而能行義天下鮮矣東觀漢記曰杜篤仕郡文學掾以目疾二十餘年不窺京師篤外髙祖破羗將軍辛武賢以武略稱篤常歎曰杜氏文明善政而篤不任為吏辛氏秉義經武而篤又怯於事外内五世至篤衰矣沈約宋書曰周朗兄嶠為呉興太守賊劭弑立隨王誕舉義於㑹稽劭加嶠冠軍將軍誕檄又至嶠素恇怯迴惑不知所從為府司馬邱珍孫所殺又曰劉彦節少以宗室清謹見知齊髙帝輔政彦節知運祚將遷宻懐異圖及沈攸之舉兵齊髙帝入朝堂袁粲鎮石頭潛與彦節反諸大將黄回等謀夜㑹石頭詰旦乃發彦節素怯騷擾不自安日晡後便自丹陽郡車載婦女盡室奔石頭臨去婦蕭氏强勸令食彦節歠羮冩胷中手振不自禁事敗被殺趙書曰石勒屯葛陂值天雨不息勒長史刁應勸勒降晉勒啾然而嘯張賔勸勒還北勒欣然曰賔計是也應宜斬明其性怯可退為將軍孫卿子曰夏首之南有人曰涓濁梁其人愚善畏明月而宵行俯見其影以為伏鬼仰見其髮以為伏魅匍踣而走比至其家失氣而死慎子曰有勇不以怒反與怯均也吕氏春秋曰夫民無常怯有義則實實則勇無氣則虛虛則怯怯勇虛實其所由甚微不可不知淮南子曰怯者夜見立表以為鬼見寢石以為兕懼掩其氣也掩奪也抱朴子曰拙人得公輸之斤斧不能以成雲梯怯者得馮婦之刀㦸不能以格兕虎智怯韓詩外傳曰楚白公之難有杜之善者辭其母將死君其母曰死君可乎杜之善曰聞事君者内其禄而外其身今所養母者君之禄也請往死之比至朝三廢車中其僕曰子懼何不返也杜之善曰懼吾私也死君公也吾聞君子不以私害公遂往死也家語曰或問孔子曰顔淵何人曰仁人也丘弗如也子貢何人曰辨人也丘弗如也子路何人曰勇人也丘弗如也客曰三子者皆賢於夫子而服役何也孔子曰丘能仁且忍辨且訥勇且怯以三子之能易丘之道弗如也史記曰管仲曰吾嘗三戰三走鮑叔不以我為怯知我有老母也又曰淮隂屠中少年有侮韓信者曰若雖長大好帯劒中情怯耳衆辱之曰能死刺我不能出我跨下信視之俛出跨下匍匐一市人皆笑信怯也尸子曰聖人畜仁而不主仁畜智而不主智畜勇而不主勇昔齊桓公脅於魯君而獻地句踐脅於㑹稽而身宫之趙襄子脅於智伯而以顔為愧其卒桓公臣魯君句踐滅呉襄子以智伯為戮此為勇而能怯智也盜竊易繫辭曰慢藏誨盜冶容誨淫又曰負且乘致冦至盜之招也禮記月令曰季秋行冬令則國多盜賊左傳僖中曰介之推曰竊人之財猶謂之盜况貪天之功以為己力乎又昭公中曰鄭子産有疾謂子太叔曰我死子必為政唯有德者能以寛服民其次莫如猛太叔為政不忍猛而寛於是鄭國多盜取人於萑苻之澤太叔悔之曰吾早從夫子之言不及於此興徒兵以攻萑苻之盜盡殺之盜少止論語顔淵曰季康子患盜問於孔子孔子對曰苟子之不欲雖賞之不竊家語子貢為信陽宰將行辭於孔子孔子曰勤之慎之奉天之時無奪無伐無暴無盜子貢曰賜也少事君子豈以盜為累哉孔子曰爾未之詳夫以賢代不賢是之謂奪以不肖代賢是之謂伐緩令急誅是之謂暴取善自與是之謂盜非竊財之謂也史記曰秦昭王囚孟嘗君謀欲殺之孟嘗君使人私昭王幸姬求解姬曰妾願得君狐白裘比孟嘗君有一狐白裘值千金天下無雙入獻昭王無他裘孟嘗君患之徧問客莫對最下座為狗盜者曰臣能得乃夜為狗以入秦宫藏中取所獻狐白裘至以獻秦幸姬幸姬為言昭王釋孟嘗君又曰有盜髙廟座前玉環捕得文帝怒下廷尉治之張釋之案律盜宗廟服御物者奏棄市漢書曰彭越字仲昌邑人常漁鉅野澤中為盜又曰龔遂字少卿山陽人宣帝時渤海左郡歲饑盜賊並起二千石不能擒制上選能治者御史舉遂可用上以為渤海太守問曰渤海廢亂君欲何以息盜賊對曰海濵遐逺不沾聖化其民困於饑寒而吏不恤故使弄陛下之兵於潢池中耳今欲使臣勝之耶將安之也臣聞理亂民如理亂繩唯緩之而後可呉志曰孫堅與父之錢塘㑹海賊胡玉等取賈人財物岸上分之堅追斬一級晉書曰蔡裔有勇氣嘗二盜入室裔不知拊牀一呼二盜俱殞又曰王獻之夜卧齋中而有偷入其室盜物獻之徐曰偷兒青氊我家舊物可特置之羣偷驚走崔鴻十六國春秋後趙録曰徐龕勇果薄行舊為刼盜者無不歸之公行掠抄迅如風雨北齊書曰宋世良字元友為清河太守郡東有南曲隄成公一姓阻而居之羣盜多萃於此人為之語曰寧使東呉㑹稽不厯成公曲隄世良施八條以制盜盜奔他境人又謠曰曲隄之險賊何益但有宋公自屏跡吕氏春秋曰秦繆公乘馬車敗右服失而野人取之繆公自往求馬見野人方將食之於岐山之陽繆公笑曰食駿馬之肉不飲酒余恐其傷汝也遍飲而去處一年韓原之戰晉人已環繆公之車矣嘗食馬肉三百餘人畢力為繆公疾鬭大尅晉軍反獲惠公以歸莊子曰將為胠篋探囊發匱之盜為守備則必攝緘縢固扄鐍此世俗所謂智也巨盜至則必負篋擔囊而趍唯恐緘縢扄鐍之不固然向所謂智者不乃為大盜積者乎又曰絶聖棄智大盜乃止摘玉毁珠小盜不起列子曰晉國苦盜有郗雍者能視盜之貌察其眉睫之間而得其情晉侯使視千里無遺一焉晉侯大喜告趙文子曰吾得一人而一國盜為之盡矣文子曰君司察而得盜盜不盡矣且郗雍必不得其死俄羣盜謀曰吾所以窮者郗雍也遂戕之晉侯聞大駭召文子曰果如子言然取盜何方文子曰君欲無盜舉賢而任之遂取隨㑹為政而羣盜奔秦焉又曰牛􅀈者上地之大儒之邯鄲遇盜於耦沙之中盡取其衣車牛步而去視之欣然無憂怯之色盜追而問其故曰君子不以所養害其所以養盜曰嘻賢矣彼往見趙君以我為事必困乃相與追而殺之又曰東方有人曰爰旌目將有所適而餓於道狐父之盜曰邱見而下壺飡以餔之爰旌目三餔而後能視曰子能何為者也曰我狐父之人邱也爰旌目曰嘻女非盜耶胡為而食我吾義不食子之食也兩手據地而嘔之不出喀喀然而死淮南子曰楚將子發好求伎道之士有善為偷者往見曰聞君求伎道之士臣楚市偷也願以伎修一卒子發備見而禮之無幾何齊興師伐楚子發將師以當之兵三却於是市偷請曰臣有薄伎願君行之子發曰諾偷則夜出解齊將軍之綢帳而獻之子發使歸之明夕復往取其枕又使歸之明夕復往取其簪又使歸之於是齊師大駭將軍與軍吏謀曰今夕不去楚軍恐取吾首即還秦子曰孔文舉為北海相有母病差者思食新麥家無乃盜鄰熟麥而進之文舉聞之特賞盜而不罪抱朴子曰夷吾奪田不可以薄蕭何竊妻不可以廢也郭子曰王安期為東海太守小吏盜池中魚綱紀推之王曰與衆共之魚何足恡皇甫士安髙士傳曰孔嵩字仲山辟公府之京師道宿下亭盜共竊其馬尋問知是嵩也乃相責讓曰孔仲山善士豈宜侵盜乎於是遂以馬還之先賢行狀曰王烈字彥方通識達道時國中有盜牛者牛主得之盜曰邂逅迷惑從今已後將改過子既已赦宥幸勿使王烈知之海内先賢傳曰姜肱字伯淮嘗與弟季江遇盜將奪其衣人問不言盜聞叩頭謝罪還肱衣肱不受陳寔别傳曰有盜夜入其室立於梁上實隂見之乃起呼子孫正色訓之曰夫人不可不勉不善之人未必本惡習與性成遂至如此如梁上君子是矣盜大驚自投於地稽顙歸罪實徐譬之曰視君狀貌不是惡人宜深克己反善當由困貧今遺絹二疋自是一縣無復盜竊劉欣期交州記曰趙嫗者乳長數尺不嫁人山聚羣盜遂比郡常着金蹋踶戰退輒張帷幕與少兒通數十侍側刺史陸𦙍平之太平御覽卷四百九十九
