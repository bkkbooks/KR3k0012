body:
  text: 太平御覽卷五百三十三宋李昉等撰禮儀部十二明堂尚書帝命驗曰帝者承天立府以尊天重象象五精之神也天有五帝集居太微降精以生聖人故帝者承天位五官之府是謂天府赤曰文祖赤帝赤熛怒之府名文祖火精光明文章之祖故謂之文周曰明堂黄曰神斗黄帝舎紐樞之府而名曰神斗斗主也土精澄靜四行之主故謂之神斗周曰太室白曰顯記白帝白招拒之府曰顯記法也金精斷割萬物成故謂之顯記周曰總章黒曰𤣥矩黒帝汁光紀之府名曰𤣥矩矩法也水精𤣥昧能權輕重故謂𤣥矩周曰𤣥堂蒼曰靈府蒼帝威靈仰之府名靈府周曰青陽周書明堂曰明堂方百一十二尺髙四尺階廣六尺三寸室居中方百尺室中方六十尺東應門南庫門西皋門北雉門東方曰青陽南方曰明堂西方曰總章北方曰𤣥堂中央曰太廟以左為左个右為右个也又曰文王在翟太姒夢見商之庭産棘小子發取周庭之梓樹於闕間化為松柏棫柞驚以吿文王文王曰召發于明堂拜告夢受之大命毛詩清廟我将曰我将祀文王於明堂也周禮冬官下匠人曰夏后氏世室堂脩二七廣四脩一殷人重屋堂脩七尋堂崇三尺周人明堂度九尺之筵東西九筵南北七筵堂崇一筵世室者宗廟也脩南北之深也夏度以歩令堂脩十四歩其廣益以四分脩之一則廣十七歩半也重室者王室正堂若大寝者周則其廣九尋七丈三尺也大戴禮盛徳曰凢人民疾六畜疾五榖災者生於天道不順天道不順生於明堂不飭故有天災則飭明堂又盛德曰明堂者古有之凢九室一室而有四户八牖三十六户七十二牖以茒葢屋上圓下方明堂者所以眀諸侯尊卑也外水名曰辟雍列南蠻北狄西戎東夷禮記明堂位曰昔者周公朝諸侯于明堂之位周公搹王位以明堂之禮儀朝諸侯也不於宗廟避王也天子負斧扆南向而立天子周公也負言背也斧扆為斧文屏風於户牖間周公於前立也三公中階之前北面東上諸侯之位阼階之東西面北上諸伯之國西階之西東面北上諸子之國門東北面東上諸男之國門西北面東上九夷之國東門之外西面北上八蠻之國南門之外北面東上六戎之國西門之外東面南上五狄之國北門之外南面東上九采之國應門之外北面東上四塞世吿至此周公明堂之位也又明堂位曰明堂也者明諸侯之尊卑也朝於此所以正儀辨等也昔殷紂亂天下脯鬼侯以饗諸侯以人肉為薦羞惡之甚也是以周公相武王以伐紂武王崩成王幼弱周公踐天子之位以治天下六年朝諸侯於明堂制禮作樂頒度量而天下大服又祭義曰祀乎明堂所以教諸侯之孝也禮記明堂隂陽錄曰明堂隂陽王者之所以應天也明堂之制周旋以水水行左旋以象天内有太室象紫宫南出明堂象太㣲西出總章象五潢北出𤣥堂象營室東出青陽象天市上帝四時各治其宫王者承天統物亦於其方以聽國事禮含文嘉曰明堂所以通神靈感天地正四時明堂者八忩四逹忩通八卦之氣布政之宫在國之陽面三室四面十二法十二月也天子孟春上幸於南郊揔十二月之政令還藏於祖廟月取一政班於明堂也諸侯以孟春之月朝於天子受十二月之政藏於祖廟月取一政行之閏月無常處則闔門而居之禮記外傳曰明堂古者天子布政之宫在國南十里之内七里之外黄帝享百神於明廷是也南方陽明之地因為明堂路寝宫室之制同唐虞為五府府者聚也合五帝之神祭之夏謂太廟為世室世室不毁之義殷人謂路寝為重屋周人謂五府為明堂形制同故平舉夏后氏一堂之上為五室木室東北火室東南金室西南水室西北土室中央南面三階三面兩階則九階矣五室者象地載五行也五行生於四時故毎室四逹逹向也四户相對一室八忩夾户之忩象八莭周人有圓屋九月大享五帝於明堂即祖廟心為天子明堂東方之宿大火位之辰即心星也或以明堂獨以一室孝經授神契曰明堂之制東西九筵二丈九尺也明堂東西八十一尺南北六十三尺故謂之太室又曰周之明堂在國之陽三里之外七里之内在辰巳者也春秋合成圖曰明堂在辰巳者言在水火之際辰木也巳火也木生數三火成數七故在三里之外七里之内漢書郊祀志曰天子封太山太山東北趾古時有明堂處險不敞上欲治明堂奉髙傍未曉其制度濟南人公玉帯上黄帝時明堂圖明堂中有四殿四面無壁以茅葢通水圜宫垣為複道上有樓從西南入名曰崑崙天子從之又曰元始五年春正月祫祭明堂諸侯王列侯宗室子九百餘人助祭畢皆益户賜爵及金帛増秩補吏有差後漢書曰永平二年春正月辛未宗祀光武於明堂帝及公卿列侯始服冠冕衣裳玊佩絇履以行事續漢書祭祀志曰明帝即位郊祀五帝於明堂光武帝配五帝坐位堂上各處其方黄帝在末皆如南郊祀之位光武帝位在青帝之南少退西面牲特各一奏樂如南郊又禮儀志曰明堂五郊宗廟太稷社六宗夕牲皆以晝漏未盡十四刻初納夜漏未盡七刻五刻初納進熟獻送神還有司吿事畢六宗燔燎火燃有司吿事畢蔡邕禮樂志曰漢承秦滅學庶事草創明堂辟雍闕而未舉武帝封禅始立明堂於太山猶不於京師元始中王莽輔政庶績復古乃起明堂辟雍宋書禮志曰晉元帝紹命中興依漢氏故事冝享宗廟明堂祀之禮江左不立明堂故闕焉齊書禮志曰案禮及孝經援神契並云明堂有五室天子毎月聽朔布敎祭五帝之神配以功徳之君大戴禮曰明堂者所以明諸侯尊卑也許慎五經異義曰布政之宫故稱明堂明堂盛貌也周官匠人職稱明堂有五宫鄭𤣥云周人明堂五室帝一室也齊書禮志曰永明二年祠部郎蔡履議郊與明堂本宜異日漢東京禮儀志南郊禮畢次北郊明堂髙廟位之五供蔡邕所據亦然近世存省故郊堂共日来年郊祭宜有定准太學愽士王祐議来年正月上辛宜祭南郊次辛事明堂後辛饗祀北郊隋書禮儀志曰明堂在國之陽梁初依宋齊共祀之法猶依齊制禮有不通者武帝更與學者議之先是帝欲有改作乃下制書而與群臣切磋其義制曰明堂准大戴禮九室八牖三十六户以茅盖屋上圓下方鄭𤣥據援神契亦云上圓下方又云八忩四達明堂之義本是祭五帝神九室之數未見其理若堂而言雖當五帝之數向南則背汁光紀向北則背赤熛怒東西向亦如此於事殊未可安又禮儀志曰明堂後齊採周官考工記為五室周採漢三輔黄圖為九室各存其制而意不立又禮儀志曰隋将作大匠宇文愷依月令文造明堂木様重檐複廟五方四逹丈尺䂓矩皆有准慿以獻髙祖異之命有司於郭内安業里為䂓兆方欲崇建又命詳定諸儒争論莫之能决牛𢎞等乂條經史文重奏時議既多久而不定又議罷之及大業中愷又造明堂義及様奏之煬帝下其議但令於霍山採木而建都興役其制隨寝終隋代祀五方上帝於明堂以季秋在雩壇上而祀其用幣各於其方唐書曰永徽中詔曰朕聞合宫靈府創鴻䂓於上代大室總章標茂範於中葉雖復質文殊制奢儉異時然其立天中作人極布政施教歸之一揆朕嗣膺下武丕承上烈思所以荅眷上靈事遵孝養而法宫曠禮明堂寝構永言大禮朕甚懼焉宜令所司與禮官學士等考覈故事詳議得失於是太常愽士栁宣依鄭𤣥義以為明堂之制當為五室内直丞孔志約據大戴禮及盧植蔡邕等議以為九室袐書郎薛文思等各造明堂圖又曰永徽中令禮官學士詳議明堂制度乆之不定上乃内出九室様更令損益羣儒紛競各執異議于志寧等請為九室太常愽士唐畛等請為五室上令所司於觀徳殿依兩議張設親與公卿觀之上曰明堂之禮自古有之議者不同未果營建今設兩議公等以何者為宜閻立徳對曰兩議不同俱有典故九室似闇五室似明取舍之宜斷在聖慮上亦以五室為便議又不定由是止又曰垂拱二年毁乾元殿就其地創造明堂凢髙二百九十四尺東西南北各廣三百尺凢有三層下層象四時各隨方色中層法十二辰圓盖葢上盤九龍上層法二十四氣亦圓盖亭中有巨木十圍上下通貫刻木為瓦紵漆之明堂之下施鐡渠以為辟雍之象號為萬象神宫又曰證聖元年正月明堂後複堂火延燒明堂三年又令重造如明堂髙廣如舊制上制寳鳳號為通天宫又曰永昌元年正月皇后親享明堂戊午布政於明堂頒九條以記於百官己未神皇御明堂饗群臣賜縑有差自明堂成後縱神都婦人及諸州老人入觀兼賜酒食至是日始止又曰開元中敕云州置魏孝文帝祠堂一所有司以時享祭是州有魏故明堂遺跡乃置廟於其跡焉家語曰孔子觀乎明堂覩乎四門之牖有堯舜桀紂之象而各有善惡之状興廢之誡焉又有周公相成王抱之而負斧扆南面朝諸侯之圖焉晏子春秋曰明堂之制土事不文木事不鏤示民知莭也尹子曰黄帝合宫有虞氏曰總章殷人曰陽館周人曰明堂此皆所以名休其善也淮南子曰自古者明堂之制明堂太廟正室下之潤濕弗能及也上之霧霜弗能入也四方之風弗能襲也潁容春秋人君将出吿於宗廟反行策勲獻俘於廟禮論曰或以為明堂者文王廟周時徳澤和洽蒿茂大以為宫柱名曰蒿宫三輔黄圖曰孝武帝議立明堂於長安城南許令褒等議曰按五經禮傳記曰聖人之教作之象所以法則天地比類隂陽以成宫室本之太古以昭令德茅屋采椽土階素輿越席皮弁盖興於黄帝堯舜之代是以三代修之也黄圖曰明堂者明天道之堂也蔡邕禮樂志曰孝武帝封禅岱宗立明堂於泰山之上也許慎五經異義曰明堂在國之陽三里之外七里之内地就陽位也釋名曰明堂猶堂堂髙顯貌也三禮圖曰明堂者布政之宫周治五室東為木室南為火室西為金室北為水室土室在中秦為九室十二階各有所居趙􅁮呉越春秋曰王召范蠡問曰孤竊自志欲以今日一登上明堂布恩致令以撫百姓袁子正論曰明堂宗廟太學禮之大物也事義不同而議者合以為一失之逺矣李尤明堂銘曰布政之宫上圓下方體則天地在國之陽窓逹四設流水洋洋順莭行化各居其房春恤幼孤夏進賢良秋厲威武冬謹闗梁桓譚新論曰王者造明堂辟雍所以承天行化也班固東都賦明堂詩曰於昭明堂明堂孔陽聖皇宗祀穆穆煌煌上帝宴饗在位時序誰其配之世祖光武晉紀瞻荅秀才䇿曰周制明堂所以宗其祖以配上帝其正中皆太廟以順天時施法令也太平御覽卷五百三十三
