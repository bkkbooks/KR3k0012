  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_297-1a, image: WYG0895/WYG0895-0582c.png}
body:
  text: 太平御覽卷二百九十七宋李昉等撰兵部二十八訓兵訓兵孫子曰言不相聞故為鼓鐸視不相見故為旌旗夫金鼓旌旗者所以一人之耳目也人既專一則勇者不得獨進怯者不得獨退紛紛紜紜間亂而不可亂旌旗亂也示敵若亂以金間之紛紛旌旗翻轉一合一離士卒進退或徃或來視之若擾觀之若亂然其法令素定度職分明各有分數擾而不亂也渾渾沌沌形圓而不可敗車騎齊轉也形圓者出入有道齊整也渾渾車輪轉行沌沌歩騎奔馳視其形陣縱横圓而不方然其指趣各有所應故王子曰將欲内明而外暗内理而外渾示敵之輕已者也渾音分本切沌從損切周禮曰大宗伯以軍禮同邦國同謂威其不協僣差者軍禮之别有五大師之禮用衆也用其義勇也大均之禮恤衆也均其地政地守地職之賦所以憂民也大田之禮簡衆也古者因田習兵閱其車徒之數也大役之禮任衆也築宫邑所以事民力强弱也大封之禮合衆也正封疆溝洫之固所以合聚其民也又曰夏官大司馬之職掌中春教振旅司馬以旗致民平列陳如戰之陳以教坐作進退疾徐疏數之節遂以蒐田中夏教茇舎如振旅羣吏撰車徒遂以苗田中秋教治兵如振旅辨旗物之用遂以獮田中冬教大閱前期羣吏聽􅊎於陳前斬牲以左右徇陳曰不用命者斬之遂以狩田師以救無辜伐有罪若師有功則左執律右秉鉞以先愷樂獻於社左傳曰春蒐夏苗秋獮冬狩皆於農隙以講事也三年而治兵入而振旅歸而飲至以數軍實昭文章明貴賤辨等列順少長習威儀也又曰楚子文治兵於暌終朝而畢不戮一人子玉復治兵於蒍終日而畢鞭七人貫三人耳國老皆賀子文蒍賈不賀曰子玉剛而無禮過三百乗其不能以入矣子玉之敗子之舉也舉以敗國將何賀焉又曰苗賁皇徇曰蒐乗補卒秣馬利兵修陣固列蓐食申禱明日復戰乃逸楚囚又曰宣子曰我若受秦則賔也不受冦也既不受矣而復緩師秦將生心先人有奪人之心軍之善謀也逐冦如追逃軍之善政也訓卒利兵秣馬蓐食潜師夜起戊子敗秦師於令狐至於刳首又曰宣榭火宣榭講武室也論語曰子曰善人教民七年亦可以即戎矣可就兵攻戰也又曰以不教民戰是謂棄之後漢書曰靈帝時望氣以為京師有大兵兩宮流血大將軍司馬許涼假司馬伍宕說何進曰太公六韜有天子將兵事可以威四方進以為然入言之于帝于是講武於平樂觀下起大壇建十二重五采華蓋帝躬擐甲介馬稱無上將軍使進領兵屯於觀下置西園八校尉袁紹曹操等為之唐書曰太宗初即位突厥入冦欲諸軍皆習騎射毎退即引諸衛將習射於顯徳殿庭謂將軍已下曰古突厥與中國更有盛衰若軒轅善用五兵即能北逐獯虜周宣驅駕方召亦能制勝太原下至漢晉之君洎于隋代不使兵士素習干戈突厥來侵莫能抗禦遣中國生民塗炭于冦手我今不使汝等穿地築苑造諸淫費農民恣令逸樂兵士唯習弓馬若無賊來我則為汝博士教汝等武藝優長若有賊來我則為汝將帥令汝等鬭戰亦望使汝等前無横敵於是日引數百人於殿庭教射太宗親自令試毎坐或至午時射中者隨賞弓刀布帛統帥加上考朝臣咸諫云不宜引卑賤之人挾弧矢於軒陛之側上曰率土之内皆吾臣子我所恨不能將我心遍置人腹中豈有相疑之道哉由是一二年間兵士盡便弓矢焉又曰李抱真領澤潞觀察畱後抱真密揣山東當有變上黨且當兵衝是時承戰餘之地土瘠賦重人益困無以養軍士乃籍户丁男三選其一有材力者免租徭給弓矢令之曰農之隙則分曹角射嵗終吾當㑹試及期按簿而徴之明試以示賞罰復命之如初比三年則皆善射抱真曰軍可用矣於是舉部内之衆得精卒二萬人既不費廪府庫益實乃繕甲兵為戰具遂雄視山東是時稱昭義歩兵冠諸軍又曰徳宗即位以馬燧為太原尹北都留守河東節度觀察度支營田使當是時太原承鮑防敗軍之後兵甲寡弱騎士少燧乃悉召將吏牧馬厮役得千數人悉補騎卒教之數月皆為精騎造甲者必令長短三等稱士所衣以便進趨又造戰車以象狻猊列㦸於後行則載兵甲止則為營陣或塞險阨以遏奔衝噐械無不犀利居一年陳兵三萬開廣塲以習戰陣教其進退古司馬兵法曰凡戰非陣之難使人可陣難非可使陣難使可用難使人盡心効力用必勝也非知之難行之難教習使人知進退之便左右之利自事事行之者難又曰天子之義必純取於天地而觀於先聖天子奉天地之道調和隂陽四時之氣順先王之法度也士庻之義必奉於父母而正於君臣士庻必從父母之教君長之命故雖有明君士不先教不可用也雖有明君士不教習不可以受敵也古之教民必立貴賤之經綸使不相凌徳義不相踰材藝不相掩勇力不相犯故力同意和古者國容不入軍軍容不入國故徳義不相踰治國以仁徳軍士以勇義德以從化義以法斷以國容入軍則軍敗以軍容入國則國亂吳起教戰法曰短者持矛㦸長者持弓弩强者持旌旗勇者持金鼓弱者給厮養智者為謀士鄉里相比什伍相保一鼓整兵二鼔戢陣三鼓趣食四鼓辨列五鼔就行聞鼔聲合然後舉旗六韜曰教戰之法必明告吏士三令五申教其操兵起居進止旌旗指麾陣而方之坐而起之行而止之左而右之列而合之繩而解之無犯進止之節無失飲食之宜無絶人馬之力令吏士一人學戰教成十人十人學戰教成百人百人學戰教成千人千人學戰教成萬人萬人學戰教成三軍之衆大戰之法百萬之師故能成大功也衛公兵法曰諸兵士將戰身貌尫弱不勝衣甲及戎具所施理須簡取强兵并令試練噐仗兵須徹扎䧟堅皆須取甲令試所射然始取中又曰毎營中兩廂置土馬十二疋大小如常馬真鞍令士卒擐甲胄櫜弓矢櫜音髙佩刀劔持矛楯左右上下以便習事又教旗法曰凡教旗于平原曠野登髙逺視處大將居其上南向左右各置鼓一十二面角一十二具左右各樹五色旗六纛居前列旗節次之左右衙官駐隊如偃月形為後騎下臨平野使士卒目見旌旗耳聞鼔角心存號令乃命諸將分為左右皆去兵刄精新甲胄幡幟分為左右廂各以兵馬使為長班布其次陣間容陣隊間容隊曲間容曲以長參短以短參長廻軍轉陣以後為前以前為後進無奔迸退無趣走以正合以竒勝以聽以觀乍合乍離於是三令五申白旗㸃鼔音動則左右廂齊合朱旗㸃角音動則左右廂齊離離之與合皆不離中央之地左廂陽向西旋右廂隂向東旋左右皆復本初白旗掉鼓音動左右各雲蒸鳥散彌川絡野然不失隊伍之疎密朱旗掉角音動左右各復本初前後左右無差尺寸散則發天聚則法地如此三合而三離三聚而三散不如法者吏士之罪從軍令於是大將軍出五采旗一十二口各樹於左右廂陣前毎旗命壯勇士五十人守旗選壯勇五十人奪旗左廂奪右右廂奪左鼔音動而奪角音動而止得旗者勝失旗者負勝賞而負罸離合之勢聚散之形勝負之理賞罰之信因是而教之太白隂經曰春秋末並為戰國增講武之禮以為戲樂以相誇視而秦更名為角抵故國雖大好戰必亡天下雖平忘戰必危天下既平春蒐秋獮振旅理兵所以不忘戰今邊軍更名曰教旗使士卒識金鼔别旗幟任行列知部分一軍之節制也又曰古之諸侯畋獵者為田除害也上所以供承宗廟下所以嫻習武事太古之時人食禽獸之肉坐其皮後代之人浸多時禽獸寡少衣食不足於是神農教其植穀導以紡績自是之後禽獸復盈山林下平土害禾稼為人所害於是王公秋冬無事畋獵嫻習兵革奮揚威武以戒非常季冬之月臘日隂用事萬物畢成蟄蟲已伏乃具卒乗從禽於山澤以教部分進退之儀一人守圍地三尺十二時守三萬六千尺積尺得六千部積部得十五里餘六十部圍中徑闊得地五里餘二十部以左右决勝將軍為交頭其决勝左右將各主士仵為行列皆以金鼔旌旗為節制其初起圍張翼随山林地勢無近逺部分其合圍地虞候先擇定訖以善弧矢者為圍中騎其歩卒搶旗幡守圍者漏禽獸坐守圍之吏大獸公之小獸私之以觀進止管子曰凉風至而白露下天子命左右司馬令組甲厲衆士商君書曰民之見戰如餓狼之見兎則民可以用矣呂氏春秋曰世有言曰驅市人而戰可以勝人之厚禄教練卒攻罷民罷與疲同可以勝人之精士練才離散係恭音累可以勝人之行陳陳與陣同整齊鉏耰白挺可以勝人之長銚利兵此不通乎兵者之論今有利劍於此以刺則不中以擊則不及於惡劍無擇為是鬭因用惡劍則不可簡選精良兵械鋒利發之則不時縱之則不當與惡卒無擇為是戰因用惡卒則不可王子慶忌陳午猶欲劔之利也陳午齊人慶忌吳公子二人皆勇有健力簡選精良兵械銛利令將將之有以王者覇者矣湯武齊桓晉文吳闔閭是也又曰故形勢險阻欲其便也兵甲噐械欲其利也選練角材欲其精也將率士民欲其教也此四者義兵之助也時變之應也又曰闔閭試其民於五湖劒皆加於肩地流血幾不可止勾踐試其民於寢宮民争入火死者千餘遽擊金而退之賞罰充實也鄴城故事曰凌霄觀按石季龍永和三年命其子石宣祈于山川因而遊獵乗大輅羽葆華蓋建天子旌旗六十有軍戎卒十八萬出自金明門季龍從後宫昇觀望之笑曰我家父子如是自非天崩地陥當復何愁但抱子㺯孫日為樂耳文選曰三令五申教達禁戒謝承與歩子山書曰示攻戰進取之方教進退疾徐之節劉向别傳曰蹵鞠者傳言黄帝所作或曰起戰國之時蹹音沓鞠兵勢所以陳之知武材也皆因嬉戲而講習也太平御覽卷二百九十七
