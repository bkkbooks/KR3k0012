body:
  text: 太平御覽卷九百七十一宋李昉等撰果部八柿橙林檎椑枇杷㯽榔豆㓂胡桃荔枝柿義熈起居注曰二年正月呉令顧修期上言西鄉有柿樹殊本合條依舊集賀詔停之晉宫閣名曰徽章殿前柿一株廣志曰柿有小者如杏王逸荔枝賦曰宛中朱柿潘岳閒居賦曰張公大谷之棃梁侯烏椑之柿王廙洛都賦曰豹祠赤杏胡丘丹柿丼液滋脆不經牙齒李尤七歎曰鴻柿若𤓰劉義恭謝啟曰勑㫖垂賜華林園柿出自神苑滋味殊絶也橙說文曰橙橘屬也東觀漢記曰建武中南單于來朝賜御食及橙橘龍眼荔枝晉令曰諸官有秩者守䕶橙者置吏一人淮南子曰夫橘樹之江北化為橙風俗通曰橙皮可為醤韲愽物志曰成都廣都郫繁江原臨卭六縣生金橙似橘而非若柚芬香夏秋冬或華或實大如桃小者或如彈丸或有年春夏秋冬華實竟嵗廣志曰有給客橙自夏至冬且花且實風土記曰橙柚屬也而葉正圓異苑曰南康歸羙山石城内有橙就食其實任意取足持歸家人啖輙病或顛仆失徑庾仲初楊都賦曰菓則黄丼朱橙胡道安丼賦曰襄隂大橙江陽巨橘林檎廣志曰林檎似赤柰亦名黒檎劉禎京口記曰南國多林檎述征記曰林檎果實可佳比榅桲實㣲大其狀醜其味香輔関有之江淮南少晉宫闕記曰華林園有林檎十二株榅勃六株左思蜀都賦曰林檎枇杷橙柿梬楟謝靈運山居賦曰枇杷林檎帶谷暎渚椑廣州記曰荔枝壺橘南珍之上菱蓮椑柿為其次地理記曰梁侯園有烏椑八稜大如酒盞荆州地土記曰宜都出大椑晉宫閣名曰華林園椑子二株范汪祠制曰孟冬祭用椑柿異苑曰傅亮永初中為䕶軍兄珍住府西齋忽見北窻外椑樹下物面廣三尺状若方相乆乃自㓕􅅊燿靈陽賦曰丼蔗椑柿榛栗木𤓰潘安仁閒居賦曰梁侯烏椑之柿謝靈運山居賦曰椑柿被實於長浦潘岳金谷詩曰前庭樹沙丼後園植烏椑魏武帝為兖州牧上書謹上椑棗二箱枇杷范汪祠制曰孟夏祭用枇杷唐書曰建中元年詔山南之枇杷江南之丼橘嵗為次第貢者取一次以供廟饗餘皆罷晉宫閣名曰華林園枇杷四株風土記曰枇杷葉似栗子似葯十月葉生四月熟南中八郡志曰南安縣出好枇杷廣州記曰枇杷若榴㕘乎京都華山記曰華山講堂西頭有枇杷園荆州土地記曰宜都出大枇杷廣志曰枇杷冬華實黄大如鷄子小者如杏味甜酢四月熟出犍為仲長統昌言曰今人主不思丼露醴泉之湧而患枇杷荔枝之腐亦鄙矣王彪之閩中賦曰果則烏椑朱柿扶餘枇杷周秪枇杷賦曰昔魯季孫有嘉樹韓宣子譽之屈原離騷亦著橘賦至於枇杷寒暑無變負雪揚華余植之庭圃遂賦之云名同音噐質貞松竹四序一采素華冬馥曹植樂府歌曰橙橘枇杷丼蔗代出謝靈運七濟曰朝食既畢摘菓堂隂春惟枇杷夏則林檎㯽榔呉録地理志曰交趾朱䳒縣有㯽榔樹直無枝條髙六七丈葉大如蓮實房得古賁灰扶留藤食之則柔而羙郡内及九真日南並有之南史曰劉穆之少時家貧誕肆嗜酒食不修拘檢好徃妻兄弟乞食多見辱不以為耻其妻江嗣女甚眀識毎禁不令徃江氏後有慶㑹属勿來穆之猶徃食畢求㯽榔江氏兄弟戯之曰㯽榔消食君乃嘗饑何忽須此妻復截髪市肴饌為其兄弟以餉穆之自此不對穆之梳沐及穆之為丹陽尹将召妻兄弟妻泣而稽顙以致謝穆之曰本不匿怨無所致憂及至醉穆之乃令厨人以金柈貯㯽榔一斛以進之齊書曰任昉父遥本性重㯽榔以為常餌臨終嘗求之不得好者昉亦所嗜好深以為恨遂終身不嘗㯽榔梁書曰干陁利國在南海洲上其俗與林邑扶南略同出班布古貝㯽榔㯽榔特精為諸國之極三國典略曰齊命通直散騎常侍辛徳源聘於陳陳遣主客蔡凝宴酬因談謔手弄㯽榔乃曰頃聞北間有人為噉㯽榔獲罪人間遂禁此物定爾不徳源答曰此是天保初王尚書罪状辭耳猶如李固被責云胡粉餙貎搔頭弄姿不聞漢世頓禁胡粉金樓子曰有寄㯽榔與家人者題為合字盖一人口也風俗記曰王髙麗年十四五時四月八日在皷城佛寺中謝混見而以㯽榔贈之執王手謂曰王郎謝叔源可與周旋否南中八郡志曰㯽榔大如棗色青似蓮子彼人以為異婚姻好客輙先進此物若邂逅不設用相嫌恨林邑記曰㯽榔樹大圍丈餘髙十餘丈皮似青銅節如桂竹下本不大上末不小調直亭亭千萬若一森秀無柯端頂有葉葉似甘蕉條𣲖開破仰望𦕈𦕈如挿藂蕉於竹杪風至獨動似舉羽扇之掃天葉下繫數房房綴十數子家有數百樹廣州記曰嶺外㯽榔小於交趾而大如蒳子土人亦呼為㯽榔廣志曰木實曰㯽榔樹無枝略如柱其顛五六尺間穟如黍秀實大如桃李生棘針重疊其下剥其皮煑其肉實而貫之堅如乾棗食後啖之滑羙消糓下氣彼方珍之以為口實亦出交趾南方草物狀曰㯽榔樹三月開花仍連著實大如鷄卵十一月熟雲南記曰雲南有大腹㯽榔在枝朶上色猶青毎一朶有三二百顆又有剖之為四片者以竹串穿之隂乾則可乆停其青者亦剖之為一片青葉如蛤粉巻和嚼嚥其汁即以减澁味雲南毎食訖則下之又曰雲南多生大腹㯽榔色青猶在枝葉上毎朶數百顆云是彌臣國來又曰雲南有㯽榔花籹極羙又曰平琴州有㯽榔五月熟以海螺殻燒作灰名為賁蛤灰共扶留藤葉和而嚼之香羙羅浮山䟽曰山㯽榔一名蒳子幹似蔗葉類祚一藂千餘幹毎幹生十房房底數百子四月采樹似栟櫚生日南者與㯽榔同状五月子熟長寸餘楊􅃷之洛陽伽藍記曰南方歌榮國最為強大民戸殷多出眀珠金玉及水精珍異饒㯽榔異物志曰㯽榔若筍竹生竿種之精硬引莖直上末五六尺間洪洪腫起若瘣木焉因折裂出若黍稷無華而為實大如桃李又生棘針重累其下以禦衞其實剖其上皮煑其膚熟而實之硬如乾棗以扶留藤古賁灰并食下氣及㝛食消糓飲食設以為口實嶺表録異曰㯽榔交廣生者非舶㯽榔皆大腹子也彼中悉呼為㯽榔交趾豪士皆家園植之其樹莖葉根幹與桄榔椰子小異也安南人自嫩及老採實啖之以扶留藤兼之屋瓦灰並咀嚼之自云交州地温不食此無以袪其瘴厲廣州亦噉㯽榔然不甚於安南也府郭内亦無㯽榔樹周成雜字曰㯽榔果也似螺可食李當之藥録曰㯽榔一名賔門左思呉都賦曰㯽榔無柯椰葉無䕃劉淵林呉都注曰㯽榔髙六七丈正直無枝葉條從心生其實作房從心中作一房數百實如鷄子外有殻肉滿殻中正白味苦澁得扶留藤與古賁灰食則柔滑而羙矣俞益期與韓康伯曰㯽榔信南越之可觀子既非常木亦特異大者三圍髙者九丈其擢穗似禾其綴實似榖其皮似桐而厚其節似竹而概其中􅆰其外勁其屈如覆虹其申如縋䋲歩其林則寥廓庇其䕃則蕭條信可以長吟可以逺想矣性不柰霜不得比植必當遐樹海南遼然萬里不遇長者自令恨深劉義恭啟事曰奉賜交州所獻㯽榔味殊常品塗逺蒟醤九真蠻獠曰九真獠欲婚先以㯽榔子一凾詣女女食與即婚豆冦劉欣期交州記曰豆㓂似杬樹味辛堪綜合㯽榔嚼治齗齒環氏呉地記曰黄初三年魏來求豆冦南方草物狀曰漏榮樹子大如李實二月華七月熟出興古左思呉都賦曰草則藿蒳豆冦胡桃晉宫閣名曰華林園胡桃八十四株廣志曰陳倉胡桃皮薄多肌隂平胡桃大而皮脆急捉則破西京雜記曰上林苑有胡桃呉時外國志曰大秦有棗榛胡桃􅀶物志曰張騫使西域返得胡桃廣五行記曰後蜀李雄玉衡十二年扶風人韓豹為太史令雄卒子期立以豹為太傅猶領侯職豹嘗言於期曰臣今老志在田園欲植胡桃願賜其種期不悟俄而李壽自涪率衆南向襲尅成都廢期自立嶺表録異曰大胡桃皮厚而堅大於北府底平如㯽榔多肉少穰非與北中者相似以斧磓之方破或取之自底磨平以為印子其隔屈曲類篆文也馬融西第頌云胡桃自零潘岳閒居賦曰三桃表櫻胡之别孔融與諸鄉書曰先日多惠胡桃多知篤意劉滔母答呉國書曰咸和中避蘇峻亂於臨安山呉國遣使餉饋乃答書曰此果有胡桃飛穰飛穰出自南州胡桃本生西羗外國外剛内柔質似古賢欲以奉貢荔枝東觀漢記曰單于來朝賜橙橘龍眼荔枝謝承後漢書曰汝南唐羌為臨武縣長接交州舊獻荔枝羌上書諫乃止魏文帝詔羣臣曰南方有龍眼荔枝寜比西國蒲陶石蜜乎今以荔枝賜将吏噞之則知其味薄矣呉録曰蒼梧多荔枝生山中人家亦有種之唐書曰楊貴妃生於蜀好荔枝海南荔枝勝蜀者故毎歳飛馳以進然方暑而熟經㝛輙敗又曰白居易為忠州刺史在郡為木蓮荔枝圖寄朝中親友各記其状曰荔枝生巴峽間形圓如帷盖葉如桂冬青華如橘春榮實如丹夏熟朶如蒲萄核如枇杷殻如紅繒膜如紫綃瓤肉瑩白如氷雪漿液丼酸如醴酪大抵如此其實若離本枝一日而色變二日而香變三日而味變四五日外色香味盡去矣廣志曰荔枝髙五六丈如桂樹緑葉蓬蓬然冬夏欝茂青華朱實實大如鷄子核黄黒似熟蓮子實白如昉丼而多汁似安石榴有甜味夏至日将中時翕然赤則可食也一樹下萬斛犍為􅈎道南荔枝熟時百鳥肥其名之曰焦核次曰春花次曰朝陽此三種為羙次鼈卵大而酸以為醢和率生稻田間又曰荔枝壺橘南珍之上西京雜記曰南越王尉􅀈獻髙祖鮫魚荔枝髙祖報以蒲桃錦四疋竺法真登羅山疏曰荔枝冬青夏至日子始赤六七日可食丼酸宜人其細核者謂之焦核荔枝之最珍也異物志曰荔支為異多汁味丼絶口又小酸所以成其味可飽食不可使厭生時大如鷄子其膚光澤皮中食乾則醮小則肌核不如生時竒四月始熟也嶺表録異曰荔枝南中之珍果也梧州江前有火山上有荔枝四月先熟以其地熱故曰火也核大而味酸其髙新州與南海産者最佳五六月方熟形若小鷄子近蔕稍平皮殻微紅肉瑩寒玉又有焦核者性熱液丼食之過度即蜜漿制之又有䗶荔枝黄色味稍劣於紅者廣州記云毎歳進荔枝郵𫝊者疲斃於道漢朝下詔止之今猶修事荔枝煎進焉其樹自經尺至于合抱葉宻如冬青木性堅重其根工人多取為阮咸槽彈弓碁局仲長統昌言曰今人主不思神芝朱草而患枇杷荔枝之腐亦鄙甚矣王逸荔枝賦曰乃觀荔枝之樹其形也曖若朝雲之興森如横天之彗湛若大厦之容鬱如峻嶽之勢灼灼若朝霞之吐日離離如繁星之着天劉淵呉都注曰荔枝樹生山中葉緑色實正赤肉肥肌正白味羙左思蜀都賦曰傍挺龍目側生荔枝布緑葉之萋萋結朱實之離離太平御覽巻九百七十一
