body:
  text: 太平御覽卷一百五十八宋李昉等撰州郡部四河南道上東京開封府西京河南府陕州東京開封府元和郡國志曰禹貢兖州之域春秋為鄭戰國為魏都史記曰魏惠王自安邑里徙大梁今浚儀縣按後漢書大梁城魏惠王所築漢書曰酈食其説高祖曰陳留天下之衝四通五達之郊又曰文帝以皇子武爲梁王都大梁後東徙睢陽注睢陽曰今宋州也後漢書曰明帝永平十五年東巡至大梁春秋後語曰蘇秦去韓之魏説襄王曰大王之地南有鴻溝陳汝南許郾召陵武陽新都東有淮潁煮􅀥無疏鴻溝今在潁今潁州煮􅀥今曹州宛句地無疏或作無胥未詳所在西有長蛇之地史記作長城之界今武原縣有長城北有河水卷衍酸棗地方千里田舍廬廡之數無所不蓄牧人民之衆牛馬之多夜行不絶輷輷殷殷車馬聲也輷火龍切夫魏天下之强國也王天下之賢王也郡國志曰東魏孝靜帝以此置梁州周宣帝改爲汴州以其臨汴水爲名也隋大業十三年州廢以開封浚儀屬鄭州隋亂陷賊唐武德四年平王世充復置汴州五代史曰梁開平元年梁祖初開國升汴州爲開封府建名東京元管開封府浚儀陳留雍丘封丘尉氏六縣至是割滑州之酸􅀥長垣鄭州之中牟武陽宋州之襄邑曹州之戴邑許州之扶溝鄢陳州之太康九縣𨽻焉後唐復降爲汴州以宣武軍爲額其武陽長垣扶溝考城等四縣仍且𨽻汴州其餘五縣却還本部晉天福中復升爲東京復以前五縣𨽻之漢周並因之太康地記曰豫州之分其人得中和之氣性安舒其俗阜其人和今俗多寛慢漢志曰開封逢池在東北或曰宋之逢澤也瓚曰汲郡古文梁惠王廢逢忌之藪以賜民今浚儀是也史記王稽與范雎言曰先生待我于三亭之南三亭今屬浚儀陳留風俗記曰阮簡為開封令時外白有刼賊甚急簡方圍棋長嘯曰局上刼亦急徐廣史記音義曰秦孝公㑹諸侯於蓬澤圖經曰浚儀有高陽故城顓頊高陽氏佐少昊有功封於此城又曰浚儀有信陵亭在城内即魏國公子無忌勝槩之地左傳曰韓起送女於楚還過鄭鄭伯勞諸圉今圉城是也漢志曰陳留郡鄭邑後爲陳所併故曰陳留瓚曰宋亦有留彭城留是也留屬陳故稱陳留也古史考曰伊尹生於空桑陳留有空桑故城家語曰孔子南遊於楚至阿谷之隧使子貢奉觴從女子乞飲今陳留阿谷水漢志曰雍丘屬陳留故杞國周武王封禹後東樓公左傳曰衛侯伐鄭至于鳴鴈在雍丘有鳴鴈亭左傳曰齊桓公㑹諸侯于葵丘今在雍丘縣漢志曰陳留郡東昏莽改曰東明又曰襄邑屬陳留有服官莽曰襄平師古曰襄邑宋地本承匡襄陵鄉宋襄公所葬故曰襄陵秦始皇以承匡卑濕故徙縣于襄陵謂之襄邑縣陳留風俗傳曰襄邑縣南有睢水渙水傳曰睢渙之水岀文章故有黼黻藻錦日月華蟲以奉天子宗廟御服焉左傳曰宣二年鄭破宋師于大棘杜預曰在襄邑後漢地理志曰陳留郡邑已吾有大棘鄉國都記云封丘衛地故燕之延鄉也高祖與項羽戰于延鄉有翟母免其難故以延鄉封翟母焉漢志曰封丘屬陳留郡孟康曰春秋傳敗翟于長丘今翟溝是也漢志曰尉氏屬陳留郡應劭曰古獄官曰尉氏鄭之别獄也瓚曰鄭大夫尉氏之邑遂以爲邑師古曰鄭大夫尉氏亦以掌獄之官故爲族耳後漢地理志曰陳留郡尉氏有陵樹鄉鄉北有澤澤北有天子苑囿有秦樂廐漢以馴養猛獸漢志曰外黃屬陳留郡張晏曰魏郡有内黃故加外耳瓚曰縣有黃溝故氏之也左傳曰惠公敗宋師于黃杜注外黃縣東有黃城陳留風俗傳曰沛公起兵野戰喪皇妣於皇鄉天下平定乃使使者以梓宫招魂於野有丹蛇自洒濯入梓宫其浴處仍有遺髪其處在小黃屬陳留漢志曰長垣屬陳留郡莽曰長固孟康曰春秋㑹於匡今匡城是晉地道記曰長垣古衛故匡城地孔子所厄處也地道記曰承匡城在縣西左傳文十一年㑹晉卻缺于承匡是也漢志曰鄢屬陳留莽曰順通左傳隱公曰鄭伯克段于鄢又鄭大叔侵鄭至于廩延注曰縣北有延津後漢地理志曰即酸􅀥也戰國䇿云齊欲伐辛取周九鼎顔率曰夫梁之君臣欲得九鼎謀於沙海之上爲日久矣陳留風俗傳曰縣有倉頡師曠城其城有列山吹臺梁王増築之以爲吹臺史記曰大梁城有十二門東門曰夷門隱士侯嬴年七十家貧爲大梁夷門抱關者魏公子無忌厚遺之不肯受水經曰大禹塞滎陽澤開渠以通淮泗名莨宕渠即汴渠也漢平帝時河汴決壞後明帝遣使者修治汴渠至隋大業中更令開導名通濟渠引河水入汴口自大梁之東引入泗連于淮至江都宫入于海亦謂之御河河畔築御道植栁煬帝巡幸乗龍舟而往江都自揚益湘南至交廣閩中公私漕運商旅軸轤相接隋書曰大業元年以汴水迂曲逥復稍難自大梁城西南鑿渠引汴水入號通濟渠西京河南府十道志曰洛州周之舊都禹貢豫州之域尚書洛誥曰召公既相宅周公往營成周使來告卜作洛誥予惟乙夘朝至于洛師我卜河朔黎水我乃卜澗水東瀍水西惟洛食又卜瀍水東亦惟洛食言先卜河北黎水不吉又卜澗瀍之間乃吉周禮大司徒曰以土圭之法測土深正日影以求地中日南則景短多暑日北則影長多寒日東則景夕多風日西則景朝多隂日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所㑹也隂陽之所和也然則百物阜安乃建王國焉史記曰午為鶉火周之次自栁九度至張十七度七星周之分野周書曰周公將致政乃作大邑于洛北因邙山以爲天下之凑也孝經援神契曰八方之廣周洛爲中於是遂築新邑營定九鼎以爲王之東都漢書曰高祖欲都洛陽戍卒婁敬求見上曰陛下都洛陽欲與周室比隆哉上曰然敬曰陛下取天下與周室異周之先自后稷積德十餘世公劉避桀居豳太王以狄伐故去豳之岐國人爭歸之及文王爲西伯武王伐紂八百諸侯乃不期而㑹成王即位周公之屬輔相焉乃營成周於洛邑以爲天下中四方納貢道里均有德則易以王無德則易以亡凡欲居此者欲務以德致人不令後世驕奢以虐民也及周之衰乃分爲二天下莫朝周不能制形勢弱也今陛下用兵取天下百姓肝腦塗地而欲比隆周室臣以爲不侔矣不如都秦地以問張良曰洛陽雖險其中不過百里四面受敵此非用武之國不如都闗中婁敬之説是也博物志曰周在中樞三河之分風雨所起四險之國武王克殷定鼎郟鄏以爲東都皇甫謐帝王世紀曰周公相成王以豐鎬偏在西方職貢不均乃使召公卜居洛水之陽以即中土元和郡縣志曰河南府三代皆爲都邑周公營之爲成周秦爲三川郡漢爲河南郡後漢光武都之左傳曰初平王東遷辛有適伊川見被髪而祭於野者曰不及百年此其戎乎其禮先亡矣周襄王十五年秦晉遷陸渾之戎于伊川果驗辛有之言又曰晉趙鞅納王使汝寛守闕塞服虔曰闕塞南山伊闕也史記曰秦武王謂甘茂曰寡人欲通三川以窺周室死且不朽也漢志曰雒陽周公遷殷民是為成周春秋昭公二十一年晉合諸侯於狄泉以其地大成周之城王莽曰宜陽後漢書曰時天下墾田不以實户口互有増減詔下郡國檢覆其事而州郡多不均平百姓嗟怨帝見陳留牘上有書視之云潁川𢎞農可問河南南陽不可問帝怒時顯宗爲東海公年十二言曰吏受郡勅當欲以墾田相方耳帝問曰何故言河南南陽不可問對曰河南帝城多近臣南陽帝鄉多近親又曰梁鴻登北邙山作五噫之歌曰登彼北邙兮噫覽觀帝京兮噫宫室崔嵬兮噫寥寥未央兮噫人之劬勞兮噫魏志曰明帝即位欲平邙山令登觀臺見孟津廷尉辛毘諫曰天地之性高高下下今而反之既非其理若九河盛溢洪水爲害丘陵皆夷何以禦之乃止晉書曰武帝問尚書郎虞摯三日曲水事摯曰漢章帝時平原徐肇以三月初三生女至三日俱亡一村以爲怪乃相攜至水邊洗除因流水以濫觴遂以成俗帝曰若如所説非佳事也尚書郎束晳對曰虞摯小生未究其本此事起自周公卜成洛邑因流水泛酒故逸詩羽觴波流及秦昭王時三月上巳日置酒河曲遂有金人自泉而岀捧水心劎於王曰令君制有西夏此即其處因立爲曲水焉二漢相沿爲盛集帝嘉晳對隋書曰煬帝命僕射楊素等營搆宫室大業元年遂成新都而徙居之今洛陽宫是也洛陽地圖曰鞏在洛水之間鞏固也言四面有山可以鞏固也朱超石與兄書曰洛水道路本好青槐映䕃可愛陸機洛陽記曰洛陽有銅駞街漢鑄銅駞二枚在宫南西會道相對俗語曰金馬門外集衆賢銅駞陌上集少年水經曰伊水東北過伊闕昔大禹疏龍門以通水兩山相對望之如闕伊水厯其間謂之伊闕穆天子傳曰天子射鳥有獸在葭中七萃之士高賁戎擒之以獻天子命畜之東虞曰虎牢唐諱虎故改武其後又名成臯十道志曰壽安縣漢宜陽縣也史記張儀爲秦説韓王曰大王今不事秦秦王中據宜陽斷韓之上地東取成臯滎陽則鴻臺之宫非大王有也又蘇秦説韓宣惠王曰韓北有鞏成臯之固東有宛穰洧水南有陘山密縣有陘山西有宜陽商坂之塞地方九百里帶甲數十萬陜州十道志曰陜州陜郡禹貢豫州之域周爲二伯分陜之地即古虢國地戰國時屬韓秦倂天下屬三川郡史記曰周成王時召公爲三公自陜以西召公主之自陜以東周公主之後漢書曰獻帝東歸至陜議者欲令天子浮河東下太尉楊彪曰臣𢎞農人從此已下東有六十六灘非萬乗所當從乃止史記曰芮國在今馮翊界魯桓公三年芮伯萬爲母姜氏所逐遂居于魏詩曰虞芮質厥成文王蹶厥生毛萇注曰虞芮之君相與爭田乆而不平乃相謂曰西伯仁人盍往質焉及入境見行者讓路耕者讓畔咸相謂曰我等小人不可以履君子之庭乃相讓所爭之地以爲閒田天下聞之歸周者四十餘國唐書曰天寳元年陵郡太守李齊物鑿三門山路所通深便於漕運於所開瀆中得古鏵鉏上有古篆平陸二字由是其縣改爲平陸縣山海經曰夸父之山其北有林名曰桃林廣圍三百里中多馬造父於其中得驊騮騄耳之乗以獻穆王尚書曰放牛於桃林之野春秋曰處桃林之野塞太平御覽卷一百五十八
