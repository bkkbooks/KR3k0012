body:
  text: 太平御覽卷三百七十九宋李昉等撰人事部二十美丈夫上尚書洪範曰二五事一曰貌容儀毛詩曰云誰之思西方美人箋云思周室之賢者彼美人兮西方之人兮箋云彼美人謂碩人也又曰叔于田巷無居人叔大叔段也田取禽也豈無居人不如叔也洵美且仁洵信也又淇澳曰有斐君子如金如錫如圭如璧寛兮綽兮猗重較兮又猗嗟曰猗嗟昌兮頎而長兮昌盛也頎長貌也抑若揚兮抑美也揚廣也美目揚兮好目揚眉巧趨蹌兮射則臧兮又小戎曰文茵暢轂駕我騏􅑓言念君子温其如玉又盧令曰盧令令其人美且仁盧重環其人美且鬈鬈好貌讀當為權權勇壯也盧重鋂其人美且偲偲才也又汾沮洳曰彼其之子美如英美如英殊異乎公行又曰彼其之子美如玉美如玉殊異乎公族左傳曰宋公子鮑美而艷又曰子太叔美秀而文又曰冉竪射陳武子中手冉竪季氏臣失弓而罵武子罵詈以告平子曰有君子白晳鬒鬚眉甚口平子曰必子强也子强武子字爾雅曰美士為彦論語曰堂堂乎張也言子張容貌盛難與並為仁矣孝經曰容止可觀進退可度家語曰息土之民美漢書曰張子房狀貌如美婦人又曰直不疑狀貌甚美又曰班伯少受詩扵師丹大將軍王鳯薦伯冝勸學召見宴昵殿中容貌甚麗誦説有法拜中常侍又曰公孫𢎞對策時百餘人太常奏𢎞第居下天子擢𢎞對為第一召入見容貌甚麗拜為愽士待詔金馬門又曰張蒼好書律厯為御史主柱下方書亡歸沛公畧地過武陽蒼當斬觧衣伏質蒼美麗長大肥白如瓠王陵見美乃言沛公救之後為御史大夫及為相事陵如父陵死蒼洗沐常先朝陵夫人立食後歸又曰陳平少時家貧好讀書長大美色而肥或說平扵漢王曰平雖美丈夫如冠玉耳又曰董偃始與母賣珠為事年十三隨母至館陶公主家左右言其姣好主召見曰吾為母養之因留第中教書射御年十八乃冠出側侍内甚温軟以主故諸公接之名稱城中號曰董君又曰車千秋姓田為髙寢郎戾太子敗千秋訟太子寃上頗知太子無他意乃召見千秋千秋長八尺餘體貌甚麗帝悅之曰此髙廟神靈使公公當遂留輔我後年老乗小車上殿故號車氏又曰董賢字聖卿雲陽人也為太子舍人哀帝時為郎傳漏在殿為人美麗哀帝望見悦其儀貌拜為黄門郎又曰江充召見太一宫自謂願以所常被服衣冠見上許之魁岸容貌甚壯帝望見異之謂左右曰燕趙固多竒士又曰王商長八尺餘體甚鴻大容貌絶人單于來朝仰視遷延却退天子聞而嘆曰真漢相也又曰東方朔目如懸珠齒如編貝又曰司馬相如車騎雍容閒雅甚都都閒雅之稱也又曰薛宣好威儀進止雍容細甚可觀又曰霍光白晢踈目美鬚髯也後漢書曰徐防字謁卿沛國人也體貌矜嚴占對可觀顯宗異之特授尚書郎又曰新野功曹鄧衍以戚小子侯每預朝㑹容姿趨歩有出扵衆顯宗目之曰朕之容貌豈若此人時賜與馬衍雖有容儀而無實行未甞加禮又曰蔡邕字伯喈謂從弟谷曰董卓性剛難濟吾且遁逃山東以待如何谷曰君狀異恒人每行觀者盈集以此自匿不亦難乎乃止謝承後漢書曰楊喬為尚書容儀偉麗數上言政事桓帝愛其才貌詔妻以主喬固辭不聼遂閉口不食七日而死東觀漢記曰杜詩薦伏湛曰儀貌堂堂國之輝光智畧謀慮朝之淵藪又曰馬援自還京師數被進見為人明白眉目如畫閑進對尤善述前事每言及三輔長者至閭里少年皆可觀皇太子諸王聞者莫不屬耳忘倦又曰虞延字子大陳留人也上東廵路過小黄髙帝母昭虛后園陵在焉時延為督郵詔呼見問園陵事延進止從容跪拜可觀其陵樹株蘖皆諳其數帝善之魏志曰邢顒字子昻時人稱徳行堂堂邢子昻文帝以為太常吴志曰諸葛恪字元遜江表傳曰恪辯論應機莫與為對孫權見而竒之謂父瑾曰藍田出美玉真不虛也又曰朱據字子範吳郡人有姿貌膂力又絶倫魏文初徴拜五官中郎將權遷建鄴徴尚公主拜左將軍封雲陽侯謙虛接士輕財好施又曰孫韶字公禮為邉將不進見十餘年權還建鄴乃得朝覲問諸要害逺近人馬衆寡將卒名字具識之所問咸對身長八尺儀貌都雅權悦曰吾久不見公禮又曰吕範字子衡汝南人有容冠姿貌邑人劉氏家富女美範求之母嫌欲勿與範親劉氏曰觀吕子衡寜當久貧者耶遂與之婚又曰孫桓儀容端正聰明愽學能論議應對孫權常稱為宗室顔淵又曰張純少厲操行學愽才秀切問㨗對容止可觀官拜郎中晋書曰裴楷字叔則為吏部侍郎風神髙邁容儀俊爽愽渉羣書特精義理時人謂之玉人又曰尚書閔鴻見陸雲竒之此兒若非龍駒則是鳯雛又曰潘岳字安仁滎陽中年人才名冠世出為河陽令有異政累遷給事中美姿儀少時常挾琴出洛陽羣嫗相遇者悉連手縈遶以果擲之盈車而歸又曰王恭字伯李累遷為青兖二州刺史美姿儀人或多目之歎曰神仙中人又曰衛玠字叔寳河東安邑人也齠齔年乗白羊車入市見者咸曰誰家璧人遂號為璧人王武子玠之舅也甞與同逰語人曰昨比與我外甥並坐若珠玉在側朗然映人覺我形穢及長好言𤣥理武子每聞玠言歎息絶倒故時人語曰衛玠談道武子絶倒玠妻父樂廣有重名議者以為婦公氷清女壻玉潤為太子洗馬以國亂至江夏玠亡其妻征南將軍山簡以女妻之至豫章大將軍王敦謂長史謝鯤曰昔王輔吐金聲扵中朝此子復玉振於江表後來往建鄴敦遣之京師人聞其姿容觀者如堵不見者輙歎之又曰王衍字夷甫有美貌㓜清辯仕至太尉甞執玉柄塵尾與手無别人謂之為口中雌黄為世間之一龍或理有所不安者即隨改之妻郭氏賈后之親藉宫中勢聚斂無厭夷甫患之口不言錢妻試之令婢以錢遶牀夷甫曰好舉阿堵物又曰石苞字仲容渤海南皮人也雅曠有智容儀偉麗不脩小節故時人為之語曰石仲容姣無雙又曰嵇康長七尺八寸美音氣好容色土木形骸不自藻餙人以為龍章鳯姿天質自然又曰王戎字濬冲㓜頴悟神彩秀徹視日不眩裴楷目之曰爛爛如巖下電又曰王䝉字仲祖美姿容常覽鏡自照稱其父字曰王文開生如此兒耶甞帽破入市買之羣嫗悦之爭遺其帽又曰謝尚論中朝人物劉琰云蔣乂膚清衛叔寳神清為有識所重如此又曰韓夀武帝時為掾有姿容太尉賈充有室女見夀美心悦之充有異香女竊與夀帶之充怪以問婢婢以告充乃以女妻之又曰王戎謂王衍神姿髙徹如瑶林瓊樹自是風塵外物又曰文帝器重魏舒每朝㑹坐罷目送曰魏舒堂堂人領䄂也又曰桓温字元子宜城太守彛之子也生未期而太原温嶠見之曰此兒有竒骨可試使啼及聞聲曰真英物也年長豪爽有氣概姿貌甚偉又曰王衍神情明秀王澄曰兄形似導而神鋒太雋晋中興書曰王矩字令式美容貌每出行觀者盈路宋書曰謝莊字希逸美容儀善談論屬文好𤣥理為文帝所賞帝一見之輙歎曰藍田出美玉豈虛也哉又曰葢道風姿貌端雅容止可觀中書郎范述見而竒之曰此荆楚仙人也又曰謝晦美風姿善言笑眉目分明鬢髪如墨渉獵文義朗贍多通時人以方揚徳祖㣲將不及晦聞猶以為恨齊春秋曰世祖甞扵華林園宴集使羣臣各出所長王儉曰臣少為書生請誦封禪書跪前誦之容止可觀音吐藴藉上大悦曰樂哉梁書曰陶𢎞景字通明特愛松風每聞其響欣然為樂有時獨㳺泉石望見者以為仙人又曰王茂字休逺太原祁人也身長八尺美容觀武帝布衣時見之歎曰王茂今堂堂如此必為公輔之器崔鴻十六國春秋前凉録曰辛綝弟理美姿貌張駿欲奪其妻以寡妹妻之理割鼻自誓駿大怒徙理燉煌遂以憂死又曰前趙録曰㳺子逺㓜姿貌聰亮好學年十五至洛陽張華見而竒之曰此兒雅㓗洪方真雋才也又曰後趙録曰張謐美姿貌㓜有逸氣太守陸雲見而異之謂傅喜曰吾聞冀州多名童故不虛也又曰劉光弱冠美姿儀自稱佛太子從大秦來當至小秦國易姓名為季子鄠赤眉信恭之妻二女轉相扇惑聚千人扵南山僣稱號鎮西石廣擊斬之子鄠頸無血十餘日面猶如生北齊書曰崔陵子瞻字彦通聰明有文情善容止神彩凝然楊愔曰昔裴瓉在晋也為中書郎情髙邁每扵禁門出入宿衛者肅然動容崔生堂堂之貌亦當無愧裴子又曰王昕字元景北海劇人也生九子並風流藴藉世號王氏九龍又曰劉禕五子並有志行為世所稱璿字祖玉聰敏機悟美姿儀為其舅北海王昕所愛顧座曰可謂珠玉在傍覺我質穢又曰李繪字恭文儀貌端偉河間邢晏即繪弟五舅也與繪清言歎其髙逺每稱曰若披雲霧如對珠玉又曰北平陽貞字仁堅世祖第五子沉審寛恕太祖稱之曰此兒得我鳯毛又曰陸即字雲駒洛陽人也昆弟六人並魏藍田公主元氏所生故邢邵甞謂人云藍田生美玉豈虛也十二國史曰鄒忌為齊相身長八尺餘體肥麗朝服衣冠窺照自視謂其妻曰我與城北徐公孰美妻曰君美徐公齊之美者也忌不信復問妾妾曰君美旦日客從外來忌復問之客亦曰徐公不如君及徐公來忌熟視之自以為不如因思之曰吾妻之美我私我也妾之美我畏我也客之美我有求扵我也扵是入朝見威王曰臣誠不如徐公而臣妻妾及客皆言臣美或私畏扵臣或有求扵臣今齊地千里宫女左右莫不私王朝廷之臣莫不畏王四境之内莫不有求扵王由此觀之王蔽甚矣王曰善乃下羣臣吏民能面刺寡人過者受上賞又曰美男破老美女破舌北史後魏書曰咸陽王禧弟樹字秀和一字君立美姿貌有將畧位宗正卿後奔梁梁武尤噐之封為魏郡王陳書曰韓子髙㑹稽山隂人本家㣲賤年十六猶總角才敏過人容貌美麗狀似婦人又曰謝哲字頴豫陳郡陽夏人也美風儀舉止藴藉襟情朗然為士君子所重又曰蕭允字叔然蘭陵人也風神凝逺通達有識鑒容止藴藉動合䂓矩又曰王煬字璵司空冲之第三子沉静有器局美風儀舉止藴藉又曰宜都王叔明字子昭髙宗第六子也儀容美麗舉止和弱狀似婦人隋書曰燕王倓字仁安敏慧美姿儀煬帝扵諸孫中特所鍾愛常置左右好讀書重儒素有若成人良娣早終每至忌日未甞不流涕嗚咽由是益竒之又曰元善洛陽人也以風流藴藉俯仰可觀音韻清朗聴者忘倦由是為後進所歸語林曰何平叔美姿儀而絶白魏文帝疑其著粉夏月與熱湯餅既啖大汗出隨以朱衣自拭色轉皎然又曰王右軍目杜宏治曰面如凝脂眼如㸃漆此神仙中人也異苑曰鄢陽陳忠女名豐隣人葛勃有美姿豐與村中數女共聚絡絲戯相謂曰若得壻如葛勃無所恨也太平御覽卷三百七十九
