body:
  text: 太平御覽巻一百四十九宋李昉等撰皇親部十五太子四太弟太孫太子妃良娣孺子保林才人家人子太子四唐書曰廢太子瑛音英𤣥宗第二子也景雲元年封真定郡王開元三年立為皇太子母趙麗妃本妓人有才貎善歌舞𤣥宗在潞州得幸及武惠妃寵幸麗妃恩乃漸弛惠妃女咸宜公主出降於楊洄洄希惠妃之㫖日譖於惠妃惠妃泣訴於𤣥宗𤣥宗惑其言意將廢黜中書令張九齡奏曰太子不離深宫日受聖訓天下之人皆慶陛下享國日乆子孫蕃育不聞有過陛下奈何以一日之間廢棄三子且太子國本難於動揺昔晉獻公惑寵嬖之言太子申生憂死國乃大亂漢武威加六合受江充巫蠱之事禍及太子遂至城中流血晉惠帝有賢子為太子容賈后之譖以至喪亡隋文帝取寵婦之言廢太子勇而立晉王廣遂失天下由此而論之不可不慎今太子既長無過二王又賢臣待罪左右敢不詳悉𤣥宗黙然事且寢二十五年四月楊洄又搆於惠妃言瑛兄弟三人與太子妃兄駙馬薛鏞常搆異謀𤣥宗遽召宰相籌之李林甫曰此盖陛下家事臣下不合叅知𤣥宗意乃決矣使中官宣詔於宫中廢以為庶人天下之人不見其過咸惜之寶應元年詔贈皇太子又曰靖恭太子琬𤣥宗第六子天寶十四年安禄山反於范陽其月制以琬為征討元帥高仙芝為副令仙芝募徴河隴兵屯於陕郡以禦之數日琬薨琬素有雅稱風格秀整當時士庶冀琬有所成功忽然殂謝遠近咸失望焉贈靖恭太子葬於西原又曰承天皇帝倓音談既為張良娣所搆肅宗怒而幽死又欲揺動代宗時代宗收復兩京遣判官李泌入朝獻捷從容語及倓事泌曰臣幼穉時念得黄臺𤓰辭陛下聞其說乎高宗大帝有子八人太后所生四子自為行第故睿宗第四長曰孝敬皇帝𢎞為太子監國仁明孝悌天后方圖臨朝乃鴆殺之立雍王賢每自憂惕知必不保全與二弟同侍父母之側無由敢言乃作黄臺𤓰辭令樂工歌之冀天后聞之哀愍辭曰種𤓰黄臺下𤓰熟子離離一摘使𤓰好再摘令𤓰稀三摘尚自可四摘抱蔓歸太子賢終為天后所逐死於黔中陛下有今日運阼已一摘矣慎無再摘上愕然曰卿安得有是言自是奪宗之計不行又曰憲宗章武皇帝順宗長子母王太后六七歲時德宗抱置膝下問曰汝誰子在吾懷對曰是第三箇天子德宗異而憐之貞元四年封廣陵王順宗即位之年冊封為皇太子又曰懿宗恭惠皇帝宣宗長子母曰元昭皇太后晁氏太和七年生於藩邸封鄆王大中十三年宣遺詔立為皇太子姿貌魁傑有異稠人藩邸時嘗被疾郭妃侍醫見黄龍出入於卧内妃以告帝曰慎勿言又曰僖宗恭定皇帝懿宗第五子母曰惠安皇后王氏初封晉王懿宗大漸制曰朕守大器之重居兆人之上日懼一日如履如臨旰昃勞懷寢興思治涉道猶淺道化未孚而攝養乖方寒暑成厲實有慮於闕政且無暇而怡神考兹舊章謀於卿士思闡鴻業式建皇儲第五男晉王孝敬溫恭寛和博厚日新令德天假英姿言皆中規動必由禮俾崇邦本允叶人心宜立為太子權勾當軍國政事咨爾中外卿士暨於腹心之臣各竭乃心永安黎獻太弟王隱晉書曰惠帝永寧二年立清河王覃為太子成都河間王復廢覃為清河王立成都王為皇太弟晉陽秋曰永興元年河間王顒表拜成都王穎為皇太弟司空越高密王簡平昌公模等以大駕北征廢皇太弟穎立豫章王熾為皇太弟崔鴻十六國春秋曰晉成都王穎為皇太弟領丞相自鄴懸秉朝政事無大小皆先闗咨唐書曰武宗肅皇帝穆宗第五子也母曰宣懿皇后􅅊氏長慶元年封潁王開成五年文宗疾兩軍中尉仇士良魚志𢎞矯詔迎潁王於十六宅曰朕自嬰疾疢有加無瘳懼不能躬總萬幾日釐庶政稽于古訓謀及大臣用建親賢以貳神器親弟潁王瀍昔在藩邸與朕躬同師訓動成儀矩性稟寛仁俾奉昌圖必諧人欲可立為皇太弟一應軍國政事便令勾當百辟卿士宜竭迺心又曰昭宗景文皇帝懿宗第七子母曰惠安太后王氏帝於僖宗母弟也尤相親睦自艱難播越嘗隨侍左右僖宗不豫遺詔立為皇太弟太孫王隱晉書曰趙王倫既廢賈后皇帝使使持節追復皇太子拜皇孫臧為臨淮王尚為襄陽王又詔立臧皇太孫文武官屬即轉為太孫官屬車服侍從皆愍懷之舊也趙王倫簒位太孫廢為濮陽王薨惠帝復阼立襄王尚為皇太孫薨諡冲皇太孫并追諡前太孫為哀皇太孫晉惠帝起居注曰拜皇孫臧為臨淮王尚為襄陽王又詔臧為太孫臧廢到銅駝街宫人哭侍從皆哽咽路人􅋞淚焉桑復生於西廂長丈餘太孫廢乃枯又曰惠帝詔以太常成粲為太孫太傅前城閣校尉梁柳為太孫太傅又曰惠帝使使持節兼司空任城王濟䇿命愍懷皇太子前妃為皇太孫太妃是日也以復妃告於太廟後魏書曰高宗文成皇帝景穆帝之長子也母曰閻氏帝少聰達太武常置左右號世嫡皇孫又曰劉尼代人也父祖皆為方面大人少壯健有膂力世祖善之拜羽林中郎宗愛既殺南安王餘於東廟秘之唯尼知之尼勸愛立高宗愛自以負罪於景穆聞而驚曰君大癡人皇孫若立豈忘生平時事乎尼以狀告殿中尚書賀源仍謀於南部尚書陸麗麗曰唯有密奉皇孫耳於是賀與長孫渴侯嚴兵守衞尼與麗迎高祖於苑中麗抱高祖馬上入於京城尼馳還東廟大呼曰宗愛殺南安王大逆不道皇孫已登大位有詔宿衞之士皆可還宫衆咸唱萬嵗後周書曰建德二年夏六月壬子皇孫衍生文武官普加一階蕭子顯齊書曰文惠太子長懋字雲喬世祖長子也世祖年未弱冠而生太子為太祖所愛建元元年封南郡王邑二千戸江左未有嫡皇孫封王始自此也又曰欝林王昭業字元尚文惠太子長子也小名法身文惠太子薨立昭業為太孫居東宫昭業少美容止好𨽻書世宗勅皇孫手書不得妄出以貴重之唐書曰貞觀十七年誕皇太孫宴宫寮於𢎞教門太宗幸東宫自殿北門入謂宫臣曰頃來生業稍可非乏酒食而唐突公等宴會審有甲觀之慶故就卿為樂耳謂太子曰爾國之儲貳府藏是同金玉綺羅不足為賜但先聖典籍可為鑑誡耳因賜尚書毛詩孝經各一部又曰永淳元年立皇孫重昭為太孫將置府寮土召吏部侍郎裴敬彛郎中王方慶問曰今立太孫前代故事如何方慶進曰臣按周禮有嫡孫漢魏以來皇太子在亦不立太孫但封王耳今陛下肇建皇孫創斯盛典所以彰子孫千億之盛福祚靈長之應也上悦太子妃白虎通云妃者匹也妃匹者何謂相與偶也然古者天子後宫嫡庶皆曰妃史記曰黄帝有四妃帝嚳有四妃虞舜有二妃周以天子之正嫡為王后秦稱皇帝因稱皇后以太子之正嫡稱妃漢因之漢書外戚傳曰太子妃有良娣有孺子妻妾凡三等是也魏晉以後咸尊之漢書曰孝景薄皇后孝文薄太后家女也景帝為太子時薄太后取以為太子妃帝即位立為皇后又曰孝武陳皇后長公主嫖之女也初武帝得立為太子長公主有力取主女為妃及帝即位立為皇后又曰元帝為太子司馬良娣死後太子悲恚發病忽忽不樂宣帝令皇后擇後宫家人子可以娛侍太子者王禁女政君預焉時預擇者五人政君獨衣絳縁諸于諸于大掖衣也使侍中杜輔送入太子宫見於丙殿得御幸有身立為太子妃又曰孝成許皇后平恩侯家女也元帝選配皇太子初入太子家上令中常侍黄門親近者侍送還白太子忻説狀元帝喜謂左右酌酒賀我左右皆稱萬嵗及成帝即位立許妃為皇后又曰孝哀帝傅皇后定陶傅太后從弟子也哀帝為定陶王時傅太后欲重親取以配王王入為太子傅氏女為妃哀帝即位立為皇后後漢書曰明帝馬皇后伏波將軍援小女也初援征五溪蠻卒於師虎賁中郎將梁松黄門侍郎竇氏等因譛之由是家益失勢又數為權貴所侵侮后從兄嚴不勝憂憤白太夫人絶竇氏婚求進女掖庭乃上書曰臣叔父援辜恩不報而妻小特獲恩全戴仰陛下為天為父竊聞太子諸王妃匹未備援有三女大者十五次者十四小者十三儀狀髪膚上中以上皆孝順小心婉順有禮願下相工簡其可否如有萬一援不朽於黄泉由是選后入太子宫時年十三吳志曰太子孫和賜死和與妃張决别張曰吉㓙當相隨終不獨生活也亦自殺蜀志曰後主敬哀皇后車騎將軍張飛女也章武元年納為太子妃建興元年立為皇后王隱晉書曰楊元后武帝娶之生惠帝謀婚乆不決上欲娶衞瓘女后欲娶賈充女賈妻酷妬宿著上曰衞公女有五可賈公女有五不可衞家種賢而多子端正而長白賈家種妬少子酷而短黒郭必欲使所生女配太子既先使人言猶輸寶於楊后固啓必成本當娶后妹午午年十二小太子一嵗定見短小未勝衣更娶南風南風時年十五大太子二嵗上乃聽之帝知太子不慧又聞衞瓘言故試之盡召東宫大小官屬為作飲食而密封詔事使太子決停信待之賈妃大懼請外人作答詔草給使張泓行還啓賈妃曰太子不學而答詔引義必致責作草主更益譴負不如直以意答賈妃大喜語泓便為我好荅得富貴與汝共之泓素有才答之過高武帝大喜於是賈妃諷㫖於外説張泓孝亷郎才語領軍舉髙第充遣語女曰衞瓘老奴幾破汝家事於是賈妃銜之又曰賈妃酷妬手斫數人或以㦸摘音擲孕妾子乃隨刃墮地上聞大怒垂廢之荀朂深救之故不得廢晉氏后妃别傳曰武悼皇后武帝繼室也太傅楊駿女賈庶人為太子妃時數以肆情性忌妬武帝意欲廢焉后為妃陳請曰賈公有勲於王府妃親則其子妬忌婦人之常事不足以一𤯝而忘大德帝納焉王隱晉書曰初世祖遣才人謝玖給事惠帝因是有娠臨娶賈妃迎玖西宫遂生愍懷太子惠帝即位立為皇太子為聘王夷甫小女惠風賈后暴戾日甚乃表乞免為庶人送太子妃王氏入金墉城妃父尚書令王衍見脅表離婚妃出金墉城號哭感動左右道路為之悲愴也又曰劉曜王彌等入洛盡將諸后妃去愍懷太子王妃拔刀向賊曰我司徒公女皇太子妃死則已終不為賊婦賊乃害之晉起居注曰元帝大興五年上臨軒使䇿命拜晉王太子妃庾氏為皇太子妃晉孝武帝起居注曰納采聘太子妃百官朱服會於新安公主第秘書監王操之為主人晉孝武帝起居注曰上臨軒設懸而不樂遣兼司空上蔡公謝琰納太子妃王氏詔曰太子某婚禮即就仰祖宗遺烈憑道德之姿保傅將翼賢士竭誠慎行修德積善慶隆豈唯在乎天賚賜所以宣其恱情其便依舊又納左僕射王珣奏賜文武絹布百官詣止軍門上禮甲辰儀曰皇太子妃公妃夫人逢持節使者高車使者皆住車相揖妃主皆住車不揖東宫舊事曰司徒會稽王道子等啓曰皇太子係體宸極年德並茂宜簡國媛緝宣内敎故中書令太常王獻之新安公主息女六行聿修四德允備加之世載簡正慶深積善僉曰宜作配儲宫正位中饋太元二十一年皇太子納妃琅琊臨沂王氏時年十四王隱晉書曰安僖皇后王氏字神受太常王獻之女新安公主生即安帝姑也孝武帝以后少孤無兄弟故為安帝納為太子妃東宫舊事曰有詔以皇太子納妃賜帛各有差使持節兼司空公尚書右僕射謝琰副䕶軍將臨湘縣侯車𦙍兼詹事尚書左僕射王珣率東宫屬迎於主第東宫舊事曰皇太子納妃織成衮帶白玉佩四望車羽葆前後部鼔吹各一部步搖一具九鈿函盛之同心雀鈿函一具盛鬢花六五枝登花三五枝團樹花十株碧紗座袿半肅一丹羅柸文長命綺䙱一䙱音屬袴别名又曰太子納妃絳真文羅一幅被子一絳羅肅四幅被一又曰皇太子納妃有絳真文羅袴漆龍頭支髻枕一銀花鐶釰自幅金塗連盤鴨燈一絳地文履一量漆花簏一絳地織成綺紱有七綵柸文綺一絳石柸文綺被有一又七綵柸文綺袴長命柸文綺袴晉令曰皇太子妃佩瑜玉沈約宋書曰皇太子妃金璽龜釰纁朱紱佩瑜玉又曰少帝司馬皇后諱茂英河内温人晉恭帝女也初封海鹽公主少帝以公主尚焉宋初拜皇太子妃少帝即位册為皇后又曰前廢帝何皇后諱令婉廬江灊人也孝建三年納為皇太子妃又曰後廢帝江皇后諱簡珪濟陽考城人北中郎長史智淵孫女太始五年太宗訪太子妃而雅信小数名家女多不合江氏雖世為華族而后父祖並已亡弟又弱小門無強蔭以卜筮最吉拜為皇太子妃蕭子顯齊書曰皇太子有厭翟車如重翟車飾微減漆畫輪車太子妃亦乘之又曰文安王皇后諱寶明琅琊臨沂人建元元年為南郡王妃四年為皇太子妃無寵太子為宫人製新麗衣裳及首飾而后牀帳陳古舊釵錜奴叶切小釵也十餘枚唐書曰太宗文德皇后長孫氏少好讀書造次必循禮則十三嬪於太宗武德九年册拜皇太子妃又曰高宗廢后王氏同安長公主即后之從祖母也公主以后有美色遂納為晉王妃高宗登儲册為皇太子妃又曰開元中勅所選皇太子及諸王等妃既是百官子女禮合避人今遣就本縣及過本司未為得所其應預選者冝令所司具名録奏各令女及近親隨使於命婦朝堂待進止良娣漢書曰衞太子史良娣宣帝妃祖母也太子有妻妾凡三等子皆稱皇孫史良娣家本魯國母貞君兄恭元鼎四年入為良娣生男進號史皇孫武帝末巫蠱事起衞太子及良娣史皇孫皆遭害沈約宋書曰大明五年上更為太子置内職二等曰保林曰良娣納南中郎長史太山羊瞻女為良娣蕭子顯齊書曰建元三年太子宫置三内職良娣比開國侯唐書曰肅宗張皇后天寶中選入太子宫為良娣唐書曰順宗莊憲皇后王氏幼以良家子入宫為才人順宗在藩邸時代宗以才人賜之生憲宗皇帝立為孺人順宗升儲册為良娣孺子後魏書曰劉芳陳雅方正太子恂之在東宫高祖欲為納劉芳女芳辭以年貌非宜更勅芳舉其宗女芳乃稱其族子長文之女高祖乃為恂聘之與鄭懿女對為左右孺子焉保林王隱晉書曰愍懷太子廢為庶人考竟太子母淑妃謝玖及太子所幸保林蔣俊及母三弟沈約宋書曰大明五年上為太子納宜都守袁僧惠女為保林蕭子顯齊書曰太子保林比五等侯才人王隱晉書曰世祖遣才人謝玖給事惠帝因是有娠臨娶賈妃迎玖西宫遂生愍懷蕭子顯齊書曰太子才人比駙馬都尉家人子漢書曰史皇孫王夫人宣帝母也名翁須皇孫妻妾無號位皆稱家人子生宣帝數月衞太子史皇孫敗家人子皆坐誅太平御覽巻一百四十九
