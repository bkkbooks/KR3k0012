body:
  text: 太平御覽卷二百七十三宋李昉等撰兵部四將帥下將帥下吕氏春秋曰管子言於桓公曰墾田大邑辟土生粟盡地之利臣不若寗邀邀乃戚也請置以爲大田登降辭讓進退嫻習臣不若隰朋請置以爲大行蚤入晏出犯顔進諫不避死亡不重富貴臣不若東郭牙請置以爲大諫平原廣城車不結轍士不旋踵皷之而三軍之士視死如歸臣不若王子城父請置以爲大司馬决獄折中不殺不辜不誣無罪臣不若弦章章賔須無請置以爲大理君若欲理國强兵則五子者足矣君若欲覇王則夷吾在此桓公曰善令五子皆任其事以受於管子十年九合諸侯一匡天下管子人臣也用不能長之而盡以五子之能又况於人主乎淮南子曰中將上不知天道下不知地利專用人與勢雖未能萬全勝敵必多矣下將之用兵也專鬭而自亂知多而自疑居則恐懼發則猶豫是以動爲人擒矣今使兩人接刅巧拙不異而勇士必勝者何也其行之誡也又曰鼓不與於五音而爲五音主水不與於五味而爲五味調將軍不與五官之事而爲五官督故能調五音者不與五音也能調五味者不與五味也是故將軍之心滔滔如春曠曠如夏湫漻如秋典凝如冬典常凝正也常正于冬也因形而與之化随時而與之移夫景不爲曲物直響不為清音濁觀彼之所以來各以其勝應之是故扶義而動推理而行掩截㫁割掩覆也覆其莭制㫁割之也因資而成功使彼知吾所出而不知吾所入知吾所舉而不知吾所集始如狐狸彼故輕來合如虎兕敵故奔走也又曰將者必有三隧四義五行十守所謂三隧者上知天道下習地形中察人情凡此三事者人所從偃隧所謂四義者便國不負兵爲主不顧身見難不畏死决疑不避罪所謂五行者柔而不可卷也剛而不可折也仁而不可犯也信而不可欺也勇而不可凌也所謂十守者神清而不濁也謀遠而不可測也操固而不可遷也明知而不可蔽也不貪於貨不滛於色不藉於辨不矜於明不可喜也不可怒也是謂至平窈窈㝠㝠孰知其情發必中證言必合數動必順時觧必中輳輳理也通動静之機明開塞之莭審舉錯之利害若合符莭疾如彍弩勢如發矢一龍一蛇動無常體莫見其所中莫知其所窮攻則不可守守則不可攻也抱朴子曰良將去如收電可見不可追留如丘山可瞻不可動又曰大將民之司命社稷存亡於是乎在六韜曰武王問太公曰王者帥師必有股肱羽翼以成威神爲之奈何公曰凡舉兵帥師以將爲命在其通逹不一術也又曰武王問太公曰論將之道奈何太公曰將有五才十過五才者勇知仁信必也勇則不可犯知則不可亂仁則愛於人信則不欺人必則無二心所謂十過者將有勇而輕死者有急而心速者有貪而喜利者有仁而不忍於人者有智而心怯者有信而喜信人者有亷而不受人者有知而心緩者有剛毅而自用者有懦而喜用者是故兵者國之大器存亡之所由也又曰太公曰夜卧早起雖劇不悔妻子之將也篤實希言賦物平均十人之將也數行刑戮不避親戚百人之將也訟辯好勝欲正一衆千人之將也知人饑飽念人劇易萬人之將也知天文習地理四海如妻子此天師之主也又曰爲將冬日不衣裘夏日不操扇天雨不張葢又曰武王曰吾欲令三軍親其將如父母攻城則争先登野戰則争先赴聞金聲則怒聞鼓聲則喜爲之奈何太公曰出隘塞犯泥塗將必先下士卒皆定將乃就舍軍不舉火將亦不食三畧曰軍井未逹將不言渇軍竈未炊將不言饑軍幕未辦將不言倦冬不服裘夏不操扇是謂禮也諸葛亮兵要曰人之忠也猶魚之有淵魚失水則死人失忠則㓙故良將守之志立而揚名又曰不愛尺璧而愛寸隂者時難遭而易失也故良將之趨時也衣不觧帶足不躡地又曰貴之而不驕委之而不專扶之而不隱免之而不懼故良將之動也如璧之不汚又曰良將之爲政也使人擇之不自舉使法量功不自度故能者不可蔽不能者不可飾妄譽者不能進也桓範要集曰夫事之安危實在於將故曰將不知兵以其主與敵主不擇將以其國與敵也然擇將者不務求其䇿而先索其勇不取於威嚴而用之於軟緩此所謂棄本而要其末也又曰昔覇王之戰䇿貴廟勝故曰上兵伐謀而戰勝也呉起臨陣推劍不持項羽初學劍後貴兵畧此勇難獨用况無勇乎又曰太公誓師後至斬故云執桴鼓立軍門有不可犯之色也嚴故能行其法威故能著其恩也又曰今之擇將宜參於徃古之數詭於常時之法得其狀而責任之所謂坐車上而御騏驥不勞而至千里者也又曰古之論將者言長於計䇿則課以料敵言善於治軍則考以政事言勇於奮擊則責以戰鬬若無此三者則不委之以境外之任付之以安危之事蔣子萬機論曰知兵之將國之衡主民之司命古者重之後世無逮焉吕望雖智孫武雖驍樂毅雖賢白起雖武夫齊之朽骨呉之縻骸燕之洧骼秦之腐肉豈可餔其糟粕復得生而使之哉固當出我民之最擇其智勇之長者用其術畧也又曰雖有百萬之師臨時受敵在將也呉子曰凡人之論將恒觀之勇勇之爲將乃萬分之一耳故六韜曰將不仁則三軍不親將不勇則三軍不爲動孫子曰將者智信仁勇嚴又曰三軍之衆百萬之師張設輕重在於一人謂之氣機道狹路險名山大塞十人所守千人不過是謂地機善行間諜分散其衆使君臣相怨是謂事機車堅舟利士馬嫻習是謂力機者也又曰夫將可樂而不可憂謀可深而不可疑將憂則内疑將有憂色則内外相疑不可信也謀疑則敵國奮多疑則計亂計亂則令敵國奮也以此征伐則可致亂故將清浄亷財曰清不擾曰浄能平能整能受諌能聼訟能納人受賢於羣英之中若越納范蠡齊納寗戚之類者是也能擇善言能知國俗能圗山川能裁阨難險難阨皆悉明也能制軍權危者安之懼者懽之叛者還之將有不合去者慰誘還之若蕭何追韓信寃者原之訴者察之卑者貴之士卒若有賤者貴之若呉起能與士卒同衣食是也强者抑之敵者殘之軍中有賤而敵貴者亂上下之禮殘殺之貪者豐之懸賞以豐其心所以使貪也欲者使之臨敵方戰有欲立功者有欲敵人者皆許而使之所謂使勇使貪畏者隱之士卒有所畏懼者隱蔽於後勿使爲軍鋒軍敗由鋒怯謀者近之䜛者覆之有䜛間人者覆之毁者復之官職有毁廢者修而復之反者廢之横者挫之服者活之首服罪者活之降者說之說舍獲城者割之賞功臣也獲地者裂之賜功勞者獲國者守之得其國必資賢以守之若呉伐越得其國不守所以終敗也獲阨塞之獲難屯之獲財散之敵動伺之敵强下之敵陳强則下之與戰若齊師伐魯鼓之曹劌不動三鼓破齊是也敵凌假之敵之威勢凌我而來宜持重以待之勿與戰楚凌漢求决一戰漢祖如弱不許之是也敵暴安之敵人爲暴虐之行則安之勸之所以怒我衆也昔燕伐齊田單不下燕師掘齊人冡墓田單安勸之是也敵勃義之敵爲勃亂之事則我修義以待之彼勃我義則克之敵睦擕之順舉挫之舉順以挫逆也因勢破之放言過之放過惡言以誣詐敵人以怒已衆也此爲將之道也又曰故將拒諫則英雄散䇿不從則謀士叛善惡同則功臣倦賞罰不明善惡無異則有功之臣皆懈倦也將專己則下歸咎專己自任不與下謀衆皆歸罪於將而責之將自臧則下少功臧善也將自伐功忘下自用者故曰少功將受讒則下有離心將貪財則姦不禁上貪則下盗也將内顧則士卒滛内顧思妻妾也將有一則衆不服有二則軍無試試法也有三則軍乖背有四則禍及國又曰軍志曰將謀欲宻士衆欲一將衆如一體也攻敵欲疾將謀宻則姦心閉士衆一則羣心結結如一也攻敵疾則詐不及設軍有此三者則計不奪將謀泄則軍無勢以外闚内則禍不制闚見也謀泄則外見己軍虛實其禍不可制也財入營則姦㑹凡爲軍使外人以財貨入營内則姦謀奄集其中也將有此三者軍必敗也又曰將無慮則謀士去將無防慮不能從謀故去之將無勇則吏士恐將怯則下無所恃故恐也將遷怒則軍士懼慮也謀也將之所重勇也怒也將之所用意故曰必死可殺也必生可虜也忿速可侮也亷潔可辱也愛人可煩也此五者將兵之過用兵之灾也又曰凡戰之要先占其將而察其才因形用權則不勞而功興也其將愚而信人可謀而詐貪而忽名可貨而賂也輕變可勞而困上富而驕下貧而傑可離而間將怠士懈可潜而襲智而心緩者可廹也勇而輕死者可暴也急而心速者可誘也貪而喜利者可襲也仁而不忍於人者可勞也智而心緩者可驚也信而喜信於人者可誑也亷潔而不愛人者可侮也剛毅而自用者可事也懦心喜用於人者可使人欺也此皆用兵之要爲將之畧也何晏韓白論曰此兩將者殆虽尤之敵蓋開闢所希有也何者爲勝也或曰白起功多前史以爲出竒無窮欲窺滄海白起爲勝若夫韓信㫁幡以覆車㧞旗以流血其以取勝非復人力也亦可謂竒之又竒者哉白起之破趙軍詐奔而㫁其糧道取勝之比皆此類也所謂用竒於不竒之間矣安得比其竒之又竒者哉班叔皮王命論曰是時陵爲漢將而母獲於楚任彦昇奏彈曹景宗曰賞茂通侯榮高列將潘安仁西征賦曰蕭曹魏丙之相辛李衛霍之將銜使則蘇屬國震遠則張博望屬國蘇武博望張騫范曄二十八將傳論曰中興二十八將前世以爲上應二十八宿未之詳也然咸能感㑹風雲奮其智勇議者多非光武不以功臣任職至使英資茂績委而勿用然原夫良圖遠䇿固將有以焉耳若乃王道既晦降及覇德猶能授受惟庸勲賢兼序如管隰之迭升桓世先趙之同列文朝可謂兼通矣降自秦漢世資戰力至於翼扶王運皆武人振起亦有鬻繪盗狗輕猾之徒或崇以連城之賞或任以阿衡之地故勢疑則隙生力侔則亂起蕭樊且猶縲絏信越終見爼戮不其然乎自兹以降訖於孝武宰輔五世莫非公侯遂使搢紳道塞賢能蔽壅故光武鑒前事之違存矯枉之志雖宼鄧之高勲耿賈之鴻烈分土不過大縣數四所加特進朝請而已觀其治平臨政課職責咎將所謂導之以法齊之以刑者乎永平中顯宗追感前世功臣乃圖畵二十八將於南宫雲䑓其外又有王常李通竇融卓茂合三十二人依其本第係之篇末太平御覽卷二百七十三
