body:
  text: 太平御覽九百八十八宋李昉等撰藥部五石藥下禽獸藥部餘粮硝石芒硝朴硝雄黄雌黄磁石石膏滑石礬石曾青空青白青扁青長石冷石石蜜玉泉水銀決明赭代赭附白堊鹵鹽龍骨角齒附牛黄阿膠海蛤犀角羚羊角鹿茸鹿脂雁肪䳒頭并尾餘粮列仙傳曰赤斧者巴戎人為碧雞祠主簿能煉丹與硝石服之三十年身反童子髮毛皆赤數十年上華山取禹餘粮餌之手掌中有赤斧博物志曰海上有草焉名曰蒒音師草其實如粉食之如大麥七月稔熟民歛至冬乃訖名自然穀或曰禹餘粮今藥中有禹餘粮者世傳昔禹治水棄其所餘食於江中常為藥也博物志曰會稽有地名蓼出餘糧范子計然曰禹餘粮出河東本草經曰太一禹餘粮一名石腦味甘平生山谷治欬逆上氣癥瘕血閉漏下除邪久服能忍寒暑不飢輕身飛行千里若神仙生太山又曰禹餘粮味甘寒生池澤治欬逆寒熱煩滿下痢赤白血閉癥瘕大熱久服輕身生東海吳氏本草經曰太一禹餘粮一名禹哀神農岐伯雷公甘平李氏小寒扁鵲甘無毒生太山上有甲甲中有白白中有黄如雞子黄色九月採或無時硝石吳氏本草經曰硝石神農苦扁鵲甘范子計然曰硝石出瀧道芒硝本草經曰硝石一名芒硝味酸苦寒生山谷治五臟積熱生益州朴硝本草經曰朴硝味苦寒生山谷治百病寒熱邪氣除六府積聚結癖生山谷之隂有鹹苦之水狀如芒硝而麄能化七十二種石鍊餌服之輕身神仙生益州吳氏本草曰朴硝石神農岐伯雷公無毒生益州或山陰入土千年不變煉之不成不可服雄黄𤣥中記曰員丘之上多大蛇以雄黄精壓之水經曰黄水出零陵縣西北連巫山溪出雄黄頗有神異採常以冬月祭祀鑿石深數丈方得故溪水取名焉淮南萬畢術曰夜燒雄黄水蟲成列來水蟲聞燒雄黄氣皆趨火死吳氏本草曰雄黄神農苦山陰有丹雄黄生山之陽故曰雄是丹之雄所以名雄黄也雌黄越絶書曰今太守舍者春申君所造後璧屋以為桃夏宫今宫者春申君子假君宫也數失火因塗雌黄故曰黄堂土物志曰丹山草木赫然盡彰雄黄雌黄所産煒煌内含竒寳外發英光昔𨽻交部今則南康典術曰天地之寳藏於中極名曰雌黄千年化為雄黄雄黄千年化為黄金本草經曰雌黄石金味辛平生山谷治身癢諸毒磁石王隐晉書曰馬隆撃凉州以磁石累道側賊負鐡鎧不得過以為神呂氏春秋曰磁石召鐡或引之也石䥫之母也石之不磁者亦不能引之也抱朴子曰五石者丹砂雄黄礜石曽青磁石也一石輒五轉而各成色五五石合為二十五色南州異物志曰漲海﨑頭水淺而多磁石外徼人乗大船皆以鐵鎖鎖之至此闗以磁石不得過淮南萬畢術曰磁石拒碁取雞血作針針磨鐡𢷬之以和磁石日塗碁頭曝乾之置局上則相拒不休又曰磁石懸入井亡人自歸吳氏本草曰磁石一名磁君石膏廣州記曰鄣平縣有石膏山望之皎若霜雪本草經曰石膏味辛㣲寒生谷中治心下逆驚喘口乾焦不能息也滑石南越志曰膋音寮城縣出膋石膋石即滑石也土人以為燒器以用烹魚本草經曰滑石味苦寒生山谷治身熱泄癖生赭陽范子計然曰滑石白滑者善礬石本草經曰礬石一名羽涅泥結切味鹹酸寒生山谷治寒熱泄痢惡瘡目痛堅骨煉餌久服輕身不死生河西盛宏之荆州記曰建平出礬石范子計然曰礬石出武都吳氏本草曰礬石一名羽涅一名羽澤神農岐伯酸扁鵲鹹雷公酸無毒生河西或隴西或武都石門採無時岐伯久服傷人骨曽青衡山記曰衡山有曽青崗曽青可合仙藥淮南萬畢術曰取曽青十斤燒之以水灌其地雲起如山雲曽青為藥令人不老本草經曰曽青山蜀郡石山其山有銅者曽青出其陽青者銅之精能化金銅空青江乗地記曰樵採者嘗於山上得空青此山三朝出雲雨必降民以為常占范子計然曰空青與曽青同出蜀郡白青出𢎞農豫章本草經曰空青味甘寒生山谷明目久服輕身延年能化銅鉛作金生益州吳氏本草曰空青神農甘一經酸久服有神仙玉女來侍使人志高白青本草經曰白青味甘平生山谷明目利九竅耳聾殺諸毒之蟲久服通神明延年出豫章范子計然曰白青出弘農豫青色者善吳氏本草曰神農甘平雷公鹹無毒生豫章可消而為銅淮南萬畢術曰白青得鐡即化為銅扁青本草經曰扁青味甘平生山谷治目痛明目辟毒利精神久服輕身不老生朱崖吳氏本草經曰扁青神農雷公小寒無毒生蜀都治目痛癰腫風痺丈夫内絶令人有子久服輕身長石本草經曰長石一名方石味辛治身熱吳氏本草曰長石一名方石一名直石生長子縣理如馬齒方而潤澤玉色長鮮服之不飢冷石吳錄地理志曰􅉱林布山縣多虺其毒殺人有冷石可以解之石色赤黒味苦石蜜神仙傳曰羨門止中岳飡石蜜紫粱西京雜記曰閩越王獻高祖石蜜二斛本草經曰石蜜一名石飴味甘平生山谷治心邪妄安五藏益氣補中止痛解毒久服輕身不老生武都吳氏本草曰石蜜神農雷公甘氣平生河源或河梁玉泉本草經曰玉泉一名玉澧味甘平生山谷治藏百病柔筋强骨安魂長肌肉久服能忍寒暑不飢渇不老神仙人臨死服五斤死三年色不變生藍田吳氏本草曰玉泉一名玉屑神農岐伯雷公甘李氏平畏冬華惡青竹水銀廣雅曰水銀謂之澒紅董切淮南萬畢術曰朱砂為頂本草經曰水銀味辛寒無毒決明本草經曰石決味酸草決味鹹吳氏本草曰決明子一名草決明一名羊明赭代赭附説文曰赭赤土也山海經曰胞山灌水之中有赤赭以塗牛馬病郭璞注曰赭赤土也又曰少陽山其中多美赭南方草木狀曰赤土出踊山下在石中採好色赤者雜丹中朱膠漆器范子計然曰石赭出齊郡赤色者善蜀赭出蜀郡本草經曰代赭一名血師好者色如雞冠白堊山海經曰慈聾之山其中多白堊黒青黄堊俱出大谷范子計然曰青堊出三輔本草經曰白堊即白善土也生邯鄲鹵鹽本草經曰鹵鹽一名寒石味苦治大熱消渇狂煩戎鹽主明目益氣堅肌去毒蟲散鹽一名食鹽令人吐主腸胃結熱禽獸藥附龍骨角齒附史記曰穿渠自徴引洛水至商顔下穿渠得龍骨故名龍骨渠盛宏之荆州記曰始安駭鹿山室鑿室内輒得龍骨范子計然曰龍骨出東海本草經曰龍骨味甘平出山谷治心疾鬼症生晉地華陽國志曰蜀五城縣其上值天門龍昇天不達死墜此地故掘死龍骨冬夏無已吳氏本草經曰龍骨生晉地山谷陰大水所過處是死龍骨色青白者善十二月採或無時龍骨畏乾漆蜀椒石膏龍齒神農李氏大寒龍骨治驚癎久服輕身牛黄文士傳曰延篤為京兆尹桓帝時梁兾専政時皇子疾詔書發京兆出牛黄兾遣諸生齎書持牛黄詣篤賣篤以為詐論殺之本草經曰牛黄味苦生隴西平澤特牛膽中治驚癎寒熱生晉地吳氏本草經曰牛黄出入鳴吼者有之夜視有光走角中牛死其膽中如雞子黄人參為使惡地黄飛廉龍骨阿膠東水經曰東阿縣有大井其巨若輪每嵗常煮膠以貢天府本草所謂阿膠也故世俗有阿井之名庾信哀江南賦云阿膠不能止黄河之濁海蛤博物志曰東海有蛤鳥嘗啖之肉消盡殻起出浮泊在沙岸潮水往來揩蕩白如雪入藥最良取自死者本草經曰海蛤味苦平生池澤治欬逆氣喘頑骨痛寒熱文蛤主惡瘡蝕五痔生東海吳氏本草經曰海蛤神農苦岐伯甘扁鵲鹹頭有文如鋸齒採無時犀角本草經曰犀牛角味鹹治百毒羚羊角本草經曰羚羊角安心氣不魘鹿茸本草經曰鹿茸强志不老鹿脂本草經曰麋脂近隂令人陰萎雁肪本草經曰雁肪一名鶩肪味甘平生池澤治風攣拘急偏枯氣不通久服長髮益氣不飢不老輕身生南海吳氏本草經曰雁肪神農岐伯雷公甘無毒採無時鶩肪殺諸石藥毒䳒頭并尾本草經曰䳒辟不祥生淮南吳氏本草曰䳒尾治蠱毒太平御覽卷九百八十八
