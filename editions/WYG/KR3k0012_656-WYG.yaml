body:
  text: 太平御覧卷六百五十六宋李昉等撰釋部四異僧下髙僧傳曰安清字世高安息國王正后之太子也幼以孝行見稱雖居家而奉戒精峻王薨便嗣父位乃深唯苦空散離形器行服既畢遂譲國與叔出家修道博曉經藏而遊方𢎞化遍歴諸國以漢桓帝之初始到中夏多有神通世莫能量自稱先身已經出家有一同學多瞋分衛值施主不稱毎輙懟恨髙屢加訶諌終不悛改如此二十餘年乃與同學辭訣云卿明經精勤不在吾後然性多恚怒命過當受惡形我若得道必當相度既而值靈帝之未振錫江南云我當過廬山度昔同學行達䢼亭湖廟此廟舊有威靈商旅祈禱乃分風上下各無留滯嘗有乞神竹者未許輙取舫即覆沒竹還夲處自是舟人敬惮莫不懾影時商旅三十餘舡奉牲請福神乃降祝曰舫有沙門可便呼上客咸驚愕請高入廟神告高曰昔吾外國與子俱岀家學道好行布施而性多瞋怒今為䢼亭廟神周廽千里並吾所治以布施故珍玩甚豐以瞋恚故堕此神報今見同學悲欣何言夀盡旦夕而醜形長大若於此捨命穢汚江湖當渡山西澤中此身滅後恐堕地獄吾有絹千疋并雜寳物可以立法營塔使生善處也高曰故来相度何不出形神曰形甚醜異衆人必懼高曰但岀衆不怪也神從牀後出頭乃是大蟒不知尾之長短至髙膝邉高向之梵語數畨賛咒數契蟒悲淚如雨湏臾還隠高即取絹物辭别而去舟侶颺㠶蟒復出身登山而望衆人舉手然後乃滅倐忽之頃便達豫章即以廟物為造東寺高去後神即命過暮有一少年上船長跪髙前受其咒願忽然不見高謂船人曰向之少年即䢼亭廟神也得離惡形矣又曰竺曇摩羅刹此云䕶法其先月支人夲姓文氏世居燉煌郡年八嵗出家遂随師至西域遊歴諸國遂通外國異言三十六種書亦如之以晉武之末隠居深山山有清泉恒取澡潄後有採薪者穢其水側俄頃而燥䕶乃徘徊歎曰人之無徳遂使清泉流輟流水若永竭真無以自給正當移去耳言訖而泉流滿澗其幽誠所感如此䕶世居燉煌死而化道周洽時人咸謂燉煌菩薩也又曰帛逺字法祖才思俊徹敏朗絶倫誦經日八九千言研味方等妙入幽微世俗墳典多所該貫晉惠之末太宰河澗王顒鎮關中虛心敬重待以師友之禮每至閒辰靜夜輙談講道徳于時西府初建俊乂甚盛能言之士咸服其逺達後奄然命終羣胡各起塔廟少時有一人姓李名通死而更蘇云見祖法師在閻羅王處為王首講楞嚴經云講畢往忉利天又見祭酒王浮被鎻械求祖懴悔昔祖平素之日與浮論爭邪正浮屡屈既瞋不自忍乃作老子化胡經以誣謗佛法殃有所歸故死方思悔又曰佛䭾跋跎羅此云覺賢夲姓釋氏迦維羅衛國人甘露飯王之苖裔也父少亡賢三嵗孤與母居五嵗後喪母為外氏所養從祖鳩婆刹聞其聰敏兼悼其孤露乃迎還度為沙彌至年十七與同學數人俱以習誦為業衆皆一月賢一日誦畢其師歎曰賢一日敵三十夫也及受真戒修業精勤博學羣經多所通達少以禅律馳名常與同學僧迦達多共遊􅄢賔同處積嵗達多雖服其才明而未測其為人也後於宻室閉戸坐禅忽見賢來驚問何來答云暫至兠率致敬彌勒言訖便隠達多知是聖人未測淺深後屡見賢神變乃歸心祈問方知得不還果常欲遊方𢎞化備觀風俗㑹有秦沙門智嚴西至罽賔既要請苦至愍而許焉於是既度葱嶺路經六國國王矜其逺化並傾懐賢奉至交趾乃附舶循海而行經一島下賢以手指山曰可止於此舶主曰客行惜日調風難遇不可停也行二百餘里忽風轉吹舶還向島下衆人方悟其神威師事之於後闇夜之中忽令衆舶俱發無肯從者賢自起取䌫一舶獨發俄爾賊至留者悉被抄害頃之至青州東莱郡聞鳩摩羅什在長安即徃從之什大悦秦太子泓欲聞賢説法乃要命羣僧集論東宫羅什與賢數畨徃復什問法云何空答曰衆微成色色自無性故唯色常空又問既以極微破色空復云何破一微答曰羣師或破析一微我意謂不爾又問微是常耶答曰以一微故衆微空以衆微故一微空時寳雲譯岀此語不觧其意道俗咸謂賢之所計微塵是常餘日長安學僧復請更釋賢曰夫法不自生縁㑹故生縁一微故有衆微微自無性則為空矣寕可言不破一微常而不空乎此是問答之大意也又曰曇無懴天竺人明觧咒術所向皆騐西域號為大咒師後随王王即天竺王也入山王渴須水不能得懴乃宻咒石岀水因賛曰大王惠澤所感遂使枯石生泉隣國聞者皆歎王徳于時雨澤甚調百姓稱詠王悦其道深加優寵至後凉王沮渠蒙遜聞懴名呼與相見接待甚厚嘗告蒙遜云有鬼入聚落必多灾疫遜不信欲躬見為騐懴即以術加遜遜見而駭怖懴曰宜潔誠齋戒神咒以驅之乃讀咒三日謂遜曰鬼已去矣時境首有見鬼者云見數百疫鬼奔驟而逝境内獲安懴之力也又曰釋法顯姓龔平陽武陽人也三嵗便度為沙彌十嵗遭父母憂志性過人葬事畢仍即還寺嘗與同學數十人於田中刈稻時有飢賊欲奪其穀諸沙彌悉走唯顯獨留語賊曰若欲湏穀随意所取但君等昔不布施故致飢貧今復奪人恐来世彌甚貧道預為君等憂耳言訖即還賊棄穀而去及受大戒常慨經律舛闕誓志尋求以晉隆安三年西度流沙將至天竺去王舎城三十餘里有一寺逼暝過之顯欲詣耆闍崛山寺諸僧諌曰路甚險阻多黒獅子亟經噉人何由可至顯曰逺渉數萬里誓到靈鷲身命不期出息非保豈可使積年之誠既至而廢雖有險難吾不懼也衆莫能止乃遣兩僧送之顯既至山日將曛夕遂欲停宿兩僧懼捨之而還顯獨留山中燒香禮拜翹感舊跡如覩聖儀至夜有三黒獅子来蹲踞顯前䑛唇揺尾顯誦經不輟一心念佛獅子乃低頭下尾伏顯足前顯以手摩之咒曰若欲相害待我誦竟若見試者可便退矣獅子良乆乃去明晨乃還路窮幽梗止有一徑通行未至里餘忽逢一道人年可九十餘容服麄素而神氣儁逺顯雖覺其韻髙竟不悟是神人後又逢一少僧顯問曰向者耆年是誰耶答曰頭􅀈迦葉大弟子也顯方大恨更追至山所有横石塞于室口遂不能入顯流涕而去又曰曇無竭此云法勇至罽賔國禮拜佛鉢住嵗餘學梵書語求得觀世音受記經梵文一部復西行雖屡經危棘而恒念所賫觀世音經未嘗暫廢將至舎衛國中野逢山象一羣無竭稱名歸命即有獅子從林中出象驚惶奔走後渡恒河值野牛一羣鳴吼而来將欲害人無竭歸命如初尋有大鷲飛来野牛驚散其誠心所感在險克濟皆此類也又曰釋智嚴晋義熈十三年宋武帝西伐長安尅㨗旋斾塗出山東時與始興公王恢從駕遊觀山川至嚴精舎見其同止三僧各㘴䋲床禪法湛然恢至良乆不覺弹指三人開眼俄而還閉問不與言恢心敬精竒訪諸耆老皆云此三僧隐居求志髙潔法師也恢即啓宋武延請還都莫肯行者既屡請情至三人惟嚴随行恢道懐素䔍禮事甚勤還都即住始興寺嚴性虛靜志避諠塵恢乃於東郊起精舎即枳園寺也嚴在寺不受别請常分衛自資道化所被幽顯咸伏有見鬼者云見西州大社聞鬼相謂云嚴公至當辟易此人未之觧俄而嚴至聊問姓字果稱智嚴黙而識之宻加禮異又曰求那跋摩此云功徳鎧累世為王年十四便機見儁達深有逺度仁愛汎博崇徳務善其母嘗湏野肉令跋摩辦之跋摩曰有命之類莫不貪生夭彼之命非仁人矣母怒曰設令得罪吾當代汝跋摩他日煑油誤燒其指因謂母曰代兒忍痛母曰痛在汝身吾何能代跋摩曰眼前之苦尚不能代况三途耶母乃悔悟終身斷殺至年十八相王見而謂曰君年三十當撫臨大國南面稱尊若不樂世榮當獲聖果至年二十出家受戒乃辭師違衆林棲谷飲孤行山野遯迹人世往獅子國觀風聞教識真之衆咸謂已得初果儀刑感物見者發心元嘉初文帝知跋摩已至南海於是勅州郡令資發下京路由始興經停嵗許始興有虎市山峰嶺髙絶跋摩謂其髣髴耆闍乃改名靈鷲於山寺之外别立禪室去寺數里磬聲不聞每至鳴椎䟦摩已至或冐雨不霑或履泥不汚時道俗莫不肅然増敬寺有寳月殿摩跋於殿北壁手自畫作羅漢像乃定光儒童布髮之形像成之後每夕放光此山夲多虎灾自䟦摩居之晝行夜徃或時値虎以杖按頭戯之而去於是山旅水賔去来無梗嘗於别室坐禅累日不出寺僧遣沙彌候之見一白獅子縁柱而立亘室彌漫生青蓮華沙彌驚恐大呼徃逐獅子豁無所見後文帝重勅觀寺等復更敦請乃泛舟下都以元嘉八年正月達于建業文帝引見因問曰弟子常欲持齋不殺廹以身殉物不獲從志法師既不逺萬里来化此國將何以教之䟦摩曰大道在心不在事法由巳非岀人且帝王與匹夫所修各異匹夫身賤名劣言令不威若不尅已苦躬將何為用帝王以四海為家萬民為子出一嘉言則士庶咸悦布一善政則神人以和刑不夭命役無勞力則使風雨適時寒煖應莭百穀滋繁桑麻欝茂如此持齋亦以大矣不殺亦以衆矣寕在闕半日之飡全一禽之命然後方為宏濟耶帝乃撫几歎曰夫俗人迷於逺理沙門滯於近敎迷逺理者謂至道虛説滯近教者則拘攣篇章至如法師所言真謂開悟明達可與言天人之際矣乃勅住祗海寺供給隆厚又曰曇摩宻多此云法秀罽賔人也年至七嵗神明澄正每見法事輙自然欣躍其親愛而異之遂令出家罽賔多岀聖達屡值明師博貫羣經特深禅法所得之要極其徴奥為人沉􅃉有慧觧儀軌詳正生而連眉故世號連眉禅師少好遊方有迦毗羅神王衛送遂至龜兹於中路欲囬乃現形告辭宻多曰汝神力通變自在逰處將不相随共徃南方語畢即収影不現遂從至都即於上寺圗像着壁迄今猶有聲影之騐潔誠祈福莫不響應又曰釋智猛雍州新豐人每聞外國道人説天竺國有釋迦遺迹及方等衆經嘗慨然有感馳心遐外以為萬里咫尺千載可追也遂發迹長安到罽賔國國有五百羅漢常徃反於阿耨達池有大徳羅漢見猛至􅂬嘉猛諮問方士為説四大天下事猛于竒沙國見佛文石唾壺又于此國見佛鉢光色紫紺四際盡然以香花供飬頂戴發願鉢若有應能輕能重既而轉重力遂不堪及下鉢時復不覺重至迦維羅衛國見佛髪佛牙及肉髻骨佛影佛迹炳然具存其所逰踐究觀靈變天梯龍池之事不可勝數又曰天竺沙門僧迦達禅學深明来逰宋境學在中坐禅日時將廹念欲虛齋乃有羣鳥啣果飛来投之達多思維彌候奉宻佛亦受而食之令鳥授食而為不可於是授而進之又曰求那跋陀羅此云功徳賢中天竺人以大乗學故世號摩訶衍譙王欲講誦華嚴等經而跋陀自忖未善宋言有懐愧歎即旦夕禮懴於􅀚世音乞求㝠應遂夢有人白衣持劔擎一人首来至其前曰何故憂耶䟦陀具以事對答曰無所多憂即以劔易首更安新頭語令廽轉曰得無痛耶答曰不痛豁然便覺心神喜恱旦起語義皆通備領宋言於是就講又曰沙門寳意世居天竺以宋孝建中来止京師瓦棺禅房恒於寺中樹下坐禅又曉經律時人號為三藏常轉側數百貝子立知吉凶善能神咒以香塗掌亦見人徃事宋祖施一銅唾壺髙二尺許常在牀前忽有人竊之意取竹蓆一領空卷之呪敎通經于三夕唾壷在席中莫測其然又曰竺法崇嘗逰湘州欝山山精化為夫人詣崇請戒捨所住山以為寺崇居之少時化洽湘土又曰釋法安一名慈欽未詳何許人善能開化愚蒙拔邪歸正晋義熈中新陽縣虎灾縣有大社樹下築神廟左右居民以百數遭虎死者夕有一兩安嘗逰於其縣暮經此村民以畏虎早閉閭門安徑之樹下通夜坐禅向曉聞虎負人而至投之樹比見安如喜如驚跳伏安前安為説法授戒虎踞地不動有頃而去及旦村人追虎至樹下見安大驚是神人遂傳之一縣士庶莫不宗奉虎灾由此遂息因改神廟留安立寺又曰釋曇邕於廬山之西南營立第宇與弟子曇果澄思禅門嘗於一時果夢山神求授五戒果曰家師在此可往諮受少時邕見一人着单衣袷風姿端雅從者二十餘人請受五戒邕以果先夢知是神仙乃為説法受戒神贈以外國匕著禮拜辭别倐忽不見又曰釋僧苞建三七日普賢齋懴至第十七日有白鵠飛来集普賢座前至中行香畢乃去二十一日將暮有黄衣四人繞塔數匝忽然不見又曰支曇蘭晋太元中逰剡縣後憇始豐赤城山見一䖏林泉清曠而居之經數十日忽見一人長數丈呼蘭令去又見諸異形禽獸以恐蘭見蘭恬然自得乃屈膝禮拜云珠欺王是家舅今徃常鄉山就之推此處以相奉爾後三年忽聞車騎隠隠從者彌峯俄而有人著幘稱珠欺王通既前從其妻子男女等二十五人並形貎端正有逾於世既至蘭所致敬訖蘭問住在何處答曰在樂安縣常鄉山久服風聞今與家累仰投乞受歸戒蘭即為授之受法竟䞋錢一萬宻貯二噐辭别而去便聞鳴笳鼔吹响振山谷禅衆十餘共所聞見又曰釋𤣥高母梦梵僧散花滿室覺便懐胎及生男家内忽有異香光明照壁迄旦乃息母以兒生瑞兆因名靈育出家改名𤣥高聰敏生知學不加思至年十五己為山僧説法受戒林陽堂山山古老傳相云是羣仙所宅高徒衆三百徃居山舎多有靈異磬既不擊而鳴香亦自然有氣應真仙主往往来逰學從之日有𤣥紹者學究諸禅神力自在手指出水供髙洗潄其水香凈倍異於常毎得非世華香以獻三寳其靈如紹者有十一人西海有梵僧印亦從髙受學志陋量偏得少為足便謂已得羅漢頓盡禅門髙乃宻以神力令印於定中備見十方無極世界諸佛所説法門不同印於一夏尋其所見末不能盡方知定水無底大生愧懼又曰釋僧稠韜化晦迹人莫能知居塞山山在長安西南四百里将殂告弟子曰吾将去矣其夕見火從䋲床後出燒身經二日方盡煙熖張天而房不燼弟子収遺灰架以磚塔又曰訶羅竭者多行頭陁獨宿山野晋惠帝元康元年乃西入止婁至山石室中坐禅此室去水既逺時人欲為開澗竭曰不假相勞乃自起以左脚蹍開居室西石壁䧟沒指既㧞足水從中出清香軟美四時不絶来飲者皆止飢渴除病又曰竺法慧夲闗中人晋康帝建元中至襄陽止羊叔子寺不受别請每乞食輙賫䋲床自随於間曠之路則施之而坐時或遇雨以油帔自覆雨止唯見䋲床不知慧所在訊問未息慧已在䋲床每謂弟子法照曰汝過去時折一雞脚其殃尋至俄而照為人所擲脚遂永疾又曰淑公西域人言未然之事騐若指掌以符堅建元十一年至長安能以秘咒咒下神龍每旱堅嘗請之咒龍俄而龍下鉢中天輙大雨堅及羣臣親就鉢中觀之咸歎其異又曰杯渡者不知姓名嘗以木杯渡水因以為名不修細行神力卓越世莫測其由来唯持一蘆圌子更無餘物向廣陵遇村舎有李家設八関齋先不相識乃直入齋堂而坐置蘆圌於中庭衆以其形陋無恭敬心李見蘆圌當道欲移置墻邉數人舉之莫能動渡食竟提之而去笑曰四天王李家于時有一䜿子窺其圌中見四小兒並長四寸面目端正衣裳鮮潔於是追覔不知所在後三日乃見西界蒙籠樹下坐李禮拜請還家供養渡不甚持齋飲酒噉肉至於牛鱠與俗不殊清旦忽云欲得一袈裟中時合辦李即經營至中時未成渡云暫出至暝不返合境聞有異香疑其為怪處處覔渡乃見在北岩下鋪敗袈裟於地卧而死也頭前脚後皆生蓮花花極鮮香邑共殯之後數日有人從北来云見渡負蘆圌行向彭城乃共開棺唯見鞋履既至彭城有白衣黄欣深信佛法見渡禮拜請還處家家貧但有麥飯而已渡甘之怡然止將半年忽語欣可覓蘆􅂒三十六枚吾湏用之答云此間正可有十枚貧無以買恐不盡辦渡曰汝但檢覔宅中應有欣即窮檢果得三十六枚列掛之庭中雖有其數亦多破損命欣次第熟視忽皆新完渡宻封因語欣令開乃見錢帛皆滿可百許萬識者謂是杯渡分身他土所得䞋施廽以施欣欣受之皆為功徳一年許渡辭去欣為辦粮食明晨見粮食俱存不知渡所在續髙僧傳曰釋惠恭者益州成都人也與同寺慧逺結契勤學逺直詣長安恭徃荆陽訪道後從江左来還二人相遇欣然共叙别離三十餘年同宿數夜逺言談泉湧恭竟無所道逺問恭曰離别多時今得相見慶此歡會伊何可論但覺仁者無所説將無所得也恭對曰為性闇劣無所觧逺曰大無所觧可不誦得一部經乎恭曰唯誦得觀世音經一卷逺厲聲曰觀世音為小兒皆能誦之何煩大汝許人且仁者童子岀家與逺立誓望登道果豈復二十餘年唯誦一卷經如指大是非閣鈍嬾惰所為請與斷交願法師早去無増逺之煩惱也恭曰經卷雖小佛口所說尊敬者得無量福輕慢者得無量罪仰願暫息瞋心當為法師誦一遍即與長别逺大笑曰􅀚世音經是法華普門品逺以講之數百遍如何欲聞人耳乎恭曰外書云人能𢎞道非道𢎞人但至心聴佛語豈得以人棄法乃於庭前結壇壇中安高座繞壇數匝頂禮昇高座逺不得已於簷下踞胡床坐聴恭發聲唱經題異香氛氲遍滿房宇及入經文天上作樂雨四種花樂則嘹喨振空花則雰霏滿地誦經訖下座自為觧座梵訖花樂方歇慧逺接足頂禮淚下交流謝曰慧逺臭穢死尸敢行天日之下乞蹔留賜見敎誨恭曰非恭所能諸佛力耳即拂衣長揖㳂流而去爾後訪問竟不知其所之太平御覧卷六百五十六
