body:
  text: 太平御覽卷二百七十九宋李昉等撰兵部十威名信義威名史記曰李廣居右北平匈奴聞之號曰漢之飛將軍避之數嵗不敢入右北平界漢書曰郅都為鴈門太守匈奴素聞名節舉邊為引兵去境都死不近鴈門匈奴為偶人像都令騎馳射之莫能中者其見憚如此後漢書曰公孫瓉𫝊曰瓉字伯珪遼西令支人初平二年青徐黄巾三十萬衆入渤海界欲與黒山合瓉率歩騎二萬人逆擊於東光南大破之東光今滄州縣斬首三萬餘級敵棄輜重數萬兩奔走渡河瓉因其半濟薄之敵復破死者數萬流血丹水收得生口七萬餘車甲財物不可勝算威名大震拜奮武將軍又曰瓉為降虜校尉討烏桓每聞有警瓉輒厲色憤怒如赴讐敵望塵奔逐或繼之以夜戰敵識聲憚其勇莫敢抗犯又曰瓉征烏桓常與善騎射之士數十人皆乘白馬以為左右翼自號白馬義從烏桓更相告語避白馬長史乃畫作瓉形馳射之中者咸稱萬嵗敵自此之後遂逺竄塞外又曰承宫名播匈奴時北單于遣使求得見宫顯宗勅自整飾宫對曰夷狄眩名非識實者也臣狀醜不可以示逺宜選有威容者續漢書曰承宫𫝊曰夷狄聞臣虛稱故欲見臣臣形狀陋不如選長大有威者示之也帝乃以大鴻臚魏應代之又曰武王縯音引字伯升世祖之長兄也慷慨有大節進圍宛城中自號天柱大將軍王莽素聞其名大震懼使長安中官署及天下鄉亭皆畫伯升像於壁旦起射之東觀漢記曰耿秉性勇壮而簡易於事軍行常自被甲在前休止不結營部然逺斥堠明要害有警軍陣立成士卒皆樂為死匈奴聞秉卒舉國號泣魏志曰吕布字奉先便弓馬膂力過人號為飛將又曰龎徳將所領南屯樊攻雲長曰今年我不殺彼彼當殺我親與雲長交戰射中額時徳常乘白馬因謂之白馬將軍又曰張遼為孫權所圍遼潰圍出復入權衆破走由是威震江東兒啼不肯止其父母以遼恐之晉書曰鄧遐勇力絶人氣盖當世時人方之樊噲桓温以為參軍數郡號為名將宋書曰劉胡本名㘭胡以其顔靣㘭黒似胡故以為名及長㘭胡難道單呼為胡出身羣將捷口善處分稍至隊主討諸蠻徃事無不捷蠻甚畏憚之小兒啼語之曰劉胡來便即止又曰沈慶之伐􅃆北諸蠻大破之威震諸山羣蠻皆稽顙慶之患頭風着狐皮㡌羣蠻惡之號曰蒼頭公後魏書曰李崇深沉有將略寛厚善御衆在揚州凢經十年常飬壯士數千人冦賊侵邊所向摧破號曰卧虎賊甚憚之後周書曰韓果從大軍破稽胡於北山胡地險阻人迹罕至果進兵窮討散其種落稽胡憚果勁㨗號為著翅人太祖聞之笑曰著翅之名寧減飛將又曰蔡祐與齊神武遇戰於邙山祐時著明光鐵鎧所向無前敵人咸曰此是鐵猛獸也皆遽避之北史曰裴寛在孔城十三年與齊洛州刺史獨孤永業相對永業有計謀多譎詐或聲言春發秋乃出兵或揜蔽消息倐忽而至寛每揣知其情出兵邀擊無不克之永業嘗戒其所部曰但好慎孔城自外無足慮其見憚如此又曰怡峯字景阜遼東人也從征役以驍勇聞當時號為驍將又曰梁武勅蕭續曰賀㧞勝北間騎將汝其慎之唐書曰郝玼為刺史始玼以臨涇地宜當畜息蕃戎每為冦即屯其地嘗白其帥願以城控之前帥不從其後段祐為節度使玼復白祐祐多其策乃表請城之故詔玼鎮其北自是西戎無敢犯涇者玼自行間前無强敵在邊上三十年生得蕃人輒刳剔而歸其屍蕃人畏之如神下令得玼者賞以等身金蕃中小兒啼號者但連呼郝玼以怖之又曰張萬福帶和州刺史鎮咸陽因留宿衞李正已反將㫁江淮路令兵守璚橋渦口淮進奉舡千餘隻泊渦下不敢過徳宗以萬福為濠州刺史召見謂曰先帝改名作正者所以褒卿也朕以為江淮草木亦知卿名若從先帝所改恐賊不知是卿也復賜名萬福慰遣之萬福馳至渦口立馬岸上發進奉舡淄青兵馬倚㟁睥睨不敢動諸道舡繼進呉越春秋曰呉公子慶忌吴王僚子也勇㨗為人所聞筋力果勁萬人之敵也世説曰桓石䖍小字鎮惡嘗從征枋頭車騎冲没陳左右莫能先救宣武問汝叔落賊汝知不石䖍聞之氣甚奮策馬於數萬衆中徑致冲還三軍歎服河朔後以其名㫁瘧燉煌實録曰宋質直破敵有威名兒啼恐之即止敵相恚曰使汝行逢宋都督信義左𫝊曰曹衞告絶於楚子玉怒從晉師晉師退軍吏曰以君避臣辱也且楚師老矣何故退子犯曰師直為壮曲為老豈在乆乎㣲楚之惠不及此重耳過楚楚成王有贈送之惠退三舍避之所以報也一舍三十里初楚子云若反國何以報我故以退三舍為報又曰晉文公圍原命三日之糧原不降命去之諜出曰原將降矣軍吏請待公曰信國之寳也民之所庇也得原失信何以庇之所亡滋多退一舍而原降又曰晉將荀呉伐鮮虞圍鼓鼓白狄之別名鼓人或請以城叛吴曰吾聞諸叔向好惡不愆民知所適事無不濟愆過適歸也或以為城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何無復加所好也若其弗賞是失信也何以庇民力能則進否則退量力而行吾不可以欲城而邇姦所䘮滋多使鼓人殺叛人而繕守備圍鼔三月鼓人或請降使其民見曰猶有食色軍吏曰獲城而不取勤民而頓兵何以事君吴曰所以事君也獲一邑而教民怠將焉用邑邑以賈怠不如完舊完猶保守也賈音古完戸官反賈怠無卒卒終棄舊不祥鼔人能事其君吾亦能事吾君徳義不爽爽差好惡不愆城可獲而民知義所知義所在也荀吴必其能獲故因以示義有死命而無二心不亦可乎鼓人告食竭力盡而後取之克鼓而返不戮一人史記曰秦末天下兵起范増說項梁曰陳勝敗固當夫秦滅六國楚最無罪自懐王入秦不返楚人憐之至今曰楚雖三户亡秦必楚今陳勝首事不立楚後而自立其勢不長今君起江東楚蠭起之将皆争附君者以君世世楚將為能復立楚之後也乃求楚懐王孫心立為楚懐王從民所欲也項籍本紀曰項王乃東行擊陳㽞外黄外黄不下數日降羽悉令男子年十五已下詣城東欲阬之外黄令舍人兒年十三令之舍人兒也以其㓜弱故係其父徃說羽曰彭城强刼外黄强音其兩反外黄恐故且降待大王大王至又皆阬之百姓豈有歸心從此以東梁地十餘城皆恐莫肯下矣項王然其言廼赦外黄當坑者而東至睢陽聞之皆争下項王又曰漢王至洛陽新城三老董公遮說漢王以義帝死故漢王聞之袒而大哭遂為義帝發䘮臨三日發使者告諸侯曰天下共立義帝北面事之今項羽放殺義帝於江南大逆無道寡人親為發䘮諸侯皆縞素悉發關内兵收三河士南浮江漢以下願從諸侯王擊楚之殺義帝者後漢書曰更始初光武為蕭王定河北諸賊銅馬餘衆降封其渠帥為列侯降者猶不安光武知其意令各歸營勒兵乃自乗輕騎案行部陣降者更相語曰蕭王推赤心置人腹中安得不投死乎投死猶言致死由是皆服三國志明帝自征蜀至長安遣張郃諸軍勁卒四十餘萬向劍閣諸葛亮有戰士萬二千更下兵者八千時魏軍始陣畨兵適交參佐咸以敵衆强多非力所制控權停下兵并聲勢亮曰吾聞用武行師以大信為本得原失信古人所惜去者束装以待其妻子企踵而計日乃勅速遣於是去者感恱逗留一戰徃者憤踊咸思致命臨戰之日莫不㧞刃争先以一當十殺張郃却司馬宣王一戰大尅吴志曰孫皎嘗遣兵候魏獲魏邊將吏美女以進皎皎更其衣服送還之晉書曰武帝有滅吴之志以羊祜為督荆州諸軍事假節散騎常侍衞將軍如故祜率營兵出鎮南夏開設庠序綏懐逺近得江漢之心與吴人開布大信降者欲去皆聼之又曰羊祜為征南大將軍督荆州諸軍事祜以孟獻營武牢而鄭人懼晏嬰城東陽而萊子服乃進據險要開建五城取膏腴之地奪吴人之資石城以西盡為晉有自是前後降者不絶乃増脩徳信以懐柔初附慨然有吞吴之心每與吴人交兵剋日方戰不為掩襲之計將帥有欲進譎詐之䇿者輒飲以醇酒使不得言人有掠吴二兒為俘者祜遣送其家後吴將夏祥邵顗等來降二兒之父亦率其属與俱吴將陳尚潘景來冦祜追斬之美其死節而厚加殯斂景尚子弟迎䘮祜以禮遣還吴將鄧香掠夏口祜募生縳香既至宥之香感其恩率部曲而降祜出軍行吴境刈榖為糧皆計所侵送絹償之毎㑹衆江沔逰獵常止晉境若禽獸先為吴人所傷而為晉兵所得者皆封還之於是吴人翕然恱服稱為羊公不之名也祜與陸抗相對使命相通抗稱祜之徳量雖樂毅諸葛孔眀不能過也抗嘗病祜饋之藥抗服之無疑心士多諫抗抗曰羊祜豈酖人者時談以為華元子反復見於今抗毎告其戍曰彼專為徳我專為暴是不戰而自服也各保分界而已無求細利孫皓聞二境交和以詰抗抗曰一邑一鄉不可以無信義况大國乎臣不如此正是彰其徳于祜無傷也又曰羊祜在軍常輕裘緩帶身不被甲鈴閣之下侍衞者不過十數又曰劉道規為荆州刺史桓𤣥餘黨荀林屯江津桓謙軍屯枝江二冦交逼乆絶都邑之問荆楚既桓氏義舊並懐異心道規乃㑹將士吿之曰桓謙今在近畿聞諸軍頗有去就之計吾東來文武足以濟事若欲去者本不相禁因夜開城門達曉不閉衆咸憚服莫有去者又曰劉裕為將北伐後秦姚泓烏宏反以檀道濟為前鋒至洛陽凡㧞城破壘俘四千餘人議者謂應以戮為京觀道濟曰伐罪弔民在今日皆釋而遣之於是戎狄感恱相率歸之者甚衆崔鴻後燕録曰遣將慕容白曜伐宋無鹽城尅之將盡以其人為軍實副將􅐱範酈音厯曰齊四履之地號為東秦不逺為經畧恐未可定也今皇威始被民無霑澤連城有懷二之将比邑有拒守之失宜先信義示之軌物然後民心可懐二州可定白曜從之進次肥城白曜欲攻之範曰肥城雖小攻則淹日得之無益軍聲失之有損威勢且無鹽之卒死者塗炭成敗之機足為鍳矣若飛書吿諭可不攻自伏縱其不降亦當逃散白曜乃以書曉之肥城果潰北史曰西魏將王羆之守華州也今馮翊西魏師與東魏師戰河橋不利東魏卒趙青雀據長安城所在莫有固志羆乃大開州門召城中軍民謂之曰如聞天子敗績不知吉㓙諸人相驚咸有異心王羆受委於此以死報恩諸人若有異圖可來見殺必恐城陥沒者亦任出城如有忠誠能與王羆同心者可共固守軍民見其誠信皆無異心後漢書曰李為為荆州刺史輕將数十騎到上洛宣詔綏慰當即帖然尋勅邊戍掠得蕭頥人者悉令還之南人感徳仍送荆州之口二百許兩境交和無復􅇏燧之驚隋書曰桂州人李光仕舉兵作亂隋將周法尚討之光仕帥勁兵保白石洞法尚捕得其弟光略光度大獲家口其黨有來降附輒以妻子還之居旬日降者数千人法尚遣兵列陣以當光仕親率竒兵蔽林設伏兩陣始交法尚馳擊其栅栅中人皆走敗光仕大潰追斬之唐書曰武徳中李靖既剋江陵降蕭銑時諸將咸云銑之將帥與官軍拒戰罪狀既重請籍没其家以賞將士靖曰王者之師義在弔伐且犬吠非其主無容同叛逆之科此蒯通所以免大戮于漢祖也今新定荆郢宜𢎞寛大以慰逺近之心降而籍之恐非救焚拯溺之義且恐自此南城鎮各堅守不下非計之善於是遂止江漢之城聞之莫不争下又曰裴度既平淮西蔡人大恱舊令途無偶語夜不燃燭又戒以酒食相過從者以軍法論度乃約法唯盜闘殺外餘盡除之其徃來者不復以晝夜為限於是蔡之遺黎始知有生人之樂又曰裴度既平淮西以蔡卒為牙兵或以為反側之子其心未安不可自去其備度笑而答曰吾受命為彰義軍節度使元惡就擒蔡人即吾人也蔡之父老無不感泣申光之民即時平定又曰李愬襲蔡州既獲李祐破解其縛而客禮之愬乗間常召祐及李忠義屛人而語義亦降將也本名憲改之軍中多以諫愬愬益親祐始募敢死者三十人以為突騎愬自教習之將襲元濟㑹雨水自五月至七月所在陂澤潰溢不可行營諸軍皆以愬不殺祐為言慮其誘覆官軍簡牒日至且言得賊諜具事愬無以止之乃持祐泣曰豈天不欲平此賊何爾我一身而見奪於衆口愬亦慮諸軍先以謗間則不能全之矣乃械祐送京師先表請釋且言必殺祐則無與成功者比至京師詔釋以還愬愬喜甚署為散兵馬使授刃佩之夜則倚以廵警或使以入愬帳中言事愬因留對舉酒徃徃逹旦竊聼者時聞祐涕泣聲尋署為六院兵馬使說苑曰晉文公伐楚歸國行賞狐偃為首或曰城濮之事先軫之謀文公曰城濮之事偃說我無失信不背三舍之約先軫所謀軍事吾用之以勝然此一時之說偃言萬世之功奈何以一時之利而加萬世功乎是以先之衆人恱服荘子曰世南宜僚弄丸而家之難解孫叔敖秉羽而郢人投兵韓詩外傳曰簡子薨未葬中牟叛之葬五日興師攻之圍未匝而城自壊者十丈襄子擊金而退之曰吾聞君子不乘人於利不阨人於險使脩其城然後攻之中牟聞其義請降吕氏春秋曰夏后與有扈戰於甘澤而不勝曰戰而不勝是吾徳薄而教不善也于是處不重席食不二味琴瑟不脩女子不飾尊賢使能朞年而有扈氏服太平御覽卷二百七十九
