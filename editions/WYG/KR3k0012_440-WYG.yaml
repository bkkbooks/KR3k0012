  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_440-1a, image: WYG0897/WYG0897-0061c.png}
body:
  text: 太平御覽卷四百四十宋李昉等撰人事部八十一貞女中唐書曰魏衡妻王氏梓州鄴人也武徳初薛仁杲舊将旁企地侵掠梁部因獲王氏逼而妻之後企地漸强盛衡謀以城應賊企地領衆将赴梁州未至數里飲酒醉卧王氏取其佩刀斬之攜其首入城賊衆乃散髙祖大悦封為崇義大夫人又曰絳州孝女衛氏字無忌夏縣人也初其父為鄉人衛長則所殺無忌時年六嵗母又改嫁更無弟兄及長常思復讎無忌從伯嘗設宴為樂長則時亦預坐無忌以摶擊殺之既而詣吏稱父讎既報請就刑戮廵察大使黄門侍郎禇遂良以聞太宗嘉其孝烈特令免罪又曰鄒待徴妻薄氏待徴大歴中為常州山隂縣尉其妻為海賊所掠薄氏守節出待徴官告於懐中託付村人使謂待徴曰義不受辱乃投江而死賊退潮落待徴於江岸得妻屍焉江左文士多著節婦文以紀之又曰奉天縣竇朝二女伯娘仲娘雖長於村野而㓜有志操住與邠州接界永泰中草冦數千人持兵刃入其村落行剽刼聞二女有容色姊年十九妹年十六藏於􅑐窟間賊徒擬為逼辱乃先曳伯娘出行數十步又曳仲娘出賊相顧自慰行臨深谷伯娘曰我豈受賊汚辱乃投之於谷賊方驚駭仲娘又投於谷谷深數百丈姊尋卒仲娘脚折面破流血被體氣絶良乆而蘇賊義而去又曰崔元暐博陵安平人也父行謹為姑蘇令本名韋以字下體有則天祖諱乃改為元晦少有學行深為叔父秘書監行功所器重龍朔中舉明經累補庫部員外郎其母詹氏嘗誡之曰吾見姊兄屯田郎中辛元馭六兒子從官者有人來言貧乏能自立此是好消息若聞貲貨充足衣馬輕肥此是惡消息吾常重此言以為確論比見親表中仕宦者多将錢物上其父母但知喜悦竟不問此從何而來是必禄俸餘資誠為善事如其非理所得與盜賊何别縱無大咎獨不内愧於心陶母不受魚鮓之饋蓋為此也汝今坐食禄榮幸已多若其不能忠清何以戴天履地孔子云雖日用三牲之養猶為不孝又曰父母唯其疾之憂汝宜修身潔已勿累吾此意也元瑋尊奉父母教誡以清謹見稱又曰胡琮尚廣徳公主琮為㓂所害而赦公主主視琮受禍謂賊曰妾李氏女也義不獨存願與子琮拜命賊不許主入室自經而死又曰幽州兵亂殺判官韋雍妻蕭氏聞難號呼執夫袂左右格去以死不從及雍臨刄蕭氏泣而告之曰妾不幸年少義不苟活一日之事願先就死執刄者㫁其臂蕭氣不撓雖兇悍圜視無不傷歎其夕蕭亦卒趙畢吳越春秋曰子胥至無乞食至於栗陽栗陽有女子澣紗瀬水之上筐中有少飯子胥遇見長跪而請之曰夫人豈可乞一食乎女子曰妾獨與母居三十不嫁飯不可得也子胥曰夫人賑窮者少飯有何嫌乎女知非恒人言曰妾豈可逆人情乎即發其簟以清其壺漿長跪而與子胥子胥去顧見女子自沉孔演漢魏春秋曰龎濟外祖父酒泉趙君安為同縣李壽所殺濟舅兄弟三人同時病死壽家喜相賀濟母娥自傷讎不報乃推車䄂刄白日刺壽於都亭前訖徐詣縣顔色不變曰父讎已報請授戮禄福長尹嘉解印綬縱娥娥不肯去遂強載還㑹赦得免州郡莫不嗟嘆喜其烈義刊石以表其閭張勃吳録曰吳入郢也自王以下位班處宫而妻其室次及伯嬴伯嬴者昭王之母也伯嬴􅍾刄曰公侯一國之儀表也有失則其邦危亂夫婦之禮人倫之始王教之端若君王棄儀表則無以臨民妾犯非禮則無以自存貪生受辱固不如死王乃止和苞漢趙記曰今上殺晋散騎常侍梁緯召妻辛氏伏地大哭仰白今上曰妾聞女不再醮男以義烈聞妾夫已死理無獨生乞就辟有司地下以事舅姑且婦人再聘明公亦安用哉遂號哭不止上曰貞婦也任之自殺又曰魯陽侯王廣字廣之為西揚州刺史晋末聚衆避世為蠻楊芳扇動山夷圍廣城䧟蠻因廣将詣芳廣女有羙色芳引入甚有寵入經一旬王伺芳睡引刀斬芳芳驚起曰何故反也王罵曰蠻畜我欲誅反賊何等謂我反乎吾聞父仇不同天母仇不同地汝反逆無状害人父母而復無禮凌人吾所以不死者欲誅與耳今死自吾分不待汝殺我但恨不得梟汝首於通逵以塞大耻辭氣猛厲色無變容乃自殺時年十五劉義慶幽明録曰武昌陽新縣北山上望夫石状若人立者傳云昔有貞婦其夫從役逺赴國難婦携弱子餞送此山立望而死形化為石列女傳曰息夫人者息君之夫人伐息破之虜其君使守門将其夫人而納之於宫楚王出遊夫人遂出見息君謂之曰人生要一死而已何苦乃作詩曰榖則異室死則同穴謂予不信有如皎日息君止之夫人不聽遂自殺息君亦自殺又曰安定陳仲妻者同郡張叔明之妹名芝字季張年十四適仲朞年而寡執節不嫁叔明從軍芝與二嫂没賊恐見侵掠而相謂曰婦人以不汚身為髙不虧節為美豈可委身待辱哉於是自刺二嫂既死芝獨不死叔明言於将軍耿弇耿弇以駿馬負芝芝曰女死亡之餘汚将軍服乘不可也弇竒其言更以他馬負芝至營為致醫藥因乃得全郡表其閭九十壽終又曰譙國曹文叔妻者同郡夏侯文寜之女字令女文叔早死無子䘮畢㫁髪自誓不二後其家欲嫁之又截兩耳依文叔從兄爽爽後被誅文寜上書與曹絶婚復欲嫁之乃割鼻其母謂曰曹氏夷滅已盡守此欲為誰乎令女曰仁者不以盛衰改節義者不以存亡易心曹氏前盛尚欲保終况今衰滅何忍棄之太傅宣王聞而嘉嘆聽乞子為曹氏後又曰吳孫竒妻者廣陵范慎女名姬十八配竒一年而竒亡慎以姬少寡無子起還其家姬不肯歸迎者以父命廹之姬遂操刀割耳及鼻曰父迎我者不過以我年少色美今已殘矣行将焉之於是迎者空反又曰丹陽華穆妻者下邳劉方之女字桃樹生一男而早亡吳丁諝相與反知名之士家将嫁許焉桃樹聞之乃操刀割耳其子又亡桃樹安身守正動必以禮又曰吳沉伯陽妻者顧文宣之女字昭君早寡無嗣盡禮供飬其父隂許人姑聞知而哭昭君乃引刀剪髪割兩耳以明其志又曰吳許升妻吕氏之女名榮升遊誕博戯不治操行榮躬勤家業以飬其姑勸升學問未嘗不垂淚而言榮父疾升呼榮欲改嫁之榮曰命之所遭義無離貳終不肯歸後升感悔尋師逺學四年乃歸遂至名譽為州所辟遇刼害嵗餘姑亡夫族多欲聘之誓不肯嫁後黄巾賊欲犯之榮踰垣而走賊㧞劒追榮曰從我則生不從立死榮曰義不畏死而見虜辱也賊遂殺之又曰河南貞義者樂羊子之妻羊子出學七年不歸鄰人欲犯貞義而刼其姑貞義操刀而出鄰人曰從者可不從者殺汝姑貞義仰天而歎以刀刎頸而死太守以夫人葬之號曰貞義皇甫謐列女𫝊曰漢中趙嵩妻者同郡張氏之女也字禮修遭賊嵩死君難禮修以碧塗面亂髪稱病懐刀在身意氣烈决賊不廹也叔父矜其年少又世方䘮亂欲更嫁禮修慷慨以死為誓又曰丹陽羅静者廣徳羅勤之女為同縣朱曠所婚禮未成勤遇疫疾䘮没鄰比㫁絶曠觸冐經營尋復病亡静感其義遂誓不嫁與弟妹共居求者過十餘志無傾移有楊祚者多将人衆自往納幣静乃迯竄祚刼其弟妹静懼為祚所害乃出見之曰實感朱曠為妾父而死是以託身亡者自誓不貳辛苦之人願君哀而舍之如其不然請守之以死祚乃舍之静守純固年六十餘卒又曰蜀景竒妻者羅氏之女字貢羅竒亡無嗣貢羅專心供飬父清以許同郡宰貢羅乃與父母書陳其情志厯年不歸後清使詩白州告縣發遣貢羅乃由徑道詣州自訴言意慷慨請死不從州嘉而許焉貢羅恐詩於道路廹脅乃請吏兵自衛還家執義終身又曰犍為相登妻者周氏之女名度適登一年而寡牢令吳厚因人問度心執匪石引刀截髪縣長史復遣媒欲聘度曰前已㫁髪謂足表心何誤復有斯言哉取刀欲割鼻左右救止表其閭又曰廣漢馮季宰妻者季氏之女名珥字進娥早寡無嗣奉飬繼姑及宰兄顯守心純固以義自防珥母愍其孤苦隂有所許珥㫁髪自誓遂乞飬男女各一卒道有法鄉人稱之又曰廣漢王輔妻彭氏之女也名非輔遊學數年遂卒京師迎䘮葬訖事姑孝敬彌篤非叔公以許蘇孟非叩心泣血訴情九族猶不見聽乃剪髪詣府乞終供養遂乞養子静居年踰七十而卒又曰沛國劉長卿妻者周郡桓始春之女少有名於桓宗嫁於劉氏生一男自王王五嵗而長卿卒懼見誘嫁既不歸寜兄弟時往防漸逺疑言不及外王年十五死其弟㑹䘮㧞刀割耳明已不貳在䘮側者無不歎傷宗婦謂之曰家未有相嫁之計若其有也徐可因沛妺以喻意何貴處輕身之甚耶答曰昔我先人更學為儒宗尊為帝師厯世不替以忠孝顯以貞節著我深懼忝諸姑或以我年未衰又䘮子卒廹之間非所能陳豈可不豫見其意哉郡表其鄉人號曰景行義桓皇甫謐列女𫝊曰沛公孫去病妻者同郡戴元世之女既嫁乆而無子謂其夫曰妾不才得奉巾櫛歴年無嗣禮有七出請願受訣以其夫不嫁復進曰福莫大於昌熾禍莫大於絶嗣君不忍見遣請更廣室夫復不肯夫死服除父母欲嫁之女遂操刀自刎郡表其里又曰梁夏文生妻者洪都王景賔之女名娥生一女而寡娥誓不再嫁父以配同郡衡氏逼廹入門娥謂衡氏曰妾聞婦人不改嫁越義失節妾所不為君可見遣衡氏曰相取有媒禮何遣之有衡氏妻服未闋娥因數之曰君衰麻在身犯禮納室雖顔之厚奈相䑕何妾必死不為君妻相留不知辱乎奮衣而出衡氏不敢強留父復以許臨雎倪氏強扶上船娥陽不憂書與父別乃以刀割耳鼻曰所以不死者老姑在堂孤女尚㓜故耳執義終身太平御覧卷四百四十
