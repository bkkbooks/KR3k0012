body:
  text: 太平御覽巻八百三十七宋李昉等撰百穀部一穀周易曰日月麗乎天百穀草木麗乎土尚書曰稷降播種農殖嘉穀毛詩國風信南山曰既霑既足生我百穀毛詩甫田曰播厥百穀既庭且碩曾孫是若周禮天官曰太宰以九賦任萬民一曰三農生九穀鄭司農云九榖稷黍秫稻麻大小豆大小麥凡上之膳食用六穀鄭司農云稻稷黍粱麦菰米彫胡也藥養其病又夏官曰職方氏掌天下之圖辨其邦國都鄙九穀之數揚州荆州其穀宜稻豫州并州其榖宜五種鄭𤣥云黍稷稻麥麻青州其穀宜稻麥兖州其穀宜四種黍稷稲麥雍州冀州其穀宜黍稷幽州其穀宜三種稷黍稻禮記月令曰孟春天子乃以元日祈穀於上帝孟夏驅獸無害五穀獸麋鹿之屬食穀苖驅之令勿害也孟秋農乃登穀天子嘗新先薦寢廟又王制曰五穀不熟不鬻於市又樂記曰夫古者天地順而四時當民有徳而五穀昌疾疹不作而無妖祥徳盛而教尊五穀時熟然後賞之以樂大戴禮曰黄帝播百穀草木節用水火財物生而民得其利百年民畏其神百年亡而民用其教百年故曰三百年又曰食氣者神明而夀食穀者智恵而考不食者不死左傳襄公曰泰伯之弟鍼謂趙文子曰鍼聞之國無道年穀和熟天賛之也鮮不五稔禮斗威儀曰君乗木而王則草木豐茂嘉穀並生也左傳晉范宣子為政賦黍苖季武子興再拜稽首曰小國之於大國也如百穀之仰膏雨焉穀梁傳襄公二十四年曰京師大饑五穀不升為大饑升成也一穀不升謂之嗛嗛不足也二穀不升謂之飢三穀不升謂之饉四穀不升謂之康康虛也五穀不升謂之大侵春秋繁露曰金干土則五穀傷土干金則五穀不成春秋左助期曰咸池主五穀爾雅曰中有岱嶽與其五穀魚鹽生焉榖不熟為飢仍飢為荐郭璞注曰言泰山有魚鹽之饒也不熟五糓不成荐連歳不熟也周書曰凡禾麥居東方黍居南方稻居中央粟居西方史記曰黄帝考定星厯立五行民神易業敬而不黷故神降之嘉生嘉糓也又曰齊桓公欲封禪管仲曰今鳯凰不来嘉榖不生而蓬蒿蔾莠茂鴟梟數至又曰留侯性多病即𨗳引不食穀服碎穀藥而靜居行氣漢書晁錯曰粟米布帛生於地長於時聚於力非可一日成也數石之重中人弗勝不為奸邪所利一日弗得而饑寒至是故明君貴五穀而賤金玉今海内為一土地人民之衆不減湯禹加以亡天災數年之水旱而蓄積未及者何也地有餘利民有餘力生榖之土未盡墾山澤之利未盡出也游食之人未盡歸農也又曰宣帝即位歳數豐穣榖至石五錢東觀漢記曰永平十五年上始欲征匈奴與竇固等議出兵調度皆以為塞外草美可不須穀馬案軍出塞無榖馬故事馬防言當與榖上曰何以言之對曰宣宗時五將出征案其奏言匈奴候騎得漢矢見其中有粟知漢兵出以故引去以是言之馬當與穀上善其用意微緻即下調馬穀防遂見親也又曰建武初榖食尚少趙孝得榖炊將熟令弟禮夫妻出比還孝共蔬食茹菜禮夫妻来輙獨遺之積久禮心疑怪後伺掩見亦不復肯出兄弟怡怡鄉里歸徳華嶠後漢書曰馬援在河西有榖數萬斛乃嘆曰凡殖財者貴以施也否則守錢虜耳袁宏漢記曰赤眉亂後闗中大飢黄金一斤易五升榖後漢書曰董卓築塢於郿髙原七丈號曰萬歳塢今案塢舊基髙一丈周廻一百里一百歩也積穀為三十儲自云事成雄據天下不成守此足以畢老又曰王莾末天下大飢建武二年天下野榖旅生麻菽尤盛魏志曰自遭荒亂率乏糧榖曹公曰夫定國之術在於强兵足食秦人以急農兼天下孝武以屯田定西域此先世之良式也是歳乃募民屯田許下得榖百萬斛於是郡縣置田官所以積榖又曰袁曜卿為魏國郎中令及卒太祖為之流涕賜榖二千斛一教以太倉榖千斛賜郎中令家一教以垣下榖千斛與曜卿家外不解其意教曰以太倉榖者官法也以垣下榖者親舊也又曰袁譚以王循為别駕太祖破鄴籍沒審配等家財物貲以萬數破南皮閲循家榖不滿十斛又曰髙堂隆諫曰禄賜糓帛人主之所以恵養吏民而為之司命若令有廢是奪其命又曰甄皇后三歳失父後天下兵亂飢饉百姓皆賣金銀珠玉寳物時后家大有儲榖頗以買之后年十餘歳白母曰今世亂而多買寳物匹夫無罪懐璧為罪又左右皆飢乏不如以榖振給親族隣里廣為恩恵舉家稱善曹暪傳曰太祖嘗賦廩糓不足私謂主者如何主者曰可用小斛以足之後軍中言太祖欺衆太祖謂主者曰借汝一死厭衆乃狥曰小斛盗官糓即斬之江表傳曰諸葛亮聞恪代徐祥與陸遜書曰家兄年老而恪性踈今使典主糧榖糧榖軍之要最僕雖在逺竊用不安足下時為啓至尊轉之王隠晉書曰鄧攸為呉郡太守吳人飢荒攸輙出䑓倉榖賑之後被劾攸曰善不可為也三國典略曰後梁有何山者其射之妙人莫能及有鳥巢于庭樹蕭詧惡之謂山曰射中賜一車榖其鳥雛竝於枝上山曰脫一箭中兩請賜兩車臣無車牛願官為送詧許之於是山射中其二項詧甚欣恱即令載榖送之後魏書曰韋珎遷顯武將軍郢州刺史在州有聲績朝廷嘉之遷龍驤將軍賜驊騮二匹帛五十五疋榖三百斛珎乃召集州内孤貧者謂之曰天子以我能撫綏鄉故賜以榖帛吾何敢獨當遂以所賜悉分與之北史曰盧義僖寛厚畏慎不妄交游性情儉素不營財利少時幽州頻遭水旱先有數萬石糓貸人義僖以年榖不熟乃燔其契州閭悦其恩徳雖居顯位每至困乏麥飯蔬食欣然甘之唐書曰長壽二年元日大雪其夜質明而晴上謂侍臣曰俗云元日有雪則百榖豐未知此語有何故實文昌右丞姚壽對曰汜勝書云雪是五糓之精以其汁和種則年榖大穰又宋孝武帝大明五年元日降雪以為嘉瑞上曰朕臨御萬方心存百姓如得年登豐稔此即可為大瑞雖獲麟鳯亦何用焉墨子曰一糓不收謂之饉二榖不收謂之旱三榖不收謂之㓙四榖不收謂之餽五榖不收謂之饑饉則大夫以下損禄五分之一旱則三餽則四飢則盡禄廩食而已孔叢子曰魏王問子慎曰寡人聞昔上天神異后稷而為之下嘉糓周以遂興往中山之地無故有榖非人所為云天雨之反以亡國何答曰天雖至神自古及今未聞其下榖與人也詩美后稷能大教民善種榖以利天下所謂稷降播種農殖嘉榖其義一也若中山之榖妖怪之事非所謂天祥也管子曰常山之東河汝之間早生而晩殺五榖之所蕃熟也陳子要言曰食榖而鄙田衣帛而笑蠶是惑也范子計然曰五榖者萬民之命國之重寳也是故無道之君及無道之臣皆不能積其盛有餘之時以待其衰不足星經曰八榖八星在五車北主黍稷稻粱麻菽麥烏麻星明俱熟師曠曰杏多實不蟲者来年秋善五榖之先欲知五榖但視五木擇其木盛者来年益種之京房五星占者五榖俱傷何君無徳也京房易逆刻曰天雨榖歳大熟淮南子曰木勝土土勝水水勝火火勝金金勝木故禾春生秋死禾木也木旺而生金旺而死也菽夏生冬死菽火也火旺而生水旺而死也麥秋生夏死麥金也金旺而生火旺而死也薺冬生仲夏死薺水也水旺而生土旺而死也又曰稷墾草發菑糞土樹榖使五榖之五種各得其宜因地之勢也又曰女夷皷歌女夷天帝之女下司時令春𤾉喜樂皷歌也以司天和以長百榖禽獸草木孟夏之月以享榖禾雄鳩長鳴為帝候歳雄鳩養長榖之鳥金樓子曰鬻棺者欲民之死蓄榖者欲歳之飢船漏水入嚢洞内虛也説苑曰楚魏會於晉陽将以伐齊王患之使人召淳于髠曰楚魏謀欲伐齊請先生與寡人謀之淳于髠大笑而不應三問而不應王怫然作色曰先生以寡人國為􅃧乎淳于髠對曰臣不敢以王國為􅃧也臣笑隣之祠田也以箧飲與一鮒魚其祝曰下田洿涂得榖百車蟹堁者宜禾臣笑其所以祠者少而求者多王曰善賜之千金革車百乗立為上卿山海經曰都廣之野百榖自生冬夏播琴郭璞注曰其城方三百里蓋天地之中素女所出也播琴猶播殖方俗言也楊雄方言曰凡以火乾五榖之類出自山東齊楚以往曰熬隴冀以往曰􅀢平力反秦晋之間曰焣楊泉物理論曰榖氣勝元氣其人肥而不夀養性之術常使榖氣少則病不生矣粱者黍稷之總名也稻者溉種之總名菽者衆豆之總名三榖各二十種為六十蔬果之實助榖各二十種為百榖故詩曰播厥百榖榖者衆種之大名也説文曰稑音六疾熟也榖續也百榖摠名也賈誼書曰至于神農嘗百草之實察鹹苦之味教民食榖汜勝書曰雪者五榖之精又曰小豆忌夘稻麻忌辰禾忌丑秫忌未小麥忌戌大麥忌子桓譚新論曰世俗咸言漢文帝澤加黎庶榖至石數錢論衡曰謂天雨榖従天而下應變而生非也夫雲出於山散而為雨人見従天墜謂天雨水也夏日則雨冬寒則凝為雪發於丘山不従天降明矣糓従地起與疾風俱飄集於地人謂之天雨也建武三十一年陳留雨榖蔽地視榖形如米而黑此夷狄地所生榖也夷狄不食榖生於草野成熟委於地遭疾風飛榖集中國中國見之謂天雨穀世要論曰學不勤則不知道耕不力則不得榖又曰服一綵則念女工勞御一榖則恤農夫勤兵書曰軍中地生五榖將軍得天道大吉夢書曰五榖為財飲食物夢見榖得財吉五榖入家家當盛殷氏世傳曰殷謖字伯起遭世䘮亂埋糓數百石後謖為賊所執見掠責具以榖吿之賊猶嫌其未實欲刃焉謖乃詈曰卿行刼害當知人心豈有出財還自殺耶賊知其誠遂免羊祜别傳曰祜周行賊境七百餘里往反四十餘日刈賊榖以為軍糧皆計頃畆送絹還直使如榖價風俗通曰建武之初旅糓彌望野繭被山盛𢎞之荆州記曰桂陽郡北接来陽縣有温泉其下流百里恒資以灌溉常十二月一日種明年三月新榖便登重種一年三熟愽物志曰馬食榖則足重不能行又曰扶海洲上有草焉名曰蒒其實食之如大麥従七月稔熟民歛穫至冬乃訖名曰自然榖或曰禹餘糧又曰孝元竟寧元年南陽山陽郡雨穀小者如黍粟而青黑味苦大者如米豆而赤黄味如麥下三日生根葉壯如大豆初生時幽明録曰琅琊諸葛氏兄弟二人寓居晋陵家甚貧耗常假乞自給榖在囷中計日用未應盡而早以空罄始者謂是家中相竊盗復封檢題識而耗如初後有宿客逺来際夕至巷口見數人擔穀従門出客借問諸葛在否答云悉在客進内言語之後因問卿何得大糶榖主人云吿乞少榖欲充口云何復得糶之客云我向来見數人擔榖従門出若不糶者為何事主人兄弟相視竊自疑怪試入㸔封題儼然如故試開囷量視即無十餘斛知前後所失非人為之異苑曰涼州張駿時天雨五榖殖之悉生因名為天麥張衡東京賦曰所貴惟賢所寳惟榖曹植謝賜穀表曰詔書念臣經用不足以船河邸閣榖五千斛賜臣謝𤣥書曰糧穀十斛是鈞也上之所種太平御覽巻八百三十七
