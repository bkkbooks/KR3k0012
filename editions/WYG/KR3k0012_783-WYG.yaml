body:
  text: 太平御覽卷七百八十三宋李昉等撰四夷部四東夷四髙句驪范煜後漢書曰髙句驪國節於飲食而好治宫室其俗淫皆潔凈自喜夜輒男女羣聚為倡樂魏畧曰髙句驪國在遼東之東千里其王都於丸都之下方二千里户三萬多山林無源澤其國貧儉土着為宫室宗廟祠靈星社稷其俗吉凶喜冦抄其國置官有相加對盧沛者古雛加尊卑各有等級本涓奴部為王稍微弱今桂婁部代之大家不田作下户給賦稅如奴俗好歌舞其人自喜跪拜申一脚與夫餘異行步皆走十月㑹祭天名曰東盟有軍事亦祭天殺牛觀蹄以占吉凶大加着幘如幘而無後其小加着折風形如弁無牢獄有罪即㑹加評議便殺之没入妻子為奴婢盗一責十二婚姻之法女家作小屋於大屋後名為婿屋婿暮至女家户外自名跪拜乞得就女宿女家聽之至生子乃將婦歸其俗淫汚相奔誘其死葬有槨無棺停喪百日好厚葬積石為封列種松栢兄死亦殺嫂俗有氣力便弓矢刀矛有鎧習戰人有小貊俗出好弓其馬小便登山夫餘不能臣也沃沮濊皆屬之其國都依大水而居王莽時發句驪以伐胡不欲行亡出塞為冦害莽更名為下句驪後魏書曰髙句驪者出於夫餘自言先祖朱蒙母河伯女夫餘王閉於室中為日所照引身避之日影又逐既而有孕生一卵大如五升夫餘王棄之與豕豕不食棄之於路牛馬避之又棄之野衆鳥翼之夫餘王剖之不能破遂還其母其母以物裹之置於煖處有一男破殻而出及其長也字之曰朱䝉其俗言朱䝉者善射也夫餘國人以朱䝉非人所生將有異志請除之王不聽命之養馬朱䝉每私試知其善惡駿者減食令瘦駑者善養令肥夫餘王以肥者自乘瘦者給朱蒙後狩于田以朱蒙善射則給之一矢朱䝉雖一矢殪獸甚多夫餘之臣又謀殺之朱蒙母隂知以告朱蒙與烏引烏違二人棄夫餘東南走中道遇一大水欲濟無梁夫餘人追之甚急朱蒙告水曰我是日子河伯外孫今日逃走追兵垂及如何得濟於是魚鱉並浮為之成橋朱蒙得度魚鱉乃解追騎不得渡朱蒙至普述水遇見三人其一人著麻衣一人着衲衣一人着水藻衣與朱蒙至紇升骨城遂居焉號曰髙句驪因以髙為氏焉北史曰朱蒙夫餘時其妻懷孕朱蒙逃後生子始閭諧及長知朱蒙為國王即與母亡歸之名曰閭達委之國事朱蒙死至孫莫來立乃并夫餘漢武帝元封四年滅朝鮮置𤣥莬郡以髙驪為縣以屬之漢時賜之衣幘朝服鼓吹常從𤣥莵郡受之後稍驕不復詣郡但於東界築小城受之遂名此城為幘溝漊溝漊者句麗城名也又曰公孫度之雄海東也髙句驪伯固與之通好伯固死伊夷模立伊夷模數冦遼東建安公孫康出軍擊之大破其國焚燒邑落伊夷模更作新國于丸都山下又曰髙句驪伊夷模死其子位宫立始位宫曾祖宫生而目開能視國人惡之及長凶虐國以破殘及位宫生亦能視人髙麗呼相似為位以為似其曾祖宫故名位宫亦有勇力便鞍馬善射獵魏正始中位宫冦西安安平五年幽州刺史母丘儉將萬人出𤣥莵討位宫大戰於沸流敗走儉追至頳峴懸車東馬登丸都山屠其所都位宫單將妻子逺􅇡六年儉復討之位宫輕將諸加奔伏沃沮儉使將軍王頎追之絶沃沮千餘里到肅慎南界刻石紀功又刋丸都山銘不耐城而還又曰後魏太武帝時髙麗王釗曽孫璉始遣使者詣安東奉表貢方物并請國諱太武嘉其誠欵詔下帝系名諱於其國使員外散騎侍郎李敖拜璉為提督遼海諸軍事髙句驪王敖至其所居平壤城訪其方事云去遼東一千餘里至栅城南至小海北至舊夫餘人户三倍於前後魏時貢使相尋歲致黄金二百斤白銀四百斤又曰後魏文明太后以獻文六宫未備勅璉令薦其女璉奉表云女非己出求以弟女應㫖朝廷許焉㑹獻文崩乃止又曰後魏太和十五年璉死其孫雲復朝賜衣冠服物車旗之飾自此歲常貢獻至大統十年其王成遣使至西魏朝貢及齊受東魏之禪又朝于齊文宣加成使持節侍中驃騎大將軍髙麗王如故又曰北齊天保三年文宣至營州使博陵崔栁使于髙麗求魏末流人勑栁曰若不從者以便宜行事及至不見許栁張目叱之拳擊成墜於牀下成左右雀息不敢動乃謝服栁以五千户反命又曰髙句麗東至新羅西度遼二千里南接百濟北鄰靺鞨一千餘里人皆土著隨山谷而居衣布帛及皮土田薄􅇤蠶農不足以自供故其人節飲食其王好修宫室都平壤城亦曰長安城其城隨山屈曲南臨浿水城内唯積倉儲器備冦至方入固守王别為宅於其側不常居之其外復有國内城及漢城亦别都也其國中呼為三京遼東𤣥莵等數十城皆置官司以相統攝焉其置官有大對盧已下凡十二等分掌内外事復有内評五部褥薩人皆頭着折風形如弁士人加挿二鳥羽貴者其冠曰蘇骨多用紫羅為之飾以金銀服大袖衫大口袴素皮帶黄革履婦人裙襦加襈書有五經三史三國志晉陽秋兵器與中國畧同及春秋校獵王親臨之稅布五疋穀五石逰人則三年一稅十人共細布一疋其刑法峻罕有犯者樂有五絃琴箏篳篥横吹簫鼔之屬吹蘆以和曲每年初聚戲浿水上王乗􅆎轝列羽儀觀之事畢王以衣入水分為左右二部以水石相濺擲喧呼馳逐再三而止性多詭伏言辭鄙穢不簡親疎父子同浴共室寢好歌舞常以十月祭天其公㑹衣服皆以錦繡金銀為飾好蹲踞食用爼豆出三尺馬云本朱蒙所乘馬種即果下也風俗尚淫不以為愧俗多逰女夫無常人夜則男女羣聚而戲無有貴賤之節有婚姻嫁娶男女相悅即為之男家送猪酒而已無財聘之禮或有受財者人共恥之以為賣婢死者殯在屋内三年擇吉日而葬居父母及夫喪皆三年兄弟三月初終哭泣葬則鼔舞作樂以送之埋訖取死者生時翫好車馬置墓側㑹葬者爭取而去又曰隋開皇中髙麗王元率靺鞈萬餘騎冦遼東西營州總管􅅊世冲擊走之帝大怒命漢王諒為元帥總水陸討之下詔黜其爵位元亦惶懼遣使謝罪上表稱遼東糞土臣元云云上於是罷兵待之如初元亦歲遣朝貢焬帝嗣位天下全盛髙昌王突厥啟人可汗並親詣闕貢獻於是徵元入朝元懼藩禮頗闕大業七年帝將討元罪車駕度遼水止營於遼東又勑諸將髙麗若降即宣撫納不得縱兵入城城將陷賊輒言降諸將奉㫖不敢赴機每先馳奏比報賊守禦亦備復出拒戰如此者三帝不悟由是食盡師老轉輸不繼諸軍多敗績於是班師又曰隋大業九年焬帝復親征髙麗勅諸軍以便宜從事諸將分道攻城賊勢日蹙㑹楊𤣥感作亂帝大懼即日六軍並還十年發天下兵㑹賊盜蜂起所在阻絶軍多失期至遼水髙麗亦困弊遣使乞降帝許之頓懷逺鎮受其降仍以俘囚軍實歸至京師南史記曰髙麗本有五族有消奴部慎奴部灌奴部桂婁部本消奴部為王微弱桂婁部代之其置官有對盧則不置沛者有沛者則不置對盧焉晉安帝義熙九年髙翼奉表獻赭白馬宋元嘉十五年馮𢎞為魏所攻敗奔髙麗北豐城表求迎接文帝遣使王白駒趙次興迎之並令髙麗資遣璉不欲𢎞南乃遣將孫潄髙仇等襲殺之白駒等率所領七千餘人生擒潄殺仇等二人十六年文帝欲侵魏詔璉獻馬八百疋大明二年又有肅慎氏獻楛矢石砮厯齊梁並受爵位遣使奉表獻方物不絶唐書曰髙麗者出自扶餘之别種其國都於平壤城即漢樂浪郡之故地在京師東五千一百里其官大者號大對盧比一品總知國事三年一代若稱職者不拘年限交替之日或不相祇服皆勒兵相攻勝者為之其王但閉宫自守不能制禦次曰太大兄比正二品對盧已下官總十二級外置州縣六十餘城大城置褥薩一人比都督諸城置道使比刺史其下各有僚佐分掌曹事衣裳服食唯王五綵以白羅為冠白皮小帶其冠及帶咸以金飾官之貴者則青羅為冠次以緋羅挿二鳥羽及金銀為飾衫筒袖袴大口白􅅊帶黄韋履國人衣褐戴弁婦人首加巾幗好圍碁投壺之戲人能蹵鞠食用籩豆簠簋罇爼罍洗頗有箕子之遺風其所居必依山谷皆以茅草葺舍唯佛寺神廟及王宫官府乃用瓦其俗貧窶者多冬月皆作長坑下燃煴火以取煖耕田養蠶同中國城東有大穴名神隧皆以十月王自祭之俗愛書籍至於衡門厮養之家各有街衢造大屋謂之扄堂子弟未婚之前晝夜於此讀書習射又曰武德二年髙麗王建武遣使來朝四年又遣使來朝貢髙祖感隋末戰士多陷其地五年賜建武書云在此所有髙麗人等已令追括尋即遣送彼處有此國人者王可放還務盡綏育之方共𢎞仁恕之道於是建武悉捜括華人以禮賔送前後至者萬數髙祖大喜七年遣使徃冊建武為上柱國遼東郡王髙麗王仍將天尊像及道士徃彼為之講老子其王及道俗等觀聽者數千人貞觀二年破突厥頡利可汗建武遣使奉賀並上封域圖五年詔遣廣州都督司馬長孫師往收瘞隋時戰亡骸骨毁髙麗所立京觀又曰貞觀十六年髙麗西部大人葢蘇文有罪其王建武議欲誅之蘇文乃召部兵於南城云將校閱諸大臣皆來臨視蘇文勒馬盡殺之因馳入王宫殺建武立其弟大陽子藏為王自立為莫離支猶中國兵部尚書兼中書令之職也自是專國政蘇文姓泉氏鬚面甚偉形體魁傑身佩五刀左右莫敢仰視令其屬官俯伏於地踐之上馬下亦如之出必先布隊仗導者長呼以辟行人百姓畏避皆自投坑谷太宗聞之遂出師弔伐十九年命刑部尚書張亮為平壤道行軍大總管領將常何等率江淮嶺硤勁卒四萬戰船五百艘自萊州汎海趨平壤又以英國公李勣為遼東道行軍大總管江夏王道宗為副率步騎六萬趨遼東兩軍合勢太宗親御六軍以㑹之夏四月李勣軍度遼進攻盖牟城拔之以其城置州五月渡遼水詔徹橋以堅士卒志帝既至遼東城下見士卒負擔以填塹者帝分其尤重者於馬上載之從官悚動爭賫以送城下髙麗聞我有抛車飛三百斤石於一里之外者甚懼之乃于城上積木為戰樓以拒飛石勣列車發石擊其城城所遇盡潰又推撞車撞其樓閣無不傾倒拔其城為遼州初帝自定州命每數十里置一烽屬于遼城與太子約剋遼東當舉烽是日帝命舉烽師次日崖城右衞大將軍李思摩中弩矢帝親吮其血將士聞之莫不感勵城主孫伐音遂乞降以其城置嚴州授伐音為刺史我軍之渡遼也莫離支遣加尸城七百人戍盖牟城李勣盡虜之其人並請隨軍自効太宗謂曰詎不欲爾之力爾家悉在加尸爾為吾戰彼將為戮矣破一家之妻子取一人之力用吾不忍也悉令放還車駕進次安市城髙麗北部耨薩髙延夀南部髙惠貞率髙麗靺鞨之衆十五萬來救引軍直進太宗夜召諸將躬自指麾因令所司張受降幕於朝堂之側曰明日午時納降虜於此矣遂率軍而進至時果敗二師之衆太宗因按轡觀賊營謂侍臣曰髙麗傾國而來存亡所繫一麾而敗天祐我也因下馬再拜以謝天名所幸山為駐蹕山令中書侍郎許敬宗為文勒石以紀其功八月移營安市城東勣等攻拔之乃詔班師初攻陷遼東城其中應没為奴婢者一萬四千人並遣先集幽州將分賞將士太宗愍其父母妻子一朝分散令有司准其直以布帛贖之赦為百姓其衆歡呌之聲三日不息又曰貞觀二十年髙麗遣使謝罪并獻二美女太宗謂其使曰歸謂爾主美色者人之所重爾之所獻信為美麗憫其離父母兄弟於本國留其身而亡其親愛其色而傷其心我不取也還之又曰乾封元年髙麗遣其子入朝陪位於太山之上其年蓋蘇文死其子男生代為莫離支與弟男建男産不睦為其所逐走據國内城使其子獻誠詣闕求救十一月命英國公李勣率郭侍封等以征之二年二月勣至新城謂諸將曰新城是髙麗西境鎮城最為要害若不先圖餘未易可下遂引兵於城西南據山築柵且攻且守城中窘急數有降者自此所向克㨗髙藏及男産將首領九十八人持帛幡出降請使入朝勣以禮延接男建猶閉門固守十一月拔平壤城虜髙藏男建等至京師獻俘于含元宫乃分其地置都督府九州四十獻縣一百又置安東都䕶府以統之推其酋渠有功者授都督刺史及縣令與華人參理仍遣左武衞將軍薛仁貴總兵鎮之自是髙氏君長遂絶太平御覽卷七百八十三
