  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_344-1a, image: WYG0896/WYG0896-0087a.png}
body:
  text: 太平御覽卷三百四十四宋李昉等撰兵部七十五劒下吕氏春秋曰伍員如吳過於荆至江上欲渉見一丈人刺小船方將漁從而請焉丈人刺度之已絶江問其名族則不肯告解其劒以與丈人曰千金劒也願獻之丈人丈人不受曰荆國之法得伍員者爵執圭禄萬石金千鎰昔者子胥過吳尚猶不取今我何用子之千金劒為乎伍員遇於吳使人求之江上則不能得毎食必祭之祝曰江上之丈人天地至大矣將奚不有名不可得而聞身不可得而見又曰相劒者曰白所以為堅也黄所以為靱也黄白雜則堅且靱良劒也難者曰白所以不為靱也黄所以不為堅也黄白雜則不堅且不靱又柔則錈堅則折劒折且錈焉得為利劒劒之精未革而或以為良或以為惡説使之也故有以聰明聼説則妄説者止無以聰明聼説則堯桀無别矣此忠臣之所患賢者之所廢也又曰荆有次非者一得攸得寳劒扵干遂干遂邑名還反渉江至於中流有兩蛟夾繞其船次非謂舟人曰汝常見兩蛟夾舟而舟中之人有全活者乎舟人曰未之見也次非曰若如是吾固江中腐肉朽骨耳棄劒而已余何愛焉遂攘臂祛衣拔劒赴江刺蛟殺之而復上舟中之人皆獲全荆王聞之仕以執圭周禮侯執信圭楚以次非為勇武侯孔子聞之曰腐肉朽骨猶能除害見幾哉又曰劒不徒斷車不自行或使之也又曰楚王有渉江者其劒自舟中墜於水遽刻其舟曰是吾劒之所從墜也舟止從其所刻者入水求之舟已行矣而劒不行求劒若此不亦惑乎龍魚河圗曰流洲在西海中地方三千里上多山川積石名為昆吾石冶其石為鐵作劒光明照洞如水精以割玉如土又曰劒名飛揚山海經曰鮫魚皮有珠文而堅可以飾刀劒口又曰汲郡冢中得銅劒一枚長三尺五寸今所名干將劒明古者通以錫銅為兵噐又曰有君子之國其人衣冠帶劒廣雅曰斷蛇魚腸純鉤燕支蔡愉屬鏤千勝堂谿墨陽並劒名也周遷輿服雜事曰劒所從來乆矣其後准朝服帶劒晋朝魏代以來貴者玉飾首賤者以蚌金銀玳瑁為雕飾張敞晋東宫舊事曰太子儀飾有玉頭劒古今注曰吳大帝有寳劒六一曰白虹二曰紫電三曰辟邪四曰流星五曰青冥六曰百里十洲記曰流洲在西海中上有山川積石為昆吾冶其石成鐵作劒光明照如水精狀割玉如泥漢武内傳曰王母帶分景之劒上元夫人帶流黄擇精之劒神仙傳曰真人去世多以劒代形五百年後劒亦能靈化其驗矣西京雜記曰漢髙祖斬蛇劒以七彩珠九華玉為飾五色瑠璃為匣刃上常如霜雪光景照外開囊拔鞘輙有風氣射人拾遺記曰顓頊髙陽氏有畫影劒騰空劒若四方有兵此劒則飛赴指其方則尅未用時在匣中常如龍虎吟又曰越王句踐使工人以白牛白馬祀昆吾山神以成八劒一名掩日以之指日則日光晝暗金者隂也隂盛則陽减二曰斷水畫水開即不合三曰轉魄指月蟾兎為之倒轉四曰懸剪飛鳥逰遇觸其刃如斬截焉五曰驚鯢以之沈海鯨鯢為之深入六曰滅魂仗之以夜行不遇魑魅七曰却邪有妖魅見之則止八曰真剛以之切玉斷金如刻削土木矣以應八方之氣也雷次宗豫章記曰吳未亡恒有紫氣見於牛斗之間占者以為吳方興唯張華以為不然及平紫氣愈明張華聞雷孔章妙達緯象乃要宿屏人問天文將來吉凶孔章曰無他象唯牛斗之間有異氣是寳物之精上徹於天耳此氣自正始嘉平至今日衆咸謂孫氏之祥唯吾識其不然今聞子言乃𤣥與吾同今在何郡曰在豫章豐城張遂以孔章為豐城令至縣移獄掘深二丈得玉匣長八九尺開之得二劒一龍淵二即太阿其夕牛斗氣不復見孔章乃留其一匣龍淵而進之劒至張公於密室發之其光照室煥若電發後張遇害此劒飛入襄城水中孔章臨亡誡其子爽曰恒以劒自隨後其子為建安從事經淺瀨劒忽於腰中躍出初出猶是劒入水乃變為龍逐而視之見二龍相隨而逝焉孔章曾孫穆之猶有張公與其祖書反覆有根據豐城縣後有掘劒窟方廣七八尺搜神記曰東越閩中有嶺髙數十里下北隰中有大蛇長七八丈大十餘圍常病都尉及長吏下夢巫覡欲得童女常八月朝祭送蛇輙吞之已用九女李誕有小女名寄應募而行乃請好劒咋蛇犬作數斛崖蜜灌之以置穴口蛇出頭大如囤目如二尺鏡先啖崖蜜寄便放犬咋蛇以劒斫殺得九女髑髏越王乃聘寄為后又曰㑹稽賀瑀字彦琚得疾不知人唯心下温二日蘇云吏以將上天入曲房房中有層架其上層有印中層有劒使瑀唯意所取而短不及上層取劒而出門吏曰恨不得印可䇿百神劒唯得使社公耳異苑曰晋惠帝元康三年武庫火燒孔子舊履髙祖斬白蛇劒王莾頭等三物中書監張茂先懼難作列兵陳衛咸見此劒穿屋飛出莫知所向辛氏三秦記曰三月三日秦昭王置酒河曲有神人自泉而出捧水心劒曰令君制有西夏老子曰服文彩帶利劒又曰善攝生者兵無所容其刃莊子説劒篇曰昔趙文王喜劒劒士夾門而客三千餘人日夜相擊於前死傷者幾百餘人好之不厭如是三年國衰諸侯謀之太子悝患之左右曰莊子能説王之意止劒士太子奉千金莊子莊子弗受與使皆徃見太子曰聞太子欲用周者絶王之喜好也太子曰然吾王所見者唯劒士也莊子諾周善為劒太子曰吾王所好劒士也蓬頭突鬢垂冠縵胡之纓短後之衣瞋目而語難王見説之今夫子必儒服見王事必大逆莊子請治劒服三日太子乃見王王脱白刃待之莊子入殿門不趨見王不拜王曰子欲何以教寡人使太子先焉曰臣聞大王喜劒故以劒見王王曰子之劒何能禁制曰臣之劒十歩一人千里不留行王大悦曰天下無敵矣莊子曰夫為劒者示之以虛開之以利後之以發先之以至願得試之王曰夫子休就舍待命設戲請夫子王乃校劒士七日七夜死傷者六十餘人得五六人使捧劒於殿下乃召莊子王曰今日試使士敦劒莊子曰望之以乆矣王曰夫子御杖長短如何莊子曰臣之所奉皆可臣有三劒唯王所用請先言而後試王曰願聞三劒曰有天子之劒有諸侯之劒有庶人之劒王曰天子之劒何如曰天子之劒以無谿石城為鋒齊岱為鍔晋衛為春周宋為鐔韓魏為鋏苞以四夷裹以四時統以渤海帶以常山制以五行論以刑徳開以隂陽持以春夏行以秋冬此劒直之無前舉之無上按之無下運之無旁上决浮雲下絶地紀此劍一用匡諸侯天下服矣此天子之劒也文王茫然自失曰諸侯之劒何如曰諸侯之劒以智勇士為鋒以清亷士為鍔以賢良士為脊以忠聖士為鐔以豪傑士為鋏此劒直之亦無前舉之亦無上按之亦無下運之亦無旁上法圓天以順三光下法方地以順四時中和人意以安四鄉此劒一用如雷電之震也四封之内無不賔服而聼從君命者此諸侯之劒也王曰庶人之劒何如曰庶人之劒蓬頭突鬢垂冠縵胡之纓短後之衣瞋目而語難相擊於前上斬頸頷下次肝肺此無異鬭雞一旦命已絶矣無所用於國事今大王有天子之位而好庶人之劒臣竊為大王薄之王乃牽而上殿宰人上食王三環之莊子曰王安坐定氣劒事畢矣於是文王不出宫三月劒士皆伏斃其處矣又曰干越之劒匣而藏之不敢輕用寳之至也又曰大冶鑄金金踊躍曰我必為鏌鎁列子曰魏黒卯以匿嫌殺邱邴章匿嫌私恨也邴章之子來丹謀復父讎而丹氣甚猛其形甚露露羸恥假力於人誓以手劒而黒卯力抗百人非人類也其視來丹猶鶵鷇也來丹之友申抱曰子銜黒卯至矣黒卯之易子過矣將奚謀焉來丹垂涕曰願子為我謀申抱曰吾聞衛孔周其祖得殷之寳劒三僮子服之却三軍之衆奚不請為來丹適衛見孔周執僕禮請先納妻子後言所欲周曰吾有三劒唯子所擇而皆不能殺人且先言其狀一曰含光視之不可見運之不知其所觸泯然無際經物而不覺二曰承影將旦昧爽之交日夕昏明之際北面察之淡淡焉若有物存莫有其狀其觸物也竊然有聲經物而物不疾三曰宵練晝則見影而不見光方夜見影而不見形其觸物􅒂然而遂過也隨過隨合覺疾而不及血此三寳劒傳之十三世矣而無施於事不能害人柙而藏之未嘗啓封來丹請其下者孔周乃歸其妻子跪而授其下劒丹再拜受之執劒從黒卯醉偃卧牖下自頸至腰三斬黒卯不覺丹以黒卯死趣而退遇卯子於門又擊之三下如接虛卯子方笑丹知劒不能殺人也歎而歸卯醒怒妻子醉而覆我使我嗌疾而腰急其子曰丹之來遇於門三招我亦使我體疾而支强彼其厭我哉又曰宋有蘭子者以數干宋元君弄七劒迭躍之五劒常在空中元君大驚立賜金帛又曰周穆王征戎獻昆吾之劒赤刀切玉如泥管子曰昔葛天盧之山發而出金蚩尤受而制之以為劒鎧此劒之始也又曰羽劒珠飾者斬生之斧也墨子曰良劒期乎利不期乎莫耶孫卿子曰干將莫耶巨闕辟閭皆古之良劒也尉繚子曰吳越臨戰左右進劒吳子曰夫提鼓揮桴臨難决疑接兵用刃此將軍也一劒之任非將軍事也又曰一賊鋏劒擊於市萬人無不觸辟者臣以為非一人獨勇一市萬人皆不肖尸子曰水試斷鵠鴈陸試斷牛馬所以觀良劒也燕丹子曰荆軻左手把秦王袖右手椹音砧其胷秦王曰今日之事從子計耳乞聼琴聲而死召姬人鼓琴姬人乃歌曰羅縠單衣可裂而絶八尺屏風可超而越鹿盧之劒可負而拔王於是奮袖超屏風而走荆軻擲劒中銅柱焉淮南萬畢術曰拔劒倚戸兒不夜驚又曰夫淳劒魚腸之始下夫擊則不能㫁刺則不能入髙誘注曰魚膓繞屈譬若魚膓又曰劒工惑劒之似莫耶者唯歐冶能名其種歐冶良工也玉工炫玉之似碧盧者唯猗頓不失其情碧盧或作武夫猗頓魯人抱朴子曰歐冶不能鑄鉛錫為干將符朗子曰符朗棄千金之劒抱朴子趨曰何夫子棄大而存小乎符朗不應賈子曰古者天子二十而冠帶劒諸侯三十而冠帶劒大夫四十而冠帶劒𨽻人不得冠庶人不帶劒亢倉子曰蜚景之劒威集白日氣成紫蜺以之封獲則刀劂俱衛切刃也無擇蜚景神劒也劂鎌也神劒雖利以之穫稻猶同於鎌刃者也及夫凶邪流毒沸渭不靖加之運掌之上千里之内不留行矣凶邪流毒濕疫之氣也此神劒之能辟凶邪故威光所行千里之内未嘗留止者也宋玉大言賦曰長劒倚天外班固幽通賦注曰衛靈公太子蒯瞶為無道好帶長劒長一丈公鍊乃作短者長一尺公知不可以傳國乃逐之魏都賦曰劒則流彩之珎質素之寳乍虹蔚波映或龜文龍藻服之可以劒百蠻指麾可以開昏擾古詩曰腰中鹿盧劒可直千萬餘博物志曰劒後鹿盧名曰屬鏤又曰何意百鍊鋼化為繞指柔班固詩寳劒直千金又曰延陵輕寳劒曹子建詩曰拊劒西南望江文通詩曰倚劒臨八荒宋鮑昭詩曰雙劒將别離先在匣中鳴雌沈吳江裏雄飛入楚城吳江深無底楚闕有崇扄一為天地别豈直限幽明神物終不隔千祀儻還并梁吳鈞詠寳劒詩曰我有一寳劒出自昆吾溪照人如照水切玉如切泥鍔邊霜凛凛匣上風凄凄寄語張公子何當來見攜梁崔鴻詠劒詩曰寳劒出昆吾龜龍夾采珠五精初獻術千戸竟論都匣氣衝牛斗山形轉鹿盧欲知天下貴持此問風胡曹植七啓曰歩光之劒越劒名華藻繁縟飾以文犀彫以翡翠縁以驪龍之珠錯以荆山之玉陸斷犀象未足稱雋隨波截鴻水不漸刃張景陽七命曰楚之陽劒歐冶所營陽劒名也耶谿之鋌赤山之精銷踰羊頭羊頭骨銷之也鏷以鍜成乃鍊乃鑠萬辟千灌皆銷鍊名豐隆奮椎飛亷扇炭神氣化成陽文隂縵既亦流綺星連浮綵艶發光如散電質如曜雪霜鍔水凝氷刃露潔形冠豪曹名珍巨闕指鄭則三軍白首麾晋則千里流血豈徒水截蛟鴻陸灑奔駟斷浮槎以為三絶重甲而稱利又曰若其形震薛燭光駭風胡價兼三鄉聲貴兩都或馳名傾秦或夜飛去吳功冠萬載威曜無窮揮之者無前擁之者身雄可以從服九國横制八戎爪牙景附函夏承風此蓋希代之神兵也楚詞曰執堂溪以堂溪劒名拂蓬秉干將以割肉又曰撫長劒兮玉珥珥劒也又曰余㓜好此竒服年既老而不衰帶長鋏之陸離冠青雲之崔巍髙貎後漢孫瑞劒銘曰天生五才金徳惟剛從革作辛含景吐商辨物利用勲伐彌彰暨彼良工歐冶干將爰造寳劒巨闕墨陽精通皓靈獲茲休祥剖山竭川虹蜺消亡昭威耀武震動遐荒楚以定覇越以取强晋裴景聲文身劍銘曰噐以利顯實以名舉長劍耿介體文經武陸斷𤣥犀水截輕羽九功斯像七徳是輔晋張協太阿劒銘曰太阿之劒世載其美淬以清波歛以越砥如玉斯曜若景在水不運自肅率土從軌簡文帝謝勑賚方諸劒等啓曰纔發玉函雕竒溢目始開牙檢麗飾交陳已疋丹霞之暉乍比青雲之制身文且貴噐用惟宜寒暑兼華左右相照梁沈約為東宫謝勅賜孟甞君劒啓曰田文重氣殉名四豪莫及寳劒雄身故能威陵秦楚人髙事逺遺物足竒謹加玩服以深存古太平御覽卷三百四十四
