body:
  text: 太平御覽卷四百四十六宋李昉等撰人事部八十七品藻中晉書曰韋忠傳云裴頠爲僕射數言忠於司空張華華辟之辭病不赴人問其故忠曰吾茨簷賤士本无宦情且茂先華而不實裴頠慾而无厭棄典禮而附賊后此豈大丈夫之所宜行耶又曰王戎有人倫鑒識嘗目山濤如璞玉渾金人皆欽其寶莫知名其器王衍神姿髙徹如瑶林瓊樹自是風塵外物謂裴頠拙於用長荀朂工於用短陳道寧􅀈􅀈如束長竿又曰褚陶吳平召補尚書郎張華見之謂陸機曰君兄弟龍躍雲津顧彦先鳯鳴朝陽謂東南之寶已盡不意復見褚生機曰公但未覩不鳴不躍者耳華曰故知延門之徳不孤川岳之寶不匱矣又曰樂廣尚書令衛瓘朝之耆舊逮與魏正始中諸名士談論見廣而竒之曰自昔諸賢既殁常恐微言將絶而今乃復聞斯言於君矣命諸子造焉曰此人之水鏡見之瑩然若披雲而覩青天也又曰嵇紹始入或謂王戎曰昨於稠人中始見嵇紹昻昻然若野鶴之在雞羣戎曰君復未見其父耳又曰王戎㓜而頴悟神彩秀徹視日不昡裴楷見而目之曰戎眼爛爛如岩下電又曰張翰有清才善屬文而縱任不拘時人號爲江東歩兵又曰劉毅轉司𨽻校尉糾正豪右京師肅然司部守令望風投印綬者甚多時人以毅方之諸葛豐蓋寛饒又曰樂廣少與𢎞農楊凖相善凖之二子曰喬曰髦皆知名於世凖使先詣裴頠頠性𢎞方愛喬有髙韻謂凖曰喬當及卿髦少減也又使詣廣廣性清淳愛髦有神檢謂凖曰喬自及卿然髦亦清出凖歎曰我二兒之優劣乃裴樂之優劣也論者以為喬雖有高韻而神檢不足樂為得之也矣又曰劉頌守廷尉時尚書令史扈寅非罪下獄詔使考竟頌執據無罪扈寅遂得免時人以頌比張釋之又曰和嶠遷穎川太守為政清簡甚得百姓懽心太𫝊從事中郎庾敱見而嘆曰嶠森森如千丈松雖磥砢多節目施之大厦有棟梁之用又曰郄鑒𫝊云王敦甞謂曰樂彦輔短才而後生流宕言違名檢考之以實豈勝武秋耶鑒曰擬人必於其倫彦輔道韻平淡體識冲粹處傾危之朝不可得而親疎及愍懷太子之廢柔而有正武秋失節之士何可同日而言敦曰愍懷廢徙之際交有危機之急又何能以死守之乎以此相方其不減明矣鑒曰丈夫既潔身北面豈可偷生屈節靦顔天壤耶又曰孫登𫝊云嵇康從之遊三年問其所圗終不荅康每歎息將别謂曰先生竟无言乎登乃曰子識火乎火生而有光而不用其光果在於用光人生而有才不用其才而果在於用才用光在乎得薪所以保其曜用才在於識真所以全其年今子才多識寡難乎免於今之世去矣子无求乎康不能用果遭非命又曰王湛𫝊云武帝亦以湛為癡每見濟輙調之曰卿家癡叔死未濟常无以荅及是帝又問如初濟曰臣叔殊不癡因稱其美帝曰誰比濟曰山濤以下魏舒以上時人謂湛上方山濤不足下比魏舒有餘湛聞曰欲處我季孟之間乎又曰陸機天才秀逸辭藻𢎞麗張華常謂之曰人常恨才而子更患其多又曰陸雲刺史周浚召為從事謂人曰陸士龍當今顔子也又曰王衍雋秀有令望希心𤣥逺未甞語利王敦過江常稱之曰夷甫處衆中如珠玉在瓦石間顧愷之作畫贊亦稱衍岩岩清峙壁立千􅌇又曰杜乂性純和美姿容有盛名於江左王羲之見而目之曰膚若凝脂眼如㸃漆此神仙中人也桓彛亦曰衛玠神清杜乂形清又曰郭文傳云温嶠嘗稱曰文有賢人之性而無賢人之才柳下惠何琦之亞乎又曰羅含謝尚與含爲方外之好乃稱曰羅君章可謂湘中之琳琅又曰羅含桓温嘗與寮屬讌㑹含後至温問衆座曰此何如人或曰可謂荆楚之把梓桓曰此自是江左之秀豈唯荆楚而已又曰薛兼少與同郡紀瞻廣陵閔鴻吳郡頋榮㑹稽賀循齊名號爲五儁初入洛司空張華見而竒之曰皆南金也又曰郄超傳云沙門支遁以清淡著名于時風流勝貴莫不崇敬以爲造微之功足參諸正始而遁常重超以爲一時之雋又曰郄超爲桓温參軍謝安與王坦之常詣温論事温令超帳中卧聽之風動帳開安笑曰郄生可謂入幕之賔矣又曰周顗傳曰庾亮嘗謂顗曰諸人咸以君方樂廣顗曰何乃刻畫無鹽唐突西施也又曰應詹弱冠知名性質素𢎞雅雖犯而弗之校以學藝文章稱司徒何邵見之曰君子哉若人又曰桓温豪爽有風槩姿貌甚偉面有七星少與沛國劉惔善常稱之曰温眼如紫石稜鬢作蝟毛􅀈孫仲謀晉宣王之流亞也又曰劉惔寓居京口家貧織芒屨以爲飬雖蓽門陋巷宴如也人未之識唯王導深器之後稍知名論者比之袁羊惔喜還告其母其母聪明婦人也謂之曰此非汝比勿受之又有方之范汪者惔復喜母又不聽及惔年德轉昇論者遂比之荀粲又曰荀松弱冠太原王濟甚相器重以方其外祖陳羣袁侃謂侃弟奥曰近見荀監子清虛名理當不及父德性純粹是賢兄軰人也又曰成公簡字宗舒東郡人也世二千石性清素不求榮利潜心味道罔有干其志者黙識過人張茂先每言公簡清静比揚子雲黙識擬張安世又曰謝安總角神識沉敏風宇修暢善行書弱冠詣王濛清言良乆既去濛子修曰向客何如大人濛曰此客亹亹而來逼人王導亦深器之由是有重名又曰謝萬善屬文叙漁父屈原季王賈誼楚老龔勝孫登嵇康四隐四顯爲八賢論其㫖以處者爲優出者爲劣以示孫綽綽與往反以體公識逺者則出處同歸又曰韓康伯傳云庾􅛱名重一時少所推服常稱康伯及王坦之曰思理倫和我敬韓康伯志力疆正吾愧王文度又曰王獻之嘗與兄徽之俱詣謝安徽之多言俗事獻之寒温而已既出客問安王氏兄弟優劣安曰小者佳客問其故安曰吉人之辭寡又曰禇裒與杜乂俱有盛名冠于中興譙國桓彛見而目之曰季冶有皮裏春秋言其外無臧否而内有所褒貶也又曰王恭美姿儀人多愛悦或目云濯濯如春月柳嘗被鶴氅裘渉雪而行孟昶窺見之歎曰此真神仙中人也又曰王恭字孝伯少有美譽清辯過人自負才地髙華恒有宰輔之望與王忱齊名友善慕劉惔之爲人謝安常曰王恭人地可以爲將相宋書曰謝𢎞㣲叔父混特所敬貴號爲㣲子常云何逺持操負氣阿容愽而無檢曜恃才而持操不篤晦自知而納善不周設復功濟三才終亦以此爲恨至如㣲子吾無間然又曰㣲子異不傷物同不害正若年造六十必至公輔又曰龔祈不應徵辟風姿端雅容止可觀中書郎范述見而嘆曰此荆楚仙人也蕭子顯齊書曰王孫祐父逺爲光禄勲宋世爲之語曰王逺如屏風屈曲能蔽風露陳書周𢎞正叔父捨每與談論輙異之曰觀汝神情頴悟清理警發後世知名當出吾右又曰髙祖在京城嘗與諸將讌桓僧明周文育侯安都爲壽各稱功伐髙祖曰卿等悉良將也然而並有所短桓公志大而識闇狎下而驕尊矜功不收其拙周侯交不擇人而推心過差居危履險猜防不設侯郎慠誕而無厭輕佻而肆志並非全身之道后卒皆如其言隋書曰元諧以髙熲有宰相之具嘗言於上曰楊素麄踈蘇威怯愞元胄元旻正似鴨耳可以付社稷者唯獨髙熲又曰蘇威治書侍御史梁毗以威領五職安繁戀劇無舉賢自代之心抗表劾威上曰蘇威朝夕孜孜志存逺大舉賢有闕何遽迫之顧謂威曰用之則行舍之則藏唯我與爾有是夫因謂朝臣曰蘇威不值我無以措其言我不得蘇威何以行其道楊素才辯無雙至若斟酌古今助我宣化非威之匹也蘇威若逢亂世商山四晧豈易屈哉又曰楊逹爲人𢎞厚有局度楊素每言曰有君子之貌兼君子之心者唯逹耳唐書曰王珪嘗侍晏太宗謂珪曰卿識鑒精通尤善談論自房𤣥齡等咸宜品藻义可自量孰與諸子賢對曰孜孜奉國知無不爲臣不如𤣥齡才兼文武出將入相臣不如李靖敷奏詳明出納惟允臣不如彦博處繁理劇衆務畢舉臣不如戴胄以諫諍為心耻君不及於堯舜臣不如魏徵至如激濁揚清嫉惡好善臣於數子亦有一日之長太宗深然其言羣公亦各以爲盡已所懷謂之確論又曰馬周有機辯能敷奏深識事端動无不中太宗嘗曰我與馬周暫時不見則便思之中書侍郎岑文本謂所親曰吾見馬君論事多以援引事類揚推古今舉要刪蕪㑹文切理一字不可加二言不可減聽之靡靡令人忘倦昔之蘓張終賈正應此耳然鳶肩火氣騰上必速恐不能久耳又曰韋述時趙冬曦孫逖王翰常遊其門趙冬曦兄冬日弟和壁居貞安貞頥貞等六人逖弟迪逌逈􅙝音起巡亦六人並詞學登科張說曰趙韋昆季今之把梓也又曰馮定字介夫宿之弟也儀貌壯偉與宿俱有文學而定過之貞元中皆舉進士時人比之漢朝二馮君吕氏春秋曰􅃹仲有病桓公往問之曰仲父之病深矣將何以教寡人􅃹仲對曰願君之逺易牙竪刁常之巫衛公子啓方也公曰易牙烹其子以慊寡人慊快也猶尚可疑邪􅃹仲對曰人之情非不愛其子子之忍將何有於君公又曰竪刁自害以近寡人猶尚可疑耶􅃹仲對曰人之情非不愛其身其身之忍又將何有於君公又曰常之巫審於死生能去痾病猶尚可疑耶􅃹仲對曰死生命也痾病本也君不用其命守其本而待常之巫彼將以此無不爲也公又曰衛公子啓方事寡人十五年其父死不敢歸哭猶尚可疑耶􅃹仲對曰人之情無不愛其父父之忍將何有於君公曰諾􅃹仲死盡逐之食不甘官不治病不起朝不肅居三年公曰仲父不亦過乎復召而反之明年公有病常之巫從中曰公將以某日薨易牙竪刁相與作亂公令衛公子啓方以書社四十人入衛公慨焉歎涕曰􅃹仲聖人之所見豈不逺哉若死者有知我何面目以見仲父乎蒙衣袂而死絶于壽宫又曰吳起謂商文曰事君果有命矣商文曰何謂也吳起曰治四境之内成訓教變習俗使君臣有義父子有序子與我孰賢商文曰吾不若子曰今日置質爲臣其主安重今日釋璽辭官其主安輕子與我孰賢商文曰吾不若子曰援桴一鼔敵人在前使三軍之士樂死若生子與我孰賢商文曰吾不若子吳起曰三者子皆不吾若也位在吾上命矣夫商文曰善子問我常我亦問子變世主少羣臣相疑黔首不定當此之時屬之我乎屬之子乎吳起黙然不對少間曰然商文曰是吾所以加於子之上也崔鴻前京録曰張茂謂馬岌曰劉曜自古可方誰等軰也岌謂曰曹孟徳之流茂黙然岌曰孟德公族也劉曜戎狄難易不同曜殆過之茂曰曜可方吕布闗公而云孟德不及豈不過哉岌曰孟德挾天子令諸侯仗大義討不庭曜一卒驟然用烏合之衆而能建威成大道天下莫之當其不優歟茂曰天生之以㓕中國殆不可以人事論也秦記曰姚萇大破苻登置酒髙㑹諸將各曰若值魏武王尋破此敵陛下將軍大過上歎曰吾不如亡兄者四也長八尺五寸垂臂過膝人望而畏之一也當十萬之衆與天下争衡望麾直突前無横陣二也究覧古今講論道藝駕御羣賢收羅雋異三也總領大衆經屨險難大小悅稱人盡死力四不如也又曰魏武王姚㐮禮待楊亮亮奔桓温温問亮曰襄何如人荅曰天下傑也神明器度故是孫䇿之疇而雄武過之越絶書曰或問曰子胥范蠡何人也曰子胥勇而智范蠡智而明皆賢人也問曰子胥死范蠡去二人行違皆稱賢何也荅曰論語曰陳力就列不能者止事君以道言耳范蠡單身入越致主於霸有所不合故去也問曰不合何不死曰止去事之義也義無死子胥死者受㤙深也傳曰孔子去魯燔爼無肉曾子去妻藜蒸不熟㣲子去比干死孔子並稱仁行雖違其義同死與生敗與成其同柰何論語曰有殺身以成仁子胥重其信范蠡貴其義信從中出義從外入㣲子去者痛殷道也比干死者忠於紂也箕子亡者絶也忠信之至相爲表裏耳問二子孰逾乎曰以爲同耳華陽國志曰廣陵太守下邳陳登字元龍太尉球孫也有雋才較天下士謂功曹陳嶠曰閨門雍穆有德有行吾敬陳元方父子氷清玉潔有德有言吾敬華子魚博聞强識竒逸卓犖吾敬孔文舉雄姿傑出有王霸之畧吾敬劉𤣥德零陵先賢傳曰𤣥德曰子初即劉巴字也才智絶人如孤可用非孤者難獨任也亮亦曰運籌策於帷幄之中吾不如子初逺矣若提桴鼓㑹於軍門使百姓喜勇當與人議之陳武别傳曰武時人無察者頓丘閭遐薦之於車府或問武當今可與誰爲軰遐曰方謝道竪不足比徐世璋有餘道竪世璋皆同時知名士也武聞之笑曰乃處我季孟之間乎衛玠别傳曰永和中丹陽尹劉真長鎮西將軍謝仁祖商畧中朝十人遂及於玠或問杜𢎞治得方衛洗馬不謝曰安得相比其中可容數人世說曰嵇中散語趙景真卿瞳子白黒分明有白起之風限量小狹趙荅曰尺表能審璇衡之度寸􅃹能測往復之晷何必在大但問識何如耳又曰諸名士共洛水上􅃧還樂令問王夷甫曰今日共㸔樂不王曰裴僕射善談名理混有雅具張茂先論史漢殊靡靡可聽王安豐說延陵子房亦超超元箸又曰劉萬安即道真之子庾公所謂灼然王舉又云千人亦見百人亦見王右軍少時丞相云逸少何縁復减萬安又曰諸葛瑾弟兄及從弟誕並有盛名各在一國于時以爲蜀得其龍吳得其虎魏得其狗誕在魏與夏侯𤣥齊名瑾在吳吳朝服其𢎞雅又曰卞望之云郄公體中有三反方於事上好下候伺一反治身清貞而大修計校二反自好讀書憎人學問三反也又曰王敦爲大將軍鎮豫章衛玠避亂從洛投敦相見欣然談話彌日于時謝鯤爲長史敦謂鯤曰不意永嘉之末復聞正始之音阿平若在當復絶倒時人以玠爲玊人語林曰謝碭絶重其婦張𤣥常稱其婦欲以敵之有濟尼者並遊張謝二家人問其二嫗優劣荅曰𤣥夫人神清散朗故有林下之風碣家婦清心玊映自是閨房之秀也三輔决録曰弭生字仲升其父賤故張伯英與李才書曰弭仲升髙德美名命世之才非弭氏小族所有新豐瘠土所當出也郭泰别傳曰泰字林宗少遊汝南先過袁閬不宿而退往從黄憲累日方還或問林宗林宗曰奉髙之器譬諸汎濫雖清而易挹叔度汪汪君子若千頃波澄之不清撓之不濁不可量也太平御覧卷四百四十六
