body:
  text: 太平御覽卷一百二宋李昉等撰皇王部二十七後魏太宗明元皇帝世祖太武皇帝高宗文成皇帝太宗明元皇帝後魏書曰太宗明元皇帝諱嗣太祖道武皇帝長子也母曰劉貴人登國七年生雲中宫太祖晩有子聞而大悦乃大赦天下帝明睿寛毅非禮不動太祖甚竒之天興六年封齊王拜相國加車騎大將軍初帝母既賜死太祖乃召帝曰昔漢武帝將立其子而殺其母不令婦人預國政使外家為亂汝當繼統故吾逺同漢武為長久之計帝素純孝哀泣不能自勝太祖怒之帝還宫哀不自止日夜號泣太祖知而又召之帝欲入左右曰孝子事父小杖則受大杖避之今陛下怒盛入或不測陷帝於不義不如且出待怒解而進不晩也帝從之乃遊行逃於外天賜六年冬十月即皇帝位大赦改元為永興元年追尊皇妣為宣穆皇后公卿大臣先罷歸不與朝政者悉復登用之是歲乞伏乾歸自稱秦王海夷馮跋僭號自稱大燕天王三年春二月詔曰衣食足知榮辱夫人飢寒切已惟恐朝夕不濟所急者溫飽而已何暇及於仁義之事乎王教之多違蓋由於此非夫耕婦織内外相成何以家給人足其簡宫人非所當御及執作伎巧自餘悉出以賜瘝民三月詔侍臣常帶劒四年二月登虎圏射虎夏四月宴羣臣於西宫使各獻直言勿有所諱秋七月巡置四廂大將又仿十二時置十二小將以陽山侯奚斤元城公元屈行左右丞相是年沮渠蒙遜自稱河西王神瑞元年春正月以禎瑞頻集大赦改元二年六月幸去畿陂觀漁辛酉次于濡源立蜂臺射熊于頽牛山獲之丁卯幸赤城親見長老問民疾苦復租一年南次石亭幸上谷問百年訪賢俊復田租之半壬申幸涿鹿登橋山觀溫泉使以太牢祀黃帝唐堯廟至廣甯如上谷登廣甯之厯山以太牢祭虞舜廟親加禮焉泰常元年七月帝自白鹿陂西行大獵于牛川登釜山臨殷繁水而南觀于九十九泉三年春帝自長川詔䕶高車中郎將薛繁率高車丁零十二部大人衆二萬北畧至弱水招懷代叛降者二千餘人獲牛馬二萬餘頭是年赫連屈丐僭稱皇帝四年夏四月車駕有事於東廟逺蕃助祭者數百國五年五月詔曰宣武皇帝體得一之𤣥逺應自然之沖妙配純化而御世演大道以宣風大行大名未盡盛美其改宣曰道更上尊諡曰道武皇帝是歲劉裕廢弑其主司馬德文僭稱皇帝自號為宋七年夏四月封皇子燾為太平王拜相國初帝服寒食散頻年動發不堪萬幾五月詔皇太子臨朝聽政冬十月車駕南巡出自天門關踰恒嶺四方蕃服大人各率所部從者五萬餘人十有一月太平王親統六軍出鎭塞上八年二月築長城於長川之南起自赤城西至五原延袤一千餘里備置戍衛三月乙巳田於鄴南韓陵山幸汲郡至于枋頭濟自靈昌津幸陳畱東郡乙丑濟河而北西之河内造浮橋於治坂津夏四月丁卯幸成皋城觀虎牢而城内乏水懸綆汲河帝令連艦上施轒轀絶其汲路轒符分切轀於云切兵車也又穿地道以奪其井遂至洛陽觀石經蠻王梅安率渠帥數千人來貢方物閏月還幸河内北登太行幸高都還晉陽賜百官王公已下逮於厮賤無不霑洽五月還次鴈門皇太子率畱臺王公迎于句注之北庚寅車駕至自南巡冬十月廣西宫起外牆周迴二十里是歲民飢詔所在開倉賑給十有一月帝崩於西宫在位十五年時年三十二遺詔以司空奚斤所獲軍實賜大臣自司徒長孫嵩以下至于士卒各有差十有二月上諡曰明元皇帝葬于雲中金陵廟稱太宗帝禮愛儒生好覽史傳以劉向所撰説苑於經典正義多有所闕乃撰新集三十篇採摭經史該洽古義兼資文武焉世祖太武皇帝後魏書曰世祖太武皇帝諱燾太宗明元皇帝長子也母曰杜貴嬪天賜五年生於東宫體貌瓌異太宗竒而悦之曰成吾業者必此子也泰常七年四月封太平王五月為監國太宗有疾命帝總攝百揆聰明大度意豁如也八年十一月即皇帝位大赦天下十有二月追尊皇妣為密皇太后進司徒長孫嵩爵為北平王司空奚斤為宜城王藍田公長孫翰為平陽王其餘普増爵位各有差始光元年夏四月東巡幸大寧二年三月尊保母竇氏曰保太后庚申營故東宫為萬壽宫起永安安樂二殿臨望觀九華堂初造新宇千餘詔曰昔帝軒剙制造物乃命倉頡因鳥獸之跡以立文字繼厯久逺傳習多失其眞今制定文字世所用者頒下逺近永為楷式是年赫連屈丐死子昌僭立三年春二月起太學於城東祀孔子以顔淵配十有一月帝率輕騎二萬襲赫連昌至其城下徙萬餘家而還十有二月武都氐王楊𤣥及沮渠蒙遜等皆遣使内附四年春正月赫連昌遣其弟平原公定率衆二萬向長安帝聞之乃遣就陰山伐木大造攻具二月車駕還宫三月遣高陽王禮鎭長安詔執金吾桓貸造橋於君子津五月車駕西討赫連昌濟君子津至于黑水帝親祈天告祖宗之靈而誓衆焉六月昌引衆出城大破之車駕入城虜昌羣弟及其諸母姊妹妻妾宫人萬數府庫珍寶車旗器物不可勝計八月壬子車駕至自西伐飲至䇿勲告於宗廟班軍實以賜畱臺百寮各有差冬十有一月以氐王楊𤣥為都督荆梁益寧四州諸軍事假征南大將軍梁州刺史南秦王神䴥元年春正月以天下守令多行非法精選忠良悉代之二月改元是歲皇子晃生三年春正月行幸廣甯臨溫泉作溫泉之歌三月帝聞劉義隆將冦邊乃詔冀定相三州造船三十艘簡幽州以南兵集于河上以備之秋七月詔諸征鎭將杖節邊逺者聽開府辟召其次增置吏員詔大鴻臚卿杜超假節都督冀定相三州諸軍事行征南大將軍太宰進爵為王鎭鄴為諸軍節度九月立密皇太后廟於鄴甲辰行幸統萬遂征平凉十有一月車駕至平凉先是赫連定將數萬人東禦於鄜城畱其弟上谷公社干廣陽公度洛孤城守帝至平凉登北原使赫連昌招喻之社干不降遂掘四面圍之十二月定弟社干度洛孤面縛出降平凉平収其珍寶定長安臨晉武功守將皆奔走關中平車駕東還畱巴東公延普等鎭安定四年九月加太尉長孫嵩柱國大將軍特進左光禄大夫崔浩為司徒征西大將軍長孫道生為司空詔曰頃逆命縱逸方夏未寧戎車屢駕不遑休息今二冦摧殄士馬無為方將偃武修文遵太平之化昧旦思求想遇師輔訪諸有司咸稱范陽盧𤣥博陵崔綽趙郡李靈河間邢穎渤海高允廣平游雅太原張偉等皆賢雋之冑冠冕州邦有羽儀之用庶得其人任之政事共臻雍熙之美易曰我有好爵吾與爾縻之如𤣥之比隱跡衡門不曜名譽者盡勅州郡以禮發遣遂徵𤣥等及州郡遣至者數百人皆差叙用冬十月詔司徒崔浩改定律令延和元年春正月尊保太后為皇太后立皇后赫連氏立皇子晃為皇太子謁於太廟大赦改元大延元年出太祖太宗宫人令得嫁大赦改元六月詔曰去春小旱冬作不茂憂勤克己祇請靈祗上下咸秩豈朕精誠有感何報應之速雲雨震洒流澤沾渥有鄙婦人持方寸玉印詣潞縣侯孫家既而亡去莫知所在玉色鮮白光照内映印有三字為龍鳥之形要妙竒巧不類人迹文曰旱疫平推尋其理蓋神靈之報應也朕用嘉焉比者以來禎祥仍臻所在非一天降嘉貺將何德以酬之所以内省驚震欣懼交懷其令天下大酺五日禮報百神守宰祭界内名山大川上答天意以來福禄二年十一月行幸棝音固陽驅野馬於雲中置野馬苑三年高麗契丹龜兹悦般焉耆車師粟持疏勒烏孫渴槃陁鄯善國各遣使朝獻奉汗血馬四年春罷沙門年五十以下五年六月車駕西討沮渠牧犍侍中宜都王穆壽輔皇太子決畱臺事八月車駕至姑臧牧犍兄子祖踰城來降乃分軍圍之九月牧犍兄子萬年率麾下來降是日牧犍與左右文武五千人面縛軍門帝解其縛待之以蕃臣之禮収其城内户口二十餘萬倉庫珍寶不可勝計冬十月辛酉車駕還宫徙凉州民三萬餘家于京師太平眞君元年六月皇孫濬生大赦改元二年春正月帝至道壇親受符籙備法駕旗幟盡青十月封皇子伏羅為晉王翰為秦王譚為燕王建為楚王余為呉王四年冬十一月詔曰朕承祖宗重光之緒思闡洪基恢隆萬世自經營天下剪暴除亂掃清不順二十年矣夫陰陽有往復四時有代謝授子任賢所以體息優隆功臣式圖長久蓋古今不易之令典也其令皇太子副理萬幾總統百揆諸功臣勤勞日久皆當以爵歸第隨時朝請饗宴朕前論道陳謨而已不宜復煩劇職更舉賢俊以備百官主者明為科制以稱朕心五年春正月皇太子始總百揆諸上書者皆稱臣詔曰愚民無識信惑妖邪私養師巫挾藏䜟記陰陽圖緯方伎之書又沙門之徒假西戎虛誕生致妖孽非所以一齊政化布淳德于天下也自王公以下至於庶人有私養沙門師巫及金銀工巧之人在其家者皆遣詣官曹不得容隱限今年二月十五日過期不出師巫沙門身死主人門誅明相宣告咸使聞知詔曰自頃以來軍國多事未宣文教非所以整齊風俗示軌則于天下也今制自王公以下至于卿士其子息皆詣太學百工伎巧騶率子息當習其父兄所業不聽私立學校違者師身死主人門誅六年春正月車駕行幸定州引見長老存問之二月遂西幸上黨觀連理樹于泫氏十一月遣殿中尚書安定公朝茂率騎屯相州之陽平郡發冀州民造浮橋于碻苦高切磝五交切津七年二月幸長安存問父老丁亥幸昆明池三月詔諸州坑沙門毁諸佛像徙長安城内工巧二千家於京師車駕旋軫幸洛水夏四月車駕至自長安毁鄴城五層佛圖於泥像中得玉璽二其文皆曰受命於天既壽永昌其一刻其旁曰魏所受漢傳國璽八年六月西征諸將扶風公元處眞等八將坐盜没軍資所在虜掠贓各千萬計並斬之九年冬十月以婚姻奢靡喪葬過度詔有司更為科限十一年春正月行幸洛陽所過郡國皆親對高年存恤孤寡遂征懸瓠夏四月車駕還宫賜從者及畱臺郎吏已下生口各有差六月誅司徒崔浩九月車駕南伐冬十月車駕濟河詔諸將分道並進使征西大將軍永昌王仁自洛陽出壽春尚書長孫眞趨馬頭楚王建趨鍾離高凉王那自青州趨下邳車駕自中道十一月至中山劉義隆魯郡太守崔邪利率屬城降使使者以太牢祀孔子次于彭城遂趨盱音吁眙音怡十二月車駕至淮詔刈萑葦作筏數萬而濟義隆盱眙守將臧質閉門拒守將軍胡崇之等率衆二萬援盱眙燕王譚大破之斬首萬餘淮南皆降是月永昌王仁攻懸瓠拔之獲義隆守將趙淮送京師斬之車駕臨江起行宫於𤓰步山義隆使獻百牢貢其方物又請進女於皇孫以求和好帝以師婚非禮許和而不許婚使散騎侍郎夏侯野報之帝詔皇孫為書致馬通問焉正平元年二月車駕濟河次于魯口皇太子朝於行宫三月車駕至自南伐飲至䇿勲告於宗廟夏五月大赦六月改元十月封皇孫濬為高陽王尋以皇孫世嫡不宜在藩乃止改封秦王翰為東平王燕王譚為臨淮王楚王建為廣陽王呉王余為南安王二年二月帝崩於永安宫在位二十九年時年四十五秘不發喪中常侍宗愛矯皇后令殺東平王翰迎南安王余入而立之大赦改元為承平三月上尊諡曰太武皇帝葬於雲中金陵廟號世祖冬十月余為宗愛所賊殿中尚書長孫渴侯與尚書陸麗迎立皇孫是為高宗帝生不逮密太后及有所識言則哀慟悲感傍人太宗聞而嘉歎暨太宗不豫衣不釋帶性情儉率素服御飲膳取給而已不好珍麗食不二味所幸昭儀貴人衣無縑綵羣臣白帝更峻京邑城隍以從周易設險之義又陳蕭何壯麗之説帝曰古人有言在德不在險屈丐蒸土築城而朕滅之豈在地也天下未平方須民力土功之事朕所未為蕭何之對非雅言也每以財者軍國之本無所輕費至於賞賜皆是死事勲績之家親戚愛寵未曾橫有所及高宗文成皇帝後魏書曰高宗文成皇帝諱濬景穆皇帝之長子也母郁乆閭氏真君元年六月生於東宫帝少聰達世祖愛之常置左右號世嫡皇孫年五歲世祖北巡帝從在後逢虜帥桎一奴欲加其罰帝謂之曰奴今遭我汝宜釋之帥奉命解縛世祖聞之曰此兒雖小欲以天子自處意竒之既長風格異常每有大政常參決可否正平二年二月中常侍宗愛逆立南安王余十月又賊余於殿中尚書長孫渴侯與尚書陸麗奉迎皇孫即帝位於永安前殿大赦改元興安元年十二月初復佛法二年二月發京師五千人穿天淵池是月劉義隆子劭殺其父而自立夏五月行幸崞音郭山是月劉劭弟駿殺劭而自立閏月太后赫連氏崩八月詔曰朕以眇身纂承大業即位以來百姓晏安風雨順序邊方無事衆瑞兼呈不可稱數又於内苑獲方寸玉印其文曰子孫長壽羣公卿士咸曰休哉豈朕一人克臻斯應實由天地祖宗降佑之所致也思與兆庶共兹嘉慶其令民大酺三日諸殊死已下各降罪一等興光元年二月帝至道壇登受圖籙七月皇子𢎞生大赦改元大安元年遣尚書穆伏眞等三十人巡行州郡觀察風俗二年春正月立皇后馮氏二月丁巳立皇子𢎞為皇太子大赦天下三年冬十月將東巡狩詔太宰常英起行宫於遼西黃山四年春正月至遼西黃山宫二月登碣石山觀滄海大饗羣臣於山上班賞進爵各有差改碣石山為樂遊山築壇記行於海濱冬十月北巡至陰山有故冢毁發詔曰昔姬文葬枯骨天下歸仁自今有穿毁墳隴者斬之和平二年正月詔曰刺史牧民為萬里之表自頃每因發調逼民假貸大商富賈要射時利旬日之間增贏十倍上下通同分以潤屋故編户之家困於凍餒豪富之門日有兼積為政之弊莫過於此其一切禁絶犯者十疋以上皆死布告天下咸知禁令二月行幸中山遂幸信都車駕所過皆親對高年問民間疾苦詔民年八十以上一子不從役靈丘南有山高四百餘丈乃詔羣臣仰射山峯無能踰者帝彎弧發矢出山三十餘丈過山南二百二十步遂刋石勒銘三年冬十月詔曰夫三代之隆莫不崇尚年齒今選舉之官多不以次令頒白處後晩進居先豈所謂彛倫攸叙者也諸曹選補宜各先盡勞舊才能十二月制戰陣之法十有餘條因大儺耀兵有飛龍騰蛇魚麗之變以示威武四年春三月賜京師民年七十已上大官厨食以終其年夏四月上幸西苑觀射虎三頭五月行幸陰山秋七月詔曰朕每歲閏月命羣臣講武平壤所幸之處必立宫壇糜費之功損勞非一宜仍舊貫何必改作也八月遂畋于河西詔曰朕順時田獵而從官殺獲過度既殫禽獸乖不合圍之義其勅從官及典圍諸將校自今已後不聽濫殺其田獲皮肉别自頒賚十二月詔曰名位不同禮亦異數所以殊等級示軌儀今喪葬嫁娶大禮未備貴勢豪富越度奢靡非所謂式昭典憲者也有司可為之條格使貴賤有章上下咸序著之于令詔曰夫婚姻者人道之始尊卑高下宜令區别然中代以來貴族之門多不率法或貪利財賂或夤縁私好在於茍合無所擇選令貴賤不分巨細同貫塵穢清化虧損人倫將何以宣示典謨垂于來裔今制皇族師傅王公侯伯及士民之家不得與百工伎巧卑姓為婚犯者加罪六年四月破洛那國獻汗血馬普嵐國獻寶劒五月帝崩於太華殿在位十四年時年二十六六月上尊諡曰文成皇帝廟號高宗葬雲中之金陵太平御覽卷一百二
