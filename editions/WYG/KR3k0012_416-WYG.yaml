  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_416-1a, image: WYG0896/WYG0896-0640a.png}
body:
  text: 太平御覽卷四百一十六宋李昉等撰人事部五十七友悌周禮大司徒曰六行孝友睦婣任恤禮記曲禮曰親戚稱其慈也僚友稱其悌也又禮運曰兄良弟悌夫義婦聽家之肥也又檀弓上曰子路有姊之喪可以除之矣而弗除也孔子曰何弗除也曰吾寡兄弟而弗忍也孔子曰行道之人皆弗忍也子路聞之遂除之春秋左傳曰君義臣行父慈子孝兄愛弟敬所謂六順毛詩葛屨陟岵曰陟彼岡兮瞻望兄兮兄曰嗟予弟行役夙夜必偕偕俱也又鹿鳴常棣曰常棣燕兄弟也閔管蔡之失道故作常棣焉周公吊二叔之不咸而使兄弟恩疏召公為作此詩而歌以親之也常棣之華鄂不韡韡箋云承華者曰鄂不當作拊拊鄂足得華之光明其貎韡韡然盛也興者喻弟以敬事兄兄以榮覆弟恩義之顯亦韡韡然也凡今之人莫如兄弟又邶栢舟二子乗舟曰二子乗舟思伋夀也衛宣公之二子爭相為死國人傷而思之而作是詩也二子乗舟汎汎其景二子伋夀也宣公為伋娶於齊女而美公奪之而生夀及朔朔與其母訴伋於公公令伋之齊使賊先待於隘而殺之夀竊其節而先往賊殺之伋至曰君命殺我彼何罪焉賊又殺之國人傷其渉危遂往如乗舟而無所薄也又曰惟此王季因心則友則友其兄則篤其慶尚書君陳曰惟孝友于兄弟克施有政論語曰孝弟也者其為仁之本與又曰孝乎惟孝友于兄弟又曰兄弟怡怡如也爾雅曰善兄弟為友漢書曰卜式河南人也以田畜為事有少弟壯式脱身出獨取羊百餘田宅財物盡與弟式入山牧十餘年羊致千餘頭買田宅而弟盡破其産式輒復分與之又曰王商字子威涿郡蠡吾人也商為太子中庶子以肅敬敦厚稱父薨商嗣為侯推財以分異母諸弟身無所受東觀漢記曰魯恭字仲康扶風人恭憐弟丕小欲先就其名託疾不仕郡數以禮請謝不肯應母强遣之恭不得已而西因留新豐教授建初初丕舉方正恭乃始為郡吏又曰汝南王琳字巨尉弟季出遇赤眉將為所捕琳請自縛先季死賊憐而放遣之又曰趙孝字長平建武榖食尚少孝得穀炊將熟令弟禮夫妻出比還孝夫妻共蔬食禮夫妻歸告言已食輒獨飯之積久禮心怪之疑後掩伺見之不肯食出遂共蔬食兄弟怡怡鄉里歸德又曰孔奮篤於骨肉弟竒在雒陽為諸生分禄俸以供給其糧用四時送衣下至脂燭毎有所食甘美輒分減以遺竒謝承後漢書曰許荆兄子世嘗報讎殺人怨家㑹衆操兵至荆家欲殺之㑹荆始從府休歸與相遇因出門解劒長跪曰世前無狀相犯咎皆在荆不能相教兄既早没一子為嗣如令死者傷其滅絶今願殺身代之塞咎雖死已往猶謂更生怨家扶起荆曰許掾郡中稱為賢吾何敢相侵因遂委去又曰李鴻字奉遜禮信仁孝友于兄弟弟育為人所侵辱育後隂結客報怨為執法吏所得當伏罪時未有立嗣鴻為太尉掾在京師傷育以義刷恥門户斷絶自分代育遂刻印還歸欲過家恐見妻子虧移其意到縣北亭預作記乞代育通記便飲酖而之縣令省記怛然驚感司馬彪續漢書曰山陽張儉以忠正為中常侍侯覽所忿疾覽為刋章下州郡召捕儉與孔融兄褒有舊亡投遇褒出時融年十五六儉少之不暇告也融知儉長者有窘迫色謂曰兄在外吾獨不能為君主乎因留舍藏之後事洩國相以下密就掩捕儉得脱走遂并收融及褒送獄融曰保納舍藏者融也融當坐之褒曰彼來投我罪我之由非弟之過我當坐之兄弟爭死郡縣疑不能决乃上讞詔書令褒坐焉融由是著名范曄後漢書曰姜肱字伯淮彭城廣戚人也家世名族肱與二弟仲海季江俱以孝行著聞其友愛天性常共卧起及各娶妻兄弟相戀不能别寢以繼嗣當立乃遞往就室焉又曰鍾皓字季明潁川長社人少以篤行稱公府連辟為二兄未仕避隠宻山王隠晉書曰徐苗字叔胄髙宻淳于人弟亡臨殯口中有癰潰膿血苗含去之晉中興書曰顔含字宏都琅琊人含次嫂繁氏老而失明含奉養必束帶躬親嘗省嫂病困須得蚺虵膽為藥而求不能得平晝獨坐有一童子持一青章授含含開視虵膽也童子逡巡出户化成青鴻飛去得膽藥成嫂病即愈又曰鄧攸字伯道為石勒參軍勒過泗水攸與鄉人河東陳瑕平陽馬恬共謀叛勒破車以牛馬負妻子入草中又遇賊掠牛馬去攸語妻曰吾弟早亡唯有一息今當步走兩兒恐盡死不如棄我兒抱弟子遺民婦乃從之崔鴻十六國春秋前趙錄曰上郡王雋字𤣥英有幹藝之稱雋年七八歳隨兄密子元直西如凉州路中糧匱密留元直於途乞丐民間比還雋為賊所掠元直逃免密乃將元直追賊叩頭求哀曰人情自當皆愛其子但此弟未生家君見背孤遺相長以至于今請以元直易雋賊相謂曰以子易弟義之大也於是以雋授密而去密後亡雋勺水不入口者五日雖服喪朞年而心喪六載又前燕録曰有司奏中山浦隂民劉洛縣差充征弟興私代背軍逃歸縣以本名捕斬興詣郡自列稱逃是興身請代洛死洛又固陳已實正名宜從憲辟兄弟爭命詳刑有疑暐曰洛應征輒留興冒名逃役俱應極法但兄弟競死義情可嘉宜特原之南燕録曰有司奏沙門僧知夜入臨淄人泠平舎淫其寡嫂李氏平與弟安國殺之郡縣按平兄弟以殺人論而平安國各引手殺讓生競死義形急難後秦録曰姚襄與李歴戰馬中流矢死弟萇下馬以授襄襄曰汝何以自免萇曰但令兄濟此豎子安敢害萇㑹救至俱免後魏書曰房景先沉敏方正事兄恭謹出告反面晨昏叅省側立移時兄亦危坐相敬如賓客兄曾寢疾景先侍湯藥衣冠不解形容毁瘁親友莫不哀之後周書曰裴寛字長寛弱冠為州里所稱與二弟漢尼並知名親没撫諸弟以篤孝聞滎陽鄭穆嘗謂其從弟文直曰裴長寛兄弟天倫篤睦人之師表吾愛之重之汝可與之逰處梁書曰張宏策兄弟友愛不忍蹔離雖各有室常同卧起世比之姜肱兄弟唐書曰張嘉貞為并州長史開元初因奏事至京師上聞其善政數賞慰嘉貞因奏曰臣少孤兄弟相依以至今日臣弟嘉佑今授鄯州别駕與臣各在一方同心離居魂絶萬里乞移就臣側近臣兄弟盡力報國死無所恨上嘉其友愛特改嘉佑為忻州刺史又曰東郡未平梁宋間羣盜連聚或至二千餘衆攻陷城邑李瀾守蘄縣力屈為盜所執將害之瀾弟渤詣盗請代兄死又瀾請殺身留弟兄弟爭死俱為盗所害又曰杜佑子式方性孝友弟兄尤睦季弟從郁少多疾病式方躬自煎調藥膳水飲非經式方之手不入於口及從郁夭䘮終年號泣殆不勝情士友多之又曰白居易弟行簡字知退文筆有兄風詞賦尤稱精宻文士皆師法之居易友愛過人兄弟相待如賓客行簡子龜兒多自教習以至成名當時友悌無以比焉蕭廣濟孝子傳曰陳元字子元陳侯太子七歳喪母父更娶周氏有子曰昭周氏讒元侯將殺元昭欲先死元不聽引白羊誓曰孝者羊血逆上一丈三尺一如誓後又讒之侯怒令元自殺元投遼水大魚負之元曰我罪人也魚乃去昭從後來問漁者云投水死矣昭氣絶良乆曰吾兄也又投水而死周景式孝子傳曰古有兄弟忽欲分異出門見三荆同株接葉連䕃歎曰木猶欲聚况我兄弟而欲殊哉遂還相為雍和矣宋躬孝子傳曰孫棘彭城人事母至孝臨亡以小兒薩屬棘特深友愛宋大明五年上募軍伍薩求代棘及後軍期應死棘薩爭死妻許氏又遥屬棘曰君當門户豈可委罪小郎且大家臨終以小郎屬君竟未有妻息君已二兒死復何恨太守張岱表聞詔牓門宋世祖感其悌友乃普增詣弟封秩列女傳曰㑹稽石師安妻者同郡呂氏之女也名軍其兄遂犯法軍匿之知不能免乃請智者為辭乞代兄遂之命因自經縣門官嘉其義乃捨遂罪又曰齊義繼母者齊二子之母也當宣王時有人鬭死於道者吏訊之二子立其傍吏問之兄曰我殺之弟曰非兄乃我殺之朞年不决言於相相不能决言於王王曰若皆赦之是縱有罪若皆殺之是誅無􅇳度其母能知子善惡試問其母聽其所欲殺活相召而問之其母泣而對曰殺少子相曰少子人所愛今欲殺之何也對曰少者妾之子長者前妻之子相言之於王王美其義皆赦其子又曰郃陽友娣者郃陽邑任延夀之妻也字季兒有三子季兒兄季宗與延夀爭葬父事延夀與友田建隂殺季宗建獨坐死延夀㑹赦乃以告季兒季兒曰嘻殺夫不義事兄之讎亦不義何面目以生季兒乃告大女曰汝父殺吾兄義不可以留又終不嫁矣吾去汝而死善視汝弟遂自經死海内先賢傳曰范丹字史雲清髙亮直讓財十萬與二為㑹稽先賢傳曰陳業字文理業兄渡海傾命同時依止者五六十人骨肉消瀾而不可記别業仰皇天誓后土曰聞親戚者必有異焉因割臂流血以灑骨應時飲血餘皆流去汝南先賢傳曰繆彤字豫公郃陽人兄弟四人各求分異至有爭訟之言彤黙閉户自撻大自罵曰繆彤汝脩身謹行將齊整風俗如何近一家之中不能使之和恊耶鞭兩髀皆瘡於是諸姊及弟叩頭自責不復分矣張瑩漢南記曰隂慶為鮦陽侯其弟員及丹皆為郎慶以明尚書修儒術推居弟園田奴婢錢悉分與員丹慶俱佩印綬而已當代稱之陳壽益部耆舊傳曰李孟元脩易論語大義畧舉質性恭順與叔子就同居就有痼疾孟元推所有田園悉以讓就夫婦紡績以自供給江微陳留志曰李銓平邱人也少聰慧有至行銓兄前母子後母甚不愛也而衣食皆使下銓銓始年五歳覺已衣服勝兄即脫不着須兄得已同然後服之其母遂不得有偏及長銓内匡順母外奉其兄故閨門雍睦為郡族所稱杜預汝南記曰李充兄弟六人貧無儋石之儲易衣而出并日而食妻竊謂充曰今貧如是我有私財可分異獨居人多費極無為空自窮也充請呼諸隣里室家相對前跪觸告其母便顧其妻叱而遣之婦行泣出門去顔延之庭誥曰將責弟悌務念為友太平御覽巻四百一十六
