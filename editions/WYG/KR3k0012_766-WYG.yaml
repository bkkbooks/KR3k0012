body:
  text: 太平御覽卷七百六十六宋李昉等撰雜物部一膠漆䗶黄屑皮䈥角齒羽毛蘧蒢筣笓笪繩膠周禮曰凡相膠欲朱色而晳者也深瑕而澤紾而摶亷摶圜也亷瑕嚴利也鹿膠青白馬膠赤白牛膠火赤䑕膠黒魚膠餌犀膠黄皆謂煑用其皮或用角也禮曰脂膠丹漆無或不良史記曰趙奢死藺相如病篤使亷頗攻秦秦敗趙軍秦之間言曰秦之所惡獨畏趙奢之子趙括為将軍趙王因以括代亷頗相如白王以名而使括若膠柱而鼔瑟耳括徒能讀父書傳不知合變也趙王不聽遂将之漢書曰晁錯上書曰欲立威者始於折膠秋至膠可折弓弩可用匃奴方以出車謝承後漢書曰雷義與陳重為交鄉人為之語曰膠漆雖謂堅不如雷與陳帝王世紀曰昭王濟漢楚人惡之以膠船進王中流膠船解王没于水中洲記曰以鳳喙及麟角合煎作膠名曰集絃膠一名連金泥膠青色如碧玉漢武時西王母使獻靈膠四兩帝不知其妙以付庫帝幸上林苑射虎而弩弦斷使從駕因取一分膠口濡續弦以射虎而帝使武士對挽終不脫勝於舊弦吕氏春秋曰桓公使人告魯曰管夷吾寡人之讎也願生得而親加手焉魯君許諾乃使吏革其拳膠其目以革囊其手也盛之以鴟夷置之以革車孔融同歲論曰阿膠經寸不能止黄河之濁本草經曰膠一名鹿角膠味甘平治傷中勞絶腰痛瘦補中益氣婦人無子曹植樂府歌曰膠漆至堅浸之則離皎皎素絲隨染随移君不我棄䜛人所為漆書曰兖州厥貢漆絲豫州厥貢漆枲詩曰樹之榛栗椅桐梓漆史記曰豫譲為智伯報趙襄子吞炭漆身又曰秦二世立又欲漆其城優旃曰善上雖無言固将請之漆城城滑蕩蕩冦來不能上欲就之易為漆耳顧難為蔭室於是二世笑而止戰國䇿曰三晉分智氏趙襄子怨智伯漆其頭以為飲器漢書貨殖志曰漆千大斗亦比千乘之家范􅁮後漢書曰樊重欲作器先種漆而鄉人笑之積其歲月皆得其用向之笑者皆取給焉莊子曰山木自冦也膏火自煎也桂可食故人伐之漆可用故人割之人皆知有用之用而莫知無用之用也韓子曰舜作食器斬山木而財之削鋸循其迹流漆墨其上諸侯以為益侈國之不服者十三又曰堯無膠漆之約於當世而道行山海經曰英鞮之山其上多出漆列僊傳曰丁次卿欲還峨眉山語主人丁氏云當相為作漆以甖十枚盛水覆口從次唾之百日乃發皆成漆也蕭廣濟孝子傳曰申屠勲字君遊少失父與母居家貧傭力供養作壽器用漆五六斛十年乃成何晏九州論曰平安好􅀥中山好栗真定好梨共汲好漆續述征記曰古之漆園在中牟今猶生漆樹也梁王時莊周為漆園吏則斯地南越志曰綏寧白水山多漆樹髙十餘丈刻漆常上樹端鷄鳴日出之始便刻之則有所得過此時隂氣淪陽氣升則無所獲也凢刻漆别有氏族以為業膺前縁木處胼肱如人脚也䗶晉中興書曰王敦死秘不發喪囊尸以席塗之以䗶埋於齋中諸葛瑶等相縱酒滛樂博物志曰荒年暫辟穀法但食䗶半斤輙支十日不飢東阿王嘗與甘始同寢處百日不食而容體自若用此術也世說曰石季倫以䗶燭炊黄屑南方草物状曰黄屑在山中藤生蔓延縁著樹木以九月中刮取根皮乾暴曰南黄屑最黄好歲以獻皮書曰梁州厥貢熊羆狐貍織皮左傳曰皮之不存毛将安傅又曰無終子嘉父使孟樂如晉因魏莊子納虎豹之皮以和諸戎又曰齊莊公為勇爵殖綽郭最欲與焉自以為勇州綽曰東閭之役臣左驂廹還於門中識其枚數可以與於此乎然二子者譬於禽獸臣食其肉而寢處其皮矣爾雅曰東北之美者斥尺舎切山之文皮焉論語子貢曰文猶質也質猶文也虎豹之鞹猶犬羊之鞹漢書曰元狩四年有司言用度不足請收銀錫白金及皮幣以足用又曰荅布皮千石亦比千乘之家范􅁮後漢書曰李恂為兖州刺史以清約率下席羊皮卧布被遷張掖太守有威重名文子曰木強即折革張即裂神異經曰北方有層氷萬里厚百丈有䑕在土中焉食氷下草木肉重萬斤可以作脯食之已熱隂熱病也其皮可以蒙鼓其聞千里有美尾可以來䑕此尾所在䑕自聚搜神記曰舊說太古時有人逺征家唯一女并馬一疋女思父乃戯馬曰汝能為我迎得父吾得嫁汝馬乃絶鞅而去至父所父疑家中有故乗之而還後馬見女輙怒而奮擊父怪之密問女女具以告父父乃射殺馬暴皮於庭女之皮所以足蹙之曰爾馬而欲我為婦自取屠剥何如言未竟皮蹶然忽起卷女而行父還於後大樹之間得女及皮盡化為蠶績於樹上其繭厚大異於常蠶隣女取食養之其收亦倍今世或謂蠶為女兒古之遺語也眞子曰廊廟之材盖非一木之支也狐白之裘盖非一狐之皮也韓子曰翟人獻豐狐𤣥豹之皮於晉文又曰西門豹性急佩􅅊以自緩董安于心緩佩絃以自急韋皮也揚子法言曰羊質虎皮見草而恱見豺而戰􅁯其皮之虎也筋角周禮曰凡相角秋閷音殺者厚春閷者薄穉牛之角直而澤老牛之角繆而昔昔讀為有錯之錯疢疾險中牛有久疾則角衰傷瘠牛之角無澤角欲青白而豐末角長二尺有五寸三色不失理謂之牛戴牛三色本白中青末豐也牛戴牛角直一牛也又曰凡相筋欲小􅂤而長大結而澤則其為獸必剽以為弓則豈異於其獸筋欲敝之敝禮曰祭天地之牛角繭粟宗廟之牛角握賔客之牛角尺左傳曰鼷鼠食郊牛角爾雅曰北方之美者幽都之筋角焉魏畧曰大秦國出䮄鷄犀角晉書曰王愷以帝舅奢豪有牛名八百里駿駮常瑩其蹄角後魏書曰桓帝英傑魁岸馬不能勝常乘安車駕大牛角容一石吕氏春秋曰寗戚飯牛扣角而歌淮南萬畢術曰燒角入山虎豹自逺東方朔占曰昔武帝亡劒不知所取者誰無主名請朔往入宫見人持兩刺手中復持一小牛角朔曰陛下宫中當有姓林名子魚者取之帝曰有之即收考子魚服出劔帝曰朔何其工乎且請說其占朔對曰入宫時見人持二刺手中復持小牛角因占之二木林字故知其姓角文似魚小魚當為子魚故知其名也齒書曰揚州厥貢齒革羽毛荆州厥貢羽毛齒革詩曰元龜象齒大賂南金周禮曰荆州其利齒革禮曰季春之月令百工審五庫之量筋角齒羽無或不良左傳曰晉韓宣子為政諸侯之幣重鄭子産謂宣子曰象有齒以焚其身賄也宣子恱乃輕幣西京雜記曰漢制天子以象牙為火籠羽毛書白仲夏鳥獸希革仲秋鳥獸毛毨仲冬鳥獸氄毛又曰揚州荆州皆貢羽毛周禮曰凢析全羽為旒析羽為旌左傳曰范宣子假羽毛於齊而弗歸齊人始貳尚書大傳曰夏成五服齒革羽毛器乃備魏志曰平原太守劉仁取印嚢及山鷄毛著器中令管輅筮之輅曰内外方圓五色成文含寶守信出則有章此印嚢也高丘巖巖有鳥未翔羽翼𤣥黄鳴不失晨此鷄毛也列女傳曰老萊子隨其妻至於江南而止曰鳥獸之解毛可績而衣也陸機扇賦曰昔楚襄王㑹於章臺之上宋玉唐勒侍皆􅍾白鵠之羽以為扇張載羽扇賦曰有翔雲之素鳥體自然之至潔飄縞羽於清風擬妙姿於白雪蘧蒢方言曰簟粗者謂之蘧蒢晉書曰慕容暐見符堅曰暫屈鑾駕幸臣私第堅許之暐出王嘉曰推蘆作蘧蒢不成文章㑹天大雨不得殺羊堅與羣臣莫之能觧是夜大雨晨不果出三輔故事曰哀帝崩王莾奏發傅太后家以蘧蒢裹尸還定陶倉庫令曰諸輸米麥二十斛蘧蒢一畨皇甫謐篤終論曰死以蘧蒢裹屍麻繩約二頭筣笓魏畧曰裴潜為尚書令妻子貧乏織筣笓以自供傅咸劾事曰令史張濟案行城東見有新立屋間筣笓障二十文推問是少府夏侯俊所作請免俊官笪方言曰筕戸當切篖音堂自闗而東周洛楚魏之間謂之倚佯自闗而西謂之筕篖南楚之外謂之篖郭璞曰筕篖似蘧蒢直丈而粗江東呼為笪繩通俗文曰合繩曰紏單展曰紉女隣切織繩曰辮大繩曰絙古怕切易曰上古結繩而治後世聖人易之以書契書曰予臨兆民懔乎若杇索之馭六馬為人上者柰何不敬又曰木從繩則正后從諫則聖左傳曰呉伐齊齊公孫揮命其徒曰人尋約呉髪短約繩也八尺為尋呉欲以繩具其首漢書曰龔遂為渤海太守盜賊不寧上問遂曰君欲何以息其盜賊遂曰選用賢良固欲安之臣聞治亂國猶治亂繩不可急唯緩之然後可治東觀漢記曰呉漢等圍朱鮪岑彭說鮪鮪從上下索曰必信可乘上彭趣索欲上鮪見其誠即許除後二日鮪将輕騎詣彭又曰許皇后父廣漢為謁者丞上官桀謀反時廣漢部索其殿中廬有索長數尺可以縳人者數千枚入蒲箧緘封廣漢索不得他吏往得之廣漢坐論為鬼薪輸掖庭後為暴室嗇夫晉書曰劉寔字子真平原人也少貧苦賣牛衣以自給然好學手繩口誦博通古今清身潔已舉秀才皆不行後魏書曰楊大眼武都民楊難當之孫少驍捷髙祖征南李冲曲選鋭校大眼往求冲不許大眼曰下官出一技便出長繩三丈繫於髻走繩直如絃馬馳不及冲曰千載已來未有若此遂用為軍主顧謂同僚曰吾之今日所謂蛟龍得水之秋不復與諸軍齊列矣武冠六軍淮泗之人稱其名以止小兒啼卒荆州刺史老子曰善繫者無繩約而不可解家語曰子貢問治民於孔子孔子曰懔然如腐索之御悍馬文子曰夫繩之為度可卷而懐之可引而伸之可直而布之長而不横短而不窮直而不剛故聖人體之葛洪神仙傳曰樊夫人者劉綱妻也俱行道術各自言勝綱行見虎虎不敢起纔捉虎虎即嘘之夫人往捉虎虎以靣廹地不視夫人以繩繫虎頸曳之以歸幽明録曰曲阿有一人忘姓名從京還逼暮不得至家遇雨宿廣屋中雨止月朗遥見一女子來至屋簷下便有悲歎之音仍解腰中綣繩懸屋角自絞又覺屋簷上如有人牽繩絞此人密以刀斵綣繩又斫屋上見一鬼西走向曙女氣方甦能語家在前村此人将歸向女父母說其事或是大運使然因以女嫁與為妻異記曰武康徐氏宋太元中病瘧連沿不斷有人告之曰可作數團飯出道頭呼傷死人姓名云為我斷瘧今以此團與女擲之徑還勿反顧也病者如言乃呼晉故車騎将軍沈允須㬰有乗馬導從而至問汝為何人而敢名官家因傳将去舉家尋覔經日乃於塜側叢棘下得之繩猶在手瘧遂獲痊傅𤣥九曲詩曰歲暮景邁時光絶安得長繩繫日月古詩曰直如朱絃繩清如玉壺氷太平御覽卷七百六十六
