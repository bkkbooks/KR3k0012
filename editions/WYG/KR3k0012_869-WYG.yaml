body:
  text: 太平御覽卷八百六十九宋李昉等撰火部二火下西京雜記曰惠帝七年夏雷震南山大木數千株皆火燃至末其下數十畝地草皆燋黄其後百許日家人就其間得龍骨一具鮫骨二具又曰樊将軍噲問陸賈曰自古人君皆云受命於天云有瑞應豈有是乎賈曰有之夫目瞤則得酒食燈火華則得錢財故目瞤則祝之火華則拜之况天下大寳人君重位非天命何以得之哉王子年拾遺記曰岱輿山有員淵千里孟夏之月水騰沸以金石投之則爛如土矣孟冬之月稍燋涸中有黄色烟從地中出起數丈烟色萬變山人掘之入地數尺得燋石如炭或有碎火如俗間之火有草名莽煌葉圓如荷去之十歩炙人衣服則燋鳥獸不敢近也刈以為席冬彌温以枝相磨則火出又曰昔伯禹隨山濬川起自積石鑿龍門至窒穴初入窒穴之時孔八尺稍入幽闇不可復行禹乃負大而入有黑蛇長八尺頭有角銜夜明珠以導於禹又曰員嶠之山名環丘有雲石廣五百里駮駱如錦扣之片片則蓊然雲出俄而霑潤天下有木名曰倚桑亦有冰蠶長七寸黑色有角有鱗以霜雪覆之然後作繭長一尺其色五綵織為文錦入水而不濡其質輕軟柔滑以之投火則經宿不燎唐堯之世海人獻之又曰始皇好神仙之事求天下異術有宛渠之民乗蠡舟泛黑水而至於雍部始皇與之語及天初開之時如親見始皇問曰聞子明扵見逺願聞其術對曰臣之國去咸池日没之所九萬里焉日月之所不照以萬歲為夜其晝則天豁然中開濶數百丈萬歲還合則為一日也及其為夜琢燃石以代日光此石出於然山其土石皆自光明鑚之有火出大如栗則暉曜一室昔炎帝時火石國人獻此石也又曰申彌國去郡萬里有燧明國不識四時晝夜其人不死厭世則升天國有火樹名燧木屈盤萬丈雲霧出於中間折枝相鑚則火出矣後世聖人變腥臊之味逰日月之外以食救萬物乃至南垂見此樹表有鳥若鶚以口啄樹粲然火出聖人感焉因取小枝以鑚火號燧人氏在庖犧之前則火食起乎兹矣又曰郅寄字君珍䘮親盡禮去墓一百里每夜行常有鳥衘火以夾之六韜曰軍不舉火将亦不食荘子曰木與木相摩則燃金與火相守則流隂陽錯行則天地大絯於是乎有雷有霆水中有火乃焚大槐又曰利害相摩生火甚多内熱故也衆人焚和衆人遺利則和若利害在人則其和焚矣又曰曾子居衛緼袍無表三日不舉火十年不製衣又曰孔子窮於陳蔡之間七日不火食又曰指窮於為薪火𫝊也窮盡也為薪猶前新也前薪以指指盡前薪之理故火𫝊而不滅不知其盡也又曰以火救火以水救水名之曰益多又曰山木自冦也膏火自煎也又曰馬血為燐人血為野火又曰堯讓天下於許由曰日月出矣而爝火不息其於光也不亦難乎列子曰趙襄子率徒十萬狩於中山藉芿音仍燔林扇赫百里有一人從石壁中出隨烟燼上下衆謂鬼物火過徐行而出若無所經涉襄子怪而留之徐而察之形色七竅人也氣息聲音人也問奚道而處石奚道而入火其人曰奚物而謂石奚物而謂火襄子曰而嚮之所出者石也而嚮之所渉者火也其人曰不知也管子曰黄帝作鑚燧出火以熟葷臊韓子曰魯燒積澤天北風火南倚恐燒國哀公懼自将衆趣而救火左右無人盡逐獸而不救火乃召問仲尼仲尼曰夫逐獸者樂而無罰救火者苦而無賞此火所以不救也事急不及以罰救火者盡賞之則舉國不足以賞於民請從行罰乃下令曰不救火者比降火之罪令下未遍火已滅矣淮南子曰火上尋水下流又曰南方火也其帝祝融其佐朱明執衡而治夏其神為熒惑其獸為朱鳥其音徴其日丙丁又曰十一月水正而隂勝陽氣為火隂氣為水水勝故夏至濕火勝故冬至燥燥故炭輕濕故炭重又曰練土生木練木生火練火生雲雲金雲也練雲生水練水生土又曰夫火熯則水㓕之金堅則火消之又曰失火而遇雨失火則不幸遇雨則幸也故禍中有福也又曰稿竹有火弗鑚不燋土中有水弗掘無泉又曰披裘而救火毁瀆而止水乃愈益多又曰畜火井中操釣上山掲斧入淵欲得所求難也又曰甑得火而液水中有火火中有水疾雷破石隂陽相薄自然之勢又曰夫救火者汲水而趨之或以甕瓴或以盆盂其方圓銳惰不同盛水各異其於㓕火均也又曰順風從火紫芝與蕭艾俱死又曰今人於燒或操火往益之或雨者皆未有功而恩怨相去亦逺矣又曰聖王之養民非求用之也性不能已若火之自熱水之自寒夫何修焉及恃其力賴其功者若救火舟中也言舟中之人同心救火其用為易又曰夫狂者之不能避水火之難而越溝瀆之嶮者豈無形神氣志哉然而用之異也又曰夫寒之與暖相反大寒地坼水凝火弗為衰其暑火熱礫石流金火弗為益其厯寒暑之變無損益扵己質有之也又曰未嘗灼也而不敢近火者見其有所燒也未嘗傷而不敢擢刃者有見其有所害也又曰老槐生火久血為燐人弗怪也血精在地暴露百日則為燐逺望若野火又曰炎帝紀火死而為竈帝以火王天下死託祀于竈神抱朴子曰案河洛之文皆云水火者隂陽之餘氣也夫言氣則不能生日月可知也若水火是日月所生亦何必盡如日月之方圓乎今火出於陽燧而火不圓也水出於方諸而水不方也又陽燧可以取火於日而無取日於火之理則日精之生火明矣方諸可以取水於月而無取月於水之道此則月精之生水可知矣又曰南海之中蕭丘之上有自生火火常以春起而秋㓕丘方千里當火起之時滿此丘上純生一種木火起正著此木木雖為火所著但小燋黑人或得以為薪者火著如常薪但不成炭炊熟則灌滅之後復更用如此無窮又夷人取木華績以為火浣布木皮亦剥以灰煮為布但不及華細好耳白䑕大者重數斤毛長三寸居空木中其毛亦可績為布故火浣布有三種焉又曰草非火積水非魚屬然生竭則火㓕水涸則魚死伐木而寄生死芟草而菟絲萎又曰立夏日服六壬六癸之符或服飛霜之散則不熱㓜伯子王仲都此二人衣之以重裘曝之於夏日之中周以十爐之火口不稱熱身不流汗盖用此方也傅子曰管寧之遼東而歸海中遇暴雨餘船皆破唯寧船自若夜晦船人盡惑莫知泊所忽望見火光趨之得一島無居人又無火燼行人咸異焉以為神光之祐皇甫謐曰積善之應也潘尼箴曰夫水火者所以佐理天地清成大化也在天則日月麗焉在地則水火存焉風俗通曰城門失火禍及池魚案百家書宋城門失火汲取池中水以沃之魚悉露見但就取之一說司門尉姓池名魚城門火救之燒死故云然耳又曰臧仲英家欲炊而失釡火從篋中起衣服盡燒而篋不損山海經曰符禺之山其鳥多􅀈音旻其状如翠而赤喙翠似燕而紺色可以禦火畜之辟災又曰翠山之上其鳥多鸓音壘其状如鵲赤黑而兩首可以禦火又曰帯山之上有獸焉其状如馬而一角其名曰䑏䟽可以禦火又曰崦嵫之山上多丹木其葉如穀其實如𤓰赤符而黒理食之可以禦火又曰令邱之山無草木其上多火又曰崌山之上有鳥焉其状如鶚而赤身白首名曰竊脂可以禦火又曰西海之南流沙之濵赤水後黒水前有山名曰崑崙之邱其外有炎火之山投物即然今扶南東萬里有耆薄國東復五千里有火山國其山雖霖雨火常燃有白䑕常出山邉求食人捕之以毛作布而今之火浣布此類也又曰厭火國人獸身黑色火出其口中言能吐火神異經曰南荒外有火山焉長四十里廣四五里其中生木晝夜火燃得暴風雨火不滅火中有䑕重百斤毛長七尺餘細如絲可以作布新論曰漢元帝廣求方術之士漢中道人王仲都云但能忍寒暑耳以隆冬單衣於上林昆明池上無變色至夏天暑使暴坐環以十爐不出汗三輔黄圖曰秦始皇𦵏驪山六年之間為項籍所發牧羊兒墮羊冡中然火求羊燒其槨藏魏武帝明罰令曰聞太原上黨西河雁門冬至之後百五日禁火寒食云為介子推子胥沉江吴人未有絶水之事至於推獨為寒食豈不悖乎河圖挺佐輔曰伏羲禪於伯牛錯木作火春秋潜潭巴曰火從井出有賢士從民間起火明象賢者屈滯從井出禮含文嘉曰燧人始鑚木取火炮生為熟令人無腹疾遂天之意故為燧人也陸景典語曰衝風之摧枯枝烈火之炎寒草武王伐紂勢然也古今注曰宣帝地節元年上郡沙中夜有火如粟出不熱又曰陽燧以銅為之形如鏡向日則火生以艾炷承之得火也家語曰智伯既敗将出走夢火見於西方及夫出奔秦又夢火見於南方遂奔楚張衡靈憲曰日疋火月疋水火則外光水則含影括地圖曰神邱有火穴光照千里笑林曰某甲夜暴疾門人鑚火其夜隂暗未得火催之急門人忿然曰君責人亦太無道理今闇如漆何以不把火照我當得覔鑚火具尸子曰燧人上觀星辰下察五木以為火也隂符經曰火生於木禍發必剋孫子兵法曰凡火攻有五一曰火人二曰火積三曰火輜四曰火庫五曰火燧吕氏春秋曰齊桓公使人告魯曰管夷吾寡人之讎也願生得之魯君許諾乃使吏鞹其拳膠其目置之車中至齊境桓公使人以朝車迎之袚以爟火爟火所以祓除不祥也又曰鷰雀䖏一屋之上自以為安竈突决火棟宇将焚鷰雀不知禍将至也又曰伊尹説湯五味九沸九變火為之紀博物志曰燧人鑚木而造火又曰臨卭有火井一所縱廣五尺深二三丈在縣南百里昔人以竹木投之以取火諸葛丞相往觀之後火轉盛以盆著井上煮鹽得鹽後人以家火投井中火即㓕迄今不復然也又曰臨卭有火井深六十餘丈火上出人以筒盛火行百里餘猶可燃也又曰魏明帝世河東有焦光者祼而不衣䖏火不燋䖏寒不凍又曰積油萬石則自然生火晉㤗始中武庫火積油所致南越志曰廣州有大樹可以禦火山北謂之慎火人積屋木廣南無霜雪故成樹也太平御覽卷八百六十九
