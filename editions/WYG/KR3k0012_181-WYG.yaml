front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_181-1a, image: WYG0894/WYG0894-0616a.png}
body:
  text: 太平御覽卷一百八十一宋李昉等撰居處部九第邸屋家舎廬屠蘇附庵第漢書曰髙祖詔列侯食邑者皆賜大第室二千石受小第室注云有甲乙次第故曰第又曰出不由里門面大道者名曰第史記鄒奭者齊諸鄒子亦頗采騶衍之術以紀文於是齊王嘉之自如淳于髠以下皆命曰列大夫為開第康莊之衢髙門大屋尊寵之覽天下諸侯賔客言齊能致天下賢士也漢書霍去病益貴上為治第辭曰匈奴不滅無以家為又曰髙后徳夏侯嬰脱孝惠魯元於下邑賜北第第一上曰近我以尊異之注云第以北為尊又曰平恩侯許伯入第司𨽻校尉盖寛饒往賀酒酣仰視屋曰美哉富貴無常忽則易人如此傳舍所閲多矣唯謹慎為得久居侯可不戒哉晉書青溪橋東南臨淮水周三里九十歩太宗舊第後為㑹稽孝文王道子宅謝安薨後道子領揚州刺史於此理事時人呼為東府至是築城以東府為名其城東北角有靈秀山即道子宅内山嬖臣趙牙所築也齊書曰劉瓛姿狀纎小而儒學冠於當朝京師貴逰士子莫不下席受業瓛性謙下不以髙名自居住檀橋有屋數間上皆穿漏學徒不敢指斥呼青溪焉竟陵王子良親往修謁表世祖為瓛立舘以揚烈橋故主第給之生徒皆賀瓛曰室美為人災此華宇豈吾宅耶未及徙居遇疾卒唐書曰叚綸兵部尚書綸少任俠落拓不修細行仕隋左親衞隠太子見而悦之妻以瑯琊長公主舍髙祖之舊第數聞皷吹之音觀之無所覩綸謂主曰聞圗䜟李氏當王命今於第内有此禎祥必而家應籙之徵也又曰張延賞東都舊第在思順里亭舘之麗甲于都城子孫五代無所加工時號三相張公云魏公奏事曰爵雖列侯食邑不滿萬户不得作第其舍在里中皆不稱宅荀氏家傳曰荀彧字文若太祖既定冀州為公起大第於鄴諸將各以功次受居第太祖親游之笑曰此亦周禮六勲之差也蜀都賦曰亦有甲第當衢向術西京賦北闕甲第當道直啟邸史記曰大王馳入北邸史記封禪書曰方士多言古帝王有都甘泉者其後天子又朝諸侯甘泉作諸侯邸陸機洛陽記曰百郡邸在洛城中東城下歩廣里中屋說文曰屋居也釋名曰大屋曰廡廡撫也覆也亦謂之正也屋之正大者也通俗文曰客堂曰庌五下反聲類曰廡堂下周也釋名曰屋奥也其中温奥易豐卦曰豐其屋蔀其家闚其户閴其無人王弼注云屋藏隂物也以隂處極而最在外際自藏隂者也既豐其屋又覆其家闇之甚也棄其所處而深自藏闚户無人詩鵲巢行露曰誰謂雀無角何以穿我屋又曰於我乎夏屋渠渠注云夏大也渠渠猶勤勤也又車轔小戎曰在其板屋亂我心曲注云西戎板屋心曲心之委曲也又曰瞻烏爰止于誰之屋周禮冬官廬人曰殷重屋堂脩七尋崇三尺四阿重屋考工記葺屋三分瓦屋四分注云各分其修以基為峻尚書大傳曰武王伐紂觀兵於孟津有火流於王屋化為赤烏三足禮記富潤屋左傳清廟茅屋昭其儉也又曰宋灾樂喜為政火所未至撤小屋塗大屋注云大屋難撤故就塗之又曰欒氏乗公門宣子謂趙鞅曰矢及君屋死之鞅用劒以帥卒欒氏退又昭六年傳曰叔孫婼聘於晉一日必葺其墻去日如始至東觀漢記曰鍾離意為棠邑令初到無屋意乃出俸錢作屋民賫柱趣作浹日而成畢為民士祝曰興功役者令也如有禍祟令當之民大恱又曰王覇建武初連徵不至覇安貧賤居常茅屋蓬户藜藿不厭然樂道不息以夀終吳志是儀字子羽為人不治産業造屋纔足自容隣家起大宅孫權出望見起屋左右曰是儀家權曰是子羽儉必非也令人親至果在隣舍又曰魚宗為將軍朱據長史將母在營夜雨屋漏宗起涕泣謝母母曰但當勉之何足泣也晉記曰左將軍王廙中宗姊弟為母起屋違制上流涕責廙皇甫謐列女傳曰衞農與妻宿客舍遇雷風雨妻夢虎齧其足驚起相謂曰我此行未宜天欲戮我夫妻出中庭叩頭屋壊壓殺數十人家語曰孔子厄於陳蔡從者七日不食子貢以貨竊犯圍出糴於野人得米一石焉顔囘仲由炊之壊屋之下有埃塵黒墮飯中顏回取而食之子貢自外望見之不恱以為竊食吕氏春秋亦載又曰周公居冢宰之尊而猶下白屋之士日見百七十人新語堯舜之人可比屋而封桀紂之人可比屋而誅漢武故事曰上起神屋九間雖崑崙𤣥圃不之過也又曰武帝四歲封膠東王属長主抱膝上問曰兒欲得婦不長主指左右長御百餘人皆云不用因指其女問曰阿嬌好不帝笑對云好若得阿嬌作婦當作金屋貯之長主大恱乃苦要上遂定㛰漢官典職曰南北宫相去七里中間作大屋複道三重天子案行中央臺官從左右崔凱䘮服節曰禮人君宫室之制為殷屋四厦也卿大夫為夏屋隔半以北為正室中半以南為堂正室齋室也神異經曰西北金闕北荒有百屋齊長四十丈畫以五色戴延之西征記曰洛陽城有鬱金屋廣志曰大秦國以青水精為屋郡國志秦州俗尚氣力不恥寇盜弓馬射獵以為工能其居八板為屋故詩云在其板屋修我甲兵及車轔駟鐵小戎皆言田狩之事論衡曰豐屋知名家喬木知舊都鴻文在國聖世之驗又工伎之書起宅蓋屋必擇吉日夫屋覆人形宅居人體何患害于歲月而必擇之亦如以障蔽人身者神要之則夫裝車治船亦當擇日世説曰蔡司徒説在洛陸機兄弟住叅公左廨中數間瓦屋士龍住東頭士衡住西頭又曰庾闡化揚都賦成以示庾亮亮云可三二京四三都謝安云不得爾此是室下架屋耳事事擬學而無不儉狹張景陽詩曰蜘蛛網四屋七啟曰雲屋浩汗陶潛集曰少無適俗韻性本愛丘山方澤十餘畆草屋八九間劉義恭啓事曰洪恩覃被賜臣息伯龠檉屋二間楚詞九歌曰魚鱗屋兮龍堂家説文牖户之間謂之扆内謂之家易家人有嚴君焉父母之謂也又曰家人嗃嗃悔厲吉也婦子嘻嘻失家節也又曰女正位乎内男正位乎外詩曰刑于寡妻至于兄弟以御于家邦言文王自家刑邦國也後漢書曰李通嚴毅治家如公庭舍説文曰市居曰税舍禮記有客弗能館不問其所舎左傳秦獲晉侯以歸晉大夫反首茇舍從之注云反首亂頭髮反下垂也茇草也舍止也漢書曽城舎班婕妤居之又曰成帝趙皇后女弟合徳絶幸為昭儀居昭陽舎桓譚新論曰董賢女弟為昭儀居椒風舎後漢書曰朱祐初學長安帝往候之祐不時相勞苦而先升講舎後車駕幸其第帝因笑曰主人得毋舎我講論乎以有舊恩時加賞賚謝承後漢書曰趙昱請處士綦母君公立精舎而受公羊傳又曰楊震客居湖縣立精舍家貧常以種藍自業又曰楊竒字公挺震之𤣥孫少有志節不以家勢為名交結英彦不與豪右相交通於河南緱氏界中立精舎門徒常二百人又曰陳寔字仲弓詣大學郭林宗陳仲舉為親友歸家立精舎講授諸生數百人又曰周磐字堅石初為安陵令以從弟暢為司𨽻縣属州部換陽夏令復換重合令磐以厯二縣耻復經三城遂去還家立精舎授徒守先人冡墓逺方知名又曰張渙字然明𢎞農華隂人詣太學受業博通五經隠處在扶風郿縣界中立精舍斟酌法喬卿之雅訓晝誦書傳暮習弓馬魏武令曰孤本欲自立精舎春夏讀書今遂為國討賊後漢書張湛稱疾不朝拜大中大夫居中東門候舎故時人號曰東門君齊書周顒字彦倫汝南成安人也智林道人遺書顒於鍾山西立隠舎休沐則歸之古今注野人為圓舎如蝸牛之殻故曰蝸舎廬説文廬寄也春夏居秋冬去之釋名曰寄此為廬周禮凡國野之道十里有廬廬有飲食漢書武帝賜嚴助書曰制詔㑹稽太守君厭承明之廬張晏曰承明廬在石渠閣外直宿房曰廬也後漢書曰汝南薛苞字孟聚父取後妻憎苞分出外日夜號泣不能去被毆杖不得已廬於門外旦入洒掃進食父怒逐之又廬於里頭晨昏不廢積嵗餘父母慙而還之東觀漢記曰耿純率宗族歸光武純兄歸燒家廬舎上以問純純曰恐宗人賔客卒有不同故焚廬舎絶其返顧之望上大笑又曰李珣為武威太守後坐事免無田宅財産居山澤結草為廬魏略曰楊沛前後宰厯城不以私計分意後歸家無餘積無他奴婢占河南席陽亭部荒田二頃分牛廬居止其中魏志曰管寕至遼東乃廬於山谷時避難者多居郡南而寧居北示無遷志晉書征虜將軍石崇河南金谷中構有别廬冠絶時輩引致賔客日以賦詩諸葛亮表先帝不以臣卑鄙三顧臣於草廬之中諮臣以當世之事郡國志廬山周武王時有匡俗先生字君孝兄弟七人皆有道術結廬於此仙去空廬尚存故曰廬山皇甫謐髙士傳曰世莫知焦先所出或言生漢末無父母兄弟見漢衰乃不言常結草為廬冬夏袒露垢汗如泥後野火燒其廬先因露寢遭冬雪大至先袒卧不移人以為死就視如故洛陽故宫名曰侍中廬在南宫中屠蘇附通俗論曰屋平曰屠蘇廣雅曰屠蘇庵也魏略李勝為河南尹㕔事前屠蘇壊令人治之庵釋名曰圜屋曰庵庵掩也自覆掩也太平御覽卷一百八十一
