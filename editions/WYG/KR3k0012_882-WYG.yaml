body:
  text: 太平御覧卷八百八十二宋李昉等撰神鬼部二神下北齊書曰神武以髙昻為雲南道大都督徑趣商洛昻渡河祭河伯曰河伯水中之神髙敖曹地上之虎南齊書曰義鄉縣長風廟神姓鄧先經為縣令死遂發靈周山圖啓乞加神位輔國將軍上曰足狗肉便了事如何階級又曰李安民為呉興太守郡有項羽神護郡聽事太守到郡必須祀以軛下牛安民奉佛法不與神牛著屐上聽事又於上設八闗齋俄而牛死安人尋卒世以神為祟南史曰王神念為青州刺史性剛正所更州郡必禁止淫祠時東北有石鹿山臨海先有神廟神念至便令毁撤神影壊屋舍坐棟上有一大蛇長丈餘入海水時陰子春為東莞太守夣人通名詣子春云有人見苦破壊宅舍既無所託欽君厚徳欲憇此境子春心密記之經二日而知之甚驚以為前所夢神因辦牲醑請召安致一處數日復夣一朱衣人相聞辭謝云得君厚惠當以一州相報子春心喜供事彌勤經月餘魏欲襲朐山間諜前知子春設伏摧破之授南青州刺史又曰蕭猷封臨汝侯為呉興郡守性倜儻與楚王廟神交飲至一斛每酧祀盡懽極醉神亦有酒色所禱必從後為益州刺史時江陽人齊苟兒反猷乃遥禱請救是日有田老逄一騎從東方來問去城幾里曰百四十時日已晡騎舉矟曰後人來可令之疾馬欲及日破賊俄有數百騎如風一騎過請飲田老問為誰曰呉興楚王來救臨汝當此時廟中請祈無驗十餘日乃見侍衛土偶皆泥濕如汗者是日猷大破苟兒唐書曰髙祖義師次靈石縣隋將宋老僧屯霍邑以拒義師會霖雨積旬餽運不繼有白衣老父詣軍門曰余為霍山神使謁唐皇帝曰八月雨止路出霍邑東南呉當濟師髙祖曰此神不欺趙無恤豈負我哉又曰初薛延陁之將敗也有一客乞食於主人主引入帳令妻具饌其妻顧視客乃狼頭人也妻告隣人共視之狼頭人已食而去主人相與逐之止鬱督軍山見二人追者告其故二人曰我則神人也薛延陁當滅我來取之追者懼而退走延陁竟敗於鬱督軍山老子曰神得人以靈神無依靈將空歇莊子曰藐姑射之山有神人居焉肌膚若氷雪綽約若處子不食五穀吸風飲露乗雲氣凌飛龍而遊乎四海之外管子曰桓公北征孤竹未至卑耳之谿十里闟然止瞠然視援弓將射引而未敢發也謂左右曰見軾前人乎左右對曰不見也公曰事其不濟乎寡人大惑今者寡人見人長尺而人物具焉冠右袪衣走馬前疾事其不濟乎寡人大惑豈有人若此乎管仲對曰臣聞登山之神有俞兒者長尺而人物具焉覇王之君興而登山之神見且走馬前示疾道也袪衣示前有水也右袪衣示從右方涉也至卑耳之谿有賛水者曰從左方涉其深及冠從右方涉其深至膝若右涉其大濟桓公立拜管仲之馬前曰仲父之聖至若此寡人之罪久矣墨子曰鄭繆公處乎廟有神入門身烏素服曰帝饗汝明徳使錫汝壽十年有九公曰敢問神明為何曰為勾芒韓子曰齊人謂齊王曰河伯水神也王不識與之遇乎請使王遇之乃為壇塲于大水之上而與王立焉有間大魚動因曰此河伯也隋巢子曰昔三苖大亂天命殛之夏后受之大神降而冨也司命益年而民不夭四方歸之闢地以王山海經曰豐山神耕父處之常游清冷之淵出入有光又曰崑崙山神虎身而九尾人面而虎爪又曰西北海外章尾山有神人面蛇身而赤身長千里其瞑乃晦其視乃明風雨是謁是燭九陰是謂燭龍又曰蚩尤作兵犯黄帝黄帝乃令應龍攻之冀州之野蚩尤請風伯雨師縱大風雨黄帝乃下天女曰魃止雨遂殺蚩尤魃不得復上故所居不雨黃庭内經曰至道不煩决存真泥丸百節皆有神髮神蒼華字太元腦神精根字泥丸眼神明上字英𤣥鼻神玉壟字靈堅耳神空閑字幽田舌神通命字正倫齒神崿鋒字羅千一靣之神宗泥丸又曰心神丹元字守靈牙神皓華字虛成肝神龍煙字含明腎神𤣥冥字育嬰脾神嘗在字魂停膽神龍曜字威明皆在心内運天經晝夜存之自長生太公金匱曰武王都洛邑未成陰寒雨雪十餘日深丈餘甲子旦有五丈夫乗車馬從兩騎止王門外欲謁武王武王將不出見太公曰不可雪深丈餘而車騎無跡恐是聖人太公乃持一器粥開門而進五車騎曰王在内未有出意時天寒故進熱粥以禦寒未知長幼從何起兩騎曰先進南海君次東海君次西海君次北海君次河伯雨師粥既畢使者具告太公太公謂武王曰前可見矣五車兩騎四海之神與河伯雨師耳南海之神曰祝融東海之神曰勾芒北海之神曰𤣥冥西海之神曰蓐收請使謁者各以其名召之武王乃於殿上謁者於殿下門外引祝融進五神皆驚相視而歎祝融拜武王曰天陰乃逺來何以教之皆曰天伐殷立周謹來受命願勑風伯雨師各使奉其職風俗通曰共工之子好逺遊死為社神又曰秦昭王伐蜀令李氷為守江中有神嵗取童女二人為婦主者自出錢百萬以行聘氷曰不須吾自有女到時裝餙其女當以沉江氷徑上坐舉酒酧曰今得𫝊九族江君天神當見尊顔相為進酒氷先投杯但澹淡不耗厲聲曰江君相輕當相伐耳㧞劍忽然不見良久有蒼牛闘於岸有頃氷還謂官屬令相助曰南向腰中正白是我綬也還復對闘主簿刺殺其北面者江神死後無復患博物志曰太公望為灌壇令文王夣見婦人當道哭問其故曰吾大山之神婦嫁為西海婦灌壇令當吾道不敢以疾風暴雨過也夣覺召太公三日果疾風暴雨三齊畧記曰始皇作石橋欲過海觀日出處于時有神人能驅石下海城陽一山石盡起立嶷嶷東傾狀如相随而行云石去不速神人輙鞭之皆流血石莫不赤至今猶爾又曰始皇於海中作石橋海神為之豎柱始皇感其惠求與相見海神答云後與之約莫圖我乃從石塘三十里相見左右巧人以脚畫牙爪神怒曰帝負我約速去始皇轉馬還馬脚獨立後脚随崩僅得登岸脚畫者溺於海死王韶之始興記曰邕水内有一處曰龍口甚神明經過莫敢倨視舩載什物置之不守可經月人及鳥獸無犯者淮地記曰按古嶽瀆經云禹治水止桐栢山乃獲淮渦水神善應對言語辨淮之淺深源之逺近形若獮猴聳鼻髙額青軀白首金目雪牙頸伸百尺力逾九象禹授之庚申頸鎖大鐵鼻穿金鈴從淮之陰鎻龜山之足淮水乃安流注于海華陽國志曰周滅後秦孝文王以李氷為蜀守氷能知天文地理謂汶山為天彭門髣髴若見神遂水上立祠三所壅江作壩穿郫江以行舟船又溉灌三郡於是蜀沃野千里號為陸海天下謂之天府也氷又作石犀五頭以厭水精時青衣有沬水出蒙山下伏行地中會江至南安觸山崖水脉漂蕩破害舟舡氷乃發卒鑿平崖時水神怒氷乃操刀入水與神闘迄今蒙其澤漢武故事曰上祀大畤時夜光明照長安城如月光上以問東方朔此何神也朔曰此司命之神總鬼神者也上曰祠之能令益壽乎對曰皇者壽命懸於天司命無能為也郡國志曰陵州仁壽縣有陵井出鹽井傍玉女祠初女無夫後每年取一少年人擲置井中若不送水即竭又蜀郡西山有大蟒蛇吸人上有祠號曰西山神每嵗土人莊嚴一女置祠旁以為神妻蛇輙吸將去不爾即亂傷人周氏平蜀許國公宇文貴為益州總管乃致書為神媒合婚姻擇日設樂送玉女像以配西山神自送之後無復此害魏文帝列異傳曰袁把時有神出河東號度索君人共立廟兖州蘇士容母疾往禱見一人着白布单衣髙冠冠似魚頭度索君曰昔盧山共食白李未久已三千年日月易得使人悵然去後度索君曰此南海君也捜神記曰蔣子文者廣陵人也嗜酒好色嘗自謂己骨青死當為神漢末為秣陵尉逐賊至於鍾山之下賊擊傷頭額解綬以縳之有頃遂死及呉先主之初其吏見子文於道乗白馬執白羽侍從如平生文曰我當為此土神也為吾立祠不爾使蟲入耳為災呉主謂為妖言後果有蟲入人耳皆死醫不能治又云不祠我將有大火是嵗數有火災呉主患之封為中都侯加印綬立廟改鍾山為蔣山以表其靈幽明録曰晉孝武帝於殿北忩下清暑忽見一人著白夾黃練单衣舉身沾濕自稱華林池中水神名曰淋涔君也若善見待當相福祐時帝飲已醉取常所佩刀擲之刀空過無礙神忿曰不以佳事垂接當令知所以居少時而暴崩皆呼此靈為禍也列異傳曰費長房能使神候東海君見葛陂君淫其夫人於是房𠡠繫三年而東海大旱長房至東海見其請雨乃勑葛陂君出之即大雨異苑曰陶侃如厠見數十人悉持大印有一人朱衣平幘自稱後帝云君長者故出相見三載勿言富貴極至侃起遂失所在有大印作公字當其穢處世説曰呉興徐長風與鮑南海有神明之交欲授以祕術先謂徐宜有約誓徐誓以不仕於是受籙常見八大神在側能知來見往才識日異縣鄉翕然有美談欲用為縣主簿徐心恱之八神一朝不見七人餘一人倨傲不如常徐問其故答云君違誓不復相為使身一人留衛籙耳徐乃還籙遂退宋玉神女賦曰楚㐮王與宋玉遊於雲夢之浦使玉賦髙唐之事其夜玉寢與神女遇其狀甚麗玉異之明日以白王王曰其夢若何曰晡夕之後精神恍惚若有所喜見一婦人狀甚竒異王曰狀如何也玉曰茂矣美矣諸好備矣盛矣麗矣難測究矣不可勝讃其始來也耀乎若白日初出照屋梁其少進也皎若明月舒其光須臾之間美貌橫生其盛餙也則羅紈綺繢盛文章王曰若此試為寡人賦之王符論曰今婦人不脩中饋休其蠶織而起學巫祝鼓舞事神以欺誣細人熒惑百姓妻女羸弱疾病之家懐憂憤憤易為恐懼至使奔走失時去離正宅增重禍祟至於死亡而不知巫所欺誣反恨事神之晩陳思王洛神賦曰覩一麗人于巖之畔乃援御者而告之曰爾有覿於彼者乎彼何人斯若此之艶也御者對曰臣聞河洛之神名曰宓妃然則君王所見無乃是乎其狀若何臣願聞之曰其形也翩若驚鴻婉若遊龍榮曜秋菊華茂春松髣髴兮若輕雲之蔽月飄颻兮若流風之廻雪逺而望之皎若太陽升朝霞廹而察之灼若芙蕖出渌波余情恱其淑美心振蕩而不怡無良媒以接懽託微波而通辭願誠素之先逹解玉佩以要之太平御覧卷八百八十二
