  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_625-1a, image: WYG0898/WYG0898-0610a.png}
body:
  text: 太平御覽卷六百二十五宋李昉等撰治道部六貢賦上家語曰哀公問政於孔子孔子對曰政之急者莫大乎使民富且夀也公曰為之奈何孔子曰省力役薄賦斂則民富矣敦禮教逺罪戾則民夀矣又曰子貢問於孔子曰昔者齊君問政於夫子夫子曰政在節財魯君問政於夫子夫子曰政在諭臣葉公問政於夫子夫子曰政在恱近而來逺三者之問一也夫子應之不同然則政有異乎孔子曰各因其事也齊君為國奢于臺榭淫于苑囿五官伎樂不懈于時一旦而賜人以千乗之家者三故曰政在節財魯君有三人孟孫叔孫季孫内比周以愚其君外距諸侯之賔以蔽其明故曰政在諭臣夫荆之地廣而都狹民有離心莫安其居故曰政在恱近而來逺此三者皆所以為政又曰閔子騫為費宰問政於孔子孔子曰以徳以法夫徳法者御民之具猶御馬之銜勒也子騫曰敢問古之政孔子曰古之政者天子以内史為左右手内史掌王八柄及叙事之法受納訪以詔王治以徳為銜勒以百官為轡以刑罰為策以萬民為馬故御天下數百年而不失善御馬者正銜勒齊轡策御民者一其徳法正其百官刑不用而天下治又曰子㳺問於孔子曰子亟言子産之惠可得聞乎孔子曰惠在爱民而已矣子㳺曰爱民之謂徳教何翅於惠哉孔子曰夫子産者猶衆子之母也食之弗能教也子㳺曰其事可言乎孔子曰子産以其乗車濟令渉者盡愛而無教也又曰孔子謂宓子賤曰子治單父衆悦子何施而得之對曰不齊之治也父恤其子其子恤諸孤而哀䘮紀孔子曰善小節也小民附矣猶未足也不齊所父事者三人所兄事者五人所友事者十一人孔子曰父事三人可以教孝矣兄事五人可以教悌矣友事十一人可以舉善矣中節矣中節人附矣猶未足也曰此地民有賢於不齊者五人不齊事之而禀度焉皆教不齊所以治之道孔子嘆曰其大者乃于此乎有矣又曰孔子初仕為中都宰中都魯邑名也為飬生送死之節長幼異食如五十異粮强弱異任謂力行之事各從所任弱困也男女别途路不拾遺噐不雕偽市不二價各如其貨不相欺誑為四寸棺五寸槨因丘陵為墳不封不樹行之一年而四方諸侯皆則焉又曰宓子賤者仕魯為單父宰恐魯君聼䜛使己不得行其政於是辭行故請君之近吏二人與之俱至官令二吏書方書輙掣其肘書不善則從而怒之二吏患焉辭請歸魯子賤曰子之書不善子歸勉之矣二吏歸報于君曰宓子賤使臣書而掣臣肘書惡而又怒臣邑吏皆笑之此臣所以去之而來也魯君以問孔子孔子曰宓不齊君子也其才任覇王之佐屈莭而治單父将以自試意者宓子以此諌乎公悟太息曰此寡人之不肖也寡人亂宓子之政而責其善者數矣㣲二吏則寡人無以知過微夫子則寡人無由自悟遽發所爱之使吿宓子曰自今以徃單父非魯有也從子之制有便於人者子决之五年一言其要宓子敬奉詔遂得行其政于是單父治焉教敦厚明親親尚篤敬施至仁加誠懇致忠信百姓化之又曰孔子兄之子蔑者與宓子賤皆仕孔子徃過蔑而問之曰自子之仕何得何亡對曰未有所得而亡者三王事若聾聾宜為襲言前後柏因襲學焉得習言不得學習也是學不明也奉禄少饘粥不及親戚是􅇧肉益踈也公事多急不得弔死問疾是朋友道闕也其亡者三即如此也孔子不悦徃過子賤問如孔蔑對曰自來仕無所亡而所得者三始誦之今得而行之是學益明也奉禄所供被及親戚是骨肉益親也有公事而兼以弔死問疾是朋友益篤也孔子喟然謂子賤曰君子哉若人若人謂是人也魯無君子斯焉取斯國語曰齊桓公親迎管仲于郊而與之坐問焉曰昔吾先君㐮公築臺以為髙位居髙䑓以自尊田狩畢弋不聼國政卑聖侮士而惟女是崇九妃六嬪正嫡稱妃言九者尊之如一言其滛侈非禮制也姪娣之属者稱曰嬪妃官也陳妾數百陳列食必梁肉衣必文繡戎士凍餒戎車待遊車之裂戎士待臣妾之餘戎車兵車遊車逰戲之車裂殘也優笑在前賢材在後是以國家不日引引申不月長長益恐宗廟不掃除社稷不血食敢問為此若何為治管子對曰昔吾先王昭王穆王世法文武逺績以成名周室之先績功也言昭王雖有所闕猶能世法文武之典以成其功名也合羣叟比校民之有道者合㑹叟老比方校考也謂考其徳行道藝而興賢設象以為民紀式權以相應式用也權平也治用平均民便相應比綴以度比其衆寡而綴連以度法也端本肇末端持肇正也謂先持其本以正其末勸之以賞賜糾之以刑罰班序顛毛以為民紀統班次序列顛頂也毛謂髪也統經也言次列使長幼有序以為治民之經紀桓公曰為之若何管子對曰昔者聖王之治天下也参其國而伍其鄙参三也國郊以内也伍五也鄙郊以外謂三分其國以為三軍五分其鄙以為五属聖主謂若湯武定民之居成民之事使四民各居其職若工就官府農就田野所以成其事陵為之終以為𦵏地而慎用其六柄焉又曰齊桓公問管仲曰國安矣吾欲事于諸侯其可乎管子對曰未可君若正卒伍修甲兵周禮五人為伍百人為卒今管子亦以五人為伍而以三百人為卒則大國亦将正卒伍修甲兵則難以速得志矣君有攻伐之噐小國諸侯有守禦之偹則難以速得志矣君若欲速得志於天下諸侯則事可以隐令可以寄政事戎事隐匿寄托也匿軍令託于國政若有征伐隣國不知桓公曰為之若何管子對曰作内政而寄軍令焉内政國政治國政以寄軍令桓公曰善管子於是制國五家為軌軌為之長軌中一人為之長十軌為里里有司為立有司四里為連連為之長十連為鄉鄉有良人焉良人鄉人又為大夫也以為軍令為軍常令五家為軌故五人為伍軌長帥之居則為軌出則為伍所謂寄政十軌為里故五十人為小戎里有司帥之小戎兵車此有司之所乗故曰小戎詩云小戎俴收古者戎車一乗歩卒七十二人四里為連故二百人為卒連長帥之十里為鄉故二千人為旅鄉良人帥之五鄉一帥故萬人為一軍五鄉之師帥之五鄉毎一軍有五鄉也鄉師􅀸也萬人為一軍齊制也周則萬二千五百人為軍師長也三軍故有中軍之鼓有國子之鼓有髙子之鼓春以蒐振旅春田曰蒐旅整衆也周禮仲春教振旅遂以蒐田秋以獮治兵秋田曰獮周禮仲秋教治兵遂以獮田也是故卒伍整於里軍旅整於郊内教既成令勿使遷徙遷徙猶更改伍之人祭祀同福死䘮同恤恤憂禍灾共之人與人相疇疇匹世同居少同遊故夜戰聲相聞足以不乖晝戰目相見足以相識其歡欣足以相死致死以相救居同樂行同和死同哀是故守則同固戰則同强君有此士也三萬人方行於天下方横以誅無道以屏周室屏藩天下大國之君莫之能禦禦當又曰晉文公元年春屬百官賦職任功屬㑹賦授也授職事任有功棄責薄斂施舍分寡棄責不求其償也分寡分給所少也救乏振淹匡困資旡救乏濟匱乏振淹起淹滯匡困扶其危資旡給其用輕闗易道通商寛農輕闗輕其税易道除盜賊通商利行旅寛農寛其政不奪其時茂穡勸分省用足財茂勉稼穡也勸有分無也省減省身用足財備㓙年利器明徳以厚民性利其器用明其徳教厚民性厚其性情也舉善授能官方定物方常物事立其常官以定百事正名育類正明上下服位之名長育善類昭舊族昭明舊臣有功者之善爱親戚明賢良明顕尊貴寵國之貴臣尊禮之賞功勞事耉老禮賓旅友故舊胥籍狐箕欒郤柏先羊舌董韓實掌近官舊十二姓晉之舊族近官朝官諸姬之良掌其中官諸姬同姓中官内官異姓之能掌其逺官公食貢大夫食邑士食田受公田庶人食力各食其力工商食官工百工商官賈周禮府藏皆有賈人以知物賈食官官給廪餼皁𨽻食職士臣皁皁臣輿輿臣𨽻食職各以其職大小食禄也官宰食加官宰家臣加大夫之加田也論語原憲為之宰政平民阜財用不匱阜安吕氏春秋曰呉起行魏武侯自送之絶河謂呉起曰先生将何以治西河對曰以忠以信以勇以敢武侯曰四者足矣請以四者恃先生又曰宓子賤治單父弹鳴琴身不下堂而單父治巫馬期以星出以星入日夜不居以身親之而單父亦治巫馬期問其故于宓子宓子曰我之謂任人子之謂任力任力者故勞任人者故逸宓子則君子矣又曰使民無欲上雖賢不能用夫無欲者其視天子與𨽻同彭祖與殤子同天子至貴也天下至富也彭祖至夀也誠無欲則三者不足動故人之欲多者其可得用亦多也人之欲少者其可得用亦少也無欲者不可得而用也善為上者能令人得欲無窮故人之可得用亦無窮然欲不正以治身則夭以治國則亡羣狗相與居皆静投以炙雞則相與争或折其􅇧或絶其筋争術存也凡治國令其民争行義也亂國令其民争不義也強國令其民争樂用也弱國令其民争不用也又曰桀紂以去之之道致之罰雖重刑雖嚴何益大寒既至民煗是利大熱在上民凊是走民無常處利則聚無則去欲為天子者民之所走不可不察今之世至寒矣至熱矣而民無走聚則行鈞也等于暴亂民無走則王者廢矣暴君幸矣民絶望矣家語曰子路治蒲三年孔子過之入其境三稱善子貢執轡而問其善可得聞乎孔子曰吾入其境田疇盡易草莱盡闢溝洫深濬此恭敬以信故其民盡力入其邑墻屋完固樹木甚茂此其忠信以寛故其民不偷也至其庭甚清閑無不用命此其明察以㫁故其政不擾也以此觀之雖三稱善庸盡其美乎太平御覧卷六百二十五
