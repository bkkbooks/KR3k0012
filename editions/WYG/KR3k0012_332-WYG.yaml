body:
  text: 太平御覽卷三百三十二宋李昉等撰兵部六十三據要漕運絶糧道據要吳子曰凡行師出境必取地形審之主客之向背地形或不悉知往必敗矣故軍有所至先五十里内山川形勢使軍士伺其伏兵將必自行審地之勢因而圗之知其險易也戰國䇿曰秦師伐韓圍閼與趙遣將趙奢救之軍士許厯曰秦人不意趙師至此其來氣盛將軍必厚集其陣以待之不然必敗先據北山上者勝後至者敗趙奢即發萬人趨之秦兵後至爭山不得上趙奢縱兵撃之大破秦軍遂解閼與之圍與音餘後漢書曰諸將上隴為隗囂所敗乃詔異軍栒邑未及至栒音詢隗囂乗勝使其將王元行巡二萬餘人下隴因分遣巡取栒邑漢將馮異即馳兵欲先據之諸將皆曰虜兵盛而新乗勝不可與爭宜止軍便地徐思方畧異曰虜兵臨境忸􅏸小利忸􅏸猶慣習也謂慣習前事而復為之也忸音尼丑切􅏸音逝也遂欲深入若得栒邑三輔動揺是吾憂也夫攻者不足守者有餘今先據城以逸待勞非所以爭也遂潛往閉城卒擊鼓建旗而出巡軍驚亂奔走追擊數十里大破之蜀志曰諸葛亮出斜谷是時魏將司馬宣王屯渭南郭淮䇿亮必爭北原若亮跨渭登原連兵北山隔絶隴道揺盪人夷非國之利也宣王善之淮遂屯北原塹壘未成蜀兵大至淮遂擊走之吳志曰魏遣諸葛誕胡遵等攻東興吳將諸葛恪率軍拒之及恪上岸部將丁奉與唐咨吕據留贊俱從山西上奉曰今軍行遲若敵據便地則難與爭鋒矣乃令諸使下道率麾下三千人徑進時風便奉舉帆二日至遂據塘天寒雪時魏軍將置酒髙㑹奉見其前部兵少相謂曰取封侯爵賞正在今日乃使兵解鎧着胄持短兵敵人從而笑焉不為設備奉縱兵破之大破敵前屯㑹據等至魏軍遂潰晉書曰劉裕率師伐南燕慕容超晉師渡峴慕容超懼率卒四萬就其將段暉等於臨胊其俱切謂其將公孫五樓曰宜進據川源晉軍至而失水亦不能戰以臨朐有巨筏水去城四十里五樓馳據之龍驤將軍孟龍符領騎居前奔往爭之五樓乃退因而大敗崔鴻十六國春秋曰後秦姚興與前秦符登相持登自大陌向廢橋興乃自將精騎以拒登使將尹緯領步軍據廢橋以抗登困急攻緯緯將出戰興遣使謂緯曰兵法不戰而屈人者蓋謂此也符登窮冦特宜持重不可輕戰緯曰先帝登遐人情尚優不行思奮之力梟殄逆䜿大事去矣遂與登戰大破之登衆渴死者十二三其夜大潰又曰夏赫連勃勃屯依力川後秦姚興將王奚聚羗胡二千餘户於勅竒堡勃勃進攻之奚驍悍有膂力短兵接戰勃勃之衆多為所傷於是揠斷其水堡人窘怕執奚出降宋史曰宋武帝伐姚泓沈林子參征西軍事加建武將軍統軍為前鋒從汴入河偽并州刺史河東太守尹昭據蒲坂林子於陜城與冠軍檀道濟同攻蒲坂龍驤王鎮惡攻道關姚泓聞大軍至遣偽平西姚紹爭據潼關林謂道濟曰潼關不逺所謂形勝之地鎮惡孤軍勢危力屈若使姚紹據之則難圗也及其未至當并力爭之若潼關㨗尹昭可不戰而服道濟從之後周書曰東魏將齊神武伐西魏軍過蒲津涉洛至許源西魏將周文帝軍至汝宛齊神武聞周文帝至引軍來㑹詰朝候騎告齊神武軍且至周文部將李弼曰彼衆我寡不可平地置陣此東十里有渭曲可先據以待之遂進軍至渭曲背水東西為陣合戰大破之北史曰安同從道武征姚夏於紫壁姚興悉衆救平同進計曰汾東有蒙坑東西三百餘里徑路不通姚興來必定汾西乗髙臨下直至紫壁如此則冦内外勢接宜截汾為南北浮橋乗西岸築圍既固賊至無所施其智力矣從之興果視平徒滅而不能救隋書曰煬帝初突厥冦蘭州隋將賀爰子幹率率衆拒之至可洛垓音哀山與賊相遇賊衆甚盛子幹阻前川為營賊軍不得水數日人馬甚弊縱擊大敗之唐書曰盛彦師鎮宜陽㑹李密叛彦師率兵徼之令其衆曰唯我馬首是瞻遂踰洛水入南山令持弓弩者乗髙挾路持刀楯者伏於溪谷之間毋得輒動伏兵既定又令曰待賊半渡而擊之所部皆笑曰賊向洛州何為守此彦師曰吾籌之熟矣李密聲往洛州其實欲南走襄城就張善相而若賊先入谷口我自後追之路險難以展力吾今先據要隘此賊乃成擒也密果至知有伏乃於山南上彦師邀擊之封葛國公漕運孫子曰不盡知用兵之害則不得盡知用兵之利故善用兵者役不再藉糧不再載取用於國因糧於敵故軍食可足兵甲戰具取用國中粮因敵也故國之貧於師者師逺踰也逺輸也百姓貧兵事轉運千里之外財費于道路人有困窮者也近師則貴賣貴賣則百姓虛虛則竭近軍師士多非常之賣當時貧費以趣末利然後財貨殫盡國家虛也竭則急於兵役力屈中原内虛於家兵十六充伍急則百姓盡持兵結連不觧内外力殫百姓之費十去其七所破費也公家之用破車疲馬甲胄弓矢㦸楯干櫓兵牛大車十去五六計較之也故智將務食於敵食敵一鍾當吾二十鍾六斛四斗為鍾計千里計運二十鍾而致一鍾於軍中也􅠇稈一石當吾二十石􅠇豆稈槀一石百二十觔也轉輸之發買二十石乃得一石也後漢書曰永平中理滹沱石臼河從都慮至羊腸倉酈元水經注云汾陽故城積粟謂之羊腸倉在晉陽西北石磴縈委若羊腸焉故以為名今嵐州界羊腸坂是也石臼河水名欲令通漕水運曰漕太原吏人苦役連年無成轉運所經三百八十九隘前後沒死者不可勝算建初三年拜鄧訓謁者監領其事訓考量隠括隠審量括之也知大功難立具以上言肅宗從之遂罷其役更用驢輦嵗省費億萬計全活徒士數千人又曰第五種拜髙宻侯相是時徐兖二州盜賊羣聚髙宻在二州之交種乃六儲粮稸勤厲吏士賊聞憚之又詔報朱浮曰徃年赤眉䟦扈長安䟦扈猶暴横也吾策其無榖必東來歸降今度此反虜勢無乆全其中必有内相斬者今軍資未充故須候麥耳又來歙上書曰公孫述以隴西天水為藩蔽故得延命假息今二郡平蕩則述智計窮矣宜益選兵馬儲積資糧昔趙之將帥多賈人髙帝縣之以重賞髙帝十年陳豨反於趙代其將多賈人帝多以金購豨將皆降今西州新破兵人疲饉若招以財榖則其衆可奪臣知國家所給非一用度不足然有不得已也帝然之於是大轉糧運詔歙率征西大將軍馮異建威大將軍耿弇虎牙六將軍蓋延揚武將軍馬成武威將軍劉尚入天水東觀漢記曰來歙征公孫述詔於􅊈積榖六萬斛驢四百頭負䭾蜀志曰諸葛亮悉大衆出斜谷以流馬運糧據武功五丈原與司馬宣王對於渭南亮每患粮運不繼是以分兵屯田晉書載記曰羅尚委城遁李雄遂克成都於時雄軍飢甚乃率衆就榖於郪掘野䑕等食之晉書曰祖逖伐陳留太子陳州石季龍救之徙陳州還襄國留姚豹等守州故城住西臺逖遣將韓潛等鎮東陳同大城賊從南門入放牧逖軍開東門相守四旬逖以布囊盛土如米狀使千餘人運上臺又令數人擔米為疲極而息於道賊果逐之皆棄擔而走賊就獲米謂逖士衆豐飽而胡成飢久益懼無復膽氣石勒將劉文堂以驢千頭運糧以饋姚豹逖遣韓錢馮鑄等追擊於汴盡獲姚豹宵退據東燕唐書曰貞元十五年令江淮轉運米每年米宜運二百萬石已來雖有此命而運米竟不過四十萬石又曰韋倫拜商州刺史兼御史中丞充荆襄等道租庸使㑹襄州禆將康楚元張加延擁衆為叛凶黨萬餘人自稱楚義王襄州刺史王政棄城遁走加延又南襲破江陵漢沔饋運阻絶朝廷旰食倫乃調兵駐鄧州界康楚元兇黨有來降必厚加賞數日後楚元衆頗怠倫進軍擊之生擒楚元以獻餘衆悉走收租庸錢物僅二百萬貫並免失墜又曰元和中鹽鐵使王播進陳許軍琵琶溝運圗先是中官李重秀奉命視之還言可以通漕至郾城下北潁口水運千里而近及上覽圗詔韓𢎞發卒以通汴河於是船勝三百石入潁又曰開成初以王彦成判度支嘗紫宸廷奏曰臣自掌計司按見管錢榖文簿皆量入以為出使經費必足無所刻削且八口之家有嵗蓄而軍用錢物一切通用悉隨色額占定終嵗之給無毫釐之差倘臣一旦愚迷欲自欺竊亦不可得也名曰度支占額圗既而又進供軍國自起至徳乾元之際迄於貞觀元和之初天下有觀察者十節度者二十有九防禦者四考經畧者三掎角之師大牙相制大都通邑無不有兵都記中外各額至八十餘萬長慶户口凡三百三十五萬以額約九十九萬通計三户資一兵合計天下租賦一嵗所入總不過三千五百餘萬而上供之數三之一焉二分之中二給衣賜自劉使兵等衣賜之外其餘四十萬衆仰給度支伏以時逢理安運屬神聖然而兵不可弭食哉惟時憂勤之端兵食自切臣謬司邦計遽奉睿圗輙纂事功庶禆聖覽又曰黃巢既來圍陳郡三百日關東仍嵗無耕稼人餓倚􅉹壁間賊俘人而食日殺數千賊有舂磨砦為石碓數數生納人於臼碎之合骨而食其流毒如是又曰秦宗權以蔡州叛所至屠殘人物燔燒郡邑西至關内東極青齊南出江淮北至衛滑魚瀾鳥散人煙斷絶荆榛蔽野賊既乏食啖人為儲軍士四出則鹽屍而從三國典畧曰陳覇先遣錢明領水軍出江寧浦要擊齊人糧運盡獲其船於是齊軍大餒殺馬驢而食之既而陳師以糧運不繼調市人餽軍建康令孔煥以麥屑為飯用荷葉裹之信宿之間得數萬裹以給兵士㑹陳蒨遣送米三千石鴨千頭覇先即炊黍煑鴨誓申一戰計糧分肉人獲數臠絶糧道漢書曰景帝初吳楚七國反以太尉周亞夫將亞夫問客鄧都尉曰䇿安出客曰吳楚兵銳甚難與爭鋒而剽輕不能久莫若引兵東北壁昌邑以梁委吳吳必盡銳攻之將軍深溝髙壘使輕兵絶淮泗之口塞吳饟式亮切道使吳梁相弊而糧食竭乃以全軍強制其疲極破吳必矣亞夫言於帝許之遂破吳軍又曰王莽末天下亂光武兄伯升起兵討莽為莽將甄音真阜梁丘賜所敗復收㑹兵衆還保棘陽阜賜乗勝留輜重於籃鄉引精兵十萬南渡潢淳臨泚水潢音黃泚音毗阻兩川間為營絶後橋示無還心伯升於是大饗軍士設盟約休卒三日為六部潛師夜起襲取藍鄉盡獲其輜重明日漢軍自西南攻甄阜下江兵自東南攻梁丘賜至食時陣潰遂斬阜賜後漢書曰韓遂敗走榆中榆中縣屬金城郡張温乃遣周慎將三萬人追討之温參軍事孫堅堅權之父也說慎曰賊城中無糧當外轉糧食堅願得萬人斷其運道將軍以大兵繼後賊必困乏而不敢戰若走入𦍑中并力討之涼州可定也慎不從引軍圍榆中城而韓章遂分屯葵園陜反絶其粮道慎懼乃棄城而退又曰曹公與袁紹相持官渡沮受言於紹曰北兵數衆多然而果勁不及南市榖虛少而貨財不及北南利在於急戰北利在於緩待宜曠以日月紹不從連營稍前逼官渡合戰曹公軍不利復壁紹為髙櫓起土山射營中背䝉楯衆大懼曹公乃為發石車擊紹樓皆破衆號霹靂車紹為地道欲襲曹公營輙於内為長壍以拒之又遣騎兵襲擊紹運車大破之盡焚其榖㑹紹遣將于瓊等將兵萬餘人北迎軍沮受說紹可遣將别為軍與袁以絶曹公之粮紹復不從瓊宿烏巢去紹軍四十里紹謀士許攸奔曹公攸謂曹公曰孤軍獨守外無求索危急之時也今袁氏輜重有萬餘兩而無嚴備可輕兵襲之不慮而至燔其積聚不過三日袁氏自敗也公乃選精銳馬步秉袁氏旗幟夜銜枚縳馬口從間道出人負束薪時有問者詒之詒音怡曰袁公恐曹操掠後軍兵以益備聞者信之既至輜重圍屯燎薪火光亘天地破瓊等悉斬之數日紹棄甲而遁蜀志曰姜維率衆侵魏依維山築二城使牙門將勾安李韶等守之聚羗胡質甚冦逼諸郡魏將陳泰禦之泰謂諸將曰麴城雖固去蜀險逺當須運糧羗夷患維勞役未必肯附今圍而取之可不血刅而拔其城雖其來救山道險阻非行兵之地乃使鄧艾等進兵圍之斷其運道及城外流水安等挑戰不許將士困窘分糧不足以稽日月維果來救出自牛頭與泰相對泰曰兵法貴在不戰而屈人今絶牛頭維無返道則我之擒也諸君各堅壘勿與戰自南渡白水循水而東使諸將截其還路維懼遁走安等孤懸遂皆降崔鴻十六國春秋曰前趙劉曜遣將劉𦙍西伐張駿之武威駿遣將辛􅺰韓瑛音英東拒劉𦙍屯於狄道城韓瑛進渡沃于嶺辛巖曰我擁衆數萬籍𤣥羗之銳宜速戰以滅之不爾久則變生瑛曰自夏末以來太白犯月辰星逆行白虹貫日皆變之大者不可以輕動動而不㨗為禍更深吾將久而斃之且曜與石勒相攻亂亦不能久積七十餘日軍糧竭遣辛巖督運於金城𦙍聞之大恱謂其將士曰韓瑛之衆十倍於吾糧廪將懸難以持久今分兵運糧可謂天授吾若敗辛巖瑛等自潰彼衆我寡且以死戰戰而不㨗當無疋馬得還於是咸奮遣騎三千襲巖於沃於嶺大敗之瑛軍遂潰死者三萬餘人三國典畧曰周王思政固守潁川思政運米數百車欲向孔城齊大都督破六韓常與洛州刺史可朱渾寶願前後要襲獲之乃啟於齊王澄曰常自鎮河陽已來頻出關口大谷二道所有要害莫不知悉請於形勝之處營築城戍安置士馬截其往來彼之咽喉既斷潁城吞滅可期且孔城以西年榖不稔東道斷絶亦不能存王納其計太平御覽卷三百三十二
