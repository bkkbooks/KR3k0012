  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_237-1a, image: WYG0895/WYG0895-0175c.png}
body:
  text: 太平御覽卷二百三十七宋李昉等撰職官部三十五總叙將軍左右衛將軍諸衛將軍附左右金吾衛將軍諸衛上將軍總叙將軍石氏中官占曰河鼓星主軍皷一曰三星主天子三將軍中央大星為大將軍左星為左將軍右星為右將軍所以備關梁而距難也周禮夏官上大司馬曰凡制軍萬有二千五百人一鄉之民也凡起徒役家一人也王六軍六鄉之數也鄉治文教軍定武功其道皆兼三才而兩之故數俱六也大國三軍公侯之封也成國不過半天子之六軍次國二軍諸伯之封小國一軍子男之封軍將皆命卿同視六事之人同於六鄉之大夫春秋之時列國有正卿為將軍又以亞卿一人為佐由執政者貪其權遂以陵遲皆非周公之舊也左傳襄十三年曰晉蒐於綿上以治兵使士丐將中軍辭曰伯游長昔臣習於知氏以佐之非能賢也請從伯游使荀偃將中軍士丐佐之使韓起將上軍辭以趙武孝經左契曰將軍順虎銜珠大夫正海出魚史記曰齊景公召穰苴與語大恱以為將軍將兵扞燕又曰孝文後六年匈奴入上郡周亞夫為將軍居細栁宗正劉禮為將軍居霸上祝兹侯徐廣曰表作松兹姓徐名悍也軍棘門以備胡漢書曰楚王召宋義計事而恱之因以為將軍范曄後漢書曰靈帝時望氣者以為京師當有大兵兩宫流血大將軍司馬許源說何進曰太公六韜有天子親于兵事可以威壓四方詔進大發兵講武于平樂觀下起大壇上建十二重五采華蓋髙十丈壇東北有小壇復建九重華蓋髙九丈引步兵騎士數萬人結營為陣天子親出臨住大華蓋下進住小華蓋下禮畢帝躬擐甲上馬稱無上將軍行陣三匝而還魏志曰太祖令曰司馬法將軍死綏魏書曰綏却也有角一尺無脚一寸也尸子曰十萬之軍無將軍必亂左右衛將軍諸衛將軍附六典曰左右衛將軍之職掌統領宫庭巡警衝衛之法令以督其屬之隊仗而總諸曹之職務焉其左右驍衛左右武衛左右威衛左右領軍衛將軍所掌之職皆如之晉書曰羊琇為晉臺左衛將軍又曰吳隱之遷左衛將軍雖居清顯祿賜皆班親族冬月無被嘗澣衣乃披絮勤苦同於貧庶何法盛晉中興書曰南頓王宗字延祖拜左衛將軍為肅祖所昵委以禁旅又曰王坦之字文度領左衛少有風格尚刑名之學嘗著廢莊論又曰虞譚陳略曹毗毛安之並為左衛將軍沈約宋書曰左右衛將軍晉文建國所置隋書曰薛世雄性亷謹凡所行軍破敵之處秋毫無犯帝由是嘉之帝嘗從容謂羣臣曰我欲舉好人未知諸君識否羣臣或曰臣等何能測聖心帝曰我欲舉者薛世雄羣臣皆稱善帝復曰世雄亷正節概有古人之風於是超拜右翊衛將軍煬帝以左右衛為之唐書曰元和中以前靈鹽等節度使王祕為右衛將軍祕在鎭無智略以馭人居常猜忌及多殺人以懼之衆益不附及召至踰月而授以衛將軍凡將相出入皆翰林草制謂之白麻祕始以責罷中書草制隋書曰來護兒煬帝即位遷右驍衛大將軍帝甚親重之大業六年從駕江都賜物千段令上先人塜宴父老州里榮之魏志曰許褚從太祖戰大破馬超等乃遷武衛中郎將武衛之號自此始也文帝踐祚遷武衛將軍又曰曹爽自散騎常侍轉武衛將軍爽秉政又以弟訓為武衛將軍王敦别傳曰敦子應字安期官至武衛將軍隋書曰獨孤盛為左屯衛將軍宇文化及之作亂也裴䖍通引兵至武象殿宿衛者皆釋仗而走盛謂䖍通曰何物兵形勢太異也䖍通曰事勢已然不預將軍事愼無動盛大罵曰老賊是何物話不及披甲與左右十餘人逆拒之為亂兵所殺唐書曰咸通中以伶官李可及為威衛將軍曹確執奏曰臣覽觀故事太宗初定官品令文武官共六百四十一員顧謂房𤣥齡曰朕設此官員以待賢士工商雜色之流假令術踰儕類止可厚給財物必不可超授官秩與衆賢君子比肩而立同坐而食太和中文宗欲以第官尉遲璋為王府率拾遺竇洵直極諫乃改授光州長史伏乞以兩朝故事别授可及之官帝不之聽又曰髙祖以李粲為左監門大將軍禮髙年也初髙祖問粲年幾對曰八十髙祖曰公清幹之譽聞於隋日今年齒雖邁筋力未衰但監門之職非公莫可意欲相委如何粲以年老辭讓髙祖曰藉公處分耳豈欲煩公筋力耶於是以粲自非殿庭皆乘蜀馬論者榮之又曰王及善除右千牛衛將軍髙祖謂曰朕以卿忠謹敕與卿三品要職他人非搜辟不得至朕所卿佩大横刀在朕側知此官貴否又曰李聽元和中為羽林將軍有名馬穆宗在東宫令近侍諷聽獻之聽以職總親軍不敢從及即位之始幽冀不靖太原與二鎭接境方議易帥宰臣進擬上皆不允謂宰臣曰李聽為羽林將軍不與朕馬是必可任五代史云周廣順二年十二月詔改左右威衛復為左右屯衛避太祖諱也左右金吾衛將軍六典曰左右金吾衛大將軍之職掌中宫及京城晝夜巡警之法以執禦非常百官表云秦有中尉掌徼循京師如淳曰所謂遊徼循禁備盜賊也顔師古曰徼謂遮繞之也音工釣反漢武帝太初元年更名執金吾應劭曰吾者禦也掌執金革以禦非常也顔師古曰金吾鳥名也主辟不祥天子出職主先導以備非常故執此鳥之象因以名官也緹騎二百人輿服導從車騎滿路羣僚之中斯最壯矣舊掌京師盗賊考按疑事漢郅都寗成王温舒减宣等皆截理横噬虎而冠者也一切治辦亦旋誅黜又置執金吾丞後漢掌宫外戒司非常水火之事衛尉廵行宫中金吾循儌宫外為表裏以擒奸討猾日三繞行宫外及主兵器自中興但専儌循不與他政又有執金吾吏文學執金吾佐執金吾員吏魏武秉政復為中尉晉初罷直至後周置武環率武候率下大夫各二人隋置左右武候府大將軍一人將軍三人掌車駕出入先驅後殿晝夜廵察執捕姦非烽候道路水草所宜廵狩師田則掌其營禁煬帝大業三年改為左右武候衛所掌軍事名佽飛漢官表曰漢有左弋令武帝太初元年更名佽飛掌弋射屬少府光武省之隋氏採舊名唐初又為左右武候府貞觀十年十二月馬周奏京城諸街置鼓罷𫝊呼龍朔二年改為左右金吾衛置大將軍一人所掌與隋同將軍二人副其事領官屬並隋置唐因之後漢書曰初光武適新野聞陰后美心悦之後至長安見執金吾車騎甚盛因歎曰仕宦當作執金吾娶妻當得隂麗華漢官宰尹下曰吾禦也掌執金革以禦非常緹騎二百人五百二十人輿馬導從充滿於路世祖㣲時歎曰仕宦當作執金吾是也漢書百官公卿表曰秦名曰中尉掌儌循京師有兩丞候司馬兵千人武帝太初元年更名執金吾又曰毋將隆為執金吾侍中董賢方貴上使中黄門發武庫兵前後十輩送賢及上乳母王阿舍隆奏武庫兵器天下公用國家武備繕治造作皆度大司農錢蘇林曰用度皆出大司農大司農錢自非乘輿不以給供養勞賜一出少府盖不以本職給末用不以民力供浮費别公私示正路也又曰郅都為中尉丞相條候至貴倨也而都揖丞相是時民樸畏罪自重而都獨先嚴酷行法不避貴戚列侯宗室見都側目而視號曰蒼鷹也東觀漢記曰馬防字孝孫拜執金吾性矜嚴公正上事處議多見用續漢書曰隂識拜執金吾位特進入則極言正諫至與賔客語不及國事常慕仲山甫匪躬之節所用掾史皆得天下俊哲虞延傅寛等是也又曰朱浮字叔元為執金吾帝以二千石長吏不堪任時有纎㣲之過者必見斥罷交易紛擾百姓不寧六年有日蝕之異浮因上疏切諫自是州郡奏長吏二千石不任位者事皆先下三公遣掾史案然後黜退又曰秩中二千石掌外司非常水火之事旦三繞行宫外又主兵器丞一人比千石華嶠後漢書曰賈復為執金吾更始郾王尹尊及諸將反上召諸將議以檄叩地曰郾最強宛次之復率爾對曰臣請擊郾上笑曰執金吾擊郾吾復何憂耶又曰耿秉為人威重有謀略拜執金吾毎行幸秉恒領宿衛謝承後漢書曰梁冀為執金吾嵗朝託疾不朝司隸揚雄治之詔以二月俸贖罪漢雜事曰辛慶忌明略威重任國柱石為執金吾魏書曰臧霸與曹休討吳破賊呂範於洞浦徵為執金吾毎有軍事帝咨訪焉又曰崔琰遷中尉琰聲姿髙暢眉目踈朗鬚長四尺七寸有威重朝士瞻望太祖亦嚴憚焉又曰徐奕太祖以為中尉手令曰昔楚有子玉文公為之側席汲黯在朝淮陽為之折謀詩稱邦之司直君之謂也唐書曰髙祖以徐世勣為右武候大將軍隋大業三年及唐初並為左右武侯至龍朔二年復為左右金吾詔曰念功愛善哲王彜訓紀德親賢有國通典黎州總管萊國公世勣本自黎陽擁徒歸順任以藩兵誠効克彰節義不渝夷險無變信同金石操擬松筠宜加寵命用超恒序可賜姓李氏又曰趙道興貞觀初厯遷左武候中郎將明閑宿衛號為稱職太祖嘗謂之曰卿父為隋武候將軍甚有當官之譽卿今克傳弓冶可謂不墜家聲因授右武候將軍其父時廨宇仍舊不改時人以為榮又曰裴諝為右金吾將軍建中初上以刑名理天下百吏震悚時十月禁屠以甫近山陵禁益嚴尚父汾陽王郭子儀隸人殺羊以門者覺之諝列奏狀上以為不畏强禦累遣宣諭或謂諝曰郭公有社稷功豈不為盖之諝笑曰非爾所解且郭公威權太盛上新即位必謂黨附者衆今發其細過以明不弄權耳吾上以盡事君之道下以安大臣不亦可乎又曰臧希讓為金吾大將軍骯髒好談時政屢以理體上干公卿詔令集賢院待制希讓無學術及處近地從容公卿間強引文言以自賢而所聞知多道途語毎發必差謬頗為士子所笑諸衛上將軍唐通典曰魏黄初中始有上大將軍以曹真為之吳亦以陸遜為上大將軍後周建德四年增置上大將軍隋並以為武散官不理事上大將軍從二品又曰唐武德初秦王既平王世充及竇建德髙祖以秦王功殊古今自昔位號不足以為稱乃特置天䇿上將軍以拜焉位在王公上又曰貞元二年九月詔曰六軍先已各置統軍一人今十六衛宜各置上將軍一人秩從其品繇是上將軍之官始列於品位太平御覽卷二百三十七
