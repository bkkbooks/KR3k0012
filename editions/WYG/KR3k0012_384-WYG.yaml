  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_384-1a, image: WYG0896/WYG0896-0409c.png}
body:
  text: 太平御覽卷三百八十四宋李昉等撰人事部二十五㓜智上說文曰㓜小也釋名曰兒始能行曰孺子孺弱也十五曰童故禮有陽童牛羊之無角者曰童山無草木亦曰童言無巾冠似之左傳僖下曰楚子將圍宋使子文治兵扵暌終朝而畢不戮一人子玉復治兵扵蒍終日而畢鞭七人貫三人耳國老皆賀子文飲之酒蒍賈尚㓜後至不賀子文問之對曰不知所賀子之傳政扵子玉曰以靖國也靖諸内而敗諸外所獲㡬何子玉之敗子之舉也舉以敗國將何賀焉且子玉剛而無禮不可以治民過三百乘不能以入矣苟入而賀何後之有又曰秦師過周北門左右免胄而下超乘王孫滿尚㓜觀之曰秦師輕而無禮必敗輕則寡謀無禮則脫脫易也入險而脫又不能謀能無敗乎又成公下曰晋欒書中行偃使程滑殺厲公使荀􅎆士魴逆周子于京師而立之悼公周生十四年矣大夫逆扵清源周子曰孤始願不及此雖及此豈非天乎抑人之求君使出令也立而不從安用君二三子用我今日否亦今日恭而從之神之所福也傳言少而有才所以能自固對曰羣臣之願也敢不唯命是聼戰國策曰文信侯疾故使張唐相燕弗肯行少庶子甘羅請行之文信侯叱去甘羅曰夫項橐七嵗為孔子師今臣年十二君其試焉奚遽言叱乃見張卿而行之又曰王孫賈年十五事閔王其母曰汝朝出而晚還則吾倚門而望汝暮出不還則吾倚閭而望汝汝事王王出走不知其處汝尚歸王孫賈乃入市中曰淖齒亂齊國殺王欲與我誅者袒右市中人從者四百人與之誅淖齒史記曰項羽擊陳留外黄不下數日已降項王令男子年十五以上詣城東欲坑之外黄令舍人兒年十三往說項王曰彭城强刼外黄外黄恐故且降待大王大王至又皆坑之百姓豈有所歸心從此以東梁地十餘城皆恐莫肯下矣項王然其言乃赦外黄漢書曰賈誼洛陽人年十八以能誦詩書稱扵郡中河南守呉公聞其秀才召置門下甚愛之乃言賈誼年少頗通諸家之書文帝召以為博士又曰翟方進汝南上蔡人年十三失父給事太守府為小吏號遲鈍不及事數為椽吏所辱方進自傷乃詣京師受經學後漢書曰任賢字長孫南陽宛人也年十二為諸生學扵長安明詩易春秋顯名太學學中號為任聖童續漢書曰黄琬字子琰江夏人少失父母而辨慧祖父瓊初為魏郡太守建和元年正月日蝕京師不見梁太后詔問所蝕多少琬年七嵗在傍曰何不言日蝕之餘如月之初瓊大驚即以其言應詔後深竒愛之時司空盛元疾瓊遣琬候問㑹江夏上蠻賊事到府元發書視畢㣲戯琬曰江夏大邦而蠻多士少琬舉手對曰蠻夷猾夏責在司空又曰應奉字世叔聰明自為童兒及長凡所經厯莫不暗記讀書五行並下又曰樂恢字伯竒京兆長陵人父為縣吏得罪令收將殺之恢時年十一常扵府寺門晝夜號泣令聞之即解其父又曰陳蕃字仲舉汝南平輿人年十五常閑處一室而庭宇蕪穢父友同郡薛勤來候之謂蕃曰孺子何不洒掃以待賔客蕃曰丈夫處世當掃除天下安事一室乎勤知其有清世志東觀漢記曰馬援字客卿㓜而岐嶷年六嵗能接應諸公專對賔客甞有死􅖄亡命者來過客卿逃匿不令人知外若訥而沉敏兄甚竒之以為將相器故以客卿字焉又曰班固字孟堅年九嵗能屬文誦詩賦及長遂博貫載籍九流百家之言無不窮究學無常師不為章句大義而已性寛和容衆不以才能髙大諸孺以此慕之又曰丁鴻年十三從桓榮受歐陽尚書三年而明章句善論難為都講遂篤志精銳布衣荷擔不逺千里又曰張堪字君逰年六嵗受業長安治梁邱易才美而髙京師號曰聖童又曰鄧禹字仲華南陽新野人年十三能誦詩授業長安時上亦逰學京師禹年雖㓜而見上知非常人遂相親附及漢兵起即策杖北渡追及上扵鄴又曰丞宫瑯耶姑蘇人少孤年八嵗為人牧猪鄉里徐子盛明春秋經授諸生數百人宫過其廬下見諸生講誦好因棄其猪而聼經猪主怪其不還來索見宫欲笞之門下生共禁止因留精舍門下樵薪又曰魯恭父建武初為甘陵太守卒官時年十二弟平年七嵗晝夜號踊不絶聲郡中賻贈無所受歸服䘮禮過成人又曰呉祐字季英陳留長垣人父恢為河南太守祐年十二恢欲殺青簡以冩經書祐諌曰今大人踰越五嶺逺在海濵其俗舊多珍怪此書若成則載之兼兩昔馬援以薏苡興謗王陽以衣嚢邀名嫌疑之間誠先賢所慎也恢乃止撫其首曰呉氏世不乏季子矣又曰和熹鄧后年五嵗太夫人為㫁髪夫人年耆目冥并中后額雖痛忍而不言左右怪問之后言曰難傷老人意故忍之又曰黄香字文强江夏安陸人年九嵗失母慕思憔悴㡬殆免喪鄉人稱其至孝年十二博覽傳記京師號曰日下無雙江夏黄童英雄記曰曹純字子和年十四䘮父業富扵財僮僕使人以百數純綱紀督御之不失其理好學問敬愛學士學士多歸焉由是為逺近所稱年十六為黄門郎漢雜事曰陳寔字仲弓漢末太史家占星有徳星見當有英才賢徳同逰者書下諸郡縣問潁川郡上事其日有陳太邱父子四人俱共會社小兒季方御大兒元方從抱孫子長文此是也魏氏春秋曰袁氏之敗也孔融與太祖書曰武王伐紂以妲己賜周公太祖後見問之對曰以今度之想當然耳融被收二子年八嵗時方奕棋端坐不起左右曰而父見執不起何也二子曰安有巢毁而卵不破者乎魏志曰鍾㑹字士季潁川長社人太傅繇小子也少敏惠夙成中護軍蔣濟著論曰觀其眸子足以知人㑹年五嵗繇遣見濟濟甚異之曰非常人又曰賈逵字梁道河東㐮陵人自為童戯弄常設部伍祖父習異之曰汝大必為將相口授兵法數萬言又曰楊俊同郡王象少孤特為人僕𨽻年十七八見使牧羊而私讀書因獲捶楚俊美其才質即贖象至家聘娶立屋然後與别又曰劉冀字恭嗣南陽安衆人年七嵗戯講堂上潁川司馬徳操撫其頭曰孺子孺子黄中通理寜自知不又曰司馬朗字伯逹河内温縣人年九嵗人有稱其父字者朗曰慢人者不敬其親客謝之十二試為童子郎又曰王粲為中郎蔡邕見而竒之時邕顯著貴重朝廷常車騎填巷賔客盈坐聞粲在門倒屣迎之及至年既㓜弱容狀短小一坐盡驚邕曰此為王公孫也有異才吾不及也吾家書籍文章盡當與之又曰陳羣字長文潁川許昌人祖父寔父紀叔父諶皆有盛名羣為兒時寔常竒之謂宗人父老曰此兒必興吾宗又曰常林字伯槐河内温人年七嵗父黨造門問林曰伯先在不汝何不拜林曰對子字父何拜之有扵是咸共嘉之又曰曹休字文烈太祖族子年十餘嵗見太祖太祖謂左右曰此吾家千里駒也使與文帝同止見待如子常從征討使領虎豹騎又曰夏侯惇字元譲沛國譙人年四嵗求師就學人有辱其師者殺之由是以烈氣聞呉書曰虞翻少好學有才氣年十二客有候其兄者不過翻翻追與書曰僕聞琥珀不拾腐草磁石不受曲針過而不存不亦冝乎客得書異之又曰沈友字子正呉郡人年十一華歆行風俗見而異之因呼沈郎可登車語乎友逡廵却曰先生銜命將以禆補先王之教齊風俗也而輕脱威儀猶負薪救火無乃更崇其熾乎歆慙曰自桓靈來未有㓜童若此者又曰陸績年六嵗扵九江見袁術術出橘與績績懐三枚去拜辭墮地術曰陸郎作賔客而懐橘乎績跪荅曰欲歸遺母術大竒之蜀志曰諸葛亮子瞻字思逺亮與兄瑾書曰瞻今已八嵗聰惠可愛嫌其早成不為重器耳晋書曰王戎㓜而頴悟神彩秀徹視日不眩裴楷見而目之曰戎眼爛爛如巖下電年六七嵗扵宣武塲觀戯猛獸在檻中虓闞震地衆皆奔走戎獨立不動神逸自若魏明帝扵閣上見而竒之又曰王澄字平子生而警悟雖未能言見人舉動便識其意衍妻郭性貪鄙欲令禆路上擔糞澄年十四諌郭以為不可又曰中宗太子紹㓜而聰哲年數嵗常置中宗膝上㑹長安使来中宗因問曰汝謂日與長安孰逺對曰日逺中宗問其故答曰不聞人從日邉來逺可知耳中宗異之明日㑹羣臣又問之對曰日近中宗失色曰何異昨日之言對曰舉目見日不見長安由是益竒之又曰王舒字允之總角時甞從伯敦敦與錢鳯謀逆而允之時飲酒帳中卧悉聞其言慮敦疑之便扵卧處吐涕狼藉敦果疑遣㸔之見吐唾以為醉又曰謝尚字仁祖豫章太守鯤之子㓜有至性八嵗風神夙悟鯤甞携之送客或曰此兒一座之顔囬也尚應聲曰坐無尼父焉識顔囬賔客莫不歎異年十七遭父憂丹陽尹温嶠弔之尚號哭極哀既而收涕告訴舉止異常嶠甚竒之又曰韓康伯早孤家貧年數嵗母為作􅃭令子康伯捉熨斗謂曰且著尋為汝作袴康伯曰已足不復煩母問其故答曰如火在熨斗中而柄亦熱今已着􅃭皆當煖也母異之王隠晋書曰王儉字元衡内史下邳陳邵擅名徐州邵聞儉年十四善屬文請作祝文邵謂郡客曰此生為文有可觀採命為督郵主簿邵遷給事儉每為定表晋中興書曰謝安字安石年四嵗桓彛見而歎曰此兒風神秀徹後當不减王東海總角神識深敏氣宇條暢丞相王導知之由是著名又曰范宣陳留人年十嵗能誦詩書甞以刀傷手捧手改容人問痛耶答曰受全之體而致毁傷不可處耳少好學手不釋卷博覽衆書善三禮又曰戴逵字安道譙國人少博學好談論善屬文能鼔琴工書畫其餘巧藝靡不畢綜總角時以鷄卵汁溲白瓦屑作鄭𤣥碑文為文手自刻字文既綺藻器亦妙絶時人莫不驚嘆知其深敏宋書曰劉秀之字道寳少孤貧有志操十許嵗時與諸兒戯扵前渚忽有大蛇來勢甚猛無不顛怖驚呼秀之猶不動衆並異焉又曰王僧逹㓜聰敏𢎞為州縣僧逹六七嵗遇有通訟者竊覽其辭謂為有理及入訟者亦進𢎞意其小留左右僧逹為申理闇誦不失一句又曰徐湛之㓜與弟淳之共車行牛奔車左右人馳來赴之湛之先令取弟衆咸嘆其㓜而有識又曰蔡興宗字興宗㓜為父廊所重謂有已風與親故書曰小兒四嵗神氣似可不入非類之室不與小人逰故以興宗為之名興宗為之字齊書曰王慈字伯寳瑯琊臨沂人司空僧䖍子也八嵗外祖宋江夏王義恭施寳物恣聼所取慈唯取素琴石硯義恭善之又曰傅昭六嵗而孤哀毁如成人為外祖所養十嵗扵朱雀航賣歴雍州刺史袁覬見而竒之覬甞來昭所昭讀書自若神色不改覬歎曰此兒神情不凡必成佳器又曰顧協從祖右光禄大夫張永甞携内外孫姪逰武邱山恊年數嵗永撫之曰兒欲何戯恊曰兒正欲枕石潄流永歎息曰顧氏興扵此子及長好學以精力稱又曰顧歡年六七嵗父使驅田中雀遂作黄雀賦而歸雀食稻過半父怒將撻之見賦乃止梁書曰沈璞字道真童孺神意閑審武帝召見竒璞應對頋謂林子曰此非常兒也初除南平王左常侍陳書曰王元規八嵗而孤兄弟三人隨母依舅氏往臨海郡時年十二郡土豪劉瑱者資財巨萬欲妻以女母以其兄弟㓜弱欲結強援元規泣謂曰姻不失親古人所重豈得苟安異趣輒婚非類母感其言而止崔鴻十六國春秋前凉録曰辛攀字懐逺年七嵗隨父爽在京師北地程曉爽之親友目攀而笑曰犁牛騂犢孺子之謂攀曰戯及人親非雅訓也曉及衆賔大竒異之又後趙録曰徐光字季武頓邱人父聰以牛醫為業光㓜好學有文才年十三嘉平中王陽攻頓邱掠之令主秣馬光但書柱為詩賦而不親馬事陽怒撻之啼呼終夜不止左右以白陽陽召光付紙筆光立為頌陽竒之又夏録曰土谷渾拾寅者䖍國之弟也年數嵗猶大啼笑母氏念憂其不慧艾樹洛干曰此兒吾家驪肩馴駒伯樂尚不能目之而况庸人哉終成吾門户者必在此子年六七嵗而器識不凡或謂之神童後魏書曰裴駿字神駒河東聞喜人㓜而聰恵親表異之稱為神駒因以為字駿從弟子安祖少而聰惠年八九嵗就師講誦詩至鹿鳴篇語兄云鹿雖禽獸得食相呼而况人也自此之後未甞獨食又曰任城王澄之子順字子和年九嵗師事樂安陳豐初書王羲之小學篇數千言晝夜讀誦旬有五日一皆通利豐竒之白澄曰豐十五從師迄于白首耳目所經未見此江夏黄童不得無雙也澄笑曰藍田生玉何容不爾三國典畧曰趙隠字彦深年五嵗母傅便孀居傅謂之曰家貧兒小何以能濟隠泣而言曰若天矜兒大當仰報年十嵗司徒崔光竒之謂賔客曰古人云觀眸子足以知之此兒必當逺至太平御覽卷三百八十四
