body:
  text: 太平御覽卷五百九十二宋李昉等撰文部八御製下御製下唐書曰德宗御中書麟德殿會百寮觀新樂詩仍令皇太子書以示百寮其序曰朕聞天地之德莫大於和萬物以生九功乃叙是以中春之首紀為令節布陽和之政暢亭育之功式宴且觀順時而舉蓋取象於交泰之義也今嵗華載陽嘉雪呈慶君臣同樂實獲我心近以聴政之餘叅比音律播於絲竹韻以歌詩象中和之容作中和之樂教習甫就畢陳於兹於是闢廣庭臨内殿張大㑹示羣臣干籥成文威儀有序禮情備浹中心是嘉上下之志通乾坤之義得善固未盡和莫甚焉聊復成篇以言其志詩曰芳嵗啓佳節物華當仲春乾坤既昭泰烟景含絪緼德淺荷𤣥貺樂成恩洽人前庭列鐘鼓廣殿延羣臣八卦隨舞意五音轉曲新顧非咸池奏庶叶南風薰式宴禮所重洽懽情必均同和諒在茲萬國希可親又曰貞元六年二月戊辰朔中和節宴百寮於曲江亭上賦詩賜之曰東風變梅柳萬㝢生春光中和紀月令方與天地長躭樂豈予尚懿兹時景良庶遂亭育恩同致寰海康君臣永終始交泰符隂陽曲沼水新碧華林桃稍芳勝賞信多歡戒之在無荒又曰貞元六年春三月庚子百僚宴於曲江亭上賦詩以賜之曰嵗閏節華晩衆芳繁暮春霽日天地晴元已風景新禊飲傳舊俗古今歡此辰至樂在同和絲竹奚所陳薰琴是賞心姑射可凝神不可尚躭緬浮觴曲水濵又曰貞元七年秋七月癸酉上幸章敬寺賦序皇太子詩在侍道和兼題于壁百寮畢和以班列焉其後京兆尹薛珏請皇太子書上詩序刻石而填之以金又曰貞元九年春正月庚辰朔上御含元殿受朝賀禮畢上賦退朝觀軍仗歸營詩以示宰臣曰獻嵗視元朔萬邦咸在廷端旒揖羣后迴輦閲師貞分行左右出轉斾風雲生眷此戎旅節載嘉良士誠順時頒宴賞亦以助文經又曰貞元十年秋九月戊子以重陽日宴餞賜百寮近臣初九日以雨罷宴及是方會宴上賦詩以賜百官曰雨霽霜氣肅天高雲日晴凉楓已墜葉寒菊仍舒榮懿此秋節晩更延遐賞情池臺列勝宴絲竹傳新聲至樂非外奬浹歡同中誠庶敦朝野意永使風化清又曰德宗至自興元御宣政殿冊拜李晟為司徒上思晟勲力為製紀功碑俾皇太子勒于石立於渭橋與天地悠久文多不載又曰德宗以馬燧平河中詔賜所撰宸扆台衡二銘并序曰朕每讀上古之事及唐虞之際君臣相得聖賢同時日夕孜孜講論古道或陳其鑒戒或諷以詠歌煥乎典謨百代是式有以見啓沃之道理化之蹟意甚慕之而未能逮也頃靈鹽節度使杜希全著文上獻多所規戒即為君臣箴用答其意河東等道副元帥司徒燧固請勒石貽厥後人朕以文既非工義又未備垂諸來裔良所恧焉起予者商因之有作庶乎朝夕自儆且俾後代知我有文武殿邦之臣也其宸扆銘曰天生烝民性本元淳嗜慾交馳利害糾紛無主乃亂樹之以君九域茫茫萬情紜紜目不備覩耳難徧聞覩之聞之矧又非真事失其源道逺莫親理得其要化行如神失源惟何不正其身得要惟何在能任人正身之方先誠其意罔從爾欲罔載爾偽體道崇德本仁率義必信若寒暑無私象天地感而遂通百慮一致任人之術各當其器捨短從長理難求備多士總集衆材咸遂知而必任任而勿二以天下之目為我鑒我鑒斯明以天下之心為我謀我謀則智求賢惟廣辨理惟精逆耳咈心必嘉乃誠順㫖茍容亦察其情斥去奸䛕全固忠貞先人立言為代作程諤諤者昌唯唯者傾繫以興亡其曷云輕承天子人夫豈不貴伊昔哲王夙夜祇畏馭朽為戒納隍在志神將害盈天匪假易四海為家夫豈不富伊昔哲王儉勤固陋土堦罔飾露臺罷構逺竒技淫巧放珍禽怪獸敬之慎之天地必祐欲令必行順人之情欲誠之著清己之慮心無億詐事必忠恕凡將有為靡不三思喜怒以節動静以時毫㕓或差禍害以隨慢易厥初悔其曷追刑不可長武不可恃作威逞力厲階斯起垂旒蔽聰黈纊塞耳含𢎞光大是以為美覆之如天愛之如子仁心感人率土自理嗟余寡昧嗣守丕圖冦盜荐興徳化未敷業業兢兢其敢以愉俯察物情上稽典謩作斯式言寘于座隅其台衡銘曰天列台星垂象於人聖人則天亦立輔臣以翼以佐為衡為鈞如耳目應心如股肱運身是則同體孰云非親隂陽相推四序成嵗君臣相得萬邦安憩感同風雲應若符契以道匡救盡規獻替木必從繩金其用礪帝者之盛時惟陶唐乃聞疇咨側陋明揚洎乎有虞二八騰芳爰逮伊尹相于成湯載生姜牙諒彼武王道無不行謀無不臧君聖臣賢運泰時康漢高既興蕭曹亦彰昭烈我祖應期而昌剗滅羣凶砥平四方惟衞及英啓闢封疆亦有魏徴忠謇昻昻偉兹衆材為國棟梁蕩蕩巍巍邦家有光是知道之廢興繫于時主治之得失資乎台輔經之以文緯之以武出為方邵入作申甫絶維載張闕衮斯補惟德是倚惟才是求才不易知德亦難周傅説板築夷吾射鈎任之不疑千載垂休體於至公何鄙何讐其惟哲王必賴良弼矧予不德闇於理術師旅繁起刑政多失遘兹艱屯夙夜祗慄翊我戴我實惟勲賢内熈庶績外總十連威武載揚謀猷日宣長城壓境巨艦濟川同心同德扶危持顛予嘉爾誠爾相予理惟后失道亦臣之恥自昔格言慎終如始功載鼎彛道冠圖史無俾伊䕫克専厥美作鑒勒銘永代是紀尋有詔書命勒石於起義堂西偏上為題額又曰貞元十二年上以聴政之餘深思理本迺著刑政箴并序序曰朕以南面勵精理道雖及和平之際未臻𤣥古之風夙夜孜孜勤求不怠夫安人以政輔政以刑蓋為之立中非使人從欲也是以務兼聴以酌羣臣擇庶官以資共理恒勉不足而遏其過我欲仁矣尚逮夫義哉然萬務是殷必戒其失聽政偶暇當防其逸聊綴斯文庶乎自儆爾大朴既散利欲是生惟辟御時建極作程導以仁政齊以異刑惠此下人致之和平立政伊何必循道德詳刑伊何必去煩刻不以人從欲不以枉傷直故百度惟貞萬方作式匪陽不生匪隂不成寛則致慢猛亦取怨酌于大猷戒厥偏見罔咈人志罔興人患邇言必察芻蕘必詢奉無私之心以誠其意廣無情之聴以得其真喜怒有節措置有倫是以令肅如秋化行如春無邇憸人無信側言憸人則敗政側言乃惑聴罔攻異端慎乃出令知人不易在觀其行事實不理法乃因時法非生弊聖哲不為道物類之情以通其變相天地之道以盡其宜教必明於順動必慮於違是以天覆之德日用不知六馬並馳在鈎御䇿五音並奏在理金石茍去偽邪可行蠻貊因人而理自古不易唐堯赭服夏禹泣辜以弼于理式矜其愚寧漏吞舟豈求噬膚陷之於過是曰毒痡天監孔明無臭無聲罔載爾偽必事謀始而戒於未形子臨兆人道存化育祇荷𤣥貺幸清九服一夫不獲若埋深谷思止其源庶登於樸監于往躅書以自朂又曰杜希全將赴靈州獻體要八章多所規諫德宗深納之乃著君臣箴以賜之其詞曰惟天惠人惟辟奉天從諫則聖共理惟賢皇立有極駿命不易總萬幾以成務齊六合之殊致一心不能獨鑒一目不能周視敷求哲人式序在位於戯君之任臣必求一德臣之事君咸思正直何啓沃之所宜亘古今而未得良以讜言者逆耳讒䛕者伺側故下情未通而上聴已惑俾夫忠賢敗於凶慝譬彼涇舟烝徒檝之亦有和羮宰夫膳之孰云理國不自得師覆車之軌予其懲而高自下升和由甘受惟君無良亦臣之咎聞諸辛毗牽裾魏后則有禽息竭忠碎首勉思獻替以平可否勿謂何傷自微而彰勿謂何害積小成大事有隠而必見令既出而焉悔皷鐘在宫聲聞於外浩然涉水朕未有艾將負扆以虛心期盡忠而納誨在昔稷契實匡舜禹近兹魏徴佑我太祖君臣叶德混一區宇肆予寡昧獲纘丕緖臣哉爾隣翼哉爾輔髙秋始肅我武惟揚綴此禁衞殿于大邦令聞方施嘉言乃昌是規是諫金玉其相詞髙理要入德知方總彼千慮偹于八章宣父有言起予者商殷有盤銘周有欹器或誡以詞或警以事披圖演義發于爾志與金鏡而髙懸將座右而同置人皆有初鮮慎厥終汝其夙夜明保朕躬無曰爾身在外而爾誠不通一言之應千里攸同導彼遐俗逹余四聰華夷仰德時乃之功既往既來懷賢忡忡唱予和汝式示深衷又曰貞元中賜羣臣會宴于曲江上令中使劉希昻宣慰上賜詩曰令節晚澄霽四郊烟靄空天清白露潔菊散黄金叢寡徳荷𤣥貺順時依百工綺筵歌鐘樂思與君臣同至化在亭肓相成資始終未知康衢詠所仰惟年豐又曰張建封來朝覲還鎮德宗賜詩曰牧守寄所重才賢生為時宣風自淮甸授鉞膺藩維入覲展遐戀臨軒慰來思誠忠在方寸感激非情詞報國爾所尚恤人予是資歡宴不盡懷車馬當還期榖雨將應候行春猶未遲勿以千里遥而云無已知又曰貞元十八年九月賜宰臣及中書門下兩省官宴于故馬璘池亭御製豐年多慶九日示懐詩以賜羣臣曰爽氣肅時令早衣聞朔鴻重陽有佳節具物忻年豐皎潔暮潭色芬敷新菊叢芳罇滿衢室繁吹凝烟空惠給信吾道保和惟爾同推誠致𤣥化天下期為公又曰憲宗以天下無事留意政典毎覽前代興亡得失之事皆三復其言又讀貞觀開元實録見太宗撰金鏡書及帝範上下篇𤣥宗撰開元訓誡思繼前躅遂採尚書春秋傳史記班范漢書三國志晉書晏子春秋呉越春秋新序説苑等書君臣行事可為龜鑒者集成十四篇一曰君臣道合二曰辨邪正三曰戒權倖四曰戒微行五曰任賢臣六曰納忠諫七曰慎征伐八曰戒刑法九曰去奢泰十曰崇節儉十一曰奬忠直十二曰修徳政十三曰諫畋獵十四曰録勲賢分為上下卷上自製其目曰前代君臣事迹至是以其書寫於屏風六扇至中書宣示宰相李藩裴􅀈曰朕近撰此屏風常所觀覽故令蹔將示卿藩等上表稱賀又曰文宗嘗夏日與學士聯句帝曰人皆苦炎熱我愛夏日長柳公權續之曰薫風自南來殿閣生微凉帝嘉之又曰裴度卧疾文宗遣中使賜度詩曰注想待元老識君恨不早我家柱石衰憂來學邱禱又曰文宗開成中駕幸龍首池觀内人賽雨自春不雨上孜孜憂勤徧禮羣望至是甘澤屢降中外感悦上賦詩喜雨云風雲方際會雷雨遂流滋薦幣虛陳禮動天實精思漸侵九夏節復在三春時霢霂垂朱闕飄颻入緑墀郊埛既霑足黍稷有豐期百辟同康樂萬方佇雍熙宰臣洎文武百官咸屬和焉家語曰昔者舜彈五絃之琴造南風之曲其辭曰南風之薰兮可以解吾民之愠兮薰風至之貌也南風之時兮可以阜吾民之財兮財得其時阜盛穆天子傳曰丙辰南遊於黄室之丘天子乃休日中大寒北風雨雪有凍人天子作詩三章以哀民哀愍也我徂黄竹員閟寒閟閉也帝收九行九行九道也傳曰經啟九道嗟我公侯百辟冡卿皇我萬民皇正也旦夕忽忘恒念也我徂黄竹員閟寒帝收九行嗟我公侯百辟冢卿皇我萬民旦夕勿窮有皎者鴼鴼鳥名也音路翩翩其飛嗟我公侯闕勿則遷居樂甚寡言守一居少樂不如遷土居無求安也禮樂其民言當以禮樂化其民天子曰余一人則淫不皇萬民漢武帝集曰奉車子侯暴病一日死上甚悼之乃自為歌詩西京雜記曰始元元年黄鵠下太液池上為歌曰黄鵠飛兮下建章羽肅肅兮行蹌蹌金為衣兮菊為裳唼喋荷荇出入蒹葭自顧菲薄媿爾嘉祥漢武帝栢梁詩曰日月星辰和四時梁王曰驂駕駟馬從梁來餘羣臣各賦一句魏文帝典論自叙曰初平之元董卓弑主鴆后蕩覆王室是時家家思亂人人自危名豪大俠富室强族飄揚雲㑹萬里相赴兖豫之師戰於滎陽河内之甲軍於孟津卓遂遷大駕西都長安而山東大者連郡國中者嬰城邑小者聚阡陌百姓死亡暴骨如莽時余年五嵗上以世方擾亂教余學射六嵗而知射又教余騎馬八嵗而能騎射矣是以少好弓馬于今不衰建安十年始定冀州濊貊貢良弓燕代獻名馬時嵗之暮春弓燥手柔草淺獸肥與族兄子丹獵于鄴西終日手獲獐鹿九雉兎三十余又學擊劍桓靈時有虎賁王越善斯術河内史阿得其法於越余從阿學之甚精嘗與平虜將軍劉勲奮威將軍鄧展共飲展有手臂曉五兵又稱其能空手入白刃時酒酣耳熱方食芋蔗便以為杖下殿數交三中其臂左右大笑展意不平求更為之復正截其顙坐中驚視余還坐笑曰昔陽慶使淳于意去其故方授秘術余亦願鄧將軍捐棄故伎更受要道也一坐盡歡余於他戱弄之事少所喜唯於彈棊略盡其巧少為之賦雅好書籍雖在軍旅手不釋卷每定省從容常言人少好學則思専長則善忘長大而能勤學者唯吾與袁伯業耳余是以少誦詩論及長而備厯五經四部史漢諸子百家之言靡不畢覽魏文帝芙蓉池詩曰乗輦夜行遊逍遥步西園雙渠相灌溉佳木遶通川卑枝拂羽蓋脩條摩蒼天驚風扶輪轂飛鳥翔我前丹霞夾明月華星出雲間上天垂光采五色一何鮮壽命非松喬誰能得神仙遨遊快心意保已終百年魏文帝遊宴詩曰置酒坐飛閣逍遥臨華池神飈自逺至左右芙蓉披緑竹映清水秋蘭被幽崖月出照園中冠佩相追隨客從南方來為我吹參差潛魚猶伏浦聴者未云疲髙文一何綺小儒安足為蕭蕭廣殿隂雀聲愁北林衆賔還城邑何以慰吾心太平御覽卷五百九十二
