body:
  text: 太平御覽卷七百二十九宋李昉等撰方術部十相上左傳文公曰王使内史叔服來㑹葬公孫敖聞其能相人也見其二子焉叔服曰穀也食子難也收子穀也豐下必有後於魯國又曰初楚子將以商臣為太子訪諸令尹子上子上曰君之齒未也而又多愛黜乃亂也楚國之舉恒在少者且是人也蜂目而豺聲忍人也可不立也弗聽又宣公曰楚司馬子良生子越椒子文曰必殺之是子也熊虎之狀而豺狼之聲不殺必滅若敖氏矣諺曰狼子野心是乃狼也其可畜乎子良不可子文以為大慼及將死聚其族曰椒也知政乃速行矣無及於難且泣曰鬼猶求食若敖氏之鬼不其餒而周書曰師曠見太子晉曰汝聲清浮汝色赤火色不壽王子曰後三年上賔於帝汝慎毋言殃將及師曠歸未及三年吿死者至史記曰秦王見尉繚元禮衣服食飲與繚同繚曰秦王為人綘凖長目鷙啄鳥鷹豺聲少恩而虎狼心居約易出人下得志亦輕食人我布衣也然見我常身自下我誠使秦王得志於天下天下皆為虜矣不可與久遊乃亡去王覺固止之以為秦國尉又曰吕公曰臣少好相人多矣無如季相願季自愛臣有息女願為箕帚妾吕公女乃吕后也季漢髙祖字也又曰吕后與兩子居田中耨有一老父過請飲吕后因甫之老父相后曰夫人天下貴人令相兩子見孝惠曰夫人所以貴乃由此男相魯元亦皆貴又曰薄􅁎母媪之許負所相相薄􅁎當生天子薄􅁎少時與管夫人趙子兒相約曰富貴無相忘而管趙先幸漢王漢王坐河南成皋臺兩美人相與笑薄􅁎初約漢王問其故以實吿漢王心憐薄􅁎召一幸生代王即漢文帝也又曰姑布子卿見趙簡子簡子徧召其子使相之子卿曰無為將軍者簡子曰趙氏其㓕乎子卿曰吾嘗見一子於路之子也簡子召子毋恤毋恤至子卿起曰此真將軍矣簡子曰其母賤翟婢也奚道貴哉子卿曰天所授也雖賤必貴自是之後簡子盡召諸子與語毋恤最賢簡子乃告諸子曰吾藏寳符於常山之上先得者賞諸子馳之恒山求無所得毋恤還曰已得符矣簡子曰奏之毋恤曰從常山臨代代可取也簡子於是知毋恤果賢乃廢太子伯魯而以毋恤為太子又曰平原君對趙王曰澠池之㑹臣察武安君之為人小頭銳上瞳子白黑分明眡瞻不轉小頭銳上斷敢行也瞳子白黑分明者見事明也眡瞻不轉者執志彊也眡讀如視古文通用可與持久難與爭鋒亷頗為人勇􅋧而愛士知難而忍耻與之野戰則恐不如守足以當之王從其計又曰蔡澤者燕人也遊學于諸侯大小甚衆而不遇因從唐舉相曰聞子相李克百日之内持國秉政有之乎曰有之曰若臣者如何唐舉熟視而笑曰先生蝟鼻如蟲也巨肩魋顔蹙齃膝攣兩脚曲也吾聞聖人不相殆先生乎蔡澤知唐舉戲之乃曰冨貴吾所自有吾所不知者壽也願聞之舉曰先生之壽從今以往四十三嵗矣蔡澤笑謝而去謂其御者曰吾將飯梁齧肥躍馬疾驅懷黄金之印結紫綬於腰揖讓人主之前肉食富貴四十三歲亦足矣又曰英布少時遇相者曰當黥而後王布被刑欣然果為王又曰上使善相者相鄧通曰當貧餓死文帝曰能富貴通者在我於是賜通蜀道嚴銅山得自鑄錢景帝立有告通盜出徼鑄錢下吏驗問頗有遂竟案盡没其家一簪不得著身謂長公主遂寄死人家又曰條侯周亞夫為河内太守時許負相之曰君後三嵗而侯後八嵗為將相貴重於人臣無兩其後九嵗而餓死負指其口有螣蛇入口此餓死法也又曰韋賢為吏至大鴻臚有工相之至丞相有男四人使相之至第二子𤣥成相工曰此子貴當封侯竟為丞相又曰衞青為侯家人少時歸其父使牧牛母子皆奴畜之不以為兄弟數青嘗從上至甘泉居室有一鉗徒相青曰貴人也官至封侯青笑曰人之奴得無笞罵即足矣安得封侯漢書曰上立劉濞於沛為吳王王郡五十三城已拜受印髙帝召濞相之曰若狀有反相因拊其背曰漢後五十年東南有亂者豈汝耶然天下同姓一家慎無反濞頓首言曰不敢又曰李陵為匈奴所圍上意陵戰死召陵母及婦使相者視之無死喪色後聞降上甚怒又曰翟方進字子威汝南上蔡人家世微賤方進年十二三失父孤學給事大守府為小史號遲鈍不及事數為掾吏所詈辱方進自傷乃從汝南蔡父相問已能所宜蔡父大竒其形貎謂曰小史有封侯骨當以經術進方進聞蔡父言心喜因病歸家辭其後母欲西至京師受經後母憐其㓜隨之長安織履以給方進又曰黄霸與善相者共載出見一婦人相者言此婦人當貴不然相書不可用矣霸推問之乃其鄉里巫家女也霸即娶為妻與之終身後為丞相後漢書曰世祖以朱祐為護軍常見親幸舍之於中祐侍讌從容曰長安劉公有日角之相此天命也又曰龍淵善相劉宏造淵淵聞宏聲乃起迎曰公當極位也宏曰家貧負債可得貴乎淵曰公匆然也張濟就相淵曰事劉宏可至三公濟事宏後為解瀆侯既去南陽桓帝崩迎解瀆侯為天子是為靈帝濟為司空也又曰明德馬皇后伏波將軍援女其母嘗使善相者看后曰此女必將大貴遂為帝王妃然而少子養他子得力當踰於所生耳又曰章德竇皇后扶風平陵人大司徒融之曾孫也父勲尚東海恭王疆女泚陽公主后其長女也家既廢壞數從相工問息耗耗惡也息耗猶言善惡也見后者皆言當大尊貴非臣妾容貎又曰和熹鄧后傳曰㓜時嘗有相者蘇文見后大驚曰此成湯之骨法也貴不可言家人竊喜而不敢宣又曰漢法常因八月筭人遣中大夫與掖庭丞及相工於洛陽鄉中閲視良家童女十三以上二十以下姿色端麗合法相者載還後宫擇視可否乃用登御所以慎明聘納詳求淑喆東觀漢記曰班超行詣相者相者曰祭酒布衣諸生耳而當封侯萬里之外超問其狀相者指曰生鷰頷虎頭飛而食肉此萬里侯相也又曰李固字子堅漢中南鄭人也司徒郃之子固貎壯有竒表鼎角匿犀足履龜文少好學常步行隨師不逺千里魏志曰管輅族兄孝國居在升丘輅往從之與二客㑹客去後輅謂孝國曰此二人天廷及耳口之間同有凶氣異變俱起雙魂無宅流魄於海骨歸於家少許時當並死後數十日二人飲酒醉夜共載車牛驚下入漳河中皆即溺死矣又曰鍾繇嘗與族父瑜俱至洛陽道遇相者曰此童有貴相然當厄於水努力慎之行未十里度橋馬驚墮水幾死瑜以相者言中益貴繇由是供給資費使得專學舉孝亷又曰朱建平沛國人善相術穎川荀攸鍾繇相與親善攸先亡子㓜繇經紀其門户欲嫁其女與人書曰吾與公達曾共使朱建平相建平曰荀君雖少然當以後事付鍾君吾時嘲之曰唯當嫁􅀸阿騖耳何意此子竟早殞殁戲言遂驗乎今欲嫁阿騖使得好處為追思建平之妙雖唐舉許負何以復加耶又曰文帝為五官將坐上㑹客三十餘人文帝問朱建平巳年壽又命徧相衆賔建平曰將軍當壽八十至四十時當小有厄願謹護之謂夏侯威曰君四十九位為州牧而當有厄厄若得過可年至七十致位公輔謂應璩曰君六十二位為常伯而當有厄先此一年獨見白狗而旁人不見也謂曹彪曰君據藩國至五十七當厄於兵宜善防之後文帝皇初七年年四十病因謂左右曰建平所言八十謂晝夜也吾其決矣頃之果崩夏侯威為兖州刺史年四十九十二月上旬得疾念建平之言自分必死至三十日夜半卒應璩六十一為侍中直省内欻見白狗問之衆人悉無見者於是數聚㑹并遊田里飲晏自娛過期一年而卒曹彪封王五十七坐與王凌通謀賜死凡說此輩無不如言魏書曰文帝甄皇后漢光和五年十二月丁酉生每寢寐家中髣髴見如有人持玉衣覆其上常共恠之後相者劉良相后及諸姊指后曰此貴乃不可言蜀志曰先主穆皇后陳留人也兄吳壹少孤壹父素與劉焉有舊焉有異志聞善相者相后當大貴遂為子瑁納后瑁死后寡居先主既定益州而孫夫人還吳羣下勸先主娉后先主疑與瑁同族法正進曰論其親疎何與晉文之於子圉乎於是納后為夫人又曰張裕曉相術每舉鏡視面自當刑死未嘗不撲之於地也又曰鄧芝字伯苗義陽新野人也漢末入蜀知益州從事張裕善相芝往從之裕謂曰君年過二十位至大將軍封侯吳志曰漢以孫䇿逺脩職貢遣使者劉琬加錫命琬語人曰吾觀孫氏兄弟才秀明逺然皆禄祚不終唯中弟孝亷形貎竒偉骨體不恒有大貴之表年又最壽爾其識之晉書曰裴秀傳曰文帝未定嗣而屬舞陽侯攸武帝懼不得立問秀曰人有相否因以竒表示之秀後言於文帝曰中撫軍人望既茂天表如此固非人臣之相也由是世子乃定又曰孝武李太后諱陵容本出㣲賤始簡文帝為㑹稽王有三子繼夭自道生廢黜獻王早世其後諸􅁎絶孕將十年帝乃令善相者召諸愛妾而示之皆云非其人又悉以諸婢媵示焉時后為宫人在織坊中形長而色黑宫人皆謂之崑崙既至相者驚云此其人也帝以大計召之侍寢后數夢兩龍枕膝日月入懷意以為吉祥向儕類說之帝聞而異焉遂生孝武帝及㑹稽文孝王鄱陽長公主晉書曰王覽祥之弟也初吕䖍有佩刀工相之以為必登三公可服此刀䖍謂祥曰苟非其人刀或為害卿有公輔之量故以相與祥始固辭强之乃受祥臨薨以刀授覽曰汝後必興足稱此刀覽後奕世多賢才興於江左矣又曰羊祐少喪父遊汶水之濵父老謂之曰子有好相年未滿六十必建大功於天下既而去莫知其所在又羊祜傳曰祜㓜時有善相墓者言祜墓有帝王氣若鑿之則無後祜遂鑿之相者見曰猶出折臂三公而祜竟墮馬折臂位至三公而無子又曰豫章人雷煥妙達緯象張華乃要煥宿屏人曰可共尋天文知將來吉凶因登樓仰觀煥曰僕察之久矣唯牛斗之間頗有異氣華曰是何祥也煥曰僕察之金精上徹於天耳華曰君言得之吾少時有相者言吾年六十位登三事當得寳劍佩之斯言豈効歟又曰檀憑之嘗有善相者晉陵韋叟見憑之大驚曰卿有急兵之厄其候不過三四日耳宜深藏以避之不可輕出及桓𤣥將皇甫敷之至羅落橋也憑之與劉裕各領一隊而戰軍敗為敷軍所害又曰魏詠之字長道任城人家素貧而躬耕為事好學不倦生而兔缺有善相者謂之曰卿當富貴後果如言又曰王彌少遊俠京師隱者董仲道見而謂之曰君豺聲豹視好亂樂禍若天下騷擾不作士大夫矣晉中興書曰陶侃少漁雷澤夢生八翼飛至天門而不入相者師珪曰君位當上公為八州都督太平御覽卷七百二十九
