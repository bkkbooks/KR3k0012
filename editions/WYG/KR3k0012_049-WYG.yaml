  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_049-1a, image: WYG0893/WYG0893-0419c.png}
body:
  text: 太平御覽卷四十九宋李昉等撰地部十四西楚南越諸山景山荆山荆門山勾將山虎牙山孤山髙筐山佷山宜陽山丹山小酉山芋山嵩梁山崇山武山壺頭山天門山黄聞山風門山石帆山虎齒山移山淳于山武陵山平都山陽岐山高都山原闕君山小廬山静福山方臺山攸縣雲陽山烏龍白騎山文斤山石燕山萬嵗山黄箱山麓山昭山五溪山錢石山采玉山玉山臨賀山馬嶺山彈丸山百丈山灕山隠山獨秀山南溪山龍蟠山堯山雲母山馬鞍山慮山火山浮石山景山盛宏之荆州記曰景山在上洛縣西南二百里東與荆山連接有沮水源出焉其山一名雁浮山荆山之首曰景山雁南翔北歸偏經其上土人由兹改名雁山又為雁塞山荆山山海經曰荆山首曰景山金玉是出此即卞和抱璞之處南臨青山北接雁塞通林交麓峭峙相望雖羣峰競起而荆山獨秀卞和得玉於此山獻厲王王使玉人相之曰石也刖其左足厲王薨獻之武王玉人相之又曰石也刖其右足和乃抱璞泣荆山之下河圖括地象曰荆山為地雌上為軒轅星荆門山袁山松宜都山川記曰南崖有山名荆門北對崖有山曰虎牙二山相對其荆門山在南上合而下空徹山南有像門也勾將山袁山松勾將山記曰登勾將山南望見宜都江陵近在目前沮潭沔漢諸山嵎嵎時見逺眺雲夢之澤皛然與天際四顧總視衆山數千仭者森然羅列於足下千仞以還者􅐑嵬如丘浪勢焉今在上洛縣西北虎牙山袁山松宜都山川記曰虎牙山有石壁其文黄赤色形如齒牙孤山郡國志曰安逺有陸抗故城城之南有孤山袁山松為郡嘗登此山以四望見大江如縈帶舟船如鳬雁焉髙筐山袁山松勾將山記曰登勾將北見髙筐山嶷然半天荆州圗副云昔堯時大水此山不沒如筐因以為名焉佷山宜都山川記曰佷山山谷之内有石穴穴出清泉有神魚大者二尺小者一尺釣者先請多少拜而請之數滿便止水側有異花欲摘之者亦如魚請又有異木名千嵗木葉似棗冬夏常青宜陽山宜都記曰宜陽山有風井穴大如甕夏出冬入有樵人置笠穴口風噏之入後於長楊溪口得笠則知潛通焉丹山宜都記曰丹山時有赤氣籠井如丹故有此名小酉山盛宏之荆州記曰小酉上石穴中有書千卷相傳秦人於此講學因留之故梁湘東王云訪酉陽之逸典是也芋山盛宏之荆州記曰芋山有蹲鴟如兩斛大食之終身能不飢今民取食之嵩梁山盛宏之荆州記曰嵩梁山在澧水之陽望之如香爐之状今名石門吴永安六年自然洞開𤣥朗如門三百丈門角上各生一竹倒垂下拂謂之天帚孫休以為嘉祥置縣因山為名隋文帝改曰石門山也崇山盛宏之荆州記曰崇山書云放驩兠於崇山在澧陽縣南七十五里武山武陵記曰武山髙可萬仭山半有盤瓠石窟中有一石狗形云是盤瓠之遺像又有班蛇四眼身大十圍山有水出謂之武溪是也在縣之西壺頭山武陵記曰壺頭山在縣東馬援所穿室内有蛇如百斛船云是援之餘靈天門山武陵記曰天門山山上有葱如人所種畦隴成行人欲取之先禱山神乃取氣味甚美不然不可得岩中有書數千巻人得見而不可取黄聞山武陵記曰昔有臨沅黄道真住黄聞山側釣魚因入桃花源陶潛有桃花源記今山下有潭名黄聞此蓋聞道真所説遂為其名也風門山武陵記曰風門山有石門去地百餘丈每欲風起此門先有黑氣若煙隐隠而上斯湏風起竟日石帆山武陵記曰石帆山危起若數百幅帆形虎齒山武陵山記曰虎齒山形如虎齒民嘗六月祭之不然輙有虎害移山武陵記曰移山在􅊈陽界本在江北岸因風雨之勢一夕移渡江南岸後以此名之淳于山武陵記曰淳于山與雉山相近在辰州武陵二郡界絶壑之半有一白雉逺望首尾可二丈伸足翔翼若虗中翻飛即上視之乃有一石雉舒翅綴著石上山下有石室數畝望室裏雖闇猶見銅鐘髙丈餘十枚其色甚光眀武陵山武陵記曰武陵山中有秦避世人居之尋水號曰桃花源故陶潛有桃花源記又云山上有神母祠平都山神仙傳云後漢延光元年隂長生於馬名生邀求仙法乃同長生入青城山中煮黄土為金以示之立壇唼血取太清神丹經授之乃别去長生後於平都山白日昇天即此山是也山在南賔縣北二里陽岐山荆南記曰石首縣陽岐山山無所出不足稱數本屬南平界范元平記云故老相承云胡伯始以境内無山于此山上計偕簿君山博物志曰君山洞庭之山是也帝之二女居之曰湘夫人帝女遣精衛至王母取西山之玉印印海北山庾穆之湘州記云昔秦皇欲入湘觀衡山而遇風浪溺敗至此山而免因號為君山又荆州圗副云湘君所遊故曰君山有神祈之則利涉山下有道與吳包山潛通上有美酒數斗得飲不死漢武帝故事云帝齋七日遣欒大將男女數十人至君山得酒欲飲之東方朔曰臣識此酒請視之因即便飲帝欲殺之朔曰殺若朔死此為不騐若騐殺亦不死帝赦之小廬山衡山圖經曰小廬山一名浮丘山在縣西一百八十里髙六里三十步東西二十里南北四十里言其山似九江廬山故名小廬山又故老相傳謂浮丘公上昇之所兼有道觀存焉静福山衡山圖經曰静福山在縣北五十里有梁廖冲者守清虚為本郡主簿西曹祭酒湘東王國常侍大同三年家於此山先天二年飛昇於此山後刺史蔣防敬慕髙風刻石焉方臺山蕭誠荆南志曰華容方臺山出雲母土人採之先候雲所出之處於下掘取無不大獲往往有長五尺者可以為屛風當掘之時忌有聲響則所得麄惡攸縣雲陽山遁甲經曰沙土之地雲陽之墟可以避時可以隠居雲陽氏古之仙人姓氏因號雲陽山在攸縣仙方記云南嶽縣有福地有松膏實甘鮮可餌相傳云服食練行之人多來採此松膏而服之不苦澁與諸處松有别烏龍白騎山湘川記云汝城縣東有烏龍白騎山逺望似城有黑石如龍白石如馬羅列號曰烏龍白騎山文斤山湘川記曰耒陽文斤山上有石牀方髙一丈四面緑竹扶踈常随風委拂此牀大旱則禱雨時應石燕山甄烈湘川記曰石形似燕大小如一山眀雲浄即翩翩飛翔羅含湘中記云石燕在零陵縣雷風則羣飛翩翩然其土人來採有乾者今合藥或用萬嵗山盛宏之荆州記曰黄箱山一名黄岑山在東南三十里其郴水所出即是五嶺之一從東第二騎田嶺是也又有浪井井三日一涌麓山盛宏之荆州記曰長沙西岸有麓山其下有精舎左右林嶺環廻泉澗精舎旁有一石每至嚴冬其上不停霜雪宋淵麓山記曰山足曰麓蓋衡山之足也昭山宋永初山川記曰昭山下有泉潭深無底是湘水最深之處昔有舟人覆於此潭其槽并甑有名題號後於洞庭尋得即知暗通也五溪山長沙圗經曰五溪山在縣西北五十八里髙二里北入朗州界吳黄龍三年潘濬將軍五萬討武陵五溪蠻在此山立營截住徒黨因以為名按溪水自郡州武剛縣東北流至岳州沅江縣合益水益陽城記云在益水之陽水出縣北流入資口在縣門橋下皆五溪之下口也又關雲長屯軍資水北按即一名茱茰江也吴甘寧拒之云聞吾咳唾彼即不敢過江是此處今號為雲長瀬錢石山湘川記曰曲江縣東有錢石山其状四方有石臺其石三面壁立其上碎石如錢故謂之錢石山采玉山湘川記曰曲江縣有采玉山卉木滋茂泉石澄徹相傳云採玉於此因以得名玉山湘川記曰玉山下有廟曾有人得玉瑛於此有銀山白石山越王山又浮山其地躡一處則百餘步地動臨賀山盛宏之荆州記曰臨賀山東山中有二竹大數十圍有盤石徑四丈極方正如彈碁局兩竹屈垂拂掃石上絶無塵穢未至數十里聞風吹若簫管之聲馬嶺山郡國志曰郴州馬嶺山本名牛脾山山上有仙人蘇躭壇即郴人也為兒童時與衆童牧更直守牛毎躭守牛牛不敢散嘗與衆兒獵即乗鹿人笑之曰龍也去郡百二十里母臨食晚往買鮓湏㬰即還一日有衆賔來躭啓母曰受性當仙仙人合招躭去今年疾疫甚飲家中井水即無恙又種藥於園梅樹下可治百病買此水及藥過於供飬便去母遽視之衆賔皆白鶴也以躭常乘白馬故號馬嶺山彈丸山水經注曰臨桂彈丸山有涌泉奔流迅激東注於灕水山龕及溪中有石如彈丸因以石名焉驗其山有石竇下深數丈洞穴深逺莫䆒其極百丈山桂林風土記曰百丈山在郡城東北七十五里一名把杖山疊障深重逺延西南數百里四接郡界莫窮逺近自府北驛路徑穿其中俗以﨑嶇險阻故以百丈名之又以林巒深邃人皆持兵以防猛獸因此亦名把杖山灕山桂林風土記曰灕山在城南二里灕水之陽因以名焉一名沉水山其山孤㧞下有澄潭上高三百餘尺傍有洞穴廣數丈南北直透上有怪石欹危藤蘿榮茂世亂民保以避寇旱或禱祀頗靈隠山桂林風土記曰隠山在州之西郊先是榛莾翳薈古莫知者寶厯初李渤出鎮遂尋其源見石門半開有水淵澈乃夷薙蕪穢䟽通岩穴石林磴道若天造靈府不可根本因號隠山獨秀山桂林風土記曰獨秀山在城西北一百步直聳五百餘尺週圍一里平地孤㧞秀異下有洞穴凝垂乳竇路通山北傍圍百餘丈豁然眀朗宋光禄卿顔延年牧此郡常於此石室中讀書遺跡猶存嘗賦詩云未若獨秀者嵯峨郭邑開是也南溪山桂林風土記曰南溪山在縣之東五里餘其山聳㧞千尺烟翠凝空近郡所少其溪東注與桂江合龍蟠山桂林風土記曰龍蟠山本名盤龍山有石洞深致洞中天然石牀石盤洞門數重人秉燭遊常見龍跡跡大如椀洞有水水中有魚四足有角如龍形人殺之即風雨晦㝠前使李渤給事改為隠山連其所也堯山郡國志云廣州堯山髙四千丈自番禺交趾見之有颶風風𤼵折樹翻湖焉雲母山續南越志云天后朝曾城縣有何氏女服雲母粉得道於羅浮山山因所出以名之馬鞍山南粤志曰始皇朝望氣者云南海有五色氣遂發卒千人鑿之以斷山之崗阜謂之鑿龍今所鑿之處形如馬鞍故名焉慮山裴闗廣州記云東莞縣有慮山其側有楊梅山桃只許於山中飽食不得取下如取下山輙迷路徑火山嶺表録云梧州對岸西火山山下水澄潭水深無極其火每三五夜一見於山頂每至一更初火起匝其頂如野花之狀深廣十丈餘少頃而息或言其下有寶珠光照於上如火上有荔枝四月先熟以其地熱故為火山也浮石山交州記云海中有浮石山而峙髙數十丈去永平營百餘里浮在水上太平御覽卷四十九
