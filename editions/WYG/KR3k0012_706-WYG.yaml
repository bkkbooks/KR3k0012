body:
  text: 太平御覽卷七百六宋李昉等撰服用部八牀榻胡牀牀許慎說文曰牀身之安也釋名曰牀裝也所以自裝載也方言曰牀齊魯謂之􅀢陳楚之間謂之第音滓又音姊北燕朝鮮謂之樹秦晉之間謂之杠南楚趙東齊海岱之間謂之㯜其上板衛之北郊趙魏之間謂之牒易曰初六剥牀以足蔑貞凶象曰剥牀以足以滅下也六二剥牀以辨蔑貞凶象曰剥牀以辨未有與也六四剥牀以膚凶象曰剥牀以膚切近災也又曰巽在牀下象曰巽在牀下上窮也詩曰乃生男子載寢之牀禮曰曽子寢疾樂正子春坐於牀下曽元曽申坐於足童子隅坐而執燭童子曰華而睆大夫之簀與華美也簀牀第也曽子曰然斯季孫之賜也我未之能易也元起易簀命元起也曽元曰夫子之病革音棘矣不可以變幸而至於旦請敬易之曽子曰爾之愛我也不如彼君子之愛人也以徳細人之愛人也以姑息吾何求哉吾得正而斃焉斯已矣舉扶而易之反席未安而沒左傳曰齊無知弑其君殺孟陽于牀注云陽小臣代公居牀又曰楚子圍宋宋大懼使華元夜入楚師登子反之牀曰寡君使元以病告又曰夏子庾卒楚子使薳子慿為令尹訪於申叔豫叔豫曰國多寵而王弱國不可為也遂以疾辭方暑掘地下氷而牀焉重繭衣裘鮮食而寢楚子使醫視之復曰瘠則甚矣而血氣未動乃使子南為令尹周禮曰王府掌王之衽席牀第國語曰晉獻公寢而不寐郤叔虎曰牀第之不安邪驪姬之不在側邪戰國策曰孟嘗君至楚獻象牀郢之登徒直送之不欲行見孟嘗君門人公孫戌曰象牀之直千金傷此若髪標賣妻息不足以償足下能使僕無行先人有寶劒願獻之戌曰諾范瞱後漢書曰袁術僭號人情離叛欲北至青州曹操使劉備邀之至江寧坐簀牀而歎曰袁術乃至於此乎歐血而死又曰向栩性卓詭常於竈北坐板牀上如是積久板乃有膝踝足指之處又曰羊茂字季寶為東郡太守冬日坐百羊皮夏月坐一榆木板牀蔬食出界買鹽䜴食之又曰薛淳為漢中太守夏但坐板牀不設席冬坐羊皮河内髙𢎞為瑯琊相亦然也魏志曰陳登字元龍許汜與劉備並在荆州牧劉表坐汜曰陳元龍河海之士豪氣不除備問汜君言豪有事耶汜曰昔遭亂過下邳見元龍元龍無主客之意不相與語自上牀卧使客卧下牀備曰君有國士之名今天下大亂帝王失所望君憂國忘家有濟世之意而君求田問舎無言可采是元龍所諱何縁當與君語如小人欲卧百尺樓上卧君於地下何但上下牀之間耶表大笑晉書曰武帝㑹宴凌雲臺衛瓘託醉因跪帝牀前曰臣欲有言因以手撫帝牀曰此坐可惜帝意乃悟因謬曰公真大醉也瓘於此不復言又曰齊獻王攸特為文帝所寵愛每見攸輙撫牀呼其小字曰此桃符坐也幾為太子者數矣又曰中宗元帝也既登尊號百官陪列詔王導升御牀共坐導固辭曰太陽下同萬物蒼生何由仰照中宗乃止又曰陶淡字起靜好道養年七十五六便絶榖設小牀常獨坐不與人共又曰太尉郄鑒使人求女壻於王導導令就東廂遍觀諸子使者歸謂鑒曰王氏諸少年並佳然見問咸自矜持唯一人在東牀坦腹而食獨若不聞鑒曰正此佳耳訪之乃逸少也以女妻之又曰桓𤣥從荆州下都簒位所坐御牀忽陷殷仲文進曰將由聖徳淵重厚地不能載𤣥大恱燕書曰公孫鳳隠於昌黎九城寢於土牀也沈約宋書曰武帝初開國有司奏東西堂施局脚牀銀塗釘上不許使用直脚牀釘用鐡又曰江湛為元兇劭所害初湛家數見怪異未敗之日所眠牀忽有數斗血又曰王微不仕元兇之變微尋書玩古遂至足不履地終日端坐皆生埃唯當坐處獨淨又曰羊戎好為雙聲江夏王義恭嘗設齋使戎布牀須臾王出以牀狹乃自臨牀戎曰官家恨狹更廣七寸王笑曰卿豈惟善雙聲乃辨士也又曰張敷為中書舎人狄當周赳並管要務以敷同省名家欲詣之赳曰彼若不相容接便不如不往詎可輕行當曰吾等並已員外郎矣何憂不得共坐敷先方設二牀去壁三四尺二客就席數呼左右曰移我逺客赳等失色而去其自標遇如此又曰王僧達大明中以歸順功封寧陵縣五等侯遷中書舍人黄門郎路瓊之太后兄慶之孫也宅與僧逹門並嘗盛車服詣僧達僧達將獵已改服瓊之就坐僧達了不與語謂曰身昔門下騶人路慶之者是何親遂焚瓊之所坐牀齊書曰紀僧真幸於武帝稍厯軍校容表有士風謂帝曰臣小人出自本縣武吏遭逢聖時階榮至此為兒婚得荀昭先女郎時無復所須就陛下乞作士大夫帝曰此由江斆謝瀹我不得措意可自詣之僧真承㫖詣斆登榻坐定顧命左右曰移吾牀讓客僧真喪氣而退又曰虞愿除後軍將軍褚彥囘詣愿不在見其眠牀上積塵埃有書數卷彦囘歎曰虞君之清乃至於此令人掃地拂牀而去又曰竟陵王子良為㑹稽郡閣下有虞翻舊牀罷任還乃致以歸後於西邸起古齋多聚古人器服以充之又曰少帝夜醉蕭坦之與曹道劉挾抱還延昌殿玳瑁牀上梁書曰侯景既簒位聞義師轉近猜忌彌深牀前闌錡自曉然後見客又曰長沙王懿孫植性恬靜處一室牀有膝痕宗室衣冠莫不楷則又曰魚容性奢侈侍妾百餘人不勝金翠服翫車馬皆一時之絶有眠牀一張皆是蹙柏四面周匝無一有異通用銀鏤金花兩重為脚又曰賀革字文明少以家貧躬耕供養年二十始輟耕就父受業精力不怠有六尺方牀思義未達則横臥其上不盡其義終不肯食又曰西域龜茲等國其王坐金牀隨太嵗與妻並坐接客後魏書曰魏收讀書夏月坐板牀隨樹隂諷誦積年牀板為之脫減而精力不輟又曰韓務除龍驤將軍郢州刺史獻七寶牀象牙席唐書曰貞觀十八年召三品已上賜宴於𤣥武門太宗操筆作飛白羣臣乘醉就太宗手中相競散騎常侍劉洎登御牀引取然後得之其不得者咸稱洎登牀罪當死請付法司太宗笑曰昔聞婕妤辭輦今見常侍登牀莊子曰麗之姬艾封人之子也晋國之始得之也涕泣沾襟及其與王同筐牀食芻豢而後悔其泣也商君書曰明者無所不見人主處匡牀之上而天下治論衡曰孔子將死遺秘書曰不知何一男子自謂秦始皇上我堂踞我牀南方志曰南方老人以龜支牀及老人死舁牀龜尚活文集曰紫宫門外有天牀六星世本曰紂為玉牀東宫舊事曰太子有素栢局脚牀七具漢武帝内傳曰武帝受西王母眞形六甲雲飛十二律帝盛以黄金封以白玉函珊瑚為牀索錦為帷安者相集皇甫謐髙士傳曰老萊子隠蒙山之陽支木為牀神仙傳曰衛叔卿入幸山有紫雲鬰金白玉為牀真人周君傳曰周義山字季通令㑹仙人在金屋大室以彩玉為牀馬明先生别傳曰明生隨神女還岱宗石室中金牀玉几西京雜記曰武帝為七寶牀雜寶屏風八寶帳設於宫中時人謂為寶宫又曰昭陽殿設玉牀又曰韓嫣以玳瑁為牀拾遺記曰董偃常卧延清之室畫石為牀石文如畫體甚輕出郅支國上設紫瑠璃帳火齊屏風又曰石季倫屑沈水香如塵末而置象牀上使所愛者踐之無跡則賜眞珠百琲百琲珠百枚若有跡者則節其飲食令體弱故閨中相戲曰爾非細骨輕軀那得百琲眞珠又曰頻斯國有楓林林東有大石室可容萬人坐壁上刻為三皇之像天皇十三頭地皇十一頭人皇九頭皆龍身亦有膏燭之䖏緝石為牀牀上有膝痕深二三寸衡山記曰仙人室中有黄玉床盛𢎞之荆州記曰長沙郡有賈誼所穿井旁局脚石牀一牀可容人坐其形古制云誼所坐牀也西征記曰金郷焦氏山北有漢司𨽻校尉曽峻塜前有石牀長八尺瑩摩鮮明叩之即鳴時太尉從事中郎傅珍之諮議叅軍周安穆折石牀各取一頭為曽氏之後所訟鄴中記曰石虎御牀殿方三丈餘其牀皆局脚髙下六尺後宫别房中有小形玉牀又有轉關牀射鳥獸異物志曰獸麡賫柴二音狼形如麋而角向前入林則得之角正四據人因以作踞牀異苑曰沙門支法存有八尺沈香板牀刺史王淡息切求不與遂殺而籍焉籍没也後息疾法存出為祟世說曰袁紹年少時曽夜以劒遣人擲魏武小下不着帝揆其後必髙因帖臥牀劒至果髙語林曰簡文為撫軍時所坐牀上塵不聽左右拂見鼠行跡視以為佳雜五行書曰凡安牀東首貧賤疾病西首富南首貴北首死兵書曰将坐牀無故自動下欲害之夢書曰夢牀所壞者為憂妻也曹植九詠曰蕙幬兮荃牀柴子泰七折曰下筦上簟華鏤之床劉楨續慮賦曰布玳瑁之席設觜􅏲觜􅏲大龜也之牀馮玫瑤之几對金精之盤李尤卧床銘曰體之所安寢處之歡乆則敬慎崇德逺姦榻釋名曰長狭而卑曰榻言其榻然近地也小者坐三人也謝承後漢書曰徐穉字孺子豫章人陳蕃為太守不接賓客唯穉來特設一榻去則懸之又曰周璆字孟玊陳蕃為太守璆來置一榻去則縣之蜀志曰簡雍性簡傲佚蕩自諸葛亮以下則獨擅一榻須枕臥語無所屈吳志曰周瑜薦魯肅孫權引肅合榻對飲言議宋書曰當陽侯劉彥節既貴士子自非三署不得上方榻時以此少之又曰顔延之為秘書監光禄勲太常時沙門釋惠林以才學為文帝所賞朝廷政事多與之謀遂為士庻歸仰上每引見常升獨榻延之甚嫉焉因醉曰昔同子驂乗袁絲正色此三台之座豈可使刑餘居之上變色又曰王瞻字明逺一字升鸞負氣傲俗好貶裁人物仕宋為王府叅軍常詣劉彥節直登榻曰君侯是公孫僕是公子引滿促膝唯余二人彥節外雖酬之意甚不恱齊書曰孔休源字慶緒博學為晉安王府長史甚得人譽王深相倚仗常於中齋别施榻云此是孔長史坐人莫得預焉其見敬如此魏書曰元順為吏部尚書右僕射上為登階向榻見榻甚故問都令史徐忤起曰此榻曽見先王坐順即哽塞涕泗交流久而不能言遂令換之梁書曰臨汝侯猷為益州頗僭濫客筵内遂有香燈都稜切不置連榻武帝知之以此為僭還都以憂愧成疾卒唐書曰𤣥宗命太常韋縚讀時令每月一節每孟月朔日上御宣政殿策置一榻東置面案令韋縚坐而讀之又曰李峴為相元載於政事堂置榻邀宣事中官坐峴至叱左右去榻唐髙士傳曰管寧自越海歸常坐一木榻積五十餘年未嘗箕股榻上當膝處皆穿郭子曰杜預拜鎮南將軍朝士悉至客皆在連牀芊雅舒後至曰杜元凱復以連榻坐客不坐便去列仙傳曰脩羊公者魏人也止華陰山石室有懸石牀臥其上石盡穿陷也胡牀風俗通曰靈帝好胡牀董卓擅胡兵之應也魏志曰裴潜為兖州刺史常作一胡牀及去官留以掛柱齊書曰張景真僭侈武帝拜陵還景真白服乘舴艋坐胡牀觀者咸疑是太子梁書曰武帝軍至新林楊公則自越城移屯領軍府壘北樓與南掖門相對嘗登樓望戰城中遥見麾蓋縱神鋒弩射之矢貫胡牀左右皆失色公則曰虜幾中吾脚談笑如初又曰侯景既簒位時着白紗帽而尚披青袍頭挿象牙梳牀上設胡牀及筌蹄着靴垂脚坐北齊書曰武成胡后與沙門曇獻通布金錢於獻席下又掛寶裝胡牀於獻屋壁武成平生之所御者也庾肩吾賦胡牀詩曰傳名乃外域入用信中京足欹形已正文邪體自平臨堂對逺客命旅誓初征何如淄館下淹留奉盛明太平御覽卷七百六
