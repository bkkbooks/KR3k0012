body:
  text: 太平御覽卷二百八十二宋李昉等撰兵部十三機畧一機畧一孫子曰凢戰者以正合以竒勝正者當敵竒兵從旁擊其不備故善竒者無窮如天地不竭如江海終而復始日月是也死而更生四時是也故聲不過五五聲之變不可勝聞色不過五五色之變不可勝觀味不過五五味之變不可勝嘗戰勢不過竒正竒正之變不可勝窮也竒正相生如循環之無端孰能窮之哉故水之疾至於漂石者勢也鷙鳥之擊至於毁折者節也是以善戰者其勢險其節短勢如彍弩節如發機紛紛紜紜聞亂而不可亂渾渾沌沌形圓而不可敗也左𫝊曰齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而䟽陳之使乗車者左實右偽以斾先輿曵柴而從之以揚塵齊侯見之畏其衆也乃脫歸齊師夜遁師曠告晉侯曰鳥烏之聲樂齊其遁矣邢伯告中行伯曰有班馬之聲齊師其遁又曰吳從楚師及清發將擊之夫槩謂王曰困獸猶鬭况人乎若知不免而致死必敗我若使先濟者知免後者慕之蔑有鬭心矣半濟而後可擊也從之又敗之楚人為食吳人及之奔食而從之又曰鄭人侵衞牧以報東門之役衞人以燕師伐鄭鄭將祭足原繁洩駕以三軍軍其前使曼伯子元潛軍軍其後燕人畏鄭三軍而不虞制人鄭二公子以制人敗燕師于北制君子曰不備不虞不可以師又曰宋襄公及楚人戰于泓宋人既成列楚人未既濟未盡渡泓水也司馬子魚曰彼衆我寡及其未既濟也請擊之公曰不可既濟而未成列又以告公曰未可既陣而後擊之宋師敗績公傷股門官殱焉國人皆咎公公曰君子不重傷不擒二毛二毛頭上有白髪者也古之為軍也不以阻隘也不因阻隘以求勝寡人雖亡國之餘宋商紂之後也不鼓不成列子魚曰君未知戰勍敵之人隘而不列天贊我也勍强也言楚在險隘不得陳列天所以佐宋也阻而鼓之不亦可乎猶有懼焉雖因阻隘之猶恐不勝也且今之勍者皆吾敵也雖及胡耉獲則取之何有於二毛今之勍者謂與吾競者也胡耉老者之稱也耉音苟明耻教戰求殺敵也明設刑戮以耻不果也傷未及死如何勿重言尚能害已也若愛重傷則如勿傷愛其二毛則如服焉言苟不欲傷殺敵人則本可不須闘也三軍以利用也為利興也金鼓以聲氣也鼔之佐士衆之聲氣也利而用之阻隘可也聲盛致志鼓儳可也儳巖未整陣也儳音讒通典曰宋公違之而敗也又曰越伐吴吴子禦于笠澤夾水而陣越為左右勾卒勾卒五五相著別為左右屯也勾音鉤使夜或左或右鼓譟而進吴師分以禦之越以三軍潜渉當吴中軍而鼓之吴師大亂遂敗之左右勾卒為聲勢以分吴而三軍精卒并力擊其中軍故得勝吴越春秋越伐吴起軍於江南乃分兵為左右軍將有私卒六千人為軍日昏乃令左軍衘枚泝江五里右軍衘枚㳂江五里夜半鳴鼓吴師聞之大駭曰人來攻我乎因分其軍為二軍拒越越王乃以其中軍衘枚潛渉不鼓因而襲攻之吴師大敗此與左氏傳事同小異故附于此又曰吴子闔廬問於伍貟曰初而言伐楚余知其可也而恐其使余徃也又惡人之有余之功也今余將自有之矣伐楚何如對曰楚執政衆而乖莫適任患適音的若為三師以肄焉𨽻猶勞也一師至彼必皆出彼出則歸彼歸則出楚必道敝罷弊於道亟肄以罷之亟数也音噐肄音羊至切多方以誤之既罷音疲而後以三軍繼之必大克之闔廬從之楚於是乎始病終於吴師入郢郢楚都也又曰吴伐越越子勾踐禦之陣于㰎李㰎將遂切勾踐患吴之整也使死士再擒焉不動使敢死之士徃輙為吴師所擒欲使吴師亂取之而吴不動使罪人三行屬劒於頸以劒注頸行户郎切而辭曰二君有理理軍旅也臣奸旗鼓犯軍令也不敏於君之行前不敢逃刑將歸死遂自剄也師屬之目越子因而伐之大敗之又曰楚子圍宋宋公孫固如晉告急先軫曰報施救患取威定伯於是乎在矣狐偃曰楚始得曹而新婚於衞若伐曹衞楚必救之則宋免矣又曰晉楚戰于城濮楚将子玉從晉師晉師陣于莘北胥臣以下軍之佐當陳蔡子玉以若敖之六卒将中軍曰今日必無晉矣鬬宜申将左鬬勃将右晉禆将胥臣䝉馬以虎皮先犯陳蔡陳蔡奔楚右師潰陳蔡属楚之師狐毛設二斾而退之斾大旗也又建二斾而退使若大将稍却也欒枝使輿曳柴而偽遁曳柴起塵詐為敗走楚師馳之原軫郤溱以中軍公族横擊之公族公家之士也狐偃以上軍夾攻楚左師潰楚師敗績子玉收其卒而止故不敗晉師三日館榖館舍也食楚軍榖三日也又曰楚遣鬭㢘帥師及巴師圍鄾音憂鄧養甥􅆅甥􅆅音男帥師救鄾三逐巴師不克鬭㢘衡陣其師於巴師之中以戰而北衡横也分巴師為二部鬬㢘横陣於其間以與鄧師戰而為其所敗鄧人逐之背巴師而夹攻之楚師偽走鄧師逐之背巴師巴師攻之楚師自前與戰也鄧師大敗鄾人宵潰宵夜也又曰晉師伐秦秦置毒涇上流師人多死又曰楚師伐吴鍼音針尹固與王同舟王使執燧象以奔吴師燒火燧繫象尾使赴吴師驚却之鍼軄深切又曰時邾人城翼翼邾邑也還将自離姑離姑邾邑也在今費縣故武城之南大夫公孫鉏曰魯将禦我欲自武城還循山而南至武城而還依南山行不欲過武城鉏助魚切大夫徐鉏丘弱茅地三子邾大夫曰道下過雨而將不出是不歸也謂此道下山濕遂自離姑遂過武城武城人塞其前以兵塞其前道㫁其後之木而弗殊邾師過之乃推而蹷之遂取邾師又曰晉将陽處父侵蔡父音甫楚將子上救之與晉師夾泜而軍泜直利切處父患之使謂子上曰吾聞之文不犯順武不違敵子若欲戰則吾退舍子濟而陣欲避楚使渡成陣而後戰遲速唯命不然紓我紓緩老師費財亦無益也乃駕以待子上欲渉太孫伯曰不可晉人無信半渉而薄我悔之何及不如紓之乃退舍楚退欲使晉渡陽子宣言曰楚師遁矣遂歸楚師亦歸太子商臣譖子上曰受晉賂而避之楚之耻也罪莫大焉王殺子上戰國䇿曰秦伐趙趙以趙奢之子代㢘頗為将距秦將王齕於長平齕音狠勿切秦王聞之乃隂使武安君白起為上將軍而王齕為禆將軍令軍中有敢泄武安君者斬馬服子至則出兵擊秦軍秦軍佯敗而走張二竒兵以劫之趙軍逐勝追造秦壁秦壁堅距不得入而秦竒兵二萬五千人絶趙軍又一軍五千騎絶趙壁間趙軍分而為二粮道絶而秦出輕兵擊之趙戰不利因築壁堅守以待救至秦王聞趙食道絶王自之河内賜民爵各一級發年十五以上悉詣長平遮絶趙救及粮食至九月趙卒不得食四十六日皆内隂相殺食來攻秦壘欲出為四隊四五復之不能出其時馬與銳卒自相搏戰秦軍射殺之軍大敗卒二十餘萬人降皆坑之又曰燕軍大破齊國齊將田單守即墨知士卒可用乃身操版鍤與士卒分功妻妾編行伍之間盡散飲食饗士令甲卒皆伏使老弱女子乗城遣約降於燕燕軍皆呼萬嵗田單又收人金得千鎰令即墨富豪遺燕將書曰即墨即降願無掠虜吾族家妻妾令安堵燕将大喜許之燕軍由此益懈田單出軍擊大破之又曰燕師伐齊已下七十餘城圍即墨未下齊将田單乃收城中得千餘牛為縫繒衣畫以五綵龍文束兵刃於其中角而灌脂束葦於尾燒其端鑿城数十穴夜縱牛壮士五千人随其後牛尾熱怒而奔燕軍燕軍夜大驚牛尾炬火光明炫燿燕軍視之皆龍文所觸盡死傷五千人因銜枚擊之而城中皷譟從之老弱者皆擊銅噐為聲聲動天地燕軍大駭敗走而齊七十餘城皆復為齊又曰燕軍騎劫攻齊即墨齊將田單拒守乃宣言曰吾惟懼燕軍之劓所得齊卒置之前行與我戰即墨敗矣燕人聞之如其言城中人見齊降者盡劓皆怒堅守唯恐見得田單又縱反間曰吾懼燕人掘吾城外塜墓戮先人可為寒心燕軍盡掘壟墓燒死人即墨人從城上遥見皆涕泣共欲出戰怒皆十倍因大敗燕又曰魏趙相攻齊將田忌引兵救趙孫臏曰夫解雜亂紛糺者不控棬巨員切救鬭者不捍擑音㦸批亢𢷬虛形格勢禁則自為解耳今魏趙相攻輕兵鋭卒必竭於外老弱罷於内君不若引兵疾走入大梁深據其街路衝其方虛彼必釋趙而自収弊於魏也田忌從之直走大梁魏師遂退又曰齊孫臏謂齊王曰凡伐國之道攻心為上務先伏其心今秦之所恃為心者燕趙也當収燕趙之權今說燕趙之君勿虛言空亂必將以實利以回其心所謂攻其心者也史記曰秦伐韓軍於閼與趙王召趙奢而問可救不對曰道逺險狭譬兩䑕鬬於穴中将勇者勝王乃命救之秦軍武安西皷譟勒兵屋瓦盡裂趙奢堅壁留二十八日不行秦間來入奢善食而遣之間還報曰去國三十里而不行秦大喜秦間去趙奢卷甲而趍之軍士許厯曰秦人不意趙師至此其來氣盛將軍必厚集兵以待之先據北山上者勝奢許諾即以萬人趨之秦兵後至争山不得上奢縱兵大破秦軍解閼與之圍又曰李廣軍敗為匈奴生得佯死騰上胡兒善馬抱兒南馳以故得脫太平御覽卷二百八十二
