  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_697-1a, image: WYG0899/WYG0899-0238a.png}
body:
  text: 太平御覧卷六百九十七宋李昉等撰服章部十四履舄韈履釋名曰履禮也飾足所以為禮亦曰拘也所以拘足也複其下曰舄舄腊也久立地濕故複其下使乾腊也不借言賤易有宜各自畜不假借之也齊人曰摶借摶借猶把鮓鹿之貌也曰麄絲麻韋草皆同名鹿麄措也言所以安措足也說文曰履足所依也靸小兒履也鞮革履也廣雅曰履紟謂之綦世本曰於則作履方言曰絲作之履麻作之不借麄者謂之㞜朝鮮列水之上謂之卭角南方江沔之間揔謂之麄梁益謂之㞜或謂之䋀履其通語也徐土邳圻之間謂之印角緉􅥭關之東西或謂之緉或謂之􅥭其通語也史記曰張良常逰於下邳圯上有一老父至良所堕其履圯下顧謂良曰孺子下取履良愕然欲歐之為其老彊忍下取履殳曰履我良業為取履因長跪進之又曰東郭先生待詔公車貧困飢寒衣弊不完行雪中履􅋰有上無下足盡踐地道中人笑之又曰趙平原君使人于春申君欲誇楚為瑇􅈘簮刀劔之室飾以珠玊而春申君客三千餘人其上客皆躡珠履趙使大慙又曰淳于髠曰杯盤狼籍履舄交錯漢書曰王莾好高冠厚履又曰鄭崇哀帝擢為尚書僕射数諫争每見曵革履上笑曰我識鄭尚書履聲魏志曰曺公令曰議者以祠廟當觧履吾受錫命帶劔不觧履上殿今有事於廟而觧履是尊先公而替王命敬父祖而簡君王也吾不敢脱履上殿蜀志曰先主少孤織履為業曺公罵曰賣履舎長又曰劉琰妻胡入賀太后后特㽞胡經日乃出胡有美色琰疑其與後主有私呼卒伍撾胡以履摶靣胡具以言告琰坐下獄有司議曰卒非撾妻之人靣非受杖之地琰竟弃市晉書曰夜武庫火累代之寳皆焚焉孔子履漢祖斬蛇劔王莽頭並失又曰苻健時淋雨河水溢浦津監冦登得一履於河長七尺三寸内指跡長一尺三寸續晉漢陽春秋曰江州刺史王𢎞造陶淵明無履𢎞從人脫履以給之語左右為彭澤作履左右請履度淵明於衆坐伸脚令度及履至着而不疑晉惠帝起居注曰帝還洛陽至陵下謁無履取左右履着下拜趙録曰佛圖澄卒𦵏後郭門吏報石季龍云是師携一履西去季龍發其墓唯見一履與一石後魏書曰王遵業從容恬素若處丘園嘗着穿履好事者多毁新履以學之宋書曰益州道士邵碩元徽二年忽告人云吾命終困卧而死後人見碩在荆州上眀以一隻故履縳左脚而行甚疾遂不知所之齊書曰髙祖儉素宫人盡令着紫絲履太公金匱復之書曰行必慮正六韜崇侯虎曰今周伯昌懐仁而善謀冠雖弊禮加於首履雖新法以踐地可及其未成而圖之又曰昔帝尭王天下黼衣絓履不弊不更為也晏子曰公問曰子近市識貴賤乎時公繁刑晏子曰踊貴履賤公愀然遂緩刑又曰景公為履黄金之綦飾以銀連以珠良玊之約其長尺又曰景公為履飾以金玊服以聼朝履重僕不能舉之問曰天寒乎晏子曰古之制衣服冬輕而煖夏重而清金玊之履是重而寒也公入撤履荘子曰儒者冠圓冠者知天時履方履者知地形孫卿子曰大布之衣粗絲之履可以養體也又曰曽子居衛捉衿而肘見納履而踵决韓子曰鄭人有欲買履者先自度足而置其坐徃市而忘操之見履乃曰吾忘度足乃歸取之市罷不得履人曰何不試以足曰寕信度數無自信也又曰文王履係觧視左右盡賢無可使係者因俛而係之又曰魯人身善織履其妻善織縞而徙於越或謂之曰子必窮履飾足也而越人跣縞為冠也而越人披髮欲不窮可得乎賈子曰天子黒方履諸侯素方履大夫素圓履賈誼書曰昔楚昭王與呉戰楚軍敗昭王走而履决失之行三十歩復旋取左右問曰何惜此一踦履乎王曰楚國雖貧豈愛一踦履哉惡與偕出弗與俱反也自是之後楚國之俗無相弃者又曰履雖鮮弗加之於枕冠雖弊弗以苴履又曰二世胡亥之為公子也詔置酒享羣臣召諸子賜食先罷胡亥下階群臣陳履狀善者因行踐敗而去諸侯聞之者莫不太息及二世即位皆知天下必棄之淮南子曰禹之趨時冠挂而弗顧履遺而不取鹽鉄論曰古者庶人鹿菲草履今富者􅅊沓絲履風俗通論数曰踦者竒也履舄之一也夢書曰履韈為子属體末也若夣得履韈者必有子息也履者為男韈者為女也西京雜記曰趙飛鷰為皇后其弟上遺同心七寳綦履又曰度安世年十五為成帝侍郎常着輕絲履又曰匡衡邑人有說詩者衡從與語質疑邑人推服倒履而去拾遺記曰穆王起春宵之宮西王母來焉納丹豹文履魏武帝遺令曰舍中可學作組履賣之又内式令曰吏民多製文綉之服履絲不得過降紫金黄絲織履前於江陵得雜綵絲履以與家約當着盡此履不得效作也晉令曰士卒百工履色無過緑青白婢履色無過紅青市儈古會切賣者皆當着巾帖額題所儈賣者及姓名一足着黒履一足着白履東宫舊事曰太子妃有綘地文履一緉漢舊儀曰乘輿帶七尺斬蛇劍履虎尾約履徐乾古履儀曰正㑹大司馬問劍履上殿義徐言所以遂見從着履上殿将入人咸譏云古無履但有舄着舄上殿不宜着履案周禮天王赤舄黒舄后素葛履鄭君注曰複下曰舄单下曰履是則古有履也蔡謨荅臺符分别履舄之名事曰被符小㑹義注侍臣劍履升殿而摯虞决疑言劍舄履之名宜審謹案今時所謂履者自漢以前皆名為屨左傳曰踊貴屨賤禮曰戸外有二屨不言二履賈誼曰冠雖弊不以苴履言履者猶足所履踐耳詩云紏紏葛屦可以履霜舄者一物之别名履者足踐之通稱先代以來優崇重臣言劍履則包舄也又大臣昇殿不唯朝會或􅀻覿獨見臨時所着不必是舄故㧾言履以明不跣而已摯虞中朝宿臣多識徃行親覿其禮退而書之即是晉之故典令决疑言舄者書時事也儀注言履者舉揔名也尋文㧾意所稱雖異其制一也鄧徳明南康記曰昔有盧躭仕州為治中當元會至曉不及朝化為白鵠至閣前廻翔欲下威儀以帚擲之得一雙履躭驚還就列内外左右莫不駭異時歩隲為廣州刺史意甚惡之便以状聞遂至誅滅荆州記曰興安水邉平石上有石履捜神記曰宫亭湖孤石有一佑客下都經其下見二女子云可為妾買両緉絲履自厚相報佑客至都與置之並一箱置履在内㽞廟中去兼一書一刀忘而㽞之及乗舟去忽有鯉魚躍入剖之得刀與書幽明録曰晉太寕元年餘杭人姓王失其名徃上舎過廟乞福既去已行五六里􅈸復更反取一白衣人持履厚至云宫使還君化為鵠飛入田中列仙傳曰􅀈父兾州人在曲州市補履数十年不老人竒之又曰昭帝既𦵏鉤弋夫人空棺無屍但有絲履列異傳曰胡母班為太山府君賫書詣河伯貽其青絲履甚精巧也漢武内傳曰七月七日西王母降履𤣥瓊鳯文之舄列女傳曰翟方進學於京師後母憐其㓜随之長安織履以給之皇甫謐髙士傳曰陳仲字子終自齊適楚楚王欲以為相其妻子曰家織屦以食淡然而無為樂在其中矣謝使者秦嘉與婦淑書曰今枉虎龍組緹履一緉髙文惠婦與文惠書曰今􅂓具組生履一緉曹植賀冬表曰獻白文履七緉韈百副崔寔四民月令曰八月制韋履十月作白履劉楨魯都賦曰纎纎絲履粲爛鮮新表以文組綴以朱蠙曹植洛神賦曰踐逺逰之文履曵霜銷之輕裙古樂府詩曰君子防未然不處嫌疑間瓜田不納履李下不整冠張華輕薄篇曰足下履黄金手中䨇莫邪甄述美女詩曰足躡承雲履豊趺暠春錦古詩曰頭上金釵十二行足下絲履五文章傅𤣥履銘曰戒之哉念履正無履邪正者吉之路邪者㓙之徴賈誼吊屈原文曰章甫薦履漸不可乆嗟若先生獨離此咎舄崔豹古今注曰舄以木置履下乾腊不畏泥溺也方言曰履中有木者謂之複舄自関而東謂之複其上單者謂之宛下謂之鞮詩曰公孫碩膚赤舄几几又南有嘉魚車攻曰赤芾金舄周禮天官下曰履人掌王及后之服履為赤舄黒舄赤繶黄繶青句紫履葛履左傳曰楚子次于乾谿雨雪王皮冠素履復陶秦所遺羽衣也翠被豹舄執鞭以出三禮六服圖曰王后翬衣𤣥舄榆翟赤舄鞠衣着履鞠衣以下皆履也三禮圖曰服下曰舄單下曰履夏葛冬皮也說苑曰襄成君始封之時衣翠衣帶玊佩玊劍履縞舄曲論曰中常侍張譲子奉為太醫令與人飲酒輙掣引衣裳發露形體以為戲樂将罷又亂其舄履無不顛倒漢武内傳曰西王母履文鳯之舄列仙傳曰安期先生瑯琊阜鄉人秦始皇請見與語三日三夜賜金璧千萬出於阜鄊皆置去㽞書以赤玊舄一枚以報拾遺記曰秦王子嬰寝於望夷宫夜夢有一人長丈鬚鬂絶青納玉舄而乘丹車告云天下當亂王乃殺趙髙所夢則始皇之靈所着舄則安期所遺者列仙傳曰黄帝葬橋山山崩無尸唯劍舄存衡波傳曰足屬萬錢之舄漂如日光宛如逰龍風俗通曰孝文身履革舄而衣弋綈又曰俗說明帝時尚書郎鄴令王喬每月朔常詣臺朝帝怪其來数而無車馬密令太史候望言臨至時常有䨇鳬從東飛來因舉羅得一隻舄使呈上方識是四年所賜尚書履也杜氏幽求曰裒衣搏帶高冠厚舄佩以珠璣結之纓㽔陳思王七啓曰金華之舄動趾遺光韈說文曰韈足衣釋名曰韈末在脚也左傳曰衛侯與諸大夫飲酒禇師聲子韈而登席公怒帝王世紀曰武王伐紂行至商山韈係觧五人在前莫肯係皆曰臣所以事君非爲係韈漢書曰中山王來朝成帝賜食後飽起下韈係觧成帝以爲不能而賢定陶王又曰景帝時王生者善爲黄老言嘗召居廷中公卿盡㑹張釋之爲廷尉王生顧曰吾韈觧爲我結韈釋之跪而結之人或讓王生獨柰何辱張廷尉如此王生曰吾老且賤自度終亡益於張廷尉方今天下名臣吾故􅂓使廷跪結韈欲以重之諸公聞之賢王生而重釋之東觀漢記曰和帝召諸儒侍中賈逵黄香相難罷朝特頒賜履韈文子曰均爲縞也或為冠或為韈則履之又曰文王伐崇至鳯凰之墟而韈係觧文王自結之太公問焉文王曰吾聞亾君所與處盡其役寡人雖不肖所與處皆先君之人也故無令結之㑹稽典録曰賀劭為人美容止與人交久益敬之在官府常着韈稀見其足崔浩女儀曰近古婦人以冬至日進履韈於舅姑張衡南都賦曰羅韈躡跡而容與曹植洛神賦曰凌波㣲歩羅韈生塵皇甫規與馬融書曰謹上韈一量以通㣲薄秦嘉書曰今奉細布韈二量髙文惠婦與文惠書曰今奉織成韈一量曹植賀冬表曰獻韈七量並為韈頌曰玉趾即御履和蹈貞行與禄邁動以福并後漢崔駰作韈銘太平御覧卷六百九十七
