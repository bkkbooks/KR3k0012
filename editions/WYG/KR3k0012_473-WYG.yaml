body:
  text: 太平御覽卷四百七十三宋李昉等撰人事部一百一十三遊俠漢書曰意氣高作威於世謂之遊俠又曰背公死黨之義成守節奉上之義廢又曰朱家魯人魯皆儒教而朱家用俠聞諸所嘗施唯恐見之賑人不贍先從貧賤專趨人之急自闗以東莫不延頸願交又曰楚田仲以俠聞父事朱家田仲死而有雒陽劇孟以任俠顯吳楚反時條侯為太尉乗傳東至河南得劇孟喜曰吳楚舉大事而不求孟吾知其無能為也天下騷動大將軍得之若敵國云孟行大類朱家孟母死自遠方送䘮車葢千乗及孟死家不餘十金之財又曰郭解河内軹人字伯翁善相者許負外孫也解父素任俠孝文時誅死解為人短小精悍不飲酒少時隂賊感槩不快意身所殺甚衆以軀借交報仇藏命作姦剽刼不休及鑄錢掘冡不可勝數年長更折節為儉以德報怨厚施薄望然其自喜為俠益甚解姉子負解之勢與人飲使之釂徐廣曰盡酒也音子妙反非其任强灌之人怒㧞刀刺殺解使人㣲知賊窘自歸具以實告解解曰公殺之固當吾兒不直遂去諸公聞之皆多解之義益附焉戰國䇿曰韓傫相韓嚴遂重於君二人相害也嚴遂正議直指舉韓傫之過韓叱之於朝嚴遂㧞劒趍之於是懼亡去求人可以報韓傫者至齊人言聶政勇敢士也避讎隱於屠肆之間嚴遂陰交於政以意厚之政母死既䘮除政曰嗟乎政乃市井之人鼓刀以屠而嚴仲子乃諸侯之卿相也不遠千里枉車騎而交臣舉百金為親壽我雖不受然是深知政也至濮陽見嚴仲子曰前日所以不許子者徒以親也親今不幸死仲子所欲報者為誰仲子具告之政獨行㧞劍至韓韓適有東孟之會韓主及相皆在焉持兵㦸而衞者甚衆政直入上階刺韓傫傫走而抱哀侯聶政刺之兼中哀侯左右大亂史記太史公曰吾常過薛其俗閭里多暴傑子弟與鄒魯殊問其故曰孟嘗君招致天下任俠姦人薛中葢六萬家矣又曰鄭衞俗與趙相類濮上之邑徙衞野王縣也王好氣任俠衞之風也又曰寗成抵罪得脫乃詐刻傳出闗歸家稱曰仕不至二千石賈不至千萬安可比人乎乃貰貸買陂田千餘頃役使數千家數年産至千金為任俠其役民重於郡守又曰列國公子魏有信陵趙有平原齊有孟嘗楚有春申皆籍王公之勢悉為遊俠雞鳴狗盜無不賓禮而趙相虞卿弃國相印以周窮交魏齊之危信陵無忌竊符矯命殺將專師以赴平原之急皆以取重諸侯順名天下搤腕而遊談者以四豪為稱首漢書季布為人任俠有名項籍滅髙祖購求布千金敢舎匿罪三族布匿濮陽周氏周氏曰漢求將軍急且至能聽臣敢進計布許之廼髠鉗布衣褐置廣柳車中而共其家僮數十人之魯朱家所賣之朱家心知其季布也置田舎乃之雒陽見汝陰侯滕公說曰季布何罪臣各為其主項氏臣豈可盡誅耶今上始得天下而以私怒求一人何示不廣且以季布之賢漢求之急此不北走胡南走越耳夫忌壯士資敵國此伍子胥所以鞭平王之墓也君何不從容為上言之滕公心知朱家大俠意布匿其所廼許諾待間果如朱家指上乃赦布又曰布弟季心氣葢闗中遇人恭謹為任俠方數千里士爭致死又曰孝文時鄭當時以任俠自喜孝文時為太子舎人每五日洗沐常置驛馬長安郊請謝賓客夜以繼日常恐不遍當時好黄老其知交皆天下有名之士又曰袁盎為楚相免家居與閭里鬭雞走狗雒陽劇孟嘗過盎盎善待之安陵富人有謂盎曰吾聞劇孟博徒將軍何自過之盎曰孟雖博徒然母死客送䘮車千餘此亦有過人者又曰灌夫為人剛直使酒不好面諛貴戚權勢在已之右欲必凌之在巳之左尤益禮待稠人廣衆薦寵下士士亦以此多之不好文學喜任俠尚然諾所以交通無非豪傑大猾也又曰公孫賀子聲以皇后姊子驕奢不奉法征和中擅用北軍錢千九百萬早覺下獄是時捕陽陵朱安世不能得求之賀請逐捕安世以贖聲罪上許之安世者京師大俠也聞賀欲以贖子笑曰丞相禍及宗矣從獄中上書告聲與陽石公主私通及使巫祭祀上幸甘泉當馳道埋偶人祝詛有惡言下有司案騐賀窮所犯遂父子死獄中又曰睦𢎞字孟魯國蕃人少時遊俠鬭雞走狗長乃變節從嬴公受春秋嬴公姓字以明經為議郎至符節令又曰朱博字子元杜陵人家貧少時給事縣為亭長稍遷功曹任俠好交從士大夫不避風雨又曰萬章字子夏長安熾盛街閭各有豪俠章在城西柳京號曰城西萬子夏為京兆尹門下督從至殿中諸侯貴人爭欲揖章莫與京兆言者又曰樓䕶字君卿是時王氏方盛賓客滿門兄弟爭具客各有所厚唯䕶盡入其門咸得其懽心結士大夫無不傾心交長者尤見親禮為人短小精辯論議常依名節聽之者皆竦會母死送葬致車千兩又曰陳遵字孟公杜陵人身長八尺餘容貌甚偉性善書與人尺牘主皆藏去以為榮時列侯有子與遵同姓字者每至人門曰陳孟公坐中莫不震動既至而非因號曰陳驚坐又曰原涉為谷口令時年二十餘谷口聞其名不言而治人常置酒請涉入里門客有道涉所知母病避疾在里宅者涉即往候叩門哭因問以䘮事家旡所有涉乃削牘為疏具記衣被飯含之物分付市買日昳皆會其周急待人如此後人有毁涉者曰奸人之雄䘮家子即時刺殺又曰卭成太后外家王氏貴而侍中王林卿通輕俠傾京師後坐法免賓客愈盛又曰漢興禁網疎闗外戚大臣魏其武安之屬競逐於京師遊俠劇孟郭解之徒馳騖於閭閻荀悅漢紀曰立氣勢作福威結私交以立强於時者謂之遊俠又曰俗有三遊德之賊也一曰遊俠二曰遊説三曰遊行亂之所由生也傷道害德敗法惑時先王之所愼也東觀漢記曰郅惲之友董子張甫父及叔為鄉里盛氏一時所殘害子張病困將終惲往候張張視惲歔欷惲曰吾知子不悲天命長短而痛二父讎不復也惲即將客遮仇人取其頭以視張張憙氣乃絶惲見令以狀首令應之遲趨出詣獄令跣追之不及即自入獄謝惲㧞刃自嚮以要惲曰子不從我出敢不以死明心乎惲遂出魏志曰典韋陳留人也貌魁膂力過人好豪俠襄邑劉氏與睢陽李禮為讎韋報之禮故富春長備怨甚謹韋乗車載雞酒偽候者門開懐匕首入殺禮并妻徐出取車上刀㦸步去禮居近市一市盡追莫敢近又曰楊和若後名豐字伯陽少遊俠常以報仇解怨為事故時人為之號曰東市相斫楊阿若西市相斫楊阿若魚豢典略曰徐福字元直好任俠擊劒中平末嘗為人報讎為吏所得問其姓字閉口不言吳志曰甘寧字興覇少有氣力好遊俠招合輕薄少年為之渠帥羣聚相挾持弓弩負毦帶鈴聲即知是寧裴子野宋畧曰寧朔將軍何邁素豪俠好聚歛士出入遊從者塞路孫盛晉陽秋曰祖逖雅好逰俠每之田舎輙稱兄命散榖帛以贈貧者唐書曰丘和河南洛陽人也父壽魏鎭東將軍和少便弓馬重氣任俠及長始折節與物無忤無貴賤皆愛之列子曰虞氏者梁之富人也家既充盛錢金無量財貨無訾登高樓臨大路設樂陳酒擊博樓上俠客相隨而行樓上博者失笑鳶飛適墜其腐鼠而中之俠曰虞氏富樂之日久矣常有輕易人之志乃辱我以腐鼠率徒屬而滅其家韓子曰儒以文亂法而俠以武犯禁裴啟語林曰李陽大俠士庶無不傾心為幽州刺史當之職盛暑一日詣數百家别賓客常塡門張衡西京賦曰都邑游俠張趙之倫齊志無忌擬跡田文輕死重氣結黨連羣實蕃有徒其從如雲劉邵趙都賦曰遊俠之徒晞風擬類貴交尚信輕命重氣義激毫毛節成感槩張華博陵王宮俠曲曰俠客樂幽險築室窮山陰僚獵野獸盡施網川無禽又曰雄兒任氣俠聲葢少年場借友行報怨殺人都市旁腰間义素㦸手持白頭鑲古詩曰失意杯酒間白刃起相讎曹子建詩曰借問誰家子幽并遊俠兒太平御覽卷四百七十三
