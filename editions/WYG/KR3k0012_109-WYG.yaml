body:
  text: 太平御覽卷一百九宋李昉等撰皇王部三十四唐太宗文皇帝唐太宗文皇帝唐書曰太宗文皇帝諱世民髙祖第二子也母曰太穆順聖皇后竇氏隋開皇十八年十二月戊午生於武功之别館有二龍戯於館門之外三日而去髙祖之臨岐州太宗時年四嵗有書生自言善相謁髙祖曰公貴人也且有貴子因見太宗曰龍鳯之資天日之表年將二十必能濟世安民矣髙祖懼其言將殺之忽失所在隂採濟世安民之義以為名焉太宗幼聰睿𤣥鑑深逺臨機果斷不拘小節時人莫能測也大業末煬帝於雁門為突厥所困太宗應募救援𨽻屯衛將軍雲定興當時謂定興曰必廣旗鼔以設疑兵且始畢可汗舉國之師敢圍天子必以國家倉卒無援我張軍容令數十里幡旗相續夜則鉦鼔相應虜必謂救兵畢集望塵而遁矣不然彼衆我寡悉軍來戰必不能支矣定興從之師次崞音郭縣突厥候馳告始畢曰王師大至由是解圍而遁及髙祖之守太原太宗時年十八有髙陽賊帥魏刀兒自號厯山飛來攻太原髙祖擊之深入賊陣太宗輕騎突圍而射之所向皆披靡援髙祖於萬軍之中遂以步兵與太宗又奮擊大破之時隋祚已終太宗潜圖義舉毎折節下士推財養客及義兵起乃率兵畧徇西河克之拜領軍大都督右三軍皆𨽻焉封燉煌郡公大軍西上賈胡堡隋將宋老生率精兵二萬屯霍邑以拒義師㑹久雨糧盡髙祖與裴寂議且還太原以圖後舉太宗曰本興大義以救蒼生當須先入咸陽號令天下遇小敵即班師將恐從義之徒一朝解體還守太原一城之地是為賊耳何以自全髙祖不納促令引發太宗遂號泣於外聲聞帳中髙祖召問其故對曰今兵以義動戰則必克退還則必㪚衆㪚於前敵乘於後死亡須臾而至是以悲耳髙祖悟乃止八月己夘雨霽髙祖引師趣霍邑太宗恐老生不出戰乃將數騎先語其城下舉鞭指麾若將圍城者以激怒之老生果怒開門出兵背城而陣髙祖與建成合陣於城東太宗及柴紹陣於城南老生麾兵疾進先薄髙祖建成墜馬老生乘之髙祖與建成軍咸却太宗自南原率二騎馳下峻坂衝斷其軍引兵奮擊賊衆大敗各捨仗而走懸門發老生引繩欲上遂斬之平霍邑至河東闗中豪傑争走赴義太宗請進師入闗取永豐倉以賑窮乏收羣盗以圖京師髙祖稱善太宗以前軍濟河先定渭北三輔吏民及諸豪傑詣軍門請自効者日以千計扶老攜幼滿於麾下収納英俊以備僚列逺近聞者咸自托焉師次於涇陽勝兵九萬破猾賊劉鷂子以并其衆留殷開山劉𢎞基屯長安故城太宗自趣司竹賊帥李仲文何潘仁向志善等皆來㑹頓於阿城獲兵十三萬長安父老賫牛酒詣轅門者不可勝紀勞而遣之一無所受軍令嚴肅秋毫無犯尋與大軍平京城髙祖輔政授唐國内史改封秦國公㑹薛舉以勁卒萬人來逼渭濵太宗親撃之大破其衆追斬萬餘級畧地至于隴坻義寕元年十二月復為右元帥總兵十萬徇東都及將旋謂左右曰賊見吾還必相追躡設三伏以待之俄而隋將段達率萬餘人自後而至度三王陵發伏擊之段達大敗追奔至於城下因於宜陽新安置熊榖二州戍之而還徙封趙國公髙祖受禪拜尚書令左武衛大將軍進封秦王加授雍州牧三年七月總率諸將攻王世充於洛邑師次榖州世充率精兵三萬陣於慈澗太宗以輕騎挑之時衆寡不敵陷於重圍左右咸懼太宗命左右先歸獨留後殿世充驍將軍雄信數百騎夾道來逼交鎗競進太宗㡬為所敗太宗遣行軍總管左右射之無不應弦而倒獲其大將燕頎世充乃拔慈澗之鎮歸于東都太宗遣行軍總管史萬寶自冝陽南據龍門劉徳威自太行東圍河内郡王君廓自洛口斷賊粮道又遣黄君漢夜從孝水河中下舟師襲回洛城克之黄河已南莫不響應城堡相次來降大軍進屯邙山九月太宗以五百騎先觀戰地卒與世充萬餘人相遇㑹戰復破之斬首三千餘級獲大將陳智世充僅以身免其總管楊慶遣使詣降李世勣率師出轘轅道安撫其衆滎汴洧豫九州相繼來降世充遂求救於竇建徳四年二月又進屯青城宫營壘未立世充率衆二萬自方諸門臨榖水而陣太宗以精騎陣於北邙山令屈突通率歩卒五千渡水擊之因誡通曰待兵交即放􅃄吾當率騎軍南下兵纔接太宗以騎衝之挺身先進與通相為表裏賊衆殊死戰散而復合者數焉自辰至午賊衆始退縱兵乘之俘斬八千人於是進營城下世充不敢復出但嬰城自守以待竇建德之援建徳以兵十萬來援世充至于酸棗蕭瑀屈突通封徳彛皆以腹背受敵恐非萬全請退師於榖州以觀之太宗曰世充糧盡内外離心我當不勞攻擊坐收其弊建徳新破孟海公將驕卒惰吾當進據武牢扼其襟要賊若冒險與我争鋒破之必矣如其不戰旬日間世充當自潰若不速進賊入武牢諸城新附必不能守二賊併力將若之何通等又請解圍就險以俟其變太宗不許於是留通輔齊王元吉以圍世充親率步卒三千五百人趣於武牢建徳自滎陽西上築壘於板渚太宗屯武牢相持二十餘日諜者曰建徳伺軍芻盡候牧馬於河北因將襲武牢太宗知其謀遂牧馬于河北以誘之詰朝建徳果悉衆而至陳兵氾水世充將郭士衝陣於其南綿亘數里鼔譟諸將大懼太宗將數騎升髙丘以望之謂諸將曰賊起山東未見大敵今度險而囂是無政令逼城而陣有輕我心我按兵不出彼乃氣衰陣久卒飢必將自退追而擊之無往不克吾與公等必以午時後破之建徳列陣自辰至午兵士飢倦皆列坐又争飲水逡巡欲退太宗曰可擊矣親率輕騎誘之衆繼之建徳回師而陣未及整列太宗先登撃之所向皆靡俄而衆軍合戰囂塵四起太宗率史大柰程䶧金秦叔寶宇文歆等揮幡而入直突出其陣後張我旗幟賊顧見之大潰追奔三十里生擒建徳於陣太宗數之曰我以干戈問罪本在王世充得失存亡不預汝事何故越境犯我兵鋒建徳股慄而言曰今若不來恐勞逺取乃將建徳至東都城下世充懼率其官屬二千餘人詣軍門請降山東悉平太宗入據宫城令蕭瑀竇軌等封守府庫一無所取令記室房𤣥齡收隋圖籍於是誅其同惡段逹等五十餘人大饗將士頒賜有差髙祖令尚書左僕射裴寂勞于軍中六月凱旋太宗親披金甲鐵馬一萬騎甲士三萬人前後部鼔吹俘二偽主及隋氏器物輦輅獻於太廟髙祖大恱行飲至禮以享焉髙祖以自古舊官不稱殊功乃别表徽號用旌勲徳十月加號天䇿上將軍陜東道大行臺位在王公上增邑二萬户通前三萬户賜金輅一乘衮冕之服玉璧一雙黄金六十斤前後部鼔吹及九部之樂班劍四十人于時海内漸平太宗銳意經籍開文學館以待四方之士行臺司勲郎中杜如晦等十有八人為學士毎更直閣下降以溫顏與之討論經義或夜分而罷八年加中書令九年皇太子建成齊王元吉謀害太宗六月太宗率長孫無忌尉遲敬徳房𤣥齡杜如晦等於𤣥武門誅之甲子立為皇太子庶政皆斷决八月癸亥髙祖傳位於皇太子太宗即位於東宫顯徳殿遣司空裴寂柴告于南郊大赦天下癸酉放掖庭宫女三千餘人丙子立妃長孫氏為皇后己夘突厥㓂髙陵辛巳行軍總管尉遲敬徳與突厥戰於涇陽大破之斬首千餘級癸未突厥頡利至渭水便橋之北遣其軍帥執失思力入朝為覘自張形勢太宗命囚之親出𤣥武門馳六騎幸渭水之上與頡利隔津而語責以負約俄而衆軍繼至頡利見軍容既盛又如思力就拘由是大懼遂請和詔許焉即日還宫乙酉又幸便橋與突利殺白馬設盟突厥引退九月丙戌頡利獻馬三千疋牛萬口帝不受令頡利歸所掠中國户口丁未引諸軍衛騎兵統將等習射於顯徳殿庭謂將軍以下曰自古突厥與中國更有盛衰若軒轅善用五兵即能北逐獯鬻周宣驅馳方邵亦能制勝太原至漢晉之君逮於隋代不使兵士素習干戈突厥來侵莫能抗禦致使中國生民塗炭於冦手我今不使汝等穿池築苑造諸淫費農民恣令逸樂兵士唯習弓馬庶使汝鬭戰亦望汝前無横敵於是毎日引數百人於殿前教習帝親自臨試射中者賞弓刀布帛自是後士卒皆為精銳十月癸未立中山王承乾為皇太子貞觀元年正月己酉改元三月癸巳皇后親蠶十二月壬午上謂侍臣曰神仙事本虚妄空有其名秦始皇非分愛好遂為方士所詐乃遣童男女數千人隨其入海求仙藥方士避秦苛虐因留不歸始皇猶踟蹰海側以待之還至沙丘而死漢武帝為求仙乃將女嫁道術人事既無騐便行誅戮據此二事神仙不須妄求也二年正月丙戌靺鞨上音未下音曷内屬三月丁夘遣御史大夫杜淹巡闗内諸州出御府金寶贖男女自賣者還其父母庚午大赦天下夏四月己夘詔骸骨暴露者令其所在埋瘞丙申契丹内屬初詔天下州縣幷置義倉六月庚寅皇子治生三年春正月辛亥契丹渠帥來朝戊午謁太廟癸亥親耕籍田四月辛巳太上皇徙居太安宫甲子太宗始於太極殿聽政六月戊寅以旱親錄囚徒遣長孫無忌房𤣥齡等祈雨于名山大川中書舎人杜正倫等徃闗内諸州慰撫又令文武百官各上封事極言得失是嵗户部奏言中國人自塞外來歸及突厥前後内附開西夷為州縣者男女一百二十餘萬口四年正月乙亥李靖大破突厥獲隋皇后蕭氏及煬帝之孫正道送之京師二月癸亥幸温陽甲辰李靖又破突厥於隂山頡利可汗輕騎逺遁甲寅大赦賜酺五月三日庚辰大同道行軍副總管張寳相生擒頡利可汗獻于京師甲午以俘頡利吿于太廟夏四月御順天門軍吏執頡利以獻㨗自西北諸蕃咸請上尊號為天可汗於是降璽書冊命其君長則兼稱之九月庚午令收瘞長城之南骸骨仍令致祭壬午令自古明王聖帝賢臣烈士墳墓無得芻牧春秋致祭冬十月壬辰幸隴州曲赦岐隴二州給復一年十月校獵於貴泉谷十二月校獵於魚龍川自射鹿獻於太安宫甲子至自隴州戊寅制決罪人不得鞭背以明堂圖五臟繫背也髙昌王麴文泰來朝是嵗斷死刑二十九人㡬至刑措山東至于海河南至于嶺皆外户不閑行旅不賫糧焉六年十二月辛未親錄囚徒歸死罪者二百二十九人於家令明年秋來就刑其後應期畢至詔悉原之是嵗黨項諸羌前後内屬三十萬口八年二月乙巳皇太子加元服丙午賜天下酺三日三月庚辰幸九成宫五月丁丑上初戴翼善冠貴臣服進徳冠九年五月太上皇崩于太安宫七月甲寅増修太廟為六室冬十月庚寅𦵏髙祖于獻陵十三年春正月乙巳朔謁獻陵曲赦三原縣及行免縣人租四月戊寅幸九成宫甲申阿史那結社爾犯御營伏誅壬寅雲陽石燃者方丈晝如灰夜則有光投草木上則焚厯年而止十二月壬辰狩於咸陽是嵗滁州言野蠶食槲音斛葉成繭大如柰其色綠色收六千五百七十石髙䴡新羅西突厥吐火羅康國安國波斯踈勒于闐焉耆髙䴡新昌林邑昆明及荒服蠻首相次遣使朝貢十五年詔以來年二月有事泰山所司詳定儀制五月壬申并州僧道及老人等抗表以太原王業所因明年登封以後願時臨幸上於武城殿賜宴因從容謂侍臣曰朕少在太原喜羣聚博戯暑徃寒逝將三十年矣時㑹中有舊識上者相與道舊以為笑樂因謂之曰他人之言或有靣諛公等朕之故人實以告朕即日政教於百姓何如人間得無疾苦耶皆奏即日四海太平百姓歡樂陛下之力也臣等餘年日惜一日但眷戀聖化不知疾苦因固請過并州上謂曰飛鳥過故鄉猶躑躅徘徊朕於太原起義兵定天下復少小逰戯誠所不忘岱禮若畢或冀與公等相見於是賜物各有差六月戊申詔天下諸州舉學博古今及孝悌淳篤文章秀異者並以來年二月總集太山己酉有星孛於太㣲犯郎位丙辰停封泰山避正殿以思命尚食減膳秋七月甲戌孛星滅十六年冬十一月丙辰狩于岐山辛酉使祭隋文帝陵丁夘宴武功士女於慶善宫南門酒酣上與父老等涕泣論舊事父老人等逓起為舞争上千萬嵗夀上各盡一巵庚午至自岐州十一月癸夘幸温湯甲寅狩於驪山時隂塞晦𡨕兵圍斷絶上乘髙望見之欲捨其罰恐虧軍令乃迴轡入谷避之十七年正月戊申詔圖畫司徒趙國公無忌等勲臣二十四人於凌煙閣三月丁巳熒惑守心前星十九日而退夏四月皇太子承乾有罪廢為庶人丙戌立晉王治為皇太子大赦賜酺三日丁亥加司徒長孫無忌太子太師司空房𤣥齡太子太傅特進蕭瑀太子太保兵部尚書李勣為太子詹事仍同中書門下三品庚寅上親謁太廟以謝承乾之過五月乙丑手詔舉孝廉茂才異能之士十八年十二月命太子詹事英國公李勣為遼東行軍總管出栁城禮部尚書江夏郡王道宗副之刑部尚書鄖國公張亮為平壤道行軍總管以舟師出萊州左領軍常河瀘州都督左難副之約天下甲士召募十萬並趣平壤以伐髙䴡十九年春二月庚戌上親統六軍發至于洛陽乙夘詔皇太子留定州監國髙士㢘攝太子太傅與侍中劉洎中書令馬周太子少詹事張行成太子右庶子髙季輔五人同掌機務以吏部尚書安徳郡公楊師道為中書令贈殷比干為太師諡曰忠烈命所司封墓葺祠堂春秋祀以少牢上自為文以祭之春三月壬辰上發自定州以司徒長孫無忌中書令岑文本楊師道從之夏四月癸夘誓師於幽州城南因大饗六軍以遣之癸亥李世勣攻葢牟城破之夏五月丁丑車駕渡遼東甲申上親率鐵騎與世勣命圍遼東城因烈風發火弩斯須城上屋樓皆焚麾戰士令登乃㧞之六月丙辰師次安市城丁巳髙䴡將髙延夀髙惠真帥兵五十萬來援安市以拒王師李世勣率兵奮擊上自髙峯引軍臨之髙䴡大潰殺獲不可勝紀延夀等以其衆來降因名所幸為駐蹕山刻石紀功焉賜天下大酺二日秋七月李世勣進軍攻安市城至九月不克乃班師冬十月丙辰入臨渝闗皇太子自定州迎謁戊午次漢武臺刻石以紀功徳十一月幸幽州癸酉大饗還師十二月幸并州二十年春正月上在并州遣大理卿孫伏伽黄門侍郎褚遂良等二十四人以六條巡察四方黜陟官吏庚辰曲赦并州宴從官及起義諸人賜帛給復有差三月車駕至京師六月遣兵部尚書固安公崔敦禮特進英國公李世勣擊破薛延陁於鬱督山北前後斬首五千餘級擄男女三萬餘人二十一年春正月詔以來年二月有事泰山甲寅賜京師酒酺三年八月詔以河北大水停封禪辛未骨利幹國遣使貢名馬二十三年二月辛酉大赦丁夘太宗以不豫勅皇太子於金液門聽政是月日赤無光夏四月己亥幸翠㣲宫五月乙巳上疾甚令草遺詔有頃崩於含風殿年五十二遺命令皇太子即位於柩前喪紀宜依漢制秘不發喪庚午遣舊將統飛騎勁兵從皇太子先還京師發六府甲士四千人分列於道及安化門翼従乃入大御與從侍卿如常壬申發喪六月甲戌殯于太極殿諡曰文皇帝廟號太宗葬昭陵上元元年上尊號曰文武聖皇帝天寶十二載改上尊號為文武大聖大廣孝皇帝太平御覽卷一百九
