body:
  text: 太平御覽卷八百四十八宋李昉等撰飲食部六食中王隠晉書曰何曽食日近萬錢猶曰無下箸處子劭驕奢簡貴有父風衣裘服翫新故巨積食必盡四方珍異一日之供以二萬為限時論以為太常御膳無以加之又曰皇甫謐姑子梁柳為城陽太守或勸謐送謐曰柳為布衣過吾送迎不出門食不過鹽菜貧不以酒肉為禮也今作郡而送豈古人之道哉晉書曰導子悦疾篤導憂念特至不食積日忽見一人形状甚偉披甲持刀導問君是何人曰僕是蒋侯也公兒不佳欲為請命故來耳公勿復憂因求食遂噉數斗食畢勃然謂導曰中書患非可救者言訖不見悅亦殞絶又曰衞將軍謝安嘗詣陸納納兄子俶怪納無辦乃密作數十人饌安至納設菜果而俶陳精飲食納怒客去杖俶四十又曰郄鑒字道徽永嘉亂在鄉里窮餒鄉人以鑒名德傳共餉之時兄子邁外孫周翼並小常携之就食鄉人曰恐不兼有所存鑒乃獨往食訖飯着兩頰邊含還與二兒後並得存同過江邁位至䕶軍翼為剡令鑒薨追撫育之恩解軄而歸席苫心喪三年又曰庾衮父亡作筥賣以養母母見其勤曰我無所食對曰母食不甘衮将何居母感而安之宋書曰謝景仁為桓𤣥驍騎將軍時宋武帝為桓修撫軍中兵叅軍嘗詣景仁諮事景仁與語悦因留帝食食未辦而景仁為𤣥所召𤣥累促俄傾間騎詔續至帝屢求去景仁不許曰主上見待要應有方我欲與客食豈不得待安坐飽食然後應詔帝甚感之又曰謝景仁愛弟甝而憎弟述嘗設饌請宋武帝希帝命命甝預坐而帝召述述知非景仁夙意又慮非帝命之請急不從帝馳遣呼述須至乃飡其見重如此及景仁疾述盡心視湯藥飲食必嘗而後退衣不解帶不盥櫛者累旬景仁深感愧焉又曰劉穆之少時家貧誕節嗜酒食不脩拘檢好往妻兄弟乞食多見辱不以為恥其妻江嗣女甚明識每禁不令往江氏後有慶㑹囑勿來穆之猶往食畢求㯽榔江氏兄弟戲之曰㯽榔消食君乃常饑何忽須此妻復截髮市肴饌為其兄弟以餉穆之自此不對穆之梳沐後穆之宦逹而更性奢豪食必方丈且輙為十人饌未嘗獨飡每至食時客止十人已還帳下依嘗下食以此為常常白帝曰穆之家本貧賤贍生多闕叨忝已來雖存損約而朝夕所須㣲為過豐此外無一毫負公又曰王仲德與兄叡同起義兵與慕容垂戰敗仲德被重創走與家属相失路經大宅困未能去卧林中有一小兒青衣年可七八嵗騎牛行見仲德驚曰漢已食宋仲德言饑小兒去須㬰復來得飯與之食又曰廬陵王義真居武帝憂使帳下備膳劉湛禁之義真乃使左右人買魚肉珍羞于齋内别立厨帳㑹湛入因命㬉酒炙車螯湛正色曰公當今日不宜有此設義真曰寒甚杯酒亦何傷長史事同一家望不為議酒至湛起曰既不能以禮自處又不能以禮處人又曰江夏王義恭㓜為武帝所鍾愛帝性儉諸子飲食不過五盞盤義恭須求果食日中無筭得未嘗噉急以與傍人諸王未嘗敢求求亦不得又曰文帝宴於武帳堂上帳行勅諸子且勿食至㑹所賜饌日旰食不至有饑色上誡之曰汝曹少長豐佚不見百姓艱難今使爾識有饑之苦又曰文帝以謝𢎞㣲能膳羞每就求食𢎞㣲與親舊經營乃進之後親人問上所御𢎞㣲不答别以餘語酧之時人比之漢世孔光又曰謝𢎞㣲兄曜卒𢎞㣲哀戚過禮服雖除猶不噉魚肉沙門釋惠琳嘗與之食見其猶蔬素謂曰檀越素既多病即吉猶未復膳若以無益傷生豈所望於得理𢎞㣲疾曰衣冠之變禮不可踰在心之哀實未能已遂廢食歔欷不自勝又曰前廢帝常以木槽盛飯内坑中諸雜食攪令和合掘地為坑穽實之以泥水倮明帝内坑中以槽食置前令以口就槽中食之用為歡笑又曰宗慤累遷豫州刺史監五州諸軍事先是鄉人庾業家富豪侈侯服玉食與賔客相對膳必方丈而為慤設粟飯菜葅謂客曰宗上軍串音患切噉粗食慤致飽而退初無異辭至是業為慤長史帶梁郡慤待之甚厚不以昔事為嫌又曰沈攸之戰敗與弟二子文和至華容之魽頭村投州吏家此吏嘗為攸之所鞭待攸之甚厚不以往罰為怨殺豚以食既而村人欲取攸之於櫟林與文和俱自縊死又曰袁愍孫為吏部郎孝建元年文帝詔曰羣臣並於中興寺入闗齊中食竟愍孫别與黄門郎張淹更進魚肉食尚書令何尚之奉法素謹密以白孝武孝武使御史中丞王謙之糾奏並免官又曰阮佃夫奢侈中書舎人劉沐嘗詣之遇佃夫出行中路相逢要沐同返就席便命施設一時珍肴莫不畢備凡諸火齊並皆始熱肴胾數十種佃夫常作數十人饌以待賔客故造次便辦類皆如此雖晉世王石不能過也又曰郭原平至行養親必以己力傭賃以給供養性甚巧每為人作匠取散夫價主人設食原平以家貧父母不辦有肴味唯飡鹽飯而已若家或無食則虛中竟日義不獨飽須日暮作畢受直歸家於里糴買然後舉㸑齊書曰陳顯逹髙帝即位拜䕶将軍御後膳不宰牲上籠蒸一盤上即以充飲又曰武帝收沙門寳誌在獄中語獄吏曰門外有兩輦食金鉢盛飯汝可取之果是文惠太子及竟陵王子良所供養又曰王儉嘗詣武陵王􅁮􅁮留儉設食盤中菘菜鮑魚而已儉重其率真為飽食盡歡而去又曰周顒隠居鍾山衞将軍王儉謂顒曰卿山中何所食顒曰赤米白鹽緑葵紫蓼文惠太子問顒菜食何味最勝顒曰春初早韭秋末晩菘又曰張緒口不言利有財輙散之清談端坐或竟日無食門生見緒饑為之辨食然未嘗求也梁書曰沈顗遭齊末兵荒與家人并日而食或有饋其梁肉者閉門不受唯菜蓴荇根供食以樵採自資怡怡然恒不改其樂又曰孔休源到都寓於宗人少府孔登曽以祠事入廟侍中范雲一與相遇深加褒賞曰不期忽覩清風頓祛鄙􅈔觀天披霧驗之今日後雲命駕到少府登便拂筵整席謂當詣已備水陸之品雲駐筯命休源及至取其膳止有赤倉米飯蒸鮑魚雲食休源食不嘗主人之饌髙談盡日同載還家登深以為愧又曰臨川王蕭宏性奢侈無限服玩侔於齊東昏潘妃寳屧直十萬好食鯽魚頭常日進三百他珍膳盈溢後房食之不盡棄諸道路又曰何逺為武昌太守江左水族甚淺逺每食不過乾魚數觔而已又曰何𦙍侈於味食必方丈後稍去其甚者猶食白魚䱉脯糖蟹以為非見生物疑是蚶蠣使門人議之學生鍾玩曰䱉之就脯之驟於屈伸蟹之将糖躁擾彌甚仁人用意深懐如恒至於車螯蚶蠣眉目内闕慙渾泥之寄獷殻外緘非金人之慎不悴不榮曽草木之不若無香無臭與瓦礫其何筭故宜長充庖厨永為口實陳書曰徐孝克為國子祭酒每侍宴無所食噉至席散當其前膳羞損减帝密記以問中書舎人管斌斌自是伺之見孝克取珍菓内紳帶中斌當時莫識其意後尋訪方知其以遺母斌以啓宣帝嗟嘆良乆乃勅自今宴享孝克前饌並遣将還以餉其母時論美之崔鴻後趙録曰石虎召姚弋仲弋仲輕騎至鄴引入領軍省賜以御食仲怒曰國家有賊召我撃之官當見我問方畧以破賊而食我我來覔食耶乃引見後燕録曰慕容鳯字道翔宜都王桓之子桓好修宫室鳯年八嵗左右抱之隨桓周行殿觀桓問之曰此第好不鳯笑曰此本石家諸王故第今王修之鳯因言曰今王之膳菓肴百品而外有糟糠之民非是小兒所可同大王之味也桓彌加歎賞又南燕録曰濟南尹鸞身長九尺腰帶十圍貫甲跨馬不據鞍蹬慕容德見而竒其魁偉賜之以食一進斛餘德驚曰所噉如此非耕能飽且才貌不凡堪為貴人可以一縣試之於是拜逢陵長政理脩明大收民譽燕録曰少帝建熈六年上谷人公孫凡乆隠昌黎之域冬衣單布寝土牀上夏則併飡茹於一器停使蛆臭然後乃食人咸異之莫能測也後魏書曰裴安祖年八九嵗就師講至鹿鳴篇語諸兄云鹿得食相呼而况人也自此未曽獨食又曰髙閭嘗造胡叟家遇叟短褐曳柴從田歸舎為閭設酒食皆自手辦案其舘宇卑陋圍墻褊局而飯菜精潔醢醬調羮見其妾並哀跛𦕈衣布穿敝閭見其貧以衣物直十餘疋贈之亦無辭謝又曰盧彪為太子詹事魏收常來詣之訪以洛京舊事不待食而起云難為子費彪固留之良乆食至但有粟同葵菜木碗盛之片脯而已所待侍從亦盡設食一與此皆同又曰楊愔幼時為季父暐大嗟異顧謂賔客曰此兒恬裕有我家風宅内有茂竹遂為愔於林邉别葺一室命獨處其中常同盤具盛饌以飯之因以督勵諸子曰汝輩但如遵彦謹慎自得竹林别室同盤重肉之食後椿戒子孫曰吾兄弟若在家必同盤而食若有近行不至必待其還亦有過中食忍饑相待吾兄弟八人今存者有三是故不忍别食也又願畢吾兄弟不異居異財汝等眼見非為虛假如聞汝等兄弟時有别齋獨食比人又不如吾等一世也又曰元欽曽託青州人髙僧夀為子求師師至未幾逃去欽以讓僧夀僧夀性滑稽乃謂欽曰凡人絶粒七日乃死始經五朝便爾逃遁去食就信實有所闕欽乃大慙於是待客稍厚又曰崔敬友恭寛接下循身勵節自景明以降頻嵗不登饑寒請丐者取足而去又置逆旅於蕭然山南大路之北設食以供行者又曰刁少雍字季仲少聪穎有孝行尤為祖父紹先所愛紹先性嗜羊肝常呼少雍共食及紹先卒少雍終身不食肝北齊書曰崔瞻在御史臺恒於宅中送食備盡珍羞别室獨飡處之自若有一河東人士姓裴亦為御史伺瞻便往造焉瞻不與交言又不命七筋裴坐觀瞻食罷而退明日裴自携七筋恣情飲噉瞻方謂裴云我初不喚君食亦不共君語君遂能不拘小節昔劉毅在京口冒請鵝炙豈亦異於是乎君定名下於是每與同食又曰趙郡王叡十嵗喪母髙祖親送叡至領軍府發喪舉聲殞絶哀感左右三日水漿不入口髙祖與武明婁皇后殷勤敦譬方漸順㫖由是髙祖食必喚叡同案其見愍惜如此又曰文宣昬逸常山王演固諫大被歐撻閉口不食太后極憂之常謂左右曰儻小兒死奈我老母何於是每問王疾謂曰弩力强食當以王晞還汝乃釋晞令住王抱晞曰吾氣息惙然恐不能相見晞流涕曰天道神明豈令殿下遂斃耶今至尊為人兄尊為人主安可與計殿下不食太后亦不食殿下縱不自惜不惜太后乎言未卒王强坐而飯晞由是得免遂還於王友又曰陽休之除中山太守先是􅅊道建宋欽道代為定州長史帶中山太守並立制禮之官出行不得過百飲食有者即數錢酬之休之常以為非及至郡復相因循或問其政休之曰吾昔非之者為其失仁義今日行之者自欲避嫌疑豈是夙心直是處世難耳後周書曰柳虬脱畧人間不拘小節敝衣蔬食未嘗改操人或譏之虬曰衣不過適體食不過充饑孜孜營求徒勞思慮耳又曰長孫澄雅好賔客接引忘疲雖不飲酒而好觀人酣興常恐座客請歸每勅中厨别進異饌留之隋書曰田翼不知何許人也性至孝養母以孝聞其母卧疾嵗餘翼親易燥濕母食則食母不食則不食唐書曰髙祖師次于古推去絳郡二十餘里有紫雲如華盖樓闕之形正臨髙祖之上時隋降郡通守陳叔逹堅守不下髙祖謂厨人曰吾明日下城然後朝膳辛卯引兵攻城自旦及辰而破髙祖乃食又曰太宗謂侍臣曰夫仁義之道當思之在心常令相繼若斯須懈怠則去之已逺猶如飲食資身恒令腹飽乃可存其性命又曰髙祖朝諸宰臣於政事堂供饌珍美議减其料東臺侍郎張文瓘曰此食天子所以重機務待賢才也吾輩若不任其職當自陳乞以避賢路不可减削公膳以邀求名譽也國家之所費不在此苟有益於公道斯亦不為多也衆乃止又曰髙宗朝文武官獻食賀破髙麗上御𤣥武門之觀德殿奏九部樂極歡而罷又曰髙宗朝皇太子乆在内不出稀與宦官接見典膳丞邢文偉减膳上啓曰切見大戴記曰太子既冠成人免保傳之嚴刑有書過之史虧膳之宰史之義不得不書不書則死之宰之義不得不徹不徹則死之近者已來未甚延納談譏不接謁見尚稀三朝之后但與内人獨居何由發揮聖智睿哲文明者乎今使雖闕官宰當奉職恭備所司不敢逃死謹守禮經遽申减膳其年右史員闕宰臣進擬數人上曰文偉嫌我兒不讀書不肯與肉吃此人甚正直可用為右史遂拜焉又曰盧懐慎為黄門監兼吏部尚書卧病既乆宋璟從愿常相與訪焉懐慎卧於敝簣單門無簾箔每風雨至即以蓆蔽焉常器重璟及從愿見之甚喜留連永日命設食有蒸豆兩甌菜數爼而已此外翛然無辦又曰􅅊陟性尚奢侈於饌羞尤為精潔植榖麥仍以鳥羽擇米每食畢視厨中所委棄不啻萬錢之直又曰裴冕性本侈靡尚車服及營珍膳每㑹賔客有昧于品味之名者又曰順宗時宰臣鄭珣瑜􅅊執誼方與諸宰相㑹食於時中書故事丞相方食百寮無敢通見者王叔文是日至中書欲與執誼計事令直省通執誼直省以故事告叔文叔文怒叱直省直省懼入白執誼執誼逡廵慙赧竟起迎叔文就其閤語良乆宰相杜佑髙郢珣瑜皆停筯以待報者云叔文索飯􅅊相公已與之同食閤中矣佑郢等心知其不可畏懼叔文莫敢出言珣瑜獨歎曰吾豈可伏處此乎顧左右取馬徑歸遂不起又曰永泰中軍客使魚朝恩加内侍監判國子監事丁未詔魚朝恩赴國子監視事将令宰相大臣及常叅并六軍将軍扵國子監送上仍令京兆府造食出教坊樂以為附學生列於學舘廊下待詔給錢一萬貫充食本以為附學生厨食之資朝恩自是數詣國學從者常數百人京兆率錢以備膳羞一費或至數十萬又曰楊炎與門下侍郎盧杞同執大政杞形神䜛宿為所褻而炎氣岸髙峻罕防細故方病飲膳無節或為糜飱别食閣中每登臺㑹食辭不能偶讒者乗之謂把曰楊公鄙不欲同食杞衘之又曰常衮為相将固讓堂厨同列以為不可而止讒者以為厚禄重賜所以優賢崇國政也不能當辭位不宜辭食太平御覽卷八百四十八
