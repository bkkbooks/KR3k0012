front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_695-1a, image: WYG0899/WYG0899-0223a.png}
body:
  text: 太平御覧卷六百九十五宋李昉等撰服章部十二襦袴袴褶襦説文曰襦短衣也一曰􅀢衣􅀢温也奴案反釋名曰􅃭煗也言温煗也單襦如襦而無絮也反閉襦之小者也却向著之領含於項反於背後閉其衿漢書曰班伯為侍中與王許子弟為羣在於綺襦紈袴之間非其好也又曰昌邑王被廢太后被珠襦如淳曰以珠飾􅃭晋書曰貫珠為􅃭盛服坐武帳中王前聼詔又曰哀帝以東園秘器珠襦玉柙皆豫以賜董賢東觀漢記曰亷范字叔度為蜀郡太守舊制禁民夜作范毁削先令百姓為便歌之曰亷叔度來何暮不禁火民安作平生無襦今有五袴又曰來歙詣雒見上上大喜觧所被襜襦衣歙又曰第五倫性莭儉為二千石常衣布襦又曰梁鴻妻孟氏女布襦袴裙鴻曰此眞梁鴻妻也魏志曰管寕常着皂㡌布襦袴隨時單複晉令曰旄頭羽林着韋腰襦齊書曰武陵昭王曄過竟陵王子良宅冬月道逢乞人脫襦與之子良見曄衣單進襦於曄曄曰我與向人亦復何異梁書曰顧恊少清介有志操初為廷尉正冬服單薄寺卿蔡法度欲觧襦與之憚其清嚴不敢發口謂人曰我願觧身上襦與顧郎難衣食者竟不敢遺之又曰郭祖深清儉常服故布襦又曰索君正為豫章内史性不信巫邪有師世榮稱道術為一郡巫長君正在郡小疾主簿熊丘問巫師云須疾者衣為信命君正以所着襦與之事竟取襦去云神将送與北斗君君正使檢諸身於衣裏獲之以為亂政即刑於市而焚神一郡無敢行巫後魏書曰髙祖復至鄴見公卿曰朕昨日入城見車上婦人冠㡌而着小襦襖者尚書何為不察任城王澄曰着者猶少帝曰任城意欲全着乎一言可以喪邦其斯之謂可命史官書之東宫舊事曰太子納妃有紫縠襦綘紗繡縠襦吳越春秋曰勾踐與妻入臣吳夫人衣無緣之裳左開之􅃭莖以養馬又曰吳王闔閭𦵏女以珠襦之寳鍾離意别傳曰意為司徒侯覇府議掾詔送三百人到河北遇隆冬到𢎞農意輙使属縣令出錢與徒作襦袴光武謂侯覇曰君所使吏仁恕用心乎列仙傳曰組伯子者冬着單衣盛暑襦袴列異傳曰東海君以織成青襦遺陳節方述異記曰乾羅者慕容瘣之十一世祖着金銀襦鎧乘白馬金銀鞍勒自天而墜鮮卑神之推為君長西京雜記曰趙飛鷰為皇后其弟在昭陽殿上遺織成上襦呂氏春秋曰子産治鄭鄧析務難之約民大獄一衣小獄襦袴鄭國大亂子産殺鄧析而民服桓譚新論曰待詔景子春素善占坐事繫獄其婦朱君至獄門通言遺襦袴子春驚曰朱君来言與朱為誅袴而襦中絶者也我當誅斷也後遂腰斬世説曰司馬宣王從遼東還有六十老人寒凍于路乞一襦公與之酒左右曰官不少襦可賜之公與之酒何曰襦官中物臣無私施語林曰謝鎮西著紫羅襦據胡牀彈琵琶作大道曲也夣書曰上襦為大夫婦人夣之得賢夫也束晳近遊賦曰繫時襦以御冬古詩曰羅敷好蠶桑採桑城南隅紺綺為下裳紫綺為上􅃭又曰妾有繡腰襦葳􅅋金縷光陸機與長沙夫人書曰士璜亡恨一襦少便以機新襦衣與之袴説文曰袴脛衣也釋名曰袴跨也両股各跨别也留幕冀州所名大褶下至膝者也留牢也幕絡在衣表方言曰齊魯之間袴謂之褰或謂之襱關西謂之袴大袴謂之倒頓小袴謂之䘨􅤨楚通語也史記曰屠岸賈攻趙朔朔妻晉成公姊有遺腹公宫匿之生男屠岸賈索於宫中夫人置兒袴中祝曰趙宗若㓕即號若不㓕即無聲乃索兒竟無聲又後漢書云平文皇后王氏年十三因事入宫得幸於平文生昭成平文崩昭成在襁褓時國有内難將害帝后匿帝於袴中呪曰若天祚未終者汝無聲良乆不啼得免於難漢書曰淮隂少年有侮韓信者衆辱信曰能死刺我不能出袴下於是信熟視俛出袴下一市皆笑信以為怯又曰周仁為人隂重不泄嘗衣弊補衣溺袴張晏曰隂重不泄下不潔故溺袴甚為不潔清以是得幸景帝又曰昌邑王賀衣短衣大袴又曰朱博瑯琊郡功曹官属多褒衣大袴又曰昭帝上官后霍光外孫光欲后擅寵有子帝體不安左右及醫皆阿意言宜禁内宫人使令皆為窮袴多其帶後宫無進者張晏曰窮袴前後有襠使不得交通東觀漢記曰更始所爵多群小被服威儀不以衣冠或綉靣衣錦袴後漢書曰馬援田牧至有牛馬羊數千頭盡散昆弟故舊身衣羊裘皮袴又曰祭遵賞賜與士共之家無私財身衣韋袴又曰吳良字大儀齊國臨淄人以清白守正稱為郡議曹掾正旦掾吏入賀門下掾王望舉觴上夀曰齊郡遭離盗賊今明府視事五年家給人足良跪曰門下掾佞謟明府勿受其觴盗賊未盡人庻困乏今良曹掾尚無袴望曰議曹惰窳自無袴寧足為不家給人足耶太守曰此生言是賜良鰒魚百枚謝承後漢書曰秦䕶清亷不受禮賂家貧衣服單露郷人歌之曰冬無袴有秦䕶魏略曰賈逵居貧無袴過其妻兄桞孚家宿至明無何著孚袴去時人謂為通逵又曰許允聞李豐等被収欲往見大将軍已出門廻遑不定中道還取袴豐等已収訖大将軍聞允前遽怪之曰我自収豐等不知士大夫何為忽忽乎又曰趙岐避難北至海著袴絮巾在市中賣餅宋書曰劉穆之壊布裳為袴往見武帝帝謂曰我始舉大義須一軍吏甚急誰堪其選穆之曰無見踰者帝笑曰卿能自屈吾事濟矣梁書曰劉顯將之潯陽朝賢畢祖道顯懸布十疋約曰儉衣来者以賞之衆人競改常服不過短長之間顯曰将有甚於此矣既而周𢎞正縁絲布袴軒昂而至折標取帛又曰元帝愍懐太子眤狎羣小好着㣲服常入朝公服中着碧絲布袴摳衣元帝見之帝大怒遣尚書周𢎞正責之又曰安城王秀為郢州冬月常作袴以賜凍者又曰王裕之常使二老婦女戴五條辮着青絞羅袴飾以朱彩又曰何㸃永元中崔景慧圍城人間無薪㸃悉伐園樹以贍親黨景慧性好俠義慕交㸃㸃不顧之至是乃逼召㸃㸃裂裙衣為袴往赴其軍終日談説不及軍事其語黙之迹如此北齊書曰丞相司馬任胄主簿李世林都督鄭仲禮房子逺等潜謀害神武自魏氏舊俗以正月十五日夜為打簇戯能中者即時賞帛胄令仲禮藏刀於袴中因神武臨觀謀竊發後敗韓子曰鄭人卜子使妻為袴曰象吾故袴妻因鑿新袴為孔又曰昭侯使人藏弊袴侍者曰上不以賜左右而藏之乎昭侯曰吾聞時主之愛一嚬一笑有為嚬而嚬有為笑而笑今袴豈特嚬笑哉嚬笑不妄為袴豈可無功而與之吾必待有功者故藏之事具賞賜門鹽鐡論曰古者鹿裘皮㡌及其後大夫士狐貉庻人則毛袴髙士論曰孫略冬日見貧士脱袴遺之列士傳曰孟嘗君食客三千人上客食肉中客食魚下客食菜馮煖經冬無袴靣有飢色郭子曰孫興公云曹輔佐才如白地明光錦裁為負板袴非無文彩然酷無財製俗説曰謝仁祖年少時喜著刺文袴出郊郭外其叔父請責之仁祖於是自改遂為名流董巴漢輿服志曰祀宗廟綘袴示赤心奉神也捜神記曰晉中興作袴者直幅為口無殺大夫裁之士敦之東宫舊事曰皇太子納妃有綘直文羅袴七彩杯文綺袴鄴中記曰石虎獵着金縷合歡袴廣州先賢傳曰申朔字元遊倉梧人為九真都尉布襦布袴郷邑歎慕之蔡廊彈事曰兼司徒員外散騎常侍謝祭應着綘袴而祭披袴不以貫足有虧常體應邵漢官儀曰司空騎吏以下皂袴因秦水行今漢家火行宜綘袴又曰虎賁中郎将衣紗縠單衣虎紋錦袴魏舊事曰楊平善裁袴以官絹百疋作小袴百枚世説曰武帝嘗降王武子家婢子百餘人皆綾羅袴裙手擎飲食袴褶釋名曰褶襲也覆上之言也晉書曰楊濟字文通厯位鎮南征北将軍遷太子太傅濟有才藝嘗從武帝校獵北邙下與侍中王濟俱着布袴褶騎馬執角弓前輦晉中興書曰郭文舉在餘杭山縣令顧颺以文舉山行與韋袴褶一具文舉不納使者置衣室中而去文舉亦無言袴褶爛于戸内趙書曰中書令徐光奏耕服介幘青縑袴褶宋書曰元㐫劭弑逆袁淑止之劭因起賜淑等袴褶又就上衣取錦裁二尺為一叚又中裂之與淑及左右使以縳袴褶又曰張暢為南譙王義宣司空長史南郡太守元㐫弑逆義宣發哀之日即便舉兵暢為元佐位居僚首哀容俯仰䕃映當時舉哀改服着黄韋袴褶出射堂以簡人音姿容止莫不矚目見者皆願為盡命蕭子顯齊書曰東昏侯拜愛姬潘氏為貴妃乗卧輿自騎馬為從着織成袴褶後魏書曰傅靈根及弟靈越南走靈根叔乾愛先在南遣船迎之越得免靈根差期不得俱渡臨濟人知剉斬殺之乾愛出郡迎靈越問靈根愆期狀靈越慚不應答乾愛不以為愛惡勑左右取匣中烏皮袴褶令靈越曰代所常服靈越言不須乾愛云汝可着體上衣服見桓公耶桓公䕶公為刺史靈越竟不肯着唐書曰𤣥宗時御史大夫李適之秦每大禮六品官並服朱衣自是以下許通着袴褶如有􅆭故不合着朱衣袴褶者聽不入自餘應着而不着者請奪俸以懲不恪西河記曰西河無蠶桑婦女以外國異色錦為袴褶魏百官名曰三公朝賜青林文綺長袖袴褶一方道盛北疆記曰虞主南郊着皂斑褶繡袴江表傳曰呂範願暫領督出釋褠着袴褶執鞭詣闕下啓事語林曰夏少明在東不知名聞裴逸民知人乃褁粮寄載入洛從之未至家少許見一人着黄皮袴褶乘馬將獵夏問曰裴逸民家近逺荅曰君何以問夏曰聞其明而知人故從㑹稽來投之裴曰身是逸民君明可更來明往逸民果知之乃用為西門侯於此遂知名傅暢自序曰余年五嵗散騎常侍魯叔虎與先公甚友善每來往喜與余戯嘗觧余衣褶披其背脱余金環侍者謂余恡惜而余笑與之經數日不索來太平御覧卷六百九十五
