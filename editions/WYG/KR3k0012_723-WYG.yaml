body:
  text: 太平御覽卷七百二十三宋李昉等撰方術部四醫三齊書曰徐嗣伯為臨川王映所重時直閣将軍房伯玉服五䂖散十許劑無益更患冷夏日常復衣嗣伯為診之曰卿伏熱應須以水療之非冬月不可至十一月氷雪大甚令二人夾促伯玉伯玉解衣坐石上取冷水從頭洗之盡二十斛伯玉口噤氣絶家人啼哭請止嗣伯遣人執杖防閤敢有諫者撾之又盡水五斛伯玉始能動而見背上彭彭有氣俄而起坐曰熱不可忍乞冷飲嗣伯以水與之一飲一升病都差自爾恒發熱冬月猶單衣體更肥壯又嘗有傴人患滯冷積年不差嗣伯為診之曰此尸注也當得死人枕煮服之乃愈於是往古塜中取枕枕上一邉腐缺服之即差後秣陵人張景年十五腹脹面黄衆醫不能療以問嗣伯曰此石蚘音迥極難療當取死人枕煮之依語煮枕以湯投之得大痢并蚘蠱頭堅如石者五升病即差後沈僧翼患眼痛又多見鬼物以問嗣伯曰邪氣入肝可覔死人枕煮服之服竟可埋枕於故處如其言又愈王晏問之曰三病不同而皆用死人枕而俱差何也答曰尸注者鬼氣伏而未起故令人沉滯得死人枕促之魂氣飛越不得復附體故尸注可差石蚘者久蚘也醫療既僻蚘蠱轉堅世間藥不能遣所以須鬼物療之然後可散故令煮死人枕也夫邪入肝故使眼痛而見魍魎應須邪物有鈎之故用死人枕也氣因枕去故復埋於塜間也又春月出南籬門戱聞草屋中有呻吟聲嗣伯云此病甚重更日不療必死乃往視之見一老姥稱體痛而處處有􅗼音敢黒無數嗣伯還煮斗餘湯送令服之服之訖痛熱愈甚跳投􅇃者無數須㬰所􅗼處皆拔出長寸許乃以膏塗諸瘡口三日而復云此名針釘疽也又薛伯宗善徙癰疽公孫泰患發背伯宗吹氣封之徙置齋前栁樹上明日癰消樹邉便起一瘤如拳大稍稍長二十餘日瘤大濃爛出黄赤汁升餘樹為之痿損齊書曰禇澄字彦道建元中為吴郡太守舊好李道念以事到郡澄見謂曰汝有重病答曰舊有冷病至今五年衆醫不差澄為診脈曰汝病非冷熱當是食雞子過多所致令取蒜一升煮之服一服乃吐一物如升許涎褁之而動開視乃雞雛十二頭而病都愈吳均齊春秋曰顧歡字𤣥平吴都人也隠於㑹稽山隂白石村歡宿性仁愛素有道風其濟人也或以禳厭而多全䕶有病者造之歡問君家有書乎答曰惟有孝經三篇歡曰取置病人枕邉恭敬之當自若如言果愈後問其故歡曰善禳禍正勝邪故爾梁書曰陶𢎞景字通明丹陽人性愛林泉尤好著述常曰我讀書未滿萬卷以内典叅之乃當小出耳先生性好醫方専以拯濟欲利益羣品故修撰神農本草經三卷為七卷撰真誥十卷集騐方五卷廣肘後方為一百卷世所施用多獲異効焉又曰范雲疾召醫徐文伯視之文伯曰緩之一月乃復欲速即時愈正恐二年不復可救雲曰朝聞道夕死可矣而况二年文伯乃下火而壯焉重衣以覆之有頃許汗流於此即起二年果卒又曰王僧孺工屬文善楷𨽻多識故事侍即金元起欲工素問訪以砭石僧孺荅曰古人當以石為針必不用鉄説文有此砭字許慎云以石刺病也東山經髙氏之山多針石郭璞云可以為砭針春秋美疢如惡石服子慎注云石砭石也季世無復佳石故以鉄代也後魏書曰王顯字世榮樂平人也頗叅士流雖以醫術自達而明敏有决㫁才用初聞昭襄后之懐世宗也夢為日所逐化龍而遶后寤而驚悸遂成心疾勑召諸醫診脈徐謇云是㣲風入藏宜進湯藥顯云案三部脈非有心疾将是懐孕生男之象後果如顯言補御史常在御營進藥出入禁内世宗詔顯撰藥方三十卷頒布天下又曰徐謇字成伯丹陽人也與兄文伯皆善醫藥謇性秘忌承奉不得其意雖貴為王公不為措療魏孝文遷洛除中散大夫子雄亦以醫術稱又曰裴宣患篤世宗遣太醫令馳驛就診并賜御藥宣素明隂陽之書自始患便知不起因自剋亡日果如其言又曰高允㣲有不懌猶不寐卧呼醫請藥出入行止吟咏如常高祖文明太后聞而遣醫李循往脈視之吿以無恙循入宻陳允榮衛有異懼其不久於是遣使備賜御膳􅈿羞自酒米至於鹽醢百有餘品皆盡時味及牀帳衣服茵被几杖羅列於庭王府往還慰問相屬允喜形於色語人曰天恩以我篤疾大有所賚知非具瞻容矣表謝而已不有他慮於是數日夜中卒家人莫覺北齊書曰張子信少以醫術知名隠於白鹿山時逰京師甚為魏収崔季舒所知嘗以詩酬贈大寧中徵為尚藥典御嵗餘謝病歸又曰馬嗣明河内野王人少明醫術診脈預知生死邢劭子寳十七八苦傷寒嗣明診其脈吿楊愔曰此子今病不療自愈然不踰年必死覺之少晚不可為也數日兩公待宴酒酣顯祖曰子才兒我欲以近郡處之愔曰年少未可劭出愔以嗣明言奏乃止寳未朞而卒又楊令患背發腫嗣明以麄理色石大如鵝卵烈火焼令黄赤投醋中使屑落盡暴乾𢷬篩和傅之立愈嗣明從駕之晉陽至遼陽見牓云有人家女病乃抵其家問其由云曽得麥穗見赤物長三寸似蛇入指中因驚倒手臂腫重月餘日漸及半身疼痛不可忍呻吟晝夜不絶嗣明曰毒蛇為鶴所啄遣血於此犯而得之帥即受方令服十餘劑以湯散補之明年還鄴女疾都愈載鏹而歸嗣明恃其伎視徐之才崔鸞叔蔑如也隋開皇中卒又曰李元忠趙郡栢人人也代為著姓元忠倜儻博學通隂陽術數初以母老多患乃専心醫藥研習積年遂善於方技性仁恕人有疾病無間貴賤咸為療之故鄉里推敬聲稱益逺後拜南郡太守族弟宻性方直亦以母老習醫遂成妙手又曰崔季舒字叔正博陵安平人少孤明敏有識幹精習於醫術經方本草常所披覽天保中於徒所無事更竟意研精後雖位望顯貴亦不懈怠張太素齊書曰徐之才字士茂高平金鄉人五葉祖仲融隠於秦望山有道士過之求飲因以刳蘆遺之曰習是子孫當以道術救世位至二千石開視乃扁鵲鏡經一卷習之遂為良醫至濮陽太守父雄員外散騎侍郎代傳其術號為神明而之才㓜而俊發尤為精敏仕梁為豫章王綜鎮東右常侍隨綜鎮彭城綜降魏之才走至吕梁為魏所獲既羇旅以醫自業又諧隠滑稽無方王公貴人争饋之為貴人居矣稍遷員外散騎常侍加中軍金紫天平中高祖詣晉陽恒居内舘所療十全皇建中除兖州刺史未行武明皇太后不豫之才奉藥立愈賞賜巨萬有人脚跟腫痛不堪忍諸醫莫識之才問曰蛤精也當乘船入海出脚水中得之疾者曰是也之才為割得兩蛤子大如榆筴或以五色骨為佩刀靶之才曰此人瘤也何從得之對曰於古塜見蠋螻額骨長數寸試削視有文理故用之其通識類此武成王酒色過度恍惚不恒曽病發自言初見空中有五色物稍近變成一美婦人去地數丈亭亭而立之才曰此色慾過多大虛所致即進藥一服稍稍逺變成五色物數服而愈病病發輒馳召之針藥所加無不愈者武成王生齪牙遍召諸醫尚藥典御鄧宣文以實對帝怒而撻之之才拜賀曰此謂智牙生則聖明而夀帝大悦賜帛萬疋加金玉重寳又曰張逺遊齊人以醫藥道術知名尋有詔徵令與術士同合九轉金丹成顯祖置之玉匣曰我貪人間樂不能飛上天待我臨死方可服之後周書曰姚僧坦字法衛吴興武康人也父菩提為髙平令嘗嬰疾厯年乃留心醫藥梁武帝性又好之毎召菩提討論方術言多㑹意由是頗禮之僧坦㓜通洽居喪盡禮年二十四即傳家業梁武帝召入禁中靣加討試僧坦酬對無滯梁武甚竒之時武陵王所生葛修華宿患積時方術莫効帝令僧坦視之僧坦還説其状武帝嘆曰卿用意綿宻乃至於此以疾候疾何疾可逃朕每留情頗識治體今聞卿説益開人意十一年帝因發熱欲服大黄僧坦曰大黄乃是快藥然至尊年高不宜輕用帝弗從遂至危篤梁元帝嘗有心腹疾諸醫咸謂宜用平藥可漸宣通僧坦曰脈洪而實此有宿妨非用大黄必無差理帝從而愈及大軍克荆州為燕公于謹所召大相禮接太祖遣使馳驛徵僧坦謹固留不遣謂使人曰吾年時衰暮疢疾嬰沉今得此人望與之偕老太祖以謹勲隆重乃止明年隨至長安伊婁穆以疾還京請僧坦省疾自云自腰至臍似有三縳兩脚緩縱不復自持坦即為診脈處湯三劑穆初服一劑上縛解再服中縛解又服三縛悉除而兩脚疼痺猶自攣弱更為合散稍得屈伸至九月遂能起行大将軍襄樂公賀蘭隆先有氣疾加以水腫喘息奔急坐卧不安或有勸其服决命大散者其家疑未能决乃問僧坦僧坦曰意謂其患不與大散相當若欲自服不煩賜問因而委去其子殷勤拜請曰多時俯屈今日始來竟不下治意實未盡僧坦知其可差即為處方諸病悉愈大将軍樂平公竇集暴感風疾精神瞀亂無所知覺諸醫先視者皆云已不可救僧坦後至曰困矣終當不死若專以見付相為治之其家欣然僧坦為合湯散所患即瘳大将軍永世公叱伏列椿苦痢積時而不廢朝謁燕公于謹嘗問僧坦曰樂平永世俱有痼疾若如僕意永世差輕對曰夫患有深淺時有危殺樂平雖困終當保全永世雖輕必不免死謹曰君言必死當在何時對曰不出四月果如其言謹歎異之文宣太后患勢不輕諸醫並云無慮帝曰朕人子之情可以得君臣之意言在無隠公以為何如對曰臣無聽聲視色之妙特以經事已多凖之常人竊已憂懼帝泣曰公旣决之矣知復何言尋而太后崩四年髙祖親戎東討至河隂遇疾口不能言臉垂覆目不得視一足短縮又不得行僧坦以為諸臟俱病不可並治軍中之事乃莫於語先處方進藥帝遂得言又治目目疾便愈未及治足足疾亦瘳比至華州帝已痊復是嵗髙祖幸雲陽遂寝病乃召僧坦赴行在所内史栁昂私問曰至尊貶膳日久脈候如何對曰天子上應天心或非愚所及若凢庶如此萬無一全尋而帝崩宣帝初在東宫嘗苦心痛乃令僧坦治之其疾即愈及即位恩禮彌隆大象二年除太醫下大夫帝尋有疾僧坦宿直侍疾帝謂隨公曰今日性命惟委此人僧坦診候知帝危殆乃對曰臣荷恩既重思在効力但恐庸短不逮敢不盡心帝頷之及静帝嗣位遷上開府儀同大将軍隋開皇初卒僧坦撰集驗方二十卷行紀三卷行於世隋書曰許智藏高陽人也祖道㓜嘗以母疾覽醫方因而究極世號名醫誡其諸子曰為人子者嘗膳視藥不知方術豈謂孝乎由是世相傳授仕梁官至員外散騎侍郎父景武竟陵王諮議叅軍智藏少以醫術自達仕陳為散騎常侍及陳㓕高祖以為員外散騎侍郎詣揚州㑹秦孝王俊有疾上馳召之俊夜中夢其亡妃崔氏泣曰本來相迎如許智藏将至其人若到當必相苦為之柰何明夜俊又夢崔氏曰妾得計矣當入靈府中以避之及智藏至為俊診脈曰疾已入心即當發癎不可救也果如言俊數日而薨上竒其妙賫物百叚煬帝即位智藏時致仕于家帝每有所苦輒令中使就詢訪或以輿迎入殿扶登御牀智藏為方奏之用無不効唐書曰甄權許州扶溝人也嘗以母疾與弟立言專醫方得其㫖趣隋開皇初為秘書省正字後稱疾免隋魯州刺史軍狄嶔苦風患手不得引弓諸醫莫能療權謂嶔曰但将弓箭向垜一針可以射矣針其肩偶一穴應時射真觀十七年權年一百三嵗太宗幸其家觀其飲食訪以藥性因授中散大夫賜几杖衣服其年卒撰脈針經方明堂人形圖各一卷弟立言武宣中累遷太常丞御史大夫杜淹患風毒發腫太宗令立言視之既而奏曰從今更十一日午時必死其言果騐時有尼明律年六十餘患心腹鼔脹身體羸瘦已經二年立言診其脈曰腹内有蠱當是誤食髪為之耳因令食雄黄須㬰吐一蛇如人小手指惟無眼燒之猶有髪氣其􅍚乃愈又曰許𦙍宗常州義興人也初仕陳為新蔡王外兵叅軍時栁太后感風不能言名醫療皆不愈脈益沉而噤𦙍宗曰口不可下藥宜以湯氣薰之令藥入腠理周時可差乃造黄耆防風湯數十斛置於床下氣如烟霧其夜便得語武徳初關中多骨蒸病得之必死逓相連染諸醫無能療者裔宗每療無不愈或謂曰公醫術若神何不著書以貽将來𦙍宗曰醫乃意也在人思慮又脈候幽㣲苦其難别意之所解口莫能言自古之名手惟是别脈脈既精别然後識病去病别之於藥料正相當者惟須單用一味直攻彼病藥力既能病即立愈今人不能别脈莫識病源以情臆度多安藥味譬之於獵未知􅇠所多發人馬空地遮圍或兾以一人偶然逢也如此療病不亦踈乎假令一藥偶然當病復共他味相合君臣相制氣勢不行所以難差諒由於此脈之深趣既不可言虛設經方豈加於舊吾思之久矣故不能著述耳年七十餘卒又曰秦鳴鶴為侍醫髙宗苦風眩頭重目不能視武后亦幸災兾行其志至是疾甚召鳴鶴張文仲診之鳴鶴曰風毒上攻若刺頭出少血即愈矣天后自簾中怒曰此可斬也天子頭上豈是刺出血處耶上曰醫之議病理不加罪且吾頭重悶殆不能忍出血未必不佳命刺之鳴鶴刺百㑹及腦户出血上曰吾眼明也言未畢后自簾中頂禮拜謝之曰此天賜我師也躬負繒寶以遣鳴鶴又曰安金藏為太常工人時睿宗為皇嗣或有誣害皇嗣潜有異謀者則天令來俊臣按之左右不勝楚毒皆欲自誣唯金藏大呼謂俊臣曰公既不信金藏言請剖心以明皇嗣不反即引刀自剖其胸五臟並出血流被地氣遂絶則天聞之令舁入中宫遣一人却内五臟入以桑白皮縫合之傅藥經宿乃蘓太平御覽卷七百二十三
