front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_619-1a, image: WYG0898/WYG0898-0576a.png}
body:
  text: 太平御覽卷六百十九宋李昉等撰學部十三採來遺逸借書賜書寫書載書負書附焚書採來遺逸史記曰髙祖入咸陽蕭何先収秦圖書劉歆七略曰武帝廣開獻書之路百年之間書積如丘山故外有太史博士之藏内則正閣廣内秘室之府物理論曰魯恭王壊孔子舊宅得周書闕冬官漢武購千金而莫有得者遂以考工記備其數漢書曰孝成帝三年遣謁者陳農求遺書于天下東觀漢記曰杜林於河西得漆書古文尚書經一卷每遭困厄握抱此經後魏書曰髙謐字安平典祕閣謐以墳典殘缺奏請廣訪羣書大加繕寫由是圖籍莫不審正又曰李暠署劉炳為儒林祭酒從事中郎暠尚好文典書史穿落者親自補治隋書曰劉炫除殿内將軍時牛宏奏請購求天下遺逸之書炫遂偽造書百卷題為連山易魯史記等録上送官取賞而去後有人訟之經赦免死北史曰隋裴矩伐陳之役領元帥記室破丹陽晉王廣令矩與髙穎收陳圖籍又曰隋牛𢎞上表請開獻書之路曰昔者周徳既衰舊經紊棄孔子以大聖之才開素王之業憲章祖述制禮刋詩正五始而修春秋闡十翼而𢎞易道及秦皇馭㝢吞滅諸侯先王墳籍掃地皆盡此則書之一厄也漢興建藏書之䇿置校書之官至孝成之代遣謁者陳農求遺書于天下詔劉向父子讐校篇籍漢之文典於斯為盛及王莽之末並從焚燼此則書之二厄也光武嗣興尤重經誥未及下車先求文雅肅宗親臨講肄和帝數幸書林其蘭臺石室鴻都東觀秘牒墳典更倍於前及孝獻移都吏民擾亂圖書縑帛皆取為帷嚢所收而西裁七十餘乗屬西京大亂一時燔蕩此則書之三厄也魏文代漢更集經典秘書郎鄭黙刪定舊文時之論者美其朱紫有别晉氏承之文籍尤廣晉秘書監荀朂定魏内經更著新簿屬劉石慿陵從而失墜此則書之四厄也永嘉之後冦竊競興其建國立家雖傳名號憲章禮樂寂滅無聞劉裕平姚泓收其圖籍五經子史纔四千卷皆赤軸青紙文字古拙並歸江左宋祕書丞王儉依劉氏七略撰為七志梁人阮孝緒亦為七録縂其書數三萬餘卷及侯景渡江壊破梁室秘省經籍雖從兵火其文徳殿内書史及公私典籍重本尚有七萬餘卷悉送荆州及周師入郢繹悉焚之於外城所収十纔一二此則書之五厄也後魏爰自幽方遷宅伊洛日不暇給經籍闕如周氏創基關右戎車未息保定之始書止八千後加收集方盈萬卷髙氏據有山東初亦採訪驗其本目殘闕猶多及東夏初平獲其經史四部重雜三萬餘卷所益舊書五千而已今御書單本一萬五千餘卷部帙之間仍有殘缺比梁之舊目止有其半至於隂陽河洛之篇醫方圖譜之說彌復為少臣以經書自仲尼迄今數遭五厄興集之期屬膺聖代今秘籍見書亦足披覽但一時載籍須令大備不可王府所無私家乃有若猥發明詔兼開購賞則異典必致觀閣斯積上納之於是下詔獻書一卷賞縑一疋一二年間篇籍稍備乃總加編次召天下工書之士京兆韋霈南陽杜頵等于秘書内補續殘缺為正副二本藏於宫中其餘以實秘書内外之閣凡二萬餘卷煬帝即位秘閣之書分為三品於東都觀文殿東西廂屋以貯之東屋藏甲乙西屋藏丙丁後唐史曰都官郎中庾傳美充三州搜訪圖籍使傳美本偽蜀王衍之舊寮家在成都便於歸計且言成都具有本朝實録及傳美使迴所得纔九朝而已其餘殘缺雜書盖不足記借書西京雜記曰匡衡勤學邑人大姓文不識字家富多書乃與客作不求其價主人怪而問之衡曰願得主人書遍讀之主感歎給以書後成大儒後漢書曰王充師事扶風班彪好博覽而不守章句家貧無書常遊洛陽市肆間閱書一見輒能誦憶遂博通衆流百家之言蜀志曰李權從秦宓借戰國䇿宓曰成湯大聖覩野漁而有獵逐之失定公賢者受女樂而棄朝事道家法曰不見可欲使心不亂是以君子先以懿文徳也博物志曰蔡邕有書萬卷漢末年載數車與王粲粲亡後相國掾魏諷謀反粲子預焉既被誅邕所與粲書悉入粲族子葉王隠晉書曰齊王攸好學不倦借人書必手刋其謬然後還之又曰皇甫謐表從武帝借書上送一車與之謐羸病手不釋卷歴觀古今無不皆綜先賢傳曰延篤從唐季度受左氏欲寫傳本無紙乃借本誦及之辭歸季度曰卿言寫本何故辭歸荅曰已誦之矣齊張率傳曰時陸少𤣥家有父澄書萬餘卷率與少𤣥善遂通書籍盡讀其書陳書曰孔奐字休文山隂人好學經史百家莫不通渉沛國劉顯時稱學府毎共奐討論深相歎服乃執奐手曰昔伯喈墳素悉與仲宣吾當希彼蔡君足下無愧王氏所保書籍尋以相付後魏書曰崔亮家貧傭書自業時隴西李冲當朝任事亮從兄光徃依之謂亮曰安能乆事筆硯而不徃托李氏也彼家饒書因可得學亮曰弟妹饑寒豈可獨飽自可觀書於市安能看人眉睫乎後周書曰梁蔡文寳字敬仁嘗以書干僕射徐勉大為勉所賞異乃令與其子遊處所有墳籍盡以給之遂博覽羣書學無不綜北齊書曰劉晝少負笈從師服膺無勌恨下里少墳籍便䇿杖入都知太府少卿宋世良多書乃造焉世良納之恣意披覽畫夜不倦隋書曰盧思道字子行聰爽俊辨就魏收借異書數年之間才學兼著唐書曰裴行儉初以門䕃補宏文生累年在館唯閉户讀書館師將加薦舉固辭左僕射房𤣥齡問其故對曰遭隋季亂離私門書籍蕩盡兾在館披閱有所成耳又曰中書令李敬𤣥亳州譙人也博覽羣書特善三禮初上在東宫馬周啓薦之召入崇賢館兼預侍讀仍借御書令讀之又曰陽城字亢宗北平人也代為宦族家貧不能得書乃求為集賢寫書史竊官書讀之晝夜不出房經六年乃無所不通賜書後漢書曰東平王蒼傳明帝賜蒼以祕書列仙圖道術祕方又曰王景永平二年議修汴渠乃引見問景以理水景陳其利害應對敏捷帝善之乃賜景山海經河渠書禹貢圖又曰章帝賜黄香淮南孟子各一本又曰班彪字叔皮幼與從兄嗣共逰太學家有賜書内足於財好古之士自逺方來齊春秋曰蕭晉字元卿蘭陵人家有賜書志學不倦也陳書曰江揔字揔持幼篤學有詞采家傳賜書數千卷揔尋讀未嘗釋手也唐書曰垂拱三年新羅王金政明遣使請唐禮一部并雜文章令所司寫吉凶要禮并於文館詞林採其詞渉規誡者勒成五十卷賜之又曰開元十九年命有司寫毛詩禮記左傳文選各一部以賜金城公主從其請也寫書王子年拾遺記曰張儀蘇秦二人同志好學逓剪髪鬻之以相活或傭力寫書行遇聖人之文無題記則以墨書掌及股裏夜還寫之折竹為簡抱朴子自叙曰葛洪字稚川丹陽句容人洪生為二親所驕家累遭火典籍蕩盡伐薪賣之給筆夜以寫書家貧乏紙所寫皆反覆有字人少能讀者桓譚新論曰余同時佐郎官有梁子初楊子林好學所寫萬卷至于白首常有所不曉百許寄余余觀其事皆畧可見蕭子顯齊書曰隠士沈驎士火燒書數千卷驎士年過八十耳目猶聰明乃手寫細書復成三二千卷滿數十箱後魏書曰穆子容少好學無所不覽求天下書逢即寫録所得萬餘卷三國典略曰郎基字世業中山新市人魯郡太守智之孫也泛渉墳籍清慎無所營求嘗語人曰任官之所木枕亦不須作况重於此乎唯頗令人寫書樊子葢曽遺之書曰在官寫書亦是風流罪過基答曰觀過知仁斯亦可矣梁書曰袁峻字孝髙早孤篤志好學家貧無書從人假借必皆抄寫自課日五十紙紙數不登則不止後周書曰裴漢借人異書必躬自録本至於疾彌年亦未嘗釋卷載書負書附史記曰蘇秦說秦王書十上而說不行去秦而歸負書擔槖形容枯槁續漢書曰李固為公子躬步以驢負書從師墨子曰墨子南使衛載書甚多強唐子建而怪之對曰昔周公曰朝讀書夕見七十二士相天下猶如此吾安敢廢此也晉書曰張華無餘財唯文史溢几篋徙居載書三十車也焚書史記曰秦始皇二十二年令天下敢有藏詩書百家語者悉詣守尉燒之下三十日不燒黥為城旦所不禁醫藥卜筮種樹之書耳風俗通曰董卓蕩覆王室天子西移所載書七十車遇雨道難分半投棄即於處燒燔麋為灰穢淮南子曰王夀負書而行見徐慿曰事者應變而動書者言之所岀智不藉書王夀乃焚其書而舞也三國典略曰初侯景來既據東宫妓女尚有數百人景乃分給軍士夜于宫中置酒奏樂忽聞火起衆遂驚散東宫圖籍數百㕑焚之皆盡初太子夢作秦始皇者云此人復欲焚書既而見􅉯夢始驗焉又曰周師陷江陵梁王知事不濟入東閣行殿命舍人髙善寳焚古今圖書十四萬卷欲自投火與之俱滅宫人引衣遂及火滅盡并以寳劒斫柱令折歎曰文武之道今夜窮矣大平御覽卷六百十九
