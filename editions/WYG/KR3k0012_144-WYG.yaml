body:
  text: 太平御覽巻一百四十四宋李昉等撰皇親部十昭儀夫人貴人偼伃昭儀漢書曰武帝制倢伃娙娥傛華充依各有爵位而元帝加昭儀之號漢書曰孝元傅昭儀哀帝祖母也河内人少為上官太后才人元帝進幸有寵為人有才畧善事人下至宫人左右飲酒酹地皆祝延之産一男一女為平都公主男為定陶㳟王漢書曰孝元馮昭儀平帝祖母父奉世為執金吾上幸虎圏闘獸後宫皆坐熊佚出圏攀檻欲上殿左右貴人昭儀等皆驚走馮媫妤直前當熊而立左右殺熊上問人情驚懼何故當前媫妤曰猛獸得人而止妾恐熊至御坐故身當之元帝嗟嘆以此倍敬重焉男立為信都王媫妤爲昭儀元帝崩為信都太后與王俱居儲元宫宫名在長安門西又曰孝成趙皇后本長安宫人生時父母不舉三日不死乃収養及壮屬陽阿主家學歌舞號曰飛燕帝㣲行過陽阿主作樂見飛燕而悦之召入官大幸有女弟復召入俱為媫妤貴傾後宫許后廢立為皇后後寵少衰而弟更幸為昭儀居昭陽舍其中庭彤朱殿上髹漆砌皆銅沓冐黄金塗白玉階璧帶往往為黄金紅函藍田璧明珠翠羽飾之後宫未嘗有焉魏志曰魏因漢法母后之號皆如舊制自夫人以下世有増損太祖建國始命王后其下五等有夫人昭儀媫妤容華美人明帝又置淑妃昭華修儀後魏書曰世祖昭儀馮氏文明皇后之姑也后父朗坐事誅后遂入宫昭儀雅有母徳鞠養教誨年十四髙祖踐極選后為貴人皆是昭儀訓撫之力又曰孝文馮昭儀廢后馮氏之姊也髙祖還洛陽恩遇甚厚昭儀先以疾病文明太后遣還家為尼太后崩服終髙祖重引為左昭儀至洛稍有寵后禮愛漸衰昭儀自以年長且前入宫掖見待厚規為内主譛搆百端帝遂廢后為庶人昭儀寵愛過初専寢當夕宫人稀復進見後遂立為皇后沈約宋書曰漢元帝制昭儀世祖省之晉泰始二年又置昭華昭儀等以備九嬪也崔鴻十六國春秋前趙録曰嘉平二年立司空王育女為左昭儀尚書令任覬女為右昭儀晉書載記曰石勒定昭儀夫人位視上公貴嬪貴人視列侯員各一人三英九華視伯淑媛儀視子容華美人視男務簡賢淑不限員數西京雜記曰趙后腰體弱美行歩進止女弟昭儀不能弱骨豐肌尤善笑語為當時第一皆擅寵後宫西京賦曰増昭儀扵媫妤賢既公而復侯唐書曰髙宗六年將立昭儀武氏為皇后長孫無忌屢言不可帝復召于志寧等謂曰武昭儀有令徳朕欲立為皇后卿等謂如何志寧曰貞觀二十三年後先朝付託禇遂良望陛下問其可否竟不從無忌等言而立昭儀為皇后夫人周禮鄭康成注曰夫人之於后猶三公之於王坐而論婦禮無官職禮記昏義曰古者天子后立六宫三夫人九嬪二十七世婦八十一御妻以聽天下之内治以明章順故天下内和而家理五經要義曰古者后夫人必有女史彤管之法后妃羣妾以禮御於君所女史書其日月授其環以進退之生子月辰則以金環退之當御者以銀環進之著於左手既御著於右手左手陽也以當就男故著右手隂也既御而復故此女史之職也史記曰武帝時幸夫人尹媫妤邢夫人號娙徐廣曰五更反娥秩比中二千石尹夫人邢夫人同時並幸有詔不得相見尹夫人自請武帝許之即令他夫人飾從御者數十人來前尹夫人見之曰非邢夫人身也帝曰何以言之對曰視其身貎形狀不足以當人主於是有詔使邢夫人衣故衣獨身前來尹夫人望見之曰真是矣於是乃低頭俛而泣自痛其不如也諺曰美女入室惡女之仇漢書曰漢興因秦之號妾皆稱夫人有美人良人八子七子長使少使之號焉又曰漢王得定陶戚姬愛幸生趙王如意髙祖崩惠帝立吕后為皇太后乃令永巷囚戚夫人髠鉗衣赭衣令舂戚夫人舂且歌曰子為王母為虜終日舂薄暮常與死為伍相離三千里當誰使告汝太后遂斷戚夫人手足去眼薫耳飲以瘖藥使居鞠域中名曰人彘又曰髙帝薄姬文帝母也少時與管夫人趙子兒相愛約曰先貴無相忘已而管夫人趙子兒先幸漢王漢王四年坐河南成臯靈臺此兩美人侍相與笑薄姬初約漢王問其故兩人具以實對漢王心悽然憐薄姬是日召而幸之又曰孝武李夫人本以倡進初夫人兄延年性知音善歌舞孝武愛之每為新聲變曲聞者莫不感動延年侍上起舞歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國寧不知傾城與傾國佳人難再得上嘆息曰善世豈有此人乎平陽主因言延年有女弟上乃召見之實玅麗善舞由是得幸生一男是為昌邑哀王李夫人少而早卒上憐憫焉圖其形甘泉宫齊人少翁言能致其神廼夜張燈燭帷帳陳酒肉而令上居他帳望見好女如李夫人之貎不得就視上愈益悲感為作詩曰是耶非耶立而望之偏何姗姗其來遲令樂府諸音家絃歌之上自為作賦以傷悼夫人又曰孝武鉤弋趙媫妤昭帝母也家在河間武帝廵狩過河間望氣皆言此室有竒女天子亟使使召之既至兩手皆拳上自披之手即伸由是得幸號曰拳夫人續漢書曰陳夫人家本魏郡少以聲伎入孝王宫得幸生質帝以梁氏故榮寵不及焉魏志曰魏因漢法母后之號皆如舊制夫人以下世有増損太祖建國始命皇后其下五等有夫人有昭儀有媫妤有容華有美人明帝増淑妃昭華脩儀太和中始復命夫人登其位扵淑妃之上自夫人以下爵凡十二等貴嬪夫人位次皇后魏志曰文徳郭皇后有智數時所獻納文帝之為嗣后有謀焉太子即位后為夫人王隠晉書曰胡芳以選入宫父奮哭曰老奴不死唯有二兒男入九地之下女上九天之上後拜為夫人元后臨終有命先來臨者有賞胡夫人自排人徑前辭訣咸寧二年立皇后楊氏封父駿臨晉侯漸驕慢奮語駿卿恃女更豪也與天家作㛰者未有不㓕門駿曰卿女不在天家也奮曰我女與卿女作婢耳何能増損後魏書曰明元昭哀皇后姚興之女太宗以后禮納之後為夫人后以鑄金人不成未昇尊位然帝寵幸出入居處禮如后焉晉中興書曰簡文宣皇后鄭氏字阿春滎陽人也先適渤海田氏生一男夫亡后依舅濮陽吴氏中宗為丞相敬后先崩将納吴氏女為夫人后及吴氏女並逰後園有見之者言扵中宗曰鄭氏雖嫠居賢扵吴氏逺矣遂以德色納為夫人甚有寵王隠晉書曰晉武採漢魏之制置貴嬪夫人貴人為三夫人位視三公晉起居注曰有司奏今月九日當拜鄭夫人后媫妤按儀注應服雀釵袿襈列仙傳曰鉤弋夫人右手拳姿色甚偉帝披其手得一鉤而手尋伸生昭帝既而帝害之殯尸不臭而香數月昭帝既即位更葬之棺空但有絲履故名其宫曰鉤翼後避諱改為弋廟有神祠焉西京雜記曰髙帝戚夫人善鼓瑟擊筑帝擁夫人倚瑟而絃歌畢泣下流連夫人善為翹袖折腰之舞歌出塞望歸之曲侍婢數百人皆為之泣後宫齊唱聲入雲霄又曰戚夫人以百煉金為彄環照見指骨上惡之以賜侍兒鳴玉曜光等各四枚又曰戚夫人侍兒賈佩蘭後為扶風人段儒妻説在内時戚夫人侍髙祖常以趙王如意為言髙祖思之或半日不言歎息悽愴而未知其術輙視夫人夫人擊筑髙祖自歌大風詩以和之又曰武帝以象牙為簟賜李夫人又曰武帝遇李夫人就取玉簪搔頭自此宫人搔頭皆用玉貴人東觀漢記曰光烈隂皇后上即位為貴人上以后性寛仁宜母天下欲授以尊位后輒退譲自陳不足以當大位又曰章帝宋貴人時竇皇后内寵方盛以貴人名族節操髙妙心内害之欲為萬世之計隂設方畧䜛毁貴人由是母子見踈數月誣奏貴人使婢為蠱道呪詛七年遂被譛暴卒又曰孝和隂皇后聰慧敏達有才能善書史永元三年選入掖庭為貴人託以先后近屬故有寵後漢書曰順烈梁后永建三年與姑共入掖庭時年十三太史卜兆得夀房又筮得坤之比遂以為貴人常特被引御從容請曰願陛下思雲雨之均澤識貫魚之次序使小妾得免罪謗之累由是帝加敬焉又曰桓思竇后延熹八年選入掖庭為貴人其冬立為皇后而御見甚稀帝所寵唯采女田聖等永康元年冬帝寢疾遂以聖等九女皆為貴人東觀漢記曰申貴人生孝穆皇帝趙夫人為穆皇后匽夫人生桓帝既立追諡趙夫人為穆皇后匽夫人為博園貴人和平元年桓帝詔曰博園匽貴人秉髙明之懿德乘淑美之嘉㑹與天合靈篤生朕躬欲報之德詩所感歎其尊貴人為孝崇皇后又曰孝桓帝鄧后字猛父香早死猛母宣改嫁為掖庭民梁紀妻紀者㐮城君孫夀之舅也夀引進令入掖庭得寵為貴人故冐姓為梁氏續漢書曰光武郭皇后聖通世祖至真定納聖通有寵世祖即位以為貴人魏志曰文帝納甄后扵鄴有寵生明帝郭后李貴人並愛幸后愈失意有怨言王隠晉書曰武帝破陳拜諸葛姚為夫人李曄為貴人後魏書曰文成馮后生有神光之異髙祖踐極以馮為貴人又曰文成元皇后李氏梁國蒙縣人也母頓丘王峻妹后之生也有異扵常父方叔常言此女當大貴及長姿質美麗永昌王仁得后後遇事誅后與其家人送平城宫髙祖登白樓望見之謂左右曰此婦人佳乎乃下臺后得幸扵齋庫中遂有娠守庫者亦私書壁記之後驗問皆生顯祖拜貴人沈約宋書曰貴嬪文帝所制貴人漢光武制泰始二年又省貴人置貴姬媫妤漢書曰婕妤視上卿比列侯又曰孝宣皇帝之為曾孫也暴室嗇夫許廣漢有女平君年十四五配曾孫數月曾孫立為帝平君為媫妤是時霍將軍有小女與皇太后有親公卿議更立后皆心儀霍將軍女亦未有言詔求微時故劍大臣知㫖白立許媫妤為皇后又曰孝宣王皇后父奉光少時好鬭雞帝在民間數與奉光㑹相識奉光有女年十餘嵗每當適人所當適輙死故不行及宣帝即位召入宫為媫妤是時館陶主母華媫妤及淮陽憲王母張媫妤楚孝王母衛媫妤皆幸皇后廢上憐許太子早失母幾為霍氏所害扵是乃選後宫素謹慎而無子者遂立王媫妤為皇后令母養太子又曰孝成班媫妤成帝初即位選入後宫始為少使俄而大幸為媫妤居増成舍再就館有男數月失之成帝逰扵後庭嘗欲媫妤同輦載媫妤辭曰觀古圖書聖賢之君皆有名臣在側三代末主廼有嬖妾今欲同輦得無近似之乎上善其言而止太后聞之喜曰古有樊姬今有班姬世説曰漢成帝幸趙飛燕讒班媫妤呪詛帝乃考問媫妤對曰妾聞死生有命富貴在天修善不蒙福為邪欲以何望若鬼神有知不受邪佞之訴如其無知訴之何益故不為也漢書曰成帝隆扵内寵班媫妤進侍者李平得幸立為媫妤上曰始衛皇后亦從㣲起乃賜平姓曰衛所謂衛媫妤又曰中山衛姬平帝母也父子豪中山盧奴人官至衛尉子豪女弟為宣帝媫妤生楚孝王長女又為元帝媫妤生平陽公主成帝時中山孝王無子上以衛氏吉祥以子豪少女配孝王元延四年生平帝魏志曰太祖建國始命王后其下有媫妤五等晉服制令曰媫妤銀印青綬佩采瓄玉婦人集曰漢元帝賜媫妤書曰問飛燕趙媫妤夫上有誠必應以實憤懣充中必形扵色詩云鼓鐘于宫聲聞于外由此言之真偽之效難以欺矣夫君子貴素文足通殷勤而已亦何必華辭哉自以親媫妤異於他人故不能無言亦不以相過望前數以顔色不平應對舒遲為譴卒不能自改媫妤方見親幸之時老母在堂兩弟皆簪金貂並侍扵側同列比舍豈不謂媫妤妹弟尊幸哉今遇蒙譴獨謂老親兩弟何班媫妤報諸姪曰託言属見元帝所賜趙媫妤書以相比元帝被病無悰但鍜鍊後宫貴人書也類多華辭至如成帝則推誠冩實若家人夫婦相與書矣何可比也故略陳長短今汝曹自評之後魏書曰御史中尉李彪有女㓜而聰慧彪每竒之教書學讀誦經傳曾謂所親曰此女當與我家卿曹各得其力彪亡後世宗聞名納為媫妤在宫嘗教帝妹書誦授經史世宗崩媫妤為比丘尼通習經義法座講說諸僧推重之太平御覽巻一百四十四
