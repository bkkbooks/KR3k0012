body:
  text: 太平御覽卷六百六宋李昉等撰文部二十二簡䇿牘札牒板刺函􅐆􅀢槴封書泥水滴器簡說文曰簡牒也釋名曰簡間也編之篇篇有間也爾雅曰簡謂之畢郭璞曰今簡札也毛詩鹿鳴曰豈不懷歸畏此簡書張璠漢記曰吳祐父恢為南海太守欲殺青簡以冩書祐年十一諫曰海濵多珍玩此書若成載必盈兩昔馬援以薏苡興謗王陽以衣囊徼名嫌疑之間先賢所慎恢大喜范煜後漢書曰大司徒鄧禹西征定河東張宗詣禹自歸禹聞宗多權謀乃表為將軍禹軍到栒邑赤眉大衆且至禹以詢邑不足守欲引師退就堅城衆人多畏賊追憚為後拒禹書諸將名於竹簡署其前後亂著笥中令各探之宗獨不肯探曰死生有命宗肯辭難就逸乎禹歎息謂曰禹聞一卒畢力百人不當萬夫致死可以横行宗今擁兵數千以承天威何遽其必敗乎魏畧曰宣王討王陵陵面縳迎遥謂太傅曰卿直以折簡召我我當不至耶而引軍來乎太傅曰以卿非肯逐折簡者也瀨鄉記曰老子母碑曰老子把持仙録玊簡金字編以白銀紀善懲惡楚國先賢傳曰孫敬編楊柳簡以為經本晨夜誦習劉向别傳曰孫子書以殺青簡編以縹絲繩異苑曰有人嵩山下得竹簡一枚上有兩行科斗之書中外傳示莫能知張華以問束晳晳曰此明帝顯節陵中䇿文也騐校果然風俗通曰劉向别録殺青者宜治竹作簡書之耳新竹有汁善朽蠧凡作簡者皆於火上炙乾之陳楚間謂之汗汗者去其汁也呉越曰殺亦治也劉向事孝成皇帝典校書籍二十餘年皆先書竹改易刋定可繕冩者以上素也由是言之殺青者竹簡為明矣神仙傳曰隂長生裂黄素寫丹經一通封以文石之凾著嵩髙山一通黄櫨之簡漆書之封以青玉之函著華山一通黄金之簡刻而書之封以白銀之凾着蜀綏山䇿廣雅曰策謂之簡釋名曰策書教令於上所以驅策諸下也漢制約勅封侯曰册册賾也勅使釐賾不犯之也史記曰百名以上則書於策春秋序曰大事書之於䇿小事簡牘而已後漢書曰何敞父比干字少卿為汝隂縣獄吏决曹掾平活數千人後為丹陽都尉獄無寃囚征和三年三月辛亥天大隂雨比干在家日中夢車騎滿門覺而語妻語未竟而門有老嫗求寄避雨雨甚而衣不霑雨止送出門語比干曰公有隂徳天賜君以䇿以廣公之子孫因出懷中符策狀如簡長九寸凡九百九十枚以授比干曰子孫佩印綬者如此數比干年五十八有六男又生三子本始元年自汝隂徙平陵代為名族呉厯曰孫皓時呉郡民掘地得物似銀長一尺三寸刻畫有年月字因改年為天䇿唐書曰貞觀中房𤣥齡議封禪儀玉䇿四枚各長一尺三寸廣一寸五分厚五分每䇿五簡俱以金編其一奠太祖一奠地祗一奠髙祖穆天子傳曰癸巳至於羣玉之山阿平無險言邊無險阻也四徹中繩言皆平直先王謂之䇿府言往古帝王以為藏書䇿之府家語曰哀公問政於孔子孔子曰文武之政布在方䇿牘說文曰牘謂書板也釋名曰牘睦也身執之以進見所以為恭睦也史記曰文帝遺單于尺一寸牘單于以尺二寸牘荅又曰東方朔初入長安至公車上書凡用三千奏牘公車令兩人共持舉其書僅然能勝之人主從上方讀之止輒乙其處讀之二月乃盡詔拜以為郎東觀漢記曰時天下墾田多不實詔檢覆覈百姓嗟怨諸郡遣使帝見陳留吏牘上有書視之云頴川𢎞農可問河南南陽不可問上得之怒時東海公年十二在幄後言曰吏受郡勑欲以墾田相方耳帝曰即如此何故言河南南陽不可問對曰河南帝城多近臣南陽帝鄉多近親田宅踰制不可為准帝令虎賁詰問吏吏首服遣謁者栲實具知奸狀夢書曰牘札為薦舉夢得牘札欲薦舉也韓詩曰趙簡子太子名伯魯小子名無恤簡子自為二牘親自表之書曰節用聽聰敬賢勿慢使能勿賤與二子使恒誦之居三年簡子坐青臺之上問二子書何在伯魯忘其表令誦不能得無恤出其書於左袂令誦習焉乃黜伯魯而嘉無恤韓詩外傳曰趙簡子有臣周舍立於門下三日三夜簡子問其故對曰臣為君諤諤之臣秉筆操牘從君之後伺君過而書之札劉熈釋名曰札櫛也編之如櫛齒相比也晉令曰郡國諸户口黄籍皆用一尺二寸札已在官役者載名漢書曰司馬長卿未死時為一卷書曰有使來求奏之其遺札書言封禪事又曰谷永字子雲便於筆札故時人云子云之筆札婁君卿之脣舌後漢書曰樊崇等西攻更始百萬之衆而無稱號欲立帝求軍中景王後者得七十餘人唯盆子與茂及前西安侯為最崇等議曰聞古天子將兵稱上將軍乃書札為符曰上將軍又以兩空札置笥中札簡也笥篋也遂於鄭北設壇場祠城陽景王諸三老從事皆大會陛下列盆子三人居中立以年次探札盆子最㓜後得符諸將乃皆稱臣續漢書曰賈逵字景伯時有神雀入宫帝勅蘭臺給筆札使逵作神雀頌晉張華有文雅之才晉儀禮釐革制度勅有司給筆札多有損益晉陽秋曰梁國張輝字義元為郡吏入值太守圍棋投札於地輝曰知府君患風取以支吾太守輙棋令坐漢武故事曰上崩後有一人騎馬馬異於常馬持一尺札賜將作大匠丞文曰汝績克咸賜汝金十斤因忽不見札變為金稱之重十斤抱朴子曰魏武帝以左慈為妖妄欲殺之使人收之慈故欲見而不去欲拷之而獄中有七慈形狀如一不知何者為真以白武帝帝使人盡將殺之須臾左慈盡化為札而一慈徑出走赴羣羊詩云有客從南來貽我一書札上叙長相思下言乆離别牒說文曰牒札也文心雕龍曰牒者葉也如葉在枝也短簡為牒議事未定故短簡諮謀牒之尤宻謂之籖左傳昭二十五年趙簡子令諸侯大夫輸王粟宋樂大心曰我不輸粟我於王為客二王後為賔客晉士伯曰自踐土以來宋何役不㑹而何盟不同曰同恤王室子焉得避之右師不敢對受牒而退右師樂大心也漢書曰路温舒字長君鉅鹿東野人父為里監門使温舒牧羊取澤中蒲截為牒編用寫書板釋名曰板般也般般平廣也春秋演孔圖曰孔子曰丘作春秋天授演孔圖中有大玉刻一版曰璇璣一低一昻是七朝期騐敗毁滅之徴也蜀志曰譙周勸劉禪降後元熈二年夏巴郡文立從洛還過見周周語次因書板示立曰典午忽兮月酉没兮典午者謂司馬也月酉八月也至八月而司馬昭果崩王隠晉書曰惠帝時謠曰二月盡三月初桑生裴雪柳葉舒荆筆楊板行詔書宫中大司馬作幾驢而楊駿荆王反幽明録曰王大度鎮廣陵忽見二騶持鵠頭板來召之王大驚問騶我作何官云當作平北將軍徐兖二州刺史王曰吾已作此官何故復召耶鬼云此又聞耳且今所作是天上官也王大懼亦尋見迎官𤣥衣人及鵲衣小吏甚多王尋疾薨桂陽先賢畫讃曰胡滕為南陽從事遇大駕南巡求索揔猥滕表曰天子無外乗興所幸便為京師臣請荆州刺史比司隸臣比都官從事帝竒其才悉許大將軍西曹椽亡司馬召滕因作都官鵠頭板召百官敬服相板經曰板有芒角形勢上狹下廣右薄左厚光采流澤文色調逹木理通直皆為吉板是凶板細理輕蹙其人性簡逹周正其人寛博板有横節為病在靣内喪在背外䘮板有蝎穿及節對其過人㓙板中字皆令筆跡調利有形勢字欲當右行空中不用對對則多牽制人上官多憎之官字欲今右官字小新官大有波勢墨色分明板形平通無絶陽刀跡是元吉官字無形勢㸃染不分明皆免官或不到官官小他字墨散入材理中必入獄死板色欲類其姓角家板色青為吉赤不宜子白不利官屬黒不利父母黄不利妻財凡齎板來者其人姓名善為喜祥不善則否也相板時要以手持板之若手近板後則板前低而落此則左遷板有病累皆可治改治之用庚申寅日庚更也申伸也寅引也言更引吉祥也刺釋名曰畫姓字於奏上曰畫刺作再拜起居字皆逹其體使書盡邊徐引筆書之如畫者也下官刺長書中央一行而下也又有爵里刺書其官爵及郡縣鄉里也典畧曰王符字節信安定人感激著書名曰潛夫論故度遼將軍皇甫規去官歸安定鄉人有以貨得雁門太守者亦去官歸書刺謁規規卧不迎使人呼入既坐問食鴈美乎又以其刺刮髀有頃聞王節信在外規乃驚起衣不及帶倒履而出援其手而還與同坐大設賓主禮日暮别去人或歎曰何有二千石之賤不如諸生之貴乃如此耶魏名臣奏曰黄門侍郎荀攸奏曰今吏初除有三通爵里刺條疏行狀夏侯榮傳曰榮字㓜權淵第五子㓜聰明經目輙識文帝聞而請焉賔客百餘人一奏刺悉書其鄉里姓名世所謂爵里刺示之一過而使之遍誦不謬一人帝竒之長沙耆舊傳曰夏侯叔仁氏族單㣲丁母憂居䘮過禮同郡徐元休弱冠知名聞而弔焉旬日之中積刺盈案呉録曰孟宗為豫章太守謂倉掾曰君昔負太守一刺寧識之否掾曰不識宗曰吾昔家貧親老為官賃運以刺詣君感見發遣何乃乆屈耶雜事曰髙彪字義方呉郡人志尚甚髙遊太學博覽經史善屬文嘗詣大儒馬融辭不見彪覆刺背書曰伏聞髙問為日乆矣兾一見龍光叙腹心之願以啓其蔽不圖辭之以疾昔周公父文王兄武王九命作相以尹華夏猶握沐吐飱以接白屋之士天下歸徳歴載邈矣今君不能相見宜哉融省大愧遣人辭謝追請徑去不肯返郭林宗别傳曰林宗名益顯士争歸之載刺常盈車禰衡别傳曰衡初遊許下乃懷一刺既到而無所用之至於刺字漫滅幽明録曰一士人姓王坐齋中有一人通刺詣之題刺云舒甄仲既去疑非人尋刺曰是子舍西土瓦中人令掘果於瓦器中得一銅人長尺餘凾呉志曰張温字惠恕使蜀謂先主曰謹奉所賷凾書封晉安帝紀曰朱齡石伐蜀太尉與齡石書署凾曰至白帝乃發書曰衆悉從外外取成都㵴燾於中水出廣漢使羸弱乗髙艦十餘由内水向黄虎傅子曰太祖徴劉煜授以腹心之任毎有疑事輙以凾令問煜乃一夜數十至􅐆說文曰􅐆書衣也晉中經簿曰盛書有縑􅐆刺青縑􅐆布􅐆絹􅐆後漢書曰楊春卿臨命戒子統曰吾綈􅐆下說文曰綈厚繒也綈音提有先祖所傳秘記為漢家用爾其脩之統感父遺言服闋辭家從犍為周循學習先法又就同郡鄭伯山受河洛書及天文推步之術益部耆舊傳曰廣漢王棠妻文拯其前妻子博學好寫書拯嘗為手自作􅐆常過其意宋謝靈運書􅐆銘曰懷幽卷賾戢妙抱宻用舍以道舒卷不失亮唯勤翫無或暇逸梁昭明太子詠書帙詩曰擢影兎園池抽莖淇水側幸雜緗囊用聊因班女織槧說文曰槧牘牒也釋名曰槧板長三尺者也槧漸也言漸漸然長也論衡曰斷木為槧揚雄荅劉歆書曰以鈆擿松槧二十七年矣西京雜記曰揚子雲好事嘗懷鈆槧從諸計吏訪殊方絶俗四方之語槴後漢杜篤書槴賦曰惟書槴之麗容象君子之淑徳載方矩而履規加文藻之修飾能屈伸以和禮惟髙下而消息雖轉旋而屈撓時傾邪而返側抱六藝而卷舒敷五經之典式封泥書春秋說曰龍圖赤玉匣封泥如黄珠又曰黄龍五采負圖黄玉匣黄金繩縷黄芝泥王子年拾遺曰元封元年浮忻國貢蘭金之泥此金出湯泉盛夏之時水常沸湧有若湯火飛鳥不能過國人行者見水邊有人冶此金為器混混若泥如紫磨之色百鍊其色變白如銀名曰銀燭嘗以此泥封諸凾匣及諸宫門鬼魅不敢干當漢世上將出征多以泥為印封衞青張騫蘇武傅介子之使皆受金泥之璽封也續漢書曰光武封禪乃求元封禪事奏用玉牒五檢以水銀和金為泥東觀漢記曰鄧訓嘗將黎陽營兵屯狐奴後遷護烏桓校尉黎陽故吏最貧羸者舉國念訓嘗所服藥北州少之又知訓好青泥封書從黎陽步推鹿車於洛陽市藥還過趙國易陽并載青泥一襆至上谷遺訓其得人心如是西京雜記曰漢以武都紫泥為璽室加緑綈其上水滴器西京雜記云晉靈公冡甚瑰壯器物皆朽不可别唯玉蟾蜍一枚大如拳腹空容五合水光潤如新王取以為書滴傳𤣥水龜銘曰鑄茲靈龜體象自然含出源水有似清泉潤彼𤣥墨染此弱翰申情寫意經緯羣言太平御覽卷六百六
