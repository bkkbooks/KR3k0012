body:
  text: 太平御覽卷四百六十五宋李昉等撰人事部謳說文曰謳齊歌也左傳曰宋華元為植廵功城者謳曰睅其目皤其腹棄甲而復于思于思棄甲復来又曰宋皇國父為太宰為平公築臺妨扵農收子罕請俟農功之畢公不許築者謳曰澤門之晳實興我役邑中之黔實慰我心漢書曰漢王既至南鄭諸将及士卒皆謌謳思東歸師古曰謳齊歌也多道上還者未至南鄭在道即止歌釋名曰歌柯也所歌之聲是其質也以聲吟咏有上下如草木之有柯葉也說文曰歌詠也詩曰心之憂矣我歌且謡家語曰孔子相魯齊人歸女樂魯君淫荒孔子遂行師已送曰夫子則非罪也孔子曰欲歌可乎乃歌曰彼婦之口可以出走彼婦之謁可以死敗優哉游哉􅂓以卒歳史記曰曹參為漢相國三年百姓歌之曰蕭何為法講若畫一曹參代之守而勿失載其清静人以寧壹又曰衛子夫為皇后弟青貴震天下天下歌之生男無喜生女無怒獨不見衛子夫霸天下漢書曰石顯與中僕射牢梁少府五鹿充宗結友黨諸附倚者多寵位民歌之曰牢耶石耶五鹿客耶印何纍纍綬若若耶言其兼官據勢也又曰太始二年趙中大夫白公白姓公爵時人相謂為公復奏穿渠引涇水首起谷口尾入櫟陽注渭中袤二百里溉田四千五百餘頃因名白渠民甚饒歌之曰田扵何所池陽谷口鄭國在前白渠起後舉鍤為雲决渠為雨涇水一石其泥數斗且糞且溉長我禾黍衣食京師億萬之口又曰馮立字聖通為西河上郡與兄野王相代政行相似吏人嘉之乃歌曰大馮君小馮君兄弟繼踵相因循聰明聖智恵吏人政如魯衛徳化鈞周公康叔猶二君又曰王氏五侯争為奢侈大起第宅百姓歌曰五侯初起曲陽最怒壊决髙都連境外杜土山漸臺象西白武白武殿名後漢書曰皇甫嵩討平黄巾請冀州一年田租以贍饑民百姓歌曰天下亂兮市為墟母不保子妻失夫賴得皇甫復汝居又曰劉陶駼除順陽長以病免吏民思而歌之曰悒然不樂思我劉君何時復來安此下民又曰郭賀字喬卿為荆州刺史到官有殊政百姓歌之曰厥徳仁明郭喬卿忠正朝廷上下平謝承後漢書曰岑晊遷魏郡太守民歌之曰我有枳棘岑君伐之我有蛑賊岑君遏之狗吠不驚足下生􅀢含哺鼓腹焉知凶災我嘉我生獨丁斯時美矣岑君於戯在兹又曰陳臨字子然為蒼梧太守人遺腹子報父怨捕得繫獄傷其無子令其妻入獄遂産得男人歌曰蒼梧陳君恩廣大令死罪囚有後代陳臨字子然為蒼司馬彪續漢書曰賈琮為交州刺史嵗間清平百姓安土為之歌曰賈父來晚使我先反今見清平吏不敢飯又曰李爕拜京兆尹詔發西園錢爕上封事遂止不發吏民愛仰乃歌曰我府君道教舉恩如春威如虎剛不吐弱不茹愛如母訓如父東觀漢記曰㢘范字叔度為蜀太守削火令但嚴使儲水而已百姓歌之曰㢘叔度來何暮不禁火人安堵昔無􅃭今五袴又曰范丹字史雲為萊蕪長遭黨錮事推鹿車載妻子捃拾自資有時絶粮丹言貌無改閭里歌之曰甑中生塵范史雲釜中生魚范萊蕪又曰朱暉為臨淮太守抑强扶弱嵗常豐熟人為之歌曰强直自遂南陽朱季吏畏其威民懐其惠又曰張堪為漁陽太守勸人耕種以致豐富百姓歌曰桑無附枝麥秀兩岐張君為政樂不可支吳録曰彭循字子陽毗陵人建國二年海賊丁儀等萬人據吳太守秋君聞循勇謀以守令循與儀相見陳說利害應時散民歌之曰時嵗倉卒賊縱横大㦸强弩不可當賴遇賢令彭子陽又曰王譚字世容為成武令民服徳化宿惡奔迸父老歌之曰王世容治無雙省徭役盗賊空晉書束晳𫝊太康中郡界大旱晳為邑人請雨三日而雨注衆謂晳誠感為作歌曰束先生通神明請天三日甘雨以零我黍以育我稷以成何以酧之報束長生又曰鄧攸為吳郡守刑政清明百姓歡恱為中興良守後稱疾去職郡嘗有送迎錢數百萬攸去郡不受一錢百姓數千人留牽攸船不得進攸乃少停夜中發去吳人歌之曰纔如打五鼓鷄鳴天欲曙鄧侯挽不留謝令推不去又曰徐州刺史吕度檄王祥為别駕祥年垂耳順固辭不受為具車牛祥乃應召虞委以州事于時冦盗充斥祥率勵兵士頻討破之州界清静政化大行時人歌之曰海沂之康實賴王祥邦國不空别駕之功又曰諸葛恢字道明荀愷字道明蔡謨字道明皆有名譽號曰中興三明時人歌之曰京師三明各有名蔡氏儒雅荀葛㢘清王隠晉書曰應詹為南平郡郡人歌之曰亂離既著殆為灰朽僥倖之運賴茲應后䕃我塗炭惠隆丘阜潤同江海恩猶父母崔鴻前秦録曰王猛化洽六州人移風變百姓歌之曰長安大街夾樹楊槐下走朱輪上有鸞栖英彦雲集誨我人黎又曰苻堅時鳯皇集于東閣歌之曰鳯皇于飛其羽翼翼淵哉聖后饗齡萬億崔鴻崔氏家𫝊曰崔瑗為汲令開渠澮興造稻田長老歌之曰上天降神明錫我慈仁父臨人布徳澤恩惠施以序唐書顔師古叔父逰秦武徳初累遷㢘州刺史封臨沂縣男時劉黒闥初平人多以强暴寡禮風俗未安逰秦撫恤境内禮讓大行邑人歌之曰㢘州顔有道性行同莊老愛人如赤子不殺非時草髙祖璽書勞勉之韓子曰齊桓公飲酒醉遺其冠耻之管仲曰公胡不雪之以政公曰善因發囷倉賜貧窮論囹圄三日而人歌之曰公胡不復遺其冠吕氏春秋曰魏襄王使吳起為鄴令引漳水灌田民大得利相與歌曰鄴有吳聖令為公决漳水灌鄴旁終古斥鹵生稻粱世說曰郗超王珣並以雋才為桓温大司馬所眷珣為主簿超為記室叅軍超多鬚珣形狀短小時人為之歌曰髯叅軍短主簿能令公喜能令公怒常璩華陽國志曰吳資字元約為巴郡大守屢獲豐年人歌之曰習習晨風動㴻雨潤乎苗我后恤時務我人以優饒劉向新序曰季子以劒帶徐君墓樹徐人嘉而歌之曰延陵季子不忘舊故千金之劒以帶丘墓陳留耆舊𫝊曰爰珎除六令吏人訟息教誨其子弟歌曰我有田疇爰父殖置我有子弟爰父教誨襄陽耆舊𫝊曰山季倫毎臨習池未嘗不大醉而還曰我髙陽池也襄陵城中小兒歌之曰山公出何去往至髙陽池日夕倒載歸酩酊無所知時時能騎馬到著白接離舉鞭向葛强何如并州兒又曰襄陽太守胡烈有惠化百姓歌曰美哉明后雋哲惟嶷陶廣乾坤周孔是則文武播暢威振遐域謡爾雅曰徒歌曰謡漢書石顯失權數月丞相條奏顯舊惡及其黨牢梁陳順皆免官顯與妻子徙歸故郡憂懣不食道病死諸所交結以顯為官廢罷少府五鹿充宗左遷𤣥莵太守御史中丞伊嘉為鴈門都尉長安謡曰伊徙鴈鹿徙莵去牢與陳石無徒袁山松後漢書曰桓帝時朝廷日亂李膺風格秀整髙自標尚後進之士升其堂者以為登龍門大學生三萬餘人牓天下士上稱三君次八俊次八顧次八及次八厨猶古之八元八凱也因為七言謡曰不畏强禦陳仲舉九卿直言有陳蕃天下模楷李元禮天下好交荀伯條天下英秀王叔茂天下氷凌朱季陵天下忠貞魏少英天下稽古劉伯祖天下良輔杜周甫天下才英趙仲經司馬彪續漢書曰張霸為㑹稽太守越賊束手歸附童謡曰棄我㦸捐我矛盗賊盡吏皆休又曰蜀童謡曰黄牛白腹五銖當復時公孫述僣號於蜀時人竊言王莽稱皇述欲繼之故稱漢家貨泉當復也又曰桓帝時汝南太守宗資任用功曹范滂中人以下共嫉之作七言謡曰汝南太守范孟博南陽宗資主畫諾東觀漢記曰王渙除河内温令商賈露宿人開門卧人為作謡曰王稚子代未有平徭役百姓喜吳志曰周瑜少精意於音樂三爵之後其有闕誤瑜必知之知之必顧時人謡曰曲有誤周郎顧晉書曰羊祜以伐吳必藉上流之勢又時吳有童謡曰阿童復阿童銜刀浮渡江不畏岸上獸但畏水中龍祜聞之曰此必水軍有功但當思應其名者耳又曰杜預遣周㫖伍巢等伏兵樂鄉城外孫歆遣軍出拒王濬大敗而還㫖等發伏兵隨歆軍而入直至帳下虜歆而還故軍中為之謡曰以計代戰一當萬於是遂進逼江陵又曰太始中為賈充等謡曰賈裴王亂紀綱王裴賈濟天下言亡魏而成晉也王隠晉書曰裴秀纔十餘嵗叔父徽有聲名賓客詣徽出則過秀時人謡曰後進領䄂有裴秀又曰杜預開楊口水道洪洞逹巴陵經千餘里内瀉長江之險外通零桂之漕南土美而謡之曰後世無叛由杜翁孰識知名與勇功又曰潘岳字安仁清辯能屬文早辟賈充府太子舍人除為河陽令以仕次直為郎不得意時僕射山濤領選岳内非之宻作謡曰閣道東有大牛王濟鞅裴楷鞦和嶠刺史不得休崔鴻後趙録曰張樓為臨水長嚴政酷刑殘忍無惠人謡之曰陽平張樓頭如箱見人切齒劇虎狼崔鴻前秦録曰苻洪母姜氏因寝産洪驚悖而寤先是隴右大霖雨百姓苦之謡曰雨若不止洪水必起故名之曰洪又曰初苻生夢大魚食蒲又長安謡曰東海大魚化為龍男便為王女為公問在何所洛門東於時苻堅方為龍驤将軍第在洛門之東是月生以謡夢之故誅侍中魚遵趙書劉膠討陳安於隴城安小将劉牙趙牟路松多堅戍不下城内得安死力謡曰隴上徤兒曰陳安軀幹雖小腹中寛愛養将士同心肝騄驄駿馬鐡瑕鞍七尺大刀配齊鐶丈八虵矛左右盤十盪十决無當前百騎俱出如雲浮追者千萬騎悠悠戰始三交失虵矛十騎俱盪九騎留弃我騄騘竄巖幽天降雨追者休阿呵嗚乎柰子乎嗚乎阿呵柰子何又曰汲桒六月盛暑而重裘累茵使人扇之患不清凉斬扇者時軍中為之謡曰士為将軍何可羞六月重茵被衲裘不識寒暑斷他頭又曰燕人龎世為光禄勲大奏案豪强苛尅人物咸懼疾之及卒門無弔客時人為之謡曰龎家之巷車馬轔轔泥丸之日無弔客弔客不來何所因性苛尅寡所親隋書曰韓擒虎先是江東有謡曰黄斑青騘馬發自夀陽涘來時冬氣末去日春風始皆不知所謂擒虎本名豹平陳之際又乗青騘馬往返時節與謡相應至是時方悟列子曰堯微服逰於康衢聞童謡曰立我蒸民莫匪爾極不識不知順帝之則抱朴子曰童謡猶助聖人之耳目而况墳索之宏博哉益部耆舊𫝊曰王忳字少林詣京師於客舍見諸生病甚困生謂忳曰腰下有金十斤願以相與乞收𦵏屍骸未問姓名呼吸因絶忳賣金一斤以給棺絮九斤置生腰下後署大建亭長到亭日有馬一疋到亭中其日大風有繡被隨風以夾後忳騎馬突入舍彦父見曰真得盗矣忳説得狀又取被示之彦父悵然曰被馬俱止卿有何隂徳忳具説𦵏諸生事彦父曰此吾子也遣迎𦵏彦䘮金俱存民謡之曰信哉少林世為遇飛被走馬與鬼語陳留耆舊𫝊曰吳祐為恒農令勸善懲姦貪濁出境甘露降年榖豐童謡曰君不我憂人何以休不行界署焉知人處商世𫝊曰商亮字子華舉孝廉到陽城遇兩虎争一羊亮案劒直前斬羊虎乃各以其羊去時人為之謡曰石里之勇商子華暴虎見之藏爪牙常璩華陽國志曰閻慮字孟度為綿竹令以禮讓為本童謡曰閻君賦政明且昶蠲苛去碎以禮讓劉恭異苑曰晉時長安謡曰秦川中血没踠秦有凉州倚柱㸔及惠愍之間闗内殱破流血丹地張軌擁衆一方威恩並著太平御覽卷四百六十五
