  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_886-1a, image: WYG0900/WYG0900-0718c.png}
body:
  text: 太平御覧卷八百八十六宋李昉等撰妖異部二魂魄精魂魄易上繫曰精氣為物遊魂為變韓詩外傳曰溱與洧説人也鄭國之俗三月上巳之日於水上招魂續魄祓除不祥故詩人願與所説者俱往觀也禮記檀弓下曰延陵季子適齊其反也其長子死葬于嬴博之間既封左袒右還其封且號者三曰骨肉歸復於土命也若魂氣則無不之也無不知也又禮運曰體魄則降智氣在上死者北首生者南嚮又曰作其祝號𤣥酒以祭君與夫人交獻以嘉魂魄是謂合莫又郊特牲曰凡祭慎諸此魂氣歸于天形魄歸于地故祭求諸陰陽之義也又祭義曰氣也者神之盛也魄也者鬼之盛也左傳昭七曰子産適晉趙景子問焉曰伯有猶能為鬼乎子産曰能人生始化曰魄既生魄陽曰魂用物精多則魂魄彊是以有精爽至於神明匹夫匹婦彊死其魂魄猶能憑依於人以為淫厲况良霄乎又昭公曰宋公宴飲使昭子右坐語相泣也樂祁佐退而告人曰今兹君與叔孫其皆死乎吾聞之哀樂而樂哀皆䘮心也心之精爽是謂魂魄魂魄去之何以能久孝經援神契曰情者魂之使性者魄之主情生於陰以計念性主於陽以理契王肅䘮服要記曰魯哀公葬其父孔子問曰寧設魂衣乎哀公曰魂衣起苑荆於山之下道逄寒死友哀往迎其尸魂神之寒故作魂衣吾父生服錦繡死於衣被何魂衣為史記曰髙祖謂沛父兄曰遊子悲故鄉吾雖都闗中萬嵗之後吾魂魄猶樂思沛也晉典書曰東海王越死哀痛越棺柩被焚乃招魂葬越於丹徒中宗以為非禮乃下詔曰夫冢以藏形廟以安神今世招魂葬者是埋神也其禁之淮南子曰天氣為魂地氣為魄又曰魄問於魂曰道何以為體曰以無有為體魄曰無有形乎魂曰無有魄曰無有何得而問也魂曰吾直有所遇之耳視之無形聽之無聲謂之幽冥幽冥者所以喻道而非道也白虎通曰魂魄者何謂也魂猶伝伝行不休也少陽之氣故動不息人為外魄者猶廹然著人也此少陰之氣象金石著人不移也魂者芸也情以除穢魄者廹也性以治内精神者何謂也精者静也太陰施化之氣也象火之化須待任生也神者恍惚太隂之氣出入無間也抱朴子曰師言欲求長生當勤服大藥欲得通神當金水分形形分則自見其身三魂七魄而天靈地祇皆下接山川之神皆可役也又曰太乙召魂魄丹法取五石封之以太乙泥卒死三日以還者折齒内一丸以水送之入喉即活活者皆見使者持節召之又曰人無賢愚皆知己身之魂魄魂魄分去則人病盡去則人死故分去術家有録之之法盡去則典禮有招魂之義此之為物至近者也然與人俱生至於終身莫或自聞見之者豈可以不聞見復言無乎又曰軫星逐鬼張星拘魄東井還魂也愽物志曰援神契云五岳之神聖四瀆之精仁太山天帝孫也主召人魂東方萬物始故主人生命之長短王子年拾遺記曰融臯山上有飜魂稲言食者死更生楚辭曰招魂者宋玉之所作也玉憐哀屈原忠而斥棄憂愁山澤魂魄放佚厥命將落故作招魂欲以復其精神延其年壽外陳四方之惡内崇楚國之美以諷諫懐王冀其覺悟而還之也又招魂曰帝告巫陽曰有人在下我欲輔之魂魄離散汝筮與之精捜神記曰諸葛恪為丹陽太守出獵兩山之間有物如小兒伸手引人恪令引去故地即死㕘佐問之恪曰此事在白澤圖曰兩山之間有精如小兒名曰傒囊諸人未之見也異苑曰天門張某與村人共獵見大樹下有蓬菴似寢息處而無烟火須臾一人形長七尺毛而不衣負數頭猿與語不詶將歸閉空屋中十餘日復送故處孫皓時海得毛精如人而有毛此蔣山精幽明録曰漢武帝與羣臣宴未央宫方噉黍臛忽聞語曰老臣尋覔不見梁上有老翁長八九寸拄杖僂歩帝問之翁下稽首不言仰視屋俯指帝脚忽然不見問東方朔朔對曰其名為藻兼水木之精也夏巢林冬潜河陛下興造宫室斬伐其居故來訴耳仰視屋者殿名未央也俯視脚者脚足也願止於此也帝為此暫止少時幸河渚聞水底有絃歌之聲肴膳芬芳前梁上翁及年少數人絳衣素裳皆長八九寸凌波而出或有挾樂器者帝命坐於食案上老翁曰老臣前昧死歸訴蒙陛下即息斧斤全其居宅不勝欣躍故私相賀耳便治酒絃歌又有小人長毛無異於鳥此人歌聲清婉繞梁帝欣恱勸酒乃獻帝一紫螺殻中有物狀如牛脂帝又曰可能以珍異見貽老翁顧命取洞穴之寳一人下波淵底倐忽還得一大珠數寸明燿絶世俄而翁等忽然而去東方朔曰螺殻中是蛟髓以傅面令人好顔色又有女千草在其中用之産易雷次宗豫章記曰永嘉末有大蛇長十餘丈㫁道經過者蛇輙吸取吞噬已數百道士呉猛與弟子殺蛇蛇死而蜀賊杜弢滅𤣥中記曰千嵗樹精為青羊萬嵗樹精為青牛多出遊人間又曰山精如人一足長三四尺食山蟹夜出晝藏人不能見但聞其聲千嵗蟾蜍食之又曰玉精為白虎金精為車馬銅精為僮奴鈆精為老婦博物志曰山有夔其形如鼓一足澤有委蛇狀如轂長如轅見之者霸昔夏禹觀河見長人魚身出曰吾河精豈河伯也白澤圖曰厠之精名曰依倚青衣持白杖知其名呼之者除不知其名則死築室三年不居其中有小兒長三尺而無髮見人則掩鼻見之有福火之精名畢方狀如烏一足以其名呼之即去木之精名彭侯狀如黑狗無尾可烹而食之千載木其中有虫名曰賈詘狀如豚食之如狗肉味又曰上有山林下有川泉地理之間生精名曰畢方狀如鳥長尾此陰陽變化所生玉之精名岱委其狀如美女衣青衣見之以桃戈刺之而呼其名則得金之精名倉狀如豚居人家使人不宜妻以其名呼之即去水之精名罔象其狀如小兒赤色大耳長爪以索縳之則可得烹之吉又曰故門之精名野狀如朱儒見人則拜以名呼之宜飲食又曰故宅之精名揮文又曰山冕其狀如蛇一身兩頭五采文以其名呼之可使取金銀又曰故廢邱墓之精名曰元狀如老役夫衣青衣而好杵舂以其名呼之宜禾穀又曰故道徑之精名忌狀如野人以其名呼之使人不迷又曰道之精名作器狀如丈夫善眩人以其名呼之即去又曰故池之精名意狀如豚以其名呼之即去又曰故井之精名觀狀如美女好吹簫以其名呼之即去又曰絶水有金者精名曰侯伯狀如人長五尺綵衣以其名呼之即去又曰故臺屋之精名兩貴狀如赤狗以其名呼之使人目明又曰左右有石水生其間水出流千嵗不絶其精名曰喜狀如小兒黑色以名呼之可使取飲食又曰三軍所載精名曰賔滿狀如人頭無身赤目見人則轉以其名呼之即去又曰故水精名忌狀如人乗車盖日馳千里以其名呼之可使人入水取魚又曰邱墓之精名狼鬼善與人鬬不休為桃弓棘矢司以鵄羽以射之狼鬼為飃風脱履投之不能化又曰故市精名曰毛門其狀如囷無手足以名呼之即去又曰室之精名傒龍如小兒長一尺四寸衣黑衣赤幘大冠帶劍持㦸以其名呼之即去又曰山之精名夔狀如鼓一足而行以其名呼之可使取虎豹又曰故牧弊池之精名曰髠蝢狀如牛頭見人則逐人以其名呼之則去又曰夜見堂下有小兒被髮走忽見惡之名曰溝以其名呼之則無咎又曰百嵗狼化為女人名曰知女狀如美女坐道旁告丈夫曰我無父母兄弟丈夫取為妻三年而食人以其名呼之則逃去又曰故溷之精名曰卑狀如美女而持鏡呼之使人知愧王子年拾遺記曰劉向校書天禄専精不倦假寢彌時有人植青藜之杖時夜已暗乃吹其杖端炯然火出因以照向則户内如燈燭也向與言三代以前帝王興亡之事如目見也及説陰陽運數起㓕之狀授向五行洪範之文向前問其姓名對曰我太乙之精主天地圖䜟聞子好學下而觀焉抱朴子曰萬物之老者其精悉能假託形以惑人唯不能於鏡中易形耳是以古人入山道士皆以明鏡懸於背後則老魅不敢近人又曰山之精形如小兒而獨足足向後喜來犯人人入山谷聞其聲音笑語其名曰蛟知而呼之即不敢犯人一名曰超空亦可兼呼之又曰有山精或如鼓色赤一足其名曰揮文或如人長九寸衣裘帶笠名曰金累又或如龍而五色未有名曰飛龍見之皆以其名呼之不敢為害又曰山中大樹能語者非樹語也其精名曰雲陽以其名呼之即吉又曰山中夜見胡人者銅鉄精也見秦人者百嵗木精也山水之間見使者曰四激以其名呼之則吉又曰山中寅日有稱虞吏者虎也稱當路軍者狼也稱令長老狸也夘日稱丈夫者兎稱東王父者麋也稱西王母者鹿也辰日稱雨師者龍也稱河伯者魚也稱無膓公子􅈉也巳日稱寡人者社神也稱時君龜也午日稱三公者馬也稱人者老樹也未日稱主人者羊也稱吏者麞也申日稱人君者猴也稱九卿者猿也酉日稱將軍者老鷄也稱賊捕者雉也戌日稱人姓字者犬也稱咸陽公者狐也亥日稱君者猪也稱婦人者金玉也子日稱社者䑕也稱神人者伏冀也丑日稱書生者牛也知其物則不能為害又曰山川石木井竈洿池猶有精氣人身之中亦有魂魄况天地為物物之大者於理當有精神有精神則宜賞善罰惡但其體大網踈不必機發而應耳太平御覧卷八百八十六
