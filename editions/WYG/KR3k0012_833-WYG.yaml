body:
  text: 太平御覽巻八百三十三宋李昉等撰資産部十三陶禮記檀弓曰有虞氏瓦棺始不用薪也有虞氏上陶夏后氏堲周火熟曰堲燒土冶以周於棺也或謂之土周又喪大記曰甸人為垼于西牆下陶人出重鬲左𫝊襄公二十五年鄭子産曰昔虞閼父為周陶正以服事我先王閼父舜之後當周之興閼父為武王陶正我先王賴其利器用也與其神明之後也舜聖故謂之神明庸以元女大姬配胡公庸用也元女武王之長女胡公閼父之子滿也而封諸陳以備三恪周得天下封夏殷二王後又封舜後謂之三恪幷二王後為三國其禮轉降示敬而已故曰三恪毛詩文王綿曰古公亶父陶復陶穴未有家室續漢書曰董卓欲遷都長安楊彪不從董卓作色曰楊公欲沮國家計耶關東方亂所在賊起崤函險固國之重防又隴右取材功夫不難杜陵南山下有孝武故陶處作磚瓦一朝可辦宫室官府葢足焉呉書曰鄭泉字文淵臨卒謂同類曰必葬我於陶家之側庶百嵗之後化而成土幸見取為酒壺獲我心矣宋書曰文帝欲誅徐羨之羨之乘内人問訊車出郭步至新林入陶竈中自經而死尸子曰昆吾作陶淮南子陶人埏埴也其取之地而為盆盎也無離於地其已成器而破碎漫爛而復歸其故也與其為盆盎無以異矣周書曰神農耕而作陶吕氏春秋曰夫舜遇堯天也舜耕於歴山陶於河濵釣於雷澤天下悅之列仙𫝊曰寗封子者黄帝時人為黄帝陶正有人過之為其掌火能出五色煙久則以教封子積火自燒而隨煙氣上下視其灰燼猶有骨時人葬之北山中謂之寗封子焉嶺表異録曰廣州陶家皆作土鍋鑊燒熟以土油之其潔淨則愈於鐵器尤宜煮藥一斗者纔直十錢愛䕶者或得數日若迫以巨熖涸之則立見破裂斯以濟貧之物冶禮記學記曰良冶之子必學為裘仍見其家錮補穿鑿之器也補冶器者其金柔乃合有似於為裘史記曰邯鄲郭縱以鐵冶成業與王者埒富又曰宛孔氏之先梁人也用鉄冶為業秦代魏遷孔氏南陽大鼓鑄規陂池連車騎遊諸侯因通商賈之利有游閒公子之名又曰魯人曹邴氏以鐵冶起富至巨萬然家自父兄子弟約俯有拾仰有取張璠漢記曰杜詩為太守為冶作水排教化大行魏志曰韓暨字公至辟為丞相士曹屬後遷樂陵太守徙監冶謁者舊時冶作馬排每一熟石用馬百疋更作人排又費功力暨乃因長流為水排計其利益參倍於前在職七年器用充實詔書褒嘆就加司金都尉晉書曰王沉字彦伯作釋時論云融融者皆趨熱之士得其爐冶之門者唯挾炭之子苟非斯人不如其已南史曰齊袁彖監呉興郡事彖到郡坐過用禄錢免官付東冶彖妹為竟陵王子良妃子良世子昭胄時年八嵗見武帝而形容慘悴帝問其故昭胄流涕曰臣舅負罪今逮尚方臣母悲泣不食已積日臣所以不寧帝曰特為兒赦之既而帝遊孫陵遥望東冶曰中有一好貴囚數日與朝臣幸冶履行庫藏因宴飲賜囚徒酒肉勅見彖與語明日釋之梁書曰侯景據壽陽懷反計以臺所給仗多不能精啓請冶鍛工欲更營造勑並給之後魏書曰崔鑒為東徐州刺史於州内銅冶為農具兵人獲利北史曰後周薛善為行臺郎中時欲廣置屯田以供軍費乃除善司農少卿領同州夏陽縣二十屯監又於夏陽置鉄冶復令善監之復月役八千人營造軍器善自督課兼加慰撫甲兵稍利而皆忘其苦焉唐書曰侍中魏徵乞解所職請為散官奉左右拾遺補闕太宗曰朕拔卿於讐虜之中任卿以樞要之職見朕之非未嘗不諫公獨不見金之在礦也何足貴哉良冶鍛而為器便為人所寳朕方自比於金以卿為良匠卿雖有疾未為衰老豈得便爾耶徵乃止尸子曰造冶者蚩尤也淮南子曰夫宋畫吳冶刻形鏤法其為㣲妙堯舜之聖不能及也列仙𫝊曰陶安公者六安冶師也數行火一旦散上紫色衝天安公伏冶下求哀須臾朱雀至冶上曰安公安公冶與天通七月七日迎汝以赤龍至時龍到安公騎之果上昇天武昌記曰北濟湖本是新興冶塘湖元嘉初發水冶水冶者以水排冶令顔茂以排數破壞難為功力茂因廢水冶以人鼓排謂之步冶湖後因破壞不復修治冬月則涸王子年拾遺記曰漢太上皇㣲時嘗佩一刀長三尺有銘其字雖難識疑是殷高宗伐鬼方時作此物也上皇遊酆沛山中遇有人冶鑄上皇息其旁問曰此鑄何物工笑曰為天子鑄劍慎勿泄上皇謂為戱辭無疑色工曰今所鑄鉄剛厲製器難成若得公腰間佩刀雜而冶之即成神器可以尅定天下星精為輔佐以殱三猾木衰火盛此為興兆上皇曰余此物名為匕首其利難儔水斷蛇龍陸斬虎兕工曰若不得此匕首雖歐冶專精越砥斂鍔終為鄙器上皇即解腰間匕首投於爐中俄而煙􅆋衝天日為之晦及劍成釁以三牲工問上皇何時得匕首上皇曰秦昭襄王時余行逢一野人于野授余云是殷時物世世相𫝊上有古字記其年月工人視之其鏌耶尚在叶前疑也工人持劍授上皇上皇以賜高祖又曰漢郭況武皇后之弟也累金數億家僮四百人黄金為器功冶之聲震於都鄙時人謂郭氏之室不雨而雷言鑄之聲盛也曹毗詠冶賦曰冶石為器千爐齊設鍛箋云鍛石闕為質魏畧曰太祖遣邯鄲淳詣臨淄侯植植得淳喜延入坐不與談先為五椎鍛鄧粲晉紀曰稽康曾鍛於長林之下鍾㑹造焉康自坐以鹿皮嶷然正容不與之酬對㑹恨而去文士𫝊曰稽康性巧能鍛家有柳樹乃激水以圍夏月甚清涼居其下傲戱及自鍛禰衡𫝊曰衡字正平十月朝黄祖在艨衝舟賔客皆㑹作黍􅌜既至先設衡前衡得便飽食初不顧左右既畢復摶弄以戱時江夏有張伯雲亦在座調之曰禮教云何而食此正平不答弄黍如故祖曰處士不當答之也衡謂祖曰君子寧聞車前馬䊧祖呵之衡􅂞視祖罵曰死鍛錫公祖大怒令五伯將出欲杖之而罵不止遂令絞殺黄射來救無所復及愴悽流涕曰此有異才曹操及劉荆州不殺大人柰何殺之祖曰人罵汝父作鍛錫公柰何不殺向秀别傳曰秀嘗與嵇康偶鍛於洛邑與吕安灌園於山陽収其餘利以供酒食之費韓子曰推鍛者所以平不夷也榜檠者所以矯不直也聖人之為法也所以平不夷矯不直也牧周禮地官曰牧人掌牧六牲而阜蕃其物以供祭祀之牲牷六牲謂牛羊馬豕犬雞鄭司農云牷純也𤣥謂性體完具又夏官曰牧師掌牧地皆有厲禁而頒之頒馬授圉者所牧處孟春焚牧焚牧地以除陳生新草中春通淫中春隂陽交萬物生之時可以合馬之牝牡也禮記月令季春曰是月也乃合累牛騰馬遊牝于牧累繋也騰躍也其牝欲遊則就牧而合仲夏曰是月也命有司祭先牧謂仲夏祭先牧於天擇用剛日毛詩小雅曰無羊宣王考牧也厲王之時牧人之職廢宣王中興而復之至此而成謂復先王牛羊之數誰謂爾無羊三百維羣誰謂爾無牛九十其犉黄牛黒唇曰犉箋云爾女也宣王復古之牧法汲汲於其數故歌此詩以解之也爾羊来思其角濈濈聚其角而息濈濈然云此者美畜産得其所爾牛来思其耳濕濕動其耳濕濕然或降于阿或飲于池或寢或訛訛動也言此者美其無所驚畏爾牧来思何蓑何笠或負其餱何揭也蓑所以偹雨笠所以御暑言此者美牧人寒暑飲食有備三十維物爾牲則具黒毛色者三十也云牛羊之色異者三十則女之祭祀素則有之爾牧來思以薪以蒸以雌以雄云此牧人有餘力則取薪蒸摶禽獸以來歸也麤曰薪細曰蒸爾羊來思矜矜兢兢不騫不崩矜矜兢兢言堅强也騫虧也崩羣疾也麾之以肱畢來既升肱臂也升升入牢也此言擾馴從人意也牧人乃夢衆維魚矣旐維旟矣大人占之衆維魚矣實維豐年隂陽和則衆魚多矣旐維旟矣室家溱溱又魯頌曰駉頌僖公也僖公能遵伯禽之法儉以足用寛以愛民務農重榖于埛野魯人尊之駉駉牡馬在坰之野云必牧于坰野者避民居與良田也周禮曰以官田牛田賞田牧田任逺郊之地尚書曰今惟淫舎牿牛馬今軍人惟大放舎牿牢之牛馬言軍所在必放牧也杜乃擭敜乃穽無敢傷牿牿之傷汝則有常刑擭機檻也穽穿地䧟獸也史記貨殖傳曰陸地牧馬二百蹄牛蹄角千千足羊澤中千足彘又曰公孫𢎞齊菑川國薛縣人也家貧牧豕海上年四十餘乃學春秋雜説漢書曰衞青字仲卿初為侯家人少時歸其父使牧羊民母之子皆奴畜之又曰卜式河南人也以田畜為事入山牧十餘年羊致千餘頭上召之曰吾有羊在上林中欲令子牧之式乃布衣草屩而牧羊歲餘羊肥息又曰王尊字子貢涿郡高陽人少孤歸諸父使尊牧羊於澤中後漢書曰馬援轉遊隴漢間常謂賔客曰丈夫為志窮當益堅老當益壯因處田牧至有牛馬羊數千頭穀數萬斛既而嘆曰凡殖貨財産貴其能賑施也否則守錢虜耳仍盡數以班昆弟故舊身衣羊裘皮袴又曰承宫年八嵗為人牧豬鄉里徐子盛明春秋授諸生數百人宫過其廬下見諸生講好因亡其豬豬主欲以笞之諸生共禁止因留之謝承後漢書曰孫期字仲式事母至孝牧豕於大澤中賣之以奉供養逺人從其學者皆執經追於澤畔范􅁮後漢書曰梁鴻字伯鸞扶風平陵人也家貧牧豕上林苑中曽誤遺失火延燒及他舍鴻乃尋訪燒者問所失去悉以豕償之其主猶以為少隣家耆老見鴻非常人乃共責讓主人於是始敬異焉悉還豕鴻不受魏志曰楊俊字季才避地幷州同郡王象少孤特為人僕𨽻年十七八見使牧羊而私讀書用獲箠楚俊嘉美其才質即贖象着家聘娶立屋然後與别也晉書曰張華字茂先少家貧常以牧羊為事三十國春秋曰沮渠䝉遜其先世為匃奴在沮渠因以官為氏少牧羊卧息田畔忽見沙門以手摩其頭曰爾後當王此土不乆苦焉言終而滅崔鴻前趙録曰李景字延祐少貧見養叔父常使牧羊景見其叔子講誦羨之後從博士乞得百餘字牧羊之暇折草木書之叔乃悟曰吾家千里駒也而令麒麟乆躓鹽坂乃為娶妻教學又曰姜宇天水冀北人也少孤貧為河北陳不識家牧羊年十五六身長七尺九寸聰惠美風儀不識竒之乃以女妻之後魏書曰游明根字志逺㓜年遭亂為櫟陽王氏奴主使牧羊明根以漿倩人書字路邊書地學之長安鎮將竇瑾見之呼問之其姓名乃告游雅使人續之列子曰楊朱見梁惠王言治天下猶運諸掌王曰先生有一妻一妾而不能治言天下何也對曰君見夫牧羊者乎百羊為羣使五尺童子荷箠而隨之欲東而東欲西而西使堯牽一羊舜荷箠而隨之則不能矣符子曰漢王聞宋勝子方牧牛于巨澤鼓而歌南風之詩使者進謂宋勝子曰漢王聞先生之賢使使者致命于先生而委國政焉宋勝子矍然而顧謂使者曰是何言歟今漢王待四海之士與十羣之羊其於職司也奚以異乎而大王廢牧羊之任委以四海之政是錯亂天位倒置人倫勝不願為也乃逃於隂山之陽公孫尼子曰舜牧羊於潢陽還堯舉為天子説文曰羌西戎牧羊人也字從羊人列仙𫝊曰商丘子瑕吹笙牧豕七十不娶妻而死呉越春秋曰婁門外雞墟者呉王牧雞處陳武别𫝊曰武休屠呉人也嘗騎驢牧羊諸家牧竪十數人或有和歌者武遂學太山梁父吟及行路難之屬也漁説文曰漁捕魚也周禮天官上曰􅈄人掌以時􅈄為梁月令季冬命魚師為梁鄭司農云梁水偃也偃水為關空以笱承其空詩曰敝笱在梁春獻王鮪王鮪鮪之大者辨魚物為鱻薧以供王膳羞鮮生也薧乾也凡祭祀賔客喪紀共其魚之鱻薧凡􅈄者掌其政令凡􅈄征入玉府鄭司農云漁征漁者之租稅也漁人主収之而入于玉府禮記月令季冬曰命漁師始漁天子親往嘗魚先薦寢廟天子親往視漁非常事重之也時魚潔美又坊記曰故君子仕則不稼田則不漁左𫝊隱公曰公將如棠觀魚臧僖伯諫曰吾將略地焉遂往陳魚而觀之又襄公二十五年曰崔杼弑其君申蒯侍漁者侍漁監魚之官也退謂其宰以帑免其宰曰免是反子之義也與之皆死周易下繋曰庖犧氏之王天下也結繩而為網罟以田以漁葢取諸離尚書大𫝊曰舜漁雷澤之中後漢書曰明帝時下令禁人二業而吏下檢括多失其實百姓患之劉般上言郡國以官禁二業至有田者不得漁捕今濵江湖率少蠶桑人資漁採以助口實且以冬春閑月不妨農事夫漁獵之利為田除害有助穀食無關二業也北史曰後周裴俠除河北郡守此郡舊制有漁獵夫三十人以供郡守俠曰以口腹役人吾不為也乃悉罷之管子曰漁人入海海深百仞就波逆流乘危百里宿夜不出者利水也故利之所在雖千仞之山無不上焉深源之下無不入焉魯連子曰古善漁者宿沙瞿子使漁于山則雖十宿沙子不得一漁焉宿沙非闇于漁道也彼山者非魚之所生尸子曰燧人之世天下多水故教人以漁文子曰堯使水處者漁山處者牧事宜其械械宜其人吕氏春秋曰雍季對晉文公曰竭澤而漁豈不獲得而明年無魚矣家語曰宓子賤治單父三年孔子使巫馬期往觀政焉期隂免衣弊裘入界見漁得魚輙捨之期問焉曰凡漁者為得也何以得魚却舍之曰魚之大者名為䲖吾大夫愛之其小者名為鱦鱄為鱣新序作鮹鱦者魚之懷任也吾大夫欲長之是以得二者輙捨之期返告孔子曰宓子之德至矣使民暗行若有嚴刑於旁也期問宓子何行而得於此子曰吾嘗與之言曰誠於此者刑於彼宓子盖行此術於單父也又曰孔子之楚有漁者獻魚焉孔子不受漁者曰天暑市逺無處鬻焉思欲棄之糞壤不若獻之君子故取以進之於是夫子再拜而受之使弟子掃地將以祭享焉門人曰彼將棄之矣而夫子祭之何也夫子曰吾聞惜其腐餘欲以務施者仁之偶也惡有受仁人之饋而無祭者乎劉向新序曰楚人有獻餘魚於王者曰今日獲魚食之不盡賣之不售棄之可惜故來獻王也楚王曰漁者仁人也境内多貧寡人聞之未能行漁者知之以此教寡人也乃出倉粟去後宫以妻寡夫郭璞江賦曰蘆人漁子擯落江山衣則羽褐食惟蔬鱻忽忘夕而宵歸詠採菱以扣舷傲自足於一嘔尋風波以窮年太平御覽巻八百三十三
