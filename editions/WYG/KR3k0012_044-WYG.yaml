  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_044-1a, image: WYG0893/WYG0893-0373c.png}
body:
  text: 太平御覽卷四十四宋李昉等撰地部九關中蜀漢諸山吳山銅梁山髙梁山九􅉄山嶻薛山驪山龍首山藍田山笄頭山雞頭山牛首山五將山仇池山賀蘭山太白山岷山石鏡山青城山卭崍山牛頭山董政山綏山覆舩山靈臺山黄厥山彭亡山鼎鼻山金山五婦山靈山猿門山閬山盤龍山玉女山祁山青石山雲南山禺同山弔鳥山吳山周禮雍州其山鎮曰嶽山孫炎曰雍州鎮有吳嶽山也郭璞曰吳嶽别名吳山漢書地理志云吳山在汧縣西故語謂之西吳秦都咸陽以為西岳酈道元水經註云汧水發南山西側俗以為吳山其山三峯望之恒有落勢山下有石穴廣四尺髙七尺赤水溢石穴懸波傾注浦瀾奔盪發源成川北流注于汧是也銅梁山左太冲蜀都賦云外負銅梁岩渠張孟注云銅梁山名也按其山有桃枝竹西東亘二十餘里山嶺之上平整逺望諸山而此獨秀也山在州南九里髙梁山江原記云南浦郡髙梁山尾東跨江西首劒閣東西數千里嶺長峻其峯崔嵬於蜀市望之若長雲垂天一日行之乃極其頂俯視衆山泯若平原劒閣銘謂岩岩梁山積石峨峨即述此也九􅉄山四夷郡國縣道記曰九􅉄山東連仲仁西當涇水焉又九􅉄山髙六百六十丈周十五里在咸陽嶻嶭山四夷郡國縣道記曰嶻嶭山在雲陽縣東北十里一名慈峨山勢嵯峨山頂有雲起即雨故里人以為候昔黄帝鑄鼎於此山驪山三輔故事曰始皇葬驪山起陵髙五十丈下錮三泉周廽七百歩以明珠為日月魚膏為脂燭金銀為鳬雁金蠶三十箱四門施徹奢侈太過六年之間為項籍所發放羊兒墜羊塚中燃火求羊燒其槨藏述征記曰長安東則驪山西則白鹿原北望雲陽悉見山阜之形而恒若在雲霧之中孟康曰昔周幽王悦褒姒姒不好笑王乃擊鼓舉烽以徵諸侯至而無寇褒姒乃笑王甚悦之及犬戎至王舉烽以徵諸侯不至王遂敗身死于驪山之北龍首山辛氏三秦記曰龍首山長六十里頭至渭水尾連樊川頭髙二十丈尾漸下髙五六丈土赤不毛昔有黑龍從山出飲水其行道成土山今長安城即疏山為臺殿基址不假築其含元殿即龍首山之東麓髙敞為京之最階髙於平地三十餘尺南去丹鳯門四百餘歩中無間隔左右寛平東西廣百歩兩都賦云漢之西都實曰長安左據函谷二崤之岨右界褒斜龍首之險表以太華終南之山帶以洪河涇渭之川即此之形勢也藍田山後魏風土記云藍田巓方二里仙聖遊集之所劉雄鳴學道於山下有祠甚嚴蓋㶚水源于此西又有尊盧氏陵次北有女媧氏谷則知此地是三皇舊居於是笄頭山史記云黄帝西至于崆峒登筓頭圖經云筓頭山在涇陽西禹貢涇水所出淮南子云薄浴山一名笄頭山水經注云大隴之山異名耳莊子謂廣成子學道於崆峒之山葢黄帝問道於廣成子亦在此山按今肅州又有崆峒之山未詳孰是今此見有栢堂在山頂上不知何代所置也後漢隗囂使王孟塞雞頭道謂此山也雞頭山崔鴻十六國春秋云石生不能守長安欲西上隴士卒散盡遂入雞頭山為追兵所害山在鄠縣東牛首山山海經曰牛首山澇水出焉而注于滳水魚多非魚狀以餌可療痔疾又曰牛首山有鬼草赤莖葉如葵秀如禾服之使人不憂五將山崔鴻十六國春秋曰苻堅為慕容冲所逼長安城中有書曰古苻傳賈録載帝出五將乆長得先是又謡曰堅入五將乆長得堅大信之率騎數百出如五將宣告州郡期孟冬救長安堅至五將山姚萇遣將軍吳忠圍堅衆奔散忠執堅以歸新平即此山也仇池山辛氏三秦記曰仇池山上有百頃地平如砥其南北有山路東西絶壁百仞上有數萬家一人守道萬夫莫向山勢自然有樓櫓却敵之狀東西二門盤道可七百里上有岡阜泉源史記謂秦得百二之固也西晋末為氐楊茂搜所據於山上立宫室囷倉皆為板屋乃氐之所理於此今謂之洛谷道是也秦州記曰仇池山本名仇羅山形似覆壺上廣百頃下周數十里髙二十餘里壁立千仞自然樓櫓却敵分置均調竦起數丈有如人力也賀蘭山涇陽圗經曰賀蘭山在縣西九十三里山上多有白草遥望青白如駁馬北人呼駁馬為賀蘭因名賀蘭山鮮卑等類多依山谷為氏族今賀蘭姓名皆因此山太白山辛氏三秦記曰太白山南有陳倉山山有石與山雞不别趙髙燒山雞飛去晨鳴山頭聲三十里或謂是玉雞錄異傳云秦文公時雍南山有大梓樹文公伐之輙有大風雨樹生合不斷有一人病夜往山中聞有鬼語樹神秦若使人被髮以朱絲繞伐樹汝得不憂否文公如其言伐樹樹中有一青牛出走入壇水中復出使騎擊之不勝騎墮地復上髮解牛乃畏之入水不出故置髦頭騎也岷山山海經曰岷山江水出焉而東流注于大江其中多恠蛇有鳥焉其狀如鶚而赤身白首其名曰竊脂可以禦火石鏡山華陽國志曰疊州合川縣石鏡山在縣西北四十五里其山有石光瑩皎潔照之莫不備見形體故謂之石鏡山山下又有銅窟隋初於此置監鼔鑄錢刀焉青城山福地記曰青城山髙三千六百丈周匝五十里有甘露芝草天池醴泉玉匱經云黄帝封為五岳丈人乃岳瀆之上司真仙之崇秩一月之内羣岳再朝六時洒泉以代晷漏一名赤城一名青城都一名天谷山亦為第五洞天寶仙九室之天對郡之西北在岷山之南羣峯掩映互相連撞虚無所宅祥異則多益州記曰崗巒山領㟧相連千里上有仙都地理志云西徹之外江水所出天彭青城連峯不絶李膺記云入山七里至赤石城有羊馬臺三師壇上五里至瀑布水澗二百歩有二石梯有一石笋其髙三丈過二石門絶崖數百丈下起常道觀髙峯下有水不時灑落東北有二石室名龍宫可容百餘人從龍宫過石室至石梯名龍橋又有一石梯洞穴深淺莫知所極西北有石室宛然見存又有黄帝壇石法天地上圓下方濶一丈二尺有十二角觀東刻日月各濶五尺厚一尺二寸相對柱上烏兔煇鑠方圓磅礴可觀五岳真形圖云洞天所在之處其下别有日月分精以照其中龍橋處二山相去百餘歩其峯危竦相對橋在峯首其橋中半漸漸促小可六七寸長一丈五尺兩邊懸崖俯臨不測山傍有誓石天師張道陵與鬼兵為誓朱華盡山青崖中絶今驗斷處石並丹色濶二十丈深六七丈望之截然卭崍山山海經曰卭崍山江水出焉今在漢中嚴道縣中江所出有九折坂出獸似熊其陽多黄金其陰多麋其木多檀柘也華陽國志曰嚴道縣南有卭崍山山上凝氷夏結縈廽九折王陽去官之所牛頭山九州記云牛頭山昔日葛仙翁多遊於此今立為寺與白獸山相連者秦世有白獸為害夷人射之刻白石於此今遺像尚存董政山十道記曰董政山隋開皇中縣令董政封髙雅之士去官之後民咸思其徳因指山為董政山綏山列仙傳曰葛由者蜀之羗人周成王時刻木為羊賣之一旦乘木羊入蜀蜀中王侯賓之上綏山山在安國縣東三十里隨之人皆得仙術覆船山十道錄曰覆船山堯遭洪水維舟山下船因覆焉又益州記云覆船山中十五里有七里坂一名羊膓坂屈曲難昇靈臺山十道記曰靈臺山在縣北一名天柱山髙四百丈即漢張道陵昇真之所郡國志曰靈臺山天柱崖下有一桃樹髙五尺皮是桃心肉似栢張道陵與王良趙昇試法於此四百餘年桃迄今不朽小碑記之黄厥山郡國志曰黄厥山有鍾乳穴十九又西岸有自然石竇其下流水上有一懸石似磬擊之有聲可聽彭亡山十道記曰彭亡山後漢將軍岑彭征公孫述於此山戰死故號曰彭亡山鼎鼻山十道記曰鼎鼻山周道衰微九鼎淪沒於此山之下其水清澄今民猶或見其鼎耳金山益州記曰金山在涪縣東五十歩東臨澗水光照映川又李膺記云金山長七八里毎夏潦雨有崩處即金粟散出是也五婦山蜀記云梓潼縣有五婦山一名五婦臺秦王遺蜀王美女五人蜀王遣五丁迎五女至梓潼五丁躍地大呼驚五女並化為石蜀王築臺登而望之因名為五婦臺焉靈山郡國志曰靈山者有神女於此搗衣因號搗衣山山南絶岩有方石明瑩謂之玉女搗練砧又有盤龍山以山形如盤龍也猿門山益州記曰猿門山在涪縣之北二十五里上多猿其山二峯磷竪如門故曰猿門閬山閬山圗經曰閬山四合於郡故曰閬中按名山志云閬山多仙聖遊集焉盤龍山李膺益州記云閬中盤龍山南有一石長四十丈髙五尺當中有户兩扇若人之掩閉古老以為玉女房玉女山梁州記云肥城東南有玉女山山有一石穴中若房宇玉女入穴不出穴前有修竹下有石壇風微動竹拂壇如箒祁山關山圗曰漢陽西南有祁山九州之名阻天下竒峻按蜀志云建興六年諸葛亮率師攻祁山不㧞即謂此也又按九州志云祁山上有髙樓武陟二神祠每嵗郡邑祀之青石山益州記云昔巴蜀争界久而不决漢髙帝八年一朝密霧石為之裂今猶如之自上及下破處直若引繩焉於是州界始判山上有古神祠甚靈今名青石山雲南山九州要記云雲南郡山山有神處石室稱黄石公祀之必用紙一百張筆一雙墨一丸室内有啟必知吉凶但不見其形禺同山九州要記曰禺同山有金馬碧鷄之祠弔鳥山九州要記曰弔鳥山在葉榆縣葉榆則雲南郡廢邑也山上有鳥千百羣飛啁啾一嵗必一度大集即鳯凰死地也太平御覽卷四十四
