  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_858-1a, image: WYG0900/WYG0900-0516a.png}
body:
  text: 太平御覽卷八百五十八宋李昉等撰飲食部十六酪酥附䬫餬通俗文曰煴羊乳曰酪酥曰䬫餬釋名曰酪澤乳汁所作使人肥澤漢書曰武帝太初元年更名家馬爲桐馬應劭曰主乳馬取其甘桐液之味酢可飲因以為官如淳曰桐音筩主乳馬以韋革為夾兠受數斗咸馬乳桐取其上肥因名曰桐馬今梁州亦名酪為馬酒晋灼曰桐音揵桐之桐又曰丞相孔光奏有樂官七十二人絡太官桐馬酒李竒曰以馬乳為酒也撞桐乃成又曰烏孫公主歌曰以肉為食兮酪為漿又曰王莽時飢教民煮木為酪不可食重為煩擾注曰木實為酪也或曰如今餌木屬後魏書曰神瑞二年秋榖不登太史令王亮等言䜟書云國家當都鄴大樂五十年勸帝遷都可救今年之飢帝以問崔浩浩曰非長久之䇿也今留守舊都分家南従不便水土疾疫死傷情見事露則百姓意阻四方聞之有輕侮之意今居北方至春草生乳酪將出兼有菜果足接來秋若得中熟事則濟矣又曰臨淮王譚孫孚持白武幡勞河那環於柔元懐荒二鎮間河那環衆號三十萬隂有異意遂拘宿孚載以輼車日給酪一升肉一叚唐書曰髙宗朝太僕以患疥馬乳造露酪供進署丞罪當死上特免之晉太康起居注曰尚書令荀朂羸毁賜乳酪太官隨日給之漢武内傳曰西王母曰次藥有太𤣥之酪西河舊事曰祁連山宜牧牛羊肥乳酪好受冩畧不用器物刈草著其上不散解一斛畧升餘酥鄴中記曰荆州之俗以冬至後百五日為介子推斷火冷食作醴酪煮粳米或大麥作之又投大麥於酪中并杏子仁煮作之亦投大麥中郭子曰王武子有數斛羊酪指示陸機曰卿東呉何以敵此機曰千里蓴羮下鹽豉世説曰楊徳祖為主簿侍坐人有餉酪者魏武噉少許乃題上作合字致坐中人並不觧修即噉之云公令一人一口復何疑又曰陸太尉詣王丞相公食之以酪陸遜遂病明日有牋與王曰昨食酪過通夜委頓雖是呉人幾為傖鬼笑林曰呉人至京師為設食者有酪酥未知是何物也强而食之歸吐遂至困顧謂其子曰與傖人同死亦無所恨汝故宜慎之魏武帝集載鍾繇書曰屬賜甘酪及櫻桃孫楚祀介子推祝文曰棗飯一盤醴酪一盂清泉甘水充君之厨傅咸集楊濟興書曰酥治瘡范汪祠制曰仲夏薦杏酪慕容晃與顧和書曰今致䬫餬十觔唐書曰武徳二年涼州刺史安脩仁獻百年酥云餌可延夀太平御覽卷八百五十八
