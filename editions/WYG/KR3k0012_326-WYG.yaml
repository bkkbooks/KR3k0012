body:
  text: 太平御覧卷三百二十六宋李昉等撰兵部五十七擒獲下擄掠擒獲下晉書載記曰劉曜光禄大夫游子逺與𤣥羗伊餘戰伊餘有驕色子逺候其無備夜誓衆蓐食晨大風震霧子逺曰天贊我也躬先士卒掃壁而出遲明覆之生擒伊餘悉俘其衆二石偽事曰劉曜躬領將士二十七萬衆大舉征勒勒養子生為衛將軍領三千人鎮洛金墉城曜攻生城不能下不覺勒軍卒至天曉曜軍當攻金城勒軍入正與曜軍相遇即交戰曜軍大破登時先擒曜又三十國春秋曰丁亥中軍劉裕悉衆攻燕衆咸諫曰今往亡日兵家所忌裕曰我往彼亡吉孰大焉乃命悉登遂剋之燕王慕容超走追獲焉裕責其不降之罪超神色自若無餘言惟以母託劉敬宣而已蕭方等曰美哉其言也言必已親終不忘孝可謂人之將死其言也善信乎三國典畧曰侯景晝息夜行追軍漸逼使謂慕容紹宗曰景若被擒公復何所用紹宗乃緩之又曰北齊平任城王湝音諧據冀州與廣寧王孝珩召募得四萬餘人以拒我軍齊王憲率衆討之仍請太上皇手書與湝曰朝廷遇緯甚厚諸王無恙叔若釋甲則無所憂湝不納及大開賞募多出金帛沙門求為戰者亦數千人候騎執湝間謀二人以白于憲乃集齊之舊將遍示之曰吾所争者大不在汝等今放還可即充我使乃與湝書曰一木不維大厦三諫可以逃身㣲子去商侯服周代項伯背楚賜姓漢朝兵交命使古今通典不俟終日所望知幾湝得書沉之於井憲至信都湝陣於城南憲登張耳冡以望之俄而湝領軍尉相顧遂以衆降湝大怒殺其妻子明日復戰憲遂破之俘斬三萬人湝被擒見憲不拜呼之為弟北史曰後魏元遥遷左光禄大夫仍領䕶軍時冀州沙門法慶既為妖幻遂説渤海人李歸伯合家從之歸伯招率郷人推法慶為主法慶以歸伯為十住菩薩平魔軍司定漢王自號大乗殺一人者為一住菩薩殺十人者為十住菩薩又合狂藥令人服之父子兄弟不相知識惟以殺害為事於是聚衆殺阜城令破渤海郡殺害吏人刺史蕭寳京遣兼長史崔伯驎討之敗扵是棗城伯驎之没兇衆遂盛所在屠滅寺舎斬僇尼僧焚燒經像云新佛出世除去衆魔詔以遥為使持節督北征諸軍事率歩騎十萬以討之法慶相率攻遥遥並擊破之遥遣輔國將軍張虬等擒法慶并尼惠暉等斬之傳首京師後擒歸伯僇於都市後周書曰裴寛與東魏將彭樂恂戰新城因傷被擒至河陰見齊文襄寛舉止詳於占對文襄甚賞異之謂寛曰卿三河冠蓋材識如此我必使卿富貴關中貧狹何足可依勿懐異圗也因解鎖付館厚加其禮寛乃裁所卧之氊夜縋而出因得遁還見於太祖太祖顧謂諸公曰被堅執鋭或有其人疾風勁草嵗寒方騐裴寛為髙澄如此厚遇乃能冐死歸我雖古之竹帛所載何以加之又曰太祖時梁元帝遣使請舊圖以定疆界又連結於齊言辭悖慢太祖曰古人有言天之所棄誰能興之其蕭繹之謂乎冬十月壬戌遣柱國于謹中山公䕶大將軍楊忠韋孝寛等歩騎五萬討之十一月癸未師濟於漢中公䕶與楊忠率鋭騎先屯其城下據江津以備其逸丙申謹至江陵列營圍守辛亥進攻城其日克之擒梁元帝殺之并虜其百官及士民以歸没為奴婢者十餘萬其免者二百餘家立蕭詧為梁主居江陵為魏附庸又曰侯莫陳崇隨賀㧞岳征討以功除建威將軍從岳入關破万俟醜奴崇與輕騎逐北至涇長坑及之賊未成列崇單騎入賊中於馬上生擒醜奴於是大呼衆悉披靡莫敢當之後騎集遂破之岳以醜奴所乘馬及寳劍金帶賞之又曰李廣㑹稽人早事詧以敢勇聞沇口之役先登力戰及華皎軍敗為吳明徹所擒將降之廣辭色不屈遂被害又曰栁檜除魏興華陽二郡守安康人黄衆寳謀反連結黨與將圍州城乃相謂曰嘗聞栁君勇悍其鋒不可當今既在外方為吾徒腹心之病也不如先撃之遂圍檜郡郡城卑下士衆寡弱人無守禦之備連戰積十餘日士卒僅有存者扵是力屈城陷身被十數創遂為賊所獲既而衆寳等進圍東梁州乃縛檜置城下欲令誘説城中檜乃大呼曰群賊烏合粮食已罄行即退散各宜勉之衆寳大怒乃臨檜以兵曰速更汝辭不爾便就戮矣檜守節不變遂害之棄屍水中人皆為之流涕隋書曰漢王諒之作亂也煬帝將發幽州兵以討之時竇抗為幽州總管帝怒其有貳心問可任者於楊素素進李子雄授上大將軍拜廣州刺史馳至幽州止傳舎召募得千餘人抗素恃貴不與相見子雄遣人諭之後二日抗從鐵騎二千來詣子雄所子雄伏甲請與相見因擒抗遂發幽州兵歩騎三萬自陘以討諒時諒遣大將軍劉建略地燕趙正攻陘相遇於抱犢山下力戰破之遷幽州總管又曰獨孤楷字脩則不知何許人也本姓李氏父屯從齊神武帝與周師戰於沙苑齊師敗績因為柱國獨孤信所擒配為士伍給使信家漸得親近因賜姓獨孤氏楷少謹厚便弄馬槊為宇文䕶執刀累轉車騎將軍其後數從征伐賜爵廣阿縣公邑千户唐書曰長平王叔良遣驃騎劉感擊薛仁果却為所敗感殁於賊感不知何許人初以本官鎮涇州為仁果所圍感拒戰乆之城中粮盡無食感殺馬以分士卒感一無所啖唯煮馬肝取汁和木屑而自食之城垂䧟者數矣㑹長平王叔良援兵至仁果解之感與叔良復出戰因為賊所擒又曰王行敏鎮潞州劉黑闥來攻行敏自歴亭出兵拒戰擊賊破之既憇於野不設備賊知而掩之左右皆遁去因為黑闥所擒竟不拜黑闥怒斬之臨死西向而言曰行敏大唐忠臣也願陛下知之髙祖聞而痛惜焉又曰劉世讓檢校并州總管時突厥可汗遣俱檢特勒以所部千人居我并州甚為民患前總管李仲文不能制世讓到官以計擒之馳使以聞髙祖大悦嘉嘆乆之又曰姜寳誼武徳初拜武衛大將軍尋為井鉞將軍劉武周將黄子英往來雀䑕谷髙祖令寳誼撃之子英數以輕兵挑戰寳誼兵纔接子英輕遁如此者再三寳誼悉衆以逐之伏兵發軍遂大敗寳誼為賊所擒後得逃歸至是與裴寂拒宋金對戰始合寂棄軍而走兵遂大潰寳誼復為賊所擒髙祖初聞其沒也泣曰寳誼烈士必不生降賜其家物千叚米三百石寳誼後謀背賊事洩遇害臨死西向大言曰臣無狀負陛下被屠戮是所甘心但敗軍喪師九泉所恨及賊退高祖遣使迎其柩諡曰剛又曰恒州節度使李寳臣使人謂朱滔曰吾聞朱公貌神安得而識之願因繢事以觀可乎滔乃圖其形以示之錦衣金鈎甚偉寳臣懸於射堂命諸將熟視之曰朱公信神人也他日滔射獵寳臣宻選精卒刼之戒其將曰取彼貌如射堂所懸者是時二軍方共事不虞而卒暴至滔駭然與戰於瓦橋適衣他服以不識免又曰蔡州賊將吴秀琳以文城柵兵三千降李愬愬從秀琳於新興柵遂以琳之衆攻吳房夏四月庚寅朔辛夘李愬奏師至嵖岈谷擒賊將栁世千李奏等二人李光顔敗元濟之衆三萬於偃城其將張伯良奔於蔡州殺其卒十二三獲馬千餘疋噐甲三萬其甲上悉畫作雷公符北斗星文又云速破城北軍急急如律令周史曰皇甫暉正陽敗入保滁州太祖皇帝麾兵渉水踰城入盡戮其黨生擒暉及其偽命都監姚鳯等送於行在世宗召見之暉曰臣力竭矣欲暫坐及坐又曰臣欲暫卧不俟命而卧神色自若世宗亦復容之乃言曰臣非不盡忠於本國實以甲兵勇怯不敵臣早事晋朝屢將兵與契丹相持未如天朝此日甲馬之盛昨者退守滁州不謂天兵便能踰城攻取如履平地臣力所不加故就擒耳因盛稱太祖之武勇世宗命釋之賜衣服帶鞍馬後數日暉以金瘡尋卒於洛陽暉本驍將唐莊宗之基業因暉而敗焉故暉著名於天下虜掠左傳曰鄭祭足帥師取温之麥秋又取成周之禾後漢書曰馮異謂苗萌曰今諸將皆壯士崛起多暴横獨有劉將軍所到不虜掠其言語舉止非庸人也可以歸身苗萌曰死生同命敬從於計又曰郅惲至廬江因遇積弩將軍傅俊東徇揚州俊素聞惲名乃禮請上之上為將兵長史授以軍政惲乃誓衆曰無掩人不備窮人於厄不得斷人肢體裸人形骸淫於婦女俊軍士猶發塜陳尸掠奪百姓惲諫俊曰昔文王不忍露白骨武王不以天下易一人之命吕氏春秋曰武王伐紂至鮪水紂使膠鬲候周問武王曰何日至武王曰將以甲子日至膠鬲行天大雨日夜不休武王疾行不輟吏諫之武王曰吾之疾行以救膠鬲之死也故能獲天地之應克商如林之旅天地之應謂夜雨上畢陳白魚入舟之類克勝也商殷號也旅衆也如林言衆多尚書曰武王伐紂紂率其旅若林㑹于牧野將軍如何不師法文王而犯逆天地之禁多傷人害物虐及枯骨取罪神明今不謝天改政無以全命願將軍親率士卒収傷葬死哭所殘暴以明非將軍本意也從之百姓恱服所向皆下晉書曰宫人孟玖弟超並為成都王頴所嬖寵超領萬人為小都督未戰縱兵大掠陸機戮其主者超將鐵騎百餘人直入機麾下奪之顧謂機曰貉奴能作督不機司馬孫極勸機殺之機不能用超宣言於衆曰陸機將反又曰惠帝末妖賊劉栢根起於東萊王彌率家僮從之栢根死亡入長廣山為群盗彌多權略凡有所掠必預圖成敗舉無遺䇿弓馬迅㨗膂力過人時號為飛將軍十六國春秋曰南凉禿髪傉檀伐北凉沮渠䝉遜於姑臧至畨禾苕苕徒聊切音􅜰徒弔切掠五千餘户其將窟古進曰陛下轉戰千里前無完陣徙户資財盈溢衢路宜倍道逰師早度峻險蒙遜善於用兵士衆習戰若輕軍卒至出吾不慮大敵外逼徙户内攻危道也衞尉伊力延曰我軍勢方盛將士勇氣自倍彼徒我騎勢不相及若倍道逰師必捐棄資財示人以弱非計也俄而昏霧風雨䝉遜軍大至傉檀大敗而還三國典畧曰齊主以契丹犯塞親征至於平州取其西道直指長漸司徒潘祖樂率精騎五千自東道趣青山向白狼城安徳王韓軌精騎四千斷其走路追奔至于遼水齊主露髪袒身晝夜不息行千餘里唯食肉飲水瘴氣彌厲親踰山嶺為士卒先指揮奮擊大破之虜獲十萬餘口後魏書曰濟陰王新城頗有武畧庫莫奚侵擾詔新城率衆討之新城乃多為毒酒賊漸逼使棄營而去賊至喜而競飲聊無所備遂簡輕騎因醉縱撃俘馘甚多又曰天水梁㑹守東城謀欲逃遁先是封勅文掘重塹於東城之外斷賊走路夜中㑹乃陳飛梯騰塹而走勅文先嚴兵於塹外拒鬬從夜至旦勅文謀於衆曰困獸猶門而况於人賊衆以無生路人自致死必傷士衆未易可干若開其生路賊必上下離心克之易矣衆咸以為然勑文以白虎幡宣告賊衆曰若能歸降原其生命應時降者六百餘人㑹知人心沮壊於是分遁勑文縱騎騰躡死者大半俘獲四千五百餘口後周書曰賀㧞岳副爾朱天光討万俟醜奴時醜奴自率大衆圍岐州遣行臺尉遲菩薩等向武功南渡渭水天光率騎赴之岳身先率擊之退走岳號令部賊下馬者衆皆不聽殺賊顧見之便悉投馬俄而虜獲三千餘人人馬無遺遂擒菩薩降卒萬餘並収其輜重醜奴棄岐州走安定平亭隋書曰南寧夷爨翫來降拜昆州刺史既而復叛遂以史萬嵗為行軍總管率衆擊之入自蜻蛉音靈川經弄㨂次小勃弄大勃弄至于南中賊前後屯據要害萬嵗皆擊破之行數百里見諸葛亮紀功碑銘其背曰萬嵗之後勝我者過此萬嵗令左右倒其碑而進渡西二河入渠濫川行千餘里破其三十餘部虜獲男女二萬餘口諸夷大懼遣使請降獻明珠徑寸於是勒美隋徳萬嵗遣使馳奏請將翫入朝詔許之又曰達奚長孺與烏丸軌圍陳將吳明徹於吕梁陳遣驍將劉景率勁勇士千人為聲援軌令長孺逆拒之長孺於是取車輪數百繋以大石沉之清水連轂相次以待景軍至船艦礙輪不得進長孺乃縱竒兵水陸俱發大敗之俘數千人又曰周法尚初仕陳背陳歸周陳將樊猛濟江討之法尚遣部曲督韓郎詐為背已奔于陳偽告猛曰法尚部兵不願降人皆竊議盡欲叛還若得軍來必無鬬者自當於陣倒戈耳猛以為然引師急進法尚乃佯為畏懼自保扵江曲猛陳兵挑戰法尚先伏輕舸于浦中又伏精鋭於古村之北自張旗幟迎流拒之戰數合偽退登岸投古村猛舍舟逐之法尚又疾走行數十里與村北軍合復前擊猛猛退走船既而浦中伏舸取其舟楫建周旗幟猛於是大敗僅以身免虜八千人太平御覧卷三百二十六
