body:
  text: 太平御覽卷十三宋李昉等撰天部十三雷霹靂電雷釋名曰雷者如轉物有所硠音郎雷之聲也說文曰霆雷餘聲鈴鈴所以挺出萬物易曰雷電皆至豐君子以折獄致刑又震爲雷又動萬物者莫疾乎雷又鼓之以雷霆又洊慈見反雷震君子以恐懼修省又震來虩虩許逆反又雷出地奮豫先王以作樂崇徳又雷電噬嗑先王以明罰勑法又雲雷屯君子以經綸又雷在地中復先王以至日閉關商旅不行后不省方又天地解而雷雨作雷雨作而百果草木皆甲坼又震驚百里驚逺而懼邇也又雷以動之又雷雨之動滿盈又雷風不相悖又雷風相薄又澤中有雷隨君子以嚮晦入宴息書曰納于大麓烈風雷雨弗迷詩曰殷其雷在南山之陽又曰虺虺其雷禮曰仲春日夜分雷乃發聲先雷三日奮鐸以令兆民曰雷將發聲有不戒其容止者生子不備必有凶灾主戒婦人有娠者容止猶動静又曰君子若有疾風迅雷甚雨則必變雖夜必興衣服冠而坐謂敬天之怒又曰秋分之日雷始收聲傳曰藏氷以時則雷出不震棄氷不用則雷不發而震穀梁傳曰隂陽相薄感而爲雷激而爲霆爾雅曰疾雷爲霆郭璞注曰疾雷謂雷之急激者論語曰迅雷風烈必變京房易傳曰當雷不雷陽徳弱也又曰五星占雷電殺人何雷天拒難折衝之臣也君承用節度即雷以節暴人威福則雷電殺人易妖占曰天冬雷地必震教令撓則冬雷民饑書洪範曰雷於天地爲長子以其首長萬物與其出入也雷出地百八十三日而復入入則萬物亦入入地百八十三日而復出出則萬物亦出此其常經也又曰秦二世元年天無雲而雷雷陽也雲隂也有雲然後有雷象君臣也故雲雷相託隂陽相合也今二世不恤人人臣叛之故無雲而雷也又曰凡大風雷雨爲不敬也又曰春後十日雷乃發聲又曰正月雷微動而雉雊又曰夫雷人君相也入能除害出能興利尚書中候曰秦穆公出狩天震大雷下有火化爲白雀銜丹書集公車大戴禮夏小正曰雷震雉鳴雊鼔其翼也正月必雷不必聞唯雉必聞之春秋元命苞曰隂陽合爲雷春秋合誠圖曰軒轅星主雷雨之神論語䜟曰雷震百里聲相附宋均注云雷動百里故因以制國也雷聲謂諸侯之政教所至相附也史記曰髙祖母劉媪常息大澤之陂夢與神遇是時雷電晦㝠太公往視見蛟龍於其上已而有娠遂産髙祖漢書曰迅雷妖風怪雲變氣此皆隂陽之精夲在地而上發于天續漢書曰桓帝建和三年六月己邜雷震憲陵寢室是時梁太后聽兄冀誅李固杜喬晉書曰晉人王裒母生時畏雷至母終後天雷輒繞墓曰裒在此裒在此齊書曰永明八年六月十日晡時雷有黄光照地狀如金色占曰人君有德或謂之榮光周裴汝南先賢傳曰蔡順母平生畏雷自亡後每有雷震順輒環塚泣曰順在此韓詩外傳曰東海之上有勇士曰菑丘訢音忻以勇游于天下過神淵飲馬馬沈訢去朝服㧞劒而入三日三夜殺二蛟一龍而出雷神擊之十日十夜眇其左目王歆孝子傳曰竺彌字道綸父生時畏雷每至天隂輒馳至墓伏墳哭有白兎在其左右搜神記曰義興人姓周永和中出都日暮路傍小屋中有女子留宿一更後有喚阿香者女應諾喚者曰官喚女推雷車女遂辭周云有官事須去俄而大雷既明周自異其處返尋惟見一新塚塜上有馬跡東方朔神異經曰八方之荒有石鼔其徑千里撞之其音即雷也天以此爲喜怒之威盛宏之荆州記曰朝陽縣樊重母畏雷重爲母立石室以避之悉以文石爲階砌至今猶存孟奥北征記曰凌雲臺南角一百歩有白石室名曰避雷室又曰臨賀有石方十二丈有磨刀斧跡春夏常明凈其迹甚新秋冬則苔穢故爲雷公磨石莊子曰隂陽交爭爲雷文子曰夫耳調金石之音而不聞雷霆之聲目察秋毫之末而不見太山之形小有所戀大有所忘曾子曰隂陽之氣俱則爲雷淮南子曰隂陽相薄感而爲雷又䕃不祥之木爲雷霆所撲又庶女呌天雷電下擊景公臺殞支體傷折海水大出庶賤之女齊之少寡婦人也無子不嫁事姑謹敬姑無男有女女利母財令母嫁婦婦終不肯女殺母以誣寡婦婦不能自明寃結呌天天爲作雷電下擊景公之臺殞壊之也傷毀景公支體水爲之溢又雷霆之聲可以鐘鼓寫也風雨之變可以音律和也抱朴子曰雷天之鼓也鶡冠子曰昔者有道之君取政非取于耳目也夫耳之生聽目之生明兩葉蔽目不見太山兩豆塞耳不聞雷霆孫子曰掣電無停光疾雷無餘聲河圖帝通紀曰雷天地之鼓河圖曰玉虎晨鳴雷聲也又黄帝以雷精起六韜曰武王伐紂雨甚雷疾武王之乗雷震而死周公曰天不祐周矣太公曰君秉徳而受之不可如何也伏侯古今注曰成帝建始四年無雲而風天雷如擊連鼓音可四五刻隆如車聲山海經曰羭音榆次之山有鳬名橐􅖦服之不畏電􅖦音肥匪備三音又飛魚如豚赤文無羽食之辟兵不畏雷師曠占曰春雨初起其音恪恪霹靂者所謂雄雷旱氣也其鳴依依音不大霹靂者謂之雌雷水氣也又春分有音如雷非雷音在地中其所住者兵起其上無雲而雷名曰天狗行不出三年其國亡又初雷從金門起上田旱下田熟一曰歲終兵革起風俗通曰雷不蓋醬俗說令人腹中雷鳴世說曰曹爽將誅夢二虎御雷公若二升椀放著中庭華陽國志曰曹公從容謂先主曰天下英雄唯使君與操耳夲初之徒不足數也先主方食尖匕箸㑹雷大震先主曰聖人言迅雷風烈必變良有以也一震之威乃可致此曹公亦悔失言酈炎對事曰或曰雷震驚百里何以知之炎曰以其數知之夫陽動爲九其數三十六隂靜爲八其數三十二一陽動二隂故曰百里雷雜兵書曰雷電霹靂破軍中樹木屋舎者徙去吉也雷電風所從來不可逆而伐宜慎之也物理論曰積風成雷王充論衡曰子路感雷精而生尚剛好勇親渉衛難結纓而死孔子聞而覆醢每聞雷鳴則中心惻怛亦復如之故後人忌焉以爲常也又盛夏之時雷電疾擊殺人謂之有隂過飲食不潔則天怒殺之隆隆之聲天怒之音也此虛言也道士劉春楚王英使食不㓗春死必遇雷也建武四年六月夏雷擊㑹稽鄞魚巾反縣羊五頭羊有何隂過而雷擊之乎俗以爲天取龍殺人罰隂過與取吉凶不同非實道也又圖畵之工圖雷之狀纍纍如連鼓形於其旁别畫一人狀貎若力士之容謂之雷公使之左手引連鼔右手推之世人信之莫不謂然始復原之虛妄之象也霹靂釋名曰霹靂折也震戰也所擊輒破若攻戰也說文曰震霹靂折物也穀梁傳曰疾雷為霆霓為急雷為霹靂爾雅曰疾雷為霆霓郭璞曰雷之急激者為霹靂春秋繁露曰王言下不從則金不從革而秋多霹靂霹靂者金氣其音商故應霹靂五經通義曰震與霆皆霹靂也晉安帝紀曰義熙二年六月震太廟鴞尾徹壁柱若有文字晉朝雜事曰元康七年霹靂破城南髙禖神石中宫求子祠也賈后將誅之應曹嘉之晉紀曰諸葛誕以氣量稱常倚柱讀書霹靂震其柱誕自若列女後傳曰河南李叔卿為功曹應舉孝亷同時應人害之使婢宣言叔卿淫其寡妹同舉人詣尹以骨肉相奸不合應孝亷叔卿杜門自絶女妹傷被淫之名遂到府門自殺叔卿亦自殺明已無􅄽也後三年霹靂害叔卿者以其死屍置叔卿冢前其家收而葬之秋又震發其塚𤣥中記曰玉門之西有一國國中有山山上有人歲歲出石􅀈字林反數千輸廟中名曰霹靂碪給霹靂用從春雷出碪日減至秋而盡搜神記曰扶風楊道和于田中霹靂擊之道和以鋤格折其左股遂落地不得去色如丹目如鏡角長三尺狀如六畜似獼猴續搜神記曰吳興人章荀者五月中于田耕以飯蘿置菰裏晩于菰中伺之見一大蛇偷其食食荀即以鉟少悲切斫之蛇便走去荀乗船逐之至一坂有穴蛇便入穴但聞號哭云人斫傷某甲或云當如何或云付雷公令霹靂殺奴須㬰雲雨㝠合震電傷荀荀于是跳梁大罵云天公我貧窮展力耕墾蛇來偷食我飯罪在蛇反來霹靂我是無知雷公若來當以鉟斫汝腹破須㬰雲雨輒開乃更霹靂向穴中諸蛇死者數十莊子曰隂陽錯行天地大駭於是有雷有霆劉義慶世說曰夏侯𤣥字太初嘗倚柱讀書時暴雨霹靂破所倚柱衣服焦然𤣥神色無變讀書如故異苑曰狒狒虜凶虐暴忍常自言國名狒狒則是狒中之狒尋被震而死既葬而後就塚中霹靂其柩引身出題背四字表其凶逆而然也又滕放太元初夏枕文石枕卧忽暴雨雷震其枕枕四解傍人莫不怖懾而放微覺有聲不足為驚又元嘉十九年京口霹靂殺人亦自題背世說曰王丞相見郭景純君可試為作一卦卦成郭意惡云公有震厄王問可有消伏理否郭曰公能命駕西出數里得一栢樹截短如公長置寢處灾可消王悉依其言數日中果震栢樹碎門内子弟皆稱慶桓譚新論曰天下有鸛鳥羣國皆食之三輔俗獨不敢取之或取即雷霹靂起原夫天不獨左彼而右此殺鳥適與雷遇耳博物志曰九真有狸牛出谿上或鬬岸上家牛皆怖或遮捕即霹靂號曰神牛山海經曰半石之上有草名曰加榮服之不畏霆琴操曰楚膏梁子出遊九臯之澤覽漸水之臺張罛置罟于荆山臨曲池而漁疾風霣音殞雹雷電奄㝠天火四起霹靂下臻𤣥鶴翔其前白虎吟其後乃援琴而歌作霹靂引正論曰俚語云州縣符如霹靂得詔書但掛壁電釋名曰電殄也乍見則滅也說文曰電隂陽激燿也從雨甲聲易曰離為電又曰雷電皆至豐君子以折獄致刑詩曰􅂱􅂱震電傳曰隱九年三月癸酉大雨震電易稽覽圖曰隂陽和合為電輝輝也其光長春秋元命苞曰隂陽激為電史記天官書曰電者隂陽之動也帝王世紀曰黄帝有熊氏母曰附寳有蟜音喬氏之女也見大電光繞北斗樞星照郊野感附寳而孕漢書李尋傳曰尋說王根曰竊見徃者盛冬電潛龍為孽晉書曰王戎㓜而穎悟神彩秀徹視日不眩裴楷目之曰戎眼爛如巖下電神異經曰東王公與玉女投壺梟而脫悞不接者天為之笑開口流光今電是也漢武内傳曰西王母曰東方朔為太山仙官太仙使至方丈坐三天司命朔但務山水遊戲擅弄雷電激波揚風風雨失時西京雜記曰董仲舒曰太平之世電不眴許絹反目宣示光輝而已莊子曰隂氣伏于黄泉陽氣上通于天隂陽分爭故為電文子曰腎為電主鼻曾子曰隂陽交則電抱朴子曰良將去如收電可見不可追立如丘山可瞻不可動淮南子曰電以為鞭策電擊氣也物理論曰風清熱之氣散為電揚雄河東賦曰奮雷鞭驂雷輜鳴洪鐘建五旗楚辭曰凌驚雷軼駭電張衡思𤣥賦曰凌驚雷之砊苦浪反礚苦大切兮弄狂電之淫裔傅𤣥詩曰童女掣電夏侯孝若電賦曰攢雲間而飛火綘烟起於雲中曹毗霖雨詩曰紫電光牖飛迅雷中天奔顧愷之電賦曰天怒行令雲赤光發李顒詩曰黮徒感反䨴重雲隂碎稜震電􅹴徒家反太平御覽卷十三
