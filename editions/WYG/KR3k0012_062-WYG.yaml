  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_062-1a, image: WYG0893/WYG0893-0509c.png}
body:
  text: 太平御覽卷六十二宋李昉等撰地部二十七涇渭㶚滻豐鎬澇潏伊洛瀍澗穀漢沔涇書禹貢曰涇屬渭汭屬連屬也北海曰汭言治水注入渭詩曰涇以渭濁湜湜其沚傳曰諸侯之大夫從晉侯伐秦以報櫟之役濟涇而次秦人毒涇上流師人多死國語曰恭王遊于涇上密康公從有三女奔之其母曰必致之于王夫獸三為羣人三為衆女三為粲粲美之物汝何徳以堪之康公弗許一年恭王滅密史記曰韓聞秦之好興事乃使水工鄭國間説秦令鑿涇水自中山西抵匏口為渠以溉田又秦二世夢白虎嚙左驂殺之卜涇為祟二世乃齋望夷宫而欲祀之漢書曰涇書不在大川之祀以近咸陽得比大川之祀又太始二年趙中大夫白公鄭徳曰白姓公爵時人多謂為相公復奏穿渠因名白渠民得其饒歌之曰田於何所櫟陽谷口鄭國在前白公起後舉鍤為雲決渠為雨涇水一石其泥數斗且溉且糞如淳曰水停於河以當糞長我禾黍衣食京師億萬之口益部耆舊傳曰漢武祀甘泉至涇橋有女子浴于涇水乳長七尺怪遣問之女曰帝後第七車知我時侍中張寛在第七車對曰天星主祭祀齋戒不潔則女人星見水經注曰涇水導源安朝那縣西开頭山秦始皇巡地西出开頭山即是山也葢大隴之異石渭詩曰我送舅氏曰至渭陽史記曰秦武王三年渭水赤三日昭王十四年又赤三日洪範五行傳曰赤者火色葢亦以火沴水也渭水秦大川也隂陽亂秦用嚴刑敗亂之象史記曰西伯獵遇太公渭之陽與語大悦漢書曰武帝元光六年春穿漕渠通渭山海經曰渭水出鳥䑕同穴山東注河入華隂北鳥䑕同穴山今在隴西首陽縣渭水出其東經南安天水畧陽扶風始平京兆至𢎞農華隂縣入河也三輔黄圗曰始皇兼天下都咸陽渭水貫都以象天河水經注曰渭水中舊有忖留神像此神甞與魯班語班令其人出忖留曰我貌醜卿善圖物容我不能出班於是拱手與言曰出頭見我忖留乃出首班於是以脚畫地忖留覺之便還没水故置其像于水中唯背以上立水上三輔決録項仲山飲馬渭水日與三錢以償之列子曰夸父逐日渇飲渭水不足乃渇死淮南子曰渭水多力宜黍霸水經注曰霸者水上地名也水東合滻水過白鹿原至秦虎圏北入渭漢書地理志曰霸水出藍田谷古曰滋水秦穆公更名霸水以彰霸功漢書曰漢王元年十月至霸上秦王子嬰降滻水經注曰滻水出京兆藍田谷北入于霸地理志曰滻水出南陵縣之藍田谷西北流與一水合水出西南莽谷東北流注滻水又北厯藍田川北流注于霸水又云北至霸陵入霸水也西京記曰西京東市平凖署東隅有放生池分滻水渠自道政坊東城西流注之俗號海池又曰滻水西岸阪舊名滻阪隋文帝惡阪之名改名長樂阪豐漢書地理志曰漆沮既從豐水攸同顔師古注曰豐水出鄠之南山言沮水既從入渭豐水亦同來也水經注曰渭水與豐水㑹短隂山無他高山異巒唯東原阜石墩而已水上舊有便門橋毛詩文王有聲曰豐水有芑武王豈不仕貽厥孫謀以燕翼子文子曰老子云豐水之深十仞而不受塵垢金鐵在中形見于外鎬水經注曰鎬水上承鎬池於昆明池北周武王之所都也故詩云考卜維王宅是鎬京維龜正之武王成之鎬水又北流與滮池合又北經清泠臺西逕慈石門注于渭鄭𤣥曰豐鎬之間水北流也澇説文曰澇水出扶風鄠北入渭山海經曰牛首之山澇水出焉下注于潏水多飛魚潏字林曰潏水出杜陵縣水經注曰潏水上承皇子陂水逕漸臺東入渭亦名沈水又名高都水漢王氏五侯大治池宅引高都水入長安城故百姓歌之曰五侯初起曲陽最怒決壊高都逕連五杜土山漸臺象西白虎是也伊水經曰伊水出南陽魯陽縣西蔓渠山左僖二十二年初平王東遷也卒有適伊川杜預注曰辛有周大夫也見被髪而祭于野者曰不及百年此其戎乎山海經曰獨蘇之山伊水出焉東流注于洛今伊水出上洛盧氏縣熊耳山東北至河南洛陽縣入洛戴延之西征記曰伊水上源經新城陸渾二縣男女無少長皆病癭俗云水土所致伊水不可飲也吕氏春秋曰有莘氏女子採桑得嬰兒桑中其母居伊水上故命之曰伊尹伊尹母化為空桑洛水經注曰洛水出京兆上洛縣䕶舉山地理志曰洛水出冡嶺山易繫辭曰洛出書聖人則之易乾鑿度曰王者盛徳之應洛水先温九日乃寒五日變為五色又帝王將起河洛龍見察其首黒者人正白者地正赤者天正禹貢曰導洛自熊耳在宜陽之西東北會于澗瀍會于河南城南又東會于伊㑹于洛陽之南又東北入于河合于鞏之東也尚書中候曰武王祀璧于河禮畢退至日旰榮光幕河青雲浮洛毛詩曰瞻彼洛矣維水泱泱春秋説題辭曰洛出熊耳山雒之為言繹其燿也宋均注曰水光輝也國語曰靈王二十二年穀洛鬬將毁王宫王欲壅之太子晉曰夫山土之聚也藪物之歸也川氣之導也澤水之鍾也夫水聚于髙歸于下今吾執政無乃實有所僻而滑夫三川之神王卒壅之王室大亂又曰伊洛竭而夏亡三河竭而商亡漢書曰武帝穿渠引洛水岸遂崩乃鑿井深四十餘丈往往為井相通行水謝承後漢書曰沛國陳宣建武十年雒水出造津城門或欲築塞之宣諫曰昔王尊正身金堤水退况聖主耶言未絶而水去水經注曰昔黄帝之時天大霧三日帝遊洛水之間見大魚殺五牲以醮之天乃甚雨七日七夜魚流始得圖書魏畧曰漢火行忌水故洛去水而加佳焉山海經云秦中之山洛水出焉東注于河其中有藻玉述征記曰洛水㡳有礜石故上無氷瀍水經曰瀍水出河南穀城縣北東與千金渠合又東過偃師入于洛澗水經曰澗水出新安縣南白石山東南入于洛三輔決録注云馬氏兄弟五人共居澗穀二水之交作五門客舍因舍以為名今在河南西四十里以山海經推校里數不殊仲治所記水會尚有故居之處所則澗水也即周書所謂我乃卜澗水東是也穀水經曰穀水出𢎞農澠池縣南嶓冢林穀陽谷也山海經曰博山之西有林焉曰嶓冢穀水出焉東流注于洛其中多㻒玉今穀水出于崤東馬頭山谷陽谷東北流厯澠池川韋昭語注曰洛水在南榖水在王城北東入于瀍水靈王時穀水盛出于王城西而南流合于洛兩水相格有似于鬬而投王城西南也漢沔禹貢曰江漢朝宗于海詩序漢廣徳廣所及也文王之化被乎南國美化行乎江漢之域又曰滔滔江漢南國之紀又曰南有喬木不可休息漢有游女不可求思左傳曰蔡昭侯為兩珮與兩裘以如楚獻一珮一裘于昭王子常欲之不與三年止之蔡侯歸及漢執玉而呪曰余所濟漢而南者有若大川又曰楚國方城以為城漢水以為池又曰呉師伐郢楚子常濟漢而陣自小别至于大别蜀志少府王謀等上言前襄陽男子張嘉王休獻玉璽璽潜漢水於深淵暉景燭曜璽光徹天孫巗宋書曰漢中成固縣漢水岸際有異聲如雷俄頃岸崩有銅鐘十二出自潜壤體制既精扣之清響韓詩曰鄭交甫過漢臯二女妖服珮兩珠交甫與之遇言曰願請子之珮二女解珮與交甫而懐之去十數歩探之則亡矣迴顧二女亦即亡矣水經注及山海經注云漢水出隴坻道縣嶓冡山初名漾水東流至武都沮縣始為漢水東南至葭萌與羗水合至江夏安陸縣名沔水故有漢沔水之名周昭王溺于此處又東至竟陵合滄浪之水即屈原遇漁父處又東過三澨水觸大别山南而入江也庾仲容漢水記曰漢水出廣漢漾水出隴西東流至武都而與漢水合沔水出武都沮縣與漢水相合東為滄浪之水過三澨至于大别南入于江東匯澤為彭蠡東為北江入于海是也匯迴也音胡洧反言漢水合大江迴流入彭蠡東北至南滁州名為北江而入海又曰沔水東經萬山北山下有潭中有杜元凱碑元凱好尚後名作兩碑並述已功一碑立峴山一碑沈此潭中曰千載之後何知不深谷為陵也又曰漢東經西城縣故城為鱣湍洪波漭盪漰浪雲頽古者舊言有魚奮鬐望濤直上至此曝腮因以名鱣湍焉又曰漢水經西城縣南又東城為龍泉泉上有胡鼻山石類胡人鼻故也下臨龍井渚泉深數丈盛𢎞之荆州記曰沔水隈潭極深先有蛟為害鄧遐為襄陽太守拔劒入水蛟繞其足遐自揮劍截蛟數段流血丹水勇冠當時于後遂除蛟患又曰荆藴玉以潤其區漢含珠而清其域梁州記曰漢水發源隴西氐道縣之嶓冡山東至夏口合江綿帶四州之域經塗五千餘里謂之沔水水經曰沔水出武都沮浪谷中注曰一名沮水以其初出沮洳然也淮南子曰漢水重安而宜竹箭太平御覽卷六十二
