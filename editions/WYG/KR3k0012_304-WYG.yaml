body:
  text: 太平御覽卷三百四宋李昉等撰兵部三十五征伐征伐中史記曰秦繆公令内史廖以女樂二人遺戎王又數使人間要由余遂去降秦繆公以客禮之問伐戎之利又曰趙四戰之國其人習兵不可伐也又曰魯君問栁下惠伐齊下惠歸而有憂色曰吾聞伐國不問仁人此言何至於我哉又曰軒轅之時神農氏世衰諸侯相侵伐暴虐百姓而神農氏弗能正於是軒轅乃集用干戈以征不享諸侯咸來賔從而蚩尤最為暴莫能伐又曰賜弓矢斧鉞使得征伐為西伯又曰西伯既卒武王東伐至孟津諸侯叛殷㑹周者八百諸侯皆曰紂可伐又曰武王為文王木主載車中武王自稱太子發言奉文王以伐不敢自專又曰武王徧告諸侯曰殷有重罪不可以不畢罸漢書郊祀志曰昔齊桓公欲封禪謂仲曰寡人北伐山戎過孤竹西伐大夏渉流沙束馬縣車上卑耳之山南伐召陵登熊耳山以望江漢兵車之㑹三而乘車之㑹六遂九合諸侯一匡天下昔三代受命亦何以異乎又李廣利傳曰天子為萬里而伐不録其過又匈奴傳曰東胡强聞冒頓殺父自立乃使使謂冒頓欲得單于閼氏冒頓問左右左右皆怒曰東胡無道乃求閼氏請擊之冒頓曰奈何與人隣愛一女子乎遂取所愛閼氏與東胡東胡愈驕冒頓遂東襲擊東胡東胡初輕冒頓不為備及冒頓以兵至大破滅東胡主後漢書曰帝以關中未定而鄧禹乆不進兵下勅曰司徒堯也亡賊桀也長安吏人遑遑無所依歸宜以時進討鎮慰西京百姓之心禹猶執前意乃分遣將軍别攻上郡諸縣更徴兵引穀歸至大要大要地名魏志曰太祖父嵩去官後還譙以董卓之亂避難瑯邪為陶謙所害故太祖志在復讐東伐又曰景元四年鄧艾伐蜀自隂平行無人之地七百餘里鑿山通道作橋閣山髙谷深至有艱險艾以氊自裹推轉而下将士皆攀木縁岸魚貫而進王隱晉書曰太康元年龍驤將軍王濬等攻建平丹陽城尅之東擊西陵以下盡㧞其城虜其將帥於是上下諸軍同時並進吳人降者以萬計吳丞相張悌及䕶軍孫震與揚州刺史周渡等戰於板橋破之臨陳斬悌震首濬遂汎舟東下所厯皆平軍至秣陵皓面縛輿襯將其太子詣濬降乃收其圖籍皆因吳所置除其虐政示以簡易百姓大悦乃赦天下改元太康賜天下大酺五日晉書曰宣王破張魯請魏武使討西蜀魏武曰人苦無足既得隴右復欲得蜀又曰王羲之與㑹稽王牋陳殷浩不宜北伐并論時事又宣帝紀曰鎮東大將軍諸葛誕殺揚州刺史樂綝以淮南作亂議者速請伐之帝曰吾當與四方同力全勝制之乃表曰昔黥布叛逆漢祖親征隗囂違戾光武西伐皆所以奮揚赫赫震曜威武也又天文志曰參十星一曰參伐主斬刈又為天獄主殺伐又馬紞傳曰初謀伐吳紞與賈充荀朂同共苦諌不可吳平紞内懐慙懼又載記曰慕容垂議征長子諸將咸諫以慕容永未有釁連嵗征役士卒疲怠請俟他年垂將從之及聞慕容徳之䇿笑曰吾計决矣不復留賊以累子孫也乃發歩騎七萬遣其丹陽王慕容瓚龍驤張崇攻永弟支于晉陽北史曰慕容紹宗討侯景於渦陽時景軍甚盛初聞韓軌徃討之曰噉猪腸小兒聞髙岳徃曰此兵精人凡爾諸將被輕及聞紹宗至扣鞌曰誰教鮮卑小兒解遣紹宗來若然髙王未死耶及與景戰諸將頻戰敗無肯先者紹宗麾兵徑進諸將從之因大㨗三國典略曰周伐梁于謹大軍次于樊鄧岳陽王率軍㑹之傳檄于梁曰告梁文武衆官夫作國者罔弗以禮信為本惟爾今主徃遭侯景逆亂之始實結我國家以聲援今乃背徳黨賊髙洋引厥使人置之堂宇傲我王命擾我還人我皇帝襲天之意弗敢以寧分命衆軍奉揚廟畧凡衆十萬直指江陵丁卯梁主停講内外戒嚴是朝昏霧巳時方歇梁主親戎百官并甲胄從於禊飲堂是日大風㧞木玊琛既至石梵未見我軍乃馳書報黄羅漢曰吾至梵境境恬然前日所言皆兒戲耳羅漢入啟梁王疑之庚午續講百官以戎服聽後周書曰建徳五年冬十月帝謂羣臣曰朕去嵗屬有疾遂不得克平逋㓂前入賊境備見敵情觀彼行師殆同兒戲又聞其朝政昏亂政由羣小百姓嗷然朝不謀夕天與不取恐貽後悔若復同徃年岀軍河外直為撫背未扼其喉然晉州本髙歡所起之地鎮攝要重今徃攻之彼必求援吾嚴軍以待擊之必克然後乘破竹之勢鼔行而東足以窮其窟穴混同文軌諸將多不願行帝曰機者事之㣲不可失矣若有阻吾軍者朕當以軍法裁之己酉帝總戎東伐以越王盛為右一軍總管把國公亮為右二軍總管隋國公楊堅為右三軍總管譙王儉為左一軍總管大將軍竇㤗為左二軍總管廣化公丘崇為左三軍總管齊王憲陳王純為前軍又曰保定中命宇文䕶統衆伐齊於是徴二十四軍及左右廂驍騎及秦隴巴蜀之兵諸蕃國之衆二十萬人十月帝於廟廷授䕶斧鉞至潼關乃遣柱國尉遲逈率精兵十萬為前鋒大將軍權景宣攻克豫州尋以洛陽圍觧亦引軍退楊􅎎於軹關戰䕶於是班師以誨功與諸將稽首請罪帝弗之責也又曰建徳四年秋七月武帝召大將已上於大徳殿帝曰太祖神武膺運創造王基兵威所臨有征無戰唯彼偽齊猶懐䟦扈雖復戎車屢駕而大勲未集朕以寡昧纂承鴻緒徃以政岀權宰無所措懐自親覽萬幾便圖東討惡衣菲食繕甲治兵數年以來戰備稍足而偽主昏虐恣行無道伐暴除亂斯實其時今欲數道岀兵水陸兼進北拒大行之路東扼黎陽之險若攻㧞河隂兖豫則馳檄可定然後養鋭享士以待其至但得一戰則破之必矣王公以為何如羣臣咸稱善丁丑詔曰髙氏因時放命據有汾漳擅假名噐厯年永乆朕以亭毒為心遵養時晦遂敦聘好務息黎元而彼懐惡不悛尋事侵軼背言負信竊邑藏姦徃者軍下宜陽釁由彼始兵興汾曲事非我先此獲俘囚禮送相繼彼所拘執曾無一反加以淫刑妄逞毒賦繁興齊魯軫殄悴之哀幽并企求蘇之望既禍盈惡稔衆叛親離不有一戎何以大定今者白藏在辰凉風戒節厲兵詰暴時事惟宜朕當親御六師躬行天罰憑祖宗之靈資將士之力風馳九有電掃八紘可分命衆軍指期進發以柱國陳王純為前一軍總管滎陽公司馬消難為前二軍總管鄭國公逹奚震為前三軍總管越王盛為後一軍總管周昌公侯莫陳瓊為後二軍總管趙王招為後三軍總管齊王憲率衆二萬趣黎陽隋國公楊堅廣寧侯薛迴舟師五萬自渭入河柱國梁公侯莫陳芮率衆一萬守太行道申國公李穆率衆三萬守河陽道常山公于翼帥衆二萬岀陳汝壬午上親率大軍衆六萬直指河隂八月癸邜入于齊境禁伐樹踐苗稼犯者以軍法從事隋書曰崔仲方為虢州刺史上書論取陳之䇿曰臣謹按晉太康元年嵗在庚子晉武平吳至今開皇六年嵗次丙午合三百七載春秋寳乾圖云王者三百年一蠲法令三百之期可謂滿矣陳氏草竊起於庚子至今丙午子午為衝隂陽之忌昔史趙有言曰陳顓頊之族為水故嵗鶉火以滅又云周武王克商封胡公滿於陳至魯昭九年陳災禆竈曰嵗五及鶉火而後陳亡楚克之楚祝融之後也為火正故復滅陳陳承舜後舜承顓頊雖太嵗左行嵗星右轉鶉火之嵗陳族再亡戊午之年媯虞運盡語迹雖殊考事無别皇朝五運相承感火徳而王國號為隋與楚同分楚是火正午為鶉火未為鶉首申為實沉酉為大梁既當周秦晉趙之分若當此分發兵將必得嵗之助以今量古陳滅不疑臣謂午未申酉並是數極蓋聞天時不如地利地利不如人和况主聖臣良兵强國富動植迴心人神計契陳既主昏於上民讟於下險無百二之固衆非九國之師夏癸殷辛尚不能立獨此島夷而稽天討伏度朝廷自有宏謀但芻蕘所見冀申螢爝今惟須武昌已下蘄和滁方吳海等州更帖精兵宻營渡計益信襄荆基郢等州速造舟楫多張形勢為水戰之具蜀漢二江是其上流水路衝要必爭之所賊雖於流頭荆門延州公安巴陵隱磯夏首蘄口盆城置船然終聚漢口峽口以水戰大决若賊必以上流有軍令精兵赴援者下流諸將即須擇便横渡如擁衆自衛上江水軍鼓行以前雖恃九江五湖之險非徳無以為固徒有三吳百越之兵無恩不能自立上覽而大悦轉基州刺史徴入朝仲方因面陳經畧上善之賜以御􅂁袴并雜綵五百段進位開府而遣之及大舉伐陳以仲方為行軍總管率兵與秦王㑹又曰開皇九年大舉伐陳以賀若弼為行軍總管將渡江酹酒而祝曰弼親承廟畧逺振國威伐罪弔民除兇剪暴上天長江鍳其若此如使福善禍淫大軍利渉如事有乖違得葬江魚腹中且不恨又曰李徳林自隋有天下每贊平陳之計八年車駕幸同州徳林以疾不從勅書追之書後御筆注云伐陳意宜自隨也時髙熲因使入京上語熲曰徳林若患未堪行宜自至宅取其方畧髙祖以之付晉王後從駕還在塗中髙祖以馬鞭南指云待平陳訖㑹以七寳裝嚴公使自山東無及之者唐書曰武徳初秦王東討王世充連年未下宿使於野髙祖以兵乆在外議欲班師中書令封徳彛奏曰世充得地雖多而羈縻相屬其所用命者唯洛陽一城而已計盡力窮破在旦夕今若還兵賊勢必振更相連結後必欲悔若乘其已衰破之必矣髙祖從其議及平世充髙祖顧謂侍臣曰朕初興兵東討衆議多有不同唯秦王議行徳彛贊成此計張華叶同晉武亦無以加之又曰髙崇文伐蜀領兵馬取鳯翔斜谷路李元奕領兵馬取駱谷路同赴梓州應接當秦惠王用司馬錯之䇿以伐蜀漢光武使吳漢伐公孫魏司馬文王使鄧艾伐蜀禪晉穆帝使桓温伐季子仁宋武帝使朱齡石伐譙縱梁武帝使鄧元起伐劉季近則太祖使尉遲逈平肅記隋文帝使梁睿平王謙憲宗命髙崇文平劉闢自秦至元和九度伐蜀四為水軍泝江而上唯蔡與鄧艾尉遲逈梁睿及崇文五在斜谷駱谷出師兩討不廷古司馬兵法曰王覇之所以治諸侯者以土利列諸侯列相也相諸侯優劣而封之以地徳廣受土廣徳小受土小也以政令平諸侯政者以道徳善政教訓諸侯平均之以禮信結諸侯謙恭愛惠接待諸侯官命誠信以治民心以材力説諸侯材能也力者任重理煩能堪勝事理位高力大故諸侯悦來各修其職任以謀人維諸侯維持也諸侯逺方不奉制命驕佚自恣立故牧伯維持督禦之同患同利以合諸侯盟約有功者賞之罪大者罰之所以合諸侯也比小事大以和諸侯比親比也使小國事大國不失尊卑之序以恊諸侯也㑹之所以發禁王者恐禁令不行以亂風化故㑹諸侯發九禁以申勅之凌弱犯寡則眚之侮弱侵寡則四面削其地賊賢害民則伐之暴内凌外則壇之言諸侯内與下無禮而暴虐之外與小人不恤其情則置之空墠無人之地野荒民散則削之負固不服則侵之賊殺其親則正之悼逆人倫則攻殺也放殺其君則殘之盡殘滅其國也犯令陵政則杜之侮王者法則杜塞不令與鄰國交通外内亂禽獸行則滅之諸侯淫亂夫人倫外内不别與禽獸同行不可以示百姓孫子曰夫伐大國則其兵衆不得聚威加於敵則其交不得合是故不爭天下之交不養天下之權伯王者不結威天下諸侯之交權交者也伸己之私絶天下之交奪天下之權以威徳伸己之私欲威加於敵故其城可㧞而其國可隳施無法之賞懸無政之令言軍法令不應預施懸也司馬法曰見敵作誓瞻作賞此之謂也犯三軍之衆若使一人犯者用也言明賞雖用衆若使一人也又曰我欲戰敵雖高疊深溝不得不與我戰者攻其所必救也絶糧道阻歸路攻其君主上兵伐謀敵始有設謀伐之易其次伐交下令合春秋説題辭曰伐者渉人國内行威有所斬壊伐之為言敗也白虎通曰王者受命質家先伐文家先改正朔何質家言天命已使己誅無道故先伐文家言天命已成為王者故先改正朔也文者先其文質者先其質也故論語曰予小子履敢昭告于皇天上帝此謂湯伐桀告天也詩曰命此文王言誅伐也禮記曰湯放桀武王誅紂時也尚書曰今予惟恭行天之罸此言啟自出伐有扈者也王制曰賜之弓矢乃得專征伐犯王征誅者也大夫將兵出不受命者欲盛其威使士卒一意繫心故但聞將軍令不聞天子命也明進退在大夫也又曰誅者何謂也誅猶責也誅其人責其罪極其過惡春秋曰楚子􅐚誘蔡侯班殺之于申傳曰誅君之子不立討者何謂也討猶除也欲言臣當掃除弑君之賊也春秋曰衛人殺州吁于濮𫝊曰其稱人何討賊之辭也伐者何謂伐擊也言欲伐擊之也尚書叙曰武王伐紂征者何謂也征猶正也欲言其正輕重從辭誕以爾東征誅禄甫也戰者何謂也尚書大傳曰戰者憚驚之也又曰諸侯之義非天子之命不得動衆起兵殺不義者所以强幹弱枝尊天子卑諸侯也論語曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出太平御覽卷三百四
