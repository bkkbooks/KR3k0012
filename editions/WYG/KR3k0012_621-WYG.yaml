front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_621-1a, image: WYG0898/WYG0898-0585c.png}
body:
  text: 太平御覽卷六百二十一宋李昉等撰治道部二臣韋昭釋名曰臣臣慎也慎於其事以奉上也孝經説曰臣者堅也守節明度脩義奉職也易曰王臣蹇蹇匪躬之故蹇卦書曰臣無有作福作威玉食臣之有作福作威玉食其害于而家㓙于而國又曰熊羆之士不二心之臣保乂王家用端命于上帝詩曰進厥虎臣闞如虓虎禮曰衛有大夫柳莊寢疾公曰若疾亟雖當祭必告也公再拜稽首請於尸曰有臣柳莊也者非寡人之臣是社稷之臣也聞之死請往不釋服而往遂以襚之又曰為人臣者殺其身有益於君則為之况于其身以善其君乎周公優為之于讀為迂迂廣也大也又曰仕於公曰臣仕於家曰僕又曰大臣法小臣亷官職相序君臣相正國之肥也又曰為人臣下者有諫而無訕有亡而無疾頌而無諂諫而無驕怠則張而相之相助也廢則掃而更之謂之社稷之役又曰子言之事君先資其言拜自獻其身以成其信是故君有責於其臣臣有死於其言故其受禄不誣受罪益寡子曰事君大言入則望大利小言入則望小利故君子不以小言受大禄不以大言受小禄子曰事君不下達不尚辭非其人弗事子曰事君逺而諫則諂也近而不諫則尸利也子曰邇臣守和宰正百官大臣慮四方子曰事君欲諫不欲陳詩云心乎愛矣遐不謂矣中心藏之何日忘之子曰事君難進而易退則位有序易進而難退則亂也子曰事君三違而不出境則利禄也雖曰不要君吾不信也子曰事君慎始而敬終子曰事君可貴可賤可富可貧可生可殺而不可使為亂亂謂違廢事君之禮又曰子曰大臣不親百姓不寜則忠敬不足而富貴已過也大臣不治而邇臣比矣忠敬不足謂臣不忠於君上不敬其臣邇近也言近以見逺言大以見小約言之比私相親也故大臣不可不敬也是民之表也邇臣不可不治也是民之道也民之道言民循從也君毋以小謀大毋以逺言近毋以内圖外則大臣不怨邇臣不疾而逺臣不蔽矣左傳曰石碏純臣也惡州吁而厚與焉大義滅親其是之謂乎又曰晉惠公卒懐公立命無從亡人期朞而不至無赦狐突之子毛及偃從重耳在秦弗召懐公執狐突曰子來則免對曰子之能仕父教之忠古之制也䇿名委質貳乃辟也今臣之子名在重耳有年數矣若又召之教之貳也父教子貳何以事君刑之不濫君之明也臣之願也淫刑以逞誰則無罪乃殺之又曰秦醫和謂晉侯曰良臣将死天命不祐趙孟曰誰當良臣對曰主是謂矣主相晉國於今八年晉國無亂諸侯無闕可謂良矣和聞之曰國之大臣榮其寵禄任其大節有菑禍興而無改焉必受其咎又曰陳無宇謂楚王曰天子經略諸侯正封封略之内何非君土食土之毛誰非君臣毛草也故詩曰普天之下莫非王土率土之濱莫非王臣詩小雅濱涯也天有十日甲至癸人有十等下所以事上上所以共神也故王臣公公臣大夫大夫臣士士臣皁皁臣輿輿臣𨽻𨽻臣僚僚臣僕僕臣臺馬有圉牛有牧以待百事春秋說曰正氣為帝間氣為臣論語曰舜有臣五人而天下治武王曰予有亂臣十人亂治也又曰季子然問仲由冉求可謂大臣與子曰所謂大臣者以道事君不可則止今由與求也可謂具臣矣孝經曰君子之事上也進思盡忠退思補過将順其美匡救其惡故上下能相親也漢書曰張良未嘗持兵為将常為畫䇿臣又曰絳侯周勃為丞相朝罷趨出意得甚上禮之恭常目送之袁盎進曰丞相何如人也上曰社稷臣盎曰絳侯所謂功臣非社稷臣社稷臣者主在與在主亡與亡又曰上居禁中召周亞夫賜食因趨出上目送之曰此怏怏非幼主臣也又曰辛慶忌居處恭儉飲食被服尤節約然性好輿馬號為鮮明惟是為奢荀悅漢紀曰臣有六有王臣有良臣有直臣有具臣有嬖臣有佞臣以道事君匪躬之故達節通方立功興化是謂王臣忠順不失夙夜匪懈循理愛和以輔上徳是謂良臣犯顔拂意砥矢弗撓直諫遏非不避死罪是謂直臣奉法守職無能徃來是謂具臣便僻苟容順意従諛是謂嬖臣傾險讒囘誣上惑下專權擅寵唯利是務是謂佞臣或有君而無臣或有臣而無君用善則治用惡則亂難則交争故明主慎所用焉又東觀記曰祭遵死後毎至朝㑹上帝嘆曰安得憂國奉公之臣如祭征虜者沈約宋書曰謝𢎞微為鎮西諮議㕘軍太祖即位為黄門侍郎與王華王曇首殷景仁劉湛等號曰五臣遷尚書侍部郎唐書曰或有言魏徴阿黨親戚者帝勅御史大夫温彦博按驗無状彦博曰徴為人臣須存形迹不能逺避嫌疑遂招此謗帝令彦博讓徴且曰自今以後不可不存形迹他日徴入奏曰臣聞君臣叶契義同一體不存公道唯事形迹君臣上下同遵此路則邦之興喪或未可知願陛下使臣為良臣勿使臣為忠臣帝曰忠良有異乎徴曰良臣稷契臯陶是也忠臣龍逄比干是也良臣使身獲美名君受顯號子孫傳世福禄無疆忠臣身受誅夷君陷大惡家國並喪空有其名以此而言相去逺矣又曰盧懷慎臨終遺表曰宋璟立性公直執心真固文學足以經務識畧足以佐時動惟直道行不苟合聞諸朝野之說實為社稷之臣晏子春秋曰景公問于晏子曰忠臣之事君何若對曰有難不死出亡不送景公不說曰君裂地而富之疏爵而貴之有難不死出亡不送其說何也對曰言而見用終身無難臣何死焉諫而見從終身不出臣何送焉孔叢子曰夫人臣見非而不争以陷主於危亡罪之大者也人主疾臣之弼已而惡之資臣以箕子比干之忠惑之大者也又曰魏主問子髙何如可謂大臣子髙答曰大臣則必取衆人之選能犯顔諫争公正無私者陳計事成主裁其賞事敗臣執其咎主任之而無疑人當之而弗避君總其美臣行其義然則君不猜於其臣臣不隠於其君故動無過計舉無敗事是以臣主並有得也又曰衛出公使人問孔子曰寡人之任臣無大小言問觀察之猶復失人何故答曰如君之言此即所以失之也人既難知非言問所鑒觀察所盡且人君所慮者多多慮則意不精以不精之意察難知之人其必有失也君未之聞乎昔者舜臣堯官才任士堯一從之左右曰人君用士當自任耳目而取信於人無乃不可乎堯曰吾之舉舜己耳目之矣今舜所舉吾又耳目之是則耳目人終無已也君苟付可付者則己不勞賢才不失矣又曰孟懿子問書曰欽四鄰何謂也孔子曰王者前有疑後有丞左有輔右有弼謂之四近言左右前後近人當敬畏之不可以非其人也又曰孟氏之臣畔武伯問孔子曰如何答曰人臣而畔天下之所不容也其将自反子姑待之三旬果自歸孟氏武伯将執之訪於夫子夫子曰無也子之於臣禮意不至是以去子今其反罪以反除又何執焉子脩禮以待之則臣去子将安徃哉武伯乃止孟子曰孟子見齊宣王曰所謂故國者非謂有喬木之謂也有世臣之謂也世臣先世舊臣也王者當有累世脩徳之臣常能輔其君以道也王無親臣矣今王無可親任之臣昔者所進今日不知其亡也言王取人不詳審徃日之所知臣今日為惡當誅亡王無知之也王曰吾何以識其不才而舍之曰國君進賢如不得已将使卑踰尊疎踰戚可不慎與言國君欲進用人當留意考擇如使忽然不精心意而詳審之如不得已而取備官則使卑尊疏戚相踰也又曰景子曰内則父子外則君臣人之大倫也父子主恩君臣主敬又曰故将大有為之君必有所不召之臣欲有謀焉則就之故湯之於伊尹學焉而後臣之故不勞而王桓公之於管仲學焉而後臣之故不勞而霸説苑曰人臣之術義不苟合位不苟尊必有益於國必有補于君故其身尊而子孫保之臣之所有行六邪六正行六正則榮犯六邪則辱賢臣處六正之道不行六邪之術故上安而下治又曰子貢問孔子曰為臣孰大曰齊有鮑叔鄭有東里子皮子貢曰齊無管仲鄭無子産乎孔子曰吾聞進賢為善鮑叔進管仲子皮進子産未聞管仲子産有所進也新序曰秦欲伐楚使者徃觀楚之寳器楚王聞之召令尹子西而問焉曰秦欲觀楚寳器吾和氏之璧隋侯之珠可以示諸乎令尹子西對曰臣不知也召昭奚恤而問焉昭奚恤對曰此欲觀吾國得失而圖之不在寳器在于賢臣夫珠玉玩好之物非國所寶重者于是遂使昭奚恤應之奚恤稱曰楚國之所寶者賢臣也理百姓實倉廩使民人各得其所令尹子西在此奉珪璋使諸侯解忿怨之難交兩國之歡使無兵革之憂大宗子敖在此守封疆謹境界不侵鄰國鄰國亦不見侵葉公子髙在此理師徒整兵戎以當強敵提桴鼓以動百萬之衆使赴湯火以蹈白刃出萬死不顧一生司馬子反在此若懐伯王之餘義攝治亂之遺風昭子奚恤在此唯大國之所觀秦使者瞿然無以對又曰周舍事趙簡子立門三日三夜簡子使人出問之夫子将何以令我周舍曰臣願為諤諤臣墨筆操牘隨君之後司君之過而書之日有記也月有效也嵗有得也簡子悅之賈誼新書曰智足以謀國事行足以為人師仁足以為上下之聲國有法則守之君有難則死之謂之大臣也古詩云為君既不易為臣良獨難又曰欲為君盡君道欲為臣盡臣道二者皆法堯舜而已矣又曰在國曰市井之臣在野曰草莽之臣董子曰上臣事君以人中臣事君以身下臣事君以質韓子曰為臣也北面委質無有二心朝廷不辭賤軍旅不辭難順主之法而無是非也故有口不以私言有目不以私視吕氏春秋曰魏襄王與羣臣飲酒酣王為羣臣祝令群臣皆得志史起興而對曰羣臣或賢或不肖賢者得志則可不肖者得志則不可王曰皆如西門豹之為人臣也史起對曰魏氏之行田也以百畆鄴獨二百畆是田惡也漳水在旁而西門豹不知用是其愚也又曰柱厲叔事莒敖公自以為不知而去居於海上莒敖公有難柱厲叔辭其友而徃死之其友曰子自以為不知故去今又徃死之是知與不知無異别也柱厲叔曰不然自以為不知故去今死而不去是果知我也吾将死之以醜後世之人不知其臣者也所以激君人者之行而厲人臣之節也行激節厲忠臣幸于得察忠臣察則君道固矣淮南子曰周公事文王行無専制事無由己身若不勝衣言若不出口有所奉持于前洞洞屬屬如不能如将失之可謂能子矣及繼文武之業履天子之國則平夷狄之亂誅管蔡之罪無所顧問感動天地聲攝海内可謂能武矣成王長北面致政委質而臣事之請而後行無擅恣之意無矜伐之色可謂能臣矣應璩百一詩曰茫茫九州内莫非帝者民民有忠信行莫非帝者臣太平御覽卷六百二十一
