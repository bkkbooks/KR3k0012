  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_014-1a, image: WYG0893/WYG0893-0144a.png}
body:
  text: 太平御覽卷十四宋李昉等撰天部十四霜雹虹霓霜釋名曰霜䘮也其氣慘毒物皆䘮也説文曰􅀢都念切早雪皚雪霜之白者易坤卦曰履霜堅氷至象曰履霜堅氷隂始凝也馴致其道至堅氷也詩曰糾糾葛屨可以履霜鄭𤣥注曰魏俗至冬猶謂葛屨可用履霜利其賤也又曰九月肅霜肅縮也霜降而收縮萬物也又曰蒹葭蒼蒼白露為霜禮曰季秋之日霜始䧏則百工休鄭𤣥注曰謂膠漆之作休又曰孟冬行秋令則霜雪不時又曰孟春行冬令則霜雪大摰又曰霜露既降君子履之必有悽愴之心非其寒之謂也鄭𤣥云感時念親也又曰天子大社必受霜露以逹天地之氣也京房易傳曰誅不原情有霜附木不下地不教而誅其霜反在草下又曰興兵妄誅厥災不霜聖賢遭害其霜附木不下也大戴禮曰霜是隂陽之氣也隂氣勝陽則凝而為霜春秋元命苞曰隂陽凝為霜又曰霜以殺木露以潤草春秋考異郵曰霜者隂精冬令也四時代謝以霜收殺霜之為言亡也物以終身也又曰僖公即位隕霜不殺草臣威強也春秋感精符曰霜殺伐之表季秋霜始䧏鷹隼擊王者順天行誅以成肅殺之威孝經援神契曰霜以挫物五經通義曰寒氣凝而為霜霜從地升也五經鈎沉曰天霜樹落葉而鴻鴈南飛家語曰霜降而婦功成嫁娶者行焉季秋霜降娶者始也詩曰将子無怒秋以為期國語曰駟見而霣子敏反霜霣霜而冬裘具賈逵曰駟房星也漢武内傳曰西王母云仙之上藥𤣥霜絳雪又曰嵰立嚴反州霜甘又曰貟嶠之山名環丘有氷蠶以霜雪覆之然後作繭其色五采織為衣裳入水不濡以投火經宿不燎唐堯之代海人獻以為黼黻王子年拾遺記曰廣延國有霜色紺碧莊子曰馬蹄可以踐霜雪毛可以禦風寒曾子曰隂氣勝則凝為霜淮南子曰芝蘭之芳未嘗見霜先霜之卉又曰聖人行於水無跡衆人行于霜有跡又曰至秋三月青女乃出以降霜雪高方注曰青女天神青天玉女主霜雪也又曰鄒衍事燕惠王盡忠左右譛之王王繫之獄仰天哭夏五月天為之下霜地鏡圖曰視屋上瓦獨無霜者其下有寳山海經曰豐山有九鐘霜降其鐘即鳴命厯序曰桀無道夏隕霜師曠占曰春夏之日有霜雪者君治政太嚴刻大殺天以示之宜損威殺重人命崔豹古今注曰鷓鴣常向日而飛畏霜露夜棲則以樹葉覆其背上蔡邕月令章句曰露凝為霜徐整長厯曰北斗當崑崙山氣運注天下秋冬為霜雪唐書曰寧王憲疾時京城寒甚凝霜封樹時學者以為春秋雨木氷即此是亦名樹介言其象介胄也憲見而歎曰此俗謂稼者也諺曰樹稼逹官怕必有大臣當之吾其死矣十一月薨琴操曰履霜操伯竒之所作也伯竒者尹吉甫之子也吉甫聽其後妻之言疑其孝子伯竒遂逐之伯竒編水荷而衣采停音亭山棃木也花而食之清朝履霜自傷無罪見放逐乃援琴而鼓之楚辭曰秋既戒之以白露秋又申之以嚴霜古艷歌辭曰秋霜白露下霜葉鬰為黄何瑾悲秋夜曰霜凝條兮璀璀露霑葉兮泠泠雹釋名曰雹砲疋巧反又音雹也其所中物皆摧折如人所蹙砲也許慎説文曰雹雨氷也從雨包聲禮曰仲夏行冬令則雹動傷穀傳曰昭四年正月大雨雹季武子問於申豐曰雹可禦乎對曰聖人在上無雹雖有不為災古者日在北陸而藏氷西陸朝覿而出之其出入也時今藏川池之氷棄而不用風不越而殺雷不發而震雹之為災誰能禦之榖梁傳曰僖公二十九年秋大雨雹雹者隂脅陽臣侵君之象也京房易傳曰飛雹下盡樹木之枝害五榖者君賦歛刻民也焦贛易林曰隂氣泥塞當氷不結淩人惰怠大雹為災尚書洪範五行傳曰隂陽相脅而為雹霰盛隂雨雪凝滯而氷寒陽氣薄之不相入則散而為霰盛陽雨水温煖而湯熱隂氣脅之不相入則轉而為雹霰者陽脅隂也雹者隂脅陽也又曰人君妬賢疾善在下謀上則日蝕雨雹殺走獸春秋感精符曰大臣擅法雨雹又曰九月十月日色青則寒有雹雪春秋考異郵曰隂陽專精凝合成雹雹之言合也春秋漢含孳曰專一精并氣凝為雹宋均注曰謂若魯僖公脅於齊以妾為妻尊重齊媵無廻曲之心感隂水氣乃使結而不解㪚史記曰景帝二年秋雨雹大者五寸深二尺又曰凢雹皆冬之愆陽夏之伏隂也漢書曰成帝河平二年甲午四月楚國雨雹大如斧飛鳥皆死又曰宣帝地節四年乙邜五月山陽濟隂雨雹如雞子深二尺五寸殺二十人飛鳥皆死又漢書五行志曰武帝元封三年癸酉雹大如馬頭後漢書曰靈帝時青龍見於御座軒前又大風雨雹霹靂㧞樹張奐上疏曰臣聞風為號令動物通氣水生於火相湏乃明蛇能屈伸龍能騰蟄順至為休徵逆來為殃咎陽氣轉則精凝為雹故大將軍竇武大傳陳蕃或志寧社稷或方直不回前以讒勝並伏誅戮海内嘿嘿人懐憤震昔周公𦵏不如禮天乃動威今武蕃忠貞未被明宥妖𤯝之來皆為此也宜急為改𦵏徙還家屬其從坐禁錮一切蠲除又皇太后雖居南宫而㤙禮不接朝廷莫言逺近失望宜思㒺極之義顧復之報天子深納其言又曰時頻有地震隕雹蔡邕上封事曰臣聞天降灾異縁象而至霹靂雹數發殆刑誅繁多之所生也又曰安帝延光二年夏京師及郡國三日大雨雹又曰獻帝初平二年五月雹如扇如斗東觀漢記曰和帝永元五年六月郡國大雨雹大如鴈子又曰韓稜字伯師除為下邳令親事未期吏民愛慕時隣縣皆雹傷稼稜縣界獨不雹晋書曰太光二十一年四月雨雹時道子專政姦佞競進烈宗不能禁終至大亂晋中興書曰大興二年海鹽雨雹大如雞子崔鴻前趙録曰劉曜光初三年四月長安雨雹大如雞子後魏書曰鮮卑兵沒鹿俟從匈奴三年其妻在家有子怪欲殺之妻言常行仰天視而雹入口吞之而生子號檀石槐後遂為鮮卑大人郭子𤣥中記曰東方有柴都焉在齊國有山山有泉如水井狀深不測至春秋時雹從井中出常敗五榖人常以柴塞之不塞柴則出也故號為柴都陳留風俗記曰雍丘縣夏后公祠有神井能興雹霧伏琛記曰安丘城南三十里有電都淵其雹或出亦不為灾異西京雜記曰鮑敞問董仲舒曰雹何物也曰隂氣脅陽也凉州異物志曰有一大人生于北邊在丁令北千五百里偃卧於野其髙如山䪺脚成谷横身塞川長萬餘里䪺脚之間乃成大谷近之則有尖銅雹擊旃注曰旃之也所謂大人惟可遥看不可至下若至則有雷電流銅鐡之丸以擊人曾子曰陽之專氣為雹雹者氣之化也淮南子曰北方之極有九澤有積雪雹孔叢子曰永初二年夏河西縣大雨雹皆如杯棬大者或時殺牲畜雉兔折樹木於是天子責躬省過風俗通曰成帝問劉向曰俗説文帝時天下斷獄三人米一斗一錢有此事否對曰不然後元年雨雹如桃李深三尺㝷景帝代之不可為昇平厯代紀曰石遵襲位於鄴暴風雨震電雹如斗大真武殿及兩廂端門光焰照天金石皆消為火月餘乃滅紀年曰夷王七年冬雨電大如礪白虎通曰自上而下曰雨雹風角占曰徵動羽有雹霜陳陸瓊和張湖孰雹詩曰惟徴動羽惟隂脅陽雨氷作冷凝氣為祥虹霓釋名曰虹攻也純陽攻隂氣故也隂陽不和婚姻錯亂淫風流行男女好相奔隨則此氣盛霓齧也其體斷絶見於非時此災氣也傷害於物如有所食齧也説文曰霓屈虹青赤或白色隂陽氣也河圖稽耀鈎曰鎮星㪚為虹霓主内淫又霓者氣也起在日側其色青赤白黄周書曰清明後十日虹始見小雪日虹藏不見虹不收藏婦不專一詩曰螮蝀在東莫之敢指螮蝀虹也夫婦過禮則虹氣盛君子見戒而諱之莫之敢指禮曰小雪之日虹藏不見又曰氣如白虹天也又曰清明後十日虹始見爾雅曰螮蝀虹也霓為挈貳易通卦驗曰虹不時見女謁亂公虹者隂陽交接之氣陽唱隂和之象今不時見似君心在房内不修外事廢亂失義夫人淫恣而不敢制故曰女謁亂公詩含神霧曰瑶光如蜺貫月感女樞生顓頊尚書考靈曜注曰日傍白者為虹日傍青赤者為霓春秋演孔圖曰霓者斗之亂精也斗失度則投霓見宋均注曰投應也春秋元命苞曰隂陽交為虹蜺春秋運斗樞曰樞星散為虹蜺蔡邕月令章句曰虹螮蝀也隂陽交接之氣著於形色者也雄曰虹雌曰蜺虹常依隂雲晝見於日衝無雲不見大隂亦不見蜺常以蒙濁見日旁白而直曰白虹凡日旁者四時常有之唯雄虹起季春見至孟冬乃藏虹映日成質故朝西暮東漢書曰荆軻慕燕丹之義白虹貫日太子畏之如淳注曰虹臣象日君象烈士傳曰荆軻發後太子見虹貫日不散曰吾事不成矣後聞軻死事不立曰吾知之矣漢書曰武帝逰東萊臨大海是嵗虹氣蒼黄色若飛鳥集棫陽宫上又曰上官桀謀廢昭帝迎立燕王是時天雨虹下屬宫中飲水井水竭又天文志曰虹蜺者隂陽之精也如淳注曰雄曰虹雌曰霓張蕃漢記曰靈帝和光元年虹晝見御坐殿庭前色青赤上引蔡邕問之對曰虹霓小人女子之祥又漢名臣蔡邕奏曰有黑氣墮温徳殿庭中如車蓋騰起奮􅌺五色有頭體長十餘丈形似龍占者以虹霓對虹著於天而䧏於庭以臣所聞則天所投虹也吴志曰諸葛恪攻新城不克引軍出往東興有蛇見其船還拜蔣陵白虹復繞其車吴録云恪曰虹何為來此哉果為孫峻所誅晋陽秋曰建武元年虹長彌天晋安帝紀曰義熈二年七月夜彩虹出西方蔽月前凉録曰張駿六年有彩虹五里隆隆如鐘鼓之聲沈約宋書曰劉義慶在黄陵有疾而白虹貫城野麕入府心甚惡之因自陳求退莊子曰陽炙隂為虹文子曰天地二氣即成虹人二氣即生病淮南子曰昔者馮夷大丙之御也皆古得道能御隂陽乗雷車駕雲虹又曰太古二皇得道之柄立於中天二皇伏羲神農神與化逰以撫四方是故虹霓不出賊星不行賊星妖星含徳之所致也含懐也又曰虹蜺者天之忌也孟子曰湯東面而征西夷怨南面而征北狄怨民之望之若大旱之望雲霓也戰國策曰唐睢謂秦王曰聶政刺韓傫白虹貫日捜神記曰孔子修春秋制孝經既成孔子齋戒向北斗星而拜告備于天乃有赤氣如虹自上而下化為黄玉上有刻文孔子跪而受之又曰廬陵巴丘民陳濟者作州吏其婦姓秦獨在家忽疾病恍惚發狂後漸差常有一丈夫長大儀貎端正著絳碧袍彩色炫燿來從之常相期於一山澗之旁寢處不覺有人道感接忽忽如眠耳如是積年春每往期㑹不復畏難比鄰人觀其所至輙有虹見秦云至水側丈夫金瓶引水共飲後遂有娠生兒如人多肉不覺有手足濟尋假還秦懼見之乃内兒著甕中因見此丈夫以金甕與之令覆兒濟時醉眠在牖下聞與秦語聲至愴濟亦不疑也又丈夫語秦云兒小未可得將去不湏作衣我自衣之即以綘囊與之令可時出與乳于時風雨晦冥鄰人見虹下其庭秦常能辦佳食肴饌豐美有異於常丈夫復少時將兒去亦風雨晦冥人見二虹出其家從此遂踈異苑曰古語有之曰古者有夫婦荒年菜食而死俱化成青虹故俗呼為美人虹又曰晋陵薛願義熈初有虹飲其釡中吸響便竭願輦酒灌之随投便竭吐金滿噐於是災弊日祛而豐富嵗臻述異記曰有黒虹下樂輯營少日輯病卒紀年曰晋定公十八年青虹見瑞應圖曰大虹竟天握登見之意感生舜於姚墟太𤣥經曰紫霓圍日其疾不割雜兵書曰日暈有白虹貫内出外者從所止戰勝華陽國志曰李特生長子盪字仲平少子雄字仲雋特妻羅氏妊雄夢雙虹自地升天一虹中斷羅曰吾二兒有先亡者有貴者後雄王蜀黄帝占軍訣曰攻城有虹從南方入飲城中者從虹攻之勝白虹繞城不匝從虹所在擊之勝謹守其缺賊乃從其地破走文子曰父無䘮子之憂兄無哭弟之哀童子不孤婦人不孀虹蜺不見盗賊不行含徳之所致也楚辭曰青雲衣兮白霓裳楚辭天問曰白霓嬰茀胡為此堂王逸注曰蜺而雲有色似龍者茀白雲逶迤也蜺者言有此白霓茀氣逶迤相嬰何為于此堂乎蓋屈原祠堂所見也安得夫良藥不能固臧臧善也崔文子學仙於王子喬子喬化為白虹而加嬰茀持藥與崔文子驚恠引戈擊中之因墮其藥俯而視茀王子喬之尸也故言得藥之善也揚雄甘泉賦曰曵虹采之流離左思吳都賦曰虹霓廻帶於雲館潘尼雨賦曰收綘霓於漢隂楊文雲賦曰浮素霓之逶迤太平御覽卷十四
