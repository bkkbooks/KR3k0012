  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_452-1a, image: WYG0897/WYG0897-0149c.png}
body:
  text: 太平御覽卷四百五十二宋李昉等撰人事部九十三諫諍二漢書曰文帝幸上林皇后慎夫人從其在禁中常同坐及坐郎署袁盎却慎夫人坐因前説曰臣聞今陛下既已立后慎夫人廼妾妾主豈可以同坐哉不見人彘乎於是上廼恱慎夫人賜盎金五十斤盎以數直諫不得乆居中調為隴西都尉又曰元帝時左将軍史丹䕶太子家事竟寧元年上寝疾傅昭儀及定陶王常在左右而皇后太子希得進見丹直入卧内頓首伏青蒲上涕泣曰皇太子以適長立積十餘年名號繫扵百姓今者道路流言以為太子動揺之議審若此臣願先賜死以示羣臣應劭注曰以青規地曰青蒲自非皇后不得至此又曰項羽發使立沛公為漢王王巴蜀漢王怒蕭何曰雖王漢中之惡不猶愈於死乎王曰何為乃死也何曰今衆不如百戰百敗不死何俟周書曰天與不取反受其咎天漢其稱甚美夫能屈一人之下而申扵萬乘之上者湯武是也臣願大王王漢中養其人致英傑收巴蜀定三秦天下之事可圖也漢王善之遂之國又曰周昌沛國人髙祖時為御史大夫髙祖欲廢吕后所生太子立戚夫人之子如意為太子昌諫曰陛下若廢嫡立庶臣不敢奉詔髙祖乃止後太子立是為惠帝拜昌為太傅又曰薛廣徳為御史大夫元帝永元中行幸不已廣徳乃上書諫曰臣竊見關東人民流離陛下日撞亡秦之鐘聴鄭衛之樂馳騁干戈恣獵于田野不恤百姓臣誠悼之今士卒暴露從官勞倦願陛下亟返宫與天下同憂樂上即日還宫又帝欲酹祭宗廟出便橋欲御樓船廣徳乃當車免冠頓首諫曰陛下宜從橋上帝曰大夫冠廣徳曰陛下不聴臣臣自刎頸以血汚車輪陛下不得入宗廟矣帝不恱先驅光禄大夫張猛前曰臣聞主聖臣直乘船危從橋安聖主不渉危不履虛御史大夫言可用上曰曉人不當如此耶乃從橋又曰劉向為宗正時西域都䕶甘延壽副校尉陳湯矯制發胡漢兵四萬攻郅支單于斬首傳送京師名王已下一千五百一十八級生虜百四十五人降虜千餘人上議其功丞相匡衡石顯等皆以延壽與湯擅興師矯制幸得不誅不宜加爵土上欲従之向乃上疏諫文多不載扵是上乃赦湯與延壽等矯制罪封延壽義城侯長水校尉湯為關内侯實封三百户又曰貢禹字少翁瑯琊人累為諫議大夫時嵗不登郡國多困禹乃進諫曰今關東諸道禾稼不稔江淮浙右人民流離父子不保願陛下蠲賦稅常貢減太官之食去角觚諸戯廢不急務役速下詔命以蘇疲人上恱之遷禹為御史大夫禹自治憲司数陳得失又言官家奴婢十餘萬人稅良民以給之率脂膏以滑之嵗費鉅萬扵國無益宜請免為庶人從之又奏武帝始臨天下犯法者贖罪入榖者補吏是以官私懼亂盗賊並起玉石混雜真偽不分今欲興至理致太平宜除贖法以進賢良則天下治矣上大恱行之賜禹錢百萬又曰劉輔為諫議大夫成帝欲立趙媫妤為后輔疏曰今陛下觸情縦慾傾扵卑賤之女欲以母天下豈不畏于天乎上怒使掖庭中縛之谷永等上書訟之上乃減死又曰谷永時成帝好微行不止永乃諫曰陛下棄萬乘之至尊樂家人之賤事厭髙美之尊號好匹夫之卑業使供衛之臣執干戈守其空宫使公卿百僚不知陛下所在忽有變将柰社稷何帝歛容而止又曰耿育關内侯陳湯被䜛奪爵黜之燉煌郡育上書諍曰陳湯昔年討絶域不覊之君雪國家累年之恥自古及今安有比哉今被䜛黜老棄燉煌復為遺虜所笑誠可痛哉至今奉使外夷者未嘗不陳郅支之誅夷以揚漢國之威稜豈可以授人之功充人之身開倖門快讒佞者乎帝遂詔湯還京師復舊爵又曰鄭崇字子游髙宻大族哀帝時為尚書僕射数諫諍陳得失每奏事嘗曵革履上笑曰我識鄭尚書履聲崇每以董賢貴寵過度陳諫由是得罪上因責崇曰君門如市何乃欲禁切主上用人乎崇曰臣門如市臣心如水又曰朱雲成帝封諸舅王鳯等五人同日為侯傾壊朝政京兆尹王章以直言見誅安昌侯張禹以依違任事雲為槐里令頗銜之乃諫曰今朝廷大臣上不能匡君下不能益人皆尸禄耳不可以事君請尚方劔㫁佞臣頭一人勵其餘上問曰誰也雲曰張禹上大怒曰小臣居下訕上庭辱師傅罪死不赦御史将雲下攀折殿檻大呼曰臣願得從龍逄比干遊扵地下免事桀紂之主死不恨矣将軍辛慶忌叩頭流血極諫得免所司理檻帝曰勿理以旌直臣又曰王宏為侍中衰寵董賢為大司馬衛将軍事是時賢年二十二上置酒與賢父親屬宴飲上放酒從容視賢而笑曰吾欲法尭禪舜何如時宏在坐進諫曰昔周成戲以桐葉封弟叔虞扵晉周公入曰天子無戲言耳今天下乃髙帝之天下非陛下之天下也陛下以藩王入奉嗣孝成皇帝後當承宗廟傳子孫扵無窮豈得以戲言将髙祖社稷輸人耶上黙然不恱終以失㫖貶為郎署又曰郅都景帝時為中郎敢直諫靣折大臣扵朝嘗從上入上林賈姬在厠野彘入厠上目郅都不行上欲自持兵救賈姬都伏上前曰一姬死更進一姬天下所少寧賈姬乎陛下縱自輕柰宗廟太后何上還彘亦不傷賈姬太后聞嘉之賜都金百斤上亦賜金百斤又曰梅福上書諫成帝曰天下民有上書求見者輙使詣尚書問其所言見可採取者秩以升斗之禄賜以一束之帛若此天下之士發憤懣吐忠言嘉謀日聞扵上天下國家之表裏爛然可睹矣又曰哀帝時杜欽諫曰臣聞非仁無以廣施非義無以正身今漢承周秦之弊冝抑文上質表實去偽臣竊有所憂言之拂心逆㫖不言則増漸日長為禍不細續漢書曰張子孝平陵人性矜嚴非禮不動遇妻子若嚴君三輔以為儀表人或謂之詐子孝曰我誠詐也人皆詐惡我獨詐善不亦可乎為光禄数諫正常乘白馬上每有異政輙言白馬生且復諫矣又曰吴佑字季英陳留人父恢南海太守佑年十二隨恢到官欲以青簡寫尚書章句佑諫曰今君踰江湘越五嶺僻在海濵風俗雖陋然多珍玩上為朝廷所疑下為權戚所望此章若成載必兼兩昔馬援以薏苡興謗王陽以衣􅇸邀名嫌疑之戒願留意焉恢撫其背曰吴氏世不乏季子矣後漢書曰陳蕃為太尉桓帝末朝綱失序封賞踰制蕃上䟽諫曰臣聞諸侯上象七曜下應九土以藩屏王室髙祖非功臣不侯今寵臣以非義受邑左右以無材傳賞守位不料其徳列土莫紀其功乃至一門之内侯者数人後宫之中数千采女肉食錦衣脂油粉黛不可勝計鄙諺曰盗不入五女之門以貧人家也今後宫之女豈不貧人國乎且聚而不御必生憂怨之感以致兵革水旱之因也上知之而不能用為佞所害又曰申屠剛字巨卿茂陵人累遷尚書令帝嘗欲出逰剛以隴蜀未平不宜宴逸諫不聴乃以頭軔乘輿帝遂止又曰王尊為隗囂将世祖遣來歙往諭之囂不從命而執之欲殺害尊諫曰臣聞為國者慎器與名為家者畏怨重禍慎名器則下服其命輕怨禍則上受其殃今将軍遣子質漢内懐他志名器逆矣而更謀誅其使怨禍結矣古者列國兵交使在其間所以兵貴和而不在戰也何况承王命藉重質而犯之哉且來歙雖單車逺使而漢帝之外兄害之無損扵彼滅之有害扵吾昔宋執楚使者卒有析骸易子之禍小國猶不辱况萬乘之主乎遂不敢害以禮遣之又曰張敏字伯逹河間鄚人累為尚書建初中有侮辱人父者而子殺之肅宗貸其死刑時定其議敏議曰夫死生之决宜從上下猶天之四時有生有殺若開相容恕著之為定法者則是故設奸萌生長罪隟今欲趨生反開殺路一人不死天下受弊記曰利一害百人去城郭王者承天地順四時法聖人從經律願陛下留意下民考尋利害天下幸甚從之又曰爰延字季平外黄人性質直遷侍中帝逰上林苑從容問延曰朕何如主也對曰為漢中主帝曰何以言之對曰尚書令陳蕃任事則治中常侍豫政則亂是以知陛下可與為善可以為非帝曰嗚呼昔朱雲庭折欄檻今侍中面稱朕過何代無竒人哉敬聞命矣又曰杜根字伯堅潁川人永初元年為郎時和熹鄧后臨朝權在外戚根以安帝年長宜親政事與同舍郎上書直諫太后大怒令盛根扵囊殿上武士撲殺之執法者以根素知名私語行事人使不加力既而載出根得蘇太后使人檢覆根詐死三日目中生蛆因得免又曰李雲字行祖甘陵人為白馬令衆災頻降雲素剛直憂國将危乃露布上書直諫帝怒遂下黄門北寺獄五官掾杜衆傷雲以忠諫獲罪上書願與雲同日死詔下廷尉皆死獄中又曰陳琳為丞相府主簿靈帝時朝綱失序政在宦官尚書何進謀於袁紹曰晉趙鞅興晉陽之甲誅君側之惡今閽竪㺯權可謂蔓草也盍芟而薙之琳諫曰易稱即鹿無虞諺有掩目捕雀夫微物尚不可欺以得志况國之大事其可以詐乎今明公總皇威權兵要龍驤虎歩髙下在心此猶鼓洪鑪而燎毛髪耳違經合道天人所慎而反委釋利器更徴外助大兵聚會強者為雄所謂倒持干戈授人以柄功必無成為禍階矣進不聴遂召前将軍太原守董卓卓既至卒為禍亂而進亦為宦官所殺又曰姚期重扵信義在朝廷憂國愛主其有不得扵心犯顔諫争帝嘗輕與期門近出期頓首車前曰臣聞古今之戒變生不意誠不願陛下微行數出帝為之回輿而還又曰桓帝時有上書宜改鑄大錢劉陶上議曰伏讀鑄錢之詔失輕重之義蓋以當今之憂不在扵貨在于民飢竊見比年以來良苖盡扵蝗螟之口杼軸空扵公私之求野無青草室如懸罄所急朝夕之飡所患靡鹽之事豈謂錢之銖兩輕重哉就使當今沙礫化為黄金瓦石變為和玉使百姓渇無飲飢無食雖黄羲之純徳唐虞之文明猶不能以保蕭墻之内也盖人民可百年無貨不可一朝有飢故食為至急也又曰劉陵字孟髙豫章人為侍中車駕出祠南郊陵叅乘上起早升輿眠陵跪曰陛下為萬乘之主升輿宜正立雖早嚴欲寝不當上為天地靈祗下為百姓觀覩上媿色曰敬受侍中斯言以後為式更自整頓後漢書曰延篤字叔固孝桓皇帝拜侍中自在機宻常有進納上数問政事得失以經義古典黙諫帷幄言不宣外又曰李膺等黨事下獄陳蕃上疏極諫曰臣聞聖明之君委心輔佐亡國之主諱聞直辭故湯武雖聖而興於伊吕桀紂迷惑亡在失人由此言之君為元首臣為股肱同體相須共成美惡者伏見前司𨽻校尉李膺太僕杜宻太尉掾范滂等正身無㸃死心社稷以忠忤㫖横加考按或禁錮下獄或死徙非所杜塞天下之口聾盲一世之人與秦焚書坑儒何以為異臣位列台司憂深責重不敢尸禄惜生坐觀成敗如不蒙採録使身首分裂異門而出所不恨也帝諱其言切託以蕃辟非其人遂策免之又曰陳蕃諫桓帝曰臯陶戒舜無畋逰周公戒成王無盤于遊田虞舜成王猶有此戒况徳不及二主者乎夫安平之時尚有直節况當今之世有三空之危哉田野空朝廷空倉庫空是謂三空而兵戎未戢四方離散是陛下燋心毁顔坐而待旦之時也豈宜揚旗曜武騁心輿馬之觀乎太平御覽卷四百五十二
