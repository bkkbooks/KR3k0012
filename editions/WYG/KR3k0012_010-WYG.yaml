body:
  text: 太平御覽卷十宋李昉等撰天部十雨上雨上釋名曰雨羽也如鳥羽動則散又雨水從雲下也雨者輔也言輔時而生養說文曰零徐雨也􅀢音斯小雨裁落也􅀢林本反霖雨也南陽名霖雨曰霢􅀢音酸小雨也􅀢子亷反微雨也􅀢音資雨聲也溟小雨也澍時雨也滑子八反雨下也易曰宻雲不雨自我西郊又匪冦婚媾往遇雨則吉又雲行雨施又雨以潤之書曰若嵗大旱用汝作霖雨又洪範休徴曰肅時雨若又納于大麓烈風雷雨弗迷詩曰有渰淒淒興雨祁祁雨我公田遂及我私渰雲興貎淒淒雲盛貎祁祁猶徐徐也又月離于畢俾滂沲矣月離隂星則雨又我來自東零雨其濛鸛鳴於垤婦歎於室鄭𤣥注曰將隂則穴處者先知之鸛好水將雨長鳴而喜也又習習谷風以隂以雨禮記月令曰仲春之月始雨水孟春行夏令則雨水不時行秋令則暴雨總至行冬令則水潦爲敗又季春行夏令則時雨不䧏行秋令則滛雨早䧏又時雨將䧏下水上騰又立夏命有司祀雨師又孟夏行秋令則苦雨數來又六月中氣後五日大雨時行又仲秋行春令則秋雨不䧏又仲冬行秋令則天時雨汁􅆶瓠不成又諸侯朝天子雨霑服失容則廢又天䧏時雨山川出雲又風雨不節則饑又疾風迅雷甚雨則必變傳曰隱公九年三月癸酉大雨又宋大水魯莊公弔焉曰天作淫雨害于粢盛若之何不弔又如百穀之仰膏雨焉又雨三日以往爲霖又大旱卜有事于山川不吉甯莊子曰昔周饑克殷而年豐今邢方無道欲使衛討邢焉從之師興而雨又臧武仲如晉雨過御叔在其邑將飲酒御叔魯大夫曰焉用聖人武仲多智時人謂聖人也公羊傳曰觸石而出膚寸而合側手為膚布指知寸言無有膚寸而不合也不崇朝而遍雨乎天下者惟泰山雲爾糓梁傳曰春正月不雨不雨者勤雨也欲雨之心勤也夏四月不雨一時言不雨者憫雨也一時輒言不雨憂民之至六月雨雨云者喜雨也爾雅曰甘雨時䧏萬民以喜謂之醴泉又暴雨謂之涷小雨謂之霡霂久雨謂之淫謂之霖易稽覽圖曰䧏隂爲雨䧏隂之雨潤而破塊京房易飛候曰凡候雨以晦朔弦望雲漢四塞者皆當雨東風曰雷雨暴有黑雲氣如船覆于日下當雨有黑雲氣如斗牛彘當雨暴有異雲如水牛不三日大雨黑雲如羣羊奔如飛鳥五日必雨雲如浮船皆雨北斗獨有雲不五日大雨四望見青白雲名曰天寒之雲雨徴蒼黒雲細如杼軸蔽日月五日必雨雲如兩人提鼓持桴皆爲暴雨又太平之時十日一雨凡嵗三十六雨此休徴時若之應尚書說曰淮雨淮暴雨之名也尚書大傳曰五岳雲皆觸石而出不崇朝而雨又成王時有越裳氏來朝曰久矣天之無烈風東西南北之無澍雨也暴雨也意中國有聖人乎禮統曰雨者輔時生養均遍故謂之雨大戴禮曰天地之氣和即雨禮斗威儀曰君乘金而王其政象平則嘉雨時至春秋說題辭曰一嵗三十六雨天地之氣宣十日小雨應天文十五日大雨以斗運也又陽制隂故水為雨春秋元命苞曰隂陽和而爲雨春秋繁露曰木有變則春多雨此徭役聚賦歛重故也史記曰秦始皇時置酒而天雨陛楯者沾寒優旃見而哀之謂之曰汝欲休乎陛楯者曰幸甚優旃曰我即行呼汝疾應曰諾居有頃殿上上夀呼萬嵗旃臨檻大呼曰陛楯郎郎曰諾優旃曰汝雖長何益徒雨立我雖短幸休居於是始皇使陛楯者得半相代又夫子嘗行命弟子持雨具旣而果雨曰昨暮月不宿畢乎范蔚宗後漢書曰髙鳳字文通家貧好學不休其家曝麥令鳳守雞以竿授其手中鳳執竿讀書雨大至鳳讀書不覺執竿如故其妻還麥流甚以爲怒鳳亦不愧後漢書曰郭林宗嘗于陳梁間行遇雨巾一角墊時人乃故折角以爲林宗巾其見慕如此謝承後漢書曰百里嵩字景山爲徐州刺史境旱嵩出巡逰甘雨輒㴻東海祝其合鄉等三縣父老訴曰某等是公百姓獨不䧏乎迨赴雨隨車而下東觀漢記曰王郎追光武自薊東南馳及至南宫遇大風雨乃引車入道傍舎馮異抱薪鄧禹爇火光武對竈燎衣又順帝陽嘉元年立順帝烈皇后是時自冬至春不雨立后之日嘉㴻沾渥又沛獻王輔善京氏易永平五年京師少雨上御靈臺自為卦以周易林卜之其繇曰蟻封穴戸大雨時至上以問輔輔上書曰蹇艮下爲山坎上爲水山出雲為雨蟻穴居知雨將至故以雨為興居漢書名臣奏曰天隂雨人之病爲之先動是隂相應而起也天將隂雨又使人睡卧者隂氣也魏志曰曹真伐蜀從子午道司馬宣王泝漢水當㑹南鄭入諸軍或從斜谷道或從武威入㑹大霖雨三十餘日棧道絶斷詔真還又太祖在長安使曹仁攻雲長于樊城秋大霖雨漢水溢平地水數丈于禁七軍皆没晉書曰詔以王雅爲太子少傅將拜遇雨請以繖入王珣不許因冐雨拜後漢書曰樊英隱壺山有暴風從西南起英謂學者曰成都失火甚盛因含水西向噀之乃令記其時日後有從蜀郡來者曰是日大火有雲從東起須㬰大雨神仙傳曰欒巴蜀人徴爲尚書入朝得酒不飲西南噀之詔問巴巴曰臣夲縣成都大火臣以酒爲雨救之帝驚驛問咸云是時雨從北來猶有酒氣襄陽耆舊傳曰巫山神女朝為行雲暮為行雨西京雜記曰董仲舒曰太平之時雨不破塊津莖潤枝而已又董仲舒曰隂陽二氣之初蒸也若有若無若實若虛團攢聚合其體稍重乘虛而墜風多則合速故雨大而踈風少則合遲故雨細而宻湘州記曰零陵山有石燕遇風雨則飛止還爲石王采安城記曰萍鄉西城津有玉女岡天當雨輒先涌五色雲於石間俗謂玉女披衣搜神記曰武王伐紂至河上雨甚疾雷晦㝠揚波于河衆甚懼武王曰余在天下誰敢干志者風波立霽述異記曰廬山有康王谷北嶺上有一城號劉城天毎有雨輒聞山上有鼓角笳簫之聲村人常以爲候武昌記曰武昌東南有金牛岡西有石鼓山上有三石鼔石鼔鳴天必雨羅浮山記曰山有龜淵淵有神龜龜鼻貫銅鐶若有人穢此淵即注雨周處風土記曰榆莢雨春雨黄雀風濯枝雨六月之風雨也又六月有大雨名濯枝雨荆楚歲時記曰六月必有三時雨田家以爲甘澤邑里相賀曰賀嘉雨王子年拾遺記曰甘雨濛濛似露委草木則滴瀝雨也又香雲成香雨帝王世紀曰黄帝逰洛水上見大魚殺五牲以醮天乃甚雨七日七夜魚流始得圖書今河圖是也孔子家語曰將行遇雨不假蓋於子夏䕶其短也又齊有一足之鳥集于殿前舒翅而跳齊侯異之使聘魯訪於孔子曰此鳥名曰商羊昔童兒有屈一脚振兩臂而跳且謡曰天将大雨商羊鼓舞今齊有之其應至矣急告民趣治溝渠修隄防將有大雨水爲灾果有霖雨水溢汎諸國傷害人民唯齊有備不敗景公曰聖人之言信而有徴矣老子曰暴雨不終日莊子曰宋景公時大旱三年卜云以人祀乃雨公下堂頓首曰吾所求雨者爲人今殺人不可將自當之言未卒天大雨方千里又堯讓天下於許由由曰日月出矣而爝火不息其于光也不亦難乎時雨降矣而猶浸灌其于澤也不亦勞乎文子曰若與俗處猶走逃雨也無之而不濡列子曰赤松子神農時雨師也廣成子曰黄帝時雲不待族而雨尸子曰神農理天下欲雨則五日爲行雨旬爲谷雨旬五日爲始雨萬物咸利故謂之神雨孟子曰油然作雲沛然下雨抱朴子曰軍始發大風甚雨起于後大勝之徴也軍始出雨沾衣者是謂潤兵軍有功雨不足沾衣裳是謂泣軍必敗又曰無雲而雨是謂雨血將軍當揚兵講武以應之雨軍中尤甚者將軍戰必無功也管子曰冬作土功發地藏則夏多暴雨秋霖不止又曰春秋察五政一曰論㓜孤赦有罪二曰賦爵列授祿位三曰脩溝洫復亡人四曰治封疆正阡陌五曰無殺麑卵無絶華萼五政狥時春雨乃來淮南子曰失火遇雨禍中有福又曰人莫鑑於沫雨而鑑於止水者以其浄也沫雨雨潦上沫起覆蓋也言其濁擾不見人形也又曰朱鼈浮於水上必大雨又曰天且雨也魚已噞噞音宜臉反又曰黑蜧神虬潛泉而居將雨而躍蜧音麗鄒子曰朱買臣孜孜脩學不覺雨之流粟韓子曰荆人伐陳吳救之軍間三十里雨十日夜左史倚相謂子期曰雨十日甲輯兵聚吳人必至宜備之乃為陣未成而吳人至見荆有戒而反傅子曰昔者伯牙子遊於㤗山之隂逢暴雨止於巖下援琴而鼓之為淋雨之音更造崩山之曲每奏鍾期輒窮其趣曰善哉子之聽也孔叢子曰子思答縣子曰以子産仁愛譬夫子猶浸水之與膏雨夫浸所及則生不及則死民皆知焉膏雨之所生也廣莫大焉民之受賜也普矣莫識其由也吕氏春秋曰武王伐紂至渭水紂使膠鬲候周師問武王曰西伯何時至曰將以甲子日至膠鬲行矣大雨日夜不休武王疾行不輟軍吏諫武王曰吾疾行以救膠鬲之死也揚子法言曰震風凌雨然後知夏屋之帡幪震疾凌暴也夏大也帡障也幪覆也廣雅曰雨師謂之屏翳纂要曰疾雨曰驟雨徐雨曰零雨久雨曰苦雨亦曰愁霖雨晴曰霽雨水曰潦雨雲曰渰雲亦曰油雲戰國策曰文侯與虞人期獵是日大雨文侯將出左右諫曰吾與虞人期獵不可失也乃往魏于是始强易林變占曰雷公出裝隠隠西行霖雨不止流為江河周易集林雜占曰占天雨否外卦得隂為雨得陽不雨其爻發變得坎為雨得離不雨坎化為㢲先雨後風博物志曰太公為灌壇令武王夢婦人當道夜哭問之曰吾是東海神女嫁與西海神童今為灌壇令當道廢我行我行必有大風疾雨大風疾雨是毀君之德也武王覺召太公問之果有疾雨暴風在太公邑外而過六韜曰武王問散宜生卜伐紂吉乎曰不吉鑽龜龜不兆數蓍交加而折將行之日雨韜車至軫行之日幟折為三散宜生曰此卜四不祥不可舉事太公進曰是非子之所知也祖行之日韜車至軫是洗濯甲兵也師曠占曰候月知雨多少入月一日二日三日月色赤黄者其月少雨月色青者其月多雨常以五卯日候西北有雲如羣羊者即有雨至矣冬戊巳春辰巳日雨蝗蟲食禾稼立春雨傷五禾立秋日雨害五穀常以戊巳日日入時出時欲雨日上有冠雲大者即多雨雲小者少雨天文要集曰北斗之傍有氣往往而黑狀如禽獸大如皮席不出三日必雨又河有雲黑狀似船若一疋布維河不出十日大雨又辰口守心有水灾一曰大雨不可當又北斗者不欲雲覆之黑雲覆之大雨范子計然曰風為天氣雨為地氣風順時而行雨應風而下命曰天氣下地氣上隂陽交通萬物成矣劉義慶世說曰謝太傅無嗔喜曾送兄征西葬還日暮雨馭人皆醉不可處分公乃于車中手取車柱撞馭人聲色甚怒劉義慶幽明録曰河南人趙良與其鄉人諸生至長安至新安界遇霖雨糧乏相謂曰飢那得美食邪應時美飯備具有人聲語云進䟽食黄子發相雨書曰常以戊申日候日欲入時日上有冠雲不問大小視四方黑者大雨青者小雨候日始出日正中有雲覆日而四方有雲黑者大雨青者小雨四方有雲如羊猪雨立至四方北斗中有雲後五日大雨四方北斗中無雲唯河中有雲三枚相連狀如浴狶者三日大雨以丙丁辰之日四方無雲唯漢中有者六十日風雨和常以六甲之日平旦清明東向望日始出時日上青雲大小貫日中青者以甲乙日雨赤者以丙丁日雨白者以庚辛日雨黑者以壬癸日雨黄者以戊己日雨六甲日四方雲皆合者即雨以天方雨時視雲有五色黑赤並見者即雹黄白雜者風多雨少青黑雜者雨隨之必滂沛流潦又四方有濯魚雲遊疾者即日雨遊遲者雨少難至說苑管仲曰吾不能以春風風人夏雨雨人吾道窮矣又武王伐紂過隧則斬岸過水則沉舟示人無反志也至于有戎之隊大風折斾散宜生諫曰此其妖與武王曰非也天落兵也風霽而乘以大雨散宜生又諫曰此非妖與武王曰非也天洗兵也風俗通曰雨師為𤣥㝠山海經曰羽山之上多雨符愓之山多怪雨括地圖曰谷山有藂雲甘雨太平御覽卷十
