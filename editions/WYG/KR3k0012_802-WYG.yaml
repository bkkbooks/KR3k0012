body:
  text: 太平御覽卷八百二宋李昉等撰珎寳部一寳珠上寳尚書湯誓曰遂伐三朡俘厥寳玉孔安國曰俘取也玉以禮神使無水旱之災故取而寳之誼伯仲伯作典寳二臣皆作典寳一篇言國之常寳也又盤庚曰無緫于貨寳又旅獒曰分寳玉于伯叔之國時庸展親弗寳逺物則逺人格所寳惟賢則邇人安又顧命曰越玉五重陳寳赤刀大訓𢎞璧琬琰在西序大玉夷玉天球河圖在東序𦙍之舞衣大貝鼖鼔在西房兊之戈和之弓垂之竹矢在東房毛詩嵩髙曰王遣申伯路車乘馬錫爾介珪以作爾寳詩含神霧曰聖人受命必順斗張握命圖授漢寳宋均曰聖人謂髙祖也受天命而王必順旋衡法故張良受兵鈐之圖命以授漠為珎寳也禮記檀弓曰南宫敬叔反必載寳而朝夫子曰若是其貨也喪不如速貧之愈也又曰天不愛其道地不愛其寳又曰儒有不寳金玉而以忠信為寳左𫝊莊公曰齊人來歸衛寳文姜請之也又莊公曰王及鄭伯入于鄭遂入成周取其寳器而還又文公曰宋昭公盡以寳行又襄公曰宋人得玉獻諸子罕子罕不受曰我以不貪為寳爾以玉為寳若與皆喪寳也不若人有其寳也又昭公曰呉太子諸樊入隕取楚夫人與其寳器以歸公羊傳僖公曰虞公貪而好寳及為晉所滅抱寳牽馬而去又定公曰盗竊寳玉大弓盗者何虎也史記曰趙簡子告諸子曰吾藏寳符扵常山之上先得者賞諸子馳之常山上求無所得毋䘏還曰已得符矣登常山而臨代代可取也又曰晉使郄克以車八百乘伐齊陳扵鞌扵是晉軍追齊至馬陵齊侯請以寳器謝不聽必得笑克者蕭同叔子又曰魯昭公八年楚靈王就章華臺召昭公往焉賜寳器已悔復詐取之又曰衛叔名封成王常用事舉康叔爲周司冦賜衛寳器又曰秦逐客李斯書曰陛下致崑山之玉有隨和之寳垂明月之珠服太阿之劍乘纎離之馬建翠鳳之旗樹靈鼉之皷此數寳者秦不生一焉而陛下説之又曰樂毅伐齊入臨淄盡取齊寳也又曰梁惠王與齊威王會田扵梁問齊王曰亦有寳乎威王曰無有梁王曰若寡人國小尚有徑寸之珠照車前後各十二乘者十枚奈何以萬乘之國而無寳乎威王曰寡人以為與王異吾有檀子者使守南城則楚人不敢爲冦東去泗上十二諸侯皆來朝吾臣有盻子者使守髙唐則趙人不敢東漁扵河吾更有黔夫者使守徐州則燕人祭北門趙人祭西門齊之北門也言燕趙之人畏其侵伐故祭以求福徒而從者七千餘家吾臣有種首者使備賊盗則道不拾遺將以照千里豈特十二乘哉梁惠王慙不懌而去梁或作魏字漢書曰沛公西入武闗欲擊秦嶢下軍張良曰臣聞其將者賈竪子易動以利使酈食其持重寳㗖秦將秦將果欲連和沛公乃擊秦軍大破之謝承後漢書曰鄭𢎞為鄒令縣人王逢得遺寳物懸扵衢道求主還之後漢書曰世祖遣衛尉鈍期持珎寳繒帛賜隗囂期至鄭被盗張璠漢記曰朱雋爲郡吏太守尹端有罪應死雋爲買珎寳賂主章吏端得免死范􅁮後漢書曰帝常召見諸部計吏問其風俗及前後守令能不蜀郡計掾樊顯進曰漁陽太守張堪昔在蜀其仁以惠下威能討奸前公孫述破時珎寳山積捲握之物足當十世而堪去職之日乗折轅車布被囊而已帝聞良久歎息魏氏春秋載袁紹檄州郡文曰曹操父嵩乞丐携飬因贓假位輿金輦寳輸貨權門魏志曰陳㤗為匈奴中郎將京邑貴人多寄寳貨因泰市匈奴泰皆挂於壁及徴為尚書悉以還呉志曰士燮為交阯太守每遣使詣權致雜香細葛輙以千數明珠大貝琉璃翡翠瑇瑁犀象之珎竒物異果蕉葉龍眼之屬無嵗不至晉中興書曰姚萇試諸子謂曰吾有一寳物萬金不易汝等技藝勝者吾以與之諸子皆素好馬欲扵父前試之惟略不動萇以為賢故越諸兄立爲嗣子晉安帝記曰桓𤣥尤愛珎寳常玩㺯珠玉不離扵手晉書殷仲文𫝊曰桓𤣥為劉裕所敗仲文隨𤣥西走其寳玩悉藏地中皆變為土晉書吕纂載記曰即序胡安據盗發張駿墓見駿貌如生得真珠簏琉璃榼白玊樽赤玊簫紫玉笛珊瑚馬鞭馬瑙鍾水陸竒珎不可勝記齊書曰始興王鑑鎮益州扵州園地得古塜無復棺但有石槨銅器千種並古形玊璧三枚珍寳甚多不可皆識金銀為蠶形者數萬計又以朱砂為阜水銀為池左右咸勸取之鑑曰皇太子昔在雍有發古冢者得玉屏風玉匣之屬皆將還都吾意嘗不同乃遣功曹何佇之爲起墳諸寳物一不得犯梁書曰羊侃大同中魏使陽斐與侃在北嘗同學有詔令侃延斐同宴賔客三百餘人食器皆金玊雜寳奏三部女樂至夕侍婢百餘人俱執金花燭崔鴻十六國春秋前趙録曰曜驅平長安至于西河張茂懼遣使稱蕃獻諸珍寳珠玉不可勝記後魏書曰元义既専政乃扵禁中自别作庫掌握之寳充牣其中北史曰齊神武後以孝武帝后配彭城王孫韶魏室竒寳多後隨入韶家有二玉鉢相盛轉而不可出馬瑙榼三斗玉縫之皆稱西城鬼作也北齊書曰髙徳正嘗辭疾除冀州刺史即起顯祖怒禁門下其妻出寳物滿四牀欲以寄人帝奄見大怒曰我府藏無此物詰其得由皆諸元賂之帝乃斬徳正并妻子伯堅隋書曰開皇十二年突厥遣使獻七寳椀唐書曰師子國在西海之中出竒寳商賈到則不見人但置寳物價值於洲上賈依價質之而去以能養師子故以為國名又曰天寳中師子國遣婆羅門僧灌頂三藏來獻金寳瓔珞老子曰我有三寳保而持之一曰慈二曰儉三曰不敢為天下先輕敵則幾喪吾寳晏子春秋曰和氏之璧井里之朴耳良工修之則為荐國之寳孫卿子云井里之璞又云玊人琢之為天下寳魯連子曰楚王成章華臺酌諸侯酒魯君先至與之大曲之弓不琢之璧既而悔之伍舉見魯君曰大曲之弓不琢之璧楚國之寳也呉求之弗與舉兵伐楚魯懼奉而歸之墨子曰周公見申徒狄曰賤人强氣則罰至申徒狄曰周之靈珪出扵土楚之明月出蚌蜃五象出扵漢澤和氏之璧夜光之珠三棘六里此諸侯之良寳也孟子曰諸侯之寳三土地人民政事寳珠玊者殃必及身淮南子曰夫夏后氏之璜不能無考考班璺明月之珠不能無纇夜光之珠白似月光胡曰明月類若絲之有結纇也然天下寳之者何也小惡不及妨大美𫝊子曰夫齎不貲之寳獨宿曠野其危甚扵累卵比之秦猶有㤗山之安也戰國策曰周有􅀈砈宋有結緑梁有懸黎楚有和璞此四寳者玉之所美也已為天下名器國語曰晉定公享楚王孫圉趙簡子鳴玊以相問圉曰楚之白珩猶在乎爲寳也幾何對曰未嘗為寳也楚有觀射父能作訓辭以行諸侯有左史倚相能通訓典以叙百物有夢曰雲金木竹箭之生也此楚國寳也若白珩先王之玩何寳焉夢澤也穆天子傳曰天子西征至陽紆之山河伯馮夷所都是惟河宗氏乃至扵崑崙之邱觀舂山之寳吕氏春秋曰世皆以珠玊為寳寳逾多而民逾貧失其所寳也陸賈新語曰聖人不用珠玊而寳其身也鹽鐵論曰汝漢之合鐵誘外國鈎羗胡之寳也説文曰琛寳也徤爲舎人曰美玊為琛説苑曰經侯過魏左帯玊具劒右帶環佩左光明右右光照左太子不視又不問經曰魏國亦有寳乎太子曰主信臣忠百姓戴上此魏國之寳也經左解玊具右解佩委之而起阮子曰雖金玊滿堂明珠滿室饑不爲寳非國之用新序曰晉平公浮西河中流而歎曰嗟乎安得賢士大夫與共此憂樂乎船人固桑對曰夫劒産扵越珠産江漢玉産崑岡此三寳者皆無足而致今君苟好士則賢士至矣西京雜記曰武帝以七寳牀雜寳案厠寳屏風列寳帳設扵桂宫時人謂之四寳宫也又曰髙祖入咸陽宫行庫藏見有琴長六尺十三弦二十六徽皆用七寳飾之銘曰渥璵之樂漢武故事曰上雜錯天下珎寳為帳其次甲乙三輔黃圖曰金寳一銀二龜三貝四布寳五泉寳六凢寳貨六種二十八品地鏡圖曰夫寳物在城郭邱墻之中樹木爲之變視柯偏有折枯是其侯也視折枯所向寳在其方凢有金寳常變作積虵見此輦便脱隻履若衣以擲之溺之即得凡藏寳忘不知處以大銅盤盛水着所疑地行照之見人影者物在下也又曰視屋上瓦獨無霜其下有寳藏蔡氏化清論曰經云寳者衆之所利也苟利其利害必存焉郭璞奏曰臣以為珎竒靡麗之物誠是玩㺯之所寳然非經國之至寳張衡東京賦曰所貴惟賢所寳惟糓明皇雜録曰楊國忠驕奢僣侈之態復紛然未滿是時公主玊葉冠虢國夫人夜光枕楊國忠鏁子帳皆希代之寳莫能計其直珠上説文曰珠蚌之隂精也尚書禹貢曰徐州厥貢淮夷蠙珠周禮天官玉府曰若王合諸侯則共珠盤玉敦左𫝊哀公曰衛大叔疾出奔宋臣向為宋向魋臣納美珠焉與之城鉏城鉏宋邑宋公求珠魋不與由是得罪又哀公曰越圍呉晉趙鞅使楚隆告扵呉王曰寡君之老無恤使陪臣隆敢展謝其不共展陳也黄池之役君之先臣志父得承齊盟曰好惡同之今君在難無恤不敢憚勞非晉國之所能及也使陪臣敢展布之王拜稽首曰寡人不佞不能事越以爲大夫憂拜命之辱與之一簟珠爾雅曰西方之美者有霍山之多珠玊焉尚書考靈曜曰卵金出軫握命孔符赤用藏龍吐珠也鄭𤣥注曰藏秘也珠寳物喻道也赤漢將用天之秘道尚書考靈曜曰甲子冬至日月五緯俱起牽牛日月若編珠春秋保乾圖曰吐珠扵澤誰能不含宋均注曰珠出扵野澤之中誰能不含取以為寳也禮斗威儀曰王者政平徳至淵泉則江海出明珠又戴禮曰玉居山而木能潤淵生珠而岸不枯韓詩外𫝊曰良珠度寸雖有百仞之水不能掩其耀也韓詩内𫝊曰漢女所弄珠如荆雞卵孝經援神契曰神靈滋液百寳用則珠母見珠母璣鏡宋均曰事神明得則大珠有光可為鏡徳至淵則海出明珠史記曰樂毅遺燕王書曰齊王遁走莒僅以身免珠玉財寳盡収入扵燕又曰魏王與齊威王㑹田扵郊魏王曰若寡人小國尚有徑寸之珠照車前後各十二乘者十枚奈何以萬乘國而無寳乎又曰漢王賜張良金百鎰白珠二升良具以獻項伯又曰鄒陽上書曰臣聞明月之珠夜光之璧以闇投人扵道路人無不按劔相盻者何則無因而至前也漢書景帝詔曰黃金珠玊饑不能食寒不能衣吏發民若取黃金者坐贓為罪又曰董偃與母賣珠為事偃十三隨母飬舘陶公主家左右言其姣好召見曰吾為養之得幸又地理志曰武帝時使使入海市明珠至圍有二寸以下又曰霍光廢昌邑王太后被珠􅃭坐武帳召王伏前聽詔又曰成帝時王章死妻子皆死合浦王商輔政曰還章妻子故鄉其家屬皆採珠致産數百萬范􅁮後漢書曰光武耳不聽鄭衛之音手不持珠玉之玩又曰董卓擅朝政吕布斬之長安中民悉賣珠玉市酒肉相慶填滿街肆又曰馬援在交阯常餌薏苡實及軍還載之一車後有上書譛之者以為前所載還皆明珠文犀也司馬彪續漢書曰天竺國一名身毒出琉璃珠璣又曰扶風人士孫奮居富而性恡梁冀認奮母為其守藏婢云盗白珠十斛也後漢書曰珠蚌中隂精也玓瓅明珠色也璣珠不圓也夫餘出珠大如酸棗東觀漢記曰永建四年漢陽太守文礱獻大珠詔曰海内頗有災異而礱不推忠誠而偷明珠之瑞以求媚令封珠却還又曰顯宗時鍾離意為尚書時交阯太守坐贓千金徴還伏法以其資物頒賜群臣意得珠璣悉以委地而不拜賜王恠而問其故對曰臣聞孔子忍渇扵盗泉之水曾參廻車扵勝母之閭惡名也此贓穢之物誠不敢拜帝嗟嘆曰清乎尚書之言乃更以庫錢三十萬賜意又曰和熹后時新遭大憂法禁未設宫中亡大珠一箧主名不立太后乃親自臨見宫人一一問閴察其顔色開示恩信宫人盗者即時首服謝承後漢書曰孟嘗為合浦太守郡俗舊採珠以易米二千石貪穢使人採珠積以自入珠忽徙去合浦無珠餓死者盈路孟嘗化行一年之間去珠復還又曰汝南李敬少時為趙相奴於䑕宂中得繫珠及璫珥相連以問主簿主簿曰前相夫人昔亡珠不知所在疑其子婦竊之因去婦敬送珠付前相慙乃還去婦又曰豫章黃向辰歩路中得珠琪一囊可值三百餘萬求主還之主欲以半物謝向向委去不顧也魏書曰卞皇后性儉約不尚華麗無文繡珠玊器皆黒􅃮太祖嘗得名璫數具命后自選一具后取其中者太祖問其故對曰取其上者為貪取其下者為僞故取其中者魏志曰文帝問蘇則曰前西域通使燉煌獻徑寸大珠可復求市得不則曰若陛下德流沙漠不求自至求而得之不足貴也帝黙然又曰公孫淵以遼東叛遣田豫以本官督青州刺史程喜喜内懷不服軍事之際多相違錯喜知帝寳愛明珠乃宻上豫雖有戰功而禁令寛弛所得器仗珠銀甚多放散不得簿官由是功不見列又曰文帝作終制曰飯含無以珠玉無施珠􅃭玊押典略曰臨淄侯曹植與楊修書曰今世作者可略而言人人自謂握靈蛇之珠魏略曰大秦國出夜光珠真白珠夫餘出珠大如酸棗魏志曰東夷俗以瓔珠為財寳或以綴衣為飾或以懸頸垂耳至扵袂不以金銀錦􅄢為珎又曰倭國女王壹與遣大夫率善等獻貢白珠五十孔青大勾珠二枚也蜀志曰秦宓奏記益州牧劉焉薦儒士任定祖曰甫欲割蚌求今乃隋和炳然復何歎哉又曰宗預復東使呉孫權握預手曰今君年長孤亦衰老恐不復相見遺預大珠一斛呉録地理志曰朱崖珠宫懸出明月珠玉又曰袁博字君逰為淮陵長其女得壞牆中璫珠百餘博封上之詔以賜博呉志曰魏文帝遣使以馬求易明珠翡翠權曰此皆孤所不用而可得馬何苦而不聽其交易王隱晉書武帝詔曰御府内省珠玊玩好之物皆以賜王公也晉書陶璜自交州上表曰合浦郡土地墝埆無有田農百姓唯以採珠為業商賈去來以珠貨米而呉時珠禁甚嚴慮百姓私散好珠禁絶來去人以饑困又所調猥多限每不充今請上珠輸二次輸一麤者蠲除自十月訖二月非採珠之時聽商賈往來如舊並從之晉令曰士卒百工不得服真珠璫珥沈約宋書曰文帝詔太史令錢樂之作小渾天二十八宿中外以白真珠及青黄三色珠為三家星日月五星悉居黄道南史曰中天竺國在大月支東南數千里出火齊狀如雲母色如紫金有光耀列之則蟬翼積之則如紗縠之重㳫也崔鴻十六國春秋前秦録曰建元十年正月懸珠簾扵正殿後魏書曰尔朱世隆將敗洛中先謡曰三月末四月初揚灰簸土覔真珠至是並驗又曰畢衆敬以篤老乞還桑梓朝廷許之衆敬臨還獻真珠璫四具太平御覽卷八百二
