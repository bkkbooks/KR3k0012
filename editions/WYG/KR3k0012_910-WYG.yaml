  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_910-1a, image: WYG0901/WYG0901-0110c.png}
body:
  text: 太平御覽卷九百十宋李昉等撰獸部二十二猨猴猱玃果然猨説文曰猨善援屬也扶沸切山海經曰堂庭之山其上多白猨淮南子曰五九四十五五生音音生猨故猨五月而生列子曰老韭為莧老羭為猨莊子曰夫不見騰猨乎其得柟梓豫章也攬蔓其枝而王長其間及其得柘棘枳枸之間也危行側視處勢不便未足以逞其能也又曰人木處則惴慄恂懼援猱然乎哉又曰今取猨狙曰余切而衣周公之服彼必齕嚙挽裂盡去而後慊觀古今之異猶狙之異乎周公也又曰猿猵音編狚以為雌司馬彪曰猵狚似猿而狗頭其雌猴好與雄狚接淮南子曰虎豹之文来射以虎豹有文章使人射取之猨􅀈女滑切之㨗来乍􅀈猨屬乍暫疾以其㨗故使人疾擊之又曰楚王亡其猨而林木為之殘宋王亡其珠而池魚為之殫又曰置猨檻中則與豚同非不巧㨗也無所肆其能也吳越春秋曰趙王問范蠡手戰之術范蠡答曰臣聞趙有處女國人稱之願王請問其手戰之道也於是王乃請女女將北見王道逄老人自稱袁公袁公問女曰聞子善為劔願得一觀之處女曰妾不敢有所隠也惟公所試公即挽林杪之竹以枯槁末折墮地女接取其末袁公操其本而刺處女女應節入之三入因舉杖擊之袁公則飛上樹化為白猿吕氏春秋曰荆王有白猨王射之則搏樹而嬉使養由基射之始調弓矯矢未發猿擁樹而號漢書曰李廣猨臂善射春秋繁露曰猨似猴大而黒長前臂所以夀者好引其氣也抱朴子曰玊䇿記稱猨夀五百歳則變而為玃居縳切千歳則變為老人又曰周穆王南征一軍盡化君子為猨為鵠小人為沙爲泥張載論曰白猨𤣥豹蔵於欞檻何以知其㨗周索氏孝子傳曰猿屬也或黄或黒通臂輕巢善縁好吟雌為人得終不徒生華陽國志曰鄧芝見猨抱子在樹上引弩射之中猨母其子為㧞箭以葉塞瘡芝乃嘆息投弩水中冝都山川記曰峽中猿鳴至清山谷傳其響冷泠不絶行者歌之曰巴東三峽猿鳴悲猿鳴三聲淚沾衣荆州圖經曰冝都夷道縣西山頂上有古墓名曰女王冡不詳其人林則女貞獸則白猿范汪荆州記曰夷陵縣陜口山川日夜星斗不見日月多猨鳴至清逺山海經圖讃曰白猿肆巧由基撫弓數如循環其妙旡窮猴漢書曰韓生勸項羽都闗中羽曰吾聞富貴不歸故鄉如衣錦夜行乃燒宫室都彭城韓生曰人言楚人沐猴而冠果然又曰長信少府檀長卿沐猴與狗鬭蓋寛饒奏免之張晏曰沐猴獮猴也王隠晉書曰䕶軍張邵母病淳于智筮之使西出市獮猴繫母背令傍人抱之拍猴恒使作聲三日三夜放猴出門即為犬所殺母於此漸差郭湏魏晉世語曰司馬宣王辟周泰為新城太守尚書鍾毓謂泰曰君初登宰府乞兒乘小車一何駃泰曰君名公之子少有文彩故守吏職彌猴乘土牛一何遲衆悦服荘子曰吳王浮于江登于狙且余切之山衆狙見之怐然奔走有一狙焉委蛇攫㧓見巧乎王王射之敏給搏㨗矢矢徃雖速而狙猶能摶之也王命相者趨射之狙死王顧謂其友顔不疑曰之狙也伐其巧恃其便以傲予以至此殛也列子曰宋有狙公者養之成羣誕狙曰與之芧朝三而暮四衆狙皆怒曰然則朝四而暮三衆狙皆喜韓子曰燕王徴巧術人請以棘刺之端為母猴母猴成巧人曰人主欲觀之必半歳不入宫不飲酒食肉雨霽日出視之晏隂之間而棘刺之母猴乃可見也燕王恩養之不能觀也譙子洪訓曰人之所以貴者以其禮莭也人而無禮者猴乎雖人面而蟲箕也淮南子曰楚有烹猴者而給徒立切其邦人邦人以為狗羔美而甘之後聞其猴也據地而吐之盡寫其所食此未為知味者也抱朴子曰余友人滕永叔嘗養一大獮猴鎻着床間犬忽齧殺之永叔便合鏁埋之後百許日有見獮猴走上永叔承塵上驚指之曰獮猴何以被傷血流斷走乎永叔曰始乃知猴死復有鬼也又曰山中申日稱人君者猴也猴壽八百歲王充論衡曰鹿之角足以觸犬猴之手足以搏䑕然而鹿制於犬猴服於䑕氣不利也神仙傳曰有人種黍山中正患獮猴食之聞介象有道聊従之乞避猴之法象曰無他法也汝明日往黍所望見羣猴便大喚語之已白介君教莫復侵食黍此人明日視黍遇羣猴適欲下樹述象語獮猴各自還山遂絶跡述異記曰南康營民伍考之伐船材忽見大樹上有一猴懐孕考之便登木逐猴騰赴如飛樹既孤逈下又有人猴知不脫因以左手抱樹枝右手撫腹考之擒得母猴殺之割其腹見有一子形狀垂産夜夢見一人稱神以殺猴責譲之後考之病經旬初如狂因漸化為虎毛鬚爪悉生音聲亦變遂逸走入山永無踪跡周景武孝子傳曰余嘗至綏安縣逄徒逐猴猴母負子没水水雖深而清乃以㦸刺之自脇以下中㫁脊尚連取着船中子隨其傍以手捫子而死陸機與弟雲書曰監徒武庫建始殿諸房中見有兩足猴真怪物也異物志曰南方以彌猴頭為鮓袁淑俳諧集常山王九命文曰及至圖身失所覊靮人間馴纓服制惟意所牽登楹而遨抱梁而眠捨摭遺餘恣口所便後漢王延夀王孫賦曰原夫天地之造化寔神偉之屈竒道淵微以宻妙信無物而弗為有王孫之狡獸形陋觀而醜儀顔狀類乎老公軀體似乎小兒眼睚􅀈以眩䘏眎􅀈睫以䀗睳突高匡而曲頞䁵􅀈厯而隳離鼻􅪱齁以䶋􅦃耳聿役以適知口嗛􅀈以䶨齺脣􅱎㗩以􅬯􅀈齒厓厓以齴齴嚼唯􅰘而囁唲儲糧食於兩頰稍委輸於胃脾踡蹲而狗踞聲厯鹿而喔吚或嗝嗝而􅢛􅢛又嘀􅢛其若嗁姿僭傔以總贛豁盱䦧以瑣􅀈眙睕䁓而􅀈睗盶􅀈􅀈而踧􅀢生深山之茂林處嶄巖之嶔﨑性僄猜而㺕疾態鋒出而横施縁百仞之高木攀窈褭之長枝背牢落之峻壑臨不測之幽谿尋柯條以宛轉或捉腐而登危或羣跳而電透或爪懸而匏垂猱説文曰猱貪獸也一曰母猴似人毛詩草木蟲魚䟽曰猱獮猴也楚人謂之沐猴老者為獑猢駿捷也其鳴噭而悲詩曰無教猱升木毛萇注曰猱猨屬也爾雅曰猱猨善緣孫炎注曰猱母猴也江乗地記曰攝山有山猱赤足玃居縛切説文曰玃母猴也爾雅曰玃持善顧郭璞注曰似猴而大蒼黒色能攫持人好顧盼抱朴子曰獮猴及猿八百歳為玃古今注曰猴五百歳化為玃吕氏春秋曰肉之美者玃猱之炙又曰聞言不可不察數傳而白為黑故狗似玃玃似母猴母猴似人人與狗則逺矣毛詩草木蟲魚疏曰猱獮猴也楚人謂之沐猴老者為玃大而黒長前臂玃之白􅆎者為獑猢博物志曰蜀中南髙山上有物似獮猴長七尺能行捷走名曰猴玃一名馬化或曰猳玃同行道婦人有好者輙盗之以去人不得知行者每經過其旁皆以長繩相引然故不免此能別男女氣嗅故取女不取男取去而為家室其無子者終身不得還十年之後形類之意亦或迷不復思歸有子者輒負送還其家産子皆如人有不飼養者母輙死故無敢不養也及長與人不異皆以楊為姓故今蜀中西界多有楊率皆猳玃馬化之子孫時時有玃爪者果然山海經曰果然獸似獮猴以名自呼色蒼黑羣行老者在前少者在後得果食輙與老者似有義焉交趾諸山有之獠人射之以其毛為裘褥甚温煖蜀地志曰涪陵南界秦陜中有果然獸形如狗子頭似虎其尾柔滑白黑色頗可為裘輕煖可珎南中八郡志曰交趾有果然白靣黑身毛采斑斕吳録地理志曰九眞胥浦縣有獸名果然猨狖類也色青赤有文居樹上北郡及日南皆有之南方草木狀曰果然獸生在山林上民人以毒箭射之剥取皮皮文青赤白色縫相連作蓆出九眞日南郡南州異物志曰交州以南有果然獸其鳴自呼身如猿犬面通身白色其體不過三尺而尾長四尺餘反尾度身過其頭視其鼻仍見兩孔仰向其毛長柔細滑澤以白為質黒為文視如蒼頭鴨脇邉斑文集十餘皮可得一褥華文麗好細厚温煖魏鍾毓果然賦曰果然似猴象猨黑頬青身肉非嘉肴唯皮為珎太平御覽卷九百十
