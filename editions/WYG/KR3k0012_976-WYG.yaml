body:
  text: 太平御覽卷九百七十六宋李昉等撰菜部一菜韭菜詩曰我有旨蓄亦以御冬旨美御禦也蓄聚菜以禦冬月之無時也又曰其䔩維何維筍及蒲䔩菜肴也周禮春官曰入學釋菜合舞入學必釋菜禮先師也菜蘋蘩之屬儀禮㛰禮曰舅姑既没則婦入三月乃奠菜没終也奠菜者韭菜祭也羞用薰稱婦之姓曰某氏來歸敢奠嘉菜始為皇舅禮曰仲秋之月命有司趣民收歛務蓄菜始為禦冬之偹也左傳曰蘋蘩藴藻之菜可薦於鬼神可羞於王公爾雅曰菜謂之䔩蔬不熟為饉䔩菜總名見詩凡草菜可食通名為蔬也論語曰雖疏食菜羮瓜祭必齊如也又曰飯疏食飲水曲肱而枕之樂亦在其中矣尚書大傳曰大夫有汙瀦之官雖生美菜有義之士弗食後漢書曰劉平與母俱匿野澤中平朝出求食逄餓賊將烹之平叩頭曰今且為老母求菜老母待曠為命願得生歸食母畢還就死因涕泣賊見其至誠哀而遣之平還既食母訖因白曰屬與賊期義不可欺遂還詣賊衆皆大驚相謂曰常聞烈士乃今見之子去矣我不忍食子于是得全又曰崔瑗愛士好賔客盛脩肴膳殫極滋味不問餘產居常蔬食菜羮而已謝承後漢書曰汝南鍾南嚴海君少時鄉居有入其園竊菜者明日㧞菜悉遺鄉里鄉里人相約無復取菜者又曰彭城朱躍字子卿為漁陽相前相所種菜悉付還外魏國志曰倭國地温冬夏食生菜吳書曰趙咨使魏魏人問曰江東有耑蹄菜作苦為食咨曰當得蒼鰷以作羮王隐晉書曰皇甫謐姑子梁栁為城陽太守或勸謐送之謐曰栁為布衣過吾吾送栁不出門食不過塩菜貧不以酒食為禮也今而送是貴城陽太守而賤梁柳也豈中古人之道哉又曰邵續為石勒所執身灌園鬻菜以供衣食勒屢遣人察之歎曰此眞髙人矣不如是安足貴乎嘉其清苦賜穀帛毎臨朝嗟嘆以勵羣臣又曰桓温性儉毎讌賔客唯下七菜果而已又曰吳隐之母䘮哀毁常啖葅以其味旨輟而棄之及為廣州清操踰勵常食不過菜及乾魚而已帷帳噐服皆付外庫時人頗謂其矯然亦始終不易宋書曰張敷父在吳興亡成服凡十餘日始進水漿葬畢不進鹽菜遂毁瘠成疾又曰宗慤以軍功封洮陽侯先是鄉人庾業家豪富侈服玉食與賔客相對膳必方丈而為慤設粟飯菜葅謂客曰宗軍人慣噉麤食慤致飽而退初無異辭至是為慤長史帶梁郡慤待之甚厚不以昔事為嫌又曰栁元景為三公時在朝勲貴多事產業惟元景獨無所營南岸有數十畆菜得錢二萬還宅元景怒曰我立此園菜以供家啖耳乃復賣以取錢奪百姓之利耶乃以錢乞守園人又曰王𤣥謨栁元景桓䕶之雖並北人而𤣥謨獨受老傖之目凢諸為四方書疏亦如之嘗為𤣥謨作四時詩曰堇荼供春膳粟漿充夏餐􅂒醬調秋菜白醝解冬寒又曰朱修之姊在鄉里飢寒不立修之貴為刺史未曾供膳嘗往姊姊為設菜羮麤飯以激之齊書曰晉永嘉五年曲陽縣民黄慶宅左右有園東南廣數丈毎種菜輙鮮異雖加採㧞更生夜恒有白光似懸絹道士𫝊德占使人掘之三尺獲玉印文曰長承萬福又曰宜都王鏗生三嵗䘮母及有識問母所在左右告以早亡便思慕蔬食自悲不識母又曰江泌性仁孝食菜不食心以其有生意惟食老葉而已南史隐逸傳曰沈道䖍辟州府凡十二命皆不就有竊園菜者外還見之仍自逃隐待竊者去後乃出梁書曰武帝太官常膳惟以菜蔬園果所陳不過三盞又武帝詔曰今雖無復牲腥猶有脩脯之類即之幽明義為未盡可更詳定悉薦時蔬左承司馬筠等叅議火餅代大脯餘悉用蔬菜帝從之三國典畧曰梁蕭棟字元吉豫章安王歡之子也侯景以法駕迎棟時棟與其妃執鋤種菜忽然見逼駭愕乆之後魏書曰甄琛母曹氏有孝性夫氏去家路踰百里毎得魚肉菜果珍羮口實者必令僮僕走奉其母乃後食焉又曰髙閭曾造胡叟短褐曵柴從田歸舍為閭設濁酒蔬食皆手自辦按其舘宇卑陋園疇褊局而飯菜精潔醯醬調美見其二妾並年衰跛眇衣布穿弊閭見其貧約以衣服直千餘疋贈之亦無辭媿又曰盧義僖性清儉不營財利雖居顯位毎至困乏麥飯蔬食欣然甘之三國典畧曰北齊王以鄴清風園賜穆提婆于是官無蔬菜賖買於人負錢三百萬其人訴焉斛律光曰此園賜提婆一家足不賜提婆百官足又曰庫狄士文為具州刺史情清苦不受公料家無餘財其子嘗啖官厨餅士文枷之繫獄累日杖之一百歩送還京僮肄無敢出門所買菜必出於境凡有出入皆封署其門親故絶迹慶弔不通隋書曰姚察陳亡入隋詔授秘書丞别勅成梁陳二史又勅於東華門長叅文帝以察自奉蔬菲别日召入内殿賜果菜指謂朝臣曰朕聞姚察學行當今無比我平陳只得此一人唐書曰太宗回次易州界司馬陳元璹令百姓種蔬坑上而㣲火煦之欲其速生以擬供進太宗聞之責其謟媚詔免官又曰太宗時徤逹獻佛土菜一莖五葉花赤中心正黄而蘂子紫色泥婆羅獻波稜菜葉類紅藍實如蒺藜火熟之能益食味又有酢菜狀似芹而味香渾提葱其狀猶葱而甘辛又曰髙宗時司農欲以冬藏餘菜賣之百姓以墨勅示僕射蘇良嗣良嗣判曰昔公儀相魯㧞去園葵况臨御萬邦而販蔬鬻菜事遂不行又曰王昇為刑部尚書性貪恡不常在公乃鬻公廨菜園收其價錢以自潤甚為時論所醜又曰中書園蔬日給於衆官者主事白常袞减其數崔祐甫怒訶主事主事曰此相公之命祐甫大詬曰門下侍郎安得理中書之蔬叱左右踣主事而拽之自是與袞常不平又曰貞元七年冬司農卿李模免官初司農當供三官冬菜二千車以度支給車値稍賤又阻雨菜敗模以度支為辭上責其不先聞故免之先是模奏司農菜不足請京兆府市之尹薛珏萬年令韋彤乃禁人私賣上命奪珏俸一月彤俸三月又曰貞元中奚渉為中書舍人以所得襍給均分省内官又躬親庶務下至園蔬皆悉自㸃閲人以為難而渉處之無倦荘子曰仲尼窮於陳蔡之間顏回釋菜孔叢子曰蔬謂之菜金樓子曰秦始皇聞鬼谷先生言因遣徐福入海求金菜玉蔬説苑曰楚文王伐鄧使王子革王子靈共捃菜二子出見老父人戴畚乞焉不與摶而奪之王聞之令拘二子將殺之大夫辭曰取畚信有罪然今殺之非其罪也君若何殺之言卒丈人造軍而言曰鄧為無道故伐之今君公之子摶而奪吾畚無道不甚于鄧乎呼天而號羣臣見之言曰討有罪而横奪非所以禁暴也恃力虐老非所以教㓜也愛子棄法非所以保國也私二子㓕三行非所以從政也又曰楚荘王賜虞丘子菜田三百畆號曰國老以孫叔敖為令尹吕氏春秋曰菜之美者崑崙之蘋壽木之華指姑之東赤木𤣥木之葉餘瞀之南有菜名嘉樹其色若碧桓譚新論曰董仲舒專精於述古年至六十餘不窺園中菜山東六賢傳曰袁卞字叔隰陬慮人種菜一園左右竊取度溝瀆卞乃為之橋其敦義如此漢武内傳曰西王母云仙之上藥有碧海之琅菜孝子傳曰洛陽公輦水作漿以給過者兼補履􅀢不取其直天神化為書生問云何不種菜曰無菜種即與數升公種之化為白璧餘皆為錢公得以娶婦廣州先賢傳曰丁宻蒼梧人非家織布不衣非已種耕菜果不食杜蘭香别傳曰香降張碩賫瓦榼酒七子樏樏多菜而無他味亦有世間常果輙有三種色或丹或紫一物與海蛤相類并有非時菜碩云食之亦不甘然一食七八日不飢荆楚嵗時記曰正月七日謂之人日採七種菜以為羮兩京記曰隋大業六年諸夷來朝請入市交易煬帝許之於是修飭邸店皆甍宇齊正卑髙如一環貨充積人物華盛競崇侈麗至賣菜者亦以龍鬚席藉之魏王花木志曰吳郡邉海諸山悉生紫菜崔豹古今注曰荆揚人謂葅為蕺杜寶大業拾遺録曰徐孝穎性仁孝嘗在園中晝卧見人盗菜徐徐轉身向裏恐偷者見之敦行退讓皆此類也漢張竦奏曰古叛逆之國瀦其宫室以為汙池名曰凶墟雖生菜蔬而民不食韭詩曰四之日其蚤獻羔祭韭禮曰春薦韭韭曰豐本爾雅曰霍山韭今山中多有此菜皆如人家種者説文曰韭菜名一種而久者故謂之韭象形在一上一地也通俗文曰韭根白荄山海經曰遇春山生山韮丹重之山其草多韭穀梁傳曰古者公田為井居竈葱韮盡取焉漢書曰龔遂為渤海太守令民一口種一畦韭晉書曰石崇為客作豈粥嗟咄便辦毎冬得韮䓑音并韲王愷毎以此事為恨乃宻貨崇帳下問其所以答云荳至難煑豫作熟有客來作白粥以投之其韮䓑韲是𢷬韭根襍以麥苗耳又曰温嶠㓕王敦先是童謡曰剪韭剪韭㫁楊柳河東小子令我與子以為賊如韮栁尋得復生也晉書後畧曰成都王圍京邑城中無菜采陳韮芥以為菜齊書曰周顒隐鍾山王儉謂曰卿在山中何所食答曰赤菜白鹽緑葵紫蓼又問何者最佳曰春初早韭秋暮晩菘又曰庾杲之字景行為世祖征虜功曹清貧食唯韭葅􅀢韭生韭襍菜或戲之曰誰謂庾郎貧每食嘗有二十七種菜言三九也三國典畧曰北齊太上後宫無限衣皆珠玉一女嵗費萬金寒月盡食韭芽莊子曰徐無鬼見武侯武侯曰先生居山食芋果厭葱韭今老病欲酒肉之味耶無鬼曰君為萬乗之主以苦一國之民以養耳目鼻口君病矣何勞我乎列子曰老韭為莧老羭為猿魯連子曰市處者僕妾膾炙而食市饒也壅泉沃韭織屨之士從兄弟室父往而不得粗糒焉非愛其僕妾惡其室父也此其饒羡之與不足也説苑曰衞有五丈夫俱負缶入井灌韭終日一區鄧柝過教之曰有機重後輕前命曰桔橰終日溉韭百區丈夫曰有機智必有機心我非不知不欲為也正論曰小民髮如韭剪復生頭如雞割復鳴吏不必可畏從來不可輕奈何欲望刑措乎漢武内傳西王母曰仙次藥有八阮赤韭繆襲祭儀曰春祀和羮芼以韭水經曰交州半樂山多龍穴傍生野韭人往乞者神許則風吹制分隨偃而㧞不得踰越不偃而㧞輙凶也楊􅃷知洛陽茄藍記曰李崇為尚書令儀同三司富傾天下童僕千人而性多儉恡惡衣粗食食常無肉止有韭茄韭葅崇家客李元祐語人曰李令公一食十八種人問其故元祐曰二九十八聞者大笑世以此為譏諸葛亮教張君嗣曰去婦不顧門萎韭不入園以婦人之性草菜之精猶有所耻想忠壯者意何所之太平御覽卷九百七十六
