body:
  text: 太平御覽卷三百七十一宋李昉等撰人事部十二胷膈乳腹背脊脅肋臍腰胷說文曰膺胷也臆胷骨也廣雅曰臆膺胷也釋名曰胷猶啌啌氣所衝啌許江切左傳僖下曰魏犨􅋹僖負羈氏魏犨傷扵胸公欲殺之而愛其材使問且視之病将殺之魏犨束胷見使者曰以君之靈不有寧也距躍三百曲踊三百乃舍之論語摘輔象曰孔子胸應矩是謂儀古春秋演孔圖曰孔胷文曰制作定世符運春秋後語曰荆軻謂樊扵期曰願得將軍之首以獻秦王秦王必喜而見臣臣左手把其袖右手揕其胸漢書曰髙祖與項羽對軍數羽十罪羽伏弩射漢王中胸髙祖詐捫足曰虜中吾指又曰王莽好反膺髙視京房易奴占曰人生子有二胸民謀其主帝王世紀曰禹母吞神珠胷圻而生禹淮南子曰文王洿膺南州異物志曰獠民亦謂文身國刻其胸前作華文以為飾山海經曰結胸國為人結胸郭璞注曰臆前突出如人結喉貫胷國為人胸有竅世說曰王孝伯問王大忱阮籍何如司馬相如王大忱曰阮籍胸中壘塊故湏酒澆之録異傳曰漢武帝時蒼梧賈雍為豫章太守有神術出界討賊為賊所殺失頭雍上馬還營營中咸走来視雍雍胷語曰有頭為佳吏涕泣曰有頭佳雍曰無亦佳言畢遂死志怪集曰石季倫母䘮洛下豪俊赴殯者傾都王戎亦入臨殯便見鬼攘臂打搥鑿甚惶惶有一人當棺立此鬼披胷䧟之此人即應鑿而倒人便去得病半日死故世間相傳不宜當棺由戎所見膈說文曰膈心上膈也釋名曰膈塞也膈塞上下使不與榖氣相亂世說曰桓公有主簿善别酒輙令先嘗好者謂青州従事惡者謂平原督郵青州有齊郡平原有鬲縣従事言至臍督郵言至膈上住乳廣雅曰湩音凍謂之乳說文曰湩乳汁也通俗文曰乳病曰􅂒音丁故反河圖曰蒼帝并乳春秋元命苞曰文王四乳是為含良盖法酒旗市恩舒明宋均曰乳酒也漢書曰張蒼免相後口中無齒食乳以女子為乳母也謝承後漢書曰南陽李善本濟陽李元家奴元遭病死惟有孤孫續有貲千萬奴婢欲謀殺續分其財産善夜抱續逃瑕邱界親自哺養乳為生潼遂至成長吴書曰潁川馮熈使魏辭意不屈魏留之熈懼見廹乃引刀刺中乳房上聞嘉之賜鹽米復其門後漢書曰朱循之為劉義隆司徒従事中郎守滑臺安頡圍之其母在家乳汁忽出號慟告家人曰我年老非復有乳汁之時今忽如此兒必没矣果以其日為頡所擒又曰昭成皇帝諱什翼卧則乳至席齊書曰太祖母陳皇后生太祖二年乳人乏乳后夢人以兩甌麻粥與之覺乳遂大出淮南子曰文王四乳是謂大仁天下所歸百姓所親山海經曰刑天與帝争神帝斷其首遂塟之常羊山乃以乳為目臍為口益部耆舊傳曰蜀郡張寛字叔文漢武帝時為侍中従祀甘泉至渭橋有女子浴於渭水乳長七尺上怪問之女曰帝後第七車者知我所来時寛在第七車對曰天皇主祭祀者齋戒不嚴時則女人見劉欣期交州記曰趙嫗者九真軍安縣女子也乳長數尺不嫁入山聚羣盗遂攻郡常着金㩉蹤屐戰退輙張帷幙與少男通數十侍側刾史吴郡陸𦙍平之王子年拾遺録曰無老國其人皆千嵗百嵗一老齒落髮秃又年少嫗者乳養還復若幼稚神仙服食經曰仙藥有陽丹隂丹隂丹婦人乳汁也婦人十五已上下為月客有身月客絶上為乳汁養性經曰乳者意之府也世說曰武子烝肫肥美異常味武帝怪問何由乃爾云以人乳飲之武帝色甚不平所以飲食未畢便去異苑曰賈充妻郭氏為人凶妬生兒犂民年始二嵗充外入就乳母抱中鳴撮郭遥見謂充愛乳嫗即殺之兒恒啼泣不吃他乳經日遂死郭於是終身無子唐新語曰韓思彦以侍御史廵察于蜀成都有富商兄弟三人分資不平争訴累年不决思彦推案數日令厨者奉乳自飲以其餘賜争者竊相語遂號哭攀援不觧俱言曰侍御豈不以兄弟同乳母耶悲號不自勝請同居如初相書許負曰乳間闊尺富貴足夀乳黒如墨公侯之相腹說文曰腹厚也釋名曰腹複也富也腹胃之屬已自裏盛復扵外複之其中多品似富也自臍以下曰水腹水汋所聚也又曰少腹少小也比臍以上為小也易說卦曰坤為腹離其於人也為大腹尚書盤庚曰今予其敷心腹腎腸歴告爾百姓于朕志左傳宣十三年傳曰楚子圍蕭司馬卯言號申叔展曰有麥􅎘乎曰無有山鞠藭乎曰無河魚腹疾奈何曰目於眢井而出之國語曰叔魚牛腹其母嘆曰必以賄死史記曰薄姬曰昨夜夢蒼龍據妾腹帝曰此貴徴也吾為汝成之一幸生男是為代王史記曰范睢說秦昭王曰伍子胥槖載而出昭闗夜行晝伏至於陵水無以餬其口膝行匍匐稽首肉袒鼔腹吹簫乞食於吴市卒興吴國闔閭為伯東觀漢記曰光武降銅馬諸將未能信賊賊亦兩心上勅賊各歸勒兵上輕騎入賊營賊曰蕭王推心置人腹中安得不投死又曰帝問東平王蒼在家何等最樂對曰為善最樂後詔與諸國述之曰王言甚大副其腰腹矣謝承後漢書曰濟隂戎良字子恭年十八為郡門幹良儀容佳麗太守諸葛禮使冩書従者誣良與婢通良刳腹引出肝腸示禮赤心後漢書曰邊韶字孝先教授數百人韶口辯曾晝眠卧弟子嘲曰邊孝先腹便便嬾讀書但欲眠韶潜聞之應之曰吾以邊為姓先為字腹便便五經笥但欲眠思經義寐與周公通夢静與孔子同意師而可嘲出何典記嘲者大慙魏志曰管輅弟展謂輅曰大將軍待君意厚冀當富貴輅長嘆曰天與我才不與我夀恐四十七八間不克見女嫁男娶吾背無三甲腹無三壬此皆不夀之驗明年四十八卒吴録曰丁固夢腹上生松趙逹謂之曰松字十八公後果然夢門已具齊書曰髙帝為領軍蒼梧王深相猜忌屢欲害帝常帥數十人直入領軍府時暑熱帝晝卧裸袒蒼梧立帝於室内畫腹為射的自引滿将射之帝神色不動歛袂曰老臣無罪蒼梧左右王天恩諌曰領軍腹大是佳射弸而一箭便死後無可復射不如􅐴射之乃取􅐴箭一發即中帝臍蒼梧投弓于地大笑曰此手如何崔鴻十六國春秋後趙録曰佛圖澄腹旁有一孔常以絮塞之每夜書則拔絮孔中出光照於一室又當天時平旦至流水側復腹旁孔中引出五臓六腑洗之訖還内腹中老子曰虚其心實其腹又曰聖人為腹不為目荘子曰夫赫胥氏之時民含餔而熈鼓腹而逰唐子曰人君以江海為腹山為靣如此則下不知其量畏而懐之帝王世紀曰紂刳孕婦之腹中以觀其胎吴越春秋曰子胥鞭平王屍三百右手决其目左足踐其腹京房易占曰人生有二腹其國分王子年拾遺録曰孫䇿每夢腸出委地有神女夜来為其收内腹裏云必生才雄之子方興吴國神女負策母繞吴昌門三匝曰當賜爾此土鼎足于天下談藪曰楊玠娶􅀶陵崔季讓女崔家冨圖籍殆將萬卷成婚之後頗亦逰其書齋既而告人曰崔氏書被人盡盗曾不知覺崔遽令撿之玠捫腹曰已蔵之經笥矣世說曰郝隆七月七日出日中仰卧人問其故答曰我曬腹中書耳又曰張華既貴有少時賔客来候之華與共飲九醖為酣暢其夜醉眠張常飲此酒眠輙使人左右轉側其夜客别忘勅左右而左右依常為張公轉側至明起友人猶不起視之酒果穿腹流床下滂沱又曰劉真長始見王丞相時盛暑之月丞相以腹慰彈碁局曰何乃䛬吴人以冷為䛬或作渹音與鄭相近劉既出人問見王公如何劉曰未見他異惟作吴語耳又曰郄太尉在京日遣門生與王丞相書求女壻丞相語郄信曰君徃東廊下任意選之門生歸白郄云王家諸郎皆可喜聞某来覔女壻咸自矜持惟有一郎在東牀坦腹而食如不聞郄云正好比訪之乃是逸少因嫁女與之俗說曰有人指周伯仁腹曰此中何有答此中洪洞容卿等數百人背說文曰背脊也釋名曰背陪也在後稱也廣雅曰背謂之骶背比也左傳莊公曰齊襄公田于貝邱見大豕従者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼墜于車傷足䘮屨反誅屨於徒人費弗得鞭之見血走出遇賊于門刦而束之費曰我奚禦哉袒而示之背信之費請先入伏公而出鬭死于門中史記曰婁敬說髙祖曰夫與人鬭不搤其亢張晏曰亢喉嚨也拊其背未能全勝也今陛下入闗而都秦之故地此亦搤天下之亢而拊其背又曰蒯通知天下權在韓信說之曰相君之靣不過封侯相君之背貴不可言漢書曰吴王濞髙帝兄仲之子上患吴㑹輕悍無壮王鎮之乃立濞為吴王王三郡五十二城髙祖召濞相之曰爾状有反相因拊其背曰漢帝後五十年東南有亂豈非若耶天下一家慎無反濞頓首曰不敢又曰武帝過平陽主既飲謳者進帝起更衣子夫侍尚衣軒中得幸還坐忻甚賜平陽主金千斤主因奉子夫送入宫子夫上車主撫其背曰行矣强飲勉之即貴願無相㤀元朔元年生男懅遂立為皇后後漢書曰越騎校尉伍子孚怒董卓兇毒乃朝服懐刃見卓語畢辭去卓送至閣以手撫其背孚因出刃刺之不中卓自奮得免呼左右執殺孚魏畧曰孟達降文帝乗小輦執手撫其背戱之曰卿得無為𤣥徳刺客耶又曰太祖丁夫人養劉夫人子脩脩亡於穰丁常言将我兒殺之遂哭泣無節太祖忿之遣歸家後太祖就見之夫人方織踞機如故太祖拊其背曰􅂅我共載歸乎夫人不應太祖却行户外遂不應太祖曰真决矣遂與之絶吴志曰魯肅代周瑜之當陸口過吕蒙屯下肅常輕蒙蒙問肅君受重任與雲長為鄰将何計畧以備不虞肅造次應曰臨時施宜蒙曰今東西雖一家而雲長實熊虎因為畫五策肅扵是越席就之拊其背曰吕子明吾不知卿才畧所及扵此車頴秦書曰苻堅生肩背赤色隐起状若篆文苻因為苻氏又曰堅背文曰草付之祥因為苻氏唐書曰貞觀四年制决罪人不得鞭背以明堂孔宂針灸之所又曰吕温者以小吏事崔漢衡貞元初吐蕃背盟漢衡為吐蕃所虜將殺之温趨徃以背受刃吐蕃義之由是與漢衡俱免尸子曰醫􅀈者秦之良醫為宣王割痤為恵王治痔皆愈張子之背腫謂􅀈曰背非吾背也子製焉醫􅀈善治疾張子委製焉夫為身與國亦由此必有所要製然後治矣􅀈音叩孔叢子曰仲尼龜背帝王世紀曰簡翟浴𤣥邱之水燕遺卵吞之剖背生契白虎通曰傳稱周公背僂是謂强後成就周道輔相幼王又孫卿子曰周公傴背不伸也􅀶物志曰宋有田夫自曝背於日其妻曰負日之暄今獻必蒙重賞田夫曰昔人有美戎菽甘芹子獻之鄉豪常苦於口笑而棄之論衡曰書言齊桓公負婦人以朝諸侯管仲曰吾君背疽瘡不得婦人瘡不愈此虚也桓公設庭燎夜坐以致賢士豈反以白日負婦人於背乎幽明録曰王子猷先有背疾子敬疾篤恒禁来徃聞子敬亡撫心悲惋都不一聲背即潰裂脊說文曰脊背胎也釋名曰脊積也積續骨節總上下也春秋元命苞曰陽立扵三故人脊三寸而結宋均曰結即吉也孝經鈎命决曰仲尼龜脊墨子曰周宣王殺其臣杜伯不􅇳後三年王田扵圃田車徒滿野杜伯乗白馬素車衣朱衣朱冠弓矢射王車上中心折脊王殪車中伏韔而死脅說文曰骿并脅也膀兩脅旁也従肉劦聲通俗文曰腋下謂之脇釋名曰脅挟也在兩旁臂所挟也春秋元命苞曰隂極於八故人旁八幹長八寸又曰顓頊駢幹上法月㕘集成紀以理隂陽左傳僖中曰晉公子重耳及曹曹共公聞其駢脇欲觀其躶浴薄而觀之公羊傳曰齊公子彭生送魯莊公拉脇而殺之也史記曰范睢先事魏中大夫須賈賈使齊睢従齊王聞睢辨賜金及牛湏賈以為睢持隂事告齊既歸以告魏相魏大怒使人笞擊睢折脇摺齒佯死棄扵厠吴志曰曹仁攻圍甘寧周瑜救寧圍觧乃渡屯北岸尅期大戰瑜跨馬畧陣㑹流矢中右脇瘡甚便還後仁聞瑜卧瘡未起勒兵就陣瑜乃自輿按行激揚吏士仁遂退晉書曰周顗在中朝時能飲一石及過江雖醉每稱無對偶有舊對従北来顗亦出二石酒共飲各大醉及顗醒使視客已腐脅而死世本曰陸終娶于鬼方氏之妹謂之女嬇生六子孕而不育三年啓其左脇三人出焉啓其右脇三人出焉王充論衡曰張儀駢脇卒相秦魏外國圖曰大秦國人長脅肋釋名曰肋勒也檢肋五蔵也廣雅曰幹謂之肋竹林七賢論曰劉伶嘗醉與俗人相忤其人攘袂而徃必欲歐之伶頋而笑曰雞肋不足以安尊拳臍說文曰臍肚臍也釋名曰臍劑也腸端之所限劑也春秋元命苞曰臍者下流並會合為臍腹宋均曰臍中也四方並湊者也左傳莊公曰楚文王過鄧鄧祁侯享之三甥曰亡鄧國者必此人也若不早圖後君噬臍若齧腹臍喻不可及後漢書曰董卓既誅乃尸於市天時始熱卓充肥脂流於地守尸吏燃火置卓臍中光明達曙如是積日漢晉陽秋曰齊王冏之方盛也有婦人詣大司馬門求寄産吏詰之婦人曰我截臍罷便去耳有識者聞而惡其言南燕録曰慕容徳其母夢日入臍中晝夜而生徳莊子曰支離䟽頥於臍笑林曰趙伯翁肥大夏日醉卧孫兒縁其肚上戯因以李八九枚内臍中至後日李大爛汁出乃泣謂家人曰我腸爛將死明日李核出乃知孫兒所内李子也腰說文曰腰身中也釋名曰腰約也在體之中約繼而小也春秋元命苞曰􅆎而上者為天尊髙陽之状腰而下者為隂豐厚地之重數合扵四故腰周四尺後漢書曰東平憲王蒼腰帶八圍顯宗甚重之詔曰日者問東平王處家何等最樂王曰為善最樂其言甚大副是腰腹矣又曰梁冀妻能作折腰歩晉書陶潛傳曰不能為五斗米折腰事鄉里小兒干寳晉紀曰中書令李豐謀廢大將軍世宗使舍人王羡請之豐来辭不遜左右以刀環築腰死南史曰羊侃有妓張净婉腰一尺六寸能掌中舞孫荆玉能反腰帖地銜得地上簮二石偽事曰石虎攻中山得鄭畧之妹為妻至相敬待無兒鄭復生男崔求養鄭不許一月卒病死鄭䜛崔謂妾多養胡子虎時踞胡床扵庭中大怒索弓箭崔聞欲殺之徒跣至虎前曰公勿枉殺妾乞聴妾言虎不聴但言促還坐無預卿崔便去未至坐虎于後射之中腰而覆墨子曰楚靈王好士細腰故其臣皆三飯為節脇息然後帶扶牆然後起韓子曰楚靈王好細腰國有餓死人尸子曰楚莊王好細腰一國皆有饑色西京雜記曰趙后體腰柔弱善行歩進止女弟昭儀不能及也太平御覽卷三百七十一
