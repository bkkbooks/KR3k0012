  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_489-1a, image: WYG0897/WYG0897-0423c.png}
body:
  text: 太平御覽卷四百八十九宋李昉等撰人事部一百三十别離毛詩曰出宿于泲飲餞于禰又曰申伯言邁王餞于郿又曰挑兮逹兮在城闕兮一日不見如三月兮又曰燕燕于飛差池其羽之子于歸逺送于野瞻望弗及泣涕如雨又曰送子涉淇至于頓丘又曰我送舅氏曰至渭陽又曰顯父餞之清酒百壺又曰有女仳離慨其歎矣禮記曰嫁女之家三夜不息燭思相離也左傳昭十六年鄭六卿餞宣子於郊宣子曰二三子請賦詩起亦以知鄭志子􅚖賦野有蔓草子産賦羔裘子太叔賦褰裳子游賦風雨子旗賦有女同車子柳賦蘀兮宣子喜曰二三子以君命貺起賦不出鄭志二三君子皆數世之主也家語曰孔子去周而老子送之曰吾聞富貴送人以金仁者送人以言吾雖不能富貴而竊仁者之號請送子以言凡當世之聰明深察而近於死者好議人者也博辨宏大而危其身者好發人之惡者也孔子曰敬奉教矣又曰孔子在衛晨興顔淵侍有哭者甚哀囘曰此哭非獨哀死又悲生離也孔子曰何以知之對曰囘聞恒山之鳥生四子焉羽翼既成將分離悲鳴以相送哀有類於此矣史記曰魯人或惡吳起曰起之為人猜忍人也其少時家累千金將仕不遂遂破其家鄉黨笑之起殺其謗己者三十餘人而東出衛郭門與其母訣齧臂而盟曰起不為卿相不復入衛又曰貳師將軍李廣利將兵擊匈奴丞相劉屈氂為祖道送渭橋與廣利别又曰疏廣疏受父子並為皇太子師傅朝廷以為榮在位歲乆廣謂受曰吾聞知足不辱知止不殆功遂身退天之道也今仕宦至二千石宦成名立如此不去懼有後悔即日父子俱稱病乞骸骨上以其年篤老皆許之加賜黄金二十斤皇太子賜以五十斤公卿大夫故人邑子為設祖道供帳東都門外蘇林注曰長安東郭門外送者車數百輛辭訣而去及道路觀者皆曰賢哉二大夫或歎息為之下泣又曰肅宗遣諸王歸國帝特留東平王蒼賜以秘書列圖道術秘方至八月飲酎畢有司復奏遣蒼乃許之手詔賜蒼曰骨肉天性誠不以逺近親疎然數見顔色情重昔時中心戀戀惻然不能言於是車駕祖送流涕而訣復賜乗輿服御珍寳輿馬錢布以億萬計又曰赤眉兵盛乃拜鄧禹前將軍持節西征自選可與俱者於是凡將六將軍吏二萬人禹辭訣上自従輕騎數百送至野鄧禹不能定赤眉乃遣馮異代禹討之車駕送至河南賜以乗輿七尺劒勅異曰諸將非不能健鬭然好虜掠卿本能御吏念自修飭無為郡縣所苦異頓首受命又曰東平王蒼朝京師月餘還國帝臨送歸宫悽然懷思乃詔遣使詣國辭别之後獨坐不樂因就車歸伏軾而吟誦及採菽以增歎息又曰第五倫年少諸家惟令詣郡尹鮮于裒見而異之署為吏後裒坐事徵臨去握倫臂訣曰恨相知之晚又曰申徒蟠為太尉黄瓊所辟不就及瓊卒歸葬江東四方名豪㑹帳下六七千人談論莫有及蟠者惟南郡一生與相酬對既别執蟠手曰君非聘則徵如是相見於上京矣蟠勃然作色曰始吾以子為可與言何乃拘教樂貴之徒耶因振手而去魏志曰夏侯惇薨以曹休為鎮南將軍假節都督諸軍事車駕臨送下輿執手而别吳志曰魯肅代周瑜過吕蒙酒酣蒙問肅曰君受重任與蜀兵為鄰將何計畧以備不虞肅應曰臨時施宜蒙因為畫五策肅於是越席就之拊其背曰吕子明吾不知卿才畧所及至于此也遂拜蒙母結友而别又曰劉繇亡於豫章孫策命太史慈徃撫安之左右皆曰慈必北去不還策曰子義舎我尚復與誰餞送昌門把腕别曰何時能還答曰不過六十日果如期而返晉中興書曰王澄嘗之荆州送者傾邑所别處樹上有鵲巢澄便脫衣著犢鼻上樹探鵲􅑹而弄之傍若無人晉中興書曰衛玠兄璪時為散騎侍郎内侍懐帝玠以天下將亂移家南行母曰我不能舎仲寳而去也玠啓喻深至為門户大計母涕泣従之臨别玠謂璪曰在三之義人之所重今可謂致身命之日兄其勉之乃扶將老母轉至豫章而洛城失守璪沒焉沈約宋書曰王𢎞字方平家貧而好山水求為烏傷令尋以病歸桓謙以為衛軍參軍時殷仲文還姑孰祖送傾朝謙要𢎞同行答曰凡祖離送别必在有情下官與殷風馬不接祖送無從謙貴其言又曰張敷音儀詳緩與人别執手曰念相聞後魏書曰南安王禎復封南安王後為鎮北大將軍相州刺史帝餞禎華林都亭詔左右賦詩不能者並可聴射當使武士彎弓文人下筆帝送禎下堦流涕而别續齊諧記曰京兆田真三人分財堂前有紫荆花葉茂異共議破為三分明截之爾夕樹即枯死真見之驚謂弟曰花本同株當分折枯悴况人兄弟孔懐而可離異是不如樹也兄弟相感更合吳錄曰朱桓還屯濡須權祖之桓奉觴曰臣當逺去願一捋陛下鬚無所復恨權憑几前席桓進捋鬚曰臣今日真可謂捋虎鬚者權大笑吳越春秋曰越王勾踐伐吳將與大夫范蠡入臣於吳羣臣皆送浙江大夫文種前為祝其辭曰皇天佑助先沉後揚禍為徳根憂為福堂許邁别𫝊曰邁好養生遣妾歸家東逰採藥於桐廬山欲斷榖以山近人不得専一移入臨安自以無復返期乃改名逺逰書與婦别管輅别傳曰諸葛樂與輅别戒以二言卿性樂酒雖温克然不可保寧當節卿相有水鏡之才所見者妙福如膏火不可不慎持節散才逰於雲漢之間不受富貴也輅言酒不可極才不可盡吾欲持酒以禮持才以愚何患之有耶穆天子𫝊曰天子觴西王母瑶池之上王母謡曰白雲在天山川間之荆州圖曰襄陽縣南陸道六里有林館是餞行送歸之所江表𫝊曰孫權乗飛雲大船與張昭秦松魯肅十餘人共送周瑜大宴㑹叙别昭等皆出權獨與劉備留語因言次歎瑜曰公瑾文武籌畧萬人之英顧其器量廣大恐不乆為人臣耳李陵别𫝊曰陵與蘇武書曰男兒生不成名死必葬蠻夷中耳誰復能屈伸稽顙還向北闕使刀筆吏弄其文墨邪願足下勿復望陵嗟乎子卿知復何言相去萬里人絶路殊生為别離之人死為異域之鬼文士𫝊曰張翰到京師時齊王冏擅權翰謂同郡人顧榮曰天下紛紛未已夫有四海之名者求退難吾本山林間人無望於時去矣子善以明防前以智慮後榮捉其手愴然歎曰吾亦思汝採南山蕨飲三江水耳翰遂稱疾徑歸府以翰輙去除吏名世說曰杜預屯荆州頓七星橋朝士悉祖之又曰阮籍嫂嘗歸家籍相見與别人或譏之曰禮豈為我輩設耶裴淵廣州記曰尉佗築臺以朔望升拜號為朝臺即岡傍江構起華館以送陸賈因稱朝亭語林曰殷公北征朝士出送之軍容甚盛儀止可觀陳說經畧攻取之宜衆皆謂必能平中原將别忽馳逞才自盤馬遂墜地士以是知其必敗又曰有人詣謝公别謝公流涕人了不悲既去左右曰向客殊自宻雲謝公曰非徒宻雲乃自旱雷吕氏春秋曰吳起行魏武侯自送之西河而與起辭武侯曰先生將何以治西河對曰以忠以信以仁以義武侯曰四者足矣郭子曰周叔治為晉陵謨子叔治光祿大夫西平貞侯頴弟周侯仲智送之周侯名顗字伯仁仲智名嵩次弟也叔治將泣涕不止仲智恚之曰困人及婦人别惟知啼便捨去周侯獨留與飲酒言語臨别流涕撫其背曰阿奴自愛孔藂子曰子髙逰趙平原君客有鄒文李節者與相友善及將還魯諸故人訣既畢文節送行三宿臨别文節流涕交頤子髙徒握手而已分背就路其徒問先生與彼二子善彼有戀戀之心而先生厲聲髙揖無乃非親之謂乎髙曰始吾謂此二子丈夫耳乃今其婦人人生其有四方之志豈鹿豕哉而常羣聚乎其徒曰若此二子泣非耶髙答曰斯二子良人也有不忍之心其於斷必不足矣又曰竇皇后弟廣國曰姊去我西時與我訣於𫝊舎中沐我而去又曰成帝遣定陶王之國王辭去上與相對涕泣而訣琴操曰商陵牧子娶妻五年無子父兄將欲與改娶妻聞中夜驚起倚户悲嘯牧子聞援琴鼓之痛恩愛永離歎别鶴以舒情故曰别鶴操古詩曰行行重行行與君生别離相去萬餘里各在天一涯道路阻且長㑹面安可期胡馬嘶北風越鳥巢南枝相去日已逺衣𢃄日已緩棄捐勿復道努力加飡飯李陵贈蘇武詩曰携手上河梁逰子暮何之徘徊岐路間悵悵不能辭行人難乆留客言長相思安知非日月弦望自有時努力崇明徳皓首以為期又曰仰視浮雲馳奄忽互相踰風波一失路各在天一涯又曰昔為鴛與鴦今為參與商又曰二鳬俱北飛一鳬獨南翔子當留斯土我獨歸故鄉蘇武贈李陵詩云黄鵠一逺别千里影徘徊古詩曰客從逺方來遺我一書札上有長相思下言久離别置書懷袖中三歲字不滅江淹别賦曰黯然消魂者惟别而已矣楚辭序曰離别也騷愁也經徑也言已放逐離别中心愁思猶陳道徑以諷諫君又曰草木揺落而變衰憭慓兮若在逺行登山臨水送將歸又曰悲莫悲兮生别離太平御覽卷四百八十九
