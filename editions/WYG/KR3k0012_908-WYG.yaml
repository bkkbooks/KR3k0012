front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_908-1a, image: WYG0901/WYG0901-0097a.png}
body:
  text: 太平御覽卷九百八宋李昉等撰獸部二十貔熊羆猰窳􅓔貘騊駼猩猩􅍛􅍛風母豻蹷貔爾雅曰貔白狐其子豰郭璞注曰一名執夷虎豹之屬豰許卜切説文曰貔豹屬出貉音陌國尚書曰如虎如貔如熊如羆毛詩曰獻其貔皮赤豹黄羆禮記曲禮曰前有摰獸則戴貔貅莊子曰豐狐文貔搏於山林伏於岩穴夜行晝居求食江湖之上韓子曰虎貔不用爪牙與鼢䑕同威毛詩草木蟲魚䟽曰貔似虎或曰似熊一名執夷一名白狐其子為豰遼東人謂之熊羆熊說文曰熊獸似豕山居春出冬蟄詩義䟽曰熊䏻攀縁上髙樹見人則顛倒投地而下冬入穴而蟄始春而出孝經援神契曰赤熊見則姦佞自逺本草經曰熊脂一名熊白味甘微温無毒主治風痺穆天子傳曰舂山百獸所聚也爰有赤豹熊羆瑞獸也六韜曰文王囚羑里散宜生受命而行宛懐條塗之山有黄熊得而獻於紂左傳曰晉靈公使宰夫胹熊蹯不熟殺之寘諸畚載以過朝又曰楚子將以商臣為太子令尹子上諫之不聽又欲立王子職而黜商臣啇臣以宫甲圍成王王請食熊蹯而死弗聽王縊死注熊蹯難熟兾外救也史記曰趙簡子病不知人五日而寤曰我之帝所見一熊欲攫我帝命我射之中熊熊死有當道者曰帝令主君滅晉二卿熊其祖也漢書曰昌邑王賀在藩邸見熊以問左右左右皆答不見又曰孝元帝馮昭儀上幸虎圏閲獸後宫皆坐熊出圏攀檻欲上殿昭儀乃當熊而立及左右格殺熊上問人情驚懼何故當熊昭儀曰夫猛獸得人而止妾恐熊至御坐故身當之耳帝嗟嘆以此倍敬重之淮南子曰愛熊而食之鹽愛獺而飲之酒雖欲養之非其道也熊食鹽而死獺飲酒而敗故曰非其道也周書王㑹曰成王時不屠國獻青熊一孟子曰魚我所欲熊掌亦我所欲二者不可得兼舎魚而取熊掌生亦我所欲義亦我所欲二者不可得兼舎生而取義列子曰黄帝戰扵阪泉帥熊驅虎為前驅纒子曰桀王天下酒濁而殺厨人紂王天下熊蹯不熟而殺厨人抱朴子曰玊䇿記稱熊壽五百歳五百歳則能化𤨏語曰晉平公夢見赤熊闚屏惡之而有疾使問子産子産曰昔共工之御曰浮逰既敗於顓頊自沒沉淮之淵其色赤其言善笑其行善頋其状如熊常為天下􅑂見之堂上則王天下者死見堂下則邦人駭見門近臣憂見庭則無傷窺君之屏病而無傷祭顓頊共工則瘳公如其言而疾間魏略曰大秦國出文熊赤螭建武故事曰咸和七年左右啓以米飴熊上曰此無益而費米穀且是惡獸所不宜畜遣使打殺以肉賜左右直入異苑曰邵陵髙平黄秀以元嘉三年入山經月不還其兒根生尋覔見蹲空樹中従頭至腰毛色如熊問其何故荅曰天譴如此汝但自去生哀慟而歸逾年人見其形盡為熊矣又曰熊獸蔵於山穴穴裏不得見穢及傷殘見則舎穴外死續捜神記曰晉升平中有人入山射鹿忽墮一坎窅然深絶内有數頭熊子須臾有一大熊来入瞪視此人人謂必欲害己良久出蔵果分扵諸子末後作一分着此人前人飢久於是冐死取噉之既轉相狎熊母每出覔食果還輙分此人人頼以支命後熊子大其母一一負將出子既盡人分死坎中窮無出路熊母尋復還入坐人邉人解意便抱熊之足於是跳出遂得無他又曰熊無穴或居大樹孔中東土呼熊為子路以物擊樹云子路可起於是便下不呼則不動也羆爾雅曰羆如熊黄白文郭璞注曰似熊而長頭髙脚猛憨多力能㧞樹木闗西呼為假熊捜神記曰赤羆見姦宄息佞人離則出山海經曰蟠冡之山其獸多羆尚書禹貢曰熊羆狐狸織皮詩曰吉夢維何維熊維羆男子之祥詩蕩韓奕曰獻其貔皮赤豹黄羆毛詩草木蟲魚䟽曰黄羆大如熊脂如熊白而粗理史記曰趙簡子疾夢之帝所聽鈞天之樂次射殺熊又有一羆来亦殺之天帝甚喜晉書載記曰苻健字業洪第三子也初母姜氏夢大羆有孕長而勇果北史曰齊神武遣韓軌司馬子如従河東宵濟襲王熊羆熊羆不覺比曉軌衆已乘梯入城羆尚卧未起聞閣外匈匈有聲便袒身露髻徒跣持一白挺大呼而詬曰老羆當道卧驩子那敢敵衆見驚退猰窳爾雅曰猰窳類􅓔虎食人迅走海内經曰猰窳龍首而蛇身人面居於弱水中食人山海經曰小咸之山有獸其状如牛而赤身人面馬足名曰猰窳其音如嬰兒食人淮南子曰堯時猰窳為民害堯乃使羿殺之􅓔爾雅曰􅓔似狸捜神記曰江漢之域有􅓔人其先禀君之苖裔也能化為虎長沙所屬蠻縣東髙居民作檻捕虎得一亭長赤幘大冠在檻中問其故亭長大怒曰昨忽被縣召避雨遂誤入此中於是即出之乃化為虎上山俗云􅓔虎化為人好着葛衣其足無踵虎有五指者皆是􅓔貘莫格切爾雅曰貘白豹也説文曰貘似熊黄色出蜀廣志曰貘大如驢色蒼白䑛鐡消十觔其皮温煗抱朴子曰劉子知二員之詩東方生識啖鐡之獸實類鳥魚之書大荒之籍矣神異經曰西荒之中有人焉頭如人着百結敗衣手足虎爪名曰貘􅀈音為伺人獨自輙徃就欲食人腦或舌出盤地丈餘人先聞聲燒大石投舌上於是而死騊駼上音陶下音途周書曰正北空桐槖駞騊駼為獻爾雅曰騊駼馬郭璞注曰出山海經其色青説文曰騊駼野馬之良也史記曰匈奴竒畜則騊駼廣志曰騊駼匈奴名馬也山海經曰北海内有獸焉其状如馬名曰騊駼猩猩爾雅曰猩猩小兒啼禮記曰猩猩能言不離禽獸春秋説題辭曰猩猩者矜精者也故能言可使陽烈之類以檢下宋均曰矜謂使人自矜莊精審也猩猩言説人善惡是陽氣之烈好善而惡惡佐王者所以檢下也廣志曰猩猩似狟音丸聲如兒啼不聞其言出交阯封溪縣山海經曰有獸人面名曰猩猩又曰猩猩知人名其為獸如豕而人面山海經讃曰猩猩似狐走立行伏懷木挺刀少辛明目華陽國志曰永昌郡有猩猩能言其血可以染朱􅄢孫卿子曰猩猩能言笑亦二足無毛而君子啜其羮食其肉故人非以二足無毛以知禮也吕氏春秋曰伊尹説曰肉之美者猩猩之唇淮南畢萬術曰歸終知来猩猩知徃注曰歸終猩猩並神獸括地圖曰猩猩人面豕身知人名蜀志曰封溪縣有獸曰猩猩體似猪靣如人音作小兒啼聲既能語又知人姓名人知以酒取之猩猩覺初暫嘗之得其味甘而飲之終見覊縳也酈善長注水經曰西蜀封溪縣猩猩人靣獸形如人言語南方草木状曰猩猩之獸生在野中状如㹠子民人捕取交阯武平興古有之晉郭璞猩猩讃曰能言之獸是謂猩猩厥状似貛號音若嬰自然知往頗測物情􅍛􅍛爾雅曰􅍛􅍛如人被髪迅走食人説文曰􅍛􅍛人身反踵笑即上唇掩其目一名梟羊北方謂之土螻山海經曰􅍛􅍛如人面唇黑身有毛反踵見人則笑笑則上唇掩目交廣及南康山中有大者丈餘俗呼為山都山海經圖讃曰􅍛􅍛怪獸被髪操竹獲人則笑唇盖其目終亦號咷反為我戮吳都賦曰猩猩啼而就禽􅍛􅍛笑而被格風母十洲記曰炎刑有風母獸似豹青色大如猩猩燒之不死斫刺不入以鐡椎鍜其頭乃死以其口向風須臾活以石上菖蒲塞其鼻即死取其腦菊華和服之盡十觔壽百歳南洲異物記曰風母獸一名平猴狀如猴無毛赤目若行逄人便叩頭状如懼罪自乞人若撾打之惬然死地無復氣息少得風吹須臾能起抱朴子曰内篇曰風母獸似豹青色大如猩猩生南海大林中張取積薪數車以燒之薪盡此獸在灰中其毛不脱斫刺不入打之如皮嚢以錐鍜其頭數十乃死嶺南異物志曰風母如猿猴而小書則踡伏不能動夜則騰躍甚疾好食蜘蛛蟲打殺以口向風復活微破腦不復生矣以酒浸愈風疾南人得之傳云此獸常持一小杖遇物則指飛走悉不能去人有得之者所指必有獲夷人施罟網既得其獸不復見其杖杖之數百乃肯為人取出或云邕州首領寗洄得之洄資産巨萬僮伎數百洄甚秘其事豻音岸説文曰豻北地野狗也異物志曰豻猿屬頭形正方鬈長尺餘皆蒼色犬類似人欲有所視輒揺頭兩手披髪不爾則覆鄣其兩目衣毛皤皤若披狐裘木居洄蔵宻向乃得見耳蹷爾雅曰西方有比肩獸與卭卭矩􅀈比焉其名曰蹷孫子曰北方有獸其名曰蹷前足䑕後足兎是獸也甚矣其愛蛩蛩巨虚也食得甘草必齧以遺蛩蛩巨虛蛩蛩巨虛見人将来必負蹷以走蹷非性心愛蛩蛩巨虛也為假足也二獸者亦非性心愛蹷也為其得甘草而遺之故也太平御覽卷九百八
