  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_203-1a, image: WYG0894/WYG0894-0776a.png}
body:
  text: 太平御覽卷二百三李昉等撰職官部一縂敘官禮記曰有虞氏官五十夏后氏官百殷二百周三百天子立六官三公九卿二十七大夫八十一元士以聴天下之外治以明章天下之男教又王制曰天子百里之内以共官千里之内以為御謂此地之田稅所統也千里之外設方伯五國以為属属有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯八州八伯五十六正百六十八帥三百三十六長八伯各以其属属於天子之老二人分天下以為左右曰二伯左傳昭十七年郯子来朝公與之宴昭子問焉曰少皥氏以鳥名官何也少皥金天氏黃帝子已姓之國也問何故以鳥為官也郯子曰吾祖也我知之昔黄帝氏以雲紀故為雲師而雲名黄帝軒轅氏姬姓之祖也黄帝受命有雲瑞故以雲紀事百官師長皆以雲為名號也炎帝氏以火紀故為火師而火名神農姜姓之祖也有火瑞故以火紀事名官也共工氏以水紀故為水師而水名共工以諸侯霸九州者在神農前太昊後亦受水瑞以水名官也太皥氏以龍紀故為龍師而龍名太皥伏羲氏風姓之祖也有龍瑞故以龍名官也我高祖少皥摯之立也鳯鳥適至故紀於鳥為鳥師而鳥名自顓頊以来不能紀逺而紀於近為民師而命以民事則不能故也又曰國家之敗由官邪也官之失徳寵賂彰也尚書尭典曰乃命羲和欽若昊天厯象日月星辰敬授人時羲氏和氏世掌天地四時之官使敬順天時以授人也分命羲仲宅嵎夷曰暘谷羲仲居治東方之官也東表之地稱嵎夷寅賔出日平秩東作使敬導出日也平均次序東作之事以務農也申命羲叔宅南交羲叔居治南方之官南交言夏與春交平秩南訛敬致訛化也平序南方化育之事敬行其教以致其功分命和仲宅西曰昧谷居治西方之官寅餞納日平秩西成餞送也西方萬物成平序其政以成物也申命和叔宅朔方曰幽都平在朔易都謂所聚也易謂嵗改易於北方平均在其政以順天常允釐百工庶績咸熈定四時成嵗以告時授事則衆功廣也又舜典曰咨四嶽有能奮庸熙帝之載奮起也有能起發其功廣堯之事也使宅百揆亮采惠疇亮信惠順也使居百揆之官信立其功以順其事者也僉曰伯禹作司空伯禹為天子司空治水有功言可用也帝曰俞咨禹汝平水土惟時懋哉稱禹前功以命之惟居是百揆勉行之禹拜稽首讓于稷契暨臯陶帝曰俞汝往哉不許其讓使往宅百揆又曰成王既黜殷命滅淮夷還歸在豐作周官王曰若昔大猷順古大道制治于未亂保邦于未危曰唐虞稽古建官惟百内有百揆四岳外有州牧侯伯庶政惟和萬國咸寧夏商官倍亦克用乂禹湯建官二百亦能用治言不及唐虞之清要今予小子祗勤于徳夙夜不逮立太師太傅太保兹惟三公論道經邦燮理隂陽少師少傅少保曰三孤貳公𢎞化寅亮天地敬信天地之數冢宰掌邦治統百官均四海司徒掌邦教敷五典擾兆民擾安也宗伯掌邦禮治神人和上下司馬掌邦政統六師平邦國司寇掌邦禁詰奸慝刑暴亂司空掌邦土居四民時地利士農工商使順天時六卿分職各率其属以倡九牧阜成兆民以倡導九州牧伯為政大成兆民之性命又曰俊乂在官俊傑出衆之士皆在官百僚師師百工惟時僚工皆官也師師相師法百官皆是言政毋非撫于五辰庶績其凝言五官皆順五辰之時衆功皆成又曰無曠庶官天上人其代之位非其人為空官言人代天理官不可以天官私非其才又曰任官惟賢才左右惟其人臣為上為徳為下為民言臣奉上布徳順下訓民不可以所私任非其才又曰官不及私昵惟其能不加私昵惟能是官爵罔及惡徳惟其賢非賢不爵周禮曰惟王建國辨方正位體國經野設官分職以為民極極中也令天下之人各得其中又周官曰宗伯以九儀之命正邦國之位一命受職受職治事再命受服受服受衣服為上士三命受位列位于王臣也王之上士亦三命也四命受器受祭器為上大夫也五命受則則法也六命賜官比王六命之卿賜官者使得自置其治家如諸侯也臣七命賜國出就侯伯之國八命作牧謂諸侯有功徳者加命得専征伐於諸侯九命作伯上公有功徳者加命為二伯得征伐五侯九伯也鄭司農云長諸侯為方伯也尚書大𫝊曰古者天子三公每一公三卿佐之每一卿三大夫佐之毎一大夫三元士佐之故有三公九卿二十七大夫八十一元士所與為天下者若此而已自公之元士凡百二十此夏時之官也家語曰古之御天下者以六官縂治焉冢宰之官以成道治官所以成道司徒之官以成徳教官所以成徳宗伯之官以成仁禮官所以成仁司馬之官以成聖政官所以成聖聖通官政所以平通天下司寇之官以成義刑官所以成義司空之官以成禮事官所以成禮也非是虛立也六官在守以為轡東觀漢記曰更始所置官爵多羣小長安為之語曰竈下養中郎将爛羊胃騎都尉爛羊頭關内侯後漢書曰建武六年詔曰百姓遭難户口耗少而官吏尚繁於是司𨽻州牧條奏并省有四百餘縣吏職減損十置其一漢舊儀曰古法雖聖猶試故設四科之辟一科曰徳行髙妙志節清修二科曰學通行脩經中博士三科曰明曉法令足以決疑能案章覆問文中御史四科曰剛毅多畧遭事不惑明足以昭姦勇足以決斷才任三輔令皆試以其能然後官之後漢書曰天興元年置八部大夫散騎常侍待詔等官其八部大夫於皇城四維面置一人以擬八坐謂之八國常侍侍置左右出入王命三年置八博士官典煑煉百藥天錫元年八月初置六謁官准古六卿其秩五品属官有大夫秩六品大夫属官有元士秩七品元士属官有置令長秩八品令長属官有署丞秩九品又減五等之爵始分為四曰王公侯子除伯男二號初帝欲法純質每於定制官號多不依周漢舊名或取諸身或取諸物或以民事皆擬逺古雲鳥之義諸曹走使謂之鳬鴈取飛之迅疾也以伺察候占官謂之白鷺亦取其延頸逺望也自餘之官義皆類此神瑞元年春置八大夫官大夫下置三属官縂理萬機故世號八公太帝二年夏置六部大人官有天地東西南北部皆以諸侯為之大人置三属官自太祖至高祖其内外百官屢有減置或出當時不為常制如萬騎飛鴻常忠直意将軍之徒是也賈誼新書曰王者官人有六等一曰師二曰友三曰大臣四曰左右五曰侍御六曰厮役知足以為源泉行足以為儀表問焉則應求焉則得者謂之師知足以為礲礪行足以為輔助明於進賢敢於退不肖内相匡正外相揚美謂之友智足以謀國事行足以為民率仁足以合上下之忻國有法則退而守之君有難則與民死之者大臣也修身正行不愆於鄉曲言語談説不怍於朝廷智䏻不困於事業服一介之使能合兩君之歡執㦸居能舉君之過失不難以死持之者左右之臣也不貪於財不淫於色事君不敢有二心居則不敢泄君之謀君有過失雖不能正諫以其死持之而愁悴有憂色者侍御之臣也唯諛之行唯言之聼睚眦之間事君者厮役也通典曰唐開元年刋定職次著之為格盖尚書省以統㑹衆務舉持綱目門下省以侍從獻替規駮非宜中書省以獻納制册敷揚宣勞秘書省以監録圗書殿中省以供修膳服内侍省以承㫖奉引尚書門下中書秘書殿中内侍凡六省肅清僚庶九等太常光禄衛尉宗正太僕大理鴻臚司農大府為九等五監少府将作國子軍器都水為五監以分理羣司六軍左右羽林左右龍武左右神武為六軍十六衞左右衞左右驍左右武左右威左右領軍左右金吾左右監門左右千牛為十六衞以嚴禁籞太子官一詹事二春坊有左右春坊又有内坊掌聞内事三寺守令率更太僕寺十率左右衞左右司禦左右清道左右監門左右内府凡十率俾有儲宫牧守督護分臨畿服京府置牧餘府州置都督都䕶太守説苑曰應侯與賈子坐聞有鼓琴之聲應侯曰今之琴一何悲也賈子曰夫張急調下故使之悲耳急張者良材也調下者官卑也取夫良材而官卑之安䏻無悲乎應侯曰然仲長子昌言曰官之有級猶階之有等升階越等其歩也亂亂登朝級敗禮傷法是以古人之初任也雖有賢材皆以級賜進焉賈生有言治國取人務在求䏻故裁國之無利器猶鏤以鉛刀而望其切不亦疎乎楊泉物理論曰吏者理也所以理萬機平百揆也武士宰民物猶使狼牧羊鷹養雛也是以人主務在審官擇人李重集雜奏議曰古之聖王建官垂制所以體國經治而功在簡易自帝王而下世有増損舜命九官周分六職秦采古制漢仍秦舊倚丞相任九卿雖置五曹尚書令僕之職始於掌封奏以宣内外事任尚輕而郡守牧民官故漢宣稱所與為治唯良二千石其有殊效者輙璽書勉勵或賜爵進秩禮遇豐厚得為治大體所以逺蹤三代也及至東京雖漸優顯令僕出為郡守鍾離意黃香胡廣是也郡守入為三公虞延第五倫鮑昱是也自魏朝名守杜畿滿寵田預胡質等郡或二十年或秩中二千石假節猶不去郡或還不易方此亦古人苟善其事雖沒世不徙官之義也漢魏以来内官之貴於今最隆太始以前多以散官補臺郎亦徑補黃門中書郎而今皆數等而後至衆職率亦如此陵遲之俗未乆好上之風未洽百事等級遂多遷補轉徙如流䏻否無以著黜陟不得彰此為治之大弊也漢法官人不得真秩京房為魏郡太守以八百石居之魏初用輕貧先亦試守不稱則繼以左遷然則儁才登進無能望退此則所謂有知必試而使人以器者也臣以為今宜太併郡守等級使同古者明試守左遷之例官人之器盡則事必量能而受爵矣桓溫集畧表曰今天下分崩喪亂殄瘁雖道隆中興而户口彫寡近方漢時不當一郡之民民户既少則勢不多而當必同古制百官偹職實非大易随時之宜且設官以理務務寡則官省官省以國治則職顯而人清故光武初興多所併省諸葛亮相蜀簡才併官此皆逹治之成規今日之所先也宜從權制併官省職愚謂門下三省秘書著作通可減半古以九卿綜事不專尚書故重九棘也今事歸内臺則九卿為虛設之位唯太常廷尉職不可闕其諸員外散官及軍府叅佐職無所掌者皆併焉若車駕郊廟籍田之属凡諸大事於禮宜置者臨事權兼事訖則罷職既併則官少而才精職理則無害民而治道康矣太平御覽卷二百三
