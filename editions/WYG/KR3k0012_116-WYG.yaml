body:
  text: 太平御覽卷一百十六宋李昉等撰皇王部四十一唐僖宗恭定皇帝黄巢附昭宗景文皇帝哀帝僖宗恭定皇帝唐書曰僖宗恭定皇帝諱儼懿宗第五子母曰惠安皇后王氏咸通三年五月生於東宫初封晉王名儼十四年十月懿宗疾大漸其月十八日制曰朕守大器之重居兆人之上日慎一日如履如臨旰昃勞懐寢興思理渉道猶淺𨗳化未孚而攝養􅆾方寒暑成厲實有慮於闕政且無暇於怡神竟未少瘳日加寢劇萬務煩捴須有主張爰考舊章謀於卿士思闡鴻業式建皇儲第五男晉王儼改名儇孝敬温恭寛和博厚日新令徳天假英姿言皆中規動必由禮俾崇邦本允叶人心宜令為皇太子權勾當軍國政事咨爾羣公卿士洎于腹心之臣敬保元子輔成予志各竭乃心以安黎庶是日懿宗崩即皇帝位于柩前年十二左軍中尉劉行深右軍中尉韓文約居中執軍政並封國公八月皇帝釋服冊聖母王氏為皇太后河南大水九月守司空門下侍郎平章事韋保衡貶賀州刺史乾符元年十一月庚寅上有事於郊廟禮畢御丹鳯門大赦改元二年春正月己丑宰相崔彦􅇇率文武百官上尊號上御正殿受冊四月海賊王郢攻剽浙西郡邑五月濮州賊首王仙芝聚徒於長垣縣其衆三千進䧟濮州俘丁壯萬人鄆州節度使李種出兵擊之為賊所敗二年七月王仙芝冦掠河南十五州其衆數萬是月賊逼頴許攻汝州下之四年三月寃句賊黄巢衆萬人攻鄆州䧟之七月黄巢泊浙海其徒數萬趨頴蔡入查牙山遂與王仙芝合七月賊䧟隨州五年三月王仙芝餘黨攻江西招討使宋威出軍屢敗之仍宣詔書招之仙芝致書於威求節鉞威偽許之仙芝令其大將尚君長蔡温玉奉表入朝威乃斬君長温玉以徇仙芝怒急攻洪州䧟其郛宋威赴援與賊戰大敗之殺仙芝傳首京師廣明元年春正月乙卯朔上御宣政殿改元二月黄巢自衡永州下頓䧟湖南江西屬郡三月黄巢尚讓等攻鄂州䧟江西饒信等十五州七月渡江㓂淮南十月仍悉衆渡淮巢自號率土大將軍其衆冨足自淮已北整衆而行不剽財貨唯驅丁壯為兵十一月䧟東都畱守劉允章率分司官屬迎謁之賊供頓而去坊市晏然壬申䧟虢州丙子犯潼關守關諸將望風自潰十二月辛巳賊據潼關時左軍中尉田令孜専政宰相盧㩦曲事之相與誤謀以致傾敗令孜恐衆罪加已請貶㩦官命學士王徽裴徹為相甲申宣制以户部侍郎翰林院學士王微裴徹同平章事貶右僕射門下侍郎平章事盧㩦為太子賔客㩦聞賊至仰藥而死是日上與諸王后妃數百騎自子城由含元殿出金光門幸山南文武百寮並不之知無従行者京城晏然是日晡晩賊入京城時右驍衛大將軍張直方率武官十餘迎黄巢於坡頭壬辰黄巢僣位偽號大齊稱皇帝年號金統悉陳文物據丹鳯門偽赦中和元年春正月車駕在興元六月車駕幸成都府西川節度使陳敬瑄自來迎奉七月乙夘車駕至西蜀丁巳御成都府改廣明二年為中和元年大赦天下二年春正月天下勤王之師雲㑹京師賊食盡食樹皮以金玉買人於行營之中人獲數百萬山谷避亂百姓多為諸軍之所執賣八月庚子賊同州防禦使朱温殺其監軍嚴實大將胡真謝曈等來降王鐸承制拜温華州刺史三年四月庚子沙陁忠武義成義武等軍援長安賊悉衆拒之於渭橋大敗而還李克用乗勝追之己卯黄巢收其殘衆由藍田關而遁庚辰收京城天下行營司馬都監楊復光上章告㨗行在四年七月癸酉賊將林言斬黄巢黄揆黄秉三人首級降時溥初徐將李師恱與賊戰于瑕丘賊殊死戰其衆殆盡林言與巢走至太山狼虎谷之襄王村懼追至併命乃斬賊降師恱壬午捷書至行在十二月丁亥朔大明宫留守王徽與留司百官上表請車駕還宫詔以來年正月還京兆啓元元年春正月車駕在成都府己夘還京二月丁夘車駕至京師御宣政殿大赦改元時李昌符據鳯翔王重榮據蒲陜諸葛爽據河陽洛陽孟方正據邢洺李克用據太原上黨朱全忠據汴滑秦宗權據許蔡時溥據徐泗朱瑄據鄆齊曹濮王敬武據淄青髙駢據淮南八州秦彦據宣歙劉漢宏據浙東皆自擅兵賦遞相吞噬朝廷不能制江漢轉運路絶兩河江淮賦不上供但嵗時獻奉而已國命所能制者河西山南劒南嶺西南道數十州大約郡將自擅常賦殆絶藩侯廢置不自朝廷王業於是蕩然五月宰臣蕭遘率文武百寮上徽號曰至徳光烈孝皇帝御宣政殿受冊大赦十二月乙亥沙陁逼京師田令孜奉僖宗出幸鳯翔初黄巢據京師九衢三内宫室宛然及諸道兵破賊争貨相攻縱火焚剽宫殿居屋市里十焚六七賊平之後令京兆尹王徽經年補葺僅獲安堵至是亂兵復焚宫闕蕭條鞠為茂草矣二年春正月車駕在鳯翔李克用旋師河中與朱玫王重榮同上表請駕駐蹕鳯翔仍數田令孜之罪乃以飛龍使楊復恭知内樞密事戊子田令孜迫乗輿請幸興元庚申車駕幸寳雞授刑部尚書孔緯兼御史大夫令率從官赴行在時車駕夜出宰相蕭遘裴徹鄭昌國及文武官寮不知扈從不及故令孔緯促之蕭遘惡令孜弄權再亂京國因邠州奏事判官李松年至鳯翔乃令亟召朱玫迎奉癸巳朱玫别領步騎五千至鳯翔令孜聞邠州軍至奉帝入大散關令禁軍守靈壁玟至禁軍潰散遂長驅追駕至尊途驛嗣襄王煴疾為玟所得時興元節度使石君涉聞車駕入關乃毁撤棧道柵絶險要車駕由他道僅達為邠州軍踵后﨑嶇危殆者數四月壬子朱玟李昌言迫宰相蕭遘等於鳯翔驛舍請嗣襄王煴權監軍國事玟自為大丞相兼左右神䇿十軍軍容使遂驅率文武百寮奉襄王還京師五月庚辰襄王僣即皇帝位年號建貞十二月朱玟將王行瑜受密詔自鳯州率衆還長安辛酉行瑜斬朱玟及其黨與數百人縱兵大掠是冬苦寒九衢積雪兵入之夜寒冽尤劇民吏剽剝之后僵凍而死者蔽地百官奉襄王奔河中王重榮紿稱迎奉執煴斬之文徳元年春正月車駕發鳯翔蔡賊孫儒斬秦彦畢師鐸於髙郵二月壬午車駕至京師戊子御承天門大赦改元宰臣韋昭度率文武百寮上徽號曰聖文睿徳光武𢎞孝皇帝三月戊戌朔御正殿受冊庚子上暴疾不康壬寅大漸癸卯立親弟壽王傑為皇太弟勾當軍國事是夕崩於武徳殿壽二十七諡曰惠聖恭定孝皇帝廟號僖宗葬靖陵黄巢唐書曰黄巢曹州寃句人本以販鹽為事乾符中仍嵗凶荒人飢為盜河南尤甚初里人王仙芝尚君長聚盜徒於濮陽攻剽城邑䧟曹濮及鄆州詔左金吾衞上將軍齊克譲為兖州節度使以本軍討仙芝仙芝懼引衆厯陳許襄鄧無少長皆虜之衆號三十萬三年七月䧟江陵十月又遣將徐唐昌䧟洪州時仙芝表請符不許以神䇿統軍節度使宋威為荆南節度招討使中使楊復光為監軍復光遣判官呉彦𢎞諭以朝㫖釋罪别加官爵仙芝乃令尚君長詣闕請罪且求恩命時宋威害復光之成功禽送闕斬之賊怒悉衆擊官軍威軍大敗復光收其餘衆以統之朝廷以王鐸代為招討五年八月收復荆州斬仙芝首獻於闕下先是君長弟譲以兄奉使見誅率部衆入查牙山巢弟揆昆弟八人率盜千數依譲月餘衆至數萬䧟汝州大掠關東官軍加討屢為所敗其衆十餘萬尚譲乃與羣盜推巢為主曰衝天大將軍署官屬藩鎮不能制時天下承平日久人不知兵僖宗以㓜主臨朝號令出於臣下巢馳檄四方章奏論列皆指朝政之弊巢徒黨既盛與仙芝為引援及仙芝敗東攻亳州不下乃襲破沂州據之仙芝餘黨悉附焉時王鐸緩於攻取髙駢鎮淮南求請招討賊許之及巢渡淮偽降於駢遣將張璘率兵受降於天長鎮巢禽璘殺之因虜其衆尋南䧟湖湘遂據交廣托越州觀察使崔穆奏乞天平軍節度朝議不允又自求乞安南都䕶廣州節度亦不允是嵗自春及夏其衆大疫死者十三四衆勸請北歸以圖大利廣明元年北踰五嶺犯湖湘江浙進逼廣陵髙駢閉門自固所過鎮戍望風降賊九月渡淮十一月䧟洛陽繼攻陜虢逼潼關䧟華州留將奮鈐守之朝廷以田令孜率神䇿博野等軍十萬守潼闗闗之左有谷可通行人平時禁人出入謂之禁谷及賊至官軍但守潼闗不妨禁谷尚譲林言率前鋒田禁谷而入夾攻潼關官軍大潰博野都徑還京師燔掠西市十二月三日僖宗夜自開逺門出趨駱谷四日賊至昭應五日䧟京師時巢衆累時為盜行伍不勝其冨遇窮民於路爭行施遺既入闠門坊市聚觀尚譲慰曉市人曰黄王為生靈不似李家不惜汝輩但各安家業賊衆競投物遺人十三日巢僭位國號大齊仍御樓赦且陳符命曰唐帝知朕起義改元廣明以文字言之唐已無天分矣唐去丑口而安黄天令黄在唐下乃黄家日月也土生金予以金生宜改年為金統中和元年二月尚譲㓂鳯翔鄭畋出師禦之大敗賊於龍尾坡畋乃馳檄告諭天下藩鎮四月涇原行軍唐𢎞夫之師屯渭北河中王重榮之師屯沙苑易定王處存之師屯渭北橋鄜延拓抜思恭之師屯武功鳯翔鄭畋之師屯盩厔六月邠寧朱玟之師屯興平忠武之師三千屯武功是嵗勤王之師四面俱㑹十二月宰臣王鐸率荆襄之師自行在至鄭畋帳下小校竇玫者驍敢無敵每夜率敢死之士直入京師放火燔諸門斬首級而還賊大悚駭二年王處存合忠武之師敗賊將尚譲乘勝收復京師賊遁去處存不為備是夜復為賊㓂襲官軍不利九月賊將同州刺史朱温降王重榮十二月李克用率代北之師自夏陽渡河屯沙苑三年春正月敗黄揆於沙苑進營乾坑二年尚譲率衆十萬援華州克用合河中易定武之師戰於梁田坡大敗賊軍俘斬數萬乘勝攻華州塹柵以還之黄揆棄華州官軍收城四月八日克用合忠武騎將寵從遇賊於渭南决戰三捷大敗賊軍十月夜巢黨散走詰旦克用收京師巢賊出藍田七盤路東走關東五月巢賊先鋒將孟楷攻蔡州節度使秦宗權稱臣於賊遂攻陳許營於溵水陳州刺史趙犨敗賊前鋒生擒孟楷斬之巢乃悉衆攻陳州於是自唐鄧許汝孟洛鄭汴曹濮徐兖數十州畢罹其毒賊圍陳郡三百日關東仍嵗無耕稼人餓倚墻壁間賊俘人而食趙犨求援於太原四年三月李克用率山西諸軍由蒲陜濟河㑹關東諸侯赴援陳州三月諸侯之師復集四月官軍敗賊於太原俘斬萬計收其四壁又敗賊將黄鄴於華西收其壁巢敗大恐收軍營於故陽里官軍進攻之五月大雨震電平地水深三尺壊賊壘賊自離散復聚於尉氏逼中牟翌日營汴水北是夜復大雨震雷溝塍漲溢賊分㓂汴州李克用自鄭州引軍襲擊大敗之賊衆保胙縣官軍追討賊無所保其將李讜降于大梁尚讓率部下人歸時溥賊自相猜間相殺於營州所殘者千人中夜遁去克用追擊至濟隂而旋賊散於兖鄆界黄巢入太山徐帥時漙遣將張友與尚讓之衆掩捕之至狼虎谷巢將林言斬巢及二弟鄴揆等七人首并其妻子函送徐州昭宗景文皇帝唐書曰昭宗景文皇帝諱曄懿宗第七子母曰惠安太后王氏以咸通八年三月生於東内十三年封壽王名傑乾符四年授開府儀同三司幽州大都督幽州盧龍等軍節度使帝於僖宗母弟也尤相親睦自艱難播越嘗隨侍左右文徳元年二月僖宗暴不豫初復宫闈人人心傾矚遽聞被疾軍民駭愕及大漸之夕未知所立軍容楊復恭請以壽王監國遺詔立為皇太弟柩前即帝位時年二十二以司空韋昭度攝冡宰己丑見羣臣始聴政帝攻書好文尤重儒術神氣雄俊有㑹昌之遺風以先朝威武不振國命寢微而尊禮大臣詳延道術意在恢張舊業號令天下即位之始中外稱之四月庚午追諡聖母惠安太后曰恭獻龍紀元年春正月上御武徳殿受朝賀大赦改元文武臣寮進秩頒爵有差五月漢州刺史王建䧟城都府遷陳敬瑄於雅州建自稱西川兵馬留後用田令孜為監軍十一月己丑朔將有事於圜兵改名曰曄辛亥上宿齋於武徳殿甲寅圜丘禮畢御承天門大赦大順元年春正月御武徳殿受朝賀宰臣百寮上徽號曰聖文睿徳文武𢎞孝皇帝禮畢大赦改元乾寧元年春正月上御武徳殿受朝賀大赦改元二年五月甲子李茂真王行瑜韓建等各率精甲數千人入覲京師大駭人皆亡竄吏不能止帝御安福門以待之三帥既至拜舞樓下帝臨軒喻之曰卿等藩侯宜存臣節稱兵入朝不申奏請意在何也茂貞行瑜汗流洽背不能對唯韓建陳叙入覲之由上並召昇樓賜巵酒宴於同文殿茂貞行瑜極言南北司相傾深􅗜時政請誅其太甚者乃貶宰相韋昭受李谿尋殺之殺内官數人而去王行瑜留弟行約茂貞留假子閻圭各以兵三千人宿衞時三帥同謀廢帝立吉王聞太原起軍乃止留兵宿衞而還七月李克用舉軍渡河以討王行瑜李茂貞韓建等庚申同州節度使王行實棄郡入京師謂兩軍中尉駱金瓘劉景宣曰沙陁十萬至矣請理車駕幸邠州且有城守時景宣附鳯翔癸亥夜閻圭與劉景宣子繼成同州王文實縱火剽東市脅上出幸上聞亂登承天門遣諸王率禁兵禦之捧日都頭李筠率本軍侍衞樓前閻圭以鳯翔之卒攻李筠矢及御座之樓扉上懼下樓與親王公主内人數百幸永興坊李筠軍扈蹕都頭李君實以兵繼至乃與筠兩都兵士侍衞出啓夏門憇於華嚴寺以俟内人繼至其日晚幸沙城鎮京師士庶從幸者數十萬北至南山谷口渇死三之一至暮為盜冦掠慟哭之聲殷動山谷信宿宰相徐彦若王搏崔𦙍三人至乃移幸石門鎮之佛宫乃令知樞密劉先裕薛王知柔歸京師令置禁軍以備宫禁丙寅李克用遣牙將閻諤奉表奔問奏屯軍河中俟上進發赴邠州丁夘上遣内官張承業傳詔克用軍便令監太原行營兵馬發赴新平又令内官郄廷立傳詔涇州令張璠起涇原之師㑹克用軍上在南山半月餘克用仍在河中未至渭北上懼鳯翔兵士刼遷乃令延王將御服鞍馬玉器至河中宣諭八月李克用遣子存貞奉表行在請車駕還宫辛亥車駕還宫三年六月鳯翔軍犯京畿單王拒之於婁館接戰不利七月岐軍過京師諸王率禁兵奉車駕將幸太原癸巳次渭北華州韓建遣子充奉表起居請駐蹕華州乙未次下邽丙申駐蹕華州時岐軍犯京師宫室􅆵閈鞠為灰燼光化元年八月車駕自華還京師御端門大赦改元三年十一月左右軍中尉劉季述王仲先廢帝幽於東内問安宫請皇太子裕監國是日迎太子裕監國矯宣昭宗命稱上皇甲午宣上皇制太子登皇帝位十二月癸未夜䕶駕孫昭徳周承誨等以兵攻劉季述王仲先㩦其首詣東宫門呼曰逆賊王仲先已斬首訖請陛下出宫慰諭兵士宫人破鑰帝與后方得出天復元年正月昭宗反正登長樂門樓受朝賀四月甲戌有事於宗廟是日御長樂門大赦改元十月戊戌朱全忠引四鎮之師赴河中京師聞之大恐民間亡竄山谷十一月中尉韓全誨與鳯翔獲駕都将李繼徽奉車駕出幸鳯翔三年正月車駕至鳯翔幸全忠軍全忠素服待罪泣下不自勝上親解玉帶賜之乙丑次扶風令朱友倫總兵侍衞丁夘次興平宰臣崔𦙍率百官迎謁戊辰次咸陽己巳入京師天子素服哭於太廟改服冕旒謁九廟禮畢御長樂樓大赦天祐元年正月全忠率師屯河中遣牙将㓂彦卿奉表請車駕還洛陽全忠令長安居人按籍遷居撤屋木自渭浮河而下連甍號哭月餘不息秦人大罵於路曰國賊崔𦙍朱温傾覆社稷俾我及此天乎天乎丁巳車駕發京師癸亥次陜州全忠迎謁於路四月甲辰車駕由徽安門入朱全忠張全義宰相裴樞獨孤損前導是日大風雨上跬步不辨物色日晡稍止上謁太廟禮畢還宫御宣正殿勞從官衛士乙巳上御元正殿大赦八月壬寅夜朱全忠令朱友恭氏叔琮蒋𤣥暉弑帝於椒殿帝自離長安日憂不測與皇后内人惟沉飲薨時年三十八諡曰聖穆景文孝皇帝廟號昭宗葬和陵哀帝唐書曰哀帝諱祝昭宗第九子母曰積善太后何氏景福元年九月生乾寧四年封輝王改名祚天復三年拜開府儀同三司兼充諸道兵馬元帥天祐元年八月昭宗遇弑翌日蒋𤣥暉矯宣遺詔又昭宣皇太后令皇太子柩前即位二年四月甲辰夜彗起河北貫文昌其長三丈在北方戊申全忠令知樞密王般害皇太后何氏於積善宫四年二月禪位於梁全忠建國奉帝為濟隂王遷於曹州時太原幽州鳯翔西川統稱天祐正朔天祐五年二月帝為全忠所害時年十七諡曰哀皇帝以禮葬於隂縣之定陶鄉太平御覽卷一百十六
