body:
  text: 太平御覽卷四百四十一宋李昉等撰人事部八十二貞女下列女傳曰張氏妻者丹陽魯輝之女名潛既適張氏㑹其家門伏誅以潛女弱姑老故得不死然資産没官單罄壁立昏晨力作供飬甚謹猶應配適士伍之無妻者國有常法知終不免每與姑言有必死之志姑曰夫亡改適悠悠皆是人當随時之宜何至於此潛曰悠悠之為非妾心也後至當配果自經死又曰代趙夫人者趙襄子之娣也襄子誘代王殺之因舉兵平代取地而迎夫人夫人曰吾受先君之命事代之君今代已亡吾将奚歸吾聞婦人之義無二夫欲迎我何之以弟慢夫非義謂慢棄不為立節以夫怨弟非仁也自殺於磨笄之地又曰沛王母王陵之母也陵始為縣邑豪俊及髙祖起沛陵亦聚黨數千人屬漢王項羽與漢為敵國得陵母置軍中漢使至則東向坐陵母欲以招陵陵母私送使者泣曰為老妾語陵善事漢王漢王長者也必得天下無以妾故懐持二心言妾已死也乃伏劒而死又曰蜀朱叔賢妻者張氏之女字昭儀賢為郡督郵軍襲郡城城門閉賢兄弟謀踰城出事泄伏誅乃配嫁昭儀泣曰誅我夫而逼嫁我此豈夫婦平生之願乎乃竊刀割咽而死又曰巴趙娥者趙萬之妻郡縣遭亂萬得足疾不能行為賊所殺賊欲将娥娥守䘮不去賊舉矛扺娥欲以怖之娥知賊必欲刼畧乃以身赴矛貫心逹背而死又曰九江王孝謙妻者同郡袁氏之女字貴女與母俱流移共止孝謙好酒兇悖無子聓之禮貴女每涕泣諫喻不能匡改母怨孝謙之為貴女輙悲哀不食言於隣人曰為子致母於辱非孝也事無道之人非義也昔秋胡之妻不忍見不義之人我何為於世間哉乃自殺又曰沛周明都妻者衛尉趙長平之女也名阿長平徳行純粹海内知之阿少習儀訓長閑婦道而都驕行暴躁不式上命都父衛謂阿曰新婦賢者女也當以禮法匡聓都之不改新婦之過也阿既拜命退謂左右曰我夫樊衛二姬之行故君以責我我言而不用君必謂我不奉教則罪在己為生如此亦何願哉乃自殺劉向列女傳曰楚昭真姜者齊侯之女楚昭王之夫人也昭王出遊留夫人漸䑓之上而去王聞江水大至使使者迎夫人忘持符使者至謂夫人出夫人曰大王為宫人約命召宫人必以符今使者不持符妾不敢從使者而行妾聞之矣貞女之義不犯約勇者不畏死守節而已矣妾知從使者必生留必死也然妾不敢棄約越義而求生水大至而死乃號曰真姜又曰楚白真姬者楚白公勝之妻也白公死其妻紡績不嫁吴王聞其美使人操金百鎰白壁一雙以聘焉因以輜軿三十乘迎之将以為夫人妻辭曰白公無恙之時妾幸得充後宫執箕箒衣裳履拂枕席為妃今白公不幸而死妾願守其墳墓奉其祠祀以終天年今王賜金壁之聘夫人之位非遇妾之所妾聞之忠臣不借人以力貞女不假人以色豈獨事生若此哉於死亦然妾既不位位猶人也不能從死今又去而嫁不亦太甚乎遂辭聘而不行吳王賢其節而有義號曰楚白貞姬又曰魯陶寡嬰者魯陶門之女少寡飬㓜孤無強兄弟紡績為産魯人或聞其義将求焉嬰聞之恐不得免乃作歌明已之不二也其詩曰悲黄鵠之蚤寡兮十年不雙宛頸戢翼兮不為衆同時則飛鳴兮獨行惸惸天命令然兮愧獨永傷感鳥愠已兮淚下成行嗚呼悲兮死者不可忘飛鳥尚然兮何况貞良雖有賢雄兮終不重行魯人聞之曰斯女不可得也遂不敢復求嬰寡終身又曰衛寡夫人者齊侯之女也嫁於衛至城門而衛君死保母曰可以還矣女不聽遂入行三年之䘮畢弟立謂曰衛小國也不容二庖請願同庖夫人不聽衛君乃使愬於齊兄弟皆欲為後君使人告女女終不聽乃作詩曰我心匪石不可轉也我心匪席不我卷也又曰郡南申女者申人之女也既許嫁於豐夫家禮不備而欲迎之女乃與其人言以為夫婦者人倫之始也嫁娶者所以傳重承業繼續先祖為宗廟主夫家輕禮違制不可以行遂不肯往夫家訟之於理致之於獄女終以一物不具一禮不備守節持義必死不往而作詩曰雖速我訟亦不女從言夫婦之禮不備足也君子以為得婦道之冝與詩説小異故再出又曰蔡人之妻者宋人女也既嫁於蔡夫有惡疾其母将改嫁之女曰夫之不幸乃妾之不幸也奈何去之適人之道一與之醮終身不改夫不幸遇惡疾不改其意且夫采芣苢之草雖甚臭惡猶始於捋采之終於懐頡之浸以益親况於夫婦之道終不聽其母而作芣苢之詩又曰魯秋潔婦者魯秋胡子之妻也秋胡子既納之五日而去官於陳五年乃歸未至家見路傍有一美婦人方採桑秋胡子下車謂曰苦暴採桑吾行道逺願托桑䕃下餐婦人採桑不輟秋胡子謂曰力田不如逄年採桑不如見郎今吾有金願與夫人曰嘻夫採桑力作紡績纎以衣食奉二親養夫子而已矣吾不願受人之金也收子之資與子笥金秋胡還家奉金遺母母使人呼其婦婦至乃向託採桑者婦曰君辭家逺仕五年方還當作驅揚塵疾至今也乃恱道旁婦人是忘母不孝好色淫佚是汚行也妾不忍見不義不孝之人子改娶矣妾亦不嫁遂去東走自投於河而死又曰梁寡髙行者梁之寡婦榮於色敏於行早寡不嫁梁貴人争欲取之不能得梁王聞之使相聘焉髙行曰妾之夫不幸先犬馬填溝􅊤妾冝以身薦其棺槨守養㓜孤不得專意妾聞婦人之義一往不改以全貞信之節今忘死而趨生是不信也見貴而忘賤是不貞也棄義而從利無以為人乃援鏡操刀以割其鼻曰妾已刑矣所以不死者不忍㓜嗣之重孤也刑餘之人殆可釋矣王髙節乃復其身號曰梁髙行皇甫謐列女傳曰天水姜叙母者同郡楊阜之姑也阜為州吏馬超殺刺史太守叙屯厯城阜往見之歔欷悲悵叙曰何為乃爾阜曰守臣不能完君亡不能死何以示志於天下乎君擁兵專制而無討賊之心此趙盾所以書弑也叙母慨然勒叙從阜計遂起兵於鹵城超聞之襲厯城得叙母罵之曰若背父之逆子殺君之桀賊天豈乆容若何不早死敢以面目視人乎超即殺之超敗隴右平定魏武令曰姜叙之母明智乃爾雖楊敞之妻盖不過也又曰留子直妻者厯楊人漢末擾攘隨夫之從父客居豫章從父通郡牧族之妻年少有色太守客請以為妻守死不從十餘日客以還太守夷殺之臨死不變口無言郡吏及客憐之更還救請既得活乃自割耳乆之太守聞其夫在遂還其妻又曰下邳陳悝妻者同郡吳氏之女漢末䘮亂流寓東城東城令戚竒欲北就吕布楚城疊虜人衆聞女有羙色善史書能彈琴瑟遂殺悝住車令僕者接女上車女謂竒曰君隳壊都城虜略士女殺人之夫欲以人婦為妻何酷逆之甚願守志而死不願無行而生遂自刎竒猶有哀慙殯葬乃去又曰戎士陳南妻丹者戴氏之女羙而早寡事舅姑恭篤同伍之人咸樂其賢色求者甚多守死不嫁後之聘者告其軍主軍主命之知不得已乃自縊死韓詩外傳曰魯公甫文伯死其母不哭季孫聞之曰公甫文伯之母貞女也子死不哭必有方矣使人問焉對曰昔是子也吾使事仲尼仲尼去魯送之不出魯郡贈之不以家珎且吾聞君子貴義而賤利是子病不見士來視死不見士之流涕死之日宫女縗經從者十人不足於士而有餘於婦人吾是以不哭陳壽益部耆舊傳曰廣漢徳陽王上妻者同縣袁氏女也名福年二十適上舅姑既没復遭上䘮悲傷感切不妄言笑有二子養育遺孤執心純篤及叔父愍其窮困私以許張奉掩廹合婚其旦計欲殺奉恐禍及母叔孤兒永棄慷慨流涕自殺而死益部耆舊傳曰犍為楊鳯珪妻者蜀郡臨卭陳氏女也名姬珪早亡時姬産子適生六月躬䘮事育㓜孤三年䘮訖兄弟宗親哀其子少年壯謀議更配以許蜀中豪姓姬聞仰天歎息引刀割咽㡬死於是九族驚􅕎遂敬從其節又曰捷為南安周繕紀妻者同縣曹氏女也名禁字敬姬年十七適周氏二年而夫亡隕時禁懐妊數月後産子元餘䘮事闋遂移居依託父母欲必守義育養孤弱父愍其年少子稚黙以許同縣􅈢賔遣車馬衣服來欲迎禁父乃告禁勃然作色悽愴言曰近依父母本不圖此因流涕慷慨乃自投舍後流水於是舉家兢赴救出而氣息已絶積二日一夜乃復蘇息二親由是知其至誠謝賔解婚禁歔欷長歎乃更将予還依夫弟居止潔身執操非禮不動又曰廣漢新都便敬妻者同縣王氏女也名和年十七適敬敬亡和肓養遺孤闔門守節不隨宗家宴樂嘉㑹居理甚修蜀郡何玉因謀問和兄著取和遂相聽許著深曉曰夫死子小經有改圖加貧衰無以自立何氏公族必㨿福祚和自陳説計斷决分守全孤弱辭言未訖慷慨涕淚哀慟左右然著終受玊幣因欲廹脅和乃㫁耳示著以信至不見聽請以死謝舉宗敬重哀其大義又曰巴三貞者閬中馬𦕈新妻義西充國王元憤妻姬皆䦘中人也閬中趙君妻華西充國人也姬早失夫介然守操中平五年黄巾餘類延益州賊帥趙蕃據閬中城拘廹衣冠令入婦女為質義姬華等隨北入城後賊類争勢攻破閬中時人或死或奔家室相失義姬華隨類出城走傳聞後賊或拘略婦女於是三人自度窮廹恐不免於拘逼乃相與自沈於水而死鄉黨聞之莫不感傷號曰三貞又曰蜀郡廣都公乘士㑹妻者同縣張氏女也㑹早卒年壯無嗣欲有問者親戚将以許之發憤慷慨㫁髪割耳事姑盡禮肅恭供養養族子以承宗廟列女傳為熊氏女㫁髪割耳同又曰廣漢廖伯妻者同縣殷氏女也名紀年十六適伯伯早卒既性聦敏逹於詩書女傳進退間暇又有美色見貪割面告誠以全其節曰求生害仁仁者不為紀生見禮義豈獨使古人擅名者哉因作詩三章以風父母而舉縣嘉其才麗媒介滋繁遂援刀㫁指明情邵氏家傳曰虞建武都尉邵夫人字義姬鴻臚之弟二女夫人少而寡虞氏及夫人之宗哀夫人辛苦欲更為圖婚然重夫人宿操慮不可以非禮逼亦知夫人潜佩刀誓以必死故不敢生意夫人自以虞氏㓙短繼世無子常獨處一室絶書學非祭祀墳墓不出紡績輙貨以供祭稱其多少不求豐厚干寳捜神記曰東越閩中有庸嶺髙數十里其下北隰中有大蛇長七八丈大十圍常病治都尉及屬城長吏多有死者祭以牛羊故不得福或與人夢或下喻巫祝欲得啖童女年十二三者都尉令長並共患之然氣厲不息共請求人家生婢子有罪家女養之八月朝祭送蛇輙夜出吞噬之累年如此前後已用九女爾時豫募賚未得将樂縣李誕有六女無男其小女寄應募欲行父母不聽寄曰父母無相生女六人雖有如無無有緹縈濟父母之功不能供養消費衣食生無所益不如蚤亡賣寄之身可得少錢父母終不聽寄自潜發不可禁止寄乃行請好劒及咋蛇犬先作數石米餈用蜜灌之以置穴口蛇夜便出頭大如囤目如三尺鏡聞餈香氣先啖食之寄便放犬犬就噬咋寄從後斫得數創蛇因踊出至庭而死寄入視其穴得九女髑髏悉舉出緩步而歸越王聞之聘寄為后拜其父為将樂令母及娣皆有賜自是東治無復妖邪之物其歌謡至今存焉杜預女記曰二寡婦者淑也昺也淑䘮夫守寡兄弟将嫁之誓而不許為書曰盖聞君子導人以徳矯俗以禮是以烈士有不移之志貞女無廻二之行淑雖婦人竊慕殺身成義死而後已夙遘禍罰䘮其所天男弱未冠女㓜未笄是以僶俛求生将欲長育二子上奉祖宗之嗣下繼祖穪之禮然後覲于黄泉永無慙色仁兄徳弟既不能厲髙節於弱志發明明於闇昩許我他人逼我于上乃命官人訟之簡書夫智者不可惑以事仁者不可脅以死晏嬰不以白刃臨頸改正直之辭梁寡不以毁形之痛忘執節之義髙山景行豈不思齊計兄弟不能匡我以道􅀶我以文雖曰既學吾謂之未也祖冲之述異記曰晋元興末魏郡民陳氏女名琬家在查浦年十六饑疫之嵗父母相繼死没惟有一兄傭賃自活女容色甚艶隣中士庻見其貧弱競以金帛招要之女立操貞槩未嘗有許後值盧循之亂賊衆将加陵逼女厲然不廻遂以被害杜預女記曰大女緱玉者陳緱氏之女也夫之從母兄弟殺其父玉乃為父報讎其殺已至親縳玉付吏獄竟當行刑有名士申徒子龍者緱玉同縣人也嘉其義勇奏記於縣曰伏聞大女緱玊為父報讎獄已决不勝感悼之情敢陳所聞昔太原周黨感春秋義辭師復讎當時論者猶髙其節况玊女弱耳無所聞心無所激内無同生之謀外無交遊之助直推父子之情奮發怒之心手刃刺讎僵尸流血當時聞之人無勇怯莫不強膽増氣輕身殉義攘􅃑髙談稱羨今聞玉幽執穽檻罪名已定皆心低意沮悵悵長嘆蟠雖愚昩以為玊之節義歴代未有定足以感無恥之孤激甚辱之子假玊不值明時尚望追旌閭墓顯異後嗣况事在清聽不加八議哀矜之貸誠為朝廷痛之屠蟠字子龍又曰新野公主者光武皇帝娣也少有節行姿容嫁為新野人鄧晨妻生一男三女王莽地黄三年光武起兵攻破棘陽至小長安為莽兵所敗棄車走時天大霧還求室家道得小妺伯姬與共騎前行復見新野公主命使上馬主以手麾上曰行矣文叔努力早建大功追兵方至不能相救無為兩没也上駐馬重呼之主曰不駃馳但志免我更當三人死也且急自脱我身何有㑹追兵至上遂驅馬而去主即遇害裴啓語林曰王經少處貧苦仕至二千石其母語之汝本寒家兒仕至二千石可止也經不能止後為尚書助魏不忠於晋被收流涕辭母曰恨昔不從勅以致今日母無戚容謂曰汝為子則盡孝為臣則盡忠有何負哉虞預㑹稽典録曰孟淑上虞人也父質中郎将淑年十七當出適聘禮既至為盜所刼淑祖父操刃對戰不敵見害淑思慕哀慟憔悴毁形以致盜由已乃喟爾嘆曰㣲淑之身禍誠不生以身害祖苟活何顔於是遂自經而死太平御覧卷四百四十一
