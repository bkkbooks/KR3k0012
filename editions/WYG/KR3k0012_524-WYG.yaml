body:
  text: 太平御覽卷五百二十四宋李昉等撰禮儀部三祭禮上毛詩召南曰采蘋大夫妻能循法度也能循法度則可以承先祖供祭祀也于以采蘋南澗之濵于以采藻于彼行潦又小雅天保曰吉蠲為饎是用孝享禴祀烝嘗于公先王春曰祀夏曰禴秋曰嘗冬曰烝公事也箋云公謂后稷也君曰卜爾萬夀無疆卜猶期也又小雅吉日曰吉日維戊旣伯旣禱又小雅大田曰來方禋祀以其騂黒與其黍稷以享以祀以介景福又小雅楚茨曰濟濟蹌蹌潔爾牛羊以往烝嘗或剥或烹或肆或將祝祭于祊祀事孔明又小雅信南山曰祭以清酒從以騂牡享于祖考執其鸞刀以啓其毛取其血膋鸞刀刀有鈴者言割中節也箋云毛以告殺膋以升臭合之黍稷實之於蕭合馨香也是烝是享苾苾芬芬祀事孔明又生民曰生民尊祖也后稷生於姜嫄文武之功起於后稷故推以配天厥初生民時維姜嫄生民如何克禋克祀以弗無子克能也弗之言祓也履帝武敏歆攸介攸止載震載夙載生載育時維后稷又清廟曰清廟祀文王也周公旣成洛邑朝諸侯率以祀文王焉又清廟曰烈文成王即政諸侯助祭也新王即政必以朝亨之禮祭于祖考告嗣位也烈文辟公錫兹祉福惠我無疆子孫保之烈光也文王錫之也又臣工曰振鷺二王之後來助祭也二王殷夏也其後杞也宋也振鷺于飛于彼西雝我客戾止亦有斯容箋云振鷺于西雝言得其處也興者喻杞宋之君有潔白之徳來助祭周之廟也又潛曰潛季冬薦魚春獻鮪也猗與漆沮潛有多魚有鱣有鮪鰷鱨鰋鯉以享以祀以介景福介助也景大也尚書舜典曰望于山川徧于羣神又孔安國傳曰望者逺也望而祭之也羣神丘陵墳衍之屬又說命曰黷于祭祀時謂弗欽又孔安國曰祭不欲數數則黷黷則不敬也又洛誥曰祀于新邑咸秩無文又孔安國曰以祀典禮以祀新邑皆次秩不在禮文者而禮之又多士曰罔不明德恤祀又孔安國曰自帝乙以上無不顯用有憂徳念齊敬奉祭祀言能保宗廟社稷也尚書大傳曰祭之為言察也察者至也人事也人事至然後祭祭者薦也薦之為言在也在者在其道也又云五行傳曰簡宗廟不禱祠廢祭祀逆天時則水不潤下又五行傳曰六瀰之禮散齋七日致齋三日新器潔以祀用又赤黍三日之朝於中庭祀四方從東方自南至西卒於北方禮曰格祀篇云今亡曰某也方祀曰播國卒相行事其祝也曰若爾神靈洪範六瀰是合神靈位木精靈威仰火精赤熛怒土精含䌔紐金精白招拒水精汁光紀及木帝太皥炎帝火帝土帝黄帝官金帝少昊水帝顓項木官勾芒火官祝融土官后土金蓐收水官𤣥𠖇皆是也又云無差無傾無有不正若民有不敬事神則㑹批之于六瀰言民廣及天下有過者也事六事也㑹合也批推也言天下之有過神靈亦合推内于外天子以為下任者也六事之機以縣示我我民人不敢不敬事上下王祀周禮天官冡宰曰以八則治都鄙一曰祭祀以馭其神祀其先君社稷五祀以九式均節財用一曰祭祀之式又天官上内饔曰凡宗廟之祭祀掌割烹之事凡燕飲食亦如之又天官上獸人曰凡祭祀䘮紀賔客共其死獸生獸共其完者凡獸入于腊人皮毛筋角入于玉府給作器用又天官上亨人曰祭祀共大羮鉶羮賔客亦如之大羮肉湆也鄭司農云大羮不致五味也又地官上牧人曰牧人掌牧六牲而阜蕃其物以供祭祀之牲牷六牲謂牛馬羊豕犬鷄凡陽祀用騂牲毛之隂祀用黝牲毛之望祀各以其方之色牲毛之色純也隂祀祭北郊地陽祀春夏也黝讀為幽幽黑色也凡時祀必用牷物凡外祭毁事用尨可也又云凡祭祀共其犧牲以受充人繋之凡生不繫者共奉之謂非時而祭祀者又地官上曰牛人掌飬國之公牛以待國之政令凡祭祀供其享牛求牛以授職人而芻之又云凡祭祀供其牛牲之牙與其盆簝以待人牙謂福衡之属盆簝皆器名又地官下閭師曰凡庶民不畜者祭無牲不耕者祭無盛矣又春官上大宗伯曰大宗伯之職掌建邦之天人神鬼地祇之禮以佐王建保邦國又云以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命風師雨師以血祭祭社稷五祀五嶽以貍沉祭山林川澤以疈辜祭四方百物又曰凡祀大神亨大鬼祭大祇帥執事而卜日宿視滌濯涖玉鬯省牲鑊奉玉齍詔大號治其大禮詔相王之大禮若王不與祭則攝位王有故代行其祭祀又云凡大祭祀王后不與則攝而薦豆籩徹薦徹豆籩后之事國有大故則旅上帝及四望王大封則先告后土乃頒祀于邦國都家鄉邑又春官下太祝曰太祝掌六祝之事大師宜于社造于祖設軍社類上帝國將有事於四望將行也四望日月星辰也及軍歸獻于社則前祝獻于社主又春官曰家宗人掌家祭祀之禮凡祭祀致福大夫采地之祀與都同若先王之子孫亦有宗廟禮記月令曰孟春之月其祀戸祭先脾仲春之月天子獻羔開冰先薦寢廟上丁命樂正習舞釋菜天子乃帥三公九卿諸侯大夫親往視之順時逹物也仲丁又命樂正入學習樂是月也祀不用犧牲用圭璧更皮幣又月令曰孟夏之月其祀竈祭先肺陽氣盛熱于外祀于竈從熱類也祀之先肺者陽位在上肺為尊也又月令仲夏祀皇地祇於方丘夏至之日祀皇地祇于方丘以髙祖神堯皇帝配坐以岳瀆等神從祀又月令曰仲夏月命有司祭先牧又月令季夏月其祀中霤祭先心中霤中室也祭中霤是為爼先進心是月也祀黄帝于南郊謂季夏土德王日則祀黄帝也含䌔紐于南郊以軒轅配坐以后土鎮星從祀也又月令曰孟秋其祀門祭先肝秋隂氣出祀之于門外陽也祭先肝者秋為隂中于藏值肝祀門是為爼先進肝也又月令曰孟冬其祀行祭先腎冬隂氣盛寒于外祀之于行從辟除之類行謂道也祭先腎者隂位在下腎亦在下為爼進腎又月令曰孟冬日祀神州地祇於北郊立冬日祭神州地祇于北郊太宗文武聖皇帝配坐是月也命有司祭司寒孟冬祭司寒于北郊是月也命有司祭司中司命司人司祿冬後𤣥日祀司寒等于國城西北又月令曰仲冬月命有司祈祀四海大川名源淵澤井泉順其盛德之時氣也又曲禮上曰臨祭不惰祭服敝則焚之祭器敝則埋之又曲禮下曰無田祿者不設祭器有田禄者先為祭服又曰君子雖貧不鬻祭器雖寒不衣祭服去國祭器不踰竟大夫寓祭器於大夫士寓祭器於士又曲禮下曰天子祭天地祭四方祭山川祭五祀嵗徧諸侯方祀祭山川祭五祀嵗徧大夫祭五祀嵗徧士祭其先又曰凡祭有其廢之莫敢舉也有其舉之莫敢廢也非其所祭而祭之名曰淫祀淫祀無福支子不祭祭必告于宗子不敢自専又祭宗廟之禮牛曰一元大武豕曰剛鬛豚曰腯肥羊曰柔毛鷄曰翰音犬曰羮獻雉曰疏趾兎曰明視脯曰尹祭膏魚曰商祭鮮魚曰脡祭水曰清滌酒曰清酌黍曰薌合粱曰薌萁稷曰明粢稻曰嘉蔬韭曰豐本鹽曰鹹鹺玉曰嘉玉幣曰量幣號牲物者異于人用也元頭武迹也腯肥也春秋傳曰博碩肥腯光貌也尹正也商猶量也脡直也嘉善也稻𤓰蔬之屬豐茂也鹹曰鹺今河東云幣帛也又曲禮下曰大饗不問卜祭五帝于明堂奠卜也不饒富富之言備也備而已勿過禮也又檀弓下曰仲遂卒於垂壬午猶繹萬入去籥仲尼曰非禮也卿卒不繹又王制曰祭豐年不奢凶年不儉又王制曰天子祭天地諸侯祭社稷大夫祭五祀五祀謂司命中霤門行属也天子祭天下名山大川五嶽視三公四凟視諸侯視其牲器之類又諸侯祭名山大川之在其地者天子諸侯祭因國之在其地而無主後者又禮器曰晏平仲祀其先人豚肩不揜豆澣衣濯冠以朝君子以為隘矣隘猶狹也臧文仲安知禮夏父弗綦音忌逆祀而弗止也燔柴于奥文仲魯公子莊文之間為大夫于時為賢是以非之不正禮文二年八月丁卯大事於太廟躋僖公始逆祀于是夏父弗綦為宗人之為也奥當為爨夫奥者老婦之祭也盛於盆尊於缾又曰季氏祭逮闇而祭日不足繼之以燭雖有强力之容肅敬之心皆倦怠矣有司跛倚以臨祭其為不敬大矣他日祭子路與室事交乎戸堂事交乎階質明而始行事晏朝而退孔子聞之曰誰謂由也而不知禮乎又大傳曰牧之野武王之大事也旣事而退柴于上帝祈于社設奠于牧室柴尊告天地及先祖也遂率天下諸侯執豆籩駿奔走又祭法曰燔柴于泰壇祭天也瘞埋于泰圻祭地也用騂犢壇圻封土為祭處也壇之言坦也壇明坦也圻炤哲也必為照明之名尊神也祀地用黝牲與天俱用犢借言耳埋少牢於泰昭祭時也相近於坎壇祭寒暑也王宫祭日也夜明祭月也幽宗祭星也雩宗祭水旱也四坎壇祭四方也山林川谷丘陵能出雲為風雨見怪物皆曰神有天下者祭百神諸侯在其地則祭之亡其地則不祭昭明也亦謂壇也時四時也亦謂隂陽之補埋之者隂陽出入地中也又祭法曰聖王之制祭祀也法施于民則祀之以死勤事則祀之以勞定國則祀之能禦大菑則祀之能捍大患則祀之是故厲山氏之有天下也其子曰農能殖百榖夏之衰也周棄繼之故祀以為稷共工氏之霸九州也其子曰后土能平九州故祀以為社帝嚳能序星辰以著衆堯能賞均刑法以義終舜勤衆事而野死鯀鄣洪水而殛死禹能修鯀之功黄帝正名百物以明民共財顓頊能修之契為司徒而民成㝠勤其官而水死湯以寛治民而除其虐文王以文治武王以武功去民之菑此皆有功烈于民者也及夫日月星辰民所瞻仰也山林川谷丘陵民所取材用也非此族也不在祀典太平御覽卷五百二十四
