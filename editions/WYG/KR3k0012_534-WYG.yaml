  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_534-1a, image: WYG0898/WYG0898-0008c.png}
body:
  text: 太平御覽卷五百三十四宋李昉等撰禮儀部十三辟雍靈䑓學校辟雍毛詩大雅曰鎬京辟雍自西自東自南自北無思不服武王作邑於鎬京箋云自由也武王於鎬京行辟雍之禮自四方来觀者皆感化其徳心無不歸服禮記王制曰天子曰辟雍諸侯曰泮宫尊卑學異名辟明雍和也所以明和天下也泮之言恤政教也禮記禮統曰所以制辟雍何教化天下也辟雍之制奈何王制曰辟雍員如璧雍以水内如覆外如偃盤也諸侯泮宫半有水半有宫也諸侯所化者少故泮有宫焉三王之制奈何夏天子曰重屋諸侯曰廣宗殷天子曰廟諸侯曰世室周天子曰辟雍諸侯曰泮宫鄉曰庠里曰序是其制也禮記外傳曰學者覺也人生也皆禀五常之正性故聖人脩道以教之使其發覺不失其性也小人學道則易使也不從敎則㓙人也天子諸侯皆有大學小學小學則東少陽之地公宫之左大學在西有虞氏之學曰庠亦謂之米廪藏躬耕之榖於學中以供祭祀虞舜尚孝夏曰序殷曰瞽宗瞽無目者樂正古之學者周曰辟雍辟明也雍和也亦為大學東膠漢書禮樂志曰武帝時丞相大司空奏請立辟雍㑹按行長安南營表未作遭帝崩群臣引以為定謚及王莽為宰衡欲耀衆庶遂興辟雍後漢書曰世祖中元二年春初起辟雍行射之禮續漢書禮儀志曰明帝永平始率群臣躬養三老五更于辟雍行大射之禮魏志曰明帝幸辟雍于㑹命群臣賦詩宋書禮志曰昔武帝太始六年帝臨辟雍行鄉飲酒之禮詔曰禮儀之廢久矣乃今復講肄舊典賜太常絹百疋丞博士及學生酒咸寧三年恵帝復行其禮白虎通曰天子立辟雍者何所以行禮樂宣徳化也辟者象璧圓文以法天雍者何雍之以水教化流行五經通義曰諸侯不得觀四方故缺以東南半天子之學故曰頖宫三輔决錄曰辟雍水四周於外象四海也桓譚新論曰王者作圓池如璧形實水其中以圜壅之故曰辟雍言其上承天地以班教令流行王道周而復始説苑曰辟雍天子郷飲之處戴延之西征記曰洛城南有平昌門道東辟雍壇去靈䑓三里俱是魏武帝所立髙七丈班固東都賦辟雍詩曰乃流辟雍辟雍湯湯聖皇莅止造舟為梁皤皤國老乃父乃兄抑抑威儀孝友光明於赫太上示我漢行洪化惟神永觀厥成李尤辟雍賦曰卓矣煌煌永元之隆含𢎞該要周建大中蓄純和之優渥兮化盛溢而兹豐李尤辟雍銘曰惟王所建方中圓外清流四匝蕩滌濁穢傅𤣥帝幸辟雍鄉飲酒賦曰時皇帝枉萬乗之尊兮以幸辟雍鹵簿齊列百官正容侍衛参差階㦸百重乃延卿士乃命王公是日也定小㑹之常儀兮饗殊俗而見逺邦連三朝以考學兮覽先賢之異同靈䑓毛詩文王靈䑓曰靈䑓民始附也文王受命而民樂其有靈徳以及鳥獸昆䖝焉天子有靈䑓所以觀祲象察妖祥也經始靈䑓經之營之庶民攻之不日成之詩汜厯樞曰靈䑓候天意也經營靈䑓天下附也禮含文嘉曰禮天子靈䑓以考觀天人之際隂陽之㑹也揆星度之驗徴氣朔之瑞應原神明之變化為萬姓獲福於天禮統曰所以制靈䑓何以尊天重民僃灾禦害豫防未然也夫王者當承順天地節禦隂陽也夏所以為清䑓何明明相承太平相續故為清䑓殷為神䑓周為靈䑓何質者具天而王天者稱神文者具地而王地者稱靈是其異也孝經援神契曰靈䑓考符居髙顯神聖王所以宣徳察㣲五經通義曰王者受命而起立靈䑓所以靈䑓何以為在於中也國之南附近辟雍依仁宫也靈䑓制度奈何師說之積土崇增其髙九仞上平無屋髙九仞者極陽之數上平無屋望氣顯著續漢書祭祀志曰明帝即位郊祀五帝於明堂卒事遂升靈䑓以望雲物崔鴻十六國春秋後趙錄曰建武二年置中太史靈䑓仰觀灾祥以考外太史驗察虛實唐書曰乾元元年於永寧坊張守珪宅置司天䑓制曰建邦設都必稽𤣥象分列曹局皆應物宜靈䑓二星主觀察雲物天文位在太㣲西南今興慶宫上帝庭也考符之所合置靈臺三輔故事曰漢作靈臺於城東周作靈臺在澧水東常以四孟之月登臺而觀述征記曰長安宫南有靈臺臺髙十仞上有銅渾天儀又相風銅烏或云遇千里風乃動六韜曰文王既出羑里召周公旦築為靈臺新序曰周文作靈臺池沼掘得死人骨吏以聞於文王文王曰更塟之天下聞之皆曰賢矣澤及杇骨而况於人乎班固東都賦靈臺詩曰乃經靈臺靈臺既崇帝勤時登爰考休徴三光宣精五行布序習習祥風祁祁甘雨百榖蓁蓁庶草蕃廡屢惟豐年於皇樂胥潘岳閑居賦曰靈臺極其髙跱闚天文之秘奥究人事之終始學校毛詩國風曰子衿刺學校廢也亂世則學校不修焉青青子衿悠悠我心青衿青領也學士之所服縱我不往子寧不嗣音尚書大傳曰耰鉏已藏嵗事欲畢餘子皆入學十五始入小學見小莭踐小義十八始入大學見大莭踐大義周禮地官下師氏曰師氏以三徳教國子一曰至徳以為道本二曰敏徳以為行本三曰孝徳以知逆惡又教三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長鄭𤣥注曰徳行外内之言也在心為徳施之為行居虎門之左司王朝凢國之貴遊子弟學焉禮記學記曰君子如欲化民成俗其必由學乎所學聖人之道在方䇿玊不琢不成器人不學不知道是故古之王者建國以教民為先又學記曰古之教者家有塾黨有庠術有序國有學比年入學中年考校一年視離經辯志三年視敬業樂群五年視博習親師七年視論學取友謂之小成九年知類通逹强立而不反謂之大成左傳襄六曰鄭人遊于郷校杜預曰郷之學校以論執政然明謂子産曰毁郷學校如何恐於中謗議國政也子産曰何為夫人朝夕退而遊焉以議政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之論語䜟曰學者䜟也五經通義曰三王教化之宫總名為學夏為校校言教也漢書曰郡國學縣道邑侯國曰校校學置經師一人續漢書禮儀志曰明帝永平中始帥群臣養三老五更於辟雍郡國縣道行鄉飲酒禮於學校後漢書曰車駕幸太學桓榮㑹諸博士論難於帝前榮被服儒衣温恭有藴藉藴藉猶言寬愽有餘也藴音於門反辨明經義毎以禮譲相厭不以辭長勝人儒者莫之及厭服也特加賞賜又詔諸生雅吹擊磬盡日乃罷吹管奏雅頌也東觀漢記曰光武建平五年初起太學宫諸生吏子弟及民以義助作上自齊歸幸太學賜博士弟子有差宋書禮志曰漢獻帝建安二十二年魏國作泮宫于鄴城南魏文帝黄初五年立太學于洛陽魏名臣奏曰􅃽濟奏太學堂上官為置皷禮曰入學皷篋遜其業也凢學受業皆當湏十五以上公卿大夫子弟在學者以年齒長幼相次不得以父兄位也學者不恭肅慢師酗酒好訟罰飲水三升晉諸公讃曰恵帝時裴頠為國子祭酒奏立國子太學起講堂築門闕刻石寫經晉令曰諸縣率千餘户置一小學不滿千户並之宋書禮志曰晉征西将軍庾亮在武昌開置學宫教曰人情重交而輕賒好逸而惡勞學業致苦而祿荅未厚由㨗徑者多故莫肯用心洙泗邈逺風雅彌替後生放狂不復憲章典謨臨官宰政者務目前之治不能閑於典誥遂令詩書荒塵頌聲寂寞仰瞻俯省能不歎慨南史曰宋時國學頽廢未暇脩復明帝太始六年置聰明觀以集學士或謂之東觀置東觀祭酒一人聰明訪舉郎二人儒𤣥文史四科置學士十人其餘令史下各有差是嵗以國學既立省聰明觀於王儉宅開學士館以聰明四部書充之三輔舊事曰漢太學在長安門東書社門立五經博士員弟子萬餘人學中有市有獄光武東遷學乃廢任預益州記曰文公學堂在大城南昔經灾火蜀郡太守髙朕修復繕立其欒櫨椽莭制猶古樸即今堂基六尺厦屋三間通皆圖畵聖賢古人之象及禮器瑞物堂西有二石屋又以為州學述征記曰太學在國子學東二百歩學堂裏有太學賛碑記曰建武三十七年立太學堂永建六年制下府繕治並立諸生房舍千餘間陽嘉元年畢刋于碑有太尉龎㕘司徒劉琦太常孔扶将作大匠胡廣荅記制黄圖曰禮小學在公宫之南大學在城南就陽位也去城七里王莽為宰衡起靈䑓作長門宫南去堤三百歩起國學於郭内之西南為博士之宫寺門北出正於其中央為射宫門西出殿堂南嚮為墻選士肄射於此中此之外為愽士舍三十區周環之此之東為常滿倉之北為㑹市但列槐樹數百行為隊無墻屋諸生朔望㑹此市各持其郡所出貨物及經書傳記笙磬樂相與買賣雍容揖譲或論議槐下其東為太學宫寺門南出置令丞吏詰姦宄理詞訟五博士領弟子員三百六十六經三十博士弟子萬八百人主事髙弟侍講各二十四人學士同舍行無逺近皆隨檐雨不塗足暑不暴首决疑要註曰漢初置博士而無弟子後置弟子五十人又增滿五百漢末至數千人魏之初學為門人二嵗通二經者補文學掌故滿三嵗通三經者擢為太子舍人摰虞駮宜立學事曰河内太守魯䕫使民二百家共立一學未成而司𨽻奏以違法尚書郎中騎都尉臣摰虞駮䕫為近畿大都朝所委任親臨民物足識事宜累表仍上求二百家立一學是其留心學校必欲有成也崔瑗南陽文學頌曰昔聖人制禮作樂也以統天理物經國序民立均出度因其可利而利之俾不失信也故觀禮則體敬聽樂則心和然後反其性而正其身也梁元帝召學生教曰閣下昔楚王好詩沛王傳易猶且傳之不朽以為盛美吾親承天㫖聞方欲化行南國被於西楚太平御覽卷五百三十四
