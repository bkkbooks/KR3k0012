front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_168-1a, image: WYG0894/WYG0894-0517a.png}
body:
  text: 太平御覽卷一百六十八宋李昉等撰州郡部十四山南道下梁州洋州商州金州房州通州渠州渝州涪州朗州澧州巴州壁州蓬州集州唐州鄧州襄州均州随州梁州圖經曰梁州漢中郡春秋至戰國楚地秦漢為漢中郡蜀志曰先主初得漢中曰曹公雖來無能為也漢書曰項羽立沛公為漢王王巴蜀漢中四十一縣都南鄭沛公欲攻楚丞相蕭何諫曰雖王漢中之惡不猶愈於死乎語曰天漢其稱甚美願大王王漢中養其民以致賢人収用巴蜀還定三秦天下可圖也洋州十道志曰洋州洋川郡春秋戰國並楚地秦為漢中郡漢志曰成固屬漢中郡今洋源縣地是也又曰安陽屬漢中鬵谷水所出今黄金縣地商州十道志曰商州上洛郡禹貢梁州之域周為豫州之境戰國時屬秦秦併天下為内史地漢武置上雒縣於此史記張儀說楚懐王大王誠能絶約於齊臣請獻商於之地六百里楚於是與齊絶約使一將軍隨張儀至秦儀謂楚使者曰臣有奉邑六里願以獻大王左右楚使者曰臣受命於王以商於之地六百里不聞六里皇甫謐帝王世紀曰四皓始皇時隠於商山作歌曰莫莫髙山深谷逶迤曄曄紫芝可以療饑唐虞世逺吾將何歸漢志曰商屬𢎞農郡秦相衛鞅邑也金州十道志曰金州安康郡禹貢梁州之域于周楚之附庸後為楚地秦為漢中郡帝王世紀曰安康為媯墟或謂之姚墟後漢書曰鄭𢎞上書虞舜出於姚墟夏禹生於石紐頴容釋例曰舜居西城本曰媯汭漢書曰西城屬漢中郡應劭曰媯墟在西北舜所居即金城縣房州十道志曰房州房陵郡土地屬與金州同麋國也左傳曰楚子伐麋成大心敗麋師于防渚杜注防渚在麋地闞駰云防陵即春秋防渚也漢志防陵上庸屬漢中郡盛𢎞之荆州記曰竹山縣有白馬塞孟逹為新城太守登白馬而嘆曰劉封申耽據金城千里而不能守豈丈夫哉通州十道志曰通州通川郡土地所屬與金州同春秋戰國並屬巴子國秦併天下為巴郡漢因之後漢志曰宣漢屬巴郡即漢宕渠地也巴漢記曰和帝分宕渠之東置圖經曰西魏改為通州以其居四逹之路故名今為逹州渠州十道志曰渠州潾山郡土地所屬與通州同漢志曰宕渠屬巴郡輿地志曰梁大通三年於此置渠州左思蜀都賦曰外負銅梁宕渠渝州十道志曰渝州南平郡古巴國也三巴記曰閬白二水東西流曲折三廻如巴字故謂三巴山海經曰海内西南有巴國昔大皥生咸鳥咸鳥生乗釐乗釐生後昭是為巴人郭璞曰為巴始祖李膺益州記曰明月峽在巴縣東壁髙四十丈有圓孔形如滿月因以為名又曰江津縣西有香草樓昔有仙人於此置樓居植香草於樓下一夕飛昇去後人指其地為香草樓涪州十道志曰涪州涪陵郡禹貢梁州之域周為雍州之地春秋時巴國秦為巴郡漢為涪陵郡巴縣巴漢志曰涪陵巴漢郡之南鄙本與楚商於之地接朗州十道志曰朗州武陵郡禹貢荆州之域春秋及戰國時屬楚秦為黔中郡漢髙祖五年更名武陵郡梁湘東王於荆州割武陵郡置武州陳天嘉元年分武陵立沅陵郡隋又改武州為辰州又改為嵩州又改為朗州史記曰秦惠王十四年求以武闕外就楚易黔中地武陵記曰後漢梁松自義陵移郡於若城今州東有張若城晉書曰潘京武陵漢壽人也弱冠郡辟為主簿太守趙廞甚器之嘗問之曰貴郡何以名武陵京曰鄙郡本名義陵在辰陽縣界與夷獠相接數為所攻光武時移東山遂得全完共議易號傳曰止戈為武詩稱髙平曰陵於是為名焉武陵記曰武陵郡境四千餘里澧州十道志曰澧州澧陽郡春秋戰國地屬楚秦屬黔中郡漢改黔中為武陵郡屬荆州今州即武陵郡零陽縣地吳分武陵西界立天門郡即此郡之境晉為南義陽郡隋平陳置松州尋改為澧州在澧水之北故取為名尚書禹貢曰岷山導江東别為沱又東至于澧輿地志曰晉宋以義陽流人在南郡者立為南義陽郡寄荆州十道志曰慈利縣即漢零陽縣地圖經曰界内有零溪水即以為名隋開皇十八年改零陽為慈利縣王仲宣贈士孫文始詩曰悠悠澹澧澹澧二水在澧陽縣巴州十道志曰巴州土地所屬與通州同漢為巴郡宕渠縣四夷縣道記曰李特孫壽時有羣獠十餘萬從南越入蜀漢間散居山谷因思流布在此地遂從為獠所據壁州十道志曰壁州始寧郡本漢宕渠縣地後漢分置宣漢縣梁分宣漢置始寧後魏分始寧置諾水縣蓬州十道志曰蓬州咸寧郡本漢宕渠縣地周地圖記曰武帝天和四年割巴州之伏虞郡隆州之地於此置蓬州集州十道志曰集州符陽本漢宕渠縣地晉惠帝永寧中李特王蜀其地屬焉梁武改為東巴州後改為集州以東北有集水因以為名又云以萬山所集故也唐州十道志曰唐州淮安縣禹貢豫州之域春秋楚地戰國時屬晉後入韓秦置三十六郡為南陽郡漢志曰南陽郡有比陽縣比水所出東入蔡左傳僖四年齊師伐楚楚子使屈完如師齊侯陳諸侯之師與屈完乗而觀之齊侯曰以此衆戰誰能禦之以此攻城何城不克對曰君若以德綏諸侯誰敢不服君若以力楚國方城以為城漢水以為池雖衆無所用之晉太康地記曰自華至沘陽南北連百里號為方城亦曰長城周地圖記曰湖陽縣光武所封外祖樊重邑又光武封姊為湖陽公主漢志曰湖陽古廖國也廖音力救反鄧州十道志曰鄧州南陽郡禹貢豫州之域戰國屬韓秦置三十六郡南陽其一也釋名曰在中國之南而居陽地故以為名漢志曰南陽郡領宛犨等三十六縣秦置莽曰前隊屬荆州又曰鄧屬南陽故國都尉治應劭曰鄧侯國史記蘇秦說韓惠王韓西有宜陽東有穰涓後漢書曰時天下墾田多不以實詔下郡國檢覆其事時諸郡各遣使奏事帝見陳留吏牘上有書視之云潁川𢎞農可問河南南陽不可問帝詰吏不肯服時顯宗為東海公言曰河南帝城多近臣南陽帝鄉多近親田宅踰制不可為凖漢書曰秦滅韓徙天下不軌之人於南陽故其俗夸奢上氣力好商賈漁獵藏匿難制宛西通武闗東受江淮一都之㑹也圖經曰菊潭取界内菊潭水以名縣盛𢎞之荆州記曰菊水其源傍有芳菊浸潤其流滋液水極芳馨飲之者皆壽考後魏略曰孝文帝南巡至新野臨潭水而見菖蒲花乃歌曰兩菖蒲新野樂遂建兩菖蒲寺以美之楚地記曰漢江之北為南陽漢江之南為南郡襄州十道志曰襄州襄陽郡禹貢豫州之南境春秋以來楚地秦南郡之北界二漢為南陽郡獻帝時魏武始置襄陽郡襄陽記曰襄陽本楚之下邑檀溪帶其西峴山亘其南亦楚國之北津也荆州圖副曰建安十三年魏武平荆州始置襄陽郡以地在襄山之陽為名楚地記曰闗雲長攻沒于禁等七軍兵勢甚盛獨襄陽徐晃屯守不下曹公謂晃曰全襄陽者徐晃之功也後吳大帝率兵西時曹仁鎮之司馬懿宣言於魏王曰襄陽水路之衡禦冦要地不可失也南雍州記曰永嘉之亂三輔豪族流於樊沔僑於漢側立雍州因人所思以安百姓也宋文帝因之置南雍州焉晉書曰山簡字季倫嘗鎮襄陽郡中有髙陽池每臨池未嘗不大醉而還人歌之曰山公何所詣往至髙陽池日暮倒載歸酩酊無所知時時能騎馬倒著白接䍦舉鞭問葛强何如并州兒盛𢎞之荆州記曰襄陽郡峴首山南至宜城百餘里其間雕牆峻宇閭閻填列漢宣帝末其中有卿士刺史二千石數十家珠軒駢輝華蓋連延掩映於大山廟下荆州刺史行部見之雅嘆其盛勅縣號為冠葢里漢書筑陽屬南郡故國今穀城縣莽曰宜禾應劭曰筑水出漢中房陵東入沔筑音逐圖經曰穀城縣有酇城漢志曰即蕭何所封也均州十道志曰均州武當郡禹貢豫州之域春秋時楚地秦置南陽郡漢志曰武當屬南陽郡十道志曰鄖鄉古麏國也左傳曰楚潘崇伐麏至于錫穴又地形志曰漢中郡之東界有錫縣即古之錫穴也隨州十道志曰隨州漢東郡春秋隨侯之國秦及兩漢屬南陽郡左傳曰楚武王侵隨鬬伯比言於楚子曰漢東之國隨為大漢志曰隨屬南陽郡故厲國也左氏傳曰楚伐徐齊師伐厲救之厲音頼又曰舂陵屬南陽郡侯國故蔡陽之白水鄉上唐鄉漢文帝元朔五年以零陵泠道之舂陵鄉封長沙王子買為舂陵侯後以舂陵下濕上書徙南陽今棗陽有舂陵故城太平御覽卷一百六十八
