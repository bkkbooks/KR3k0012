body:
  text: 太平御覽卷四百五十八宋李昉等撰人事部九十九鑒戒上易曰終日戒又曰君子終日乾乾夕惕若厲无咎又曰見羣龍无首吉又曰履霜堅氷至又曰積善之家必有餘慶積不善之家必有餘殃又曰其亡其亡繫於苞桑又曰當憂悔吝之時其介不可慢也又曰言行者君子之樞機樞機之發榮辱之主也可不慎乎尚書曰兢兢業業一日二日萬㡬又曰無稽之言勿聽弗詢之謀勿庸又曰不矜細行終累大德又曰功崇惟志業廣惟勤位弗期驕祿弗期侈又曰先王克謹天戒又曰作德心逸日休作偽心勞日拙又曰儆戒無虞罔失法度又曰懔乎若朽索之馭六馬又曰德惟一動罔弗吉德二三動罔弗凶毛詩曰惴惴小心如臨于谷又曰戰戰兢兢如臨深淵如履薄氷又曰無念爾祖聿修厥徳又曰白圭之玷尚可磨也斯言之玷不可為也左傳曰晉入楚軍三日穀范文子立於戎馬之前曰君㓜弱諸臣不佞何以及此君其戒之周書曰惟命不于常有德之謂也君其戒之又曰禍福無門唯人自召又曰臧孫云季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石孟孫死吾亡無日矣又曰吳公子札來聘見叔孫穆子悦之謂穆子曰子其不得死乎好善不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不慎所居何以堪之禍必及子聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉謂子産曰鄭之執政者侈難將至矣政必及子子為政慎以禮不然鄭國將敗適晉說叔向曰吾子勉之君侈而多良大夫皆富政將在家吾子直必思自免於難又曰正考父三命益恭故鼎銘云一命而僂再命而傴三命而俯循牆而走亦莫予敢侮禮曰毋不敬儼若思安定辭又曰敖不可長欲不可縱志不可滿樂不可極又曰安安而能遷臨財毋苟得臨難毋苟免狠毋求勝分毋求多又曰不登髙不臨深不苟訾不苟笑孝子不服闇不登危懼辱親也又曰管仲鏤簋朱紘山節藻梲君子以為濫矣晏平仲祀其先人豚肩不揜豆澣衣濯冠以朝君子以為隘矣是故君子之行禮也不可不慎也又曰莫見乎隱莫顯乎㣲故君子慎其獨也孝經曰在上不驕髙而不危制節謹度滿而不溢論語曰君子有三戒少之時戒之在色及其壯也戒之在鬭及其老也戒之在得又曰如有周公之才之美使驕且吝其餘不足觀也已又曰三思而後行再斯可矣家語曰孔子之周觀於太廟右階之前有金人焉三緘其口而銘其背曰古之慎言人也戒之哉無多言多言多敗無多事多事多患安樂必戒無形所悔勿謂何傷其禍將長勿謂何害其禍將大勿謂莫聞神將伺人熒熒不㓕炎炎奈何涓涓不壅終為江河綿綿不絶將成網羅毫末不札將尋斧柯誠能慎之福之根也口是何傷禍之門也强梁者不得其死好勝者必遇其敵盜憎主人民怨其上君子知天下之不可上也故下之知衆之不可先也故後之温恭慎德使人慕之執雌持下人莫踰之人皆趨彼我獨守此孔子顧謂弟子曰此言雖鄙而中事情又孔子觀於周廟而有欹器焉孔子問守廟者曰此謂何器對曰盖謂侑坐之器孔子曰吾問侑坐之器滿則覆虛則欹中則正有之乎對曰然孔子使子路取水而試之滿則覆中則正虛則欹孔子喟然而嘆曰嗚呼惡有滿而不覆者哉子路曰敢問持滿有道乎孔子曰持滿之道挹而損之子路曰損之有道乎孔子曰髙而能下滿而能虛富而能儉貴而能卑智而能愚勇而能怯辯而能訥博而能淺明而能闇是謂損而不極能行此道唯至德者及之易曰不損而益之自損而終益故也家語曰孔子行遊中路聞哭者聲甚悲孔子驅之前有異人者少進見之吾丘子也擁鏁帶索而哭孔子辟車而下問曰夫子有喪也何哭之悲也吾丘子對曰吾有三失孔子曰願聞三失吾丘子曰吾少好學問周遊天下還後吾親亡矣一失也事君驕諌不遂是二失也厚交友而後絶三失也樹欲静而風不止子欲養而親不待徃而不來者年也不可得再見者親也請從此辭則自刎而死孔子曰弟子記之此足以為戒矣於是弟子歸養親者十三人又曰曾子曰狎甚則簡莊甚則不親是故君子之狎足以交情莊以成禮而已孔子聞斯言也曰二三子志之孰謂參也而不知禮乎又曰衞孫文子得罪於獻公居戚公卒未葬文子擊鍾焉延陵季子適晉過聞之曰異哉夫子之在此也猶鷰之巢於幕懼猶未也又何樂焉君又在殯可乎文子於是終身不聽琴瑟孔子聞之曰季子能以義正人文子能克己復義可謂善譏善改矣國語曰智襄子為室美士窋夕焉智伯曰室美夫對曰美則美矣抑臣亦有懼也曰何懼對曰臣以秉筆事君記有之曰夫髙山峻原不生草木松栢之地其土不肥今土木勝臣懼其不安人也室成三年而智氏亡漢書張安世曾孫勃嗣每登閣殿常曰桑霍為我誡豈不厚哉又曰雋不疑字曼倩渤海人也為郡文學進退必以禮名聞州郡武帝末郡國盗賊羣起暴勝之為直指使者綉衣持斧捕盗素聞不疑賢至渤海遣吏請與相見躧履迎堂坐定不疑據地曰竊伏海濵聞公子舊矣迺今承顔接辭凢為吏太剛則折太軟則廢威行施之以恩然後樹功揚名永終天禄勝之納其誡深接以禮又曰楊惲失爵位居處治産業起室宅其友人安定守孫㑹宗與書誡之曰大臣廢退當闔門惶恐為可憐之意不當通賔客有稱譽也惲内懷不服驕奢不悔坐腰斬前列曰元帝時京房以言災異數召見又為吏考課事奏之因問上曰幽厲之君何以危所任者何人上曰主不明而任巧佞房曰知巧佞而任邪將以為賢而任之耶上曰賢之房曰然則何以知其不賢也曰以其時亂而君危知之房曰今治乎亂乎上曰亂房曰然則有所任乎上曰幸其未至於彼也房曰臣恐後世之視今猶今之視古也元帝嘿然又曰韓延壽善為政坐法棄市吏民數千人送至渭上老小扶持車轂争奉酒炙延壽不忍拒逆為飲酒石餘使掾吏分謝吏民百姓莫不流涕延壽三子皆為郡吏臨死屬其子勿為吏以巳為戒子皆以父言去官東觀漢記曰馮勤遷司徒是時三公多見罪退上欲令以善自終乃因讌見從容戒之曰朱浮上不忠於君下陵轢同列終以中傷放逐受誅雖復追加賞賜不足以償不訾之身忠臣孝子鑒照前世以為鑒戒能盡忠於國勤事無二則爵賞光乎當世名利垂於不朽可不勉哉又曰樊宏為人謙慎常戒其子曰富貴盈溢未有能終者天道惡滿而好謙前世貴戚明戒也保身全已豈不樂哉後漢書班超為都䕶以任尚代超尚謂超曰君在外國三十餘年而小人猥承君後宜以誨之超曰塞外吏士本非孝子順孫皆以罪過徙補邊而遠人懷鳥獸之心難養易敗今君情嚴急水清無大魚察政不得下和宜蕩佚簡易寛小過䋲大罪而已又曰馬援出屯襄國詔百官祖道援謂黄門侍郎梁松竇固曰凡人貴富當使可賤如卿等欲不可復賤居髙自持勉思鄙言松後果貴滿致災固亦幾不免後漢書馬援兄子嚴敦並喜通輕俠援前在交趾遺書戒之曰吾欲汝曹聞人過失如聞父母之名耳可得聞而口不可得言也好議論人長短是非正法此吾所大惡也寧死不願聞子孫有此行又曰徐穉嘗為太尉黄瓊所辟不就及瓊卒歸葬穉乃負粮徒步到江夏赴之設鷄酒薄祭哭卒而不告姓名時㑹者四方名士郭林宗等數十人聞之疑其穉也乃選能言生茅容輕騎追之及於塗容為設飯共言稼穡之事臨决去謂曰為我謝郭林宗大厦將顛非一䋲所維何為栖栖不遑寧處也魏志曰傅嘏與鍾㑹從平毌邱儉後㑹有自矜色嘏戒之曰子志大量小而勲業難為也可不慎哉又曰吏部尚書何晏詣管輅問曰連夢青蠅數頭來在鼻上驅之不肯去有何意故輅曰今君侯位重山岳勢若雷霆而懐德者鮮畏威者衆殆非小心翼翼多福之人又鼻者艮此天中之山髙而不危所以長守富也今有蠅而集焉位峻者顛輕毫者亡不可不慎又曰曹爽飲食衣服擬於乗輿擅取武庫禁兵曹羲深以為憂數諌止之又著書三篇陳驕淫盈溢之致覆敗辭㫖甚切不敢斥爽託戒諸子以示爽爽知其為巳發也甚不悦羲或時以喻不納涕泗而起吳志曰孫權每田獵常乗馬射虎虎嘗突前攀持馬鞍張昭變色而前曰將軍何用不當爾夫為人君謂能駕御英雄驅使羣賢豈謂馳逐於原野校勇於猛獸者乎江表𫝊曰孫權征合肥還為張遼所襲㡬至危殆賀齊率三千兵在南律迎權既就大船㑹諸將飲宴齊下席流涕而言曰至尊人主當持重今日之事㡬致禍敗羣下震怖若無天地願以此為終身戒權自前拭其淚曰大慙謹以刻心非但書紳也王隠晉書曰庾衮兄女芳將嫁美服具矣衮刈荆苕為箕箒焉召諸子集之於堂男女以班而命芳來汝少孤汝逸汝豫不汝疵瑕今汝將適人事舅姑灑掃庭内婦人道也故賜汝以此匪器之美欲汝之温恭朝夕雖休勿休也晉書曰趙王倫簒位嵇紹為侍中惠帝復祚紹居本職上䟽諌曰願陛下無忘金墉大司馬無忘潁上大將軍無忘黄橋則禍亂之萌無由而兆隋書曰賀若弼父敦以武烈知名仕周為金州總管宇文䕶忌而害之臨刑呼弼謂之曰吾必欲平江南然此心不果汝當成吾志且吾以舌死汝不可不思因引錐刺弼舌出血誡以慎口唐書曰太宗嘗謂長孫無忌等曰朕聞主賢則臣直人不自知公直面論攻朕得失無忌奏言陛下武功文德跨絶古今發號施令事皆利物孝經云將順其美臣順之不暇實不見陛下有所愆失太宗曰朕兾聞已過公乃妄相謏悅朕今面談公等得失以為鑒誡言之者無過聞之者可以自改因目無忌曰善避嫌疑應對敏速求之古人亦當無比而總兵攻戰非所長也髙士廉涉獵古今心術聰悟臨難既不改節為官亦無朋黨所少者骨鯁規諌耳唐儉言辭俊利善和解人酒盃流行發言啓齒事朕三十載遂無一言論國家得失楊師道性行純善自無愆過而情實怯懦未甚更事緩急不可得力岺文本性過敦厚文章自其所長而持論恒據經逺自當不負於物劉洎性最堅貞言多利益然其意尚然諾私於朋友能自補闕亦何以尚馬周見事敏速性甚貞正於論量人物直道而行朕比任使多所稱意褚遂良學問稍長性亦堅正既冩忠誠甚親附於朕譬飛鳥依人人自加以憐愛又曰閻立本雖有應務之才而尤善圖􅀞工於冩真秦府十八學士圖及貞觀中凌烟閣功臣圖並立本之迹也時人咸稱其妙太宗嘗與侍臣學士浮舟於春苑池中有異鳥隨波容與太宗撃賞數四詔座者為詠召立本令冩焉時閣外𫝊呼云􅀞師閻立本時已為主爵郎中奔走流汗俯伏池側手揮丹粉瞻望座賞不勝媿赧退戒其子曰吾少好讀書幸免牆面緣情筆翰頗及儕流唯以丹青見知躬厮役之務辱莫大焉汝宜深戒勿習此末伎立本為性所好欲罷不能也及拜右相與左相姜恪對掌樞宻恪既厯任將軍立功塞外立本唯善於圖畫非宰輔之器故時人以千字文為語曰左相宣威沙漠右相馳譽丹青唐書曰房𤣥齡嘗誡諸子以驕奢沉溺必不可以地望陵人集古今聖賢家戒書於屏風令各取一具謂曰若能留意足以保身成名又云袁家累葉忠節是吾所尚汝宜師之太平御覽卷四百五十八
