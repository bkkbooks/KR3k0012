body:
  text: 太平御覽卷七百三十九宋李昉等撰疾病部二總叙疾病下狂陽狂人謂之狂顛癡癎總叙疾病下吕氏春秋曰身盡府種筋骨沉滯血脈壅塞九窮寥寥曲失其宜髙誘曰冗腹病也慬首疾也亟三關之欲以病其身支九窮瘳瘳然虛曲失其適以字其生也雖有彭祖猶不能為也太公金匱曰丁候不朝武王乃畫丁候三旬射之丁候病大劇使人卜之崇在周恐懼乃遣使者請之於武王願舉國為臣虜武王許之歸為太師尚父謂使曰歸矣吾已告諸神言丁候前畔義今已遣人來降勿復過也比使者歸子之君所自念矣使者辭去歸至丁候病稍愈四夷聞之皆懼各以其職來貢六韜曰欲伐大國行且有期王寢疾十日不行太公負之而起曰行已有期君不發天子聞之國亡身死胡不勉之王説焉如無病者説苑曰邴吉有隂徳於孝宣帝㣲時及即位衆莫知亦不言帝將封之㑹吉病甚將使人加封及其生也太子太傅夏侯勝曰此未死也臣聞有隂徳必饗其樂以及子孫病果愈封為博陽侯世説曰衞玠總角時嘗問樂廣夢樂云是想衞曰神影所不接而夢豈是想曰因也衞因思經日不得遂病樂聞故命駕為剖折之衞病小小而差樂嘆曰此兒胸中當必無膏肓命又曰衞玠從豫章下都人久聞其姿容觀者如堵墻玠先有嬴疾不堪勞遂發病死時人謂之看殺衞玠語林曰王仲祖病劉真長為稱藥荀令則為量水矣又曰孔君平病困庾司空為㑹稽省之問訊甚至為之流涕孔慨然曰丈夫將終不問安國寧家之術而反作兒女相問庾聞迴還謝之請其語言桓譚新語曰余少時見楊子雲之麗文髙論不自量年少新進而猥欲建及嘗激一事而作小賦用精思太劇而立感病子雲亦言帝上甘泉詔使作賦為文卒暴及倦卧夢其五藏出在地以手收内及覺大作氣病一嵗卒王符潛夫論曰夫理世不得真賢譬曰治疾不得真藥也治病當得真人參反得羅菔當得麥門冬反得蒸穬麥已而不識真合而服之病以浸劇不自知為人所欺也乃反謂方不誠而藥皆無益於療病因棄後藥弗敢復飲而更求巫覡者雖死可也論衡曰子夏喪明曽子責以有罪按伯牛有疾仲尼以為命也或是喪子數哭因中風耳風俗通曰無恙俗説恙病也凡人相見及書問者曰無疾病邪案上古之時草居野宿恙噬虫也善食人心凡相勞問曰無恙乎非為病也白虎通曰天子疾稱不愈諸侯稱負子大夫稱負薪士稱犬馬不愈者不復預政也負子者諸侯子民今不復子民也負薪犬馬皆謙也楊泉物理論曰凡病可治也人不可治也體羸性弱不堪藥石或剛暴狷急喜怒不節或情慾放縱貪滛嗜食此皆良醫不能加功焉夫君子病也猶可為也必使無病也不可為矣蓋謂節其飲食量其多少也又曰穀氣勝元氣其人肥而不夀元氣勝穀氣其人瘦而夀養性之術常使穀氣少則病不生矣葛洪神仙傳曰茅君治於茅山人有疾病徃請福常煮雞子十枚以内帳中須臾茅君皆一一擲雞子還之歸破之皆無復黄者病人當愈若中有土者不愈以為常候雞子如故無開處也漢武故事曰初霍去病㣲時數自禱神君乃見其形自修飾欲與去病交接去病不肯神君亦慙及去病疾篤上命為禱神君神君曰霍將軍精氣少夀命不長吾嘗欲以太一精補之可得延年霍將軍不曉此意逐見斷紀今疾必死可無救也去病竟薨西京雜記曰髙祖初入咸陽宫周行庫有方鏡廣四尺髙五尺九寸表裏有明人疾病在内揜心照之則知病之所在皇甫謐髙士傳曰安丘望之病弟子公沙都來看之舉之於庭樹下安丘曉然有痊開目見雙赤李着枯枝都仰手承李安丘食之所苦盡除皇甫謐自序曰士安每病母輒推燥居濕以視易單何顒别傳曰張仲景過山陽王仲宣謂曰君體有病後年三十當眉落仲宣時年十七以其言貫逺不治後至三十疾果落眉三輔决録曰趙岐初名嘉年三十餘有重疾卧蓐七年自慮奄怱乃為遺令勅兄子可立一員石於吾墓前刻之曰漢有逸民姓趙名嘉有志無時命也奈何劉槙與曹植書曰明使君始垂哀憐意眷日崇譬之疾病乃使炎農分藥岐伯下鍼疾雖未除就沒無恨何者以其天醫至神而榮魄自盡也狂書曰狂恒雨若尚書多方曰周公曰惟聖罔念作狂唯狂克念作聖毛詩曰不見子都乃見狂且又東方未明曰折柳樊圃狂夫瞿瞿論語子路曰不得中行而與之必也狂狷乎狂者進取狷者有所不為也又子在陳曰歸歟歸歟吾黨之小子狂簡斐然成章不知所以裁之又楚狂接輿歌而過孔子曰鳳兮鳳兮何徳之衰徃者不可諫來者猶可追已而已而今之從政者殆而國語晉語曰下邑之役董安于多獲下邑晉邑安于趙簡子家臣趙簡子賞之辭固賞之對曰今臣一旦為狂疾而曰必賞汝言戰鬬為凶事猶人狂易之􅍚是以狂疾賞也不如亡趨而出乃釋之漢書曰昌邑王賀衣服言語跪起清狂不慧或曰清狂如今曰癡也又曰蓋寛饒曰無多酌我我廼酒狂丞相魏侯笑曰次公醒而狂何必酒也次公寛饒字又曰莽時長安狂女子碧呼道中曰髙皇帝大怒趣歸我國不者九月必殺汝莽收捕殺之東觀漢記曰郅惲字君章上書諫王莽令就臣位莽大怒即收繫惲難即害之使黄門脅導惲令為狂疾惚恍不自知所言惲曰所言皆天文非狂人所造作呉志曰全琮為督議欲分别諸將有所掩襲朱桓素氣髙耻見部伍遂託狂發詣建業治病王隠晉書曰吾彦給役陸抗抗欲拔之患衆不聴乃悉請當為將者入坐以試勇怯有一狂人拔刀跳梁來向坐中餘者皆走惟彦獨坐舉抗禦之狂人乃退衆服其勇沈約宋書曰袁愍孫著妙徳先生𫝊曰嘗謂周旋人曰昔有一國國中一水號曰狂泉國人飲此水無不狂也唯國君穿井汲獨得無恙國人既狂謂主不狂為狂於是聚謀共執國主療其狂疾火艾針藥莫不畢具國王不任其苦於是到泉所酌水飲之飲畢便狂君臣大小其狂若一衆乃懽然我既不狂難以獨立此亦欲試飲此水宋書曰顔延之有文名帝嘗問以諸子才能延之曰竣得臣筆測得臣文􅎢得臣義躍得臣酒何尚嘲之曰誰得卿狂荅曰其狂不可及鬻子曰昔魯周公曰吾聞之於政也知善不行者謂之狂知惡不改者謂之惑夫狂與惑者聖人之貳也老子曰馳騎田獵令人心發狂韓子曰心不能審得失之地則謂之狂又曰狂者東走逐者亦東走其走則同其所以東走之為則異淮南子曰谷氣多痺邱氣多狂又曰今夫狂者無憂聖人亦無憂不知禍福也又曰不知道者釋其所已有而求其所未得故福至則喜禍至則怖不悔已之所生乃反怨人不喜則憂謂之狂生又曰士有禍則詘有福則盈有過則悔有功則矜遂不知反此之謂狂傳子曰有惡劉煜於魏明帝謂􅁮不盡忠善伺上意所趣而合之帝如言以驗之果得情從此疎焉煜遂發狂出為大鴻臚以憂死諺曰巧詐不如拙誠信夫抱朴子曰食莨蕩令人狂荒不可謂人本有荒狂山海經曰觀水多鰩音遥魚其味酸食之已狂越絶書曰慧種生聖癡種生狂桂實生桂桐實生桐禰衡别傳曰衡為鼔吏祼身辱曹操孔融復見操説衡狂疾令求得自謝裴楷别傳曰石崇嘗與裴楷綷綽醉宴而綽慢節過度崇責之楷曰季舒酒狂四海所知足下飲人狂藥責人正禮王韶之始興記曰觀亭峽下有神廟傍石向江經道不恪者必狂走或變而為虎世説曰阮徳如嘗與親友逍遥河側歎曰大丈夫不能使伏從陷於河橋非丈夫也坐者或曰徳如以髙素致名不應發此言必將病之候俄而性理果僻欲逸走家人嘗以一細繩横繫之户前以維之每欲出繩礙輒反時人以為名士狂黄帝八十一問曰狂顛之疾何以别荅曰狂之始發少卧少饑自賢自貴妄笑好樂神異經曰西方有人飲食被髮東走其婦追之不止怒亦被髮名曰狂一名顛一名狷一名風此人夫妻與天俱生狂走東西没晝夜魏武帝令曰昔吾同縣有一丁㓜陽者其人衣冠良士又學問材器吾愛之後以憂患得狂疾即差愈徃來故常共宿止吾常遺歸謂之曰昔狂病儻發作持兵刃我畏汝俱共大笑輒遣不與共宿陽狂周書曰太公曰知與衆同者非人師也大知似狂不癡不狂其名不彰不狂不痴不能成事史記曰箕子紂庶兄也諫紂不聴或曰可以去矣箕子曰為人臣諫不聴而去是彰君惡而自悦民吾不忍為乃披髮陽狂而為奴又曰蒯通説韓信不從通乃陽狂為巫東觀漢記曰丁鴻讓國於弟盛逃去鴻初與九江人鮑駿同事桓榮甚相友善及鴻亡駿遇於東海陽狂不識駿駿乃止而讓之曰今子以兄弟私恩而絶父不㓕之基可謂智乎鴻感愴垂涕歎息乃還就國謝承後漢書曰雷義字仲公舉茂才讓於友陳重刺史不聴義陽狂披髮走不應晉書曰王衍字夷甫精神明秀風姿俊雅楊駿欲以女妻焉而衍恥之遂陽狂自免又素輕趙王倫之為人及倫簒位衍陽狂斫婢以自免王隠晉書曰王長文字徳叡廣漢郡人世為郡守少放蕩不覊檢益州五辟公府再辟皆不就陽狂不詣郡縣舉致改服逃出舉州追求乃於城都賣熱布弟見長文蹲踞地嚙胡餅刺史知其不居禮送還家英雄記曰向栩字甫興性卓詭不倫恒讀老子狀如學道又似狂生好披髮着襂頭常於竈北坐板床上如是積久板乃有膝踝足指之處楚國先賢傳曰石偉字公操南郡人仕呉拜光禄大夫呉建威將軍王戌親詣偉大康二年詔以偉為議郎加二千石秩以終厥身偉遂陽狂及亡不受晉華陽國志曰犍為費昭不肯仕公孫述乃漆身為厲陽狂以避之人謂之狂史記曰東方朔在人主左右諸郎半呼之狂人人主聞之曰今朔在事無足為行者若等安能及之哉朔行殿中郎謂之曰人皆以先生為狂朔曰如朔等所謂避世於朝廷間者漢書曰酈食其陳留髙陽人也沛公畧地陳留沛公麾下騎士適食其里中子騎士歸食其謂曰臣里中有酈生人皆謂之狂生自謂我非狂騎士如所戒沛公召之後漢書曰延熹末黨事將作袁閎遂散髮絶世欲投迹深林以母老不冝逺遁乃築土室四周於庭不為户自牖納飲食而已且於室中東向拜母母思閎時徃就視母去便自掩門兄弟妻子莫得見也及母殁不為制服設位時莫能名或以為狂生范􅁮後漢書曰仲長統倜儻不務小節語嘿無常時人謂之狂生南史曰王僧達所為非法坐免官後孝武獨召見傲然了不陳遜惟張目而視及出帝歎曰王僧達非狂如何乃戴面向天子北史曰任城王城時髙肇當朝猜忌賢戚澄為肇間搆常恐不令乃終日昏惰以示荒敗所為詭越時謂為狂唐書曰蘇世長嘗從髙祖幸涇陽校獵至髙陵合圍是日大獲陳禽獸於旌門髙祖入御營顧謂朝臣曰今畋樂乎世長進曰陛下遊獵溥廢萬機不滿十旬未為大樂髙祖色變既而笑曰狂態發耶又對曰為臣私計則狂為陛下國計則忠畢子曰周公旦人謂之狂後世稱其徳奇繚子曰太公望行年七十屠牛朝歌賣食棘津遇七十餘主不聴人皆曰狂丈夫莊子曰宋桓候行未出城門其前驅呼避至於家家人止之以為狂也呼避使人呼道也家人謂狂正而不聴此乃言聞其所未聞則以為狂也世説曰諸葛厷在西朝少有清譽尤為王夷甫所重時論亦以擬王氏後為繼母族黨所䜛論之為狂將逺徙友人王夷甫之儔詣檻與别厷問王曰朝廷何以徙我王曰言卿狂逆厷曰逆則宜殺狂則何所徙繆襲撰仲長統昌言表稱統曰統性俶儻敢言不拘小郡每州郡命召輒稱疾不就語黙無常時人或謂之狂魏畧曰寒貧者本姓石字徳林初客三輔關中亂南入漢中後還長安遂癡愚不復識人食不求味冬夏常衣弊布連結衣人問其姓名口不肯言故號之曰寒貧也或徃存䘏之輒跪拜人復謂其不癡晉書曰王述字懷祖年三十尚未知名人或謂之癡司徒王導始辟為中軍參軍既見無他言唯問江東米價述但張目不荅導曰王掾不癡人何言癡也南史曰沈昭畧字茂隆性狂雋不事公卿使酒杖氣無所惟下嘗醉晩日負杖攜家賓子弟至婁湖苑逢王景文子約張目視之曰汝是王約耶何乃肥而癡約曰汝沈昭畧耶何乃瘦而狂昭畧撫掌大笑曰瘦已勝肥狂亦勝癡奈何王約奈汝癡何魏志曰明悼毛皇后父嘉本典虞車工卒暴富貴帝令朝臣㑹其家飲宴其容止舉動甚癡騃語輒自謂侯身時人以為笑晉書曰顧愷之字長康晉陵無錫人尤善丹青嘗以畫一厨糊題其前寄桓𤣥皆素所珎者𤣥乃發其厨後竊取畫而緘識如舊以還之紿云未開愷之見封題如初但失其畫直云妙畫通靈變化而去猶人之登仙了無怪色𤣥嘗以一栁葉紿之曰此蟬所翳葉也取以自蔽人不見已愷之喜引以自蔽𤣥就溺焉愷之嘗在桓温府常云愷之體中癡黠各半合而論之正得平耳故俗𫝊愷之有三絶才絶癡絶畫絶後魏書曰太祖謂尚書崔𤣥伯曰蠕蠕而蠢反之民昔來號為頑囂每來抄掠駕㹀牛奔道驅犍牛隨之㹀牛伏不能前其部人教其以犍牛易之者蠕蠕曰其母尚不能行而况其子終於不易遂為敵所虜隋書曰楊𤣥感司徒素之子也體貌容偉美鬚髯少時晩成人多謂之癡其父母謂所親曰此兒不癡也及長好讀書便騎射以父軍功位至柱國唐書曰竇威家世勲貴諸昆弟並尚武藝而威躭玩文史介然自守諸兄哂之謂為書癡又曰臺端御史最為雄劇食坐之南設一横榻謂之南牀殿中監察不得坐其榻亦謂之癡牀言處其上者皆驕傲自得使人如癡故謂之癡床又曰李益與李賀齊名然少有癡病而多猜忌防閑妻妾過為苛酷而有散灰扃户之譚時謂妬癡風俗通曰夜糴俗説市買者當清旦而行日中交易所有夕時便罷今乃夜糴明其癡騃不足郭子曰王長史求東陽王䝉字仲祖撫軍不肯用晉太宗簡文皇帝先為撫軍大將軍王後疾篤臨終撫軍哀歎曰吾將負仲祖於此乃命用之長史曰人言㑹稽王癡真癡也㑹稽王簡文先封世説曰任育字長年少時甚有令名自過江便失志不飲人間云光為茶為茗覺有怪色乃自中名云向問飲為熟太平御覽卷七百三十九
