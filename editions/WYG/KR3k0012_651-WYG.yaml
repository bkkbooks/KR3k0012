front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_651-1a, image: WYG0898/WYG0898-0783c.png}
body:
  text: 太平御覽卷六百五十一宋李昉等撰刑法部十七除名免官收贖禁錮除名何法盛晉中興書曰胡母崇為永康令多受貨賂政治苛暴詔都街頓鞭一百除名為民隋書曰賀若弼父敦仕周被除名每出怨言晉公䕶徵還令自殺臨刑呼子弼謂曰吾欲必平江南然此心不果汝當成之吾事君以舌死汝不可不思因引錐刺弼舌出血誡以慎口又曰賀若弼坐免官弼怨望愈甚後數年下弼獄上謂之曰我以髙熲楊素為宰相女唱言云此二人唯堪㗖飯爾是何意也弼曰熲臣之故人素臣之舅子臣並知其為人誠有此語公卿奏弼怨望罪當死上惜其功於是除名為民又曰髙熲得罪除名為民熲初為僕射其母誡之曰汝富貴已極但有一斫頭耳爾宜慎之熲由是常恐禍變及此熲歡然無恨色以為得免於禍又曰權武為潭州總管晩生子與親客宴集酒酣遂擅赦所部内獄囚武帝以南越邊逺治從其俗務適便宜不依律令而每言當今法急官不可為上令有司案其事皆驗上大怒命斬之武於獄中上書言其父為武元皇帝戰死於馬前以此求哀由是除名為民晉律曰吏犯不孝謀殺其國王侯伯子男官長誣偷受財枉法及掠人和賣誘藏亡奴婢雖遇赦皆除名為民又曰除名比三歲刑又曰其當除名而所取飲食所用之物非以為財利者應罰金四兩以下勿除名晉潘岳閒居賦曰今天子諒闇之際領太傅主簿府誅除名為民俄而復官免官後漢書曰梁松遷太僕數為私書請託郡縣二年發覺免官遂懷怨望四年冬乃縣飛書誹謗下獄免官宋書曰庾登之為司徒左長史南東海太守府公彭城王義康專覽政事不欲自下厝懷而登之性剛每陳己志義康不悦出為吳郡太守以贓貨免官又曰謝靈運在㑹稽亦多徒衆驚動縣邑太守孟顗因靈運横恣表其異志靈運馳出京都詣闕上表自陳本末文帝知其見誣不罪也以為臨川内史在郡遊放不異永嘉為有司所糾司徒遣使隨州從事鄭望生收靈運靈運興兵叛逸遂有逆志為詩曰韓亡子房奮秦帝魯連恥本自江海人忠義感君子追討擒之送廷尉治罪廷尉論正斬刑上愛其才欲免官而已彭城王義康堅執謂不宜恕詔以謝𤣥勲叅徵官宜宥及後嗣降死徙廣州晉書曰免官比三歲刑其無真官而應免者正刑召還也又曰有罪應免官而有文武加官者皆免所居職官又曰其犯免官之罪不得減也又曰其當免官者先上免官謂不聽應收治者也收贖書舜典曰金作贖刑又吕刑曰墨辟疑赦其罰百鍰六兩曰鍰鍰黄鐵也劓辟疑赦其罰惟倍倍百為二百也剕辟疑赦其罰倍差倍差謂倍之又半為五百鍰宫辟疑赦其罰六百鍰大辟疑赦其罰千鍰國語曰桓公問齊國寡甲兵為之若何甲鎧兵弓矢之屬管仲對曰輕過而移諸甲兵諸之也謂輕其過使以甲兵贖罪制重罪贖以犀甲一㦸重罪死刑也犀牛皮也可為甲㦸車㦸也㦸長二丈六尺輕罪贖以鞼劬位切盾一㦸輕罪劓刖之屬也鞼盾綴革有文如繢小罪讁以金分小罪不入於五刑者以金贖有分兩之差今之罰金是也書曰金作贖刑也家語曰魯國之政法贖人臣妾於諸侯皆取金内府子貢贖之而辭不取孔子聞之曰賜失之矣夫聖人舉事可以移風易俗而教導不可施於百姓非獨適身之行也今魯國富者寡貧者多贖人受内府金則為不亷則何以相贖乎自今已後魯人不復贖人于諸侯矣漢書曰文帝常行中渭橋有一人聞蹕匿橋下久以為蹕過走出乘輿馬驚廷尉張釋之奏犯蹕當罰金帝怒曰賴吾馬和柔令他馬已傷敗我廷尉何罰金耶又曰張敞上書論死罪以下出粟贖罪以給軍用蕭望之以為父兄囚執子弟將不顧死亡之患敗亂之行以赴財利求救親戚一人得生十人以䘮且富者得生貧者獨死刑法不一也又曰貢禹上言孝文皇帝時貴亷潔賤貪汚賈人贅聓及吏坐贓者皆禁錮不得為吏無贖罪之法令行禁止海内大化武帝始臨天下尊賢用士開地廣境自見功大威行遂縱嗜欲乃行一時之變使犯法者贖罪入穀者補吏是以天下奢侈官亂民貧盜賊並起又曰衛青為大中大夫元光六年拜為車騎將軍撃匈奴出上谷公孫敖出代郡李廣出鴈門敖亡七千騎廣為虜所得得脱歸皆當斬贖為庶人又曰趙食其殺栩人也殺下外切栩滸羽切為將軍從大將軍出定襄迷失道當斬贖為庶人又曰博望侯張騫郞中令李廣俱出右北平異道匈奴左賢王將數萬騎圍廣廣與戰三日騫至匈奴引兵出騫坐行留當斬贖為庶人又曰右衛將軍蘇建亡軍獨身脱還贖為庶人後漢書曰孝明時詔亡命自殊死已下贖死罪縑四十疋右趾髠鉗城旦舂十疋定城旦至司冦五疋犯罪未發覺詔書到日吿首者半入贖晉書曰王宏有政績後為河南尹苛碎坐桎梏罪人以泥墨塗面置深坑中餓不與食又擅縱五歲刑以下二十一人為有司所劾帝以宏累有功績聽以贖罪論又曰烈王無忌閔王承之子也承為荆州刺史王廙所害江州刺史禇裒當之鎮無忌及丹陽尹桓景等餞於板橋時王廙子丹陽丞耆之在坐無忌志欲復讎拔刀將手刃之裒景命左右救捍獲免御史中丞車灌奏無忌欲專殺人付廷尉科罪成帝詔曰王當以體國為大豈可尋繹由來以亂朝憲主者其申明法令自今已往有犯必誅於是聽以贖論南史曰到撝永明元年為御史中丞車駕幸丹陽郡宴飲撝恃舊酒後狎侮同列謂庾杲之蠢爾蠻荆其俗鄙復謂虞悰曰斷髮文身其風陋王晏既貴雅步從容又問曰王散騎復何故爾晏先為國常侍轉員外散騎郞此二職清華所不為故以此嘲之王敬則執榠查以刀子削之又曰此非元徽頭何事自喫之為左丞庾杲之所糺以贖論唐書曰後魏起自北方屬晉室之亂部落漸盛其主乃峻刑法每以軍令從事人乘寛政多以違令得罪死者以萬計於是國中騷然其後當死者聽其家獻金馬以贖㑹稽典録曰橋矯為右丞詣南宫取急案條閣舊事於複道中逢太常羊柔不避車又不下矯糺奏柔以為知丞即應行威儀有序九列外官而公干犯請廷尉治柔罪詔勿治以三月俸贖罪晉律曰其年老小篤癃病及女徒皆收贖又曰諸應收贖者皆月入中絹一疋老小女人半之又曰贖死金二斤也又曰贖罪囚罰金四兩也又曰以金罰相代者率金一兩以罰當十也禁錮左傳成二年楚共王即位將為陽橋之役使屈巫聘于齊且吿師期巫臣盡室以行遂奔晉晉人使為邢大夫子反請以重幣錮之禁錮勿令仕王曰止其自為謀也則過矣其為吾先君謀也則忠忠社稷之固也所蓋多矣蓋覆也且彼若能利國家雖重幣晉將可乎言不許若無益於晉晉將棄之何勞錮焉又襄二十一年㑹於商任錮欒氏也禁錮欒盈使諸侯不得受之二十二年㑹于沙隨復錮欒氏也晉知欒盈在齊故復錮也後漢書曰河内張成善説風角推占當赦遂教子殺人李膺為河南尹督促收捕既而逢宥獲免膺愈懷憤疾竟案殺之初成以方伎交通宦官帝亦頗訊其占成弟子牢循因上書誣吿膺等養太學遊士交結諸郡生徒更相驅馳共為部黨誹訕朝廷疑亂風俗於是天子震怒班下郡國逮捕黨人布吿天下使同忿疾遂收執膺等其辭所連及陳寔之徒二百餘人或有逃遁不獲皆懸金搆募使者四出相望於道明年尚書霍諝城門校尉竇武並表為請帝意稍解乃罷赦歸田里禁錮終身而黨人之名猶書王府熹平五年永昌太守曹鸞上書大訟黨人言甚激切帝省奏大怒即詔司𨽻益州檻車收鸞送槐里獄掠殺之於是又詔州郡更考黨人門生故吏父子兄弟其在位者免官禁錮爰及五屬謂斬衰齊衰大功小功緦麻也又曰韓稜初為郡功曹太守葛興中風病不能聽政稜隂代興視事出入二年令無違者興子嘗發教欲署吏稜拒不從因令怨者章之章謂令上章吿言之事下案驗吏以稜掩蔽興病專典郡職遂致禁錮顯宗知其忠後詔特原之又曰第五倫上疏云三輔論議者至云以貴戚廢錮當復以貴戚浣濯之猶解酲當以酒也病酒曰酲詖險趣勢之徒誠不可親近齊書曰王宴茅翊位少府卿勅未登黄門郞不得畜女使詡與射聲校尉隂元之坐畜伎免官禁錮十年勅特原典畧曰馬騁在東觀十六年以為久費精思非養生之道擅去離署免官禁錮六年崔鴻前燕録曰遼東内史宋該舉侍郞韓偏為孝亷慕容舊令曰夫孝亷者道德沉敏貢之王庭偏往助叛徒迷固之罪至王威臨討憑城醜詈此則勃之甚奈何舉之剖符臣朝所取信該下吏可正四歲刑偏行財祈進虧亂王典可免官禁錮終身晉令曰犯免官錮三年鄭𤣥别傳曰𤣥病篤與益恩書曰吾預黨錮十四年也太平御覽卷六百五十一
