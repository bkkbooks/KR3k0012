  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_508-1a, image: WYG0897/WYG0897-0553a.png}
body:
  text: 太平御覽卷五百八宋李昉等撰逸民部八逸民八皇甫士安髙士𫝊曰摯峻字伯陵京兆長安人少治清節與太史令司馬遷交好峻獨退脩身徳隐於􅀈山遷既親貴乃與書勸峻進曰遷聞君子所貴乎道者三太上立徳其次立言其次立功伏惟伯陵材能絶人髙尚其志以善厥身氷清玉㓗不以細行汚累其名固己貴矣然未盡太上之所由也願先生少致意焉峻報書曰峻聞古之君子料能而行度徳而處故悔恡去於身利不可以虛受名不可以苟得漢興以來帝王之道於斯始顯能者見利不肖者自屏亦其時也周易大君有命小人勿用徒欲偃仰從容以送餘齒耳峻之守節不移如此遷居太史官為李陵游說下腐刑果以悔恡被辱峻遂髙尚不仕卒於􅛪􅛪人立祠號曰􅛪君又曰韓福者􅃰人也以行義修㓗著名昭帝時將軍霍光秉政表顯義士郡國條奏行狀天子得福等五人行義最髙以徳行徴至京兆病不得進元鳯元年詔䇿曰朕愍勞福以官職之事賜帛五十疋遣歸其務脩孝悌以教鄉里福歸終身不仕卒於家又曰安丘望之京兆長陵人也少治老子經恬靜不求榮進號曰安丘丈人成帝聞欲見之望之辭不肯見上以其道徳深重常宗師焉望之不以見敬為髙愈自損退為巫醫於民間著老子章句故老氏有安丘之學扶風耿况王伋等皆師事之從受老子終身不仕道家宗焉又曰丘訢字季春扶風人也少有大才傲世不能與俗人為羣郡召始見曰明府欲臣訢耶友訢耶師訢耶明府所以尊寵人者極於功曹所以榮禄人者已於孝亷一極一已皆訢所不用也府君異之遂不敢屈三府决録曰丘訢傲俗自謂無伍又曰荀靖字叔慈父淑有名績靖兄弟八人號曰八龍靖至孝闔門悌睦隐身脩道弟爽字慈明亦有材學汝南許章稱二人皆玉也慈明外朗叔慈内潤大尉辟不就及終潁陽令丘禎號靖曰𤣥行先生潁川太守王懐亦謚曰昭定先生又曰任棠字季卿以春秋教授隐身不仕龎叅為漢陽太守就家候之棠以薤一本水一盆置户屏前自抱孫兒伏戸下叅曰棠是欲諭太守也水欲太守清也㧞一本薤欲太守擊強宗也抱孫兒當戶者欲太守開門恤孤也終叅去不言詔徴不至及卒鄉人圗畵其形至今稱任徴君也又曰張仲蔚平陵人與同郡魏景卿俱修道徳隐身不仕明天文博物善屬詩賦所處蓬蒿絶人閉門養性不治榮名時人莫識唯劉龔知之又曰髙恢字伯逺少談老子經恬虛不營世務與梁鴻善隐於華隂山又曰姜肱字伯淮彭城廣戚人也家世名族肱兄弟三人皆孝行著肱年最長與二弟仲海季江同被卧甚相親友及長各娶兄弟相愛不能相離習學五經兼明星緯弟子自逺方至者三千餘人聲重於時凡一舉孝廉十辟公府九舉有道至孝賢良公車三徴皆不就仲季亦不應徴辟建寧三年靈帝詔徴為犍為太守肱得詔乃告其友曰吾以為虛獲寶遂籍予價盛明之世尚不委質况今政在私門哉乃隐遯命乗船浮海使者廹之不及再以𤣥纁聘不就即拜大中大夫又逃不受詔名振天下年七十卒於家又曰徐稚字孺子豫章南昌人也少以經行髙於南州桓帝時汝南陳蕃為豫章太守因推薦稚於朝廷由是三舉孝廉賢良皆不就連辟公府不詣未嘗答命公薨輙身自赴弔太尉黄瓊亦嘗辟稚至瓊薨歸𦵏江夏稚既聞即負笈徒歩行豫章三十餘里至瓊墓前致醊而哭之後公車三徴不就以夀終又曰夏馥字子治陳留圉人也少為諸生質直不苟動必依道同縣髙儉及蔡氏凡二家豪富郡人畏事之唯馥閉門不與高蔡通桓帝即位災異數發詔有司舉直言之士各一人太尉趙戒舉馥不詣遂隐身久之靈帝即位中常侍曹節等專朝禁錮善士謂之黨人馥雖不交官然聲名為節等所憚遂與汝南范滂山陽張儉等數百人並為節所誣悉在黨中詔下郡縣各捕以為黨魁馥於是頓足而歎曰孽自己作空汙良善一人逃死禍及百家何以生為乃剪髪變服易形改姓入林慮山中為冶工客作形貎毁悴積傭三年而無知者後詔悉放儉等皆出馥獨嘆曰已為人所棄不宜復齒鄉里矣留賃作不歸家人求不知所處其後人有識其聲者以告同郡上黨太守濮陽潜使人以車迎馥馥自匿不肯見潜車三返乃得馥又曰申屠蟠字子龍陳留外黄人也少有名節同郡緱氏女玉為父報讐外黄令梁配欲論殺玉蟠時年十五為書生進諫曰玉之節義足以感無耻之人激忍辱之子不遭明時尚當追旌表廬况在清聽而不加哀矜配善其言乃為讞减死論人稱之及父母卒蟠思慕不飲酒食肉十餘年遂隐居學治京氏易嚴氏春秋小戴禮三業通貫博覽五經兼明圖緯學無常師始與濟隂王子居游學子居病困以身託蟠蟠即歩負其喪至濟隂遇司𨽻從事於河鞏之間從事義之為符傳護送蟠蟠不肯投傳于地而去事畢還家前後凡蒲車特徵皆不就年七十四以夀終又曰郭泰字林宗太原人也少事父母以孝聞身長八尺餘家貧郡縣欲以為吏歎曰丈夫何能執鞭斗筲哉乃辭母與同郡宗仲至京師從屈伯彦學春秋博洽無不通又審於人物由是名著於陳梁之間歩行遇雨巾一角墊衆人慕之皆折巾角士爭往從之載䇿盈車凡㤗知之於無名之中六十餘人皆先言後驗以母喪歸徐稚來弔以生芻一束頓泰廬前而去泰曰南州髙士徐孺子也詩曰生芻一束其人如玉吾不堪此喻後辟司徒府有道徴皆不就又曰袁閎字南甫汝南人也築室於庭中閉門不見客旦於室中向母拜雖子往不得見也子亦向戶拜而去首不著巾身無單衣足著木履母死不列服位公車再徴不詣范滂美而稱之曰隐不違親貞不絶俗可謂至賢也又曰牛牢字君直世祖為布衣時與牢遊夜講訖共言䜟劉秀當為天子世祖曰安知非我萬一各言爾志牢獨黙然世祖問之牢曰丈夫立義不與帝友大笑及世祖即位徴牢稱疾不至詔曰朕㓜交牛君真清髙士也恒有疾州郡之官者常見到家致意焉刺史郡守是以每輙奉詔就家存問牢恒被髪稱疾不答詔命又曰成公者成帝時自隐姓名常誦經不交世利時人號曰成公成帝時出遊問之成公不屈節上曰朕能冨貴人能殺人子何逆朕哉成公曰陛下能貴人臣能不受陛下之官陛下能富人臣能不受陛下之禄陛下能殺人臣能不犯陛下之法上不能折使郎二人就受政事十二篇又曰彭城老父者楚之隐人也見漢室衰乃自隐脩道不治名利至年九十餘王莽時徴故光禄大夫龔勝欲為太子師友祭酒耻事二姓莽廹之勝遂不食而死莽使者及郡守已下㑹歛者數百人先生痛勝以名致禍乃獨入哭勝甚悲既而曰嗟乎薰以香自燒膏以明自煎龔生竟夭夭年非吾徒也哭畢而起出衆莫知其誰又曰宋勝之字節夫南陽安衆人也少孤年十五失父母家於榖城􅀈中孝慕甚篤􅀈中化之少長有禮勝之每行見老人擔負輙以身代之獵之禽獸嘗分肉與有親貧者依稀數嵗乃至長安受易通明以信義見稱從兄衰為東平内史遣吏召之勝之曰衆人所樂者非勝之願也乃去遊太原從邭越牧羊以琴書自娯丞相孔光聞而就太原辟之不至元始三年病卒於太原又曰東海隐者漢故司直王良友也建武中良以清節徴用歴位至一年復還通友不肯見而讓之曰不有忠信竒謀而取大位自知無徳曷為致此而復遽去何往來屑屑不憚煩也遂距良終不納論者髙之又曰韓順字子良天水成紀人也以經行清白辟州宰不就王莽末隐於南山地皇四年漢起兵於南陽順同縣隗囂等起兵自稱上將軍西州大震唯順修道山居執操不囘囂以道術深逺使人賫璧帛卑辭厚禮聘順欲以為師順因使謝囂禮有来學義無往教即欲相師但入深山來囂聞矍然不敢強屈其後囂等諸姓皆㓕唯順山栖安然以貧㓗自終焉又曰摯恂字季直伯陵之十二世孫也明禮義遂治五經博通百家之言又善屬文詞論清羙渭濱弟子扶風馬融沛國桓驎等自逺方至十餘人既通古今而性温敏不耻下問故學者宗之常慕其先人之髙遂隐於南山之隂初馬融始從恂受業恂愛其才因以女妻之融後果為大儒文冠當世以是服恂之知人永和中和帝博求名儒公卿薦恂行侔曾閔學擬仲舒文叅長卿才同賈誼實瑚璉器也宜在宗廟為國貞輔由是公車徴不詣大將軍竇憲舉賢良不就清名顯於世以夀終三輔稱焉又曰姜岐字子平漢陽上邽人也少失父獨與母兄居治書易春秋恬居守義名重西州延熹中沛國橋𤣥為漢陽太守召岐欲以為功曹岐稱疾不就𤣥怒勅督郵尹益收岐若實不起者欲嫁其母而後殺岐益爭之𤣥怒益撾之益得杖且諫曰岐少修學孝義棲遅衡廬鄉里歸仁名宣州里實無罪狀益敢以死守之𤣥怒乃止岐於是髙名逾廣及母死喪禮畢盡讓平水田與兄岑遂隐以畜蜂豕為事教授者滿於天下營業者三百餘人辟州從事不詣民從而居之者數千家後舉賢良公府辟以為茂才為蒲坂令皆不就以夀終於家太平御覽卷五百八
