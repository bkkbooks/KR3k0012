body:
  text: 太平御覽卷一百十八宋李昉等撰偏霸部二呉孫堅孫䇿孫權孫亮孫休孫皓孫堅呉志曰堅字文臺呉郡富春人葢孫武之後也少為縣吏府召署為校尉㑹稽妖賊許昌起於句章堅以郡司馬募兵精勇得千餘人與州郡合討破之刺史臧旻列上功狀詔書除堅鹽瀆丞又徙下邳丞中平元年黄巾賊張角起於魏郡漢遣車駕將軍皇甫嵩中郎將朱雋將兵討擊之雋表請堅為佐軍司馬堅又募精兵合千許人與雋併力奮擊所向無前拜堅别部司馬中平三年遣司空張温西討邉章韓遂温表請堅叅軍事屯長安温以詔書召董卓卓良久乃詣應對不順堅數卓三罪勸温斬之温不忍發舉軍還拜堅議郎時長沙賊區星自稱將軍以堅為長沙太守克破星等漢朝録前後功封堅烏程侯靈帝崩董卓專擅朝政諸州郡並舉義兵討卓堅亦舉兵北至南陽衆數萬人南陽太守張咨晏然自若堅牽咨於軍門斬之郡中震慄無求不獲前到魯陽與袁術相見術表堅行破虜將軍領豫州刺史遂治兵於魯陽城進軍討卓卓憚堅猛壯乃遣將軍李傕等求和親堅曰卓逆天無道蕩覆王室今不夷汝三族則吾死不瞑目豈與汝和親耶復進軍大谷距雒九十里卓尋徙都西入關焚雒邑堅至雒修諸陵平塞卓所發掘訖引軍住魯陽初平三年術使堅征荆州擊劉表表遣黄祖逆於樊鄧之間堅破之追渡漢水遂圍襄陽單馬行峴山為祖軍士所射殺追諡武烈皇帝兄子賁帥將士衆還就術術復表賁為豫州刺史堅四子䇿權翊匡孫䇿呉志曰策字伯符堅初興義兵策母徙居舒與周瑜相友江淮間人咸向之堅薨還葬曲阿已乃渡江居江都策舅呉景時為丹陽太守䇿乃載母從曲阿興平元年謁袁術術甚奇之以堅部曲還策太傅馬日磾持節安集關東以禮辟策表拜懐義校尉術嘗嘆曰使術有子如孫郎死復何恨先是劉繇為揚州刺史揚州舊治壽春壽春術已據之繇乃渡江治曲阿時吳景尚在丹陽䇿從兄賁又為丹陽都尉繇至皆迫逐之景賁退舎溧陽繇遣樊能等屯江津張英屯當利以拒術術以景為督軍中郎將與賁共將兵擊英等連年不克䇿乃說術乞助景等平定江東術表策為折衝校尉行殄㓂將軍兵纔千餘騎數十疋賔客願從者數百人比至溧陽衆五六千策又徙母阜陵渡江轉鬭所向皆破莫敢當其鋒而軍令整肅百姓懐之策為人美姿顔好笑語闊達聽受善于用人是以士民樂為致死劉繇軍遁迯諸郡守皆捐城奔走吳人嚴白虎等衆各萬餘處處屯聚策引兵渡浙江據㑹稽乃攻破虎等盡更置長吏策自領㑹稽太守彭城張昭廣陵張紘秦松等為謀主時袁術僣號䇿以書責而絶之曹公表策為討逆將軍封為吳侯後術死長史楊𢎞大將張勲等將其衆欲就策廬江太守劉勲要擊悉虜之策輕軍晨夜襲拔廬江勲衆盡降勲與數百人自歸曹公是時袁紹方强而策并江東曹公乃以弟女配策小弟匡又為子彰取賁女又命揚州刺史嚴衆舉權茂才建安五年曹公與袁紹相拒于官渡策隂謀襲許迎漢帝密治兵未發㑹為故吳郡太守許貢客所刺傷瘡甚集張昭等謂曰中國方亂以吳越之衆三江之固足觀成敗公等善相吾弟呼權佩以印綬至夜卒時年二十六追諡曰長沙桓王孫權吳志曰孫權字仲謀兄策既定諸郡時權年十五以為陽羨長郡察孝亷舉茂才行奉義校尉漢以䇿逺修貢職遣使者劉琬加錫命琬語人曰吾觀孫氏兄弟雖各才秀明達然皆祿胙不終唯仲弟孝㢘形神竒偉體骨不恒有大貴之表年又最壽策薨以事授權權哭未及息策長史張昭謂權曰孝亷此寧哭時耶扶令上馬使出巡軍曹公表權為討虜將軍領㑹稽太守屯吳建安八年權西伐黄祖破其舟軍𤣥德表權行車騎將軍領徐州牧十六年權徙治秣陵明年城石頭改秣陵為建業二十一年冬曹公攻濡湏權令都尉徐祥詣曹公報使修好誓結婚姻二十三年十月權將如吳親乗馬射虎馬為虎所傷權投以雙㦸虎却廢常從張世擊以戈獲之二十四年關雲長圍曹仁于襄陽權内憚外欲以為己功飛牋于曹公乞討雲長閏月權與戰遂定荆州曹公表權為驃騎將軍持節領荆州牧封南昌侯權自公安都鄂改名武昌魏文帝踐祚加權九錫封為吳王初權外託事魏而誠心不欵魏欲遣侍中辛毗尚書桓階往與盟誓并徴任子權辭譲不受遂改元為黄武元年臨江拒守權使太子大夫鄭泉聘蜀主于白帝使復通好猶與魏文帝相往来至後年乃絶七年二月公卿百司皆勸上尊號夏四月夏口武昌並言黄龍鳯凰見丙申祭南郊即皇帝位是日大赦改元黄龍元年追尊父破虜將軍堅為武烈皇帝母貝氏為武烈皇后兄討逆將軍策為長沙桓王六月與蜀為盟九月遷都建業嘉禾四年魏使以馬求易珠璣翡翠玳瑁權曰此皆孤所不用而可得馬何苦而不聽其交易赤烏七年步隲朱然各上疏云自蜀還者咸言蜀欲背盟與魏交通宜為之備權曰吾待蜀不薄無所負之人言若不可信朕為諸君破家保之蜀竟無謀如權所籌太元元年權祭南郊還寢疾二年四月薨時年七十一諡曰大皇帝𦵏蒋陵吳志評曰孫權屈身忍辱任才尚計有句踐之奇洵人之英傑故能自擅江表成鼎峙之業然性多嫌忌果於殺戮暨臻末年彌以滋甚至于讒說殄行𦙍嗣廢斃豈所謂貽厥孫謀以燕翼子者哉後中葉陵遲遂致覆國未必不由此也吳志曰權自陸口遂征合肥未下徹軍還兵皆就路權與凌統甘寧等在津北為魏將張遼所襲統等以死得權權乗駿馬越津渠得去獻帝春秋曰張遼問吳降人向有紫髯將軍長上短下便馬善射是誰降人荅曰是孫㑹稽也張遼及樂進相遇言不早知之急追即獲舉軍嘆恨吳厯曰曹公出濡湏權數挑戰公堅守不出權乃自乗船從濡湏口入公見舟船器仗軍伍整肅喟然嘆曰生子當如孫仲謀權劉景昇兒子豚犬耳權為牋與曹公説春水方生公宜速去别紙言足下不死孤不得安曹公語諸將曰孫權不欺孤乃撤軍還江表傳曰堅為下邳丞時權生方頥大口目有精光堅異之以為有貴象及堅亡策起事江東權常隨從性度𢎞朗仁而多斷好養俠士始知名侔於父兄矣每叅問計謀策甚竒之自以為不及也每請㑹賔客顧權曰此諸軍之將軍也孫亮呉志曰孫亮字子明權少子權春秋髙而亮最少故尤留意姊全氏公主嘗譛太子和子母心不自安因倚權意欲豫自結數稱述全尚女勸權為亮納為妃赤烏十三年和廢權遂立亮為太子以全氏為妃權薨太子即尊位大赦改元建興元年冬十月太傅諸葛恪率軍過巢湖城東興十二月魏使將軍諸葛誕等出騎七萬圍東興恪以大兵赴敵大破魏軍太平元年以從弟偏將軍綝為侍中武衛將軍領中外諸軍事二年四月亮臨正殿大赦始親政事又料兵子弟十八已下十五已上得三千餘人選大將子弟年少有勇力者為之將帥亮曰吾立此軍欲與之俱長日於苑中習焉三年亮以綝専恣與太常全尚將軍劉承謀誅綝九月綝以兵取尚遣弟恩攻殺承於蒼龍門外召大臣㑹宫門黜亮為㑹稽王時年十六呉厯曰亮出西苑食生梅使黄門至中藏取蜜蜜中有鼠屎召問藏吏吏叩頭亮問吏曰黄門從汝求蜜耶吏曰向求實不敢與黄門不服侍中刁𤣥張邠啟黄門藏吏辭語不同請付獄推亮曰此易知耳令破鼠屎屎裡燥亮大笑謂𤣥邠曰若久在蜜中中外當俱濕今裡燥必黄門所為黄門首服左右莫不驚悚孫休呉志曰孫休字子烈權第六子也年十三時從中書郎謝慈郎中盛冲受學太元二年正月封琅琊王居虎林四月權薨休弟亮承統諸葛恪秉政不欲諸王在濵江兵馬之處徙休于丹陽郡太守李衡數以事侵休休上書求徙他郡詔徙㑹稽居數嵗夢乘龍上天顧不見尾覺而異之孫亮廢孫綝使宗正孫楷與中書郎董朝迎休休初聞意甚疑楷朝共述所以奉迎本意留一日二夜遂發行至曲阿有老公干休叩頭曰事久變生天下喁喁願陛下速行休善之是日進及布塞亭武衛將軍孫恩行丞相事率百寮以乗輿法駕迎於永昌亭綝以兵千人迎於半野拜於道側休下車答拜即日御正殿大赦改元永安元年冬綝一門五侯皆典禁兵權傾人主休聞綝逆謀隂與張布圖計十二月戊辰百寮朝賀公卿升殿詔令武士縛綝即日伏誅五年以衞將軍濮陽興為丞相休以丞相興及左將軍張布有舊恩委之以事布典宫省興關軍國休鋭意於典籍欲畢覽百家之言又好射雉春夏之間常晨出夜還唯此時舎書休欲與博士祭酒韋曜博士盛冲講論道藝曜冲素皆切直布恐入侍發其隂失令已不得専國因妄飾説以拒遏之休答曰孤之涉學羣書略徧所見不少也其明君暗主奸臣賊子古今賢愚成敗之事無不見也今曜等入但欲與講論書耳不為從曜等始更受學也縱復如此亦何所損君特當以曜等恐道臣下奸變之事以此不欲令入耳如此之事孤己自備之不須曜等然後乃解也此都無所損君意特有所忌故耳布得詔陳謝重自序述又言懼妨政事休答曰書籍之事患人不好好之無傷也此無所為非而君以為不宜是以孤有所及耳王務學業其流各異不相妨也不圗君今日在事更待此於孤也良所不敢布拜表叩頭休答曰聊相開悟耳何至叩頭乎如君之忠誠逺近所知往者所以相感今日之嵬嵬也詩云靡不有初鮮克有終終之實難君其終之初休為王時布為左右将督素見信愛及至踐祚厚加寵待専擅國勢多行無禮自嫌瑕短懼曜冲言之故尤患忌休雖解此㫖心不能恱更恐其疑懼竟如布意廢其講業不復使冲等入七年七月休薨時年三十謚曰景皇帝江表傳曰休寢疾日不能言乃手書呼丞相濮陽興入令子􅓣出拜之休把興臂指􅓣以托之也襄陽記曰李衡為丹陽太守時休在郡治衡數以法繩之妻習氏每諫衡不從㑹休立衡懼謂妻曰不用卿言以至於此遂欲奔魏妻曰琅琊王素好善慕名方欲自顯於天下終不以私嫌殺君明矣可自囚詣獄如此乃當逆見優饒非但直活而已衡從之果得無患又加威逺將軍授以啟㦸呉志曰休詔曰丹陽太守李衡以往事之嫌自拘有司夫射鉤斬袪在君為君遣衡還郡勿令自疑孫皓呉志曰孫皓字元宗權孫和之子也一名彭祖字皓宗孫休立封皓為烏程侯遣就國西湖民景養相皓當大貴皓隱而不敢泄休薨是時蜀初亡而交趾㩦叛國内震懼貪得長君左典軍萬或者為烏程令與皓相善稱皓才識明斷是長沙桓王之儔也又加之好學奉尊法度屢言之於丞相濮陽興左將軍張布布興說休妃太后朱欲以皓為嗣朱曰我寡婦人安知社稷之慮茍吳國無隕宗廟有賴可矣於是遂迎立皓時年二十三改元大赦皓既得志麄暴驕盈多忌諱好酒色大小失望興布竊悔之或以語皓十一月誅興布天紀三年冬晉命鎮東將軍司馬伷安東將軍王渾揚州刺史周浚太尉賈充為大都督量宜處要進軍以討之初皓每宴㑹羣臣無不咸令沉醉置黄門郎十人特不與酒侍立終日為司過之吏宴罷之後各奏其闕失罔有不舉大者即加威刑小者輒以為罪後宫千數而采擇未已又激水入宫宫人有不合意者輒殺流之或剥人之面或鑿人之目岑昏險謏貴幸致位九列好興功役衆患所苦是以上下離心莫為皓盡力盖積惡已極不復堪命故也晉軍所至則土崩瓦解而王濬順流將至司馬伷王渾皆臨近境皓用光禄勲薛瑩中書令胡冲等計分遣使奉書於濬濬最先到於是受皓之降解縳焚櫬延請相見伷以皓致印綬於己遣使送皓舉家西遷以太康元年五月丁亥集于京邑四月詔賜號為歸命侯進給衣服車乗田三十頃嵗給糓五千斛錢五十萬絹五百疋綿五百斤皓太子瑾拜中郎五年皓死於洛陽吴録曰皓以四年十二月死時年四十二世說曰晉武帝問孫皓曰聞南方人好作爾汝歌頗能不時方飲酒因舉觴勸帝而言曰昔與汝隣國今為汝作臣上汝一杯酒令汝壽長春帝悔之呉志曰皓之淫刑所濫殞斃流黜者盖不可勝數是以羣下人人惴恐虐用其民窮淫極侈宜其要首分離以謝百姓既蒙不死之詔復加歸命之寵豈非曠蕩之恩過厚之澤也哉太平御覽卷一百十八
