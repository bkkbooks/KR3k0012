body:
  text: 太平御覽卷八十七宋李昉等撰皇王部十二漢髙祖皇帝項籍附孝惠皇帝前少帝後少帝漢髙祖皇帝河圖曰帝劉季日角戴勝斗胷龜背龍眼長七尺八寸明聖而寛仁好任主軫又曰劉受紀昌光出軫五星聚井龍魚河圖曰髙皇攝正總萬廷四海歸詠治武明文得道治承天精元祚興隆協聖靈尚書帝命驗曰賊起蜚卯生虎賊起蜚始皇立也卯劉字之别也皇立而劉生虎謂髙祖又曰有人雄起戴玉英玉英寶物之名戴之謂骨表祈旦失鑰亡其金虎祈讀曰晳白也謂之秦也旦失鑰户將開金虎獸之長喻於秦君東南紛紛注精起紛紛動擾之兒注星之精起謂劉氏也尚書考靈耀曰卯金出軫握命孔符卯金劉字之别軫楚分野之星符圖劉所握天命孔子制圖書詩含神霧曰始吞赤珠刻白玉英生漢皇刻刻鏤也有玉英之文春秋孔演圖曰其人日角龍顔姓卯金刀含仁義春秋文燿鈎曰庶人爭權赤帝之精庻人項羽赤帝劉季争權欲並起也史記曰髙祖沛豐邑中陽里人姓劉氏字季母曰劉媪嘗息大澤之陂夢與神遇是時雷電晦暝太公徃視則見蛟龍於上已而有娠遂産髙祖髙祖為人隆凖而龍顔美鬚髯左股有七十二黒子仁而愛人喜施意豁然也為泗水亭長亭中吏無不狎侮好酒及色常從王媪武負貰酒時醉卧武負王媪見其上常有龍怪之髙祖毎酤留飲酒讐如淳曰讐音售數倍嘗繇咸陽縱觀始皇帝曰嗟乎大丈夫當如此也髙祖以亭長為縣送徒驪山到豐西澤中止飲夜皆解縱所送徒徒中壯士願從者十餘人髙祖被酒夜經澤中令一人行前還報曰前有大蛇當徑願避髙祖醉曰壯士行何畏乃前拔劔斬蛇蛇分為兩徑開行數里醉困卧後人來至蛇所有一老嫗夜哭人問何哭嫗曰人殺吾子人曰嫗子何為見殺嫗曰吾子白帝子也化為蛇當道今為赤帝子斬之因忽不見後人至告髙祖髙祖乃心獨喜秦始皇帝常望東南有天子氣於是東遊以壓之髙祖即自疑亡匿隠於芒碭山澤岩石之間吕后與人俱求常得之髙祖怪問之吕后曰季所居上常有雲氣故從徃常得季髙祖又喜沛中子弟或聞之多欲附者秦二世元年秋陳勝等起沛令欲以沛應勝沛父老皆曰生平所聞劉季諸珍怪當貴且卜筮之莫如劉季最吉乃立為沛公祠黃帝祭蚩尤於沛庭而釁鼔旗幟皆赤漢元年冬十月五星聚於東井沛公兵先諸侯至覇上秦王子嬰降軹道旁遂西入咸陽召諸縣父老曰父老苦秦苛法久矣誹謗者族偶語者棄市吾與諸侯約先入關者王之吾當王關中與父老約法三章耳殺人者死傷人及盜抵罪餘悉除去秦法民大喜五年項羽滅諸侯尊漢王為皇帝天下大定髙祖都雒陽置酒南宫髙祖曰列侯諸將無敢隠朕皆言其情吾所以有天下者何項氏之所以失天下者何髙起孟康曰姓髙名起也王陵對曰陛下慢而侮人項羽仁而愛人然陛下使人攻城畧地所降下者因以予之與天下同利也項羽妬賢嫉能有功者害之賢者疑之戰勝而不與人功得地而不與人利此所以失天下也髙祖曰公知其一未知其二夫運籌於帷帳之中决勝於千里之外吾不如子房鎮國家撫百姓給饋餉不絶粮道吾不如蕭何連百萬之衆戰必勝攻必取吾不如韓信此三人者皆人傑也吾能用之此所以取天下也項羽有一范增而不能用此所以為我擒也髙祖欲都雒陽齊人婁敬及留侯勸上入都關中髙祖是日駕入都關中九年髙祖大朝諸侯羣臣置酒未央前殿上奉玉巵起為太上皇壽曰始大人嘗以臣無賴不能治産業不如仲力今某之業所就孰與仲多殿上羣臣皆稱萬歲大為笑樂十二年髙祖擊布還歸過沛留置酒沛宫悉召故人父老子弟佐酒發沛中兒得百二十人教之歌酒酣髙祖擊筑自為歌詩曰大風起兮雲飛揚威加海内兮歸故鄉安得猛士兮守四方令兒皆和習之髙祖乃起舞慷慨傷懷泣數行下謂沛父兄曰遊子悲故鄉吾雖都關中萬歲後吾魂魄猶樂思沛且朕自沛公以誅暴逆遂有天下其以沛為朕湯沐邑復其民世世無有所與沛父兄諸母故人日樂飲極歡道故舊為笑樂十餘日髙祖欲去沛父兄固請留髙祖曰吾人衆多父兄不能給乃去沛中空縣皆之邑西獻獻牛酒髙祖復留止張飲三日張宴曰張帳帷髙祖擊黥布時為流矢所中行道病甚吕后迎良醫醫入見髙祖問醫醫曰病可治於是髙祖嫚罵之曰吾以布衣提三尺劔取天下此非天命乎命乃在天雖扁鵲何益遂不使治病四月甲辰崩於長樂宫時年六十二在位十二年葬長陵羣臣上尊號為髙皇帝太子襲位令郡國諸侯各立髙祖廟以歲時祠及孝惠五年思髙祖之悲樂沛以沛宫為髙祖原廟漢書曰初髙祖不修文學而性明達好謀能聽自監門戍卒見之如舊初從民心作三章之約天下既定命蕭何治律令韓信申軍法張蒼定章程如淳曰章厯數之章術也程者權衡丈尺斗斛之法叔孫通制禮儀陸賈造新語又與功臣剖符作誓丹書鐡契金匱石室藏之宗廟雖日不暇給規模𢎞逺矣又曰范增說項羽曰沛公居山東貪於財貨好美姫今入關財物無所取好女無所幸此其志不在小吾令人望其氣皆為龍虎成五采此天子氣也漢書賛曰漢承堯運徳祚已盛斷蛇著符旗熾尚赤協于火德自然之應得天統矣荀悅漢紀曰項羽自立為西楚王王梁楚地九郡都彭城立沛公為漢王王巴蜀漢中四十一縣都南鄭諸侯皆就國漢王欲叛楚蕭何諌曰雖王漢中之惡不猶愈於死乎且語曰天漢其稱甚美夫能屈於一人之下而伸於萬人之上湯武是也願大王王漢撫其民以致賢人收用巴蜀還定三秦天下可圖也乃就國又曰髙祖開建大業統辟元功度量規模不可尚已是時天下初定而庶事莫制故韶夏之音未有聞焉楚漢春秋曰項王在鴻門亞父進諌曰吾使人望沛公其氣衝天五彩相糺或似雲或似龍或似人此非人臣之氣也不若殺之帝王世紀曰豐公家于沛之豐沛邑中陽里其妻夢赤馬若龍戲已而生孰嘉是為太公即太上皇也太上皇之妃曰媪是為昭靈后名含始遊於洛地有玉雞銜赤珠出刻曰玉英吞此者王含始吞之生邦字季又曰𤣥晏先生曰禮稱至道以王義道以霸觀漢祖之取天下也遭秦世暴亂不階尺土之資不權將相之柄發迹泗亭奮其智謀羈勒英雄鞭驅天下或以威服或以德致或以義成或以權斷逆順不常霸王之道雜焉是以身居帝王之位而無一定之制三代之美固難及矣後漢班叔皮王命論曰在昔帝堯之禪也曰咨爾舜天之厯數在爾躬舜亦命禹暨于稷契咸佐唐堯光濟四海奕世載德至于湯武而有天下雖其遭遇異時禪代不同至於應天順民其揆一也是故劉氏承堯之祚氏族之世著於春秋唐據火德而漢紹之始起沛澤則神母夜號以彰赤帝之符由是言之帝王之作必有明聖顯懿之德豐功厚利積累之業然後精誠通于神明流澤加於生人故能為鬼神所福饗天下所歸徃未見運世無本功德不能紀而得崛然在此位者世俗見髙祖興於布衣不達其故以為適遭暴亂得奮其劔遊說之士至比天下於逐鹿幸㨗而得之不知神噐有命不可智力求悲夫此世之所以多亂臣賊子者也項籍河圖曰怪目勇敢重瞳大面立楚之邦尚書中候曰自號之王百姓有工項羽為西楚覇王工項字之側史記曰項籍者下相人也地理志云臨淮有下相縣字羽初起時年二十四季父項梁梁父即楚將項燕為秦將王翦所戮項氏世世為楚將封項故姓項氏籍少時學書不成去學劔又不成項梁怒之籍曰書足以記名姓而已劔一人敵不足學學萬人敵於是項梁乃教籍兵法籍大喜又不肯竟學梁殺人與籍避讐於吳秦始皇帝遊㑹稽渡浙江梁與籍俱觀籍曰彼可取而代也梁掩其口曰無妄言族矣梁以此竒之籍身長八尺餘力能扛鼎韋昭曰扛舉也才氣過人秦二世元年九月㑹稽守徐廣曰爾時未云太守也通謂梁曰楚漢春秋曰守㑹稽假守殷通也吾欲發兵使公及桓楚為將是時桓楚亡在澤中梁曰桓楚亡人莫知其處獨籍知之耳請召籍使受命召桓楚守曰諾梁召籍入須㬰梁眗籍曰可行矣於是籍遂㧞劔斬守頭遂舉吳中兵使人收下縣得精兵八千人項梁乃渡江而西凡六七萬人軍下邳此時沛公亦起沛徃焉乃求楚懷王孫心立以為楚懷王王召宋義以為上將軍項羽為魯公次將范增為末將救趙諸别將皆屬宋義號為卿子冠軍項羽晨朝上將軍宋義即其帳中斬宋義頭出令軍中曰宋義與齊謀反楚楚王隂令羽誅之當是時諸將皆懾服莫敢枝梧如淳曰梧音吾枝梧猶枝捍瓉曰小柱為枝邪柱為梧今屋梧邪柱是也皆曰首立楚者將軍家也今將軍誅亂乃相與共立羽為假上將軍懷王因使羽為上將軍乃悉引兵渡河皆沉船破釜甑燒廬舍持三日粮示士必死無一還心於是至則圍王離與秦軍遇九戰絶其甬道大破之虜王離諸將皆從壁上觀楚戰士無不一以當十呼聲動天地項羽召見諸侯諸侯入轅門張晏注曰軍行以車為陣轅相向為門曰轅門無不膝行而前莫敢仰視章邯降畧定秦地引兵西屠咸陽殺秦降王子嬰燒秦宫室火三月不滅收其寶貨婦女而東人或說項王關中阻山河四塞地肥饒可都以霸項王見秦宫室皆以燒殘破又心懷思欲東歸曰富貴不歸故鄉如衣錦夜行誰知之者說者曰人言楚人沐猴而冠耳果然張晏曰沐猴獮猴也項王自立為西楚霸王王九郡都彭城漢之二年春漢王部五諸侯兵伐楚四月漢皆已入彭城收其寶貨美人日置酒髙㑹項王乃西從蕭晨擊漢軍而東至彭城大破漢軍漢軍皆走相隨入糓泗水二水皆在沛郡彭城殺漢卒十餘萬人漢卒皆南走山楚又追擊之靈壁東徐廣曰在彭城睢水上徐廣曰睢水自彭城入泗水漢軍却為楚所擠擠排也多殺漢卒十餘萬皆入睢水睢水為之不流圍漢王三匝於是大風從西北起折木發屋揚沙石窈㝠晝晦逢迎楚軍楚軍大亂壞散而漢王乃得與數十騎遁去漢之四年項王西與漢俱臨廣武而軍孟康註曰于滎陽築西城相對為廣武在敖倉西相守數月當此時彭越數反梁地絶楚糧道項王患之楚漢久相持未决丁壯苦軍旅老弱罷轉漕項王謂漢王曰天下匈匈數歲者徒以吾兩人耳願興漢王挑戰李竒曰挑身獨戰不須衆也挑音徒了反瓉曰挑戰擿嬈敵求戰古謂之致師决雌雄無徒苦天下之民父子為也漢王笑謝曰吾寧鬬智不能鬬力項王命壯士出挑戰漢王有善騎射者樓煩樓煩胡也今之樓煩縣楚挑戰三合樓煩輙射殺之項王大怒乃自被甲持㦸挑戰樓煩射之項王瞋目叱之樓煩目不敢視手不敢發遂走還入壁不敢復出漢王使人閒問之乃項王也漢王大驚於是項王乃即漢王相與臨廣武間而語漢王數之項王怒甚欲一戰漢王不聽項王伏弩射中漢王漢王傷走入成臯漢王使侯公徃說項王乃與約中分天下割鴻溝以西者為漢文頼曰於滎陽下引河東為鴻溝以通宋鄭陳蔡曹衛兵濟汝淮泗水於楚即今官渡水也渡溝而東者為楚項王已約乃引兵解而東歸漢欲西歸張良陳平說曰漢有天下大半而諸侯皆附之楚兵罷食盡此天亡楚之時也漢王乃追項王至垓下項王軍壁垓下兵少食盡漢軍及諸侯兵圍之數重夜聞漢軍四面皆楚歌應邵曰楚歌者雞鳴歌也漢已畧得其地楚歌者多也項王乃大驚曰漢皆已得楚乎是何楚人之多也項王乃夜起飲於帳中有美人名虞徐廣曰姓虞氏常幸從駿馬名騅常騎之於是項王乃悲歌慷慨自為詩曰力㧞山兮氣蓋世時不利兮騅不逝騅不逝兮可奈何虞兮虞兮奈若何歌數闋美人和之項王泣下數行左右皆泣莫能仰視於是項王乃上馬騎麾下壯士騎從者八百餘人直夜潰圍南出馳走平明漢軍乃覺之令騎將灌嬰以五千騎追項王渡淮騎能屬者百餘人耳項王至隂陵徐廣曰在淮南迷失道問一田夫田夫紿曰左文頴曰紿欺也欺令左也左乃陷大澤中以故漢追及之項王乃復引兵而東至東城漢書音義曰縣名屬臨淮乃有二十八騎漢騎追者數千人項王自度不能脫謂其騎曰吾起兵至今八歲矣身七十餘戰所當者破所擊者服未嘗敗北遂霸有天下然今卒困於此天之亡我非戰之罪也項王乃欲東渡烏江瓉曰在牛渚也烏江亭長艤船待孟康曰艤音蟻附著岸也如淳曰南方人謂整船向岸曰艤謂項王曰江東雖小地方千里衆數十萬人亦足王也願大王急渡今獨臣有船漢軍至無以渡項王笑曰天之亡我我何渡為且籍與江東子弟八千人渡江而西今無一人還縱江東父兄憐而王我我何面目見之縱彼不言籍獨不愧於心乎乃謂亭長曰吾知公長者吾騎此馬五歲所當無敵嘗一日千里吾不忍殺之以賜公乃令騎皆下馬步行持短兵接戰獨籍所殺漢軍數百人項王身亦被十餘創顧見漢騎吕馬童曰若非吾故人乎馬童面之張晏曰以故人難即斫之故背面之也如淳曰面不正視也指王翳曰如淳曰指示王翳也此項王也項王乃曰吾聞漢購我頭千金邑萬户吾為若德徐廣曰亦可是功徳之徳乃自刎而死漢以魯公禮葬項王於榖城太史公曰吾聞之周生周時賢也曰舜目蓋重瞳子又聞項羽亦重瞳子羽豈其苗裔邪何興之暴也夫秦失其政陳涉首作難豪傑蜂起相與並爭不可勝數然羽非有尺寸乘勢起隴畝之中三年遂將五諸侯滅秦此時山東六國而齊趙韓魏燕五國並伐秦故云五諸侯也分裂天下而封王侯政由羽出號為霸王位雖不終近古以來未嘗有也周生烈子曰桀紂是湯武之梯秦項是大漢之階也四逆不興則三順不勝蔣子萬機論曰項羽若聽范增之䇿則平步取天下也譙周法訓曰劉項方爭父戰於前子鬭於後孝惠皇帝史記曰孝惠為人仁弱髙祖以為不類我常欲廢太子而立戚姬子如意如意類我戚姫得幸常從上之關東日夜啼欲立其子代太子吕后年長常留守希見上益疏頼留侯䇿太子得毋廢髙祖崩太子襲號皇帝吕后最怨戚夫人及其子趙王惠帝慈仁知太后怒自挾與趙王起居飲食太后欲殺之不得間孝惠元年十二月帝晨出射雉趙王少不能早起太后聞其獨居使人持酖飲之黎明孝惠還趙王已死徐廣曰黎猶比太后遂斷戚夫人手足去眼煇耳飲瘖藥使居厠中命曰人彘居數日乃召孝惠帝來觀人彘孝惠見問廼知是戚夫人也廼大哭因歲餘不能起使人請太后曰此非人所為臣為太后子終不能治天下孝惠以此日為淫樂不聽政故有病七年秋八月戊寅帝崩又曰太史公曰孝惠皇帝髙后之時黎民得離戰國之苦君臣俱欲休息於無為故惠帝垂拱髙后女主稱制政不出閨房天下宴然刑罰罕用罪人是希民務稼穡衣食滋殖矣漢書曰孝惠諱盈之字曰滿應劭曰禮諡法柔質慈民曰惠七年帝崩于未央宫案帝年十七即位在位七年矣葬安陵漢書賛曰孝惠内修親親外禮宰相可謂寛仁之主遭吕太后虧損至徳悲夫荀悅漢紀曰四年立皇后張氏帝姊魯元公主女也太后欲為重親故配帝論曰夫婦之際人道之大倫姊子而為后昏於禮而瀆於人情非所以示天下作民則也班固漢書述曰孝惠短世髙后稱制罔顧天顯吕宗以敗前少帝史記曰惠帝崩太子即位為帝號令一出太后太后稱制宣平侯女為孝惠皇后時無子佯有娠取美人子名之殺其母立所名子以為太子孝惠崩太子為帝帝壯或聞其母死非真皇后之子乃出言曰后安能殺吾母而名我太后聞而患之恐其後為亂於是乃幽之於永巷中羣臣奉㫖廢帝後少帝史記曰后元年立孝惠後宫子山為襄成侯二年以為常山王更名義四年廢少帝立常王義為帝更名𢎞不稱元年者以太后制天下事也八年七月太后崩大臣謀誅諸吕相與隂謀曰少帝及梁淮陽常山王皆非真孝惠子迺相與隂使人召代王代王至長安立為天子東平侯興居曰誅吕氏吾無功請得除宫乃與太僕汝隂侯滕公入宫前謂少帝曰足下非劉氏不當立乃召乘輿載少帝出少帝曰欲將我安之乎滕公曰出就舎代王遂入而聽政夜有司分部誅滅梁淮陽常山王少帝於邸太平御覽卷八十七
