body:
  text: 太平御覽卷七百二十六宋李昉等􅁧方術部七卜下諸雜卜附晉書曰郭公者客居河東精於卜筮郭璞從之受業以青囊中書九卷與之由是遂洞五行天文卜筮之術消殃轉禍通致無方雖京房管輅不能過也璞門人趙載受青囊書未及讀而為所焚又曰宣城邉洪以四月中就韓友卜家中安否友曰卿後有兵殃其禍甚重可伐七十束柴積於庚地至七月丁酉放火燒之咎可消也不爾其凶難言洪即聚柴至日大風不敢發火洪後為廣陽領校遭母䘮歸家友來投之時日已暮告從者速裝束吾當夜去從者曰今日已暝數十里何急復去友曰非汝所知也此間血覆地寧可復住洪苦留之不待食而去其夜洪歘發狂絞殺兩子并殺婦又斫父妾二人皆被創因出亡走明日其友往收殯亡者尋索洪數日於宅前林中得之已自經死宣城太守殷祐疾友為筮之曰七月晦日將有鸛鳥來集㕔事上宜勤伺取若獲者為善不獲將成禍祐乃謹為其備至日果有大鸛尾垂九尺來集㕔事上掩捕得祐仍遷石頭督䕶後為呉郡守友卜占神效甚多而消殃轉禍無不皆驗王隱晉書曰步熊字叔羆陽平人少好卜筮術數門生甚盛熊學舍側有燒死人吏疑是熊諸生失火持諸生急熊曰吾已為卜得其人矣使從道南行當有一人來問得火主來者便縛之吏如熊言果是耕人自言草惡難耕故燒之忽風起延燒實不知草中有人又隣人兒逺行或告已死其父母號哭制服熊為卜尅日當還如期果至宋書曰蔡興宗初為郢府叅軍彭城顔敬以式卜曰亥年當作好官有大字者不宜受也及有開府之授而太歲在亥果薨於光禄大夫又曰荀伯玉為晉安王子勛鎮軍行叅軍泰始初還都賣卜自業齊書曰王敬則少時於草中射獵有蟲如烏豆集其身擿去乃脫其處皆流血敬則惡之詣道士卜道士曰此封侯瑞也敬則聞之喜故出都自効又曰栁世隆善卜别龜甲價至萬永明初世隆曰永明九年我亡後三年丘山崩齊亦於此季矣屏人命典籖李黨取筆及髙齒屐題簾箔旌曰永明十一年因流涕謂黨曰汝當見吾不見也梁書曰吉士瞻年逾四十忽忽不得志乃就江陵卜者王先生計禄命王先生曰君擁旄㐲節非一州後一年當得戎馬大郡三國典畧曰梁武昌太守朱買臣聞元帝議遷都入勸梁主云建業舊都塋陵攸在荆鎮邉疆非王者宅願陛下勿疑致後悔也臣家在荆州豈不願陛下但恐是臣富貴非陛下富貴耳乃召卜者杜景豪决去留遇兆不吉答云未去景豪退而言曰此兆為鬼賊所留也事具京都部又曰周文育隨盧安興征俚僚有功除海南令監州王勵深委任之勵被代文育與俱下至大庾嶺詣卜者卜者曰君北下不過作令長南入則為公侯文育曰足錢便可誰望公侯之事卜人曰君須㬰當暴得銀至二千兩若不信以此為驗其夕宿逆旅有賈人與文育博文育勝得銀二千兩且辭勵勵問其故文育以告勵乃遣之又曰東魏相齊王澄以舟師還次於小平津北岸古􅊘崩骨見銘曰今卜髙原千秋之後化為下泉當逢覇主必為改遷王曰古人之卜何其至也令更葬之又曰齊害其廢主濟南王也長廣王湛懼髙元海為書䇿湛不能斷令鄭道謙吳道世等卜以决之道謙等曰不利舉事静則吉又曰初鄴有賣卜者相趙隱當大貴及隱自黄門侍郎遷秘書監崔肇師呼卜者而問已焉卜者對曰公令望雖髙爵位難進肇師不悅終如其言隋書曰獻皇后崩上令蕭吉卜擇葬所吉厯筮山原至一處云卜年二千卜世二百具圖而奏之上曰吉凶由人不在於地髙緯父葬豈不卜乎國尋滅亡正如家墓田若不吉不當為天子若云不凶我弟不當戰殁然竟從吉言唐書曰王逺知事梁貞白先生陶𢎞景隱居茅山盡傳其符籙隋煬帝為晉王出鎮揚州遣人迎至及即位於東都起玉清觀以處之太宗之為秦王也既平王世充與記室房𤣥齡往詣之立枚以問其吉凶逺知指秦王之枚曰此當上度天命下濟蒼生者又指𤣥齡之枚云聖之輔也及太宗踐祚恩禮甚厚又曰城陽公主初適杜如晦之子杜荷貞觀中為尚衣奉御坐承乾事伏誅公主改適饒州刺史薛昱之子瓘將成婚太宗使卜之卜人曰兩火俱食始則同榮末亦雙悴若晝日行合巹之禮則終吉太守將從之馬周諫曰臣聞朝謁以朝思相戒也講習以晝思相成也讌飲以昃思相樂也婚合以夜思相親也是以上下有威内外有規動息有時吉凶有儀先王之教不可黷也今陛下欲謀其始而辭其終不可為也夫卜筮者所以定猶豫决嫌疑若黷亂禮常先王所不用也太宗又從其言而止又曰憲宗嘗謂李綘曰卜筮之事習者罕精或中或否近日風俗尤更崇尚何也對曰臣聞古先哲王畏天命不敢專邦國有大事可疑者故謀於卿士庶人决於卜筮俱吉則行之末俗浮偽倖以徼福正行慮危邪謀覬安持疑昏惑謂小數能决之而愚夫愚婦假時日鬼神者欲利欺詐叅之見聞用以射利小近其事神而異之近者風尚卜筮此誠弊俗聖㫖所及實辨邪源但存而不論弊斯息矣六韜曰文王卜田史偏曰卜田渭陽將大德焉非熊非羆非虎非狼兆曰得公侯天遺汝師以之化昌施及三王大吉又曰文王問散宜生卜伐殷吉乎鑚龜不兆祖行之日雨轖至軫行之日幟折為三散宜生曰此凶四不祥不可舉事太公進曰非子之所知也龜不兆聖人生天地之間承衰亂而起龜者枯骨蓍者朽草不足以辨吉凶行祖之日雨轖至於軫是洗濯甲兵也行之日幟折為三此軍分為三如此斬紂首之象國語曰晉獻公卜伐驪戎史蘇占之曰勝不吉公曰何謂也遇兆挾以銜骨齒牙為猾遇見也挾㑹也骨所以刺人猾弄也齒牙為兆端右左折有以齒牙中有從畫故曰銜骨骨在口中齒牙弄之以象讒口之為害也禮卜卜師作龜大夫占色史占墨戎夏交捽兆有一畫外象戎内象諸夏夏謂晉也兆端㑹齒牙交有似捽交對待也交捽是交勝也臣故云言晉勝戎戎復勝晉且懼有口齒牙銜骨皆在口也擕民國移心焉擕離公曰何口之有口在寡人寡人弗受誰敢興之對曰苟可以擕其入也必甘受逞而不知胡可壅也胡可逞壅防也言入耳心以為快而不知其惡何可逞也公不聽遂伐尅之獲驪姬以歸有寵立為夫人春秋後語曰二世夢白虎齧其左驂殺之心惡恠之卜云涇水為􅑂又曰鄒忌與田忌不相善公孫閔謂鄒忌曰何不詐令人操千金卜於市曰我田忌之人也吾三戰而三勝聲威天下欲為大事亦吉乎卜者出因令人捕焉卜者驗其辭於田之所鄒忌從之田忌懼無以自白遂率其徒攻臨淄欲収鄒忌不勝而奔說苑曰成王卜洛事曰昔有周成王之卜居周也其命龜曰予一人兼有天下辟就百姓敢無中土乎使予有罪則四方伐之無難得也周公卜居曲阜其命龜曰作邑乎山之陽賢則茂昌不賢則速亡季孫行父戒其子也曰吾欲室之夾於兩社之間也使吾後世有不能事上者使其替之益速如是則曰賢則茂昌不賢則速亡安在擇地而封哉或示有天固也又曰孔子問漆雕馬人曰子事臧文仲武仲孺子容三大夫者孰為賢馬人對曰臧氏家有龜焉名曰蔡文仲立三年為一兆焉武仲立三年為二兆焉孺子容立三年為三兆焉馬人見之矣若夫三大夫之賢不賢馬人不識也孔子曰君子哉漆雕氏之子其言人美也隱而顯其言人之過也又㣲而著故智不能及明不能見得無數卜乎楚辭卜居曰屈原既放三年不復見竭智盡忠而蔽障於讒心煩慮亂不知所從往見太卜鄭詹尹曰余有所疑願因先生决之詹尹乃端䇿拂龜曰君何以教之原曰吾寧悃悃欵欵朴以忠乎將送往勞來斯無窮乎寧誅鋤草茅以力耕乎將逰大人以成名乎寧正言不諱以危身乎將從俗富貴以偷生乎寧超然髙舉以保貞乎將哫音足訾慄斯喔吚嚅唲以事婦人乎寧廉潔正直以自清乎將突梯滑稽如脂如韋以絜楹乎寧昻昻若千里之駒乎將泛泛若水中之鳧隨波上下偷以全吾軀乎寧與騏驥抗軛乎將隨駑馬之迹乎寧與黄鵠比翼乎將與雞鶩爭食乎此孰吉孰凶何去何從世溷濁而不清蟬翼為重千鈞為輕黄鍾毁棄瓦釜雷鳴讒人髙張賢士無名吁嗟黙黙兮誰知吾之廉貞詹尹乃釋策而謝曰夫尺有所短寸有所長物有所不足知有所不明數有所不逮神有所不通用君之心行君之意龜䇿誠不能知此事司馬遷與任安書曰僕之先非有剖符丹書之功文史星厯近乎卜祝之間固主上所戯弄倡優所畜流俗之所輕也白虎通曰乾草稿骨衆多獨以蓍龜何龜之言久也蓍之言耆也尚書洪範五行傳曰此禽獸草木之久而能知吉凶也蔡邕月令章句曰大卜官各以牲祠龜策塗以血牲謂之釁者龜甲所以卜也蓍草所以筮也三禮圖曰龜以春灼後左夏灼前左秋灼前右冬灼後右楚焞他昆切以荆為然以灼龜正以荆者凡木心皆圜而荆心方是以用之抱朴子曰卜者小數飾福者謂知來之妙異苑曰㑹稽餘姚錢祐以元嘉四年五月三日夜出屋後為虎所取十八日乃自還說虎初取之時至一官府入重門見一人憑几而坐形貌偉壯左右侍者三十餘人謂曰吾欲使汝知術數之法故令虎迎汝無懼也留十五晝夜語諸要術盡教道之方祐受法畢便遣令還而不知道即使人送出門仍見歸路既得還家大知卜占無幽不驗經年乃卒又曰北海任詡字彦期從軍逺征十年乃歸還握粟卜師云非屋莫宿非時莫沐詡結伴數十共行遇雷雨不可蒙冒相與庇於巖下想非屋莫宿之戒遂負擔櫛沐於是巖崩壓半死至家妻先與外人通謀共殺之請以濕髪為認婦宵則勸詡令沐復憶非時莫沐之忌収髪而止婦心慙負詐乃自沐髪而同寢通者夜來不知婦也斬首而去述異記曰宋車騎將軍南譙王劉義宣鎮荆州府吏蔡鑯善卜能悉驗時有妙見精究如神公嘗在内齋見一白䑕縁屋命左右射之内置函中時侍者六人悉驅入齋後小小戸内别呼人召鑯鑯至卜函中物謂曰中則厚賞假加重罰鑯卜兆成笑曰知之矣公曰何鑯曰兌色之䑕背明向戸彎弧射之絶其左股孕五子三雄二雌若謂不信剖腹立知公使剖䑕腹皆如鑯言賜錢一萬蠡卜春秋後語曰蘇秦事鬼谷子學終辭歸道乏困行以燕人蠡卜傳食自給燕人用蠡卜秦記此以取資自給𫝊㑹事以為詞說各解臧獲之裘臧獲役人解其衣裘以賞其恠說之言也虎卜博物志虎知衝破又能畫地卜今日有畫物上下者惟其竒偶謂虎卜雞卜史記曰越巫立越祀而雞卜鳥卜隋書曰女國在慈嶺之南其國俗事阿修羅神及樹神歲初以人祭或用獮猴祭畢入山祝之有一鳥如䳄雉來集掌上破其腹而視之有粟則年豐沙石則有災謂之鳥卜開皇六年遣使朝貢其後遂絶摴蒱卜博物志曰老子入西戎造樗蒲卜也或云蕃人亦為樗蒲卜後傳樓隂善其功十二棊卜異苑曰十二棊卜出自張文成受法於黄石公行師用兵萬不失一逮至東方朔密以占衆事自此以後秘而不傳晉寕康初襄城寺法味道人忽見一老公着黄皮衣竹筒盛此書以授法味無何失所在遂復流於世齊書曰江謐出為鎮北長史東海太守未發憂甚乃以靈碁經占卦云有客南來金椀三盃上使御史大夫沈冲奏謐前後罪収付廷尉賜死果以金甖盛藥鴆之竹卜荆楚歲時記曰春分以牲祠社其供帳盛於仲春之月社之餘胙悉貢饋鄉里周族社餘之㑹其在茲乎此其㑹也擲教於社神以占來歲豐儉或拆竹以卜楚詞曰索瓊茅以筵籌楚人拆竹結草以卜謂為籌也牛蹄卜晉書曰夫餘國若有軍事殺牛祭天以其蹄占吉凶蹄解者為凶合者為吉楊方五經鈎呪曰東夷之人以牛骨占事呈吉示凶無不中牛非智之物骨有若此之效太平御覽卷七百二十六
