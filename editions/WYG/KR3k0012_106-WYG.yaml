body:
  text: 太平御覽卷一百六宋李昉等撰皇王部三十一隋髙祖文皇帝煬皇帝隋髙祖文皇帝隋書曰髙祖文帝姓楊氏諱堅𢎞農郡華隂人也漢太尉震八代孫鉉仕燕為北平太守鉉生元夀後魏代為武川鎮司馬子孫因家焉元夀生太原太守惠瑕惠瑕生平原太守烈烈生寕逺將軍禎禎生忠忠即皇考也皇考從周太祖起義闗西賜姓普六茹氏位至柱國大司空隋國公薨贈太保諡曰桓皇妣吕氏以大統七年六月癸巳夜生髙祖於馮翊般若寺紫氣充庭有尼來自河東謂皇妣曰此兒所從來甚異不可於俗間處之尼將髙祖舎於别館躬自撫養皇妣嘗抱髙祖忽見頭上角出遍體鱗起皇妣大駭墜髙祖於地尼自外入見曰已驚我兒致令晩得天下為人龍顔額有五柱入頂目光外射有文在手曰王長上短下深沉嚴重初入太學雖至親眤不敢狎也年十四京兆尹薛喜辟為功曹十五以太祖勲授㪚騎常侍車騎大將軍儀同三司封成紀縣公武帝即位遷左小宫伯出為隋州刺史進位大將軍後徴還遇皇妣寢疾三年晝夜不離左右世稱純孝宇文䕶執政尤忌髙祖屢將害焉大將軍侯伏侯夀等匡䕶得免其後襲爵隋國公武帝聘髙祖長女為皇太子妃益加禮重齊王憲言於帝曰普六茹堅相貎非常臣每見之不覺自失恐非人下請早除之帝曰此可為將耳内史王軌驟言於帝曰皇太子非社稷主普六茹堅貎有反相帝不恱曰必天命有在將若之何髙祖甚懼深自晦匿建徳中率水軍三萬破齊師於河橋明年從帝平齊進位柱國共宇文憲破齊任城王髙湝於冀州除定州總管宣帝即位以後又徴拜上柱國大司馬大象初遷太僕丞右司武儀轉大府丞帝每巡幸恒委以居守大象二年五月以髙祖為揚州總管將發暴有足疾不果行己未宣帝崩静帝㓜冲未能親理政事内史大夫鄭譯御正大夫劉昉以髙祖皇后之父衆望所歸遂矯詔引髙祖入總朝政都督内外諸軍事周氏諸王在藩者髙祖恐其生變稱趙王招將嫁女於突厥為詞以徴之丁未發喪焉十月帝拜髙祖假黄鉞左丞相百官總已而聽焉十二月甲子周帝詔以郢州之漢東二十郡為隋國劍履上殿入朝不趨賛拜不名備九錫之禮加璽紱逺逰冠相國印緑綟綬位在諸王上隋國置丞相已下一依舊文髙祖再讓不許於是建臺置官大定元年二月丙辰詔王冕十有二旒建天子旌旗出警入蹕乘金根車駕六馬備五時副車置旄頭雲䍐樂舞八佾設鐘􅒶宫懸王妃為王后長子為太子前後三讓乃授俄而周帝以衆望有歸乃下詔遣大宗伯大將軍金城公趙煚奉皇帝璽符百官勸進髙祖乃受焉開皇元年二月甲子上自相府常服入宫備禮即皇帝位於臨光殿設壇於南郊遣使柴燔吿天是日大赦改元為開皇六月癸未詔以初受天命赤雀降祥五徳相生赤為火色其郊及社廟依服冕之儀而朝㑹之服旗幟犧牲各令尚赤戎服以黄秋七月乙未上始服黄百僚畢賀二年六月丙申詔曰龍首山川原秀麗卉物滋阜今兹肇造冝建定鼎之基永固無窮之業所在公私府宅規模逺近營搆資費隨事條奏詔左僕射髙熲匠作大匠劉龍鉅鹿郡公賀婁子幹太府少卿髙龍等創造新都三年春正月經營廟社規度宫闈秋八月乃用吿成四年春正月丙辰大赦甲子幸於仁夀宫忽上不豫八月甲辰上疾甚卧於仁夀宫與百僚辭訣並握手歔欷是時唯太子及陳宣華夫人侍疾太子無禮宣華訴之帝怒曰死狗那堪付後事遽令召勇楊素秘不宣乃屏左右令張衡入見帝血濺屛風寃痛之聲聞於外年六十四在位二十四年史臣曰髙祖龍徳在田竒表見外晦明蔵用故知我者稀始以外戚之尊受託孤之任與能之議未為當時所許是以周室舊臣或懐憤惋既而王謙固三蜀之阻不踰朞月尉遲舉全齊之衆一戰而亡斯乃非止人謀抑亦天之所賛也乘兹機㑹遂遷周鼎于時蠻夷猾夏荆揚未平劬勞日昃經營四方樓舡南邁則金陵失險驍騎北驅則單于欵塞職方所載並入疆理禹貢所圖咸受正朔雖晉武之克平吴㑹漢宣之推亡固存比義論功不能尚也七徳既敷九歌已洽要荒咸暨封堠無警躬節儉平徭賦倉廪實法令行君子咸樂其生小人各安其業强無凌弱衆不暴寡人物殷阜朝野歡娱二十年天下無事區宇之内晏如也考之前王足以叅縱盛烈但素無學術不能任下無寛𢎞之度有刻薄之資暨乎期年此風愈扇又雅好祥瑞暗於大道建彼維城權侔宗室人皆怨望靡所適從聽䜛婦之言惑邪臣之說溺寵廢嫡託付失人㓕父子之道開昆弟之隙縱其斤斧剪伐本枝墳土未訖子孫繼重屠戮松檟纔列天下皆非隋有惜哉迹其衰怠之原稽其亂亡之兆起自髙祖成於煬帝所由來逺矣非一朝一夕其不祀忽諸未為不幸也煬皇帝隋書曰煬皇帝諱廣一名英小字阿􅐣髙祖第二子也母曰文獻獨孤皇后上美姿儀少敏慧髙祖及后於諸子中特所鍾愛在周以髙祖勲封鴈門郡公開皇元年立為晉王拜幷州捴管時年十三尋授武衛大將軍進位上柱國河北道行臺尚書令髙祖令項城公歆安道公才李徹輔導之上好學善屬文沉深嚴重朝野屬望髙祖宻令善相者來和遍視諸子和曰晉王眉上雙骨隆起貴不可言既而髙祖幸上居見樂器絃多斷絶又有塵埃若不用者以為不好聲妓甚善之上尤自矯當時稱為仁孝嘗觀獵遇雨左右進油衣上曰士卒皆霑濕我獨衣此乎乃令持去六年轉淮南道行臺尚書令其年徴拜雍州牧内史令八年冬大舉伐陳以上為行軍元帥及陳平進位太尉賜輅車乘馬衮冕之服𤣥珪白璧各一復拜并州總管髙祖之祀太山領武侯大將軍明年歸藩後數載突厥冦邉復為行軍元帥出靈武無虜而還及太子勇廢立上為皇太子是日當受册髙祖曰吾以大興公成帝業令上出舎大興縣其夜烈風大雪地震山崩民舎多壞壓死者百餘口仁夀初奉詔而東是後髙祖毎避暑仁夀宫恒令上監國四年七月髙祖崩上即皇帝位於仁夀宫八月奉梓宫還京師并州總管漢王諒舉兵乃詔尚書左僕射楊素討平之十一月癸丑詔可於伊雒營建東京即設官分職以為民極也大業元年正月壬辰朔大赦改元立妃蕭氏為皇后改豫州為秦州洛州為豫州廢諸州總管府丙申立晉王昭為皇太子三月丁未詔尚書令楊素納言楊達將作大匠宇文愷建東京徙豫州居民以實之辛亥發河南諸郡男女萬餘開通濟渠自西苑引榖洛水達於河自板渚引河通於淮庚申遣黄門侍郎王𢎞上儀同于士澄徃江南採木造龍舟鳯輦黄龍赤艦樓舡等數萬艘七月丙子詔曰今宇宙平一文軌攸同十步之内必有芳草四海之中豈無竒秀諸在家及見入學者若有篤志好古躭恱典墳學行敏優堪應時務所在採訪具以名聞即當隨其器能擢以不次八月壬寅上御龍舟幸江都以左武衛大將軍郭衍為前軍李景為後軍文武官五品以上給樓舡九品以上給黄筏舳艫相接二百餘里冬十月己丑赦江淮以南揚州給復五年舊總管内給復三年二年春正月辛酉東京成賜監督者各有差三月庚午車駕發江都夏四月庚戌上自伊闗陳法駕備千乘萬騎入於東京辛亥御端門大赦免天下今年租賦三年四月甲午詔曰夫孝悌有聞人倫之本徳行敦厚立身之基或節義可稱或操履清潔所以激貪厲俗有益風化其執徳不撓學義優敏文才秀美並為廊廟之用寔乃瑚璉之資才堪將畧拔以禦侮膂力驍壯任之爪牙爰及一藝可取亦冝採錄衆善畢舉與時無棄以此求治庶㡬非逺文武有職事者五品已上冝依今上十科舉人有一於此不必求備朕當待以不次隨才升擢丙申車駕北巡狩六月戊子次榆林郡丁酉啓民可汗來朝己亥吐谷渾髙昌並遣使貢方物甲辰上御北樓觀漁於河以宴百寮秋七月辛亥啓民可汗上表請變服襲冠帶詔啓民賛拜不名位在諸王侯上甲寅上於郡城東御大帳其下備儀衛建旌旗宴啓民及其部落二千五百人奏百戯之樂賜啓民及其部落各有差八月壬午車駕發榆林乙酉啓民飾廬清道以候乘輿帝幸其帳啓民奉觴上夀宴賜極厚上謂髙䴡使者曰歸語爾王當早來朝見不來吾與啓民巡汝土矣皇后亦幸義城主帳己丑啓民可汗歸藩癸巳入䄛煩闗壬寅次太原詔營晉陽宫九月己未次濟源幸御史大夫張衡宅宴享極歡己巳至東都五年三月己巳車駕幸河右乙亥幸扶風舊宅夏四月乙亥大獵於隴西壬寅髙昌吐谷渾伊吾并遣使來朝乙巳狄道黨項𦍑來貢方物癸亥出臨津闗渡黄河至西平陳兵講武五月乙亥上獵於諸山長圍周亘二十里庚辰入長寕谷度星嶺甲申宴羣臣於金山之上六月庚午次張掖辛亥詔諸郡學業該通才藝優敏膂力驍壯超絶等倫在官勤奮堪理政事立性正直不避强禦四科舉人壬子髙昌王麴伯雅來朝伊吾吐屯設等獻西域數千里之地上大恱丙辰上御觀風行殿盛陳文物奏九部樂設魚龍幔延髙昌王吐屯設於殿上以寵異之其蠻夷陪列者三十餘國戊午大赦天下開皇已來流配悉放還鄉晉陽逆黨不在此例也隴右諸郡給復一年行經之所給復二年秋七月丁夘置馬牧於青海渚中以求龍種無效而止九月癸未車駕入長安六年二月庚申徴魏齊周陳樂人悉配太常三月癸亥幸江都宫甲子以鴻臚卿史祥為左驍衛大將軍夏四月宴江淮以南父老頒賜各有差七年二月己未上升釣臺臨揚子津大宴百寮頒賜有差庚申百濟遣使朝貢乙亥上自江都御龍舟入通濟渠遂幸於涿郡八年春正月辛巳大軍集於涿郡壬午下詔曰髙䴡小醜昏迷不恭崇大勃碣之間荐食遼獩之境親總六師用伸九伐拯厥阽危協從天意若髙元泥首轅門自歸司㓂即宜解縳焚櫬其餘臣民歸朝奉順咸加撫慰各安生業隨才任用無隔夷夏營壘所次務在整肅芻蕘有禁秋毫無犯布以恩宥諭以禍福若其同惡相濟抗拒官軍國有常刑俾無遺類明加曉示稱朕意焉總一百一十三萬三千八百號二百萬其輸運者倍之癸未第一軍發粮四十日引師乃盡旌旗亘千里近古出師之盛未有之也三月癸巳上御師甲子臨戎於遼水橋戊戌大軍為賊所拒不果濟右屯衛大將軍左光祿大夫麥鐵杖武賁郎將錢士雄孟金乂等皆死之甲午車駕度遼大戰於東岸擊賊破之進圍遼東時諸將各奉㫖不敢赴機既而髙䴡各城守攻之不下六月己未幸遼東責怒諸將止城西數里御六合城七月壬寅宇文述等敗績於薩水右屯將軍辛士雄死之九軍並陷將帥奔還亡者二千餘騎癸夘班師九月庚寅上至東都九年春正月丁丑徵天下兵募民為驍勇集于涿郡二月戊寅幸遼東以越王侗民部尚書樊子盖留守東都庚子北海人郭方頂聚徒為盗自號盧公衆至三萬攻陷郡城大噪而去夏四月庚午車駕渡遼壬午遣宇文述楊義臣趣平壤五月丁丑熒惑入南斗己夘濟北人甄寳車聚衆萬餘㓂掠城邑六月乙巳禮部尚書楊𤣥感反於黎陽丙辰𤣥感逼東都河南賛務裴宏䇿拒之反為賊所敗戊辰兵部侍郎斛斯政奔於髙䴡庚午上班師髙䴡犯後軍八月壬寅左翊衛大將軍宇文述等破楊𤣥感於閿鄉斬之餘黨悉平十年二月辛夘詔曰蕞爾髙䴡僻居荒表䲭張狼噬侮慢不恭剽竊我邉陲侵奪我城鎮是以去嵗出軍問罪遼碣殪長蛇於𤣥菟戮封豕于襄平焚其城郭汚其宫室髙元伏質泥首送欵軍門㝷請入朝歸罪司㓂朕已許其改過乃詔班師而長惡靡悛安心鴆毒此而可忍孰不可容便可分命六師百道俱進朕當親執武節臨御都軍秣馬丸都觀兵遼水順天誅於海外救窮民於倒懸征伐以正之明徳以誅之止除元惡餘無所問三月壬子幸涿郡癸亥至臨渝宫親御戎服禡祭黄帝斬叛軍者以釁鼓七月甲子髙䴡遣使請降送斛斯政上大恱八月己巳班師十二月壬申上如東都大赦天下戊子入東都十二年七月甲子幸江都宫以越王侗光祿大夫段達大府卿元文都撿校民部尚書韋津右武衛將軍皇甫無逸右司郎盧楚等總留後事十三年二月己丑馬邑校尉劉武周殺太守王仁恭舉兵作亂北連突厥自稱定陽可汗庚寅賊帥李宻翟讓等陷興洛倉越王侗遣虎賁郎將劉長恭光祿少卿房崱擊之反為所敗死者十五六庚子李宻自號魏公稱元年開倉以賑羣盗衆至數十萬河南諸郡相繼皆陷焉五月甲子唐公起義師於太原丙寅突厥數千㓂太原唐公擊破之秋七月壬子熒惑守積屍丙辰武威人李軌等舉兵反攻陷河西諸郡自稱涼王建元安樂八月辛巳唐公破武牙郎將宋老生於霍邑斬之十一月丙辰唐公入京師辛酉遙尊帝為太上皇立代王侑為帝改元義寕帝在江都聞唐公舉兵動容者久之以手舉案曰渠有異相渠得之矣如此者再三遂欲渡江幸青陽時宿衛諸將皆是秦人各有懐土之志宇文化及因人之心與裴虔通作亂入犯宫闈宿侍皆走遂扶帝出閣示衆數十罪復引帝入求鴆不得逼帝使坐以練縊之時年五十蕭后令宫人撤床簀為棺以埋之化及敗右禦衛將軍陳稜奉梓宫於成象殿塟呉公臺下發歛之容貎若生衆咸異之唐平江南之後改葬雷塘初上自以藩王次不當立毎矯情飾行以釣虚名隂有奪宗之計時髙祖雅信文獻皇后而性忌媵妾皇太子勇内多嬖幸以此失愛帝後庭有子皆不育之示無私寵取媚於后大臣用事者傾心與交中使至第無貴賤皆曲承顔色伸以厚禮婢僕徃來者無不稱其仁孝又常私入宫掖蜜謀於獻后楊素等因極搆扇遂成廢立太平御覽卷一百六
