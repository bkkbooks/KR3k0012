  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_069-1a, image: WYG0893/WYG0893-0560c.png}
body:
  text: 太平御覽卷六十九宋李昉等撰地部三十四澗洲湍瀬附灘澗釋名曰澗者言在兩山間也詩曰秩秩斯干秩秩流行也干澗也又于以采蘩于澗之中又于以采蘋南澗之濵又考槃在澗碩人之寛爾雅曰両山夾水曰澗漢書曰沛公與項籍臨廣武澗而語數籍十罪東觀漢記曰耿恭以踈勒城傍有水徙居之匈奴來攻絶其澗水吏笮馬糞汁飲之水經註曰洛水東北流注于公路澗但世俗音訛號之曰光禄澗非也異苑曰苻堅為慕容冲所襲堅奔馳墮馬而落澗追兵幾及計無由出馬即踟蹰臨澗垂鞚與堅堅不能及馬又跪授焉堅攀之得登岸而走幽明録曰人有山行墜澗者無出路飢餓僅死見龜蛇甚多朝暮引頸向四方人因學之遂不復飢體殊輕便能登巖岸經數年復竦身舉臂遂超出澗上即便還家顔色悦澤頗更聰慧洎食穀啖滋味百日復其本質郡國志曰漢武元封二年有百羊出庸澗初出一羊野中婦人大驚拍手羊因止今俗生羊禁婦人拍手是也又水經曰吳房縣山澗有白羊淵淵水出羊又曰赤松澗在東陽赤松子逰金華山以火自燒而化故山上有赤松子之祠澗自山出故曰赤松澗十道志曰廣武澗在今滎澤縣西又征西記三皇山上有二城謂東西廣武城相去二百餘歩隋河水從中東南流今無水城東有高壇即項羽坐太公於上以示漢軍處一謂鴻溝盧氏嵩山記曰半馬澗人或云百馬澗亦曰拜馬澗故老傳王子晉得仙而馬還人因思之不見乃拜其馬於此也韓子曰董安于為趙上地守行石阜山見深澗深百仞問其御左右曰人嘗有入此乎曰無有嬰兒狂聾人入此乎曰無有牛馬犬彘入此乎曰無有安于歎曰吾能治矣使吾法之無赦猶入澗之必死則民莫之犯也洲詩曰關關雎鳩在河之洲爾雅曰水中可居者曰洲四方有水中央獨高可居也史記曰越王勾踐平吳徙夫差於甬東韋昭曰即句章東溪口外洲是也晉書曰殷仲堪為荆州刺史先是仲堪逰於江濱見流棺撈而葬焉旬日間門前之溝忽起成岸其夕有人過仲堪自稱徐伯云感君之惠無以報也堪因問門前之岸是何祥乎對曰水中有岸其名為洲君將為州言終而沒至是果臨荆州王隱晉書曰朱崖在大海中遥望朱崖洲大如菌舉帆一日一夜至洲周匝二千里徑度七八百里可十萬家女多姣好長髮美目吳録地理志曰吳富春縣有沙漲武烈為郡吏赴府鄉人餞之㑹於沙上父老曰此沙狹而長君後當為長沙太守後果然因名孫洲吳志曰孫權遣衛温諸葛直將甲士萬人浮海求夷洲及亶洲在海中長老傳言秦始皇帝遣方士徐福將童男女數千人入海求蓬萊神仙及仙藥止此不返世世相承有萬家其上人民時有至㑹稽貨市隋圖經曰漢水逕琵琶谷至滄浪洲洲即漁父棹歌處庾仲雍記云謂之千齡洲水經注曰龍陽縣之洲長二十里吳丹陽太守李衡植橘於其上臨死勑其子曰吾洲里有木奴千頭不匱汝衣食歲絹千疋又曰崢嶸洲冠軍將軍劉毅破桓𤣥於此洲山海經曰鬰洲一曰郁洲在海中郭璞注曰即東海鬰洲山也傳此洲從蒼梧徙來上有南方物扶南傳曰漲海中倒珊瑚洲洲底有盤石珊瑚生於上也西京雜記曰梁孝王園之中又有鴈池池有鶴洲諸宫館相連異樹怪獸靡不畢備王與宫人賓客弋釣其中吳地記曰長洲在姑蘇南太湖北岸闔閭所遊獵處也吳主遣徐祥至魏魏太祖語祥曰孤比者願越横江之津與孫將軍遊姑蘇之上獵長洲之苑吾志足矣祥對曰大王欲奉至順以合諸侯若越横江而遊姑蘇是踵亡秦而躡夫差恐天下之事去矣太祖笑曰徐生得無逆詐耶湘中記或曰昭潭無底橘洲浮昭潭湘水至深處也橘洲每大水諸洲悉沒而橘洲獨存焉王韶之始興記曰城西百餘歩有棲霞樓臨川王營置清暑遊焉羅君章居之因名為羅公洲樓下洲上菓竹交䕃長楊傍映髙梧前竦雖即城隍趣同丘壑盛弘之荆州記曰南江上有龍洲下有寵洲二洲之間舊云多魚而投罟揮網輙便掛絶乃有客沒而視之水中有牛二頭常為破網故漁者患之又曰江津東十餘里有中夏洲洲之首江之汜也故屈原云經夏首而西浮又二十餘里有涌口所謂閻敖游涌而逸二水之間謂之夏洲首尾七百里又曰枝江縣西至上明東及江津其中有九十九洲楚諺曰洲不滿百故不出王者桓𤣥有問鼎之志乃增一為兩以充百數僣號旬時身屠宗滅及其傾覆洲亦消毁至宋文帝在藩忽生一洲果龍飛江表斯有驗矣荆州圖副曰百里洲其上平廣土沃人豐湖澤所産足償儉歲又特宜五果甘柰梨蔗於此是出荆南志曰枝江縣界内洲大小凡三十七其十九有人居十八無人劉楨京口記曰嘉子洲西一里得貴洲周廻四十里許上多有居民昔魏文帝伐孫權至此洲南望曰彼人有焉而退因名曰貴洲述征記曰晉寧縣有龍莾洲父老云龍蛻骨於此洲其水今猶多龍骨山謙之丹陽記曰江寧縣南二十五里有列洲晉簡文帝為相時㑹桓温處也郡國志曰朝洲白嶼洲亦自浮來後㑹稽人姓丁識之云曾藏銅熨斗於上往取果得又曰潤州長命洲梁武放生處後魏使李諸來聘武帝問曰彼國亦放生否諸曰不取亦不放帝大慙荆州圖經曰襄陽縣南八里峴山東南一十里江中有蔡洲漢長水校尉蔡瑁所居宗族強盛共保蔡洲為王如所沒一宗都盡又曰武當縣西北四十里江有滄浪洲長四里中廣十三里禹貢稱漢水東流為滄浪水疑此洲是也方言曰水可居者為洲三輔謂之淤郭璞注曰上林賦云行於洲淤之浦輿地志曰伍子胥叛楚出闗於江上見漁父求渡時傍多人漁父歌曰日灼灼兮駸已馳與子期乎蘆之漪子胥既渡解百金之劒與漁父漁父曰楚購子粟五萬爵執圭豈百金之劒乎子胥曰勿令其露漁父知意遂覆舟而死其處是􅚒洲水路去洲一百九十里江夏記曰鸚鵡洲在荆北按後漢書曰黄祖為江夏太守時黄祖方共與賓客大㑹有獻鸚鵡於此洲故以為名又荆州記曰江夏郡城西臨江有黄鶴磯又有鸚鵡洲侯景令宋子仙夜襲江夏藏船於鸚鵡洲建安記曰郡西南大溪之中有仙人洲昔梅眞人上昇墜馬於此洲故後名墜馬洲丹陽記曰白鷺洲在縣西三里隔江中心南邊新林浦西對白鷺洲洲在大江中多聚白鷺因名之又曰烈洲在縣西南輿地志曰吳舊津所也内有小水堪泊船商客多停以避烈風故以名焉王濬伐吳宿於此簡文為相時㑹桓𤣥之所也亦曰溧洲洲上有山山形似栗伏滔北征賦謂之烈洲又曰吳時客舘在蔡洲上以舍逺使蘇峻作逆陶侃等率所統同赴京師直指石頭次于蔡洲是也又曰張公洲在縣西南梁書太清二年豫州刺史裴東之等舟師二萬次張公洲二年陳覇先擊破侯子監師至張公洲並此處又曰和子洲在縣西南三十國春秋曰晉咸和二年温嶠與陶侃起義兵伐蘇峻帥師四萬直指石頭侃泊嘉子洲即此處也夏月堪泊船冬月淺涸自永昌之初其洲忽一朝崩䧟數里隨其形曲折凡作九灣行者所依東西浩然矣尋陽記由鵲洲在縣北傳曰昭公五年楚以諸侯伐吳吳敗之於鵲岸按鵲頭與鵲尾相去八十里杜預注云吳地也廬江舒縣東南有鵲尾渚湍廣雅曰湍瀬也水經注曰益陽縣西有雲長瀬所謂關侯灘也南對甘寧故壘昔雲長屯軍水北孫權令魯肅甘寧拒之於是水寧謂肅曰彼聞吾咳唾之聲不敢渡也渡則成擒矣又何懼哉又曰漢水東為鱣湍洪波奔蕩崩浪雲頽故老言有鱣魚奮鬐遡流望濤直上至此則曝鰓失濟故名湍異苑曰永嘉郡有百簿瀬郡人斷水捕魚宰牲禱祭以祈多獲逾時了無所得衆侣忿怨棄業將罷其夕並夢見老公云諸君且可小停要思其宜夜忽聞有跳躍聲驚起共看乃是大魚剉以為頓獲百簿故因以百簿名瀬益都耆舊傳曰犍為符沅和氏女名先雄和父乗船城湍墮水物故尸䘮不得雄哀慟號咷乗小船于父沒處哭數聲自投水死後與父相持浮出盛𢎞之荆州記曰桂陽來陽縣有両瀬每縣旱百姓共壅之甘雨普降若一鄕獨壅雨亦偏應東有博望瀬張騫使外國經此船沒因以名瀬瀬下接魚腹縣界有羊腸虎臂灘陽亮為益州至此復沒人至今猶名為使君瀬鄭緝之東陽記曰信安縣去石門四十里瀬邊悉有石牒長三尺許以羅列雜繒如店肆也劉德明南記曰康贛水奔流三百餘里横波嶮瀬二十四處灘益州記曰伏犀灘東南六十里有黄牛峽其崖峻嶮遠望之斑潤頗像黃牛又水經云昔有黄牛從􅈎溪而出上此崖乃化為石是名伏犀灘又曰荔枝灘東南二十五里山頂上有一冢冢唯有女貞樹樹上恒有白猿栖息郡國志云􅈎道有玉女冢是也水經注曰江水又東逕狼尾灘而厯人灘袁山松云二灘相去二里人灘水至峻峭南岸有青石夏沒冬出其石嶔崟數十歩中悉作人面形或大或小甚分明者鬢髪皆具因名人灘也江水又東逕黄牛山下有灘名曰黄牛灘南岸重嶺疊起最外髙崖間有色如人負刀牽牛人黑牛黄成就分明既人跡所絶莫得䆒焉此巖既髙加以江湍紆廽雖途逕信宿猶望見此物故行者謡曰朝發黄牛暮宿黄牛言水路紆深廽環望如一矣太平御覽卷六十九
