body:
  text: 太平御覽卷六百七十八宋李昉等撰道部二十傳授上五岳真形圗經曰若道士得秘聖之經皆當杜秘於一人之口者即真靈之文將墜於獨見何縁得存於永代乎傳授但當必得其人豈可秘而不出是斯文永翳也太極經曰太上王經隠注寳訣衆經之祖也太上令傳太極諸侯公王卿伯未得此位不得之矣道士有見此書則皆應為仙公也𤣥籙宿名將定焉靈寳真一經曰大靈真人告太極左宫仙公曰吾昔授太上靈寳洞𤣥自然太真上寳經為太極真人依太上法傳授於人定志經曰元始告右𤣥真人曰汝授此經可擇其人傳之彌布無外三皇經曰百萬人中或有一人應得此文者有仙籙宿命者也欲有所授當擇其人入諸名山八極周流天下鬼神無敢犯之者太清元始天中之王母初學道之師也又曰皇人者太帝所使出娥媚山黄帝徃授真一伍牙法抱朴子曰黄帝東至清邱過風山見紫府先生受三皇内文以刼召萬神南至壠䕃建木觀百靈西至中黄子受之九加之方過崆峒從廣成子授自然之經北至洪堤上具茨見大隗君黄盖童子受神芝圖還陟王屋得神丹注記室峨嵋山見黄人於玉堂問真一之道曰夫長生仙方惟有金液守形却惡獨有真一之道右人猶重也黄帝自然體道者也猶復陟王屋而受丹經登崆峒而問廣成徃具茨而事大隗適東岱而奉中黄入金谷而諮滑子論道養而澄𤣥素著休診而授雷岐窮神姦而記白澤相地理而書青鳥救傷殘而綴金冶故能畢該秘要窮盡道真按神仙經云昔黄帝老子奉事元君元君以授要訣况乎不逮彼二君者安能自得仙度世者乎按荆山經反龍首記皆云黄帝服神丹又曰彭祖八百年安期千年斯壽之過人逺矣若果有不死之道彼何不遂仙乎豈非禀命受氣偶得其多者乎按彭祖經云佐堯歴夏至商爲大夫商王從受還年之術行之有效欲殺彭祖以絶其術祖覺而逃去去時年八百又曰紫㣲𤣥宫玉飛天真書太清元始授西母佩之位登仙宗真人衞從又曰𤣥洲仙伯闗天萬仙真書東海小童授以得道人佩之一名仙人道籙一名鳳直籙太𤣥登仙盟文又崑崙墉臺飛太真太上丈人以授得道者佩之周行五岳山神授職一名五岳兵符佩之金石爲開又曰􅅫萊髙上真書成青天上皇以傳寗封佩此真符横行江海一名􅅫萊太𤣥五札一名九流真書北陵丈人授以馬師皇致龍來又天帝丈人黄上真書佩之知吉凶未兆之事上清經曰上清真人豋大帝滄浪山諸太極真人授以丹青玉鑪錬雲根經三元布經曰昔寗𤣥甫受此經於皇上真人九年秘藏白空山齋戒百日忽見其巖有玉文銀簡今封一通於白空山中本行經曰丹靈真人遇𤣥和先生受靈寳赤書五氣𤣥文黒帝真文一篇髙𤣥經曰昔上元以隱文授太和玉女玉女授幼陽君以文封於九疑洞室登真隱訣曰太極帝君寳章者東海青童君授消子以封掌名山涓子剖理所獲是太上召三一守形也以朱書素佩之左肘勿經履汗穢佩之八年而三一俱見矣三一者三元真一君也授其封掌之教又曰孝翼字仲甫以變法傳左慈慈脩之以變化萬端此經在茅真人傳後道士以還丹方殊秘故畧出别爲一卷茅君傳曰太真元君西母授説明堂𤣥真經云太上立𤣥雙神四明𤣥真内訣明堂外清吞息二暉長生神精上補司命監御萬靈六華充溢撤視黄寜此四十字即𤣥真之本經也其後王母惣具更演説行事之法猶如九真中經惟以龍書爲主也太上刻於鳳臺南軒非惣真弟子不教非司命之𤣥挺不傳又曰西母携王君茅盈以詣固衷之宫固衷盈二弟也西母撫背告之曰汝道雖成所聞未足我有所授汝乃遣侍女郭宻香與上元夫人相聞云但不相見四千餘年天事勞我致以愆靣可暫來否當此相待上元夫人遣一侍女荅曰阿環再拜上問起居逺隔絳河擾以官事遂違顔色近五千年仰戀光潤情係無違宻香至奉信承降尊於茅固處聞命之際即當飾駕先被太帝君𠡠使詣希林校定三元之脉正爾暫徃如是當還還便束帶願暫少留茅固回問王母不審上元夫人何真也曰三天真皇之母上元之髙真統領十方玉女之名籙者也及上元夫人來聞雲中簫鼓聲龍馬嘶鳴既至從者甚衆皆女子齊年十六七容色明逸多服青綾之衣光彩奪目上元年未笄天姿絶艶服赤霜之袍被青錦裘頭作三角髻餘髪散於腰戴九晨夜月之冠鳴六山火藻之佩曳鳳文琳華大綬執流黄揮精劒入室向王母拜王母坐止呼之與同坐北向上元夫人設厨王君勑茅盈二弟固衷起拜稽首而立命坐復席上元乃𠡠侍女出紫錦囊開緑金之笈三元流珠經丹景道精經隱地八術經太極緑景經曰凢四部以傳固衷西王母𠡠侍女季方明出丹瓊之凾披雲珠之笈以玉佩金璫太霄隱書洞飛二景内真符以傳司命茅君上元曰阿母隱書之妙上真内經天仙所寳封之金臺佩入太㣲動則八景玉輿静則晏寝金堂此文妙矣阿環太極緑經等可以致明月黄華得白日之赤精也及西母上元俱去惟王君獨留經日於是盈與二弟訣别而與王君俱去到赤城玉洞之府告二弟曰吾今去便有局任不得復數相徃來句曲山治所也漢光武建武七年三月丁巳遣使者吳倫賫黄金五十斤置於茅三君廟下四時祠以太牢至明帝永平二年詔丹陽句容茅真人廟使營䕶修守時邑人通呼此廟爲白鵠廟句曲之洞有宫玉門石堦曲山以水其門令得徃來上下也句曲洞天東通林屋北通岱宗西通峨嵋南通江浮皆大道也其間小徑新路阡陌沙㑹非一處也漢建陽之末左慈聞江東有此山故尋之齋戒三月而登山乃得其門入洞虛造隂宫二茅君授以神芝三種慈周旋洞室經年制度甚肅歎曰不圖天下復有如此之異乎至於地中洞天有三十六所王屋委羽西城酉𤣥青城赤城羅浮句曲林屋括蒼崑崙􅅫萊瀛州方丈滄浪白山八停之屬也五岳及諸名山皆有洞室或三十里二十里十里岳洞方百里也句曲山秦時名爲句金壇以洞天内有金壇百丈因以致名也漢靈帝時勅郡縣採句曲之金以充武庫孫權時又遣宿衞人採金常輸官句曲山每至三月十八日十二月二日東卿司命茅君當是日請惣真玉君太虛真人東海青童君㑹於句曲之上好道者欲求神仙宜先齋戒俟此日登山陳乞也茅君即授以要道得入洞門又曰紫㣲元靈白玉龜臺九靈太真元君即西王母也上帝惣真玉君東卿司命茅君之師古英紫㣲夫人之母也居崑崙墉臺别治白玉龜山青琳之宫朱紫之房首戴華勝腰帯虎章葆盖沓映羽旌䕃庭以漢平帝時來降句曲華陽宫授司命茅君玉佩金璫經又奨教中小二君至晉成帝時與金闕聖君同降洛陽洛隱元臺授魏夫人玉清隱書四卷又穆天子傳所載詣西王母及降漢武帝者皆是也别有傳紀名靈鏡洞𤣥上經或曰大有妙經即今所存中元輔卿手執者是未顯於世主訓教天下學真之人又曰西極惣真君者茅司命之師也生於商末服青精􅀈飯九轉丹用曲晨劒觧之道治西域山宫年三十着綉衣芙蓉冠把鈴帯劒一漢元帝時降陽洛山授玉清虛上經三十一卷晉時又降魏夫人洛陽終臺每次三月十二月亦同來句曲推校學仙别有傳未顯於世神仙傳云降蔡經家者是此君也又曰清虛王真人惣真王君弟子南岳魏夫人師漢元帝時辭家人華隂山九年太極真人降授二法入地肺山終南山一名地肺又登陽洛山平帝時南極夫人西城王君同降授上經三十一卷王君其詣𤣥州請書真名乃還西城修行道成於是乗飛飈車逰行天下後登白空山詣紫清太素三元君受流金火鈴豁落七元八景飛晨神䇿玉璽畢又還西城太上遣賜綉羽晨盖雙珠月明素羽瓊干丹紼錦旌太素又遣賫成命之書以爲太素清虛真人治玉屋山主領寳經乗虎斾虎輦金盖玉輪八景飛輿杖九色節出入上清受事太素寝宴太極南岳魏夫人師之撰傳顯於世南岳魏夫人内傳曰夫人姓魏諱華存字賢安任城人晉司徒文康公魏舒女也少讀老荘春秋三傳五經百子事常别居一園獨立閑處服餌胡床父母偪之彊適太保公椽南陽劉幼彦疇昔之志存而不虧後幼彦爲脩武令隨之縣舎閑齋别􅆍入室百日所期仙靈季冬月夜半四真人來降於室太極真人安度明東華青童君碧海景林真清虛真人王子登於是夫人拜乞長生度世青童君曰此清虛真人者爾之師也當受業焉景林真曰爾應爲紫虛元君上真司命封南岳夫人也夫人謝曰此是婢子有幸賜以姓命自陳畢東華小童指而笑曰丹心苦載於是清虛真人王君乃命侍女華散條李明瓮等川披雲藴開玉笈出太上寳文八經隱書太洞真經靈書八道紫度炎光石精工馬神真虎文髙仙羽𤣥三十一卷即手授夫人也王君昔學道在陽洛山遇南極夫人西城王君授此三十一卷經行之成真人今所授者是南極西城之本經也陽洛山有洞臺是清虛之别宫也王君當授魏夫人經之時起立北向而誓曰太上三𤣥九皇髙真太帝太帝使教于魏華存於是景林真又授夫人黄庭内景經一名太上琴心一名大帝金書一名東華王篇令晝夜誦之王君又告曰子若不在山中隱身齋戒則大洞真經不可妄讀也至於虎經龍書八素隱文之屬竒秘𤣥奥若不齋戒絶世不可施行子今旦可誦黄庭内經歩躡七元存五星之神而已人間行之亦足感通變化欲成際㑹我有以相迎矣方諸青童怡然小留四真吟唱乃命北寒玉女宋聮涓弹九氣之璈東華玉女煙景珠繫西盈之鍾林云玉女賈屈庭吹鳳戾之簫飛𤣥玉女鮮子靈今拊九合玉節王君乃語夫人曰訣諸要訖乃别去夫人守静日進在世八十三年以晉成帝咸利九年王君與東華青童來降時嵗在甲午二真人與夫人藥題曰隱遷白醫川神散石精金光化形靈丸使稱疾忽行尅期有定俱㑹陽洛宫言畢二真人去夫人即服藥因稱脚疾閉目􅆍息飲而不食到七日其夜半之後太一𤣥仙遣飈車來迎駕氣聘御徑入帷􅆍其時子弟侍疾衆親滿側莫之覺也夫人遂用藏景之法託形劒化徐登飈輪徑之陽洛居隱元之臺志栖上元誠感九天丹心真氣澄神太素夫人遂北詣上清宫太微天帝遣九宫太真侍玉元晨郎李明期授夫人神鳳之章使封山召云中央黄老君遣正一羽晨侯公陽子明授夫人龍衣虎帯丹青飛裙十絶華幡使川登行上清攝真命仙三素髙元君遣左華九成夫人范定英授夫人流金火鈴九蓋之軿使彈制萬魔引輪太旡太玉晨大道君遣繡衣使者孟六竒授九色之節雙珠月明神虎之符錦旂虎旂旌使位主羣神以威六天太素三元君遣使禁仙都衷文堅右嬪元姬趙約羅授夫人西華玉女三百八景飛輿𤣥景九龍使侍衞執巾上詣三清扶桑太常君遣八𤣥仙伯柯元首五方天帝君簡肅正等授夫人玉扎金文位爲紫虛元君領上真司命使主諸學道死生圖籍攝御之官闗校罪考金闗後聖君命仙伯牙叔平授夫人青瓊之板丹緑爲文位爲南岳夫人此秩仙公給曲晨飛盖以遊九宫使治天台大霍山洞臺之中主下訓奉道教授當爲真仙者令一月再登玉清三登登太素四謁玉晨宫宴扶桑之高臺於是夫人授王母之命且還王屋山小有之中更齋戒三月九微元君龜山王母西城真人王方平太虛真人赤松子桐栢真人王子喬並降小有清虛上宫絳房之中各命侍女金石發響於是西母徘徊起立折腰俯唱曰哀此去留㑹刼盡天地傾家㑹絳阿内相與樂未央歌畢湏臾司命神仙諸𨽻屬及南岳神靈迎官並至西王母等與夫人俱同去詣天台霍山臺登真隱訣曰太㣲天帝金虎符太上玉真保皇道君以授於太上太微天帝君又曰太一有玉璽金真虎符方丈臺昭靈李夫人治方丈臺第十三朱舘中以晉興寜中降陽君曵紫錦衣帯虎神虎符流金鈴帯青玉色綬有两侍女年二十許着青綾衣一侍女名隱暉捧赤玉箱二枚青帯絡玉檢文題檢一曰太上章一曰太上文自此後數數來降授書作詩集仙録曰驪山姥不知何代人也李筌好神仙之道常歴名山􅀶採方術至嵩山石室中得黄帝隂符經本絹素書緘之甚宻題云大魏真君二年七月七日道士冠謙之藏之名山用傳同好筌竟不曉其義因入秦至驪山下逄一老母髽髻當頂餘髪半垂弊衣扶杖神状甚異路傍見遺火燒樹因自語曰火生於木禍發必尅筌聞之前謁曰此黄帝隂符經秘文也母曰吾受此經已三元六周甲子少青年從何而得知筌稽首再拜具告得經之所因請問𤣥義盡得之俄失姥太平御覽卷六百七十八
