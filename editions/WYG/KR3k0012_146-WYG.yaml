body:
  text: 太平御覽巻一百四十六宋李昉撰皇親部十二太子一太子一世子並見周易離卦曰黄離元吉離為火土色黄火之子喻子有明德能附麗於其父之道象曰明兩作離大人以繼明照于四方王肅曰兩離相續繼明之義也周易鼎卦曰初六鼎顛趾利出否得妾以其子無咎鄭𤣥曰顛踣也趾足也無事曰趾設陳曰足爻體選為服初爻在服之下足象也足所以豖止也初隂爻而柔與乾不同體以否正豕乾為君以喻君夫人事君若失正禮踣其為足之道情無怨則當以和義出之然如否者嫁於天子雖失禮無出道逺之而已逺之子廢坤為順又為子母今在后妃之傍側妾之例也有順德子必賢賢而立以為世子又何咎也周易震卦曰震驚百里不䘮匕鬯彖曰震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也王肅曰在有靈而尊者莫若於天有靈而貴者莫若於王有聲而威者莫若於雷有政而嚴者莫若於侯是以天子當乾諸侯用震地不過一同雷不過百里政行百里則匕鬯亦不䘮祭祀國家大事不䘮宗廟安矣處則諸侯執其政則長子掌其祀周易說卦曰震一索而得男故謂之長男又曰震為長子易緯曰震下乾上旡妄天精起鄭康成註曰起猶立也乾為天震為長子聖人立為天子天下之民各得其所也易曰主器者莫若長子故受之以震尚書大傳曰唯四月太子發上祭于畢下至於盟津之上乃告於司馬司徒司空諸節予小子無知亦惟先祖先父有徳之臣左右小子予受先公命戮力賞罰以定厥功明于先祖之遺鄭𤣥注曰四月者周四月也發周武王也卒父業故稱太子也太子發升於舟中流白魚入於舟王跪取出俟以燎羣公咸曰休哉尚書中候曰廢考立發為太子鄭𤣥曰定王業也又曰我終之後恒稱太子又曰太子發伐紂以存三仁即父位不稱王發武王名也三仁箕子比干微子文王得赤雀丹書故號以應天道未成而崩武王以天誅未行謙不自成故稱太子明統緒而未成王又曰予稱太子發明慎父以名卒考予我也父死曰考文王命武王我終之後恒稱太子者明慎文王之命也君在稱世子薨稱太子既葬稱子踰年稱公今踰年而稱太子發若父業有不成者而將卒也周書曰文王受命九年時維暮春在鄗召太子發曰嗚呼吾語汝所保所守守之哉厚德廣惠忠信愛人君子之行四者君德不為驕侈不為靡泰不淫於美括柱茅茨為民愛費言務儉也因就木枚曰括也春秋演孔圗曰聖人在後曰望陽苞懐至德據少陽文王子也故曰在後嗣曰在矣賈誼書曰文王使太公望傅太子發嗜鮑魚公不與曰鮑魚不登於爼豈有非禮而可養太子者帝王世紀曰武王納太公之女曰邑姜脩教于内生太子誦尚書顧命曰爾尚明時朕言用敬保元子釗時是也元子釗康王名也𢎞濟于艱難穆天子傳曰成姬之喪邢侯曹侯來穆内史將之以見天子天子告不豫而辭焉邢侯曹侯乃弔太子太子哭出廟門以送邢侯再拜勞之侯不荅拜謙不與太子亢也周書曰晉平公使叔譽于周見太子晉與之言叔譽叔向五稱而五窮逡巡而退其言不遂五稱說五事遂終也歸告公曰太子晉行年十五而臣不能與言師曠見太子先稱曰吾聞太子之語髙於太山願一言王子應之曰吾聞太師將來吾心甚喜既見子喜而又懼吾聞女知人言長短吉㓙也曠對曰女聲清女色赤火色不夀太子曰然却後三年吾將上賔於帝所女慎無言殃將及女師曠歸來未及三年告死者至也春秋傳曰靈王二十一年糓洛鬭將毁王宮王欲禜之太子晉諫曰不可晉聞古之長民者不隳山不崇藪不防川不竇澤列仙傳王子喬周靈王太子晉也好吹笙作鳳凰鳴遊伊洛間有道士浮丘伯引上嵩山仙去尚書大傳曰堯為天子丹朱為太子舜為左右鄭注曰左右助也若周之冢宰典國事堯知丹朱之不肖必將壊其宗廟滅其社稷而天下同賊之肖似也堯受運行知天命之所在而授又深知朱不似不欲命於天誅如桀紂也故堯推尊舜而尚之屬諸侯致天下於大麓之野又曰髙宗有親䘮居廬三年未嘗言國事然而天下無背叛之心者何也葢其為太子之時盡以知天下人民之所好惡是以雖不言國事天下無背叛之心也家語曰子張問曰髙宗諒隂三年不言言乃雍有諸王肅曰雍懽貌書言乃雍雍和也孔子曰胡為其不然古者天子崩則世子委政於冢宰三年成湯既沒太甲聽於伊尹武王既䘮成王聽於周公其義一也尚書大傳曰太子年十八曰孟侯孟侯每於四方諸侯來朝迎於郊者問其所不知也問夫人民之所好惡地土所生美珎怪異山川之所有無父在時皆知之鄭𤣥注曰十八嚮入大學為成人愽問庶事也又曰棄法律逐功臣殺太子以妾為妻則火不炎上又曰古之帝王者必立大學小學禮記曰小學在公宫之左大學在郊王太子王子羣后之子以至公卿大夫元士之嫡子十有三年始入小學見小節焉踐小義焉年二十入大學見大節焉踐大義焉故入小學知父母之道長幼之序入大學知君臣之儀上下之位小師取小學之賢者登之天子天子以為左右天子當為太子禮記曰周公居攝踐祚而治抗世子法於伯禽使之與成王居欲使成王之知父子君臣長幼之義所以善成王也尚書洪範五行傳曰心之大星天王也其前星太子也後星庶子也荆州星占曰少微星一名處士星儲宮副主之宮韓詩外傳曰五帝官天下三王家天下家以傳子官以傳賢故自唐虞以上經傳無太子稱號夏殷之王雖則傳嗣其文畧矣至周始見文王世子之制又曰趙簡子太子名伯魯小子名無恤簡子自為二書牘親自表之書曰節用聽聰敬賢勿慢能勿使賤與二子使誦之居三年簡子坐清䑓之上問二書所在伯魯忘其表令誦不能得無恤出其書於袖令誦習焉乃出伯魯而立無恤又曰魏文侯封太子擊於中山三年不徃來少倉唐曰君何不遣人使大國太子曰願之久矣未得可使者對曰臣願奉使侯何好太子曰侯嗜晨鳬好北犬於是遣少倉唐奉北犬晨鳬獻之侯曰擊愛我知我所嗜好於是立為嗣說苑曰經侯過魏太子左帯羽玉具劒右帶環珮左光照右右光照左太子不視經侯曰魏國有寶乎太子曰主信臣忠百姓載上此魏國之寶也毛詩曰渭陽康公念母也康公之母晉獻公之女文公遭驪姬之難未返而秦姬卒穆公納文公康公時為太子贈送文公於渭之陽念母之不見也毛詩曰小弁刺幽王也太子之傅作焉弁彼鸒斯歸飛提提興也弁樂也鸒卑居也一名鴉鳥提提羣飛貌箋云樂被鴉鳥出食在野其飽羣飛而歸提提然興者喻凡人父子兄弟出入宮庭相與飯飲食亦提提然樂傷今太子獨不然民莫不糓我獨于罹幽王取申女生太子宜臼繼又說褒姒生子伯服立以為后而放宜臼將殺之箋云穀養也于日也罹憂也天子之人無不父子相養者我太子獨不然日以憂也又曰懐德維寧宗子維城無俾城壊無獨斯畏箋云懐和也斯離也和女徳無行酷虐之政以安女國是以為宗子之城使免於難逆行酷虐則禍及宗子是謂城壊城壊則乖離而使女獨居而畏矣宗子嫡子也周禮曰惟王建國辨方正位干寶注曰辨方謂别東西南北之名以表隂陽也正位謂若君南面當陽臣北面即隂居官於北宫以休太隂居太子於東宮以佐少陽之類又曰膳夫掌王之食飲膳羞以養王及后世子嵗終則㑹唯王及后世子之膳不㑹不㑹計多少優尊者其頒賜諸臣則計之又曰凡其死生鱻薧之物以共王之膳與其薦羞之物及后世子之膳羞鄭司農云鮮謂生肉薧謂乾肉也又曰内饔掌王及后世子膳羞之物割烹煎和之事選百羞醬物珍物以俟饋供后及世子之膳羞又曰籩人為王及后世子共其内羞於其飲食以共房中之羞又曰醯人共后及世子之醬齊菹又曰外府掌邦布之出入共王及后世子之衣服之用又曰國君過市則刑人赦夫人過市罰一幕世子過市罰一帟市者人之所交利而行刑之處君子無故不遊觀焉若遊觀則惠施以為說也又曰諸子掌國子之倅國有大事則帥國子而致于大子惟所用之若有甲兵之事則授之車甲合其卒伍置其有司以軍法治之司馬弗正凡國正弗及正音征國子屬太子司馬雖有軍事不賦之也凡國之政事國子存遊倅使之脩德學道春合諸學秋合諸射以考其藝而進退之國子存遊暇之倅使之修徳學道王制曰春秋教以禮樂冬夏教以詩書王太子群子卿大夫元士之嫡子國之俊選皆造焉儀禮聘禮曰遭夫人世子之䘮君不受使大夫受於廟其他如遭君䘮夫人世子死君為主使大夫受聘禮不以㓙接吉也其他謂禮所降大戴禮曰古之王者太子生行舉之禮使士負之有司叅之夙興端冕見之南郊見之天也過闕則下過廟則趨孝子之道也故自為赤子則教固以行矣又曰太子既冠後免於保傅之嚴則有司過之史有虧膳之宰太子有過史必書史之義不得不書過不書過則死過書而宰徹其膳宰之義不得不徹膳不徹膳則死於是有進善之旌誹謗之木敢諫之皷禮記曰大夫士之子不敢自稱曰嗣子某不敢與世子同名又曰王太子王子群后之太子卿大夫元士之嫡子凡入學以齒又曰文王之為世子朝於王季日三雞初鳴而衣服至於寢門外問内豎之御者曰今日安否何如内豎小臣之屬掌内外之通令也如今小史直日矣内豎曰安文王乃喜孝子恒兢兢也及日中又至又復也亦如之及暮又至亦如之其有不安莭則内豎以告文王文王色憂行不能正履不安莭謂不循起居之常王季復膳飲食安也然後亦復初憂觧食上必在視寒煖之節在察食下問所膳所食命膳宰曰末有原應曰諾然後退末猶勿也原再進也勿有所再進為失餁臭味惡也退反其寢武王師而行之不敢有加焉庶幾程式之師修之又曰樂正司業父師司成一有元良萬國以貞世子之謂也又曰成王幼不能蒞阼周公相踐阼而治踐履也代成王履阼階攝王位治天下抗世子法於伯禽欲令成王之知父子君臣長幼之道抗猶舉也謂舉世子之法使成王居處學之也成王有過則撻伯禽所以示成王世子之道王有過而擊伯禽足以感喻凡學世子及學士必時四時各有宜學士謂司徒論俊選升於學者春夏學干戈秋冬學羽籥皆於東序又曰凡三王教世子必以禮樂樂所以修内禮所以修外禮樂交錯於中發形於外是故其成也懌恭敬而温文中心中也懌恱懌也立太傅少傅以養之欲其知父子君臣之道也又曰仲尼曰昔者周公攝政踐祚而治抗世子法於伯禽所以善成王也聞之曰為人臣者殺其身有益於君則為之况于其身以善其君乎周公優為之于讀曰迂優猶廣也是故知為人子然後可以為人父知為人臣然後可以為人君知事人然後能使人成王幼不能蒞阼以為世子則無為也以為世子若為世子時也是故抗世子法於伯禽使之與成王居亦名此禮於成王側欲令成王之知父子君臣長幼之義也君之於世子也親則父也尊則君也有父之親有君之尊然後兼天下而有之是知養世子不可不慎也處君父之位􅄃海内之士而近不能以教其子則其餘不足多也行一物而三善皆得者惟世子而已其齒於學之謂也物猶事也又世子之記曰朝夕至於大寢之門外問内豎曰今日安否何如朝夕朝朝暮夕也日中又朝文王為世子事非禮之制世子之禮亡此存其畧内竪曰今日安世子乃有喜色其有不安節則内豎以告世子世子色憂不滿容色憂憂淺不及文王不能正履也内豎言復初然後亦復初朝夕之食上世子必在視寒暖之節食下問所膳羞必知所進以命膳宰然後退羞必知其所進必知其親所食若内豎言疾則世子親齊𤣥冠而養親猶自也養疾者𤣥冠𤣥端膳宰之饌必敬視之疾者之食必知其所異疾之藥必親嘗試毒味也嘗饌善則世子亦能養善謂多于前也嘗饌寡世子亦不能飽又不及武王一飯再飯以至于復初然後亦復初也禮記曰國君世子生告于君接以太牢宰掌具接讀如㨗徤勝也謂食其母使之補虛强氣也凡接子擇日雖三日之内尊卑皆集必選其吉日也冢子則太牢冢太也庶人特豚士特豕大夫少牢國君世子太牢皆謂長子又曰世子生則君沐浴朝服夫人亦如之皆立于阼階西鄉世婦抱子升自西階君名之降子升自西階盖人君見世子必於露寢也適子庶子見於外寢此適子謂世子弟庶子妾子也冢子未食而見必執其右手適子庶子已食而見必循其首未食已食急正緩庶之義也又曰世子珮瑜玉而綦組綬左傳桓公六年北戎伐齊齊侯乞師於鄭鄭太子忽帥師救齊六月大敗戎師獲其二帥太良少良甲首三百以獻于齊於是諸侯之大夫戍齊齊人饋之餼使魯為其班後鄭鄭忽以其有功也怒故有郎之師公之未婚于齊也齊侯欲以文姜妻鄭太子太子忽辭人問其故太子曰人各有偶齊大非吾偶也詩云自求多福在我而已大國何為君子曰善自為謀及其敗戎師也齊侯又請妻之固辭人問其故太子曰無事於齊吾猶不敢今以君命奔齊之急而受室以歸是以師婚也民其謂我何遂辭諸鄭伯又曰九月丁夘子同生服䖍注曰桓公太子莊公同以太子生之禮舉之魯十二公惟子同生是適夫人之長子故備用太子之禮舉之接以太牢接者子初生接見於父太牢牛羊豕也以禮接夫人重適也卜士負之士妻食之禮世子生三日卜士負之射人以桑弧蓬矢射天地四方卜士之妻為乳母公與文姜宗婦命之公與文姜及同宗之婦命之名也公曰是其生也與吾同物命之曰同物類也謂同日又曰曹太子來朝賓之以上卿禮也曹伯有故使其太子攝而朝諸侯之適子未誓於天子而攝其君則以皮帛繼子男故賓之以上卿各當其國之上卿饗曹太子初獻樂奏而嘆施父曰曹太子其有憂乎非歎所也又曰晉侯使太子申生伐東山臯落氏里克諫曰太子奉冢祀社稷之粢盛以朝夕視君膳者也故曰冢子君行則守有守則從從曰撫軍守曰監國古之制也夫帥師專行謀誓軍旅君與國政之所圖也非太子之事也師在制命而已禀命則不威專命則不孝故君之嗣適不可以帥師君失其官帥師不威將焉用之且臣聞臯落氏將戰君其舍之舍之謂置申生勿使將兵也公曰寡人有子未知其誰立焉不對而退里克不對太子帥師公衣之偏衣佩之金玦偏衣偏裝之衣偏異色駁不純裝在中左右各異故曰偏金玦以金為玦也太子將戰狐突諫曰不可昔辛伯諗周桓公曰内寵並后外寵二政嬖子配嫡大都耦國亂之本也周公弗從故及於難今亂本成矣立可必乎孝而安民子其圗之與其危身以速罪也速召也疾也言太子不去自不危疾召罪狐突知其亂本既成而太子拘於一節不達至孝之義與臯落雖戰勝而歸猶不能免於難而使父有悖惑殺子之罪故傳備舉衆賢之言以見太子所以死也經在僖公五年晉侯殺其世子申生又曰㑹于首止㑹王太子鄭謀寧周也惠王以惠后故將廢太子鄭而立王子帶故齊桓帥諸侯㑹王太子以定其位又曰盟㑹于寗母謀鄭故也鄭伯使太子華聽命於㑹言於齊侯曰泄氏孔氏子人氏三族實違君命君若去之以為成我以鄭為内臣君亦無所不利焉齊侯將許之管仲曰君以禮與信属諸侯而以姦終之無乃不可乎子華由是得罪於鄭鄭伯罪之也又曰初鄭公子蘭出奔晉公子蘭鄭文公賤妾燕姞之子穆公也鄭逐群公子故奔晉也從於晉侯伐鄭請無與圍鄭許之晉善蘭不忘本國故也故使待命於東待命於鄭東也鄭石甲父侯宣多逆以為太子以求成於晉晉人許之又曰秦康公送公子雍於晉也康公秦穆公太子罃晉出也曰文公之入也無衛故有呂郤之難吕甥卻芮欲焚公宫也乃多與之徒衛衛從兵也穆嬴日抱太子穆嬴襄公夫人太子靈公以啼于朝曰先君何罪其嗣亦何罪舍嫡嗣不立而外求君將焉寘此寘猶置也此謂太子也出朝則抱以適趙氏頓首於宣子曰先君奉此子也而屬諸子曰此子也才吾受子之賜如子善為教誨此子使之有賢才知人君之道則吾受子之賜賜猶惠也不才吾惟子之怨才而受賜美其教也不才怨子惡其教不至也今君雖終言猶在耳君沒未久其言聲言氣尚在耳而棄之若何宣子與諸大夫皆患穆嬴且畏偪言諸大夫患穆嬴之言以君顧命之言責己也畏偪言無置太子地畏他公子相逼廹也乃背先蔑而立靈公以禦秦師又曰郕太子侏儒自安夫鍾自安猶處也夫鍾邑名國人弗循循順也十二年春郕伯卒郕人立君立君改立君不立太子也太子以夫鍾與郕邽來奔郕邽亦邑名公以諸侯逆之公重土地故以諸侯禮逆之非禮也又曰齊髙厚相太子光以先㑹諸侯於鍾離不敬士莊伯曰髙厚相太子以㑹諸侯將社稷是衛而皆不敬棄社稷也其將不免乎免脫也言將不脱罪謂不以壽終也傳舉此者為十九年齊殺其大夫髙厚二十九年崔杼弑君光起本也又曰齊侯娶於魯曰顔懿姬無子其姪鬷聲姬兄子曰姪懿姬所從也顔鬷皆其母姓懿聲諡也傳家從後言之故舉諡也生光以為太子諸子諸子妾姓子氏仲子戎子子嬖二子宋女仲子生牙公子牙也屬諸戎子戎子取牙養也戎子請以為太子許之齊侯許之仲子曰不可廢常不祥立長為常立而廢之為不祥也間諸侯難言光已列諸侯之列事難成也光之立也列於諸侯矣謂光數從諸侯北伐盟㑹今無故而廢之是專黜諸侯也專獨也光既與諸侯列於盟不可黜也而以難犯不祥以難成之事犯不善君必悔之公曰在我而已遂東太子光東徙之東鄙也使髙厚傅牙以為太子夙沙衛為少傅齊侯疾崔杼微逆光微隱匿也疾病而立之疾困也而立為太子太平御覽巻一百四十六
