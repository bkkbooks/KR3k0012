  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_696-1a, image: WYG0899/WYG0899-0231a.png}
body:
  text: 太平御覽卷六百九十六宋李昉等撰服章部十三帶大帶裳裳裩帶說文曰帶紳也男子鞶帶婦人鞶絲象繫佩之形佩必有巾故從巾釋名曰帶蔕也着於身如物蔕也易訟卦曰或錫之鞶帶終朝三裭之鞶命服之上飾革帶也漢書曰文帝遺匈奴黄金餙具帶一黄金犀毗禮記玉藻曰革帶博二寸又班固與竇将軍牋云復賜犀毗金頭帶此将軍所帶也東觀漢記曰楊賜拜太常詔賜自所服冠幘綬玊兼革帶又曰鄧遵破匈奴上賜金剛鮮卑緄𢃄一具典畧曰文帝賞賜劉楨廓落帶其後将死欲取以為殉因與楨書云夫物因人而貴故在賤者之所不御至尊之側禎荅曰荆山之璞耀元后之寳随侯之珠燭衆女之妍南垠之金登窈窕之首鼲鼯之尾綴侍臣之幘此皆伏朽壞之下潜汚泥之中而揚光千載之上發采疇昔之外禎所帶無他妙餙若實殊異尚可納也魏畧曰踈勒王獻大秦赤石帶一枚又曰漢陽嘉三年踈勒王獻海西青石金帶呉書曰陸遜破曹休於石亭上脫御金校帶以賜遜又親以帶之為鈎絡帶呉録曰鈎絡者鞍餙革帶也世名為鈎絡帶齊書曰張融形貌短醜精神清徹王敬則見融革帯寛洽将至骼謂曰革帶太急融曰既非歩吏急何為後周書曰随文作相李穆曰周徳既衰愚智共悉天時若此豈能違天乃遣使謁随文帝並上十三鐶金帶盖天子服也戰國䇿曰魯仲連謂田單曰将軍黄金横帶而馳乎淄澠之間有生之樂無死之心楚漢春秋曰北郭先生獻帶於淮陰侯曰牛為人任用力盡猶不置其革呉時外國傳曰大秦國皆着袴褶絡帶又曰扶南人悉着鈎絡帶穆天子傳曰天子北征舎于珠澤獻白玉酒食天子賜黄金之環三十朱帶貝餙三十西征至赤烏氏先出自周宗乃賜赤烏之人貝帯五十鄴中記曰石虎皇后女騎腰中着金環恭􅍢帶述異記曰夏侯祖忻為兖州刺史䘮於官沈僧榮代之祖忻見形詣僧榮沈床上有一織成寳飾絡帯夏侯曰此帶殊好豈能見與沈曰甚善夏侯曰卿直許中不見關必以為施可命焚與沈對前燒之視此帶已在夏腰矣應璩新詩曰革帶䋲為􅃨履舄穿無底大帶論語衛靈公曰子張問行子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉子張書諸紳紳大帶詩芄蘭曰容兮遂兮垂𢃄悸兮容兮可觀佩玊遂遂然垂其紳𢃄悸悸焉有節度又野有死麕曰無感我帨兮無使尨也吠又彼都人士曰彼都人士垂帶而厲彼君子女卷髪如蠆匪伊垂之帶則有餘匪伊卷之髪則有旟旟揚也又鳴鳩曰淑人君子其帶伊絲其帶伊絲其弁伊騏騏文也弁皮弁其帶伊絲為大帶也大帶用素絲以雜色飾焉其當作琪以玉為之禮記玊藻曰凢侍於君紳垂足如履齊紳垂則磬折齊裳下緝又曰紳長制士三尺有司二尺有五寸子游曰三分帶下紳居二焉紳韠結三齊又曰素帶終辟大夫素帶垂辟士練帶率下辟居士錦帶弟子縞帶素帶終辟謂諸侯也辟讀如辟冕之禆謂以繒采餙其側也裳釋名曰上曰衣下曰裳裳障也自障蔽也易坤卦六五曰黄裳元吉象曰黄裳元吉文在中也又下繫曰黄帝尭舜垂裳而天下治尚書大傳曰舜曰精華已竭褰裳去之詩緇衣曰子惠思我蹇裳渉洧又雞鳴曰東方未明顛倒衣裳又葛履曰摻摻女手可以縫裳掺掺猶纎纎也要之襋之好人服之又七月曰載𤣥載黄我朱孔陽為公子裳又鴻鴈曰乃生男子載衣之裳載弄之璋禮玊藻曰衣正色裳間色又曲禮上曰諸母不潄裳左傳曰華登以呉師救華氏齊烏枝明曰用少莫如齊致死齊致死莫如去修補多兵矣請皆用劍從之華氏北復即之厨人濮以裳褁首而荷以走曰得華登矣遂敗華氏于新里春秋演孔圖曰駈除名政衣裳坐吾曲林濫長九州滅六王至于沙丘亡後漢書曰祭遵為人亷約夫人裳不加縁東觀漢記曰鮑宣妻桓氏女字少君宣嘗就少君父學父竒其清苦以女妻之装送甚盛宣謂妻曰少君生富驕習美飾而吾貧賤不敢當禮妻乃悉歸侍御服飾更着短布之裳續漢書輿服志曰樊噲常持鉄楯聞項羽有意殺漢王噲裂裳以褁楯冠之入軍門立漢王旁管子曰桀之時女樂三千人無服文繡衣裳者鄧析子曰責疲者以舉千鈞督跛者以及走兎走騏驥於廷求猨揵於檻斯逆理而求之猶倒裳以索領也晏子春秋曰景公飲酒數日衣縠繡之裳一衣而五采具焉又曰景公飲酒数日去冠披裳自鼔盆甕而已淮南子曰楚欲攻宋墨子聞之自魯趨而徃十日十夜足重繭而不休息裂裳而裹之至于郢見楚王風俗通曰禹入裸國欣起而觧裳俗說禹治洪水乃遂入裸國君子入俗不改其恒於是欣焉而觧裳也原其所以當言皆裳裸國今呉即是也被髪文身裸以為餙盖正朔所不及也猥見大聖之君恱禹文徳欣然皆着衣裳矣郭子横洞冥記曰東方朔生三日而母死隣母得而養之經嵗母忽失朔累月暫歸後復去家萬里見一枯樹脫白布裳掛樹化為龍嵇康集目録曰孫登字公和於汲郡北山中為土窟夏則編草為裳冬則以髮自覆崔駰逹㫖曰有事則褰裳濡足劉梁七舉曰黼黻之服紗縠之裳繁飾參差㣲鮮若霜古樂府陌上桑曰秦氏有好女自名為羅敷緗綺為下裳紫綺為上􅃭傳𤣥裳銘曰上衣下裳天地則也服從其宜君子徳也楚辭曰青雲衣兮白蜺裳又曰採薜荔以為裳又曰披採裳兮芬芳又曰制芰荷以為衣兮集芙蓉以為裳楊雄反騷曰披芙蓉之朱裳裙釋名曰裙下裳也連接裙幅也緝下横縫緝其下也縁裙裙施縁也又曰裙裏衣也古服裙不居外皆有衣籠也揚雄方言曰陳魏之間謂裙為帔音披繞衿謂之裙東觀漢記曰王良為司徒司直妻布裙徒跣曵柴續漢書曰漢明徳太后秃裙不縁又五行志曰獻帝時女子好為長裙而上甚短魏畧曰燉煌俗婦人作裙攣縮如羊腸用布一疋皇甫隆為太守禁改之魏志曰管寕恒着布裙宋書曰羊欣字敬元年二十時王獻之為呉興太守甚知愛之欣嘗夏月着新絹裙晝􅆍獻之入縣見之書裙數幅而去欣書本工因此稱善齊書曰魚復侯子響不道帝以兵圍之有司奏絶子響属籍賜為蛸氏子響宻作啓數紙藏妃王氏帬腰中具自申明云輕舫還闕而不得見此苦之深唯願矜之無使竹帛云齊有反父之子父有害子之名後魏書曰河間任齊與太武攻赫連昌帝以㣲服入其城齊固諌不許乃與數人從帝入城内既覺諸門悉閉帝及齊等因入其宫中得婦人裙繫之槊帝乘而上因此得㧞于齊有力焉北齊書曰世祖為胡皇后造珍珠裙所費不可勝計後被火燒之晋東宫舊事曰皇太子納妃有綘紗複裙綘碧結綾複裙丹碧紗紋䨇裙紫碧紗紋䨇裙紫碧紗紋繡纓䨇裙紫碧紗縠䨇裙丹碧杯文䨇裙山陵故事曰梓宫有緗綘䨇裙無腰晋宋舊事曰崇進皇太后為太皇太后有綘碧絹䨇裙綘絹䙱裙緗綘紗複裙白絹裙四王起事曰惠帝還洛陽得鹿犢車一乘以單白裙為幃河東記曰西河無蚕葉婦女着碧纈裙上加細布裳秦州記曰婦人着裙制乃三十餘幅崔鴻十六國春秋後趙録曰孟卓字君偉少修清苦之志着单裙十年不換西亰雜記曰趙飛鷰為皇后其女弟上織成下裙列女傳曰梁鴻妻孟光裙布荆釵汝南先賢傳曰戴良家五女皆布裙無縁裙四等真人内傳曰南極夫人被錦服青羽裙俗說曰車武子婦大妬夜恒出掩襲車車後呼其婦兄顔熈夜宿共眠取一綘裙掛着屏風上其婦果来㧞刄逕上牀欲刄牀上人定看乃是其兄於是慚羞而退繁欽定情詩曰何以合歡欣紈素三條裙束晳近逰賦曰着紫裙之禆蓰又曰帳有四角之綘裙有三條之殺裩晋書曰王澄之荆州送者傾城澄脫衣着犢鼻褌上樹取鵲􅑹音冠傍若無人晋記曰客詣劉伶值其裸袒因責伶伶笑曰吾以天為屋以屋為裩諸君不當入何怨乎宋書曰桂陽侯義融孫冕字茂徳性庸鄙為郢州刺史暑月露褌上㕔事齊書曰欝林王常裸袒着紅縠裙梁書曰周𢎞正善𤣥理為當世所宗藏法師於開善寺講說門徒数百𢎞正年少未知名着紅褌錦絞髻踞門而聼衆人蔑之弗譴也既而乘閒進難舉坐盡傾師疑非世人覘知相賞狎𢎞正後為左民尚書夏月着犢鼻裩衣朱衣為有司所奏弹其放逹如此又曰吉士瞻少時嘗於南蠻國中擲博無褌褰露為儕􅒰所侮及平魯休烈軍得絹三萬疋乃作百裩其外並賜軍士不以入室又曰謝幾􅀸性通脫在省署夜着犢鼻裩與門生登閣道飲酒酣呼為有司紏奏坐免西京雜記曰司馬相如初與卓文君至成都遂相謀還成都賣酒相如自着犢鼻裩滌噐以耻王孫也世說曰范宣潔行亷約韓伯字康伯為豫章太守遺百疋絹不受减五十疋復不受如是减半遂至一疋既終不受韓後與范載就車中裂二丈與范云人寕可使婦無裩耶范笑而受之阮籍大人先生傳曰羣虱之處褌逃于深縫自以為吉宅君子之處城中何異虱處褌中乎竹林七賢論曰諸阮皆儒學富財唯阮咸好酒家貧俗七月七日矖衣諸阮庭中並列綈錦咸以長竿挂犢鼻布褌人問之曰未能免俗􅂓復爾爾語林曰桓宣武性儉着故褌上馬不調裩敗五形遂露太平御覧卷六百九十六
