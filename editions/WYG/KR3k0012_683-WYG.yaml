body:
  text: 太平御覽卷六百八十三宋李昉等撰儀式部四印許愼説文曰印執政所持信也劉熙釋名曰印信也所以封物為驗也亦言因也封物相因付也史記蘇秦曰使我有洛陽負郭田二頃豈能佩印乎又曰犀首司馬彪曰秦官名也如今虎牙將軍也姓公孫名衍張儀卒後犀首入相秦佩五國相印為從約長又曰漢王與酈食其謀撓楚權食其曰今秦失徳棄義侵伐諸侯㓕六國之後無立錐之地聞陛下德義莫不嚮風慕義願為臣妾莫若立六國後漢王曰善趣刻印先生因行佩之矣張良從外謁漢王方食具以酈生語吿子房曰誰為陛下畫此計者陛下事去矣漢王曰何哉良曰臣請借前箸為大王籌之漢王輟食吐哺罵曰豎儒幾敗廼公事令趣銷印又曰酈寄與典客劉謁説吕祿曰帝使太尉守北軍欲足下之國急歸將印辭去不然禍且起吕祿遂解印屬典客而以兵授之太尉太尉將之行令軍中又曰欒大言方伎乃拜大為五利將軍居月餘得印四佩天士將軍地士將軍大通將軍印又封大樂通侯天子刻玉印曰大通將軍使者衣羽衣夜立白茅上五利亦羽衣立白茅上受印以示不臣也數月佩六印貴振天下漢書藝文志曰六體者古文竒字篆書𨽻書繆書蟲書師古曰繆篆謂古文屈曲纒繞所以摹印章也皆所以通知古今文字摹印章書幡信也又曰酈食其説齊王曰項氏為人刻印玩而不能授臣瓉曰項羽恡於爵賞玩惜候印不能封人韓信傳作刓義兩通又曰張耳責讓陳餘餘怒曰不意君之望臣深也豈以臣重去將哉乃脱觧印綬與耳耳不敢受餘走如厠客有說耳曰天予不取返受不祥急取之乃佩其印遂收其兵由此有大隙又曰夏侯嬰從捕虜降卒得印一匱又曰趙堯傳曰御史大夫周昌為趙相髙祖持御史大夫印弄之曰誰可以為御史大夫者熟視之堯曰無以易堯遂拜為御史大夫又嚴助曰陛下以方寸之印丈二之組鎭撫方外不勞一卒不損一㦸而威德並行如使越人蒙死徼倖以逆執事之顔行文頴曰顔行為雁行在前故曰顔也厮輿之卒有一不備而歸者雖得越王之首臣猶竊為大漢羞之又曰武帝遺詔以討莽何羅功封金日磾為秺侯日磾以帝少不受封輔政嵗餘病困大將軍光白封日磾卧受印綬又曰王莽簒位遺謁者即拜龔勝太子師友祭酒以印綬就加勝輙推不受曰吾受漢恩厚無以報今老矣旦暮入地豈宜以一身事二姓下見故主哉又曰王莽簒位遣五威將軍王駿率甄阜等六人多齎金帛遺單于曉諭以受命代漢狀因易單于印故印文曰匈奴單于璽莽更曰新匈奴單于章詔令上故印左姑夕侯蘇從旁謂單于曰未見新印文宜勿與單于曰印文何由變更遂觧故印奉上將率受著新紱不解視印飲食至夜廼罷右率陳饒謂諸將率曰嚮者姑夕侯疑印文幾令單于不與人如今視印見其變改必求故印此非辭説所能距也即引斧椎壞之明日單于果遣右骨都侯當白將率曰漢賜單于璽言璽不言章又無漢字諸王以下廼有漢言章今印去璽加新與臣下無别願得故印將率示以故印謂曰新室順天制作單于宜承天命奉新室之制當還白單于知己無可奈何又多得賂遺即遣弟右賢王奉馬牛隨將率入謝又曰王莽簒位莽皇孫功崇公宗坐自畫容貌被服天子衣冠刻印三一曰維祉冠存已夏處南山藏薄氷祉福也冠存已夏處南山就隂凉也藏薄氷亦隂二曰肅聖寶繼莽自謂舜後能肅敬得寳龜宗亦繼之也三曰德封昌國宗自言以德見封當昌熾受圖籍也後事發案驗宗自殺東觀漢記曰更始立以上為太常偏將軍時無印得定武侯家丞印佩之又曰馬援上書曰印書成臯令臯字為白下羊丞印四下羊尉印白下人人下羊即一縣長吏文不同恐天下不正者多符印所以為信宜齊同事下大司空正郡國印章奏可又叚熲上書曰掠得羗侯君長金印三十一錫印一枚皆簿入後漢書曰冦恂初為功曹太守耿况甚重之王莽敗更始立使使者狥郡國曰先降者復爵位恂從耿况迎使者於界上况上印綬使者納之一宿無還意恂勒兵入見使者就請之使者不與曰天王使者功曹欲脅之邪恂曰非敢脅使君君者尊之之稱也竊傷計之不祥也今天下初定國信未宣使君建節䘖命以臨四方郡國莫不延頸傾耳望風歸命今始至上谷而先隳大信隳毁也阻向化之心生離叛之隙將復何以號令他郡乎且耿府君在上谷久為吏人所親今易之得賢則造次未安不賢祗更生亂為使君計莫若復之以安百姓使者不應恂叱左右以使者命召况至恂進印綬帶於况使者不得已乃承制詔之况受命而歸又曰獻帝遷許徐璆以廷尉徴當詣京道為袁術所刼術死軍破璆送前所假汝南東海二郡印綬司徒趙温謂璆曰君遭大難猶存此耶璆曰昔蘇武困於匈奴不墜七尺之節况此六寸印乎又曰延熹八年沛國戴異得黄金印無文字遂與廣陵人龍尚等共祭井作符書稱太上皇伏誅又曰張魯在漢中民有地中得玉印者羣下欲尊魯為漢寧王功曹閻諫以必為禍先魯從而止魏志曰袁紹欲立幽州牧劉虞為帝太祖拒之紹又嘗得一玉印於太祖坐中舉向其肘太祖笑而惡焉又曰揚本以天子都安邑醫師徒卒皆為校尉御史刻印不供乃以錐畫示有文字或不時得又曰許允善相印出為鎭北將軍將拜以印不善使更刻之如此者三允曰雖始成而巳被辱問送印者印果懷之而墜於厠又曰平原太守劉份取印囊及山鷄毛着器中使管輅筮之輅曰内方外圓五色成文合寶守信出則有章此印囊也又曰咸熙元年鎭西將軍衞瓘上雍州兵於城都縣得碧玉印各一印文似成信字依周成王歸禾之義宣示百官相國府呉志曰劉禪襲位諸葛亮秉政與權連和時事所宜權輙令陸遜報語并刻權印以置其所權每與禪亮書常送示遜輕重可否有所不安便令改以封行之晉書曰孔愉封餘不亭侯愉曽行經餘不亭見籠龜於路者買而放之溪中流左顧者數四及是鑄侯印而左顧三改如初印工告愉愉悟乃佩焉又曰趙王倫僣位而以苟且之惠取悦人情金銀冶鑄不給於印故有白板之侯君子恥服其章宋書曰孔琳之為尚書左丞揚州治中從事史所居著績時責衆官獻便宜琳建言曰夫璽印者所以辦章官爵立契符信官莫大於皇帝爵莫尊於公侯而𫝊國之璽厯代遞用襲封之印奕世相𫝊貴在仍舊無取改作今世唯尉一職獨用一印至内外羣官每遷悉改討尋其義私所未達若謂官各異姓與𫝊襲不同則未若異代之為殊也若論其名器雖有公卿之貴未若帝王之重若以或有誅夷之臣忌其凶穢則漢用秦璽延祚四百未聞以子嬰身戮國亡而棄之不佩帝王公侯之尊不疑於傳璽人臣衆僚之卑何嫌於即印載籍未聞其說推例自乖其准而終年刻鑄喪功消實金銀銅炭之費不可稱言非所以因循舊貫易簡之道愚請衆官即用一印無煩改作若新置官官多印少文或零失然後乃鑄則仰禆天府非唯小益齊書曰巴西人趙續伯反秦其鄉人李𢎞為聖王𢎞乗佛輿以五綵裹青石誑百姓云天與己玉印當王蜀後敗梁書曰何思澄自廷尉正遷治書侍御使宋齊以來此職甚輕天監初始重其選車前依尚書二丞給三騶執盛印青囊舊事糺彈在前故也又曰王瑩拜將軍印工鑄其印六鑄而龜六毁既成鎮空不實補而用之居職六日暴卒後魏書曰祖瑩為散騎侍郎孝昌中於廣平王第掘得故玉印勑召瑩與黄門侍郎李琰之令辦何世之物瑩云此是于闐國玉晉太康中所獻乃以墨塗字觀之果如瑩言時人稱為博物又曰髙祖詔軍警給雀印傳符次給馬印又曰承明元年上谷郡人獻玉印有蛟龍之文唐書曰朱泚遣其將韓旻領兵三千趣奉天時奉天未有武備泚召叚秀實與謀秀實詐圖之乃與將吏謀殺泚且欲遣韓旻兵迴竊姚令言印不遂乃以司農寺印倒印符牒旻莫辨其印遑遽而迴應劭漢官儀曰印者因也所以虎紐者陽類虎者獸之長取其威猛以執伏羣下龜者隂物隨時蟄藏以示臣道功成而退也孝武皇帝元狩四年令通官印五分王公侯金二千石銀二千石以下銅印漢舊儀曰諸侯王黄金槖駝印文曰璽列侯金龜紐文曰印丞相大將軍黄金印龜紐文曰章御史大夫章匈奴單于黄金印槖駝紐文曰章御史二千石銀印龜紐文曰章千石六百石四百石皆銅印鼻紐文曰印章二百石以上皆為通官印續漢禮儀志曰印璽押金鏤大貴人長公主銅鏤江表傳曰呉歴陵縣有名山臨水髙百丈其上三千丈有七孔相傳謂之石印石印神有三郎時歴陵長表言石印文發孫皓大喜遣使祭歴陵使者以髙梯上省印文詐以朱書曰楚九州都揚作天子還以印文啓皓皓曰太平之主非孫復誰以印綬拜三郎為王又曰諸葛恪被誅弟融刮金龜印服之而死抱朴子曰古之入山者佩黄神白章印其濶四寸其字百二十以封泥著之所住之四方各百歩則虎狼不敢近崔豹古今注曰奏劾者絺為嚢盛印於前示奉法而行非奏劾者以青繒為囊盛印於後郭子曰大將軍王敦起事丞相導兄弟詣闕謝甚有憂色尚書周顗始入丞相呼顗曰伯仁以百口賴卿顗直過不應既入苦相申救甚至既釋顗大悦飲酒致醉而出導等猶在門又呼顗顗不與言顧左右曰今年殺諸賊奴當取一金印如斗繫肘也列仙傳曰方囬者堯時人至夏桀末為官為土人所刼閉之宫中從求道因化而得去更以方囬印封其户時人言得方囬一丸泥門户不可開拾遺記曰禹治水黄龍曵尾於前𤣥龜負青泥於後𤣥龜河精之使者龜頷下有印文皆古文作九州山水之字禹所穿鑿之處皆以青泥封記其所使𤣥龜印其上今之人聚土為界乃遺象也又曰王溥即王吉之後也傭書於洛美形貌又多文辭來僦其書者丈夫贈其衣冠婦人遺其珠玉一日之中衣寶盈車而歸積粟千廪九族莫不仰其衣食洛陽稱為善筆而得富也溥先時家貧穿井得鐡印銘曰傭力得富錢至億庾一土三田軍門主簿後以一億庾錢輸官得中壘校尉三田一土壘字也中壘校尉掌北軍壘門故曰軍門主簿也積善降福明神之報也博物志曰常山張顥為梁相天新雨後有鳥如山鵲飛翔近地市人擲之隨地為圓石顥令椎破得一金印文曰忠孝侯印顥上之藏之秘府後議郎汝南樊行夷校書東觀表上言堯舜之時舊有此官今天降印宜可復置述異記曰張軌字士彦為使持節䕶羗校尉凉州刺史客相印曰祚傳子孫長有西夏關洛傾䧟而凉土獨全在職十三年傳國三世八主一十六載風土記曰豫章新塗縣令刻印而悞作塗相印書曰相印法本出陳長文長文以語韋仲將印工楊利從仲將受法以語許士宗私以法術占吉㓙十中八九仲將問長文從誰得法長文曰本出漢世又印工宗養以法語程申伯相印經曰印有八角十二芒欲得周正上隆下平印光明清潔如此皆吉夣書曰印鈎為人子所保也夣見印鈎人得子含印吞鈎懷姙婦也失印子傷墮𫝊𤣥印銘曰惟昔先王配天垂則乃設印章作信萬國取象晷儀是銘是刻文明慎密直方其德本立道生歸乎𤣥黙太平御覽卷六百八十三
