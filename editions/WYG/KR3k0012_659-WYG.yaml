body:
  text: 太平御覧卷六百五十九宋李昉等撰道部一道老子曰道可道非常道名可名非常名無名天地之始有名萬物之母無名者妙夲也道冲而用之或不盈淵乎似萬物之宗天地之間其猶槖籥乎𤣥牝之門是謂天地根天地所以能長且乆者以其不自生故能長生生而不有為而不恃長而不宰是謂𤣥徳執古之道以御今之有能知古始是謂道紀萬物並作吾以觀其復功成事遂百姓皆謂我自然絶聖棄智民利百倍孔徳之容惟道是從以閲衆甫吾何以知衆甫之然哉曲則全謂曲已從衆則全其身枉則直謂枉已以伸人乆乆自直窪則盈謂謙執則常盈也幣則新自受弊薄乆乆自新少則得謂抱一不雕則無失也多則惑謂有為多門則惑亂也是以聖人抱一為天下式希言自然謂因言悟道不滯於言合自然也有物混成先天地生寂兮寥兮獨立而不改周行而不殆吾不知其名字之曰道強為之名曰大域中有四大而王居其一焉謂王者人靈之主萬物繫其興亡也人法地地法天天法道道法自然重為輕根靜為躁君善行無轍迹謂體于其性行無迹相則心與道宜也善言無瑕謫謂遺衆求意理正心志善計不用籌算謂一以貫之不生他見也善閉無闗揵而不可開謂心無逐境之迷境無起心之累也善結無䋲約而不觧謂心與道合雖無約束而不可觧也是以聖人常善救人故無棄人常善救物故無棄物是謂襲明知其雄守其雌為天下谿為天下谿常徳不離復歸于嬰兒知其白守其黒為天下式為天下式常徳不忒復歸于無極知其榮守其辱為天下谷為天下谷常徳乃足復歸于朴聖人用之則為官長故大制不割謂聖人用大道制羣生萬物不謝於自然曽不傷割也道之在天下猶川谷之與江海死而不亡者夀謂死者分理之終亡者天折之數夀者一期之盡夫知足力行者得天常也死而不亡是一期之盡可謂夀也矣執大象天下徃徃而不害安於太平化而欲作吾將鎮之以無名之朴謂道也失道而後徳失徳而後仁失仁而後義失義而後禮天下萬物生於有有生於無明道若昩進道若退夷道若類上徳若谷謂虛㳂而容物也大白若辱謂能潔而含垢也廣徳若不足謂大成而執謙也建徳若偷謂立功而不􅃷也質真若渝謂淳一而和光也大方無隅謂不小立于角也大噐晚成謂且無近功也大音希聲謂不飾小說也大像無形謂能應萬類也道隠無名謂功用不彰也道生一一生二二生三三生萬物萬物負隂而抱陽冲氣以為和為道日損損之又損以至于無為故塞其兊閉其門終身不勤謂不縱六根受悦則禍患之門閉矣終身不勤勞也開其兊濟其事終身不救謂縱視聴以成其愛恱之事故有禍患不救也無遺身殃是謂襲常謂不為身灾是謂宻用真常之道也又曰知者不言言者不知所以言者以音相聞譬如知音者識音以絃心知其音口不能傳道深微妙知者不言也太上曰知者不言言能以救物又曰上士學道受之以神中士受之以心下士受之以耳以神聴者通無形以心聴者知内情以耳聴者聞外聲又曰知者不言言者不知故聖人云我旡為而民自化我旡事而民自富我好靜而民自正我无欲而民自樸修之於身天下自化深根固柢長生乆視之道以道蒞天下其鬼不神道者萬物之奥為者敗之執者失之是以聖人无為故旡敗无執故无失大上經曰混茫之氣變化為真人與時翺翔有名旡體仙經曰神仙輕舉謂之天仙列位太清度名秘籍秘要經曰五岳洞府隠處地仙保其祖形逺其憂患又曰太清九宫皆有僚属其最高者稱太皇紫皇玉皇其高總稱曰道君次稱真人真卿其間有御史凡稱太上者一宫之尊也徳高旡踰故曰太上又曰仙者川也身者舟也濟川得岸何俟舟為太真科曰玉皇諸錄有百八道君羣仙随業以補其職三善道者聖真仙也上品曰聖中品曰真下品曰仙三清之間各有正位聖登玉清真登上清仙登太清玉清有大省宫殿皇帝王公卿大夫吏民率以聖呼之如聖皇聖帝之類是也男女貴賤各有次第上清有𤣥都玉京七寳紫微率以真呼之太清有太極宫殿率以仙呼之其上清太清品位列男女次第之統數與玉清同大洞經曰從生得道從道得仙從仙得真從真得為上清君玉符經曰二十四真圗五岳之靈寳也能得之必能仙去飛渉太清欲得道法先沭浴去穢當得東井圗欲定五常役山精當得五岳圗欲通神靈法仙訣當得八史真形圗欲通五行厨當得六甲通靈圗欲存吾身致天神當得九宫紫房圗欲奉道法當得太清圗欲奉順道當得混成圗欲通道機當得西昇保録圗欲通變化當得靈化圗欲躡大道當得九天圗欲脱身形當得九變圗欲隠存守身當得常存圗欲定身守神當得含影圗欲恬泊守一以存身當得飬身圗欲寂黙飬志當得精誠守志圗欲清凈潔白致其芝英當得芝英玊女圗欲聘六丁當得六隂玊女圗欲致仙籙當得九九道仙圗欲食導氣當得導引圗欲治道術當得洞中皇寳圗欲為變化當得偃息圗欲臨鑪定九丹金液當得太一圗欲登五岳求神仙芝藥當得開山芝藥圗欲保神形别邪精當得明鏡圗上清經曰氣之所守随身所生神在則氣在神去則氣去氣散則為雲霧合則為形影出之為仙化入之為真一上結三元下結萬物靜用為兆身動用為兆神洞真經曰凡讀大丹隠書洞真𤣥經能研精宻感通𤣥達雲廻釋𤣥元味景太清者為𤣥中法師也葛洪神仙傳曰自伏羲至三代顯名道士世世有之其老子盖得道尤精者也内實自然欲正定本末當以史傳為據并仙經秘文以相恭㑹其他俗説文多虛妄其後道士私有増益非真文也著道徳三萹尹喜行其道至漢竇太后好黄老言孝文帝及外戚諸竇皆令讀之故莊周之徒以老子為宗太上𤣥一真人經曰衆真高仙皆有師也奉受上清三同寳經為學無師則道不成人景龍輿焉可得乗太極玉闕焉可得登凡學上清之道豈肉飛之舉若慢於師道則失投夜光也以是言之道固難知也至於聖賢皆尊其師所以耐道也太上太霄琅書曰天地布氣師教之真真仙登聖非師不成心不可師師心必敗寳𤣥經曰裁制偏邪同歸中正能及流末還至本源道夲無形假名立象雖言充用實本無物道典曰制殺生者天也順性命者人也非逆天者勿殺也非逆人者勿伐也為政如是盖道之極也七聖記曰南岳赤君下敎變迹為道士與六弟子俱顯姓名太乙帝君經曰求道者使其心正則天地不能違也捨色累而不願避榮利而自逺甘寒苦以存思樂靜齋於隠垣則學道之人始可與言矣太上三五順行經曰天者道之應形也應有時漸交以引之𤣥象虛文莫過三五三五順行運周則變通不窮三才合度太乙者天也天之受一氣蕩蕩而致清道者天之積靈也昇𤣥經曰道之𤣥妙岀於自然生於無生先於無先彌綸無外有神化氣淡然無上制御諸天𤣥妙内萹曰大道起於無為萬物之祖也正一真人經曰道之淳真非有言也惜言道意因置𤣥都正一之化去真近矣寳𤣥經曰正則道合合則言志志言在正正以絶邪齋戒誦經仙道自成成仙之大莫過太上太上無言言以應感感應之道表信成經也三皇經曰求索自然脱身當道三光發明天地常經智慧經曰與人君言則惠於國與人父言則慈於子與人師言則愛於衆與人兄言則悌於行與人臣言則忠於上與人子言則孝於親與人友言則信於交與人婦言則忠於夫與人夫言則和於室與人弟言則恭於禮與野人言則勸於農與道士言則止於道與國人言則各守其域與奴婢言則慎於事太上經曰親近賢智博問善道賢者論議不可專執又曰末世道士講經說法儀軌云何若説五千文者亦依靈寳太上三洞寳經曰三洞傳法之師一人度世勝黄衣道士千人也又曰大茅山有銅鼎可容四五斛刻甚精好在山最高處入土八尺餘上有磐石掩鼎每吉日逺近道士咸登山瞻視無復草木壘石為小壇昔有小瓦屋為風雨所倒兩鉉法日月也三尺法三才也羽山之銅所作神變隠顯真誥曰大茅山西南有四平山谷謂之方山其下有洞室名曰方臺洞有兩口見於山外與華陽通號為别宇幽館也得道者處焉又曰修於其身其徳乃真君子立身道徳為任清凈為師太和為友為𤣥為黙與道窮極治於根夲求於末兆為善者自賞為惡者自刑故不爭無不勝不言無不應又曰能以至心學道當以道授學者裴君曰我師南岳赤松子為太虛真人者太上以徳敎老子而得道松子以道授我而得仙又曰仙道十二試觀之法試皆過然後授之經此十二事大試也昔太極真人臨見之可不慎焉昔彭祖弟子青鳥公受明師之敎審仙妙之理入華隂山學道積年十二試有三不過後服金丹而昇太極道君以為試三不過但仙人而已不得為真人又曰裴君云學道者有九患若審之則仙不逺矣患人有志無時有時無變有變無志有志不遇其師遇師不學學師不勤勤不守道或志不固一心如此則不湏有而成亦不湏感而動此學仙之廣要也師有憂戚弟子岀入無善為學無師道則不成心存目想見師如經學非師授不可以敎人恐疑悟後學故不得傳求法事師莫擇貴賤勿疑長幼言我年大而彼年小彼是賤而我是貴此是未觧正真平等之要人無貴賤有道則尊所謂長老不必耆年要當多識多見以為先生不得言彼學在我后云何更及師彼作此念者非學道也當謙下推能譲徳惟師是從不得獨是非彼得道度世莫不由師也學之有師亦如樹之有根也大智既成復能成就小智猶樹根生子子復能生根展轉相生種類不絶從師變道道過於師還敎於師所謂道貴人賤義類如此先師並湏尊異所以爾者本師者學之根也譬為山一簣之土漸得高大本師者發蒙之基也後師者稱成也譬如嚴莊服飾衆事已辦惟未加冠不可以行人事也妄生下想所以然者論議言説為人模範師不明道焉能觧疑難也古者賢聖上學得其師名為更生不得其師名為亂經無其師道不自生也太平經曰上士學道輔佐帝王好生之徳也中士學道欲度其家下士學道裁脱其身又曰言則道不成多言則為害閉口不言萬嵗無患又曰人得善思乃使凡賤之人成善人善不止更賢賢不止次聖聖不止乃得深知真道守道不止乃得仙仙不止乃與天比其神神不止乃得與元氣比其得元氣乃包天地八方莫不受其氣而生是善師之功也不得其善師失路矣故師師相傳乃堅如金石不以師傳之名為妄作則致邪矣叛去其師是去其真道自窮之術也道有宗師祖師定真玉録曰治心之最不忘湏㬰心神乃定定則入道其狀在外慎其言語懼觸物也節其飲食慮貪生也衣麄而靜存素淡也居陋而隠守靜䔍也恭謹一切避凌辱也不敢為先免疾謗也始終淳信潜化導也進止和光宻行敎也挫鋭觧紛明道有時也岀處變化見神應之速也又曰九宫真人岀入皆從黄闕綘臺中間為道故以道之左右置臺闕者以司非常之氣同迎真人徃来也道基經曰服藥食麥善為麥有甘始道士御氣食麥而度世也又曰合道不言得無之真晝夜不卧日月合光不飢不渴龜龍胎息也又曰食穀者名之穀仙行之不休則可延乆長也不食穀者可以度世又曰無賣吾道以行求錢無􅃷吾道强授豪榮無損吾道以與䜛佞黄庭經曰仙人道士服氣非有神也積精所致和氣專也若道士恐畏存神可鳴天鼓聲聞太極太真科曰道士修經習業以五千文為先又曰道有寂動氣化之有形智化之有聲又曰皇教道也帝敎徳也王敎仁也抱朴子曰求師必湏深博猶渉滄海造長洲獨以力劣為患豈以物少為憂哉夫虎豹之所餘乃貍䑕之所飫陶朱之所棄乃原憲之所無專心慿師依法行道潜身度世利在永亨事師盡敬得道為期承問候色也不盡力明其師道則罪不可除也學道得明師事之害亂不得發也三元真一經曰有太洞守一經者則為師也太清經云天地以道資聖人以道師也資者持道以飬育當生也師者以敎人不知而當成也又曰有太洞守一經者則為師也所以崇建本末盡善明天戒之苦至期神靈之所宗託階級以自始所以師友恒其外三一鑑其内帝君忻其志赤子悦其宅老子云天地以道資聖人以道師資者持道以飬育當生也師者以敎人不知而當成也上清紫宸經曰經不師授竊天之保受無盟信忽天之道太上八素真經曰太上𤣥人所以與天地等者貴其能相敎導也先覺於後覺其流歸於一源也天真皇人曰此請諸君皆積學㓕度道業垂成而得受此文以還生人中皆起虛歩空上昇金闕受號自然也其並悠逺人世所不能明考其延者羡門子師夜光高丘子師石公洪崖先生師金母並受靈寳㓕度五鍊之法昇天之傳又曰正一法文曰若􅃷法求利不明正典傳敎習謬迷悞後生後生縁薄率爾逐易不尋高徳苟貪愛而有名無實望福徳而禍加深也傳授茍非其人道不虛授常恐浮淺之軰亟生誹謗貽灾致罪為累不輕所以立信効心因以為施授受之中有以令别洞真經曰修太一之道忌見血穢之類亦不可泣太有經曰受上清寳經日不得哭泣𤣥母八門經曰存金華一雌之精深戒哭泣令多戚憂太平御覧卷六百五十九
