body:
  text: 太平御覧卷四百四十九宋李昉等撰人事部九十權謀中續漢書曰銅馬所過虜掠王俊言於上曰宜捨輕兵出賊前使百姓各堅壁以絶其食可不戰而殄也上然之遣俊將輕騎馳出賊前視民保壁者勅令固守散在野者因掠取之賊至無所得遂散敗及軍還上謂俊曰困此虜者將軍䇿也又曰亷范爲雲中太守㑹匈奴大入塞范自率士卒拒之虜衆盛不敵令軍士各交縛兩炬三頭燃火虜謂漢兵大至待旦將退范乃命軍中蓐食晨往赴之斬首數千級虜自此不敢復向雲中又曰朝歌賊寗季等數千人攻殺長吏乃使虞詡爲朝歌長故舊皆弔詡曰得朝歌何衰詡笑曰志不求易事不避難臣之職也不遇盤根錯節何以别利器乎始到謁河内太守馬陵陵勉之曰儒者謀謨廟堂反在朝歌耶詡曰初除之日大夫皆弔及到官設令三科以募求壯士自掾吏以下各舉所知其攻刼者爲上而不事家業者爲下收得百餘人詡爲之享㑹悉貸其罪使入賊中誘令刼掠乃伏兵以待之遂殺賊百人又潜遣貧民得縫者傭作賊衣以采綖縫其裙爲識有出市賣者吏輙禽之由是駭散咸稱神明遷武都太守及還羗率數千遮詡於陳倉詡即停軍不進而上書請兵須到當發羗聞之乃分鈔傍縣詡因其兵散日夜進行二百里令吏士各作兩竈日增倍之羗不敢逼或問曰孫臏減竈而君増竈兵法曰日行不可過三十里而今日行二百何也詡曰虜衆多吾兵少徐則易爲所及速則彼不測虜見竈増必謂郡兵來迎行速必憚追我孫臏見弱吾今示彊勢有不同故也魏志曰荀彧字文若潁川人淑之孫也舉孝亷遷亢父令以董卓之亂棄官歸太祖太祖悦曰吾子房也以爲司馬時年二十九後太祖破黄巾漢獻帝自河東還洛陽或勸太祖曰晉文納周襄王而諸侯願從漢髙爲義帝縞素天下歸心自天子􅂪塵將軍首唱義兵雖禦難于外心無不在王室今鸞駕旋軫東京榛蕪義士有存本之思兆人懷感舊之哀誠因此時奉主上以從民望大順也秉至公以服天下大畧也仗𢎞毅以致英俊大德也四方雖有逆節其何能爲太祖從之遂迎天子都許進彧爲尚書令及袁紹兼河北天下畏其强與太祖書極悖慢太祖以書示彧曰將誅不義而力不敵如何彧曰古之成敗者誠有其才雖弱必强苟非其人其强易弱劉項存亡足以觀之太祖卒破紹於官渡如彧策又曰荀攸字公逹彧從子也太祖遺攸書曰方今天下大亂智者勞心之時也遂徵入爲尚書操謂鍾繇曰公逹非常人也吾得之與計事天下何憂哉以爲軍師征吕布至下邳攻之不㧞太祖欲還攸曰布勇而無謀不可解遂生擒布太祖又與袁紹相拒於官渡攸勸擊紹將淳于瓊運粮遂破紹魏國初建爲尚書令太祖謂文帝曰公逹人師表汝宜盡禮敬之又曰袁尚攻兄譚於平原留别駕審配守鄴爲曹公所圍尚聞鄴急棄而救之求人入城計㑹事主簿李孚請行時圍甚急尚曰何辦孚曰多人不可三騎足矣尚遣之孚選温信者得三人各給駿馬不示其謀令釋戎器着平常冠秉問事枤投暮直抵鄴城下自稱曹公廵厯圍壘所過失候者輙捶之自東西正出曹公營當城門復怒守圍者收縛之因入至城下配以縋引之孚與配相見既事了外圍益急孚因謂配曰城中榖少無用老弱不如驅出省榖也配乃夜簡得一千人皆令持白幡秉脂燭從三門而出請降孚將所來騎從降人而出時守圍吏聞城中悉降火光照曜但共觀降不復視圍孚從北門突圍而歸報命於袁尚明旦曹公聞孚已出拊掌大笑鄴郡竟爲曹公所取袁尚奔於遼東又曰郭嘉字奉孝潁川人詣太祖太祖與論天下事曰使孤成大業必此人也太祖用其事計先擊吕布擒之太祖與袁紹相持於官渡孫䇿北襲楚衆並懼嘉料曰策輕而無備雖有百萬之衆無異獨行於中原也以吾觀之必死於匹夫之手策臨欲濟東江果爲許貢客所殺後太祖又用其計宻襲盧龍塞大破單于又曰鄧艾字士載襄陽人少孤貧每見髙山大澤輙指畫軍營處所時人笑焉因計吏上見司馬宣王宣王竒之辟爲掾景元四年秋詔諸軍征蜀艾授大將軍節度鍾㑹攻劒閣不下艾自隂平行無人之地七百餘里鑿山通道艾以氊自裹推轉而下進至油江遂入成都降劉禪蜀志曰龎統字士元襄陽人守耒陽令在縣不治免官吳魯肅與先主書曰士元非百里之才使處治中别駕始展驥足耳先主以爲治中從事親侍亞亮爲軍師中郎將亮留鎮荆州統隨入蜀璋與先主㑹統曰因此㑹執之則無用兵之勞先主曰初入地恩信未著不可也統復上三計先主用中計向成都所過輙克進圍雒率衆攻城爲流矢中卒又曰法正字孝直扶風人建安初天下亂入蜀依劉璋别駕張松與正書度璋不足成事因勸璋結先主乃遣正徃及還謂松曰雄畧宻謀可共戴奉之璋復使正迎先主先主定蜀以正爲蜀郡守外統都畿内爲謀主正說曰曹公留夏侯淵張郃屯漢中淵等才略非制勝之師今舉衆討必克先主乃率諸將兵討漢中淵將兵來争其地正曰可擊矣先主命黄忠乗髙攻之淵等授首曹公聞正䇿曰吾故知𤣥德不辦此必爲人教也先主立為漢中王以正為尚書令吳志曰太史慈字子義東萊人避亂至遼東北海相孔融聞而竒之數遣餉饋其母融以黄巾冦暴出屯都昌爲賊管彦所圍慈歸其母曰汝與孔北海未嘗相識汝去後贍䘏過於故舊今被圍汝宜赴之慈單歩至都昌夜因伺圍開得入見融融欲告急平原相𤣥德城中人無由得出慈請行融難慈慈曰昔府君傾意老母母感遇遣慈赴急今衆人言不可豈府君愛顧之義老母遣慈意耶慈晨出下鞭直突圍馳去射殺數人應弦而倒無敢追者到平原說𤣥德𤣥德曰孔北海知世間復有我耶即遣兵三千隨慈擊賊遂退又曰黄盖字公覆零陵人隨周瑜拒曹公於赤壁盖白瑜曰今㓂衆我寡難爲持久可燒而走也乃取鬬艦數十艘實以薪草膏灌其中裹以帷幕上建牙旗先書報曹公期以欲降引次俱前盖令諸船同時發火時風盛猛走燒岸上營烟熖張天燒溺死者甚衆曹公乃敗晉書曰馬隆字孝興東平人凉州刺史楊欣失𦍑戎之計爲虜所没河西斷絶上臨朝歎曰誰能爲我討此虜朝臣莫對隆曰陛下若能任臣臣能平之帝遂許隆募勇士三千五百人而行或竒謀間發或夾道壘磁石賊負鉄鎧卒行不得隆卒悉被犀甲無所留礙賊以爲神轉戰千里凉州遂平詔假節西平太守又曰明帝大寧元年王敦反屯兵濟隂帝㣲服行其營壘既而馳去敦方晝寢夢日環其營驚起曰必是鮮卑黄鬚奴來也使騎切遽而追之帝亦馳去馬遺有糞輙以冷水沃之時逆旅有賣飯媪帝以七寶鞭與之俄而追者至訊媪媪云去已逺矣因以鞭示之傳視遲留又見馬糞冷信已逺矣而止帝遂得免又曰僞趙張賔字孟孫趙郡中山人石勒初爲劉元海授輔漢將軍賔爲所親曰吾歴觀諸將多矣獨胡將軍可以共成大事乃提劒軍門大呼請見勒勒初未可也漸見進重引爲謀主機不虛發算無遺策成勒之事皆賔之計勒常歎曰吾毎臨大事吾意未了右侯已了及卒勒親臨哭之慟顧謂左右曰天不欲吾成事何奪右侯之早也又曰僞燕慕容垂欲興師討慕容永長子議曰頃年士卒疲於行陣居人不暇耕織瘡痍滿身哭泣盈路且宜撫士安人以待時長子不足憂也慕容德曰不然昔光武馳蘇茂之難不顧百官之疲夫豈不仁機急故也兵法有不得已而用之方今海内版蕩人百其心急之則得其用緩之各懷所思可因其勞而成其逸何得緩之垂嘆曰卿言當矣二人同心其利斷金行其謀而㓕永又曰杜預以太康元年正月陳兵江陵遣參軍樊顯尹林鄧圭㐮陽太守周竒等率衆循江西上授以節度旬日之間累尅城邑皆如預策焉又曰杜預陳兵江陵遣周㫖伍巢等率竒兵八百汎舟夜渡以襲樂鄉多張旗幟起火巴山出于要害之地以奪賊心吳都督孫歆震恐與伍延書曰北來諸軍乃飛渡江也後周書曰武帝保定元年汾晉之北離石之南悉是生胡而地居齊境抄掠我東鄙朝廷患之韋孝寛乃於要害欲置大城以扼其吭興役十萬甲士百人遣姚岳監之岳有難色謂孝寛曰國家每於境外築城未嘗不動大衆今深入胡境宻邇齊師以兵百騎何以禦役孝寛曰事有萬途兵非一勢君但受成規無所憂也計築城十日即畢今齊君徵兵三日方集謀議之間自稽三日計其軍行二日行到我之城隍辦矣乃令築之齊人果如期而至界首疑有伏軍不敢進其夕岳合縁汾傍山處處舉火齊人謂有大軍以自固猶豫之間土功已畢齊師乃退隋書曰上嘗問髙熲取陳之策熲曰江北地寒田收差晩江南土熱水田早熟量彼收穫之際徵士馬聲言掩襲彼必屯兵禦守足得廢其農時彼既聚兵我便解甲再三若此賊以爲常後更集兵彼必不信猶豫之頃我乃濟師登陸而戰兵氣益倍又江南土薄舍多竹茅所有儲積皆非地窖宻遣行人因風縱火待彼修立復更燒之不出數年自可財力俱盡上行其策由是陳人益弊又曰樊子盖與宇文述陪宴積翠亭帝親以金杯屬子盖酒曰良算嘉謀侯公後動即以此杯賜公用爲永年之瑞并綺羅百疋唐書曰劉武周戰于度索原軍敗賊徒進逼河東江夏王道宗時年十七從太宗率衆拒之太宗登玊璧城望賊顧謂道宗曰賊恃衆來邀我戰汝謂如何對曰羣賊乘勝其鋒不可當易以計屈難與力競今深壁髙壘以挫其鋒烏合之徒莫能持久粮運既竭自當離散可不戰而擒太宗曰汝意闇與我合賊果食盡夜遁追及介州一戰㓕之又曰張守珪爲𤓰州刺史領餘衆修築州城版築裁立賊又暴至城下城中人相顧失色雖相率登陴略無守衛之意守珪曰彼衆我寡又瘡痍之後不可以矢石相持須以權道制之也乃於城上置酒作樂以㑹將士賊徒疑城中有備竟不敢攻城而退又曰裴行儉行至朔州知蕭嗣業以運粮被掠兵多餒死遂詐爲粮車三百乘每車伏壯士五人各賫陌刀勁弩以羸兵數百人援車兼伏精兵令居險以待之賊果大下羸兵棄車散走賊驅車就泉井解鞍牧馬方擬取粮車中壯士齊發伏兵亦至殺獲殆盡餘衆奔潰自是續遣粮車無敢近之者及軍至單于之北際晩下營壕塹方周遽令移就崇岡將士皆以士衆方就安堵不可勞擾行儉不從更促之比夜風雨暴至前設營所水深丈餘將吏莫不歎服又曰裴行儉前後殺虜不可勝數僞可汗泥熟匐爲其下所殺以其首來降又擒其大首領奉職而還餘黨走依狼山行儉既廻阿史􅊑佛念又僞稱可汗與温傳合勢鳩集餘衆明年行儉復總諸軍討之頓軍於代州之陘口縱反間說佛念與温傳令相猜貳佛念恐懼宻送降欵仍請自效行儉不泄其事而宻表以聞數日有烟漲天而至斥侯惶惑來白行儉召三軍謂曰此是佛念執温𫝊來降非他然受降如受敵但湏嚴備更遣單于使迎前勞之少間佛念果率其屬縛温傳軍門請罪盡平突厥餘黨高宗大悅遣户部尚書崔知悌赴軍勞之又曰裴行儉至西州人吏郊迎行儉召其豪傑子弟千餘人隨已而西乃揚言紿其下曰今正炎蒸熱坂難冐凉秋之後可方漸行都文偵知之遂不設備行儉乃召四鎮諸番部長豪傑謂曰憶昔北遊未嘗厭倦雖還京輦無時暫忘今因是行欲尋舊賞誰能從吾獵也是時畨部子弟投募者僅萬人行儉假為略獵教部伍日數遂倍道而進去都支部落十餘里先遣都支所親問其安否外示閒暇似非討襲續又使人趣召相見都支先與度匐通謀秋中擬拒漢使卒聞軍到計無所出自率兒姪首領等五百餘騎就營來謁遂擒之是日傳其契箭諸部之長悉來請命並執送碎葉城簡其精騎輕齎曉夜前進將虜遮匐途中果獲都支還使與遮匐使同來行儉釋遮匐行人令先往曉喻其主兼述都支已擒遮匐尋復來降令將吏已下立碑於碎葉城以記其功擒都支遮匐而還髙宗廷勞之曰比以西服未寧遣卿總兵討逐孤軍深入經途萬里卿權畧素聞誠節夙著兵不血刃而兇黨殄㓕伐叛柔服深副朕委尋又賜宴謂行儉曰卿文武兼資今故授卿二職即日拜禮部尚書兼檢校右衛大將軍蜀志龎統説先主曰荆州荒殘人物殫盡東有吳孫北有曹氏鼎足之勢難以得志益州國富民强户口百萬兵馬所出畢具寶貨無求於外今可權借以定大事先主曰今與吾為水火者曹操也操以急吾以寛必如是乃可成耳今以小國而失信義於天下吾所不足取也龎統曰權變之時固非一道所能定也兼弱攻昧五伯定事逆取順守報之以義事定後封以大國何負於信今曰不取終爲人制耳先主從之太平御覽卷四百四十九
