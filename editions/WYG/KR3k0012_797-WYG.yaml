front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_797-1a, image: WYG0900/WYG0900-0085c.png}
body:
  text: 太平御覽卷七百九十七宋李昉等撰四夷部十八西戎六蒲類小苑精絶渠勒依耐無雷難兠孤胡山國烏貪卑陸郁立師却國烏弋山離拘彌徳若髙附東離移支者舌㧞豆烏利者至㧞朱居權烏摩伽色尼薄知牟知阿弗太汗呼似宻諾色波羅卑伽至伽不單伽倍拆薛莫孫鉗敦弗敵沙臨兒貲虜盤越監長竒恒石尖扶伏可蘭鵠國無不逹無繼民録民無首民納民狗夷波羅㤗斯䑕王摩訶頼波麗越雞城和訶條播黎曰舎衛維耶離迦維羅越郍訶維碓國拘郍舎波羅奈拘宋婆􅄢宻拘私郍竭摩竭提蒲類漢書曰蒲類王治天山西䟽榆谷去長安八千三百六十里後漢書曰蒲類國王居天山西䟽榆谷廬帳而居逐水草能作弓矢國出名馬蒲本大國也前西城屬匈奴時蒲王得罪于單于怒徙蒲國人民六千餘口内之匈奴右部阿惡地號曰阿惡國初徙居時甚貧羸不能者逃亡在山谷間故後留爲蒲類國云小苑漢書曰小苑國王治扜零城去長安七千二百一十里東與婼羌接精絶漢書曰精絶國王治精絶城去長安八千八百二十里地阨狹西通扞彌四百六十里渠勒漢書曰渠勒國王治鞬都城去長安九千九百五十里東與戎盧接依耐漢書曰依耐國去長安萬一百五十里北至䟽勒六百五十里少榖寄田莎車䟽勒難兠漢書曰難兠國王治去長安一萬五千一百五十里西與大月氐接種五糓有金銀銅鐵作兵無雷漢書曰無雷國王治盧城去長安九千九百五十里衣服類烏孫孤胡漢書曰孤胡國王治車師柳谷去長安八千二百里山國漢書曰山國王去長安七千一百七十里出鐡民山居寄田糴榖扵焉耆烏貪漢書曰烏貪訾離國王治于婁谷去長安萬三百三十里卑陸漢書曰卑陸國王治天山乾當谷去長安八千六百八十里郁立師漢書曰郁立師國王治内咄谷去長安八千八百三十里却國漢書曰劫國王治天山東丹渠谷去長安八千五百七十里烏弋山離漢書曰烏弋山離國王治去長安萬二千二百里不屬都䕶烏弋地暑熱其草木畜産五榖果菜飲食宫室市列錢貨兵器金珠之屬與罽賔同有桃拔獅子犀牛俗種妄殺錢文爲人頭幕爲騎馬拘彌後漢書曰拘彌王治寧彌城去洛陽萬二千八百里靈帝熹平四年于闐王安國攻拘彌破之殺其王死者甚衆戊巳校尉西域長史各發兵輔立寜彌侍子定興爲王徳若後漢書曰徳若國王東去洛陽一萬二千一百五十里與子合相接其俗皆同髙附後漢書曰髙附國王在大月氐西南其俗似天竺而弱易服善賈販内富與財所屬無常天竺􅄢賔安息三國强則得之弱則失之東離後漢書曰東離國王治沙奇城在天竺東南三千餘里其地暑熱風俗物類扵天竺同有城數十其人民男女皆長大可八尺乘象往來隣國有冦乘象以戰移支後漢書曰移支國王居蒲類地其民勇猛敢戰以冦鈔為事皆被髮隨畜逐水草不田作者舌後魏書曰者舌國故康居國也在破洛郍西北去代一萬五千四百五十里大武太延三年遣使朝貢㧞豆後漢書曰㧞豆國去代二萬五百里國中出銀金雜貨白象水牛㹈牛蒲桃五果土宜五榖烏利後漢書曰烏利國去代五萬八千里國中出金玊良馬白疊土宜五榖者至㧞後魏書曰者至㧞國都城在踈勒西去代一萬一千六百二十里其國東有播賀山出美鐡獅子等朱居後魏書曰朱居國在于闐西其民山居有陵多林果咸事佛與于闐相類役屬嚈噠權烏摩後魏書曰權烏摩故烏秅國也其王治烏秅城西接悉居半國西南去代一萬二千九百七十里加色尼後魏書曰伽色尼國治伽色城在萬斤南去代一萬二千九百里出赤鹽多五果薄知後漢書曰薄知國治城在伽色尼南去代一萬三千二百二十里牟知後漢書曰牟知國都牟知城在忸宻西去代二萬二千九百二十里土平禽獸草木類中國阿弗太汗後漢書曰阿弗太汗國治阿弗太汗城在忸宻西去代二萬三千七百二十里土平多五榖呼似宻後漢書曰呼似宻國治呼似蜜城在阿弗太汗西去代二萬七百里出金銀琥珀有獅子多五果諾色波羅後魏書曰諾色波羅國治諾色波羅城在忸宻南去代二萬三千四百八十里土平宜稻麥五果早伽至後魏書曰早伽至國治早伽至城東接忸宻國去代二萬三千七百里土平少田殖取稻麥扵隣國有五果伽不單後魏書曰伽不單國治伽不單城在悉萬斤西北去代一萬二千七百八十里土宜稻麥有五果伽倍後魏書曰鉗伽倍國故休宻翕侯所治和墨城也在莎車西去代萬三千里民居山谷間折薛莫孫後魏書曰折薛莫孫國故雙靡翕侯所治雙城也在伽倍西去代一萬三千五百里居山谷間鉗敦後魏書曰鉗敦國古之貴霜翕侯所治䕶藻城也在折薛莫孫西去代一萬三千五百六十里居山谷之間弗敵沙後魏書曰弗敵沙國古肸頓翕侯所治薄茅城也在鉗敦西去代一萬三千六百里居山谷間臨兒魏略曰臨兒國浮屠經云其國王生浮屠太子也父曰屑頭耶母曰莫耶浮屠身服黄色髮青浮有青毛冬亦始莫耶夢白象而孕及生從母右脅出地能行七八歩漢哀帝元壽元年博王景庸從月氐王使伊存口授浮屠經其所載扵老子經相出入盖以老子西出關教胡爲浮屠也貲虜魏略曰貲虜本匈奴之奴也匈奴名奴婢為貲姑建武時匈奴衰分其奴婢亡匿在金城武威酒泉北卑水東畜牧逐水草抄盗凉州不與東部鮮卑同也其衆非一有大胡丁令羗雜處並本亡奴婢也盤越魏書曰盤越國一名漢越王在天竺東南數千里與益部相近其人小大與中國人同監長山海經曰西海中有監長國其人鳥首亦名鳥氏竒恒括地圖曰竒恒民善為機巧設百禽為飛車從風逺行湯時西風多竒恒車至扵豫州湯破其車十年西風到乃令復作車遣歸去玊門四萬里石尖𤣥中記曰土門之西南羗之東有一國五六百户無他事役國中有山山上有祠廟國人每嵗出石尖數千枚輸扵廟中名霹靂尖以給霹靂所用從春雷出而尖日減至秋尖盡扶伏𤣥中記曰扶伏民者黄帝軒轅之臣曰茄豐有罪刑而放之扶伏而去是後爲扶伏民去玊門關二萬五千里可蘭沙州記曰大白蘭西北千二百里有可蘭國風俗卑陋從開闢來口不知榖味目不識五色耳不聞六律五聲是西夷中不臧者土無所出直大養羣畜而已户落萬餘其人頑弱見異人舉國便走鵠國神異經曰四海之中有鵠國男女皆長七寸爲人自然有禮好談論跪拜其人嵗夀三百行如飛日行千里有百物不敢犯之惟畏海鵠鵠遇吞之亦夀三百嵗人在鵠腹中不死而鵠一舉千里無不逹神異經曰西南大荒中有人焉長一丈腹圍九尺龜蛇戴朱鳥左手慿青龍右手憑白虎知河海升斛識山石多少知鳥獸言語知百榖可食識草木甘苦名曰聖一名哲一名無不逹凡人見拜者令人神知無繼民外國圖曰無繼民宂居食土無夫婦死則埋之心不朽百年復生去玊門四萬六千里録民外國圖曰録民宂居食土無夫婦死則埋之其肺不朽百年復生去玊門萬一千里無首民外國圖曰無首民乃與帝争神帝斬其首𠡠之北野以乳爲目臍爲口去玊門三萬里納民外國圖曰納民陛居食土無夫婦死則埋之其肝不朽八年復生去玉門五萬里狗夷釋道安西域志曰狗夷國北去城數百里山上有石駞溺水滴下以金銅鐡及木器手掌丞之皆漏唯瓢瓠不漏服之令人身臭毛皮盡脱得止其國有婆羅門守視波羅㤗斯釋道安西域志曰波羅㤗斯國佛轉法輪調逹入地獄土䧟處皆在其國䑕王釋道安西域志曰于闐道中有䑕王國大者如狗小者如兎着金袈裟沙門過不禮白衣不禮輙害人摩訶頼釋道安西域志曰摩訶頼國又南有阿耨逹山王舎城在耨逹山東南角竹園精舎在城西佛寺竹甚多去城五十里波麗越釋道安西域志曰羅衛國東四百里至波麗越國波麗越國即佛外祖國也雞國釋道安西域志曰葫城北有雞城其人首冠象雞也和訶條支僧戴外國事曰和訶條國在大海中地方二萬里有十大山名三漫屈有石井井中生千葉白蓮花數朶井邊石上有四佛足跡每月六七日彌勒菩薩常以諸天神禮佛迹畢便飛去國王長者常作金樹銀花銀樹金花以供奉佛播黎曰支僧戴外國事曰播黎曰國者昔是小國耳今是外國之大都流沙之外悉稱臣妾舎衛支僧戴外國事曰舎衛國今無王盡屬播黎曰國王遣小兒住國人不奉佛法維耶離支僧戴外國事曰維耶離國去舎衛五十里國人不復奉佛迦維羅越支僧戴外國事曰迦維羅越國今無復王土也國人亦屬播黎曰國昔太子生時有二龍一吐水一吐火一冷一暖今有二池尚一冷一暖郍訶維支僧戴外國事曰郍訶維國土豐樂多民物在迦維越南相去三十里碓國支僧戴外國事曰迦葉佛生碓國今無復有此國故處在舎衛國西相去三十里拘郍舎支僧戴外國事曰拘郍舎國牟尼佛所生也亦名拘郍舎在迦維羅越西相去三十里波羅奈國支僧戴外國事曰彌勒佛當生波羅奈國是屈陁羅經所説在迦維越南拘宋婆支僧戴外國事曰拘宋婆國今見過去佛四所住處四屋迦葉佛住中教化四十年釋迦文佛住五年二佛不説􅄢宻支僧戴外國事曰􅄢宻小國耳在舎衛之西國王民人悉奉佛土地寒羅漢道人及沙門到冬月日未中前少飲酒過中後不復飲酒食果國屬大秦拘私郍竭支僧戴外國事曰佛在拘私郍竭國佛欲入湼槃時自然有寳床從地出有八萬四千國王争將佛歸神廟天人曰佛應就此亡郍竭王乃作金棺柵檀車送佛喪積薪不燒自然王將舎利婆羅門分之乃用金升量舎利得八斛諸國各得少許還國各立浮屠摩竭提支僧戴外國事曰摩竭提國在迦維羅城之南相去三十里由旬有貝多樹佛在此樹下坐六年太平御覽卷七百九十七
