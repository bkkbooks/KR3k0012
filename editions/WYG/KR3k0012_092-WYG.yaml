body:
  text: 太平御覧卷九十二宋李昉等撰皇王部十七後漢敬宗孝順皇帝孝冲皇帝孝質皇帝威宗孝桓皇帝孝靈皇帝廢帝𢎞農王孝獻皇帝敬宗孝順皇帝東觀漢記曰孝順皇帝諱保孝安長子也母早薨追謚恭愍皇后上㓜有簡厚之質體有敦慤之姓寛仁温惠始入小學誦孝經章句和熹皇后甚嘉之以為宜奉大綂年六嵗永寧元年為皇太子受業尚書兼資敏逹初乳母王男厨監邴吉為大長秋江亰中常侍樊豐等所譛愬殺之太子數為嘆息亰等懼有後害遂共構陷太子太子坐廢為濟隂王明年三月安帝崩北鄉侯即尊位王廢絀不得上殿臨棺而悲哀泣血不下飡粥北鄉侯薨車騎將軍閻顯等議前不用濟隂王今用怨人白閻太后復徵立諸王子閉宫門屯兵日守中黃門孫程等十九人共討賊臣江亰等以迎濟隂王於徳陽殿西鍾下即皇帝位漢安元年八月遣侍中杜喬光祿大夫周舉等八人分行州郡頒宣風化舉實臧否建康元年八月帝崩于玉堂前殿在位十九年時年三十遺詔無起寢廟衣以故服珠玉玩好皆不得下務為節約𦵏憲陵廟曰敬宗續漢書曰帝為太子四嵗嘗被疾阿母王聖第新治乳母王男厨監邴吉以為犯土忌不可御與江亰樊豐及聖二女永等相是非聖永誣譛男吉皆物故太子思戀男等數為之歎息聖永懼有後害遂與亰豐等共構䧟太子坐廢為王孝冲皇帝東觀漢記曰孝冲皇帝諱炳順帝之少子也年三嵗是時皇太子數不幸國副未定有司上言宜建聖嗣建康元年四月立為太子順帝崩太子即帝位尊皇后梁氏為皇太后帝㓜弱太后臨朝永熹元年正月帝崩于玉堂前殿在位一年𦵏懐陵帝王世紀曰孝冲皇帝即位一年年三嵗孝質皇帝東觀漢記曰孝質皇帝諱讃章帝𤣥孫千乗貞王伉之曾孫樂安王孫渤海王子也年八嵗茂質純淑好學尊師有聞於郡國孝冲帝崩徵封建平侯即皇帝位本初元年閏六月帝崩于玉堂前殿在位一年時方九嵗𦵏静陵漢晉春秋曰帝初年㓜小聞梁冀専權於天下毎朝出輙目之曰此䟦扈將軍冀聞而大懼遂隂行鴆毒始病呼太尉李固入固前問病帝曰食煑餅令腹中悶得水尚可活冀曰不可語未絶而崩威宗孝桓皇帝東觀漢記曰孝桓皇帝諱志章帝曽孫河間孝王孫蠡吾侯翼之長子也母曰􅂒音晏夫人年十四襲爵始入有殊於人梁太后欲以女弟妃之太初元年四月徵詣雒陽既至未及成禮㑹質帝崩無嗣太后宻使瞻察威儀才明任奉宗廟遂與兄冀定䇿於禁中迎帝即位時年十五改元建和元年大將軍梁冀輔政縱橫為亂帝與中常侍單超等五人共謀誅之於是封超等為五侯暴恣日甚毒流天下白馬令李雲坐直諌誅名臣少府李膺等並為閹人所譛誣為黨人下獄死在位二十一年崩薛瑩漢記賛曰漢德之衰有自來矣而桓帝繼之以滛暴封殖宦䜿羣妖滿側姦黨彌興賢良被辜政荒民散亡徵漸積逮至靈帝遂傾四海豈不痛哉後漢書賛曰桓自宗支越躋天禄政移五倖刑滛三獄傾宫雖積皇躬靡續孝靈皇帝續漢書曰孝靈帝諱宏章帝𤣥孫河間孝王曽孫解瀆亭侯淑之孫萇之子也母曰董姬萇薨上襲爵為侯永康元年十二月桓帝崩先是數有皇子屢殤不立太后與父竇武定䇿禁中建寧元年正月徵到止夏門亭以王青蓋車迎入于殿即皇帝位太后臨朝四年正月帝加元服光和元年初置鴻都門學生頗以經學相引後請能為尺牘辭賦及以玉書鳥篆者相課試至千人皆勅州郡三公舉用辟召或典州郡入為尚書侍中封侯賜爵四年於後宫與宫人為列肆販賣更相偷盗爭鬬上著商賈服以為樂又於西園弄狗著進賢冠帶綬中平元年初開西邸賣官自關内侯以下至虎賁羽林入錢各有差二年税天下田畆十錢以治宫殿發太原河東諸郡材木黄門常侍斷截州郡送材人召掌正史譴呼不中退賣之貴戚因縁賤買十倍于官其貴戚所入者然後得中宫室連年不成州郡因増加調發刺史二千石遷除皆責助治官錢大郡至二千萬諸詔所徵皆令西園特署約勅號曰中使恐動州郡多受財賂天下騷動起為盗賊矣是嵗又於西園造萬金堂以為私藏别司農金錢繒帛積之於中又還河間買田業起第觀上本侯家居貧即位常曰桓帝不能作家家曽無私錢故為私藏復寄小黄門常侍家錢至數千萬又云張常侍是我翁趙常侍是我母由是宦官専朝日盛奢僣無度各起第宅擬于宫殿上嘗登永安侯臺黄門常侍惡其登髙臺見居處樓殿乃使中大夫尚垣諌曰天子不當登髙登髙則百姓虛自後遂不復登臺榭矣四年又募買關内侯假金紫入錢五百萬六年四月帝崩於嘉徳殿在位二十二年時年三十四𦵏文陵續漢書五行志曰靈帝好胡服帳胡牀胡飯胡箜篌笛胡儛亰都貴戚皆競為之其後董卓多權胡兵擄掠夜發掘園陵帝又於宫中西園駕四白驢躬自操轡驅馳周旋以為大樂於是公卿貴賤轉相倣效至相謀奪驢價與馬齊獻帝春秋曰初黄巾賊起靈帝建九重華蓋自稱無上將軍身被介胄練兵京城先是造作角錢猶五銖而有四道連於邊輪百姓或有識者以為妖徵竊言新錢有四道京城將壊而此錢四出散於四方之外乎遂皆如言薛瑩漢紀賛曰漢氏中興至于延平而世業損矣冲質短祚孝桓無嗣母后稱制奸臣執政孝靈以支庶而登至尊由藩侯而紹皇統不恤宗緒不祗天命上虧三光之明下傷億兆之望于時爵服橫流官以賄成自公侯卿士降於皂𨽻遷官襲級無不以貨刑戮無辜推仆忠賢佞諛在側直言不聞是以賢智退而窮處忠良擯於下位遂至姦邪蜂起法防墮壊夷狄並侵盗賊糜沸小者吞城邑大者連州郡編戸騷動人人思亂當斯之時已無天子矣㑹靈帝即世則禍㝷其後宫室焚滅郊社無主危自上起覃及華夏使京室為墟海内蕭條豈不痛哉典略曰建寧二年帝時年十三嵗宦官用事排疾士人熹平四年五月帝自造皇義五十章光和五年帝幸太學自就碑作賦廢帝𢎞農王獻帝春秋曰孝靈皇帝何皇后生太子辯帝數失子不敢正名養于道人史子𦕈家號曰史侯後漢書曰中平六年四月丙辰靈帝崩於南宫嘉徳殿戊午皇子辯即皇帝位年十七太后臨朝八月中常侍叚珪等殺大將軍何進於是虎賁中郎將袁術燒東西宫攻諸宦者庚午張讓叚珪等刼少帝及陳留王幸北宫司𨽻校尉袁紹勒兵收偽司𨽻校尉樊陵及諸閹人無少長皆斬之讓珪等復刼少帝陳留王走小平津尚書盧植追讓珪等斬之其餘投河而死帝與陳留王恊夜歩逐螢光行數里得民家露車共乗之辛未還宫大赦九月董卓廢帝為𢎞農王英雄記曰董卓欲廢帝謂袁紹曰劉氏之種不足復遺袁紹曰漢家君天下四百許年恩澤深渥兆民戴之恐衆不從公議卓曰天下之事豈不在我我令為之誰敢不從紹曰天下健者不唯董公紹請立觀之橫刀長揖而去坐中皆驚愕時卓新至見紹大家故不敢害之卓於是遂䇿廢皇太后遷之永安宫其夜崩廢皇帝史侯為𢎞農王立陳留王為皇帝卓聞東方州郡謀欲舉兵恐其以𢎞農王為主乃置王閤上圍之以棘召太醫傳責問之曰𢎞農王病因何故不白遂遣兵迫守太醫致藥即日𢎞農王及妃唐氏皆薨袁山松後漢書曰董卓使𢎞農郎中令李儒進鴆於𢎞農王曰服此辟惡王曰此必是毒也弗肯强之於是王與唐姬及宫人共飲酒王自歌曰天道易兮我何艱棄萬乗兮退守藩逆臣見迫兮命不延逰將棄爾兮適幽𤣥唐姬起舞歌曰皇天崩兮后土頽身為帝王兮命夭推死生路畢兮從此乖悼我㷀獨兮中心哀因泣下坐者歔欷不自勝王謂唐姬曰卿故王者妃勢不復為吏民妻也行矣自愛從此長辭遂鴆死孝獻皇帝續漢書曰孝獻皇帝諱協靈帝少子也母曰王美人何皇后妬而害之靈帝母求樂太后董氏收養焉故號董侯中平六年四月靈帝崩太子辯即尊位年㓜皇太后詔封上為渤海王七月徙封陳留王九月董卓廢天子立陳留王是日即皇帝位年九嵗董卓秉政初平元年正月逼帝自雒陽遷都長安興平元年正月帝加元服二年十月上自長安東遷建安元年七月至雒陽八月上自雒陽遷都於許二十五年十月上禪位於魏魏王即帝位封上為山陽公青龍二年三月薨以天子禮𦵏禪陵獻帝春秋曰袁紹將兵入宫誅諸黃門張讓等逼迫以尺一詔開大夏門將帝及陳㽞王出不知所如時昏夜螢火照道到盟津河上傳國六璽不及自隨百僚分散唯河南中部掾閔貢見天子出率騎追之比曉到河上天子飢渴貢宰羊進之厲聲謂讓曰今不速死吾射殺汝讓等惶怖义手再拜叩頭向天子曰臣等死陛下自愛遂投河而死貢扶輦還宫時董卓適至屯顯陽苑聞帝當至率兵迎帝於北邙帝見卓兵振不自勝羣公曰有詔却兵卓曰卿為大臣不能匡輔國朝至令㓜主蒙塵播越何却兵之有遂俱入城帝幸北宫改元號曰昭寧於閣上得傳國璽又曰興平元年蝗蟲起民飢帝盡賣廐馬二百餘疋及御府雜繒二萬疋賜公卿已下及貧民車騎將軍李傕不聽盡收以置其邸李傕郭汜有隙傕使兄子副車中郎將李進勒兵數千統宫使虎賁王曹等三百人以軺車三乗載帝及伏后幸傕營又迎宫人公卿家屬入塢移御府諸置繒綵珍寳上方在廐車馬乗輿噐物盡置其邸放兵燒居府及居民被害者不可勝數五月或欲轉乗輿幸黃白城帝不肯司徒趙温以帝當東歸而傕等方亂以忠節責傕傕怒欲斬温傕從弟上軍校尉維故温掾請諌乃止於是閔温與帝同門設反關校尉以監察之十一月車駕東幸到黃卷亭庚午乗輿到𢎞農張濟欲與董承楊奉交質而留乗輿承奉不肯奉帝東行到澗中濟郭汜放兵欲留車駕承奉力戰乗輿得過公卿婦女衣服悉見鈔奪不解帶便斫刺寒凍死者不可勝計天子得過路次曹陽乗輿到安邑十二月使侍中史跱直里切大僕韓融奉詔詔張濟悉遣宫人公卿已下婦女及乗輿服物車馬諸見略者皆令諸安邑元年七月乗輿到洛幸城西故中常侍趙忠舎宫室燒盡百官被荆棘依墻壁墟間侍郎以下皆出𦵏采四方州郡各擁强兵莫有至者曹操白帝遷都許庚申車駕出洛轘轅而東楊奉韓暹引軍追之輕騎既至曹操設伏兵要於陽城山夾中大敗之九月車駕到許幸曹操營設有司營宗廟社稷自帝西遷朝廷傾覆至是宗廟社禝制度始立漢晉陽秋曰獻帝都許守位而已宿衛近侍莫非曹氏黨舊恩戚議郎趙彦嘗為帝陳言時䇿曹操惡而殺之其餘内外多見誅操後以事入見殿中帝不任其忿因曰君能相輔則厚不爾幸垂恩相捨操失色俯仰求出舊儀三公輔兵入廟令虎賁執刃挾之操顧左右汗流洽背自後不敢復朝請袁山松後漢書曰獻帝﨑嶇危亂之間飄薄萬里之衢萍流蓬轉嶮岨備經自古帝王未之有也觀其天性慈愛弱而仁惠若輔之以徳真守文令主也曹氏始於勤王終至滔天遂力制羣雄負鼎而趨然因其利噐假而不反廽山倒海遂移天日昔田常假湯武而殺君操因堯舜而竊國所乗不同濟其盗賊之身一也善乎莊生之言竊鈎者誅竊國者為諸侯諸侯之門仁義存焉信矣范曄後漢書論曰傳稱鼎之為噐雖小而重故神之所寳不可奪移至令負而趨者斯亦窮運之歸乎天厭漢徳久矣山陽其何誅焉太平御覽卷九十二
