body:
  text: 太平御覽卷七百五十一宋李昉等撰工藝部八畫下厯代名畫記曰夫畫者敷敎化助人倫窮神變測幽㣲與六籍同功四時並運發於天然非由述作古先聖王受命應籙則有龜字効靈龍圖呈寳自巢燧已來皆有此瑞迹暎乎瑤牒事傳乎金冊庖犧氏發於滎河中典籍圖畫萌矣黄帝氏得於溫洛中史皇蒼頡狀焉又曰夫畫比之書價則顧陸可同鍾張僧繇可同逸少書則逡巡可成畫非嵗月可就所以書多於畫自古而然今分為三古以定貴賤以漢魏三國為上古則趙岐劉裒蔡邕張衡曹髦楊脩桓範徐邈曹不興諸葛亮之流是也以晉宋為中古則明帝荀朂衛協王廙顧愷之謝稚嵇康戴逵陸探㣲顧寳先袁倩顧景秀之流是也以齊梁北齊後魏陳後周為下古則姚曇謝赫劉瑱七惠遠元帝袁昂張僧繇江僧寳楊子華田僧亮劉殺鬼曹仲達蔣少逰楊乞德顧野王馮提伽之流是也隋及唐為近代之價則董伯仁展子䖍孫尚子鄭法士楊契丹陳善見張孝師范長壽尉遲乙僧王知愼閻立本之流是也又曰若言有書籍豈可無九經三史顧陸張吳為正經楊鄭董展為三史其餘畫迹為百家又曰昔謝赫云畫有六法一曰氣韻生動二曰骨法用筆三曰應物象形四曰隨類賦綵五曰經營位置六曰傳模移寫自古畫人罕能兼知試論曰古之畫者或有遺其形似而尚其骨氣以形似之外求其畫此難可與俗人道也今人畫縱得形似而氣韻不生動以氣韻求其畫則形似自在其間以上古之畫迹敷意淡而雅正顧陸之流是也中古之畫細宻精緻而臻麗展鄭之流是也夫像物必在於形似須全其體氣骨形似皆本於意而歸乎用筆故工畫者多工書然則古之嬪擘纎而胷束古之馬喙尖而腹細古之臺閣竦峙古之服餙容曳故古畫非獨變態有竒異也抑亦物象殊也又曰徧觀畫唯顧生畫古賢得其妙理對之令人終日不倦凝神遐想妙悟自然物我兩忘離形去智身固可使如槁木心固可使如死灰不亦臻於妙理乎所謂畫之道也又曰漢張衡字平子昔建州浦城縣山有獸名駭神豕身人首狀貌惡百鬼畏之好出水邉石上平子往寫之獸入潭中不出或云此獸畏畫故不出可去紙筆即去之獸果出平子拱手不動潛以足指畫獸今號畫獸潭又曰昔張芝學崔瑗杜度草書之法因而變之以成今草字之體勢一筆成氣脉通連隔行不斷唯王子敬明其深㫖故後首之字往往繼其前行世謂之一筆書其後陸探㣲亦作一筆畫綿連不斷故知書畫用筆同法陸探㣲精利潤媚新竒絶妙名髙宋代時無等倫又曰魏曹植言觀畫者見三皇五帝莫不仰戴見三季暴主莫不悲惋見簒臣賊嗣莫不切齒見髙節妙士莫不忘食見忠節死難莫不抗首見忠臣孝子莫不歎息見淫夫妬婦莫不側目見令妃順后莫不嘉貴是知存乎鑒者畫也又曰蜀諸葛亮字孔明華陽國志云南夷其俗徵巫鬼好盟詛要質諸葛亮乃為夷作圖先畫天地日月君城府次畫神龍及牛馬駞羊後畫部主吏乗馬幡蓋遠行安䘏又畫夷牽牛負酒賫金寳詣之以賜夷夷甚重之又曰曹不興吳興人也孫權使畫屏風誤落筆㸃素因就成蠅狀權疑其真以手彈之時稱吳八絶張敎吳錄云八絶者孤城鄭嫗善相劉惇善星象吳範善候風氣趙達善筭嚴武善碁宋壽善占夢皇象善書曹不興善畫赤烏中不興之青溪見赤龍出水上寫獻孫皓送秘府至宋朝陸探㣲見畫歎其妙因至清溪復見其龍迨時累月亢旱祈禱無應乃取不興龍置水上應時蓄水成霧累月霶霈謝赫云不興之迹代不復見秘閣内一龍頭而已觀其風骨擅名不虛在第一品矣又曰晉顧愷之字長康嘗於瓦官寺北殿畫維摩詰畫訖光輝月餘日京師寺記云興寧中瓦官寺初置僧衆設㑹請朝賢鳴刹注錢其時士大夫莫有過十萬者長康既至直打刹注百萬長康素貧衆以為大言後寺衆請勾䟽長康曰宜備一壁遂閉户往來一月餘日所畫維摩詰一軀工畢將欲㸃眸子乃謂寺僧曰第一日見請施十萬第二日可五萬第三日可任例責施及開户光照一寺施者填咽俄而得百萬錢愷之嘗云畫人物最難次山水次狗馬臺閣一定器耳差為易也斯言得之至於鬼神人物有生動之狀須神韻而後形像若氣韻不周空陳形像非妙也又曰宋朝顧駿之常結構髙樓以為畫所每登樓去梯家人罕見若時景融朗然後含毫天地隂􅃤則不操筆今之畫人筆墨混於塵埃丹青和其泥滓徒汚綃素豈曰繪畫自古善畫者匪衣冠貴胄即逸士髙人振妙一時傳芳千祀非閭閻鄙賤所能為也又曰南齊宗測字敬微炳之孫也善畫傳其祖業時欲遊名山乃寫祖炳所畫尚子平圖於壁隱廬山居炳舊宅畫阮籍遇孫登於行障上坐卧對之又畫永業寺佛景臺皆稱妙絶又曰南齊謝赫姚最云㸃刷精硏人物不俟對看所須一覽便歸操筆目想毫髮皆無遺失麗服靚粧隨時變改直眉曲鬢與世爭新别體細㣲多從赫始遂使委巷逐末皆類效嚬至於氣韻精靈未窮生動之致筆路纎弱不副雅致之懐然中興已後畫人為最在沈標下毛惠遠上又曰南齊劉瑱字士温彭城人少聰慧多才藝工書畫畫嬪嬙當代第一謝云用意綿宻畫體簡細筆力困弱制置單省婦人最佳但纎削過差翻為失真然玩之詳熟甚有姿態又曰南齊毛惠遠滎陽陽武人也善畫馬時劉瑱善畫婦人並當代第一市青碧一千二百斤供御畫用錢六十五萬有言惠遠納利者勅尚書評價二十八萬殺之家徒壁立上悔痛之惠遠弟惠秀永明中待詔秘閤世祖將北伐命惠秀畫漢武北征圖中書郎王融監掌其圖成帝極重之置瑯琊臺上每披覽焉又曰北齊楊子華世祖時任直閤將軍嘗畫馬於壁夜聽蹄齧長鳴如索水草圖龍於素舒卷輙雲氣縈集也世祖重之使居禁中天下號為畫聖非有詔不得與人畫時王子冲善碁通神號為二絶又曰北齊劉殺鬼與楊子華同時世祖俱重之畫鬭雞於壁間帝見之為生拂之方覺嘗在禁中錫賚鉅萬任梁州刺史又曰梁元帝名繹字世誠善畫曾畫聖僧武帝親為贊之任荆州刺史日畫蕃客入朝圖帝極稱善又畫職貢圖并序外國來獻之事長子方智字實相尤能寫真坐上賓客隨容㸃染即成數人問童兒皆識之又曰梁蕭賁字文奐蘭陵人也多詞學工書畫曾於扇上畫山水咫尺之内見萬里可知姚最云雅性精宻後來難比含毫命素動必依真學不為人自娯而已人間罕見其匹又曰陶𢎞景字通明丹陽秣陵人幼有異操年十歲讀書見葛洪神仙傳便有隱逸之志居茅山號華陽隱君好著述明衆藝武帝嘗欲徵用隱君畫二牛以金籠頭牽之一則麗迤就水草武帝知其意不以官爵逼之又曰梁武帝時張僧繇呉人也天監中為武陵王國侍郎直秘書閤知畫事武帝崇餙佛寺多僧繇畫之時諸王在外武帝思之遣僧繇乗傳寫貌對之如面江陵天皇寺明帝置也内有栢堂僧繇畫廬舎那佛及仲尼十哲帝怪問釋内如何畫孔聖僧繇曰後當頼此耳及後代滅佛法焚天下寺塔獨以殿有宣尼像乃不令毁拆又金陵安樂寺畫四龍不㸃眼睛即恐飛去人以為妄誕固請㸃之遂㸃二龍須臾雷電破壁兩龍騰乗雲上天二龍未㸃眼睛者見在又畫天竺二胡僧侯景亂散折焉一僧為唐右常侍陸堅所寳堅疾篤夢一胡僧告云我有同友離柝多時今在洛陽李家若求合得之當以法力助君陸以錢帛果於其處購得之其疾乃愈劉長卿為記述其事張畫有所靈感不可悉記又曰北齊髙孝珩世宗第二子也封廣寧郡王尚書令大司徒博渉多才藝曾於㕔壁上畫蒼鷹觀者疑其真鳩雀不敢近又畫朝士圖當時絶妙又曰隋楊契丹官至上儀同僧悰云六法備詠甚有骨氣山東體制允屬伊人在閻立本下契丹之徒非不雄富比董展則乏精㣲李云田楊聲侔董展昔田楊與鄭法士同於京師光明寺畫小塔鄭圖東北壁田圖西壁南壁楊畫外邉四面是稱三絶鄭以簟蔽楊託以婚姻有對門之好又求楊畫本楊引鄭至朝堂指宫闕衣冠車馬曰此是吾畫本也由是鄭深歎服又曰唐張孝師為驃騎尉尤善畫地獄氣候幽黯孝師曽死復蘇具見㝠中事備得之吳道𤣥見其畫因號為地獄變又曰唐王陁子善山水幽致峰巒極佳世人言山水者稱陁子頭道子脚又曰唐呉道子陽翟人也好酒使氣每欲揮毫必須酣飲學書於張長史旭賀監事知章學書不成因攻畫曾事逍遙公韋嗣立為小吏因寫蜀道山水之體自為一家其書迹似薛少保亦甚便利初任兖州瑕丘縣尉𤣥宗召入禁中改名道𤣥因受内敎博士非有召不得畫張懐瓘每云呉生之畫下筆有神是張僧繇後身也可謂知言開元中將軍裴旻善舞劒道𤣥觀旻舞畢揮毫益進時又有公孫大娘亦善舞西河劒氣渾脫張旭見之因為草書杜甫歌行述其事是知書畫之藝皆須意氣而成亦非懦夫所能作也又曰唐盧稜伽呉生弟子也畫迹似呉生但才力有限頗能細畫咫尺間山水寥廓物象精備經變佛像是其所長呉生常於京師畫揔持寺三門大獲泉貨稜伽乃窮畫莊嚴寺三門銳思開張頗臻其妙一日呉生忽見之驚歎曰此子筆力當時不及我今乃􅁼我精爽盡矣居一月稜伽果卒又曰唐馮紹政尤善畫鷹鶻鷄雉盡其形態觜眼角爪毛彩俱妙曾於禁中畫五龍亦稱其善有降雲雨之感又曰唐李思訓宗室也即林甫之伯父早以藝稱於當代一家五人並善丹青髙宗甚重之畫稱一時之妙其畫山水樹石筆格遒勁湍瀬潺迴雲霞縹緲時覩神仙之事窅然嶺壑之幽時人謂之大李將軍也又曰唐韓幹尤工畫鞍馬有人詣門稱鬼使請馬一疋韓君畫馬焚之他日鬼使乘馬來謝其感神若此弟子孔榮為之上足又曰唐張璪字文通尤工樹石山水初畢宏擅名矜伐一見驚歎異之璪用秃筆或以手摸絹素因問璪所授璪曰外師造化中得心源畢宏於是閣筆又曰唐李漸善畫蕃馬騎射鵰放牧川原之妙筆迹氣調今古無儔李仲和能繼其藝而筆力不及又曰天后朝張易之奏召天下畫工修内庫圖畫因使土人各推所長銳意模寫仍舊装背一毫不差其真者多歸易之又曰唐朝呉道𤣥古今獨歩前不見顧陸後無來者授筆法於張旭此乃知畫書用筆同矣張既號書顛呉宜為畫聖神假天造英靈不窮唐畫斷曰唐呉道𤣥窮丹青之妙大約宗師張僧繇𤣥宗天寳中忽思蜀中嘉陵江水遂假呉生驛逓令往圖之及廻帝問其狀奏曰臣無粉本並記在身心上遣于大同殿圖嘉陵江三百里山水一日而畢時有李將軍山水擅名亦畫大同殿數月方畢𤣥宗云李思訓數月之功呉道𤣥一日之迹皆極其妙又畫殿内五龍鱗甲飛動每欲大雨即生煙霧呉生常持金剛經自當天寳中有楊庭光與之齊名潛畫呉生真雜講席衆人之中呉生觀之一見便驚語庭光云老夫貌醜何用圖之又曰唐周昉字景𤣥郭子儀婿趙維常令韓幹寫真衆皆稱善後又請昉寫真二人皆有名公常列二畫於座未能定其優劣因趙夫人歸省公公子儀也問云此畫何人對曰趙郎曰何者似曰兩畫揔似後善又問何以言之曰前畫空得趙狀貌後兼得其神氣情性笑言之姿公問後作者何人曰周昉是日定其二畫優劣令送錦綵數百疋又曰唐閻立本太宗時南有山猛獸害人太宗使驍勇者捕之不得虢王元鳳忠義奮發自往取之一箭而斃太宗壯之使立本圖其鞍馬僕從皆寫其真無不驚伏其能太宗幸𤣥都池鬭鸂䳵召立本貌十八學士凌煙閣功臣等實亦輝暎古今又曰唐韋無忝京兆人也𤣥宗朝以畫名馬異獸擅名時稱韋四足無不妙也曾見畫外國所獻獅子酷似其真後獅子放歸本國唯畫者在圖時因觀覽百獸見之皆懼又𤣥宗射獵一箭中兩野猪詔於𤣥武北門傳寫貌在人間乃妙之極也又曰唐楊炎畫松石山水出於人表初稱處士謁盧黄門舘之甚厚知其丹青之妙意欲求之而未敢言楊遽辭去復苦畱之知其家在洛中潛令供其衣食取家書示楊楊感之未知所報盧因從容乃言欲求一蹤以為子孫家寶意尚難之遂月餘圖一幛松石雲物移動造化人莫能覩之也又曰唐陳閎會稽人也以能畫真本道薦之開元中召入供奉每令寫真御容冠絶當代𤣥宗射猪鹿兎鷹等并按舞圖真容皆承詔寫貌又太清宫肅宗真容匪唯龍顔鳯姿日角月輪之狀而筆力遒潤神彩英竒實天假其能也閻令公之後一人而已又曰唐張萱京兆人嘗畫貴公子鞍馬屏幄宫苑士女等名冠於時善起草㸃簇置亭臺竹樹花鳥僕𨽻皆極精姸又曰唐王墨不知何許人也名冷善潑墨時人謂之王墨多游江湖善畫山水栢松雜樹等性疎野好酒每圖障興酣之後以墨潑之脚拖手抹或枝或幹隨其形象為山為竹為樹應心隨意倐若造化圖成雲霞澹澹風雨蕭蕭不見墨汚之跡也又曰唐李靈省落魄不拘檢每圖一障非其所欲不可强也以酒生思傲然自得不知王公之尊寒暑之夕若山水竹樹一㸃一抹成於自然或即峰際孤雲或即島嶼極海非常制也又曰唐張志和字子同號煙波子常釣魚洞庭初顔魯公在呉興知其髙節以漁歌五首贈之乃圖為卷軸隨句賦象人魚鳥獸風雨雲月依字成形各臻其妙太平御覽卷七百五十一
