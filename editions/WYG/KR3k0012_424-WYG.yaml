body:
  text: 太平御覽卷四百二十四宋李昉等撰人事部六十五讓下東觀漢記曰承宫遭王莽簒天下擾攘盜賊並起宫遂避世漢中建武四年將妻子之華隂山谷耕種禾黍臨熟人就認之宫悉推與而去由是顯名又曰光武封朱祜為鬲侯祜自陳功薄而國大願受南陽五百戸足矣上不許又曰竇融光武時數辭讓爵位不許因上疏曰臣融年五十三有一子年十五質性頑鈍臣融朝夕教導以經藝不得令觀天文見䜟記誠欲令恭肅畏事恂恂循道不願其有才能何况乃當傳以連城廣土享故諸侯王國哉又曰鄧隲永初元年封隲等以定策增三千户讓不獲遂逃避使者上疏自陳又曰歐陽尚書博士缺上欲用桓榮叩頭讓曰臣經術淺薄不如同門生郎中彭閎揚州從事睾𢎞帝曰俞徃女諧因拜榮為博士引閎為議郎車駕幸太學㑹諸博士論難於前榮被儒衣温恭有藴藉辯明經義每以禮讓相厭不以辭長勝人儒者莫之及特為加賞賜又詔諸生雅吹撃磬盡日乃罷榮卒子郁當襲爵上書讓於兄子汎顯宗不許不得已受封而悉以租入與之帝以郁先師子有禮讓甚見親厚又曰上欲封樊興置印綬於前興固讓曰臣未有先登陷陣之功而一家數人並䝉爵土令天下觖望誠不願帝嘉興之讓不奪其志又曰劉愷字伯豫以當襲父般爵讓與弟憲逃避封有司奏請絶國上美其義特優加之愷猶不出有司復奏之侍中賈逵上書曰孔子稱能以禮讓為國於從政乎何有和帝納之詔下曰故居巢侯劉般嗣子愷當襲父般爵而稱父遺意致國弟憲遁亡七年所守彌固盖王法崇善成人之美其聴憲嗣爵乃徵愷拜為郎稍遷侍中愷之入朝在位者莫不仰其風行又曰淳于恭以謙儉推讓為節家有山田橡樹人有盜取者恭助為收採載之歸乃知為恭橡盜者還橡恭不受人又有盜刈恭禾者恭見之念其愧因伏草中盜去乃起續漢書曰張堪讓先人餘財數百萬與兄子謝承後漢書曰雷義舉茂才讓于陳重刺史不聴義遂佯狂不應命鄉里為之語曰膠漆自謂堅不如雷與陳又曰陳囂與鄉人紀伯為隣伯夜竊囂藩地自益囂見之伺伯去蜜移其藩一丈地以益伯伯慚懼還所侵又卻一丈二尺相避凡廣三丈太守髙其義名其閭為義里范曄後漢書曰馮緄字鴻卿巴郡宕渠人也長沙蠻寇益陽荆南皆沒于是拜緄為車騎將軍軍至長沙進擊武陵蠻夷荆州平定詔賜錢一億固讓不受振旅還京師推功於從事中郎魏志曰田疇字子泰右北平人太祖北征烏丸軍次無終夏水路不通疇將其衆為鄉導出盧龍塞乃驚太祖與戰遂大斬獲軍還論功封疇為亭侯疇上䟽陳誠以死自誓太祖不聴欲引拜之至于數四疇終不受又曰太祖署邴原為丞相徵事崔琰為東曹掾記讓曰徵事邴原議郎張範皆秉德純壹志行忠敏清静足以厲時貞固足以幹事所謂龍翰鳳翼國之重寳舉而用之不仁者逺又曰王基字伯輿東萊人基拔壽春轉基為征東將軍封東武侯基上疏固讓歸功叅佐由是長史司馬等七人皆封侯呉志曰魯肅卒孫權以嚴畯代前後固辭曰僕素書生不嫻軍事非才而據殃咎必至發言慷慨至于流涕權乃聴焉嘉其能以實讓又曰薛綜為選曹尚書固讓顧譚曰心精體密貫道達㣲才照人物德服衆望誠非愚臣所可越先王隱晉書曰司徒魏舒遜位司空衛瓘與書曰每與足下共論此事日日未果可謂瞻之在前忽然在後于時皆有欲遜者或先顯此意不能行或以歸家申喻復還唯舒知命内定於懷未嘗形之於言論者以為晉興以來能辭榮祿終未有如舒者焉又曰杜夷字行齊廬江人王敦為刺史舉方正顧榮等各薦夷於相府元常曾欲省夷夷深讓帝答曰吾與足下雖情在忘言然虛遲厯載正以足下羸病故欲相省寧論常儀以為國子祭酒夷前後十餘表求解不聴明帝踐祚夷又頻表讓位又曰上以羊祜為開府儀同讓表曰今光祿大夫李憙秉節髙亮在公正色光祿魯芝潔身寡欲和而不同光祿大夫李𦙍清亮簡素立身在朝皆服事華髮以禮終始雖厯外内之寵不異寒賤之家而猶未䝉此選臣更越之何以塞天下之望又封南城郡侯祜曰昔張良請受留侯漢髙不奪其志請受鉅平薨遺令不得以南城侯入柩詔曰祜固讓厯年志不可奪身沒讓存遺操益厲此夷叔所以稱賢季札所以全節今聴復本封以彰髙美干寳晉紀曰鍾㑹鄧艾將伐蜀與劉實别客謂實曰二將能破蜀不實曰必破蜀但皆不還客問其故實曰治道在於克讓因著崇讓論曰季世不能讓賢虛謝見用之恩莫肯讓于勝已晉中興書曰郗愔拜給事黄門侍郎愔苦求外出時呉郡守闋朝議欲用愔愔以資望少輕而少年不宜超莅大郡辭讓切至朝廷嘉之轉為臨海太守在郡優游養志不以事物縈心崔鴻前趙錄曰張寔為鉅鹿太守治任威强路不拾遺曾欲以寔為司徒太保皆垂涕固辭身騎瘠馬妻乘敗車後魏書曰髙肇字首文文昭皇太后之兄也肇子植自中書侍郎出為濟州刺史元愉之反也植率州軍出討破愉别將有功當䝉封賞朝廷論勲每謙讓不受云其家荷重恩為國致効是其常節何足以應進陟之報懇惻發于至誠又曰崔光韶為司空行叅軍復請讓從叔和曰臣誠㣲賤未登讓品屬逢唐朝恥無讓德和亦謙退辭而不當髙祖善之遂以和為廣陵王國常侍後周書曰蘇祜字承先陳留人也有膂力便騎射從征伐常潰圍陷陣還之日諸將争功祜終無競太祖歎之常謂諸將曰承先口不言勲孤當代言其見知如此沈約齊記曰朝係伯襄陽人也事母甚謹西土風俗田與隣畔者輒於畔上種桑以誌之係伯上種桑枝條䕃蔽他地每開數尺以避焉隣者隨復侵之係伯輒伐樹更種侵畔者慚不敢犯也齊書曰謝脁遷尚書吏部郎上表三讓中書疑脁官未及讓以問國子祭酒沈約約曰宋元嘉中范曄讓吏部朱修之讓黃門蔡興宗讓中書並三表詔答具事宛然近代小官不讓遂成恒俗恐此有乖讓意王藍田劉安西並貴重初不自讓今豈可慕此不讓耶孫興公孔顗並讓記室今豈可三署皆讓耶謝吏部今授超階讓别有意豈關官之大小撝謙之美本出人情若大官必讓便與詣闕章表不異例既如此謂都非疑脁又啟讓上優答不許唐書曰温彦博與兄大雅共掌機密彦博以昆季同在機務意不自安固請他職髙祖曰我虛心相待不以為疑卿何自疑也彦博雖應命然每退讓逺避機權寮列以此多之又曰長孫無忌册拜司空無忌固辭讓不許又曰臣幸居外戚恐招聖主私親之誚敢以死請太宗曰無忌聰明鑒悟且有武畧公等並知所以委之台鼎無忌又上表切讓帝使謂之曰昔黃帝得力牧而為五帝先夏禹得咎繇而為三王祖齊桓得管仲而為五伯長朕自在藩邸即任使公遂得廓清宇内君臨天下以公功績才望允稱具瞻故授此官無宜辭讓為禮也又曰盧懷慎開元三年遷黃門監懷慎與紫㣲令姚崇對掌樞密懷慎自以為吏道不及崇每事皆推讓之周書曰湯放桀而歸于亳三年諸侯大㑹湯取天子之璽置之天子之坐再辭從諸侯之位湯曰此天子之位有道者可以處之三讓于諸侯諸侯莫敢即位然後湯即天子之位慎子曰堯讓許由舜讓善卷皆辭為天子而退為匹夫列子曰昔堯舜偽以天下讓許由善卷而不失天下伯夷叔齊實以孤竹讓而終亡其國晏子春秋曰晏子方食景公使至分食食之使者不飽嬰亦不飽公致千金以奉賔客晏子不受公曰先君桓公以書社三百封管仲管仲不辭子獨辭何也晏子曰嬰聞聖人千慮必有一失愚人千慮必有一得以仲失之嬰得之又曰景公使晏子為阿宰三年而譽聞于國景公悅召而賞之辭而不受公問其故對曰昔嬰之治阿三邪毁于外三讒毁于内今則三邪譽于外三讒譽于内昔者因之當誅者當賞而今以當賞者當誅是故不敢受景公知晏子賢乃任三年而齊大興莊子曰堯以天下讓許由由曰日月出矣而爝火不息其于光也不亦難乎時雨降矣而猶浸灌其于澤也不亦勞乎又讓于子州支父子州支父曰我適有幽憂之疾方且治之未暇治天下也又曰舜以天下讓于善卷善卷曰余逍遥于天地之間而心意自得吾何天下為哉遂不受又曰舜以天下讓其友北人無擇北人無擇曰異哉后之為人居甽畝之中而遊于堯之門不若是而已又欲以其辱行汗漫我吾羞見之自殺於清泠之淵又曰湯將伐桀因卞隨而謀卞隨曰非吾事也湯又因務光而謀務光曰非吾事也湯曰伊尹何如曰强力忍詬吾不知其他湯遂與伊尹謀伐桀尅之以讓卞隨卞隨曰君之伐桀謀于我必以我為賊也勝桀而讓乎我必以我為貪也吾生乎亂世而無道之人再來漫我吾不忍數聞也乃自投於桐水而死桐水今在穎川又讓務光曰智者謀之武者遂之仁者居之古之道也吾子胡不立乎務光辭曰廢上非義殺人非仁子犯其難我享其利非廉也吾聞之曰非其義不受其祿無道之世不踐其土況尊我乎吾不忍見也乃負石自投於盧水盧水在遼東也吕氏春秋曰沈尹筮遊於郢五年荆王欲以為令尹辭期思之鄙人有孫叔敖彼聖人也王于是使人以王輿迎叔敖以為令尹而國治韓子曰舜耕於厯山農者讓畔漁於河濵漁者讓長符子曰禹讓天下於竒子竒子曰君之佐舜勞矣鑿山川通河漢首無髮股無毛故舜也以勞報子我生而逸不能為君之勞矣又曰武王以天下讓􅄮封子岐封子曰孰匆匆然以天下為事乎君徃矣余不忍聞之又曰泰伯將讓其國於季厯謂其𫝊曰大王欲以一國之事而以嗣我我其羞之吾聞至人也不君一世而萬世以之君不貴一代而萬代以之貴吾焉能貴乎一國而賤乎萬代哉山海經曰君子國民衣冠帶劒土方千里多薰華之草好讓故為君子國許遜别傳曰遜年七歲無父躬耕負薪以養母盡孝敬之道與寡嫂共田桑推讓好者自取其荒不營榮利母常譴之曰如此當乞食無處遜笑應母曰但願母老壽耳郭翻别傳曰翻經河墜刀于水路人有為取者翻因與之路人不取至于三四路人固辭翻曰爾向不取我豈能復得乎路人曰吾若取此物為天地鬼神所責矣翻知其終不受乃沉刀於向所失處路人悵然乃復沉沒取之翻於是不逆其意十倍刀價與之魏武令曰里諺曰讓禮一寸得禮一尺斯合經之要矣魏文雜事曰辭爵逃祿不以利累名不以位虧德之謂讓博物志曰三讓一曰禮讓二曰固讓三曰終讓晉劉寔崇讓論曰古之聖王治天下所以貴讓者欲以出賢才而息争競也夫人情莫不欲已之賢以自明賢也故勸令讓賢豈假讓不賢哉故讓道興賢能之人不求而自出矣至公之舉而自立矣百官之副亦豫具矣一官缺擇衆官所讓最多者而用之審才之道也在朝之士相讓于上草廬之人咸皆化之推賢讓能之風從此生矣為一國所讓則一國士也天下所共推則天下士也推讓之風化則賢與不肖灼然殊矣晉孫盛周泰伯三讓論曰孔子曰泰伯可謂至德也已矣三以天下讓民無得而稱焉鄭𤣥以為託採藥而行一讓也不奔喪二讓也斷髮文身三讓也三者之美皆蔽隱不著王肅曰其讓隱故民無得而稱焉盛謂元既失而肅亦未為暢也元之所云三跡顯然天下所共見也何得云隱而未著乎三跡苟著則髙讓可知亦復不得云其讓隱也盖泰伯之出讓迹已露不奔喪故一事耳斷髮之與左傳明文相背又不經也然則稱三讓者其在古公至文王乎周之王業顯于亶父受命於昌泰伯元覽棄周太子之位一讓也假託遜遯受不赴喪之譏潛推大美二讓也無𦙍嗣而養仲雍之子以為已後是深思逺慮令周嗣在昌天人叶從四海悠悠無復纎介疑惑三讓也凡此三者帝王之業故孔子曰三以天下讓言非直常讓若札臧之倫者太平御覽卷四百二十四
