body:
  text: 太平御覽卷十八宋李昉等撰時序部三春上春上說文曰春之為言蠢也萬物蠢然而生釋名曰正月少陽建寅寅者演也律中太蔟律之為言率也所以率氣也太者大也蔟者湊也言萬物始大湊地而出也書曰每嵗孟春遒人以木鐸狥于路注云遒人宣令之官木鐸金鈴木舌所以振文教也又曰分命羲仲宅隅夷曰𤾉谷平秩東作日中星鳥以殷仲春詩曰春日遲遲采蘩祁祁注曰祁祁舒緩也又曰有女懐春吉士誘之又曰春日載陽爰求柔桑又曰嗟嗟保介維暮之春亦又何求如何新畬田二嵗曰新三嵗曰畬箋云保介車右也月令曰正月之節日在虚立春為正月之節謹按春秋傳曰履端于始謂節也舉正于中謂氣也歸餘于終謂閏也既有閏則立春進退不但在正月朔日故不謂孟春之月但得立春則是正月之節可以行春令矣昏昴中曉心中凡記昏昴曉心中為人君南面而聼天下觀時候以受人事也日入後二刻半為昏日未出二刻半為曉也斗建寅位之初地有十二辰斗柄杓常右旋指地位故立春正月初之節則斗建寅位之初書云璿璣玉衡以齊七政是也其日甲乙春秋傳曰天有十日謂甲乙丙丁戊己庚辛壬癸甲乙屬木旺春故云其日甲乙也其帝太皥其神勾芒昔太皥氏以木徳繼天而王故為春帝髙辛氏有天下置五行之官木正月勾芒故勾芒為木神佐太皥于春律中太蔟立春之日東風觧凍後五日蟄蟲始振後五日魚上氷昔在周公作詩訓定二十四氣辨七十二候每候相去各五日以明天時將驗人事言聖人奉順天時則萬物及節候也命有司祭風師立春後五日祭風師于國城東地正月中氣日在危雨水為正月中氣凡中氣前後去節十五日以明天時舉正于中此之謂也昏畢中曉尾中斗建寅位之中雨水之日獺祭魚後五日候鴈北後五日草木萌動天子乃以元日祈榖于上帝元吉也謂上親祈榖如祀昊天上帝于圜丘以髙祖神堯皇帝配坐以五方帝從祀于壇春秋傳曰啟蟄而郊郊而後耕此之謂也命樂正習舞春秋尚舞故命習之禁止伐木無麛無卵無傷萌㓜之類掩骼埋胔為死氣逆生氣骨枯曰骼肉腐曰胔釋名曰二月之夾鍾何夾者孚也言萬物孚甲種類分也禮曰二月之節日在營室驚蟄為二月之節昏東參中曉箕中斗建邜位之初律中夾鍾驚蟄之日桃始華後五日鶬鶊鳴後五日鷹化為鳩省囹圄去桎梏上丁釋奠于國學釋謂置也置牲幣之奠于文宣王上戊釋奠于太廟亦用牲幣之奠又曰二月中氣日在奎春分為二月中氣昏東井中曉南斗中斗建卯位之中春分之日𤣥鳥至雷乃發聲祀朝日于東郊春分日祭之獻羔開氷謂立春藏氷在春分方温故獻羔以祭司寒而後開氷春秋傳曰日在北陸而藏氷西陸朝覿而出之先薦寢廟祠髙禖昔髙辛氏之代𤣥鳥遺卵簡狄吞之而生髙辛後王以為禖官嘉祥而立其祠焉祭馬祖仲春祭馬祖于大澤無竭川澤無漉陂池無焚山林始電又曰三月之節日在婁清明為三月之莭昏桞中曉南斗中斗建辰位之初律中姑洗又曰清明之日桐始華田鼠化為鴽後五日虹始見天子居青陽右个是月也天子乃薦鞠衣于先帝天子始乘舟薦鮪于寢廟聘名士禮賢者又曰三月中氣日在胃榖雨為三月中氣昏張中曉南斗中斗建辰位之中榖雨之日萍始生後五日鳴鳩拂其羽後五日戴勝䧏于桑命有司無伐桑柘乃脩蠶噐擇吉日大合樂大合樂者吉行射禮又曰季春之月蠶事既登分繭稱絲効功以供宗廟之服又曰季春之月天子乃為麥祈實鄭𤣥注曰於含秀求其成也又曰春生夏長仁也秋歛冬藏義也又曰天子五年一廵狩二月東廵狩至于岱宗柴望祀山川柴祭名望祭山川也覲諸侯問百年者就見之命大師陳詩以觀民風命市納賈以觀民之所好惡志淫好辟周禮曰媒氏掌萬民之判判半也合成夫婦也仲春月㑹男女成春禮是時奔者不禁無故而不用令者罰之又曰仲春詔后率内外命婦蠶于北郊帥六宫之夫人生穜稑之種而獻之于王又曰羅氏仲春獻鳩以養國老鄭𤣥注云春鷹化而為鳩變舊為新宜以飬老助生氣又曰司烜氏掌仲春以木鐸脩火禁又籥章掌仲春晝擊鼓歌豳風詩以逆之又四時皆有癘疾春時有痟首疾傳曰春蒐夏苖秋獮冬狩皆于農隙以講事也榖梁傳曰魯桓公十有四年春正月無氷無氷時燠也又曰四時之田皆為宗廟之事也春曰田取獸于田夏曰苗因為苖除害故曰苗秋曰蒐冬曰狩論語曰莫春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸爾雅曰春為青陽一曰𤼵生又曰春獵為蒐又曰春祭曰祀大戴禮曰三代之禮天子春朝朝日秋暮夕月祭日東壇祭月西壇故以别外曰壇端其政位所以明有敬也教天下之臣也又曰司徒典春以教民之不時不若不全成長㓜老疾孤寡以時通于四疆有闔而不通有煩而不治則民不樂生不利衣食凡民之藏貯以及山川之神明加于民者發圗功謀齋戒必敬㑹時必節日厯巫祀執之以侍官俟命而作祈王年禱民命及畜榖蜚征庶虞草方春三月緩施生育動作百物于時有事享于皇祖皇考朝孤子八人以成春事又曰二月祭鮪鮪者魚之先至也又曰三月參則伏不見又曰古者天子孟春論吏之徳行能法者為有行能理得法者為有能任得法者為有功故論吏而法行事治而功成季冬正法孟春論吏治國之要也又曰諸侯相見治卿為介以其教士畢行使仁者守㑹朝于天子天子以嵗二月為壇于東郊見五色設五兵具五味陳六律品奏五聲聽明敎置離秔大張侯規鵠堅物九卿佐三公三公佐天子天子踐位諸侯各以其局就位乃升諸侯之教士執弓挾矢揖讓以升履物以射其地以心端色容正時以效之有慶以地不時有讓以地天下之有道也開元禮曰仲春上丁釋奠于大學祀孔宣父為先聖顔子為先師上戊釋奠于齊太公以張良配易通統圗曰日春行東方青道曰東陸易說曰春有白鶴雲京房易占曰春當退貪殘進柔良䘏孤㓜賑不足求隱士則萬物應節而生隨氣而長所謂春令也尚書大傳曰萬物非天不生非地不載非春不動非夏不長非秋不收非冬不藏故書禋于六宗此之謂也又曰東方者何也動方也物之動也何以謂之春春出也物之出也故春謂之東方也尚書說曰東方春龍房位其規仁好生不賊其帝青表聖明行趨德尚書考靈曜曰春佩蒼璧乗蒼馬以出遊𤼵令于外春行仁政順天之常以安國也又曰鳥星為春候詩含神霧曰齊地處孟春之位海岱之間土地汙泥流之所歸利之所聚律中太蔟音中宫角陳地處季春之位土地平夷無有山谷律中姑洗音中宫徴韓詩外傳簡子曰夫春樹桃李夏得䕃其下秋得食其實春樹蒺藜夏不可采其葉秋得其刺焉由此觀之在所樹也今子所樹非其人也故君子擇而後種又曰天有四時春夏秋冬風雨霜露無非教也韓詩章句曰溱與洧方渙渙兮謂三月桃花水下時鄭國之俗三月上已於此水招魂續魄祓除不祥之故也三禮義宗曰五行之官也木正曰勾芒者物始生皆勾屈而芒角因用為官名也又曰祭六宗之禮寒暑有往來之期可退則祭禳却之命退應至而不至則祭求之命至故春則送寒而迎暑秋則送暑而迎寒又曰東岳謂之岱者代謝之義陽春用事除故生新萬物更生相代之道故東為岱也又曰天子諸侯宫寢之制若春氣三月之中居正寢退息之時常居東北之寢三月之末土王之日則居中寢夏之三月則居東南之寢秋之三月則居西南之寢冬之三月則居西北之寢此三時後土王之日亦各居中寢以從時候又曰古之學者干戈之舞得從春夏羽籥之職得入秋冬四事之中有文有武故得分之太平御覽卷十八
