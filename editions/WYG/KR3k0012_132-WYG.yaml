body:
  text: 太平御覽巻一百三十二宋李昉等撰偏霸部十五梁蕭衍蕭綱蕭繹侯景附蕭衍梁書曰高祖武皇帝諱衍字叔達小字練兒蘭陵中都里人漢相國何之後也皇考諱順之齊高帝族弟也參預佐命封臨湘縣侯高祖以宋大明八年生於秣陵同夏里三橋宅生而有竒異兩骻駢骨頂上隆起有文在右手曰武帝及長博學多通好籌略有文武才幹時流名輩咸推許焉所居室常若雲氣人或遇者體輒肅然起家巴陵王南中郎法曹遷衞將軍王儉東閣祭酒儉一見深相器異謂廬江何憲曰此蕭郎三十内當作侍中出此則貴不可言竟陵王子良開西邸招文學高祖與沈約謝朓王融等並遊焉隆昌初明帝輔政起高祖為寧朔將軍鎮夀春除太子庶子給事黄門侍郎入直殿省預蕭諶等定䇿勲封建陽縣男邑三百户建武二年魏遣將劉昶王肅帥衆寇司州高祖為冠軍將軍帥所領自外進戰魏軍表裏受敵乃棄圍退走軍罷以高祖為右軍晉安王司馬淮陵太守還為太子中庶子領軍羽林監頃之出鎮石頭四年魏帝自率大衆寇雍州明帝令高祖赴援又遣崔惠景督諸軍高祖等並受節度明年三月惠景與高祖進行鄧城魏主率十萬餘騎奄至惠景軍死傷略盡唯高祖全師而歸俄以高祖行雍州府事明帝崩東昏即位始安王遥光徐孝嗣江祀更直内省分日帖敕高祖聞之謂從舅張𢎞䇿曰政出多門亂其階矣時高祖長兄懿罷益州還仍行郢州事乃使𢎞䇿詣郢陳計於懿曰若隙開釁起必中外土崩今得守外藩幸圖身計郢州控帶荆湘西注漢沔雍州士馬呼吸數萬虎視其間以觀天下此蓋萬全之䇿如不早圖悔無及也懿聞之色變心不之許𢎞䇿還是歳至襄陽於是潛造器械多伐竹木沈於檀溪密為舟裝之備二年冬懿被害信至高祖密召長史王茂中兵吕僧珍等謀之以十一月召僚佐集於㕔事謂之曰昔武王㑹孟津皆曰紂可伐今昏主惡稔窮虐極暴誅戮朝賢罕有遺育生人塗炭天命殛之卿等同心疾惡共興義舉公侯將相良在兹日各盡勲效我不食言是日建牙於是收集得甲士萬餘人馬千餘匹船三百艘出檀溪竹木裝艦東昏以劉山陽為巴陵太守配精兵三千使過荆州就行事蕭穎胄以襲襄陽穎胄伏兵斬之送首於高祖仍以南康王尊號之議來告且曰時月未利當須來年二月遽便進兵恐非廟算高祖答曰所藉義心一時驍銳事事相接猶恐疑怠天時人謀有何不利處分已定安可中息三年二月南康王為相國以高祖為征東將軍高祖發襄陽移檄京邑高祖至竟陵命長史王茂與太守曹景宗為前軍輕兵濟江逼郢城張沖出軍迎戰茂等邀擊大破之三月南康王即帝位於江陵改永元三年為中興元年遥廢東昏為涪陵王以高祖為尚書左僕射加征東大將軍都督征討諸軍事假黄鉞五月東昏遣寧朔將軍吳子揚等救郢州六月子陽進據加湖去郢三十里傍山帶水築壘以自固七月高祖命王茂潛師襲加湖俄而大潰子陽竄走衆盡溺於江王茂虜其餘而還郢城主程茂以城降高祖又遣軍主唐修期攻隨郡並尅之司州刺史王僧景遣子入質司部悉平八月天子遣黄門勞軍九月詔高祖平定東夏並以便宜從事是月豫州刺史申胄棄姑熟走大軍進據之遣曹景宗蕭穎達領馬步進頓江寧東昏遣李居士率步軍迎戰景宗擊走之大軍次新林命王茂進據越城曹景宗據皂莢橋十月東昏又遣征虜將軍王珍國等列陣於航南大路精手利器尚萬人閹人王倀子持白虎幡督率諸軍王茂曹景宗等犄角奔之鼓噪震天地珍國之衆一時土崩諸軍望之皆潰茂軍追至宣陽門李居士以新亭壘徐元瑜以東府城降石頭白下諸軍並宵潰高祖鎮石頭命衆軍圍六門東昏悉焚燒門内驅逼營署官府並入城有衆二十萬青州刺史桓和紿東昏出戰因以衆來降高祖令諸軍築長圍十二月衞尉張稷北徐州刺史王珍國斬東昏送首茂師高祖命吕僧珍勒兵封府庫及圖籍收嬖妾潘淑妃及凶黨王咺之以下四十八人屬吏誅之宣徳皇后令追廢涪陵王為東昏侯依漢海昏侯故事授高祖中書監都督揚徐二州諸軍事大司馬録尚書驃騎大將軍揚州刺史封建安郡公食邑萬户給班劒四十人黄鉞侍中征討諸軍事並如故高祖入屯閱武堂下令大赦二年天子遣慰勞京邑追贈高祖祖散騎常侍左光禄大夫考侍中丞相宣徳皇后臨朝入居内殿詔進高祖都督中外諸軍事劒履上殿入朝不趨贊拜不名加前後部羽葆鼔吹置左右長史司馬從事中郎掾屬各四人又詔進位相國總百揆揚州刺史封十郡為梁公備九錫之禮高祖固辭二月進梁公爵為王以豫州之南譙廬江等十郡益梁國并前為二十郡三月命王冕十有二旒建天子旌旗出警入蹕庚辰齊帝禪位於梁高祖謙讓不受太史令蔣道秀陳天文符䜟六十四條事並明著羣臣固請乃從之夏四月丙寅高祖即皇帝位於南郊設壇柴燎告類於天大赦改齊中興二年為天監元年封齊帝為巴陵王八月詔中書監王瑩等八人參定律令十一月立皇子統為皇太子四年正月詔九流常選年未三十不通一經不得解褐若有才同甘顔勿限年次是歳大穰米斛三十五年三月魏宣武帝從弟翼率其諸弟來降陳伯之自夀陽率衆歸降八年正月輿駕親祠南郊赦天下九年三月幸國子學親臨講肆詔皇太子及王侯之子年在從師者可令入學十年親祠南郊大赦三月鄧晰以朐山引魏軍遣振逺將軍馬仙琕討之十月馬仙琕大破魏軍斬馘十餘萬復尅朐山城十八年親祠南郊普通元年正月改元大赦五年六月龍鬬於曲阿王陂因西行至建陵城所經樹木倒折七年赦死罪已下大通元年三月幸同泰寺捨身甲戌還宫赦天下改元二年十月以魏北海王元顥為魏主遣東宫直閣將軍陳慶之衞送還北魏豫州刺史鄧獻以地内屬中大通元年九月幸同泰寺捨身公卿以下以錢一億萬奉贖十月輿駕還宫大赦改元三年十月幸同泰寺升法座為四部衆說大般若涅槃經義六年春親耕藉田四月熒惑在南斗大同元年正月改元大赦二年三月詔文武在位舉爾所知公侯將相隨才擢用十年三月幸蘭陵謁建寧陵十一年四月魏遣使來聘中大同元年四月於同泰寺講說法㑹大赦改元十月以前東揚州刺史岳陽王詧為雍州刺史太清元年二月魏司徒侯景以豫章廣潁洛陽等十三州内屬以景為大將軍封河南大行臺承制如鄧禹故事四月大赦改元八月以大將軍侯景録行臺尚書事二年八月侯景舉兵反十月景自横江濟於采石景師至京臨賀王正徳率衆附賊十一月攻陷東府城三年三月前司州刺史羊鴉仁等進軍東府北與賊戰大敗賊攻陷宫城縱兵大掠侯景自為都督中外諸軍事大丞相録尚書四月高祖以所求不供憂憤寢疾五月丙辰崩於淨居殿時年八十六十一月進尊為武皇帝廟號高祖塟於脩陵梁書曰高祖生知淳孝少而篤學洞達儒𤣥雖萬機多務猶巻不輟手後宫職司貴妃已下皆衣不曳地傍無錦綺不飲酒不聽音樂厯觀古昔帝王人君恭儉莊敬藝能博學罕或有焉蕭綱梁書曰太宗簡文皇帝諱綱字世讚小字六通高祖第三子天監五年封晉安王中大通三年四月昭明太子薨五月立為皇太子太清三年五月高祖崩即皇帝位大寳元年正月大赦改元西魏寇安陸執司州刺史栁仲禮盡沒漢東之地二月邵陵王綸自尋陽至於夏口郢州刺史南平王恪以州讓綸侯景逼帝幸西州夏大饑人相食京師尤甚前司州刺史羊鴉仁自尚書省出奔西州八月湘東王繹遣領軍將軍王僧辯率衆逼郢州侯景自進位相國封二十郡為漢王邵陵王綸棄郢州走十月侯景自加宇宙大將軍都督六合諸軍事二年三月侯景自率衆西寇自石頭至新林舳艫相接四月景分遣偽將宋子仙任約襲郢州閏月景進寇巴陵王僧辯連戰不能尅五月湘東王遣遊擊將軍胡僧祐信州刺史陸法和援巴陵景遣任約帥衆拒援軍六月僧祐等擊破任約擒之景解圍宵遁王僧辯督衆軍追景攻魯山城尅之七月景還至京師王僧辯軍次湓城八月侯景遣衞尉卿彭儁率兵入殿廢帝為晉安王幽於永福省害皇太子大器尋陽王大心及尋陽王諸子二十人矯詔禪於豫章嗣王棟大赦改元十月帝崩永福省時年四十九賊偽諡曰明皇帝廟稱高宗明年三月王僧辯率百官奉梓宫升朝堂世祖追崇為簡文皇帝廟曰太宗塟莊陵梁書曰太宗見幽縶題壁自序云有梁正士蘭陵蕭世讚立身行道終始如一風雨如晦雞鳴不已弗欺暗室豈凂三光數至於此命也如何又為連珠二首文甚悽愴蕭繹梁書曰世祖孝元皇帝諱繹字世誠小字七符高祖第七子也天監十三年封湘東郡王大同六年出為都督江州諸軍事江州刺史太清元年徙為都督荆雍湘司郢等九州諸軍事鎮西將軍荆州刺史三年三月侯景寇沒京師太子舍人蕭歆至江陵宣密詔以世祖為侍中假黄鉞大都督中外諸軍事司徒承制餘如故是月世祖徴兵於湘州湘州刺史河東王譽拒而不遣七月遣世子方等帥衆討譽戰敗又遣將軍鮑泉討譽九月雍州刺史岳陽王詧舉兵反來寇江陵世祖嬰城拒守詧將杜崱及楊混各率其衆來降詧遁走鮑泉攻湘州不尅又遣左衞將軍王僧辯伐之大寳元年五月王僧辯尅湘州斬河東王譽湘州平二年二月魏遣使來聘三月侯景悉兵西上㑹任約軍王僧辯率衆屯巴陵景進寇巴陵世祖遣將軍胡僧祐陸法和帥衆下援巴陵任約敗景遂遁走僧辯帥衆軍追景所至皆㨗八月僧辯下次湓城十月王僧辯奉表稱侯景弑逆皇帝賊害太子宗室在寇庭者並罹禍酷世祖奉諱大臨三日百官縞素司空南平王恪率宗室將軍胡僧祐率羣僚並奉牋勸進世祖固讓三年二月王僧辯衆軍發自尋陽世祖馳檄告四方有能縛侯景及送首者封萬户開國公三月王僧辯等平侯景傳其首於江陵告明堂大社四月益州刺史新除假黄鉞太尉武陵王紀竊位於蜀改號天正元年世祖遣司空蕭太謁塋陵修復社廟五月以尚書令征東將軍江州刺史王僧辯為司徒斬賊左僕射王偉尚書吕季略於江陵市是月魏遣太師潘洛辛等寇秦郡王僧辯遣杜崱帥衆拒之以陳霸先為征北大將軍南徐州刺史是月魏遣使賀平侯景八月蕭紀率巴蜀大衆東下遣護軍陸法和屯巴峽以拒之十月四方征鎮王公卿士復勸世祖即尊號表三上乃從之承聖元年十一月丙子即皇帝位於江陵立王太子方矩為皇太子追尊所生妣阮修容為文宣太后二年西魏遣大將尉遲逈襲益州三年以郢州刺史陸法和為司徒四月以征北大將軍陳霸先為司空九月魏遣其柱國萬紐于瑾率大衆來寇冬十月魏軍至於襄陽蕭詧率衆㑹之内外戒嚴輿駕出行都柵徴王僧辯等軍十一月魏軍至柵下徴廣州刺史王琳入援辛夘魏軍大攻世祖出枇杷門親臨陣督戰六軍敗績反者斬西門關以納魏師城陷於西魏世祖見執十二月西魏害世祖遂崩焉時年四十七太子皆見害明年四月追尊為孝元皇帝廟曰世祖梁書曰世祖聰悟俊朗天才英發年五六歳高祖問汝讀何書對曰能誦曲禮高祖曰汝試言之即誦上篇左右莫不驚歎既長好學博總羣書下筆成章出言為論才辯敏速冠絶一時也侯景附梁書曰侯景河朔人也少不羈髙歡以為將軍雄勇冠時征伐數有大功嘗謂歡曰若假景三萬人當横行天下要須縛取蕭衍老翁遣作太平寺主後高歡死景乃以河南降於梁高澄使慕容紹宗軍圍長社景謂紹宗曰欲送客耶將定雄雌耶紹宗曰吾將決戰景乃令將士皆披甲持短刀但低視砍人脛足遂敗紹宗軍禆將斛律光死之紹宗曰吾戰多矣未見此賊之難相持連月景食待盡其將暴顯等降紹宗景衆乃潰景與心腹數騎濟淮稍收散卒得馬步八百人晝夜兼行追軍不敢逼使謂紹宗曰景若就擒公復何用紹宗乃縱之遂攻夀陽下之而據其城梁武以為河南王招集戰士乃請絹萬疋為軍人作袍帝不與以青布給之又請娶於王謝武帝曰王謝門高非其偶可朱張已下訪之景恚曰㑹將胡兒女以配奴景既為朝廷所疑武帝使謂景曰譬如貧家畜十客尚能得志朕惟有一客致有忿言是朕之失也明日遂將兵於厯陽濟江聞邵陵王綸督衆軍景乃謀於王偉偉曰莫若直掩京都臨賀反於内大王攻於外天下不足定也兵法曰巧遲不如拙速今便須進路不然邵陵及矣景遂晨夜兼行至都百道攻城縱火焚諸城門城中倉卒未有備乃鑿門樓下水沃火久之方滅景又於城西各起土山以臨城内内亦作兩土山以應之簡文以下皆親執畚鍤景又募有先為奴者賞以不次朱屏家黥奴踰城投賊景以為儀同使至闕下以誘城内乗馬披錦袍詬曰朱屏五十年仕宦方得中領軍我始事侯王已為儀同使於是奴僮競出盡皆得志景決石闕前水百道攻城晝夜不息城陷景自為丞相以甲士五百人自衞帶劒升殿帝謂景曰卿久在戎得無勞乎景不對帝曰卿是何州人而至此又黙然左右任約代對及出景謂約曰吾嘗據鞍對敵矢刃交下而意無怖今見蕭公使人自慴豈非天威難犯吾不可以再見之矣先是城中積屍不暇埋瘞又有已死未斂或將死未絶景悉命聚而焚之尚書郎鮑正疾篤賊曳出而焚之宛轉火中久而方絶武帝崩立簡文又立豫章王景皆殺之遂簒位國號漢年稱太始王偉請立七廟景問何謂七廟偉曰古者天子祭七代祖考故致七廟并請七代諱敕太常具祭祀之禮景曰前代吾不復憶惟記得阿爺名大標且在朔州伊那得來噉衆聞咸笑景頻為王僧辯所破將走王偉按劒諫曰自古豈有走天子今宫中衞士尚可一戰寧可便走景曰我在北時打賀拔勝破葛榮揚名河朔與高王一種人今來直渡大江取臺城如反掌打邵陵王於北山摧栁仲禮於南岸皆爾所親見也今日之事恐是天亡爾好守城吾當一決乃與百騎東走至松江乃與腹心數十人乗舸入海至湖州舍人羊鯤殺景景左足上有肉瘤狀似龜戰勝應尅捷則隠起分明如不勝則低是日瘤陷肉中遂傳首於江陵太平御覽巻一百三十二
