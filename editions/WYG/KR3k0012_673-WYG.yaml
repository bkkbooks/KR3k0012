body:
  text: 太平御覽卷六百七十三宋李昉等撰道部十五仙經下玉帝七聖𤣥紀曰舊文有十五萬玉言自非上聖莫能意通題崑崙之堂北洞之源又曰崑崙之室北洞之貞源廻九乙天霄白簡青籙在其内也本行經曰九都之上金格玉書並題得道人名展轉刼數又曰紫蘭臺瓊文紫字在其中西極明科曰龜山西室王屋南洞天經備足也又曰玉清洞房三氣金章封于玉京紫户之内又曰玉籙寳章藏紫房九户之内大洞雌一經云有𤣥琳玉殿五老鎮生上經藏在其中又曰四極明科封於金闕紫臺又曰華耀景真經秘在九天之上大有之宫金映七寳臺又有三寳𤣥臺上清隠書秘其中登眞隠訣曰上清仙臺金書在其中太極九𤣥臺碧簡文在其中𤣥眞玉龜臺明堂𤣥眞經在其中又曰崑崙瑶臺西王母之宫所謂西瑶上臺天眞秘文在其中金書玉字上經曰西𤣥洞臺有金書洞房經又曰骨命已定於𤣥閣緑字已有生名仙籍故也洞𤣥經曰有始陽臺阮樂天中内音書在其上又曰三層玉臺在九天闕之上臺上有太清寳經三百卷及眞人學仙簿録簡目大帝監眞玉司郎典之又曰瑶臺者髙上帝藏金𤣥羽章方神隠音在其内紫書金根經曰凡學者動尚苦志則玉皇三元東卑太上當遣眞人授其眞經後聖衆莫不先奏金簡於東華投玉札於上清然後得授大洞眞經而或青宫無金簡之籙玉格無𤣥編之名則神亦不可得而披也金根經曰開雲鳯之藴紫錦之囊出紫書眞訣玉篇大有經曰帝卿執大洞眞經盛以紫玊函又曰大有經金縷玉字以明其篇又曰大有妙經九貞科檢校於金藏大洞雌一篇目曰大洞眞經在九天之上大有宫大𤣥靈臺又曰華玉堂仙母金丹在其内奔日月二景隱文曰西𤣥山下洞臺中有鬱儀結隣經也玉屋山清虛中亦有此經也而不備惟太上𤣥宮髙上臺及􅅫萊府北室金柱玉壁刻此並備八素經曰太上曰諸學眞人而受𤣥清八素經皆有大帝篇目西華宫有玉簡藻書當為眞人者乃得此文也又曰西龜之山𤣥圃之上積石之隂八素眞經在其内龜山元籙曰龜山丹屋飛𤣥紫又西母常所寳秘其㫖隠奥自無仙名不得眄其篇目得者皆九天書録名題龜山也又曰玉華之室丹景玉文在其内飛行羽經曰峨眉之山金臺之室飛𤣥羽經秘其内又曰太上飛經藏于玉清上宫七映紫臺五寳經曰靈寳紫文秘在九天之上大𤣥靈臺又曰神州七轉舞天經秘於紫天元臺三元玉檢曰九天三闗之門九天龍書三元空洞玉檢飛𤣥之文刻題其内又曰三𤣥臺玉檢紫文九天真書在其内又曰西沙方臺上真三元之檢在其中也又曰晨燈之臺飛天檢之文在其中明照九天之上又曰金牖臺三元玉檢刻題其中又曰鳯生室大真金書在其内金檢玊字經曰有洞天陽臺玊佩金璫經在其内洞景金𤣥經曰自非真仙之名帝圖玉籙者不得聞見此經得見此經者飛仙上昇法輪經曰太上𤣥一眞人曰吾昔受無極太上大道君無上八門經道成位加眞人此文與元始同生包含天地億刼長存自非仙籙不得妄傳天地綱紀經曰太上玊經隠書皆盛以别笈道迹經曰東井華林堂元洞天中内音玉書置其上大有經曰大𤣥靈臺𤣥都九真明科在其内飛龍隠訣曰飛行羽經封之峨嵋山金臺室學道傳曰洞室中有金城玉屋真文所在上清九真中經内訣曰太上宫髙上臺有太上玊晨鬱儀奔日赤玊文及太上玉晨結憐奔月黄景玉章此二經刻以玊簡金字内音玊字經曰内音封於南河洞室石匱之中五符經曰九天靈書封於石匱玉訣經曰南圃丹霍之河三元洞室封題玊匱消魔經曰仙經一卷藏於荒山牒試凡心也像天地品曰後漢順帝時曲陽泉上得神仙經一百巻内七十巻皆白素朱界青幖朱書號曰天平清道隂行品曰度代君司馬生以白玉板青玉板丹玉字以授于呉郡沈羲又曰上清經以丹金書之紫金為界三元真一經曰琳霄之室者三元真一之法藏在其中玉光八景經曰金輝紫殿金真玉光八景經藏在内上清經曰南極藏上清經於瑶臺茅君傳曰金臺者上真内經封其中三道順行經曰南洞之室玉君封三道經在其中𤣥真經曰髙𤣥之妙道玉清之秘篇皆授金名玉字髙仙之人九真中經曰奔日月之道太上上清太極九重四司真人之所寳秘𤣥元君之玉章也自非有金闕玊名及東華紫字皆不得聞見此鬱儀奔日結隣奔月二章之篇目三元布經曰南極上上寳秘玊檢之文自無𤣥名帝圖不得見其篇第也及金羽𤣥章經此文隠藏不傳於世自無蘭臺丹字不得見聞靈寳真一訣曰洞𤣥自然經本文出乎太上道也者彌綸無極㣲妙無形老子曰天下莫柔弱於氣氣莫柔弱於道道之所以柔弱者包乎天地萬物夫柔之生剛弱之生强而天下莫能知其根本所從生者乎是故有以無為母無以虛為母虛以道為母自然者道之根本也人能以自然為道貞則道可得而通也太上經曰道實無形隠為化本經有文字顯為教端師有形言出處為法語黙隨時為存為最期至乎道由經與師師經及道號為三寳又云化本有三道經師也大道無形湏經為階經文𤣥妙非凡所知聖降為師示人㫖訣老子云道者萬物之奥善人之寳賢者得之以為真寳愚者得之不敢失道道無常術德無常方神無常體和無常容道無中主與靜為友又曰龍景九文紫鳯赤書經舊文藏在太上六合紫房之内天人侍衛其經太㣲黄書經曰天真三皇藏八㑹之文於委羽山太㣲天帝藏一通於龜山其靈書八㑹字無正形趣究乎奥難可尋詳得為天書自然之真斯八㑹之氣全五和之音非淺近者所能洞明天真皇人竭其所見注解其意八㑹之者生天立地開化人神萬物之本主召九天上帝校定神仙圖籙政天分度安國息民攝制酆都降魔伏鬼勑命水帝召龍上雲論天地刼期辨聖賢名氏所理城臺種種因縁廣宣區别五方元精服御求仙化形之法皆演𤣥妙自然虛無正真妙趣明于具足也又有玉訣者天真上望迷釋天書八㑹之文以為正音又有靈圖者𤣥聖表化示以靈變像形述理令物易悟也玊皇譜籙者衆聖紀述聖君名姓宗本繼嗣心官位緒也誡律者𤣥望制勅銓量罪福輕重科條防檢過失也威儀自然經者具示齋戒奉法俯仰進正容式軌範節度也力法者衆聖若述丹藥秘要神草靈芝柔金木玊修養之道也術數者明辯思神存真念道神齋虛志逰空飛歩飡吸元和導引三光仙度之法也記傳者衆神載述學業得道證真證果衆事之迹也昇𤣥經曰太上以靈寳内教經者咸信著萬民乃可傳授奉戒完具無毁㓕賑恤孤弱逺惡修善不求名譽稱毁如一幽僻之處勤行其道使人信之如四時不欺與賢者論議不自專執者可傳援也又有好求勝法從善如流好近賢智無猜疑行聦明而賞别真偽謹慎而言不過行柔弱而無過惡觧師勝已而無悖慢重其師教如貧之得寳尊奉師長而不辭勤勞請益之心夙夜不懈如此之類方可授經又曰有上清列紀經卷者得為太極仙人益能誦之者遂為上清之君也有玉清隠晝者旦夕當致真仙論道講妙有四極明科經曰則玊帝遣五方神靈左右三官檢制靈文也靈録經曰元始洞𤣥靈寳赤書五篇真文者於元始之先空洞之中天地未判日月未光幽幽冥冥無祖無宗靈文闇藹乍存乍亡二儀待之以分太陽待之以明靈圖華運𤣥象推遷乗機應運於是存焉天地得之而分判三景得之而發光靈文欎秀洞映上清發乎始清之天而色無定方之勢曲折不可尋䆒元始鍊之於洞陽之舘治于飛火之庭鮮其正文瑩發光芒洞陽氣赤故號赤書天寳之以致浮地秘之以致安五常賞之以得鎮三光乗之以髙明上聖奉之以致真五岳從之以得靈天子得之以致治國祚享之以太平是靈文之妙德標天地之𤣥根威靈耿廓普加無窮蕩蕩大化為神明之宗其量莫測巍巍大空生天立地開化神明上謂之靈施鎮五岳安國長存下謂之寳靈寳𤣥妙為萬物之尊又曰太上八威䇿文今靈寳玊符後有一符名太上入威身其制虎豹仙書也太上隠書金真上光經即太上玉晨傳也素靈洞𤣥大洞妙經即西王母傳也玉珮金璫太極真書即扶桑大帝君傳也飛行羽經即中央黄老君傳也太霄隠書瓊文玊章即大帝傳也凡諸傳並真經或人高而法下或術重而位輕者此傳雖有新法以黄庭内經為主是為太極經也赤丹金丹精石景水母經此似紫文服日法天皇象符以合元氣黄書赤界長住之要真洞𤣥經曰無太一金閣五星隠籙後聖七符空山石函丹臺章𤣥黄五行天母抱圖者皆不得聞見至道也洞眞經曰玉室者三九素文𤣥丹上化三真洞元之道藏於内又曰髙上藏三元玊檢三元布經於其内曲室者太㣲天帝君秘九丹上仙文之所也元始五老又秘五篇真文於其内又曰東海青華小童治於青宫内其東殿架上有寳經三百巻玉訣九千篇主學仙簿籙應為真人者授之玊晨監仙侍郎典之又曰𤣥靈臺五老寳經及𤣥母入門金臺𤣥丹三真洞元之經藏其内又曰九天闕臺上有太皇大真髙帝玉名及後聖真人簿籙太虛玊晨監典之太洞玊經曰玉晨延以金華之堂太上書以明玊之札又曰龍山是玊清天中髙臺名也天帝玊字在其中又曰萬華宫有上帝寳經玊清隠書大洞經曰有𤣥雲羽室黄老元君經封在其中又曰黄老元君經封在素瑶臺及北塞金臺又曰有閬風玉臺總司學道仙籍又曰雌一玉檢秘在九天之上大有之宫太𤣥靈臺又曰有混成玉堂大洞真經在其中又曰大洞真經者三五之秘號真道之至精言一之極章並玊清之禁談髙上之秘篇也又太上九真明科經云大洞真經雌一寳經素靈妙經三竒之章髙上玉皇寳篇秘在九天之上大有之宫太𤣥靈臺玉房之中也三籙者衆經之端也金籙黄籙玉三也夫靈寳經者有内教外教雜教隨人所悟說之不必盡籙也趣令前人受悟為限也内教者真一妙術發自内心行善得道非從外來若道可從外而得者便應以道授至真不變湛然常存也三皇經者玉清洞真上清洞𤣥太清洞神又曰太極隠注寳訣經云受三洞經當絶人事而行之也總三洞名太上洞一髙上之經矣又曰大洞真經或曰太上真道經或曰太清上道觀天内經上清之髙真極真之㣲辭飛仙之妙經也又曰靈寳經或曰洞𤣥或云太上昇𤣥經皆髙仙之上品虛無之至真大道之幽賛也三皇天文或云洞神或云洞仙或云太上玉䇿此三洞經符道之綱紀太虛之𤣥宗主真之首經矣豈中仙之所聞哉又曰金籙簡文曰三洞寳經自然天之文也又曰太上太真科經云大化始立人風真淳故三寳度三品人洞神名仙寳之道按三皇之世洞𤣥名靈宗之道明三才度五帝之世洞真名天寳之道紀清正之方濟三代之後也又曰太上倉元經云三洞經者洞真上清也洞𤣥靈寳也洞神三皇也又曰靈書經云元始以龍漢之年撰十部經告西母曰太上紫㣲宫中金格玉書靈寳真文篇目有妙經其篇目今以相示皆刻金為字書於玉簡題其篇目於紫㣲宫南軒大𤣥都玉京山亦具記其文道君列紀曰若三元宫有珠札青書者則紫胸錦舌此為仙相也太平御覽卷六百七十三
