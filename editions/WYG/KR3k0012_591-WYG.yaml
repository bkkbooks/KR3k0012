body:
  text: 太平御覽卷五百九十一宋李昉等撰文部七御製上御製上尚書益稷曰帝庸作歌曰勑天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熈哉臯陶拜手稽首颺言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事墮哉漢書曰髙祖還歸過沛置酒沛宫悉召故人父老子弟佐酒發沛中兒得百二十人教之歌酒酣髙祖擊筑自為歌曰大風起兮雲飛揚威加海内兮歸故郷安得猛士兮守四方又曰武帝求賢詔曰蓋有非常之功必待非常之人故馬或奔踶而致千里士或有負俗之累而立功名夫泛駕之馬跅弛之士亦在御之而已泛覆也方腫反弛廢也斥逐也其令州縣察吏民有茂才異寺可為將相及使絶國者又曰武帝幸河東祠后土顧瞻中流與羣臣宴飲上歡甚乃自作歌秋風辭云秋風起兮白雲飛草木黄落兮鴈南歸蘭有秀兮菊有芳懷佳人兮不能忘泛樓船兮濟汾河横中流兮揚素波簫皷鳴兮發棹歌歡樂極兮哀情多少壯幾時兮柰老何後漢書曰東平憲王蒼傳曰顯宗以所自作光武本紀示蒼蒼因上世祖受命中興頌上甚善之令校書郎賈逵為之訓解又曰顯宗自置五家要説章句令桓郁定於宣明殿華嶠書曰帝自制五行章句此言五家即謂五行之家也魏志曰武帝御軍三十餘年手不捨書晝講軍䇿夜思經傳豋髙必賦遇物必詩及造新詩被之絃管皆成樂章又曰文帝行幸廣陵故城臨江觀兵戎卒十餘萬旌旗數百里帝馬上為詩曰觀兵臨江水水流何湯湯戈矛成山林𤣥甲曜日光猛將懷暴怒膽氣正縱横誰云江水廣一葦可以航不戰能屈敵戢兵稱賢良古公宅岐邑實始剪殷商孟獻營虎牢鄭人懼稽顙充國務耕植先零自破亡興農淮甸間築室都徐方量宜運權略六軍咸悦康豈如東山詩悠悠多悲傷魏文帝紀曰帝好文學以著述為務自所勒成垂百篇又使諸儒撰集經傳隨類相從凡千餘篇號曰皇覽晉書曰殷仲堪為黄門郎孝武帝示仲堪詩曰勿以己才而笑不才宋書曰髙祖過彭城置酒命紙筆為詩曰先蕩臨淄穢却清河洛塵華陽有逸驥桃林無伏綸於是羣才並作也後魏書曰孝文帝雅好讀書手不釋卷五經之義覽之便講學不師授探其精奥史傳百家無不該涉才藻富贍好為文章詩賦辭頌有興而作有大文筆馬上口授及其成也不改一字自太和已後詔䇿皆帝文也自餘文章百有餘篇三國典畧曰周明帝幼而好學華彩温麗捃摭衆善自羲農以來訖于宋末叙為世譜凡百卷所著文章十卷行於世後周書曰明帝三年秋九月幸同州過故宅賦詩曰玉燭調秋氣金輿立舊宫還當如白水更似入新豐霜潭清晚菊寒井落疎桐舉杯延故人今聞歌大風梁書曰武帝賜張率詩曰東南有才子故能服官政余德慙夙昔得人斯為盛率奉詔往復六百篇又曰髙祖製春景明志詩五百字勑在朝臣自沈約已下同作髙祖以王僧孺詩為工隋書曰陳貞明初後主作新歌詞甚哀思令後宫美人習而歌之其辭曰玉樹後庭花花開不復久詩人以歌䜟此其不久兆又曰大業三年幸榆林啓民可汗奉觴上壽拜伏甚恭帝大悦賦詩曰鹿塞鴻旗駐龍庭翠輦迴毡帷望風舉穹廬向日開呼韓稽顙至屠耆接踵來索辮擎羶肉韋韝獻酒杯何如漢天子空上單于臺國朝傳記曰煬帝善屬文而不欲人出其右司𨽻薛道衡由是得罪後因事誅之曰更能作空梁落燕泥否煬帝為燕歌行文士皆和著作郎王胄獨不下筆帝毎銜之胄竟坐此見害而誦其警句曰庭草無人隨意緑復能作此語否又曰牛𢎞煬帝之在東宫也數有詩書遺𢎞𢎞亦有答及嗣位之後嘗賜𢎞詩曰晉家山吏部魏世盧尚書莫言先哲異竒才並佐余學行敦時俗道素乃冲虛納言雲閤上禮儀皇運初彛倫忻有叙垂拱事端居唐書曰太宗以武功定海内櫛風沐雨不暇於詩書洎于嗣業進引忠良鋭精思政朝夕孜孜求之若不及數年之後天下晏如遂於聴覽之暇留情文史叙事言懷時有制作天才𢎞麗託興𤣥逺著作鄧隆請編次之詔不許又曰太宗著金鏡述以示羣臣其辭曰朕以萬幾暇日遊心前史仰六代之髙風觀百王之遺跡興亡之運可得言焉毎至軒黄之無為唐虞之至治未嘗不留連贊詠不能已矣及於夏殷末世秦漢暴君使人凜然兢懼如履朽薄然為人君皆欲其永享萬乘之尊以垂百王之後而得失異趣興滅不同何也蓋短於自見不聞逆耳之言至於滅亡終身不悟豈不懼哉觀理亂之本原足為明鏡之鑒戒亂未嘗不任不肖理未嘗不任忠賢任忠賢則享天下之福用不肖則受天下之禍社禝臨危之主各師其臣若使覺悟安有危亡之禍特有不留心於任使翻屬意於遨遊豈不哀哉以遨遊將為任使以任使將為遨遊豈不善哉古人言舜禹不愛於聲不貪於色予謂不然將謂愛也人云桀紂躭於聲色予將謂不好也何以然桀紂命不終於天年樂不終於一世以此知為不好也舜禹命壽於終樂畢於世予謂之愛也夫人有寛躁强柔之志愁歡貪慾之心性有善不善者也由是觀之堯舜禹湯躬行仁義治致隆平此其稟善性也幽厲桀紂乃為炮烙之刑刳孕婦割人心斮朝涉脯鬼侯造酒池糟丘為長夜之飲此其受於不善之性也夫立身之道在於折衷而不在於偏躭呉起曰昔桑氏之君任德廢武以滅其國有扈之君恃衆好勇以喪社禝仲尼曰寛濟猛猛濟寛仁義之道猶不可偏何況於不仁乎為君之道處至極之尊以億兆為心以萬邦為意安民必以文德防邊必以武功孔子曰夫文之所加者深則武之所服者大德之所施者博則威之所制者廣不可以武威安民不可以文德備塞大鯨出水必廢遊波之功鴻鵠沉泥定無凌空之効若各令遂志並不失其能古人云構大厦者先擇匠然後簡材治國者先擇佐然後定民大匠構屋必以大材為棟梁小材為榱桷茍有所中尺寸之木無棄此善理木者也非獨屋有棟梁國家亦然大德為宰相亦國之棟梁也予思三代以來君有所好民必從之在上留心臺榭竒巧之人必至馳情遊獵畋騁之人逺臻存意絃管鄭衞多進降懷脂粉燕趙斯來塞切直之路為忠者必少開謟䛕之道為佞者必多古人云君猶器也民猶水也方圓在於器不在於水以此而言之足為永戒夫玉不琢不成器人不學不知道仲尼問於郯子文王學於虢叔聖人猶且如此何况於凡人乎治主思賢如農夫之望嵗哲后求人如旱苗之思雨亂君嫉勝已如仇親不肖如子懐之中心何日暫忘王莽偽行仁義之道有始無終孫皓權施恩惠之風有初無末二子猶敝船之汎巨浪覆在不遥若駑馬之奔千里困其將至古人云升量不可以盛石小智不可謀大巧詐不如拙誠信匪謬矣有明王有暗主漢祖攝衣於酈生比干剖心於帝辛殷湯留情於伊尹龍逢被戮於夏桀楚莊暇隙而懷憂晉侯罷朝而含喜闇主護短而拒善明主思短而長善觀漢祖殷湯仰其有德行譬若隂陽調四時會法令均萬民樂則麒麟呈其祥漢祖殷湯豈非麒麟之類乎觀夏癸商辛其背惡之甚政令不行如寒暄失序則猛獸肆毒螽螟為害夏癸商辛豈非猛獸之類乎予以此觀之豈非天道也雖曰天時抑亦人事成湯之世有七年之旱剪髪為犧千里雨降太戊之世桑榖生朝懼而修德遂使十有六國重譯而來此豈非人事者也或曰為君難為臣不易君處尊髙之位執掌賞罰之權録人之材因人之力何為不成何求不得此言似易論之實難何者輕凌天地衆精顯其妖忽慢神靈風雨應其報是以帝乙有雷霆之祸殷紂致分沙之灾多營池觀逺求異寶民不得耕女不得蠶田荒業廢兆庶凋殘見其饑寒不為之哀觀其勞苦不為之戚苦民之君也非治民之主也薄賦輕徭百姓家給上無暴令之征下有謳歌之詠屈一身之欲樂四海之民憂國之主也樂民之君也此其所以為難也且用人之道又為未易己之所賢未必盡賢衆之所毁未必全惡知能不舉既為失材知惡不黜則為禍胎又人才互有長短不必兼通是以公綽優於大國之卿子産善為小邦之相絳侯木訥卒安劉氏之宗嗇夫利口不任上林之令捨短從長然後為美夫人剛柔之情各異曲直之性不同不可不察也逆王耳而履道戮孔懷以安國周公是也順上心以安身隨君情而殺子易牙是也棄己之命存君之身紀信是也挾國謀事以報私讐袁盎是也捐身而執節孤立而自毁屈原是也外顯和穆之端内懷湯火之意宰嚭是也忠謟之道以此觀之足以永鏡白起為秦平趙乃被昭王所殺亞夫定國之亂卒為景帝所誅大夫種設䇿滅呉翻遭越王之戮伍員竭誠為國終罹賜劍之禍乃君之惡也非臣之罪焉至如趙髙韓信黥布陳豨之儔此自貽厥釁非君之濫刑也髙祖失於將兵之能光武獲於置將之妙臣安君社稷之固君處臣危亡之地豈是相酬之道也為天下之君處萬民之上安可易乎背道違禮非惟損己乃為賢人之所笑修身勵行實為君子反為凡夫之所譏越品進官其類必為深怨偏與人語在衆以為由私任使賢良則為偶合委仗凡才則言愚闇言數則謂大繁辭寡則謂道薄恣情忿怒則朝野戰慄留心寛恕則法令不行民樂則官苦官樂則民勞四海之内莫非王土要荒為枝葉畿甸為根本古人云皮之不存毛將安傳當使本固根深委之内相而伊尹傳説世所希逢至鎮積水之塞守飛雪之邊而魏尚李牧當令罕遇遣人逺撫則眷戀而不忍愍而不遣則枝葉落而不存二者之間致心何所是以晨興夕惕無忘斯事為上猶然何况臣下易云書不盡言言不盡意今畧陳梗槩以示心之所存耳古語云勞者必歌其事朕非故煩翰墨以見其藻但學以為己聊書所懷想逹見羣賢不以為嗤也又曰太宗思隋氏失道皇運開基因是序之以明誡慎伸筆書石命工刻以賜皇太子其詞曰昔隋季崩離天綱弛紊波濤沸四海氛霧塞三光鬼哭石言人怨神怒少壯疲於兵甲老弱弊於饑寒爨骨百城流血千里宫闕變為禾黍中原化為冦場余以弱齡屬當危運思靖大難以濟蒼生秣馬揮戈風驅電掃克平八表臨撫萬方聊因暇景載懷興亂厯想前代暗君庸主莫不恃其智力則輕侮聖賢騁其文才則不遵道德縱其口辨以飾非肆其奸言以拒諫昏迷酒色習近讒邪暴疾黎元窮其轍跡傾危莫悟以至滅亡明鏡不逺於焉自鑒又曰魏徴葬日太宗登苑西樓臨路哭祭太宗復為製碑文并御書公卿士庶競來摸寫車馬填噎日有數千時人號其碑為二絶文與書也又曰太宗幸積翠池宴五品以上太宗曰今兹年數大登水潦不能為害天下既安邊方静息因此農隙與公等舉酒酒既酣各宜賦一事太宗賦尚書其詞曰日昃翫百篇臨燈披五典夏康既逸豫商辛亦沉􅊺􅔤情昏主多克己明君鮮滅身資累惡成名由積善又曰太宗征髙麗回次營州詔遼東戰死骸骨並集柳城東南有司設太牢以祭太宗臨哭盡哀從臣無不流淚帝親為文祭之曰忠烈蓋世往賢明軌忘身狥國先哲良規惟爾等懷忠立節重義輕生奮劒提戈摧城陷陣冐鋒刄而不顧赴湯火以如歸殞命戰場殘形冦壘膏原潤鉞身喪名存揺落寒關遂非生入蒼茫雷野無復餘蹤山川宛其不殊存亡䬃焉非昔然則身者今之所重名者後之所貴身乃常有而愚夫怯焉功則難立惟烈士成焉去一生之短期收千載之令譽此聖賢之操也豈直忠勇者乎所以按轡停輿撫膺一慟嘉乃誠節痛爾遺靈酒俎既陳魂其斯享又曰貞觀十一年太宗幸洛陽遣使祭漢太尉楊震墓太宗自為文曰惟君資華巖之竒氣禀金方之秀質體忠篤以成性應時運而挺生彈冠贊務弼諧帝道正色立朝周行以肅坐槐爕理鼎飪載調值安德不昇政由近習氣舛玉衡日微黄道君慨然忠憤乃心王室昌言正義屢犯於逆鱗霜簡直繩志袪於時蠧而運屬陵夷道消賢哲才納嘉猷遂嬰嚴網方𢎞至治遽夭天年英傑云亡邦國彌瘁斯乃􅃡想高蹤可為長嘆朕省方班瑞言事東巡瞻墳􅎬於道周想風徽於前代若使九原可作吾將與歸千載如存依然何逺行潦致屬君其饗之又曰高宗製元首前星維城股肱等誡以示侍臣禮部尚書𢎞文舘學士許敬宗又上表請總名為天訓并請注解許之及注畢敬宗為之序又曰咸亨中上自裁樂章有上元二儀三才四時五行六律七政八風九宫十州得一慶雲之曲以示羣臣令太常行用之又曰咸亨中御書飛白書贊以賜中書門下三品戸部尚書戴至德詞曰汎洪源俟舟楫中書侍郎郝處俊曰飛九霄假六翮吏部侍郎李敬𤣥曰資啓沃罄丹誠中書侍郎崔知悌曰竭忠節贊皇猷議者以戴郝寛厚而李崔忠勤故上以此言褒美之又曰顯慶中上以琴中雅曲古人歌之近代以來此聲頓絶令所司簡樂工解琴笙者修習舊曲冬十月辛亥太常上言謹按禮記及家語云舜彈五絃之琴歌南風之詩是知操琴曲弄皆合於歌又張華博物志曰白雪是大帝使素女鼓五十絃瑟曲名又楚大夫宋玉對襄王云有客於郢中歌陽春白雪國中和者數十人是知白雪琴曲本宜合歌以其調高人和遂寡自宋玉以來迄今千祀未有能歌白雪曲者臣今准勅依於琴中舊曲定其宫商然後教習並合於歌輒以御製雪詩為白雪歌詞又按古今樂府奏正曲之後皆别有送聲君唱臣和事彰前史輒取侍中許敬宗等奉和雪詩以為送各十六節今悉教訖並皆諧于音韻上善之乃付太常編于樂府又曰𤣥宗製令長新誡一篇頒賜天下縣令其詞曰我求令長保乂下人人之所為必有所因侵漁放曠賦役不均使彼離散莫保其身徵諸善理寄爾良臣與之革故政在維新調風變俗背偽歸真教先於富惠恤於貧無大無小以躬以親青旌勸農其唯在勤墨綬行命孰不攸遵曷云被之我澤如春又曰𤣥宗親製春臺望四章二十八句起居舍人蔡孚奏曰伏見所製氣雄詞美德音相屬鄙炎漢之奢侈狗有唐之儉陋知作勞而居逸念中人之家産用心如此天下斯安臣職在司言請宣示百寮及編國史又曰端午日𤣥宗自賦詩曰端午臨中夏時清日復良鹽梅已佐鼎麯糵且傳觴事古人留迹年深縷績長當軒知槿茂向澗覺蘆香億兆同歸壽羣公共保昌忠貞如不替貽厥後昆芳又曰𤣥宗幸寧王憲宅與諸王宴探韻賦詩曰魯衞情先重親賢愛轉多冕旒豐暇日乘景暫經過戚里申髙宴平臺奏雅歌復尋為善樂方騐保山河又曰天寶八載九月甲午是月皇太子生日上製仁孝詩六章親書於步障以賜太子令中官高力士以示朝臣太平御覽卷五百九十一
