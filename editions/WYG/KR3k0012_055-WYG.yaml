  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_055-1a, image: WYG0893/WYG0893-0465a.png}
body:
  text: 太平御覽卷五十五宋李昉等撰地部二十窟野郊窟禮記曰古未有宫室冬居營窟夏居橧巢也左傳鄭伯有嗜酒為窟室而夜飲酒擊鐘焉朝至未已朝者曰公焉在曰吾公在壑谷壑谷窟室也史記曰吳公子光之謀王僚也專諸謂曰王僚可殺也公子光乃伏士於窟室中而具酒請王僚使專諸置匕首魚炙之中專諸擘魚因以刺王僚立死戰國策曰馮煖謂孟嘗君曰兎有三窟僅得免死君始一窟未得髙枕而卧也請為君復鑿二窟乃西遊於梁謂梁惠王曰齊放其大臣孟嘗君於諸侯先迎者國富兵强梁王乃聘以為相齊王聞之懼乃請反國馮煖使先正祭噐立宗廟於薛三窟已就馮煖之力也晉書曰王衍用弟澄為荆州從弟敦為青州曰荆有漢江之固青有負海之險吾留於此足為三窟王隠晉書曰魏末有孫澄字公和汲郡共人也無家屬時人於汲縣北山土窟中得之夏則編草為裳冬則披髮自覆為人無言好讀易鼔琴也崔鴻十六國春秋前秦錄曰張忠字巨和中山人也永嘉之亂隱於泰山端拱若尸無琴書之適不修經典勸教但以至道虛無為宗其居也依崇巖幽谷鑿地為窟室弟子亦窟居去忠六十餘步五日一朝其教也以形不以言弟子受業觀形而退淮南子曰鳥飛反鄉兎走歸窟典略曰蘇秦與張儀始俱東學於齊鬼谷先生皆通經義百家之言鬼谷弟子五百餘人為作窟深二丈曰有能獨下在窟中説使泣者則能分人主之地矣秦下説之鬼谷泣下沾衿又曰董卓雖親愛呂布然時醉則罵以刀劍擊之不中而後止布恐終被害乃私與司徒王允及尚書僕射孫端謀養死士於窟室三年四月天子疾瘳卓詣宮賀布先置死士以邀卓嚴駕出馬躓不肯行心怪之欲還布勸使行到宫門入掖門死士交㦸刺卓墮車顧布所在布下馬曰有詔遂殺之列仙傳曰厯陽有彭祖仙窟請雨輙得也神仙傳曰李意期蜀人於成都角作一土窟居之冬夏單衣髪長剪去之皆使長五寸或百日二百日三百日不出窟郡國志曰相州隆慮山有一洞去地千仞俗謂聖人窟下有小山孤竦謂之玉女樓仙人臺亦曰香爐峯也又曰馬邑縣道齊坂有土穴出泉琴操所謂飲馬長城窟也秦州記曰河崖傍有二窟一曰唐術窟深四十餘丈髙四十餘丈中有三佛寺流泉浴池鑿石作丈六像三百餘區其西二里則曰時亮窟髙百丈廣二十丈深三十丈亦有泉水藏古書五卷唐術時亮皆古之孝行士也又曰州圖經曰唐術窟在郡西龍支谷彼人亦罕有至者其窟内有物若似今書卷因謂之精巖巖内時見神人往還蓋古仙所居耳羗胡懼而莫敢近又聞鬼為唐術故指此為唐術窟豫章記曰豐城縣有雷孔章掘神劍窟方廣七八丈王韶之南康記曰神源下流百里有峽兩岸皆髙山峽下數十里有蛟龍窟時時有霧氣耆宿云此通南康縣去此穴由百餘里嘗有宿其口者夜遇暴雨水器物乃流出野説文曰野郊外也周易曰龍戰于野其血𤣥黄又曰同人于野亨利涉大川乾行也王弼曰所以遂能同人於野亨利涉大川非二之所能也是乾之所行也又曰上古穴居而野處後世聖人易之以宫室書曰啟與有扈戰于甘之野作甘誓又曰大野既瀦東原底平又曰伊尹相湯伐桀升自陑遂與桀戰于鳴條之野孔安國曰地在安邑之西又說命曰夢帝賚予良弼其代予言乃審厥象俾以形旁求于天下說築傅巖之野惟肖又曰王曰來汝說台小子舊學于甘盤既乃遯于荒野入宅於河既學而中廢業遯居田野河洲也又曰歸馬于華山之陽放牛於桃林之野示天下弗服又曰王朝至于商郊牧野乃誓毛詩曰野有死麕白茅包之林有樸􅈪野有死鹿惡無禮也又曰燕燕于飛差池其羽之子于歸逺送于野又曰野有蔓草零露漙兮又曰葛生蒙楚蘞蔓于野予美亡此誰與獨處毛萇曰喻婦人憶其君子從軍未還未知死生又曰蜎蜎者蠋烝在桑野敦彼獨宿亦在車下鄭𤣥曰燭時行久處桑野似勞苦者又曰鴻鴈于飛肅肅其羽之子于征劬勞于野又曰鶴鳴于九臯聲聞于野又曰我行其野蔽芾其樗婚姻之故言就爾居又曰我征徂西至于艽野又曰殷商之旅其會如林矢于牧野維予侯興又曰京師之野于時處處于時廬旅于時言言于時語語鄭𤣥曰京地衆民所居之野舍其賔旅言其所當言語也又曰駉駉牡馬在坰之野韓詩外傳曰孔子出遊少原之野有婦人哭甚哀問之婦人曰向刈蓍薪亡吾簮是以哀也非傷亡簮不忘故也禮記曰季春之月命司空曰時雨將降下水上騰循行國邑周視原野修利隄防又曰舜勤衆事而野死鯀鄣洪水而殛死周禮曰大司空之職掌建邦之土地之圖而辨其邦國都鄙之數制其畿疆而溝封之設其社稷之壝而樹之田主各以其野之所宜木遂以名其社與其野壝壇與堳埒也又曰惟王建國辨方正位體國經野又曰周以九伐之法正邦國野荒民散則削之又曰甸師掌共野果蓏之薦又曰遂人掌邦之野凡事致野役而師田作野民帥而至掌其政治禁令凡國祭祀共野牲令野職凡賔客令脩野道而委積委積於廬宿市經田野造縣鄙形體之法皆有地域溝樹之入野職野賦于王府又曰大司冦之職以五刑糾萬民一曰野刑上功糾力刑亦法也功農功力勤力又曰縣士掌野各掌其縣之民數糾其戒令而聽其獄訟左傳曰辛有適伊川見被髮祭於野者曰不及百年此其戎乎其禮先亡矣又曰鄭伯享趙孟于垂隴伯有賦鶉之賁賁趙孟曰牀第之言不踰閾况在野乎非使人之所敢聞又曰崔氏之亂申鮮虞僕賃於野以喪莊公楚人召之遂如楚為右尹又曰子産之從政也擇能而使之禆諶能謀謀於野則獲謀於邑則否鄭國將有諸侯之事子産乃令禆諶乘以適野使謀可否而告馮簡子使斷之又曰鸜鵒之羽公在外野往饋之馬又曰齊悼公使朱毛遷安孺子於駘不至殺諸野幕之下爾雅曰邑外謂之牧牧外謂之野春秋合誠圖曰堯母慶都蓋天帝之女生於斗維之野當三河東南天大雷電有血流潤大石之中生慶都管子曰萬乘之國兵不可以無主博大之地野不可以無夫野無夫則無蓄積也無田夫則人惰本業故無蓄積又曰行其田野視其耕耘計其農事而饑飽之國可知也其耕之不深耘之不謹地宜不任草田多穢耕者不必肥荒者不必墝其野草田多而闢田少者雖不水旱國必饑淮南子曰孔子行於東野馬食農夫之稼野人怒取其馬而擊之使子貢往説之卑辭而弗能得乃使馬圉往説之野人大喜解馬而與之又曰上遊乎霄雿之野下出乎垠鄂之門髙誘曰霄雿髙峻之貌也垠鄂無形之貌也國語曰臼季使舍於冀野賈逵曰臼季晉臣冀野晉地冀缺耨其妻饁之敬相待如賔從而問之曰冀芮之子也與之歸家語曰叔孫氏之車士曰鉏商車士持車者商子姓也鉏商名也採薪於大野獲麟焉折前左足載以歸叔孫以為不祥棄郭外告孔子曰麕而角者何也孔子往觀之曰麟也孰為來哉孰為來哉呂氏春秋曰禹東至扶桑之地青差之野髙誘曰青差東方之野也帝王世紀曰黄帝與神農氏戰於阪泉之野又曰炎帝殺蚩尤於中冀名其地曰絶轡之野又曰湯時大旱殷史卜曰當以人禱湯曰吾當自禱之遂齋戒剪髮斷爪已為牲禱於桑林之野告於上天已而雨大至又曰棄恤民勤稼蓋封地方百里廵教天下死於黑水之間潢􅀈之野又曰秦自非子受封至昭王滅周之嵗在大梁前後七遷皆在禹貢雍州之域荆山終南敦物之野東井輿鬼之分鶉火之次也焦贛易林曰舜升大禹石夷之野徵詣王庭拜治水土又曰多載重負捐棄於野但徒勞苦顧無誰予水經注曰自朝歌以南暨清水土地平衍據臯跨澤悉坶野矣郊説文曰距國百里曰郊爾雅曰邑外曰郊易曰密雲不雨自我西郊又曰同人于郊詩曰孑孑干旄在浚之郊又曰逝將去汝適彼樂郊禮記月令曰立春之日天子親率公卿諸侯大夫以迎春於東郊又曰天子親耕於南郊以共粢盛皇后蠶於北郊以共純服諸侯耕於東郊亦以共粢盛夫人蠶於北郊以共冕服又曰因吉土以饗帝於郊周禮曰閭師掌國中及四郊之人民六畜之數以任其力以待其政令以時徵其賦太平御覽卷五十五
