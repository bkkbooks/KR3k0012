  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_746-1a, image: WYG0899/WYG0899-0559c.png}
body:
  text: 太平御覽卷七百四十六宋李昉等撰工藝部三射下御射下吕氏春秋曰射杓者欲其中小也射獸者欲其中大也物固不必可推又曰荆廷嘗有白猨荆之善射者莫之能中荆王請養由基射之養由基矯弓操矢而往發之則猨應矢而下白虎通曰天子所以親射何助陽氣達萬物也春陽氣微弱恐物有窒塞不能自達者天子射熊何示服猛逺巧物也熊為獸猛巧者也非但當服猛巧者示當服天下巧佞之臣也諸侯射麋何示逺惑人者也麋之為言迷也大夫射虎豹何示服猛也士射鹿豕何示除害也各取徳而能服也大夫士射兩物何大夫士俱人臣隂數偶也侯者以布為之何布者用人事之始也本正則末正矣名之為侯者何明諸侯有不朝者則當射之君子重同類不忍射之故畫獸射之射主何為乎曰射義非一也夫射者執弓堅心平體正然後中也二人争勝樂以養徳也勝負但降以崇禮讓故可以選士夫勝者發近而制逺選士所以助微抑強調和隂陽戒不虞也天子射百二十歩諸侯九十歩大夫七十歩士五十歩明尊者所服逺卑者所服近也列女傳曰晉平公使工為弓三年乃成射不穿一札公怒将殺工其妻見公曰妾之夫造此弓亦以勞矣而不穿一札是君不能射也妾聞射之道左手如矩右手如附枝右手放發左手不知公以其言為儀儀法而穿七札弓工立得出賜金三鎰英雄記曰袁術遣将紀靈率歩騎三萬攻劉備吕布遣人招備并請靈等饗飲謂靈曰布性不喜合鬭但喜解鬭耳乃令植㦸於營門彎弓曰諸君觀布射㦸小支中者當解兵不中留决鬭布一發中㦸支遂罷兵西亰雜記曰茂陵人周楊本琅邪人善馴野鷄以為媒用以射雉每三春之月茒障自翳用鮭古述切矢以射之日連百數茂陵輕薄者化之皆以雜寳錯厠翳障輕騎妖服追隨於道路以為歡娛楊死其子亦善其事董司馬好之以為上客典論曰文帝自叙曰少好弓馬逐禽輙十里射常出百歩後獩貊貢良弓燕代獻名馬於鄴西獵終日獲獐鹿九雉兔二十後尚書令荀彧聞余曰又君善左右射此實難能余曰執事未覩凡埓有常徑的有定所雖矢發輙中非妙也若夫馳平原赴豐草逐狡獸截輕禽使弓不虛彎矢不虚發此乃妙爾山海經曰軒轅國在窮山之際不敢西射畏軒轅之丘故也言敬畏黄帝威靈故不敢向之射也論衡曰養由基見寝石以為虎射之飲羽案精誠所感不過入一寸耳今勇夫卒見寝石以手推之能令石有跡乎射經曰夫射者所以觀徳也不能則辭之以疾縣弧之義在焉故曰和容為上主皮為次并之者又何加矣乃君子之所争也雖欲勿用禮其捨諸乎集殺戲論曰禮記有投壺之宴論語稱博奕之賢茲三戲者君子末事不足為也樗蒲彈碁既不益人又國有禁皆不得為也吾見坐圍碁而死近事非逺昔晉侯以投壺喪宋公好博奕亡豈不哀哉諸戲中唯有射者男子之事在於六藝若欲戲惟得射而已其餘不得為也曹植樂府歌曰控弦破左的發矢催月支仰手接飛猱俯身散馬蹄又曰鬭鷄東郊道走馬長楸間驅馳未能半䨇兔過我前攬弓挾鳴鏑長驅上南山左挽因有發一縱兩禽連餘巧未盡展仰手接飛鳶觀者咸稱善衆工歸我妍御書曰若朽索之御六馬禮曰君將駕則僕執策立於馬前監駕且為馬行已駕僕展軨展軨具視效駕自已駕矣奮衣右上取貳綏奮振去䴢也貳副也跪乘未敢立散也執䇿分轡驅之五歩而立調試之也君出就車則僕并轡授綏車上僕所立也左右攘辟謂羣臣陪位侍駕者也攘却也或音攘古讓字也車驅而騶至于大門君撫僕之手而顧命車右就車門閭溝渠必歩車右勇力之士備制非君行則陪乘君式則下歩常行者也凡僕人之禮必授人綏若僕者降等則受不然則否若僕者降等則撫僕之手不然則自下拘之撫小止之謙也自下拘之由僕手下取之也僕與己同爵則不受又曰魯荘公及宋人戰于乘丘縣賁父御卜國為右馬驚敗績公隊佐車授綏公曰末之卜也縣賁父曰他日不敗績而今敗績是無勇也遂死之圉人浴馬有流矢在白肉公曰非其罪也遂誄之周禮曰教國子以五馭一曰鳴和鑾二曰逐水曲三曰過君表四曰舞交衢五曰逐禽左論語曰子謂門弟子曰吾何執執御乎執射乎曰吾執御矣大戴禮曰善御馬者正銜勒齊轡䇿均馬力和馬心家語曰閔子騫為費宰問政於孔子孔子曰以徳以法夫徳法者御民之具猶御馬之有御勒也君子人也吏者轡也刑者䇿也君子之政執其轡䇿而已矣又曰子貢問治人於孔子孔子曰懔焉如與腐索御扞馬懔懼也扞馬扞突之馬也國語曰鐵之戰簡子曰鄭人繫我吾伏弢流血鼓音不衰今日之事莫我若也衛荘公為右衛荘公奔晉趙簡子將納之為右也曰吾九登九下擊人盡殪今日之事莫我加也郵無正御曰吾兩鞁將絶吾能止之郵無正大夫王良也鞅引也今日之事我上之次也駕而乘材材横木也兩鞁皆絶史記曰周穆王乘驊騮騄耳使造父為御日行千里往見西王母荘子曰東里稷以御見荘公進退中繩周旋中規荘公為遺父弗過也顔闔遇之入見曰稷之馬将敗公宻而不應少焉果敗而反公曰子何以知之曰其馬力竭矣而猶求焉故曰敗列子曰造父師曰泰豆氏造父之始從習御也執禮甚卑泰豆氏三年不告造父執禮愈謹廼吿之曰古語曰良弓之子必先為箕良冶之子必先為裘汝先觀吾趨趨如吾然後六轡可持六馬可御造父曰唯命所從泰豆氏乃立木為塗僅可容足計歩而置之履之而行趨走往還无跌失也造父學之三日盡其巧泰豆嘆曰子何敏也得之㨗乎御者亦如此也曩汝行之於足應之於心推於御也齊輯乎轡銜之際急綏乎脣吻之和正度乎胷臆之中執節乎掌握之間内得於中心外合於馬志是故能進退履繩而旋曲中規取道致逺而氣力有餘誠得其術矣得之於銜應之於轡得之於轡應之於手得之於手應之於心則不以目視不以䇿驅心閑體正六轡不亂二十四蹄所投无差廽旋進退莫不中節然後車輪之外可使无餘轍馬蹄之外可使无餘地未嘗覺山谷之險原隰之夷視之一也吾術窮矣汝其識之管子曰造父善御者也善視其馬節其飲食量其馬力故能取逺道而馬不罷明王猶造父也善治其民度量其力也孟子曰昔者趙簡子使王良與嬖奚乘終日而不獲一禽嬖奚反命曰天下之賤工也或以告王良良曰請復之強而後可一朝而獲十禽嬖奚反命曰天下之良工也韓子曰鈆陵卓子乘蒼龍桃文乘鈎錦在前錯錣在後馬欲進則鈎錦之欲退則錯錣貫之馬因旁出造父過之而為之泣孫卿子曰定公問於顔闔曰車野蓽之御善乎對曰善則善矣然馬將為佚定公不説入謂左右曰君子固誣人乎三日而牧來謂之曰東野蓽之馬佚南驂引兩股入廐定公越席而起召顔闔曰子言東野蓽其馬将佚不識何以知之對曰臣以政知之昔舜巧於使民而造父巧於使馬舜不窮其民造父不窮其馬是以舜無佚民造父無佚馬今野蓽之御上車執轡御體正矣歩驟馳騁朝禮畢矣歴險致逺其力盡矣然而求馬不已是以知之公曰善哉尸子曰夫馬者王良御之則和馴端正致逺道矣僕人御之則遲奔毁車矣民者譬之馬也尭舜御之則天下端正桀紂御之則天下奔於歴山淮南子曰急轡數䇿者非千里之御也又曰御者非轡不行學御者不為轡也又曰舟覆乃見善游馬奔乃見良御善游故覆舟不溺良御故馬奔車不敗又曰夫載重而馬羸雖造父不能以追急車輕而馬良雖中工可以致逺又曰良馬不待䇿錣而行駑馬雖兩錣之不能進為此不用䇿錣而御之則愚矣又曰若夫鉗且大丙之御也除轡御棄菙䇿車莫動而自舉馬莫使而自走星燿而𤣥運電奔而鬼駭進退詘伸不見塍毁又曰尹需學御三年而無得焉常寝想之中夜夣受秋駕於師秋駕善御之術明日往朝師望而謂之曰吾非愛道於子也恐子不可予也今日将教子以秋駕尹需反走北面再拜曰臣有天幸今夕固夢受之又曰夫馬之為草駒之時跳躍揚蹄翹尾而走人不能制馬五尺以下為駒故在草中故曰為草駒之時翹舉也制禁也及至圉人擾之良御教之圉食馬官擾順也掩以衝扼連以轡御則雖歴險趨塹弗敢違戾故其形之為馬其可駕御教之所為也又曰夫御者馬體調乎車御心和乎馬則雖歴險至逺進退周旋無不如意雖有騏驥騄耳之良而使烏獲御之則馬反自恣而人不御也太平御覽卷七百四十六
