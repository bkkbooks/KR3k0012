front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_666-1a, image: WYG0899/WYG0899-0014a.png}
body:
  text: 太平御覽卷六百六十六宋李昉等撰道部八道士太霄經曰人行大道謂之道又云從道為事故稱道士周穆王因尹軌真人制樓觀遂召幽逸之人置為道士平王東遷洛邑置道士七人漢明帝永平五年置二十人魏武帝為九州置壇度三十五人魏文帝幸雍謁陳熾法師置道士五十人晉惠帝度四十九人給户三百真誥曰劉翊字子相後漢人也世居頴川家富以濟貧為事為陳太守後去官入山為道士又曰淳于斟字叔顗㑹稽人漢桓帝時為縣令入山修道又曰劉寛字文饒後漢南陽太守年七十三入華山服丹棗又曰王郎字法明太原人也入茅山師陶隠居以梁大通三年正月十四日化隠居為制銘誌并設奠云紱冕豈榮渭璜非寳萬里求真緘兹内抱又曰陶𢎞景父真寳清辨有才學工草𨽻閑騎射藥術而陶隠居亦善𨽻書雖効王書而别為一法文章尺牘為世所重又曰孫韜字文藏㑹稽剡人也入山師潘四明叅受真法學摹冩遂大巧妙後學玉書殊有深意當時稱之南洞大碑及許長史壇碑並是韜跡也陶隠居手為經題握中秘訣門人罕能見之惟傳孫韜與桓闓音開二人而已矣又曰朱仲嘗於㑹稽賣珠漢髙后時人也仲以素書貰酒於女凡家因盜寫學其術又曰道士不欲臨䘮損神壊氣所以去世不仕而獨存焉惟父母及師不懼性命之傷必臨其䘮以此而傷是無傷也抱朴子曰薛振字季和燕代人周武王時學道於鍾山北河經七試而不遇者由淫泆鄙滯敗其試耳又曰郭文舉河内軟縣人入陸渾山學道獨能無情意不生也又曰呉大帝時蜀中有李阿者宂居不食累世見之號曰百歳翁人徃問事阿無所言但占阿顔色若欣然則事吉若慘戚則㓙若含笑則大慶㣲歎則深憂如此候之未曾不審也一旦忽去不知所之又曰范零子少好仙道如此積年後遇司馬季主季主同入常山積七年入石室瓮季主出行懇戒之曰慎勿開零子忽發視之季主還乃遣歸後復召至使守一銅匱又戒勿發零子復發之季主乃遣之遂不得道又曰馮良者南陽人少作縣吏年三十為尉佐史迎督郵自耻無志乃毁車殺馬裂敗衣裳去從師受詩傳禮易復學道術占候遊十五年乃還州郡禮辟不就詔特舉賢良髙第平道委還家年六十七棄世東度入山在鹿迹洞中又曰安丘望之字仲都京兆長陵人也修尚黄老漢成帝從其道德常宗師之愈自損退成帝請之若值望之齋醮則待事畢然後徃老子章句有安丘之學望之忽病篤弟子公沙都侍於庭樹下望之自知病有痊時冬月鼻聞李香開目則見雙赤李著枯枝望之仰手承李自墜掌中因食李所苦盡除身輕目明遂去莫知何在也道學傳曰燕濟字仲㣲漢明帝時人也少好道德不仕周逰名山後居武當山􅃦息無常所或因積石或倚大樹四時衣服不變􅁪散髮亦著練巾又曰鮑靚字大𤣥上黨人也漢司𨽻鮑宣之後禀性清慧學通經史修身養性蠕而允切動不犯聞人之惡如犯家諱人多從受業楊道化物號曰儒林又曰王嘉字子年隴西人也來東陽谷口鑿􅜌穴居其徒數百各自穴處為人貎短陋而聦察滑稽有問世事善惡終不直說過率有驗又曰嚴遵字君平蜀郡人也修道自保與人子言孝與人臣言忠與人弟言順各因其法導之以善又曰王逺字方平常降蔡經家須臾麻姑至騎從半於方平麻姑手爪如鳥經私心曰時背癢得搔之佳也方平曰姑神人汝何􅃍此遂鞭之經願從方平學道方平使背立從後觀之曰心邪不可教之仙道乃與度世術又曰庾承先字崇光頴川人明老莊隠文江縣土臺山立廬舍講肄儒士釋老受其學隠居江南累詔不出後來始興講道德經剖析凝滯又曰薛玉字世寳沛國人也梁時師𤣥圃先生以文章見美善書翰嘗書一章於崇靈觀道正省壁上見者翫之也又曰東鄉宗超字逸倫髙密黔陬人也嘗露壇行道奩中香盡自然滿溢又爐中無火而烟氣自生氤氲周遍久之不歇又曰張裕天師十二世孫起招真觀植名果盡山栖之趣梁簡文為製碑又曰昔晉陵人錢妙真茅山鷰口洞得道門人立碑於茅山邵陵王親為序今具存焉又曰梁武帝天監二年置大小道正平昌孟景翼字道輔時為大正屢為國講說四年建安王偉於座問曰道家經教科禁甚重老子二篇盟誓乃授豈先聖之㫖非凢所說耶景翼曰崇秘嚴科正宗妙化理在相成事非乖越又曰劉法先彭城人也時顧歡著道經義於孔徳璋多有與奪法先與書討論同異顧遂屈服乃答曰自古之遺狂水火不避得足下此箴始覺醒悟既徃狂言不足在恠又云法先每見道釋二衆亟相是非乃著息争之論顧歡又作夷夏辯或及三科論明釋老同異又曰張詵呉郡嘉興人也善𤣥言屢講老子修行上道討論上經人自逺集也詵尋求真秘甚識宗尚又曰陳景尚呉人也善講誦道釋中皆不能及制靈書經大行於世梁邵陵王甚重之後景尚隨王之郢終於江夏又曰桓闓字音舒東海丹徒人也梁初崑崙山渚平沙中有上古漆笥内有黄素冩千君所出太平經三部村人驚異於經所起院供養先呈陶隠居隠居云此真干君古本闓將經至都便苦勞瘧諸治不愈陶隠居聞云此病非他恐取經為咎何不送經還本限依二日送尋愈又曰曹寳字世真丹陽人善為歩虛兩京冠絶貴逰見者皆穪賞焉又曰嚴智明字惠識晋陵人也受性有善聲㓜工誦詠齊明帝有疾每引法衆於内殿行道聞智明詠經甚懐賞恱云疾為之愈及法席既觧智明還外帝中夜不安􅃦勑呼智明對御轉誦即覺歡又曰徐師子字德威東海人也陳武帝立宗靈大觀引德威為觀主後卒文皇勑賫秘器葬焉太平經曰嚴寄之字靜處丹陽句容人也為道士事親至孝住石渚觀母老不敢逺離乃迎母於觀邊立小屋以盡温清母終毁瘠過禮識者嘉之又曰郗愔字方回髙平金鄉人為晉鎮軍將軍心尚道法宻自遵行善𨽻書與右軍相埒手自起冩道經將盈百卷于今多有在者又曰張孝秀以王元䂓筆跡妙巧頻相請屈元䂓但翫泉石終日撫琴嘯詠了不執筆臨還止為行書數行而已孝秀雅相憚弗敢固祈今簡寂館長牓猶有筆跡也又曰許思𤣥者許逺逰之弟也生而好道儒雅知名晉簡文帝為俗外之交也又曰任敦尚慱昌人永嘉中投茅山講道集衆敦竊歎曰衆人雖云慕善皆外好耳未見真心可與斷金者又曰晉陸納為尚書令時年四十病瘡告杜恭云奕世短壽臨終皆患此瘡恭為奏章又與雲飛散謂納曰君命至七年果如其言王右軍病請恭恭謂弟子曰右軍病不差何用吾十餘日果卒又曰蔣負芻義興人也與晉陵薛彪之為俗外之交去來茅山有志栖託齊永明中暫徃陶隠居一過便盡素契陶後觧紱結宇中茅中茅山也仍請負度嶺相就經典藥術常共論之又曰楊超字超逺東海人也入山事陶隠居徃復與陶論難得為入室又曰諸慧開字智逺呉興烏程人也每以戒行自修拯濟為務齊大明八年天下飢饉慧開有少糓實乃賑鄉邑頼之有三人積饑食飽而致死其家訴縣穪慧開飼殺餓人苦相誣謗邑令笑曰乞食飽死反怨主人法無此科遣而不問又曰濮陽者不知何許人事道專心祈請皆驗鄭鮷音帝女足跛陽療之尋差晋簡文廢世子無嗣時使人祈請於陽於是中夜有黄氣起自西南遥墮室爾時李皇后懐孝武又曰許邁字叔元少名映後改名逺逰志求仙道入臨安西山經日不返亦不知所之先娶散騎常侍呉郡孫宏女為妻邁居臨安山中為書謝遣其妻云欲聞懸溜之響山鳥之鳴自為蕭韶九成不能勝也偶景青葱之下栖息巖岫之室以為殿堂廣夏不能過也情願所終志絶於此吾其去矣長離别矣又曰禇伯玉字元璩呉郡錢塘人早慕冲虛年十八父為娶婦入前門伯玉後門出徃剡居瀑布山性耐寒暑在山三十餘年隔絶人事一說云伯玉初遊南岳路入閩中飛湍走險伯玉泊舟晩瀬衝颷忽起山水暴至激船上巔崩落絶嶂徒佀以為水漬縁阻尋求見伯玉自若以小杖撝舟渉不測之泉衆以駭伏入霍山而去初隠瀑布山齊髙祖欽其風欲與相見辭以疾而去帝追恨詔瀑布山下立太平觀孔稚圭立碑又曰張陵博學及河洛天文悉窮其妙静處衡門不求聞逹彈琴詠詩順志而已又曰龍威丈人山中得道者也時人莫知其名號曰山隱又曰陶𢎞景字通明丹陽秣陵人也自號華陽隠居常謂人曰我心恒如懸鏡觸物不遺好行隂德拯濟困窮合施諸藥逺近賴之平生嘗晝眠㸔書必至半夜好聞松風之聲少絶肥羶晩惟進飢音餕苔紫菜生姜飲酒能至一斗而㫁不進也又曰孔靈産㑹稽山隂人也遭母憂以孝聞宴酌珎羞自此而絶饘蔬布素志畢終身父見過毁惻然命具饌靈産勉從父命咽以成疾父以人有天性不可移遂不復逼深研道幾遍覽仙籍宋明帝於禹宂之側立懐仙觀詔使居之遷大中大夫加給事髙帝賜以鹿巾猿裘竹素之噐手詔曰君有古人之風賜以林下之服登從之日可以相存也又曰張繹字世和吳郡人也奬勵學徒整肅法事屢講衆經理致深宻詞端華辨當時所宗梁武帝雅相欽賞時陶隠居著法檢論明釋老二教繹徃復討論甚有條理隠居嘉焉專心道法居貧守約善八體書别制雲篆作茅山南洞碑甚工又曰宋文同字文明呉郡人也梁簡文時文明以道家諸經莫不敷釋撰靈寳經義疏題曰謂之通門又作太義淵學者宗賴四方延請長於著撰訥於口辭又曰王遂起太原人為集真觀主性少眠縱卧熟猶覺人語言論相渉即領其辭莫不嘆其清悟又曰晝夜不卧日月合光太平御覽卷六百六十六
