body:
  text: 太平御覽巻三百五十七宋李昉等撰兵部八十八楯下彭排銜枚棓椎楯下春秋元命苞曰帝梏戴干是謂清明發節移度蓋象招搖宗均曰干楯招搖為天戈戈楯相副戴之者象見天中以為表者也史記曰項羽在戲下欲攻沛公沛公從百餘騎因項伯面見羽謝無有閉闗事羽既饗軍士中酒亞父謀欲殺沛公令項莊抜劒舞坐中欲擊沛公樊噲在營外聞事急乃持劒楯入營衛士止噲噲直撞入立帳下羽目之問為誰良曰沛公參乘樊噲羽曰壯士賜之巵酒彘肩噲既飲酒抜劒切而㗖之羽曰能復飲乎曰臣死且不避豈特巵酒乎漢書曰周亞夫子為父買尚方甲楯五百被張晏曰被具也可以葬者取傭苦之不與錢傭知其盜買縣官噐怨而上變告子事連汚亞夫亞夫嘔血死又曰晁錯上言曰曲道相伏險阨相薄此劒楯之地也弓弩三不當一謝承後漢書曰孟政字子節地皇六年為府丞虞卿書佐時太守缺丞視事毗陵有賊丞討之未到縣道路逢賊吏卒迸散政操刀楯與賊相擊丞得免難政遂死於路又曰江漢字子甫遷丹陽太守是時大江劇賊余來等刦擊牛渚丹陽邊水諸縣居民敺略良善經嵗為害漢到郡㑹集勁士脩整戰具鈎鑲刀楯大㦸長矛弓弩勁兵轉送承接余來亟戰失利遂見梟獲孝順帝喜其功賜以劒珮後漢書曰袁紹為髙㯭起土山射曹操營中皆蒙楯而行東觀漢記曰逢萌字子康北海人少有大節家貧給事為縣亭長尉過迎拜問事尉去舉楯撾地歎曰大丈夫安能為人後耶遂去學問魏志曰建安五年太祖軍於官渡袁紹進保武陽稍前依沙塠為屯合戰不利紹射營中雨下行者皆􅂪楯衆以大懼又曰太祖與吕布戰太祖募䧟陣典韋先將應募者數十人皆衣兩鎧棄楯但持長矛撩㦸魚豢魏畧曰鮑出字文才京兆新豐人也遊俠興平中三輔亂出毋為賊所畧出攘臂結袵獨持楯追之行數里及賊殺數十餘人賊乃解還毋韋昭吳書曰魯肅欲渡洱衆騎追肅肅植楯引弓射之矢貫洞騎度不制乃相率還吳録曰交趾朱鳶縣有㯽榔正直髙六七丈葉大如楯王隠晉書曰朱伺字仲文小為才門將陶丹給使吳平内涉江夏便鞍馬弓弩刀楯射獵于寶晉記曰吳軍師張悌帥衆一二萬濟江與討吳護軍張翰揚州刺史周陵成陣相對沈瑩領丹陽銳卒刀楯五千號青巾兵屢䧟堅陣沈休文宋書曰宗越南陽葉人也為隊主蠻有為冦盗者常使越討伐徃輙有功家貧無以市馬刀楯步出单身挺戰衆莫能當每一㨗郡將就賞錢五千因此得買馬宋略曰寧朔將軍益州刺史劉豪少工刀楯勇冠三軍及在漢中忽修長生之術使道士合金丹餌之咽而死及就殮尸弱如生宋元嘉起居注曰御史中丞劉損奏風聞前廣州刺史韋朗蒞任虐法暴濁是彰於州所造牙楯三十幡朱畫青綾楯三十五幡請以見事追免朗前所居官南史王洪軏侍髙帝以身捍矢髙帝曰我有楯卿可自防答曰天下無洪軏何有哉蒼生方亂豈可一日無公矣帝甚賞之齊書曰王宜興吳興人也形狀短小而果勁有膽力少年時為刼不須伴郡縣討逐圍繞數十重終莫能禽賞舞刀楯使十餘人以水交灑不能著北史曰後魏蠕蠕犯塞以任城王雲為中軍大都督從獻文討之過大磧雲曰夷狄馬初不見虎頭楯若令舞楯在前破之必矣帝從之於是相率而歌方駕而前大破之獲其兇酋英雄記曰公孫伯圭追討叛胡丘力居等于管子城伯圭力戰兵乏食馬盡煑弩楯啖食之又曰袁紹討公孫瓚先令趨義精兵八百強弩千張以為前登瓚輕其兵少總騎騰之義兵伏楯下一時同發瓚軍遂大敗蔡邕月令章句曰洪範經云兵革並起兵謂金刃革謂甲楯又曰審五庫之量金鐡皮革張敞晉東宫舊事曰東外崇福門門各羗楯士幡雞嗚㦸十張陶公故事曰臣侃奉獻金華大羗楯五十幡青綾金華楯五十旛王琰冥祥記曰東海何敬叔少而奉佛至泰始中隨湘中刺史劉韞監營浦縣敬叔時遇有㫋檀製以為像像將就而未有光材敬叔意願甚懃而營索無處慿几微睡見沙門語敬收云縣後何家有一桐楯甚堪像光其人極惜之苦求可得也敬叔窹問縣後果有何家因求買楯何氏云實有此楯甚愛惜之明府何以得知敬叔具說所夢何氏驚奉以製光山海經曰羿與鑿齒戰于壽華之野羿射殺之羿持弓矢鑿齒持盾㦸郭璞曰鑿齒人類齒如鑿長五六尺又曰開明北有鳳鳥鸞鳥背戴楯張華博物志曰朝廷都許時上先人刀劒楯物及銅大盆殿上四角鼎皆先後所賜得也劉義慶世說曰魏武征袁本初治裝餘有數十斛竹片咸長數寸衆並謂不堪用正合燒除太祖意甚惜思所以用之謂可以為竹甲楯而未顯其言馳使以問楊主簿德祖應聲荅與帝正同衆伏其辯悟異苑曰河南禇襄字季野將北伐車士忽同時唱言可各持兩楯復相謂曰一人焉用兩為及敗悉負㯭而退國語曰桓公問曰齊國寡甲兵為之若何管子曰輕過而移諸甲兵賈逵曰輕過輕罪也移諸甲兵以甲兵贖罪也桓公曰為之若何管子對曰輕罪贖一楯一㦸潛夫論曰虜或持銅鏡以象兵或負板案以類楯遑遽擾攘未能相一誠易制也淮南子曰夫括淇衛菌蕗音路髙誘曰栝剪括也淇衛菌蕗箭所出也載以銀錫載飾也飾翦以銀錫雖有薄縞之䄡腐荷之櫓荷蓮草也櫓大楯也然猶不能獨穿也若假之筋角之力弓弩之勢則貫兕甲而經革楯矣楊泉物理論曰古有邟帥之刀蘇家之􅚛皆為良工利噐時所寶貴也夫刀者身之寶也楯者身之衛也禦難之藩牆守之城池也夢書曰夢得鑲楯憂相負也漢書揚雄校獵賦曰賁育之倫􅂪楯負羽杖鏌鎁而羅者以萬計吳都賦曰􅀈神龍之華殿施榮楯而㨗獵勾踐將伐吳作榮楯嬰以白璧鏤以黄金狀若龍蛇以獻吳王王受之施於姑蘇臺姑蘇臺㨗獵例次貌也言今起神龍殿亦施此物也又曰干鹵鋋𤾉夷勃盧之施又曰家有鶴膝户有犀渠李尤楯銘曰吳旂魯瞂戎兵特須也張奐與崔子真書曰僕以元年到任有見兵二百馬如犃羊矛如錐錟楯如榆葉陶侃答慕容瓌書曰當今揚淮銳勇飛亷超驥收屈盧必䧟之矛集鮫犀不入之楯庾闡責五員文曰自我來思踰歴中春凄風跨月芒雨積旬地藉濕蓐室無完幕負楯傳時仗櫓擊柝謝尚餉楊征南書曰五尺金斷頭刀一口碧綾車中楯一審又與張凉州書曰今致碧綾車中楯一彭排釋名曰彭排旁也在旁排敵禦攻也晉安帝紀曰劉裕大破孫恩於麻山恩以彭排自載僅得還船諸葛亮軍令曰帳下及右陣各持彭排銜枚詩曰我東曰歸我心西悲制彼裳衣勿士行枚鄭𤣥曰勿猶無也示初無行陣銜枚之事者也禮記曰升正柩諸侯執綍五百人皆銜枚周禮曰銜枚氏下士二人徒八人鄭𤣥曰枚狀如箸横銜之銜枚氏掌司􅅝察􅅝讙者謂其聒亂國之大祭祀令禁母􅅝軍旅田役令銜枚為其言語以相誤也國語曰吳王起師軍于江北王軍于江南越王乃令左軍銜枚泝江五里以役亦令右軍踰江五里以須賈逵逆流而上曰泝徑渡日踰須待也夜中乃令涉江鳴鼓中水以須越王以其中軍私率六千人銜枚以襲攻之吳師大北史記曰項梁率師攻秦秦使章邯距梁章夜銜枚擊楚殺項梁陸賈楚漢春秋曰髙祖向咸陽南趣宛宛堅守不下乃匿其旌旗人銜枚馬束口龍舉而翼奮鷄未鳴圍宛城三匝宛城降漢書曰秦將章邯圍魏王咎於臨濟田儋將兵救魏章邯夜銜枚擊大破齊軍殺儋於臨濟下又曰趙充國擊西羗至金城須兵滿萬騎欲渡河恐為虜所􅃒即夜遣三校銜枚先渡渡輒營陣會明畢東觀漢記曰吳漢伐蜀分營於水南水北北營戰不利乃銜枚引兵往合水南營大破公孫述梁祚國統曰孫權嘗賜甘寧酒米寧以米賜帳下乃以銀碗酌酒自飲次與其郡督次酌其次命銜枚出斫敵王隠晉書曰毋丘儉文欽反遣鄧艾進屯樂嘉欽果夜銜枚襲艾等昩爽至於城下又曰王浚都督幽州諸軍事成都王使和演發兵殺浚單于以演謀告浚州府逼近衘枚密嚴夜與單于圍演演持白旛請降孫嚴宋書曰柳元景總軍北討元景至𢎞農營於開方口衆軍並造陜下元景遣軍副柳元怙簡步騎二千一宿而至遂合戰元怙悉偃旗鼓士馬皆衘枚潜師伏甲而進既出賊不意虜衆大駭王智深宋書曰劉誕作亂􅍿武帝使沈攸等伐之於是龍驤將軍卜天生推車塞塹率敢死數百人衘枚先登習鑿齒漢晉陽秋曰初魏軍始入蜀劉禪分二千人付羅獻留守吳聞蜀敗遂起兵遣盛憲謝詢等水陸並到說獻以合從之計獻謂諸將曰今據孤城百姓無主吳人因釁公敢西過宜一决戰以示衆心遂衘枚夜出擊破憲盧綝晉四王起事曰天子自鄴至洛右將軍張方逼帝幸長安河間王率參佐到灞水上迎人兵去路百餘歩枚衘屯列崔鴻後秦録曰永和二年遣武衛姚鸞營於大路晉將沈林子簡其軍中精銳朱逺等衘枚夜襲鸞營鸞死之又前凉錄曰張璩字元琰年十四拜奉車都尉從梁肅征隴右與王擢遇於邢崗相拒十日璩衘枚密擊大破之由是顯名又蜀録曰李特使弟驤屯軍毗橋以備羅尚尚遣將張興偽降於驤以觀虛實興夜歸白尚尚遣精勇萬人衘枚隨興夜襲驤營驤及將士奔於流栅越絶書曰吳王闔閭問伍子胥軍法子胥曰王身將即疑船旌麾兵㦸與王船等者七艘將軍疑船兵㦸與將軍船等三船皆居於大陣之左右有敵即出就陣吏卒皆衘枚敖歌擊鼓者斬曹瞞傳曰公將襲袁紹軍乃選精銳歩騎皆銜枚縳馬口夜從間道出人抱束薪至紹圍屯大放火營中驚亂大破之太公六韜曰以少擊衆必以日之暮人操炬火合則㓕之或鼓呼而行或銜枚而止吳孫子三十二壘經靈輔曰移車移旗以順其意銜枚而陳分師而伏後至先擊以戰則克魏文帝兵書要畧曰銜枚毋讙譁唯令之從左思吳都賦曰銜枚無聲悠悠斾旌棓服䖍通俗文曰大杖曰棓魏志曰鍾會反囚將軍胡烈等與子䟽云會帳下督丘建密說消息會已作大坑白棓數千欲呼外兵入以次棓殺投置坑中外兵乃殺會曹瞞傳曰操為洛陽北部尉繕治四門造五色棒懸門左右各數十條有犯禁者不避豪強輙棒殺之虞翻江表傳曰孫皓以張布女為美人皓先殺布後問美人曰爾父何在答曰賊已殺之皓大怒即棒殺美人沈約宋書曰後廢帝昱或有忤意者輙加以虐刑有白棓數十枚各有名號鍼鑿錐鋸之徒不離左右嘗以鐡錐錐人隂破六韜曰方胥鐡棓重十二斤柄長五尺千二百枚一名天棒許慎注曰大杖以桃為之擊殺羿是以鬼畏桃人也抱朴子曰吳遣將軍討山賊中有善禁者每交戰官軍刀劒皆不得㧞將軍乃多作勁木白棒擊之禁不復行因而剋賊又曰余願世人改其無檢之行除其驕簡之失則趙勝之門無去客黃祖之棒無所用矣晉宣帝教曰當敎諸圍上守土皆作棒人一枚輕重長短者各各可守皆當頭施紉挂臂賊破死在旦夕邂逅衝突圍當以棓棓之髙堂隆陳灾異表曰石氏星占曰天棓五五星之杖也主撾棓亂兵客星彗茀干犯棓兵大起二年消復之宜罷省百役勿使士卒怨於勤苦而為亂足其廪食度可勞然後用之則士卒安而無亂兵矣椎史記曰張良為韓報讎得力士為鐡椎重一百二十斤擊始皇愽浪沙中誤中副車又曰朱亥袖四十斤鐡椎椎晉鄙漢書曰淮南厲王長髙帝少子也有才力力扛鼎乃徃請辟陽侯岀見之即自袖金椎椎之命從者刑之太平御覽巻三百五十七
