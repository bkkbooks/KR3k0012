body:
  text: 太平御覽卷一百十七宋李昉等撰偏霸部一蜀先主後主先主蜀志曰先主姓劉諱備字𤣥徳涿州人漢景帝子中山靖王勝之後也勝子負元狩六年封涿縣陸城亭侯坐酎金失侯因家焉典畧云備本臨邑侯支屬先主祖雄父𢎞世仕州郡雄舉孝亷官至東郡范令先主少孤與母販履織席為業舍東南角籬上有桑樹上髙五尺餘遙望重重如小車蓋往來者皆恠此樹非凡或謂當出貴人漢晉春秋曰涿人李定云此家必出貴人也先主少時與宗中諸兒於樹下戲言吾必當乗此羽葆蓋車叔父子敬曰汝勿妄語㓕吾門也年十五母使行學同宗劉徳然遼西公孫瓉俱事故九江太守同郡盧植徳然父元起常資給先主與徳然等元起妻曰各有一家何能常爾耶起曰吾宗中有此兒非常人也瓉深與先主相友瓉年長先主以兄事之先主不甚樂讀書喜狗馬音樂美衣服身長七尺五寸垂臂下膝顧自見耳少言語善下人喜怒不形于色好交結豪俠年少爭附之中山大商張世平蘓雙等貲累千金販馬周旋於涿郡見而異之乃多與之金財先主由是得用合徒衆靈帝末黄巾起州郡各舉義兵先主率其屬從校尉鄒靖討賊有功除安喜尉大將軍何進遣都尉毌丘毅詣丹陽募兵先主與俱行至下邳遇賊力戰有功除為下密丞復去官后為髙唐尉遷為令為賊所破往奔公孫瓉表為别部司馬使為青州刺史田楷以拒冀州牧袁紹數有戰功試守平原令后領平原相郡民劉平素輕先主恥為之下使客刺之客不忍刺語之而去其得人心如此袁紹攻公孫瓉先主與田楷屯齊東曹公征徐州牧陶謙遣使告急於楷楷與先主俱救之時先主有兵千餘人謙以丹陽兵四千人益先主遂去楷歸謙謙表先主為豫州刺史屯小沛謙病謂别駕糜竺曰非𤣥徳不能安此州謙死竺帥州人迎先主先主未敢當下邳陳登謂先主曰今漢室凌遲海内傾覆立功立事在於今日彼州殷富户口百萬欲屈使君撫臨州事北海相孔融謂先主曰今日之事百姓與能天與不取悔不可追先主遂領徐州袁術來攻先主先主拒之於盰眙淮隂曹公表先主為鎮東将軍封宜城亭侯是嵗建安元年也先主與術相持經月吕布乗虛襲下邳下邳守将曹豹反間迎布布虜先主妻子先主求和於布布還其妻子先主還小沛復合兵得萬餘人布惡之自出攻先主先主敗走歸曹公曹公厚遇之以為豫州牧曹公助先主圖布於下邳生擒布先主復得妻子從曹公還許表先主為左将軍禮之愈重出則同輿坐則同席袁術欲經徐州北就袁紹曹公遣先主督朱靈路招要擊術未至術病死曹公從容謂先主曰天下英雄唯使君與操耳本初之徒不足數也先主方食失匕箸先主據下邳殺徐州刺史車胄留闗雲長守下邳自還小沛曹公東征先主敗績曹公盡收其衆虜先主妻子并擒雲長以歸先主走青州青州刺史袁譚先主故茂才也将步騎迎先主先主隨譚到平原馳使白紹紹遣将道路奉迎身去鄴二百里與先主相見雲長亡歸先主曹公遣曹仁将騎擊先主先主還紹軍隂欲離紹乃説紹南連荆州收劉表紹遣先主將本兵復至汝南遣縻竺孫乾與劉表相聞表自郊迎以上賔待之先主在荆州數年嘗於表坐起至厠見髀裏肉生慨然流涕還坐表恠問備曰平常身不離鞍髀肉皆消今不復騎髀裏肉生日月若馳老将至矣而功業不建是以悲耳一日徐庶謂先主曰諸葛孔明卧龍也将軍豈不欲見乎先主曰可與俱來庶曰此人可就見不可屈致也宜枉駕顧之由是先主遂詣其廬凡三往乃見之因屏人曰漢室傾頹奸臣竊命孤不度德量力欲信大義於天下而智術短淺遂用猖蹶然志猶未已君謂計将安出亮曰自董卓以來豪傑並起跨州連郡者不可勝計曹操比於袁紹則名微而衆寡然操遂能克紹以弱為强者非唯天時抑亦人事今操已擁百萬之衆挾天子以令諸侯此誠不可與爭鋒孫權據有江東已厯三世國險而民附賢能為之用此可與為援而不可圖也荆州北據漢沔利盡南海東連呉㑹西通巴蜀此用武之國而其主不能守殆天所以資將軍將軍豈有意乎益州險塞沃野千里天府之國髙祖因之以成帝業劉璋暗弱張魯在北民殷國富而不知存恤智能之士思得明君將軍既帝室之胄信義著於四海總攬英雄思賢如渇若跨有荆益保其巖阻西和諸戎南撫夷越外結孫權内修政事天下有變則命一上將將荆州之軍以向宛洛將軍身率益州之衆出於秦川百姓孰不簞食壺漿以迎將軍者乎誠如是則霸業可成漢室可興矣先主曰善於是與亮情好日密關張諸人等不悦先主解之曰孤之有孔明如魚之有水也願諸君勿復言十二年曹公北征烏丸先主説表襲許表不能用及曹公南征㑹表死子琮代立遣使請降先主屯樊城遂將其衆去過㐮陽諸葛亮説先主攻琮有荆州先主曰劉荆州臨亡託我以孤背信自濟死何面目見劉荆州乎吾不忍也琮左右及荆州人多歸先主比到當陽衆且十萬輜重數千兩日行十餘里或謂先主曰宜速行保江陵今雖擁大衆被甲者少若曹公兵至何以拒之先主曰夫濟大事者以人為本今人歸吾吾何忍棄去是時曹公又以江陵有軍實恐先主據之乃釋輜重輕軍到㐮陽聞先主已過曹公將精騎五千急追一日一夜行三百餘里及於當陽之長坂先主棄妻子與諸葛亮張飛趙雲等數十騎走遣諸葛亮自結於孫權權遣周瑜等助之與曹公戰於赤壁大破之焚其舟船羣下推先主為荆州牧治公安益州牧劉璋内懐恐懼遣法正迎先主先主留諸葛亮雲長等據荆州將步卒數萬人入益州璋推先主行大司馬領司𨽻校尉先主亦推璋為鎮西大將軍領益州牧璋勅關戍諸將文書勿復關通先主先主大怒進圍成都數十日璋出降蜀中殷盛豐樂先主置酒大饗士卒蜀城中金銀分與將士還其榖帛先主復領益州牧羣下尊先主為漢中王還治成都魏文帝稱尊號或傳聞漢帝見害先主乃發喪制服追諡曰孝愍皇帝是後建立禮儀上尊號即皇帝位於成都章武元年夏四月大赦改元永安三年先主病篤託孤於丞相亮夏四月先主殂於永安宫時年六十三五月梓宫自永安還成都諡曰昭烈皇帝秋八月𦵏惠陵華陽國志曰漢末大亂雄傑並起若董卓吕布二袁韓馬張楊劉表之徒兼州重郡衆動萬計叱咤之間皆自謂漢祖可踵桓文易邁而魏武神武肆略戡屠盪盡於時先主名微衆鮮而能龍飛鳯舉假翼荆楚植基隴益建元復漢與之鼎峙非英才命世孰克如是後主蜀志曰後主諱禪字公嗣先主子也建安二十四年先主為漢中王立為王太子即尊號為皇太子先主殂於永安宫後主襲位於成都時年十七是嵗魏黄初四年也景耀六年夏魏大興徒衆命征西將軍鄧艾數道並攻用光禄大夫譙周䇿奉書於艾後主輿櫬自縳詣壘門艾解縳焚櫬延請相見因奉制拜後主為驃騎將軍諸圍守悉被後主勅然後降下艾使後主止其故宫身往造焉後主乃舉家東遷在位凡四十年既至洛陽冊命為安樂縣公食邑萬户賜絹萬疋奴婢百人後司馬文王與後主宴為之作故蜀技樂旁人皆為感愴而後主喜笑自若王謂賈充曰人之無情乃至於是乎雖使諸葛亮在亦不能輔之乆全况姜維耶充曰不如是殿下何由并之他日王問之曰頗思蜀否對曰此間樂不思蜀也蜀故秘書令郄正聞之求見語之曰若王復問可言先人墳墓逺在隴蜀乃心西悲無日不思因閉其目㑹王復問具以此荅王曰何乃似郄正之語耶因驚曰實如尊命左右皆大笑後薨於洛陽魏畧曰蜀主在小沛不意曹公卒至迫遽棄家屬奔荆州後主時年數嵗匿竄隨人西入漢中為人所賣及建安十六年關中破亂扶風人劉括避亂入漢中買得之問知其良家子遂養為子與娶婦生子始後主與父相失時識其父字𤣥徳比舍人有姓簡者及先主得益州簡為將軍嘗遣簡到漢中舎都邸後主詣簡簡相騐訊事皆符驗簡喜以語張魯魯乃沐洗送詣益州先主立為太子始先主以孔明為太子太傅及後主立以亮為丞相委以諸務謂亮曰政由葛氏祭則寡人亮亦以後主未嫻于政遂總内外太平御覽卷一百十七
