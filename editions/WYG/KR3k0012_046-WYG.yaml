body:
  text: 太平御覽卷四十六宋李昉等撰地部十一江東諸山敬亭山蓋山九華山幘山牛渚山慈母山蕪湖山望夫山博望山陵陽山白紵山中山三鶴山黟山靈山巖山三山横山鐵硯山九井山石城山攝山黄鶴山覆船山北固山虎丘山女山秦履山馬鞍山中州山三白山馬蹄山蒜山㑹骸山石姥山大辟山花山虞山陽城山姑蘇山硯石山香山華山包山石鼓山粟山定山封山岝㟧山孺子山響山晚山百丈山流襄山印渚山天目山卞山敬亭山郡國志及宋永初山川記曰宛陵北有敬亭山山有神祠即謝朓賽雨賦詩之所其神云祥華府君頗有靈驗蓋山紀義宣城記曰登蓋山一百許歩有泉俗傳云昔有舒氏女未適人其父析薪於此女忽坐泉處牽挽不動父遽告家衆比來惟見清泉湛然其女性好音樂乃作絃歌即泉浪涌廻復有赤鯉一雙躍出今作樂嬉遊泉猶故沸涌九華山九華山録曰此山竒秀高出雲表峰巒異狀其數有九故號九子山焉李白因遊九子覩其山秀異遂更號曰九華又曰山之上有池塘數畝水田千石其池有魚長者半尋頒首頳尾朱鬐丹腹人欲觀之叩木魚即躍以可食之物散於池中食訖而藏焉其水流洩為龍池溢為瀑泉入龍潭溪有白蟮窟其土如麵不墋歉嵗人多食之顧野王輿地記曰九華山山高一千丈劉禹錫曰余甞愛終南太華以為此外無竒愛女几荆門以為此外無秀及見九華始悼前言之容易也幘山宣城圗經曰幘山北面迤􅆔連九華山其山層峰嵬峩遐睇狀如冠幘因號為幘山牛渚山宣城圗經曰牛渚山突出江中謂為牛渚圻古津渡處也江表傳云司馬徽論運命厯數云黄旗紫蓋見於東南終有天下者荆揚之君乎又夀春童謠曰天子當西上孫皓大喜即載妻子及後宫數千從牛渚陸道西上云青蓋入洛陽適還大雪寒凍殆死輿地志云牛渚山昔有人潜行云此處連洞庭旁達無底見有金牛狀異為精怪而出牛渚山此謂之采石按今對采石渡口上有謝將軍祠又按江源記云商侣於此取石至都輸造石渚因名采石吴初以周瑜屯牛渚鎮西將軍謝尚亦鎮此城慈母山宣城圗經曰慈母山在當塗縣北臨江丹陽記云山生簫管竹王褒洞簫賦云原夫簫管之所生于江南之丘墟即此處也其竹圓緻異於衆處自伶倫採竹嶰谷已後惟此幹見珍厯代常給樂府而俗呼為鼓吹山山有慈母祠也蕪湖山宣城圗經曰蕪湖山在縣西南山因湖以名之漢末於湖側置蕪湖縣以其地卑畜水非深而生蕪藻故因以名縣晉為重鎮謝尚王敦皆鎮於此陳平縣廢以其地入當塗縣望夫山宣城圗經曰望夫山昔人往楚累嵗不還其妻登此山望夫乃化為石其山臨江周廻五十里髙一百丈博望山宣城圗經曰博望山有二山夾大江東曰博望西曰天門按郡國志曰天門山亦曰峩􅔞山楚獲吳艅艎於此按其山相對時人呼為東梁西梁山據縣圗為天門山輿地志云愽望梁山東西隔江相對如門相去數里謂之天門宋孝武詔曰梁山天表象魏以旌圗形仍以二山為立闕故曰天門陵陽山宣城圗經曰陵陽山在涇縣西南一百三十里列仙傳曰陵陽子眀釣得白龍放之後五年龍來迎子眀上丹陽陵陽山一百餘年乃得仙山高一千餘丈又有子安仙人也來就子眀二十年一旦忽死因𦵏山下常有黄鵠棲其處樹上鳴云子安子安也白紵山宣城圗經曰宣州白紵山在縣東五里本名楚山桓温領妓游此山奏樂好為白紵歌因改為白紵山中山宣城圗經曰宣州中山又名獨山在溧水縣東南一十里不與羣山連接故老相傳云中山有白世稱為筆㝡精山前有水源號為獨水按輿地記云宣州溧水縣有獨山有獨水流演不息即此山也三鶴山宣城圗經曰三鶴山在溧水縣東南六十里昔有潘氏兄弟三人於此山求仙後道成化為三白鶴於此冲天黟山歙縣圗經曰北黟山在縣西北一百六十八里高一千一百七十丈豐樂水出焉舊名黄山天寶六年勅改焉按江南諸山之大者有天台天目而天目近連浙江天台俯瞰滄海江海者實以地下為百川所歸然歙州則江之上游而海之濫觴也今計歙州之平地已合與二山齊矣况其山又有摩天戞日之高此則浙江東西宣歙池饒江等州山並是此山之支脉眀矣其諸峰悉是積石有如削成烟嵐無際雷雨在下其霞城洞室符竇瀑泉則無峰不有若林澗之下巖巒之上竒踪異状不可模寫信靈仙之窟宅也山中峰有浮丘公仙壇彩霞靈禽棲止其上是浮丘公與容成子遊之處昔有人到壇所忽見樓臺煥然樓前有蓮池左右有鹽積水遂歸引村人上取了不知其處所山下人往往聞峰上有仙樂之聲靈山郡國志曰歙縣有靈山天欲雨先聞鼓角聲此山上有圓石如車蓋縣以鼓鳴為候一鳴令遷不鳴令不去山一名三姑山三年一野火燒數未滿人燒之即雨新安記曰靈村有三山生香草名曰靈香又有黄精山上有靈壇道士祈請不燒香自然芳馥村人常射獵經踐此土犯山神終無所獲又輿地志云靈山髙峻有圎石髙數丈上有石蓋也巖山山謙之丹陽記曰秣陵縣北十二里有巖山山西有石室山東大道左有方石長一丈刻銘題贊吴功德孫皓所建也三山山謙之丹陽記曰江寧縣北十二里濵江有三山相接即名三山舊時津濟道也横山山謙之丹陽記曰丹陽縣東十八里有横山連亘十八里或云楚子重至于横山是也鐵硯山山謙之丹陽記曰永世記云縣西北百餘里鐵硯山廣輪二百許里山出鐡揚州鼓鑄之地九井山姑熟記云縣南十里有九井山即殷仲文九日從桓公遊九井賦詩處也石城山江乗地記曰石城山嶺障千里相似若一逰厯者以為吳之石城猶楚之九疑也多生箭竹又有桑樹山上有城因以名焉攝山江乘地記曰扈村有攝山山多藥草可以攝生故名之方四靣各起重嶺逰者名繖山形似繖也山頂舊有周江乘廟傳云吳時人未詳名字黄鶴山京口記曰有黄鶴山在縣界晉王恭為刺史改創西南樓名萬嵗西北名芙蓉樓至今存焉輿地志云俗傳此樓飛向江外以鉄鎻縻之方已覆船山梁武輿駕東行記曰有覆船山酒罌山南次髙驪山傳云昔有高驪國女來東海神乘船致酒禮聘之女不肯海神撥船覆酒流入曲河故曲河酒美也北固山南徐州記曰城西北有别嶺入江三面臨水號云北固劉貞京口記云廻嶺入江懸水峻壁舊北固作固字梁髙祖云作鎮作固誠有其語然北望海口實為壯觀以理而推宜改為顧望之顧輿地志云天景清眀登之望見廣陵城如在青雲中虎丘山顧顗之虎丘山序曰吳城西北有虎丘山越絶書曰闔閭冡名虎丘銅槨三重女山山謙之南徐州記曰丹徒縣西九里臨江有女山山東許貢客刺孫策所也秦履山山謙之南徐州記曰暨陽縣西南可三十五里有秦履山傳云秦始皇登之以望江海馬鞍山山謙之南徐州記曰暨陽縣北九里馬鞍山東有黄山郭璞𦵏所中州山山謙之南徐州記曰南沙縣北百里有中州山昔在海中去㟁七十里義熈以来沙漲遂與㟁連三白山山謙之南徐州記曰剡縣有三白山出鐵常供戎噐山東頭南面有石穴髙丈餘容十餘人恒津液流潤天將雨輙有雲羣行從南來映山山亦出雲應之與同北就虞山即大雨矣馬蹄山劉損京口記曰石硯東連馬蹄山山上有石馬蹄跡因以為名蒜山劉楨京口記曰蒜山無峰嶺臨江魏文帝南望致歎㑹骸山吴郡縁海四縣記曰帶海有㑹骸山傳云山有金牛昔有兄弟三人共鑿求之坎崩同死因以為名石姥山劉道山錢塘記曰石姥山有一石甑厥狀殊似居絶嶺之巔大數十圍下有三石足支之大辟山郡國志曰餘杭大辟山本名餘杭山一名曲拳高峻為㝡旁有曲拳村出藤紙晉書曰郭文字文舉隠於餘杭大辟山山中曾有猛獸投一鹿扵菴側文舉因以語人人取賣之分錢以奉文舉文舉曰我若湏此自當賣之所以相語不湏故也花山陸道瞻吳郡記曰吴縣有花山太康中生千葉蓮花於上故曰花山虞山陸道瞻吳郡記曰海虞縣西六里有虞山上有仲雍冢陽城山董監吳地記曰富春有陽城山縣氏所葬漢末上有光雲氣屬天姑蘇山董監吳地記曰姑蘇山一名姑胥連横山之北越絶書曰吴胥門外有九曲路闔閭造以遊姑蘇之臺望湖中窺百姑淮南子亦謂之姑餘硯石山董監吳地記曰硯石山在縣西南門外亦名石鼓又有琴臺在上越絶書云吳人於硯石置舘娃宫劉逵注吳都賦引揚雄方言云吳有舘娃宫吳人呼美女為娃故三都賦云幸乎舘娃之宫張女樂而娛羣臣今吳縣有舘娃鄉香山董監吳地記曰香山吳王遣美人採香於山因以為名故有採香徑華山華山精舎記曰老子枕中記云吳西界有華山可以度難父老云山頂北有池上生千葉蓮花服之羽化因名華山長林森天隂翳蔽日輿地志曰山上有石鼓晉隆安中鳴乃有孫恩之亂山在縣西六十三里包山吳地記曰包山在縣西一百三十里中有洞庭深逺世莫能測吳王使靈威丈人入洞穴十七日不能盡因得玉葉上刻靈寶經二卷使示孔子云禹之書也又郡國志云洞庭山有宫五門東通林屋西達峨嵋南接羅浮北達岱岳又按元中記云吳國西有具區澤中包山有洞庭寳室入地潛行通瑯琊東武淮南子云斷修蛇於洞庭左傳云哀公元年吳王夫差敗越於夫椒今太湖中别有夫􅎛山下有太洞天宫潛通五岳包山上舊無三班謂虵虎雉侯景亂後乃有虎虵為人之害石鼓山郡國志曰吳王離宫在石鼓山越王獻西施於此山山有石望之如人騎南有石鼓鼓鳴即兵起粟山吳地記曰粟山一名新石頭山上有城下有飛泉石杵有吳先王刻題處石杵西有金姥山故老言古於此山採金劉道真記云縣西有姥山絶嶺之上有石甑一人搖動與千人不異定山吳地志曰定山突出浙江中波濤所衝行侣為患謝靈運雜詩曰朝發漁浦南暮出富春郭定山杳雲霧赤亭無淹泊此山是也封山吳興記曰風渚在武康縣東十八里古防風國有風公廟水經曰風渚山即封山也岝萼山吳興記曰於潛縣西二里有岝㟧山有絶壁髙三十許丈謝安嘗登之臨壁垂足曰伯昏無人何以過是當時稱以為難一云本在太湖中禹治水移於此孺子山吳興記曰東遷縣有孺子山徐孺子入吳哭友人甞登之因以為名響山吳興記曰晚山北十八里有響山人於山下語無大小響則随聲曲折應之晚山吳興記曰於潛山西四十里有晚山悉是松木真墨所出也百丈流襄二山吳興記曰山墟村旁有山名曰百丈流襄二山堯遭洪水此山不沒但餘百丈因以名山水流襄山嶺因名流襄印渚山吳興記曰印渚山上承渚溪水從渚以上至縣悉石瀬惡道不可行船以下水道無險故行旅集焉晋王胡之為吳興太守至印渚中嘆曰非惟使人心情開滌亦覺日月清朗傳云印渚石文如印因以為名天目山郡國志曰天目山上有數百年樹名曰鳳翔樹輿地志云上有兩湖謂左右目故名天目也山極髙峻上多美石泉水名茶雜道書曰天目山左髙於地七千五百丈右髙于地七千丈從廣三千里上有淵中有魚可食無毒蟲水經注曰吳興郡於潛縣北有天目山山極髙峻崖嶺竦疊西臨後澗山上有霜木皆是數百年樹謂之翔鳳林東面有瀑布下注數畝深沼名曰蛟龍池水南流經縣西為縣之西溪卞山郡國志曰卞山卞和採玉處山東足有一簣高數尺晉太康中人開之風雨晦暝遂止厯代莫知所封宋書云蕭恵眀為吳興太守郡界有卞山山下有項羽神廟相傳云羽居郡㕔事前後太守皆不敢上恵眀謂綱紀曰孔季㳟曾為此郡未聞有灾遂盛設筵榻接賔數日未㡬恵眀忽見一人長丈餘張弓挾矢向之既而不見因發背旬日而殞太平御覽卷四十六
