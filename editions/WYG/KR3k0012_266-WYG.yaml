  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_266-1a, image: WYG0895/WYG0895-0381a.png}
body:
  text: 太平御覽卷二百六十六宋李昉等撰職官部六十四令長令長禮記檀弓下曰季子臯葬其妻犯人之禾申詳以告曰請庚之申詳子張子也庚償也子臯曰孟氏不以是罪予朋友不以是棄予言非大故也以吾為邑長於斯也買道而𦵏後難繼也左𫝊曰子皮欲使尹何為邑子産曰少未知可否子皮曰使夫往而學焉夫亦愈知治矣子産曰不可人之愛人求利之也今吾子愛人則以政猶未能操刀而使割也論語曰子之武城聞弦歌之聲子㳺為武城宰夫子莞爾而笑曰割雞焉用牛刀言治小何須用大道子游對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也道禮樂也所以和人人和則易使子曰二三子謂從行者偃之言是也前言戲之耳戲以治小用大道也又曰子夏為莒父宰問政子曰無欲速無見小利欲速則不逹見小利則大事不成又曰子游為武城宰子曰汝得人焉爾乎曰有澹臺滅明者行不由徑非公事未嘗至於偃之室也言澹臺滅明公且方也家語曰子路治蒲請見於孔子曰由願受教於夫子曰蒲其何如對曰邑多壮士又難治也子曰然吾語汝恭與敬可以攝勇寛而正可以懐強愛而恕可以容困言愛而恕者容困窮温而斷可以抑姦如此而加之以忠潔則政不難矣又曰子路為蒲宰為水備與其民修溝瀆以民之煩勞也人與一簞食箪笥一壼漿孔子聞之使子貢止之子路不恱曰夫子以仁教而禁行仁由不受也孔子曰爾以為仁誠何不白于君發倉廩粟以給之而私汝食遺之是示明君之無恵而見已之徳美也汝速已則可不已則汝之見罪必矣晏子春秋曰晏子為阿宰三年而毁聞於國景公不恱召而責之晏子謝曰嬰知過矣請復治阿三年而譽聞于國公将賞之辭而不受公問其故對曰昔者嬰之所以當誅者當賞而今所以當賞者當誅是故不敢受史記曰齊威王即位召即墨大夫語之曰自子之居即墨毁日至然吾使人視即墨田野闢民人給官無留事東方以寜是子不事吾左右以求譽也封之萬家召阿大夫語曰自子之守阿譽日聞然吾使人視阿田野不闢民人貧苦是子以幣厚吾左右以求譽也乃烹阿大夫左右嘗譽者皆併烹之遂起兵擊諸侯諸侯震懼人人不敢飾非務盡其誠齊國大治漢書曰諸令長皆秦官掌治其縣萬户以上為令秩一千石至六百石萬户以下為長秩五百石至三百石皆有丞尉秩四百石至二百石又曰蕭育字次君為茂陵令㑹課育第六召詣後曹當以職事對育徑出曹書佐隨牽育育按佩刀曰蕭育杜陵男子何詣曹也又曰薛宣子恵始為彭城令宣從臨淮遷至陳留過其縣橋梁郵亭不修宣心知恵不能留彭城數日案行舍中處置什器觀視園菜終不問恵以吏事恵自知治縣不稱宣意遣門下掾送宣至陳留令掾進自從其所問宣不教誡恵吏職之意宣曰吏道以法令為師可問而知能與不能自有資才何可學也衆人以宣言為然東觀漢記曰田歆守平臯長有報父仇賊自出歆召因詣閤曰欲自受其辭既入解械飲食使發遣遂弃官亡命逢赦出由是鄉里服其髙義後漢書曰馮魴遷郟令後車駕西征隗囂潁州盗賊羣起郟賊延褒等衆三千餘人攻圍縣舍魴率吏士七十許人力戰連日弩矢盡城䧟魴乃遁去帝聞其反即馳赴潁川魴詣行在所帝案行闘處知魴力戰乃嘉之曰此健令也又曰宋翻字飛烏廣平列人也為河隂令順陽公主家奴為刼攝而不送翻将兵圍主宅執主聓馮穆歩驅向縣時正炎暑立之日中流汗沾地於是威振京師又曰董宣字少平徴為洛陽令擊搏豪強莫不震慄京師號為卧虎又曰公孫述為清水長父仁以述年少遣門下掾隨之官月餘掾辭歸白仁曰述非待教者也續漢書曰董宣為雒陽令寧平公主乳母子白日殺人因匿主家吏不能得及主出行以奴驂乘宣于大夏門亭候之乃駐車叩馬以刀畫地數主之失者三叱奴下車格殺之主即馳車入宫上大怒召宣曰令欲死乎宣叩頭曰臣奉法之吏不敢縱法不欲死也上曰捶之宣曰願一言死無恨上曰何言宣曰陛下聖徳中興而縱奴殺良民以奴殺臣臣死之後陛下何以治天下捶殺臣不如臣自殺即以頭觸楹流血被面上令小黄門持之曰痴令令叩頭謝主宣不從上曰頓痴令頭宣兩手據地不肯低頭上勅強項令出大官賜食又曰虞詡為朝歌長故舊皆弔曰得此何衰詡曰難者不避易者不從不遇盤根錯節何以别利器乎華嶠後漢書曰周䂓除臨湘令長沙太守程徐二月行縣勅諸縣治道䂓以方春向農民多劇務不欲奪人良時徐出督郵䂓即委官而去徐憮然有媿色遣功曹賫印綬檄書謝請還䂓謂功曹曰程府君愛馬蹄不重民力徑逝不顧漢制曰列侯所食縣曰國皇太后公主所食曰邑有蠻夷曰道凡縣萬户以上為令减萬户為長漢書胡廣注曰秋冬嵗盡各計縣户口墾田錢榖出入盗賊多少上集簿丞尉以下嵗詣郡課校其功功多尤為最者于庭慰勞勉之以勸其後負多尤為殿者于後曹對責以糺怠慢也魏志曰賈逵字梁道河東襄陵人文帝即王位以鄴縣數萬户在都下多不法乃以逵為鄴令又曰賈逵守絳邑長郭援攻河東所經城邑皆下逵堅守援攻之不㧞乃召單于并軍急攻之城将潰絳父老與援要不害逵絳潰援聞逵名欲使将以兵刼之逵不動左右引逵使叩頭逵叱之曰安有國家長吏為賊叩頭援怒将斬之絳吏民聞将殺之皆乗城呼曰負要殺我賢君寧俱死左右義逵多為請遂得免又曰滿寵字伯寜守髙平令縣人張苞為郡督郵貪穢受取干亂吏政寵因其來在傳舍率吏卒出収之詰其所犯即日考竟遂棄官而歸又曰崔林字徳儒除鄔令貧無車馬單歩之官蜀志曰鄧芝字伯苖先主定益州芝為郫邸閣督先主出至郫與語大竒之擢為郫令又曰蒋琬字公琰零陵湘鄉人也弱冠與外弟泉陵劉敏俱知名琬以州書佐隨先主入蜀除廣都長先主嘗因逰觀奄至廣都琬衆事不理時又躭酒先主大怒将加罪戮軍師將軍諸葛亮請曰蔣琬社稷器非百里之才也其為政以安民為本不以修飾為先願主公重加察之先主雅敬亮乃不加罪倉卒免官而已吳志曰賀齊字公苗㑹稽山隂人也少為郡吏守剡長縣吏斯從輕俠為姦齊欲治之主簿諌曰從縣大族山越所附今日治之明日冦至齊聞大怒便立斬從族黨相糺合衆千餘人舉兵攻縣齊率吏民開城門突擊大破之威震山越又曰陶謙除舒令郡太守張盤同郡先輩與謙父友謙恥為之屈嘗屬謙舞謙不為起固強之乃舞舞又不轉盤曰不當轉耶曰不可轉轉則勝人又曰孟仁字恭武江夏人也為吳令時皆不得將家之官每得時物來以寄母嘗不先食及聞母死犯禁棄官又曰劉繇字正禮舉孝亷為郎中除下邑長時郡守以貴戚託之遂棄官而去又曰朱然字義封嘗與孫權同書學結恩愛至權統事以為餘姚長時年十九晉書曰車濟字萬度燉煌人也果毅有壮勇為金城令為石季龍將麻秋所䧟濟不為秋屈秋必欲降之乃臨之以兵濟辭色不撓曰吾雖才非龎徳而受任同之身可殺志不可移乃伏劒而死秋歎其忠節以禮𦵏之晉中興書曰華譚所友袁甫者字公胄厯陽人少能言議與譚齊名友善㤗安中甫入洛詣中領軍何朂自言能治劇縣朂曰君子治應多宜何以唯欲宰民何不為一臺職乎甫曰人各有所能否譬猶錦繒中之好而不可以為帢口洽反稻食中之好而不可以為虀是以孔子曰及其使人也器之苟非大才何能悉備久之除松滋令晉書曰陶潛字淵明謂親朋曰聊欲絃歌為三徑之資可乎執事者聞之以為彭澤令公田悉令吏種秫稻妻子固請種粳乃使二頃五十畆種秫五十畆種粳郡遣督郵至縣吏白應束帶見之潛歎曰我不能為五斗米折腰向鄉里小兒即解印綬去賦歸去來齊書曰張融為封溪令行路經嶂嶮獠賊執融将殺食之融神色不動方作洛生詠賊異之而不害也浮海至交州于海中遇風終無懼色方詠曰乾魚自可還其本鄉肉脯復何為者哉又曰卞延之弱冠為上虞令有剛氣㑹稽太守孟凱以令長裁之憤不能容脱幘投地曰我所以屈卿者正為此幘耳今已投之卿以一世勲門而傲天下國士拂衣而去梁書曰蕭眕素為中書侍郎在位少時求為諸暨令到縣十餘日掛衣冠於縣門而去後魏書曰髙祖以北平府長史裴聿中書侍郎崔亮並清貧欲以俸禄優之乃以亮帶野王令聿帶温縣令時人榮之北史曰齊因魏宰縣多用廟監至於士流恥居百里元文遥以縣令為字人之切用之猶恐其披訴總召集神武門令趙郡王叡宣㫖唱名厚加慰喻士人為縣自此始也三國典略曰陳褚玠為中書侍郎陳主以山隂縣多豪猾謂舍人蔡景厯曰稽隂大邑久無良宰卿文士之内試思其人景厯進曰褚玠清㢘有幹用陳主曰善乃以為令縣人張次的王休達等與諸猾吏賄賂通姦全丁大户多有隐沒玠乃鏁次的具狀啓臺陳主手勅慰勞并遣使助玠捜括所出軍人八百餘户時曹義逹為陳主所寵縣人陳信家富於財謟事義逹信父顯文恃勢横暴玠乃遣使執顯文鞭之一百於是吏人股慄莫敢犯者義達於是譛之玠在任守禄俸而已去官之後不堪自致因留縣境種蔬菜以自給或􅅓玠非百里之才玠答曰吾委論課最不後列城除殘去暴姦吏跼蹐若謂不能自潤脂膏則如來命以為不達從政吾未服也韓子曰晉平公問趙武曰中牟吾國之股肱邯鄲之肩髀也寡人欲其良令也其令空誰使而可趙武曰邢伯子可公曰伯子非子之讐耶對曰私讎不入公門又問中府之令空誰使而可趙武曰臣子可故外舉不避仇讎内舉不避子弟又曰宓子賤為單父令見有若有若曰子何痩焉宓子曰憂官政也又曰晉文公出亡趙衰潔壺飱而從與文公相失饑而道寢餓而不敢食及文公反國舉兵攻原克而㧞之文公曰夫輕忍饑餒之患而必全壺飱者是必不以原叛乃舉為原令慎子曰立國君以為國非立國以為君也夫立官長以為官也非立官以為長也風俗通曰俗說孝明帝時尚書郎河東王喬遷為葉令喬有神術每月朔常詣臺朝明帝怪其數而無車騎宻令太史候望言臨至時常有雙鳬從東南來因伏伺見鳬舉羅但得一隻舄使尚方識視四年中所賜尚書官屬履也通典曰縣邑之長曰宰曰尹曰公曰大夫晉謂之大夫魯衞謂之宰楚謂之公太平御覽卷二百六十六
