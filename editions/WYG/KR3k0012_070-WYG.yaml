front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_070-1a, image: WYG0893/WYG0893-0566c.png}
body:
  text: 太平御覽卷七十宋李昉等撰地部三十五淵泉水淵說文曰淵囬水也尚書逸篇曰堯子丹朱不肖舜使居丹淵為諸侯韓詩外傳曰東海之上有士曰菑丘訢以勇逰於天下過神淵飲馬馬果沉菑丘訢朝服㧞劒而入三日三夜殺三蛟一龍而出雷電隨而擊之十日十夜眇其左目大戴禮曰聖人有國則淵不湧左傳鄭子産曰昔堯殛鯀于羽山其神化為黄熊以入于羽淵又曰鄭大水龍鬬于時門之外洧淵時門鄭城門也水經注曰白鹿淵南北三百歩東西千餘歩深三丈餘其水冬清而夏濁淡然不流九州記曰樂夀縣有房淵方三百里石勒建安三年水忽變為赤燕慕容雋三年水忽生鹽如印形其淵一日再長再减不失其度居近者時見龍狗之狀戲於旁葉落於淵者輙有群燕銜出盛𢎞之荆州記曰新野城北有柴山山上有清泠之淵焉又曰魚復縣有神淵北有白鹽崖天旱火燃崖上推其灰燼下降淵中尋則降雨西有龍淵清深不測傳云漢祖伐秦途經於此見淵中白壁赤柱狀若官府因名龍淵宜都山川記曰鄉下村有淵淵有神龍每旱百姓輙以毒草投淵上流魚死龍怒應時大雨齊地記曰瑯琊臺上有神淵汚之則竭齋戒即出莊子曰舜以天下讓其友北人無擇無擇曰異哉欲以其國汚我我羞之自投於清泠之淵管子曰水出於地而不流者命之曰淵隨巢子曰夏桀徳衰岱淵沸尸子曰龍淵有玉英司馬相如上林賦曰丹水更其南紫淵經其北泉水說文曰泉水源也易象卦曰山下出泉蒙君子以果行育徳詩泉水衛女思歸也毖彼泉水亦流于淇有懷于衛靡日不思又曰爰有寒泉在浚之下又曰泉源在左淇水在右又曰莫髙匪山莫浚匪泉又曰相彼泉水載清載濁又曰原隰既平泉流既清召伯有成王心則寧又曰觱沸檻泉傳曰鄭伯寘姜氏于城潁而誓之曰不及黄泉無相見也既而悔之潁考叔問公公語其故對曰君何患焉若掘地及泉隧而相見其誰曰不然公從之論語撰考䜟曰水名盗泉仲尼不潄應劭漢官儀曰酒泉城城下有金泉味如酒故曰酒泉郡三秦記曰酒泉郡中有井味如酒也晉安帝紀曰吳隱之字處黙性亷操桓𤣥欲救漢南之弊以隱之為刺史州界有一水父老云飲此水者亷士皆貪隱之始踐境先至水所酌而飲之因賦詩以言志清操愈厲沈約宋書曰王彭盱眙人少䘮母元嘉初父又亡家貧力弱營葬鄉人助作塼須得水天旱穿井數十丈無水一旦塼竈前忽生泉用之事畢復竭助者嗟嘆隋書曰豆盧勣武帝嗣位拜渭州刺史甚有惠政華夷悅服徳澤流行大致祥瑞鳥鼠山谷呼為髙武隴其下渭水所出其山絶壁千尋由來乏水諸羗苦之勣馬足所踐忽飛泉涌出有白鳥翔止㕔前乳子而後去又白狼見於襄武民為之謡曰我有丹陽山出玉漿濟我民夷神鳥來翔百姓因號其泉為玉漿泉唐書曰安金藏京兆長安人為太常丞初䘮母寓葬於都南闕口之北廬於墓側躬造石墳石塔晝夜不息原上舊無水忽有湧泉自出遁甲開山圖榮氏解曰女狄暮汲石紐山下泉水中得月精如鷄子愛而含之不覺而吞遂有娠十四月生夏禹水經注曰若耶溪東又有寒溪溪北有鄭公泉深及數丈冬温夏凉漢太尉鄭公𢎞宿居潭側因以名泉又曰横流溪溪水甚小冬夏不乾俗亦謂貪泉飲者輙冐於財賄同於廣州石門境之貪流矣為二千石則不飲之昔吳隱之挹而不亂豈謂能汩其真乎蓋亦惡其名也又曰汲城縣北三十里有太公泉泉上又有太公廟廟側髙林秀木翹楚競茂相傳曰太公之故居也又曰土糓縣故城西水源方百歩百泉俱出故謂之百脉水又曰霍太山上有岳廟廟甚有靈鳥雀不栖其林猛虎常守其庭又有靈泉供祭事鼓動則泉流聲絶則水竭也又曰長城背山面澤謂之白道城北出有髙坂謂之白道嶺㳂路唯土穴出泉挹之不窮古詩飲馬長城窟非虚言也風土記曰陽羡縣西南有泉常有紫黄色浮見水上出金之地也益都耆舊傳曰姜詩母好食生魚飲江水詩至誠之感一朝湧泉在於門側流引江魚以給膳羞十洲記曰瀛洲有玉膏山出泉如酒味名之為玉酒也𤣥中記曰東方有柴渚焉在齊國山山泉如井狀深不測至春時雹從井中出出常敗五穀人常以林木柴塞則不出故名為柴渚焉魏土地記曰頌陽縣東八十里有駮牛山山下有泉泉競發有一神牛駮身自山而下飲泉竭故山得其名魏記曰洛城東南六十里有涿鹿城城東一里有改泉泉上有黄帝祠三輔舊事曰昔有犢失母哀鳴甚苦地為發泉因名鳴犢泉今天旱祭之降雨在馮翊又曰姜泉在岐山縣水經注云炎帝長於姜水故以名也皇甫謐帝王世紀云炎帝神農氏母有喬氏女登為少典妃逰華陽感神而生炎帝長於姜水因以氏焉義興記曰國山縣有金硎硎中沙石有灼灼如金者舊名金泉時獲真金也漢水記曰漢水有泉方圓數十歩夏常沸湧望見白氣衝天能差百病常有數百人飲宣城記曰臨城縣南四十里有蓋山登百許歩有舒姑泉昔有舒氏女與其父斫薪於泉處坐牽挽不動父還告家比還唯見清泉女母曰吾女本好音樂及絃歌泉湧泗流見朱鯉一雙今作樂嬉戲泉故湧出周景式廬山記曰山西有龍泉精舍初遠法師遣諸道人行卜地息此而渴法師因以杖掘地即泉出天旱法師令道人讀海龍王經泉中有物如蛇而角出騰空中去須㬰而雨括地圖記曰昆丘之上有赤泉飲之不老神宫有美泉飲之眠三百歲乃覺不死盛𢎞之荆州記曰城東北三百歩有孔子泉其水甘馨雖帝漿無以過也又曰宜都夷陸縣南勾將山下有三泉傳云本無此泉居者苦於汲水有一女子孤貧忽有一乞人瘡痍竟體村人無不稱惡此女哀矜飴之乞人乃腰中出刀刺山下三處即飛泉涌出潯陽記曰莫山有澗深尺餘朝夕輙有湧泉溢出如潮號為潮泉外國圖曰貟丘有赤泉飲之不老郡國志曰蘭州有梁泉昔梁暉者為羗所圍無水暉以鞭扣地以青羊祈山神湧泉出而榆木成林又曰肅州延壽城有山出泉注地水肥如肉汁燃之極明與膏無異但不可食此方人謂名漆得水愈熾吕氏春秋曰太公釣於滋泉又曰水之美者崐崘之井髙泉之山有涌泉焉淮南子曰正土之氣仰乎埃天正土中也其氣上水埃天中央也埃天五百歲生蚗蚗石名也中央數五故五百歲而一化蚗五百歲生黄澒黄澒英水銀也黄澒五百歲生黄金黄澒英五百歲化而為黄金也黄金千歲生黄龍黄金之精為黄龍也黄龍入藏生黄泉黄泉黄龍之精汋也黄泉之埃上為黄雲其氣上至天也隂陽相薄為雷激陽為電言黄氣之相激薄也上者就下其氣遍流於天下也流水就通激而合乎黄海言水從天下則通流入于海也偏土之氣仰乎青天偏土方土也青天八百歳生青增青增青石也東方數八故八百歲而一化也增八百歲生青澒澒八百歲生青金金千歲生青龍青龍入藏生青泉青泉之埃上為青雲隂陽相薄為雷激陽為電上者就下流水就通而合乎青海壯土之氣仰於赤天壯土南方土也赤天七百歲生赤丹赤丹砂也南方數七故七百歳而一化也赤丹七百歲生赤金丹砂也化為砂而可以為金故氣赤澒也金千歲生赤龍赤龍入藏生赤泉赤泉之埃上為赤雲隂陽相薄為雷激陽為電上者就下流水就通而合乎赤海弱土之氣仰乎白天弱土西方土也白天九百歲生白礜白礜白石也西方數九故九百歲而一化也白礜九百歲生白澒白澒九百歲生白金白金千歲生白龍白龍入藏生白泉白泉之埃上為白雲隂陽相薄為雷激陽為電上者就下流水就通而合乎白海牡土之氣仰乎𤣥天牡土北方土也𤣥天六百歲生𤣥磁磁石也北方數六故六百歲而一化也𤣥磁六百歲生𤣥澒𤣥澒六百歲生𤣥金𤣥金千歲生𤣥龍𤣥龍入藏生𤣥泉𤣥泉之埃上為𤣥雲隂陽相薄為雷激陽為電上者就下流水就通而合乎𤣥海又曰崑崙四水者帝之神泉以和百藥以潤萬物也傅咸神泉賦曰余所居庭庭前有湧泉在夏則冷渉冬而温每夏逰之不知歳之有暑抱朴子曰崑崙及蓬萊其上鳥獸飲玉井泉皆長生不死也李華雲母泉詩序曰洞庭湖西𤣥石俗謂之墨山山南有佛寺寺倚松嶺嶺下有雲母泉泉出石引流分渠周遍庭宇發源如乳源末泒如浮漿烹茶灌園潄濯皆用之大浸不盈大旱不耗自墨山西北至石門東南至東陵廣二十里盡生雲母墻階道路光彩如列星井泉溪澗色皆純白鄉人皆壽考無癖痼疥搔之疾華深樂之太平御覽卷七十
