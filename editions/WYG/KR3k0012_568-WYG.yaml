body:
  text: 太平御覽卷五百六十八宋李昉等撰樂部六宴樂女樂宴樂樂志曰夀陽樂宋南平穆王為豫州刺史所作也楊叛兒齊隆昌時有楊旻母為師巫旻小隨母入宫及長為后所幸童謡曰楊婆兒共戯来語訛為叛兒西烏飛宋州刺史沈攸之舉兵思歸所作詞云白日落西山還去来上震樂梁武帝所作有七曲鳳臺桐栢方寸諸玉龜金丹等築地樂梁孝王築睢陽城方七十里唱聲相杵以鼔聲也又曰梁武篤敬佛法作善哉天樂大歡天道仙道神王龍王滅過惡除愛水㫁苦輪十篇名為正樂陳後主尤重樂聲遣宫女於清樂中造黄鶴留玉樹後庭花金釵兩股垂歌詞綺艶極於輕薄又造無愁曲音韻窈窕極於哀思隋煬帝不解音律大製艶曲令樂正白明逹造新聲納形樂萬嵗樂藏鈎樂七夕相逢樂投壺樂玉女行觴神仙客闘百草泛龍舟還舊宫長樂花等曲皆掩抑摧藏哀音㫁絶後髙麗獻望明樂曲煬帝令知音者於舘所聼之歸而肄習及方客獻先於前奏之胡夷皆驚焉又隋開皇中定令置七部樂曲一曰國伎二曰清商伎三曰髙麗伎四曰天竺伎五曰安國伎六曰龜兹伎七曰文康伎其後牛𢎞請存鞞鐸巾拂等四舞因稱四舞又煬帝更定清樂為九部歌曲有楊叛兒永代樂舞曲有明君於闐佛曲有萬代豐等凡樂以聲徐者為本聲疾者為解唐㑹要曰清樂者凡代之遺聲其始即清商三代調是也並漢氏以来舊典樂器製度并諸歌章古調與魏三祖作者皆被史籍自晉氏播遷其音分散不復存於内地符堅滅凉得之於前後二秦及宋武定闗中收之入江南及隋平陳後獲之隋文聼之善其節奏曰此華夏正聲也因更損益去其哀怨考而補之乃置清商署總謂之清樂西凉等為九部隋室喪亂日益淪缺矣後朝猶有六十三曲今其詞存者有白雲公莫巴渝明君之名鐸舞白鳩子夜吴聲四時歌前溪阿子歡聞團扇懊惱白紵玉樹後庭花春江花春江月夜長史變丁督䕶續曲烏夜啼石城莫愁襄陽栖烏夜飛估客楊叛兒雅歌龍舟等三十二曲明君雅歌各二首四時四首合三十七首又七曲有聲無詞上林鳳雛平調清調瑟調平折命嘯通前四十四篇在焉見通典當江南之中舞白紵巴渝等衣服各異至梁武改省之宋以江左諸曲哇滛然而縱容雅緩猶有士君子之風焉自長安年以後朝廷不重古典工伎漸缺能合於管絃者唯明君楊叛兒驍壺春歌白雲堂堂春江花月夜八曲舊樂多或數百言明君尚能四十言今所傳二十六言漸訛失與吳音轉逺宜取於吳人使之傳習開元中有歌工李郎子北人也調聲已失云學於前才生郎子亡後清樂唯歌一曲詞典詞典而音雅自周隋已末多用西涼樂鼔舞曲多同龜詞樂其典度皆時俗所知也唯琴家獨傳椘漢聲及清調瑟調蔡邕五弄謂之九筭獨聲獨存非朝廷郊廟所用故不載自唐虞迄三代舞用國子樂用瞽師漢魏已後皆以賤𨽻為之唯雅樂尚存又曰髙麗百濟樂宋朝初得之至後魏太武滅北燕以得之而未具周武滅齊威振海外二國各獻其樂周人列於樂部謂之國伎隋文平陳及文康禮俱得之又曰貞觀十四年景雲見河水清恊律郎張文收採古朱雁天馬之義制景雲河清歌名曰讌樂奏之管絃為諸樂之首今元㑹第一奏者是也又曰武徳初未暇改作每讌享因隋制奏九部樂一讌樂二清商三西涼四扶南五髙麗六龜兹七安國八踈勒九康國貞觀十六年十一月宴百僚奏十部先是伐髙昌改其樂付太常乃増九部為十部伎今通典所載十部之樂無扶南樂祗有天竺樂聲見南蠻樂其後分為立坐二部立部伎有八部一安樂後周平齊所作二太平樂亦謂之五方師子舞三破陣樂四慶善樂五大定樂亦謂之八絃同軌樂大宗平遼時所作也六上元樂髙宗所作七賢夀樂武太后所在舞時行列成字有聖超千古道冠百王皇帝萬年寳祚彌昌八光聖帝𤣥宗所在自安樂已下每奏皆雷大鼓同用龜兹樂並立奏之其大定樂加以金鉦唯慶善樂獨用西凉樂最為閑雅其破陣上元慶善三舞皆易其衣冠合其鐘磬以享郊廟自天后臨朝此禮遂廢神龍三年八月勅立部伎舞人以後更不得改補入諸色役坐部伎有六部一讌樂張文収所作也又分為四部有景雲慶善破陣承天等樂二長夀樂武太后長夀年所作三天夀樂武太后天夀年所作四鳥歌萬嵗故為樂以像之五龍池樂𤣥宗所作也帝在藩邸時居崇慶坊宅中經雨地忽為池及即位以宅為宫故為樂以歌其祥六小破陣樂𤣥宗所在生於舞用四人被之金甲自長夀已下皆用龜兹樂人皆着靴惟龍池用雅樂而無鐘磬舞人盡躡履而行其樂章又有陣樂詞七首中和樂詞五首五方師子詞五首南詔奉聖樂詞五首聖夀荷皇帝恩詞四首聖夀樂詞四首大定樂詞六首上元樂詞一十五首文武順聖樂詞九首貞觀末有裴神符有妙解琵琶惟作聖蠻双大鳳傾盃樂三曲聲度清美太宗深愛之髙宗未有伎遂盛於時泊天后至神龍之際大増加立坐部伎諸舞㝷亦廢之而已矣又曰髙宗御含元殿東翔鸞閣大酺當時京城四縣及太宗音樂分為東西朋雍王賢為東朋周王顯為西朋務以角勝為樂禮畢曲者本自晉太尉庾亮家卒其客取其謚以號之謂文康樂每奏九部樂終則陳之故以禮畢為名其曲有散花樂等隋平陳得之八九部器有笙笛簫箎鈴盤鞞腰鼔等七種三懸為一部工二十人今亡太平樂亦謂之五分師子舞師子鷙獸出於西南夷天竺師子等國綴毛為之象其俯仰馴狎之容二人持䋲拂為習㺯之狀五師子各位其方色百四十歌太平樂舞抃以從之服飾皆作崑崙象上元樂髙宗所造舞者百八十一人五雲衣備五色以象元氣故曰上元鳥歌萬嵗樂武太后所造時宫中飬鳥能人言又常稱萬嵗為樂以象之舞三人緋大袖並畫鸜鵒冠作鳥象今嶺南有鳥似鸜鵒飬之乆則能言名吉了了音料先聖造𤣥宗所造也舞八十人鳥冠五彩畫衣兼似上元聖夀之容以歌王業所興自安樂以後皆雷大鼓雜以龜兹樂聲振百里並立奏之其大定樂加金鉦唯慶善樂獨用西涼樂最為閑雅舊破陣上元慶善三舞皆易其衣冠合之鐘磬以享郊廟自武太后革命此禮遂廢自安樂部謂之立部伎也大唐平髙昌盡收其樂又造讌樂而去禮畢曲令着令者唯十部龜兹䟽勒安國康國髙麗西凉髙昌燕清樂伎天竺几十部南蠻北狄國俗皆随髮際㫁其髪今舞者咸用䋲圍首反約髮抄内一䋲下又有新聲自河西至者號胡音聲與龜兹樂散樂俱為時重諸樂咸之小寝大定樂髙宗所造出自破陣樂舞者四十人被五綵文甲持槊歌和云八絃同軌樂以象平遼東而邉隅大定也唐㑹要曰貞元三年四月河東節度使馬燧定難曲御麟徳殿試之又曰汴州節度使韓𢎞進聖朝萬嵗樂曲譜凡三百首又曰延載元年正月二十三日製越古長年樂一曲又曰十二年十二月昭義節度使王䖍休獻繼天誕聖樂表曰臣伏見開元中天長節誕日四海歡娱萬年獻夀竊以陛下降誕之日有惟新之曲適遇知音臣遣成繼天誕聖樂一曲大抵宫為調表五音之本君也以土為徳如五運之居中也凡二十四遍法二十四氣西成一嵗之功也不聞沾滯之音以作中和之樂其曲譜同進上先大常人劉价流落至潞州䖍休因令造此曲以進今中和樂起於此又曰顯慶二年上以琴中樂曲古人歌之近代已来此聲頓絶令所司修習舊典至三年十月八日太常丞吕才奏按張華慱物志曰白雪是天帝使素女鼓五絃曲名以其調髙人和遂寡自宋玉以来迄今千祀未有能歌白雪曲者臣令准勅依琴之舊曲定為宫商然後教習並合於歌輙以御製雪詩為白雪歌詞又樂府奏正典之後皆有送聲君倡臣和事彰前史觀取侍中許敬宗等奉和雪詩十六首以為送聲各十六節上善之仍付太常編於樂府樂府雜録曰雨淋鈴者因唐明皇駕囬至駱谷聞雨淋鈴因令張野狐撰為曲名又曰夜半樂者因唐𤣥宗自潞州入定内難進軍斬長樂門時正當夜半平韋庶人後乃命樂人撰此曲又曰黄驄叠者唐太宗初定中原時所策黄驄馬後因征遼北馬忽斃上嘆惜乆之因命樂人製此曲又曰得寳子者唐明皇初納太真妃喜甚謂諸嬪御云朕得楊氏如獲至寳也因撰此曲又曰文淑子者唐長慶初有俗講僧文淑善吟經兼念四聲觀世音菩薩其音諧暢感動時人樂工黄米飯依其念菩薩四聲乃撰成曲也又曰楊柳枝曲者白傳典杭州時所撰尋進入教坊也又曰還京樂者唐明皇自蜀反正樂官張野狐撰此曲又曰道調子曲者因唐懿皇后樂工史敬約吹觱篥初吹道調懿皇后謂是曲子誤拍敬約乃隨拍便撰此曲也又曰新傾盃樂唐宣宗善吹蘆管自撰此曲内有數拍不均上初捻管命樂工辛骨咄拍不中上瞋目視之骨咄憂懼一夕而殞又曰望江南者因朱崖李太尉鎮浙西日為亡姬謝秋娘所撰後進入教坊遂改名一名夢江南曲也又曰康老子者本長安富室家子酷好聲樂落托不事生訃常與國樂遊處一旦家産蕩盡因詣西廊遇一娼持舊錦茵貨鬻次康乃酧半千獲得之尋有波斯見大驚謂康老曰何處得此至寳此是冰蠶所織若暑月陳於榻上可致一室清凉因酧價千萬鬻之康老獲此厚價復與國樂追歡不三數年間費用又盡康老尋歿國樂嗟嘆之乃撰此曲也又曰大郎神者天后朝有一士人陥寃獄仍籍沒家族其妻配入掖庭本初善吹觱篥因撰此曲寄其哀情始名大郎神盖取其良人行第也畏人知遂三易其名悲切子離别難終名怨廻鶻羯鼔録曰宋開府孫沆有音律之樂貞元中進樂書三卷徳宗覽而嘉之知是開府之孫遂召對命坐與論音樂甚喜數日又召至宣徽張樂使觀焉曰有舛誤乖濫悉可言沆曰容臣與樂官商確講論具状條奏上宣教坊使與樂官叅議數日二使奏樂多言沆曾不解聲調不審節拍又聵疾不可議樂上頗異之又召沆對沆曰臣老年多病耳實失聰若迨於聲律不至無業上又使作樂曲罷問其得失禀務舒遲衆工多笑之忽忿然作色奏曰曲雖妙其間有不可者上驚問之即指一琵琶云此人逆而忍兼即抵法不宜在至尊前又指一笙云此人神魂已遊墟墓不可更令供奉上令主者潛伺察之旋而琵琶者為同儕告訐稱六七年前其父自縊不得端由即令按鞫遂伏其罪笙者憂恐不食旬日而卒上益加知遇面賜章綬累累召對每令察樂樂工見之悉喘恐脇不敢正視沆懼禍辭病而退女樂左傳襄二年鄭人賂晉侯以女樂晉侯以樂之半賜魏絳史記曰孔子為政齊人懼犂鉏乃選齊國中女樂好音八十人皆衣文采而舞康樂文馬三十駟遺魯君陳女樂文馬魯城南皋門外季桓子㣲服往觀再三將受乃語魯君往觀終日怠於政事子路曰夫子可以行矣桓子卒受齊女樂三日不聼政孔子遂行論語曰齊人歸女樂季桓子受之三日不朝孔子遂行後漢書曰馬融字季長逹生任性不拘儒者之節嘗坐髙堂施絳帳前授生徒後列女樂弟子以次相傳鮮有入其室者盧植字子幹侍講數年未嘗盼融以是嘉之也魏志曰夏侯惇從太祖征孫權還使惇都督二十六軍留居巢賜妓樂名倡令曰魏絳以和戎之功猶受金石之樂况將軍乎又曰曹爽飲食車服擬於乗輿又私取先帝才人七人將吏師工鼓吹良家子三十三人皆以為妓詐作詔書發才人五十七送鄴臺使先帝婕妤教習為妓擅取太樂樂器武庫禁兵作窟室綺䟽四周數與何晏等㑹其中縱酒作樂又曰楊阜為武都太守㑹馬超来冦曹洪置酒大㑹女倡着羅縠衣蹋鼔一座皆笑楊阜厲聲責洪曰男女有别遂奮衣出洪立罷女樂請阜還座肅然憚之陳書曰章昭逹毎飲㑹必盛設女伎雜樂偹羌胡之聲音律姿容並一時之妙雖臨敵弗之廢也隋書曰房暉逺傳髙祖嘗謂羣臣曰自古天子有女樂乎楊素以莫知所出遂言無女樂暉逺進曰臣聞窈窕淑女鐘鼔樂之此即王者房中之樂著於雅頌不得言無髙祖大説又曰牛𢎞修皇后房内之樂文帝龍潜時頗好音樂嘗倚琵琶作歌二首名曰地厚天髙託言夫妻之義因即取之為房内曲命婦人並登歌上夀並用職在宫内女人教習之唐書曰先天元年正月皇太子令宫臣就率更寺閲女樂太子舎人賈曽諌曰臣聞作樂崇徳以感神人韶夏有容咸英有節婦人媟黷無厠其間昔魯用孔子㡬致於覇齊人懼之饋以女樂魯君既受孔子遂行戎有由餘兵强國富秦人反間遺之女妓戎王耽悦由餘乃奔斯則大聖名賢疾之已乆矣良以婦人為樂必務冶容哇滛動心蠱惑喪志上行下效滛俗將成敗國亂人實由兹起殿下監撫餘閑宴私多適後庭伎樂古或有之至於所司教習彰示羣僚慢伎滛聲實虧睿化伏願並令禁㫁墨子曰秦繆公之時戎强公大繆公遺之女樂二八與良宰戎王大喜以其故數飲食日夜不休左右有言秦㓂之至者因扞弓而射之扞引秦㓂畢至戎王醉而卧於尊下卒生縳之未禽則不登山而視牛若羊視羊若豚牛之性不若羊羊之性不若豚所自視之勢道也而因怒於牛羊之性也此狂者也狂而以行賞罰此戴氏之所以絶韓子曰晉獻公欲伐虞虢乃遺之屈産之乗垂棘之璧女樂二八以熒其心亂其政郭子曰謝公在東山畜妓簡文曰安石必出與人同樂亦不得不與人同憂石虎鄴中記曰虎大㑹禮樂既陳虎繳西閣上牕幌宫人數千陪列看坐悉服飾金銀熠熠又於閣上作女妓數百衣皆絡以珠璣鼓舞連列琴瑟細妓畢偹漢晉陽秋曰晉文王與劉禪宴為之作蜀舊樂傍人皆代禪感而襌語笑自若王謂賈充曰人之無情乃至是乎雖使諸葛亮在不能輔之久全况姜維耶充曰不如是何由併之哉夏仲御别傳曰仲御從父家女巫章丹陳殊二人妍姿冶媚清歌妙舞状若飛仙又曰仲御當正㑹宗弟承問御曰黄帳之裏西施之孫鄭袖之子膚如凝脂顔如桃李徘徊容與載進載止彈琴而奏清角翔風至而𤣥雲起若乃擕手交舞流盼頡頏足踰鞞鼓口銜笙簧丹裙赫以四序素耀煥以揚光赴急絃而折倒應緩節以相羊逺望而雲近視而雪舒紅顔而㣲笑啓朱唇而揚聲世説曰魏武有一妓聲最清高而酷惡性情欲殺則愛其才欲置則不堪於是選百人一時俱教少時百人中果有一人聲及之便殺向惡性者俗説曰宋禕是石崇妓緑珠弟子有國色善吹笛後在晉明帝所帝疾患危篤羣臣進諌請出宋禕時朝賢悉見帝曰卿諸人誰欲得之者衆人無言阮遥集時為吏部尚書對曰願以賜臣即與之鹽鐡論曰貴人之家中山素女撫流徴於堂上鳴鼓巴俞交作於堂下婦人被羅紈婢妾曵絺紵賢良曰古者彈筝鼔缶而已無妙要之音今富者鳴筝調琴鄭舞趙謳續捜神記曰袁真在豫州遣女妓紀陵阿薛阿郭阿馬三奴與桓宣武既至經時三人共出庭前觀忽有一流星直堕盆池烱然明净薛郭二人更以瓢酌取皆不得阿馬最後取正入瓢中便飲之即覺有娠遂生桓𤣥世説曰王導作女妓蔡謨在坐不悦而去導知亦不止之笑林曰某甲者為覇府佐為人都不解每至集㑹有聲樂之事已輙豫焉而耻不解妓人奏讃之已亦學人仰讃和同時人士令已作主人并使喚妓客妓客未集召妓具問曲吹一一疏着手巾箱下先有藥方客既集因問命曲先取所疏者誤得藥方便言是疏方有附子三分當歸四分已云且作附子當歸以送客合座絶倒太平御覽卷五百六十八
