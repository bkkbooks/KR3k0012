front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_073-1a, image: WYG0893/WYG0893-0586a.png}
body:
  text: 太平御覽卷七十三宋李昉等撰地部三十八橋堰埭橋說文曰橋水梁也𣙜音角水上横木所以渡也亦曰彴音灼今之略彴東楚謂橋為圯詩曰維鵜音題在梁不濡其翼又曰造舟為梁又曰有狐綏綏在彼淇梁爾雅曰隄謂之梁郭璞注梁即橋也或曰梁石橋也石杠音江謂之猗音竒亦曰石橋也史記曰張良嘗間從容歩遊下邳圯上楚人謂橋為圯圯音怡有老父衣褐至良所直墮其履圯下顧謂良曰孺子下取良下為取履因長跪履之父足受笑而去又曰文帝出行中渭橋有一人從橋走乗輿馬驚使騎捕之屬廷尉張釋之治問曰縣人來如淳曰長安縣人聞蹕匿橋下乆以為行過既出見車騎即走耳廷奏犯蹕當罰金又曰西門豹發民鑿十二渠引河水灌民田到漢之立而長吏以為十二渠橋絶馳道相比近不可欲合渠水且至馳道合三渠為一橋鄴人父老不肯聽長吏以為西門君所為也賢君之法式不可更也長吏終聽置之漢書曰薛廣德為諫議大夫上酎祭宗廟出便門欲御樓船廣德當乗輿免冠頓首曰宜從橋詔曰大夫冠廣德曰陛下不聽臣臣自刎以血汚車輪陛下不得入廟矣上不悅光禄大夫張猛進曰乗船危就橋安上曰曉人不當如是耶乃從橋東觀漢記曰班超討焉耆王廣遣其左將比鞬友奉迎超賜而遣焉耆見有葦橋之險廣乃絶橋不欲令漢軍入見超更從他道渡魏略曰驢分國往大秦渡海飛橋長二百三十里又曰洛陽城西橋洛水浮橋三處三柱三公象也魏志曰鍾繇嘗與族叔瑜至洛陽道遇相者曰此童有貴相然當厄水行未十里渡橋馬驚墮水㡬死而後至太傅又曰景元四年伐蜀鍾㑹領十餘萬衆分從斜谷入先遣牙將許儀在前治道㑹在後行而橋穿馬足陷於是斬儀蜀志曰先主為曹公所追張飛拒後據水斷橋無敢近者吳志曰凌統字公績從征合淝為右部都督時權徹軍還前部已發魏將張遼等掩至津北權使追還前兵兵已遠勢不相及也統率親近三百人扶扞權出敵已毁橋之兩板䇿權馬過統復還戰王隱晉書曰杜預啓建河橋于富平津衆論以為殷周所都經聖賢而不作者必不可作故也預曰昔造舟為梁則河橋之謂也遂作橋成上從百官臨㑹舉杯謂預曰非君此橋不立也預曰非陛下之明臣亦不獲奉成聖制也衆咸稱善後魏書曰崔亮為雍州刺史城北渭水淺不通船行人艱阻㑹天大雨山水暴至浮出長木數百根藉此為用橋遂成立百姓利之至今猶名崔公橋又曰于栗磾音低從太宗南臨孟津謂栗磾曰可作橋乎磾曰杜預造橋遺事可想乃編次大船搆橋於野坂六軍既濟太宗乃深嘆焉北齊書曰張亮守河州文帝於上流放火船欲燒河橋亮乃備小艇百餘皆載長鏁鏁頭施釘火船將至即馳小艇以釘釘之引鏁向岸火船不得及橋全亮之計也唐書曰韋景駿神龍中累轉肥鄉令縣北界漳水連年泛溢舊岸廹近水漕雖脩築不息而漂流相繼景駿審其地勢拓南岸因髙築堤暴水至堤南以無患水去而堤北稱腴田漳水舊有架柱長橋每年脩葺駿又改造為橋自是無復水患至今頼焉戰國䇿曰豫讓欲為智伯報仇漆身吞炭襄子當出伏於橋下至橋馬驚曰是必豫讓也求之果是述征記曰方輿縣鬼橋忽一夜聞人呼喚聲車行雷駭曉而石橋自成家家牛皆喘息未定齊地記曰秦始皇作石橋欲渡海觀日出處舊說始皇以術召石石自行至今皆東首隱軫似鞭撻瘢形似馳逐英雄記曰公孫瓉擊青州黄巾賊大破之還屯廣宗袁本初自往征合戰於界橋南二十里紹將鞠義破瓉於界橋斬瓉冀州刺史綱嚴又破瓉殿兵於橋上即此梁也潯陽記曰廬山有三石梁長數十丈廣不盈尺窈然無底吳猛將弟子登山過此梁見一翁坐桂樹下以玉杯承甘露漿與猛又至一處見數人為猛設玉膏猛弟子竊一寳欲以來示世人梁即化如指猛使還寳其梁復如故三輔故事曰漢丞相夏侯嬰墓在飲馬橋東大道南人謂之馬冡三輔黄圖曰秦始皇併天下都咸陽營殿端門四達以則紫宫渭水貫都以象天漢横橋南渡以法牽牛襄陽耆舊記曰木蘭橋今之豬蘭橋是也劉季和於此橋東大養豬襄陽太守曰此豬屎臭當易名豬蘭橋初如戲言而百姓遂易其名郡國志曰漳水建武十一年造紫陌浮橋於水上有天井堰魏文侯時西門豹為鄴令沉巫處也又曰通門内有臯橋即漢臯伯通居此橋以得名梁鴻賃舂之所應璩華陽國志曰李冰造七橋上應七星故光武謂吳漢曰安軍宜在七星橋間也又曰昇仙橋在成都縣北十里即司馬相如題橋柱曰不乗駟馬髙車不復過此橋又曰萬里橋在成都縣南八十里蜀使費禕使吳諸葛亮送之於此嘆曰萬里之路始於此橋因名萬里橋地理志曰漳水出上黨鄴中趙武帝於漳水造浮橋接紫陌故號曰紫陌橋祖台之志怪曰義興郡溪渚長橋下有蒼蛟吞噉人周處執劍橋側伺久之遇出於是懸自橋上投下蛟背而刺焉蛟數創流血丹溪自郡渚至太湖句浦乃死水經注曰上虞縣亦名虞賔舜避丹朱於此故以名縣百官從之故縣北有百官橋亦云禹與諸侯㑹事訖因相虞樂故曰上虞二說不同未詳孰是國語曰天根見而水涸水涸而成梁故夏令曰十月成梁不使民患渉也紀年曰周穆王七年大起師東至于九江架黿鼉以為梁崔鴻十六國春秋後燕録曰慕容垂與劉牢之戰于五丈橋橋壊晉大敗車騎慕容德等引兵要牢之五丈橋牢之馳馬跳五丈澗㑹苻丕救至而免孟子子産聽鄭國之政以其乗輿濟人於溱洧孟子曰惠而不知為政抱朴子曰尾生與婦人期橋下水至不去以至溺死雖有信不如無也王充論衡曰髙麗國侍婢見氣如雞子來感之有娠生子名東明東明善射王恐其害國欲殺之東明走至淹水以弓擊水魚鼈浮而為梁既渡而魚鼈觧散諸葛亮集曰亮上書曰臣先遣孟琰據武功水東司馬懿因水以二十日出騎萬人來攻琰營作車橋賊見橋垂成便引兵退堰埭吳録曰句容縣大皇時使陳勲鑿開水道立十二埭以通吳㑹諸郡故船行不復由京口晉中興書曰兖州既平謝𤣥患水道險澁糧運艱難壅吕梁水立七埭以利運漕又曰謝安築埭於新城北百姓頼之故名召伯埭述征記曰秦梁埭到召伯埭二十里召伯埭到三救埭十五里三救埭到鏡梁埭十五里晉書曰李矩與汝南太守袁孚率衆脩洛陽千金堰以利運漕梁典曰天監十三年魏降人王足陳計求堰淮水以灌夀陽引北方童謠曰荆山為上格浮山為下格潼沱為激溝并灌鉅野澤武帝遂發衆築之令太子右衛率康絇䕶堰作役人及戰士三十萬於鍾離南起浮山北抵巉石依岸以築土合脊於中流十四年四月堰將合淮水剽疾輙復決潰衆患之或謂江淮之間多有蛟龍能乘風雨決壞崖岸其性惡鐵因是引東西二冶故鐵噐大則釜鬵小則鋘鋤數千萬斤沉於堰所仍不能合乃伐樹為井榦填以巨石加土其上縁淮百里内岡陵木石無巨細必盡負擔者肩皆穿夏日疾疫死者相枕蠅䖟晝合是冬寒甚淮泗盡凍士死者十七八至十五年四月堰乃成其長九里下濶有四十丈上廣四十五丈髙二十丈軍人列居于上其水清潔俯視居人墳墓了然皆在其下其夀陽戍因移置八公山上夾淮數百里皆水之所淹人謂絢曰四瀆天所以節宣其氣不可久塞既而昏霧三日而堰决殺萬人其聲若雷聞三百里水中怪物隨流而下或人頭魚身龍形鳥首殊類詭狀不可勝名其處為荆山堰今渦口東岸是後周書賀蘭祥奏太祖以涇渭溉灌之處渠堰廢毁乃命祥修造富平堰開渠引水東注於洛功用既畢民獲其利唐書張守珪為都督瓜州地多沙磧不宜稼穡每年少雨以雪水溉田至是渠堰盡為賊所毁既地少林木難為修葺珪設祭祈禱經宿而山水暴至大漂材木塞澗而流直至城下守珪使取充堰於是水道復舊晉後畧曰張方圍京邑决千金堰水溝渠枯涸井多無泉鄴中記曰當魏文侯時西門豹為鄴令堰引漳水激鄴以富魏之河南後史起為鄴令引漳水十二渠灌漑於魏田數百頃魏益豐實後廢堰田荒魏時更修通水并堰鄴城西南漳水十八里中細流東注鄴城南二十里中作二十堰語林曰陳協數日輙進阮歩兵酒一壺後晉文王修九龍堰阮舉協文王用之掘地得古承水銅龍六枚堰遂成也魏郡圖經曰愜山古堰也今謂之愜山即漢成帝時河决金堤蓋於此運土以塞河頗愜當時人心故謂之為愜山在今魏縣西戴延之西征記曰金瀍谷三水合處有千金堨音曷即魏陳思王所立引水東灌民今頼之又九州要記洛陽千金堨傍有九龍祠存又地理書曰榖水出為湖溝費千金以堰之太平御覽卷七十三
