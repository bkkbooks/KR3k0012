body:
  text: 太平御覽卷七百十九宋李昉等撰服用部二十一粉黛脂澤燕支的花勝粉釋名曰粉分也研米使分散也䞓勑真切粉者赤也染粉使赤以着頰也墨子曰禹造粉博物志曰紂燒鈆錫作粉漢書曰廣川王去疾幸姬陶望卿去疾昭后妬之令畫工畫望卿袒裼傅粉王疑有姦又曰惠帝侍中傅脂粉續漢書曰順帝時所除官多不次李固奏免百餘人等既怨共作飛章誣固曰大行在殯路人掩涕固獨糊粉飾貎搔頭弄姿盤旋偃仰曽無慘怛之意魏書曰何晏自喜動静粉白不去手行歩顧影魏畧曰邯鄲淳詣臨淄侯植時大暑植取水浴以粉自傅科頭胡舞擊劒誦小説顧謂淳曰邯生何如也韓子曰若毛嬙西施之美麗無益吾面用脂澤粉黛則倍其初言先王仁義無益於治明法度必賞罰則用之脂澤粉黛淮南子曰漆不厭黒粉不厭白抱朴子曰或問渉海之法荅曰先於川次破雞子一枚以少粉雜香末合投水中則不畏風波又曰民不信黄丹及胡粉是化鉛所作神仙𫝊曰真人南極子能含粉成雞子吐之數十枚煮之雞子黄中皆有少粉也華陽國志曰巴郡江西縣有清水穴巴人以此水為粉則皜曜鮮芳嘗貢京師名為粉水扶南𫝊曰頓遜國有磨夷花末之為粉大香夢書曰婦人夢粉飾為懐姙神農本草曰粉飾一名鮮錫語林曰石崇厠置甲􅋩粉沉香汁之屬漢官儀曰省中以胡粉塗壁鄴中記云石虎以胡粉和椒塗壁曰椒房宋玉登徒子賦曰着粉太白施宋太赤蔡邕女誡曰加粉則思其心之鮮曹植樂府曰御巾粉於君傍中有藿納及都梁傅長虞感凉賦曰珠汗隕於王躬粉附身而沾凝黛説文作黱畫眉也釋名曰黛代也㓕去眉毛以此代其處也通俗文云染青石謂之㸃黛後漢書曰明徳馬后眉不施黛獨左眉角小缺補之如粟宋起居注曰河西王沮渠䝉遜獻青雀頭黛百斤楚詞曰粉白黛黒施芳澤長袂拂面善留客脂澤釋名曰澤人髪恒枯瘁以此濡澤之脣脂以丹作象脣赤也廣志曰面脂魏興已來始有之漢書曰翁伯販脂而富傾縣邑又曰孔奮為姑藏長清儉人或譏之以詐身處脂膏不能自潤北史后妃𫝊曰晉舊儀典櫛三人掌宫中櫛膏沭世説曰江淮以北謂面脂為面澤蔡邕女誡曰傅脂則思其心之和澤髪則思其心之潤馮衍集曰衍與婦弟任武逹書曰惟一婢武所見頭無釵澤面無脂粉燕支博物志曰作燕支法取藍違委切𢷬以水洮去黄汁作小餅如手掌着濕草卧一宿便隂乾欲用燕支以水浸之三四日以水洮赤黄汁盡得赤汁而止也西河舊事曰祁連山焉支山宜畜養匈奴失此二山乃歌曰失我祁連山使我六畜不蕃息失我焉支山使我婦女無顔色崔豹古今注曰燕支葉似蒯花似菖蒲出西方土人以染名為燕支中國人謂紅藍以染粉為婦人面色謂為燕支粉也習鑿齒與燕王書曰此下有紅藍足下先知之不北方人採取其花染緋黄接其上英者作燕支婦人用為顔色可愛班固曰匈奴名妻作閼氏言可愛如燕支的釋名曰以丹注面曰的的灼也此本天子諸侯有羣妾者以次進也御有月事者止不御重不口説故注此於面灼然而識也王粲神女賦曰施華的結羽釵𫝊𤣥鏡賦曰珥明璫之迢迢㸃雙的以發姿花勝釋名曰花勝草花也言人形容正等着之則勝續漢書輿服志曰皇后入廟為花勝上為鳯凰以翡翠為毛羽下有白珠垂金綺鑷横簮之山海經曰西王母梯几戴勝符瑞圖曰金勝者仁寳也不斲自成光若明月晉中興書曰一名金勝援神契曰神靈滋液百珎寳用有金勝晉孝武時陽穀氏得金勝一枝長五寸形如織勝太平御覽卷七百十九
