body:
  text: 太平御覽卷九百三十一宋李昉等撰鱗介部三龜爾雅曰龜三尺賁今吳興陽羨縣君山上池中有六眼龜龜俯者靈行頭低仰者謝行頭高前弇諸果甲長前後弇諸獵甲后長左倪不類行頭左痺今江東所謂左食者以甲卜審右倪不若行頭右痺為右食一曰神龜龜之最神明二曰靈龜涪陵郡中出大龜甲可卜有緑文篆字俗呼為靈龜三曰攝龜小龜也腹甲屈折鮮能自張閉好食蛇江東呼為靈龜四曰寶龜書曰遺我大寳龜五曰文龜甲文采者河圖負書用甲青足六曰筮龜常在藂下潜伏見龜菜傳七曰山龜八曰澤龜九曰水龜十曰火龜一皆曰龜生之處火龜猶火鼠牛耳物有含異氣者不可以常理推然亦無所怪周易曰或益之十朋之龜又說卦曰離為龜京房易緯曰靈蓍四十九莖下有千歳龜守之焦贛易林曰龜厭江海陸行不止自令枯藁失其都市尚書皋陶謨曰昆命于元龜又禹貢曰九江納錫大龜又曰寧王遺我大寶龜尚書中侯曰堯沈璧於洛元龜負書出背甲赤文朱字上壇場沈璧於河黑龜出赤文題又曰周公攝政七年制禮作樂成王觀於雒沉璧禮畢王退有元龜青純蒼光背甲刻書上躋於壇赤文成字周公寫之雒書曰靈龜者元文五色神靈之精也上員法天下方法地能見存亡明於凶吉王者不偏黨尊耆老則出洪範五行曰龜之言久也千歳而靈此禽獸而知吉凶者也周禮天官上鼈人曰春獻龜蜃秋獻鼈魚又春官下龜人曰龜人掌六龜之屬各有名物天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰雷屬南龜曰獵屬北龜曰若屬凡取龜用秋時攻龜用春時各時以其物入于龜室名也大戴禮曰甲之蟲三百六十而神龜為之長禮記月令曰季秋登龜取黿又學記曰青黑者天子之寶龜也禮運曰麟鳳龜龍謂之四靈逸禮曰天子龜尺二寸諸侯八寸大夫六寸民士四寸龜者隂蟲之老也龜三千歳游於卷耳之上老者先知故君子舉事必考之禮統曰神龜之象上員法天下方法地背上有盤法邱山黝文交錯以成列宿五光昭若黝錦文運轉應四時長尺二寸明吉凶不言而信左傳襄四月臧武仲自邾使告臧賈且致大蔡焉大蔡即文仲所居也紇不佞失守宗祧敢告不弔言我為人後不至于道而失守紇之罪不及不祀不祀絶也言不當絶祀也子以大蔡納請其可請為先人立後其必可也賈曰聞命矣再拜受龜公羊傳定公曰弓繡質弓柎龜青純春秋運斗樞曰瑶光星㪚為龜史記龜䇿傳曰余至江南觀其行事問其長老云龜千歳乃遊蓮葉之上江旁人家嘗畜龜飲食之以為能導引致氣有益於助衰養老豈不偉哉史記禇先生曰能得名龜者財物歸之家必大富至千萬一曰北斗龜二曰南辰龜三曰五星龜四曰八風龜五曰二十八宿龜六曰曰月龜七曰九州龜八曰玉龜凡八名龜龜各有文在腹下此龜不必滿尺二寸民人得長七八寸可寶矣神龜出於江中廬江郡每歳常出龜長尺二寸者二十枚輸太卜官太卜官因以吉日剔取其腹下甲龜千歳乃滿尺二寸有神龜在江南嘉林之中嘉林者獸無狼鳥無鴟梟草無毒螫野火不及斧斤不至是謂嘉林龜在其中嘗巢於蓮葉之上左脇書文曰甲子重光得我者匹夫為人君有土正諸侯得我為帝王南方老人用龜支牀足經二十歳餘老人死後移牀龜尚生能行氣𨗳引又曰宋元王二年江使神龜使於河至泉陽漁者豫且舉網得而囚之置之籠中夜半龜來見夢於宋元王曰我為江使於河而網當吾路泉陽漁者豫且得我而不能去身在患中王有德義故來告愬元王惕然乃召博士衛平而問之平曰龜也王求之泉陽豫且曰夜半舉網得龜使者載行入端門見王延頸而前三步而止縮頸而却復其故處於是元王擇日齋戒以刀剥之元王之時衛平相宋宋國最强龜之力也魏略曰文帝時神龜出於靈芝池晉書曰懐帝永嘉元年有玊龜出於覇水也崔鴻十六國春秋前燕録曰海出大龜枯死於平墩遼東送之侍郎王宏以為字文允得龜滅亡之徴也晉書曰符堅末高陸人穿井得龜大三尺背上有文象八卦堅命為石池養之食以粟及死藏其骨於太廟是夜廟丞高虜夢龜謂之曰我本出將歸江南遭時不遇殯命秦庭虜于夢中自解曰龜三千六百歳終必妖興亡國之象也其後竟騐又載紀曰乞伏國仁隴西鮮卑人也昔有如弗斯出連叱盧三部自漢北南出太隂山遇一巨蟲於路状若神龜大如阜乃殺馬而祭之祝曰若喜神也便開路惡神也遂塞不通俄而不見乃有一小兒在焉南齊書曰永明唐潜獻青毛神龜一頭梁書曰元帝為江州刺史時有安成望族劉敬躬者田間得白蛆化為金龜将銷之生光照室敬躬以為神而禱之所請多驗也三國典略曰梁陸法和至襄陽城北大樹下畫地方二尺令弟子掘得一龜長一尺五寸以杖叩之曰汝欲岀不得已數百嵗若不遇我豈見天乎曰為授三歸龜乃入草去陳書曰武帝章皇后母常遇道士遺以水龜光采五色曰三年有徴及期后生紫光照室因失龜所在隋書曰開皇中掖庭宫每月人來桃宫人宫司以聞帝曰門衛甚嚴人何從而入當是妖精耳因戒宫人曰若逢但斫之其後有物如人夜來登床宫人抽刀斫之若中枯骨其物落床而走宫人逐之因入池而沒明日帝令涸池得一龜徑尺餘其上有刀迹殺之遂絶唐書曰先天二年丁未江州獻靈龜六眸腹下有元文象卦文梁書曰朱女貞末年訴州獻綠毛龜以為瑞因宫中造室以居之目為龜堂晉史曰安州李金全之將叛也郡樓有介蟲如龜而巨鱗銳首能陷堅出於金全足下金全惡焚之列子曰渤海之東有大壑焉其中有山無所連着常隨潮波上下往還不得暫峙焉仙聖苦之訴於上帝帝恐流於西極失羣聖之居使巨龜十五舉首而戴之迭為三番六萬歳一交焉五山始峙而不動龍伯之國有大人舉足而不盈數十步乃暨五山之所一釣而連六龜合負而趣歸其國灼其骨以數焉荘子曰荘子欽於濮水楚王使大夫往先焉曰願以境内累子荘子持竿不顧曰吾聞楚有神龜死已二千歳矣巾笥而藏之廟堂之上此龜者寧其死留骨而貴乎寧其生而曳尾塗中乎吾將曳尾於塗中又曰宋元君夜半而夢人披髪窺阿門曰予自宰露之淵予為清江使河伯之所漁者豫且得予元君覺召夢者占之曰此神龜也明日豫且朝君曰若魚何得答曰且之網得白龜五尺君曰獻若之龜龜至君欲殺之再欲活之心疑卜之曰殺龜以卜吉乃刳龜以卜七十二鑽而無遺筴仲尼曰神龜能見夢於元君而不能避豫且之網智能七十二鑽而無遺筴不能避刳腸之患淮南子曰龜三千歳蜉蝣不過三日以蜉蝣而為龜憂養生之具人必笑之又曰牛􅀈􅇾顱亦骨也而弗灼必問凶吉於龜者以其歴久也抱朴子曰千歳靈龜五色具焉其雄額上兩骨起似角解人言浮於蓮葉之上或在叢蓍之下以來朱浴之乃剔取其甲火炙𢷬服方寸七三盡一具夀千歳又曰山中辰日稱雨師者龍也巳日稱寡人者社中蛇也稱時君者龜也又曰㕁倫少時行獵墮空冢中飢餓見冡中有大龜數數廻轉所向無常張目吞氣或俯或仰素聞龜能導引乃試隨其所為遂不復飢百餘日後竟能咽氣斷穀魏王棄置土室中試之一年不食顔色恱懌氣力自若符子曰邦人獻燕昭王以大豕者曰於今百二十歳邦人謂之豕仙其羣臣言於昭王曰是豕無用王命宰夫即膳之豕既死乃見夢於燕相曰今仗君之靈而化吾生也始得為魯津之伯而浮舟者食我以粳粮之珍而欣君之惠将報子焉後燕相遊於魯津有赤龜啣夜光而獻金樓子曰黄金滿笥不以投龜明珠徑寸豈勞彈雀又曰巨龜伏沙嶼間其上生樹木如淵島嘗有商人依以採薪及作食龜被灼熱便還海於是死者數千人又曰陽郡山中有巨龜長八尺腹下有文字前後足下各躡一龜有時踰山越水咸觀異之說苑曰靈龜五色色似玉背隂向陽上隆象天下平法地轉運應四時蛇頭龍頸左精象日右精象月知存亡吉凶之變又曰城濮之戰文公謂子犯曰吾十戰而龜􅑒我迎歳彼背歳彗星見彼操其柄我操其摽吾又夢與楚王摶彼在上我在下吾欲旡戰子以為何如子犯對曰卜戰龜􅑒是荆人也我迎歳彼背歳彼去我從之也又曰晉屠㟁賈欲誅趙氏趙盾夢見叔帶持龜而哭甚悲已而笑拊手且歌謂趙盾卜之占兆絶而后好趙史援占曰此甚惡非君之身國語曰夫服心之文也如龜焉灼其中必文於外若楚公子不為君必死不合諸侯矣家語曰孔子問漆彫馮子曰臧文仲及孺子容三大夫者孰為賢乎對曰臧氏家有守龜焉文仲三年而為一兆武仲三年而為二兆孺子容三年而為三兆馮從此見之若夫三人之賢與不賢所未敢識也孔子曰君子哉漆彫氏之子其言人之美也隠而顯言人之過也㣲而著智不能及明不能見孰克如之論衡曰龜二百歳大如錢游草葉上三千歳則青邉有距山海經曰大苦山陽狂水出焉注於伊水中多三足龜星經曰天龜二百五星在南漢中廣志曰觜􅏲形如龜出在交州山龜在上食草長尺餘柳氏龜經曰龜一千二百歳可卜天地之終始何以言之三千四十二占於天地千歳之龜甲黑龜有五色時用之神仙傳曰南極子融執杯呪之即成龜煮之可食腹臟皆具杯成龜穀煮取肉還成杯㑹稽後賢傳曰孔愉字敬康嘗至吳興餘不亭見人籠龜於路愉求買而放於溪中龜行至水反顧視及愉封此亭而鑄印龜首廻屈三鑄不正有似昔龜之顧靈徳感應如此華陽國志曰秦惠王十二年張儀司馬錯破蜀克之儀因築城城終頺壊後有一大龜從硎而出周行旋走乃依龜行所築之乃成古史考曰伏羲時靈龜負河圖洛陽記曰禹時有神龜於洛水負文列於背以授禹文即治水文也南越志曰龜甲名神屋出南海生池澤中吳越謂之元佇神龜大如拳而色如金上甲兩邉如鋸齒爪至利而能緣大木捕鳴蝉至美可食不中於卜以其小故也嵩髙山記曰千歳松或化為伏龜義興記曰君山廟其下有池池中有三足六眼龜崔豹古今注曰龜一名元衣督郵一名元緒王子年拾遺録曰崑崙山第五層有神龜長一尺九寸四翼萬歳則無水而居也亦能言矣郭子横洞溟記曰黄安代郡人也嘗辭家逺去自云不敢處人間執鞭有懐欲書畫地以記其數一夕地成池矣後更移亦復成池時人謂言黄安舌耕年可八十餘視若童子常服硃砂舉體皆赤冬不着衣坐一大神龜時人問子坐此龜幾年對曰昔伏羲氏始造網罟有此龜以授吾龜背已平此蟲畏日月之光二千歳而一出頭我坐此龜以來五遇出頭矣行則負龜而移世人謂黄安萬歳博物志曰人有出行墜深澗中者無出路飢餓分死左右見龜虵甚多朝暮引頸向東方人因伏地學之遂不復飢體殊輕便能登巖㟁經數年後試竦身舉背遂超出澗上即得還家顔色恱懌頗更黠慧其後還食穀啖滋味百餘日中復其本質又曰龜三千歳猶旋卷耳之上蓍千歳三百莖同本以老故知吉凶神異經曰西方大荒中有人焉長文其腹圍九尺踐龜虵戴朱鳥知河海升斛識山石多少知天下鳥獸言語續捜神記曰司徒蔡謨親友王䝉者單獨常為蔡公所憐公嘗令人捕魚獲龜如車輪公付厨帳下倒懸龜着屋蒙其夕纔眠即厭如此累夜公聞而問蒙何故厭荅云眠輙夢人倒懸已公因慮向龜乃令人視龜所在果倒懸着屋公歎曰果如所度命下龜於地於是䝉即得安寢乃去又曰晉咸康中豫州刺史毛寶戍邾城有一軍人於武昌市見人賣一白龜子長四五寸潔白可愛寶便買取持龜着瓮中養之七日大近尺許軍人憐之持至江邊放水中視其去後邾城遭石勒敗毛寶棄豫州既越江莫不沈溺寶於時被鎧持刀亦同自投既入水中覺如墜一石上水裁至腰須臾游去中流視之乃是先所養白龜甲六七尺既送之東岸出頭視軍人徐游而去中江猶廻首數焉又曰鄱陽縣民黄赭入山採荆楊子遂迷不知道數月飢餓忽見一大龜赭便呪曰汝是靈物吾迷路不知道今騎汝背示吾路龜即回右膞赭即從行去十餘里便至溪水見賈客行船赭即乞寄載便語船人云我向者於溪邊見一龜甚大可共往取之言訖面即生瘡既往亦復不見龜還家數日病而死劉敬叔異苑曰餘姚縣倉封印完全而開之覺大損耗后伺之乃是富陽縣桓王陵上雙石龜所食即宻令毁龜口於是不復損耗又曰孫權時永康有人入山遇一大龜即束之歸龜便言曰遊不量時為君所得人甚恠之載出欲上吳王夜泊越里纜船於大桑樹宵中樹呼龜曰勞乎元緒奚事爾耶龜曰我被拘縶方見烹臛雖盡南山之樵不能潰我樹曰諸葛元遜博識必致相苦令求如我之徒計從安出龜曰子明無多辭禍将及爾樹寂而止既至權命煮之焚柴萬車語猶如故諸葛恪曰燃以老桑乃熟獻人仍說龜樹共言權登使伐樹煮龜立爛今烹龜猶多用桑薪野人故呼龜為元緒孔氏志怪曰㑹稽吏謝宗赴假吳中獨在船忽有女子姿性妖惋來入船問宗有佳絲否欲市之宗因與戲女漸相容留在船宿歡晏繼曉因求宗寄載宗便許之自爾船人恒夕但聞言笑兼芬馥氣至一年往來同宿宻伺之不見有人方知是邪魅遂共掩之良久得一物大如枕須臾又得二物並小如拳以火視之乃是三龜宗悲思數日方悟自說女子一歳生二男大者名道愍小者名道興既為龜送之於江廣五行記曰晉孝武太元中吳郡岑泉為司農造碑於江畔湖西之村見石龜載碑從田中出還其先處萍藻猶在腹下其月泉暴亡任昉述異記曰陶唐之世越裳國獻千歳神龜方三尺餘背上有文皆科斗書記開闢以來命録謂之龜厯伏滔述帝功徳銘曰胡書龜歴之文又曰周時城陽雨錢終日方絶王莽時未央宫雨五銖錢既至地悉為龜兒又曰龜一千年生毛夀五千歳謂之神龜夀萬年曰靈龜孫惠龜賦曰有緇衣之大夫兮衣元繡之衣裳乗芝車之岌嶪兮駕雲霧而翺翔風雨為之震奮兮五色赫以焜煌李顒龜賦曰質應離象位定坎居賤彼朶頥賁我靈符浮洛川見緯書洞祕奥通元虛太平御覽卷九百三十一
