front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_134-1a, image: WYG0894/WYG0894-0238c.png}
body:
  text: 太平御覽卷一百三十四宋李昉等撰偏霸部十八陳陳蒨陳頊陳伯宗陳叔寳陳陳蒨陳書曰世祖文皇帝諱蒨字子華始興昭烈王長子也少沈敏有識量美容儀留意經史舉動方雅造次必遵禮法高祖甚愛之常稱此兒吾宗之英秀也梁太清初帝夢兩日鬬一大一小大者光滅墜地色正黄其大如斗世祖因三分取一而懐之侯景之亂鄉人多依山湖寇抄世祖獨保家無所犯時亂日甚乃避地臨安及高祖舉義兵侯景遣使收世祖及衡陽獻王世祖乃密袖小刀冀因入見而害景至便屬吏故其事不行高祖大軍圍石頭景欲加害者數矣㑹景敗世祖乃得出赴高祖營起家為吳興太守高祖受禪立為臨川郡王邑二千户拜侍中安東將軍及周文育侯安都敗於沌口高祖詔世祖入衞軍儲戎備皆以委焉尋命率兵城南晥永定三年六月庚午高祖崩遺詔徴世祖入纂皇統甲寅至自南晥入居中書省其日即皇帝位於太極前殿詔曰上天降禍奄集邦家大行皇帝背離萬國率土崩心若喪考妣龍圖寳厯眇屬朕躬運鍾擾攘事切機務南面須主西讓禮輕今便式膺景命光宅四海可大赦天下改永定四年為天嘉元年鰥寡孤獨不能自存立者賜榖人五斛孝弟力田殊行異等加爵一級甲寅分遣使者宣勞四方辛酉輿駕親祀南郊二年春正月庚戌大赦天下十二月立始興國廟於京師用王者之禮太子中庶子虞荔御史中丞孔奐以國用不足奏立煮海鹽賦及𣙜酤之科詔並施行三年春正月庚戌設帷宫於南郊幣告胡公以配天辛亥輿駕親祀南郊二月甲子改鑄五銖錢三月丙子安成王頊至自周詔授侍中中書監中衞將軍置佐史是歳周所立梁王蕭詧死子巋立軌切代立天康元年春二月庚子詔曰朕以寡徳纂承洪緒日昃劬勞思𢎞景業而政道多昩黎庶未康兼疾患淹時亢陽累月百姓何咎實由朕躬念兹在兹痛如疾首可大赦天下改天嘉七年為天康元年三月己卯以驃騎將軍開府儀同三司揚州刺史司空安成王頊為尚書令夏四月乙卯皇孫至澤生在位文武賜絹帛各有差為父後者賜爵一級癸酉世祖疾甚是日崩於有覺殿遺詔曰朕疾苦彌留遂至不救修短有命夫復何言但王業艱難頻歳軍旅生民多敝無忘愧惕今方隅未定俗教未𢎞便及大漸以為遺恨社稷任重太子可即君臨王侯將相善相輔翊内外協和勿違朕意山陵務存儉速大斂竟羣臣三日一臨公除之制率依舊典六月甲子羣臣上諡曰文皇帝廟號世祖塟永寧陵陳伯宗陳書曰廢帝諱伯宗字奉業小字藥王世祖嫡長子也永定二年拜臨川王世子世祖嗣位立為皇太子天康元年四月世祖崩即皇帝位二年春詔大赦天下改光大元年孝悌力田賜爵一級輿駕祠南郊二年十一月慈訓太后集羣臣於朝堂令降為臨海王送還藩邸是日出居別第太建二年薨時年十九陳頊陳書曰高宗孝宣皇帝諱頊字紹世小字師利始興昭烈王第二子也梁大通二年生有赤光滿室少寛大多智略及長美容儀身長八尺三寸手垂過膝有勇刀善騎射高祖平侯景鎮京口梁元帝徴高祖子姪入侍高祖遣高宗赴江陵累官為直閣將軍中書侍郎時有馬軍主李總與高宗有舊每同遊處高宗嘗夜被酒張燈而寐總適出尋返乃見高宗身是大龍總便驚走時在關右永定元年遥襲封始興郡王邑二千戸三年世祖嗣位改封安成王天嘉三年自周還授侍中中書監中衞將軍置佐史尋授使持節都督揚南徐東揚南豫北江五州諸軍事揚州刺史進號驃騎將軍餘如故四年加開府儀同三司六年遷司空天康元年授尚書令廢帝即位拜司徒進號驃騎大將軍録尚書都督中外諸軍事給班劒三十人光大二年正月進位太傅領司徒加殊禮劒履上殿増邑并前三千戸餘如故十一月甲寅慈訓太后令廢帝為臨海王以高宗入纂是嵗春正月甲午即皇帝位於太極前殿詔改光大三年為太建元年大赦天下在位文武賜位一階孝悌力田及為父後者賜爵一級異等殊才並加䇿序鰥寡孤獨不能自存者人賜榖五斛復太皇太后尊號曰皇太后立妃栁氏為皇后世子叔寳為皇太子冬十月新除左衞將軍歐陽紇據廣州舉兵反辛未遣車騎將軍開府儀同三司章昭達率衆討之壬午輿駕親祠太廟二年春正月乙酉以征西大將軍開府儀同三司郢州刺史黄法􅉤其於切為中䕶大將軍丙午輿駕親祠太廟二月癸未儀同章昭達擒歐陽紇送都斬於建康市廣州平三月丙申皇太后崩丙午赦廣衡二州丁未大赦天下三年春正月癸丑以尚書右僕射領大著作徐陵為尚書僕射辛酉輿駕親祠南郊丁酉親耕藉田三月丁丑大赦天下自天康元年迄太建元年逋餘軍糧禄秩夏調未入者悉原之五年三月詔大都督吳明徹統衆十萬發自白下夏四月癸夘前巴州刺史魯廣達尅齊大峴城辛亥吳明徹尅秦州水柵庚申齊遣兵十萬援厯陽儀同黄法􅉤破之辛酉齊軍救秦州吳明徹又破之癸亥詔北伐衆軍所殺齊兵並令埋掩甲子南譙太守徐槾克石梁城六年春正月壬戌朔詔曰王者以四海為家萬姓為子一物乖方夕惕猶厲六合未混旰食彌憂朕嗣纂洪基思𢎞經略上符景宿下叶人謀命將興師大拯淪溺灰管未周凱㨗相繼拓地數千連城將百蠢彼餘黎毒兹異境江淮年少猶有剽掠鄉閭無賴摘出隂私將帥軍人罔顧刑典今使苛法蠲除仁聲載路且肇元告慶邊服來王始覩皇風宜覃恩澤可赦江右淮北南北厯陽臨江等郡士民罪無輕重悉皆原宥七年春正月辛未輿駕親祠南郊四月乙未陳桃根表上織成羅文錦被裘各二百詔於雲龍門外焚之八月周遣使來聘甘露頻降樂遊苑丁未輿駕幸樂遊苑採甘露宴羣臣詔於苑龍舟山立甘露亭十一年春正月丁酉龍見於南兖州永寧樓側池中二月癸亥輿駕親耕藉田三月丁未詔淮北義人率户口歸國者建其本屬舊名置立郡縣即𨽻近州賦給田宅秋七月辛夘初用大貨六銖錢八月甲子青州義主朱顯宗等率所領七百户入附丁夘輿駕幸大社觀閱武十一月詔建子令月微陽初動應兹嘉辰宜播寛澤可大赦天下甲午周遣柱國梁士彦率衆至肥口戊戌周軍進圍夀陽以新除中衞大將軍揚州刺史始興王叔陵為大都督總督水步衆軍十二月乙丑南北兖晉三州及雍梁等九州並自拔還京師譙北徐州又陷自是淮南之地盡沒於周矣十四年春正月己酉高宗弗豫甲寅崩於宣福殿時年五十三上諡孝宣皇帝廟號高宗塟顯寧陵陳叔寳陳書曰後主諱叔寳字元秀小字黄奴高宗嫡長子也梁承聖二年生於江陵江陵陷高宗遷關右留後主於穰城天嘉三年歸京師立為安成王世子太建十四年正月高宗崩即皇帝位於太極前殿詔大赦尊皇后為皇太后宫曰𢎞範立妃沈氏為皇后七月辛未大赦是月江水色赤如血自京師至於荆州九月設無碍大㑹於太極殿捨身及乗輿服御至徳元年正月詔大赦改太建十五年為至徳元年十二月夜天開自西北至東南其内有青黄雜色隱隱若雷聲後主在東宫好學有文藝及即位躭於酒色常在後庭不恤政事又於光昭殿前起臨春結綺望仙三閣閣高數丈並數十間其牕牖欄檻之類悉以沈檀香木為之飾以金玉間以珠翠微風暫至香聞數里瑰竒珍麗近古未有其下積石為山引水為池植以竒樹雜以花藥後主自居臨春閣孔貴人居望仙閣張貴妃居結綺閣並複道往來婦人麗質巧態以從者常千餘人張貴妃孔貴人等八人侍坐尚書令江總孔範等十人侍宴號曰狎客上令八婦人製五言詩十客一時繼和遲則罰酒君臣酣飲從夕達曙所司皆因閹人奏事主者由此擅作威福軍旅警備並皆不修任用沈客卿施文慶等以苛刻為忠於是文武離心莫肯用命隋文帝謂高熲曰我為百姓父母豈可限一衣帶水不拯之乎命大作戰船人請密之隋文曰吾將行天討何密之有使投柹於江彼若能改吾又何求乃遣晉王廣為元帥以討之及聞隋軍臨江孔範曰必無渡理但恣妓樂縱酒作詩不輟明日隋軍濟江凡文武百寮皆潛出唯尚書僕射袁憲侍側憲勸端坐殿上正色以待之後主曰鋒刃之下未可當之吾自有計乃逃於井既軍人窺井呼之後主不應欲下石乃呌以繩引之驚其太重及出與張貴妃孔貴人三人同束而上賀若弼呼後主視之惶懼汗流股慄再拜弼謂之曰大國之卿當小國之君拜禮也入朝不失作歸命侯亦無勞恐懼三月後主與王公百司發自建鄴至長安後主已下大小在路五百餘里累累不絶隋文宣詔讓後主後主伏地不能對乃宥之給賜甚厚每侍宴恐致傷心為不奏吳音後監守者言叔寳願得官號隋文曰叔寳絶無心肝監守又言叔寳日飲一石少有醒時隋文曰不爾何以過日及從東巡狩邙山賦詩曰日月光天徳山河壯帝居太平無以報願上東封書並上表請封禪隋文謙讓不許後從至仁夀宫嘗侍宴及出隋文目之曰此敗豈不由作詩飲酒將此工夫何如思安邊計䇿當賀若弼度京口彼人密啟告急叔寳為飲酒遂不發高熲至猶見啟在牀下未開封豈能不亡也後主以隋仁夀四年十一月終洛陽在位七年年五十二歳史臣曰後主生深宫之中長婦人之手既屬邦國殄瘁不知稼穡艱難初懼阽危屢有哀矜之詔後稍安集復扇淫侈之風賔禮諸公惟寄情於文酒昵近羣小皆委之以衡軸謨謀所及遂無骨鯁之臣權要所在莫非侵漁之吏刑政日紊尸素盈朝躭荒為長夜之飲嬖寵同豔妻之孽危亡弗恤上下相蒙衆叛親離臨機不悟自投於井冀以茍生視其以此求全抑亦民斯下矣遐觀列辟纂武嗣興其始也皆欲齊明日月合徳天地高視五帝俯協三王然而靡不有初鮮克有終其故何哉並以中庸之材懐可移之性口存於仁義心怵於嗜慾仁義利物而道逺嗜慾遂性而便身便身不可久違道逺難以固志佞諂之倫承顔候色因其所好以恱導之若下坂走丸順流決壅非天感靈辰象降生明徳孰能遺其所樂而以百姓為心哉此所以成康文景千載而罕遇也太平御覽巻一百三十四
