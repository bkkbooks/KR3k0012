  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_179-1a, image: WYG0894/WYG0894-0601c.png}
body:
  text: 太平御覽卷一百七十九宋李昉等撰居處部七闕觀闕崔豹古今注曰闕觀也所以標表宫門也其上可居登之可逺觀人臣將朝至此則思其所闕故謂之闕其上皆畫雲氣仙靈奇禽怪獸以示四方蒼龍白虎𤣥武朱雀並畫其形廣志曰闕缺也門兩邊缺然為道也周禮太宰曰以月吉懸治法於象魏注象魏二闕名也禮記曰昔者仲尼與於蜡賓事畢出遊於觀之上喟然而嘆仲尼之歎蓋歎魯也鄭𤣥云觀闕也左傳曰哀公三年司鐸火火踰公宮季桓子至命藏象魏曰舊章不可忘也象魏闕也以法令懸之遂謂其書為象魏公羊昭公二十五年傳云子家駒曰諸侯僣於天子大夫僣於諸侯乆矣昭公曰吾何僣矣哉子家駒曰設兩觀乘大輅注云禮天子外闕兩觀諸侯内闕一觀也又定公二年傳云夏五月壬辰雉門及兩觀災兩觀微也然則曷為不言雉門災及兩觀主災者兩觀也漢帝曰䍧牱郡有桂蒲闕又曰蓬萊方丈瀛洲此三山在海中諸僊人不死藥皆在焉黄金白銀為闕事具僊部又曰建章宮東鳯闕髙二十丈列女傳曰衛靈公與夫人夜坐聞有車聲至闕而息過又聞車聲夫人曰此必是蘧伯玉公曰何以知之曰妾聞禮下公門式路馬今蘧伯玉賢者也必不以暗昧廢禮公令人視之果如所言神異經曰東南有石井其方百丈上有二石闕夾東南面上有蹲熊有榜著闕題曰地户西北荒中有金闕髙百丈上有明月珠徑三丈光照千里中有金階西北入兩闕中名天門十洲記曰崑崙山有水精闕水經曰秦孝公築冀闕臨渭水在咸陽西四十里關中記曰未央宮東有青龍闕北有𤣥武闕漢書所謂北闕者也建章宫圓闕臨北道鳯在上故曰鳯闕也閶闔門内東出有折風闕一名别風瀨鄉記曰老子廟前有兩石闕大闕髙九丈八尺下三重石鹿闕邊各有老子祠山謙之丹陽記曰大興中議者皆言漢司徒許彧墓闕可徙施之王茂宏弗欲後陪乘出宣陽門南望牛首山兩峯曰天闕也豈煩改作帝然之鄧德明南康記曰南康縣歸美山去縣七百里下有石城髙數丈逺望嵯峨靈闕騰空故老謂之神闕莊子中山公子牟謂瞻子曰身在江海之上心居乎魏闕之下奈何瞻子曰不能自勝則從神無惡乎不能自勝而强不從者此之謂重傷重傷之人無壽類矣魏文帝歌曰長安城西雙圓闕上有一雙銅雀宿一鳴五榖生再鳴五穀熟王子年拾遺記曰崑崙第九層山形漸狹小下有芝田蕙圃皆數百頃羣仙種耨焉傍有瑶臺十二各廣千步皆五色玉為臺基最下層有流精闕直上四十丈有風雲雷雨師闕觀釋名曰觀於上觀望也左傳曰哀公十七年傳云衛侯夢於北宮見人登昆吾之墟注云衛有觀在古昆吾之墟今濮陽城中漢書成帝紀曰孝成帝元帝太子也母曰王皇后帝在太子家生甲觀畫堂應劭注云甲觀在太子宮甲地主用乳生也顔師古曰畫堂但畫飾室中宮殿通有彩畫也又宣帝紀曰甘露二年幸萯陽宫在鄠屬玉觀屬玉水鳥似鵁鶄以名觀也後漢書曰丁鴻字孝公肅宗詔鴻與廣平王羨及諸儒樓望成封桓郁賈逵等論定五經同異於北宫白虎觀廣平王羨漢明帝子也東觀記曰與太常樓望少府成封屯騎校尉桓郁衛士令賈逵集議也白虎門名於門立觀因以名之焉使五官中郎將魏應主承制問難侍中淳于㳟奏上帝親稱制臨决鴻以才髙論難最明諸儒稱之帝數嗟羙焉時人嘆曰殿中無雙丁孝公東觀記曰上歎嗟其才號之曰殿中無雙丁孝公賜錢二十萬續漢書亦同而此書獨作時人嘆也章帝本紀曰永平元年長水校尉儵奏言先帝大業當敬以時施行欲使諸儒共正經義頗令學者得以自助於是下太常將大夫博士議郎郎官及諸生諸儒㑹白虎觀講議五經同異又曰時謂東觀為老氏藏室注老子為柱下史四方所記文書皆歸於柱下言東觀多經籍也又曰髙彪除郎中校書東觀後遷外黄令畫彪形象以勸學者又曰靈帝起四百尺觀於河亮道造萬金堂於西園又造南宫玉堂築廣成苑魏志曰明帝作凌霄觀始構有鵠巢其上侍中髙堂隆曰起闕而鵠巢不得居之象又曰明帝置崇文觀徴善屬文者以充之吳志孫和傳曰和為太子被廢驃騎將軍朱據尚書僕射屈晃率諸將吏泥首自縛連日詣闕請和權登白爵觀見甚惡之蜀志云李輔字元政為牙門將討破羗虜築平羌觀于秦亭晉元帝紀曰大興元年十一月乙卯日夜出髙三丈中有赤青珥詔曰天災譴誡所以彰朕之不德也羣公卿士各上封事具陳得失無所諱將親覽焉新作聽訟觀又劉曜載記曰曜立太學於長樂宫東簡百姓年二十五已下十三已上百人選朝賢宿儒明經篤學以敎之命起酆明觀於西起凌烟臺於鎬池又石季龍載記云太子宣出時季龍於其後宫升凌霄觀望之笑曰我家父子如是非天崩地陷當復何愁但抱子弄孫日為樂耳又張駿傳云駿境内漸平使其將楊宣率衆越流沙伐龜茲鄯善於是西域並降鄯善王元孟獻女號曰美人立賓遐觀以處之齊書王儉傳曰宋明帝太始六年置總明觀以集學士或謂之東觀置東觀祭酒一人總明訪學二人儒元史四科科置學士十人其餘吏下各有差是歳省總明觀於儉宅開學士館以總明簿書充之陳書後主紀云帝令采木湘州擬造正寢栰至牛渚磯盡没既而漁人見栰於海上復起齊雲觀國人歌曰齊雲觀寇來無際畔後魏書髙祖紀下云十五年五月議改律令於東明觀親折疑獄又道武帝紀云天興三年起紫微殿元武樓風凉觀石池鹿苑臺又匈奴劉聰傳云平陽地震崇明觀陷為池水赤如血赤氣至天赤龍奮迅而去輿地志曰丹陽郡建康縣臺城齊文惠太子治園圃有明月觀婉轉橋徘徊廊圃内作淨名精舍又曰丹陽郡秣陵縣新亭隴有逺望樓又名勞勞樓宋改為臨滄觀行人分别之所又曰洛陽有廣望觀閬風觀萬世觀修靈觀臨商觀百葉抄魏築總章觀建翔鳯於其上使八方才人六宫女尚書居之引榖水過九龍殿前玉井綺欄水轉百戯又曰石虎起靈臺九殿女官十有八等又女妓二千為鹵簿皆著紫綸巾熟錦袴金銀鏤帶五紋織成靴遊於戯馬觀漢封禪儀泰山東南有山名日觀雞一鳴時見日始出長三丈秦觀者望見長安吳觀者望見㑹稽周觀者望見齊三輔黄圖云漢武帝起鳷鵲觀又起神明觀馺娑觀甘泉苑起仙人觀緣山谷行至雲陽三百八十里入右扶風周廻五百四十里又曰武帝起鳷鵲觀神明弩法觀集靈觀使門觀陽觀祿觀漢宫殿名曰長安有臨山觀渭橋觀仙人觀霸昌觀蘭池觀平樂觀九華觀豫章觀鴻鵲觀昆明觀走馬觀華光觀封蠻觀走狗觀天梯觀瑶臺觀流渠觀相思觀長平觀宜春觀華池觀射熊觀迎風觀露華觀常視觀石闕觀白渠觀鼎郊觀潘江山關中記云鼎郊觀在上林苑白虎觀懷德觀三雀觀林木觀溫德觀長平觀洛陽記曰洛陽城十八觀皆施𤣥檻鐵籠梳雲母幌華山記曰南嶺巖北面有二小山一山有雙石竪立號曰石門一山孤崖特秀上有客觀陟之者逺眺千里阮勝之揚州記曰揚子縣有陽子宫宫中有元珠觀華陽國志曰蜀城有逸客觀華延雋洛中記云金墉城西南角有昌都觀東北有百尺樓魏都水使者陳熈造建康宫闕簿云商飈觀在東北十三里籬門亭後亭墪上齊武帝築九日登以宴羣臣又曰曾城觀在縣東北七里景雲樓東齊武帝起七月七日夜令宫人登以穿針因名曰穿針樓又曰通天觀在縣東北五里一百步舊臺城内宋元嘉中築蔬圃二十三年更修廣之築池泊天泉造景陽樓大壯觀花光殿設射棚又立鳯光殿醴泉堂又曰洛陽宫中有元覽觀東氾觀清覽觀髙平觀廣望觀竹松觀見新觀髙樂觀凌雲窗章萬年等觀又云建業宫有迎風觀在縣南十五里宋武大明中起於石子墪上孫峻殺諸葛恪殷綝殺宋生皆於此又有通道觀晉潘岳關中記曰柘觀虎圏觀昆池觀上閭觀朗池觀走馬觀湯祿觀璽觀則陽觀隂德觀並在上林苑中陸機洛陽地記曰洛陽南宫有承風觀洛陽北宫有增喜觀洛陽城外有宣陽觀千秋鴻池泉城陽威石樓等觀又曰洛陽城外有鼎中觀輿地志云洛陽西南洛水上有鼎中觀是成王定鼎處唐韋述東京雜記曰東京紫微宫有一柱觀又曰上陽宫有上清觀潘安仁西征賦云圖萬載而不傾奄摧落於十紀擢百尋之曾觀兮今數仞之餘址左太冲吳都賦慮紫宫以營室廓廣庭之漫漫寒暑隔闊於邃宇虹蜺囘帶於雲觀何平叔景福殿賦云於是揭以髙昌崇觀表以建城峻廬岧嶤岑立崔嵬巒居宋玉髙唐賦序云昔者楚襄王與宋玉遊於雲夢之臺望髙唐之觀魏陳思王七啓曰閒宫顯敞雲屋皓􅀈崇景山之髙基迎清風而立觀沈休文鍾山詩應西陽王敎云即事既多美臨眺殊復奇南瞻華胥觀西望昆明池沈休文遊沈道士館詩云既表祈年觀復立望仙宫謝元暉觀朝雨詩云朔風吹飛雨蕭條江上來既灑百常觀復集九成臺太平御覽卷一百七十九
