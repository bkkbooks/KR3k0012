body:
  text: 太平御覽卷一百三十八宋李昉等撰皇親部四魏武宣卞皇后文帝甄皇后文帝郭皇后明帝毛皇后明帝郭皇后晉宣穆張皇后景懐夏侯皇后文明王皇后武元楊皇后武悼楊皇后惠帝賈皇后惠帝羊皇后謝夫人附懐帝王太后梁皇后元帝夏侯太妃虞皇后荀氏附明帝庾皇后成恭杜皇后康獻褚皇后簡文鄭皇后孝武李太后王皇后安徳陳太后恭帝褚皇后魏武宣卞皇后魏志曰武宣卞皇后瑯琊人文帝母也本倡家年二十太祖於譙納后為妾後隨太祖至洛及董卓為亂太祖微服東出避難袁術傳太祖凶問時太祖左右在洛者皆歸后止之曰曹君吉凶未可知今日還家明日若在何面目復相見也正使禍至共死何若遂從后言太祖聞而善之建安初丁夫人廢遂以后為繼室諸子無母者太祖皆命后養之文帝為太子左右長御賀后曰將軍拜太子天下莫不忻喜后當傾府藏賞賜后曰王自以丕年大故用為嗣我但當以免無教導之過為幸甚耳亦何當賜遺乎長御還見以語太祖太祖恱曰怒不變容喜不改節是最為難二十四年拜為王后文帝踐祚尊后曰太后稱永夀宫魏書曰后以漢延熹三年生齊郡白亭有黄氣滿室移日父敬侯怪之以問卜者王旦旦曰此吉祥也為太后見外親不假以顔色常言居處當務節儉不當妄賞賜念自勉也帝為太后弟秉起第及成太后幸第請諸家外親設下廚無異膳太后左右菜食粟飯無魚肉其儉如此文帝甄皇后魏志曰文昭甄皇后中山無極人明帝母也父逸上蔡令后三歳失父後天下兵亂加以饑饉百姓皆賣金銀珠玉寳物時后家大有儲榖頗以買之后年十餘歳謂母曰世今亂多買寳物匹夫無罪懐璧為罪又左右皆饑乏不如以榖賑給親族隣里廣為恩惠也舉家稱善即從后言建安中袁紹為中子熙納后冀州平文帝納后於鄴有寵生明帝郭后李隂貴人並愛幸后愈失意有怨言帝大怒遣使賜死葬於鄴明帝即位有司奏請追諡又別立寢廟太和元年追封逸諡曰敬侯適孫像襲爵初營宗廟掘地得玉璽方一寸九分其文曰天子羨思慈親明帝為之改容以太牢告廟又嘗夢見后於是舅氏親屬高下敘用各有差賞賜累巨萬魏志曰甄后每寢寐家中髣髴見人持王衣覆其上者常共怪之相工劉良相后曰此女貴不可言后自少至長不好戲弄年八歳外有立騎戲馬者家人諸姊皆上閣觀之后獨不行年九歳喜書視字輒識數用諸兄筆硯兄謂后言汝當作女博士耶后答言聞古者賢女未有不覽前世成敗以為已誡不知書何由見之及為皇后寵愈隆而彌挹損毎因閒宴常勸帝言昔黄帝子孫蕃育盖由媵妾衆多乃獲斯祚耳所願廣求淑媛以豐繼嗣帝心喜焉文帝郭皇后魏志曰文徳郭皇后安平廣宗人也祖世長吏后少而父永竒之曰此吾女中王也遂以女王為字早失二親喪亂流離沒在銅鞮侯家太祖為魏公時得入東宫后有智數時有所獻納文帝定為嗣后有謀為太子即王位后為夫人及踐祚為貴嬪甄后之死由后之寵也遂立為后黄初五年帝東征后留許昌永始臺時霖雨百餘日城樓多壊有司奏請移止后曰昔楚昭王出遊貞姜留漸臺江水至使者迎而無符不去卒沒今帝在逺吾幸未有是患而便移止奈何明帝即位尊后為皇太后稱永安宫明帝毛皇后魏志曰明帝毛皇后河内人以選入東宫明帝時為平原王進御有寵出入與同輦及即位立為皇后初明帝為王始納河内虞氏為妃帝即位虞氏不得立卞太后慰勉焉虞氏曰曹氏好立賤未有能以義舉者也后父嘉為奉車都尉嘉本典車工卒暴富貴舉動甚蚩騃侯皆切語輒自稱侯身時人以為笑帝之幸郭皇后也后愛寵日衰景初元年帝遊後園召才人以上宴樂左右請延皇后不許帝乃禁左右使不得宣后知之明日帝見后后曰昨日遊宴北園樂乎帝以左右泄之所殺十餘人賜后死然猶加諡葬愍陵明帝郭皇后魏志曰明帝郭皇后西平人也世河右大族黄初中本郡反叛遂沒入宫明帝即位甚見愛幸拜為夫人帝疾困遂立為皇后齊王即位尊后曰皇太后稱永寧宫值三主幼弱宰輔親政與奪大事皆先啓太后然後施行毌丘儉鍾㑹等假其命以為亂焉景元四年崩晉宣穆張皇后晉書曰宣穆皇后張氏諱春華高祖同郡人也母河内山氏司徒濤之從祖姑也后少有徳行智識初高祖辭仕以風痺不能起嘗曝書遇雨自起收書家惟一婢見之后懼言語泄漏乃手殺之而自執㸑焉帝由是重之其後柏夫人有寵后罕得進見帝卧疾后往省病帝曰老物可憎何煩出也后慙恚不食將自殺諸子亦不食帝驚而致謝后乃止退而謂人曰老物不足惜慮困我好兒耳魏正始八年崩武帝受禪追尊為皇太后景懐夏侯皇后晉書曰景懐夏侯皇后沛國譙人也父尚魏征南大將軍母曹氏魏徳陽鄉主后雅有識度帝每有所為必預籌畫魏明帝世皇帝居上將之重諸子並有雄才大略后知帝非魏之純臣而后既魏氏之甥帝深忌之青龍二年以鴆崩武帝登祚始加號諡文明王皇后王隠晉書曰文明皇后王肅女秉徳清貞體行純和八歳誦詩論特精喪服茍有文義過目則識祖司徒朗異之曰興吾家者必此女矣惜不為男每居大喪常身不勝衣及鍾㑹以才能見任后每言於文帝曰㑹好為事端寵過必亂太始元年尊為皇太后宫曰崇禮自即尊位眷戀素業忽棄華麗四年薨晉書曰后諱元姬年十二祖朗薨后哀戚哭泣發於自然其父益加敬異既笄歸於文帝生武帝武元楊皇后晉書曰武元楊皇后𢎞農華隂人也有善相后當極貴故文帝為武帝娶之生惠帝武帝疑惠帝不堪奉大統密以語后后曰立嫡以長不以賢豈可動乎帝採諸葛冲等五十人女入殿露面常衣令后選取后不取端正唯取長白時卞藩女有美色帝舉扇鄣面語后曰藩女可后曰藩三世后族不宜枉以卑位其中者以綘紗繫臂遂取胡芳芳啼哭左右曰陛下聞聲芳曰死且不畏何畏陛下帝壯其言父奮聞女中選亦哭曰老奴不死唯有二兒男在九地之下女在九天之上帝拜芳為貴嬪元后疾甚見上素敬胡夫人恐立之又慮太子不安臨終枕帝膝曰從妹男𦙍有徳色不足復娶異姓帝許之崩於光明殿武悼楊皇后晉書后妃列傳曰后諱芷字季蘭小字男𦙍武帝繼室也太傅楊駿女咸寧二年即后位婉嬺有婦徳美映椒房寵禮尤隆后無子賈庶人為太子妃時數以肆情忌嫉失帝意帝慮始終之事欲廢焉后為妃陳情曰賈公有勲於王室猶當數世宥之况賈妃是其親女夫妬忌亦婦人之常事不足以一眚而忘大徳帝納焉及帝晏駕尊曰皇太后賈庶人五日一朝后既喪所天常有戚容庶人謂不恱在已愈自生嫌及星辰有變占於母家不利殿中典兵中郎孟觀等遂進勸庶人謂先倡者有福後廢者受禍庶人遂陷誅后父駿三族及内外親屬遷后於永寧宫賈庶人尋諷百僚奏太后廢為庶人母龎氏付廷尉行刑詔初欲宥之有司希賈庶人意固請乃從之龎臨刑太后截髪稽顙稱妾以請母於賈庶人而龎遂見刑后不勝憂哀泣崩於幽宫春秋三十有四諡曰武悼皇后晉后略曰賈后既殺楊庶人於金墉城又信妖巫謂后既死必訴寃於先帝乃覆而殯之施諸厭劾符書藥物以合瘞之惠帝賈皇后王隠晉書曰惠賈皇后諱南風平陽人也父充武帝謀太子婚久不決上欲取衞瓘女元后欲娶賈充女上曰衞女有五可賈女有五不可衞家種賢而多子端正長白賈女種妬而少子醜而短黑郭槐多輸寳物於后遂娶南風八年二月納為太子妃帝常疑太子不慧故欲試之盡召東宫官屬作飲食封疑事使太子决之停信待反賈妃大懼倩外人答詔草別多義給使張泓曰太子不學而答詔引義必責作草主更益譴負不如直以意答妃大喜詔泓便為我好答得富貴與汝共之泓素有小才具草令太子自寫武帝大喜賈妃酷妬嘗手擊殺數人或以刀㦸擲孕妾子乃墮地上大怒治金墉城將廢之趙粲荀勗深救之故得不廢洛陽尉部小吏忽有好物尉疑為盜召詰之賈后踈親欲求盜物往聽對辭小吏云先行逢一老嫗說家有疾師卜云當得城南年少厭塞蹔相煩尋重報小吏從之上車下帷内著簾箱中行十餘里過六七門限開簾箱忽見樓閣好屋問此何處云天上即以香湯見浴好衣美食將入見一婦人年三十五六短小青黑色眉後有疵見留數日共宿歡宴臨出得此衆物賈氏踈親聞其形狀知是賈后慙笑而去尉亦解意時他人多殺之不出唯此小吏以愛得出賈后詐有身内槀物為産具取妹夫韓夀兒託之諒闇所生故弗顯賈庶人臨廢遥喚帝曰陛下有婦使人廢之亦行自廢詔賜死晉書后妃傳曰齊王冏入廢后后驚曰卿何為來冏曰有詔收后后曰詔當從我出何詔也又問曰誰起事冏曰梁趙后歎曰繫狗當繫其頸今反繫其尾何得不然晉后略曰載賈后以廉車出承明東掖東門詣金墉城食金屑而死惠帝羊皇后臧氏晉書曰惠帝羊后諱獻容太山南城人也父𤣥之字𢎞猷永康元年立為皇后將入宫衣中有火永興元年河間王顒使將張方廢后於金墉城七月陳聄等倡伐成都王復后位八月張方又廢后十一月張方逼遷大駕幸長安留臺復后位永興二年張方又廢后河間王顒矯詔賜后死劉暾他昆切等上表后得免帝還洛迎復后位後洛陽令何喬又廢后懐帝即位尊后為皇后居𢎞訓宫洛陽敗沒於劉曜曜僭位以為皇后因問曰朕何如司馬家兒后曰胡可並言陛下開基之聖主彼亡國之暗夫有一婦一子及身三耳不能庇之貴為帝王而妻子辱於凡庶之手妾爾時實不思生何圖復有今日妾生於高門嘗謂世間男子皆然自奉巾櫛已來始知天下有丈夫耳曜甚愛寵之生二子而死偽諡獻文帝后謝夫人附晉書曰謝夫人名玖本貧賤父以屠羊為業玖清慧貞正而有淑姿選入後庭為才人惠帝在東宫將納妃武帝慮太子未知帷房之事乃遣玖往東宫侍寢由是得幸有身賈后忌之玖求還西宫遂生愍懐立為太子拜玖為淑媛愍懐遇酖玖亦被害焉永康初詔改葬太子因贈玖夫人印綬葬顯平陵懐帝王太后臧氏晉書曰懐帝皇太后諱媛姬初入武帝宫拜中才人早崩懐帝即位追尊曰皇太后梁皇后臧氏晉書曰梁皇后諱蘭璧安定人也祖桓開府儀同三司父芬司徒后初為豫章王妃懐帝即位為皇后永嘉中沒胡賊元帝夏侯太妃晉書曰夏侯太妃名光姬沛國譙人也父莊淮南太守妃生自華宗幼而明慧瑯琊武王為世子覲納焉生元帝元帝立稱皇太妃永嘉元年薨於江左葬瑯琊國初有䜟云銅馬入海建業期太妃小字銅環而元帝中興於江左焉虞皇后荀氏附晉書曰元敬虞皇后諱孟母濟陽外黄人父豫元帝為瑯琊王納后為妃永嘉六年薨大興三年册贈皇后璽綬祔於太廟晉書曰豫章君荀氏元帝宫人也初有寵生明帝及瑯琊王伷由是為虞后所忌漸見疎薄明帝即位封建安君別立第宅太寧元年帝迎還臺内供奉隆厚及成帝立尊同於太后咸康元年薨詔曰朕少遭憫凶慈訓無禀撫育之勤建安君之仁也一旦薨殂實思報復永懐平昔感痛哀摧其贈豫章郡君別立廟於京都明穆庾皇后晉中興書曰明穆皇后庾氏諱文君左將軍琛第三女也后少以珪璋特異令儀淑美故中宗為肅宗納焉為世子妃仁和有禮深見敬重后生顯宗成皇帝顯宗即位尊后曰皇太后羣臣奏天子幼沖宜依漢和熹皇后故事辭讓數四不得已遂臨朝攝萬機蘇峻作逆王師敗績后見逼辱遂以憂崩時年三十二成恭杜皇后晉書曰成恭杜皇后諱陵陽鎮南將軍預之曽孫也成帝以后奕世明徳咸康二年備禮拜為皇后后少有姿色然長猶無齒有來求婚者輒中止及帝納采之日一夜齒生七年三月后崩年二十一后在位六年無子先是三吳女子相與簪白花望之如素柰傳言天公織女死為之著服至是而后崩康獻褚皇后晉中興書曰康獻皇后褚氏字蒜子太傅褒之女也后聰明有器識以名家女入為瑯琊王妃生孝宗穆皇帝孝宗即位尊后曰皇太后太元元年太后詔曰皇帝婚冠禮備遐邇宅心宜當陽親覽緝熙惟始今歸政事率由舊典於是復稱崇徳太后九年崩於顯陽殿簡文鄭皇后晉中興書曰簡文宣皇后鄭氏諱阿春滎陽人先適田氏生一男夫亡后依於舅吳氏中宗為丞相敬后先崩將納吳氏女為夫人后及吳氏女並遊後園有見之者言於中宗曰鄭氏女雖嫠居賢於吳氏逺矣遂以徳色納為夫人甚有寵后雖貴幸面恒有憂色中宗問其故對曰妾有妹中者適長沙王褒餘二妹未出恐姊既為人妾無復求者中宗從容謂劉瑰曰鄭氏有二妹卿可求佳對使不失舊舉其從子傭娶第三者以小者適漢中李氏皆得舊門帝稱尊號后雖為夫人詔太子及東海武陵王皆母事之帝崩后稱建平國夫人咸和元年薨太元十九年追尊簡文太后孝武李太后晉書曰孝武李太后諱陵容本出微賤始簡文為㑹稽王有三子廢黜早夭其後諸姬絶孕將八年帝令卜者扈謙筮之曰後房中有一女當育二貴男其一終盛晉室乃令善相者召諸愛妾而示之皆云非其人又悉以諸婢媵示焉時后為宫人在織房中形長而色黑宫人皆謂之崙崑既至相者驚云此其人也帝以大計召之侍寢后數夢兩龍枕膝日月入懐帝聞異焉遂生孝武帝王皇后晉中興書曰孝武定皇后王氏字法惠寧康三年中軍將軍桓沖侍中臣康奏曰晉陵太守王藴女天性柔順秉心塞淵儀度既同四業允備且盛徳之胄美善先積臣等參議可以配徳乾元恭承宗廟徽音六宫母儀天下故烈宗納焉后性嗜酒驕妬帝深患之乃召藴於東堂具說后過狀令加訓誡藴免冠謝焉后於是少自改飾太元五年崩安徳陳太后晉中興書曰安徳太后陳氏松滋尋陽人也諱歸女父廣以倡進仕至平昌太守后以美色能歌彈入宫初為淑媛生安恭二帝太元十五年薨贈夫人追崇曰皇太后恭思褚皇后晉書曰恭思褚皇后諱靈媛河南陽翟人義興太守爽之女也后初為瑯琊王妃元熙元年立為皇后生海鹽富陽公主及帝禪位於宋降為零陵王妃宋元嘉十三年崩祔葬沖平陵太平御覽巻一百三十八
