  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_756-1a, image: WYG0899/WYG0899-0628a.png}
body:
  text: 太平御覽卷七百五十六宋李昉等撰器物部一器皿鼎器皿說文曰皿飲食之用器也盛黍稷在器中也齊黍稷之器以祀者盧飯器也矯似鼎長足鏖温器也方言曰器破而不殊其音謂之斯元器破而未離謂之璺南楚之間謂之凡以器盛而滿謂之涌通俗文曰金銀鏤飾器謂之錯鏤竹器謂之笭箵竹器邊縁曰匿書曰遲任有言曰人惟求舊器非求舊惟新又曰武王既勝殷諸侯班宗彛作分器禮曰仲春之月其器疏以達仲夏之月其器髙以粗仲秋之月其器亷以深仲冬之月其器閎以奄又曰侍食於君君賜飯器之溉者不冩其餘皆寫又曰作竒技竒器以疑衆殺宗廟之器不鬻於市錦文珠玉成器不鬻於市又曰玉不琢不成器人不學不知道論語曰工欲善其事必先利其器史記曰舜陶於河濵器不苦窳舜作什器於夀丘又曰通邑大都木器髹者千枚銅器千鈞素水鐵器千石此亦千乗之家也又曰武帝有故銅器李少君曰此器齊桓公十年陳於柏寢案其刻果然前漢書賈誼曰夫天下大器也今人之器置諸安處則安置諸危處則危天下之情與器無異惟天子之所置之又曰里諺曰欲投䑕而忌器此善喻也䑕近於器尚憚不投恐傷其器况於貴臣之近主乎又曰􅄢賓國以金銀銅錫為器續漢書曰桓帝祠老子於濯龍用淳金缸器魏氏春秋曰武王入吕伯奢家聞其動食器之聲疑其圖已是夜手劒殺八人後魏書曰獠鑄銅為器大口寛腹名曰銅爨既薄且輕易於熟食晉令曰欲作漆器物賣者各先移主吏者名乃得作皆當淳漆者布骨器成以硃題年月姓名車頻秦書曰苻堅建元年中新平縣民耕地獲玉器初有金彫者頗知圖記王猛以為左道勸堅誅之彫臨死表堅曰新平地古顓頊墟應出古帝王寶至是果得之家語曰孔子觀於魯桓公之廟有欹器焉孔子問於守廟者曰此為何器也曰此盖宥坐之器孔子曰吾聞宥坐之器者虛則欹中則正滿則覆顧謂弟子曰試注水焉即操水而注之中而正滿而覆虛而欹孔子喟然歎曰嗚呼物焉有滿而不覆者乎老子曰埏埴以為器當其無有器之用韓子曰堯有天下飯於土簋飲於土鉶舜作食器斬山林而材之削修具迹漆墨其上諸侯以為益後國之不伏者十三禹作為祭器墨漆其外朱畫其内觴酌有米而樽俎布殷人食器彫琢觴酌刻鏤淮南子曰崑崙旁有九井玉横受不死藥世說曰晉武帝幸王武子家供饌悉用琉璃器凉州異物志曰方外珍珠車渠瑪瑙器無常形為時之寶隨其大小以作盂椀㮎槃也視之目眩希世之巧羅刹所作非人所造地鏡圖曰銅器之屬見其狀如望馬煇煇然齊器之象為牛楚器之象為馬越器之象為蝦蟇宋器之象為白狗秦器之象為豚燕器之象為豕楊雄蜀都賦曰􅀈鏤之器百披千工魏武内誡令曰孤有逆氣病常儲水卧頭以銅器盛臭惡前以銀作小方器人不解謂孤喜銀物令以木作鼎爾雅曰鼎絶大謂之鼐圓弇上謂之鼒附耳外謂之釴說文曰鼎三足兩耳和五味之寳器也昔禹貢九牧之金鑄鼎荆山之下民入山林川澤魑魅蝄蜽莫能逢之易曰鼎元吉亨彖曰鼎象也九四鼎折足覆公餗六五鼎黄耳金鉉利貞上九鼎玉鉉大吉無不利詩曰鼐鼎及鼒周禮曰王一日三舉鼎十有二物皆有俎禮曰故衛孔悝之鼎銘曰六月丁亥公假於太廟公曰叔舅乃祖莊叔左右成公成公乃命莊叔隨難於漢陽即宫於宗周奔走無射啓右獻公獻公乃命成叔纂乃祖服乃考文叔興舊嗜欲作率慶士躬恤衛國其勤公家夙夜不解民咸曰休哉公曰叔舅予女銘若纂乃服悝拜稽首曰對揚以辟之勤大命施於烝彛鼎又曰崇鼎實鼎天子之器也左𫝊曰宋華父督殺殤公召莊公於鄭而立之以郜大鼎賂公郜國所造器也四月取郜大鼎於宋納於太廟非禮也臧哀伯諫曰武王克商遷九鼎於洛邑義士猶或非之而况將昭違亂之賂器於太廟其若之何公弗聴又曰楚子伐陸渾之戎遂至於雒定王使王孫滿勞楚子楚子使問鼎之大小輕重焉對曰在徳不在鼎夏之方有徳也逺方圖物貢金九牧鑄鼎象物桀有昏徳鼎遷於商商紂暴虐鼎遷於周徳之休明雖小重也其姦回昏亂雖大輕也天祚明徳有所底止成王定鼎於郟鄏卜世三十卜年七百天所命也周徳雖衰天命未改鼎之輕重未可問也又曰魯襄公享晉六卿賂荀偃以乗馬束錦加璧先吳壽夢之鼎夀夢吴子也獻鼎於魯因以為名又曰晉叔向謂晏子曰雖吾公室亦季世也君日不悛以樂慆憂公室之卑其何日之有讒鼎之銘曰昩旦丕顯後世猶怠况日不悛其能久乎又曰楚薳唘疆曰是以聖王廟祀有珪享頫有章晏有好貨飡有陪鼎又曰鄭人鑄刑書又曰宋正考父佐戴武宣三命茲益恭故其鼎銘云一命而僂再命而傴三命而俯循墻而走亦莫余敢侮饘於是粥於是以糊余口又曰鄭子産聘於晉晉侯有疾韓宣子逆客私焉曰寡君寢疾於今三月矣並走羣望有加而無瘳夢黄熊入於寢門其何厲鬼也對曰昔堯殛鯀於羽山其神化為黄熊以入於羽淵實為夏郊三代祀之晉為盟主其或未祀也乎韓子祀夏郊晉侯有間錫子産莒之二方鼎又曰楚子次於乾谿僕析父從右尹子革夕王語曰昔我先王熊繹與吕伋王孫牟爕父禽父並事康王四國皆有分器我獨無有今吾使人於周求鼎以為分器王其與我乎對曰與君王哉今周與四國服事君王皆唯命是聽豈其愛鼎又曰齊侯伐徐徐人行成賂甲父之鼎又曰晉趙鞅荀寅率師城汝濱遂賦晉國一古鐵以鑄刑鼎著范宣子所為刑書焉榖梁傳曰桓公二年夏四月取郜大鼎於宋戊申内於太廟郜鼎者郜之所為也孔子曰器從邑名從主人故曰郜大鼎史記曰黄帝採首山銅鑄鼎荆山下鼎既成有龍垂胡髯下迎黄帝又曰伊尹欲干湯而無由乃為有莘氏媵臣負鼎俎以滋味說湯致於王道又曰周末有九鼎徙於太丘社亡而鼎沒於泗水彭城下其後百一十五年而兼天下始皇二十八年過彭城齋戒禱祀欲出周鼎使千人没水求之不得又曰秦武王與孟說舉龍文之鼎絶臏而死又曰孝文帝時新垣平言周鼎亡在泗水中今河溢通泗臣望東北汾隂直有金寳氣意周鼎其出乎兆見不迎則不至於是上使使治廟汾隂南臨河欲祠出周鼎漢書曰項羽身長八尺二寸目重瞳力能扛鼎又曰漢得汾隂寳鼎武帝嘉之藏於甘泉羣臣上夀賀曰陛下得周鼎吾丘壽王曰非周鼎上怒對曰周徳始乎后稷成於文武上天報應鼎為周出名曰周鼎今漢自髙祖繼周至陛下功徳愈盛天瑞並至昔秦始皇欲出鼎禱於彭城而不得今天祚有徳而寳鼎自出此天所以興漢是漢鼎非周鼎也上曰善又曰主父偃曰丈夫生不五鼎食死當五鼎烹耳又曰宣帝時漢陽得鼎獻之京兆尹張敞上議曰案鼎有刻書曰王命尸臣官此栒邑賜爾旂鸞黻黼琱戈尸臣拜手稽首曰敢對揚天子丕顯休命此鼎殆周之所以褒賜子孫刻銘其先功藏之於宫廟也東觀漢記曰廬江獻鼎詔召鄭衆問齊桓公之鼎在柏寢臺見何書春秋左氏有鼎事幾衆對状除為郎中後漢書曰孝明帝永平六年二月王雒山出寳鼎廬江太守獻之詔曰祥瑞之降以應有徳方今政化多僻何以致兹易曰鼎象三公豈公卿奉職得其理耶太常其以礿祭之日陳鼎於祖廟以備器用賜三公帛五十疋九卿二千石半之晉中興書曰成帝咸和元年宣城春穀山崩得古鼎重三百斤容可三斗餘羣臣畢賀又曰神鼎見神鼎者器也能輕能重能息能行不炊而沸不汲自盈烟煴之氣自然所生也亂則藏於深山文明應運而至故禹鑄鼎以擬之晉陽秋曰糓城人劉珪夜見門有光取得玉鼎沈約宋書曰秦始皇七年義陽獲銅鼎受一斛并盖並隠起鏤戰國䇿曰秦興師於周求九鼎顔率謂齊曰周之君臣内自畫計與秦不若歸之大國願大王圖之齊王發師救周秦兵罷率至齊曰願獻九鼎不識大國何塗而致之齊王曰寡人將借塗於梁對曰不可梁之君臣欲得九鼎謀之於暉臺之下少海之上其日久矣太平御覽卷七百五十六
