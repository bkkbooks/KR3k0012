body:
  text: 太平御覽卷二百七十一宋李昉等撰兵部二叙兵下叙兵下六韜曰大人之兵如雨如風如雷如電天下盡驚然後乃成又曰武王問太公曰欲引兵深入諸侯之地三軍卒有緩急或利或害吾欲以近通遠從中應外三軍之用謂之如何公曰主將有隂符有大勝得敵之符長一尺有破軍擒敵之符長九寸有降城得邑之符長八寸有却敵執遠之符長七寸有反兵驚中堅守之符長六寸有請粮食益兵卒之符長五寸有敗軍亡將之符長四寸有卒利亡失之符長三寸諸奉使行符稽畱若符事聞符所告者皆誅符者主將所以隂通信語不得漏泄中外之道也王曰善黄石公記曰將所以有威者號令也戰所以全勝者軍正也士所以輕戰者用兵也故戰如風發勇如河决衆可望而不可當可下而不可勝也黄石公三畧曰聖王之制兵也非好樂之也將以誅暴也暴謂亂國賊民夫以義誅不義决江河漑螢火其剋必也商君書曰夫民情好爵禄而畏刑罰人君設此二者以御民夫民力盡而名隨之功立而賞隨之君能使其民信此明於日月則兵無敵也吕氏春秋曰古之聖王有義兵譬之若用藥良藥活人義兵爲天下之良藥也又曰古聖王有義兵而無有偃兵兵之所自來者尚矣其始與民俱兵也者威也威也者力也民之有威力性也性者所受於天者也非人之所能為也黄炎固用水火矣黄帝炎帝共工固欲作難矣與高辛氏爭為帝而亡之也五帝固相與爭矣又曰人曰蚩尤作兵蚩尤非作兵利其器也未有蚩尤之時民固剥林木以戰矣故勝爲長長帥長則猶不足以治之故立君君又不足以治之故立天子天子之立也岀於君君之立岀於長長之立岀於爭爭鬭之所自來者乆矣不可禁不可止故古之聖王有義兵而無偃兵也又曰家無怒笞則豎子嬰兒之有過也立見天下無誅伐則諸侯之相暴也立見故怒笞不可偃於家刑罰不可偃於國誅伐不可偃於天下有巧有拙而已矣故古之聖王有義兵而無偃兵夫有以饐死者欲禁天下之食有以乗舟死者欲禁天下之船有以兵䘮國者欲禁天下之兵悖夫兵不可偃也又曰凡兵天下之兇器也勇天下之兇德也興兇器行兇德不得已也又曰人情欲生而惡死欲榮而惡辱死生榮辱之道一則三軍之士可使一心矣凡軍欲其衆也心欲其一也三軍一心則令可使無敵矣故曰其令彊者其敵弱其令信者其敵詘先勝於此則必勝之於彼矣又曰古之至兵士民未合而威已諭矣敵已服矣豈必用旌旗干戈哉故善諭威者於其未發也於其未通也窅窅乎莫知其情此之謂至威之誠也又曰凡兵用急疾㨗先欲急疾㨗先之道在於知緩徐遲後緩徐遲後急疾㨗先之分也急疾㨗先所以决義兵之勝也又曰雖有江河之險則凌之雖有大山之塞則䧟之并氣摶精心無有慮猶預之慮目無有視耳無有聞一諸武而已矣又曰萬乗之國外之不可拒敵内之不可以守固其民非不可以用也不得所以用之術也不得所以用之術國雖大勢雖便卒雖衆何益也淮南子曰古之用兵者非利壤土之廣而貪金玉之賂將以存亡繼絶平天下之亂而除萬民之害也又曰凡有血氣之蟲含牙戴角前爪後距有角者觸有齒者螫有蹄者趹喜而相戱怒而相害天之性也人有衣食之情而物勿能足也羣相雜處分不均求不贍則爭爭則彊脅弱而勇侵怯人無筋骨之彊爪牙之利故割革而爲甲爍鐡而爲刃貪昧饕餮之人殘賊天下萬民騷動莫寜其所有聖人勃然而起乃討强暴平亂世夷險除穢以濁爲清以危爲寜也又曰兵之所由來遠黄帝嘗與炎帝戰矣炎帝神農氏之末世也與黄帝戰於版泉帝滅之顓頊嘗與共工爭矣共工與顓頊爭爲帝觸不周山折之也故黄帝戰於涿鹿之野黄帝與蚩尤戰於涿鹿涿鹿上谷也堯戰於丹水之浦堯以唐侯受命滅不義於丹浦丹浦在南陽舜伐有苖有苖三苖啓攻有扈禹之子伐有扈作甘誓在右扶風鄠縣也自五帝而不能偃也况衰世乎又曰夫兵者所以禁暴討亂也炎帝爲火灾故黄帝禽之共工爲水害故顓頊誅之教之以道導之以德而不聽則臨之以威武臨之以威武不從則制之以兵革故聖人之兵也若櫛髪耨苖所去者少而所利者多也又曰殺無罪之人而養不義之君害莫大焉殫天下之財而贍一人之欲禍莫深焉所爲立君者以禁暴討亂也今集萬民之力而反爲殘賊是爲虎傅翼曷爲不除也又曰覇王之法以論慮之以策圖之以義扶之非以亡存也將以存亡也又曰聞敵國之君有加虐於其民者則舉兵而臨其境責之以不義刺之以過行兵至郊乃令軍帥曰無伐樹木無掘墳墓無􅅡五榖􅅡燒也無焚積聚無捕虜民無収六畜無聚所征國民以爲採取無収其六畜以自饒利乃發號施令曰某國之君傲天侮鬼决獄不辜殺戮無罪此天之所誅也民之所仇也兵之來也以廢不義而復有德也有逆天之道率民爲賊者身死族滅以家聽者禄以家以里聽者賞以里以鄉聽者封以鄉以縣聽者侯以縣尅國不及其民廢其君易其政尊其秀士而顯其賢良賑其孤寡恤其貧窮岀其囹圄賞其有功百姓開門而待之淅米而儲之淅漬唯恐其不來也此湯武之所以致王也而齊桓晉文之所以成覇也又曰君爲無道民之思兵也若旱而望雨也渴而求飲夫河也誰與交兵接刃乎故義兵之至也至於不戰而心服也又曰晩世之兵君雖無道莫不設渠傅堞加守傅守也堞城上女墻也攻者非以禁暴除害也欲以侵地廣壤也故至於伏尸流血相支以日而覇王之功不世岀者自爲之故也又曰夫爲地戰者不能立其功舉事以自爲者衆去之衆之所助雖弱必强衆之所去雖大必亡也又曰兵失道而弱得道而强將失道而拙得道而工國得道而存失道而亡所謂道者取員而法方背隂而抱陽左柔而右剛履幽而觀暘地方而無限故莫能窺其門天員而無形象地生長而無計量渾渾沉沉孰知其藏也又曰凡物有朕唯道無朕言萬物可朕也而道不可朕也所以無朕者以其常形勢也轉輪而無窮象日月之行若春秋有代謝若日月有晝夜終而復始明而復晦莫能得其紀制形而無形故政可成象萬物而不物故勝不屈形兵之極也至於無形可謂極矣又曰大兵無創與鬼神通五兵不厲天下莫之敢當建鼓不岀庫諸侯莫不慴懼沮膽故廟戰者帝神化者王所謂廟戰者法天道也神化者法四時也脩政於境内而遠方慕其德制勝於未戰而諸侯服其威也又曰民誠從令雖少無畏民不從令雖衆爲寡故下不親上下心不畏卒不畏將其形不戰守有必固而攻有必勝不待交兵接刃而存亡之機固已形矣又曰兵有三勢有二鈐有氣勢有地勢有因勢將克勇而輕敵卒果敢而樂戰三軍之衆百萬之師志厲青雲氣如飄風聲如雷電誠積踰而威加敵人此謂氣勢狹路津關大山名塞龍蛇蟠蟠蜿屈也却笠居却偃覆也笠簦也羊腸道羊腸一屈一伸魚笱門竹笱所以捕魚其門可入而不得出一人守險而千人不敢過此謂地勢因其勞倦怠亂飢渴凍暍推其揺揺擠其掲掲此謂因勢間諜間諜軍之反間也審錯規慮設蔚施伏草木盛曰蔚隠遁其形岀於不慮使敵人之兵無所適備此謂知鈐陣卒正前行選進退俱什伍搏前后不相蹍蹍蹍蹈也左右不相干受刃者少傷敵者衆此謂事鈐鈐勢必形吏卒博精選良用才官得其人計定謀决明於死生舉措得時莫不振驚故攻不待隆衝雲梯而城㧞雲梯可依雲而立所以瞰敵之城中也戰不至交兵接刃而敵破明於必勝之數也又曰夫飛鳥之鷙也絶其首猛獸之攫也匿其爪虎豹不外其牙噬犬不見其齒故用兵之道示之以柔而迎之以剛迎逆敵家示之以弱而乗之以强爲之欲歙應之以張歙弱張强也歙讀如脅將欲西如示之以東也又曰神莫貴於天勢莫便於地動莫急於時用莫利於人知此四者兵之幹植也然待道而后行可一用也又曰古之兵弓劔而已矣糟柔無擊修㦸無刺糟柔木也无擊无鉄刃也刺鋒也糟讀如曹晩世之兵隆衝以攻渠幨以守隆高也衝所以臨敵城衝突壞之渠塹也一曰渠甲名幨幰所以御也連弩以射銷車以鬬連弓弩通一弦以手挽之以刃着左右爲機開發又曰古之伐國不殺黄口不獲二毛黄口幼少也二毛有白髪於古爲義於今爲笑古之所以爲治者今之所以爲亂也又曰夫神農伏羲不施賞罰而民不爲非然而􅊩政者不能廢法而治民不能及神農伏羲也舜執干戚而服有苖然而征伐者不能釋甲兵而制强暴不能及舜也由此觀之法度者所以論民俗而節緩急也桓範世要論曰太古之初民始有知則分爭分爭羣羣則智者爲之君長君長立則興兵所從來乆矣雖聖帝明王弗能廢也但用之以道耳故黄帝戰於阪泉堯伐驩兜舜征有苖夏禹殷湯周之文武皆用師克伐以取天下焉又曰聖人之用兵也將以利物不以害物也將以救亡非以危存也故不得已而用之也以爲戰者危事兵者㓙器不欲令好用之故制法遺後命將岀師雖勝敵而反猶以䘮禮處之明弗樂也故曰好戰者亡忘戰者危不好不忘天下之王也又曰夫兵之要在脩政脩政之要在於得民心得民心在於利之也要仁以愛之義以理之故六馬不和造父不能以致遠民臣不附湯武不能以立功故兵之要在得衆得衆者善政之謂也善政者恤民之患除民之害故政善於内則兵强於外也杜恕論曰天生五材民並用之廢一不可誰能去兵故兵之來也乆矣所以威不軌而昭文德所以討强暴而除殘賊也聖人以興亂人以廢廢興存亡皆兵之由也昔五帝不能偃况衰世乎又曰濫殺無辜之民以養不義之君非兵之體也殫天下之財以贍一人之求非兵之體也怙其率卒之彊矜其變詐之謀欲以立威成名非兵之體也虜其君𨽻其臣遷其社易其民非兵之體也故夫覇王之用兵也始之以義終之以仁將以存亡非以亡存也將以禁暴非以爲暴也又曰兵之來也以除不義而授德克其國不傷其民廢其君而不易其政尊其俊秀顯其賢良賑其孤寡恤其窮困百姓聞之欣然簞食壺漿以迎其君徯之遲也湯武之師用兵上也誰與交鋒而接刃哉又曰所謂善用兵者先弱敵而後戰者也若乃征之以義以責其過振之以武以威其滛懷之以德以誓其民置之以仁以救其危此四者用兵之體所謂因民之欲乗民之力也又曰治家國理境内施仁義布德惠明勸賞黜幽昧功臣附親士卒和輯上下一心君臣同德指麾而響應此上兵之體也地廣民衆主賢將能國富賞罰信未至交兵而敵人亡遁此次兵之體也知地之形因險阸之利明竒正之變審進退之宜援枹而鼓之黄塵四起乃以决勝此用兵之下非兵之體也又曰夫德義足以懷天下之民事業足以當天下之急選舉足以得賢才之用則兵之所加若勁風振槁此兵之體也鹽鐡論曰兵者㓙器也甲堅兵利爲天下殃其母制子故能乆長聖人法之厭而不傷蔣子萬機論曰夫虎之爲獸水牛之爲畜殆其兵矣夫虎爪牙既鋒膽力無伍至於即豕也卑俯而下之必有扼喉之獲夫水牛不便速角又喬踈然處之郊野朋遊屯行部隊相伍及其寢宿因陣反禦若見虎兕抵􅠅虎兕害矣若用兵恃强必鑒於虎居弱必誡水牛可謂攻取屠城而守必能全者也劉向新序曰上古之時其民敦朴故三皇教而不誅無師而威故善爲國者不師三皇之德也至於五帝有師旅之備而無用故善師者不陣五帝之謂也湯伐桀文王伐崇武王伐紂皆陣而不戰故善陣者不戰三王之謂也及夏后氏之伐有扈殷高宗討鬼方周宣王之征熏鬻而不血刃皆仁聖之惠時化之風也至齊桓侵蔡而蔡潰伐楚而楚服使彊楚以致苞茅之貢於周室北伐山戎使奉朝覲三存亡一繼絶九合諸侯一匡天下衣裳之㑹十有一嘗大戰亦不血刃至晉文公設虎皮之威陳曵柴之僞以破楚師而安中國故曰善戰者不死晉文公之謂也楚昭王遭闔閭之禍國滅昭王岀亡父老迎而笑之昭王曰寡人不仁不能守社稷父老反笑何無憂寡人且從此入海矣父老曰有君若此其賢也及申包胥請救哭秦庭七日秦君憐而救之秦楚同心遂走吳師昭王反國故善死者不亡昭王之謂也是故自晉文公已下至戰國而暴兵始衆於是以强并弱以大吞小故强國務攻弱國備守合從連衡羣相攻伐故戰則稱孫吳守則稱墨翟至秦而以兵并天下窮兵極武而亡及項羽尚暴而滅漢以寛仁而興故能掃除秦之苛暴矣孝武皇帝攘服四夷其後天下安然故世之爲兵者其行事畧可觀也又曰樂毅以弱燕破强齊七十餘城者齊無法故也孫武以三萬破楚二十萬者楚無法故也韓信以寡衆破趙二十萬者趙無法故也近者曹操以八千破袁紹五萬者袁無法故也此四子能以少剋多者軍有法故也故用兵無法猶乗舟無楫登馬而不勒是以良將思計如飢存法如渴所以戰必勝攻必㧞也陳琳書曰王者之師有征無戰衞公兵法曰陒阪高陵谿谷險難則用歩卒平原廣野草淺地堅則用車追奔逐北乗虛獵散反覆百里則用騎故歩爲腹心車爲羽翼騎爲耳目三者相待參合廼行太平御覽卷二百七十一
