body:
  text: 太平御覽卷八百六十一宋李昉等撰飲食部十九羮臛飲漿羮周禮天官亨人曰祭祀共大羮鉶羮賔客亦如之禮曰食居人之左羮居人之右毋嚃羮毋絮羮客絮羮主人辭不能烹羮之有菜者用梜無菜者不用梜又曰雉羮雞羮兎羮芼羮食自諸侯已下至於庶人無等又曰子夘稷食菜羮忌日貶也夫人與君同庖不特殺也又曰不能食粥羮之以菜可也又曰大饗之禮尚𤣥酒而爼腥魚大羮不和有遺味者矣左傳曰潁考叔有獻於鄭公公賜之食食而捨肉公問其故對曰小人有母嘗小人之食矣未嘗君之羮請以遺之又曰臧哀伯諫曰大羮不致又曰鄭伐宋将戰華元殺羊食士其御羊斟不與及鄭師斟曰疇昔之羊子為政今日之事我為政輿入鄭師故敗君子謂羊斟非人也以其私憾敗國殄民於是刑孰大焉詩所謂人之無良者其羊斟之謂乎又曰楚獻黿於鄭靈公宋與子家将見宋子公也子家歸生子公之食指動以示子家曰他日我如此必嘗異味及入宰夫将解黿相視而笑公問之子家以告公食大夫黿召子公而弗與也子公怒染指於鼎嘗之而出又曰叔鮒求貨於衛滛芻蕘者衛人使屠伯饋叔向羮與一篋錦叔向受羮反錦又曰和如羮焉水火醯醢鹽梅以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以泄其過君子食之以平其心君臣亦然以水濟水誰能食之書曰若作和羮爾唯鹽梅詩義䟽曰鴞肉甚美可以為羮臛語曰雖䟽食菜羮𤓰祭必齊如也爾雅曰肉謂之羮廣雅曰羮謂之湆說文曰羮五味和粥也釋名曰羮汪也汁汪郎也史記曰古者天子常以春秋解祠黄帝用一梟破鏡如淳曰漢史東郡送梟五日作梟羮以賜百官也又曰項王為高俎置太公於机上告漢王漢王曰吾與羽俱北面受命懐王約為兄弟吾翁即若翁必欲烹而翁幸分我一杯羮髙祖少時與賔客過嫂嫂厭叔與客來佯為羮盡瀝釡客以故去已而視釡中尚有羮由此怨其嫂封其子戞羮侯戰國䇿曰樂羊為魏將而攻中山其子在中山中山君烹其子而遺之羮樂羊啜之盡其杯文侯謂禇師賛曰樂羊以我故食其子肉對曰其子食之其誰不食羊下中山文侯賞其功而疑其心又曰中山君饗都士大夫司馬子期在焉羊羮不遍子期怒走楚說王伐中山中山君亡有二人挈衣隨後問之曰臣父嘗餓且死君下壺飡哺臣之父故來死君也中山君與曰吾以一椀羊羮亡國以一壺食得士二人後漢書曰太尉劉寛性仁恕不妄喜怒嘗服朝服侍婢奉肉羮翻汚其衣婢遽収之寛神色不異徐言羮爛汝手乎東觀漢記曰王渙為洛陽令馬市正數從賣羮飯家乞貸不得輙毆罵之至忿渙聞知事實便諷吏解遣謝承後漢書曰陸續詔詣獄其母至京師餉食續對餉泣曰續母來使者問其故曰續母作羮切肉未嘗不方㫁䓤寸寸無不同是知母來又曰陶碩字公超啖蕪菁羮無鹽帝王世紀曰文王長子曰伯邑考紂烹以為羮以賜文王曰聖人不食其子羮文王得而食之紂曰誰為西伯聖者與食其子羮而不知晉書曰桓温表王濬之孫曰濬今有三孫年出六十室如懸磬餬口江濵四節蒸嘗菜羮不給宋書曰湘州刺史王僧䖍引樂頥之為主簿以同僚非人棄官去吏部郎庾景之嘗往候頥之為設食惟枯魚菜爼景之曰我不能食之母聞之自出嘗膳魚羮數種景之曰卿過於茅季偉我非郭林宗又曰殷淳子孚有父風嘗與侍中何朂共食孚羮盡朂云益殷蓴羮朂司空無忌子也孚徐輟筯曰何無忌諱又曰朱修之為荆州刺史姊在鄉里飢寒不立修之貴為刺史未嘗供贍往姊家姊為設菜羮麤飯以激之又曰毛修之被禽入魏敬事嵩山道士冦謙之謙在魏太武旁申救營護之故不死修之嘗為羊羮荐魏尚書以為絶味獻之武帝大恱以為太官令被寵遂為尚書封南郡公太官令如故又曰宋末齊髙帝輔政劉彦節知運祚將遷宻懐異圖及沈攸之舉兵齊髙入屯朝堂袁粲鎮石頭潜與彦節及諸大将黄回等謀夜會石頭詰旦乃發彦節素怯騷擾不自安晡後㬰自丹陽郡車載婦女盡室奔石頭臨去婦蕭氏強勸令食彦節歠羮冩胷中手振不自禁齊書曰髙祖既為齊王置酒為樂羮膾既至崔祖思曰此味故為南北所推侍中沈文季曰羮膾吴食非祖思所解祖思曰炰鼈鱠鯉似非勾吴之詩文季曰千里蓴羮豈闗魯衛之說王甚恱曰蓴羮故應還沈又曰宋緒無行母病積年忽思菰羮緒妻到市買菰為羮欲奉母緒曰病復安能食先嘗之遂併食盡母怒曰我病欲此羮汝何必併啖盡天若有知當令汝哽死緒聞心中介介然即吐血明日而死梁書曰蕭勱為廣州刺史徴為太子左衛率勱性嗇儉而器度寛裕左右嘗将羮至胷前翻之顔色不異徐呼更衣後魏書曰趙琰字叔起嘗送子冀州聘室過路傍主人設羊羮琰訪知盗殺卒辭不食又曰彭城王攸為滄州刺史有隰沃縣主簿張逹嘗詣州投人舎食鷄羮浟察知之守令畢集攸對衆謂達曰食羮何不還價直也達即伏罪合境號為神明唐書曰魏元忠前後三坐棄市偶得不死武后嘗問之對曰臣猶鹿耳羅織之徒苟須臣肉作羮耳荀卿子曰孔子厄於陳蔡藜羮不糝韓子曰堯有天下糲梁之食藜藿之羮又曰昭僖侯之時宰人上食而羮中有生肝焉昭侯召宰人而誚之曰汝何為置生肝羮中宰人曰竊以為有欲去上食宰也淮南子曰皷造辟兵壽盡五月髙誘曰鼓造謂梟今世人五月作梟羮亦作服蟇羮又曰楚人有烹猴者而召其隣人以為狗羮也而甘之後聞其猴也據地而嘔之此不知味也又曰太宰子朱侍食於令尹子國子國啜羮而熱援漿以沃之明日子朱辭官曰令尹輕行而簡禮其辱人不難明年伏即尹而笞之三百秦子曰五味者各稱一族之名合和一鼎名曰羮猶威重亷平恩合而為信也郭子曰陸士衡詣王武子武子有數斛羊酪指以示陸曰卿東呉何以敵此陸云千里蓴羮未下鹽䜴劉向新序曰紂王天下熊羮不熟而殺庖人又曰平公問叔向曰齊桓公合諸侯一匡天下如是君不知臣力何也師曠侍曰臣請以喻五味管仲善㫁割之隰朋善煎􅆈之賔須無善齊和之羮已熟矣而進之又曰魏文侯見箕季子日晏進糲食𤓰瓠之羮曰豈不能具五味我欲無歛於百姓以省飲食之養也風俗通曰昭帝時大官上食羮中有髪切中有土令史坐不謹敬皆論劉禎毛詩義問曰鉶羮有菜鹽豉其中菜為其形象可食因以鉶為名陸機毛詩草木疏曰梅杏類也其子赤而酢不可生噉煑而曝乾為蘇可着羮臛中廣志曰大渡蜂取其子得數升為羮亦可蒸食臨海水物志曰民皆好啖猴頭羮雖五肉臛不能及之其俗言寧負千古之粟不願負猴頭羮臛笑林曰人有和羮者以杓嘗之少鹽便益之後復嘗向杓中煮故云鹽不足如此數益升許鹽故不鹹因以為食經曰有猪蹄酸羮法胡羮法雞羮法蔗笴鴨羮法楚辭天問曰縁鵠飾玉后帝是饗伊尹烹鵠羮以事湯彭鏗斟雉帝何饗受壽永多夫何長言彭祖進雉羮於堯堯饗之以受壽之也又九章曰懲於羮者而吹韲言人有猷而熱中艾之見韲則吹之九招曰酸若苦陳吴羮又大招曰解螭甘鷄和楚酪言取生大鱉烹之羮調酪宻復有肥鷄肉和以酢酪其味清也又曰内鶬鴿鵠味豺羮鶬鵠肉於調和先甘酸畢夫巧故羮味美也唐明皇雜録曰李林甫子壻鄭平為户部員外嘗與林甫同處一日林甫就院省其女遇平方櫛髪謂平曰上明日當賜甘露羮鄭郎食此縱當華皓必轉髮黒明日果有中使至賜林甫食中有甘露羮遂以與平平食訖一旦髪毛如漆嶺表異録曰交趾之人重不録羮羮以羊鹿雞猪肉和骨同一釡煮之令極肥濃漉去肉進之葱薑調以五味貯以盆器置之盤中羮中有觜銀杓可受一升即揖讓多自主人先舉即滿斟一杓内觜入鼻仰首徐傾之飲盡傳杓如酒廵行之喫羮了然後續以諸饌謂之不録㑹亦呼為先腦也交趾之人或經營事務彌縫權要但備此㑹無不諧者張翰豆羮賦曰乃有孟秋嘉菽垂枝挺莢是刈是穫充簞盈篋香鑠和羮同疾赴急桓驎七説曰河黿之羮齊以蘭梅芬芬甘㫖未咽先滋衛洪七開曰馨羮芬臛凝色生華皇象書曰想必醉令作醴梅相待繆襲祭儀曰夏祀調和羮芼以葵秋祀和羮芼以葱春祀和羮芼以韭臛蒼頡解詁曰臇少年汁臛也膹臛多澤說文曰臛肉羮釋名曰臛白蒿也香氣蒿蒿也齊書曰虞悰家富於財而善為滋味豫章王嶷盛饌享賔謂悰曰肴羞有所遺否悰曰何曽食䟽有黄頷臛恨無之廣志曰晨鳬肥而耐寒宜為臛劉欣期交州記曰九真太守陶璜立郡築城於土穴中得一白色形似蠶蛹無頭長數十丈大十餘圍軟軟動莫能名剖腹有肉如猪昉遂以為臛羮甚香璜啖一杯三軍盡食齊諧記曰江北華本者為人好鼈臛食經曰有羊子酢臛法楚辭招魄曰胹鼈炮羔有柘漿些鵠酸臇鳬煎鴻鶬些露雞臛􅏲厲而不爽些爽改也又大招曰煎鰆臛爵言煎鮒魚􅋯黄雀也崔駰博徒論曰鶩臛羊殘陳思王七啓曰臛江界之潜黿王粲七釋曰黿羮蠙臛飲周禮天官膳夫曰飲用六清六清水漿醴醇醫酏也又食醫曰飲齊眡冬時飲宜寒也又酒正曰酒正辨四飲之物一曰清二曰醷三曰醫四曰酏又曰漿人掌共王之六飲水漿醴凉醫酏入于酒府醴者清也凉水酒也禮記玉藻五飲上水漿酒醴酏上以水為上又郊特牲曰飲養陽故有樂又内則曰飲重醴稻醴清糟黍醴清糟粱醴清糟重陪也糟醇也清泲也致飲有醇者自泲者陪設之也或以酏為醴釀粥為醴黍酏粥酏又外傳曰共王及后與世子食後所進之六飲水居其上其次曰漿三曰醴醸粥為之净㵼清四曰凉暑月以雜糗為和水者五曰醫以梅乾木𤓰相和水一名濫凉六曰酏以黍為粥之薄者左傳曰丑父使公下如華泉取飲鄭周父御佐車宛茷為右載齊侯以免佐車副車又曰鄢陵之戰欒鍼見子重之旌請曰楚人謂夫旌子重之麾也彼其子重也日臣之使於楚也子重問晉國之勇臣對曰好以衆整曰又何如臣對曰好以暇今兩國治戎行人不使不可謂整臨事而食言不可謂暇食好整之言請攝飲焉攝持也持飲往飲子重也公許之使行人執榼承飲造于子重曰寡君乏使使鍼御持矛是以不得犒從者使某攝飲子重曰夫子嘗與吾言於楚必是故也不亦識乎受而飲之免使者而復鼓又曰鄭師入陳子展執縶而見見陳侯再拜稽首承飲而進獻承飲奉觴示不失臣禮子美入數俘而出子美子産但數其所獲人數不将以歸也又曰呉入楚申包胥乞師於秦立依於庭墻而哭日夜不絶聲勺飲不入口七日論語曰一簞食一瓢飲穆天子𫝊曰天子渇於中求飲未至七萃之士曰髙奔戎割其左驂之頸取其清血以飲天子今西方之羗故刺鳥咽取血飲之瘡示尋愈也天子美之賜佩玉一㕠神仙傳曰蔡經尸解去十餘年忽還家言七月七日王君當來過到其日可多作數百斛飲以供從官乃去到期假借瓮器作飲數百斛羅列覆置庭中其日方平果來語林曰陸士衡在洛夏月忽思竹篠飲語劉實云吾鄉曲之思轉深今來東歸恐無復相見理言此以復之漿詩曰或以其酒不以其漿禮記曲禮曰酒漿處内又檀弓曰曽子謂子思曰伋吾執親之䘮水漿不入於口者七日又内則曰漿水醷濫紀苔之間名諸為濫漢釋名曰桃濫以也水清而蔵之其味濫濫然酢也史記曰漿千儋儋麗此亦比千乗之家又曰薛公藏於賣漿家漢書郊祀歌曰奉尊柘漿折朝醒取甘柘汁以為飲也可解酒病酒亦柘漿可以觧朝醒也吴書曰袁術去壽春時方盛夏欲得蜜漿又無蜜遂嘔血死後魏書曰游明根㓜年遭亂為櫟陽王氏奴主使牧羊明根以漿倩人書字路邊畫地學之又曰咸陽王禧謀逆被擒送華林都亭着千斤鏁格鏁格羽林掌衛之時熱甚禧渇悶垂死勑㫁水漿侍中崔光令左右送酪漿升餘禧一飲而盡管子曰左酒右漿左酒近體也右漿上逺也列子曰列子之齊中道而返遇伯昬瞀人瞀人曰奚方而反曰吾驚焉惡乎驚曰吾食於十漿而五漿先饋伯昏瞀人曰若是則汝何為已驚遺汝之漿何故驚也曰夫内誠不觧内無誠實外無觧然形諜成光諜飾其形身之光也以外鎮人心外以諜形鎮人則其内不足也使人輕乎貴老重少輕老由於形諜而察其所患形飾則心煩亂必患生故當察也夫漿人特為食羮之貨無多餘之贏漿人之饋我者非貴我贏也盖貨我以自盈耳其為利也薄其為權也輕而猶若是而况萬乗之主身勞於國而智盡乎事彼任我以事而効我以功吾是以驚也孟子曰書曰徯我后后來無罰其君子實𤣥黄于篚以迎其君子其小人簞食壺漿以迎其小人袁子正書曰歳在申酉乞漿得酒歲在辰巳嫁妻賣子顧子曰非其道壼漿不可受是其道雖天下不可讓山海經曰髙前之山上有水焉甚寒而清帝王之漿也飲者不心痛漢武故事曰西王母曰太上之藥有玉津金漿其次藥有五雲之漿神異經曰東南有人名黄父以霧露為漿廣志曰醶䣼漿也穆天子傳曰盛姫病求飲天子命取漿而給是曰壺輲壺器名輲速也音遄言得之速焦贛易林曰登上橋堂飲萬歲漿華山記曰華山上明星玉女持玉漿孝子傳曰洛陽陽公輦義漿以給過客世說曰嵩山北有大穴晉初有一人誤墜穴中縁行十許日有草屋一區中有二人對坐圍棋局下有一杯白飲隨者告以飢渇棋者曰可飲此墜者飲之氣力十倍歸問張華華曰所飲者玉漿典術曰餌桃膠五十日後得玉漿楚辭九歌曰奠桂酒兮椒漿以椒置漿中也又曰援北斗兮酌桂漿西京雜記枚乗桞賦曰樽盈縹玉之酒爵獻金漿之醪張衡思𤣥賦曰斟白水以為漿太平御覽卷八百六十一
