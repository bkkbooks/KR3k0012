body:
  text: 太平御覽卷八百七十宋李昉等撰火部三燈燭炬燈漢書曰王莽好變改制度政令煩多莽常御燈火至明東觀漢記曰上從長安東歸過汧幸祭遵營士衆作黄門武樂至夜御燈火晉書曰温嶠旋軍武昌至牛渚磯水深不可測世云其下多恠物嶠遂燬犀角而照之須臾見水族竒形異状或乗車馬著赤衣者嶠其夜夢人謂曰與君幽明道隔何故相照意甚惡之至鎮未旬而卒唐書曰皇甫無逸為益州長史嘗夜宿人家遇燈炷盡主人将續之無逸抽佩刀炷衣帯以為燈其亷介如此又曰睿宗好樂聴之忘倦𤣥宗又善音律先天二年正月望日胡僧娑陁婆請夜開門燃百千燈睿宗御延喜門觀樂凡經月日從大酺睿宗御安福門樓觀百司酺宴以夜繼晝經月餘日漢武内傳曰西王母遣使謂帝曰七月七日當暫來帝至日掃除宫内燃九光之燈荀采傳曰荀采爽女為隂瑜妻而夫早亡爽逼嫁與太原郭奕采入郭氏室暮乃去帷帳建四燈歛色正坐郭氏不敢逼三秦記曰始皇墓中燃鯨魚膏為燈鄴中記曰石虎正平聲會於殿前設百二十枝燈以鐵為之西京雜記曰長安巧工丁緩者為常滿燈七龍五鳯雜以芙蓉蓮藕之竒又曰髙祖初入咸陽宫周行府庫金玉珍寳不可稱言其尤異者有青玉五枝燈髙七尺五寸下作蟠螭以口䘖燈燈燃則鱗甲皆動炳爛若星而盈室焉洞㝠記曰漢武帝燃芳苡燈于閣上有白鳳黒龍馵足來戯于閣邊芳苡草出奔盧國又曰丹豹髄白鳳膏磨青鍚為屑以淳蘇油和之照於神壇夜暴雨燈光不㓕羊頭山記曰漢有常滿燈不添滿光明不絶也法顯山記曰舎衛國精舎道東有外道天寺名曰影覆與佛論議䖏精舎夾道相對亦髙六丈許所以名影覆者日在西時佛精舎影映外道天寺日在東時外道天寺影北映不得映佛精舎也外道常遣人守天寺洒掃燒香燃燈供養至明旦其燈輙移在佛精舎中娑羅門恚言諸沙門取我燈自供養佛娑羅門於夜自伺候見有金天神持燈繞佛精舎三匝供養佛前忽然不見娑羅門乃知佛神即捨家入道王子年拾遺記曰董偃常卧延清室以畫石為榻髙三尺廣六尺石體甚輕郅支國所獻也上設紫琉璃屏風列靈麻之燭如屈龍雜寶飾之侍人唯見燈明似言無礙乃扵屏風外扇之偃曰玉石豈須扇而後涼耶侍者乃以手摸之方知有屏風之礙又曰穆王東至大􅀈音竒之谷起春霄之官集諸方士問佛道法時已将夜聞殷然雷聲伏蟄皆動俄而有流光照於宫内王更設常生之燈一名恒明又有鳯腦之燈綴水蓮氷谷之花上去燈七八尺不欲使烟光逺照也西王母来乗翠鳯之輦共王飲食又曰燕昭王時海人乗霞舟以雕壺盛丹龍膏以獻昭王王坐通雲之堂亦曰通霞臺以龍膏為燈照燿百里烟光丹紫國人望之咸言瑞光遥相拜之以火浣布為纒炷光滿於宫内孫子曰火光明天者燈燭何施焉符子曰不安其昧而樂其明者是猶夕蛾去暗赴燈而死秦子曰智惠多則引血氣如燈火消脂膏炷大而朗朗則膏消炷小而闇闇則膏息息則乆也説苑曰楚荘王賜羣臣酒日暮燈燭既滅乃有引美人衣者美人挽絶其冠纓桓譚新論曰余與劉伯師夜坐燈中脂炷燋秃将㓕余謂伯師曰人衰老亦如彼秃炷矣伯師曰人衰老應自續余曰養生可使白髪更黒至壽極亦死耳王朗秦故事曰五華燈樹正月朔朝賀設于下三階之前月照星明雖夜猶晝淮南萬畢術曰取蚖脂為燈置火中即見諸物語林曰嵇中散燈下彈琴忽有一人面甚小斯須轉大遂長丈餘單衣革帯嵇視之既熟吹其燈㓕曰吾恥與鬼魅爭光河圖汴光篇曰陽精散而分布為火燭記曰侍坐於所尊敬燭至起異晝夜又曰燭不見跋跋本也燭盡則去之嫌若燼多有厭倦也又曰曾子寢疾童子隅坐而執燭又曰孔子曰嫁女之家三夜不息燭思相離也又曰祭之日汎掃反道鄉為田燭又曰凢飲酒為獻主者執燭抱燋執燭不讓不辭不歌又曰禮者何也即事之治也君子有其事必有其治治國而無禮譬如終夜有求于幽室之中非燭何見又曰女子夜行以燭無燭則止周禮曰天府凡吉㓙之事祖廟之中沃盥執燭又曰凡邦之大事共墳燭庭燎墳燭麻燭也又墳大也樹庭燎於門外曰大燭於門内曰儀禮曰主人爵弁纒裳從車二乗執燭前焉又曰燕則庶子執燭於阼階上司宫執燭於西階上甸人執大燭於庭中閽人執燭於門外尚書大傳曰后夫人将侍於君前息燭後舉燭戰國䇿曰甘茂去秦之齊出闗遇蘇子曰君聞夫江上之處女乎夫江上處女有家貧無燭者處女相與語欲去之無燭者曰妾以無燭之故常先至掃室布席何愛東壁之餘光照西壁者幸以賜妾何為去我諸女以為然而留之今臣棄逐於秦而出闗為足下掃室布席幸無我逐也蘇子曰善史記曰始皇塚中以人魚膏為燭謝承後漢書曰巴祗為揚州刺史與客坐暗暝之中不燃官燭晉書曰周顗弟嵩嘗因酒暝目謂顗曰君才不及弟何乃横得重名以所執蠟燭投之顗神色無忤徐曰阿奴火攻固出下䇿耳南史曰竟陵王子良常集學士刻燭為詩四韻者則刻一寸以此為竒蕭文琰曰燒一寸燭為四韻詩何難之有乃與丘令楷江洪打銅鉢立韻響滅則詩成皆可觀覽後魏書曰髙祖嘗幸清徽堂命黄門即崔光鄴郭雅邢巒崔休等賦詩言志燭至公卿辭退髙祖曰燭至辭退異姓之禮在宗載考宗族之義卿等且還朕與諸王宗室欲成此夜飲北齊書曰郎茂年十五師事國子博士河間權㑹受詩易三禮𤣥象刑名之學至忘寢食家人恐成病恒節其燭唐書曰劉沔為忠武小校從李光顔討淮西為捉生將前後遇賊血戰鋒刃所傷幾死者數四嘗傷重臥草中月黑不知歸路昏然而睡夢人授之䨥燭曰子方大貴此行無患可持此而還既行然有雙光在前自後破虜危難每行嘗有此光及罷鎮後雙光遂息又曰桞公權充翰林書詔學士每浴堂召對繼燭見䟦語猶未盡不欲更取宫人以蠟淚揉紙繼之會稽典録曰盛吉拜廷尉吉性度仁恕務在寛矜每至冬月罪囚當斷其妻執燭吉手持丹筆夫妻相對垂泣又曰陳修字奉遷烏傷人也為豫章太守修性清潔履約恭儉十日一炊不燃官燭神仙傳曰漢章帝問劉馮曰殿下有怪嘗著朱衣被髪持燭相隨而走為可劾否馮曰可帝因使人偽為之馮以符擲之數人頓地帝驚曰以相試耳乃解之列女傳曰齊女徐吾者東海上貧婦人與其隣婦李吾之屬合燭夜績徐吾最貧無燭李吾曰徐吾燭數不屬請無與夜績徐吾曰妾以貧故起常先去常後洒掃陳席以待來者今一室之中益一人燭不為益明去一人燭不為益暗何愛餘光莫之能應遂復與夜績西京雜記曰閩越王獻髙帝石蜜五斛蜜燭二百枝又曰匡衡勤學無燭隣舎有燭乃穿壁引其光以書映光而讀之王子年拾遺記曰融臯西有銷明之草莖生千葉隂數畆地夜視之如列燭晝則㓕矣又曰崑崙者西方曰彌山對七星之下出碧海之中有五色玉樹夜望水上光熖如燭抱朴子曰慕惡者猶宵蟲之赴明燭焉又曰夫明燭宵舉飛蟲羣起又曰有自無而生焉形須神而立焉有者無之宫形者神之宅故譬之於堤堤壞則水不留方之於燭燭盡則火不居住也文子曰鳴鐸以聲自毁膏燭以明自銷韓子曰郢人有遺燕相國書者夜書火不明因謂持燭者曰舉燭而誤書舉燭非書意也燕相國受書而恱之曰舉燭者言舉髙明者而任之國以治也淮南子曰天下時有盲妄自失之患此膏燭之類也火愈燃而消愈急説苑曰晉平公問於師曠曰吾年七十欲學恐已暮矣師曠曰臣聞少而學者如日出之光壯而學者如日中之光老而學者如炳燭之明不學昧趨如夜行焉炳燭之明孰與昧行公曰善世説曰王君夫王愷字以飴糖澳釡石李倫石崇字以蠟燭作炊𤣥晏春秋曰予讀漢書凶奴傳不識撐黎孤塗之字有小奚執燭顧而問之奴曰撐黎天子也盖匈奴之號單于猶漢人言天子也予扵是乎曠然發曚潜夫論曰偶燭之施明於幽室也前燭即盡照之矣後燭入而益明二者相因而成大論衡曰太公隂謀書稱武王伐紂兵至牧野晨舉脂燭權掩不備地鏡圗曰相玉者見美女子載燭行壇隂從其所出入處㝷之石中有玉矣蔡氏化浦説曰伏龍非我馬白日非我燭藏之然之保此小材楚辭曰室中之觀多珍怪蘭膏明燭華容備古詩曰人生不滿百常懐千載憂晝短苦夜長何不秉燭遊魏明帝樂府詩曰晝作不輟手猛燭繼望舒劉楨詩曰天地無期竟民生甚局促為稱百年壽誰能應此録低昻倐忽去炯若風中燭傳咸燭銘曰煌煌丹燭熖熖飛光取則景龍擬象扶桑照彼𤣥夜炳若朝陽焚形監世無隱不彰炬東觀漢記曰光武平河北任光伯卿暮入堂陽界騎皆持炬火天地赫然盡赤堂陽驚怖即夜降魏志曰滿寵字伯寧以前將軍都督揚州諸軍事孫權自将號十萬至合淝新城寵馳往赴募壮士十數人折松為炬灌以麻油從上風放火燒賊攻具射殺權弟子泰賊于是引退宋書曰王懿字仲徳太原人也符氏之敗仲徳年十七與兄叡同起義兵與慕容垂戰敗仲徳被重創走至滑臺復為翟遼所留使為将帥仲徳志欲南歸乃棄遼走太山遼追騎甚急夜行急見前有猛炬導之乗火夜行百里許得以免難六韜曰三軍有行統領士衆旦則有雲梯逺望夜則設雲火萬炬淮南子曰亡者不敢夜持炬又曰寗戚欲干齊桓公困窮無以自達于是為商旅将車任重商于齊暮至于郭門外桓公郊迎客夜開門爝火甚盛戚飯牛車下望見桓公擊牛角而作商歌汝南先賢傳曰許嘉字徳珍事郡功曹為小吏常持劒侍功曹日暮并令持炬嘉于是忿然曰男兒為吏不免賤役投火于池以劒帶槐樹趨詣府門主者問其故對曰本去蒭牧來入天朝觀庠序之化今右手持劒左手把炬此等之事乞得受罰而歸神仙傳曰王遥伯遼暮夜大雨晦㝠遥出行衣不濕有兩炬火常在于前英雄記曰公孫瓉與破虜校尉鄒靖俱追敵靖為所圍瓉廻師奔救敵即破散解靖之圍乗勝窮廹日入之後把炬逐北又曰周瑜敗曺操于赤壁宻使輕船走舸百艘艘有五十人施棹持炬火太平御覽卷八百七十
