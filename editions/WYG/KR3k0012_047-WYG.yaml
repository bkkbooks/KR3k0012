body:
  text: 太平御覽卷四十七宋李昉等撰地部十二㑹稽東越諸山稷山麻山雞豕山濁女山龜山秦望山嵊山塗山重山羅山鶴山陳音山銅牛山土城山亭山洛思山烏帶山龍頭山壇讌山白石山小白山縉雲山桃都山椒山覆釡山石簣山括蒼山天姥山消山白鶴山仙石山石新婦山靈石山臨海山崛門山石公山石城山金勝山長山畢嶺銅山崑山騎石山江郎山石室山天堦山太湖山孤山泉山梨嶺武夷山䦨干山雞巖烏嶺金泉山演仙山稷山越絶書曰稷山者勾踐齋戒臺也麻山越絶書曰麻山勾踐欲伐吳種麻以為弓絃雞豕山越絶書曰雞豕山者越將伐吳飬雞豕於此山以飬死士濁女山吴越春秋曰濁女山者諸寡婦女淫泆犯過者皆輸此山上越王將伐吳其士有憂思者令逰山上以喜其意龜山吳越春秋曰怪山者琅邪東武海中山也一夕自來百姓怪之故曰怪山形似龜體故謂龜山孔㑹稽記曰城西門外百餘歩有怪山越時起靈臺於山上又作三層樓以望雲㑹稽志曰龜山之下有東武里即琅琊東武縣山一夕移於此秦望山水經注云㑹稽秦望山在州城正南為衆峰之傑渉境便見史記曰秦始皇登之以望南海自平地至山頂七里懸磴孤危峭路險絶記云攀蘿捫葛然後能昇山上無甚高木當由地逈多風所致山南有嶕嶢中有大城越無餘之舊都也故吳越春秋云勾踐語范蠡曰先君無餘國在南山之陽社稷宗廟在湖之南又有㑹稽之山古防山也亦謂之茅山也又曰㨂山越絶云㨂猶鎮也蓋周禮所謂揚州之鎮山矣山形四方多金玉下多玞石山海經曰夕水出焉南流注於湖吳越春秋稱山覆釜之中有金簡玉字之書黄帝之遺識也山下有禹廟廟有故聖像禮樂緯云禹治水天賜神女聖姑即其像也山上有禹冢昔大禹即位十年東廵狩崩於㑹稽因而𦵏之言鳥為之耕春銜㧞草根秋啄其穢是以縣官令民不得妄害此鳥犯則有刑無赦山東有陘去廟七里深不見底謂之禹井云東逰者多探其穴也秦始皇登稽山刻石紀功尚存山側孫暢之述書云丞相李斯所篆也又有石山上有金簡玉字之書言夏禹發之得百川之理也又有射的山逺望山的狀若射侯故謂射的射的之西有石室為射堂年登否常占射的以為貴賤之凖的眀則米賤的闇則米貴故諺云射的白斛米百射的𤣥斛米千嵊山水經注曰剡縣嵊山山下有亭亭帶山臨江松嶺森蔚沙渚平浄浦陽之東北經始寧縣嶀山嶠嶠壁立臨江欹路峻狭不得行並行者牽木梢以進不敢俯視嶠西有孤峰特上飛禽罕至嘗有採藥者沿山見涌溪尋上於山頂樹下有十二方石地甚方潔還復更尋遂迷前路言諸仙之所集讌故以壇讌名山嶠北有嶀浦浦口有廟廟甚靈驗行人及樵伐者皆先敬焉若相盗竊必為蛇虎所害北則嶀山與嵊山接二山雖曰異縣而峰嶺相連其間傾澗懐烟泉溪引霧吹水風馨觸岫延賞是以王元琳謂之神明境事備謝康樂居山記宋書曰張稷子嵊字四山稷初為剡令至嵊亭生之因名嵊字四山塗山郡國志曰塗山禹㑹萬國之所有石船長一丈云禹所乗者宋元嘉中有人於船側掘得鐵屐一雙又㑹稽記曰東海聖姑從海中乗舟張石帆至二物見在廟中又有周時樂器名錞于銅為之形似鐘有頸映水用芒莖刜則鳴宋武修廟得古珪梁武初修之又得青玉印重山孔曄㑹稽記曰重山大夫種墓語訛成重漢江夏太守宋輔於山南立學教授今白樓亭處是也羅山孔􅁮㑹稽記曰諸曁縣北界有羅山越時西施鄭旦所居所在有方石是西施曬紗處今名苧羅山王羲之墓在山足有石碑孫興公為文王子敬所書也鶴山孔靈符㑹稽記曰射的山西南水中有鶴山此鶴常為仙人取箭曾刮壤尋索遂成此山漢太尉鄭宏少貧賤以採薪為業嘗於山中得一遺箭羽鏃異常心甚怪之頃之有一人覔箭宏以還之又射的山半嶺有石室仙人射堂東有高巖臨潭有石的形甚圎眀視之如鏡矣陳音山孔􅁮㑹稽記曰陳音山昔有善射者陳音越王使簡士習射射於郊外死因葬為冢今開冢壁悉畫作騎射之象因以名山銅牛山孔􅁮㑹稽記曰銅牛山舊傳常有一黄牛出山巖食草採伐人始見猶謂是人所養或有共驅蹙之箠及輙失然後知為神異土城山孔􅁮㑹稽記曰勾踐索美女以獻吳王得諸暨苧羅山賣薪女西施鄭旦先教習於土城山山邊有石云是西施澣紗石亭山孔􅁮㑹稽記曰晉司空何無忌臨郡起亭山椒極望巖阜基址猶存因號亭山洛思山孔􅁮㑹稽記曰永興縣東五十里有洛思山漢太尉朱偉為光禄大夫時遭母哀欲卜墓此土將歸洛下冢師相地因謂云去鄉既逺歸思常深忽極目千里北望亰洛遂縈咽而死𦵏山頂故以為名烏帶山孔靈符㑹稽記曰諸暨縣西北有烏帶山其山上多紫石世人莫知之居士謝敷少時經厯諸山徃來遷昜功費千計生業將盡後逰此境夜夢山神語之曰當以五十萬相助覺甚怪之旦見主人牀下有異色甚眀試取拭視乃紫石因問所從來云出此山遂往掘果得其利不貲龍頭山孔靈符㑹稽記曰上虞縣有龍頭山上有蘭峰峰頂盤石廣丈餘葛洪學仙坐其上壇讌山孔􅁮㑹稽記曰始寧縣有壇讌山相傳云仙靈所讌集處山頂有十二方石石悉如坐席許大皆作行列白石山孔􅁮㑹稽記曰剡縣西七十里有白石山上有瀑布水懸下三十丈巖際有蜜房採蜜者以葛藤連結然後至小白山名山略記曰小白山在㑹稽陽城趙廣信以魏末入小白山受李氏服氣法又師左元放受守中之道後煉九華丹丹成服之太一遣迎今在東華宫為真人縉雲山郡國志曰括州即處州也括蒼縣縉雲山黄帝遊仙之處有孤石特起髙二百丈峰數十或如羊角或似蓮花謂之三天子都有龍鬚草云群臣攀龍髯所墜者桃都山郡國志曰台州桃都山上有大桃樹上有天鷄日初出桃樹上天雞即鳴雞下聞之而鳴樹下有兩鬼持葦索取不祥之鬼食之椒山郡國志曰越州椒山吳王遣木客入山求大木不得工人憂思作木客吟一旦神木自生合抱長二十丈獻吳王造姑蘇臺覆釜山郡國志曰台州覆釜山云夏帝登此得龍符處有巨跡云是夸父逐日之所踐石簣山賀循記曰石簣山其形似簣在宛委山吳越春秋云九山東南曰天柱山號宛委承以文玉覆以􅋥石其書金簡青玉字編以白銀禹乃東廵登衡山殺四馬以祭之見赤繡文衣男子自稱元夷倉水使者謂禹曰欲得我簡書知導水之方者齋於黄帝之岳禹乃齋登石簣山果得其文乃知四瀆之眼百川之理鑿龍門通伊闕遂周行天下命伯益記之名為山海經開山圗曰禹開宛委山得赤珪如日碧如月長一尺二寸也括蒼山五岳圗序曰括蒼山東岳之佐命登真隐訣注及吳録云括蒼山登之俯視雷雨也天姥山郡國志曰天姥山與括蒼山相連石壁上有刋字蝌蚪形髙不可識春月樵者嘗聞簫鼓之聲聒耳元嘉中遣名畵工寫其狀於團扇即此山也消山郡國志曰消山下有夫人祠山北湖隂又有消御史廟孤石聳出似婦人豔粧而坐白鶴山郡國志曰白鶴山者昔有白鶴飛入㑹稽雷門鼓中擊之聲震洛陽臨海記曰郡西有白鶴山山上有池泉水懸溜逺望如倒挂白鶴因名挂鶴泉又郡國志曰漢末有徐公於白鶴山成道控鶴騰虗而去又有鶴掛嶺猶有翺翔之勢仙石山臨海記曰仙石山上有舘土人謂之黄公客堂兩邊有石步廊觸石雲起崇朝必雨有四竿修竹風吹自垂空際拂石皆浄即王方平逰處也石新婦山臨海記曰石新婦山亦名似人山土石悉紺色列石參差似人形逺望如鳥之俯仰宋文帝遣畫工模寫山狀時一國盛圗於白團扇焉靈石山臨海記曰靈石山者山有寺當孫恩作叛毁材木以為船舸山石即於空中自然而落賊毎有所傷故曰靈石山臨海山臨海記曰臨海山山有二水合成溪曰臨海一水是始豐溪一水是東女溪至州北兩溪相合即名臨海溪山因溪名崛門山郡國志曰崛門山在海中腹有孔上達於頂有聲即大風不風即水涌出必見大兵吳將平孔内有聲逺聞千里石公山東陽記曰石公山孤石望如石人坐其傍又有如石人狀似新婦著花履焉或名新婦巖石城山吳録曰永康有石城山海内南經曰三天子都在閩西海北郭璞注云在新安歙縣東又引張氏土地記云東陽縣南四里有石城山上有小石城云黄帝曾逰此山即三天子都也金勝山郡國志曰金勝山昔有人於此拾得金勝因以名之山有趙炳祠炳善方術廟至今無蚊蟲異苑曰孫權時建康人入山還得大龜烹之不爛即此山也長山郡國志曰長山相連逕三百里一名金華山即王方平初起遇道士教以仙方處吳録地理志曰常山仙人採藥處謂之長山山南有春草巖折竹岩岩間不生蔓草盡出龍鬚云赤松羽化之處有似龍鬚而麄大者名為虎鬚不中為席但以其心為燈炷又抱朴子云左元放言金華山可以合神丹免五兵洪水之患又按輿地志云金華山連亘三百餘里畢嶺輿地志曰東陽畢嶺之下有錢嶺往往人於嶺下獲大錢今俗謂之錢嶺銅山東陽記曰銅山下有泉色鮮白號為銅泉又按異苑曰吳時有軍士五百人破洞得一銅釜將欲破之水從中暴發遂成湖被溺人皆死於此崑山東陽記曰崑山頂上有一孤石髙可三十丈其形如甑人謂之石甑騎石山郡國志曰騎石山如人騎馬而無頭昔有神巫以印指馬馬頭即落則此山也江郎山郡國志曰江郎山有三峰峰上各有一巨石髙數十丈嵗漸長成昔有江家在山下居兄弟三人神化於此故有三石峰在焉有湛滿者亦居山下其子仕晋遭永嘉之亂不得歸滿乃使祝宋言於三石之靈能致其子靡愛斯牲旬日中湛子出浴水邊見三少年使閉眼入車欄中但覺去如疾風俄頃間從空墮怳然不知所以良久乃覺是家園中也石室山郡國志曰石室山一名石橋山一名空石山晉中朝時有王質者嘗入山伐木至石室有童子數四彈琴而歌質因放斧柯而聽之童子以一物與質狀如􅀥枚含之不復飢遂復小停童子語曰汝來已久何不速去質應聲而起柯已爛盡天階山建安記曰天階山在將樂縣南二十里山下有寶華洞即赤松子採藥之所洞中有石燕石蝙蝠石室石柱并石臼石井俗云其井南通沙縣溪復有乳泉自上而滴人以服之登山頂者若昇碧霄故有天階之號太湖山建安記曰太湖山在浦城縣西南一百里一名聖湖山湖在山頂昔有採藥者止此湖畔見滿湖芙蓉涉水採之乃石也亦有禽鳥逺望如飛近視則石孤山建安記曰孤山在環嶂之間其地坦平悉是溝渠阡陌以此山挺然孤立因以名之梁江淹為吳興令云此地有碧水丹山珍禽靈木為吳興勝境泉山泉山記曰山頂有泉分為兩派一入處州一入建溪即漢書朱買臣所謂東越王居保泉山一人守險千人不得上即此山也梨嶺泉山記曰棃嶺因棃以名之記云南嶺下道東有種棃古亭跡存焉武夷山蕭子開建安記曰武夷山髙五百仞巖石悉紅紫二色望之若朝霞有石壁峭㧞數百仞於煙嵐之中其石間有水碓礱簸箕籮竹箸等物靡不有之顧野王謂之地仙之宅半巖有懸棺數千傳云昔有神人武夷君居之故因名之又坤元録云建陽縣上百餘里有仙人𦵏山亦神仙所居之地䦨干山建安記曰䦨干山南與武夷山相對半岩有石室可容千人岩口有水闌干飛閣棧道逺望石室中隐隐然有牀帳几案之屬岩石間悉生古柏懸棺仙葬多類武夷雞巖建安記曰雞岩隔澗西與武夷相對半岩有雞窠四枚石峭上不可登履時有羣雞數百飛翔䧺者類鷓鴣魏王秦坤元録云武夷山澗東一巖上有雞栖即此是也烏嶺烏嶺山記曰烏嶺峻極不通牛馬因其烏居山連接因以為名魏王秦坤元録云邵武北有庸嶺一名烏嶺北隰中有大蛇為將樂令李誕所殺者金泉山建安記曰金泉山南枕溪有細泉出沙彼人以夏中水小披沙淘之得金山西有金泉祠演仙山建安記曰演仙山故老相傳云演氏鍊丹於此山竈之餘基僅存焉此山東面亦略通人逕山中出橘其味甘人有食者則可攜之出山即迷道有演仙水出此山當郡城北為大河莫知其深淺其下有暗竇入城流出於劍潭居人資之常流不絶太平御覽卷四十七
