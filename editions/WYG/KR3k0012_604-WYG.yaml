  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_604-1a, image: WYG0898/WYG0898-0480c.png}
body:
  text: 太平御覽卷六百四宋李昉等撰文部二十史傳下唐書曰于休烈修國史肅宗自鳯翔還京勵精聴受嘗謂休烈曰君舉必書良史也朕有過失卿書之否對曰禹湯罪已其興也勃焉有徳之君不忘規過臣不勝大慶又曰貞元十二年賈躭盧邁皆假故趙憬獨對於延英上問曰近日起居注所記何事憬奏曰左史記事右史記言人君動止有事言隨即記録今起居之職也國朝自永徽以後起居唯得對仗承㫖仗下後謀議皆不得聞其事注記但出於己行制勑内採録更無他事所以長夀中姚璹知政事以為親承徳音謨訓若不宣自宰相史官無由得書遂請仗下後所言軍國政要宰相專知撰録號為時政記每月送史舘無何此事又廢上曰君舉必書義存勸誡既有時政記宰臣宜依故事為之又曰李翺以史官記事不實奏狀曰臣謬得秉筆史舘以記注為職夫勸善懲惡正言直筆紀聖朝功德述忠賢事業載姦臣醜行以傳無窮者史官之任也凢人事迹非大善大惡則衆人無由得知舊例皆訪於人又取行狀謚議以為依據今之作行狀者多是其門生故吏莫不虛加仁義禮智妄言忠肅惠和不惟其處心不實茍欲虛美於受恩之地耳葢為文者又非游夏遷雄之列務於華而忘其實溺於文而棄其理故為文則失六經之古風紀事則非史遷之實録臣今請作行狀者但指説事實直載事功假如作魏徴傳但記其諫諍之詞足以為正直段秀實但記其倒用司農印以追逆兵以象笏擊朱泚足以為忠烈若考功視行狀不依此者不得受依此則考功下太常牒史館然後定謚伏乞以臣此奏下考功從之又曰元和中宰臣以下朝對於延英殿上以時政記問於宰臣修國史李吉甫對曰是宰相記天子事以受史官之實録曰古者左史記言今起居舍人是也右史記事今起居郎中也永徽中宰相姚璹監修國史慮造膝之言或不下聞因請隨奏對而記是也上曰其間或修或不修者何也吉甫對曰凡靣奉德音未及施行摠為機密固不可書以送史官其間謀議有發自臣下者又不可自書以付史官及事已行者制命昭然天下皆得聞知即史官之記不待書以授也且臣觀時政記者姚璹修之於長夀及璹罷而事廢賈躭齊抗修之於貞元躭抗罷而事廢然則關於政化者不虛美不隐惡謂之良史也又曰憲宗銳意於為理徧讀列聖實録見貞觀開元故事竦慕不能釋卷嘗謂宰臣曰太宗之創業如此𤣥宗之致理如此我讀國史始知萬倍不如先聖焉又曰長慶中中書門下請修聖政紀云古之王者必置史官以紀善惡國朝貞觀永徽以前宰臣及百官正衙奏事史官載筆於階戺之下所有奏議悉約書之自永徽以後許敬宗李義府作相事多奸弊遂奏史官與庶僚俱退然後宰臣請事由是君臣之間咨謀啓沃不復知矣左右史惟寫詔誥除授以修注記長夀二年宰相姚璹以為史官疎逺不得叅聞政事然帝王謨訓不可遂無紀述乃請自今以後所論軍國政要委宰相一人撰録號為時政記事亦尋廢又路隨傳曰初韓愈撰順宗實録説禁中事頗切直内官惡之往往於上前言其不實累朝有詔改修及修憲宗實録後文宗復命改正永貞時事隨奏曰臣昨靣奉聖㫖以順宗實録頗非詳實委臣等重加刋正伏以史册之作勸誡所存事有當書理宜歸實匹夫美惡尚不可誣人君得失无容虛載聖㫖以前件實録記貞元末數事稍非摭實葢出傳聞審知差舛更命刋正頃因坐日屢形聖言通計前後至於數日臣等伏以貞觀以來累朝實録有經重撰不敢固辭但欲粗刪深悞亦固盡存諸説宗閔僧孺相與商量縁此書成於韓愈今史官李漢蔣係皆愈之子壻若遣叅撰或致私嫌縱臣獲修成必懼終為時累且韓愈所書亦非己出元和之後已是相循伏望條示舊記最錯悞者宣付史官委之修定詔曰其實録中所書德宗順宗朝禁中事尋訪根柢葢起謬傳諒非信史宜令史官詳正刋去其他不要更修又曰文宗嘗問曰順宗實録似未詳實史官韓愈不是當時屈人否李石曰韓愈貞元末為四門博士上曰司馬遷與任安書全是怨望所以漢武本紀事多不實鄭覃曰漢武中年後大發戎馬拓土開邊生人耗竭糧饟不給本紀所述亦非過言石曰史筆不直率多無後鄭覃所陳志在諷諫欲陛下究竟盛徳故言武帝不屈上曰靡不有初鮮克有終此誠可為戒覃因曰伏知陛下乙夜觀書無不該渉然經典切切不過一二百言聖意所存靡不有初鮮克有終此兩句實可寢食佩服又曰張次宗有文學稽古勵行開成中為起居舍人文宗復故事每入閣左右史執筆立於螭頭之下宰相奏事得以備録宰臣既退上召左右更質證所奏是非故開成政事詳於史氏又曰文宗朝對宰臣退上命起居郎鄭朗等適所紀録者將來一觀鄭朗對曰臣執筆紀便目為史臣聞自古帝王不合觀史上曰故事何在朗曰臣不敢逺徴故實嘗聞太宗皇帝欲親覽國史用知得失諫議大夫朱子奢上表云史官所述義歸盡善若至曾𤣥已後或非上智中主庸君飾非護短見極陳善惡致怨史官何地逃刑又問褚遂良對曰今之起居古之左右史以記人君言行善惡必書庶幾不為非法不聞帝王躬自觀史上又謂朗曰適來所紀且是直書未有臧否一見无爽朗乃進所紀上畧覽曰卿宜門外重寫録進其日晚出内詔示宰臣曰適鄭朗奏朝來所紀之事擬不進本人君之言良史善惡必書或有平生之閑話不關理道之體要垂諸將來實為愧耻異日臨朝庶幾稍改何妨一見得戒醜言又嘗於紫宸殿對百僚遣閤門使就起居舍人魏謩取註記謩奏曰臣以自古置此以為聖王鑒戒陛下但為善勿畏臣不書如陛下所行錯悞臣不書之天下之人皆得書之臣願以陛下為太宗文皇陛下許臣比褚遂良上曰我前亦嘗觀之謩曰是前起居不詳故事臣今豈得䧟陛下為非若陛下一覽之後自此文字須有迴避如此則善惡不直如何遣後代取信上遂止周書曰賈緯乾祐中受詔與王伸竇儼修晉髙祖少帝漢髙祖三朝實録緯以筆削為己任然而褒貶任情記注不實晉宰相桑維翰執政嘗薄緯之為人不甚見禮深銜之及叙維翰傳稱維翰身没之後有白金八千挺他物稱是翰林學士徐台符緯邑人也與緯相善謂緯曰聞吾友書桑魏公白金之數不亦多乎乃改為白金數十挺太史公自序云夫詩書隐約者欲遂其志之思也故述往事思來者於是卒述陶唐以來至于麟止自黄帝始原始察終考之行事著十二本紀三十世家十表八書七十列傳凡一百三十篇成一家言是也西京雜記曰司馬遷發憤作史記一百三十篇先逹稱為良史之才其以伯夷居列傳之首以為善而无報也為項羽本紀以據髙位者非關有徳也及其序屈原賈誼辭㫖抑揚悲而不傷亦近代之偉才又曰漢承周史官至武帝太史公司馬談世為太史子遷年十三使乗傳行天下求諸侯史記續孔氏古文序世事作傳百三十卷五十萬字談死子遷以世官復為太史公遷序事如古春秋法司馬氏本古周佚後也作景帝本紀極言其短及武帝之過帝怒而削去坐舉李陵降匈奴下遷蠶室有怨言下獄死宣帝以其官為太史令行太史公文書而已不復用其子孫班固典引曰永平十七年詔曰司馬遷著書成一家揚名後世至以身陷刑之故反微文諷刺貶損當代非誼士也又魏志曰明帝問王肅司馬遷以受刑之故内懐隐切著史記非貶孝武令人切齒又晉張輔嘗著論論班固司馬遷云遷之著述辭約而事舉叙三千年事唯五十萬言班固叙二百年事乃八十萬言煩省不同不如遷一也良史述事善足以奬勸惡足以鑒誡人道之常中流小事亦无取焉而班皆書之不如二也毁貶晁錯傷忠臣之道不如三也遷既造創固又因循難易益不同矣又遷為蘇秦張儀范雎蔡澤作傳逞辭流離亦足以明其大才故述辨事則辭藻華靡叙實録則隐核名檢此所以遷稱良史也文心雕龍曰昔者夫子閔王道之缺傷斯文之墜静居以歎鳯臨衢而泣麟於是就太師以正雅頌因魯史以修春秋舉得失以表黜陟徴存亡以標勸戒然叡㫖幽秘經文婉約丘明同恥實得微言乃原始要終創為傳體傳者轉也轉受經㫖以授於後實聖文之羽融記籍之冠冕也及至縱横之世史職猶存秦并七王而戰國有策葢録而不序故即簡為名也漢滅嬴項武功積年陸賈稽古作楚漢春秋爰及史談世惟執簡子長繼志甄序帝績比堯稱典則位雜中賢法孔題經則文非元聖故取式吕覽通號曰紀紀綱之號亦宏稱也故本紀以述皇王列傳以總侯伯八書以鋪政體十表以譜年爵雖殊古式而得事序焉爾其實録無隱之㫖博雅宏辨之才愛奇反經之尤條例踳落之失叔皮論之詳矣及班固述漢因循前業觀史遷之辭思實過半其十志該富讃序宏麗儒雅彬彬信有遺味至於宗經規聖之典端緒豐贍之功遺親攘美之罪徵賄鬻筆之愆公理辨之究矣至於後漢紀傳發東觀袁張所制偏駁不倫薛謝之作疎謬少信若司馬彪之詳實華嶠之准當則其冠也及魏代三雄記傳並出陽秋魏略之屬江表吳録之類或激抗難徴或疎闊寡要惟陳夀三志文質辨洽荀張比之於遷固非妄譽也至於晉代之書繁乎著作陸機肇始而未備王韶續末而不終干寳述紀以審正明序孫盛陽秋以約舉為能案春秋經傳舉例發凡史漢以下莫不准的至鄧粲晉紀始立條例又擺落漢魏憲章殷周雖湘州曲學亦有心放典謨及安國立例鄧氏之規焉又曰紀傅為式編年綴事文非泛論按實而書嵗遠則同異難密事積則起訖易疎斯固總㑹之為難也或有同歸一事數人分功兩記則失於重複偏舉則病於不周又銓配之未易也故張衡摘史班之舛濫傅𤣥譏後漢之尤煩皆此類也若夫追述逺代代逺多偽公羊髙云傳聞異詞荀况稱録逺略近葢文疑則闕貴信史也然俗皆愛竒莫顧理實傳聞而欲偉其事録逺而欲詳其迹於是棄同即異穿鑿傍説舊史所無我書則傳此訛濫之本原而述逺之巨蠧也至於紀編同時時同多詭雖定哀微詞而世情利害勲榮之家雖庸夫而盡飾屯敗之士雖令德而常蚩理欲吹霜煦露寒暑筆端此又同時之枉可為歎息者也故述逺則誣矯如彼記近則回邪如此析理居正唯素臣乎談藪曰後魏大保清河崔光樂陵太守曠之孫長廣太守靈延之子光博學有史才本名孝伯字長仁髙祖賜名焉除著作郎撰國史遷黄門侍郎為髙祖所重帝曰孝伯之才渾渾如黄河東注今之文宗也及魏收為史改渾渾為浩浩光有大度喜怒不形於色有毁之者必善言以報之雖見誣謗終不自申曲直士君子以此稱之光修國史弟敬及子鴻復撰十六國春秋一門二史當代為榮太平御覽卷六百四
