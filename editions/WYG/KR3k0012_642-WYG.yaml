body:
  text: 太平御覽卷六百四十二宋李昉等撰刑法部八囚徒徒作年數附囚易坎卦曰上六係用徽纆寘于叢棘三嵗不得凶險阻之極不可升也嚴法峻刑難可犯也宜其囚執寘于思過之地書武成曰釋箕子囚封比干墓又泰誓曰屏棄典刑囚奴正士屏棄常法而不顧箕子正諌而以為囚奴又康誥曰要囚服念五六日至于旬時丕蔽要囚要囚謂察其要辭以斷獄既得其辭服膺思念五六日至於十日至于三月乃大斷之言必反覆思念重刑之至也詩泮水曰矯矯虎臣在泮獻馘淑問如臯陶在泮獻囚囚拘也僖公既伐淮夷而反在泮宫使武臣獻馘又使善聴獄之吏如臯陶者獻囚言所伐有功以所任者得其人也周禮秋官上曰掌囚掌守盗賊凡囚者凡囚者謂非盗賊自以他罪拘者也禮月令孟夏出輕繋仲夏挺重囚挺猶寛也重囚寛之至秋方决輕者繋出而舍之也左傳曰乗丘之役公以金僕姑射南宫長萬公右歂孫生搏之宋人請之宋公靳之曰始吾敬子今子魯囚也吾不敬子矣又曰晉㐮公縛秦囚使莱駒以戈斬之囚呼莱駒失戈狼瞫音審取戈以斬囚遂以為右又曰鄭公子歸生受命于楚伐宋宋華元樂吕禦之戰于大棘宋師敗績囚華元獲樂吕又曰晉侯觀于軍府見鍾儀問之曰南冠而縶者誰也南冠楚冠也縶拘繋也有司對曰鄭人所獻楚囚也使税之召而弔之再拜稽首問其族對曰伶人也公曰能樂乎對曰先父之職官也敢有二事使與之琴操南音公曰君王何如對曰非小人之所得知也固問之對曰其為太子也師保奉之以朝于嬰齊而夕于側也嬰齊令尹子重也側司馬子反也言其尊卿敬老也不知其他公語范文子文子曰楚囚君子也君盍歸之使合晉楚之成公従之又曰楚子侵鄭鄭皇頡戌之出與楚師戰敗穿封戌囚皇頡公子圍與之争之公子圍共王子靈王也正於伯州犂正曲直也伯州犂曰請問於囚乃立囚伯州犂曰所争君子也其何不知上其手曰夫子為王子圍寡君之貴介弟也介大也下其手曰此子為穿封戌方城外之縣尹也誰獲子上下手以道囚意囚曰頡遇王子弱焉弱敗也言為王子所得也戌怒抽戈逐王子圍又曰衛侯如晉晉人執而囚之于士弱氏士弱晉主獄大夫也又曰紂囚文王七年諸侯皆從之囚紂懼而歸文王史記曰孟嘗君入秦秦王留之人或説秦王曰孟嘗君相秦必先齊而後秦秦其危矣於是秦昭王乃囚孟嘗君漢書曰雋不疑為京兆尹每行縣録囚徒不疑多有所平反音翻母喜笑為飲食語言異於他時或無所出母怒為之不食故不疑為吏嚴而不殘又曰吕后為皇太后乃令永巷囚戚夫人又天文志曰有勾圜十五星屬杓曰賤人之牢牢中星實則囚多虛則開出又曰王章下廷尉獄妻子皆繋小女年十二起號哭曰平生獄上呼囚數常至九今八而止我君素剛先死者必君果死又曰蕭育當繋乃欲棄官按佩刀曰蕭育杜陵男子何詣曹也東觀漢記曰和熹鄧后京師旱自三月至五月太后幸洛陽寺省庻獄舉寃囚徒杜洽不殺人自誣拷掠羸困便輿見長吏不敢白吏将去舉頭若有言太后察視覺之即呼還問状遂得申列即時收令下獄抵罪尹左遷行未還宫澍雨大降又曰和帝永元六年七月京師旱幸洛陽寺録囚徒舉寃獄未還宫而澍雨大降又曰馬援為郡督郵送囚至府囚有重罪援哀而縦之亡命遇赦而㽞後漢書曰陸續字智初㑹稽吴人也太守尹興辟為郡門下掾是時楚王英謀反隂䟽天下善士及楚事覺顯宗得其録有尹興名興詣廷尉續與主簿梁宏及掾史五百餘人詣洛陽詔獄續母逺至京師覘候消息獄事急無縁與續相聞母但作饋食付門卒以進之對食悲泣不能自勝使者恠而問其故續曰母来不得相見故泣耳使者大怒以為門吏通傳意氣将召案之續曰因食餉羮識母所自調和故知来耳非人告也母常截肉未嘗不方斷葱以寸為度是以知之魏志曰太祖征劉備先遣賈逵至斜谷視形勢道逢水衡載囚數十車逵以軍事急輙録重者一人皆放其餘太祖善之晉書曰曹攄為臨淄令獄有死囚嵗久攄行獄愍之曰卿等不幸致此非所如何新嵗人情所重豈欲暫見家耶衆囚皆泣曰若得暫歸死無恨也攄悉開獄出之尅日令還掾吏固爭咸謂不可攄曰此雖小人義不見負自為諸君任之至日相率而還並無違者一縣嘆服號為聖君北史曰後魏元麗拜雍州刺史為政嚴酷吏人患之其妻崔氏誕一男麗遂出州獄死囚及徒流案未申䑓者一時放免宋書曰王志累遷宣城内史清謹有恩恵郡人張倪吴慶争田經年不决志到官父老相謂曰王府君有徳政吾鄉里乃有如此争倪慶因相擕請罪所訟地遂成閒田後為東陽太守郡獄有罪重囚十餘人至日悉遣還家過節皆反惟一人失期志曰此自太守事主者勿憂明日果至以婦孕吏人益歎服之又曰謝方明為驃騎長史理南郡年終江陵縣獄囚事無輕重悉放歸家使過年三日還到罪重者二十餘人綱紀已下莫不疑懼時晉陵郡送故主簿𢎞季盛徐夀之並随在西固諫以為昔人雖有其事或是記籍過言且當今人情簿不可以古義相許方明不納一時遣之囚及父兄並驚喜涕泣以為就死無恨至期有重罪二人其一醉不能歸逮二日乃反餘一囚十日不来五官朱千期請見欲白討之方明知為囚事使左右謝五官不須入囚當自反囚逡廵墟里不能自歸鄉村責譲率領将送竟無逃者逺近歎服焉北齊書曰梁湘東王繹遣世子方諸出鎮郢州顔之推掌管記室值侯景陷郢之推被執頻欲殺之賴其行䑓郎中王則屢護救免囚送建業北史曰蕭撝入周為上州刺史為政以禮譲為本嘗至元日獄中囚繋悉放歸家聽三日然後赴獄主者争之撝曰昔王長虞延見稱前史吾雖寡徳竊懐景行以之獲罪彌所甘心諸囚荷恩並依限而至吏人稱其恵化陳書曰張種以外戚賜無錫嘉興縣侯秩嘗於無錫見有重囚在獄天寒呼囚曝日遂失之陳文帝聞之笑而不責南史曰吉翰監豫州梁郡諸軍事時有死罪囚典籖意欲活之因翰八闗齋呈事翰省訖語令且去明可更呈典籖不敢復入呼之乃来取昨所呈事視訖謂曰卿意當欲有此囚死命昨於齋坐見其事亦有心活之但此囚罪重不可全貸既欲加恩卿便當代任其罪因命左右收典籖付獄殺之原此囚生命唐書曰韋仁夀隋大業末為蜀郡法司書佐獄無寃囚其有罪者得臨時就戮猶西向為仁夀禮佛而死又曰太宗親録囚徒多所原宥見死罪者憫之放歸于家限至来秋即戮乃勅天下死囚皆放令入京並依期而集於是天下死罪囚三百九十人皆釋禁自至朝堂不勞督領一無逃散太宗感其奉法竟盡赦之又曰髙宗遵貞觀故事務在恤刑嘗問大理卿唐臨在獄繋囚之數臨對曰見囚五十餘人惟二人合死上以囚數少甚喜又曰吕元膺為蘄州刺史頗著恩信嘗嵗終閱郡囚囚有自告者曰某有父母在明日元正不得相見因泣下元膺憫焉盡脫其械縦之與為期守吏曰賊不可縦元膺曰吾以忠信待之及期無後到者由是羣盗感義相引而去韓子曰温人入周周不納問之曰客耶對曰主人也問其巷而不知也吏因囚之君使人問之曰子非周人也而自謂非客何也對曰臣少而誦詩云普天之下莫非王土率土之濵莫非王臣今君天子則我天子臣也淮南子曰拘囹圄者以日為修當市賈者以日為短吴越春秋曰吴王拘越王句踐與大夫范蠡於石室吴王疾越王謂太宰嚭曰囚臣請一見問疾太宰入言吴王乃見越王也列女傳曰嚴延年為河南太守河南號曰屠伯以用刑殺為主若屠者也其母嘗従東海来欲就延年臘到洛陽適見報囚所報决刑戮之囚也母大驚便止都亭不肯入府㑹稽典録曰盛吉拜廷尉吉性多仁恩務在哀矜毎至冬月罪囚當斷夜省刑状其妻執燭吉持筆夫妻相向垂泣妻嘗謂吉曰君為天下執法不可使一人濫罪太公金匱曰文王問太公曰天下失道忠諌者死予子伯邑考為王僕御無故烹之囚予於羑里以其羮歠予風俗通曰囚遒也言辭窮得罪誅遒也禮罪人寘諸圜土故囚字為口中人此其象也陳留耆舊傳曰虞延除細陽令毎至嵗時伏臘輙遣囚各歸家囚並感其恩應期而還韓陽天文要集曰流星入􅄧貴人繋囚也論衡曰李子長為政欲知囚情以梧桐為人象囚之形鑿地為埳卧木囚其中罪正者木囚不動寃侵奪者木囚動出不知囚之精神着木人耶料天神之氣動木囚也徒史記曰秦始皇至湘山逢大風不得渡上問博士曰湘君何神對曰堯女舜妻也死而塟此始皇大怒使刑徒三千伐湘山樹赭其山上又曰髙祖以亭長為縣送徒驪山徒多道亡自度比至多亡之到豐西澤中止飲夜乃解縦所送徒曰公等皆去吾亦從此逝矣徒中壮士願從者十餘人漢書曰匈奴侵冦王莽大募天下囚徒乃名曰猪突豨勇服䖍曰突者逐也善觸突人故取以為喻也范􅓮後漢書曰尚書郎張俊自獄中上書訟罪而俊獄已報廷尉将出榖門臨行刑鄧太后詔馳騎以减死論俊上書謝曰孤恩負義自陷重刑清㫁竟訖無所復望廷尉鞫遣刀鋸在前棺絮在後魂魄飛揚形容已枯陛下聖澤以臣嘗在近宻識其状貌復其眼目留心曲慮特加偏覆䘮車復還白骨更肉披棺發槨起見白日天地父母能生臣俊不能使臣俊當死復生陛下徳過天地恩重父母誠非臣㑓破碎骸骨舉宗腐爛所報萬一臣㑓徒也不得上書不勝去死就生踴躍冒拜章上世皆哀其文魏畧曰人得崔琰書以裹幘籠持其籠行都道中時有與琰宿不平者遥見琰名著幘籠從而視之遂白太祖以為琰腹誹心謗乃收付獄髠刑輸徒前所白琰者又白云琰為徒虬鬚直視心似不平太祖亦以為然遂殺之又曰王凌字彦雲太原人凌為長遇事髠刑五年當道掃除時太祖車過問此何徒左右以状對太祖曰此所坐亦公耳於是選為驍騎主簿三國典畧曰太原公洋之赴晉陽也陽休之勸崔季舒從曰一日不期其間容刀季舒性好聲色心在閒放遂不請行欲恣其滛樂司馬子如等縁宿憾乃奏暹及季舒過状各鞭二百徒於馬城晝則供役夜置地牢璅語曰晉冶氏女徒病棄之舞囂之馬僮飲馬而見之病徒曰吾良夢焉僮曰汝奚夢乎曰吾夢乗馬如河汾三馬前導僮告舞囂囂徃視之告其家曰尚可活吾買女答曰既棄之矣猶未死乎舞囂曰未遂買之至舞囂氏而疾有間而生荀林父神異記又載之鍾離意别傳曰司徒侯霸辟意署議曺掾以詔書送徒三百餘人到河内連隂冬盛寒徒皆貫連械不復走及到𢎞農縣使令出錢為徒作襦袴各有升數令對曰被詔書不敢妄出錢意曰使者奉詔命寕私行耶岀錢便令上尚書使者亦當上之光武皇帝得上状見司徒侯霸曰所使吏何乃仁恕用心乎誠良吏也襦袴成且悉到前縣給賜糜粥後謂徒曰使者不忍善人妄刑飢寒感惻於心今以得衣矣欲悉觧善人械桎得無逃去耶皆曰明使君哀徒恩過慈父身成灰土不敢逃亡意復曰徒中無欲歸候親者耶其有節義名者大半意為觧械桎先遣之與期日㑹作所徒皆先期至也劉鎮京口記曰有龍耳湖秦始皇東㳺觀地勢曰有天子氣使赭衣徒三千人鑿此中間地脈使斷因改名為丹徒風俗通曰徒不上墓説新遭刑罪原觧者不可以上墓祠祀謹案孝經身體髪膚受之父母曾子病困啟手足以歸全也遭刑者髠首剔髪身被枷笞薰染狴犴臭穢不㓗凡祭祀者孝子致齋貴馨香如親存也時見子被刑心有惻愴縁生事死恐明不歆承當不上墓耳郭子曰劉道真嘗為徒扶風王司馬駿以五疋布贖之既用為從事中郎當時以為美談孔融肉刑論曰今之洛陽道橋作徒囚於服役十死一生故國家嘗遣三府請詔月一案行又置南甄官使者主養病徒僅能存之語所謂洛陽豪徒韓伯宻加笞三百不中一髠頭至耳髪至膝此種刑法非國家之意徒作年數周禮秋官上大司冦曰以嘉石平罷民凡萬民之有罪過而未麗於法而害於州里者桎梏而坐諸嘉石役諸司空重罪旬有三日坐朞役其次九日坐九月役其次七日坐七月役其次五日坐五月役其下罪三日坐三月役使州里任之則宥而舎之又秋官上曰司圜掌收教罷民凡害人者弗使冠飾而加明刑焉任之以事而收教之能改者上罪三年而舎中罪二年而舎下罪一年而舍其不能改而出圜土者殺漢書曰罪人獄已决完為城旦舂滿三嵗為鬼薪白粲應劭曰鬼薪為宗廟取薪白粲擣米使正白鬼薪白粲一嵗為𨽻臣妾𨽻臣妾一嵗免為庶人晉律曰髠鉗五嵗刑笞二百若謂訛言詐偽將吏越武庫垣兵卒逃歸家兄弟捶人之屬並五嵗刑也四嵗刑若謂上闕陳書或上變事通貨賄選舉闗通發密事毆兄姊之屬並四嵗刑三嵗刑若傷人以及謗偽造官印不憂軍事戲殺人之屬並三嵗刑也二嵗刑二嵗刑減一等入罰金三嵗至五嵗刑皆減罪其越戍作穽走馬衆中有挾天文圖䜟之屬並為二嵗刑張斐律序曰徒加不過六囚加不過五罪已定為徒未定為囚不過十二嵗五嵗徒犯一等加六嵗犯六等加為十二嵗作累笞不過千二百五嵗徒加六等笞之千二百太平御覧卷六百四十二
