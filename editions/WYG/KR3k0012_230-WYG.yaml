front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_230-1a, image: WYG0895/WYG0895-0127c.png}
body:
  text: 太平御覽卷二百三十宋李昉等撰職官部二十八衛尉卿武庫令守宫令公車令宗正卿宗正少卿宗正丞太僕卿乗黄令廐令車府令衛尉卿六典曰衞卿之職掌邦國器械文物之事總武庫武器守宫三署之官屬少卿為之貳凡祭祀大朝㑹則供具羽儀節鉞金㦸帷帟茵蓆之屬漢書百官表曰衞尉秦官也掌宫門衞屯兵漢因之景帝初更名中大夫後元年改為衞尉東觀漢記曰光武二十三年太尉鮑顯兼衞尉永元三年司徒丁鴻兼衞尉後漢書曰銚音遥期字次况潁川人也拜衞尉卿期重於信義憂國愛主其有不得於心必犯顔諫諍續漢書曰隂興為衞尉每諸將出征伐身行勞問無所愛惜又曰馬光字叔山為衞尉卿上以光謹勅小心周密畏慎特親異之又曰竇固字孟孫為衞尉卿兩宫宿衞見重當時仁厚謙恭甚有名稱又曰趙憙字伯陽為衞尉盡心事上夙夜匪懈母没上疏乞守服不許遣使釋服又百官志曰衞尉卿秩中二千石掌官服衞士公車令百官衞士左右都虞候宫掖門司馬皆屬魏志曰辛毗為衞尉清平與徐邈胡質皆以憂國忘私不營産業賜穀二千斛錢三十萬布告天下又曰田預為并州刺史為衞尉屢乞遜位司馬宣王以預克壯書諭未聽預書答年過七十而以居位譬猶鐘鳴漏盡夜行不休是罪人也遂因稱疾又曰辛毗字佐治為衞尉卿帝方修殿舎毗諫曰詩云民亦勞止汔可小康吳志曰嚴畯為孫權從事及稱尊號畯常為衞尉禄賜皆散之親戚知故家常不充晉書曰石崇拜衛尉與潘岳諂事賈謐與之親善號二十四友廣成君每出崇降車路左望塵而拜其佞如此宋書曰南郡王義宣子恢為侍中領衞尉晉代過江不置衞尉世祖欲重城禁故復置衞尉自恢始也唐書官品志曰衞尉卿位視侍中掌宫門屯卿每月丞每旬行宫徼糺察不法統武庫令公車司馬令漢官解詁曰衞尉主宫闕之内衞士於垣下為廬各有員部凡居宫中者皆施籍於門按其姓名有醫巫僦人當入者本官長吏為封啓傳審其印信然後内之又有籍皆復有符用木二寸以所長官兩字為䥫印分符當出入者按籍畢復齒符乃引内之也其有官位得出入者令執御者每傳呼前後以相通從昏至晨分部行夜有夜行者輒前曰誰誰若此不懈終歲更始所以重慎宿衞也漢書舊儀曰衞尉寺在宫内胡廣云宫闕之内衞士於周垣下為廬者若今之伏宿屋矣武庫令六典曰武庫令掌藏邦國之兵仗器械辨其名數國用丞為之貳漢書百官表曰執金吾屬官有武庫令又曰杜欽為大將軍武庫令職閑無事欽所好也又曰武庫令一人昔武王伐紂散牛放馬倒載干戈韜以虎皮而藏諸武庫武庫之職由來尚矣續漢書曰武庫令一人秩六百石主兵器晉書曰樂廣欲會荆楊士人武庫令黄慶進陶侃於廣人或非之慶曰此子終當逺到復何疑也守宫令六典曰守宫令掌邦國供帳之屬辨其名物㑹其出入凡大祭祀大朝㑹及廵幸則設王公百官位於正殿南門外續漢書曰少府屬官有守宮令丞主御紙筆墨及財物諸用并封書泥之事魏志曰苟彧字文若年少時南陽何顒異之曰王佐才也舉孝亷拜守宮令董巴漢中官傳曰守宮禁内署令秩千石在省内用中人省外士人齊職儀曰守宮周掌舎之職王行為帷宮即其任也公車令漢書曰張釋之為公車令續漢書曰公車司馬令掌宮南門凡吏民尚書四方貢獻及徵詣公車者皆掌之又曰周垂字子居拜侍御史公車司馬令不畏强禦以是見怨於幸臣應劭漢官儀曰公車司馬令周官也秩六百石冠一梁掌殿司馬門徼夜宮天下上事及闕下凡所徵召皆摠領之李邵以公車司馬令為將宗正卿六典曰宗正卿之職掌九族六親之屬籍以别昭穆之序并領崇𤣥署少卿為之貳漢書曰宗正秦官也應劭曰周成王時彤伯入為正掌親屬又曰劉德字路叔修黄老術有智略少時數言時事召見甘泉宮武帝謂之千里駒昭帝初為宗正丞後為宗正卿德妻死大將軍欲以女妻之不敢取畏盛滿也又曰劉向字子政元帝時蕭望之周堪薦向宗室忠直明經有行為宗正東觀漢記曰劉般字伯興遷宗正在朝廷竭忠盡節勤身憂國夙夜不怠數納嘉謀州郡便宜所在以聞受職修治振施宗族又曰劉平字公子以仁孝著聞永平三年為宗正卿後漢書曰劉軫字君文梁孝王𦙍為宗正率官遂代掌宗正焉續漢書曰宗正卿一人秩二千石掌序録王國嫡庶之次及諸宗室親屬逺近郡國歲計上宗室名籍晉起居注曰咸寜元年以太中大夫王覽為宗正卿又曰太始二年以侍中中書監朱整為宗正卿後魏書曰杜銓初密太后父豹䘮在濮陽世祖欲命迎葬於鄴謂司徒崔浩曰天下謂杜何處望髙浩對京兆為美世祖曰朕今方改葬外祖意欲取京兆杜中長老一人以為宗正營護凶事浩曰中書博士杜銓其家今在趙郡是杜預之後於今為諸杜最即命詔之及見銓器貌儇雅世祖感悦謂浩曰此真吾所欲也唐書官品志曰宗正卿位視列曹尚書主皇室外戚之籍以宗室為之石氏星經曰宗正二星在帝座東南山公啓事曰羊祜忠篤寛厚然不長理劇宗正卿缺不審可轉作否宗正少卿魏職令曰宗正卿第四品上第二清用懿清和職恭教典者先盡皇宗無則用庶姓宗正丞六典曰宗正丞掌判寺事太僕卿六典曰太僕卿掌邦國廐牧車輿之政令總椉黄典廐典牧章府四署及諸監牧之官屬少卿為之貳凡國有大禮及大駕行幸則供其五輅屬車之屬尚書冏命曰昔在文武聰明齊聖小大之臣咸懷忠良子命汝作大正正於羣僕侍御之臣周禮曰太僕掌正王之服位出入王之大命掌諸侯之復逆王眡朝前正位而退入亦如之建路鼓於大寢之門外而掌其政以待達窮者與遽令聞鼓聲則達逆御僕與御庻子祭祀賔客䘮紀正王之服位詔法儀賛王牲事王出入則自左馭而前驅漢書曰夏侯嬰自上初起沛常為太僕竟髙祖世以太僕事惠帝惠帝崩以太僕事髙后代王之來嬰與東牟侯入清宮以天子駕迎代王共立文帝復為太僕又曰百官表曰太僕掌輿馬屬官有大廐未央廐象馬三令又車府路軨音靈騎馬駿馬四令又龍馬閑駒槖泉騊駼承華五監長丞又邉郡六牧師苑令各三丞又邉牧槖昆蹄令丞皆屬焉東觀漢記曰祭側界切彤膂力過人常貫三百斤弓馬為太僕從帝過孔子講堂帝指子路室曰太僕吾之禦侮也後漢書曰徵祭彤為太僕彤在遼東幾三十年衣無兼副顯宗既嘉其功又美彤清約拜日賜錢一百萬馬三匹衣被刀劔下至居屋什物大小無不悉備續漢書曰趙岐字臺卿獻帝以為太僕持節安慰天下又百官志曰太僕秩中二千石掌車馬天子出奉駕則馭魏志曰國淵字子尼遷太僕居列卿位布衣疏食禄賜散之舊故宗族以恭儉自守又曰潘尼字正叔侍中為太僕造乗輿箴漢舊儀曰太僕牧師苑三十六所分布北邉以郎為苑監官奴婢三萬人分養三十萬頭擇取給六廐牛羊無數以給牲犧漢雜事曰石慶為太僕御出上問車中幾馬慶以䇿數馬畢舉手曰六馬慶於兄弟最為簡易而猶如此又曰公孫賀以太僕為丞相子敬聲代為太僕晉諸公賛曰郭展為太僕留心於養生是以廐馬充牣其後征吳得以濟事唐書官品志曰太僕卿位視黄門侍郎統馬牧左右牧龍廐内外廐丞乗黄令六典曰乗黄令掌天子車輅辨其名數與馴馭之法丞為之貳宋書曰乗黄令晉官也主乗輿金根車及安車追鋒諸衆車馬齊職儀曰乗黄獸名也龍翼馬身黄帝乗之而仙後人以名廐廐令六典曰典廐令掌繫飼馬牛給養雜畜之事丞為之貳漢書曰太僕屬官有大廐未央廐象馬三令各五丞一尉又車府輅軨騎馬駿馬四令丞晉灼曰漢侯注大廐名也主馬萬疋也又龍馬閑車槖泉如淳曰廐在槖泉宫下騊駼承華五監長丞牧槖昆蹄令丞應劭曰槖駞昆蹄好馬名也如淳曰因以名廐也武帝太初元年更名象馬為挏馬應劭曰主乳馬取其汁挏治之味酢可飲因以名官也挏動也又曰蘇武為栘中監栘中廐名音移又曰上官桀遷未央廐令上體不安及愈見馬瘦上怒曰汝以我不復見馬邪桀曰聖體不安日夜憂懼意誠不在馬言未卒泣數行上以為忠齊職儀曰諸廐有圉師牧人養馬之官校人掌王之馬正也車府令六典曰車府令掌王公已下車輅辨其名數及馴馭之法丞為之貳史記曰趙髙為車府令漢書百官表曰太僕屬官有車府令一人六百石丞一人東觀漢記曰永平中車駕出信陽侯隂就干突車騎鹵簿車府令齊國徐匡乃就車收御者送獄詔書譴匡匡自繫不出吳良上書言信陽侯驕慢干突車騎為大不敬匡執法守正而下獄臣恐陛下聖化由是隳矣於是詔出匡猶左遷良為即丘長齊職儀曰車府署周有巾車典路之職辨五輅之制太平御覽卷二百三十
