body:
  text: 太平御覽卷二百二十二宋李昉等撰職官部二十中書舎人起居郎起居舍人中書舎人六典曰中書舎人掌侍奉進奏叅議表章凡詔㫖制勅及璽書冊命皆按典故起章草進畫既下則署而行之其禁有四一曰漏􅂥二曰稽緩三曰違失四曰忘誤所以重王命也制勅既行有誤則奏而正之通典曰自永淳以來天下文章道盛臺閣髦彦無不以文章達故中書舎人爲文士之極任朝廷之盛選諸官莫比焉晉中興書曰劉起遷中書舎人時臺省初建内外多事岀内書命以忠慎稱加以治身清苦衣不重帛每上所賜皆固辭曰凡陋小臣横竊賞賜無德而禄殃咎必至上益嘉焉又曰徐邈字仙民東莞姑幕人也少好學問尤善經傳時烈宗始覽典籍招延禮學之士謝安舉邈補中書舎人在西省選正五經音訓學者宗之每預顧問輙有獻替多所補益烈宗甚愛之齊書曰永明元年熒惑入紫㣲時中書通事舎人四人各住一省謂之四戸旣總重權勢傾天下㑹𤣥象失度太史奏宜脩福禳之太尉王儉謂帝曰天文乖忤此由四戸乃具舎人王文明等名奏之又曰明帝踐阼引傅昭爲中書舎人時居此職者皆權傾天下昭獨亷靜無所干預器服率略身安麤糲常挿燭板牀明帝聞之賜漆合燭槃勅曰卿有古人之風故賜卿古人之物又曰茹法亮乆爲中書通事舎人後出爲大司農中書勢利之職法亮戀之垂涕而去梁書曰裴子野以中書侍郎鴻臚常兼中書通事舎人别勅知詔誥南史曰顧恊爲舎人同官者皆潤屋恊在省十六載器服食飲不改於常有門生始來事恊知其亷㓗不敢厚餉止送錢二千恊發怒杖二十因此事者絶於饋遺北齊書曰荀士遜世祖時爲中書舎人狀貌甚醜以文辭見用曾有事湏奏值世祖在後庭因左右傳通者不得士遜姓名乃云醜舎人世祖曰必士遜也看封題果是内人莫不懽咲又曰顔之推天保末從顯祖至天池以爲中書舎人令中書郎叚孝信將勅書岀示之推之推營外飲酒孝信還以狀言顯祖仍曰且停由是遂寢北史曰魏收兼中書舎人與温子昇邢子才齊譽世號三才隋書曰虞世基拜内史舎人煬帝即位顧遇彌隆秘書監河東栁顧言博學有才罕所推謝至是與世基相見嘆曰海内當共推此一人非吾儕所及也唐書曰貞觀中中書舎人高季輔上封章曰時已平矣功已成矣然而刑典未措者何哉良由謀猷之臣不𢎞簡易之政臺閣之吏昧於經遠之道執憲者以深刻爲奉公當官者以侵下爲益國未有坦平恕之懷副聖明之旨伏願隨方訓諭使各揚其職人敦朴素俗革澆浮家識孝慈人知亷恥杜其利欲之心載以清淳之化自然家富國肥禍亂何由而作太宗善之特賜鍾乳一劑曰卿進藥石之言故以藥石報之也又曰顔師古遷中書舎人專掌機密於時軍國多務凡有制誥皆成其手師古達於政理冊奏之工時無及者又曰武后天授元年壽春郡王成器兄弟五人初岀閣同日受冊有司撰儀注忘載冊文及百寮在列方知闕禮宰臣相顧失色中書舎人王劇立召小史五人各令執筆口授分冩同時須臾俱畢詞理典贍時人歎伏又曰景龍四年初定内難唯中書舎人蘇頲在太極殿後文詔填委動以萬計手操口對無毫釐差誤主書韓禮談子陽轉書詔草屢謂頲曰乞公稍遲禮等書不及恐手腕將廢又曰楊炎爲中書舎人與常衮並掌綸誥衮長於制書炎善爲德音開元已來言詔制之美者號常楊焉又曰王徽曾祖擇從擇從兄易從天后朝登進士第從弟朋從言從睿宗朝並以進士擢第昆仲四人開元中三至鳯閣舎人故時人號鳯閣王家又曰齊澣開元中遷中書舎人論駮書詔潤色王言皆以古儀謨誥爲凖的侍中宋璟中書侍郎蘇頲並重之又曰薛元超道衡孫也爲中書舎人中書省有一盤石初道衡爲内史侍郎嘗踞而草制元超毎見此石未嘗不泫然流涕又曰賈曾授中書舎人曾以父名忠固辭乃拜諫議大夫知制誥至開元初復拜中書舎人又固辭議者以爲中書是曹司名又與曾父音同字别於禮無嫌乃就職與蘇晉同掌制誥皆以詞學見知時人稱爲蘇賈又曰許景先轉中書舎人中書令張説常稱曰許舎人之文雖無峻峯激流嶃絶之勢然屬詞豐美得中和之氣實一時之秀也又曰㕁高卿爲中書舎人處事不囘爲宰相元載所忌魚朝恩署牙將李琮爲兩街功德使琮暴横於銀臺門毁辱京兆尹崔昭高卿立詣元載抗論以爲國恥請速論奏載不從高卿遂以疾辭以前中書舎人居東洛凡十年自號伊川田父清名高節稱於天下又曰建中三年詔中書舎人分署尚書六曹復舊制也又曰高郢掌誥累年家無制草或謂曰人皆畱制集公焚之何也曰王言不可存私家時人重其慎密又穆宗詔曰中書舎人故事分押六司佐宰臣判按廢革日乆頓復稍難宜漸令條舉有湏慎重者便令叅議如關機密者即且如舊又曰路隨敬宗初登極拜中書舎人翰林學士仍錫金紫有以金帛謝除制者必叱而却之曰吾以公事接私財耶終無所納又曰太和四年勅前行郎中知制誥者約滿一周年即與正授從諫議大夫知者亦宜准此又曰封敖爲學士拜中書舎人敖搆思敏速語近而理勝不務竒澁武帝深重之嘗草賜陣傷邉將詔警句云傷居爾體痛在朕躬帝覽而善之賜之宫錦又曰崔郾轉中書舎人入思政殿謝恩郾奏曰陛下用臣爲侍講卒歲有餘未嘗問臣經義今蒙轉改日慙尸素有愧厚恩帝曰俟朕機務稍閒即當請益高鈛曰陛下意雖樂善既未延接儒生天下之人寧知重道帝深引咎錫之錦綵又曰中書舎人鄭居中少有時名揚厯清貫晩年尤薄名利以疾辭官恣遊名山一日搦管爲詩纔書五字曰雲山遊已徧紙猶在手筆忽墮地而終又曰晉初中書置舎人通事各一人東晉合爲一職晉代入直閣内宣詔命而侍郎之任輕矣梁秩四百石品第八梁用人殊重簡以才能不限資地多以它官兼令其後除通事直曰中書舎人五代史後唐書曰明宗時劉賛爲中書舎人與學士竇夢徴同年登科隣居友善夢徴早卒賛與同年楊凝式緦麻爲位而哭其家無嫡長與視䘮卹孀稚士人稱之五代史晉史曰陳乂長興中自舎人啣命冊公主於太原公主即帝后也帝深待之但訝其高岸人或有獻可於乂宜陳一謳頌以稱帝之美可邀其異待耳乂曰人生貧富咸有定分未有持天子命違禮以求利旣損國綱且虧士行乂今生所不爲也聞者無不嘉之又曰天福五年九月詔曰六典云中書舎人掌侍奉進奏叅議表章凡詔㫖制勅璽書䇿命皆按故事起草進畫既下則署而行之其禁有四一曰漏洩二曰稽緩三曰違失四曰忘誤所以重王命也古昔已來典實斯在爰從近代别創新名今運屬興王事從師古俾仍舊貫以輝前規其翰林學士院公事宜並歸中書舎人五代史漢史曰唐李昭以尚書郎出爲蘇州刺史朞歲以中書舎人召還不拜謂宰輔曰省郎拜舎人以知制誥爲次序使由刺史玷綸闈非敢聞命乃以兵部郎中知制誥翌歲拜舎人受之五代史周史曰王延爲中書舎人權知貢舉有崔頎者恊之子也授偃師簿薄其卑屑棄去數年應進士延將入貢院見舊相吏部尚書盧文紀素與恊不睦謂延曰舎人以謹重聞於時所以老夫去冬與諸相首以長者聞奏然此一途取事者頗多面目説者云越人善泅生子方晬乳母浮之水上或駭然止之乳母曰其父善泅子必無溺今若以名下取士徴泅之類也舎人當求實才以副公望延退而􅅓曰盧公之言爲崔頎也縱與其父不悦致意何至此耶來春以頎登甲科其仁而狥公皆此類也百官志曰魏初中書置通事一人主呈奏晉初中書又置舎人一人至東晉合通事及舎人二職謂之通事舎人猶掌呈奏陶氏職官要録曰中書舎人舊視給事中梁選簿云梁天監用人務簡英才不限資次又曰隋内史舎人八員專掌詔誥煬帝减四人後改爲内史舎人荀朂集曰晉武帝時門下啓令史伊羨趙咸爲中書舎人對掌文法朂奏以爲不可起居郎六典曰起居郎掌記天子之法度以修記事之史凡記事之制以事繫日以日繫月以月繫時以時繫年必書其朔日甲乙以紀厯數典禮文物以考制度遷拜旌賞以勸善誅伐黜免以懲惡季冬則授之於國史焉唐書曰太和九年十二月左右省起居郎賫筆硯及紙於螭頭下記言記事又曰鄭朗開成中爲起居郎初太和末風俗稍奢文宗恭勤節儉兾革其風宰臣等言曰陛下躬儉節用風俗已移長􅅂大袂漸以减損若更令戚屬絶其侈靡不慮下不從教帝曰此事亦難戸曉但去其太甚自以儉德化之朕聞前時内庫唯二錦袍飾以金烏一袍𤣥宗幸温湯時御之一與貴妃當時貴重如此今奢靡豈復貴之耶今富人往往皆有左街副使張元昌便用金唾壺昨因李訓已誅之矣時朗執筆螭頭下宰臣退上謂朗曰適所議論卿記録未吾試觀之朗對曰臣執筆所記便名爲史伏准故事帝王不可取觀昔太宗欲覽國史諫議大夫朱子奢云史官所述不隱善惡或主非上智飾非䕶失見之則致怨所以義不可觀又褚遂良曰今之起居郎古之左右史也記人君言行善惡必書庶幾不爲非法不聞帝王躬自觀史帝曰適來所記無可否臧見亦何爽乃宣謂宰臣曰鄭朗引故事不欲朕見起居注史夫人君之言善惡必書朕恐有平常閒話不關禮體垂諸将來竊以爲恥異日臨朝庶幾稍改何妨一見以成醜言朗遂進之又曰開成二年十二月閣門對左右史裴素等上自開成初復故事每入閣左右史執筆立於螭頭之下君臣論奏得以略書故開成政事最詳於代起居舎人六典曰起居舎人掌脩記言之史録天子之制詔德音如記事之制以紀時政之損益季冬則授之於國史唐書曰邢文偉滁州全椒人時右史官缺高宗謂侍臣曰邢文偉事我兒能减膳切諫此正直人也遂擢拜右史又曰李讓夷字達心爲諫議大夫開成元年以本官兼知起居舎人事時起居舎人李讓有痼疾請罷官宰臣李石奏闕官上曰褚遂良爲諫議大夫嘗兼此官卿可盡言今諫議大夫姓名石遂奏李讓夷馮定孫簡俶帝曰讓夷可也李固言欲用崔球張次宗鄭覃曰崔球遊宗閔之門赤墀下秉筆記注爲千古法不可用明黨如裴中孺李讓夷臣不敢有纎芥異論其爲人主大臣知重如此又曰魏謩轉起居舎人紫宸中謝帝謂之曰以卿論事忠切有文貞之風故不循月限授卿此官又謂之曰卿家何舊書詔對曰比多失墜唯簪笏見在上令進來鄭覃曰在人不在笏上曰鄭覃不㑹我意此即甘棠之義非在笏而已又曰魏謩文宗時爲起居舎人紫宸入閤遣中使取謩起居注欲視之謩執奏曰自古置史官書事以明鑒誡陛下但爲善事勿畏臣不書如陛下所行錯忤臣縱不書天下人書之臣以陛下爲文皇帝比臣如褚遂良帝又曰我嘗取觀之謩曰由史臣不守職分豈敢䧟陛下爲非法陛下已覽之後自此書事湏有逥避如此善惡不直非史也遺後代何以取信乃止又曰張次宗有文學稽古厲行開成中爲起居舎人文宗復故事毎入閣左右史執筆立於螭頭之下宰相奏事得以備録宰臣既退上召左右史更質証所奏是非故開成政事詳於史氏太平御覽卷二百二十二
