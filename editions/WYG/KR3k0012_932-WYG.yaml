front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_932-1a, image: WYG0901/WYG0901-0289a.png}
body:
  text: 太平御覽卷九百三十二宋李昉等撰鱗介部四鼈黿鼉吊鼈易說卦曰離為鼈爾雅曰鼈三足曰能周書曰成王時長沙獻鼈周禮天官鼈人曰鼈人掌取亙物以時簎魚鼈龜蜃鄭司農元簎謂以杖刺泥中摶取之禮記曲禮上曰水潦降不獻魚鼈又樂記曰土敝則草木長水煩則魚鼈不大魏畧舊志曰昔東方有髙麗之國者其王侍婢有身王欲殺之婢云有氣如鷄子來下我故娠後生子王捐之於溷中猪以氣噓之徙馬欄馬以氣噓之王疑之乃命其母収畜之名曰東明常令牧馬東明善射王恐奪其國欲殺之東明走南至淹水以弓擊水魚鼈浮為橋東明得渡而魚鼈解散追兵不得渡東明因都王夫餘之地後魏書曰夫餘之君以朱蒙善射欲殺之朱䝉母以告朱蒙與烏連二棄之夫餘東南走遇一大水欲濟無梁蒙告水曰我是日子河伯外孫今逃追兵垂及如何於是魚鼈並浮為成橋朱䝉得渡追騎不得渡蒙至絶升骨城遂居焉隋書曰崔宏度每誡其寮吏曰人當誠恕無得欺誑皆曰諾後嘗食鼈侍者八九人宏度一一問之曰鼈美乎人懼之皆云鼈美宏度於是大罵傭奴何敢誑我汝初未食鼈安知其美俱杖之八十官屬百工見之莫不流汗無敢欺隠孫卿子曰跬步不休跛鼈千里莊子曰塪井之蛙謂東海鼈曰吾跳梁井幹之上入沐缺甃之岸樂亦至矣子奚不時來入觀乎海鼈左足未入而右膝已墊矣於是逡廵而却告之曰夫海千里之逺不足舉其大千仞之髙不足極其深禹時九年十潦而水不為加益湯時八年七旱而岸不加損夫不為須臾推移不以多少進退者此亦東海之大樂也於是蛙聞之適適然驚規然自失韓子曰鄭縣人乙之妻之市買鼈以歸過潁水以為渴因縱而飲之遂失鼈淮南子曰鼈無耳而目不可以瞥精於明也又曰王子慶忌足躡麋鹿手縛虎兕置之冥室之中不能摶龜鼈勢不便也又曰大生小多生少天之道也故立阜不能生雲雨縈水不能生魚鼈者小也又曰殺戎馬而求狐貍受兩鼈而失靈龜斷右臂而争一手折鏌鎁而争雞刀用智如此豈足高乎又曰忠信形於内感動應於外故禹執干戚儛兩階之間而三苗服三苗畔禹土修以禮樂而服也鷹翔川魚鼈沉禹以徳下三苗猶鷹翔川上魚鼈恐皆沉飛鳥揚鳥見鷹而揚去必逺實也說苑曰曽子有疾曽元抱首曽華抱足曽子曰吾無顔氏之才何以告汝雖無能君子務益夫華多實少者天也多行少言者人也夫飛鳥以山為卑而層巣其巔魚鼈以淵為淺而穿穴其中然所以得者餌君子苟能無以利害身辱安從至乎國語曰公父文伯飲南宫敬叔酒以露賭父為客賭父單大夫客上客也羞鼈焉小賭父怒相延食鼈辭曰將使鼈長而後食之遂出文伯之母聞之怒曰吾聞之先子曰祭養尸嚮養上賔言祭祀之禮尊養尸間宴之禮養上賔鼈於何有而使夫人怒也遂杖之五百吕氏春秋曰水之深則魚鼈歸之樹之盛則飛鳥歸之庶草美則禽獸歸之人主賢則豪傑歸之晏子春秋曰齊大旱景公召羣臣問曰寡人欲祀河伯可乎晏子曰不可河伯以水為國以魚鼈為民彼獨不欲雨乎祝之何益山海經曰從山多三足鼈顧譚新語曰呉之翫水若魚鼈蜀之便山若禽獸神仙傳曰汝南郡中常有鬼怪來輒數船過時𨗳從威儀如太守入府打鼔周行内外乃還去甚以為患后費長房詣府君而正值此鬼來到府君門常徑入獨此來至門而已不敢前欲去長房厲聲呼便促前來鬼化作老公乃下車把板伏庭中叩頭乞得自改長房曰汝死老鬼不念良善無故𨗳從盪􅊳官府知當死不復汝真形此鬼須臾即成大鼈如車輪頸長一文許長房復令還就人形以一札符付之令送與葛陂君鬼叩頭流涕持一札符去使人追視之至陂以頸繞札而死王子年拾遺記曰容山下有水多鼈魚皆能飛躍星經曰天鼈十三星在南斗主水蟲南越志曰海中有朱鼈狀如肺有眼六足而常吐珠見則天下大旱崔豹古今注曰鼈一名河伯從事博物志曰九竅者胎化八竅者卵生龜鼈黿此諸類皆卵生而影伏又曰大腰無雄龜鼉類也無雄與虵通氣則孕又曰鼈剉令如棊𢷬赤莧汁和合厚以毛苞五六月中作投於池澤中經旬臠匕成鼈志怪志昔有人與奴俱得心腹病治不能愈奴死乃刳腹視之得一白鼈赤眼甚鮮净以諸藥内鼈口中終不死后有人乗白馬者乗馬溺濺鼈縮首藏足乃試取馬溺灌之豁然稍成水病者預飲一升即愈淮南萬異術曰青泥殺鼈得莧復生黿禮記月令曰季秋登龜取黿左傳宣上曰楚人獻黿於鄭靈公公子宋食指動謂子家曰他日如此必嘗異味及入宰夫將解黿相視而笑公問之子家以告及食大夫召公子宋弗與也公子怒染指於鼎嘗之而出廣雅曰海黿大一畆重千鈞續漢書曰靈帝時江夏黄氏之母浴而化為黿入於深淵其後時時出見初浴時簪與銀釵及見猶在其首唐史曰韋丹少在東洛常在中橋見數百人喧集水濵乃漁者網得大黿繫之橋柱引頸四顧有求救之意丹問曰幾錢可贖曰五千丹曰吾驢直三千可乎曰可於是與之放黿於水徒歩而歸淮南子曰桀之力則觡伸釣骨洛也索䥫操金權移大戲大戲軍之大旗水殺黿鼉陸捕熊羆又曰積力之所舉則無不勝也衆志之所為則無不成也陷井之所無黿鼉隘也園中之無脩小也又曰高山險阻深林藂薄虎豹之所樂也人入之而畏川谷通源積水重淵黿鼉之所便也人入之而死魏子曰夫樹樹異風人人異心不可以一檢量故黿鼉得水則生虎豹得水則死晏子春秋曰齊三子争桃古冶子曰吾嘗濟河黿銜左􅆖而入砥柱冶潛行逆流百歩從流九里得黿頭踴躍而出若冶之功可以食桃抱朴子曰在頭水有大黿常在深潭號為黿潭此能作魅行病有道士戴炳者能視見之以越張封泥遍擲潭中良久有大黿徑長丈餘浮出不敢動乃格殺之而病者並愈又有小黿出羅列死於渚上甚多竹書紀年曰穆王三十七年起師至九江以黿為梁也璅語曰范獻子獵占之曰此係繇也君子得黿小人遺冠獻子獵而不得遺其豹冠列仙傳曰廬山頂上有湖湖廣數頃黿鼉盈於水中博物志曰屠黿解其肌肉唯腹連於頭而經日不死猶能齧物鳥往食之則為所得漁者或以張鳥雀崔豹古今注曰黿為河伯使者捜神記曰齊景公渡於江沅之河黿銜左􅆖沒之衆皆惕懼古冶子於是㧞劒從邪行五里逆三里至於砥柱之下乃黿也左手持黿頭右手挾左􅆖燕躍鵠踴而出仰天大呼水逆流三百步觀者皆以為河伯也淮南萬畢術曰黿暗得火可以燃鐵若燒黿致鼈取黿燒之鼈自至楚辭曰乗白黿兮逐漁宋玉高堂賦曰黿鼉鱣鮪交積縱横鼉毛詩文王靈臺曰鼉鼓逢逢禮記月令曰季秋之月伐蛟取鼉說文曰鼉水蟲似蜥蝎長一二丈背毛皆有鱗甲如鎧汲家周書王㑹曰㑹稽以鼉吳志曰孫亮初公安有白鼉鳴謡曰白鼉鳴龜背平南都城中可求生守死不去來無成明年諸葛恪敗弟融鎮公安被收融剖金印龜背一服而死莊子曰孔子觀於吕梁懸水三十仞流沫三十里黿鼉不得游見一丈夫游之數百步而出孔子請問曰有道乎丈夫曰吾長於性成乎命從水之道而無私焉吕氏春秋曰帝顓頊令飛龍作八風之音以祭上帝乃㑹為樂倡鼉乃偃寝以其尾擊腹志其美也捜神記曰榮陽張福船行夜有女子乗小舟來投福云日暮畏虎不敢夜行福戲調之遂就福寢中夜月照乃見一白鼉枕福臂而卧福驚起鼉便去所乗之船乃枯槎郭義恭廣志曰鼉長三尺有四高尺餘美似蝘蜓南方嫁娶必得食之魏武赤壁還所掘得之是也支僧載外國事曰私可條國全道遼山有毗呵羅寺寺中有石鼉至有神靈衆僧餘食欲盡寺奴輒向石鼉作禮於是食具許氏志怪曰沙門竺僧瑤得神符尤能治邪廣陵王家女病邪召瑶治之瑤入門便瞋目大罵老魅不守道敢於犯人女在内大喚云人殺我夫鬼在側曰吾命盡於今可為痛心因戯欷悲啼又曰此神也不可争傍人悉聞於是化為老鼉走出中庭瑤入撲殺之幽明錄曰宋高祖永初中張春為武昌太守時人有嫁女未及昇車忽便失性岀外敺撃人云已不樂嫁俗人巫云是邪魅乃將女至江際擊鼔以術祝治療春以為欺惑百姓勒其必獲妖魅後有一青蛇來到巫所即以大釘釘頭至日中復見大龜從江來伏前巫以朱書背作符更遣入水至暮有大白鼉從江中出乍沉乍浮向龜隨後催逼白鼉至先入幔内與女辭訣女因慟哭云失其姻好自此漸差或問巫曰魅者歸於何物巫云虵是傳通龜是媒人鼉是其對所獲三物悉示春春始知靈驗吊裴氏廣州記曰吊蛇頭鼉身亦水宿水棲俗謂為吊膏至輕利以銅瓦器貯之浸出而以鷄卵盛之不漏磨治諸毒腫絶驗也太平御覽卷九百三十二
