front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_990-1a, image: WYG0901/WYG0901-0666a.png}
body:
  text: 太平御覽卷九百九十宋李昉等撰藥部七附子天雄烏頭提母五味雷丸䔧蘆虎掌貫衆冶葛伏蒙白頭翁枸把白芨芎藭澤㵼升麻芍藥澤蘭萆薢狗脊附子廣雅曰爑奚毒附子也一嵗為萴子二嵗為烏喙三嵗為附子四嵗為烏頭五嵗為天雄春秋後語曰蘇秦如齊見王拜而慶仰而弔齊王曰是何慶弔相隨而速速也蘇秦曰臣聞飢人之所以不食烏喙者以為雖偷充腹而與死人同患也烏喙毒藥與烏頭附子同本也飢人食之雖充腹而死也喙音許嵗切今燕雖弱小秦王之女婿大王利其十城而常與强秦為仇今使弱燕為雁行而强秦繼推其後是食烏喙之類也漢書曰宣帝許皇后産霍顯使醫𢷬附子入與后后崩淮南子曰天下之物莫凶於奚毒奚毒附子然而良醫槖而藏之有所用者抱朴子曰療聾或以狼毒冶葛或以附子葱涕合内耳或蒸鯉魚腦灌之皆愈范子計然曰附子出蜀武郡中白色者善楚國先賢傳曰孔休傷頰有瘢王莽曰玉屑白附子香消瘢乃以劍璏音滯并香與之荆州記曰宜都郡門生藥草有附子博物志曰物有同類而異用者烏頭天雄附子一物春夏秋冬采之各異大業拾遺記曰汾陽宮所出名藥數十種附子天雄並精好堪用本草經曰附子味辛温出山谷治風寒欬逆邪氣寒熱痺癖拘攣不起疼痛温中金瘡生平殆為百藥之長吳氏本草曰附子名莨神農辛岐伯雷公甘有毒李氏苦有毒大温或生廣漢八月採皮黒肌白天雄本草曰天雄味辛甘温有大毒主大風破積聚邪氣强筋骨輕身健行長陰氣强志令人武勇力作不倦一名白幕生少室山谷淮南子曰天雄雄雞志氣益天雄二枚納雄雞腹中搗生食之令人勇烏頭説文曰萴阻力切烏頭也爾雅曰芨居及切蓳草郭璞注曰即烏頭江東今呼為蓳漢書曰梁冀廹殺大家服烏頭丸而死後魏書曰匈奴秋收烏頭為毒藥以射禽獸范子計然曰烏頭出三輔中白者善崔寔四民月令曰三月可採烏頭本草經曰烏頭一名烏喙一名奚毒一名萴味辛温生川谷主治風中惡洗出汗除寒熱生朗陵吳氏本草曰烏頭一名莨一名千秋一名毒公一名果負一名耿子神農雷公桐君黄帝甘有毒正月始生葉厚莖方中空葉四面相當與蒿相似又曰烏喙神農雷公桐君黄帝有毒李氏小寒十月採形如烏頭有兩枝相合如烏之喙名曰烏喙也所畏惡使與烏頭同一名萴子一名莨神農岐伯有大毒李氏大寒八月採陰乾是附子角之大者畏惡與附子同提毋爾雅曰􅙛莐藩生山上葉如韭一曰蝭母􅙛徒南切莐音沈范子計然曰提母出三輔黄白者善吳氏本草白知母一名提母神農桐君無毒補不足益氣五味爾雅曰菋荎藸五味也蔓生子叢在莖頭菋音味荎直其切藸音除聖賢佳墓記曰孔子墓上五味樹抱朴子曰羨門子服五味十六年始降玉女能入水火本草經曰五味一名會及吳氏本草曰五味一名𤣥及典術曰五味者五行之精其子有五味淮南公羨門子服五味十六年入水不濡入火不燋日行萬里雷丸范子計然曰雷丸出漢中色白者善本草經曰雷公丸一名雷矢味苦寒生山谷吳氏本草曰雷丸一名雷實神農苦黄帝岐伯桐君甘有毒扁鵲甘無毒李氏大寒或生漢中八月採藜蘆廣雅曰藜藘葸䔜也本草經曰藜蘆一名慈蔥味辛寒生大山谷主治蠱生太山范子計然曰藜蘆出河東黄者善吳氏本草曰藜蘆一名䓗葵一名山䓗一名豐蘆一名憨䓗一名䓗苒神農雷公辛有毒黄帝有毒岐伯鹹有毒李氏大毒大寒扁鵲苦毒大寒葉根小相連二月採根虎掌本草經曰虎掌味苦温生山谷治心痛寒熱吳氏本草曰虎掌神農雷公無毒岐伯桐君辛有毒或生太山或宛句立秋九月採貫衆爾雅曰濼貫衆孫炎曰一名貫渠郭璞注曰葉員鋭莖毛黒布地生冬不死也廣雅曰貫節貫衆也本草經曰貫衆一名百頭一名貫渠一名虎卷一名萹苻味苦寒生山谷治腹中邪氣諸毒殺三蟲生𤣥山亦生宛句吳氏本草曰貫衆一名貫節一名貫中一名貫渠一名貫仲一名伯萍一名藥藻一名扁符一名狗脊神農岐伯苦有毒桐君扁鵲苦一經甘有毒黄帝鹹酸一苦無毒葉經黄兩兩相對莖黒毛聚生冬夏不老四月花八月實黒聚相連卷旁行生三月八月採根五月採葉冶葛周易參同契曰冶葛巴豆一兩入喉雖周文兆蓍孔子占卦扁鵲操鍼巫咸叩鼓安能蘇之唐書曰袁恕已與敬暉等累被貶黜流於環州尋州利用左右逼令飲冶葛汁數升不死因擊殺之恕已素服黄金故藥不發博物志曰野葛食之殺人家葛種之三年不収後旅生亦不可食又曰鉤吻草與荇菜相似南州異物志曰廣州俚賊若鄉里負其家債不還及時者子弟便取冶葛一名鉤吻數寸許到債家食鉤吻而死其家稱怨誣債家殺之債家慚懼以財物辭謝多數十倍死家便收尸去不以為恨述異記曰晉義熈中有劉遁者居江陵忽有鬼來遁宅上遁無竈以外鎗煮飯飯欲熟輒失之尋覔於籬下草中但得餘空鎗遁宻市冶葛煮以作麋鬼復竊之於屋北得鎗聞吐聲従此寂絶桓譚新論曰余與劉子駿言養性無益其兄子伯玉曰天生殺人藥必有生人藥也余曰鉤吻不與人相宜故食則死非為殺人生也譬若巴豆毒魚礬石賊鼠桂害獺杏核殺猪天非故為作也論衡曰萬物􅅤太陽者有毒在草為巴豆冶葛抱朴子曰中經曰鉤吻狼毒太隂之精氣主殺故入口令人死葛洪方曰鉤吻與食芹相似而生處無他草其莖有毛誤食之殺人本草經曰鉤吻一名野葛味辛温生山谷主治金瘡中惡風欬逆生氣外腫殺毒蠱疰吳氏本草曰秦鉤吻一名毒根一名野葛神農辛雷公有毒殺人生南越山或益州葉如葛赤莖大如箭方根黄或生會稽東冶正月採嶺表錄異曰野葛毒草也俗呼胡曼草誤食之則用羊血漿解之或説此草蔓生葉如蘭香光而厚其毒多著於葉中不得解半日輒死山羊食其苗則肥而大伏蒙吳氏本草曰伏蒙一名紫參一名衆戎一名音腹一名伏莬一名童膓神農黄帝苦李氏小寒生河西山谷或宛句商山圓聚生根黄赤有文皮黒中紫五月花紫赤實黒大如荳三月採根白頭翁本草經曰白頭翁一名野丈人一名胡王使者味苦温無毒生川谷治瘟瘧癭氣狂昜音羊生嵩山建康記曰建康出白頭翁范子計然曰野丈人出洛陽吳氏本草曰白頭翁一名野丈人一名柰何草神農扁鵲苦無毒生嵩山川谷治􅀈狂寒熱止痛枸把廣雅曰地節枸把抱朴子曰枸把或名地骨或名却老或名西王母杖或名仙人杖本草經曰枸把一名枸檵一名地骨一名地仙服之堅筋骨輕身耐老吳氏本草曰枸把一名苦把一名羊乳白芨本草經曰白芨一名甘根一名達芨草味苦辛治癰腫惡瘡敗疽生北山又出建康晉宮閣名曰華林白及三株建康記曰建康出白及吳氏本草曰白及一名臼恨神農黄帝辛李氏大寒雷公辛無毒莖葉如生薑梨蘆也十月華直上紫赤根白二月八月九月採生宛句芎藭春秋左傳曰宣公十二年楚子伐蕭還無社與司馬卯言號申叔展叔展曰有山鞠窮乎説文曰芎藭者香果也山海經注曰號山洞庭之山其草多芎藭范子計然曰芎藭生胡無桃山隂者善遊名山志曰横山諸山草多芎藭本草經曰芎藭辛温治中風入頭腦痛寒痺生武功吳氏本草曰芎藭一名香果神農黄帝岐伯雷公辛無毒扁鵲酸無毒李氏生温熟寒或生無桃山隂或斜谷西嶺或太山葉香細青黒文赤如藁本冬夏聚生五月葉赤七月實黒端兩葉三月採根有節如馬銜狀澤瀉典術曰食澤瀉身輕日行五百里走水上可遊無窮致玉女神仙升麻廣雅曰周升麻升麻也本草經曰升麻一名周升麻味甘辛生山谷治辟百毒殺百精殃鬼辟瘟疾瘴邪毒蠱久服不夭生益州華陽國志曰收麻縣出好升麻吳氏本草曰升麻神農甘芍藥山海經曰條谷之草多芍藥洞庭之上多芍藥毛詩溱洧曰唯士與女伊其相謔贈之以芍藥芍藥香草也詩經疏曰今芍藥草無香氣非是也未審今何草司馬相如賦云勺藥之和酣揚雄賦云酸酣之和芍藥之美藥七十食也廣雅曰攣夷芍藥晉宮閣名曰暉章殿前芍藥華六畦范子計然曰芍藥出三輔建康記曰建康出芍藥極精好本草經曰芍藥味苦辛生川谷主治邪氣腹痛除血痺破堅積寒熱瘕止痛吳氏本草曰一名甘積一名梨食一名鋋一名餘容一名白术神農苦桐君甘無毒岐伯鹹李氏小寒雷公酸二月三月生澤蘭廣雅曰虎蘭澤蘭也建康記曰建康出澤蘭本草經曰澤蘭一名虎蘭一名龍􅀥味㣲温無毒生地澤治乳婦衂血生汝南又生大澤旁吳氏本草曰澤蘭一名水香神農黄帝岐伯桐君酸無毒李氏温生下地水旁葉如蘭二月生香赤節四葉相值支節間三月三日採萆薢博物志曰菝蒲八切揳與萆薢相亂一名狗脊吳氏本草曰萆薢一名百枝狗脊廣雅曰菝挈狗脊也本草經曰狗脊一名百丈味苦平生川谷治腰背强開機緩急風痺寒濕膝痛利老人生常山建康記曰建康出狗脊吳氏本草曰狗脊一名狗青一名萆薢一名赤節一名强膂神農苦桐君黄帝岐伯雷公扁鵲甘無毒李氏温如萆薢節如竹有刺葉圓青赤根黄白亦如狗毛有刺岐伯一經莖無節黄白如竹根有刺根葉端圓赤皮白有赤脈二月採太平御覽卷九百九十
