body:
  text: 太平御覽卷三百九十七宋李昉等撰人事部三十八叙夢吉夢上叙夢毛詩鷄鳴曰蟲飛薨薨甘與子同夢箋云䖝飛薨薨東方旦明之時我猶樂與君子而卧同夢言親愛之也又正月曰召彼故老訊之占夢箋云君臣在朝侮元老召之不問政事但問占夢而已不尚道徳而信徴祥也尚書泰誓曰朕夢叶朕卜襲于休祥戎商必克周禮春官下曰大卜掌三夢之法一曰致夢二曰觭夢三曰咸陟夢者人之精神所窹可占者也致夢信夢之所至也夏后氏作焉咸皆也陟之言得也周人作焉觭讀如諸戎椅之椅亦得也亦言夢所得殷人作焉又春官占夢曰掌其嵗時觀天地之㑹辨隂陽之氣以日月星辰占六夢之吉㓙一曰正夢無所感動平安自夢二曰噩夢謂驚愕而夢也三曰思夢覺之所思念之而夢四曰窹夢覺時道之而夢五曰喜夢喜悦而夢六曰懼夢恐懼而夢季冬聘王夢獻吉夢于王王拜受之聘問也夢者事之祥吉㓙之占在日月星辰季冬日窮于次月窮于紀星迴于天數將㡬終於是發幣而問焉若休慶之云爾因獻群臣之吉夢於王歸美焉左傳昭二曰鄭子産如晉晉侯有疾韓宣子逆客私焉曰寡君寢疾於今三月矣並走群望晉望祀山川走往祈禱有加而無瘳今夢黄熊入于寢門其何厲鬼也對曰以君之明子為大政其何厲之有昔尭殛鯀于羽山其神化為黄熊入于羽淵實為夏郊三代祀之晉為盟主其或者未之祀也韓子祀夏郊晉侯有間間差也又昭二曰楚子成章華之臺願與諸侯落之祭之為落臺今在華容城内太宰薳啓疆來召公公將往夢襄公祖梓慎曰君不果行襄公之適楚也夢周公祖而行今襄公實祖君其不行子服惠伯曰行也先君未嘗適楚故周公祖以道之襄公適楚矣而祖以道君不行何之三月公如楚論語曰孔子曰甚矣吾衰也久矣吾不復夢見周公謝承後漢書曰范式字巨卿山陽金鄊人仕郡為功曹與汝南張邵字元伯為友後元伯􅃦疾篤同郡郅君章殷子㣲省視之元伯臨終嘆曰不見吾死友尋乃卒式忽夢見元伯元冕垂纓屣屐而呼曰吾以某日死某時葬永歸黄泉我亾能相及式覺而驚悲嘆赴之魏志曰周宣字孔和為太史嘗有問宣者曰吾夜夢見芻狗其占何也宣荅曰君欲得美食耳有頃出行果遇豐膳後又問昨夜復夢見芻狗何也宣曰欲堕車折脚宜戒慎之頃之果如宣言後又問曰昨夜夢見芻狗何也宣對曰君家欲失火當䕶之俄遂火起已而語宣曰前後三時皆不夢也聊試君耳何以皆驗耶宣對曰此神靈動君使言故與真夢無異也又問三夢芻狗而其占不同何也宣曰芻狗者祭神之物故君始夢當得飲食也祭祀訖則芻狗為車所轢故中夢當堕車折脚也芻狗既車轢之後必載以為樵故後夢憂失火也宣之叙夢凡此類也後魏書曰莊帝永安中北海王顥入洛莊帝北巡城陽王徽投前洛陽令㓂祖仁祖仁聞爾朱兆捕徽乃斬首送之兆夢徽曰我有金二百斤馬一百疋在祖仁家卿可取之兆於是懸祖仁首於樹以石墜足鞭之求金馬祖仁死時人以為立報崔鴻十六國春秋前凉録曰索紞字叔徹善数術占夢孝㢘令狐策夢立氷上與氷下之人語紞曰氷上有陽氷下為隂隂陽事也士如歸妻迨氷未泮婚姻事也君在上與氷下人語為隂陽介事君當為人媒氷泮而婚成策曰老夫耄矣不為媒也㑹太守田邈因策為子求張公徴女也仲春而婚郡主簿張宅夢走馬上山還舍三周但見松栢不知門䖏紞曰馬為離為火禍也人上山為凶字但見松栢墓門像也不知門䖏為無門也三周三朞也後三年必有大禍宅果與賈摹等謀反伏誅馬興平問紞曰我昨夜夢舍馬舞人向馬拍手何也紞曰馬者火也舞火起向馬拍手救火人也平未歸而火起郡功曹張邈嘗奉使諧州夜夢狼噉一脚紞曰脚月被噉為却字㑹東虜反遂不行張斌當舉孝㢘夢竪竿中天紞曰此未字也斌果停凡所占夢莫不中驗皇甫謐帝王世紀曰黄帝夢大風吹天之塵垢皆去又夢人執千鈞之弩驅羊數萬羣帝寤而歎曰風為號令執政者也垢去土后在也天下豈有姓風名后者哉夫千鈞之弩異力能運者也驅羊數萬羣是為善牧者也天下豈有姓力名牧者哉於是依二夢之占而求之得風后于海隅登以為相得力牧於大澤進以為將又曰湯思賢夢見有人負鼎抗爼對已而笑窹而占曰鼎為和味爼者割截天下豈有人為吾宰者哉初力牧之後曰伊摯耕於有莘之野湯聞以幣聘有莘之君留而不進湯乃求婚於有莘之君有莘之君遂嫁女於湯以摯為媵臣至亳乃負鼎抱爼見湯也列子曰覺有八徴夢有六條奚謂六條一曰正夢二曰噩夢三曰思夢四曰寤夢五曰喜夢六曰懼夢此六者神所交也一體之盈虛消息皆通於天地應於物類故隂氣壯則夢涉大水而恐懼陽氣壯則夢涉大火而燔焫隂陽俱壯則夢生殺以浮虛為疾者則夢揚以沉實為疾者則夢溺藉帶而寢則夢蛇飛鳥銜髪則夢飛將隂夢火將疾夢食飲酒者憂歌舞者哭故神遇為夢形接為事古之真人其覺自忘其􅃦不夢又曰西極之南隅有國名莽隂陽之氣所不交寒暑亾辨日月之光所不昭晝夜亾辨其民不食不衣而多眠五旬一覺以夢中所為者實覺之所見者矣又曰周之尹氏大治産其下趣役者侵晨昏而弗息有老役夫筋力竭矣夜則昏憊而熟寐而昔昔夢為國君遊醼宫觀恣意所欲其樂無比覺則復役人有慰喻其勤者役夫曰人生百年晝夜各分吾晝為僕夫苦則苦矣夜為人君其樂無比何所怨哉尹氏慮鍾家業心形俱疲昏憊而寐昔昔夢為人僕趨走作役無不為也数罵杖撻無不至也尹氏病之以訪其友其友曰若夜夢為僕夫苦逸之復數之常也若欲覺夢兼之豈可得耶又曰黄帝十有五年晝夢遊於華胥氏之國其國在弇州西台州北不知去齊國㡬千萬里也非舟車足力之所及彼中無帥長無嗜欲不知樂生不知惡死無天殤不知親已不知疎物帝寤怡然而召輔相而告之曰朕思有以養身治物之道弗獲疲而睡若此知至道不可以情求朕得之矣莊子曰夢者陽氣之精也心所喜怒則精氣從之又曰夢飲酒者旦而哭泣夢哭泣者旦而田獵此寤寐之事變也方其夢也不知其夢夢之中又占其夢焉覺而後知其夢又曰昔者莊周夢為蝴蝶栩栩然蝴蝶也自喻適志與不知周也俄然覺則蘧然周也不知周之夢為蝴蝶與蝴蝶之夢為周與傅子曰夢攀日月覺而不上天庭夢入九泉寤而不及地下髙宗得説偶中耳淮南子曰若人萬化而未始有極也弊而復新其為樂可勝計耶譬若夢夢為鳥而飛於天夢為魚而沒於淵方其夢也不知其夢也覺而後知其夢也今將有所大覺乃後知今此之為大夢也博物志曰太公為灌壇令於時文王夢見一婦人哭於道因問其故荅曰吾是太嶽之女嫁為西海之婦吾行往來必以暴風疾雨今灌壇令當吾道吾不敢以暴風疾雨過也夢覺遂召太公三日果有暴風疾雨過其灌壇也始興記曰林水源裏有石室室前盤石上行羅十瓮中悉是餅銀採伐過之不得取之取必迷悶晋孝武太元初封驅之家奴竊三鉼歸發㸔有蛇螫之而死其夜驅之夢神語之曰君奴不謹盗銀三鉼即日顯戮覺奴已死銀由在復還之矣論衡曰趙簡子夢見天帝也以夢占之知樓臺山陵官位之象也人夢上樓升山陵輙得官位實樓臺山陵非官位也則知簡子夢見帝非天帝也世説曰衛玠總角時嘗問樂廣夢樂云是想衛曰神形所不接而夢豈是想樂曰因也衛思因不遂成病樂聞故命駕為剖析之衛病即小差樂嘆曰此賢胷中當必無膏肓夢書曰夢者像也精氣動也魂魄離身神來往也隂陽感成吉㓙驗也夢者語其人預見過失如其賢者知之自改革也夢告也告其形也目無所見耳無所聞鼻不喘臭口不言也魂出遊身獨在心所思念忘身也受天神戒還告人也受戒不精㤀神言也名之為寤告符臻也古有夢官世相傳也又曰昔聖帝明王之時神氣炤然先見故尭夢乘龍上太山舜夢擊天鼔禹夢其手長湯夢布令天下後皆有天下桀夢疾風壊其宫紂夢大雷擊其手齊桓夢為大禽所中秦二世夢虎齧其馬王者夢之皆失天下黄帝鍼經曰岐伯曰正邪外襲内而未有定舍也反滛於藏榮衛俱行而與魂魄飛揚使人卧而不得安而夢喜氣滛於府則有餘於外不足於内氣滛於藏則有餘於内不足於外隂氣盛則夢涉大水而恐懼陽氣盛則夢涉大火而燔灼隂陽俱盛則夢相殺毁傷上盛則夢飛下盛則夣堕甚飽則夢與甚饑則夢取肝氣盛則夢怒肺氣盛則夢恐懼心氣盛則夢喜笑脾氣甚則夢歌樂體重身不舉腎氣盛則夢脊兩解不屬厥氣客於心則夢見邱山爝火客於肺則夢飛揚見金鉄之奇物客於肝則夢山林樹木客於脾則夢見邱陵大澤壞屋風雨客於腎則夢臨淵没居水中客於膀胱則夢逰行客於胃則夢飲食客於大腸則夢田野客於小腸則夢聚邑街衢客於胆則夢聞訟自刳鬭客於隂則夢接内客於頂則夢斬首客於足則夢行走而不能及居深穽内客於股肱則夢禮節拜跪王子年拾遺録曰融髙西有夢草莖似蓍柯採之為占則知吉㓙懷之以占夢立知禍福吉夢上尚書説命曰髙祖夢得説盤庚弟小乙子名武丁徳髙可尊故號髙宗夢得賢相其名曰説使百工營求諸野得諸傅岩使百官以所夢之形像經營求之於外野得之於傅岩之谿毛詩鴻雁斯干曰吉夢維何維熊維羆維虺維蛇大人占之維熊維羆男子之祥維虺維蛇女子之祥又鴻鴈無羊曰牧人乃夢衆維魚矣旐維旟矣大人占之衆維魚矣實維豐年旐維旟矣室家溱溱溱溱衆也左傳僖下曰晉侯夢與楚子搏搏手搏也楚子伏已而盬其腦子犯曰我得天楚伏其罪吾且柔之矣晉侯上向故得天楚子下向地故伏其罪也腦所以柔物又宣上曰鄭文公有賤妾曰燕姞夢天使與已蘭曰余為伯鯈余而祖也以是為爾子以蘭有國香人服媚之如是既而文公見之與之蘭而御之生穆公名之曰蘭又昭元曰昔武王邑姜方震大叔邑姜武王后齊太公之女也懷胎為震大叔成王之弟虞夢帝為己曰余命而子曰虞帝天也將與之唐屬諸㕘而蕃育其子孫又哀下曰宋景公無子取公孫周之子得與啓畜諸公宫未有立焉公卒得夢啓北首而寢於盧門之外盧門宋東門也北首死䖏在門外失國之象也已為烏集於上咮加於南門尾加於桐門桐門北門曰余夢美必立乃得立春秋元命苞曰尭為天子夢白帝遺吾馬喙子其母為扶始升邱暏白帝上有雲虎感生已生臯陶此盡夢所見告之辭也雲虎有雲状如虎尭聘索狀始問之如尭言徴與語明於刑法周書曰文王去商在程正月既生魄太姒夢見商之庭産棘小子發取周庭之梓樹乎闕間梓化為松栢棫作寤驚以告文王王及太子發並拜告夢受商之大命于皇天上帝史記曰秦文公夢黄虵自天下屬地其口止於鄜衍李竒曰鄜音乎山阪曰衍問史敦敦曰此上帝之徴君其祠之又曰王太后母曰臧而嫁為槐里王仲妻生兩女長嫁為金王孫婦臧兒卜女當貴乃奪金氏内之太子宫太子幸愛之生三女一男男方任身時王美人夢日入懷太子曰此貴徴也孝景帝即位王夫人為皇后其男為太子景帝崩太子襲號為武皇帝漢書曰髙祖薄姬内後宫嵗餘不得幸始姬與管夫人趙子兒相愛曰約先貴無相㤀已而管夫人趙子兒先幸漢王漢王四年坐河南宫成臯臺此兩美人侍而薄姬不得見二人相與笑薄姬初時約漢王問其故兩人俱以實告漢王心悽然憐薄姬是日召欲幸入對曰昨夢龍據腹上曰是貴徴也吾為汝成之幸有身生文帝太平御覽卷三百九十七
