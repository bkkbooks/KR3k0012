  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_354-1a, image: WYG0896/WYG0896-0166a.png}
body:
  text: 太平御覽卷三百五十四宋李昉等撰兵部八十五槊槍鋋鈎鑲槊通俗文曰矛丈八者謂之矟晉書曰劉邁毅之兄也邁字伯群少有才幹為殷仲堪中兵㕘軍桓𤣥之在江陵甚豪橫士庻畏之過於仲堪𤣥曽於仲堪㕔事前戲馬以弰擬仲堪邁時在坐謂𤣥曰馬矟有餘精理不足𤣥自以才雄冠世而心知外物不許之仲堪為之失色齊書曰長沙王晃武帝常幸鍾山晃從駕以馬矟刺道邊枯蘖上令左右數人引之銀纒皆卷聚而矟不出乃令晃復馳馬㧞之應手便去每逺州獻駿馬上輒令晃於華林中調試之髙帝常曰此我家任城也後魏書曰來大千驍果善騎射遷中散至於朝賀之日大千常着御鎧盤馬殿庭莫不嘆異嘗從太宗獵見虎在髙巖上大千持矟直前刺之應手而死又曰于栗磾代人也從太祖田於白登山見熊將數子顧謂栗磾曰卿勇幹如此寧能搏之乎對曰天地之性人為貴若搏之不勝豈不虛斃壯士也自可驅致御前坐而制之尋皆擒獲劉裕之伐姚泓也栗磾慮其北擾遂築壘河上親自守焉裕甚憚之不敢前進裕遺栗磾書逺引孫權求討西蜀之事假道西上題書曰黒矟公麾下栗磾以狀表聞太宗許之因授黒矟將軍栗磾好持黒矟以自標衛裕望而異之故有是號累遷豫州刺史續晉陽秋曰太尉伐羗於濟口入河索虜遣將鵝青步騎十萬於河北聲云救羗太尉遣隊主丁旿以車百乗屯北岸為却月陣相去一步軍置七人授以長白毦槊毦音餌三國典畧曰文育小字猛奴到都見太子詹事周捨捨命兄子𢎞讓敎之書計文育謂𢎞讓曰誰能學此取富貴但有大槊耳𢎞讓壯之敎之騎射文育大悅又曰羊侃字祖忻嘗從梁主宴樂遊苑時少府啓兩刃矟成長二丈四尺三寸梁主因賜侃河南國紫騮馬命試之侃執矟上馬左右擊刺特盡其妙觀者登樹梁主曰此樹必為侍中折矣俄而果折因號此矟為折樹矟又曰北齊安州刺史盧胄入海島得一人脛可長二丈以為矟獻於神武諸將咸莫能用唯彭樂舉之胄未幾遇疾痛聲聞外巫言海神為祟因此而卒鄴城故事曰紫陌浮橋在城西北五里案鄴中記云趙王虎時於此濟置紫陌宫暨齊時因脩為濟口帝廵幸又向并州百官相餞莫不至此而訣别迄今猶以為渡口齊文宣時西廵百官辭於紫陌使弰騎圍之曰我舉鞭一時刺殺淹畱半日文宣醉不能起黃門侍郎連子暢進曰陛下如此諸臣恐怖文宣曰大怖耶若然不須殺乃命解圍又曰北齊文宣於臺上以矟刺都督尉子輝應手而死靈鬼志曰河間王顒既敗於關中有給使陳安甚壯健常乗一赤馬雋快非常雙持二刀皆長七尺馳馬運刀所向披靡關西為之歌曰隴上健兒字陳安頭小面狹腹中寛丈八長槊左右盤語林曰桓宣武與殷劉談不如甚喚左右取黃皮袴褶上馬持矟數廻或向劉或擬殷意氣始得雄王傅𤣥歌詩曰彎我䌓弱弓弄我丈八矟一舉覆三軍再舉殄戎貊梁簡文帝馬槊譜序曰馬槊為用雖非逺法近代相傳稍已成藝鄧蔗縈魏后之庭武而猶質種馬入丹陽之寺雄而未巧聊以餘暇復撰斯法捜採抑揚斟酌煩簡至如春亭落景秋臯晩净青霜旦盡密雨初晴纎驪沃若天馬平馳盼金精而轉態交流汗血愛連錢而息影不畏衣香雕衢與白刃爭暉翠毦與紅塵俱動足使武夫憤氣觀者衝冠巴童留玩不待輕舟之檝越女踟蹰無假如皋之箭槍風俗通曰刻葦傷盗為槍宋元嘉起居注曰謝靈運自理文云及經山陰防禦彰赫彭排馬槍斷截衢巷衛公兵法曰聽角聲第一聲絶諸隊即一時散立第二聲絶諸隊一時捺槍巻幡張弓㧞刀第三聲絶諸隊一時舉槍第四聲絶諸隊一時籠槍跪膝坐唐書曰郯國公羅士信容貌短小而驍勇絶倫隋末賊起士信始年十四為通守張須陁執衣遇翟讓來㓂士信請自効須陁小之曰汝形容未勝衣甲何可入陣士信怒重着二甲左右雙鞬躍而上馬須陀壯之遂將其衆擊賊于澭水之上陣纔列士信執長槍立於馬上馳至賊所刺倒數人斬一人首擲於空中用槍承之戴以略陣賊衆愕然莫敢逼者士信乃弃策馳馬為十下而還須陀因而􅁬擊兵始接賊師大潰士信逐北每殺一人輙劓其鼻而懷之每歸而數其鼻以表殺賊之多少也須陁大恱之引置左右每戰須陀居前士信為副賊無敢當者又曰太宗每當大陣望賊中驍將銳士炫曜人馬出入來去者意頗怒之輒命秦叔寶徃取焉叔寶應命躍馬負槍而進必刺之萬衆之中人馬俱倒太宗因以是重之叔寶亦以此頗自矜尚貞觀以後恒多疾病每謂人曰吾少長戎馬所經二百餘陣屢中重瘡計吾前後出血亦數斛矣何能不病乎及卒太宗甚傷惜乆之贈徐州都督陪葬于昭陵令所司於其塋内立石人馬以旌戰之功焉又曰哥舒翰為别將時吐蕃大㓂邊翰拒之于苦海吐蕃之衆三道從山相續而下翰持半段槍當其鋒逆擊之無不摧靡又擊其次軍復走之又擊其後軍皆大破由是知名天寶六載擢授右武衛將軍仍充隴右節度使副都知關西兵馬使河源軍使先是吐蕃每歳候麥秋即大掠積石軍前後不能禦至是翰使將王難得楊景輝等潜領兵候蕃至設伏以待之吐蕃五千騎旣至放馬脫甲翰以城中率驍勇合伏兵馳擊之殺畧盡百餘騎奔突得走王難得追擊之疋馬不還翰常逐馬驚墜于河立於水中吐蕃三人擬槍力刺之翰大呌之賊驚駭俱廢失槍而走救騎至賊便解散翰有家臣曰左車年十五每隨翰入陣翰善使槍追賊及以槍搭其肩而遏之賊驚顧翰從而刺其喉皆剔髙三五丈而墜左車輒下馬斬其首率以為常又曰王難得有膽力善騎射天寶元年正月吐蕃大㓂河源軍難得以騎將為軍鋒贊普有子曰琅支都恃其趫悍乘諳真馬寶鈿裝鞍軍前求較鬭者難得橫槍突徃刺殺之斬其首以其馬歸虜衆無敢追者軍使以聞𤣥宗召至御殿問之因令馳突作殺琅支都狀壯之衣以錦􅂁拜左金吾衛羽林將軍五代晉史曰梁將有王彦章者勇力過人常執鐵槍重百斤所向辟易莊宗畏之鋋釋名曰鋋延也逹也去此至彼之言也方言曰矛呉揚江淮南楚五湖之間謂之鋋音蟬或謂之鏦漢書曰鏦殺吳王也其柄謂之鈐東都賦曰戈鋋彗雲注鋋小矛也鈎鑲音攘又音襄又音孃戎噐也釋名曰鈎鑲兩頭曰鈎中央曰鑲或推鈎推鑲或鈎引用之宜也東觀漢記曰詔令賜鄧遵金蚩尤辟兵鈎一又曰桓帝永興二年光祿勲府吏舍夜壁下忽有氣掘之得玉玦各有鈎長七寸三分玦周五寸四分身中皆有雕鏤漢名臣奏曰丞相薛宣奏漢興以來深考古義惟萬變之備於是制官室出入之儀正輕重之冠故司馬殿省門闥至五六重周衛擊刁斗近臣侍側尚不得着鈎帶入房梁書曰吉士瞻初為荆府城局參軍浚池得一金革帶鈎隠起鏤甚精巧篆文曰錫爾金鈎且公且侯士瞻取夏侯洋兄之女女竊以與洋洋喜佩之及是革命洋果封侯而士瞻不錫茅土列仙傳曰鈎弋夫人姓趙病臥左手拳望氣者云東北有貴人氣推而得夫人武帝發手得玉鈎手亦舒遂幸而生昭帝後被害殯之尸不臭而香一月三秦記曰藏鈎因鈎弋夫人世人法之也瑞應圖曰湯都于亳有神人牽白狼口衘銅鈎入湯庭捜神記曰京兆長安有張氏者晝獨處室有鳩自外入張氏惡之披懷而祝曰鳩之來為我禍耶飛上承塵為我福耶來入我懷鳩飜入懷以手探則不知鳩之所在而得一金帶鈎焉遂寶之自是之後子孫昌盛有為必偶貨財萬倍蜀客賈至長安中聞之乃厚賂内婢婢乃竊鈎以與蜀客張氏失鈎漸漸耗而蜀客數罹難厄不為己利或告之曰天命也不可以力求於是以鈎反張氏復昌故關西稱張氏傳鈎云陳留風俗傳曰浚儀周時梁伯所居國都多池沼時池中出神帶鈎到今其民象而作之號曰大梁氏鈎焉吳越春秋曰闔閭作金鈎令曰能為善鈎者賞之百金而有人貪賞之重也殺其兩子以血釁金遂成二鈎獻之闔閭而詣宫門求賞王曰為鈎者多而子獨求賞何以異於衆人之鈎乎作者曰吾之作鈎也貪王之賞殺吾二子以成兩鈎以示之曰何者是也時王鈎甚衆形體相類不知其所在鈎師向鈎而哭呼其兩子名曰吳鴻扈稽我在此王不知汝之神也聲未絶於口兩鈎俱飛著於父之胷吳王大驚乃賞之百金夢書曰夢得鈎帶受約束也鈎帶著身約勑已也持鈎帶脫事决已也莊子曰曲者中鈎吳都賦曰貝鈎越棘魏文帝與王朗書曰丕白不愛江漢之珠而愛巴蜀之鈎此言難得之貴寶不若易有賤物魏文帝答昭烈書曰獲累紙之命兼美之貺他既備善雙鈎尤妙前後之惠非賢兄之貴則執事之貽也來若川流聚成山積其充匱笥頓府藏者固已無數矣太平御覽卷三百五十四
