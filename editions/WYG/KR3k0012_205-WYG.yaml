  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_205-1a, image: WYG0894/WYG0894-0788a.png}
body:
  text: 太平御覽卷二百五宋李昉等撰職官部三丞相下丞相下唐書曰太宗謂侍臣曰中書門下機要之司擢才而居任委實重詔勅如有不便皆須執論比来唯覺阿㫖順情遂無一言諫諍者豈是道理若惟署勅行文書而已人誰不堪自今已後詔勅疑有不穩必須執之又曰来恒及弟濟相次知政事時以為榮初濟父護兒在隋為猛将而恒濟俱以學行見稱時虞世南子昶既無才術厯将作少匠工部侍郎累居工作之司濟忽升相位許敬宗歎曰士之登庸不繁世業履道則為衣冠失緒則為匹庶來護兒兒作宰相虞世南男作木匠忠賢文武固無種也又曰杜景儉為相則天常以季秋月出棃花一枝示宰臣曰是何祥也諸宰臣曰陛下徳及草木故能秋木再花雖周文徳及行葦無以過也景儉獨曰謹按洪範五行傳隂陽不相奪倫瀆之即為災又春秋云冬無愆陽夏無伏隂春無凄風秋無苦雨今已秋矣草木黄落而忽生此花瀆隂陽也臣慮陛下布教施令有虧禮典又臣等忝為宰臣助天理物理而不和臣之罪也於是再拜謝罪則天曰卿真宰相也又曰武太后常召陸元方問以外事對曰臣偹位宰相有大事即奏人間碎務不敢以煩聖覽又曰蘇味道遷鳯閣侍郎同鳯閣鸞臺三品味道善敷奏多識臺閣故事然而前後居相位數載竟不能有所發明但脂韋其間苟度取容而已故時人號為模稜手以為口實又曰宇文融既居相位欲以天下為己任謂人曰使吾居此數月庶令海内無事矣於是薦宋璟為右丞相裴耀卿為户部侍郎許璟為工部侍郎甚允朝廷之望又曰牛仙客既居相位獨潔其身唯諾而已所有錫賚皆緘封不敢費之百司或有所諮決輙對曰但依令式即可若不依文非所知也又曰開元二十二年十一月制宰相兼官者並兩給俸禄又曰楊綰素以徳行著聞質性貞廉車服儉朴居廟堂未數日人心自化御史中丞崔寛劍南西川節度使寧之弟家富於財有别墅在皇城之南池舘臺榭當時第一即日潜追毁拆中書令郭子儀在邠州行營聞綰拜相座内音樂減撤五分之四京兆尹黎幹以承恩毎出入騶馭百餘亦即日減損車馬唯留十騎而已其餘望風變奢從儉者不可勝數其鎮俗移風若此又曰肅宗時天下事殷而宰相不減三四貟更直掌事若休沐各在第有詔㫖出入非大事不欲歴抵諸第肅宗許令直事者一人假署同列之名以進遂為故事又曰李峴為黄門侍郎同中書門下平章事宰臣不於政事堂邀客時海内多務宰相元載等見中官宣傳恩詔至中書者引之政事堂上仍置榻坐焉峴至叱左右去其榻也又曰栁渾與張延賞同在相位延賞怙權矜已而嫉渾守正俾其所厚謂渾曰相公舊徳但節言於廟堂則重位可乆荅曰為吾謝張相公栁渾頭可斷也言不可絶自是竟為延賞所擠尋除右散騎常侍罷知政事又曰栁渾為相而韓滉自浙西入覲朝廷委政待之至於調兵食籠鹽鐵勾官吏􅂍罰鉏豪强兼并上委仗焉毎奏事或日旰他相充位而已公卿救過不能暇無敢枝梧者滉於省中榜吏至死渾雖滉所引心恚其専政正色讓之曰先相公狷察為相不滿嵗而罷今相公榜吏於省中至死況省闥且非刑人之地相公柰何蹈前非刑於今朝専立威福豈尊主卑臣之義也滉感悟愧悔為霽威焉又曰李晟之在鳯翔也謂賔介曰魏徴能直言極諫致太宗於堯舜之上真忠臣也僕忻慕之行軍司馬李叔度對曰此縉紳儒者之事非勲徳所宜晟斂容曰行軍失言傳稱邦有道危言危行今休明之期晟幸得偹位将相必有不可忍而不言豈所謂有犯無隱知無不為者耶是非在人惟所擇耳叔度慙而退故晟為相毎當上所顧問必極言匪躬盡大臣之節沉黙未常泄於所親又曰閻立本為右相與左相姜恪對掌樞密恪既歴任将軍立功塞外立本惟善於圗畫非宰輔之器故時人以千字文為之語曰左相宣威沙漠右相馳譽丹青又曰皇甫鎛隂結權倖以求宰相崔羣累疏其奸邪常因對面對論語及天寳開元中事羣曰安危在出令存亡繫所任𤣥宗用姚崇宋璟張九齡韓休李元紘杜暹則理用李林甫楊國忠則亂人皆以天寳十五年禄山自范陽起兵是理亂分時臣以為開元二十年罷賢相張九齡専任奸臣李林甫理亂自此已分矣用人得失所繫非小詞意激切左右為之感動鎛深銜之而憲宗終用鎛為宰相又曰李絳為相同列李吉甫便辟善逢迎上意絳梗直多所規諫故與吉甫不恊時議者以吉甫通於承瓘故綘尤惡之絳性剛訐毎與吉甫争論人多直綘憲宗察絳忠正自立故絳論奏多所允從又曰貞元九年詔宰相以旬秉筆決事初至徳中宰相迭秉筆處斷毎十月一易及賈耽趙憬陸贄盧邁同平章政事百寮其所闗白更相讓不言於是奏議請旬秉筆者出應之其後又請每日更秉其必迭以應事皆從之又曰李藩拜門下侍郎時王鍔領太原用錢千萬賂貴倖求兼相藩與權徳輿在中書有宻㫖曰王鍔可兼宰相宜即擬来藩遂以筆塗兼相字却奏上云不可徳輿失色曰縱不可宜别作奏豈有以筆塗詔耶曰勢廹矣出今日便不可止日又暮何暇别作奏事果寝又曰韓宏入朝以宣武舊事人多流言其子公武以家財厚賂權幸及多言者班列之中悉受其遺俄而父子俱卒孤孫幼小穆宗恐為厮養所盜乃令中使至其家閲其宅簿以付家老而上簿上具有納賂之所唯於牛僧孺官側朱書曰某月日送牛侍郎物若干不受即付訖穆宗按簿甚悦居無何議命相帝首可僧孺之名又曰李程為相敬宗沖幼好治宫室畋遊無度欲於宫中營新殿程諫曰自古聖帝明王以慈儉化天下陛下在諒闇之中不宜興作願以瓦木廻奉園陵上忻然從之又曰文宗問宰相曰天下何由太平卿等有意於此乎牛僧孺奏曰臣等待罪輔弼無能康濟然臣思太平亦無象今四夷不至交侵百姓不至流散上無淫虐下無怨讟私室無强家公議無壅滯雖未及至理亦謂小康陛下若别求太平非臣等所及既退至中書謂同列曰吾輩為宰相天子責成如是安可乆處兹地邪旬日間三上章請退不許又曰韋處厚為相時文宗勤於聴政然浮於決斷宰臣奏事得請往往中變處厚常獨論奏曰陛下不以臣等不肖用為宰相叅識大政凡有奏請初蒙聴納尋易聖懐若出宸衷即示臣等不信若出於横議臣等何名鼎司且裴度元勲宿徳厯輔四朝孜孜竭誠人望所属陛下固宜親重竇易直良厚忠事先朝陛下固當委信微臣才薄首蒙陛下擢用非出他門言既不從臣宜先退即趨下拜陳乞上矍然曰何至此耶卿之志業朕素自知登庸作輔百職斯舉縱朕有所失安可遽辭以彰吾薄徳處厚謝之而去出延英門復令召還謂曰凡卿所欲言並宜啟諭處厚因對彰善癉惡歸之法制凡數百言又言裴度勲高望重為人盡心切直宜乆任可以壮國威帝皆聼納自是宰臣敷奏人不敢横議又曰文宗朝宰臣楊嗣復因對奏曰使府判官令人數猥多徒有縻費臣欲條䟽上曰莫限及才人否嗣復曰有才人自别但澄去滓弊者菁華自出上曰蕭復為相難言者必言貞元之名相也卿其志之又曰宋申錫為相尤以公亷為己任四方問遺悉無受者既被罪為有司騐劾多獲其四方受領所還問遺之状朝野聞之歎息又曰宋申錫以漳王事申錫既被罪怡然不以為意自中書歸私第止于外㕔素服以俟命其妻出謂之曰公為宰相人臣位極於此何負天子反乎申錫對曰吾自書生被厚恩擢相位不能鋤去奸亂反為所羅網夫人察申錫豈反者乎因相與泣下數行又曰李徳裕父吉甫年五十一出鎮淮南五十四自淮南復相今徳裕自鎮南復入相一如父之年又曰㑹昌元年中書奏請依姚璹故事宰臣毎月修時政記送史館從之又曰宣宗時魏謩為相奏曰臣無䕫契之才驟叨䕫契之任将何以仰報鴻私今邉戍粗安海内寧息臣愚所切陛下未立東宫俾正人傅導以存副貳之重因泣下上感而聴之先是累朝人君不欲人言立儲貳若非人主已欲臣下不敢獻言宣宗春秋高嫡嗣未辨謩作相之日率先啟奏人士重之又曰曹礭與畢諴俱以儒術進用並居相位亷潔貞苦君子多之稱為曹畢又曰蕭遘與王鐸並居相位帝常召宰相鐸年高昇階足跌踣勾陳中遘旁掖起帝目之喜曰輔弼之臣和予之幸也謂遘曰適見卿扶王鐸喜卿善事長矣遘對曰臣扶王鐸不獨事長臣應舉時鐸為主司以臣中選門生也上笑曰王鐸選進士朕選宰相於卿無負矣遘謝之而退太平御覽卷二百五
