  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_052-1a, image: WYG0893/WYG0893-0443a.png}
body:
  text: 太平御覽卷五十二宋李昉等撰地部十七石下石下西京雜記曰竇太后在家嘗有白燕銜石大如指墮后績筐中取石剖為二其中有文曰母天地后乃合之遂不復開後為皇后帝并置璽中為天璽又曰五鹿充宗受學於彌成子彌成子少時常有人遇己授以文石大如鷄卵成子吞之遂大明悟為天下通儒成子後病吐出此石授充宗充宗復吞又為明學又曰漢武昆明池養魚往往飛去後刻石為鯨魚致水中乃不飛去每至雷雨鯨魚鳴吼潯陽記曰石鏡山東一圓石懸崖明净照人微細必察幽明録曰宫亭湖邊傍石間有石數枚形圓若鏡明可鑑人謂之石鏡後人過以火燎一枚今不復明其人眼遂失明庾仲雍湘州記曰應陽縣蔡子池南有石臼云是蔡倫造紙臼也王歆之南康記曰歸美山出石紅丹赫若采繪峩峩秀上九霄隣景明曰女媧石大風雨後天澄氣靜聞管絃聲拾遺記曰員嶠山東有雲石廣五百里駮落如錦扣之片片蓊然雲起又曰魏明帝時太山下有連理文石髙十二丈狀如枯樹其文色彪發似人雕鏤自下及上對峙百餘步及魏明帝之始稍覺相近如雙闕也土石陰類魏為土徳斯為靈異交州記曰有浮石山在海中虛輕可以磨脚煮飲之止渴洞㝠記曰元鼎中條支國貢馬肝石以和九轉丹有髮白者以此拭之應手而黑顧野王瑞應圖曰石華者石生華也劉澄之江州記曰興平縣蔡子池南有石穴深二百許産文石堪為書硯蜀中記曰隗叔通棘人也性至孝母每食必須江水通每汲江中石為之出今江中有石號孝子石十洲記曰流洲在西海中上多積石名為昆吾石治其石成鐵作劍光明照洞如水晶狀割玉物如切泥土焉益州記龍盤山有一石長四十丈髙五丈當中有户及扉若人掩閉故老相傳玉女房石虎鄴中記曰孟津河東去鄴城五里有濟北郡榖城縣有榖城山是黄石公所葬處有人登此山見崩土中有文石石文鮮明虎使採取以治宫殿又免榖城令不奏聞故也潯陽記曰落星石在宮亭湖中周廻百餘步髙五丈上有竹林武昌記曰陶太尉廟東有盤龍石舊傳云龍盤於此石梁州記曰沔陽城泝漢上十五里有諸葛武侯所鎮在漢水南背山向水門前累石以為陣荆州圖經曰宜都有穴穴有二大石相去一丈俗云其一為陽石一為陰石水旱為災鞭陽石則雨鞭陰石則晴即禀君石是也但鞭者不壽人頗畏之不肯治也丹陽記曰石頭城西有唐頺石王敦害周伯仁之所又曰姑熟縣晉惠帝永寧三年湖中有大石去渚二百步浮來登岸百姓驚觀咸曰石來有水明年果有水入揚州裴淵廣州記曰甘泉縣平野中孤石挺起峯秀入雲連石相接無異棟宇安城記曰石室中有素石數斛狀如雀頭甘潤虛脆殆可噉曹叔雅異物志曰豫章有石黄色白色而理疎以水灌之便熱以鼎加其上炊足以熟冷則灌水雷煥以問張華華曰然石也漢官儀曰馬伯登泰山見石二枚其一是武帝時石用五車載不能上因置山中為屋號五車石一是刻號記功徳立壇上始興記曰營口北有逃石一名靈石晉永和中有三飛仙衣冠自來憇此石旬日乃去之盛宏之荆州記曰臨賀郡有青石上有磨刀斧迹春夏明淨秋冬蕪穢云是雷磨石又曰築陽粉水口有一石下不測出地尺許圍可三尺色極青其上如研明可鑒人相傳以為殞星縣西有孤石挺出其下臨潭或有見根者如竹根又曰樊重母畏雷為石室避之悉以石為階砌今猶存又曰臨賀馮乘縣東五里有故縣廟相傳漢淮南王安被誅其子奔逸來至一夜忽化為石人當縣門而立百姓怪而觀之其迫察者手足無不浥爛述異記曰鏡湖俗傳軒轅氏鑄鏡於湖邊今有軒轅磨鏡石石上常潔不生蔓草輿地志曰會稽秦望山始皇刻石前有石廣數丈云是始皇坐之石兩邊有方石八方云是丞相已下坐石故今有丞相石之名𤣥中記曰天下之强者東海之沃燋石焉方三萬里海水灌之隨盡故水東流而不盈又曰玉門之西南有一國國中有山山上有廟國人嵗嵗出石䃡子林切數千枚名為霹靂䃡從春雷而䃡减至秋䃡盡鄱陽記曰錢倉石在饒州西一百里石形如倉囷有漁人夜宿石下忽見石開窺見石中有錢取之盈艇而去因為名郡國志曰乞子石在馬湖南岸東石腹中出一小石西石腹中懐一小石故楚人乞子於此有驗因號乞子石又曰思州金鷄石每有鷄鳥鳴於石上又曰仙人石曾有飛仙人下此石一曰仙人牀又曰協州弄棟縣蜻蛉水下有石猪母子數十頭云夷人昔牧於此猪化為石今夷人不敢於此牧又曰儋州昌化湖明山山有二石如人形云有兄弟二人向海捕魚因化為石號曰兄弟石也又曰桂州興安縣有卧石一枚其形似人而舉體青黄隱起俗謂之石神可以祈雨小舉則小雨大舉則大雨郡國志曰馬嶺嶠上多虺蛇毒殺人有冷石可以解之屑著瘡内即愈又曰梁州女郎山張魯女浣衣石上女便懷孕魯謂邪滛乃放之後生二龍及女死將殯柩車忽騰躍昇此山遂葬焉其水傍浣衣石猶在謂之女郎山又曰栁州城北七十里有話山孤石特竦仙人於此處談話輿地志曰南陵縣有女觀山俗傳云昔有婦人夫官於蜀屢愆秋期憂思感傷登此盼望因化為石如人之形所牽狗亦為石今狗形獨存博物志曰鸛水鳥也伏卵時數入水卵冷取礜石周圍繞卵以助暖氣故方術家以鸛巢中礜為藥華陽國志曰汶山有鹽石煎之得鹽異苑曰滕放太元初枕文石枕卧忽暴雨震其所枕傍人莫不懾而放微覺有聲又曰永康王曠井上有一洗石時見赤氣後有二胡人寄宿忽求買之曠怪所以未及度錢子婦孫氏覩二黄鳥鬬於石上疾往掩取變成黄金胡人不知索市愈急既得撞破内止有二鳥迹劉敬叔異苑曰晉武帝時吳郡臨平岸崩出一石鼔打之無聲以問張華華曰可取蜀中桐材刻作魚形扣之則鳴於是如其言叩之聲聞數十里異物志曰夷州土無銅鐵磨礪青石以作弓矢此石砮楛矢之類物理論曰土精為石石氣之核也氣之生石猶人筋絡之生爪牙也博物志曰桃林在𢎞農湖縣體牛之山有石焉曰帝臺之基也五色而文狀鴉卵焉遊名山志曰芙蓉渚有聳石頭如初生芙蓉色皆青白山海經曰燕山多嬰石言似玉有采嬰帶所謂燕石也又曰錢來之山多洗石若澡洗可磢去垢也水經注曰象林郡功曹姓區有子名逵攻縣殺令自號為王值世亂離林邑遂立後乃襲代傳位子孫三國鼎爭未有所附吳有交土與之隣接進侵壽冷以為疆界自區逵以後國無文史其先纂代世數難詳宗嗣絶滅無復種裔外孫范熊代立人情樂推後熊死子逸立有范文日南西捲縣夷帥范椎奴也文為奴時山邊牧羊于澗水中得兩鯉魚隱藏持歸規欲私食郎知檢其魚大慙懼詐云將礪石還非為魚也郎至魚所見是兩石信之而去文始異之石有鐵文入山中就石冶鐵鍛作兩刀舉刃向鄣因祝曰鯉魚變化冶石成刀斫石鄣破者是有靈神文當得此為國君王斫不入者是無神靈進斫石鄣如龍淵干將之斬蘆藁由是人情漸附今斫石尚在魚刀猶傳之子孫又曰澧水出武陵充縣東逕臨澧零陽二縣故界水之南白石雙立厥岸狀類人髙各三十丈周廻四十丈故老相傳曰昔充縣尉與零陽尉共論封境因傷害化而為石劉義慶幽明録曰陽羨縣小吏吳龕有主人在溪南嘗以一日棹小船過水溪内見一五色浮石取内牀頭至夜化成一女子也又曰宜都建平二郡之界有五六峯參差並出上有倚石如二人像攘袂相對俗謂二郡督郵爭界於此揚雄蜀本紀曰秦王獻五美女於蜀王蜀王遣五丁迎五女見大蛇入山空中五丁引蛇山崩五女上山化為石又曰武都丈夫化為女子顔色美好蓋山之精也蜀王娶以為妻無㡬物故於成都郭中葬之以石鏡一枚徑丈髙五尺鄧析書曰譬猶拯溺而硾之以石救火而投之以薪世説曰武昌陽新縣北山上有望夫石狀若人立者傳云昔有貞婦其夫從役逺赴國難擕弱子餞送此山立望而化為石兵書曰軍中地生石將可以久居史記曰以石投水莫之逆也雜五行書曰婦姑鬬爭取石重十六斤埋門外即罷荀伯子臨川記曰石廪狀似倉廪其内可容千斛廪口開則嵗儉閉則年豐又曰石龍山有巖其下有石形隱起似龍尾長一丈二尺地理記曰有鱗甲因號為石龍又云石鼓在宜黄水邊狀如鼓形濶九尺長一丈四尺四寸又云圓淨如鼔因以鼓為名焉又云鼔石髙五尺在宜黄水邊又云有女人入水次浣濯為蛟所牽入石中經數日雷擊石破見死蛟及女人屍浮出因號為破石又曰浮石其石居汝水中心或水汎漲髙岸皆沒此石居然不沒因以為名又曰落峭石去飛猿館一百一十五里在飛猿水巍峩嵌空數里可望即謝靈運詩云朝發悲猿嶠暮宿落峭石是其處也始興記云營口東岸有石四方而髙可百仞其狀若臺故名臺石夐然出焉其臺傍有石室前有石甕蓋以青盤悉是銀製有人過者但得開觀而不可取之取之則悶絶封丘之奴竊二枚為大蛇所害即不知其自永嘉記曰永嘉南岸有帆石乃堯時神人以破石推將入惡溪道置之溪側遙望有似張帆今俗號為張帆溪與天台山相接郡國志曰東海信郎神破石為帆今東海有信郎祠即是太平御覽卷五十二
