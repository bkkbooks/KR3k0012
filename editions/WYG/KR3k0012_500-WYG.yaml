body:
  text: 太平御覽卷五百宋李昉等撰人事部一百四十一傭保奴婢傭保史記曰荆軻死髙漸離乃變名姓為人傭保作於宋子徐廣曰宋子縣名也今屬鉅鹿久之作苦聞其家堂上客擊筑彷徨不能去毎出言曰彼有善不善從者以告其主曰彼傭乃知音召使擊筑一座稱善又曰欒布始與彭越為家人時窮困賣傭於齊為人酒保後漢書曰公沙穆來遊太學無資糧乃變服自傭為呉祐賃舂與語大驚遂共定交於杵臼之間又曰杜根字伯堅永初元年舉孝廉為郎中時和熹鄧后臨朝權在外戚根以帝年長宜親政事廣與同時郎上書直諫太后大怒收執根等令盛以縑囊於殿上撲殺之執法者以根知名私語行事人使不加力既而載出城外根得蘇因得逃竄為宜城山中酒家保保使也言為人傭也保任而使也積十五年酒家知其賢厚敬待之神仙傳曰仙人李八伯者欲授唐公房仙術乃為作傭客身作惡瘡膿澮臭惡使公房夫人䑛之瘡愈乃授丹經一卷奴婢説文曰奴婢皆古之罪人也方言曰荆淮海岱雜齊之間俗不純為雜罵奴曰臧罵婢曰獲齊之北鄙燕之北郊凡民男而婢聓謂之臧女而婦奴謂之獲亡奴謂之臧亡婢謂之獲皆異方罵奴婢之醜稱也周禮天官上酒人職曰女酒三十人奚三百人女酒女曉酒者凡徒男女入縣曰官奴其少財知者以為今之侍吏官奴是也又秋官上司厲職曰其奴男子入於罪𨽻女子入于舂槀鄭司農云謂為盜賊而為奴者輸于罪𨽻舂人槀人之官也由是觀之今之奴婢古之罪人也凡有爵者與七十者與未齔者皆不為奴有爵謂命士以上也齔毁也年男八歲女七歲而毁齔左傳襄四年曰裴豹𨽻也著於丹書𨽻罪𨽻裴豹有罪没官為奴丹書罪約也論語曰微子去之箕子為之奴比干諫而死孔子曰殷有三仁焉史記曰季布者楚人也項籍使將兵數窘漢王及項羽滅季布匿濮陽周氏周氏曰漢求將軍急且至臣家能聽臣臣敢進計季布許之乃髠鉗季布賣之朱家朱家心知是季布乃買而置之因誡其子曰田事聽此奴必與同食又曰欒布為人所略賣為奴於燕燕將臧荼舉以為都尉又曰衞青為侯家人少時歸其父使牧羊先母之子皆奴畜之不以為兄弟有鉗徒相青官至封侯青笑曰奴一生得無笞罵即足矣安得封侯又曰漢武帝時東置滄海郡人徒之費府庫並虛募民能入奴婢得以終身為郎増秩又曰霍光愛幸監奴馮子都常與計事又曰薛宣奏張放驕縱奴者並乘勢為暴至求吏妻不得殺其夫又曰原涉遣奴至市買肉奴乘涉氣與屠爭言斫傷屠者亡是時茂陵令尹翁歸新視事知涉名豪欲以厲俗遣兩使脅守涉至日中奴不出吏欲殺涉涉肉袒自縳箭貫兩耳詣廷尉門謝罪又曰張安世家僮七百人皆有手板又曰齊俗賤奴虜而刁間獨愛貴之桀黠奴人之所患唯刁間拔取使之終得其力又曰王鳳羣弟爭為驕侈奴僮以千數又曰孝宣皇帝詔曰夫褒有徳賞元功古今通義也大司馬大將軍霍光宿衞忠正宣德明恩守節秉義以安宗廟賞賜前後奴婢百七十人又曰王丹盡得父財家累千金奴僮數百又曰傅太后使謁者置諸官婢賤取之復取執金吾官婢八人東觀漢記曰彭寵奴子宻等三人共謀刼寵寵時齋獨在便坐室中夜卧子宻等三奴縳寵着牀板告外吏大王解齋吏皆便休又用寵聲呼其室入見寵寵曰趍為諸將軍辨裝兩奴將妻入取寵物一奴守寵寵謂奴曰若小兒我素所愛今解縳當以女珠妻若小奴見子宻聽其與語遂不得解子宻收金玉衣物使寵妻縫兩縑囊夜解寵手令作記曰告城門將軍云今遣子宻等詣蘭鄉子後所其開出勿稽畱書成即斷寵及妻頭置縑囊中西入上告又曰劉寛嘗有客遣蒼頭市酒去久大醉而還罵曰畜生遣人視奴疑必自殺寛嘗朝㑹莊嚴已訖妻使婢奉羮飜汚朝衣婢遽收之寛徐曰羮爛汝手耶又曰司𨽻校尉梁松奏特進馬防兄廖廖子孫三家奴婢千人又曰鄧宏字叔紀奴醉擊長壽亭長亭長將詣第白之宏即見亭長賞錢五千異日奴復與宫中衞士忿爭衞士毆捶奴宏聞復賞五千又曰朱暉為郡督郵太守阮况當嫁女欲買暉婢不與及况歸暉送金三斤人問其故暉曰前不與婢者恐以財貨汙府君耳今重送者以明己心也又曰祝良為洛陽令常侍樊豐妻殺侍婢置井中良收其妻殺之又曰韓卓臘日奴竊食祭其母卓義其心即日免之魏志曰晉室踐阼下詔曰故司空王基著德立勲不營産業其以官奴二人賜其家又曰陳泰䕶匈奴中郎京邑貴人多奇寳貨因泰市奴婢泰皆挂之於壁不發其封及徵為尚書悉以還之蜀志曰劉琰侈靡侍婢能為音樂又敎誦靈光殿賦又曰初孫權以妹妻先主妹才捷剛猛有諸兄風侍奴百餘人執刀立先主毎入心常凜凜晉書曰石崇有蒼頭八百餘又崇有奴緑珠美而艶善吹􅅇孫秀使人求之崇時在金谷别館方登涼臺臨清流婦人侍側使者以告崇盡出奴妾數十人以示之皆蘊蘭麝被羅縠曰在所擇使者曰君侯服御麗矣然本受上命索緑珠不識孰是崇勃然曰緑珠吾所愛不可得也秀遂誅崇又曰郭璞愛主人奴無由而得乃取小豆三斗遶主人宅散之主人晨起見赤衣人數千圍其家就之則滅甚惡之請璞為卦璞曰居家不宜畜此奴可於東南二十里賣之慎勿爭價則此患可除也主人從之璞隂令人賤買此奴復為符投井中數千赤衣人皆反縳一一自投于井主人大悦璞攜奴去又曰祖納少孤貧自炊爨以養母平北將軍王敦聞之遺其二奴辟為從事中郎有戯之曰奴價倍婢納曰百里奚何必輕於五羖又曰劉惔性簡貴與王羲之雅相友善郗愔有傖奴善知文章羲之愛之毎稱奴于惔惔問何如方囘耶羲之曰小人耳何比郗公惔曰若不如方囘故常奴耳又曰桓溫自以雄姿風氣是宣帝劉琨之儔有以比王敦者意甚不平及是征還於北方得一巧作老奴訪之乃琨妓女也一見溫便澘然而泣溫問其故答曰公甚似劉司空溫大悦出外整理衣冠又呼婢問之婢云脣甚似恨薄眼甚似恨小鬢甚似恨赤形甚似恨短聲甚似恨雌溫於是褫冠解帶昏然而睡不怡者數日又曰幸靈周旋江州間謂其士人曰天地之於人物一也咸欲不失其性奈何制服人以為奴婢乎諸君若欲享多福以保性命可悉免遣之又曰干寳父先有所寵侍婢母甚妬忌其父亡母乃生推婢於墓中寳兄弟年小不之審也後十餘年母喪開墓而婢伏棺如生載還經日乃蘇言其父常取餘食與之恩情如生家中吉凶輒語之考校悉騐地中亦不覺為惡既而嫁又生子又曰桓伊傳晉孝武帝召伊飲帝命伊吹笛伊即吹為一弄乃放笛云臣於箏分乃不及笛然自足以韻合歌管請以箏歌并請一吹笛人帝善其調達乃勅御妓吹笛伊又云御府人於臣自不合臣有一奴善相便串帝彌賞放率乃許召之奴既吹笛伊便撫箏而歌晉中興書曰祖約為丞相從事中郎於府内為婢所傷司直劉隗奏約患生婢僕身被刑傷約甚慙恥遂解職還家齊書曰虞悰治家富殖奴婢無游手雖在南土而㑹稽海味無不畢致焉又曰陸澄弟鮮揚州主簿顧測以兩奴就鮮質錢鮮免子晫誣為買券澄為中丞測與書曰先友後又牋與太守蕭緬云澄欲成子弟之非未近義方之訓此趍販所不為况搢紳領袖儒宗勝達乎崔鴻十六國春秋前秦録曰慕容沖進逼長安堅登城觀之歎曰此虜何從出也其强若斯大言責沖曰爾輩羣奴正可牧羊何為送死沖曰奴則奴矣既厭奴苦復欲取爾見代唐書曰哥舒翰有家奴曰左車年十五六亦有膂力翰善使槍追賊及之以槍撘其肩而喝之賊驚顧翰從而刺其喉皆剔髙三丈而墮無不死者左車輒下馬斬首率以為常又曰德宗初即位詔曰邕府歲貢奴婢使其離父母之鄉絶骨肉之戀非仁也罷之又曰羅讓累遷至福建觀察使兼御史中丞甚著仁惠有以女奴遺讓者讓訪其所自曰本某寺家人母姊九人皆為官所鬻其畱者唯老母耳讓慘然焚其丹書以歸其母又曰李元道累遷給事中封姑臧縣男時王君廓為幽州都督朝廷以其武將不習時事拜元道幽州長史以維持府事君廓在郡屢為非法元道數正議裁之嘗又遺元道一婢元道問婢所由云本良家子為君廓所掠元道因放遣之管子曰齊桓公使管仲求甯戚應之曰浩浩乎管仲不能知婢子問之仲曰非婢子所知也婢子曰詩有之浩浩之水游游之魚未有室家我將安居甯子其欲室乎仲以言告桓公風俗通曰南陽龎儉少失其父後居閭里鑿井得錢千餘萬行求老蒼頭使主牛馬耕種值錢二萬有賔婚大㑹奴在竈下竊言堂上母我婦也婢即白其母母使驗問曰是我公也因下堂抱其頸啼泣遂為夫婦儉其子歴二千石刺史七八人時人為之語曰廬里龎公鑿井得錢買奴得公又曰將作大匠陳國公孫志節有蒼頭地餘年十七情性聰惠儀狀端正工書疏志節為戸曹史令地餘歸取資用因持車馬亡去到丹陽自云姓王名斌字文髙遂留為諸曹史志節拜揚州刺史郡選曹衣冠子弟皆出斌下乃用之斌乞屏左右叩頭涕洟曰斌即明使君地餘也斌後為蒼梧太守三輔决録曰平陵孟他盡以家財賂張讓監奴奴慙問他所欲他曰欲得卿曹拜時賔客求見讓者車常數百乘累日不得通他後至諸奴迎拜徑將他車獨入衆謂他與讓善爭以物賂他他得以賂讓魏武遺令吾婢皆勤苦使著銅雀臺善待之石虎鄴中記曰石勒字世龍上黨郭季子奴也勒未生之前襄國有䜟曰古在左月在右讓言退或入口襄國字也遂治襄國新序曰昌邑王治側鑄冠十枚以冠賜國相及儒者後以冠冠奴龔遂免冠歸之曰王賜儒者冠下至臣今以餘冠冠奴是大王奴虜畜臣也郭子曰賈公閭女悦韓壽問婢識否一婢云是其故主女内懐存想婢後往壽家説如此壽乃令婢通己意女大喜遂與通世説曰鄭𤣥家奴婢皆讀書𤣥嘗使一婢不稱㫖將撻之方自陳説𤣥怒使人曳著泥中須臾復一婢來問曰胡為乎泥中答曰薄言往愬逢彼之怒語林曰裴秀年十八有令望母是婢而嫡母妬猶令秀母親役後大集客秀母下食衆賔見並起拜之答曰微賤豈宜如此當為小兒故耳於是大母不敢復使之又曰石崇厠有十餘婢侍列莫不畢備又與新衣出客多羞不能如厠王敦大將軍往脱故衣着新衣意氣傲然羣婢謂曰此客必能作賊又曰宗岱為青州刺史禁淫祀著無鬼論甚精莫能屈後有書生詣岱與談論書生乃振衣而去曰絶我輩廟食二十餘年君有青牛髯奴所以未得相困耳奴已叛牛已死今日得相制矣言絶而失明日而岱亡搜神記曰諸葛恪已被殺其妻在室問婢曰汝何故血臭婢蹙然後躍至于棟攘臂切齒而言曰諸葛恪公乃為孫峻所殺又曰晉杜世嘏家葬而婢誤不得出十餘年開墓而婢尚生云其始如眠有頃漸覺自謂一再宿初婢之埋年十五六及開冢更生猶十五六也嫁之有子續搜神記曰勾章張然滯役在都有少婦遂與奴通然養一狗甚快後還奴欲謀殺然張弓拔刀當戸然大喚曰烏龍狗遂咋奴頭然取刀殺奴以婦付官梁冀别傳曰梁冀愛監奴秦宫官至太倉令得出入妻所毎見輒屏御者託以言事因通焉内外兼寵刺史二千石皆謁拜之扶風人士孫奮居富冀從貸錢五千萬奮以三千萬與之冀大怒乃告郡縣認奮母為守藏婢云盜白珠十斛紫磨金千斤以叛送收考奮兄弟死於獄中悉没貨財顧譚别傳曰譚為太常録尚書事從交州家無私積奴婢不滿十人杜蘭香傳曰晉太康中蘭香降張碩為詩贈碩云縱轡代摩奴須臾就尹喜摩奴是香御車奴曽忤其㫖是以御碩説如此異録傳曰廬陵歐商行經彭澤湖毎以物投湖中為禮後見湖中有吏着襌衣乘馬云青湖君使要明道至一府舍吏曰青洪君感君禮必有重送者皆勿取但求如願明從之青洪君不得已呼如願送明去如願者神婢也所願輒得數年大富列女傳曰周室大夫仕於周妻淫於鄰人恐主父還覺之為毒藥使媵婢進之婢恐進之則殺主父言之則殺主母因僵仆覆酒主父怒而笞之妻恐婢言之因他過欲殺婢婢就杖將死而不言主父之弟聞之具以告主人殺其妻將納婢以為妻婢辭欲自殺主父乃厚幣嫁之列女後傳曰㑹稽翟素者翟氏之女受聘未及配適遭賊欲犯之臨以刃曰不從者今即死矣素曰我可得而殺不可得而辱素婢名青青乞代素賊遂殺素復欲犯青青曰向欲代素者恐被恥獲害耳今素已死我豈有欲哉賊復殺之漢王褒僮約曰蜀郡王褒以事止寡婦楊惠舍有一奴名便倩行酤酒便曰大夫買便時但要守家不約為他家男子酤酒也褒大怒曰寧欲賣耶奴復曰欲使便皆當上券不上券便不能為也褒乃為券曰奴百役不得有二言晨起早掃飲食洗滌居當守舊縳帚裁盂鑿斗出入不得騎馬載車蹎坐大呶下牀振頭垂釣刈蒭織履作麤黏雀張鳥結網捕魚繳雁彈鳬登山射鹿入水捕龜緩園縱魚雁鶩百餘驅逐鴟鳥持稍牧猪種薑養羊長育豚駒糞除堂廡飲食馬牛鼓四起坐夜半益蒭舍中有客提壺行酤汲水作餔滌杯整壺奴但當飯豆飲水不得嗜酒欲飲美酒唯得染唇口不得傾盂覆斗不得晨出夜入交闗伴偶多取蒲茅益作繩索雨墮無所為當編蔣織植種桃李梨柿柘桑三丈一樹八尺為行果類相從縱横相當果熟收斂不得吮嘗犬吠當起驚告鄰里槍門柱户上樓繫柝持楯曳矛還落三周勤心疾作不得遨遊奴老力索種莞織席事訖欲休當舂一石夜半無事浣衣當白若有錢私主給賔客奴不得有奸私事當聞白奴不聽敎當笞一百讀券文訖辭窮咋索仡仡叩頭兩手自縛目淚下落鼻涕長尺審如王大夫言不如早歸黄土陌蚯蚓鑽額早知當爾為王大夫酤酒真不敢作惡太平御覽卷五百
