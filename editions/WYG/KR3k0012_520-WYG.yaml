body:
  text: 太平御覽卷五百二十宋李昉等􅁧宗親部十夫妻釋名曰夫妻匹敵之義也士庶人曰妻妻齊也夫賤不足以尊稱故齊等言也易家人卦曰夫夫婦婦而家道正又序卦曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦夫婦之道不可以不乆也故受之以恒恒者乆也詩衡門曰豈其食魚必河之魴豈其取妻必齊之姜豈其食魚必河之鯉豈其取妻必宋之子毛氏註曰何必大國之女然後可妻亦取貞順而已又草蟲曰喓喓草蟲趯趯阜螽未見君子憂心忡忡亦既見止亦既覯止我心則降言諸侯大夫妻能以禮自防也又采蘋曰于以采蘋南澗之濵于以采藻于彼行潦于以奠之宗室牖下誰其尸之有齊季女言大夫妻能奉祭祀也又碩人曰碩人其頎衣錦褧衣齊侯之子衛侯之妻又氓曰女也不爽士貳其行士也罔極二三其徳三嵗為婦靡室勞矣夙興夜寐靡有朝矣又棠棣曰妻子好合如鼔瑟琴兄弟既翕和樂且耽宜爾室家樂爾妻孥是究是圖亶其然乎又南山曰藝麻如之何横從其畆取妻如之何必告父母取妻之禮議於生者卜於死者此之謂告析薪如之何匪斧不克取妻如之何匪媒不得此言取妻必待媒乃得也又韓奕曰韓侯取妻汾王之甥蹶父之子韓侯迎止于蹶之里百兩彭彭八鸞鏘鏘不顯其光諸娣從之祁祁如雲韓侯顧之爛其盈門又思齊曰刑于寡妻至于兄弟以御于家邦禮記曰天子之妃曰后諸侯曰夫人大夫曰孺人士曰婦人婦人言服也庶人曰妻妻之言齊也内則曰子甚宜其妻父母不說出宜猶善也子不宜其妻父母曰是善事我子行夫婦之禮焉没身不衰又曰女子二十而嫁有故二十三而嫁故謂父母喪聘則為妻聘問也妻之言齊以禮見問則得與夫敵體奔則為妾又坊記曰取妻不娶同姓為其近禽獸也所以附逺厚别也左傳隐公曰鄭公子忽如陳逆婦媯辛亥以媯氏歸甲寅入於鄭陳鍼子送女先配而後祖鍼子曰是不為夫婦誣其祖矣非禮也何以能育禮逆婦必先告祖廟而後行鄭忽逆婦而後告廟故曰先配而後祖又荘公曰初懿氏卜妻敬仲其妻占之曰吉是謂鳯凰于飛和鳴鏘鏘有媯之後将育于姜五世其昌並為正卿八世之後莫之與京又僖公中曰狄人伐廧咎如赤狄之别種獲其二女叔隗季隗納諸晉公子公子以叔隗妻趙衰生盾文公妻趙衰生原同屏括樓嬰原屏樓三子之邑也趙姬逆盾與其母趙姬文公女也盾狄女叔隗之子也子餘辭子餘趙衰字也姬曰得寵而忘舊何以使人必逆之固請許之來以盾為才固請于公以為嫡子而使其三子下之以叔隗為内子而己下之卿之嫡妻為内子又荘公曰宋華父督見孔父之妻于路目逆而送之曰美而艶又曰楚子滅息以息媯歸生堵敖及成王焉未言未與王言楚子問之對曰我一婦人而事二夫縱不能死其又奚言又成公下曰晉三郤害伯宗譛而殺之初伯宗每朝其妻必戒之曰盗憎主人民惡其上子好直言必及於難又㐮二十五年齊棠公之妻東郭偃之姊也東郭偃臣崔武子棠公死偃御武子以弔焉見棠姜而美之美其色也使偃取之為己取也偃曰男女辨姓今君出自丁臣出自桓不可武子筮之遇困之大過以示陳文子文子曰夫從風風隕妻不可娶也且其繇曰困于石據于蒺藜入于其宫不見其妻凶崔子曰嫠也何􅊣先夫當之矣遂取之又僖公下曰初臼季使過冀見冀缺耨其妻饁之敬相待如賔與之歸言諸文公曰敬徳之聚也能敬必有徳徳以治民請君用之文公以為下軍大夫又昭公七年曰晉叔向適鄭鬷蔑惡欲觀叔向從使之収器者而徃立于堂下一言而善叔向聞之曰必鬷明也下執其手以上曰賈大夫惡取妻而美三年不言御以如皋射雉獲之其妻始笑而言賈大夫曰才之不可以已也我不能射汝遂不言不笑也夫今子少不揚子若不言吾㡬失子矣又哀公上曰齊侯伐晉夷儀敝無存之父将室之辭以與其弟無存齊人也室之為取婦也曰此役也不死反必娶於髙國高氏國氏齊貴族也無存欲必有功還娶卿相之女也又成公上曰齊晉戰于鞌齊師敗績齊侯見保者曰勉之齊師敗矣避女子女子曰君免乎曰免矣曰鋭司徒免乎曰免矣曰苟君與我父免矣可若何乃奔齊侯以為有禮既而問之辟司徒之妻也予之石􅐎又成公下曰魯聲伯之母不聘穆姜曰吾不以妾為姒生聲伯而出之嫁于齊管于奚生二子而寡以歸聲伯以其外弟為大夫而嫁其外妹於施孝叔郤犨来聘求婦於聲伯聲伯奪施氏婦以與之婦人曰鳥獸猶不失伉儷子将若何曰吾不能死亡婦人遂行生二子於郤氏郤氏亾晉人歸之施氏逆諸河沈其二子婦人怒曰己不能庇其伉儷而亡之又不能字人之孤而殺之将何以終春秋漢含孳曰水火交感隂陽以設夫婦象也水火則隂陽也隂陽則夫婦也又曰妻象太隂臣法金位金隂中之剛故喻臣位水能純柔純柔妻象也戰國䇿曰鄒忌長八尺有餘身體逸麗朝服衣冠窺鏡謂其妻曰我孰與城北徐公美徐公齊國之美麗者也妻曰愈窺鏡而自視不如逺矣暮寝而思之吾妻之美我私我也史記曰晉重耳謂其妻曰待我二十五年不来乃嫁其妻笑曰犂二十五年吾冡上栢大矣雖然妾待子又曰易基乾坤詩始闗雎夫婦之際人道大倫也禮之用唯婚姻為重又曰張儀已學而逰說諸侯嘗從楚相飲已而楚相亡璧門下意儀曰儀貪無行資必此人盗相璧共執儀掠笞數百不服釋之其妻曰嘻子無讀書遊說安得此辱乎張儀謂妻曰視吾舌尚在否其妻笑曰舌在也儀曰足矣乃遂入秦秦王以為客卿又曰吴起好用兵事魯君齊人攻魯欲将起以起取齊女為妻而疑之起欲就功遂殺其妻以明不與齊魯卒以為将攻齊大破之又曰外黄富人女甚美嫁庸奴亡其夫徐廣曰一云其夫亡去抵父客如淳曰父時故賔客父客素知張耳乃卒為請决嫁之張耳是時脫身㳺女嫁厚奉給張耳以故致千里客及官魏為外黄令名由此益賢漢書曰楊惲報孫㑹宗云家夲秦也䏻為秦聲婦趙女也雅善鼔瑟又曰京兆尹張敞為婦畫眉長安中𫝊京兆眉嫵有司以奏敞宣帝問之對曰臣聞閨房之内夫婦之私有過畫眉者范􅁮後漢書曰鮑宣妻者桓氏之女也字少君宣嘗就學少君父竒其清苦故以女妻之装送甚盛宣不悅謂妻曰少君富驕而吾貧不敢當妻曰大人以生守約故使妾侍巾櫛既承君子惟命是從乃悉歸御服更衣短布裳與宣共挽􅎷車歸鄉里拜姑提甕出汲後漢書曰班昭作女誡馬融善之令妻女習焉又曰沛周郁妻者字阿閑於婦道而郁驕淫輕譟多行無禮郁父偉謂阿曰新婦賢者女當以道匡夫郁之不改新婦過也阿拜而受命退謂左右曰我無樊衛二姬之行故君以責我我言而不用君必謂我不奉教令則罪在我矣若言而見用是為子違父而從婦則罪在彼矣乃自殺又曰馮良有志行與妻子相遇如君臣又曰曹操攻吕布布欲降而陳宫等自以負罪於操深沮其計謂布曰曹公逺来勢不能乆将軍若以歩騎出屯於外宫将餘衆閉守於内若向将軍宫引兵而攻其背若但攻城則将軍救於外可破也布然之布妻曰昔曹氏待公臺如赤子猶舎而歸我今将軍厚公臺不過於曹而欲委全城捐妻子孤軍逺出乎若一旦有變妾豈為将軍妻哉布乃止又曰酈炎風病恍惚性至孝遭母憂疾甚發動妻始産而驚死妻家訟之收繋獄炎病不能治對遂死獄中尚書盧植為之誄讃以昭其懿又曰公孫述連徴任永馮信並託青盲以避世難永妻媱於前匿情無言見子入井忍而不救信侍婢亦對信姦通及聞述誅皆盥洗更視曰世適平目即清媱者皆自殺又曰周澤為太守嘗卧疾齋居其妻哀澤老病闚問所苦澤大怒以妻干犯齋禁自收送詔獄謝罪世疑其偽激時人為之語曰生世不諧作太常妻一嵗三百六十日三百五十九日齋一日不齋醉如泥又曰戴封字平仲年十五詣太學師事東海申君申君卒送喪到東海邊嘗經其家父母以封當還預為娶妻封蹔過拜親不宿而去又曰河南尹王調洛陽令李阜與竇憲厚善縱放自由尚書僕射樂恢劾奏調阜并及司𨽻校尉諸所刺舉無所廻避貴戚惡之妻每諫恢曰昔人有容身避害何必以言取怨恢嘆曰吾忍素餐立人之朝乎又曰更始尚書謝躬初其妻知世祖不平常戒躬曰君與劉公積不相能而信其虛談不為之備終受制躬不納竟為世祖所擒又曰河南樂羊子之妻者不知何氏之女也羊子嘗行路得遺金一餅還以與妻妻曰妾聞志士不飲盗泉之水亷者不受嗟来之食况拾遺求利以汚其行乎羊子大慙乃捐金於野而逺尋師學一年来歸妻跪問其故羊子曰乆行懐思無他異也妻乃引刀趨機而言曰此織生自蠶繭成於機杼一絲而累以至於寸累寸不已遂成丈匹今若㫁斯織也則損失成功稽廢時月夫子積學當日知所亡以就懿徳若中道而歸何異㫁斯織乎羊子感其言復還終業遂七年不反又曰魏朗字仲明入為尚書舉動皆有禮序室家相待如賔與子孫如嚴君焉又曰曹世叔妻班彪之女名昭字惠班召入宫號曰大家每有貢獻遣大家作賦頌注列女𫝊著女誡及詩並行於時魏志曰初司馬宣王勒兵從闕下趨武庫當曺爽門人逼車住爽妻劉氏即出至㕔事謂帳下守督曰公在外今兵起何如督曰夫人勿憂乃上門樓引弩注箭欲發将軍孫謙在後牽止之曰天下事未可知如此者一二宣王遂過又曰郭淮字伯濟太原河曲人拜車騎将軍封曲陽侯淮妻王陵之妹當從坐侍御史往收羌胡渠帥数千人叩頭請淮欲表留其妻淮不從妻就道莫不流涕人人扼腕刼留之淮五子叩頭流血請淮淮不忍視乃遣妻還淮以書白司馬宣王曰五子哀母不惜其身若無其母是無五子亦無淮也書至宣王亦宥之魏氏春秋曰許允為吏部郎𨕖郡守明帝疑其所用非次召入将加罪允妻阮氏跣足謂曰明主可以理奪難以情求允之入帝怒詰之對曰某郡太守雖滿文字先至年限在後日限在前帝取事視乃釋遣出望其衣敗曰清吏也賜之衣允之出為鎮北也喜謂其妻曰吾知免矣妻曰禍見於此何免之有魚豢魏略曰桓範字彦則沛郡人也使持節督青徐諸軍鎮下邳與徐州刺史鄒岐争屋引節欲斬岐為岐所奏不直坐免當轉為冀州刺史属鎮北将軍吕昭謂其妻仲長曰我寕作諸卿向公長跪耳不能為吕子展屈也其妻曰君前在東坐欲擅斬徐州衆人謂君難為作下今羞為吕屈是復難為作上範怒觸其實乃以刀鐶撞其腹妻時懐孕遂傷胎死又曰常林字伯槐河内人也少好學為諸生帶經而鋤其妻常自餉饋雖在田野相敬如賔晉書曰元康中梁國女子許嫁已受禮聘尋而其夫戍長安經年不歸女家更以適人女不樂行其母逼强不得已而去尋復病亡後其夫還逕至女墓不勝哀情便發塜開棺女遂活因與俱歸後夫聞知詣官争之所在不能决祕書郎王導議曰此是非常事不得以常理斷之宜還前夫朝廷從其議又曰謝安妻劉惔妹也既見家門富貴而安獨静退乃謂曰丈夫不如此也安掩鼻曰恐不免耳世說又載又曰吳隐之為晉陵太守妻負薪冬月無被欲浣衣即披絮紡績以供朝夕又曰王凝之妻謝氏字道韞奕之女也初適凝之還甚不樂奕曰王郎逸少子不惡汝何恨也荅曰一門叔父則有阿大中郎羣從兄弟則有封胡羯末不意天壌之中乃有王郎又曰王導為丞相妻曹氏性妒導甚憚之乃宻營别館以處衆妾曹氏知而将往焉導恐妾被辱遽命駕猶遲之以所執麈尾柄驅牛而進司徒蔡謨聞之戯𨗳曰朝廷欲加公九錫導弗之覺但謙退而已謨曰不聞餘物惟有短轅犢車長柄麈尾導大怒謂人曰徃與羣賢共遊洛中何曽聞有蔡克兒也崔鴻前秦録曰秦州刺史竇滔妻彭城令蘇道之女有才學織錦製廻文詩以贖夫罪劉向列女傳曰魯有秋胡子既納妻五日而官於陳五年乃歸未至家見路傍有美婦人採桑秋胡子恱之下車謂曰若曝獨採桑吾行道逺願託桑䕃下一飡於是下齎休焉婦人採桑不輟秋胡子謂曰力田不如逢年力桑不如見郎今吾有金願以與夫人婦人曰嘻夫採桑力作紡績織紝以供衣食奉二親養夫子而已矣吾不願人之金所願事上無有外意妾事夫家亦無淫佚之志子去矣収子之齎與子笥金秋胡子遂去歸至家奉金遺母母使人喚其婦至乃向採桑者也秋胡子見之而慙婦曰子束髪辭親往任五年乃還當懽喜乍馳乍驟揚塵疾至思見親今者乃悅路傍婦人而下子之装以金予之是忘父母也􅁯父母不孝好色淫佚是汚行不義夫事親不孝則事君不忠處家不義則治官不理孝義並忘於身心不遂妾不忍見不孝不義之人子改妻矣妾亦不改遂去東而走自投於河而死又曰晉伯宗妻者晉大夫伯宗之妻也謂伯宗曰子之性固不可易也且國家多貳其危可立而待也子何不豫結賢大夫以託州犂焉伯宗子也伯宗曰諾乃得畢羊而友之及亦不忌之難三郤害伯宗譛而殺之畢羊乃送州犂于荆遂得免焉太平御覽卷五百二十
