  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_809-1a, image: WYG0900/WYG0900-0178a.png}
body:
  text: 太平御覽卷八百九宋李昉等撰珍寳部八琅玕火齊碧瑶瑊珉木難碝石璿瑰玫瑰武夫金琅玕孝經援神契曰神靈滋則琅玕景朱均注曰事神明得理則琅玕有光爾雅曰西北之美者則崑崙之璆琳琅玕焉說文曰琅玕石之似玉者魏略曰大秦國出琅玕山海經曰開明東有琅玕樹管子曰崑崙墟不朝請以璆琳琅玕為弊簮珥而千金琳琅玕也然後八十里之崑崙可令而朝也淮南子曰崑崙侵城九重琅玕樹在其東拾遺記曰崑崙山傍有瑶臺上有琅玕璆琳之玉煎可以為脂本草經曰青琅玕一名珠圭張衡南都賦曰珍羞琅玕充溢員方王延夀魯靈光殿賦曰駢宻石與琅玕齊玉璫與璧瑛盧諶朝霞賦曰相神之於􅘵洲琅玕於層城火齊說文曰火齊玟瑰也韻雅曰琉璃火齊珠也漢書故事曰上起神屋綴以火齊吳録曰西倦縣有火齊如雲母重沓可開黄似金南州異物志曰火齊出天竺狀如雲母色如紫金離别之節如蟬翼積之如紗縠重沓張衡西京賦曰翡翠火齊絡以美玉碧孝經援神契曰神靈滋液則碧玉出廣雅曰碧有縹碧緑有碧出越嶲雲説文曰碧石之美者漢書曰宣帝時或言益州有金馬碧雞之神可醮而致之於是遣王褒持節求焉金形似馬碧形似雞紀年曰惠成王七年雨碧于郢漢武故事曰帝起神屋基及戸悉以碧石魏略曰大秦國出碧晉大康地記曰雲南青蛉縣出碧異苑曰越嶲㑹無縣元馬河畔有祠中有碧珠若不祭祀取之不祥莊子曰萇𢎞死于蜀藏其血三年化為碧司馬彪曰萇𢎞忠而死故其血不朽而化為碧也矯世論曰碧似玉惟以蝢别之張衡羽獵賦曰乘瑶珠之雕軒建輝天之華旗左思吴都賦曰紫貝流黄縹碧素玉也又蜀都賦曰其珠則有青珠黄環碧弩芒消張衡南都賦曰緑碧紫英青艧丹粟劉琨與兄弟書曰單于但欲得碧汝不可不檢送瑶尚書禹貢曰揚州厥貢瑶琨毛詩曰投我以木桃報之以瓊瑶説文曰瑶石之美者山海經曰章義之山是多瑶之屬劉公幹清慮賦曰憑文瑶之几對精金之盤馬融廣成賦曰鎮以瑶臺純以金提張衡四愁詩曰美人贈我金錯刀何以報之美瓊瑶石瑊廣雅曰瑊石次玉也山海經曰葛山之下多瑊石郭璞注曰瑊玏似玉之石司馬相如子虛賦曰其石則瑊玏𤣥厲玏音力也珉禮記聘義曰子貢問於孔子曰敢問君子貴玉而賤珉者何也為玉之寡而珉之多與孔子曰非為珉之多故賤之也玉之寡故貴之也夫昔者君子比徳於玉焉説文曰珉石之次玉也司馬相如子虛賦曰其玉則琳珉昆吾木難𤣥中記曰木難出於大秦廣志曰木難珠其色黄生東夷南越志曰木難金翅鳥口結沬所成碧色珠也大秦土人珍之曹植樂府詩曰珊瑚間木難碝石禮記玉藻曰士珮碝而緼組綬璿瑰山海經曰沃民之國爰有璿瑰瑶碧玟瑰廣雅曰神靈滋液百寳用則玫瑰出魏略曰大秦國出玟瑰班彪上事曰吏民葬埋有馬被毛鬛角蹄玟瑰宜皆以法禁之司馬相如子虛賦曰其石則赤玉玟瑰武夫廣雅曰武夫石次玉也戰國策曰西門豹為鄴令魏文侯曰夫物多相類而非白骨疑象武夫類玉漢書曰董仲舒曰五霸之比三王猶武夫之與羙玉也山海經曰㑹稽之山其上多砆石廣志曰武夫有白黒以為枋碁杜年相風賦曰太僕𫝊侯命余賦之誠知武夫非付寳之倫長庚啟明非曜靈之匹金上說文曰金五色金也黄金為之長久埋不生衣百陶不輕從革不違西方之行也生于土從土左右注象金在土中形釋名曰金禁也氣剛毅能禁制物也舜典曰金作贖刑禹貢曰淮海惟揚州厥貢惟金三品金銀銅也洪範曰五行四曰金從革作辛周禮考功記曰攻金之工築氏執下齊冶氏執上齊鳬氏為聲㮚氏為量叚氏鑄器桃氏為刃鄭𤣥注曰多錫為下齊少錫為上齊金有六齊六分其金而錫居一謂之鍾鼎之齊五分其金而錫居一謂之斧斤之齊四分其金而錫居一謂之戈㦸之齊三分其金而錫居一謂之大刃之齊五分其金而錫居一謂之制殺之齊金錫半謂之鍳燧之齊鍳鏡也金多錫刃白且明毛詩魯頌泮水曰憬彼淮夷來獻其琛元龜象齒大賂南金周易噬嗑卦曰六五噬乾肉得黄金鼎卦曰六五鼎黄耳金鉉利貞上繫曰二人同心其利斷金又說卦曰乾為金爾雅曰黄金謂之盪其美者謂之鏐餅金謂之鈑純澤謂之銑美金最有光澤西南之美者有華山之金石焉史記秦本記曰獻公十八年雨金櫟陽公自以得金瑞故作鄜畤於櫟陽祀白帝又曰秦始皇帝葬驪山以黄金為鳬鴈又曰衛鞅入秦孝公以鞅為左庶長卒定變法令乃立三丈之木於國都市南門募民有能徙置北門者予五十金有一人徙之輙予五十金以明不欺又曰吕不􅅊乃使其客人人著所聞號吕氏春秋布咸陽市門懸千金其上有能增損一字者予千金又曰項羽以陳平為信武君擊殷而還拜為平都尉賜金三十鎰居無何漢攻下殷項王怒將誅定殷者平懼廼封其金與印使歸間行仗劒亡渡河又曰漢王與陳平金四萬斤以間疎楚君臣不問其出入也又曰吳楚反孝景以竇嬰為大將軍賜金千斤嬰陳之廊廡下軍吏過輙令材取為用無入家者漢書曰文帝初立以陳平為丞相位第二賜平金千鎰封三千戶又曰梁孝王未死時金以巨萬計不可勝數及死藏府餘黄金尚三十萬斤又曰季布為任俠有名楚人諺曰得黄金百不如季布諾又曰董偃見寵館陶長公主安陵袁叔謂偃曰顧成廟逺無宿宫何不白主獻長門園於上董君入言主獻之上大悦更名為長門宫公主大喜使董君以黄金百斤為袁叔夀又曰武帝即位欒大曰臣之師曰黄金可成而河可塞又曰衛青北伐將十餘萬衆擊破斬首虜之士為賜黄金三十萬斤又曰劉尚字子政本名更生宣帝時更生言黄金可成上令典尚方鑄作事費多方不驗又曰直不疑為即其同舍郎有告歸誤持同舍郎金主意不疑不疑買金償之而告歸者來歸金亡者大慙又曰韋賢少子𤣥成復以明經歴任至丞相故鄒魯諺曰遺子黄金滿籯不如一經又曰尹翁歸卒家無餘財天子賢之賜歸子黄金百斤尸奉其祭祀又曰疎廣徙為太傅兄子受為少傅父子並為師傅俱乞骸骨皆許之加賜黄金二十斤皇太子賜以五十斤又曰秦幣黄金方寸而重一斤以鎰為名金為貨夏殷無問周黄金方寸而重一斤故貨寳於金武帝時衛青擊匈奴斬捕首虜賜黄金二十餘斤又曰王莾敗省中黄金萬斤者一匱尚六十匱續漢書曰扶風人有孫奮居富而性恡梁兾認􅁬母為其守藏婢云盗紫金千斤又曰楊震為東萊太守道經昌邑初震舉荗才王宻時為昌邑令謁見至夜懐金十斤以遺震震曰故人知君君不知故人何也宻曰暮夜無知者震曰天知神知子知我知何謂不知宻愧而去又曰張奐遷安定属國都尉羗豪帥感奐恩徳上馬二十疋先零酋長遺金渠八枚奐受之而召主簿於諸羗前以酒酧地曰使馬如羊不以入廐使金如粟不以入懐悉以金馬還之太平御覽卷八百九
