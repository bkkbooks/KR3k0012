body:
  text: 太平御覽卷九百四十五宋李昉等撰蟲豸部二蚊説文曰秦謂之蚋楚謂之蚊大戴禮夏小正曰丹鳥羞白鳥白鳥蚊也漢書曰中山靖王朝天子置酒聞樂聲而泣問其故靖王對曰臣聞衆喣漂山聚蚊成雷後漢書曰趙炳有道術人服從者如歸章安令惡其惑衆収殺之人為立祠堂於永康至今蚊蚋不敢入也晉書曰道安曰猛虎道食不覺蚊蝱來唐史曰江東有吐蚊鳥夏夜鳥吐於蘆荻中湖湘尤甚晏子曰東海有蟲巢蚊睫再乳而飛蚊不驚名曰焦螟列子曰江浦之間生麽蟲麽細也名曰焦螟羣飛而集於蚊睫弗相觸也又曰焦螟生於蚊睫離珠子羽拭眼而望弗能見也莊子曰夫愛馬者以筐盛矢以蜄盛溺適有蚊蝱僕縁而拊之不時則缺銜毁首碎胸又曰肩吾見狂接輿狂接輿曰日中始可以語汝肩吾曰告我君人者以已出經式義度民孰敢不聽而化接輿曰是欺德也其於治天下也猶涉海鑿河而使蚊負山也又曰孔子見老聃而語仁義老聃曰夫播糠眯目則天地四方易位矣蚊蝱噆音匝膚則通宵不寐矣淮南子曰夫貴賤之於身也猶條風之時麗也時麗猶一過也毁譽之於己也猶蚊䖟之一過也又曰蜂蠆螫指而神不能掞音淡􅀢音文䖟噆膚噆齧也而性不能平令憂患之來嬰人心也非直蜂蠆之螫毒而􅀢䖟之㦧音悛怛也而欲静莫虛無柰何哉牟子曰昔公明儀有牛彈清角之操伏食如故轉為􅀢䖟聲則翹尾而躡蹀夏侯子曰一螘之行一蚊之飛聖人皆知之金樓子曰荆州髙齋盛夏之月無白鳥余至寢處於其中及移餘齋則聚蚊之聲如雷矣數丈之間如此之異吁可怪哉又曰白鳥蚊也齊桓公卧於柏寢謂仲父曰吾國富民殷無餘憂矣一物失所寡人猶為之於邑白鳥營營饑而求飽寡人因之開翠紗之帳進蚊子焉其蚊有知禮者不食公之肉而退其蚊有知足者㗱子立切公之肉而退其蚊有不知足者遂長噓短吸而食之及其飽也腹腸為之破潰公曰嗟乎民生亦猶是也孝子傳曰呉猛年七嵗時夏日伏於母牀下恐蚊䖟及父母蕭廣濟孝子傳曰鄧展父母在牖下卧多蚊展伏牀下以自當神異經曰南方蚊翼下有小蜚蟲焉目明者見之每生九卵復成九子蜚而俱出蚊初不知論衡曰蚊䖟不如牛馬之力牛馬困於蚊䖟蚊䖟有勢也搜神記曰呉猛性至孝小兒時在父母邉卧夏時多蚊蚋而終不揺扇恐蚊䖟去已而及父母嶺南異物志曰嶺表有樹如冬青實在枝間形如枇把子每熟即拆裂蚊子羣飛唯皮殻而已士人謂之蚊子樹嶺表録異曰蚊母鳥形如青鷁觜大而長於池塘捕魚而食每呌一聲則有蚊蚋飛出其口俗云採其翎為扇可辟蚊子亦呼為吐蚊鳥䖟晉書曰惠帝時洛陽南山有虻作聲曰韓屍識者以為韓氏將屍戮俄而韓謐被誅淮南子曰䖟戢精血以類推之也許慎曰䖟食血又曰䖟附驥致千里而不飛無糗糧之資而不饑又曰上古之時冬日則不勝霜雪霧露夏日則不勝暑熱􅀢䖟蚋梁書曰梁武丁貴嬪諱令光譙國人也初貴嬪少時與鄰女月下紡績諸女病患蚊蚋而貴嬪弗之覺也又曰孫謙居身儉素牀施籧篨屛風冬則布被筦席夏曰無帷帳而夜卧未嘗有蚊蚋人多異焉列子曰目將𦕈者先睹秋毫耳將聾者先聞蚋飛淮南子曰函牛之鼎沸而蠅蚋弗敢入函牛受一牛之鼎也崑山之玉􅀈崑山崑崙也􅀈式也而塵垢弗能汙也又曰羊肉不慕蟻蟻慕於羊肉羶也醯酸不慕蚋而蚋慕於醯酸也吕氏春秋曰􅇲醢黄蚋聚之有酸黄猶言美也徒水則必不可以狸致鼠以氷致蠅雖上聖不能以茹魚去蠅蠅愈至茹女居反臭也不可禁以致之之道去之也蜉蝣毛詩曹蜉蝣曰刺奢也蜉蝣之羽衣裳楚楚蜉蝣渠畧也朝生夕死猶有羽翼以自修飭楚楚鮮明貌爾雅曰蜉蝣渠畧似蛣蜣身狹而長角黄黒色叢生糞土中朝生暮死豬好啖之說文曰秦晉之間謂蜉蝣朝生暮死郭璞注曰似天牛而小有角也又曰􅀈音畧蟲也一名蜉蝣為渠畧陸璣毛詩疏義曰蜉蝣方土通謂之渠略似甲蟲有角大如指長三四寸甲下有翅能飛夏月隂雨時地中出今人燒炙噉之美於蟬也樊光曰是糞中蝎蟲隨時而出朝生而夕死淮南子曰龜三千嵗蜉蝣不飲食三日而死以蜉蝣為龜憂養生之具必失之廣志曰蜉蝣可燒啖美於蟬蜉蝣在水中翕然生覆水上尋死隨流而去傅咸蜉蝣賦曰讀詩至蜉蝣感其雖朝生暮死而能修其翼可以有興遂賦之王褒聖主得賢臣頌曰蟋蟀候秋吟蜉蝣出以隂蠛蠓爾雅曰蠓蠛蠓小虫似蚋喜亂飛漢實録曰周太祖軍至北郊時慕容彦超自負沉勇謂上曰北來部將臣盡諳知以臣觀之蜉蝣蠛蠓耳列子曰朽壤之土春夏之月蠛蠓者因雨而生見陽而死莊子曰孔子聞老􅔶之言出告顔回曰丘之於道也其猶醯雞歟淮南子曰衰世則聚䖝蒲野許質曰飛虫蠛蠓抱朴子曰蠓蟈之育於􅀈酢芝檽之産於木石螛􅔒之滋於洿翠蘿之老於松枝非彼四物所創造也字書曰蠛蠓小蟲雨如舂風如磑者也蝴蝶北齊書曰魏收嘗在洛京輕薄尤甚人號云魏収驚蛺蝶文襄曾遊東山令給事黄門侍郎等宴文襄曰魏収博才無宜適須出其短往復數番収忽大唱曰楊遵彦理窟已倒遵彦從容曰我綽有餘暇山立不動若遇當塗恐翩翩遂遊當塗者魏翩翩者蝶也文襄先知之大笑稱善南史曰沈麟士年過八十耳目猶聰明以反故抄冩火下細書復成二三千卷滿數十篋時人以為養身靜嘿所致仍製黒蝶賦以寄意漢實録曰右監門街大將軍許􅁶言臣奉命博州至博平縣東村有塜彌亘數里一夕言並化蝶飛去列子曰烏足以根為躋螬其葉為蝴蝶莊子曰昔周夢為蝴蝶栩栩然蝴蝶也不知周也俄覺則蘧蘧然周也不知周之夢為蝴蝶與蝴蝶之夢為周與周與蝴蝶則必有分也此謂物化抱朴子曰髻孺背千金而逐蛺蝶越人棄八珍而甘龜蛇金樓子曰陳思之文羣才之俊而武帝誄云尊靈永蟄明帝頌云聖體浮輕夫浮輕有似於蝴蝶永蟄頗擬於昆蟲施之尊德不其謬乎崔豹古今註曰蛺蝶一名野娥一名風蝶江東謂之撻末白色背青者是也其大如蝙蝠者或黒色或赤斑名曰鳯子一名鳯車一曰鬼車生江南甘橘園中廣五行記曰晉安帝義熙中烏傷人葛輝在妻家宿三更有兩人把火逕至堦前疑是惡人便打之欲下杖悉化為蝶繽紛飛散有一物衝輝脇下便打倒地輝少時而死嶺南異物註曰嘗有人浮南海泊於孤岸忽有物如蒲帆飛過海將到舟竟以物繋之如帆者盡破碎墜地視之乃蛺蝶也海人去其翅足稱之得肉八十觔噉之極肥美嶺表録異曰鶴子草蔓上春生雙虫只食其葉越女収於粧奩中養之如蠶摘其葉飼之蟲老不食而蛻為蝶蝶赤黄色婦女収而帶之謂媚蝶螢毛詩豳七月曰町畽鹿塲熠燿宵行螢火也大戴禮夏小正月丹鳥羞白鳥丹鳥也者謂丹良也白鳥也者謂蚊蚋也其謂之鳥者重其養也凡有翼者為鳥羞也者進也禮記月令曰季夏之月腐草為螢爾雅曰螢火即炤夜飛腹下有火音照廣雅曰景天螢火燐也續晉陽春秋曰車𦙍字武子好學不倦家貧不常得油夏月則練囊盛數十螢火以夜繼日焉後漢書曰光熹元年秋張讓段珪刼少帝及陳留王恊走小平津帝與王夜步逐螢火光行數里得民家露車共乘還宫隋書曰大業十二年煬帝幸景華宫徴求螢火得數斛夜出遊山而放之光遍巖谷崔豹古今注曰螢一名輝夜一名景天一名熠燿一名燐一名丹良一名夜光一名宵燭腐草為之食蚊蚋焉月令曰丹鳥羞白鳥即蚊也丹鳥螢也説文秦人謂蚊曰蚋淮南萬畢術曰螢火却馬註云取螢火裹以羊皮置土中馬見之鳴却不敢行祖台之志怪曰晉懷帝永嘉中譙國丁祚渡江至隂陵界時天昏霧在道北見一物如人倒立兩眼垂血從頭下墮地兩處各有升餘祚與從弟齊聲喝之滅而不見立處聚血皆化為螢火數千枚縱横飛本草經曰螢火一名夜光一名即照一名熠燿潘岳螢火賦曰爛若飛電之宵逝􅀈音衛如移星之雲流動集陽暉灼如隋珠熠熠熒熒若丹英之初葩飄飄熲熲若流金之在沙傅咸螢火賦曰余曾獨處夜不能寐顧見螢火意遂有感於是執以自炤而為之賦其辭曰感詩人之攸懷兮覽熠燿於前庭不以資質之鄙薄兮欲增輝乎太清雖無補於日月期自照於陋形螟蛉毛詩節小宛曰螟蛉有子蜾蠃負之螟蛉柔虫也蜾蠃蒲盧也負持也箋云蒲盧取桑蟲之子負持而去煦嫗養之以成子毛詩義疏曰螟蛉似步屈其色青細小或在草葉上土蜂取之置本穴中或書卷間筆筒中七日而成其子俚語曰祝云象我象我陸璣毛詩疏義曰螟蛉犍為文學舍人曰桑土小青蟲也似步屈郭璞注方言曰尺蠖亦呼步屈其色青而細小或在草木葉上今蜾蠃所負為子者爾雅曰螟蛉桑蟲也俗亦謂桑虫亦曰戎女蠮螉爾雅曰蜾蠃蒲盧也郭璞注曰細腰蜂也俗呼為蠮螉音咽翁陸璣毛詩疏義曰蜾蠃土蜂一名蒲盧似蜂而小腰故許慎云細腰蜂也禮記中庸曰哀公問政於孔子孔子對曰文武之政布在方策其人存則其政舉其人亡則其政息人道敏政地道敏樹夫政也者蒲盧也蒲盧蜾蠃土蟲也取螟蛉而化之以為子為政化百姓亦如蒲盧也故為政在人揚子法言曰螟蛉之子殪而逢蜾蠃祝曰類我乆則肖之矣速哉七十子之肖仲尼也肖類也太平御覽卷九百四十五
