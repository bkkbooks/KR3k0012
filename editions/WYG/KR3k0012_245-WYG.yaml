  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_245-1a, image: WYG0895/WYG0895-0237c.png}
body:
  text: 太平御覽卷二百四十五宋李昉等撰職官部四十三太子賔客太子詹事太子少詹事太子中庶子太子左右庶子太子賔客六典曰太子賔客掌侍從規諫贊相禮儀而先後焉凡皇太子有賔客宴㑹則為之上齒漢書曰髙祖欲廢太子吕后用張良計致商山四皓以為賔客又孝武帝為太子立博望苑以通賔客則其義也太子詹事六典曰太子詹事之職掌統東宫三寺十率府之政令辨其綱紀而修其職務少詹事為之貳凡太子立官之典制皆視其事而承受焉俗説曰江夷為右僕射主上欲用其領詹事語王淮卿可覓比例淮對曰臣當出外尋訪淮後見主上問近所道事卿已得比例未淮曰唯謝琰右僕射領詹事琰即謝公之子恐夷非其例事遂不行應劭漢官儀曰詹事秦官詹省也給也秩比二千石漢書曰竇嬰字王孫景帝即位為詹事帝弟梁孝王母竇太后愛之孝王朝酒酣上從容曰千秋萬嵗後𫝊王太后歡嬰引巵酒進上曰天下者髙帝天下父子相傳漢之約也上何以得𫝊梁王太后由是憎嬰又曰孔光父霸字次孺宣帝時以授太子經為詹事又曰詹事掌皇后太子家有丞屬諸官屬焉成帝鴻嘉三年帝省詹事屬大長秋晉書曰卞壼為詹事世稱卞壼裁斷切直敷實忠於事上者也晉起居注曰武帝以王恭丹陽尹領詹事恭譲表曰今皇儲始建四方是式總司之任崇替所由宜妙簡才賢盡一時之勝豈臣最庸所可叨忝晉公卿禮秩曰太始中立詹事掌宫事沈約宋書曰詹事一人初領官屬成帝時悉屬少傅魏氏置詹事總衆職晉初又屬二傅咸寧復置詹事齊職儀曰詹事品第三茂陵書秩二千石銀章青綬局擬尚書令位視領䕶将軍陳書曰後主欲以江總為太子詹事令管記陸瑜言之於孔奐謂瑜曰江有潘陸之華而無園綺之實輔弼儲宫竊有所難瑜具以白後主後主深以為恨乃自言於髙宗将許之奐乃奏曰江總文華之人今皇太子文華不少無藉於總如臣愚見願選端重之才以居輔導帝曰即如卿言誰當居此奐曰都官尚書王廊世有懿徳賦性敦敏可以居太子詹事奐又奏曰宋朝范曄即范泰之子亦為太子詹事前代不疑後主固爭之帝卒以總為詹事唐書曰蘇弁改太子詹事弁初入朝班位失序殿中侍御史鄒儒立對仗彈之弁於金吾待罪數刻特釋放舊制太子詹事班次太常宗正卿之下貞元三年御史中丞竇參敘定班位移詹事在河南太原尹之下弁乃引舊班制立臺官詰之乃紿曰已白宰相請依舊故儒立弹之又曰龍朔二年改詹事為端尹詹事府為端尹府王珉答徐邈曰詹事彈一宫官如尚書奏丞矣太子少詹事唐書曰張行成轉太子少詹事太宗東征皇太子於定州監國事即行成本邑也太子謂行成曰今者送公衣錦還鄉於是令有司祀其先人墓太子中庶子漢書百官表曰太子中庶子職侍中漢書曰王商字子威涿郡蠡吾人商少為太子中庶子以肅敬見稱又曰歐陽地餘字長賔為中庶子授皇太子經又曰馮野王通詩以父任為太子中庶子魏志曰鮑勛字叔業清白有髙節知名當世為中庶子在東宫正色不撓蜀志曰後主立太子璿以霍戈為中庶子璿好馳射出入無度戈援引古事盡言規諫甚得切磋之體吳志曰孫登為太子時太傅張温言於權曰夫中庶子官最親宻切問近對宜用俊彦於是乃用陳表等為中庶子後又以庶子禮拘拘復令勅中侍坐又曰羊衜初為中庶子年二十時廷尉監殷蕃結交豪傑自衛将軍全宗等皆傾心敬待惟衜及宣詔郎楊廸拒絶不與通時人怪之而蕃后叛逆衆乃服之晉書曰安平王為魏太子中庶子魏武帝崩太子號哭過甚孚諫曰大行晏駕天下恃殿下為命當上為宗廟下為萬國奈何効匹夫之孝太子良久乃止曰卿言是也時羣臣初聞帝崩相聚號哭無復行列孚厲聲於朝曰今大行晏駕天下震動當早拜嗣君以鎮海内而但哭耶孚與尚書和洽奉太子以即位是為文帝又曰温嶠為中庶子獻侍臣箴甚見補益又曰王恂啓以桓謙為中庶子曰東宫之選中庶子管總門下尤不可不得其才也晉起居注曰武帝咸寧元年特下詔曰皇甫謐沉静履素守學好古與流俗異趣其以謐為太子中庶子晉中興書曰殷仲堪少好學能清言善屬文人士咸欽愛之以孝行稱烈宗聞其名召為太子中庶子甚相知愛又曰温嶠拜太子中庶子嶠在東宫特見嘉寵僚屬莫與為比嶠與阮放等共勸太子遊談老荘不教以經史太子甚愛之數規諫諷議又曰肅宗之在東宫孔演領太子中庶子于時中興肇構庶事草創演經學淵博該識舊章朝儀軌制多取正焉由是元明二帝並親愛之沈約宋書曰中庶子漢置古者世禄卿大夫之子即為副倅謂之國子天子諸侯世子必有庶子官以掌教之齊書曰袁粲言於帝曰臣觀張緒有正始遺風宜為宫職復轉庶子陳書曰王瑒父冲嘗為瑒辭領中庶子世祖顧謂冲曰所以久留瑒於承華正欲使太子微有瑒風法耳唐書官品志曰中庶子四人功髙者一人為祭酒行則負璽前後部䕶駕陶氏家𫝊曰侃遷太子中庶子君少而好學善談𤣥理尤明詩易以孝行聞於時儲選殊難其人特召君焉山公啓事曰中庶子缺宜得儁茂者以濟隂太守留儼城陽太守石崇參選晉齊王攸與山濤書曰太子中庶子東宫顯職侍接左右誠宜得篤粹有行檢之人必允衆望太子左右庶子六典曰左庶子之職掌侍從贊相駮正啟奏中允為之貳凡皇太子從祀朝㑹則版奏外辯中嚴入則觧嚴焉凡令書下左春坊則與中允司議郎等覆啓以畫諾右庶子之職掌侍従左右獻納啟奏中舍人為之貳凡皇太子監國於宫内下令書太子親書日至春坊則宣𫝊之禮記曰古者天子有庶子之官職諸侯卿大夫之庶子掌其戒令與其教理别其等正其位國有大事則帥國子而致於太子唯所用之若有甲兵事則授之車甲合其卒伍置於有司漢書曰成帝以傅善有志行為太子庶子魏志曰鮑勛字叔業為庶子在東宫正色不撓魏氏春秋曰阮渾字長威籍之子也少知名為太子庶子呉志曰華融字徳㽔廣陵江都人祖父避亂居山隂時皇象亦寓居山隂吳都張温来就象學欲得所舍或告温曰有華融者雖年少美有令志可舍也温遂止融家朝夕談講俄而温為選部尚書乃推擢融為太子庶子遂知名顯達晉書曰鄭黙武帝時太原郭奕俱為庶子朝廷以太子官屬宜稱陪臣黙上言皇太子體皇極之尊無私於天下宫臣皆受命天朝不同藩國事遂不行晉起居注曰太康十年詔尚書郎王琛每所陳論意在忠讜其以為太子庶子隋書曰劉行本為太子左庶子時左衛率長史夏侯福為太子所暱嘗與閣内與太子戯福大笑聲聞於外行本時在閣下聞之待其出行本數之曰殿下寛容賜汝顔色汝何物小人敢爾福致請乃釋之隋書曰劉行本為左庶子太子嘗得良馬令夏侯福乘而觀之太子甚恱因欲令行本行本不從正色而進曰至尊置臣於庶子之位者欲令輔導殿下以正道非為殿下作㺯臣也太子慚而止又曰劉行本拜太子左庶子領治書如故皇太子虛衿敬憚時唐令則亦為左庶子太子昵狎之每令以絃歌教内人行本責之曰庶子當匡太子以正道何有嬖昵房帷之間哉令則甚慚而不能改又曰劉行本為左庶子卒後而太子勇廢文帝曰若使劉行本在勇當不及於此唐書官品志曰庶子四人掌侍從左右獻納得失髙功者一人舍人共掌其坊之禁令又曰貞觀中詔曰皇太子與百官書䟽未有制式近代以来例皆名白無以别貴賤今凡處分論事之事皇太子並畫令左右庶子已下署名宣奉行書案畫日其餘與親友師傅等書不在此限又曰于志寧為太子右庶子撰諫苑二十卷以進於太子承乾又曰杜正倫為太子左庶子太宗謂曰國之儲副自古所重必擇善人為之輔佐今太子年在㓜冲志意未定朕若朝夕見之可以隨事誡約今既委以監國不在目前知卿志懐貞慤能執直道故輟卿於朕以匡太子宜知委任輕重也又曰太宗謂太子左庶子于志寧曰古者太子既生卜士負之即置輔弼昔成王㓜小周召為傅日聞正道習以性成今皇太子既㓜卿當輔之正道無使邪僻闗其心勉之無怠當稱所委官賞可不次而得也又曰李百藥授太子右庶子時太子頗留意典墳然閒讌之後嬉戲過度百藥作賛道賦以諷焉詞多不載太宗見而遣使謂百藥曰朕於皇太子處見卿所獻賦悉述古来儲貳事以誡太子甚是典要朕選卿以輔弼太子正為此事大稱所委但須善始令終耳因賜綵物三百段又曰李義琰為太子右庶子同中書門下三品義琰博學多識典故上有顧問言多切直章懐太子之廢也上慰勉官寮盡捨罪令復其位薛元超等皆舞蹈謝恩義琰獨引罪涕泣時論美之山濤啓事曰東宫官屬宜得髙茂者庶子賈模缺宜補劉粹周蔚惟加所裁詔用粹環濟要略曰庶子主宫中并諸吏之適子及庶子之在版籍者也行其秩序作其徒役授八舍人之職以次徼候太平御覽卷二百四十五
