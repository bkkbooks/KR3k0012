  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_690-1a, image: WYG0899/WYG0899-0188a.png}
body:
  text: 太平御覽巻六百九十宋李昉等撰服章部七衮衣鷩衣毳衣絺衣𤣥衣褘衣褕狄褕音揺闕翟鞠衣展衣展涉扇切縁衣褖通貫切袗衣朱衣衮衣說文曰衮天子享先王巻音衮龍繡於下幅一龍蟠阿上嚮釋名曰衮巻也畫卷龍於衣也書曰帝曰予欲觀古人之象孔安國曰欲觀衣法象衣服制日月星辰山龍華蠱日月星為三辰華象草華蟲雉也畫三辰山龍華蟲於衣服施旌旗作㑹宗彛㑹曰五采也以五采成此畫焉宗廟彛尊亦以山龍華蟲為飾藻火粉米黼黻絺繡藻水草有文者火為火字粉若粟米若聚米黼若斧形黻為兩已相背葛之精者曰絺五色備曰繡也以五采彰施于五色作服汝明以五色明施五采作尊卑服汝制之也尚書大傳曰山龍青華蟲黄作㑹黑宗彝白藻火赤天子五服詩曰九罭之魚鱒魴我覯之子衮衣繡裳又曰君子來朝何錫予之雖無予之路車乗馬又何予之𤣥衮及黼又曰衮職有闕仲山甫補之左傳曰諸侯伐楚許男卒於師凡諸侯薨於朝㑹加一等死王事加二等於是以衮歛衮衣公服也謂加二等禮曰有以文為貴者天子巻龍諸侯黼大夫黻士𤣥衣纁裳郊特牲曰祭之日王被衮以象天戴冕藻十有二旒則天數也又明堂位曰衮冕立於阼階周禮春官上司服曰王之吉服享先王則衮冕又夏官下曰節服氏掌祭祀朝覲衮冕六人維王之大常鄭𤣥曰服冕者從王服也維維之以縷王旌十二旒兩兩以縷綴連其旁三人持之禮天子旌曳也儀禮覲禮曰天子衮冕負斧扆漢書曰韋孟詩云肅肅我祖家自豕韋衮衣朱黻四壯龍旂後秦記曰姚襄夢弟萇上御座着衮服謂官屬曰此兒或能大起吾族齊書曰陸澄兼左丞秦始六年詔皇太子朝賀服衮冕九章澄與議曹郎丘仲起議服冕以朝實著經文秦除六冕漢明還備晉魏已来不欲令臣下服冕故位公者加侍中今皇太子禮絶羣臣冝遵聖王盛典革近代之制唐書曰代宗時渤海質子盗衮龍服捕得之詞云慕中國衣服上赦之董巴漢輿服志曰上古衣毛而冐皮後世聖人易之以絲麻觀翬翟之文榮華之色乃染帛以效之始作五采成以為服黄帝堯舜之垂裳盖取諸乾坤乾坤有文故上衣𤣥而下裳黄秦以戰國即天子位滅去禮學郊祀之服皆以袀𤣥漢承秦故至顯示初服冕旒衣裳以祀天地養三老五更於三雍三公九卿郊祀天地明堂皆冠冕垂旒衣裳𤣥上纁下乗輿備文日月星辰十二章三公諸侯用山龍九章九卿以下用華蟲七章皆五采衣裳乗輿刺史公候九卿已下皆織成陳留襄邑獻之續漢輿服志曰聖人處天子位服日月昇龍所以福其徳章其功也賢人佐聖封國愛民黼黻文繡降龍所以顯其仁光其能也環濟要畧曰天子龍冕諸侯黼大夫黻白與黒謂之黼黒與白謂之黻青與赤謂之文赤與白謂之章五色備謂之繡諸侯去日月星辰服山龍華蟲卿大夫去山龍華蟲服藻火服粉米摯虞决疑要注曰秦除衮冕之制唯為𤣥衣絳裳一具而已漢興亦如之中興後明帝永平中使諸儒案古文依圗書始復造衮冕之服至於今用之榖梁傳序曰一字之褒賞逾華衮片言之貶誅深斧鉞六韜曰昔帝堯王天下黼衣絓履不弊盡不更為也傅子曰魏明帝疑三公衮冕之服似天子減其采章陳留風俗傳曰襄邑縣南有渙水有睢水傳曰睢渙之水出文章故有黼黻藻錦日月華蟲以奉天子宗廟御服焉鷩衣釋名曰鷩雉山雉也鷩憋并列切也性急憋不可生必自殺故畫其形於衣以象人執耿介之節也周禮春官上司服曰王之吉服享先公饗射鷩冕鄭𤣥曰先公謂后稷之後也饗射饗食賓客與侯射也鷩畫以雉也三禮圖曰鷩冕服者王祭先公及饗射之服也以朝天子助祭𤣥衣纁裳以華蟲火宗彛三章畫以為繢裳藻粉米黼黻四章繭陟里切以為繡凡七章毳衣釋名曰毳芮也畫藻文於衣象水草之毳芮温暖而絜也詩曰大車檻檻毳衣如菼毳衣大夫之服菼葭也蘆之初生者也古者天子大夫服毳冕以廵行大車啍啍他昆切毳衣如璊璊顔也音門周禮春官上司服曰王之吉服祀四望山川則毳冕鄭𤣥曰毳其衣三章裳三章也三禮圖曰毳冕王祀四望山川服也子男服以朝天子絺衣周禮春官上司服曰王之吉服祭羣小五祀則絺冕鄭𤣥曰絺或作繡字之誤也繡刺粉米無畫也𤣥衣詩云緇衣美武公之徳父子並為周司徒善於其職國人宜之緇衣之宜兮敝予又改為兮緇衣黒色上卿聴朝之正服也周禮春官上司服曰王之吉服祭羣小祀𤣥冕鄭𤣥曰羣小祀林澤墳衍四方百物之屬也𤣥者衣無文裳刺黻而已凡冕服𤣥衣纁衣也禮玊藻曰天子𤣥端而朝日於東門之外鄭𤣥曰端盖為冕字之誤朝日春分時也魏臺訪議曰禮天子大夫𤣥冕而執鴈今秩中二千石六百石者可使𤣥冕而執鴈褘衣釋名曰王后之上服曰褘衣畫翬雉之文於衣也伊洛南雉青質五色備曰翬也周禮天官下内司服曰内司服掌王后之六服褘衣王后之服刻繒為翬之形而采畫之綴於衣從王祭先王則服褘衣也禮明堂位曰夫人副褘立于房中鄭𤣥曰副首飾也今之歩揺是也周禮追師掌王后之首服内副褘王后之上服也唯魯及王者之後夫人服之諸侯夫人自褕翟而下也又曰祭義曰嵗既單世婦獻繭于夫人夫人副禕而受之董巴漢輿服志曰太皇太后入廟服紺上皁下后謁廟服紺上皁下皆深衣衾徐廣云深衣即單衣公卿列侯中二千石夫人入廟佐祭者服皁絹上下皆深衣制穆天子傳曰吉日戊午天子大服冕褘冕冠褘衣王后之上服今帝服之未詳也授河琮壁褕狄釋名曰鷂翟畫鷂雉之文於衣也江淮而南雉素質五采皆備成章曰鷂周禮天官下内司服曰内司服掌王后之六服褕狄鄭𤣥曰褕狄闕狄羽飾也𤣥謂翟青也三禮六服圖曰褕狄王后從王祭先公之服也侯伯之夫人服以從君祭宗廟闕翟釋名曰闕翟翦闕繒為翟雉形以綴衣也詩曰委委佗佗象服是宜義曰象服者謂褕狄闕狄也周禮天官下内司服曰内司服掌王后之六服闕狄鄭司農曰褕狄闕狄畫羽飾也鄭𤣥曰闕狄刻而不畫者也此三者皆祭服𤣥謂今世有袿衣者盖三狄之遺象也以推次其色闕狄赤也三禮六服圖曰闕翟王后從祭羣小祀服也亦子男夫人服以從君祭宗廟鞠衣釋名曰鞠衣如菊花色也周禮天官下内司服曰内司服掌王后六服鞠衣鄭司農曰鞠衣黄桑服也色如鞠塵象桑葉始生三禮六服圖曰鞠衣王后蠶桑之服也孤之妻服以從助君祭董巴漢輿服志曰太皇太后皇太后蠶服青上縹下深衣制貴人助蠶服純縹上下深衣制公卿列侯中二千石夫人助蠶服縹絹上下深衣制自二千石夫人已上至皇后皆以蠶衣為朝服徐廣輿服雜注曰晉先蠶儀注皇后衣純青之衣特進卿世婦二千石命婦助蠶則青絹上下展衣周禮天官下内司服掌王后之六服展衣展衣白衣三禮六服圖曰展衣王后以禮見王賔客之服也卿大夫之妻以從助君祭釋名曰襢展字或作此坦也坦然正白無文采也褖衣釋名曰褖衣褖然黒色也詩􅆁栢舟曰緑兮衣兮緑衣黄裏緑兮色黄正色正義緑兮衣兮言其自有禮制也諸侯大夫祭服之下鞠衣為上展衣次之衆妾亦有貴賤之等服鞠衣黄展衣白禄衣黒皆以素紗為襄非其制故以喻妾上僭焉緑兮衣兮緑衣黄裳義云婦人之服不殊取裳同色今衣黒裳黄喻亂嫡妾之禮也周禮天官下内司服曰内司服掌王后六服褖衣素紗褖衣御於王者之服也亦以燕居男子之褖衣黒則是亦黒也袗衣三禮圖曰傅母婚禮從者袗衣古者傅母選無夫與子而老賤曉習婦道者使之應對也朱衣應劭漢官儀曰虎賁中郎衣紗縠罩衣續漢志同又令絳紗􅂖東觀漢記曰光武起義衣絳單衣赤幘初伯升之起諸家子弟皆曰伯升殺我及見上絳衣大冠乃驚曰謹厚者亦復為之晉義熈起居注曰安帝自荆州至新亭詔曰諸侍官戎行之時不備朱服悉令袴褶從也宋元嘉起居注曰治書侍御史朱興啓彈朝請向騰之坐同僚㑹故員外散騎侍郎楊珍之䘮侍兵唱變服然後唱衆官下陪位而騰之着單衣在朱衣上於禮有虧請免所居官詔可齊書曰吕安國為右衛将軍給事中後改封湘鄉侯武帝即位累遷光禄大夫加散騎常侍安國欣有官授謂其子曰汝後勿袴褶驅使單衣猶恨不稱當為朱衣也神異經曰西荒有一人不讀五經而意合不觀天文而心通不能禮拜而精當天賜其衣男朱衣縞帶委貎冠女碧衣戴金勝皆無縫墨子曰楚莊王絳衣愽袍語林曰何平叔面絶白魏文帝疑其傅粉夏日喚與熱餅噉之大汗出以朱衣自拭色轉皎然時帝始信之班彪便宜事曰可選師傅將相子孫有行好學者以備絳衣舎人班固與竇憲牋曰將軍哀憐賜固手迹告以中軍宜鮮明乃賜以瑇瑁簮絳紗單衣太平御覽卷六百九十
