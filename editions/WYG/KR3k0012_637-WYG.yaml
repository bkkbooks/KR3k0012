  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_637-1a, image: WYG0898/WYG0898-0690a.png}
body:
  text: 太平御覽卷六百三十七宋李昉等撰刑法部三律令上書曰王曰嗚呼凡我有官君子欽乃攸司慎乃出令令出惟行弗惟反有官君子大夫已上歎而誡之使敬汝所司慎汝出令從政之本令出必惟行之不惟反政若二三其令亂之道也韓詩曰古者必有命民民有能敬長憐孤取舎好譲者命於其君然後得乗飾車駢馬未得命者不得乗車乗車皆有罰故其民雖有餘財侈物而無禮義功徳即無所用其餘財侈物故其民皆興仁義而賤不争貴强不凌弱衆不暴寡是唐虞之所以象典刑而民莫敢犯也論語子路曰子曰其身正不令而行其身不正雖令不從令教令也國語曰越王勾踐令民壮者無娶老婦老者無娶壮婦女子十七不嫁丈夫三十不娶其父母有罪将免免乳以告公令醫守之醫乳醫也生男二壺酒一犬生女二壺酒一豚生三人與之乳母生二人與之餼三子力不􅀎獨養故與乳母家語曰孔子初仕為中都宰制為養生送死之節長幼異食强弱異任男女别塗路不拾遺器不彫偽市不二價行之一年而四方諸侯皆則焉定公謂孔子曰學子之法以治國何如孔子對曰雖天下可也何但魯國而已哉爾雅曰柯憲刑範辟律矩則法也詩曰伐柯伐柯其則不逺論語曰不踰矩也釋言曰坎律銓也易坎卦主法法律者所以銓量輕重釋名曰法逼也人莫不欲從其志逼正使有所限也令領也理領之使不相犯也律䉂音累也䉂人心使不得放肆也史記商鞅定法秦人初言令不便者以千數於是太子犯法衞鞅曰法之不行而上犯之将法太子太子君嗣也不可施刑刑其傅公子䖍黥其師公孫賈明日秦人皆趍令行之十年秦民初言令不便者有来言令便者衞鞅曰此皆亂法之人也盡遷於邉城其後人莫敢議令前漢書曰髙祖初入闗約法三章曰殺人者死傷人及盗抵罪蠲削煩苛秦民大悦其後四夷未附兵革未息三章之法不足以御奸於是相國蕭何捃摭秦法取其宜於時者作律又曰恵帝四年除挾書律張晏曰秦始皇令敢有挾詩書偶語者俱為城旦也又曰漢王下令軍士不幸死者吏為衣衾棺斂轉送其家四方歸心焉又曰成帝為太子壮好經書寛博謹慎初居桂宫上嘗急召太子出龍樓門張晏曰門樓上有銅龍若白鶴飛亷者也不敢絶馳道應劭曰馳道天子道若中道然中禁甚重西至直城門晉灼曰黄圖西出南頭第二門得絶乃度之還入作室門上遲之問其故以狀對上大悅乃著令令太子得絶馳道又曰元帝仁柔好儒見宣帝多用文法吏以刑名繩下大臣楊惲蓋寛饒等坐刺譏語而誅常侍燕從容言陛下持刑太深宜用儒生宣帝作色曰漢家自有制度本以霸王道雜之奈何純任徳教用周政乎姬周之政且俗儒不逹時宜好是古非今使人眩於名實師古曰眩亂視也音胡眄反不知所守何足委任乃歎曰亂我家者太子也及即位下詔曰法令者欲其難犯而易避也今律令煩多典文者不能分明是欲罪元元之不逮豈中刑之意哉中常也其議律令可蠲除輕減又曰成帝河平詔曰甫刑云五刑之屬三千大辟之罰其屬二百今大辟罪千有餘條律令煩多百有餘萬言竒請他比日以益滋竒請謂常文之外者别有謂以定罪也他比謂引他類以比附稍増律條也竒音居宜反其與中二千石博士明習律令者議減死刑及可蠲除者令較然易知又曰杜周南陽杜衍人也義縱為南陽太守以周為爪牙薦之張湯為廷尉史使案邉失亡所論殺甚多奏事中意任用與減宣更為中丞者十餘嵗周少言重遲内深次骨宣為左内史周為廷尉其治大抵放張湯而善候伺上所欲擠音者齊切者因而陷之上所欲釋久繫待問而微見其寃状客有謂周曰君為天下决平不循三尺法周曰三尺法安出哉前主所是著為律後主所是疏為令當時為是何古之法乎又曰主父偃以諸侯莫足游者乃入關見衞將軍衞將軍數言上上不省資用乏留久諸侯賓客多厭之乃上書闕下朝奏暮召入見所言九事其八事為律令也又曰朱愽遷琅琊太守文學儒吏時有奏記稱說云云愽見謂曰如太守漢吏奉三尺律令以從事耳亡奈生所言聖人道何也言不能用也且持此道歸堯舜君出為陳說之遷廷尉職典決疑當讞平天下獄恐為官屬所誣視事召見正監典法掾史謂曰廷尉本起於武吏不通法律幸有衆賢亦何憂然廷尉治郡斷獄以来且二十年三尺律令人事出其中言可以人情知之掾史試與正監共撰前世決事吏議難知者數十事持以問廷尉得為諸君覆意之如淳曰但欲用意覆之也正監以為慱苟强意未必能然即共條白焉愽皆召掾史並坐而問為平處其輕重十中八九官屬咸服愽之疎畧才過人也後漢書曰光武為蕭王時在河北祭遵為軍市令帝舎中兒犯法遵格殺之帝怒收遵主簿陳副諌曰明主常欲整齊衆今遵奉法不避是教令行也帝乃貰之以為刺姦将軍謂諸将曰當避祭遵吾舎中兒犯法尚殺之必不私公等又曰桓譚上書言法令決事輕重不齊或一事殊法同罪異論姦吏得因縁為市所欲活則出生議所欲陷則與死比是為刑開二門也今可令通義理明習法律者校定科比科謂事條比謂律例一其法度班下郡國蠲除故條如此天下知方而獄無怨濫矣又曰馬援在南越條奏越律與漢律駮者十餘事駮乖也與越人申明舊例以約束之自後駱越奉行馬将軍故事又曰王符論明帝時公車反支日不受奏章凡反支日用月朔為正戌亥朔一日反支申酉朔二日反支午未朔三日反支辰巳朔四日反支寅夘朔五日反支子丑朔六日反支見隂陽書也帝聞而怪曰人費農桑逺来詣闕而復拘之以禁忌豈為政之意乎於是遂蠲其制令又曰建初中有人侮辱人父者而其子殺之肅宗貰其死刑而降宥之自後因以為比是時遂定其議以為􅁿侮法張敏駮議曰夫輕侮之法先帝一切之恩不有成科班之律令也夫死生之決宜從上下猶天之四時有生有殺若開相容恕著為定法者則是故設姦萌生長罪隙又輕侮之比寖以繁滋至有四五百科轉相顧望彌復增甚難以垂之萬載臣聞師言救文莫如質故髙帝去煩苛之法為三章之約建初詔書有改於古者可下三公廷尉蠲除其弊又曰有兄弟共殺人者明帝以兄不訓弟故報兄重報論也而弟減死中常侍孫章宣詔誤言兩報重尚書奏章矯制罪當腰斬帝問郭躬躬曰法令有故誤章傳命之謬於事為誤誤者其文則輕當罰金帝曰章與囚同縣疑其故躬曰周道如砥其直如矢詩小雅如砥貢賦平如矢賞罰中君子不逆詐君王法天刑不可以委曲生意帝善之遷躬廷尉躬家代掌法務在寛平及典理官決獄斷刑多依矜恕乃條諸重文可從輕者四十一事奏之事皆施行著為令又曰陳寵鉤校律令條法溢于甫刑者奏除之鉤猶勘也前書曰鉤校得其姦賊鉤音工侯切溢出也孔安國注尚書曰吕侯後為甫侯故或稱甫刑也曰臣聞禮經三百威儀三千故甫刑大辟二百五刑之屬三千禮之所去刑之所取去禮之人刑以加之故曰取也失禮則入刑相為表裏者也今律令死刑六百一十耐罪千六百九十八耐者輕刑之名也贖罪以下二千六百八十一溢於甫刑者千九百八十九其四百一十大辟千五百耐罪七十九贖罪春秋保乾圖曰王者三百年一蠲法漢興以来三百二年憲令稍増科條無限又律有三家其說各異宜令三公廷尉平定律令應經合義者可使大辟二百而耐罪贖罪二千八百并為三千悉刪除其餘令與禮相應又曰卓茂為宻令人常有言部亭長受其米肉遺者部謂所部也茂辟左右問之曰亭長為從汝求乎為汝有事嘱之而受乎将平居自以恩意遺之乎人曰往遺之耳茂曰遺之而受何故言耶人曰竊聞明賢之君使人不畏吏吏不取人今我畏吏是以遺之吏既卒受故來言耳茂曰汝為敝人矣凡人所以貴於禽獸者以有仁愛知相敬事也今隣里長老尚致饋遺此乃人道所以相親况吏與民乎吏顧不當乗威力强請求耳凡人之生羣居雜處故有經紀禮義以相交接汝獨不欲修之寕能髙飛逺走不在人間邪亭長素善吏嵗時遺之理也人曰苟如此律何故禁之茂笑曰律設大法理順人情今我以禮教汝汝必無怨惡以律治汝何所措其手足乎一門之内小者可論大者可殺也且歸念之於是人納其訓吏懐其恩又曰獻帝初應劭又刪定律令撰具律本章句尚書舊事廷尉板令決事比例司徒都目五曹詔書及春秋斷獄凡二百五十篇又集駮議三十篇以類相從凡八十二事於是舊事在焉東觀漢記曰陳寵曽祖父咸仕成哀間以明律令為侍御史王莽簒位父子相将歸鄉里閉門不出入乃收家中律令文書壁藏之以俟聖王咸常勅戒子孫為人議法當依輕者雖有百金之利無與人重故世謂陳氏持法寛魏書曰司馬景王輔政時犯大逆者其法誅及已出之女毌丘儉之誅其子甸妻荀氏應坐死其族兄顗通表魏帝以乞其命詔聴離婚荀氏所生女芝為潁川太守劉子元妻亦坐死罪以懐姙繫獄荀氏辭詣司𨽻校尉何曽乞恩求没為官婢以贖其命曽哀之使主簿程盛上議曰臣以為女人有三從之義無自專之道出適他族降父母之服所以明外成之節也而父母有罪則追刑夫族黨見誅又隨戮一人之身内外受辟女既産育則他族之母無辜受戮傷孝子之心且男既不得罪於他族而女獨嬰戮于二門臣以為在室宜從父之誅既醮可隨夫之罰於是有詔改定律令魏志曰公軍進令曰吾起義兵為天下除暴亂舊土人臣死喪畧盡國中終日行不見所識使吾悽愴傷懐其舉義兵已来将士絶無後者求親戚以後之授土田官給耕牛置學師教之為立廟使繼其先人魂而有靈吾百年之後何恨哉吴志曰孫權下令諸将曰夫存不忘亡安必慮危古之善教昔雋不疑漢之名臣於安平之世而刀劒不離於身蓋君子之於武備不可以已况今處身疆畔豺狼交接而可輕忽不思變難哉頃聞諸將出入各相謙約不從人兵甚非備慮愛身之謂夫保己遺名以安君親孰與危辱宜深警戒副孤意焉晉書曰賈充所定新律既成班天下百姓詔曰漢氏以来法令嚴峻故自元成之世及嘉平建平之間咸欲辨章舊典刪革刑書述作體大歴年無成先帝愍元人命陷於宻網親發徳音釐正名實車騎将軍賈充将順聖意諮詢太傅鄭沖又與司空荀顗中書監荀朂中軍将軍羊祜中䕶軍王業及廷尉杜友河南杜預散騎都尉成公綏栁軌等典正其事毎鑒其用心常慨然嘉之今法律既成始班天下刑寛禁簡足以克當先㫖昔蕭何以定律受封叔孫通以制儀為奉常賜金五百斤子弟皆為郎夫立功立事古之所重自太傅車騎以下皆加禄賞其詳依古典又曰杜預與車騎将軍賈充等定律令既成預為之注觧乃奏之曰法者蓋繩墨之斷例非窮理盡性之書也故文約而例直聴省而禁簡例直則易見禁簡則難犯易見則民知所避難犯則幾於刑措古之刑書銘之鐘鼎鑄之金石以塞異端絶異禮也然後人知恒禁吏無淫巧也今所注皆網羅法意格之以名分使用之者執名例以審趣舎伸繩異之直去析薪之禮也晉朝雜事曰泰始四年嵗在戊子正月二十日晉律成宋書曰劉秀之為尚書右㒒射請改定制令部人殺長吏科議者謂值赦宜加徙送秀之以為律文雖不明部人殺官長之㫖若值赦但止徙送便與悠悠殺人曾無一異人敬官長比之父母行害之身雖遇赦謂宜付尚方窮其天命家口令補兵從之太平御覽卷六百三十七
