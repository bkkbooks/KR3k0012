front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_197-1a, image: WYG0894/WYG0894-0728c.png}
body:
  text: 太平御覽卷一百九十七宋李昉等撰居處部二十五園圃圈牢藩籬華表園圃說文曰園樹果圃樹蔬也易曰賁于丘園束帛戔戔毛詩曰園有桃其實之肴又曰折栁樊圃周禮曰場人掌國之場圃而樹之菓蓏珍異之物以時歛而藏之凡祭祀賔客供果蓏享亦如之注云果棗栗之屬蓏爪瓠之屬珍異蒲桃枇杷之屬又曰太宰九職二曰園圃􅗱草木又曰園㕓二十而一注云以利少故二十而稅一也㕓城市中空地又曰圃以樹事貢草木謂果𤓰葵韮論語曰樊遲請學為圃子曰吾不如老圃史記曰梁有漆園楚有橘柚園又曰王翦為秦將伐楚請善田宅園池甚衆漢書曰始曹參微時與蕭何善及為宰相有隙至何且死所推賢唯參參代何為相國舉事一遵何之約束擇郡國長吏訥於文辭謹厚長者即召為丞相吏吏之刻深欲務聲名輙斥去之日夜飲酒卿大夫以下吏及賔客見參不事事来者皆欲有言至者參輙飲以醇酒度其欲有言復飲酒而後去終莫得闗說以為常相舎後園近吏舎吏舎日飲歌呼從吏患之無如何迺請參逰後園聞吏醉􅁔呼吏幸相怒召按之迺反取酒張坐飲大歌呼與相和參見人之有細過掩匿覆盖之府中無事又曰董仲舒廣川人也以治春秋孝景時為博士下帷講誦弟子傳以乆次相受業或莫見其面盖三年不窺園囿其精如此後漢書曰法員隠大澤講論藝術厯年不窺園囿又曰竇憲以賤直請奪沁水公主田園沁水明帝女主畏逼不敢言後肅宗駕出逰過園指以問憲隂喝不得對隂於禁反喝一介反噎塞也後發覺帝大怒責憲曰貴主尚見侵奪何况小人哉國家棄憲如孤雛腐䑕耳憲大震懼魏志曰顏斐字文林為京兆守於府下起菜園使吏投簡鋤治也晉書曰范任好學外氏家貧無以資給任乃廬于園中布衣蔬食然薪冩書冩畢誦讀亦遍遂博學多通善談名理又曰華廙既廢黜武帝後又登凌雲觀望見廙苜蓿園阡陌甚整依然感舊太康初大赦乃得襲封乆之拜城門校尉遷左衛將軍數年以為中書監又曰和嶠性至儉家有好李帝求之不過數十王濟侯其上直率少年詣園共啖畢伐樹而去王隠晉書曰凉州牧張駿増築四城箱各千歩東城殖園果命曰講武場北城殖園果命曰𤣥武圃皆有宫殿宋書曰栁元景多產業居南岸有數十畆菜園時有人求之或留錢元景曰本立園自為供喫豈求利耶齊書曰世祖太子性頗奢麗宫内多雕飾精綺過於王宫開沼𤣥圃園與臺城北塹等其樓觀塔宇多聚竒石妙極山水慮上宫望見乃傍列修竹内施高障造逰墻數百間施諸機巧宜須障蔽以晉明帝為太子時立西池乃啟世祖引前例求於東田起小苑上許之窮極制度陳留耆舊𫝊曰范丹學通三經常自任灌園向秀别傳曰秀與吕安灌園於山陽收其餘利以供酒食之費莊子曰子貢過漢隂見一文人為圃畦鑿隧而入井抱甕而出灌子貢曰有械於此一日浸百畦用力甚寡而見功多夫子不欲乎為圃者仰而視之曰奈何曰鑿木為機後重前輕挈水若抽其名為桔橰圃者忿然作色而笑曰吾聞之吾師有機械者必有機事有機事者必有機心機心存於胷中則純白不備純白不備則神不定神不定者道之所不載也吾非不知羞不為也子貢告孔子孔子曰假修渾沌之術者也雜記曰於陵子辭卿相而桔橰灌園又曰戴宏為河間相自免歸而灌蔬以經教授也西京雜記曰茂陵富人袁廣藏鏹巨萬家童八九百人於邙山下築園東西五里百步激流水注其内構石為山高十餘丈連延數里養白鸚鵡紫鴛鴦旄牛青兕竒禽怪獸委積其間聚沙為洲激水為波其中江鷗海鵠乳雛産鷇延漫林池竒樹異草靡不具植屋皆徘􅆦連屬重閤修廊行之移晷不能偏廣有罪誅沒入為園鳥獸草木僉移上林苑中又曰樂逰園自生玫珻樹樹下多苜蓿苜蓿亦名懐風時人或謂光風風在其間常肅然日照其花有光彩故名苜蓿曰懐風茂陵謂之連枝草又曰梁孝王兎園有落猿岩棲龍岫鴈池鶴洲鳬渚宫觀相屬隋圖經曰史記謂梁孝王築東苑方三百里是曰兎園王褒雲陽記曰車箱阪下有梨園一頃樹數百株青翠繁宻望如車盖水經注曰睢水東西流入於竹圃水次緑竹隂渚青青彌望世人言梁王竹園也又曰𤣥瓠灣中地數頃有栗名小殊不並固安之實也然嵗貢三百石以充天府水渚即栗洲樹木高茂望若屯雲中有栗堂甚閑敞牧宰英彥多所逰薄魏志曰有芳林園桐園芳林後避少帝諱改為華林晉宫閤名靈芝園鄴有鳴鶴園蒲桃園華林園司馬彪續漢書曰濯龍園在洛陽西北角也郭仲產仇池記城東有苜蓿園列女𫝊魯漆室之女曰昔有客繫馬園中馬逸踐葵使予終嵗不飽葵淮南子曰園有螫毒葵藿為之不採陳留記曰園叟㐮邑人也叟始居園中故謂之園公天文要集記曰庖𤓰為天子果園有天園主果實茄蓄儲又曰芙蓉園夲隋氏之離宫居地三十頃周廽十七里貞觀中魏王泰苑又賜東宫令属家令寺園中廣厦修廊連亘屈曲其地袤延爽塏跨𢃄原隰又有修竹茂林緑被岡阜東坂下有凉堂堂東有臨水亭按黄圖曲池漢武所造周廻五里池中遍生荷芰菰蒲其間禽魚翔沐宣帝立廟曲池之北名曰樂逰廟即今昇平坊内基趾是也此在秦為宜春苑在漢為樂逰苑宇文愷營建京城以羅城東南地高不便故即此隅頭一方餘地穿入芙蓉池以虛之郡國志云西夷有荔枝園僰僮施夷中最賢者古之謂僰僮之富多以荔枝為業園植萬株樹收一百五十斛隋圖經曰司竹園在盩厔縣東十二里穆天子西往至𤣥池乃植竹即此是也史記曰渭州千畆竹漢謂鄠杜竹林故有司竹都尉西都賦所謂鄠杜濵其竹林果園芳草甘木也圈史記曰竇太后好黄老書召轅固問老子書固曰此家人言耳太后怒曰安得司空城旦書乎乃使固入圏擊豕漢書曰孝武帝作建章宫度為千門萬户其西則數十里虎圈又曰李禹有寵於太子然好利亦有勇嘗與侍中貴人飲食侵陵之莫敢應後愬之上召禹使制虎懸下圈中未至地有詔引出之禹從洛中以劒砍絶纍欲刺虎師古曰落與絡同謂當時繈絡而下也纍索也三輔故事曰師子圈在建章宫西南列士𫝊曰秦召公子無忌無忌不行使朱亥奉璧秦王大怒將朱亥著虎圈中亥瞋目視虎虎不敢動郡國志曰雍州虎圈在通化門東二十五里秦王置朱亥於其中亥瞋目視虎不敢動漢文帝問上林尉處及馮婕妤當熊在此漢宫殿䟽曰有彘圈有師子圈武帝造秦故虎圈周匝三十五步長二十步西去長安十五里牢說文曰牢閑養牛馬園也詩曰乃造其曹執豕于牢注云曹群也言搏豕於牢中以為飲酒之殽穆天子𫝊曰伐犬戎獲虎畜於東虞命曰虎牢事具州郡曹子建求自試表曰如微才不試沒世無聞獸息鳥視終於白首此徒圏牢之養物非臣之所志也藩籬易曰羝羊觸藩羸其角詩曰折栁樊圃或云藩左傳曰宋向戌請弭諸侯之兵㐮公二十七年諸侯之大夫會於宋以藩為軍注云示不相忌也哀公十二年衞侯㑹吴于鄖吳人藩衞侯之舍子服景伯謂子貢曰夫諸侯之㑹事既畢矣侯伯致禮地主歸餼以相辭也今吳不行禮於衞而藩其君舍以難之子盍見太宰乃請束錦以行乃兔衞侯晉書曰庾衮字叔褒初衮諸父並貴盛唯衮父獨安貧約躬耕稼穡以給供養而執事勤恪與子弟樹籬跪以授條或曰今在隠屏先行何恭之過也荅曰幽顯易操非君子意也宋書曰謝瞻字宣逺弟晦時為宋臺右衞權遇已重於彭城還都迎家賔客輻凑瞻在家驚駭謂晦曰吾家以逺退為業汝遂勢傾朝野此豈門户福耶乃竪籬隔門庭曰吾不忍見南朝官苑記曰建康籬門舊南北兩岸籬門五十六所盖京邑之郊門也如長安東都門亦周之郊門江左初立並用籬為之故曰籬門南籬門在國門西三橋籬門在金光宅寺側東籬門本名肇建籬門在古肇建市之東北籬門今覆舟東頭𤣥武湖東南角今有亭名籬門亭西籬門在石頭城東議軍府在西籬門外路北白楊籬門外有石井籬門莊子曰願逰其藩閒居賦曰芳枳堅籬宋玉對曰問藩籬之鷃鷦鷯賦曰鷦鷯長於藩籬之下華表崔豹古今注程雅問曰堯設誹謗之木何也荅曰今之華木以櫎木交柱頭狀如華形似桔橰大路交衢悉施焉或謂之表木以表王者納諫亦以表識衢路秦乃除之漢始復今西京謂之交午柱又遼東華表見鶴門又燕昭王墓前華表見貍門太平御覽卷一百九十七
