body:
  text: 太平御覧卷九百六十二宋李昉等撰竹部一竹上易曰震為蒼筤竹尚書禹貢曰荆州厥貢惟菌簵楛又禹貢楊州曰篠簜既敷厥貢瑶琨篠簜毛詩斯干曰如竹苞矣如松茂矣又竹竿曰竹竿衛女思歸也適異國而不見答思而能以禮者也籊籊竹竿以釣于淇韓詩外傳曰黄帝時鳯凰栖帝梧桐食帝竹實周禮春官曰孤竹之管孫竹之管陰竹之管禮記月令曰仲冬日長至則伐木取竹箭左傳文下曰賊殺齊懿公於申池納諸竹中又襄三曰晉伐齊劉難士弱率諸侯之師焚申池之竹木又曰東南之美者有㑹稽之竹箭焉孝經河圖曰少室之山大竹堪為釜甑汲冡周書王會曰成王時路人獻大竹史記曰智伯率韓魏攻趙㐮子㐮子奔晉陽原過從後至見三人自帶以上可見自帶以下不可見與原過竹三節莫通曰我以是遺趙無䘏㐮子自剖竹有朱書又貨殖傳曰渭川千畆竹其人與千户侯等漢書曰髙祖為亭長乃以竹皮為冠應邵注曰以竹始生皮作冠今鵲尾冠也又曰上使發卒數萬人塞瓠子河下淇園之竹以為楗又曰竹大者一節受一斛小者數升以為椑榼又曰梁孝王兎園多植竹中有修竹園又地理志曰秦地有鄠杜竹林南山檀柘號陸海後漢書曰郭伋為并州刺史出行郡童子乗竹馬相待又曰㓂恂為河内太守移書屬縣講兵肄射伐淇園之竹為矢百餘萬養馬二千匹收租四百餘萬斛轉以給軍晉書曰杜預討呉州郡多望風歸附集諸軍㑹議或曰百年之㓂未可盡尅今向暑水潦方降疾疫將起候來冬更為大舉預曰昔樂毅藉濟西一戰以併强齊今兵威已振譬如破竹數節之後皆迎刄而解無復着手處也又曰武帝平呉之後復納孫皓宫人數千自此掖庭殆將萬餘人而並寵者甚衆帝莫知所適乗羊車恣其所之至便晏寢宫人乃取竹葉挿户以塩汁灑地而引帝車又曰王徽之所居宅空地便令種竹聞其聲徽之嘯咏指竹曰不可一日無此君謝靈運晉書曰元康二年巴西界竹花紫色結實如麥晉書載記曰長安謡曰鳯凰鳯凰止阿房符堅以鳯凰非梧桐不棲非竹實不食乃植梧竹數十萬株于阿房宫城以待之慕容冲小字鳯凰至是終為堅賊入止阿房城焉宋書曰卜天興弟天生少為隊將十人同火房後有一坑廣二丈餘十人共跳之皆度唯天生隊不跳天生乃取實中苦竹削其端使利交橫布坑内更呼等類共跳並惧不敢天生乃復跳之往反十餘曾無留礙衆歎服齊書曰南海王子罕字云華武帝第十一子也頗有學問母尚容華有寵故武帝留心母常寢疾子罕晝夜祈禱于時以竹為燈纉照夜此纉宿昔枝葉大茂母病亦愈以為孝感所致又曰徐伯珎少孤貧學書無紙常以竹葉箭箬甘䉀及地上學書南史隐逸傳曰沈麟字雲正居貧織簾誦書鄉里號為織簾先生嘗為人作竹誤傷手便流淚而還同作者謂曰此不足損何涕零答曰此本不痛但遺體毁傷感而悲耳梁書曰武帝臨雍州命吕僧珎為中兵叅將委以心膂僧珍陰養死士歸之者甚衆武帝頗招武猛士庶從㑹者萬餘人因命接行城西空地將起數千間屋為士舍多伐林竹沉於檀溪積茅盖若山阜皆未之用僧珍獨悟其旨因私具櫓數百張及起兵悉取檀溪林竹裝為舡艦葺之以茅並立辦衆軍將發患諸將湏櫓甚多僧珍乃出先所具毎船付二張争者乃息隋書曰明克譲宏道平原鬲人也父山賔梁侍中克譲少好儒善談論愽涉書史所覧將萬卷三禮禮論尤所研精龜莢厯象咸得其妙年十四釋褐湘東王法曹叅軍時舍人朱异在儀賢堂講老子克譲預焉堂邊有修竹异令克譲詠之克譲攬筆輙成其卒章曰非君多愛賞誰貴此貞心异甚竒之唐書曰南詔理無刑名桎梏之具罪以竹五本束之伏罪者撻其背又曰開成四年㐮陽三縣山竹結實百姓採食莊子曰鵷鶵非練實而不食練實竹實也取其潔白也淮南子曰大清之治也鳯麟降蓍龜兆甘露下竹實盈又曰瓦以火成不可以得火竹以水生不可以得水又曰稿竹有火弗鑚不㸐土中有水弗掘無泉梅子曰𢎞農宜陽縣金門山竹為律管河内葭莩以為灰可以候氣取灰實管端置之深宫覆以緹幕勿令見風日長至則灰飛管通矣唐子曰希見食笋歸煑竹根家語曰子路見孔子孔子曰君子不可不學子路曰南山有竹不揉自直斬而用之達於犀革以此言之何學之為孔子曰括而羽之鏃而礪之其入不益深乎吕氏春秋曰昔黃帝命伶倫作為律伶倫自大夏之西乃之沅渝之陰取竹于嶰谷以中空竅厚者斷兩節均其長三寸九分而吹之山海經曰長石之山西有共谷其中多竹衛邱山南其後竹林在焉大可為舟又曰竹生花其年便枯竹六十年而易根易根必經結實而枯死實落土復生六年還成町穆天子傳曰天子西征至于𤣥池天子休于𤣥池之上乃奏廣樂三日而終是曰樂池乃樹之竹是曰竹林呉越春秋曰越王問范蠡用兵對曰越有處女願君王問之處女北見於王道逢老人自稱袁公跪披林杪吹竹末折墮地處女即揵其末袁公操其本而刺處女舉杖擊之飛上樹變為白猿三輔舊事曰武帝作延陵及廟竇將軍有青竹田在廟南恐犯蹈之言作陵不便世説曰魏武征袁本初治船餘有數十斛竹片咸長數寸衆並謂不堪用正合燒除太祖意甚惜思所以用之謂可為竹甲而未顯其言馳使以問楊主簿徳祖徳祖意懸同風俗通曰殺青按殺青作簡書之新竹有汁後加於火故作簡者於火上炙乾之水經曰東陽定縣夾岸縁溪悉生支竹及方枳本連雜以霜金橙菊説文曰竹冬生草也華陽國志曰有竹王者興於遯水有一女浣於水濵有三節大竹流入女足間推之不去聞有兒聲持歸破竹得男長養有武才遂雄夷狄氏竹為姓所破竹於野成林今王祠竹林是也又曰何隨家養竹園人盗其竹何隨行遇見恐盗者覺怖王子淵洞簫賦所稱即此地也其竹園緻異於他處自伶倫鼔吹山風土記曰陽羡縣有袁君冡壇邊有數株大竹髙二三丈枝皆兩兩下垂如有塵穢則掃掃壇上恒净潔袁山松宜都山川記曰佷山縣方山有靈祠祠中有特生一竹豐美髙危其杪下垂忽有塵穢起風動竹拂蕩如掃荆州記曰臨賀謝休縣東山有小竹其旁皆四五寸圍下有盤石徑四五丈極方正清滑如弹棊局兩竹屈垂掃其上初無塵穢未至數十里聞風吹此竹如簫管之音武昌記曰陽新縣有朔山山有大竹長十餘丈圍數尺有聲如風雨為官長凶候人占之有騐雲南記曰雲南有實心竹文采斑駁殊好可為器物其土以為槍幹交床述征記曰仙陽縣城東北有中散大夫嵇康宅今悉為田墟而父老猶種竹木崔豹古今注曰牛亨問曰籍者何也答曰籍者尺二竹牒記人之年名字物色懸之宫門按省相應乃得入也劉敬叔異苑曰呉都桐廬人皆伐竹見一竹竿雉頭虵身猶未變此亦竹為虵虵為雉也任昉述異記曰湘水去岸三十許里有相思宫望帝臺舜南廵不返歿葬於蒼梧之野堯之二女娥皇女英追之不及相思慟哭泪下沾竹其文悉斑又曰衛有淇園出竹在淇水之上詩曰瞻彼淇澳緑竹猗猗又曰南中生子母竹今慈竹是也漢章帝三年子母竹笋生白虎殿前謂之孝竹群臣作孝竹頌又曰東海畔孤竹生焉斬而復生中為管周武王時有孤竹人獻笋一株楊泉物理論曰宜陽金門竹為律管河内葭為灰可謂同氣本草曰竹花一名華草夣書曰竹為處士田居夣見竹者憂處士也楚詞七諫曰便娟之竹寄生江潭上葳㽔而防露下冷冷而來風江􅂒竹賦曰含虛中以象道體員質以儀天古詩曰種竹深井中三年乃成竿太平御覧卷九百六十二
