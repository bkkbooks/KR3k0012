body:
  text: 太平御覽卷九十八宋李昉等撰皇王部二十三西晉懷帝愍帝東晉元帝明帝成帝懷皇帝晉書曰孝懷皇帝諱熾字豐度武帝第二十五子也光熈元年封豫章郡王屬惠帝之時宗室搆禍帝沖素自守門絶賓遊不務世事專玩史籍有譽於時初拜散騎常侍及趙王倫簒見収倫敗為射聲校尉累遷車騎大將軍都督青州諸軍事未之鎭永興元年改授鎭北大將軍都督鄴城守諸軍事十二月丁丑立為皇太弟帝以清河王本太子也懼不敢當典書令廬陵修肅曰二相經營王室志寧社稷儲貳之重宜歸時望親賢之舉非大王而誰清河幼弱未允衆心是以既升東宫復贊藩國今乗輿播越二宫久曠常恐氐羌飲馬於涇川螘衆控弦於灞水宜及吉辰時登儲副上翼大駕早寧東京下允黔首顒顒之望帝曰卿吾之宋昌也乃從之光熙元年十一月孝惠帝崩羊皇后以於太弟為嫂不得為太后催清河王覃入已至尚書閣侍中華混等急召太弟癸酉即皇帝位大赦皇后羊氏為惠皇后居宏訓宫追尊所生太妃王氏為皇太后立妃梁氏為皇后十二月南陽王模殺河間王顒於雍谷永嘉元年春正月癸丑朔大赦改元除三族刑以太傅東海王越輔政三月辛已東萊人王彌起兵反冦青徐二州三月庚午立豫章王鈐為皇太子辛未大赦庚辰東海王越出鎭許昌五月馬牧帥汲桑聚衆反敗魏郡太守馮嵩遂陷鄴城害新蔡王騰燒鄴宫火旬日不滅入掠平原山陽公劉秋遇害洛陽步廣地里陷有二鵝出色蒼者沖天白者不能飛秋七月己酉朔東海王越進屯官渡以討汲桑已未以平東將軍琅琊王睿為安東將軍都督揚州江南諸軍事假節鎭建業八月己夘朔撫軍將軍茍晞音希敗汲桑於鄴十二月戊寅并州人田蘭簿盛等斬汲桑於樂陵甲午東海王越矯詔囚清河王覃於金墉城癸夘越自為丞相以撫軍茍晞為征東大將軍二年春正月丙子朔日有食之丁未大赦二月辛夘清河郡王覃為東海王越所害冬十月甲戌劉元海僭帝號於平陽仍稱漢三年三月丁巳東海王越歸京師己丑勒兵入宫於帝側収近臣中書令繆播帝舅王延等十餘人並害之丁夘大旱江漢河洛皆竭可涉九月丙寅劉聰冦浚儀遣平北將軍曹武討之丁丑王師敗績東海王越入保京城聰至西明門越禦之戰於宣陽門外大破之使車騎將軍王堪平北將軍曹武討劉聰王師敗績堪奔還京師劉聰攻洛陽西明門不克冬十一月石勒陷長樂安北將軍王斌遇害因屠黎陽乞活師李惲簿盛等帥衆救京師聰退走惲等又破王彌於新汲四年十月壬子以驃騎將軍王浚為司空平北將軍劉琨為北平大將軍京師饑東海王越羽檄徵天下兵帝謂使者曰為我語諸征鎭若今日尚可救後則無逮矣時莫有至者十一月甲戌東海王越帥衆出許昌以行臺自隨宫無復守衞荒饉日甚殿内死人交橫府寺營署並掘塹自守盜賊公行桴鼓之音不絶越軍次項自領豫州牧鎭東將軍周馥逺迎大駕遷都壽陽越使裴頠討馥為馥所敗走保東城請救於琅琊王睿五年春正月帝密詔茍晞討東海王越罪狀告方鎭討之以征東大將軍茍晞為大將軍景子東海王越薨五月進司空王浚為大司馬琅琊王睿為鎭東大將軍東海王越之出也使河南尹潘滔居守大將軍茍晞表遷都倉垣帝將從之諸大臣畏滔不敢奉詔且宫中及黃門戀貲財不欲出至是饑甚人相食百官流亡者十八九帝召羣臣㑹議將行而警衞不備帝撫手歎之曰如何曾無車輿乃使司徒傅祇出詣河陰修理舟艥為水行之備朝士數十人導從帝步出西掖門至銅駞街為盜所掠不得進而還六月癸未劉曜王彌石勒同冦洛川王師頻為盜賊所敗死者甚衆庚寅司空荀藩光禄大夫荀組奔轘轅太子左率温畿夷夜開廣莫門奔小平津丁酉劉曜王彌入京師帝開華林園門出河陰藕池欲幸長安為曜等所追及曜等遂焚燒宫廟逼辱妃后吳王晏竟陵王楙音茂尚書左僕射和郁等皆遇害百官士庶死者三萬餘人帝蒙塵於平陽劉聰以帝為㑹稽公荀藩移檄州鎭以琅琊王為盟主豫章王端東奔荀晞晞立為皇太子自領尚書令具置官屬保梁國之蒙縣百姓飢儉米斛萬餘價八月劉聰使子粲攻陷長安太尉征西將軍南陽王模遇害長安遺人四千餘家奔漢中九月癸亥石勒襲陽夏至於蒙縣大將軍荀晞豫章王端並殁於賊六年春正月帝在平陽九月辛巳前雍州刺史賈疋討劉粲於三輔走之關中小定乃與衞將軍梁芬京兆太守梁綜共奉秦王鄴為皇太子於長安七年正月劉聰大㑹使帝著青衣行酒侍中庾珉號哭聰惡之丁未帝遇弑崩於平陽在位七年時年三十晉陽秋曰懷帝天姿清劭少有聲名若遭承平之世足為守文佳主而繼惠帝擾亂之後東海專政禄去王室無幽厲之釁而有犬戎之禍悲夫愍皇帝晉書曰愍皇帝諱鄴字彦祺武帝孫吳孝王晏之子也出繼伯父秦獻王東襲封秦王永嘉二年拜散騎常侍撫軍將軍及洛陽傾覆避難於榮陽密縣與舅荀藩荀組相遇自密南趣許穎豫州刺史閻鼎與前撫軍長史王毗司徒長史劉疇等中塗復叛鼎追殺之藩組僅而獲免鼎遂扶帝乗牛車自宛趣武關歸於長安頻遇山賊士卒亡散次於藍田鼎告雍州刺史賈疋疋遽遣州兵迎衞達於長安又使輔國將軍梁紵助守之時有玉龜出霸水神馬鳴城南元年九月辛巳奉秦王為皇太子登壇告類建宗廟社稷大赦加疋征西將軍以秦州刺史南陽王保為大司馬賈疋討賊張連遇害衆推始平太守麴允領雍州刺史為盟主承制選置建興元年夏四月丙午奉懐帝崩問舉哀成禮壬申即皇帝位大赦改元以衞將軍蔣芬為司徒雍州刺史麴允為使持節領軍將軍録尚書事京兆太守索綝為尚書右僕射五月詔琅琊王曰朕以沖昧纂承洪緒未能梟夷凶逆奉迎梓宫枕戈煩寃肝心抽裂前得魏浚表知公帥先三軍已據壽春傳檄諸侯協齊威勢想今漸進已達洛陽凉州刺史張軌乃心王室連旗萬里已到汧隴梁州刺史張光亦遣巴漢之卒屯在駱谷秦州驍勇其㑹如林間遣使適還具知平陽定問云幽并隆盛餘胡衰破然猶恃險當須大舉未知公今所到是以息兵秣馬未便進軍今為已進何許當須來旨便乗輿自出㑹除中原也公宜思宏謨猷勗濟逺畧使山陵旋反四海有賴故遣殿中都尉劉蜀蘇馬等具宣朕意公茂德眤屬宣隆東夏恢融六合非公而誰但洛都陵廟不可空曠公宜鎭撫以綏山東右丞相當入輔弼追蹤周召以隆中興也二年秋七月劉曜趙舟等又逼京都領軍將軍麴允討破之四年七月劉曜攻北地麴允帥步騎三萬救之王師不戰而潰北地太守麴昌奔于京師曜進至涇陽渭北諸城悉潰建威將軍曾充散騎常侍梁緯少府皇甫陽等皆死之八月劉曜逼京師内外斷絶鎭西將軍焦嵩平東將軍宋哲始平太守竺恢等同赴國難麴允與公卿守長安小城以自固散騎常侍華輯監京兆馮翊𢎞農上洛四部兵東屯霸上鎮將軍胡崧師城西部兵諸屯軍遮馬橋並不敢進冬十月京師饑甚米斗金二兩人相食死者大半太倉有麴數十餅麴允屑為粥以供帝至是復盡帝泣謂允曰今窘厄如此外無救援死於社稷是朕事也然念將士暴離斯酷今欲聞城未陷為羞死之事庶令黎元免屠爛之苦行矣遣書朕意決以十一月乙未使侍中宋敞送牋於曜帝乗羊車肉袒銜璧輿櫬出降羣臣號泣攀車執帝之手帝亦悲不自勝御史中丞吉朗自殺曜焚櫬受璧使宋敞奉帝還宫初有童謠曰天子何在豆田中時王浚在幽州以豆有藿殺隱士霍原以應之及帝如曜營營實在城東豆田壁辛丑帝蒙塵於平陽麴允及羣官並從劉聰假帝光禄大夫懐安侯壬寅聰臨殿帝稽首於前麴允伏地慟哭因自殺五年春正月帝在平陽庚子虹霓彌天三日並照平東將軍宋哲奔江左十一月劉聰出獵令帝行車騎將軍戎服執㦸為導百姓聚而觀之故老或歔欷流涕聰後因大㑹使帝行酒洗爵反而更衣又使帝執蓋晉臣在座多失聲而泣尚書郎辛賓抱帝慟哭為聰所害十二月戊戌帝遇弑崩於平陽在位五年時年十八帝之繼皇統也屬永嘉之亂天下崩離長安城中户不盈百牆宇頽毁蒿棘成林朝廷無車馬章服唯桑板署號而已衆唯一旅公私有車四乗器械多闕運饋不繼巨猾滔天帝京危急諸侯無釋位之志征鎭闕勤王之衆故君臣窘迫以至弑辱東晉元皇帝晉書曰元皇帝諱睿字景文宣帝曾孫琅邪恭王覿之子也咸寧二年生於洛陽有神光之異一室盡明所藉藁如始刈及長白毫生於日角之左隆凖龍顔目有精曜顧眄煒如也年十五嗣位琅琊王幼有令聞惠皇之際王室多故毎恭儉退讓以免於禍沈敏有度量不顯灼然之迹故時人未之識焉唯侍中嵇紹異之謂人曰琅琊王毛骨非常殆非人臣之相元康二年拜員外散騎常侍累遷左將軍從討成都王穎蕩陰之敗叔父東安王繇為穎所害帝懼禍及將出奔其夜月正明而禁衞嚴警無由得去甚窘迫有頃雲霧晦㝠雷雨暴至徼者皆弛因得潛出穎先令諸關無得出貴人帝既至河陽為津吏所止從者宋典後來以䇿鞭馬而笑曰舍長官禁貴人汝亦被拘耶吏乃聽過至洛迎太妃歸國東海王越之収兵下邳也假帝輔國將軍尋加平東將軍都督揚州諸軍事越西迎大駕畱帝居守永嘉初用王導計始鎭建業以顧榮為軍司馬賀循為參佐王敦王導周顗音擬刁協等為腹心股肱賓禮名賢存問風俗江東歸心焉及懷帝蒙塵於平陽司空荀藩等移檄天下推為盟主愍帝即位加左丞相歲餘進位丞相大都督中外諸軍事建武元年春二月辛巳平東將軍宋哲至宣愍帝詔曰時遭屯否皇綱不振朕以寡德奉承洪緒不能祈天永命紹隆中興至使凶胡敢帥犬羊逼迫京輦朕今幽塞窮城憂慮萬端恐一旦崩潰卿詣丞相具宣朕意使攝萬機時據舊都修復陵廟以雪大恥三月帝素服出次舉哀三日西陽王羕及羣僚參佐州郡牧守等上尊號帝不許羕等以死固請至於再三帝慨然流涕曰孤罪人也唯有蹈節死義以雪天下之恥庶贖鈇鉞之誅吾本琅琊王諸賢見逼不已乃呼私奴命駕將反國羣臣乃不敢迫請依魏晉故事為晉王許之辛卯即王位大赦改元大興元年春正月戊申朔臨朝懸而不樂三月癸丑愍帝崩聞至帝斬縗居廬丙辰百寮上尊號即皇帝位詔曰昔我高祖宣皇帝誕膺期運廓開王基景文皇帝奕世重光緝熙諸夏爰暨世祖應天順時受兹明命功格天地仁濟宇宙旻天不傭降此鞠凶懐帝短世越去王都天禍薦臻大行皇帝崩殂社稷無奉肆羣后三司六事之人疇諮庶尹至於華戎致緝大命于朕躬予一人畏天之威罔敢稽違遂登壇南面受終文祖燔柴頒瑞告類上帝惟朕寡德纘承洪緒若涉大川罔知攸濟惟企股肱爪牙之位文武熊羆之臣用能弼寧晉室輔予一人思與萬國共兹休慶於是大赦改元庚午立太子紹為皇太子永昌元年春正月乙夘大赦改元戊辰大將軍王敦舉兵於武昌以誅劉隗為名龍驤將軍沈充帥衆應之三月徵征西將軍戴若思鎭北將軍劉隗衞京都劉隗軍于金城右將軍周禮守石頭帝被甲徇六師於郊外遣平南將軍陶侃領江州安南將軍甘卓領荆州各帥所統以躡敦後夏四月敦前鋒攻石頭周禮開城應之奮威將軍侯禮死之敦據石頭戴若思劉隗帥衆攻之王導周顗郭逸虞潭等三道出戰六軍敗績尚書令刁協奔于江乘為賊所害鎭北將軍劉隗奔于石勒帝遣使謂敦曰公若不忘本朝於此息兵則天下尚可安也如其不然朕當歸於琅琊以避賢路辛未大赦敦自為丞相都督中外諸軍録尚書事封武昌郡公邑萬户十一月己丑帝崩於内殿在位六年時年四十七葬平陵廟號中宗孫盛晉陽秋曰昔秦始皇東遊望氣者云五百年後東南金陵之地有天子氣於是始皇改曰秣陵呉人以為孫權帝之表也盛按始皇遊歲至權僭號四百三十七年考之年數既不合校之基守又非倫豈應帝王之符而見兆於上代乎有晉金行奄君四海金陵之祥其在斯乎且秦政東遊至是五百二十六年所謂五百年之後當有王者也又孫皓將亡吳郡臨蕪湖一夜草木自除於湖邊得石函中有小石青白色長四尺廣二寸餘上有白帝字時人莫察其祥意者其中宗興五湖之徵歟太康三年建業有冦餘姚人任振以周易筮之曰冦已滅矣後三十八年揚州當有天子又太安中童謠曰五馬浮渡江一馬化為龍永嘉大亂王室淪覆唯琅琊西陽汝南南頓彭城五王獲濟至是中宗登祚先是歲鎭熒惑太白四聚於牛斗之間五鐸又見于晉陵㝠數元感若合符契焉又初元石圖有牛繼馬後故宣帝深忌牛氏遂為二榼共一口以貯酒帝先飲佳者以毒者酖其將牛金而恭王妃夏氏通小吏牛金而生元帝亦有符云世説曰元帝始過江謂顧驃騎曰寄人國事志常懐慙榮跪答曰臣聞王者天下為家是以秋毫無定處九鼎後洛邑願陛下無遷為念又曰元帝正㑹引丞相王導登御牀王公既固辭中宗引之彌苦文獻曰使太陽與萬物同暉臣下何以仰瞻明皇帝晉書曰明皇帝諱紹字道畿元皇帝長子也幼而聰哲為元帝所寵異年數歲嘗坐置膝前屬長安使來因問帝曰汝謂日與長安孰逺近對曰長安近不聞人從日邊來居然可知也元帝異之明日宴羣寮又問之對曰日近元帝失色曰何乃異間者言之對曰舉目見日不見長安由是益竒之建興初拜東平中郎將鎭廣陵元帝為晉王及即帝位為皇太子性至孝有文武才畧永昌元年閏月己丑元帝崩庚寅太子即皇帝位大赦尊所生荀氏為建安郡君大寧元年三月戊寅朔改元臨軒停饗宴之禮縣而不樂二年夏五月王敦矯詔拜其子應為武衞將軍兄含為驃騎大將軍帝所親信常從督公乗雄冉曾並為敦所害六月敦將舉兵内向帝宻知之乃乗巴滇駿馬㣲行至於湖陰察敦營壘而出軍士疑帝非常人又敦晝寢夢日環其城驚起曰此必黃鬚鮮卑奴來也帝母荀氏燕代人帝狀類外氏鬚黃敦故謂帝云於是使五騎物色追帝帝亦馳去僅以獲免秋七月壬申朔敦遣其兄含及錢鳳周撫鄧岳等水陸五萬至於南岸令温嶠移屯水北燒朱爵桁以挫其鋒帝躬帥六軍出次南皇堂至癸酉夜募壯士遣將軍段秀中軍司馬曹渾左衞參軍陳嵩鍾寅等甲卒千人渡水掩其未備平旦戰於越城大破之斬其前鋒將何康王敦憤惋而死三年春正月戊戌復三族刑唯不及婦人三月戊辰立太子衍為皇太子大赦増文武位二等大酺三日賜鰥寡孤獨帛人二疋閏八月壬午帝不豫召太宰西陽王羕司徒王導尚書令卞壼車騎將軍郄鑒護軍將軍庾亮領軍將軍陸曄丹陽尹溫嶠並受遺詔輔太子戊子帝崩於東堂在位三年時年二十七葬武平陵廟號肅祖晉陽秋曰明帝文武鑒斷初在東宫敬禮賢士昵近明德自王導庾亮温嶠桓彛阮放皆見親侍分好綢繆雅好辭章談論辯明理義與二三君子並著詩論粲然可觀于時東宫號為多士王敦既平思求民莫詔尚書令僕射尚書曰吾飢於餐直言渴於求亮正想諸君達此懷矣予違汝弼堯舜之相君臣吾雖虚闇度不距逆耳之談稷契之任諸君居之矣望共勗之世説曰晉明帝欲起池臺元帝不許之明帝為太子好養武士夕中作池比曉便成即今謂太子池是成皇帝晉書曰成皇帝諱衍字世根明帝長子也大寧三年三月戊辰立為皇太子閏月戊子明帝崩己丑太子即帝位大赦增文武位二等賜鰥寡孤老帛人二疋尊皇后庾氏為皇太后秋七月癸夘皇太后臨朝稱制咸和元年春二月丁亥大赦改元大酺五日賜鰥寡孤老米人二斛二年十一月豫州刺史祖約厯陽太守蘇峻等反十二月辛亥蘇峻使其將韓晃入姑孰屠蕪湖三年二月庚戌峻至于蔣山假領軍將軍卞壼節六軍及峻戰於西陵王師敗績丙辰峻攻青溪栅因風縱火王師又大敗尚書令領軍將軍卞壼丹陽尹羊曼黃門侍郎周遵廬江大守陶瞻並遇害死者數千人庾亮又敗于宣陽門内遂攜其諸弟與郭黙趙裔奔尋陽於是司徒王導右光禄大夫陸曠荀崧等衞帝於太極殿太常孔愉守宗廟賊乗勝麾戈接於帝座突入太后後宫左右侍人皆見掠奪是時大官惟有燒餘米數石以供帝膳百姓號泣震響都邑丁巳峻矯詔大赦又以祖約為侍中太尉尚書令自為驃騎將軍録尚書事五月乙未峻逼天子於石頭帝哀泣升車宫中慟哭峻以倉屋為宫九月戊申司徒王導奔於向石庚午陶侃使督護楊謙攻於石頭温嶠庾亮陣於石頭竟陵太守李陽拒賊南偏峻輕騎出戰墜馬斬之衆遂大潰賊黨復立峻弟逸為帥四年二月内大雨霖丙戌諸軍攻石頭李陽與蘇逸戰於祖浦陽軍敗建威長史滕含以鋭卒擊之逸等大敗含奉帝御于溫嶠舟羣臣頓首號泣請罪丁亥大赦時兵火之後宫闕灰燼以建平園為宫甲午蘇逸以萬餘人自延陵湖將入呉興乙未將軍王允之及逸戰於溧陽獲之咸康元年春正月庚午朔帝加元服大赦改元增文武位一等大酺三日賜鰥寡孤獨不能自存者米人五斛二月揚州諸郡饑遣使賑濟八年夏六月庚申帝不豫詔曰朕以眇年獲嗣洪緒位於羣公之上於兹十有八年未能闡融政道翦除逋祲夙夜戰兢匪遑寧處今遘疾殆不興是用震悼於厥心年齡眇眇未堪艱難司徒琅琊王岳親則母弟體則仁長君人之風允塞時望肆爾羣公卿士其輔之以祇奉祖宗明祀協和内外允執其中嗚呼敬之哉無墜祖宗之顯命壬辰引武陵王晞㑹稽王昱中書監庾冰中書令何充尚書令諸葛恢並受顧命癸巳帝崩於西堂在位十七年時年二十二葬興平陵廟號顯宗太平御覽卷九十八
