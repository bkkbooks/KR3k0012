body:
  text: 太平御覽卷八百六十六宋李昉等撰飲食部二十四醯醢醯釋名曰苦酒淳毒者酢且苦也周禮曰醯人掌共五齊七菹凡醯物以共祭祀之齊菹凡醯醬之物賔客亦如之王舉則共齊菹醯物六十罋共后及世子之醬齊菹賔客之禮共醯五十甕凡事共醯儀禮曰醯醢百甕夾碑十以為列禮曰宋襄公喪其夫人醯醢百甕又曰大功之喪不食醯醬父母之喪又朞而大祥有醯醤論語曰子曰孰謂㣲生髙直或乞醯焉乞諸其隣而與之史記曰通邑大都酤一嵗千釀醯醬千􅒤漢武内𫝊曰西王母仙藥有鳯林鳴酢魏名臣奏曰劉放奏云今官販苦酒與百姓争錐刀之末宜令息絶呉録地理志曰呉王築城以貯醯醢今俗人呼苦酒城晏子春秋曰蘭本三年而成湛之苦酒則君子不近庶人不佩風俗通曰酢如蓂莢按蓂味酸工者取以調味博物志曰酒暴熟者易酢醢酸者易臭又曰龍肉以醯漬之則文章生葛洪肘後方曰治齒痛用多年醶酢唐書曰初薛仁果㧞秦州召富人磔於猛火之上或以醯灌鼻求其金寳又曰任廸簡萬年人舉進士初為天徳軍使李景略判官性重厚常有軍宴行酒者誤以醯進廸簡知誤以景略性嚴慮坐主酒者乃勉強飲盡之而為容其過以酒薄白景畧請换之於是軍中感悦醢周禮曰醢人掌四豆之實朝事之豆其實韮葅醯醢昌本麋臡菁菹鹿臡􅈋葅麋臡饋食之豆其實葵菹蠃醢脾析蠯醢蜃蚳醢豚拍魚醢加豆之實芹菹􅇠醢深蒲醯醢菭葅鴈醢筍菹魚醢又曰醢人為王及后世子共其内羞王舉則共醢六十甕以五齊七醢七葅三臡實之齊當為韲五韲昌本脾析蜃豚拍深蒲也七醢醓蠃蠯蚳魚兔鴈七葅韭菁茒葵芹菭筍菹三臡麋鹿麋臡也凡醯醬所和細切為齊全物若䐑為菹也賔客之禮共醯五十甕凡事共醢禮曰孔子哭子路於中庭有人弔者夫子拜之既哭進使者而問故使者曰醢之矣遂命覆醢禮記外𫝊曰祭祀賔客葅醢之用醢汁也湆亦汁也籩竹器豆木器皆鐵足醢有陸産有水物天地隂陽之炁所生臡者骨肉相雜為之有麋鹿􅍪之臡兎醢蚳醢有魚鴈蠃蠯之醢崔寔四民月令曰五月一日可作醢𢎞君舉食檄曰東里獨姥之醢太平御覽卷八百六十六
