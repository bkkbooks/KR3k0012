  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_684-1a, image: WYG0899/WYG0899-0146a.png}
body:
  text: 太平御覽卷六百八十四宋李昉等撰服章部一總叙冠説文曰冠絭也所以絭髪弁冕之總名也釋名曰冠貫也所以貫韜髪也董巴漢輿服志曰上古穴居野處衣毛而冒皮未有制度後世聖人易之以絲麻觀翬翟之文榮華之色乃染帛以效之始作五采成以為服又曰術氏冠有五綵衣青𤣥裳前員其制差池四重趙氏靈王好服之今不施用也白虎通曰人所以有冠者卷也所以卷持髪也人懷五德莫不貴德示成禮有修餙文章故制冠以餙首别成人也三禮圖曰緇布冠始冠之冠也太古冠布齊則緇之今武冠則其遺象也太古未有絲繒始麻布耳又曰建華冠祠天地五郊八佾舞人服之以鐡為柱卷貫雜大珠九枚禮記檀弓曰古者冠縮縫今也衡縫縮從也今禮制衡讀為横今冠横縫以其辟積多故喪冠之反吉非古也時人之喪冠縮縫古冠耳又郊特牲曰冠義始冠之冠緇布冠也始冠三加冠先加緇布冠太古冠布齊則緇之其緌也齊則緇之鬼神重幽闇也孔子曰吾未之聞也冠而敝之可也三代改制齊冠不用適子冠於阼以著代也醮於客位嘉有成也三加彌尊諭其志也始加緇布冠次皮弁次爵弁冠益尊而志益大也冠而字之敬其名也委貌周道也章甫殷道也毋追上音牟下音堆夏后氏之道也周弁殷冔夏收三王共皮弁素積所不易於先代又曰黄衣黄冠而祭息田夫也野夫黄冠黄冠草服也以息民象季秋草木黄落又曰玉藻始冠緇布冠自諸侯下逹冠而敝之可也本大古耳非時王之法服也𤣥冠朱組纓天子之冠也緇布冠繢緌諸侯之冠也皆始冠之冠也𤣥冠委貌緌諸侯緇布冠有緌尊者飾也繢或作繪緌或作㽔𤣥冠丹組纓諸侯之齊冠也𤣥冠綦組纓士之齊冠也言齊時所服也四命以上齋祭異冠也縞冠𤣥武子姓之冠謂父有喪服子為之不純吉也武冠卷也古者冠卷也縞冠素紕既祥之冠也紕縁邊也紕讀如埤益之埤既祥之冠也已祥祭而祭之服也垂緌五寸惰㳺之士也惰㳺罷民也亦縞冠素紕㓙服之象也垂長緌明非既祥𤣥冠縞武不齒之服也所放不帥教也居冠屬武謂燕居冠也著冠於武少威儀自天子下達有事然後緌燕無事者去飾又曰𤣥冠紫緌自魯桓公始也盖僭宋王者之後服也緌當用繢又冠義曰冠者禮之始也古者冠禮筮日筮賔所以敬冠事敬冠事所以重禮重禮所以為國本也傳曰狄人滅衛齊桓公封衛于楚丘衛忘亡忘其滅亡之困衛文公大布之衣大帛之冠用諸侯諒闇之服又曰鄭子華之弟子臧奔宋好聚鷸冠鷸鳥名聚鷸羽為冠言非法之服鄭伯聞而惡之使盜誘之八月盜殺之陳宋之間君子曰服之不衷身之灾也又曰衛獻公戒孫文子寗惠子食皆服而朝日旰不召而射鴻於囿二子從之不釋皮冠而與之言又曰齊侯田于沛招虞人以弓不進使人執而問之辭曰昔我先君之田也旌以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之又曰范獻子求貨於叔孫使請冠焉以求冠為辭取其冠法而與之兩冠曰盡矣詩曰彼都人士臺笠緇撮緇撮緇布冠也穀梁傳哀公曰公㑹呉子于黄池呉王夫差曰好冠來孔子曰大矣哉夫差未能言冠而欲冠也范寗曰不知冠有差等唯欲好冠史記曰髙祖時籍孺孝惠時閎孺婉佞貴倖與上卧起故惠帝時郎中皆冠鵕䴊貝帶傳脂粉比閎籍之屬又曰丞相公孫𢎞燕見上或時不冠至於汲黯見上不冠不見嘗坐武帳中黯前奏事上不冠望見黯避帳中其敬禮如此漢書曰髙祖為亭長以竹皮為冠及貴所謂劉氏冠也後令爵非公乘以上毋得冠劉氏冠也應劭注曰竹皮今之鵲尾冠是也又曰沛公畧地陳留麾下騎士酈食其里中子也食其見之曰沛公吾所欲從騎士曰沛公不喜儒諸客冠儒冠來者沛公輙解其冠溺其中未可以儒生說也又曰杜欽字子夏家富而目偏盲茂陵杜鄴亦字子夏時人號欽為盲杜子夏以相别欽惡以疾詆廼為小冠廣裁一寸由是京師更謂欽為小冠杜子夏而業為大冠杜子夏又曰蓋寛饒初拜衛司馬冠大冠帶長劒躬按行士卒室又曰江充召見衣紗縠禪衣冠襌纚歩揺冠上見之曰燕趙固多奇士又曰王陽與貢禹為友陽為益州刺史禹聞之彈其冠以待陽薦禹於成帝召為大夫東觀漢記曰莽居攝子宇諫莽而莽殺之逢萌謂其友人曰三綱絶矣不去禍將及即解冠掛東都門而去又曰叚頴㓕羗詔賜頴赤幘大冠一具又曰馬援與公孫述有舊援入蜀述見之甚喜冠之交内之冠立舊友之位後漢書曰劉虞為公孫瓚所誅初虞以儉素為操冠敝不改乃就補其穿及遇害瓚兵搜其内而妻妾服羅紈盛綺餙人以此疑之續漢書曰梁兾改輿服别制卑幘狹冠晉書曰劉暾字長升轉侍御史武庫火尚書郭彰率百人自衛而不救火暾正色詰之彰怒曰我能截君角也暾勃然謂彰曰君何敢恃寵作威作福天子法冠而欲截角乎求紙筆奏之彰伏不敢言衆人觧釋乃止崔鴻十六國春秋前燕錄曰慕容廆曽祖父慕容䟦見燕代少年多冠歩揺冠好之乃斂髪襲冠諸部因呼之為歩揺其後音訛而為慕容遂以慕容為氏又曰慕容雋下書曰周禮冠冕體制君臣畧同中世已來亦無常體今特制燕平上冠悉賜廷尉已下使瞻冠思事刑斷詳平諸公冠悉顔裹屈竹錦纒作公字以代梁處施之金瑱令僕尚書置瑱而已中秘監令别施珠瑱庻能敬愼威儀示民軌則齊書曰武帝幸劉悛第帝着鹿皮冠劉悛設兎毛衾於牖中宴樂以冠賜悛至夜乃出梁書曰陳伯之濟隂睢陵人也年十三四好着獺皮冠又曰張欣泰為直閣歩兵校尉領羽林監欣泰通涉雅好交結多士名素正直輙着鹿皮冠挾素瑟有以啓武帝曰將家兒何敢作此舉止又曰婆利國以瓔絡繞身頭着金長冠髙尺餘形如弁綴以七寶之餙後魏書曰崔休兼給事黄門侍郎叅定禮儀帝常閲故府得舊冠題曰南部尚書崔逞制顧謂休曰此卿家舊事也唐書曰貞觀中太宗初服翼善冠賜貴臣進德冠因謂侍臣曰幞頭起自周武帝蓋以便於軍容今四海無虞宜息武事此冠頗採古様兼類幞頭乃宜常服可與袴褶通用又曰肅宗時司天韓頴奏五官正其官配五方臣請冠上加一星衣從方色國語曰定王使單襄公聘于宋遂假道於陳以聘于楚及陳陳靈公與孔寧儀行父南冠以如夏氏單子歸告王曰陳我大姬之後也棄衮冕而南冠以出不亦簡彛乎言簡畧常服也家語曰哀公問孔子曰昔舜何冠孔子不對公曰有問於子不對何也對曰舜之為君好生惡殺任能授賢君舍此不遵而冠是問是以緩對又曰大夫請罪用白冠􅈊纓周書曰成王將加元服周公使人來零陵取文竹為冠春秋繁露曰冠之在首𤣥武之象也𤣥武貌之最嚴威者其象在後反居首者武之至而不用者矣春秋合誠圖曰天皇大帝北辰星也含元秉陽舒精吐光居紫宫中制御四方冠有五采戰國䇿曰王升謂齊宣王曰王之憂國愛民不若王愛尺縠也王曰何謂升曰王使人為冠不使左右便辟而使工者何也為能之也今王治齊非左右便辟無使也臣故曰不如愛尺縠也桓子新論曰傳記言魏牟北見趙王王方使冠工制冠於前問治國於牟對曰大王誠能重國若此二尺縱則國治且安王曰國所受於先人宗廟社稷至重比之二尺縱何也牟曰大王制冠不使親近而必求良工者非為其敗縱而冠不成與今治國不善則社稷不安宗廟不血食大王不求良士而任使其私愛此非輕國於二尺縱之制耶王無以應又曰宋康王為無頭之冠以示勇六韜曰冠雖敝禮加之於首履雖新法踐之於地莊子曰宋鈃尹文為華山之冠以自表又曰盗跖責孔子曰爾作言造語妄稱文武冠枝木之冠帶死牛之脅揺唇鼓舌擅生是非以迷天下之主尉繚子曰天子𤣥冠𤣥纓諸侯素冠素纓大夫以下練冠練纓墨子曰昔齊桓公髙冠博帶以治其國楚莊王鮮冠組纓絳衣博袍以治其國孟子曰陳相道許子之言於孟子孟子曰許子必種粟而後食乎曰然許子冠乎曰冠曰奚冠曰冠素曰自織之與曰以粟易之曰許子奚為不自織曰害於耕韓子曰齊桓公飲酒遺其冠恥之三日不朝管仲曰此有國者之恥公胡不雪之以政公曰善因發囷倉賜貧窮論囹圄出薄罪處三日而民謌之曰公胡不復遺其冠乎晏子春秋曰景公為巨冠長衣以聽朝淮南子曰莊王誅史里孫叔敖制冠澣衣史里候臣也惡人死自知當見用故制冠澣衣又曰冠之於人也寒不能煖風弗能鄣暴不能敵然而戴冠屨屨者其所自託者然又曰楚莊王好觟胡丸切冠楚國效之也許愼注曰今力士冠又曰魯人身善制冠妾善織履往徙於越而大困以有用遊於不用之鄉也瑣語曰范獻子卜獵命占之其繇曰君子得黿小人遺冠范獻子獵而無得遺其豹冠語林曰丞相拜司空諸葛道明在坐王指冠冕曰君當復着此乎古今注曰曽參鋤𤓰三足烏來萃其冠漢武内傳曰上元夫人戴九星靈芝夜光之冠西王母戴太真晨嬰之冠神仙服食經曰漢武帝間居未央殿有人乘白雲車駕白鹿冠芙蓉冠曰我中山衛叔卿也楚辭曰余㓜好此奇服年既老而不衰帶長鋏之陸離冠切雲之崔嵬又曰髙余冠之岌岌長余佩之陸離又曰握申椒與杜若冠浮雲之峩峩摯虞逰思賦曰戴朗月之髙冠綴大珠之明璫𫝊𤣥冠銘曰居髙無忘危在上無忘敬懼則安敬則止曹植與陳琳書曰夫披翠雲以為衣戴北斗以為冠帶虹蜺以為紳連日月以為佩此服非不美也然而帝王不服者望殊於天志絶於心矣張衡七辯曰微霧之冠飛翮之纓太平御覽卷六百八十四
