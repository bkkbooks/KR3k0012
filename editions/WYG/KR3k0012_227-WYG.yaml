body:
  text: 太平御覽卷二百二十七宋李昉等撰職官部二十五侍御史殿中侍御史監察御史侍御史六典曰侍御史掌糺舉百寮推鞫獄訟凡有别付者則按其實狀以奏若尋常之獄推訖斷於大理凡事非大夫中丞所劾而合彈奏者則具其事爲狀大夫中丞押大事則豸冠朱衣纁裳白紗中單以彈之小事常服而已續漢書百官志曰侍御史員五人秩六百石以公府掾屬高苐補之或守議郎郎中爲之掌察非法受公卿群吏奏事有違失者舉劾之凡郊廟及大拜則一人監威儀有違失則劾奏漢官儀侍臣下曰侍御史秦官也案問有御史掌邦國都鄙及萬民之治令以贊冡宰應劭漢官儀曰侍御史周官也爲柱下史冠一名曰柱後以鐡爲之言其審固不撓也或説古有獬豸獸主觸邪佞故執憲者以其角形爲冠耳余覽秦事云始秦滅楚以其君冠賜御史漢興襲秦因而不改漢書儀曰御史員四十五人皆是六百石其十五人衣絳給事殿中爲御史宿廬在石渠門外二人尚璽四人持書給事二人侍前中丞一人領録三十人留寺理百官事也史記曰趙禹者郿人武帝即位禹以刀筆吏積勞遷爲侍御史與張湯論定律令又曰下杜人程邈爲御史得罪始皇幽繫雲陽十年從獄中作大篆少者増益多者損减方者使圓圓者使方奏之始皇善之岀爲御史又曰張蒼好舊歴秦時爲御史主柱下方書漢書曰江充拜直指繡衣使督三輔盗賊禁察踰侈時近臣多奢僣充皆舉劾請没入車馬令身從北軍擊匈奴奏聞貴戚惶恐又曰王禁字翁孺武帝時爲繡衣御史逐捕群盗皆縱而不誅矣又曰嚴延年遷御史劾霍光專廢立東觀漢記曰陳寵曾祖父咸哀平間以明律爲侍御史王莾簒位與子相將歸鄉里閉門不岀乃收家中律令文書壁藏之以俟聖王咸常戒子孫爲人議法當依輕雖有百金之利無與人重後漢書曰桓典爲侍御史執政無所避常乗驄馬京師畏之語曰行行且止避驄馬御史又曰杜詩爲御史案集洛陽時將軍蕭廣放縱兵士暴横民間百姓惶擾詩勅暁不改遂格殺廣還以狀聞世祖召見賜以棨㦸焉又曰李恂拜侍御史持節使幽州宣布恩澤慰撫北狄所過皆圖冩山川屯田聚落百餘卷悉封奏上肅宗嘉之又曰光武聞杜林還三輔乃徴拜侍御史引見問以經書故舊及西州事甚悦之賜以車馬衣被又曰陳翔字子麟拜侍御史元日朝賀大將軍梁冀威儀不整翔奏請收冀治罪時人奇之又曰楊秉字叔節拜侍御史京畿咸稱其宰相之才又曰譙𤣥爲繡衣使者持節分行天下觀覽風俗所至專行誅賞續後漢書曰种音中暠字景伯順帝時爲侍御史監䕶太子承光宫中常侍高梵受勅迎太子不齎詔書以衣車載太子欲岀太子太傅高褒不知所以力不能止開門臨去暠至横劍當車曰御史受詔監䕶太子太子國之儲副人命所繫常侍來無一尺詔書安知非挾姦耶今日之事有死而已梵不敢爭又曰張綱字文紀遷侍御史漢初遣八使廵行風俗八使同日拜謂之八彦皆宿儒要位唯綱年少官微受命各之所部而綱獨埋車輪於洛陽都亭曰豺狼當路安問狐狸遂奏大將軍梁冀兄弟罪惡京師震悚魏志曰袁紹字本初有姿貌威容能折節下士士多附之太祖少與交以大將軍掾爲侍御史又曰帝嘗大㑹殿中御史簮白筆側階而坐問左右此爲何官何主左右不對辛毗曰謂御史舊持簮筆以奏不法今者直備官但珥筆耳吳志曰吕岱親近吳郡徐原慷愾有才志岱知其可成賜巾褠古侯切單衣與共言論後遂薦拔官至侍御史原性忠壯好直言岱時有得失原輙諫爭又公論之人或以告岱岱笑曰是我所以貴德淵德淵原字者也及原死岱哭之甚哀曰德淵吕岱之益友今不幸岱復於何聞過談者美之又曰張紘字子綱吴郡人也孫策遣紘奉章至許昌留爲侍御史少府孔融等皆與親善又曰朱據字子範吳郡人也補侍御史是時選曹尚書曁艷疾貪汚在位欲沙汰之據以爲天下未定宜以功覆過棄瑕取用舉清勵濁足以沮勸若一時貶黜懼有後咎艷不聼卒敗晉書曰庾峻字山甫長安大獄乆不决轉峻御史徃斷朝野稱當又曰劉毅子暾它昆切正直有父風爲御史庫失火尚書郭彰率百人自衞而不救火暾正色詰之彰怒曰我能截卿角也暾勃然謂彰曰君何時敢恃寵作威作福天子法冠而欲截角乎命紙筆奏之彰伏不敢言衆人皆釋乃止隋書曰栁調轉侍御史左僕射楊素嘗於朝堂見調因獨言曰栁條通體弱獨揺不湏風調歛板正色曰調信無取者公不當以爲侍御史調信有可取不應發此言公當具瞻之秋樞機何可輕發素甚竒之又曰游元爲侍御史奉使於黎陽督運㑹楊𤣥感作逆乃謂元曰獨夫肆虐天下士大夫肝腦塗地以䧟身絶域之所軍粮斷絶此乃天亡之時我今親率義兵誅無道卿意如何元正色答曰尊公荷國寵靈功叅佐命高官重禄近古莫儔公之兄弟青紫交映當謂竭誠盡節上答鴻㤙豈意墳土未乾親圖反噬深爲明公不取願思禍福之端僕有死而已不敢聞命𤣥感怒而囚之屢脅以兵竟不屈節於是害之又曰陳孝意大業初爲魯郡司法書佐郡内號爲亷平太守蘇威嘗欲殺一囚孝意故諫至於再三威不許孝意因解衣請先受死良乆威意乃解謝遣之漸加禮敬及威爲納言奏孝意侍御史又曰獬豸冠案禮圖曰法冠也一曰柱後惠文如淳注漢官云惠蟬也細如蟬翼今御史服之禮圖也又曰獬豸冠高五寸秦制也法官服之案董巴志云獬豸神羊也蔡邕云如麟一角應劭云由此獸觸不直故執憲者爲冠以象之秦滅楚以其冠賜御史唐書曰李素立丁憂高祖令所司奪情授七品清要官所司權擬雍州刺史録叅軍高祖曰此官要而不清又擬秘書郎高祖曰此官清而不要遂擢授侍御史又曰栁範爲侍御史時吳王恪好畋獵損居人田苖範奏彈之太宗因謂侍臣曰權萬紀事我兒不能匡正其罪合死範進曰房𤣥齡事陛下猶不能諫止畋獵豈可獨罪萬紀太宗大怒拂衣而去乆之獨引範曰何得逆折我範曰臣聞主聖臣直陛下仁明臣敢不盡愚直太宗意乃大解又曰高宗嘗問群臣求可爲御史者僉舉萬年尉楊子失其名居數月復問之群臣又舉焉上曰吾聞斯人常䙝服居公堂視事其可爲凖繩司乎由是百寮必表而視事又曰乾封中􅅊仁約除侍御史與公卿相見未嘗行拜禮或勉之仁約曰鵰鶚鷹鸇豈衆禽之偶奈何設拜以狎之且耳目之官故當特立乃曰御史䘖命岀使不能動揺山岳震懼州縣誠曠職耳又曰賈言忠河南洛陽人也乾封中爲侍御史時朝廷有事遼東言忠奉使往支運粮及還高宗問以軍事言忠盡其山川地勢且陳遼東可平之狀高祖悦又問諸將優劣言忠曰李勣先朝舊臣聖鑒所悉龎同善雖非鬪將而持軍嚴整薛仁貴勇冠三軍名可振敵高偘儉素自處忠果有謀契苾何力沉毅持重有統御之才然頗有忌前之癖將將夙夜小心忘身憂國莫逮於李勣者高宗深然之又曰劉思立宋州寜陵人也高宗時爲侍御史屬河南河北旱儉遣御史中丞崔謐等分道存問賑給思立上疏諫曰今麥序方秋蠶功未畢三時之務萬姓所先勅使撫廵人皆竦抃忘其家業翼此天恩踊躍叅迎必難抑止集聚旣廣妨廢亦多加以途程徃還兼之農多停滯旣縁賑給湏立簿書本欲安存却成煩擾又無驛之處騎馬稍難簡擇公私湏臾追集雨後農務特切常情蹔廢湏臾即虧歲計毎爲一馬遂勞數家從此相乗恐更滋甚望且委州縣賑給待秋後閑時岀使褒貶疏奏謐等遂不行又曰李義甫恃寵用事婦人淳于氏有美色坐事繫大理乃諷丞畢正義枉法岀之將納爲妾會有密言其狀者上令給事中劉仲軌鞫之義府恐洩其謀逼正義自縊於獄中上特原義府之罪侍御史王義方奏義府擅殺寺丞陛下雖已釋放然天子置三公九卿二十七大夫八十一元士本欲水火相濟鹽梅相成然後庶績咸熈風雨交泰則知人主不得獨是非昔唐堯至聖失之於四㓙漢祖深仁失之於陳狶光武聰明寛恕失之於龎萌魏武勇略英雄失之於張邈此英傑之主莫不失之於前得之於後陛下繼聖撫有萬邦蠻陬夷落猶懼刑綱况輦轂咫尺姦臣肆虐殺一六品丞足使忠臣抗憤縱令正義自縊此事彌不可容便是畏義府之權勢能殺身以滅口此則生殺之威已非主岀賞罰之柄下移姦佞請乞重勘當正義死之由雪寃氣於幽泉誅奸臣於白日對仗叱義府令下義府視不退義方三叱上無言義府趍岀又曰王志愔博州聊城人也少以進士擢第神龍年累除左臺御史執法剛正百寮畏憚時人呼為皁鵰言瞻人吏如鵰鶚之視鷰雀也又曰蘇瓌按問鄭普思其妻有寵於韋庶人特勅令對御辨折上屢抑瓌而伸普思侍御史范獻忠厯階而前曰臣請先罪蘇瓌上問其故獻忠曰蘇瓌國之大夫荷榮貴乆矣不斬逆賊而後聞奏今使眩惑天聰揺動刑柄而普思反􅃺昭露陛下曲爲申理此則王者不死今聖躬萬福豈有兩天子耶請先死終不能事普思上意乃解獄遂定又曰御史遭長官於途皆免帽降乗長官戢轡辭而上馬乾封中王本立爲御史意氣頗高途逢長官端揖而已自是諸人或降而立或足至地或側鞭㢮􅌱輕重無恒開元以來但舉鞭聳揖而已也又曰劉藏器爲侍御史時衞卿尉遲寳琳抑人爲妾藏器奏請還其父母上旣可其奏寳琳私奏乞上又從之藏器復執奏上又可之寳琳又請如是三藏器進言曰法者海内之懸衡上下之所共若刑罰不中則人無所措手足陛下若用捨恣情愛憎由己則國之刑憲何所施陳今寳琳請陛下從之臣執奏陛下亦從之今日從之明日又改之欲令下人人何遵奉大人無信不立匹夫匹婦尚不可失信况爲天子安可戯言今陛下二三其言處分不定臣恐四海之内無所適從上竟從藏器所奏又曰王播爲侍御史貞元末幸臣李實爲京兆尹恃㤙頗横嘗遇播於途不避故事尹避臺官播移文詆之又曰温造拜侍御史請復置彈事朱衣豸冠於外廊大臣阻而不行李祐自真州入拜金吾違制進馬一百五十疋造正衙彈奏祐股戰汗流祐私謂人曰吾踰蔡州城擒吳元濟未嘗心動今日膽落於温御史吁可畏哉英雄記曰袁紹辟大將軍府不得已起從命舉高第遷侍御史弟術爲尚書紹不欲爲臺下告疾求退三輔决録曰韋約字季明司徒劉愷甚敬重之謂曰君以輕去就大位不躋今歲垂盡選御史實欲煩君約曰犬馬齒盡旣無膂力又無考課所以躊躇戀慕者以明公禮遇隆崇未能自割因稱素有風疾眩冒不堪乆侍遂徒跣趍岀公追不及陳留耆舊傳曰楊仁字文義明帝引見問當代政治之事仁對上大竒之拜侍御史明帝崩是時諸馬貴賤各爭入宫仁披甲持㦸遮勅宫門不得令入章帝旣立諸馬貴人更讚仁勅峻於是上善之通典曰侍御史之職四謂推推者掌推鞫彈掌彈舉公廨知公廨事雜事臺中事悉總之定殿中監察以下職事及進名改轉臺内之事悉主之號爲臺端他人稱之曰端公其知雜事者謂之雜端最爲雄劇食坐之南設横榻謂之南床殿中監察不得坐亦謂之癡床言處其上者皆驕傲自得使人如癡故謂之癡床也凡侍御史之例不出累月則遷登南省故號爲南床百日察其行歩出入揖讓去就殿中已下皆禀而隨之先後虧失者有罰又曰二漢侍御史所掌凡有五曹一曰令曹掌律令二曰印曹掌劾印三曰供曹掌祭祀四曰尉馬曹掌廐馬五曰乗曹掌車駕豹尾之内便爲禁省又曰舊例御史臺下不受訴訟有通詞狀者卧於臺門候御史竟往門外収採知可彈者畧其姓名皆云風聞訪知永徽中崔義𤣥爲大夫始定受事御史知一日劾狀題吿人姓名黄石公隂謀秘法曰熒惑火之精御史之象主禁令刑罰収補糺正殿中侍御史六典曰殿中侍御史掌殿供奉之儀式凡冬至元正大朝會則具服升殿若郊祀廵省則具服從於旌門檢察視其文物之有虧闕則糺之凡兩京城内則分知左右廵各察其所廵之内有不法之事三國典略曰齊宋世良字元文魏孝莊時爲殿中侍御史詣河北括戸大獲游惰至汲郡旁見有骸骨移書瘞之其夜雨滂沱孝莊勞之曰卿所括得丁倍於本帳若官人皆如此便是更生岀一天下也唐書官品志曰殿中侍御史四人掌殿中禁衞内事又曰張行成爲殿中侍御史糺劾不避權戚太宗以爲能謂房𤣥齡曰觀古今用人必因謀介若行成者朕自舉之無先容也又曰王無競自監察御史轉殿中侍御史舊例自每日更直於殿前王班宰相宗楚客楊再思嘗離班偶語無競前曰朝禮至敬公等大臣不宜太輕易以慢恒典楚客等大怒轉無競爲太子舎人又曰殿中侍御史郭震劾刑部尚書趙彦昭太子賔客韋嗣立青州刺史􅅊安石曰彦昭以女巫趙五娘左道亂常託爲諸姑濳相影援旣因提挈遂踐台階或輕車造門施婦人之服或擕妻就謁申猶子之情同惡相濟一至於此又張易之兄弟勢傾朝野嗣立此際結爲舅甥神龍之初已合誅死天網疎漏要領誤全與安石託附阿􅅊編諸屬籍中宗晏駕削太皇輔正之制定阿􅅊臨朝之策此時朝野危懼人神怨憤臣忝司清憲敢不糺彈彦昭等並請准法處分於是並貶官山公啓事曰中書屬通事令史孫琳限滿乆習内事才宜殿中侍御史湏空補之不審可否詔曰可曹氏傳曰左擁起於部吏武帝以爲能擢爲殿中侍御史監察御史六典曰監察御史掌分察百官廵按郡縣糺視刑獄肅整朝廷有不肅敬及闕失者則糺而劾之唐書曰監察御史李素立武德初爲監察御史時有犯法不至死者高祖將令殺之素立諫曰三尺之法與天下共之法一動揺則人無所措手足陛下甫創鴻業遐荒尚阻奈何輦轂之下便棄刑書臣法司不敢奉㫖高祖從之又曰張嘉貞蒲州猗氏人也坐事免歸鄉里居長安侍御史張循憲爲河東採訪使薦嘉貞材堪憲官請以已之官秩授之則天召見垂簾與之言嘉貞奏曰臣以草萊得謁九重是千載一遇也咫尺之間如隔雲霧竟不觀日月恐君臣之道有未盡則天遽令卷簾與語大悦擢拜監察御史又曰紀履忠爲監察御史劾奏御史中丞來俊臣罪狀者五一專擅國權二謀害忠善三贓賄貪濁四失儀亂禮五滛昏狠戾論兹五罪合至萬誅請下獄理罪又曰蕭至忠爲監察御史彈鳯閣侍郎同鳯閣鸞臺三品蘇味道贓汚貶官御史大夫李承嘉嘗召諸御史責之曰近日彈事不諮大夫禮乎衆不敢對至忠曰故事臺中無長官御史人君耳目比肩事主得各自彈事不相闗白若白大夫乃許彈事如彈大夫不知白誰也承嘉怫然然而憚其剛正又曰崔琬爲監察御史彈奏宰相宗楚客紀處訥等驕恣䟦扈請收劾之舊制大臣有被御史彈者皆俯僂趍岀待罪朝省楚客瞋目作色稱以忠鯁被誣中宗令琬與楚客約爲兄弟人竊歎焉又曰齊澣定州義豐人少以詞學稱弱冠制科登第景雲二年中書令姚崇用爲監察御史彈劾違犯先於風教當時以爲稱職又曰開元五年監察御史杜暹往磧西覆屯會郭䖍瓘與史獻等不叶更相執奏詔暹案其事實史獻以金遺暹固辭左右曰公遠使絶域不可失蕃人情暹不得已受之埋於幕下旣去出境乃移牒令収取之又曰李勉拜監察御史屬朝廷右武勲臣恃寵多不知禮大將管崇嗣於行在朝堂背門而坐言笑自若勉劾之拘於省司肅宗特原之歎曰吾有李勉始知朝廷尊矣又曰御史臺奏准舊例監察御史從下六人各察尚書省一司又准興元元年十月勅令監察御史從上第一人察吏部禮部第二人察兵部工部第三人察户部刑部第四人者伏以監察第一第二人已充監察及舘驛等使新人除岀使外並無以觀其能否今請守舊制新人分察從之又曰元稹拜監察御史奉使東蜀劾奏東川節度使嚴礪違制禮擅賦入籍没塗山甫等吏民八十八戸田宅奴婢時礪已死七州刺史皆責罰稹雖舉職而執政猶與礪厚惡之又曰楊收兄假自浙西觀察判官入爲監察御史兄弟並居憲府特爲新例又曰李憕音澄太原人也宇文融爲御史括田戸奏知名之士崔希逸咸廙業宇文順字孺卿李富及憕爲判官攝監察御史分路檢察以課並遷監察御史又曰栁渾拜監察御史臺中執法之地動限儀矩渾惟放曠不甚檢束察長拘局忿其疎縱渾不樂乞外任執政惜其才奏爲左補闕太平御覽卷二百二十七
