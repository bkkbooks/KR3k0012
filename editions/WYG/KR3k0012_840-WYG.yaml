body:
  text: 太平御覽巻八百四十宋李昉等撰百榖部四稷粟稷毛詩駉頌閟宫曰有稷有黍有稻有秬禮記曲禮下曰凡祭宗廟稷曰明粢又内則曰豕宜稷國語曰稷為稷不能蕃殖爾雅曰粢稷也郭璞注曰今江東呼粟為粢也孫英曰稷粟也說文曰稷五榖之長也山海經曰廣都之野爰有膏稷廣志曰破藏稷逼黍稷此二者以四月熟本草曰稷米甘而無毒益志氣補不足鄭氏婚禮謁文賛曰稷為太官盧毓冀州論曰貞定好稷地産不為無珎也粟歸藏曰剥良人得其玉小人得其粟河圖讖徴曰蒼帝起天雨粟也説文曰粟嘉榖實也粟之為言續也爾雅曰虋赤苖芑白苗虋赤􅆝栗也􅉮白粱粟也虋音門􅉮音起尚書仲虺之誥曰肇我邦于有夏若苖之有莠若粟之有秕毛詩曰握粟出卜自何能榖又小宛曰交交桑扈率場啄粟周禮地官下曰倉人掌粟入之藏禮記曲禮上曰獻粟者執右契禮記祭義曰父母既沒必求仁者之粟以祀之謂禮終左𫝊僖上曰冬晉薦飢乞糴于秦輸粟于晉自雍及絳相繼命之曰汎舟之役又襄五曰季文子卒大夫入歛無衣帛之妾無食粟之馬又襄二十九曰鄭子皮即位於是鄭饑而未及麥民病子皮以子展之命餼國人粟户一鍾又昭六年夏會于黄父謀王室也王室有子朝亂謀定之趙簡子令諸侯之大夫輸王粟春秋佐助期曰粟神名許給姓慶天又説題辭曰髙而平者為原平而和者故宜粟又曰粟助陽扶隂粟之為言續也粟五變一變而以陽生為苖二變而秀為禾三變而粲然謂之粟四變入臼米出甲五變而蒸飯可食宋均注曰粟受五行氣而五變故乃成可食陽以一立為法故粟積一大分穂長一尺文以七烈精以五立故其字西米為粟西者金所立米者陽精故西字合米而為粟宋均注曰續謂陽生長也受五行氣而變春秋潛潭巳曰天雨粟無徳者興有徳者不禄小人進大臣辱公羊𫝊僖上曰秋齊侯宋公江人黄人會於陽榖桓公粟無障榖無貯何休注曰有無相通榖梁𫝊莊公曰諸侯無粟諸侯相歸粟正也論語雍也曰子華使於齊冉子為其母請粟子曰與之釡請益曰與之庾原思為之宰與之粟九百辭子曰毋以與爾鄰里鄉黨乎周書曰神農之時天雨粟神農耕而種之作陶冶斤斧破木為耜鉏耨以墾草芥然後五榖興以助菓蓏之實史記曰武平殷亂天下宗周伯夷叔齊恥之義不食周粟又曰宣曲任氏之先為督道倉吏秦之敗豪傑皆爭金玉而任氏獨窖倉粟楚漢相拒滎陽民不得耕種米石至萬金而豪傑金玉盡歸任氏任氏以此起富又曰漢興七十餘年之間國家無事非遇水旱之災太倉之粟陳陳相因充溢露積於外至腐敗不可食也又曰文帝徙淮南王道死民歌曰一斗粟尚可舂一尺帛尚可縫兄弟二人不相容又汲黯傳曰河内失火上使黯往視之還報曰河内人或父子相食臣謹發河南倉粟以賑貧乏上賢而釋之史記曰大將軍青遂至窴顔山趙信城得匈奴積粟倉軍留一日而還悉燒其城餘粟以歸漢書曰酈食其説齊王曰漢英豪賢才皆樂為之用諸侯之兵四面而至蜀漢之粟方舩而下又曰公孫𢎞起家徒歩為丞相故人髙賀従之食以脱粟米飯覆以布被賀怒曰何用故人富貴為脱粟布被我自有之乃退去又曰主父偃諫伐匈奴曰秦始皇使天下飛芻輓粟起於東陲琅邪負海之郡轉致北河率三十鍾而致一石又曰秦將王離渉間圍鉅鹿章邯軍其南築甬道而輸之粟又曰神農之教曰有石城十仞湯池百歩帶甲百萬而亡粟弗能守又東方朔𫝊曰侏儒長三尺俸一嚢粟錢二百四十臣長九尺餘亦俸一嚢粟錢二百四十侏儒飽欲死臣朔飢亦欲死又曰賈捐之上言曰武帝元狩六年太倉之粟紅腐不可食謝承後漢書曰丹陽方儲字聖明曉風角占候為章句長民田還置粟二石及刀鋤於陌上明日求之亡去疑其鄰家儲曰此人非偷者呼縣功曹語曰君何取粟置家後積菱中功曹欵服後漢書王符潜夫論曰富貴則背親捐舊䘮其本心朽貫千萬而不忍賜人一錢積粟腐倉而不忍貸人一升後魏書曰任城王雲為冀州刺史雲留心政事甚得下情於是合城長吏請輸絹五尺粟五升以報雲恩髙祖嘉之又曰世祖引髙允與論刑政言甚稱㫖因問允曰萬幾之務何者為先是時多禁封良田又京師逰食者衆允因言曰地方一里則為田三頃若勤之則畆益三升不勤則畆損三升方百里損益數率為粟二百一十二萬斛况以天下之廣乎若公私有儲雖遇飢年復何憂哉世祖善之遂除田禁又曰偉朏字尊顯少有志業年十八辟州主簿時屬歳儉胐以家粟造粥以飼飢人所活甚衆後周書曰王羆為華州刺史時闗中大飢徴稅民間榖食以供軍費或隱匿者令逓相吿多被鞭棰以是人有逃散惟羆信著於人莫有隠者得粟不少唐書曰始平人宗士眺負粟一石委於太倉而去云願少益軍國髙祖嘉之賚布百叚晉史曰髙祖性嚴而難犯事多親决嘗有店婦與軍士懇訴無以自明帝因鞫吏曰雖屬官吾可市而代之兩訟未分何以為斷可殺馬刳腸視其粟有則軍士誅無則婦人死遂殺馬馬腸無粟因戮其婦境内肅然莫敢以欺漢實録曰王周性寛恕不忤物情初刺信都州城西橋敗覆民租車周曰橋梁不飾予之過也乃還其所沉粟出私財以修之孔叢子曰子思居貧其友有餽之粟者受二車焉或獻罇酒束修子思曰為費而無當也或曰子取人粟而辭酒是辭少而受多也於義則無名於分則不全行之何也子思曰然伋不幸而貧於財至及困乏將絶先人之祀夫所以受粟為周乏也酒脯則所以飲讌也方乏於食而乃飲讌非義也吾豈以為介哉度義而行之又曰季桓子以粟十鍾餼夫子夫子受而班門人之無者子貢曰季孫以夫子貧故致粟今而施人無乃乖彼意乎子曰吾受而不辭為季孫之恵受而不為富恵於一人豈若數百人哉管子曰桓公觀於野曰何物可比君子之徳隰朋曰粟可比君子之徳管仲曰苖始出生也昫昫乎音句似孺子安之則安不得則危故命之曰禾可比君子桓公曰善晏子春秋曰北郭騷見晏子曰願託所以養母晏子分倉粟府金以遺之辭金受粟晏子見疑出奔北郭子遂造公庭曰晏子天下賢人去齊敵必來侵臣見國之侵不若死請以頭白晏子因自殺景公聞大駭自造晏子又曰寸之管無當天下不能足粟今齊國丈夫耕女子織夜以按日不足以奉上而君側雕文刻鏤之觀此無當之管也曾子曰曽子魯君饋之粟辭不受使者曰子無求於人人自致之曰與人者驕人受人者畏人縦子不以是驕我我能無畏乎與其富而畏人不若貧而無屈墨子曰世俗之君子視義士不若視負粟者今有人於此負粟息於路側欲起而不能君子見之無長少貴賤必起之何重故也今為義之君子奉承先王之道以語之縦不説而行又従而非毁之則是世俗之君子視義士不若視負粟者莊子曰周家貧貸粟於監河侯侯曰待我得邑金將貸子周作色曰周昨来有呼周者視轍中有一鮒魚曰我東海之波臣也君豈有升斗水活我哉周曰諾我且南遊吳越激西江之水迎子可乎鮒魚曰不如早索我於枯魚之肆吕氏春秋伍子胥諫呉王曰非呉䘮越越必䘮呉今將輸之粟是吾讐而豢吾仇乎又曰飯之美者𤣥山之禾不周之粟不周山在崑崙山陽山之穄南海之秬崑崙之南故曰陽山穄闗西謂之麋秬黑黍也啇君書曰金一兩生於境内粟十二石死於境外粟十二石生於境内金一兩死於境外國好生金於境内則金粟兩死倉府兩虛國弱好生粟於境内金粟兩生倉府兩實國强荀卿子曰仁義禮智之於人也譬之若貸財粟米之於家也多有之者富少有之者貧至無有者窮淮南子曰鬻棺者欲民之疾疫畜粟者欲歳之飢荒也又曰黄帝治天下力牧太山嵇輔之狗彘吐菽粟於道路而無忿争之心又曰昔者蒼頡作書而天雨粟髙誘注曰蒼頡始視鳥跡篆文而造書者也有書契則詐偽萌生去本走末棄耕作業而務錐刀之地天知其将餓故雨粟也又曰撮粟而舂數米而炊可以治家而不可以治國後取量最多者種之桓階别𫝊曰階為趙郡太守路有遺粟一嚢耕者得之舉以繫樹數日其主聞還取之桂陽先賢畵讃曰成子郴中人能逹鳥鳴為郡主簿與衆人俱坐聞雀鳴而笑曰東市輦粟覆車雀相呼往食之衆人遣視信然王子年拾遺記曰東極之東有龍枝之粟言其枝屈曲若游龍食之善走又有鳯冠粟似鳯之冠食者令人多力有雲渠粟叢生葉似扶渠食之益顔色粟莖赤黄皆長二丈千株叢生博物志曰鴈食粟則翼垂不能飛鄒子曰董仲舒三年不窺園嘗乗馬不覺牝牡朱買臣貧賤之時孳孳修藝不知雨之流粟志在經𫝊也京房易妖占曰天雨粟不肖者食禄與三公易位天雨稻黍者亡天雨稻大臣嘗朴誅古今注曰武帝建元四年天雨粟宣帝地節三年長安雨黑粟元帝竟寧元年南陽山都縣雨粟色青黑味苦大者如荳小者如麻子赤黄味如麥建初二年九江夀春雨粟光武建武二十年清河廣川雨粟大如莧實色黑吳氏本草曰陳粟神農黄帝書云苦無毒治痺熱消渇養腎氣杜寳大業拾遺録曰吏部侍郎楊恭仁欲改塟學士舒綽曰此所擬之處掘深五尺之外當有五榖若得一榖即是福徳之地公侯世世不絶恭仁即將綽向京速令人掘深七尺得一穴如五石甕大有粟七八斗此地經曰粟田蟻運粟下入此穴當時朝野之士以綽為聖任昉述異記曰光武興洛陽斗粟萬錢人死者相枕又曰馬不食粟桑扈不啄粟非亷也又曰未嘗稼穯粟滿倉未嘗桑蠶絲滿嚢得之不以道用之横横放也又曰粟得水而熟甑得火而液水中有火火中有水疾雷破石隂陽相薄自然之熱又曰闔閭伐楚五戰入郢燒髙府之粟六韜曰武王入殷發鉅橋之粟以與殷民説苑曰十粟為一分十分為一寸又黑子語禽滑釐曰今㐫年與子隋侯珠又與子一鍾粟子将何擇釐曰粟可耳亦見珠部又曰髙平王遣使者従魏文侯貸粟文侯曰須吾租收邑粟至乃得也使者曰臣初來時見瀆中有魚張口謂臣曰吾窮水魚命在呼吸可得灌乎臣謂之曰待吾南見河伯之君決江淮之水灌汝口魚曰謂命在須臾及須決江淮之水比至君還必求吾於枯魚肆今髙平貧窮故遣請君貸粟乃須租收大王必求臣於死人之墓風俗通曰燕太子丹仰歎天為雨粟賈誼書曰鄒穆公有令食鳬鴈者必以秕無敢以粟於是倉無粃而求易於民二石粟得一石秕於民請曰秕食鳬鴈為無費也今求秕於二石粟而易一石秕食鴈則費甚矣請以粟食之公曰去非爾知也夫百姓胊牛而耕暴背而芸勤而不食惰者豈為鳥獸哉粟米人上食也柰何以其食養鳥且汝知小計而不知大害晁錯書曰利民欲者莫如用爵致粟矣能以粟拜爵者皆民之有餘者也汜勝之書曰欲知歳宜以布嚢盛粟等量埋於隂地述異記曰漢末大飢江淮童謠云大兵如市人死如林持金易粟粟貴如金洛中謠云雖有千金黄無如我斗粟斗粟自可飽千金何所值袁紹在冀州時滿市黄金而無斗粟餓死者相食人為之語虎豹之惡不如飢人先主在荆州粟與金同價永嘉之亂洛中飢甚懐帝遣人觀市珠玉金銀填委市門而無粟麥袁宏上表云田畆由是丘墟都市化為珠玊又曰晉末荆州久雨粟化為蠱蠱害民春秋云榖之飛為蠱是也中郎王義興表曰臣聞堯生神禾而晉有蠱粟陛下自以聖徳何如也帝有慙色又曰宋髙祖之初當晉末飢饉之後既即位而江表二千餘里野粟生焉又曰古説淮南諸山石榖生袁安公云石榖石上生藥名穂之尤小者是也應翊像讃序曰赤眉賊攻其所居城翊盡以私榖數十萬賑城中于時粟斗數萬時稱其仁太平御覽巻八百四十
