  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_374-1a, image: WYG0896/WYG0896-0329a.png}
body:
  text: 太平御覽卷三百七十四宋李昉等撰人事部一十五髭鬚髯睫髑髏髭釋名曰口上曰髭髭姿也為姿容之美也説文曰髭口上鬚也左傳昭六年曰王子朝使告諸侯曰在定王六年秦人降妖曰周其有髭王亦克能脩其職至於靈王生而有髭王甚神聖無惡於諸侯班固幽通賦注曰衛蒯瞶亂子羔滅髭鬢衣婦人衣逃得出曰父子争國吾何為其間乎鬚髯釋名曰頥下曰鬚鬚秀也物成乃秀人成而鬚生也亦取須體長而後生也在頬耳旁曰髯隨口動揺髯髯然也説文曰鬚面上毛也春秋元命苞曰髮精散為鬚髯左傳宣二年傳曰宋城華元為植巡功植將主也城者謳曰于思于思棄甲復来于思多髯之貌左傳昭二年曰楚子享公于新臺使長鬛者相左傳昭四年曰吳伐楚戰于長岸大敗吳師獲其乗舟餘皇餘皇舟名吳公子光請於衆曰䘮先王之乗舟豈唯光之罪衆亦有焉請藉取之以救死藉衆之力以取舟也使長鬛者三人長鬛者多髯與吳異形狀詐為楚人也􅅗伏於舟側曰我呼餘皇則對師夜從之三呼皆迭對楚人從而殺之楚亂吳人大敗之取餘皇以歸言光有謀也史記曰秦太后㧞嫪毒鬚眉為宦者又曰漢髙祖為人隆準而龍顔美鬚髯漢書曰霍光長七尺二寸白晢䟽眉目美鬚又曰朱􅀶為瑯琊太守曹掾吏皆移病卧􅀶問其故對曰故事二千石新到遣致意乃敢就職􅀶奮髯抵几曰觀齊兒欲以此為俗耶乃行罷諸病吏白巾走出府門郡中大驚又王莽傳曰莽聞漢兵起愈恐欲外示自安染其鬚髪進天下所徴淑女備嬪御東觀漢記曰吳良為東平王所薦詔曰前見良頭鬚皎然衣冠甚偉求賢助國宰相之職合以良為義郎後漢書曰岑彭吳漢圍隗囂於西城公孫述將李育守上邽帝留盖延取弇圍之車駕東歸勅彭書曰兩城若下便可將兵南擊蜀虜人苦不知足即平隴復望蜀毎一發兵頭鬚為白又曰温序拜謁者遷䕶春校尉序行郡至襄武為隗囂將苟宇所拘劫宇謂序曰子若與我并慮同力天下可圖也序大怒叱宇因以節撾殺人宇曰此義士死節可賜以劒序受劒銜鬚於口顧左右曰既為賊所逼殺無令鬚汚土遂伏劒死續漢書曰司馬直字叔異潔白美鬚髯容貌儼然鄉閭奉之如神魏志曰初蘇則及臨淄侯植聞魏氏代漢皆發服悲哭文帝聞植如此常從容曰吾應天受禪而聞有哭者何也則謂為見聞鬚悉張欲正論以對侍中傳選搯則曰不謂卿也乃止又曰崔琰聲姿髙暢眉目踈朗鬚長四尺甚有威重朝士瞻望而太祖亦嚴憚焉後有白琰怨謗者罰為徒𨽻使視之辭色無撓太祖命曰琰雖見刑而通賔客虬鬚直視若有所忽遂賜死又曰任城王章為北中郎將討烏桓有功歸太祖喜捋章鬚曰黄鬚兒定大竒魏畧曰劉䧺鳴詣太祖太祖執其手謂曰孤方入關夣得一神人即汝耶乃厚賜之後亡太祖平漢中来降太祖捉其鬚曰老賊真得汝矣又曰任城王性剛勇而黄鬚北伐烏丸王聞之曰我黄鬚定可使𤣥徳使劉封挑戰王罵曰賣履舍長而使假子拒汝公乎黄鬚来擊之吳録曰朱桓還屯濡湏權祖之桓奉觴曰臣當逺去願一捋陛下鬚無復恨權憑几前朱桓進捋鬚曰臣今日真謂捋虎鬚也獻帝春秋曰張遼問吳降人曰向有紫髯將軍長上短下大便馬善射是誰降人荅曰是孫㑹稽也蜀志曰張裕為劉璋從事侍坐其人饒鬚先主嘲之曰昔吾家涿縣特多毛姓東西南北皆諸毛也涿令稱曰諸毛繞涿居乎裕荅曰昔有作上黨潞長遷為􅃰令者去官還家時人與書欲署潞則失路乃署曰潞涿君先主無鬚故裕以此及之也先主常銜其不遜後誅之又曰馬超来降雲長護前書問諸葛亮亮荅曰孟超當與翼徳争先未若髯翁之絶倫雲長多髭鬚故亮謂之髯晋書曰羊祜既卒武帝素服哭之甚哀是日大寒帝涕淚霑鬚皆為冰焉鄧粲晉紀曰湞陽令羊嗣貪而不治縣功曹吏共逐嗣嗣饒鬚乃以嗣内羊闌中始興太守尹虞聞大怒手劒功曹虞字王卿長沙人也又曰王彪之字叔武年二十鬚鬂皓白時人謂之王白髮又曰張華多鬚常以帛纒之陸雲見之笑不能止又曰桓温少與沛國劉惔善惔常稱之曰温眼如紫石稜鬚似蝟毛磔孫仲謀晉宣王之流晉中興書曰冉閔殺石鑒及辛胡數萬人于時人有髙鼻多鬚者無不濫死崔鴻前趙録曰劉聰以䜛慝故誅詹事曹光光臨刑舉止自若謂刑者曰取席敷之無令土汚吾鬚又曰劉元海姿儀魁偉身長八尺四寸鬚長二尺餘當心有赤毫三根長三尺六寸又前録曰符堅每日自王丞相夢後鬚髮中白宋書曰山隂公主滛恣見禇彦囘悦之以白帝帝令就之彦囘不從主曰君鬚髯如㦸何無丈夫意南史曰宋武帝狎侮羣臣各有稱目多鬚者謂之羊三國典畧曰齊許惇長鬚垂至帶省中號為長鬛公文宣嘗因酒酣握惇鬚稱美遂以刀截之唯留一握惇不敢復長人號為齊髯公又曰侯景使宋子仙等執梁湘東王世子方諸及中撫軍長史鮑泉司馬虞預于郢州是日子仙等至百姓奔告方諸以五色雜綵編鮑泉白鬚對之雙六弗之信也告者既衆方命闔門縣門未下子仙已入方諸等膜拜而鮑泉遁于牀下子仙窺見泉素鬚間綵疑愕憚之及其被執莫不驚笑又曰李庶黎陽人魏大司農諧之子也以清卞毎接梁客徐陵謂其徒曰江北唯有李庶可語耳庶無鬚髯人謂天閹崔諶嘗翫庶曰教弟種鬚取錐刺而為竅以馬尾揷之世説諸崔多惡疾以呼沲為墓田故庶荅之曰先以方廻施貴族藝眉有效然後樹鬚邢邵笑謂諶曰卿不諳李庶何故犯之又曰周太子贇有失徳柱國王軌因内宴上夀捋武帝鬚曰可愛好老公恨後嗣弱耳唐書曰太宗幸翠㣲宫授司農卿李緯為民部尚書房元齡時在亰城留守㑹有自亰師来者太宗問曰元齡聞李緯拜尚書如何對曰元齡但云李緯大好髭鬚更無他語太宗遽改授緯洛州刺史又曰李勣病騐方鬚灰可以療之太宗乃自剪鬚為其和藥勣頓首見血泣以陳謝帝曰吾為社稷計耳不煩深謝又曰李光弼母有鬚數十莖長五尺六寸晏子曰湯長頭而髯伊尹蓬頭而髯孫卿子曰傅説之狀秃無鬚眉莊子曰孔子往見盜跖歸到東門外遇柳下季曰數旦不見車馬有行色得㣲往見跖耶孔子曰然吾所謂無病而自灸也疾走料虎頭編虎鬚㡬不免虎口哉孔叢曰子髙曰臣見臨屠商馬身脩八尺鬚髯如㦸面正紅白㓜女不敬之無徳故也又曰子思如齊齊之嬖臣美鬚眉立乎側君指而言曰貌可相易寡人不惜此鬚眉於先生也子思荅曰非所願也但欲君修禮義富百姓使伋得寄孥於君之境内則其庸多矣吕氏春秋曰豫讓欲報趙襄子滅鬚去眉自刑以變容抱朴子曰有古彊者自言四千嵗敢為虛言云見堯為人長大美鬚髮風俗通曰不舉生鬢鬚子俗説人十四五乃當生鬢鬚今生而有人防害父母也謹按周書靈王生而有髭王甚聖神亦克修其職諸侯服享二世休和安在其有害乎世説曰鍾毓兄弟警悟過人毎有嘲語未嘗屈躓毓㑹語聞安陸能作調試共視之於是與弟盛飾共載從東至西門一女子笑曰車中央殊髙二鍾都不覺車後一門生云向已被嘲鍾愕然門生曰中央髙者兩頭羶毓兄弟多鬚故以此調之又曰郄超為桓温記室叅軍有竒才多髭髯荆州為之稱髯㕘軍語林曰庾公道王尼子非唯事事勝人布置鬚眉亦勝人我輩皆出其轅下俗説曰有人詣謝益夀云向在劉丹陽坐見一客殊毛謝曰正是我家阿瞻瞻多鬚故云爾廣陵列士傳曰劉瑜字季節舉方正對䇿髙第人呼為長鬚方正列仙傳曰丁次卿漢順帝時人至娶婦家未見禮異婦出謁客鬚髯欝然其家謝之次卿舉手向婦鬚髯即去郭璞洞林曰東中郎㕘軍周稚琰封蠶蛾蛓蟲使璞射之璞曰射覆得此大落度必是蠶蛾及毛蠧稚琰饒鬚故因以調之也睫説文曰睫映目旁毛也釋名曰睫接也垂於匡而相接也漢書曰袁盎曰陛下居代時太后嘗病三年陛下不交睫解衣謝承後漢書曰趙昱字元達年十三母病二月昱慘慼消瘦眼不交睫列子曰晉國苦盜有郄雍者能察盜於眉睫之間而得其情晉使視盜千百無遺趙文子曰周諺有言見淵中魚不祥郄雍必死俄而羣盜殺之裴元新語曰尹氏之鏡數睫照形蒸食曾不如三錢竹簟髑髏説文曰髑髏頭也廣雅曰髑髏謂之顙顱也魏畧曰王忠先因饑噉人五官將戯因從駕出行過冢間無何命俳取道邊死人髑髏繫着忠馬戲笑莊子曰列子行食於道見百嵗髑髏搴蓬而指之曰唯予與汝未嘗死未嘗生也又曰莊子之于楚見空髑髏骯然有形擊之以馬捶因而問之曰夫子貪生理而為此乎將子有亡國之事斧鉞之誅而為此乎將子有不善之行愧遺父母妻子之醜而為此乎將子凍餒之患而為此乎於是語卒援髑髏枕而卧夜半髑髏見夢曰子之談者似辨人也諸子所言皆生之累也死則無此矣子欲聞死之說乎莊子曰然髑髏曰死無君於上無臣於下亦無四時之事泛然以天地為春秋雖南面王樂不能過也莊子不信曰吾使司命復生子形為子骨肉􅡌膚反子父母妻子閭里知識子欲之乎髑髏深矉蹙額曰吾安能弃南面王樂而復為人之勞乎南州異物志曰烏滸人得人髑髏破之以飲酒盛宏之荆州記曰長沙浦圻縣有吕蒙冢中有髑髏極大蒙形既長偉疑即蒙髑髏也裴淵之廣州記曰盧循襲廣州風火夜發奔逸者數千而已循除燒骨數得髑髏三萬餘於江南洲上作大坑葬之今名為共冢續搜神記曰永嘉五年髙榮為髙平戍邏主時曹嶷賊寇離亂人民皆塢壘自固見山中火起飛埃絶爛千餘丈樹巔火焱響動山谷又聞人馬鎧甲聲謂嶷賊上人皆怕懼並嚴出欲擊之引騎到山下無有人但見碎火来灑人袍鎧馬毛鬛皆燒於是軍人走還眀往視山中無燃火處惟有髑髏百頭布散山中張衡髑髏賦曰張平子將遊目於九野觀化乎八方顧見髑髏委於路旁下據杇壤上負𤣥霜平子悵然而問之子將并粮推命以夭逝乎奔䘮此土流遷来乎為是上智為是下愚荅曰吾宋人也姓莊名周遊心方外不能自修公子何以問之對曰我欲告之於五嶽禱之於神祗起子素骨反子四支髑髏曰死為休息生為役勞冬水之凝春氷之消况我已化與道逍遥與隂陽同其流元氣全其朴雲漢為川池星宿為珠玉雷電為鼓扇日月為燈燭合體自然無情無欲不行而至不疾而速太平御覽卷三百七十四
