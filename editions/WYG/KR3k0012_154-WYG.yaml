body:
  text: 太平御覽卷一百五十四宋李昉等撰皇親部二十公主下駙馬公主下唐書曰竇抗女母隋文帝萬安公主抗在隋以甥故甚見崇寵文帝幸其第命抗及公主酣宴如家人之禮也又曰隋煬帝至鴈門為突厥所圍蕭瑀進謀曰臣聞始畢記校獵至此義成公主初不知其有違背之心且北蕃夷俗可賀敦知兵馬事昔漢髙解平城圍乃是閼氏之力况義成以帝女為之必恃大國之援若發一單使以告義成假使無益事亦無損煬帝從之發使詣可賀敦諭㫖俄而突厥解圍而去於後獲其諜人云義成公主遣使告急於始畢稱北方有警由是突厥解圍盖義成公主之助也又曰凡公主封有以國名者鄎國代國霍國是也有以郡名者平陽宣陽東陽是也有以美名者太平樂安長寧是也唯𤣥宗之女皆以美名名之又曰髙祖平陽公主起義兵公主於鄠縣莊散家資招引山中亡命得數百人以應髙祖略地至盩厔武功始平皆下之每申明法令禁兵士無得侵掠故逺近奔赴者甚衆得法兵七萬人公主遣使以聞使者至髙祖大悦及義軍渡河公主引精兵萬餘與太宗㑹於渭北與其駙馬柴紹各置幕府營中號為娘子軍京城平封為平陽公主以獨有功每賞賜異於他主及薨諡曰昭又曰竇誕竇抗第三子也尚髙祖女襄陽公主竇氏自武德至今男為外戚尚主者八人女為王妃六人唐世貴盛莫與為比又曰房𤣥齡之子遺愛尚髙陽公主𤣥齡病上表諫征遼東太宗見表謂𤣥齡子婦髙陽公主曰此人危惙如此尚能憂我國家又曰房遺愛尚太宗女髙陽公主拜駙馬都尉初主有寵於太宗恃愛驕恣謀黜夫兄遺直奪其封爵水徽中誣告遺直無禮於己髙宗令長孫無忌鞫其事因得公主與遺愛謀反之狀遺愛伏誅公主賜自盡又曰杜如晦之子荷以功臣子尚城陽公主賜爵襄陽郡公授尚乘奉御貞觀中與太子承乾謀反坐斬又曰髙士亷子以履行尚太宗女東陽公主拜駙馬都尉遭父艱居喪以孝聞太宗手詔敦諭曰古人立孝毁不滅身聞卿絶粒殊乖大禮幸抑摧裂之情割傷生之累俄起為衞尉卿又曰蕭瑀子競尚太宗女襄陽公主雅有禮度太宗每令諸公主凡厥所為皆視其楷則又令所司别為營第公主辭曰婦人侍舅姑如侍父母若處不同則定省有闕再三固讓乃止又曰王珪子敬直尚南平公主禮有婦見舅姑之儀自近代公主岀降此禮皆廢珪曰今主上欽明動循法制吾受公主謁見豈為身榮所以成國家之美耳遂與妻就位而坐令公主親執笄行盥饋之道禮成而退是後公主下降有舅姑者皆備婦禮自珪始也又曰貞觀中長樂公主岀降太宗以皇后所生勑有司資送倍於永嘉長公主秘書監魏徵諫曰不可昔漢明帝欲封其子云我子豈得與先帝子等可半楚淮陽前史以為美談天子姊妹為長公主天子之女為公主既加長字即是有所尊崇或可情有淺深無容禮有踰越上然其言又曰太平公主髙宗少女以則天所生特承恩寵開曜元年降駙馬薛紹垂拱中被誣告與諸王連謀誅死則天乃殺武攸暨之妻以主配焉公主豐碩方額廣頥多權略則天以為類己每預謀議神龍年誅張易之有謀進號鎮國太平公主賞賜不可勝紀二年置公主府時中宗韋后上官昭容用事皆以為智謀不及公主甚憚之公主益日豪横唐隆元年𤣥宗清内難公主又預其謀令男崇簡從之與𤣥宗尊立睿宗公主頻著大勲益尊重加實封五千户通前一萬户每八奏事坐語移日所言皆聽軍國大政事皆參決如不朝謁即宰臣就第議其可否公主由是驕恣田園遍於近甸貨殖流於江淮公主懼𤣥宗英武乃連結將相專謀異計時宰相七人五岀公主門光天二年𤣥宗漸危逼乃勒兵誅其黨蕭至忠等公主遁入山寺數日方岀賜死於家籍其家財貨山積珍竒寳物侔於御府又曰唐隆元年勅公主置府近有勅總停太平公主有崇保社稷功其鎮國太平公主府即宜依舊酸棗縣袁楚客奏記於中書令魏元忠曰女有内男有外男女有别剛柔分矣中外斯隔隂陽著矣豈可相濫哉然則幕府者丈夫之職非婦人之事今諸公主並皆開府建僚崇置宫秩若以女處男職所謂長隂而抑陽也而望隂陽不僣風雨不爽其可得乎竊謂非致逺之計乖久安之策書曰事不師古以克永世匪説攸聞此之謂也君侯不正誰正之哉又曰安樂公主韋后所生初中宗遷於房州將及州境生於路次性慧敏容質秀絶中宗韋后愛寵日深恣其所欲奏請無不允許恃寵驕縱權傾天下自侯王宰相以下除拜多出其門所營宅第併造安樂佛寺擬於宮掖於城西鑿定昆池延袤數里出降之時以皇后仗發於宮中中宗與韋后御安福門觀之及韋庶人敗與駙馬武延秀皆斬之追貶為悖逆庶人又曰武延秀武承嗣之第二子也時武崇訓為安樂公主壻即延秀同宗之兄也數引至主第延秀久䧟蕃中解突厥語常於主第唱突厥歌作胡旋舞有姿媚主甚喜及崇訓死延秀得幸尚主拜席日授太常卿兼右衞將軍駙馬都尉又曰大中二年以起居郎駙馬都尉鄭顯尚萬壽公主詔曰女人之德雅合慎修嚴奉舅姑夙夜勤事此婦人之節也先王制禮貴賤同遵既已下嫁臣僚儀則須依古典萬壽公主婦禮宜依士庶又曰𢎞化公主宗室女貞觀十三年降於吐谷渾慕容諸葛鉢又曰文成公主宗室女貞觀十五年封降於吐蕃賛普弄賛命禮部尚書江夏王道宗送之弄賛親迎於河源見主人子壻禮甚謹歎大國服飾禮儀之美俯仰有媿沮之色謂所親曰我祖父未有通婚大國者今我得尚大唐公主當築一城以誇示後世仍遣酋豪子弟請入國學以習詩書從之又曰貞元三年遣回紇使合厥將軍歸其國初合厥將其君命請婚於我上許以咸安公主嫁之命公主見合厥於麟德殿且命齎公主畫圖就示可汗以馬價絹五萬匹還之許其互市而去以殿中監嗣王湛然為送咸安公主使仍兼婚禮使四年回紇公主兼使者至自本蕃上御延喜門禁婦人及車輿觀者時回紇可汗喜於和親其禮甚恭乃上言曰昔為兄弟今即子壻子壻半子也彼猶父此猶子父若患於西戎子當遣兵除之又曰太和公主長慶元年封為公主册為回紇可敦出降愛登里邏骨沒宻施合毗伽保義可汗初保義可汗既立遣使求婚遂封第九妹為永安公主將以降嫁其年保義可汗卒冊九妹廻體為崇德可汗五月遣使迎請所許嫁公主朝廷封第五妹為太和公主以降今回紇焉雖狄人固請永安而終不許故命中書舍人王起就鴻臚寺以宣喻焉列仙傳曰朱仲㑹稽市販珠人髙后募三寸珠乃詣闕上之珠好過度賜五百金魯元公主私以七百金從仲求珠獻四寸之珠又曰蕭史善吹簫教秦穆公主作鳳聲公為作鳳䑓令夫妻止其上一旦皆隨鳳飛去荀氏家傳曰荀羡字令則年十五擬國婚之選君不欲連姻帝室乃逺遁長沙監司追尋不獲已遂尚尋陽公主世說桓宣武平蜀以李勢女為妾有寵嘗著齋後温尚南康長公主主始不知之既聞乃伺温不在率數十婢拔白刅徃李所故欲斫之見李窗前梳頭髪垂委地姿貎端麗徐徐結髮歛手向主曰國破家亡無心至此若能見殺實猶生之年神色閒正辭氣悽惋主於是擲刀前抱之曰阿子我見汝亦憐何况老奴遂善遇之風俗通曰列侯尚公主國人尚公主以妻制夫陽屈於隂耳左九嬪萬年公主誄曰赫赫京室河洛所經隂精發曜降兹淑靈篤生公主誕膺休禎秀出紫㣲日輝月明紅顔鬒髪金質玉形駙馬漢書曰駙馬都尉掌駙馬師古曰駙副馬也非正駕車者皆為副馬一曰駙近也疾也又百官公卿表曰漢武元鼎二年置三都尉駙馬奉車掌御乘輿車騎都尉掌羽林從騎並無員或以侍中常侍卿尹校尉左遷為之漢舊儀曰駙馬都尉掌騎從武帝置秩比二千石蜀志曰諸葛瞻字思逺建興十二年亮出武功與兄瑾書曰瞻已今年八歲聰慧可愛嫌於早成恐不為重器耳十七尚公主拜駙馬都尉宋書曰江斆字叔文母宋文帝女淮陽公主幼以戚屬召見孝武謂謝莊曰此小兒方當為名器少有美譽尚孝武女臨海公主拜駙馬都尉為丹陽丞時袁粲為尹見斆歎曰風流不墜正在江郎數與宴賞連日夜齊書曰王暕字思晦年數歲而風神警拔有成人之度時祖儉作宰相賔客盈門見暕曰公才望復在此矣弱冠選尚淮南長公主拜駙馬都尉梁書曰袁樞博學明悉舊典初陳武帝長女永嗣公主先適陳留太守錢蕆生子岊主及岊並卒於梁梁武帝時受命唯主追封至是將𦵏尚書請議加蕆駙馬都尉併贈岊官樞議曰昔王姬下嫁必適諸侯同姓為主聞於公羊之説車服不繫顯於詩人之篇漢氏初興列侯尚主自斯以後降嬪素族駙馬都尉置由漢武或以假諸功臣或以加於戚屬是以魏曹植表駙馬奉車取為一號齊職儀曰凡尚公主必拜駙馬都尉魏晉以来因為瞻凖盖以王姬之重庶姓之輕若不加其等級寧可合􅈟而酳所以假駙馬之位乃崇於皇女也今公主早薨伉儷已絶既無禮數致疑何須駙馬之授案杜預尚晉宣帝第二女晉武踐阼而主已亡泰始中追贈公主元凱無復駙馬之號梁文帝女新安穆公主早薨天監初王氏無追拜之事逺近二例足以校明無勞此授宜追贈亭侯時以議為當後魏書曰陸昕之風望端雅尚獻文女常山公主拜駙馬都尉又曰馮誕字子正與髙祖同歲幼時書學特蒙恩待尚髙祖妹安樂公主拜駙馬都尉髙祖寵誕同輿而載同案而食同席而坐又曰宿石髙宗時為中散常從獵髙祖親欲射虎石叩馬而諫引髙祖馬至原上後虎騰躍殺人詔美石為忠臣賴控馬切諫免虎之害後有犯罪宥而勿治尚上谷公主拜駙馬都尉又曰萬安國代人父振尚髙陽公主拜駙馬都尉遷散騎常侍馮翊公安國少明敏有姿貌以國甥復尚河南公主拜駙馬都尉遷散騎常侍顯祖特親寵之與同卧起為立第宅賜至鉅萬超拜大司馬大將軍封安成王唐書曰文宗儉素召駙馬都尉韋處仁入見𢃄夾羅巾以進上謂曰本慕卿門户清素故俯從選尚如此巾服從他諸戚為之卿不須為也又官品志曰駙馬奉車車騎三都尉並無員駙馬都尉以尚公主者為之無班秩語林曰何晏字平叔以主爵駙馬都尉美姿儀帝每疑其傅粉後夏月賜以湯餅大汗出以朱衣自拭之尤皎然太平御覽卷一百五十四
