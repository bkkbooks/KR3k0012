front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_708-1a, image: WYG0899/WYG0899-0307c.png}
body:
  text: 太平御覽卷七百八宋李昉等撰服用部十簟褥氊卧具氍㲣􅕰㲪簟說文曰簟竹席也釋名曰簟覃也布之覃然正平也禮曰莞簟之安而蒲越藁秸之尚又曰父母舅姑之簟席枕几不傳詩曰下莞上簟乃安斯寢方言曰簟宋魏之間謂之笙或謂之籧曲自闗而東謂之簟其粗者謂之籧蒢筕篖自關而東周洛楚魏之間謂之倚佯自關而西謂之筕篖東觀漢記曰殤帝詔省荏弱平簟又曰馬稜為㑹稽太守詔詰㑹稽車牛不務堅强車皆以桃枝細簟又曰尚書令王允奏曰太史令王立說孝經六隱事能消却姦邪常以良月允與立入為獻帝誦孝經一章以丈二竹簟畫九宫其上隨日時入焉及允被害乃不復行晉書曰王恭字孝伯與王忱齊名友善恭有六尺簟忱見之謂其有餘因求之恭輙以送遂坐薦上忱聞而大驚恭曰吾平生無長物王隱晉書曰車永為廣州刺史永子溢使工作象牙細簟工患之晉公卿禮秩曰太宰何曾遜位賜簟褥一具蕭子顯齊書曰林邑王永明九年遣使貢獻金簟等物孫卿子曰輕煖平簟而體不知其安淮南子曰席之上先萑簟尊之上先𤣥酒王貴之先本而後末也東宫舊事曰太子納妃有赤花雙文簟西京雜記曰武帝以象牙為簟賜李夫人又曰㑹稽獻竹簟供御世號為流黃簟諸葛亮轉教曰計一嵗運用蓬旅簟千萬具庾翼與燕王書曰今致八尺丈二細桃枝簟十枚黄篾雙文簟二枚王獨受黄篾雙文簟一枚王廙春可樂曰弱簟平端潘岳悼亡詩曰展轉盼枕席長簟竟牀空左思吳都賦曰桃笙象簟韜於筒中王鑒作簟賦曰楚簟陳於玉房巴箱列於椒臺褥爾雅曰褥謂之兹釋名曰褥人所坐䙝辱也又曰茵車中所坐用虎皮也詩曰文茵暢轂駕我騏馵文茵虎皮漢書曰霍禹廣治第室作乗輿輦加繡茵憑黃金塗如淳謂所憑白馬者也金塗以黃金塗飾之也韋絮薦輪晉灼曰御輦以韋縁輪貯之如絮也東觀漢記曰祭遵有疾詔賜重茵魏略曰焦先字孝然河東人也髙尚不仕自作蝸牛廬淨掃其中榮木為床布褥其上天寒搆火以自炙魏志曰太祖性節儉帷帳屏風壊則補納茵褥取温無有縁飾又曰王朗上疏曰老臣慺慺願國家同祚於軒轅之伍某少小常苦被褥泰温則不能便軟膚弱體是以難可防䕶而易用感慨若常全小緼袍不至於甚厚則必咸保金石之性而比壽於南山矣呉録曰孟仁字恭武江夏人也從李肅學其母為作厚褥大被人問其故母曰小兒無徳致客學者多貧故為廣褥大被齊書曰宗測髙尚不仕王儉亦雅重之贈以蒲褥筍席又曰褚彦回弟澄為左民尚書彦回薨澄以錢一萬一千就招提寺贖髙帝所賜彦回白豹坐褥又曰栁慶逺為儀同初慶逺從父兄世隆嘗謂慶逺曰吾夢太尉以褥席見賜吾遂位亞臺司適又夢以吾褥席與汝汝必光我門族至是慶逺亦繼世隆焉太尉為元景也後魏書曰尒朱世隆將被誅此年正月晦日令僕並不上省西門不開忽有河内太守田帖家奴告省門亭長云今旦為令王借車牛一乗終日於洛濵遊觀至晚王還省將車出東掖門始覺車上無褥請為記識世說曰晉孝武年十三四時冬天晝日不著複衣夜則累茵褥謝公云體宜令常和陛下晝過冷夜過熱恐非攝生之術帝曰夜静宜温謝公岀歎之南越傳曰尉陀卧象牀錦茵東宫舊事曰皇太子拜有八尺褥一重中褥一步輿褥一納妃有承床褥三㑹稽後賢傳曰丁潭以光禄大夫還第詔賜床帳席褥鄴中記曰石虎作褥長三丈用房子綿百斤錦縁之神異經曰北方有氷萬里厚百丈鼷䑕在氷下土中其毛長八尺可以為褥西京雜記曰趙飛鷰為皇后其弟上遺鴛鴦被鴛鴦褥拾遺録曰周穆王時紫羅文褥者檀孫國獻之語林曰大將軍收周侯至石頭坐南門盤石上將戮之送已褥與周司馬相如美人賦曰髙茵重設氊說文曰蛩毛可以為氊釋名曰氊旃也毛相著旃旃然也集韻曰氊細罽也周禮天官掌次曰王大旅上帝則張氊案大旅上帝祭天于圎丘國有故而祭亦曰旅張氊案以氊為床于幄中又曰掌皮供毳毛為氊以待邦事漢書曰蘇武使匈奴絶不與食天雨雪武卧齧雪與氊毛褁咽之漢書曰王吉諫昌邑王遊獵曰夫廣厦之下細氊之上明師居前勸誦在後上論唐虞之際下及殷周之盛其樂豈徒衘橛之間哉又曰江都王女昭君歌云逺適異國烏孫王窮廬為室氊為鄉魏志曰李勝為荆州刺史徃辭太傅曹爽使察之太傅因謬問勝曰并州有佳氊可致之勝出曰太傅耄無能為也又曰鄧艾伐蜀自隂平行無人之地鑿山通道作橋以氊自裹推轉而下魏武帝與楊彪書曰今贈足下青氊牀褥三具晉書曰杜預子錫為愍懐太子舍人屢直諫於太子太子患之置針於錫坐處氊中錫坐刺之血出又載記曰慕容熈后符氏卒慕容隆妻張氏熈之嫂也美姿容有巧思熈將以符氏之殉欲以罪殺之乃毁其禭鞾中有弊氊遂賜死三女叩頭求哀熈不許齊書曰孔奐為晉陵太守清白自守妻子並不之官唯以單舡臨郡所得秩俸隨即分贍孤寡郡中號曰神君曲阿富人殷綺見奐居處儉素乃餽以氊衣一具奐辭不受北齊書曰裴寛與東魏將彭樂戰於新城因傷被擒至河隂見齊文襄寛舉止閑雅善於答對文襄實甚異之解鏁付舘厚加禮遇寛乃裁所卧氊夜縋而出因得遁還又曰清河三年周師及突厥至并州突厥謂周人曰爾言齊亂故我伐之今齊人眼中有鐵何可當也乃還至陘嶺凍滑乃鋪氊以渡之又曰綦雋佞巧能候當途斛斯椿賀㧞勝皆與友善性多詐賀㧞勝出鎮荆州過雋别因辭雋故見敗氊弊被更遺之錢物廣志曰𦍑女人披大華氊以為盛服拾遺録曰漢武帝以氊綈藉地惡輙之喧也搜神記曰太康中天下以氊為陌頭及帶身袴口於是百姓相戲曰中國其有西北之憂乎夫氊西北之服也而今天下以為陌頭帶身袴口是既三制之矣淮南子曰夫胡人見麻不知其可以為布越人見毳不知其可以為氊故不通於物者不可與言俗俗說曰桓豹奴病勞冷無氊可卧桓車騎自撤已眠氊與之語林曰王子敬在齋中卧偷人取物一室之内畧盡子敬卧而不動偷遂豋榻欲有所覔子敬因呼曰偷兒石染青氊是我家舊物可特置否於是羣偷置物驚走日南傳曰調斯國有青石染氊綘染氈也王褒聖主得賢臣頌曰夫荷氊被毳者難與道純錦之麗宻陸雲詩曰冬坐比肩氊卧具風俗通曰扶風蘇不違父為司𨽻李暠所遷不違穿府北垣徑上㕔事斫暠卧具暠一宿數遷沈約宋書曰朱百年隱居山隂家素貧母以冬月亡衣並無絮自此不衣錦帛嘗寒時就孔顗飲酒醉眠顗以卧具覆之百年不覺也既覺引卧具去體謂顗曰綿定竒温因流涕悲慟顗亦為感傷梁書曰謝朓常宿衛還過候江革時大雪見革弊絮單席而躭讀不倦眺嗟歎乆之乃脫所著􅃭并手割半氊與革充卧具而去又曰劉孝綽與劉溉兄弟甚狎溉少孤宅近僧寺綽徃溉宅適見黃卧具孝綽謂僧物色也撫手笑溉知其㫖奮拳擊之傷口而去氍㲣通俗文曰織毛褥謂之氍㲣聲類曰氍㲣毛席也廣志曰氍㲣㲲織也近出南海古文稱北漢之氍㲣非其所生魏畧曰大秦國以野蠒絲織成氍㲣文出黄白黑緑氍㲣周書波斯國大月氏之别種也其地出氍㲣吳時外國傳曰天竺國出細靡氍㲣陶侃别傳曰外國獻氍㲣公舉之曰我還國當與牙共眠牙名剡之字處靜是公庶孫小而被知以為後嗣南州異物志曰氍㲣以羊毛雜羣獸之毛織鳥獸草木人物雲氣作鸚鵡逺望軒若飛也古樂府詩曰請客上北堂坐氊及氍㲣張衡四愁曰美人贈我氊氍㲣諸葛亮集詔答恢曰行當離别以為惆悵今至氍㲣一以達心也􅕰㲪通俗文曰氍㲣細者謂之􅕰㲪名􅕰㲪者施大牀之前小榻之上所以登而上床也東觀漢記曰景丹率衆至廣阿光武出城外按馬坐氊􅕰㲪上設酒肉魏畧曰大秦國以羊毛木皮野絲作之􅕰㲪之屬有五色九色􅕰㲪其毛鮮於海東諸國所作也南史中天竺國出好裘􅕰㲪世說曰王子猷詣郗雍州雍州在内未出王見鋪􅕰㲪云阿乞那得此令左右送向家郗出王曰向有大力者負之以趨異苑曰沙門有法存者生廣州善醫術遂富有八尺􅕰㲪有百種形像又有沉香八尺板牀太原王淡為刺史大兒邵之屢求二物法存不與王殺而籍焉法存後形見於府内經日王尋得疾亡邵之又喪杜篤邉論曰匈奴請降􅕰㲪􅄢褥帳幔氊裘積如丘山班固與弟超書曰月支􅕰㲪而小相雜但細好而已馬融奏馬賢於軍中帳内施􅕰㲪士卒飄於風雪太平御覽卷七百八
