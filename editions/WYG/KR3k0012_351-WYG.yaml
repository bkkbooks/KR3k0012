body:
  text: 太平御覽卷三百五十一宋李昉等撰兵部八十二戈易曰離為戈兵又曰投戈散地則六親不能相保書曰武王至商郊王左仗黄鉞右秉白旄以麾曰逖矣西土之人稱爾戈比爾干立爾矛予其誓又曰武王伐紂戰於牧野前徒倒戈血流漂杵又曰成王崩太保命仲桓南宫毛孔安國曰臣桓毛名二俾爰齊侯吕伋以二干戈虎賁百人逆子于南門之外又曰兌之戈和之弓垂之竹矢在東房兌和古之巧人又曰四人綦弁執戈上刃夾兩階戺一人冕執戣立于東垂一人冕執瞿立于西垂戣瞿皆㦸屬又曰惟干戈省厥躬又曰魯侯伯禽宅曲阜徐夷並興公曰備乃弓矢鍛乃戈矛詩曰豈曰無衣與子同袍王于興師修我戈矛與子同仇豈曰無衣與子同澤王于興師修我矛㦸與子偕作又曰彼候人兮荷戈與祋毛萇曰候人道路送迎賔客者也荷掲也祋殳也音丁外切又曰載戢干戈載櫜弓矢禮記曰進戈者前其鐏徂悶切後其刃進矛㦸者前其鐓音隊鄭𤣥曰後刃敬也二兵鐓鐏雖在下猶為首鋭底曰鐏取其鐏也平底曰鐓取其鐓也又曰春夏學干戈秋冬學羽籥皆於東序干盾也戈句序㦸也干戈萬舞禹舞象舞也又曰能執干戈以衛社稷又曰賔牟賈侍坐於孔子孔子與之言及樂子曰夫樂者象成者也總干而山立武王之事也發揚而蹈厲太公之志也武亂皆坐周召之治也武王克商濟河而西倒載干戈苞以虎皮將帥之士使為諸侯名之曰建櫜又曰大夫士既殯而君往焉祝先升君即位于阼小臣二人執戈立于前二人立于後周禮曰旅賁氏掌執戈盾夾王車而趨左八人右八人車止則持輪䘮紀則衰葛執戈盾軍旅則介而趨又曰節服氏掌祭祀朝覲衮冕六人維王之太常郊祀裘冕二人執戈送逆尸從車鄭𤣥曰裘冕者亦從尸服也從尸車送迎之往來也又曰方相氏掌蒙熊皮執戈揚盾帥百𨽻而時儺以索室敺疫及墓入壙以戈撃四隅方良方良㒺良也又曰司戈楯掌戈楯之物而頒之祭祀授故士戈楯故士王族故士也與旅賁當事則衛王者也軍旅㑹同授二車戈楯建乗車戈楯授旅賁及虎士戈楯乘車王所乗車軍旅則革路會同則金路也又曰車謂之六等之數鄭𤣥曰六等之數法易之三才六畫也車軫四尺謂之二等人長八尺崇於戈四尺謂之三等殳長尋有四尺崇於人四尺謂之四等車㦸常崇於殳四尺謂之五等酋矛常有四尺崇於㦸四尺謂之六等又曰金有六齊四分其金則錫居一謂之戈㦸之齊又曰戈廣二寸内倍之胡三之援四之鄭𤣥曰戈今勾孑㦸也或者謂之鷄鳴或謂之擁頸也已倨則不入已勾則不决長内則折前短内則不疾鄭𤣥曰戈勾兵也主於胡已倨謂胡微直而和多以勾人則不入已勾為胡曲多也以啄人則創不決前謂援也内長則援短援短曲於磬折曲於磬折則引之於胡並勾内短則援長援長則倨於磬折倨於磬折則引之而不疾又曰廬人為廬噐戈柲六尺六寸殳長尋有四尺車㦸常酋矛常有四尺夷矛三尋鄭𤣥曰秘猶柄也八尺曰尋子倍尋曰常酋夷長短名也左傳曰晋公子重耳及齊齊桓公妻之公子安之姜曰行也懐與安實敗名公子不可姜與子犯醉而遣之醒以戈逐子犯又曰秦伐晋戰之明日晋襄公縛秦囚使萊駒以戈斬之囚呼萊駒失戈狼曋取戈以斬囚禽之以從公乗遂以為右又曰魯敗狄于鹹獲長狄僑如富父終甥春其喉以戈殺之春猶衝也埋其首於子駒之北門狄長三丈又曰晋敗齊於鞌頃公既免求逢丑父三入三出入于狄卒皆抽戈楯冒之以入于衞師免之遂自徐關入又曰晋楚戰於鄢陵范匄趨進匄士爕子曰塞井夷竈陣於軍中晋楚惟天所授何患焉文子執戈逐之曰國之存亡天也童子何知焉又曰晋胥童夷羊五帥甲八百將攻卻氏長魚矯請無用衆公使清沸魋助之沸魋嬖人也抽戈結祍祍裳也而偽訟者三郄將謀於謝謝講武堂也矯以戈殺駒伯苦成叔於其位駒伯郤錡苦成叔郄犨也温季曰逃威也遂趨郄至未奉君命故意欲禀命今魚矯等不以君命而來故欲逃也矯及其車以戈殺之皆尸諸朝又曰晋中行獻子將伐齊夢與厲公訟弗勝厲公獻子所殺公以戈撃之首墜於前跪而戴之奉之以走見梗楊之巫臯他日見諸道與之言同巫亦夢見獻子與厲公訟巫曰今兹主必死若有事于東方則可以逞又曰晋侯伐齊范鞅門於雍門其御追喜以戈殺犬於門中又曰齊慶封好田而嗜酒與慶舍政舍慶封子盧蒲癸臣子之子之舍也與王何二人皆嬖使執寢戈而先後之寢戈親近兵代也嘗於太公之廟慶舍涖事臨祭事也麻嬰為尸為祭尸也盧蒲癸王何執寢戈慶氏以其甲環公宫盧蒲癸自後刺子之王何以戈撃之解其左肩猶援廟桷動於甍以俎壺投殺人而後死言其力多又曰鄭徐吾犯之妹美公孫楚聘之楚子南也公子黒又使强委禽焉禽鳥也委禽納雁也子南戎服入左右射超乗而出女自房觀之􅃴子南氏子晢怒既而橐甲以見子南欲殺之而取其妻子南知之執戈逐之及衝撃之以戈衝交道也子晢傷而歸告大夫曰我好見之不知其有異志故傷又曰晋平公有疾鄭伯使公孫僑如晋聘且問疾叔向問寡君之疾病卜人曰實沈臺駘為祟此何神也子産曰昔髙辛氏有二子伯曰閼伯季曰實沈不相能也日尋干戈以相征討后帝不臧遷閼伯于商丘主辰遷實沈于大夏主參又曰衞公孟縶狎齊豹公孟靈公之兄也齊豹齊惡之子為衞司冦也奪之司㓂與鄄惡公孟北宫喜禇師圃欲去之公子朝通于襄夫人宣姜懼而欲以作亂故齊豹北宫喜禇師圃公子朝作亂公孟有事蓋獲之門外有事祭也盖獲衞郭門也徐氏帷於門外而伏甲焉使祝龜寘戈於車薪以當門華濟御公孟宗魯􅆖乗及閎齊氏用戈撃公孟宗魯以背蔽之中公孟肩殺之又曰吳入郢楚昭王渉淮濟江入于夢中王寢盜攻之以戈王王孫子由以背受之中肩又曰吳伐越越子勾踐禦之陳于檇李靈姑浮以戈撃闔閭傷將指又曰齊人輸晋范氏粟鄭之姚子般送之范吉射逆之趙鞅禦之郵無恤御簡子衞太子為右登鐵上鄭人撃趙簡子中肩斃于車中太子救之以戈鄭師北太子後伐之鄭師大敗又曰齊簡公即位與婦人飲酒于檀臺成子請遷寢從公使居正寢公執戈將撃之疑其欲作亂也太史餘曰非不利也將除害也又曰晋荀瑤帥師伐鄭荀瑤智伯也鄭駟𢎞請救于齊𢎞駟歂子陳成子救鄭及濮雨不渉成子衣製杖戈製雨衣也立于阪上馬不出者助之鞭之智伯聞之乃還畏其得衆心也曰我卜伐鄭不卜敵齊又曰衞良夫與太子蒯聵入舍於孔氏之外圃昏入適伯姬氏既入孔伯姬仗戈而先太子與五人分輿豭從之分被厚也廹叔悝於厠强盟之孔氏專政故劫孔悝欲令逐輙漢書曰宣帝時美陽得鼎獻之張敞好古文字案鼎銘勒而上議曰今鼎出於􅑢東中有刻書曰王命尸臣孟康曰尸主也官此栒邑賜爾鸞旂黼黻琱戈尸臣拜手稽首竊以傳記言之此鼎殆周之所以襃賜大臣也又曰武帝元鼎五年南越相吕嘉反遣歸義侯嚴為戈船將軍張晏曰嚴故越人降為歸義侯越人于水中竊負人之船又有蛟龍之害故置戈於下因以為名也下灕水晉書曰賈充傳云髙貴鄉公之攻相府也充率衆拒戰於南關將軍散騎督成倅弟太子舎人濟問充曰今日之事當如何充謂曰公養汝等正擬今日何疑濟於是抽戈犯蹕崔鴻前趙録曰李景年字延祐前部人長平之戰劉聰馬中矢㡬為晉軍所獲景年以身蔽聰揮戈前戰以功封梁鄒侯戰國策曰中山君饗都大夫羊羮不徧司馬子期怒而走於楚說楚王伐中山中山君亡走有二人挈戈而隨中山君顧謂二人子奚為者也二人對曰臣有父當餓將死君下壺飱以食臣之父故來死君也中山君慨然仰天嘆曰吾以一杯羊羮亡國以一壺食得士二人國語曰秦師侵晋惠公令韓簡挑戰曰昔君之惠寡人未敢忘寡人之衆能合不能離也君若不還寡人將無所避穆公衡雕戈出見使者莊子曰孔子窮於陳蔡七日不食弦歌鼔琴子路仡然執戈而舞韓子曰勾踐入官於吳執戈為吳王洗馬故能殺夫差於姑蘇呂氏春秋曰趙簡子攻衞附郭自將逺立郭逺立矢石不及也又居於屏蔽犀櫓之下投枹而嘆投棄也曰嗚呼士之遫音速弊盡一若此乎遫猶化也一猶皆也言士之燮化弊惡皆如此乎行人燭過免胄横戈而進曰亦由君不能耳士又何弊盡之有簡子乃去屏蔽犀櫓而立於矢石之所及矢箭也石弩也一鼓而畢乗之畢盡也乗凌也簡子曰與我得革車千乗也不如聞行人燭過之一言淮南子曰陽虎為亂於魯魯君令人閉城門而捕之得者有賞失者夷族圍三匝矣陽虎將舉劒而自刎頸門者止之曰我將出子陽虎左持劒右提戈赴圍而走門者出之陽虎既出顧出之者以戈推之攘祛薄腋魯君聞陽虎失怒所出之門以為傷者戰鬬者也不傷者為縱之傷者受厚賞不傷者受重罪也所謂害之而反利之者也又曰魯陽公與韓搆難戰酣日暮授戈而撝日日反三舍魯陽楚人也文之孫司馬期之子所謂魯王文子也楚僣號稱王其守縣大夫皆稱公曰魯陽公今南陽魯是也五經要義曰國君及元率戎車將在中央當鼓御者在左勇力之士執戈在後陸景典語曰戈刀雖備於執事而無所揚其鋒桓寛鹽鐵論曰匈奴處沙漠之中生不食之地如中國之麋鹿耳好事之臣求其義責之禮使中國干戈至今未息張隱文士傳摯虞荅策曰古之良臣受彤弓彤戈之錫銘之彛噐貺之後昆曠世歴代以為賔榮豈無其物貴殊品也抱朴子曰虎狼見逼不揮戈奮劒而彈琴詠語者吾未見其身之可保也又曰荆卿朱亥不示小勇於怯弱之間孟賁馮婦不奮戈山海經曰崑崙墟北有人曰太行伯把戈干寳捜神記曰有崔文子者學仙於子髙子髙化為白蜺持藥與文子文子驚怪引戈撃蜺中之因墮其藥俯而視之王子喬之尸也置之室中覆以弊筐須臾而化為大鳥開而視之翻然飛而去梅陶在湓口與三公書蘇峻勇而無諒兵家所常弊也長廣人釋鋤犁執干戈何知戰法文選曰戈鋋彗雲又曰戈矛若林離騷曰揮吳天戈號被犀甲車錯轂號短兵接繁欽述征賦曰時三日之暮春逼干戈之急難王粲從軍詩曰樓船凌洪波尋戈刺羣虜髙貴鄉公詩曰干戈隨風靡武騎應鴈行魏明帝堂上行曰武夫懐勇毅勒馬於中原干戈森若林長劒奮無前𤣥晏春秋曰七年春王正月乙酉予長七尺四寸矣未通史書與從姑子梁柳等撃壤于路或編荆為矛執荻為戈分陳相刺習兵共以為樂荀道雍猛虎行曰詰朝彈竹冠荷戈翦荒要應貞華覽曰萬夫决拾武夫齊足乗夷長森分行别屬弓不虛彎戈不苟撲傅毅西征頌曰愠昆夷之匪恊咸矯矯于戎事干戈動而復戢天將祚而隆化崔駰北征頌曰人事恊兮皇恩得金精揚兮水靈伏順天機兮把刑德戈所指兮罔不剋張恊七命曰舉戈林竦揮鋒電滅仰傾天巢俯彈地穴孔欣七誨曰擕同好命爪牙攝烏虎枤雄戈縁山結網參雲張羅殷融義曰自綏多難國度屢空匹夫有重繭之勞武士有執戈之勲太平御覽卷三百五十一
