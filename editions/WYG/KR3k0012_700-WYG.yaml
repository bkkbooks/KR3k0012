front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_700-1a, image: WYG0899/WYG0899-0258a.png}
body:
  text: 太平御覧卷七百宋李昉等撰服用部二簾帷幄幕簾釋名曰簾亷也自障蔽為亷耻聲類曰簾戸蔽也通俗文曰戸幃曰簾揚雄方言曰宋魏陳楚謂之筁或謂之麴自關以西謂之箔南楚謂之蓬箔漢書曰周勃以織曲為業又曰嚴君平筮卜成都市日得百錢則閉肆下簾而授老子梁書曰夏亶性莭儉不事華侈晩頗好音樂有妓妾十数人無被服姿容每有客常隔簾奏時謂簾曰夏侯妓衣齊書曰沈麟士字雲禎有高尚之心居貧織簾誦書號為織簾先生又曰栁世隆善卜别龜甲價至萬永明初世隆曰永明九年我亡後三年丘山崩齊亦於此季矣屏人命典籖李黨取筆及髙齒屐題簾箔旌曰永明十一年因流涕謂黨曰汝當見吾不見唐書曰張嘉貞蒲州猗氏人也弱冠應五經舉拜平郷尉坐事免歸侍御史張循憲為河東採訪使薦嘉貞材堪憲官請以已之官秩授之則天召見垂簾與之言嘉貞奏曰以臣草菜而得入謁九重是千載一遇也咫尺之間如隔雲霧竟不覩日月恐君臣之道有所未盡則天􅃍令卷簾與語大恱擢拜監察御史又曰王鍔為淮南作法軍中無一弃物至故簾亦令収之他日付舡以為簑箬他皆如此荘子曰河上有家窮緯蕭以為業又曰張毅者髙門懸薄無不走也漢武故事曰甲帳居神以白珠為簾箔玳􅈘押之象牙為篾洞冥記曰漢武元鼎元年甘泉宫起招仙靈閣編翠羽麟毫以為簾西京雜記曰漢諸陵寝皆以竹為簾簾皆為水文及龍鳯像又曰昭陽殿織珠為簾風至鳴如珩瑀之聲拾遺記曰石虎於太極殿前起楼髙十丈結珠為簾垂五色玉佩風至鏗鏘和鳴晋東宫故事曰簾箔皆以青布縁純三秦記曰呂纂時胡人發張駿塜得白珠簿簾涼州記曰明光宫在漸臺西以金玊珠璣為簾箔叚龜龍汝南先賢傳曰范滂被収曰願得一幡薄埋於首陽山上不負皇天下不愧夷齊謝綽拾遺曰戴明寳厯朝寵倖家累千金大兒嬌滛為五色珠簾明寳不能禁崔寔政論曰珠璣玩飾匿若懐䄂文繡蔽於帷簾夢書曰夢簾屏風蔽匿一身也唐國史補曰尚書李􅘙有清徳其妻劉晏妹也晏嘗造􅘙見其門簾甚弊乃指度廣狭以麄竹織成不加縁飾将以贈􅘙携至門不敢發言而去帷說文曰在旁曰帷釋名曰帷圍也以自障圍也禮記曰禮曰帷簿之外不趨又曰弊帷不棄為埋馬也又曰路馬埋之以帷周禮春官下曰掌舎掌王之㑹同之舎帷宫設旌門謂王行書止有所展肆若食息張帳為宫樹旌表門左傳曰齊歸公孫敖之䘮為孟氏且故國也葬視共仲聲已不視帷堂而哭又曰公孫歸父以襄仲之立也寵欲去三桓以張公室與公謀而聘于晉欲以晉人去之冬公薨季子言於朝曰使我殺嫡立庶以失大援者仲也夫遂逐東門氏子家還及笙壇帷復命於介又曰閭丘嬰以帷縳音其妻而載之與申鮮虞乘而出荘公億臣也鮮虞推而下之下嬰妻也曰君昏不能匡危不能救死不能葬而知匿其眤匿藏也眤親也其誰納之又曰公孟有事於盖獲之門外齊子氏帷於門外而伏甲焉禮記曰士使人吊撤帷主人迎吊於寝門外史記曰孔子見衛夫人夫人在絺帷中而拜又曰蘓秦說齊宣曰臨菑之衆袵成帷又曰髙祖曰運籌帷幄之中决勝千里之外子房功也又曰文帝幃帳不得文繡又曰董仲舒為博士下帷講弟子以次相授或莫見其面三年不窺園舎漢書曰秦起咸陽而至西壅離宫三百帷帳不移而具又曰成都侯王商第内大池以行舡立羽盖張周帷又曰東方朔上䟽云文帝集上書嚢為殿帷後漢書曰更始委於趙萌日夜與婦人飲宴後庭群臣欲言事輙醉不能見時不得已令侍中坐帷内與語諸将識非更始聲出皆怨曰成敗未可知􅃍自縱放若此華嶠後漢書曰班始尚陰成公主公主順帝之姑貴驕淫亂與所嬖居帷中而始入使伏牀下袁宏漢記曰獻帝出長安李催来追董承懼射之以被為帳幔又曰賈宗為兾州刺史埀帷而行及至州曰刺史當逺視廣聴反埀帷以自掩蔽命褰帷東觀漢記曰張奐字然明使匈奴中郎將時休屠各及朔方烏桓并反燒度遼将軍門煙火相望兵衆大恐各欲亡走奐安車帷中與弟子講書自若魏志曰司馬景王奏太后廢齊王芳曰帝於凌雲臺曲室中施帷見九親婦女呉志孫峻欲誅諸葛恪置酒伏兵於帷中晉書曰穆帝立年始二嵗皇太后禇氏設白紗帷於太極前殿抱帝臨軒晉陽秋曰武帝令曰殿前織成帷不湏施也宋書曰袁粲每經傅昭戸輙歎曰經其戸寂若無人披其帷其人斯在豈非名賢齊書曰毛惠素為少府卿性孝母服除後更修母所在處幃屏每月朔十五向帷悲泣傍人為之感傷終身如此呂氏春秋曰伍子胥将欲見呉王而不得客有言之於王子光者王子光見而惡其貌客以告子胥曰此易改也願令王子光居於堂上重帷而見之王子光許之子胥說之半王子光舉帷摶其手而與之坐淮南子曰先鍼而後縷可以成帷先縷而後緘不可以成衣漢武帝内傳曰七月七日宫掖之内張雲錦之帷燃九光之燈候西王母至也王母以紫錦為帷神仙傳曰淮南王見八公至足下及履迎之登思仙之臺張綺羅之帷西京雜記曰趙飛鷰為皇后其弟上遺金錯繡帷拾遺記曰漢安帝好㣲行於郊間或露起帷宫千間皆用錦罽文繡風俗通曰俗說帷帳不可作衣令人病癘東宫舊事曰太子妃有青布碧裏梁下幃一紺絹青布忩戸幃各一庾闡揚都賦曰皇帝廼坐路寝御組帷夢書曰夢見帷帳憂陰事離騷曰紐薜荔而為帷楚詞曰翡幃翠幬飾髙堂張衡南都賦曰暮春之禊元已之辰朱帷連綱曜野映雲左太冲呉都賦曰藹藹翠幄嫋嫋素女潘岳寡婦賦曰入空室兮望靈座帷飄飄兮燈熒熒阮籍詩曰簿帷鍳明月清風吹我衿幄爾雅曰以覆帳謂之幄說文曰幄大帳也三禮圖曰在上曰㡩四傍及上曰帷上下四傍悉周曰幄幄大帷也書曰成王疾漸出綴衣於庭周禮天官曰幕人掌帷幕㡩皆以布為之四合象室官曰幄至所居之幄也左傳曰楚子伐鄭諸侯還救鄭晉侯使張骼輔躒致楚師求御于鄭鄭人卜宛射犬吉二子在幄坐犬于外又曰子産子太叔相鄭伯以㑹子産以幄幕九張行子太叔以四十既而悔之每舍損焉及㑹亦如之又曰衛侯為虎幄於籍圃漢書曰元后未央宫置酒内者令為傅太后張幄座於太皇后傍王莽案行責内者令曰定陶太后藩妾何得與至尊並撤去更設坐傅太后聞之大怒不肯㑹漢書儀曰祭天紫壇有紺幄帳西京雜記曰成帝設雲幄雲幕於甘泉紫殿世謂為三雲殿拾遺記曰燕昭二年廣延國獻善舞者二人王處以丹綃華幄物論理曰漢末黄門張譲叚珪等於靈帝幄後相對泣帝驚問尚復幾時哉於是大収諸黨劉植魯都賦曰緹幄彌津丹帷覆洲幕廣雅曰幕帳也釋名曰幕絡也在裏之稱也說文曰幕在上曰幕䝉之覆案食亦曰幕周禮天官下曰幕人掌帷幕幄帟綬之事又曰國君過市刑人赦夫人過市罰一帟命夫過市罰一蓋命婦過市罰一帷謂諸侯及夫人世子過其國市大夫六子過其都之市者人之所交利而行刑之處君子無故不遊觀之若遊觀之則施惠儀禮曰國君與卿圖事管人布幕寝門左𫝊曰楚子元伐鄭楚師夜遁諜告曰楚幕有烏乃止諜間也鄭所使間伺候是也幕帳也又曰呉季札來聘過衛夜宿於戚戚子孫邑也聞鐘聲季子曰異哉夫子之在此猶燕之巢於幕上而又何樂乎文子聞之終身不聼琴瑟又曰晉人執季孫意如以幕䝉之漢書曰衛青征匈奴大尅武帝就拜大將軍於幕下府中因號幕府東觀漢記曰明徳皇后馬氏既處椒房大官上飯重加幕覆輙撒去晉書曰郄超字嘉賔桓公與謝安論大事令超卧帳内聴之風動帳開安笑曰郄生可謂入幕之賔矣宋書曰劉彦之孫瑀仕宦甚不得意至江陵與峻書曰朱修之三世叛兵一旦居荆州青油幕下作謝宣明靣唐書曰杜暹為監察御史徃磧西覆屯蕃人賫金以遺暹因辭不受左右言之不可逆其情乃受而埋之幕下既去乃移牒令取之黄石公三畧曰軍幕未設將不言熱此謂之禮將説苑曰晏子謂公曰合䟽縷之緯以成幕兵書曰將軍帷幕無故動敵人散走魚豢典畧曰孔子反衛見夫人在錦帷中孔子北靣稽首夫人自帷中再拜環佩之聲璆然王子年拾遺記曰漢成帝好㣲行於太液池起宵遊宫鋪黒緹幕服皆尚黒色漢武傳曰李夫人旣死帝思之命工人作夫人形状置於輕紗幕中宛然如生帝大悦楚詞曰離修幕侍君之間潘安仁籍田賦曰青壇蔚其岳立翠幕黯以雲布張景洛陽禊賦曰停輿蕙渚息駕蘭田朱幔虹野翠幕蜺連太平御覽卷七百
