body:
  text: 太平御覽卷九百三十五宋李昉等撰鱗介部七魚上星經曰天魚一星在尾後河中此星明則河海出大魚周易姤卦曰包有魚義不及賓也又中孚曰豚魚吉信及豚魚也又明象曰筌者所以在魚得魚而忘筌也毛詩曰季冬薦魚春獻鮪也又魚藻曰魚在在藻有頒其首禮記曰禮曰凡豋宗廟藁魚曰商祭鮮魚曰脡祭尚書益稷曰暨鳥獸魚鱉咸若左傳昭元劉子曰美哉禹功明德遠矣微禹吾其魚乎又昭元曰魚鹽蜃蛤弗加於海春秋運斗樞曰四方煩擾小民失恩虎御魚爾雅曰魚有力者鰴强力多者音暉魚枕謂之丁枕在魚頭骨中形似篆書丁字可作印魚膓謂之乙魚尾謂之丙此皆以篆書字因以名焉禮記曰魚去乙然則魚之骨體盡似丙丁之属形因名之史記周本紀曰武王渡河中流白魚躍入船中武王俯取以燎之漢書曰陳勝吳廣為屯長領兵戍將舉大計威兵士以丹書帛曰陳勝王置所罾入魚腹中兵買魚而見書東觀漢記曰世祖率鄧禹等撃王郎横野将軍劉奉大破之兵過禹營禹進炙魚上飱㗖勞勉吏士威容嚴厲衆皆竊言劉公真天人也謝承漢書曰㑹稽陳嚚少時於郭外水邉捕魚人有盜取之者嚚見避之草中追以魚遺之盜慙不受自是無復盜其魚後漢書曰羊續為南陽太守府丞嘗獻其生魚續受而懸於庭丞後又進之續乃出所懸者以杜其意魏志曰黄初六年帝東征吳文德郭后畱譙時后從兄弟欲遏水取魚后曰今奉車所不足豈此魚乎吳志曰孫權時謠云寧飲建鄴水不食武昌魚寧還建鄴死不止武昌居晉書曰王延性仁孝繼母卜氏嘗盛冬思生魚勅延求而不獲杖之流血延尋向汾水叩凌而哭忽有一魚五尺躍出水上延取以進母卜氏食之積日不盡於是心悟撫延如己生又曰五部單于賢王劉豹妻呼延氏魏嘉卑祈子於龍門俄而有一大魚頂有二角軒鬐躍鱗而至祭所久之乃去巫覡皆異之曰此嘉祥也其夜夢晝所見魚變為人左手把一物大如半雞子光景非常授呼延曰此是日精服之生貴子寤而吿豹豹曰此吉徵也自是十三月而生元海又曰錢塘杜子恭有祕術嘗就人借瓜刀其主求之恭曰當即相還耳既而刀主至嘉興有魚躍入船中破魚得𤓰刀宋書曰王𢎞之性好釣上虞江有一處名三石頭𢎞之常垂綸於此經過者不識之或問魚師得魚賣否𢎞之曰亦不得得亦不賣日夕載魚入上虞郭經親故各以一兩頭置門而去沈約宋書曰明帝泰始二年幸華林園天淵池白魚躍入御舟齊書曰中興元年義師下未至竟陵三十里魚長三尺躍入御船中梁書曰張昭王德明幼有孝性父模常患消渴嗜鮮魚昭乃身自結網捕魚以供朝夕又曰王固嘗聘魏國晏饗昆明池魏人以南人嗜魚大設罟網固以佛法呪之遂一鱗不獲崔鴻十六國春秋前京録曰金城太守胡朂叛張軌遣都䕶宗毅治中令狐瀏討之濟河中流白魚入船瀏曰魚鱗物虜必解甲歸我矣朂請降軌宥之後魏書曰高祖幸清徽堂因之流化池高祖曰此池中亦有魚在任城王澄曰此所謂魚在在藻有頒其首髙祖曰且取王在靈沼於牣魚躍北史曰陸政性甚孝其母吳人好食魚北土魚少政求之常苦難得後宅忽有泉出而魚遂得以供膳時人因謂其泉為孝泉隋書曰虞孝仁性奢華常以駱駝負函盛水飬魚而自給又曰大業中納言楊達言於遼山造御舟有白魚躍入舟内又曰乞伏慧為潭桂二州總管其俗輕剽慧躬行朴素以矯之風化大洽曾見人以簺音賽捕魚者出絹買而放之唐書曰真臘國地饒瘴厲毒蠚音適海中大魚半出望之如山又曰太宗幸蒲州刺史趙元楷課父老服黄紗單衣迎謁路左又潛飼羊百餘口魚數百頭将餽貴戚太宗知而數之又曰太宗觀漁於西宫見魚躍焉問其故漁者曰此當乳也於是中網而止又曰開元二十一年衢州獲魚有銘獻之侍中裴光庭等奏曰魚龍為圖河洛所出比之盛明彼何足云又曰吐蕃國在吐谷渾西界其春夏軍糧資海魚以給之國語曰周文太子發嗜鮑魚太公為其傅曰鮑魚不登俎豆豈有非禮而可飬太子老子曰魚不可脱於淵國之利器不可以示人文子曰川廣者魚大山髙者獸修故魚不可以無餌釣獸不可以空器召又曰因所貴而貴之物無不貴因所賤而賤之物無不賤故不放魚於木沈鳥於淵鄧析書曰夫水濁則無掉尾之魚政苛則無逸樂之士孟子曰有餽生魚於子產子產使校人畜之池反命曰始舍之圉圉焉少則洋洋焉子產曰得其所哉校人曰孰謂子產智吾既烹而食之矣又曰故為淵敺魚者獺也為叢敺雀者顫也魯連子曰古善漁者宿沙習子使魚生於山則雖十宿沙不得一魚焉宿沙非闇於魚道者彼山非魚之所生也荘子曰泉涸魚相與處於陸相煦以濕相濡以沫不如相忘於江湖也又曰荘子與惠子遊於濠梁之上荘子曰儵出遊從容是魚之樂也惠子曰子非魚安知魚之樂荘子曰子非我安知我不知魚之樂也又曰吞舟之魚蕩而失水則螻蟻能制之故鳥飛不厭髙魚沈不厭深又曰朽𤓰化為魚物之變也又曰任公子蹲㑹稽釣東海朞年而大魚食之公子得若魚浙河以東蒼梧以北無不厭若魚者又曰井魚不可語海夏蟲不可語冰符子曰太公㳙釣於隱溪五十有六而未嘗得一魚魯連聞而觀焉太公㳙跽而隱崖不餌而釣仰咏俯吟暮則釋竿其膝所處若背其跗觸崖若路魯連曰釣本所以在魚無魚何釣太公曰不見康王父之釣耶渉蓬莱釣巨海摧㟁投綸五百年矣未嘗得一魚方吾猶一朝耳顧子曰昔宋人臨萬仭之淵釣數寸之鱗魚将食釣不知膝之日進有傾墜而死利能誘也韓子曰公儀休相魯而嗜魚一邦皆争買魚而獻之公儀子不受曰夫唯嗜魚因不受也淮南子曰夫水濁則魚噞政苛則民亂又曰木上升水下流故鳥飛而髙魚動而下又曰上求材臣殘木上求魚臣亁谷又曰欲致魚者先通水欲致鳥者先樹木水積而魚聚木􅌗而鳥集又曰林中不賣薪湖上不鬻魚非所無也又曰俎之先生魚豆之先太羮此皆不快於耳目不適於口腹而先王貴之先本後末也又曰使葉落者風搖之使水濁者魚撓之又曰惠子從車百乘以過孟諸荘子見之而棄餘魚疾惠子故也又曰月者陰之宗是以月毁則魚腦減又曰楚王亡其猨而林木為之殘爰捷躁依木而處故殘林以求之也宋君亡其珠池魚為之殫又曰為魚德者非挈而入淵為猿賜者非負而縁木縱其所之而已又曰富池魚者必去徧音編獺飬禽獸者必去豺狼又曰臨河羨魚不若歸而織網又曰争魚者濡逐獸者趨非樂之也故至言去言至為無為又曰故天之且風草木未動而鳥已翔矣鳥巢知風也其且雨也陰曀未集而魚已噞矣魚潛雨也又曰燿蟬者務在明其火釣魚者務在芳其餌明其火者所以燿而致之也芳其餌者所以誘而利之也又曰季子治亶父三年季子子賤而巫馬期衣裋褐易容貌往觀化焉易服而往微以視之也見夜魚者釋之巫馬期問焉曰凡子所為魚者欲得也今見而釋之何也魚者曰季子不欲人取小魚也得者小魚是以釋之巫馬期以報孔子曰季子之德至矣抱朴子曰取一把礬丸内一活魚口與無藥者俱投沸膏中猛火之上其銜藥者浮戱瀺灂不死又曰丹陽水有丹魚先夏至十日夜伺之魚浮於水側赤光上照取此魚血以塗足可以步行水上金樓子曰専諸學炙魚香聞數里王僚索魚炙専諸持一利剛刀蔵著魚腹中晏子春秋曰景公射質堂上唱善者一口弦章入公曰吾失晏子未嘗聞吾不善章曰臣聞君好臣服君嗜臣食尺蠖食黄身黄食蒼身蒼君其食誦人言乎公曰善賜弦章魚五十乘弦章歸魚車塞途章撫其僕曰曩之唱善者皆欲此魚也固辭不受戰國策曰靖郭君将城薛齊人有請一言者靖郭君見之趨進曰海大魚因反走君使更言之曰海大魚網不能止釣不能牽蕩而失水則蝼蟻得意今齊亦君之水也靖郭君乃止又曰魏王與龍陽君共船而釣龍陽君得十餘魚而涕曰臣之始得魚也臣甚嘉之後得益大臣且欲棄前所得者今以臣之㓙惡也而得為王拂枕席夫四海之内其美人亦甚多聞臣之得幸於王也畢褰裳而趨王視臣亦曩臣之所棄魚也王於是令四境之内有敢言美人者族家語曰孔子之楚有漁者獻魚孔子不受漁者曰天暑市逺無所鬻之思慮棄之糞土不若獻之君子孔子再拜而受掃地祭之呂氏春秋曰竭澤而漁豈不得魚而明年無魚焚薮而畋豈不得獸而明年無獸又曰善釣者出魚於千仭之下餌香也善弋者下鳥於百仭之上弓良也又曰宋桓司馬有寳珠獲罪出亡宋王問珠之所在曰投之池中於是竭池取珠魚皆死矣吳越春秋曰越王既棲㑹稽范蠡等曰臣竊見㑹稽之山有魚池上下二處水中有三江四瀆之流九溪六谷之廣上池宜於君王下池宜於民臣畜魚三年其利可以致千萬越國當富盈新序曰楚人有獻魚於楚王者曰今日獲魚食之不盡賣之不售棄之又惜故来獻之左右曰鄙哉辭也楚王曰子不知漁者仁人也葢聞囷倉粟有餘者國有饑民後宮多幽女者下民多曠夫餘衍之蓄聚於府庫者境内多貧乏之民皆失君之道故庖有肥肉廏有肥馬民有饑色亡國之君蔵於府庫寡人聞之久矣未能行也漁者知之其以喻寡人也且今行之矣於是乃遣使恤鰥寡故漁者獻餘魚而楚國賴之風俗通曰城門失火禍及池魚俗說池中魚人姓字居近城城門失火延及其家謹案百家書宋城門失火因汲取池中水以沃灌之池水空竭魚悉露死喻惡之滋并中傷善類也又曰伯魚之生適有饋孔子魚者嘉以為瑞故名鯉字伯魚論衡曰釣者刻木為魚丹漆其身迎水浮之水動刻魚似真真魚並来㑹聚土龍之象何必不能致雨耶又曰彭蠡之濱以魚食人顔氏家訓曰山中人不信有大魚大如木海上人不信有大木大如魚又曰江陵髙偉隨顏之推入齊地凡數年向幽州淀中捕魚後病見羣魚嚙之而死三輔故事曰武帝作昆明池學水戰法後昭帝少不能復征討於池中飬魚以給諸陵祠餘付長安市魚乃賤先賢傳曰蔡君仲至孝母喪居墓側天且下神魚四頭置墓前以祭蕭廣濟孝子傳曰郡邑杜孝役在成都母喜食生魚孝於官得生鱗截竹筒盛之江中妻得之笑曰是我壻寄乃以進母又曰陳元陳太子也後母譛之陳侯令自投遼水魚負之以出元曰我罪人也故求死耳魚乃去西京雜記曰昆明池刻石為魚毎雷雨魚嘗鳴吼鬐尾皆動漢代祈雨往往有驗又曰昔人有逰東海者隨風浪莫知所之一日一夜得一孤洲共侶歡然下石植䌫登洲煑食食未熟而洲汎住船者斫䌫船復飄蕩向者孤洲乃大魚也掉尾揚鬐吹波吐浪而去疾若風雲洲上死者十餘人神仙傳曰葛元見賣大魚者元謂曰暫煩此魚到河伯處魚主曰魚已死元曰無苦乃以丹書紙内魚口中擲水中有頃魚還躍上㟁得書青黑如木又與呉王坐樓上見天吐雲元曰雨易得耳即書符著社中一時之間大雨流潦帝曰水中可有魚乎元復書符擲水中湏㬰有大魚數百頭使人治食之水經曰魚復溪中有魚其頭似羊豐肉少骨美扵餘魚又曰扶桑國有鮮色魚黒身長五丈頭如馬首伺人入水便来為害廣志曰武陽小魚大如針號一斤千頭蜀人以為醬太平御覽卷九百三十五
