  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_691-1a, image: WYG0899/WYG0899-0194a.png}
body:
  text: 太平御覧卷六百九十一宋李昉等撰服章部八单衣中衣曲領方領附袿䙱圭属二音韍音弗鞶嚢单衣釋名曰单衣言無裏也方言曰单衣江淮南楚之間謂之褋音牒關之東西謂之单衣趙魏之間謂之袏衣古謂之深衣是也禮王制曰有虞氏深衣而養老又深衣曰古者深衣盖有制度以應䂓矩䋲權衡短毋見膚長毋被土帶下毋厭髀上毋厭脅制十有二幅以應十二月袂圎以應䂓曲祫如矩以應方負䋲及踝以應直下齊如權衡以應平齊繸故規者行舉手以為容負䋲抱方者以直其政方其義也故易曰坤六二之動直以方也下齊如權衡者以安其志而平其心也五法以施故聖人服之故規矩取其無私䋲取其直權衡取其平故先王貴之故可以為文可以為武可以為擯相可以治軍旅又儒行曰丘少居魯衣縫掖之衣鄭𤣥曰縫猶大也大掖衣大袂单衣君子有道範者所衣也漢書曰江充召見上衣紗縠单衣曲􅅂後垂交輸張晏曰曲裙者人衣也後垂覆帶半之也又曰趙王彭祖為人巧佞持詭辨以中人每二千石至彭祖衣皂布单衣自行迎多誤疑事以詐動之得二千石矣言中忌諱輙書之又曰盖寛饒左遷為衛司馬未出殿門斷其单衣短令離地躬按行司卒廬室後漢書曰馬援為隗囂使公孫述述盛陳陛衛以延援入交拜禮畢使出就舘更為援制都布单衣東觀漢記曰都作荅史記曰荅布千疋前書音義曰荅布白叠也謝承後漢書曰陸閎建武中為尚書令美姿貌喜著越布单衣上見而好之自是常勑㑹稽郡獻越布又曰陳留尹苞字延博與同郡范史雲善二人俱貧出入共一单衣到人門外苞年長先著单衣前入須臾出解與史雲魏志曰管寕四時祭祀在遼東時布单衣親薦饌王隠晋書曰梁孝王彤宣帝子將单衣補車幰以為清恭軍王銓曰晏嬰大官稱清者以為待食七百家也公無此費宜美衣服使内外相稱晉書曰桓温廢東海王王着白袷单衣歩下西堂羣臣拜辭莫不歔欷又曰簡文初立於朝堂服着平巾幘单衣東向拜受璽綬又曰王導傳蘇峻平後帑藏空竭庫中唯有練数十萬疋賣之不售而國用不足導患之與朝賢俱制練單衣於是士庻翕然競服之練遂貴端至一金晋令曰朝服皂緣中单衣趙書曰勒恭軍周承為舘陶令斷官絹数百疋獄以八坐議宥之後每設大㑹使俳兒着介幘黄絹单衣優問曰汝何官荅我本舘陶令斗藪单衣曰正坐取是故入汝軰以為笑本事具樂部梁書曰劉曇静母亡時天寒曇静身衣单布衣廬於厝所晝夜哭臨不絶聲又曰張稷為吳郡太守就僕射徵道由吳郷人候稷者滿水陸稷单衣裝徑還都下人莫之識其率素如此董巴漢輿服志曰羽林左監虎賁冠鶡著紗縠单衣又曰虎賁騎皆衣虎文单衣㐮邑嵗獻織成虎文應邵漢官儀曰謁者皆著緗幘大冠白絹单衣徐野民車服雜注曰元帝召陳郡王隠待詔著作单衣幘朝望於着作之省又曰天子郊禮釋奠中单衣絳緣其領袖其朝服皁緣也燕丹子曰荆軻把秦王乞聼琴聲而死召姬人鼓琴聲曰羅縠单衣可掣而絶八尺屏風可超而越齊桓公夜出迎客寗戚叩牛角商歌曰短布单衣適至骭終朝飯牛至夜半仲長統昌言曰薊子訓不知何郡人到陳公舍自云今日當死陳公與之一单衣於是入室寢日中果死傅子曰梁兾作火浣布单衣㑹客賔行酒食盃而汚之偽怒觧衣而燒之垢盡火㓕粲然潔白世説曰王戎性儉為其從子婚與一单衣後更責之陳留耆舊傳曰吳祐為膠東相嗇夫孫性盗富民錢五百為父市单衣父恐便以单衣詣門自謝祐以单衣遺其父梁兾别傳曰兾作狐尾单衣上短下長邉譲别傳曰譲才辯俊逸孔融薦譲於武帝曰邉譲為九州之被則不足為单衣襜褕則有餘楊彪别傳曰魏文帝令彪着布单衣待以賔客之禮拾遺記曰漢末羽山之民獻赤布梁兾製為衣謂之丹衣而史家云单衣則今縫掖也字異聲同未知孰是也神仙傳曰曹公欲殺左慈将出市忽失慈所在乃閉市索之傳曰一目眇著葛巾幘单衣正爾視之一市中數萬人皆眇一目着葛巾績单衣竟不知所取捜神記曰永嘉以來士大夫競服生单衣識者怪之曰此古練縗之布諸侯大夫所以服天子其後愍帝晏駕馬融遺令曰穿中除五時衣但得施絳絹单衣中衣禮郊特牲曰繡紱丹朱中衣大夫之僣禮鄭𤣥曰繡讀為綃綃繒名也中衣即今中单衣也董巴漢輿服志曰祭宗廟初𤣥絳領袖為中衣絳袴袜示赤心其奉神五郊各從其色徐廣輿服雜注曰夫天子郊禮釋奠中衣以絳縁其領袖其朝皁縁魏官儀曰皁縁領袖中单衣㑹稽典録曰鄭𢎞為縣嗇夫民有弟負兄錢者未還其嫂詣𢎞賣中单為叔還錢兄聞之慙遣婦賫錢還𢎞不受曲領方領附釋名曰曲領上横壅頸其狀曲也禮曰衣曰曲祫如矩以應方祫曲領也古者方領後漢書曰朱勃字叔陽年十二能誦詩書嘗候馬援兄况勃衣方領能短歩前書音義曰頸下施領正方學者之服也袿䙱廣雅曰䙱長䄔也釋名曰婦人上服曰袿其下垂者上廣下狹如刀圭也䙱属也衣裳上下相連属也徐廣輿服雜注曰今皇后謁廟服袿䙱大衣後漢書曰和憙鄧后性儉約每有讌㑹諸姬貴人競自修整簮珥光采袿裳鮮明説文曰簮竿也珥瑱也以玉充耳后獨省素無飾其衣有與隂后同色者即時觧易南史曰南岳鄧先生名郁隠居不仕魏大夫忽來臨降乘雲而至從少姬三十並著絳紫羅繡袿䙱年皆可十七八許傅毅舞賦曰珠翠的爍而炤耀華袿飛髾而雜纎羅婦人集張君平與妹憲書曰念諸里舍皆富財賄袿䙱襲蔽紛華照曜於是之際想汝懐愧韍釋名曰韍韠所以蔽前也婦人蔽膝亦如之齊人謂之巨巾田家婦女出至田野以覆其頭故因以為名也又曰跪襜跪時襜然張也爾雅曰衣蔽前謂之襜今蔽膝也易困卦曰朱韍方來詩曰赤芾在股邪幅在下芾太古蔽膝之象也冕服謂之芾其他服謂之􅔖以韋為之禮曰一命緼韍幽衡再命赤韍幽衡韍之言蔽也緼赤黄之色所謂韍也又曰韠君朱大夫素士爵韋韍以言蔽也以韋為之象裳也圜殺直日韠制天子直諸侯前後方大夫前方後剉角士前後正韠下廣二尺上廣一尺長三尺又明堂位曰有虞氏服韍夏后氏山殷火周龍章鄭𤣥曰韍􅔖也舜始作之以尊祭服禹湯至周増以畵文後王列飾也漢書東方朔傳曰舘陶公主迎武帝蔽膝登階也又曰王莾妻著布蔽膝見客魏志曰武帝内誡令云宫人位為貴人金印藍紱女人爵位之極又文帝與于禁詔曰昔漢髙祖脱衣以衣韓信光武觧綬以帶李忠誠皆人主當時貴敬功勞効心之至也封賜將軍以魏王時自所佩朱韍及逺逰冠吳志曰孫權潘夫人有娠夢人以龍頭授已以蔽膝受之生亮五經要義曰韠者舜所制也又曰天子朱紱諸侯赤韍赤盛色也又曰太古之時未有布帛人食禽獸肉而衣其皮知蔽前未知蔽後至舜冕服既備故復制之示不忘古韠名有三朝廷則謂之韠宗廟謂之韎韐上音脉下音閤五經異義曰韍者大帶之飾非􅔖也董巴漢輿服志曰五覇逓興戰兵不息韍非兵飾於是去韍白虎通曰紼有何謂也紼者蔽也行蔽前者爾有事因以别尊卑彰有德也徐廣輿服儀注曰蔽膝古之韍也戰國連兵以韍非兵飾去之漢明帝復制韍環濟要略曰凡韍以韋為之以象裳色湯至増以畵文夏山取仁可依殷火取其光明周龍章取其變化莊子曰祝牧謂其妻曰天下有道我韍子佩天下無道我負子戴當隠藏也拾遺記曰孔子生有麟吐玉書於闕里人家文云水精之子繼商周而素王出故蒼龍繞室五星降庭徵在賢明知為神異乃以繡紱繫麟角而去夫子系殷湯水德而素王至敬王之末魯定公二十四年魯人鉏商田於大澤得麟以示夫子知命之終抱麟解紱而涕泗焉鞶嚢禮曰男鞶革女鞶絲鞶小嚢盛帨巾者男用韋女用繒禮曰鞶厲游纓杜預曰鞶紳帶一名大帶厲大帶之垂也白虎通曰男子有鞶者爾有金革之事東觀漢記曰鄧遵破諸羗詔賜遵金剛鮮卑緄帶一具虎頭鞶嚢一晋書曰鄧攸祖殷亮直强正為淮南太守夢行水邉見一女子猛獸自後斷其鞶嚢占者以為水邉有女汝字也斷鞶嚢新虎頭代故虎頭也若不作汝隂當作汝南後為汝南太守曹瞞傳曰太祖為人佻易無威重身佩小鞶嚢以盛手巾細物鄴中記曰石虎叚虎頭鞶嚢為龍頭鞶嚢揚子法言曰今之學也非獨為之垂藻也又從而繡其鞶嚢班固與弟超貢曰遺仲叔虎頭旁嚢金銀鈎謝承與歩隲書曰所在近北無它異物裁奉織民虎頭綬嚢可以服之孔珠與王佐長史書朝不着鞶嚢不知為可荅曰尋此鞶嚢是内則施鞶之遺象此為箴線之屬非朝所宜着太平御覧卷六百九十一
