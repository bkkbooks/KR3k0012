  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_537-1a, image: WYG0898/WYG0898-0029c.png}
body:
  text: 太平御覽卷五百三十七宋李昉等撰禮儀部十六廵狩籍田廵狩易觀卦曰風行地上觀先王以省方觀民設教尚書舜典曰嵗二月東廵狩至於岱宗柴積柴以燎望秩於山川秩者如其秩以祭之也肆覲東后恊時月正日恊和同律度量衡同齊同也脩五禮五玊五等諸侯瑞玊璧也三帛𤣥曛黄二生羊雁一死雉也䞇如五器卒乃復五器上五玊禮終則還之三帛以下不還五月南廵狩至於南嶽如岱禮南嶽衡山八月西廵狩至於西嶽如初禮西嶽華山十有一月朔廵狩至於北嶽如西禮朔北方北嶽恒山歸格於藝祖用特藝稱也尚書大傳曰元祀廵狩四嶽八伯壇四奥沉四海封十有二山肇十有二州毛詩清廟曰時邁廵狩告祭柴望也廵狩告祭者天子廵行郡國至方嶽之下而封禅也又閔予般曰廵狩而祀四嶽河海也於皇時周陟其髙山嶞山喬嶽允猶翕河河山四嶽翕合也箋云合者河自大陸以北敷為九道祭者合為一周禮夏官下曰職方氏掌天下之圖王将廵狩則戒乎四方大戴禮曰十有二嵗天子廵狩是故諸侯上不敢侵陵下不敢暴小民禮記王制曰天子五年一廵狩嵗二月東廵狩至於岱宗柴而望祀山川覲諸侯問百年者就見之命太師陳詩以觀民風俗命市納賈以觀民之所好惡命典禮考時月定日同律禮樂制度衣服正之山川神祗有不舉者為不敬不敬者君削以地宗廟有不順者為不考不孝者君絀以爵變禮易樂者為不從不從者君流革制度衣服者為叛叛者君討有功徳於民者加地進律又祭儀曰天子廵狩諸侯待於境天子先見百年者問其國君於百年者所在而見八十九十者東行西行者弗敢過欲言政者君就之可也弗敢過者謂道經則見之禮記逸禮曰王者必制廵狩之禮何尊天重民也所以五年一廵狩何五嵗再閏天道大備所以至四嶽者盛徳之山四方之中能興雲致雨也廵狩者何廵循也狩牧也為天循行牧民也禮記外傳曰溥天之下莫非王土封建諸侯各守天子之地故廵行之夏殷五載一廵狩五年再閏周制十二年一廵狩嵗星一周皆在仲月以至嶽下仲者中也正也燔柴告天此因事而告至也天下廣大四方幽隐南面之君多行威福憂民之至故告之廵狩之年四方諸侯先㑹嶽之下以候見嶽有湯沭之邑助祭山先齋戒以見天子考其制度以齊同書同文車同軌合其章律甲子有善惡以黜陟之左傳荘公曰天子非展義不廵狩注云天子廵狩所以宣布徳義又僖下曰晉侯召王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩于河陽言非其地且明其徳也漢書曰人有告韓信反陳平曰古者天子廵狩偽遊雲夢也又武紀曰朕郊見上帝廵於北邊見群鶴留止不以羅網靡所獲獻薦於太畤如淳曰是時春也非用羅網時故無所獲光景並見又曰元封五年南廵狩見於盛唐如淳曰縣名在南郡望祀虞舜於九嶷應劭曰舜塟蒼梧九嶷山名今在零陵營道也自潯陽浮江親射蛟江中獲之舳艫千里薄樅陽而出縣名属廬江也作盛唐樅陽之歌又曰宣帝尊孝武廟為世宗廵狩郡國皆立廟又食貨志曰天子始出廵郡國東渡河河東守不意行廵至不辯自殺行西踰隴隴西守以行往卒或曰踰度也卒食卒從官不得食隴西自殺於是北去蕭闗從數萬騎馬獵新秦中以勒邊兵而歸後漢書曰光武建武十八年二月西廵狩幸長安三月祠髙廟遂有事十一陵立馮翊界進幸蒲阪祠后土夏四月車駕還宫又曰章帝元和二年二月丙辰東廵狩乙丒帝耕于定陶使使者祠唐堯于咸陽靈䑓辛未幸太山柴告岱宗有黄鵠三十從西南来經祠壇上東北過於宫室翺翔升降進幸奉髙又曰章帝廵幸詔曰惟廵狩之制以宣聲教同遐邇解釋怨結又和紀曰冬十月戊申幸章陵祠舊宅癸丒祠園廟㑹宗室於宅勞賜作樂宋書禮志曰古者天子廵狩之禮布在方䇿至秦漢廵幸或以厭望氣之祥或以希神仙之應煩擾之役多非舊典惟後漢諸帝頗有古禮焉魏文帝值参分初創方隅事多皇輿亟動畧無寧嵗盖應時之務又非舊章也明帝凡三東廵所過存問髙年恤人疾苦或賜榖布帛有古廵幸之風焉齊正始元年廵洛陽縣賜髙年力田各有差又曰元嘉四年二月太祖東廵至丹徒告覲園陵三月幸丹徒離宫升京城北顧饗父老舊勲於丹徒行宫加賜衣裳各有差蠲丹徒縣其年租賦宋書曰文帝幸丹徒詔吾生在此城及盧循肆亂害流茲境先帝以桑梓根本寔同休戚復以䝉弱猥預艱難情義繾綣夷險備經遺蹤舊物猶存心目嵗月不居遊踰三紀時人故老與運遷落眷惟既往倍深感歎越絶書曰禹廵狩大越見耆老納詩書審銓衡平斗斛孟子曰夏諺曰吾王不遊吾何以休吾王不豫吾何以助一遊一豫為諸侯度又曰晏子對齊景公曰天子適諸侯曰廵狩春省耕而補不足秋省斂而助不給也孔叢子曰古者天子将廵狩必吿於祖禰命吿羣祀及社稷畿内名山大川七日而遍親吿牲史用幣蔡邕獨斷曰上廵狩校獵還公卿以下陳洛陽亭前街上乗輿到公卿下拜天子下車公卿親識顔色然後還宫酈善長注水經曰光武之征秦豐幸舊邑治酒極歡張平子以為真人南廵觀舊里焉三齊略記曰堯山在廣固城西七里堯廵狩所登遂以為名山頂立祠祠邉有柏樹枯而復生不知幾代樹也又石上有堯跡于今猶存風俗通曰廵者循也狩者守也道徳太平恐逺近不同故必親行之循功考徳黜陟幽明也白虎通曰王者所廵狩何廵者循也狩者収也道徳太平恐逺近不同化幽隐有不得所者故必自親行之謙敬重民之至也何以知太平乃廵狩以武王不廵狩至成王乃廵狩也黄帝太一宻推曰師曠曰先知廵狩之年當視太一與天目在四維之嵗法為廵狩若不出則遣使者按行風俗太一雖在四維不出也出即知廵狩何方以人主所在處之也班固東廵頌曰事大而瑞盛誠非一小臣所在頌述不勝狂簡之情謹上岱宗頌一篇班固南廵頌曰是時聖上運天官之法駕建日月之㫋旌崔駰東廵頌曰登天靈之威輅駕太一之象車躬東作之上務始八政於南行崔駰南廵頌曰建初九年秋榖始登猶期嘉時舉先王之大禮假於章陵遂南廵楚路臨江川以望衡山顧九疑嘆虞舜之風是時庶績咸熈㒺可黜陟崔駰西廵頌曰惟永平三年八月己丒行幸河東志曰君舉必書是故工歌其詩史立春秋若夫聲管不發雅頌㒺記崔駰北廵頌曰元和二年正月上既畢郊祀之事乃東廵出於河内納青兖之郊廻冀州禮北嶽聖澤流浃黎元被徳嘉瑞並集張衡廵狩頌曰初吉帝将狩於岱嶽展誼省方觀風設教丙寅朏率羣賓偹法駕以祖於東門乙酉觀禮於魯而休齊焉己丒召於靈宫是日有鳳雙集於䑓馬融東廵頌曰敷六典經八成燮和萬殊總領神明類乎上帝柴乎三辰禋祠乎六宗祗燎乎羣神籍田毛詩閔予載芟曰載芟春籍田而祈社稷也周禮天官上甸師曰掌帥其属而耕耨王籍以時入之以供粢盛又天官下曰内宰上春詔王后帥六宫之人生種稑之種而獻之於王鄭𤣥曰古者使后宫藏種以佑王耕事共帝郊也先種後熟曰稑禮記月令曰是月也天子乃以元日祈榖于上帝乃擇元辰天子親載未耜措之於参保介之御間帥三公九卿諸侯大夫躬耕帝籍天子三推公五推卿諸侯九推反乃執爵于太寝三公九卿諸侯大夫皆御命曰勞酒又祭儀曰昔天子為籍田千畆冕而朱紘躬秉耒耜諸侯為籍百畆冕而青紘躬秉耒耜以事天地山川社稷先公醴酪粢盛於是乎取之敬之至也又祭義曰耕籍所以教諸侯之養也又祭綂曰天子親耕於南郊以供粢盛王后蠶於北郊以供冕服天子諸侯非莫耕也王后夫人非莫蠶也身致其誠信而已矣又表記曰天子親耕粢盛俎豆以事上帝故諸侯勤以輔事於天子注言無事而居位食祿是不義而富貴禮記外傳曰籍者借也天子耕千畆但三推發耒三反而止借民力治之所耕之榖藏於神倉以供事天地宗廟神祗人鬼之用也天子以身先天下所以勸下民也以建寅之月而郊此郊即祈谷之祭郊而後耕郊用辛日擇吉日而耕用亥日享先農而後籍田國語曰周宣王即位不籍千畆虢文公諌曰夫民之大事在農上帝之粢盛於是乎出民之蕃庶於是乎生是故稷為太官古者太史乗時覛土土氣震發先時九日太史吿稷曰陽氣俱蒸土膏其動稷以告王王即齋宫百官御事王耕一墢漢文帝詔曰夫農天下之本也其籍田朕親率耕以給宗廟粢盛又曰昭帝始元元年上耕於鈎盾弄田應劭曰昭帝年九嵗未能親耕帝籍鈎盾官者近署故往試耕為戲弄也續漢書禮儀志曰正月始耕有司請行事訖就耕位天子諸侯百官以次耕晉書禮志曰武帝末有司奏古諸侯耕籍百畆躬執耒以奉宗廟社稷勸率農功今諸侯臨國宜依之竟不行又江彪傳曰哀帝即位欲耕籍田彪以禮廢日久儀注不存中興以来所以不立宜停之宋書禮志曰親躬籍田晉武帝太始四年詔曰夫民之大事在農是以古之聖王躬耕帝籍以供郊廟之粢盛且以訓化天下近年以來耕籍於數歩中空有慕古之名曽無躬祀訓農之實而有百里車從之費今脩千里之制當與羣公卿士躬稼穡之艱以帥天下又曰元嘉二十一年太祖将親耕而其儀久廢使何承天撰定儀注乃下詔曰國以民為本民以食為先古者從時脉土以定時功躬耕帝籍敬供粢盛仰瞻前王思遵令典何可量處千畆考績上元佳辰朕當親率百辟致禮郊甸庶幾誠素奨彼斯民又曰籍田皇帝冠通天冠朱紘青介幘衣青紗衮侍中陪乗奉車郎秉轡又曰車駕至籍田侍中跪奏尊降車臨壇大司農跪奏先農已享請皇帝親耕太史令讃曰皇帝親耕三推三反於是羣臣以次耕王公五等開國諸侯五推五反孤卿大夫七推七反士九推九反籍田令率其属耕竟畆灑種即耰齊書禮志曰永明三年有司奏来年正月二十五日丁亥可祠先農即日輿駕親耕宋元嘉大明以来並用立春後亥日尚書令王儉以為亥日籍田經記無文太學博士劉蔓議禮孟春之月迎春又於是月以元日祈穀又擇元辰躬耕帝籍盧植説禮通神辰日日甲至癸也辰子至亥也郊天陽也故以日籍田隂也故以辰隂禮卑後必居其末亥辰之末故記稱元辰注曰吉亥又五行之説木生於亥亥日祭先農又其義也隋書禮志曰北齊籍於帝城東南千畆每嵗正月上辛後吉亥使公卿以一太牢祠先農神農於壇上無配享祭訖親耕唐書曰貞觀三年春太宗親祭先農躬御耒耜籍于千畆之甸晉氏南遷後魏来自雲朔中原分裂又雜以獯戎代厯周隋此禮又廢而今始行之觀者莫不駭躍於是秘書郎岑文本獻籍田頌以美之又曰乾元中耕籍田至於先農之壇因閲耒耜有雕刻文飾者謂左右曰田器農人執之在於朴素豈貴文飾乎乃命撤之又曰儀鳳二年春上親耕籍田於東郊禮畢作籍田賦以示羣臣又曰開元二十二年正月上親耕於洛陽東門外諸儒奏議以為古者耦耕以一撥為推今用牛耕宜以一歩為推及親籍太常告三推禮畢上曰朕憂人知勤勞俯同九推而止自是公卿以下皆過於古五經要義曰天子籍田千畆以供上帝之粢盛當孟春啟蟄即郊之後身率公卿大夫而親耕焉所以先百姓而致孝敬説文曰帝耤千畆使民如借故謂之耤從耒借聲應劭漢官儀曰天子東耕之日率三公九卿戴青幘服青衣載青旂駕倉龍往出種天子升壇公卿耕訖天子耕於壇舉耒三而已應劭漢官儀曰天子升壇公卿耕訖嗇夫下種凡稱籍田為千畆亦曰帝籍亦曰耕籍亦曰東耕亦曰親耕亦曰王籍六典曰凡籍田所收九榖納於神倉以供粢盛五齊三酒之用若有餘及穰稾供飼犧牲焉又曰兩漢及魏晉並有其禮過江草創未暇至宋始有之也黄瓊上書曰先農之禮所宜躬親以迎春和以致時雨論衡曰立春東耕為土象人男女各秉二耒鋤或立土牛象人土中未必能耕也從氣應時示率下也東京賦曰躬三推於天田脩帝籍之千畆繆襲許昌宫賦曰太和六年春上既躬耕帝籍發趾乎千畆以帥先萬國乃命羣牧守相述職班教順陽宣化蒸黎允示訓徳歌功觀事樂業是嵗甘露䧏黄龍見海外有克捷之師方内有豐穣之慶農有餘粟女有餘布遐逖来享殊俗内附穆乎有太平之風潘岳籍田賦曰伊晉之四年皇帝親率羣后籍於千畆之甸禮也於是乃使甸師清畿野廬掃路封人壝宫掌舍設枑青壇蔚其嶽立翠幙黯以雲布結崇基之靈趾啟四塗之廣阼任豫籍田賦曰瞻望圭景咫尺三川緬彼常籍百有餘年曹植籍田論曰春耕籍田郎中令侍寡人焉顧而告之曰營疇萬畆厥田上上經以大陌帶以横阡竒栁夾路名果被園牢農實掌是謂公田此寡人之封疆也太平御覽卷五百三十七
