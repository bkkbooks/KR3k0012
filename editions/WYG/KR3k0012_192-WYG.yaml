body:
  text: 太平御覽卷一百九十二宋李昉等撰居處部二十城上城上説文曰城以盛民也墉城垣也釋名曰城盛也盛受國都也又曰城上垣謂之睥睨言於孔中睥睨非常也亦曰陴言禆助城之髙也亦曰女牆言卑小比之於城若女子之於丈夫也所謂堞亦女牆也易曰城復于隍詩曰宗子維城無俾城壊又曰挑兮達兮在城闕兮又曰孑孑干旌在浚之城衛文公徙居楚邱始建城市而城市宫室得其時制焉又曰崇墉言言又曰哲夫成城哲婦傾城又曰静女其姝俟我於城隅又曰赳赳武夫公侯干城禮記曰登城不指城上不呼左傳曰鄭荘公立姜氏愛共叔段為請京使居之謂之京城太叔祭仲曰都城過百雉國之害也又曰美城之大名也又曰楚嚢瓦城郢沈尹戌曰茍不能衛城無益也又曰梁伯好土功亟城而不處民罷而不堪則曰某寇將至乃溝公宫秦將襲我民懼而潰又曰備豫不虞善之大者也莒恃其陋而不修城郭浹辰之間而楚克其三都又曰無戎而城讐必保焉又曰楚子圍鄭守陴者皆哭楚子退師鄭人修城進復圍之三月克之又曰叔向告晉侯曰城上有烏齊師其遁又曰君其修徳而固宗子何城如之又曰士彌牟城成周計丈尺揣髙卑度厚薄仞溝洫物土方議逺邇量事期計徒庸慮材用書糇糧令役於諸侯又曰宋城華元為植廵功也城者謳曰睅其目皤其腹弃甲而復于思于思弃甲復來使其驂乘謂之曰牛則有皮犀兕尚多弃甲則那役人曰縱其有皮丹漆若何華元去之曰夫其口衆我寡榖梁傳襄公曰大國過小邑必飭城禮罪禮也明已國無罪公羊傳曰城雉者何五板而堵五堵而雉百雉而城公羊傳注曰天子之城干雉髙七雉公侯百雉髙五雉男五雉髙三雉史記曰秦始皇使蒙恬北築長城西屬流沙東至遼水以捍胡又曰秦二世欲漆其城優旃曰佳哉漆城蕩蕩寇來不能上易為漆耳顧難為䕃室二世笑遂止漢書曰武帝太初元年使將軍公孫敖築塞外受降城又曰梁孝王廣睢陽城周圍七十里又曰貳師遣屬國胡騎二千與虜戰兵壊散死傷者數百人漢軍乘勝追北至范大夫城漢將姓范初築此城范亡其妻率衆完保之因以為名又曰車師前治交河城外分流繞城下故號交河去長安八千一百五十里又曰昭帝元鳯六年募郡國徙遼東𤣥菟城續漢書曰耿恭字伯宗為戊巳校尉屯後王部金蒲城謁者闗寵為戊巳校尉屯前王部柳中城魏志曰曹公攻馬超渡渭每為超騎所衝突營不得立地又多沙不可築城婁子伯説公今天寒可以沙為城以水灌之一夜可立從之乃多作縑嚢以盛土堰水夜渡兵作城比明城立公軍於是盡得渡干寳晉記曰魏文帝之在廣陵吳人大駭乃臨江為疑城自石頭城至于江乘以木為枝衣以葦席加彩飾焉一夕而成晉書曰凉州城有龍形故名卧龍城本匈奴所築也又曰朱序遷凉州刺史鎮襄陽符堅遣軍圍序序母韓氏自行城謂西北角當先弊遂領百餘婢及城中女丁築二十餘丈賊攻新築不敗遂引退襄陽謂之夫人城晉載記曰赫連勃勃以叱于呵利領將作大匠乃蒸土築城以錐刺之錐入一寸即殺作者不入即殺行錐者勃勃以為忠沈約宋書曰檀道濟見收脱幘投地曰乃壊汝萬里長城又曰氐師楊難當寇漢中魏興太守薛健保黄金城崔鴻十六國春秋北燕録曰初燕帝光始中丁零氐楊道獵於白鹿山為契丹所獲流漂塞外至大難北及黎大國逐水草而射獵為業至十月乃收葦以水澆令凍髙一丈五尺東北七十八里南北二十餘里名陵城居於其中又夏録曰赫連勃勃下書曰古人制起城邑或因山水或以義立名今城都已建萬堵斯作克城弗逺宜有美名朕方統一天下君臨萬國可以統萬為名燕書曰太祖皝光始八年下令唐柱等築龍城立門闕宫殿廟園籍田後遂改為龍城縣北齊書曰唐邕字道和為給事黄門中書舎人文宣出塞邕必陪從文宣嘗登幷州童子佛寺望幷州曰此何等城也或曰金城湯池天府之國也文宣曰我謂唐邕是金城此非也唐書曰景雲二年三月張仁愿於河北築三受降城先是朔方與突厥以河下為界北有拂雲祠突厥每入寇必禱祠候氷合而入時黙啜西擊仁愿奪取漠南城首尾相應以拂雲祠為中城東西相去各四百里背據津濟遥相應接北拓三百餘里於牛頭胡那山北置􅇏堠百八十自是突厥不得度山放牧朔方更無寇掠減鎮兵數萬人又曰天寳二年正月二十八日築神都羅城號曰金城又曰天寳六載十二月築㑹昌縣城又置百司及諸公卿邸第又曰建中元年五月築奉天城四年十月上避難于奉天初術士桑道茂奏請城奉天為王者之居至是方騐又曰貞元九年二月詔復築鹽州先是貞元三年城為吐蕃所壊自後塞外無保障犬戎入寇既城之後邊患頓息五經異義曰天子之城髙九仞公侯七仞伯五仞子男三仞白虎通曰天子曰崇城言崇髙也諸侯曰干城言不敢自專禦於天子也周處曰周公作城于土中城方千六百二十丈郛方七十二里南繫洛水北因陜山為天下之大制也家語曰邑百雉之城古之制也國語曰衆心成城言以衆心為城琴操杞梁死妻援琴歌曰樂莫樂兮新相知悲莫悲兮生别離哀感皇天城為隳列女傳曰齊人杞梁襲莒戰而死其妻就夫之死城下哭之七日而城崩淮南子崑崙山有層城九重又曰鯀作九仞之城墨子曰解為城西門守城之法積樵營雜茅葦有荻有木有積沙有蓬艾有麻腊有金錢有積粟荘子曰孔子説盜跖曰使為將軍造大城數百里跖曰城之大者莫大乎天下也韓子靖郭君城薛客諫靖郭君曰君失齊國雖薛城至於天猶無益也靖郭君乃不城薛博物志曰處士東里塊責禹亂天下禹退作三城强者攻弱者守敵者死戰城郭禹始也又曰代城始築立版幹一日亡西南五十里於澤中自立結葦為門因就營築焉其城圓周三十七里為九門故城處呼曰東城崔豹古今注曰秦所築長城土色紫漢塞亦然故稱紫塞韓詩外傳曰趙簡子薨未葬中牟叛之既葬五日襄子興兵而攻之圍未匝而城自壊襄子擊金而退軍吏曰誅中牟之罪而城自壊天助也何為退襄子曰吾聞君子不乘人於利不阨人於險使其城成然後攻之述異志曰盧山上北嶺有城號康王城天雨聞鼓角之聲傳云周康王好音累廵名山故有康王之號又曰潯陽柴桑縣城晉永和中有童謡呼為平石城時人僉謂平滅石之徵也桓𤣥簒位晉帝為平固王恭帝為石陽公俱遷於此城又曰潯陽張允家在本郡郡南有古城張少貧約屢往逰憩忽有一老父來與張言因問之此城何名答曰吾不知為南郡城耳言訖便去不知所之張既出官仕進累遷位登元凱後為南郡太守即以城號以志老父之言焉又曰安陽有金城城皆如金色堅勁不崩摧先儒云上古時天雨黄金也酈元水經注曰魯陽開水厯衡山西南經皇后城建武元年光武遣侍中傅俊持節迎光烈皇后於齊陽後發兵三百餘人宿衛皇后道路歸京師盖稅舎所過得其名矣又曰漢水東合甲水南流經金井城又曰漢水東經方石城在髙原上髙十餘丈四面臨平形若覆盆又曰易水西出寛中谷東經五大夫城昔北平侯王潭不同王莽之亂生五子並避亂隠居此山故其後居之世以為五大夫城河北記云易縣有五公城王潭不從王莽潭子興生五子避隠於此世祖並封為侯元才北平侯顯才蒲平侯益才安嘉侯季才唐侯秀才中山侯號五侯其西三十里有五大夫城説與此同説苑曰中行穆子圍鼓人有以城叛來降者穆子不許軍吏曰師徒不勤得城何故不受穆子曰有以吾城叛者吾所惡也人以城來獨何賞秦州記曰天水郡治上邽城前有湖水冬夏中停無增減天水取名由此湖也又曰金城郡漢昭元始六年所置應劭云初築城得金故曰金城凡城皆稱金言其固也故墨子稱金城湯池齊地記曰即墨城東西百八十里平昌城髙六丈有臺有井與荆水通失物於井得之於荆水又神龍出入焉故一名龍城三齊記略曰陽庭城東西二百五十里青城山秦始皇登此山造石城入河三十里臨海射魚方四百里水變血色今猶爾也解道虎齊記曰不夜城在陽庭東南一百二十里淳于髠稱海童作妖城古有日夜出見於東境故莱子城此以不夜為名夣書曰城為人君一縣尊也夣見城者見人君也夣築新城有功名新序曰梁伯湎於酒滛於色心惛而耳塞志好為城而不居民罷甚武當山記曰魏興錫縣有長利城父老相傳云是長安土所築也王韶之始興記曰有任將軍城秦南海尉任囂城也合逕有三城馬鞍城白鹿城晉咸康中張魴甚有恵政白鹿羣㳺取一而獻之故因此為名袁山松宜都記曰佷山縣有山名下魚城四面絶崖兩道可上皆險山周廻可二十里上有林木池水里許昔永嘉亂土人登此避賊賊守之經年食魚擲下與賊以示不窮賊遂退散因以此為下魚城吳地記曰閶門外越城者越來伐吳王在姑蘇築此城以逼之又有越來溪又曰越來溪西魚城者吳王既逰姑蘇築此城以養魚又曰魚城之西有故城長老云築以釀酒今俗人呼之為酒城又曰婁門外鴨城者吳王築此城以養鴨又曰匠門外雞陂者吳王養雞城又曰海渚有吳王闔閭與越結怨相伐築城名曰南城以禦越盛𢎞之荆州記曰牧馬城東三里有蜂城故老相傳云飢年民結侣拾蜂止憇其中故因為名又云城隨門勢上大下尖其形似蜂故有蜂號二稱莫知所附故並載焉又云當陽縣東南有麥城又東有驢磨城掎角城傳云伍員造此二城以攻麥城故假驢磨之名又曰樊城西北有鄾城即春秋所稱鄾子之國光武云宛最强鄾次之即謂此鄾城西北行十餘里是為鄧侯之國為楚文王所滅今為鄧城西又十餘里有榖城伯綏之門國城門有石人焉刋其腹云摩鞬慎莫言疑此亦周太廟金人緘口銘背之流也又曰秭歸縣西楊城周廻十餘里即熊繹所居荆州圖記曰江夏郡所治夏口城其西南角因磯為髙崇墉枕流上則逺聎山川下則激浪﨑嶇是曰鵠磯實舟人之所艱也又曰白帝城西臨大江東南髙二百丈西北髙一千丈又曰鄧城有樊城是樊仲山甫所封也又曰沌陽縣有却月城西一里有馬城又曰夷陽縣南對岸有陸抗故城即山為墉西面天險上有歩闡故城又曰新野郡魏三公城左右傳漢時三公餞行處也伏滔北征記曰梁國名故宋國微子所封城再重大城梁孝王所築孟粤北征記曰許昌在洛水之西方圓二十里有三重城南北東西土門金城西南貟實中臺髙六丈餘方圓二畝上有廟城門有鐵鑊闗中記曰長安地皆黒壤今赤如火堅如石父老所傳鑿龍首山土為城又諸臺闗亦爾益州記曰益州城張儀所築錦城在州南蜀故宫也其處號錦里成都記曰府城本呼為錦城秦滅蜀張儀所築也每面三里周廻十二里髙七丈屢皆傾側忽有大龜周行其所躡而築之功果就焉故亦號龜城三輔黄圖曰長安城西南頭第二門名直城王莽改曰端路今名直城太平御覽卷一百九十二
