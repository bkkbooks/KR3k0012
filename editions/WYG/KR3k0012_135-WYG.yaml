body:
  text: 太平御覽巻一百三十五宋李昉等撰皇親部一總序后妃人皇后庖犧母神農母黄帝母黄帝四妃顓頊母顓頊妃帝嚳四妃堯妃舜母舜二妃夏禹母禹妃帝相后桀妃殷湯母湯妃帝乙妃紂妃周太王妃王季妃文王妃武王妃宣王后幽王褒后秦始皇太后總序后妃尚書大傳曰古者后夫人將侍君前息燭後舉燭至於房中釋朝服襲燕服然後入御史奏雞鳴於階下奏猶白階陛也然後夫人鳴佩玉於房中告去也然後應門擊柝告闢也應門朝門也闢啓也然後少師奏質明於階下質正然後夫人入庭立君出朝毛詩曰關雎后妃之徳也風之始也所以風天下而正夫婦也關關雎鳩在河之洲窈窕淑女君子好逑又曰葛覃后妃之本也后妃在父母家則志在於女功之事恭儉節用服澣濯之衣尊師敬傅則可以歸寧父母化天下以成婦道也又曰巻耳后妃之志也又當輔佐君子求賢審官知臣下之勤勞内有進賢之志而無險詖私謁之心朝夕思念至於憂勤也采采卷耳不盈頃筐嗟我懐人寘彼周行又曰樛木后妃逮下也言能逮下而無嫉妬之心焉南有樛木葛藟纍之樂只君子福履綏之又曰螽斯后妃子孫衆多也言若螽斯不妬忌則子孫衆多也螽斯羽詵詵兮宜爾子孫振振兮又曰桃夭后妃之所致也不妬忌則男女以正婚姻以時國無鰥民也桃之夭夭灼灼其華之子于歸宜其室家又曰兎罝后妃之化行也關雎之化行則莫不好徳賢人衆多也肅肅兎罝椓之丁丁赳赳武夫公侯干城又曰芣苢后妃之美也天下和平則婦人樂有子矣采采芣苢薄言采之又曰雞鳴思賢妃也哀公荒淫怠慢故陳賢妃貞女夙夜警戒相成之道焉周禮曰天子之妃曰后鄭𤣥注曰后之言後也又昏義曰古者天子后立六宫三夫人九嬪二十七世婦八十一御妻以聽天下之内治以明章天下之婦順故内和而家理天子立六官三公九卿二十七大夫八十一元士以聽天下之外治以明章天下之男教故外和而國治故曰天子聽男教后聽女順天子理陽道后治隂徳天子聽外治后聽内職教順成俗外内和順國家治理此之謂盛徳白虎通曰天子之妃謂之后何后者君也天子妃至尊故謂君也明海内之小君也漢書曰自古受命帝王及繼體守文之君非獨内徳茂也蓋亦有外戚之助焉夏之興也以塗山而桀之放也用妺喜殷之興也以有娀及有㜪而紂之殺也嬖妲己周之興也以姜嫄及太任太姒而幽王之禽也淫於褒姒故易基乾坤詩首關雎書美釐降春秋譏不親迎夫婦之際人道之大倫也漢書曰漢興因秦之稱號帝母稱皇太后祖母稱太皇太后適稱皇后妾皆稱夫人又有美人良人八子七子長使少使之號焉至武帝制媫妤娙娥傛華充依各有爵位而元帝加昭儀之號凡十四等云昭儀位視丞相爵比諸侯王媫妤視上卿比列侯娙娥視中二千石比關内侯傛華視真二千石比大上造美人視二千石比少上造八子視千石比中更充依視千石比左更七子視八百石比右庶長良人視八百石比左庶長長使視六百石比五大夫少使視四百石比公乗五官視三百石順常視二百石無涓共和娛靈保林良使夜者皆視百石上家人子中家人子視有秩斗食云五官以下塟司馬門外陵上司馬門外應邵漢官儀曰皇后稱椒房詩云椒聊之實蕃衍盈升美其繁盛以椒塗室亦取温煖除惡氣也猶天子赤泥殿上曰丹墀漢舊儀曰皇后媫妤乗輦餘皆以茵四人輿以行又曰皇后玉璽文與帝同皇后之璽金螭虎紐又曰皇后太子各食三十縣曰湯沐邑五經要義曰古者后夫人必有女史彤管之法后妃羣妾以禮御於君所女史書其日授之環以示進退之法生子月辰則以金環退之當御者以銀環進之著於左手既御著於右手左者陽也以當就男故著左手右手隂也既御而復故此女史之職也後漢書曰夏殷以上后妃之制其文略矣周禮王者立后三夫人九嬪二十七世婦八十一御妻以備内職焉后正位宫闈同體天王夫人坐論婦禮九嬪掌教四徳世婦主喪祭賔客御妻序於王之燕寢頒官分務各有典司女史彤管記功書過居有保阿之訓動有環珮之響進賢才以輔佐君子哀窈窕而不淫其色所以能述宣隂化修成内則閨房肅雍險謁不行也故康王晩朝關雎作諷宣王晏起姜氏請愆及周室東遷禮序凋缺諸侯僭縱軌制無章齊桓有如夫人者六人晉獻升戎女為元妃終於五子作亂冢嗣遘屯爰逮戰國風憲偷薄適情任欲顛倒衣裳以至破國亡身不可勝數斯固輕禮弛防先色後徳者也秦并天下多自驕大官備七國爵列八品漢興因循其號而婦制莫釐高祖帷薄不修孝文衽席無辨然而選納尚簡飾玩少華自武元之後世增淫嬖至乃掖庭三千増級十四妖幸毁政之符外姻亂邦之迹前史載之詳矣及光武明徳中興斵雕為樸定六宫稱號唯皇后貴人貴人金印紫綬俸不過粟数十斛又置美人宫人采女三等並無爵秩歳時賞賜充給而已漢法常因八月遣中大夫與掖庭丞及相工於洛陽郷中閱視良家童女年十三以上二十以下姿色端麗合法相者載還後宫擇視可否乃用登御所以明慎聘納詳求淑哲明帝聿遵先旨宫教頗修登建嬪后必先令徳内無出閫之言權無私溺之授可謂矯其弊矣向使因設外戚之禁編著甲令改正后妃之制貽厥方來豈不休哉雖御已有度而防閑未篤故孝章以下漸用色授恩隆好合遂忘滋蠧自古雖主幼時艱王家多釁必委成冢宰簡求忠賢未有專任婦人割斷重器唯秦􅇗太后始攝政事故穰侯權重於昭王家富於嬴國漢仍其謬知患莫改東京皇統屢絶權歸女主外立者四帝臨朝者六后莫不定䇿帷帟委事父兄貪孩童以久其政抑明賢以專其威任重道悠利深禍速身犯霧露於雲臺之上家嬰縲絏於圄犴之下湮滅連踵傾輈繼路而赴蹈不息燋爛為期終於陵夷大運淪亡神寳詩書所歎略同一揆魏志曰魏因漢法母后之號皆如舊制自夫人以下世有増損太祖建國始命王后其下五等有夫人有昭儀有媫妤有華傛有美人文帝増貴嬪淑媛修容順成良人明帝増淑妃昭華修儀除順成官太和中始復命夫人登其位於淑妃之上自夫人以下爵凡十二等又曰黄初三年詔曰婦人與政亂之本也自今以後羣臣不得奏事太后后族之家不得當輔佐之任又不得横授茅土之爵以此詔傳後世若有背違天下共誅之殷融議后父不應拜后曰天性之親父子之道人倫之序君臣之義性因至親故情禮無二序緣分立故尊嚴無上易曰有父子然後有君臣有君臣然後有禮義生焉故資父事君教之至也君不以貴而臣其所尊故子爵不加於父也夫以帝王之尊猶無臣妾父母之義况后從尊於帝而令父母執臣妾耶鄭𤣥復云公朝與歸寧別有二制尊卑迭用拜謁更序亦有未詳斯議為何所據晉張華女史箴曰茫茫造化兩儀始分散氣流行既陶既甄在帝庖犧肇經天人爰始夫婦以及君臣家道以正王猷有倫婦徳尚柔含章貞吉嬺婉淑慎正位居室施衿結褵虔恭中饋肅慎爾儀式瞻清懿樊姬感莊不食鮮禽衞女矯桓耳忘和音志厲義高二主易心𤣥熊攀檻馮媛趨進夫豈無畏知死不恡班姬有詞割歡同輦夫豈不懐防微慮逺道罔隆而不殺物無盛而不衰日中則昃月滿則虧崇猶塵積替若駭機人咸知其飾容而莫知其飾性性之不飾或愆於正禮容知藻克念作聖出其言善千里應之苟違斯義同衾以疑夫出言如徴而榮辱由兹勿謂幽昧靈鑒無象勿謂𤣥漠神聽無響無矜爾榮天道惡盈無恃爾貴隆隆者墜鑒於小星戒彼攸遂比心螽斯則繁爾類歡不可以極寵不可以專專實生慢愛極則遷致盈必損理有固然美者自美翻以取尤冶容求好君子所仇結恩而絶職此之由故曰翼翼矜矜福所以興靖恭自思榮顯所基女史司箴敢告庶姬後魏書曰魏氏王業之兆雖始於神元至於昭成世崇儉質妃嬙嬪御率多闕焉唯以次第為稱而章平思昭穆惠煬烈八帝妃后無聞道武追尊祖妣皆從帝諡為皇后妃立中宫餘妾或稱夫人多少無限然皆品次太武始増左右昭儀及貴人椒房等後庭漸已多矣後魏書曰後魏故事將立皇后必令手鑄金人以成者為吉不成則不得立也又太武文成保母劬勞之恩並極尊崇之義雖事乖典禮而觀過知仁北史曰周氏率由姬制内職有序文帝創基修衽席以儉約武皇嗣立節情慾於矯枉宫闈有貫魚之美戚里無私溺之尤可謂得人君之體也宣王外行其志内逞其欲溪壑難滿採擇無厭恩之所加莫限厮皂榮之所及無隔險詖於是升蘭殿以正位踐椒庭而齊體者非一人焉階房帷而施青紫緣恩倖而擁玉帛者非一族焉雖辛癸之荒淫趙李之傾城曾未足比其髣髴也人厭苛政弊事實多文帝之祀忽諸宣王特由於此隋文思革前弊太矯其過惟皇后當室旁無私寵婦官位號未詳備焉開皇二年著内官之式略依周禮省減其數煬帝時后妃嬪御無釐婦職惟端容麗飾陪從宴遊而已帝又參詳典故自製嘉名著之於令人皇后春秋命厯序洛書擿亡辟曰人皇兄弟九人別長九州離艮地精女出為之后離艮卦所推也庖犧母河圖曰燧人之世大跡出雷澤華胥履之生伏羲帝系譜曰伏羲十月四日人定生孝經河圖云伏羲在亥得人定之時神農母春秋元命苞曰女登生神農人面龍顔始為天子孝經鈎命决曰任姒感龍生帝嵬魁嵬魁神農名帝王世紀曰炎帝神農母曰任姒有奶氏女名女登少典妃遊華陽有龍首感之生神農於裳羊山娶莾水氏之女曰聽訞音妖生帝臨魁黄帝母河圖曰黄帝母曰地祇之子名附寳之郊野大電繞北斗樞星耀感附寳生軒轅帝王世紀曰黄帝有熊氏少典之子母曰附寳其先即炎帝母家有喬氏之女世與少典氏婚及神農之末少典氏又娶附寳見大霓光繞北斗樞星照郊野附寳孕二十五月生黄帝於夀丘黄帝四妃史記曰黄帝娶於西陵之女是為嫘祖嫘祖為黄帝正妃生二子其後皆有天下漢書古今表曰黄帝妃方雷氏生𤣥囂為青陽妃嫘祖生昌意妃彤魚氏生夷鼓妃嫫母生蒼林帝王世紀曰黄帝四妃生二十五子元妃西陵氏嫘祖次妃方雷氏曰女節次曰彤魚氏次曰嫫母列女傳曰黄帝妃曰嫫母於四妃之班居下貌甚醜而最賢心每自退顓頊母河圖曰瑶光之星如虹貫月正白感女樞於幽房之宫生帝顓頊史記曰昌意娶蜀山女昌僕生高陽高陽有聖徳黄帝崩高陽立是為顓頊帝王世紀曰昌意之妃謂之女樞金天氏生顓頊於弱水顓頊妃世本曰顓頊娶於勝墳氏宋忠注曰國名之子謂女禄是生老童帝系云勝奔氏餘同帝嚳四妃河圖曰慶都與赤龍合生帝堯於伊祁世紀云從母姓毛詩曰天命𤣥鳥降而生商宅殷土芒芒春秋元命苞曰周本姜嫄遊閟宫其地扶桑履大跡生后稷春秋合誠圖曰堯母慶都有名於世蓋太常之女生於斗維之野常在三阿之東南天大雷電有血流潤大石之中生慶都長大常有黄雲覆蓋之夢食不饑天帝以氣食年二十寄伊長孺家無夫出觀三阿之首常若有神隨之有赤龍負圖至署曰赤帝起成天寳即慶都之謹任之乳之必於翼之野奄然隂風雨龍與慶都合有娠龍消不見漢書云堯母十四月生堯帝王世紀搜神記同史記曰嚳娶陳鋒氏女生放勲又曰后稷棄母有邰氏女曰姜嫄為帝嚳元妃出野見巨人跡心欣然踐之身動如孕者居期而生子以為不祥棄之隘巷以為神收養之初欲棄之因名棄毛詩生民曰厥初生民時維姜嫄生民本后稷也姜姓出后稷之母配高辛氏帝焉者也史記曰殷契母曰簡狄有娀氏為帝嚳次妃見𤣥鳥遺卵簡狄取而吞之因孕生契世本曰帝嚳卜其四妃之子而皆有天下元妃有邰國之女曰姜嫄是産后稷次妃有娀氏之女簡狄是産契次妃曰陳妃是生帝堯次妃曰娵訾産帝摯帝王世紀曰娵訾班在四人下生摯最長故登帝位堯妃世本曰堯娶散宜氏子謂之女皇宋忠曰是生丹朱帝系漢書同帝王世紀曰女瑩生丹朱漢書亦云女瑩舜母河圖著命苞曰女登見大虹意感生舜於姚墟史記曰舜父瞽叟盲而舜母死瞽叟更娶妻而生象舜二妃尚書曰師錫帝曰有鰥在下曰虞舜帝曰俞予聞如何岳曰瞽子父頑母嚚象傲克諧以孝烝烝乂不格姦帝曰我其試哉女于時觀厥刑于二女釐降二女于溈汭嬪于虞帝曰欽哉禮記曰舜塟蒼梧蓋二妃未之從也山海經曰大荒之中有不庭之山帝舜妻娥皇生焉帝系曰舜娶於帝堯謂之曰女姬列女傳曰有虞二妃帝堯之二女也長曰娥皇次曰女英堯舉舜為相攝行王政舜毎事常謀於二女舜既受禪為天子娥皇為后女英為妃事瞽瞍猶若初焉天子稱二妃聰明貞仁舜陟方死蒼梧二妃死於江湘之間故謂之湘君尸子曰堯妻舜以娥皇媵之以女英離騷九歌湘夫人曰帝子降兮北渚目渺渺兮愁予帝子謂堯二女娥皇女英隨舜不及卒於湘水因名曰湘夫人也嫋嫋兮秋風洞庭之波兮木葉下夏禹母河圖著命苞曰修已見流星意感生帝文命禹周禮含文嘉曰夏姒氏祖以薏苡生孝經鈎命决曰流星貫昴紀夢接生禹世本曰鯀娶有莘氏女志是生高密禹禹妃尚書咎繇謨禹曰予娶于塗山辛壬癸甲辛日娶妻至于甲子復往治水啟呱呱而泣予弗子塗山女史記同山海經曰太室嵩高咸陽西啟母化為石焉帝王世紀曰禹始納塗山女曰女媧合婚於台桑有白狐九尾之瑞至是為攸女故連山易曰禹娶塗山之子名曰攸女生啟是也列女傳曰啟母塗山者夏禹之妃塗山氏女也禹娶四日而去治水啟既生呱呱而泣禹三過其門不入吕氏春秋曰禹行水見塗山之女禹未之遇南音南土遇以禮成之塗山之女乃令其妾往候禹於塗山之陽女作歌曰候人實始作南音也帝相后左傳曰伍貟曰昔有過澆滅夏后相后緡方娠逃出自竇后緡相妻歸於有仍緡有仍氏女生少康焉澆求之逃奔有虞虞思妻之以二姚楚辭曰迨少康之未家留有虞之二姚桀妃洛書録運法曰孔甲見逢氏抱小女妺喜帝孔甲恱之以為太子履癸妃國語曰桀伐蒙山而得妺喜紀年曰后桀伐蒙山山民進女於桀二人曰琬曰琰桀受二女無子刻其名於苕華之上苕是琬華是琰而棄其元妃於洛曰妺喜帝王世紀曰妺喜好聞裂繒之聲而笑桀為發繒裂之以順適其意列女傳曰夏桀妺喜者桀之妃也桀伐有施有施女以妺喜以女妻人曰女殷湯母河圖著命苞曰扶都見白氣貫月意感生黑帝子湯湯妃帝王世紀曰湯娶有莘為正妃列女傳曰湯妃有莘之女也擇徳高如伊尹者為之臣佐湯致王訓正後宫嬪御有序咸無嫉妬逆理之人生三子太丁外丙仲壬教誨有成太丁早卒丙壬嗣登大位帝乙妃史記曰帝乙長子曰微子啓賤不得立立少子辛辛母正后位帝王世紀曰帝乙二妃生四子長曰微子啓中微仲少曰辛庶妃生箕子初啟母之生啟及仲尚為妾及立為后乃生紂紂妃史記曰紂伐有蘇有蘇人以妲己女焉紂愛妲己惟妲己之言是從武王殺之斬以𤣥戈懸之小白旗列女傳曰妲己者殷紂之妃也紂伐有蘇有蘇女以妲己美而辯用心邪僻巧比於體臧施於貌紂好酒淫樂不離妲己所譽者貴之所憎者誅之周太王妃毛詩曰古公亶父來朝走馬率西水滸至于岐下爰及姜女聿來胥宇又曰摯仲氏任自彼殷商來嫁于周曰嬪于京乃及王季維徳之行摯國任姓史記曰古公太姜生少子季厯季厯娶太任皆賢婦人生子曰昌列女傳曰太姜者太王之妃有台之女賢而有色生太伯仲雍王季化導三子皆成賢徳太王有事必諮謀焉王季妃河圖著命苞曰太任夢長人感已生文王毛詩曰思齊太任文王之母思媚周姜京室之婦列女傳曰太任者王季之妃摯任之女也端懿誠莊維徳之行及其有娠也目不視惡色耳不聽淫聲口不出放言溲於豕牢而生文王文王生而明聖太任教以一而知其百卒為周宗君子謂太任能為胎教文王妃毛詩曰天監在下有命既集文王初載天作之合在洽之陽在渭之涘纘女維莘長子維行纘繼也莘太姒國也長子長女也篤生武王箋云太姒厚生聖子武王又曰太姒嗣徽音則百斯男論語曰武王曰予有亂臣十人馬融曰亂理也十人謂周公旦召公奭太公望畢公榮公太顛閎夭散宜生南宫括其一人謂文母也孔子曰才難不其然乎唐虞之際於斯為盛有婦人焉九人而已列女傳曰太姒者文王之妃莘姒之女也號曰文母武王妃左傳曰子産曰當武王邑姜方娠太叔杜預注曰邑姜武王后齊太公之女也懐胎為娠太叔成王之弟叔虞夢帝謂已余命而子曰虞帝天帝也虞唐君之名將與之唐屬諸參而蕃育其子孫及生有文在手曰虞遂以命之帝王世紀曰武王納太公之女曰邑姜修教於内生太叔宣王后璅語曰元妃獻后生子不完期月而生后弗敢舉王召羣吏問將棄之仲山甫曰天將以是棄周棄之何益且卜筮吉何必從乃弗棄列女傳曰周宣姜后者齊侯之女也宣王嘗早卧而晏起后夫人不出於房姜后脫簪珥待罪於永巷使其傅母通言於王曰妾之不才妾之淫心見矣至使君王失禮而晏朝以見君王之樂色而忘徳也王曰寡人不徳實自生過非夫人之罪也幽王褒后毛詩曰白華周人刺幽后也幽王娶申女以為后又得褒姒而黜申后故下國化之以妾為妻以孽為宗又曰正月刺幽王也燎之方揚寧或滅之赫赫宗周褒姒滅之國語曰夏之衰也二龍止於夏庭曰余褒之二君夏后卜殺之畱之莫吉卜請其漦而藏之吉韋昭曰龍吐沫龍之精氣也龍亡而漦在櫝而藏之三代莫發厲王之末發而觀之漦流於庭不可除王使婦人裸而譟之漦化為𤣥黿入皇后宫童妾既齔而遭之既筓而孕無夫而生子王懼而棄之宣王之時童謡曰檿弧箕服實亡周國有夫婦賣是器者王使執而戮之逃於道而見後宫童妾所棄妖子聞其啼哀而收之夫婦亡奔褒褒人有罪請入所棄女是為褒姒幽王愛之生伯服廢申后而以褒姒為后褒姒不好笑幽王欲其笑萬方不笑幽王為􅇏火有寇至則舉烽火諸侯悉至至而無寇褒姒大笑幽王恱之數為舉烽火其後不信諸侯不至西夷犬戎攻殺幽王虜褒姒史記列女傳世紀並同也列女傳曰幽王出入與褒姒同乗弋獵不時以適褒姒意秦始皇太后史記曰吕不韋所幸邯鄲美姬有娠而進之於太子楚生秦始皇是為太后說苑曰秦始皇太后不謹幸郎嫪毐封為長信侯為生兩子毒專國事浸益驕奢與侍中左右貴臣棋博飲酒爭言而鬬瞋目大呼曰吾乃皇帝之假父也窶人子何敢與我抗所與鬬者走白始皇始皇大怒毒因作亂戰咸陽宫始皇取毒四支車裂之取其兩弟囊撲殺之取皇太后遷之萯陽宫下令曰敢以太后事諫者戮而殺之闕下諫而死者二十七人茅焦乃上謁諫始皇遂以千乗萬騎自迎太后歸咸陽太后喜大置酒待茅焦及飲太后曰抗枉令直使敗更成安秦社稷使妾母子復得相㑹茅君之力也太平御覽巻一百三十五
