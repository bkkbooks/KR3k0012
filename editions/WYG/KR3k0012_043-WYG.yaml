body:
  text: 太平御覽卷四十三宋李昉等撰地部八商洛襄鄧淮蔡諸白於山商山𤣥扈山望楚山石梁山薤山峴山白馬塞山髙車山桐栢山武當山大狐山石魚山苦菜山大洪山赤岸山莫耶山雲母山濠塘山九鬬山塗山八公山蔡山玉鏡山睆山雞籠山梁山都梁山斗山臺子山長圍山白於山水經曰白於山今名女郎山上多松栢下多樗櫟其獸多㸲音作牛䍫羊鳥多白鴞洛水出于其陽東注于淮也又云洛水源出縣北白於山又曰漢水女郎山山上有女郎冢逺望山墳崔嵬狀髙及即其所裁有墳形山上直路下出不生草木世人謂之女郎道下有女郎廟及搗衣石言張魯女也商山盛𢎞之荆州記曰上洛有商山班孟堅西都賦所謂商洛緣其隈髙士傳謂地肺即此晋書曰董景道少好學恒獨居略不與世通永平中知天下將亂隠商洛山衣木皮葉食樹果彈琴歌嘯以自娛至劉曜時徴拜太常辭以壽終𤣥扈山春秋合誠圗曰黄帝遊𤣥扈上洛與大司馬容光左右輔周昌等百二十人臨之有鳯啣圖以置帝前𤣥扈山在上洛縣北一百里望楚山襄陽記曰望楚山有三名一名馬鞍山一名灾山宋元嘉中武陵王駿為刺史屢登之舊名望郢山因改為望楚山後遂龍飛是孝武望之處時人號為鳯嶺髙處有三墱即劉𢎞山簡九日賞宴之所也石梁山襄陽記曰襄州石梁山山起白雲則雨黄雲則風黑雲則人多病薤山襄陽記曰襄陽縣薤山山上有竹三年生一笋笋成竹死代謝如春秋焉峴山十道志曰羊祜嘗與從事鄒潤甫共登峴山垂泣曰自有宇宙便有此山由來賢達勝士登此逺望如我與卿者多矣皆湮滅無聞不可得知念此使人悲傷我百年後魂猶當逰此也潤甫對曰公徳冠四海道嗣前哲令聞令望當與此山俱傳若湛軰乃當如公語耳後人以州人思慕遂立羊公廟并碑於此山白馬塞山盛𢎞之荆州記曰孟達為新城太守登白馬塞山而歎曰劉封申躭據金城千里而不能守豈丈夫也為上渚吟方士今猶傳此聲韵憤激其哀思之音乎游耆云重山疊障事信然也髙車山髙士傳曰髙車山上有四皓碑及祠皆漢惠帝所立也漢髙后使張良詣南山迎四皓之處因名髙車山也桐栢山河圖括地象曰桐栢山為地穴上為維星荆州圖經曰桐栢山禹貢所謂導淮自桐柏者也其山則雲峯秀峙桐栢隂森武當山山記曰武當山區城周廽四五百里中央有一峯名曰叅嶺髙二十餘里望之秀絶出於雲表清朗之日然後見峯一月之間不見四五輕霄葢於上白雲帶其前旦必西行夕而東返常謂之朝山葢以衆山朝揖之主也又南雍州記曰武當山有石門石室相承云尹喜所棲之地又陰君傳云君字長生入武當山昇仙是也又郭仲產南雍州記曰武當山廣三四百里山髙隴峻若愽山香爐苕亭峻極干霄出霧學道者常百數相繼不絶若於此山學者心有隆替輙為獸所逐山海經曰祭水源伏流三百餘里漢武帝遣殿上將軍戴生之入此山採仙藥遂得道不返徴異傳曰厯陽謝允字道通年十五為蘇峻賊軍王免所掠賣屬東陽蔣鳯家嘗行山中見虎檻中狗竊念狗餓以飯飼之入檻方見虎攀木仰看允謂虎曰此檻本為汝施而我幾死其中汝不殺我我救汝乃開檻出虎賊平之後允詣縣别良善烏程令張球不為申理桎梏捶楚允夢見人曰此易入難出汝有慈心當與救拯囬見一少年通身黄衣遥在柵外時進獄中與允言語獄吏知是異人由此不敢枉允蒙理還都西上武當山太尉庾公聞而愍之給其糧資隨到襄陽見道士說吾師戴先生孟盛子非世間人也勑若有西上欲見我者可將來得無是君允因隨去入武當山齋戒三日進見先生乃是昔日所夢人也問允復見黄童不因賜以神藥三丸服之便不飢渴無所思欲先生亦無常處時有神雲紫氣次陰其上或聞芳香之氣徹於山谷大狐山水經註曰大胡山在泚陽縣界東三十餘里廣圓五六十里張平子西都賦所謂天封大胡者也胡一作狐南陽圖經曰此山之上有大石其狀如狐故世俗謂為大狐山也石魚山水經註曰石魚山本名立石山髙八十餘丈廣十里石色黑而理若雲母間發一重輒有魚形鱗鬐首尾有若刻畫長數寸魚形備足燒之作魚膏腥因以名之苦菜山郡國志曰苦菜山即黄城山也自葉至泚陽南北相毗連亘百里亦曰長城山即長沮桀溺耦耕處下有東流水即子路問津之所尸子云楚狂接輿耕於方城即此山也春秋曰方城以為城是也大洪山水經注曰蔡陽縣東南大洪山山在隋郡之西南竟陵之東北盤基所跨廣圓一百餘里峯曰懸釣處衆阜之中為諸嶺之秀山下有石門叠嶂層巒岩髙皆數百許仞入石門又得鍾乳穴穴上赤崖壁立非人跡所及穴中多鍾乳凝膏下垂望齊氷雪微津細液滴瀝不斷幽穴潜逺行者不窮其深而穴内常有風勢火無經久也溳水出此山之隂其初流淺狹逺乃寛廣可以浮舟栰矣時人以溳水所導故亦謂之溳山赤岸山南兖州記曰瓜歩山東五里江有赤岸山南臨江中羅君章云赤岸若朝霞即此是也濤水自海入江衝激六七里至此岸側其勢始衰郭景純江賦云鼓洪濤於赤岸莫耶山夀春圖經曰莫耶山長老傳云古者於此山鑄莫耶劒因為山名史記賈誼弔屈原篇云莫耶為鈍兮鈆刀為銛注云莫耶吳大夫姓也王僧虔吳郡地理志云吳人造劔二陽曰干將陰曰莫耶莫耶其妻名南州記曰濛水東合流千金塘源出縣西莫耶山是也雲母山夀春圗經曰雲母山一名濠上山在州東南四十里按神仙傳云彭祖服食雲母時人共傳採於此山今或有道者採取不已濠塘山夀春圗經曰濠塘山在縣南六十里有濠水出焉古老所傳岩上泉灌濠城塘故以為名山穴多出鍾乳并有蝙蝠白艾色於穴中倒懸微帶紫色居人或於九月以後二月以前採取服之頗益壽九鬭山夀春圗經曰九鬭山一謂陰陵山江表傳云項羽敗烏江取此山過漢遣灌嬰追羽兵至此一日九戰因名九鬭山今石猶有磨刀礪鏃之跡塗山應劭漢地理志曰禹娶塗山塗山有禹墟太康地記曰塗山古當塗國夏禹所娶也西南又有禹村葢禹㑹諸侯於塗山在禹貢揚州之域今九江當塗縣有禹娶之地邑界有當塗山故城存焉即漢縣後廢郡國志曰平河縣有當塗山出於荆山之左當塗之右奔流二山之間而揚濤北注也春秋左氏傳曰哀公七年諸大夫對孟孫曰禹㑹諸侯於塗山執玉帛者萬國杜預注曰塗山在夀春縣東北也余按家語曰吳伐越至㑹稽獲骨焉其節專車吳子使使問孔子孔子曰丘聞之昔禹致羣臣於㑹稽之山防風氏後至禹殺之其骨專車此為大也葢丘明親承聖㫖錄為實証矣又按劉向說苑辨物王肅叙孔子九世孫孔晁所出先世舊家語並出此事故塗山有㑹稽之名考校羣書及方土之目疑非此矣八公山水經注曰夀春縣八公山山無樹木唯重阜耳山上有淮南王劉安廟劉安王是漢髙帝之孫厲王長之長子也折節下士篤好儒學養方術之徒數十人多神仙秘法鴻寶之道忽有八公皆鬢眉皓素詣門希見閽者曰吾王好長生今先生無救衰之術未敢聞八公俄變成童王甚敬之八士並能鍊金化丹從有入無乃與安登山埋金於地白日昇天餘藥在器雞犬䑛之者俱得上昇其所昇之處踐石皆䧟入焉故山即以八公為目蔡山懐寧圖經曰蔡山出大龜尚書云九江納錫大龜即謂蔡山也玉鏡山懐寧圖經曰玉鏡山在縣北萬嵗鄉界貞元二年從晥山東面忽然爆烈皓然如玉行路逺見如鏡懸焉其年刺史吕魏聞之因山改萬嵗為玉鏡鄉其山西隅連晥山東面晥山漢書地理志曰晥山在灊山天柱峯相連其山三峯鼎峙疊障重巒拒雲概日登陟無由山經云晥山東面有激水冬夏懸流狀如瀑布下有九泉井有一石牀可容百人其井莫知深淺若天時亢旱則殺一犬投其中即降雷雨犬亦流出雞籠山厯陽圖經曰雞籠山在縣西北淮南子云麻胡初䧟之時有一老母提雞籠以登此山因化為石今山有石狀如雞籠因為名也梁山厯陽圗經曰梁山在縣南俯臨江水南之愽望山宋書云孝武帝大明七年登梁山大閲水軍于中江是日有雀二集于華葢有司奏請改元為神雀元年帝不許因立䨇闕於梁山都梁山盱眙圗經曰都梁山周廽三十里在縣南按廣志云都梁山生淮蘭草一名梁香草故以為名在楚州西南二百九里又阮羿之記云都梁山通鍾離郡廣袤甚逺出桔梗芫花等藥伏滔北征記云有都梁香草因以為名又曰大業元年煬帝創立宫都東鄰都梁西枕長淮南望岩峯北瞰城郭其中宫殿三重長廊周廽院之西又有七眼泉涌合為一流於東泉上作流杯又於宫西南淮側造釣魚臺臨淮髙峯别造四望殿其側又有曲河以安龍舟大舸枕倚淮湄索帶宫殿至十年為孟讓賊於此置營遂廢斗山盱眙圗經曰斗山周廽二十里在縣西南與都梁山相連枕淮之險峻名曰斗山臺子山盱眙圖經曰臺子山周廽一十里在縣東一里按宋書云元嘉二十七年宋將臧質引兵下造弩臺以射城中因以為名按臺子山在楚州西南是長圍山盱眙圗經曰長圍山周廽四里在縣北七里上置軍營將士一千人守之至徳二年節度使髙道置按宋書云元嘉二十七年宋文帝遣臧質拒魏太武帝遂於梁山築長圗城造浮橋絶水路即此山又改為長圍山當在楚州西南一百八十里太平御覽卷四十三
