body:
  text: 太平御覽卷九百五十一宋李昉等撰蟲豸部八蚤虱蟣螕蟭螟蛕叩頭食屍蟯蜕蛾蛹蛓蟥蛢班猫地膽蛤蚧龎降蛆蚤焦贑易林萃之大過曰亂頭多憂蚤虱生悲臈夫仲我使我無聊説文曰蚤齧人跳䖝也韓子曰子韋見孔子於商太宰曰吾見孔子則視子猶蚤虱之細者也今吾見之於君子韋恐孔子貴於君因謂太宰曰且君之己見孔子亦將視子猶蚤虱太宰弗復見也又曰韓昭侯搔而佯亡一蚤求之甚急左右因取其蚤虱而殺之昭侯以此察左右不誠也淮南子曰昌羊去蚤虱而人弗席者為其來蛉窮也又曰釋大道任小技無異使蟾蜍捕蚤論衡曰人在天地之間猶蚤虱之在衣裳螻蟻之在穴隙也趙壹解擯賦曰丹鴻可殺蚤也抱朴子曰蚤虱羣攻卧不獲安曹植論曰孟春之旦從太陽方貴放鳥雀者加其禄也得者莫不馴而放之為利人也得蚤者莫不摩之齒牙為害身也齊卞士蔚虱序曰余居貧布衣十年不製一袍之緼有生所託資其寒暑莫與易之身既多病起居甚踈縈寝敗絮不能自釋兼復懈惰嬾事皮膚澡刷不謹澣沐失時四體㲰㲰乃耕切加以臭穢故葦蓆蓬纓之間蚤虱獧流探揣獲撮日不替手虱蟣説文曰虱齧人䖝也蟣虱子也漢書曰項羽謂宋義曰疾引兵渡河破秦必矣義曰不然夫摶牛之䖟不可以破蟣虱又曰王莽校尉韓威進曰以新室之威而吞胡虜無異口中蚤虱東觀漢記曰馬援擊㝷陽山賊上書曰除其竹木譬如嬰兒頭多蟣虱而剃之蕩蕩然蟣虱無所復依書奏上大悦因出小黄門頭有虱者皆剃之續晉陽秋曰咸陽王猛被緼袍而詣桓温面談當時之事猛捫虱而言旁若無人温察而竒之齊書曰江泌性仁義衣弊虱多綿裹置壁上恐虱飢死乃置衣中數日終身無復虱又曰卞彬為南康郡丞彬頗飲酒擯棄形骸仕既不遂乃著蚤蟣䖝蝦蟇等賦大有指斥三國典畧曰梁劉慤常有飛書謗毁梁主怒曰劉慤似衣中虱必須搯音恰之北史曰司馬子如以賄在獄勅岀後神武見之哀其憔悴以袂承其首親擇虱賜酒百瓶羊五百口糧米五百石子如曰無事尚被囚幾死若受此豈有生路也列子曰紀昌學射於飛衛使學視小如大紀昌乃懸虱於牖南面而望之二年之後如車輪焉以覩餘物皆丘山也乃以燕角之弧孤蓬之簳射之貫虱之心而懸不絶以吿飛衛飛衛曰汝得之矣荘子曰孺需者豕虱是也擇處疏鬛自以為廣宫大囿奎蹄曲限乳間股脚自為安室利處不知屠者一旦布操烟火與豕俱焦韓子曰天下無道攻擊不已甲胄生蟣虱燕雀處帷幄而兵不歸故曰戎馬生郊又曰應侯謂秦王曰王得宛林東陽下㫁河内臨東陽邯鄲猶口中虱也又曰三虱食彘相與訟一虱遇之曰奚訟三虱曰争肥饒也一虱曰若爾不患臘之将至而烹之也躁自若有奚患於是乃相與聚其身而食之彘痩人乃不殺淮南子曰牛馬之氣蒸不能生虱虱之氣蒸不能生牛馬故化生於外非生於内也又曰湯沐具而蟣虱相弔大厦成而鷰雀相賀抱朴子曰夫虱生于我我非虱之父母虱非我之子孫也又曰眼能察天衢而不能周項領之間耳能聞雷霆而不能周蟣虱之音也又曰今頭虱着身皆稍變而白身虱着頭皆漸化而黑則𤣥素果無定質移易在乎所漸也苻子曰齊魯争汶陽之田魯侯有憂色魯有隠者周豐往見曰臣嘗晝寢愀然有羣虱之鬭乎衣中甘臣膏腴之肌珍臣項膂之膚相與樹黨争之日夜不息相殺者大半虱父止之曰我與爾所慮不過容口奚用竊争交戰為哉羣虱止今君以七百里地為君臣謂亦已足矣而以汶陽數歩之田惑君之心曾不如一虱之知竊為君羞之魯侯曰善語林曰顧和為揚州從事月旦當朝未入停車州門外須臾周侯已醉着白袷慿兩人來詣丞相歴和車邉和先在車中覔虱夷然不動周始見遥過去行數歩復又還指顧心問曰此中何所有顧擇虱不輟徐徐應曰此中最是難測地風俗通畧曰河南趙仲讓為梁冀從事郎中冬月坐庭中向日解壊裘捕虱襄城君使推問之冀笑曰此我從事絶髙士也楊偉時務論曰夫清八荒者不咀蟣虱也神異經曰西荒之中有人焉長短如人著百結敗衣手足虎爪名獏偽伺人眠輟往就人欲食人腦先使捕虱得卧而舌出盤地丈餘聞其聲當燒火石伺其得卧舌出以石投舌上于是低頭絶氣而死異苑曰太叔廣頭上不得有虱大者便遭朞䘮大功小則小功緦服劉義慶宣驗記曰晉義熈中京師長年寺道人惠祥與法向連堂夜四更惠遥喚向暫來往視祥手交于胸上足挺直云可解我手足繩曰上並無繩也祥因得轉動云向有人衆縳我手足鞭捶交下問何故齧虱語祥若更不止當入両間磕之祥後㣲戒于虱餘無精進相牛經曰治牛虱當用苦梗生魚汁漬土底苦酒和塗之夢書曰夢梳篦為憂解也其髪滑澤心泰也蟣虱盡去百病愈也蟣虱為憂嚙人身也夢見蟣虱有憂至也揚雄長楊賦曰鞮鍪生蟣虱介胄被霑汗趙壹作非草書曰俯而擇虱不暇見地仰而觀鍼不暇見天天地至大而不見者鋭精于鍼虱也魏文帝與王朗書曰蚤虱雖細虐於安寝鼷䑕至㣲猶毁郊牛也嵇康養生論曰夫虱處頭而黑麝食栢而香又與山濤書曰危坐一時髀不得揺性復多虱爬搔無已而當襲以章服揖拜上官三不可堪也螕邉奚切字林曰螕齧牛䖝也蟭螟晏子春秋曰景公問晏子曰天下有極細乎對曰東海有䖝生于蚊睫在乳而兆蚊不為驚臣嬰不知其名東海耆老命曰蟭螟列子曰江浦之間生麽細麽也䖝其名曰蟭螟羣飛而集蚊睫不相傷也棲宿去來蚊不覺也離朱子羽方晝昻首揚眉而望之弗見其形抱朴子曰蟭螟屯蚊眉之中而笑彌天之大鵬寸鮒遊牛蹄之涔不貴横海之巨鱣也蛕音囿説文曰蛕蠖中長䖝也叩頭異苑曰有䖝形色如大豆呪令叩頭又使吐血皆從所教如是請放稽顙輒七十而有聲故俗呼為叩頭也傅咸叩頭䖝賦序曰叩頭䖝䖝之㣲細者然教之輙叩頭人以其叩頭傷之不祥故莫之害也食屍裴氏廣州記曰林任縣有甲䖝嗜臭肉人死亦食盡紛紛滿屋非可驅殺博物志曰景初中蒼梧刺史至京師云廣州西南數郡人病将死便有飛䖝状如麥集舍人死便食不可㫁絶惟殘骨在便去以辛板為噐則不集蟯音饒説文曰蟯蝮中短䖝也史記曰臨淄汜里女子薄吾病甚衆醫皆以為寒熱篤當死不治淳于意診其脉曰蟯瘕蟯瘕為病腹大上膚黄循之戚戚然意飲以芫華一撮即出蟯可數升病已三十日如故淮南子曰天下物莫不資於水澤及蛟音蚊蟯而不求報蜕廣雅曰復育蜕也論衡曰蟬生于復育開背而出蛾詩曰螓首蛾眉爾雅曰蛾羅也漢書曰建始元年春三月上幸雍祠五畤秋八月有白蛾羣飛蔽日從東都門至軹道宋書曰傅亮見少帝失德常懐憂懼直宿禁中睹夜蛾赴燭作感物詩以寄意焉王子年拾遺記曰有谷将子學道者也言於燕昭王曰西王母尋來必語虛􅎵之術不踰一年王母果至與昭王遊於燧林之下談炎帝鑽火之術取綠桂之膏然以照夜忽有飛蛾銜火狀如丹雀來拂于桂膏之上蛾出於員丘之穴郭子横洞㝠記曰武帝既躭於靈修得丹豹之髓白鳳之膏磨青錫為屑以淳蘇油和之照於神壇夜暴雨火不㓕有霜蛾如蜂赴燈使者舉麟鬚之拂以驅之列仙傳曰園客濟陽人種五色香草服食其實一旦有五色蛾止其上収其香而為之生繭焉苻子曰不安其昧而樂其明猶飛蛾赴燈而亡者也崔豹古今注曰飛蛾善拂燈一名慕光廣志曰有蠶蛾凡草木䖝以蛹化為蛾甚衆任昉述異記曰楚荘王宮人一旦化為野蛾而飛去夢書曰蛾為婦女眉儇也夢見蛾者憂婚也白澤啚曰赤蛾兩頭而白翼者龍也殺之立死也支曇諦火蛾賦曰悉逹有言愚人貪財如蛾投火誠哉斯言信而有徵鮑明遠飛蛾賦曰仙人司闇飛蛾候明靈均舛化詭態齊生觀生齊而態詭各㑹性以慿方觸焦烟之浮景赴熈爛之明光託身幽草下畢命君子堂本輕死以觸焰得縻㒹其何傷豈若南山之文豹避霧雨而巖藏也蛹爾雅曰螝蛹也郭璞曰蠶蛹也説文曰螝蛹也讀若潰蛹繭䖝也韓子曰䖝有螝者一身兩頭争食相齧也遂殺已人臣争事兵亡國者皆螝類也蛓七賜切爾雅曰蜭户威切毛蠧即蛓墨蛅如占切蟴音斯蛓屬今八月有螫䖝説文曰蛓毛䖝也讀若笥蜭毛蠧也蟥蛢上黄下并爾雅曰蚑符蟥蛢郭璞曰甲䖝也大如虎頭緑色江東呼蟥蛢孫炎曰翼在甲裏説文曰蛢􅛔音聿蟥也以翼鳴者也班猫本草經曰班猫一名龍尾味寒生谷中吳氏本草經曰班猫一名班蚝一名龍蚝一名斑菌一名勝髮一名晏清神農辛岐伯鹹桐君有毒扁鵲甘有大毒河内川谷或生水内地膽廣雅曰地膽地中青蠵也本草經曰元青春食芫葉故云元青秋為地膽地膽黑頭赤尾味辛有毒主䖝毒風蛀秋食葛華故名之為葛上亭長吳氏夲草經曰地膽一名元青一名杜龍一名青虹陶洪景本草經曰地膽味辛寒有毒一名元青一名青蛙眞者出梁州狀如大螞蟻有小翼子偽者即是班猫所化狀如大豆大都治體畧同必不能眞此亦可用蛤蚧嶺表録異曰蛤蚧首如蝦蟆背有細麟如蠶子土黄色身短尾長多巢於樹中端州子墻内有巢於㕔署城樓間者暮則鳴自呼蛤蚧或云鳴一聲是一年者里人採之鬻於市為藥能治肺疾醫人云藥力在尾不具者無功龎降嶺表録異曰龎降生於山野多在橄欖樹上形如蜩蟬腹青而薄其聲業其鳴自呼為龎降但聞其聲採得者鮮矣人以善價求之以為媚藥蛆梁書曰王琳敗後入齊為特進侍中所居屋脊無故剥破出赤蛆無數落地化為血蠕動又曰元帝時安城人劉敬躬於田間得白蛆化為金龜将銷之龜生光照室敬躬以為神而禱之祈請多驗遂謀作亂帝命都督王僧辯討捕之後魏書曰宣武遐昌三年章武王熈為相州刺史有蛆生於庭俄而反伏誅廣五行記曰北燕馮䟦太平二十一年三月蛆觸地而生月餘䟦為弟洪所殺又曰唐來俊臣性殘忍貪淫縱暴自恣制獄數年家積巨萬凡所殺戮不可勝計俊臣家婢生一塊肉大如二升椀剖之有赤蛆升餘須臾皆變為蜂螫人而去太平御覽卷九百五十一
