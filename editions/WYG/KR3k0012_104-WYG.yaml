body:
  text: 太平御覽卷一百四宋李昉等撰皇王部二十九後魏敬宗孝莊皇帝節閔皇帝廢帝安定王孝武皇帝文皇帝廢帝恭皇帝東魏孝静皇帝敬宗孝莊皇帝後漢書曰敬宗孝莊皇帝諱子攸彭城王勰勰音恊之第三子母曰李妃肅宗初以勰有魯陽翼衛之功封帝武城縣開國公㓜侍肅宗於禁内及長丰神秀慧姿貌甚美拜中書侍郎城門校尉兼給事黄門侍郎雅為肅宗所親待長直禁中遷㪚騎常侍御史中尉孝昌二年八月進封長樂王厯位侍中中軍將軍及武泰元年春二月肅宗崩大都督爾朱榮將兵向京師謀欲廢立以帝家有忠勲且兼人望隂與帝通榮乃帥衆來赴夏四月帝與兄弟夜北渡河㑹榮於河陽南濟河即位以兄彭城王邵為無上王弟霸城公子正為始平王榮為侍中都督内外諸軍事大將軍尚書令領軍將軍領左右衛封太原王百僚相率有司奉璽綬備法駕奉迎於河梁車駕巡河西至陶渚榮以兵權在已遂有異志乃害靈太后及㓜主次害無上王劭始平王子正公卿以下二千餘人列騎衛帝遷於便幕車駕入宫御太極殿大赦天下改武泰為建義元年是月汝南王恱北海王顥臨淮王彧前後奔蕭衍郢州刺史元願達據城叛五月加大將軍爾朱榮北道大行臺以尚書右僕射元羅為東道大使征東將軍光祿勲元欣副之廵方黜陟先行後聞大將軍爾朱榮還晉陽帝餞於邙隂六月通直散騎常侍高乾邕及弟等率流民起兵於齊州之太原頻敗州軍詔東道大使元欣喻旨乃降是月葛榮飢使其僕射任褒帥車三萬餘乗南冦至沁州豳州平北府主簿河間邢杲帥河北流民十餘萬户反於青州之北海自署漢王年號天統詔諸有􅀻馬仗従戎者職人優兩大階詔當親御六戎掃清燕代大將軍太原王爾朱榮帥精銳十萬為左軍上黨王天穆總衆八萬為前軍司徒公陽春勒兵十萬為右軍司空公穆紹統率八萬為後軍是月葛榮衆退屯相州之北七月齊獻武王於鄴西北招慰葛榮别帥稱王者七人衆萬餘降之加大將軍爾朱榮柱國大將軍錄尚書事光州人劉舉聚衆數千反於濮陽自稱皇武大將軍是月髙平鎮人万俟墨其二音醜奴僣大位置百官八月葛榮帥衆圍相州九月詔太尉公上黨王天穆討葛榮次於朝歌以征東將軍齊州刺史元欣為沛郡王柱國大將軍爾朱榮率騎七千討葛榮於滏口破擒之餘衆悉降冀定滄瀛殷五州平大赦天下改為永安元年以柱國大將軍太原王爾朱榮為大丞相都督河北畿外諸軍事冬十月蕭衍以北海王顥為魏主年號孝基入據南兖之銍城二年夏四月上黨王天穆齊獻武王大破邢杲於齊州之濟南杲降送京師五月元顥克梁國内外戒嚴癸酉元顥䧟滎陽甲戌夜車駕北巡幸河内丙子元顥入洛戊寅太原王爾朱榮㑹車駕於長子即日反斾上黨王天穆北渡河會車駕于河内秋七月都督爾朱兆賀拔勝於硤石夜濟破顥子冠爰及安豐王延明軍元顥敗走車駕入居華林園昇大夏門大赦天下宴勞天柱大將軍爾朱榮上黨王天穆及北來諸將於都亭出宫人三百繒錦雜綵數萬疋頒賜有差三年春三月雍州刺史爾朱天光討醜奴蕭寳寅於安定破擒之囚送京師六月嚈噠國獻獅子九月天柱大將軍爾朱榮上黨王天穆自晉陽來朝帝殺榮及天穆於明光殿大赦天下遣武衛將軍奚毅前燕州刺史侯淵帥衆鎮北中是夜左僕射爾朱世隆榮妻鄉郡長公主帥榮部曲焚西陽門出屯河隂攻河橋擒毅等屠害之據北中城南逼京邑十月通直散騎常侍假平西將軍都督李苗以火船焚河橋爾朱世隆退走壬寅爾朱世隆亭建興之髙都爾朱兆自晋陽來㑹之共推太原太守行并州刺史長廣王曄為主大赦所部年號建明十二月爾朱兆等冦丹谷都督崔伯鳯戰殁都督羊文義史五龍降兆大都督源子恭奔退爾朱兆爾朱度律自當平津上率騎涉渡以襲京城事出倉卒禁衛不守帝步出雲龍門逼帝幸永寕之佛寺殺皇子亂兵殺司徒公臨淮王彧僕射范陽王誨戊申元曄大赦天下爾朱度律自鎮京師爾朱兆遷帝於晉陽崩於城内三級佛寺時年二十四中興二年諡為武懐皇帝太昌元年又諡孝莊皇帝廟號敬宗塟静陵節閔皇帝後魏書曰節閔皇帝諱恭字修業廣陵恵王羽之子也母曰王氏帝少端謹有制度長而好學事祖母嫡母以孝聞正始中襲爵延昌中拜通直㪚騎常侍正光三年加散騎常侍領給事黄門侍郎以元義擅權遂稱疾不起久之因託瘖病五年就除金紫光祿大夫建義元年除儀同三司既絶言垂將一紀居於龍華佛寺無所交通永安末有白莊帝者言王不語將有異圖民間逰聲又云有天子之氣王懼禍逃匿上洛尋見追攝執送京師拘縶多日以無狀獲免及莊帝崩爾朱世隆以元曄踈逺又非人望所推以王潜嘿晦身有過人量將謀廢立恐實不語乃令王所親申其意旨且兼迫脅王遂答曰天何言㢤世隆等大恱春三月曄進至邙南世隆等奉王東郭之外行禪讓之禮太尉公爾朱度律進璽綬衮冕之服及就輅車百官侍位入自建春雲龍門昇太極殿前羣臣拜賀禮畢遂登閶闔門詔大赦天下以魏為大魏改建明二年為普泰是月幽州刺史劉靈助起兵於薊撫軍將軍金紫光祿大夫兼侍中河北大史髙乾邕及弟平北將軍通直㪚騎常侍髙敖曹率衆夜襲冀州執刺史元嶷魚力切共推前河南太守封隆之行州事三月封長廣王為東海王頴州王爾朱兆為天柱將軍晉州刺史平陽郡開國公髙歡封渤海信都王夏四月詔有司不得復稱偽梁罷細作之條無禁鄰國還往髙歡以爾朱逆亂始興義兵於信都西定殷州斬其刺史爾朱羽生命南趙郡太守李元忠為刺史鎮廣河八月追尊皇考為先帝皇妣為先大妃封皇弟永業為髙宻王皇子一恕為青州渤海王既而髙歡推立安定王為帝於信都二年三月髙歡敗爾朱天光等於韓陵夏四月髙歡使魏蘭根慰喻洛邑且觀帝之為人蘭根忌帝雅徳還致毁謗竟從崔陵橋議廢帝於崇訓佛寺而立平陽王脩是為孝武帝五月帝遇弑殂於門下外省時年三十五孝武帝詔有司赴㑹大鴻臚監䕶事塟用王禮加以九旒鑾輅黄屋左纛班劍百二十人後西魏追諡節閔皇帝後廢帝安定王後魏書曰後廢帝諱朗字仲哲章武王融第三子也母曰程氏帝少稱明悟永安二年為泗州魯郡王後軍府司馬元曄之建明二年正月為冀州渤海太守及髙歡起義兵將誅暴逆乃推戴之冬十月即皇帝位於信都西升壇柴燎大赦稱中興元年以髙歡為侍中丞相都督中外諸軍事大將軍錄尚書大行臺増邑三萬户以兼侍中撫河北大使髙乾邕為侍中司空以前平北將軍通直散騎常侍髙敖曹為驃騎大將軍儀同三司冀州刺史以終其身十二月髙歡率師攻鄴城二年春正月拔鄴城擒刺史劉誕二月髙歡為大丞相柱國大將軍太師増邑三萬户并為六萬户三月齊文襄王起家為驃騎大將軍儀同三司車駕幸鄴閏月爾朱天光北度律仲逺等屯於洹水之南髙歡出屯紫陌爾朱兆率輕騎三千夜襲鄴城中西門不克退走髙歡大破爾朱天光等四胡於韓林前廢帝鎮軍將軍賀拔勝徐州刺史杜徳於陣降爾朱兆走并州仲逺奔東郡天光度律將赴洛陽大都督解斯椿賈顯智倍道先還夏四月椿等懼罪自劾尋擒天光度律於河橋西北大行臺長孫雅都督賈顯智率騎入京師執爾朱世隆彦伯斬於都衛口送天光度律於髙歡爾朱仲逺奔蕭衍車駕至河陽仍遜於别邸大昌元年五月封安定郡王邑萬户後以罪殂於門下省時年二十永熙二年塟鄴西南野馬岡孝武皇帝後魏書曰孝武皇帝諱脩字孝則廣平武穆王懐之第三子母曰李氏帝性沉厚少言好武事始封汝陽縣公拜通直㪚騎侍郎轉中書侍郎建義初除㪚騎常侍尋遷平東將軍兼太常卿又為鎮東將軍宗正卿永安三年封平陽王普泰初轉侍中鎮東將軍儀同三司兼尚書右僕射又加侍中尚書左僕射中興三年夏四月安定王自以踈逺未允四海之心請遜大位齊獻武王髙歡與百僚㑹議僉謂髙祖不可無後乃共奉王戊子即位於東郭之外入自陽雲龍門御太極前殿羣臣朝賀禮畢升閶闔門大赦天下改中興三年為大昌元年帝以世易復除齊獻武王為大丞相大將軍大將軍還鄴車駕餞别於乾脯山殺大司馬汝南王悅大赦天下改大昌為永興以同太宗時號尋改為永熙二年春正月車駕幸崧髙石窟靈岩寺十二月車駕狩於嵩陽遂幸温湯車駕還宫三年春二月壬子大赦壬午封左衛將軍元斌之為頴昌王夏四月癸丑日有蝕之五月丙戌置勲府庶子廂别六百人騎官廂别二百人閤内部曲數千人帝内圖髙歡乃以斛斯椿為領君使與王思政等統之以為心膂軍謀朝政咸决于椿分置督將及河南闗西諸刺史辛夘下詔戒嚴揚聲伐梁實謀北討七月己丑帝總六軍率南陽王寶炬清河王亶廣陽王湛斛斯椿以五千騎宿於瀍西楊王别舍沙門都維那惠臻負璽持千牛刀以從有牛百頭盡殺以食軍士衆知帝將出其夜亡者過半清河廣陽二王亦逃歸略陽公宇文泰遣都督駱超李賢和各領數萬騎赴超先至甲戌賢和㑹帝於崤中己酉髙歡入洛遣婁昭及河南尹元子思領左右侍官追帝請廻駕髙昻率勁卒及帝於陜西帝揚鞭長騖至湖城飢渇甚有王思村人以麥飯壺漿獻帝帝甘之復一村十年帝至椆桑潼闗大都督毛洪賓迎獻食八月宇文泰遣大都督趙貴梁禦甲騎二千來赴乃奉迎帝過河謂禦曰此水東流而朕西上若得重謁洛陽廟是卿等功也帝及左右皆流涕宇文泰迎帝於東陽帝勞之將士皆呼萬嵗遂入長安以雍州公廨為宫大赦甲寅髙歡推司徒清河王亶為大司馬承制總萬機居尚書省歡追車駕至潼闗九月己酉歡東還洛陽帝親督衆攻潼闗斬其行臺華長瑜冬十月髙歡推清河王亶子善見為主徙都鄴是為東魏魏於此始分焉二十二日帝崩時年二十五諡曰孝武塟雲陵文皇帝後魏書曰文皇帝諱寳炬孝文皇帝之孫京兆王愉之子也母曰楊氏帝正始初生以父罪兄弟皆幽宗正寺及宣武崩乃得雪正光中拜直閣將軍時胡太后嬖寵帝與明帝謀誅之事泄免官武泰中封邵縣侯永安三年追封南陽王孝武即位拜太尉加侍中永熙二年進位太保開府尚書令三年孝武與髙歡搆難以帝為中軍四面大都督及従入闗拜太宰錄尚書事孝武崩丞相洛陽公宇文泰率羣公卿士奉表勸進三讓乃許焉大統元年春三月戊申帝即位於西城大赦改元追尊皇考為皇帝皇妣楊氏為后己酉進丞相洛陽公宇文泰都督中外諸軍錄尚書事大行臺改封安定郡公以尚書令斛思椿為太保廣平王賛為司徒乙夘立妃乙氏為皇后二年春正月辛亥祀南郊改以神元皇帝配東魏攻䧟夏州三年冬十月安定公宇文泰大破東魏軍於沙苑拜泰柱國大將軍四年春正月辛酉拜天於清輝室終帝世遂為常二月東魏攻䧟南汾頴豫廣四州廢皇后乙氏三月立蠕蠕而蠢切女郁九閭氏為皇后大赦秋七月東魏將侯景等圍洛陽帝與安定公宇文泰東伐九月帝至自東伐五年冬十月於陽武門懸鼓置紙筆以求得失六年春正月庚戌朝羣臣自西遷至此禮樂始備七年十二月御慿雲觀以見諸王叙家人之禮手詔為宗戒十條以賜之八年春三月初置六軍十六年五月東魏静帝遜位於齊秋七月安定公宇文泰東伐至恒農齊師不出乃還九月大赦十七年春正月庚戌帝崩於乾安殿年四十五塟於永陵諡曰文皇帝廢帝後魏書曰廢帝名欽文皇帝之長子也母曰乙皇后大統元年正月乙夘立為皇太子十七年三月即皇帝位二年秋八月大將軍尉遲逈克成都劍南平冬十一月安定公宇文泰殺尚書元烈三年正月安定公宇文泰廢帝而立齊王廓帝自元烈之誅有怨言淮安王育廣平賛等並垂泣諌帝不聽故及於辱恭皇帝後魏書曰恭皇帝諱廓文帝之第四子也大統十四年封為齊王廢帝三年五月即皇帝位改元十一月魏師滅梁戕士良切梁元帝梁之諸臣復立泰元帝子方知為皇帝都于建業三年春正月丁丑初行周禮建六官以安定公宇文泰為太師冢宰以柱國李弼為大司徒以趙貴為太保兼宗伯以尚書令獨孤信為大司馬以于謹為大司㓂以侯莫陳崇為大司空冬十月乙亥安定公宇文泰薨十二月庚子帝遜位於周周閔帝元年正月東魏封帝為宋公尋殂東魏孝静皇帝後魏書曰孝静皇帝諱善見清河文宣王亶之世子也母曰胡妃永熙二年拜通直㪚騎常侍秋八月為驃騎大將軍開府儀同三司孝武帝既入闗渤海王髙歡奉迎不克乃與百僚會議推帝以奉肅宗之後時年十一冬十月即位大赦天下改永熙三年為天平元年有事於太廟下詔曰安土能遷自古之明典所居靡定徃昔之成規是以殷遷八城周卜三地吉㓙有數隆替無常事由於通變理出於不得已故也髙祖孝文皇帝仰觀乾象俯恊人謀發自武州來幸嵩縣魏雖舊邦其命維新及正光之季國步孔棘喪亂不已冦賊相侵禆我生民無所措手今逺遵古式深騐時事考龜襲吉遷宅漳滏庶克隆洪基再昌寳厯主者明為條格及時發邁車駕北遷詔渤海王髙歡留後部分以衛軍大將軍尚書令元弼為驃騎大將軍儀同三司洛州刺史鎮洛陽十一月車駕至鄴是冬蕭衍以元慶和為鎮北將軍魏王入據平瀨鄉孝武崩於長安二年春正月渤海王髙歡襲擊山胡劉彛升大破之詔以髙歡為相國假黄鉞劍履上殿入朝不趨王固讓不受三月髙歡討劉彛升斬之彛升子髙海王復僣帝號歡進擊破擒之及其弟西海王皇后夫人王公以下四百餘人幷獲逋逃之民二萬餘户八月發衆七萬六千人營新宫十二月車駕待於鄴是嵗西魏文帝大統元年三年春正月詔加渤海王世子澄使持節尚書令大行臺大都督秋七月大赦天下四年夏四月遷七帝神主入新廟大赦天下通使蕭衍冬十一月西魏遣其大行臺元帥李海大都督獨孤信願逼洛州行軍事廣陽王湛棄城退還李海信願遂據金墉潁川長史賀若徽執刺史田迅西叛引西魏都督梁迴據城西魏又遣其都督趙繼宗右丞韋孝寛等攻䧟豫州元象元年春正月有巨象至自碭郡陵中南兖州獲送于鄴大赦改年大都督賀拔仁攻西魏南汾州拔之率豫州刺史堯雄等與大行臺侯景司徒髙敖曹大都督万俟受洛于等於北豫相㑹俱討潁州梁迴等棄城遁走潁州平秋七月行臺侯景司徒髙敖曹圍西魏將獨孤信願於金墉城八月大敗西魏於河隂司徒髙敖曹儀同三司大都督李猛宗顯並戰没西魏留其長孫子彥守金墉渤海王髙歡濟河子彥棄城走興和元年五月納皇后髙氏大赦天下秋七月詔渤海王髙歡為相國錄尚書事大行臺固辭相國乃允是月發畿内民夫十萬人城鄴城四十日罷十一月以新宫成大赦改元二年春正月徙新宫大赦天下三年冬十月詔羣臣於麟趾閣議新定班制頒於天下發夫五萬人築漳濱堰四年夏四月渤海王髙歡請令百官月一面敷政事明揚側陋納諫屛邪親理獄訟武定元年春正月大赦改年車駕蒐於邯鄲之西山三月渤海王髙歡討宇文黒獺於印山大破之擒西魏臨洮王森蜀郡王榮宗江夏王昇鉅鹿王闡譙郡王亮追奔至􅁪農而還豫洛二州平二年正月渤海王髙歡請在幷州置晉陽宫以處配沒之口三月渤海王世子髙澄為大將軍五年春正月渤海王髙歡薨於晉陽司徒侯景反潁州刺史司馬世雲以城附之景入據潁城誘執豫州刺史髙元成廣州刺史暴顯等司空韓軌驃騎大將軍儀同三司賀拔仁驃騎大將軍儀同三司可朱渾道元左衛將軍劉豐等率衆討之景乃遣使降於西魏請師救援西魏遣使將李景和王思政帥騎赴之思政等入據潁州景乃出走豫州侯景復背西魏歸於蕭衍蕭衍署景河南大將軍承制六月司徒韓軌司空可朱渾道元等自潁州班師大將軍髙澄迎勞於石濟髙澄還晉陽秋七月以大將軍髙澄為使持節大丞相都督内外諸軍事錄尚書行大行臺渤海王九月蕭衍遣其兄子貞陽侯淵明率衆㓂徐州堰泗水于寒山以灌彭城冬十月以尚書左僕射慕容紹宗為東南道行臺與驃騎大將軍儀同三司大都督髙岳潘相樂討淵明十一月大破之擒淵明及其二子六年正月大都督髙岳等戰於渦陽大破侯景俘斬五萬餘人溺於渦水水為之不流景走淮南冬十月侯景濟江推蕭衍子臨賀王正徳為主以攻建業七年蕭衍弟徐州刺史中山侯蕭正表以鍾離内屬三月侯景尅建業還以蕭衍為主衍弟子北襄州刺史定襄侯蕭祗湘潭侯蕭退來降夏四月詔渤海王髙澄讃拜不名入朝不趨劍履上殿是月侯景殺蕭衍立子綱為主六月尅潁州擒西魏大將軍尚書左僕射東道大行臺太原郡開國公王思政潁州刺史皇甫僧顯及戰士男女數萬口八月盗殺渤海王髙澄甲午太原公髙洋如晉陽八年春正月帝為渤海王髙澄舉哀於東堂詔太原公髙洋嗣事二月進爵為齊王夏五月詔齊王為相國總百揆進九錫以齊國太妃為王太后詔歸帝位於齊王即日遜居别宫齊天保元年封中山王二年冬十月殂時年二十八諡曰孝静皇帝塟於漳西山岡太平御覽卷一百四
