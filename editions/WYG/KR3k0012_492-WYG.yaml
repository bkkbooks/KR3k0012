body:
  text: 太平御覽卷四百九十二宋李昉等撰人事部一百三十二貪虐貪釋文曰貪探也探取入他分也説文曰貪欲物也毛詩曰碩䑕國人刺其君重歛蠶食於民不脩其政貪而畏人若大䑕也又曰伐檀刺貪也在位貪鄙無功而受禄君子不得進仕又曰大風有隧貪人敗類禮曰用人之仁去其貪左傳曰楚荘王欲納夏姫巫臣曰不可君召諸侯以討罪今納夏姫貪其色也貪色為淫淫為大罰又曰穆叔見孟孝伯語之曰趙孟将死矣其語偷大夫多貪求欲無厭齊楚不足與也又曰楚子在申召蔡靈侯靈侯徃蔡大夫曰貪而無信唯蔡是憾今幣重而言甘誘我也又曰楚文王謂申侯曰貪利而無厭予取予求不汝疵瑕又曰昔有仍氏生女甚美樂正后夔取之生伯封實有豕心貪惏無厭忿類無期謂之封豕論語曰季氏富於周公求也為之聚歛而附益之子曰非吾徒也小子鳴鼓而攻之可也周書曰清明之日田䑕化為鴽不化國貪殘又曰今爾執政小子惟以貪諛事主不勤德以備難史記曰宋義令於軍中曰狠如羊貪如狼强不可使者皆斬之又曰范増説項羽曰沛公居山東貪於財貨好美姬今入闗無所取志大不在小也又曰魏文侯問吳起何如人李克曰吳起貪而好色然用兵司馬穰苴弗能過也東觀漢記曰馬援平交趾上言太守蘇定張眼視錢䁋呼牒切目計賊怯於戰功宜加切勑後定果下獄續漢書曰侯參為益州刺史有豐富者輙誣以大逆皆誅滅之没入財物太尉衷奏參檻車徴於道自殺京兆尹袁逄於旅舍閲參輜重三萬餘斤兩皆金銀珍玩不可勝數又曰陽仁字文義闗中人後辟司徒桓虞府掾有宋章者貪而不法仁終不與交言同席時人畏其節魏畧曰文裴字文侯初隨太祖太祖以斐鄉里特饒愛之斐性好貨數犯法輙得原宥為典軍校尉太祖征吳斐隨行以家牛羸私易官牛太祖謂左右曰我非不知譬如人家有盗狗而善捕䑕盗狗雖有小損而䑕不竊我囊貯遂復斐官晉書曰琅琊内史孫無終貪横忍虐妓妾有忤意者輙彈其面晉中興書曰謝萬安石之弟也為尚書令薨博士議謚曰萬無他才望直以宰相弟遂居清顯妄自夸擬曽無慙德案謚法因事有功曰襄貪以敗官曰墨宜謚曰襄墨公朝議直曰襄公又曰廣州北界有一水名曰貪水父老曰飲此水者皆使亷士變貪吳書曰薛綜上䟽曰交州刺史朱符多以鄉人虞稟劉彦之徒分作長史侵虐百姓强賦於民黄魚一頭収稻一秤百姓怨叛山賊並起燕書曰章該字宣恒為左長史太祖㑹群寮以該性貪故賜布百餘疋負而歸重不能勝乃至僵頓以媿辱之後魏書曰元脩義為吏部尚書唯事貨賄官之大小皆有定價中散大夫髙居呼為京師白刼又曰元誕為齊州刺史在州貪暴大為民患馬牛無不逼奪有沙門為誕採藥還誕曰師從外來有何得對曰惟聞王貪願王早代誕曰齊州七萬家吾每家未得三升錢何得言貪隋書曰張威在青州頗治産業遣家奴於民間鬻蘆菔根其奴縁此侵擾百姓上深加譴責坐廢於家後從上祠太山至洛陽上謂威曰自朕之有天下每委公以重鎮可謂推赤心矣何乃不脩名行唯利是視豈直孤負朕心亦且累卿名德因問威曰公所執笏今安在威頓首曰臣負罪虧憲無顔復執謹藏於家上曰可持來威明日奉笏以見上曰雖不遵法度功効實多朕不忘之今還公笏於是復拜洛州刺史又曰宇文述貪鄙知人有珍異之物必求取之富商大賈及隴右諸胡子弟述皆恩接呼之為兒由是爭餽金寳晏子春秋曰景公與晏子登路寢而望國公愀然而嘆曰使後嗣代代有此豈不可哉晏子曰服牛死夫婦共哭非骨肉之親也為其利之大也今公之酒醴􅀈酢不勝飲也菽粟鬱積不勝食也又厚籍歛於百姓而不以分委人也欲代之延不亦難乎莊子曰專知擅事侵人自用謂之貪孔叢子曰衛人有餌於河得鰥魚其大盈車子思問之鰥難得子如何得之對曰吾下釣垂魴之餌過而不視之更以豚之半體則吞之子思喟然曰鰥雖難得貪以死餌士雖懐道貪以死祿孫卿子曰勇而不見憚者貪也信而不見敬者好專行也此小人之所務而君子之所不為淮南子曰琬琰之玊在汙泥之中雖亷者不釋也弊算縻繒在旃茵之上雖貪者不摶也縻繒帶也美之所在雖汚辱世不能賤惡之所在雖髙隆世不能貴譙子法訓曰貪者難為惠苛煩者難為恭君子以禮而已矣郭子曰王夷甫雅尚𤣥逺又疾其婦貪濁口未嘗言錢婦欲試之夜令婢以錢繞床不得行夷甫晨起見錢繞之令婢舉阿堵物婦郭太寧女才拙性剛聚斂無厭夷甫患之又曰王含為廬江含字處恒征東將軍敦之兄貪濁狼籍王敦欲䕶其兄故於衆中稱家兄在郡廬江人咸稱之時何充為主簿在坐正色曰􅂶廬江人所聞異於此敦黙然傍人為之反側􅂶晏然神意自若魯國先賢志東門奐歴吳郡濟陰太守所至貪濁謠曰東門奐取吳半吳不足濟陰續華陽國志曰李盛為太守貪財重賦國人詈之曰盧鵲何諠諠有吏來在門披衣出門應府縣欲得錢語窮乞請期吏怒反見尤南州異物志曰俚人不愛骨肉而貪寳貨見賈人財物牛犢便以子易之襄陽耆舊記曰羅尚貪而不斷付任失所故遂至大敗蜀人不堪其徴求數萬人共連名詣太傅東海王言之曰尚之所愛非邪則佞尚之所憎非忠則直富擬魯衛家成市􅆵貪如虎狼無復已極又曰黄穆字伯開博學養門徒為山陽太守有德政致甘露白兎神雀白鳩之瑞弟奐字仲開為武陵太守貪穢無行武陵人謌曰天有冬夏人有兩黄言不同也桓譚新論曰鄙人有得脠音羶生肉醬也醬而美之及飲惡與人共食即小唾其中而共者因涕其醬遂棄而俱不得食焉彼亡新王方欲取天下時乃樂與人共分之及已得而重愛不肯予是昔唾脠之類竹林七賢論曰鬲令袁毅為政貪濁饋遺朝廷以營虛譽嘗遺山濤絲百斤濤不欲異衆受之命懸之梁後毅事露案驗衆官吏至於濤梁上得絲已數年塵埃封印如初㑹稽典録曰周規字公圎太守唐鳳命為功曹鳳中常侍衡之從兄恃中官專行貪暴規諫明府以負薪之才受剖符之任所謂力弱載重不惟顛蹶方今聖治在上不容秕政明府以教人之職行桀紂之暴鳳怒縳規棰於閣内鳳後果以檻車徴虐釋名曰虐焅也凡疾或寒或熱先寒後熱兩疾似焅虐也説文曰虐殘也尚書曰無若丹朱傲虐是作又曰今商王受弗恭上天降灾下民沈湎冒色敢行暴虐毛詩北風刺虐也衛國並為威虐百姓不親莫不相攜持而去之左傳曰隱公問於衆仲曰衛州吁其濟乎對曰臣聞以德和民不聞以亂夫州吁弑其君而虐用其民不務令德而欲以亂成必不免矣又曰莒犁比公生去疾及展輿既立展輿又廢之犁比公虐國人患之十一月展輿因國人以攻莒子殺之乃自立乂曰楚公子圍殺大司馬蒍掩而取其室申無宇曰王子必不免善人國之主也王子相楚國将善是封殖而虐之是禍國也又曰莒子展輿虐而好劒苟鑄劒必試諸人又曰楚使椒舉如晉求諸侯晉侯欲勿許司馬侯曰不可楚王方侈天其或者欲盈其心以厚其毒而降之罰未可知也其使能終亦未可知也若歸於德吾猶將事之况諸侯乎若適淫虐楚将棄之吾又誰與爭論語曰慢令致期謂之賊不教而殺謂之虐戰國策曰宋康王為無顔之冠以示勇剖傴者之背鑽朝渉之脛國人大駭齊聞而伐之史記曰白起一日坑趙降卒四十二萬又曰吕后斷戚夫人手足居厠中命曰人彘召惠帝觀之孝惠問乃知大呼哭因病嵗餘不能起使人謂太后曰此非人所為臣為太后子終不能治天下以此日飲為淫樂不聽政又曰懐王諸老将皆曰項羽為人慓悍禍虐甞攻襄城襄城無噍類如淳曰噍音作笑反所過無不殘滅漢書曰江都王建遊章臺宫使人乗小船以足蹈覆船四人溺三人死後逰雷陂大風建使郎二人乗小船入陂船覆兩郎溺船乍見乍没建臨觀大笑宫人有過輙令倮擊鼓居樹上久者三十日乃衣或髠鉗以鈆杵舂不中程輙縱狼嚙殺之專為淫虐又曰周陽由武帝即位吏治尚脩謹然由居二千石中最為暴虐驕恣所愛者撓法活之所憎者曲法滅之又曰翟義起兵王莽發義父方進及先祖塜燒其棺槨夷滅三族及種嗣至皆同􅒤以棘五毒并葬之又曰翟義黨王孫慶至莽使大醫尚方與巧屠共刳剥之量度五臟以竹筳導脉知所終始云可治病魏略曰髙陽劉類厯位宰守苛虐尤甚為𢎞農太守吏二百餘人不與休沐專使為不急事過無輕重輙捽其頭亂杖檛之牽出復入也吳志曰孫皓愛妾或使人至市賤奪百姓財物司市中郎將陳聲素皓幸臣也恃皓寵遇繩之以法妾愬之皓大怒假他事燒鋸斷聲頭投身於四望山又曰初孫皓每宴㑹羣臣無不咸令沉醉置黄門郎十人侍立為伺過之史客罷奏其闕失大者即加刑小者緝為罪激水入宫宫人不合意者輙殺流之或剥人之面或鑿人之眼江表傳曰孫皓用巫史之言謂建業宫不利乃西廵武昌仍有遷都之意恐群臣不從乃大㑹將吏問王蕃射不主皮為力不同科其義云何蕃思惟未答即於殿上斬蕃出登袁山使親近將蕃首作虎跳狼爭咋嚙之頭皆碎壊欲以示威使衆不敢犯王隠晉書曰苟晞字道將領兖州牧暴虐殺人流血號曰屠伯人皆怖悚流入他州其弟純領青州刑殺尤甚於晞百姓號小苟酷於大苟也又曰劉淵殘虐所在城邑無不傾敗流離死散殆無孑遺漢晉春秋曰初甄后之誅由郭后之寵及殯令被髪面以糠塞口遂立郭后使養明帝帝知之心常懐念數泣問甄后死狀郭后曰先帝自殺何以請問我且汝為人子可追讎死父為前母枉殺後兒耶明帝怒遂逼殺之勑殯者如甄后故事晉中興書曰苻健凶淫暴虐露刅張弓椎鉗鋸鑿殺人之具備在左右又曰石虎有所平克不復料其善惡或盡坑斬使無孑遺宋書曰竟陵王誕據廣陵反及城䧟士庶皆裸身鞭面然後加刑聚所殺人首於石頭南岸謂之髑髏山又曰宋越御衆嚴酷好行刑誅睚眦之間動用軍法時王𤣥謨御下亦少恩将士為之語曰寧作五年徒不逐王𤣥謨𤣥謨尚可宋越殺我又曰奚顯度者東海郯人也官至員外散騎郎世祖常使主領人而苛虐無道動加捶撲暑雨雪寒不聽蹔休人不堪命或有自經死者人役間配顯度加就刑戮又曰文帝元嘉起居注曰汝陽太守王道摽下縣作木人二枚髙八尺竪著郡門有犯事使拳擊木人令倒倒者免罪力弱者手拳傷剥齊書曰江謐字合和濟陽考城人也為長沙内史行湘州事政治苛刻僧道人與謐情欵隨莅部犯小事餓繫獄裂衣食之後魏書曰汝南王恱孝昌中除司州牧為大剉碓置於州門盗者斬其手姦偷畏之隋書魚贊性暴虐令部下炙肉少不中意以籖盲其目有温酒不適者斷其舌又曰崔恒度性嚴酷時有屈突葢為武侯驃騎亦嚴酷長安為之語曰寧飲三升醋不見崔恒度寧茹三升艾不逢屈突蓋唐書曰索元禮為遊撃將軍尋以酷毒轉甚則天收人望而殺之天下之人謂之來索言酷毒之極又曰韓滉在淮右也政令明察末年傷於嚴急巡内有犯令誅及隣伍死者數百人又俾推覆官分察情涉疑似必寘極法雖令行禁止而寃濫相尋議者以滉幼立貞亷晩途苛慘身未達則飾情以進身既顯則本質遂彰又曰竇軌每臨戎對冦經旬月身不解甲其部衆無貴賤少長不恭命即立斬鞭吏士流血滿庭初入蜀將其甥以為心腹常夜出呼之不以時至怒而斬之誡家僮不得出嘗遣奴就官厨取漿而悔之謂奴曰我誠使汝借汝頭以明法耳遣收奴斬之奴稱寃監刑者猶豫未決軌怒俱斬之梁冀别傳曰冀為河南尹居職恣暴多為非法遼東太守侯猛惡之不徃謁冀託以他事乃腰斬之郎中汝南袁著年十九見冀凶縱不勝其憤乃詣闕上書冀聞而密遣掩捕得笞殺之董卓别傳曰卓知所為不得逺近意欲以力服之遣兵到陽城時適二月社民皆各在其社下祈祀悉就斷頭駕其家車牛載其婦女財物以斷頭繫車轅云大獲賊文子曰今採萬民之力反為殘賊是為虎翼何為不除孫卿子曰不教而責成功虐也韓子曰梁車為鄴令其婦徃見之暮而門閉因踰郭而入車刖其足趙成侯以為不慈奪之璽而免令㑹稽典録曰吳王使王孫雄謂范蠡曰昔先人有言曰無助天為虐助天虐者不祥今吾稻蟹無遺種子將助天為虐不患其不祥乎吴越春秋曰子胥諫吳王怒子胥伏劔而死王乃取子胥尸盛以䲭夷投之乎江斷其頭置百尺之上謂曰日月炙汝肉熛風飄汝眼炎火燒汝骨盡成灰土何有所見涼州記曰郭黁奴昆切畧地之際王孫八人年幼悉隨乳母先在東苑黁遂盡投王孫於鋒刃之上或枝分節解飲血盟衆覩者無不掩目寒心而黁意氣翛然趙書曰汲桑清河貝丘人六月盛暑而桑重裘累茵使十餘人扇之意不清涼斬扇者時軍中為之謠曰士為將軍何可羞六月重茵被狐裘不識寒暑斷人頭鄧析書曰粟陸氏殺東里子宿沙君戮箕文桀誅龍逢紂刳比干此四者常彎弓露刃以見朝臣鉗錘鋸鑿所可為害之具備置左右即位未幾后公卿已下至於僕𨽻殺五百餘人崔鴻前秦録曰左光祿大夫强平諫苻生曰元正盛旦日有蝕之正陽神昏風灾水旱於時未息此皆由陛下不勉强於政治乖和氣所致也生怒以為妖言鑿其頂而殺之崔鴻夏録曰赫連勃勃徴隱士京兆韋思思至而恭懼逭禍勃怒曰吾以國士徵汝汝奈何以非類處吾汝昔不拜姚興何獨拜我我今未死汝猶不以我為帝王吾死之後汝輩弄筆當置我何處遂殺之又曰赫連勃勃凶殘好殺常居城上置矛劒於側有所嫌忿自殺之羣臣忤視者毁目笑者决唇諫者截其舌而斬之太平御覽卷四百九十二
