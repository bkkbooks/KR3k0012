body:
  text: 太平御覽卷五百三十一宋李昉等撰禮儀部十宗廟神主宗廟易萃卦曰王假有廟又涣卦曰風行水上涣先王以享于帝立廟尚書咸有一德曰嗚呼七世之廟可以觀德天子立七廟有徳之主則為祖宗其廟不毁故可觀徳毛詩文王綿曰乃召司空乃召司徒俾立室家其繩則直縮板以載作廟翼翼又閟宫曰新廟奕奕奚斯所作又清廟曰清廟祀文王也周公既成洛邑朝諸侯率以祀文王焉曰於穆清廟肅雝顯相周禮春官上曰小宗伯之職掌建國之神位右社稷左宗廟禮記曲禮曰君子將營宫室宗廟為先廐庫為次居室為後又曲禮曰問國君之年長曰能從宗廟社稷之事矣㓜曰未能從宗廟社稷之事也又王制曰天子七廟謂三昭三穆與太祖也諸侯五廟謂二昭二穆與太祖也大夫三廟一昭一穆與太祖也士一廟庶人祭于寝又禮記曰禮有以多為貴者天子立七廟諸侯立五廟大夫立三廟士一廟又文王世子曰五廟之孫祖廟未毁雖及庶人冠娶必告死必赴不忘親也又眀堂位曰山節藻梲複廟重檐刮盈達鄉反玷出尊崇玷康珪䟽屏天子廟飾也又雜記曰成廟則釁之其禮祝宗人宰夫雍人皆爵弁純衣雍人舉羊升屋中屋南面刲羊血流于前乃降門夾室皆用雞凡宗廟之器其名者成則釁之以猳豚宗廟名器謂尊彝之屬也又祭法曰天下有王分地建國置都立邑設廟祧壇墠而祭之乃為親疎多少之數是故王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧有二祧享甞乃止去祧為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠曰鬼諸侯立五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止去祖為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠為鬼大夫立三廟二壇曰考廟曰王考廟曰皇考廟享嘗乃止顯考祖考無廟禱焉為壇祭之去壇為鬼適士二廟一壇曰考廟曰王考廟享甞乃止皇考無廟有禱焉為壇祭之去壇為鬼官師一廟曰考廟王考無廟而祭之去王考為鬼庶士庶人無廟死曰鬼又中庸曰武王纉太王王季文王之緒一戎衣而有天下身不失天下之顯名尊為天子富有四海之内宗廟享之子孫保之又祭法曰天下有王分地建國置都立邑設廟祧壇墠而祭之左傳桓公曰宋華父督已殺孔父而弑殤公召莊公于鄭而立之以親鄭以郜大鼎賂公夏四月取郜大鼎于宋戊申納于太廟非禮也又桓公曰清廟茅屋又僖上曰震伯夷之廟罪之也于是展氏有隠慝焉又文公下曰太室之屋壊書不恭也又成公三年曰甲子新宫火三日哭又㐮二年曰吴子夀夢卒臨于周廟禮也凡諸侯之喪異姓臨于外者同姓臨于廟是故魯為諸姬臨于周廟周廟文王廟也周公出文王魯立其廟公羊傳文公曰世室屋壊世室者何魯公之廟也周公稱太廟魯公稱世室羣公稱宫穀梁傳成公曰新宫灾三日哭新宫者稱公也稱父也成公之父宣公之宫也孝經曰宗廟致敬不亡親也又曰為之宗廟以鬼享之孝經援神契曰廟者所以尊祖也論語八佾曰子入太廟每事問或曰孰謂鄹人之子知禮乎入太廟每事問子聞之曰是禮也家語曰孔子在齊景公造焉左右白曰周使至言宣王廟灾景公曰何王廟孔子曰此必釐王廟夫釐變文武之制而作𤣥黄華麗之飾故天殃其廟焉有頃左右報所灾者釐王廟景公曰善哉聖人之智過人逺矣又曰孔子曰吾于甘棠見宗廟之敬也甚矣思其人猶愛其樹尊其人必歌其道史記曰秦始皇巡隴西北地出雞頭山過囘中作信宫謂南更命信宫為極廟象天極廟道通驪山作甘泉前殿築甬道又曰髙祖崩羣臣皆曰髙祖起兵撥亂令郡諸侯各立髙祖廟以嵗祠時及孝惠五年思髙祖之悲樂沛宫為髙祖原廟漢書曰惠帝為東朝長樂宫及間往來數蹕煩民作複道方築武庫南叔孫通奏事自請間曰陛下何自築複道髙帝寝衣冠自出遊髙廟子孫奈何乘宗廟道上行哉惠帝懼曰急壊之通曰人主無過舉今已作百姓皆知之後願陛下為原廟渭北衣冠月出遊之益廣宗廟大孝之本上乃詔有司立原廟惠帝嘗出游離宫通曰古者嘗果方今櫻桃熟可獻願陛下出因取櫻桃獻宗廟上許之諸果獻由此又曰文帝作顧成廟又曰梅福上書諫曰武王尅殷未下車存五帝之後封殷于宋紹夏于杞眀著三統示不獨有也是以姬姓半天下遷廟之主出于户所謂存人以自立也又曰宣帝即位尊事武廟為世宗所行巡狩郡國皆立廟告祠宗廟有白鶴集後庭以立世宗廟告祠孝昭寢官有五色雁集殿前西河築世宗廟神光興于殿傍有鳥曰鶴前赤後青神光興于房中如燭狀廣川國世宗廟殿上有鍾音房中大開有光殿上又曰王莽以宗廟未修張邯説莽曰徳勝者文縟宜崇其制度宣示海内冝令萬世之后無以復加也莽乃博徵天下工臣諸圖􅀞及吏民以義入錢榖助作者駱驛道路壊徹城西苑中建章永光苞陽臺大儲宫及平樂當路陽禄舘凡十餘所取其財以完九廟帝王世紀曰漢景帝廟名徳陽宣帝廟名長夀武帝廟名龍淵文帝廟名顧成昭帝廟名徘徊東觀漢紀曰中元元年十月甲申使司空馮魴告祠髙祖廟吕太后不宜配食以薄太后配遷吕太后于園四時上祭又曰永初六年皇太后入宗廟與世宗廟與皇帝交獻薦如光烈皇后故事又曰建初四年八月上以公卿所奏眀徳皇后在世髙廟坐位駿議示東平憲王蒼上言文武宣九十食髙廟皆以后配先帝所制與法設張大雅曰昭哉來御從其祖武又曰不愆不忘率猶舊章眀徳皇后冝配孝眀皇帝袁山松後漢書曰天子自雒陽遷都長安時長安遭赤眉亂宫室盡焚惟有髙廟遂居之漢雜事曰光武弃天下以再受命復漢祚更起廟稱世祖孝眀臨崩遺詔遵儉無起寝廟蔵主于世祖廟孝章不敢違是後遵奉蔵世祖廟如孝眀之禮而國陵皆自起寝孝眀廟曰顯宗孝章曰肅宗是後踵前孝和為穆宗孝安曰敬宗孝順曰恭宗孝桓曰威宗令雒陽諸陵皆晦望二十四氣伏蜡及四時上飯太官送用物國令養監典省其親陵一所宫人隨鼔漏被枕具盥水陳言具天子以正月五月供畢後上原陵以次周遍公卿百官皆從四姓小侯諸家婦凡于先君有𤓰葛者及諸侯王大夫郡國計吏匈奴朝者西國侍子皆㑹尚書官属西除下在先帝神坐後大夫計吏皆當前下占其郡國榖價四方改異欲先帝親神具聞之也魏書曰辛酉有司奏造二廟立文皇帝廟與髙祖合祭親盡以次毁時立武皇帝廟四時享祭為魏太祖萬載不毁也吴録地里志曰㑹稽有禹廟始皇配食王郎為太守而斥之王隠晉書曰太康十年太廟成遷神主于新廟賜王公以下至焉督子弟官賜作廟者帛漢晉陽秋曰武帝改營太廟南盡荆山之木西採華山之石鑄銅柱十二塗以黄金鏤以百物填以丹青綴以珠玉以麗之也晉書禮志曰武帝太始二年有司奏置七廟宜權立一廟羣臣議上古清廟一宫周制七廟舜承堯禪受終文祖則虞氏不改唐廟因仍舊宫可依有虞故事宋書禮志曰晉太始二年有司奏天子七廟宜始禮建宫帝重其役設宜權立一廟于是羣臣議奏上古清廟一宫尊逺神祗逮至周室制為七廟以辨宗祧空宫深𢎞逺跡上世後魏書曰武定六年二月齊營齊獻武王廟議定室數形制兼度支尚書崔昻等議按禮諸侯五廟太祖親廟四今獻武王為始封之君便是太祖既通在親廟不容立五室且帝王親廟亦不過四今宜四室二間兩頭各一類室厦頭徘徊鴟尾又按禮圖諸侯廟止開南門而二王後祔祭儀注云執事者列于廟東門之外既有東門明非一門獻武禮數既隆備物殊異今據廟宜開四門内院南面開三門餘及外院四面皆一門齊書禮志曰世宗夢太祖宋氏諸帝常在太廟從我求求食可别為吾賜上乃敕豫章王妃庾氏四時還青溪宮舊宅處内舍堂奉祠二帝二后牲牢服章用家人禮晉起居注曰武帝太安中詔曰往者乃魏氏舊處還立廟既壅翳不顯又材木弱小至今中間有跌撓之患今當修立不冝在故處太僕寺南臨甬道地形顯故更于此營之主者依典禮行之晉書曰桓𤣥簒問衆曰朕其敗乎曹靖之對曰神怒人怨臣實懼焉𤣥曰人或可怨神何可怒對曰移晉宗廟飄泊無所大楚之祭不及于祖此其所以怒之白虎通曰禮聖王所制宗廟何曰生死殊路又云敬鬼神而逺之所以有室何所以象生之居又曰臣侍于郊君不絶其禄者以其禄三分之一其妻長子使得祭其宗廟賜其環則還之玦則去之又曰王者立宗廟何曰縁生以事死敬死若事存欲立宗廟而祭之此孝子之心所以追繼養也釋名曰廟者貎也先祖形貎所在寝息也三輔故事曰光武至長安宫闕燒盡徙都洛陽取十二陵何為髙作十二室太常卿一人别治長安主知齊祠事謂之髙廟漢武故事曰宣帝立孝武廟于河東告祠日見一人騎馬異于常馬持尺一扎賜将作丞又曰汝續克成賜汝金一斤因忽不見禮乃亦為金一斤蜀王本紀曰禹生于世紐禹母天珠孕禹祈禹而生禹于塗山娶妻生子名啓于今塗山而有禹廟葢亦為其母立也三輔黄圖曰莽于長安城作九廟又曰太上皇廟在長安香街南墨子曰昔三苗大亂天命殛之雨血于廟説苑曰衞孫文子問王孫賈曰吾見君之廟小欲更之可乎對曰古之君子以儉為禮今之君子以大易之桓譚新論曰王莽起九廟以銅為柱甍大金銀錯鏤其上也王嬰古今通論曰夏室世世祭祀之也殷曰重屋重夏為屋曰霤周曰宗廟尊其生存之貌示不死之故致之于廟楚辭天問序曰屈原放逐徬徨山澤仰天嘆息楚有先王之廟又公卿祠堂圖畫天地山川神靈琦瑋譎詭及古聖賢怪物行事周流罷倦休息其下仰見圖畫因書其壁呵而問之晉諸公讃曰王浚字彭祖為幽州刺史尋洛陽破後承制建行臺以宗廟焚毁設壇望祀七室及功臣配食神主禮記曲禮曰措之廟立之主曰帝又檀弓下曰愛之斯録之敬之斯盡其道焉重主道也殷一綴重焉綴連也殷人作主而連其重主懸諸廟也周主重徹焉又曰曽子問曰䘮有二孤廟有二主禮與孔子曰天無二日土無二王嘗禘郊社尊無二上未知其為禮也昔者齊桓公亟舉兵作偽主以行及反藏諸祖廟廟有二主自桓公始禮記外傳曰人君既葬之後日中虞祭即作木主以存神廟主用木者木者木落歸本有如之義天子廟主長尺二寸諸侯一尺四寸孔穎達正義葬后孝子心目無所覩故用以主其神也公羊傳文公曰二年丁丑作僖公虞主用桑練主用栗作僖公主不時也左傳莊公曰先君桓公命我先人典司宗祏又文公曰葬僖公緩也作主非禮也凡君薨卒哭而祔祔而作主特祀于主烝嘗禘于廟又昭五年曰使祀史徒主祏于周廟告于先君祏廟主石函周廟厲王廟也論語八佾曰哀公問社於宰我宰我對曰夏后氏以松殷人以栢周人以栗五經異義曰謹按大夫以石為主禮無眀文大夫士無昭穆不得有主今陽山民俗祀有石主又曰春秋左氏曰徙主祏于周廟言宗廟有郊宗祏室所以藏栗主也處主所藏無眀文也又曰公羊説卿大夫束帛依神主結茅為菆又曰論語曰哀公問社于宰我宰我曰夏后氏以松夏人都河東宜松也殷人以栢殷人都亳宜栢也周人以栗周人都豐鎬宜栗也五經要義曰木主之狀四方穿中央以達四方天子長尺三寸諸侯長尺皆刻字諡于背也又曰主者神象也凡虞主用桑桑猶喪也喪禮取其名練主用栗栗者敬也祭禮取其恭五經通義曰諸侯㑹天子則以方眀為主覲禮云明未也其形四方六面上𤣥下黄東青南赤西白北黒方眀者也下四方神眀之象也謝承後漢書曰赤眉盆子去長安西入右扶風鄧禹至長安中昆明池率諸將齋戒擇吉日入城謁髙帝廟修禮祠祭勞賜吏土因收十二帝神主以故髙廟郎來輔守南廟令行京兆尹承事按行掃除諸陵為置吏卒奉守為阡甫奉主詣京師王隠晉書曰李裔字宣伯父敏為公孫度所迫浮海莫知所終裔以父母不知存亡設木主以奉之晉起居注曰孝武太元二十年簡文皇帝宣太后正號神主移廟戊寅口詔移神主前後鼔吹摯虞決疑要主曰廟主藏于戸外西牖之中有石函名曰宗祏古者帝王出境于車載遷廟之主及社主以行秦漢魏不載主也唐書曰附順宗于廟遷中宗神主以夾室有司以中宗為中興之君當百代不遷宰臣召史官蒋武問之武對曰中宗于𢎞道元年于髙宗柩前即位時春秋已壮矣及母后簒奪神器潜移其後張柬之等同謀國祚再復此葢同于反正庶不得號為中興之君凡非我失之自我復之者謂之中興漢光武晉元帝是也自我失之因人復之者孝惠孝安是也今中宗與惠安二帝事體相同即不可為不遷主矣白虎通曰蔡所以尸主何本神旡方孝子以主係心又曰所以虞而立主何孝子既葬曰中及虞念親已没棺柩已去悵然失望彷徨哀痛故設桑主以虞所以慰孝子之心虞安其神所以用桑者始于神相接三王俱以桑説文曰祏宗廟主也禮郊宗石室曰大夫以石為主從示從石石有聲也太平御覽卷五百三十一
