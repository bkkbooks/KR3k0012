  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_233-1a, image: WYG0895/WYG0895-0151c.png}
body:
  text: 太平御覽卷二百三十三宋李昉等撰職官部三十一秘書監秘書少監秘書丞秘書郎秘書監六典曰秘書監之職掌邦國經籍圖書之事有二局一曰著作二曰太史皆率其屬而脩其職少監為之貳東觀漢記曰桓帝延嘉二年初置秘書監掌典圖書古今文字考合異同華嶠後漢書曰學者稱東觀為老氏藏室道家蓬萊山王融曲水詩序曰記言事於仙室謂藏室也魏志曰王象字義伯散騎常侍領秘書監撰皇覽魚豢魏略曰蘭臺臺也而秘書署耳王隱晉書曰王沉為秘書監著魏書多為時諱而善序事又曰羊祜為黄門郎陳畱王立以少帝不願為侍臣徙為秘書監又曰惠帝永平元年詔云秘書監經理經籍考校古今課試署吏領有四百人宜專其事鄧粲晉紀曰華譚為秘書自負宿名意毎怏怏常從容謂上曰臣老於秘閣矣汲黯之言復存今日上不恱晉諸公讚曰荀勗領秘書監太康二年汲郡冡中得竹書勗躬自撰次注冩以為中經列於秘書經傳闕文多所證明又讚曰庾峻自司空長史秘書監幽讚符命天文地理因有述焉何法盛晉中興書曰孫盛字安國為秘書監篤尚好學自少及長常手不釋卷既居史官乃著三國陽秋沈約宋書百官志曰秘書監丞各一人郎四人魏武建國有秘書令左右丞黄初中分秘書立中書而秘書之局不廢昔漢武帝建藏書之冊置寫書之官於是天下文籍皆在天禄石渠延閣廣内秘書之室謂之秘書至成哀世使劉向父子以本官典其事至于後則圖籍在東觀有校書郎又有著作郎傅毅馬融之徒多為校書郎又蔡邕從尚書選入東觀著作邕既匕為尚書郎而入東觀著作復拜議郎知是著作郎也又碩學達官徃徃典校秘書如向歆故事或但校書東觀或有兼撰漢記也梁書曰任昉字彦昇為秘書監自齊永元以來秘閣四部篇卷紛雜昉手自讐校由是篇目定焉後魏書曰伊馥世祖欲拜馥為尚書郡公馥辭曰尚書務殷公爵至重非臣年少愚近所宜荷任請收過恩世祖問其欲馥曰中秘二省多諸文士若恩矜不已請參其次世祖賢之遂拜為中護將軍秘書監隋書曰栁􅈯煬帝嗣位拜秘書監封漢南縣公帝退朝之後便命入閣言宴諷讀終日而罷帝毎與嬪后對酒時逢興㑹輒遣命之至與同榻共席恩若朋友帝猶恨不能夜召於是命匠刻木偶人施機關能坐起拜伏以像於􅈯帝毎在月下對酒輒令宫人置之於座與相酬酢而為懽笑唐書曰魏徵為秘書監奏引學者校定四部書自是秘府圖籍粲然畢備劉歆七略曰武帝廣獻書之路百年之間書積如丘山故外有太常史官博士之藏内則延閣廣内秘室之府魚豢典略曰芸臺香辟紙魚蠧故藏書臺稱芸臺三輔黄圖曰未央宮東有麒麟殿藏秘書即揚雄校書之處也王充論衡曰蘭臺之官監國得失也通典曰秘書省但主書寫勘校而已雖非要劇然好學君子亦多求為之温嶠舉荀崧為秘書監表曰夫國史之興將以明得失之跡謂之實錄使一代之典煥然可觀散騎常侍崧文質彬彬思義通博歷位先朝蒞事以穆宜掌秘奥宣明史籍魏王肅表曰青龍之末主者啓選秘書監詔秘書騶吏以上三百餘人非但學問義理當聞有威嚴能檢下者詔肅以常侍領焉又王肅論秘書不應屬少府表曰魏之秘書即漢之東觀郡國稱敢言之上東觀且自大魏分秘書而為中書以來傳緒相繼於今三監未有隸名於少府者也今欲使臣編名於騶隸言事於外府不亦隳朝章而辱國典乎太和之中蘭臺秘書争議三府奏議秘書司先王之載籍掌制書之典謨與中書相亞宜與中書為官聯華嶠集詔曰尚書嶠體素𢎞簡文雅該通經覽古今博聞多識屬書實錄有良史之志故轉為秘書監其加散騎常侍使中書散騎著作及治禮音律天文數術南省文章門下撰集皆典領之嶠表曰伏見詔書以臣為秘書監加位常伯昔劉向父子世典史籍馬融通博三入東觀非臣膚淺所敢投跡唐書太宗正授顔師古秘書監制曰秘書望華史官任重選重而舉厯代攸難守秘書監顔師古體業淹和器用詳敏學總流略詞兼典麗職司圖書亟經嵗序朱紫既辨著述有成宜正名器允兹望實可秘書監秘書少監唐書曰周思茂者貝州漳南人少與弟思鈞俱早知名自右史轉太子舎人與范履冰在禁最蒙親遇至於政事損益多參預焉累遷麟臺少監崇文館學士垂拱四年下獄又曰王紹宗揚州江都人也遷秘書少監仍侍皇太子讀書紹宗性澹雅以儒素見稱當時朝廷之士咸敬慕之張易之兄弟亦厚之伏誅紹宗坐以交往見廢又曰德宗以左諫議大夫史館脩撰張薦為秘書監脩撰如故時裴延齡貴欲異同宰府乃言於上曰諫議大夫論朝廷得失之官史館修撰書朝廷得失之事則領史職者不宜為諫官故有斯命秘書丞魏志曰武帝置秘書左右丞以劉放為秘書左丞孫資為秘書右丞魏略曰薛夏字宣聲天水人也博學有才華天水舊有姜任閻趙四姓常推於郡中而夏為單家不為降屈四姓欲治之夏乃遊逸東詣京師太祖宿聞其名甚禮遇之文帝又嘉其才黄初中為秘書丞帝常與夏推論書傳未嘗不終日也毎呼之而不名謂之薛君夏居甚貧帝又顧其衣薄解御袍賜之其後征東將軍曹休來朝時帝方與夏有所諮論而外啟休到帝引入坐定帝顧夏言之于休曰此君秘書丞天水薛宣也宜共談其見遇如此魚豢魏略曰薛夏為秘書丞時秘書嘗公事移蘭臺蘭臺自以臺也秘書丞時為署耳謂不得儀當有坐者夏報之曰蘭臺為外臺秘書為内閣臺也閣也何不相移之有蘭臺無以折之又曰嚴苞以髙才黄初中為秘書丞數奏文賦帝甚異之晉書曰嵇紹以父得罪靖居私門山濤領選啟武帝曰康誥有言父子罪不相及嵇紹賢侔郄缺宜加旌命請為秘書郎帝謂濤曰如卿所言乃堪為丞何但郎也乃發詔徵之起家為秘書丞王隱晉書曰庾峻字山甫博學有才為秘書丞遍觀古今聞見益優虞預晉書曰何楨字元幹廬江人也為尚書郎特詔參秘書丞秘書本有一丞時尚未轉遂以楨為右丞右丞之置自楨始也檀道論晉陽秋曰太元十八年王謐為秘書丞乃表前尚書殷允中書郎張敞太子後率郄儉之故太常桓石秀是多書之家請秘書郎分局採借齊書曰王儉字仲寶為秘書丞上表求校墳籍依七略撰七志四十卷獻之又曰張率字士簡吳郡人遷秘書丞髙祖曰秘書丞天下清官東南胄緒未有為之今以相處為卿定名譽齊職儀曰秘書丞銅印墨綬南史曰劉孝綽遷秘書丞武帝謂舎人周捨云第一官當用第一人故以孝綽居此職後魏書曰李彪字道固遷秘書丞分領著作事自武成帝已來至於太和崔浩髙允著述國書編年序錄為春秋之體遺落時事一二無存彪與秘書令髙祐始奏從遷固之體創為紀傳表志之目焉又曰李輔字伯尚少有重名髙祖毎云此李氏之千里駒勑撰太宗起居注尋遷秘書丞後周書曰栁虬為秘書丞時秘書雖領著作不參史事自虬為丞始令監掌焉王肅論秘書表云青龍中議秘書丞郎與博士議郎同職近日月宜在三臺上又曰秘書丞郎宜比尚書郎侍御史今侍御史乗犢車奏事用尺一秘書丞郎乘鹿車猶用尺奏恐非陛下崇儒之本意也秘書郎六典曰秘書郎四人從六品上晉起居注云武帝遣秘書圖書分為甲乙丙丁四部使秘書郎各掌其一焉魏志曰王基字伯輿東萊人也時青土初定刺史王凌特表請基為别駕後召為秘書郎凌復請還之司徒王朗辟基凌又不遣朗書劾州曰取宿衛之臣畱秘閣之吏所希聞也凌猶不遣凌流稱青土蓋亦由基協和之輔也又曰鍾會字士季敏惠夙成時蔣濟著論謂觀其眸子可以知人會年五嵗見濟濟大竒之正始中以賜官郎中為秘書郎蜀志曰郄正字令先安貧好學博涉墳籍弱冠能屬文入為秘書史轉令史遷秘書郎性澹於榮利尤躭文章自司馬王楊班傅張蔡之儔遺文篇賦及當世美書善論益部有者則鑽鑿推求略皆寓目王隱晉書曰鄭黙字思元為秘書郎刪省舊文除其浮穢時陳畱虞松為中書令謂黙曰而今而後朱紫别矣又曰左思專思三都賦杜絶人事自以所見不博求為秘書郎虞預晉書曰司馬彪少篤學不倦好色薄行不交人事專精學問泰始中為秘書郎後轉為丞晉太康起居注曰秘書丞桓石綏啟校定四部書詔郎中四人各掌一部晉令曰秘書郎掌中外三閣經書覆省校閱正定脫誤沈約宋書曰秘書郎四人後漢校書郎也又曰蕭慧開雖貴戚而素服簡素初為秘書郎秘書著作並名家年少慧開意趣與之多不同比肩或三年不共語宋書曰王敬𢎞子恢之為秘書郎使求為奉朝請與恢之書曰秘書有限故有競朝請無限故無競吾欲使汝處無競之地文帝許之梁書曰張纘字伯緒為秘書郎固求不遷欲遍觀閣内圖籍後魏書曰髙謐字安平有文武才度天安中以功臣子召入禁中除秘書郎典秘閣謐以墳典殘缺奏廣訪郡邑大加繕寫由是代京圖籍莫不審正通典曰宋齊秘書郎皆四員尤為美職皆為甲族起家之選待次入補其居職例十日便遷又曰秘書郎自齊梁之末多以貴遊子弟為之無其才實故當時諺曰上車不落則著作體中何如則秘書又曰王肅表曰臣以為秘書職于三臺為近宻中書郎在尚書丞郎上秘書丞郎宜次尚書郎下不然則宜次侍御史下秘書丞郎俱四百石遷宜比尚書郎亦出宜為郡此陛下崇儒術之盛㫖也尚書郎侍御史皆乘犢車而秘書丞郎獨乘鹿車不得朝服又恐非陛下轉臺郎以為秘書丞郎之本意也太平御覽卷二百三十三
