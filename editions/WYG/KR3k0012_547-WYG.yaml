  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_547-1a, image: WYG0898/WYG0898-0093c.png}
body:
  text: 太平御覽卷五百四十七宋李昉等撰禮儀部二十六喪服衰冠絰帶喪服周禮春官司服曰凡凶事服弁服服弁喪冠也其服斬衰齊衰也凡弔事弁絰服弁絰者如爵弁而素加環絰也論語曰羔裘𤣥冠不以弔絰大於緦之絰其服錫衰緦衰疑衰也諸侯及卿大夫亦以錫衰為弔服凡喪為天王斬衰為王后衰齊王后小君也諸侯為之不杖期也王為三公六卿錫衰為諸侯緦衰為大夫士疑衰其首服皆弁絰君為臣服也疑衰十四升疑之言擬擬于吉也儀禮喪服曰喪服斬衰裳苴絰杖絞帶冠繩纓菅屨者為父諸侯為天子君父為長子為人後者妻為夫女子子在室為父子嫁反在父之室為父公士大夫之衆臣為君布帶繩屨又曰疏衰裳齊牡麻絰冠布纓削杖布帶疏屨三年者父卒則為母繼母慈母母為長子又曰疏衰裳齊牡麻絰冠布纓削杖布帶疏屨朞者父在為母妻出妻之子為父母卒繼母嫁從為之服報不杖麻屨者祖父母世父母叔父母又曰疏衰裳齊牡麻絰無受者無受者服足而除不以絰服而受也寄公為所寓丈夫婦人為宗子宗子之母妻為舊君君之母妻庶人為國君大夫在外其妻長子為舊國君又曰大功布衰裳牡麻絰無受者子女子子之長殤中殤叔父之長殤中殤姑姊妹之長殤中殤昆弟之長殤中殤夫之昆弟之子女子子之長殤中殤嫡孫之長殤中殤大夫之庶子為嫡昆弟之長殤中殤公為嫡子之長殤中殤大夫為嫡子之長殤中殤其長殤皆九月纓絰其中殤七月不纓絰大功布衰裳牡麻絰纓布帶三月受以小功衰即葛九月者姑姊妹女子之適人也又曰繐衰裳牡麻絰既𦵏除之者傳曰繐衰者何以小功之繐也諸侯之大夫為天子繐曰何以繐衰也諸侯之大夫以時接見乎天子小功布衰裳澡麻帶絰五月者叔父嫡孫昆弟之下殤又曰小功布衰裳牡麻絰即葛五月者從祖祖父母從祖父母報從祖昆弟從父姊妹孫適人者為人後者為姊妹適人者為外祖父母又曰緦麻三月者族曾祖父母族祖父母族父母族昆弟庶孫之婦庶孫之中殤又曰公子為其母練冠麻衣縓緣為其妻縓冠葛絰帶麻衣縓緣皆既葬除之又曰凡妾為私兄弟如邦人大夫弔于命婦錫衰命婦弔于大夫亦錫衰禮記檀弓上曰喪服兄弟之子猶子也蓋引而進之也嫂叔之無服也蓋推而逺之也姑姊妹之薄也蓋有受我而厚之者也欲其一心厚之者姑姊妹大功夫妻為期又檀弓下曰成人有其兄死而不為衰者聞子臯將為成宰遂為衰成人曰蠶則績而蟹有匡范則冠而蟬有緌兄則死而子臯為之衰蚩尤死者言其衰之不為兄死如蟹有匡蟬有緌不為􅅙之績范之冠也范蜂也蟬蜩也緌謂蜩喙長在腹下又喪服小記曰近臣君服斯服矣其餘從而服不從而税又曰除喪者先重者易服者易輕者又曰斬衰之葛與齊衰之麻同齊衰之葛與大功之麻同又服問曰三年之喪既練矣有期之喪既𦵏矣則帶其故葛帶絰期之絰服其功衰有大功之喪亦如之小功無變也無變於大功齊衰之服不用輕累重麻之有本者變三年之葛有本謂大功以上也小功以下絲麻㫁本既練遇麻㫁本者于免絰之既免去絰每可以絰必絰既絰則去之禮統曰天子諸侯皆為貴臣妾服三月適夫人為八妾服三月八妾為夫人服與舅姑同家語曰門人疑所以服夫子者子貢曰昔夫子之喪顔淵若喪子而無服喪子路亦然請喪夫子若喪父而無服于是弟子皆入而加麻出有所之則猶絰孔叢子曰秦莊子死孟武伯問于孔子曰古同僚有服乎曰然同僚有相友之義貴賤殊等不為同官問諸老􅔶昔虢叔閎夭太顛散宜生南宫适五臣者同僚比徳以賛文武及虢叔死四人者為服古達禮者行之又曰子思之衛魯穆公卒縣子使乎衛聞喪而服謂子思曰子雖未臣魯父母之國也先君宗廟在焉奈何弗服子思曰吾豈愛乎禮弗得也縣子曰請聞之答曰臣而出國君不掃其宗廟則不為之服又曰司徒文子改𦵏其叔父問于子思子思曰禮父母改𦵏緦既𦵏而除不忍無夫送至親也非父母無服無服則弔服加麻又曰魯人有同嵗上計而卒欲為之服問于季立季立曰恩好者其緦乎昔諸侯大夫共㑹于王及以君命同盟霸主其死也則皆有哭臨之禮今之上計上勤天子有交醼之所同名綈素上記先君下禄子孫同敦以好相厲以義又數相往来持有恩親比之朋友不亦重乎白虎通曰弟子為師服者弟子有君臣父子朋友之道也故生竭敬而親之死則喪痛之恩深義重故為之服入則絰出則否習鑿齒漢晉春秋曰初文帝之崩也羊祜謂傅𤣥曰三年之喪雖貴遂服自天子達而漢文除之毁禮傷義常以為歎今上天縱至孝有曾閔之性雖奪其服而實行喪禮喪禮行除服何為耶若因此革魏之薄而興先王之法以敦厚風俗垂之百代不亦美乎𤣥曰漢文以来世乃淺薄不能行國君之喪因而除之數百年一旦復古恐難行也祜曰就不能使天下如禮且使主上遂服不猶善乎𤣥曰君上不除而下除是為但有父子無君臣三綱之道虧矣君子曰傅𤣥知無君臣之傷教而不知兼無父子之為重豈不蔽惑哉漢廢君臣之喪不降父子之服故四海黎庶莫不盡于其親三綱之道二服猶用于私室而主者獨盡廢之豈所以孝制天下乎詩云猶之未逺其傅𤣥之謂也摰虞折禮議曰虞謹按古者諸侯君臨其國臣君父兄之諸侯未同于古未同于古則其尊未全使絶期之制而令傍親之重也諸侯既然則公孫之爵亦宜如舊又曰喪無弟子為師服之制新禮弟子為師衰臣虞謹按自古無服師之禮故仲尼之喪門人疑其所服子貢曰昔夫子喪顔淵若喪子而無服請喪夫子若父而無服遂心喪三年此則懐三年之哀而無齊衰之制也出則絰居則否所謂事加麻也先聖為禮必易從而可傳師之義誠重而服制之差歴代相襲不以為疑宜更定新禮無服如舊摰虞決疑要注曰禮故君為舊君齊衰三月謂䇿名委質稱君吏者也見察舉而不為吏者弔服加麻衰冠毛詩羔裘曰素冠刺不能三年也庶見素冠兮棘人欒欒兮箋云時無三年之恩于父母廢其喪禮故兾幸一見素冠也周禮春官小宗伯曰王崩懸衰冠之式于路門之外又肆師之職曰大喪禁外内男女之衰不中法者又夏官太僕曰大喪懸首服之法于宫首服之法謂免髪笄總長短之數于宫門示四方也又天官内司服曰共后之衣服及九嬪世婦凡命婦共其衣服共喪衰亦如之儀禮喪服曰斬衰者不緝也冠繩纓條屬冠六升外畢鐶而勿灰齊衰者緝也又曰疏衰裳齊傳曰問者曰何冠也曰齊衰大功冠其衰也緦麻小功冠其衰也帶緣各視其冠又曰緦者十五升抽其半有事其縷無事其布曰緦也錫衰何也麻之有枲者也十五升有其半無事其縷有事其布曰錫又曰凡衰外削幅裳内削幅幅三拘削殺也若齊裳内衰外員廣出于適寸員在背上適辟領也負也出于辟領外傍一寸適博四寸出于衰麻長六寸博四寸禮記檀弓曰衰與其不當物也寧無衰惡其亂禮不當物謂精麤廣狹不應法制齊衰不以邊坐大功不以服勤又曰古者冠縮縫今也衡縫縮從也今禮制衡讀為横今冠縫横以其辟積多故喪冠之反吉非古也解時人之惑喪冠縮縫古冠耳又間傳曰斬衰三升齊衰四升五升六升大功七升八升九升小功十升十一升十二升緦麻十五升去其半有事其縷無事其布曰緦此哀之發于衣服者也禮記外傳曰凡言斬衰者以六寸之布廣四寸為衰帖于心前而不緝也衰者言悲摧也緝者縫綆之名齊之言齊也加針縷其裳下之縫使齊平也凡言有事其縷者先加灰錫治其麻縷為布則不治絰帶周禮夏官弁師曰王之弁絰弁而加環絰弁絰王弔所服也其弁如爵弁而素所謂素冠也而加環絰環絰者大如緦之麻絰纒而不糾司服職曰凡弔事弁絰服儀禮喪服曰苴絰者麻之有蕡者也苴絰大搹搹手搹圍九寸左本在下去五分一以為帶齊衰之絰斬衰之帶也去五分一以為帶絞者垂帶也鄭𤣥注曰凡服上曰衣下曰裳在首在腰皆曰絰絰之言實也首絰象幘布冠之幘腰絰象大帶之有絞帶革帶者也牡麻者枲麻也牡麻絰右本在上又曰斬衰絞帶七寸三分齊之帶五寸六分大功之帶四寸五分小功之帶三寸七分緦麻之帶二寸九分鄭𤣥絞帶象革帶斬之絰五分去一以為韋繩帶也禮記外傳曰絰者實也表其有哀蹙之情實也喪服衰之與絰因象平常之時冠帶吉㓙相變也有首絰有腰絰有絞帶斬衰首絰圍九寸向下皆五分去一用為腰絰則七寸五分五分去一者從斬至緦緣有五服相減窮其数也然則絞帶又小于腰絰齊衰首絰七寸五分之一腰絰五寸八分大功首絰五寸八分腰絰四寸六分小功首絰四寸六分腰絰三寸七分緦首絰三寸七分腰絰二寸九分左傳僖下曰晉襄公擊敗秦師于殽子墨衰絰晉文公之喪故襄公稱子以㓙服從戎故墨之又襄上曰晉侯有姻喪王鮒使宣子墨縗冒絰晉自殽之役遂常墨縗絰也二婦人輦以如公奉公以如固宫後漢書曰胡廣年八十三嵗熹平元年薨故吏自公卿大夫博士議郎以下數百人皆衰絰殯位自終及𦵏漢興以来人臣之盛未嘗有也宋書曰王誕為吳國内史母憂去職武帝伐劉毅為起輔國將軍誕固辭以墨絰從行太平御覽卷五百四十七
