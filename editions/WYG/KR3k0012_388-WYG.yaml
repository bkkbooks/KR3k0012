body:
  text: 太平御覽卷三百八十八宋李昉等撰人事部二十九聲色影跡聲周書曰師曠見周太子晉太子曰吾聞汝知人年夀幸以告我師曠曰汝色青白聲大不夀太子曰余後三年上賔於帝汝慎無言殃將及汝三年而死毛詩闗雎序曰情發於中故形聲聲成文謂之音左傳宣四年初楚司馬子良生越椒子文曰必殺之是子也熊虎之狀而豺狼之聲弗殺必滅若敖氏諺曰狼子野心是乃狼也其可畜乎又襄三年晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不兢歌詠八風南風音㣲故曰不兢惟歌南北風者聽晉楚也多死聲楚必無功後楚師敗又昭四曰伯石始生子容之母走謁諸姑曰長叔姒生男姑視之及堂聞其聲而還曰是豺狼之聲也狼子野心非是莫䘮羊舌氏矣遂不視春秋演孔圖曰伊尹大而短赤色而髯好俛而下聲家語曰孔子在衛昧旦晨興顔囘侍側聞哭者聲甚哀子曰囘汝知此何所哭對曰非但為生離别也子曰何以知之對曰囘聞恒山之鳥生四子羽翼既成將分於四海其母悲鳴送之哀聲有似於此孔子使問哭者果曰父死家貧賣子以葬與之長訣子曰囘也善於識聲矣史記曰初楚成王將以商臣為太子語令尹子上子上曰商臣蜂目豺聲忍人也不可立也王勿聽又秦始皇世家曰大梁人尉繚曰秦皇為人隆準長目鳥喙鷹呼豺聲少恩而虎狼心戰國䇿曰楚襄王為太子之時為質於齊懐王薨太子辭於齊王齊王曰與我地五百里則歸子太子曰臣今有傅請問𫝊傅曰獻之齊太子歸即位齊使来求地上柱國子良曰王身出聲許萬乗之齊而弗與則不信後不可以結約諸侯矣後漢書曰盧植字子幹身長八尺二寸音聲如鐘東觀漢記曰更始納趙萌女為后有寵遂委政於萌日夜與婦人飲讌後庭羣臣欲言事輙醉不能見時不得已乃令侍中坐帷内與語諸將識非更始聲出皆怨之華嶠後漢書曰何熈字孟孫少有大志身長八尺五寸體貌魁梧善儀容舉孝㢘為謁者質拜殿中音動左右江表𫝊曰闗雲長襲魯肅甘寧與雲長㑹益陽瀬淺將渡寧有所約令雲長聞之曰此甘寧聲也遂不復渡王隠晉書曰王褒少立操尚非理不動音聲清髙辭氣雅正漢晋春秋曰王敦為揚州刺史潘滔曰處仲蜂目已露但豺聲未發今樹之江外是見賊也梁書曰吕僧珎字元瑜東平范人也始童兒時從師學有相工歴觀諸生指僧珎謂博士曰此人有竒聲封侯相也梁太清實録曰中宗諱繹字世誠髙祖第七子也既長有壯畧竒悟聰敏博渉殆謂生知聲若撞鍾辯如河㵼越絶書曰越栖㑹稽行成於吳引兵而去勾踐將降吳呉王許之子胥大怒聲若哮虎曰此越未戰而服天以賜吳其可逆天乎臣唯君王急制之吳王不聽莊子曰曽子居衛緼袍無表三日不舉火十年不制衣正冠而纓絶捉衿而肘見納履而踵决曳屣而歌商頌聲若出金石賈誼書曰豫讓釁面變容吞炭變聲必執襄子一夕而五易處風俗通曰聲所以有五者繋五行也音所以有八者繫八風也新序曰原憲見子貢曳杖行歌聲若金石郭林宗别𫝊曰林宗儀貌魁岸身長八尺音聲如鍾當時以為准的裴楷别傳曰賈充等治法律楷亦㕘典其事事畢詔専讀奏平章當否楷善能諷誦音聲宣暢執刑書穆以若清詠焉異苑曰陳思王嘗登魚山臨東阿忽聞巗岫裏有誦經聲清逺嘹亮深谷流響肅然有靈氣不覺斂衿祇敬便有終焉之志即傚而則之今梵唱皆植依擬所造項氏始學篇注曰有龍淵者桓靈時善相人也於聽音聲尤妙二千石相者龍淵下床贊之令長起侍贊之自六百石以下皆坐而言之先相張濟當以財得三公濟常依淵以觀視有相者輙往求之㑹解瀆侯往相至門當有至相憂貧乎侯去淵謂濟曰可厚事之濟遂盡居業為償債數百萬桓帝崩無嗣解瀆侯入為天子而濟遂至司空世説曰蔡司徒説在洛陽見陸機兄弟往㕘佐廨中三間瓦屋士龍住東頭士衡住西頭龍為人文弱可受士衡長七尺餘聲作鍾聲言多慷慨又曰杜預為荆州刺史鎮襄陽時有讌集大醉輙閉齋獨眠不聽人前後常醉聞齋中嘔吐其聲􅒂然莫不側足悚慄有一小吏開便户看之正見床上有大􅉬垂頭床邊吐却不見人語林曰胡廣本姓黄五日生父母置甕中投之於江流下聞有小兒啼聲往取因以為子遂登三司廣後不治本親服世以為議又曰王武子葬夕孫子荆哭之甚悲賔客莫不垂涕哭畢向靈座曰卿好我作驢鳴今為卿作驢鳴因作體似聲其賔客莫不笑孫聞笑顧謂曰諸君不死令王武子死賔客莫不皆怒又曰董仲道常在客宿與王孫隔共語同行人曰此人行必為亂後果為亂階色説文曰晳人色白也皤老人色也韓詩外𫝊曰閔子始見夫子有菜色後有芻豢之色子貢問其故閔子曰吾出蒹葭之中入夫子之門聞夫子切磋之教竊樂之出見羽盖龍旂又樂之二者相攻胷中是以有菜色今被夫子之文出見羽盖龍旂視如糞土是以有芻豢之色尚書大𫝊曰撞㽔賔在外者皆金聲在内者皆玊色禮記表記曰是故君子縗絰則有哀色端冕則有敬色甲胄則有不可辱之色又曰君子不失色於人不失口於人又曰玊藻曰立容徳色容莊又曰盛氣闐實陽休玉色言身中氣盛闐滿若陽氣之休物玊色言不變也又文王世子曰文王之為世子也朝於王季日三其有不安節則内豎以告文王文王色憂行不能正履左傳僖上曰齊桓公與蔡姬乗舟於囿蕩舟公懼變色又定上曰衛太子蒯聵謂戲陽速曰從我而朝少君少君見我我顧乃殺之速曰諾乃朝夫人夫人見太子太子三顧速不進夫人見其色啼而走曰蒯瞶將殺余見太子色變知其欲殺已又哀上曰肉食者無墨墨氣色下公羊傳桓公曰宋督殺其君與夷及其大夫孔父孔父存則殤公不可得殺於是先攻孔父殺之皆死孔父正色立於朝則人莫敢過而致難於君孔父可謂義􅄱於色矣論語公冶長篇巧言令色足恭左丘眀恥之丘亦恥之又陽貨篇巧言令色鮮矣仁又曰子張問令尹子文三仕為令尹無喜色三已之無愠色何如子曰忠矣又鄉黨篇立不中門行不履閾過位色勃如也屏氣似不息者出降一等逞顔色怡怡如也上如揖下如授勃如戰色足蹜蹜如有循享禮有容色私覿愉愉如也又曰色思温貌思恭又曰車中不内顧不疾言不親指色斯舉矣顔色不善則去之又陽貨篇色厲而内荏譬諸小人其猶穿窬之盜也與又顔淵篇子張問士何如斯可謂之達矣子曰何哉爾所謂達者子張對曰在邦必聞在家必聞子曰是聞也非達也夫達也者質直而好義察言而觀色夫聞也者色取人而行違居之不疑又憲問篇賢者辟世世主莫得而臣其次辟地去亂國適理邦其次辟色色斯舉矣其次辟言有惡言乃去漢書曰李廣出右北平胡急擊矢下如雨漢兵死者過半㑹暮吏士無人色言懼甚也又曰李陵降邉塞以聞上欲陵戰死召陵毋及婦使相者視之無死䘮色又曰汲黯好游侠任氣節行脩潔其諫犯主之顔色常慕袁盎之為人上方招文學儒者黯曰陛下内多欲而外施仁義奈何欲効唐虞之治乎上怒變色而罷朝公卿皆為黯懼魏氏春秋曰嵇康寓居河内與之遊者未嘗見其喜愠之色世説同魏志曰夏侯元格量宏濟臨斬顔色不變舉動自若續晉陽秋曰劉毅至黒時人謂之鐵色又曰初太宗諸繼子天乃令扈謙卜云後房有一女當誕二男其一終大盛帝乃召相者示諸寵妾皆曰非其人又示諸婦時織坊中有一人形長色黒宫人謂之崑崙相者驚曰此其人也帝以大計幸之生烈宗前秦録曰苻堅舉國伐晉登城而望晉軍見部伍齊整八公山上草木皆類人形憮然有懼色後趙録曰延熈元年石虎遣丞相郭殷持節入廢宏為海陽王宏安歩就車容色自若百官莫不流涕春秋後語曰魏文侯謀事而當羣臣莫之逮者朝而喜色吳起進曰昔楚莊王朝而有憂色申公巫臣問曰君有憂色何也莊王曰吾聞諸侯擇師王者擇友覇者自足而羣臣莫之若者亡今以不穀之不肖而議於朝羣臣莫能逮吾國其㡬於亡乎吾是以憂色山海經曰不死民為人黒色夀考不死郭子别傳曰林宗秀立髙峙澹然淵停蔡伯喈告盧子幹馬日磾曰為天下作碑銘多矣未嘗不有慙色唯郭先生碑頌無愧色耳列仙傳曰桂父象林人色時白時黄時赤竹林七賢論曰王戎女適裴氏用匱女為貸錢一萬久而不還女歸戎色不悦遽還錢乃釋瀨鄉記曰老子為人黄色美眉孫卿子曰臯陶之色如削𤓰燕丹子曰荆軻入秦秦王陛㦸而見燕使鍾皷並發羣臣皆呼萬嵗秦武陽大怒面如死灰色郭子曰盧志於衆中問陸士衡陸抗是卿何物荅曰如卿於盧毓士龍失色既出户謂兄曰何至於此彼或有不知士衡正色曰我父祖名播海内寧有不知識者疑兩陸優劣謝安以此定之世説曰石崇要王敦入學戲見顔囬像石歎曰若與之同昇孔子堂去人何必有間王曰子貢去卿差近石正色曰士處世當令身名俱泰何至以甕牖語人影尚書大禹謨曰恵廸吉從逆㓙唯影響東觀漢記曰西𦍑祖爰劍為秦所奴𨽻而亡藏巖穴中見焚有影象如虎為蔽火得不死諸𦍑以為神推以為豪魏畧曰何晏性自喜行歩顧影山海經曰夀麻之國正立無影疾呼無響郭璞注曰言其形氣有異於人又曰長流山神白帝少昊居之主司反影日西入則反影東照言司察之也孫卿子曰夏首之南有人曰涓蜀梁其人愚宵行俯見其影以為伏鬼仰見其髪以為立魅倍道而走比至其家失氣而卒莊子曰有畏影惡跡而去之走者足舉逾數而跡踰多走逾疾而影不離自以為尚遲疾走不休絶力而死不知處隂以休影處静以息跡愚亦甚矣又曰㒺兩問影曰曩子行今子止曩子坐今子起何其無特操與影曰吾有待而然者耶㒺兩影外之㣲隂也太𤣥經曰老子行則滅跡立則隠影風俗通曰陳留有富室公年九十無子取田家為婦一交接而死後生男其女誣其滛佚有児争財數年不能决丞相邴吉曰聞老公子不奈寒又無影時嵗八月取同嵗小児解衣裸之此児獨言寒日中獨無影大小歎息因與其財抱朴子曰韓中丹久服立日中無影列仙傳曰河間王家老舍人自言父世見元俗無影王呼着日中實無影地鏡圖曰人行日月中無影者神仙人也與虛合體故居日月中無影履霜無跡火中無影也跡史記曰姜嫄為帝嚳元妃出野見巨人跡心欣然踐之而身動如孕期月而生后稷故詩曰履帝武敏歆武跡也王子年拾遺記曰石崇篩沉水之香如麋末布置席上使所愛者踐之無跡者即賜珍珠百琲若有跡者便節其飲食令體輕弱故中國相戲曰爾非細骨輕軀那得百琲珍珠又曰燕王時廣延之國獻善舞者二人王設麟文之席散荃蕪之香使二人舞其上彌日無跡體輕故也述征記曰齊有盤龍山上有大脚跡姜嫄所履盛宏之荆州記曰零陵縣石上有夸父跡又曰湘東隂山縣北數十里有武陽龍靡二山上悉生松柏美木龍靡山有石石上有仙人蹟及龍跡傳云昔仙人遊此二山常税駕此石又於其所得仙人遺詠太平御覽卷三百八十八
