  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_316-1a, image: WYG0895/WYG0895-0722a.png}
body:
  text: 太平御覽卷三百十六宋李昉等撰兵部四十七掩襲下掩襲下晉書曰石勒偽推奉晉幽州刺史王浚浚不疑勒於是輕騎襲幽州以火宵行至易水浚督䕶孫緯馳遣白浚引軍拒勒浚將佐咸請出軍擊勒浚怒曰石公來正欲奉戴我也敢言擊者斬乃命設饗以待之勒衆至薊叱門者開門疑有伏兵先驅牛羊數千頭聲言上禮實欲填諸街巷使兵不得發浚乃懼或坐或起勒入城升其㕔命甲士執浚立之於前數其罪惡而誅之遂陷幽州宋書曰劉裕秉政劉毅為荆州刺史每多異同之議裕帥兵討之遣禆將王鎮惡先襲至豫章口豫章口去江陵城二十里自鎮惡進路揚聲劉蕃上先是毅稱病表請從弟兖州刺史蕃為副毅謂信然不知見襲鎮惡自豫章口捨船步上小將蒯恩軍在前鎮惡次之舸留一二士卒之次也對舸岸上竪六七旗每旗下安一鼓語所留人計我將至城便長嚴令如後有大軍狀又分隊在後令燒江津船艦鎮惡逕前襲城語前軍若有問者但云劉兖州至津戍及百姓皆言劉蕃實上晏然不疑未至城五六里逢毅要將朱顯之與十許騎從者數十欲出江津問是何人答曰劉兖州至顯之馳前問蕃在所答云在後顯之既見軍不見蕃而見軍人檐彭排戰具又遥見江津船艦已被焚燒烟焰漲天而鼓嚴之聲甚盛知其非蕃上便躍馬馳去告毅外有大軍似從下上垂已至城江津船悉被火燒矣行令閉諸城門鎮惡亦馳進軍人縁城得入門猶未及下關因得開大城東門入城内毅凡有八隊餘已得戒嚴蒯恩入東門便北囘擊射堂前軍攻金城東門鎮惡入東門便直西擊金城西門軍分攻金城南門毅金城内所從舊將士猶有六隊千餘人食時鬭至中晡西人退散及歸降畧盡鎮惡入城便因風放火燒大城南門及東門又遣人以詔及赦文并髙祖手書凡三篋示毅皆曉視金城内亦未信髙祖自來鎮惡軍人與毅東來將士或有是父兄子弟中表親門者鎮惡命因鬭且共語並知劉裕自來人情離懈一更許㕔事前陣散潰毅左右猶閉東南閣拒戰鎮惡慮闇夜自相傷犯乃引軍出繞金城開其南面以為退路毅慮南有伏兵三更中率左右三百許人開北門突出城于佛寺自縊梁書曰侯景反陷建業髙州刺史李遷仕據大臯圖逆召髙梁太守馮寳寳欲往其妻沈氏止之曰刺史無故不合召太守此詐君欲為反耳頃者京師見逼羽檄徴兵遍于郡縣刺史稱疾不赴繕甲治兵今已備矣而更召君往必見留追君兵衆此意可知矣魚不可脱于水願且勿行遣使譎之曰身疾篤謹遣妻傳意并送土物以省之彼聞喜必無防為君取之如反掌矣寳從之于是沈氏自將千人皆藏短兵步擔雜物倡言珍貨先書報遷仕曰太守馮寳疾篤謹令妻沈氏傳唘并奉土貢以資軍費遷仕大悦出迎沈氏因釋擔出刃大破之遷仕脱身而遁沈氏入據其城盡収其衆後魏書曰晉王伏羅督髙平源州諸軍討吐谷渾慕利延軍至樂都謂諸將曰若從大道恐軍聲先振必當逺遁若􅅗軍出其非意此鄧艾擒蜀之計也諸將咸難之伏羅曰夫將軍制勝萬里擇利専之可也遂間道行至大母橋慕利延衆驚奔白蘭慕利延子拾寅走阿曲降其一萬餘落又曰陸俟代人也安定盧永劉超等聚黨以叛世祖詔俟以本官鎮長安使以方略㝎之于是俟單馬之鎮超聞之欣然以為無能為也既申揚威信示以成敗誘納超女外若姻親超猶自警初無降意俟乃率其帳下往見超觀其舉措超使人逆曰三百人以外當以弓馬相待三百人以内當以酒食相供乃將三百騎詣超超設備甚嚴俟遂縱酒盡醉而返後謂將士曰超可取也乃宻選精兵五百人激厲之言至懇切士卒答曰以死從公必無二也遂偽獵詣超與士卒約曰今㑹發機以當醉為限俟于是詐醉上馬大呼手斬超首將士皆應聲縱擊遂平之世祖大悦徴還轉外都大官又曰魏使蕭寳寅伐梁堰淮水濫溢將為揚徐之患寅于堰上流鑿新渠引注淮澤乃遣將士千餘人渡淮燒其營聚破賊斬其將軍而還又曰慕容白曜南征宋以酈範為副帥次無鹽宋將申纂慿城拒守議者僉以攻具未周不宜便進範曰今輕軍逺襲深入敵境無宜淹留久稽機候且纂必以我軍來速不去攻守謂方城可憑弱卒可恃今若外􅅗威形内整戎旅宻厲将士出其不意可一攻而剋之白曜遂􅅗軍偽退示以不攻纂果不設備于是即夜部分晨便騰城崇朝而剋又曰幽州刺史劉靈助以莊帝被爾朱兆所弑遂舉兵倡義諸州豪右咸相通結靈助屯於定州之安固魏遣將叱列延慶討之諸將謂延慶曰靈助善於卜占百姓信惑所在響應未易可圖若萬一戰有利鈍則大事去矣未若還師西入據關拒險以恃其變延慶曰劉靈助庸人也天道深逺豈其所識大兵一臨彼皆恃其妖術坐看符厭寧肯戮力致死與吾争勝負哉如吾計者欲出營城外詭言西歸靈助聞之必信而自寛􅅗軍往襲可一舉而擒乃出頓城西聲云將還簡精騎一千夜發詰朝造靈助壘戰於城北遂破擒之又曰宕昌羗獠甘作亂逐其王彌定魏遣將史寧討破之甘將百騎走投生羗鞏㢘王彌彌定數遂復位寧以未獲獠甘宻欲圖之乃揚聲欲還獠甘聞之復招引叛羗依山起柵欲攻彌定寧謂將軍曰此羗人入吾術中當進兵擒之耳諸將思歸咸曰羗之聚散無常依據山谷今若追討恐引日無成且彌定還得守藩將軍功已立矣獠甘勢弱定能制之此還軍策之上者寧曰一日縱敵數世之患豈可捨垂滅之冦更煩再舉人臣之禮知無不為此觀諸軍不足與計事也如更沮衆寧豈不能斬諸將遂進軍獠甘衆亦至與戰大破之生擒獠甘并鞏㢘王後周書曰劉亮初從賀㧞岳西征常先鋒䧟陣以功拜大都督岳被害亮與諸將迎太祖豳州刺史孫定兒據州不下涇秦諸州悉相與應衆至數萬推定兒為主以拒義師太祖令亮襲之定兒以義兵猶逺未之為備亮將二十騎先竪一纛於近城髙嶺即馳入城中定兒方置髙㑹卒見亮衆皆駭愕莫知所為亮乃麾兵斬定兒懸首號令賊黨仍遥指城外纛命二騎曰出追大軍賊黨大懼一時降附於是諸州皆歸欵伏太祖置十二軍諸將將之亮領一軍每征討與怡峯俱為騎將又曰賀㧞岳從爾朱天光討万俟醜奴宣言逺近曰今氣候漸熱非征討之時待至秋凉更圖進取醜奴聞之遂以為實分遣諸軍散農營於岐州之北百里綱州岳與天光諸軍盡發掩之醜奴乃棄平亭而走岳輕騎急追明日及醜奴於平凉之長坑一戰擒之隋書曰遂州獠反命將周法尚討之軍將至賊棄州城走散山谷間法尚捕不能得於是遣使慰諭假以官號偽班師自行二十里軍再舍􅅗遣人覘之知其首領盡聚歸柵聚飲相賀法尚選步騎數十人襲擊破之又曰李徹從元帥衞王爽擊突厥行軍總管李充言於爽曰周齊之世有同戰國中夏力分其來久矣突厥每侵邊諸将輙以全軍為計莫能死戰由是突厥勝多敗少所以每輕中國之師今者沙鉢畧悉國内之衆屯據要險必輕我而無備精兵襲之可破也爽從之諸將多以為疑唯徹奬成其計請以同行遂與充率精騎五千出其不意掩擊大破之沙鉢畧棄所服金甲􅅗草中而遁以功加上大將軍又曰李安為尚書右丞黄門侍郎平陳之役以為楊素司馬仍領行軍總管率蜀兵順流東下時陳人屯白沙安謂諸將曰水戰非北人所長今陳人依險泊船必輕我而無備以夜襲之賊可破也諸將以為然安率衆先鋒大破陳師高祖嘉之詔書勞曰陳賊之意自然水戰為長險隘之間彌謂官軍所憚開府親將所部夜動舟師摧破賊徒生擒虜衆益官軍之氣破賊人之膽副朕所委聞之忻然以位上大將軍又曰李宻擊宇文化及精兵良將多有死傷王充在東都乗其弊而擊之率步騎二萬營于洛南李宻軍于偃師北充􅅗遣二百騎夜伏於邙山自統其衆遲明渡水人奔馬馳以襲宻營宻遽出兵拒之陣未成列兩軍已合伏兵於北山中乗髙而下馳入宻營燒其廬舍宻見營中火發因而遁走又曰煬帝末年羣盜起遣將張湏陁擊盧明月於下邳賊連營十餘萬湏陁纔萬人力勢不敵去賊六七里立柵相持經十餘日糧盡退謂將士曰賊見兵却必輕來追我其衆若出營内即虛欲以千人襲營可有大利此乗危險誰能去者人皆莫對唯秦叔寳與羅士信皆曰願行於是湏陁委柵而遁使二人分領千兵漸伏於草既而明月悉兵追之叔寳士信馳至其柵柵門閉不得入二人起升其樓㧞賊幟各殺數人營中大亂叔寳斬關而納外兵因風縱火焚其營三十里烟焰漲天明月奔還湏陁反擊遂大破賊衆明月以數百騎遁去餘皆虜又曰李宻起兵于雍丘是時河南山東大水死者將半宻將李勣言於宻曰今人多阻饑若據得黎陽倉大事濟矣宻乃遣勣領麾下五千人自原武濟河掩襲即日剋之開倉資食一旬之間勝兵二十餘萬人唐書曰髙宗遣將薛仁貴郭待封等伐吐蕃大非川將赴烏海仁貴謂待封曰烏海險逺車行艱澁若引輜重將失事機又破賊即迴不煩轉運彼多瘴癘無宜久留大非川嶺上寛平足堪置柵可留二萬人作兩柵輜重並留柵内吾等輕鋭倍道掩其未整即撲滅之矣仁貴遂率衆先行至河口遇賊擊破斬之所獲甚衆收其牛羊萬餘頭又曰貞觀初突厥頡利可汗屯於定襄時諸部離散代州道行軍總管李靖選驍騎三千徑赴惡陽嶺出其不意擊之突利驚走靖遂收定襄之地頡利可汗懼退保鐵山遣使入朝謝罪請舉國内附又命靖往迎之頡利雖外請入朝猶持兩端待草青馬肥將踰沙磧其年太宗遣唐儉安修仁等往頡利慰撫之靖揣知其意謂副將張公謹曰詔使到彼虜必自寛若選精騎一萬齎二十日糧引兵自白道擊之破虜必矣公謹曰詔許其降行人在彼未宜置討靖曰此兵機也時不可失韓信所以破齊如唐儉等輩何足可惜督軍疾進師至隂山遇其斥候千餘帳皆俘以隨軍頡利見詔使大悦不虞官兵之卒至靖軍將逼其牙帳十五里虜始覺頡利乃走靖俘斬萬餘級獲口千餘萬得可汗妻隋義城公主殺之頡利奔吐谷渾西道行軍張寳相擒之以獻俄而突利可汗來降靖始復定襄恒安故地開拓北境自隂山以北至于大漠太宗初聞突厥國滅謂侍臣曰朕聞主憂臣辱主辱臣死者國家草創太上皇以百姓之故稱臣於突厥朕未嘗不痛心疾首志滅匈奴坐不安席食不甘味今暫舉偏師無往不捷單于欵塞恥其雪乎因大赦天下大酺五日又曰李愬將襲蔡州先七日使判官鄭澥告師期於裴度遂以李祐率突將三千為先鋒李忠義副之愬自帥中軍三千田進誠以後軍三千殿而行初出文成柵衆請所向愬曰東六十里而止至賊境曰張柴砦入之遂盡殺其戍卒令軍士少息分食繕覊靮甲胄發刃彀弓復建斾而出是日隂晦雨雪大風裂旗斾馬慄而不能躍卒苦寒抱戈僵仆者道路相望其川澤梁徑險夷張柴以東師人未嘗蹈其境皆謂投身不測初至張柴諸將請所止愬曰入蔡州取元濟也諸將失色監軍使哭而言曰果落李祐計中愬不聽促進師其下皆謂必不生還然已從愬之令無敢為身計者愬道分五百人斷洄曲路橋其夜凍死者十二三又分五百人斷朗山路自張柴行七十里比至懸瓠城夜半雪愈甚城傍有鵞鴨池愬令驚擊之以雜其聲賊恃吳房朗山之固晏然無一人知者李祐李忠義持钁坎城而先登敢鋭者從之盡殺守門卒而登其門留柝者以安之及鷄鳴雪亦止愬以衆人止元濟外宅田進誠續至乃合衆攻其子城子城防卒及雜役尚千餘人乗城拒戰初有告元濟不信又告城䧟矣元濟曰是洄曲子弟歸求寒衣耳及出㕔聞愬號令云常侍傳語乃曰何常侍乃得至此遂操弓挾矢麾其左右奴僕盡乗城而自督戰愬計元濟猶望董重質來救乃訪質家安恤之使其子持書禮召質質見子言城已䧟及元濟孤窘之狀又見李祐及諸將已立奇功乃慨然以單騎歸愬白衣叩伏愬前愬揖登堦以賔禮與之食時田進誠既毁其城外門得甲仗庫易其噐甲明日復薄城焚其南門百姓争負薪蒿以委之元濟於城上請罪進誠授梯而下之愬得元濟檻送京師其申光二州城鎮兵尚二萬餘人相次來降自元濟就執愬不戮一人吕氏春秋曰齊令章子將攻荆荆令唐篾將拒之與荆人夾泚水而軍章子令人視水可絶者荆人射之水不可得近有芻水旁者告齊候者曰水淺深甚易知荆人所盛守蓋其淺者也所簡守皆其深者也使載芻者與見章子因夜掩荆人所盛守果殺唐篾太公隂謀書曰武王伐紂兵至牧野晨舉脂燭摧掩不備太平御覽卷三百十六
