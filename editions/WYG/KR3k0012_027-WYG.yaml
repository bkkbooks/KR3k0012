body:
  text: 太平御覽卷二十七宋李昉等撰時序部十二冬下冬下吕氏春秋曰冬之德寒寒不信其地不成剛地不成剛則凍閉不開天地四時猶不能以不信成物又况人乎周書時訓曰小寒十二月節鴈北鄉鴈不北鄉即臣不懷忠鵲始巢鵲不巢即邊方不寧又曰一國不寧野雞始雊野雞不雊即國乃大水又云不雊來年雷乃收聲又曰大寒十二月雞始乳雞不乳即媱婦亂男鷙鳥厲疾鷙鳥不厲疾即國不除奸水澤腹堅不腹堅即言無所從梁元帝纂要曰冬曰𤣥英亦曰安寧亦曰𤣥冬三冬九冬天曰上天風曰寒風勁風嚴風厲風衰風隂風景曰冬景寒景時曰寒辰節曰𤣥節鳥曰寒鳥寒禽草曰寒卉黄草木曰寒木寒柯素木寒條又曰十月孟冬亦曰上冬亦曰陽月此時純隂用事嫌其無陽故曰陽月十二月季冬亦曰暮冬秒冬餘月暮莭暮歲風俗通曰夏宮冬律雨雹必降冬宮夏律雷必發聲夫音樂至重所感者天故曰知禮樂之情者能作識禮樂之文者能述又曰趙仲讓為梁冀從事中郎冬月坐庭中向日觧衣捕虱白虎通曰十月律謂之應鍾何鍾者動也言萬物應陽而動下藏也論衡曰陽氣動於下而隂氣應之也又曰十二月律謂之大呂何大者太也呂者拒也言陽氣欲出隂不許也呂之言拒者旅抑拒難之也太𤣥經曰㒺北方也冬也未有形也㒺無也未有形故為㒺也言冬萬物深藏黄泉也莊子曰魯遽弟子曰我得夫子之道吾能冬爨鼎而夏造氷矣魯遽曰是直以陽召隂非吾所謂道也又曰古者民不知衣服夏多積薪冬則煬之故命之曰知生之民又曰宋人有善為不龜手之藥者世世以洴澼絖為事吳人有百金買不龜手之藥以說吳王越有難吳王使之將令與越人水戰大敗越人裂地而封能不龜手一也或以封或不免於洴澼絖則所用之異也按絖古纊字絮也洴澼絖漂吹絮於水中也洴扶經切澼普厯切太公金匱曰夏桀之時有芩山之水桀常以十月發民鑿山穿陵通於河民諫曰孟冬鑿山穿陵是泄天氣發地之藏天子失道後必有敗桀殺之期年芩山崩為大澤湯率諸侯伐之文子曰冬氷可折夏條可結又曰民有飢者食不重味民有寒者冬不被裘與民同苦樂即天下無哀民列子曰瓠巴學琴於師襄當冬而叩徴絃以激蕤賔陽光熾烈堅氷立散孟子子産聽鄭國之政以其乘輿濟人於溱洧孟子曰子産惠而不知為政歳十一月徒杠音江成十二月輿梁成民未病涉也徒杠獨木小橋可通徒行輿梁通車橋十一月夏九月十二月夏十月鶡冠子曰斗柄北指天下皆冬鄧析子曰為君自當若冬日之陽夏月之隂萬物自歸莫之使也恬卧而功自成優游而政自治豈在振目搤腕手操鞭朴而後為治歟管子曰冬作土功發地藏則夏多暴雨秋霖不止鄒子曰冬取槐檀之火尹子曰冬為信北方為冬冬終也北伏方也故萬物冬皆伏貴賤若一美惡不惑信之至也傅子曰夏令披裘冬令披葛雖有嚴令終不肯從者逆時也韓子曰帝堯之王天下冬月鹿裘又曰管仲隰朋從桓公而伐孤竹春往冬返迷惑失道管仲曰老馬可用也乃放老馬而隨之遂得道行山中無水隰朋曰蟻冬居山之陽夏居山之隂蟻壤一寸而仞有水乃掘地遂得水荀卿子曰天不為人惡寒而輟其冬淮南子曰以冬鑠膠以夏造氷天道無私就也無私去也能者有餘拙者不足言以非時鑠膠造氷難成也天道無私就無私去能行道者有餘不能者不足又曰貧人冬則羊裘不蔽體短褐不掩形而煬竈口冬日之陽夏日之隂萬物歸之而莫使之然冬日人物歸陽夏日人物歸隂非使之然自有如是也又曰稷闢土墾草以為百姓力農然不能使禾冬生豈其人事不至哉其勢不可也又曰孟冬之月招搖指亥爨松燧火改火也又曰冬為權權者所以權萬物也又曰閶闔風四十五日不周風至四十五日廣莫風至坎卦之風不周風至則修宮室繕邉城立冬節土功其始故治宮室繕修邉城偹寇難也廣莫風至則閉關梁斷刑罰冬象閉藏不通關梁也罰刑之疑者於是順時而决之又曰古之君人者其慘怛於民也凡國有飢者食不重味民有寒者冬不披裘蓋與同其飢寒冬伐薪蒸大者曰薪小者曰蒸以為民資資用又曰北方水也其帝顓頊顓頊黄帝之孫以水德王號曰髙陽氏死而祀北方也其佐𤣥𠖇執權而治冬又曰冬行春令泄象春氣有散發泄也行夏令旱旱象陽炎行秋令霧秋氣隂故霧亂又曰太隂理秋則欲修備繕兵金德斷剛故修兵也太隂理冬則欲猛毅剛强純陽閉故水澤氷故剛强又曰北方之極有九澤窮夏晦之極北至令正之谷九澤北方之澤夏大也晦暝也有凍寒積氷雪雹霜霰漂潤羣水之野顓頊𤣥𠖇之所司者萬二千里顓頊黄帝之孫也以水德王天下號為髙陽氏死為北方水徳之帝其神𤣥㝠金天氏有適子曰昧為𤣥𡨕臨死祀為主水之神也月令曰申詳禁固閉藏修障塞繕闗梁禁外徒斷刑罰守門閭大捜客止交遊夜禁樂早閉晏開以索姦人已得報之必固天節已㡬刑殺無赦雖有欽恤之心親斷以法度毋發藏毋釋罪應隂殺也又曰十月失政四月草木不實實長也語林曰羊稚舒冬日釀酒令人抱甕湏臾復易人速成而味好説苑曰衛靈公天寒鑿池苑春諫曰天寒起役恐怠民也公曰寒乎春曰公衣狐裘坐熊席是以不寒民寒甚矣公乃罷役世説曰石崇為客冬天獲萍虀王愷乃宻賄崇帳下都督及御車人問所以對曰萍虀是搗韭雜以麥苗耳殷芸小説曰晉孝武帝即位時年十三四冬天晝日不著複衣但著單衣絹裙五六重夜則累裀褥謝公曰體宜令有常陛下晝過冷夜過熱非攝養之術帝曰夜靜故也謝公歎曰上理不减先帝崔鴻前趙録曰王延九歳事母母冬月思生魚杖延流血延尋汾河扣凌而哭得魚而饋母山海經曰鍾山之神名曰燭隂燭龍也是燭九有因名云視為晝暝為夜吹為冬呼為夏不飲不食不息息則為風息氣息也身長千里蔡邕月令章句曰冬終也萬物於是終也崔寔四民月令曰十月農事畢五糓既登家備儲畜乃順時令也祠令曰季冬藏氷仲春開氷並用黒牡秬黍祭司寒之神於氷室其開氷加以桃弧棘矢設於神座又曰七祀祀行以冬漢桓譚新論曰太原民以隆冬不火食五月雖有疾病急緩猶不敢犯為介子推故也漢崔寔政論曰僕前為五原太守土地不知緝績冬積草伏卧其中若見吏以草纒身令人酸鼻吾乃賣儲峙得二十餘萬詣鴈門廣武迎織師使巧手作機乃紡以教民織漢書于定國飲酒至數石不亂冬月治獄請讞飲酒益精明後漢書虞詡祖父經為郡縣獄吏案法平正務存寛恕每冬月上牀輙流涕隨之常稱曰東海于公髙為里門其子定國卒至丞相吾决獄六十年矣雖不及于公其庶乎子孫何必不為九卿耶故字詡昇卿晉皇甫謐𤣥晏春秋曰余家貧晝則愍於作勞夜則甘於疲寐以三時之務卷帙生塵篋不觧緘唯季冬末纔得一旬學爾晉嵇康集序曰孫登於汲郡北山土窟中住夏則編草為裳冬則披髪自覆論衡曰夫雲出於丘山降散則為雨矣人見從上則謂之天雨冬日天寒則雨凝為雪皆由雲氣發於丘山不從天降集於地明矣瑞應圖曰芝草常以六月生春夏紫秋白冬黒厯義䟽曰小寒月之初氣也隂氣小極故曰小寒大寒月之中氣也言十二月已半隂氣大極故曰大寒三輔决録曰孫辰字允公家貧不仕居社城中織箕為業明詩書為郡功曹冬月無被有藁一束暮卧其中旦収之㑹稽典録曰盛吉為廷尉每至冬月罪囚當斷其妻執燭吉持丹筆相向垂淚齊民要術曰孟冬之月天氣上騰地氣下降天地不通閉塞而成冬勞農以休息之黨正屬民飲酒正齒位次序也荆楚歳時記曰十二月八日沐浴轉除罪障干寳捜神記漢代十月十五日以豚酒入靈女廟擊筑而奏上弦之曲連臂踏地歌赤鳳來乃巫俗也皇覽塚墓記曰蚩尤塚在東郡夀張縣闞城中人常以十月朔望見有氣如匹絳自上屬下號曰蚩尤旗獨異志曰晉武帝哭羊祐冬月涕泗交下凝鬚為氷博物志曰宋國有田夫常衣敝緼僅以過冬暨春每日曝於日不知天下之有廣厦奥室繻纊狐貉顧謂其妻曰負日之暄人莫知者以獻吾君將有重賞乙巳占曰人君當以冬時候辰星為政則辰星見伏以時天子當以冬時飭死事恤孤獨察阿黨謹蓋藏修積聚坯城郭戒門閭修鍵閉慎管籥固封疆備邊境完要塞謹關梁塞蹊徑飭喪紀不為淫泆命伏藏之處講武習射御角力戰省婦事則辰星順行矣人君淫泆非道縱恣不禁近習不恤刑獄起衆徴發開泄藏氣則辰星失行伏見不常而有芒角則民多疾疫隨之以喪亡國不昌也人君以冬時行春令則歲星之氣干之色青而君憂刑獄變動生死不當地踈不宻人多流亡蟲蝗為灾水泉咸竭民多疥癘胎夭多傷國多固疾斷獄官凶以冬時行夏令則熒惑之氣干之色赤而小昩刑禍並起兵旱薦臻國多暴風方冬不寒氣霧𠖇昧雷廼發聲以冬時行秋令則太白之氣干之色白而有芒野戰並作獄訟軍旅同時而興雪霜不時小兵時起土地侵削四鄙入保輦下歲時記曰此月戸部奏大閱天下貢物於都堂其日放朝宰相與百官皆赴戸部宴飲一時特盛開元中曾以大閲一日貢物賜李林甫九州任土盡歸人臣之家國史書其事也晉陸機感時賦曰悲夫冬之為氣亦何􅉃懔以蕭索天悠悠其彌髙霧鬱鬱而四幕夜綿邈其難終日晼晚而易落敷曾雲之葳蕤墜零露之揮霍氷冽冽而寢興風謖謖而屢作謖起也所六切陸雲歳暮賦曰淪重陽於潜戸徴積隂於司寒袁宏北征賦曰子時天髙地涸木落氷凝繁霜夜灑勁風晨興日緩緩其已頽月亭亭而虛昇鮑照舞鶴賦曰窮隂殺節急景凋年凉沙振野箕風動天悠悠苦霧皎皎悲泉氷塞長河雪滿羣山既而氛昏夜歇景物澄廓星翻漢廽曉月將落感寒雞之早晨憐霜鴈之違漠臨驚風之蕭條對流光之照灼傅𤣥詩曰季冬時慘烈猛寒不可勝嚴風截人耳素雪墜地凝林上飛霜起波水自生氷未夕結重衾崇朝不敢興鮑照登峴山詩曰孟冬十月交殺盛隂欲終風冽無勁草寒盛有凋松軍井氷晝結士馬氈夜重晨登峴山首霜霧凝未通王褒歲暮詩曰歲晚悲窮律他鄉念索除寂寞灰心盡摧殘生意餘産空交道絶財殫宻戚踈空悲趙壹賦還著虞卿書太平御覽卷二十七
