body:
  text: 太平御覽卷九百三十宋李昉等撰鱗介部二龍下蛟螭龍下孫氏瑞應圖曰黄龍者神之精四龍之長也王者不漉池而魚得達深淵則應氣而游池沼酈善長水經注曰佛圖澄别傳曰石虎時自正月不雨至六月澄詣滏口祠稽首曝露即日二白龍降於祠下於是雨遍千里又曰石勒時天旱沙門佛圖澄於石井崗掘得死龍長尺餘漬之以水良久乃蘇呪而祭之龍騰空而上天即雨降因名龍崗又曰交州丹淵有神龍每旱村人以崗草置淵上流魚則多死龍怒即時大雨豫章記曰吳猛坐郭璞事被收寄載往南令舡勾開户船主聞船下有聲如在樹杪試窺之有二龍負船一宿至宫亭湖還豫章三秦記曰河津一名龍門巨靈跡猶存去長安九百里水懸船而行旁有山水陸不通龜魚之屬莫能上江海大魚集門下數千不得上上即為龍故云􅜣鰓龍門垂耳河津又曰龍首山長六十里頭入於渭尾達樊川頭高二十丈尾漸下髙五六尺土赤不毛云昔有黒龍從山南出飲渭其行道因成王山故以名也西河記曰張駿立謙光殿成後池水中有五龍晝日見移時乃滅水通變紅色駿即為銅龍以厭之駿卒不御此殿廣雅曰有鱗曰蛟龍有翼曰應龍有角曰虬龍無角曰螭龍方言曰龍未升天曰蟠龍齊諧記曰蛟龍畏棟樹葉五色絲漢武帝内傳曰王母乗紫雲之輦又駕九色之斑龍葛洪神仙傳曰費長房與壺公俱去后壺公謝而遣之長房憂不能到家公與所用竹杖騎之忽然而睡已到家擲所騎竹杖葛陂中顧之乃青龍也管輅别傳曰龍者陽精以潛於隂幽靈上通和氣感神二物相扶故能興楚國先賢傳宋玉對楚王曰神龍朝發崑崙之墟暮宿於孟諸超騰雲漢之表婉轉四瀆之裏夫尺澤之鯤豈能料江海之大哉王子年拾遺録曰方丈山一名蠻雉山東有龍場方千里有龍皮骨如山阜膏血如流水燕昭王時以龍膏為燈光清澄若水光熖五色人以為瑞沈懐逺南越志曰蟠龍身長四丈赤黑色赤帶如錦文常隨水而下入於海有毒傷人即死人物志曰神龍不處網罟之水鳳凰不翔罻羅之鄉愽物志曰昔禹平天下㑹羣臣於㑹稽之野防風氏後至殺之夏徳之盛二龍降之禹使范成光御之以行域外既周而還至南海經防風防風之神見禹使怒而射之有迅雷風雨二龍昇去二臣恐以刃自貫其心而死禹哀之乃㧞其刃療以不死之草而皆活是為穿匈民又曰龍肉已􅊽漬之則文章異苑曰陶偘嘗捕魚得一織梭還挂于壁有頃雷雨梭變成赤龍從屋騰躍而去任昉述異記曰漢和帝元年大雨有一青龍墮於宫中帝命烹之賜羣臣龍羮各一杯故李尤七命曰味兼龍羮楊衒之洛陽伽藍記曰西方烏埸國西有池龍王居之池邊有一寺五十餘僧龍王每作神變國王祈請以金玉珍寳投之池中後皆涌出令僧取之此寺衣食恃龍而濟世人名曰龍王寺又曰西方不可依山甚寒冬夏積雪山中有池毒龍居之昔五百商人止宿池側值龍忿怒汎殺商人槃陀王聞之捨位與子向烏埸國學婆門門呪四年之中盡得其術而復王位就池呪龍龍變為人悔過向王王乃捨之楚辭曰神龍失水而陸居為螻螘之所哉蛟禮記月令曰季秋伐蛟取鼉史記曰劉媪嘗息大澤之陂夢與神遇是時雷電暝晦太公往視則見蛟龍於其上已而有身遂産髙祖漢書曰武帝元封五年帝自潯江浮江射蛟龍獲之晉書曰周處字子隠義興陽羨人也父魴吳鄱陽太守處少未弱冠膂力絶人好馳騁田獵不修細行縱情肆慾州里患之處自知為人所惡乃慨然有改厲之志謂父老曰今時和嵗豐何苦而不樂耶父老歎曰三害未除何樂之有處曰何謂也荅曰南山白額猛獸長橋下蛟并子為三矣處曰若此為患吾能除之父老曰子若除之則一郡之大慶非徒去害而已處乃入山射殺猛獸因投水摶蛟蛟或浮或沉行數十里而處與之俱經三日三夜人謂之死皆相慶賀處果殺蛟而反家語曰竭澤而魚則蛟不處其淵山海經曰蛟似龍蛇而小頭細頸頸有白嬰大者十數圍卵生子如一二斛甕能吞人又曰禱過山有虎蛟魚身蛇尾音如鴛鴦淮南子曰蛟龍寢於泉而卵剖陵又曰一淵不兩蛟蛟魚之長其皮有珠今世以為刀劍之口是也一說魚二十斤蛟也一棲不兩雄一則是兩則争以喻日月不得並明一國不可兩君也又曰源流千里深淵百刃非為蛟龍也又曰山致其髙而雲雨起焉水致其深而蛟龍生焉君子致其道而福禄歸焉又曰君子之居民上若以腐索御奔馬雍容恐失民意若展足薄氷蛟在其下蛟龍薄皮有珠能害人故曰蛟在其下孫卿子曰積水成川蛟龍生焉吕氏春秋曰荆有佽飛者得寶劒於干將遂還及涉江至於中流有兩蛟夾繞其舩佽飛仗寶劍曰此中朽骨腐肉也赴江刺蛟殺之荆王聞之仕以執珪馬明生别傳曰明生捕蛟為蛟所傷道間見神女以肘後管中一丸藥與服即愈隨女入岱宗山石室金床玉几安期生從六七仙人見神女稱下官請陽九百六之數神女曰自頃四海水減溟湖成山連城之鯨萬丈之蛟不達斯運之度唯叩天索水辭訟紛紜有干上府煩於省察司隂亦疲於謹案矣西京襍記曰瓠子河決有蛟龍從九子自決中逆上入河濆沫流波凡數十里又曰董仲舒夢蛟龍入懐乃作春秋繁露裴淵廣州記曰新寧郡東溪甚饒蛟不時害人曽於魚梁上見之其長丈餘形廣如楯修頸小頭胸前赭背上青斑脇邊若錦尋陽記曰城東門通大橋常有蛟為百姓害董奉疏一符與水中少時見一蛟死而浮出博物志曰澹臺子羽賫千金之璧渡河河伯欲之陽侯波起兩蛟夾舩子羽左操劍擊蛟皆死既濟三投璧於河河伯三躍而歸之子羽毁璧而去又曰荆佽飛度江兩蛟夾其舩佽飛下劒盡斷其頭而風波静又曰東海有勇士菑邱訴者過神淵飲馬馬沉訴脱服㧞劍入水三日三夜殺二蛟一龍而出雷電隨而擊之七日七夜𦕈其左目又曰燕太子丹質於秦見遣而為機橋於渭將殺之蛟龍夾舉機不得發又曰人食鷰肉者不可入水為蛟龍所吞王子年拾遺錄曰漢昭帝常遊渭水使羣臣漁釣為樂時有大夫任緒釣得白蛟長三丈若天蛇無鱗甲首有一角長二尺軟如肉焉牙在脣外帝曰此魚䱉之類非禎祥也乃命太官為鮓骨青紫肉味甚美帝後思之使罾者復覔終不得也郭子横洞冥記曰文犀國去長安萬里在日南之南人七尺被髪至踵乗犀象以為車舡乗象入海底取寶宿蛟人之舍夕得淚珠則蛟人所泣淚而珠也亦曰泣珠續齊諧曰屈原五月五日投泊􅚒而死楚人哀之每至此日以竹桐貯粉米祭之漢武建中長沙區回白日忽見一士人自稱三閭大夫謂曰聞君常見祭甚善但常年所遺為蛟龍所竊若今有惠可以練葉塞其上五色絲縛之此二物是蛟龍所憚說文曰蛟龍屬也魚滿三千六百歲蛟為之長率魚而飛去㓜童傳曰魏太祖年十歳浴於譙水蛟來逼自奮水擊蛟乃退畢浴而還王韶之始興記曰雲水源自湯泉下流多蛟害厲濟者遇之必笑而沒盛宏之荆州記曰襄城北沔水極深有蛟為害太守鄧遐勇果時人方之樊噲㧞劍入水蛟遶其足遐自揮劍截蛟數叚流血成丹水自此無害劉敬叔異苑曰承陽人李増行經大溪見兩蛟在川引弓射之中一即死増歸因復出市有一女子素服銜涕捉所射箭増怪之問焉荅曰何用問為若是君箭便以相還授矢而滅増惡而驟返未達暴死於路劉義慶幽明錄曰晉安帝隆安初曲阿民謝盛乗舩入湖採菱見一蛟來向舩舩廻避蛟又從其後盛便以义殺之懼而還家經年無患至元興中普天亢旱盛與同旅數人步至湖中見先义在地拾取之云是我义人問其故具以實對行數步乃得心痛還家一宿便死續捜神記曰長沙有人忘其姓名家住邉江有女子渚次澣沙覺身中有異復不以為患遂姙身生三物皆如鮧音提魚甚憐異之乃着藻槃水中飬之經三月此物遂大乃是蛟子字大者為當洪次者名被祖小者名揉岸天暴雨水三蛟一時俱出遂失所在後天欲雨此物輙來女亦知當來便出望之蛟子亦出頭望母良久方復去經年後女亡三蛟子至其墓所哭之經日乃去聞其哭聲狀如狗號又曰安城平都縣尹氏居在郡東十里日黄屯尹佃舍在焉元嘉二十三年六月中尹兒年十三守舍見一人可年二十許騎白馬張繖及從者四人衣並黄色從東方而來於門呼尹來暫寄息因入舍中庭下坐牀一人捉繖覆之尹兒㸔其衣悉無縫馬五色斑似鱗甲而毛有頃雨氣至此人上馬去顧語尹兒曰明日當更來尹兒觀其去西行躡虛而漸升須㬰雲四合白晝為之晦暝明日大水暴出山谷沸涌邱壑淼漫将掩尹舍忽見大蛟長三丈餘盤屈庇其舍道焉任昉述異記曰夏桀之末宫中有女子化為龍不可近俄而復為婦人甚麗而食人桀命為蛟妾告桀吉凶之事唐明皇襍錄曰開元中有黄門奉使自交廣而至方拜舞於殿下時國毉紀周顧之謂上曰此人腹中有蛟龍明日當産一子則不可活也上驚問黄門曰有疾否曰臣馳馬大庾嶺時當大熱既困且渇因於路旁飲野水遂腹中堅痞如石周即以消石雄黄煮而飲之立吐一物不數寸其大如指細視之鱗甲具備楚辭曰麇何食兮庭中鮫何為兮水上螭淮南子曰乗雲車雲雷之車服應龍服轅中也應龍有翼之龍叅青蟉青虬青龍屬絶瑞席羅圖蘿圖車上蓆也雲黄路雲黄所乗路車前白螭白螭先𨗳後青虵吕氏春秋曰季孫氏刦公家奪公家政事而自專孔子欲論術則見外孔子欲以進而見逺外於是受養而便說孔子欲受其養言而季子便說魯國以訾孔子訾毁孔子曰龍食乎清而游乎清螭食乎清而游乎濁魚食乎濁而游乎濁今邱上不及龍下不若魚邱螭耶夫欲立功者豈得中繩哉救溺者濡追逃者趨王子年拾遺錄曰崑崙山第三層有螭潭百里多龍螭皆白色千歳一蛻其五臟此潭左側有五色石云是白螭之腹腸化為石楚辭曰乗水車兮荷盖駕兩龍兮驂螭又曰駕青虬兮驂白螭吾與重華遊兮瑶之圎宋玉髙唐賦曰乗玉輿兮駟蒼螭太平御覽巻九百三十
