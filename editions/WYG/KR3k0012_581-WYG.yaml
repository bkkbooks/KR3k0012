  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_581-1a, image: WYG0898/WYG0898-0322c.png}
body:
  text: 太平御覽巻五百八十一宋李昉等撰樂部十九簫笳笙竽簧塤簫釋名曰簫肅也其聲肅肅清也爾雅曰大簫謂之䇾小者謂之筊郭璞注曰䇾二十二管長尺四寸筊十六管長尺二寸簫一名籟也博雅曰簫大者二十三管無底小者有底十六管通禮義纂曰伏羲作簫十六管蔡邕曰簫編竹有底大者二十三管小者十六管長則濁短則清以蜜蠟實其底而増減之則和然則邕時無洞簫者矣易說曰夏至之樂補以簫簫長尺四寸鄭𤣥曰簫亦管形似鳥翼鳥火禽也火數七夏時火用事二七十四簫之長由此也三禮圖曰雅簫長尺四寸二寸四彄頌簫二寸十六曲仲夏之月令樂師均管簫長則濁短則清也以蜜蠟實其底而増減之則和管成而音定無所復調當與琴瑟相参風俗通曰舜作簫其形参差象鳳翼十管長尺二寸白虎通曰簫者仲吕之氣也尚書益稷曰簫韶九成鳳凰來儀毛詩臣工有瞽曰既備乃奏簫管備舉春秋說曰夏至作樂間簫笙周禮春官小笙師曰小笙師掌吹簫史記曰伍子胥鼓腹吹簫乞食於呉市又曰周勃吹簫給䘮事謝承後漢書曰靈帝善鼓琴吹洞簫丹陽記曰江寧縣南三十里有慈姥山積石臨江生簫管竹王褒洞簫賦所稱即此也其竹圓緻異於衆處自伶倫採竹嶰谷其後唯此幹見珎故厯代掌給樂府而俗呼曰鼓吹山涼州記曰吕纂咸寧二年有盗發張駿墓得白玉罇玉笛紫玉簫列仙傳曰簫史者秦繆公時人善吹簫能致孔雀白鶴繆公女弄玉好之以妻焉其後隨鳳去故秦人作鳳女祠於雍宫代有簫聲江表傳曰孫權攻合肥不下而還休兵皆上道權與吕蒙等在後魏将張遼奄至鼓吹驚怖不能復鳴簫唱甘寧㧞刀欲斫之於是始作之荘子曰南郭子綦謂顔成子遊曰汝聞人籟而未聞地籟汝聞地籟而未聞天籟郭象曰人籟簫也秦子曰一人執規十手自圓一人吹簫長短皆應傅子曰馬先生能使木人吹簫比妙般輸墨翟不劣古矣笳杜贄笳賦序曰昔伯陽避亂入戎思懐土風遂建斯樂美其出於戎貉之俗有大韶夏音曹嘉之晉書曰劉疇曽避亂塢壁賈胡百數欲害之疇無懼色援笳而吹之為出塞之聲動其遊客之思於是羣胡皆泣而去蔡琰别傳曰琰字文姬先適河東衛仲道夫亡無子歸寧於家漢末亂為胡騎所獲在左賢王部伍中春月登胡殿感笳之音作十八拍晉先􅅙儀注曰車駕住吹小菰發大菰即笳也又曰胡笳漢書錄有其曲不記所出本末笳者胡人巻蘆葉吹之以作樂也故謂胡笳夏仲御别傳曰激南楚吹胡笳風雲為之揺動星辰為之變度世說曰劉越石為胡騎所圍數重城中窘廹無計越石始乗月登樓清嘯胡賊聞之皆悽然長嘆中夜奏胡笳賊皆流涕人有懐土之思向曉又吹之賊並棄圍奔走笙釋名曰笙生也象物管地而生以匏為之其中空以受簧爾雅曰大笙謂之巢小者謂之和郭璞曰大笙則管匏中施簧也管端大者十九簧小者十三簧犍為舍人曰大笙音聲衆而髙也小者音相和也白虎通曰笙之言施也牙也萬物始施而牙生者太簇之氣也萬物象之生也故曰笙有七正之莭焉有六合之和焉天下樂之故謂之笙古之善吹笙者有王子晉見列仙傳周靈王之太子也毛詩鹿鳴曰我有嘉賓鼓瑟吹笙吹笙鼓簧承筐是将尚書益稷曰笙鏞以間鳥獸蹌蹌孔安國曰間迭也吹笙擊鐘鳥獸仰徳相率而舞蹌蹌然也禮記檀弓上曰孔子既祥五日弹琴而不能成聲十日而成笙歌又曰女媧之笙簧周禮曰春官笙師掌教吹笙鄉飲酒曰笙入奏南陔白華邯郸綽五經析疑曰夫笙者法萬物始生導達隂陽之氣故有長短黄鍾為始象法鳳凰蔡邕月令章句曰季秋之月上丁入學習吹笙所以通氣也管簫笙竽塤箎皆以吹鳴者也穆天子傳曰西王母吟月吹笙鼓簧簧在笙中𠂻心翔翔民之子惟天之望吕氏春秋曰墨子見荆王衣錦吹笙竽易通卦騐曰冬至吹黄鍾之律間音以竽補竽長四尺二寸者周禮曰笙師掌教吹竽竽三十六簧也禮記月令曰仲夏之月命樂師調笙竽風俗通曰謹按禮記竽竹簧長四尺二寸今二十三管世本曰隋作竽楚辭曰代奏鄭衛鳴竽張伏獻駕辯楚勞商伏羲作琴造駕辯之曲楚人自作勞商之歌皆妙曲也通禮義纂曰漢武帝時丘仲作竽三十六管樂府圖曰吹笙有以知法度竽音調則度數得見列仙傳曰商丘子胥者髙邑人也好牧豕吹竽年七十娶婦不老邑人乃竒怪之從受道問其要言但食木菖蒲根飲水不饑不老如此傳世見之三百餘年貴戚富室聞之取而服之不能終嵗輒止惰慢矣謂将復有匿術也文心雕龍曰林籟結響調如竽琴淮南子曰孟夏南風御女衣赤采吹笙竽煦也立春之氣煦生萬物也管三十六宫管在左右和十三宫管在中今之竽並以木代瓠而漆之無復八音矣荆梁之南尚仍古制桓譚新論曰成少伯工吹竽見安昌侯張子夏鼓琴謂曰音不過千曲以上不足以為知音韓子曰齊宣王使人吹竽有三百人南郭處士未為王吹粟食與三百人等宣王死涽王即位一一聽之處士走或云韓昭侯田巖使人一一聽之乃知其濫吹也新序曰楚王使謁者徐光迎方與盲人吹竽者也龔遂乃止簧毛詩曰巧言如簧又曰君子揚揚左執簧右招我由房漢武内傳曰西王母命侍女許飛瓊鼓震靈之簧世本曰女媧作簧三禮圖曰雅簧上下各六神仙傳曰王遥有竹箧未甞開後将茅子擔箧入石屋中有二人遥自取一枚以二枚與室中人對共鼓之潜夫論曰簧削銳其頭有傷害之象塞蜜蠟有口舌之類皆非吉祥善應也塤世本曰塤暴新公所造亦不知何人周畿内有暴國豈其時人也本作壎許袁切圍五寸半長三寸半凡六孔宋均注云暴公國平王諸侯也樂書曰壎者喧也周平王時暴新公燒土為之說文曰壎為樂器亦作塤也壎謂聲濁而喧喧然今雅樂部用也爾雅釋樂曰大塤謂之嘂即壎也銳上平底形象鐘平大者如鵝子聲合黄鍾大吕也小者如雞子聲合太簇夾鍾也皆六孔與篪聲相諧故曰壎篪相應風俗通曰塤燒土為也圍五寸半長一寸半有四孔其二通凡六孔也塤一作壎也太平御覽巻五百八十一
