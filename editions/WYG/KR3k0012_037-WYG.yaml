body:
  text: 太平御覽卷三十七宋李昉等撰地部二地下土壤塊塵地下淮南子曰東方之極自碣石碣石山在東北海中過朝鮮朝鮮東夷貫大人之國東方有大人之國也東至日出之次扶木之地青土樹木之野皆日所出之地大皥勾芒所司者萬二千里其令曰挺羣禁開閉闔通窮窒達障塞行優㳺棄怨惡解赦罪免憂患休罰刑開關梁宣出財和外怨撫四方行柔惠止剛强南方之極自北户烏孫之界北户曰在其北嚮以為户貫顓頊之國南方有顓頊之國也南至委火炎風之野赤帝祝融之所司者萬二千里赤帝著明審諟也祝屬也融工也萬物盛長屬續而工也其令曰爵有徳賞有功惠賢良救饑渴舉力農拯貧窮惠孤寡飬老疾出大禄行大賞起毁宗立無後封建侯立賢輔中央之極自崑崙東絶恒山崑崙在西方恒山北岳也日月之所道謂二十八宿舍在地之分也江漢之所出人民之野五榖之宜龍門河濟相貫以息壤堙鴻水之洲禹以息土堙洪水以為中國九州洲水中可居之地東至於碣石黄帝后土之所司者萬二千里黄中色帝道是也道在物故稻后也其令曰平而不阿明而不苛包裹覆露無不囊懐普天無私正静以和行糜粥養老衰弔死問疾以送萬物之歸西方之極自崑崙絶流沙沉羽沈羽弱水也其弱至沈毛羽也西至三危之國石城金室飲氣之民不死之野少皥蓐收之所司者萬二千里少皥白帝之號少皥隂用事物告成也蓐收也萬物蓐收可用之其令曰審用法誅必辜備盗賊禁奸邪勑羣牧謹貯聚修城郭補缺竇塞蹊徑隄溝瀆止流水壅谿谷守門閭陳兵甲選百官誅不法北方之極自九澤九澤北方之澤也窮夏海之極夏海大海也北至令支之俗丁令支盡北海胡地有凍寒積氷雪雹霜霰漂潤羣水之野顓頊𤣥𡨕所司者萬二千里顓頊黒帝之號頊大言大隂用事振翕而寒也隂閉不見故神為𤣥𡨕也其令曰申羣禁固閉藏修障塞繕關梁禁夜樂早閉晏開以索姦人姦人已得執之必固天節已㡬㡬終也刑殺無赦雖有盛尊之親斷以法度毋行水毋發藏毋釋刑罰又曰任一人之能不足以治三畆之宅也循道理之數因天地之自然則六合不足均也均平也又曰盧敖游乎北海盧敖燕人秦始皇帝以為博士使求神仙亡而不返也徑乎太隂入乎𤣥關太隂北方𤣥也至於蒙榖之上見一士焉深目而𤣥鬢渡注而鳶肩豐上而殺下軒然迎風而舞顧見盧敖慢然下臂遯逃水涯盧敖就而視之方卷龜殻而食蛤蜊蛤蜊海蚌盧敖與之語曰唯敖為背羣離黨窮觀於六合之外者非敖而已乎敖㓜而好逰至長不渝解周行四極唯北隂之不闚今卒睹夫子於是子殆可與敖為友乎若士者􅀢音拳然嘆曰噫子中州民寧肯而逺至此此猶光日月言太陽之地尚見日月而載列星隂陽之所行四時之所生此其比夫不名之地猶窔奥言我所㳺不可名字之地比盧敖之所行則如窔奥中也若我南游乎罔䍚之野北息乎沉墨之鄉西窮𡨕𡨕之黨東開澒濛之光此其下無地而上無天聽焉無眗此其外猶有狀沐之汜狀沐四海與天之際流聲也汜崖也其餘一舉而千萬里千萬里狀沐之外也吾猶未能之存吾尚未至此地今子游始此乃於語窮觀豈不亦逺哉然子處矣哉與汗漫期於九垓之上汗漫不可知之也九垓九天也吾不可以久居士舉臂而竦身遂入雲中盧敖仰而視之弗見乃止駕止其所駕而居尸子曰太極之内有君長者東西二萬八千里南北二萬六千里故曰天左舒而起牽牛地右闢而起畢昴孟子曰天子之地方千里不千里不足以待諸侯諸侯之地方百里不百里不足以守宗廟之典籍呂氏春秋曰凡四極之内東西五億九萬有七千里南北五億有九萬七千里又曰長廬子曰山岳河海水金石火木此積形成乎地也又曰冬之徳寒寒不信則地不成剛地不成剛則凍閉不開天地之大四時之化而猶不能以不信成物又况於人關令内傳曰地厚萬里其下得大空大空角四下有自然金柱輙方圓五千里土釋名曰土吐也吐生物也徐州貢土五色色有黄青白赤黑也土赤者鼠肝色也土黑色曰盧盧然解散也土黄而細宻曰埴埴膩也如脂之膩也土色青曰梨似䔧草也土色白曰漂漂輕散也尚書禹貢曰冀州土白壤孔安國曰無塊曰壌兖州土黑墳孔安國曰色黑而墳起青州土白墳徐廣曰黎土也揚州土塗泥塗泥水泉濕也荆州土塗泥豫州土惟壌下墳壚孔安國曰壚䟱也馬融曰豫州地青三等下者墳也雍州土黄徐州土赤埴墳謝承註曰埴音志梁州土青黎孔安國曰色青黑又洪範曰五行其五曰土爰稼穡稼穡作甘孔安國曰土可以種可以歛甘味生百榖尚書帝命驗曰土者金之父也周書作雒曰周公建太社於國中其壝東青土南赤土西白土北驪土中央以黄土將建諸侯鑿其方一面土苴以白茅以土封之故曰裂土詩曰普天之下莫非王土又曰孔樂韓土川澤滸滸周禮地官上曰大司徒辨十二土之名以相民宅知其利害以任土事禮記曰範金合土以為臺榭又曰土弊則草木不長又曰地一撮土之多及其廣厚載華嶽而不重又曰衆生必死死必歸土此之謂鬼骨斃於下隂為野土隂䕃也蔡邕月令章句曰色别曰土言五方土色各異也崔寔四民月令曰正月雨水地氣上騰土長昌撅陳根可拔春秋元命苞曰土為言吐也子成父道也其氣精以附也陽立於三故成生其立字十加一為土春秋繁露曰天有十端其土為之一端春秋考異郵曰后族専則土踊宋均注曰隂盛也論語里仁曰君子懐徳小人懐土家語曰孔子曰堯以土徳王而尚黄黄土之色也又曰食土者無心而不息又曰宰我問於孔子曰聞鬼神之名而不知其所謂敢問孔子曰人生有魂氣有魄氣也神之盛也衆生必死死必歸土此之謂魄魂氣歸天此之謂神戰國䇿曰孟嘗君將入秦蘇代曰臣來過於淄上有土偶人與桃梗相與語桃梗語土人曰子西岸上土也八月降雨淄水至則爾殘矣土泥曰吾西岸之土也土則復為岸矣今子東國之桃梗也雨下水至流子而去則水漂漂將何如邪漢書張釋之傳曰文帝拜釋之為廷尉人有盗髙廟坐前玉環文帝怒下廷尉治奏當棄市上大怒釋之頓首謝曰假令愚民盗長陵一抔土陛下復何以加其法乎後漢書曰朱浮與彭寵書曰亦猶河濵之人捧土以塞孟津謝承後漢書曰東郡趙資病自置小素棺使人取乾黄土二十石細擣篩之遺令亡後置土棺底厚一尺内屍於中以土壅之又曰范訓母亡以布囊盛土負以成壙魏志曰魏明帝起芳林園建昭陽殿公卿以下至於學生莫不展力帝乃躬自握土以率之後漢書曰髙昻父次同語人曰吾四子皆不肖我死後豈有人與我一鍬土邪及次同死昂大起塜封之曰此老平生畏無一鍬土今日被壓竟知之否唐書天寳十三載冊楊國忠為司空其日雨土江表傳曰孫權討袁術舉兵攻睆城術閉門自守粮食盡士女或丸土而吞之晉安帝紀曰劉敬宣在鮮卑夢丸土而服之既而占焉或荅曰此服土吞丸也既覺而喜曰丸者桓也既吞矣我復本土矣旬日中聞桓𤣥敗得來歸世本曰廪君名務相姓巴與樊氏暉氏相氏鄭氏凡五姓俱出皆争神以土為船雕文畫之而浮水中其船浮立為君他船不能浮獨廪君船浮因立為君蜀王本紀曰蜀王獵於褒谷見秦王以金一筒遺蜀王蜀王報以禮物盡化為土秦王大怒臣下拜賀曰土地也今秦當得蜀矣崔鴻十六國春秋後趙錄曰建武十二年沙門吳進言於帝曰胡運將衰晉當復興苦役晉人以壓其氣帝於是使尚書張郡發近郡男女十六萬車十萬乘運土築華林園及長墟一作墻於鄴北廣長五十里白虎通曰土在中央中央者主吐含萬物聖證論曰孔鼂云能吐生百榖謂之􅁟雷煥别傳曰煥與張華見異氣起斗牛之間煥曰此寳劍也拜煥豐城令到縣掘獄基入四十餘尺得一石函中有雙劍琢錯文采翳而未明初經南昌遣人取西山北巖下土二升黄白色拭劍光艶照耀莫不驚愕張公得劍喜置坐側曰此土南昌西山北巖土也不如華隂山赤土封一斤與君荅書曰詳觀豐城劍真干將也君更用赤土磨拭愈益精明晉書苻堅傳曰初秦之未亂也關中土無火而煙氣火起數十里月餘不滅宋躬孝子傳曰宗承字世林父資䘮𦵏舊瑩負土作墳不役童僕一夕間土壤髙五尺松生焉荆州先徳傳曰羅獻守巴東吳遣盛曼説獻合從之計詣獻求借城門獻遣參軍楊宗謾曰城中土一撮不可得何言城乎三輔舊事曰成帝作延陵及起廟竇將軍有青竹田在廟南恐犯蹈之言作陵不便乃徙作昌陵取土十餘里土與粟同價關中記曰未央宫蕭何所造周廽二十三里疏龍首山土為殿基宣城記曰江矩吳時為廬江太守以清稱徵還船輕皆載土時嵗暮逐除者就乞所獲甚少江乃語之逐除人見而去盛𢎞之荆州記曰武當縣有一谿岸土色鮮黄乃可噉義興記曰陽羡縣塘西潜壤中有黄土色如精金法顯記曰阿育王昔在小兒時當道戲遇迦葉佛乞食小兒欣喜即以一掬土施佛佛持還泥經行地因此果報作戲輪王晉太康地記曰城陽姑募縣有五色土吴郡記曰吳縣餘杭山出白土光潤如玉墨子曰商王紂不徳雨土於幾内孫卿子曰孔子謂子貢曰賜未知為人下者其猶土也深掘之而得甘泉樹之而五穀蕃草木植焉禽獸育焉生則主焉死則入焉多其功而不德為人下者猶土也韓詩外傳說苑並載也申子曰四海之内六合之間曰奚貴曰貴土土食之本也淮南子曰伊尹曰興土功也修脚者使之蹠鏵強脊者使之負土淮南萬畢術曰東行馬蹄中土令人卧不起取東行白馬蹄下土三家井中泥合土而和之置臥人臍上即不能起又曰竈之土不思故鄉取竈前土三寸方半寸厚一寸將之逺出令人不思故鄉也裴𤣥新言曰俗間有土公之神云土不可動𤣥有五嵗女孫卒病詣市卜云犯土𤣥即依方治之病遂愈然後知天下有土神矣物理論曰㳺濁為土土氣合和而庶類自生抱朴子曰土飯瓦胾不療於飢壤説文曰壤軟土也尚書康誥曰賔奉珪幣執壤奠孔安國注曰賔諸侯執壌地所出而䞇奠尚書孔安國注曰土無塊曰壤周禮地官上司徒職曰大司徒辨十二壤之物而知其種教稼穡樹藝史記曰李斯上書曰泰山不讓土壤故能成其髙河海不擇細流故能就其深王隠晋書解結問别駕治中曰河北白壤髙良何故少人士每以三品為中正山海經曰洪水滔天鯀竊帝息壤堙洪水不待帝命祝融殺鯀于羽郊郭璞注曰息壤謂土自長故可以堰水也漢元帝時臨隂縣地埇長六里髙二丈即息壤也帝王世紀曰禹𦵏㑹稽下不及泉上不通臭既𦵏收餘壤為壟蕭廣濟孝子傳曰巴郡文讓母死墳土未足耕一畆地為壤羣鳥數千銜所作壤以著墳上關中記曰長安地皆黑壤城今赤如火堅如石管子曰蟻冬居山之陽夏居山之隂蟻壤寸而有水乃掘遂得水塊禮記檀弓記曰寢苫枕塊左傳曰晋文公過衛出五鹿乞食於野野人予之塊公怒舅犯曰天賜也稽首受而載之國語楚靈王不君三軍叛王于乾谿王親獨行見其㳙人疇枕其股而寢于地王寐疇枕王以塊而去之徐整長厯曰黄帝時風不鳴條雨不破塊也淮南子曰土勝水者非一墣塞江也塵詩曰無將大車維塵𡨕㝠禮記曰前有埃塵則載鳴鳶鄭𤣥注曰鳶鳴則將風又曰為長者糞之禮必加箒於箕上以袂拘而退其塵不及長者左傳曰晋楚戰狐毛設二斾而退之欒枝使輿曵柴而偽遁曵柴起塵者詐言聚衆徒又曰潘黨望其塵使騁而告曰晋師至矣楚人懼遂出陳史記曰鈎弋夫人死雲陽暴風揚塵前漢書曰長安中奸猾浸多受財報仇相與探丸得赤丸者斫武吏黑者斫文吏城中薄暮起塵死傷横道枹鼓不鳴謝承後漢書曰范史雲為萊蕪長閭里歌之曰甑中生塵范史雲魏志曰嵗西北大風塵埃蔽天十餘日間何晏乃誅晋書王導傳曰庾亮以望重地逼出鎮於外南蠻校尉陶稱聞説亮當舉兵勸導宻為之防導曰吾與元規休戚是同悠悠之談宜絶智者之口元規若來吾便角巾還第復何懼哉時亮執朝廷之權趨向者多歸之導内不能平常遇西風塵起舉扇自蔽徐曰元規塵汙人博物志曰徐州人謂塵土為蓬塊吳人謂塵土為埃坱崔鴻十六國春秋前秦録曰慕容冲叛苻堅遣平原公暉討之冲乃令婦人各將一囊盛塵皆令騎牛服文采衣執持長槊於陣後冲晨攻暉兵刃交接昌言班隊何在於是奔競而進皆毁囊揚塵埃霧連天莫測多少暉衆大潰家語曰顔囘拾甑中塵𤣥晏春秋曰余家素貧晝則苦於作勞夜則甘於疲寢三時之際書皆生塵山海經曰黒水之南有𤣥虵食塵又曰大人國有青虵頭方食塵帝王世紀曰黄帝夢大風吹天下塵垢皆去又夢人執千鈞之弩驅羊數萬羣帝嘆曰風為號令垢去土后在也豈有姓風名后者哉千鈞之弩異力能逺驅羊數萬羣牧民為善天下豈有姓力名牧者哉得風后於海隅得力牧於大澤神仙傳王方平曰聖人言東海中行復揚塵老子曰和其光同其塵莊子曰野馬也塵埃也淮南子曰地不滿東南故水潦其塵埃歸焉又曰蒙塵而欲無昧涉水而欲無濡不可得也林語曰劉道真年十五六在門前弄塵垂鼻涕至胸葛洪肘後方曰治暍死方取道中熱塵土以積暍人心下即活楚辭曰安能以皓皓之白蒙世俗之塵埃乎宋謝莊月賦曰陳王初䘮應劉端憂多暇緑苔生閣芳塵凝榭曹子建洛神賦曰羅襪生塵古詩云君為清路塵妾為濁水泥又曰京洛多風塵素衣化為緇世説虞公善歌發聲動梁塵李康遊仙序曰人生天地之間若流電之過户牖輕塵之棲弱草兵書曰名將望塵知馬步之多少也晋書曰潘岳謟事賈謐望塵而拜又曰簡文帝性冲澹所居凝塵滿席湛如也謝繹蘭亭詩曰千載同一朝沐浴陶清塵太平御覽卷三十七
