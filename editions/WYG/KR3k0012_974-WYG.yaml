body:
  text: 太平御覽卷九百七十四宋李昉等撰果部十一枳椇棎蒳木威榞木朹棪楊桃楊榣冬熟猴闥關桃土翁狗槽雞橘猴惣多南王壇三廉鬼目甘蔗甘藷燕薁簾薑枳椇毛詩嘉魚南山有臺曰南山有枸北山有楰又詩疏曰枳枸樹高大如白楊所在皆有子着支端支柯不直噉之甘美如飴八九月熟江南特美今官園種之謂之木蜜能令酒味薄若以為屋柱則一屋酒皆薄禮記曲禮下曰婦人之贄椇榛脯脩棗栗廣志曰枳椇葉似柳子似珊瑚其味如蜜十一月熟樹乾者益美出南方大如指頭崔豹古今注曰枳椇子一名樹蜜一名木餳實形拳曲核在實外味甜美如餳蜜一名白石一名木石一名枳椇也棎薛塋荆揚以南異物志曰棎子樹産山中實似梨冬熟味酸丹陽諸郡有之蒳音納異物志曰蒳草樹果如栟櫚而小三月採其葉細破乾之味近苦并雞舌香食之益善也顧徽廣州記曰山㯽榔大于大蒳子蒳子土人亦呼為㯽榔左思吳都賦曰藿蒳豆䓻木威顧徽廣州記曰餘甘甘蔗木威黄皮其味殊苦又曰木威髙丈餘子如橄欖而堅削去皮以為㮏榞木吳録地理志曰盧陵南郡雩都縣有榞樹其實如甘蕉而核味亦如之朹音求爾雅曰朹檕音計梅也郭璞注曰朹樹狀似梅子如指頭可食赤色似小也棪爾雅曰棪㯈其山海經曰堂庭之山多棪木曹毗魏都賦曰果則谷棪山楟音停楊桃臨海異物志曰楊桃似南方橄欖子其味甜常五月十月熟諺言楊桃無蹙一嵗三熟其色青黄核如􅀥核又曰楊桃子生晉安侯官縣一小樹得數十石實大三寸可蜜藏之庾仲初楊都賦曰楊桃枇杷楊榣臨海異物志曰楊榣有脊子生樹皮中其體雖異其味無竒長四五寸色青黄味甘也冬熟臨海異物志曰冬熟如指大色赤其味甘勝梅猴闥臨海異物志曰猴闥子如指頭大其味苦可食關桃臨海異物志曰關桃子其味酸土翁臨海異物志曰土翁子如漆子大熟時甜酸其色青黑狗槽臨海異物志曰狗槽子如指頭大色赤其味甘雞橘臨海異物志曰雞橘子如指頭大味甘永寜南界中有之猴惣臨海異物志曰猴惣子如指頭大與柿相似其味不减於柿多南臨海異物志曰多南子如指頭大其色紫味甘與梅子相似晉安侯官界中有之王壇臨海異物志曰王壇子如􅀥大其味甘晉安侯官越王祭壇邉有此果無知其名因見生處遂名王壇其形小于龍眼有似木瓜七月熟甘美也王彪之閩中賦曰王壇侯果楊都賦曰果則龍目荔枝王壇丹橘三廉出熈安郡雲母山見南越志陳祈暢異物志曰三廉大實實不但三雖名三廉或有四五六枚食之多汁味酸且甘藏之尤好與衆相叅鬼目爾雅曰符鬼目廣志曰鬼目似梅人以飲酒南方草木狀曰鬼目狀樹大者如木子小者如雞子二月花色似蓮着實七月八月熟其色黄其味酸以蜜煑之滋味柔嘉交阯武平興古九眞有之裴淵廣州記曰鬼目益智眞爾不敢噉可為漿也交州記曰鬼目樹似棠梨葉似紙皮白樹髙大如木瓜而小邪傾不周正味酸九月熟又有草本子亦如之亦可為糝因其草似鬼目甘蔗説文曰藷蔗也漢書禮樂志郊祀歌曰百末㫖酒布蘭生泰尊柘漿析朝酲應劭曰柘漿取柘汁以為飲也吳録地理志曰交阯句屚音漏縣甘蔗大數寸其味醇美異于他處笮以為餳曝之凝如氷破如博碁入口消釋江表傳曰孫亮使黄門以銀椀并蓋就中藏吏取交州所獻甘蔗餳黄門先恨藏吏以䑕矢投餳中啓言吏不謹亮呼吏持餳噐入問曰此噐既蓋之且有掩覆無縁有此也黄門將有恨於汝耶叩頭曰常從臣求官中莞蓆有數不敢與亮曰必是此也問之具服即於前加髠鞭斥付外署晉書曰顧愷之毎食蔗自尾至本人或問之曰漸入佳境宋書曰庾仲文好貨劉雍自謂得其助力事之如父夏中送甘蔗若新發於州又曰元嘉末魏太祖征彭城遣使至小市門致意求甘蔗及酒孝武遣人送酒二噐及甘蔗百根南史曰宜都王鏗善射常以堋的太濶曰終日射侯何難之有乃取甘蔗挿地百歩射之十發十中又曰范雲永明十年使魏魏人李彪宣命至雲所甚見稱美彪為設甘蔗黄甘粽隨盡復益彪笑謂曰范散騎小復儉之一盡不可復得梁書曰庾沙彌性至孝母劉氏好噉甘蔗母亡沙彌遂不食焉三國典畧曰陸納反湘州分其衆二千人夜襲巴陵晨至城下宜豐侯修出壘門坐胡床以望之納衆乗水來攻矢下如雨修方食甘蔗曾無懼色部分軍旅鼓而進之遂獲其一艦生擒六十人納遂歸保長沙又曰侯景至朱雀航南建康令庾信守朱雀門俄而景至信衆撒術始除一舶見景軍皆着銕面退隐于門自言口燥屢求甘蔗俄而飛箭中其門柱信手中甘蔗應弦而落隋書曰赤土國物產多同于交阯以甘蔗作酒雜以紫𤓰根酒色黄赤味亦香美永嘉郡記曰樂城縣三州府江有三洲因以為名對岸有浦名為菰子出好甘蔗盧諶祭法曰冬祀用甘蔗范汪祠制曰孟冬祀用甘蔗扶南傳曰安息國出甘蔗廣志曰甘蔗其餳為石蜜雲南記曰唐韋齊休聘雲南㑹州都督劉寛使使致甘蔗蔗節希似竹許削去後亦有甜味神異經曰南方荒内􅦠􅀈林其高百丈圍三丈八尺促節多汁甜如蜜異物志曰甘蔗遠近皆有交阯所產特醇好本末無薄厚其味甘圍數寸長丈餘頗似竹㫁而食之既甘生取汁為飴餳益珍煎而暴之凝如氷甄異傳曰隆安中吳縣張牧字君林忽有鬼來無他須臾唯欲噉甘蔗自稱髙褐主人呼為阿褐牧母見之是小女面青黑色通身青衣魏文帝典論曰嘗與平虜将軍劉勲奮威鄧展善等共飲宿聞展善有手臂曉五兵余與論劍酒酣耳熱方食甘蔗便以為杖下殿數交三中其臂袁子正書曰嵗比不登凡不給之物若甘蔗之屬皆可權禁楚詞曰臑奴到切鼈炮羔有柘漿些司馬相如子虗賦曰諸柘巴葅張協都蔗賦曰若乃九秋凉期𤣥酎初出黄華浮觴酣飲累日挫斯柘而療渇若潄醴而含蜜清津滋於紫梨流液豐於朱橘曹植詩曰都蔗雖甘杖之必折巧言雖美用之必滅張載詩曰江南都蔗釀液灃沛三巴黄甘瓜州素㮈凡此數品殊美絶快渇者所思銘之裳帶李伯仁七欵曰副以甘蔗豐𢎞誕節纎液玉津㫖於飴蜜虞飜與弟書曰有數頭男皆如奴僕伯安雖癡諸兒不及觀我所生有兒無子伯安三男阿思似父思其兩弟有似人也去日南遠恐如甘蔗近杪即薄應璩與尚書諸郎書曰檀氏園葵菜繁茂諸蔗瓜芋亦離尚萌未知三生復何種植馮植竹杖銘曰杖必取材不必用味相必取賢不必所愛都蔗雖甘猶不可杖佞人悦已亦不可相甘藷南方草物状曰甘藷民家常以二月種之至十月乃成卵大者如鵝小者如鴨掘食其味甜經乆得風乃淡泊耳出交阯武平九眞興古陳祁暢異物志曰甘藷似芋亦有巨魁剥去皮肌肉正白南方人專食之以當米糓蒸炙皆香美賔客酒食亦施設有如果實也燕薁毛詩豳七月曰六月食欝及薁毛詩題綱曰葛藟一名燕薁藤好生河滸邉得水潤而長喻王九族蒙王恩恵以育子孫今王無澤于族人不如葛藟生河滸邉也廣雅曰燕薁蘡舌也廣志曰燕薁似棃早熟魏王花木志曰燕薁實如龍眼黑色説文謂之嬰薁詩疏一名車鞅藤豳詩七月食薁及此名燕薁潘岳閒居賦曰梅香薁棣之屬繁榮藻麗之飾曹毗魏都賦曰英梅楊李石榴郁棣簾薑廣雅曰簾薑葰也湘州記曰始安縣空龍山精了山出簾薑食經曰簾薑法蜜煑烏梅去滓簾薑再三宿色黄赤如琥珀劉禎清慮賦曰仰稱木韮俯㧞簾薑太平御覽卷九百七十四
