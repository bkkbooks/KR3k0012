body:
  text: 太平御覽卷五百八十七宋李昉等撰文部三賦詩序曰詩有六義焉一曰風二曰賦釋名曰賦敷也布其義謂之賦也漢書曰不歌而誦謂之賦登髙能賦可以為大夫言感物造端材智深美可以與圖政事故可以列為大夫也春秋之後周道寖壊聘問歌詠不行於列國學詠之士逸在布衣賢人失志之賦作矣孫卿及楚臣屈原離讒憂國皆作賦以風諭咸有惻隱古詩之義也其後宋玉唐勒漢興枚乗司馬相如下及揚雄競為侈麗閎廣之語没其風諭之義是以揚子稱之曰詩人之賦麗以則辭人之賦麗以淫如孔氏之門用賦也則賈誼登堂相如入室矣又上令王襃與張子僑等並待詔數從遊獵所幸宫館輙歌頌第其髙下以差賜帛議者多謂淫靡不急上曰不有博弈者乎為之猶賢乎已辭賦大者與古詩同義小者駢麗可喜如女工有綺縠音樂有鄭衛今世俗猶皆以娯說耳目辭賦比之尚有仁義諷諭鳥獸草木多聞之觀賢於倡優博弈逺矣又武帝安車徴枚乘孽子臯母為小妻以乘之東歸也臯母不肯隨乘乘怒留臯與母居年十七上書自陳枚乘之子上得之大喜召入詔使賦平樂館善之拜為郎臯不通經術談笑類俳倡為賦頌好嫚戯以故得媟黷貴幸比東方朔郭舍人等武帝春秋三十九乃得皇太子羣臣喜故臯與東方朔作皇太子生賦臯為文疾受詔輒成故所賦者多司馬相如善為文而遲故所作少又上讀司馬相如子虛賦善之乃召相如相如曰此乃諸侯之事未足觀請為天子遊獵之賦上令尚書給筆札相如以子虛虛言也為楚稱烏有先生者烏有此事也為齊難亡是公者亡是人也欲明天子之義故虛藉此三人為辭以推天子諸侯之苑囿其卒歸於節儉因以諷諌天子天子大説時上好神仙相如又奏大人賦天子悦飄飄有凌雲氣游天地之間意又趙昭儀方大幸毎上幸甘泉常從在属車間豹尾中故揚雄盛言車騎之衆參麗之駕非所以感動天地逆釐三神又言屏玉女却宓妃以微戒齋肅之事賦成奏之天子異焉先是蜀有司馬相如時作賦甚宏麗温雅雄心壮之毎作賦常擬以為式後漢書曰王延夀字文考少遊魯國作靈光殿賦後蔡邕亦造此賦未成及見延夀所為甚竒之遂輟翰又李充字伯仁少以文章顯名賈逵薦充召詣東觀受詔作賦拜蘭䑓令史魏志曰陳思王植太祖常視其文曰汝倩人耳植跪曰出言為論下筆成篇固當面試時鄴銅雀䑓新成太祖悉将諸子登使各賦植賦援筆立成太祖甚異之呉書曰張紘作柟榴枕賦陳琳在河北見之以示人曰此吾郷里張子綱所作也後紘見琳武庫賦應機論與琳書歎羙之琳答曰自僕在河北與足下隔此間率少於文章易為雄伯故僕受此過美之談非其實也今景興在此足下子布在彼所謂小巫見大巫神氣盡矣魏畧曰卞蘭獻賦賛述太子徳美太子報曰作者不虛其辭受者必當其實蘭此賦豈吾實哉昔吾丘夀王一陳寳鼎何武等徒以歌頌猶受金帛之賜蘭事雖不諒義足嘉也今賜牛一頭又邯鄲淳作投壺賦奏之文帝以為工賜絹十疋晉書曰孫綽絶重張衡左思賦云三都二京六經之鼓吹也嘗作天台山賦辭致甚工初成以示友人范榮期云卿試擲地當作金石聲也榮期曰恐此金石非中宫商然毎至佳句輙云應是我輩語又桓温欲經畫中國以河南粗平将移都洛陽朝廷畏温不敢為異而此土蕭條人情危懼孫綽上䟽言不可温見綽表不恱曰致意興公何不尋君遂初賦而知人家國事耶又顧愷字長康晉陵無錫人也博學有才氣嘗為筝賦成謂人曰吾賦之比嵇琴不賞者必當以後出相遺深識者亦當以髙竒見貴宋書曰謝荘字希逸仕為太子中庶子時南平王鑠獻赤鸚鵡帝詔羣臣為賦太子左衛率袁淑文冠當時作賦畢示荘及見荘賦歎曰江東無我卿當獨秀我若無卿亦一時之傑遂隠其賦梁書生張率為待詔賦奏之甚見稱賞手勅答曰相如工而不敏枚臯速而不工卿可謂兼二子於金馬矣又沈衆字仲興好學有文詞仕梁為太子舍人時武帝制千字詩衆因註解與陳謝景同時召見於文徳殿帝命作賦賦成奏之手勅答曰卿文體翩翩可謂無忝爾祖北齊書曰劉晝舉秀才入京考䇿不第乃恨不學屬文方復緝綴辭藻言甚古拙制一首賦以六合為名自謂絶倫吟諷不輟乃歎曰儒者勞而少工見於斯矣我讀儒書二十餘年而答䇿不第始學作文便得如是曽以此賦呈魏收收謂人曰賦名六合其愚已甚及見其賦又愚於名唐書曰獲嘉主簿劉知幾著思慎賦以刺時鳳閣侍郎蘇味道李嶠見文相顧而歎曰陸機豪士之所不及也當今防身要道盡在此矣又文苑傳李華字遐叔善屬文與蘭陵蕭頴士善華著含元殿賦頴士見而賞之曰景福之上靈光之下後唐書曰李琪少孤貧苦學尤精於文賦昭宗時李谿父子以文學知名於時琪年十八九袖賦一軸謁谿谿覽賦驚異倒履迎門因出琪啞鍾捧日等賦指示謂琪曰予常患近年文士辭賦皆數句之後未見其賦題吾子入句見題偶屬典麗吁可畏也琪由是益知名摰虞文章流别論曰賦者敷陳之稱古詩之流也前世為賦者有孫卿屈原尚頗有古詩之義至宋玉則多淫浮之病矣楚詞之賦賦之善者也故揚子稱賦莫深於離騷賈誼之作則屈原儔也禰衡傳曰黄祖時大㑹賓客人有獻鸚鵡者祖舉巵酒於衡曰願先生賦之以娯嘉賓衡攬筆而作文無加㸃辭采甚麗文心雕龍曰詩有六義其二曰賦賦者鋪也鋪采摛文體物寫志也昔邵公稱公卿獻詩師箴瞽賦傳云登髙能賦可謂大夫詩序則同義傳說則異體總其歸塗實相枝幹故劉向明不歌而頌班固稱古詩之流至如鄭荘之賦大隧士蒍之賦狐裘結言􅠊韻詞自已作雖合作賦體明而未融及靈均唱騷始廣聲貌然則賦也者受命於詩人而拓宇於楚詞者也於是荀况禮智宋玉風韻爰錫名號與詩畫境六藝附庸蔚成大國述客主以自引極聲貌以窮文斯葢别詩之源始命賦之厥初也秦世不文頗有雜賦漢初辭人順流而作陸賈扣其端賈誼振其緒枚馬同其風王揚騁其勢皋朔以下品物畢圖繁積於宣時校閱於成世進御之賦千有餘首詩之源流信興楚而盛漢矣若夫京殿苑獵述行叙志並體國經野義尚光大既履端於唱序亦歸餘於總亂序以建言首引情本亂以理篇冩送文勢觀夫荀結引語事數自環宋發巧談實始淫麗枚乗兎園舉要以㑹新相如上林繁類以成艷賈誼鵩鳥致辨於情理子淵洞簫窮變於聲貌孟堅兩都明絢以贍雅張衡二京迅抜以宏富子雲甘泉搆深偉之風延夀靈光含飛動之勢凡此十家並辭賦之英傑也及仲宣靡宻發端必遒偉長通博時逢壮采太冲安仁䇿勲於鴻規士衡子安底績於流製景純綺巧縟理有餘彦伯梗槩情韻不匱亦魏晉之賦首也原夫登髙之㫖葢覩物興情情以物興故義必明雅物以情覩故辭必巧麗麗辭雅義符采相勝如組織之品朱紫畫繪之差𤣥黄文雖新而有質色雖雜而有儀此立賦之大體也然逐末之儔蔑棄其本雖讀千首逾惑體要遂使繁華折枝膏腴害骨無貴風軌莫益勸戒此揚子所以追悔於雕蟲貽誚於霧縠者也宋玉大言賦序曰楚襄王既登陽雲之臺命諸大夫景差唐勒宋玉等並造大言賦賦畢而玉受賞又有能為小言賦者賞雲夢之田賦畢遂賜玉田揚子法言曰或問曰吾子少而好賦曰然童子雕蟲篆刻壮夫不為詩人之賦麗以則辭人之賦麗以淫若孔氏之門而用賦則賈誼升堂相如入室崔鴻十六國春秋南凉錄曰秃髪傉檀子歸年始十三命為髙昌殿賦援筆立成影不移漏傉檀覽而善之擬之於曹子建又前秦錄曰苻堅宴群臣於逍遥園将軍講武文官賦詩有洛陽年少者長不滿四尺而聰博善属文因朱彤上逍遥戲馬賦一篇堅覽而竒之曰此文綺藻清麗長卿儔也西京雜記曰長安有慶虬亦善為賦常為清思賦時人不貴虬乃託以相如作遂大重於世焉又相如将獻賦而未知所為夢一黄衣翁謂之曰子可為大人賦言神仙之事以獻之上賜錦四匹又司馬長卿賦時人皆稱典而麗雖詩人之作不能加也揚子雲曰長卿賦不從人間來神化所至耳子雲學相如而不逮是故雅服焉又司馬相如為上林子虛賦意思蕭散不復與外相闗控引天地錯綜古今忽然而睡忽然而興幾百日後成其友人盛宗長通牂牁名士嘗問以作賦相如答云合纂組以成文列錦繡而為質一經一緯一宫一商此作賦之迹也賦家之心苞括宇宙揔覽人物斯乃得之於内不可得而傳也乃作合組歌列錦賦而退終身不復敢言作賦之心矣博物志曰王延夀逸之子也魯作靈光殿初成逸語其子曰汝寫狀歸吾欲為賦文考遂以韻寫簡其父曰此即好賦吾固不及矣三國典畧曰齊魏收以温子昇邢邵不作賦乃云㑹題作賦始成大才唯以章表自許此同兒戯文士傳曰何楨字元翰青龍元年天子特詔曰楊州别駕何楨有文章才識使作許都賦成封上不得令人見楨遂造賦上甚異之又棘嵩見陸雲作逸民賦嵩以為丈夫出身不為孝子則為忠臣必欲建功立䇿為國宰輔遂作官人賦以反雲之賦桓子新論曰予少時見揚子雲麗文髙論不量年少猥欲迨及業作小賦用思大劇而立感動發病子雲亦言成帝幸甘泉詔使作賦為之卒暴倦卧夢其五臟出地以手收之覺太少氣病一嵗余少好文見子雲工為賦頌欲從學子雲曰能讀千賦則善之矣魏文典論曰今之文人魯國孔融廣陵陳琳山陽王粲北海徐幹陳留阮瑀汝南應璩東平劉楨此七子者於學無所遺於辭無所假如粲之初征登樓槐賦幹之𤣥猨漏巵圓扇枕賦雖張蔡不過也陳琳阮瑀之章表書記今之雋也應璩和而不壮劉楨壮而不宻孔融氣體髙妙有過人者魏文臨渦賦序曰余從上拜墳乘馬過水相徉髙樹之下駐馬書鞭為臨渦賦世說曰左思字太冲齊國臨淄人也作三都賦十年乃成門庭户席皆置筆硯遇得一句即便䟽之賦成時人大有譏訾思意甚不愜後示張華華曰此二京可三然君文未重於世宜以示髙明之士思乃請序皇甫謐謐見之嗟嘆遂為作序於是先相訾者莫不歛袵賛述焉陸機入洛欲為此賦聞思作之拊掌而笑與弟雲書此間有傖父欲作三都賦須其成當以覆酒瓮耳及思賦出機絶歎服以為不能加也又袁宏作東征賦列稱過江諸名徳而獨不載桓彛温甚恨之嘗以問宏宏曰尊君稱位非下官敢專既未遑啟故不敢顯之温曰君欲為何詞宏即答云風鑒散朗或捜或引身雖可亡道不可隕温乃喜又不道陶侃侃子胡奴抽刃曲室問袁君賦云何忽畧袁窘急答曰大道尊公何言無因曰精金百鍊在割能斷功以治民職思靖亂長沙之勲為史所讃胡奴乃止金樓子云劉體元好學有文才為水仙賦時人以為不减洛神賦擬古詩時人謂陸士衡之流也余謂水仙不及洛神擬古勝乎士衡矣閩川名士傳曰貞元中杜黄裳知貢舉試珠還合浦賦進士林藻賦成慿几假寐夢人謂之曰君賦甚佳但恨未叙珠來去之意爾藻悟乃足四句其年擢第謝日黄裳謂曰唯林生叙珠來去之意若有神助太平御覽卷五百八十七
