front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_671-1a, image: WYG0899/WYG0899-0043c.png}
body:
  text: 太平御覽卷六百七十一宋李昉等撰道部十三服餌下登真隠訣曰太極真人昔以神方一首傳長里先生先生姓薛自號長里周武王時人也先生以傳西域緫真王君即金闕聖君之上宰也按􅏇飯方受西梁真人所傳時在大宛北谷今長里傳九轉乃周初間是為受服飢飯三四百年後乃合此丹盖司命劒經序也總真王君傳太元真人即東卿司命茅大君也以漢武帝天漢三年受之時年四十八後又以付二弟并各賜成丹一劑司命既傳二弟而不載於此當以王君命使付非正次傳授也自王君以後惟定録與楊君使示許長史并掾乃至于今故漢晉之世諸學道人各合服金液昇仙無言九轉則此真人方下授以來未有營之者受皆登壇盟誓割帛跪金為敢宣之約敢不敢也前盟則金龍玊魚後代止布帛而已違盟負信三祖獲考於水官謂妄傳非人也傳授湏齋盟用金玉偃鐶以代剪髮㰱血之誓也欲合九轉先作神釡當用榮陽長沙豫章土釡謂瓦釡也昔黄帝火鼎於荆山太清中經亦有九鼎丹法即是丹釡從來咸呼為鼎用榖糠燒之當在名山深僻處臨水上作竈屋屋長四丈廣二丈開南東西三户先齋百日乃泥作神釡釡成搗藥令計至九月九日平旦發火按合諸丹無論年歳好惡惟日月中有期限及吉㓙琅玕以四月七月十二月中旬間發火曲晨以五月中起火太清九丹起火雖無定月而云作六一五月七月九月為佳自齋以始便斷絶人事合待丹成也合丹可將同志及有心者四五人耳皆當同齋戒齋起日先投𤣥水五斗斛於所止之流水中若地無流水當作好井亦投酒於井中以鎮地氣令齋者皆飲食此水也合丹法又令以青石函盛好龍骨十斤沉于東流水中名曰青龍液飲食之以通水靈也取東海左顧牡礪呉郡白石脂雲母屑蚯蚓土滑石礬凡六物等分太極真人以太上天帝君鎮生五藏上經刻于太極紫㣲𤣥琳殿東殿墉上此乃上清八龍大書非世之學者可得悟了也南岳赤松子受而服之求其注釋於太極真人又青童君云五公之腴鎮生五藏錬白易軀可以少顔也湏齋戒泥竈修錬也雲腴之味香甘味美强血補骨守氣凝液鎮生五藏長養魂魄真上藥也真人云此愈於錬八石餌雲母也真人錬形於太陽易貎於三官此之謂也又曰太極真人青精飢飯方按彭祖傳云大宛有青精先生能一日九食亦能終歳不饑即是此矣真上仙之妙方斷糓之竒靈也清虛真人說霍山中有學道者鄧伯元王𤣥甫受服青精石飯吞日景之法能夜中書又仙人龍伯髙受青飢方醉忘憂處方臺又定録君命告掾云次服􅏇飯兼榖勿違益髓除患肌膚充肥又掾書告長史覔采藥來山染作飯恐草燥又長史與大掾書令餉小掾白米是染作飯凡此六事有書者也太極真人青精十石飢飯上仙靈方王君注觧其後大書者太素是本經及西梁口訣墨注者是清虛王君所釋南岳魏夫人敷撰而使司命楊君書之五真共成一法足稱靈妙矣上元寳經曰子食草木之王氣與神通子食青燭之津此之謂也此太素所傳太極所撰上真靈仙之至要不同餘術也服􅏇飯百害不能傷疾疫不能干去諸思念絶㓕三尸耳目聰明行歩輕㨗能隠化遁變長服益壽茅司命大君語二弟云冝服四扇散昔黄帝授風后却老還少之道也我昔受之於髙邱先生今以相付耳又語小弟保命君曰卿冝服王母四靈散此反嬰之秘道也體中少損冝服此方以補腦耳按小茅君服時一百二十嵗也夫此二方皆妙法也當齋戒脩制又曰裴君受支子元服食茯苓之法焦山蔣山人所傳能長生久視修合之際湏密齋戒裴君又受支子元胡麻之法􅃽先生惟服此二方位為仙真此二方書與世少異裴君所秘用者騐而有實凡服茯苓胡麻之方甚衆此法既真人所經用真人手所書記必當最神勝於諸法若能常服仙道可期但患人服未覺甚益便不服之故少有克終之効若體先不虛損其年少之時當服茯苓若年三十嵗當服胡麻􅃽先生曰此二方是大有之要法長生神仙之秘寳也大有者謂委羽山洞大有宫中之書法彼人當有服之者寳𤣥經云茯苓治少胡麻治老合以齋戒服以朝早卉醴華腴蜜也百卉之花成腴醴五公謂為醴華英火精水寳火精茯苓也性熱而火茯苓則其精矣水寳胡麻也性冷色黒而精含澤故謂之水寳和以為一還精歸寳此之謂也裴君以年少時所用故服茯苓也清虛真人年十二便受此方於時未必虧損所以云服茯苓夜視有光也二方同耳皆長年之竒方也若合二物倍用蜜共煎搗為丸乃佳按青精方茯苓禁食酸此專用茯苓不必禁酸味又曰清虛王真人授南岳魏夫人榖仙甘草丸方魏夫人少多病疾王君脩武縣中告夫人曰學道者當去病先令五藏充盈耳目聰明乃可存思服御耳按王君初降真之時是晉元康九年冬於汲郡脩武縣廨内夫人時應年四十八也夫人按而服之及隠景去世之時年八十三嵗也此晉成帝咸和八年甲午嵗則夫人從服藥已來三十五年矣其間或不必長相續也了無復他患沈疴都愈髮不白齒不落耳目聦明常月中書道家章符夫人既為女官祭酒食猶以章符示迹耳存思入室動百日數十日了不覺勞既在俗世家事相亂欲脩齋研誦便託以入室也食飲通快四體充盈即甘草丸之騐也謂之榖仙方脾胃既和則能食而不害膚充而精察起居調節無澁利之患矣食榖而得仙故謂仙榖也此本九宫右真公郭少金撰此方諸宫久已有之至郭氏更撰集次第序說所治耳猶如青精及太素之法而今謂太極真人也學仙道者宜先服之昔少金以此方授介象又授劉根張陵等數十人亦稱此丸為少金丸宜齋戒脩合並無毒無所禁食一年大益無責旦夕之效也俗人亦皆可服之又曰雲芝英不擇日而脩合治三尸伏疾服食一劑則榖蟲死二劑則三尸枯若道士固食榖者乃冝服也榖蟲既㓕使人食榖而無病過飽而不傷去尸蟲之藥甚多莫出於此昔修羊公稷丘子東方朔崔文子商丘子但服此藥以協榖而皆得仙也漢景帝及武帝求索東方朔修羊公秘方終不𫝊又曰北海公涓子名姓不顯青童君弟子蘇林之師也少餌术黄精授守一𤣥丹之道在世三千八百年𤣥洲上卿蘇林字子𤣥涓子弟子也固紫陽之師濮陽曲水人年二十餘辭家學道後授三元真一逰遍人間又曰太清正一真人張道陵沛國人本大儒漢延光四年始學道也漢末於鳴鵠山仙官來降授以正一盟威之教施化領民法號天師即真誥云奉張道陵正一平氣者是也天師靈寳五符序及太清金液丹序並佳筆别有傳已行於世又曰服五石者能一日九食百闗流淳亦能終嵗不饑逺老還嬰遇食則食亦平真上仙之妙方斷榖之竒靈也陶隠君注云雖一日九食而吸饗流變不為滓終嵗不飲而容色更鮮又云吸引之易感無貴於七曜修行之早成不過於九道保守之堅固莫踰於鎮生衛用之急防無超於渾神藥石之速効豈勝於青精祈拜之感孰賢於朝謝也又曰服五石鎮五藏不壊又曰九苞鳯腦太極芝丹鑪金液紫華虹景太清九轉五雲之丹漿東瀛自有滄浪青錢髙丘餘精積石飛田能使人壽考琴髙先生受鎮氣益命之道又行補脑反丹法寳劒上經曰太極曲晨八景丸服之能飛行太虛又曰太虛真人服四極雲牙也又曰飛龍雲腴方鍊五石之華膏身有玊光能夜書此藥愈於八石之餌又曰服日月之華欲得􅁪食竹笋竹笋者日華之胎也一名大明又欲􅁪食松葉松者木之秀也欲服日月當食此物氣感以運也太虛真人云松栢者木之秀又曰真人挹五方元辰之暉食九霞之精注曰謂清晨之元氣始暉之霞曰精協數九謂之九霞本文云神光内曜采華外陳太上黄素經曰凡道士臨食常上饗太和太平經曰青童君採飛根吞日景空洞靈章云朝飡五雲氣夕噏三晨光又食黄碗紫真之􅏁真誥曰崑崙有絳山石髓玉樹之實又曰上清金闕靈書紫文採服隂華月精之法昔受之於太㣲天帝君黄氣陽經藏天隠月之經也又曰諸為道者酒肉最為大忌酒之為物能使人識慮昏迷情懐亂僻案諸藥中惟四扇四童丸云用酒亦可以水中术丸以酒和煎之其餘不云酒服餌又曰後漢左慈就司命乞丹砂得十二斤以合九華丹又曰治明期與後漢末人張正禮在衡山中受服王君虹景丹積三十餘年又曰趙廣信陽城人也魏末劉來山受服氣法守𤣥中之道後服九華丹又曰朱孺子呉末人入赤水山服菊花餌术又受西歸子入室存泥丸法三十三章又曰鄭景世與張重華俱晉初人也在􅏦山受行守五藏含日法服胡麻及𤣥丹又曰馬明生臨淄人為縣吏逐賊被傷太真人夫人以靈丸救得差後師安期生受服太清丹又曰王𤣥甫沛人與鄧伯元俱在霍山受服青精石飯吞日丹景之法又曰黄山訣云養性服食藥物不欲食蘇及石榴子道士自不可食列仙傳曰赤将子輿者黄帝時人不食五榖而噉百草花焉又曰偓佺者槐山採藥父也好食松實形體生毛兩目更方能飛行逐走馬又曰務光夏時人耳長七寸好琴服蒲韭根又曰涓子齊人好餌术著天人經四十八篇後釣于荷澤得符于鯉魚腹中隠于宕山能致風雨受伯陽九仙法淮南王安少得其文不能觧也其琴心三篇有條理焉又曰劉景前漢時人從邯郸張君受餌雲母知其吉㓙抱朴子曰修道餌藥及隠居入山不得其法者多遇害萬物之老者其精悉能假託人形以眩惑人目而常試人惟不能於鏡中易其真形耳是以古之入山道士皆明鏡徑九寸以上懸於背後則老魅不敢近人或有來試人者則當顧視鏡中其是仙人及山中好神者鏡中故如人形若是鳥獸邪魅則其形貎皆見鏡中矣昔人有於蜀雲臺山石室中忽有一人著黄練单衣葛巾至其前於是人顧鏡中乃鹿也因叱而成鹿徑去又林慮山下有亭每宿者或死或病常夜有十數人衣色或黄或白或黒或男或女後郅伯夷遇之宿明燭而坐夜半果見密以鏡照之乃羣犬也伯夷乃執燭起佯誤以燭燼􅅡其衣聞燎毛氣遂以刀刺殺一犬餘駭去每入山湏擇吉日又曰天地之情狀隂陽之吉㓙茫茫乎其亦難詳也吾亦不必謂之有又亦不敢保其無然黄帝吕望皆所信伏近代嚴君平司馬遷皆所據用而經傳不虛剛日吉日有自來矣王者立太史凢封置及有事宗廟社稷郊祀天地皆擇其吉也按玊鈴經云欲入山不可不知遁甲之秘術而不為人委曲說其事也太平御覽卷六百七十一
