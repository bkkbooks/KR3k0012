  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_515-1a, image: WYG0897/WYG0897-0600a.png}
body:
  text: 太平御覽卷五百一十五宋李昉等撰宗親部五兄弟中後漢書曰徐防卒子衡當嗣讓封於其弟崇數嵗不得已乃出就爵又曰封觀者有志節當舉孝亷以兄名位未顯耻先受之遂稱風疾喑不能言火起徐出避之忍而不告後数年兄得舉觀乃稍損而仕州郡焉又曰鍾皓字秀明潁川長社人皓少以篤行稱公府連辟為二兄未仕遷隱宻山以詩律教授門徒千餘人又曰袁譚欲更攻弟尚問王脩曰計安出曰兄弟者左右手也譬人将鬭而斷其右手曰我必勝若是者可乎夫棄兄弟而不親天下其誰親之又曰許荆字少長㑹稽人也祖父武太守第五倫舉為孝亷武以二弟晏普未顯欲令成名乃謂之曰禮有分異之義家有别居之道於是共割財産以為三分武自取肥田廣宅弟所得並悉劣少郷人皆稱弟克讓而鄙武貪婪晏等以此並得選舉武乃㑹宗親泣曰吾為兄不肖盗聲竊位二弟年長未預榮祿所以求得分財自取大譏今理産所増三倍於前悉以推二弟一無所留於是郡中翕然又曰童恢弟翊字漢文名髙於恢宰府先辟之翊陽喑不肯仕及恢被命乃就孝亷又曰繆彤字預公少孤兄弟四人皆同財業及各娶妻諸弟遂求分異又數有計爭之言彤乃掩户自撾曰繆彤汝脩身謹行學聖人之法将以齊整風俗奈何不能正其家乎弟及諸婦聞之悉叩頭謝罪遂為敦睦之行又曰李充字大遜家貧兄弟六人同衣遞食妻竊謂充曰今貧居如此難以久安願思分異充偽酬之曰當醖酒具㑹請呼鄰里内外充於座中前跪白母曰此婦無状而教充離間母兄罪合遣斥便呵叱其婦逐其出門婦啣泣而去又曰王莽以崔篆為建新大尹篆不得已乃嘆曰吾生無妄之世值澆五斗切羿之君上有老母下有兄弟安得獨潔已而危所生哉又曰班固以父彪所續前史未詳乃潛精研思欲就其業既而有人上書顯宗告固私改作國史者有詔下郡收固繋京兆獄盡取其家書固弟超恐固為郡所覆考不能自明乃馳詣闕上書得召見具言固所著述意而郡亦上其書顯宗甚竒之詣召校書即除蘭臺令史又曰顯宗問班固卿弟安在固對為官寫書受直以養老母帝乃除超為蘭臺令史東觀漢記曰丁鴻父綝從征代鴻獨與弟盛居憐盛幼少而共寒苦及綝卒鴻當龍封上書讓國於盛書不報既葬乃挂衰絰於家廬而去留書與盛曰鴻貪經書不顧恩義弱而隨師生不供養死不祭祀皇天祖禰並不祐助身被大病不任茅土前上疾狀願辭爵章不報廹於當封謹自放又曰趙孝字長平建武初榖食尚少孝得榖炊將熟令弟禮夫妻出比還孝夫妻共蔬食禮夫妻歸輙獨飯之積久禮心怪疑之後掩伺見之亦不肯食遂共蔬食兄弟怡怡郷里歸德又曰劉愷字伯豫以當襲父爵譲與其弟憲遁逃避封久之章和中有司奏請絶國上美其義特優嘉之又曰孔奮篤於骨肉弟竒在洛陽為諸生分祿供給其服用四時送衣下至脂燭每有所食甘美輙分减以遺竒又曰鄧彪字伯智南陽人也父邯世祖中興從征伐以功封鄲侯彪少脩孝行勵志清髙與同郡宗武伯翟敬伯陳緩伯張第伯同志好齊名稱南陽五伯彪以嫡長為世子邯薨當嗣爵譲國與異母弟鳯明帝髙其節詔書聽許鳯襲爵彪仕州郡又曰朱勃字叔陽年十二能誦詩書常候馬援兄况勃時方能行歩辭言閑雅援裁知書見之自失况知其意酌酒慰援曰朱勃小器速成智盡此耳卒當從汝學勿畏勃未二十右扶風請試守渭城宰及援為将軍封侯而勃位不過縣令援後雖貴常恃以舊恩而卑侮之勃愈自親及援遇䜛惟勃能終焉又曰梁商字伯夏安定烏氏人常曰多藏厚亡為子孫累每租俸到及兩宫賞賜便置中門外未嘗入藏悉分與昆弟中外又曰吳漢甞出征妻子在後置田業漢還讓之曰軍師在外吏士不足何多買田宅乎遂以分與昆弟外家又曰劉敞曾祖節侯置以長沙定王子封於零道之舂陵侯敞父仁嗣侯以舂陵地勢下濕有山林毒氣上書求減邑内徙元帝初平四年徙南陽之白水郷猶以舂陵為國名仁卒敞謙儉好義推父時金寳財産與昆弟荆州刺史上其義行拜廬江都尉又曰郭况為城門校尉况皇后弟貴重賓客輻輳而况恭儉謙遜遵奉法度不敢驕奢又曰鄭均字仲虞任城人也治尚書好黄老澹泊無欲清靜自守不慕遊玩兄仲為縣遊檄頗受禮遺均數諫止不聽即脫身出嵗餘得數萬錢歸以與兄曰錢盡可復得為坐贓吏終身捐棄兄感其語遂為亷潔稱清白吏又曰魯恭字仲康扶風人父為武陵太守卒官時恭年十二弟丕年七嵗晝夜號踊不絶聲郡中賻贈無所受及歸服䘮禮過成人恭憐丕小欲先就其名託疾不仕郡數以禮請謝不肯應母強之恭不得已而行因留新豐教授平舉秀才恭乃始為郡吏又曰鄧悝字叔昭安帝即位拜悝城門校尉自延平之初以國新遭大憂故悝兄弟率常在中供養兩宫比上䟽自陳愚闇糞朽幸得遭值明盛兄弟充列顯位並侍帷幄預聞政事無拾遺一言之助以補萬分而久在禁省日月益長罪責日深惟陛下哀憐又曰魏覇字喬卿妻子不到官舍常念兄嫂在家勤苦己獨專樂故常服麄糲不食魚肉之味婦親蠶桑服機杼子躬耕農與兄弟子同苦樂不得有異郷里慕之化行又曰馬防兄弟二人皆各六千戸又曰張純封武始侯有子根奮及純病勅家丞翕曰無功於國猥蒙大恩爵不當及於後嗣純薨大行移書問嗣上奮中元二年詔書封奮上書曰根不病哀臣小稱疾今翕立後臣時在河南冡廬臣見純前告翕語自以兄弟不當蒙􅊞爵之恩願下有司詔不聽奮既嗣爵謙儉節約閨門和平續漢書曰張堪字君游南陽宛人為郡族姓堪早孤讓先父餘財數十萬與兄弟又曰姜肱字伯淮兄弟三人皆以孝行著肱年長與二弟仲海季江同被卧甚相親友及長各娶妻兄弟相戀不能相離以繼嗣當立乃更徃就室學皆通五經兼明星緯謝承後漢書曰郭賀字惠公潁川陽翟人也父鎮廷尉以功封定疑侯薨賀當襲爵上書讓與弟時詔書不聽遂竄逃匿三年孝順皇帝下大鴻臚切責州郡求賀強使就封國魏志曰袁術與紹有隙又與劉表不平而北連公孫瓚紹與瓚不和而南連劉表其兄弟攜貳舍近交逺如此魏略曰夏侯楙在西征時多蓄衆妾公主由此與楙不和其後羣弟不遵禮度楙數切責弟懼見治乃共搆楙帝意欲殺之以問長水校尉京兆叚黙黙以為誹謗之言不與實相應此清河公主與楙不睦出於䜛搆冀不待實耳且伏波與先帝有定天下功宜加三思帝意解曰吾亦以為然乃發詔問本為公主作表者果其羣弟子臧子佐欲搆疏楙使不見信又曰太傅司馬宣王久病曹爽擅政李豐依違時有謗書曰曹爽之勢熱如湯太傅父子冷如漿李豐兄弟如游光吳志曰諸葛瑾字子瑜瑯琊陽郡人也為孫權長史建安二十年權遣瑾使蜀與其弟亮但公㑹相見退無私面又曰虞翻字仲翔㑹稽餘姚人也翻少好學有髙志年十二客有候其兄者不過翻翻追書與曰僕聞琥珀不取腐芥磁石不受曲針不亦宜乎客得書竒之由是見稱蜀志曰麋竺弟芳為南郡太守與闗羽共事而私相攜貳叛迎孫權羽用覆敗竺面縳請罪先主慰喻以兄弟罪不相及崇寵如初晉書曰衛瓘有六男無爵悉讓二弟逺近稱之又曰劉寔字子真平原髙唐人也弟知字子房貞潔有兄風為潁川太守平原管輅嘗謂人曰吾與劉潁川兄弟語使人神思清發昏不假寐自此之外殆白日與寝矣又曰何淮字幼道穆章皇后父也髙尚寡欲弱冠知名州府交辟並不就兄充為驃騎勸其令仕淮曰弟五之名何减驃騎淮兄弟五故有此言又曰周顗字伯仁性寛裕而友愛過人弟嵩嘗飲酒暝目謂顗曰君才不及弟何横得重名以所燃蠟燭投之顗神色無忤徐曰阿奴火攻固出下䇿耳又曰戴遯字安丘處士逵之弟逵勵操東山而遯以武勇顯謝安嘗謂遯曰卿兄弟志業何殊曰下官不堪其憂家兄不改其樂也又曰王獻之嘗與兄徽之操之俱詣謝安二兄多言俗事獻之寒温而已既出客問安王氏兄弟優劣安曰小者佳客問其故安曰吉人之辭寡察其言故知之嘗與徽之共在一室忽然火發徽之遽走不遑取履獻之神色恬然徐呼左右扶出又曰散騎常侍祖納初與弟約不睦中宗甚任約踈納納乃言於中宗曰約為人外有國士之形内懐凌上之性抑而使之可也若假其權必為亂階中宗弗納納遂以兄弟相謗免官及後約為逆論者始知納忠誠又曰顔含少有操行兄機停䘮在殯降夢云復活一門咸夢經時不已含時尚少乃慨然判曰今靈異至此豈可孤抑開棺之痛孰與不開乃共發棺果有生驗然氣息甚微存亡不别於是棄絶人事􅅫首屏氣以就含養於時人士皆歎其至行並饋餉之含謝而不受經十三年竟不起疾太平御覽卷五百一十五
