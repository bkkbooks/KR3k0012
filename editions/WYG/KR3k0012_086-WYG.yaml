body:
  text: 太平御覽卷八十六宋李昉等撰皇王部十一秦昭襄王孝文王莊襄王始皇帝二世皇帝秦王子嬰楚義帝附秦史記曰秦之先帝顓頊之苖裔孫女曰女脩適𤣥鳥隕卵女脩吞之生子大業大業娶少典之子曰女華生大費與禹平水土已成帝錫𤣥圭禹受曰非予能成亦大費為輔帝舜曰咨爾費賛禹功其賜爾皂游爾後將大出乃妻之姚姓之王女大費拜受佐舜調馴鳥獸鳥獸多馴服是為栢翳舜賜姓嬴氏大費生子二人一曰大亷實鳥俗氏二曰若木實費氏其𤣥孫曰費昌子孫或在中國或在夷狄費昌當夏桀時去夏歸商為湯御以敗桀於鳴條大亷𤣥孫曰孟戲中衍鳥身人言帝太戊聞而卜之使御吉遂致使御而妻之自太戊以下中衍之後世有功以佐殷國故嬴姓多顯遂為諸侯其𤣥孫曰中潏在西戎生蜚廉蜚廉生惡來惡來有力蜚亷善走父子俱以材力事紂周武王伐紂并殺惡來蜚亷死葬於霍山蜚亷復有子曰季勝季勝生孟增是為宅臯狼臯狼生衡父衡父生造父造父以善御幸於周繆王繆王以趙城封造父造父族由此為趙氏蜚廉以下五世别居趙趙衰其後也惡來革者蜚廉子也早死有子曰女防女防生旁臯旁臯生太几太几生大駱大駱生非子以造父之寵皆姓趙氏非子居大丘周孝王分土為附庸邑之秦今天水隴西縣秦亭也使復續嬴氏祀號曰秦嬴秦嬴生秦侯秦侯生公伯公伯生秦仲秦仲死於戎子莊公伐戎破之莊公卒子襄公立七年戎伐周襄公救周有功周避犬戎之難東徙洛邑襄公以兵送平王平王封襄公為諸侯賜之岐以西之地襄公於是始與諸侯通使聘享之禮至繆公康公之世漸為强霸與齊晉爭為諸侯盟主秦仲已下二十八世曰武王武王卒立異母弟是為昭襄王于時周室微弱昭襄王史記曰昭襄王十九年王為西帝齊為東帝皆復去之五十二年周九鼎入秦周初亡五十四年王郊見上帝於雍丘五十六年昭襄王卒子孝文王立孝文王史記曰孝文王元年赦罪人脩先王功臣褒厚親戚弛苑囿孝文王除喪十月己亥即位三日辛丑卒莊襄王立莊襄王史記曰莊襄王元年大赦罪人修先王功臣施德厚骨肉而布惠於民東周公與諸侯謀秦秦使相國吕不韋誅之盡入其國以陽人之地賜周君奉其祭祀四年莊襄王卒子政立始皇帝河圖曰秦始皇帝名政虎口日角大目隆鼻長八尺六寸大七圍手握兵執矢名祖龍尚書考靈耀曰秦失金鏡宋均注曰金鏡喻明道也魚目入珠言偽亂直也莊襄王納吕不韋之妻生始皇也古文竒字曰秦改古文以為大篆及𨽻字國人多誹謗怨恨秦苦天下不從而召諸生到者拜為郎凡七百人又宻令冬月種𤓰於驪山硎谷之中温處𤓰實成乃使人上書曰𤓰冬有實有詔天下博士諸生說之人人各異說則皆使徃視之而為伏機諸生賢儒皆至焉方相難不能决因發機從上填之以土史記曰莊襄王為秦質子於趙見吕不韋姬悅而取之生始皇帝以秦昭王四十八年正月生於邯鄲及生名為政姓趙氏年十三歲莊襄王死政代立為秦王十年大梁人尉繚來說秦王曰以秦之强視諸侯譬如郡縣之君臣但恐諸侯合從而出不意此乃智伯夫差湣王之所以亡也願大王母愛財物賂其豪臣以亂其謀不過亡三十萬金則諸侯可盡王從其計見尉繚抗禮衣服食飲與繚同繚曰秦王為人隆凖長目鷙鳥鷹豺聲少恩而虎狼心居約易出人下得志亦輕食人我布衣然見我常身自下我使秦王得志於天下天下皆為虜矣不可與乆遊乃亡去秦王覺固止以為秦國尉卒用其計䇿二十六年秦初并天下廷尉斯等與博士議曰有天皇有地皇有人皇人皇最貴臣等昧死上尊號王為秦皇命為制令為詔天子自稱為朕王曰去秦著皇採上古帝皇位號號曰皇帝他如議制曰朕聞太古有號毋諡中古有號死而以行為諡如此則子議父臣議君也甚無謂朕弗取焉自今以來除諡法朕謂始皇帝後世以計數二世三世至於萬世傳之無窮始皇推終始五德之傳音亭傳之傳也以為周得火德秦代周德從所不勝方今水德之始改年始朝賀今自十月朔衣服旄旌節旗皆上黒數以六為紀符法冠皆六寸而轝六尺為歩乘六馬更名河曰德水以為水德之治剛毅戾深事皆决於法分天下之國以為三十六郡郡置守尉監更命民曰黔首大酺收天下兵聚之咸陽銷以為鐘鐻金人十二重各千石置宫庭中一法度衡石丈尺車同軌書同文字地東至海暨朝鮮西至臨洮羗中南至北向户北據河為塞並隂山至遼東徙天下豪富於咸陽十二萬户諸廟及章臺上林皆在渭南秦毎破諸侯冩放其宫室作之咸陽北坂上南臨渭自雍門以東至涇渭殿屋複道周閣相屬所得諸侯美人鐘鼓以充實之二十七年始皇巡隴西北出雞頭山過囘中作長信宫渭南已更命宫為極廟象天極自極廟道通驪山上作甘泉前殿築甬道自咸陽屬之二十八年始皇東行郡縣上鄒嶧山立石與魯諸儒生刻石頌秦德議封禪望祭山川之事乃遂上泰山立石封祠祀禪梁父刻所立石乃並渤海以東過黄腄窮成山登之罘立石頌秦徳焉而去南登琅琊大樂之留三月徙黔首三萬户琅琊臺下復十二歲作琅琊臺立石頌秦德二十九年始皇東遊至陽武博浪沙中為盜所驚求弗得乃令天下大索十日三十一年始皇為微行咸陽與武士四人俱夜出逢盜蘭池見窘武士擊殺盜三十二年始皇之碣石使燕人盧生求羨門髙誓刻碣石門盧生使入海還以鬼神事因奏録圖書曰亡秦者胡也始皇乃使將軍蒙恬發兵三十萬人北擊胡畧取河南地三十三年略取陸梁地為桂林象郡南海以適譴戍西北斥逐匈奴自榆中並河以東屬之隂山以為三十四縣城河上為塞又使蒙恬渡河取髙闕陶山北假中北假地名築亭鄣以逐戎人三十四年丞相斯議曰臣請史官非秦記燒之非博士官所職天下敢有藏詩書百家語者悉詣守尉雜燒之有敢偶語詩書棄市以古非今者族吏見知不舉者與同罪諸有文學之書蠲除之令下三十日不燒黥為城旦所不去者醫藥卜筮種樹之書若欲學法令以吏為師制曰可三十五年乃營作朝宫渭南北上林苑中先作前殿阿房東西五百步南北五十丈上可坐萬人下可建五丈旗周馳為閣道自殿下直抵南山表南山之巔以為門為複道自阿房渡渭屬之咸陽以象天極閣道絶漢抵營室也立石東海上朐界中以為秦東門因徙三萬家麗邑五萬家雲陽皆復十歲盧生說曰上所居毋令人知不死之藥可得於是始皇乃令咸陽之旁二百里内宫觀二百七十複道甬道相連帷帳鐘鼔美人充之各案署不移徙所幸有言其處者罪死始皇帝幸梁山宫從山上見丞相車騎衆弗善也中人或告丞相丞相後損車騎始皇怒曰此中人泄吾語案問莫服當是時詔捕諸時在旁者皆殺之自是後莫知行之所在聽事羣臣受决事悉於咸陽官侯生盧生相謀亡去始皇怒案問諸生犯禁者四百六十人皆坑之長子扶蘇諌曰天下初定逺方黔首未集諸生皆誦法孔子今皆重法繩之臣恐天下不安唯上察之始皇怒使扶蘇北監蒙恬於上郡三十七年始皇出遊左丞相斯從右丞相去疾守少子胡亥愛慕請從上許之十一月行至雲夢望祀虞舜於九疑浮江下觀籍柯渡海渚過丹陽至錢塘臨浙江水波惡乃西百二十里從峽中渡上會稽祭大禹望于南海而立石刻頌秦德還過吳從江乘渡並海上北至琅琊方士徐市等入海求神藥數歲不得費多恐譴乃詐曰蓬萊藥可得然常為大鮫魚所苦故不得至願請善射與俱見則以連弩射之始皇夢與海神戰如人狀以問占夢博士曰水神不可見以大魚蛟龍為候今上禱祀備謹而有此惡神當降去而善神可致乃命入海者賫捕巨魚具而自以連弩候大魚出射之自琅琊北至營城山弗見至之罘山射殺一魚並海西至平原津而疾始皇惡言死羣臣莫敢言死事上病益甚乃為璽書賜公子扶蘇曰與喪㑹咸陽而葬書已封在中車府令趙髙行符璽事所未授使者七月丙寅始皇崩於沙丘平臺時年五十在位三十七年丞相斯為上崩在外恐諸公子及天下有變乃秘之不發喪棺載輼凉車中故幸宦者㕘乘所至上食百官奏事如故宦者輙從輼凉車中可其奏事獨子胡亥趙髙及幸宦者五六人知上死趙髙故嘗教胡亥書及獄律令法事胡亥私幸之髙乃與胡亥丞相斯隂謀破去始皇所封書賜公子扶蘇者而更詐為丞相斯受始皇遺詔沙丘立子胡亥為太子更為書賜公子扶蘇蒙恬數以罪賜死遂從井陘抵九原㑹暑上輼凉車臭乃詔從官令車載一石鮑魚以亂其臭行從直道至咸陽發喪太子胡亥襲位漢書曰秦據勢勝之地騁狙詐之兵蠶食山東一切取勝因矜其所習自任私智訕笑三代蕩滅古法竊自號為皇帝而子弟為匹夫内亡骨肉本根之輔外亡尺土蕃翼之衛吳陳奮其白挺劉項隨而斃之又曰秦始皇即位三十九年内平六國外攘四夷死人如麻暴骨長城之下頭顱相屬於道不一日而無兵又曰賈山借秦為喻名曰至言其辭曰始皇貴為天子富有天下賦歛重數百姓任罷赭衣半道羣盜滿山使天下之人戴目而視傾耳而聽離宫三百鐘鼔不移而具為宫室之麗如此使其後世曾不得聚廬而託處焉為馳道於天下東窮燕齊南極吳楚厚築其外隠以金椎樹以青松為馳道之麗如此使其後世曾不得邪徑而託足焉葬于驪山銅錮其内漆塗其外中成遊觀上成山林為葬埋之侈如此使其後世曾不得蓬顆蔽塜而託葬焉秦以熊羆之力虎狼之心蠶食諸侯并吞海内而不篤禮義故天殃巳加矣異苑曰秦世有謡曰秦有帝號始皇開吾户據吾牀飲吾酒啜吾漿飡吾飯以為粮張吾弓射東墻前至沙丘當滅亡始皇既坑儒焚典乃發孔子墓欲取諸經傳壙既啓於是悉如謡者之言又言謡文刋在塚壁政甚惡之及達沙丘而修别路見一羣小兒輦沙為阜問云沙丘從此得病淮南子曰秦之時髙為臺榭大為苑囿造馳道數千里鑄金人發邊戍入芻藁頭㑹箕斂輸於少府丁壯丈夫西至臨洮狄東至會稽浮石南至象郡桂林北至飛狐陽原道路死人以溝量當此之時有忠諌者為之不祥道仁義者謂之狂桓譚新語曰秦始皇見周室失統自以當保有九州見萬民碌碌猶羣羊聚諸皆可以竿而驅之故遂以敗也二世皇帝史記曰二世皇帝元年年二十一趙髙為郎中令任用事徵材士五萬人為屯衛咸陽令教射狗馬禽獸當食者多度不足下調郡縣轉輸用法益刻深七月戍卒陳勝等反二年冬陳涉所遣周章等將西至戲兵數十萬二世大驚三年二世夢白虎齧其左驂馬殺之心不樂怪問占夢卜曰涇水為祟二世乃齋於望夷宫欲祠涇水沉四白馬使使責讓髙以盜賊事髙懼乃隂與其婿咸陽令閻樂其弟趙成謀使郎中令為内應詐為有大賊遣樂將吏卒千餘人至望夷宫郎中令與樂俱入射上幄坐幃二世怒召左右左右皆惶擾不鬬旁有宧者一人侍不敢去二世入内謂曰何不早告我宧者曰臣不敢言故得全使臣早言皆已誅安得至今閻樂前即二世數曰足下驕恣誅殺無道天下共叛足下其自為計二世曰丞相可得見不樂曰不可二世曰吾願得一郡為王弗許又曰願為萬户侯弗許又曰願與妻子為黔首比諸公子樂曰臣受命於丞相為天下誅足下雖多言臣不敢報麾其兵進二世自殺閻樂歸報趙髙趙髙乃悉召諸大臣公子告以誅二世之狀曰秦故王國始皇君天下故稱帝今六國復自立秦地益小乃空名為帝不可宜為王如故便立二世之兄子公子嬰為秦王以黔首葬二世杜南宜春苑中在位三年秦王子嬰史記曰趙髙令子嬰齋當廟見受王璽齋五日子嬰與其子二人謀稱疾不行髙果自徃曰宗廟重事王奈何不行子嬰遂刺殺趙髙於齋宫夷三族以徇咸陽子嬰為秦王四十六日楚將沛公破秦軍入武關遂至霸上使人約降子嬰子嬰即係頸以組白馬素車奉天子璽符降軹道旁項籍為從長殺子嬰及秦諸公子宗族又史記太史公曰始皇自以為功過五帝地廣三皇而羞與之侔善哉賈生推言之也曰秦并兼諸侯繕津關據險塞脩甲兵而守之然陳涉以戍卒亂散之衆數百奮臂大呼不用弓㦸之兵鉏耰白挺耰田噐也音憂望屋而食橫行天下秦人阻險不守關梁不闔長㦸不刺强弩不射楚師深入戰於鴻門曾無藩籬之艱當此時也世非無深慮知化之士也然不敢盡忠拂過者秦俗多忌諱之禁忠言未卒於口而身為戮歿矣故天下之士傾耳而聽重足而立箝口而不言是以三主失道忠臣不敢諌智士不敢謀天下已亂姦不上聞豈不哀哉秦王纉六世之餘烈振長䇿而御宇内吞二周而亡諸侯履至尊而制六合執捶拊拊音付以鞭笞天下威振四海南取北越之地以為桂林象郡乃使蒙恬北築長城而守藩籬却匈奴七百餘里胡人不敢南下而牧馬士不敢彎弓而報怨於是廢先王之道焚百家之言以愚黔首隳名城殺豪俊收天下之兵聚之咸陽銷鋒鑄鐻以為金人十二以弱黔首之民然後斬華為城因河為津據億丈之城臨不測之谿以為固良將勁弩守要害之處信臣精卒陳利兵而誰何天下已定秦王之心自以為關中之固金城千里子孫帝王萬世之業也秦王既沒餘威振於殊俗陳涉甕牖繩樞之子甿𨽻之人而遷徙之徒率罷散之卒將數百之衆而轉攻秦斬木為兵揭竿為旗天下雲集而響應贏粮而景從山東豪俊遂並起而亡秦族矣然秦以區區之地萬乘之權招八州而朝同列百有餘年然後以六合為家崤函為宫一夫作難而七廟隳身死人手為天下笑者何也仁義不施而攻守之勢異也秦王懐貪鄙之心行自奮之智不信功臣不親士民廢王道立私權禁文書而酷刑法先詐力而後仁義以暴虐為天下始孤獨而有之故其亡可立而待帝王世紀曰秦凡四王二帝合四十九年楚義帝史記曰項梁聞陳王定死召諸别將㑹薛計事沛公亦起沛徃焉居鄛人范增好竒計徃說項梁曰秦滅六國楚最無罪自懷王入秦不反楚人憐之至今故楚南公曰楚雖三户亡秦必楚也今陳勝首事不立楚後而自立其勢不長今君起江東楚蠭起之將爭附君者以君世世楚將為能復立楚後也梁然其言乃求楚懷王孫心民間為人牧羊立以為楚懷王從民所望也陳嬰為楚上柱國與懷王都盱眙秦滅尊懷王為義帝漢書曰義帝名心也項羽謂諸將曰天下初發難時假立諸侯後以伐秦然身披堅執銳首事暴露於野三年滅秦定天下者皆將相諸君與籍之力也義帝雖無功故當分其地而王之諸將皆曰善漢元年四月諸侯罷戲下各就國項王出之國使人徙義帝曰古之帝者必居上㳺乃徙義帝長沙郴縣趣義帝行其羣臣稍叛之乃隂令衡山臨江王擊殺之江中太平御覽卷八十六
