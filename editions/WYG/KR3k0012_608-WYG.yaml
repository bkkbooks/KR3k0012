  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_608-1a, image: WYG0898/WYG0898-0508c.png}
body:
  text: 太平御覽卷六百八宋李昉等撰學部二叙經典釋名曰經徑也常典也如徑路無所不通可常用也白虎通曰五經何謂也易詩書禮樂也古者以易詩禮樂春秋為六經至秦焚書樂經亡今以易書詩禮春秋為五經又禮有周禮儀禮禮記曰三禮春秋有左氏公羊穀梁曰三傳與易書詩通數亦謂之九經文心雕龍宗經篇曰三極彞訓其書曰經經也者恒久之至道不刋之鴻教也禮記經解曰孔子曰入其國其教可知也其為人也温柔敦厚詩教也疏通知逺書教也廣博易良樂教也絜静精微易教也恭儉莊敬禮教也屬辭比事春秋教也故詩之失愚書之失誣樂之失奢易之失賊禮之失煩春秋之失亂左傳曰韓宣子適魯見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之徳與周之所以王也春秋演孔圖曰作法五經求之天地稽之圖象質之三王施之四海也漢書曰六藝之文樂以和神詩以正言禮以明體范􅁮後漢書曰馬融嘗欲訓左氏及見賈逵鄭衆注乃曰賈精而不博鄭博而不精既博既精吾何加焉又曰桓榮受朱普學章句四十萬言榮入授顯宗减為二十萬言却復刪省定成十二萬言由是有桓君大小學後漢書曰許慎字叔重性惇篤少博學馬融常推敬之時人為之語曰五經無雙許叔重初慎以五經傳説臧否不同於是撰五經異義傳於世晉書曰劉殷有七子五子各授一經一子授太史一子授漢書一門之内七業俱興齊書曰臧榮緒常以宣尼庚子日生其日陳五經拜之自號被褐先生唐書曰長慶中上謂兵部侍郎薛放曰為學經史何先放對曰經者古先聖之至言多仲尼所發明皆天人之極致萬代不刋之典也史則歴紀成敗雜書善惡各録當時之事亦是鑒其興亡然得失相叅是非无所准的固不可以典籍比論也上曰六經所尚不一志學之士白首不能盡通如何得其要乎對曰論語者六經之菁華孝經者人倫之大本窮理之要真可謂聖人至言是以漢朝論語首列學官光武令虎賁之士皆習孝經𤣥宗親為孝經注觧皆使當時大理海内乂安人知孝節氣感和樂之所致也上曰聖人謂孝為至德要道其信然矣又曰𤣥宗時國子司業李元瓘上言三禮三傳及毛詩尚書周易等並聖賢微㫖生人教業必事資經逺則斯道不墜今明經所習務在出身咸以禮紀文少人皆競讀周禮經邦之軌則儀禮莊敬之楷模公羊􅂖梁歴代崇習今兩監及州縣以獨學无友四經殆絶既事資訓誘不可因循即望四海均習九經該備從之又曰文宗毎對宰臣未嘗不深言經學李石因奏施士匄春秋可讀上曰朕嘗覽之穿鑿之學貴為異同耳學者如鑿井然得美水則已何必辛苦然後為得也廣雅曰三墳分也論三才之分天地人之治其體有三也五典鎮也制作教法所以鎮之上下其等有五八索著素王之法若孔子者聖而不王制此法者有八也丘區也别九州土氣教化所宜施者也此皆三王以前上至羲皇時書也今皆亡唯堯典在易變易也禮體也得事體也詩志所之也敷布其義謂之賦事類相比似謂之比言王政事謂之雅稱頌成功謂之頌隨作者之志而别名之也尚書上也以堯為尚始而書其時事春秋冬夏終而嵗成春秋書人事卒嵗而究備春秋温凉中氣之和也故舉以為名也國語記諸國君臣相與言語謀議之得失也莊子曰詩以道志書以道事禮以道行樂以道和易以道隂陽春秋以道名分其數散於天下而設於中國者百家之學時或稱而道之皆道古之人陳迹耳而後不能常稱哉又曰孔子謂老聃曰丘治詩書禮樂易春秋六經以為文矣干七十君論先王之道周召之迹一無所用甚矣夫人之難說也道之難明耶老子曰幸子之不遇治世之君也夫六經先王之陳迹也豈其道哉又曰孔子見聃不許於是繙繙堆聚之貌十二經以說老􅅨􅅨曰願聞其要也孟子曰王者之迹息而詩亡詩亡然後春秋作晉之乗楚之檮杌魯之春秋一也淮南子曰五行異氣而皆和六藝異科而皆道温惠淳良者詩之風也純尨敦厚者書之教也清净條逹者易之義也恭儉揖讓者禮之為也寛和簡易者樂之化也刺譏辯議者春秋之靡也故易之失也鬼樂之失也淫詩之失也愚書之失也刼禮之失也亂此六者聖人兼用而裁制之又曰玉石之相類者惟良工能識之書傳之微者唯聖人能論之揚子法言曰或問周官曰立事左氏曰品藻又曰書不經非書也又曰虞夏之書渾渾爾深大商書灝灝爾夷廣周書噩噩爾言明正也下周者其書憔悴乎下周者秦言酷烈也又曰好書不能要諸仲尼書肆也李軌注曰賣書市又曰說天者莫辨乎易說事者莫辨乎書說體者莫辨乎禮說志者莫辨乎詩說理者莫辨乎春秋又曰或問聖人之經不可使易知歟曰不可天俄而可度則其覆物也淺矣地俄而可測則其載物也薄矣大哉天地之為萬物耶五經之為衆説耶抱朴子曰五經為道徳之淵海子書為増深之川流猶北辰之佐三辰林薄之依髙岳也又曰隠士以三墳為金玉五典為琴筝講肆為鐘鼓百家為笙簧孔融與諸卿書曰鄭康成多臆説人見其名學為有所出也證案大較要在五經四部書如非此文近為妄矣若子所執以為郊天鼓必當麒麟之皮也寫孝經本當曽子家䇿乎顔延之庭誥曰觀書貴要觀要貴博博而知要萬流可一詠歌之書取其連類合章比物集句採風謡以逹民志詩為之祖褒貶之書取其正言晦義轉制衰王微辭豐㫖貽意盛聖春秋為上易首體備能事之淵馬陸得其象數而失其成理荀王舉其正宗而略其數象四家之見雖各為所志總而論之情理出於微明氣數生於形分然則荀王得之於心馬陸取之於物其蕪惡迄可知矣夫象數窮則太極著人心極而神功彰若荀王之言易可謂極人心之數者也鄭𤣥六蓺論曰詩者絃歌諷喻之聲也禮者序尊卑之制崇讓合敬春秋者古史所記之制動作之事也桓譚新論曰易一曰連山二曰歸藏三曰周易連山八萬言歸藏四千三百言古文尚書舊有四十五卷為十八篇古帙禮記有四十六卷古論語二十一卷古孝經一卷二十章千八百七十二字今異者四百餘字嘉論之林藪文義之淵海也蘇子曰立君臣設尊卑杜將漸防未萌莫過乎禮哀王道傷時政莫過乎詩導隂陽悔吝莫過乎易明善惡廢興莫過乎春秋量逺近賦九州莫過乎尚書和人情動風俗莫過乎樂治刑名審法術莫過乎商韓載百王紀治亂莫過乎史漢孟軻之徒溷淆其間世人見其才易登其意易過於是家著一書人書一法雅人君子投筆硯而高逝矣傅子曰詩之雅頌傳之典謨文足以相副翫之若近尋之若逺浩浩焉文章之淵府也袁准正論曰公羊髙道聴途說之書欲以鄉曲之辯論聖人之經非其任也潜夫論曰索物於夜室者莫良於火燭索道於當世者莫良於典籍物理論曰夫五經則海也傳記則四瀆諸子則涇渭也至于百川溝洫畎澮茍能通隂陽之氣逹水泉之流以四海為歸者皆溢也孫綽子曰銜轡衡軛無心於馬而所以御馬籍典禮度無心於治而所以為治又曰典籍文章之言也治出於天辭宣於人杜子新語曰衆儒覩春秋之記録政之得失以立正義以為聖人起當復作春秋也自通士若太史公亦以為然余謂之否夫聖賢所陳皆同取道徳仁義以為竒論異文而俱善可觀猶人食皆用魚肉菜茄以為生熟異和而復俱美也博物志曰聖人制作曰經賢者著述曰記曰章句曰解曰論曰讀文心雕龍曰自夫子刪述而大寶啓耀於是易張十翼書標七觀詩列四始禮正五經春秋五例議既極乎性情辭亦匠乎文禮故能開學養正昭明有融然而道心唯微聖謨卓絶牆宇崇峻吐納宏深譬萬鈞之洪鐘無錚錚之細響矣夫易惟談天入神致用故繫稱㫖逺辭文言中事隠韋編三絶固哲人之驪淵也書實紀言而誥訓茫昧通乎爾雅則文意曉然故子夏歎書昭昭若日月之明離離如星辰之行言昭灼也詩主言志詁訓周書摛風裁興藻詞譎喻温柔在誦最稱衷矣禮以立體據事剬範章條纖曲執而後顯採掇生言莫非寳也春秋辨理一字見義五石六鷁以詳略成文雉門兩觀以先後顯㫖婉章志晦原已邃矣尚書則覽文如詭而尋理即暢春秋則觀辭立曉而訪義方隠此聖文殊致表裏之異體者也太平御覽卷六百八
