body:
  text: 太平御覽巻五百六十一宋李昉等撰禮儀部四十弔周禮喪祝曰王弔則與巫前鄭司農注云喪祝與巫以桃茢執戈在王前又曰巫曰男巫王弔則與祝前女巫后弔則與祝前女巫與祝前後如王之禮又太僕曰太僕掌三公孤卿之弔勞王使往也小臣掌士大夫之弔勞禮曰知生者弔知死者傷知生而不知死弔而不傷知死而不知生傷而不弔弔喪不能賻弗問其所費又曰將軍文子之喪既除喪而後越人來弔主人深衣練冠待于廟垂涕洟子游觀之曰將軍文氏之子其庶幾乎亡於禮者之禮也其動也中中禮之變也又曰死而不弔者三謂輕身亡孝也畏人或時以非罪攻已不能有以脫而死之者孔子畏於匡是也厭行止危險之下溺不乗橋船又曰曽子弔於負夏負夏衞也主人既祖填池祖謂移柩車去載處為行始也填池當為奠徹聲之誤奠趣遣奠設祖奠降婦人而後行禮禮既祖而婦人降於及柩婦人辟之復升堂矣柩無反而反之又降婦人葢欲矜賓於此婦人皆非也從者曰禮與怪之曽子曰夫祖者且也且未定之辭且胡為其不可以反宿也曽子襲裘而弔子游裼裘而弔曽子指子游曰夫夫也為習於禮如之何其裼裘而弔也又曰哀公使人弔蕢尚遇諸道辟於路畫宫而受弔焉哀公魯君也畫地為宫象曽子曰蕢尚不如杞梁妻之知禮也齊莊公襲莒于奪杞梁死焉其妻迎其柩於路而哭之哀莊公使人弔之對曰君之臣不免於罪則將肆諸市朝而妻妾執肆陳尸也大夫以上於朝士以下於市執拘也君之臣免於罪則有先人之敝廬在君無所辱命無所辱命辭不受春秋傳曰齊侯弔其室又曰季孫之母死哀公弔焉曽子與子貢弔焉閽人為君在弗内也閽人守門者曽子與子貢入於其厩而修容焉更履飾子貢先入閽人曰鄉者已吿矣既不敢坐以言下之曽子後入閽人辟之見兩賢相隨彌益恭也涉内霤卿大夫皆辟位公降一等而揖之又曰殷既封而弔周反哭而弔封當為空窆之棺也孔子曰殷已慤吾從周又曰曽子與客立於門側其徒趨而出徒謂客之旅曽子曰爾將何之曰吾父死將出哭於巷以為不可發㓙於人前曰反哭於爾次次舎也禮館人使専之若其自有然曽子北面而弔焉又曰五十無車者不越疆而弔人氣力始衰又曰婦人不越疆而弔人不通於外行弔之日不飲酒食肉焉以全哀也弔於葬者必執引若從柩及壙皆執紼示助之以力車曰引棺曰紼喪公弔之必有拜者往謝之雖朋友州里舎人可也謝無主後弔曰寡君丞事示亦為執事來主人曰臨君辱臨其臣之喪君遇柩於路必使人弔之君之於臣有父母之恩大夫之喪庶子不受弔不以卑者為有爵者主又曰子張死曽子有母之喪齊衰而往哭之或曰齊衰不以弔以其無服非禮曽子曰我弔也與哉於朋友哀痛甚而往哭之非若凡弔又曰晉獻公之喪秦穆公使人弔公子重耳獻公殺其子申生重耳避難出亡是時在翟就弔之且曰寡人聞之亡國恒於斯得國恒於斯言在喪代之際雖吾子儼然憂服之中喪亦不可乆也時亦不可失也孺子其圖之勸其反國亦欲納之喪亡失位孺孺穉也以告舅犯舅犯重耳之舅狐偃也子犯字也舅犯曰孺子其辭焉喪人無寳仁親以為寳寳謂善者道可守者仁親親仁義也父死之謂何又因為利欲反國求為後是利父死而天下其孰能說之孺子其辭焉又曰羔裘𤣥冠夫子不以弔不以吉服弔喪也又曰衞司徒敬子死子夏弔焉主人未小斂絰而往子游弔焉主人既小斂出絰反哭子夏曰聞之也與曰聞諸夫子主人未改服則不絰又曰曽子問曰三年之喪弔乎孔子曰三年之喪練不羣立不旅行君子禮以飾情三年之喪而弔哭不亦虛乎為彼哀不専於其親也為親哀則是虛乎又曰諸侯非問疾弔喪而入諸臣之家是謂君臣為謔又曰弔者即位于門東西面其介在東南北面西上西於門賓立門外當靣門主孤西面立於外階下相者受命曰孤某使某請事客曰寡君使某如何不淑受命受主人命命以出也不言殯者喪執賓淑善也如何不善言君痛之甚使某弔相者入吿出曰孤某須矣稱其君名者君薨稱子某使知通辟也須矣不出逆也弔者入主人升堂西面弔者升自西階東面致命曰寡君聞君之喪寡君使某如何不淑子拜稽顙弔者降反位子孤子位者出及者降及門外位又曰婦人非三年之喪不踰封而弔踰封越竟也或謂為越疆又曰諸侯弔於異國之臣則其君為主君為之主弔臣思為巳也子不敢主當中庭北面哭不拜諸侯弔必皮弁錫衰所弔雖已葬主人必免主人未喪服則君亦不錫衰必免者尊人君為之變也未服未成服也既殯成服又曰殷人弔於壙周人弔於家示民不階也既葬哀而哭踊於是弔也左傳曰宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔對曰孤實不敬天降之灾又以為君憂拜命之辱臧文仲曰宋其興乎禹湯罪己其興也勃焉桀紂罪人其亡也忽焉又曰齊侯歸遇杞梁之妻於郊梁戰死妻行迎喪使弔之辭曰殖之有罪何辱命焉故若有罪不足弔若免於罪有先人之敝廬在下妾不得與郊弔婦人無外事故不得與也齊侯弔諸其室傳謂婦人有禮又曰游吉相鄭伯以如晉亦賀虒祈也使趙子見太叔曰甚哉其相蒙也䝉欺也可弔也而又賀之子太叔曰若何弔也其唯我賀將天下實賀又曰琴張開宗魯死琴張孔子弟子字子開名牢將往弔之仲尼曰齊豹之盗而孟勢之賊又何弔焉言齊豹所以為盗孟勢所以見賊皆由宗魯又曰晉頃公卒秋八月葬鄭游吉弔且送葬魏獻子使士景伯詰之曰悼公之喪子西弔子蟜送葬在襄十五年今吾子無二何故漢書曰龔勝死有老父來弔其哭甚哀既而曰吁薰以香自燒膏以明自消龔生竟夭年非吾徒也又曰蔣許字元卿遭父喪有弔者盈門後母疾之不與席不得止舊廬於側作小菴往如舊也續漢書曰郭泰字林宗退身隠居教授徒衆甚盛喪母友人或千里來弔之東觀漢記曰祭遵病薨喪至河南詔遣百官皆以喪服上車駕素服往弔望城門舉音遂哭而止哀慟復幸城門遇喪車瞻望涕泣上親臨祠以太牢儀如孝宣帝臨霍將軍故事謝承後漢書曰徐孺子不就諸公之辟及有喪者萬里常弔於家預炙雞一隻以一兩綿絮酒中暴乾以褁雞徑到所赴冢隧以水漬綿使酒氣以雞置前祭畢便去王隠晉書曰何劭為司徒薨養子岐為嗣袁粲弔岐岐辭以疾粲獨笑而出曰今年必下婢子品王詮謂之曰知死弔死何必見生岐前多罪爾時不下今何公新亡便下岐品人謂中正畏强侮弱粲乃止鄧粲晉記曰阮籍能為青白眼禮俗之士輙以白眼對之宗正嵇喜康之兄也聞籍喪弔焉籍以不哭見其白眼喜不懌而退晉中興書曰周嵩兄顗既被害王敦使人弔嵩嵩曰亡兄天下之人為天下人所殺復何弔敦甚衘之家語曰季桓子死魯大夫朝服而弔子游問於孔子曰禮乎孔子不答他日又問孔子曰始死則羔裘𤣥冠者易之而已又何疑焉又曰孔子有母之喪既練陽虎弔焉私于孔子曰今季氏將大饗境内之士聞諸乎曰丘弗聞聞之雖在衰絰亦欲與往陽虎曰子謂不然乎季氏饗士不及子禮統曰弔生曰唁弔死曰弔生謂之唁何非有泣哭之事但嗟嘆以言故謂之唁弔死謂之弔何弔者毒也致有恩厚禮無服屬但致傷哀痛毒故謂之弔白虎通曰檀弓記曰天子哭諸侯爵弁純衣又曰遣大夫弔辭曰皇天降災子獨離之嗚呼哀哉莊子曰孔子圍於陳蔡之間七日不火食太公任弔之曰饑乎曰然子惡乎曰然任曰直木先伐甘井先竭子其意者飾智以驚愚修身以明汚昭昭乎若揭日月而行故不免又曰莊子妻死惠子弔之則方箕踞皷盆而歌曰察其始本無生非徒無生也本無形非徒無形也本無氣變而有生今變而之死人且寢於巨室我嗷嗷隨而哭之自以為不通乎命故止之又曰老耼死秦侯弔之三號而出弟子曰非夫子之友耶曰然然則弔焉若此可乎曰然始也吾以為其人也而今非也向吾入而弔焉有老者哭之如哭其子少者哭之如哭其父彼其所以會之必有不蘄言而言不蘄哭而哭者是遁天倍情忘其所受淮南子曰北塞之人有善道者其馬無故亡入胡中人皆弔之其父曰此何知乃不為福居數月馬將胡駿而歸人皆賀之其父曰此何知乃不為禍家富良馬其子好騎墮馬而折髀人皆弔之其父曰此何知乃不為福居一年胡夷大出丁壯者控弦而戰塞上之人死者十九此獨以跛故子父相保符子曰陶之富者朱公喪其中子隣人往弔之朱公方擁膝蹲踞捧頥而笑隣人曰聞有喪將唁子之哀朱公曰生不致哀死而唁何隣人之不通也說苑曰孫叔敖為楚令尹一國吏民皆來賀有老父衣粗衣冠白冠後來弔曰身已貴而驕人者民去之位已高而擅權者君惡之爵禄已尊厚而不知足者患處之叔敖再拜敬受命願聞餘教父曰位已高而意益下官益高而心益小禄已厚而慎不敢取君謹守此三者足以治楚矣世説曰顧彦先性好琴及喪家人常以琴置靈床上張季鷹往哭顧不勝其慟徑上床鼔琴作數曲竟撫琴曰彦先頗復賞此不因又慟哭下執孝子手而去賀循喪服要記曰始弔朝服𤣥端之服也皮弁絰素弁而加環絰也始死而往朝服者主人未變賓未可以變也又曰古之弔者皆因朝夕哭而入弔賓至主人即出中門外西面向北上拜賓入門即位於堂下當階西面賔即位皆哭哭止主人拜之又曰大夫弔於大夫始死而往服朝服裘如吉時也當斂之時而至則弁絰服皮弁之服以襲裘也主人成服而往則皮弁絰而加錫衰也大夫於士有朋友之恩乃得弁絰謝茲喪服圖曰天王弔三公及三孤弁絰錫衰弔六卿弁絰錫衰弔大夫弁絰疑衰弔士弁絰緦衰弔畿内諸侯弁絰緦衰郭太别傳曰賈淑字子厚林宗鄉人雖世有冠冕而性險害邑里患之林宗遭母憂淑來弔之而鉅鹿孫咸直亦至咸直以林宗賢而受惡人弔心怪之不進而去林宗遽迎而謝曰賈子厚誠凶徳然洗心同善仲尼不逆互鄉故許其進也淑聞之改過自厲終成善士又林宗有母喪徐穉往弔置生芻一束於廬前而去林宗曰此必南州徐孺子也詩不云乎生芻一束其人如玉吾無徳以堪之裴楷别傳曰裴楷少知名而風情朗悟初陳留阮籍遭母喪楷弱冠往弔籍乃離喪位神志晏然至乃縱情嘯詠傍若無人楷不為改容行止自若遂便率情獨哭哭畢而退威容舉動無異陶侃傳曰侃丁母艱在墓下忽有二客來弔不哭而退儀服鮮異知非常人遣隨而㸔之但見雙鶴舞而冲天也列女傳曰魯黔婁先生死曽子與門人往弔焉隠門而入立于堂下其妻出衣褐袍曽子弔之上堂見先生尸牖下枕塹席藳緼袍無表覆以布被首足不盡斂覆頭則足見覆足則頭見皇覽逸禮曰君使大夫弔於國君禮錫衰裳弁絰有下大夫為介亦如之士介者將命者緦麻裳弁絰異姓葛同姓麻語林曰陳元方遭父喪形體骨立其母哀之以錦被蒙其上郭林宗往弔見錦被而責之賓客絶百日許太平御覽卷五百六十一
