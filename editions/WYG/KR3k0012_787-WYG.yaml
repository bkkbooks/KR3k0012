body:
  text: 太平御覽卷七百八十七宋李昉等撰四夷部八南蠻三赤土國蒲羅中國優鈸國横趺國比攎國馬五洲薄歎洲躭蘭洲巨延洲濱郍専國烏文國斯調國林陽國牟奴七國蒲林國師子國毗加棃國干陀利國狼牙脩國婆利國訶羅陀國阿羅單國蒲黄國婆皇國婆逹國闍婆逹國槃槃國斤陀利國赤土國隋書曰赤土國扶南之别種也在南海水中行百餘日而逹所都土色赤因以為號東婆羅刺國西婆羅㜑國南訶羅旦國北拒大海地方數千里其王姓瞿曇氏名利冨多塞不知有國近逺稱其父釋王位出家為道𫝊位於利冨多塞在位十六年矣有三妻並隣國王之女也居僧祗城有門三重相去各百許步每門圖畫仙人菩薩之像懸金花鈴毦婦女數十人或奏樂或捧金花又飾四婦人容飾如佛塔邊金剛力士之狀夾門而立門外者持兵仗門内者執白拂夾道垂素網綴花王宫諸屋悉是重閤比户北面而坐坐三重之榻衣朝霞布冠金花冠垂雜寶瓔珞四女子立侍左右右兵衛百餘人王榻後作一龕以金銀五香木雜鈿之龕後懸一金光炤夾榻又樹二金鏡鏡前並陳金甕甕前各有金香爐當前置一金伏牛牛前樹一寶蓋葢左右皆有寶扇婆羅門數百人東西重行相向而坐其官有薩陀迦羅一人陀拏逹义二人迦利蜜迦三人共掌政事俱羅末帝一人掌刑法每城置郍耶迦一人鉢帝十人其俗皆穿耳剪髪無跪拜之禮以香油塗身敬佛尤重婆羅門婦人作髻於項後男女通以朝霞朝雲雜色布為衣豪冨之家恣其華靡唯金鏁非王賜不得服用每婚嫁擇吉日女嫁先期五日作樂飲酒父執女手以授婿七日乃配焉既娶則分財别居唯幼子與父同居父母兄弟死則剔髮素服就水上搆竹為柵柵内積薪以屍置上燒香建幡吹蠡撃鼔以送之縱火焚薪遂落於水貴賤皆同唯國王燒訖取灰貯以金缾蔵於廟屋冬夏常温雨多霽少種植無時特宜稻穄白荳黑麻其餘物産多同交趾以甘蔗作酒雜以紫𤓰根酒色黄赤味亦香美亦名椰漿為酒又曰煬帝即位募能通絶域者大業三年屯田主事常駿虞部主事王君政等請使赤土帝大悅賜駿等帛各百疋時服一襲遣賫物五千叚以賜赤土王其年十月駿等自南海郡乗舟晝夜二旬每值便風至焦石山而過東南泊陵加鉢㧞多洲西與林邑相對上有神祠焉又南行至師子石自是島嶼連接又行二三日西望見狼牙須國之山於是南逹鷄籠島至於赤土之界其王遣婆羅門鳩摩羅以船三十艘来迎吹蠡撃鼔以樂隨使進金鏁以纜駿舩月餘至其都王遣其子郍耶迦請與駿等禮見遣人送金盤貯香花并鏡鑷金合二枚貯香油金瓶八枚貯香水白疊布四條以擬供使者盥洗將象二頭持孔雀葢以迎使人并致金花盤以籍詔函男女百人奏蠡鼔婆羅門二人導路至王宫宣詔訖引駿等坐奏天竺樂事畢駿等還館又遣人送食以草葉為盤其大方丈後請駿等入宴王前設兩床牀上並設草葉盤方一丈五尺上有黄白紫赤四色之餅牛羊魚鱉猪瑇瑁之肉百餘品延駿升牀從者坐於地席各以金鍾置酒女樂迭奏禮遺甚厚尋遣郍邪迦隨駿貢方物既入海見緑魚羣飛水上浮海上十餘日至林邑東南並蒲浪切山而行其海闊千餘步色黄氣腥舟行一日不絶云是大魚糞也循海北岸逹於交趾至六年春與郍耶迦於𢎞農謁帝帝大悅賜物及官賞各有差蒲羅中國吴時康泰為中郎表上扶南土俗曰利正東行極﨑頭海邊有居人人皆有尾五六寸名蒲羅中國其俗食人優鈸國康泰扶南土俗曰優鈸國者在天竺之東南可五千里國土熾盛城郭風俗與天竺同横趺國康泰扶南土俗曰横趺國在優鈸之東南城郭饒樂不及優鈸也比攎國康泰扶南土俗曰諸薄之東南有比攎洲出錫轉賣與外徼馬五州康泰扶南土俗曰諸薄之東有五洲出鷄舌香樹木多華少實薄歎洲康泰扶南土俗曰諸薄之西北有薄歎洲土地出金常以採金為業轉賣與諸賈人易糧米雜物躭蘭洲康泰扶南土俗曰諸薄之西北有躭蘭之洲出鐡巨延洲康泰扶南土俗曰諸薄之東北有巨延洲人民无田種芋浮舩海中截大蚶螺盃往扶南濱郍専國康泰扶南土俗曰濱郍専國出􅗬都田切馬及金俗民皆有衣被結髪也烏文國康泰扶南土俗曰烏文國昔混滇初載賈人大泊所成此國斯調國康泰扶南土俗曰斯調洲灣中有自然盤螺如細石子國人取之一車輸王餘自入南州異物志斯調海中洲名也在歌營東南可三千里上有王國城市街巷土地沃美萬震南方異物志曰斯調國又有中洲焉春夏生火秋冬滅有木生於火中秋冬枯死以皮為布林陽國康泰扶南土俗曰扶南之西南有林陽國去扶南七千里土地奉佛有數千沙門持戒六齊曰魚肉不得入國一日再市朝市諸雜米甘菓石蜜暮中但貨香花南州異物志曰林陽在扶南西七千餘里地皆平􅀶民十餘萬家男女行善人皆持佛牟奴國摸盧國末利國卑離國滿都國闕余國沙樓國晉起居注曰太熈元年正月牟奴等國大小口十七萬九千餘人各遣正副使詣護東夷校尉何龕上獻方物蒲林國晉起居注曰興寧元年閏月蒲林國王新開通前所奉表詣先帝令違到其國慰諭師子國宋元嘉起居注曰師子國王遣使奉獻詔曰此小乗經甚少彼國所有皆可悉為冩送之聞彼隣多有師子此所未覩可悉致之法顯記曰師子國本無人止有鬼神及龍居之諸國商人来共市易鬼神自現身但出寶物顯其時直商人則依價直取物異國人聞其土樂悉衆復来於是遂成大國和適無冬夏之異草木常茂田種隨人無有時節毗加梨國宋元嘉起居注曰五年天竺毗加梨國王月受遣使上表并奉金剛指環一枚剛印摩勒金環一枚􅕰㲪一具白栴檀六叚白赤鸚鵡各一頭細疊兩張干陁利國南史曰干陁利國在南海洲上其俗與林邑扶南略同出班布古貝檳榔特精為諸國之極宋孝武世王釋婆羅郍隣陁遣長史竺留陁獻金銀寶器梁天監元年其王瞿曇修䟦陀羅以四月八日夢一僧謂曰中國今有聖主十年後佛法大興汝若遣使貢奉禮敬則土地豐樂商旅百倍若不信我則境土不得自安初勿之信既而又夢此僧曰汝若信我我當與汝往觀乃於夢中至中國拜覲天子既覺心異之陀羅本工畫乃冩夢中所見武帝容質飾以丹青乃遣使并畫工奉表獻玉盤等物使人既至摸冩帝形以還其國比所畫則符同焉因盛以寶函日加禮敬後䟦陁死子毗針耶䟦摩立遣長史毗員䟦摩奉表獻金芙蓉雜香藥等狼牙脩國南史曰狼牙脩國在南海中其界東西三十日南北二十日行北去廣州二萬四千里土氣物産與扶南略同偏多棧沉婆律香其俗男女皆袒而披髪以古貝為干漫其王及貴臣乃加雲霞布覆胛以金䋲為絡帶金環貫耳女子則以布纓絡繞身其國累塼為城重門樓閣王出乗象有幡旄旗鼔罩白葢兵衛甚嚴國人說立國已四百餘年後嗣衰弱王族有賢者國人歸向之王聞乃加囚執其鏁無故自斷王以為神因不敢害乃逐出境遂奔天竺天竺妻以長女俄而狼牙王死大臣迎還為王二十餘年死子婆加逹多立天監十四年遣使阿撤多奉表朝貢婆利國南史曰婆利國在廣州東南海中洲上去廣州二月日行國界東西五十日行南北二十日行有一百三十六聚土氣暑熱如中國之盛夏糓一嵗再熟草木常榮海出文螺紫貝有石名坩貝大硬其國人披古貝如帊及為都縵王乃用斑絲者以纓絡繞身頭着金長冠髙尺餘形如弁綴以七寶之飾帶金裝劒偏坐髙坐以金蹬支足侍女皆為金花雜寶之飾或持白眊拂及孔雀扇王出以象駕輿輿以雜香為之上施羽葢珠簾導從吹螺撃鼔自古未通中國問其先及年數不能記自言白凈王夫人即其國女天監十六年遣使奉表獻金席等普通三年其王頻伽復遣使珠智獻白鸚鵡青蟲兠鍪琉璃器古貝螺杯雜色香數十種隋書曰婆利國自交阯浮海南過赤土乃至其國國界東西四月行南四十五日行王姓刹利耶伽名䕶濫郍婆官曰獨訶邪拏次曰獨訶氏拏國人善投輪刀其大如鏡中有竅外鋒如鋸逺以投人無不中其餘兵器與中國略同俗類真臘物産同於林邑其殺人及盗截其手姦者鏁其足朞年而止祭祀必以月晦盤貯酒殽浮之流水每十一月必設大祭海出珊瑚有鳥名舍利解人語大業十二年遣使入貢後遂絶阿羅陀國南史曰阿羅陀國宋元嘉七年遣使奉表曰伏承聖主重三寶興立塔寺周滿國界今故遣使二人表此微心阿羅單國宋元嘉起居注曰十年六月闍婆洲阿羅單國王毗沙䟦摩遣使奉表又曰十一年阿羅單國王尸梨毗遮耶獻銀滲柈等南史曰阿羅單國都闍婆洲元嘉七年遣使獻金剛指環赤鸚鵡鳥天竺國白疊古貝葉婆國古貝等物十年阿羅單國王毗沙䟦摩奉表曰常勝天子陛下諸佛世尊常樂安穏三逹六通為世間道是名如来是故至誠五體敬禮其後為子所簒奪十三年又上表二十六年文帝詔曰阿羅單婆皇婆逹三國頻越遐海欵化納貢逺誠宜甄可並加除授乃遣使䇿命之二十九年又遣長史婆和沙彌獻方物蒲黄國宋元嘉起居注曰二十六年蒲黄國獻牛黄等物又獻欝金香等物婆皇國南史曰婆皇國元嘉二十六年國王舍利婆羅䟦摩遣使獻方物四十一種文帝䇿命之為婆皇國王二十八年復遣使貢獻孝武孝建三年又遣長史竺郍婆智奉表獻方物以婆郍智為振威將軍大明三年獻赤白鸚鵡大明八年明帝泰始三年又遣使貢獻方物明帝以其長史竺須羅逺前長史振威將軍竺郍婆智並為龍驤將軍婆逹國南史曰婆逹國元嘉二十六年國王舍利不陵伽䟦摩遣使獻方物文帝䇿命之為婆逹國王二十六年二十八年復遣使獻方物闍婆逹國南史曰闍婆逹國元嘉中國王師黎婆逹阿陁羅䟦摩遣使奉表曰宋國大主大吉天子足下教化一切種智安穏天人師降伏四魔成等正覺轉尊法輪度脫衆生我雖在逺亦霑靈潤盤盤國宋起居注曰孝建二年七月二十日盤盤國王遣長史竺伽藍婆奉獻金銀琉璃諸香藥等物南史曰盤盤國元嘉孝建大明中並遣使貢獻梁中大通元年四年其王遣使奉表累送佛牙及畫塔獻沉檀等香數十種六年八月復遣使送菩提國舍利及畫塔圖并菩提樹葉詹糖等香梁書曰盤盤國南海大洲中北與林邑隔小海自交州舩行四十日至其國王曰楊栗翨音翅栗翨父曰楊德武連以上無得而記百姓多縁水而居國無城皆竪木為柵王坐金龍牀每坐諸大人皆兩手交抱肩而跪又其國多有婆羅門自天竺来就王乞財物王甚重之其大臣曰勃郎索濫次曰崑崙帝也次曰崑崙勃和胡卧切次曰崑崙勃帝一耳且其言崑崙古龍聲相近故或有謂為古龍者其在外城者曰郍延猶中夏刺史縣令其矢多以石為鏃矟則以金為刃有僧尼寺十所僧尼讀佛經皆食肉而飲酒亦有道士寺一所道士不飲酒食肉讀阿脩羅王經其國不甚重之俗皆呼僧為比丘呼道士為貪隋大業中亦遣使朝貢唐書曰盤盤國在林邑西南海曲中北與林邑隔小海自交州船行四十四日乃至其國與狼牙脩國為隣人皆學婆羅門甚敬佛法貞觀九年遣使朝貢方物斤陁利國宋起居注曰孝建二年八月二日斤陁利國王釋陀羅隣陁遣長使行留陁反多奉表獻方物太平御覽卷七百八十七
