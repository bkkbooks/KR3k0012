body:
  text: 太平御覽卷一百十三宋李昉等撰皇王部三十八唐徳宗孝文皇帝朱泚附順宗安皇帝徳宗孝文皇帝唐書曰徳宗孝文皇帝諱适代宗長子母曰睿真皇后沈氏天寳元年四月癸巳生于長安東宫其年十一月拜特進封奉節郡王代宗即位之年五月以上為天下兵馬元帥改封魯王八月改封雍王廣徳二年二月立為皇太子大厯十四年五月辛酉代宗崩癸亥即位于太極殿六月己亥朔御丹鳯樓大赦天下八月以門下侍郎平章事崔祐甫為中書侍郎平章事甲辰以道州司馬楊炎為門下侍郎平章事乙巳遣太常少卿韋倫使吐蕃以蕃俘五百人還之示修好也冬十月吐蕃合南蠻之衆號二十萬三道㓂茂州扶文黎雅等州連䧟郡邑發禁兵四千助蜀大破之十二月乙夘立宣王誦為皇太子建中元年春正月丁夘朔御含元殿改元建中羣臣上尊號曰聖神文武皇帝己巳朝太清宫庚午謁太廟辛未有事於郊丘還宫御丹鳯門大赦天下自艱難以来徴賦名目頗多今後除兩稅外輒率一錢以枉法論二年三月築汴州城初大厯中李正已有淄青齊海登萊沂宻徳棣曹濮兖鄆十五州之地李寳臣有恒定易趙深冀滄七州之地田承嗣有魏慱相衛洺貝澶七州之地梁崇義有襄鄧均房復郢六州之地各聚兵數萬始因叛亂得立雖朝廷寵待加恩心猶疑貳皆連衡盤結以自固先是汴州以城隘不容衆請廣之至是築城五月丙寅以軍興什一而稅冬十一月尚書左僕射楊炎貶崖州司馬尋賜死三年四月封朱滔為通義郡王朱滔王武俊田悅等叛十一月朱滔田恱王武俊於魏縣軍壘各相推奬僣稱王號署官名如國初親王行臺之制丁丑李希烈自稱天下都元帥太尉建興王與朱滔等四盗膠固為逆四年春正月鳯翔節度使張鎰與吐蕃宰相尚結賛同盟於清水庚寅李希烈䧟汝州執知州李元吉而去東都震駭甲午遣顔真卿宣慰李希烈軍八月丁未李希烈率衆三萬攻哥舒曜於襄城東都危急冬十月詔涇原節度使姚令言率涇原之師救哥舒曜丁未涇原軍出京城至滻水倒戈謀叛姚令言不能禁止上令載繒綵二車遣晉王徃慰諭之亂兵已陳於丹鳯闕下召神䇿軍拒之無一人至者上與太子諸王妃主百餘人出苑北門右龍武軍使令狐建方較射于軍中聞難聚射士得四百人扈従其夕至咸陽飯數匕而過戊申至奉天己酉元帥都虞候渾瑊以子弟家屬至乃以瑊為行在都虞候亂兵既剽京城屯於白華乃於晉昌里迎朱泚為帥稱太尉居含元殿上以奉天隘欲幸鳯翔壬子鳯翔軍亂殺節度使張鎰乃止癸丑李希烈䧟襄城哥舒曜走洛陽丁巳邠寕節度韓遊環與喻惟明率兵三千至纔入奉天賊軍亦至乃出拒之王師不利賊攻愈急矢石雨下死傷者衆人心危蹙上與渾瑊對泣朱泚據乾陵作樂下瞰城中辭多侮慢戊子朔方節度使李懐光遣兵馬使張韶奉表言大軍將至乃令昇韶巡城呌呼歡聲動地賊不之測疑懼緩攻癸巳懐光軍次醴泉是夜賊解圍而去神䇿將李晟自定州率師赴難軍於渭橋興元元年春正月上在奉天詔曰克致興化必在推誠忘已濟人不吝改過朕嗣服丕構君臨萬邦失守宗祧越在草莽不念率德誠莫追於既往永言思咎期有復於將來明徴其義以示天下予小子懼徳不嗣罔敢怠荒然以長於深宫之中暗於經國之務積習易溺居安忘危不知稼穡之艱難不恤征戍之勞苦澤靡下究情未上通事既壅隔人懐疑阻猶昧省已遂用興戎徴師四方轉餉千里賦車籍馬逺近騷然行齎居送衆庶勞止力役不息田莱多荒暴令峻於誅求疲民空於杼軸轉死溝壑離去鄉閭邑里丘墟人烟斷絶天譴於上而朕不寤人怨於下而朕不知馴致亂階變起都邑賊臣乗釁肆逆滔天曾莫愧畏敢行凌偪萬品失序九廟震驚上辱於祖宗下負於蒸庶痛心靦面罪實在予永言愧悼若墜泉谷頼天地降祐神人叶謀將相竭誠爪牙宣力羣盗斯屏皇維載張將𢎞永圖必布新令朕晨興夕惕惟省前非乃者公卿百寮用加虛美以聖神文武之號被蒙暗寡昧之躬固辭不獲俯遂羣議昨因内省良所瞿然自今已後中外書奏不得言聖神文武之號今上元統厯獻嵗發祥宜革紀年之號式敷在宥之澤可大赦天下改建中五年爲興元元年李希烈田恱王武俊李納咸以勲舊繼守藩鎮維撫馭􅆾方致其疑懼皆由上失其道而下罹其災一切並與洗滌復其爵位待之如初仍即遣使分道宣諭朱滔與賊泚連坐路逺必不同謀朕方推以至誠務存𢎞貸如能効順亦與維新朱泚反易天常盜竊名器暴犯陵寢所不忍言獲罪祖宗朕不敢赦除泚外並從原宥春二月甲子加連城郡王李懐光太尉仍賜鐡劵赦三死罪懐光怒曰凡人臣反逆乃賜鐡劵恕以不死今懐光是反定矣因投之於地上聞懐光將叛令翰林學士陸䞇往慰諭之其詞禮益倨悖李晟尋自咸陽移兵東渭橋避懐光也晟以懐光反狀已明請上幸蜀丁夘車駕幸梁州畱戴休顔守奉天三月懐光燒營走歸河中庚寅車駕次城固壬辰至梁州四月辛丑朔時將士未給春衣上猶夾服漢中早熱左右請御暑服上曰將士未易冬服獨御春衫可乎俄而貢物繼至先給諸軍而始御之五月李晟自渭北移軍於光泰門外賊來薄我軍士奮擊大敗之斬馘千級戊戌晟列陣於光泰門外遣騎將史萬頃往神䴥村開苑墻二百餘步賊樹栅當之我軍争拔栅與賊血戰賊黨大敗追擊至白華朱泚姚令言率衆萬餘遁去晟收復京城是日渾瑊與戴休顔亦破賊三千於咸陽韓遊環追朱泚於涇州六月李晟上收城露布上覽之涕下沾襟涇州田希鑒斬姚令言幽州軍士韓旻於彭原斬朱泚並傳首至行在乙巳遣吏部侍郎班宏入京宣慰六月甲午車駕發興元秋七月丙子次鳯翔府壬子至自興元辛夘御丹鳯樓大赦天下九月丁卯上顧謂宰臣曰今大盜雖除時猶多難宜廣延納以達下情近日諫官都無論奏自今每正衙及延英坐日常令朝臣三兩人面奏時政得失庶有𢎞益貞元元年正月丁夘朔御含元殿受朝賀禮畢宣制大赦天下改元時關東大饑賦調不入國用益窘關中饑民蒸蝗蟲而食之五月分命朝臣禱羣神以祈雨蝗自海而至羣飛蔽天每下則草木及畜毛無復孑遺穀價騰踊九月朔方大將牛名俊斬李懐光傳首于闕下馬燧收復河中十月上御正殿䇿賢良方正能直言極諌等三科舉人十一月癸夘上親祀昊天上帝於圜丘禮畢御丹鳯樓大赦天下二年四月丙寅淮西李希烈爲其牙將陳仙竒所酖並誅其妻子仙竒以淮西歸順九月乙巳吐蕃冦好畤京師戒嚴李晟部將王秘撃吐蕃於汧陽城敗其軍辛亥冦鳯翔李晟出師禦之一夕而退冬十月李晟拔吐蕃摧沙堡十一月册淑妃王氏爲皇后丁酉后崩諡曰昭徳辛丑吐蕃陷鹽州三年三月河東馬燧來朝時吐蕃尚結贊使大將論煩熱卑辭厚意告馬燧請兩國同盟上疑其不誠不允故燧自將論煩熱入朝盛言蕃相請盟可以保信上從之五月辛未侍中渾瑊與吐蕃宰相尚結贊同盟于平凉爲蕃兵所刼瑊遁而獲免崔漢衡已下將吏陷没者六十餘人四年正月朔上御丹鳯樓大赦天下京師地震辛亥又震甲寅又震宴羣臣於麟徳殿己未地震丁夘有司條奏省官其左右常侍太子賓客請依前置四員從之壬戊加置諫議大夫八員分中書四員爲右門下四員爲左是月吐蕃冦涇邠寜鄜慶等州焚彭原縣邉將閉城自固賊驅人畜三萬計凡二旬而退五年春正月乙夘詔自令宜以二月一日爲中和節以代正月晦日備三令節數内外官司休假一日二月庚子以大理卿董晉爲門下侍郎同平章事以御史中丞竇參爲中書侍郎平章事兼轉運使六年春正月戊申大雪二月戊辰朔百僚㑹宴於曲江亭上賦中和節羣臣賜宴詩七韻是日百僚進兆人本業三卷八年四月乙未貶中書侍郎平章事竇參為郴州别駕以尚書左丞趙憬兵部侍郎陸贄並爲中書侍郎同中書門下平章事八月以天下水災命朝臣宣撫賑貸河南河北山南江淮凡四十餘州大小漂溺死者二萬餘人九年正月癸夘初稅茶嵗得錢四十萬貫從監鐡使張滂所奏茶之有稅自此始五月乙巳韋皋破吐蕃峨和定亷城通鶴軍凡平堡五十餘所十月環王國獻犀牛上令見于太廟十年冬十月御宣政殿試賢良方正能直言極諫等舉人十二月貶中書侍郎平章事陸贄爲太子賓客十二年三月以户部侍郎裴延齡爲户部尚書六月初置左右䕶軍中尉十二月乙未大雪平地二尺竹栢多死環王國所獻犀牛是冬凍死上著刑政箴一首癸未回紇南詔劔南西山八國女國王並來朝賀十三年春正月吐蕃贊普遣使修好塞上以聞上以犬戎負約不受其使十六年春正月恒兾易定陳許河陽四鎮之師與賊戰皆不利而退二十一年春正月御含元殿受朝賀是日上不康癸巳㑹羣臣於宣政殿宣遺詔皇太子宜於柩前即位是日崩於㑹寜殿享壽六十四諡曰神武孝文皇帝廟號徳宗𦵏崇陵朱泚附唐書曰朱泚幽州昌平人曽祖利贊善大夫贈禮部尚書祖思明太子洗馬贈太子太師父懐珪天寳初事范陽節度使裴寛爲衙前將授折衝將軍及安禄山史思明反叛累爲管兵將寳應中李懐仙歸順奏爲薊州刺史平盧軍畱後栁城軍使卒贈左僕射泚以父資從軍㓜壯偉腰𢃄十圍騎射武藝亦不出人外若寛和中頗忍忌然輕財好施每征戰所得賞物輙分與麾下將士以是爲衆所推故得濟其兇謀初𨽻李懐仙爲十將改經畧副使朱希采既殺李懐仙自爲節度以泚宗姓甚委信之希采爲政苛酷人不堪命大厯七年秋竟爲孔目官李懐瑗所殺倉卒之際未有所從泚營在城北弟滔主衙内兵亦得衆心滔變詐多端潛使百餘人於衆中大言曰節度使非城北朱副使莫可衆既無所從因共推泚泚遂權知畱後遣使奉表京師十月拜檢校左散騎常侍兼御史中丞幽州盧龍節度等使八年三月遷幽州盧龍莭度等使幽州長史兼御史夫夫其年泚上表令弟滔率兵二千五百人赴京西防秋代宗嘉之手詔褒美九年就加檢校户部尚書賜實封百户幽州及河北諸鎮自天寳末便爲逆亂之地李懐仙朱希彩與連境三節度名雖向順未曽朝謁至是泚率先上表請自領部騎三千入覲詔修甲第以待之九月泚至京師代宗御内殿引見賜御馬兩匹戰馬十匹金銀錦綵甚厚又以器物十牀馬四十匹絹二萬疋衣一千七百襲賜其將士宴犒之盛近時未有泚又上表請留京師從之因授其弟滔御史大夫幽州節度畱後仍以河陽永平軍防秋兵郭子儀統之决勝軍揚猷兵李抱玉統之淮西鳯翔兵馬璘統之汴宋淄青兵俾泚統焉十一年八月加拜同平章事尋令出鎮奉天行營復賜金銀繒綵並内庫弓箭以寵之十二年加檢校司空代李抱玉爲隴右節度使權知河西澤潞行營兵馬事徳宗嗣位加太子太師鳯翔尹實封至三百户建中元年涇州將劉文喜阻兵為亂加泚四鎮北庭行軍涇原節度與諸軍討伐涇州平加泚中書令還鎮鳯翔帝以舒王謨遥領涇原節度二年又加泚太尉朱滔將反叛隂使人與泚計議以帛書内蠟丸中置髪髻間河東節度馬燧搜獲之以聞並送帛書及所遣使泚惶懼頓首乞歸罪有司上勉之曰千里不同謀非卿之過三年四月以張鎰代泚爲鳯翔隴右節度畱後畱泚京師加實封至一千户與一子正員官其幽州盧龍節度太尉中書令並如故四年十月涇原兵叛鑾駕幸奉天叛卒等以泚嘗統涇州知其失權廢居怏怏思亂羣冦無帥幸泚政寛乃相與謀曰朱太尉久囚空宅若迎而爲主事必濟矣姚令言乃率百餘騎迎泚於進昌里第泚乗馬擁從向闕燭炬星羅觀者萬計入居含元殿明日移白華殿但稱太尉朝臣有謁泚者悉勸奉迎鑾駕既不合泚意皆逡巡而退光禄卿源休至遂屏人移時言多悖逆乂盛陳成敗稱述符命勸其僭偽泚甚悅之又李忠臣張光盛繼至咸以官閒積憤樂於禍亂鳯翔涇原大將張庭芝段誠諫以潰卒三千餘自褒城而至賊泚自謂衆望所集僭竊之心自此而定乃以源休爲京兆尹判度支李忠臣爲皇城使段秀實久失兵柄故推心委之遂發銳師三千聲言奉迎乗輿實隂有逆謀秀實與劉海賔謀誅泚且慮叛卒之震驚法駕乃潛爲賊符追所發兵至六日兵乃絡繹而回因與海賔同入見泚爲陳逆順之理而海賔於靴中取匕首爲其所覺遂不得前秀實知不可以義動遂奪源休象笏挺而擊泚仍大呼曰反虜當斬泚舉臂衛首秀實格拉之洶洶然李忠臣馳助泚泚素多力纔破其面逆徒譟集秀實海賔遂併見害明日聲言以親王權主社稷士庶競往觀之八日源休姚令言李忠臣張光晟等八人導泚自白華入宣政殿僭即偽位自稱大秦皇帝號應天元年愚智莫不憤怒侍衛皆卒伍僚吏行列不過十餘人下僞詔曰幽囚之中神器自至豈朕薄徳所能經營彭偃之詞也僞署姚令言爲侍中李忠臣爲司空兼侍中源休爲中書侍郎平章事判度支蔣鎮爲吏部侍郎樊系爲禮部侍郎儀制使許季常爲京兆尹洪經綸爲太常少卿彭偃爲中書舍人裴揆崔㓜真爲給事中崔宣爲御史中丞張光晟仇敬中敬釭張寳何望之段誠諫張庭芝杜如江爲莭度使仍以其兄子遂爲太子遙封弟滔爲冀王太尉尚書令㝷又號皇太弟十月泚自領兵侵逼奉天竊威儀輦輅闐隘道途蟻聚之衆軍勢頗盛以姚令言爲元帥張光晟爲副以李忠臣爲京兆皇城畱後居中書省㝷以蔣鎮爲門下侍郎李子平爲諫議大夫並平章事泚軍舍於城下渾瑊韓遊環禦之泚衆大敗死者萬計泚收軍於奉天東三里下營大修攻具明日泚又分兵營於乾陵下瞰城内大震十一月三日杜希全與泚衆戰於莫谷官軍不利自是賊衆驕怠王師乗城而戰人百其勇賊多敗衂或出野戰官軍又獲利焉泚乃大驅百姓塡塹夜攻城城中設竒以應之賊乃退縮西明寺僧法壑有巧思爲泚造雲梯十五日辰時梯臨城東北隅城内震駭渾瑊侯仲莊設大坑爲地道陷之又縱火焚其梯東風起吹我軍衆頗危俄而風迴吹賊軍瑊益薪潑油金鼓齊震風火俱熾須臾雲梯與兇黨同爲灰燼城中三門悉出兵王師又㨗其夜兵復出攻泚衆敗績李懐光以五萬人來援自河北至泚衆惶駭因而潰長圍遂解衆以爲懐光三日不至城則危矣二十日夜泚走至京城時姚令言於城造戰格抛樓每坊團練人心大擾泚自奉天迴乃悉令去之曰攻戰吾自有計前此每三五日即使人偽自城外來周走號令曰奉天已破百姓聞之莫不涕泣道路閴寂時有入臺省吏人不過十數輩郎官六七人而亦令依常年舉選初有數十人陳狀旬日亦皆屏退泚自號其宅曰潛龍宫悉移内庫珍寳以實之識者曰易稱潛龍勿用此敗徴也無幾百姓剽奪其珍寳泚不能禁止明年正月一日泚改偽國號曰漢稱天皇元年二月李懐光既圖叛逆遣使與泚通和鑾駕幸梁洋自此衣冠之潛匿者出受偽官十七八焉懐光初與泚往復通好甚宻以錢穀金帛相餽遺泚與書事之如兄約云削平關中當割據山河永爲隣國及懐光决計背叛逼乗輿遷幸泚乃下偽詔書待懐光以臣禮仍徴兵馬懐光既為所賣慚怒憤恥遂領衆遁歸河中三月李晟駱元光尚可孤之衆悉於城東累敗泚衆四月泚使韓旻宋歸朝張庭芝等冦武功渾瑊以其衆與吐蕃論莽羅大敗旻歸朝殺逆黨萬餘人於武亭川五月又使仇敬忠冦藍田尚可孤擊之大破泚衆擒敬忠斬之李晟駱元光尚可孤悉還師齊進晟屯光泰門逆徒拒官軍王師累㨗二十八日官軍入收京師逆黨大潰泚與姚令言張庭芝源休李子平朱遂以數千人西走其餘黨或奔竄或来降泚衆緣路潰散乃奔涇州纔百餘騎而已田希鑒閉門登陴泚令人謂希鑒曰我與爾節度何故背恩希鑒乃使人自城上擲泚所送旌節於外續又投火焚之泚遂過數里息於逆旅泚將梁庭芬入涇州說田希鑒曰我公此日殺馮河清背叛今雖歸順國家必不久容公他日不免受禍何如開門納朱公與共成事希鑒以爲然庭芬乃追及朱泚言之泚大悅使庭芬却往涇州庭芬請授已尚書平章事泚不從庭芬既求宰相不得不復往涇州從泚至寜州彭原縣西城屯與心腹宋惟孝共射泚泚走墜故窖中泚左右韓旻薛綸髙幽巖武震朱進卿董希芝共斬泚使宋應傳首以獻泚死時年四十三姚令言投涇州源休李子平走鳯翔㝷並斬獲宋歸朝之敗武功降於李懐光送興元斬之唯不獲朱遂傳爲野人所殺或云與泚子婿偽金吾將軍馬悅潛走党項部落數月得達幽州泚之潛逆宦豎朱重曜頗親宻用事泚每呼之爲兄時賊中以臘月大雨偽星官謂泚曰當以宗中年長者禳其災變泚乃毒殺重曜以王禮𦵏焉及京師平出其尸而斬之順宗安皇帝唐書曰順宗安皇帝諱誦徳宗長子母昭徳皇后王氏上元二年正月生於長安之東内大厯十四年封宣王建中元年正月立爲皇太子貞元二十一年正月癸巳徳宗崩丙申即位於太極殿上自二十年九月風疾不能言暨徳宗不豫諸王親戚皆侍醫藥獨上卧病不能侍徳宗彌畱思見太子涕咽久之大行發喪人情震懼上力疾縗服見百寮於九仙門既即位知社稷有奉中外始安庚子羣臣上書請聽政二月以吏部郎中韋執誼爲尚書左丞同中書門下平章事壬寅以太子侍書翰林待詔王伾爲左散騎常侍充翰林學士以將仕郎前蘇州司功叅軍翰林待詔王叔文爲起居舍人充翰林學士甲子御丹鳯樓大赦天下三月癸酉詔立廣陵郡王淳爲皇太子改名純赦京城繋囚以給事中陸贄中書舍人崔樞並爲太子侍讀七月詔曰朕承九聖之烈荷萬邦之重顧以寡徳渉道未明虔恭畏懼不克負荷恐上墜祖宗之訓下貽卿士之憂夙夜祇勤如臨淵谷而積疾未復至于經時怡神保和常所不暇永惟四方之大萬務之殷不躬不親慮有曠廢加以山陵有日霖潦踰旬是用儆于朕心以答天戒其軍國政事宜令皇太子勾當時上久疾不復延納宰臣共論大政事無巨細皆决於李忠言王伾王叔文物論喧雜以爲不可藩鎮屢上牋於皇太子指三豎之撓政故有是詔以太常卿杜黄裳爲門下侍郎左金吾衛大將軍袁滋爲中書侍郎並同中書門下平章事皇太子見百寮於朝堂八月庚子詔曰惟皇天祐命烈祖誕受方國九聖儲祉萬邦咸休肆予一人獲繼丕業嚴恭守位不遑暇逸而天祐不降疾恙無瘳將何以奉宗廟之靈展郊禋之禮疇兹庶尹對越上帝内愧于朕心上畏于天命夙夜祇慄深惟永圖一日萬幾不可以久曠天工人代不可以久違皇太子純睿哲温文寛和仁惠孝友之徳愛敬之誠通乎神明格於上下是用法皇王至公之道遵父子傳國之制付之重器以撫兆人必能宣祖宗之重光荷天地之休命奉若成憲永綏四方宜令皇太子即皇帝位朕稱太上皇居興慶宫制稱誥辛丑誥曰有天下者傳歸於子前王之制也欽若大典斯為至公式揚耿光用休文徳朕獲奉宗廟臨御萬方降疾不瘳庶政多闕乃命元子代予守邦爰以令辰光膺册禮宜以今月九日册皇帝於宣政殿國有大命思俾惟新宜因紀元之慶用覃在宥之澤宜改貞元二十一年為永貞元年天下死罪降徒流已下遞减一等立良娣王氏爲太上皇后良媛董氏爲太上皇徳妃壬寅貶王伾爲開州司馬王叔文爲渝州司户元和元年正月丙寅朔皇帝率百寮上太上皇尊號曰應乾聖夀甲申太上皇崩於興慶宫之咸寜殿享年四十六諡曰至徳大聖大安孝皇帝廟號順宗𦵏于豐陵史臣韓愈曰順宗之爲太子也留心藝術善𨽻書徳宗工為詩每賜大臣方鎮詩制必命書之性寛仁有斷禮重師傅必先致拜從幸奉天賊泚逼迫常身先禁旅乗城拒戰督勵將士無不奮激徳宗在位嵗久稍不假權宰相左右倖臣如裴延齡李齊運章渠牟等因間用事刻下取功而排陷陸䞇張滂輩人不敢言太子從容論諍故卒不任延齡渠牟爲相常侍宴魚藻宫張水嬉綵盤雕靡宫人引舟爲櫂歌絲竹間發徳宗歡甚太子引詩人好樂無荒為對每入内未嘗以顔色假借宦官居儲位二十年天下隂受其賜惜乎寢疾踐祚近習㺯權而能傳政元良克昌運祚賢哉太平御覽卷一百十三
