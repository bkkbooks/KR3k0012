  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_822-1a, image: WYG0900/WYG0900-0280a.png}
body:
  text: 太平御覽巻八百二十二宋李昉等撰産資部二農耕農周禮地官下曰凡任民任農以耕事貢九榖禮記月令孟春曰乃命有司布農事舍東郊修封疆端徑術善相邱陵阪險原隰土地所宜五榖所殖以教導民必躬親之田事既飭先定凖直農乃不惑又仲春曰無作大事以妨農事大事兵役之事孟夏曰無起土功無發大衆無伐大樹皆妨蠶農之事是月也命有司巡行田原勞農勸民勸農民以及時又季秋曰乃命冡宰農事偹收舉五榖之要又孟冬曰是月也勞農以休息之又仲冬曰是月也農有不收藏積聚者馬牛禽獸有放逸者取之不詰又季冬曰氷已入令告人出五種命農計耦耕修耒耜具田器命有司出土牛以示農耕之早晩又王制曰制農田百畝之分上農夫食九人其次食八人其次食七人其次食六人下農夫五人在官者其禄以是為差諸侯之下士視上農夫禄足以代其耕矣左𫝊閔公曰衞文公務財訓農通商恵工又昭元曰譬如農夫是藨是蓘藨耝擁本曰蓘雖有饑饉必有豐年春秋元命苞曰周先姜原履大人跡生后稷扶桑推種生故稷好農尚書盤庚上曰若農服田力穡乃亦有秋乃不畏戎毒于逺邇惰農自安不昬作勞不服田畆越其罔有黍稷又洪範三曰農用八政一曰食又梓材惟曰若稽田既勤敷菑惟其陳修為厥疆􅅵論語子路曰樊遲請學稼子曰吾不如老農漢書曰諺曰以貧求富農不如工工不如商又曰楊季官至廬江太守有田一㕓宅一區世世以農桑為業後漢曰王丹家累千金隠居養志好施周急每歳農時輒載酒殽於田間候勤者而勞之其惰懶者恥不致丹兼功自勵邑聚相率以致殷富其輕黠遊蕩廢業為患者輒曉其父兄使黜責之沒則賻給親自将護其有遭䘮憂者輒待丹為辦鄉隣以為常行之十餘年其化大洽風俗以厚又曰崔恢字行遜遷鄢陵令每至春農身到廬陌勸民耕桑農無廢業東觀漢記曰樊重字君雲世善農稼好貨殖南史曰梁張興世為方伯父仲子由興世致位給事中興世欲将徃襄陽愛鄉里不肯去嘗謂興世曰我雖田舍老翁樂聞鼓角汝可送一部行田時吹之管子曰一農之事必有一耜一䥥一耨一􅀈一銍然後成農也又曰比宅火燒照下管仲入賀桓公曰吾田野闢農夫必有百倍之利也又曰善為國者使農寒耕而熱耘力歸於上又曰大國富多粟生於農故先王貴之民事農則田墾田墾則粟多粟多則國富國富則兵強兵強則戰勝戰勝則地廣農夫終歳之作不足以自食也故農者月不足而歳有餘也又曰先王者善為民興利除害故天下歸之所謂興利者利農事也所謂除害者禁害農事也又曰一農之量包百畝也又曰上農挾五中農挾四下農挾三農有常業女有常事一農不耕民有飢者一女不織民有寒者孟子曰不違農時榖不可勝食也孫卿子曰農精於田不可為農師賈精於市不可為市師又曰良農不為水旱不耕韓子曰厯山農侵畔舜徃耕朞年讓畔國語管仲曰昔者先王有農就田野令農夫群萃而州䖏察其四時四時樹藝各有宜權莭其用耒耜及寒擊稿除田寒季冬大寒之時稿枯藁也以待時耕時耕立春之后及耕深耕而疾耰之以待時雨疾速耰磨時雨至當種時雨既至挾其搶刈耨鎛以旦暮從事於田野脫衣就功首戴茅蒲身衣襏襫沾體塗足暴其髮膚盡其四肢之敏以從事於田野少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能是故農之子恒為農野處而不䁥䁥近也吕氏春秋曰匡章謂恵子於魏王之前曰蝗螟者農夫得而殺之奚故為其害稼也汜勝之書曰農事惰與其力相什倍又曰衞尉前上蚕法民事人所忽略衞尉勤之可謂忠國愛民之至風俗通曰古者使人如借故曰籍田孫盛作南昌令教曰且欲先婚配境内然後督其農業梁記曰黒水利有魚池池上立美臺下四周有水左右官良田數十頃故以美農為名耕周禮天官上曰甸師長帥其属而耕耨王籍以時入之以共粢盛禮記月令曰正月天子率三公九卿諸侯大夫躬耕帝籍天子三推公五推諸侯九推又曰王制曰三年耕必有一年之食九年耕必有三年之食以三十年之通雖有㓙旱水溢民無菜色又少儀曰問士之子長幼長則曰能耕矣又表記曰天子親耕粢盛秬鬯以事上帝故諸侯勤以輔事於天子左𫝊襄公七年曰夏四月三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啓蟄而郊郊而後耕今就耕而卜郊宜其不從也又襄公十三年吴子諸樊既除䘮将立季札季札辭曰曹宣公之卒也諸侯與曺人不善曺人将立子臧子臧去之遂弗為也以成曺君君子曰能守節義嗣也誰敢奸君有國非吾節札雖不才願附於子臧以無失節故立弃其室而耕乃舍之又昭公五曰伍員如吴言伐楚之事於州于州于吴王僚公子光曰是宗為戮而欲反其仇不可從也光吴公子闔閭也反獲也員曰彼将有他志余姑為之求士而鄙以待之乃見専諸焉専諸勇士而耕於鄙榖梁𫝊成公曰郄克曰反魯衞之侵地使耕者皆東畆欲以利其戎車論語衞靈公曰君子謀道不謀食耕也餒在其中矣學也禄在其中矣又㣲子曰長沮桀溺耦而耕論語比考䜟曰叔孫武叔毁孔子譬若堯民曰我耕田而食穿井而飲堯何力焉周書曰神農之時天雨粟神農耕而種之韓詩曰三之日于耜四之日舉趾至于四月始可舉足而耕又曰齊人青将討公孫無知辭其友其友曰耕田刈草農之力也討君之賊大夫職也史記曰趙肅侯遊大陵出於鹿門大夫扣馬曰耕事方急一日不作百日不食肅侯下車而謝之又曰伍子胥進専諸於公子光退而與故太子建之孤子勝耕於野又曰陳涉少時與人傭耕輟耕壟上曰富貴無相忘傭者笑而應之子為人傭耕何富貴也涉曰嗟乎燕雀安知鴻鵠之志哉又曰髙后立諸吕為王擅權用事朱虛侯年二十有氣力忿劉氏不得職常入侍髙后醼飲曰請為太后歌田太后曰試為我言田意曰深耕溉種立苖欲疎非其種者鋤而去之吕氏黙然戰國䇿曰主父欲伐中山使李庇觀之庇曰與士即民務名不好本朝上賢即耕者惰而戰士懦若此不亡者未之有也漢昭紀曰上耕于鈎盾弄田應劭曰昭帝九年未能親耕帝籍鈎盾有田近署故徃試耕為戲弄也又曰江南之地火耕水耨又曰夏侯勝每授書謂諸生曰學經不明不如歸耕後漢書曰王莽時盗賊起人皆憂移徙遁逃莫事農桑淳于恭遂獨耕鄉人止之曰世方散亂死生未分何空自苦為恭曰正我不得食他人食之何傷柰何不耕東觀漢記曰梁鴻将妻之覇陵山耕耘織作以供衣食彈琴誦書以娱其志又曰承宫将妻之華隂山谷耕種禾黍臨熟人或認之宫悉推與去由是顯名又曰第五倫為會稽太守免官歸田里身自耕種不交通人物魏畧曰常林少單貧自非其力不取之於人性好學漢末為諸生帶書耕鋤其妻常自擔餉餽之林雖在田野其相敬如賓吴録徴崇字子知遭亂遂於㑹稽躬耕以求其志好尚隐者從學所教不過數人輒止欲令其業必有成也吴志曰薛綜上疏云任延為九真太守乃教其耕犁使之冠履晉書曰朱冲字巨客少有志行閑静寡欲好學而貧常以耕藝為事又曰趙至字景真代郡人也寓居洛陽維氏令初到官至年十三與母同觀母曰汝先世本非㣲賤世亂流離遂為士伍耳爾後能如此不至感母言請師授業聞父耕吒牛聲投書而泣師恠問之至曰我小未榮養使老父不免勤苦師甚異之宋書曰王韶之家貧好學嘗三日絶粮而執卷不輟家人請之曰困窮如此何不耕答曰我自耕耳齊書曰戴僧静為北徐州刺史買牛給貧人令耕種梁書曰孔子袪會稽山隂人也少孤貧好學耕耘樵採嘗懐書自隨投閑則讀勤苦自勵遂通經術趙書曰東耕義真殿中監鋪席於侍臣之南北面觧匣出御表跽授黄門一推一反三推三反成禮侍中跽取米以授侍郎以授殿中監監復韜匣管子曰庶人好耕農而惡飲食於是財用足又曰行其遊野視其耕耘討其農事而饑飽之國可以知也又曰耕者出而不應於父兄用力不農農不事賢行此三者有罪無赦又曰地大而不耕非其地也文子曰其耕不強者無以養生晏子春秋曰有納書景公者公曰吾不知晏子之忠臣也晏子曰南鄭人吴憲者冬陶夏耕自比於舜又曰墨子之齊遇故人曰今天下莫不為若己墨子曰小人一人耕九人處耕者不可以不急何則食者衆而耕者寡也今天下莫為義子宜勸我何以止我又非樂曰使丈夫為之廢丈夫耕稼樹藝之時使婦人為之廢婦人紡績之事荘子曰堯治天下伯成子髙立為侯堯授舜舜授禹伯成子髙辭而耕禹徃見之則在野又曰堯以天下讓許由許由不受退而耕於頴水之陽終身不見尸子曰有虞氏身有南畆妻有桑田神農共耕而王所以勸耕商子曰今一人耕而百人食之此螟􅀈蚵蠋亦大矣雖有詩書猶無益於治孟子曰伊尹耕於有莘之野湯躬詣之伊尹囂然弗顧又曰耕者助而不稅則天下之農皆悅而願耕於其野也孫卿子曰子路問孔子曰有耕耘樹藝手足胼胝以養其親而無孝名何也子曰但使入則篤行出則有賢何患無孝名也韓子曰宋人有耕者田中有株兎走觸株而死因釋耕而守株冀更得兎宋人笑之淮南子曰夫織者日以進耕者日以却事相反成功一也揚子法言曰谷口鄭子真不屈其志而耕乎嵒石之下名振京師傅子曰金根車天子親耕乘之蹋楮車畋獵乘之山海經曰后稷播百榖始作耕六韜曰昔帝堯之王天下不以私曲之故留耕績之時國語曰古者天子籍田后稷監之太史王王敬從之王耕墢一墢耜之墢也王無耦以一耜耕之班三之班三次也三之下各三其止也王一墢公三卿九大夫二士七庻人終于千畝又曰管仲對齊桓公曰深耕而疾耰之以待時雨吕氏春秋曰匡章謂魏王曰今君行多者數百人皆不耕而食此害稼亦甚矣又曰人臣孝則事君忠臨難死士民孝則耕耘疾守戰固又曰舜耕於厯山昌草生於是始耕董生書曰禹見耕者五耦而軾賈誼書曰王者之法民三年耕而餘一年之食九年耕而餘三年之食三十歳民皆有十年之蓄說苑曰曽子衣敝衣而耕魯君使人致邑曽子不受曰受人者畏人與人者驕人終不受太𤣥經曰神農冬耕被服純青崔元始正論曰宣帝使蔡登校民耕田三犁共牛一人持之下種挽摟皆取備焉一日種頃也拾遺録曰需支夫善耕婦人善織以五色絲稍内口中兩手引而結之則成文錦丈夫多力勤稼一日耡十頃之地董正則𫝊曰劉恭嗣少有異才聞司馬操愽物多通故徃見焉遇其方耕執耒耜於壠土之上於是釋耒下袵相就而言任嘏别𫝊曰嘏字昭先樂安人有此居者擅耕嘏地數十畝種之人以語嘏嘏曰我自以借之也耕者聞之慙謝還也襄陽耆舊𫝊曰龎公襄陽人居沔水上至老不入襄陽城躬自耕耔其妻相待如賓休息則整巾端坐以琴書自娱覩其貌者肅如也桓階别𫝊曰階為趙郡太守朞月之間増户萬餘路有遺一囊耕者見之舉以繫樹數日其主還取石勒别𫝊曰石勒元康中流宕山東寄旅平原荏平界與師欣家傭耕耳恒聞皷角鞞􅝿之音勒私異之琴操曰曽子幼小慈仁居貧無業以事父母躬耕力作隨五土之利四時惟宜以進甘脆嘗耕於太山之下遭雨雪寒凍旬月不得歸乃作憂思歌太平御覽巻八百二十二
