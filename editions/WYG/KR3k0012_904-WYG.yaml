  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_904-1a, image: WYG0901/WYG0901-0072a.png}
body:
  text: 太平御覽卷九百四宋李昉等撰獸部十六狗上爾雅曰犬生三猣音宗二師一玂旂音旂未成毫狗長喙獫音廉又音險短喙猲音歇獢許嬌切狗絶有力狣音兆尨狗也狗四尺為獒説文曰犬狗之有懸蹄者也孔子曰視犬之字如畫狗也又曰狗叩也叩氣吠以守也又曰尨犬之多毛者也猲短喙犬也獫黑犬黄頭也㹥之句切黄犬黑頭也猈音罷短腦狗也㺌胡斬切犬吠不止也獒犬知人心可使也㹞居世切狂犬也狄赤犬也又曰狡小狗也匈奴有狡犬巨口而黑身吕忱字林曰盧韓良犬也㹱音鵲宋良犬也􅀈五見切逐虎犬也何承天纂文曰守犬為獖扶本切隴西以犬為猶音酋㺜乃容切􅀢乃居切㲰乃庚切皆多毛犬也獟五校切猘居例切也䂏音彫屈尾犬也廣雅曰殷虞晉獒楚茹黄韓獹宋㹱並犬屬廣志曰狗有懸蹄短尾之號古今注曰狗一名黄羊易説卦曰艮為狗詩國風盧令曰盧令令其人美且仁盧田犬令令纓環聲盧重環其人美且鬈又國風野有死麕曰無感我􅍤兮無使厖也吠厖狗也禮記曲禮曰效馬效羊者右牽之效犬者左牽之又曲禮曰凡祭祀犬曰羮獻又内則曰狗赤股而躁臊又檀弓曰仲尼之畜狗死使子貢埋之曰吾聞之弊帷不棄為埋馬也弊盖不棄為埋狗也丘也貧無盖於其封也亦與之席無使其首䧟焉封當為窆䧟謂沒於土尚書洪範曰西旅獻獒西戎逺國貢大犬太保召公也作旅獒左傳曰晉侯飲趙盾酒伏甲將攻之其右提彌明知之趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫獒焉明搏而殺之盾曰棄人用犬雖猛何為又襄公傳曰國人逐瘈狗瘈狗入於華臣氏國人従之華臣懼遂奔陳又昭公傳曰二十三年遂取邾師獲鉏弱地邾人愬于晉晉人来討叔孫婼如晉乃館諸箕吏人與叔孫居於箕者請其吠狗弗與及將歸殺而與之食公羊宣公曰靈公食趙盾公曰聞子劍利以示我盾將起進劍彌明曰何故㧞劍於公所盾知之躇而走超遽不暇以次公有周狗可與比周所指如意謂之獒而屬之獒亦躇階従彌明逆而踆之以足逆蹋之曰踆絶頷趙盾顧曰君之獒不若臣之獒也史記淮隂傳云髙祖詔齊捕蒯通通至上曰若教淮隂侯反乎對曰然臣固教之跖狗吠堯上非不仁固吠非其主當是時臣獨知韓信非知陛下也又徐偃王志云徐君宫人姙娠而産卵以為不祥棄於水邉孤獨老母有犬名鵠倉獵於水濵得所棄卵銜以來歸獨母以為異覆煖之弗乳而成人生時正偃故以為名徐君宫中聞之乃更録取收養長而仁智因襲徐國後鵠倉臨死更生角而九尾寔黄龍也偃王塟之徐梁界中今見有狗壟云又曰范蠡之齊遺大夫種書飛鳥盡良弓蔵狡兎死走狗烹又曰范雎説秦昭王曰夫以秦而治諸侯譬若縦韓盧而摶蹇兎也閉闗十五年不敢窺兵於山東者是穰侯不忠而大王之計有所失也漢書五行志曰文帝後五年六月齊雍城門外有狗生雙角又曰成帝河平元年長安男子石良劉晉相與同居有如人狀在其室中繫之為狗走去復至數人披甲持弓至良家繫之或傷皆狗也自二月至六月乃止其於洪範皆大禍也後漢書曰岑熈為魏太守無為而化視事二年輿人歌之曰我有枳棘岑君伐之我有蟊賊岑君遏之吠狗不驚足下生􅀢􅀢長毛也犬無自吠驚故足下生􅀢又曰靈帝於西園弄狗着進賢冠帶綬續漢書曰靈帝寵用便嬖弟子轉相汲引賣闗内侯直五百萬令長强者貪如豺狼弱者略不類物狗而冠也又曰昌邑王令狗冠方山冠龔遂乃曰王之左右皆狗而冠也魏志曰太祖曰我有丁斐猶人家有盜狗而善捕䑕盜雖有小損而完我囊貯又曰公孫淵未亡家數有怪犬冠幘絳衣上臺又曰朱建平善相術謂應璩云君年六十三位為常伯當有厄先此一年當獨見一白狗而旁人不見也璩六十一為侍郎直内省歘見白狗問之衆人悉無見者於是遊觀田里飲宴自娛過期一年年六十三卒魏略曰丁謐外似踈畧而内多忌雖與何晏鄧颺等同列而皆少之唯聲勢屈於曹爽爽亦敬之言無不從故於時謗書謂臺中有三狗二狗崖柴不可當一狗憑黙作疸嚢三狗謂何鄧丁也黙者爽小字也其意言三狗皆欲嚙人而謐尤甚也呉志曰孫峻謀誅諸葛恪恪將見之夜精爽擾動通夕不寐嚴畢趨出犬銜引其衣恪曰犬不欲我行乎還坐有頃乃復起犬又銜其衣恪令従者逐犬遂升車晉書曰當陽侯杜預初攻呉呉人憚其智以瓠繫狗頸示之預恨之及平盡殺之又曰齊王冏入廢賈后后呼帝曰陛下有婦使人廢亦行自廢又問冏曰起事誰冏曰梁趙后曰繫狗當繫頸今反繫其尾何得不然又曰呉隱之為奉朝請謝石請為衛將軍主簿隱之將嫁女石知其貧素遣女必當率薄乃令移厨帳助其經營使者至方見婢牽犬賣之此外蕭然無辦又曰庾翼常令郭璞筮其後璞曰􅀸後並貴盛然有白龍者凶徴至矣後庾次子藴為廣州刺史其妾産犬子不令藴知狗輔長大藴入見狗眉目分明而異形於衆後失所在藴慨然曰殆白龍乎後為桓氏所滅又藝術傳曰嚴􅀸㑹稽人也善卜筮鄉人魏序欲暫東行荒年多抄盗令􅀸筮之􅀸筮曰君慎勿東行必遭暴害氣而非刼也宜有以禳之可索西郭外獨母家之白雄狗繫着船前求索正得駮狗􅀸曰其色不純當有小毒止及六畜耳無復憂序行半路狗忽有聲甚急如被人繫比視已死吐黑血斗餘其夕序墅上白鵝數頭無故自死而家無恙後魏書蠻夷傳云獠性同禽獸若殺其父求得一狗以謝其母不懷嫌恨又以大狗一頭買生一口獠張交切又音老北史曰齊南陽王綽始十餘歲留守晉陽愛波斯狗尉破胡諫之綽歘然斫殺數狗狼籍在地破胡驚走不敢復言後有婦人抱兒在路走避入草綽奪其兒飼波斯狗婦女號哭綽怒又縦狗使食狗不食塗以兒血乃食焉後周書曰張元琮性仁孝村陌有狗子為人所棄者元見即收而養之其父叔怒曰何用此為將欲更棄之元對曰有生之類莫不重其性命若夫生殺自然之理今為人所棄而死非其道也見而不收養無仁心也是以收而養之叔父感其言遂許之未幾乃有狗母銜一死兎至元前而去三國典略曰齊髙緯以波斯狗為赤虎儀同逍遥郡君常於馬上設蹬褥以抱之閗雞亦號為開府馬皆藉以氊􅄢被以金玉號為駮龍儀同其將合牝牡則設青盧黼帳牢具過於諸王婚禮齊王常親視焉又曰齊廣寧王孝珩嘗畜一犬守外人不得趨近孝珩每射令其取箭亦解呼召左右牽衣而進又曰徐之才嘗與朝士出遊望羣犬並走諸人令目之之才應聲曰為是宋鵲為是韓盧為逐李斯東走為負帝女南徂陳書曰張彪敗後與妻楊氏去唯常所養一犬名曰黄倉在彪前後未曽刻有捨離乃還入若耶山中沈泰説陳文遣章昭逹領千餘兵重購之并圖其妻彪眠未覺黄倉驚吠刼來便噬一人中喉即死及彪被害黄倉嘷叫宛轉血中唐書曰貞觀中彌泥孰可汗李思摩部落濟河於故定襄城為牙帳戸三萬勝兵四萬馬九萬匹思摩之初建也詔錫其土南至大河北有白道川而白道牧田處龍荒之最突厥咸競其利思摩以北接延陁種落初集其力尚微未敢北徙至是始還其國因上言曰非分䝉恩立為落長實望子孫竭誠奉國作國家一狗北門守吠若延陁侵逼請家口徙入長城詔許之郭頒魏晉世語曰郊天壇下有白狗髙三尺光色鮮明恒卧見人則去周書曰渠溲犬者露犬也能飛食虎豹春秋考異郵曰七九六十三陽氣通故斗運狗三月而生也宋均注曰狗斗之精所生也又曰狗三月而生陽主於三故狗各髙三尺穆天子傳曰􅜑韓之人獻天子良犬七十􅜑之然切又曰天子之狗走百里執虎豹山海經曰隂山有獸焉其狀如貍白首其名天狗又曰犬戎國黄帝之後弄明生白犬二頭自為牝牡故為此國也又曰金門之山有赤犬名曰天犬下則有兵又曰蜪音陶犬如犬而青食人従首始白澤圖曰黑狗白頭耳長卷尾龍也國語曰趙簡子田于螻晉君之囿史黯聞之以犬待於門晉太史史黯也簡子見之問何爲曰有所得犬欲試之兹囿簡子曰何以不告對曰君行臣不従為不順譏簡子田獵君囿不從君而自行也主將適螻而麓弗聞麓主君苑囿之官臣敢煩當日當日謂直日者也簡子乃還覺所譏也戰國䇿曰齊欲伐魏淳于髠謂齊王曰韓子盧者天下之壯犬也東郭俊者海内之狡兎也韓子盧逐東郭俊環山者三騰山者五兎極於前犬疲於後犬兎俱疲各死其處田殳獲之無勞倦之苦而擅其功今齊魏乆相持以頓其兵敝其衆臣恐強秦大楚承其後而有田父之功也齊王懼休將士春秋後語曰貂勃常惡田單曰安平君小人也安平君聞之故為酒而召貂勃曰單何以得罪於先生常見惡於先生乎勃曰然跖之犬吠堯非貴跖而賤堯自吠非其主也且公孫子賢而徐子不肖然而公孫子與徐子闘徐之狗攫孫子之腓而噬之若乃得去不肖為賢者狗豈特攫而噬之哉安平君曰敬聞命矣明日任之於王漢武故事曰公孫􅀸至東萊云見一人長五丈自稱巨公牽一黄犬一黄雀欲謁天子因忽不見東方朔别傳曰騏驥騄耳飛兎驎騮天下之良馬也將以捕䑕於深宫曽不如跛犬也西京雜記曰楊萬年有獵狗名青駮賣直百金也又曰茂陵少年李亨好馳駿狗逐獸或以鷹鷂兎皆以為佳名狗則有修毫釐睫白望青曹之名太平御覽卷九百四
