body:
  text: 太平御覽卷六百三十三宋李昉等撰治道部十四賞賜説文曰賞賜有功也傳曰蔡公孫歸生謂楚令尹子术曰善為國者賞不僣刑不濫賞僣則懼及淫人刑濫則懼及善人若不幸而過寧僣無濫與其失善寧其利淫無善人則國從之商頌有之曰不僣不濫不敢怠遑命於下國封建厥福此湯所以獲天福也古之理民者勸賞而畏刑恤民不倦賞以春夏刑以秋冬將賞為之加膳加膳則飫賜此所以知其勸賞也將刑為之不舉不舉則徹樂以此知其畏刑也又曰晉荀林父滅潞晉侯賞林父狄臣千室亦賞士伯以瓜衍之縣曰吾獲狄土子之功也㣲子吾喪伯氏矣羊舌職説是賞也曰周書所謂庸庸祗祗者謂此物也夫物事也士伯庸中行伯君信之亦庸士伯此謂明徳文王造周不是過也泌之敗晉侯欲殺林父士伯諫而止之又曰虢公晉侯朝王王饗醴命之宥皆賜玉五瑴馬三疋非禮也雙玉為瑴王命諸侯名位不同禮亦異數又曰晉侯伐鄭鄭人賂晉侯女樂八人晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸侯八年之中九合諸侯如樂之和無所不諧請與子樂之魏絳辭曰夫和戎狄國之福也合諸侯君之靈也二三子之力也臣何力之有抑臣願君安其樂而思其終也公曰子之教敢不承命夫賞國之典也蔵在盟府不可廢也子其受之魏絳於是始有金石之樂禮也周禮太宰以八柄馭羣臣三曰予以馭其幸注云幸謂言行偶合於善則有以賜與以勸後也又曰以九式均節財用八曰匪頒之式注曰式謂財用之節度也匪分也頒賜也謂分賜羣臣又曰太府以幣餘之賦以待賜予禮記曰天子賜諸侯樂則以柷將之賜伯子男樂則以鼗將之將謂執以致命諸侯賜弓矢然後專征賜鈇鉞然後殺賜珪瓚然後為鬯未賜珪瓚則資鬯於天子又曰君賜車馬乗以拜賜衣服服以拜賜君未有命弗敢即乗服也凡賜君子與小人不同日此賞賜之義也又曰若賜之食而君客則命之祭然後祭鄭𤣥曰雖見賔客猶不敢答禮也侍食則不祭也君若賜之爵則越席再拜稽首受登席祭之飲卒爵而候君然後受虛爵不敢先君盡爵詩曰陳錫哉周侯注云言文王能布陳大利以錫天下書曰徳懋懋官功懋懋賞又曰用命賞于祖不用命戮于社又曰罰弗及嗣賞延于世又曰功多有厚賞弗迪有顯戮史記曰紂囚西伯羑里西伯之臣閎夭之徒求美女奇物以獻紂紂乃赦西伯而賜弓矢斧鉞使得専征伐又曰武王㓕紂乃罷兵西歸封諸侯班賜宗彛作分殷之器物鄭𤣥曰宗彝宗廟樽也作分器著王之命及受物於是封功臣謀士而師尚父為首封封師尚父於營丘曰齊封弟周公旦於曲阜曰魯封召公奭於燕封弟叔鮮於管封叔度於蔡餘各以次受封又曰禹平水土以成帝錫𤣥珪禹受曰非予能成以大費為輔帝曰咨爾費賛禹功其錫爾皂游音流爾後嗣将大出遂妻之姚姓之玉女皇甫謐曰賜之𤣥玉妻姚姓之女又曰晉人請公賞従亡者臣壺叔曰君三行賞賞不及臣敢請罪文公報曰夫導我以仁義防我以徳恵此受上賞輔我以行卒以成立此受次賞矢石之難汗馬之勞此復受次賞若以力事我而無補吾缺者此復受次賞三賞之後故及子晉人聞之皆説音悦又曰晉楚戰於城濮晉侯度河北歸國行賞狐偃為首或曰城濮之事先軫之謀文公曰城濮之事偃説我毋失信先軫曰軍事勝為右吾用之以勝然此一時之説偃言萬世之功奈何以一時之利而加萬世之功乎是以先之又曰三國攻晉陽引汾水灌其城城不沒者三版城中懸釜而炊易子而食羣臣皆有外心禮益慢惟髙共一作赫不敢廢禮襄子懼乃夜使張孟同私於韓魏韓魏與合謀三月丙戌三國反㓕智氏共分其地於是襄子行賞髙共為上張孟同曰晉陽之難共無功襄子曰方晉陽急羣臣皆懈惟共不敢失禮是以先之又曰漢五年已殺項羽定天下即皇帝位論功行封以蕭何功盛封為鄼侯列侯畢已受封奏位次皆曰平陽侯曹叅身被七十創攻城畧地功最多宜第一上已撓功臣多封蕭何至位次未有以復難之然心欲何第一闗内侯鄂君進曰羣臣議皆誤夫曹叅雖有野戰畧地之功此特一時之利耳夫上與楚相拒五載嘗失軍亡衆逃身遁者數矣然蕭何從闗中遣軍補其處非上所詔令召而數萬衆㑹上之乏絶者數矣夫漢與楚相守滎陽數年軍無見糧蕭何轉漕闗中給食不乏陛下雖亡山東蕭何常全闗中以待陛下此萬世之功也今雖亡曹叅百數何缺於漢漢得之不必待以全奈何欲以一旦之功而加萬世之功也蕭何第一曹叅次之髙祖曰善於是乃令蕭何第一賜帶劍履上殿入朝不趨上曰吾聞進賢受上賞蕭何功雖髙得鄂君乃益明於是因鄂君故所食闗内侯邑封為安平侯又曰項籍死天下定上置酒上折隨何之功謂何腐儒為天下安用腐儒隨何跪曰夫陛下引兵攻彭城楚王未去齊也陛下發歩兵卒五萬人騎五千能以取淮南乎上曰不能隨何曰陛下使何與二十人使淮南至如陛下之意是何之功賢於歩卒五萬騎五千也然而陛下謂何腐儒為天下安用腐儒何也上曰吾方圖子之功乃以隋何為䕶軍中尉又曰漢文帝初即位赦天下賜民爵一級女子百戸牛酒蘇林曰男子賜爵女子賜牛酒也皇帝曰呂産自置為相國吕禄為上將軍擅矯遣灌将軍嬰将兵擊齊欲代劉氏嬰留滎陽弗擊與諸侯合謀以誅吕氏産欲為不善丞相陳平與太尉周勃謀奪吕産等軍朱虛侯劉章首先捕吕産等太尉身率襄平侯通持節承詔入北軍典客劉掲身奪趙王吕禄印益封太尉勃萬戸賜金五千斤丞相陳平灌将軍嬰邑各三千戸金二千斤朱虛侯劉章襄平侯通東牟侯劉興居邑各二千戸金二千斤封典客掲為陽信侯賜金千斤漢書曰夏侯嬰自上初起沛常為太僕竟髙祖崩以太僕事恵帝帝及髙后徳嬰之脱孝恵魯元於下邑間也乃賜嬰北第第一師古曰北第者近北闕之第嬰最第一也又曰景帝賜衛綰劍綰曰先帝賜臣劍凡六不敢奉詔上曰劍人之所施易獨至於今乎綰曰具在上使取六劍劍常盛未嘗服也後遷為御史大夫代桃侯舍為丞相然自初官以至相終無可言上以為敦厚可相少主尊寵之賞賜甚多又曰伏日詔賜従官肉大官丞日晏不来東方朔獨㧞劍割肉謂其同官曰伏日當早歸即懐肉去大官奏之朔後入上曰昨賜肉不待詔以劍割肉去之何也朔勉冠謝上曰先生起自責也朔再拜曰朔来受賜不待詔何無禮也㧞劍割肉一何壯也割之不多一何亷也歸遺細君又何仁也上笑曰使先生自責乃反自譽復賜酒一石肉百斤歸遺細君又曰王成不知何郡人也為膠相治甚有聲宣帝先褒之地節三年下詔曰盖聞有功不賞有罪不誅雖唐虞不能化天下今膠東相成勞来不怠流民自占八萬餘口師古曰隠度名數而來附業也治有異等之效其賜成爵闗内侯秩中二千石又曰黄覇為潁川太守是時鳯凰神雀數集郡國潁川尤多天子以覇治行終長者下詔稱揚曰潁川太守覇宣布詔令百姓鄉化孝子悌弟貞婦順孫日以衆多行者讓路道不拾遺養視鰥寡贍助貧窮獄無重囚而吏民鄉於教化可謂賢人君子矣書不云乎股肱良哉其賜覇爵闗内侯黄金百斤秩中二千石而潁川孝悌有行義民三老力田皆以差賜爵及帛又曰初霍氏奢侈茂陵徐生曰霍氏必亡夫奢則不遜不遜必侮上侮上者逆道也在人之右衆必害之霍氏秉權日久衆欲害之而又行以逆道也不亡何待乃上疏言霍氏泰盛陛下即厚愛之宜此時抑制亡使至亡書三上輙不報聞其後霍氏誅㓕而告霍氏者皆封侯人為徐生上書曰臣聞客有過主人者見其竈直突傍有束薪客謂主人曰為曲突逺徙其薪不爾且有火患主人嘿然不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝其鄰人灼爛者在於上行餘各以功次坐而不録言曲突者人謂主人曰鄉使聽客之言不費牛酒終無火患今論功而請賓曲突徙薪亡恩澤燋頭爛額為上客邪主人乃寤而請之今茂陵徐福數上書言霍氏且有變宜防絶之鄉使福説得行則國亡裂土出爵之費臣亡逆亂誅滅之敗往事既已而福獨不䝉其功唯陛下察之上乃賜福帛十疋後以為郎原闕又曰郭伋為并州牧過京師謝恩帝並召皇太子諸王宴語終日賞賜車馬衣服什物又曰肅宗納梁竦女為貴人生和帝竇皇后養以為子諸竇遂譛殺貴人而䧟竦等死獄中家屬徙九真和帝立後貴人姊南陽樊調妻嫕於計切上書自訟曰妾同産女弟貴人前充後宫蒙先帝厚恩得見寵幸誕生聖明為竇憲兄弟所譖訴使妾父竦寃死牢獄老母孤弟逺徙萬里今值陛下神聖之運親統萬幾羣物得所憲兄弟姦惡既伏辜誅妾乃敢昧死自陳所天帝覽感悟乃下掖庭令驗問之嫕辭證明審遂得引見具陳其狀乃留嬺止宫中連月乃出賞賜衣被錢帛第宅旬月之間累貲十萬嬺素行有操帝益愛之乃號梁夫人楚漢春秋曰髙帝初封侯者皆賜丹書鉄劵曰使黄河如帶太山如礪漢有宗廟爾無絶世漢魏春秋曰天子以曹公典任守外臨時之賞或宜速乃命公得承制封拜諸侯守相詔曰夫軍之大事乃兹賞罰勸善懲惡宜不旋時故司馬法曰賞不踰月者欲民速覩為善之利也昔在中興鄧禹入闗承制拜軍祭酒李文為河東太守来㪧又承制拜髙峻通路将軍察其本傳皆非先請明臨時刻印也斯則世祖明權逹變盖所用速示威懐而克成洪勲者也且春秋之義大夫出疆專命之事苟可以利社稷安國家而已况君秉任二伯師尹九有突征夷夏軍行蕃甸之外得失在於斯須之間停賞俟詔以滯時務非朕之所圖也自今已後臨事所甄當加寵號者其便刻印章假授咸使忠義得共奨勵勿有疑焉魏志曰太祖攻城邑靡麗之物則悉賜有勲功勞宜賞不惜千金無功望施分毫不與又曰袁煥卒太祖賜穀二千斛一教以太倉穀千斛賜郎中令家一教以垣下穀千斛與耀卿家煥字耀卿外不解其意教曰以太倉穀者官法也以垣下穀者親舊也又曰公令曰昔趙奢竇嬰之為将也受賜千金一朝散之故能濟成大功末世流聲吾讀其文未嘗不慕其為人也與諸将士大夫共成戎事幸賴賢人不愛其謀羣士不遺其力是以夷險平亂而吾得竊大賞戸邑三萬追思趙竇散金之義今分所受租與諸侯掾屬及故戍於陳蔡者庶以酬答衆勞不擅大恵也又曰鎮東将軍毌丘儉上言諸葛恪圍合肥新城中遣士劉整出圍傳消息為賊所得考問所傳整曰欲殺我者便速殺之終無他辭又遣士鄭像出城傳消息恪遣騎索得縛将繞城勅像大呼言大軍已還洛不如早降像不從其言更大呼城中曰大軍近在圍外壯士努力賊以刀築其口便不得語整像為兵能守義執節子弟宜有差異詔曰夫顯爵所以褒元功重賞所以寵烈士整像召募通使越六軍蹈重圍冒突白刃輕身守信不幸見獲抗節彌勵揚六軍之大勢安城守之懼心臨難不顧畢志傳命今追賜整像爵關中侯各除士名使子襲爵如部曲将死事科又曰夏侯惇從征孫權還使都督軍留居巢賜伎樂名倡令曰魏絳以和戎之功猶受金石之樂况将軍乎又曰太祖平栁城班所獲器物以素屏風素机賜毛玠曰君有古人之風故賜君古人之服玠居顯位撫育孤兄子甚篤賞賜以施貧窮家無所餘又曰文帝在東宫賜鍾繇五熟釜為之銘曰於赫有魏作漢藩輔厥相惟鍾寔榦心膂靖恭夙夜匪遑安處百僚師師楷兹度矩又曰薛䕫黄初中為秘書丞帝與之推論今古未嘗不終日帝視其衣薄賜之袍晉春秋曰清河崔祖思死家無財有書八千卷上聞嗟嘆良久乃以葛屯穀百五斛賜其家曰葛屯亦吾之垣下令後世知其見異晉書曰王沈為豫州下教曰能陳長吏可否説百姓所害者有賞言刺史得失倍賞主簿褚䂮曰上好下應今示以賞恐拘介之士憚賞不言貪昧之人慕利妄舉沈從之宋書曰謝方明為桓𤣥著作佐郎後従兄景仁舉為宋武中軍主簿方明知無不為帝謂曰愧未有瓜衍之賞且當與卿共豫章國禄屢加賞賜蕭子顯齊書曰太祖奇張融賜衣曰見卿衣服麄交爾籃縷亦虧朝望今送一通衣意謂雖故亦勝新是吾之所著已令裁减稱卿之體又曰孔靈産為光禄大夫覽止足之分不肯仕太祖以白毛扇素机遺之曰卿有古人之風故賜以古人之服當代榮之北齊書曰唐邕字道和太原人邕少明敏有治世之才斛律金啟太后云唐邕强榦一人當千顯祖常解其所著青䑕皮裘賞邕云朕意與卿共敝家語曰孔子曰自季孫之賜我千鍾也而交友益親得季孫千鍾之賜以施於衆故交友日益親也自南宫敬叔之乗我車也而道加行孔子欲見老耼西觀周室敬叔言於魯君給孔子車馬問禮於老子觀郊廟自周而還弟子四方来集也故道雖貴必有時而後動徳雖髙必有勢而後行㣲夫二子之賜則丘之道殆於廢矣太公金匱曰賞一人而千人喜者賞之賞二人而萬人喜者賞之賞三人而三軍勸者賞之管子曰明賞不費明刑不暴賞罰明徳之至也司馬法曰殷戮於市周賞於朝勸君子懼小人也鶡冠子曰進賢者受上賞則不蔽善為政賞人不多而民喜罰人不多而民畏言賞罰中尹文子曰禄薄者不可以經亂賞輕者不可以入難此處上者所宜慎者也慎子曰孔子云有虞氏不賞不罰夏后氏賞而不罰殷人罰而不賞周人賞且罰罰禁也賞使也文子曰善賞者費少而勸多故聖人賞一人天下趨之是以至賞不費也韓子曰司城子罕謂宋君曰慶賞賜與者民之所好也君自行之誅罰殺戮者民之所惡也臣請當之於是戮細而誅大君請與子罕議之居朞年人知死生之命制於子罕故一國歸焉又曰襄子圍於晉陽中出圍賞有功者四人髙赫為首張孟談曰晉陽之事赫無大功今為賞首何也襄子曰晉陽之事國危社稷殆矣羣臣無不有驕侮之意者唯赫不失君臣之禮是以先之仲尼聞之曰善賞哉襄子賞一人而天下為人臣者莫能失禮也又曰韓昭侯使人蔵蔽衿侍者曰君亦不仁矣蔽衿不以賜左右而蔵之昭侯曰非子之所知也吾聞明君之愛一嚬有為嚬一笑有為笑今夫衿豈特嚬笑哉衿之與嚬笑相去逺矣吾必待之有功故蔵之未有與也言不謬賞尹子曰范獻子遊於河顧問欒氏之子舟人捨檝對曰君不修政舟中之人皆欒氏之子君能反是欒氏之子其如君何獻子稱善乃賜舟人田百畆以田易言也淮南子曰忠臣之事君也計功而受賞不為苟得量力而受官不貪爵禄其所能者受之勿辭也宋玉等並造集小言賦云楚王既登雲陽之臺乃命諸侯大夫景差唐勒宋玉等並造大言賦卒而宋玉受賞王曰復能為小言賦者與之雲夢之田玉又為賦王曰善遂賜雲夢之田説苑曰晉文公亡時陶叔狐從文公反國行三賞而不及陶叔見舅犯曰吾從君亡十有三年顔色黎黒手足胝胼今吾君反國三賞而不及我也意者君忘我與吾有大故與子試為我言之於君舅犯言之文公文公曰噫我豈忘是子耶夫髙明至賢徳行全成耽我以道説我以仁暴浣我行昭明我名使我為成人者吾以為上賞防我以禮諫我以義蕃援我使不得為非數引我而請於賢人之門吾以為次賞夫勇壯强禦難在前則居前難在後則居後免我於患難之中者吾又以為之次且子獨不聞乎死人者不如存人之身亡人者不如存人之國三行賞之後而勞苦之士次之夫勞苦之士子固為首矣吾豈敢忘子哉周内史叔輿聞之曰文公其王乎昔聖王先徳而後力文公其當之矣詩云率禮不越此之謂也又曰衞君問於田讓曰寡人封侯盡千里之地賞賜盡三府玉帛而士不至何也田讓乃對曰君之賞賜不可以功及也君之誅罰不可以理避也猶舉杖而呼狗張弓而祝雞矣雖有香餌而不能致者害之必也又曰齊宣王遊於杜山有閭丘先生長老十三人於路拜謁宣王王賜之田不租無徭役諸老皆拜閭丘先生獨不拜王曰何也對曰来見大王所望者三願賜臣夀願賜臣富願賜臣貴王曰夫生殺有時命有長短非寡人之所制無以夀先生倉粟豐盈備災而畜無以富先生大官無缺小官卑賤無以貴先生閭丘先生曰此非謂也臣所願者願王選吏平法度政無刻苛如此臣少得夀焉春夏秋冬使之以時役無煩擾臣少得富焉願出令使少者敬長長者敬老如此則臣得貴矣今王賜臣田不租則倉廩以虛不役則官無所使非臣所望也王顧曰屈先生為相可乎先生曰臣願足矣焉用相乎又曰趙襄子問王離曰國之所以亡者何也對曰君恡而能忍是以亡耳襄子曰何以為然也曰恡則不能賞賢忍則不能罰罪賢者不賞罪者不罰不亡何也又曰佛肹於中牟叛置鑊於中庭召大夫而盟曰從我者賞之不從我者罰之田英曰吾聞義死者不避斧鉞之威義窮者不行軒冕之賜無義而生不如有義而死吾不佽也乃褰裳就鑊佛肹止之及襄子既復中牟之叛聞田英義召而賞之英辭不受曰一人受賞衆人有慙色英若受賞則中牟之士盡愧矣又曰蘇秦至齊齊王厚待之諸大夫嫉之使人刺秦而不死齊王出珍寳募求賊不得蘇秦垂死謂齊王曰王誠能為臣求賊者臣死後請車裂臣屍於市詢之曰蘇秦為燕欲亂齊今日其死寡人甚喜故裂之若得其殺主重封賞之如此刺秦者必出矣齊王従其言裂屍而詢之刺蘇秦者果出求賞新序曰晉文公出田有漁父諫曰夫鴻鵠厭江海而移入小澤則有矰繳之患今君棄宫殿遊至於此何行之逺也文公納諫而還請名漁父辭曰君能尊天事地敬神固國愛人薄賦徭役以時則臣亦富矣君若不能雖有重賞亦不能保也吕氏春秋曰昔晉文公與楚人戰於城濮召舅犯而問焉楚衆我寡奈何舅犯曰臣聞繁禮之君不足於文繁戰之君不足於詐君亦詐之而已文公又以問雍季雍季曰以詐導民亦一時之利也用舅犯之言而敗楚人於城濮反而為賞雍季在上位左右諫曰城濮之功舅犯之謀也君用其言而賞後其身或者不可乎文公曰雍季之言百世之利也舅犯之言一時之務也焉有一時之務先百世之利乎又曰晉文公将伐鄴趙衰言所以勝鄴之術文公用之果勝還将行賞衰曰君将賞其本乎賞其末乎賞其末則驕乗者存賞其本則以聞之卻虎公召虎曰衰言所以勝鄴鄴既勝将賞之曰盖聞之於子請賞子虎曰言之易行之難臣言之者也公子曰毋辭虎乃受凡行賞欲其博也博則多助今虎非親言者也賞猶及之此疏逺者所以盡能竭智者也晉文亡久矣歸而因大亂之餘猶能以覇其用此歟風俗通曰俗説有功得賜金者皆黄金案孫子法曰費千金百萬錢陳平間楚千金賜二疏黄金十斤此真黄金也亦為一萬錢裴氏新書曰丹涓有一言之善晉侯賜萬頃田辭而不受晉侯曰以此田易彼言也於子猶有所亡寡人猶有所得列子曰行賞不洽於人是春半半生也行罰不威是秋半半死也半生之春不洽於仁半死之秋不專於義太平御覽卷六百三十三
