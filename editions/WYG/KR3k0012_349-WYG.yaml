front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_349-1a, image: WYG0896/WYG0896-0129c.png}
body:
  text: 太平御覽卷三百四十九宋李昉等撰兵部八十箭上字林曰箭天竹也字統曰箭者竹之别形大身小葉曰竹小身大葉曰箭箭竹主為矢因謂矢為箭開元文字曰東南之美者㑹稽之竹箭焉箭篠也自關而東謂之矢自關而西謂之箭箭者竹名因以為號也三鐮謂今筩射箭也平題今戲射箭也鐮稜也題頭也說文曰箭矢也從竹前聲釋名曰矢指也言其所指向迅疾也又謂之箭箭進也其本曰足矢形似木木以下為本以根為足又謂之鏑鏑敵也可以禦敵也齊人謂之鏃言其所中皆族滅也關西曰釭釭鉸音校也言有鉸刃也其體曰簳言挺簳也其旁曰羽如鳥羽也鳥須羽而飛矢須羽而前也齊人曰衞所以導衞矢也其末曰括括㑹也與弦㑹也括旁曰義形如義也方言曰箭自關而東謂之矢江淮之間謂之鍭關西曰箭郭璞注曰箭者竹名因以為號也楊雄方言曰凡箭鏃三者謂之羊頭其廣薄而長薄謂之錍爾雅曰東南之美者㑹稽竹箭焉注云㑹稽山名今在山隂縣南竹箭篠也又曰金鏃翦羽謂之鏃骨鍭不翦羽謂之志郭璞注曰金鏃金錍箭也骨鏃今之骨骲是也不剪謂以鳥羽自然淺深不復翦之使齊也孫卿曰浮游作矢世本曰夷牟作矢黄帝二臣太公兵法曰箭之神名續長趙氏兵書曰矢一名信往易曰得金矢利艱貞吉又曰射雉一矢亡終以譽命書曰周成王崩垂之竹矢在東房垂舜共工所為也詩曰周道如砥其直如矢又曰弓矢既同又曰舎矢如破又曰既張我弓既挾我矢發彼小豝殪此大兕又曰束矢其捜捜衆意勁急也五十矢為束禮記曰古男子生桑弧蓬矢六以射天地四方天地四方者男子之所有事也故必先有志於其所有事又曰月令仲冬云是月也伐木取竹箭注云此時堅成可伐取也又曰后妃執弓挾矢於髙禖之前又曰乗丘之役圉人浴馬有流矢在白肉公曰非其罪也遂誄之周禮曰東南曰揚州其山鎮曰㑹稽其澤藪曰具區其川三江其浸五湖其利金錫竹箭又曰司弓矢掌八矢之法八矢一曰枉二曰絜音潔三曰殺四曰鍭五曰矰六曰茀七曰恒八曰庫凡枉矢絜矢利火射用諸守城車戰殺矢鍭矢用諸近射田獵矰矢茀矢用諸弋射恒矢庳矢用諸散射此八矢者弓弩各有四焉蓋枉殺矰恒弓所用也絜鏃茀庳弩所用也左傳曰魯莊公以金僕姑射南宫長萬杜預曰矢名也又曰狄人伐衛公與石祁子玦與寗莊子矢使守曰以此賛國擇利而為之又曰祝􅆅射王中肩王亦能軍又曰楚子與莫敖氏戰于臯滸臯滸楚地伯棼射王汰輈及鼓跗着於丁寜伯棼越椒也車轅汰過也箭過車轅上也丁寜鉦也又射汰輈以貫笠轂師懼退王使廵師曰吾先君文王克息獲三矢焉伯棼竊其二盡於是矣鼓而進之遂滅若敖氏又曰吕錡射恭王中月王召養由基與之兩矢使射吕中項伏弢而死以一矢復命又曰郄克傷流血及屨未絶鼓音曰余病矣張侯曰自始合而矢貫予手及肘予折以御左輪朱殷豈敢言病吾子忍之又曰齊師遁晉州綽及之射殖綽中肩兩矢夾脰又曰楚君以鄭故親集矢於目鄢陵戰晋射中楚王日也又曰齊子淵捷從泄聲子射之中楯凡繇朐汰輈匕入者三寸又曰孟之側後入以為殿抽矢策馬曰馬不進也不欲伐善榖梁曰偏弓鑿矢不出境偏當為敦鑿矢矢名皆天子之噐也論語曰子曰直哉史魚邦有道如矢邦無道如矢家語曰子路見孔子孔子曰何好對曰好長劒孔子曰以子所能加之以學豈可及乎子路曰南山有竹不扶自直斬而時射達於犀革以此言之何學為孔子曰栝而羽之鏃而礪之其入不益深乎子路再拜國語曰吳晉㑹于黄池吳王擐甲陳卒赤旗赤羽之矰望之如火又曰仲尼在陳有隼于陳侯之庭而死楛矢貫之石弩矢長尺有咫陳惠公使人以隼如仲尼之館問之仲尼曰隼之來也逺矣此肅慎氏之矢也昔武王剋商通道于九夷八蠻註說苑云百蠻使各以其方賂來貢使無忘職業於是肅慎氏貢楛矢石砮其長尺有咫先王欲其令徳之致逺以示後人使永鑑焉故銘其括鐫書切名也括箭羽之間曰肅慎氏之貢矢以分大姬配虞胡公而封諸陳古者分同姓以珍玉展親也分異姓以逺方之職貢使無忘服也故分陳以肅慎之矢君若使有司求諸故府其可得也使求得之金櫝如言櫝櫃也惠公使有司求之故府得肅慎矢於金櫃也中如仲尼之所言也史記曰魏公子無忌進兵撃秦秦軍解去遂救邯鄲趙王及平原君自迎公子平原君負韊音蘭為公子先引漢書曰李陵撃匈奴一日五十萬矢皆盡虜攻急陵歎曰復得數十矢足以脫矣又曰匈奴右賢王圍李廣廣為圎陣外向矢下如雨漢兵死者過半又曰婁煩射項羽弓發矢欲到羽怒目叱矢乃墮地煩亦恐死又曰李廣夜行見石如虎蹲射之其矢沒羽續漢書曰來歙撃隗囂守畧陽城大戰登城相射乃發屋斷木為箭東觀漢記曰耿弇與張歩戰矢中弇股以佩刀截之左右無知者又曰上拜冦恂河内太守恂移書屬縣講兵肄射伐淇園之竹治矢百餘萬又曰匈奴破離後王安得攻金滿城耿恭以毒藥傅矢傳語匈奴漢家箭神中其瘡者必有異因發强弩射之虜中矢者視瘡皆沸並大驚相謂曰漢兵神真可畏也遂觧去魏志曰挹婁在扶餘東北千餘里弓長四尺如弩楛長八寸青石為鏃又曰陳琳曰矢在弦上不得不發魏畧曰孫權乗大船出濡須口來觀魏軍曹公使弓弩亂發射之矢着其船船乃偏重箭墮將傾權因廻船復以一面受矢矢均船平乃放船而走蜀志曰雲長為流矢所中貫其左臂醫者曰矢鏃有毒當須破臂刮骨也晋書石季龍載記曰石韜起堂于太尉府號曰宣光殿梁長九丈石宣視而大怒斬匠截梁而去韜怒増之十丈宣聞之恚甚使楊杯牟皮牟成趙生等縁獼猴梯而入殺韜置其刀箭而去又毛寳傳曰寳軍縣兵少噐仗濫惡大為祖煥桓撫所破寳中箭貫髀徹鞍使人蹋鞍㧞箭血流滿鞾又桓𤣥傳曰逹枚囘恬與祐之迎撃𤣥矢下如雨𤣥嬖人丁仙期萬蓋等以身蔽𤣥並中數十箭而死崔鴻十六國春秋西秦錄曰白蘭王吐谷渾阿柴臨卒呼子弟謂曰汝等各奉吾一隻箭將玩之地下俄而命母弟慕延曰取汝一隻箭折之延折之又曰汝取十九隻箭折之延不能折柴曰汝曹知單者易折衆則難摧戮力一心然後社稷可固言終而卒又後燕録曰慕容盛行至西樂遇盜陜中盛曰我六尺之軀入水不溺在火不焦汝欲當鋒乎試竪爾手中箭百歩我若中之宜慎爾命如其不中當束身相授盜行竪箭盛一發中之盜曰相試耳資而遣之宋書朱齡石弟超石傳曰阿簿干歩騎十萬屯河北岸超石以軟弓小箭射虜又曰謝靈運山居賦云其竹則二箭殊葉四若齊味注云二箭一者若箭大葉一者若箭細葉又曰朱修之傳曰魯秀撃襄陽修之發連弩射秀秀亦發連弩應之修之使軍人縁水拾箭又曰謝莊傳云時河南獻舞馬詔群臣為賦莊所上其辭迎調露於飛鍾赴承雲於驚箭齊書曰陳顯達傳云顯達桓姥音莫補切宅大戰破賊矢中左眼㧞箭而鏃不出北黄村潘嫗善禁先以釘釘柱嫗禹歩作氣釘即時出乃禁顯逹目中鏃出之三國典畧曰梁以䕶軍將軍六法和為郢州刺史封江乗縣公法和嘗軍次白帝謂人曰諸葛孔明可謂名將吾目見之此城旁有埋弩箭鏃一斛許因令掘之果如其言北齊書曰郎基字世業遷海西鎮將梁吳明徹攻海西基糧仗皆盡乃削木為箭剪紙為羽得圍觧還朝㒒射愔勞之曰卿本文吏遂有武畧木箭紙羽皆無故事班墨之思何以過之後魏書曰世宗幸鄴還於河内懐界帝親射矢一里五十餘歩侍中高顕等奏伏見御􅋃矢臨原弋逺弦動羽馳鏃所逮三百餘歩臣等伏惟陛下聖武自天神藝夙茂巧會騶虞之節妙盡矍音居均反圃之儀威稜攸疊甝音胡甘反兕懾氣才猛所振勍憝弭心足以肅截九區赫服八宇矣盛事奇迹必宜表述勒銘射宫永彰聖藝後周書曰王傑魏恭帝元年從于謹圍江陵時柵内有人善用長矟戰士將登者多為所斃謹令傑射之應弦而倒登者乃得入餘衆繼進遂㧞之謹喜曰濟我大事者在此箭也又曰賀㧞岳既遇害于河曲太祖乃率輕騎馳赴平凉時齊神武遣長史侯景招引岳衆太祖至安定遇之謂景曰賀㧞公雖死宇文泰尚存卿何為也景失色對曰我猶箭耳隨人所射安能自裁景於此即還又曰庾信傳云信常有鄉關之思作哀江南賦以致其意云兩觀當㦸千門受箭白虹貫日蒼鷹撃殿又曰長孫晟傳云晟與汝南公獵見二雕飛而爭肉因以兩箭與晟曰射取之晟彎弓馳往遇雕相攫一發䨇貫焉唐書曰太宗討劉黒闥闥常於肥鄉列陣太宗親率左右撃之有一突將勇壯絕人直衝太宗刃將接太宗以天策上將大箭射之中心洞背應弦而斃遂傳此箭於北蕃突厥見而驚歎又常輕騎近出遇三騎皆賊中驍勇有名者舉槍而進左右請避之太宗不從待其將至連發三矢相次皆斃敵人懾氣焉又曰貞元十四年貢武舉并應百隻箭及三十隻箭等今年權停時諫議大夫田敦因蒙召對奏言兵部武舉等每年常數百千人持挾弓矢出入皇城間恐非所宜上聞而瞿然故命停之其實武舉者每歳不過十數人時議惡敦貴欲非短舊事奏議不實自是訖于貞元更不復置太公六韜曰陷堅陣强敵大黄叅連弩飛鳬電景矢自副註云飛鳬電景矢名飛鳬尺莖白羽以綱為首電景青莖尺羽以綱為首綱一作鐵太公金匱曰武王伐殷丁侯不朝尚父乃畫丁侯三向射之丁侯病遣使請臣尚父乃以甲乙日㧞其頭箭丙丁日㧞其目箭戊巳日㧞其腹箭庾辛日㧞其股箭癸亥日㧞其足箭丁侯病乃愈四夷聞皆懼越常氏獻白雉太平御覽卷三百四十九
