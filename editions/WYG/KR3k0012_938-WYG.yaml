body:
  text: 太平御覽卷九百三十八宋李昉等撰鱗介部十鯨鯢魚鯪魚䱜魚搥額魚海鰌魚石􅀈魚鰐魚鮫魚鱕魚石首魚黃靈魚烏賊魚􅸕魚䱥魚鰒魚比目魚人魚虎魚鯨鯢魚春秋考異郵曰鯨魚死而彗星出左傳宣下曰古者明王伐不敬取其鯨鯢而封之為大戮鯨鯢大魚以喻不義之人春秋後語曰楚威王問宋玉曰先生其有遺行歟何士民衆庻不譽之甚也宋玉對曰夫鳥有鳳而魚有鯨鳯凰上擊九千里翺翔乎窈㝠之上夫藩籬之鷃豈能與料天地之髙哉鯨魚朝發於崑崙之墟暮宿於孟津尺澤之鯢豈能與量江漢之大哉故非獨鳥有鳳而魚有鯨也士亦有之唐書曰開元七年大拂湼䍪羯獻鯨鯢淮南子曰麒麟鬬則日月食鯨魚死而彗星出鯨海中魚之王也鄧柟書曰獵猛虎者不與後園釣鯨鯢者不與清池何則園非虎處池非鯨淵文字同說苑曰昔南瑕子過程本子程本子為之烹鯢魚南瑕子曰吾聞君子不食鯢魚程本子曰乃君子不食而何事焉南瑕子曰吾聞上比所以廣德也下比所以狹行也比於善自進之階也比於惡自退之源也魏武四時食制曰東海有大魚如山長五六丈謂之鯨鯢次有如屋者時死岸上膏流九頃其鬚長一丈廣三尺厚六寸瞳子如三升碗大骨可為方臼廣志曰鯢魚聲如小兒有四足形如鱧出伊水也司馬遷謂之人魚故其著史記曰始皇帝之𦵏也以人魚之膏為其燭也徐廣曰人魚似鮎而四足即鯢魚也崔豹古今注曰鯨海魚也大者長千里小者數千丈一生數萬子常以五月六月就岸邉生子至七八月導引其子還入海中鼔浪成雷噴沫成雨水族驚畏之皆逃匿莫敢當其雌曰鯢大者亦長千里眼晴為明月珠任昉述異記曰南海有珠即鯨目瞳夜可以鍳謂之夜光潘岳滄海賦曰魚則吞舟鯨鯢左思吳都賦曰長鯨吞航修鯢吐浪水元虛海賦曰其魚則橫海漢鯨突兀孤遊巨鱗刺雲洪脊挿天顱骨成􅏀流膏為淵沙毗觀濤賦曰於是神鯨來往乗波躍鱗噴氣欱霧水賦曰魚䘮成島嶼之墟目落為明月之珠鯪魚音陵山海經曰鯪魚吞舟臨海水土記曰鯪魚背腹皆有刺如三角菱䱜魚南越記曰䱜魚南越謂為壊雷魚長二丈子朝出食暮還母腹常從臍中入口中出腹内有兩洞腹貯水以養子腹容二子兩腹則四子也其鰓鱗皮有珠文可以餙刀劒口孫綽望海賦曰勁䱜揚鬐以排流槌額魚臨海水土記曰槌額似䱜魚長四尺海鰌魚臨海水土記曰海鰌長丈餘金樓子曰鯨鯢一名海鰌穴居海底鯨入穴則水溢為潮來鯨既出入有節故潮水有期嶺表録異曰海鰌魚即海上最偉魚也其小者有千餘尺每嵗廣州常發􅔓船過南安貨易路經調黎地名海心有山阻東海濤嶮而急亦黄河之西門也深濶處或見十餘山或出或没槁工曰非山島鰌魚背也雙目熌爍鬐鬛若􅉫朱旗日中忽雨霡霂舟子曰此鰌魚噴氣水散於空風勢吹來若雨耳即鼔舟而譟倐爾而没魚畏鼔物類相伏耳石􅀈魚臨海水土記曰石􅀈音矛附石以鋸錯鰐魚吳時外國傳曰鰐魚大者長二三丈有四足似守宫常吞食人扶南王范尋勅捕取置溝壍中尋有所忿者得以食鰐若罪當死鰐不食便解放以為無罪梁書曰林邑國于城溝中養鰐魚門外圏猛獸有罪者輙以餧猛獸及鰐不食為無罪三日乃放之鰐大者長二丈餘狀如鼉一目四足喙長六七尺兩邊有齒如刀劒能食魚獐鹿及人亦噉之蒼梧以南及外國皆有唐書曰韓愈為潮州刺史既視事詢吏民疾苦皆曰郡西湫水有鰐魚卵而化其長數丈食民畜産將盡以是民貧居數日愈往視之令判官秦濟炮一豚一羊投之湫祝之曰今潮州大海在其南鯨鵬之大蝦蟹之細無不容鰐魚朝發而夕至今與鰐魚約三日乃至七日如頑而不徙須為物害則刺史選材技吏民操强弓毒矢與鰐魚從事矣呪之夕有暴風雷起於湫中數日湫水盡涸徙于舊湫西六十里自是潮人無鰐患虞喜志林曰方有鰐魚喙長八尺秋時最甚作患在舟邊者或出頭食人故人持戈於船側而禦之博物志曰南海有鱷魚狀如鼉斬其頭而乾之斷喙去齒而更生如此三乃止交州記曰鰐好出沙上卵大如鵝卵可食廣州異物志曰鰐魚長者一丈餘有四足喙長七尺齒甚利虎及鹿渡水鰐擊之皆斷喙去齒旬日更生嶺表録異曰鰐魚其身土黃色有四足修尾形狀如鼉而舉止趫疾口森鋸齒往往害人南中鹿多最懼此物鹿走崖岸上群鰐嘷呌其下鹿必怖懼落崖多為鰐魚所得亦物之相攝伏也故李太尉貶官潮州經鰐魚瀬凡平生寳玩古書圖畫一時沉失遂召舶工崑崙取之但見鰐魚極多不敢輙近乃是鰐魚窟宅也鮫魚說文曰鮫魚也皮可以餙刀山海經曰荆山漳水出焉其中多鮫魚西京雜記曰尉陀髙祖時獻鮫魚荔枝髙祖報以蒲萄錦四疋博物志曰東海中有鮫鯖魚既生子子驚還入母腹尋復出任昉述異記曰虎魚老則為鮫鱕魚南越記曰鱕魚鼻有橫骨如轓海中波浪為之湧海船逢之必斷石首魚臨海異物志曰石首小者名鰌其次名秦石首異種又有石頭長七八寸與石首同嶺表録異曰石頭魚狀如鱅魚隨其大小脛有一石子如喬麥粒瑩白如玉有好竒者多市魚之小者貯於竹噐任其壊爛即淘之取其魚脛石子以植酒籌黃靈魚臨海水土記曰黃靈魚小文正黃似石首烏賊魚南越記曰烏賊魚有矴遇風浪便起虬前一鬚下矴而住腹中血及膽正黑可以書也世謂烏賊懐墨而知禮故俗云是海若白事小吏或曰古之諸生常自浮水烏見以為死便往啄之乃卷取烏故為烏賊今烏化為魚崔豹古今注曰烏賊魚河伯從事小吏嶺表録異曰烏賊魚只有骨一片如龍骨而輕虛以指甲刮之即為末亦無鱗而肉翼前有四足每潮來即以二長足捉石浮身水上有小蝦魚過其前即吐涎惹之取以為食廣州邊海人往往探得大者率如蒲扇煠熟以薑醋食之極脆美或入鹽渾􅀈為乾槌如脯亦美吳中好食之左思吳都賦曰烏賊擁劒􅸕魚音信臨海異物志曰􅸕似烏賊而肥炙食甘美䱥魚臨海異物志曰䱥魚至肥炙食甘美諺曰寧去累世宅不去䱥魚額鰒魚歩角反漢書曰王莽以闗東兵起憂慮不食但飲酒食鰒魚東觀漢記曰吳良字大儀齊人為郡儀曹掾正旦入賀太守門下掾王望前上言壽皆稱萬嵗良跪曰門下候謟明府無受其觴盗賊未弭人民困乏太守曰生言是遂不舉觴賜鰒魚百枚教署功曹良恥以言受官遂不肯謁後漢書曰張步遣使伏隆詣闕上書獻鰒魚魏志曰倭國人入海捕鰒魚水無深淺皆沉没取之齊書曰禇彦回時淮北屬魏江南無鰒魚或有間闗得至者一枚直數千錢有餉彦回鰒魚三十枚彦回時雖貴而貧過甚門生獻計賣之云可得十萬錢彦回變色曰我謂此是食物非曰財貨且不知堪賣錢聊爾受之雖復儉乏寧可賣餉取錢悉與親友噉之一日便盡陳思王求祭先帝表曰先帝喜食鰒魚前已表徐州臧霸送鰒魚二百自足供事魏文帝與孫權書曰今因趙咨致鰒魚千枚比目魚爾雅曰東方有比目魚不比不行其名謂之鰈史記曰管仲諫桓公古者封禪東海有比目之魚搜神記曰東海名餘腹者昔越王為膾割而未切墮半於水為魚臨海水土記曰兩名特立合體俱行比目魚也嶺表録異曰比目魚南人謂之鞋屜魚江淮謂之拖沙魚亦謂之箬葉魚左思三都賦曰䨇則比目片則王餘孫綽望海賦曰王餘孤逝比目䨇遊人魚山海經曰龍侯之山决水出焉其中多人魚狀如䱱魚四足其音如嬰兒食之無癡疾史記曰秦始皇冡中以人魚膏為燈燭臨海異物志曰人魚似人長三尺餘不可食虎魚范子曰虎魚出東海郭璞江賦曰或虎狀類人虎魚頭似虎腹背皆有刺太平御覽卷九百三十八
