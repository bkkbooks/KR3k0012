body:
  text: 太平御覧卷八百八十七宋李昉等撰妖異部三重生變化上重生左傳宣上曰晉人獲秦諜殺諸絳市六日而蘇續漢書曰獻帝初平中長沙人姓桓死月餘其母聞棺中有聲發之遂生至隂為陽下人為上其後曹公由庶士起又曰建安四年武陵女子李娥年六十餘病卒瘞於城外數里已十四日行人聞其塜中有人聲遂語其家其家往視聞娥聲出之遂活吳書曰孫休永安四年吳民陳焦死埋之六日更生穿土中出前趙録曰麟嘉元年大將軍東平王約卒一指猶暖遂不殯殮至甲戌乃蘇言見淵於不周山經五日遂復從至崑崙山三日而復返唐書曰貞元中翰林待詔戴少平死十六日復生建康實録曰晋方士戴洋字國流呉興長城人也年十二遇病死五日而蘇言執麾將士將往蓬萊崑崙積石太室恒盧衡等諸山既而遣歸葛洪神仙傳曰杜燮嘗病死已三日仙人董奉以一丸藥與服以水灌之捧其頭揺而消之食頃即開目動手顔色如故既服半日能起坐四日後能語遂復常捜神記曰晉武帝世河間郡有男女相悦許相配適既而男從軍積年父母以女適人無幾而憂死男還悲痛乃至冢所欲哭之叙哀而不勝其情遂發冢開棺即時蘇活因負還家將養數日平復其夫往求之其人還曰卿婦已死天下豈聞死人復活耶天賜我非卿婦也於是相訟郡縣不能决以讞廷尉秘書郎王導奏以精誠之至感于天地故死而更生此非常事不得以常理斷之請還開冢者又曰漢平帝元始元年二月朔方廣牧女子趙春病死既棺歛六日出棺外自言見死夫及父曰年二十七不當死太守譚以聞説曰至陰以為陽下人為上其後王莽簒位又曰晉咸寧中瑯琊顔畿得病就醫張瑳自治死於瑳家家人迎䘮旐每遶樹木不可解引喪者忽顛仆稱幾言曰我壽命未應死但服藥太多傷我五臓耳今當復活慎無葬我也父拊而祝之曰若爾有命復當更生豈非骨肉所願今但欲還家不葬爾也旐乃解還家乃開棺形骸如故微有人色而以手刮棺手爪盡傷於是漸有氣息以緜飲瀝口能咽遂與出之久久飲食稍多能開目視瞻屈伸手足然不與人相當不能言語飲食猶使人如此者十餘年家人相供䕶不復得操事其弟含乃絶棄人事躬侍養以知名州黨後稍更衰劣卒復還死又曰東平馮孝將為廣陵太守兒名馬子年二十餘卧殿中夜夣見女子年十八九言我是前太守徐元方女北海人不幸早亡亡來至今四年為鬼所枉殺案生録當八十餘聽我更生要當有所憑依乃得生活又應為君妻能從所委見救活不馬子答曰可爾與馬子尅期當出至期牀前頭髪如人正與地平令人掃去愈分明始悟是所夣見者遂屏除左右人便漸漸額出次頭面出又次肩項形體盡出馬子便令坐對榻上陳説語言竒妙非常遂與馬子宿息每戒尚虛君當自節問何時得出答曰出當得本生日生日尚未至遂往至廐中言語聲音人皆聞女計生日至乃具教馬子出己養之法語畢辭去馬子從其言至日以丹雄雞一隻黍飯一盤清酒一升醊其䘮前去廐十餘歩祭訖掘棺出開視女身完全如故徐徐抱出着帳中唯心下㣲暖有口氣令婢四人守養之常以青羊乳汁瀝其兩眼開口能咽粥既而漸能語二百日中持杖起及一年之後顔色肌膚氣力悉復乃遣報徐氏上下盡來選吉日下禮聘為夫婦生二男一女長子字元度永嘉初為秘書郎小男敬度太傅掾女適濟南劉子彦徴士延世之孫也幽明録曰瑯琊人姓王忘名居錢塘妻朱氏以太康九年病亡有二孤兒王復以其年四月暴死下三日而心猶暖經七日方蘇説初死時有二十餘人皆烏衣見録比去到朱門白壁狀如宫殿吏朱衣紫帶去冠介幘或所被著悉珠玉相連結非世中儀服復前見一人長大所著衣狀如雲氣王向叩頭自説婦已亡餘孤兒尚小正奈何便流涕此人為之動容云汝命自應來以汝孤兒遲汝三年之期王又曰三年不足活兒左右有一人語云俗尸何癡此間三年世中是三十年因便送出又三十年王果卒愽物志曰漢末大亂有發前漢時宫人塚者宫人猶活既出平復如舊魏郭后憐念録著宫中常置左右問漢時宫中事説之了了皆有次序及郭后崩哭泣過遂死又曰魏大司馬曹休所統中郎將謝璋部曲義兵奚儂恩女年四嵗病死故埋葬五日復生太和三年七月詔令休使父母同時送女來視其年四月三日病死四日埋葬至八日同墟人採桑聞兒啼聲即語儂妻往發視之兒生活今能飲食如常變化禮記月令曰仲春鷹化為鳩季春田䑕化為鴽季夏腐草為螢季秋雀入大水為蛤孟冬雉入大水為蜃左傳昭二曰昔堯殛鯀于羽山其神化為黃熊以入于羽淵春秋潜潭巴曰女子化為丈夫賢人去位君獨居丈夫化為女子陰氣淖小人聚漢書曰哀帝建平中豫章男子化為女子嫁人為婦生一子長安陳鳯言此陽變為陰將亡繼嗣自相生之象一曰嫁為人婦生一子將復一世乃絶續漢書曰靈帝時江夏黃氏之母浴而化為黿入于深淵其後時出見初簮一銀釵及見猶在其首又曰建安二十年越雋有男子化為女子時周祥言哀帝時亦有此將有易代之事至二十五年獻帝封于山陽國語曰趙簡子歎曰雀入海化為蛤雉入于淮化為蜃黿鼉魚鼈莫不能化唯人不能悲夫洪範五行傳曰魏㐮王十三年張儀詐得罪於秦而去相魏將為秦而欺奪魏君是嵗魏有女子化為丈夫者天若語魏曰勿用張儀陰變為陽臣將為君是時魏王亦覺之不用張儀儀免去歸秦魏無害紀年曰周宣王時馬化為狐山海經曰姑媱之山帝女死焉其名曰女尸化為䔄草其葉胥成其華黃其實如莵丘服之媚於人又曰炎帝之女娃遊於東海溺而死化為精衛其狀如鳥常銜西山之木石以堙東海又曰鍾山其子曰鼓其狀人面龍身是與欽䲹殺葆江于崑崙之陽帝乃戮之鍾山之東曰􅳿崖欽䲹化為鶚鼓亦化為鵕鳥又曰形天與帝争神帝斷其首葬之常羊之山乃以乳為目以臍為口操干戚以舞是為無首民又曰太室嵩髙成陽西啓母化為石焉莊子曰北溟有魚其名為鯤鯤之大不知其幾千里也化而為鳥其名曰鵬又曰萇宏死于蜀藏其血三年而化為碧太平御覧卷八百八十七
