  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_892-1a, image: WYG0901/WYG0901-0001a.png}
body:
  text: 太平御覽卷八百九十二宋李昉等撰獸部四虎下英雄記曰曹公擒吕布顧劉備曰𤣥德卿為坐上客我為降虜繩縳我急獨不可一言耶操曰縳餓虎不得不急乃命緩縳布呉志曰吕蒙欲従軍母止之蒙曰不探虎穴安得虎子又曰孫權毎田獵常乗馬射虎虎嘗突前權攀持馬勒走昭變色而諫權謝昭曰年少慮事不逺然猶不能已乃作射虎車又曰孫權親乗馬射虎馬為虎所傷權投以雙㦸虎却廢魏名臣奏曰世祖時有獻虎者問虎何食對曰食肉詔曰下民厭糠何忍以肉食虎乃命虎賁射殺之共食得計扵時而名垂扵後晉令曰諸有虎處皆作檻穽籬柵皆施餌捕得大虎賞絹三疋虎之子半魏略曰文帝欲受禪郡國奏白虎二十七見博物志曰江陵有猛人能化為虎俗云猛虎化為人好著紫葛衣足無踵有五指者人化為虎又曰虎知衝破又能畫地今人有畫物上下者推其竒耦謂之虎卜孝子傳曰楊香父為虎噬忿憤摶之父免害又曰郭文舉為虎􅊥鯁骨虎嘗衘鹿以報之括地圖曰越俚之民老者化為虎王孚安成記曰平郡區寶者後漢人居父䘮隣人格虎虎走趨其孤廬中即以蓑衣覆藏之隣人赴尋跡問寶寶曰虎豈有可舎而藏之乎此虎後送禽獸以助寶祭孝慈之志通扵神明由是知名裴淵廣州記曰興寧縣義熙四年忽有數十大鳥大如鶖少日化為虎周景式廬山記曰有姬姓祀康王廟林中有一虎伺祭輙以餘肉及骨與之有人惡畏之姬使避之人去復來陳留耆舊傳曰王業字子春為荆州刺史有德政卒於枝江有三白虎低頭曳尾宿衞其側及䘮去踰州境忽然不見民共立碑文號曰枝江白虎竹林七賢論曰王戎幼而清秀魏明帝時於宣武場上為欄鬭虎使力士逆與之摶縦人觀之戎年七嵗亦徃觀焉虎乗間摶欄而吼其聲震地觀者無不辟易顛仆戎安然不動帝於閣上見之使問姓名而異焉殷氏世傳曰亮字子華少學公羊十四傳祖父業多綜所見舉孝亷到陽城遇虎争一羊亮乃按劒瞋目斬羊虎乃各以其半去述異記曰漢中有虎生角道家云虎千嵗則牙脱而角生漢宣城郡守封邵一日忽化虎食郡民民呼曰封使君因去不復來故時人語曰無作封使君生不治民死食民異苑曰太元末徐桓以太元中出門徜徉見一女子因言曲相調便要桓入草中桓説其色仍隨去女子忽然變成虎負桓著背上徑向山中其家左右尋覔唯見虎跡旬日虎夜送桓下著門外又曰榮陽鄭襲太康中為廣陵太守閣下騶從忽如狂奄失其所在經日祼身呼吟膚血淋漓問其故云社公命令其作虎以斑皮衣之辭以執鞭之士不堪虓躍神怒還使剥皮皮已著肉瘡毁慘痛旬日乃差又曰鄱陽桓闡以太元十九年殺犬祭鄉里綏山煮肉不熟神怒即下教於巫曰桓闡以肉生貽我當謫令自食也其年便作虎作虎之始見人以斑皮衣之即能跳躍噬逐又曰彭城劉廣雅以太元中為京佐被使還都路經竹里停於邏宿此邏多虎劉極自防衞繫馬於户前手執㦸布於地上中宵與士庻同睡虎乗間跨越人畜獨取劉而去又曰邵都梁馮恭永初中醉卧於山路夜有虎來以頭枕其背恭中宵展轉以手搏之復大寢向曉始醒猶見虎蹲在脚後苟有宿命非智力所加也又曰扶南王范尋常畜生虎及鰐魚若有訟未知曲直便投與魚虎魚虎不噬則為有理穢貊之人祭虎為神將有以也幽明錄曰桓大司馬鎮赭圻時有何恭軍晨出行於田野中溺死人髑髅上還晝寢夢一婦人語云君是佳人何以見穢汚暮當令知之是時有暴虎人無敢夜出者何常穴壁作溺穴其夜趨穴欲溺虎嚙㫁隂莖即死又曰晉孝武帝母李太后本賤人簡文無子曽令善相者相宫人李太后給皂役不豫焉相者指之此當生貴子而有虎厄帝因幸之生孝武帝㑹稽王道子既登尊位服相者之見而怪有虎害且生所未見乃令人畫作虎象因以手戯欲打虎後患手腫痛遂以疾崩神仙傳曰介象入山兾遇神仙卧石上一虎徃䑛象額寤而見虎謂虎曰天使汝來侍衞我者汝且停若山神使汝試我者汝自去虎乃去捜神記曰蘇易者廬陵婦人善看産夜忽為虎所取行六里至大壙厝易置地蹲而守見有牝虎當産不得解匍匐欲死輙仰視易悟之乃為探出之有三子生畢牝虎負易還再三送野肉於門内又曰漢江之域貙人能化為虎長沙居民作檻捕虎檻發明日衆人共徃格之見一亭長赤幘大冠在檻中坐民問君何以入此中亭長大怒曰昨被縣召夜避雨誤入此中急出我民曰君見召不當有文書耶即出懐中召文書於是出之尋視之化為虎上山走續捜神記曰丹陽縣人沈宗居在縣下以卜為業義熙中左将軍檀侯鎮姑孰好獵以格虎為事忽有一人著皮袴乗馬從一人亦著皮袴以紙褁十餘錢來詣宗卜云西去覔食好東去覔食好宗為作卦卦象告之東向吉西向不利因就宗乞飲内口著甌中状如牛飲既出門東行百歩従者及馬皆化虎自此以後暴虎非常又曰呉猛有道術同縣鄒惠政迎猛夜於家中庭燒香忽有虎來抱政兒超籬去猛語云無苦須臾虎當還去數十歩忽然復送歸政遂精進為道士又曰潯陽縣北山中蠻人有術能使人化為虎毛色爪牙悉如真爾鄉人前將軍周眕有奴使入山伐薪奴有婦及妹亦俱行既至奴語二人云且上髙樹視我所為如其言既而入草須臾見一黄斑虎従草中出奮迅吼喚甚可畏少時復為人語二人曰歸家慎勿道遂向等輩說之周得知飲以淳酒令熟醉使人解其衣服及身體唯於髻髪中得一紙畫作大虎邊有符周宻取録之奴既醒喚問之事已露遂具説有術前以三尺布數升米楫一赤雄雞一斗酒受此法俗説曰桓石䖍是桓征西兒未被舉時西出獵石䖍亦従獵圍中射虎虎被數箭伏在地諸將請石䖍曰惡郎能拔虎箭不石䖍小名惡子答曰可拔耳惡子於是逕至虎邊便拔得箭虎跳越惡子亦跳跳乃高虎跳虎還伏惡子持箭便還又曰齊沈僧昭别名法朗攸之之孫也記人吉凶頗有應騐嘗校獵中道而還左右問何故荅曰國家有邊事須還分處問何以知之曰向聞南山虎嘯知耳俄而使至金樓子曰孔子遊舎於山使子路取水逢虎於水與共戰攬尾得還問子曰上士殺虎如何曰上士殺虎持虎頭又問中士殺虎如何子曰中士持虎耳又問下士殺虎如何子曰捉虎尾子路出尾棄之懐石盤曰夫子知虎在水而使我取水是欲殺我也乃欲殺夫子問曰上士殺人云何曰用筆端中士殺人云何曰言語下士殺人云何曰用石盤子路乃棄石盤而即行國史補曰裴旻為龍華軍使守北平北平多虎旻善射常一斃虎三十有一既而息於山下四顧自若有父老至曰此處皆似虎而非真虎將軍若遇真虎無能為也旻曰真虎安在父老曰自此而北三十餘里徃徃有之旻躍馬而徃果有一虎騰出狀小而勢猛據地一吼山石震烈旻擗易弓矢皆墜殆不得免自此慚懼不復射虎呉氏虎賦曰蓋其状也誕節緩腕續背連骸細腰鼓胷方口大鼻似黼組雜間若錦繡相連豹説文曰豹似虎周易革卦曰上六君子豹變小人革面象曰君子豹變其文蔚也小人革面順以従君也廣志曰豹有赤豹南山有𤣥豹南多赤豹狐死首丘豹死首山是性之異也帝王世紀曰紂為玉箸箕子曰玉箸必食熊蹯豹胎散宜生獻紂黑豹孫氏瑞應圖曰文王拘於羑里散宜生於懐塗山得𤣥豹以獻紂免西伯之難荘子曰夫豐狐文豹棲於山林處於巖穴静也不免於網羅之患是何罪之有其皮為之灾也管子曰武王為侈靡令人豹襜豹裘方得入廟故豹皮百金臣家糶千鍾未得一豹皮韓子曰虎豹不用爪牙與鼷䑕同威文子曰虎豹之文來射猨狖之捷來格淮南子曰蝟使虎申蛇令豹止物有所制也又曰昔容成氏之時置餘粮於畆首虎豹可尾容成黄帝時造厯者又曰高山險阻深林榛薄豹虎之樂也人入之而畏川容通源積水成淵黿鼉之所便也人入之而死雜道書曰南海博羅縣有羅山高入雲霧諸仙人所遊之山也上有豹狀似獮猴南海人名之為果下洞冥記曰青豹出浪坂之山狀如虎色如翠以之為脯食之不愚馮愔説鄧禹書曰夫虎豹愛大林蛟龍愛大水列女傳曰陶詹子妻曰妾聞南山有文豹霧雨七日不下食者何也欲以其澤衣毛而成其文章也後秦記曰狄伯竒少曽遊獵得豹見其文采炳煥遂自感歎始學書藝林邑國記曰西南界有唼臈虫食死人肉豹皮覆尸畏而不來謝朓詩曰雖無𤣥豹姿且隱南山霧晉中朝大駕鹵簿曰豹尾車駕一闌臺符節令史載自豹尾後鹵簿盡徐廣車服注曰乗輿之有屬車最後一車懸豹尾駮爾雅曰駮如馬倨牙食虎豹説苑曰晉平公出畋見乳虎乳虎伏而不動顧謂師曠曰吾聞之覇王之主出則猛獸伏不敢起今者寡人出見乳虎伏而不動此其猛獸乎師曠曰鵲食猬猬食鵔鸃鵔鸃食豹豹食駮駮食虎夫駮之狀有似駮馬今君必驂駮馬而出畋乎公曰然山海經曰中曲之山有獸焉白身黑尾一角虎牙爪音如鼓其名曰駮是食虎豹可以禦兵晉郭璞駮贊曰駮唯馬類實畜之英騰髦驤首嘘天雷鳴氣無不凌吞虎辟兵太平御覽卷八百九十二
