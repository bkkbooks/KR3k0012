  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_981-1a, image: WYG0901/WYG0901-0603c.png}
body:
  text: 太平御覽卷九百八十一宋李昉等撰香部一香麝葳香欝金雞舌龍腦雀頭香書曰至治馨香感于神明左傳曰黍稷非馨馨者香之遠聞也説文曰香芳也吳志曰士爕兄弟並為列郡雄長一州車騎滿道胡人夾轂焚香者常有數千世説曰桓車騎時有陳莊者入武當山學道所居恒有白烟香氣間出續晉安帝紀曰王鎮惡亡經日魏興太守郭宣之晝坐忽見東莊來因叙舊事相對悲泣勸營功德去後郡内悉聞香狀如芳烟流散晉書杜太后傳曰海西公之世太后復臨朝稱制桓温之廢海西公也太后方在佛屋燒香内侍啓云外有急奏太后出尚倚户前視奏宋書曰范􅁮撰和香方其序曰麝本多忌過分必害沉實易和盈斤無傷零藿虛燥詹唐黏濕甘松蘇合安息欝金􅎄和羅之屬並被珍於外國無取於中土又􅀥膏昏鈍甲煎淺俗非唯無􅂇於馨烈尤當彌增於有疾也所言悉以比類朝士麝本多忌比庾仲文零藿虗燥比何尚之詹唐黏濕比沈演之􅀥膏昏鈍比羊𤣥保甲煎淺俗比徐湛之甘松蘇合比惠琳道人沉實易和以自比也南史曰韓懐明上黨人也客居荆州十嵗母患尸疰毎發輙危殆懐明夜于星下稽顙祈禱時寒甚切忽聞香氣空中有人曰童子母須臾永差無勞自苦未曉而母平復梁書曰庾詵元尊釋教宅内立道場環繞禮懴六時不息誦法華經毎日一遍後夜中忽有一道人自稱願公容止甚異呼詵為上行先生授香而去又曰梁武帝祀南郊先是一日景夜南郊令解除之等到郊所履行忽聞異香隨風而至及将行事奏樂迎神有異光圍滿壇上朱紫黄白雜沓食頃而㓕又曰王琛本無令問為太子中舍人謟事何敬容為其階前種植香草脱履躡其草根敬容意以為善晉書曰賈充以韓壽為掾毎㑹聞壽有異香氣是外國所貢一着衣經月不歇充計武帝所賜惟已及陳騫他家無此香嫌壽與已女通考問左右婢具以實對充以女妻壽壽時未婚金樓子曰齊東昏以錦石為殿内開千門萬戸又有和香香氣紛馥聞之使人歡悦生諸雅態兼令睡眠又曰昔玉池國有民面醜婦國色鼻齆婿乃求媚此婦終不肯迎願遂往西市售無價名香而燻之還入其室婦既齆豈分香臭哉呂氏春秋曰懐腐而欲香入水而惡濡漢武故事曰上作栢梁臺悉以香栢香聞數十里也漢官典職曰尚書郎懐香握蘭神仙傳曰淮南王為八公張錦綺之帳燔百和之香佛圖澄傳曰澄以鉢盛水燒香呪之須臾生青蓮花林邑記曰朱吾以南有文狼野人居無室宅依樹止宿食生肉採香為業與人居市若上皇之民矣鄴中記曰石虎作沉蘇帳頂安金蓮花花中懸金薄織綩囊裹受三升以盛香注帳之四面上十二香囊采色亦同竺法眞登羅山䟽曰越王擣薰陸香扶南傳曰頓遜國人恒以香花事天神香有多種區撥逆花途致各逐花摩夷花冬夏不衰日載數千車於市賣之燥乃益香亦可為粉以傅身體述征記曰北芒有張母墓舊説是王氏妻葬有年載後開墓而香火猶燃十洲記曰漢武時長安大疫人死日以百數帝乃試取月氐國神香燒之于城内死未滿三月者活芳氣經三月不歇帝始信神物也乃秘録餘香郭子横洞㝠記曰漢武帝於招仙閣燒荃靡之香屑如粟一粒香氣三月不絶又曰䟦塗闍者北人也剪髮裸形不食穀飲清水食都夷香如棗核食一斤則歴月不飢以一粒如粟大投清水中俄而滿大盂也博物志曰西域使獻香漢制獻香不滿斤不得受西使臨去又發香器如大豆者試著宮門香氣聞長安四面數十里中經日乃歇捜神記曰渤海史良姊一女子許嫁而未果良怒殺之後夢見曰還君物覺而得昔所與香纓金釵之屬又曰初鈎弋夫人有罪以譴死殯屍不臰而香又曰合肥有一大船覆在水中漁人夜宿其旁聞筝笛之音又香氣非常相傳云曹公載妓船覆於此任昉述異記曰魏武帝陵中有泉謂之香水古詩云安得香水泉濯郎衣上塵一説香水在并州香山其水香潔浴之去病吳故宮有香溪俗云西施浴處又呼為脂粉塘吳王宮人濯於此溪上源至今馨香又曰南海出千歩香佩之聞於千歩也今海隅有千歩草是其種也葉似杜若而紅碧間雜貢籍云日南郡貢千歩香漢雍仲子進南海香物拜為涪陽尉時人謂之香尉日南郡有香市商人交易諸香處南海郡有香戸日南郡有千畆香林名香出其中香洲在朱崖郡洲中出諸異香往往不知名千年松香聞十里亦謂之十里香也夢書曰夢得香物婦女歸也曹植洛神賦曰踐椒塗之郁烈歩蘅薄而流芳魏武令曰昔天下初定吾便禁家内不得薰香後諸女配國家因此得香燒吾不好燒香恨不遂初禁令復禁不得燒香其以香藏衣著身亦不得秦嘉答婦徐淑書曰缺注好香四種各一斤可以去穢淑答書曰未得侍帳帷則芬芳不設陸機弔魏武文曰余為著作郎遊秘閣見魏武今曰餘香可分與諸舍中無所為學作履組賣也弔曰紆家人于履組塵清慮于餘香麝爾雅曰麝父麕足許愼説文曰麝如小麋臍有香從鹿射聲黒色麞也義熈起居注曰倭國獻貂皮人參等詔賜細笙麝香齊書曰東昏侯鑿金蓮花貼地令潘妃行其上曰此歩歩蓮花也塗地皆以麝香唐書曰波斯國人皆以麝香和蘇塗鬚㸃額及於耳鼻用以為敬抱朴子曰辟蛇法入山以麝香丸著足爪中皆有効又麝香及野猪皆啖蛇故以壓之也又作筆墨法曰作墨用雞子白眞珠麝香合以和墨宜用九月二日南夷志曰南詔有婆羅門波斯闍婆渤泥崐崙數種外道交易之處多諸珍寳以黄金麝香為貴貨嵩髙山記曰有人在嶺上聞異聲清和雅妙尋不復聞唯見一麝香在嶺上側足䨥跳忽失所在荆州圖記曰臨澧縣南有龍寄山其獸多麝西京雜記曰趙飛鷰為皇后女弟在昭陽殿遺飛鷰書曰今日嘉辰貴姊懋膺洪册上襚二十五條以陳踴躍之志焉榔葉扇同心梅合枝李青木香香螺巵出南海一曰丹螺甲九眞䧺麝香沉水香續捜神記曰桓哲字明期居豫章時梅𤣥龍為太守已病哲往省之語梅曰吾昨夜忽夢作卒迎卿來作太山府君梅聞之愕然曰我亦夢見卿為卒着衣迎我數日復同夢如先云二十八日當拜至二十七日晡後桓忽中惡腹滿遣人就梅索麝香丸梅聞便令作㓙具桓便亡八日而梅卒本草經曰麝香味辛辟惡殺鬼精生中臺山也秦嘉與婦書曰今奉麝香一斤可以辟惡氣嵇康養生論曰麝食栢而香葳香孫氏瑞應圖曰葳㽔王者禮備至則生一曰王者愛人命則生一名葳香也欝金説文曰欝芳草也十葉為貫百卄貫築以煮之為鬱合秬而釀之以降神也周禮春官上曰欝人掌祼器凢祭祀賔客之祼事和欝鬯以實彛而陳之魏畧曰大秦國出鬰金後周書曰波斯國大月氐之别種也地出氍毹𤣥麞皮及薰陸欝金蘇合青木等香胡椒蓽撥石蜜千牛棗香附子訶黎勒無食子鹽緑雌黄等物唐書曰天竺國卑濕暑熱稻嵗四熟有金剛似紫石英百鍊不銷可以切玉又有旃檀欝金諸香通大秦又曰太宗時伽毗國獻欝金香似麥門冬九月花開狀似芙蓉其色紫碧香聞數十歩花而不實欲種者取根文士傳曰朱穆字公叔作鬰金賦曰莫熠爍以焜煌似九日之普照遠而望之粲若星羅出雲嶠近而觀之􅁮若丹桂耀湘涯應劭地理風俗記曰周禮鬰人掌祼器凡祭醊賔客之祼事和鬰鬯以實樽彛鬰華草也謂用百草之華煑以合釀黑黍以降神者也或説欝金香也南州異物志曰鬱金者出罽賔國國人種之上取上佛積日萎槁乃載去之然後取鬱金色正黄細與芙蓉華裏披蓮者相似可以為酒雞舌應劭漢官儀曰桓帝侍中刁存年老口臭上出雞舌香與含之雞舌頗小辛螫不敢咀咽嫌有過賜毒藥歸舍决就便宜家人哀泣不知其故僚友求眂其藥出口香咸嗤笑之吳時外國傳曰五馬洲出雞舌香抱朴子曰或以雞舌黄連乳汁煎之注之治諸有百􅠰在目愈而更加精明倍常于益期牋曰外國老胡説衆香共是一木木花為雞舌香南州異物志曰雞舌出在蘇州云是草花可含香口廣志曰雞舌出南海中乃剽國蔓生實熟貫之續捜神記曰王廣豫章人年少未婚至田舍見一女云我是何叅軍女年十四而殀為西王母養使與下土人交廣與之纒綿其日於席上得手巾裹雞舌香其母取巾燒之乃是火浣布龍腦唐書曰貞觀中烏萇國遣使獻龍腦香本草曰龍腦香味苦㣲寒主心腹邪氣風濕積聚出婆律國形似白松脂作杉木氣明净者善云合粳米灰相思子貯之則不耗雀頭江表傳曰魏文帝遣使於吳求雀頭香太平御覽卷九百八十一
