front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_338-1a, image: WYG0896/WYG0896-0041c.png}
body:
  text: 太平御覽卷三百三十八宋李昉等撰兵部六十九角金鼓鞞鞀鐃鈴鐸刁斗柝角徐廣車服儀制曰角前世書記所不載或云本出羗胡吹以驚中國之馬或云本出吳越晉書安帝記曰桓𤣥置龍頭角或曰所謂亢龍角者也晉中興書曰大司馬桓温屯中堂夜吹警角御史中丞司馬恬奏劾大不敬請治罪又庾翼與燕王書曰今致畫角一雙孔雀毦二枚宋書曰張興世父仲子由興世致位給事興世欲將徃襄陽愛鄉里不肯去嘗謂興世曰我雖田舍老公樂聞鼓角汝可送一部行田時欲吹之興世素恭謹畏法譬之曰此是天子鼔角非田舍公所吹三國典略曰初魏世山崩得三石角藏於武庫至是齊主入庫賜從臣兵噐持此角賜平秦王歸彦曰爾事常山不得反事長廣得反反時將此角嚇漢也史筌武昌記曰武昌有硯山欲隂雨上有聲如吹角辛氏三秦記曰河西有沙角山山頭頽沙則鼓角鳴異苑曰晋孝武太元末帝毎聞手巾箱中有鼔吹鞞角響於是請僧齊㑹夜見一臂長三尺許手長數尺來摹經帙帝是嵗崩天下大亂幽明錄曰晋司空郗方回葬婦於驪山使㑹稽郡吏史澤治墓多平夷古墳復壞一塚搆制甚偉噐物殊盛塚發聞鼓角聲角聲自是多如此陶侃表云奉獻金口角石勒别傳曰石勒永康中流宕山東寄旅平原師勸家傭耕耳恒聞鼔角鞞鉊鐸之音勒異之世説曰樂廣有親客久濶不復來樂問所以答曰前在坐䝉賜酒方欲飲見杯中有蛇意甚惡之既飲而疾于時河南㕔事壁上有角角邊漆畫作蛇樂疑是角影入杯中復令置杯酒於前處謂曰君更㸔酒中復有所見不答曰所見如初樂乃告其所以客豁然意解沉疴䪺消又一本云角弓語林曰陸士衡為河北督兵已被間搆内懐憂懣聞衆軍警鼔吹角謂其司馬孫極曰我今聞此不如華亭鶴鳴谷儉角賦曰夫角以類推之蓋黄帝㑹羣臣於太山作清角之音似兩鳳之雙鳴若二龍之齊吟如丹蛇之翹首似雄蛇之帶矢衛公兵法曰夫軍城及屯營行軍在外日出日沒時撾鼔一通要三百三十椎為一通鼓音止角音動吹十二聲為一疊角音止鼔音動如此三鼔三角而昏明畢又曰諸大將置鼔四十面于總管給鼔十面營别給鼓一面行即負隨纛下擬晝夜及在道有警急擊之傳響令諸軍嚴警兼用防備賊侵逼如軍行引之時先軍卒逢賊冦先軍即急擊鼓救中腰逢賊即湏擊鼓前軍聞聲便住後軍聞聲湏急向前赴救後頭逢賊即擊鼓前頭中腰聞聲即須住並量抽兵相救如發引稍長鼓聲不徹中腰支料更湏置鼓傳響使傳後得聞其諸營自湏著鼓一面用防夜中有賊犯營即急擊令諸軍有警備又曰諸行軍立營數則萬計或逢沈溺或阻山河同聼角聲懼共齊發路狹難進從我馬驢應發營第一角聲絶右虞候促馬驢第二角聲絶即被駕右一軍促馬驢第三角聲絶右虞候即發引右一軍被駕右二軍促馬驢第四角聲絶右一軍即發引右二軍被駕以後諸軍毎聼角聲装束被駕准此毎營各出一戰隊今取虞候進止防有賊至便用騰擊後如其路便細小即湏臾有角聲仍令虞候及營官人虞候子排比催督急過不得停擁過訖以后軍准前排比併催廹急過金鼓釋名曰校號也將帥號令之所在也節為號令賞罰之節也鐸度也號令之限度也金鼔金禁也為進退之禁也又曰顯允方叔伐鼔淵淵振旅闐闐詩曰方叔率止鉦人伐鼓陳師鞫旅周禮曰鼓人掌教六鼓以雷鼓鼓神祀雷鼔八面鼔也以靈鼓鼔社祭靈鼔六面鼔也社祭祭地祇也以路鼓鼔鬼享路鼓四面鼔也享宗廟也以賁鼓鼔軍事大鼓謂之賁鼔長八尺以鼛鼔鼔軍事鼛大鼔也長丈二尺也以晋鼔鼓金奏晋鼔長六尺六寸金奏謂樂正擊編鐘也左傳曰凡師有金鼓曰伐無曰侵又曰吳子使其弟蹶由犒師犒勞也楚人執之將以釁鼔王使問曰汝卜來吉乎對曰吉寡君聞君將治兵於敝邑卜之以守龜曰余亟使人犒師請行以觀王怒之疾徐而為之備尚克知之龜兆告吉曰克可知也君若驩焉好逆使臣滋敝邑休怠而忘其死亡無日矣今君奮焉震電憑怒虐執使臣將以釁鼔則吳知所備矣乃釋之又曰宻湏之鼓與其大輅文王所以大蒐也又曰簡子曰吾伏弢嘔血鼓音不衰今日我上也功為上也又曰吳伐齊將戰公孫夏命其徒歌虞殯陳子行命其徒具含玉陳書曰此行也吾聞鼔而已不聞金矣鼔以進軍金以退軍不聞金言將死之也國語曰越甲至齊雍門子狄請死之齊王曰鼔鐸之聲未聞矢石未交長兵未接子何務死焉後漢書曰光武徇河内韓歆議欲城守岑彭止不聼既而光武至懐歆廹急迎䧏光武知其謀大怒收歆置鼔下將斬之中将軍最尊自執旗鼔若置營則立旗以為軍門并設鼔戮人必於其下召見彭彭因進説乃貰歆東觀漢記曰段熲起於徒中為并州刺史有功徵還京師熲乗輕車介士鼔吹曲蓋朱旗騎馬拂天蔽日錚鐸金鼔雷振動地連騎繼跡彌數十里齊地記曰城東有上祠山上有石鼓舊説云將有冦難則鼓自鳴所以豫警備也吳興記曰長城縣有夏架山石鼓盤石為足長老云鳴聲如金鼓則三吳有兵東方朔𫝊曰朔初上書曰臣朔少失父母長養兄嫂年十三而學三冬文史足用十五學擊劒十六學詩書誦二十萬言十九學孫吳兵法戰陣之事鉦鼓之教周髀曰十人之長執銅百人之師執鐸千人之師執鼙萬人之將執大鼓吳氏春秋曰金鼓所以一耳也法令所以一心也又曰周宅鄷鄗近犬戎與諸侯約髙堡置鼓其上逺近相聞戎冦至傳鼓相告諸侯之兵皆至救天子褒姒之笑也因數擊鼓諸侯兵數至而無冦後戎冦真至幽王擊鼔諸侯兵不至幽王之身乃死于驪山之下為天下笑韓侯曰吳使沮衛獻蟲蠧於荆師荆師將殺之以釁鼔衛曰死者無知則釁無益若有知戰之時臣使鼓不鳴因不殺之孫子曰是故軍攻曰言不相聞故為鼓鐸視不相見故為旌旗故夜戰多金鼔晝戰多旌旗夫金鼔旌旗所以一人之耳目也人既專一則勇者不得獨進怯者不得獨退此衆之法也抱朴子曰軍始發大風甚雨起於後旌旗前指金鼔清鳴必勝黄帝出軍决曰牙旗者將軍之精金鼓者將軍之氣一軍之形候也唐子曰將勿離鼓旗鼔旗者將之耳目也徐幹齊都賦曰王乃乗華玉之路駕駮之驟翠握浮逰金光皎盰戎車雲布武騎星散鉦鼔雷動旌旗虹亂陸雲南征賦曰戎士肅而啓行三軍分而雜遝長角哀吟以命旅金鼓訇隠而砰磕孫恵祭金鼔文曰赫矣皇威用伐不庭金鼓磨旗以昭其聲鞞釋名曰鞞禆也禆助鼔節也鞞𥙷彌也吕氏春秋曰倕作鼔鞞鄭緝之東陽記曰晋隆安中孫恩遣偏師謝攻東陽東陽岑山下民聞嶺上有鼔鞞聲若數萬人咸破潰而山之上鼓鞞亦絶鞀鬻子曰禹之治天下也懸五聲以聼曰語寡人以獄訟者揮鞀音挑吕氏春秋曰倕作鞀又曰武王有誡慎之鞀欲誡者捶鞀鼔鐃説文曰鐃小鉦也周禮曰六鼓四金以金錞和鼔以金鐲節鼓以金鐸通鼓鐲音濁鉦也軍行鳴之以為鼔節鈴説文曰鈴丁也從金令聲左傳曰揚鑾和鈴昭其聲也魏志曰安平太守宅老鈴下作怪為鳥鵲鬭蓋公府閤有綴鈴下有吏者也風俗通曰鈴柄施縣魚魚者狀君臣沈静如魚之入水不可復得聞見耳集異記曰廣陵士甲市得一宅但聞中有捶鈴聲夜輙上後遂見其真形乃是其故人問曰何以常捶鈴答曰我典使君藥物故夜持時耳問曰晝日何以不持時曰白日是死道之夜因别而去鐸三禮圖曰鐸其匡以銅為之木舌為木鐸金舌為金鐸也説文曰鐸大鈴也釋名曰鐸度也號令之限度也王隠晋書曰荀朂逢趙郡商賈於路懸鐸於牛識其聲焉及後為樂朂曰趙之牛鐸則善諧矣於是下郡悉送果有諧者世伏其才明晋書載記曰石勒少時常傭耕毎聞鞞鐸之音歸以告其母母曰作勞耳鳴非不祥也鬻子曰禹之治天下也以五聼令於簨簴曰教寡人以事者振鐸文子曰老子云鳴鐸以聲自毁膏燭以明自消刁斗纂文曰刁斗持時鈴也漢書曰李廣行師不擊刁斗以自衛孟康曰以銅為鐎噐受一斗晝炊飲食夜擊持行夜銘曰刁斗在榮陽庫形如銷即銚也今俗呼銅銚漢名臣奏曰漢興以來深存古義宫殿省闥至五六重周衛刁斗柝説文曰􅈀夜行所擊木也易繫辭曰重門擊柝以待暴客蓋取諸豫周禮曰野廬氏有賓客則令守涂地之人聚􅈀之漢書舊儀曰宫中衞宫城門擊刁斗傳衡衞士周廬擊木柝張衡東京賦曰故函谷擊柝於東西柝守夜擊木也太平御覧卷三百三十八
