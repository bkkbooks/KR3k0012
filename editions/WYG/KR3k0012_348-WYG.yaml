  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_348-1a, image: WYG0896/WYG0896-0123a.png}
body:
  text: 太平御覽卷三百四十八宋李昉等撰兵部七十九弩釋名曰弩怒也有勢怒也其柄曰臂似人臂也鈎弦者曰牙似齒牙也牙外曰郭為牙之規郭也下曰縣刀其形然也合名之曰機言如機之巧也亦言如門户樞機開闔有節也說文曰洛陽名弩曰弲彀弩也彍滿弓也彍音霍古史考曰黄帝作弩廣雅曰鉅黍弓谿子弩太公兵法曰弩之神名逺望尚書曰若虞機張往省括于度則釋尚書帝命驗曰王弩發驚天下秦有枉矢西流枉矢即弩星也兵趙主天下見之而驚西流秦滅也成類出髙將下成類謂秦始皇也呂不韋之妻姙身而秦襄王納之生始皇髙謂丞相趙髙始皇出趙髙下言天生之也賤或為賊史記曰龎涓追孫臏音鬢臏量其行暮當至馬陵馬陵道狹而旁多阻險可伏兵乃大析樹白而書龎涓死此下於是令齊軍善射者萬弩夾道而伏期日暮見火舉而俱發龎涓夜至析木下見白書乃鑚火燭之讀書未畢齊軍萬弩俱發魏軍大亂龎涓自知智窮兵敗乃自剄曰遂成豎子之名又曰髙祖阨於冐頓平城天下歌曰平城之下亦誠苦七日不食不能彀弩彀張也音遘又曰始皇葬驪山令匠作機弩矢有所穿近輙射之又曰蘇秦說韓王曰谿子距黍射六百歩之外許慎曰南方谿子蠻之弩皆善射又曰蘇代遺穰侯書曰以天下攻齊如以千鈞之弩决潰癰也又曰漢王臨廣武數項羽十罪項羽大怒令伏弩射中漢王傷胷乃捫足曰虜中吾指漢書曰李廣傳曰廣為匈奴所撃廣身自以大黄射其禆將服䖍曰大黄肩弩也又曰申屠嘉梁人也以材官蹶張如淳曰材官皆多能脚蝝强弩張之故曰蹷張律有蹷張生從髙帝撃項籍又曰李陵至浚稽與單于相值騎二萬圍陵陵軍居兩山間以大車為營陵引士出營外為陣前行持㦸盾後行持弓弩虜見漢軍少直前就營陵摶戰攻之射弩俱發應弦而倒又曰司馬相如為中都建節卭笮至蜀太守下郊迎縣令負弩矢先驅蜀人榮之又曰霍去病為驃騎將軍過河東河東太守郊迎負弩先驅續漢書曰虞詡為武都太守虜來攻城詡出戰使强弩射之三發而三中虜衆亂謝承後漢云羗攻城也東觀漢記曰耿恭在䟽勒城救兵不至恭食盡窮困士乃煑鎧弩食其筋革恭與士推誠同死生故無貳心後漢書曰宋則子年十嵗與蒼頭共弩射蒼頭弦斷矢激誤中之即死奴叩頭就誅則察而恕之頴川荀爽深以為美時人亦服焉又曰永平中黄巾賊起郡縣皆棄城走陳愍王寵有強弩數千張出軍都亭置軍營於國之都亭也國人素聞王善射不敢反叛故陳獨得完百姓歸之者衆十餘萬人又曰陳愍王寵善弩射十發十中中皆同處華嶠後漢書曰陳愍王寵善射弩其秘法以天覆地載參連為奇又有三微三小三微為經三小為緯經緯相將萬勝之方然要在機牙其射至十發十中魏氏春秋曰諸葛亮損益連弩謂之元戎以鐡為矢矢長八寸一弩十矢俱發吳志曰甘寜字興覇巴郡臨江人也吳書曰寜本南陽人也招合輕薄少年為之渠帥羣聚相隨挾持弓弩負眊帶鈴民聞聲即知是寜也吳録曰松梁山山石開處容數十丈髙竹弩不及其上在澧州晉書曰嵇紹傳云齊王冏被誅初兵交紹奔散赴官有持弩在東閤下者將射之遇有殿中將兵蕭隆見紹姿容長者疑非凡人趣前㧞箭於此得免又曰劉聰將趙染寃殺其長史魯徽染冦北地夢魯徽大怒引弓射之染驚悸而寤旦攻城將射中弩而死又曰孟幹為吳人所獲將徙之臨海幹等志北歸慮東徙轉逺以吳人愛蜀側竹弩言能作之晧留付作部伎幹逃至京都又曰崔鴻薦郗詵自代詵後劾奏鴻曰我舉郗詵而反奏我是挽弩自射晉陽秋曰初髙祖勒兵闕下經曹爽門爽帳下督嚴世引弩將射髙祖孫謙止之曰未可知三注三止髙祖車乃過世說又載又曰馬隆討涼州虜隆募限要引弩四十六鈞弓限四鈞已上隆捶􅋆音摽懸弓弩􅋆側閱試自旦至中得三千五百人唐書曰李希烈既䧟汴州乗勝東侵連䧟陳留㕍丘頓軍寜陵期下宋州㑹食浙西節度韓滉命王栖曜將弩數千夜入陵希烈不之知晨朝弩矢及希烈坐帳希烈驚曰此江淮弩士今入矣遂不敢東希烈夜敗晉諸公讃曰都官從事程偉案狀羊琇音酉所犯狼籍琇即遣家人持銅弩牙首入重法時人皆謂琇有權智世祖詔遷琇官英雄記曰王匡字公節太山人以任俠聞辟大將軍何進府使匡於徐州發強弩五百西詣京師㑹進敗匡還鄉又曰袁紹擊公孫瓉先令麴義領精兵八百強弩千張以為前登又曰袁尚使審配守鄴城曹操進軍攻鄴生獲配謂曰吾近行圍弩何多也配曰猶恨其少日南傳曰南越王尉佗攻安陽安陽王有神人睾音髙通為安陽王治神弩一張一發萬人死三發殺三萬人佗退遣太子始降安陽不知通神人遇無道理通去始有姿容端美安陽王女眉珠恱其貌而通之始與珠入庫盜鋸截神弩亡歸報佗佗出其非意安陽王弩折兵挫浮海奔竄華陽國志曰秦襄王時有一白虎常從郡遊巴蜀傷害千餘人昭王乃重募有能殺虎者賞邑萬家閬中夷廖中能作白的之弩乃登樓射殺白虎昭王嘉之以其夷不欲封刻石盟要曰秦犯夷輸黄龍一雙夷犯秦輸清酒一鍾夷人安之又曰鄧芝征涪陵見𤣥猿抱子在樹上引弩射之中猿母其子為㧞箭以木葉塞瘡芝乃歎息曰嘻吾違物之性其將死矣投弩水中芝後果死㑹稽典録曰鍾離權謂朱育曰大皇帝以中國多騎欲以當之然吳神鋒弩射三里貫洞三四馬騎敢近之乎南越志曰龍川有營澗嘗有銅弩牙流出水皆以銀黄雕鏤取之者祀而後得曾有取此牙逢風雨舉船淪沒父老云越王弩營處也雜記曰東吳朝鴻臚卿張儼議郎張純鎮南將軍朱異三人共詣驃騎將軍朱據據曰三賢屈顧老鄙相聞含甘湏之明懐終賈之才相饑渴乆矣各為賦一物然後乃坐乃各賦所見異賦弩曰南岳之幹鍾山之銅應機命中射隼髙墉吳越春秋曰陳音對越王曰弩生於弓弓生於彈彈生於古之孝子臣聞楚琴氏以弓矢之勢不足以威天下遂乃横弓着臂施機設樞加之以力郭為方城守臣子也教為人君命所起也關為守禦檢去止也錡音竒又音犠為侍從聽人主也臂為道路通所使也弓為將軍主重負也弦為軍師禦戰士也矢為飛客主教使也金為實敵往不止也衛為副使正道里也縹為都尉執左右也鳥不得飛獸不得走弩之所向無不恐者王曰善子之說弩也願復聞正射之道陳音對曰臣聞射之道左足縱右足横左手若附枝右手若抱兒右手發左手不知此正射持弩之道也戰國策曰蘇秦為楚合從說韓王曰天下之良弓勁弩皆自韓出射六百歩之外文子曰狡兎得而獵犬烹髙鳥盡而強弩藏淮南子曰兵如植木弩如羊角慎子曰弩弱而矰髙者乗於風也身不肯而行合者得助於衆也淮南子曰烏號之弓谿子之弩柘南方谿子蠻夷弩皆美材也不能無絃而射越舼渠容切蜀艇共小艇舡大皆一木不能無水而浮又曰鈆不可以為刀銅不可以為弩鐵不可以為弓木不可以為釜又曰萬畢術云牛翁十四可以强弩取牛翁十四枚曲蟮白頸者二十以三尺新布褁之活塗布着之無令人見用之弩令温引之校半力也阮子曰世多善弩而拙於弓弓無法准故任巧由意弩有法准故易有善枹朴子曰秋以弓弩在前太公六韜曰䧟堅陣敗強敵以大黄參連弩大扶月車三十六乗才士強弩矛㦸為翼太公兵法曰神后加四仲者以為明堂宫時天一出遊八極之外行窈冥之中日照其前月照其後當此之時天一自持玉弩執法丞相刻不道者崔寔政論曰永平建初之際去戰未乆官兵勁利有蔡太僕之弩擅名天下風俗通曰汲令應郴一作余鎮父郴夏至日請主簿杜宣賜酒時北壁上懸赤弩照於杯中見其形如蛇宣惡之然不敢不飲因得胷腹病攻治不差郴後知之過宣家問疾之由以為蛇入腹中郴繞㕔事思惟良乆顧懸弩曰此是乎乃扶宣來於故處設酒杯中致復有蛇因謂宣曰此壁上弩影耳非有他怪宣意解病即瘳又曰臧文仲家欲炊而失釡及弓弩自行十洲記曰續弦膠或名連金泥此膠能屬連弓弩斷弦連刀劒斷折之金膠連使人挽製他處即斷此終不復脫天漢二年帝事北海祠恒山西國王使至獻膠四兩吉光毛裘武帝受以付庫不知膠裘二物之妙也以上貢不奇稽留使未遣之帝幸華林苑射虎而弩弦斷使者從駕因上膠一分使口濡以續弦帝驚乃使武士數人對掣終日不斷膠青色如璧玉吉光毛裘黄色蓋神馬之類也裘入水經月不沉入火不焦帝乃重之厚賂使者而遣之趙公王琚音居敎射經曰弩古有黄連百竹八檐雙弓之號今有絞車弩中七百步攻城㧞壘用之擘張弩中三百歩歩戰用之馬弩中二百歩馬戰用之弩張遲臨敵不過三發所以戰陣不便於弩非弩不利於戰而將不明於弩也不可雜於短兵當别為隊攅箭注射則前無立兵對無横陣復以陣中張陣外射畨次輪㢠廻張而復出射而復入則弩不絶聲敵無薄我夫置弩必處其髙爭山奪水守隘塞口破驍䧟堅非弩不尅殺法令曰張弩後左廂丁字立當弩八字立髙楦手音宣屈衫襟左手承橦右手迎上當心看張張有闊狹左䏶在膞還復當心安箭髙舉射敢逺擡弩頭敵近乎身放敵在左右㢠廻身放敵在髙上挈脚放放箭訖唱殺却製拗䗶尾覆弩還着地太白隂經發弩圖篇曰弩者怒也言其聲勢威嚮如怒故以名其弩也穿剛逹堅自近及逺守險塞口破驍䧟堅非弩不尅也後漢李尤弩銘曰粤自近古發意所覩前聖制弓後世造弩機牙發矢執破醜虜克獲雖屢猶不可常忘戰者危極武者傷魏陳琳武軍賦曰弩則幽都筋角恒山檿幹通肌暢骨直矢輕弦當鋒摧决貫遐洞堅陸機七導曰長角三倡武士旗布捺紫間之神機審心中而後射東觀漢記云朱初理馬援表曰羗及殺吏唯狄道為國堅守然民饑餓噉弩煑履援救倒懸之急存幾亡之城蔡邕豳州刺史議曰豳州突騎冀州強弩為天下精兵國家贍核四方有事未嘗不取辦於二州暨艶集雜移曰角弩既調射者又工多獲鶉鳥能無懇傷文選曰機不虛掎又曰虞機發留鵁鶄又曰良將勁弩守要害之處射雉賦曰擎牙低鏃心平望審又曰黄間機張鏃折毫芒俯貫魴鱮仰落雙鶬魚不及竄鳥不及翔又曰彀金機馳鳴鏑剪爵毫落勁翮太平御覽卷三百四十八
