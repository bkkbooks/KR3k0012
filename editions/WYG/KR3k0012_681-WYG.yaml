body:
  text: 太平御覽卷六百八十一宋李昉等撰儀式部二鹵簿班劒棨㦸節鹵簿漢官儀曰漢乘輿大駕儀公卿奉引大僕御大將軍叅乘屬車八十一乘備千乘萬騎法駕公儀公卿不在鹵簿中河南尹執金吾洛陽令奉車都尉侍中參乘屬車三十六乘蔡邕獨斷曰天子出車駕謂之鹵簿有大駕有小駕上所乘曰金根車駕六馬五色安車五色立車各一皆四馬是為五時副車俗人號之曰五帝車非也又曰前驅有九斿雲罕闟㦸皮軒鑾旗車皆大夫載鑾旗者編羽毛列繋幢旁俗人名之曰鷄翹車非也後有金鉦黄鉞黄門皷車又曰古者諸侯貳車九乘秦㓕九國兼其服故大駕屬車八十一乘又曰凢乘輿車皆羽蓋金華瓜黄屋左纛金鑁亡范切方釳繁纓重轂副轄黄屋者蓋以黄為裏也左纛者以􅈊牛尾為之大如斗在最後左騑馬頭上金鑁者馬冠也髙廣各五寸上如玉華形在馬髦前方釳者䥫也廣數寸在髦後有三孔垂翟尾其中繁纓在馬膺前重轂者轂外復有小轂施轄晉公侯贊曰賈后女宣華公主葬皆羽葆鼓吹熊渠佽飛為鹵簿晉書曰帝自鄴還洛河間王顒將張方遣三千騎奉迎將渡河橋方又以新乘陽燧車青蓋三百人為小鹵簿迎帝至卬山下又曰王浚都督幽州和演欲殺浚并其衆演與烏丸單于審登謀之於是浚與期遊薊城南青泉水上薊城内西行有二道演浚各從一道演與浚欲合鹵簿因而圖之値天暴雨兵器霑濕不果而還單于於是與其種人謀曰演圖殺浚事垂克而天卒雨使不得果是天助浚也違天不祥我不可久與演同乃以謀告浚浚密嚴兵夜與單于圍演演持白幡詣浚降浚遂斬之又載記曰石季龍常以女騎一千為鹵簿皆着紫綸巾熟錦袴金銀鏤帶五采織成鞾逰于戲馬觀上安詔書五色在木鳯之口鹿盧廽轉狀若飛翔焉宋書曰孝武舉義兵沈慶之有功初慶之嘗夣引鹵簿入厠中慶之甚惡入厠之鄙時善占夣者為之解曰君必大富貴然未在旦夕問其故答云鹵簿故是富貴容厠中所謂後帝也知君富貴不在今主及中興之功自五校至是而登三事又曰宋劉韞字彦文歴湘雍二州刺史令畫工圖鹵簿羽儀常自披翫以示蔡興宗興宗佯不知指韞所畫形云是誰韞曰是我也其庸如此又曰顔延之子竣既貴重權傾一朝凢所資供延之一無所受器服不改居宅如舊常乘羸牛車逢竣鹵簿即屏住道側又曰文帝鎭江陵王華為西中郎主簿諮議叅軍文帝未親政事悉委司馬張邵華性尚物不欲人在已前邵性豪每往來常引夾轂華出入乘牛車從者不過兩三人以矯之常相逢華佯若不知是邵謂左右曰此鹵簿甚盛必是殿下乃下車立於道側及邵至乃驚齊書曰虞悰選太子右率永明八年大水百官戎服救太廟悰朱衣乘車鹵簿於宣陽門外入行馬内驅入被奏見原又曰陳顯達建武世心懷不安深自貶退車乘朽故導從鹵簿皆用羸小南史曰朱异起宅東陂窮乎美麗晩朝來下酣飲其中每迫曛黄慮臺門將闔乃引其鹵簿自宅至城使捉城門停留管籥又曰吕僧珍為兖州刺史姊適于氏住市西小屋臨路與列肆雜僧珍常導從鹵簿到其宅不以為恥又曰王僧孺為尚書右丞僧孺少孤貧與母鬻紗為業母常携之至市道遇中丞鹵簿驅迫墜溝及是拜日引騶清道悲感不自勝陳書曰長沙王叔堅與始興王叔陵並招聚賔客各爭權寵甚不平每朝㑹鹵簿不肯為先後必分道而趨左右爭道而鬭至死者隋書曰晉氏鹵簿御史軺車行中道班劔晉公卿禮秩曰諸公及開府位從公者給虎賁二十人持班劒晉中興書曰太和元年詔曰㑹稽王其為丞相以給羽葆皷吹班劒六十人徐邈奏議曰東宫班劔議者不處數案公卿故事給虎賁二十人持劔安平獻王加青盖九旒前後皷吹虎賁亦二十人依准此數東宫班劔當不過二十宋書曰大明元年制大臣加班劔者不入宫城門泰豫元年班劔依舊入殿齊書曰張敬兒加開府儀同既得開府又望班劔與人曰我車邊猶少班闌物棨㦸漢書曰韓延夀在東郡殖羽葆皷車功曹引車皆駕駟馬載棨㦸五騎為伍東觀漢記曰王郎遣諫議大夫杜威持節詣軍門上遣棨㦸請延請入軍威稱説實成帝遺體子輿也上曰設使成帝復生天下不可得况詐子輿乎又曰建武元年杜詩為侍御史安集洛陽時將軍蕭廣放從兵士暴横民間詩勅曉不改遂格殺廣還以狀聞上召見賜以棨㦸復使河東誅降逆賊楊異等漢雜事曰奉車都尉竇固征匈奴騎都尉秦彭副令彭别屯彭擅斬軍司馬固奏彭不由督率專賊殺人公卿議皆以為固議是公府掾郎躬以為彭得斬人上曰軍政校尉一統督將何以得專殺躬對曰一統將者謂在部曲也今彭别將軍事至急勢不得關督漢制假棨㦸以當斧鉞議者皆屈上從之呉志曰孫權拜諸葛恪撫鉞將軍領丹陽太守棨㦸武騎三百拜軍令作皷吹導引歸家時年三十二又曰陸遜字伯言少為孫權帳下右部督授棨㦸督㑹稽鄱陽丹陽三郡晉書曰羊祜在軍頗以畋漁廢政嘗欲夜出軍司徐𦙍執棨當營門曰將軍都督萬里安可輕出今日𦙍死此門乃開祜改容謝此後稀出宋書曰王曇首領驍騎將軍元嘉四年車駕出北堂三更竟開廣莫門南臺云應須白獸幡銀字棨不肯開門尚書左丞羊𤣥保奏免御史丞𫝊隆已下曇首曰既無異勅又闕幡棨雖稱上㫖不異單刺其不請白獸幡銀字棨致開門不時由尚書相承之失亦合糾正上特無問更立科條唐書曰龍朔中左衞大將軍范陽郡公張延師東夷都䕶儉弟也與兄太僕卿大師次兄儉同時三品宅中棨㦸齊列時號三㦸張家又曰徐泗節度李愿奏請換㦸有司以官㦸五年一換私家不在易限詔以李晟忠勲特許之又曰吕諲為相有司送㦸至宅諲釋慘服以受之時議其失襄陽記曰李衡字叔平為丹陽太守孫休加威遠將軍授以棨㦸荆州先賢傳曰羅獻字令則以㤗始三年進位冠軍假節増鼓吹棨㦸崔豹古今注曰殳㦸前驅之器也以木為之後世僭偽無復典刑以赤油韜之謂之赤油㦸亦曰棨㦸公王以下通以之前驅王昶謝棨表曰復假臣棨光榮照赫非臣怯弱所當荷受節説文曰節信也象相合之形釋名曰節者號令賞罰之節也後漢書注節所以為信以竹為之長八尺以旄牛尾為眊三重周禮地官下掌節曰掌守邦節而辯其用以輔王命邦節者鎮圭牙璋榖圭也王有命則别其節之用以授使者輔王命執以行為信守邦國者用玉節守都鄙者用角節角用犀角其制未聞凢邦國之使節山國用虎節土國用人節澤國用龍節皆金也以英蕩輔之杜子春云凾器盛此節或曰英蕩畫凾也門關用符節貨賄用璽節道路用旌節皆有期以反命門關司門司關也貨賄者主通貨符節宫中諸詔符也璽節者今之印章也旌節者今使者所擁也凢通達於天下者必有節以傳輔之無節者有幾則不達禮記玉藻曰凢君召以三節二節以走一節以趨節所以明信輔君命也使使召臣急則持二緩則持一𫝊曰宋襄夫人襄王之姉也昭公不禮焉昭公適祖母夫人因戴氏之族華樂皇皆戴族以殺襄公之孫孔叔公孫鍾離及大司馬公子卬皆昭公黨也司馬握節以死故書以官節國之符信也握之以死示不廢命公羊𫝊哀公曰齊景公謂陳乞曰吾欲立舎何如陳乞曰君欲立請立之陽生謂陳乞曰聞子將不立我也陳乞曰夫千乗之主將廢正而立不正必殺正者吾不立子者所以生子也與之玉節而走之節信也析玉與陽生留其半為後當迎之合以為信防稱矯也景公死而舎立陳乞使人迎陽生史記曰袁盎使呉呉王囚之盎解節毛懐之遂歸報呉楚已破漢書曰劉章已殺吕産帝令謁者持節勞章章欲奪節謁者不肯章乃從與載因節信馳斬長樂衞尉吕更始因謁者所持之節用為信還入北軍復報太尉勃勃賀章曰所患獨産今已誅天下定矣又曰呉王反周丘者下邳人亡命於呉酗酒無行王薄不任周丘乃上說王曰臣以無能不得待罪行間臣非敢求有所將也願請王一漢節必有以報王乃與之周丘得節夜馳入下邳至傳舍召令斬之遂召昆弟所善豪吏一夜得三萬人又西域傳曰初公主侍者馮嫽音繚能史書習事常持節為公主使行賞賜於城郭諸國敬信之號曰馮夫人又曰蘇武使匈奴單于乃徙武北海上武仗節牧羊卧起操持節毛盡落又曰戾太子誅江充初漢節純赤以太子持赤節故更為黄毛加上以相别又曰張騫使月氏匈奴得之謂曰吾欲使越漢肯聽我乎留騫十餘嵗予妻有子然持漢節不失又曰諸葛豐字少季為司𨽻校尉刺舉無所避侍中許章以外屬貴幸賔客犯事與章相連豐案劾章欲奏其事適逢許時中私出豐駐車舉節詔章曰下欲收之章馳車去豐追之許因得入宫門自歸奏於是收豐節司𨽻去節自豐始也又南越傳曰遣韓千秋入越越以兵擊千秋等㓕之凾封漢節置塞上好為慢辭謝罪又匈奴傳曰漢使王烏等窺匈奴匈奴法漢使不去節不以墨黥其面不得入穹廬王烏北地人習其俗去其節黥面入穹廬單于愛之又曰王莽簒位皇孫功崇公宗被誅宗姊妨為衛將軍王興夫人祝詛姑殺婢以絶口事發覺事連及司命孔仁妻亦自殺仁見莽免冠謝莽使尚書劾仁乘乾車駕坤馬左蒼龍右白虎前朱雀後𤣥武右仗威節左負威斗號曰赤星非以驕仁乃以尊新室之威命也仁擅免天文冠大不敬有詔勿劾更易新冠其怪如此荀悦漢記曰征和二年長安擾亂言太子反任安受太子節懷二心腰斬續漢書曰鮑永為更始大將將兵安集河東赤眉害更始三輔道絶世祖即位遣諫議大夫儲大伯持節徴永疑為不審收繋大伯封節傳舎壁中遣人持至長安知更始審亡即發喪出降東觀漢記曰光武拜岑彭為刺姦大將軍督察營衆授以常所持節又曰郭丹為更始諫議大夫更始敗諸將軍悉歸上並獲封爵丹無所歸節傳以敝布纒裹節合如擔晝伏夜行詣更始妻子奉還節傳因歸鄉里又曰永平中遣鄭衆北使匈奴衆因上言臣前奉使不為匈奴拜單于恚恨遣兵圍臣今銜命必見凌折臣誠不忍持大漢節對氊裘獨拜如今匈奴遂能服臣將有所損大漢之强上不聽又曰温序字次房遷䕶羗校尉為隗囂别將荀宇所拘刼序素氣力大怒叱宇等曰虜何敢迫脅漢將以節撾殺數人宇曰此義士可賜以劔序受劔衘鬚於口顧左右曰既為賊所迫殺無令鬚汚血遂伏劔而死張璠漢記曰董卓謂袁紹曰劉氏種不足復遺紹勃然曰天下健者豈唯董公横刀長揖徑出懸節於上東門而奔兾州獻帝春秋曰太傅馬日磾假節循撫州郡袁術在夀春借節觀之因奪不還日磾失節憂恚而死魏書曰鎭北將軍劉靜卒朝廷以許允代靜已受節傳出止外舍大將軍與允書曰鎭北雖少事而都典一方念足下震華皷建朱節歴本州此所謂着綉晝行也允心甚悦又曰桓範黄初中為洛陽典農中郎將使持節都督青徐諸軍事治下邳與徐州刺史鄒岐爭屋引節欲斬岐為岐奏不直坐免呉書曰婁圭字子伯初依劉表後歸曹公曹公向荆州表子琮降以節迎曹公諸將皆疑曹公以問子伯子伯曰天下擾攘以貪王命以自重今以節來必至誠公善之晉書曰石苞遷徐州刺史文帝之敗於東關也苞獨全軍而返帝指所持節謂苞曰恨不以此授卿以究大事又曰京師危逼王澄率衆軍將赴國難而飄風折其節柱又曰何無忌自豫章拒盧循軍敗握節受害王隱晉書曰段匹磾降石勒常着朝服持晉節勒亦不問晉中興書曰廣州人背刺史郭訥迎王機遂入廣州訥乃持節出機就訥求節訥曰昔蘇武不失節人以為美今寧可以與賊乎義不可得相與自可遣兵來取之機慙而止又曰王機簒廣州懼王敦來討杜弢在欝林與機結好機勸弢取交州弢至機執節曰節當相與迭持何可獨捉機遂以節與弢後並為陶侃所殺晉永昌起居注曰元帝使司空王導距王敦詔曰以吾征東時節給司空晉令曰使信節皆鳥書之唐書曰頴王璬為劔南節度大使時𤣥宗將幸蜀璬赴藩卒遽不遑受節或説假大槊油囊䝉之璬曰但為真王何用别節漢武内傳曰西王母降殿前有五十大仙童執綵旄之節俗説曰殷伯悌為何無忌叅軍在尋陽與何共樗蒲得何百注何守請求贖决不聽何大怒罵殷曰戅子敢爾取節來殷猶傲然謂何曰朝廷授將軍三千羸兵仗疎節以威蠻獠乃復擬議國士異事何便令百人收殷獄中殷歌嘯自若經一日遂置之太平御覽卷六百八十一
