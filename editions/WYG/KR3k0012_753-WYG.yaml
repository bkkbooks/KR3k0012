  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_753-1a, image: WYG0899/WYG0899-0608a.png}
body:
  text: 太平御覽卷七百五十三宋李昉等撰工藝部十五圍碁投壺圍碁左傳曰甯喜許納衛獻公太叔文子曰今甯子視君不若奕碁奕者舉碁弗定不勝其偶而况置君弗定乎九世之卿族一舉而滅之可哀也哉魏志曰王粲觀人圍碁局壊粲為覆之碁者不信以袍蓋局更以他局為之用相比校不誤一道魏氏春秋曰孔融被誅二子碁而不起左右曰爾父見執不起何也二子曰安有巢毁而卵不破者乎蜀志曰費禕與來敏圍碁于時羽檄交馳人馬擐甲嚴駕已訖而禕畱意對戯色無厭倦敵至遂退呉志曰孫權太子和嘗言當世士人宜修德講學習射御以周世務而但交遊博奕以妨事業非進取之謂也後羣僚侍宴言及博奕以為妨事費日而無益於用勞情損思終無所成非所以進德修業積累功緒也人情猶不能無嬉娯嬉娯之好亦在飲宴琴書射御之間何必博弈然後為歡乃命侍坐者八人各著論以矯之於是中庶子韋曜退而奏論和以示賓客時蔡頴好弈故以諷之吳録曰嚴武字子卿圍碁莫與為比謂之八絶晉書曰王質入山斫木見二童圍碁坐觀之及起斧柯已爛矣又曰賈謐嘗與太子弈碁爭道成都王穎在坐正色曰皇太子國之儲君賈謐何得無禮也又曰苻堅率衆號百萬次乎淮淝京師震恐加謝安征討大都督兄子𤣥入問計安夷然無懼色答已别有㫖既而寂然𤣥不敢復言及令張𤣥重請安遂命駕岀山墅親朋畢集方與𤣥圍碁賭墅安常碁劣於𤣥是日𤣥懼便為敵手而又不勝安顧謂其甥羊曇曰以墅乞汝又曰王導與其子悅弈碁爭道導笑曰相與有瓜葛那得為爾耶又曰祖約為軍諮祭酒約好弈碁王隱謂之曰禹惜寸隂不聞數碁對曰我以忘憂耳鄧粲晉記曰阮籍母死與人圍碁如故對者求止籍不肯畱决賭焉晉中興書曰王恬字敬豫與濟陽江霖俱善弈碁為中興第一又曰陶侃在荆州見佐吏博弈戯具投之於江曰圍碁者堯舜以敎愚子博者商紂所造諸君並懐國器何以為此一本為牧猪奴戯晉起居注曰鎮東司馬顔延之坐圍碁免官沈約宋書曰羊𤣥保為黄門侍郎善弈碁品第三太祖亦好𤣥保數蒙引見與太祖賭郡戯勝得補宣城太守又曰徐羡之沉宻寡言不以憂喜見色頗工弈碁當時以此推之又曰謝𢎞微性無愠色末年與人圍碁西南有碁死旁有人曰南風急或覆舟人悟救之𢎞㣲怒投局於地識者知其暮年齊書曰能碁人瑯琊王抗為第一品呉郡禇思莊㑹稽夏赤松第二品思莊巧於鬭碁宋文帝世與羊𤣥保戯因製局圖還於帝前覆之太祖使思莊與王抗賭弈自食時至日暮一局未竟上倦還省至五更方决抗睡於局後思莊達曉不寐世所以稱思莊品第至髙緣其用思深乆人不能對也又曰武帝好圍碁碁甚拙去格七八道物議共以為第三品與第一品王抗圍碁依品賭戯抗每饒借之曰皇帝飛碁臣抗不能斷終不覺以為信然好之愈篤又曰武陵王曄少年時貧無碁局乃破荻為片從横以為碁局指㸃行勢遂至名品燕書曰羅騰字叔龍工圍碁究盡其妙獨步當時俄而北平樂抄少携出與齊焉後魏書曰甄琛舉秀才入都積歲頗以弈碁棄日至乃通夜不止有蒼頭者常令秉燭或時睡即大加責杖如此非一奴後不勝楚痛乃白琛曰郎君辭父母仕宦京師若為讀書執燭不敢暫懈乃以圍碁日夜不息豈是向京師之意而肆加杖罰不亦非理乎琛憬然慙感遂從許叡李彪假書硏習聞見益優陳書曰梁武帝詔校定碁品到溉朱異已下並集陸瓊時年八歲客前覆局由是京師號曰神童唐書曰順宗朝罷翰林隂陽星卜醫相射博弈碁諸待詔三十二人初王叔文以碁待詔既用事惡其與已儕類相亂故罷之江表傳曰吕範討山越還白事于孫䇿從容獨與圍碁因論軍旅西京雜記曰杜夫子善弈碁為天下第一或譏其費日夫子曰精其理者足以大禆聖敎又曰戚夫人侍兒賈佩蘭后出為扶風人叚儒妻說在宫内時常以八月四日出雕房北户竹下圍碁勝者終年有福負者終年疹病取絲縷就北辰星求長命乃免述異記曰朱道珍常為孱陵令南陽劉廓為荆州叅軍每與圍碁日夜相就局子畧無暫輟道珍以宋元徽三年六月二十六日亡至九月廓坐齋中忽見一人以書授廓云朱孱陵書廓開書看是道珍手跡云每思碁聚非意所致闊方有來縁想能近領廓讀書畢失信所在失其書信寢疾尋亡孟子曰弈秋通國之善奕者也使奕秋誨二人弈其一人專心致志惟奕秋之為聽一人雖聽之一心以為有鴻鵠將至思援弓繳而射之雖與之俱學弗若之矣抱朴子曰葛洪體鈍性駑素寡玩好見人博戯曾不目盻至今不知碁局幾道又曰善為碁者世謂之碁聖故嚴子卿馬綏明有碁聖之名也淮南子曰行一碁不足以見智彈一絃不足以見悲尹文子曰以智力求者喻如弈碁進退取與攻刼收放在我者也陳畱志曰阮簡字茂宏為開封令縣有刼賊外白之甚數簡方圍碁常笑吏云刼急簡曰局上刼亦甚急其髙率如此揚子法言曰圍碁擊刼反目眩形弈進自然也博物志曰堯造圍碁丹朱善之新語曰世言圍碁或言兵法之􅁼上者張置疎遠多得道而勝中者務相遮絶争便求利下者守邉隅趨方罫猶薛公之言黥布反也上計取呉楚廣地中計塞成臯􅃒要争利下計據長江以臨越守邉隅趨方罫者也俗說曰羊𤣥保作吏部郎被召見後有傳詔來始扣門其兒靈孫年十許歲見傳詔語其父云兒知之去當有圍碁耳語林曰王中郎以圍碁為坐隐亦以圍碁為手談又曰王武子與武帝圍碁孫皓在側武子問孫歸命何以好剥人面皮皓曰見無禮于君者則剥之武子乃舉碁局下又曰豫章太守顧劭是丞相雍之子在郡卒時雍方盛集僚屬圍碁外信至而無見書雖神意不變而知子有故賔客既散放歎曰已無延州之遺累寧有喪明之責耶于是豁情散哀顔色自若方言曰圍碁者自闗東齊魯之間謂之弈班固弈㫖曰北方之人謂碁為弈宏而說之舉其大略義亦同矣局必方正象地則也道必正直體明德也碁有黒白隂陽分也駢羅列布效天文也四象既陳行之在人蓋王政也法則臧否為人由己道之正也夢書曰夢圍碁者欲鬭也魏王粲圍碁賦序曰清寧體道稽謨𤣥神圍碁是也魏應瑒弈勢曰蓋碁弈之制所由來尚矣絡繹雨集魚鱗鴈峙奮維闡翼固衛邊鄙冦動北壘備在南尾晉劉恢圍碁賦序曰司空從事中郎庾仲初性好圍碁終不達碁㫖言文則觸類而生對局則𡨕然而窮何所解如彼之易所礙如此之難哉投壺禮記曰投壺之禮主人奉矢司射奉中使人執壺主人請曰某有枉矢哨壺請以樂賔賔曰子有旨酒嘉肴既受賜矣又重以樂敢辭主人曰枉矢哨壺不足辭也敢固以請賔曰某既賜矣又重以樂敢固辭主人曰枉矢哨壺不足辭也敢固以請賔曰某固辭不得命敢不敬從賔再拜受主人般還曰辟主人阼階上拜送賔般還曰辟已拜受矢進即兩楹間退反位揖賔就筵司射進度壺間以二矢半反位設中東面執八筭興請賔曰順投為入比投不釋勝飲不勝者正爵既行請為勝者立馬一馬從二馬三馬既立請慶多馬請主人亦如之禮記曰壺頸修七寸腹修五寸口徑二寸半容斗五升壺中實小豆焉為其矢之躍而出也壺去席二矢半矢以柘若棘毋去其皮左傳曰晉侯與齊宴中行穆子相投壺晉侯先穆子曰有酒如淮有肉如池寡君中此為諸侯師中之齊侯舉矢曰有酒如澠有肉如陵寡人中此與君代興亦中之東觀漢記曰蔡遵夢范叔上疏曰遵為將軍取土皆用術對酒設樂必雅歌投壺魏畧曰邯鄲惇字元淑作投壺賦千餘言奏之文帝以為工賜帛十疋又曰游楚好投壺自娯晉書曰石崇有妓善投壺隔屏風投之王弼别傳曰弼性和理樂逰宴解音律善投壺崔宴傳曰投壺者皆以多筭飲少筭西京雜記曰武帝時郭舎人善投壺以竹為矢不用棘古之投壺取中而不求還故實小豆惡其矢躍而出也郭舎人則激矢令還一矢百餘反謂之為驍言如博之掔梟於掌中為驍傑每為武帝投壺輙賜金帛獻帝春秋曰袁紹聞魏郡兵反與黑山賊等數萬人共覆鄴引滿投壺言笑容止自若晉陽秋曰王胡之善於投壺言手熟閉目神異經曰東荒山中有大石室東王公居焉與一玉女投壺說有入不出者天為之笑藝經曰投壺法十二籌以象十二月之數投壺曰謂之投壺者取名蓨藪漸而轉易鑄金代焉逮之于後人事生矣壺底去一尺其下荀以龍𤣥運之以􅀈蝦燕尾矢十二長二尺八寸古者投壺擊皷為節帶劒十二倚十八狼壺二十劒驕七十三百六十籌得一馬三馬成魏王粲賦曰夫注心銳志自求諸身投壺是也晉傅𤣥投壺賦序曰投壺者所以矯懈而正心也晉李尤壺籌銘曰投壺籌禮揖叙先後通風月數分為王部太平御覽卷七百五十三
