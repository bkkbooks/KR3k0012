body:
  text: 太平御覽卷八百一十九宋李昉等撰布帛部六綿絮牽離紈組納綸縞絺綌綿説文曰纊絮縕也禮記玉藻曰纊為繭縕為袍衣冇著之異名也又喪大記曰屬纊以俟絶氣纊為今之新綿易動搖置口鼻之上以為候又内則曰婦事舅姑左佩紛帨右佩箴管綿纊施鞶袠左傳宣下曰楚子伐蕭蕭潰申公巫臣曰師人多寒王巡三軍拊而勉之三軍之士皆如挾纊纊綿也言悦以忘寒也謝承後漢書曰徐稚不就諸公之辟及有喪者萬里赴弔常以家預炙雞一隻以一兩綿絮漬酒中曝乾至門以綿絮置水中候有酒氣以雞置前祭畢便去范曄後漢書曰張奐遺命曰吾前後仕進十腰銀艾不能和光同塵為讒邪所忌通塞命也始終常也但地下冥冥長夜無曉期而復纒以綿纊絆以釘密為不喜耳今幸前有穿穴朝殞夕下横屍露床幅巾而已晉陽秋曰有司奏依舊調房子睢陽綿武帝不許宋書曰郭原平孝行既著髙陽許瑤之罷建安郡還家以綿一觔遺之不受瑶之乃自徃曰今過寒而建安綿好以此奉尊上下耳原平乃拜而受之也齊書曰阮孝緒年十六父喪不服綿纊雖蔬食有味亦吐之英雄記曰吕布為曹公所攻甚急乃求救於袁術術先求布女布恐術為女不至故不遣救也即以綿纒女身縳着馬上夜自送女出與術太祖守兵相觸格射不得過復還城語林曰謝萬就人乞裘云畏寒答曰君妄語正欲以為豪具耳若畏寒無服勝綿者以三十觔綿與謝陸氏異林曰鍾繇嘗數月不朝或問其故云常有好婦來美麗非凡問者曰必是鬼物何不殺之婦人后往不即前止户外繇問何以曰公有相殺意繇曰無此勤勤呼之乃入繇有不忍心然猶斬之婦人即出以新綿拭血竟去明日使人尋跡至大􅊘中中有好婦人形體如生人着白練丹繡兩襠傷一脚以兩襠中綿拭血酈善長水經注曰房子城中出白土細滑如膏可用濯綿霜鮮雪曜異於常綿世俗言房子之纊也抑亦類蜀郡之錦得江津矣故嵗貢其綿以充御用絮史記曰人有上言吿周勃反下廷尉薄太后以為無反事文帝朝太后以㡌絮提文帝曰絳侯綰皇帝璽將兵北軍此時不反今居一小縣顧欲反耶帝乃出之又貨殖傳曰絮千乗家漢書曰帝以公主為老上單于閼氏使宦者燕人中行說傅公主說既至因降單于單于愛幸之其得漢之繒絮以馳棘草中衣袴皆裂弊以示不如旃裘之堅善也司馬彪續漢書曰光武建武二年野􅅙成繭民收其絮漢書儀曰皇后親􅅙獻繭凡􅅙絲絮織室作祭服其皇帝得以作縷絳衣皇后間以作巾絮而已魏志曰曹公定鄴臨祠袁紹墓哭之流涕慰勞紹妻還其家人寳物賜雜繒絮廩食之吳書曰顧悌字子通父亡孫權作布衣一襲皆摩絮着之强令悌釋服晉中興書曰王敦害周顗籍其家政見敝簏數枚中有故絮也晉書曰佛圖澄腹傍有孔常以絮塞之每夜讀書則拔絮孔中光照於一室宋書曰顔峻滿父憂起為丹陽尹遣中書舍人戴明寳抱峻登車載之郡舍賜以布服一襲絮以綵綸遣主衣就衣諸體又曰阮長之元嘉十一年除臨海太守在郡常擁敗絮齊書曰江革補國子生王融謝朓嘗行還過候革時大寒雪見革弊絮单席而耽學不倦嗟嘆久之又曰卞彬蚤虱賦序曰余之多病起居甚疎索寝敗絮不能自釋淮南子曰藡苖類絮而不可以為絮藡苖藿秀也古今注曰元帝永光四年東萊郡東牟山有野蠶為蠒蠒生蛾蛾生卵卵着石收得萬餘石民以為絲絮五年長安雨絮垣屋上皆白民衣之管寜别傳曰管寧性至孝恒布裳貉裘惟祠着單衣絮巾也吳越春秋曰吳王將死曰吾因不用子胥言以至於此死者無知則已死者有知何面目見子胥也遂蒙絮覆面而自刎博物志曰蜀人以絮巾為㡌絮裴淵廣州記曰蠻夷不蠶採木綿為絮盧毓兾州論曰房子好綿地産不為無珍也皇甫規與馬融書曰與被絮一雙以通徹心陸雲與兄機書曰一日案行視曹公器物見拭目黄絮有垢黒目淚所沾汚孝子傳曰閔子騫㓜時為後母所忤冬月以蘆花衣之以代絮其父後知之欲出後母子騫跪曰母在一子单母去三子寒父遂止世說曰王文度在西州與林法師講韓孫諸人並在坐林公理每欲小屈孫興公曰法師今日似着弊絮在荆棘中觸地掛間牽離說文曰絓蠒滓絓頭也一曰牽縭釋名曰煑繭曰莫莫幙也貧者着衣可以幕絮也或謂之牽離煑熟爛牽引使離散如綿也王隠晉書曰洛中歌何德真三人共披一幡溪黎奈何左校令成䕫以為德真將死也紈釋名曰紈煥也細澤有光煥然也漢書曰齊俗作氷紈容如氷也又曰齊韓延壽衣黄紈方領又曰白縠表薄紈之裏天子之服也東觀漢記曰楚王英奉送黄縑三十五疋白紈五疋於蜀楚相以聞詔書還蜀縑紈以助伊蒲塞桑門之盛饌漢舊儀曰乗輿冠髙山冠飛羽之纓幘赤丹紈裏范子計然曰白紈素出齊魯王子年拾遺記曰瀛洲有金巒之觀中有寳几覆以雲紈之素繁欽定情詩曰何以合歡欣紈素為衫裙組說文曰組綬屬其小者以為纓也禮記檀弓上曰有子葢既祥而絲履組纓禮記玉藻曰𤣥冠朱組纓天子之冠也𤣥冠丹組纓諸侯之齊冠也又曰弟子縞帶并紐約用組又曰天子佩白玉而𤣥組綬公侯佩山𤣥玉而朱組綬大夫佩水蒼玉而純組綬世子佩瑜玉而綦組綬士佩瓀玫而緼組綬孔子佩象環五寸而綦組綬又少儀曰國家靡弊則車不雕幾甲不組縢左傳襄三年楚子重伐吳為簡之師克鳩慈至於恒山使鄧廖率組甲三百被練三千史記曰秦王子嬰係頸以組降沛公軹道旁漢書曰錦繡纂組害女工穆天子𫝊曰天子見西王母好獻錦組百純又曰盛姬之喪族姓贈用茵組墨子曰昔楚莊王鮮冠組纓絳衣博衮以治其國韓子曰吳起示其妻以組曰子為我織組令如是組妻織組果善吳起曰非戒也使之衣而歸妻兄請之起曰起家無虛言吕氏春秋曰邾之為甲常以帛公息忌謂邾君曰凡甲所以為固者滿竅也今竅滿也而任力者半組則不然竅滿則盡任力矣邾君以為然曰將何所得組公息忌對曰上用之則民為之矣邾君曰善下令令官為甲必組公息忌之說行也令其家皆為組人有傷之者曰公息忌之所以欲組者由其家多為組也邾君不恱於是乎止官無以組或尤邾君曰為甲以組而便公息忌雖多為組何損以組不便公息忌雖無為組亦何益為組與不為組不足以累公息忌之説用組之心不可不察劉梁七舉曰華組之組從風紛紜應璩報燕中尉樊彦皇書曰登輿北踐燕路方當化銀龜以為黄變青組以為紫又報平陸長賁瑋伯書曰從此辭矣何敢復飛蝉於惠文鳴玉於縞組哉納魏武令曰吾衣皆十嵗也嵗嵗解浣補納之耳魏志曰太祖幃帳壞即補納汲衣子妻李氏與夫書并緻納一端宋書曰徐逵之尚㑹稽長公主初武帝微時貧過甚常自新州伐荻有納布衣襖等是皆敬皇后手自作武帝既貴以此衣付主曰後世若有驕奢不節者可以此衣示之主子湛之為大將軍彭城王義康所愛與劉湛等頗相附及劉湛之得罪詞連主子文帝大怒將致大辟湛之憂懼無計以吿公主公主即日入宫及見文帝號哭下床不復行臣妾之禮以錦囊盛武帝納衣擲地以示上曰汝家本貧賤此是我母為汝父作納衣今日有一頓飽飯便欲殘害我兒子上亦號哭湛之由此得全南史曰齊張欣泰為直閣歩兵校尉羽林監欣泰通渉雅俗交結多是名素下直輙着鹿皮冠納衣錫杖挾素琴有以啟武帝帝曰將家兒何作此舉止又曰沙門寳志在建康寳亮欲以納被遺之未及有言寳志忽來牽被而去陳書曰大軍侵魏造陜城魏兵大合輕騎挑戰侯安都瞋目横矛单騎突陣四向奮擊左右皆披靡殺不可勝數於是衆並鼓噪俱前魏多縱突騎衆軍患之安都怒甚乃脫兠鍪解所帶鎧惟着絳納兩襠衫馬亦去具装馳入賊陣猛氣咆勃所向無當其鋒者莫不應刃而倒綸釋名曰綸倫也作之有倫理也説文曰綸糾青絲綬也禮記曰王言如絲其出如綸王言如綸其出如綍後漢書仲長統書曰井田之變豪人貨殖館舍布於州郡田畆連於方國身無半通青綸之命而切三辰龍章之服續漢書輿服志曰百石青紺綸一采宛轉繆織長丈二尺東觀漢記曰建初二年詔齊相其上勿復送綸絮鄭元注禮記曰綸今制有秩嗇夫所佩也鄴中記曰石虎皇后出女騎一千冬月皆着紫綸巾齊書曰徐龍駒常住含章殿着黄綸帽被貂裘南面向案代帝書勑世説曰謝萬詣簡文無衣幘可前簡文曰但前不湏衣幘即呼使入萬着白綸布而前既見共談移日孟達與諸葛亮書曰黄白綸㡌一次以示微言縞尚書禹貢曰海岱及淮惟徐州厥篚𤣥纎縞毛詩緇衣曰出其東門有女如雲縞衣綦巾聊樂我云禮記王制曰殷人冔而祭縞衣而養老又玉藻曰朝服之縞也自季康子始也左傳襄六年曰季札聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉史記曰新城三老董公説漢王以義帝死故漢王遂發喪臨三日吿諸侯曰天下共立義帝北面事之今項羽攻殺大逆無道寡人親發喪諸侯皆縞素歸漢韓子曰魯人身善織屨欲履之也而越人跣縞欲冠之也而越人被髮欲無窮可得乎淮南子曰鈞之縞也一端以為冠一端以為絑冠則戴之絑則履之司馬相如子虚賦曰被阿緆緰紵縞阿細繒緆細練也曹洪與魏文帝書云我軍入漢中若駭鯨之决細網奔兕之觸魯縞未足以喻其易也絺綌説文曰綌粗葛也絺細葛也縐絺之細者也尚書禹貢曰海岱惟青州厥貢鹽絺周禮地官下曰掌葛以時徵絺綌之材於山也禮記月令曰孟夏之月天子始絺又曲禮上曰為天子削𤓰者副之巾以絺為國君者華之巾以綌又曲禮下曰袗絺綌不入公門浴用二巾上絺下綌也又禮檀弓縣子曰綌衰繐裳非古也非時尚輕凉慢禮毛詩關雎葛覃曰葛之覃兮施于中谷維葉莫莫是刈是濩為絺為綌服之無斁又緑衣曰絺兮綌兮凄其以風我思古人實獲我心又君子偕老曰蒙彼縐絺是紲絆也論語鄉黨曰當暑袗絺綌必表而出之漢書曰江都王建謀反與閩越通越遺建􅀢葛東觀漢記曰耿純字伯山率宗族賔客二千人皆繒䄡絺巾迎上於費上大悦又曰馬嚴為陳留太守嚴病遣功曹吏李龔奉章詣闕上親召見龔問疾病形狀以黄金葛絺賜嚴又曰黄香為郎召詣安福殿賜錢三萬黄白葛各二端魏武封魏王紹曰今以君為魏王白絳皂黄白各二疋越葛一端往欽哉吳歴曰孫䇿送華歆還洛并賜越布香葛時多盜賊歆度牛渚悉封還諸物江表傳曰魏文帝遣使於吳求細葛君臣以為非禮欲不與孫權勑付使梁書曰任昉卒後子西華冬月著葛披練裙道逢平原劉孝標泫然矜之謂曰我當為卿作計後周書曰賀蘭祥梁雍州刺史岳陽王蕭詧欽其節儉乃以竹屏風絺綌之屬及經史贈之祥難違其意取而付諸所司太祖後聞之並以賜祥隋書曰袁充少警悟年十餘嵗其父黨至門時冬初充尚衣葛巾客戲充曰袁郎子絺兮綌兮凄其以風充應聲答曰惟絺與綌服之無斁以是大見嗟賞穆天子傳曰天子筮獵革澤其卦遇訟逄公占之賜之駿馬十六絺綌三十篋帝王世記曰堯見舜於二宫設饗禮迭為賔主南面而問政然後賜以絺衣琴瑟築宫室封之於虞韓詩外𫝊曰孔子南遊楚至阿谷有處女珮璜而浣孔子曰彼婦人可與言矣袖絺綌五兩以授子貢曰善為之辭以觀其辭子貢曰吾北鄙之人也將南適楚於此有絺綌五兩吾不敢置之水浦婦人對曰行客之行嗟然永久分其資財棄之野鄙吾年甚少何敢取之子不早去竊有狂夫守之者矣說苑曰綿綿之蔓在於曠野良工得之以為絺綌良工不得枯死於野服䖍通俗文曰細葛謂之㲔翅稽康高士傳曰善巻曰予立宇宙之中冬衣皮毛夏服綌葛劉禎𤓰賦曰承之雕盤羃以纎絺夏侯孝君大暑賦曰珠汗沾夫絺葛左思吳都賦曰焦葛升越弱於羅紈庾翼與燕王書曰令致細絺十端竹絺二端王褒聖主得賢臣頌曰服絺綌之凉者不苦盛暑之欝悒段氏蜀記曰卭州鎮南蕉葛上者一疋直十千諸葛恢表曰天恩罔極特賜纎絺細竹顔測集大司馬江夏王賜絹葛啓曰氷紈風綌事膺盛服太平御覽巻八百一十九
