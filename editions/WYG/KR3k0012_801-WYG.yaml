front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_801-1a, image: WYG0900/WYG0900-0113a.png}
body:
  text: 太平御覽卷八百一宋李昉等撰四夷部二十二北狄三託䟦氏稽胡慕容氏宇文莫槐髙車烏洛侯庫莫奚軻比能託䟦氏宋書曰託䟦氏其先漢將李陵之後也陵降匈奴單于妻之以女字託䟦其後因氏焉世豪強分建種落也又曰索頭虜姓託䟦匈奴有數百千種各立名號索頭亦其一也晉初索頭種有部落數萬家在雲中惠帝末并州刺史司馬騰扵晉陽為匈奴所圍索頭虜單于猗駞遣軍助騰懷帝永嘉三年駞弟盧率部落自雲中入鴈門就并州刺史劉琨求樓煩等五縣琨不能制且欲倚盧爲援乃上言盧兄駞有救騰之功宜請移五縣民扵新興以其地處之愍帝進盧爲代王盧孫什翼犍據隂山衆數十萬犍死扵開字渉圭即後魏道武皇帝又曰虜俗以四月祠火六月末率大衆至隂山謂之却霜隂山去平城六百里深逺饒樹木霜雪未嘗釋盖欲以暖氣禦寒也後魏書曰黃帝子昌意少子受封北土國有大鮮卑山因以爲號其後世為君長統幽都之北黃帝以土徳王北俗謂土爲託謂后爲䟦故以爲氏其裔始均仕堯世逐女魃扵弱水北民頼勲帝舜嘉之命爲田祖歴三代至秦漢獯鬻獫狁山戎匈奴之屬累代殘暴作害中州而始均之裔不交南夏是以載籍無聞焉積六七十世裔孫即成皇帝諱毛也毛統國三十六大姓九十九威振北方莫不率服至力微立即成元皇帝也諸部大人悉服控弦之士二十餘萬遷扵定襄之盛樂也又曰禄官立始祖子也分國爲三部一居上谷北濡源之西東接宇文部自統之一居代郡之叅谷陂北兄子猗駞統之一定襄之盛樂故城使猗駞弟猗盧統之稽胡後周書曰稽胡一曰歩部稽盖匈奴别種劉元海五部之苖裔也或云山戎赤狄之後離石以西安足以東方七八百里居山谷間種落繁熾其俗婦人多貫蜃具以爲耳頸餙孝昌中有劉蠡升者居雲陽谷分遣部衆抄掠居汾晉之間略無寜歳神武遷鄴後始宻圖之僞許以女妻蠡升之子蠡升信之遂遣其子詣鄴齊神武厚爲之禮緩以婚期蠡升既恃和親不爲之備大統元年三月齊神武潜師襲之又曰保定中離石生胡數冦汾北勲州刺史韋孝寛扵險要築城以遏其路又曰建徳五年髙祖敗齊師扵晉州乘勝逐北齊人所棄甲伏稽胡乘間竊出盗而有之慕容氏晉書載記曰慕容氏其先有熊氏之苖裔世居北夷邑扵紫䝉之野號曰東胡其後與匈奴並盛控弦之士二十餘萬風俗官號與匈奴略同秦漢之際爲匈奴所敗分保鮮卑山因以爲號通典慕容氏亦東胡之後别部鮮卑也魏初渠師有莫䕶䟦率諸部人居遼西後從司馬宣王討公孫淵有功拜率義王至孫渉歸魏封爲鮮卑單于涉歸有二子長曰吐谷渾西遷河湟之間次曰廆有命代才畧晉太康十年又遷干河之青山也又曰慕容廆字弈洛壊昌黎棘城鮮卑人也曾祖莫護跋初率諸部人入居遼西從宣帝伐公孫氏有功拜率義王始建國扵棘城之北時燕代多冠歩莫䕶䟦見而好之乃歛髪襲冠諸部因呼之爲歩揺後音訛遂爲慕容焉或云慕二儀之徳繼三光之容遂以慕容為氏祖延左賢王父渉歸以全桞城之功進拜鮮卑單于遷扵遼東北扵是漸慕諸夏之風矣又曰安北將軍張華有知人之鑒慕容廆童冠時往謁之華謂曰君至長必為命世之器因以所服簮幘遺廆又曰慕容廆謀扵衆曰吾先公以來世奉中國且華夷理殊強弱固别豈宜與晉國競乎何爲不和以害吾百姓耶乃遣使來降帝嘉之拜爲鮮卑都督廆致敬扵東夷府巾衣詣門抗士大夫之禮何龕嚴兵引見廆乃改服戎衣而入人問其故廆曰主人不以禮賔復何爲哉龕聞而慙之廆以大棘城即帝顓頊之墟元康四年乃移居之教以農桑法制同扵上國永嘉初廆自稱鮮卑大單于建武初元帝承制拜廆假節散騎常侍都督遼左雜夷流人諸軍事龍驤將軍大單于昌黎公廆刑政修明流亡者多歸之廆乃立郡以統流人冀州人為冀陽郡豫州人爲成周郡青州人爲營邱郡并州人爲唐國郡廆卒皝雄毅多權略日强盛遂自稱燕王後遷都扵桞城儁暐即其子孫宇文莫槐後漢書曰宇文莫槐出扵遼東塞外其先南單于之逺屬莫槐之人皆剪髮而留其頂上以爲餙婦人被長􅃭及足而無裳焉秋収烏頭為毒藥以射禽獸北史曰莫廆部衆彊盛自稱單于塞外諸部咸畏憚之莫廆即莫槐之姪孫莫槐父子世雄漠北又先得玊璽三鈕自言爲天所相每自誇大莫槐之孫曰乞得龜爲慕容廆破先是海出大龜枯死扵平郭至是乞得龜敗也髙車北史曰髙車盖古赤狄之種也初因號為狄歴北方以爲𠡠勒諸夏以爲髙車丁零其語略與匈奴同而時有小異或云其先匈奴甥也其種有狄氏表紇氏斛律氏解批氏䕶骨氏異竒斤氏其人好引聲長歌有似狼嘷本無都統大帥當種各有君長爲性麄猛黨類同心至扵冦難翕然相依鬬無行陣其俗婚姻用牛馬納聘以多爲榮俗無榖不作酒迎婦之日男女相將持馬酪熟肉節解主人延賔亦無行伍穹廬前藂坐飲宴終日又曰髙車俗不潔净喜致震霆每震則呌呼射天而集之移去至來嵗秋馬肥復相率集扵震所埋羖羊然火㧞刀女巫祝説如中國祓除而羣隊駞馬旋繞百匝乃止人持一束桞枝回堅之以乳酪灌焉又曰髙車婦人以皮裹羊骸戴之首上縈屈髮髾而綴之髾所交切有似軒冕其死亡𦵏送掘地作坑坐尸扵中張臂引弓佩刀挾矟無異扵生而露坑不掩走馬繞旋多者數百匝男女無大小皆集會之又曰髙車與蠕蠕同唯車輪髙大輻數至多則徙扵鹿渾海西北百餘里部落强大常與蠕蠕爲敵後魏道武帝渡弱洛水西行至鹿渾海襲破之復討其餘種扵狼山又曰道武帝自牛川南引大校獵以髙車爲圍騎徒遮列七百餘里聚雜獸扵其中因駈至平城即以髙車衆起鹿苑南因臺隂北距長城東包白登之西山又曰髙車族有十二姓一曰泣伏利氏二曰吐盧氏三曰乙旃氏四曰大連氏五曰窟賀氏六曰逹薄氏七曰阿崙氏八曰莫允氏九曰俟分氏十曰副伏羅氏十一曰乞袁氏十二曰右叔沛氏又曰髙車昧利不顧後患又曰髙車斛律部帥倍侯利為蠕蠕掩襲遂奔魏賜爵孟都公倍侯利質直勇健過人北方之人畏之嬰兒啼者語曰倍侯利來便止處女歌謡云求良夫當如倍侯利其衆服如此善用五十蓍筮吉凶每中故得親幸倍侯利卒道武悼惜𦵏以魏禮謚曰忠壯王又曰太和十四年阿伏至羅遣使至京以二箭奉貢云蠕蠕爲天子賊臣諌之不聽遂叛来此賜繡袴褶一具雜綵百疋又曰髙車部衆分散或來奔附或投蠕蠕詔遣宣尉將軍羽林監孟威撫納降人又曰髙車遣使貢金方一銀方一金杖二馬七疋駞十頭又曰髙車與蠕蠕戰扵蒲類海北割蠕蠕之髮送扵羽林監孟威又曰髙車遣使獻馬五匹金銀貂皮及諸方物詔賜樂器一部樂工八十人赤紬千疋雜綵六十疋又曰髙車王伊匐遣使朝貢因乞朱畫歩挽一乘并幔褥鞦䩛一副繖扇各一枚青曲葢五枚赤􅃮扇五枚皷角十枚詔給之烏洛侯北史曰烏洛侯國在地豆干北去代都四千五百餘里其地下濕多霧雨而寒國人尚勇不爲奸竊故慢藏野積而無冦盗好射獵樂有箜篌木槽革面施九弦太武真君四年來朝稱其國西北有魏先帝舊墟石室南北九十歩東西四十歩髙七十尺室有神靈人多祈請太武遣中書侍郎敞告祭刋祝文扵石室之壁而還唐書曰烏洛渾國盖後魏之烏洛侯也今亦謂之烏羅䕶其國在京師東北六千三百里東與靺羯西與突厥南與契丹北與烏丸接風俗與靺羯同真觀六年其君長遣使獻貂皮厙莫奚後漢書曰厙莫奚國之先東部宇文别種也初為慕容元貞所破邑落竄匿扵松漠之間後周書曰厙莫奚鮮卑别種也先為慕容晃所破竄扵松漠之間後種漸多分爲五部一曰辱紇主二曰莫賀弗三曰契箇四曰木昆五曰室得每部置俟斤一人有阿會氏者最爲豪帥五部皆受其節度北史曰登國三年道武親討厙莫奚至弱水南大破之又曰武成之世庫莫奚嵗至名馬文皮太和四年輙入塞内辭以畏豆地干抄掠詔書切責之軻比能魏志曰軻比能本小種鮮卑以勇徤斷法平端不貪財物衆推以爲大人部落近塞自袁紹據河北中國人多叛歸之教作兵器鎧楯頗學文字故其勒御部衆擬扵中國出入弋獵建立旄麾皷節爲進退又曰建安中烏桓反軻比能動爲冦害太祖以鄢陵侯彰為驍騎將軍北征大破之又曰延康初軻比能遣使貢馬文帝立比能為附義王又曰黃初二年軻北能出諸魏人在鮮卑五百餘家還居代郡黃初三年軻比能卒部落與代郡烏丸等三十餘口交市遣魏人千餘家居上谷後與東部鮮卑大人素利及歩度根三部争鬬烏桓校尉田豫和之使不得相侵五年軻比能復擊鮮卑豫帥輕騎徑進椅其後比能使别小帥璅奴拒豫進討破之由是懷貳乃與輔國將軍鮮卑輔書曰夷狄不識文字故校尉閻柔保我扵天子我與烏丸為讎往年攻擊之而田校尉助素利烏丸畨我臨陣使璅奴往聞使君來即引軍退歩度根數數抄盗又殺我弟而誣我以抄盗我夷狄雖不知禮義兄弟子孫受天子印綬牛馬尚知美水草况我有人心耶將軍當保明我扵天子輔得書聞帝帝復使豫招納安慰軻比能衆遂强盛控弦十餘萬騎每抄掠得財物均平分付一决目前終無所私故能得衆死力餘部大人皆憚之太平御覽卷八百一
