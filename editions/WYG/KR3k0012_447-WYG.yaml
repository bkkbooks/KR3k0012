body:
  text: 太平御覽卷四百四十七宋李昉等撰人事部八十八品藻下孔叢子曰子髙謂魏王曰臣入魏見君二計臣張叔謀有餘范威智不逮然其功一也王曰叔也有餘威也不逮何得同乎荅曰駑驥同轅伯樂爲之咨嗟玊石相揉和氏爲之嘆息故賢愚共貫則能士匿謀真僞相錯則智士結舌雖有餘猶不逮也又曰東里閭空腹而好自賢欲自親於子順子順弗下曰夫東里閭外質頑拙有似䟱直内懷虛妙非丈夫之節若其度骸稱膚面目鬢眉實美於人也聖人論士不以此爲貴者無益於德故也又曰宫他見子順曰他困於貧賤欲自託富貴之門庶克濟乎子順曰夫富而可以託貧貴而可以寄賤者天下寡矣非信義君子明識通逹則不可所欲託者誰也宫他曰將適趙公子順曰非其人矣雖好養士自奉而已終不能稱也宫他曰將之燕相子順曰彼從兄弟甥舅各濟其私無求賢之志不足歸也宫他曰將之齊田氏子順曰齊大國也其士大夫皆有多黨之心不能容子也他曰然則何向而可子順曰濟子之欲則宜若郈成子可也又曰魏安釐王問子順曰馬回之為人雖少才文梗梗亮直有大丈夫之節吾欲以為相可乎答曰知臣莫若君何有不可至於亮直之節臣未明也王曰何故答曰聞諸孫卿其爲人也長目而豕視者必體方而心圓每以其法相人千百不失臣見回非不偉其體幹然甚疑其目王卒用之三月果以諂得罪淮南子曰管子文錦也雖醜登廟相桓公以霸功成事衣文錦之服大書在明堂故曰雖醜登廟也子産絹染也美而不尊子産相鄭以乘車濟朝渉者孟子曰惠而不知爲政絹染者以子産每人月令曰命婦宫染絹温暖其民如人之母也袁子正書曰孔子稱蘧伯玉國無道可卷而懷也今李膺居濁世之中皦然與世殊塗此西山餓夫之疇耳卒死於非罪惡得爲雅人又曰李膺言出于口人莫得違也有難李君之言者則鄉黨非之禮君子與人同輿載則名聞天下又曰或云少府楊阜豈非忠哉答曰然可謂直士忠臣則吾不知也夫爲人臣見人主失道指其非而播揚其惡可謂直士未爲忠臣故司空陳羣則不然其談論終日未嘗言人主之非書數十上而外不知君子謂陳羣於是乎長者姚信士緯曰論清髙之士上可如老子莊周下可如君平子貢耳若於陵仲子及嚴遵夏甫子治未可盡以爲師矣平議之士若季札趙武逮于林宗皆可盡爲則也其洩冶伯宗及末世史雲子將之屬皆美而未善也聖人考功黜陟猶以三載而子將月旦之處史雲睚眦廢人其觀進者佳或飾虛其怠沮者皆離叛識誠可謂妙矣然非洙泗之風三千之𢎞化又曰延陵季子際㑹之間衛尉蔡君限之於弱余不以爲然季子通妙逹道之機假其討光恐増禍亂受光之讓非其本志若季子之爲君也欲行王道其與周争治霸術以力與列國争强則不肯破强楚而并其封疆也國人疾光而心歸季子季子不立社稷將傾恐光憂迷内灼而異圖外生非常之變將加於髙人是以季子相時慮事順以安民而謂其弱未聞厥㫖蔡子荅曰諸兄以賢讓國與之異能揚文武之遺敎崇仁義之美化以移風易俗耳何常與周争乎而苟守一節退耕於野使還國無討賊之意反云國家有主社稷有祀乃吾君也蓋開簒殺之路非所謂從忠教也又曰揚子雲有深才潜知屈伸沉浮從容𤣥黙近于柳下惠朝隐之風智似蘧瑗而髙不及也班固稱之有大度不孜孜於富貴不戚戚於貧賤二者之美蓋亦良矣然揚子之書清貴甚逺無廟堂之議對王公大人之辭故令其骨鯁不見節操不顯也夫孟子之書將門人所記非自作也故其志行多見非唯教辭而已或拒萬鍾之禄或辭兼金之贈或以周漢禮殊二子時異不可責之於周或曰帝納異言而子雲無正論卒有投閤之異孟軻昻昻其肯然子雲保家養智之士孟軻鳯峙髙世之英也又曰周勃之勲不如霍光此前史所載較然可見而人以勃功大於光意竊不安何者勃本帝大臣居太尉之位擁兵百萬既有陳平王陵之力又有朱虛諸王之據酈寄遊說以譎諸吕因衆之心易以濟事若霍光者以倉卒之際受寄託之任輔弼㓜主天下晏然遇燕王上官之亂誅除凶逆以靖王室廢昌邑立宣帝任漢家之重隆中興之祚參聲伊周足爲賢相推驗事情優劣明矣又曰汝南陳仲舉體氣髙列有王臣之節頴川李元禮中平正直有社稷之能海内論二士有議而未决陳留蔡伯喈云仲舉强於犯上元禮長於接下犯上為難接下爲易仲舉爲先元禮後矣天下於是爲定愚思竊以伯喈未必可從也夫臯繇戒舜犯上之徵也舜治百揆接下之效也故陳平謂王陵言面折廷争我不如公至安劉氏公不如我而犯上則爲優是王陵當髙於良平朱雲殊乎吳鄧矣陸恭仲答曰陳李二君德齊於行才等於身無長短之差時人惑其先後魏文帝典論曰或有方周成王於漢昭帝者余以爲周氏體聖考之淑氣禀賢妣之胎教周召爲保傅吕尚爲太師故咳笑必含仁義之聲觀聽必覿禮義之容𢎞踐祚之義隆太平之化禮樂興於上頌聲作於下時成王年二十二享國三十年世永治長德與年豐夫孝昭父非武王母非邑姜體不承聖化不胎育保無仁義之徳佐無隆平之治所謂生深宫中長婦人手矣德與體併智與性成孝昭之崩年二十有一承衰弊之世牧彫落之民臣無淑聖之智身有短折之期欲髙隆周豈不謬哉曹植漢二祖論曰髙祖因暴秦而起官由亭長自亡徒招集英雄遂誅強楚光有天下功齊湯武業流後嗣誠帝王之元勲人君之盛事也但寡善人之美稱鮮君子之風采惑秦宫而不出窘項座而不起計失乎酈生忿過乎韓信太公是誥於孝違矣敗古今之大教傷王道之實義然其驍將藎臣皆古今之鮮有而能任其才而用之聽其言而察之故兼天下而有帝位也不然斯不免當世之妄夫世祖體乾靈之休徳韜亞聖之竒才聰逹而多識樂施而愛人神光前驅威風先遊軍未出於南京莽已斃于西都當此時也九州鼎沸四海淵涌言帝者二三稱王者四五咸鴟視狼顧虎超龍驤光武秉炎光之巨越震赫斯之隆怒盪滌凶穢勦除醜類若勁風而縱烈火曬白日而掃朝雲也計功則業殊比隆則事異語徳則靡諐言行則蕪穢卒能立不刋之遐跡建不朽之元功故曰光武其近優也曹植成王論曰周公以天下初定武王既終而成王尚㓜未能定南面之事是以推以忠誠稱制假號二弟流言召公疑之發金縢之匱然後用寤亦未决也至於昭帝所以不疑於霍光亦縁武帝有遺詔於光使光若周公踐天子之位行周公之事吾恐叛者非徒二弟疑者非徒召公也且賢者固不能知聖賢自其宜耳昭帝固可不疑霍光周王自疑周公也若以昭帝勝成王霍光當踰周公耶若以堯舜爲成王湯禹作􅃹蔡召公周公之不見疑必也陳羣汝潁士論曰羣以爲孔氏先汝潁士勝負之評矣孔荅曰汝南戴子髙親止千乗萬騎與光武帝共揖於道中潁川士雖抗節未有能頡頏天子者也汝南許子伯與友人共說世俗將壞同夜起舉聲號哭潁川士雖頗憂時未有能哭世者也汝南許掾教太守劉晨圖開稻陂灌數萬頃累世獲其功韓元長雖好地理未成功見效如許掾者也汝南張伯元身死之後見夢於范巨􅀸潁川雖有竒異未有鬼神能靈者也汝南應世叔讀書五行並下潁川士雖多聰明未有能離婁並誦者也汝南李鴻爲太尉掾弟殺人當死鴻自縛詣門乞代弟命便飲鴆而死弟因得全潁川士雖欲尚節義未有能殺身成仁者也汝南翟文仲爲東郡太守始舉義兵以誅王莽潁川士雖疾惡未有破家爲國者也汝南袁公著爲甲科即中上書欲治梁冀潁川士雖務忠讜未有能没命直言者也何晏冀州論曰略言春秋以來可以海内比而校也恭謹有禮莫賢乎趙襄仁徳忠義莫賢乎趙盾納諫服義莫賢乎韓起決危定國莫賢乎狐偃勇謀經國莫賢乎魏綘逹讐爲主莫賢乎祁奚延譽先生莫賢乎張老明智識物莫賢乎趙武清直篤義莫賢乎叔向聰明肅恭莫賢乎羊舌戢守信不移莫賢乎荀息見利思義莫賢乎中行穆子憂國扞君莫賢乎先軫書法不諱莫賢乎董狐分謗和衆莫賢乎郄克流放能顯莫賢乎冀缺㧞幽進滯莫賢乎臼季守義死節莫賢乎欒恭子抗言不屈莫賢乎旬瑩刼略不動莫賢乎觧楊沈聽知機莫賢乎師曠放而益顯莫賢乎狼瞫儒雅博通莫賢乎董仲舒體恭篤敬莫賢乎石奮才兼文武千金不入私門莫賢乎竇嬰明君顯賢莫賢乎明叔證主知分莫賢乎貫髙忠義正直莫賢乎鮑子都謇諤忠諫莫賢乎王宏張輔名士優劣論曰世人論司馬遷班固才之優劣多以固爲勝余以爲失遷叙三千年事五十萬言固叙二百年事八十萬言煩省不敵固之不如一也良史述事善足以奬勸惡足以鑒誡人道之常中流小事無取又因循難易益不同矣又遷爲蘇秦張儀范睢蔡澤作傳逞辭流離亦足以明其大才也此真所以爲良史也又曰世人見魏武皇帝據有中土莫不謂勝劉𤣥德也余以𤣥德爲勝夫撥亂之主常先以能收相獲將爲本一身之善戰不足恃也世人以𤣥德爲吕布所襲爲武帝所走舉軍東下爲陸遜所覆未若武帝爲徐滎所敗馬被創之危也𤣥德在荆州劉景升父子不能用其計舉州降魏手下歩騎不滿數千爲武帝大衆所走未若武帝爲吕布奔北騎所擒刼突火之急也𤣥德爲陸遜所覆未若武帝爲張繡所困挺身逃遁以䘮二子也若令髙祖死於彭城世人方之不及項羽逺矣武帝死宛下將復謂不及張繡矣而其安忍無親若楊德祖之徒多見賊害孔文舉桓文林等以宿恨見殺良將不能任行兵三十餘年無不親征功臣謀士曾無列土之封豈若𤣥德威而有恩勇而有義諸葛孔明雲長翼德皆人傑也服而使之夫明闇不相爲用臧否不相爲使武帝雖處强不爲用矣况在危急之間勢弱之地乎若令𤣥徳據有中州將與周室比隆豈徒三傑而已又曰樂毅諸葛孔明之優劣或以毅爲弱燕合五國之兵以破强齊雪君王之耻莫不謂毅爲優余以爲五國之兵共伐一齊不足爲强大戰濟西伏尸流血不足爲仁夫孔明抱文武之德劉𤣥徳以知人之明屢造其廬諮以濟世至如竒策泉涌智謀縱横遂東說孫權北抗大魏以乗勝之師翼佐取蜀及𤣥德終禪登大位在擾攘之際立童蒙之主設官分職班序衆才文以寧内武以折衝勲業未濟而殞觀其遺文謀謨𢎞逺雅規恢廓已有功則譲於下闕則躬自咎見善則遷諫則改故烈聲震遐邇者也習鑿齒側周魯通諸葛論曰客問曰周瑜魯肅何人也主人曰小人也客曰周瑜竒孫策於總角定大好於一面摧魏武百勝之鋒開孫氏偏王之業威震天下名馳四海魯肅一見孫權建束呉之略子謂之小人何也主人曰皆乃真所以爲小人也夫君子之道故將竭其真忠佐扶帝室尊主寧時逺崇名教若乃力不能合事與志違躬耕南畆遁迹當年何由盡臣禮於孫氏於漢室未亡之日耶客曰諸葛武侯翼戴𤣥德與瑜肅何異而子重諸葛毁瑜肅何其偏也主人曰夫論古今者故宜先定其所爲之本迹其致用之源諸葛武侯龍蟠江南託好管樂有匡漢之望是有崇本之心也今𤣥德漢髙之正胄也信義著於當年將使漢室亡而更立宗廟絶而復繼誰云不可哉袁宏七賢序曰阮公瓌傑之量不移於俗然獲免者豈不以虛中犖節動無過則乎中散遣外之情最爲髙絶不免世禍將舉體秀異直致自髙故傷之者也山公中懷體黙易可因任平施不撓在衆樂同遊刃一世不亦可乎新序曰晉獻公用荀息之謀而禽虞不用宫之竒謀而亡故荀息非霸王之佐乃戰國兼並之臣也若宫之竒則可謂忠臣之謀也蔣子萬機論曰太史遷云顔回雖篤行不遇仲尼不能彰其名也故五尺之童得擬大舜使在他門未或及此也夫甘羅少回六歳獲河東五城萬乘郊迎而佩印雖所𢎞非道義然當秦之時染詐變之風也使羅在孔門治丘之訓亦可聞一知十乎曰未必也昔齊欲伐魯回求說陳常而孔子不許遂使子貢子貢一出破齊强晉亡吳霸越存魯也夫顔子與賜程智比才相校於十至於此事而丘不使也抱朴子曰凡薄之徒雖便辟流俗而懷空抱虛有似蜀人瓠壺之喻胷中無一紙之識不過酒炙所謂冐于貨賄貪于飲食左生所載不才之子傳子曰夏侯𤣥求交於傳嘏嘏不納荀粲謂傳嘏曰夏侯太初一時之俊虛心交子不合則怨至二賢不睦非國之利也嘏荅之曰太初能虛聲而無實才何平叔言逺而情近好辯而無誠鄧𤣥茂外狥名利内無闗鑰此三人者皆敗徳也孫子曰譙周勸主降魏可乎曰自謂天子而乞降請命何耻之深乎夫爲社稷死則死亡則亡先君正魏之簒不與同天過於其父俛首而事讐可謂苟存豈夫君之正道哉郭子曰庾道季云藺相如雖千載死人懔懔恒如有生氣曹蜍李志雖見在厭厭如九泉下又曰世中稱庾文康爲豐年玉庾稚恭爲荒年榖又曰魏明帝世使后弟毛魯與夏侯太初共坐時人謂兼葭倚玉樹時目夏侯太初朗如明月入懷又曰人有問王長史王中祖也江霦羣從兄弟者王荅云諸江皆能自生活又曰人問謝太傅王子敬可與先軰誰比謝荅曰阿敬近王劉之間王修與真長又曰王子敬問謝公嘉賔何如道季嘉賔郄超小名庾龢小名道季荅云道季誠妙撮清悟嘉賔故自勝桓公稱云桓温也鏘鏘有文武又曰王右軍道劉真長樹云柯而不扶踈又曰桓公問孔西陽安石何如文度孔思未荅反問公謂如何荅曰安石居然不可陵踐又曰簡文云謝安南名奉字𢎞道清泠如其弟弟名躬字𢎞逺學義不如孔嚴嚴字彭祖又曰王丞相云雒下論以我比安期千里王丞字安期元瞻字千里我亦不推此二人唯王太尉夷甫也又曰周伯仁道桓茂論欽崎歴落可笑之人也或云是謝㓜輿言又曰王丞相言刁𤣥亮之察察刁恊字𤣥亮戴若思之岩岩戴淵字若思卞望之峰炬並一見我而服也又曰祖士少道右軍王家阿莬莬羲之小名吾莬何縁復減處中右軍道祖士少風領毛骨恐没世不復見如此人王子猷說世目士少爲朗邁我家亦以爲徹朗又曰孫子荆應上品狀王武子時爲之目曰天才英博亮㧞不羣太平御覧卷四百四十七
