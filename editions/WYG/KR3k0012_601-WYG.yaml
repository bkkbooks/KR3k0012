  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_601-1a, image: WYG0898/WYG0898-0461a.png}
body:
  text: 太平御覧卷六百一宋李昉等撰文部十七著書上張華博物志曰聖人制作曰經賢者著述曰傳史記太史公自序曰夫詩書隱約者欲遂其志之思也昔西伯拘羑里演周易孔子厄於陳蔡作春秋屈原放逐著離騷左丘明失明厥有國語孫子臏脚而論兵法此人皆意有所鬰不得通其道也漢書曰公孫𢎞著公孫子言刑名謂字直百金也又曰淮南王安為人好書鼓琴不喜弋獵狗馬馳騁招致賓客方術之士數千人作為内書二十一篇外書甚衆又有中篇八卷言神仙黄白之術亦二十餘萬言初安入朝獻所作内篇新出上愛秘之使為離騷傳師古曰傳謂解說之若毛詩傳旦受詔日食時上又曰陸賈於高祖前時時稱說詩書帝罵之曰乃公馬上得之賈曰寜可以馬上治乎湯武逆取而順守之文武並用久長之術也帝乃令賈著古今成敗之書名曰新語每奏一篇帝未嘗不稱善又曰董仲舒作玉杯繁露清明竹林之書又曰后蒼作曲臺禮射之書又曰王莾傳大司馬䕶軍褒奏言安漢公遭子宇䧟於管蔡之辜子愛至深為帝故不敢顧私唯宇遭罪喟然憤發作書八篇以誡子孫宜班郡國令學官以教授事下羣公請令天下吏能誦公誡者以著官簿比孝經師古曰著官者言用之得選舉也後漢書曰梁竦以經書自娛著書數篇名曰七序班固見而稱之曰昔孔子作春秋而亂臣賊子懼梁竦作七序而竊位素餐者慚又曰王充好論說始詭異終有理實以為俗儒守文多失其真乃閉門潜思絶慶弔之禮户牖墻壁各置刀筆著論衡八十五篇二十餘萬言後漢書列傳曰荀恱字仲豫儉之子恱志在獻替而謀無所用乃作申鍳五篇其所論辨通見政體既成而奏之帝覧而善焉帝好典籍常以班固漢書文繁難省乃命依左氏傳體以為漢紀詔尚書給筆札辭約事詳論辨多美晉書曰干寳性好隂陽術數留思京房夏侯勝等傳寳父先有所寵侍婢母甚妬忌及亡母乃生埋婢於墓中寳兄弟年少不之審也後十餘年母䘮開墓而婢伏棺如生載還經日乃蘇言其父常取飲食與之恩情如生家中吉凶輒語之考校悉騐地中亦不覺為惡既而嫁之生子又寳兄嘗病氣絶積日不冷後遂悟云見天地間鬼神事如夢覺不自知死寳以此遂撰集古今神祗靈異人物變化名為捜神記凡三十卷以示劉惔惔曰卿可謂鬼之董狐也干寳表曰臣前聊欲羅記古今怪異非常之事㑹聚散逸使同一貫博訪之知者片紙殘缺事事各畢又曰孫盛著晉陽秋詞嚴而理正咸稱良史焉既而桓溫見之怒謂盛子曰枋頭誠失利何至乃如尊君所說其子遽拜謝因請刪定之時盛年老還家性方嚴有軌憲雖子孫班白而庭訓愈峻至此諸子乃共號泣稽顙請為百口切計盛大怒諸子遂私改之盛寫定兩本寄於慕容雋太元中孝武帝博求異聞始於遼東得之以相考校多有不同書遂兩存又曰曹志植之子也帝嘗閱六代論問志曰是卿先王所作耶志對曰先王有手所作目錄請歸尋案還奏曰案錄無此帝曰誰作志曰以臣所聞是臣族父冏所作以先王文高名著欲令書傳於後是以假托帝曰古來亦多有是顧謂公卿曰父子證明足以為審自今以後可無復疑又曰王長文字德叡廣漢郪人也少以才學知名而放蕩不覊州府辟命皆不就州辟别駕乃㣲服竊出舉州莫知所之後於成都市中蹲踞齧胡餅刺史知其不屈禮遣之閉門自守不交人事著書四卷擬易名曰通𤣥經有文言卦象可用卜筮時人比之揚雄太𤣥同郡馬秀曰揚雄作太𤣥唯桓譚以為必傳后世晩遭陸績𤣥道遂明長文通𤣥經未遭陸績君山耳又曰王隱字處叔太興初典章稍備乃召隠及郭璞俱為著作郎令撰晉史著作郎虞預私撰晉書而生長東南不知中朝事數訪於隠并借隠所著書竊寫之所聞漸廣是后更嫉隠形於言色預既豪族交結權貴共為朋黨以斥隱竟以謗免黜歸於家貧無資用書遂不就乃依征西將軍庾亮供其紙筆書乃得成詣闕上之隠雖著述而文詞鄙拙蕪舛不倫其書次第可觀者皆其父所撰文體混雜義不可解者隠之作也宋書曰王淮之字元魯晉尚書僕射彬𤣥孫也曾祖彪之位尚書令博文多見練悉朝儀自是家世相傳並諳江左舊事緘之青箱世謂之王氏青箱學又曰高平郄紹作晉中興書數以示何法盛法盛有意圖之謂紹曰卿名位貴達不復俟此延譽我寒士無聞於世如袁宏于寳之徒頼有著述流聲於后宜以為惠紹不與至書成在齋内厨中法盛詣紹紹不在直入籍書紹還失之無復兼本於是遂行何書齊春秋曰王儉字仲寳以四部衆書盈溢几閣自劉歆七畧以來應更區别乃著七志上之時人以比相如封禪焉梁書曰武帝取鍾王真迹授周興嗣令選不重複者千字韻而文之興嗣一宿即上鬂髪皆白大被賞遇後興嗣目疾武帝親為之合藥又曰劉勰字彦和自齊入梁撰文心雕龍五十篇論古今文體其序畧云予齒在逾立嘗夜夢執丹漆之禮器隨仲尼而南行寤而喜曰大哉聖人之難見也乃小子之垂夢歟自生靈以來未有如夫子者也故讃聖㫖莫若注經而馬鄭諸儒𢎞之已精惟文章之用實經典枝條五禮資之以成六典因之致用由是搦管和墨乃始論文其為文用四十九篇而已既成未為時流所稱勰欲取定於沈約無由自逹乃負書候約於車前狀若欲貨鬻者約取讀大重之謂深得文體嘗陳諸几案後周書曰齊文憲嘗以古今兵書繁廣難求㫖要乃自列定五篇表陳高祖髙祖覧而稱善陳書曰陸瓊字伯玉吳人初瓊父雲公奉武帝勅撰嘉瑞記瓊述其㫖而續焉三國典畧曰齊主如晉陽尚書右僕射祖珽等上言昔魏文帝命韋誕諸人撰著皇覧包括羣言區分義别陛下聽覧餘日眷言緗素䆒蘭臺之籍窮策府之文以為觀書貴博博而貴要省日兼功期於易簡前者修文殿令臣等討尋舊典撰錄斯書謹罄庸短登叙篇次放天地之數為五十部象乾坤之策成三百六十卷昔漢時諸儒集論經傳奏之白虎閣因名白虎通竊緣斯義仍曰修文殿御覧今繕寫已畢并目上呈伏原天鍳賜垂裁覧齊主命付史閣初齊武城令宋士嘉錄古來帝王言行要事三卷名為御覧置於齊王巾箱陽休之創意取芳林遍畧加十六國春秋六經拾遺錄魏史舊書以士素所撰之名稱為𤣥洲苑御覧后改聖壽堂御覧至是珽等又改為修文殿上之徐之才謂人曰此可謂床上之床屋上之屋也三國典畧曰魏收以子姪少年湏誡厲遂著枕巾篇以誡之隋書曰杜臺卿嘗採月令觸類而廣之為書名玉燭寳典十二卷奏之臺卿患聾不任吏職請修國史上許之拜著作郎國朝傳記曰虞世南之為秘書也請於后堂籍羣書中事可為文用者號為北堂書鈔今北堂猶存而書益行於世唐書曰太宗以特進魏徴所撰類禮賜皇太子及諸王幷藏本於秘府初徴以禮經遭秦滅學戴聖所編條流不次乃刪其所記以類相從為五十篇合二十卷太宗善之賜帛一千段又曰太宗閱陸德明經典奇義美其𢎞益學者嘆曰德明雖亡此書可傳習因賜其家布帛百匹又曰高宗時太子賢敗太子洗馬劉納言給事中唐之奇並以私附庶人配流嶺外訥言博學有文詞以漢書授賢賢甚重之嘗撰續俳諧集十五卷賢覧之以為笑樂及賢廢宫中捜得之上怒曰經典誘人猶恐不能遷善俳諧鄙說是導之以邪也遂徙振州而死又曰天后聖厯中上以御覧及文思博要等書聚事多未備令麟臺監張昌宗與麟臺少監李嶠廣召文學之士給事中徐彦伯水部郎中貟半千等二十六人増損文思博要勒成一千三百卷於舊書外更加佛教道流及親屬姓氏方域等部至是畢功上親制名曰三教珠英彦伯已下改官加級賜物又曰天后自咸亨已後嘗召文學之士周思茂范履氷等入禁中令撰𤣥鑑百卷青宫要紀少陽政範各三十卷孝子傳及列女傳維域典訓鳯樓新誡各二十卷古今内範百卷樂書要錄十卷百寮新誡五卷垂拱格四卷臣軌二卷兆人本業五卷又有文集一百二十卷並藏於秘閣又曰劉允濟善屬文與綘州王勃齊名採摭魯哀公后十二代至於戰國遺事撰魯後春秋一十卷表上之遷左右史又曰許叔牙嘗撰毛詩纂義十卷以進太子賜帛二百段兼令寫本付司經局其後御史大夫高智周謂人曰凡欲言詩者必湏先讀此書始可也又曰大厯中刑部尚書顔真卿以陸法言切韻未𢎞乃纂九經子史字義著韻海鏡源三百六十卷獻之詔下秘閣及集賢書院貯之又曰馮伉為醴泉縣令患百姓多滑為著論蒙十四篇大畧著明忠孝仁義勸學務農每鄉給一卷俾其傳習在縣七年韋渠牟薦為給事中充皇太子及諸王侍讀召見於别殿賜金紫著三傳異同三卷又曰貞元十三年韓譚進統載三十卷其書採虞夏以來至於周隋錄其事迹善於始終者六百六十八人為立傳又曰路随為侍講學士採三代皇王興衰著六經法言二十卷奏之旋拜諫議大夫依前侍講學士將修憲廟實錄復命兼充史職又曰貞元十一年左僕射平章事賈耽進海内華夷圖及古今郡國縣道四十卷圖廣三丈率以寸折成百里權德輿作序又曰韋處厚為中書舍人侍講學士時穆宗荒恣不親政務既居納誨之地宜有以啟導清虗乃銓釋經義雅言以類相從為二十卷謂之六經法言獻上賜之以帛又曰唐次貶開州刺史在巫峽間十餘年不獲進用西川節度使韋臯抗表請為副使德宗宻諭臯命罷之次滯蠻荒孤心抑鬰怨謗所積孰與申明乃採自古忠臣賢士遭罹謬謗放逐遂至殺身而君猶不寤其書三篇謂之辨謗畧上之德宗省之猶怒謂左右曰唐次乃以吾為昏主何自諭如此次卒章武帝明哲嫉惡尤惡人朋比傾䧟嘗閱書禁中得次所上書三篇覧而善之謂學士沈傳師曰唐次所集辨謗之書實君人者時宜觀覽朕思古書中多有此事次編錄未盡卿家傳史學以類廣之傳師奉詔與令狐楚杜元頴等分功修續廣為十卷號元和辨謗畧又曰鄭處誨方雅好古勤於著述撰集至多為校書郎時撰明皇雜錄三篇行于世又曰裴潾充集賢殿學士集厯代文章續梁昭明太子文選成三十卷因曰太和通選并音義目一卷上之當文士非素與潾游者其文章少在其選時論薄之又曰柳玭嘗著書誡其子弟曰夫門地高者可畏不可恃可畏者立身行己一事有墜先訓則罪大于他人雖生可以茍取名位死何以見祖先于地下不可恃者門高則自驕族盛則人所嫉實蓻懿行人未必信纖瑕微累十手争指矣又數其尤大者五條詞多不載太平御覧卷六百一
