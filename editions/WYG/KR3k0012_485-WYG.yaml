body:
  text: 太平御覽卷四百八十五宋李昉等撰人事部一百二十六貧下魏志曰崔林字徳清河東武城人也幼時宗族莫知従兄琰異之太祖定冀州召除鄢長貧無車馬單步之官太祖征壺闗擢為冀州主簿又曰華歆素清貧祿以賑親戚故家無儋石之儲又曰鄧艾字士載義陽人以口吃不得作幹佐為稻田守草吏同郡吏憐其貧資給甚厚艾初不稍謝每見髙山大澤輒規度指畫軍營處所時人多笑焉吳志曰吕範字子衡汝南人有容觀姿貌邑人劉氏家富女美範求之母嫌欲勿與劉氏曰吕子衡寧當乆貧者遂與之婚又曰潘璋字文珪東郡人性嗜酒其家甚貧性好賖貸輙言豪富必相還孫權甚竒之魏將夏侯尚南郡作浮橋渡百里洲璋於上流伐葦作簟欲順風放火簟成尚便引退璋遂為平北將軍晉書阮咸字仲容陳留人時俗七月七日晒衣裳或宗族於庭羅列衣服咸貧無物乃脫犢車布裩以竹竿頭挂之人問故答曰不能免俗宋書曰武帝劉裕少時其家大貧與人傭賃及登帝位耕具猶存并衲布襖竝令收掌以示子孫令為規又曰江湛家貧約不營財利餉餽盈門一無所受無兼衣餘食嘗為上所召值澣衣稱疾經日衣成然後赴牛餓馭人求草湛良乆曰可與飲又曰陶潜嗜酒而家貧不能恒得親舊知其如此或置酒招之造飲輙盡期在必醉既醉而退曾不吝情去留環堵蕭然不蔽風日短褐穿結簞瓢屢空晏如也又曰顔延之屏居里巷不預人間者七載中書令王球名公子延之居常罄貧球輙分財贍之齊書曰王延之清貧居宇穿漏禇淵徃候之見其如此具啓明帝帝即勑材官為起三間齋屋又曰虞玩之太祖鎮東府朝野致敬玩之猶躡履造席太祖取屐視之曰卿此屐已㡬載玩之曰著此屐已二十年貧竟不辦易太祖善之又曰庾杲字景行新野人初為駕部郎清貧自業食飡唯有韭葅生菜任彦昇嘗戯曰誰謂庾郎貧食鮭常有二十七種菜王儉用為長史安陸侯蕭緬與儉書曰盛府元僚實難其選庾景行泛淥水依芙蓉何其麗也時人以儉府為蓮花池故緬書言之官至御史中丞梁書曰阮孝緒家貧無以爨僮妾竊鄰人樵以繼火孝緒知之乃不食更令撤屋而炊所居室唯有一牀竹樹環繞後魏書曰胡叟居家蓬室草逕唯以酒自適常謂人曰我此生活似勝焦先不治産業即貧不以為恥養子字螟蛉以自給食每至貴勝之門恒乗一牸牛布囊容三四升飲噉醉飽便盛餘肉餅以付螟蛉見車馬榮華視之蔑如也隋書曰張仁詡州縣以其貧素將加賑恤輙辭不受每閒居従容長歎曰老冉冉而將至恐修名之不立以如意擊几皆有處所人方之閔子騫原憲又曰虞世基陳滅歸國為通直郎内史省無産業每傭書養親怏怏不平嘗為五言以見意情理凄切世以為工作者莫不吟詠又曰房彦謙居官所得俸祿皆以周恤親友家無餘財車服器用務存素儉自少及長一言一行未嘗涉私雖至屢空怡然自得嘗従容獨笑顧謂其子𤣥齡曰人皆因祿富我獨以官貧所遺子孫在於清白又曰許康佐擢進士第以家貧母老求為知院官人或輕怪笑而不答及母亡服除不就侯府之辟君子知其不擇祿養親之志也故名益重又曰季建字杓直家素清貧無舊業與兄造遜於荆南躬耕致養嗜學力文六韜曰武王問太公曰貧富豈有命乎太公曰為之不宻宻而不富者盗在其室武王曰何謂盗也公曰計之不熟一盗也收種不時二盗也取婦無能三盗也養女太多四盗也棄事就酒五盗也衣服過度六盗也封藏不謹七盗也井竈不利八盗也舉息就禮九盗也無事燃燈十盗也取之安得富哉武王曰善說苑同列女𫝊曰黔婁妻者魯黔婁先生之妻也先生死曾子與門人徃弔之見先生尸在牖下覆以布被手足不盡斂覆頭則足見覆足則頭見曾子曰衺其被則斂矣妻曰衺之有餘不如正之不足且先生以不衺故至於此又曰齊女徐吾者在海上貧婦人與鄰婦人李吾之屬合燭相従績徐吾最貧而燭數不屬李吾謂曰徐吾燭數不屬請無與夜徐吾曰是何言與今一室之中益一人燭不為益闇去一人燭不為益明何愛東壁餘光貧妾不蒙見哀之恩長為妾夜不亦可乎莫之能應遂復與夜髙士𫝊曰老萊子楚人耕蒙山之陽以藿葭為墻蓬蒿為室枝木為床蓍艾為席東方朔别𫝊曰朔書與公孫𢎞借馬曰朔當従甘泉願借外廐之後乗木槿夕死而朝生者士亦不必長貧也李郃别𫝊曰公居貧而不好治産有稻田三十畆第宅一區至京學問常以賃書自給為人沉深𢎞雅有大度郭林宗别𫝊曰林宗家貧初欲遊學無資就姊夫貸五千錢乃逺至成臯従師受業併日而食衣不蔽形常以蓋幅自障出入入則䕶前出則掩後邴原别𫝊曰原字根矩年十一喪父家貧早孤鄰有書舎原過其傍而泣師問曰童子何悲原曰孤者易傷貧者易感夫書者必有其父兄一則願其不孤二則羡其得學心中惻然而為涕零也師亦哀原之言而為泣曰欲書可書耳桓階别𫝊曰階貧儉文帝嘗幸其第見諸子無褌文帝拊手笑曰長者子無褌乃抱與同乗是日拜二子為郎使黄門齎衣三十囊賜曰卿兒能趨可以褌矣文士𫝊曰劉梁字曼山一名岑漢宗室子孫少有清才以文學見貴梁貧恒賣書以供衣食汝南先賢行狀曰胡定字元安潁川人至行絶人在喪雉􅇠逰其庭雪覆其室縣令遣户曹椽排闥問定定已絶榖妻子皆卧在床令遣以乾糗就遺之定乃受半三輔决錄曰第五頡字子陵倫小子以清正為郡功曹至州従事公府辟居髙第侍御史南頓令皆稱病免洛陽無主人鄉里無田宅寄止靈臺中或十日不炊又曰孫晟字允公家貧不仕居社城中織箕為業明詩書為郡功曹冬月無被有薪一束暮卧旦燒之華陽國志曰朱良字雲卿什彷人少受學於蜀郡張寧食豆屑飲水以諷誦同業憐其貧給米肉不受家貧恒以步行為郡功曹世說曰李𢎞度常數不被遇殷揚州知其家貧問君能屈志百里不李答曰北門之歎乆已上聞窮猿奔林豈暇擇木遂作鄖縣令說曰謝僕射太常詣吳領軍坐乆吳留作食日已中方使婢賣狗供客比得食無氣力可語又曰劉真長少時居丹徒家至貧織芒履以養母說苑曰子思居於衛緼袍無裏二旬九食西京雜記曰司馬相如初與卓文君至成都文君貧愁憊以所服鷫鸘裘就市人楊昌貰酒遂相與謀還於成都賣酒相如著犢鼻褌滌器以恥王孫墨子曰天下有義則富無義則貧列子曰管仲之相齊君淫亦淫君奢亦奢志合言従道行國霸其後田氏相齊君盈則已降君斂則已施民皆歸之因有齊國若實名貧偽名富也又曰齊有貧者乞於城市患其亟也衆莫之與遂適田氏之厩從馬豎作役而假食郭中人戲之曰従馬豎而食不以辱乎乞兒曰天下之辱莫過於乞乞猶不辱豈辱馬豎哉又曰齊之國氏大富宋之問氏大貧自宋之齊謀術國氏告之曰吾善為盗始吾為盗也一年而給二年而定三年大穰自此徃施及州閭問氏大喜喻其為盗之言而不喻其為盗之道遂踰垣鑿室手目所及亡不探也未及時以贓罪沒其先君之財問氏以國氏之謬己也徃而怨之國氏曰嘻若夫為盗之道天有時地有利吾盗天地之利雲雨之潤吾陸盗禽獸水盗龜鼈亡非盗也夫金玉珍寳榖帛財貨人之所聚豈天之所與若盗之而獲罪孰怨哉又曰凡為名者必㢘㢘斯貧為名者必讓讓斯賤莊子曰原憲處魯居環堵之室蓬户不完乗木為樞而甕牖上漏下濕匡坐而弦歌子貢乗大馬中紺而表素軒車不容巷徃見原憲原憲杖藜而應門子貢曰先生何病也原憲應之曰憲聞無財之謂貧學道不能行之謂病今憲貧也非病也子貢逡廵而退有愧色又曰孔子謂顔淵曰家貧居卑胡不仕乎對曰不願仕囘有負郭之田五十畆足以給饘鬻郭外之田十畆足以為絲麻鼓琴足以自娯所學於夫子者足以自樂也囘不願仕孔子愀然變色曰美哉又曰莊周家貧故徃貸粟於監何侯曰我將得邑貸子三百金周忿作色曰周昨來有中道而呼者顧視車轍有鮒魚焉問之曰子何為者耶對曰我東海之波臣也君豈有斗升之水而活我哉周曰諾我將南遊吳越之王激西江之水而迎子可乎鮒魚忿然作色曰吾待斗升之水然活耳君乃言此曾不如早索我於枯魚之肆又曰曾子居衛捉衿而肘見納履而踵决又曰河上又有家貧窮恃緯蕭而食者其子沒淵得千金之珠謂其子取石來鍜之夫千金之珠必在九重之淵而驪龍之頷下汝得之必遭其睡若龍寤子尚奚微之有哉吕氏春秋曰世皆以珠玉為寳寳愈多而民愈貧失其所寳也荀卿子曰仁義禮善於人譬若貨財粟米之於家也多有之者富少有之者貧至無有者窮也又曰子夏貧衣若懸熟鶉人曰子何不仕曰諸侯驕我者吾不為臣丈夫之驕我者吾不復見也抱朴子曰洪禀體尫羸兼之多疾貧無車馬不堪徒行荆棘叢於庭宇蒿莠塞乎階霤披榛出門排草入室淮南子曰貧人夏則披褐𢃄索唅菽飲水以支暑熱冬則羊裘鮮札短褐不掩形而煬竈口焉為裘如鎧甲之札言其破壊也煬炙也向竈口之自温湯讀髙尚之尚也故其為編户齊民無以異然貧富之相去也猶人君之與僕虜不足以喻之喻猶方也又曰有人盗而富者未必富盗有㢘而貧者未必㢘也符子曰楚之交子魯之周子齊之狂子三子和與居乎泰山之陽處乎環堵之室蓽門不扇蓋茨不翳而弦歌不輟鶡冠子曰家富棘族聚居貧兄弟離漢揚雄逐貧賦曰揚子遁居離俗獨處左降崇山右接曠野鄰阻乞兒終貧且窶禮薄義弊相與羣聚惆悵失志呼貧與語汝在六極投弃荒遐降為庸卒刑戮是加匪惟幼稚嬉戲土沙居非近鄰接居連家恩輕毛羽義薄輕羅進不由人退不受呵久為滯客其意謂何人皆文綉余褐不完人皆稻粱我獨藜飱貧無寳玩何以接歡宗室之宴為樂不槃徒行負賃出處易衣身服百役手足胼胝或耘或耔霑體露肌朋友道絶進宦凌遲厥咎安在職汝為之舎爾逺竄崑崙之顛爾復我隨翰飛戾天舎爾登山巖穴隱藏爾復我隨陟彼髙崗舎汝入海汎彼柏舟爾復我隨載沉載浮我行爾動我靜爾休豈無他人従我何求今汝去矣勿復久留貧曰唯唯主人見逐多言益嗤心有所懐願得盡辭昔我乃祖宣其明徳克佐帝堯誓為典則土階茅茨匪彫匪飾爰及季世縦其昬惑饕餮食辟貪富苟得鄙我先人乃傲乃驕瑶臺瓊室華屋山髙流酒為池積肉為崤是用鵠逰不踐其朝三省吾身謂予無諐處君之家福祿如山忘我大徳思我小怨堪寒能暑少不言焉寒暑不忒等夀神仙桀跖不顧貪類不干人皆重蔽子獨露居人皆怵惕子獨無虞言辭既罄色厲目張攝齊而興降階下堂誓將去汝適彼首陽孤竹之子與我連行余乃避席辭謝不直請不貳過聞義則服長與爾居終無厭極貧遂不去與我遊息太平御覽卷四百八十五
