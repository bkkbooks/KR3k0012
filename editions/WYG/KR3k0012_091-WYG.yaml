body:
  text: 太平御覧卷九十一宋李昉等撰皇王部十六後漢顯宗孝明皇帝肅宗孝章皇帝穆宗孝和皇帝孝殤皇帝恭宗孝安皇帝少帝北鄉侯顯宗孝明皇帝東觀漢紀曰孝明皇帝諱陽一名莊世祖之中子也母光烈皇后初讓尊位為貴人故帝十二嵗以皇子立為東海公三嵗進爵為王㓜而聰明睿智容貌莊麗世祖異焉數問以政議應對敏逹謀謨甚深温恭好學敬愛師傅所以承事兄弟親宻九族内外周洽世祖愈珍上徳以為宜承先序建武十七年十月詔廢郭皇后立隂貴人為皇后以東海王立為皇太子治尚書備師法兼通九經畧舉大義博觀羣書以助術學無所不照中平二年二月世祖崩皇太子即位永平二年二月上初臨辟雍行射禮十月上幸辟雍初行養老禮甲子上幸長安祠髙廟遂有事於十一陵厯覧舘舎邑居舊處㑹郡縣吏勞賜作樂三年十月上與皇太后幸南陽祠章陵周觀舊廬召見隂鄧故人上在于道所幸見吏勞賜省事畢歩觀行部署不用輦車夜讀衆書乙更盡乃寐先五鼓起率常如此五年十月上幸鄴用常山三老言復元氏縣田租八年十月上臨辟雍養三老五更禮畢上手書赦令尚書僕射持節詔三公十年閏月行幸南陽祠章陵以日北至復祠於舊宅禮畢召校官弟子作雅樂奏鹿鳴上自御塤箎和之以娛嘉賔至頓勞饗三老官屬是時天下安平人無徭役嵗比登稔百姓殷富粟斛錢三十牛羊被野十三年二月上耕籍田禮畢賜觀者食有諸生前舉手曰善哉文王之遇太公也上書板曰生非太公予亦非文王也十五年二月東巡狩三月幸孔子宅祠孔子及七十二弟子親御講堂命太子諸王說經幸東平王宫上憐廣陵侯兄弟賜以服御之物又以皇子輿馬悉賦予之十七年春甘露仍降樹枝内附芝生前殿神雀五色翔集亰師是夜上夢見先帝太后夢中喜覺因悲不能寐明旦上令百官採甘露客悉㑹太常丞上言陵樹華有甘露上令百官採甘露受賜畢罷上從席前伏御牀視太后鏡奩中物流涕勑易奩中脂澤粧具自帝即位遵奉建武之政有加而無損初世祖閔傷前世權臣太盛外戚預政漢家中興唯宣帝取法至於建武朝無權臣外族隂郭之家不過九卿親屬勢位不能及許史王氏之半至永平后妃外家貴者裁家一人備列將校尉在兵馬官充奉宿衛闔門而已無封侯預朝政者自皇子之封皆减舊制諸王皆當略與楚淮陽相比什減三四曰我子不當與先帝子等又國逺而小於王善節約謙儉如此八月帝崩于東宫前殿在位十八年時年四十八諡曰孝明皇帝𦵏顯節陵十二月有司奏上尊號曰顯宗廟與世宗廟同而祠祫祭於世祖之堂共進武徳之舞如孝文皇帝祫祭髙廟故事孝明皇帝尤垂意於經學即位刪定擬議稽合圗䜟封師太常桓榮為關内侯親自制作五行章句毎饗射禮畢正坐自講諸儒並聽四方欣欣是時學者尤盛冠帶搢紳逰辟雍而觀化者以億萬計又曰建武四年五月甲申皇子陽生豐下銳上顔赤色有似於堯上以赤色名之曰陽至十三年通春秋上循其頭曰吳季子陽對曰愚戇無比及阿乳母以問師傅曰太子所對師傅無以易其辭華嶠後漢書明帝性褊察嘗以事怒郎藥崧以杖撞崧崧走入牀下上怒甚疾言曰郎出郎出崧曰天子穆穆諸侯皇皇未聞人君自起撞郎上乃赦之又曰世祖既以吏事自嬰帝尤任文法摠攬威柄權不借下值天下初定四民樂業戸口滋植斷獄得情號居前世之十二中興已來追蹤宣帝夫以鍾離意之㢘淳諌諍懇懇以寛和為首以此推之斯亦難以徳言者也薛瑩漢紀賛曰明帝自在儲宫而聰允之徳著矣及臨萬幾約身率禮恭奉遺業一以貫之雖夏啟周成繼體持統無以加焉是以海内乂安四夷賔服斷獄希少有治平之風號曰顯宗不亦宜乎潜夫論曰明帝時公車以及吏皆不受章奏帝聞而恠之蠲其制後漢書曰明帝遵奉建武制度無敢違者後宫之家不得封侯與政舘陶公主光武之女為子求郎不許而賜錢千萬謂羣臣曰郎官上應列宿出宰百里茍非其人則人受其殃是以難之故吏稱其官民安其業逺近肅服戸口滋殖焉後漢書論曰帝善刑理法令分明日晏坐朝幽枉必逹外内無倖曲之私在上無矜大之色斷獄得情號居前世之十二故後之言事者莫不先建武永平之政然而鍾離意宋均之徒常以察慧為言夫豈𢎞人之度未優乎肅宗孝章皇帝東觀漢紀曰孝章皇帝諱炟孝明皇帝第五子也永平三年二月以皇子立為太子年四嵗㓜而聰逹才敏多識世事動容進止聖表有異壯而仁明謙恕温慈惠和寛裕廣博親愛九族矜嚴方厲威而不猛既志於學始治尚書遂兼五經周覧古今無所不觀由是上敬重之毎事諮焉永平十八年孝明皇帝崩帝即位范曄後漢書曰章帝建初元年詔有司明選舉進柔良退貪猾順時令理寃獄又詔以上林池籞田獵與貧人四年詔曰蓋三代遵人教學為本漢承暴秦褒顯儒術建立五經為置博士其後學者精進雖曰師承亦别名家孝宣帝以為去聖乆逺學不厭博故遂立大小夏侯尚書後又立京氏易至建武中復置嚴氏顔氏春秋大小戴禮博士此皆所以扶進㣲學尊廣道藝也孔子曰博學而篤志切問而近思仁在其中矣於是下太常將大夫博士議郎郎官及諸生諸儒㑹白虎觀講議五經同異使五官中郎將魏應承制問侍中淳于恭奏帝親稱制臨决如孝宣甘露石渠故事作白虎議奏今白虎通也元和二年正月詔書人有産子者復勿算三嵗令諸懐姙者賜胎養榖三斛復其夫勿算一嵗著以為令又詔三公曰方春生養萬物莩甲宜助萌陽以育時物其令有司罪非殊死且勿案騐章和元年八月南廵狩幸梁遣使祠沛髙原廟豐枌榆社二年正月帝崩於章徳前殿在位十二年時年三十一遺詔無起寢廟一如先帝法制𦵏敬陵廟曰肅宗論曰魏文稱明帝察察章帝長者章帝素知人厭明帝苛切事從寛厚感陳寵之義除慘獄之科深元元之愛著胎養之令奉承明德太后盡心孝道割裂名都以崇建周親平徭簡賦而人頼其慶又禮之以忠貞文之以禮樂故乃藩輔克諧羣后德讓謂之長者不亦宜乎東觀漢紀序曰書云孝乎惟孝友于兄弟聖之至要也朝乾夕惕寅畏皇天帝王之上行也明徳慎罰湯文所務也宻静天下容於小大髙宗之極至也肅宗兼茲四徳以繼祖考臣下百僚力誦聖徳紀述明詔不能辯章豈敢空言増廣以累日月之光袁山松後漢書曰孝章皇帝𢎞裕有餘明斷不足觀聽易惑外戚擅寵惜乎若明章二主損有餘而補不足則古之賢君矣薛瑩漢紀賛曰章帝以繼世承平天下無事敬奉神明友于兄弟息省徭賦綏静兆民除苛法蠲禁錮抑有仁賢之風矣是以隂陽協和而百姓安樂衆瑞並集不可勝載考之圗籍有徵云爾帝王世紀曰孝章皇帝以中和元三年生於京師其母姓秘不出號其墓曰長信冡三輔法録注曰何敞字文髙為汝南太守章帝南巡過郡有刻鏤屛風為帝張設詔命侍中黃香銘之曰古典務農雕鏤傷民忠在竭節義在脩身敞懼禮賢命士改脩徳化穆宗孝和皇帝東觀漢紀曰孝和皇帝諱肇章帝之中子也母曰梁貴人早薨上自岐嶷至總角孝順聰明寛和篤仁孝章由是深珎之以為宜承天位年四嵗以皇子立為太子初治尚書遂兼覧書傳好古樂道無所不照章和二年春二月章帝崩太子即位永元三年春正月帝加元服四年六月大將軍竇憲潜圗弑逆庚申幸北宫詔收捕憲黨皆下獄死使謁者收憲大將軍印綬遣憲及第篤景就國到皆自殺五年正月宗祀五帝於明堂遂登靈臺望雲物大赦天下自亰師離宫果園上林廣成囿悉以假貧人恣得捕不收其税十二年春正月上日以五經義異書傳意殊親幸東觀覧書林閲篇籍朝無寵族政如砥矢惠澤沾濡鴻恩茂篤外憂庶績内勤經藝自左右近臣皆誦詩書徳教在寛仁恕並洽是以黎元寧康方國協和貞符瑞應八十餘品帝讓而不宣故靡得而紀元興元年十二月帝崩于章徳前殿在位十七年時年二十七𦵏順陵廟曰穆宗帝王世紀曰穆宗之嗣世正身履道以奉大業賔禮耆艾動式舊典宫無嬪嬙鄭衛之讌囿無槃樂逰畋之豫躬履𤣥徳虚静自損是以屢獲豐年逺近承風云爾後漢書曰自竇憲誅後帝躬親萬幾每有灾異輙延問公卿極言得失舊南海獻龍眼荔枝十里一置五里一堠奔騰險阻死者相繼時臨武長汝南唐羗縣接南海乃上書陳狀帝下詔曰逺國珍羞本以薦奉宗廟茍有傷害豈愛人之本其勑令大官勿復受獻由是遂省焉續漢書曰孝和年十四能折外戚驕横之權即昭帝斃上官之類矣朝政遂一民安職業勤恤本務苑囿希幸逺夷稽服西域開泰郡國言符瑞八十餘品咸懼虛妄抑而不宣云爾范煜後漢書曰自中興以後逮于永元雖頗有弛張而俱存不擾是以齊民嵗増闢土世廣偏師出塞則漢北地空都䕶西指則通驛四方豈其道逺三代術長前世將服叛懐來自有數也孝殤皇帝東觀漢紀曰孝殤皇帝諱隆和帝之少子也和帝皇子數十生者輙夭故殤帝養於民元興元年十二月和帝崩是日倉卒殤帝時生百餘日乃立以為皇太子其夜即位尊皇后鄧氏為皇太后帝在襁褓太后臨朝延光元年八月帝崩于崇徳前殿年二嵗𦵏康陵又曰孝殤襁褓承統寢疾不豫夭命早崩國祚中絶社稷無主天下熬然頼皇太后孔子稱有婦人焉信哉恭宗孝安皇帝東觀漢紀曰孝安皇帝諱祐清和孝王第二子也少聰明敏逹慈仁惠和寛容博愛好樂施予自在邸第數有神光赤蛇嘉應照曜於室内又有赤蛇盤紆殿屋牀笫之間孝王常異之年十嵗善史書喜經籍和帝甚喜重焉號曰諸生數燕見禁中特加賞賜下及玩弄之物諸王子莫得與比殤帝即位鄧后臨朝以帝㓜小詔留於清河邸欲為儲副殤帝崩以王青蓋車迎帝齋于殿中拜為長安侯乃即帝位謙讓恪勤孜孜經學性樂恬澹委政太后永初元年十一月上始講尚書耽於典藝二年春正月帝加元服延光四年三月帝崩于葉帝在位十九年時年三十二御車所止上食百官待漏起居車騎鹵簿如故及還宫皇后與兄顯中常侍江亰樊豐等共興偽詐不容令羣臣知上道崩欲偽道得病遣司徒等分詣郊廟社稷告天請命誣罔靈祗以亡為存其夕發䘮羣寮百姓如䘮考妣塞外蠻夷致祭涕泣葬恭陵范曄後漢書論曰孝安皇帝雖稱尊享御而權歸鄧氏至損徹膳服克念治道然令自房帷威不逮逺始失根統歸成陵敝遂復計金授官移民逃冦推咎台衡以荅天眚既云哲婦亦惟家之索矣薛瑩漢書賛曰安帝之初委政太后十有餘年及親萬幾佞邪始進閹官用事寵加私愛阿母主聖勢傾朝廷遂樹姦黨揺動儲副山陵未乾蕭牆作難兵交禁省社稷殆危典略曰安帝永初元年以灾異免司空尹勤凡以灾冦故輙免三公多以卿為之或再三退而還復其故桓靈又甚自此始也少帝北卿侯續漢書曰安帝崩太子前已廢無餘子皇后與兄閻顯謀以北卿侯續為帝嗣三月立北卿侯皇太后臨朝十月辛亥北卿侯薨顯及江京等徴濟北河間王子欲以為嗣中黃門孫程王康等十九人共討江京等迎立濟隂王皇德傳曰安帝崩北卿侯即尊位十月北卿侯薨以王禮葬未即帝位不成君故以王禮葬太平御覽卷九十一
