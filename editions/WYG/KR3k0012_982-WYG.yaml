  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_982-1a, image: WYG0901/WYG0901-0610c.png}
body:
  text: 太平御覽卷九百八十二宋李昉等撰香部二蘇合安息薰陸流黄青木旃檀甘松艾納霍香楓香棧香木蜜栟香都梁沉香甲香迷迭零陵芸香蘇合續漢書曰大秦國合諸香煎其汁謂之蘇合梁書曰中天竺國出蘇合是諸香汁煎之非自然一物也又云大秦人採蘇合先筌其汁以為香膏乃賣其滓與諸國賈人是以展轉來逹中國不大香也傅子曰西國之人言蘇合香獸便也中國皆以為怪從征記曰劉表冡在髙平郡表卒𢷬四方珍香數十斛置棺中蘇合消疫之香畢備永嘉中郡人發其墓表如生香聞數十里廣志曰蘇合出大秦或云蘇合國人採之筌其汁以為香膏賣滓與賈客或云合諸香草煎為蘇合非自然一種也傅𤣥四愁詩曰佳人贈我蘇合香何以要之翠鴛鴦班固與弟超書曰竇侍中令載雜綵七百疋市月氐蘇合香安息晉書佛圖澄傳曰石勒時襄國城水源暴竭勒問澄澄曰當勅龍取水乃坐繩牀燒安息香呪願三日水㣲流有小龍五六寸隨水來須臾水大至唐書曰曹國出青黛安息青木等香薰陸魏畧曰大秦出薰陸抱朴子曰俘焚洲在海中薰陸香之所出薰陸香木膠也樹有傷穿膠因堕夷人採之以待估客所以賈不多得者所患狤掘獸噉之此獸斫刺不死投火中薪盡不焦以杖打之皮不傷而骨碎然后乃死廣志曰寄六出交州又大秦海邉人採與賈人易穀若無賈人取食之南方草木狀曰薰陸香出大秦云在海邉自有大樹生於沙中盛夏樹膠流出沙上夷人採取賣與賈人南州異物志同其異唯云狀如桃膠典術亦同惟云陶松栢法飲食之令人通神靈也于益期牋曰衆香共是一木木膠為薰陸流黄吳時外國傳曰流黄香出都毘國在扶南南三千餘里南州異物志同廣志曰流黄香出南海邉國青木隋書曰樊子蓋為武威太守車騎西廵將入吐谷渾子蓋以彼多瘴氣獻青木香唐書曰師子國出硃砂水銀薰陸鬱金蘇合青木等諸香南夷志曰崑崙國正北去蠻界西洱河八十一日程出象及青木香旃檀香紫檀香㯽榔琉璃水精蠡杯又曰南詔青木香永昌所出其山名青木山在永昌南三月日程廣志曰青木出交州天竺徐裏南方記曰青木香出天竺國不知其形南州異物志曰青木香出天竺是草根狀如甘草于益期牋曰衆香共是一木木節是青木香旃檀三國典畧曰周師䧟江陵初梁主以白檀根為梁武之像毎朔望親祭之軍人以其香也剖而分之竺法眞登羅山疏曰旃檀出外國元嘉末曾有人于山見一大樹圓䕃數畆三丈餘圍辛芳酷烈其間枯條數尺援而刃之乃白旃檀于益期牋曰衆香共是一木木根為旃檀崔豹古今注曰紫旃木出扶南林邑色紫赤亦謂紫檀也杜寶大業拾遺録曰夀禪師甚妙醫術作五香飲第一沉香飲次丁香飲次檀香飲次澤蘭飲次甘松飲皆别有法以香為法以香為主更加别藥有味而止渇兼于補益甘松廣志曰甘松出交州諸山艾納廣志曰艾納出西國樂府歌曰行胡從何方列國持何來氍毹㲪􅀈五木香迷迭艾納及都梁霍香廣志曰霍香出日南諸國吳時外國傳曰都毘在扶南山有霍香南方草木狀曰霍香民自種之五六月採曝之乃芬芳耳出交阯武平興古九眞地名也南州異物志曰霍香生都遜國属扶南形如都梁可以著衣服中劉欣期交州記曰霍香似蘇合范曄和香方曰靈霍虗燥于益期牋曰衆香共是一木木葉為霍香楓香南史曰任昉為新安太守嘗欲營佛齋調楓香二石始入三斗便出教長斷曰與奪自已不欲貽之後人南方記曰楓香樹子如鴨卵爆乾可燒魏武令曰房屋不潔聴得燒楓膠及蕙草棧香廣志曰棧香出日南諸國南方草木狀曰棧蜜香出都毘國不知蜜香樹若何但見香耳嶺表録異曰廣管羅州多棧香樹身似柳其花白而繁其葉如橘皮堪作紙名為香皮紙灰白色有紋如魚子牋其紙慢而弱沾水即爛遠不及楮皮者又無香氣或云沉香雞骨黄熟棧香同是一樹而根幹枝節各有分别者也南越志曰交州有密香樹欲取先㫁其根經年後外皮朽爛木心與節堅黑沉水者為沉香與水面平為雞骨最麄者為棧香木蜜異物志曰木蜜名曰香樹生千嵗根本甚大先伐僵之四五嵗乃往㸔嵗月乆樹材惡者腐敗唯中節堅直芬香者獨在耳魏王花木志曰廣志木蜜樹號千嵗樹根甚大伐之四五嵗乃取木腐者為香其根可食本草經曰木蜜一名蜜香味辛温栟香南方草木狀曰栟香莖生出烏滸都梁廣志曰都梁出交廣盛𢎞之荆州記曰都梁縣有小山山水清淺其中生蘭草俗謂蘭為都梁即以號縣沉香晉書曰石崇以奢豪矜物厠上常有十餘婢侍列皆有容色置甲煎粉沉香汁有如厠者皆易新衣而出客多羞脱衣而王敦脱故著新意色無怍羣婢相謂曰此客必能作賊又曰吳隐之至自番禺其妻劉氏齎沉香一斤隐之見遂投于湖亭之水梁書曰林邑國出吉貝及沉香木吉貝者樹名也其華成時如鵝毳抽其緒紡之以作布與紵布不殊亦染成五色織為斑布沉木香土人斫㫁積年以朽爛而心節獨在置水中則沉故名曰沉香次不沉不浮者曰棧香陳書曰至德二年乃於光照殿前起臨春結綺望仙三閣髙數丈並數十間其牖牕壁𢃄懸楣欄檻之類悉以檀香為之唐書曰先天二年十月親講武于驪山之下徵兵二十萬上親被戎服持沉香大搶立於軍前威振宇宙長安士庻奔走縱觀塡塞道路又曰長慶中波斯大賈李蘇沙進沉香亭子材左拾遺李漢上疏以為沉香亭與瑶臺瓊室同上頗怒其言特優容之金樓子曰扶南國衆香共是一木根便是旃檀節便是沉香花是雞舌葉是霍香膠是薰陸竺法眞登羅山疏曰沉香葉似冬青樹形崇竦其木枯折外皮朽爛肉乃香山雖有此樹而非香所出新㑹髙凉土人斫之經年肉爛盡心則為沉香出北景縣樹極高大土人伐之累年須外皮消盡乃剖心得香郭子横洞㝠記曰薰木鮮祗所獻色如玉而質輕泛之毘盧池為舟爛則沉矣碎其屑氣聞數百里氣之所至毒疫皆除杜寶大業拾遺録曰四年夏四月征林邑國兵還至獲彼國得雜香眞檀象牙百餘萬斤沉香二千餘斤又曰尚書令楊素大業中東都宅造沉香堂甚精麗新泥壁訖閉之三月後開視四壁並為新血所灑腥氣觸人異苑曰沙門支法存在廣州有八尺毾㲪又有沉香八尺板牀大元中王琰為州大兒劭求二物不得乃殺而籍焉南州異物志曰沉水香出日南欲取當先斫壊樹着地積乆外皮朽爛其心至堅者置水則沉名沉香其次在心白之間不甚堅置之水中不沉不浮與水面平者名曰棧香其最小者名曰已香于益期牋曰衆香共是一木木心為沉香甲香廣志曰甲香出南方南州異物志曰甲香螺屬也大者如甌面前一邉直攙長數寸圍殻岨峿有刺其掩可合衆香燒之皆使益芳獨燒則臭甲香一名流螺諸螺之中流螺味最厚范曄香方曰甲煎淺俗迷迭魏畧曰大秦迷迭廣志曰迷迭出西海中魏文帝迷迭賦曰余種迷迭于中庭嘉其揚條吐香馥有令芳乃為之賦曰坐中堂以遊觀覽芳草之樹庭舞妙麗于纎枝揚脩幹而結莖薄西夷之穢俗超萬里而來征豈衆卉之足方信希世而特生應瑒迷迭香賦曰振纎枝之翠粲動緑葉之莓莓舒芳香之酷烈乗凉風以徘徊陳琳迷迭賦曰立碧莖之婀娜鋪緑條之蟺蜿零陵南越志曰零陵香土人謂之鷰草芸香説文曰芸香似苜蓿淮南子曰芸可以死而復生雜字解釋話曰芸杜榮大戴禮夏小正曰採芸為朝菜禮記月令曰仲冬之月芸始生禮圖曰芸蒿白葉似邪蒿香美可食也魏畧曰大秦出芸膠洛陽宫殿簿曰顯揚殿前芸香一株徽音含章殿前各一株晉宫閣名曰大極殿前芸香四畦式乾殿前芸香八畦徽音殿前芸香雜花五畦明光殿前芸香雜花八畦顯揚殿前芸香二畦廣志曰芸香芸膠有安息膠有黑膠吳氏本草曰石芸一名敞列一名碩啄傅𤣥芸香賦序曰始以㣲香進御終於捐棄黄壤吁可閔也遂詠而賦之成公綏芸香賦曰美芸香之脩㓗禀隂陽之淑精莖類秋竹葉象春檉傅咸芸香賦序曰先君作芸香賦辭美高麗有覩斯卉蔚茂馨香同遊使余為序太平御覽卷九百八十二
