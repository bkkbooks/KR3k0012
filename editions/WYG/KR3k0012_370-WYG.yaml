body:
  text: 太平御覽卷三百七十宋李昉等撰人事部十一手掌指􅆶手釋名曰手湏也事業之所湏也毛詩碩人曰手如柔荑如荑之新生也又魏葛屨曰摻摻女手可以縫裳又衛風曰執子之手與子偕老又邶北風之詩曰北風其凉雨雪其霶恵而好我携手同行莫赤匪狐莫黒匪烏恵而好我携手同車又鄭風曰遵大路兮摻執子之手兮曲禮曰長者與之提携則兩手捧長者之手檀弓上曰孔子蚤作負手曵杖逍遥於門檀弓下曰原壤之母死夫子助之沐槨原壤登木歌曰貍首之斑然執女手之卷然又玉藻曰手容恭髙且正也又表記曰后稷天下之為烈也豈一手一足烈業也言后稷造稼穯天下後世以為業豈一手一足喻用之者多無數也傳曰宋武公生仲子仲子生而有文在其手曰為魯夫人故仲子歸於我又閔公曰成季之生也有文在其手曰友又宣上曰晉靈公不君宰夫臑熊蹯不熟殺之寘諸畚使婦人載以過朝趙盾士季見其手問其故而患之又曰楚侵鄭穿封戍囚皇頡公子圍與之争之正于伯州犂伯州犂上其手曰夫子為王子圍寡君之貴介弟也下其手曰此子為穿封戍方城外之縣尹也上下以導囚意又曰邑姜方娠太叔夢帝謂已余命而子曰虞將與之唐屬諸參而蕃育其子孫及生有文在其手曰虞遂以命之又曰齊魯戰于炊鼻舟堅射陳武子中手舟堅季氏臣也失弓而罵武子罵也以告平子曰有君子白晢黰鬚眉甚口甚口多口平子曰必子彊也子彊武子又曰昔叔向適鄭鬷蔑惡欲觀叔向従使之收器者而徃立於堂下一言而善叔向將飲酒而聞之曰必鬷明也下執其手以上又曰衛侯為靈臺於籍圃與諸大夫飲酒焉禇師聲子襪而登席古者見君觧襪公怒辭曰臣有病異於人足有瘡疾若見之君將歐歐嘔吐也許角切公愈怒禇師出公㦸其手曰必斷其足論語摘輔象曰仲弓鈎文在手是謂知始宰我手握戸是謂守道子㳺手握文雅是謂敏士公冶長手握輔是謂習道子貢手握五是謂受相公伯周手握直期是謂疾惡孝經援神契曰舜手握褒宋均注曰手中有褒字也喻従勞苦起受褒飾致天祚漢書曰蕭何聞韓信亡不及以聞自追之人有言上曰丞相何亡上怒如失左右手又曰孝武帝鈎弋趙媫妤家在河間帝廵狩過河間望氣者言有竒女天子使使召之既至女兩手皆拳上自披之手即時伸由是得幸號為拳夫人生昭帝又曰鮑永辟鮑恢為従事京師語曰貴戚歛手避二鮑後漢書曰劉寛欲朝婢翻羮汚朝衣手收之寛曰徐徐羮爛汝手乎又曰郭玉者廣漢人也學方􅐷之伎和帝竒異之乃試令嬖人美手腕者與女子雜處帷中使玉各􅐷一手玉言左陽脉右隂脉脉有男女疾若異人臣疑其故帝嘆稱善東觀漢記曰公孫述自言手文有竒瑞數移書中國上賜述書曰瑞應手掌成文亦非吾所知張璠漢記曰董卓於衆座中生斬人手足百姓嗷嗷魏畧曰鄧雄鳴詣太祖太祖執其手曰孤方入闗夢得神人即汝耶乃厚賜之王隠晉書曰初武帝未為太子文帝問裴秀曰人有相否秀曰中撫軍伸手過膝非人臣之相也又曰愍懐太子名遹字熈初恵帝晚成世祖遣才人謝玖給恵帝生愍懐與諸王子共戱惠帝来朝謂諸王子也執其手世祖曰是汝兒也乃縮手又曰髙平劉柔卧䑕囓其左手中指意甚惡之以問淳于智筮之曰䑕本欲殺君而不能當為使之反死乃以朱書其手腕横之後三寸為田字辟方一寸二分夜露手以卧其明有一大䑕伏死手前又曰郭文字舉入餘杭山蘇峻未亂之前詣臨安山中臨安令萬寵迎入縣中養病及峻黨破餘杭山臨安如故人始異之自後不復語但舉手指麾以宣其意病甚寵問先生可復得㡬日文三舉其手果以十五日終晉中興書曰范宣子陳留人也年十嵗能誦詩書嘗以刀傷手捧手改容人問痛耶答曰不足為痛但受全之體而致毁傷不可處耳家人以其年幼而異焉崔鴻前趙録曰劉翼驍幹過人能一手舉殿柱跳過平陽門又十六國春秋曰鄧淵父豹母呼延氏淵生而左手有文曰淵遂以命之又曰彭神符生而有文在其手曰神符梁書曰武帝手文曰武三國典畧曰梁劉之遴字思真文範先生虬之子也慱綜文史尚書令沈休之深敬器之右手偏直不得屈伸每書則以紙就筆唐書曰承乾數引侯君集入内問以自安之術君集以承乾劣弱意欲乗釁以圖之遂賛成不軌嘗舉手謂承乾曰此好手當為殿下用之老子曰代大匠斲希有不傷其手荘子曰曾子居衛緼袍無表手足胼胝墨子曰今謂人曰與子冠履斷子手足必不為何則冠履不若手足貴也争一言以相殺是義貴於身孟子曰嫂溺則援之以手乎曰嫂溺不援是豺狼也嫂溺則援之以手權也反於經而善者曰權韓子曰名實相湏而成形體相應而生故一手獨抃雖疾無聲故曰左手畫圎右手畫方則不兩成吕氏春秋曰客有言伍員扵王子光惡其容貌以告伍員曰􅂅王子居重惟見衣若手請因說之王子光許之子胥說之半舉惟摶其手而與之坐燕丹子曰太子與荆軻置酒美人鼓琴軻曰好手太子即斷其手以玉盤奉之又曰秦王斷荆軻兩手踞而罵曰吾坐輕易為竪子所欺太元經曰九體一為手足山海經曰柔利國為人一手勞人國面目手足盡異一臂國為人一手神仙傳曰金筒玉札内經皆云太上老子足踏二五手把十文鄭𤣥别傳曰𤣥惟有一子益恩有遺腹子𤣥以其手文似已名曰小同李郃别傳曰公長七尺八寸多鬚髯手握三公之字幽明録曰石勒問佛圖澄劉曜可擒兆可見不澄令童子齋七日取麻油掌中研之燎烸檀而咒有頃舉手向童子掌内宛然有異澄問有所見不曰惟見一軍人長大白晢有異望以朱縳其肘澄曰此即曜也其年果生擒曜異苑曰陶侃左手有文直達中指至上横節便絶占者以為此文若過位在無極侃針挑令徹血流彈璧乃作公字又取紙裹公迹愈明搜神記曰周暢少孝獨與母居每出入母欲呼之常自齧其手暢即應手痛而至治中従事未之信候暢時在田母齧手暢即歸班固幽通賦注曰齊桓公椅柱嘆曰天下竒珍易得但未得食人肉耳易牙歸斷其兒手以啖於君也掌釋名曰掌言可言排掌也春秋元命苞曰掌圓法天以運動孝經鈎命决曰仲尼虎掌是謂威射論語摘輔象曰澹臺滅明岐掌是謂正直戰國策曰蘇秦說李兊明日復徃抵掌而說兊送秦以明月之珠和氏之璧九州春秋曰公孫瓉為袁紹所圍曰天下兵起我謂可唾掌而决今視紹之兵革方始不如休兵積榖魏志曰上攻吕布於濮陽焚其東門布騎犯青州兵奔陣亂趨門門已燒上乗馬突火出堕馬燒左手掌司馬樓異扶上馬乃出魏略曰京兆鮑出有文才值世饑餓出求食飲噉賊人以䋲貫其母手掌驅去走追擊賊得其母還孟子曰行不忍人之政治天下可運之於掌上孫卿勸學曰有子惡卧而卒倉韋切其掌可謂能自忍矣祖範世要論曰有君好卧則刺其掌南方異物志曰烏滸人以人掌蹠為珍重以食長老指春秋元命苞曰指五者法五行傳曰楚人獻黿於鄭靈公公子宋與子家將入見公子宋子公也子家歸生也子公之食指動第二指也以示子家曰他日我如此必嘗異味及入宰夫将觧黿相視而笑公問之子家以告及食大夫黿召子公而不與子公怒染指於鼎嘗之而出又曰晉楚戰扵邲楚孫叔敖乗晉軍桓子不知所為鼓於軍中曰先濟者有賞中軍下軍争舟舟中之指可掬又曰吴伐越越王勾踐禦之陳于檇李靈姑浮以戈擊闔廬靈姑浮越大夫闔廬吴王也傷將指取其一屨將指中央指亦曰大拇指還卒于陘去檇李七里史記曰髙祖過趙趙王張敖自持案進食禮甚恭髙祖箕踞罵之是時趙午等數十人皆怒謂趙王曰人遇王如是臣等請為死王齧指出血曰君何言之誤且先人失圖賴陛下徳流子孫公等奈何言若是漢書曰髙祖與匈奴連戰㑹于樓煩十月寒氷堕指十二三後漢書曰蔡順少孤養母嘗出求薪有客猝至母望順不還乃噬其指順即心動棄薪馳歸跪問其故母曰有急客来吾噬指以悟汝耳謝承後漢書曰梁國車章為本縣功曹令黄奉為人所誣章證其無罪下筆立辭乃以斧斫左手五指閉口死扵獄中晉書曰武帝與胡貴嬪争樗蒲傷其指帝怒曰此固將種也嬪曰北伐公孫西拒諸葛非将種而何唐書曰太宗嘗閒宴頋謂李勣曰朕将屬以幼孫思之無越卿者公徃不遺於李密今豈負於朕哉勣雪涕致詞因噬指流血俄而沉醉乃觧御衣覆之荘子曰駢拇枝指出乎性哉而侈於徳枝於手者樹無用之指也又曰以指喻指之非指不若以非指喻指之非指也又曰指窮為薪而火傳也墨子曰桀有勇力之人大戱紂有勇力之人費仲惡来崇侯虎並指畫殺人孟子曰養其一指而失肩背而不知也則為狼疾人矣鄒醫養人疾治其一指而不知其害之此為也狼籍亂不知治疾之人也肩背之有疾以至此抱朴子指測海指極則謂水盡猶目察百歩而云見極也吴越春秋曰夫差聞孔子至吴㣲服觀之或人傷其指王怒欲索國而誅子胥諫乃止吕氏春秋曰倕巧人也不愛倕之指而愛巳之指捜神記曰曽子従仲尼在楚而心動辭歸問母曰思之齧指孔子聞之曰曾子至誠也精感萬里孝子傳曰樂正子者曾參門人也来候參參採薪在野母齧右指旋頃走歸見正不語入跪問母何患母曰無參曰負薪右臂痛薪墜地何謂無母曰向者客来無所使故齧指呼汝耳參乃悲然列仙傳曰漢武帝廵太山稷邱君冠章甫擁琴来拜曰陛下勿上上必傷足及上數里右足指果折上諱之故但祠而還列仙傳曰廣漢龎伯妻叚有美色早寡父母欲嫁之援刀割指以自誓陳留耆舊傳曰吴祐為膠東相安邱男子母邱長共母到市遇醉客罵母長怒殺之為吏所得繫獄祐問知無子令妻入遂有身臨刑齧指斷吞之謂妻曰若生男名曰吴生云我臨死吞指為誓屬子報吴君班固幽通賦注曰管仲射小白中其鈎白陽僵鮑叔割指血塗之傾盖以覆之哭曰吾君死矣魯攝兵爪釋名曰爪紹也筋極為爪以紹續指端也詩鴻鴈祈父曰祈父予王之爪牙胡轉予于恤靡所止居史記曰成王少時病周公乃自剪其爪沈之河以祀于神曰王少未有識干神命者乃旦也亦蔵策於府成王病瘳及成王用事人或譛周公周公奔楚成王發見周公之禱書乃泣而歸周公謝承後漢書曰㑹稽戴就為郡倉曹掾太守為州所奏就見收持鉄針刺手爪中使以把土就十爪皆堕地終無撓辭魏畧曰臨樂國王生浮屠身色黄髮青如絲爪赤如銅續晉陽秋曰義熈五年群盗發卞壼墓剖棺虜掠壼屍僵鬚髮蒼白靣如生人兩手悉拳爪甲乃長穿逹手背焉三國典略曰齊王誅諸元姻黨死者凡七百二十一人悉投屍於漳水剖魚者得人爪甲鄴都為之不食魚南史曰羊侃有伎着七寸鹿角𤓰彈筝一時無對韓子曰韓昭侯除爪而陽亡一爪求之甚急左右因取爪而效之昭侯以此察左右之誠不淮南子曰古将之出鑿㓙門設眀衣剪指爪許慎注曰明衣遺終衣也剪手足指爪者示必死也帝王世紀曰湯伐桀後大旱七年遂齋戒剪髮斷爪以己為犧牲禱於桑林之社夏侯湛新論曰爪生於肉去爪而肉不知列異傳曰神仙麻姑降東陽蔡經家手𤓰長四寸經意曰此女子實好佳手􅂅得以搔背姑大怒忽見經頓地而目流血劉欣期交州記曰刺史陶璜晝卧覺見一女子枕其臂始欲投之以爪㨯其手痛不可忍放之遂飛去太平御覽卷三百七十
