body:
  text: 太平御覽卷一百六十九宋李昉等撰州郡部十五淮南道揚州楚州濠州夀州滁州和州廬州舒州蘄州申州光州安州黄州沔州揚州元和郡縣圖志曰揚州廣陵郡禹貢九州揚州其一也春秋時屬吳七國屬楚秦滅楚為廣陵併天下屬九江郡漢為江都國建武元年復曰揚州左氏哀九年曰呉城䢴溝通江淮也魏志曰黄初六年征吳幸廣陵城臨江觀兵見江濤洶湧嘆曰天所以限南北也隋書曰大業元年詔修江都宫治龍舟鳯舸黄龍赤艦樓船萬艘以幸江都宋書曰徐湛之為揚州起風亭月觀吹臺琴室又曰揚州刺史王謐薨髙帝次應入輔劉毅等不欲帝入議以中領軍謝混為揚州欲令帝于丹徒領州以二議諮帝劉穆之謂帝曰揚州根本所係不可假人前授王謐事出權道今若復他授便應受制于人一失權柄無由可得帝從之郡國志曰廣陵以城置在陵上故曰廣陵此陵交帶崑崙連接西蜀一名蜀岡一名崑崙岡鮑昭蕪城賦曰拖以漕渠軸以崑岡河圖括地象曰崑岡之山横為地軸漢志曰廣陵國髙帝六年置景帝四年更名江都莽曰江平江都易王非廣陵厲王胥皆都此漢書曰廣陵厲王賜䇿曰嗚呼小子胥受兹赤社建爾國家封于南土古人有言曰大江之南五湖之間其人輕心揚州保强保恃也三代要服不及以正要服次荒服之内正政也要一遥反圖經曰江陽縣本漢江都縣也以在江之北故曰江陽漢志曰江都屬廣陵國又曰海陵縣臨淮郡莽曰亭間十道志曰六合縣本秦堂邑縣春秋時棠也左傳襄十四年楚子為庸浦之役故子囊師于棠庸浦棠皆楚邑楚州元和郡縣志曰楚州淮隂郡禹貢揚州之域春秋時屬吳越戰國時屬楚秦屬九江郡漢為射陽縣之地漢志曰射陽縣屬臨淮郡莽曰監淮亭在射水之陽故曰射陽又曰廣陵王胥有罪其相勝之秦奪王射陂張晏曰射水之陂在射陽縣晉書曰穆帝時中郎將荀羡北討云舊淮隂地形都要水陸交通易以觀釁沃野有開植之利方舟運漕無他屯阻乃營立城池焉郡國志曰北對清泗臨淮守險有平陽石龜田稻豐饒吳越春秋曰吳將伐齊自廣陵掘溝通江淮即州地也史記曰越滅吳而不能正江淮北楚東侵廣地于泗上漢志曰旴􅇇屬臨淮郡都尉治莽曰武匡南兖州記曰旴􅇇本春秋時善道地漢書曰項羽立楚懷王孫心為楚懷王都旴􅇇南兖州記曰南兖州地有鹽亭百二十三所縣人以魚鹽為業略不耕種擅利巨海用致饒沃公私商運充實四逺舳艫千計吳王所以富國强兵而抗漢室也圖經曰寶應縣本安宜縣即漢之安平縣地屬廣陵郡唐書曰天寳初有李氏女子既嫁而寡為尼名真如忽有人自天而下以寶與之因名寶應濠州十道志曰濠州鍾離郡禹貢揚州之域春秋時為鍾離子國戰國時屬吳秦置三十六郡屬九江郡漢置鍾離縣春秋成十五年曰叔孫僑如㑹吳于鍾離始通吳也始與中國接又昭二十四年曰楚子為舟師以略吳疆遂滅巢及鍾離史記楚平王十年吳之邊邑卑梁女與楚邊邑鍾離小童爭桑兩家交怒相攻楚伐卑梁人卑梁大夫怒發兵攻鍾離楚王聞之大怒吳亦發兵使公子光伐楚遂滅鍾離莊子曰莊子與惠子遊於濠梁之上見儵魚出遊從容莊子曰是魚樂乎惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂也史記曰昔禹㑹諸侯于塗山執玉帛者萬國十道志曰塗山在臨淮郡西又曰招義縣本漢淮陵縣漢志曰淮陵縣屬臨淮郡莽曰淮陸壽州元和郡縣志曰壽州壽春郡禹貢揚州之域秦併天下為九江郡漢為淮南國伏滔正淮論曰爰自戰國至于晉之中興六百餘年保淮南者九姓稱兵十有一人皆亡不旋踵禍溢於世彼壽春者南引荆州之利東連三吳之地北接梁宋平途不過二百里西援陳許水陸不出千里外有江湖之阻内保淮淝之固龍泉之陂良田萬頃舒六之貢利盡蠻越金石皮革之具萃焉苞木管竹之族生焉其俗尚氣力而多勇悍其人習戰爭而貴詐偽所以屢多亡國也史記曰楚考烈王自陳徙都壽春號之曰郢又項羽本紀曰項羽封英布為九江王都六盡有江淮之地左傳文五年曰楚成大心仲歸帥師滅六仲歸子家冬楚公子燮滅蓼今安蓼縣臧文仲聞六與蓼滅曰臯陶庭堅不祀忽諸德之不建民之無援哀哉漢志曰壽春合肥受南北湖皮革鮑木之輸亦一都㑹也鮑鮑魚也木謂楓柟之屬壽春記曰三國時江淮為戰爭之地其間數百里無復人居晉平吳其民乃還本土復立為淮南郡齊書曰髙祖初遣垣崇祖鎮壽陽謂之曰我新有天下魏必以送劉昶為辭壽春賊之所衝宜為之備既而果然乃敗還十道志曰霍丘縣本漢松兹縣也漢志曰松兹侯國屬廬江郡莽曰誦善十道志曰霍山縣灊縣也漢志曰灊縣屬廬江郡天柱山在南史記曰吳王闔閭四年伐楚取灊滁州元和郡縣志曰滁州永陽郡春秋時楚地在漢為全椒縣也漢志曰全椒縣屬九江郡十道志曰隋以為滁州以滁水為名郡國志曰後漢彭城劉平為全椒令虎皆渡江和州元和郡縣志曰和州厯陽郡禹貢揚州之域春秋及戰國時為楚地秦為厯陽縣屬九江郡漢為淮南國郡國志曰厯陽西有遏胡城即王導築以禦石虎漢志曰厯陽都尉治屬九江郡莽曰明義十道志曰南有厯水故曰厯陽淮南子曰厯陽之都一夕為湖十道志曰麻湖在縣西十里漢書曰漢王追項羽至江東城烏江亭長艤舟待之廬州元和郡縣志曰廬州郡古廬子國也春秋舒國之地十道志曰戰國其地蓋楚秦置三十六郡屬九江郡漢為合肥焉左傳僖公三年曰徐人取舒杜預注云舒國今廬江舒縣也尚書曰成湯放桀于南巢魏志曰青龍元年滿寵為揚州都督請于合肥城西三十里置新城表曰合肥城南臨江湖北達壽春賊攻圍之得據水為勢官兵救之當先破賊大軍然後圍乃得解賊往甚易其救甚難今城西三十里有竒險可依立城固守此所謂引賊平地而犄其歸路也詔從之廬江記曰人物語音風土明茂皆勝淮北諸郡漢志曰廬江郡故淮南文帝十六年别為國領縣十二又曰龍舒屬廬江郡應劭曰羣舒之邑又曰居巢屬廬江應劭曰春秋楚人圍巢巢國也左傳昭二十五年曰楚子使熊相禖郭巢巢國也郡國志曰濡須水出自巢湖謂之馬尾溝十道志曰慎縣本漢浚遒縣漢志曰浚遒縣屬九江郡舒州釋例曰舒有五名舒國庸舒龍舒舒鳩舒城其實一也左傳定二年曰吳子使舒鳩民誘楚人元和郡縣志曰舒州桐安郡禹貢揚州之域春秋時皖國也十道志曰春秋時為楚東鄙戰國時屬楚秦置三十六郡為江夏郡史記曰皖匽姓咎繇之後也春秋時楚滅之漢志曰皖屬廬江郡續漢書郡國志曰廬江縣自舒縣徙居皖魏志曰正始二年孫權遣諸葛恪屯皖城以伺邊隙吳志曰曹公遣朱光為廬江太守屯皖大開稻田吕蒙上言曰皖地肥美若一收熟彼衆必増如是數嵗操態見矣宜早除之於是權親征皖破之宋書州郡志曰晉安帝於舊皖城置懷寧縣圖經曰桐城春秋時桐國也亦漢樅陽縣左傳定二年曰桐反楚桐小國也廬江舒縣有桐鄉漢書曰元封五年南廵狩至於盛唐自尋陽浮江射蛟江中獲之舳艫千里薄樅陽而出作盛唐樅陽之歌蘄州十道志曰蘄州蘄陽縣禹貢揚州之域春秋及戰國時並屬楚秦置三十六郡屬九江郡漢蘄春縣之地漢志曰蘄春屬江夏郡史記曰始皇十六年滅楚虜王負芻於蘄地名記曰蘄春以水隈多蘄菜以水為名晉書曰武帝以宣太后諱春改為蘄陽吳志曰魏使廬江謝寄為蘄春郡典農吕蒙襲破之賀齊傳曰初晉宗為戱口將以衆叛如魏還為蘄春太守圖襲安樂取其保質權以為恥因軍初罷六月盛夏出其不意詔齊督麋芳鮮于丹等襲蘄春生虜宗吳復置蘄春郡申州十道志曰申州義陽郡禹貢荆州之域春秋時申國之地秦為南陽郡地漢置平氏縣屬荆州漢武封北地尉衛止為義陽侯魏武帝分南陽立義陽郡宋文元嘉末為義陽郡立司州周武帝為申州輿地志曰義陽三闗之險十道志曰三闗者平靖闗張老云此闗因山為障不營城隍故名平靖其一也武陽黄峴為二闗在安州應山縣界光州十道志曰光州弋陽郡禹貢揚州之域春秋弦子國秦置三十六郡屬九江漢為西陽縣左傳僖五年曰楚人滅弦弦在弋陽軑縣弦子奔黄漢志曰西陽屬江夏郡又曰軑屬江夏故弦子國圖經曰定城縣春秋黄子國也十三州志曰定城置在古黄子國南十二里十道志曰定城本漢弋陽縣漢志曰弋陽侯國屬汝南郡弋山在西北故黄國今黄城是也十道志曰固始縣本寢丘孫叔敖所封之邑也又曰殷城縣漢期思縣也漢志曰期思屬汝南郡故蔣國也左氏傳曰凡蔣周公之裔也安州十道志曰安州安陸郡春秋䢵子之國雲夢之澤在後焉楚滅䢵封鬭辛為鄖公則其地也戰國屬楚秦併天下為南郡地漢為安陸縣宋武置安陸郡唐武德四年為安陸州黄州十道志曰黄州齊安郡禹貢荆州之域戰國時屬楚秦為南郡地漢為西陵縣髙齊置衡州隋開皇三年為黄州又曰麻城黄陂縣本漢西陵縣也沔州十道志曰沔州漢陽郡禹貢荆州之域春秋鄖國之地戰國時屬楚秦併天下為南郡地漢為安陸縣地晉立沌陽縣屬江夏郡沌音篆唐武德四年置沔州尚書禹貢曰逾于沔漢上曰沔三國志曰魏初定荆州沌陽以為重鎮晉書曰永嘉六年王敦表陶侃為荆州刺史鎮沔陽宋書州郡志曰晉於臨障山置沌陽縣荆州記曰臨障山南峯謂之烏林峯亦謂之赤壁吳志曰曹公臨荆州孫權遣周瑜程普為左右督領萬人遇於赤壁大破曹公軍永初山川記曰沔口古以為滄浪水屈原遇漁父處太平御覽卷一百六十九
