body:
  text: 太平御覽巻八百三十二宋李昉等撰資産部十二獵下王孫子曰趙簡子獵於晉陽之山撫轡而歎董安于曰主君歎敢問何故簡子曰汝不知也吾廐養食榖之馬以千數官養多力之士日數百欲以備畋獵恐隣國養賢以獵吾也莊子曰趙簡子田鄭龍為右有一野人簡子曰龍下射彼使無驚吾鳥龍曰昔吾闕為踐土之盟不戮一人吾今一朝田而必曰為闕人將故救之簡子愀焉曰不愛其身以活人者可無闕乎環車輟田曰人之田也得獸今吾田也得人又曰梁君出獵見白鴈羣下下車彀弩欲射之道有行者不止白鴈羣駭梁君怒欲射行者其御公孫龍撫轡曰今主君以白鴈故而欲射殺人無異於虎狼梁君援其手與歸呼萬嵗曰樂哉今日獵也人皆得獸吾獨得善言尸子曰宓羲氏之世天下多獸故敎民以獵也韓子曰孟孫獵得麑使西秦巴持之其母隨而呼之西秦巴不忍而與其母孟孫適至求麑對曰予不忍而與其母孟孫大怒逐之居三月復召為其子傅曰夫子不忍於麑且忍吾子乎又曰魏文侯與虞人期獵明日㑹天疾風左右止侯侯不聽曰不可疾風失信吾不為遂犯風往而罷虞人穆天子𫝊曰天子東田于澤至於重壁之䑓盛姬告病又曰天子獵于滲澤於是得白狐𤣥貉焉以祭于河宗以將事於河宗獲此故用又曰天子大饗正公諸侯王勤七萃之士勤猶勞也于羽陵之上乃奏廣樂六師之人翔畋于曠原得獲無疆鳥獸絶羣六師之人大畋九日乃收皮效物於是載羽百車國語曰晉趙簡子田于螻螻晉君囿史黯聞之以犬侍于門黯晉大夫史墨時為簡子史犬田犬門君囿門也簡子見之曰何為曰有所得犬欲試之兹囿兹此也簡子曰何為不告對曰君行臣從不從不順羣從法臣從君主將適螻而麓不聞麓主君苑囿之官𫝊曰山林之木衡麓守之臣敢煩當日當日直日也言主將之君囿不煩麓以告君臣亦不敢煩主之直日白主君也簡子乃還呂氏春秋曰齊有好獵者久不得獸所以不得狗惡故也欲得良狗則家貧乃還疾耕疾耕則家富家富則有以求良狗狗良則數得獸矣非獨獵也百事皆然春秋後語曰魏信陵君嘗與王共博於是北境舉烽火𫝊趙寇至王釋博欲召大臣議之信陵君曰趙王獵耳非為寇也復博如故王恐心不在博居有頃復從北方𫝊言趙王獵耳非為寇也王大驚曰公子何以知之信陵君對曰臣之客有能探趙王隂謀者趙王所為客輙以報臣臣以此知之六韜曰文王畋于渭陽見呂尚坐茅以漁太公金匱曰紂以六月獵於西土發人逐禽民諌曰天務覆施地務長養今盛夏發民逐禽而元元命懸於野民踐之百日不食紂以為妖殺之新序曰晉文公出田逐獸碭入大澤迷不知所為漁者送文公出澤漁者曰鴻乃保大海之中厭而徙之小澤則必有丸矰之憂黿保於深淵厭而出之淺渚則必有網羅之憂今君逐獸碭入至此何行之太逺也君歸國臣亦反漁所又曰晉文逐鹿而失之問農夫老古曰吾鹿何在老古以足指曰如是往公曰寡人問子子以足指何也老古振衣而起曰不意人君至此虎豹之居也厭閑而近人故人亦得之諸侯厭衆而亡其國惟鵲有巢惟鳩居之今君不歸人將居之於是文公恐而歸又曰晉文公畋于虢見一老父問曰虢亡何也對曰虢君斷則不能用人也文公輟畋而歸趙襄子曰其人安在公曰吾未與之俱來襄子曰君聽其言而棄其身文公於是乃召而賞之說苑曰楚莊王獵大夫諌之王曰吾就獵求士也榛薄刺虎知其勇也摶犀獲兕知其勁也罷畋而分所得知其仁也由此道得三士可乎又曰晉平公有馳逐之車錯以羽芝㑹羣臣觀焉田差三過不顧白虎通曰王者諸侯所以畋狩者何也為田除害上以供宗廟下以簡集士衆也蔡邕月令章句曰季秋之月天子乃教于田獵閑肆五兵因以順時取禽其禮將軍執晉皷師率執提旅率執鼙以教坐作進退徐疾之節璅語曰范獻子卜獵占之曰君子得􅷞小人遺冠獻子獵無所得而遺其冠潛夫論曰昔有司原氏獵於中野鹿東奔司原從而譟之西方之衆有逐狶者聞司原之譟竟舉音而和之司原反覆追之乃得大狶喜以為瑞陸子曰欲水之清則勿涉欲草之茂則勿獵杜夷幽求曰獵者嗜肉不多於不獵及其凌岡巒赴谿嶺而有遺身之志語林曰夏少明在東國不知名聞裴逸民知人乃裹粮寄載入洛從之未至家少許見一人着黄皮袴褶乘馬將獵問曰裴逸民家逺近答曰君何以問夏曰聞其名知人故從㑹稽來投之裴曰身是逸民君明可更來明往逸民果知之用為西明門侯於此遂知名石勒别𫝊曰冬十一月大雪平地三尺勒主簿程朗諌勒不從出獵墜馬顧左右曰不從主簿之言而致墜馬賜朗絹百疋以旌忠亮續搜神記曰晉中興後譙郡周子文家在晉陵少時喜射獵嘗入山忽山岫間見一人長五丈許提弓箭箭鏑頭廣二尺許白如霜雪忽出喚曰阿䑕阿䑕子文小字子文不覺應曰諾此人牽弓滿鏑向子文子文便失魂厭伏又曰呉末臨海人入山射獵為舍住夜中有一人長一丈着黄衣白帶來謂射人曰我有讎尅明日當戰君可見助當厚相報射人曰自欲助君何以相報答曰明日食時君可出溪邊敵從北來我南往應白帶者我黄帶者彼射人許之明出果聞岸北有聲狀如風雨草木四靡視南亦爾惟見二大虵長十餘丈於溪中相遇白虵勢弱人即引弩射之黄虵即死日將暮復見前人來辭謝云住此一年獵明年慎勿復來來必為禍射人曰善遂停一年獵所獲甚多家致巨富數年後憶先所獲多乃忘前言復更往獵見先白帶人語之言我語君勿復更來不能見用讎子已大今必報君非我所知射人聞之甚怖便欲走乃見三烏衣人皆長八尺俱張口向之射人即死世說曰孫盛為庾公記室叅軍從獵將其子齊莊行庾公不知忽於獵塲見齊莊時七八嵗庾謂曰若亦復來耶應聲答曰所謂無小無太從公于邁異苑曰慕容皝出畋見一老父曰此非獵所王宜還也皝明晨復去值有白兎馳馬射之墜石而卒又曰桓南郡好獵騁良馬馳擊若飛䨥飄所指行陣不整麏兎騰逸叅佐無不被撃呉地記曰長洲在姑蘇南太湖北岸闔閭所遊獵處也呉主遣徐詳至魏魏太祖謂詳曰孤比老願濟横江之津與孫將軍遊姑蘇之上獵長洲之苑吾志足矣詳對曰若越横江而遊姑蘇是踵亡秦而躡夫差恐天下之事去矣太祖大笑曰徐生無乃逆詐乎鄴中記曰石虎少好遊獵後體壯大不復乘馬作獵輦二十人擔之如今之步輦上安徘徊華葢當坐處安轉關牀若射鳥獸直有所向關隨身而轉虎善射矢不虛發襄陽耆舊𫝊曰楚王好遊獵之事揚鑣馳逐乎華容之下射鴻乎夏水之濵弋說文曰矰弋射矢也毛詩緇衣女曰鷄鳴士曰昧旦子興視夜明星有爛將翺將翔弋鳬與鴈詩義問曰以繳繫矢而射弋言加之與子宜之又大雅桑柔曰嗟爾朋友予豈不知而作如彼飛蟲時亦弋獲禮記月令曰季春之月畢弋無出九門蔡邕章句曰繳射曰弋左𫝊襄公上曰曹伯陽好田弋曹鄙人公孫强好弋獲白鴈而獻之且言田弋之說論語述而曰子曰弋不射宿春秋後語曰楚項襄王時人有好以弱弓微繳加歸鴈之上者王聞之召而問焉對曰外臣之好射鶀鴈羅鸗小矢之發也何足為大王道哉且楚王之大以大王之賢所弋非直此也昔者三王以弋道徳五霸以弋戰國夫秦魏燕趙王之鶀鴈也齊魯鄭者青首也鄒費郯邵者羅鸗也其餘不足射也見鳥六雙惟王何取王若以聖人為弓勇士為繳時張而射之此六雙者可得而囊載也其樂非特朝夕之樂也韓詩外𫝊曰齊景公出弋昭華之池使顔涿聚主鳥而亡之景公怒而欲殺之晏子曰夫涿聚有死罪三臣請以其罪數而誅之晉中興書曰桓石秀豁第二子代叔父冲為江州刺史雖入門貴盛不以榮爵嬰心惟以弋釣為事後魏書曰劉逖字長子聰敏好弋獵騎射以行樂為事呉越春秋曰樂野者越王所弋獵處也故曰樂野管子曰國子弟之無上事衣食不節率子弟不田弋獵者幾何人既無上事乃率子弟不田農但弋獵也又曰桓公弋在廪管仲朝公㢮弓脫靬音汗而迎之曰今夫鴻鵠春北而秋南而不失其意惟有羽翼以適其意於天下者也今孤之不得意於天下皆非二子之憂也二子不對列子曰蒲旦子之弋弱弓纎繳乘風振之連雙鶬於青雲之際用心專動手均也韓子曰田子方問唐易鞠曰弋者何慎對曰鳥以數百目視子子以二目御之子謹周子廪田子方曰善子加之弋我加之國鄭張者聞之曰子方知欲為廪而未得所以為廪夫虛無見者廪也一日齊宣王問弋於唐易子曰弋者奚貴唐易子曰在於謹廪王曰何謹廪對曰鳥以數十目視人人以二目視鳥奈何其不謹廪也故曰在於謹廪然則為天下何異為此廪今人主以二目視一國一國以萬目視人主將何以自為廩乎又曰衛人有佐弋者鳥至因先以捲麾之鳥驚而不可得也又曰夫弩弱而矰高者激於風也身不肖而令行者得助於衆也韓子曰齊宣王問匡倩曰儒者弋乎匡倩對曰否也弋者從下害於上者也是從下傷君也儒者以為害義故不弋淮南子曰蒲旦子連鳥於百仭之上弓良也蒲旦子楚人善射弋劉白别録曰有行過江上弋鴈賦行弋賦雌得雄賦法言曰鴻飛𠖇𠖇弋者何簒簒取也太𤣥經曰弋彼三飛終日不歸稽康與山濤書曰弋釣草野而吏卒守之不得妄動二不可也羅周禮夏官上羅氏曰羅氏掌羅烏鳥烏謂卑居鵲之屬蜡則作羅襦襦細密之羅襦讀為繻有衣襦之繻也仲春羅春鳥獻鳩以養國老春鳥蟄而始出者若今南郡黄雀之屬是時鷹化為鳩鳩與春鳥變舊為新宜以養老助生氣耳毛詩國風曰有兎爰爰雉離于羅鳥網為羅又小雅曰鴛鴦于飛畢之羅之爾雅曰鳥罟音古謂之羅羅絡也國語曰里革諌魯宣公曰鳥獸孕水䖝成獸虞於是乎禁􅆯羅列仙𫝊曰李仲甫夜卧床上或為鴞鳥跱架候北風當飛渡南海山上有羅得鴟視之仲甫也向羅者笑王子年拾遺記曰晉文公焚林以求介子推有白鵶繞烟而噪或集介子推之側火不能焚晉人嘉之於山數百里不復設羅網幽明録曰有一傖士行反小兒放牛野中伴輩數人見一鬼依諸叢草間處處設網欲以捕人設網後未竟傖小兒竊取前網仍以罨之即縳得鬼文子曰有鳥將來張羅而待之得鳥者羅之一目今為一目之羅無得鳥焉鶡冠子曰一目之羅不可以得雀闕子曰任公子冬羅鯉於山阿衆人皆以為惑既而鸇鶚擊黄雀觸公子羅者千萬數劉棋魯都賦曰長罼掩壑大羅被澤罝毛詩關雎曰兎罝后妃之化也關雎之化行則莫不好徳賢人衆多也肅肅兎􅆯㭬之丁丁﨣﨣武夫公侯干城爾雅曰兎罟謂之罝郭璞注曰罝遮也犍為舍人曰兎自作徑路張罝以捕之顧譚新言曰設罝於淵施網於岡欲民之慎亦如此也終無魚兎矣物理論曰夫欲定天下而任小人猶欲捕麋鹿而張兎罝不能擊麋鹿猶小人不能任大事罦韓詩曰有兎爰爰雉離于罦爾雅曰罬謂之罦罦覆車也今之翻車也有兩轅中施胄以捕鳥展轉相觧廣異語說文曰罦覆車也罿韓詩曰有兎爰爰雉離于罿薛君注曰張羅車上曰罿也爾雅曰繴謂之罿罿罬也郭璞曰今翻車也有兩轅中施􅇢以捕鳥罻說文曰罻捕鳥网也禮記王制曰鳩化為鷹然後設罻羅罼䍐禮記月令曰季春罼翳無出九門鄭𤣥曰網小柄長謂之罼翳射者所以自隱也蔡邕月令章句曰掩飛禽曰罼說文曰罼罔也率捕鳥罼象絲網上下其革柄也罞爾雅曰麋罟謂之罞郭璞注曰冒其頭也犍為舍人曰麋有難制張罞也羉爾雅曰彘罟謂之羉羉幕也犍為舍人曰彘剛惡齕人故張網而羅之也磻纂文曰磻射石也繳列仙𫝊曰赤將子輿者黄帝時人不食五榖而噉百草華至堯時為木工能隨風雨上下市中賣繳故謂之繳父淮南子曰堯使羿繳大風於青丘之野大風鷙鳥也青丘東方也環濟典略曰繳綸也綸于前望飛鳥而射之夢書曰夢横繳欲舉薦太平御覽巻八百三十二
