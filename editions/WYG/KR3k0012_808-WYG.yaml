  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_808-1a, image: WYG0900/WYG0900-0168c.png}
body:
  text: 太平御覽卷八百八宋李昉等撰珍寳部七琥琥珀馬腦琉璃車渠頗黎水精雲母瑟瑟琥説文曰琥發兵瑞玉為琥文周禮春官上大宗伯曰白琥禮西方周禮秋官下小行人曰合六幣琥以繡也左𫝊昭七曰魯昭公疾徧賜大夫大夫不受予子家雙琥一環一璧受之大夫皆受其賜吕氏春秋曰戰鬬用琥琥珀廣雅曰琥珀珠也生地中其上及旁不生草淺者五尺深者八九尺大如斛削去皮成琥珀初時如桃膠凝堅乃成其方人以為枕出􅀶南縣典略曰大秦國多琥珀續漢書曰哀罕夷出光珠琥珀吳書曰虞翻少好學有髙氣年十二客有候其兄者不遇遇翻翻追與書曰僕射琥珀不取腐芥慈石不受曲針過而不存不亦宜乎客得書竒之由是見稱沈約宋書曰武帝時寜州常獻琥珀枕甚光麗時將北征以琥珀治金瘡上大悦命𢷬碎分付諸將西京雜記曰宣帝有身毒寳鏡一枚大如八銖錢常以琥珀笥盛之異物志曰琥珀之本成松膠或以作杯瓶華陽國志曰珠冗出光珠琥珀能吸芥西域諸國志曰摩盧水邊沙中有矩要鋒窠燒治以為琥珀𤣥中記曰楓脂輪如地中千秋為琥珀􅀶物志曰松脂淪如地中千年化為茯苓千年化為琥珀琥珀一名江珠今太山有茯苓而無琥珀益州永昌出琥珀而無茯苓或復云燒蜂窠所作未詳此二説拾遺記曰昔漢武寳鼎元年西方貢珍􅀈有琥珀鷰置之靜室自於室内鳴翔又曰吳主聞潘夫人有色令進其圖圖成吳主見之驚喜以琥珀如意撫大即折曰此神女也因納之又曰孫引為悅鄧夫人月下舞水精如意誤傷其頰令太醫療之以白獺骨和琥珀末塗之遂差神農本草經曰取雞卵㱭黄白渾雜者熟煮及尚軟隨意刻作物以苦酒漬數宿既堅内粉中佳者亂真矣左思蜀都賦曰琥珀丹青珠江瑕英潘尼詩曰駕言遊西岳寓目二華山金樓琥珀階象榻瑇瑁筵中有神秀士不知幾何年馬瑙廣雅曰馬瑙石次玉也魏畧曰大秦國多馬腦凉州記曰吕纂咸和二年盗發張陵得馬腦鍾榼北齊書曰武平中除傅伏為東雍州刺史㑹周克并州遣韋孝寛來招伏曰并州已平故遣公兒來報便宜執下授上大將軍武鄉郡開國公即給告身以金馬瑙二酒鐘為信伏不受北史曰梁主蕭詧曾獻馬瑙鍾周文帝執之顧丞即曰能擲樗蒲頭盧者便與鍾已經數人不得頃至薛端乃執樗蒲頭而言曰非為此鍾可貴但思露其誠耳五子皆黒文帝大悦即以賜之古今注曰魏武帝以瑪瑙石為瑪瑙勒拾遺記曰帝顓頊時有丹邱國獻瑪瑙罋以盛甘露充於厨丹邱之地有夜又駒䟦之鬼能以赤瑪瑙為瓶盂及樂器皆精妙于中國有者一云瑪瑙者惡鬼之血凝成此物也黄帝將有瑪瑙甕至堯時猶在甘露在其中盈而不竭𤣥中記曰瑪瑙出月氐魏文帝曰瑪瑙勒賦曰玉属也出自西域文理交錯有似瑪瑙故其方因以名之陳琳瑪瑙勒賦曰託瑶溪之寳岸臨赤水之朱波陸機靈龜賦曰若車渠統理瑪瑙縟文龜甲錯黿龍鱗王粲瑪瑙勒賦曰遊大國以廣觀兮覧希世之偉寳緫衆材而課美兮信莫藏于瑪瑙琉璃孝經授神契曰神靈滋液則琉璃鏡廣雅曰琉璃珠也韻集曰琉璃火齊珠也漢書地理曰武帝使人入海市琉璃續漢書曰哀牢夷出火精瑠璃漢武故事曰武帝好神仙起同神屋扉悉以白瑠璃作之光照洞徹又曰漢成帝為趙飛鷰造服湯殿緑瑠璃為户魏畧曰大秦國出赤白黒黄青緑紺縹紅紫十種琉璃魏書曰天竺國人商販至京自云能鑄石為五色琉璃於是採礪山石于京師鑄之既成光澤美于西方來者乃詔為行殿容百餘人光色映徹觀者見之莫不驚駭以為神眀所作自此中國琉璃遂賤人不復珎之吳歴曰黄龍扶南諸外國來獻琉璃晉書曰王濟侈豪帝常幸濟宅供饌甚豐悉貯琉璃器中帝甚美之又曰汝南王醼公卿以琉璃鍾行酒酒及崔洪洪不肯執問其故曰慮有執玉不趍之義洞㝠記曰東方朔得五色露以琉璃器盛之獻武帝拾遺記曰董偃設紫琉璃屏風世說曰滿􅁬畏風在晉帝坐北忩作琉璃扉實宻似疎奮有寒色帝笑􅁬答曰臣猶吴牛見月而喘吳牛水牛也南土多暑而水牛畏熱見月疑是日所以喘􅁬太尉之孫寵也廣志曰琉璃出黄支斯調大秦日南諸國南州異物志曰琉璃本質是石欲作器以自然灰治之自然灰狀如黄灰生南海濵亦可浣衣用之不須淋但投之水中滑如苔石不得此灰則不可釋十州記曰方丈山土有琉璃宫杜篤論都賦曰槌蜯蛤碎琉璃諸葛恢集曰詔荅恢今致琉璃枕一𫝊咸汚巵賦曰人有遺予琉璃巵者小兒竊弄墮之不潔意既惜之人有感物之汙辱乃䘮其所以為寳况君子行身而可以有玷乎左思吳都賦曰致逺琉璃珂􅀈孫公逹琵琶賦曰囘風臨樂刻琉璃車渠廣雅曰車渠石次玉也魏畧曰大秦國多車渠古今注曰魏武帝以車渠為酒杯𤣥中記曰車渠出天竺國古車渠椀賦曰車渠玉属多纎理縟文出于西國其俗寳之小以繫頸大以為器王粲車渠椀賦曰雜𤣥黄以為質似乾坤之未分兼五徳之上美超衆寳而絶倫陳思王車渠盌賦曰惟盌之所生於涼風之浚湄光如激電景若浮星何神怪之瓌瑋信一覧而九驚王處道車渠觶賦曰温若騰螭之升天曜似遊鴻之逺臻頗黎梁四公子記曰扶南大舶從西天竺國來賣碧頗黎鏡面廣一尺五寸重四十斤内外皎㓗置五色物於其上向明視之不見其質問其價約錢百萬貫文帝令有司筭之傾府庫當之不足其商人言此色界天王有福樂事天㴻大雨雨衆寳山納之山藏取之難得以大獸肉投之藏中肉爛類寳一鳥衘出而得此寳焉舉國不識無敢酬其價者唐書曰髙宗上元二年十二月㧞汗船王般碧頗黎及地黄龜兹白玉素稽獻銀頗黎天竺記曰大雪山中有寳山諸七寳並生取可得唯頗黎寳生髙峰難得𤣥中記曰大秦國有五色頗黎紅色最貴十州記曰崑崙山上有紅碧頗黎宫色七寳堂是也水精廣雅曰水精謂之石英續漢書曰衰牢夷出水精魏略曰大秦國一名黎難宫室皆水精為柱食器亦然廣志曰水精出大秦黄支國十洲記曰崑崙山上有水精闕山海經曰堂庭山多水玉今水精也列仙𫝊曰赤松子服水玉拾遺記曰周靈王二十三年起昆昭之臺餙水精為泥又曰鬱夷國于山上架樓室向明以開户牖以水精火藻為階司馬相如上林賦曰水玉磊砢劉楨魯都賦曰水精潜光于雲冗也劉公幹清慮賦曰入鐐碧之間出水精之都上青雘之山蹈琳瑉之塗雲母春秋運斗樞曰樞星散為雲母漢書曰王莾侍中侍詔有說莾鴟目虎吻豺狼聲者莾誅待詔而封告者後常翳雲母屏風非親近莫得見范􅁮後漢書曰鄭𢎞為太尉第五倫為司空初倫為㑹稽召𢎞署督郵每朝𢎞曲躬自卑帝聽置雲母屛風分隔其間晉陽秋曰孫秀降賜雲母車梁書曰南岳鄧先生名都荆州建平人也少而不仕隱居衡山極峻之嶺立小板屋兩間足不下山谷斷三十餘載惟以澗水服雲母屑日夜誦大洞經唐書曰吳王杜伏威性好左道因合金丹求長生之術常服雲母散又曰尉遲敬徳遂飛練白石間居伏雲母粉淮南萬畢術曰雲母入地千嵗不朽雲母在足無踐棘註曰取大雲母塗足下踐棘不能匊淮南子曰雲母來水雲母石可致水抱朴子曰雲母五色多青者名雲英宜以春服之多赤者名雲珠宜以夏服之多白者名雲液宜以秋服之多黒者名雲母宜以冬服之但有青黄二色者名雲砂宜以季夏服之皛皛純白者名嶙石可四時長服又曰吳景帝戍將于廣陵掘塜有人如生棺中雲母厚尺許西京雜記曰晉幽王塜甚髙羙門關皆是石坐撥除深入乃得雲母深處見百餘尸縱横相枕籍皆不朽惟一男子餘皆女子或坐或立或卧衣服形色不異生人又曰成帝設雲母帳雲幄雲幕于甘泉紫殿世謂之三雲殿晉公卿禮秩曰賜太宰安平拾合雲母輦晉宫闕名曰含元池中有雲母舡洛陽宫殿記曰宫中有林商等觀皆雲母置忩裏日照之煒煒有光列仙𫝊曰方囘尭時隐人練石雲母三齊記曰東武城有雲母山山有雲母因以為名安期先生常所逰餌東園秘記曰以雲母壅尸則亡人不朽馮貴人素國色亡已十餘年塜為賊所發形貌如故但冷耳盗共奸通之后捕得之此賊言貴人棺有數斛雲母石虎鄴中記曰虎作雲母五明金薄扇裴淵廣州記曰增城縣有雲母向日照之光耀地理志曰琅琊定山出雲母王建平典術曰雲母有五名其色青黑五色亂文者名曰雲母白而微者名曰雲英如水露黄白名雲沙青白赤雜者名曰雲珠黄白而赤重厚名陽起石雲母根也其中黒文班如錢名雲膽傷人不可服第一磷石第二雲母第三雲珠第四雲英五雲光服磷石夀五千服雲母夀三百年服雲英千年服雲光與天地同保瑟瑟明皇雜録曰上於華青宫作數十間屋又為銀鏤添船至于檝棹皆餙以珠玉又于湯中壘瑟瑟及沉香為山以狀􅘵洲方丈又曰虢國夫人奪韋氏宅造中堂既成召匠圬墁授二百萬償其直而復以金盃三瑟瑟二斗為賞後曾有暴風㧞樹委其堂上已而視之略有所傷既撤瓦以觀之皆以木瓦其𫝊作精緻皆此類也玗琪說文曰玗石之似玉者也爾雅曰東方之美者醫無閭之珣玗琪山海經曰開明北有玗琪樹玗琪玉属太平御覽卷八百八
