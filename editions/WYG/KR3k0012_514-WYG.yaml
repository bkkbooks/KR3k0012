  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_514-1a, image: WYG0897/WYG0897-0593c.png}
body:
  text: 太平御覽卷五百一十四宋李昉等撰宗親部四兄弟上釋名曰兄荒也荒大也故青徐人謂兄曰荒弟弟也相次第而生也説文曰兄長也周易曰家人卦曰父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣尚書曰五子之歌曰太康尸位以逸豫滅厥德黎民咸貳乃盤遊無度畋於有洛之表十旬不反有窮后羿因民弗忍距於河厥弟五人御其母以從傒於洛之汭五子咸怨述大禹之戒以作歌又君陳王若曰君陳惟爾令德孝恭惟孝友於兄弟克施有政又康誥王若曰孟侯朕其弟小子封孔安國曰封康叔名稱小子明當受教訓惟乃丕顯考文王克明德慎罰弗敢侮鰥寡庸庸祇祇威威顯民爾雅曰男子先生為兄後生為弟又曰張仲孝友善父母為孝善兄弟為友毛詩常棣曰常棣燕兄弟也閔管蔡之失道故作常棣焉常棣之華蕚不韡韡凡今之人莫如兄弟死喪之威兄弟孔懐原隰裒矣兄弟求矣鶺鴒在原兄弟急難每有良朋况也永歎兄弟䦧於墻外禦其侮每有良朋烝也無戎䘮亂既平既安且寧雖有兄弟不如友生儐爾籩豆飲酒之飫兄弟既具和樂且孺又何人斯曰伯氏吹塤仲氏吹箎土曰塤竹曰箎云伯仲喻兄弟也又頍弁曰爾酒既㫖爾肴既嘉箋云㫖嘉皆美也汝酒已美矣汝肴已美矣何以不用與族人燕也言其知能具禮而弗為之也豈伊異人兄弟匪他又氓曰兄弟不知咥其笑矣静言思之躬自悼矣又葛藟曰綿綿葛藟在河之漘終逺兄弟謂他人昆謂他人昆亦莫我聞又曰杕杜刺時也君不能親其宗族骨肉離散獨居而無兄弟将為沃所并爾有杕之杜其葉湑湑獨行踽踽豈無他人不如我同父嗟行之人胡不比焉人無兄弟胡不佽焉有杕之杜其葉菁菁獨行睘睘豈無他人不如我同姓嗟行之人胡不比焉人無兄弟胡不佽焉又六月曰四牡廢則君臣缺矣皇皇者華廢則忠信缺矣常棣廢則兄弟缺矣又陟岵曰陟彼岡兮瞻望兄兮兄曰嗟予弟行役夙夜必偕上慎旃哉猶來無死又沔水曰嗟我兄弟邦人諸友莫肯念亂誰無父母又曰黄鳥刺宣王也刺其以隂禮教親而不至聮兄弟之不固也黄鳥黄鳥無集於桑無啄我􅆝此邦之人不可與明言旋言歸復我諸兄又斯干曰兄及弟矣式相好矣無相猶矣又行葦曰戚戚兄弟莫逺具爾或肆之筵或授之几又角弓曰角弓父兄刺幽王也不親九族而信讒佞骨肉相怨故作是詩也騂騂角弓翩其反矣兄弟婚姻無胥逺矣此令兄弟綽綽有裕不令兄弟交相為瘉又将仲子刺荘公也不勝其母以害其弟弟叔失道而公弗制祭仲諫而公弗聽小不忍而致大亂焉将仲子兮無踰我墻無折我樹桑豈敢愛之畏我諸兄仲可懐也諸兄之言亦可畏也又揚之水曰揚之水不流束楚終鮮兄弟維予與汝無信人之言人實誑汝揚之水不流束薪終鮮兄弟維予二人無信人之言人實不信又皇矣曰維此王季因心則友則友其兄則篤其慶載錫之光又蓼蕭曰蓼彼蕭斯零露泥泥既見君子孔燕豈弟宜兄宜弟令德夀豈為兄亦宜爲弟亦宜禮記王制曰兄之齒鴈行朋友不相踰又檀弓曰子栁之母死子碩請具子栁曰何以哉子碩曰請粥庶弟之母子栁曰如之何其粥人之母以葬其母也不可既葬子碩欲以賻布之餘具祭器子栁曰不可吾聞之也君子不家於䘮請班諸兄弟之貧者周禮春官曰大宗伯之職以脤膰之禮親兄弟之國脤膰祭社稷宗廟之肉也賜以同姓之國福祿也兄弟有供先王者也魯定公十四年天王使石尚来歸脤也儀禮醮辭曰㫖酒既清嘉薦亶時亶誠也古文亶為庳始加元服兄弟具來孝友時格永乃保之左傳桓公曰宋穆公疾召大司馬孔父而屬殤公焉曰先君舍與夷而立寡人寡人不敢忘若以大夫之靈得保首領以歿先君若問與夷其将何辭以對請子奉之以主社稷寡人雖死亦無悔焉對曰羣臣願奉馮也公曰不可先君以寡人為賢使主社稷若棄德不讓是廢先君之舉也豈曰能賢光昭先君之令德可不務乎吾子其無廢先君之功使公子馮出居於鄭杜預曰公子馮穆公子也穆公卒殤公即位又襄公曰宋向戍來聘且尋盟見孟獻子尤其室曰子有令聞而美其室非所望也對曰我在晉吾兄為之毁之重勞且不敢問杜預曰傳言獻子友於兄且不隠其實也又文公上曰穆伯如莒莅盟且為襄仲逆及鄢登城見之美鄢城莒邑自為娶之仲請攻之文公將許之叔仲惠伯諫惠伯叔牙孫也曰吾聞之兵作於内為亂於外為宼宼猶及人亂自及也今臣作亂而君不禁以啟宼讐若之何公止之惠伯成之平二子使仲舍之公孫敖返之還莒女也復為兄弟如故又文下曰齊人歸公孫敖之䘮為孟氏且國故也葬視共仲聲已不視帷堂而哭襄仲欲勿哭惠伯曰䘮親之終也惠伯叔彭生也雖不能始善終可也史佚有言曰兄弟至美救乏賀善弔災祭敬喪哀情雖不同毋絶其愛親之道也子無失道何怨於人襄仲說帥兄弟以哭之又昭元曰秦后子有寵於桓如二君於景后子秦桓公子景公母弟鍼也其權寵如両君也其母曰弗去懼選鍼適晉其車千乗曰秦伯之弟鍼出奔晉罪秦伯也后子享晉侯造舟於河十里舍車自雍及綘取酬幣終事八反司馬侯問曰子之車盡於此而已乎對曰此之謂多矣若能少此吾何以得見焉又隱公曰鄭荘公弟共叔叚居京謂之京城大叔祭仲諫曰都城過百雉國之害也無使滋蔓蔓草猶不可除况君之寵弟乎又襄公曰吴子諸樊既除喪将立季札杜預曰札諸樊弟也辭曰曹宣公之卒也諸侯與曹君将立子臧子臧去之遂弗為也以成曹君君子曰能守節君義嗣也諸樊適子故曰義嗣誰敢干君有國非吾節也札雖不才願附於子臧以無失節固立之棄其室而耕乃舍之傳言季札之讓且明吳兄弟相𫝊又曰兄弟天倫兄前弟後天之倫次論語曰周有八士伯達伯适仲突仲忽叔夜叔夏季隨季騧包氏曰周時四乳生八子皆為顯士故記之也又曰子路問曰何如斯可謂之士矣子曰切切偲偲怡怡如也可謂士矣朋友切切偲偲兄弟怡怡馬融曰切切偲偲切責之貌也怡怡和順之貌也又為政曰或謂孔子曰子奚不為政子曰書云孝乎惟孝友於兄弟施於有政是亦為政奚其為為政又顔淵曰司馬牛憂曰人皆有兄弟鄭𤣥曰牛兄桓魋行惡䘮死故曰我亡兄弟我獨亡子夏曰商聞之矣死生有命富貴在天君子敬而無失與人恭而有禮四海之内皆兄弟也君子何患乎無兄弟也包氏君子䟽惡而友賢九州之人皆可以禮親之史記曰伯夷叔齊孤竹君之二子也父欲立叔齊及卒叔齊讓伯夷伯夷曰父命也遂逃去叔齊不肯立而亦逃之國人立其中子輙於是伯夷叔齊聞西伯善養老徃歸焉又曰信陵君無忌謂魏王曰秦與戎翟同俗有虎狼之心不顧親戚兄弟禽獸耳故太后母也而以憂死穰侯舅也功莫大焉而竟逐之兩弟無罪而再奪之國此於親戚若此而况於仇讐之國乎又曰漢五年漢王與項羽相距京索之間數使勞苦丞相蕭何鮑生謂丞相曰王暴衣露蓋數使勞苦君者有疑君心焉為君計遣君子孫昆弟能勝兵者悉謁軍所上必益信君於是何從其計漢王大恱又曰卜式者河南人也以田畜為事親死式有少弟弟壮式脫身出門分獨取畜羊百餘田宅財物盡與弟式入山牧羊十餘嵗羊至千餘買其田宅而其弟盡破其産式輙復分與弟者數矣又曰周公旦武王弟也及武王即位旦常輔翼武王用事居多又曰朱公居於陶中男殺人囚於楚朱公告其少弟生徃視之乃裝黄金千鎰置褐器中載以一牛車且遣其少子朱公長男請欲行不聽長男曰家有長子曰家督今弟有罪大人不遣乃遣少弟是吾不肖欲自殺其母為言公從之長男竟持其弟喪歸至其母及邑人盡哀之唯朱公獨笑曰吾固知必殺其弟也彼非不愛其弟也顧有所不能於心者也是少與我俱見苦為生難故重棄財至如少弟者生而見我富乗堅駈良逐狡兎豈知財所從來故輕棄之吾前日所以為欲遣少子固為其能棄財而長者不能故卒以殺其弟事之理也無足悲者吾固日已望其喪之來也又曰蒙恬弟毅仕至上卿出則驂乗入則御前蒙恬任外事而毅常為内謀名為忠信故雖諸将相莫敢與之爭焉又曰漢王滅項籍立為皇帝田横懼誅與其徒屬五百餘人入海居島中髙帝聞之以為田横兄弟本定齊齊人賢者多附焉乃使赦田横罪而召之田横與其客二人乗傳詣洛陽謂其客曰横始與漢王俱南面稱尊今漢王為天子而横乃為亡虜北面事之其恥固已甚矣且吾烹人之兄與弟併肩而事主縱彼畏天子詔不敢動我獨不愧於心乎遂自剄令客奉其頭從使者馳奏之髙帝曰嗟乎以匹夫起布衣兄弟三人更主豈不賢哉為之流涕又曰季布弟季心氣蓋闗中遇人謙謹為任俠方數千里士皆爭為之死當是時季布以諾季心以勇著聞又曰衛青為侯家人少時歸其父父使牧羊先母之子皆奴畜之不以為兄弟青常數至甘泉居室有一鉗徒相青曰貴人也官封侯青笑曰人奴之生得無笞罵即幸矣何得封侯漢書曰陳平陽武戸牖人也少時家貧好讀書有田三十里與兄伯居伯常耕田縱平㳺學又曰何武字君公蜀郡郫人武兄弟五人皆為郡縣敬憚之又曰田蚡封武安侯為丞相召客飲坐其兄蓋侯北郷自坐東郷以為漢相尊不可以兄故私撓由此滋驕又曰丞相韋賢封武陽侯長子方山早終次子𢎞少子𤣥成初𢎞為太常丞職奉宗廟典諸陵邑煩劇多罪過父賢以𢎞當為嗣故勑令自免𢎞懐謙不去官及賢病篤𢎞竟坐宗廟事繋獄罪未决室家問賢當為後者賢恚不肯言於是賢門生博士等與宗室計議共矯賢令以𤣥成為後賢薨𤣥成在官聞䘮又言當為嗣𤣥成深知其非賢主意即揚為病狂妄笑語士大夫多疑其欲讓爵遜兄者丞相御史劾奏之不得已受封爵又曰左馮翊韓延夀行縣至髙陵有昆仲相訟曰延夀耻不能明教化因入傳舍閉閣思過於是訟者自髠肉袒謝罪又曰嚴延年兄弟五人有吏才至大官東海號其母曰萬石嚴嫗又曰金日磾兩子賞建俱為侍中與昭帝畧同年共卧起賞為奉車建駙馬都尉及賞嗣侯佩兩綬上謂霍將軍曰金氏兄弟兩人不可使俱兩綬耶霍光對曰賞自嗣父為侯耳上笑曰侯不在我與将軍乎光曰先帝之約有功廼得封侯又曰張延夀已歴位九卿既嗣侯國在陳留别邑在魏租入稅千餘延夀曰以身無功德何以能久堪先人大國數上書讓减户邑又因弟陽都侯彭祖口陳至誠天子以為有讓廼徙封平并一國戸口如故而租稅减半又曰王商字子威􅃰郡蠡吾人商少為太子中庶子以肅敬敦厚稱父薨商嗣為侯推財以分異母諸弟身無所受居喪哀戚於是大臣薦商行可以勵羣臣義足以厚風俗宜備近臣繇是擢為諸曹侍郎中郎将范􅁮後漢書曰光武郭后諱聖通真定槀人也為郡著姓父昌讓田宅財産數萬與母弟國人羡之又曰馬援字文淵扶風茂陵人也援三兄况余貟並有才能援年十二而孤少有大志諸兄竒之甞受齊詩意不能章句廼辭况欲就邉郡田牧况曰汝大才當晚成良工不示人以樸直從所好㑹况卒援行服朞年不離墓所太平御覽卷五百一十四
