body:
  text: 太平御覽卷一百六十三宋李昉等撰州郡部九河北道下蒲州絳州晉州澤州潞州遼州沁州隰州慈州汾州并州石州嵐州代州忻州蔚州朔州雲州蒲州十道志曰蒲州河東郡置在河東縣本漢蒲坂地左傳曰晉獻公滅魏以賜畢萬服虔注曰在晉蒲坂史記曰季布為河東太守文帝謂布曰河東吾股肱郡博物志曰河東有山澤近鹽沃土之人不才少有名人魏志杜畿傳曰畿為河東太守開學宫後河東多儒者春秋左氏傳曰晉人謀去故絳諸大夫皆曰必居郇瑕氏之地郇瑕古國名河東解縣西北郇域沃饒而近鹽國利君樂不可失也韓獻子曰不可郇瑕氏土薄水淺其惡易覯易覯則民愁民愁墊隘於是乎有沈溺重膇之疾不如新田土厚水深居之不疾有汾澮以流其惡夫山澤林鹽國之寶也國饒則民驕佚近寶則公室乃貧不可謂樂公說從之郡國志曰猗氏縣猗頓所居之地猗頓魯窮士也問術於陶朱公公教之蓄五牸遂富漢因之名縣史記曰魏都安邑惠王三十一年秦用商君東侵地至河而齊趙數破敗我安邑近秦於是徙居大梁漢志曰河東郡秦置莽曰兆陽領縣二十四又曰蒲反故曰蒲秦更名莽曰蒲城應劭曰秦始皇東廵見長坂故因加反孟康云晉文公以賂秦人還蒲魏人喜曰蒲反矣遂名之師古曰應說是絳州元和郡縣志曰絳州絳郡禹貢冀州之域春秋時屬晉戰國時為魏地秦三十六郡為河東郡後漢書曰章帝元和三年行幸安邑觀鹽池晉太康地志曰安邑有司鹽都尉别領兵五千圖經曰晉穆侯遷都於絳其曾孫孝侯改絳為翼翼為晉之舊都後獻公復為絳絳在今曲沃故城二里有絳邑故城是故絳在翼城東南有故翼城是也十道志曰正平縣有九原一名九原即趙簡子觀處禮記曰趙文子與叔譽觀於九原文子曰死者如可作也吾誰與歸叔譽曰其陽處父乎文子曰行并植於晋國不殁其身其智不足稱也其舅犯乎文子曰見利不顧其君其仁不足稱也我則隨武子乎利其君不忘其身謀其身不遺其友漢書曰元鼎六年幸緱氏至此聞南越破遂立為聞喜縣圖經曰聞喜縣有董澤左傳曰董澤之蒲可勝既乎晉州元和郡縣志曰晉州平陽郡禹貢冀州之域堯舜所都周為冀州地春秋時屬晋戰國時屬韓秦為河東郡地十道志曰本漢平陽縣地漢志曰平陽縣屬河東郡以其在平水之陽故名之前趙錄曰太史令言於元海曰蒲子﨑嶇非可久安平陽唐堯所都於是徙居平陽也兩河記曰洪洞縣以地山嶺重複控據要險故曰洪洞焉漢志曰襄陵屬河東郡王莽曰幹昌有晉襄公之陵因以名十道志曰霍邑漢彘縣也漢志曰彘屬河東郡周厲王所奔也莽曰黄城澤州元和郡縣志曰澤州髙平郡禹貢冀州之城春秋時屬晉戰國時屬韓後魏屬韓秦兼天下置并州今州即上黨郡髙都縣地史記曰秦使武安君白起攻趙趙發兵拒秦秦大破趙於長平長平在髙平縣西北有長平故城十道志曰澤州以濩澤為名漢志曰濩澤屬河東郡禹貢析城山在其西南濩音胡郭反墨子曰舜漁於濩澤十道志曰晉城縣本漢髙都縣也漢志曰髙都屬上黨郡有天井闗元和郡縣志曰髙平縣本漢泫氏縣也泫音胡𤣥反漢志曰泫氏屬上黨泫水所出竹書紀年曰梁惠王九年晉取泫氏史記曰趙成侯十六年與韓魏分晉封晉君以端氏潞州元和郡縣志曰潞州上黨郡禹貢冀州之域殷為黎國春秋時屬晉又兼有潞子之國秦為上黨郡地左傳宣十五年曰潞子嬰兒之夫人晉景公之姊也鄷舒為政而殺之又傷潞子之目鄷舒潞相晉侯伐之滅潞鄷舒奔衛衛人歸晉晉人殺之戰國䇿曰秦有安邑則韓必無上黨以逺韓近趙故卒歸趙隋圖經曰上黨南陽古以為縣實都也漢志曰上黨郡秦置屬并州有上黨闗又曰壺闗屬上黨郡黎侯國今有黎亭釋名曰上黨黨所也在山上其所最髙故曰上黨上黨記曰髙下赤壌其地山阻百姓不居即此郡也圖經曰後周建徳七年于襄垣縣立潞州以其侵汾潞為名漢志曰長子縣屬上黨郡周史辛甲所封師古曰長讀長短之長竹書紀年曰梁惠王十二年鄭取屯留尚子即長子之地也左傳㐮公十八年晉人執衛行人石買於長子執孫蒯於屯留長子屬上黨又曰鄭伯如晉晉人執諸銅鞮晉太康地記曰銅鞮故晉大夫羊舌赤邑世號赤為銅鞮伯華漢以為縣遼州圗經曰遼州樂平郡禹貢冀州之域春秋時其地屬晉戰國屬韓後屬趙秦漢為上黨郡貞觀中避諱改為儀州後又為箕州復為遼州十道志曰和順縣本漢沾縣地即趙閼與邑史記曰秦昭㐮三十八年攻趙閼與趙奢曰其道逺險阨譬如兩鼠鬬於宂中將勇者勝乃使趙奢將大破秦軍乃解閼與之圍漢書髙帝紀曰韓信破代相夏説於閼與漢志曰沾縣屬上黨郡有沾水出壺闗沾音他兼反沁州十道志曰沁七浸切州陽城郡本漢榖逺縣地元和郡縣志曰禹貢冀州之域春秋時其地屬晉戰國時屬韓在秦為上黨郡地今州即漢上黨之榖逺漢志曰榖逺屬上黨郡王莽曰榖近晉地記榖逺今名孤逺後代語訛耳十道志曰綿上縣亦榖逺縣之地以縣西有綿上焉盖晉介之推地隰州圗經曰隰州大寧郡夏殷已前其地與箕沁同在周為晉之北鄙元和郡縣志曰禹貢冀州之域春秋時為晉地七國時屬魏秦為河東郡地漢為蒲子縣屬河東郡國語曰驪姬謂晉獻公曰蒲與二屈君之疆也不可以無主若太子主曲沃二公子主蒲與屈乃可以威民而懼戎蒲即蒲子縣郡國志曰隰州前二里有泉下隰故取下隰之義為名十道志曰永和縣本漢狐讘縣也讘音之渉反漢志曰隰州屬河東郡慈州元和郡縣志曰慈州文成郡禹貢冀州之域春秋時晉之屈邑獻公子夷吾所居也秦併天下屬河東郡漢地理志曰北屈王莽曰朕北應劭曰有南屈故稱北瓚曰汲郡古文翟章救鄭次于南屈左傳僖公二年晉荀息請以屈産之乗與垂棘之璧假道於虞以伐虢屈地生良馬元和郡縣圗曰吉昌縣有姚㐮城西臨黄河控帶龍門孟門之險周齊交争之地齊後主武平二年遣斛律明月破周兵於此城下郡國縣道記曰吕香本漢之北屈漢志曰騏屬河東郡侯國汾州十道志曰汾州西河郡禹貢冀州之域其在虞夏及周屬并州春秋時晉地六國時屬趙秦併天下地屬太原郡左傳昭元年曰昔金天氏有裔子曰昧為𤣥冥師生允格臺駘臺駘能業其官宣汾洮障大澤以處太原太原晉陽也帝用嘉之封諸汾川又昔髙辛氏有二子伯曰閼伯季曰實沈居於曠林不相能也后帝不臧遷閼伯於商丘主辰商人是因遷實沈於大夏主參唐人是因大夏今晉陽縣其季世曰唐叔虞及成王滅唐而封太叔焉故參為晉星叔虞封唐是為晉侯又昭二年曰齊陳無宇送女晉侯謂之少齊謂陳無宇非卿執諸中都中都晉地在河西介休縣又僖二十四年曰晉侯賞從亡者介之推不言禄禄亦弗及遂隠而死晉侯求之不獲以緜上為之田曰以志吾過且旌善人元和郡縣志曰子夏居西河吳起守西河皆謂此也禮記檀弓曰子夏喪其子而喪其明曽子弔之子夏哭曰天乎予之無罪也曽子怒曰商汝何無罪也吾與汝事夫子於洙泗之間退而老於西河之上使西河之民疑汝於夫子爾罪一也唐書曰髙祖初起兵帥次霍邑隋將宋金剛拒不得進屯軍賈胡堡會霖神語曰若向霍邑當東南傍山取路八日雨止我當助破之賈胡堡在靈石縣也并州元和郡縣志曰并州太原府禹貢冀州之域春秋時為晉戰國時為趙地秦併天下置太原郡尚書禹貢曰既脩太原至於岳陽春秋元命苞曰并之為言轉合交并釋名曰并者兼并也言或并或設元和郡縣志曰中國曰太原夷狄曰大鹵按晉大鹵太原大夏夏墟晉陽六名其實一也左傳曰晉荀吳敗狄於大鹵釋名曰地不生物曰鹵太康地記曰并州不以衛水為號不以恒山為稱而云并者盖以兩國之間乎帝王世紀曰帝堯始封於唐又徙晉陽及即帝位都平陽平陽乃今晉陽即太原也又曰禹自安邑都晉陽至桀徙都安邑後至周成王以封弟叔虞是為晉侯史記曰成王與叔虞戲削桐葉為珪曰以是封汝周公請封於唐王曰吾戲耳周公曰天子無戲言遂以封之魏志曰魏太祖圍袁尚於鄴時袁紹外甥髙幹為并州刺史牽招說幹曰并州左有恒山之險右有大河之固北有强胡宜速迎尚來州與之倂力觀變幹不從故敗史記曰智伯率魏攻趙㐮子於晉陽引汾水灌其城不沒者三版春秋後語曰張孟談謂趙襄子曰董安于之在晉陽公宫之垣皆荻蒿隋圗經曰并州其氣勇抗誠信韓趙魏時為三晋剽疋妙反悍盜賊常為他郡劇漢志曰太原郡秦置有鹽官在晉陽屬并州領縣二十一又曰榆次屬太原郡王莽曰太原亭史記秦本紀曰荘㐮王使蒙驁攻趙榆次漢志曰陽曲屬太原應劭曰黄河千里一曲當其陽故曰陽曲石州元和郡縣志曰石州昌化郡禹貢冀州之域虞及周屬并州春秋時屬趙亦為白狄之地秦為西河郡離石地史記曰秦伐趙取離石前趙録曰今離石左國單于所徙庭是十六國春秋曰晉惠帝以劉元海為離石將兵都尉嵐州元和郡縣志曰嵐州樓煩郡禹貢冀州之域春秋時為晉國後屬趙本樓煩故地秦為太原郡漢為太原郡之汾陽地史記曰趙惠文王主父行地遂出代西遇樓煩王於西河而破其兵取其地為縣漢志曰汾陽屬太原郡汾水所出漢書項羽傳曰漢有善射者曰樓煩楚挑戰樓煩輙射殺之使射羽羽大怒瞋目叱之樓煩目不能視手不能發樓煩縣屬鴈門此縣人善騎射荘子曰堯治天下之名平海内之政往見四子藐姑射之山汾水之陽窅然喪其天下代州元和郡縣志曰代州鴈門郡古并州之域春秋時晉地戰國時屬趙秦置三十六郡鴈門是其一焉漢因之河東記曰代句注在州西北鴈門界西陘山是也史記曰趙㐮子與韓魏共滅智伯分晉地則趙有句注之北爾雅曰比陵西踰鴈門是也郭璞注曰西踰鴈門山也地理志曰自傍隂山至髙闗代王以為塞漢地理志曰鴈門郡秦置句注山在隂館王莽曰填狄屬幷州領縣十四山海經曰鴈門出其間在髙栁代中史記曰趙襄子與代王會於夏屋以銅斗擊殺代王而取其地十道志曰五臺縣本漢慮虒縣漢志曰慮虒屬太原郡師古曰慮虒音廬夷又曰崞縣屬鴈門王莽曰崞張又曰繁畤屬鴈門王莽曰當要忻州元和郡縣志曰忻州定㐮郡古并州之域春秋時為晉國戰國時為趙地秦漢為太原郡地今州即漢太原郡之陽曲縣也十道志曰忻州置在秀容縣本漢曲陽縣後漢末於此置九原縣十三州志曰漢末大亂匈奴侵邊自定㐮已西盡雲中鴈門之間迨至建安中丞相曹公集荒郡之户以為縣聚之九原界以立新興郡領九原等縣屬并州元和郡縣志曰秀容城劉元海新築元海感神而生姿容秀美因以為名蔚州元和郡縣志曰蔚州安邊郡禹貢冀州之域虞及周屬并州春秋時地屬晉戰國時屬趙秦漢為代州漢志曰靈丘屬代郡瓉曰靈丘之號在趙武靈王之前又漢書曰酈食其説漢王曰杜白馬之津距飛狐之口晉書曰建興中劉琨自代出飛狐口奔於安次朔州元和郡縣志曰朔州馬邑郡屬禹貢冀州之域虞及周為并地春秋時為北狄戰國時屬趙秦為鴈門郡之馬邑也漢志曰馬邑屬鴈門郡王莽曰章昭晉太康地記曰秦時建此城輙崩不成有馬周旋馳走反覆父老異之因依以築城遂為馬邑後魏書曰道武天興元年遷都平城孝文遷都之後於此置朔州冀州圗經曰趙武靈王胡服而征遂有獫狁之地漢髙帝以韓王信壮武乃以太原郡為韓國徙信以備胡信以晉陽去塞逺請理馬邑上乃許之後匈奴圍信信數求救上賜書責信信懼以馬邑降胡雲州元和郡縣圗曰雲州雲中郡禹貢冀州之域虞及周為并州之域春秋時為北狄地戰國時其地屬燕其後屬趙秦鴈門郡地漢鴈門郡之平城縣也漢志曰平城東郡都尉治王莽曰平順郡國志曰雲中五原唾出口成氷言苦寒也漢書曰七年上自將擊韓王信于銅鞮縣名信亡走匈奴與匈奴共距漢上從連戰乗勝逐北遂至平城為匈奴所圍七日用陳平秘計得出元和郡縣圖曰後魏道武於此建都東至上谷西至河南南至中山北至五原地方五千里以為甸服孝文改為司州牧置代尹太平御覽卷一百六十三
