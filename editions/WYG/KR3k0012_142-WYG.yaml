body:
  text: 太平御覽卷一百四十二宋李昉等撰皇親部八蜀先主甘后穆后後主張后小張后吳孫堅吳后孫權步后二王后潘后謝妃徐妃孫亮全后孫休朱后孫皓母何太后孫皓滕后前趙劉淵母呼延后劉淵張后劉聰呼延后二劉后劉曜劉后後趙石勒劉后後燕慕容垂段后宋劉裕臧后胡媫妤劉義隆袁后劉駿母路后劉駿王后劉彧母沈媫妤劉彧王后陳妃劉昱江后劉準母陳昭華劉準謝后蜀先主甘后蜀志曰先主甘皇后沛人産後主值曹公軍至追先主於當陽長坂于時困逼棄后及後主賴趙雲保䕶得免於難后卒追諡皇思夫人遷𦵏於蜀未至而先主殂殞丞相亮上言皇思夫人宜號昭靈皇后與大行皇帝合葬制曰可穆后蜀志曰先主穆皇后陳留人也后之兄素與劉焉有舊是以舉家隨焉入蜀焉有異志而聞善相者使相后云當大貴焉時將子瑁自隨遂為瑁納后瑁死寡居先主既定益州而孫夫人還吳羣下勸先主聘后先主疑於與瑁同族法正進曰論其親踈何與晉文之於子圉乎於是納后延熈八年薨合葬恵陵後主張后蜀志曰後主敬哀皇后車騎將軍張飛長女章武元年納為太子妃建興元年立為皇后小張后蜀志曰後主張皇后飛小女隨後主遷於洛陽吳孫堅吳后吳志曰孫堅吳夫人權母也本吳人徙錢塘早失父母與弟居孫堅聞其才貎欲娶之吳夫人親戚嫌堅輕狡將拒婚焉堅甚慚恨夫人謂親戚曰何愛一女以取禍乎如有不遇命也於是遂許為婚生四男一女及權少年統業夫人助理國政甚有補益建安四年臨薨引見張昭等囑以後事孫權步后吳志曰吳主權步夫人臨淮淮隂人也以美麗得幸於權寵冠後宫夫人性不妬嫉多所推進故乆見愛權為王及帝意欲以為后羣臣議在徐氏權依違者十餘年然宫内皆稱皇后親戚上䟽稱中宫及薨臣下緣權旨請追正名號乃贈皇后印綬二王后吳志曰吳主權王夫人瑯琊人也夫人以選入宫得幸生孫和立為后而全公主素憎夫人數加譖毁及權寢疾言有喜色由是權深責怒以憂死吳志曰吳主權王夫人南陽人也生孫休及和為太子和母為后貴姬有寵者皆出居外夫人出在公安卒因葬焉休即位遣使追尊曰敬懐皇后改葬敬陵潘后吳志曰吳主權潘夫人㑹稽句章人父為吏坐法死夫人與姊俱輸織室權見而異之召充後宫得幸有身夢有以龍頭授己者已以蔽膝受之遂生孫亮十三年亮立為太子明年立夫人為皇后性險妬容媚自始至卒譛害甚衆權不豫夫人使問中書令張昭后專制故事侍疾疲勞因以羸病諸宫人伺其昏卧共縊殺之託言中惡後事泄坐死者六七十人權尋薨合葬蔣陵謝妃吳志曰吳主權謝夫人㑹稽山隂人也權聘以為妃愛幸有寵後權更納妃徐氏欲令謝下之謝不肯由是失寵早卒徐妃吳志曰吳主權徐夫人吳郡富春人也初適同郡陸尚尚卒權聘以為妃使母養子登後權以夫人妬忌廢之尋以疾卒孫亮全后吳志曰孫亮全夫人全尚女也立為皇后孫綝廢亮為㑹稽王隨亮之國吳錄曰亮妻恵解有容色居侯官吳平乃歸永寕中卒孫休朱后吳志曰孫休朱夫人朱據女孫綝廢亮立休永安五年立夫人為皇后休卒羣臣尊夫人為皇太后孫皓即位月餘貶為景皇后稱安定宫甘露元年見逼薨合葬定陵孫皓母何太后吳志曰孫和何姬丹陽句容人也父遂本騎士孫權嘗逰幸諸宫而何姬觀於道中權望見異之命宦者召入以賜子和生男權喜名之曰彭祖彭祖即皓也孫亮即位和居新都遣使賜嫡妃張氏曰殺何姬曰若皆従死誰當養孤遂撫育皓及其三弟皓即位尊和為昭獻皇帝何姬為昭獻皇后月餘進為皇太后孫皓滕后吳志曰孫皓滕夫人故太常𦙍之族女也𦙍夷滅夫人父牧以踈逺徙邉郡孫休即位大赦得還以牧為五官中郎皓既封烏城侯聘牧女為妃皓即位為皇后封牧髙宻侯拜衛將軍錄尚書事時人以牧尊戚頗推令諫諍而夫人寵漸衰皓滋不恱皓母何恒左右之又太史言於運厯后不可易皓信巫覡故得不廢常供養昇平宫長秋宫僚備員而已受朝賀表䟽如故皓内諸寵姬佩皇后璽綬者多矣天紀四年隨皓遷於洛陽前趙劉淵母呼延妃崔鴻十六國春秋前趙録曰左賢王妃呼延氏魏嘉平中祈子於龍門俄而一大白魚頂有二角掀鬐躍鱗於龍門而至於祭所乆之乃去巫覡皆異之曰此嘉祥也其夜夢旦所見魚變為人左手把一物大如半雞子光影非常以授氏曰此是日精服之生貴子自是十三月而生淵劉淵張后崔鴻十六國春秋前趙録曰劉淵皇后張氏夢日入懐寤而吿淵曰吉徵也慎勿言之自是十五月而生聰劉聰呼延后崔鴻十六國春秋前趙録曰劉聰皇后呼延氏淵后之従父妹有美色恭孝稱於宗族淵后愛聰姿色故以配焉聰以弟乂為帝太弟后謂聰曰父終子紹古今之大典太弟何為者哉陛下百年後粲兄弟必無種也願陛下深思之聰亦信之曰然吾當為計后曰事乆變生太弟見粲兄弟並大必有不安之志矣或有小人搆間其中未必不禍發今日妾聞陛下說隐公事一何相似竊為陛下寒心聰深然其言於是相圖之計起矣大劉后崔鴻十六國春秋前趙録曰劉聰皇后劉氏殷長女也字麗芳以貴嬪立為皇后聰將起鷃儀殿廷尉陳元逹諫聰大怒將斬之后時在後堂聞而宻遣中常侍勑左右停刑於是手疏曰伏聞勑㫖將為妾營殿今四海未一禍難猶繁廷尉之言社稷之計當賞美爵而反欲誅之陛下此怒由妾而起廷尉之禍由妾而招自古國敗家喪未始不由婦人妾每博覽古事忿之不已何意今日妾自為之後人觀妾猶妾之視前人復何靣目仰侍巾櫛請歸死此堂以塞陛下誤惑之過聰覽之變色大司徒任顗等復叩頭固請乃徐曰朕比来㣲得風疾喜怒過差元達忠臣也命顗等冠履就坐引元逹以后表示之曰外輔如公等内輔如此后朕復何憂小劉后崔鴻十六國春秋前趙録曰聰后劉氏殷小女字麗華童齒聰慧膚髮異常晝營女工夜誦書傳母每止之敦翫彌甚與諸兄弟辨論經義理致超然兄常深嘆性孝友善風儀進止如珪璋焉以貴嬪立為皇后殷二女四孫皆姿色超世女徳冠時聰並納之自是六劉之寵傾於後宫建元中流星起於牽牛入紫㣲龍形委蛇其光照地落平陽北十里視之則肉臭聞於平陽肉傍常有哭聲晝夜不止聰甚惡之劉后産一蛇一虎各害人而走尋之不得頃之見在隕肉之傍劉后卒乃失此肉哭聲亦止偽諡武宣皇后劉曜劉后崔鴻十六國春秋前趙録曰劉皇后侍中愷女年十三長七尺八寸垂手過膝髪與身齊才徳姿色邁於别宫後趙石勒劉后崔鴻十六國春秋後趙録曰石勒劉皇后侍中閠之妹後部胡人也勒納之于胡關美色有特寵張禆反于襄城后抽劍斬之勒賴后而濟后敏慧有幹畧助理軍國之務有吕氏輔漢之風然嚴整貞婉不妬忌尤過之也石𢎞即位尊為皇太后與彭城王堪謀殺石虎謀泄虎殺之後燕慕容垂段后崔鴻十六國春秋後燕録曰垂皇后段氏字元妃光祿大夫儀之女后少而婉慧有節操嘗謂妹季妃曰我終不能為庸人之妻季妃曰妹亦不為庸人之婦隣人聞而笑之内黄人張定善相見儀二女大驚曰君家大興當由二女儀深異之至年二十餘而不嫁儀子倫謂儀曰張定何知而拒求者儀曰吾女輩志行不凡故且踟蹰以擇良配垂稱燕王乃納元妃為繼室遂有殊寵范陽王徳亦聘季妃姊妹共為皇后卒如其言宋劉裕臧后沈約宋書曰武敬臧皇后諱愛親東莞人也后適髙祖生㑹稽宣長公主髙祖以儉正率下后恭敬不違及髙祖復興晉室居上相之重而后器服粗素不為親屬請謁晉義熙四年正月甲午殂於東城年四十八嵗追贈豫章公夫人還葬丹徒胡媫妤宋書曰武帝胡媫妤諱道女淮南人義熙初為髙祖所納生文帝五年被譴賜死時年四十二髙祖踐祚追贈媫妤太祖即位上尊號曰章皇太后劉義隆袁后沈約宋書曰文帝袁皇后齊媯陳郡陽夏人左光祿大夫湛之庶女適太祖初拜冝都王妃生太子劭及東陽獻公主英娥上待后恩甚篤袁氏貧薄后每就上求錢帛以贍與之上性節儉所得不過三五萬三五十匹後潘妃有寵所求無不得后乃因潘妃求三十萬信妃便得因此恚恨甚深稱疾不復見上上每入必他處迴避上數掩伺之不能得疾篤上執手流涕問所欲言后視上良久乃引被覆靣崩於顯陽殿時年四十六上甚悼痛之詔永嘉太守顔延之為哀筞文其文甚麗劉駿母路后沈約宋書曰文帝路淑媛諱恵男丹陽建康人也以色貎選入後宫生孝武帝拜為淑媛年既長無寵乃隨世祖出藩世祖入討元凶淑媛留尋陽及上即位有司奉尊號曰皇太后太后弟子瓊之上表為父乞恩贈給事中瓊之及弟休之茂之並超顯職太后頗預政事賜與休之等財物家累千金居處器服與帝子相侔尋崩時年五十五遷殯東宫改東宫門題曰崇憲宫劉駿王后沈約宋書曰孝武文穆王皇后諱憲嫄瑯琊臨沂人元嘉二十年拜武陵王妃生廢帝山隂公主世祖在藩后甚有寵上伐㓙逆與太后同還京都立為皇后文明四年率六宫躬桑於西郊廢帝即位尊曰皇太后宫曰永順其年崩於含章殿時年三十八祔葬景陵劉彧母沈媫妤沈約宋書曰文帝沈媫妤諱容姬納於後宫為美人生明帝拜為媫妤元嘉三十年卒時年四十世祖即位追贈湘東國太妃太宗即位上尊號為皇太后劉彧王后沈約宋書曰明恭王皇后諱貞風瑯琊臨沂人也上嘗宫内大集而裸婦人觀之以為歡笑后以扇障靣獨無所言帝怒曰外舍家寒乞今共為笑樂何獨不視后曰為樂之事其方自多豈有姑姊妹集聚而裸婦人形體以為樂外舍之為懽適實與此不同帝大怒遣后令起廢帝即位尊為皇太后元徽五年五月五日太后賜帝玉柄毛扇帝嫌其毛柄不華因此欲加酖害己令太醫煑藥左右止之曰若行此事官家便應作孝子豈復得出入狡獪帝曰汝語大有理乃止順帝即位齊王秉權順帝禪位太后與帝遜於東邸孝建元年薨於第時年四十四陳妃沈約宋書曰明帝陳貴妃諱妙登丹陽屠家女也太妃家在建康縣東家貧有草屋二三間上出見之賜錢三萬令起瓦房尉自送錢與之家人並不在唯太妃在家時年十二三尉見其容質甚美即以白世祖於是迎入宫賜太宗始有寵一年許衰歇以乞將軍李道兒尋又迎還生廢帝故民中皆呼廢帝為李氏子廢帝踐祚號曰皇太妃輿服一如晉孝武太妃故事置家令一人改諸國太妃曰太姬劉昱江后沈約宋書曰後廢帝江皇后諱簡珪濟陽考城人太始五年太宗訪求太子妃而雅信小數名家女多不合后弱小門無强䕃以卜筮㝡吉為太子納焉太子即位立為后帝既廢降為蒼梧王妃劉準母陳昭華沈約宋書曰明帝陳昭華諱法容丹陽人也太宗晩年諸弟姬人有懐孕者輒取入宫及生子殺其母而與六宫所愛者養之順帝桂陽王休範子也以昭華為母焉順帝即位進為皇太妃劉準謝后沈約宋書曰順帝謝后諱梵竟光祿大夫莊孫女也昇明二年立為皇后順帝禪位降為汝隂王妃太平御覽卷一百四十二
