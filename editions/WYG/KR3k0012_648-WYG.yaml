  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_648-1a, image: WYG0898/WYG0898-0764c.png}
body:
  text: 太平御覽卷六百四十八宋李昉等撰刑法部十四黥劓臏刖宫刑造肉刑除肉刑黥尚書吕刑曰墨辟疑赦其罰百鍰孔安國曰刻其顙而湼之曰墨刑疑則赦從罰六兩曰鍰鍰黄鐵也尚書刑徳攷曰涿鹿者竿人顙也黥者馬羈竿人面也鄭𤣥曰涿鹿黥皆先用刀芒傷人墨布其中故後世謂之墨士民也尚書大傳曰非事之事入不以道義而誦不祥之辭者其刑墨周禮秋官掌戮職曰墨者使守門白虎通曰墨墨其額也取火之勝金也得火亦變臏而墨也説文曰黥刑在面也史記曰秦太子犯法衛鞅曰法之不行自上犯之将刑太子君嗣也不可施刑刑其傅公子䖍黥其師公孫賈明日秦人皆趨令行之十年秦民大悦道不拾遺山無盜賊民勇於公戰怯於私鬭又曰黥布秦時為布衣少年客相之當刑而王及壯坐黥布欣然笑曰人相我當刑而王幾是乎漢書曰文帝除肉刑當完者完為城旦舂律説曰男女論死髠鉗輸邊城曰防冦虜夜暮築長城女子无軍令之事但舂食徒米也又曰黥劓之罪不及大夫故里諺曰欲投䑕而忌器器君也大夫近於君晉令曰奴婢亡加銅青若墨黥黥兩眼后再亡黥兩頰上三亡横黥目下皆長一寸五分廣五分唐通典曰梁制劫者身皆斬妻子補兵遇赦降死者黵面為劫字十四年又除黵面之刑劓尚書吕刑曰劓辟疑赦其罰惟倍也尚書大傳曰觸易君命革輿服制度姦兇攘竊傷人者其刑劓周禮秋官司刑職曰劓罪五百鄭𤣥曰劓截鼻今東西夷或以墨劓為俗古刑掌戮劓者使守闗禮統曰劓刑法木勝土决其皮革也白虎通曰劓劓其鼻也法木之穿土也去鼻亦孔見漢書曰文帝除肉刑當劓者笞三百楚漢春秋曰正疆數言事而當上使㕘乗解玉劍以佩之天下定以為守有告之者上曰天下方急汝何在曰亡上曰正疆沐浴霜露與我從軍而汝亡告之何也下廷尉劓臏尚書大傳曰决關梁踰城郭而略盜者其刑臏尚書刑徳攷曰臏者脱去人之臏也臏罰之屬五百象七精禮統曰臏刑法金勝木去其節目也周禮秋官上司刑曰刖罪五百鄭𤣥注曰周改臏作刖白虎通曰俗説脱其臏也取法金之刻木也白虎通曰俗説臈祭祖先得兎者名之曰幸幸者善祥令人吉利也或説食兎髕者令人面免生髕露見醜惡今食得之喜不為己疾也謹按尚書夏禹始作肉刑則天象而慎其過故穿踰盜竊者其刑臏也至暴秦亂獄糺紛俎烹車裂黔首窮愁飲泣永歎凡人食得免體以為佳瑞物類相感冀全己之臏也刖尚書吕刑曰剕辟疑赦其罰倍差周禮秋官司刑職曰刖罰五百鄭𤣥曰刖斷足也周改臏作刖也掌戮刖者使守囿家語曰季羔為衛士師刖人之足俄而衛亂季羔逃刖者守門焉曰彼有缺季羔曰君子不踰曰彼有竇季羔曰君子不隊曰此有室季羔入焉既而問其故刖者曰斷足固我罪也臨當刑君愀然不樂見於顔色此臣之所以脱君也史記曰孫臏與龎涓學兵法龎涓既事魏得為惠王将軍而自以為能不及孫臏隂使召孫臏臏到龎恐其賢於己以法刑斷其兩足而黥之欲隱勿見齊使者如梁孫臏以形徒隂見説齊使齊使以為奇竊載與之齊列子曰魯施氏有二子其一好學其一好兵好學者以術干齊侯以為公子傅好兵者以刑干楚王楚王以為軍政鄰人孟氏有二子所業亦同問施氏之方施氏告之一子以術干秦王秦王曰今諸侯力争安得用仁義遂害而放之一子以法干衛侯衛侯曰吾弱國豈可稱兵遂以刖之二人讓施氏曰子不得時也韓子曰楚人和氏得璞玉於楚山之中獻之武王武王使玉人相之曰石也王以和為慢刖其左足及文王即位和又奉其璞玉又使玉人相之又曰石也文王刖其右足文王薨成王即位和乃抱其璞而哭於荆山之下三日三夜泣盡而繼之血成王問其故曰天下刖者多矣子何哭之悲也和曰吾非悲刖也夫寶玉而題之以石直士命之以慢此吾之所以悲也王乃使玉人剖其璞而得寶遂名曰和氏之璧宫刑尚書吕刑曰宫辟疑赦其罰六百鍰宫淫刑也男子割勢婦人幽閉次死之刑也尚書大傳曰男女不以義交者其宫刑尚書刑徳攷曰宫者女子淫亂執置宫中不得出也割者丈夫淫割其勢也周禮秋官上司刑職曰宫罪五百宫者丈夫割其勢女子閉于宫若今宦男女也又掌戮曰宫者使守内也禮曰文王世子曰公族无宫刑也漢書曰漢聞李陵降匈奴上怒甚羣臣皆罪陵上以問太史令司馬遷遷盛言陵事親孝與士信常奮不顧身以徇國家之急彼之不死且欲得以報漢也初上遣貳師将軍出師令陵為助兵上以遷誣罔欲沮貳師為陵遊説下遷腐刑造肉刑尚書吕刑曰王享國百年耄荒度作刑以詰四方度時勢所宜訓作贖刑以治天下四方之民王曰若古有訓蚩尤惟始作亂延及于平民罔不冦賊鴟義姦􅀢奪攘矯䖍為蚩梟之義以相奪攘苗民弗用靈制以刑惟作五虐之刑曰法殺戮无辜爰始淫為劓刵㭬黥三苗之主頑凶若民敢行虐刑以殺戮无罪于是始大為截人耳鼻㭬隂黥面以加无辜故曰五虐商君書曰斷人之足黥人之面非求傷民也以禁姦止過故禁姦止過莫若重刑除肉刑漢書曰齊太倉令淳于公有罪當刑獄逮繫長安淳于公无男有五女當行會逮罵其女曰生女不生男緩急非有益也其少女緹縈自傷悲泣迺隨其父至長安上書曰妾父為吏齊中皆稱其㢘平今坐法當刑妾傷夫死者不可復生刑者不可復屬雖欲改過自新其道無由天子憐悲其意遂下令曰制詔御史蓋聞有虞氏之時畫衣冠異章服以為戮而民不犯何治之至也今法有肉刑三孟康曰黥劓二刖左右趾合一凡三也而姦不止其咎安在無乃朕徳之薄而教不明與夫刑至斷肢體刻肌膚終身不忍息生也何其刑之痛而不徳也豈稱為民父母之意哉其除肉刑有以易之丞相張蒼御史大夫馮敬奏言肉刑所以禁姦所由來者久矣陛下下明詔憐萬民之一有過被刑者終身不息及罪人欲改行為善而道亡繇至於盛徳臣等所不及也謹議請定律曰諸當完者完為城旦舂文帝除肉刑皆有以易之故以完易髠當黥者髠鉗為城旦舂當劓者笞三百當斬左趾者笞五百當斬右趾及殺人先自告及吏坐受賕枉法守縣官財物而即盜之已論命復有笞罪者皆棄市罪人獄以决完為城旦舂罪也命者名也成其罪也當斬右足以其罪次重故從棄市也殺人先自告謂殺人而自首也三國典畧曰齊崔謙遷鉅鹿太守恩信大行改鞭用熟皮為之不忍見血示恥而已有貧弱未埋者皆曰我自造白鬚公不慮不决在郡七載獄無停囚齊春秋曰齊景真為晉平太守有惠政嘗懸一蒲鞭未嘗用之齊書曰薛安都從弟道生以軍功為大司馬參軍犯罪為秣陵令庾淑之所鞭安都大怒乃乗馬從數拾人令左右執矟欲往殺淑之行至朱雀航逢栁元景遥問曰薛公何之安都躍馬至車後曰小子庾淑之鞭我從弟今往刺殺之元景慮其不可駐紿之曰小子无適卿往與手甚快安都既廻馬元景復呼之令下馬入車因讓之曰卿從弟服章言論與寒細不異且人身犯罪理應加罰卿朝廷勲臣云何放恣輒於都邑殺人非唯科律所不容主上亦无辭相宥因載俱歸安都乃止南史曰禇玠為山隂令時舍人曹義達為明習律令與羣臣共議出本當右趾而入大辟者復行此刑書云皇帝清問下民鰥寡有辭於苗此言堯當除蚩尤有苗之刑先審問於下民之有辭者也若今蔽獄之時訊問三槐九棘羣吏萬民使如孝景之令其當棄市欲斬右趾者許之其黥劓左趾宮刑者自如孝文易以髠笞能為姦者率年二十至四五十雖斬其足猶任生育今天下人少於孝文之世下計所全嵗三千人張蒼除肉刑所殺嵗以萬計臣欲復用肉刑嵗生三千人疏奏詔曰太傅學廣才髙留心政事又於刑理深逺此大事公卿羣僚善共平議司徒王朗議以為繇欲輕減大辟之條增益刖刑之數此則起偃為豎化屍為人也然臣之愚猶有未合微異之意夫五刑之屬著在科律科律自有減死一等之法不死即為減死施行已久不待逺假斧鑿於彼肉刑然後罪次也前世仁者不忍肉刑之慘酷是以廢而不用已來厯年數百今復行之恐其所減之文未彰於萬民之目而肉刑之間已宣於冦讐之耳非所以來逺人也議者百餘人與朗同者多帝以吳蜀未平且寢王隠晉書曰曹彦議云嚴刑以殺犯之者寡刑輕易犯蹈惡者多臣謂玩常苟免犯法乃衆黥刖彰刑而民甚恥且創黥則見者知禁彰罪表惡亦足以畏所以易曰小懲大戒豈蹈惡者多耶假使多惡尚不至死无妨産育苟必行殺為惡縱寡殺而不已將至无人天无以神君无以尊矣古人寧失不經是以為上寧寛得衆若乃臯陶聴訟刑以止刑不可及已過此以往肉刑宜復肉刑於死為輕減死五百為重重不害生足以懲姦輕則知禁禁民為非所謂相濟經常之法議云不可或未知之也又曰尚書梅陶問光禄大夫祖納漢文帝故當為英雄既除肉刑而五六百嵗无能復者納荅曰諸聖制肉刑而漢文擅除後來无勝漢文帝者故不能復非聖人者无法何足為英雄於是陶不能對納曰征西大将軍曰夫政未可立則思制度全育民命富國强兵叛盜之屬斷肢而已是好生惡殺叛盜皆死是好殺惡生也斷肢若謂之酷截頭更不謂之虐何其乖哉刑罰不中則民無所措手足也蠻夷猾夏則臯陶作士此欲善其末則先制其本也自古多人猶惜民命得以禦冦况今千不遺一益宜存在以伐大賊今若得改之則嵗活數所朶數亦如之若此十載生各數萬斷肢之後隨刑使役不失民民不乏用富國彊兵此之謂也又曰劉頌上書曰古者刑以止刑及今反以刑生刑以徒生徒諸重犯亡者髪過三寸輒重髠之此以刑生刑加作一歲此以徒生徒也亡者積多繫囚猥蓄議者因曰不可不赦復從而赦之此謂刑不制罪法不勝姦民知法之不服相聚而謀為不軌故自頃以來姦惡陵暴所在充斥漸以滋蔓日積不已弊将有歸議者不深思此故而曰肉刑於名忤聴忤聴孰與盜賊不禁聖主之制肉刑逺有深理其事可得而言非徒懲其畏剥割之痛而不為也乃去其為惡之具使夫姦民无用不復肆其志止姦絶本理之盡也亡者刖其足无所用復亡不盜者截其手无所用獲盜淫者割其勢理亦如之除惡塞源莫善於此又非徒然也此等已刑之後便各歸家父母妻子共相養恤瘡愈可役上准古制隨宜業作雖已刑殘不為虐也生育繁阜之道自若也今宜取死刑之限以肉刑之限輕及三犯逃亡淫盜悉以肉刑歲之其三發刑以下宜杖罰又宜制其罰數使有常限後刑不復生刑徒不復生徒而殘體為戮終身作械民見其痛畏而不犯必數倍于今且為惡者隨發被刑去其為惡之具豈與全其為姦之手足而蹙居必死之窮地同哉而又曰肉刑不可用臣切以為不識務之甚也博物志曰肉刑明王之制荀卿每論之漢興文帝感太倉公女之言而廢之班固著論云宜復之迄漢末魏初陳紀又論宜申古制孔融謂不可復魏武帝輔漢欲申之鍾繇王朗不同遂寢夏侯𤣥季勝曹羲丁謐建私議各有彼此多言時未可復故遂寢崔寔政論曰髙祖非九章之律髙后深三族之罪文帝去肉刑景帝減加笞由此言之世有所更何獨拘前太平御覽卷六百四十八
