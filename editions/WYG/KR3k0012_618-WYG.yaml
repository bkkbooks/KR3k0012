  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_618-1a, image: WYG0898/WYG0898-0572a.png}
body:
  text: 太平御覽卷六百十八宋李昉等撰學部十二叙圖書正謬誤叙圖書尚書叙曰古者伏羲氏之王天下也始畫八卦造書契以代結繩之政由是文籍生焉伏羲神農黄帝之書謂之三墳言大道也少昊顓頊髙辛唐虞之書謂之五典言常道也至于夏商周之書雖設教不倫雅語奥義其歸一揆是故厯代寶之以為大訓八卦之說謂之八索求其義也九州之志謂之九丘丘聚也言九州所有土地所生風氣所宜皆聚此書也春秋左氏傳曰楚左史倚相能讀三墳五典八索九丘即上世帝王遺書也左氏傳曰晉荀躒如周籍談為介謂籍談曰昔髙祖孫伯黶司晉之籍以為大政故曰籍氏汝司典之後何忘之漢書藝文志曰昔仲尼沒而微言絶七十子終而大義乖故春秋分為五韋昭曰謂左氏公羊穀梁鄒氏夾氏也詩分為四韋昭謂毛氏齊魯韓也易有數家之傳戰國從衡真偽分争諸子之言紛然殽亂至秦患之乃燔滅文章以愚黔首漢興改秦之政大收篇籍廣開獻書之路迄孝武世書缺簡脫禮壞樂崩上喟然而稱曰朕甚憫焉於是建藏書之策置冩書之官下及諸子傳說皆充秘府又曰古文尚書藏於壁中師古注曰家語云孔騰字子襄畏秦法峻急藏尚書論語孝經於夫子堂壁中而漢記曰孔鮒所藏二說不同未知孰是也又後漢王莽徴陳咸咸遂稱篤疾於是乃歛其家律令文書藏於壁中也後漢書曰吳祐字季英陳留長垣人也父恢為南海太守祐年十二随父到官恢欲殺青簡以寫經書祐諫曰大人踰越五嶺逺在海濱其俗誠陋然舊多珍怪上為國家所疑下為權戚所望此書若成則載之兼兩昔馬援以薏苡興謗王陽以衣囊邀名嫌疑之間誠先賢所慎也恢乃止撫其首曰吳氏世不乏季子矣魏志曰王脩家糓不滿十斛有書數百卷太祖歎曰士不妄有名也蜀志曰向朗字巨達潛心典籍積聚篇卷於是最多晉書曰裴憲楷之子也王浚以憲為尚書石勒破浚籍官寮親屬貲至巨寓憲惟書百餘袠鹽米十數斛而已勒歎曰名不虛也後唐書曰季谿博學多通文章秀絶家有竒書時號季書樓吕氏春秋曰先識覽桀將亡太史令終古執其圖書出奔于商紂將亡内史向摯載其圖法出奔于周穆天子傳曰癸巳至於羣玉之山容成氏之所守山阿平無險四中繩言皆平直先王所謂策府言往古帝王以為藏策之府所謂藏之名山也莊子曰孔子西藏書於周室藏書所著書於周者子路謀曰由聞周家徴藏史有老耼者徴藏藏名也免而歸居夫子欲藏書則當試焉孔子至老耼之門而老耼不許也博物志曰劉徳治淮南王獄得枕中鴻寶秘書及其子向咸共竒之信黄白之術可成謂神仙之道可致卒亦無驗乃以罹罪又曰太古書今見存者有神農山海經山海經或云禹所作素問黄帝作連山歸藏夏殷之書周易曰易蔡邑云禮記月令周公所作諡法司馬法亦云周公所作論衡曰倉頡作書雨粟鬼哭虛也案圖書與書何異鬼神惡書則河出圖何也若不惡為書何忽致怪或作書時會鬼哭雨粟耳伏滔北征記曰皇天場北古時陶穴晉時有人逐狐入穴行十里許得書二千餘卷金樓子曰有細書周易尚書周官儀禮禮記毛詩春秋各一部又冩前漢史記三國志晉春秋莊子老子肘後方離騷等合六百三十四卷悉在一巾箱中書極精細又曰吾今年四十六嵗聚書来四十年得書八萬卷也何閒之伴漢室頗謂過之也正謬誤劉向別傳曰讎校者一人持本一人讀折若怨家相對故曰讎也左傳曰晉師閏月濟於陰阪杜預注云長厯推之此年無閏月數為門五日五字上與門合也吕氏春秋曰有讀史者晉史三豕涉河子夏曰非也是己亥也夫己之與三相近豕之與亥相似至晉而問之則曰晉師己亥涉河也漢書藝文志曰成帝詔光禄大夫劉向校經傳諸子詩賦步兵校尉任宏校兵書太史令尹咸校術數侍醫李柱國校方技每一書已師古曰已畢也向輒條其篇目撮其指意録奏之㑹向卒哀帝復使向子侍中奉車都尉歆卒父業歆於是總羣書而奏其七略故有輯略師古曰輯與集同謂諸書之總要有六藝略師古曰六藝六經也有諸子略有詩賦略有兵書略有術數略有方技略抱朴子曰書三寫以魯為胃以帝為虎劉向七略曰古文或誤以見為典以陶為陰如此類多穎容春秋例曰漢興博物洽聞著述之士前有司馬遷揚雄劉歆後有鄭衆賈逵班固近即馬融鄭𤣥其所著作違義正者遷尤多聞略舉一兩事以言之史記不識畢公文王之子而言與周同姓揚雄著法言不識六十四卦云所從来尚矣後漢書曰和熹鄧太后從曹大家受經書兼天文算數晝省王政夜則誦讀而患謬誤懼乖典章乃博選諸儒劉珍等及博士議郎四府掾史五十餘人詣東觀校傳記蜀志曰向朗字臣達年八十手自校書刋定謬誤也晉書曰鄭黙字思元起家秘書郎考覈舊文刪省浮穢中書令虞松謂曰而今而後朱紫別矣又曰齊王攸以禮自拘鮮有過事就人借書必手刋其謬然後返之後周書曰元偉世宗初拜師氏下大夫受詔於麟趾殿刋正經籍又曰明帝幼而好學博覽羣書善屬文詞彩温麗及即位集公卿已下有文學者八十餘人於麟趾殿刋校經史又捃採衆書自羲黄以來訖于魏末叙為世譜凡五百卷云所著文章十卷唐書曰褚元量以内庫舊書自髙宗代即藏在宫中漸致遺逸奏請繕寫刋校以𢎞經籍之道於是上令於東都乾元殿前施架排次大加捜寫廣求天下異本數年間四部完備又曰貞觀中頒五經於天下初太宗以經籍去聖久逺文字訛踳詔命前中書侍郎顔師古刋正之及成又曰詔尚書左僕射房𤣥齡集諸儒討論得失時諸儒習師說舛謬已久皆竊議非之於是異端蜂起師古一一辨答取晉宋古今本随言辨析援據詳明多出其意表諸儒皆聞所未聞歎服而去太宗善之太平御覽卷六百十八
