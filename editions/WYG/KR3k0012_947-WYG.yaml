body:
  text: 太平御覽卷九百四十七宋李昉等撰蟲豸部四蚯蚓河圖說徴曰黄帝起大蚓見大戴禮曰蚓無爪牙之利筋脈之强上食埃土下飲黄泉用心一也文子孫卿淮南子同禮記月令曰孟夏螻蟈鳴後五日蚯蚓出冬至之日蚯蚓結孝經援神契曰螾無食勞無勢故無心爾雅曰螼羌引切蚓蜸苦顯切蠶他與切即䖤蟺也江東呼蚯蚓後漢書曰王元説隗囂曰神龍失勢還與蚯蚓同帝王世記曰黄帝時螾大如虹淮南子曰太隂在上蚯蚓結為陽侯抱朴子軍術曰蚯蚓見軍中尤多者軍罷入宜備反叛慎子曰騰蛇遊霧飛龍乗雲雲罷霧除與蚯蚓同失所乗故也吕氏春秋曰黄帝時見大螾土氣勝故其色尚黄髙誘曰螾蚯蚓也淮南萬畢術曰苓皮螾脂魚鼈自聚注曰取苓皮漬水斗半燒石如炭狀以碎螾脂置苓皮水中七日後置沼則魚鼈自聚矣楊泉物理論曰檢身止欲莫過於蚓此志士所不及也郭義恭廣志曰閩越江北山間蠻夷啖蚯蚓脯為羞崔豹古今註曰蚯蚓一名䖤蟺一名曲蟺善長吟於地中江東謂之歌女或為鳴砌䖤蟺苑善二音述異記曰劉德願兄子太宰從事中郎道存景和元年五月忽有蚓數十登其齋前砌上通身白色人所未嘗見也蚓並張口吐舌大赤色其年八月與德願並誅劉敬叔異苑曰益州王雙宋文帝元嘉初忽不欲見明常取水沃地以菰蔣覆上眠息飲食悉入其中有一女着青裙白領巾來就其寢母聽聞薦下歴歴有聲發之見一青色白領蚯蚓長二尺許云此女常以一奩香見遺氣甚清芬奩乃螺殻香則菖蒲根於時咸以雙暫同阜螽矣廣五行記曰陳後主隋軍至江蚯蚓盡出森然如植箭陳氏水鄉蚯蚓土䖝象陳氏自稱土德盡出明傾其窟穴以曲歸直是嵗隋平陳又曰隋煬帝大業中河南有婦人養姑不孝姑兩目暗婦切蚯蚓為羮以食之姑怪其味竊藏一臠以示兒兒易頭為白狗頭郭景純蚯蚓讚曰蚯蚓土精無心之䖝交不以分媱於阜螽觸而感物無乃常雄呉氏本草經曰蚯蚓一名白頸螳螾一名附引葛洪療喉卒腫方曰用白頸蚯蚓十四枚擣以塗喉外立愈陶洪景集註本草經曰白頸蚯蚓一名土龍生􅀢谷平土白頸者是其老大耳䗂蝓尚書大𫝊曰鉅定螺鄭𤣥曰鉅定澤也今屬樂安故有則屬齊螺蝸牛也禮記曰蝸醢而苽食後漢書曰鉅鹿張角賊起皆着黄巾為標幟時人謂之黄巾亦名為蛾賊蛾音魚綺切即蟻字論賊衆多故以為名張勃呉録曰九真移風縣有土赤如膠人視土知有蟻因墾發以木枝挿其中則蟻緣而生漆堅凝如螳蜋子螵蛸也折漆以其色正赤所作赤絮則此膠也孟堅曰羊肉不慕蟻蟻慕羊肉羶也莊子曰函牛之鼎沸蟻不得措一足焉喻聖主之法明奸邪不敢蹈之又曰東郭子問莊子曰道安在莊子曰道在螻蟻又曰吞舟之魚蕩而失水則螻蟻能苦之孫鄉子曰不食者蟻不飲者蜉蝣韓子曰桓公伐孤竹行山中無水隰朋曰蟻冬居山陽夏居山隂蟻壤寸而有水乃掘遂有水又曰千丈之堤以螻蟻之穴而潰又曰以骨去蟻蟻愈多以肉驅蠅蠅愈至吕氏春秋曰吞舟之魚陸處不勝螻蟻淮南子曰千里之堤以螻蟻之穴漏而百尋之屋以突隙之標焚抱朴子曰雞有專距之雄蟻有兼弱之志蜂有攻寡之計人相役御亦猶是耳又曰周髀家云天圓如張葢地方如棊局天旁轉如推磨而左行日月右行隨而左轉如推於磨蟻行磨上磨左旋而蟻右去磨疾而蟻遲故不得不隨磨以左迴焉又曰百尋之山焚於分寸之颷千丈之陂潰於一蟻之穴符子曰東海有鰲焉冠蓬萊而浮游於滄海騰躍而上則干雲之風類邁於羣岳沉没而下則隱天之丘潜蟜於重川有蚳蟻聞而悦之與羣蟻相要乎海畔將觀鰲焉唐史劍南本無蠍嘗有人任主簿將之至今呼為主簿䖝莊子曰老􅔶曰三皇之知上悖日月之明下暌山川之精中隳四時之施其智潜於躉之尾而猶自以為聖人不亦可恥乎唐景龍文館記曰上已日上幸於渭濵宴侍臣其日賜侍臣等柳棬各一云帶之寛躉毒辟濕氣干寳捜神記曰安陽城南有亭宿者輒死有書生入亭宿明掘得蠍大如琵琶毒長數尺亭遂安静葛洪方曰蠍中國最多江東即無也稽含遇蠆賦曰元康二年余中夜遇躉客有戲余曰俗語云過滿百為躉所螫斯言信哉雖内省不疚而逢此害喟然而嘆遂作賦蟻焦贛易林震之蹇曰蟻封戸穴大雨將集又復之萃曰蚍蜉戴粒不能上山却推跌蹶損傷其顔韓詩外傳曰夫吞舟之魚大矣蕩而失水則為蟻所制大戴禮曰十二月𤣥駒賁蟻也賁者走於地中也周官曰饋食之豆蜃蚳醢􅜹蛤也蚳蟻之子也禮記檀弓曰子張喪公明儀為志焉禇幕丹質蟻結於四隅鄭𤣥曰畫禇之四角其文如蟻行往來相交錯也蟻蚍蜉也殷之蟻結似今之虵文􅀞也又内則曰蚳醢蚳蚍蜉子也又學記曰蛾子時術之其此之謂乎蛾蚍蜉也蚍蜉之子微虫耳時術蚍蜉之所為其功乃復成大垤也爾雅曰蚍蜉大螘俗呼為馬蚍蜉小者蛘齊人呼蟻為蛘蠪音龍朾直耕切螘赤駮蚍蜉螱音尉飛螘有翅其子曰蚳蚳蟻卵周禮曰蜃蚳醢爾雅曰蚹蠃䗂蝓郭璞曰即蝸牛也張揖廣雅曰蠡蠃蝸牛䗂蝓也莊子曰有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏時相與爭地而戰伏尸數萬逐北旬有五日而後反許慎説文曰蝸一曰䗂蝓山海經曰清安之山北望河曲是多倮纍郭璞曰倮纍蝸牛也陶洪景集註本草經曰䗂蝓味鹹寒無毒一名陵蠡一名土蝸一名附蝸生泰山池澤生隂地沙中垣下䗂蝓入三十六禽限又是四種角蟲之類營室星之精蠍毛詩魚藻彼都人士曰彼君子女卷髪如蠆毛詩義疏曰蠆一名杜伯河内謂之蚊幽州謂之蠍左傳僖公上臧文仲曰䗬蠆有毒而况國乎又昭公二年鄭人謗子産曰其父死於路已為蠆尾大戴禮曰神人國有蜂蠆不螫嬰兒張揖廣雅曰杜伯蠧蠆蠍也説文曰蠍毒蟲也魏志曰彭城夫人夜之厠蠆螫其手呻呼無賴華佗令温湯近熱漬手其中卒可得寢但旁人數為易湯令煖其日即愈北史曰齊後主詔鏁南陽王綽赴行在所至宥之問在其州何者最樂對曰多取蠍令咀人㸔時極樂後主即夜索蠍一斗比曉得二三升置諸浴斛使人祼卧斛中號呌宛轉帝與綽臨觀喜噱不已謂綽曰如此樂事何不早馳驛奏聞綽由是大為後主所寵鼇潛未出羣蟻將反遇長風激浪崇濤萬仭海中沸地雷震羣蟻曰此鼇之將作也數日風止雷黙海中隱如岳羣蟻曰彼之冠山何異我之戴粒逍遥封壤之巔伏乎窟穴也山海經曰朱蟻其狀如蟻郭璞曰蟻蚍蜉在崑崙之墟京房易妖占曰蟻無故當道若門户城郭聚土水且傷人揚雄方言曰蚍蜉齊魯之間謂之蚼蟓音駒養西南梁益之間謂之𤣥駒燕謂之蛾􅀈楚郢以南蟻土謂之封王充論衡曰人坐樓臺之上察地之螻蟻尚不見其體安能聞其聲何則螻蟻之體不若人形夫聲音非氣不能達也今天之崇髙非直樓臺人體比於天非若螻蟻於人也謂天聞人之言隨善惡為吉凶誤矣揚子法言曰食如蟻衣如葉不以泰乎劉義慶世説曰殷仲堪父病虛悸聞牀下動云是牛鬭孝武不知殷父問有一殷病如此不仲堪流涕而起曰臣進退惟谷郭義恭廣志曰有飛蟻有木蟻古曰𤣥駒者也又有黒黄大小數種之蟻劉欣期交州記曰太和中人有至武嶺穴中有大蚍蜉甚大西京記曰長安化度廢寺内有礓音薑石徑二尺餘孔穴通連若欄椅樓臺之狀號曰蟻宫常云於中見蟻金色其大若蜂動逾萬計乃掘及泉因得此名張茂先博物志曰蟻知將雨伏侯古今注曰漢光武建武元年山陽有小蟲類人形甚衆明日皆懸樹枝而死乃大蟻也崔豹古今注曰牛亨問曰蟻曰𤣥駒何也答曰河内人並河而見有人馬數千萬騎皆大如黍米旋動往來從朝至暮家人以火燒殺之人皆是蚊蚋馬皆成大蟻故今人呼蚊蚋曰黍民蟻曰𤣥駒揚子法言曰吾見𤣥駒是也揚孚異物志曰鯪鯉吐舌蟻附之因吞之又開鱗甲使蟻入其中乃奮迅則䑛取之劉敬叔異苑曰桓謙字敬祖太元中忽有人皆長寸餘悉被鎧持槊乘具裝馬自塪中出緣几登竈尋飲食之所或有切肉輒來叢聚力所能勝者以槊刺取徑入穴蔣山道士朱應子令以沸湯澆所入處寂不復出因掘之有斛許大蟻死在穴中謙後以門釁同滅古今五行記曰後魏顯宗時天安元年六月兖州有黒蟻與赤蟻交鬭長六十步廣四寸赤蟻斷頭而死黑主北赤主南時齊明帝殺少帝之子業而自立大為魏軍所破東魏孝静帝武定四年鄴下有黄蟻與黑蟻鬭東魏戎衣色黑西魏戎衣色黄是時黄蟻盡死時髙歡圍玉璧五旬不拔嶺表録異曰嶺南蟻類極多有席袋貯蟻子窠粥於市都蟻窠如薄絮嚢皆闕蔕俟葉蟻在其中和窠而賣有黄色大於常蟻而脚長者云南中柑子樹無蟻者實多蛀故人完買之以養柑子又曰交廣溪澗間酋長存得収蟻卵淘擇令淨鹵以為醬或云其味酷似肉醬非官客親友不可得也夢書曰蚍蜉為小盜御食行也夢見蚍蜉小盜衆也神光占曰行造酒家蟻聚中庭急去之應璩百一詩曰大魏承衰弊復欲宻其羅蚍蜉猶見得何云鰌與鰕狴犴既已備欻復置黄沙楚辭招魂曰南方赤蟻若象𤣥蟻若壺應璩與曹昭伯牋曰空城寥廓所聞者悲風所見者鳥雀昔陳司空為邑宰所在幽閑獨坐愁思幸頼遊蟻以娯其意以今况之知不虛矣郭璞蚍蜉賦曰節殷人之喪具在四隅而交結濟齊桓之窮師由山東之高垤感萌陽以濳步知將雨而封穴伊斯蟲之愚昧乃先識而似哲又蚍蜉讚曰蚍蜉瑣劣蟲之不才感陽而出應雨講臺物之無懷自然知來太平御覽卷九百四十七
