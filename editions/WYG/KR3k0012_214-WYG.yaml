  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_214-1a, image: WYG0895/WYG0895-0006a.png}
body:
  text: 太平御覽卷二百一十四宋李昉等撰職官部十二吏部尚書吏部尚書六典曰吏部尚書侍郎之職掌天下官吏選授勲封考課之政令其屬有四一曰吏部二曰司封三曰司勲四曰考功總其職務而行其制命凡中外百司之事由於所屬皆質正焉後漢書曰光武改常侍曹為吏部曹主舉選齊祀事魏志曰盧毓為侍中在職三年多所駁易詔曰官人秩才聖帝所難必須良佐進可替否侍中毓禀性貞固心平體正可謂明試有功不懈于位者也其以毓為吏部尚書使毓自選代曰得如卿者乃可毓舉常侍鄭冲帝曰文和吾自知之更舉吾所未聞者乃舉阮武孫邕帝於是用邕吳志曰李肅字偉恭南陽人少以才聞善論議臧否得中甄竒録異薦述後進題目品藻曲有條貫以此服之權擢為選曹尚書選舉號為得才又曰暨艷字子休為選曹尚書性峭厲好清議當時郎署混濁多非其人欲區别賢愚彈指百寮覈選三署皆貶高就下降損數等其居位貪鄙志節汙卑者皆以為軍吏置營府以處之故怨憤聲積競言艷用私情愛憎不由公理艷坐自殺又曰陸喜字文仲頗渉文籍好人倫孫皓時為選曹尚書又曰薛綜為選部尚書固讓顧譚曰譚心精體密貫道達微才照人物徳服衆望誠非臣所可越先後遂代綜晉書曰山濤為吏部尚書濤用人皆先密啟然後公奏又曰鄧攸為吏部尚書當時清靜内外肅然牧馬於家庭妻息素食不受一錢又曰嵇紹字延祖裴頠亦深器之每曰使延祖為吏部尚書可使天下無復遺才矣又曰王戎為左僕射領吏部尚書自戎居選未嘗進一寒素退一虛名理一寃枉殺一疽嫉隨其沈浮門調戸選好營生廣收八方園田水碓周遍天下聚斂積實不知紀極又曰呉隱之與太常韓康伯隣居康伯母殷浩之姊賢明婦人也毎聞隱之哭聲輟飡投杼為之悲泣既而謂康伯曰若居銓衡當舉此輩人及康伯為吏部尚書隱之遂階清級又曰蔡克居選官苟進之徒望風畏憚初克未仕時河内山簡嘗與琅琊王衍書曰蔡子尼今之正人衍以書示衆曰山子以一字拔人然未易可稱後衍聞克在選官曰山子正人之言騐於今矣晉起居注曰太康四年八月詔曰選曹銓管人才宜得忠恪寡欲抑華崇本者尚書朱整周慎亷敬以道素自居是其人也其以整為吏部尚書虞預晉書曰盧欽字子若少好學為尚書僕射領吏部欽清實選舉稱為亷平晉陽秋曰陳羣為吏部尚書制九品格登用皆由中正考之簿冊然後授任晉書諸公讚曰李𦙍為吏部尚書正身率職不撓故能行其所見遂刋定選例而著于令宋書曰顔竣為吏部尚書留心選舉自强不息任遇既隆奏無不可後謝荘代竣意多不行竣容貌嚴毅荘風姿甚美賓客喧訴常歡笑答之時人語曰顔竣嗔而與人官謝荘笑而不與人官又曰蔡廓為吏部尚書廓因傅隆問傅亮選事若悉以見付不論不然不能拜亮以語録尚書徐羡之羡之曰黄門已下悉以委蔡自此已上宜共叅同異廓曰我不能為徐干木署紙尾遂不拜干木羡之小字也選案録尚書與吏部尚書連名故廓云紙尾又曰王𢎞自領選將加榮䘵於人者每先呵責譴辱之然後施行若美相盼接語欣歡者必無所諧人問其故答曰王爵既加於人又相撫勞便成與主分功此所謂奸以事君者也若求者絶官叙之分既無以為惠又不微借顔色即大成怨府亦鄙薄所不任問者恱伏又曰江湛為吏部尚書家甚貧不營財利餉饋盈門一無所受無兼衣餘食嘗為上所召遇澣衣稱疾經日衣成然後赴又曰庾仲文性好㓗為吏部尚書用少府卿劉道錫為廣州刺史道錫至鎮餉白檀牽車常自乘焉或以白文帝帝見問曰道錫餉卿小車装餙甚嚴麗有之乎仲文懼起謝又曰庾炳之為吏部尚書通貨賄吏部令史錢泰能彈琵琶主客令史周伯齊善歌詣炳之宅諮事因留宿尚書舊制令史諮事不得宿停外雖有八座命亦不許為所司奏免官也又曰少帝即位以蔡廓為吏部尚書不肯拜乃以王惠代焉惠被召即拜未嘗接客人有與書求官者得輒聚置閣上及去職其封如初時談者以廓之不拜惠之即拜雖事異而意同也齊書曰褚彦回遷吏部尚書有人求官䄂中宻將一餅金因求清閒出金示之曰人無知者彦回曰卿自應得官無假此物若必見與不得不相啟此人大懼收金而去彦回叙其事而不言其名時人莫知之也又曰褚炫為吏部尚書炫居身清立非弔問不雜交遊論者以為美及在選部門庭蕭索賓客罕至出行左右常捧一黄紙㡌風吹紙剥殆盡南史曰初謝脁吿王敬則敬則女為脁妻常懷刃欲報脁脁不敢相見及當拜吏部謙挹尤甚尚書郎范緽嘲之曰卿人才無慙小選但恨不可刑于寡妻脁有愧色南史曰蔡徴拜吏部尚書啟後主借皷吹後主謂所司曰皷吹軍樂有功乃授蔡徴不自量揆紊我朝章然其父景厯既有締構之功宜且如啟拜訖即追還梁書曰蕭子明為吏部尚書性凝簡負才氣見九流賓客不與交言但舉扇一揮而已衣冠竊恨之又曰謝覽字景滌朏之弟瀹之子也自祖至孫三代居選部時以為榮又曰王泰字仲通為都官尚書能接人士士皆願其居選官頃之為吏部尚書衣冠傾屬又曰謝舉字言揚遷掌吏部舉祖荘宋代再典選至舉又三為此職前代未有也崔鴻十六國春秋曰永寧伯郭撫字仲安金城人也初為吏部尚書與郎姚範清心虛求搜掦俊乂内外稱之以擬魏之崔毛後魏書曰崔𤣥伯遷吏部尚書命有司制官爵撰朝儀恊音樂定律令申科禁𤣥伯總而裁之以為永式及置八部大夫擬八座元伯通置三十六曹如令僕統事又曰崔亮遷吏部尚書時羽林新害張彝之後靈太后令武官得依資入選官員既少應選者多前尚書李韶循常擢入百姓大為嗟怨亮乃奏為格制不問士之賢愚專以停解日月為斷雖復官須此人停日後者終於不得庸材下品年月久者灼然先用沉滯者皆稱其能又曰郭祚為吏部祚持身㓗清重惜官位至於銓授假令得人必徘徊久之然後下筆即云此人便是貴矣由是頗勞滯當時每招怨言然所用者皆量才稱職時人以此歸之又曰元順為吏部尚書時三公曹令史朱暉素事録尚書高陽王雍雍欲以為廷尉評頻頻託順順不為用雍遂下命用之順投於地雍聞之大怒昧爽坐都㕔召尚書及丞郎畢集欲待順至於衆挫之順日高方至雍攘袂撫几而言曰天子之子天子之弟天子之叔天子之相四海之内親尊莫二元順何人以身成命投弃於地順鬚眉俱張仰面看屋憤氣奔湧長歔而不言久之搖一白羽扇徐而謂雍曰高祖遷宅中土剙定九流官方清濁軌儀萬古而朱暉小人身為省史何令為廷尉清官殿下既先皇同氣宜遵成㫖自有短垣而復踰之雍曰身為丞相録尚書如何不用一人為官順曰庖人雖不理庖尸祝不得越樽俎而代之未聞有别㫖令殿下恭選事順又厲聲曰殿下必如是順當依事聞雍遂笑而言曰豈可以朱暉小人便相忿恨遂起呼順入室與之極飲順之亢毅不撓皆此類也又曰元脩義遷吏部尚書及在銓衡唯事貨賄授官大小皆有定價時中散大夫高居者有㫖先叙上黨郡缺遂求之脩義私已許人抑居不與居大言不遜脩義命左右臺曳之居對衆大呼天唱賊人問居曰白日公庭安得有賊居指脩義曰此座上者違天子明詔物多者得官京師白刼此非大賊乎脩義失色居行罵而出三國典略曰東魏以楊愔典選嘗六十人為一甲愔令其自叙訖不省文簿使次第呼之呼誤以慕容為長孫一人而已有職人魯漫漢自言微賤不蒙記愔曰卿前在元子思坊乗騾遙見我不下以方麴障面我何不識卿耶漫漢驚服愔又謂之曰名以定體果自不虛令史唱名誤以盧士深為士琛深自言其名愔曰盧郎朗潤所以加玊北齊書曰段孝言為吏部尚書孝言既無深鑒又待物不平抽擢之徒非賄則舊有將作丞崔成忽於衆中抗言曰尚書天下尚書今獨段家尚書也孝言無辭以答唯厲色遣下而已又曰陳孔奐為吏部尚書太子叔寳欲以江總為太子詹事令管記陸瑜言之於奐奐謂瑜曰江有潘陸之才而無園綺之實輔弼儲后竊有所難瑜具以白太子太子深以為恨乃自言於陳主將許之奐乃啟曰江總文章之人今太子文藻不少無藉於總如臣愚見願選敦重之才以居輔道陳主曰即如卿言誰當居此奐曰都尚書王廊世有懿徳識性敦敏可以居之太子時亦在側乃曰王廊泰之子不可以太子詹事奐又啟曰宋朝范蔚宗即范泰之子亦為太子詹事前世不疑太子固爭之陳主卒用總果共太子為長夜之飲養良姊陳氏為女太子微行遊總家陳主怒而免之隋書曰牛𢎞為吏部尚書其選舉先徳行而後文才所進用多稱職吏部侍郎高世本鑒賞機悟清慎絶倫然爽俊有餘迹似輕薄時宰多以此疑之唯𢎞深識其貞推心委任隋之選舉於斯為最又曰牛𢎞拜吏部尚書時高祖又令𢎞與楊素蘇威薛道衡許善心虞世基崔子發等并召諸儒論新禮降殺輕重𢎞所立議衆咸推服之仁夀二年獻皇后崩王公以下不能定其儀注楊素謂𢎞曰公舊學時賢所仰今日之事决在於公𢎞了不辭讓斯須之間儀注悉備皆有故實素歎曰衣冠禮樂盡在此矣非吾所及也又曰韋世康拜吏部尚書前後十餘年間多所進拔朝廷稱為亷平嘗因休暇而謂子弟曰吾聞功遂身退古人常道今年將耳順志在懸車汝輩以為云何子褔嗣答曰大人藻身浴徳名立宦成盈滿之誡先哲所重欲追蹤二疏伏奉尊命唐書曰韋思謙弱冠舉進士累補應城令嵗餘調選思謙在官坐公事微殿舊制多不進官吏部尚書高季輔曰自居選部今始得一人豈以小疵而弃大徳特進超受監察御史由是知名又曰李巽為吏部尚書病極郎官相率省疾巽初不言其病與之考校程課商㩁公利至其夕而終唐新語曰裴光庭為吏部尚書循資格以一賢愚遵平轍者喜其循常負材用者受其抑屈宋璟固爭不得及光庭卒有司定諡以其用循資格非奨勸之道諡為克平先賢行状曰崔琰委授銓衡總齊清議十有餘年文武群才多所明拔朝廷歸美天下稱善袁子曰魏家置吏部尚書專選天下百官夫用人人君之所司不可以假人者也使治亂之柄制在一人之手權重而人才難居此職稱此才者未有一也世説曰王濬沖裴叔則二人總角詣鍾士季須臾去後客問鍾曰二童是誰鍾曰裴楷清通王戎簡要後二十年此二賢為吏部尚書當爾時天下無滯才世說曰安定梁鵠善八分書初為吏部尚書太祖求為洛陽令鵠以為北部尉鵠避地荆州太祖定荆州太祖求鵠乞以書贖死乃令書信幡宫門題語林曰袁貞為監運范𤣥平作吏部尚書大坐語袁卿此選還不失䕶軍袁曰卿何事人中作市井魏名臣奏曰羽林右監朱遺言天下之任非吏部尚書所能獨辦令長以下可專付吏部守以上八座舉傅咸集表曰昔毛玠為吏部尚書無敢好衣美食者魏武歎曰孤之法不如毛尚書今使吏部用心如毛玠風俗之易在不難矣太平御覽卷二百一十四
