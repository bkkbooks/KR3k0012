body:
  text: 太平御覽卷八十八宋李昉等撰皇王部十三漢孝文皇帝孝景皇帝孝武皇帝漢孝文皇帝春秋演孔圖曰戴玉英玉英文帝之首表象玉英而秀出光中再光日光也再再中也漢含孳曰夜景移位復中支庶起也仁雄出日月角為仁人之雄傑既戴王英且日角也謂明於天下史記曰孝文皇帝諱恒諱恒之字曰常諡法慈惠愛民曰文髙祖中子也髙祖十一年春以破陳豨軍定代地立為代王都中都太后薄氏子即位十七年髙后八年七月髙后崩吕産等欲為亂以危劉氏大臣誅之使迎代王王問左右郎中令張武等議曰漢大臣皆故髙帝時大將習兵多詐謀今誅諸吕新啑血京師此以迎大王為名實不可信願大王稱疾無徃以觀其變中尉宋昌進曰夫秦失其政諸侯豪傑並起人人自以為得之者以萬數然卒踐天子位者劉氏也天下絶望一矣髙帝封王子弟地犬牙相制此所謂盤石之宗也天下服其强二矣漢興除秦苛政約法令施德惠人人自安難動摇三也夫以吕太后之嚴立諸吕為三王擅權專制然而太尉以節入圵軍一呼士皆左袒為劉氏叛諸吕卒以滅之此乃天授非人力也今髙帝子獨淮南王與大王大王又長賢聖仁孝聞於天下故大臣因天下之心而欲迎立大王大王勿疑也代王卜之龜兆得大橫占曰大橫庚庚余為天王夏啟以光代王曰寡人固已為王矣又何王卜人曰所謂天王者乃天子也代王乃命宋昌叅乘張武等六人乘傳詣長安至髙陵休止而使宋昌先馳之長安觀變昌至渭橋丞相已下皆迎宋昌還報代王馳至渭橋羣臣拜謁太尉勃進曰願請間言昌曰所言公公言之所言私王者無私太尉乃跪上天子璽符代王謝曰至代邸而議之遂馳入代邸宗室大臣列侯吏二千石皆伏固請代王西向讓者三南向讓者再遂即天子位即日夕入未央宫三年匈奴入北地居河南為冦辛卯帝自甘泉之髙奴因幸太原見故郡臣皆賜之舉功行賞十三年齊太倉令淳于公有罪當刑少女緹縈自傷泣迺隨其父至長安上書願没入為官婢贖父刑罪使得自新書奏天子天子憐悲其意乃下詔曰夫刑至斷支體刻肌膚終身不息何其楚痛豈稱為民父母之意哉其除肉刑又曰孝文皇帝從代來即位二十三年宫室苑囿狗馬服御無所增益有不便輙弛以利民嘗欲作露臺召匠計之直百金上曰百金中民十家之産吾奉先帝宫室常恐羞之何以臺為上常衣綈衣所幸慎夫人令衣不得曳地幃帳不得文繡以示敦樸為天下先治霸陵皆以瓦器不得以金銀錫銅為飾吳王詐病不朝就賜几杖羣臣如袁盎等稱說雖切常假借用之羣臣如張武等受賂遺金錢覺上乃發御府金錢賜之以愧其心弗下吏專務以德化民是以海内殷富興於禮義後七年六月己亥帝崩於未央宫遺詔無發民男女哭臨服大功十五日小功十四日纎七日釋服史記太史公曰孔子言王者必世而後仁又曰善人為邦百年亦可以勝殘去殺矣誠哉是言也漢興至孝文四十有餘載德至盛也漢書曰張蒼免相文帝以皇后弟竇廣國有賢行欲相之曰恐天下以吾私廣國乃以御史大夫申屠嘉為丞相又曰武帝從容問東方朔曰吾欲化民豈有道乎朔對曰願近述孝文皇帝之時當世耆老皆聞見之貴為天子富有四海身衣弋綈足履革舄以韋帶劔莞蒲為席兵木為刃服度曰兵噐如木而無刃衣緼無文集上書囊以為殿帷以道德為麗以仁義為准於是天下望風成俗昭然化之又曰賈損之曰孝文皇帝閔中國未安偃武修文時有獻千里馬者詔曰鸞旗在前屬車在後吉行日五十里師行三十里朕乘千里之馬獨先安之於是還馬與道里費荀悅漢記曰韓信為左丞相與曹參灌嬰擊魏王豹豹有姬曰薄姬許負相之當生天子豹恃此言而反豹敗漢王納薄姬生文帝又曰以孝文之明大朝之治百寮之賢而賈誼見排逐張釋之十年不見省馮唐首白屈於郎豈不惜哉夫以絳侯之忠功存社稷而猶見疑不亦痛乎帝王世紀曰孝文即位二十三年年四十七葬霸陵因山為體廟名顧城桓子新論曰漢太宗文帝有仁智通明之德承漢初定躬儉省約以惠休百姓救贍困乏除肉刑滅律法薄葬埋損輿服所謂達於養生送終之實者也及始從代徴時謀議狐疑能從宋昌之策應聲馳來即位而偃武修文施布大恩欲息兵革與匈奴和親總撮綱紀故遂褒增隆為太宗而溺于俗議斥逐材臣又不勝私恩使嬖妾慎夫人與皇后同席以亂尊卑之倫所謂通而蔽也風俗通曰孝成皇帝問劉向世俗多傳道文皇帝少生於軍不知父所在日祭於代城東門外髙帝數夢見一兒祭已使使至代求之果得文帝立為大王後徵到後期不得立日為再中遂即位為天子躬行至儉集上書囊以為前殿帷常居明光宫聽政為皇太后持三年服天下平米升一錢有此事不向對曰文帝生而為王者子常居宫闕内不棄捐軍中祭代東門外也髙后八年九月己酉夕即位時已昏夜日不再中也文帝雖節儉未央宫前殿至奢雕文及五彩畫華欀壁墻軒檻皆飾以黃金其勢不可以書囊為帷又帝率聽政宣室不在明光宫也薄太后孝景二年薨不持三年服也匈奴數犯塞侵擾邊境候騎至甘泉烽火通長安由是北邊至屯守戰設備胡兵連不解轉輸騷擾費積虚耗因以年歲不登百姓飢乏穀糴嘗至石五百非一升一錢也上曰臨朝總政施號令如何未及對上復謂向校尉宗室師傅耆舊洽聞親事先帝厯見三世得失勿有所隠向曰文帝嘗過輦郎署呼郎中馮唐問以趙將亷頗李牧唐言今雖有此人不能用也推輦而去還歸禁中召責讓唐鄧通以佞幸吮癰見愛賜以蜀郡銅山令得鑄錢通私家之富侔於王者邦君又為㣲行數幸通家衣􅄢襲旃從侍中近臣常侍期門武騎獵漸臺下騎射狐兔上曰後世皆言文帝治天下幾致太平其德偕周成王此語何從生向曰文帝治禮言者不傷其意臣無以大小或有言即從容止輦聽之言事者多褒之後人見其遺文則以為然世之毁譽莫能得實審形者少隨聲者多然文帝之節儉約身以變天下忍容言者含咽臣子之短此過人難及也典論曰文帝慈孝寛𢎞仁厚躬修𤣥黙以儉帥下奉生送終事從約省美聲塞於宇宙仁風暢於四海又曰文帝思賢甚於饑渴用人速於順流班固漢書述曰太宗穆穆允恭元黙化民以躬帥下以德我德如風民應如草國富刑清登我漢道孝景皇帝史記曰孝景皇帝孝文帝之中子也母竇太后孝文在代時前后有三男及竇太后得幸前后死及三子更死故孝景得立漢書曰孝景皇帝諱啟字曰開應劭曰禮諡法布義行剛曰景文皇帝太子也母曰竇太后七年六月文帝崩丁未太子即皇帝位又曰孔子稱斯民三代之所以直道而行也信哉周秦之弊網宻文峻而姦宄不勝漢興掃除煩苛與民休息至于孝文加之以恭儉孝景遵業五六載之間移風易俗黎民醇厚周云成康漢言文景美矣又曰孝景即帝位竇嬰為太子詹事帝弟梁孝王母竇太后愛之孝王朝因燕昆弟飲是時上未立太子酒酣上從容曰千秋萬歲後傳王太后大欣嬰引巵酒進上曰天下者髙祖天下也父子相傳漢之約也何以得傳梁王太后由此憎嬰帝王世紀曰孝景帝即位十六年年四十八葬陽陵廟名徳陽班固漢書述曰孝景蒞政諸侯方命尚書方命圯族鯀之惡壞其族類吳楚七國亦然也克伐七國王室以定匪怠匪荒務在農桑著于甲令民用寧康魏陳王曹植漢景帝贊曰景帝明德繼文之則肅清王室克滅七國省役薄賦百姓殷昌風移俗易齊美成康孝武皇帝史記本紀曰孝武皇帝漢書音義曰諱徹也孝景帝中子也母曰王太后孝景四年以皇子為膠東王七年栗太子廢為臨江王以膠東王為太子孝景十六年崩太子即位為孝武皇帝漢書武帝紀曰後三年正月景帝崩甲子太子即位元朔四年冬行幸甘泉元狩元年冬十月行幸雍祠五畤獲白麟乃作白麟之歌元鼎四年冬十月行自夏陽東幸汾隂十一月甲子后土祠於汾隂睢之上蘇林曰睢音雖如淳曰睢者河之東岸也元封元年應邵曰始封太山改年也行自雲陽北厯上郡西河五源出長城登單于臺至朔方臨河北勒兵十八萬騎旌旗經千餘里威震匈奴還祠黄帝于橋山乃歸甘泉遂東巡於河上夏四月上還登封太山王者功成治定告成功於天封岱宗也助天髙也刻石紀號有金䇿石函金泥玉檢之封焉降明堂案郊祠志曰初天子封太山太山東北址古時有明堂也行自太山復東巡於海上至碣石文穎曰在遼西絫縣今改屬臨榆此石著海旁師古曰碣然特立之貎也音其列反二年冬十月行幸雍祠五畤春幸緱氏遂至東萊夏四月還祠太山至瓠子服虔曰瓠子堤名也蘇林曰在鄄城南濮陽北地廣百步深五丈臨決河命從臣將軍以下皆負薪塞河隄作瓠子之歌四年冬十月幸雍祠五畤通回中道應劭曰回中在安定髙平有險阻肖關在其北通至長安也孟康曰回中在北地山險武帝故宫如淳曰三輔黃圖曰回中宫在汧也遂北巡肖關如淳曰匈奴傳匈奴入朝那肖關在安定朝那縣也五年冬南巡狩至于盛宫如淳曰縣名也韋昭曰南郡也望祠虞舜于九疑應劭曰舜葬蒼梧九疑山今零陵營道也祭灊天柱山應劭曰灊音潛南嶽霍山灊縣屬名廬江文穎曰天柱山灊縣南有祠自尋陽浮江親射蛟江中獲之舳艫千里天漢三年應劭曰時頻年苦旱故改年為天漢以祈甘雨晉灼曰取雲漢之詩求雨之意也初榷酒酤三月行幸太山修封祀明堂還幸北地祠常山瘞𤣥玉夏四月赦天下行所過毋出田租太始三年行幸甘泉宫饗外國客二月令天下大酺五月行幸東海獲赤鴈作朱鴈之歌幸琅邪禮日成山孟康曰禮日祠日也韋昭曰成山在東萊界四年夏五月還幸建章宫後元二年朝諸侯王于甘泉宫賜宗室乙丑立皇子弗陵為皇太子張晏曰昭帝也後但名弗以多難諱丁卯帝崩于五柞宫案帝年十七即位即位五十四年壽七十一歲也張晏曰有五柞之樹故因以名宫在盩厔縣也𦵏於茂陵漢書贊曰漢承百弊之後髙祖撥亂反正文景務在養民至于稽古禮文之事猶闕焉孝武初立卓然罷黜百家表章六經遂疇咨海内舉其俊民與之立功興太學修郊祀改正朔定厯數協章律作詩樂建封禪禮百神紹周後號令文章煥焉可述後嗣得遵洪業而有三代之風如武帝之雄才大畧不改文景之恭儉以濟斯民雖詩書所稱何有加焉漢書宣帝紀曰本始三年尊孝武帝廟為世宗廟奏盛德之舞武帝巡狩所幸郡國皆立廟荀說漢紀論曰孝武皇帝規矩萬世之業固後世之基地内修文學外耀武威以延天下之士先王之風粲然可考者矣然猶好其文未盡其實發其始不克其終奢侈而無限窮兵黷武百姓空竭萬民罷弊當此之時天下騷然海内無聊而孝文之業衰焉劉歆毁廟議曰孝武皇帝愍中國罷勞無安寧之時乃遣大將伏波樓船之屬滅百越七郡北攘匈奴降昆邪之衆置五屬國起朔方以奪其肥饒之地東伐朝鮮起元菟樂浪以斷匈奴之左臂西伐大宛并三十六國結烏孫起燉煌酒泉張掖以隔婼羌裂匈奴之右肩單于孤特逺遁幕北四垂無事斥地逺境起十餘郡功業既定迺封丞相為富民侯以安天下富實百姓其規模可見又招集天下賢俊與協心同謀興制度改正朔易服色立天地之祠建封禪殊官號存周後定諸侯之制永無逆爭之心至今累世賴之單于守蕃百蠻服從萬世之基也中興之功未有髙焉者也漢武故事曰漢景皇帝后姙身夢日入其懷景帝又夢見髙祖謂已曰王美人生子可名為彘及生男日因名之焉武帝生於猗蘭殿年四歲立為膠東王數歲長主抱著其膝上問曰兒欲得婦不膠東王曰欲得婦長主指左右長御百餘人皆云不用末指其女問曰阿嬌好不於是乃笑對曰好若得阿嬌作婦當作金屋貯之也長主大悅乃苦要上遂定婚焉膠東王為皇太子時年七歲上曰彘者徹也因改曰徹丞相周亞夫宴時太子在側亞夫失意有怨色太子視之不輟亞夫於是起帝曰爾何故視此人耶對曰此人可畏必能作賊帝笑曰因此怏怏非少主之臣也廷尉上囚防年繼母陳殺父因殺陳依律年殺母大逆論帝疑之詔問太子太子對曰夫繼母如母明其不及母也縁父之愛故比之於母耳今繼母無狀手殺其父則下手之日母恩絶矣宜與殺人者同不宜大逆論帝從之年棄市議者稱善時太子年十四帝益以竒之及即位常晨徃夜還與霍去病等十餘人皆輕服為微行且以觀戲市里察民風俗嘗至蓮勺通道中行行者皆奔避路上怪之使左右問之云有持㦸前呵者數十人時微行率不過二十人馬七八疋更步更騎衣如凡庶不可别也亦了無騶御而百姓咸見之又嘗至栢谷夜宿亭亭長不内乃宿於逆旅逆旅翁謂上曰汝長大多力當勤稼穡何忽帶劔衆夜行此不欲為盜則淫耳上嘿然不應因乞漿飲翁答曰吾止有溺無漿也有頃還内上使覘之見翁方與少年十餘人皆持弓矢刀劔令主人嫗出探過客嫗歸謂其翁曰吾觀此丈夫非常人也且亦有備不可圖也天寒嫗酌酒多與夫及諸少年皆醉嫗自縳其夫諸少年皆走嫗出謝客殺雞作食平旦上去是日還宫乃召逆旅夫妻見之賜嫗千金擢其夫羽林郎自是懲戒弗復㣲行上少好學招求天下遺書上親自省校使莊助司馬相如等以類分别之好詞賦每所行幸及竒獸異物輙命相如等賦之上亦自作詩賦數百篇下筆即成初不留時相如造文遲彌時而後成上每歎其工妙謂相如曰以吾之速易子之遲可乎相如曰於臣則可未知陛下何如耳上大笑而不責然性嚴急不貸小過刑殺法令殊為峻刻汲黯每諌曰陛下愛才樂士求之無倦比得人勞苦神明未盡其用輙殺之以有限之士資無已之誅臣恐天下賢才將盡陛下欲與誰為治乎黯言之甚怒上笑而諭之行幸河汾中流與羣臣飲醼乃自作秋風辭顧謂羣臣曰漢有六七之厄法應再受命宗室子孫誰當應此者六七四十二代漢者當塗髙也羣臣進曰漢應天受命祚踰周殷子子孫孫萬世不絶陛下安得此亡國之言過聽於臣妾乎上曰吾醉言耳然自古以來不聞一姓遂長王天下者但使失之非吾父子可矣行幸五柞宫謂霍光曰朕且死矣可立鈎弋子公善輔之三月丙寅上晝卧不覺顔色不異而身冷無氣明日色漸變閉目乃發哀告喪未央前殿朝晡上祭若有食之者常所幸御葬畢悉居茂陵園上自婕妤以下二百餘人上幸之如平生而傍人不見也光聞之乃更出宫人增為五百人因此遂絶始元二年吏告民盜用乘輿御物者案其題乃茂陵中明噐也民别買得光疑葬日監官不謹容致盜竊乃收將作以下繫長安獄考訊居歲餘鄴縣又有一人於市貨玉杯吏疑其御物欲捕之因忽不見縣送其噐推問又茂陵中物也光自呼吏問之說市人形貌如先帝光於是黙然乃赦前所繫者歲餘上又見形謂茂陵令薛平曰吾雖失世猶為汝君奈何令吏卒上吾陵上磨刀劔乎忽然不見因推問陵旁有方石以為礪吏卒常盜磨刀劔甘泉宫恒自然有鐘鼔聲候者時見後宫鹵簿似天子自後轉稀至宣帝世乃絶宣帝即位尊孝武廟曰世宗奏樂之日虚中有唱善者告祠之日白鵠羣飛集後庭西河立廟神光滿殿中狀如月東萊立廟有大鳥啼其上白龍夜見河東立廟告祠之日白虎啣肉置殿前又有一人騎馬馬異於常馬持捉一札賜將作丞曰聞汝績克成賜汝金一斤因忽不見札乃變為金稱之有一斤廣川告祠之明日有鐘磬音房户皆開夜有光香氣正聞二三里宣帝親祠甘泉有頃紫黃氣從西北來散於殿前肅然有風空中有妓樂聲羣鳥翔舞蔽天宣帝既親覩光怪乃疑先帝有神復招諸方士冀得仙焉帝王世紀曰孝武帝廟名淵龍幽明録曰漢武帝在甘泉宫有玉女降常與帝圍碁相娛女風姿端正帝宻悅乃逼之玉女因唾帝面而去遂病瘡經年故漢書云避暑甘泉宫此其時也劉歆七畧曰孝武皇帝勅丞相公孫𢎞廣開獻書之路百年之間書積如丘山故外有太常太史博士之藏内有延閣廣内祕室之府桓子新論曰漢武帝材質髙妙有崇先廣統之規故即位而開發大志考合古今模範前聖故事建正朔定制度招選俊傑奮揚威怒武義四加所征者服興起六藝廣進儒術自開闢以來唯漢家最為盛焉故顯為世宗可謂卓爾絶世之主矣然上多過差既欲斥境廣土又乃貪利爭物之無益者聞西夷大宛國有名馬即大發軍兵攻取厯年士衆多死但得數十疋耳又歌兒衛子夫因幸愛重乃隂求陳皇后過惡而廢退之即立子夫更其男為太子後聽邪臣之譛衛后以憂死太子出走滅亡不知其處信其巫蠱多徵㑹邪僻求不急之方大起宫室内竭府庫外罷天下百姓之死亡不可勝數此可謂通而蔽者典論曰孝武帝承累世之遺業遇中國之殷阜府庫餘錢帛倉廪畜腐粟因此有意平滅匈奴而得清邊境矣故即位之初從王恢之畫設馬邑之謀自元光以迄征和四五十載之間征匈奴四十餘舉踰廣漢絶梓嶺封狼居禪姑幕梁北河觀兵瀚海列單于之旗勦閼氏之首採符離之窟掃五王之庭納休屠昆耶之附獲祭天金人之寶斬名王以千數馘首虜以萬計既窮追其散亡又摧破其積衆虜不暇於救死扶傷疲困於孕重墮殞元封初躬執武節告以天子自將懼以南越之誅彼時號為威震匈奴矣後漢班固武帝述曰世宗曄曄思𢎞祖業疇咨熙載髦俊並作厥作伊何百蠻是攘恢我疆宇外薄四荒武功既抗亦迪斯文憲章六學統一聖真封禪郊祀祭旅百神協律改正饗兹永年魏陳王曹植漢武帝賛曰世宗踐位戎狄是攘威震百蠻恢拓土疆簡定律厯辨修舊章封天禪土功超百王周庾信漢武帝聚書賛曰獻書路廣藏書府開秦儒出谷漢簡吹灰芝泥印上玉匣封來坐觀風俗不出蘭臺沈炯祭漢武帝陵文曰臣聞橋山雖掩鼎湖之靈可祠有魯遂荒大庭之跡不泯伏惟陛下降德猗蘭纂靈豐谷漢道既登神仙可望射神蛟於江浦禮日觀而稱功横中流於汾河指栢梁而髙宴何其甚樂豈不然歟既而運屬上遷道窮晏駕甲帳珠簾一朝零落茂陵玉椀遂出人間陵雲故塞與原田而膴膴别風餘趾帶陵阜而茫茫覉旅之臣豈不落淚昔者承明見厭嚴助東歸駟馬可乘長卿西返恭聞故實竊有愚衷黍稷非馨敢望徼福爵臺之薦空愴魏君雍丘之祠未光夏后瞻仰徽猷伏增悽懼太平御覽卷八十八
