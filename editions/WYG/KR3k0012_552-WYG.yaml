body:
  text: 太平御覽卷五百五十二宋李昉等撰禮儀部三十一椁攢蒭靈明器明衣祖載翣紼旅旒旐輓歌方相椁周禮地官閭師曰凡庶民不樹者不椁禮記檀弓上曰有子曰昔者夫子居于宋見桓司馬自為石椁三年而不成夫子曰若是其靡也死不如速朽之愈也死之欲速朽為桓司馬言之禮記檀弓下曰孔子之故人原壤其母死夫子助之沐椁沐浴也原壤登木曰久矣予之不託于音也木椁材也託寄也謂叩物以作音也曰貍首之斑然執女手之卷然喻其柔也夫子為弗聞也者而過之從者曰子未可以已乎夫子曰丘聞之親者無失其為親也故者無失其為故也禮記大記曰君松椁大夫栢椁士雜木椁椁謂周槨也天子栢椁以端長六尺夫子制于中都使庶人之槨五寸為端方也棺椁之間君容祝大夫容壺士容甒間可以裁物因而為節左傳定公上曰魏獻子屬役於韓簡子原壽過簡子韓起孫不信原夀過周大夫也而田于大陸焚焉還卒于寗寗今修武縣也范獻子去其柏椁以其未復命而已范獻子代魏子為政去其栢椁示貶史記曰始皇葬驪山發北山石為椁又曰慎夫人鼓瑟上自倚瑟而歌意悽愴悲懐顧謂羣臣曰嗟乎北山石為椁用紵絮斮一作錯陳漆其間紵絮以漆著其間豈可動哉左右曰善張釋之前曰使其中有可欲者雖錮南山猶有郄使其中無可欲者雖無石椁有何慼焉文帝稱善古史考曰禹作土堲以周棺湯作木槨易土堲漢書曰始皇石椁中為遊又劉向上書曰棺椁之作自黄帝始也臣瓚注曰殷人作棺椁也始皇葬於驪山後牧兒亡羊羊入其藏牧者持火照求羊失火燒其藏及椁續漢禮儀志曰侯王公主將軍特進薨吏者治䘮作栢椁東觀漢記曰明帝自制石椁廣丈二尺長二丈五魏志曰夫餘國厚葬有椁無棺東沃沮其葬作大木椁長十餘丈開一頭作户舉家皆共椁刻木為數魚豢魏畧曰髙麗其死葬有椁無棺停䘮百日也越絶書曰闔閭葬銅椁三重二石偽事曰佛圖澄死時衆官皆殯斂以生所服錫杖鉢終内著棺中為其埋石作椁葬畢終年冉閔後故發椁開棺視之了不見骸骨處所唯見杖鉢存焉莊子曰衞靈公死卜葬沙丘而吉掘之數仞得石椁焉有銘曰不馮其子靈公奪而埋之廣雅曰椁廓也郭緣先述征記曰桓魋石椁在九里山之東北也椁有二重門間隱起青石方淨如鏡門扇數四博物志曰漢滕公薨公卿送至東都門外駟馬悲鳴掊地不行于蹄下得石椁有銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室豫章記曰艾縣有塜鑿青石以為椁制度非常號曰楊柳塜厯代久逺莫知其誰攢禮記䘮大記曰君殯用輴攢至于上畢塗屋大夫以幬攢置于西序塗不暨于棺士殯見袵塗上帷之鄭𤣥註云攢猶藂也釋名曰塗曰攢攢木于上塗之也蒭靈周禮春官塜人曰及葬言鸞車象人鸞遣車也象人以藂草為人言問其不如法度也禮記檀弓曰塗車蒭靈自古有之蒭靈束草為人馬謂之靈者以神靈明之也明器之道也言與器同明孔子謂為蒭靈者善謂為俑者不仁不殆于用人乎哉俑偶人也有面目肌髪有似于生人孔子善古而非周釋名曰束草為人馬以神靈明之也續漢書禮儀志曰天子崩蒭靈三十六尺王肅䘮記服要記曰魯哀公葬父孔子問曰寧設桐人乎哀公曰桐人起于虞卿齊人遇惡繼母不得養父死不能葬知有過故作桐人吾父生得供養何桐人為陸機士庶輓歌辭曰埏埴為塗車束薪作芻靈明器周禮春官冡人曰大䘮入藏凶器凶器明器周禮夏官司兵曰大䘮廞五兵廞興作也興作明器之兵禮記檀弓上曰宋襄公葬其夫人醯醢百甕曽子曰既曰明器矣而又實之言公之為明器與祭器皆實之是亂鬼器與人器也又曰既殯旬而成材與明器木工宜乾暗宜預成材椁材也又曰知死而致死之不仁而不可為也知死而致生之不知而不可為也之彺也死之生之謂無知與有知也為猶行也是故竹不成用瓦不成味木不成斵成猶善也竹不可用善謂邊無膝味當作沫黒光也琴瑟張而不平竽笙備而不和無宫商之謂有鐘磬而無簨簴不懸之也横曰簨直曰簴其曰明器神明之也言神明死者也神明者非人所知故其器用如此也又曰仲憲言于曽子曰夏后氏用明器示民無知也所謂致死之仲憲孔子弟子原憲殷人用祭器示民有知也所謂致生之周人兼用之示民疑也言使民疑于無知與有知也曾子曰不然乎言其説之非也夫明器鬼器也祭器人器也夫古人胡為而死其親乎言仲憲之言三者皆非此或用鬼器或用人器又檀弓下曰孔子謂明器者知喪道矣備物而不可用也哀哉死者而用生者之器不殆於用殉乎哉其曰明器神明之也神明死者于生人也釋名曰送死之器曰明器神明之器異于人鹽鐵論曰古者明器有形無實示人不用也今厚資多藏用器如生人並衣綈紈江廸表曰宣皇帝顧命終詔山陵不設明器以貽後則景帝奏遵遺勅逮文明皇后崩武皇帝亦承前無所施設唯酺醢之奠瓦器而已昔康皇帝𤣥宮内寶奩烏粥此葢太妃因己之情實違先志累世之法今永欲以為故事用此二物明衣説文曰褮鬼衣也褮讀如葛纍縈之褮穆天子傳曰贈用文錦明衣祖載周禮春官䘮祝曰掌大䘮及朝御柩乃奠朝將葬朝于祖考廟及祖飾棺及載遂御之祖將葬祖于庭禮記檀弓曰殯于客位祖于庭所以即遠也儀禮既夕哭請啟期告于賔夙興設盥于祖廟門外祖王父也下士祖禰共廟有司請祖期將行而飲酒曰祖祖始也白虎通曰祖于庭何奪孝子之恩也祖始載于廷也乘車辭祖禰故為祖載也翣周禮夏官曰御僕大䘮持翣翣棺飾也持之者夾屬車禮記檀弓下曰周人廧置翣鄭𤣥注云廧柳衣翣者車飾也又禮器曰天子七月而葬五重八翣諸侯五月而葬再重四翣此以多為貴也又䘮大記曰飾棺君黼翣二黻翣二畵翣二大夫黻翣二畫翣二士畫翣二古史考曰周公作翣齊書曰張緒卒日無宅以殯遺命凶事不設檟翣莊子曰戰而死者其人之葬也不以翣資翣者武之所以資也戰而死者無武翣將安施耳世本曰武王作翣董勛答問曰翣屏風人持隨䘮車前後左右也紼禮記雜記曰諸侯䘮執紼五百人四紼皆銜枚紼引車之索也釋名曰從前引曰紼紼發也發車使行續漢書禮儀志曰禮登遐中黄門虎賁執紼又曰公卿以下子弟凡三百執紼白素幘委貌冠杜預集要曰凡輓天子六紼諸侯四大夫二士一旅旒賀循葬禮記曰大夫五旒吉委車之所建也通而已下不為龍畫旐周禮春官曰司常大䘮供銘旌建廞車之旌銘旌王則太常也禮記檀弓上曰銘明旌也以死者為不可别也故以其旗識之續漢書禮儀志曰禮登遐大旂之制長三仞十有二斿曳地畫日月昇龍書旐曰天子之柩賀循曰扛今之旐也古者以緇布為之今以絳繒題姓字而已不為畫飾也禮論曰問下殤葬墓有旐否徐邈答曰旐以題柩耳無不有旐晉書曰魏明悼后崩議書銘旌或欲去姓而書魏或欲兩書安平王孚以為經典正義皆不應書凡帝王皆因本國之名以為天子之號而與往代相别耳非為擇美名以自光也天稱皇天則帝稱皇帝地稱后土則后稱皇后此乃所同天地之號綂無二之尊名不待稱國號以自表不俟稱世族以自彰輓歌左傳哀公上曰吳與齊戰齊公孫夏將戰命其徒歌虞殯杜預注曰虞殯葬歌曲示必死纂文曰薤露今人輓歌續漢書禮儀志曰禮登遐羽林孤兒巴歈擢歌者六十人續漢書曰大將軍梁商三月上巳日㑹洛水倡樂畢極終以薤露歌之座中流涕其年八月而商薨晉公卿禮秩曰安平王葬給輓歌六十人諸公及開府給三十人晉書禮志曰漢魏故事大䘮及大臣之葬執紼者輓歌新禮以為輓歌出于漢武帝役人之勞歌聲哀切遂以為送終之禮雖音曲摧愴非經典所制違禮銜枚之義方在號慕不宜以歌為名除挽歌摯虞以為挽歌因唱和而為悽愴之聲銜枚所以全哀此亦足以感衆雖非經典所載是厯代故事詩稱君子作歌惟以告哀以歌為名無所嫌宜定新禮如舊續晉陽秋曰袁山松作行路難辭句婉麗聽者莫不流泪羊曇善倡樂桓伊能挽歌時稱爲三絶又曰武陵王晞未敗四五年善為挽歌自揺鈴使左右和之語林曰張湛好于齋前種松栢養鸜鵒袁山松出遊好令左右輓歌時人謂張屋下陳屍袁道上行殯謝綽拾遺録曰太祖嘗召顔延之傳詔頻日尋覔不值太祖曰但酒店中自當得也傳詔依㫖訪覔果見延之在酒肆躶身自挽歌了不對他日醉醒乃往宋書曰范􅁮為吏部郎元嘉元年彭城王大妃薨將葬祖夕僚故普集東府􅁮與司徒左曹屬王琛及弟司徒祭酒廣夜中酣飲開北牖聽輓歌為樂彭城王義康大怒左遷宣城太守梁書曰謝機卿普通六年詔西昌侯藻督衆軍北侵機卿啟求行擢為藻軍師長史軍至渦陽退敗機卿坐免官居白楊石井宅中交好者載酒從之滿坐時左丞庾仲容亦免歸二人亦相得並肆情誕縱或乗露車厯遊郊野醉則執鐸輓歌不屑物議莊子曰紼謳所生必于斥苦司馬彪注云紼引柩索也斥疎緩苦用力也引紼所有謳者為人用力慢緩不齊促急之也風俗通曰京師殯婚嘉㑹酒酣之後續以輓歌譙周法訓曰輓歌者高帝召田横至尸鄉自斃從者不敢哭而不勝其哀故作此歌以寄哀音焉干寶搜神記曰輓歌者䘮家之樂執紼者相和之聲也輓歌詞有薤露蒿里三章出田横門人横自殺門人傷之為悲歌言人如薤上露易晞滅也亦為人死精䰟托于蒿里古辭曰薤上露何易晞露晞明朝更復落人死一去何時歸二章曰蒿里誰家地聚斂精魄無賢愚鬼伯一何相催促人命不得少踟蹰至李延年乃分為二曲薤露歌送王公貴人蒿里送士大夫庶人使輓柩者歌之又有長短歌言夀命長短不可妄求魏繆襲輓歌辭曰生時游國都死殁棄中野朝發髙堂上暮宿黄泉下白日入虞淵懸車息駟馬造化雖神明安能復存我形容稍歇滅齒髪行當墮自古皆有然誰能離此者陸機輓歌辭曰䰟衣何盈盈旟旐何習習父母拊棺號兄弟扶筵泣靈轜動轇轕龍首矯崔嵬輓歌挾轂唱嘈嘈一何悲浮雲中容與飄風不能回淵魚仰失梁征烏俯墜飛又曰中闈且勿喧聽我薤露詩生死各異倫祖載常有時舍爵兩楹位啟殯進虛轜餞飲觴莫舉出宿歸無期又曰重阜何崔嵬𤣥廬竄其間磅礴立四極穹崇効蒼天側聽隂溝涌卧觀天井懸壙宵何遼廓大暮安可晨人往有返歲我行無歸年昔居四民宅今為萬鬼隣昔為七尺體今成灰與塵金玉昔所佩鴻毛今不振豐肌享螻蟻形體永夷泯壽堂延魑魅虛無自相賔螻蟻爾何怨魑魅我何親撫心痛荼毒永歎莫為陳晉陶潛輓歌辭曰荒草何茫茫白楊亦蕭蕭嚴霜九月中送我出逺郊四向無人居髙墳正嶕嶤馬為仰天鳴風為自蕭條幽室一以閤千年不復朝賢達無奈何向來相送人各已歸其家親戚或餘悲他人亦已歌死去何所道託體同山阿又曰有生必有死早終非命促昨暮同為人今旦在鬼録䰟氣散何之枯形寄空谷嬌兒索父號良友撫棺哭顔延之輓歌曰令龜告明兆撤奠在方昏戒徒赴幽窀祖駕出髙門行行去城邑遥遥首丘園息鑣竟平隧輓駕列岩根北齊祖孝徴輓歌昔日驅駟馬謁帝長楊宫旌懸白雲外騎獵紅塵中今來向漳浦素葢轉悲風榮華與歌笑萬事盡成空隋盧思道彭城王挽歌辭曰旭日禁門開隱隱靈輿發纔㸔鳳樓廻稍視龍山没猶陳五營騎尚聚三河卒容衞未儼歸山空照秋月又樂平長公主輓歌辭曰粧樓對馳道吹臺臨景舍風入上春朝月滿凉秋夜未言歌笑畢已覺生榮謝何時洛水湄芝田解龍駕方相周禮夏官曰方相氏掌䝉熊皮黄金四目𤣥衣朱裳執戈揚楯帥百􅈻大䘮先匶及墓入壙以戈擊四隅歐方良壙穿中也方良罔兩也蔡質漢官儀曰隂太后崩前有方相及鳳皇車晉公卿禮秩曰上公薨者給方相車一乗安平王孚薨方相車駕馬幽明録曰廣陵露白村人每夜輒見鬼怪或有異形醜惡怯弱者莫敢過村人怪如此疑必有故相率得十人一時發地掘入地尺許得一朽爛方相頭訪之故老嘗有人冐雨送葬至此遇却一時散走方相頭陷没泥中風俗通曰俗説亡人䰟氣浮揚故作魌頭以存之言頭體魌魌然盛大也或為魌頭為觸壙殊方語也太平御覽卷五百五十二
