body:
  text: 太平御覽卷五百四十宋李昉等撰禮儀部十九冠婚姻上冠儀禮曰士冠禮筮於廟門鄭𤣥注曰筮者告於廟重成人之禮主人𤣥冠朝服緇帶素韠即位於門東西面筮人即席坐西面卦者在左卒筮書封執以示主人筮人還東面旅占卒進告吉前期三日筮賔如求日之儀筮賔筮可使冠子者乃宿賔賔許厥明夕為期於廟門之外主人立於門東兄弟在其南擯者請期宰告曰質明行事夙興設洗陳服於房中西墉下爵弁服纁裳純衣緇帶韎韐皮冠服素積緇帶素韠𤣥端黄裳雜裳緇帶爵韠緇布冠主人立於阼階下兄弟立於洗東将冠者出房南面賛者奠纚䈂櫛于筵南端徹皮弁冠櫛筵入于房筵於户西南面冠者就筵西拜受觶冠者奠觶於薦東筵北面坐取脯降自西適東壁北面見於母時母在闈門之内婦人入廟由闈門母拜受子拜送母又拜賔降立西序東面主人降復初位冠立於西階東南面賔字之冠者對賔出主人送於廟門外請醴賔就次此醴當作禮禮賔者謝其勤勞也冠者見於兄弟再拜冠者答拜入見姑姊如見其母如見母者亦北面姑姊亦俠拜也不見妹妹卑也乃易服服𤣥冠𤣥端爵韠奠贄見於君遂以贄見卿大夫鄉先生若孤子則父兄戒宿若庶子則冠於房外南面遂醮焉加始祝曰令月吉日始加元服棄爾幼志順爾成徳夀考維祺介爾景福再加曰吉月令辰乃申爾服敬爾威儀淑慎爾徳眉夀萬年永受斯福三加曰以嵗之正以月之令咸加爾服兄弟具在以成厥徳黄耉無疆受天之慶醴辭曰甘醴惟厚嘉薦令芳拜受祭之以定爾祥承天之休夀考不忘醮辭曰㫖酒既清嘉薦亶時始加元服兄弟具來孝友時格永乃保之再醮曰㫖酒既湑嘉薦伊脯乃申爾服禮儀有序祭此嘉爵承天之祜三醮曰㫖酒令芳籩豆有楚咸加爾服肴升折爼承天之慶受福無疆字辭曰禮儀既備令月吉日昭告爾字爰字孔嘉髦士攸宜宜之於假永受保之大戴禮逸禮曰太子旣冠成人免於傅則有司過之史有虧膳之宰太子有過史必書之禮記郊特牲曰始冠緇布之冠也太古冠布齊則緇之嫡子冠於阼以著代也醮於客位加有成也三加彌尊喻其志也冠而字之敬其名也無大夫冠禮而有其婚禮古者十五而后爵何大夫冠禮之有諸侯之有冠禮也夏之末造言夏初以上諸侯雖有㓜而即位者猶以士禮冠十五而爵弁又曰始冠緇布冠自諸侯下逹冠而敝之可也本古禮非時王之法服也又曰曽子問曰將冠子冠者至揖讓而入聞齊衰大功之䘮如之何冠者賔及賛者孔子曰内䘮則廢外䘮則冠而不醴徹饌而埽即位而哭如冠者未至則廢内䘮同也不醴不醴子也其廢者䘮成服因䘮不冠如將冠子而未及期日而有齊衰大功小功之䘮則因䘮服而冠廢禮而因䘮冠俱成人之服及王也除䘮不改冠乎孔子曰天子賜諸侯大夫冕弁服於太廟歸設奠服賜服於斯乎有冠醮無冠醴酒為醮冠禮醴重而醮輕也服賜服酌用酒尊賜也無醴明不為改冠改冠當醴之父沒而冠則已冠埽地而祭於禰已祭而見伯父叔父而後饗冠者饗謂之禮又冠義曰冠服備而後容體正顔色齊辭令順冠服未備者未可求以三事也童子之服采衣也故曰冠者禮之始也是故古者聖王重冠古者冠禮筮賔所以敬冠事敬冠事所以重禮重禮所以為國本也國以禮為本故冠於阼以著代也醮於客位三加彌尊加有成也阼謂主人之地也適子冠於阼者将以代父醮用酒於客位敬而成之也户西為客位庶子則冠於房中外遂因醮焉不代父也冠者初加緇布再加皮弁終加爵弁毎加益尊所以益成也又曰冠者禮之始也嘉事之重者也是故古者重冠故行之於廟行之於廟者所以尊重事尊重事而不敢擅重事不敢擅重事所以自卑而尊先祖也嘉事嘉禮也宗伯掌五禮有吉禮有凶禮有賔禮有軍禮有嘉禮而冠屬嘉禮周禮曰以昏冠之禮親成男女也左傳襄公曰晉侯以公宴於河上問公年季武子對曰㑹于沙隨之嵗寡君以生晉侯曰十二年矣是謂一終一星終也國君十五而生子冠而生子禮也冠成人之服故冠而生子君可以冠矣大夫盍為冠具武子對曰君冠必以祼享之禮行之祼謂祼鬯酒也享祭先君以金石之樂節之以先君之祧處之今寡君在行未可具也請及兄弟之國而假備焉晉侯曰諾公還及衛冠於成公之廟假鍾磬焉禮也家語曰邾隠公即位将冠使大夫因孟懿子問禮於孔子孔子曰其禮如世子之禮懿子曰天子未冠即位長以冠乎孔子曰古者王世子雖幼其即位則尊為人君尊為人君治為成人之事者也何冠之有懿子曰然然則諸侯之冠異天子與孔子曰君薨而世子主䘮是亦冠也與人君無殊也懿子曰今邾君之冠非禮乎孔子曰諸侯之有冠禮也夏之末造有自來矣今無譏焉又曰成王年十有二而嗣立明年六月冠而成王朝于祖廟以見諸侯周公命祝雍作頌曰祝王辭達而勿多也祝雍辭曰使王近於民逺於年嗇於時惠於則親賢而任能其頌曰令月吉日王始加服去王幼志乃心衮職欽若昊天六合是式率爾祖考烝烝無極國語曰趙文子冠謂以士禮始冠也見韓獻子獻子曰戒之此謂成人成人在始始與善進不善蔑由至矣蔑無也始與不善進善亦蔑由至矣如草木之産也各以其物人之有冠猶宫室之有牆室也糞除而已又何加焉糞除喻自脩㓗漢書曰惠帝元年冠赦天下除挾書律又曰宣帝五鳯元年太子冠賜丞相以下帛赦徒作杜陵者續漢書曰安帝靈帝加元服並大赦賜公卿金帛東觀漢記曰馬防子鉅為常從小侯六年正月齋宫中上欲冠鉅夜拜為黄門郎御章臺下殿陳鼎爼自臨冠之晉書禮志曰江東諸帝將冠金石宿設百寮陪位豫於殿上鋪大牀御府令奉冕幘簮導衮服以授侍中常侍太尉加幘太保加冕太尉跪讀祝文曰令月吉日始加元服皇帝穆穆思𢎞衮職欽若昊天六合是式率尊祖考永永無極眉壽維祺介兹景福譙周䘮服圗曰男子幼娶必冠女子幼嫁必笄禮之則從成人不為殤禮論曰王彪之以為禮冠自卜日不必以三元也又禮夏冠用葛履冬冠用皮履明無定時也後漢應亨贈四王冠詩曰永平四年外弟王景系兄弟四人並冠故貽之詩曰濟濟四令弟妙年踐二九令月維吉日成服加元首雖無兕觥爵杯醮傳㫖酒後漢黄香天子冠頌曰以三載之孟春建寅月之上旬皇帝將加元冕簡甲子之元辰厥日王於大皥厥時叶於百神旣臻廟而成禮乃廻軨而反宫正朝服以享宴撞太蔟之庭鍾祚蕃屏而鼎輔暨夷裔之君王咸進酌于金壘獻萬年之玊觴蕭子範冠子箴曰是月維令敬擇良辰式遵士典諮筮於賔嘉字爰錫醮酒方陳禮荘爾質徳成爾身梁沈約冠子祝文曰蠲兹令日元服肇加成徳旣學童心自化行之則至無謂道賖敦以秋實食以春華無恥下問乃致髙車子孫千億廣樹厥家婚姻上易歸妹九四曰歸妹愆期遲歸有時夫以不正無應而適人也必湏彼道窮盡無所與交然後乃可以徃故愆期遲歸以待時也又咸卦曰亨利貞取女吉男女訓嫁之象所以為禮彖曰咸感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平萬物感陽而生民感聖人之化而和毛詩鵲巢何彼穠矣美王姬也雖則王姬亦下嫁於諸侯猶執婦道以成肅雍之徳也又國風曰谷風刺夫婦失道也衛人化其上淫於新婚而棄其舊室夫婦離絶國俗傷敗焉習習谷風以陰以雨黽勉同心不宜有怒徳音莫違及爾同死又曰綢繆刺晉亂也國亂則婚姻不得其時焉不得其時謂不及中春之日又曰東門之楊刺時也婚姻失時男女多違親迎女猶有不至者也東門之楊其葉牂牂興也牂牂然盛貌言男女失時不逮秋冬箋曰楊葉牂牂三月中也興者言時晚也失中春之月婚以為期明星煌煌期而不至也箋云親迎之禮以昏時女㽜他邑不肯時行乃至大星煌煌也又曰有狐刺時也衛之男女失時䘮其妃耦焉古者國有凶荒則殺禮而多婚㑹男女之無夫家者所以育人民也育生長也又小雅曰我行其野刺宣王也刺其不正嫁娶之數而有荒政多淫婚之俗我行其野蔽芾其樗婚姻之故言就爾居樗惡木也箋云樗之蔽芾始生謂仲春之時嫁娶之月婦之父壻之父相謂為婚姻言我乃以此二人之命故我就女居我豈不以其禮来乎責之也爾不我蓄復我邦家我行其野言采其蓫婚姻之故言就爾宿爾不我蓄言歸思復又文王大明曰摯仲氏任自彼殷商来嫁於周曰嬪於京摯國任姓也摯國之中女也王季太王之子文王父也太任從殷商之畿内嫁為婦扵周之京配王季共行仁義之徳同志意也大戴禮逸禮曰子孫娶妻嫁女必擇孝弟世世有行義者是則其子孫慈悌孝愛不敢淫暴黨無不善三族輔之故鳯凰生而有仁義之意虎狼生而有貪戾之心嗚呼戒之哉無養乳虎將傷天下儀禮曰記士昏禮凡行事必用昏昕受諸禰廟辭無不腆無辱摯不用死皮帛必可制腊必用鮮魚用鮒必殽全禮記曲禮上曰男女非有行媒不相知名有媒往来傳婚姻之言乃相知姓名非受幣不交不親故日月以吿君齋戒以吿鬼神為酒食以召鄉黨寮友以厚其别也娶妻不娶同姓故買妾不知其姓則卜之又曲禮下曰納女於天子曰備百姓於國君曰備酒漿於大夫曰備洒掃納女猶至女也又曽子問曰孔子曰嫁女之家三夜不息燭思相離也親骨肉也娶婦之家三日不舉樂思嗣親也重世變也又郊特牲曰夫婚禮萬世之始也娶扵異姓所以附逺厚别幣必誠辭無不腆誠信也腆猶膳也告之以直信直正也二者所以教婦正直也信事人也信婦徳也壹與之齊終身不改故夫死不嫁男子親迎男先於女剛柔之義也天先乎地君先乎臣其義一也執贄以相見敬章别也男女有别然後父子親父子親然後義生然後禮作然後萬物安無别無義禽獸之道也壻親迎授綏親之也親之也者敬之也敬而親之先王之所以得天下也出乎大門而先男帥女女從男夫婦之義由此始婦人從人者也幼從父兄嫁從夫夫死從子無所感自遂也又雜記下曰納幣一束束五兩兩五尋十個為束貴成數也兩者令其卷是謂五兩八尺曰尋則卷二束也合之謂四十尺謂之疋由疋偶之云又祭統曰國君娶夫人之辭曰請君之玉女與寡人共有敝邑事宗廟社稷此求助之本也又經解曰婚姻之禮廢則夫婦之道苦而滛辟之道多矣又哀公問曰哀公問於孔子曰敢問為政如之何孔子對曰古之爲政愛人為大所以致愛人禮為大所以治禮敬為大敬之至矣大婚為大夫婚旣至冕而親迎親之也公曰冕而親迎不己重乎對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂己重乎天地不合萬物不生大婚萬世之嗣也君何謂己重焉又婚禮曰婚禮者将合二姓之好以事宗廟而下以繼世也故君子重之又外傳曰古者謂婚姻為兄弟因成兄弟之義也壻曰婚以昬時往婦曰姻因壻之來則從而去又壻之父曰姻婦之父曰婚壻者陽也婦者隂也日往而隂氣至也又曰夏殷五世之後則通婚姻周公制禮百世不通所以别禽獸也左傳文公上曰逆婦姜於齊卿不行非禮也又成下曰晉侯使吕相絶秦曰昔逮我先君獻公及穆公相好戮力同心申之以盟誓重之以婚姻天禍晉國文公如齊惠公如秦乂晉侯使吕相絶秦曰白狄及君同州君之仇讎而我之婚姻也君來使命曰吾與汝伐狄寡君不敢顧婚姻畏君之威而受命於使又成下曰聲伯之母不聘不聘無媒禮穆姜曰吾不以妾為姒生聲伯而出之嫁於齊又定上曰楚昭王敗鍾建負季芊以逃王將嫁季􅇗辭曰所以為女子逺丈夫也鍾建負我矣以妻鍾建又哀上曰劉氏范氏世為婚姻太平御覽卷五百四十
