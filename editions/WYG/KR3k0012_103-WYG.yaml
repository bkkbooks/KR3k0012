body:
  text: 太平御覽卷一百三宋李昉等撰皇王部二十八後魏顯祖獻文皇帝髙祖孝文皇帝世宗宣武皇帝肅宗孝明皇帝顯祖獻文皇帝後魏書曰顯祖獻文皇帝諱𢎞高宗文成皇帝之長子也母曰李貴人興光元年秋七月生於陰山之北太安二年二月立為皇太子聰叡機悟幼而有濟民神武之規仁孝純至禮敬師友和平六年夏五月即皇帝位大赦天下秋七月太尉乙渾為丞相事無大小皆决於渾是歲劉子業叔父殺子業僭立天安元年春正月大赦改元二月丞相太原王乙渾謀反伏誅皇興元年閏正月劉彧青州刺史沈文秀冀州刺史崔道固並遣使請舉州内屬二年夏四月高麗庫莫奚契丹于闐波斯諸國各遣使朝獻四年三月詔宣告天下民有病者所在官司遣醫就家診視所用藥物任醫量給之五年八月帝欲禪位於叔父京兆王子推羣臣固請帝乃止丁未下詔曰朕承洪業運屬太平淮岱率從四海清宴是以希心元古志存淡泊躬覽萬務則損頤神之和一月或曠政有淹滯之失且子有天下歸尊於父父有天下傳之於子今稽協靈運考㑹羣心爰命儲宫踐昇大位朕優游恭已栖心浩然社稷乂安克廣其業不亦善乎百官有司其祗奉太子以答天休宣布宇内咸使聞悉於是羣公奏曰三皇之澹泊無為故稱皇是以漢高祖既稱皇帝尊其父為太上皇明不統天下今皇帝幼冲萬機大政猶陛下統之謹上尊號太上皇帝乃從之太上皇帝徙御崇光宫採椽不斵土堦而已國之大事咸以聞承明元年年二十三崩于永安殿在位六年諡曰獻文皇帝廟號顯祖𦵏雲中金陵高祖孝文皇帝後魏書曰高祖孝文皇帝諱宏顯祖獻文皇帝之長子也母曰李夫人皇興元年八月生平城紫宫神光照室天地氤氲和氣充塞帝生而潔白有異姿襁褓岐嶷長而淵裕仁孝綽然有君人之表顯祖尤愛異之三年夏六月立為皇太子五年秋八月即皇帝位於太華前殿大赦改元延興元年冬十月沃野統萬二鎮叛詔太尉隴西王元賀追擊至枹音符罕滅之斬首三萬餘級徙其餘逆於冀定相三州為營户十二月詔訪舜後獲東萊郡民媯茍之復其家畢世以彰盛德之不朽二年春二月詔曰尼父稟達聖之資體生知之量窮理盡性道光四海頃者淮徐未賓廟隔非所至令祠典寢頓禮章殄滅遂使女巫妖覡淫進非禮殺生皷舞倡優媟音泄狎豈所以尊明神敬聖道者也自今已後有祭孔子廟制用酒酺而已不聽婦女合雜以祈非望之福犯者以違制論夏四月詔工商雜類盡聽赴農詔沙門不得去寺浮遊民間是日劉彧死子昱立秋七月詔州郡縣各遣二人才堪專對者赴九月講武當親問風俗三年二月詔縣令能靜一縣刼盜者兼治二縣即食其禄能靜二縣者兼治三縣二遷為郡守二千石能靜二郡上至三郡亦如之三年遷為刺史三月詔諸倉屯穀麥充積者出賜貧民夏四月詔以孔子二十八世孫魯郡孔乗為崇聖大夫給以十户供灑掃四年九月以劉昱内相攻戰詔將軍元蘭將三萬騎及假東陽王丕為後繼代蜀漢承明元年六月太上皇帝崩大赦改元皇太后為太皇太后臨朝稱制秋七月追尊皇妣李貴人為思皇太后太和元年七月劉昱死弟凖僭立二年夏四月京師旱祈天災於北苑親自禮焉減膳避正殿澍雨大洽大赦九月龜兹國遣使獻駝馬二年四月吐谷渾國遣使獻􅈊牛五十頭是年島夷蕭道成廢其主劉凖而僭立自號曰齊四年春罷畜鷹鷂之所以其地為報德佛寺五月詔㑹京師耆老賜錦綵衣服几杖稻米蜜麵復家人不徭役六年三月蕭道成死子頤僭立七年閏四月皇子生大赦天下定州上言為粥給飢民所活九十四萬七千餘口八年八月詔曰帝業至重非廣詢無以至治今制百辟卿士工商吏民各上便益利民益治損化傷政直言極諫勿有所隱務令辭無煩華理從簡實朕將親覽以知世要使言之者無罪聞之者足以戒九年春正月詔曰圖䜟之興起於三季既非經國之典徒為妖邪所憑自今圖䜟秘緯及名為孔子閉房記者一切皆焚之畱者以大辟論又諸巫覡假稱神鬼妄説吉凶及委巷諸卜非墳典所載者嚴加禁斷大饗羣臣于大華殿班賜皇誥十年春正月帝始服衮冕饗萬國二月初立黨里隣三長定民户籍夏四月始制五等公服帝初以法服御輦已西郊八月給尚書五等品爵已上朱衣玉珮大小組綬九月詔起明堂辟雍冬十月有司議依故事配始祖於南郊十有一年春正月詔定樂章非雅者除之十有一月詔罷尚方錦繡綾羅之工四民欲造任之無禁其御府衣服金銀珠玉綾羅錦繡太官雜器太僕乗具内庫弓矢出其大半班賚百官及京師士庶下至工商皂𨽻逮於六鎭戍士各有差十二月詔秘書丞李彪著作郎崔光改析國記依紀傳之體十有二年春正月初建五斗旌旗五月詔六鎭雲中河西及關内六郡各修水田通渠灌溉增置彛器於太廟九月起宣文堂經武殿十三年春正月車駕有事於圜丘於是初備大駕七月幸靈泉池與羣臣御龍舟賦詩而罷立孔子廟於京師十有四年八月詔議國之行次九月太皇太后馮氏崩冬十月𦵏文明太皇太后於永固陵車駕謁永固陵羣臣固請公除帝不許帝居廬引見羣寮於太和殿太尉東陽王丕等據權制固請帝引古禮往復羣臣乃止十五年春正月帝始進蔬食自正月不雨至於癸酉有司奏祈百神詔曰昔成湯遇旱齊境逢災並不由祈山川而致雨皆至誠發中澍潤千里萬方有罪在于一人今普天喪恃幽顯同哀神若有靈猶應未忍安饗何宜四氣未周便行祀事唯當考躬責己以待天譴五月議改律令於東明觀析疑獄八月議養老又議肆類上帝禋于六宗之禮帝親臨決詔郡國有時物可以薦宗廟者貢之移道壇於桑乾之陰改曰崇虛寺詔諸州秀才先盡才學乙巳親定祫禘之禮十有一月詔二千石考在上者假四品將軍賜乗黃馬一疋上中者五品將軍上下者賜衣一襲十有二月帝為高麗王璉舉哀於城東行宫車駕迎春於東郊十有六年春正月饗羣臣於太華殿帝始為王公興懸而不樂宗祀顯祖獻文皇帝於明堂以配上帝遂昇靈臺以觀雲物詔定行次以水承金制諸逺屬非太祖子孫及異姓為王者皆降為公公為侯侯為伯子男仍舊皆除將軍之號二月詔祀唐堯於平陽祀虞舜於廣甯禹於安邑周文於洛陽改諡宣尼曰文聖尼父告諡孔廟夏四月頒新律令大赦天下八月丙午司徒尉元以老遜位以尉元為三老游明根為五更又養國老庶老詔曰文武之道自古並行威福之施必也相籍故三王至仁尚有征伐之事夏殷明睿未捨兵甲之行國家雖崇文以懷九服修武以寧八荒然於習武之方猶為未盡將於馬射之前先行講武之式可勅有司豫修場埒其列陣之儀五戎之數别俟後勅冬十月太極殿成大饗羣臣十有七年夏四月立皇后馮氏六月帝將南伐詔造河橋立皇子恂為皇太子秋七月以皇太子立詔賜民為父後者爵一級是月蕭頤死孫昭業僭立八月車駕發京師南伐步騎百餘萬太尉丕奏請以宫人從詔曰臨戎不語内事宜停車駕至泗州幸并州親高年問所疾苦車駕所經傷民秋稼者畆給穀五斛戊辰詔洛懷并泗所過四州賜高年爵百年以上假縣令九十已上賜爵三級八十已上賜爵二級七十已上賜爵一級鰥寡孤獨不能自存者人粟五斛帛二疋幸洛陽周巡故宫基址帝顧謂侍臣曰晉德不修早傾宗祀荒毁至此用傷朕懷遂詠黍離之詩為之流涕觀洛陽橋幸太學觀石經詔六軍發軫帝戎服執鞭御馬而出羣臣稽顙於馬前請停南伐帝乃止仍定遷都之計冬十月幸金墉城詔徵司空穆亮與尚書李沖將作大匠董爵經始洛京己卯幸河南城幸豫州戒嚴設壇於滑臺城東告行廟以遷都之意大赦天下幸鄴城十有八年春朝羣臣於鄴宫車駕南巡幸洛陽西宫二月行幸河陰規建方澤之所車駕北巡至平城宫臨朝堂部分遷畱三月罷西郊祭天帝臨太極殿喻在代羣臣以遷移之畧秋七月以宋王劉昶為大將軍是月島夷蕭鸞殺其主蕭昭業立業弟昭文冬十月親告太廟奉遷神主車駕發平城宫次於山中之唐湖是月蕭鸞廢殺其主昭文而僭立十月丁丑車駕幸鄴經比干墓傷其忠而獲戾親為弔文樹碑刻之己丑車駕至洛陽蕭鸞雍州刺史曹虎據襄陽降十有二月戊申車駕至懸瓠詔壽陽鍾離馬頭之師所獲男女口皆放還南十有九年春正月饗羣臣於懸瓠講武於汝水之西大賚六軍車駕濟淮二月幸八公山路中雨甚詔去蓋見軍士病者親恤之車駕至鍾離軍士擒鸞卒三千帝曰其君實惡其民何罪於是免歸之車駕發鍾離遣使臨江數蕭鸞罪惡幸小沛遣使以太牢祭漢高祖廟行幸瑕丘使以太牢祀岱嶽詔選諸孔宗子一人封崇聖侯邑百户以奉孔子之祀又詔兖州為孔子起圍栢修飾墳壠更建碑銘褒揚聖德行幸滑臺次于石濟車駕至自南伐六月詔始為漢語不得以北俗之語言於朝廷若有違者免所居官詔求天下遺書秘閣所無有裨時用者加以優賞詔遷洛之民死葬河南不得還北於是代人南遷者悉為河南洛陽人詔改長尺大斗依周禮制度頒之天下八月詔選天下武勇之士十五萬人為羽林虎賁以充宿衞九月六宫及文武盡遷洛陽十有二月引見羣臣於光極堂宣示品令為大始之選二十年春正月詔改姓為元氏二月詔介山之邑聽為寒食其餘禁斷帝以久旱咸秩羣神自癸未不食至于乙酉是夜澍雨大洽十有二月開鹽池之禁與民共之置常平倉二十有一年春正月立皇子恪為皇太子夏四月幸長安遣使者以太牢祭周文王於豐祭武王於鎬六月車駕至長安帝親為羣臣講喪服於清徽堂八月車駕南討九月車駕至新野冬十月四面進攻不克詔左右軍築長圍以守之二十有二年春正月拔新野三月大破蕭鸞平北將軍崔惠景黃門郎蕭衍軍於鄧城斬獲虜首二萬有餘秋七月詔曰朕以寡德屬兹喪亂實賴羣英凱清南夏宜約躬賞効以勸茂績后之私府便可損半六宫嬪御五服男女常需恒供亦令減半在戎之親三分省一是月蕭鸞死子寶卷僭立九月帝以蕭鸞死禮不伐喪乃詔反斾二十有三年春正月朝羣臣於鄴宫三月車駕南伐帝不豫司徒彭城王勰侍疾禁中且攝百揆車駕至馬圏賊將蔡道福成公期率數萬人棄順陽遁走帝疾甚車駕北次穀塘原詔司徒勰徵太子於魯陽踐祚夏四月帝崩於穀塘原之行宫在位二十九年時年三十二秘諱至魯陽發喪還京師上諡曰孝文皇帝廟曰高祖葬長陵帝幼有至性孝敬寛慈每垂矜捨進食者曽以熱羹傷帝手又曾於食中得蟲穢之物帝笑而恕之宦者譖帝於太后太后大怒杖帝數十帝黙然而受不自明太后崩後亦不以介意聽覽政事從善如流哀矜百姓恒思所以濟益天地五郊宗廟二分之禮常必躬親不以寒暑為倦雅好讀書手不釋卷五經之義覽之便講學不師授探其精奥史傳百家無不該涉善談莊老尤精釋義才藻富贍好為文章詩賦銘頌有興而作有大文筆馬上口授及其成也不改一字自泰和十年已後詔册皆帝之文也其餘文章百有餘篇愛竒好士情如飢渴待納朝賢隨才輕重常寄以布素之意悠然𤣥邁不以世務嬰心又少善射有膂力年十餘歲能以指彈碎羊膊骨及射禽獸莫不隨志而斃之至年十五便不殺生射獵之事悉止性儉素常服澣濯之衣鞍勒鐵木而已帝之雅志皆此類也世宗宣武皇帝後魏書曰世宗宣武皇帝諱恪高祖孝文皇帝第二子母曰高夫人初夢為日所逐避之牀下日化為龍繞已數匝寤而驚悸既而有娠泰和七年閏四月生帝於平城宫二十二年正月立為皇太子二十三年夏四月即皇帝位于魯陽大赦天下帝居諒闇委政宰輔秋八月遵遺詔高祖三夫人以下悉歸家景明元年春正月車駕謁長陵大赦改元丁未蕭寶卷豫州刺史裴叔業以壽春内屬二年春正月帝始親政二月詔曰治尚簡靜任貴應事州府佐史除授稍多誠為損弊無益政道又京師百司寮屬殷雜官有閒長者亦同此例茍非精要悉從蠲省是月蕭衍立寶卷弟南康王寶融為主年號中興東赴建業九月發畿内夫五萬五千築京師三百二十三防四旬而罷己亥立皇后于氏十有一月築圜丘於伊水之陽仍有事焉是月寶卷直後張齊殺寶卷降蕭衍衍克建業三年三月寶卷弟建安王寶寅來降是月蕭衍又廢其主寶融而僭立自稱曰梁九月車駕行幸鄴詔使者弔殷比干墓閲武於鄴南冬十月帝親射逺及一百五十步羣臣勒銘於射所四年春正月車駕籍田於千畆三月皇后親蠶於北郊夏四月南天竺國獻辟攴佛牙正始元年春正月大赦改元八月詔洛陽令有大事聽面敷奏乙酉元英攻義陽拔之擒送蕭衍冠軍蔡靈等十餘將英大破衍將仍清三關冬十有一月勅有司依漢魏舊章營繕國學十二月以苑牧公田分賜代遷之户詔羣臣議定律令二年詔尚書李崇太府卿于忠散騎常侍游肇諫議大夫鄧羨俱為大使糾斷外州畿内守令之徒咎失彰露者即便施決州鎭重職聽為表聞三年春正月皇太子生大赦天下十一月帝為京兆王愉清河王鐸廣平王懷汝南王悦講孝經於式乾殿四年十一月禁河南畜牝馬自碣石至於劒閣東西七千里置二十二都尉永平元年六月詔曰愼重刑獄著於往誥朕御兹寶厯明鑒未逺斷決煩疑實有攸愧可依洛陽舊圖修聽訟觀農隙起功及冬令就當與王公卿士親臨録問八月冀州刺史京兆王愉據州反假尚書李平鎭北將軍行冀州刺史討之大赦改元平克信都執愉羣臣請誅帝弗許詔送京師二年春正月胡密步就磨忸密槃是悉萬斤辛豆郍越拔忸諸國並遣使朝獻嚈噠薄知國遣使來朝貢白象高昌國遣使朝貢冬十月郢州獻七寶牀詔不納十一月詔禁屠殺含孕以為永制己丑帝於式乾殿為諸僧朝臣講維摩詰經三年冬十月詔曰朕乗乾御厯年周一紀而道謝擊壤教慙刑措至於下民之㷀音窮鰥疾苦常忍之此而不䘏豈為民父母之意也可勅太常於閒敞之處嚴勅醫署分師療治考其能否而行賞罰雖齡數有期修短分定然六疾不同或賴針石庶秦扁之言理驗今日又經方浩博流傳處廣應病投藥卒難窮究更令有司集諸醫士尋篇推簡務存精要取三十餘卷以班九服郡縣備冩布下鄉邑使知救患之術延昌元年三月京師穀貴出倉粟八十萬石以賑貧者夏四月詔曰泗州地震陷裂死傷甚多言念毁没有酸懐抱亡者不可復追生病之徒宜加療救可遣太醫折傷醫并給所須之藥就治之大赦改元二年夏四月庚子以絹十五萬疋賑恤河南郡飢民三年春二月詔曰泗州秀容郡敷城縣鴈門郡原平縣並自去年四月以來山鳴地震于今不已告譴彰咎朕甚懼焉祇畏兢兢若臨淵谷可恤瘼寛刑以答災譴四年正月甲寅帝不豫丁巳崩于式乾殿時年三十三諡曰宣武皇帝廟號世宗葬景陵帝幼有大度喜怒不形于色雅性儉素初高祖欲觀諸子志尚乃大陳寶物任其所取京兆王愉等皆競取珍玩帝惟取骨如意而已高祖大竒之庶人恂失德高祖謂彭城王勰音協曰吾固疑此兒有非常志相今果然矣雅愛經史尤長釋氏之義每至講論連夜忘疲善風儀容貌臨朝淵嘿端嚴若神有人君之量矣肅宗孝明皇帝後魏書曰肅宗孝明皇帝諱詡世宗宣武皇帝之第二子母曰胡充華永平三年三月帝生于宣光殿之東北有光照于庭中延昌元年十月立為皇太子四年春正月丁巳夜即皇帝位大赦天下詔太保高陽王雍入居西北堂決庶政又詔任城王澄為尚書令百官總已以聽於二王二月尊皇后高氏為皇太后三月皇太后出俗為尼徙御金墉城八月尊太妃為皇太后帝朝皇太后於宣光殿大赦天下羣臣奏請皇太后臨朝稱制九月皇太后親覽萬幾熙平元年春正月大赦改元二月八日宴太祖以來宗室年十五以上於顯陽殿申家人之禮九月詔曰察訟理寃實惟政首躬親聽覽民信所由自今月朢當暫出城闉親決滯枉主者可宣諸近逺咸使聞知神龜元年二月詔以神龜表瑞大赦改元七月開恒州銀山之禁與人共之二年九月皇太后幸崧高山正光元年秋七月侍中元义中常侍劉騰奉帝前殿矯皇太后詔曰世宗宣武皇帝以睿明承業廓寧區夏而鴻功未半早年登遐乃車書弗同勍冦尚熾幼主稚弱夙纂寶厯曾是宗祏莫克祗奉朕所以敬愼羣請臨朝總政黽勉從事以迄于兹自比春來先疾屢發夏首及今數加重劇恐不堪日釐萬務巨細兼省帝齒周星紀識學逾躋日就月將人君道茂足以撫綏萬邦諧決百揆朕當率前志敬遜别宫乃幽皇太后於北宫殺太傅領太尉清河王懌諸人總勒禁旅決事殿中帝加元服大赦改元九月蠕蠕主阿那環來奔戊戌以太師高陽王雍為丞相十月詔曰蠕蠕世雄朔方專制漠裔隣通上國百有餘載宜優以賓禮期之立功疏爵胙土大啓河岳可封朔郡公蠕蠕王食邑一千户錫以衮冕之禮蓋禄秩儀衛同於戚藩二年三月駕幸國子學講孝經祀孔子以顔淵配十有二月詔司徒崔光安豐王延明等議定服章三年春正月辛亥帝耕籍田十有一月車駕有事圜丘詔曰治厯明時前王茂軌孝成正律奕代通規去歲表瑞中始命儒官改度易憲如㑹旅衡今天正斯始陽煦將開品物初萌宜變耳目所謂魏雖舊邦其厯維新者也便可頒宣内外號曰正光厯思與億兆共此維新可大赦天下十二月以牧守妄立碑頌輒興寺㙮第宅奢侈店肆商販詔中尉端衡肅厲威風以見事糾劾七品六品禄足代耕亦不聽錮店占肆爭利城市也四年春二月蠕蠕主阿那環帥衆犯塞遣尚書左丞元孚為北道行臺持節喻之四月阿那環執孚驅畜牧北遁詔驃騎大將軍尚書令李崇中軍將軍兼尚書右僕射元纂帥騎十萬討蠕蠕出塞三十餘里不及而還五年泰州城人莫折太提據城反自稱秦王殺刺史李彦詔雍州刺史元志討之南秦州城人孫掩張長命韓祖香據城反殺刺史崔遊以應太提遣城人卜朝襲克高平殺鎭將赫連畧行臺高元榮太提尋死子念生代立僭稱天子年號天建置立百官孝昌元年春正月徐州刺史元法僧據城反害行臺高諒自稱宋王年號天啓遣其子景仲歸於蕭衍遣其將朝龍牙成景攜元畧等帥衆赴彭城詔秘書監安樂王鑒囘師以討之鑒於彭城南擊元畧大破之盡俘其衆既而不備為元法僧所敗衍遣子豫章王綜入守彭城法僧擁其寮屬守令兵武及郭邑士女萬餘口南入夏四月辛卯皇太后復臨朝攝政引羣臣面陳得失詔曰神龜之末權臣擅命元义劉騰陰相影響遂使皇太后幽隔後宫無君之心積習稍久不臣之迹縁事彌彰蔽耳目之明專生殺之柄天下為之不康四郊由兹多壘此而可忍孰不可忍騰身既死可追削爵入之罪狀誠合徽纒但以宗支舅戚特全貸之法可除名為民秋七月詔斷逺近貢獻珍寶違者免官九月詔減天下租調之半十二月山胡劉蠡升反自稱天子置官寮二年春正月五原降户鮮于修禮反于定州年號魯興元年二月帝及皇太后臨大夏門親覽寃訟六月詔曰自運艱屬棘歴載於兹烽驛交馳征皷不息朕威德不能遐被經畧無以及逺俾是蒼生罹此塗炭何以茍安黃屋無愧黔黎今便避居正殿蔬食素服當親自招募収集忠勇其有直言正諫之士敢決徇義之夫二十五日悉集華林東門人别引見共論得失班告内外咸使聞知八月賊帥元洪業斬鮮于修禮請降為賊黨葛榮所殺都督爾朱榮於泗州執刺史尉慶賓令其從叔羽生統州事九月葛榮敗都督廣陽王淵章武王融於博野白牛邏去聲融殁於陣榮自稱天子國號曰齊稱廣平冬十一月杜洛周攻陷幽州執刺史王延及行臺常景丙午税京師田租毎畆五升借貸公田者一斗閏月税市人出入者各一錢店舍為五等三年春正月葛榮陷殷州刺史崔楷固節死之三月詔金紫光禄大夫源子邕為大都督討葛榮冬十月以衞將軍討虜大都督爾朱榮為車騎將軍儀同三司雍州刺史蕭寳寅據州反自號曰齊年稱隆緒武泰元年春三月定州為杜洛周所陷執刺史楊津是月皇女生秘言皇子大赦改元二年帝崩於穎陽殿年十九皇太子即位大赦天下皇太后詔曰皇家握厯受圖年將二百祖宗累聖社稷載安朕以寡昧親臨萬國識謝塗山德慙文母屬妖逆迭興四郊多故實望穹靈降佑麟趾衆繁自潘充華有孕椒宫冀誕儲貳而熊羆無兆維虺遂彰于時以國步未康假稱統𦙍欲以底定物情係仰宸極何圖一旦弓歛莫追國道中㣲大行絶祀皇曾孫故臨洮王寶暉世子釗體自高祖天表作異大行平日養愛特深義齊若子事符當璧及翌日弗愈大漸彌畱乃延入清蒲受命玉几暨陳衣在庭登䇿靡及允膺大寶即日踐祚朕是用惶懼忸怩心焉靡訴今喪君有君宗社惟固宜崇賞卿士爰及百辟凡厥在位並加陟叙幼主即位儀同三司大都督爾朱榮抗表請奔喪乃勒兵而入三月上尊諡曰孝明皇帝葬於定陵廟號肅宗夏四月爾朱榮濟河皇太后幼主皆崩太平御覽卷一百三
