body:
  text: 太平御覽巻一百四十一宋李昉等撰皇親部七唐髙祖竇皇后太宗長孫皇后徐妃附髙宗廢王皇后中宗趙皇后廢韋皇后上官昭容睿宗劉皇后竇皇后𤣥宗廢王皇后武皇后楊貴妃楊皇后肅宗張皇后吳皇后代宗沈皇后獨孤皇后徳宗王皇后韋賢妃順宗王皇后憲宗郭皇后女學士宋尚宫附穆宗王皇后穆宗蕭皇后敬宗郭貴妃昭宗何皇后髙祖竇皇后唐書曰髙祖太穆順聖皇后竇氏京兆平陵人隋定州總管神武公毅之女也后母周武帝姊襄陽長公主后生而髪垂過頸三嵗與身齊周武帝特愛重之養於宫中時武帝納突厥女為后無寵后尚幼竊言於帝曰四邊未靜突厥尚强願舅抑情撫慰以蒼生為念但得突厥之助則江南闗東不能為患矣武帝深納之毅聞之謂長公主曰此女才貎如此不可以妄許人當為求賢夫乃於門屏畵二孔雀諸公子有求婚者輙與兩箭射之潛約中目者許之前後數十軰莫能中髙祖後至兩發各中一目毅大恱遂歸於我及周武帝崩后追思如䘮所生隋文帝受禪后聞而流涕自投於床曰恨我不為男以救舅氏之難毅與長公主遽掩口曰汝勿妄言滅吾族矣后事元貞太后以孝聞太后素有羸疾時或危篤諸姒以太后性嚴懼進侍皆稱疾而退唯后晝夜扶持不脫衣履者動淹旬月善書與髙祖書相類人莫能辨工篇章而好存規誡大業中髙祖為扶風太守有駿馬數疋常言於髙祖曰上好鷹愛馬公之所知此堪進御不可乆留人或言者必為累願熟思之髙祖未决竟以此獲譴未幾后崩於涿郡時年四十五髙祖追思后言方為自安之計數求鷹犬以進之俄而擢拜将軍因流涕謂諸子曰我早從汝母之言居此官乆矣初葬壽安陵後祔葬太宗長孫皇后唐書曰太宗順聖皇后長孫氏長安人隋右驍衛将軍晟之女也后少好讀書造次必循禮則年十三嬪於太宗武徳元年冊為秦王妃九年冊拜皇太子妃太宗即位立為皇后后性尤儉約凡所服御取給而已太宗彌加禮待十年六月辛夘崩於立政殿時年三十六葬於昭陵后常撰古婦人善事勸戒十巻名曰女則自為之序又著論駁漢明徳馬皇后以為不能抑退外戚令其當朝貴盛乃戒其龍馬水車此乃開其禍源而妨其末事耳且誡主守者曰此吾以自防閑耳婦人著述無條貫不欲至尊見之慎勿言崩後宫司以聞太宗覽而増慟以示近臣曰皇后此書足可垂於後代我豈不達天命而不能割情乎以其善能規諌補朕之闕今不復聞善言是内失一良佐以此益令人哀耳上元元年改上后尊號曰文徳順聖皇后徐妃附唐書曰太宗賢妃徐氏名惠右散騎常侍堅之姑也生五月而能言四嵗誦論語毛詩八嵗好屬文其父孝徳試擬楚辭曰山中不可以乆留詞甚典美自此遍渉經史手不釋巻太宗聞之納為才人其所屬文揮翰立成詞華綺贍俄拜媫妤再遷充容時軍旅亟動宫室稍興百姓頗倦勞役上䟽諌之太宗善其言優賜甚厚及太宗崩追思顧遇之恩哀慕愈甚發疾不自醫疾甚謂所親曰吾荷顧實深志在早殁䰟其有靈得侍園寢吾之志也因為七言詩及連珠以見志永徽元年卒時年二十四詔贈賢妃陪葬於昭陵之石室髙宗廢王皇后唐書曰髙宗廢后王氏并州祁人也父仁祐同安長公主即后之從祖母也公主以后有美色言於太宗遂納為晉王妃髙宗升儲冊為皇太子妃永徽初立為皇后初武皇后貞觀末隨太宗嬪御居於感業寺后及左右數為之言髙宗由是復召入宫立為昭儀俄而漸承寵恩遂與后及良娣蕭氏逓相譖毁帝終不納后言而武昭儀寵日厚后懼不自安宻與母劉氏求巫氏厭勝事發帝大怒斷劉氏不許入宫將廢后長孫無忌禇遂良等固諫乃止俄又納李義府之䇿永徽六年廢后及蕭良娣皆為庻人囚别院武昭儀令人皆縊殺之中宗趙皇后唐書曰中宗和思皇后趙氏京兆長安人父瓌尚髙祖女常樂公主中宗為英王時納后為妃既而妃母公主得罪妃亦坐幽死於内侍省則天臨朝瓌為夀州刺史坐與越王貞連謀被誅公主亦坐死神龍元年贈后諡為恭皇后及中宗崩將葬於定陵追諡后為和思莫知瘞所以皇后禕衣於陵所寢宫招䰟置衣於䰟輦以太牢告於衣遷於寝宫舒於御榻之右覆以夷衾而祔葬焉中宗廢韋皇后唐書曰中宗韋庻人京兆萬年人也中宗為太子時納后為妃仍擢后父元貞為豫州刺史嗣聖元年立為皇后其年中宗見廢后隨徙房州時中宗懼不自安每使至惶恐欲自殺后勸王曰禍福倚伏何常之有豈失一死何遽如是也每同艱危情義甚篤所生懿德太子永泰永壽長寧安樂四公主安樂最幼生於房州帝自脫衣裹之遂名曰裹兒特寵異焉及中宗召還立為太子又立后為妃中興初復立為皇后帝在房州時常謂后曰一朝見天日乃不相禁忌及得志後受上官昭容邪説引武三思入宫升御床與后雙陸帝為㸃籌以為歡笑醜聲日聞於外景龍四年六月帝遇暴崩后懼秘不發喪及臨淄王勒兵入内后懼駭遁入殿前飛騎營及武延秀安樂公主皆為亂兵所殺追貶為庶人上官昭容唐書曰中宗上官昭容名婉兒西臺侍郎儀之孫也父庭芝與儀同被誅婉兒時在襁褓隨配入掖庭及長有文詞明習史事則天時婉兒忤㫖當誅則天惜其才不殺但黥其面而已自聖厯以後百司表奏多令叅决中宗即位又令専掌制命深被信任尋拜為昭容婉兒既與武三思滛亂每下制勅多因事推尊武氏而排抑皇家節愍太子深惡之及舉兵至肅章門扣閤索婉兒婉兒大言曰觀其此意即當次索皇后以及大家帝與后隨激怒并將婉兒登𤣥武門樓以避兵鋒俄而事定婉兒常勸帝廣置招文學士盛引當朝詞學之臣數賜遊宴賦詩唱和婉兒每代帝及后長寧安樂二公主數首並作辭甚綺麗時人咸諷誦之婉兒俄又通於吏部侍郎崔湜引知政事湜嘗充使開商山新路功未半而中宗崩婉兒代草遺制曲加褒賞及韋庻人敗婉兒亦斬於纛下睿宗劉皇后唐書曰睿宗肅明順聖皇后劉氏父延景陜西刺史儀鳯中睿宗居藩納后為孺人尋立為妃生寧王憲夀昌代國二公主睿宗即位冊為皇后又降為皇嗣后後降為妃長夀中與昭成皇后同被譴為則天所殺景雲元年追諡肅明皇后招䰟葬於東都城南陵曰惠陵睿宗竇皇后唐書曰睿宗昭成順聖皇后竇氏父孝諶潤州刺史后姿容婉順動循禮則睿宗為湘王時納為孺人甚見禮待光宅元年立為徳妃生𤣥宗及金仙玉真二公主長夀二年為戸婢團兒誣譖與肅明皇后厭蠱呪詛正月二日朝則天皇后於嘉豫殿既退而同時遇害梓宫秘宻莫知所在睿宗即位諡曰昭成皇后招䰟葬於東都之南陵曰靖陵𤣥宗廢王皇后唐書曰𤣥宗廢皇后王氏同州下邽人梁冀州刺史神念之後上為臨淄王時納為妃上将起事頗預宻謀贊成大業先天元年立為皇后以父仁皎為太僕卿后兄守一以后無子嘗懼有廢立導以符厭之事有左道僧明悟為祭南北斗刻霹靂木書天地字及上諱合而佩之且呪曰佩此有子當與則天皇后為比事發上親究之皆騐下制廢為庻人守一賜死其年十月卒以一品禮葬於無相寺寳應元年雪寃復尊為皇后𤣥宗武皇后唐書曰𤣥宗貞順皇后武氏則天從父兄子恒安王攸止女也攸止卒後后尚幼隨例入宫上即位漸承恩寵及王庻人廢後特賜號為惠妃宫中禮秩一同皇后惠妃開元初産夏悼王及懐哀王上仙公主並襁褓不育上特垂傷悼及生夀王瑁不敢養於宫中命寧王憲於外養之又生盛王琦咸宜太華二公主惠妃以開元二十五年薨年四十餘楊貴妃唐書曰𤣥宗楊貴妃父元琰蜀州司戸妃幼孤養於叔父元璬開元初武惠妃特承恩遇故王皇后廢黜二十四年惠妃薨帝哀悼乆之後庭數千無可意者或奏元琰女姿色冠代冝蒙召見時妃衣道士服號曰太真既進見𤣥宗大悦不期嵗恩禮如惠妃太真姿質豐艶善舞通音律智筭過人毎倩盼承迎動移上意宫中呼為娘子禮數寔同皇后有姊三人皆有才貎𤣥宗並封為國夫人天寳中安禄山大立邉功上深寵之禄山來朝帝令貴妃姊妹與禄山結為兄弟禄山母事妃每宴賜賚稠沓及禄山叛露檄數國忠之罪河北盗起𤣥宗以皇太子為天下兵馬元帥監撫軍國事國忠大懼諸楊聚哭貴妃銜土陳情帝遂不行内禪及潼闗失守從幸至馬嵬禁軍大將陳元禮宻白太子誅國忠父子既而六軍不散𤣥宗遣力士宣問對曰賊本尚在盖貴妃也力士復奏帝不獲己與妃訣遂縊死於佛堂時年三十八瘞於驛西道側𤣥宗楊皇后唐書曰𤣥宗元獻皇后楊氏𢎞農華隂人景雲元年八月選入太子宫時太平公主用事尤忌東宫宫中左右持兩端而潛附太平者必隂伺察事雖纎芥皆聞於上太子心不自安后時方娠太子宻語侍讀張説曰用事者不欲吾多息裔恐禍及此婦人其如之何宻令説懐去胎藥而入太子於曲室躬自煑藥醺然似寐夢神人覆鼎既寤復夢如是者三太子異之告説説曰天命也無他慮既而太平誅后果生肅宗皇帝太子妃王氏無子后班在下后不敢母肅宗為王妃所鞠慈甚所生開元中肅宗為忠王而妃又生寧親公主張説以舊恩特承寵異説亦竒忠王儀表心知運厯所鍾故寧親公主降説子垍開元十七年后薨葬細桞原肅宗張皇后唐書曰肅宗張皇后本南陽西鄂人家昭應祖母竇氏𤣥宗母昭成皇太后之妺也昭成為天后所殺𤣥宗幼失所恃為竇姨鞠養景雲中封鄧國夫人父去逸天寳中選入太子宫為良娣后辨慧豐碩巧中上㫖禄山之亂𤣥宗幸蜀太子與良娣俱從車駕渡渭百姓遮道請留太子收復長安肅宗性仁孝以上皇播越不欲違離左右宦者李靖忠啓太子請留良娣贊成之於是冊太子如靈武時賊䧟京師從官單寡路道多虞每太子次舎宿止良娣必居其前太子曰捍禦非婦人之事何以居前良娣曰大家䟦履險艱兵衛非多恐有倉卒妾自當之大家可由後而出庻幾無患及至靈武産子三日起縫戰士衣太子勞之曰産忌作勞安可容易后曰此非妾自養之時須辦大家事肅宗即位冊為淑妃贈父去逸左僕射母竇氏封義章縣主乾元元年冊為皇后肅宗崩太子監國遂移后於别殿幽宫崩肅宗呉皇后唐書曰肅宗章敬皇后呉氏濮陽人后父坐事没入掖庭開元二十二年𤣥宗幸忠王邸見服御蕭然傍無姬侍命将軍髙力士選掖庭宫人賜之而后在籍中容止端麗性無驕傲寵遇益隆明年生代宗皇帝二十八年薨葬春明門外代宗即位羣臣以肅宗山陵有期準禮以先太后祔代宗沈皇后唐書曰代宗睿真皇后沈氏呉興人世為冠族父易直秘書監開元末以良家子選入東宫太子以賜廣平王天寳元年生徳宗皇帝禄山之亂𤣥宗幸蜀諸王妃主從幸不及者多䧟於賊后被囚於東都掖庭及代宗破賊收東都見之留后於宫中方經畧北征未及迎歸長安俄而史思明再䧟河洛及朝義敗復收東都失后所在莫測存亡代宗遣使求訪十餘年寂無所聞徳宗即位下詔追尊為皇太后代宗獨孤皇后唐書曰太宗貞懿皇后獨孤氏父穎左威衛録事叅軍后以美麗入宫嬖幸專房故長秋虚位諸姬罕所進御后始冊為貴妃生韓王迴華陽公主大厯十年五月薨追諡曰貞懿皇后嬪於内殿累年不忍出宫十三年十月方葬命宰臣常衮為哀冊徳宗王皇后唐書曰徳宗昭徳皇后王氏父遇官至祕書監徳宗為魯王特納后為嬪上元二年生順宗皇帝特承寵異徳宗即位冊為淑妃貞元二年妃病十一月甲午冊為皇后是日崩於兩儀殿韋賢妃唐書曰徳宗韋賢妃不知氏族所出初為良娣貞元二年冊為賢妃性敏慧言動必有禮徳宗深重之六宫師其徳行及徳宗崩請於崇陵終䘮己因侍於寢園元和四年薨順宗王皇后唐書曰順宗荘憲皇后王氏瑯琊人父顔衛尉卿后幼以良家子選入宫為才人順宗在藩時代宗以才人賜之時年十三大厯十三年生憲宗皇帝立以為王孺人順宗升儲冊為良娣后言容恭謹宫中稱其徳行順宗即位疾恙未平后供侍醫藥不離左右屬帝不能言冊禮将行復止及憲宗受禪冊為太上皇后中和元年正月順宗晏駕五月尊太上皇后為皇太后冊禮畢憲宗御紫宸宣赦太后居興慶宫后性仁和恭遜深抑外戚無絲毫假貸訓厲内職有母儀之風焉元和十一年三月崩於咸寧殿諡曰荘憲憲宗郭皇后唐書曰憲宗懿安皇后郭氏尚父子儀之孫駙馬都尉曖之女母代宗長女昇平公主憲宗為廣陵王時納后為妃以妃家父祖有大勲於王室順宗深寵異之貞元十一年生穆宗皇帝元和元年冊為貴妃時帝後庭多私愛以后門族華盛慮正位之後不容嬖幸以是冊拜後時穆宗嗣位冊為皇太后敬宗即位尊太皇太后宣宗繼統即后之諸子也恩禮愈異於前朝大中年崩於興慶宫諡曰懿安祔葬於景陵后厯七朝五居太母之尊人君行子孫之禮福夀隆貴四十餘年雖漢之馬鄧無以加焉女學士宋尚宫附唐書曰女學士尚宫宋氏者名若昭貝州清陽人父廷芬世為儒學至廷芬有詞藻生五女皆聰慧廷芬始教以經藝既而課為詩賦年未及筓皆善屬文長曰若莘次曰若昭若倫若憲若荀若莘若昭文尤髙性復貞素閒雅不尚芳華之飾共白父母誓不從人願以藝學揚名顯親若莘教誨四妺有如嚴師著女論語十篇其言模倣論語以韋逞毋宣文君宋氏代仲尼以曺大家等代顔閔其間問答悉以婦道所尚若昭注解皆有理致貞元四年昭義節度使李抱真表薦以聞德宗俱召入宫試以詩賦兼問經史中大義深加嘆賞徳宗能詩侍臣倡和相屬亦令若莘姊妹應制每進御無不稱善嘉其節概不羣不以宫妾御之呼為學士先生廷芬起家授饒州司馬習藝舘内教賜第一區給俸料元和末莘卒贈河内郡君自貞元七年以後宫中記註簿籍若莘掌其事穆宗復令若昭代司其職拜尚宫姊妺中若昭尤通曉人事自憲穆敬三帝呼為先生六宫嬪媛諸王公主駙馬皆師之為之致敬進封國夫人寳厯初卒将塟詔所司供鹵簿敬宗復令若憲代司宫籍文宗好文以若憲善屬文能論議奏對尤重之太和中坐駙馬沈􅔲事幽若憲於外第賜死穆宗王皇后唐書曰穆宗恭僖皇后王氏越州人父紹卿婺州金華令后少入太子宫元和四年生敬宗穆宗皇帝即位立為妃長慶四年二月尊為皇太后文宗即位之初號寳厯太后穆宗蕭皇后唐書曰穆宗貞憲皇后蕭氏福建人初入十六宅為建安王侍者元和四年生文宗皇帝寳厯三年敬宗崩中尉王守澄率兵討賊迎江王即位文宗踐祚之月奉冊上尊號曰皇太后武宗即位供養彌謹徙宫積慶殿號積慶太后㑹昌中崩諡曰貞獻敬宗郭貴妃唐書曰敬宗郭貴妃父義右武衛將軍長慶時以姿貎選入太子宫敬宗即位為才人生晉王帝以少年有子復以才人容徳冠絶特寵異之俄冊為貴妃及昭愍遇盗宫闈變起文帝即位尤憐晉王有若己子故晉妃禮遇不衰昭宗何皇后唐書曰昭宗積善皇后何氏東蜀人侍夀王邸婉䴡多智特承恩顧生德王輝王昭宗即位立為淑妃乾寧中車駕在華州冊為皇后自乾符以後盗滿天下妖生九重宫廟榛蕪奔播不暇景福之際奸臣内侮帝后蒙塵簿守之中嘗膳禦侮不離左右天祐初朱全忠逼輿駕東幸洛陽其年八月昭宗弑翌日宰相桞粲獨孤損等詐宣皇后令云為宫人所害輝王既即位乃尊后為皇太后太后遭罹變故迫以兇威宫中哭泣不敢聲聞於外明年十二月全忠將僭位先行九錫然後受禪全忠牙將蔣𤣥暉在洛陽宫中知樞宻宣徽副使趙殷衡素與不叶且欲代知樞宻事因使於梁誣告云𤣥暉嘗與何太后共為盟詛誓復唐室不欲王受九錫全忠大怒即日遣使至洛陽誅𤣥暉太后亦被害於積善宫又殺宫人阿秋阿䖍仍廢太后為庶人太平御覽巻一百四十一
