  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_649-1a, image: WYG0898/WYG0898-0771c.png}
body:
  text: 太平御覽卷六百四十九宋李昉等撰刑法部十五髠鞭論肉刑笞拷掠髠周禮秋官上掌戮曰髠者使守積鄭司農曰髠當為完謂但居作三年不虧其體者也五行之中而髠者必王之同族不宫者宫之為剪其類髠之仍令守積也後漢書曰鄧隲子侍中鳳嘗與尚書郎張龕書屬郎中馬融宜在臺閣又中郎将任尚遺鳳馬後尚坐斷盜軍糧檻車徵詣廷尉鳳懼事洩先自首於隲隲畏太后遂髠妻及鳯以謝曹暪别傳曰太祖常行經麥田中令士卒犯麥者死騎士皆下馬持麥以相付時太祖馬騰入麥中勅主簿對以春秋之義罰不加於尊太祖曰制法而自犯之何以率下然孤為軍師不可殺請自刑因拔劍割髪以置地會稽典録曰吳範與鄱陽太守魏騰少相友善騰嘗有罪吳王怒甚敢有諫者死範謂騰曰與汝皆死騰曰死無益何死為範曰安能在此坐觀汝耶乃髠頭自縛詣閣下使鈴下以聞鈴下不敢曰必死不可範曰汝有子邪曰有曰汝為吳範死汝子屬我鈴下曰諾乃排閣入言未卒吳王大怒欲投以㦸逡巡走出範因突入叩頭流血言與涕并良久吳主意釋乃免騰晉書曰髠鉗五嵗刑張裴律序曰髠者刑之威秋凋落之象後魏書曰李訢負罪得降免有㫖鞭髠刑配為厮役訢之廢也平夀侯張讜見與語奇之謂人曰此佳士也終不久屈未幾而復為太倉尚書風俗通曰秦始皇遣蒙恬築長城徒士犯罪止依鮮卑山後遂繫悉令皆髠頭衣赭徒亡之明效也鞭鞭作官刑為辦治官事之刑也傳曰齊襄公田于貝丘見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼墜于車傷足喪屨反誅屨於徒人費弗得鞭之見血又曰重耳過衛衛文公不禮焉出於五鹿乞食於野人與之塊公子欲鞭之子犯曰天賜也稽首受而載之又曰楚子将圍宋使子文治兵於暌終朝而畢不戮一人子玉復治兵於蒍終日而畢鞭七人貫三人耳又曰魏獻公初有嬖妾使師曹誨之琴誨教也師曹鞭之公怒鞭師曹三百穀梁傳成公曰梁山崩雍河三日不流晉君召伯尊而問焉伯尊來遇輦者不辟使車右下而鞭之輦者曰所以鞭我者取道逺矣伯遵下車問焉曰子有聞乎對曰梁山崩伯尊曰君為此召我如之何輦者曰天有山天崩之天有河天雍之雖召伯尊其若之何伯尊由忠問焉忠誠也欲重問之也輦者曰君親素縞帥羣臣而哭之既而祠焉斯流矣後漢書曰劉寛遷南陽太守典厯三郡温仁多恕雖在倉卒未嘗疾言遽色嘗以為齊之以刑民免而無恥吏人有過但用蒲鞭罰之示辱而已漢晉春秋曰明帝勤於吏事苛察踰甚或於殿前鞭殺尚書郎晉中興書曰謝鯤字幼興弱冠知名值中朝大亂長沙王乂輔政親媚小人忌害君子時疾鯤名譖之乂遂執鯤鞭之鯤解衣受杖神無動容乂異而釋之又無喜色又曰皇帝詔佽飛督王鐃忽上吾鴆鳥口云以辟惡此凶物豈宜妄進於是頓鞭鐃二百使殿中御史孫雲監於四衝道焚燒之後魏書曰甄琛監决趙修鞭猶相隠惻然告人曰趙修小人背如土牛殊耐鞭杖有識以此非之滿三嵗為鬼薪白粲鬼薪白粲一嵗為臣𨽻妾𨽻臣妾一嵗免為庶人應劭曰取薪給宗廟為鬼薪白粲𢷬米使正白粲然論肉刑續漢書曰時論者多欲復肉刑孔融乃建議曰古者敦龎善否不别吏端刑清政無過失百姓有罪皆自取之末世陵遲風化壊亂政撓其俗法害其民故曰上失其道民散久矣而欲繩之以古刑投之以殘棄非所謂與時消息者也紂斮朝涉之脛天下謂無道夫九州之地千八百君若各刑一人是天下常有千八百紂也求治休和弗可得也且被刑之人慮不念生志在思死類多趣惡莫復歸正夙沙亂齊伊戾禍宋趙髙英布為世大患不能正人遂為非也故明徳之君逺度深惟棄短就長不苟革其政者也朝廷善之卒不改焉魏志曰鍾繇上疏曰大魏受命繼蹤虞夏孝文革法不合古道先帝聖徳固天所縱典墳之業一以貫之是以繼世仍發明詔思復古刑為一代法連有軍事遂未施行陛下逺追二祖遺意斬趾可以禁惡恨人死之無辜便宜帝寵縣人陳信家富諂事文達信父顯文恃勢横恣玠乃遣使執顯文鞭之一百於是吏人服懐唐書曰太宗以暇日遍閲羣書因讀明堂孔穴云人五臟之系咸附背脊針灸失所皆有損害乃廢書而歎曰今律令笞者皆云髀背分受乃有邂逅致死之義撻人之背理則宜然夫箠五刑之最輕者也生死民之至重者也豈容犯最輕之刑而或鞭笞致死自古帝王由來未悟不亦悲夫即頒制勅罪人不得鞭背晉令曰應得法鞭者執以鞭過五十稍行之有所督罪皆隨過大小大過五十小過二十鞭背用牛皮革㢘成法鞭生革去四㢘常鞭用熟靻之利反柔革也不去㢘作鵠頭紉長一尺一寸鞘長二尺二寸廣三分厚一分柄皆長二尺五寸搜神記曰神農以赭鞭百草盡知其毒寒温諸百味所主故天下號曰神農也異苑曰河内司馬惟之奴天雄死死後還其婦細觀其體有鞭瘡而却著鏁問云有何過至如此曰曾因醉竊罵大家今受此罪列女傳曰楚野辨女者昭氏妻也鄭簡公使大夫聘於荆至於狹路有一婦人乗車與大夫遇擊折大夫車之軸大夫怒将執而鞭之女曰妾聞君子不遷怒不貳過今狹路之中妾之避已極矣而子大夫之僕不肯少伺是以廢于大夫之車而反執妾豈非遷怒哉不怒僕而反怒妾豈不貳過哉會稽典録曰鍾離意為尚書僕射時匈奴有降者詔賜縑三百疋尚書郎暨酆誤以三千疋賜之上大怒鞭酆殿下重痛将死意直排閣入諫曰陛下徳被四表恩及夷狄是以左袵之徒稽首來服愚聞刑疑從輕賞疑從重今陛下以酆賞誤發􅀢電之威海内謂陛下貴微財而賤士命也又曰謝夷吾為郡功曹吏太守第五倫妻車馬入府無所開啟夷吾鞭功曹佐吏門闌卒率車馬出之收其人從史為解之良久乃已汝南先賢傳曰許嘉年十三父給亭治道坐不竟當得鞭嘉叩頭流血請得免由是感激讀書梅陶自敘曰余居中丞曾以鞭皇太子傅親友莫不致諫余笑而應之曰堂髙由階皇太子所以得崇於上由吾奉王憲於下也豈其枉道取媚皇太子特見延賜以清讌笞史記曰張儀嘗從楚相亡璧疑儀盜執掠笞數百不服釋之漢書曰曹參子窋為中大夫惠帝怪相國不治事謂窋曰汝歸私從容問乃父曰髙帝棄羣臣而富於春秋君為相國日飲無所請事何以憂天下然無言吾吿汝也窋既洗沐歸乗間問如帝所教參怒而笞之二百曰趍入侍天下事非乃所當言也又曰景帝元年下詔曰加笞與重罪無異重罪謂死刑幸而不死不可為人謂不能自起居也其定律笞五百曰三百笞三百曰二百猶尚不全至中六年又下詔曰加笞者或至死死而笞未畢朕甚憐之其減笞三百曰二百笞二百曰一百又曰笞所以教之也其定箠令箠策也所以擊者也丞相劉舍御史大夫衛綰請笞者箠長五尺其本大一寸其竹也末薄半寸皆平其節當笞者笞臋毋得更人畢一罪乃更人自是笞者得全又曰田千秋為髙廟寢郎會衛太子為江充所譛敗久之千秋上急變訟太子寃曰子弄父兵罪當笞耳天子之子過誤殺人當何罪哉臣嘗夢見一白頭翁教臣上言是時上頗知太子惶恐無他意乃大感悟焉又曰孝平后有節操自劉氏廢常稱疾不朝會莽敬憚傷哀欲嫁之迺更號為皇新室主令主曰将軍成新公孫建世子豫成飾也音家飾飭醫往問后疾后大怒笞鞭其傍侍御因廢疾不肯起莽遂不敢强也及漢兵誅莽燔燒求央宫曰何面目以見漢家自投火而死焚漢春秋曰上敗彭城降人丁固追上上迴顧曰丁公何相逼之甚乃迴馬而去上即位欲陳功上曰使項氏失天下是子也為人臣用兩心非忠也使下吏笞殺之東觀漢記曰鄧禹攻赤眉曰無穀食自當來吾折箠笞之非諸将憂也後漢書曰汝南太守宗資署范滂功曹委任政事滂外甥西平李頌公族子孫而為鄉曲所棄中常侍唐衡以頌請資資用為吏滂以非其人寢而不召資遷怒榜書佐朱零零仰曰范滂清裁猶以利刃斷腐朽今日寧受笞死而滂不可違資乃止又曰橋𤣥再遷上谷太守又為漢陽太守時上邽令皇甫禎有贓罪𤣥収考髠笞死于冀市隋書曰劉行本為治書侍御史未幾遷黄門侍郎上嘗怒一郎於殿前笞之行本進曰此人素清其過又小願陛下少寛假之上不顧行本於是正當上前曰陛下不以臣不肖置臣左右臣言若是陛下安得不聴臣言若非當致之於理以明國法豈得輕臣而不顧也臣所言非私因置笏於地而退上斂容謝之遂原所笞者管子曰棟橈不勝任則屋覆而人不怒者其理也弱子慈母所愛也不以其理奉養則慈母笞之説苑曰韓伯瑜有過其母笞之泣其母問曰他日笞之未嘗泣今何泣對曰他日瑜得之常痛今母力之衰笞不痛是以泣之益部耆舊傳曰杜真字孟宗廣漢綿竹人也少有孝行習春秋誦百萬言兄事同郡翟酺酺後被繫獄真上檄章救酺繫獄笞六百竟免酺難京師莫不壯之拷掠釋名曰槌而死曰掠掠皮也用威如狼也漢書曰景帝詔曰死者不可復生刑者不可復屬此先帝之所重也而吏未稱職以掠辜苦飢寒瘐死獄中何用心逆人道也朕甚痛之其令郡國嵗上繫囚以掠若瘐死者坐名縣爵里丞相御史課殿最以聞也後漢書曰薛安為揚州從事戴就牢墨成會稽上虞人為倉曹掾受贓穢刺史歐陽操遣安檢治拷覆取實安乃收就拷訊五毒乃以針刺就手十指甲使令爬土又燒鐵令赤使挾之肘腋肉焦爛肉墮地就乃取而食之終無疑伏安乃覆就於船燒馬糞於船兩頭薰之火滅謂就已死發船視之乃張目謂其主者曰公何不益糞添火而使絶之何也主者乃報安安大驚遂引就共坐談論乃解其事耳會稽典録又載又曰遭黨事當考實李膺等案經三府太尉陳蕃却之曰今勘所考案皆海内人譽憂國忠公之臣此等猶十代宥也豈有罪名不彰而致收掠者乎不肯平署平署猶連署也帝愈怒遂下膺等於黄門北寺獄又曰周紆遷司隸校尉六年夏旱駕自幸洛陽録囚徒二人被掠而虫生者轉騎都尉後魏書曰盧度世以崔浩事棄官逃於髙陽鄭羆家羆匿之使者囚羆長子將加箠楚羆戒之曰君子殺身以成仁汝雖死勿言子奉命遂被拷掠至乃火􅅡其體因以物故卒無所言度世后令弟娶羆妹以報其恩又曰尉古真代人也道武之在賀蘭部賀染干奚斤侯乞突等四逆古真知之密馳以告染于疑古真泄其謀乃執持之以兩車軸捍其頭傷其目不服乃免之梁書曰梁代舊律則囚之法曰一上起自晡鼔盡于二更及比部郎中泉剛定律令以舊法測立持久非人所堪分其刻數曰再上廷尉以為新制過輕請集八座議之尚書周𢎞正議曰凡小大之獄必應以情可恣考掠以判刑罪且測人時節本非古制近代已來方有此法起自晡鼓迄于二更豈是常人所能堪忍所以重械之下誣枉者多朝暮二時同等刻進退而求於事為衷會稽典録曰梁宏句章人也太守君興召署主簿是時楚王英謀反妄疏天下牧守謀發興在疏中徵詣廷尉宏興門下掾陸續等傳考詔獄掠毒備至辭氣益壯太平御覽卷六百四十九
