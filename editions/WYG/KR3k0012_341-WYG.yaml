body:
  text: 太平御覽卷三百四十一宋李昉等撰兵部七十二斾幟幡旒旄毦麾幢節鉞斾説文曰斾者斾然垂也爾雅曰繼旐曰斾帛續旐末為燕尾也左傳曰楚令尹南轅反斾又曰晉楚戰子玉以若敖之六卒將中軍子西將左子上將右胥臣以虎皮蒙馬先犯陳蔡陳蔡奔楚右師潰狐毛設二斾而退之幟史記曰沛公祠黄帝蚩尤於沛庭旗幟皆尚赤又曰韓信伐趙令輕騎二百人人持一赤幟入趙壁拔趙幟立漢幟東觀漢記曰漢兵守成都公孫述謂延岑曰事當柰何岑曰男兒當死中求生可坐窮乎財物易聚耳不宜有愛述乃悉散金帛募敢死士五千餘人以配岑扵市橋偽建旗幟鳴鼓挑戰而潜遣竒兵出吳漢軍後襲擊破漢漢墮水援馬尾得出袁山松後漢書曰赤眉復入長安止桂宫逢安將千餘人攻延岑扵杜陽鄧禹以赤眉精兵出在外唯盆子羸弱在長安攻之與謝禄夜戰槀街中鄧禹敗走逢安西與延牙蘇茂李寳戰於杜陽大破之寳茂䧏牙收散卒還戰寳茂從内拔赤眉旗自立其幟赤眉還驚亂走自投川死者十餘萬人墨子曰凡幟帛長五丈廣半幅太白經曰右一將行得水黒幡旗幟圖熊旗額白脚青右二將行得火赤幡旗幟圗鶚旗額白脚青右三將行得木青旛旗幟圗羆旗額白脚青右四將行得金白旛旗幟圗狼旗額白脚青右五將行得土黄旛旗幟圗虎旗額白脚青左一將行得水黒幡旗幟圖熊旗額白脚黄左二將行得火赤幡旗幟圗鶚旗額青脚白左三將行得木青幡旗幟圖羆旗額青脚黄左四將行得金白幡旗幟圗狼旗額青脚黒左五將行得土黄旛旗幟圗虎旗額青脚赤旛釋名曰旛幡也其貎幡幡然也説文曰旛幟也麟角曰信旛古之麾號也所以題表官號以為符信故謂之信旛乗輿則畫為白虎取其義而有威信之徳也魏朝有青龍朱雀𤣥武白虎黄龍等五旛以詔四方詔東方郡國以青龍信南朱鳥西白虎北𤣥武朝廷畿甸則以黄龍亦以麒麟信旛髙貴鄉公討晋文自秉黄龍旛以麾號今晋朝唯用白虎書信旛用鳥取其飛騰輕疾一曰鴻鴈者去來之信也漢書曰甘延夀出西域部勒行陣别為校尉踰葱嶺入赤谷至郅支城望見單于城上五采旛幟又曰武帝伐南越禱太一以牡荆畫旛名曰靈旗獻帝春秋曰董卓未誅有書三尺布幡上作兩口相銜之字負之於道歌曰布平及吕布殺卓負布者不復見吳志曰陸遜取宜都獲秭歸枝江還屯夷陵守峽口以備蜀雲長還當陽西保麥城權使誘之雲長偽立幡旗為象置扵城上因遁走王隠晋書曰河間王伐齊王冏火燒觀閣燬千秋神虎二宫門冏盗白虎幡唱云長沙王矯詔長沙更以白旛唱稱大司馬謀反晋書曰長沙王乂攻齊王冏冏令王胡悉盗騶虞旛唱云長沙王矯詔又稱大司馬謀反助者誅五族又張華𫝊曰楚王瑋受密詔殺太宰汝南王亮太保衛瓘等内外兵擾朝廷大恐計無所出張華白帝以瑋矯詔擅害三公將士倉卒謂是國家意故從之耳今可遣騶虞旛使外軍解嚴理必風靡上從之瑋兵果散及瑋誅華以首謀有功拜右光禄大夫又曰衛瓘既誅瓘女與國臣書曰先公名謚未顯無異凡人毎恠一國蔑然旡言春秋之失其咎安在悲憤感慨故以示意於是主簿劉繇等執黄旛撾登聞鼓上言論之又曰楚王瑋之誅二公也守東掖門㑹騶虞旛出又投弓流涕曰楚王被詔是以從之宋書曰元嘉四年車駕出北堂使三更竟更開廣莫門南臺元法應湏白獸幡銀字碟不肯開尚書左丞羊𤣥保奏免御史中丞傅隆以下曇首曰既無異勅又闕幡碟雖稱上㫖不異單刺元嘉元年二月雖有開門例此乃前事違令今守舊未為非禮其不請白獸旛銀字碟致開門不時由尚書相承之失亦合糺正上特無問更立科條北史曰後魏元孚持白虎旛勞阿那瓌於柔𤣥懐荒二鎮間阿那􅉞衆號三十萬隂有異意遂拘留孚載以轒音汾輼音温車日給酪一升肉一叚毎集其衆坐孚東廂稱為行臺甚加禮敬晉起居注曰太山左伺承有母云感老君生承承相合貴畫作九龍幡遂聚衆被擒棄市晋諸公讃曰楚王瑋矯詔害汝南王亮其夜帝臨東堂張華唱議乃遣左右以白虎旛麾之然後衆散鍾離意别傳曰意為瑕丘長立春遣戸曹史檀建賫青幘幡白督郵督郵不受建留扵家還白意言受他日意見督郵而督郵謝意言所以不受青幘旛者已自有也意還召建問狀建惶怖叩頭意曰勿叩頭使外聞也出因轉署主記史假遣無期建歸家父問之曰朝大士衆賢能者多子何功才既獲顯榮假乃無期寵厚將何謂也得無有不信於賢主耶建長跪以青幘旛意語父父嘿然有頃令妻設酒殺雞與建相樂謂建曰吾聞有道之君以義理殺人無道之君以血刃加人長假無期唯死不還將何以自裁乎酒畢進藥建遂物故石虎鄴中記曰勒為石虎諱呼白虎旛為天鹿旛鹽鐵論曰發春之後懸青旛築土牛殆非明主勸耕稼之意春令之論也軍令曰聞吾鼓音舉黄帛兩半幡合旗為三面負陣庾肅之教令曰大赦蕩然萬物更新陽旛既建事從寛簡差可得詢求民瘼撫循物性旒周禮曰龍旂九斿象大火也鳥旟七斿象鶉火也熊旗六斿以象伐也龜蛇四斿以象營室也龍尾九星朱鳥六星參七星營室四星又曰全羽為旒公羊傳曰諸侯若贅旒禮含文嘉曰天子之旗九仞十二旒曳地旗者旌旗也所以别尊卑序貴賤也諸侯七仞九旒齊􅰅􅰅車後横木也諸侯之旗齊於􅰅卿大夫五仞五旒齊􅰅士三仞三旒齊首首頭也廣雅曰天子十二旒至地諸侯九旒至􅰅卿大夫七旒至轂士三旒至肩東京賦建神旒之太常旄尚書曰武王右秉白旄孔安國註曰手秉旄有事施教也又曰羽畎夏翟雉名可飾旄毛詩曰建彼旄矣又曰干旄美好善也衞文公之臣子多好善賢者樂告以善道也孑孑干旄在浚之郊左傳曰晉人假羽旄于齊而不歸齊人始貳漢書武紀曰征和二年更節加黄旄應劭曰時太子亦發莭以戰故加黄其上以别之晉書曰王珣字元林弱冠與陳郡謝𤣥為桓温掾俱為温所重嘗謂之曰謝掾年四十必擁旄杖節王掾當作黑頭公皆未易才也鬻子曰武王伐紂乃命太公把旄以麾之紂軍反走列仙傳曰秦文公時有梓樹化為牛以騎擊之騎不勝或墜䯻解被髮牛畏之入河故秦因置旄頭騎使先驅文選曰羽旄掃電又曰素旄一麾渾一區宇洛神賦曰左倚采旄右䕃桂旗楚詞曰建修虹之采旄甘泉賦曰流星旄以電燭又曰建雄虹之采旄綴繫之文相紛錯也五色雜而炫耀衆采雜厠而明朗毦服䖍通俗文曰毛飾曰毦漢魏故事曰與外國節皆二赤毦一黑毦十異扵常節魏畧曰孔明見𤣥德𤣥德性好毦時有以旄牛尾見與者因手自結之亮曰將軍當復有逺志耶止結毦而已𤣥德知非常人乃投毦而謂曰以忘憂耳吳時外國傳曰黑白毦出天竺國陶公故事曰臣侃奏獻金繕白毦四枚續異記曰竟陵王誕在廣陵左右侍直眠中夢人告之曰官湏髪為矟毦覺則已失髪矣如此者數十人俗説曰謝安小兒時便有名譽流聞逺國慕容廆餉謝白狼毦一雙謝時年十三一作慕容垂也魏武與楊彪書曰今贈足下十鈴毦一具諸葛亮與瑾書曰兄嫌白帝兵非精練到所督則先主帳下白毦西方上兵也嫌其少也當復部分江州兵以廣益之庾翼與燕王書今致孔雀毦二枚諸葛亮與吳王書曰所送白毦薄少重見辭謝益以増慙庾翼與慕容皝書曰今致襦鎧一領兠牟白毦四副又曰今致朱漆銏二十張綘碧􅀞旛黑毦四副銏所諫切麾左傳曰楚人謂夫旌子重之麾也榖梁曰日有食之鼓用牲亍社用牲非禮也天子救日置五麾陳五兵五鼓諸侯置三麾陳三兵三鼓大夫擊門士擊柝後漢書曰班超拜為將兵長史假鼓吹幡麾王隠晋書曰戴洋病亡天神使為酒藏吏受符持幡麾將士蓬萊諸山五日更生華陽國志曰曹公察雲長不安使張遼以情問之雲長曰吾極知曹公待我厚然吾受劉將軍恩誓以共死不可背之要當立効報公曹聞而義之是嵗紹征官渡遣驍騎將軍顔良攻東郡太守劉延於白馬公使雲長為先鋒雲長見良麾䇿馬刺良扵萬衆中斬其首還遂解延圍公即表封為漢夀亭侯重加賞賜雲長封其物拜書告辭而歸先主也晋軍令曰兩頭進戰惟視麾所指聞三金音止二金音還軍令曰凡戰臨陣皆無諠音讙譁音花明聼鼓音謹視幡麾麾前則前麾後則後麾左則左麾右則右不遵麾令而擅前後左右者斬淮南子曰譬若軍之持麾者也妄指而亂矣幢釋名曰幢童也其貎童童然也晋公卿禮秩曰安平王孚汝南王亮太傅楊駿義陽王望齊王冏魯王賈充河間王顒梁王彤秦王東長沙王儀皆給羽葆幢後魏書曰韓茂膂力絶人尤善騎射太宗曾親征丁零翟猛茂為中軍執幢時大風諸軍旌旗皆􅅯仆茂扵馬上持幢初不傾倒太宗異而問之徵茂所屬具以状對太宗謂左右曰記之尋徵詣行在所試以騎射太宗深竒之以茂為虎賁中郎將兵書曰赤幢常在將所不得動揺赤者火也火土之母故軍主長服赤幢節周禮曰守國者用玉節守都鄙者用角節掌邦國之使者用虎節土國用人節澤國用龍節皆金為之門戸用符節貨賄用璽節使用管節道用旌節以竹為之漢書曰蘓武在匈奴北海牧羊起卧操節又曰張騫使月支匈奴得之留騫五六年漢節不失東觀漢記曰鄭衆謂匈奴曰不忍将大漢節封氊裘也唐書曰潁王璬為蜀郡都督璬性儉率將渡綿州江登舟見以綵緣席為藉者顧曰此可以為寢處奈何踐之命徹去之璬初奉命之藩卒遽不遑受節綿州司馬史賁進説曰王帝子也且為節度大使今之藩而不持節單騎徑進人何所瞻請建大槊蒙之油囊為旌節狀先驅道路足以威衆璬笑曰但為真王何用假旌節乎鉞釋名曰鉞豁也所司莫敢當前豁然破散也字林曰鉞玉斧也開元文字云斧也或為鉞尚書牧誓曰王左杖黄鉞右秉白旄以麾曰逖矣西土之人又顧命曰一人冕執劉立于東堂一人冕執鉞立于西堂云冕皆大夫也劉鉞屬也立於東西廂之前堂詩曰武王載斾有䖍秉鉞如火烈烈則莫我敢遏䖍固也禮記曰天子賜諸侯樂則以柷將之賜伯子男樂則以鼗將之諸侯賜弓矢然後征賜鈇鉞然後殺賜圭瓉然後為鬯又曰軍旅鈇鉞先王之所以飾怒也又曰是故君子不賞而民勸不怒而民威於鈇鉞左傳曰魏絳至授僕人書將伏劒士魴張老止之公讀其書曰君合諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及楊干無所逃罪不能致訓至於用鉞臣之罪重敢有不從以怒君心請歸死於司冦也又曰將戮慶封椒舉曰臣聞無瑕者可以戮人慶封唯逆命是以在此其肯從扵戮乎播於諸侯焉用之王弗聼負之斧鉞以狥於諸侯又曰其後襄之二輅鏚鉞秬鬯彤弓虎賁文公受之以有南陽之田晉文公也史記殷本紀曰當是時桀為虐亂婬荒耽􅒬于酒不修厥政天下叛之而諸侯昆吾氏為亂湯乃興師率諸侯伊尹從湯湯自把鉞以伐昆吾遂伐桀又曰紂囚西伯於羑里西伯之臣閎夭之徒求美女竒物善馬以獻紂紂廼赦西伯西伯出而獻洛西地以請除炮烙之刑紂乃許之賜弓矢斧鉞使征伐又周本紀曰紂之嬖妾二女皆經自殺武王又射三發擊以劒斬以𤣥鉞又曰周公旦把大鉞畢公把小鉞以夾武王漢書刑法志曰大刑用甲兵其次用斧鉞中刑用刀鋸其次用鑚鑿薄刑用鞭朴後漢書郭躬傳曰竇固出擊匈奴騎都尉秦彭為副彭在别屯而輙以法斬人固奏彭専擅請誅之顯宗乃引公卿朝臣平其罪科躬以明法律召入議者皆然固奏躬獨曰扵法彭得斬之帝曰畢征校尉一統於督彭既無斧鉞何得専殺人乎躬對曰一統扵督者謂在部曲也今彭専軍别將有異於此兵事呼吸不容先關督帥且漢制棨㦸即為斧鉞於法不合罪帝從躬之議吳志陸遜傳曰遜假節鉞為大督逆曹休斬獲萬餘吳録曰假陸遜黄鉞吳主親執鞭以見之晋書天文志曰天槍三星在北斗杓東一曰天鉞蓋天之武備也又曰參十星一曰參伐一曰大辰一曰天市一曰鈇鉞主斬刈又曰青龍三年六月丁未鎮星犯井鉞占曰為兵氣也又曰甘露元年七月乙卯熒惑犯井鉞占曰並有兵事唐書曰天寳中制黄鉞古來以金為飾金者應五行之數有肅殺之威失金稱黄理或未當其鉞宜改為金鉞副鉞威武之義焉司馬法曰夏執𤣥鉞崔豹古今輿服注曰元鉞諸公主得建之武王以黄鉞斬紂故王者以為戒太公以元鉞斬妲己故婦人以為戒博物志曰武王伐紂度河大風波武王操鉞秉麾麾之風波立霽正部曰奔逃之士不避斧鉞張平子西京賦曰於是蚩尤秉鉞奮鬛被般禁禦不若以知神姦張平子東京賦曰緫輕武於後陳奏嚴鼔之嘈囐戎士介而揚揮載金鉦而建黄鉞又曰方相秉鉞巫覡操茢桃弧棘矢所發無臬又曰我世祖忿之乃龍飛白水鳳翔參墟授鉞四七共工是除潘元茂册魏公九錫文曰錫以二輅虎賁鈇鉞陳孔章檄吳將校部曲文曰丞相秉鉞鷹揚順風烈火元戎啓行未鼓而破又曰伏鈇嬰鉞首腰分離范蔚宗宦者傳論曰梁冀受鉞迹罔公正思固主心故中外服從上下屏氣曹植王仲宣誄曰我公奮鉞耀威南楚荆人或違陳戎講武太平御覽卷三百四十一
