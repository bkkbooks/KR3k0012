  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_251-1a, image: WYG0895/WYG0895-0279a.png}
body:
  text: 太平御覽卷二百五十一宋李昉等撰職官部四十九都督總管都䕶都督晉書曰杜預為都督荆州諸軍事南土美而謡之曰後世無叛由杜翁孰識智名與勇功又曰陶侃為都督荆雍益梁四州諸軍事是時荆州大饑百姓多饑死侃至秋熟輒糴至饑復使糶之士庻歡悅咸䝉濟賴又曰羊祜都督荆州諸軍事招攜以禮懐逺以徳吳人悅服呼為羊公又曰庾翼都督江荆益三州刺史制度規模每出於人數年之中軍國充實人情翕然稱其才明由是自河以南皆懐歸附又曰陳􅎰為陶侃廣州刺史侃夢有司馬以鎧與侃􅎰以為司馬國姓鎧者捍國之器節下當進位果除都督交州又曰張實都督凉州下令曰忝繼前蹤庻幾刑政不為百姓之患而比年饑旱殆由庻事有闕竊慕箴誦之言以補不逮自今有靣刺孤罪者酬以束帛翰墨陳孤過者荅以筐篚謗言於市者報以羊米又曰石苞都督揚州諸軍事苞因入朝當還辭髙貴鄉公留語盡日既出白文帝曰非常主也數日間而有成濟之事又曰劉𦙍代温嶠都督江州諸軍事領江州刺史假節𦙍位任轉髙矜豪日甚縱酒躭樂不恤政事大殖財貨商販百萬初𦙍之代嶠也逺近皆謂非選陶侃郄鑒咸云𦙍非方伯才朝廷不從或問王悦曰今大難之後綱紀頓絶自江陵至於建康三千餘里流人萬計布在國之南藩要害之地而𦙍以侈汰之性卧而對之不有外變必有内患悦曰聞温平南語家公云連得惡夢思見代者尋云可用劉𦙍此乃温意非家公也是時朝廷空罄百官無禄惟資江州運漕而𦙍商旅繼路以私廢公有司奏免𦙍官書始下而為郭黙所害又曰王恭為都督兖青冀幽并徐州晉陵諸軍事平北將軍假節鎮京口初都督以北為號者累有不祥故桓冲王坦之刁彛之徒不受鎭北之號恭表讓軍號以超授為辭而實惡其名於是改號前將軍北史曰賀蘭祥除都督荆州刺史見有發掘古冢暴露骸骨乃謂守令曰此豈仁者為政耶命所在収藏時夏亢陽即日降雨唐書曰宋璟轉廣州都督仍為五府經畧使廣州舊俗皆以竹茅為屋屢有火災璟教人燒瓦改造店肆自是無復延燒之患夷下懐惠立碑以紀其政又曰王方翼為夏州都督屬牛疫無以營農方翼造人耕之法施闗鍵使人推之百姓頼焉總管後周書曰長孫儉為荆州總管甞詣闕奏事時值大雪遂立於雪中待報自旦逹暮竟無惰容其奉公勤至皆此類也又曰赫連逹遷大將軍夏州總管三州五防諸軍事逹雖非文吏然性質直遵守法度輕於鞭撻而重慎死罪性又亷儉邊境胡民或饋逹以羊者逹欲招納異類報以繒帛主司請用官物逹曰羊入我厨物出官庫是欺上也命取私帛與之識者嘉其仁恕焉北史曰韋孝寛為延州總管兄夐至州與孝寛相見將别孝寛以所乘馬及轡勒與夐夐以其華飾心不欲之謂孝寛曰昔人不棄遺簮墜履者惡與之同出而不與之同歸吾之操雖不逮前烈然捨舊筞新亦非吾志也乃乘舊馬以歸隋書曰元褒為凉州總管有商人為賊所刼其人疑同宿者而執之褒察其色寛其辭正遂捨其人商詣闕訟褒受金縱賊上遣使窮治之使者簿責褒曰何故利金而捨盗也褒便即引咎初無異詞使者與褒俱詣京師遂坐免官其盗尋發於他所上謂褒曰公朝廷舊臣位望隆重受金捨賊非善事何至自誣也曰臣受委一州不能息盗賊臣之罪一也州民為人所謗不付法司懸即放免臣之罪二也牽率愚臣不顧刑法不持文書約束至今為物所疑臣之罪三也臣有三罪無所逃責臣又言不受賂使者後將有所窮究然則縲絏横及良善重臣之罪是以自誣上歎異之稱為長者又曰元景山為豪州總管先是州民王廻洛張季直等聚結亡命每為刼盗前後牧守不能制景山下車遂捕之廻洛季直挺身奔江南擒其黨與數百人皆斬之法令明肅盗賊屏跡稱為大治又曰韋世康嘗因侍宴再拜陳讓曰臣無尺寸之功位亞台鉉今犬馬齒截不益明時恐先朝露無以塞責願乞骸骨退避賢能上曰朕夙夜庶幾求賢若渇冀與公共治天下以致太平今之所請深乖本望縱令筋力衰謝猶屈公卧治一隅於是出拜荆州總管時天下惟置四大總管并揚益三州并親王臨統惟荆州委於世康時論以為美世康為政簡靜百姓愛恱合境無訟又曰韋藝遷營州總管容貌瓌偉每夷狄叅謁必整儀衛盛服以見之獨坐滿一榻畨人畏懼莫敢仰視又曰薛道衡聲名籍甚一時仁壽中楊素專掌朝政道衡既與素善上不欲道衡乆知機宻因而檢校襄州總管道衡乆䝉驅筞一旦違離不勝悲戀言之哽咽髙祖愴然改容曰爾光隂晩暮侍奉誠勞朕欲令爾將攝兼撫氓俗今爾之去朕如斷一臂於是賚物三百叚九鐶金帶一時服一襲馬十疋慰勉遣之又曰樊子盖轉循州總管許以便宜從事十八年入朝奏嶺南地圖賜以良馬雜物又曰令狐熈拜桂州總管十七州諸軍事許以便宜從事刺史已下官得承制補授給帳内五百人賜帛五百疋發𫝊送其家累改封康郡公熈至部大𢎞恩信其溪洞渠帥更相謂曰前時總管皆以兵威相脅今者乃以手教相諭我軰其可違乎於是相率歸附先是州縣生梗長吏多不得之官寄政於總管府熈悉遣之為建城邑開設學校華夷感敬稱為大化又曰李安領行軍總管率蜀兵順流東下時陳人屯白沙安謂諸將曰水戰非北人所長今陳人依險泊舩必輕我而無備以夜襲之賊可破也諸將以為然安率衆先鋒大破陳師髙祖嘉之唐書曰田留安拜魏州總管劉闥之亂也來攻州城於時山東豪猾多殺長吏以應賊百姓兇人咸懐異志凡諸守皆以心腹自衛多所猜防由是上下情隔怨叛者多留安獨撫結所部示無疑阻凡有白事者無間踈逺皆至卧内謂人曰吾與卿軰同為國守自宜一心無為疑貳也必欲棄同即異背順歸逆亦任卿軰斬吾頭而去矣城中父老逓相誡勵子弟曰田公以赤心相付何得負之由是人情遂固州人苑竹林者劉闥之黨也初有異圖留安隂知之而不發其事因引置左右委以闗竹林感其意遂歸心焉卒収其力用又曰劉世讓拜廣州緫管將之官髙祖問以備邊之策世讓答曰突厥比數南冦者徒以馬邑為其中路耳臣計者於崞城置一智勇之將多貯金帛有來降者厚賜賞之數出竒兵掠其城下踐其禾稼敗其生業不出嵗餘彼當無食馬邑不足圖也髙祖曰非公無可任者乃使馳驛至彼善為經畧世讓於是以兵臨馬邑髙滿政以其地來降突厥患之遣曹繁陁來詣中國言世讓與可汗通謀將為亂由是得罪籍没其家及突厥來降言世讓初無逆謀始原其妻子都䕶漢書曰宣帝時匃奴日逐王欲降漢使人與鄭吉相聞吉發渠犁龜茲諸國五萬人迎日逐王口萬二千小王將十三人隨吉至河曲頗有亡者吉追斬之將詣京漢封日逐王為歸徳侯吉既破車師降日逐威震西域遂並䕶車師以西故號為都䕶都䕶之置自吉始焉上嘉其功乃下詔曰都䕶西域騎都尉鄭吉撫循外蠻宣明威信封吉為安逺侯漢之號令班於西域始自張騫成於鄭吉也又曰叚會宗為人好大節立功名為西域都䕶與谷永相友善永憫其老復逺出與書戒之曰足下以柔逺之令徳復典都䕶之重職甚休願吾子因循舊貫無求竒功萬里之外以身為本願詳思愚言又曰元帝時甘延壽為西域都䕶陳湯為副郅支單于數困辱漢使湯與延壽謀曰郅支所在絶逺無金城强弩之守如發屯田吏士從烏孫直指其城可以成功延壽欲奏之湯曰國家與公卿議大䇿非凡所見必不從會延壽乆病湯獨矯制發兵延壽聞之欲止焉湯怒按劒叱延壽曰大衆已集竪子欲沮衆耶延壽遂從之部勒行陣益置揚威白虎合騎之校張晏曰西域陣法之名也即日引軍分行斬郅支單于頭送京師延壽封茂成侯湯封闗内侯功大賞少為石顯匡衡所抑應邵漢官儀曰西域都䕶武皇帝始開通西域三十六國其後稍分至五十餘國置使者校尉以領䕶之宣帝神雀三年改曰都䕶秩二千石平帝時省都䕶令戊巳校尉領之沈約宋書曰初漢宣帝置西域都䕶以加騎都尉若諌大夫䕶西域諸國光武建武初始有督軍諸使至獻帝建安中魏武相漢遣大將外出督十軍二十軍者始號都督曹袁張楊之徒雖以三公假節州郡然無都督之號也三國時亦有都䕶中都䕶左右都䕶將軍兼督諸軍猶是舊制意也黄初三年上軍大將軍曹真始都督中外諸軍事總諸軍髙貴鄉公正元二年晉文帝都督中外諸軍事尋加大都督之號太始中置小都督江左亦時有也呉朝鎮將總兵亦曰都督大將軍出為二部則曰左右都督分武昌為兩部亦曰左右部大都督其總一者則曰大都督又繞帳羽林無難之屬隨事有督無常號也至諸葛恪以下輔政乃都督中外諸軍事闗雲長在江陵亦督軍州至張飛姜維亦為中外都督如呉魏也晉氏以來宰相任重者為中外大都督方伯望隆者亦加大都督之號凡諸都督雖軍號有輕重無假節也唐書曰馬總為安南都䕶總敦儒學長於政術在南海累年清亷不撓夷獠便之於漢所立銅柱之處以銅一千五百觔特鑄二柱刻書唐徳以繼伏波之迹太平御覽卷二百五十一
