body:
  text: 太平御覽卷一百十一宋李昉等撰皇王部三十六唐𤣥宗明皇帝安禄山附𤣥宗明皇帝唐書曰𤣥宗明皇帝諱隆基睿宗第三子也母曰昭成順聖皇后竇氏垂拱元年秋八月戊寅生於東都性英斷多藝尤知音律善八分書儀範偉䴡有非常之表三年閏七月丁夘封楚王天授二年十月戊戌出閤開府置官屬年始七嵗朔朢車騎至朝堂金吾將軍武懿宗忌上嚴整訶排儀仗因欲折之上叱之曰吾家朝堂干汝何事敢迫吾騎從則天聞而特加寵異尋即入閤長夀二年臘月丁夘改封臨淄郡王聖厯元年出閤賜第於東都積善坊大定元年従幸西京賜宅於興慶坊長安中厯右衛郎將尚輦奉御神龍元年遷衛少卿景龍二年四月兼潞州别駕十二月州境有黄龍白日昇天嘗出畋有紫雲在其上後従者望而得之前後符瑞凡一十九事四年中宗將祀南郊來朝京師將行使術士韓禮筮之一蓍孑然獨立禮驚曰蓍立竒瑞非常也不可言屬中宗末年王室多故上嘗隂引材力之士以自助上所居宅外有水池漫溢頃餘望氣者以為龍氣四月中宗幸其第因逰其池結綵為樓舡令巨象踏之六月中宗暴崩韋后臨朝稱制韋温宗楚客紀處訥等謀傾宗社以睿宗介弟之重先謀不利道士馮道力處士劉承祖皆善占兆詣上布誠欵上所居里名隆慶時人語訛以隆為龍韋庶人稱制改元又為唐隆皆符瑞御名上益自負乃與太平公主謀之公主喜以子崇簡従上乃與崇簡朝邑尉劉幽求長上折衝麻嗣宗押萬騎果毅葛福順李仙鳬寳昌寺僧普潤等定䇿誅之或請先啟相王上曰我拯社稷之危救君父之急事成福歸於宗社不成身死於忠孝安可先請怖憂大王乎若請而従是王與危事請而不従則吾計失矣遂以庚子夜率幽求等數十人自苑南入捴監鍾紹京又率丁匠百餘人以従分遣萬騎徃𤣥武門殺羽林將軍韋璿韋播髙嵩持首而至衆讙呌大集攻白獸𤣥徳等門斬闗而進左萬騎自左入右萬騎自右入合於凌烟閣前時太極殿前宿衛梓宮萬騎聞譟聲皆披甲應之韋庶人惶恐走入飛騎營為亂兵所害於是分遣誅韋氏之黨比明内外討捕皆斬之乃馳謁睿宗謝不先啟請之罪睿宗遽前拽上而泣曰宗社禍難由汝安定神祗萬姓頼汝之力也拜殿中監同中書門下三品兼押左右萬騎進封平王睿宗即位與侍臣議立皇太子僉曰除天下之禍者享天下之福拯天下之危者受天下之安平王有聖徳定天下又聞成器已下咸有推讓冝膺主鬯以副羣心睿宗従之丙午制立為皇太子延和元年㓙黨因術人間睿宗曰據𤣥象帝座前星有災皇太子合作天子不合更居東宫矣睿宗曰傳徳避災吾意决矣七月壬午下制曰皇太子某有大徳於天地定阽危於社稷温文既習聖敬克躋委之監撫已移年嵗時政益明庶工惟叙朕之知子庻不負時厯數在躬冝陟元后可令即皇帝位有司擇日授冊朕方比迹洪古希風太皇神與化逰思與道合無為無事豈不美歟王公百寮冝識朕意上惶懼遽馳見叩頭請所以傳位之意睿宗曰吾因汝功業得宗社今帝座有𤯝思欲遜避唯聖徳大勲始轉禍為福易位於汝吾知免矣上始居武徳殿視事三品已下除授及徒罪皆决之先天二年七月三日尚書左僕射竇懐貞侍中岑羲中書令蕭志忠崔湜雍州長史李晉左羽林大將軍常元楷知羽林將軍李慈等與太平公主同謀期以其月四日以羽林兵作亂上宻知之因以中旨告岐王範薛王業兵部尚書郭元振將軍王毛仲少監姜皎中書侍郎王琚吏部侍郎崔日用等定計因毛仲取閑廐馬及家人三百餘人率太僕少卿李令問王守一内侍髙力士果毅李守徳等親信十數人出武徳殿入虔化門梟常元楷李徳於北闕擒賈興福李猷於内客省以出執蕭志忠岑羲於朝堂皆斬之睿宗明日下詔曰朕將髙居無為自今軍國刑政一事已上並令皇帝䖏分上御承天樓下制大赦天下冬十一月甲申幸新豐之温湯癸夘講武於驪山兵部尚書代國公郭元振坐虧失軍容配流新州給事中攝太常少卿唐紹以軍禮有失斬於纛下甲辰畋獵於渭川同州刺史梁國公姚元之為兵部尚書同中書門下三品冬十一月戊子上加尊號為開元神武皇帝十二月庚寅朔大赦天下改為開元四年六月癸亥太上皇崩九年四月甲戌上親䇿試應制舉人於含元殿謂曰古有三道合减二䇿近無甲科朕將存其上第務收賢俊十三年冬十月辛酉東封太山發自東都十一月丙戌至兖州岱宗丁亥致齋於行宫己丑日南至備法駕登山仗衛羅列岳下百餘里詔行従留於谷口上與宰臣禮官昇山庚寅祀昊天上帝於上壇有司祀五帝百神於下壇禮畢藏玉冊於封祀壇之石䃭然後燔柴燎發羣臣稱萬姓傳呼自山頂至岳下震動山谷還齋宫慶雲見日抱戴辛夘祀皇帝地祗于社首蔵玉冊於石䃭如封祀壇之禮壬辰御帳殿受朝賀大赦天下封太山神為天齊王禮秩加三公一等環山十里禁其樵採賜酺七日甲午發岱岳丙申幸孔子宅親設奠祭於冬十二月己巳至東都時累嵗豐稔東都米斗十錢青齊米斗五錢是冬分吏部為銓勅禮部尚書蘇頲刑部尚書章杭工部尚書盧従愿等分掌選事十四年五月癸夘户部進計帳今年管户七百六萬九千五百六十管口四千一百四十一萬九千七百一十二二十二年五月闗中大風抜木同州尤甚是夏上自於苑中種麥率皇太子以下躬自收穫謂太子等曰此將薦宗廟是以躬親亦欲令汝等知稼穡之難也因分賜侍臣謂曰比嵗令人巡檢苗稼所對多不實故自種植以觀其成且春秋麥禾豈非古人所重也二十五年春正月壬午制曰朕猥集休運多謝哲王然而哀矜之情小大必慎自臨寰宇子育蒸黎未嘗行極刑起大獄上𤣥降鑒應以祥和思協平邦之典致之仁夀之域自今有犯死刑除十罪冝令中書門下與法官詳所犯輕重具狀奏聞秋七月己夘大理少卿徐祜奏天下今嵗斷死刑五十八人㡬致刑措二十七年八月甲申追贈孔宣父為文宣王顔回為兖國公餘十哲皆為侯夾坐嗣褒聖侯改封為文宣公二十九年正月制兩京諸州各置𤣥元皇帝廟并置崇𤣥學天寳元年正月丁未朔大赦天下改元常赦不原咸赦除之百姓有欠負租稅及諸色並免之前資官及白身人有儒學博通文詞秀逸及軍謀武藝者所在具以名薦京文武官堪官為刺史者各令封狀自舉改黄鉞為金鉞内外官各賜勲兩轉甲寅陳王府叅軍田同秀上言𤣥元皇帝降見於丹鳯門之通衢告靈符在尹喜之故宅上遣使者即于故闗尹喜臺下發得之乃置𤣥元廟於大寧坊二月丁亥上加尊號為開元天寳聖武神文皇帝辛卯親享𤣥元皇帝于新廟甲子親享太廟丙申合祭天地于南郊置天下囚徒罪無輕重並釋放三載正月丙辰朔改年為載四載秋八月甲辰冊太真楊氏為貴妃七載三月乙丑天同殿柱産玉芝有神光照殿羣臣請加皇帝尊號曰開元天寳聖文神武應道皇帝許之夏五月壬午上御興慶宫受冊徽號大赦天下六月范陽節度使安祿山請實封鐵劵十一載十一月庚申御史大夫兼蜀郡長史楊國忠為右相兼吏部尚書十三載二月祿山奏前後討奚契丹功將士跳盪等請超三資於是超授將軍者五百餘人中郎將者二千餘人十四載冬十月壬辰幸三清宫丙寅范陽節度使安祿山蕃漢之兵十餘萬自幽州南向詣闕以誅楊國忠為名先殺太原尹楊光翽於博陵郡壬申聞於行在所癸酉以郭子儀為靈武太守朔方節度使封常清自安西入奏至行在甲戌以常清為范陽平盧節度使令募兵三萬以禦逆胡戊寅還京十二月丙戌朔祿山於靈昌郡渡河辛夘陷陳留郡殺張介然甲午陷滎陽郡殺太守崔無詖丙申封常清與賊戰于成臯甖子谷官軍敗績常清奔于陜郡丁酉安祿山陷東京殺留守李憕御史中丞盧奕判官蔣清時髙仙芝鎮陜郡棄城西保潼闗常山太守顔杲卿與長史袁履謙賈深等執賊將何千年髙邈送京師辛丑詔以皇太子統兵東討十五年春正月乙夘御宣政殿受朝其日祿山僣號於東京六月庚寅哥舒翰將兵八萬與賊將崔乾祐戰於靈寳西原官軍大敗死者十六七甲午將謀幸蜀乃下詔親征詔下後士庶恐駭奔走于路乙未凌晨自延秋門出㣲雨沾濕扈従唯宰相楊國忠韋見素内侍髙力士太子親王妃主皇孫已下多従之不及平明渡便橋國忠欲斷橋上曰後来者何以能濟命緩之辰時至咸陽望賢驛置頓官吏駭㪚無復儀衛上憇於宫門之榭下亭午未進食俄有父老獻麥飯上謂之曰爾可進飯於是百姓獻食相繼俄而尚食持御膳至上頒給従官而後食是日次金城縣官吏已遁令魏方進男允招誘俄得智藏寺僧進蒭粟行従方給丙辰次馬嵬驛諸衞頓軍不進龍武大将軍陳𤣥禮奏曰逆胡指闕以誅國忠為名然中外羣情不無嫌恐今國步艱阻乘輿震蕩陛下宜徇羣情為社稷大計楊國忠之徒可致之於法㑹吐蕃使二十一人遮國忠告訴於驛門衆即呼曰楊國忠連蕃人謀逆兵士圍驛四合誅楊國忠及魏方進一族兵猶未解上令髙力士詰之回奏曰諸將既誅國忠以貴妃在宫人情恐懼上即命力士賜貴妃自盡𤣥禮等見上請罪命釋之丁酉將發馬嵬驛朝臣惟韋見素一人乃命見素子京兆府司錄諤為御史中丞充置頓使議其所向軍士或言阿隴或言靈武太原或請還京韋諤曰還京須有捍賊之備今兵馬未集恐非萬全不如且幸扶風徐圖所向上詢於衆衆以為然及行百姓連路乞畱皇太子願并力破賊收復京城即日畱太子戊戌次扶風縣己亥次扶風郡軍士各懐去就咸出醜言陳𤣥禮不能制㑹益州貢春綵十萬匹上悉命置於庭召諸將諭之曰卿等國家功臣陳力久矣朕之優奨常亦不輕逆胡背恩事須迴避甚知卿等不得别父母妻子朕亦不及親辭九廟言發流涕又曰朕須幸蜀路險狹若人多惟恐難供承今有此綵卿等即冝分取各圖去就朕自有子弟中官相隨便與卿等訣别衆咸俯伏涕泣曰死生願従陛下帝曰去住任卿自是悖亂之言稍息庚子以司勲郎中劍南節度留後崔圓為蜀郡長史劍南節度副大使以頴王璬為劍南節度大使以監察御史宋若思為御史中丞充置頓使韋諤充巡閣道使並令先發辛丑發扶風郡是夕次陳倉壬寅次㪚闗分部下為六軍頴王璬先行夀王瑁等分統六軍前後左右相次丙午次河池郡崔圓奏劍南嵗稔民安儲供無闕上恱授圓中書侍郎同中書門下平章事蜀郡長史劍南節度如故以前華州刺史魏仲犀為梁州刺史秋七月壬戌次益昌縣渡吉柏江有雙魚夾舟而躍議者以為龍甲子次普安郡憲部侍郎房琯自後至上與語甚恱即日拜為吏部尚書同中書門下平章事丁夘詔以皇太子充天下兵馬元帥都統朔方河北河東平盧等節度兵馬收復兩京庚午次巴西郡庚辰車駕至蜀郡扈従官吏軍士到者一千三百人宫女二十四人而已八月癸未朔御蜀郡府宣詔大赦天下癸夘靈武使至始知皇太子即位丁酉上用靈武冊稱上皇詔稱誥己亥上皇臨軒降冊肅宗命宰臣韋見素房琯使靈武冊命朕稱太上皇軍國大事先取皇帝處分後奏朕知俟克復兩京朕當怡神姑射偃息大庭明年九月郭子儀收復西京十月肅宗中使啖進庭瑤入蜀奉迎丁夘上皇發蜀郡十一月丙申次鳯翔郡肅宗遣精騎三千至扶風迎衛十二月丙戌肅宗具駕至咸陽望吴驛迎奉上皇御宫之樓肅宗拜慶樓下嗚咽流涕不自勝為上皇徒步控轡上皇撫背止之使騎馬前導丁未至京師文武百寮京城庶士夾道懽呼靡不流涕即日御大明宫之含元殿見百寮上皇自責人人感􅍋上皇詣廟請罪遂幸興慶宫三載二月肅宗與羣臣奉上皇尊號曰太上至道聖皇帝乾元二年七月丁未移幸西内之甘露殿時奄官李輔國離間肅宗故移居西内髙力士陳𤣥禮等遷謫上皇寖不恱上元二年四月甲寅崩于神龍殿時年七十八諡曰至道大聖大明孝皇帝廟號𤣥宗初上皇親拜五陵至橋陵見金粟山有龍盤鳯翥之勢復近先塋謂侍臣曰吾千秋後冝𦵏此地得奉先陵不忘敬矣至是追先旨以創寢園廣徳元年三月辛酉𦵏太陵安祿山附唐書曰安祿山營州栁城西北夷人也本無姓氏名軋犖山母阿史徳氏亦突厥巫師以卜為業開元初與將軍安道買男俱逃出突厥中道買次男貞節為嵐州别駕收獲之年十餘嵗矣冒姓為安及長解六蕃語二十年張守珪為幽州節度祿山盗羊事覺守珪剝縛欲棒殺之大呼曰大夫不欲滅兩蕃耶何為打殺祿山守珪見其肥白壯其言而釋之令與鄉人史思明同捉生行必克獲授為偏將以驍勇聞遂養為子二十八年為平盧兵馬使性巧黠人多譽之授營州都督平盧軍使厚賂徃來者乞為好言𤣥宗益信向之天寳元年以平盧為節度以祿山攝中丞為使入朝奏事𤣥宗益寵三載代裴寛為范陽節度河北採訪平盧軍等使如故採訪使張利貞嘗受其賂及李林甫並言其美𤣥宗意益堅後請為貴妃養兒入對皆先拜太真𤣥宗恠問之對曰臣是蕃人先母而後父𤣥宗大恱遂命楊銛已下並約為兄弟姨妹晩年益肥壯垂手過膝重三百三十斤每行時以肩膊左右􅎑挽其身方能移步至𤣥宗前作胡旋舞疾如風馬為置第宇窮極壯䴡上御勤政樓於御座東為設一大金雞障前置一榻坐之十載入朝又求為河東節度因拜之長子慶宗太僕卿少子慶緒鴻臚卿慶宗又尚郡主祿山隂有逆謀於范陽北築翃武城外示禦㓂内貯兵器積榖為保守計戰馬萬五千匹牛羊稱是秉三節度進奏無不允每月進奉生口馳馬鷹犬既肥大不任戰十一年八月祿山併率河東等軍十五萬以討契丹去盧千餘里至上䕶真河即北黄河也倍程奄至契丹牙帳屬久雨弓箭皆漲湿將士困極奚又夾攻之殺傷畧盡祿山被射以麾下奚小兒二千餘人走止出墜坑中其男慶緒等扶之㑹夜解走投平盧城楊國忠屢奏祿山必反𤣥宗使中官輔璆琳覘之得其賄賂盛言其忠十三載正月謁於華清宫因涕泣言臣蕃人不識字陛下擢臣不次被楊國忠欲得殺臣𤣥宗益親厚之遂以為左僕射却迴又請為閑厩隴右羣牧等都使又請知總監事既為閑厩羣牧等使上筋脚馬皆隂選擇之三月歸范陽疾行出闗日三四百里至范陽人言反者𤣥宗必大怒縳送與之十四載十一月反於范陽矯稱奉恩命以討逆賊楊國忠以諸蕃馬步十五萬以髙尚嚴莊為謀主孫孝哲髙逸何千年為腹心天下承平日久人不知戰聞其兵起朝廷震驚禁衛皆市井商販之人乃以髙仙芝封常清等擊之祿山又嚴肅得死力無不一當百遇之必敗十二月渡河遂入陳留郡太守郭納出降至滎陽太守崔無詖拒戰城陷死之次于汜水甖子谷乃取谷南而過東京太守李憕中丞盧奕使採訪判官蔣清燒絶河陽橋祿山入東京殺李憕盧奕蔣清召河南尹達奚詢使之蒞事十五年正月賊竊號燕國王年號聖武達奚詢已下署為將相五月南陽節度魯炅率荆襄黔中嶺南子弟十萬與賊將武令珣戰于葉縣城北􅓳河王師盡沒六月李光弼郭子儀出土門路敗賊衆於常山郡東嘉山河北諸郡順歸者千餘祿山窘急圖欲却投范陽㑹哥舒翰自潼闗領馬步八萬與賊將崔乾祐戰於靈寳西為賊覆敗西奔潼闗為其帳下執送與賊關門不守𤣥宗幸蜀十一月遣阿史那承慶攻陷頴州屠之祿山以體肥及造逆後兩眼漸暗至是不見物又苦疽疾至徳二年正月朔受朝瘡甚而中罷尤躁急動用斧鉞嚴莊亦被捶撻莊謀立慶緒領李猪兒同入禄山帳中猪兒以大刀斫其腹祿山眼無所見捫床頭刀不得但撼幄帳中大呼曰是我家賊腹已破血流數斗在床上言訖氣絶莊即宣言於外言祿山傳位於晉王慶緒縦樂飲酒無度呼莊為兄事之小大必咨之慶緒為偽主素懦弱言詞無序二月肅宗南幸鳯陽郡始知祿山死使僕固懐恩使于回紇結婚請兵討逆九月廣平王領蕃漢之衆收西京走安守忠賊之死者積如山阜王師乗勝至陜郡賊懼令嚴莊傾其驍勇而來拒廣平王遣副元帥郭子儀等與賊戰于陜州西曲沃大破之斬首十餘萬嚴莊奔至京告慶緒慶緒率其餘衆奔河北保節郡嚴莊至河内南來歸順賊將阿史那承慶等麾下三萬餘衆悉奔恒趙范陽従慶緒者唯疲卒一千騎三百而已乾元元年九月肅宗遣郭子儀等九節度率步騎二十萬以攻之子儀使善射者三千人伏於壘垣内明日接戰子儀麾其屬偽奔慶緒逐之伏者齊發賊軍大潰使薛嵩求救於史思明言禪讓之禮思明先遣李歸仁以步騎二萬馬軍三千先徃滏陽以應之及至滏陽子儀之圍已固築城穿壕各三重引水以灌城下思明南攻魏州節度使崔光逺南走思明據之乾元二年正月思明稱周王慶緒自十月被圍至二月城中人相食思明引衆來救三月子儀等戰敗遂解圍而南斷河陽橋以守榖水思明領其衆營於節縣南慶緒使收子儀等營中粮千六石萬石張通儒髙尚平列謂慶緒曰史王逺來臣等皆合迎謝對曰任公暫徃見思明思明與之涕泗厚其禮復令歸城經三日慶緒以三百騎詣思明引入令三軍環甲執兵待之及至庭再拜稽首曰臣不克負荷棄失兩都久陷重圍不意大王以太上皇之故將兵逺救思明曰棄失兩都用兵不利亦何事也爾為人子殺汝父以求位庸非大逆乎吾為太上皇討賊即牽出并其四弟及髙尚孫孝哲崔乾祐皆縊殺之祿山父子僣逆三年而滅太平御覽卷一百十一
