  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_672-1a, image: WYG0899/WYG0899-0050a.png}
body:
  text: 太平御覽卷六百七十二宋李昉等撰道部十四仙經上仙經曰九轉丹金液經守一訣皆在崑崙五城之内藏以玉函封以金札封以紫泥印以中章抱朴子曰余聞鄭君言道書之重者莫過於三皇内文五岳真形圖也古之仙官至人尊秘此道非有仙名者不授也受之四十年一傳傳之㰱血而盟委信為約諸名山五岳皆有此書但藏於石室幽隠之地應得道者入山誠精思之則山神自開山令人見之如帛仲理者於山中得之是也有此書者常置清潔之處每有所為必先白之如奉君父其經曰有三皇文者辟群邪惡鬼瘟疫横殃飛禍又次有玊女隱微一卷可化形為飛禽走獸金玉水石興致雲雨之類亦大術也其淮南鴻寳萬畢皆無及此書者也鄭君博極五經知道者也兼綜九宫三竒推歩天文河雒與洛同䜟記太安元年知季世之亂江南將鼎沸負笈將仙藥東入霍山莫知所在又曰家有五岳眞形圗辟惡人不能害又曰黄老𤣥聖深識獨見開秘文於名山受仙經於神人蹶挨塵以遣累陵太遐以髙躋金石龜鶴與之等壽念有志於將來愍信者之無聞垂以方法炳然著明淺見之徒區區所守甘於蓼而酣於醨知飲食過度而速病而不能節知極情恣慾而致損而不能割神仙可得安能信乎按仙經以為諸得仙者皆其受命偶值神仙之氣自然所禀故胎育之中已含道性及其有誠心好事仙其必遇明師而得其法不然也則不信不求求亦不得夫百年之壽三萬餘日㓜弱則未有所知衰邁則歡樂並廢童䝉昏耄除數十年而險厄憂病相尋代有居世之年畧銷其半計定得百年者善笑平和則不過五六十年咄丁骨反嗟㓕盡哀憂昏老六七千日耳顧盻已盡矣况未百年者萬未有一乎諦而念之亦無以笑夏蟲朝菌也盖不知道者所至悲矣太上太霄琅書曰道本無形應感生象大象無象象妙難明故見真文結空成字又曰太上眞人靈寳秘文内符者九天真王三天真皇以授帝嚳藏於鍾山北阿夏禹治水畢詣鍾山鍾山真人以授之禹還㑹稽更撰定為二通一通藏苖山山􅀈須萬年刼㑹又出一通付雲水洞室須甲申期至令與理水傳伯長等又曰呉王闔閭十二年正月使龍威丈人入包山洞庭取之以出有符而無說又齊人樂子長受之於霍林山人韓衆乃敷演服御之方藏於東海北隂之室太一金液經者按劒經序云髙丘子服金液水長史書云欲合金液意皆是此方今有葛洪注是郄愔黄素書又有别訣一卷此亦太清上丹法也登真隠訣曰楊君許長史其書洞房經於小碧牋紙又云篆書白麻紙又曰八素之經是聖經以白素之繒八色之彩筆自書者也靈書經曰昔龍漢之年髙太上經以紫華書空青之林撰出妙經靈寳真文出法度人也金根經曰太陽金童太隂玉女傳紫書上法又曰西華玉女在仙都守衛藏天隠月之龍經尺素隠訣云天帝君命羽仙侍即執金案以請經眞誥曰上清九眞中經内訣是太極眞人赤松子撰又曰華陽中玉碣文云養存三元洞我玉文領理八老二十四眞不眠内視此仙之要言也又曰寳神經裴清虛裴真君也錦囊中書也侍者常所𢃄者裴昔從紫㣲夫人受此書也又曰𤣥圃北壇西瑶之上臺也天貞秘文盡在其内又曰九華眞妃與紫㣲王夫人南岳魏夫人同降眞妃坐良久乃命符女發檢囊中出二卷書付楊君一上清玊霞紫映内觀隠書一上清還晨歸童日暉中書𤣥此是三元八㑹之書楊君既究識眞字令作𨽻字顯之耳道有八素眞經太上之隠書也又有九眞中經老君之秘言也黄書赤要長生之訣也青要紫書金根衆文玊清眞訣三九素言丹景道精隠地八術白簡清籙紫度炎老此皆道之經也又有飛歩七元天剛之經七變神法七轉之經又有大洞眞經三十九篇太丹隠書八禀十訣天開三圖七星移度九丹變化胎精中記九赤班符封山隊海金液神丹太極隱芝五行秘符曲素辭訣黄水月華佪水玊精水陽青英絳樹青實琅玕華丹天皇象符以元氣白羽紫盖以遊五岳三皇内文以召天地神靈玊佩金璫以登天極素奏丹符以召六甲金眞玉光以映天下八景之輿逰行太清飛行之羽以超虛空劉向列仙傳叙曰列仙傳漢光禄大夫劉向所撰也初武帝好方士淮南王安亦招賔客有枕中鴻寳之書先是安謀叛伏誅向父德為武帝治淮南獄得其書向㓜而讀之以為竒及宣帝即位修武帝故事向與王褒等以通􅀶有俊才進侍左右向又見淮南鑄金之術上言黄金可成上使向與典尚方鑄金費多不驗下吏當死兄湯成侯安民乞入國户半贖向罪上亦竒其材得减死論詔為黄門侍郎講五經於石渠至成帝時向既司典籍見上頗修神仙事遂修上古以來及三代秦漢􅀶採諸家言神仙事穆天子傳曰升崑崙之墟以觀黄帝之宫具齋戒以祀登舂山即𤣥圃也崑崙之地方二千里有層城九重是謂閬風𤣥圃山海經云明明崑崙𤣥圃其上穆天子勒銘於𤣥圃以詔後世天子於王母觴於瑶池之上王母為謡白雲在天於是天子升于崦嵫口入處山也乃紀迹於崦山茅盈傳曰王母謂茅盈曰玊佩金璫之道太極𤣥眞之經能之者皆飛行大墟王母命西域王揔貞一則解釋𤣥眞之經又自敷演金璫之經口授於盈曰金璫者上清之華蓋隂景之内貞玊珮者太上之隠𤣥洞飛之寳章得其道者上陟雲漢宴􅃦太極元始太常之言是太宵二景隠書玉佩金璫之文章也又有隂陽二景内眞符與本文相隨太上法惟令授諸司命于玉札𤣥挺緑字刋金黄映内曜案素書上清與當為上卿之君司命之任矣然不先聞明堂𤣥眞之道亦未由得太宵隱書也𤣥眞之道是食日月之法錬五神之術耳其經曰太上𤣥𤣥雙神四明𤣥真内映明堂外清吞息二暉長生神精上補司命監御萬靈六華充溢徹視黄寧凡四十字太上刻於鳯臺南軒也非揔真弟子而不教非司命之徒而不傳也太上眞官用日霞之道挹二景之法使通靈致貞體生玊映役命萬神上昇帝房昔鍾山真公用此𤣥真法耳王君乃將盈歸西域依承眞訣按而行之三年之中面生玉澤後王君又賜盈九轉還丹及方一首立壇結盟約不得傳泄乃遣命歸告曰復百年求我於南岳將授汝仙官於呉越盈後得仙居句曲山邦人因改句曲之名為茅君之山時茅有二弟聞盈方信有仙矣棄官而去渡江求兄相見告二弟真訣十八年道成因使更齋戒三年授以上道使存明堂𤣥眞之氣盈乃啟王君有說二弟得為仙之法要當受籙佩𢃄眞極之符王君錫𤣥水玉液絳日丹芝可使二弟齋戒三月而服之盈命飈車與二弟詣青州諸書名金簡又詣西城洞宫朝見揔眞上宰次南詣衡山之朱臺謁太虛赤眞人歸方諸請地仙二眞之䇿造赤城受眞變神符又之羅霍求華旌繡幡又上登九宫詣金闕之下受聖君之書頓首於闕下三月於是聖君九㣲太眞上相王大司命高晨師青童君使上詣太上請朱冠使者下拜二弟於金闕下受二弟眞簡而還又曰神仙經黄白方二十五卷千有餘首然率多深㣲難知可觧分明者少許耳世人多疑此事為虛誕不信神仙者正同耳余昔從鄭君受九丹及金液經因復求授黄白中經五卷鄭君言曾與左慈於廬江銅山中試作皆成也然齋㓗禁忌之勤苦與合九丹神仙藥無異也俗人多譏余好攻異端謂余欲強通天下之不通若方諸所得水火豈與常水火别哉皆自然之所感致非窮理盡性不能䆒其指歸非原始要終不能得其情狀成都内史呉太史􅀶逹多知亦自說昔事道士李根見根術有所成不得其術令百日齋戒太史又連在官終不能得􅁪歎息言人間不足處也太眞科曰清虛小有天王撰三天正法經金液經曰太初混元皇經以陳上眞絳晨封之三篋至道之大合符天圖三丹要言大皇所紀之秘玉堂勿傳其㫖太眞𤣥丹經刻于清虛之堂太皇君之寳章也命曰紫蘂明珠之丹開元廻化混爾而分隂陽屢變其道自然𤣥圃七轉至九而還大黄首篇是曰玉虛上眞保之命曰元經也上清洞眞玉經曰太上八景章皆刻于東華仙臺不宣於世其受帝君九隂訣盟用素絲絳幣此日暉之誓也其受太上結隣章盟用碧幣此月華之誓也太一帝君洞眞𤣥經曰有玉女在太上六合紫房之内侍衛太丹隠書馬明生内傳曰靈寳天書封於九天之上大有之宫西華玉女金晨紫童典衛之玉光八景經曰金華之玉晨晨童侍衛玉光八景之經太上黄素經曰凡讀太丹隠曰金華洞房及雌一寳章者是能食味𤣥眞觸類無滯感召太素陟降九眞得稱三元丹法師緫領上眞九眞中經曰西𤣥仙洞壺中有鬱儀結隣二經玉簡金字玉檢曰青筆書三元玊檢上元檢後大洞經曰西靈玉童在北寒堂侍衛八景玉籙經後聖君列紀曰龜毋按筆玉童結編名之曰靈書紫文上經三皇經内音曰凡書此内音之符以黄筆為文成篆𨽻科斗之字紀造化人倫之始酆都六洞下制北帝文曰人之死生玉帝刻石隠銘以書六洞北壁制檢群㓙又云刻石隠文以朱書青繒三尺佩之萬神朝已此𤣥古之道也又云酆都山洞中玉帝隠銘凡九十一言刻石書酆都山洞天六宫北壁六洞萬神之靈也又云玉清隠書洞景金𤣥之章刻石隠銘此音發於自然之篇九天玊章其詞幽奥非始學凡夫所可竟通非太帝下降不得演究此銘也又金根經云凡修金𤣥當佩隠銘玉帝七聖𤣥記曰列名上清者皆刻注於𤣥圃得為太平之眞也故太上誥命記乎玉文非簡札翰墨所能宣也玊清隠書曰𤣥羽玉郎以𤣥羽玉經授太素三元髙上玉賢之賔又曰景玊童在靈景之闕瓊霞之房侍衛上皇玉惠玊清之隠書太平御覽卷六百七十二
