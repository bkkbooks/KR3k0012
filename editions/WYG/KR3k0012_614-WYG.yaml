  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_614-1a, image: WYG0898/WYG0898-0546a.png}
body:
  text: 太平御覽卷六百十四宋李昉等撰學部八幼學晚學好學廢學幼學禮記學記曰幼者聽而不問學不躐等也論語為政曰子曰吾十有五而志於學漢書曰東方朔十三學書三冬文史足用十五學擊劍十六學詩書誦二十二萬言十九學孫吳兵法戰陳之具鉦鼓之教亦誦二十二萬言時莫之比司馬彪續漢書曰荀恱十二能讀春秋貧無書每至市間閱篇牘一見多能誦記後漢書曰張堪早孤讓先父餘財數百萬與兄子年十六受業長安志美行厲諸儒號曰聖童魏志曰鍾㑹母性矜嚴勤見規誨四歲授孝經七歲誦論語八歲誦詩十歲誦尚書十一誦易十二誦春秋左氏國語十三誦周禮十四誦成侯易記十五入大學問四方竒文異訓謂㑹曰學猥則倦倦則意怠吾故以漸訓汝今可以獨學矣西晉趙至字景真年十四隨人入太學遇嵇康於學寫石經古文徘徊不去請問姓名康異之後為諸生南史曰王儉幼篤學手不釋卷賓客或相稱美僧䖍曰我不患此兒無名正恐名太盛耳乃手書崔子玉座右銘以貽之丹陽尹袁粲聞其名及見之曰宰相之門栝栢豫章雖小已有棟梁氣矣南史曰虞荔字山披會稽餘姚人也幼聰敏有志操年九嵗隨從伯闡侯陸倕問五經十事荔對無遺失倕甚異之太守衡陽王辟為主簿荔又辭以年小不就後魏書曰祖瑩字元珍范陽人年八嵗能誦詩書十二為中書博學生好學躭身以晝繼夜父母恐其成疾禁之不能止常宻於灰中藏火驅逐僮僕父母寢睡後燃火讀書以衣被蔽窓户恐漏光明為人所覺内外親屬呼為聖小兒又曰任城王澄子順字子和年九嵗師事樂安陳豐初書王羲之小學篇數千言晝書夜誦旬有五日一皆通徹豐竒之白澄曰豐十五從師迄於白首耳目所經未見此比江夏黄童不得無雙也澄笑曰藍田生玉何容不爾十六通杜氏春秋恒集門生討論同異三國典略曰齊王紘字師羅太安狄那人北豫州刺史基之子也年十三揚州刺史郭元貞撫其背曰汝讀何書對曰誦孝經元貞曰孝經云何曰在上不驕為下不亂元貞曰吾作刺史豈其驕乎紘曰雖不驕君子防未萌亦願留意梁書曰西陽王大鈞性厚重不妄戯㺯年七嵗武帝問讀何書對曰學詩因令諷誦即誦周南音韻清雅帝重之因賜王羲之書一卷三國典略曰梁孝元字世誠初年五嵗梁武問曰讀何書對曰能曲禮梁武曰汝試言之孝元即誦上篇左右莫不驚及長精神爽雋殷典通語曰殷禮字徳嗣幼而鄉里異之七嵗就官學書在師未嘗戯㺯諷誦恒不為聲潛識而已師殺雞詣禮父穎曰賀此子能興君門行在舟車手不釋卷從曲阿往返遂不知隄瀆廣狹及行旅喧閙未嘗視之時人語曰竒才強記殷徳嗣後與張温使蜀至荆州虎牙遭水衆人失色徳嗣見之無異諸葛亮見之嘆曰東吳菰蘆中乃有此竒偉晚學國語曰晉文公問元帥於趙衰元帥上卿對曰郤縠可行年五十矣縠晉大夫守學彌惇夫先王之法徳義之府也志記徳義生能之本也能惇篤者不忘百姓也請從郤縠從之說苑曰晉平公問師曠曰吾年七十欲學恐晚如何對曰少年而學如日出之光二十而學如日中之光老學如炳燭之明孰與夜行乎公曰善哉後漢書曰獻帝詔曰孔子歎學之不講講者習也不講則所識日忘今耆儒年踰六十去離本土營求粮資不得專業幼童入學白首空歸長委農野永絶冀望朕甚憫焉其依科罷者聽為太子舍人劉文獻帝紀曰時長安中謡曰頭白皓然食不充粮裹衣褰裳當返故鄉聖主愍念悉用補郎舍是布衣被服𤣥黄齊書曰張充字延符少好逸遊父緒嘗告歸至呉始入西郭逢充獵右臂鷹左牽狗遇緒船至便放紲脫韝拜於水次父緒曰一身兩役無乃勞乎充曰充聞三十而立今充二十九矣請至来年緒曰過而能改顔氏子有焉及明年便修改多所該通唐書曰姚元崇從𤣥宗獵於渭濵上曰卿頗知獵乎元崇曰臣少居廣城澤不知書唯以射獵事年四十方遇張憬藏謂臣當以文學備位宰相無為自棄邇来折節讀書今雖官位過忝至於馳射老而猶能於是薦於犬遲速稱㫖上大恱曰久不見卿思有顧問卿可於宰相行中行常後後縱轡久顧之卿行何後公曰臣官疎賤不合參宰相行上曰可兵部尚書平章事桓子新論曰髙君孟頗知律令嘗自伏冩書郎署哀其老欲代之不肯云我躬自寫乃當十遍讀魏應璩答韓文憲書曰昔公孫𢎞皓首入學顔涿聚十五始涉師門朝聞道夕殞聖人所貴足下之年甫在不惑加以學藝何晚之有若能上迨南榮忘食之樂下踵寜子黑夜之勤窮文盡義無微不綜規冨貴之榮取金紫之爵是夏侯勝拾芥之謂也好學論語曰十室之邑必有忠信如丘者焉不如丘之好學也又曰有顔囘者好學不遷怒不貳過不幸短命死矣今也則亡未聞好學者也又曰孔文子何以謂之文也子曰敏而好學不恥下問是以謂之文也又曰我非生而知之者好古敏以求之者也又曰子夏曰日知其所亡月無忘其所能可謂好學也已禮記檀弓上曰孔子與門人立拉而尚右二三子亦皆尚右孔子曰二三子之嗜學我則有姊之䘮也二三子皆尚左新序曰葉公詣梁問樂王鮒曰晉大夫趙文子為人若何對曰好學而受規諫好學智也受規諫仁也江出岷山其源若甕口至楚國其廣十里無他故其下流多也好學受規諫宜哉其立也漢書曰陳平少時家貧好讀書治黄帝老子之術兄伯常耕田縱平遊學東觀漢記曰馮豹字仲文好儒學以詩傳教授鄉里為之語曰道徳斌斌馮仲文又曰和熹鄧后七嵗讀論語志在書傳母常曰不習女工乃更務學寧當舉博士耶后重違母意晝則縫紉夜則炳燭讀經傳宗族内外皆號曰諸生范􅁮後漢書曰荀爽幼好學太尉杜喬見而稱之曰可為人師爽遂躭思經書慶弔不行徴命不應張璠漢記曰朱穆字公叔好學專精每一思至終日失食行墜坑坎亡失冠履其父常言穆大專㡬不知馬之㡬足後漢書曰張霸就樊儵受嚴氏公羊春秋遂博覽五經諸生孫林劉固段著等慕之各市宅其傍以就學焉魏志曰吉茂字叔暢好書不恥惡衣惡食而恥一物之不知建安初與扶風蘇則共入武功南山精思數嵗北齊書曰劉逖字子長少而聰敏在遊宴之中卷不離手值有文籍所未見者則終日諷誦或通夜不歸其好學如此也又魏書曰李康字蕭逺篤志好學善屬文詞藻清美常燃柴草火以讀之梁書曰梁劉峻字孝標平原人也永明中從桑乾還自謂所見不博更求異書聞京師有者必往祈借清河崔慰祖謂之書淫北史曰隋劉臻為儀同性怳忽躭經史經日覃思至於世事多所遺忘有劉訥者亦任儀同俱為太子學士情好甚宻臻住南訥住東臻嘗欲尋訥謂從者曰汝知劉儀同家乎從者不知尋訥謂還家因答曰知於是引之而去既叩門臻尚未悟謂至訥家乃據鞍大呼曰劉儀同可出矣其子迎門臻驚曰汝亦来邪其子答曰是大人家於是顧盼久之乃悟叱從者汝大無意吾欲造劉訥耳杜預自序曰少而好學在官則觀於吏治在家則滋味典籍𤣥晏春秋曰余家素貧窘晝則務作勞夜則甘疲寐及三時之務書卷生塵箧不解緘唯季冬裁得一旬學或兼夜寐或戯獨否或對食忘餐或不覺日夕是以遊出之事吉凶略絶冨陽男數以全生之道誨予方之好色號余為書帙廢學毛詩緇衣曰子衿刺學校廢也世亂則學校不脩焉青青子衿悠悠我心縱我不往子寜不嗣音尚書曰不學牆面蒞事惟煩論語曰徳之不修學之不講是吾憂也左傳曰學者植也不學將落也史記曰周道既廢焚燒詩書故明堂石室金匱玉版圖籍散亂也又曰始皇時諸生到者拜為郎七百人宻種瓜於驪山温處實成令諸生就視說之人人不同乃為伏機方難未定機發從上填之以土其坑在咸陽西南三望里今為閔儒卿也又曰秦始皇令天下有藏詩書百家語者悉詣守尉雜燒之敢偶詩書者棄市以古非今者族之漢書曰夫子沒而微言絶七十子終而大義乖前漢書曰絳侯不好文學毎召諸生東向坐而責之不以賓主之禮相接東觀漢記曰班超字仲升家貧為官傭書常輟業歎曰大丈夫當效傅介子張騫立功異域以取封侯安能久事筆硯乎三國典略曰齊許惇無學術與邢劭魏收等同列諸人談說經史惇隠几而睡深為勝流所輕南史曰栁津字元舉性強直乏風華或勸之聚書津曰吾嘗令道士上章驅鬼安用此鬼名邪隋書曰宇文慶深沉有器局少以聰敏見知周初受業東觀頗涉經史既而謂人曰書足記姓名而已安能久事筆硯為腐儒之業於時文州民夷相聚為亂慶應募從征賊保聚巖谷徑路懸絶慶束馬而進襲破之以功授都督唐書曰馬燧少嘗與諸兄讀書乃輟卷歎曰天下將有事矣丈夫當立功於世以濟四海安能矻矻為一儒哉西京雜記曰傅介子年十四好學常棄瓢而歎曰丈夫當立功絶域何能坐於散儒卒斬匈奴使者還報拜中郎將後復斬樓王首封儀陽侯金樓子曰曹子文善射御手格猛獸不避險阻數從征伐志意忼慨魏武常抑之曰汝不念讀書而好乘馬擊劍此一夫之用何足貴也課彰讀書彰謂左右丈夫一為衛霍將萬騎馳沙漠驅戎狄立功建號耳何能作博士邪太平御覽卷六百十四
