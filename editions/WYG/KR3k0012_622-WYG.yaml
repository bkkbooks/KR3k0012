body:
  text: 太平御覽卷六百二十二宋李昉等撰治道部三政治釋名曰政者正也下所以取正也周禮天官太宰之職曰正月之吉始和布治于邦國都鄙乃縣讀懸治象之灋與法同于象魏使萬民觀法象挾日而斂之太宰以正月朔日布王治之事于天下至正歲又書而懸于象魏振木鐸以徇之使萬民觀焉小宰亦帥其屬而往皆所以重治法新王事也凡治有改言始和者改造云耳挾日凡十日乃施典于邦國而建其牧立其監設其參傳其伍陳其殷置其輔乃者更申勅之也以侯伯有功徳者加命作長謂之牧所謂八命作牧者也監謂公侯伯子男各監一國也鄭司徒云殷治律輔為民之平也乃施則于都鄙而建其長立其兩設其伍陳其殷置其輔長謂公卿大夫兩謂兩卿也乃施法于官府而建其正立其貳設其攷陳其殷置其輔凡治以典待邦國之治以則待都鄙之治以灋待官府之治以官成待萬民之治以禮待賓客之治凡邦之小治則冢宰聴之待四方賓客之小治大事決於王小事冢宰傳平之嵗終則令百官府各正其治受其㑹正正處也㑹大計也聽其政事而詔王廢置平其事來至者之功状而奏白王三嵗則大計羣吏之治而誅賞之事乆則聴之大無功不徒廢必罪之有大功不徒置又賞之鄭司徒云三載考績是也又曰天官小宰之職曰正嵗帥治之官屬而觀治象之法徇以木鐸曰不用法者國有常刑正嵗謂夏之正月得四時之正以出政令者審也古者将有新令必奮木鐸以警衆使明聴之木鐸木舌也文事奮木鐸武事奮金鐸禮曰故政者君之所以藏身也藏謂輝光于外而形體不見若日月星辰之中是故夫政必本於天殽以降命降下也殽天之氣以下教令天有運移之期隂陽之節也命降于社之謂殽地謂教令由社下者也社土地之主也周里土㑹之法有五土之物生也降于祖廟之謂仁義謂教令由廟下者也大傳曰自親率而上至于祖逺者貴仁也自義率而下至于禰髙者重義也降于山川之謂興作謂教令由山川下者也山川草木禽獸可作器物其國有事降于五祀之謂制度謂教令由五祀下者也五祀有中霤門户竈行之神此始為宫室制度此聖人所以藏身之固也政之行如此何用城郭溝池之為故聖人參於天地並於鬼神以治政也又曰禮樂刑政其極一也極至也所以同民心而出治道也是故治世之音安以樂其政和亂世之音怨以怒其政乖聲音之道與政通矣是故審聲以知音審音以知樂審樂以知政而治道備矣又曰哀公問曰敢問何謂政孔子對曰政者正也君為正則百姓從政矣君之所為百姓之所從也君所不為百姓何從公曰敢問為政何如孔子對曰夫婦别父子親君臣嚴三者正則庶物從之矣又曰哀公問政子曰文武之政布在方䇿其人存則其政舉其人亡則其政息人道敏政地道敏樹夫政也者蒲盧也蒲盧蜾蠃謂土蜂也詩曰螟蛉有子蜾蠃負之螟蛉桑蟲也蒲盧取桑蟲之子去而變化之以成為己子政之于百姓若蒲盧之于桑蟲故為政在人又曰子曰夫人教之以徳齊之以禮則民有格心教之以政齊之以刑則民有遯心格來也遯逃也又曰子曰政之不行也教之不成也爵禄不足勸也刑罰不足恥也故上不可以䙝刑而輕爵又曰聖人南面而聽天下所且先者五民不與焉一曰治親二曰報功三曰舉賢四曰使能五曰存愛五者一得于天下民無不足無不贍者五者一物紕繆民莫得其死物猶事也紕錯也五事得則民足一事失則民不得其死大戴禮曰曽子曰敢問不費不勞可以為明乎孔子愀然揚眉曰參汝以明主為勞乎古者舜左禹而右臯陶不下席而天下治左氏傳曰宣子于事乎始為國政宣子趙盾制事典正法罪辟刑獄辟猶理也董逋逃由質要治舊洿本秩禮續常職出滯淹既成以授太傅楊子與太師賈佗使行諸晉國以為常法又曰晉悼公即位于朝始命百官始為政施舍己責施恩惠舍勞役止逋責振廢滯起舊徳匡乏困救灾患匡亦救也禁淫慝薄賦斂宥囚戾宥寛也節器用節省也時用民使民以時欲無犯時不縱私欲又曰季札聘于鄭謂子産曰鄭之執政者侈難将至矣政必及子子為政慎之以禮不然鄭國将敗又曰鄭子皮授子産政子産使都鄙有章國都及邊鄙車服尊卑各有分部上下有服公卿大夫服不相踰田有封洫廬井有伍大人之忠儉者謂卿大夫從而與之泰侈者因而斃之從政一年輿人誦之曰取我衣冠而楮之楮蓄也奢侈者畏法故當藏取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之殖生也子産而死誰其嗣之嗣續也又曰鄭人游于鄉校以論執政論其得失也然明謂子産曰毁鄉校如何子産曰何為夫人朝夕退而游焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之又曰子皮欲使尹何為邑子産曰少未知可否子皮曰愿吾愛之不吾叛也使夫徃而學焉夫亦愈知治矣子産曰不可人之愛人求利之也今吾子愛人則以政以政與之猶未能操刀而使割也其傷實多子之愛人傷之而已其誰敢求愛於子子於鄭國棟也棟折榱崩僑将厭焉敢不盡言子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不亦多乎僑聞學而後入政未聞以政學者也若果行此必有所害譬如田獵射御貫則能獲禽貫習也若未甞登車射御則敗績厭覆是懼何暇思獲子皮曰善㢤又曰鄭子産有疾謂子太叔曰我死子必為政惟有徳者能以寛服民其次莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而玩之則多死焉故寛難疾數月而卒太叔為政不忍猛而寛鄭國多盜取人于萑苻之澤於澤中刼人也太叔悔之曰吾早從夫子不及此興徒兵以攻萑苻之盜盡殺之盜少止仲尼曰善哉政寛則民慢慢則糾之以猛猛則民殘殘則施之以寛寛以濟猛猛以濟寛政是以和詩曰民亦勞止汔可小康惠此中國以綏四方施之以寛也書曰后克艱厥后臣克艱厥臣政乃乂黎民敏徳敏疾也能知為君難為臣不易則其政治而衆民皆疾脩徳禹曰於帝念哉徳惟善政政在養民歎而言念重其言為政以徳則民懐之水火金木土穀惟脩言念民之本在先脩六府正徳利用厚生惟和正徳以率下利用以阜財厚生以養民三者和所謂善政九功惟叙九叙惟歌言六府三事之功者有次叙皆可歌樂乃徳政之所致戒之用休董之用威勸之以九歌俾勿壞言善政之道美以戒之威以督之歌以勸之使政勿壊在此三者而已又太甲下曰徳惟治否徳亂與治同道罔不興與亂同事罔不亡言安危在所念治亂在所法終始慎厥與唯明明后明慎其所與治亂之機則為明王明君又盤庚上曰古我先王亦惟圖任舊人共政先王謀任乆老成人共治其政王播告之脩不匿厥指王布告人以所脩之政不匿其指王用丕欽罔有逸言民用丕變王用大敬其政教無有逸豫之言民用大變從化又洪範曰乂用三徳治民必用剛柔正直之三徳一曰正直二曰剛克剛能立事三曰柔克和柔能治三者之徳平康正直平世安用正直治之彊弗友剛克友順也世彊禦不順以剛能治之燮友柔克燮和也沈潛剛克沈潛謂地雖柔有剛能出金石髙明柔克髙明謂天言天為剛徳亦有柔克不干四時喻臣當執柔以正君君亦當執柔以納臣又曰周公若曰拜手稽首告嗣天子王矣用咸戒于王曰王左右常伯常任準人綴衣虎賁周公用王所立政之事皆戒于王曰常所長事常所委任謂三公六卿準人平法謂士官綴衣掌衣服虎賁以武力事王皆左右近臣宜得其人周公曰嗚呼休兹知恤鮮哉嘆此五者立政之本知憂得其人者少古之人迪唯有夏乃有室大競籲俊尊上帝古之人道唯有夏禹之時乃有大夫室家大强猶乃招呼賢俊與共尊事上帝迪知忱恂于九徳之行禹之臣蹈知誠信于九徳之行謂賢智大臣九徳臯陶所謀也乃敢吿教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃準兹惟后矣知九徳之臣乃敢告教其君以立政君矣亦猶王矣宅居也居汝事六卿掌事者牧牧民九州之伯居外内之官及平法者皆得其人則此唯君矣嗚呼孺子王矣嘆孺子今已為王矣不可不勤法祖考之徳繼自今我其立政立事準人牧夫我其克灼知厥若丕乃俾亂繼用今以徃我其立政大臣立事小臣及準人牧夫我其能灼然知其順者則大乃使治之言知臣下之勤勞然後莫不盡其力也相我受民和我庶獄庶慎時則勿有間之能治我所受天民和平我衆獄衆慎之事如是則勿以代之言不可復變自一話一言我則末惟成徳之彦以乂我受民言政當用一善善在一言而已欲其口無擇言如此則我終惟有成徳之美以治我所受之民嗚呼予旦已受人之徽言咸告孺子王矣歎所受賢聖說禹湯之美言皆以告稚子王矣繼自今文子文孫其勿誤于庶獄庶慎唯正是乂之文子文孫文王之子孫從今以徃唯以正是之道治衆獄衆慎勿誤也又曰成王既黜殷命滅淮夷還歸在豐作周官王曰若昔大猶制治于未亂保邦于未危言當順古大道制治安國于未亂未危之前思患預防之曰唐虞稽古建官惟百内有百揆四岳外有州牧侯伯道堯舜考古以建百官内置百揆四岳象天之有五行外置州牧十二及五國之長上下相維内外咸治言有法庶政惟和萬國咸寜官職有序故庶政惟和萬國皆安所以為治也夏商官倍亦克用乂禹湯建官二百亦能用治言不及唐虞之清要也明王立政不惟其官惟其人言聖帝明王立政脩教不惟多其官惟在得其人王曰嗚呼凡我有官君子欽乃攸司慎乃出令令出惟行弗惟反有官君子大夫已上歎而戒之使敬汝所司慎汝出令従正之本令出必惟行之不惟反政若二三其令亂之道以公滅私民其允懐學古入官議事以制政乃不迷其爾典常作之師無以利口亂厥官蓄疑敗謀怠忽荒政不學牆靣莅事惟煩積疑不决必敗其謀大道怠忽必亂其政人而不學其猶正牆面而立臨政事必煩又君陳曰惟爾令徳孝恭惟孝友于兄弟克施有政言善父母者必友于兄弟能施其政令命汝尹兹東郊敬哉圖厥政莫或不艱有廢有興出入自爾師虞庶言同則繹謀其政無有不先慮其難有所廢有所起出納之事當用汝衆言度之衆言同則陳而布之禁其専也有弗若于汝政弗化于汝訓辟以止辟乃辟有不順于汝政不變于汝教刑之而懲止犯刑者乃刑之狃于奸宄敗常亂俗三細不宥習于奸宄凶惡毁敗五常之道以亂政教故罪雖小三犯不赦所以絶惡源耳論語曰子禽問於子貢曰夫子至於是邦也必聞其政求之與抑與之與子貢曰夫子溫良恭儉譲以得之夫子之求之也其諸異乎人之求之與又曰為政以徳譬如北辰居其所而衆星拱之又曰子貢問政子曰足食足兵民信之矣又曰齊景公問政於孔子孔子對曰君君臣臣父父子子公曰善哉信如君不君臣不臣父不父子不子雖有粟吾得而食諸又曰子張問政子曰居之無倦行之以忠又曰季康子問政於孔子孔子對曰政者正也子帥以正孰敢不正又曰季康子問政於孔子曰如殺無道以就有道何如孔子對曰子為政焉用殺子欲善而民善矣君子之徳風小人之徳草草上之風必偃又曰子路問政子曰先之勞之請益曰無倦又曰子曰魯衛之政兄弟也又曰衛君待子而為政子將奚先子曰必也正名乎子路曰有是哉子之迂也奚其正子曰野哉由也君子於其所不知蓋闕如也名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足故君子名之必可言也言之必可行也君子於其言無所苟而已矣又曰葉公問政子曰近者悅逺者來又曰子夏為莒父宰問政子曰無欲速無見小利欲速則不達見小利則大事不成又曰無為而治者其舜也與夫何為哉恭己正南面而已矣又曰子張問於孔子曰何如斯可以從政矣子曰尊五美屏四惡斯可以從政矣太平御覽卷六百二十二
