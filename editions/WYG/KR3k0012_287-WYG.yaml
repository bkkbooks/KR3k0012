body:
  text: 太平御覽卷二百八十七宋李昉等撰兵部十八機畧六機畧六宋書曰武帝遣將朱齡石伐譙縱於蜀帝曰徃年劉敬宣黄武無功而退賊謂我今應從外水徃而料我當出其不意猶從内水來也如此必重兵守涪音浮城以備内道若回黄武正堕其計今以大衆自外水取成都疑兵出内水此制敵之竒也而慮此聲先馳賊審虛實别有函書全封付齡石署函邊曰至白帝乃開諸軍雖進未知處分所由至白帝發書曰衆軍悉從外水取成都臧熹出於中外漢廣使嬴弱乗髙艦十餘由内水向黄武衆軍乃倍道兼行譙縱果備内水使其大將譙道福以重兵戍涪城遣其將侯耀譙詵等率衆萬餘屯彭模夾水為城齡石至彭模諸將以賊水北城險衆多咸欲先攻其南城齡石曰不然雖冦在北今屠南城不足以破北若盡鋭以㧞北壘南城不麾而自㪚也遂攻北城詰朝戰至日昃焚其樓櫓四面並登斬侯耀譙詵仍回軍以麾南城即時㪚潰又曰劉道濟為益州刺史政刑失中羣盗蜂起攻圍州城道濟將裴方明出東門破賊三營斬首數百級賊雖敗已復還合方明復偽出北門廻擊城東大營殺千餘人時天大霧方明等復揚聲出東門而潜自北門出攻城西諸營賊衆大潰於是奔㪚孔融别𫝊曰孔文舉年四嵗時每與諸兄共食梨引小者人問其故答曰我小兒法當取小自此宗族竒之又曰融十嵗隨父詣京師聞漢中李公清節直諒慕之欲徃觀其為人遂造公門謂門者曰我是公通家子孫也門者白之公曰髙明父祖常與孤遊乎跪而應曰先君孔子與明公先李老君同徳比義而相師友則融與公累世通家坐中數十人莫不歎息咸曰異童子也太中大夫陳煒後至曰人小了了或未能佳少府尋聲答曰君子之幼時豈當惠乎李公撫抃大笑顧少府曰髙明長大必為偉器范曄後漢書云詣李膺也何晏别傳曰晏時小養魏宫七八歲便慧心天悟衆無愚智莫不貴異之魏武帝讀兵書有所未解試以問晏晏分散所疑無不氷釋邴原别傳曰原字根矩十一喪父家貧早孤隣舍有書原過其傍而哭師問曰童子何罪原曰一則願其不孤二則羡其得學師亦哀原之言而為之勸童子苟有志我徒相教不求費也於是遂就書一歲之間誦孝經論語管輅别傳曰輅年八九歲便喜仰視星辰得人輙問其名夜不肯寐自言家雞野鵠猶尚知時况于人乎與比隣兒共戲土壤中輙書地作天及日月星辰每答言說事語皆不常宿學耆人不能折之南史曰齊蕭鸞遣其將魯康祚趙公政衆號一萬侵後魏豫州之太倉口魏將傅永率三千人擊之時康祚等軍於淮南永舍於淮北十有餘里永量吳楚之兵好夜斫營即夜分兵為二部出於營外又以賊若夜來必應於度淮之所以火記其淺處永記設伏乃密令人以瓠盛火度淮南岸當深處置之教云若有火起即亦然之其夜康祚公政等果親領兵來斫永營東西二伏夾擊之康祚等奔趨淮水火既竟起不能記其本濟遂覩永所置之火而争度焉水深溺而死斬首者數千級生擒公政康祚人馬墜淮曉而獲其尸又曰東昏侯以劉山陽為巴西郡太守配精兵三千使過荆州就行事蕭頴胄以襲襄陽梁武帝時為雍州刺史知其謀乃遣參軍王天獸龎慶國詣江陵遍與州府人書及山陽西上梁武謂諸將曰荆州本畏襄陽又加以唇亡齒寒自有傷弦之急寧不闇同耶我若總荆州之兵埽定東夏韓白重出不能為計况以無地之昏主哉我能使山陽至荆州便即授首諸君試觀何如及山陽至巴兵梁武復令天獸賫書與頴胄兄弟去後梁武謂張𢎞䇿曰夫用兵之道攻心為上攻城次之心戰為上兵戰次之今日是也先遣天獸往州府人皆有書令乘驛甚急止有兩封與行事兄弟云天獸口具及問天獸而口無所說行事不暗相聞不容矯有所道天獸是行事心􅀢彼聞必謂行事與天獸共隱其事必人人疑山陽惑於衆口必相嫌貳則行事進退無以自明必恐漏吾謀内是馳兩空亟定一州矣山陽至江安聞之果疑不上頴胄大懼乃斬天獸送首山陽信之將數十人馳入頴胄伏甲斬之送首梁武以州歸又曰梁武帝發雍州東下雍州令襄陽郡大軍次江寧梁武使吕僧珎與王茂率精兵先登梁武頓於越城吕僧珎猶守白坂齊主東昏將李居士密覘知城中衆少率銳卒萬人直來攻城僧珎謂將士曰令力既不敵不可與戰可勿遥射須至塹裡當并力破之俄而皆越塹㧞柵僧珎分人上城大石俱發自率馬步三百人出其後守隅者復踰城而下内外齊擊居士等應時奔散三國典畧曰侯景叛段韶夾渦而軍潜於上風縱火景衆騎入水出而却走草濕火不復然梁書曰司州刺史陳慶之率圍東魏南荆州東魏將堯雄行臺侯景救之雄曰苟堆梁之北面重鎮因其空虛攻之必尅彼若聞難荆圍自解此所謂機不可失也遂率衆攻之慶之果棄荆州來未至雄陷其城擒梁鎮將苟元廣又曰陳慶之曹仲宗伐後魏之渦陽渦孤和切魏遣將元昭等率兵來援前軍至駞間去渦慶之欲逆戰諸將以賊之前鋒必是輕銳與戰若捷不足為功如其不利沮我軍勢兵法所謂以逸待勞不如勿擊慶之曰魏人遠來皆以疲倦去我既遠必不見疑及其未集湏挫其氣出其不意必無敗理且聞虜所據營林甚盛必不夜出諸君若皆疑惑慶之請獨取之於是與麾下二百騎奔擊破軍其前軍魏人震恐又曰梁襄州刺史柳仲禮留其長史馬岫守安陸自率歩騎一萬㓂西魏上將楊忠帥衆南伐攻梁随尅之進圍安陸仲禮聞随郡陷恐安陸不可守遂馳歸赴援諸將恐仲禮至則安陸難下請急攻之忠曰攻守勢殊未可卒㧞若引日勞師表裏受敵非計也南人多習水軍不閑野戰仲禮廻師已有近路吾出其不意以竒兵襲之彼怠我奮一舉必尅則安陸不攻自㧞諸城可傳檄而定也於是選騎二千銜枚夜進遇仲禮於漴頭漴音崇水所衝曰漴忠親自陷陣擒仲禮悉俘其衆安陸及竟陵郡如忠所策陳書曰周炅鎮安蘄等州髙齊遣將陸騫以衆二萬出自巴蘄與炅戰炅留羸弱輜重設疑兵以當之自率精銳由間道邀其後大敗騫軍虜獲器械馬驢不可勝數北史曰後魏濟陰王新成頗有武畧厙莫奚侵擾詔新成討之新成乃多為毒酒賊逼便棄營而去賊至竟飲遂簡輕騎擊之俘馘甚多又曰梁將趙祖悅率水軍偷據峽石後魏將崔延伯率兵討之延伯夾淮為營遂取車輪去輞削銳其輻接對揉竹為絙揉人久切貫連相屬並十餘道模水為橋兩頭施大轆轤出没任情不可燒斫既斷祖悅走路又令舟舸不通梁氏援軍不能赴救祖悅合軍咸見俘虜後魏書曰太武征夏赫連昌於統萬城師次城下收衆偽退昌鼔譟而前㑹有風雨從東南來沙塵昏㝠途宦者趙倪進曰今風從賊後來我彼向背天助人將士飢渴願陛下避之更待後日崔浩曰是何言歟千日制勝一日之中豈得變易賊前行不止後以左右騎分軍隱出掩擊不意風道在人豈有常也帝從之公騎直入賊軍大潰又曰雍州刺史蕭寳寅據州反尚書僕射長孫稚討之軍次𢎞農副將楊偘曰昔魏武與韓遂馬超挾關為壘勝負之理久而無决豈才雄相類筭畧抗衡當以河山險阻難用智力今賊守潼關全據形勝縱曹操更出亦無所逞竒必湏北取蒲坂飛棹西岸置兵死地人有鬬心潼關之賊必覩風而散諸處既平長安自尅稚曰賊黨薛備義已圍河東薛風賢又保安邑都督宗正珎孫停師坂久不能進雖有此計猶用為疑偘曰珎孫本行陳一夫因縁進達可為人使未可使人一旦受元帥之任處分三軍精神亂矣寧堪賊河東理在蒲坂西𢃄河湄所部之人多在東境脩義驅率壯勇西圍郡邑父老妻弱尚寳舊村若卒一臨方寸各亂人人思歸則郡圍自解不戰而勝昭然在目稚從之令其子彦等領騎與偘於𢎞農北度所統悉是騎士習於野戰未可攻城便據石錐壁偘乃班告曰今且停車於此以待步卒兼觀人情向背然後行若送降名者各自還村候臺軍舉烽火亦應之以明降欵其無應烽者即是不降之村須殄戮賞賚軍士民遂傳相告取未實降者亦許舉烽一宿之間火遍數百里内寳寅將時圍河東不測所以各自散歸長安賊平偘頗有力又曰河北賊葛榮别帥韓樓郝長等有衆數萬屯據薊城遣將侯泉率騎七百討之泉遂廣張聲勢多設供具親以數騎深入樓境欲執行人以問虛實去薊百餘里值賊帥陳州馬步萬餘泉遂潜伏以乘其背大破之虜其卒五千餘人尋還其馬伏縱令入城左右諫曰既獲賊衆何為復資遣之也泉曰我兵既少不可力戰事須為計以離隙之泉度其已至遂率騎夜進昧旦叩其城門韓樓果疑降卒為泉内應遂遁走追擒之又曰河北賊葛榮率衆將向洛陽衆號百萬大將軍爾朱榮之卒精騎七千馬皆有副倍道兼行東出滏口葛榮自鄴以北列陣數十里箕張而進榮潜軍山谷為竒兵分督將以上三人為一處處有數百騎令所在揚塵鼓譟使賊不測多少又以人馬逼戰刀不如棒不聴斬級以棒棒之慮廢騰逐也乃分命壯勇所當衝突號令嚴明將士同奮榮身自陷陣出於賊後表裡合擊大破之於陳葛榮遂擒又曰傅永守楚王戍蕭齊將裴叔業來攻永令填塞外塹夜伏戰士千人於城外曉而叔業至頓於城東列陣將置長圍永所伏兵於道左擊其後軍破之叔業乃令將佐守所列之陣自率精甲數千救之永上門樓觀叔業南行五六里許便開門奮擊遂摧破之叔業進退失國於是奔走左右欲追之永曰弱卒不滿三十彼精甲尤盛非力屈而敗直堕吾計中耳既不測吾之虛實足喪其膽俘此足矣何暇逐之又曰太武帝親征後燕將慕容德于鄴戰前軍敗績徳又欲攻之别駕韓􅒲進曰今魏不可擊者四燕不宜動者三魏懸軍遠入利在野戰一不可擊也深入近畿致兵死地二不可擊也前鋒既敗後陣方固三不可擊也彼衆我寡四不可擊也官軍自戰其地一不可動動而不勝衆心不固二不宜動隍池未脩敵來無備三不宜動此皆兵機也深溝髙壘以逸待勞彼千里饋糧野無所掠久則三軍靡資攻則衆旅多斃師老釁生詳而圖之可以捷也徳曰韓别駕之言良平之䇿也又曰大將廣陽王元深伐北國使于謹單騎入敵中示以恩信於是西部鐵勒隊長也列河等萬餘户並欵附相率南遷廣陽欲與謹至折敦嶺迎接之謹曰破六汙㧞陸兵衆不少聞也列河等歸附必來要擊彼若先據險要則難與争鋒今以列河等餌當竟來抄掠然後設伏而待必指掌破之廣陽然其計㧞陵果來邀擊破也列河於嶺上部衆皆没謹伏兵發賊遂大敗悉收列河之衆也太平御覽卷二百八十七
