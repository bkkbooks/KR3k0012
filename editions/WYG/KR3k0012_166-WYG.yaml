body:
  text: 太平御覽卷一百六十六宋李昉等撰州郡部十二劍南道劍州緜州梓州遂州益州漢州彭州蜀州卭州普州雅州瀘州茂州翼州當州悉州静州拓州恭州維州奉州巂州姚州黎州龍州松州嘉州簡州陵州眉州榮州資州戎州劍州圖經曰晉安郡禹貢梁州之域秦蜀郡漢廣漢郡之梓潼縣華陽國志曰諸葛亮鑿石架空為飛閣道通蜀漢即此三國志曰鄧艾伐蜀自隂平縣景谷歩劍閣道懸車束馬逕出江由至廣漢即此地也蜀記曰梓潼縣有五婦山一名五婦臺秦遺蜀美女五人蜀遣五丁迎女至梓潼五丁蹋地大呼驚五女並化為石郡國志曰梓潼縣北有華容水蜀都賦却背華容是也緜州十道志曰緜州巴西郡禹貢梁州之域周併梁入雍春秋戰國入蜀國秦為蜀郡漢廣漢郡令州即廣漢郡之涪縣也九州記曰緜州之賨人濮人皆夷也郡國志曰賨人勁勇銳氣而善舞故古有巴渝舞蜀記曰左緜緋紅三川所尚緜州左郡縣有小紅所染緋紅於此水灌後益鮮宋書曰范栢年梓潼人明帝問卿鄉土有貪泉否栢年曰臣梁益之地有亷水讓水不聞有貪泉帝嘉之即以為蜀郡太守廉讓水在昌期縣郡縣志曰神泉縣有泉拾四甘香異常固疾飲之即瘥故曰神泉漢書志曰涪屬廣漢郡有孱亭莽曰統睦應劭曰涪水出廣漢南入漢梓州十道志曰梓州梓潼郡禹貢梁州之域漢武分置廣漢郡漢書曰文帝以蜀道銅山賜鄧通鑄錢即今銅山縣也蜀志曰先主入蜀攻劉璋遣諸葛亮等分州定縣略地至郪百姓以牛酒勞軍又姜維聞諸葛瞻破乃引軍由廣漢郪道以審虛實十道志曰廣漢之地有鹽井銅山之富本禹貢南夷周末秦併為郡有蔬食果實之饒九州要記曰𤣥武山一名赤雀山一名宜君山山有麈尾入貢又華陽國志曰𤣥武山一名三嵎山出龍骨傳云龍昇不達墜此民取以入藥用𤣥武縣因山得名遂州十道志曰遂州遂寧郡禹貢梁州之域漢分梁州置廣漢郡今州又為廣漢縣九州要記曰青石縣有青石山天下青石無佳於此可為鐘磬又郡國志曰昔巴蜀爭界厯嵗不決漢髙八年山自裂如索所界巴蜀之民懼天譴乃息所爭益州十道志曰益州成都府古梁州巴濮庸蜀之地在秦為漢中巴蜀三郡地釋名曰益阨也所在之地險阨應劭地里風俗記曰疆壤益廣故號益州史記曰周太王逾梁山之岐山一年成邑二年成都故有成都之名又曰秦惠王時韓蜀相攻各告急於秦秦欲先伐韓司馬錯曰不如伐蜀蜀戎狄之長也有桀紂之亂以秦攻之譬使豺狼逐羣羊也又有禁暴止亂之名今攻韓周自知失九鼎韓自知亡三川二國併力合謀而求解于楚魏臣竊危之王曰善遂定蜀漢書曰宣帝時方士上言益州部有金馬碧鷄神帝令王褒入蜀祀之揚雄蜀王本紀曰蜀之先稱王者有蠶叢折灌魚易俾明是時椎髻左衽不曉文字未有禮樂從開明已上至蠶叢凡四千嵗次曰伯雍又次曰魚尾尾田於湔山得仙後有王曰杜宇出墮天山又有朱提氏女名曰利自江原而出為宇妻乃自立為蜀王號曰望帝移居郫邑十三州志曰當七國稱王獨杜宇稱帝於蜀以褒斜為前門熊耳靈闗為後戸玉疊峨眉為池澤汶山為畜牧中南為園苑時有荆地有一死者名鼈靈其尸亡至汶山却是更生見望帝以為蜀相時巫山蜀地雍江洪水望帝使鼈靈鑿巫山治水有功望帝自以德薄乃委國於鼈靈號曰開明遂自亡去化為子規故蜀人聞鳴曰我望帝也又云望帝使鼈靈治水而淫其妻靈還帝慙遂化為子規杜宇死時適二月而子規鳴故蜀人聞之皆曰我望帝也自開明已下五葉始立宗廟時蜀有五丁力士能徙山岳每一王死五丁輒為立大石以誌墓今石井是也號曰井里成都記曰郡城即秦惠王使張儀築以象咸陽者沃野千里號曰陸海九州志曰益州城初累築不立忽有大龜周行旋走因其行築之遂得堅固故曰龜城南史曰宋太始初益州市橋忽生一洲有道士栁石見之曰當有貴王臨州必王勝喜也及齊永明二年武帝遣始興王為益州勝喜者即始興反語續漢書郡國志曰益州部漢中巴廣漢蜀犍為越巂牂牱益永昌凡九郡華陽國志曰成都夷里橋南岸道西有城即錦城一曰錦宫又曰錦里又曰蜀初少文教文翁為蜀郡太守立精舍學堂以厲其俗因是文敎聿興今有文翁堂在城内漢州圖經曰漢州德陽縣土地同益州秦屬蜀郡漢屬廣漢郡後漢因之兼置益州領郡十二蜀記曰益州謂之三蜀廣漢其一也後漢書雒城南每隂雨常有哭聲和帝時陳寵為太守聞之即勅縣收葬骸骨哭聲遂絶蜀記曰金堂縣古有金船沉江之東岸民於水中往往見之彭州十道志曰彭州濛陽郡本漢繁縣宋置壽陽圖經曰唐垂拱二年以九隴縣置彭州取古天彭闗以為名周地圖記曰宋元嘉九年有樵人逐麛所趨險絶進入石穴行數十步豁然平博問是何所人答云小成都後更往求之不知所在地理志曰九隴縣晉置以縣有九曲山為名蜀州十道志曰蜀州唐安郡本漢蜀郡江原縣莽曰卭原魏志曰蜀州鳴鶴山張道陵客蜀學道於此山造作符書以惑百姓益州記張道陵登仙之所傳云陵為蝮蛇所吸人以為登仙蜀記曰青城縣因山得名山上有黄帝授道壇又𤣥中記云山有穴潛行分為三道各通一處卭州十道志曰邛州臨邛郡禹貢梁州之域漢武置十三州在益州之部周地圖記曰梁武陵王蕭紀於蒲水口改置邛州南郡有卭來山因以為名史記曰蜀卓氏之先趙人秦破趙卓氏獨夫妻推輦而行曰吾聞汶山之下沃野有蹲䲭乃求逺遷致之臨邛因銅山鑄錢即此也蜀記曰漢張騫奉使尋河源得髙節竹植於邛山號曰邛竹今縁山皆是可為杖蜀志曰臨邛有火井諸葛亮一窺更盛博物志曰後人以家火投之火即滅至今不然普州十道志曰普州安岳郡禹貢梁州之域漢武十三州在益州之部今州境則漢之資中牛鞞墊江後漢之德陽等四縣雅州十道志曰雅州盧山郡禹貢梁州之域漢武十三州在益州之部即秦嚴道縣蜀記曰秦滅楚徙嚴王之族於此故謂之嚴道漢志曰嚴道屬蜀郡邛來山邛水所出東入青衣莽曰嚴治郡國志曰漢源縣有離崖即蜀守李冰所鑿按離即古雅也又曰嚴道縣有九折坂即王陽廻轡之所瀘州十道志曰瀘州瀘川郡禹貢梁州之域春秋戰國時為巴子國秦屬巴郡漢屬犍為郡漢志曰江陽屬犍為郡十道志曰瀘州本漢江陽縣地諸葛亮出師表曰五月渡瀘深入不毛茂州十道志曰茂州通化郡禹貢梁州之域本冉駹國漢以為郡史記曰南越破後冉駹等皆震懼請臣置吏以冉駹為汶山郡守翼州圖經曰翼州臨翼郡秦之土地與益州同二漢屬蜀郡本漢之蠶陵也漢志曰蠶陵屬蜀郡王莽曰步昌當州十道志曰當州江源郡禹貢梁州之域周為雍州之境後周書曰天和元年鴈門公紇干略於此討渾胡因置同昌郡悉州十道志曰悉州歸誠郡禹貢梁州之域古西戎地圖經曰唐顯慶三年割當州三十里左封縣界内有悉唐川因名為悉州靜州圖經曰靜州靜川郡土地與唐當州同唐永徽四年置靜州興唐縣以𨽻夷落拓州圖經曰拓州蓬山郡土地與當州同唐顯慶三年置州取其拓封疆為郡之名恭州圖經曰恭州恭化郡北接土蕃地與當州同唐顯慶中置恭州取恭慕王化為名維州十道志曰維州維川郡蜀志曰姜維馬維督將軍張巖北討汶山叛羌即此圖經曰武德中白茍羌首領以地内附因於羌故城置維州以領之奉州圖經曰奉州雲山郡本蠻夷之地南接土蕃為夷之塞武德中羌夷内附立奉州取其奉順王命為名巂州十道志曰巂州越巂郡本益州西外夷漢初為邛都國史記曰西南夷滇以北君長十數邛都最大漢志曰越巂郡武帝元鼎六年開莽曰集巂屬益州應劭曰故邛都國也有巂水言越此水以章休盛也九州要記曰巂之西夷人身青面有文如龍鱗博物志曰越巂國有牛稍割取肉經日必復生如故又𤣥中記曰割而復生名曰反牛十道記曰越巂有瀘水四時多瘴氣三四月間發人衝之立死非時中人多悶絶唯五月上伏即無害故諸葛亮征越巂上疏曰五月渡瀘深入不毛又地記曰今昆明道渡所見有武侯道在十道記曰水浚而巉石土人以牛皮為船方涉津渡九州要記曰臺登縣有雙諾川鸚鵡山黒水之間若水出其下即黄帝子昌意降居若水是此漢志曰旄牛屬蜀郡鮮水出徼外南入若水若水亦出徼外南至大莋旄牛即今臺登縣姚州十道志曰姚州雲南郡蓋夷越之地亦為滇王國漢武開之置益州部有滇池澤後因為益州雲南㺯棟二縣漢地理志曰益州郡武帝元封二年開莽曰新就故滇王國也有滇池大澤又有弄棟縣焉華陽國志曰漢滇句町夜郎葉榆桐師嶲唐侯王國以十數編髪左衽隨畜遷徙莫能相禦楚頃襄王遣將軍莊蹻泝沅水出苴蘭以伐夜郎而秦奪楚黔中地無路反遂留王之黎州圖經曰黎州洪源郡漢為沈黎郡宋齊以來並為沈黎郡後周破羌夷立黎州龍州十道志曰龍州江油郡秦漢及魏不置郡縣魏志曰景元四年諸軍征魏鄧艾自隂平行無人之地七百餘里鑿山通道造作橋閣山髙谷深至為艱險艾以氊自裹推轉而下將士皆攀木縁崖魚貫而進先登至江由即此地也周地圖經曰江油郡楊李二姓各自稱藩於梁至後魏武帝得其地置江油郡西魏於此立龍州松州十道志曰松州交川郡禹貢梁州之域又為雍州之域秦漢諸羌居焉圖經曰郡有甘松嶺因以名郡山海經曰甘松嶺亦謂之松桑嶺江水發源於此江源記曰平康縣有羊腸嶺大江發源之所嘉州十道志曰嘉州犍為郡禹貢梁州之域漢犍為郡之南安縣史記曰漢武使唐蒙伐西戎得夜郎國遂立犍為郡漢志曰青衣縣屬犍為郡順帝改名漢嘉十道志曰周武保定元年於此置青州遥取漢青衣縣為名宣政二年改為嘉州華陽國志曰青衣有沬水漢志蜀李冰鑿離塠避沬水之害又益州記曰青衣神號為雷塠廟班固以為離塠益州記曰峨眉山兩山相對望之如峨眉簡州十道志曰簡州陽安郡禹貢梁州之域漢犍為之牛鞞縣地華陽國志曰牛鞞縣有陽明井今在郡北十里九州要記曰簡州在赤水之北周地圖記曰晉義熙末刺史朱齡石率建平人征蜀仍於東山立金城後魏平蜀改為金水郡陵州十道志曰陵州仁壽郡禹貢梁州之域漢犍為郡之武陽縣東隅也郡國志曰張道陵於此得鹽井祠玉女於井内因謂之陵井郡因井得名益州記曰郡東隅有三山相對去陵丹百里郡國志曰有鼎鼻山周之九鼎淪没於此故後人往往見鼎耳因名之又曰郡有朝女山昔有朝祖女於此山得道今足跡尚存故名朝女山眉州十道志曰眉州通義郡禹貢梁州之域犍為郡之武陽南境周地圖記曰梁武帝太清二年武陵王蕭紀開通越嶲立青州於通郡南安縣北後魏二年平蜀三年改青州為眉州用峨眉山為名蜀記曰秦惠王使張儀司馬錯伐蜀蜀主開明拒之不利退至武陽見獲彭山縣即其地郡國志曰青神縣當羌蜀之要漢武使唐蒙破西南夷路即始於此榮州十道志曰榮州和義郡禹貢梁州之域漢為南安縣地屬犍為郡九州要記曰和義郡古夜郎之地有成都市漢武中時南令使通僰道無功唐蒙因殺之令曰恨不見立成都市而死蒙即立市如成都以殺之故曰成都市益州記曰旭川縣有馬鳴戍漢刺史韋枚夜過此地有神馬嘶漢中馬皆嘶以應之故以此名戍蜀記曰昔有女人於溪浣沙有大竹流水而觸之因有孕後生一子自立為王因以竹為姓漢武使唐蒙伐䍧牱郡竹王因有此地人不忘其本立王廟祀之資州十道志曰資州資陽郡禹貢梁州之域漢為犍為郡之資中縣地周地圖記曰後魏廢帝二年於武康郡之陽安縣置資州陽安在今安州北蘭州界郡國志曰内江縣有水深百丈實在羣州總㑹之所戎州十道志曰戎州南溪郡春秋僰侯國秦惠王破滇池始通五尺道漢武得蜀故使唐蒙理道於此而破䍧牱即此道也後為僰道縣以屬犍為郡郡國志曰南溪縣西三十里有魚津津南有鴛鴦圻益部耆舊傳曰僰道有張真娶黄氏女名帛真因乗船過江船覆沒帛求夫屍不得自沈於水積十四日乃抱夫屍出於灘下故名鴛鴦圻太平御覽卷一百六十六
