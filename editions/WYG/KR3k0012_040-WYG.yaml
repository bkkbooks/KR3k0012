body:
  text: 太平御覽卷四十宋李昉等撰地部五王屋山太行山霍太山首陽山龍門山岐山梁山太白山峨眉山岷山嶓􅜗山鳥鼠山積石山王屋山列子曰太行王屋二山方七里髙萬仞北山愚公者年且九十面山而居懲山北之塞出入之迂也聚室而謀曰吾與汝畢力平險可乎雜然相許雜猶僉也其妻曰以君之力曽不能損魁父之丘如太行王屋何且焉置土石雜曰投諸渤海之尾隠士之北遂率子孫荷擔者三夫叩石墾壤運于渤海之尾隣人京城之孀妻有遺男始齔往助之寒暑易節始一反焉河曲智叟笑而止之曰甚矣汝之不慧以殘年餘力曽不能毁山之一毛其如土石何北山愚公長息曰汝之心曽不若孀妻弱子雖我之死有子存焉子又生孫孫又生子子子孫孫無窮匱也而山不加増何苦而不力乎河曲智叟無以應操蛇之神聞知懼其不已告之於帝帝感其誠命夸娥氏二子負二山一厝朔東一厝雍南神仙傳曰甘始太原人善行氣不食服天門冬治病不用針艾在人間三百嵗乃入王屋山茅君内傳曰王屋山之洞週迴萬里名曰小有清虛之天太素真人王君内傳曰王屋山有小天號曰小有天周迴一萬里三十六洞天之第一焉太行山史記曰酈生説漢髙祖曰願足下急復進兵收取滎陽據敖倉之粟塞成臯之險杜太行之道距飛狐之口守白馬之津以示諸侯效實形制之勢則天下知所歸矣神仙傳曰王烈邯鄲人服黄菁松花老而更少嵇叔夜甚愛之每共入山逰戲烈後獨入太行山忽聞山東北如雷聲往視山上破數百丈石中有一孔徑尺中有青泥出烈取摶之隨手堅凝氣味如粳米飯也烈自食數丸因掘歸以與叔夜即皆成青石打之作銅聲按神山五百嵗一開其中有石髓得而服之夀與天地相畢述征記曰登滑臺城西南望太行山白鹿巖王莽嶺冠于衆山之表墨子曰墨子怒耕桂子曰我無喻于子墨子曰將上太行駕驥與羊子將誰驅曰將驅驥足責也墨子曰我亦以子為足責尸子曰龍門魚之難也太行牛之難也以徳報怨人之難也水經注曰仲尼傷道不行欲北從趙鞅聞殺鳴犢遂旋車而返其後晋人思之于太行嶺南為之立廟蓋往時迴轅處也余按諸子書及史籍之文並言仲尼臨河而歎曰丘之不濟命也夫如是非大行迴轅之言也博物志曰按太行山而北去亦不知山所限極處亦如東海不知所窮霍太山史記曰智伯攻趙襄子襄子懼乃奔保晋陽原過後至于王澤見三人自帶以上可見自帶以下不可見與原過竹二節莫通曰為我以是遺趙無恤原過既至以告襄子襄子齋三日親自剖竹有朱書曰趙無恤余霍太山徐廣曰在河東永安縣山陽侯天使也三月丙戌余將使汝反滅智伯亦立我百邑余將賜汝林胡之地滅智伯使原過主霍太山祠祀又飛亷先為紂作石槨徐廣曰作石槨于此始還無所報乃為壇于霍太山而報得石棺銘曰帝令處父不與殷亂賜汝石棺水經注曰霍太山上有飛亷塜山下有岳陽廟甚靈鳥雀不棲其林猛虎常守其庭此則禹貢岳陽也唐書曰義旗初建髙祖自太原起兵西赴關中途經霍邑時隋將宋老生陳兵拒險義師不得進乃屯于賈胡堡㑹霖雨積旬餽運不給髙祖患之忽白衣老人詣軍門請見余霍山神也遺語大唐皇帝若向霍山東南傍山取路八日雨止我當助爾破之髙祖初哂之遣人東南視果有㣲道髙祖笑曰此神不欺趙襄子豈當負吾邪及八日雨暴霽髙祖太悦以太牢祭其山首陽山詩曰采苓采苓首陽之巔采苦采苦首陽之下采葑采葑首陽之東史記曰伯夷叔齊孤竹君二子讓國而逃聞西伯善飬老徃歸焉及西伯卒武王載木主東伐紂伯夷叔齊扣馬而諫左右欲兵之太公曰義士也舍之伯夷叔齊恥之義不食周粟隠于首陽山采薇而食之乃至餓死鏁語曰晋平公與齊景公乗至于澮見人乗白驂八駟以來平公之前公問師曠曰有犬狸身而狐尾者乎師曠有頃而答曰有之首陽神其名曰來者首陽之神飲酒霍太山而歸其居于澮乎見之甚善君有喜焉戴延之西征記曰洛東北去首陽山二十里山上有伯夷叔齊祠或云餓死此山今山東蒲坂南又謂首陽山有叔齊祠未詳餓死所在山海經曰和山上無草木而多瑶碧實惟河之九都是山也五曲九水出焉合流而北注于河其中多蒼玉吉神泰逄司之是神好居于萯山之陽出入有光吕氏春秋曰夏后氏孔甲田于東陽萯山遇大風雨皇甫謐帝王世紀以為即東首陽山也蓋是山之殊目矣龍門山尚書禹貢曰浮于積石至于龍門西河孔安國曰龍門在河東之西界周禮曰大司樂以隂竹之管龍門之琴瑟隂竹生北於宗廟奏之九變則人鬼可得而禮孝經援神契曰禹鑿龍門闢伊闕決江開岷導四凟鑿龍門以通河鑿岷山以開江導淮於桐柏導濟于王屋故言導四瀆漢書地理志云龍門山在馮翊夏陽縣北續漢書同辛氏三秦記曰河津一名龍門巨靈迹猶在去長安九百里江海大魚俱集門下數千不得上上則為龍故云曝鰓龍門尸子曰古者龍門未鑿吕梁未開河出于孟門上慎子曰河之下龍門其流駛如竹箭駟馬追走弗能及淮南子曰龍門未闢吕梁未鑿河出孟門之上大溢逆流無有丘陵髙阜名曰洪水大禹通之孟門始見水經注云風山四十里河水南出孟門與龍門相對即龍門之上口也實為河水巨阨兼孟門津之名也又有黄河自峯山西四十里南出孟門山北經禹鑿廣㟁崇深傾崖及捍巨石臨危若墜復倚焉岐山易曰王用享于岐山吉無咎詩曰古公亶父來朝走馬率西水滸至于岐下又曰居岐之陽在渭之將萬邦之方下民之王孟子曰大王居邠狄人侵之事之以皮幣不得免焉事之以犬馬不得免焉事之以珠玉不得免焉乃屬其耆老而告之曰狄人之所欲者吾土地也君子不以其所以養人者害人二三子何患乎無君我將去之去邠踰梁山邑于岐山之下居焉圖經曰岐山亦名天柱山禹貢曰導岍及岐河圖括地象曰岐山在崑崙山東南為地乳上多白金周之興也鸑鷟鳴于岐山時人亦謂岐山為鳯凰堆酈道元水經註天柱山上有鳯凰祠或云其峰髙峻逈出諸山狀若柱因為名焉梁山書曰既載壺口治梁及岐壺口在冀州梁在雍州循山治水在西詩曰奕奕梁山維禹甸之奕奕大貌甸治也禹治梁山除水灾也傳曰梁山崩晋侯傳召伯宗伯宗辟重曰辟傳重人曰待我不如捷之速也問其所曰綘人也問綘事焉曰梁山崩將召伯宗謀之問將若之何曰山有朽壤而崩可若何國主山川故山崩川竭君為之不舉降服乗縵徹樂出次祝幣史辭以禮焉其如此而已雖伯宗若之何穀梁書曰梁山崩雍河三日不流晋君召伯宗而問之伯宗來遇輦者不避使車右下而鞭之輦者曰所以鞭我者其取道逺矣伯宗下車而問焉曰子有聞乎對曰梁山崩雍河竭三日不流伯宗曰君為此召我也為之奈何曰天有山天崩之天有河天壅之雖召伯宗如之何爾雅曰梁山晋望也郭璞注曰晋國所望祭者也今在夏陽西北臨河上也漢志注曰梁山在夏陽西北即尚書禹貢治梁及岐詩韓奕篇曰奕奕梁山晉國所望大梁别小梁之號俱在韓城縣界大梁在今縣西又按三秦記梁山宫城又名織錦城太白山辛氏三秦記曰太白山在武功縣南去長安三百里不知髙㡬許俗云武功太白去天三百尺山下軍行不得鳴鼓角鳴鼔角則疾風暴雨兼至也周地圖記曰太白山甚髙上恒積雪無草木半山有横雲如瀑布則㴻雨人常以為候驗之如離畢焉故語曰南山瀑布非朝即暮魏畧曰吉荗蘇則值亂隠于扶風南太白山中以經籍自娛峨眉山列仙傳曰陸通楚狂接輿也好養性在蜀峨眉山世世見之數百年華陽國志曰犍為南安縣南有峨眉山去縣八十里地圗云有仙藥漢武求不能得益州記曰峨眉山南安縣界當縣南八十里両山首相望如峨眉岷山易乾鑿度曰岷山上為井絡書曰岷山導江東别為沱江東南流沱東行也書璇璣鈐曰禹導江水決岷山流九貢九貢九州之貢家語曰江始出岷山其源可以濫觴及至於江津不方舟不可以涉漢書曰成帝時岷山崩壅江水逆流山海經曰岷山江水出焉今在汶山郡廣陽縣西大江所出也其上多金玉其下多梅多棠其獸多犀象多䕫牛嶓冡山書曰嶓冡導漾東流為漢華陽國志曰西岷嶓地稱天府河圖括地象曰嶓冡山上為狼星上有異花草名骨容食之無子鳥鼠山河圗括地象曰鳥鼠同穴山地之幹也上為掩畢星渭水出其中漢武内傳曰封君達隴西人也初服黄連五十餘年入鳥鼠山于山中服水百餘年還鄉里年如三十常乘青牛號青牛道士也山海經曰鳥鼠同穴山今在隴西首陽縣西南山有鳥鼠同穴鳥名䳜鼠名􅀈􅀈如家鼠而短尾䳜如鵽而黄穿地入數尺鼠在内鳥在外而共處孔安國傳曰鳥鼠共為雌雄沙州記曰鳥鼠同穴山鳥如家雀色小白鼠小黄而無尾凡同穴地皆肥沃壤盡軟熟如人耕多生黄花紫草積石山書曰浮于積石至于龍門西河穆天子傳曰西濟于河用申八駿之乘以飲于枝時之中積石之南河山海經曰積石山其下有石門河水冒以西冒覆也積石今在金城河門闢西南𦍑中河行塞外東入塞内是山也萬物無不有莊子曰鳯之所居也積石千里河水出下鳯鳥居上太平御覽卷四十
