  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_737-1a, image: WYG0899/WYG0899-0493a.png}
body:
  text: 太平御覽卷七百三十七宋李昉等撰方術部十八禁後漢書曰章帝時有夀光侯者夀姓也風俗通云夀於姚吳大夫能劾百鬼衆魅令自縳見形其鄉人有婦為魅病侯為劾之得大蛇數丈死於門外又有神樹人止者輒死鳥過者必墜侯復劾之樹盛夏枯落見大蛇長七八丈懸死其間帝聞而徴之乃試問之曰吾殿下夜半後常有數人絳衣被髪持火相隨豈能劾之乎侯曰此小怪易消耳帝偽使三人為之侯劾三人登時仆地無氣帝大驚曰非魅也朕相試耳解之而蘓又曰徐登者閩中人也本女子化為丈夫善為巫術又趙炳字公阿東陽人能為越方時遭兵亂疾疫大起二人遇於烏傷溪水之上遂結言約共以其術療病各相謂曰今旣同志可各試所能登乃禁溪水水為不流炳復吹禁枯樹樹即生荑注云荑者楊之秀也二人相視而笑共行其道焉登年長炳師事之具尚清儉禮神惟以東流水為酌削桑皮為脯但行禁架所療皆除禁架即禁術也後登物故炳東入章安百姓未之知也炳乃故升茅屋梧鼎而㸑主人見之驚懅梧枝也懅忙也炳笑不應既而㸑熟屋無損異又嘗臨水求渡舩人不和之和猶許也俗本作知者誤也炳乃張蓋坐其中長笑呼風亂流而濟吴志曰賀齊討山賊中有善禁者每當交戰官軍刀劒皆不得拔弓弩射矢皆還自向輒致不利齊長情有思乃曰吾聞金有刃者可禁蟲有毒者可禁其無刃毒則不可禁彼必能禁吾兵也必不能禁無刃物矣乃多作勁木白棓選有力精卒五千人為先登盡捉棓彼山賊恃其善禁不嚴備於是官軍以白棓擊之彼禁不復行擊殺者萬計蕭子顯齊書曰陳顯逹南彭城人顯逹出杜姥宅大戰被賊矢中在眼拔箭而鏃不出地黄村潘嫗善禁先以釘釘柱中嫗禹歩作氣釘即時出乃禁顯逹目中鏃出之又曰顧歡弟子鮑靈綬門前有一株樹本十餘圍上有精魅數見影動印樹即枯死山隂白石村多邪病村人吿訢求哀歡住村人為講老子規地作獄有頃見􅈢貍黿龜自入獄中者甚多即命殺之病者皆愈又有病邪者問歡歡曰家書有否曰唯有孝經歡曰可取置病人枕邊恭敬之自差病者果愈人問其故荅曰善穰惡正勝邪此病者所以瘳北齊書曰崔子武季舒之族孫也㓜時宿於外祖揚州刺史趙郡李憲家一夜夢一女姿色甚麗自云封龍王女願與崔郎私通子武悦之牽其衣裙㣲有裂綻未曉吿辭結帶而别至明訪問乃是山神遂往祠中觀之傍畵女容狀即夢中見者裂裙尚存結帶猶在子武自是通夢恍惚成疾後逢醫禁之乃絶隋書曰張文詡常有腰􅍚㑹醫者自言善禁文詡令禁之遂為刃所傷至於頓伏􅇃枕醫者叩頭請罪文詡遽遣之唐書曰葉法善嘗於東都凌空觀設壇醮祭城中士女悉往觀之俄頃數十人自投於火中觀者大驚救之而免法善曰此皆魅病吾以法攝之耳問之果然法善悉為禁劾其病遂愈六韜曰武王伐殷丁侯不朝太公乃畫丁侯於䇿三箭射之丁侯病困卜者占云祟在周恐懼乃請舉國為臣太公使人甲乙日拔丁侯着頭箭丙丁拔着口箭戊己日拔着腹箭丁侯病稍愈四夷聞各以來貢異􅁐曰永嘉陽童孫權時俗師也嘗獨乘舩往建寧泊在渚次宵中忽有一鬼來欲擊童因起謂曰誰敢近陽童者鬼即稽顙云實不知是陽使者童便􅃯使乗舩舩飛迅駃有過猛㠶至縣乃遣之又曰趙侯少好諸術姿形悴陋長不滿數尺以盆盛水閉目作禁魚龍立見侯有白米為䑕所盗乃把刀畫地作獄四面開門向東嘯羣䑕俱到呪曰凢非噉者過去有止者十餘剖腹㸔藏有米在焉㑹徒跣須履因仰頭㣲吟雙屐自至有笑其形容者便徉説以酒打向口中即掩鼻不脱仍稽顙謝過着地不舉永康有騎石山山上有石人騎石馬侯仰指之馬一時落首今猶在山下神仙𫝊曰嚴青常從弟子家夜歸都督夜行逢青呵問何人夜行青亦厲聲問曰汝是何人而夜行都督怒不知是青因叱從兵使録夜行人青亦復叱其從神曰皆縳夜行人青便去而都督及從者數十人人馬皆不復得去明旦行人見都督問何謂在此都督白事状如此行人曰必是嚴公也都督曰我不能得動可報余家家人知之往叩頭啓謝青自説昨宵不知是先生乞得放遣青乃大聲曰解遣昨宵所録夜行人還去都督乃得去其後夜行每見人行先通問非嚴公乎又曰王方平降蔡經家北舎有陳姓者失其姓字嘗罷尉出聞經家有人乃詣門叩頭乞求拜見方平遣人引前與語此人便得隨從驅使比放蔡經方平曰君且起向日方平從後視之言曰噫君心緒不正終不可教以仙道也當授君以地上主者之職臨去以符併一𫝊着小箱中以與陳尉吿言此不令君慶世也能令君本夀自出百餘嵗也可禳災治病者命未終及無罪過者君以符到其家便愈矣若有邪鬼心中疑其祟者君便以符𢃄此𫝊以勅社吏當収送其鬼心中亦當知其輕重臨時以意治之陳尉以此符治病有効事之者數百家夀一百一十嵗而死後弟子行其符不効也抱朴子曰治金創以氣吹之即㫁痛登山蛇虺毒蠱䖝人在近者就以氣禁之其相逺或數十里便延治之士呼其姓名而呪之男也吹我右手記識其時後校問之即時愈也又有介象者能以氣禁一里中愈居人炊之不得蒸以氣禁樹上羣鳥即墮地又於茅上㸑煮雞熱而茅不燋又禁刀矛以刺人腹以樵打之刃曲而不復入又燒釡正赤而立上久之不知熱以錢投於沸釡湯中亦探取錢而手不灼能令一市人皆坐不得起幻説文曰幻相詐幻惑幻人從反予周書云無或譸張為幻後漢書曰永寧元年西南夷撣國王詣闕獻樂及幻人能變化吐火自支解易牛馬頭元㑹在庭作安帝與群臣共觀大竒之又曰安帝時作九賔樂有含和舎利之獸從西方來戱於庭入前殿激水化成魚嗽水作霧化成黄龍長八丈出水遨戯於庭炫熠日光又曰解奴辜張貂者亦不知是何郡國人也皆能隠淪出入不由門户奴辜能變易物形以誑幻人晉書曰郭璞将促装去愛主人婢無由而得乃取小豆三斗繞主人宅散之主人晨起見赤衣人數千圍其家就視則滅甚惡之郭璞曰君家不宜畜此婢可於東南二十里賣之慎勿争價則此妖可除也主人從之璞隂令人賤買此婢復為符投井中數千赤衣人皆反縳一一自投於井主人大悦璞携婢而去後魏書曰悦般國真君九年遣使朝貢并送幻人稱能割人喉脈令㫁擊人頭令骨䧟皆血出淋漓數升或盈斗以草藥令嚼咽之須􅁷血止世祖恐言是虛乃取死囚試之皆騐崔鴻北凉録曰𤣥始十四年七月西域貢吞刀吐火秘幻竒伎北齊書曰由吾道榮瑯琊人也初晉陽人某明法術為人傭力無識之者道榮聞之訪得其人其人以道榮好士将法授之謂道榮曰我本恒山仙人有罪為天官所謫今滿将歸卿且送吾至於汾水乃至汾河值水至其人乃臨水禹步以一符投水中流便絶徐自沙石上渡河而去道榮嘗至遼陽山中夜逢猛獸以杖畫地即成大坑猛獸遂走唐書曰顯慶元年上御福安門樓觀大酺畨人欲持刀自刺以為幻戯上不許之乃下詔曰如聞在外有婆羅門人等每於戱處乃将劒刺肚以刀割舌幻惑百姓極非道理宜並遣發還蕃勿令久住仍約束邊州若更有此色並不須遣入朝金樓子曰周穆王時西極有化人入火貫金石反山川移城邑乗虛不墜觸實不碎千變萬化不可窮極穆王為起中天之臺鄭衛奉承雲之樂日日獻玉衣月月薦玉食幻人猶不肯舎乃携王至幻人宫構以金銀絡以珠玉鼻口所納皆非常人間物也由是王心厭宫室幻人易之耳王悦遂肆志逺遊西京雜記曰余所知有鞠道龍善為幻術向余説古事有東海人黄公少時為幻能刺􅉬御虎佩赤金為刀以綘繒束髪立興雲霧坐成山河及衰老氣力嬴憊飲酒過度不能復行其術又曰淮南王好方士皆以術見遂後畫地為江河攝土為山岳􅐵呼為寒暑噴嗽為雨露王亦卒與諸方士俱去異􅁐曰高陽新城叟晉咸寧中為涇祠妖幻置署百官又以水自鑒輒見所署置之人衣冠麗然百姓信惑京都翕集收而斬之又曰上虞孫溪奴多諸幻伎元嘉初叛建安中復出民間治人頭風流血滂沲噓之便斷創又即歛虎傷􅉬噬煩毒乗死禁䕶皆差向空長笑則群鵲來萃夜呪蚊虻悉皆死倒至十三年於長山為本主所得知有術慮必亡叛的鏁枷極為重複明日已失所在搜神記曰永嘉中有夫空胡人來渡江南其人有數術能斷舌復續之吐火所在人士聚觀試其斷時先以舌示賔客然後刀截血流覆地乃以置器中傳以示人視之舌頭半舌猶在既而還取續之坐有頃坐人見舌則如故不知其實斷否其續斷取絹布與人各執一頭對剪一斷之已而兩叚合将視之則復還連絹無異故時人多疑以為幻隂乃試之其所絹也其吐火先有藥在器中取一片與黍餹合之再三吹呼而已張口火滿口中因就取以㸑則火也又取書紙及繩縷之屬投火中衆共視之見其燒燃消糜乃盡及舉而出之故向物也靈鬼志曰太元十二年有道人外國來解吞刀吐火珠玉金銀説其所受師曰白非沙門也行見一人擔擔上有小籠子可受升餘語擔人云吾歩行疲極欲寄君擔擔人甚怪之慮是狂人便語之云自可爾君欲何許自厝耶其人答云若見許正欲入籠子中籠不便擔人逾怪之乃下擔入籠中籠更不大其人亦不更小擔之亦覺重于先既行數里樹下住食擔人呼共食云我自有食不肯出止住籠中飲食器物羅列肴膳豐腆亦辦乃呼擔人食來未半語擔人我欲婦共食腹中吐出一女子年二十許衣裳容貎甚美二人共食食欲竟其夫便卧婦語擔人曰我有外夫欲來共食夫覺君勿道之婦便口中吐出一年少丈夫食籠中便有三人寛急之事亦復不異有頃其夫動如欲覺婦便以外夫内口中夫起語擔人曰可去即以婦内口中吹及食物此人既至國中有一家大富貴財巨萬而性慳悋語擔人云試為君破慳即至其家有好馬甚珍之繫在柱上忽失去尋索不得明日見馬在五升􅑥中終不可破便語曰君作百人厨以周一方窮乏馬出耳主人即作之畢馬還在柱下明早其父母在堂上忽然不見舉家惶怖不知所在開裝器忽然見父母在澤壼中不知何由復往請之其人云君當更作千人飲食以飴百姓窮者當時便作父母在床也幽明録曰安城人俗巫也善於幻術每至祠神時擊鼓宰三牲積薪燃火盛熾束𢃄入火中章紙燒盡而開形軆衣服猶如初時王疑之為江祠王當酒行為王刷頭簮荷葉為㡌與王亦當不覺有異到坐之後荷葉乃見坐驚駭桓譚新論曰方士董仲君犯事繫獄佯死目䧟虫爛故知幻術靡所不有又能鼻吹口歌聳眉動目荆州有鼻飲之蠻南城有頭飛之夷非為幻也孔偉七引曰弄幻之時因時而作殞𤓰種菜立起尋尺投芳送臭賣黄售白麾天興雲霧畫地成江海太平御覽卷七百三十七
