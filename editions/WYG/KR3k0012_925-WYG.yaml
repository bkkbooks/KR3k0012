body:
  text: 太平御覽卷九百二十五宋李昉等撰羽族部十二鴛鴦鸂鶒鵁鶄鷗鷺􅜇鴒鷁鸊鷉白􅖂鴇鶢鶋鵜鶘鸕鷀婟澤鸛雀􅒗鶬精衛水扎鳥鴛鴦歸藏曰有鳬鴛鴦有鴈鷫鷞詩曰鴛鴦刺幽王也思古明王交於萬物有道自奉養有節鴛鴦于飛畢之羅之君子萬年福祿宜之鴛鴦在梁戢其左翼君子萬年宜其遐福西京襍記曰趙飛燕為皇后其女弟昭儀在昭陽殿遺飛燕書曰今日嘉辰貴姊懋膺洪冊上襚三十五條以陳踴躍内有鴛鴦襦鴛鴦被魏志曰文帝問占夢周宣吾夢殿屋兩瓦堕化為雙鴛鴦此何為也宣對曰后宫當有暴死者上曰吾詐卿耳宣曰夫夢意也苟以形言便占吉凶言未卒黄門令奏宫人相殺干寶搜神記曰大夫韓憑其妻美宋康王奪之憑怨王囚之憑遂自殺妻乃隂腐其衣王與之登臺自投臺下左右攬衣衣不勝手遺書於帶曰願以屍還韓氏而合𦵏王怒令埋之二塜相對經宿忽有梓木生二􅊘之上根交枝下連其上有鳥如鴛鴦雌雄各一恒棲其樹朝暮悲鳴音聲感人古今注曰鴛鴦水鳥鳬類雌雄未嘗相離人得其一則一者相思死故謂之匹鳥楚詞曰鴛鴦兮噰噰古詩曰客從逺方來遺我一端綺文綵雙鴛鴦裁為合懽被又曰入門時左顧但見雙鴛鴦鴛鴦七十二羅列自成行鄭氏婚禮謁文賛曰鴛鴦雌雄相類飛止相疋鸂鶒臨海異物志曰鸂鶒水鳥毛有五彩色食短狐其在溪中無毒氣劇談錄曰河南府尹闕前臨大溪每僚佐有入臺者則水中先有小灘漲出石礫金波澄澈可愛牛僧儒為縣尉一旦忽報灘出翌日邑宰與同僚列筵於亭上觀之因召老宿備詢其事有老吏云此必分司御史非西臺之命若是西臺灘上當有鸂鶒一雙立前僧儒潜揣縣僚無出已者因舉杯曰既有灘何惜一雙鸂鶒宴未終俄有鸂鶒一雙飛下旬日拜西臺御史鵁鶄爾雅曰鳽鵁鶄郭璞注曰似鳬脚高毛冠江東人家畜之以厭火災鳽五堅反說文曰鳽鵁鶄也曰鵁一曰石鳥也一名雝渠一名精列西京襍記曰魯恭王好鬭鷄鴨養孔雀鵁鶄奉榖一年二千石異物志曰鵁鶄巢于高樹巔生子未能飛皆銜其母翼飛下地飲食夢書曰夢見鵁鶄居不雙也婦見之此獨居也壻見之恐失妻也雄雌俱行滛佚遊也唐書曰𤣥宗嘗遣中官往江南採捕鵁鶄及諸水禽汴州刺史倪若水上疏諌曰方今九榖時忙三農作苦田夫擁耒蠶婦持桑而以此時採捕竒禽異鳥供園池之翫逺自江嶺達於京師水備舟舫陸倦担負飯之以魚肉間之以稻梁道路觀者莫不以陛下賤人而貴鳥也陛下當以鳳凰為凡鳥麒麟為凡獸即鵁鶄鸂鶒曷足為也鷗倉頡解詁曰鷖鷗也生藕葉也名水鶚說文曰鷗水鶚也山海經曰黝股國其人食鷗南越志曰江鷗一名海鷗在漲海中隨潮上下常以三月風至乃還洲嶼生卵似雞卵色青頗知風雲若羣飛至岸必風漁人及渡海者皆以此為候列子曰海上之人有好鷗鳥者每旦至海上從鷗鳥游鷗鳥之至者百數而不止其父曰吾聞鷗鳥皆從汝游取來吾翫之明日之海上鷗鳥舞而不下也晉咸和起居注曰二年正月饗萬國有五鷗集太極殿前晉中興徴祥說曰鷗集太極殿鷗湖澤鳥也殿非所處時蘇峻作逆宫室被焚周書曰崔湜既私附太平公主時人咸為之懼門客陳振鷺獻海鷗賦以諷之湜雖稱善而心實不恱鷺詩曰坎其擊鼓宛丘之下無冬無夏值其鷺羽鷺鳥之羽可以翳舞者所持以指麾又曰振鷺二王之後來助祭也振鷺于飛于彼西雝我客戾止亦有斯容又曰振振鷺鷺于下鼔咽咽醉言舞於胥樂兮毛詩義疏曰鷺水鳥好而潔白故謂之白鳥齊魯之間謂之舂鋤遼東樂浪吳揚人皆云白鷺大小如鴟青脚高尺七八寸尾如鷹尾喙長三寸頭上有毛十數枚長尺餘毿毿然與衆毛異將欲取魚時則弭之今吳人亦養之好羣飛鳴楚成王時有朱鷺合㳫飛舞則復有赤者舊鼓吹曲有朱鷺是也爾雅曰鷺舂鋤郭璞注曰白鷺也頭翅背上皆有長翰毛江東取以為睫攡名之曰白鷺縗穆天子傳曰天子作詩三章以哀民曰有咬者鴼鴼鳥名音􅏖鵳鵳其飛幽明錄曰巴東有道士忘其姓名事道精進入屋燒香忽有風雨至家人見一白鷺從室中飛出雨住遂失道士所在古今樂錄曰吳王夫差時有雙鷺飛出鼓中而去南史曰張融年弱冠同都道士陸修靖以白鷺羽扇遺之曰以異物奉異人􅜇鴒詩曰􅜇鴒在原兄弟急難毛詩義疏曰􅜇鴒水鳥一名渠梁大如鷃雀脚長尾尖喙背上青灰色腹下白頸下黑如連錢故杜陽謂之連錢爾雅曰䳭鴒雝渠郭璞注曰雀之屬也飛則鳥行則搖鷁左傳曰正月戊申六鷁退飛過宋都風也莊子曰夫白鷁之相視眸子不運而風化列子曰夫河澤之鳥視而孕曰鷁錄異傳曰宏老吳興烏程人患瘧經年宏後獨至旁舍瘧發有數小鬼或騎公腹或扶公首脚公因佯眠忽起捉得一鬼遂化成黄鷁餘者皆走公乃縛以還家暮懸窓上云明日當殺食之比曉失鷁處公瘧遂斷于時人有得瘧者往依宏便瘧斷晉書曰武帝謀伐吳昭王濬修舟鷁濬乃作大船連舫方百二十丈受二千餘人以水為城起樓櫓開四出門其上皆得馳馬來往又畫百怪獸於船首以懼江神博物志曰白鷁雄雌相視則孕或曰雄鳴上風雌鳴下風則亦孕劉禎魯都賦曰綠鷁葱鶖鸊鷉爾雅曰鷉須鸁揚雄方言曰野鳬甚小而好沒水中者南楚之外謂之鸊鵜大者謂之鶻蹄纂文曰鵅施石檄零皆野鴨名沒食曰鵅長頸曰施多白曰零在山間曰石檄白􅖂爾雅曰鵅鳥􅖂卜敬宗􅖂賦曰鳥真野之性備於俯仰之間專視緩步有自卑之志鴇詩曰鴇羽刺時也晉昭公之後大亂五世君子下從征役不得養父母也肅肅鴇羽集于苞栩肅肅鴇行集于苞桑肅肅鴇翼集於苞棘禮曰鷄肝鴈腎鴇奥鹿胃鶢鶋爾雅曰爰居襍縣郭璞注曰漢文帝時瑯琊有大鳥如馬駒時人謂之𤣥居廣志曰馬鳥鶢鶋莊子曰海鳥止於魯魯侯􅜠之於廟奏九韶以為樂具太牢以為膳鳥眩視憂悲不敢食一臠飲一杯三日而死此以人養鳥也不如以鳥養鳥司馬彪曰即鶢鶋也國語曰海鳥曰鶢鶋止於魯東門之外二日鶢鶋雜縣東門城門臧文仲使國人祭之文仲不知以為神展禽曰越哉臧孫之為政也越迂也言其迂濶不知政要也夫祀國之大節也而節政之所成也言節所以成政故慎制祀以為國典今無故而加典非政之宜也夫聖王之制祀也功施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能扞大患則祀之非是族也不在祀典今海鳥至已不知而祀之以為國典難以為仁且智矣夫仁者講功而智者處物無功而祀之非仁也不知而不問非智也今茲海其有災乎夫廣川之鳥獸恒知而避其災也是歲也海多大風冬煖鵜鶘爾雅曰鵜鴮鸅郭璞注曰今之鵜鶘也好羣飛沉水食魚故名洿澤俗呼為淘河詩云維鵜在梁毛傳曰洿澤也許慎曰鵜一名洿澤一名淘河陸疏曰水鳥形如鶚而極大喙長尺餘直而廣口中正赤頷下胡大如數升囊若有小水魚便抒水滿其胡而棄之令水竭盡魚在陸地乃共食之故曰淘河魏志黄初時有鵜鶘集靈芝池詔曰此詩人所謂洿澤也曹詩刺共公逺君子而近小人今豈有賢智之處於下位乎否則斯鳥胡為而至其博舉天下雋徳茂才獨行君子以荅曹人之刺山海經曰憲期之山沙水出焉其中多鵜鶘如鴛鴦而人足其鳴自呼莊子曰魚不畏網而畏鵜鶘網者公平無私鵜鶘有心故魚畏之明主行賞罰如網淮南子曰鵜鶘飲水數升而不足鸕鷀爾雅曰鷀鷧即鸕鷀也觜角曲如鉤食魚異物志曰鸕鷀不生卵而孕雛於池澤間又土生多者八九少者五六相連而出或絲緒水島而巢高樹上或在窟穴之間隋書曰倭國草木冬青土地膏腴水多陸少以小環挂鸕鷀項令入水捕魚得百餘頭以充食唐書曰貞元十三年四月上以自春已來時雨未降正陽之月可以雩祀遂幸興慶宮龍堂為兆庻祈禱忽有白鸕鷀沉浮水際羣類翼從其後左右侍衛者咸驚異之俄然莫知所往方悟神龍之變化遂相率舞蹈稱慶至乙丑果大雨逺近滂沱于是宰臣等上表陳賀范王治咽方曰咽鸕鷀喙即愈治鯁燒鸕鷀羽水服半錢婟澤婟户固切爾雅曰鶭澤虞郭璞注曰似水鴞蒼黒色常在澤中見人輒鳴喚不去有象主守之官因名之鸛雀説文曰鸛雀也詩曰我來自東零雨其濛鸛鳴于垤婦歎于室毛詩義疏曰鸛一名負釡一名背灶一名皂裙泥其巢一旁為池含水滿之取魚置池中食其雛若殺其子則一村致灾旱華嶠後漢書曰楊震字伯起年五十始應州郡衆人謂之晩暮後有鸛雀銜三鱣魚飛集講堂前都講取魚進曰蛇魚者卿大夫之服象也數三者法三台也先生自此升矣淮南萬畢術曰天雄鸛胎獨行千里取鸛鳥胎于月中暴之合天雄為丸大如梧子欲行吞一丸同騰蛇膽和之大良桓譚新論曰昔有鸛郡國皆殺之而三輔俗不敢取取或雷電霹靂按天意原不獨在此其殺取時與雷偶耳抱朴子曰以鸛血塗金丹一丸内衣中以指物隨口變化神農本草曰鸛骨味甘無毒治蟲疰及心腹疾博物志曰鸛水鳥也伏卵時數入水卵冷則不孕取礜石周圍繞卵以助煖氣方術家以鸛巢中煖礜石為真物列仙傳曰木羽者鉅鹿人母貧賤主助産常探婦兒生開目大笑母大怖夢見大冠赤幘者守兒言此即司命君當報汝恩使汝子木羽得仙隂識之生兒字木羽所探兒年十五夜有車馬來迎之過呼木羽為我御車遂俱去又二十餘年鸛雀旦以二尺魚著户上母匿不道而賣其魚四十餘年母乃終鶖詩曰有鶖在梁說文曰鶖禿鶖也環氏吴紀曰嗣王問中書令張尚鳥之中大者鶴小者雀乎尚曰大者有禿鶖小者鷦鷯嗣王忌勝己因徙之楚辭曰鵾鴻羣晨雞鶖鶬鵾鵾鷄也鶬鶬吉也鶖禿鶖後魏書曰正光二年八月獲秃鶖于宫内詔以示崔光崔光表曰䝉爾十四日所得大鳥此即詩所謂有􅒗在梁解云禿􅒗也貪􅁖之鳥野澤所有不應入于殿庭昔魏氏黄初中有鵜鶘集于靈芝池文帝下詔以曹恭公逺君子近小人愽求賢俊太尉華歆由此遜位而譲管寧也臣聞野物入舍古為不善是以張臶惡鷦賈誼忌鵩鵜鶘蹔集而去前王猶為至誡况今親入宫禁為人所獲方被畜養宴然不以為懼准諸往義信有殊矣且饕餮之禽必資魚肉菽麥稻梁時或飡啄一食之費容過斤溢今春夏陽旱穀糴稍貴窮窘之家時有菜色陛下為民父母撫之如傷豈可棄人養鳥留意於醜行惡聲哉衛好鶴曹伯愛鴈身死國滅可為寒心陛下學通春秋親覽前事何得口詠其言行違其道誠願逺師殷宗近法魏祖修徳延賢消灾集慶放無用之物棄之川澤取樂琴書頥養神性肅宗覽表大恱即棄之池澤南史曰齊晉安王子勛即偽位於尋陽其夕有秃􅒗鳥集城唐書曰㑹昌元年六月有秃鶖鳥集於禁苑鶬爾雅曰鶬麋鴰郭璞注曰今呼鶬鴰荘子曰大鶬飽食仰天而噓列子曰蒲且子之戈連雙鶬於青雲之際楚辭曰酸鵠鵩臇鳥􅋩臇小臛也鴻鶬江賦曰竒鶬九頭精衛山海經曰炎帝之女名媱游於東海溺而不反是為精衛常取西山之木石以堙東海述異記曰昔炎帝女溺死東海中化為精衛其鳴自呼每銜西山木石以填東海怨溺死故也海畔俗說精衛無雄耦海燕而生生雌状如精衛生雄状如海燕今東海畔精誓水處猶存溺死於川誓不飲其水一名誓鳥一名宛禽又名志鳥俗名為帝女雀博物志曰有鳥如烏文首白喙赤足名曰精衛昔赤帝之女媱往遊於東海溺死而不反其神化為精衛故精常取西山之木石以填東海左思魏都賦曰􅖬􅖬音柢精衛銜木償怨又吳都賦曰精衛銜石而遇繳汶鰩夜飛而觸綸水扎鳥南夷志曰水扎鳥出昆明池冬月遍于水際太平御覽卷九百二十五
