body:
  text: 太平御覽卷五十六宋李昉等撰地部二十一陸京阿峴隴堆墟培塿陸釋名曰髙平曰陸陸漉也川流而去也説文曰陸髙平地也周易曰鴻漸于陸夫征不復婦孕不育凶利禦冦王弼曰陸髙之頂也進而之陸與四相待不能復反者也又曰莧陸夬夬中行無咎易坤靈圖曰聖人受命瑞應見於河瑞應之至聖人殺龍龍不可殺皆感氣也君子得衆人之助瑞應先見於陸瑞應之至君子殺蛇蛇不如龍陸不如河焦贛易林曰山没丘浮陸為水魚燕雀無巢民無室廬又曰鳬池水簾髙陸為海江河橫流魚鼈成市尚書曰恒衞既從大陸既作孔安國曰二水已治從其故道大陸之地已可耕作毛詩曰考槃在陸碩人之軸又曰鴻飛遵陸公歸不復於女信宿毛萇曰陸非鴻所宜處也周禮曰作車以行陸作舟以行水皆聖人之作樂動聲儀曰土肥原陸饒隘狹斯生奢侈之俗也漢書曰禹陸行載車又曰秦地有鄠杜竹林號曰陸海又曰鄒陽上吳王書曰髙皇帝水攻則章邯以亡其城陸撃則荆王以失其地魏名臣奏曰執金吾龎延奏其山居林澤有火耕畬種而平地平陸雖有往古耒耜區種之法就其收者適可蔬食不足寳也關令内傳曰關令尹喜生時其家堂陸地自生蓮華光色鮮盛文子曰却走馬以糞車軌不接於逺方之外是謂坐馳陸汛老子曰蓋聞善攝生者河上公攝養也陸行不遇兕虎自然逺害不必避也入軍不被甲兵莊子曰泉涸魚相與處陸相煦以濕相濡以沫不若相忘於江湖王充論衡曰夫知古不知今謂之陸沉然則儒生所謂陸沉者也應劭風俗通曰荆鼈令死亡隨水上荆人求之不得也鼈令至岷山下邑起見蜀望帝使鼈令鑿巫山然後蜀得陸處望帝自以徳不如以國禪與鼈令為蜀王號曰開明傅子曰堯遭洪水而貴陸湯大旱而重水又曰陸田命懸於天人力雖修茍水旱不時則一年之功棄矣六韜曰天下之人陸沉於殷乆矣傅咸扇賦曰水不策驥陸不乘舟世無為而爼豆設時有虞而干戈修夏侯湛春可樂曰春可樂兮樂崇陸之可娛登夷崗以逈眺兮超矯駕乎山嵎又秋可哀曰秋可哀兮哀南畝之窮荒既採蕭於大陸兮又刈蘭乎崇岡又梁田賦曰嬉於夷寧之廣陸步于大野之長京察田疇之疆畔兮觀遊雉之逸形京説文曰京人所為絶髙丘也毛詩曰升彼墟矣以望楚矣望楚與堂景山與京毛萇曰京髙丘也又曰曾孫之稼如茨如梁曾孫之庾如坻如京又曰依其在京侵自阮疆陟彼髙岡無矢我陵爾雅曰丘之髙絶者曰京張揖廣雅曰四起曰京應劭風俗通曰京謂非人力所能成天地性自然也京師義亦取此阿説文曰大陵曰阿一曰阿曲阜也毛詩曰無矢我陵我陵我阿無飲我泉我泉我池鄭𤣥曰文王侵阮國阮之兵無敢當其陵及阿並無敢飲於泉及池者也又曰有卷者阿飃風自南毛萇曰惡人被化而消猶飄風之入曲阿也愷悌君子來遊來歌又曰誰謂爾無羊三百維羣誰謂爾無牛九十其犉或降於阿或飲于池又曰陟彼阿丘言采其蝱又曰考槃在阿碩人之薖又曰菁菁者莪在彼中阿又曰綿蠻黄鳥止于丘阿張揖廣雅曰曲陵曰阿史記曰黄帝披山通道而邑于涿鹿之阿帝王世紀曰蚩尤氏強與榆㒺爭王於涿鹿之阿穆天子傳曰天子西征升于九阿郭璞曰今新安縣十里九坂也嵇康聖賢髙士傳讚曰許由養神宅于箕阿德眞體全擇日登遐樂資春秋後傳曰阿房宮未成成更欲擇令名名之作宫阿旁故天下謂之阿房宮漢武内傳曰西王母命侍女歌云仰上升絳庭下遊日窟阿顧盼八落外逺指九宫遐董覽吳地志曰曲阿秦時名雲陽太史云東南有天子氣在雲陽之間故鑿北岡令曲而阿因名曲阿桓寛鹽鐵論曰晉有河華九阿而奪於六卿齊有泰山巨海而脅於田單孫楚王驃騎誄曰逍遙芒阿闔門下帷研精六藝探賾鈎微湛方生詩曰發鞍踞平陸秣馬青山阿濁酒沽魚鼎是食何必過袁宏採菊詩曰息足廻阿圍坐長林披榛即澗藉草依陰酈炎詩曰靈芝生河洲動揺困洪波秋蘭榮何晚嚴霜瘁其柯哀哉二芳草不植太山阿摯虞遷宅誥曰惟大始三年九月上旬涉自洛川周于原阿乃卜昌水東黄水西背山面隰惟此良宅陸機逸民賦曰相黄土而卜居兮度山阿而考室緩齊歌行曰遨山聚靈族髙讌會城阿長風萬里舉慶雲鬱嵯峩峴從征記曰青峴一名小峴木多櫨杏續述征記曰莵頭峴雖無峭嶮然連林修坂數十里中行者固亦密勿矣伏琛齊地記曰萊蕪谷有銅冶峴古鑄銅處朱虛城西有山峴遠而峻今名半車峴白淵之齊道記曰黄丘北十里有鸑鷟峴下帶長澗東北流經牛山山去此水八十餘里今號曰牛頭水是齊景公所登而歎處劉慎京口記曰去城九十里有白峴在東山白石也江乘地記曰城東四十五里竹里山王途所經途甚傾嶮行者號為翻車峴也武昌記曰城東南有金牛崗崗西有石鼔峴上有三石鼔鼓鳴天必雨隴方言曰秦晉之間冢謂之隴説文曰隴天水大坂也廣志曰泳沙在玉門關外東西數百里有三斷名曰三隴也三秦記曰隴西關其坂九廻不知髙㡬里欲上者七日乃越髙處可容百餘家下處數十萬户上有清水奔流四注俗歌曰隴頭流水鳴聲幽咽遙望秦川心肝斷絶去長安千里望秦川如帶又關中人上隴者還望故鄉悲思而歌則有絶死者秦州記曰隴西郡東一百六十里得隴山南北亘接不知逺近東西廣百八十里其髙處可三四里登此嶺東望秦川四五百里極目茫然墟宇桑梓與雲霞一色東人西役升此而顧瞻者無不悲思其上懸巖吐􅋼於嶺中淵停名曰萬石淵溢流散下皆注於渭故北人升此而歌始興記曰盧水合武水甚險名曰新隴有太守周昕廟即始開此隴者行者放鷄散米以祈福而忌著濕衣入廟堆爾雅郭璞注曰江東呼地髙堆者為墩説文曰堆小阜也又曰巴蜀山岸脇之堆傍欲落者曰坻坻崩聲聞數百里漢書曰揚雄上書曰往者圖西域豈為康居烏孫踰白堆而冦西邊哉乃以制匈奴也堆形如土隴無頭尾髙者二三丈水經注曰緱氏山仙者昇焉言王子晉控鶴斯阜靈王望而不得近舉手謝而去其處得遺屣焉俗謂為父堆又曰函關直北隔河有層阜巍然獨秀孤峙河陽世謂之風陵戴延之所謂風堆者也又曰瞿堆南絶壁峭峙孤險雲髙望之形若覆唾壺髙二十餘丈羊膓蟠道三十六廻開山圖謂之仇夷所謂積石嵳峩嶔岑隱阿者也上有平田百頃煮土成鹽因以百頃為號山上豐水泉所謂清泉湧沸潤氣上流者漢武帝元符六年開以為武都郡天地大澤在西故以都為目矣長安圖曰髙望堆在延興門南八里潘岳西征賦曰憑髙望之陽堆梁州記曰南鄭城泝漢上五十里水邊有漢武堆漢武嘗遊此以為釣臺後人覩其崇基謂之漢武堆述異記曰當陽縣南有龍川鳯川云漢帝時八龍五鳯常遊于此亦呼為五鳯堆安定圖記曰振履堆者故老云夸父逐日振履於此故名之墟說文曰墟大丘也崑崙謂之墟史記曰成王伐管蔡以殷餘民封康叔為衞君居故商墟漢書曰元城郭東有五鹿之墟即沙麓地也越絶書曰千里墟者闔廬以鑄干將劍處又曰吳門外鷄坡墟故吳王所畜鷄處也新序曰齊桓公出見遺墟問諸野人野人曰是虢之墟公曰虢氏何為亡對曰善不能行惡不能去所以為墟矣風俗通曰謹案尚書舜生姚墟又曰姚墟在濟隂成陽縣帝顓頊之墟閼伯之墟是也培塿説文曰培塿小土山也左傳曰培塿無松栢方言曰冢秦晉之間謂之培塿墨子曰培塿之側則生松栢民衣焉食焉家焉死焉地終不責徳故以為仁風俗通曰培塿者即阜之類也今齊魯之間田中小髙者名之為培塿矣太平御覽巻五十六
