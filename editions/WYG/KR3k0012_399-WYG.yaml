  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_399-1a, image: WYG0896/WYG0896-0515a.png}
body:
  text: 太平御覽卷三百九十九宋李昉等撰人事部四十應夢禮記文王世子曰文王謂武王曰汝何夢矣武王曰夢帝與我九齡帝天也文王曰汝以為何也武王曰西方有九國君王其終撫諸文王曰非也古者謂年為齡齒亦齡也我百爾九十吾與爾三焉九齡九十年之祥也文王以憂勤損夀武王以安樂延年與汝三者明傳業扵汝汝受而成之文王九十七而終武王九十三而終左傳僖公下曰楚子玉自為瓊弁玉纓未之服也先戰夢河神謂已曰畀余余賜汝孟諸之麋又成公上曰鞍之戰晉韓厥夢子輿厥父謂已曰避左右故中御而從齊侯邴夏曰射其御者君子也公曰謂之君子而射之非禮也射其左越於車下射其右斃於車中又昭二曰鄭子產聘於晉晋侯有疾韓宣子曰寡君寢疾於今三月矣並走羣望有加而無瘳今夢黄熊入於寢門其何厲鬼也對曰以君之明子為大政其何厲之有昔堯殛鯀于羽山其神化為黄熊以入於羽實為夏郊三代祀之晉為盟主其或者未之祀乎韓子祀夏郊晉侯有間間差也又昭二曰鑄刑書之嵗二月或夢伯有介而行介甲也曰壬子余將殺𢃄也明年壬寅余又將殺段也及壬子駟𢃄卒國人益懼齊燕平之月壬寅公孫段卒國人愈懼又昭四曰晋荀吳帥師滅陸渾韓宣子夢文公携荀吳而授之陸渾宣子韓起文公晉文公荀吴中行穆子也故使穆子帥師獻俘於文宫欲以應夢又昭二曰十二月辛亥朔日有食之是夜也趙簡子夢童子臝而轉以歌轉宛轉也且占諸史墨子曰吾夢如是簡子夢適與日蝕㑹謂咎在已故問之也對曰六年及此月也吳其入郢乎終亦弗克漢書曰孝文帝嘗夢欲上天不能進有一黄頭郎推之上天顧見其衣後穿覺而之漸臺見郎鄧通衣後穿即夢中所見也因而寵之又曰衛太子為江充所譛敗乆之田千秋上急變訟太子寃曰子弄父兵罪當笞天子之子過誤殺人當何罪哉臣嘗夢見一白頭翁教臣言是時上頗知太子惶恐無他意乃大感寤召見千秋謂曰父子之間人所難言也公獨明其不然此高廟神靈使公教我公當遂為吾輔佐立拜千秋為大鴻臚又曰韋元成為丞相言孝文太后寢園宜如禮勿復修奏可後嵗餘上寢疾夢祖宗譴罷郡國廟上少弟楚孝王亦夢焉上召問匡衡議欲復之衡深言不可東觀漢記曰桓帝時張奐為武威太守其妻懐孕夢𢃄奐印綬登樓而歌占曰必生男復臨此郡命終此樓既而生子猛建安中為武威太守前郡守邯鄲商為猛所殺據郡反為韓遂所攻自知必死乃登樓自燒而死魏志曰文帝問周宣曰我昨夜夢青氣自地屬天宣曰天下當有貴女子寃死時帝已遣賜甄后璽書文帝復問周宣曰吾夢摩錢文欲令滅而更明何邪曰此陛下家事而太后不聽故更明耳時治弟植罪逼於太后也晉書曰明帝時張茂夢得一大象問人曰何祥對曰君為大郡然而不善或問其故曰象者大獸獸者守也故當為大郡然象以齒見焚必為人害後為吳國内史沈充所害又曰明帝太寕元年王敦謀􅊇帝與王導温嶠等决計征之敦屯於湖隂帝欲察其營壘乃乗駿馬㣲行至湖隂敦方晝寢夢日環其城驚起曰此必黄鬚鮮卑奴來何以不縛之又曰簡文見䜟云晉氏祚盡昌明及孝武之在孕也李太后夢神人謂之曰汝生男以昌明為字及生東方始明因以名焉簡文後悟為之流涕後魏書曰高祖遷洛謂任城王澄曰朕昨夜夢一老公頭鬚皓白正理冠服拜立路左朕怪而問之自云晉侍中嵇紹故此奉迎神爽卑懼似有求焉澄對曰晉世之亂紹以身衛主殞命御側亦是晉之忠臣於是求其兆域遣使弔祭焉又曰莊帝在藩任城王順夢一段黑雲從西北直來觸東南上日月俱破復翳諸星天地晝闇俄雲消霧解日出莊帝復閶闔門入登太極殿呼萬嵗三百官咸加朝服既覺占之曰黑雲氣之惡者北方之色必有北敵亂京師日君象星百官象以此言之京邑其當禍乎後如其夢又曰盧元明為中書侍郎友人王由寓居穎川忽夢見由携酒就之言别因賦詩贈乃覺元明憶其十字云自兹一去後朝市不復逰元明嘆曰必有他故經三日果聞為亂兵所殺尋其日乃是發夢之夜又曰酈範字世則范陽涿人範嘗夜夢隂毛拂踝他日說之時齊人有占夢者史進云豪盛於齊下矣使君臨撫東秦道光海岱必當重牧全齊冄禄營邱矣範笑而答曰吾将為卿必騐此夢果如其言為青州刺史又曰裴安祖閑居飬志不出城邑曾行值天熱舍於樹下有鷙鳥逐雉雉急投之遂觸樹而死安祖愍之乃取置隂地徐徐視良乆得蘇安祖喜而放之後夜夢一丈夫衣冠甚偉着曲領向安祖再拜安祖怪而問之此人云感君前日見放來謝徳聞者異焉北齊書曰張亮字伯徳西河隰城人也拜大中大夫薛淑常夢於山上挂􅁝以告亮且占之曰山上絲幽字也君其為幽州乎數月出為幽州刺史又曰蘓穎為凉州刺史穎前妻鄧氏亡後十年夢見向頴拜曰新婦今被處分高崇妻故來辭别頴見崇言之崇數日而卒梁書曰吉士瞻少時夢得一積鹿皮而數之有十一領及覺喜曰鹿者禄也吾當居十一禄乎自其後仕進所莅者九及除二郡心惡之遇疾不肯療普通七年卒於郡梁後畧曰初賀革之往江陵也意甚不悅過别御史中丞江革以情告之答曰吾嘗夢主上徧見諸子唯至湘東王所手脫㡌以與之此人後必當璧卿其行乎革因頷之遂往荆州三國典畧曰江陵平梁御史中丞沈炯遷長安太祖授儀同三司甚禮待之炯恐太祖愛其人才恒閉門却掃無所交遊時有文章隨即毁棄不令流布嘗獨行經漢武通天臺為表奏之陳已思歸之意奏訖其夜炯夢見有宫禁之所兵衛甚嚴炯便以情事陳訴聞有人言甚不惜放卿幾日可至若一月内見關出此恐不復由我寤而異之當時以為怳忽十餘日便有命放還遂與王克等並得東歸又曰隂子春嘗為東莞太守時青州刺史王神念毁壞臨海神廟當座棟上有一大虵役夫下擒入於海水爾夜子春夢見一人詣其府云有人見苦壞宅舍既無所託欲憇此境子春心宻記之經二日方知神念毁廟因辦牲醑立宇祠之數日夢一朱衣人謝曰得君厚惠當以州相報經月餘魏軍欲襲朐山子春豫知設伏摧破梁武以為南青州刺史陳書曰武帝初受禪之日其夜有㑹稽人傳史普直省夢人自天而下着朱衣武冠導從數十手持板板上有字傳視之其文曰陳氏五主三十四年遂凌空而上旦白黄門侍郎孔宗範嘆曰吾事去矣其為子孫憂乎自武帝已後并廢帝五主自永定初迄禎明末共三十四年晏子春秋曰景公舉兵將伐宋過太山公夢見二丈夫意怒甚盛公問占夢曰師過太山不用事太山神怒也公問晏子晏子曰非泰山之神也宋之先湯與伊尹也湯脩以長髯鋭上而豐下倨身高聲伊尹黑短􅅫頭而髯豐上鋭下僂身下聲公曰然又曰景公田於梧宫夜猶早公坐睡夢有五丈夫北面稱無罪公覺召晏子吿所夢公曰我其嘗殺無罪歟晏子對曰昔先君靈公田五丈夫駭獸故并斷其頭𦵏之命曰五丈夫之邱豈此耶命人掘其𦵏處求之則五頭同穴而存焉公嘉之命吏𦵏之莊子曰宋元君夜半夢人被髪而窺阿門曰予自宰路之淵為清江使河伯之所漁者豫且得予元君覺召占夢者占之占夢者曰此神龜也君乃刳龜以卜七十鑽而無遺䇿又曰匠石之齊至於曲轅曲轅道也見櫟社樹其大蔽牛曰是不材之木也故能若是之夀匠石歸櫟社見夢曰汝將比予於文木耶柤梨橘柚果蓏之屬耶實熟則剥剝擊也剥則辱大枝折小枝泄泄亦折也此以其能苦生者也予求無所可用乆矣乃今得之吕氏春秋曰尹儒學御三年而無得焉夜夢受秋駕於其師明日往朝其師而謂之曰非吾愛道也恐子之未可教也今日將教子以秋駕秋駕御法尹儒反走北面再拜曰今昔臣夢受之先為其師言所夢以授秋駕也賈誼書曰文王晝卧夢人登城而呼已曰我東北陬之腐骨也速以人君𦵏我文王曰諾覺召吏使視之信有焉文王曰速以人君𦵏之吏曰此無主請以大夫禮王曰吾夢中已許之矣奈何背之也桓譚新論曰揚子雲亦言成帝時上甘泉召使作賦子雲為之卒暴倦卧夢其五藏出在地以手收内及覺大少氣病一嵗卒世說曰王東亭嘗夢人以大筆與之管如椽子大既覺語人云他日當有大手筆事少日烈宗晏駕哀䇿諡議王所作辛氏三秦記曰昆明池漢武停船立之習水戰也中有靈沼神池云堯時治水訖停船池通白鹿源人釣魚於此綸絶而去夢於漢武求去其鈎明日帝戲於池見有大魚啣索帝曰豈非昔時所夢也取而去其鈎放之愽物志曰靈帝時遼西太守黄翻上言海邊有流屍露冠絳服感翻夢曰我伯夷弟孤竹君也求見掩藏吏民有􅅓者皆死虞翻别傳曰翻注易奏上曰臣郡吏陳桃夢臣與道士相遇放髪被鹿裘布易六爻撓其三以飲臣臣乞盡吞之道士曰易道在天三爻足矣豈臣受命應當知經皇甫謐高士傳曰桓帝好老子之書夜夢見老子乃詔於陳為老子立祠三輔决録曰予以元冬修夜思而未之得也忽然而寢夢此黄髪之叟姓為元明字曰子真與寐言言必有中夢中指言褒貶之事予授其人子真評之析㣲通理善否之間無所依違因命操筆者書之謂之决録襄陽耆舊記曰楚王與宋玉遊於雲夢之野將使宋玉賦高唐之事望朝雲之館上有雲氣崪乎直上忽而改容湏臾之間變化無窮王問宋玉曰此何氣也對曰昔者先王遊於高唐怠而晝寐夢一婦人曖乎若雲煥乎若星將行未至如浮如停詳而視之西施之形王悅而問焉曰我帝之季女也名曰瑶姬未行而亡封巫山之臺精魄依草實為莖芝媚而服焉則與夢期所為巫山之女髙唐之姬聞君遊於高唐願薦枕席上因而幸之漢武故事曰上自封禪後夢高祖坐明堂羣臣亦夢於是祀高祖於明堂列異傳曰吳選曹令史長沙劉卓得病夢人以白越單衫與之語曰汝着此衫汙即火燒便潔也覺果有衫在側後汙便火燒之搜神記曰有周掔力感切嘖音責者貧而好道夫婦夜耕息卧夢天公過而哀之勅有以給與司命案録籍此人相貧限不過此惟有張車子應賜錢千萬車子未生請以借之天公曰善曙覺言之於事所為輒得貲至千萬先時有張嫗者常往掔嘖家傭賃野合有身月滿當孕便遣出在車屋下産得兒主人往視問言當名汝兒何嫗曰今在車下夢天吿之名為車子掔嘖乃悟自是居日衰減車子長大富於周家續搜神記曰承儉者東莞人塟後十年忽夜與其縣令夢云沒故民承儉今見刼明府急見救令便勅内外装束往冡上日已向出天忽大霧對靣不相見但聞冡中㕳㕳破棺聲有二人墳上望但霧𠖇不見人往令既至收得冡内三人墳上二人遂得逸走棺未壞令即使人修復之即其夜又夢儉云二人雖得走民􅊖誌之一人面上有青誌如藿葉一人㧻其前兩齒折明府得案此尋覔自得也令從其言􅇷捕皆擒獲又曰宗淵字叔林南陽人晉太元中為尋陽太守有數大頭龜付厨勅旦且以二頭作臛便着藩汁甕中養之其暮夢有十丈夫並着烏布袴褶自反縛向宗淵叩頭若求哀明日厨子宰二龜其暮復夢八人求哀如初宗淵方悟令勿殺明夜還夢見昨八人來跪謝恩於是驚覺明朝自入廬山放之遂不復食龜又曰荆山刺史殷仲堪布衣時在丹徒忽夢見一人自說已是㑹稽上虞人死亡浮䘮飄江中明日當至君有濟物之仁豈能見移着高燥處則恩及枯骨殷明日與諸人共江上㸔果見一棺逐水流下飄飄至殷坐處令人牽取題如所夢即移着岡上酹以酒飯是夕又夢此人來謝恩又曰嘉興徐泰㓜䘮父母叔父隗養之甚於所生隗病侍甚謹三更中夢二人乗船持箱上泰床頭發箱出簿書示曰汝叔應死泰即於夢中下地叩頭良乆曰汝縣有同姓名人不泰思得語鬼云張隗不姓徐此人云亦可强逼念汝能事叔父當為汝受之遂不復見異苑曰高平檀茂崇以義熙中䘮亡其母沛郡劉氏晝眠夢見崇手捉團扇云崇年命未盡横被災厲方永違離今以此扇奉别母流涕驚覺果於屏風門得扇上皆如蜘蛛􅃠絡撫執悲慟又曰海陵如睪縣東城村邊海岸崩見一古墓有方頭漆棺以朱題云七百年墮水元熹二十年墜於縣巘和盖從潮漂沈輒泝流還依本處村人朱䕶等異而啓之見老姥年可七十許皤頭着袿台携切鬢髪皓白不殊生人釵髻衣服粲然若新送終器物枕屨􅊖存䕶乃齎酒脯施於柩側爾夜䕶婦夢見姥云向獲名貺感至無已但我墻屋毁發骸形飄露今以直一千乞為治䕶也置錢便去明覺果得即用改殮移於高阜焉述異記曰陳留周氏婢名與入山取樵忽夢見一女子曰吾目中有刺煩為㧞之當有厚報此婢乃見朽棺骷髏草生眼中便為㧞草即於某處得一雙金指環靈魂志曰濡湏口有一大舶船覆在水中水小時便出見嘗有漁人夜宿其傍以船繫之但聞箏笛絃管之音夢人驅遣云勿近官妓此人夢覺即移船去傳云是曹公載妓船覆於此於今存在智瓊傳曰弦超字義超夢神女從之自稱天上玉女姓成字智瓊早䘮父母天帝愍之遣令得下嫁如此三四旦覺寤欽想顯然來遊乃駕輜軿車從八婢自言我天帝玉女遂為夫婦贈詩二百餘言又著易七卷超皆能通其㫖太平御覽卷三百九十九
