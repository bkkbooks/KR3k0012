body:
  text: 太平御覽卷八百五十九宋李昉等撰飲食部十七糜粥膏粥糝􅭁䵄蕡麮肺䐣􅀈熱洛河羗煮胡飯糜粥周書曰黄帝始烹糓為粥記曰春秋養衰老授几杖行糜粥飲食又曰公叔文子卒其子請謚於君君曰昔者衛國凶飢夫子為粥與國之飢者是不亦惠乎又曰悼公之䘮季昭子問於孟敬子曰為君何食敬子曰食粥天下之逹禮也又曰穆公之母卒使人問於曽子曰如之何對曰申也聞諸申之父曰哭泣之哀齊斬之情饘粥之食自天子逹又曰親始死三日不舉火故鄰里為之糜粥以飲食之又曰君之䘮子大夫公子衆士皆三日不食子大夫公子食粥納財朝一溢米莫一溢米食之無算又曰大夫之䘮主人室老子姓皆食粥左𫝊曰晋人執衛侯歸之於京師寘諸深室寗子納槖饘焉又曰齊晏桓子卒晏嬰麤縗斬麻絰帶杖苴屨食粥居倚廬寢苫枕草其老曰非大夫之禮也又曰正考父鼎銘云饘於是粥於是以餬余口爾雅曰粥糜也餬饘也釋名曰糜煮米使糜爛也粥濯於糜粥粥也寒粥米投寒水中也史記曰左師觸讋見趙太后曰食飲得無衰乎太后曰恃粥耳又曰陽虛侯趙章病淳于意診其脉曰迵風迵風者五日而死後七日乃死曰其人嗜粥故中蔵實故過期後漢書曰光武為王郎追至蕪蔞亭馮異上粥一椀明日謂諸將曰昨得公孫豆粥飢寒俱解又曰樊鯈事後母至孝及母卒哀思過禮毁病不支世祖常遣黄門朝暮遺饘粥東觀漢記曰曹褒遷將作大匠上聞褒病使致醫藥糜粥謝承後漢書曰南陽陸續任郡户曹吏時飢荒太守尹興使續於都亭賑民饘粥續悉簡閲其人記以名氏事畢興問所食幾何續因口説六百餘人皆分别姓字無有差謬興異之漢獻帝𫝊曰帝在長安糓一斛二十餘萬帝使侍御史侯汶出太倉米豆為飢民作糜粥死者不絶帝疑廩賦不實𠡠取米豆五升於御前作糜得滿兩盂詔杖汶五十九州春秋曰臧洪為青州刺史為袁紹所圍糧食已盡初尚掘䑕煮筋角後無可復食厨有米三斗主簿啓進内稍以為糜粥洪歎曰吾獨食此何為命作薄粥與衆共啜之魏末𫝊曰曹爽等令李勝辭司馬宣王并伺察焉宣王見勝自陳無他勞效横䝉時恩當為本州詣閣拜辭不悟加恩得䝉引見宣王令兩婢侍衣衣落復上指口言渴主飲婢進粥宣王持杯飲粥粥皆流出沾胷勝愍然者久之呉録曰李夀作糜粥以食飢者而不自名又曰朱桓除餘姚長遇疫癘榖食荒貴桓分部良吏隠親醫藥食粥相繼士民感戴之王隠晉書曰賊杜弢下蜀人飢陶侃多煮粥以待之於是悉降晉安帝紀曰桓𤣥敗走承石進以麤粥咽不能下郭林宗𫝊曰林宗嘗止陳國文學見童子魏徳公知其有異徳公求近其房止供給洒掃林宗嘗不住夜中命作粥徳公為進焉林宗一啜怒而呵之曰髙明為長者作粥不如意使沙不可食以杯擲地徳公更為粥三進三呵徳公姿無變容顔色殊恱林宗乃曰始見子之面今乃知卿心遂友善之卒為妙士宋書曰戴顒與兄勃並隠遁有名中書令王綏嘗携客過之勃等方進豆粥綏曰聞卿善琴試欲一聽不答綏恨而去又曰何子平大明末東土飢荒繼以師旅家有大䘮八年不得營塟晝夜號哭常如袒括之日冬不衣絮暑不清涼一日以數合米為粥不進鹽菜齊書曰宣孝成皇后生髙帝髙帝年二歳乳人乏乳后夣人以兩甌麻粥與之覺而乳驚出因此豐足梁書曰昭明太子統母丁貴嬪薨水漿不入口每哭慟絶武帝命中書舎人顧協宣㫖曰毁不滅性聖人之制不勝䘮比於不孝有我在那得自毁如此耶即强進飲粥太子奉𠡠乃進數合自是每日進麥粥一升武帝又𠡠曰聞汝所進過少適轉羸痩我比更無病正為汝胷中亦圯塞成疾故應加饘粥不使我恒懸心雖屢奉𠡠勸逼終䘮日止一溢米不嘗菜果之味又曰張𢎞䇿幼以孝聞母常有疾五日不食𢎞䇿亦不食母强為進粥𢎞䇿乃食母所餘又曰蕭景為南兖州刺史㑹年荒計口賑恤又為饘粥於路以賑之又曰任昉為義興太守歳荒散私俸米豆為粥活三千餘人又曰王志天監初為丹陽尹時年飢每旦為粥於郡門以賑百姓衆悉稱恵又曰劉寛字孝智年十六通周易位中書郎以所生母薨廬於墓再朞不甞鹽酪食麥粥而已又曰有河南孝亷秦綿遭母䘮送塟不忍復還鄊人為作菴乃止其中若遇有米食粥無米食菜而已又曰庾沙彌母劉氏亡水漿不入口累日初進大麥薄飲經十旬方為薄粥終䘮不食鹽酢陳書曰張昭弟乾字𤣥明聰明好學亦有至性父卒兄弟日唯食一升麥屑粥後魏書曰崔浩道武季年威風嚴峻官省左右以微過得罪莫不逃避隠匿自下皆變浩獨恭敬不怠或終日不歸帝知之輙命賜以御粥又曰薛真度為豫州刺史景明初豫州大飢真度輙表曰别出倉米五十斛為粥救􅏇者詔曰真度所表甚有愛濟百姓之意宜任拯䘏也又曰文明太后崩孝文五日不食楊椿諫曰聖人之禮毁不滅節縦陛下欲自賢於萬代其若宗廟何帝感其言乃進一粥又曰楊逸為光州刺史時灾儉連歳逸欲以倉粟賑給而所司懼罪不敢逸曰國以人為本人以食為天假令以此獲戾吾所甘心遂出粟然後申表右僕射元羅已下謂公儲難闕並執不許尚書令臨淮王彧以為宜貸二萬詔聽貸五萬逸既出粟之後其老小殘疾不能自存活者又於州門造粥飼之將死而得濟者以萬數帝聞而善逸又曰韋胐字遵顯少有志業年十八辟州主簿時屬歳儉胐以家粟造粥以飼飢人所全活者甚衆又曰房景逺字升遐重然諾好施與歳儉分贍宗親又於通衢以粥食餓者存濟甚衆平原劉郁行經兗境忽遇刼賊已殺十餘人次至郁郁曰與君鄉近何忍見殺賊曰若言鄊里親戚是誰郁曰齊州主簿房陽是我姨兄陽是逺小字賊曰我食其粥得活何得殺其親遂還衣服䝉活者二十餘人又曰李蚤妹曰法行幼出家為尼後遭時大儉施糜粥於路北齊書曰李士謙遇年飢多有死者士謙罄家資為之糜粥賴以全活者萬計後周書曰皇甫遐字永賢河東汾隂人性至孝遭母䘮乃廬於墓側食粥枕凷櫛風沐雨形容枯顇家人不識隋書曰陸讓母者上黨馮氏女也性仁愛有母儀譲即其孽子也仁夀中為畨州刺史贓貨狼籍為司馬所奏上遣使按之皆驗乃命公卿百僚議之咸曰譲罪當死詔可其奏譲將就刑馮氏蓬頭垢面詣朝堂數曰無汗馬之勞致位刺史不能盡誠奉國以答鴻恩而反違犯憲章􅂍貨狼籍若言司馬誣汝百姓百官不應亦皆誣汝言至尊不憐愍汝百姓何故治書覆汝汝豈誠豈孝臣不誠不孝何以為人於是流涕嗚咽親持杯粥勸讓令食既而上表求哀詞情甚切上愍然為之改容獻皇后甚異其意致請於上遂下詔可減死為民太公金匱曰武王伐紂都洛邑而雪深丈餘師尚父使人持一器粥開門而進曰天寒故進熱粥以御寒莊子曰顔囘有負郭之田五十畆足以供饘粥七略曰宣帝詔徴被公見誦楚辭被公年衰母老每一誦輙與粥風俗通曰范滂父字叔矩遭母憂既塟之後饘粥不贍司徒詔滂滂曰老父年尊絶意世仕遂不得避也魏武遺令曰吾夜半覺小不佳至明日飲粥汗出服當歸湯譙子法訓曰或曰母有疾使其妻為粥者妻不可以刃擊之夷其面可以為孝乎以刃妻其親必駭而有憂及之何有於孝郭子曰許允為吏部郎多用其鄊里帝遣虎賁収之婦云無憂尋還作粟粥待之語林曰石崇為客作豆粥咄嗟便辦王愷乃宻貨崇帳下答曰豆難煮唯豫作熟豆以白粥投之續捜神記曰劉池荀家在夏口忽有鬼來喜偷食劉即於他家煮冶葛汁宻賫還家向夜令舉家糜食餘一甌因㵼冶葛汁着中於瓦上以瓮覆之人定後聞鬼發瓮啖糜須臾在屋頭吐至四更中寂然於此遂絶也徐廣記曰愍帝建興四年京城糧盡屑麴為粥即以供帝饌録異𫝊曰周時尹氏貴盛五世不别食㑹數千人遭飢荒羅鼎作粥啜之聲聞數十里鄴中記曰并州之俗以冬至後百五日為介子推斷火冷食三日乾粥中國為寒食涼州異物志曰髙昌僻土異於中華寒服冷水暑啜羅闍闍多車切此郡人作糜粥啜之俗􅃅者也南越志曰廬陵城中有井半清半黄黄者甜滑宜作粥色如金似灰汁甚芬馨世説曰郄嘉賔三伏之月詣謝公炎暑熏赫雖當風交扇猶霑汗流離謝着故練衣食熱白粥郄謂謝曰自非君體幾不堪此又曰賔客詣陳太丘宿使元方炊太丘問炊何遲留元方長跪曰君與客語乃俱竊聽炊忘着箄今皆成糜太丘曰爾頗有所識否二子長跪俱説言無遺失太丘曰如此便成糜自可何必飯耶俗説曰王東亭嘗之呉郡就汰公宿汰公設豆藿糜自噉一大甌東亭有難色汰公强進半甌王薈别𫝊曰薈為呉郡内史其年大飢薈出私財為百姓饘粥風土記曰天正日南黄鐘踐長饘粥追萌徴納休昌是以陽始牙動為饘粥以養幼扶微俗尚以赤豆為糜所以象色也廣志曰遼東赤粱魏武帝以為御粥天文要集曰玉井主粥厨殷康集曰康為武康縣教曰郭邑居民有死䘮者可令送兩坩粥時鏡新書曰齊魏收當寒食餉王元景粥元景與収書曰始知令節須御麥粥加以甘糖彌覺香冷荆楚歳時記曰正月十五日豆糜加油骨上其以祠門戶魏武帝苦寒行曰行行日已遠人馬同時飢擔嚢以取薪斧氷持作糜唐新語曰李勣既貴其姊病必親為煮粥火燃其鬚姊曰僕妾甚多何自苦若是對曰豈為無人耶顧姊年老勣亦年老雖欲久為煮粥其可得乎膏糜國語曰勾踐載稻與脂於舟行國中孺子之逰者無不餔也無不歠也必問其名續齊諧記曰呉縣張成夜起忽見一婦人立於宅東南角舉手招成成便往就之婦人曰此地是君家蠶室我即是此地之神明日是正月半宜作白粥泛膏於上以祭也當令君蠶桑百倍言絶失所成如言為作膏白粥自此已後年年大得蠶今世人正月半作膏糜像此糝周易曰鼎折足覆公餗鄭𤣥曰糝謂之餗周禮曰醢人掌羞豆之實酏食糝食記曰犬羮兔羮和糝不蓼又曰糝取牛羊豕之肉三如一小切之與稻米二肉一合以為餌煎之説文曰糂以米和羮也糂與糝同宗躬孝子𫝊曰桑虞䘮父十四日食百粒糝墨子曰孔子窮陳蔡之間藜藿不糂􅭁通俗文曰煮米􅭁食經日作糄法近水則澀䵄蕡周禮曰籩人朝食之籩其實䵄蕡白黑形鹽蕡熬枲實也鄭司農云䵄麻曰蕡稲曰白黍曰黑儀禮曰䵄蕡坐設於豆西當外列䵄在東方婦贊者執白黑以授主婦又曰主婦薦韮菹醢坐奠于筵前醢在南方婦贊者執籩䵄蕡以授主婦主婦不興受之奠䵄醢南蕡在䵄東禮曰芼羮菽麥蕡稻黍粱麮蒼頡解詁曰麮煮麥也説文曰麮麥甘粥也釋名曰煮麥曰麮麮亦齲也熟煮亦齲壊也急就曰甘麮殊羙奏諸君肺䐣説文曰䐣切熟肉内於血中和也釋名曰肺䐣饡也以米糝之如膏饡也盧諶祭法曰四時祠皆用肺䐣血􅀈説文曰羊血曰􅀈釋名曰血􅀈以血作之増其酸豉之味使甚苦以消膏而加菹其中亦以消酒也盧諶祭法曰春夏秋祠皆用輱血熱洛河唐書曰安禄山思順翰並來朝𤣥宗使驃騎大將軍内髙力士及中貴人供奉官於京城東駙馬崔恵童池亭宴㑹使射生官射鮮鹿取血煮其腸謂之熱洛河以賜之為翰好故也羗煮捜神記曰羗煮貊炙翟之食也自泰始以來中國尚之戎翟侵中國之前兆也胡飯續漢書五行志曰靈帝好為胡服胡飯京師貴戚皆競為之太平御覽卷八百五十九
