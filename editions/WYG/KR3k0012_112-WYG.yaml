body:
  text: 太平御覽卷一百十二宋李昉等撰皇王部三十七唐肅宗宣皇帝史思明附代宗孝武皇帝肅宗宣皇帝唐書曰肅宗宣皇帝諱亨𤣥宗第三子也母曰元獻皇后楊氏景雲二年乙亥生初名嗣昇二嵗封陜王五嵗拜安西大都䕶河西四鎮諸蕃落大使上仁愛頴悟得之天然及長聰敏强記屬辭典䴡耳目之所聽覽不復遺忘開元十五年正月封忠王改名浚五月領朔方大使單于大都䕶十八年奚契丹犯塞以上為河北道元帥信安王褘為副元帥御史大夫李朝隐京兆尹裴伷先等八總管兵以討之仍命百寮設次于光順門與上相見左丞相張說退謂學士孫逖韋述曰嘗見太宗冩真圖忠王英姿頴發儀表非常雅類聖祖此社稷之福也二十年諸將大破奚契丹以上遙統之功加司徒二十三年正月更名璵後皇太子英得罪立上為皇太子天寳十二載十一月安祿山來朝上嘗宻奏云祿山有反相𤣥宗不聽十四載十一月祿山果叛十二月丁未陷東京辛丑制太子監國仍遣上親率諸軍進討時祿山以誅楊國忠為名由是軍民切齒於楊氏國忠懼乃與貴妃謀間其事上遂不行乃詔河西節度哥舒翰為皇太子前鋒兵馬元帥今率衆二十萬守潼關明年六月哥舒翰為賊所敗關門不守𤣥宗幸蜀丁酉至馬嵬兵軍不進請誅楊氏於是誅國忠賜貴妃自盡軍馬將發留上在後宣諭百姓衆泣而言曰逆胡背恩主上播越臣等生於聖代世為唐民願戮力一心為國討賊請従太子収復長安𤣥宗聞之曰此天啟也乃令髙力士與夀王瑁送太子内人及服御等物留後厩馬軍従上令力士口宣曰汝好去百姓屬望慎勿違之莫以吾為意且西戎北狄吾嘗厚之當今國步艱難必得其用汝其勉之上回至渭北便橋已斷水暴漲無舟楫上號令水濱百姓歸者三千餘人渭水可涉又過潼闗㪚卒誤以為賊與之戰士衆多傷死既而覺之乃收其餘以北上軍既濟後者皆溺上喜以為天之眷佑時従上唯廣平建寕二王及四軍將士才二千人自衛而北夕次永夀百姓遮道獻牛酒有白雲起西北長數丈如樓閣之狀議者以為天子氣戊戌至新平郡時晝夜奔馳三百餘里士衆器械亡失過半所存之衆不過一旅時賊據長安知上治兵河西三輔百姓皆曰吾太子大軍即至賊望西北塵起有時奔走七月辛酉上至靈武時魏少㳺預備供帳無不畢備裴冕杜鴻漸等従容進曰今㓂逆亂常毒流函洛主上倦勤大位移幸蜀川江山阻修奏請路絶宗社神器須有所歸萬姓顒顒思崇明聖天意人事不可固違伏願殿下順彼輿情以安社稷王者之大孝也上曰俟平㓂逆奉迎鑾輿従容儲闈侍膳左右豈不樂哉公等何怱怱也冕等凡六上牋辭情激切上不獲已而従之是月甲子上即皇帝位於靈武即日奏上皇是日御靈武南門下制大赦天下改元曰至徳以朔方度支副使大理司直杜鴻漸為兵部郎中朔方節度判官崔漪為吏部郎中並知中書舍人事以御史中丞裴冕為中書侍郎同中書門下平章事改靈武郡為大都督府癸巳上所奉表始達成都丁酉上皇遜位稱誥遣左相韋見素吏部尚書房琯門下侍郎崔渙等奉冊書赴靈武九月戊辰上南幸彭原郡丙子至順化郡韋見素房琯崔渙等自蜀郡賫上冊書及傳國寳等至上素知房琯名至是琯請為兵馬元帥收復兩京許之二載正月庚戌朔上在彭原受朝賀是日通表入蜀賀上皇上皇遣平章事崔圓奉誥赴彭原乙夘朔逆胡安祿山為子慶緒所殺九月持四節與回紇葉護太子率兵四千助國討賊葉護入見宴賜加等丁亥元帥廣平王統率朔方安西回紇南蠻大食之衆二十萬東向討賊壬寅與賊將安守忠李歸仁等戰于香積寺西北賊軍大敗斬首六萬級賊帥張通儒棄京城東走癸夘廣平王收西京甲辰㨗書至行在即日告㨗於蜀上皇遣裴冕入京啟告郊廟社稷冬十月癸丑賊將尹子竒陷睢陽害張巡姚誾執許逺賊自香積之敗悉衆保陜郡廣平王統郭子儀等進攻與賊軍戰于陜西之新店賊衆大敗斬首十萬級横屍三十里庚申安慶緒與其黨奔河北壬戌廣平王入東京陳兵天津橋南士庶懽呼路側陷賊官偽署侍郎陳希烈等三百餘人素服待罪癸亥上自鳯翔還京仍遣太子太師韋見素入蜀迎上皇鳯陽郡給復五載丙寅至望賢宫得東京㨗書至上大喜丁夘入長安士庶涕泣拜抃曰不圖復見吾君上亦為之感惻九廟為賊所焚上素服哭于廟三日入居大明宫十二月丙午上皇至自蜀上自望賢宫奉迎上皇御宫南樓上望樓辟易下馬趨進樓前再拜舞蹈稱慶上皇下樓上匍匐捧上皇足涕泗嗚咽不能自勝遂扶侍上皇御殿親自進食自試御馬以進又攏轡而行止之後退上皇曰吾享國長久吾不知貴見吾子為天子吾知貴矣上乘馬前道自開逺門至丹鳳門旗幟燭天綵棚夾道士庶舞抃路側皆曰不圖今日再見二聖百寮班於含元殿庭上皇御殿左相苖晉卿率百辟稱賀人人無不感咽禮畢上皇詣長樂殿謁九廟神主即日幸興慶宫上請歸東宫上皇遣髙力士再三慰喻而止三載正月甲戌朔戊寅上皇御宣政殿冊皇帝尊號曰光天文武大聖孝感皇帝乙巳上御興慶殿奉冊上皇徽號曰太上至道聖皇天帝丁未御丹鳳門大赦天下改至德三載為乾元元年二年九月庚寅逆胡史思明陷洛陽副元帥李光弼守河陽汝鄭滑等州陷賊三年閏四月朔彗出西方其長數丈己卯以星文變異上御明鳳門大赦天下改乾元為上元追封周太公望為武成王依文宣王例置廟時大霧自四月雨至閏月末不止米價翔貴人相食飢死者委骸于路二年三月甲子史朝義率衆賊襲我陜州衛伯玉逆擊敗之戊戌史思明為其子朝義所殺九月壬午制自今已後聖號惟稱皇帝其年號但稱元年去上元之號其以今年十一月為歲首便數建丑建寅每月以所建為數建卯月辛亥朔上御明鳳門大赦以京兆府為上都河南府為東都鳳翔為西都江陵為南都太原為北都建巳月庚戌朔壬子楚州刺史崔侁表獻定國寶玉十三枚甲寅太上皇崩于西内神龍殿上自仲春不預聞皇上登遐不勝哀悸因兹大漸乙丑詔皇太子監國下又曰上天降寶獻自楚州因以體元叶乎五紀其元年冝改為寳應建巳月為四月餘月並依常數乃依舊以正月一日為嵗首丁卯宣遺詔是日上崩于長生殿年五十二諡曰文明武德大聖大孝宣皇帝廟號肅宗寳應二年三月𦵏于建陵史思明附唐書曰史思明本名窣干營州寧夷州突厥西北夷人也姿瘦少鬚鳶肩傴背廞目側鼻性急躁與安禄山同鄉里先禄山一日生思明除日生禄山嵗日生及長相善俱以驍勇聞初事特進烏知義毎令輕騎覘賊必生擒以歸又解六蕃語與祿山同為互市郎張守珪為幽州節度奏為折衝天寳初頻立戰功官至將軍知平盧軍事嘗入奏𤣥宗賜坐與語甚竒之問其年曰四十矣𤣥宗撫其背曰卿貴在後勉之遷大將軍北平太守十一載安祿山奏授平盧節度都知兵馬使十四載祿山反命思明攻饒陽等郡陷之十五載正月六日思明與蔡希徳圍顔杲卿於常山九日拔之又圍饒陽二十九日不能拔李光弼出土門救常山思明解圍而拒光弼光弼列兵於城南相持累月光弼草盡使精卒以車數乘於旁縣取草輒被擊之其後率十疋共得兩束草至剉蒿薦以飼之初祿山以賈循為范陽留後謀歸順為副留守向潤客所殺以思明代之又以征戰在外令向潤客代其任四月朔方節度郭子儀以朔方蕃漢二萬人自土門而至常山軍威遂振南收趙郡思明退保博陵五月十日子儀光弼敗思明于沙河上思明以騎卒奔嘉山光弼擊之又敗走入博陵郡光弼圍之城方拔屬潼闗失守肅宗理兵于朔方使中官邢延恩追朔方河東兵馬光弼入土門思明隨後邀擊之思明將卒之精銳者皆破平盧所得戰士南收常山趙郡又攻河間平原顔真卿以兵食既盡乃渡河而南由是河北之地悉陷於思明至徳二年正月思明以蔡希徳合范陽上黨兵馬十萬圍光弼于太原光弼使為地道出至城陣前驍賊方戯弄城中人地道中人擒而曳之賊以為神呼為地蔵菩薩思明留十月㑹安祿山死慶緒令歸范陽希徳㽞百餘日竟不能拔而歸自祿山陷兩京常以駱駝運兩京御府珍寳於范陽不知紀極由是資其逆謀思明轉矯慶緒之命慶緒為王師所敗拔鄴郡其下蕃漢兵五萬人初不知所従思明擊殺三千人然後降之慶緒使阿史那承慶安守忠徴兵於思明且欲圖之判官耿仁智忠謀之士也謂思明曰大夫威重人不敢言仁智請一言而死思明曰試言之對曰大夫乆事祿山祿山兵權如是誰敢不服如大夫比者逼於兇威耳固亦無罪今聞孝感皇帝聰明勇智有少康周宣之畧大夫發使輸誠必開懐見納此轉禍為福之上䇿也思明曰善慶承等以三千騎至范陽思明悉衆介胄以逆之衆且數萬去之一里使人謂之曰相公及王還至將士等不勝喜躍此皆邉兵怯懦頗懼相公之衆莫敢進也請弛弓以安之従之思明遂以承慶守忠入内㕔飲酒别令諸將於其所分收其甲仗其諸郡兵皆資糧歸之欲㽞者分𨽻諸營遂拘承慶斬守忠及李立節之首㑹李光弼使衙官敬挽招之思明遂令衙官竇子昻奉表以所管兵衆八萬人兼以偽河東節度髙秀巖等來降肅宗大恱封思明為歸義王范陽長史御史大夫河北節度使朝義以下並為列卿秀嚴雲中太守以其男如岳等七人為大官使内侍李思敬將軍烏承恩宣慰便令討殘賊明年改元乾元四月肅宗使烏承恩為副使候伺其過而殺之初承㤙父知義為節度思明常事知義亦有開奬之恩以此光弼冀其無疑因謀殺之承恩至范陽數漏其情夜取婦人衣衣之詣諸將家以翻動之意諭之將以白思明思明甚懼無以為騐有頃承恩與思敬従上京來宣恩命畢將歸私家思明留承恩且于館中曰思明當有所議已令幃其所寢之床伏二人於其下承恩有小兒先留范陽思明令省其父夜後承恩語其子曰吾受命除此逆胡便授吾節度矣床下二人呌呼而出以告思明思明令執之捜其衣囊得朝廷所與阿史那承慶鐵劵及光弼與承恩之牒云承慶事了即付鐵劵不了不可付之又得簿書數紙皆載先所従反軍將召承恩與之曰我何負于汝而至是耶承恩稱死罪曰此太尉之謀也思明集軍將官吏百姓西向大哭曰臣以三大州之地十萬衆之兵降國家赤心不負陛下何至殺臣因搒殺承恩父子囚李思敬遣使表其事朝廷又令中使慰諭國家與光弼無此事乃承恩所為殺之善也又有使従京至執三司議罪人狀以示思明思明曰陳希烈已下皆重功之臣上皇棄之幸蜀既收復天下此皆當慰勞之今尚見殺况我本従祿山反乎諸將皆云烏承恩之前事情狀可知光弼尚在憂不細也大夫何不取諸將狀以誅光弼以謝河北百姓主上若不惜光弼為大夫誅之大夫乃安不然為患未已思明曰公等言是乃令耿仁智張不矜修表請誅光弼謝河北若不従臣請臣則自領兵徃太原誅光弼不矜初以表示思明及封入函耿仁智盡削去之寫表者宻白思明思明怒甚執二人於庭曰汝等何得負我命斬之仁智事思明頗久意欲活之却令召入謂之曰我任使汝向三十年今日之事我不負汝仁智大呌曰人生固有一死須存忠節今大夫納邪說為反逆之計縦延旬月不如早死請速加斧鑕思明大怒亂捶殺之腦流于地十月郭子儀領九節度圍相州安慶緒偷道求救於思明思明懼軍威之盛不敢進十二月蕭華以魏州歸順詔遣崔光逺替之思明擊而抜其城光逺脫身南渡思明于魏州殺三萬人流血數日乾元二年正月一日思明于魏州北設壇僣稱為大聖周王建元應天以周䞇為行軍司馬三月引衆救相州官吏敗而引退思明追慶緒等殺之併有其衆四月僣稱大號以周䞇為相以范陽為燕京九月㓂汴州節度使許驥合於思明思明益振又陷洛陽與太尉光弼相拒思明恣行兇暴殺戮無辜上元二年潛遣人反說官軍曰洛中將士皆幽朔人咸思歸魚朝恩以為然告光弼及諸節度僕固懐恩衛伯玉等可速出兵以掃殘賊光弼等然之乃出師南道齊進次榆泉賊委物偽遁將士等不復設備皆入城虜掠賊伏兵在北邙山下衝撃之士卒咸棄甲奔㪚魚朝㤙衛伯玉退保陜州光弼懐㤙棄河陽城退居聞喜步兵㪚死數千人軍資器械盡為賊有河陽懐州盡䧟於賊思明至陜州為官軍所拒於姜子坂戰不利退歸永寕使朝義築三角城約一月内畢未泥思明至詬之對曰緣軍士疲乏暫歇耳又怒曰汝惜部下兵違我處分令隨身數千人立馬看泥斯須而畢又曰待收陜州斬却此賊朝義大懼是夕思明居驛朝義在店中思明令心腹曹將軍總中軍兵嚴衛朝義將駱恱并許驥男季常等言主上欲害王恱與王死無日矣因言廢興之事古來有之欲喚取曹將軍舉大事可乎朝義迴面不應駱恱曰王若不應恱等即歸李家王亦不全矣朝義然之令許季常命曹將軍至恱等告之不敢拒其夜思明夢而驚悟據床惆悵毎好伶人寢食置左右以其殘忍皆恨之及此問其故曰吾向夢見水中沙沙上羣鹿渡水而至鹿死水乾言畢如厠伶相謂曰鹿者祿也水者命也知祿命俱盡矣恱駱入問思明所在未及對殺數人因指在厠思明覺變踰牆出至馬槽糒馬騎之駱恱等至令傔人周子俊射中其臂落馬曰是何事恱等告以懐王思明曰我朝來語錯合有此事然汝殺我太疾何不待我収長安終事不成矣因急呼懐王者三曰莫殺我囚我却罵曹將軍曰這賊誤我這賊誤我恱遂令腹心手擒思明赴榆泉驛曰事已成矣朝義曰莫驚聖人否莫損聖否恱曰無時周贄許冀統後軍在福昌朝義令許季常徃吿之贄聞驚欲仰倒朝義領兵廻贄等來迎殺贄思明至榆泉驛縊殺之朝義便僣偽位寳應二年為李懐光所擒梟首送闕下代宗孝武皇帝唐書曰代宗孝武皇帝諱豫肅宗長子母曰章敬皇太后吴氏以開元十四年十二月生于東都上陽宫初名俶年十五封廣平王𤣥宗諸孫百餘上為嫡皇孫宇量洪濶寛而能㫁喜怒不形於色仁孝溫恭動必由禮幼好學尤専禮易𤣥宗鍾愛之祿山之亂京城䧟賊従肅宗蒐兵靈武以上為天下兵馬元帥時朝廷草創兵募寡弱上推心宣示招懐流㪚北至彭原兵衆數萬後肅宗迴幸鳯翔時房琯郭子儀繼戰不利賊鋒方銳屢來寇襲上選求勇幹頻挫其鋒聖慮以寕士心大振後帥師進討泣而辭步出闕門方始乘馬回紇葉䕶王子率兵入助勇冠諸蕃上接以優㤙結為兄弟故香積之戰賊徒大敗遂安西京兩道雖子儀嗣業之奮命由上恩信結於士心故人思自效既收京城民庶安堵秋毫不犯遺老歡迎對之欷歔聞賊殘衆猶保陜郊即日長驅東虢移新店之役一戰大㨗慶緒之黨十殱七八數旬之間河南底定西都陜復二聖迴鑾統率之功推而不受肅宗還京改封楚王乾元元年三月改封成王四月庚寅立為皇太子改名豫上元末年兩宫不豫太子徃來侍疾躬嘗藥膳衣不解𢃄者久之後承監國之命流涕従之寳應元年四月肅宗大漸所幸張皇后無子后懼上功髙難制隂引越王係於宫中將圗廢立己丑皇后矯詔居太子中宫李輔國程元振素知之乃勒兵於凌霄門候太子至即衛従太子入飛龍厩以俟其變是夕勒兵於三殿収捕越王係及内官朱光輝馬英俊等禁錮之幽皇后于别殿丁夘肅宗崩程元振等始迎上於九仙門見羣臣行監國之禮己巳即皇帝位於柩前二年秋七月壬寅朔戊申羣臣上尊號曰寳應元聖文武皇帝御含元殿受冊壬子御宣政殿宣制改元曰廣徳大赦天下是月吐蕃大寇河隴䧟秦成渭三州又大震闗西䧟蘭廊河鄯洮岷等州盗有隴右之地己丑吐蕃寇涇州刺史髙暉以城降因為吐蕃鄉道冬十月庚子朔辛未髙暉引土蕃犯京畿㓂奉天武功􅉦厔等縣蕃軍自司竹園渡渭循南山而東丙子車駕幸陜州戊寅吐蕃入京師立廣武王承宏為帝仍逼前翰林學士于可封為制封拜辛巳車駕至陜州子儀在商州㑹六軍使張知節烏崇福長孫全緒等率軍繼至軍威遂振舊將王甫誘集京城惡少年齊撃鼓於朱雀街諸軍震攝狼狽奔潰庚寅子儀收京城壬辰以宰臣元載判天下元帥癸巳以郭子儀為京城畱守十二月丁亥車駕發陜郡還京辛夘鄂州大風火發江中焚舡三千艘焚居人廬舍二千家甲午上至自陜州二年二月己巳朔冊天下兵馬元帥尚書令應王适為太子癸酉上親薦獻太清宫太廟乙亥祀昊天上帝于圜丘冬十月丙寅僕固懐恩引吐蕃二萬寇邠州節度使白孝徳閉城拒守丁夘寇奉天京師戒嚴先鋒將郭晞破賊營於邠州西俘斬數百計三年春正月癸夘朔詔大赦天下改為永泰元年三月庚戌吐蕃請和勅宰臣元載杜鴻漸與蕃使同盟于興唐寺辛亥大風拔木是春大旱京師米貴斛至萬錢九月丁酉僕固懐恩死于靈州之鳴沙縣時懐恩誘吐蕃數十萬寇邠州蕃將尚給思賛磨尚悉東賛等㓂奉天醴泉黨項羌渾如刺寇同州及奉天逼鳯翔府􅉦厔縣京師戒嚴九年八月辛未幽州節度使朱泚遣弟滔奉表請自入朝兼自率五千騎防秋許之詔所司築第待之十年春正月乙未朔丁酉昭義將裴志清逐其帥薛萼萼奔洛州上章待罪志清率衆歸田承嗣乙未朱泚乞畱京師西征吐蕃以弟滔權為幽州畱後許之十二年三月宰相元載王縉得罪下獄命吏部尚書劉晏訊鞠之辛巳制中書侍郎平章事元載賜自盡門下侍郎平章事王縉貶撫州刺史十四年五月癸邜上不豫至辛亥不視朝辛酉詔皇太子監國是夕上崩于紫宸之内殿諡曰睿文孝武皇帝廟號代宗十月己酉葬元陵太平御覽卷一百十二
