body:
  text: 太平御覽卷四百二十宋李昉等撰人事部六十一義上釋名曰義者宜也裁制事物使合宜也說文曰義者已之威儀也易下繫曰理財正辭禁民為非曰義尚書曰以義制事左傳隱公曰君子曰石碏純臣也大義滅親論語里仁曰君子喻於義小人喻於利喻猶曉也又曰君子之於天下也無適也無莫也義之與比又曰見義不為無勇也史記曰趙朔將下軍娶晉成公姊為夫人景公三年屠岸賈欲誅趙氏賈始有寵於靈公至景公時為司寇將作難乃治靈公之賊韓厥告趙朔趨亡朔不肯曰子必不絶趙祀朔死不恨韓厥許諾稱疾不出賈不請而擅與諸將攻趙氏於下宫殺趙朔趙同趙括趙嬰齊皆滅其族趙朔妻成公姊有遺腹走公宫匿趙朔客曰公孫杵􅍫杵􅍫謂朔友人程嬰曰胡不死程嬰曰朔之婦有遺腹若幸而男吾奉之即女也吾徐死耳居無何而朔婦免身生男屠岸賈聞之索於宫中夫人置兒袴中祝曰趙宗滅乎若號即不滅若無聲及索兒竟無聲已脫程嬰謂公孫杵􅍫曰今一索不得后必且復索之奈何杵􅍫曰立孤與死孰難程嬰曰死易立孤難耳杵臼曰趙氏先君遇子厚子彊為其難者吾為其易者請先死乃謀取他人嬰兒負之衣以文葆匿山中程嬰出謬謂諸將曰嬰不肖不能立趙孤予我千金吾告其處諸將皆喜許之發師隨程嬰攻公孫杵􅍫殺之諸將以為趙氏孤兒已死皆喜然趙氏真孤乃反在程嬰卒與俱匿山中居十五年晉景公疾卜之大業之後不遂者為祟景公問韓厥知趙孤在乃曰大業之後在晉絶祀者其趙氏乎夫自中衍者皆嬴姓也中衍人面鳥噣降佐殷帝大戊及周天子皆有明德下及幽厲無道而叔帶去周適晉事先君文侯至於成公世有立功未嘗絶祀今吾君獨滅趙宗國人哀之故見龜策唯君圖之景公問趙尚有後乎韓厥具以實告景公乃與韓厥謀立趙孤兒召而匿之宫中諸將入問疾景公因韓厥之衆以脅諸將見趙孤趙孤名曰武諸將不得已乃曰昔下宫之難屠岸賈為之矯以君命並命羣臣非然孰敢作難㣲君之疾羣臣固且請立趙後今君有令羣臣之願也於是召趙武程嬰遍拜諸將諸將遂反與趙武程嬰攻屠岸賈滅其族復與武田邑如故及趙武冠為成人程嬰乃辭諸大夫謂趙武曰昔下宫之難皆能死我非不能死我思立趙氏之後今趙武既立成人復故位我將下報趙宣孟與公孫杵臼趙武啼泣頓首固請曰武願苦筋骨以報子至死而子忍去我死乎程嬰曰不可彼以我為能成事故先我死今我不報是以我事為不成遂自殺趙武服齊衰三年為之祭邑春秋祀之世世勿絶又曰項王已死楚地皆降漢獨魯不下漢乃引天下兵欲屠之為其守禮義為主死節乃持項王頭示魯父兄乃降漢以魯公禮塟項王又曰樂毅去燕之趙趙王欲圖燕毅泣曰臣事昭王猶事大王若獲戾施在他國終身不敢謀趙之徒𨽻況燕昭王後嗣乎又曰欒布梁人也彭越為家人時常與布遊及漢誅彭越夷三族梟首雒陽下詔有收視者輒捕之布時為越使齊還奏事彭越頭下祠而哭之吏捕以聞上召布罵曰若與彭越反耶吾禁人勿收若獨祠而哭之與反明矣趣烹之方提趣湯布顧曰願一言而死上曰何言布曰方上之困彭城敗滎陽成臯間項王所以遂不能西徙以彭越居梁地與漢合從苦楚也當是之時彭王一顧與楚則漢破與漢則楚破且垓下之㑹㣲彭王項氏不亡天下已定彭王剖符受封亦欲傳之萬世今漢一徵兵於梁彭王病不得從而疑以為反反形未見以苛案誅之臣恐功臣人人自危也今彭王已死臣生不如死請就烹於是上乃釋布拜為都尉漢書曰樓䕶有故人吕公無子歸䕶託身䕶與吕公及妻吕嫗同食䕶妻子頗厭吕公䕶聞之流涕責子曰吕公以窮老託身於我義所當奉遂養吕公終身又曰衛青日衰而霍去病日貴青故人門下多事去病輒得官爵唯獨任安不去又曰卜式河南人初以田畜為事弟竒忽請於式欲分財異居式便脫身出獨取羊百頭遂入山放牧經十餘年十倍於初却買田宅居焉弟竒悉破其産矣式輒復分與之漢書曰李固被誅梁冀乃露固尸於四衢令有敢臨者加其罪固弟子汝南郭亮年始成童遊學洛陽左提章越右秉鈇鑕詣闕上書乞收固屍不許因徃臨哭陳辭於前遂守喪不去夏門亭長呵之曰李杜二公為大臣不能安上納忠而興造無端卿曹何等腐生公犯詔書干試有司乎亮曰亮含隂陽以生戴乾履坤義之所重豈知性命何為以死相懼太后聞而不誅乃聽得襚斂歸葬之又曰梁冀諷有司劾杜喬遂執繫之死獄中與李固俱暴屍於城北故人莫敢視者喬故掾陳留楊匡聞之號哭星行到洛陽乃著故赤幘託為夏門亭吏守衛屍喪驅獲蠅蟲積十二日都官從事執之以聞梁太后義而不罪匡於是帶鈇鑕詣闕上書乞杜李二公骸骨太后許之成禮殯殮送喬喪還家葬送行服隱匿不仕又曰袁中子秘為郡門下議生黄巾起秘從太守趙謙擊之軍敗秘與功曹封觀等七人以身扞刃皆死於陣謙以得免詔復秘等門閭號曰七賢又曰陳蕃既被害友人陳留朱震時為銓令聞而棄官哭之收塟蕃屍匿其子逸於甘陵界中事覺繫獄合門桎梏震受拷掠誓死不言故逸得免又曰史弼遷河東太守斷絶書屬中常侍侯覽遣諸生齎書請之并求假鹽稅弼大怒乃付安邑獄拷殺之覽遂詐作飛章下司𨽻誣弼誹􅉪檻車徵人莫敢近者唯前孝廉裴瑜送到崤澠之間大言於道傍曰明府摧折虐臣選德報國如其獲罪足以垂名竹帛願不憂不懼弼曰誰謂荼苦其甘如薺昔人刎頸九死不恨及下廷尉詔獄平原吏人奔走詣闕訟之又前孝廉魏劭毁變形服詐為家僮瞻䕶於弼弼遂受誣事當棄市邵與同郡人賣郡邸行賂於覽得減死罪一等論輸左校時人或譏曰平原行貨以免君無乃蚩乎陶邱洪曰文王羑里閎散懷金史弼遭患義夫獻寳亦何疑焉於是議者乃息又李爕字德公初李固既策罷知不免禍乃遣三子歸鄉里時爕年十三有頃難作下郡收固三子二兄受害爕姊文姬乃告父門生王成曰君執義先公有古人之節今委君以六尺之孤李氏存滅其在君矣成感其義乃將爕乘江東下入徐州界内令變名姓為酒家傭而成賣卜於市各為異人隂相徃來爕從受學酒家異之意非恒人以女妻爕爕專精經學十餘年間梁冀既誅而災𤯝屢見明年史官上言宜有赦令又當存錄大臣寃死者子孫於是求固後爕乃以本末告酒家酒家具車重厚遣之皆不受後王成卒爕以禮塟之感傷舊恩每四節為設上賔之位而祠焉又曰李膺門生故吏及其父兄並被禁錮時侍御史蜀郡景毅子顧為膺門徒而未有錄牒故不譴毅乃慨然曰本謂膺賢遣子師之豈可以漏脫名籍苟安而已遂自表免歸時人義之後漢段熲討羌凉州刺史郭閎貪其功稽留熲軍義從者日役久戀鄉悉反叛郭閎罪歸熲熲坐徵下獄輸作左校羌凉覆沒營場吏人守闕訟熲以千數朝廷知熲為郭閎所誣詔問其狀熲謝罪不敢言枉京師稱之為長者焉又曰雷義字仲翁為尚書郎同時郎坐事當居刑義黙自表取罪論免同臺郎覺之委位白上乞贖義罪順帝皆除其罪東觀漢記曰杜林弟成物故隗囂乃聽林持喪東歸既遣而悔追令刺客楊賢於隴坻遮殺之賢見林身推鹿車載致弟喪乃歎曰當今之世誰能行義我雖小人何忍殺義士因亡去又曰鮑永字君長為司𨽻校尉行縣到京兆灞陵過更始冡引車入陌欲下從事諫止之曰親北面事過其墓雖以獲罪司𨽻不辭也遂下車哭盡哀西至右扶風推牛上荀諫冡上問公卿曰奉使如此何如時大中大夫張湛對曰仁者百行之宗忠者禮義之至也仁不遺舊忠不忘君行之高者也上悅又曰肅宗崩廉范奔赴敬陵時廬江郡掾嚴麟奉章弔國俱㑹於路麟乘小車塗深馬死不能自進范見而愍然命從騎下馬與之不吿而去麟事畢不知馬所歸緣蹤訪之或謂麟曰故蜀郡太守廉叔度好賙人窮今奔國喪獨當是耳麟亦素聞范名以為然即牽馬造門謝而歸之世伏其好義又曰李善字次孫南陽人本同縣李元蒼頭建武中疫病元家相繼死沒唯孤兒續始生數旬而有資財千萬諸奴私共計議欲謀殺續分其財産善乃潜負續逃亡隱山陽瑕邱界中親自哺養乳為生湩推燥居濕備嘗艱勤續雖在孩抱奉之不異長君有事輒長跪請白然後行之閭里感其行皆相率脩義續年十歲善與歸本縣脩理舊業吿奴婢於長吏悉收殺之時鍾離意為瑕邱令上書薦善行狀又曰索盧放字君陽東郡人署郡門下椽更始時使者督行郡國太守有事當斬放前言曰今天下苦王氏之虐政戴仰漢德傳車所過未聞恩澤而斬郡守恐天下惶懼各自疑也使有功不如使有過遂解衣而前願代太守斬使者義而赦之由是顯名又曰魏譚字少聞王莽末政亂盜賊起人民相食譚為夷所得等輩數十皆縛束當梢就噉見譚貌謹勅獨放令主炊養有夷長公哀譚謂曰汝曹皆當以次死哀縱汝急此去譚不肯去叩頭曰我常為諸君主炊養食馨肉飢香餘皆菜食羸痩肉腥臊不可食願先等輩死長公義之即相謂此兒有義可哀縱也賊遂皆放之數十人皆得脫又曰更始即位舞隂大姓李氏擁城不下更始遣柱天將軍李寳降之不肯云聞宛之趙氏有孤孫喜信義著聞願得降之更始徵喜使詣舞隂李氏遂降又曰桓典字公雅舉孝廉為郎居無㡬㑹國相王吉以罪被誅故人親戚莫敢至者典獨棄官收斂歸塟服喪三年負土成墳為立祠堂盡禮而去又曰劉平字公子楚郡人更始時天下亂平弟仲為賊所殺其後賊復忽然而至平扶侍其母奔走逃難抱仲遺腹女而棄其子母欲還取之平不聽曰力不能兩活仲不可以絶類遂去不顧與母俱匿野澤中平朝出求食逢餓賊將烹之叩頭曰今旦為老母求菜老母待曠為命願得歸食母畢還就死因涕泣賊哀而遣之平還食母訖因白曰属與賊期義不可欺遂還詣賊衆皆大驚相謂曰常聞烈士今乃見之子去矣吾不忍食子於是得全又曰汝南王琳字巨尉年十餘歲弟季出遇赤眉賊將為所哺琳自縛請先季死賊矜而放之謝承後漢書曰天下亂人相食趙孝弟禮為餓賊所得孝聞之即自縛詣賊曰禮久饑羸痩不如孝肥飽賊大驚放之謂曰可歸更持米糒來孝求不能得復徃報賊願就烹衆異之遂不害又曰姜肱字伯淮彭城人肱與二弟仲海季江俱以孝著聞肱常與季江謁郡夜於道遇盜欲殺之肱兄弟爭死賊遂兩釋但奪衣資而已既至郡中見肱無衣服怪問其故肱託以他辭終不言盜聞而感悔後乃就精廬求見徵君肱與相見皆叩頭謝罪而還所略物肱不受勞以酒食而遣之又曰謝翊字子相陳國人張季禮嘗弔師喪大氷寒車毁牛病不能進罷曵道路翊行於汝南界中逢之素與䟽濶下馬與語便推所乘牢車强牛與之供其資粮不吿姓名又曰梁國車章為縣功曹令黄拳為人所誣章証其無罪當下筆立辭乃以斧砍右手五指閉口死獄中又曰㑹稽戴就為郡倉曹掾太守為州所奏見收持吏以鐵針刺手爪中使以把土就十爪皆墮地終無撓辭又曰張儉為東部督郵時中常侍矦覽家在防東殘暴百姓所為不軌儉舉劾覽及其母罪惡請誅之遏絶章表並不得通由是結仇覽等鄉人朱並素性佞邪為儉所棄並懷怨恚遂上書吿儉與同郡二十四人為黨於是刋章討捕儉得亡命困迫遁走望門投止莫不重其名行破家相容復流轉東萊止李篤家外黄令毛欽操兵到門篤引欽謂曰張儉知名天下而亡非其罪縱儉可得寧忍執之乎欽因起撫篤曰蘧伯玉耻獨為君子足下如何自專仁義篤曰篤雖好義明公今日載其半矣欽歎息而去又曰彭修州辟從事時賊張子林等數百人作亂郡言州請修守呉令修與太守俱出討賊賊望見車馬競交射之飛矢雨集修以身障扞太守而為流矢所中死太守得全賊素聞其恩信即殺弩中修者餘悉降散言曰自為彭君故降不為太守服也魏志曰閻温字伯儉天水西城人守上邽令馬超奔上邽郡人任養等舉衆迎之温止之不能禁乃馳還州超復圍州甚急乃遣温密出告急於夏侯淵賊圍數重温夜從水中潛出明日賊見其跡遣人追遮之於顯親界得温執還詣超超解其縛謂曰今成敗可見若從吾言反謂城中東方無救此轉禍為福之計也不然今為戮矣温偽許之超乃載温詣城下温向城大呼曰大軍不過三日至免之超怒數之曰足下不為命計耶温曰夫事君有死無貳而公乃欲令長者出不義之名吾豈苟生者乎超遂殺之又曰董卓遷帝長安幽州牧劉虞署田疇為從事奉使得報馳還未至虞已為公孫瓚所害疇至謁祭虞墓陳發章表哭泣而去瓚聞之大怒購求獲疇謂曰汝何哭劉虞墓而不送章報於我疇荅曰漢室衰頽人懷異心唯劉公不失忠節章報所言於將軍未美恐非所樂聞故不進也今將軍方舉大事以求所欲既滅無罪之君又讐守義之臣誠行此事則燕趙之士將背東海而死豈忍有從將軍者乎瓚壯其對不誅又曰初濟隂王思與梁習俱為西曹令史思直日白事失太祖㫖太祖大怒教召主者將加重辟時思近出習代徃對已被收執思乃馳還自陳已罪罪應受死太祖歎習之不言嗟思之識分曰何意吾軍中有義士二人乎又曰牽招字子經袁紹辟招為督軍從事紹卒又事紹子尚後遼東送袁尚首懸在馬市牽招覩之悲感設祭頭下太祖義之又曰龎濟字子異初以凉州刺史從事守破羌長㑹武威太守張猛反殺刺史邯鄲商猛令敢有臨喪死不赦濟聞之棄官晝夜奔走號泣喪所訖詣猛門懷匕首欲因見以殺猛猛知其義士勅遣不殺由是以忠烈聞魏略下脂習除太醫令與孔融親善㑹融被誅當時許中與融善者莫敢收恤而習獨徃撫而哭之曰文舉卿捨我而死吾何以生為哀歎無已太祖收習欲理之尋以其事直見原蜀志曰曹公東征擒雲長以歸拜為偏將軍禮之甚渥曹公壯其為人而察其無久留意謂張遼曰卿試以情問之遼以問焉雲長曰吾極知曹公待我厚然吾受劉將軍恩誓以共死不可背之吾終不留吾要當立効以報曹公而後乃歸遼以其言報曹公公曰事君不忘其本天下義士也度何時去遼曰受公恩必効力而後去也及後殺顔良曹公知其必去重加賞雲長拜書告辭而奔先主左右欲追之曹公曰彼為其主勿追也呉志曰陸瑁同郡徐原居㑹稽素不相識臨死遺瑁書託孤瑁為起墳收導其子養之王隠晉書曰鄧攸遭石勒亂負妻子行入草遇賊失牛馬攸語其妻吾弟早亡唯有遺民今當步擔兩兒便當盡死不如自棄兒抱遺民吾後猶當有兒婦乃從之又曰趙王倫害張華之時洛中震悚唯閻續詣東市號哭吊屍而撫之曰早語君遜位而不肯去今果不免禍干寳晉記曰宣王討王陵發令狐遇冡暴屍兖州武吏東平馬隆託廬三年種植松柏一州之士愧之漢晉春秋曰文王誅鍾㑹為功曹向雄收塟王召而責之雄曰昔先王掩骨埋胔仁流枯骨當時豈先卜其功罪而後塟哉今王誅既加於法已備雄感義收塟於教無闕法立於上教𢎞於下以此訓物雄曰可矣何必使雄背死違生以立於時殿下讐懟枯骨捐之中野百歲之後為臧獲所笑豈仁賢所掩哉王悅與宴談而遣之三十國春秋曰成都王頴禦長沙王乂於建春門陸機敗遁走頴誅機及弟雲夷三族機呉人而在寵族之上人多惡之成都王嬖人孟玖素不快於雲及機建門之敗機衆多喪牽秀譖之於頴言機持兩端孟玖復構之於内使牽秀斬機初機之專征請孫拯為後軍司馬至是收拯下獄拷捶數百兩髁骨見終言機寃吏知拯義烈謂拯曰二陸之死誰不知枉君何不愛身拯仰天曰陸君兄弟世之竒士有顧於吾吾危不能濟死復相誣非吾徒也乃夷三族拯門人費慈自詣頴明拯之寃拯喻之曰吾唯不負二陸死自吾分卿何為爾耶慈曰僕又安負君而求生乎固明拯寃玖乂疾之亦并見害太平御覽卷四百二十
