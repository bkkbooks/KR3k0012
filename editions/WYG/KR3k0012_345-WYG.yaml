body:
  text: 太平御覽卷三百四十五宋李昉等撰兵部七十六刀上釋名曰刀到也以斬伐到其所乃撃之也其末曰鋒言若鋒刺之毒利也其本曰環形似環也其室曰削削峭也其形峭殻裹刀體也室口之飾曰琫琫捧也捧來口也下末之飾曰㻫㻫卑也在下之言也巨刀曰拍俾帶時拍體旁也又曰露拍言露見也佩刀在佩旁之刀也或曰容刀為刀形而㡬刃備容儀而已剪刀剪進前也書刀給書簡札有所刋削之刀也封刀鉸刀皆隨時名之也說文曰刀兵也象形㓵五各切刀劒刃也削俾也欹㓹曲刀也鞞布頂切剞居綺切㓹居衛切字林曰琫佩刀下飾也天子以玉諸侯以金㻫佩刀飾也太公兵法曰刀之神名曰脫光尚書曰赤刀大訓𢎞璧琬琰在西序孔安國注曰寳刀赤刀削也大訓虞書也詩曰執其鸞刀又曰何以舟之維玉及瑶鞞琫容刀舟帶也禮記曰割刀之用鸞刀之貴貴其義也左傳曰子皮欲使尹何為宰子産曰猶未能操刀而使割也榖梁曰孟勞魯之寳刀也論語曰子之武城聞弦歌之聲夫子莞爾而笑曰割雞焉用牛刀春秋繁露曰禮之所為興也刀之在右白虎之象也春秋演孔圖曰八政不中則天雨刀史記曰郭觧姊子負觧之勢與人飲使之釂子曜切非其任强灌之人怒㧞刀刺殺解姊子亡去漢書曰昭帝遣李陵故人隴西任立政等三人俱至匈奴招陵立政等至單于置酒賜漢使者李陵衛律皆侍坐立政等見陵未得私語即目視陵而數自循其刀環握其足隂諭之言可歸漢也又曰龔遂為渤海太守民有帶持刀劒者使賣劒買牛賣刀買犢何為帶牛而佩犢者也又曰蓋寛饒奏事上以為怨謗下吏寛饒引佩刀自剄北闕下衆莫不憐之又曰李廣利為貳師將軍征大宛軍中無水㧞佩刀刺山飛泉涌出又曰王尊為東平王相王曰願觀相國佩刀尊前引刀視王後漢書班固與弟超書曰竇侍中遺仲升楚騰陵錯横刀􅀈皂削一枚金錯半垂刀一枚又曰河南尹朱雋董卓陳軍事卓折雋曰我百戰百勝决之於心卿勿妄說且汚我刀續漢書輿服志曰佩刀乗輿黄金通身貂錯半蛟魚鱗金漆錯雌黄室五色諸侯黄金錯環挾半杖墨室公卿百官皆淳墨不半杖小黄門郎雌黄室中黄門郎朱室童子皆虎𤓰文虎賁黄室虎文其將白虎文皆以白珠蛟為標口之飾乗輿者加翡翠山紆嬰其側謝承後漢書曰丹陽方儲為郎中章帝使文郎居左武郎居右儲正住中曰臣文武兼備在所用施上嘉其才以繁亂絲付儲使理之儲㧞佩刀三斷之對曰反經任勢臨事冝然又曰應奉得賜金錯把刀東觀漢記曰朱暉字文季年十三與外氏家屬入宛城道遇賊欲奪婦女衣暉㧞刀曰錢物可得諸母衣不可奪今日朱暉死也賊義之笑曰童子内刀遂放遣又曰賜鄧遵金對鮮卑緄帶一具金錯刀五十辟把刀墨再屈環横刀金錯屈尺八佩刀各一又曰祭遵襲畧陽遣護軍王忠皆持鹵刀斧伐樹開道至畧陽襲隗囂又曰班超曰臣乗聖威神出萬死之志冀立鈆刀一割之用又曰馬嚴為陳㽞太守建初中嚴病遣功曹吏李龔奉章詣闕上親召見龔問疾病形狀以黄金十斤佩刀書刀革帶付龔賜嚴遣太監送方藥又曰張歩攻耿弇營飛矢中弇股以佩刀截之左右無知者獻帝春秋曰越騎校尉汝南伍孚忿董卓無道欲身自殺之挾佩刀詣卓孚語畢辟出卓至閤執手孚因引刀刺卓卓多力却不中即殺孚英雄記曰董卓謂袁紹曰劉氏種不足復遺紹勃然曰天下徤者豈唯董公横刀長揖徑出懸莭於上東門而奔冀州漢魏春秋曰劉琮乞降不告𤣥徳遂亦不知久而覺之遣所親問琮琮令宋忠詣之宣白是時曹公在宛𤣥徳驚駭謂忠曰卿諸人作事如此不早相語今禍至告我不亦大劇乎引刀向忠曰今斷卿頭誠不足以解忿亦耻大丈夫臨别復殺卿輩也魏志曰王祥事後母至孝後母嫉之伺祥卧以刀斫之值祥出外持刀斫着被祥知不言如故又曰許禇從討袁紹於官渡時常從士徐他等謀為逆以禇常侍左右憚之不敢發伺禇休下日他等懐刀入禇至下舎心動即還侍他等不知入帳見禇大驚愕他色變禇覺之即撃殺他等太祖益親信之出入同行不離左右又曰典韋陳㽞人形貎魁梧膂力過人好莭俠襄邑劉氏與睢陽李禮為讎韋為報之禮故富春長備怨甚謹韋乗車載鷄酒偽為候者門開懐匕首入殺禮并殺其妻徐出取車上刀㦸歩去禮居近市一市盡駭追者數百莫敢近之魏武帝令曰往歳作百辟刀五枚􅃴成先以一與五官將其餘四吾諸子中有不好武而文學將以次與之吳志曰孫堅至錢塘㑹海賊掠賈人堅行操刀上肆以手東西指麾若分部人以兵以還遮收賊賊望見為官兵捕之即委財物散走又曰孫權以公孫淵稱蕃遣張彌許晏至遼東拜淵為燕王張昭諫切權不能堪按刀而怒曰吳國士人入宫則拜孤出宫則拜君孤之敬君亦為至矣而數於衆折孤孤常恐失計昭熟視權曰臣雖知言不見用而每竭愚忠者誠以太后臨崩呼老臣於牀下遺詔顧命之言故耳因泣涕横流權擲刀置地與昭對泣吳書曰凌統怨甘寜殺其父操寜常備統不得讎之嘗於吕蒙舍㑹酒酣統乃以刀舞寜起曰寜能䨇㦸舞蒙曰寜雖能未若䝉之巧也因操刃持楯以身分之後權知統意因令寜將兵徙屯江表傳曰孫權㧞刀斫前奏案曰諸將吏敢復有言當迎曹操者與此案同蜀志曰初孫權以妹妻先主妺才㨗剛猛有諸兄風侍婢百餘人皆執刀侍立先主每入心常懔懔王隠晉書曰衛瓘監軍䕶軍鍾㑹素與瓘至厚坐則同牀行則同輿㑹書板上欲殺胡烈等示瓘瓘言不可㑹自削弃反問瓘何許聞消息相疑益露瓘厠上見烈故給使令出語三軍㑹逼瓘不得議定經宿不眠各横刀膝上陸機晉書曰王濬之在巴郡也夢懸四刀於其上甚惡之濬主簿李毅拜賀曰夫三刀為州而見四刀為益一也明府其臨益州乎後果為益州晉中興書曰初魏徐州刺史任城吕䖍有佩刀工相之以為必三公可服此刀䖍謂别駕王祥曰苟非其人刀或為害卿有公輔之量故以相與祥始辭之固强乃受祥為司空祥死之日以刀授弟覽曰吾兒􅒰凡汝後必興足稱此刀故以相與覽後奕世賢興於江東又曰孫恩者亦名靈秀瑯琊人孫秀之族也世奉事五斗米道恩叔㤗字敬逺師事錢塘杜子恭弟子子恭有内術嘗就人借𤓰刀其主求之子恭曰當送相還刀主行至嘉興有魚躍入船中破魚得𤓰刀其為神效往往如此又曰郭翻武昌人墜刀於水路人為取翻仍以與之路人不取至於三四固辭翻曰爾尚不取我豈能復得路人曰我若取此將為天地鬼神之所責矣翻知其終不受復沈刀於水路人悵然乃復驚没為取之翻於是不逆其意十倍刀價與之其亷不受惠皆此􅁼矣晋書曰元帝以劉琨為侍中太尉其餘如故并贈名刀琨荅曰謹當躬自執佩馘截二虜又載記曰慕容翰北投宇文歸既而逃還歸乃遣勁騎百餘追之翰遥謂追者曰吾既思戀而歸理無反面吾之弓矢汝曹足知無為相逼自取死也汝可百歩竪刀吾射中者汝便冝反不者可來前也歸騎解刀竪之翰一發便中刀鐶追騎乃散又曰赫連勃勃以叱干阿利領將作大匠發嶺北夷夏十萬人於朔方出北黒水之南營起都城勃勃自言朕方統一天下君臨萬邦可以統萬為名阿利性尤工巧然殘忍刻暴乃蒸土築城錐入一寸即殺作者而并築之勃勃以為忠故委營繕之任又造五兵之噐精銳尤甚既成呈之工匠必有死者射甲不入即斬弓人如其入也便斬鎧匠又造百錬剛刀為龍雀大環號曰大夏龍雀銘其背曰古之利噐吳楚湛盧大夏龍雀名冠神都可以懐逺可以柔邇如風靡草威服九區世甚珍之復鑄銅為大鼓飛亷翁仲銅駞龍獸之屬皆以黄金飾之列於宫殿之前凡殺工匠數千以是噐物莫不精麗蕭子顯齊書曰世祖武皇帝名􅄨字宣逺不豫徙御延昌殿乗輿始登階而殿屋鳴咤上惡之詔曰我識滅之後身上着盡天衣純烏犀導常所服身刀長短二口鐵環者隨我入梓宫北齊書曰綦毋懐文造宿鐵刀其法燒生鐵精以重柔鋌數宿則成鋼以柔鋌為刀脊浴以五性之溺淬以五持之脂斬甲三十札今襄國冶家所鑄宿鐵柔鋌是其遺法也刀猶甚快利但不能截札耳梁書曰席闡文為西中郎中兵叅軍領城局梁武帝之將起兵闡文蕭頴胄同焉仍遣客田祖恭私報帝并獻銀裝刀帝報以金如意南史曰韓子髙㑹稽山隂人也家本微賤侯景之亂寓都下景平陳文帝出守吳興子高年十六為總角容貌美麗狀似婦人於淮渚附部伍寄載還鄉里文帝見而問曰能事我乎子髙許諾子髙本名蠻子帝改名子髙性恭謹恒執備身刀唐書曰李嗣業京兆髙陵人也身長七尺壯勇絶倫天寳初隨募至安西頻經戰鬭于時諸軍初用陌刀嗣業善用之毎為隊頭所向必䧟又曰王及善初除右千牛衛將軍高宗曰朕以卿忠謹故與卿三品要職他人非搜辟不得至朕所佩大横刀在朕側知此官貴否河圗曰􅬝目勇敢重瞳天雨刀楚之邦宋均注曰項羽遁甲開山圖曰神芝五色生於名山之隂五色雲氣覆之其味甘苦以銅刀收之又曰霍山玊有石芝生大石上萬人牽終不㧞以竹刀割之即斷太公六韜曰大魯刀重一斤長四尺三百枚傳咸奏事曰尚書舊奏給介士二百人人給大銅口刀各一枚愽物志曰周書云西域獻火浣布昆吾氏獻切玉刀浣布汙燒之則潔切玉刀切玉如泥一云切玉如䗶蜜布漢魏世有獻者刀則未聞崔豹輿服注曰吳大皇帝有寳刀三一曰百錬二曰青犢三曰漏影拾遺記曰帝解鳴鴻刀賜東方朔朔曰此刀黄帝時採首陽之金鑄為此刀雄者已飛雌者獨在一出洞㝠記林邑記曰林邑王范文先是夷奴初牧牛洞中得鯉魚私將還欲食之其主檢求文恐因曰將礪石還非魚也主往看果是石文知異看石有鐵鑄石為兩刀呪曰魚為刀若斫石入者文當為此國王斫石即入人情漸附之裴淵廣州記曰石林竹勁利削為刀切象皮如纎茅楊泉物理論曰古有阮師之刀天下之所寳貴也阮之作刀受法於金精之虛七月庚辛見金神於冶監之門其人光色煒耀向神再拜神執其手曰子可教也阮致之閒宴設􅄿而問焉神教以水火之齊五精之陶用隂陽之候取剛軟之和行其術三年作刀千七百七十口而喪其明其刀平背狹刃方口洪首截輕微絶絲髪之系斫堅剛無變動之異世不恡百金精求不可得也其次有蘇家刀雖不及阮家亦一時之利噐也次有陽紀趙青間皆不能繼虞喜志林曰古人鑄刀以五月丙午取純火精以恊其數魏武帝内戒令曰百鎮利噐以辟不祥攝服姦宄者也搜神記曰宫亭湖孤石有估客下都逕其下見二女子云可為買兩量絲履自厚相報估客至都有好絲履并箱盛之自市一書刀亦在箱中既還以箱及香置廟中而去忘取刀湖中正汎忽有鯉魚跳入船中破魚得刀祖台志慳曰廷尉徐元禮嫁女從祖與外兄孔正陽共詣徐家道中有土墻見一小兒裸身正赤手持刀長五六寸企墻上磨甚駛獨語因跳車上曲蘭中坐反覆視刀輙䑛之至徐家門前桑樹下又跳下坐灰中復更磨刀日晡新婦就車中見小兒持刀入室便刺新婦新婦應刀而倒扶還解衣視小腹紫色如酒槃大炊頃便亡鬼子出門舞刀上有血塗桑樹火燃斯須燒神異經曰南荒之中有如之何樹三百年作華九百歳作實實有核形如棗子長五尺金刀割之則飴木刀割之則辛食之得地仙列仙傳曰丁次卿者不知何許人也漢順帝時賣刀遼東市時人名之丁氏次卿有寳刀神仙傳曰蜀人李阿傳世不老有古强者隨阿入青城山恐有虎狼取父大刀阿見而怒取强刀以撃石刀折散强竊憂刀敗阿復取刀左右撃地刀復如故還强也列異傳曰有神王方平降陳莭方家以刀一口長五尺一長五尺三寸名㤗山環語莭方曰此刀不能為餘益然獨卧可使無鬼入軍不傷勿以入厠溷且不宜久服三年後求者急與果有載車以錢百萬請刀録異傳曰有王更生者為漢中太守郡界有袁氏廟靈響更生過廟祭去而遺其刀遣小吏李髙還取李髙見刀在廟牀上髙進取去仰見座上有一君着大冠袍衣頭鬢半白謂髙曰可取還如言不道後吾當祐汝髙還如言不道後髙仕為郡守當復遷為郡髙時年已六十餘祖髙者百餘人髙乃道昔為更生小吏見遣至廟所取遺刀見廟神使吾莫道至今不敢道然心常以欺君為慙言畢此刀立刺髙心下須臾死廬江七賢傳曰漢武帝出淮陽到舒不覧城問曰此卿名何陳翼對曰卿名不覽上曰萬乗主所問不祥耶欲舉燔之翼曰臣言不欺佩刀當生毛欺則無毛也視之刀有毛長寸乃不燔列士傳曰專諸一剛刀置魚腹中以刺王僚列女傳曰龎娥親者酒泉龎子夏妻趙君安女君安為同縣李壽所殺三子遭疫而死壽大喜娥親聞曰李壽汝莫喜焉知娥親不手刃汝耶乃隂市刀志在殺壽後於都亭奮刀斫壽刀折㧞壽佩刀斷壽頭詣獄請死詔赦之吳時外國傳曰扶南諸王殺其國人以刀斫刺往往有不入者以汗露塗刀刃斫之乃入國人名之曰蟬也蒲元傳曰君性多奇思得之天然嘗於斜谷為諸葛亮鑄刀三千口鎔金造噐特異常法刀成白言漢水鈍弱不任淬用蜀江爽烈是謂大金之元精天分其野乃命人於成都取江水君以淬刀言雜涪水不可用取水者猶悍言不雜君以刀畫水云雜八升何故言否取水者方叩頭首伏云實於涪津渡負倒覆水懼怖遂以涪水八升益之於是咸共驚服稱為神妙刀成以竹筒密内鐵珠滿其中舉刀斷之應手虛落若薙生蒭故稱絶當世因曰神刀今之屈耳環者是其遺範也費禕别傳曰孫權以手中嘗所執寳刀贈之禕答曰臣不才何以堪明命然刀所以討不庭禁暴亂者也但願大王勉建功業同奬漢室臣雖闇弱不負東顧桂陽先賢畫讃曰成武丁以疾而終殮畢其友從臨武縣來至郡道與武丁相逢友曰子欲何之而不將人荅曰今吾南遊為過報小兒善䕶大刀到其門見其妻哭泣問之荅曰夫没友大驚曰吾􅃴與相逢乃發棺視了無所見遂除縗絰而心䘮之咸以武丁得神仙太平御覽卷三百四十五
