body:
  text: 太平御覽卷三百六十二宋李昉等撰人事部三姓名姓說文曰姓人所生也古之神聖人母感天而生子故稱天子因生以從女女生亦聲也易類謀曰黄帝吹律以定姓左傳隠八年曰無駭卒羽父請諡與族公問族於衆仲衆仲對曰天子建徳因生以賜姓因其所由生以賜姓謂若舜媯汭故謂陳為媯姓胙之土而命之氏諸侯以字諸侯位卑不得賜姓故其臣因氏其王父字為諡因以為族官有世功則有官族邑亦如之公命以字為展氏無駭公子展之孫故為展氏也又襄四年曰穆叔如晉范宣子逆之問焉曰古人有言曰死而不朽何謂也穆叔未對宣子曰昔匄之祖自虞以上為陶唐氏在夏為御龍氏在商為豕韋氏在周為唐杜氏晉主夏盟為范氏其是之謂乎穆叔曰以豹所聞此之謂世禄非不朽也史記曰太公望吕尚者東海上人其先祖嘗為四嶽佐禹平水土甚有功虞夏之際封於吕本姓姜氏從其封姓故曰吕尚漢書曰夏侯嬰為滕令故號滕公及曾孫頗尚主主隨外家姓號孫公故滕公子孫更為孫氏又曰戍卒婁敬求見說上曰陛下取天下與周異而都雒陽不便不如入闗據秦之固上以問張良良因勸上是日車駕西都長安拜婁敬為奉春君賜姓劉氏又曰灌夫頴隂人也父張孟嘗為頴隂侯灌嬰舍人因得幸進之至二千石故蒙灌氏姓為灌孟師古曰蒙冒也又曰衛青字仲卿其父鄭季河平陽人也以縣吏給事東侯家平陽侯曹壽尚武帝姊陽信長公主李與主家僮衛嫗通生青青有同産兄衛長君及子夫子夫自平陽公主家得幸武帝故青冒姓衛氏漢書曰京房字君明東郡頓丘人也房本姓李推律自定為京氏後漢書曰第五倫字伯魚京兆人也其先諸田人諸田徙園陵者多故以次第為氏崔鴻三十國春秋夏錄曰赫連勃勃下書曰朕之皇祖自北還幽朔姓改姒氏音殊中國故從母氏為劉子而從母之姓非禮也朕將以義易之帝王者係天為子是為徽實與天連今改姓曰赫連氏庻恊皇天之意其非正統皆以鐡伐為氏庻朕宗族子孫剛鋭如鐡皆堪伐人三國典畧曰周蔡祐字承先陳畱圉人齊安郡守襲之子也有膂力便騎射太祖以其戰功賜姓大利稽氏唐書曰康國即漢康居之國也其王姓温月氏先居張掖祁連山北昭武城為突厥所破南依葱嶺遂有其地枝庶皆以昭武為姓示不忘本也又曰則天朝􅀶州刺史琅琊王冲據􅀶州起兵冲父豫州刺史越王貞又舉兵於豫州與相應討平之改姓為虺氏又曰尚可孤東部鮮卑宇文之别種也代居松漠之間天寳末歸國𨽻安禄山後事史思明上元中歸順累授左右威衛二大將軍魚朝恩之統禁軍愛其勇力甚委遇之俾為養子奏改姓魚氏又曰李全畧者本姓王名簡為鎮州小將事王武俊元和中節度使王承宗殁軍情不安自㧞歸朝授代州刺史及長慶初鎮州軍亂害田𢎞正穆宗為之旰食以簡嘗為將召問其計簡遂極言利害願有以自效明年擢拜横海軍節度使賜姓李氏名全畧以崇寵之白虎通曰人所以有姓者何所以崇恩愛厚親親逺禽獸别婚姻也故紀世别類使生相愛死相哀同姓不得相娶皆為重人倫也姓者生也人禀天氣所以生者也詩云天生蒸民尚書曰平章百姓姓所以有百者何以為古者聖人吹律定姓以記其族人合五常而生正聲有五宫商角徵羽轉而相雜五五二十五轉生四時異氣殊音悉備故姓有百也所以有氏者何所以貴功徳下伎力或氏其官或氏其事聞其氏即可知矣所以勉人為善也或氏王父字者何所以别諸侯之後為興滅國繼絶世也王者之子稱王子王者之孫稱王孫諸侯之子稱公子公子之子稱公孫公孫之子各以其王父字為氏故春秋有王子瑕論語有王孫賈又有衛公子荆公孫朝魯有仲氏孟氏叔氏季氏楚有昭屈景氏齊有髙國崔盧氏以知其子孫也王者之子亦稱王子兄弟立而皆封也或曰王者之孫亦稱王孫刑徳放曰堯知命表稷契賜姓于姬臯陶典刑不表姓言天任徳逺刑禹姓姒祖昌意以薏苡生殷姓子氏祖以𤣥鳥子生也周姓姬氏祖以履大人跡生也風俗通曰萬類之中唯人為貴春秋左氏傳官有世功即有官族邑亦如之公羊譏衛滅邢論語貶昭公娶於吴誤同姓也盖姓有九或氏於號或氏於諡或氏於爵或氏於國或氏於官或氏於字或氏於居或氏於事或氏於職以號唐虞夏殷也以諡戴武宣穆也以爵王公侯伯也以國曹魯宋衛也以官司馬司徒司冦司空司城也以字伯仲叔季也以居城國園池也以事巫卜陶丘也以職三馬五鹿青牛馬也三輔舊事曰堯母字慶都配髙辛氏而生堯因主人伊長儒為姓謂之伊陳留風俗傳曰侯氏氏侯爵周㣲官失其守故以侯爵為姓又曰秦之先曰伯翳佐舜擾馴鳥獸錫姓曰嬴氏其後分封以國為姓有徐氏郯氏黄氏江氏文士傳曰束晢字廣微䟽廣後也王莾末廣曾孫孟造自東海避難歸蕪城改姓去踈之足為束氏世說曰諸葛令恢與王丞相共爭姓族前後王曰何不言葛王而言王葛諸葛曰譬如驢馬不言馬驢驢寜勝馬耶論衡曰孔子推律自知殷之苗也名禮記曲禮上曰名子者不以國不以日月不以隠疾不以山川此在常語之中為後難諱也春秋傳曰終將諱之又曰二名不偏諱孔子之母名徵在言徵不稱在言在不稱徵也又曲禮下曰君子已孤不更名重本也又大傳曰名者人治之大也可无慎也人治行以正人左傳桓公曰初晉穆侯之夫人姜氏以條之役生太子命之曰􅄷其弟以千畝之戰生命之曰成師師服曰異哉君之名子也夫名以制義義以出禮禮以體政政以正民是以政成而民聽易則生亂嘉耦曰妃怨􅀈曰􅄷古之命也自古有此言也今君命太子曰􅄷弟曰成師始兆亂矣兄其替乎又曰子同生以太子生之禮舉之公問名於申繻對曰夫名有五有信有義有象有假有類以名生為信若唐叔虞魯公子也以徳命為義若文王名昌武王名發也以類命為象若孔子首象居丘山取於物為假若伯魚生人有饋之魚因名之曰鯉取於父為類若子同生有與父同者也不以國君之子不自以本國為名也不以官不以山川不以隠疾不以畜牲不以噐幣周人以諱事神名終將諱之君父之名固非臣子所斥言故既卒則以木鐸狥曰舍故而諱新謂舍親盡之祖而諱新死者故以國則廢名以官則廢職以山川則廢主以畜牲則廢祀以噐弊則廢禮晉以僖侯廢司徒僖侯名司徒廢於中軍也宋以武公廢司空武公名司空廢於司城也先君獻武廢二山二山具傲也魯獻公名具武公名敖是以大物不可以命公曰是其生也與吾同物命之曰同物類也謂同日也又閔公曰成季之將生也桓公使卜楚丘之父卜之曰男也其名曰友及生有文在其手曰友遂以命之遂以為名又文公曰鄋瞞侵齊鄋瞞狄國名遂伐我公卜使叔孫得臣追之吉冬十月敗狄于鹹獲長狄僑如僑如鄋瞞國之君以命宣伯得臣待事而名其曰三子因名宣伯曰僑如以旌其功也又宣上曰楚鬭伯比淫于䢵子之女生子文棄諸莾中虎乳之䢵子畋見之使收之楚人謂乳為榖謂虎為於莵故命之鬬榖於莵又宣上曰鄭文公有賤妾曰燕姞夢天使與巳蘭曰予是為伯儵余爾祖也以是為而子以蘭有國香人服媚之如是既而文公見之與之蘭而御之辭曰妾不才幸而有子將不信敢徵蘭乎公曰諾生穆公名之曰蘭又定下曰魯苫越生子將待事而名之楊州之役獲焉名之曰陽州欲自比僑如漢書曰司馬相如小名犬子及長慕藺相如為人更名相如後漢書曰趙岐字臺卿生於御史臺因字臺卿東觀漢記曰廉范為蜀郡守令民不禁火百姓皆喜家得其願時生子皆以廉為名者千數魏志曰程昱本名立夣登太山捧日人或以夣告太祖太祖曰終為吾腹心遂上加日又曰鄧艾字士載棘陽人年十二隨母至頴川讀故太丘長陳寔碑文言為世範行為士則艾遂自名範字士則後宗族有與同者故改焉又曰王昶字文舒太原人其為兄子及子作名字皆一依謙實以見其意故兄子黙字處靜沉字處道其子渾字𤣥冲深字道遂書戒之曰夫人之道莫大於寳身全行以顯父母吴志曰立子􅓣為太子注曰休制曰孤今為四子作名字太子名􅓣音如湖水灣澚之灣字􅔾音如迄今之迄次子名音如兕觥之觥字􅀢音如𤣥㘋首之㘋音𤣥次子名􅀈音如草莾之莾字盥音如舉物之舉次子名􅀈音如褒衣下寛大之褒字寅音如有所推持之推此都不與世所用者同故抄萵文㑹合作之江表傳曰頋雍從蔡伯喈學專一清淨敏而易教伯喈貴異之謂曰卿必成致今以吾名與卿故雍與伯喈同名由此也吴錄曰雍字元歎言為蔡邕之所歎也晉書曰謝𤣥破符堅於淮淝先有童謡云誰謂爾堅石打破故桓豁以石名子以邀其功晉中興書曰咸和元年當徵蘓峻司徒導欲出王舒為外援及更拜撫軍將軍㑹稽内史秩中二千石舒上䟽以父名㑹不得作㑹稽朝議以字同音異於禮无嫌舒陳音雖異而字同乞換他郡於是改㑹字為鄶古㑹切舒不得已親職崔鴻十六國春秋前涼錄曰李弇字子玉隴西狄道人也弇本名良又妻姓梁張駿戱之曰卿名良妻姓梁夫妻相同稱子孫將何以目其舅氏昔耿弇以少年立功立事吾今賴卿有同於耿氏乃賜名曰弇又曰陳安成紀平庄人也少慷慨讀書見許禇而慕之乃自字虎侯後魏書曰游肇字伯始髙祖賜名尚書令髙肇世宗之舅為百寮懾憚以肇名與已同飲令改易肇以髙祖所賜秉志不許髙肇甚衘之世宗嘉其剛梗又曰太和初宋弁為殿中郎中髙祖嘗因朝㑹之次歴訪治道弁年少官微自下而對聲姿清亮進止可觀髙祖稱善者乆之因是大被知遇賜名為弁意取弁和獻玉楚王不知寳也宋書曰廢帝諱昱字德融小字惠震明帝長子也大明七年正月辛丑生於衛尉府太宗諸子在孕皆以周易筮之即以所得之卦為小字故帝字惠震又曰王景文羙風姿好言𤣥理少與陳郡謝莊齊名太祖甚相欽重故為太宗娶景文妹而以景文名名太宗又曰顔峻為丹陽尹加散騎常侍先是峻末有子而大司馬江夏王義恭諸子為元㓙所殺至是並各産男上自為制名名義恭子為伯禽以比魯公伯禽周公旦之子也名峻子為辟疆以比漢侍中張辟疆張良之子也宋書曰謝莊五子䬅力計切朏顥嵸音緫􅊪音藥世謂莊名子以風月景山水梁書曰張嵊字四山初嵊父稷為剡令至嵊亭生之因名嵊字四山少敦孝行年三十餘猶斑衣受稷杖動至数百收淚歡然三國典略曰周陸逞字季明綏德郡公通之弟也初名彦字世雄魏文帝嘗從容謂之曰爾既温裕何乃字世雄且為世之雄非所宜也於爾兄弟又復不類遂改焉南史曰陳文帝嘗謂宣帝曰我諸子皆以伯為名汝諸子宜用叔為稱宣帝因以訪毛喜喜即條自古名賢杜叔英喜虞叔卿等二十餘人以啟之文帝稱善白虎通曰人必有姓名何以吐情自紀尊事人者也論語曰名不正則言不順三月名之何天道一時物有其變人生三月目煦亦能咳笑與人相答故因其始有知而名之故禮傳曰子生三月則父名之名之於祖廟者謂子之親廟也明當為宗祖子也一說名之於燕􅃦名者㓜小卑賤之稱也質畧故於燕􅃦殷以日名子何殷家質直故以生日名也尚書言太甲帝乙武丁也於名臣亦得以甲乙生日名子不使亦不止也以尚書道殷臣有巫敢有祖已也何以諸侯不象王者以生日名子也以大王名亶甫王季名歴此殷之諸侯也不以子丑為名何曰甲乙者幹也子丑者枝也幹者本本貫故以甲乙為名也名或兼或單何名子非一或聽其聲律定其名或依其事旁於形故或兼或單也依其事者若后稷是也弃之因名為棄旁其形者孔子首類魯尼丘山故為之名也風俗通曰袁賀字元服祖父京為侍中安帝始加元服京入賀而賀始生因名之曰賀而字元服鄭𤣥别傳曰𤣥一子名益字益思年二十三相國孔府君舉學亷府君以多冦屯都昌為賊管亥所圍乃令從家將兵奔救遇賊見害時年二十七也妻有遺體生男𤣥以太嵗在丁卯生此男以丁卯旧生生义手理與𤣥相似故名曰小同孟宗别傳曰孟宗為豫章太守民思其惠路有行歌故時之生子者多以孟為名江祚别傳曰祚為南安太守民思其徳生子多以為名字蜀禮書曰賈夷字景叔梓潼人也太始初内移河東少仕晉臺為倉部令史懐帝時為安富令中原䘮亂玉衡七年歸國武帝素聞夷名重之皇子雅生因名賈夷秦記曰後帝泓字元時東宫生邵𢎞言于父曰君之於臣先生之與其門人名之可也至於同官之於僚黨同姓之於昆弟同門之於朋友可以稱其字而不可斥其名故公羊傳曰名不如字者非謂其人之名不如其字尊乃謂為人所字則近乎見尊為人所名則近乎見卑也古之君子之名子也必以信義而擇淑令所以祥其名也不以官軄所以殊其名也不以畜弊所以重其名也不以隠疾所以顯其名也遍告内外所以昭其名也書而藏之所以寳其名也賤者避焉所以貴其名也冠而有字所以尊其名也名成乎禮字依乎名名字之本字名之末也為本故尊為末故卑尊故其禮詳卑故其事畧也且婦人无名故賤於丈夫野人无名故賤於學士名者己之所以事尊尊者之所以命己字則己之所以接卑卑者所以稱己未有用之于尊而為卑用之于卑而為尊者也捜神記曰齊惠之妾蕭桐子見御有身以其賤不敢言也取薪而生頃公於野又不敢舉也貍乳鸇覆之人見而收之因名无野何稹𤣥壽賜名叙曰新婦荀氏所生女以歳在丁丑四月五日日始出時生此月斗建巳其日又巳其時加卯甲乙卯皆東南春夏天地動發萬物滋生令月吉之善時也又於易卦震位在卯㢲位在巳震為長男㢲為長女而此女孫正用兹日斯時始胆日月豈依先祖之靈寔臨祐之𤣥髪素顔婦人之上姿也壽考无疆生民之至願也故賜名曰𤣥壽焉太平御覽卷三百六十二
