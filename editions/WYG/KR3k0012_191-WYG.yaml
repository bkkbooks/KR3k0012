front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_191-1a, image: WYG0894/WYG0894-0687a.png}
body:
  text: 太平御覽卷一百九十一宋李昉等撰居處部十九府庫藏廏市府庫藏釋名曰庫舎也物在舎也齊魯謂庫為舎也説文曰庫兵車所藏也帑金帛所藏也府文書所藏也禮記曰季秋之月命百工審五庫之量蔡邕月令章句曰五庫者一曰車庫二曰兵庫三曰祭器庫四曰樂器庫五曰宴器庫又月令曰季春命有司開府庫出幣帛聘名士周禮曰太府掌九貢九賦九功之貳以受其貨賄之入頒其貨於受藏之府頒其賄於受用之府凡萬民之貢以充府庫太府下大夫若今之司農又曰玉府掌王之金玉玩好兵器凡良貨賄之藏共王之服玉珮玉珠玉含玉諸侯則共珠盤玉敦又曰内府掌受九貢九賦九功貨賄良兵器以待邦之大用凡四方之幣獻之金玉齒革兵器凡良貨賄入焉又曰外府掌邦布之出入以供百物而待邦之小用注布帛之藏帛曰布小用賜也又天官玉府曰合諸侯則供珠盤鄭𤣥注曰以珠飾盤承牛耳又春官天府曰天府掌祖廟之守藏與其禁令凡國之玉鎮大寶器藏焉若有大祭大喪則出而陳之既事藏之凡官府鄉州及都鄙之治中受而藏之以詔王察郡吏之治察察其黜陟也治中謂治簿書之要尚書武成篇曰武王克商散鹿臺之財紂所積之府庫曰鹿臺春秋文耀鈎曰咸池天潢五星五帝車舎也宋鈞注曰舎庫也五帝車府曲禮天子六府曰司土司木司水司草司器司貨典司六職注謂主藏物之税也左傳曰晉侯之豎頭須守藏者也其出也竊藏以逃盡用以求納之論語曰魯人為長府藏貨曰府閔子騫曰仍舊貫如之何何必改作漢書曰髙祖七年蕭何立東闗前殿武庫又曰立武庫以藏禁兵又曰枚乘諫呉王曰夫漢并二十四郡十四諸侯轉輸錯出軍行數千里不絶於郊其珍怪不如山東之府如淳曰吳王之府藏也謝承後漢書曰靈帝光和中武庫屋自壊司𨽻許氷上書曰武庫禁兵所在司國之禁為災深矣魏志曰嘉平中二魚集於武庫屋上晉書曰武庫封閉甚宻忽有雉雊張華曰此必蛇化為雉視之果有蛇蛻也又曰趙王倫既還諂事賈后因求録尚書事後又求尚書令張華與裴頠皆固執不可由是致怨倫遂疾華如讐武庫火華懼因此變作列兵固守然後救之故累代之寳及漢髙帝斬蛇劒王莽頭孔子履盡焚焉時華見劒穿壁而飛莫知所向又曰裴楷有知人之鑒目鍾會云如觀武庫森森但見矛㦸在前商君書曰湯武破桀紂海内無患遂築五庫藏五兵偃武也鍾會芻蕘論曰國之稱富者在乎豐人非獨謂府庫盈倉廩實非上天所降皆資之於人人困則國虚矣洞㝠記曰元狩四年将夕有黄髮叟懐内探徑尺玉以授帝帝以玉還寶庫即龍玉也王子年拾遺記曰糜竺用陶朱公計術日益億萬之利貲擬王家有寶庫千間世説曰郗公大聚斂錢千萬許嘉賓嘗於朝旦問訊郗家法子弟不坐因倚語移時遂及錢貨事郗云汝正當欲得我錢耳乃聴一日開庫任意用郗公始止謂損數百萬許嘉賓遂一日中乞與人都盡郗公聞之驚怪不能已拾遺録曰太上皇以寶劒賜髙祖及吕后藏於瑤庫守者見白氣從户中出如龍蛇吕后更瑤庫名曰靈金藏及諸吕擅權白氣亦滅時惠帝即位以此貯禁兵名曰靈金府韓詩外傳曰晉平公藏寶之臺燒救火三日三夜公子晏賀曰臣聞王者藏於天下諸侯藏於百姓農夫藏於囷倉商賈藏於篋匱今百姓乏於外而賦斂無已者桀紂殘賊而為天下戮今皇天降災於藏臺是君之福也荘子曰天地有官陰陽有藏列子曰范氏之藏大火商丘開入火往還無難色埃不漫身不燋子華之家乃謝之晉摯虞武庫屋銘曰有財無義惟家之殃無愛糞土以毁五常張衡西京賦曰武庫禁兵設在蘭錡曹毗魏都賦曰白藏之庫戎儲攸歸注曰白藏庫在西城有屋一百七十四間爾雅秋為白藏因以為名潘岳詩曰微火不戒延我寶庫廏説文曰廏馬舍也釋名曰廏鳩也聚也牛馬之所聚也詩曰乘馬在廏左傳曰荘二十九年新作延廏書不時也凡馬日中而出日中而入注日中春秋分也治廏當以秋分今以春作不時也榖梁傳曰二十九年新延廏者法廏注周禮天子十二閑言法廏者六閑之舊制又曰晉獻公欲伐虢荀息曰何不以屈産之乘垂棘之璧借道於虞也公曰此晉之寶也息曰是我取之中府而藏之外府取之中廏而藏之外廏禮記雜記曰廏焚孔子拜郷人為火来者拜之士一大夫再亦相子之道也論語曰廏焚子退朝曰傷人乎不問馬史記曰夏侯嬰為沛廏司御每送客還過髙祖語未嘗不移日東觀漢記曰順帝漢安元年始置承華廏舎令又曰靈帝光和四年初置緑驥廏領受郡國調馬調謂徵發漢舊儀曰天子六廏未央廏承華廏皆萬匹三輔黄圖曰未央宫有金花廏輅軨廏大廏果馬乾梁廏騎馬廏大宛廏胡河廏騊駼廏凡廏九在城内孟子曰廏有肥馬野有餓殍此率獸而食人也郡國志曰雍州霸昌廏在長安西二十五里王莽使司徒王尋發長安宿此春秋左助期曰廏星傳令神明請時市古史考曰神農作市一本祝融作市説文曰市買賣之所也古今注曰闤市垣也闠市門也風俗通曰俗言市井者言至市鬻賣當須於井上洗濯令鮮潔然後市案二十畝為一井今因井為市禮記曰用器不中度不粥於市布帛精麄不中數幅廣狹不中量不粥於市奸色亂正色不粥於市也周禮曰大市日昃而市百族為主朝市朝時而市商賈為主夕市夕時而市販婦為主注云主者言其多也百族百姓也又曰凡國凶荒札喪則市無徵又曰國君過市刑人赦夫人過市罰一幕世子過市罰一帟命夫過市罰一盖命婦過市罰一帷注曰市者交利而行刑之處也君子無故不往觀焉史記曰吕不韋撰春秋成牓於秦市曰有人能改一字者賜金三十觔後漢書曰張楷字公超通嚴氏春秋古文尚書門徒常數百人賓客慕之自父黨夙儒造門焉車馬填街黄門貴戚之家起舎巷次以俟過客往來之利楷疾其如此輒徙避之家貧無以為業常乘驢車至縣賣藥足給食者輒還鄉里司𨽻舉茂才除長陵令不之官隠居𢎞農山學者隨之所居成市後華陰山中遂有公超市又曰王充家貧無書嘗遊洛陽市閲所賣書一徧而誦之晉書曰羊祐疾漸篤乃舉杜預自代尋卒時年五十八帝素服哭之甚哀是日大寒涕淚霑鬚皆為氷南州人方市聞祐喪莫不號慟罷市巷哭者聲相接呉守邊将士亦為之泣其仁徳感人如此韓子曰龎其與魏太子質於邯鄲其謂魏王曰今一人言市有虎王信乎王曰否二人言信乎曰寡人信矣其曰夫市無虎明矣三人言成市虎今邯鄲去魏逺於市謗臣者過於三人願王察之越絶書曰伍子胥至吳徒跣被髮乞於吳市三日市正疑之而導於闔閭曰市中有非恒人徒跣被髮乞於吳市三日吳闔閭曰吾聞荆王殺其臣伍奢而非其罪其子子胥入吳迺下堦而唁歎之曰吾知子非常人也何素窮如此子胥跪而垂泣曰胥父無罪而楚王殺之并其子子胥得遁逃出走誰可以歸骸骨者唯大王哀之吳王曰諾上殿與語三日語無復者王乃令邦中無貴賤長少有不聴子胥教者猶不聴寡人之罪至死不赦又曰吳市者春申君所造闕兩城以為市在湖班固兩都賦曰内則街衢洞達閭閻且千九市開場貨别隧分人不得顧車不得旋闐城溢郭傍流百㕓紅塵四合烟雲相連宫闕記云長安市有九所各方二百六十六步六市在道西三市在道東為市凡九致九州之人又曰旗亭樓在杜門大道南又有當市觀張衡西京賦云郭開九市通闤帶闠旗亭五重俯察百隊是也又案郡國志云長安大俠萬子夏居栁市司馬季主卜東市西市在醴泉坊隋曰利人市因有西市署洛陽記曰三市大市名也金市在大城西南市在大城南馬市在大城東案金市在臨商觀西兊為金故曰金市馬市在東舊置丞焉又酈道元注水經云馬市即嵇康為司馬昭所害之處蜀本記曰老子為闗令尹喜著道經臨别曰子行道千日後於成都青羊肆尋吾今為青羊觀是也郡國志曰始皇陵有銀蠶金雁以多奇物故俗云秦王地市又曰郢城内有市名蒲胥故南齊校尉府也又曰越州梅市即梅福為市門卒之所又曰齊桓公宫内有七市韓娥東之齊乏糧過雍門鬻歌於市即此也又曰雍州富平西南十五里有直市城秦文王造物無二價以直市為名西京記曰東京豐都市東西南北居二坊之地四面各開三門邸凡三百一十二區資貨一百行初築市掘得古冢土藏無塼甓棺木陳朽觸之便散屍著平上幘朱衣得銘曰蓍道居朝龜言近市五百年間於斯見矣當時達者叅驗其文魏黄初二年所葬也又曰大業六年諸夷來朝請入市交易煬帝許之於是修飾諸行葺理邸店皆使甍宇齊正卑髙如一壤貨充積人物華盛時諸行舖競崇侈麗至賣菜者亦以龍鬚席藉之夷人有就店飲噉皆令不取直胡夷驚視寖以為常又曰西市隋曰利人市市西北隅有海池長安中僧法成所穿分永安渠以注之以為放生之所穿池得古石銘云百年為市而後為池自置都立市至是時百餘年矣太平御覽卷一百九十一
