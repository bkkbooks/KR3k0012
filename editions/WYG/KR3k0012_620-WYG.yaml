body:
  text: 太平御覽卷六百二十宋李昉等撰治道部一君爾雅曰林烝天帝皇王后辟公侯君也易師卦曰大君有命開國承家尚書泰誓曰嗟我友邦冢君越我御事庶士明聽誓唯天地萬物父母唯人萬物之靈亶聰明作元后元后作民父母洪範曰惟辟作福惟辟作威惟辟玉食毛詩曰鹿鳴天保下保上也君能下下以成其政臣能歸美以事其上焉禮記禮運曰禮者君之大柄也政者君之所以藏身也曰何乃若是子思曰人主自藏則衆謀不進事是而藏之猶却衆謀况知非以長乎夫不察人之是非而悅人之讚已闇莫甚焉不度理之所在而阿諛求容諂莫甚焉君闇臣諂以居百姓之上民弗與也若此不已國無類矣荀悅漢紀論曰有王主有治主有存主有衰主有危主有亡主體正性仁心明志固動以為人不為己是謂王主克己恕躬好問力行動以從義不以從情是謂治主勤居守業不敢流怠動以先公不以先私是謂存主情義交争公私並行一得一失不純道度是謂衰主情過其義私多於公制度踰限政令失常是謂危主親用讒邪放逐忠賢縱情逞欲不顧禮度出入遊放不操儀禁賞賜行禮以越公用忿怒施罰以踰治理遂非文過知而不改忠言壅塞直諫誅戮是謂亡主故王主能致興平治主能脩其政存主能保其國衰主遭無難則庶幾得全苟有難則殆危主遭無難則幸而免有難則亡亡主者必亡而已矣白虎通曰君者羣也羣下之所歸心管子曰地之生財有時民之用力有倦而人君之欲無窮以有時與有倦養無窮之君而度量不生於其間則上下相疾也鄧析書曰君有三累臣有四責何謂三累親所信一累也以名取士二累也近故疏親三累也何謂四責受重賞而無功一責也居大位而不治二責也為理而不平三責也御軍陳而皆奔四責也君無三累臣無四責可謂安國家也又曰為君者當若冬日之陽夏至之隂萬物歸之莫之使也偃卧而功自成優游而政自治又曰為君者滅形匿影羣下無私掩目塞耳萬民恐震循名責實案法立成是謂明主孟子曰君視臣如手足臣視君如腹心君視臣如犬馬臣視君如國人君視臣如土芥臣視君如冦讐孫卿子曰君舟也庶人水也水能行舟亦能覆舟又曰君者義也義正則君正君者盤也水者民也盤方則水方盤圓則水圓君者源也水者流也源清則流清源濁則流濁戰國䇿曰豫譲欲報襄子其友謂之曰子之道甚難而無功謂子有志則然矣謂子智則不然以子之材而索事襄子索求襄子必近子得近之而行所欲此甚易而功必成豫讓笑而應之曰是為先知報後知為故君賊新君是大亂君臣之義也子無失吾所為矣凡吾所為者皆所以明君臣之義也非從易也淮南子曰君根本也臣枝葉也根本不善枝葉茂者未聞也有道之世以人與國無道之世以國與人以賢人而與之國堯舜是也以國與人桀紂與湯武是也說苑曰晉平公問於師曠曰人君之道奈何師曠曰人君清静無為務在博愛趨在任賢廣開耳目以察萬方不溷溺於流俗不拘繫於左右廓然逺見踔然獨立屢省考績以臨臣下此人君之操也平公曰善新序曰趙襄子問於王子維曰呉之所以亡者何也對曰吳君恡而不忍襄子曰宜哉吳之亡也恡則不能賞賢不忍則不能罰奸賢者不賞有罪不罰不亡何待潛夫論曰凡人君之治莫大於和隂陽夫隂陽者以天為本天心順則隂陽和天心逆則隂陽乖夫以民為心民安樂則天心順民愁苦則天心逆抱朴子曰清𤣥剖而上浮濁黄判而下流尊卑等威於是乎著曩聖取諸兩儀而君臣之道立設官分職而雍熈之化隆君人者必脩諸己以先四海去偏黨以平王道遣私情以樹至公昭徳塞違庸親昵賢使規盡其圓矩盡其方太平御覽卷六百二十
