body:
  text: 太平御覽卷六百六十八宋李昉等撰道部十養生太平經曰養生之道安身養氣不欲喜怒也人無憂故自壽也又曰一者數之始也生之道也元氣所起也天之大綱也故守而思一也子欲養老守一最壽平氣徐卧與一相守氣若泉源其身何咎是謂真寳老衰自去又曰古者三皇之時人皆氣清深知天地之至情故悉學真道乃復得天地之公求道之法靜為基先心神已明與道為一開蒙洞白類如晝日不學其道若䖏暗室而迷方也故聖賢惶駭太上經曰守一則諦定心源守靜則存神忘形定氣通無道成真降三元真一經曰體為百神耳者帝君之牎門目者太乙之日月鼻者三元之丘山口者絳宫之朱源眉者真元之華盖髮者明堂之林精舌者元英之龍轅齒者胃宫之威力手者膽神之外援足者腎元之靈闗隂極者洞房之真機也又曰涓子授蘇林守三真一之道後林復詣涓子􅃦静之室無復之矣留一紙書置卧内以與林也其文曰五斗三一大帝所秘精思十二年三一見相授子書矣但有三一長生不㓕况復守之乎能守三一名刋玉札况與三一相見乎如存洞房為上清公加之三元為五帝君後金闕帝君所以乗景迅雲周行十天者實由洞房三元眞一之道也世之學者皆尊守一當令心朴神凝體專誠感所以百念不生精意不散但有三月内視注心一神繫念不散專氣致和由朴之至也得之速也自朴散真離華偽並起爭競亂生故一不卒感神不即應非不欲徃存之者不專思之者不審故棄積年之功絶有髣髴耳三一之法上清真書之首篇髙上之至道神仙之津途衆真之妙訣子能守一一亦守子子能見一一亦見子一須身而立身須一而生守一之戒戒於不專專後不久久不能精精不能固固而不恒則三一去矣身為空宅五符經曰知一者無一不知也不知一者無一能知也一者至貴無偶之號必欲長生三一當明思一至饑一與之糧思一至渴一與之漿一能成隂生陽推行寒暑其大不可以六合隠其小不可以毫芒兆能暇能豫一乃不去存一至勤一能通神少飲約食一乃留息知一不難難在於終知真不為與不知同求之不已登彼玉清也又曰飬其氣所以全其身又曰飬氣者常有少容老子曰道言㣲深子未能别撮其樞略慎戒勿失先損諸欲令人意逸閑居静處精細齋室丹書萬卷不如守一當制念以定志静身以安神寳氣以存血思慮兼忘宜想内視則身神並一静思期真則衆妙感㑹專精積神不與物雜謂之清反神服氣安而不動謂之道又曰善攝生者陸行不遇兕虎入軍不披甲兵兕無所投其角虎無所措其爪兵無所容其刄太上真經曰一乃無像求之難得守之易失易失由識劣貪欲滯心廓然無為惟在守一積而未極皆由漸升當在三元諦識神氣狀貌名字出入有無生鎮三宫尸毒自去聖真仙經隨因授之八素經曰凡學至道諦定其心除患清身知變革慮正身清然後心定心定則道成道成則真降凢存一守神要在正化正化由定心心定則識清識清則㑹于道又太極真人曰古人為道也元寂静清念真存元日漸引未歸識源神知而能見見而能從從而能習習而能堅堅而能成成而不居善人在於天下如槖䈁乎非與萬物交争其徳常歸焉以其謙虛無欲也欲者㓙害之根也無者天地之元也莫知其根莫知其源聖人者去欲入無以輔其身也太乙洞𤣥真經曰兩耳名為六合之髙牎也又云臍中名曰受命之宫也又曰養生之道耳目為主雜視則目闇廣聽則耳閉裴君内傳曰夫求道者要先令目清耳聦為主也且耳目是尋真之梯級綜靈之門户得失繫之仙經曰養生以不傷為本此要言也太清真經曰一切含氣莫不貴生為天地之大徳德莫過於長生長生者必其外身也不以身害物非惟不害而已乃濟物而忘其身忘其身而身不忘是為善攝生者也真道養神神能飛化太上三元經曰養生之道必愛氣存神不可劇言大呼使神勞氣損是以真人道士常吐納以和六液𤣥示經曰夫形體者持生之具也非所以生生也生生乃以素朴為體以氣為元以神為形此乃生之宫庭也以無為育其神舒釋𤣥妙之門徃來無形之間休息於無隣此所謂得𤣥明之生源又云外想宜絶内注𤣥真然後長生可保妙真經曰道人謀生不謀於名胷中絶欲意無所傾志若流水居若空城積守無為乃能長生衆真戒曰性躁暴者一身之劇賊求道之散梯也用之者真去改之者道來每事觸類皆當柔遲而盡精㓗之理如此㡬乎道也神者天地之所馳也頥神養性行道氣以度難也此乃上聖真人逹識也夫為道者當行此以載其身太乙帝君經曰若能常行九晨照洞房泥丸之法者檢䰟魄制萬邪清净行之以致靈仙之氣降於􅃦屋所謂引三光九星以照百神者也上清列紀曰胎閉静息内保百神吞景咽液飲食自然身必壽考可得陞仙矣太上真人秘要曰夫氣者神明之運清濁之宗處𤣥則天清在人則身存夫生死虧盈盖順乎攝御之間也太洞玉經曰食𤣥根之氣者使人體中清朗神明入聦身有日映面有玉澤服餌朝液懸根絶粒道要於金醴事妙於氷玉所謂吐納自然之和御九精之靈氣者也抱朴子曰長生之要在乎還年之道也延年除病其次焉有不以自伐若年尚少壯而知還年隂丹以補腦采七益於長谷者不服餌藥亦不失一二百歳凡傷之道有数焉才所不逮而困思之力所不勝而張舉之深憂重怨悲哀喜樂汲汲所欲戚戚所患􅃦息失時沉醉吐嘔飽食即卧跳走喘息歡呼哭泣隂陽不交積傷至盡乖養性之方耳不極聽目不久視坐不至疲先寒而衣先熱而解不欲極饑而食食不過飽不欲極渴而飲飲不過多不欲甚勞不欲多汗及多唾奔車走馬極目逺望多食生冷冬不欲極温夏不欲極凉大寒大風大熱大風大霧不欲冐之五味不可偏多凡言傷者亦不便覺久則損壽耳是以善攝生者卧起有四時之早晚興居有至和之常制調利筋骨有偃仰之法杜疾閑邪有吞吐之術流衝營胃有補㵼之方節宣勞逸有與奪之要忍怒以全隂抑喜以養陽然後先服草木以救虧缺後服金丹以定無窮長生之理盡於此矣若有欲決意任懐自謂逹識知命不泥異端極情不營久生者安可告養生之言哉登真隠訣曰方諸青童云人學道亦苦不學亦苦二苦之始乃同為苦之終則異為道者縁苦得樂不為道者徒辛苦而已矣惟人自生至老自老至病獲身至死其苦甚矣心腦積罪生死不絶其難說况復不終其天之年者哉此不為道之苦也為道亦苦者清净存真守𤣥思靈尋師勞苦歴試數百用志不墮亦苦之至也此為道之苦數十年中為苦之理乃有甚於彼得道之日乃頓忘此苦猶百日之饑一朝而飽豈復覺向者之餒乏耶非道則不可右英真人曰夫内接家業以自覊外綜王事以雜役此亦道之不専也夫抱道不行猶無道也握寳不用猶無寳也紫㣲元君曰疾之所生生乎念多邪之所兆兆於心散念多則事廣事廣則累繁浮泛莫檢紛紜不息内煎萬慮外勞百役形神弊矣衆病安得不興髙墉重闗猶恐冦至况闢扉去防自我致冦也志以無涯傷性心以為惡蕩真形來在眼聲發入聽其為開意属想實有増羡魂者正神神貴明信􅅎者邪鬼鬼尚狂浮飛仙之想觸見必念慈䕶之情遇物斯極以此為心心即道矣九華經曰眼者身之鏡耳者軆之牖視多則鏡昏聽衆則牖閉磨鏡决牖則能徹洞萬虛𦕈察絶響靣者神之庭髮者腦之華心悲則靣焦腦减則髮衰所以精氣内䘮丹津損竭精者躰之神明者身之寳勞多則精散營竟則明消所以老隨氣落耄已及之真誥曰富貴者破骨之斧鋸載罪之舟車適足誨愆要辱為伐命之兵非佳事也是故古之髙人覽罪咎之難豫知富貴之不可享也遂肥遯長林栖景名山欲逺此跡自求多福保全至素者也裴君曰三闗常調是長生之道也口為天闗手為人闗足為地闗調則五藏安安則無病又存五神為躰謂兩手兩足頭也頭相恒青兩手俱赤二足常白者則去仙近矣昔徐季道學仙於鵠鳴山中亦時時出市中道間忽見一人著皮袴褶柱挑杖季道乃拜之因語季道曰欲學道者當中天青詠大歴踏䨇白偭二赤此五神之事其語隠也大厯三皇文也此即大素五神事别有經品黄老經曰士能遺物乃可議生生本無邪為物所嬰嬰久易志志欲外無能守以道乃可長生太上太真利曰一在人身鎮定三處能守三一動止不忘三尸自去九蟲自消不假藥餌不須禁防久視之要守一為先以行師教授職隨才依功進位積善居尊先楊妙氣開道後生三皇經曰天能守一覆而不舉地能守一静而能處岳能守一不避寒暑海能守一流而不還人能守一必得真仙昇𤣥經曰道有天法求之立得是謂三一之道當有將軍率兵斷絶惡道上清玊皇曰三真者兆一身之帝君百神之元始變化離合與真洞虛㣲哉難言非仙不傳太上素虛經曰三一者一身之虛宗百神之命根津液之山源魂精之玉室是以胃池體方而授物腦宫圓虛而適真太上經曰真人所以貴一為真者一而已一之所契元氣造化一之變通天地冥合是以上一為身之天帝中一為絳宫之丹皇下一為黄庭之元主而三之一真並繞身内二十四氣以授生生一於身上應太㣲二十四氣真氣徊和品物流形𤣥神渾分紫房杳𠖇上一真帝之極也中一真皇之主也下一真王之妙也天皇得極故上成皇極地皇得主故上成正一人皇得妙故上成衆妙三皇體真而守一其真極也得一而已集仙籙曰凡動作視息飲食語言好惡是非人各有歳月日時隨其所屬以定其分此物理之常數也身有應敗之患神有應散之期命有必盡之勢夫神在則人神去則尸盖由嗜欲亂心不能􅁯色味之適夫修其道者在適而無累和而常通善惡各報報應之理毫釐無失長生之本惟善為基人生天地間各成其性夫氣清者聦明賢逹氣濁者㓙虐癡戅氣剛者髙嚴壯烈氣柔者慈仁淳篤夫明者伏其性以延命暗者恣其欲而傷性性者命之源命者生之根勉而脩之所以營生以飬其性守神以養其命人之生也皆由於神神鎮則生神斷則死所以積氣為精積精為神故仙者内求内宻則道來真者修寂修静則合真神者須積感則虛通常能守一則仙近矣則與天地共寄於太無中矣又能洞虛體無則太無共寄於寂寥中矣能洞寂則聽視不聞見與道冥矣道者虛通之至真也術者變化之𤣥伎也道無形因術以濟人人之有虗因修而契道道之要者在深簡易之功術之祕者惟藥與氣也上士服之升為仙官中士服之栖集崑崙下士服之長生人間於是太一元君述還丹金液之要行於世又曰木公金母者二氣之祖宗隂陽之原本仙真之至宰造化之元元凝氣成真與道合體且氣之彌綸天地經營動植在人為人在物為物發大藴散無窮生發乎天而命成乎人立之者天行之者道𤣥老云致虚極守靜篤萬物將自復復謂歸常道而常存也長久之要者天保其𤣥地守其物人養其氣又曰商王聞彭祖有道拜為大夫每稱疾閑居不預政事服雲母粉麋鹿角水精常有少容性深静不自言有道士詣問莫之告王於掖庭立華屋紫閣使祖居之問延年益壽之道荅曰欲登天上補仙官者當服元君太一金丹此道至大其次當愛精養神服食草藥可以長生其次隂陽運氣導養屈伸使百節氣行闗機無滯此可以無為病所侵思神念真坐忘錬液皆可以令人長壽若泝流補腦之要此甚難行有懐棘履刃之危又非王之所為也吾所聞淺薄道止於此不足宣傳人生於世但養之得冝至百餘歳不及此者皆傷之也大醉大喜大怒大温大寒大勞大極皆傷也至樂至憂至畏至怖至撓至躁至奢至淫皆傷也甚饑甚渴甚思甚慮皆傷也久坐久立久卧久行皆傷也寒温得節饑飽適冝無思無為惟清惟静此可與言修身耳已得其壽復養之得冝則長壽但要莫傷也冬温夏涼不失四時之和者所以適身也美色曼容不至思欲之感者所以通神也車服威儀知足不求者所以一其志也八音五色不至躭溺者所以導其心也凡此之物本以養人人之不能斟酌得中反以為患故聖賢垂戒懼不才者溺之流蕩忘返用之失所故修道之士皆令禁之欲以檢制之也亦猶水火用之過當反為害耳人不知經脉損傷血氣不足内理空踈髓腦不實體已先病故為外物所犯因風氣酒慾以發之若本充實豈有病也凡逺思羡願憂恚悲哀傷人也人情過樂忿怒不解汲汲所愛戚戚所患寒温失節隂陽不交皆所傷也男女相感猶天地相生也所以導養神氣使人不失其和天地晝離而夜合一歳三百六十交故四時均而萬物生生成不知窮極所以天不失其動地不失其和物不失其生而能長久也人不能法天地而有常减衣絶食自取死病愚之甚也法此修攝節宣之外則有服元和之氣得其道則邪不能入此理身之本也其餘含景思神歴歳導引吞餌服御之事千七百餘條及四時首月責已謝過卧起早晏之法可以教初學之士引進向善之門漸正其心而徐息其罪咎非便能致人得道也若血脉枯竭神氣凋敗豈思神念真而能守之固未知其益矣此由凡人為道而求其末不務其本也又曰内不養神外勞其形元精漸虛神氣困竭而晝長勤服讀誦經訣此亦無益也諸經萬三千首皆示以始渉之門庭耳商王具受諸要行彭祖之永壽但不能戒其滛慾耳集仙籙曰女凡者陳市上酒婦也作酒美有仙人過其家飲酒即以素書五卷貰酒凡開視之乃仙方養性長生之術也凡私冩其要訣依而修之三年顔色更少數歳貰酒仙人復來笑謂之曰盗道無師有趐不飛女凡隨仙人去不知所之又曰太陽女朱翼得吐納之道事絶洞子李修修著書四十篇名曰道源常行之道以柔勝剛弱制強如臨深履危御奔乗朽差之毫釐䘮爾之䇿勤而行之可以長壽又曰太隂女盧金學道未成當道沽酒宻訪其師㑹客過使問客土數為歳但南三北五東九西七中一耳還報曰客大賢者至得道人也我始問一知五矣遂問長生之道得補導之要蒸丹之方又云太𤣥女顓和常曰人處世一失不可復得一死不可復生况壽限之促非修道不可延也遂洗心求道而得其術太平御覽卷六百六十八
