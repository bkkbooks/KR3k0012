body:
  text: 太平御覽卷一百十五宋李昉等撰皇王部四十唐文宗昭獻皇帝武宗昭肅皇帝宣宗獻文皇帝懿宗恭惠皇帝文宗昭獻皇帝唐書曰文宗昭獻皇帝諱昻穆宗第二子也母曰貞獻皇后蕭氏元和四年十月十日生長慶元年封江王初名涵寳厯二年十二月敬宗遇害賊蘇佐明等矯制立綘王勾當軍國事樞密使王守澄中尉梁守謙率禁軍討賊誅絳王迎上於江邸癸卯見宰臣於閣内下教處分軍國事宰臣百寮三上表勸進乙巳即位於宣政殿丙午上赴西宫成服丁未宰臣百寮上表請聽政三表許之戊申尊聖后為皇太后乙酉勅鳯陽淮南先進女樂二十四人並放歸本道庚戌以兵部侍郎翰林院學士韋處厚為中書侍郎同中書門下平章事太和元年二月乙巳御丹鳯樓大赦改元六月詔元和長慶中皆因用兵權以濟事所下制勅難以通行宜令尚書省取元和以來制勅叅詳刪定訖送中書門下議定聞奏甲戌以旱放繫囚七月李同㨗除兗海不受詔結幽鎮謀叛徐州王智興請全軍討之帝自撰集尚書中君臣事迹命畫工圗冩於太液亭朝夕觀覽三年五月己卯柏耆斬李同㨗扵將陵滄景平丁亥御興安樓受滄州所獻俘九月命諸司宦官不得著紗縠綾羅等衣裳帝性儉素不喜奢侈駙馬韋處仁著夾羅巾帝謂之曰朕慕卿門地清潔以之選尚如此巾服聽其他貴戚為之卿不湏爾十一月甲子帝親祀昊天上帝於南郊禮畢御丹鳯樓大赦天下禁止竒貢四方不得以雜様織成非常之物為獻十二月南詔蠻䧟卭巂等州戊午以右領軍衛大將軍董重質充神䇿西川行營都知兵馬使蠻䧟成都府入梓州西郭門下營又詔促諸鎮兵馬救援兩川乙巳郭釗奏蠻抽退遣使賜蠻帥蒙􅓕巔國信四年四月詔曰儉以足用令出唯行著在前經斯為理本朕自臨四海愍元元之困日昃忘食宵興疚懐雖絶文繡之飾尚愧茅茨之儉示諭卿士形於詔條朕聞積習流弊餘風未革車服第室相尚以華靡之制資用貨寳因唘乎貪冐之源有司不禁侈俗滋扇葢朕教導之未敷使兆庶昧於恥尚也其何以足用行令臻於上理與永念慚嘆迨兹申勅自今内外班列職位之士各務朴素𢎞兹國化有僣差甚者御史糾上主者宣示知朕意焉上承長慶寳厯奢靡之風鋭意懲革躬行儉素以率厲之五年春正月庚子以積隂浹旬罷元會太原旱賑粟十萬石二月神䇿中尉王守澄奏宰相宋申錫與漳王謀反即令追捕庚子詔貶宋申錫為太子右庶子壬寅左侍崔𤣥亮及諫官王質等四十人伏奏玉階北軍所告事請不於内中鞫問乞付法司帝曰吾謀於公卿矣卿等且退崔𤣥亮泣涕陳諫久之帝改容勞之曰朕即與宰臣商議𤣥亮等方退癸卯詔漳王可降為巢縣公宋申錫開州司馬同正初京師恟恟以宰相實聨親王謀反三四日後方知誣搆人士側目於守澄鄭注諫官號泣論之申錫方免其禍六年春正月乙未朔以大雪廢元會壬子詔曰朕聞天聽自我人聽天視自我人視朕之菲德涉道未明不能調序四時導迎和氣自去冬以來踰月雨雪寒氣尤甚頗傷於和念兹庶氓或罹凍餒無所假貸莫能自存中宵載懐旰食興嘆怵惕若厲實予之辜思𢎞惠澤以順時令天下死罪囚除官典犯贓故意殺人外並降從流流以下遞降一等七年正月詔曰朕承上天之眷佑荷列聖之丕圖宵旰憂勞不敢暇逸思致康乂八年於兹而水旱流行疾疫作沴兆庶艱食札瘥相仍葢德未動天誠未感物一夫失所其過在予載懐罪己之心深軫納溝之慮比聞闗輔河東去年亢旱秋稼不登今春作之時農務尤切若不能賑救懼至流亡京兆府賑粟十萬石河中府絳州各賜七萬石同華陜虢晉州各賜十萬石並以常平義倉物充給七月旱命京城諸司疏决繋囚閏七月乙卯詔曰朕嗣守丕圗覆嫗生類兢業寅畏上承天休而隂陽失和膏澤替候害我稼穡灾我黔黎有過在予敢忘咎責從今避正殿減供膳停教坊樂廐馬量減蒭粟百司厨饌亦宜權減隂陽湮欝有傷和氣宜出宫女千人五坊鷹犬量須減放内外脩造事非急務者並停八月甲申御宣政殿冊皇太子永是日降詔應犯死罪降從流流以下遞減一等九年冬十月内出曲江新造紫雲樓綵霞亭額左軍中尉仇士良以百戲於銀臺迎之時鄭注言秦中有灾宜興土功以厭之乃濬昆明曲江二池上好為詩每誦杜甫曲江行云江頭宫殿鎖千門細栁新蒲為誰緑乃知天寳已前曲江四岸皆有行宫臺殿百司廨署思復昇平故事故為樓殿以壯之王涯獻𣙜茶之利乃以涯為𣙜茶使茶之有税自涯始十一月壬戌中尉仇士良率兵誅宰相王涯賈餗舒元輿李訓王藩郭行餘鄭注羅立言李孝本韓約等十餘家皆族誅時李訓鄭注謀殺内官詐言金吾仗舎榴樹有甘露請上往觀之内官先至金吾仗見幕下伏甲遽扶帝輦入内故訓等敗流血塗地京師大駭旬日稍安十二月庚辰上御紫宸殿謂宰相曰城市之間人漸安未李石奏曰人情雖安然刑殺過多致此隂沴又聞鄭注在鳯翔募兵不少今皆被刑戮臣恐乗此生事切宜原赦以安之上曰然鄭覃又陳理道上曰我每思貞觀開元之時觀今日之事往往憤氣填膺耳開成元年正月辛丑帝常服御宣政殿受朝賀遂宣詔大赦天下改元乙巳上御紫宸對宰臣李石奏曰陛下改元御殿人情大悦全放京兆一年租賦又停四節奏奉恩澤所該實當要切帝曰朕務行其實不欲崇長空文石曰赦書須内留一本陛下時看之又十道黜陟使發日更付與公事根本令向外與長吏詳擇施行方盡利害之要矣二年三月戊辰夜彗長八丈有餘西北行東指在張十四度壬申詔曰朕嗣守丕構對越上天􅐚恭寅畏於今一紀何嘗不宵衣念道昃食思術師周文之小心慕易乾之夕惕懼德不類貽列聖羞將欲俗致和平時無殃咎然誠未格物謫見於天仰愧三靈俯慚庶彚思獲攸濟浩無津涯昔宋景發言星因退舍魯僖納諫饑不害人取鑒往賢深惟自勵載軫在予之責宜降恤辜之恩式表殷憂冀荅昭誡天下死罪降從流流已下並釋放三年九月上以皇太子慢逰敗度欲廢之中丞狄兼謨垂涕切諫是夜移太子於少陽院殺太子宫人左右數十人十月皇太子薨於少陽院諡曰莊恪十一月乙卯夜彗孛東西竟天壬戌詔曰上天葢髙感應必由乎人事寰宇雖廣理亂盡繫乎君心從古以來必然之義朕嗣膺寳位十有三年常克己以處恭每推誠於衆庶將以導迎休應漸致緝熈期克荷於宗祧思保寧於華夏而德有所未至信有所未孚灾氣上騰天文謫見再周朞月重擾星躔當始復之時覩垂象之變兢懼惕厲若䧟泉谷是用舉成湯之六事念宋景之一言詳求遣咎之端采聽銷禳之術必有精理藴於衆情冀屈法以安人爰恤刑而厚下應犯死罪並降從流流已下遞降一等五年春正月戊寅上不康不受朝賀辛巳崩於大明宫之太和殿諡曰元聖昭獻皇帝廟號文宗葬章陵武宗昭肅皇帝唐書曰武宗昭肅皇帝諱炎穆宗第五子也母曰宣懿皇后韋氏元和九年六月十三日生扵東宫長慶元年三月封潁王本名瀍初文宗追悔莊恪太子殂不由道乃以敬宗子成王陳美為皇太子開成四年冬十月宣制未遑冊禮五年正月文宗暴疾宰相李珏樞密劉𢎞逸奉密㫖以皇太子監國兩軍中尉仇士良魚𢎞志矯詔迎潁王於十六宅曰朕自嬰疾疹有加無瘳懼不能躬總萬機日釐庶政稽于古訓謀及大臣用建親賢以貳神器親弟潁王瀍昔在藩邸與朕常同師訓動成儀矩性稟寛仁俾奉昌圗必諧人欲可立為太弟一應軍國政事便令權勾當百辟卿士中外庶臣宜竭乃心輔成予志成王陳美先立為皇太子以其年尚㓜冲未漸師資比日重難不遑冊命回踐藩邸式協至公可復封陳王四日文宗崩宣遺詔皇太弟宜扵柩前即皇帝位宰臣楊嗣復攝冡宰十四日受册扵正殿年二十七二月制穆宗妃韋氏追諡宣懿皇太后帝之母也上御正殿宣降徳音以開府右軍中尉仇士良封楚國公左軍中尉魚志𢎞為韓國公太常卿崔鄲户部尚書判度支崔珙並本官同中書門下平章事帝在藩邸時頗好道術脩攝之事是秋召道士趙歸真八十一人於禁中三殿脩金籙道場乃幸三殿於九天壇親受法籙左拾遺王哲上疏言王業之初不宜崇信異端疏奏不省㑹昌元年正月庚戌有事於南郊禮畢御丹鳯樓大赦天下改元二月以淮南節度使李紳為中書侍郎同平章事二年四月司空平章事李德裕等上章請加尊號曰仁聖文武至聖大孝皇帝戊寅御宣政殿受冊八月回鶻烏介可汗過天德至杞頭峰北俘掠雲朔北川詔劉沔出師守鴈門諸闗回鶻首領屈武降幽王授左武衛將軍詔以回鶻犯邊漸侵内地或攻或守於理何安令少師牛僧孺陳夷行與公卿等議可否以聞僧孺曰今百寮議狀以固守闗防俟其可擊則用兵宰相李德裕議回鶻所恃者嗢沒赤心耳今已離叛其強弱之勢可見戎人獷悍不顧成敗以失二將乗忿入侵出師急擊破之必矣怙險示弱虜無由退擊之為便天子以為然乃徴發許汴滑等六鎮之師以太原節度使劉沔為回鶻南面招討使以張仲武為幽州盧龍節度使充回鶻東面招討使以李思忠為回鶻西南面招討使皆㑹軍扵太原十月幸涇陽校獵白鹿原諫議大夫髙少逸鄭朗等扵閣内論陛下校獵太頻出城稍逺萬機廢弛晨出夜歸方用兵師且宜停止上優答之諫官出上謂宰臣曰諫官甚要朕時聞其言庶㡬減過三年春正月以宿師扵野罷元㑹二月太原劉沔奏至大同軍遣石雄襲回鶻牙帳大敗回鶻扵殺胡山其烏介可汗被創而走已迎得太和公主至雲州是日御宣政殿百寮稱賀三月太和公主至京師百官班於章敬寺迎謁仍令所司告憲宗穆宗二室四月昭義節度使劉從諫卒軍中以從諫姪稹為兵馬留後上表請授節度使遣中使賫詔路府令稹䕶從諫之喪歸洛陽稹拒朝㫖尋以成徳軍節度使王元逵魏博節度使何𢎞敬並以本官充招討澤潞使四年三月以道士趙歸真為左右街道門教授先生時帝志學神仙師歸真歸真乗寵毎排毁釋氏言非中國之教蠧耗生靈宜盡除去帝頗信之七月王元逵奏邢州刺史裴問别將髙元武以城降潞州刺史王釗磁州刺史安玉皆以城降何𢎞敬山東三州平潞州大將郭誼張谷陳湯廷遣人至王宰軍請殺劉稹以自贖王宰以聞乃詔雄率軍三千入潞州郭誼斬劉稹首以迎雄澤潞五州平八月王宰傳稹首與大將郭誼等一百五十露布獻扵京師上御安福門受俘百寮樓下稱賀十月車駕幸鄠縣十一月幸雲陽五年正月宰臣李德裕杜棕等率文武百寮上徽號曰仁聖文武章天神功盛德明道皇帝乙亥有事於郊廟禮畢御承天門大赦天下秋七月庚子勅更毁天下佛寺四千六百餘所還俗僧尼二十六萬五百人收充兩税户招提蘭若四萬餘所收膏腴上田數千萬頃收奴婢為兩税户十五萬人六年三月壬寅上不豫制改御名曰炎帝重方士頗服食修攝親授法籙至是藥躁喜怒失常既篤旬不能言宰相李徳裕等請見不許中外莫知安否人情危懼是月二十三日宣遺詔以皇太叔光王柩前即位是日崩年三十三諡曰至道昭肅孝皇帝廟號武宗葬端陵宣宗獻文皇帝唐當曰宣宗獻文皇帝諱忱憲宗第十三子母曰孝明皇后鄭氏元和五年六月生于大明宫長慶元年三月封光王名怡㑹昌六年三月武宗疾篤宣遺詔立為皇太叔權勾當軍國政事畢翌日即帝位時年三十七帝外晦而内明嚴重寡言視瞻特異㓜時宫中以為不慧十餘嵗時遇重疾沉綴忽有光輝燭身蹷然而興正身拱揖如對臣寮妃媪以為心疾穆宗往視之撫其背曰此吾家英物非心憊也賜以玉如意御烏金帶嘗夢乗龍上天言之於鄭太后乃止曰不宜人知母幸勿復言厯太和㑹昌朝愈事韜晦羣居㳺處未嘗有言文宗武宗幸十六宅宴集疆誘其言以為戲笑謂之光叔武宗遇之尤不以禮及監國之日哀毁滿容接待羣寮决斷庶務人方見其隠徳焉四月辛未釋服尊母鄭氏曰皇太后以兵部侍郎翰林學士承旨白敏中同中書門下平章事大中元年正月有事扵郊廟禮畢御丹鳯樓大赦改元帝雅好儒士留心貢舉有時微行人間採聽輿論以觀選士之得失每山池曲宴與學士詩屬和公卿出鎮亦賦詩餞行凡對臣寮肅然拱揖鮮有輕易之意大臣獻章䟽必燒香盥手受而覽之故當時以大中之政有貞觀之風焉閏三月勑㑹昌季年併省寺宇雖云異方之教無損為理之原中國之人久行其道釐革過當事體未𢎞其靈山勝境天下州府應㑹昌五年四月所廢寺宇如有宿舊名僧復能脩創一任住持所由不得禁止七月太子少保分司東都衞國公李徳裕為人所訟貶潮州司馬外置二年春正月宰相率文武百寮上徽號曰聖敬文思和武光孝皇帝御宣政殿受册三年春正月涇原節度康季榮奏吐蕃宰相倫恐熱以秦原樂安三州及石門等七關之兵民歸國詔太僕卿陸躭往喻㫖仍令靈武節度使朱叔明邠寧節度使張景緒各出本道兵馬應接六月康季榮奏收復原州城及石門驛蔵木峽制勝六盤石峽等六關訖邠寧張景緒奏收復蕭闗勑於蕭闗置武州改樂安為威州七月三州七闗軍人百姓皆河隴遺黎數千人見于闕下御延喜門撫慰令其解辮賜之冠帶共賜絹十五萬疋八月鳯翔節度使李玭奏收復秦州制曰自昔皇王之有國也何嘗不文以守成武以集事叅諸二柄歸于大寧朕猥荷丕圖思𢎞景運憂勤戒惕四載于兹每念河湟土疆綿亘遐闊洎天寳末犬戎乗我多難無方禦姦遂從腥羶不逺京邑事更十葉時近百年進士試能靡不竭其長䇿朝廷下議皆亦聽其直詞盡以不生邉事為永圖且守舊地為明理荏苒於是收復無由今者天地儲祥祖宗垂祐左袵輸欵邉壘連降刷恥建功所謀必克實賴樞衡妙筭將師雄威副元𤣥不爭之文絶漢武逺征之悔甌脱頓空於内地斥堠全據於新封莫大之休指期而就况將士等櫛沐風雨暴露郊原披荆榛而刁斗夜嚴逐豺狼而穹廬曉破動皆如意古無與京念此誠勤宜加寵賞涇原宜賜絹六萬疋靈武五萬疋鳯翔邠寧各賜四萬疋嗚呼七關要害三都膏腴候館之殘恥可尋唐人之遺風尚在追懐往事良用興嗟夫取不在廣貴保其金湯得必有時詎計於遲速今則便務脩築不進干戈必使足食足兵有備無患載洽愛育之道永置生靈之安中外臣寮宜體朕意十二月追諡順宗曰至德大聖大安孝皇帝憲宗曰昭文章武大聖孝皇帝初以河湟收復百寮請加徽號帝曰河湟收復繼成先志朕欲追尊祖宗以昭功烈白敏中等對曰非臣等愚昧所能及至是上御宣政殿行事及冊出上俯僂自送流涕嗚咽四年春正月以追尊二聖御正殿大赦天下五年八月河州刺史張義潮遣兄義澤以𤓰沙伊肅等十一州户口來獻自河隴陷蕃百餘年至是悉復隴右故地八年正月陜州黄河清二月南蠻進犀牛詔還之十一年九月右補闕陳瑕左拾遺王譜右拾遺薛廷傑上疏諫遣中使往羅浮山迎軒轅先生上曰朕以萬㡬事繁躬親庶務訪聞羅浮山處士軒轅集善能攝生延齡益夀乃遣使迎之或冀有少保理也朕每觀前史見秦皇漢武為方士所惑常以之為誡卿等位當補闕職在諫司閲示來章深納誠意仍謂崔慎由曰為吾言於諫官雖少翁欒大復生不能相惑如聞軒轅生髙士欲與之一言耳十二年春正月羅浮山人軒轅集至京師上召入禁中謂曰先生遐壽而長生可致乎曰徹聲色去滋味哀樂如一徳施周給自然與天地合徳日月齊明何必别求長生耶畱之月餘堅求還山十三年五月上不豫月餘不能視朝八月宣遺詔立鄆王爲皇太子勾當軍國事是日崩于大明宫聖壽五十諡曰聖武獻文孝皇帝廟號宣宗𦵏貞陵懿宗恭惠皇帝唐書曰懿宗恭惠皇帝諱漼宣宗長子母曰元昭皇太后晁氏大和七年十一月生於藩邸㑹昌六年十月封鄆王本名温大中十三年八月遺詔立爲皇太子監國改今名十三日即帝位時年二十七帝姿貎魁傑有異稠人藩邸時嘗經重疾郭淑妃侍醫藥見黄龍出入於卧内既間妃以異告帝曰愼勿復言又嘗大雪數尺而帝寢室之上獨無人皆異之宣宗製秦邉陲樂曲詞有海嶽晏咸通之句又大中末京城小兒疊布漬水紐之向日謂之投暈帝果以鄆王即大位以咸通爲年號九月釋服追尊母后晁氏爲太后諡曰元昭咸通元年春正月上御紫宸殿受朝十一月丁未有事於郊廟禮畢御丹鳯樓大赦改元二年九月林邑蠻冦安南府遣神策將軍康承訓率禁軍及江西湖南之兵赴援三年春正月左僕射門下侍郎平章事杜悰率百寮上徽號曰睿文明聖孝徳皇帝四年春正月庚午有事于圜丘禮畢御丹鳯門大赦五年四月南蠻冦邕管以秦州經畧使高駢率禁軍五千赴邕管會諸道之師禦之五月制曰朕以寡昧獲承高祖太宗之丕構六載於兹矣罔畋遊是娛罔聲色是縱罔刑戮是濫罔邪佞是惑蚤夜悚惕以憂以勤庶幾乎八表用康兆人以泰而西戎欵附北狄懐柔獨唯南蠻奸宄不率侵陷交阯突犯邊陲爰及嶲州亦用攘冦勞我士卒興吾甲兵騷動黎元役力飛輓每一軫念憫然疚懐顧惟生人罹此愁苦宜布自天之澤俾垂及物之仁如聞湖廣桂州是嶺路係口諸道兵馬綱運無不經過頓遞供承動多差配彫傷轉甚宜有特恩應澤桂兩道各賜錢三萬貫以助軍錢以充館驛息利本錢其江陵江西鄂州三道比於澤桂徭配稍簡宜令本道觀察使詳其間劇准此例與直本錢黎嶲等州因蠻冦殺傷宜令本道收拾埋瘞六年秋髙駢自海門進軍破蠻軍收復安南府自李琢失利交趾陷没十年蠻軍北冦邕界人不聊生至是方復故地七年十月安南都䕶高駢奏蠻冦悉平十一月御宣政殿大赦以復安南故地九年七月徐州赴桂林戍卒五百人官軍許佶趙可立殺其主將王仲甫以糧料判官龎勛爲都頭剽掠湘潭衡山兩縣有衆千人擅還本鎮九月甲午龎勛陷宿州知州判官焦璐奔歸于徐乙未龎勛陷徐州十年九月賊宿州守將張𤣥稔以城降有兵萬人馬舉率兵赴之龎勛聞之以其衆將攻𤣥稔𤣥稔賊之勁將也遂與舉合勢急圍徐州許佶登城拒守者三日佶敗出走稔收復徐州龎勛方來赴援聞城已破欲南趨濠州馬舉追及渙河擊敗之勛溺水而死蕭縣主將又斬許佶首來降徐冦悉平十一月南詔蠻驃信坦綽酋龍率衆二萬冦嶲州十二月勅荆南節度使杜崇禦之據司天奏有小孛星氣經厯分野恐有外夷兵水之患緣邉藩鎮最要隄防宜訓習師徒増築城堡凡闗制置以其事聞十一年八月同昌公主薨追贈衛國公主諡曰文懿主郭淑妃所生上尤鍾念悲惜異常以待詔韓宗紹等醫藥不効殺之收捕其親族三百餘人繫京兆府宰相劉瞻京兆尹温璋上疏論諫行法太過上怒十二年春正月宰相路巖率文武百寮上徽號曰睿文英武明徳至仁大聖廣孝皇帝御含元殿受册畢大赦五月庚申勅慎恤刑獄大易格言詔曰如得其情則哀矜而勿喜而獄吏苛刻務在舞文守臣因循罕聞視事以此械繫之輩溢於狴牢追捕之徒繁於簡牘實傷和氣用致沴氛况時屬熇蒸化先茂育並赦罪戾式順生成應天下所禁繫罪人除十惡五逆故意殺人外餘並宜疎理釋放十四年六月帝不豫七月戊寅疾大漸制立晉王儼爲皇太子權勾當軍國政事辛巳遺詔曰皇太子儼性禀寛和生知忠孝徳包睿哲聖表徇齊必能揚祖宗之重光荷邦家之丕構宜令所司具禮於柩前即皇帝位是日崩於咸寜殿聖壽四十一諡曰睿文昭聖恭惠孝皇帝廟號懿宗𦵏于簡陵太平御覽卷一百十五
