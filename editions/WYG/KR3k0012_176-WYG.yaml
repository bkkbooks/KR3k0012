body:
  text: 太平御覽卷一百七十六宋李昉等撰居處部四堂堂皇附樓堂説文曰堂殿也釋名曰堂猶堂堂髙顯貌也禮記曰堂上不趨堂上接武堂下布武又曰將上堂聲必揚又曰禮有以髙為貴者天子之堂九尺諸侯七尺大夫五尺士三尺又曰禮天子不下堂而見諸侯下堂而見諸侯天子之失禮也由夷王以下尚書大傳曰天子堂九雉諸侯七雉伯子男五雉雉三尺也續漢書曰中平三年造萬公堂於西園三十國春秋西凉傳曰李暠於南門外臨水起堂名曰靖恭堂以議朝政閱武事堂成圖讃自古明王忠臣孝子貞女暠自為序以明鑒戒文武羣僚亦皆圖焉是月白雀翔于靖恭暠頌之梁書曰髙祖五年改閲武堂為德陽堂改聽訟堂為義賢堂魏書曰任城王澄從髙祖於觀徳殿髙祖曰射以觀德次之凝閒堂髙祖曰名要有其義此取夫子閒居之義不可縱奢以忘儉自安以忘危故此堂後作茅茨堂謂李冲曰此東曰歩元廡西曰遊凱廡此坐雖非唐堯之居卿等當無愧於元凱冲對曰臣既遇唐堯之君不敢辭元凱之譽髙祖曰光景垂落朕同宗則有載考之義卿等將出無逺何得黙爾德音即命黄門侍郎崔光郭祚邢巒崔休等賦詩言志燭至公卿辭髙祖曰在夜載考宗族之義卿等且還朕與諸王宗室欲成此夜飲和苞漢趙記曰劉聰嘉平三年廷尉陳元達極諫聰怒將斬之聰時幸逍遥園李中堂元達抱堂下樹呌曰臣所言者社稷之計聰免之於是易李中堂為愧賢堂北史齊文襄於鄴東起山池遊觀河間王孝愉遂於第中作水堂龍舟植幡矟於舟上數集諸弟宴射為樂武成幸其第見而悦之故盛興後園之翫於是貴賤慕效處處營造又曰若干惠事母以孝聞周文帝造射堂新成與諸將㑹宴射惠竊歎曰親老矣何時辦此周文聞之即日徙堂於惠宅論衡曰王者之堂墨子稱堯舜堂髙三尺儒家以為卑下假使之然髙三尺之堂蓂莢生於階下須臨堂察之乃知莢數夫起視堂下之莢孰與懸日歴於扆坐顧輙見之也風俗通曰殿堂象東井形刻作荷菱荷菱水物也所以厭火晉宫闕名曰洛陽宫有則百堂螽斯堂休徴堂延祿堂仁夀堂綏福堂含芳堂樂日堂椒華堂芳音堂顯成堂承先堂五福堂嘉寧堂瑞應圖曰帝琴堂前有橘樹連理改琴堂為連理堂華陽國志曰文翁立講堂前又作石室一曰玉堂在城南後堂遇火太守更修立又增二石室盧氏家記曰盧渾為右衛將軍太夫人年髙求解職被詔不聽特假百日迎母東歸起養親堂集㑹作詩言志齊地記曰臨淄城西門外有古講堂基柱猶存齊宣王修文學處也拾遺記曰董偃嘗卧延清之堂設火齊屏風又曰海人獻龍膏為燈於燕昭王王坐通雲之堂具燈部襄沔記曰馬衆每年刺史三月上旬於此泉起曲水流杯堂引泉水為祓禊之所臨時構造事竟毁除其流杯堂今在壘城西郡國志曰王屋縣有孔子學堂西南七里有石室臨大河水勢湍急五里之間寂無水聲如似聽義又曰齊桓公宫城西門外有講堂齊宣王立此學也故稱為稷下學莒子如齊盟于稷門此也宋永初山川古今記曰永康縣縉雲堂黄帝鍊丹處又曰費北有積弩堂益州記曰文翁學堂在城南羊頭山記曰學堂在洛陽南陽闗外長十丈廣三丈堂前石經四部本碑凡四十八枚西尚書周易公羊十六碑南禮記五碑東論語三碑有諫議大夫馬日磾議郎蔡邕銘又曰聖壽堂石虎造垂玉佩八百大小鏡二萬枚丁香末塗壁胡桃油塗瓦四面垂金鈴萬枚去鄴三十里聞響十洲記曰崑崙山有光碧之堂西王母所居郡國志曰雞陂之側即春申君子假君之殿也後太守居之以數失火故塗以雌黄遂名黄堂説苑曰聖人之於天下譬如一堂之上也今有滿堂飲酒者一人獨纍然向隅而泣則一堂之人皆不樂矣管子曰堂上逺於百里門庭逺於萬里今步者一日百里之情通堂上有事十日而君不聞步者十日千里之情通堂下有事一月而君不聞步者百日萬里之情通門庭有事朞年而君不聞此謂逺於萬里也漢武内傳曰上元夫人言西王母有六甲之術用之可以遊景雲之宫登流霞之堂漢武故事曰玉堂去地十二丈基階皆用玉東京賦曰金華玉堂白虎麒麟潘尼詩曰鸞鳯棲堂廡不若翔寥廓文選天台山賦玉堂䕃映乎髙隅楚辭曰魚鱗屋兮龍堂古詩云黄金為君門白玉為君堂庭中生桂樹華燈何煌煌堂皇附漢書曰坐堂皇上宫而無四壁曰皇也廣雅曰堂皇合殿也洛陽記曰洛陽宫有桃間堂皇杏間堂皇柰間堂皇竹閒堂皇李閒堂皇魚梁堂皇醴泉百戯堂皇晉宫闕名曰洛陽有水碓堂皇擇果堂皇陸機四言詩序曰天子晏朝士於宣猷堂皇遂命機賦詩樓爾雅曰狹而修曲曰樓説文曰樓重屋也樔澤中守草樓也釋名曰樓有户牗諸孔婁婁然也史記曰方士言武帝曰黄帝為五城十二樓以候神人帝乃起神明臺井榦樓髙五十丈輦道相屬漢書曰濟南人公玉帶上黄帝明堂圖中有一殿四面無壁以茅葢通水水圜宫垣為復道上有樓從西南入葢樓又郊祀志云其南有玉堂璧門大鳥之屬立神明臺井榦樓髙五十丈輦道相屬顔師古注云漢宮閤疏云樓髙五十丈上有室東觀漢記曰公孫述造十層赤樓也後漢書張奐傳曰初奐為武威太守其妻懷孕夣帯奐印綬登樓而歌占者曰必將生男復臨兹郡命終此樓旣而子猛以建安中為武威太守殺刺史州兵圍之急猛耻見擒乃登樓自焚而死又曰黄昌為郡守陜縣彭氏造髙樓臨道昌行縣彭氏婦人輙升髙樓而觀昌乃殺之蜀志周羣作小樓多令奴更直樓上視天災纔有一氣即白羣羣自上樓觀之晉書曰石崇作樓令婢緑珠作歌舞於上孫秀求緑珠不得及崇被收方在樓上謂珠曰吾今為汝死矣珠乃墜樓而死又曰義熈八年於石頭東城内起髙樓加累入於霄漢連堞帶於積水署曰入漢樓宋書曰大明元年五月壬子紫氣出景陽樓狀如烟薄乆之詔改景陽為景雲樓趙書云趙梁襲長安秦王業奔射鴈樓格戰至天明不㧞齊書曰東昏侯大起仙華神仙至壽諸殿刻畫雕綵麝香塗壁窮極綺麗世祖興光樓上施青漆世謂之青樓帝曰武帝不巧何不絶用瑠璃又曰焦度嘗戰敗逃於營亭湖中江州刺史王景文誘降復拒沈攸之於郢城登樓辱詈攸之攸之不能下至今呼此樓為焦度樓也又魏虜傳云虜自佛狸至於萬民世增雕飾正殿西築臺謂之白樓樓南又有祠星樓梁書處士陶宏景傳云宏景止於句容句曲山永元初更築三層樓宏景處其上弟子居其中賔客至其下又曰大同十年幸蘭陵因賦歸舊鄉詩己酉幸京口城北固樓曰此不足以固守然北望江山實為壯觀乃改名北顧幸廻賓亭宴帝鄉故老及迎候者少長數千人各賚錢二千周書曰孫儉傳云為荆州刺史人安其業吏人表請為儉搆清徳樓樹碑刻頌朝議許焉盛宏之荆州記云西鄂城東有三女樓周稚歿三女造此樓於墓所老君本記云周康王時文始眞人結草為樓占星候氣登眞隱訣云長綿樓上清太上宫名玉晨道君所居吳越春秋云㑹稽郡小城勾踐築臺周圍千一百二十步立為龍翼樓世説云桓翼征西治江陵城甚麗顧長康曰遥望層城丹樓如霞墨子云城偏三十步置坐候樓出堞四尺百步立木樓樓前廣九尺髙七尺二百步一大樓去城中二丈五尺洛陽地記曰洛陽城内西北角有金墉城東北角有樓髙百尺魏文帝造也盛宏之荆州記曰荆州城西百餘步有棲霞樓臨川康王所置吳越春秋曰范蠡為勾踐立飛翼樓以象天門為兩蟉繞棟以象龍角羊頭山記曰原城西門南角萬歳樓俗傳飛入江常以鐡鏁維之又樓上時見一道白氣如烟刺史必死輕者貶謫州人至為常候郡國志曰定州安喜縣城樓謂之神女樓又曰馬邑白樓即後魏納姚興女為后后悲思因造此樓登望飾以鈆粉故名之又曰金華縣因山為城南臨溪水髙阜上有樓名曰𤣥暢樓宋沈約造以吟詠於此處韋述兩京新記曰上陽宫有麗青臺浴日樓十洲記曰崑崙山有玉樓十二層虞氏家記曰吳小城白門樓吳王闔閭所作也至秦始皇帝守宫吏燭燕窟失火燒宫而此樓故存瀬卿記曰老子廟有皇天樓九柱樓静念樓皆畵􅋖人雲氣袁彦伯羅山疏曰仰望石樓𦕈然在雲中金陵地記曰吳嘉禾元年於桂林苑起一樓名之曰落星樓吳都賦曰享戎旅於落星之樓樓在建業東北十里世説曰凌雲臺樓觀極精巧先稱平衆材輕重當宜然後造構乃無錙銖相負揭臺雖髙峻恒隨風揺動魏明帝登臺懼其勢危别以大材扶持之樓便頽壞論者謂輕重力偏故也九江録曰庾亮在武昌諸佐吏殷浩等乘秋夜佳景共登髙樓俄而不覺亮至衆將避之公曰老子於此興復不淺便坐談詠至今名庾公樓幽明録曰鄴城鳯陽門五層樓去地五十丈安金鳯凰三頭於其上二頭飛入漳河朗見在水㡳一頭今獨存水經曰鄧州㶚陵山上有入鄉樓益州記曰成都有百尺樓晉宫閤名曰洛陽有鳯凰樓古詩曰西北有髙樓上與浮雲齊樂府詩云日出東南隅照我秦氏樓漢宫閣名云長安有馬伯騫樓又有貞女樓晉宫閣名云晉有祠星樓又曰總章觀儀鳯樓在觀上廣望觀之南又别有鳯翔樓又有慶雲樓太平御覽卷一百七十六
