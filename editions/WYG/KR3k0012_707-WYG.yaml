body:
  text: 太平御覽卷七百七宋李昉等撰服用部九枕被枕說文曰枕卧為所薦首者也釋名曰枕檢也所以檢項也詩曰角枕粲兮錦衾爛兮又曰有美一人碩大且儼寤寐無為展轉伏枕周禮曰玉府掌王之金玉玩好大喪共含玉角枕禮曰鷄鳴咸盥潄歛枕簟國語曰楚靈王敗於乾谿王親獨行徬徨於山林之中三日乃見其涓人疇王呼曰余不食三日矣疇趨而進王枕其股以寢於地王寐疇枕王以墣而去之墣塊也洞林曰丞相從事中郎王文英家枕自作聲漢書曰淮南王有枕中鴻寶袐苑書言使鬼物為金之術及鄒衍重道延命方世人莫知劉更生父德武帝時治淮南獄得書更生以為竒獻之言黃金可成上命典尚方鑄作事費甚多不騐後漢書曰樂崧天性朴忠家貧為郎嘗獨直臺上無被枕止食糟糠帝每夜入臺輙見崧問其故甚嘉之自此詔太常賜尚書以下朝夕飡給幃帳東觀漢記曰黃香事親暑則扇枕寒則以身温席後漢書曰魏髙昌有白鹽其形如玉髙昌人取以為枕貢之中國魏志曰蘇則為侍中董昭嘗枕則膝卧則推下之曰蘇則膝非佞人枕也魏略曰大秦國出五色枕吳書曰張紘作柟榴枕賦陳琳在北得之因以示士人曰此吾鄉里張紘作也晉書曰王敦鎮豫章為王澄以舊意所侮敦益忿怒請澄入宿隂欲殺之而澄左右二十人持鐵馬鞭為備澄手恒捉玉枕以自防故敦未之得發後敦賜澄左右酒皆醉借玉枕觀之因下牀而謂澄曰何與杜弢通信敦令力士格澄搤殺之又曰筮者謂董豐曰君憂獄逺二枕避三沐豐既歸妻具枕授沐豐皆不從其夜果誤殺妻也沈約宋書曰武帝記曰寧州常獻虎魄枕光色甚麗時北征以虎魄治金瘡上大悅命擣碎分諸將又曰武昌王渾少而㓙戾為中書令每夕裸身露頭徃㪚騎省戲因彎弓射通直郎周郎中枕以為笑樂又朱石齡少好武不事崖檢舅淮南蔣氏才劣齡石使舅卧聽事剪紙方一寸帖著舅枕以刀子懸擲之相去八九尺百擲百中舅畏石齡終不敢動齊書曰陳顯達建武世不自安侍宴酒後啓上借枕帝令與之顯達撫枕曰臣年已老富貴已足唯少枕死特就陛下乞之上失色曰公醉矣北齊書曰郎基字世業性清慎嘗語人曰任官之所木枕亦不須作况重於此者也梁書曰王茂為雍州長史人或譛茂反武帝弗之信令鄭紹叔徃候之遇其卧因問疾茂曰我病可耳紹叔曰都下殺害日甚使君家門塗炭今欲起義長史那猶卧茂因擲枕起即袴褶隨紹叔入見武帝唐書曰𤣥宗嘗製大被長枕與諸王共之又曰貴妃娣虢國夫人豪侈尤甚所枕之枕不知其價夜中照廡其光如晝尸子曰孝子一夜五起視親衣之厚薄枕之髙下淮南子曰楚將子發好伎道之士有善偷者徃見子發子發禮之無幾齊伐楚偷夜出盜其齊將軍枕歸之明夕復取其簮又以歸之齊師大駭還師而去越絶書曰越王問范子曰寡人已問隂陽之事榖之貴賤可得而知乎曰陽者主榖貴隂者主榖賤故當寒而不寒榖為之暴貴當温而不温榖為之暴賤王曰善書帛藏之枕中以為國寶范子曰堯舜禹湯皆有預見之明雖有㓙年而民不窮王曰善以丹書置之枕中以為邦貴東宫舊事曰皇太子納妃有龍頭髻枕銀環鉤副之蔡質漢官儀曰尚書郎直給通中枕西京雜記曰趙飛鷰為皇后其女弟上遺虎珀枕龜文枕拾遺録曰魏咸熈二年宫中夜夜有異或吼呼驚人乃有傷害者詔使宦者闇中伺候有白虎毛色淨宻以戈投虎即中左目俄而徃取虎已隱形更搜覓乃於藏中得一玉虎枕左目有血帝嗟其大異問諸大臣答云昔誅梁冀得玉虎枕一枚云此枕單池國所獻臆下有題云帝辛九年獻帝辛紂也金玉久而有神神仙傳曰泰山父者漢武帝東廵狩見父頭頂白光高數尺帝呼問之曰有道士教臣作神枕有三十二竅以應二十四氣八竅應八風臣行之轉少而齒生列異傳曰景初中咸陽縣吏王臣夜倦枕枕卧有頃聞竈下有呼曰承約何以不來頭下應曰我見枕不得動汝來就我飲至乃缶也集異記中曰劉𤣥暮忽見一人著烏袴褶取火照之面首有七孔面莽黧然乃請師筮之師曰此是君家先世物久則為魅劉因執縛以刀砍數下變為一枕乃是先祖時枕異苑曰滕放枕文石枕卧忽暴雷震其枕傍人莫不為之怖懾而放㣲覺有聲不怖也其所枕葢六安也楚宋玉髙唐賦曰宋玉嘗遊髙唐怠而晝寢夢見一婦人曰妾巫山之女願薦枕蓆司馬相如長門賦曰搏芳若以為枕蓆荃蘭而為香又美人賦曰髙茵重席角枕横施劉向别録曰向有芳松枕賦後漢張紘瓌林枕賦曰有卓爾之珠瓌超詭異以邈絶且其色也如芸之黄其為香也如蘭之芳其文彩也霜地金莖紫葉而紅榮蔡邕警枕銘曰應龍蟠蟄潛徳保靈制器像物示有其形哲人降鑒居安慮傾崔駰六安枕銘曰枕有規矩恭一其徳承元寧躬終始不忒六安言六面安也蘇彦楠榴枕銘曰珍木之竒文鬱理鮮廉稜方正密滑貞堅卞敬宗作無患枕讃無患木名也又言枕之無患也江文通詩曰撫枕懐百慮被說文曰衾大被也釋名曰被所以被覆人也衾也其下廣大如岸之受人也論語曰必有寢衣長一身有半詩曰錦衾爛兮又曰肅肅宵征抱衾與裯傳曰楚子次于乾谿雨雪楚王皮冠秦復陶翠被豹舄皮鞭以出史記曰王章字仲卿疾無被卧牛衣中又曰汲黯曰公孫𢎞位至三公俸禄甚厚為布被此詐也上問𢎞𢎞謝曰有之夫九卿與臣善者無黯過然今日廷詰臣誠中臣之病夫以三公為布被餙詐以釣名且臣聞管仲相齊有三歸侈擬於君桓公亦覇晏嬰相景公食不重肉妾不衣絲齊國亦治今臣位為御史大夫而為布被自九卿以下至小吏無差誠如黯言且無汲黯忠陛下安聞此言天子以為謙讓愈益厚之漢書曰廣川王去疾妃昭信甚妒王愛姬陶望卿昭信妒之譛於王曰望卿有姦因即言郎中令卧錦被王信之繫殺之又曰李夫人疾篤上自臨候之夫人䝉被謝曰妾久寢病形貌壊不可見帝願以王及兄弟為託又曰霍光薨詔賜繡被百領後漢書曰祭遵奉公家無私財布被夫人裳不加綵又曰宣乘性節儉常服布被蔬食華嶠後漢書曰樂崧為郎獨宿直臺上無被帝推被與之袁山松後漢書曰范丹為莱蕪長去官無被空囊自隨也謝承漢書曰京兆朱寵字仲威為太尉家貧卧布被朝廷賜錦被卧兼布被又曰羊續字興祖為南陽太守以清率下唯卧一幅布綯敗糊紙補之東觀漢記曰王良為大司徒在位清儉妻子不入官舍布被瓦器又曰馮豹字仲文後母惡之嘗因豹夜卧引刀砍之正值其起中被獲免又曰馮豹每奏事未報嘗卧省門下或從昏至明天子黙使小黃門持被覆之曰勿驚之漢官典職曰尚書郎入直供青練白綾被或錦被魏書曰文帝詔朝臣三代大夫知被服五代大夫知飲食此言被服飲食難曉也晉陽秋曰景帝有目疾文鴦之來攻驚而目出懼六軍恐䝉以被痛甚齧被破晉書曰魏舒為尚書郎時欲沙汰即官有非其才者罷之舒乃曰吾即其人也襆被徑出論者咸有愧色又曰楊駿被誅初駿徴髙士孫登遺以布被登截被於門外大呼曰砍判旬日託疾死及是其言果騐又曰光逸字孟祖為博昌小吏令使之冐雨還令不在逸解衣卧被衾中令還詰之逸曰衣單冐雨如不易衣必致凍死何惜一被而殺人也令竒之而不問又曰祖逖字士雅與琨共被寢中夜聞鷄鳴蹴琨覺曰起舞此非惡聲又曰吳納為吳興守徴為尚書去任有被幞而已又曰秃髪烏孤之祖壽闐之在孕母胡掖氏因寢而產於被中鮮卑謂被為秃髪因而氏焉宋書曰虞龢為中書郎廷尉少好學居貧房漏恐濕墳典乃舒被覆書書獲全而被大濕時人以比髙鳳又曰沈麟士以楊王孫皇甫謐深達生死未終禮矯俗乃自為終制遺令氣絶剔被取三幅布以覆屍及歛仍移布於屍下以為歛服反被左右兩際以周上又曰康沙門釋寶志玉亮欲以衲被遺之未及有言寶志忽來牽被而去又曰羅研齊狗兒之後臨汝侯嘲之曰卿蜀人樂禍貪亂一至於此對曰蜀中積弊實非一朝百家為林不過數家有食貪亂樂禍無足多恠若令牀上有百錢布被甑中有數升麥飯寧肯為亂乎梁書曰裴之橫字如岳少好賔重氣俠不事產業兄之尚以其縱誕乃為狹被蔬食以激厲之之橫嘆曰大丈夫富貴必作百幅被後為吳興太守作百幅以成其志陳書曰髙宗時豫州獻織成羅文錦被詔於雲龍門外焚之孫卿子曰天子至尊重無上矣衣被則五彩雜間色重文繡加餙之以珠玉家語曰黔婁先生死被短露足孔子及門人見之謂其妻曰寧使正之不足不可斜之有餘說􅁐曰鄂君乘青翰之舟張翠華之葢越人擁檝而歌曰山有木兮木有枝心悅君兮君不知於是鄂君舉繡被而覆之夏侯孝子集曰羊太常辛夫人字憲英性不好華麗從外孫胡母楊上夫人錦被夫人取反卧之晉惠帝起居注曰帝至朝歌無被中黃門以兩幅布被給帝東宫舊事曰太子納妃有七綵文綺被一綘羅四幅被四繡羅五幅被一東宫故事曰太子有七綵文綺被又有綘文羅面被京兆舊事曰長安孫晨家貧為郡功曹十月無被夜卧蒿束晝収之西京雜記曰趙飛燕為皇后其女弟上遺鴛鴦被晉陸雲與兄機書曰一日按行曹公器物有寒夏被有七枚海内先賢傳曰姜肱字伯淮事繼母年少肱兄弟感凱風之孝同被而寢不入室以慰母心也邊讓别傳曰讓字元禮才辯俊逸孔融薦於魏武曰邊讓為九州之牧則不足為單衣襜褕則有餘益部耆舊傳曰王忳字少林於客舍見諸生疾甚困謂忳曰腰下有黃金十斤願以相與乞収藏屍骸未及問其姓名呼吸困絶忳賣金一斤以給棺柩餘九斤置生腰下後署大度亭長到亭有白馬一疋入亭中其日大風有一繡被隨風而來後忳乗馬馬突入金彦父家彦父見曰真得盗矣忳說得馬之狀又取被示之彦父曰卿有何隂徳因念塟諸生事且說形狀彦父曰真我子也忳即以被馬歸之彦父不受遣迎生喪金具存焉列女後傳曰江夏孟宗少遊學與同學共處母為作十二幅被其隣父怪問之母曰少兒無異操懼朋類之不顧大其被以招貧生之卧庶聞君子之言耳桓任傳曰任後母酷惡常憎任為作二幅箕踵之被杜祭酒别傳曰君曾新作被暖眠不覺晏起乃嘆暖眠使人忘起異事因命著陌上有寒苦人學被乞之常眠布被中孫畧别傳曰親戚有窮老者畧咸推被以恤之冬寒不解帶而寢郭子曰殷浩作揚州劉君行曰日欲暮便令左右取被幞人問其故答云刺史嚴不敢夜行語林曰魏武云我眠中不可妄近近輒斫人不覺左右宜慎之後乃陽凍眠所幸小兒竊以被覆之因欲砍殺自爾莫敢近之又曰傅信字子思遭父喪哀慟骨立毋憐之竊以錦被䝉其上林宗徃弔之見被謂之曰卿海内之雋四方是則如何當喪錦被蒙上郭奮衣而去自後賔絶百許日古詩曰客從逺方來遺我一端綺文綵雙鴛鴦裁為合歡被著以長相思縁以結不解樂府詩曰天寒知被薄憂思知夜長楚辭曰翡翠珠被爛齊光陸雲芙蓉詩曰寢共織成被絮之同功綿傅𤣥被銘曰被雖温無忘人之寒無厚於已無薄於人張華苦寒行曰重寒無暖氣班被覆空然潘岳悼亡詩凛凛凉風升始覺夏衾單豈曰無重纊誰與同歲寒梁劉孝威謝賚錦被啟曰色艶蒲桃采踰聨璧鄂君慚繡楚侍羞珠雖復帝賜鶴綾客贈鴛綺髙懸麗藻逺謝鮮明漢老悦其怪文魏馬驚其香氣太平御覽卷七百七
