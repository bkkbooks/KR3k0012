body:
  text: 太平御覧卷九十三宋李昉等撰皇王部十八魏太祖武皇帝文皇帝魏太祖武皇帝魏志曰太祖武皇帝沛國譙人姓曹名操字孟徳漢相國參之後曹瞞傳曰太祖一名吉利市小字阿瞞祖騰漢桓帝時為中常侍大長秋封費亭侯養子嵩嗣官至太尉莫能審其生出本末曹瞞傳及郭班世語並云嵩夏侯氏子夏侯惇之叔父太祖於惇為從父兄弟也嵩生太祖太祖少機警有權數而任俠放蕩不治行業故世人未之竒也唯梁國橋𤣥南陽何顒異焉𤣥謂太祖曰天下將亂非命世之才不能濟也能安之者其在君乎年二十舉孝㢘為郎除洛陽北部都尉遷􅉐丘令徴拜議郎光和末黃巾起拜騎都尉討頴川賊遷為濟南相國有十餘縣長吏多阿附貴戚贓汚狼籍於是奏免其八九禁斷滛祀姦雄逃竄郡界整肅乆之徵還為東郡太守不就稱疾歸鄉里初平元年春正月後將軍袁術冀州牧韓馥兖州刺史劉岱渤海太守袁紹濟北相鮑相等同時俱起衆各數萬推紹為盟主太祖行奮武將軍董卓聞兵起乃徙天子都長安卓留屯洛陽遂焚宫室是時卓兵强紹等莫敢先進太祖曰舉義兵以誅暴亂大衆已合諸君何疑向使卓聞山東兵起恃王室之重據二周之險東向以臨天下雖以無道行之猶足為患今焚燒宫室刼遷天子海内震動不知所歸此天亡之時也一戰而天下定矣不可失也遂引兵西據成臯到榮陽汴水遇卓將徐榮與戰不利士卒死傷甚多太祖為流矢所中乗馬被創從弟洪以馬與太祖得出太祖兵少乃與夏侯惇等詣揚州募兵司徒王允與吕布共殺卓青州黃巾衆百餘萬人兖州劉岱欲擊之鮑信諌岱不從遂與戰果為賊所殺信乃迎太祖領兖州牧遂進兵擊黃巾追至濟北乞降冬受降卒三十餘萬男女百餘萬口收其精銳者號青州兵天子拜太祖兖州牧是嵗長安亂天子東遷敗於曹陽渡河幸安邑太祖軍臨武迎天子假太祖節鉞録尚書事獻記曰又領司隷校尉洛陽殘破董昭等勸太祖都許車駕出轘轅而東以太祖為大將軍封武平侯自天子西遷朝廷離亂至是宗廟社稷制度始立時以袁紹為太尉紹耻班在公下不肯受公乃固辭以大將軍讓紹天子拜公司空行車騎將軍公圍張繡於穰劉表遣兵救繡以絶軍後公將引還繡兵來追公軍不得進連營稍前公與荀彧書曰賊來追吾雖日行數里吾䇿之到安衆破繡必矣到安衆繡與表兵合守險公軍前後受敵公乃夜鑿險為地道悉過輜重設竒兵㑹明賊謂公為遁也悉軍來追乃縱竒兵歩騎夾攻大破之公還許荀彧問公前何以策賊必破公曰虜遏吾歸師而與吾死地戰吾以是知勝矣袁紹既并公孫瓉兼四州之地衆十餘萬諸將以為不可敵公曰吾知紹之為人志大而智小色厲而膽薄忌刻而少威兵多而分畫不明將驕而政令不一土地雖廣粮食雖豐適所足以為吾奉也張繡率衆降公軍官渡𤣥德殺徐州刺史曹胄舉兵屯沛五年公自征之諸將曰與公爭天下者袁紹也今棄之東若何公曰𤣥德人傑也今不擊必為後患袁紹雖有大志而見事遲必不動也遂破𤣥德𤣥德奔紹紹遣淳于瓊顔良等攻劉延于白馬紹引兵至黎陽公於是救延荀攸說公曰今兵少不敵分其勢乃可公從之遂擊破斬良紹騎將文醜與𤣥德將五六千騎前後至公縱竒兵擊大破之斬文醜醜良皆紹名將再戰悉擒紹軍大震八月紹連營稍前進臨官渡起土山地道公亦於内作之以相應紹射營中矢如雨下行者皆蒙盾衆大懼時公粮少與荀彧書議欲還許彧以為紹悉衆泛官渡欲與公決勝敗公以至弱當至强若不能制必為所乗是天下之大機也公與紹相距連月雖比戰斬將然衆少粮盡士卒疲乏公謂運者曰十五日為汝破紹不復勞汝矣冬十一月紹遣車運穀使淳于瓊等五人將兵萬餘人逆之宿紹軍營北四十里紹謀臣許攸貪財紹不能用來奔因說公擊瓊等左右疑之荀攸賈詡勸公公乃留曹洪守自將歩騎五千人夜往㑹明至瓊等望見公兵少出陣門外公急擊之瓊退保營遂攻之紹遣騎救瓊左右或言賊稍近請分兵距之公怒曰賊至背後乃言士卒皆殊死戰大破瓊等皆斬之紹初聞公擊瓊謂長子譚曰就彼破瓊等吾攻收其營彼固無所歸矣乃使張郃髙覧攻曹洪郃等聞瓊破遂來降紹衆大潰紹及譚棄軍走泛河追之不及盡收其輜重圗書珍寳虜其衆公收紹書中得許下及軍中人書皆焚之紹自軍破後發病嘔血死少子尚代譚自號車騎將軍屯黎陽秋公征之連戰譚尚數敗退固守攻其郭乃出戰擊大破之譚尚走遁譚尚爭冀州譚為尚所敗走平原尚攻之急譚遣卒毗乞降請救諸將皆疑荀攸勸公許之公乃引軍到黎陽為子整與譚結婚袁尚聞公北乃釋平原還鄴公進軍攻鄴尚懼乞降公不許為圍益急尚夜遁衆大潰尚走中山盡獲其輜重得尚印綬節鉞鄴定公臨祀紹墓哭之流涕慰勞紹妻還其家人寳物賜之雜繒絮廪食之天子以公領冀州牧公讓還兖州公之圍鄴也譚略取甘陵安平渤海河間尚敗還中山譚復攻之尚奔固安遂并其衆公遺譚書責以負約與之絶婚女還然後進軍譚懼㧞平原走保南皮公入平原略定諸縣攻譚破之斬誅其妻子冀州平袁熈大將焦觸張南等叛攻熈尚熈尚奔三郡烏丸觸等舉其縣降封為列侯三郡烏丸承亂破幽州略有漢民合十餘萬戸初袁紹皆立其酋豪西單于蹋頓尤强為紹所厚故尚兄弟歸之數入塞為害公將征之鑿渠自滹沱以引水名平虜渠引軍出盧龍塞外道絶不通乃壍山堙谷五百餘里經白檀厯平剛渉鮮卑庭東指柳城未至二百里虜乃知之尚熈與蹋頓遼東單于樓班右北平單于能臣抵之等將數萬騎逆軍登白狼山卒與虜遇衆甚盛公車重在後被甲者少左右皆懼公登髙望虜陣不整乃縱兵擊之使張遼為先鋒虜衆大崩斬蹋頓及各王以下胡漢降者二十餘萬口初遼東太守公孫康恃逺不服及公破烏丸或說公遂征之尚兄弟可擒也公曰吾方使康斬送尚熈首不煩兵矣公引軍自栁城還康即斬尚熈及速僕九等傳其首諸將或問公還而康斬送尚熈何也公曰彼素畏尚等吾急之則并力緩之則自相圗其勢然也關中諸將疑公欲自襲馬超遂與韓遂楊秋李堪成宜等反公廼征之與超夾關為軍乃與尅日㑹戰先輕兵挑之戰良久乃縱虎騎夾擊大破之斬成宜李堪等超走凉州楊秋奔安定關中平天子命公賛拜不名入朝不趨劍履上殿如蕭何故事使御史大夫郗慮持節䇿命公為魏公始建魏社稷宗廟天子聘公三女為貴人又命公置旄頭宫殿設鐘簴又命公承制封拜諸侯守相冬十月始置名號侯至五大夫與舊列侯關内侯凡六等以賞軍又功進公爵為王設天子旌旗出入稱警蹕王崩於洛陽時年六十謚曰武王𦵏髙陵又曰漢桓帝時有黄星見於楚宋之分遼東商馗善天文言後五十嵗當有真人起於梁沛之間其鋒不可當至破袁紹之嵗凡五十年天下莫敵矣魏書曰漢末太祖拒董卓命歸鄉里遇故人成臯吕伯奢伯奢不在其子八人備賔主之禮太祖自以背卓聞其食噐聲以為圖已夜殺八人而去既而歎曰寧我負人無人負我遂行又曰太祖自御海内芟夷羣醜其行軍用師大較依孫吳之法而因事設竒量敵制勝變化如神自作兵書十萬餘言諸將征伐皆以新書從事臨時又手為節度從令者尅㨗違教者負敗與虜對陣意思安閒如不欲戰然及至决機乗勝氣勢盈溢故每戰必克知人善察難眩以偽㧞于禁樂進于行陣之間取張郃徐晃于亡虜之中皆佐命立功列于名將其餘㧞出細㣲登為牧守者不可勝數是以創造大業文武並施御軍三十餘年手不捨書晝則講武䇿夜則思經傳登髙必賦及造新詩被之管絃皆成樂章才力絶人手射飛鳥躬擒猛獸嘗于南皮一日射雉獲六十三頭及造作宫室繕治噐械無不為之法則皆盡其意雅性節儉不好華麗後宫不衣錦繡侍御履不二綵帷帳屛風壊則補衲茵褥取温無有縁飾攻城㧞邑得靡麗之物則悉以賜有功勲勞宜賞不恡千金無功望施分毫不與四方獻御與羣下共之常人以禮送終之制襲稱之數繁而無益俗又過之故預自為制終云衣服四篋而已帝王世紀曰黃初元年追尊號諡曰武皇帝廟號太祖曹瞞傳曰操少時好飛鷹走狗逰蕩無度其叔父數言之于嵩操患之後逢叔父於路乃陽敗面喎口叔父怪問其故太祖曰卒中惡風叔父以告嵩嵩驚愕呼操面口貌如故嵩問曰叔父言汝中風已差乎操曰初不中風但失愛於叔父故見罔耳嵩乃疑焉自後叔父有所吿嵩終不復信操於是益得肆意及為洛陽比部校尉廨繕治四門造五色棒懸門左右條十餘枚有犯禁者不問豪强皆棒殺死數月靈帝愛幸小黃門蹇碩叔父夜行即殺之亰師歛迹莫敢犯者近習寵臣咸疾之然不能傷於是共稱薦操故遷為頓丘令操為人輕易無威重好音樂倡優在側恒以日逹夕被服輕絹身自佩小盤囊以盛一切細物時或冠祫帽以見賔客每與人談論戲弄言辭盡無所隠及恱大笑至以頭投杯案中飲膳皆沾汚巾幘其輕易如此然持法峻刻諸將計畫勝出已者隨以法誅之及故人舊惡亦皆無餘其所刑殺輙對之垂涕嗟痛之終無所活嘗出軍行經麥中令士卒無敗麥犯者死騎士皆不騎扶麥以相過時操馬騰入麥中勅主簿議罪主簿對以春秋之義罰不加尊操曰制法而自犯之何以帥下然孤為軍帥不可殺請自刑因援刀割髪以置地世説曰魏武將見匈奴自以形陋不足雄逺國使崔季珪代當自捉刀立牀頭坐既畢令間謂曰魏王何如匈奴使答曰王雅望非常然牀頭捉刀人此乃英雄也魏王聞之追殺此使博物志曰漢世安平崔瑗瑗子實𢎞農張芝芝弟昶並善草書而太祖亞焉桓譚蔡邕善音樂馮翊山子道王九真郭凱等善圍碁太祖皆與埒能又好養性法亦解方藥招引方術之士廬江左慈譙郡華陀甘陵甘始陽城郗儉無不畢至又習噉野葛至一尺亦能少少飲鴆酒世說曰魏武帝嘗過曹娥碑不解楊脩讀碑背上題云黃絹㓜婦外孫虀臼魏武謂修曰卿解未可言待我思之行三十里魏武曰吾已得令脩别記所知脩曰黄絹色絲也於字為絶㓜婦少女也於字為妙外孫女子也於字為好虀臼受辛也於字為辭所謂絶妙好辭武帝亦記之與脩言同帝歎曰我才不如卿乃覺三十里唐太宗皇帝祭魏武帝文曰夫大德曰生資二儀以成化大寶曰位應五運而遞昌貴賤廢興莫非天命故龍顔日角顯帝王之符電影虹光表乾坤之瑞不可以智競不可以力爭昔漢室鼎分羣雄並立夫民離政亂安之者哲人德喪時危定之者賢輔伊尹之匡殷室王道昏而復明霍光之佐漢朝皇綱否而還泰立忠履節爰在於斯帝以雄武之姿當艱難之運棟梁之任同乎曩時匡正之功異乎往代觀沉溺而不援視顛覆而不持乖狥國之情有無君之跡既而三分肇慶黄星之應乆章五十啓基真人之運斯屬其天意也豈人事乎文皇帝魏志曰文皇帝諱丕字子桓武帝太子太祖崩嗣位為丞相魏王延康元年十月升壇即祚改延康為黃初以荆揚江表八郡為荆州孫權領牧故也荆州江北都郡為郢州權破蜀主於夷陵初帝聞蜀兵東下與權戰樹柵連營七百餘里謂羣臣曰彼不曉兵豈有七百里營可以拒敵者乎孫權叛帝自許昌南征諸軍兵並進權臨江拒守幸廣陵故城臨江觀兵戎卒十餘萬旌旗數百里是嵗大寒氷舟不得入江乃引還七年春將幸許昌許昌城南門無故自崩帝心惡之還洛陽宫五月帝崩於嘉福殿時年四十帝好文學以著述為務自所勒成垂百篇又使諸儒撰集經傳隨類相從凡千餘篇號曰皇覧魏書曰帝生時有雲氣青色而圓如車蓋當其上終日望氣者以為至貴之證非人臣之氣年八嵗能屬文有逸才遂博覧古今經傳諸子百家之言善騎射好擊劍州舉茂才不行又曰文帝初在東宫疫癘大起時人凋傷帝深感歎與素所善者大理王郎書曰人生有七尺之形死為一坯之土唯立徳揚名可以不朽其次莫如著篇籍疫癘數起士人凋落余獨何人能全其壽故論撰所著典論詩賦蓋百餘篇集諸儒於肅成門内講論大義侃侃無倦吳志曰魏文帝出廣陵望大江曰彼有人焉未可圗也乃還博物志曰魏文帝善彈棊能用手巾角時有一書生又能低頭以所冠著葛巾角撇棊典論曰初平之元董卓弑帝鴆后盪覆王室時余年五嵗上以世方擾亂教余學射六嵗而知射教余乗馬八嵗而能騎射矣以時之多難故毎征伐余乗馬常從建安初上南征荆州至宛張繡降旬日而反亡兄孝亷子脩從兄安民遇害時余十嵗乗馬得脫夫文武之道各隨時而用生乎中平之世長於戎伍之間是以少好弓馬于今不衰逐禽輙十里馳射常百歩日夕體倦心毎不厭建安十年始定冀州穢貊獻良弓燕岱獻名馬時歲之暮春勾芒司莭和風扇物弓燥手柔草淺獸肥與族兄子丹獵於鄴西終日獲麞鹿九雉兎二十後軍南征次内蠡尚書令荀彧奉使犒軍見余談論之末彧言聞君善左右射此實難能余言執事未覩夫項發口縱俯馬蹄而仰月支也彧喜笑曰乃爾余曰埒有常經的有常所雖毎發輙中非至妙也若夫馳平原赴豐草要狡獸截輕禽使弓不虚彎所中必洞斯則妙矣時軍祭酒張亰在坐顧彧俱拊手曰善余又好擊劍閲師多矣四方之法各異唯京師為善余於他戲弄之事少所喜唯彈棊略盡其巧少為之賦昔亰師先上有馬金鄉侯東方安世張公子常恨不得與彼數子者對上雅好書籍雖在軍旅手不釋卷毎定省從容常言人少好學則思惠長則善於長大而能勤學者唯吾與袁伯業耳余是以少誦論詩及長而備厯五經四部史漢諸子百家之言靡不畢覧所著書論詩賦凡六十篇至若知而能愚勇而知怯仁以接物恕以及下以付後之良史太平御覽卷九十三
