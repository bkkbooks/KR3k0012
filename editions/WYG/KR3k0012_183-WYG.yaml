body:
  text: 太平御覽卷一百八十三宋李昉等撰居處部十一門門下家語曰孔子語子路曰見長者不能黜其色見㓜者不能盡其辭雖有疾風雨吾不入其門矣白虎通曰門四出何以通方蔡邕明堂月令論曰禮記古大明堂之禮曰膳夫是相禮日中出南闈見九侯及門子日昃出西闈親五國之事日闇出北闈視帝節猶明堂之西北門稱闈墨子曰夫守城之法為懸門沉機也潛夫論曰貴戚願為其宅吉而制令名欲其門堅而造作鐵樞卒其所以敗者非苦禁忌而門樞朽常苦崇財貨而驕僣耳上不順天心下不育人物而任其私智竊弄君威反戾天地欺枉神明居累卵之危而圖太山之安為朝露之行而思傳代之功豈不惑哉吳地記曰閶門者吳王闔閭所作也名為閶闔門髙樓閣道後由此伐楚改破楚門世説曰楊修為魏武主簿作相國門始構榱桷魏武自看使人題門作活字便去楊修見命壊之曰門中活闊字王嫌大也魯連子曰先生嘗見孟嘗君於杏唐之門説苑韓昭侯造髙門屈宜咎曰昭侯作非時日也人固有利不利昭侯嘗利矣不作髙門往年秦拔宜陽明年大旱民饑不以此時恤民之急而反益以奢此謂福不重至禍必重來者也髙門成昭侯卒竟不出此門矣常璩華陽國志曰秦孝文王以李冰為蜀守作石犀五頭以壓水精在市橋門今所謂石牛門吳越春秋曰吳王闔閭為太子聘齊女齊女少思齊日夜號泣因而為疾闔閭乃為起北門名曰望齊門令女往遊其上又曰子胥為吳築大城陸門八象天八風水門八法地八聰築小城陵門三不開東靣明絶越也立閶門象天門通閶闔風也立蛇門象地户也欲西破楚故閶門復名破楚門吳在辰其位龍越在巳其位蛇示越屬吳也又曰吳赦越王使歸國送之於蛇門外大縱酒羣臣祖道晏子春秋曰晏子使楚晏子短楚人為小門於大門之側延晏子晏子曰使狗國者從狗門入今臣使楚不當從此門入乃更通大門淮南子曰周文王作人門言以玉飾也又曰崑崙山旁有四百四十門又曰北極之山曰寒門楚辭曰踔絶寒門又曰東北方土山曰東極之山曰開明之門東南方曰波海之山曰陽門南方曰南極之山曰暑門西方曰西極之山曰閶闔之門西北方曰不周之山曰幽都之門北方曰北極之山曰寒門八門之風是節寒暑焉神異經曰東北有鬼石室三百里户共一門石牓題曰鬼門西南銅闗夹牓題曰人往門東北銅闗夹門牓題曰人来門張晏注漢書曰龍樓門門上有銅龍漢宫殿名曰長安有宣平門覆盎門萬秋門横門郭門東都門今名青門宣徳門禮城門青綺門章義門仁夀門夀成宫有辟邪門慈石門又曰洛陽有太夏門閶闔門西華萬春門蒼龍門長秋門景福門永巷門丙舍門鴻都門金牙門不老門章臺門濯龍門定鼎門蔡質漢官儀曰宫北朱雀門至止車門内崇賢門内建禮門洛陽故宫名曰洛陽有飛兔門含章門建禮門廣懐門明禮門泰夏門司馬門閶闔門南止車門東西止車門西華門神虎門雲龍門東掖門西掖門千秋門南端門笙鏞門神僊門敬法門却非門含徳門上東門廣陽門津門小苑門開陽中東門司馬門北關門𤣥武門南掖門北掖門南端門金門九龍門白虎門春興門青鏁門金商門宜秋門古今地名曰河南定鼎門九鼎所定晉宫閣門名洛陽有承明門又許昌有崇禮門晉宫門有大夏門長春門朱明門青陽門三輔黄圖曰又有章城門直城門洛陽門水經注曰神獸門東對雲龍門衡栿之上皆刻雲龍風虎之狀又曰穀水東流建春門石橋下即上東門也一曰上昇門又曰閶闔門漢之西上門又曰陶水東南經髙門南葢層阜墮􅆙故有髙門之稱矣又經司馬子長墓北入于河亦謂之龍門太史公自叙云遷生於龍門是也在馮翊夏陽縣郡國志賀州封陽有隄陂内水深百尋大魚自擲登此門化為龍不過者曝腮㸃額也又曰銅州龍門城帶龍門山大魚㸃額曝腮半死謂此也司馬彪注莊子云吕梁即龍門也又郢城南有三門東曰龍門離騷云過夏首而西浮顧龍門而不見夏首即夏口也又曰洞庭山有宫五門東通林屋西逹峨眉南接羅浮北連岱嶽東有石樓樓下兩石皷扣之即清越所謂神鉦也又曰兖州乗丘左傳子偃曰宋師不整可敗也自雩門突出蒙臯比而先犯之大敗宋師于乗丘即此也又曰長安縣漢髙祖五年置故城在京西北二里漢惠帝築南為南斗形北為北斗形八街九陌東面有青綺門東陵侯召平秦破為布衣種𤓰此門外西北面有棘門漢文帝屯兵之所又曰魯城伯禽邑也東西五門一曰鹿門即臧孫紇斬鹿門關以出奔邾第三曰稷門即圉人犖能投葢於稷門又曰蜀望帝以褒斜為前門熊耳靈關為後户又曰鄜州仙宫門即漢武所遊相思川也伏鹿縣有相思鄉又曰洛陽南面最東曰開陽門初未有名夜有一柱飛在樓上乃是瑯琊開陽縣南門一柱飛去遂記其年月日以為名又曰鴻門在新豐縣西八里沛公見項羽處又曰薊城慕容雋鑄銅馬於門側謂曰銅馬門今大㕔前有石函長二尺髙一尺代不敢開銘云秦建元十年造銅虎馬又曰汴州陳留郡本春秋魏地魏惠王自安邑徙都亦稱梁惠王焉士多俊髦儒藝遊侠每集夷門即侯嬴抱闗之處又曰洪州城六門有豫章生松陽門内樹大二十五圍嘗心枯永嘉中忽更榮茂以為元帝中興之瑞故郭璞南都賦云弊章擢秀於祖邑以宣帝曽為此郡守故也又曰虬門即吳大城門也又曰廣州盧躭仕州為治中有僊術刺史歩隲惡之以狀聞後誅之躭後題其門曰珠門珠國雖存無年欲知此書待盧躭還太守削之隨削字更生又曰越州雷門勾踐所立以吳有虵門得雷而發表事吳之意呉以越在辰巳之地作虵門石虎鄴中記曰鄴宫南面三門西鳯陽門髙二十五丈上六層及宇向陽下開二門又安大銅鳯於其顚舉頭一丈六尺門牕户朱柱白壁未到鄴城七八里遥望此門述征記曰青門外有魏車騎將軍郭淮碑小城最東一門名落索門門裏有司馬京兆碑郡民所立豫章記曰郡城灌嬰築有六門其南一曰松陽門其一以郡為名西二門其一曰昌門其一曰臯門東及北一門即以東北為名晉大元中太守順陽范君更開門之北為東陽門以對臯門開北門以對松陽門今八門相望通路直指安城記曰郡大城舊有六門今為八門荆州圖記曰臨澧縣南三百里有髙巒特立素崖千里望之有似香爐吳永安六年自然洞開直朗如門故老相傳名天門天門兩角上各生一竹垂下為之天箒云吳地記曰匠門本名干將門門外有干將墓後語訛呼為匠門其名因劍匠言之又郡國志云申公巫臣家亦在西南靣劉澄之宋初山川古今記曰魏武聴政殿前有聴政門丹陽記曰司馬門之名起漢世按列女傳鍾離春詣齊司馬門史記又云司馬欣請事咸陽留司馬門三日是名起戰國非獨漢世今又曰公車門而俗稱謝章門也三輔黄圖曰秦阿房宫以磁石為門懐刃入者輒止之西征賦曰門磁石而梁木蘭構阿房之屈竒蕪城賦曰製磁石以禦衝糊頳壤以飛文韋述西京新記曰西京俗曰長安城亦曰京城髙十丈八尺南面三門中明徳門東啓夏門西安化門東面三門中春明門北通化門南延興門西面三門中金光門北開逺門南延平門皇城西芳林門金光門朱雀門通化門春明門有蕭望之塚啓夏門先農壇皇城南面六門正南承天門門外兩觀肺石登聞皷次東長樂廣運門重明永春門次西永安次北嘉猷門東西恭禮安仁門東西廊歸仁納義門次北太極門西至殿北面三門正北𤣥武次東安禮門𤣥徳門西面二門南通明門北嘉猷門太極殿旁東上西門上閤門東西廊左右延明門甘露殿門外東西永巷日華月華門東西千步廊東宫重明門北左右永福門内殿左右嘉善門東西奉化門又曰西京大明宫南面五門正南丹鳯門次望仙延政門次西建福興安門又曰大明宫含元殿東西通乾觀象門殿北宣政門門設外屏東崇明門南含曜門昭訓門西光順門東西廊日華月華門紫宸殿前紫宸門門設外屏東崇明門南出含曜門昭訓門西光順門南出昭慶門光範門又曰東京俗曰洛陽城城髙一丈八尺南面三門正南曰定鼎門東建春門南永通門北面二門東安喜門西徽安門西面連苑又曰東京紫㣲宫城南面六門正南應天門門外觀象夾肺石登聞皷次東興教門重光門太和門次西光政門洛南門東靣一門重光北門西南二門南洛城門西門北嘉豫門北靣二門西𤣥武門東安寧門應天門北乾元門門東萬春門西千秋門門外東西廊左右延福門又西㑹昌門北景運門又曰上陽宫東西二門南曰提象門北星躔門内門曰觀風門又曰東都苑東靣四門曰垂豫上陽新門望春門南靣三門曰興善興安靈光門西靣四門曰延秋遊義籠煙靈溪門北面四門曰朝陽靈圃望冬應福門又曰東都皇城南面三門正南曰端門東左掖門西右掖門東面一門賔曜門西面二門南曰麗景門北曰宣曜門又曰東都東城東面一門宣仁門南面一門永福門北面一門含嘉門又曰萬年縣門宇文愷所造髙宗末太平公主出降於縣廨為婚第以縣門窄狹欲毁之髙宗勅曰其宇文愷所作不須坼於他所開門遂存楚辭曰望長楸而太息涕淫淫其若霰過夏首而西浮顧龍門而不見又曰君之門兮九重又曰䰟兮下來入修門王逸曰修門郢城郢門也摯虞門銘云祿無常家福無定門人謀鬼謀道在則尊李尤平城門銘曰平門洞門午位處中外臨僚侍内達帝宫正陽南面炎暑赫融李尤廣陽門銘曰廣陽位孟厥月在申凉風時至白露已紛李尤上東門銘曰上東少陽厥位在寅條風動物月當孟春李尤東門銘曰東處仲月厥位在卯倉庚有聲鷹隼匿爪除去桎梏獄訟勿考李尤旄城門銘曰旄門値季位月在辰陽順布惠貧乏是振李尤門銘曰門之設張為宅表㑹納善閉惡擊邪防害李尤上西門銘曰上西在季位月惟戌菊黄􅉘祭號令嚴悉李尤夏門銘曰夏門值孟位月在亥不周用事𤣥𠖇幽晦隂陽不通螮蝀匿彩迎冬北壇順隂所在李尤穀城門銘曰穀門北中位當于丑太隂主刑殺伐為首班固西都賦曰披三條之廣路立十二之通門左思呉都賦曰通門二八水道路衢西京賦曰重門襲固陽曜隂藏潘岳懐縣作詩曰綠槐夾門植魏文帝賦序曰王粲直賢門古詩曰黄金為君門白玉為君堂太平御覽卷一百八十三
