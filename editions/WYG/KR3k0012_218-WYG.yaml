front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_218-1a, image: WYG0895/WYG0895-0033a.png}
body:
  text: 太平御覽卷二百一十八宋李昉等撰職官部十六刑部尚書刑部侍郎刑部四司郎中員外禮部尚書禮部侍郎禮部四司郎中員外工部尚書工部侍郎工部四司郎中員外刑部尚書六典曰刑部尚書侍郎之職掌天下刑法及徒𨽻勾覆關禁之政令其屬有四一曰刑部二曰都官三曰比部四曰司門總其職務而行其制命凡中外百司之事由於所屬咸質正焉唐書曰栁公綽爲刑部尚書京兆人有姑鞭婦致死者府斷以償死公綽議曰尊毆卑非鬬且其子在以妻而戮其母非教也竟减死又曰李適之拜刑部尚書適之雅好賔友飲酒一斗不亂夜則宴賞晝决公務庭無畱事刑部侍郎唐書曰太宗謂侍臣曰張亮有義兒五百畜養此輩將何爲也正欲反耳命百寮議其獄多言亮當誅唯將作少匠李道裕言亮反形未具明其無罪太宗既盛怒竟斬於市籍没其家歲餘刑部侍郎有闕令執政者妙擇其人累奏皆不可太宗曰朕得其人也往者李道裕議張亮云反形未具此言當矣當時雖不即從至今追悔遂授道裕刑部侍郎又曰劉瑑轉刑部侍郎瑑精於法律選大中已前二百四十四年制勅可行用者二千八百六十五條分爲六百四十六門議其輕重集成一家法書號大中統類奏行用之刑部郎中刑部員外郎六典曰刑部郎中員外郎各二員掌舉其典憲而辨其輕重凡文法之名有四一曰律二曰令三曰格四曰式凡律一十有二章一曰名例二曰衞禁三曰職制四曰戸婚五曰廐庫六曰擅興七曰盗賊八曰鬭訟九曰詐僞十曰雜律十一曰捕亡十二曰斷獄而大凡五百條焉唐書曰長慶中刑部員外郎孫革奏准京兆府雲陽縣民人張蒞欠羽林官騎康憲錢米憲徴之蒞乗醉拉憲氣息將絶憲男買德年十四將救其父以蒞角觝力人不敢撝解遂持木鍤擊蒞之首見血後三日致死者准律父爲人所毆身往救擊其人折傷减凡鬬三等至死依常律即買德救父難是性孝非暴擊張蒞是功非兇以髫丱之歲正父子之親若非聖化所加童子安能及此王制稱五刑之理必原父子之親以權之測淺深之量以别之春秋之義原心定罪周書訓諸罰有權今買德生被皇風幼符在孝哀矜之宥伏在聖慈職當讞刑合分善惡先具事由陳奏伏兾賜下中書門下商量勅㫖康買德尚在童年得知子道雖殺人當死而爲父可哀若從沈命之科是失原情之義宜付法司减死罪一等處分都官尚書南史曰徐孝充爲都官尚書自晉以來尚書官僚皆擕家屬居省省在臺城内下舎門中有閣道東西跨路通於朝堂其第一即都官省西抵閣道年乆代遠多有鬼怪每夜昏之際無故有聲光或見人着衣冠從井中岀須臾復没或門閣自然開閉居者多死云尚書周確卒於此省孝充代確便即居之經兩載祅變皆息時人咸以爲直正所致梁書曰羊侃遷都官尚書時尚書令何敬容用事與之並居未嘗遊造有宦者張僧允候侃曰我牀非閹人所坐竟不前之時論美其直正後周書曰梁元帝以沈重領江陵遷都官尚書領羽林監察又令重於合歡殿講周禮比部郎中比部員外郎六典曰比部郎中員外郎掌勾諸司百寮俸料公廨􅂍贖調歛徒役課程逋懸數物以周知内外之經費而總勾之凡内官料俸以品第高下爲差外官以州縣府之上中下爲差魏志曰何貞奏許都賦明帝竒之擢爲比部郎中李綽尚書故實曰杜牧嘗於宰執求小儀不遂請小秋又不遂嘗夢人謂曰辭春不及秋昆脚與皆頭後果得比部郎中司門郎中司門員外郎六典曰司門郎中員外郎掌天下諸衙門及岀入往來之籍賦而審其政凡關二十有六而爲上中下之差所以限中外隔華夷設險作固閑衛止禁者周禮司門下大夫掌授管鍵以啟閉國門幾岀入不物者正其貨賄凡財物犯禁者舉之以財養死政之老與其孤禮部尚書六典曰禮部尚書侍郎之職掌天下禮儀祭饗貢舉之政令其屬有四一曰禮部二曰祠部三曰膳部四曰主客總其職務而行其制命凡中外百司之事由於所屬皆質正焉尚書堯典帝曰咨四岳有能典朕三禮僉曰伯夷帝曰俞咨伯汝作秩宗家語曰父子不親長幼失序君臣上下乖離異志曰不和不和則飭宗伯飭謂整攝後魏書曰孝文車駕征馬圈畱宋弁以本官兼祠部尚書攝七兵事及行執其手曰國之大事在祀與戎故令卿綰攝二部弁頓首辭謝東晉始置祠部尚書宋齊梁陳後魏北齊皆同東晉至隋乃更爲禮部尚書禮部侍郎唐書曰常陟爲禮部侍郎陟好引接後輩尤鑒於文雖詞人後生靡不諳練曩者主司取與皆以一塲之善豋其科目不盡其才陟先責舊乃令舉人自通所工詩筆先試一日知其所長然後依常式考覆片善無遺美聲盈路又曰賈至轉禮部侍郎是歲至以時艱歲歉舉人赴省者奏請兩都分試從之兩都試舉人自此始也又曰高郢拜禮部侍郎時應進士舉者多務朋游馳聲名每歲冬州府薦送後唯追奉讌集罕肄其業郢性剛正尤嫉其風既領職拒絶請託雖同列通熟無敢言者志在經義專考程試凡掌貢部三歲進幽獨抑浮華朋濫之風翕然一變又曰貶劉太貞爲信州刺史太貞爲禮部侍郎性怯懦詭隨其掌貢舉宰臣姻族方鎭子弟先収擢之又嘗叙陳少遊勲勣擬之桓文大招物議因斯貶禮部郎中六典曰禮部郎中員外郎掌二尚書侍郎舉其儀制而辨其名數梁書曰武帝謂徐勉云今帝業初構須一人有學藝解朝儀者爲尚書儀曹郎勉曰孔休源識見清通詳練故事自晉宋起居注畧誦上口遂拜爲儀曹郎禮部員外郎唐書曰􅅊叔夏授春官員外郎則天將拜洛及享明堂皆别受制共當時大儒祝欽明郭山惲撰定儀注凡所立議衆咸推服之祠部郎中祠部員外郎六典曰祠部郎中員外郎掌祠祀享祭天文漏刻國忌廟諱卜筮醫藥僧尼之事凡祭祀之名有四一曰祭天神二曰祭地祗三曰享人鬼四曰釋奠於先聖先師其差有三若昊天上帝五方帝皇地祗神州宗廟爲大祀日月星辰社稷先代帝王五岳海瀆帝社先蠶孔宣父齊太公諸太子廟爲中祀司中司命風師雨師衆星山林川澤五龍祠等及州縣社稷釋奠爲小祀梁書曰賀德基少遊學都下積年不歸衣資罄乏又車服故弊盛冬止衣裌襦袴嘗於白馬寺前逢一婦人容服甚盛呼德基入寺門脱白綸巾以贈之仍謂曰君方爲重器不乆貧寒故以此相遺耳問姓名不荅而去德基於禮記稱爲精明位尚書祠部郎雖不至大官而三世儒學俱爲祠部郎時論美其不墜世閥主客郎中主客員外郎六典曰主客郎中員外郎掌二王後及諸蕃朝聘之事後漢書何遠少有美望公府中十辟一無所就由是名重華夏起家爲尚書主客郎膳部郎中膳部員外郎六典曰膳部郎中員外郎掌邦之牲豆酒膳辨其品數凡郊祀天地日月星辰岳瀆享祀宗廟百神在京都者用牛羊豕滌養之數省閱之儀皆載於廪犧之職焉五代史後唐書曰膳部郎中鄭兟先奏諸司諸使職掌人吏乗暖坐𢃄銀魚席帽輕衣肥馬叅雜庭臣尊卑無别汙染時風請下禁止上嘉其事促行之中書覆爲不可趙鳯亟言於執政曰此禮誡人不可不切爲權吏所庇竟寢其事工部尚書工部侍郎六典曰工部尚書侍郎之職掌天下百工屯田山澤之政令其屬有四一曰工部二曰屯田三曰虞部四曰水部總其職務而行其制命凡中外百司之事由於所屬咸質正焉隋書曰長孫平爲工部尚書名爲稱職時有人吿大都督邴紹非毁朝廷爲憒憒者上怒將斬之平進諫曰川澤納汚所以成其深山岳藏疾所以就其大臣不勝至願願陛下𢎞山海之量茂寛裕之德鄙諺曰不癡不聾不堪作大家翁此言雖小可以喻大邴紹之言不應聞奏陛下又復誅之臣恐百代之後有􅃜聖德上於是赦紹唐書曰閻立本代兄立德爲工部尚書兄弟相代爲八座時論榮之五代史晉書曰裴皥知貢舉擢桑維翰進士第後維翰居相位徴拜皥工部尚書舎於相國寺維翰謁之不迎不送問之荅曰皥見維翰於中書曰庶寮也維翰見皥於館則門生也何送迎之有人重其耿介五代史周書曰盧文紀嗣業之子爲工部尚書時新除工部郎中于鄴公叅文紀文紀以父名同音不見或謂鄴曰南宫故事郎中入省如本行尚書侍郎不容叅何以省上鄴憂畏太過一夕醉歸遂經於室其甥鄭鐐以事聞謫文紀爲石州司馬工部郎中工部員外郎六典曰工部郎中員外郎掌經營興造之衆務凡城池之修濬土木之繕葺工匠之程式咸經度之凡興建修築材木工匠則下少府將作以奉其事屯田郎中屯田員外郎六典曰屯田郎中員外郎掌天下屯田之政令凡軍州邉防鎮守轉運不給則設屯田以益軍儲其水陸腴􅇤播植地宜功庸煩省収率等咸取决焉諸屯田役力各有程數三國典畧曰裴讓之十七舉秀才爲屯田郎中與祖班俱聘宋邢邵省中語曰多奇多能祖孝徴能賦能詩裴讓之讓之弟讞之謀之納之謁之並清立楊愔曰河東上族京官不少裴讓兄弟都無鄉音裴文季爲不亡也隋書曰栁彧爲屯田郎時三品以上門皆列㦸左僕射高熲子𢎞德封應國公申牒請㦸彧判曰僕射之子更不異居父之㦸槊已列外門尊有厭卑之義子有避父之禮豈有外門既設内門又施事竟不行熲聞而歎伏唐書曰沈扶字雲翔太和初爲屯田郎中五年充山南道宣撫使至鄧州奏内鄉縣行市黄澗兩場倉督鄧琬等先主掌湖南江西運到糙米至浙川縣於荒野中囤貯除支用外六千九百四十五石裛爛成灰塵度支牒徴元掌所由自貞元二年鄧琬父子兄弟至𤣥孫相承繫二十八年前後禁死九人今琬孫及𤣥孫見在枷禁者勅曰如聞鹽鐡度支兩使此類極多其鄧琬等四人資産全已賣納禁繫三代瘐死獄中實傷和氣鄧琬等並䟽放天下州府監院如有此類不得禁經三年已上速便䟽理以聞物議嘉扶有宣撫之才虞部郎中虞部員外郎六典曰虞部郎中員外郎掌天下虞衡山澤之事辦其時禁凡採捕畋獵必以其時水部郎中水部員外郎六典曰水部郎中員外郎掌天下山瀆陂池之政令以導達溝洫堰坎河渠凡舟檝溉灌之利咸總而舉之梁書劉孝綽兼尚書水部郎奉啓陳謝手勅荅曰美錦未可便製簿領亦宜稍習頃之即真太平御覽巻二百一十八
