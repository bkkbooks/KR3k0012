body:
  text: 太平御覧卷八十九宋李昉等撰皇王部十四漢孝昭皇帝廢帝海昏侯中宗孝宣皇帝孝元皇帝孝成皇帝孝哀皇帝孝平皇帝少帝孺子王莾孝昭皇帝漢書帝紀曰孝昭皇帝諱弗之字曰不武帝少子也母趙偼伃本以有竒異得幸服虔曰偼伃有竒手指不伸案外戚傳曰望氣者云此有竒女天子氣故稱竒異也及生帝有竒異文穎曰十四月乃生遂立為太子年八嵗武帝崩太子即皇帝位始元元年春二月黃鵠下建章宫太液池中如淳曰謂之液者天地和液之氣所為也案時漢用土徳服色尚黃鵠色皆白而今更黃以為土之瑞故紀之大液池言承隂陽津液以作池也公卿上壽賜諸侯王列侯宗室金錢各有差己亥上耕于鈎盾弄田應劭曰時帝年九嵗未能親耕帝籍鈎盾宦者近署故往試耕為戲弄也案西亰故事弄田在未央宫中也元鳯元年九月左將軍上官桀桀子驃騎將軍安與大將軍霍光爭權欲害之詐使人為燕王旦上書言光罪時帝年十四覺其詐雖後有譖光者上輙怒曰大將軍國家忠臣先帝所屬敢有譛毁者坐之光由是得盡忠元平元年夏四月帝崩於未央宫案帝九嵗即位十三年夀二十二也六月𦵏平陵臣瓉曰平陵在長安西北七十里漢書賛曰昔周成王以孺子繼位而有管蔡四國流言之變孝昭㓜年即位亦有燕蓋上官逆亂之謀成王不疑周公孝昭委任霍光各因其時以成名大矣哉承孝武奢侈餘弊師旅之後海内虚耗戸口减半光知時務之要輕繇薄歛與民休息匈奴和親百姓充實舉賢良文學問民所疾苦議鹽鐵而罷𣙜酤尊號曰昭不亦宜乎後漢班固昭帝述曰孝昭㓜冲冡宰惟忠燕蓋譸張實叡實聰罪人斯得邦家和同魏文帝周成漢昭論曰或方周成王於漢昭帝僉髙成而下昭愚以為周成王體上聖之休氣禀賢妣之胎誨周召為保傅吕尚為太師口能言則行人稱辭足能履則相者導儀目厭威容之美耳飽仁義之聲所謂沉漬𤣥流而沐浴清風者矣猶有咎悔聆三叔之謗使周公東遷皇天赫怒顯明厥咎猶啓金縢稽諸國史然後乃寤不亮周公之聖徳而信金縢之教言豈不暗哉夫孝昭父非武王母非邑姜養惟蓋主相則桀光體不聖成化不胎育保無仁孝之資佐無隆平之治所謂生於深宫之中長於婦人之手然而徳與性成行與體并年在二七早知夙逹照燕書之詐亮霍光之誠豈有啓金縢信國史而後乃寤哉使夫成昭均年而立易世而化貿臣而治換樂而歌則漢不獨少周不獨多魏丁儀周成漢昭論曰成王昭帝俱以襁褓之㓜託於冡宰流言讒興此其艱險相似者也夫以發金縢然後垂泣與計日力便覺詐書明之遲速既有差矣且叔父兄子非相嫌之處異姓君臣非相信之地霍光罹人謗而不出周公頼天變而得入推此數者齊本而論末計重而况輕漢昭優于周成甚明者也成王秀而獲實其美在終昭帝苗而未秀其徳在始必不得已而論二主愚與夫始者也廢帝海昏侯漢書曰昌邑哀王體天漢四年立十一年薨子賀嗣立十三年昭帝崩無嗣大將軍霍光徴王賀典䘮王乗傳詣長安邸夜漏未盡一刻以火發書日中發晡時至定陶行百三十五里從者馬死相望於道郎中令龔遂諌王令還郎謁者五十餘人賀到濟陽求長鳴雞道買積竹杖文穎曰合竹作杖也過𢎞農使大奴善以衣車載女子旦至廣明東都門遂曰禮奔䘮望見國都哭此長安東郭門也賀曰嗌痛不能哭至城門遂復言賀曰城門與郭門等耳且至未央宫東闕遂曰昌邑帳在是闕外馳道北文穎曰弔哭帳也未至帳所有南北行道馬足未至數歩大王宜下車鄉闕西面伏哭盡哀止王曰諾到哭如儀王受皇帝璽綬襲尊號即位二十七日行淫亂大將軍光與羣臣議白孝昭皇帝后廢賀歸故國初賀在國時數有怪嘗見白犬髙三尺其頸似人而冠方山冠後復見熊左右皆莫見又大鳥飛集宫中王知惡之輙以問郎中令龔遂遂為言其故後又血汚王坐席王問遂遂呌然號曰宫空不久妖祥數至血者隂憂象也宜畏慎自省賀終不改節居無何就徵既即位夢青蠅之矢積西階東可五六石以屋版瓦覆發視之青蠅矢以問遂而不用其言卒至於廢大將軍霍光更尊立孝武帝曽孫是為孝宣帝漢書曰昌邑王即位好弄彘鬬虎使官奴騎乗逰戲掖庭之中與孝昭帝宫人滛亂詔掖庭令敢泄言腰斬王受璽以來二十七日有罪千一百二十七條霍光廼即持其手解脱其璽組奏上太后扶王下殿出金馬門羣臣隨送王西面拜曰愚戇不任漢事起就乗輿副車大將軍光送至昌邑邸光謝曰王行自絶於天臣等駑怯不能殺身以報寧負王不敢負社稷願王自愛漢書曰王吉字子陽為昌邑中尉上疏諌曰大王不好書術而樂逸逰憑軾撙䘖服虔曰撙促也或曰柱也撙音子本反馳騁不止口倦乎叱咤手苦於箠轡身勞乎車輿朝則冐霜露晝則被埃塵夏則為大暑之所暴炙冬則為風寒之所偃薄偃靡也遇疾風而靡也薄迫也數以耎脆之玉體耎柔而兖切犯勤勞之煩毒非所以全壽命之宗也又非所以進仁義之隆也夫廣厦之下細氊之上明師居前勸送在後上論唐虞之際下及殷周之盛學仁聖之風習治國之道訢訢焉發憤忘食日新厥徳其樂豈不長哉大王誠留意則心有堯舜之志體有喬松之壽美聲譽發而上聞則福祿具臻而社稷安矣中宗孝宣皇帝漢書帝紀曰孝宣皇帝諱詢之字曰謀字次卿武帝曽孫戾太子孫也太子納史良娣生皇孫納王夫人生宣帝號曰皇曾孫生數月遭巫蠱事太子良娣皇孫王夫人皆遇害曾孫生繫郡邸獄邴吉為廷尉監治巫蠱憐曽孫之亡辜使女徒乳養私給衣食至後元二年望氣者言長安獄有天子氣上遣使者皆殺之内署令郭穰夜至郡邸獄吉拒閉不得入曽孫頼吉得全因遭大赦吉乃載曽孫送祖母史良娣家後有詔掖庭養視上屬籍宗正時掖庭令張賀嘗事戾太子哀曽孫養奉甚謹以私錢供給教書既壯為取暴室嗇夫許廣漢女曽孫因倚依廣漢兄弟及祖母家受詩於東海澓仲翁澓音馥髙才好學然亦喜逰俠鬬雞走馬具知閭里之奸邪吏治得失周遍三輔常困於蓮灼鹵中尤樂鄠杜間率常在下杜邵應曰下杜杜陵之下時㑹諸朝舍長安尚冠里身足下有毛遍身及足下皆有毛臥居數有光耀毎買餅所從買家輙大售亦以此自怪元平元年昭帝崩無嗣霍光徵昌邑王賀賀滛亂廢七月光奏遣宗正得至尚冠里舎沐浴賜御府衣太僕以軨獵車奉迎曽孫就齊宗正府封為陽武侯羣臣上璽即皇帝位甘露三年匈奴呼韓耶單于皆來朝賛謁稱藩臣而不名黄龍元年帝崩於未央宫在位三十五年漢書曰宣帝始立謁見髙廟大將軍光參乗上内嚴憚之若芒刺在背後張安世代光參乗天子從容肆意甚安及光身死而宗族竟誅漢書贊曰孝宣之治信賞必罰綜核名實政事文學法理之事咸精其能至于伎巧工匠噐械自元成間鮮能及之亦足以知吏稱其職民安其業也遭值匈奴乖亂推亡固存李竒曰宣帝能朝呼韓而固存走郅支使逺遁是推亡也信威北夷單于慕義稽首稱藩功光祖宗業垂後嗣可謂中興侔徳殷宗周宣矣東觀漢記曰光武下詔曰唯孝宣皇帝有功徳其上尊號曰中宗帝王世紀曰宣帝廟名樂逰後漢班固宣帝述曰中宗明明寅用刑名時舉傅納聽斷惟精柔逺能邇燀燿威靈龍荒朔漠莫不來庭丕顯烈祖尚於有成孝元皇帝漢書帝紀曰孝元皇帝諱奭之字曰盛宣帝太子也母曰共哀許皇后宣帝㣲時生民間八嵗為太子壯大柔仁好儒見宣帝所用多文法吏以刑名繩下大臣楊惲等坐刺譏辭語而誅常從容言陛下持刑太深宜用儒生宣帝作色曰漢家自有制度本以覇王道雜理之奈何純任徳教且俗儒不逹時宜好是古非今使人眩於名實何足任乃歎曰亂我家者太子也由是踈太子而愛淮陽王明察好法宜為吾子而王母張婕妤尤幸上欲代太子然以少依許氏故終不背焉宣帝崩太子即位頻年行幸甘泉河東郊祀泰畤祠后土幸長楊射熊舘布車騎大獵竟寧元年崩於未央宫在位十六年時年四十三漢書元帝賛曰臣外祖兄弟為元帝侍中應邵曰元成帝紀皆固父所作臣班彪自説也外祖言金敞也語臣曰元帝多才藝史書鼔琴瑟吹洞簫自度曲被歌聲分忖節度窮極要妙少而好儒及即位徵用儒生委之以政薛貢韋匡迭為宰相而上牽制文義優逰不斷孝宣之業衰矣然寛𢎞盡下出於恭儉號令温雅有古之風烈也應劭漢官儀曰孝武時天子以下未有幘元帝額上有壯髮不欲使人見乃始進幘羣寮隨焉帝王世說曰孝元皇帝廟名長壽孝成皇帝漢書帝紀曰孝成皇帝諱驁字太孫元帝太子母曰王皇后元帝在太子宫生帝於甲觀畫堂如淳曰甲觀舘名畫堂堂名為世嫡皇孫宣帝愛之字曰太孫常置左右及為太子好經書為人寛博謹慎初居桂宫上嘗急召太子出龍樓門不敢絶馳道應邵曰馳道天子之道西至直城門晉灼曰黄圗西出南頭第二門得絶乃度上遲之以狀對上大恱乃著令太子得絶馳道其後幸酒燕樂幸酒好酒也上不以為能而定陶恭王有才母傅昭儀又愛幸上以故欲以恭王為嗣頼侍中丹䕶太子家輔助有功上亦以先帝尤愛太子故得無廢元帝崩太子即位頻年幸甘泉汾隂郊祠綏和二年崩於未央宫在位二十六年時年四十五漢書曰成帝好為㣲行從其門郎及私奴官客多至十餘人皆帶持刀劍或乗小車御者在道上或皆騎出入市里郊野逺至旁縣谷永曰今陛下棄萬乗之富貴樂家人之賤事厭髙美之尊稱好匹夫之卑字如淳曰稱長放家人是卑字崇聚僄輕無義小人以為私客數離深宫之固挺身晨夜與羣小相隨鳥集雜㑹醉飽吏民之家亂服共坐混淆無别典門戸奉宿御之臣執干戈守空宫公卿百寮不知陛下所在積數年矣漢書賛曰臣之姑晋灼曰班彪之姑充後宫為偼伃父子兄弟侍帷幄數為臣言成帝善修容儀升車正立不内顧疾言親指臨朝淵嘿尊嚴若神可謂穆穆天子之容矣博覧古今容受直辭公卿稱職遭世承平上下和睦然耽于酒色趙氏亂内外家擅朝言之可為於邑建始以來王氏始執國命哀平短祚莾遂簒位蓋其威福之所由來者乆矣帝王世紀曰成帝廟名池陽揚雄酒賦叙曰漢孝成皇帝好酒雄作酒賦以諷之孝哀皇帝漢書帝紀曰孝哀皇帝諱欣之字曰喜元帝庶孫定陶恭王之子也母曰丁姬三嵗立為王長好文辭法律入朝上令誦詩通習能說能說其義帝稱其才時王祖母傅太后私賂遺上所幸趙昭儀及帝舅曲陽侯王根根及昭儀見上亡子亦欲預自結皆勸帝以為嗣乃立為太子綏和二年三月成帝崩太子即位建平二年夏待詔夏賀良等言赤精子之䜟漢運中衰當再受命今宜改元易號乃赦天下以建平二年為太初元年號曰陳聖劉太平皇帝漏刻以百二十為度八月詔曰夏賀良等言皆違經背古不合時宜甲子制書非赦令也皆蠲除之賀良等皆伏辜元壽三年帝崩于未央宫在位六年時年二十五漢書曰孝哀皇帝性不好音及即位帝下詔曰孔子不云乎放鄭聲鄭聲滛其罷樂府官郊祀樂及古之兵法武樂在經法非鄭衛之樂者條奏别屬他官又曰董賢為太子舎人美麗自喜上即位見幸出則驂乗入侍左右旬月之間賞賜巨萬貴震朝廷嘗與上晝寢藉上䄂上欲起賢未覺上不欲動揺之乃斷䄂而起又召賢女弟為昭儀更名其舎為椒風武庫禁兵尚方珍寳盡在董氏乗輿乃其副也賢為大司馬衛将軍年二十二上置酒從容視賢曰吾欲法堯禪舜何如侍中王閎曰天下乃髙皇帝天下非陛下天下也統業至重天子無戲言上乃黙然不恱孝平皇帝漢書帝紀曰孝平皇帝諱衎應劭曰布綱治紀曰平元帝孫中山孝王之子年三嵗時為王哀帝崩迎中山王即位元始五年帝崩于未央宫有司議曰禮臣不殤君皇帝年已十四宜以禮歛加元服漢書賛曰孝平之世政自莾出褒善顯功以自尊盛觀其文辭方外百蠻無思不服休徴嘉應頌聲並作至乎變異見于上民人怨于下莽亦不能文也少帝孺子漢書曰孝平皇帝崩無子嗣絶宣帝曽孫有五人王莽惡其長子也兄弟不得相為後乃徵宣帝𤣥孫廣威侯嬰年二嵗託以卜相最吉莽遂居攝如周公故事改曰居攝元年三月立嬰為皇太子號曰孺子建國元年乃䇿命孺子以為安定公莽執孺子手流涕曰今予迫皇天威命不得如周公哀歎良久孺子下殿北面稱臣百寮莫不感慟莽勅阿乳母不得與言常在四壁中至於長大不能名六畜後莽以女孫妻之帝王世紀曰嬰為孺子三年而廢為安定公十五年而失國更始二年平陵方望等將嬰聚衆為天子數月更始乃殺之王莽漢書曰王莽字巨君孝元皇后之弟子也父及兄弟皆以元成世封侯輔政凡九侯五大司馬唯莽父曼早死不侯五侯侈靡莽獨孤貧因折節為儉受禮經勤身博學事母及寡嫂孤兄子行甚整備又外交英俊内事諸父世父鳳疾莽侍病亂髪垢面鳳且死以託太后及帝拜黃門郎永始中封為新都侯逰者為之談說虛譽隆洽太后姊子淳于長先進在莽右莽隂求其罪因大司馬根白之長伏誅莽以獲忠直根因薦自代上遂擢為大司馬輔政莽欲令名譽過前人遂克己不倦嵗餘成帝崩哀帝即位傅太后丁姬皆稱尊號丞相朱博奏莽前不廣尊親之義請免為庶人乃遣就國杜門自守吏民寃訟莽者以百數元壽元年徵莽嵗餘哀帝崩莽為大司馬平帝即位太后臨朝皆委政於莽羣臣奏莽定策安宗廟賜號安漢公莽以女配帝欲擅權帝母衛姬及舅並留中山莽子宇􅂲帝大後見怨與師吳章夜持血灑莽門吏發覺之莽執宇送獄死莽因作書八篇以戒子孫宜班郡國以著官簿比孝經吏人上書者八千餘人咸曰伊尹為阿衡周公為太宰宜採伊周稱號加公為宰衡又加九錫鸞輅龍旂莽又増法五十條犯者徙之四海徙者以十萬數民始怨矣平帝疾莽作策請命願以身代藏策金縢平帝崩莽惡立長乃選子嬰年三嵗託以卜相最吉是月前煇光謝囂奏武功長孟通浚井得白石下有丹書文曰告安漢公莽為皇帝符命之起自此始矣羣臣奏安漢公居攝踐阼服天子黻冕南面朝羣臣車服出入如天子郊祀天地賛者曰假皇帝民臣謂之攝皇帝自稱曰予改元曰居攝元年東郡太守翟義立嚴鄉侯劉信為天子移檄郡國衆十餘萬莽惶懼抱孺子告禱郊廟放大誥作䇿班於天下莽既滅翟義自謂威徳已盛遂謀即真之事矣莽母功顯君死莽意不在哀令太后詔議其服劉歆與博士議令新都侯宗主䘮十一月宗室廣饒侯劉京上書言七月中齊郡臨淄縣昌興亭長辛當一暮數夢曰吾天公使也天公使我告亭長曰攝皇帝當為真即不信我此亭中當有新井旦起視亭中誠有新井入且百尺梓潼人哀章即作銅匱為兩檢其上書言莽為真天子昏時衣黃衣持匱至髙廟付僕射以聞莽至髙廟拜受金匱還坐未央前殿下書即真天子位號曰新以十二月癸酉為建國元年莽按符命求得王盛從布衣登用百官並改名又改光明宫為安定舘立祖廟五親廟四又更作小錢與前大錢為二品百姓不便農商失業民人至涕泣於市道遣五威將王竒等十二人班符命四十二篇五威將乗乾文車駕坤六馬背負鷩鳥之毛服飾甚偉長安狂女子碧呼道中曰髙皇帝大怒趣歸我國不者九月必殺汝莽捕殺之更名匈奴單于曰奴服于是時有用方技待詔黃門者或問莽形貌待詔曰莽所謂鴟目虎吻豺狼之聲者也故能食人亦當為人所食問者告之莽誅待詔後常翳雲母屛風非親近莫得見也更名髙句驪為下句驪五年二月文母皇太后崩立廟長安新室世世獻祭先帝配食坐於牀下又明六筦之令犯禁者至死臨淮𤓰田儀姓𤓰田名儀為盗賊琅琊女子吕母亦起莽之南郊鑄作威斗若北斗欲以厭勝衆兵莽見盗賊起乃命令太史推三萬六千嵗厯紀六年一改元布天下大募天下丁男及死罪囚吏民奴名曰猪突狶勇以為銳卒莽見盗賊多欲視為自安遂營長安城南提封百頃親舉築三下即陽城脩獻符命言黃帝以百二十女致神仙乃遣分行天下博採淑女莽夢見長樂宫銅人起立惡之念銅人銘有皇帝初兼天下之文使尚方工䥴滅銅人膺文又感漢髙廟神靈遣虎賁武士入髙廟拔劔四面提擊桃湯赭鞭鞭灑屋壁或言黃帝建華蓋以登仙乃造華蓋九重髙八丈一尺車上人擊鼓􅞮者皆呼登仙百官竊言此似轜車非仙物也莽知天下潰叛乃遣使分行天下除井田奴婢山澤六筦之禁㑹後漢兵起三月辛巳立劉聖公為天子莽愈恐欲外視自安乃染其髮鬢進所徵天下淑女立杜陵史氏女為皇后聘黄金三萬斤遣王邑王尋等兵百萬號曰虎牙五威兵定山東圍昆陽世祖來救昆陽邑等大敗關中聞知震恐命明學男張邯稱說其徳及符命事因曰易言伏戎于莽升其髙陵三嵗不興莽皇帝名升劉謂伯升髙陵謂髙陵侯子翟義也言劉升翟義為伏戎之兵於新皇帝世猶殄㓕不興也後莽兵敗莽憂憊不能食但飲酒啖鰒魚讀軍書倦因憑几寐不復就牀矣但為厭勝遣壊渭陵延陵門罘罳曰無使民復思漢也崔發言周禮左傳國有大災則哭以厭之莽乃至南郊陳符命本末仰天曰皇天即授臣莽何不殄滅衆賊因拊心大哭氣盡伏而叩頭作告天䇿文千餘言諸生小民甚哀及能誦䇿文者除為郎拜將軍九人為九虎將漢丞相司直李松與鄧曄共攻京師以王憲為校尉略地至長門宫茂陵董喜之屬皆假號稱漢將長安旁兵四㑹城下爭欲先入城貪立大功莽分赦城中諸獄囚皆授兵殺狶飲其血誓曰有不為新室者社鬼記之衆兵發掘莽妻子父祖塜燒棺椁及九廟明堂辟雍火照城中少年朱第張魚等燒作室門斧敬法闥呼曰反虜王莽何不出降火及掖庭莽避火宣室火輙隨之宫人婦女啼呼曰當奈何莽紺袀服帶璽韍紺深青袀音戈旬切持虞帝匕首天文即案拭於前日時加某莽旋席隨斗而坐曰天生徳於予漢兵其如予何庚戌晨旦羣臣扶莽自前殿南下椒除西出白虎門就車之漸臺欲阻池水猶抱持符命威斗公卿大夫從官尚千餘人王邑晝夜戰罷極入見其子侍中睦解衣冠欲逃邑叱之令還父子共守莽軍人入殿中呼曰反虜王莽安在有美人出房曰在漸臺衆兵追之圍數百重臺上亦與戰莽入室下晡時衆兵上臺臺上商人杜吳殺莽取其綬校尉公賔就見吳問綬主所在曰室中西北陬間就識斬莽首軍人爭分裂莽身支節肌皮臠分爭相殺者數千人傳莽首詣更始縣於宛市中百姓共提擊之或切食其舌應劭漢官儀曰幘本無巾如今半幘而已王莽無髮因為施巾故里語曰王莽頭秃施幘屋漢書賛曰王莽始起外戚折節力行以要名譽宗族稱孝師友歸仁及其居位攝政成哀之際勤勞國家直道而行動見稱述其竊位南面處非所據顛覆之勢險於桀紂而莽晏然自以唐虞復出也乃始恣睢奮其威詐滔天虐民窮凶極惡毒流諸夏亂延蠻貊猶未足逞其欲焉是以四海之内囂然䘮其樂生之心中外憤怨逺近俱發城池不守支體分裂遂令天下城邑為墟丘壠發掘害徧生民辜及朽骨自書傳所載亂臣賊子無道之人考其禍敗未有如莽之甚者也昔秦燔詩書以立私議莽誦六經以文姦言同歸殊途俱成㓕亡此皆亢龍絶氣非命之運紫色䵷音蛙聲餘分閏位聖王之驅除云爾非命非天命也紫間色䵷邪音嵗月之餘分為閏言皆非正也太平御覽卷八十九
