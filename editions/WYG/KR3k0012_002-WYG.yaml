  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_002-1a, image: WYG0893/WYG0893-0045a.png}
body:
  text: 太平御覽卷二宋李昉等撰天部二天部下渾儀刻漏天部下老子曰天得一以清天無以清將恐裂又域中有四大道大天大地大王亦大莊子曰天之蒼蒼其正色耶其逺而無所至極耶文子曰朴至大者無形狀道至大者無度量故天圓不中規地方不中矩天明日明然後能照四方君明臣明然後能照萬物域中四明故能乆又髙莫髙於天下莫下於澤天髙澤下聖人法之又天愛其精地愛其平人愛其情天之精日月星辰雷電風雨也地之平水火金木土也人之情思慮聰明喜怒也列子曰把國有人憂天崩墜身無所寄廢於寢食又有憂彼之憂者因曉之曰天積氣耳若屈伸呼吸終日在天中行止柰何憂崩墜乎其人曰天果積氣日月星辰不當墜耶曉者云日月星辰亦積氣之光耀者長廬子聞而笑曰虹霓也雲霧也風雨也四時也此積氣之成乎天者也知積氣也何以不壊夫天地空中之細物有中之最巨也難窮終始此固然矣憂其壊者誠為大逺言不壊者亦為未是天地不得不壊則㑹歸於壊遇其壊時奚為不憂哉子列子聞而笑曰言天地壊亦謬矣言不壊亦謬矣壊與不壊吾所不知也雖然彼一也此一也故生不知死死不知生來不知去去不知來壊與不壊吾何容心哉又湯問夏革曰四海之外奚有乎曰猶齊州也湯曰汝奚以實之革曰朕東行至營人民猶是也問營之東復猶營也西行之豳人民猶是也問豳之西復猶豳也朕以是知夫四海四荒四極之不異是也故大小相含無窮極也含萬物者亦如含天地含萬物也故不窮含天地也故無極朕亦焉知天地之表不有大天地者乎亦吾所不知也然則天地亦物也物有不足故昔者女媧氏鍊五色石以補其闕斷鰲之足鰲巨龜也以立四極其後共工氏與顓頊爭為帝淮南子曰與神農爭怒觸不周之山折天柱絶地維故天傾西北日月星辰就焉地不滿東南故百川水潦歸焉抱朴子曰宣夜之書亡而郄萌記先師相傳宣夜說云天了無質仰而視之髙逺無極眼瞀睛極蒼蒼然也譬旁望逺道之黄山而皆青俯察千仞之谷而黝黒夫青非真色黒非有體也日月衆星相浮空中行止皆須氣焉故七曜或住或逝或順或逆伏見無常進退不同由無所根繋故各異也辰極常居其所北斗不與衆星西没焉七曜皆東行日日行一度月行十三度遲疾任性若綴附天體不得不爾也又良將剛則法天可望而不可干柔則象淵可觀而不可入淮南子曰四時天之吏日月天之使星辰天之期虹蜺彗星天之忌又天有九野九千九百九十里四隅去地五萬里揚子法言曰唯天為聰唯天為明夫能髙其目而下其耳者匪天也夫又或問天曰吾於天而見無為之為矣或曰雕刻衆形者匪天歟曰以其不雕刻也如物物刻而雕之焉得力而給諸又天可度則覆物淺矣申子曰天道無私是以恒正天常正是以清明管子曰天或維之地或載之莫之維天已墜矣况於人乎曽子單居問於曽子曰天圓而地方誠有之乎曽子曰天之所生上首地之所生下首上首之謂圓下首之謂方始識天圓而地方則是四角而不揜也參嘗聞之夫子曰天道曰圓地道曰方方曰幽圓曰明明者吐氣是故外景幽者含氣是故内景墨子曰飄風苦雨溱溱而至此天之所以罰百姓不上同於天也孔叢子曰魏王問子順曰寡人聞昔者上天神異后稷而為之下嘉榖周遂以興吕氏春秋曰天道圓地道方聖人所以立天下天圓謂精氣圓通周復無雜故曰圓地方謂萬物殊形皆有分職不能相為故曰方主執圎臣處方方圓不易國乃昌又天地車輪輪轉也終則復始極則復反又天地大矣生而不子成而不有萬物皆被其澤得其利莫知其所由始三皇五帝之徳也太𤣥經曰九天一為中天二為羡天三為從天四為更天五為睟天六為廓天七為咸天八為沉天九為成天又天以不見為𤣥地以不形為𤣥人以心腹為𤣥天奥西北鬰化精也地奥黄泉隠營魄也人奥思慮含至精也説苑曰齊景公問子貢曰仲尼賢乎曰賢又問曰奚若曰不知也公怪之子貢曰今謂天髙無少長賢愚皆知若問其髙幾何皆曰不知仲尼之賢猶天之髙也奚得以知之又曰臣事仲尼猶杯就江海飲莫知淺深也又齊桓公問管仲曰王者何貴對曰貴天桓公仰視天管仲曰所謂天者非謂蒼蒼莽莽之天也君人者以百姓為天蔡邕天文志曰言天體者有三家一曰周髀二曰宣夜三曰渾天宣夜之學絶無師法周髀術數具存考騐天狀多所違失故史官不用唯渾天者近得其情今史官所用候臺銅儀則其法也立八尺圜儀之度而具天地之象以正黄道名察發歛以行日月以歩五緯精㣲深妙百世不易之道異苑曰陶侃夢飛翔冲天天門九重已入其八餘一門不得進以翼摶天一翅致折驚而墜下左腋腫痛後威果震主欲有闚擬之志每憶折翅之祥抑心而止徐整三五厯紀曰天地渾沌如鷄子盤古生其中萬八千嵗天地開闢陽清為天隂濁為地盤古在其中一日九變神於天聖於地天日髙一丈地日厚一丈盤古日長一丈如此萬八千歲天數極髙地數極深盤古極長後乃有三皇數起於一立於三成於五盛於七處於九故天去地九萬里廣雅曰太初氣之始也清濁未分太始形之始也清者為精濁者為形太素質之始也已有素朴而未散二氣相接剖判分離輕清者為天重濁者為地中和者為萬物五經通義曰神之大者為昊天上帝即耀魄寳也又天皇大帝亦曰太一其佐曰五帝東方青帝靈威仰南方赤帝赤熛怒西方白帝白招拒北方黑帝叶光紀中央黄帝含樞紐又天所以有雷霆風雨霜雪霧露何欲以成嵗潤萬物因以見災異也又鄒衍大言天事曰談天衍虞昺穹天論曰天之形穹隆如笠而冐地之表浮元氣之上譬覆奩以抑水而不没者氣充其中也日繞辰極没西而還東不入地中也天文録曰古人言天地之形者有三一曰渾天二曰蓋天三曰宣夜宣夜之說未嘗聞也後有虞昺作穹天論姚信作昕天論虞喜作安天論衆形殊象參差其間蓋天之說又有三體一云天如車蓋遊乎八極之中一云天形如笠中央髙而兩邊下一云天如欹車蓋南髙北下桓譚新論曰通人揚子雲因衆儒之說以天為蓋常左旋日月星辰隨而東西乃圖畵形體行度叅以四時厯數昏明晝夜欲為世人立紀律以垂法後嗣余難之曰春秋晝夜欲等平旦日出於卯正東方暮日入於酉正西方今以天下人占視之此乃人之卯酉非天卯酉天之卯酉當北斗極北斗極天樞樞天軸也猶蓋有保斗矣蓋雖轉而保斗不移天亦轉周匝斗極常在知為天之中也仰視之又在北不正在人上而春秋分時日出入乃在斗南如蓋轉則北道近南道逺彼晝夜數何從等乎子雲無以觧也後與子雲奏事坐白虎殿廊廡下以寒故背日曝背有頃日光去背不復曝焉因以示子雲曰天即蓋轉而日西行其光彩當照此廊下而稍東耳無乃是反應渾天家法焉子雲立壊其所作則儒家以天為左轉非也廣雅曰天圓廣南北二億三萬三千五百里七十五歩東西短减四歩周六億十萬七百里二十五歩從地至天一億一萬六千七百八十六里半下地至厚與天髙等又九天之際曰九垠垠堮也九天之外次曰九垓垓階也言其階次九也纂要曰天地四方曰六合四方上下謂之宇古往今來謂之宙白虎通曰男女總名為人天地所以無總名何天圓地方不相類也天左旋地右周猶君臣隂陽相向也又天所以有灾變何所以謹告人君覺悟其過欲令悔慎思慮也黄帝素問曰積陽為天故曰清陽河圖挺佐輔曰百世之後地髙天下不風不雨不寒不暑民復食土皆知其母不知其父如此千歲之後而天可倚杵洶洶隆隆曽莫知其始終汲冡紀年書曰懿王元年天再旦於鄭東方朔神異經曰崑崙有銅柱焉其髙入天謂之天柱皇覽冡墓記曰好事者謂黄帝乘龍升雲登朝霞上至列闗倒影天體如車蓋日月懸著何可上哉張衡靈憲曰天有九位自地至天一億一萬六千三百五十里懸天之晷薄地之儀皆千里而差一寸孫氏瑞應圖曰舜時后稷播植天降秬秠故詩曰天降嘉種惟秬惟秠秬音巨秠音丕論衡曰天門在西北又日月五星隨天而西移行遲天耳譬若磑石之上螻蟻行遲磑轉疾内雖異行外猶俱轉又天行三百六十五度凡積十三萬里也其行甚疾無以為驗儻與陶鈞之運弩矢之流相類似乎又天平與地無異若覆盆之狀洛書甄耀度曰周天三百六十五度四分度之一夫一度為千九百三十二里則天地相去六十七萬八千五百里闗令内傳曰天地南午北子相去九千萬里東卯西酉亦九千萬里四隅空相去九千萬里天去地四千萬里又天有五億五萬五百五十里地亦如之各以四海為脉伏侯古今注曰成帝建始三年七月夜有青黄白氣長十餘丈明照地或曰天裂或曰天劒楊泉物理論曰天者旋也均也積陽純剛其體廻旋羣生之所大仰又儒家立渾天以追天形從車輪焉周髀立蓋天言天氣循邊而行從磨石焉斗極天之中也言天者必擬之人故自臍以下人之隂也自極以北天之隂也所以立天地者水也成天地者氣也水土之氣升而為天天者君也夫天有形而天無體譬如火焉烟在上灰在下也渾天家說謂天如車輪而轉日月旦從上過夜從下過故得出卯入酉或以斗極難之故作蓋天言天左轉日月右行皆縁邊為道就渾天之説則斗極不正若用蓋天則日月出入不定夫天元氣也皓然而已無他物焉姚信昕天論曰若使天裹地如卵含鷄地何所倚立而自安固若有四維柱石則天之運轉将以相害使無四維因水勢以浮則非立也若天經地行於水中則日月星辰之行將不得其維是以有兩地之説下地則上地之根也天行乎兩地之間矣今地形立於下天象運乎上譬如人頥前侈臨胷而項不覆背近取諸身故知天體南低入地北則髙也冬至極低天運近南故日去人逺斗去人近北天氣至故氷寒也夏至極起天運近北故斗去人逺日去人近南天氣至故蒸熱也極之髙時日所行地中淺故夜短天去地髙故晝長極之低時日所行地中深故夜長天去地下故晝短然則天行寒依於渾夏依於蓋也楚辭天問曰圜則九重孰營度之言天圓九重誰度短之惟兹何功孰初作之言此天九重誰功始之筦維焉繋天極焉加筦轉也維綱也言天日夜轉徙寧有綱維其際極安所加乎八柱何當東南何虧言天有八山為柱皆何直東南不足誰能缺也古樂府詩曰天上何所有厯厯種白榆渾儀説文曰渾者制噐儀也書曰正月上日受終於文祖在璿璣玉衡以齊七政范應注曰璿為衡璣者轉也衡者平也若今渾天矣王者所以正天文之噐尚書考靈曜曰觀玉儀之旋昏明主時以玉為渾儀故曰玉儀也文耀鈎曰髙辛受命重黎説天文唐堯即位羲和立渾儀孝經援神契曰后偷任威折其玉斗失其金椎劉氏厯正問曰説云顓頊造渾儀黄帝為蓋天皆以天象蓋也渾天儀曰天如鷄子地為中黄居於天内天大地小表裏有水天地各乗氣而立載水而浮日月星辰繞地下故二十八宿半見半隠天轉如車轂之運王蕃渾天説曰渾天之作由來尚矣考之於天信而有徴舊説天地之體狀如鷄卵天包地外猶殻之裹黄圓如彈丸故曰渾天渾天言其形體渾渾如也周天三百六十五度五百八十九分度之百四十五東西南北展轉周規半覆地上半在地下故二十八宿半見半隠以儀准之其見常一百八十三度有竒是以知其半覆地上半在地下也黄赤二道相與交錯其間相去二十四度以儀准之俱三百六十五度有竒赤道見者常百八十二度半强又南北考之天見者亦一百八十二度半强是知天之體圓如彈丸北極出地三十六度是知南極入地亦三十六度兩極相去百八十二度半强也虞喜安天論曰太史令陳季胄以先賢制木為儀名曰渾天又言天體者三家渾蓋之術具存而宣夜之法絶滅有意續之而未遑也近見姚元道造昕天論又覩族祖河間相立穹天論鄙意多嫌喜以為天髙無窮地深不測地居卑静之體則天有常安之象形相覆冐無方圓之義渾蓋之家依易立説云天運無窮或謂渾然包地或謂渾然而蓋愚謂若必天裹地似卵含黄則地是天中一物聖人何别為名而配天乎古之遺語日月行於飛谷謂在地中也不聞列星復流於地又飛谷一道何以容此且谷有水日體為火精氷炭不共噐得無傷日之明乎此蓋天所以為臣難也或難曰周禮有方圓之丘祭天地則知乾坤有方圓體也答曰郊祭大報天而主日配以日月日月體圓圜丘似之非天體也祭方丘者别之於天尊卑異位何足怪哉周髀之術多是蓋天蓋天雖與渾異而星辰有常數今陳氏見髀上觀周因言周渾周髀宣夜或人姓名猶星家有甘石也蓋天之體轉四方體卑不動天周其上故云周髀宣明也夜幽數其術兼之故云宣夜賀道養渾天記曰昔記天體者有三渾儀莫知其始書以齊七政蓋渾體也二曰宣夜夏殷之法也三曰周髀當周髀之所造非周家術也近世復有四術一曰方天興於王充二曰昕天起於姚信三曰穹天由於虞喜皆以臆斷浮説不足觀也唯渾天之事徴驗不疑晋陽秋曰呉有葛衜字思真改作渾天使地居中以機轉之天轉而地止衜古道字義熙起居注曰十四年相國表曰間者平長安獲張衡所作渾儀土圭厯代寳噐謹遣奉送歸之天府梁書曰陶𢎞景嘗造渾天象髙三尺許地居中央天轉而地不動以機動之悉與天相㑹虞僧誕㑹稽餘姚人以左氏教授聽者亦數百人該通義例當世莫及先是儒者論天平執渾蓋二義論蓋不合渾論渾不合蓋崔靈恩立義以渾蓋為一焉隋書曰耿詢見其故人髙智寳以𤣥象直太史詢從之受天文算術詢創意造渾天儀不假人力以水轉之施於闇室中外候天時合如符契唐書曰將軍李守中奏三殿上所安置渾天儀銅鼎上津流董卓别傳曰卓治鑄候望施機儀益都耆舊傳曰漢武帝時洛下閎明曉天文於地中轉渾天定時節風土記曰璿衡即今渾儀云古者以玉為之轉運者為機持正者為衡一説言以良玉為管中有光蓋取明以助逺察也張衡渾天儀曰赤道横帶天之腹去極九十一度十九分度之五黄道邪帶其腹出赤道表裏各二十四度故夏至去極六十七度而强冬至去極百一十五度亦强也然則黄道邪截赤道者則秋分春分之去極也今此春分去極九十一度秋分去極九十一度少者就夏至晷景去極之法以為率也王蕃渾天說曰渾天遭周秦之亂師徒斷絶而䘮其文唯渾儀常在候臺是以不廢故其揚㩁可得而言至於纎㣲委曲闕而不傳蔡邕以為精㣲深妙百世不易之道揚子法言曰或問渾天曰洛下閎營之鮮于妄人度之耿中丞象之請問蓋天曰蓋哉蓋哉未幾也李軌注曰幾近也桓子新論曰揚子雲好天文問之於黄門作渾天老工曰我少能作其事但隨尺寸法度殊不曉達其意我稍稍益愈到今七十乃甫適知己又老且死矣今我兒子受學作之亦當復年如我乃曉知己又且復死焉其言可悲可笑也顔延之上立渾天銅儀表曰臣昔奉使入闗值大軍旋師渾儀在路肆觀竒秘絶代異寳刻漏周禮夏官挈壺氏掌挈壺以令軍井謂軍穿井成挈壺懸其上令軍中士衆皆見望見知下有井也壺所以盛飲故以壺表井也凡軍事懸壺以序聚􅝵凡喪懸壺以代哭者皆以水火守之分以日夜鄭司農曰懸壺以為漏也以序聚􅝵以次更聚擊􅝵備守也𤣥謂擊􅝵兩木相行夜時也䘮禮未大歛代哭以水守壺者為㓇漏也以火守壺者夜則火視刻數分以日夜者異晝夜漏也詩序曰東方未明刺無節也朝廷興居無節號令不時挈壺氏不能掌其職焉漢書曰董賢為郎傳漏陛下上見恱之又哀帝紀曰詔大赦天下以建平二年為太初元將元年曰陳聖劉太平皇帝韋昭曰敷陳聖劉之徳也漏刻以百二十為度師古曰漏晝夜共百刻今増其二十也續漢書律厯志曰建武十年詔施行漏刻以日長短為數率日南北二度四分而増减一刻一氣永元十年太史霍融上言官漏刻率九日増减一等不與天相應不如夏厯東觀漢記曰樊英每當直奏事常晨駐車待漏漢雜事曰鼓以動衆鉦以止衆夜漏盡鼓鳴則起晝漏盡鉦鳴則息吳録曰呉範字文則善占候於時闗雲長將敗孫權問範範期日中權立表下漏以待之及中不至權問其故範曰未正中也頃之有風動帷範曰期至矣斯須外稱萬嵗傳言得勝齊書曰武帝時宫内深隠不聞端門鼓漏聲置鐘於景陽樓上應五鼓及三鼓宫人聞鐘聲早起粧飾後魏書曰自魏初大將行兵長孫嵩拒宋武奚斤征河南俱給刻漏隋書曰耿詢作馬上刻漏世稱其妙煬帝即位進欹噐帝善之東方朔别傳曰武帝飲酧以八月九月中禾稼方盛熟夜微行漏下水十刻乃出桓子新論曰漏刻燥濕寒温輙異度晝日叅以晷景暮夜叅以星宿則得其正陸機漏刻賦曰激懸泉以逺射跨飛途而遥集伏隂蟲以承波吞絙流其如挹王廙洛都賦曰挈壺司刻漏樽㵼流仙叟秉尺隨水沉浮孫綽刻漏銘曰近取諸物逺贊自然累箇三階積水成淵淵滿則盈承虛赴下靈虬吐注隂蟲承瀉箇竹策也太平御覽卷二
