front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_993-1a, image: WYG0901/WYG0901-0688a.png}
body:
  text: 太平御覽卷九百九十三宋李昉等撰藥部十桔梗巴豆鬼臼莾草忍冬滛羊霍狼牙香蒲爵李腐婢落石鬼箭房葵麻黄茈葫亭歴紫苑女萎蓍實地椹黄環莵絲石芸甘遂馬刀女青王孫茵塵淮术百部千嵗垣中膚皮􅀈葐蒲隂實桔梗廣雅曰犁如桔梗管子曰五沃之土生桔梗范子計然曰桔梗出河東洛陽戰國策曰淳于髠一日而見七士於宣王王曰寡人聞千里一士是比肩而相望也百世一聖若隨踵而生也今子一朝而見七士不亦衆乎淳于髠曰夫鳥同翼者聚飛獸同足者俱行今求桔梗於沮澤累世不能得一之皋黍梁父之隂則却車載耳王求士於髠譬挹水於河取火於燧也建康記曰建康出桔梗極精好捜神記曰鄱陽趙夀有犬蠱有陳岑詣夀忽有大黄犬六七羣出吠岑後余相伯歸與壽婦食吐血幾死屑桔梗以飲之乃愈本草經曰桔梗一名犁如味辛㣲温生山谷治骨脅痛膓鳴驚悸生嵩髙吳氏本草經曰桔梗一名符蔰一名白藥一名利如一名梗草一名盧如神農醫和苦無毒扁鵲黄帝鹹岐伯雷公甘無毒李氏大寒葉如薺苨莖如筆管紫赤二月生巴豆廣雅曰巴菽巴豆也蜀志曰揵為南安縣出巴豆晉書曰賈后使太醫令程㨿合巴豆杏子丸矯詔使黄門孫慮賫至許昌以害太子列仙傳曰𤣥俗河間人餌巴豆賣藥都市七丸一錢盛宏之荆州記曰朐䏰縣有巴子城地多巴豆廣志曰揵為􅈎道縣出巴豆慱物志曰䑕食巴豆三年重三十斤本草經曰巴豆一名巴菽味辛温生川谷主治温瘧傷寒熱破瘕結堅通六府去惡肉除鬼毒邪注殺蟲生巴蜀郡范子計然曰巴菽出巴郡呉氏本草經曰巴豆一名菽神農岐伯桐君辛有毒黄帝甘有毒李氏主温熱寒葉如大豆八月採鬼臼呉氏本草經曰一名九臼一名天臼一名雀屏一名馬目公一名解毒生九真山谷及宛句二八月採根莾草范子計然曰莾草出三輔青色者善淮南萬畢術曰莾草浮魚取莾草葉并陳粟米合𢷬之以內水魚皆死本草經曰莾草味辛温生山谷治風頭癰乳疝瘕結氣疥瘙疽瘡生還谷呉氏本草經曰莽草一名芒草神農辛雷公桐君苦有毒生上谷山中或宛句五月採治風忍冬本草經曰忍冬味甘乆服輕身滛羊霍本草經曰滛羊霍一名剛前味辛寒治隂痿傷中益氣強志除莖痛利小便生上郡陽山呉氏本草經曰滛羊霍神農雷公辛季氏小寒堅骨狼牙本草經曰狼牙一名牙子味寒生川谷治邪氣去白虫疥痔生淮南建康記曰建康出狼牙范子計然曰狼牙出三輔色白者善呉氏本草經曰狼牙一名支蘭一名狼齒一名犬牙一名抱牙神農黄帝苦有毒桐君或鹹岐伯雷公扁鵲苦無毒生寃句葉青根黄赤六月七月華八月實黒正月八月採根香蒲本草經曰香蒲一名甘蒲味甘平生池澤治五臟心下邪氣堅齒眀目聦耳乆服輕身能老生南海呉氏本草經曰醮一名醮石一名香蒲神農雷公甘生南海池澤中爵李本草經曰郁核一名爵李腐婢本草曰腐婢小豆花也落石本草經曰落石一名鯪石味苦温生川谷治風熱乆服輕身眀潤目澤好色不老延年生太山吴氏本草經曰落石一名鱗石一名明石一名縣石一名雲華一名雲珠一名雲英一名雲丹神農苦小温雷公苦無毒扁鵲桐君甘無毒李氏大寒云藥中君採無時鬼箭廣雅曰鬼箭神箭也本草經曰衞矛一名鬼箭味苦寒生山谷治女子崩中下血腹滿汗出除邪殺鬼毒生霍山呉氏本草經曰鬼箭一名衞矛與神農黄帝桐君苦無毒葉如桃如羽正月二月七月採隂乾或生野田房葵慱物志曰房葵與狼毒相似本草經曰房葵一名犁盖味辛冬生川谷乆服堅骨髓益氣生臨淄呉氏本草經曰房葵一名梁盖一名爵離一名房苑一名晨草一名利如一召方蓋神農辛小寒桐君扁鵲無毒岐伯雷公黄帝苦無毒莖葉如葵上黒黄二月生根根大如桔梗中紅白六月花白七月八月實白三月三日採根麻黄廣雅曰龍沙麻黄也麻黄莖狗骨也本草經曰一名龍沙味苦温生川谷治風中傷寒出汗去熱邪氣破堅積聚生晉地范子計然曰麻黄出漢中三輔呉氏本草經曰麻黄一名卑相一名卑鹽神農雷公苦無毒扁鵲酸無毒李氏平或生河東四月生立秋採慕容晃與顧和書曰今致麻黄五斤茈葫本草經曰茈葫一名地薫味苦平生川谷治心腹祛腸胃結氣乆服輕身眀目益精生𢎞農呉氏本草經曰茈葫一名山菜一名茹草神農岐伯雷公苦無毒生寃句二月八月採根亭歴爾雅曰蕇音典亭歴實葉皆似芥一名狗薺淮南子曰亭歴冬生周髀曰凡北極左右物有朝生暮穫謂亭歴冬生之􅁼紫苑逰名山志曰石室紫苑呉氏本草經曰紫苑一名青苑女萎本草經曰女萎一名左眄一名玊竹味辛生川谷乆服輕身能老生太山蓍實本草經曰蓍實味苦酸平無毒主益氣充肌膚明目聦慧先知乆服不饑不老輕身生少室山谷八月九月採實日乾地椹本草經曰地椹一名石龍芮一名魯果能味苦平生川澤治風寒乆服輕身眀目不老生太山氾子計然曰龍芮出三輔色黄者善吴氏本草經曰石龍芮一名薑苔一名天豆神農苦平岐伯酸扁鵲李氏大寒雷公鹹無毒五月五日採黄環本草經曰黄環一名凌泉一名大就味苦生山谷主治蠱毒鬼魅邪氣欬逆寒熱生蜀郡范子計然曰黄環出魏郡黄色者善吴氏本草經曰蜀黄環一名生芻一名根韭神農黄帝岐伯桐君扁鵲辛一經味苦有毒二月生初出正赤髙二尺葉黄員端大莖葉有汁黄白五月實員三月採根根黄從理如車輻解治蠱毒莵絲爾雅曰唐蒙女蘿莵絲也廣雅曰女蘿松蘿也莵丘莵絲也史記龜䇿傳曰下有伏苓上有莵絲慱物志曰女蘿菟絲寄生木上根不着地吕氏春秋曰或謂莵絲無根非無根也其根不屬地伏苓是也淮南子曰莵絲下有伏菟之根伏菟抽則菟絲死抱朴子曰案仙方中自有合離草一名獨揺一名離母所以謂之合離下根如芋魁有逰子十二枚周環之大魁數尺雖相須生而實不連以氣相属耳如莵絲之草下有茯苓之根無此莵在下則絲不得生於上又曰初生之根其形似兎掘取割其血以和丹服之能變化任意所作吴氏本草經曰莵絲實一名玊女一名松蘿一名蔦蘿一名鴨蘿一名複實一名赤綱生山谷劉楨詩曰青青女蘿草上依髙松枝幸蒙庇眷㤙為惠不可訾石芸爾雅曰茢勃茢也郭璞注曰一名石芸音列范子計然曰石芸出三輔甘遂廣雅曰陵澤甘遂也建康記曰建康出甘遂本草經曰甘遂味苦寒生川谷治大腸疝瘕脹滿面目浮腫除留飲食出中山范子計然曰甘遂出三輔吴氏本草經曰甘遂一名主田一名陵澤一名重澤一名鬼醜一名陵藁一名白澤一名甘澤神農桐君苦有毒岐伯雷公有毒須二月八月採馬刀本草經曰馬刀味辛㣲寒生池澤治補中漏下赤白留寒熱破石淋殺禽獸賊䑕生江漢范子計然曰馬刀出河東吴氏本草經曰馬刀一名齊蛤右納切神農岐伯桐君鹹有毒扁鵲小寒大毒生池澤江海採無時也女青本草經曰女青一名雀翾味辛平生山谷治蟲毒逐邪殺鬼生朱崖羅浮山記曰又有男青似女青吴氏本草經曰女青一名霍由祗神農黄帝辛王孫本草經曰王孫味苦平治五藏邪氣温痺四支疼酸生海西吳氏本草經曰黄孫一名王孫一名蔓延一名白功草一名海孫神農雷公苦無毒黄帝甘無毒生西海山谷及汝南城郭垣下蔓延赤文莖葉相當因塵爾雅曰因塵馬生也本草經曰因蒿味苦治風濕寒熱邪氣結黄疸乆服輕身益氣能老生太山吴氏本草曰因塵神農岐伯雷公苦無毒黄帝辛無毒生田中葉如葢十一月採淮术吴氏本草曰淮术神農雷公無毒生晉平陽河東平澤治乆欬上氣傷中羸虛補中益氣百部抱朴子内篇曰百部黄似茇葜治咳殺虱慱物志曰百部與天門冬相似千嵗垣中膚皮吴氏本草曰千歲垣中膚皮得薑汁石脂共治􅆙葐爾雅曰茥音奎蒛葐覆葐也實似莓而小可食吴氏本草曰缺盆一名覆盆蒲隂實吴氏本草曰蒲隂實生平谷或圃中延蔓如𤓰葉實如桃七月採止温延年太平御覽卷九百九十三
