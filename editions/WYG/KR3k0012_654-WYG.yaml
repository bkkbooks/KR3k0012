body:
  text: 太平御覽卷六百五十四宋李昉等撰釋部二奉佛袁宏後漢紀曰楚王英好遊俠交通賓客晩節喜黄老修浮圖祠八年上臨辟雍禮畢詔天下死罪得以縑贖英遣郞中令詣彭城曰臣托在藩籬無以率先天下過惡素積喜聞大恩謹奉黄縑二十五疋白紈五疋以贖其􅄽楚相以聞詔曰楚王誦黄老之㣲言尚浮圖之仁祠潔齋三月與神為誓有何嫌懼而贖其罪令還縑紈以供桑門之盛饌晉書曰何充性好釋典崇修佛寺供給沙門以數百縻費巨億而不恡也親友至貧乏無所施遺以此獲譏於世阮裕常戲之曰卿志大宇宙勇邁終古充問其故裕曰我圖數千户郡尚不能得卿圖作佛不亦大乎於時郄愔及弟曇奉天師道而充與弟準崇信釋氏謝萬譏之云二郄諂於道二何佞於佛世説亦云又曰王恭性雖抗直而闇於機㑹自矜貴不閑用兵尤信佛道臨刑猶誦經神色無懼宋書曰㑹稽太守孟顗事佛精懇而為謝靈運所輕嘗謂顗曰得道應須慧業文人生天當在靈運前成佛必在靈運後顗深恨此言又曰袁粲字景倩㓜孤祖哀之名曰愍孫孝武即位稍遷尚書吏部郞文帝諱日羣臣並於中興寺八關齋中食竟愍孫别與黄門郞張淹更進魚肉食尚書令何尚之奉法素謹宻以白孝武並免官又曰范奉暮年事佛甚精於宅西立秪洹精舍又曰宋明帝頗曉𤣥理以周顒有辭義引入殿内親近宿直所為慘毒之事顒雖不敢顯言誦經中因縁罪福事帝亦為之少止顒音辭辯麗長於佛理著三宗論言空假義西凉州智林道人遺顒書深相賛美言捉麈尾來四十餘載頗見宗録唯此途白黒無一人得者為之發病非意此音偎來入耳其見重如此齊書曰竟陵王子良嘗招致名僧講論佛法造經唄新聲又與惠太子同好釋氏甚相友悌子良敬信尤篤數於邸園營齋戒大集朝臣衆僧至賦食行水或躬親其事世頗以為失宰相體武帝不豫子良啓進沙門於殿户前誦經武帝為感夢見優曇缽花遂案佛經宣旨使御府以銅為華挿牀四角又曰晉安王子懋字雲昌武帝第七子也亷讓好學年七歲時母阮淑媛嘗病危篤請僧行道有獻花供佛者衆僧以銅􅎆盛水漬其莖欲其不萎子懋流涕禮佛曰若使阿姨因此和勝願諸佛令花竟齋不萎七日齋畢花更鮮紅視􅎆中無稍更變又曰吳興有項羽神䕶郡㕔事太守到郡必須祀以軛下牛李夫人奉佛法不與神牛著履上㕔事又於㕔上設入關齋俄牛自死又曰滕曇恭南昌人也年五歲母楊氏患熱思食寒𤓰土俗所不産曇恭厯訪不能得銜悲哀切俄遇一桑門問其故曇恭具以吿桑門曰我有兩𤓰分一相遺還以遺母舉室驚異尋訪桑門莫知所在及母死晝夜哀慟時忽有神光自門而起俄見佛像及夾侍之儀容光顯著自門而入曇恭家人大小咸共禮拜久之乃滅逺近道俗咸傳之梁書曰廬江何伯璵兄弟俱厲節操伯璵卒㓜璵好佛法剪落長齋持行精苦兄弟年八十餘又曰范雲從父母兄縝字子真永明中為中郞時竟陵王子良盛招賓客縝亦與焉良精信釋教縝毎言無佛良曰君不信因果何得有富貴貧賤縝答曰人生如同樹花隨風而墮有拂簾幌墮於茵席之上有越籬牆落於糞溷之中墮茵席者殿下是也落糞溷者下官是也貴賤雖復殊途因果竟在何處乎子良不能屈又曰武帝大宏佛教而親自講説太子亦素信三寶徧覽衆經乃於宫内别立惠義殿專為法集之所招引名僧自立三諦法義普通元年甘露降於惠義殿咸以為至德所感又曰何𦙍居虎丘西寺講經學僧徒隨之常禁殺有虞人逐鹿鹿徑來趨𦙍伏而不動又有異鳥如鶴紅色集講堂馴狎如家禽初開善寺藏法師與𦙍遇於秦望山後還都卒於鍾山死日𦙍在般若寺見一名僧授𦙍香奩并函書曰貧道發自楊都呈何居士言訖失所在開函乃是大莊嚴論世中未有訪之香奩乃藏公所常用又於寺内立明珠柱乃七日七夜放光昭明太子欽其德遣舍人何思澄致手令以褒美之又曰建平王大球簡文帝十七子也性明慧夙成初侯景圍京城武帝素歸心釋教每發誓願恒云若有衆生應受諸苦悉請身代當時大球年甫七歲聞而驚謂母曰官家尚爾兒安敢辭乃不時禮佛亦曰乃有衆生應獲苦報悉大球代受其早慧如此又曰中大通元年都下疫甚帝於重雲殿為萬姓設救苦齋以身為禱九月癸巳幸同㤗寺設四部無碍大㑹上釋服披法衣清浄大捨以便省為房用素瓦器乘小車私人執役甲午昇法座為大衆講湼槃經癸卯羣臣以億萬奉贖衆僧黙然乙酉百辟詣寺東門奉表請還宫三請乃許帝三答書前後並稱頓首中大同元年二月幸同㤗寺講三慧經乃捨身為奴皇太子已下羣臣出錢億萬奉贖是夜同㤗寺為天火所燒畧盡二年帝昇光嚴殿講三慧經又捨身羣臣以億萬奉贖僧衆嘿然百辟詣鳳莊門上表請帝帝三答皆稱頓首丁亥服袞冕還宫髙祖自初捨身後或書經坐禪盡日不食又於元光殿坐師子座講金字經云又曰貞陽侯明俘執至魏魏帝引見明及諸將晉陽渤海王髙澄禮明甚重謂曰王與梁主和好十有餘年聞彼禮佛文常云為魏主及先王此甚是梁主厚意不謂一朝失信致使紛擾因欲與梁通和又曰初武帝軍東下用不足建安王偉取襄陽寺銅佛以為錢富僧藏鏹多加毒害後遂惡疾王性多恩惠尤愍窮乏每祁寒積雪則遣人載樵米隨乏絶者即賦給之晩年崇信佛理尤精𤣥學著二暗義又製性情幾神等論其義僧寵及周捨殷鈞陸倕並各精解而不能屈又曰到溉少有美名家門雍睦兄弟特相友愛初與弟洽恒同居一齋洽卒後便捨宅為寺蔣山有延賢寺溉家世創立故生平公俸減以供焉因斷腥膻終身蔬食别營小室朝夕從僧徒禮誦武帝毎月三置浄饌恩禮甚篤性不好交遊及卧疾門可羅雀太清三年卒臨終勑子孫以薄葬之禮言訖便屏家人請僧讀經讃咀及卒顏色如恒手屈三指即佛道所云得果也又曰周𢎞正善𤣥理為當世所宗藏法師於開善寺講説門徒數百𢎞正年少未知名著紅禈錦絞髻踞門而聽衆人蔑之弗譴也既而乘間進難舉座傾聽法師疑非世人覘之大相賞狎又曰劉慧斐字宣文彭城人也少博學能属文起家梁安成王法曹行參軍常還都途徑尋陽遊於匡山遇處士張孝秀相得甚懽遂有終焉之志因不仕居東林寺又於山北構園一所號曰離垢園時人乃謂為離垢先生慧斐尤明釋典工篆𨽻在山手寫佛經二千餘卷常所誦者百餘卷晝夜行道孜孜不怠逺近欽慕之簡文臨江州遺以几杖論者云自逺法師没後將二百年始有張劉之盛矣又曰庾詵普通中詔以為黄門侍郞稱疾不起晩年尤遵釋教宅内立道場環繞禮懴六時不輟誦法華經每日一徧後夜中忽見一道人自稱願公容止甚異呼詵為上行先生授香而去中大通四年因寢忽驚覺曰願公復來不可久住顔色不變言終而亡舉室咸聞空中唱上行先生已生彌陀浄域矣武帝聞而下詔謚曰貞節處士以顯髙烈又曰張孝秀字文逸長六尺餘白晢美鬚眉少仕州為治中從事後歸山居東林寺有田數十頃部曲數百人率以力田盡供山衆博渉羣書專精釋典僧有虧戒律者集衆佛前作羯磨而笞之多能改過陳書曰馬樞字要理扶風郿人也博極經史尤善佛經邵陵王綸為南徐州刺史素聞其名引為學士綸時自講大品經令樞講維摩老子周易同日發題道俗聽者二千人王欲極觀優劣乃謂衆曰與馬學士論義必使屈服不得空立主客於是學者各起問端樞依次剖判開其宗㫖論者拱黙聽授而已綸甚嘉之陳書曰後主沈皇后諱婺華身居儉約唯尋閲圖史及釋典為事常遇歲旱自暴而誦經應時雨降陳亡入隋及煬帝崩自廣陵過江於毘陵天静寺為尼名觀音又曰孫瑒常於山齋設講肆集𤣥儒之士冬夏資奉為學者所稱而處已率易不以名位驕物時興皇寺朗法師該通釋典瑒每造講筵時有抗論法侣莫不傾心又曰徐陵少而崇信釋教經論多所解釋後主在東宫令陵講大品經義學名僧自逺雲集每講筵商較四座莫能與之抗又曰徐孝克從東遊居錢塘之任義里與論釋典遂通三宗每日二時旦誦佛經晩講禮傳道俗受業者數百人天嘉中除剡令非其好也天建四年徵為秘書丞不就乃蔬食長齋持菩薩戒晝夜講誦法華經陳亡入長安隋文帝聞其名行召令於尚書都堂講金剛般若經尋授國子博士以疾卒年七十三臨終正坐念佛室内有非常香氣隣里皆驚異之又曰傅縡㓜聰敏七歲誦古詩賦至十餘萬言長好學能屬文陳文帝召為撰史學士縡篤信佛教從興皇寺慧朗法師受三論盡通其學時有大心寺暠法師著無諍論以詆之縡乃為明道論以釋其難隋書曰姚察煬帝即位授太子内舍人大業二年終於東都遺命薄葬每日設清水陸齋日設齋食果菜初察欲讀一藏經並已究竟將終曽無痛惱但西向坐念云一切空寂其後身體柔軟顔色如恒唐書曰白居易㑹昌中罷太子少傅致仕與香山僧如滿結香山社每肩輿往來自稱香山居士常寫其文集送江州東西二林寺洛城香山聖善寺如佛書雜傅例流行之遺命葬於香山如滿師塔之側又曰裴休家世奉佛休尤深於釋典太原鳳翔近名山多僧寺視事之隙遊踐山林與義學僧講求佛理中年後不食葷血恒齋戒屏嗜欲香爐具典不離齋中咏歌贊咀以為法樂與尚書紇于衆皆以法號相字時人重其髙潔而鄙其太過又曰元和中憲宗迎鳳翔法門寺佛骨至京師留禁中三日乃送諸寺王公士庶奔走施捨如不及韓愈上疏極陳其弊貶潮州刺史洛陽伽藍記曰奉朝請孟仲暉者武威人也父金城太守暉志性聰明學兼釋氏四諦之義窮其指歸恒與沙門論義時號為𤣥宗先生談藪曰王𤣥謨爽邁不羣北征失律法當死夢人謂之曰汝誦觀世音經千遍可免禍謨曰命懸旦夕千遍何由可得乃口授觀世音南無佛與佛有因與佛有縁佛法相因常樂我浄朝念觀世音暮念觀世音念念從心起念佛不離心而誦滿千遍將就戮將軍沈慶之諫遂免又曰梁髙祖崇信佛道於建業起同㤗寺又於故宅立光宅寺皆窮極工巧殫竭財力百姓怨苦殆不聊生自以其身施同㤗寺為奴朝廷共斂珍贖之有事佛精苦者輙加菩薩之號其下書皆云皇帝菩薩又曰崔光常晝坐讀佛經有鴿入懷縁臂上肩久之道俗嗟異太平御覽卷六百五十四
