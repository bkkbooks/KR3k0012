body:
  text: 太平御覽卷四百八十七宋李昉等撰人事部一百二十八哭禮記曰孔子哭子路於中庭有人弔者而夫子拜之既哭進使者而問故使者曰醢之矣遂命覆醢又曰伯髙死於衛赴於孔子孔子曰吾惡乎哭諸兄弟吾哭諸廟父之友吾哭諸廟門之外師吾哭諸寢朋友吾哭諸寢門之外所知吾哭諸野於野則已疏於寢則已重夫由賜也見我吾哭諸賜氏遂命子貢為之主曰為爾哭也來者拜之知伯髙而來者勿拜也又曰子夏䘮其子而䘮其明曾子弔之曰吾聞之也朋友䘮明則哭之又曰哭有二道有愛而哭之有畏而哭之又曰孔子惡野哭者謂其變衆又曰穆伯之喪敬姜晝哭文伯之喪晝夜哭孔子曰知禮矣喪夫不夜哭嫌思情性也文伯之喪敬姜據其牀而不哭曰昔者吾有斯子也吾將以為賢人也吾未嘗以就公室今及其死也朋友諸臣未有出涕者而内人皆行哭失聲斯子也必多曠於禮矣夫又曰孔子過泰山側有婦人哭于墓者而哀孔子式聴之使子貢問之曰子之哭一似重有憂者曰然昔吾舅死於虎吾夫又死焉今吾子又死焉夫子曰何為不去曰無苛政夫子曰小子識之苛政猛於虎也又曰陽門之介夫死司城子罕入而哭之哀晉人之覘宋者反報於晉侯曰陽門之介夫死子罕哭之哀而民說殆未可伐也孔子聞之曰善哉覘國者乎又曰朋友之墓宿草而不哭焉宿草陳根也謂期年又曰曾申問於曾子曰哭父母有常聲乎曾子曰中路嬰兒失其母焉何常聲之有言其若小兒亡母啼號安得常聲乎又曰斬衰之哭若徃而不返齊縗之哭若徃而反大功之哭三曲而偯小功緦麻哀容可也左傳曰衛叔武將沐聞君至喜捉髮走出前驅射而殺之公知其無罪也枕其股而哭之又曰孟明西乞白乙使帥師于東門之外蹇叔哭之曰孟子吾見師之出而不見其入也又曰秦伯素服郊次嚮師而哭之曰孤違蹇叔以辱二三子孤之罪也又曰子産歸未至聞子皮卒哭且曰吾已無為為善矣唯夫子知我又曰昭二十一年七月日蝕大夫叔輙莅事而哭昭子曰叔輙將死矣非所哭也八月叔輙卒又曰申包胥如秦乞師秦伯使辭焉曰寡人聞命矣子姑就館將圖而告對曰寡君越在草莽未獲所伏下臣何敢即安立依於庭墻而哭日夜不絶聲勺飲不入口七日秦師乃出論語曰顔淵死子哭之慟從者曰子慟矣曰有慟乎非夫人之為慟而誰為家語曰公父文伯卒其妻妾皆行哭失聲敬姜戒之曰吾聞好外者士死之好内者女死之今吾子早夭吾惡其好内聞也史記曰髙祖夜經宅中前有大蛇當逕抜劒斬蛇後人來至蛇所有一老嫗夜哭人問何哭嫗曰人殺吾子吾子白帝子也化為蛇當道今者赤帝子斬之故哭人以嫗為不誠欲以苦之因忽不見又曰鄭相子産卒鄭人皆哭泣悲之如亡親戚孔子與子産如兄弟及聞死為泣曰古之遺愛也漢書曰何並字子㢘為潁川太守代陵陽嚴詡官屬祖道詡據地哭曰吾哀潁川士我以柔弱徵必選剛猛代代到將有僵仆者故相弔耳並至果大殺戮又曰王莽末兵起莽憂不知所出崔發言周禮及春秋左氏國有大災則哭以厭之故易稱先號咷而後笑宜呼嗟告天莽自知敗及率郡臣南郊陳符命本末仰天撫心大哭諸生小民㑹旦夕哭為設飱粥甚悲哀及能誦策文者除以為郎至五千餘人謝承後漢書曰許慶字子伯家貧為郡督郵乗牛車鄉里號曰軺車督郵慶嘗與友人談論漢無統嗣幸臣専勢世俗衰薄賢者放退慨然據地悲哭時稱許子伯哭臣華㠐後漢書曰趙一造河南尹羊陟不得見一以公卿中非陟無足與託名日徃其門尋陟自强通陟卧未起一徑上堂臨之曰竊伏西州抱髙風舊矣乃今方遇而便恝然奈何命也因舉聲哭堂下大驚陟延與語大竒之明徃詣一柴車草屏露宿其傍左右皆驚愕東觀漢記曰逢萌素明隂陽知莽將敗擕家屬於遼東乃首戴盆盎哭于市曰新乎遂潜藏漢名臣奏曰漢得隂山匈奴長老過之未嘗不哭魏志曰太祖擊黄中濟北相鮑信鬭死購求信喪不得乃刻木如信形狀祭而哭焉又曰初蘇則及臨淄侯植聞魏氏代漢皆發憤悲哭文帝聞植如此而不聞則也嘗従容曰吾應天受禪而聞有哭者則謂為見問鬂髯悉張欲正論以對𫝊巽搯則搯音苦合曰不謂卿也乃止吳志曰孫策薨以事授權權哭未及息策長史張昭謂權曰孝㢘此寧哭時耶乃改易權服扶令上馬晉書曰顧榮素好琴及卒家人常置琴於虛座吳郡張翰哭之慟既而上牀鼓琴數曲撫琴而歎曰顧彦先復能賞此不因又慟哭不弔喪主而去又曰顧愷之桓温引為大司馬叅軍甚見親昵温薨後愷之拜温墓賦詩曰山崩溟海竭魚鳥將何依或問之曰卿重桓公乃爾哭狀其可見乎答曰聲如振雷破山淚如傾河注海又曰阮籍居喪骨立幾致滅性裴楷徃弔之籍散髮箕踞醉而直視楷弔哭畢便去或問楷凡弔者主哭客乃為禮籍既不哭君何哭楷曰阮方外之士故不崇禮典我俗中之士故以軌儀自居又曰秦秀性忌讒佞疾之如讎素輕鄙賈充及伐吳之役聞其為大都督謂所親曰充文案小才乃居伐國大任吾將哭以送師或止秀曰昔蹇叔知秦軍必敗故哭送其子今吳君無道國有自亡之形郡卒踐境將不戰而潰子之哭也既為不知乃有不赦之罪於是乃止又曰魏舒子混字延廣清慧有才行為太子舎人年二十七先舒卒朝野咸為舒悲每哀慟退而歎曰吾不及莊生逺矣豈以無益自損乎遂不復哭又曰王敦起郭璞為記室參軍是時潁川陳述為大將軍椽有美名為郭所重未幾而沒郭哭之哀甚呼曰嗣祖嗣祖焉知非福未幾而郭作難又曰阮籍時率意獨駕不由徑路車迹所窮輒痛哭而返又曰衛玠卒謝琨哭之慟曰棟梁折不覺哀也王𨼆晉書曰愍懐太子為賈后所害詔立臧為太孫趙王行太傅趙王與太孫俱之東宫車服侍從皆愍懐之舊也到銅駝街宫人哭侍從者皆哽咽路人泣焉又曰阮籍鄰家處女有才色女未嫁而死籍不識其父兄徑徃哭之盡哀而去晉安帝紀曰廣州刺史吳隱之字處黙少有孝行遭母憂哀毁過禮太常韓康伯鄰居康伯之母揚州刺史殷浩之妹聰明婦人也隱之每哭康母輙輟事流涕悲不自勝既而語康伯曰汝後若居銓衡當用如此輩人及康伯為吏部尚書進用之遂厯清顯晉中興書曰征北大將軍禇裒遣督䕶王堪迎流人軍次岱陂為石遵所破死傷過半裒還京聞哭聲甚衆問何哭之多左右曰岱陂之役也裒恥恨發疾而薨沈約宋書曰劉慎字徳願為秦郡太守徳願性麤率為世祖所狎侮上寵姬殷氏葬畢至墓謂徳願曰卿哭貴妃若悲者當加厚賞徳願悲聲便號慟撫膺擗踊涕泗交横上甚恱以為豫州刺史上又令醫術人羊志哭殷氏志亦嗚咽他日有問志者卿那得此副急淚志時新喪愛姬答曰我爾日哭亡妾耳崔鴻前燕錄曰髙商渤海人也剛毅嚴重好學有事幹為范陽太守聞兄開戰沒悲哀歐血病不能起扶杖乃行慕容雋石見商泣謂左右曰自古友于之篤未有如商者也拜昌黎太守商泣曰臣兄亡於此郡臣故不忍為之雋愍而授遼西陳書曰張昭有至性及父卒兄弟並不衣錦帛不食鹽醋日惟一升麥屑粥而已每一感慟必致歐血鄰里聞其哭聲皆為之感泣隋書曰周羅㬋進授大將軍其年冬帝幸雒陽陳主卒羅㬋請一臨哭帝許之縗絰送至墓所葬還釋服而後入朝帝甚嘉尚世論稱其有禮唐書曰有鄭人唐衢者應進士久而不第能為歌詩意多感發見人文章有所傷歎者讀訖必哭涕泗不能已每與人言論既相别發聲一號音詞哀切聞之者莫不悽然泣下嘗客逰太原屬戎師軍宴衢得預㑹酒酣言事抗音而哭一席不樂為之罷㑹故世稱唐衢善哭為名流稱重如此終不登一命而卒又曰李光弼兼范陽長史河北節度使拔趙郡自祿山反常山為戰塲死人蔽野光弼酹其屍而哭之又曰韋昭度知政事與李磎並命時宰相崔昭緯専政惡李磎之為人降制之日令知制誥劉崇曾哭麻以沮之晏子春秋曰景公游臨淄聞晏子卒公乗而驅之自以為遲下車而趨知不若車之速又乗比至國四下而趨行哭至伏尸號曰今天降禍齊國不加寡人加於夫子社稷危矣百姓誰告文子曰九夷八狄之哭異聲而皆哀列子曰李良之死楊朱望其門而不哭盡生性之道以至於亡故無所哀隨梧之死楊朱撫其尸而哭生不幸而死故可哀也又曰將隂夢火將病夢食飲酒者憂歌舞者哭又曰韓娥東之齊過逆旅旅人辱之韓娥因曼聲哭曼聲長引一里老幼悲愁垂涕相對孟子曰華周杞梁之妻善哭其夫而變國俗韓子曰子産晨出聞婦人哭撫其御手而聽之有間使執而問焉則手殺其夫者異日御問夫子何以知之曰凡人之於其所親愛也始疾而憂臨死而懼已死而哀今夫已死不哀而懼是以知其奸也淮南子曰故哭之發於口涕之出於鼻此皆憤於中而形於外也又曰楊子見衢而哭之為其可以南可以北韓詩外𫝊曰孔子行聞哭聲甚悲孔子曰驅之前有賢者至則臯魚也被褐擁鐮哭於道旁孔子避車而與之言曰子非有喪何哭悲也臯魚曰吾失之三少而好學周流諸侯以後吾親失之一也髙吾志簡吾事不事庸君失之二也少擇交逰寡於親友老而無託失之三也樹欲靜而風不止子欲養而親不待徃而不可追者年也去而不可得見者親也吾請従此辭矣立槁而死又曰孔子出逰少原之野有婦人中澤而哭其音甚哀孔子使弟子問焉婦人曰嚮者刈蓍薪亡吾簪吾是以哀弟子曰刈蓍薪而亡簪有何悲焉婦人曰非傷亡簪也哀其亡故賈誼新書曰鄒穆公死鄒之百姓若失慈父行吟三月四境之鄰於鄒者士民嚮方道而哭沽家不售其酒屠者罷刑而歸遨童不謳歌舂者不相杵博物志曰文王以周公為灌壇令朞年風不鳴條文王夢見一婦人甚美當道哭曰我東太山女嫁為西海婦而灌壇令當路有道徳吾不敢以風雨過列女𫝊曰齊人杞梁襲莒戰而死其妻乃就夫尸於城下哭之七日而城崩妻遂投淄水而死車頴秦書曰符登率萬人直到姚萇營下同聲向哭哀號動地萇心惡之與其衆議亦哭相應說苑曰孔子晨立堂前聞哭者聲音甚悲孔子援琴鼓之其音同也孔子出顔囘曰今者有哭其音甚悲非獨哭死哭生離也孔子曰何以知之囘曰以九山之鳥知之孔子使人問之曰今者父死家貧賣子以葬又曰季康子謂子㳺曰仁人者愛人乎曰然人亦愛之乎曰然康子曰子産死鄭人丈夫捨佩婦人捨珠珥夫婦巷哭之三月不聞竽瑟又曰鮑叔死管仲哭之泣下如雨從者曰非君臣父子也管仲曰生我者父母知我者鮑子士為知己者死而况為之哀乎劉向說苑曰晉文公入國至于河令棄籩豆茵席顔色犁黑手足胼胝者在後舅犯聞之中夜而哭文公曰吾亡也十有九年矣今將返國夫人不喜哭何對曰籩豆茵席所資者也而棄之顔色犁黑手足胼胝所以執勞苦者也而皆後之不勝其哀故哭也文公曰禍福利害有不與舅氏共之者有如河水魏文典論曰上洛都尉王琰以獲髙幹封侯其妻哭於内為琰富貴更取妾故也語林曰王武子葬夕孫子荆哭之甚悲賔客莫不為垂涕哭畢向靈座曰卿常好驢鳴今為君作驢鳴既作聲似真賓客大笑孫聞笑顧謂曰諸君不死令王武子死乎賔客莫不皆怒太平御覽卷四百八十七
