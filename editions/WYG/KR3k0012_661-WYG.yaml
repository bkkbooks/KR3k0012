  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_661-1a, image: WYG0898/WYG0898-0851a.png}
body:
  text: 太平御覽卷六百六十一宋李昉等撰道部三真人下集仙録曰王母者龜山金母也西華至妙之氣化而生金母生而飛翔䖏極隂元位配四方母飬羣品所居宫闕在春山崑崙之圃閬風之苑有城千里樓十二飛颷車羽輪不可到也蓬髪虎齒非西母之真形蓋金方之神也元始授以萬天元統龜山九光之籙使制召萬靈統括衆真緫諸天之羽儀天帝朝宴之㑹上清寳經三洞玉書凢所授度咸所閑衛黄帝在位王母遣使乘白鹿集帝庭授以地圖其後帝舜在位遣使獻白玉環及益地圗黄帝九州為十二州又遣獻舜玉琯吹之以和八風又尚書帝騐期曰王母之國在西荒凢得道授書者皆朝王母於崑崙之闕王褒字子登齋戒三月王母授以瓊花寶曜七晨素經茅盈從西城王君詣白玉龜臺朝謁王母求長生之道王母授以𤣥真之經又授寳書童散四方泊周穆土駕黿鼉魚鼈為梁以濟弱水而升崑崙𤣥圃閬苑之野而㑹于西王母歌白雲之謡刻名紀迹于弇山之上而還漢武帝好長生之道元封元年登嵩嶽築尋真之臺齋戒思道王母于七月七日乗紫雲之輦駕九色斑龍帶天真之䇿佩金剛靈璽黄錦之服金光奕奕結飛雲文綬戴天太真晨纓之冠攝方瓊鳯文之履天姿奄藹真絶世之人也下車二侍女扶之登牀東向而坐命侍女取桃以玉盤盛至七枚四與帝食自食其三帝欲收核種之母曰此桃三千歲一實中土地薄種之不生問長生之道母曰賤榮樂卑自復佳爾飬生之道理身之要不在怎耳欲長生者先取諸身堅守三一保靈根青白分明適泥丸三宫備衛在絳宫黄庭戊已無流源此所謂平太和保守自然真要之道也至若太上靈藥上帝之竒物也下隂生重雲妙草皆仙之藥也得上品後天之老乃太上之所服非中仙之所寳其中品者有得服之後天之逰乃天真之所服非下仙之所及其次藥有九丹金液紫虹華英太清九轉五雲之漿𤣥霜絳雪騰躍三皇東瀛白香𤣥洲飛生八石千之威喜九光西流石膽東滄青錢髙丘餘粮積石瓊田太靈還丹盛以金蘭長光絳草雲童飛于此非地仙之所聞也其下藥茯苓菖蒲巨勝黄精之服類可以延年雖不得長享無期足以身生光澤得為地仙求道者要先慿此階漸而能致逺勝也若能呼吸服御保固神氣此上品自然之要道也且夫一人之身天付之以神地付之以形道付之以氣萬物草木亦如之身以道為本豈可不飬神固氣以全爾形也形神俱全上聖所貴王母命上元夫人出入㑹之書五嶽真圗五帝六早靈飛之符凡十二事以授帝不能用其道而多所惑焉後三祠王母不降其所授之書置栢梁臺上為天災所焚李少君觧形而去巫蟲事起帝愈悔恨又大茅君盈南治句曲之山元夀二年八月己酉南嶽真人赤君西城王君方諸葛青童並從王母降於茅盈之室又王母命上元夫人授盈二弟茅固茅􅇆太霄隐書其後紫雲元君魏華存齋戒於陽落山隠元之臺王母與金闕聖君降於臺中乘八景輿同詣清虛上宫傳玉清隠書數卷以授魏夫人時太虛真人等歌太極歌王母曰逍遥𤣥精際萬流無暫停哀此去留㑹刼盡天地傾當尋無中景不死亦不生體被自然道寂觀合大明南嶽挺真幹玉映耀影精有任靡其事虛心自受靈如㑹絳河曲相與樂未央王母復還龜臺三一經曰黄帝逰靈臺青城山絶巖之下見天皇真人以蒼玉為屋黄玉為牀翠羅之幃侍者皆天人又曰髙丘子商時人也好道人六景山積年但讀黄素道經服餌术後服鴻丹得陸仙逰行五嶽復飲金液為中嶽真人又曰郭崇子商時人也彭真人弟子嘗山行遇盜崇諸子弟欲追擒之崇子曰縱去其盗後仕宦而崇子譽之數數徃崇子謝曰我昔盗也不可受大君子之譽遂自殺後崇子得道太極真人以為有殺人之罪不得為真人此為善過當致人自斃况為惡乎又曰楚荘王時市長宋萊子長洒掃一市久時有一乞食翁入市經日行歌道中曰天庭發雙華山源彰隂邪清晨案天馬來詣太真家真人無奈隠又以滅百魔常歌此乞食市人無解此者獨萊子悟疑其真人然未全解其歌耳遂師此翁而去積十餘年翁遂授以中仙之道萊子今在中嶽也乞食翁者西城真人馬延夀周宣王時人也天庭在兩眉之上是徹視之津梁亦謂之華亭也山源是鼻下人中之本側在耳下小人入谷中也天馬手也以手按鼻下則杜絶百邪又曰真人尹喜周大夫也為闗令少好學善天文秘緯鬼神無以匿其情状瓌傑不檢榮戚不形於色志懐逍遥天性𤣥湛忽登樓四望見東極有紫氣西邁喜曰夫陽數度盡九星度值合歳月並王應有異人過此乃齋戒掃道以候之及老子到關喜先誡關吏曰若有翁乘青牛薄板車者勿聼過止以白我果至吏曰願少止喜帶印綬設師事之禮老子重辭之喜曰願為我著書説大道之意得奉而行焉於是著道徳經上下二篇喜於是俱仙去為𤣥洲上卿蘇林傳曰林字子𤣥濮陽曲水人也父秀含徳隠曜居於􅁪山林少禀異操至趙師琴髙先生授鍊氣益命之道又師華山仇先生授還神之術曰子真人也當學真道乃致林於涓子未遂告林真訣先曰必欲作地上真人當先去三尸林後授紫陽真人道訣凢二百餘事至子守𤣥丹洞房三元真人且標上焉林為中嶽真人茅君傳曰盈字叔申咸陽人也父祚有三子盈固𠂻也盈少禀竒操矯㧞俗情不求聞逹不交非類入恒山讀老易餌术潜景在山中有六年精思念道誠感宻應梦天降玉女持玉醴而授之曰西城王君得真道可為師明發乃尋求至西城齋戒三日果見王君盈乃叩頭再拜勤懇乞長生之術乃得在西城洞臺之中金玉上宫親侍旦夕執巾履之役積十七年專一不懈復二年王君命駕造白玉龜山謁王母於青琳宫将盈同行王君見西王母稽首於前盈乃叩頭再拜自陳於王母前得治身之要道行其事歸家數十年以漢元帝時天使下迎來渡江東治句曲山於是天皇帝復遣授黄金紫玉䇿為太元真人東嶽主卿司命神君伏紫毛之節十絶靈幡巾藕華冠繡羽紫帔於飛羣斑龍輿素虎軿曲晨寳盖瓊帷緑寶執神流火雙珠月明錦旌白羽𤣥千金鍾玉磬紫林之腴玉漿金甖治赤城山玉洞之府上編上清下宴太極封掌吳越司校太山死生籙朝籍衆真定䇿金名領授學道司校羣仙時茅君弟吏二千石當之官鄉人多送之茅君亦在座曰余亦有職某月日當之官賔客曰願奉送茅君言不須有所損費吾有以供帳至期大作宴㑹皆青縑帷幄下鋪皇石氊竒饌異果羅列妓樂合奏數里從者千餘人文吏則朱衣素帶武吏則戎備曜日茅君乃登明葢車以晉興寧三年七月四日初夜下降人家着青錦繡裙紫毛色帔巾芙蓉冠侍從七人入户一人執紫毛節一人執十絶幡一人帶緑章囊一人握流金鈴三人奉白牙箱並朱衣以後數數來弟子迎候仙人李遵撰傳光顯于世間也三洞珠囊曰王褒字子登前漢王陵七世孫服青精䭀飯趍歩峻峰如飛鳥無津梁直度積水又服雲碧晨飛丹腴視見甚逺太上大道君遺遣正一左𤣥執葢郎封瑋音賜玉君素明瓊紱玗丹錦旌號青虛真人真誥曰赤松子黄帝雨師號太極真人又曰九疑真人韓偉逺昔師中嶽宋徳𤣥徳𤣥者周宣王時人也服靈飛六甲得道能逺行數孌曽傳𤣥虛之道今在嵩山偉逺久而随得其道為九疑真人又曰裴𤣥仁名服鳯陽夏人也漢文帝二年始生焉裴君得道将入室弟子鄧雲亦得道将登太華山入西洞𤣥石室中積三十二年忽見五老人賜裴君神芝之術亦號清虛真人又曰中嶽真人王仲甫少好仙道常吸引二景及飡霞法四十餘年都不覺益其子亦服之十八年仙去後南岳真人忽降仲甫家而教之曰子出血虧减津液不注雖接真景以飡霞故未為身益仲甫遂採藥治病兼修真道又積年方成今在𤣥洲受書為中嶽真人領九𤣥之司又曰范伯慈桂陽人也家因事累忽得狂病經年不愈聞沈道士治病多驗乃棄家求療五十日病愈後入天目山餌胡麻精思十七年又服丹沙得道為𤣥真人又曰許謐字思𤣥一名穆蕳文皇帝以為䕶軍長史雖外混俗務而内修真學得為上清真人又曰紫虛𤣥君領上真司命南嶽魏夫人名華存王清虛弟子陽君司命之師也任城人晉司徒文康公魏舒之女年二十四適南陽劉㓜彦㓜彦為汲縣修武夫人齋戒念道入室百日十二月夜半青童君及王君四真人同降授主經三十一卷至洛陽辭夫人渡江居豫章随子往江南安城郡國時年已八十三以成帝咸和九年青童清虛又降授劔解之道稱疾隠化乗􅀈車徃洛陽山明日有四十七真人降教道法積十六年王母與金闕南極同降迎夫人此詣上清宫玉闕下受神鳯章龍衣虎帶丹飛裙十絶華轓流金火鈴九葢芝轉九色之節雙珠月明神虎之符錦旌虎旌給西華玉女八景飛輿𤣥景九龍又受扶桑大帝君玉札金文位為紫虛元君領玉真司命主諸學道死生圗籍攝王三官闗校罪考文授金闕聖君青瓊板丹籙文位為南嶽夫人曲晨飛葢治天台大霍山洞臺中下訓奉道教授當為真仙者一月冄登王三登大素四謁玉晨遨宴扶桑仰招天真揔括神籙刋書九天佐命東華叶翼帝晨飛歩太霞叅轡九虛以興寕中降陽君又授許掾上經自此後數上來降也王清虛令弟子范邈作内傳顯世也又曰紫清上宫九華安真飛晋興寕三年年十三四着雲錦裙上丹下清腰絲繡帶右帶係十余小鈴鈴子青色又黄色相間左帶玉佩指著金環白珠約臂作髻在頂上餘髪埀至腰一侍女朱衣帶青章囊長尺餘以盛書書可十餘卷白玉檢囊口上刻字玉清神虛内真紫元丹章一侍女赤衣捧白玉箱絳帶絡之年並十七八自此後數數來降授書作詩真人傳曰馬明生者齊國臨淄人也本姓帛名和字君賢為縣吏捕蛇為蛇所傷遇大真元君與藥即愈随至太山石室中金床玉几珍物竒偉人跡所不能及事之勤亦至矣太真乃授以長生之方曰我所受服太和自然龍胎之體適所以授三天真人不可以教始學者後随安期先生服餌仙去為真人裴真人弟子三十四人其十八人學真道餘學仙道太平御覽卷六百六十一
