  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_667-1a, image: WYG0899/WYG0899-0020a.png}
body:
  text: 太平御覽卷六百六十七道部七宋李昉等撰齋戒太上經曰思神録氣習法登階名之為齋太極真人曰齋莫過乎靈寳其法髙妙不宣於世先聖口訣秘而不書太一齋法𤣥之又𤣥指教經曰奉道不齋戒如無燭夜行失道自苦耳太真科曰修三守一齋為本基學道以齋戒為本太上所重老氏所營仙真所賴又曰道士能日中一食不飱穢惡隨月齋戒晝夜不怠不害一切㧞度蜎飛當得至道又曰道士修經習業以道徳二篇為先齋戒次之度人濟已也又曰救觧父母疾病當齋官露臺齋中奏子午章若到必感又曰𤣥清玊皇之道上皇天帝授太㣲天帝君三光紫精君真陽元老君後以付太一道君以傳金闕李君李君傳太靈真人南岳赤君又紫元夫人以傳清虛王君王君傳南岳魏夫人夫人傳楊君使授許長史及掾授受者齋戒七日又曰衆真授道先齋戒百日或三十日或十日又當先告齋一日以洗素心三十年六傳尋上經齋戒無如此者行之四十年太上迎以玉輪登上清為上真三皇經曰凡齋戒三事以定心口身之業也又曰凡齋戒講誦元譜大經佩服内文以成其道又曰齋者佩服三皇内文以成隠顯之道登真隠訣曰道齋謂之守靜謂齋定其心㓗靜其體在乎澄神遣務檢隔内外心齋者也又曰修道之人須齋戒禮謝七世之愆又曰上清每以吉日㑹五真凡修道之人當其吉日思存吉事心願飛仙立德施惠振救窮乏此太上之事也當須齋戒遣諸雜念宻處静室真誥曰齋戒不可雜處必亂正道也凡甲寅庚申之日是尸競亂精神躁穢之日當齋戒不􅃦遣諸可欲凡五邜之日常當齋戒入室東向必拜神念氣適意所陳又曰漢建安中左慈聞句曲山在金陵通峨眉羅浮故度江尋之遂齋戒三月而登此山乃得其門入茅君授以三種神芝宿起功儀曰捧香仙女下衛齋戒之人也又曰太極真人受太上口訣千歳五傳依隠書之制齋戒五日乃授立約珠囊曰凡入五岳以甲子上旬之日沐浴齋戒七日乃行名山有芝英竒藥者奉之作素奏丹書其文乞登仙度世飛上清再拜放白鷄犬各一於石上而去然後求芝英奇藥所欲必獲惡鬼老魅不敢試人若學道不知此術入山多厄枹朴子曰家有三皇圖先必齋戒百日乃召致天地五岳社稷之神後聖君命清虛小有真人撰集上仙真籙緫名為上真正法以慴萬邪百年再授于人須齋戒方得三元品經曰學道之本當先修中元齋戒之法贖罪謝過於太眞則書名𤣥圃靈寳赤書曰元始五老諸天帝皇帝以歳六齋之月㑹於上三天靈都宫元陽紫㣲之臺集筭天元推校運度又云紫㣲宫舊格丹書白素齋戒百日誦之太素玊籙經曰齋戒存思誦習此經精進無怠神通智逹位為太素真人大平經曰真人云人之精神常居空閑之處不居汙濁之門也欲思還神皆當齋戒香室中百病自除不齋戒則精神不肯返皆上天共訢人所以人病積多死者不絶八素奔辰訣曰七曜五星審識形色早晚于所見處祠之若晦𠖇之夕皆於寢室存念齋戒修行如存奔日月之法日中赤氣紫芸者為曜靈九神華芒也月中黄氣白光八朗之芒是為月華夜精道人皆知服月之氣而吸九華靈芒能修存奔日月之道安妃授陽君書二卷皆是奇法日月之道甚多髙妙上清金闕靈書曰太上之吉㑹日者髙眞集宴慶獻之日也廻元者太上之更始日也甲子隂陽之首氣月晦改度之初萌故為新日也不知此日者不得解罪除過不得刻簡上真當須齋戒於是日思存吉事此廻元訣也又曰黄庭内景經一方太上琴心文又名大帝金書扶葉大帝居宫中尋誦此經金簡刻書之故曰金書又名東華玊篇東華者方諸宫名東海青童君所居也其中仙曹多齋戒誦詠刻玉書之又曰太極左真人曲素訣辭一名九天鳯氣𤣥丘大真書太上授太極左真人真人傳東海方諸宫青童太君使傳道士宿有名應神仙真人者佩之二十年得見三元君齋戒青金之誓以代盟約入道秘言曰欲行九真之法者齋戒靜室須專寂心禱飛仙上登紫庭又曰九天鳯氣𤣥丘太真書𤣥都丈人仙科授佩齋戒三日佩之者得仙道德經序訣曰尹喜知紫氣西邁齋戒相見道真及老子度闗授二篇經義靈書經曰十部妙經金字玊簡諸天真仙齋戒月日上詣玉京誦其文威儀經曰齋戒景福度人為先先彼後已與志𤣥同一本行書曰授靈寳赤書者必先齋戒東卿司命經曰先師王君昔見太上明堂𤣥真士經齋戒休糧存念日月咽服光芒之液常宻行之此上真道也太上𤣥真經先盟而後行行之然後可聞玊佩金璫之道耳季偉者長齋三年竭誠殫思乃能得之神光映身然後受書此真𤣥之道要而不煩吾常秘寳藏之囊肘後以相示慎宻者也好道者欲求神仙冝先齋戒登山昔左慈齋戒三月拜禮靈山竭誠三年然後二茅君引前又曰黄庭内景玊經曰扶桑大帝君命賜谷神王傳南岳夫人授受齋戒九日又曰三元真一經金闕帝君所守東海青童以傳涓子涓子傳蘇君蘇君傳周君授受齋戒百日或五十日或三十日或七日四十年傳一人十人止後聖道君命清靈有小天玊條集上仙真籙緫名紫元夫人傳王君王君傳南岳魏夫人夫人傳楊君楊君傳許掾授受齋三日或七日鳯真之文太上受太極左真人真人傳東海方諸宫青童君此亦衆真相傳授受齋三日佩九年得見上清金闕又曰太上智慧經太上付上相又紫元夫人傳王君而王君傳南岳傳楊君今授許長史掾授受齋戒五十日又曰太丹隠書飛真之道存想之法也此盖揚君止杪一經誦以與長史耳亦独九真之龍書也未見齋戒之法不可遵行真誥有朝大素法云受洞决施行大丹隠書存三元洞房者即謂此也但不具耳世有君學注洞房事亦是抄出此經語而注之為施修之法未見真本而事㫖不具名山記曰大茅山有小宂口石填之但精心齋戒可得而逰中茅山東亦有小穴口如狗竇初容人入耳愈入愈闊外以盤石掩塞宂口故餘小穿如杯大使山靈守衛之此盤石亦時開發若勤懇齋戒尋之得從而入易於常洞口好道者欲求神仙冝預齋戒則三茅君於句曲見之授以要道入洞門句曲有五門立志齋戒三月尋登此門者可入矣九天經曰玊輔上宰齋戒建節侍於太清法輪經曰仙公齋戒未及歳年而感召天真下降净室又曰念真齋戒緘口慎言靈寳大戒經曰不受大戒徒為長齋四極明科經曰凡學上清之道奉其宗師入室齋戒太上科曰凡經從師受皆真官侍衛須齋戒講讀雌一五老經曰長修善行日中乃飰齋戒三年乃得受大洞真經太上丹簡墨籙曰道之去聖日已逺矣傳冩科戒謬誤者衆若有所疑師不能觧者可齋戒一月求靈應之審靈仙感降報語於人傳授經曰齋者簡素為上神先映身集仙籙曰崑崙𤣥圃見正一真人勤苦齋戒讀經崇道大霄琅書曰立三本書一為長鎮一為供齋一為研習者常自隨所住室中别置格上躬自出入勿使委非其所冩經之時須先齋戒經中有圖圖或别卷各有侍官典圖真吏請問經曰道不存師齋誦無感玉佩金璫經曰衆眞登太瓊臺齋戒三月崆峒經曰太上道君齋戒於西那玊國羅浮之岳又曰青精飰方太極真人傳王君授受之際齋戒十日二千六百年傳十人雲牙玊方王君傳南岳魏夫人齋戒五日服之可以絶榖去尸蟲王君逰觀天下至龜山齋二月又齋戒三年詣太素還西城又齋三月受書周君少遇中央黄老君逰丹城乞長生度世之道授以上真之道乃還登常山石室中齋戒念慮久歴歳時後仙去道學傳曰任敦字尚隠雲陽人雲陽山即茅山也敦所居山舍西五十里有一石室西南二里復有一石室皆容數十人西南室父老傳云有銅牛出皆銅靷銅卷相傳號為銅室曲入至深立此通潢池而洞崑崙每三元齋戒之日敦徃二室祈禱皆能髣髴真形又曰陸修靜字元德呉興人太始七年率衆建三元露齋太真上蒼元上籙經曰凡有生之域清少濁多穢障相纒行善不立邪氣相侵强魔來試上學之人齋戒存思禁隔囂塵非類之物唐突去來皆是穢濁當擇日齋戒佩破淹之符以昇玉清太平御覽卷六百六十七
