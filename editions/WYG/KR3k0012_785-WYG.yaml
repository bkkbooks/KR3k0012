body:
  text: 太平御覽卷七百八十五宋李昉等撰四夷部六南蠻一叙南蠻越裳國黄支國盤瓠廪君板楯蠻俚叙南蠻禮記曰王制曰南方曰蠻雕題交趾有不火食者矣雕謂刻人肌以丹青之文交趾足相鄉也不火食氣煖不為病傳曰庸人率羣蠻以叛楚庸今上庸縣屬楚之小國麋人率百濮聚於選將伐楚選楚地百濮夷也於是由息之北門不啓又曰楚子聞蠻氏之亂也與蠻子無質也質信也使然丹誘戎蠻子嘉殺之遂取蠻氏又曰王子朝使告於諸侯曰茲不糓震蕩播越竄在荆蠻未有攸底詩曰蠢爾蠻荆大邦為讎蠢動也蠻荆荆州之蠻也又曰脩爾車馬弓矢戎兵用戒戎作用逷蠻方蠻方蠻荆之外也此時中國微弱故復戒將帥之臣以治軍實又曰保有鳬繹遂荒徐宅至于海邦淮夷蠻貊及彼南夷莫不率從尚書舜典曰柔逺能邇惇德允元而難任人蠻夷率服帝曰臯陶蠻夷猾夏冦賊姦宄猾亂也夏華夏也周行攻刼曰冦殺人曰賊在外曰姦在内曰宄言無法所致也又禹貢曰三百里蠻以文德來之不制以法論語曰子張問行子曰言忠信行䔍敬雖蠻貊之邦行矣史記曰吴太伯弟仲雍皆周太王之子遜季厯乃奔荆蠻文身斷髮示不可用荆蠻義之從西歸之千餘家漢書曰賈誼上書云凡天子者天下之首何也上也蠻夷者天下之足何也下也世說曰郝隆為桓温南蠻參軍三月三日在温席作詩曰娵隅躍清池温問何物答曰蠻名魚為娵隅桓曰何為作蠻語隆曰千里投公始􅀶一蠻府參軍那得不作蠻語越裳國尚書大𫝊曰交趾之南有越裳國周公居攝六年制禮作樂天下和平越裳以三象重譯而獻白雉曰道路悠逺山川阻深音使不通故重譯而朝成王以歸周公曰德不加焉則君子不饗其質質亦贄也政不施焉則君子不臣其人吾何以獲此賜也其使請曰吾受命吾國之黄耈曰乆矣天之無烈風滛雨意者中國有聖人乎有則盍往朝之周公乃歸之於王稱先王之神致以薦於宗廟周既衰於是稍絶黄支國漢書曰黄支國去合浦日南三萬里俗與朱崖略同武帝時来貢且多明珠璧琉璃竒石異物大珠圍及二寸至團者置之平地終日不得止盤瓠後漢書曰昔髙辛氏有犬戎之冦帝患其侵暴而征伐不克乃訪募天下有能得犬戎之將呉將軍首者購黄金千鎰邑萬家又妻以少女時帝有畜狗其毛五采名曰盤瓠下令之後盤瓠遂銜人頭造闕下羣臣怪而診視之乃吴將軍首也帝大喜乃以女配盤瓠得女負而走入南山止石室中所據險絶人跡不至於是女解去衣裳為僕鑒之髻結著獨力之衣僕鑒獨力皆未詳流俗或改鑒為鑒者妄穿鑿也經三年生子十二人六男六女盤瓠死後因自相夫妻織績木皮染以草實好五色衣服製裁皆有尾形其衣裳斑斕語言侏離好入山谷不樂平曠帝順其意賜以名山廣澤其後滋蔓號曰蠻夷外痴内黠安土重舊以先父有功母帝之女作賈販無闗梁符𫝊租税之賦有邑君長皆賜印綬冠用獺皮名渠帥曰精夫相呼為姎徒姎烏郎切説文曰女人自稱姎我也今長沙武陵蠻是也又曰南蠻其在唐虞與之要質故曰要服夏商之時漸為邊患暨於周代黨衆彌盛故詩曰蠢爾蠻荆大邦為讎至楚武王時蠻與羅子共敗楚師殺其將屈瑕莫敖不設備故敗縊於荒谷羣師囚於冶父也楚師振遂屬於楚及吴起相悼王南并蠻越遂有洞庭蒼梧秦昭王使白起伐楚畧取蠻夷始置黔中郡又曰漢興改秦黔中郡為武陵嵗令大人輸布一疋小口二丈是謂賨布說文曰賨南蠻賦也音午冬切雖時為冦盗而不足為郡國患光武建武二十三年武陵蠻精夫相單程等大冦郡縣遣武威將軍劉尚發南郡長沙武陵兵萬餘人乗船泝沅水入武谿擊之沅水出牂牁故且蘭東北經盧溪長沙巴陵郡入洞庭通江也武溪在今靈溪郡盧溪縣尚輕敵深入悉為所沒又遣伏波將軍馬援將兵至臨沅今武陵郡武縣即漢臨沅縣也擊破之單程等饑困乞降㑹援病卒謁者宗君聽悉受降為置吏以司之羣蠻遂平又曰順帝永和初武陵太守上書以蠻夷率服可比漢人増其租賦議者皆以為可尚書令虞詡獨奏曰自古聖人不臣異俗非德不能及威不能加其獸心貪婪難率以禮是故覊縻而綏撫之附則受而不逆叛則棄而不追先帝舊典貢税多少所由来乆矣今猥増之必有怨叛計其所得不償所費必有後悔帝不從其冬澧中漊中蠻漊水出今澧陽郡漊音婁也果爭貢布非舊約遂殺鄉吏舉種反叛明年遣武陵太守李進討破之斬首數千級餘皆降散又曰延熹中長沙零陵蠻反叛冦江陵荆州刺史劉度謁者馬睦南郡太守李肅皆奔走肅主簿胡爽扣馬首諫曰蠻夷見郡無警備故敢乗閒而進明府為國大臣連城千里舉旄鳴鼔應聲十萬柰何委付守之重而為逋逃之人乎肅㧞刃向爽曰掾促去太守今急何暇比計抱馬固諫肅遂殺爽而走帝聞之徴肅棄市復爽門閭拜家一人為郎魏略曰髙辛氏有老婦居王室得耳疾挑之乃得物大如蠒婦人盛瓠中覆之以盤俄頃化為大瓠其文五色因名盤瓠千寶晉紀曰武陵長沙郡夷盤瓠之後也雜處五服之内憑山阻險每常為猱雜魚肉而歸以祭盤瓠俗稱赤髓横裙子孫唐書曰黄國公冊安昌者盤瓠之苗裔也世為東蠻帥與田李向鄧各盤瓠一禮世𫝊其皮盛以金函四時致祭黄閔武陵記曰山半有盤瓠石室可容萬人中有石牀盤瓠行跡今接山窟前有石羊石獸古跡異奇尤多坐石窟大如三間屋遥見一石仍似狗形蠻俗相𫝊云是盤瓠象也荆州記曰沅陵縣君居酉口有上武就陽二鄉此是盤瓠子孫狗種也二郡在武陵溪之北廪君後漢書曰巴郡南郡蠻本有五姓巴氏樊氏瞫氏瞫音審相氏鄭氏皆出於武陵鍾離山在今巴郡夷陵山縣其山有赤黒二穴巴氏之子生於赤穴四姓之子皆生黒穴未有君長俱事鬼神乃共擲劒於石宂約能中者奉以為君巴氏子務相乃獨中之衆皆嘆又令各乗􅁟船約能浮者因共立之是為廪君乃乗􅁟船從夷水至鹽陽鹽水有神女謂廪君曰此地廣大魚鹽所出願留共居廪君不許鹽神暮輙来宿旦即化為蟲與諸蟲羣飛掩蔽日光天地晦冥積十餘日廩君思其便因射殺之天乃開明廪君於是君乎夷城四姓皆臣之廪君死魂魄世為白虎巴氏以虎飲人血遂以人祠焉又曰秦惠王并巴中以巴氏為蠻夷君長世代尚秦女其人爵比不更有罪得以爵除又曰漢興南郡太守靳强奏請一體秦時故事至武光建武二十三年南郡潳蠻山雷遷等始反叛冦掠百姓遣武威將軍劉尚討破之徙其種人七千餘口置江夏界中其後江中蠻是也又曰和帝永元十三年巫蠻許聖等以郡收税不均懐怨恨遂屯聚反叛荆州諸郡兵討破之復悉徙置江夏靈帝光和三年江夏蠻復反冦患累年廬江太守陸康討破之世本曰廪君使人操青縷以遺鹽神曰嬰此即相宜云與女俱生弗冝將去鹽神受縷而嬰之廪君即立陽石上望青縷而射之鹽神死天乃大開說文曰幏南郡蠻夷布也幏音稼荆州圖曰夷陵縣西有温泉古老相𫝊此泉原出鹽子今水有鹽氣縣西一獨山有石穴有二大石並立穴中相去一丈俗名為隂陽石隂石常温陽石常燥盛𢎞之荆州記曰昔廪君浮夷水射鹽神於陽石之山按今施州清江縣江水一名夷水一名鹽水原出清江縣西都亭山水經曰夷水别出巴郡魚復縣注云水色清照人十丈分沙石燭人見影以澄清因名清江板楯蠻後漢書曰板楯蠻者秦昭襄王時有一白虎常從羣虎數遊秦蜀巴漢之境傷害千餘人昭王乃募國中有殺虎者賞邑萬家時有巴郡閬中夷人能作白竹之弩乃登樓射殺白虎昭王嘉之以其夷人不欲加封乃刻石盟復夷人頃田不稅十妻不筭一戸免其一頃田之租稅雖有十妻不輸口筭之錢也傷人者論殺人得以倓錢贖死倓蠻夷贖罪貨也盟曰秦犯夷輸黄龍二雙夷犯秦輸清酒一鍾夷人安之又曰漢髙帝為漢王發夷人還伐三秦今巴中秦州秦地既定乃遣還巴中復其渠帥羅朴督鄂度夕龔七姓不輸租賦餘户乃嵗入賨錢口四十世號為板楯蠻夷閬中有渝水其人多居水左右天性勁勇初為漢前鋒數䧟陣俗喜歌舞喜音虛記切髙祖觀之曰此武王伐紂之歌也乃命樂人習之所謂巴渝舞也又曰靈帝光和中巴郡板楯蠻叛冦掠三蜀及漢中諸郡帝欲大發兵問益州計吏考以征討方略漢中上計程苞對曰板楯七姓射殺白虎立功先世復為義人其人勇猛善於兵戰昔安帝永初中羗入漢川郡縣破壊得板楯救之羗死敗殆盡故號為神兵羗人畏忌𫝊語種軰勿復南行至建和二年羗復大入實賴板楯連摧破之前車騎將軍馮緄南征武陵雖丹陽精兵之鋭亦倚板楯以成其功近益州郡亂太守李顒亦以板楯討而平之忠功如此本無惡心但長吏鄉亭更賦至重僕役箠楚過於奴虜闕庭悠逺不能自聞含怨呼天叩心窮谷邑落相聚以致叛戾非有謀主僣號以圖不軌今但選明能牧守自然安集不煩征伐也帝從其言遣太守曹謙宣詔赦之即皆降服北史曰自劉石亂後蠻族漸得北遷陸渾以南滿於山谷道武既定中山蠻王梅安率渠帥數千朝京求留質子以表忠欵拜安侍子豹為安逺將軍延興中太陽蠻首桓誕擁河水以北强葉以南八萬餘户内屬孝文嘉之拜誕東荆州刺史襄陽王誕字天生桓𤣥子也既内屬居朗陵王師南伐請為前驅討義陽不果而旋太和十七年蠻首田益宗率部曲四千餘户内屬襄陽蠻首雷婆思等十一人率千餘戸内徙求居太和川詔給廪食後開南陽全有沔北之地蠻人安堵不為盗賊宣武景明初大陽蠻首田育丘等二萬八千户内附詔制四郡十八縣魯陽蠻魯北燕等聚衆萬餘攻逼頻陽遣右衞將軍李崇討平之徙萬餘家於河北及六鎮尋叛南走所在追討比及河殺之皆盡正始二年梁沔東太守田清喜擁七郡三十一縣戸萬九千内附永平初東荆州太守桓叔與表前後招慰太陽蠻歸附者一萬七百戸請置郡十六縣五十詔前鎮東府長史酈道元檢行置之後二荆兩郢蠻大擾動斷三鵶路殺都督冦盗至於襄城汝水百姓多被其害連年攻討散而復合其暴滋甚又有冉氏向氏田氏陬落最盛餘則大者萬家小者千戸更相崇僣稱王侯屯據三峡斷遏水路荆蜀行人至有假道者周文畧定伊􅈆聲教南被諸蠻畏威靡然向風後唐州蠻任魯家叛自號豫州伯王雄等討平之尋而蠻帥冉令賢向五子王等反攻䧟白帝天和初開府陸騰討斬之以其骸骨於水邏城側為京觀後蠻蛋音但見輙大哭自此狼戾之心輟矣俚後漢書曰建武十三年九真徼外蠻里張游里蠻之别號今别呼為俚人率種人慕化内屬封為歸漢里君沈懐逺南越志曰晉康郡夫陙音純縣人夷曰􅀈尺世切其俗柵居實惟俚之域落南州異物志曰廣州南有賊曰俚此賊在廣州之南蒼梧欝林合浦寧浦髙凉五郡中央地方數千里徃徃别村各有長帥無君主恃依山險不用城自古及今彌厯年紀民俗惷愚唯知貪利無有仁義道理􅁟俗不愛骨肉而貪寶貨及牛犢若見賈人有財物水牛者便以其子易之夫或鬻婦兄亦賣弟若隣里有負其家債不時還者其子弟中愚者謂其兄曰我為汝取錢汝但當善殯葬我耳其處多野葛為鈎挽數寸徑到債家門下謂曰汝負我錢不肯還我今當自殺因食野葛而死債家門下其家便稱怨宗族人衆往債家汝不還我錢而殺我子弟今當擊汝債家慚懼因以牛犢財物謝之數十倍死家乃自收死者罷去不以為恨裴淵廣州記曰俚獠貴銅鼔唯髙大為貴面闊丈餘方以為竒初成懸於庭尅辰置酒招致同類来者盈門其中豪富子女以金銀為大釵執以叩鼔竟留遺主人名為銅鼔釵風俗好殺多構仇怨欲相攻撃鳴此鼔集衆到者如雲有是鼔者極為豪雄太平御覽卷七百八十五
