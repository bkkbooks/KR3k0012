  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_185-1a, image: WYG0894/WYG0894-0645a.png}
body:
  text: 太平御覽卷一百八十五宋李昉等撰居處部十三㕔事齋房庭階陛墀序廊塾壇屏扆宁㕔事郡國志曰廣州吳孫皓時以滕修為廣州刺史未至州有五僊人騎五色羊負五穀來迎而去今州㕔事梁上畫五僊人騎五色羊為瑞裴淵廣州記曰㕔事梁上畫五羊像又作五穀囊隨像懸之云昔髙固為楚相五年銜榖莖於楚庭於是圖其像廣州則楚分野故固圖像其瑞焉臨海記曰章安縣南門有赤蘭橋世傳成公綏作縣此橋上置㕔事縣令年長解㕔事神用生鹿其年活得白鹿還於㕔事上生以祭神仍遂食之歲時用焉自是以後白鹿不可復得而必須生鹿歴代相承迄今不絶世說曰庾太尉初渡江行路人有避雨者悉聚諸㕔事上征西車騎自譬遣之不肯去太尉新沐頭散髪髙詠從閣内出避雨者退莫有留者王郎與許靖書曰武皇帝於江陵劉景升㕔事上共論道足下至通夜不寐忘倦飢渴無已盧湛祭法曰凢祭法有廟者置之於座未遑立廟祭於㕔事也兩京記曰考功員外㕔有薛稷畫宋之問為讃工部尚書㕔有薛稷樹石為時所重齋王安成記曰太和中陳郡殷府君引水入城穿池殷仲堪又於池北小屋讀書百姓于今呼為讀書齋晉徵祥説曰桓𤣥鎮姑熟屋壁先畫作黄盤龍號為盤龍齋俄而𤣥敗將軍劉毅居之毅小名盤龍襄沔記曰金城内刺史院有髙齋梁昭明太子於此齋造文選焉鮑至云簡文為晉安王鎮襄陽日又引劉孝威庾肩吾徐防江伯操孔敬通惠子悦徐陵王囿孔鑠等於此齋綜覈詩集于時鮑至亦在數凡十人資給豐厚日設肴饌于時號為髙齋學士雍州記云髙齋其泥色甚鮮浄故此名焉南平世子恪臨川記云有甘露降此齋前竹林昭明太子於齋營集道義以時相繼又曰白土齋南道又一齋以栗為屋梁武帝臨州寢卧於此齋中常有五色雲迴轉狀如盤龍屋上恒紫雲騰起形似繖葢逺近望者莫不異焉梁武於此龍飛又曰髙齋東北有一齋名曰下齋次於髙齋制度壯麗極爽塏刺史辨決獄訟舊出此齋國史補曰梁武造寺命蕭子雲飛白大書一蕭字在焉李約自江淮竭産買歸於洛中匣於小亭號曰蕭齋房說文曰房室在旁也釋名曰房旁也室之兩旁也尚書大傳曰古后夫人將侍於君前息燭後舉燭至于房中釋朝服襲燕服然後入御於君毛詩黍離曰君子陽陽左執簧右招我由房漢書曰哀帝初即位躬行儉約省减諸用政事由已出朝廷翕然望治焉有詔問丞相大司空定陶恭王太后宜當何居孔光不欲命令帝旦夕相迎即議以為定陶王太后宜改築宫大司空何武曰可居北宫有紫房複道通未央宫後太后果從複道朝夕至帝所求欲尊稱貴寵其属使上以不得直道而行應劭漢官儀曰皇后稱椒房以椒塗壁主温煖除惡氣也酈善長水經注曰芑水出南山芒谷北流逕玉女房水側山際有石室世謂之玉女房郡國志曰葭萌縣玉女房昔有玉女入石穴空有竹數莖下有青石壇每因風恒自掃壇王子年拾遺記曰越欲滅吳蓄天下竒寳美人異味以進于吳殺三牲以祈天地殺龍以祀川海以江南億户民輸為傭保又選美女二人一名夷光一名脩明以貢於呉呉處之以椒華之房貫細珠為簾幌幌内竊窺者莫不動心驚魂謂之神人呉王妖惑怠於國政及越兵入乃抱二女逃於呉苑晉宫閤名曰洛陽宫内有義和温房十洲記曰崑崙山有紫翠丹房拾遺錄曰崑崙丹宻雲房東西千歩望之如丹霞尸子曰太山之中有神房阿閣楚辭曰姱容修態絙洞房又九歌曰桂棟兮蘭橑新夷楣兮葯房宋玉風賦曰主人女子乃更有蘭房奥室止臣其中庭說文曰庭朝中也尚書曰其有衆咸造勿䙝在王庭周易曰揚於王庭孚號有厲告自邑不利即戎利有攸往禮記曰諸侯之庭毛詩曰洒掃庭内又曰俟我于庭乎而又曰殖殖其庭又曰子有庭内弗洒弗掃又曰有瞽有瞽在周之庭左傳曰庭實旅百論語曰鯉趨而過庭曰學詩乎又曰孔子謂季氏八佾舞於庭是可忍也孰不可忍也周書曰成王四征不庭漢書曰王商為人多質有威重師古曰多質言不為文飾長八尺餘身體鴻大容貌絶人河平四年單于來朝引見白虎殿見丞相商坐未央庭中單于前拜謁商師古曰單于将見天子前經未央庭中過商起離席與言單于仰視商貌大畏之遷延却退天子聞言而歎曰真漢相矣晉書曰謝元字幼度少頴悟與從兄朗俱為叔父安所噐重安嘗戒約子姪曰子弟亦何豫人事而正欲使其佳諸人莫有言者元答曰譬如芝蘭玉樹欲使其生於庭階耳安恱說苑曰吳人伐楚申包胥告急於秦秦哀公曰諾固將圖之申包胥立哭於秦庭晝夜哭七日七夜不絶聲哀公曰有臣如此可不救乎興師救楚吳人引兵而還昭王反國欲封申包胥包胥辭曰救王非為名也功成受賜是賣勇也遂退而隠終身不見階釋名曰階梯也言有等差說文曰階陛也陛升階髙也除殿陛也阼主階也尚書曰舞干羽于兩階七旬有苗格禮記曰季氏之葬在西陛下又大傳曰天子阼階髙九尺又曰主人與客讓登主人先登客從之拾音陟級聚足連歩以上上於東階則先右足上於西階則先左足又曰夏后氏殯於東階之上則猶阼階也周人殯於西階之上則猶賔階也左傳曰石之紛如死於階下又曰衞孫林父來聘公登亦登論語曰没階趨進翼如也史記曰堯舜土階三等堂髙三尺三秦記曰明光殿以玉為階呂氏春秋曰周之明堂茅茨蒿柱土階三等以見儉節也文選詩曰紅藥當階飜蒼苔依砌上又曰阿閣三重階陛摯虞決要注云其制有陛石墄七則反右平平以文塼相亞次墄者為陛級也九錫之禮納陛以登謂受此陛以上殿靈光殿賦曰飛陛緣雲以上征蔡邕獨斷曰天子陳兵於陛故呼陛下用卑達尊之意也墀說文曰墀塗地也禮記曰天子赤墀漢書典職曰以丹漆地故曰丹墀漢書有白玉墀又曰曲陽侯王根僣作赤墀青璅司𨽻京兆奏根負鉞謝罪劉楨清慮賦曰駢雄黄以為墀序爾雅曰東西廂謂之序郭璞曰所以序别内外也犍為舍人曰殿東西堂序尊卑處廣雅曰反玷謂之序説文曰序東西牆也尚書顧命曰大訓在西序河圖在東序孔安國曰大訓唐虞書典謨也河圖八卦也王延夀魯靈光殿賦曰東序重深而奥秘廊周書作雒曰凡五宫明堂咸有重廊史記紂有䛕臣曰左强夸而目巧敎紂為象廊漢書曰武帝策茂才曰盖聞虞舜之時遊巖廊之上文穎注曰殿下外屋晉灼注曰堂邊曰巖峻之廊鄒緝之東陽記曰石步廊去敧山十里臨流虛構髙可數丈長三十丈可容百人坐韓子曰師曠為晉公清角一奏有雲從西北方起再奏大風而隨之裂帷幕破俎豆墮廊瓦平公懼伏于廊室西京記曰隋煬帝從東都至西京御道並作長廊枚乗七發曰連廊四柱臺城増構陸機與弟雲書曰聽說觀東作百丈許廊屋塾爾雅曰門側之堂謂之塾郭璞注曰東門堂尚書顧命曰先輅在左塾之前次輅在右塾之前禮記學記曰古之敎者家有塾白虎通曰所以必有塾何以飾門因取其名也明臣下當見於君先塾思其事也東觀漢記曰趙孝為郎每告歸往來常白衣歩檐過直上郵亭但稱書生寄止於門亭塾魏武制度奏曰三公列侯門施内外塾方十歩壇左傳注曰除地為墠築土為壇漢書曰蕭何薦韓信於髙祖擇日齋戒設壇拜為將軍莊子曰孔子遊乎緇帷之林休坐於杏壇之上弟子讀書孔子絃歌鼓琴奏曲未終有漁父者下船而來左手據􅂰右手拄頥以聽曲終而招子貢子路二人俱對客指孔子曰彼何為也子路曰魯之君子也徐靈期南岳記曰南岳山上有飛流壇懸水激石飛湍百仞即温伯所䘮身處也又有曲水壇水行石上成溝瀆如世臨河壇也三月三日時來逍遥梁州記曰沔陽城先沔陽縣所治也在漢水南舊蕭何所築劉備為漢王權住此城盟於城下今門外有盟壇猶存帝王記曰雍州有五畤壇漢武獲麟處屏爾雅曰屏謂之樹郭璞曰小牆當門中也犍為舍人曰以垣當門蔽為樹廣雅曰罘罳謂之屏說文曰屏蔽也釋名曰屏自障屏也蕭牆在門内蕭蕭也臣将入于此肅警之處也罘罳在門外罘復也臣将入請事于此復重思也禮記禮噐曰康圭䟽屏天子之廟飾也鄭𤣥注云屏樹也今謂之罘罳論語八佾曰或問管氏知禮乎曰邦君樹塞門管氏亦樹塞門管氏而知禮孰不知禮鄭𤣥注曰樹屏也又論語曰吾恐季孫之憂不在顓㬰而在蕭牆之内也蕭牆屏也漢書佞倖傳曰哀帝令将作為董賢起冢營義陵旁内為便房剛柏題湊外徼道周垣數里門闢罘罳甚盛又曰王莽傳曰莽性好時日小數及事逼急俱為厭勝遣使壊渭陵園門罘罳曰無使民復思漢也漢官典職曰省閣下大屏稱曰丹屏尚書郎含鷄舌香伏其下奏事晉書曰阮籍為東平相徹去屏障使内外相對孫卿子曰天子外屏諸侯内屏禮也外屏不欲見於外内屏不欲見于内也風俗通曰屏卿大夫以帷士以簾稍有以自障蔽也示臣臨見自整屏風處也呉越春秋曰越将伐吳越王命于夫人王背屏夫人向屏而立王曰自今日之後内政無出外政無入各守其職已盡其信内中辱者則是子外境千里辱者則是予也吾見子於是已明試矣王出宫夫人送王不過屏因反闔其門填之以土白虎通曰所以設屏何所以自障也示極臣下之故也天子徳大故外屛諸侯徳小所照見近故内屏扆爾雅曰户牖之間謂之扆郭璞注曰忩東户西也禮云斧扆形如屏風畫為斧文置扆北以其所名之耳尚書顧命曰設斧扆儀禮覲禮曰天子負扆南靣朝諸侯是升致命禮記明堂位曰天子負扆南靣而立宁爾雅曰門屏之間謂之宁郭璞注曰人君視朝門外立處也釋名曰宁佇也見君所宁立定氣之處也毛詩曰俟我於著乎而曲禮曰天子當宁而立諸公東面諸侯西面曰朝太平御覽卷一百八十五
