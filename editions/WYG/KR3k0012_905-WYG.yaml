body:
  text: 太平御覽卷九百五宋李昉等撰獸部十七狗下列子曰楊朱之弟曰布衣素衣而出天雨解素衣衣緇衣而反其狗迎而吠楊布怒將朴狗楊朱曰子無朴矣子亦猶是也向者使汝狗白而徃黑而來豈能無怪哉晏子春秋曰晏子短使楚楚人為門於犬門側延晏子晏子曰使狗國者従狗門入今使楚不當従此門入又曰景公走狗死公命外供之棺内給祭晏子諫不可公曰善韓子曰宋有酤者斗槩甚平遇客甚謹為酒甚美懸幟甚髙而酒不售而酸怪問長者楊青青曰汝狗惡也孺子懷錢挈壺徃酤輒有狗囓之猶大臣齕有道之士尸子曰齊有貧者命其狗為富命其子為樂方將祭狗入于室叱之曰富出祝曰不祥家果有禍長子死哭之曰樂乎而不自悲也隋巢子曰昔三苖作亂龍生於廟犬哭於市尹文子曰康衡長者字僮曰善搏字犬曰善噬賔客不過其門三年放是改之賔客復徃吕氏春秋曰齊有善相狗者其鄰藉之買䑕狗期年而得曰是良狗也其鄰畜之數年不敢噉䑕以吿相者曰此良狗也志在麞麋豕鹿不在䑕也欲其取䑕也則桎之其鄰桎其後足狗遂取䑕又曰齊有好獵者不得獸欲須良狗家貧不能得乃還疾耕疾耕則家富家富則有良狗有良狗則數得獸也獵常過人覇王亦然又曰楚文王得如黄之狗宛路之矰以畋雲夢三月不返保申跪而笞王出而自沉於澗而死王乃殺狗折矰又曰鄭子楊之難猘狗潰之子楊鄭相逐猘狗春秋亦云齊髙固之難失牛潰之逐失牛如逐猘狗也當其時狗牛猶可以為人唱而况乎以為人唱乎飢馬盈廐嗼然嗼無聲也未見蒭也飢狗盈宫嗼然未見骨也見骨與蒭動則不可禁淮南子曰削薄其徳増累其刑而欲以為治無以異於執弹而求鳥袖税而狎犬也又曰馬之死也剥之若槖槖治槖也雖含氣而形不可揺狡狗之死也割之猶蠕狡少也蠕動也又曰狂馬不觸於木猘狗不自投於河聾蟲不自䧟况人乎聾無知也淮南萬畢術曰取馬毛犬尾置之朋友夫妻衣中自相憎矣抱朴子曰陶犬無守夜之益瓦鷄無伺晨之警又曰甘始以駐年藥餌食新生鷄犬皆不長又以還白藥食白犬百日毛盡黒説苑曰梁相死恵子之梁渡河而遽墮船舡人救之問欲何之曰欲相梁船人曰子居舟楫之間而溺無我則死又安能相梁乎惠子曰居廣艘長􅀈之間我不如子至於安國家定社稷子何比我吾視子蒙蒙若未視之狗耳論衡曰亡獵犬於山林大呼犬名其犬則鳴號而應其主人犬異類聞呼而應者識其主也潛夫論曰一犬吠形百犬吠聲桓譚新論曰占仲子婢死有兒年四歳塟後數來撫循之亦能為兒浴頭其家人惡之以告方士方士有狗效之婢遂不復來又曰楊仲文家嫗死已歛未塟忽起坐棺前牀上飲酒醉而狗形見殺之風俗通曰殺狗磔邑四門俗云罽賔犬善守衛著以辟惡又曰太史公記云秦始殺狗磔四門以禦蟲災今人殺白犬以血題門戸曰正月白犬血辟除不祥又曰殺犬磔禳犬者金畜也禳者却也却金使不害也又曰桂陽太守汝南李叔堅少時為従事在家狗如人立行家人言當殺犬叔堅云犬馬喻君子狗見人行傚之何傷堅見縣令還解冠榻上狗戴持走家大驚堅復云悞觸冠冠纓挂着之耳狗於灶前助火家益怔營堅復云兒婢皆在田中狗為助火幸可不煩類若此有何惡語相罵不言無狗怪耶狗何能作怪遂不肯殺後數日狗自暴死卒無􅊏芥之異叔堅辟太尉掾固陵長原武令終享大位金樓子曰入名山牽白犬抱白鶴山神大喜芝草及寳玉等自出又曰王思微性好淨潔左右提衣悉令白紙裏手指在宅有犬汙柱思微令門生洗之意猶不已更令刮削復言未足遂令易柱洞林曰揚州従事慎曜伯婦病因經日發作有時如聞物徃来者其兄周彦武令吾作卦得蹇身在戊戌與坎鬼并卦中當往従東北田家市黑狗畜之以代人任患如其言無㡬時狗便死復更養如前凡三過養輙皆吐血而死婦亦病死雜五行書曰白犬虎文南斗君畜之可致萬石也黑犬白耳大王犬也畜之令富貴黑犬白前兩足宜子孫白犬黄頭家大吉黄犬白尾代有衣冠黄犬白前兩足利人𤣥中記曰昔髙辛氏犬戎為亂帝言曰有討之者妻以美女封三百户帝之狗名槃瓠亡三月而殺犬戎以其首来帝妻以女流於會稽東南得海中土三千里封之生男為狗生女為美人封為狗氏國干寳捜神記曰槃瓠者本髙辛氏宫中老婦人有耳病醫者挑治之有物大如繭以瓠離盛之以槃覆之有頃化為犬其文五色因名槃瓠辛氏三秦記曰有白鹿原周平王時白鹿出此原原有狗枷堡秦襄公時有天狗来其上有賊天狗吠而䕶之一堡無患涼州異物志曰大狗如馿希見其牙周處風土記曰犬則青鸇白雀飛龍虎子馴良警㨗難狎易使述異記曰濟陽山有麻姑仙處俗説山上千年則金雞鳴玉犬吠漢末皆曰淮南王昇仙其處雞鳴天上犬吠雲中又曰朱休之家犬歌曰言我不能歌聼我歌梅花今年故復可明年當奈何家殺犬明年並死又曰宋元嘉中吳縣中都里石元度家有黄犬生白雄子母愛其子異於他犬常銜食飼之子成大狗子每出獵未反母輙門外望之元度久患病𠻳轉就危困醫為處湯須白犬肝市索卒不得乃殺所養白狗以供湯用母向子死處跳踊嘷呼倒地不起累日不息其家煮狗肉與客共食投骨於地母輙啣置窟中食畢移入後園大桑樹下掘土埋之日向樹嘷喚月餘乃止元度漸劇臨死屢言湯不救命悔恨殺狗其弟法度従此終身不食狗肉又曰陸機少時頗好遊獵在呉豪盛客獻快犬名曰黄耳機往仕洛常將自隨此犬黠慧能解人語又嘗借人三百里外犬識路自還一日至家機覊官京師久無家問機􅃧語犬曰我家絶無書信汝能賫書馳探消息否犬喜揺尾作聲應之機試為書盛以竹筒繫之犬項犬出驛路疾走向吳飢入草噬草取飽每經大水輙依渡者掉尾向之其人憐愛因呼上船裁近岸犬即騰上速去如飛逕至機家口銜竹筒作聲示人機家開筒取書看畢犬又向人作聲如有所求其家作答仍馳還洛計人程五旬而犬往還纔半月後犬死殯之遣送還家葬機村南去機家二百歩築土為墳村人呼為黄耳塜異苑曰東海何澹之隆安初屢入闗中後還得一犬犬壯非常每行来輙已知處澹之後抱疾犬亦疾及其亡也犬一嘷而斃神仙傳曰李仲甫者能隱形初隱百日一年復見形後遂長隱但聞其聲與人對接酒食如常有諸張欲従學甫云卿性急未中教張守之至費用五十疋了無所得張乃大怒遂懷匕首而徃先與仲甫語畢因依聲左右斫之甫已在他牀笑云天下乃當有汝曹愚人學道未得而殺人也我寧可得殺我真得殺汝但癡頑不足問耳使主人呼一犬来着諸張前看能殺之否俄而犬頭在地犬腹已破叱諸張下地叩頭乃止遂不教之列仙傳曰䢴子者自稱蜀人好放犬走入山穴䢴子隨十餘宿行度數百里出山頭上有殿屋官府松樹仙人吏使甚嚴見其故妻主洗魚與䢴子符一函并藥便使還與成都令橋君發函皆魚子也養之一年皆為龍形復送符上山犬色更赤有長翰常随䢴子往來百餘年遂留山上時下來䕶其宗族蜀人立祠於穴口常有鼓吹傳呼聲捜神記曰山陽王瑚字孟璉為東海蘭陵令夜半時輙有黑幘白單衣吏詣縣扣閣近之則忽然不見如此數年後令伺之見一老狗黑頭白軀至閣便為人以白孟璉殺之乃絶又曰鄱陽趙壽有犬蠱時陳岑詣壽忽有大黄犬六七羣出吠岑又曰東越閩中有庸嶺其隙中有大蛇長七八丈大十餘圍嘗八月送童女至蛇穴輙吞之噉九女時樂縣李誕有小女名寄應募而行乃請好劒及咋蛇犬詣之至則放犬咋蛇以劒擊之越王竒之聘以為后續捜神記曰林慮山下有亭每過宿者或病或死常云有十餘人男女合雜衣或黑或白蒲摶相戯有郅伯夷者過宿明燭而坐誦經至中夜其怪復集伯夷以燭照之乃羣狗也因陽以燭悞灼其衣作燃毛氣乃以刀刺之遂死餘犬悉走去又曰晉穆哀之世領軍司馬濟陽蔡詠家犬夜羣相吠伺之見一物着黄衣白帢為衆犬所吠打殺之乃詠家老黄犬又曰晉太和中廣陵楊生養狗甚憐愛之行止與俱後生飲酒醉行經大澤草中眠不能動時冬月有野火起風又猛狗周章號喚生醉不覺前有一坑狗便走徃水中還以身壓生左右草沾濕着地火尋過去生方醒他日又闇行墮空井中犬呻吟徹曉須臾有人遥過怪犬向井號徃視見生生曰君可出我當厚報君人問以何物見與生云唯君耳人曰以狗見與便相出生曰此狗曽活我於已死不得相與他物任君人曰若爾便不能相出狗因下頭目井生知其意乃語路人以狗相與乃出之繫狗而去後五日狗夜走還又曰會稽人張然滯役經年不歸婦遂與奴私通然養一狗名曰烏龍後歸奴與婦謀欲殺然狗注精䑛脣視奴咋其隂奴失刀杖倒地然因殺奴以婦付縣殺之幽明録曰晋太興二年呉民華隆生好獵養一快犬號曰的尾常將自隨隆後至江邉伐荻暫出渚次為大蛇圍繞周身犬還便咋蛇蛇死隆僵仆無所知犬徬徨涕泣走還船復反草中同伴怪所以随徃見隆悶絶將歸家二日犬為不食隆復蘇乃始進飯隆逾愛惜之同於親戚後忽失之二年尋見犬在顯山嶺表録異曰常有人自青社泛海歸閩為惡風所飄五日夜不知其㡬千里也經一處同船有新羅人云是狗骨國逡廵果如犬躶形抱頭而出見船驚走楚辭九辨曰豈不鬰陶而思君兮君之門以九重猛犬唁唁而迎吠兮關梁閉而不通魏賈岱宗大狗賦曰其頭顱也不可論以盡其骨法也不可辨而釋傞湸蹴蹌雄姿猛相兀然髙八九尺毛踰紫艶光雙眉如白璧時頻伸而振􅌺若蛟龍之騰擲爪類刀戈牙如交㦸西晉傅𤣥走狗賦曰骨相多竒儀表可嘉足懸鈎爪口含素牙首類驤螭尾如騰蛇脩頸濶腋廣前消後豐顱促耳長舌緩口舒節急筋豹耳龍形蹄如結鈴五魚體成勢似凌青雲月若泉中星轉視流光朱曜赤精霞如黄而慴朱鵲兮越妙古而掦名大平御覽卷九百五
