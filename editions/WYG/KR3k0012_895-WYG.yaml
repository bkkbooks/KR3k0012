body:
  text: 太平御覽卷八百九十五宋李昉等撰獸部七馬三晉書曰王濟善解馬性嘗乗一馬著連乾鄣泥前有水終不肯渡濟云此必是惜鄣泥使人解去便渡故杜預云濟有馬僻又曰王師敗於蕩隂嵇紹被害初紹之行也侍中秦準謂曰今日向難卿有佳馬否紹正色曰大駕親征以正伐逆理必有征無戰若使乗輿失守臣節有在駿馬何為聞者莫不歎息載記曰慕容廆有駿馬曰赭白有竒相逸力石季龍之伐棘城也煌將出避難欲乗之馬悲鳴踶齧人莫能近煌曰此馬見異先朝孤常仗之濟難今不欲者盖先君之意乎乃止季龍尋退煌益竒之至是四十九嵗矣而駿逸不􅃜又曰苻堅遣使西域稱揚堅之盛德並以繒綵賜諸國王於是朝獻者十有餘國大宛獻天馬千里駒皆汗血朱鬛五色鳯膺麟身及諸珍異五百餘種堅曰吾思漢文之返千里馬咨嗟美詠今獻馬其悉返之庶克念前王髣髴古人矣乃命羣臣作止馬詩而遣之示無欲也又曰武昭王暠字𤣥盛少而好學性沈敏寛和美器度通涉經史尤善文義及長頗習武藝誦孫呉兵法嘗與吕光太史令郭黁及其同母弟宋繇同宿黁起謂繇曰君當位極人臣李君有國土之分家有騧草馬生白額駒此其時也吕光末年弑段業自稱凉州牧以燉煌太守趙郡孟敏為沙州刺史署𤣥盛効榖令尋卒燉煌䕶軍馮翊郭謙沙州治中燉煌索仙等以𤣥盛溫毅有惠政推為寧朔將軍燉煌太守𤣥盛初難之會宋繇仕於業告歸燉煌言於𤣥盛曰兄忘郭黁之言耶白額駒今已生矣𤣥盛乃従之又曰庾亮所乗馬的顱殷浩以為不利勸賣之亮曰曷有己之不安移於人乎晉中興書曰恭帝之為琅琊王好竒戲閉一疋馬於門内令人射之欲觀幾箭而死左右曰馬國姓而射之不德甚矣乃止俄而桓𤣥􅆲位續安帝紀曰司馬休之奔廣固慕容超有欲害心而休之不知休之常所乗騅馬於牀前養飼忽連鳴不食注目視鞍休之試披之不動也訖還牀坐馬又驚跳因試騎視馬即驟出裁至門外奔而馳之行十餘里休之顧望所住已有兵至乗馬南奔殆而獲免後還荆州加騅馬揚武之號王隱晉書曰馬龍子咸為成都王前鋒長沙王所統冠軍司馬王湖率衆討咸於馬市咸堅不動湖乃使數十騎下馬縛㦸於鞍而令向咸又使數十騎各郟所放馬馬驚奔咸軍軍壊湖因馳逐猛戰臨陣斬咸于寶晉紀曰桓範出赴曹爽宣王謂蔣濟曰智囊徃矣濟曰智則智矣駑馬戀芻豆爽必不能用也鄧粲晉紀曰王湛有隱德兄弟宗族皆以為癡居墓次不交當世兄子濟性好馬所乗駿快意甚愛之湛曰此馬雖快力薄不堪苦近見督郵馬當勝此濟不然之取督郵馬榖食十數日與湛試之湛未嘗乗馬率然便騎馳騁步驟不異於濟而馬不相勝湛曰直行平地何以别馬唯當於蟻封於是就蟻封試馬濟馬果躓濟乃服崔鴻十六國春秋曰驍騎將軍吕光封西域還上疏曰唯龜兹據三十六國之中制彼王侯之命入其國城天驥龍麟腰䮍丹髦萬計盈廐雖伯益再生衞賜復出不能辦也又曰太康四年髙麗使至獻美女十人千里馬一疋兖州民王滿率衆二千來降獻馬一疋羊鬚去地九寸拜滿長水校尉廪邱公宋書曰宋大明五年吐谷渾拾寅遣使獻善舞馬沈約宋書曰鮮卑二子長曰吐谷渾少曰若洛廆若洛廆别為慕容氏渾庻長廆正嫡父在時分七百户與渾渾與廆二部俱牧馬馬鬭相傷廆怒讓渾渾曰鬭在馬而怒及人耶乖别甚易今當去汝萬里於是擁馬西行廆悔悟深自責遣舊父老及長吏乙那樓追渾令還渾曰我是卑庶理無並大今以馬致别殆天所啓諸君試擁馬令東馬若還東我當相隨去即使二十騎共遮馬令迴馬迴不盈三百步欻然悲鳴西走聲若頽山如是者十餘迴又曰劉瑀為右衞將軍年位本在何偃前孝武初偃為吏部尚書瑀圖侍中不得與偃同従郊祀時偃乗在前瑀策駟在後相去數十步瑀蹋馬及之謂偃曰君轡何疾偃曰牛駿馭精所以疾耳偃曰君馬何遲曰騏驥羅於羈絆所以居後偃曰何不着鞭使致千里荅曰一蹙造青雲何致與駑馬争路蕭子顯齊書楊玉夫殺宋蒼梧玉將首與王敬則敬則送太祖夜乘常所騎赤馬入殿及踐祚號此馬為龍驤將軍後魏書曰高肇字首文文昭皇太后之兄也大舉征蜀以肇為大將軍都督面辭世宗於東堂親奉規略是日肇所乘駿馬停於神虎門外無故驚倒轉卧渠中鞍具瓦解人咸怪異肇辭出見而惡焉世宗崩肇還髙陽王與領軍于忠遣壯士殺之後周書曰于謹嘗率騎追茹茹前後十七戰盡降其衆嘗為賊所圍謹乗駿馬一紫一騧賊所先識乃使二人各乘馬突陣賊以為謹也皆争逐之謹乃入塞三國典略曰西魏孝武將為齊太祖所殺孝武索所乘波斯騮馬命太宰南陽王躍之將舉其鞍馬蹶而死帝惡之日晏還宫至後門馬驚不前捶之鞭折入謂潘彌曰今日幸無他不又曰髙歡歸朱爾榮劉貴事榮盛言歡美榮未之竒也歡更衣服重裘見焉因隨榮之廐廐有惡馬榮命剪之歡不絆剪竟不蹄齧己而起曰凡御惡人亦如此矣榮方坐歡於牀下屏左右而訪時事歡曰聞公有馬十二谷色别為羣將此竟何用也榮曰且言爾意歡曰方今天子愚弱左右淫亂四方雲擾朝政不行以明公雄武乘時奮發但將討鄭儼徐紇為辭舉鞭足以定天下此是賀六渾意榮大悦曰爾意即我意也自是每參軍謀又曰齊盧潛與特進慕容儼善儼之將死謂其子曰盧尚書教我為人我死之後將吾騂馬與之其子遂以他馬與潛儼死出𦵏柩停不肯進巫祝為儼聲曰盧尚書教我為人我以騂馬許之我死之後何意不與子懼而更之喪乃行潜以馬價為儼營福又曰齊馮子琮被執於省内以弓絃絞殺之使内㕘以庫車載其尸歸人無知者子琮所乘之馬曳韁走以頭扣車狀如號哭見者異之車至其門諸子方握槊聞庫車來以為賜也大喜開視乃哭又唐貞觀中骨利幹遣使朝貢太宗遣雲麾將軍康蘇宻徃慰撫之仍列其地為𤣥闕州俄又遣使隨蘇宻使入朝獻良馬十疋太宗取其異者為之制名號為十驥一曰騰霜白二曰皎雪驄三曰凝露驄四曰懸光驄五曰决波騟六曰飛霞驃七曰發電赤八曰流金鍋九曰翔麟紫十曰奔虹赤又為文以叙其事又曰永徽中吐谷渾河源郡王慕容納遣使獻駿馬上問其馬之種性對曰臣國中之最者所以獻之上曰馬人之所欲豈可輟彼不足而加我之有餘哉乃命却之又曰永徽中駮馬國遣使朝貢其地在突厥之北漸近北海去京師一萬四千里户十萬勝兵三萬人馬三十萬疋馬色並駮故以為名又曰開元十二年太原獻異馬駒其耳如筒左右各十六肋無尾又曰天寶中隴右節度皇甫惟明奏龍支縣人庫狄孝義有馬生龍駒經九旬有九日身有麟而不生毛臣就檢視時有慶雲五色遥覆馬上久而不散伏望宣付史官以為實録従之又曰吐火羅國有頗梨山南崖穴中有神馬國人牧牝於側時産名駒皆汗血焉又曰李懐逺雖久居榮位而𢎞尚簡率其園宅無所改作嘗乘欵叚馬左僕射豆盧欽望謂曰公榮貴如此何不買駿乘荅曰此馬幸免驚蹶無假别求聞者莫不嘆美周史曰徐台符仕晉為翰林學士中書舍人契丹之陷中原也台符従敵帳北至於薊門及戎人内潰乃竄身南歸初台符所乘馬好嘶鳴及自北方囬常露宿於草中塞馬連羣經其左右而台符馬若箝其口然及行至漢地即嘶鳴如故時人謂為積善之所致也又曰齊王北伐太保領太僕安定王賀拔仁馬遲不及前鋒齊王讓之仁對曰御馬超逸羣下不逮齊王大怒免為庻人命之負炭輸於晉陽又曰周裴果字戎昭魏齊州刺史遵之子也従軍征討乘黄驄馬衣青袍毎先登陷陣時人號為黄驄年少又曰周賀若敦與侯􅖰相拒敦軍數有叛人乘馬投􅖰者輒納之乃别取一馬牽以赴船船中逆以鞭鞭之如是再三馬便畏船不上後伏兵於岸招瑱瑱遣兵迎接競來牽馬敦發伏兵掩之盡殪後有亡命奔瑱者猶謂為詐不復納焉又曰梁普通中童謡言有云青絲白馬者侯景乃常乘白馬以青絲為勒用應謠言陳書曰初有童謠曰黄斑青驄馬發自夀陽涘來時冬氣末去日春風始其後陳主果為韓擒虎所敗擒虎黄斑之謂也破建康之始復乘青驄馬徃反時節皆相應隋書曰吐火羅國有穴山中出神馬毎嵗牧牝馬於穴所産必名駒又曰吐谷渾有青海周回千餘里中有小山其俗至冬輙放牝馬於其上言得龍種嘗得波斯草馬放入海因生驄駒日行千里故特稱青海驄馬又曰長孫晟従晉王破突厥王大喜引晟入内同宴極歡有突厥達官來預坐説言突厥之内大畏長孫總管聞其弓聲謂為霹靂見其走馬稱為閃電王笑曰將軍震怒威行域外遂以雷霆為比一何壯哉唐書曰貞觀十三年三月乙巳吉辰廐産白馬朱鬛太平御覽卷八百九十五
