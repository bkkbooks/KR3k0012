body:
  text: 太平御覽卷九百十七宋李昉等撰羽族部四鴈五色鴈白鴈雉白雉射雉鴈禮記曰孟春之月鴻鴈來季秋之月鴻鴈來賔季冬之月鴈北鄉儀禮婚禮曰下達納采用鴈又士相見曰大夫相見以鴈飾以布維之以索而執雉又聘禮曰私覿出如舒鴈威儀自然而有行列舒鴈鵞左傳曰昭元鄭徐吾犯之妹美公孫楚聘之矣公孫黒又使強委禽焉毛詩曰雍雍鳴鴈旭日始旦尚書舜典曰修五禮五王三帛二生一死贄爾雅曰鳬鴈醜其足蹼郭璞曰脚指間有幕蹼相連也春秋說題辭曰鴈之言鴈鴈起聖以招期知晩蚤故鴈南北以陽動也鴈鴈音聲貌也聖上聞鴈鴈有音聲知為時節鴈為隨日南以常動春秋繁露曰凡贄大夫用鴈有類長者在民上必有先後鴈有行列故以為贄廣雅曰􅕯鵞㑹􅕯鴈也周書曰白露之日鴻鴈來鴻不來逺人皆畔小寒之日鴈北鄉鴈不北鄉民不懷史記曰蘇武在匈奴中昭帝遣使通和常惠夜見漢使使謂單于曰天子射上林中得鴈足有係帛書言武等在某澤中使者如其言單于大驚乃遣武還漢書曰梁孝主於睢陽園中作鳬鴈池又曰武帝太始三年幸東海獲赤鴈作朱鴈之歌後漢書曰度遼将軍皇甫規解官歸安定鄉人有以貨買鴈門太守者亦去職還家書刺謁卧不迎既入而問卿前在郡食鴈美乎北史曰齊斛律光從文襄出野見鴈雙飛來文襄使明月馳射之以二矢俱落焉又曰尉遲迥之亂也隋将史萬歳從梁士彦擊之軍次馮翊見羣鴈飛來萬歳謂士彦曰請射行中第三者射之應弦而落三軍莫不恱服三國典畧曰徐思王夀陽人家本寒㣲以捕鴈為業晉史曰朱漢賔少時善射嘗因與同輩出獵指一飛鴈隨矢而落其鏃正中其臆臆上貫一金錢有篆文示其郡之碩學皆無識者人甚異之由是人皆號為朱落鴈莊子曰荘子行於山中見大木伐木者止其傍而不伐問其故曰無所用荘子曰此木以不材得終其天年出於山及邑舍故人家故人嘉具酒肉令豎子殺鴈烹之豎子請曰其一鴈能鳴其一不能鳴奚殺主人公曰殺不能鳴者明日弟子問曰昨日山中之木以不材得終其天年主人之鴈以不材而死先生何處焉荘子笑曰周將處夫材與不材之間淮南子曰夫雁從風飛以愛氣力銜蘆而翔以備弋繳山海經曰鴈門山鴈出其間在髙桺北家語曰孔子之衛衛公與孔子語見飛鴈過而仰視之色不在孔子孔子乃逝賈誼書曰鄒穆公令食邉鴈必以秕無敢以粟說苑曰秦穆公得百里奚公孫友歸取鴈以賀曰吾得社稷之臣敢賀社稷之福公不辭再拜而受又曰齊晏子對景公曰君之鳬鴈食以菽粟又曰大夫以鴈為贄鴈者有長幼之禮士以雉雉者取不可狎服庶人以鶩鶩以其無他也白虎通曰贄用鴈者取隨時南北不失其節明不奪女子之時揚雄方言曰自闗而東謂鴈􅕯鵞南楚之外謂之鵞或謂之倉􅕯博物志曰鴈食粟則翼重不能飛㑹稽典録曰虞固字季鴻少有孝行為越南太守常有雙鴈止宿㕔事上每出行縣輒飛逐車卒官鴈逐器還至餘姚住墓前歴二年乃去梁州記曰梁州縣界有鴈塞山傳云北山有大池水鴈棲集之因名曰鴈塞盛𢎞之荆州記曰鴈塞北接梁州汝陽郡其間東西嶺屬天無際雲飛風翥望崖迴翼唯一處為下翔鴈達塞矯翼裁度故名鴈塞同於鴈門也鄧徳明南康記曰平固縣有覆笥山上有湖周迴十里有一石鴈浮出湖中每至秋天石鴈飛鳴如候時也十三州記曰上虞縣有鴈為民田春銜拔草根秋啄除其穢是以縣官禁民不得妄害此鳥犯則有刑無赦荆州圖記曰沮陽縣西北有鴈浮山是山經所謂景山也髙三十餘里周迴三百里修巖遐亘擢幹干霄鴈南翔北歸偏經其上士人由兹改山名焉五色鴈漢書郊祀志宣帝於西河築世宗廟告祀有五色鴈集殿前唐書曰貞元十年同州獻五色鴈白鴈左傳曰哀七年曹伯陽即位好田弋曹鄙人公孫彊好弋獲白鴈獻之且言田弋之說說之因訪政事大說之有寵使為司城以聽政新語曰梁君出獵見白鴈而欲自射之道上有驚鴈駭者梁王怒命以射此人其御公孫龍諫曰昔衛文公時大旱三年卜云必湏人祀文公曰求雨者為民也今殺之不仁吾自當之言未卒雨下今君重鴈殺人何異虎狼梁君引龍登車人呼萬歳曰善哉今日獵得善言晉書載記曰建元初石季龍饗羣臣于大武殿前有白鴈百里集馬道前季龍命射之無所獲雉春秋運斗樞曰機星散為雉周禮春官大宗伯曰士執雉鄭𤣥注曰取其守介不失節儀禮士相見曰士相見之禮贄用雉禮記曲禮下曰祭宗廟雉曰疏趾又月令曰孟冬雉入水為蜃又曰季冬之月雉雊雞乳左傳昭四曰郯子云丹烏氏司閉五雉為五工正杜預注曰丹烏驚雉者立秋來立冬去入水為蜃五雉今有五種也又曰叔孫豹奔齊齊庾宗婦人獻以雉問其姓曰予子長矣能奉雉而從我矣毛詩􅆁柏舟曰雄雉刺衛宣公滛亂不恤國政也雄雉于飛泄泄其羽我之懷矣自貽伊阻雄雉于飛下上其音展矣君子實勞我心又曰有瀰濟盈有鷕雉鳴又曰如翬斯飛君子攸躋又節小弁曰雉之朝雊尚求其雌又甫田車牽曰瞻彼中林有集惟鷮毛詩義疏曰林慮山下人語曰四足之美有鹿兩足之美有鷮周易鼎卦九三曰鼎耳革其行塞雉膏不食方雨虧悔終吉又旅卦六五曰射雉一矢亡終以譽命又曰離為雉尚書曰日月星辰山龍華蟲華蟲雉也五色故曰華也又曰髙宗祭成湯有飛雉升鼎耳而雊論語曰山梁雌雉時哉時哉子路拱之三臭而作爾雅曰鸕諸雉即雉鷂雉青質五色鷮雉長尾走且鳴鳪雉黄色鳴自呼鷩雉似山雞而小冠背毛黄腹赤頂緑色鮮明秩秩海雉如雉而黒出海中山鸐山雉尾長者也雗雉鵫雉今曰翰江東呼白翰亦名白雉伊洛而南素質五采皆備成章曰翬翬亦雉屬言其毛色光鮮江淮而南青質五采皆備成章曰鷂即鷂雉也南方曰􅔧東方曰鶅音緇衣之緇北方曰鵗音希西方曰鷷說四方之雉也也音所旬切雉之暮子為鷚晚生者也呼少雉為鷚尚書大傳曰武丁祭成湯有雉飛升鼎耳而雊問諸祖已祖已曰雉者野鳥也不當升鼎今升鼎者欲為用也逺方將有來朝者乎武丁思先王之道編髪重譯至者六國周書曰立冬之日水始氷後五日雉入大水為蜃小暑後十日雉始雊史記曰秦文公獲白石于陳倉北阪城祠之蘇林注曰白質其實其神或歳不至或歳數來來常以夜光若流星從東南集於祠城則若雄雞如淳注曰野雞雉也吕后名雉故曰野雞漢書曰成帝鴻嘉二年有飛雉集于殿庭歴階升堂而雊東觀漢記曰魯恭字仲康為中牟令螟蝗不入中牟河南尹袁安疑其不實乃遣郡掾肥親驗之恭隨親行阡陌坐樹下雉過止其側旁有小兒親曰兒何不捕之兒言雉將雛親嘿然有頃與恭訣曰本來考君界有無蟲耳今蟲不犯境一異也化及鳥獸二異也童子有仁心三異也府掾久留但擾賢者因還府以狀白安魏志曰管輅至王𢎞直時有雄雉飛來登直内柱頭大不安令輅作卦輅曰五月必遷時三月也至期果為渤海太守晉咸寧起居注曰太醫司馬程據上雉頭裘一領詔於殿前燒之晉書曰武庫封閉甚宻其中忽聞雉雊張華曰此必蛇化也開視之雉側有蛇蛻焉又曰涼武昭王暠卒子歌立春有雙雉飛出宫内北史曰後魏裴安祖閒居養志不出道上㑹天熱舍於樹下有鷙鳥逐雉急投之遂觸樹而死安祖愍之乃取置隂地徐徐護視良久得蘇喜而放之後夜忽夢一丈夫衣冠甚偉著繡曲領向安祖再拜安祖怪問之此人云感君前日見放故來謝徳聞者異焉三國典畧曰齊髙緯如晉陽穆后將從辭胡太后于北宫有雉集于御牀有司獲之不敢以聞又曰梁臨賀王正徳其妹長樂公主太子家令謝悽之妻也姿容國色恱而通之生子二人乃燒主第投婢於火詐言主死黄門郎張凖有雉媒正徳見而奪之準於重雲殿法㑹所罵之曰張準雉媒非長樂公主何可略奪太子綱恐梁主聞遣武陵王紀急相解喻準罵乃止正徳既出以雉還之山海經曰小華之山其鳥多赤鷩可以禦火孟山鳥多白雉荘子曰澤雉十步一啄百步一飲不畜於樊中尹文子曰楚人擔山雉者路人問曰何鳥也欺之曰鳳皇也路人曰我聞鳳皇今始見矣汝販之乎請買十金弗與請加倍乃與之方欲獻楚王經宿鳥死路人不遑惜其金唯恨不得獻王王聞之感其欲獻已召厚賜之過買鳥之金十倍抱朴子曰雞有專栖之雄雉有擅澤之鷮蟻有兼弱之智蜂有收窠之計人相役御亦猶是耳廣雅曰野雞雉洪範五行傳曰正月雷微動而雉雊雷通氣也楚辭曰彭鏗斟雉帝何饗鏗彭祖也好和滋味斟白雉羮以事堯堯羮而饗食之列異傳曰秦穆公時陳倉人掘地得物若羊非羊若猪非猪牽以獻諸公道逢二童子童子曰此名為媪常在地食死人腦若欲殺之以柏捶其首媪復曰彼二童名為陳寳得雄者王得雌者覇陳倉人捨媪逐二童子童化為雉飛入平林陳倉人吿穆公穆公發徒大獵果得其雉又化為石置之汧渭之間至文公為立祠名陳寳雄雉飛南集今南陽雉縣其地也秦欲表其符故以名縣每陳倉祠時有赤光長十餘丈從雉縣來入祠中有有聲如雄雉揚雄琴清英曰雉朝飛操者衛女傅母所作也衛侯女嫁於齊太子中道太子死問傅母曰何如傅母曰且往當䘮畢不肯歸終之以死傅母悔之取女所自操琴於塜上鼓之忽有二雉俱出墓中傅母撫雌雉曰女果為雉耶言未畢俱飛而起忽然不見傅母悲痛援琴作操故曰雉朝飛琴操曰齊獨沐子年七十無妻出見飛雉雌雄相隨感之撫琴而歌曰雉朝飛鳴相和雌雄羣逰於山阿蕭廣濟孝子傳曰蕭芝忠孝除尚書郎有雉數十頭飲啄宿止當上直送至岐路下直及門飛鳴車側璅語曰有鳥從西方飛來白質五色皆備集平公之庭相見如讓公召叔嚮問之叔嚮曰吾聞師曠曰西方有白質鳥五色皆備其名曰翬南方赤質五色皆備其名曰揺其來為吾君臣其祥先至矣博物志曰翟雉畏雨雪惜其毛栖髙樹之上不敢下食往往餓死徐廣車服注曰天子金根車馬上插以翟毛皇后法駕乗重翟羽盖崔豹古今注云有雉尾扇宣騐記曰野火焚山林中有一雉入水濆羽飛故滅火往來疲乏不以為苦白雉春秋感精符曰王者旁流四表則白雉見孝經援神契曰王者徳至鳥獸故雉白首妃房不徧故曰雉應又曰周成王時越裳獻白雉去京師三萬里王者祭祀不相踰宴食衣服有節則止抱朴子曰白雉自有雉種南越尤多按地域圖今之九徳則古之越裳也盖白雉之所出周成王所以為瑞者貴其所自來之逺明其徳化所被之廣非謂此為竒楚辭曰昭后成逰南土愛底厥利惟何逢彼白雉漢書曰平帝元始元年春越裳重譯獻白雉一黑雉二詔使三公以薦宗廟魏略曰文帝欲受禪郡國奏白雉十九見魏志文紀曰延康元年四月饒安縣言白雉見北史曰後魏南安王禎孝文時為雍州刺史性忠謹其母疾篤憂毁異常遂有白雉逰其庭前帝聞其孝感賜帛千疋以褒美之三國典略曰渤海王髙歡攻鄴時瑞物無歳不有令史焚連理木煮白雉而食之射雉左傳曰賈大夫娶妻而美三年不言不笑御以如臯為妻御也如臯澤也射雉而獲之其妻始笑而言魏志曰太祖才力絶人於南皮一日射雉獲六十三頭江表傳曰孫權數射雉潘濬諌權權曰時特暫出耳不復如往日濬曰天下未定萬機多務射雉非急弦絶括破皆能為害濬乃手自撤壞雉翳權由是遂絶不復射雉呉志曰孫休銳意於典籍欲畢覽百家之言大好射雉春夏之間常出夜還唯此時捨書宋書曰孝武帝常出射雉值雨侍中沈懐文諌曰非止千乗失容亦乃聖躬櫛沐沈約宋書曰明帝與晉平王休祐於岩山射雉有一雉不肯入場日暮將反留休祐射之語云不得雉勿歸因遣夀寂之等諸壮士逐之日已欲闇與休祐相及遂拉殺之又曰劉撝與蕭道成同從宋明帝射雉郊野渇倦撝得早青𤓰與上對剖食之齊書曰武帝好射雉竟陵王子良啟諫先是左衛殿中将軍郎鄲超諫射雉武帝為止久之承明末上将射雉子良復諫又曰蕭景先轉中領軍車駕射雉郊外景先帶甲杖從廉察左右又曰蕭敏為新安太守好射雉未嘗在郡辭訟者遷於畋焉後張弩損腰而卒又曰桓僖伯少負氣豪俠妙解射雉尤為武帝所重又曰張欣泰為阿東内史召還都屏居家巷置室南岡下面接松山欣泰負弩射雉恣情閒放又曰袁彖為侍中形貌充腴異衆每從射雉郊野數人扶持乃能徙步又曰禇炫從宋明帝射雉帝至日中無所得甚羞召問侍臣吾旦來如臯遂空行可笑坐者莫答炫獨曰今節候雖適而雲霧尚凝故斯翬之禽驕心未警但得神駕游豫羣情便可載懽帝意解乃於雉場置酒南史曰齊東昏侯在位置射雉場二百九十六處翳中帷帳及步障皆衿以緑紅金銀鏤弩牙瑇瑁帖箭每出輒以鷹犬隊主徐令孫媒翳隊主俞靈韵齊馬而走左右争逐之又曰武帝親拜陵蔡興宗負璽陪乗及還上欲因以射雉興宗正色曰今致䖍園陵情敬兼重從禽猶有餘日請待他辰陳書曰新安王伯國性好射雉叔陵好發冢出逰田野必與偕行太平御覽卷九百十七
