  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_973-1a, image: WYG0901/WYG0901-0554c.png}
body:
  text: 太平御覽卷九百七十三宋李昉等撰果部十龍眼榠樝餘丼蒟子木𤓰劉欝杜梨㮕􅀥榛柚椵椹龍眼廣雅曰益智龍眼也謝承後漢書曰交趾七郡獻龍眼廣志曰龍眼樹葉似荔支蔓延縁木生子大如酸􅀥色異純甘無酸朱崖傳曰果有龍眼交州記曰龍眼樹高五六丈似荔支而小廣州記曰龍眼子似荔支七月熟呉氏本草曰龍眼一名比目嶺表録異曰龍眼之樹如荔枝葉小殻青黄色形圓如彈丸大核如木槵子而不堅肉白帶漿其甘如蜜一朶恒三二十顆荔枝方過龍眼即熟南人謂之荔枝奴以其常隨後也左思蜀都賦曰傍挺龍眼側生荔枝榠樝南史曰武帝幸丹陽郡宴飲到撝恃舊酒後狎侮同列時王敬則執榠樝以刀子削之謂曰此非元徽頭何事自吃之為左丞庾杲之所糺以贖論廣志曰椬櫨其子甚酢出西方餘甘呉録地理志曰髙凉安寜縣有餘丼初食之味苦後口中更丼臨海異物志曰餘丼子如梭形出晉安侯官界中餘丼橄㰖同一果耳雲南記曰瀘水南岸有餘丼子樹子如彈丸許色微黄味酸苦核有五棱其樹枝如柘枝葉如小夜合葉陳祈暢異物志曰餘丼大小如彈丸大視之理如定陶𤓰片初入口如苦忽咽口中乃更丼羙鹽而蒸之尤羙可多食之朱崖故事曰朱崖果有餘丼左思呉都賦曰其果則丹橘餘丼荔枝之林蒟子漢書曰番陽令唐䝉風曉南粤南粤食䝉蜀枸櫞醬注曰蒟音矩枸樹也如桑椹其長三二寸酢取其實以為醬廣志曰蒟子蔓生依樹子似桑椹長數寸色黑辛如薑以鹽淹之下氣消食左思蜀都賦曰笻杖傳節於大夏之邑蒟醤流味於番禺之鄉木𤓰爾雅曰楙木𤓰周禮冬官下弓人職曰取幹之道木𤓰次果桑毛詩衞淇澳木𤓰曰投我以木𤓰報之以瓊琚三國典略曰齊孝昭北伐庫莫奚至其地以木𤓰灰毒魚魚皆死而浮出庫莫奚竊相謂曰池有靈魚犯之不祥乃出長城北道齊分兵追撃獲牛羊七萬遂振旅而返水經曰魚腹縣地多木𤓰樹有子大如甒白黄實甚苦香爾雅之所謂㮊也盛宏之荆州記曰魚腹縣有固樹陵村地多木𤓰樹其子大者如甒晉宫閣名曰華林園有木𤓰五株廣志曰木𤓰子可藏長一尺百二十節呉氏本草曰木𤓰生夷陵虎丘山䟽曰山三面悉有木𤓰何承天木𤓰賦曰惟兹木之在林亦超類而獨劭方朝華而繁實比沙棠而有耀劉爾雅曰劉劉杙也呉録地理志曰交阯羸倭縣有劉子樹出山中實如梨而味酸羙郡内皆有之南方草物狀曰劉三月華七月八月熟其色黄其味酢出交趾武平興古九真呉都賦曰梌劉禦霜欝周書曰夏食欝棣也毛詩豳七月曰六月食鬰及薁詩義䟽曰其樹髙五六尺其實大如李色赤食之丼魏王花木志曰欝樹髙五六尺其實大如李赤色食之丼廣雅曰一名雀李又名車下李又有郁李亦名棣亦名薁李子毛詩七月食鬰及薁即郁李也一名棣也吕氏本草曰郁李一名雀李一名車下李一名棣晉宫閣名曰華林園薁李一株司馬相如上林賦曰隠夫鬰李合逮離支潘岳閒居賦曰梅杏薁棣之屬曹毗魏都賦曰若榴郁棣杜梨爾雅曰杜丼棠山海經曰岷山其木多棠韓詩外傳曰召伯在朝有司請營召以居召伯曰以吾一身而勞百姓此非先君文王之志也於是廬於甘棠之下百姓大悦詩人見而歌焉毛詩鵲巢丼棠曰蔽芾丼棠勿剪勿伐召伯所茇毛詩蟋蟀杜杕曰有杕之杜生於道周陸氏毛詩䟽義曰杕杜杜赤棠也與白棠同但有赤白羙惡子白色者為白棠白棠丼棠也多酸羙滑赤棠子澁而酢者也俗語澁如杜是也木理亦赤可以作弓材孫楚杕杜賦序曰家弟以虞氏梨賦見示余謂豈以梨有用之為貴杜無用之為賤故賦之㮕棗晉宫閣名曰華林園㮕􅀥四株廣志曰㮕􅀥味如柿晉陽楉㮕肌細而厚以供御范子計然曰㮕􅀥出漢中郡崔豹古今注曰㮕􅀥葉如柿實似柿而小味丼司馬相如子虛賦曰樝梨梬實梬楟􅀥也橘柚芬芳左思蜀都賦曰林檎枇杷橙柿梬楟榛毛詩邶栢舟簡􅀆曰山有榛隰有苓陸機毛詩䟽義曰山有榛枝葉似栗樹子似橡子味似栗枝莖可以為燭毛詩􅅠栢舟定之方中曰樹之榛栗椅桐梓漆詩義䟽曰榛栗屬有兩種其一種枝皮葉皆如栗其子小形似杼子味亦如栗所謂樹之榛栗者也其一種枝莖如木蓼生髙丈餘作胡桃味遼代上黨皆饒周禮天官下籩人職曰饋食之籩其實榛禮記曲禮下曰婦人之贄椇榛􅀥栗説文曰榛似梓實如小栗山海經曰上申之山下多榛楉任昉述異記曰漢末楊氏家園中産神榛二株張衡七辯曰寒梨乾榛柚爾雅曰柚條也尚書禹貢曰揚州厥苞橘柚周書曰秋食橘柚毛詩秦車轔曰終南何有有條有梅列子曰呉越之間有木焉其名柚碧樹而冬青實丹而味酸度淮北而化為枳焉莊子曰三王五帝之禮義法度辟猶柤梨柚橘其味相反而皆適於口淮南子曰天之所覆地之所載皆生於一父母故槐榆與橘柚合而為兄弟吕氏春秋曰果之羙者雲夢之柚山海經曰洞庭之山綸山銅山賈超之山其木多柚郭氏注曰柚似橘而大鹽鐡論御史曰孝武皇帝平百越以為園圃臣庻皆厭橘柚崔實政論曰橘柚之貢堯舜所不常御裴淵廣州記曰别有柚號為雷柚實大如升廣志曰成都有柚大如升慱物志曰橘柚類多豫章郡出真者風土記曰柚大橘也赤黄酢也神異記曰東方見春山外多柚異苑曰南康歸羙山石城内有丼橘柚楚辭曰斬伐橘柚列樹苦桃楚辭曰雜橘柚以為圃兮列辛夷與椒㯽司馬相如子虛賦曰橘柚芬芳古詩曰橘柚垂華實乃在深山側聞君好我丼竊獨自雕餙揚雄揚州牧箴曰彭蠡既瀦陽鳥攸處橘柚羽貝瑶琨篠簜崔琦七蠲曰于期江南實産橘柚紫葉𤣥實緑裏朱莖郭璞讃曰屈生嘉歎以為羙談椵爾雅曰櫠椵也椹毛詩駉頌泮宫曰翩彼飛鴞集于泮林食我桑椹懐我好音後漢書曰獻帝時三輔大饑九月桑復生椹人得以食魏略曰楊沛為新鄭長課民益畜乾椹㑹太祖西迎天子無糧食沛進乾椹及太祖輔政遷為鄴令賜其生口十人絹百疋欲以勵之報乾椹也車頻秦書曰慕容垂園節百姓不得復田民以桑椹為糧相噉略盡晉書載記曰符豋攻姚萇萇㩀武都相累戰互有勝負豋軍中大饑收椹以供軍後魏書曰崔逞自燕奔魏尋除御史太祖攻中山乏糧問羣臣取食之方逞曰取椹可以助糧太祖雖銜其侮慢然兵既須食乃聽以椹當租北史曰後周趙軌為齊州别駕有能名其東鄰有桑椹落其家軌遣人悉拾歸其主戒諸子曰吾非以此求名異者非機杼物不願侵人汝等宜以為誡金樓子曰秦皇遣徐福求桑椹於碧海之中有扶桑樹長數千丈樹兩兩同根偶生更相依倚是名扶桑仙人食其椹而體作金光飛騰𤣥宫也漢武内傳曰神仙上藥有扶桑丹椹汝南仙賢傳曰蔡君仲孝養老母時赤眉亂仲孝取桑椹赤黑異噐賊問其故答曰黑者奉母赤者自食賊嘉之與鹽二升世説曰張天錫為晉孝武所噐毎與言語不覺竟日頗有嫉之者於坐問北方何貴張答曰桑椹香丼鴟鶚華嚮醇酪養性人無嫉心又曰有王甲從北方來謁謝公問北方何果最勝甲云桑椹最好謝公問以比方江東何果甲云是黄丼之流公曰君何乃爾妄語甲耻受妄語之名恐宰相所貴乃買駿馬候熟時取數十枚返以奉公公食之以為羙乃謂甲曰此味乃江東所無而君近比黄丼於是引甲為賔客十洲記曰有椹樹長數千丈名為扶桑芝仙人食其椹而體作金色飛翔𤣥宫其樹雖大其葉椹則小故如中夏之桑椹也但椹稀而赤九千歳一生實耳楊􅃷之洛陽伽藍記曰願㑹寺中書舍人王翊捨宅所立也佛堂前生桑樹一株直上五尺枝條横遶柯葉傍布形如羽盖復髙五尺凡為五重毎一重葉椹各異京師道俗謂之神桑觀者成市布施者衆帝聞而惡之以為惑衆命給事黄門侍郎元紀伐殺之其日雲霧晦冥下斧之處流血至地見者莫不悲泣東方朔神異曰東方有樹髙八十丈敷長自輔葉長一丈廣六七尺名曰桑上椹長三尺五寸其圍如數異苑曰漢興平元年九月桑再椹時劉𤣥徳軍小沛年荒榖貴士衆皆饑仰以為糧又曰北方有白桑椹長數寸食之丼羙五行記曰晉武太元中太原王戎為鬰林太守泊船新亭眠夢一人以枚椹與之着衣襟中既悟得椹如夢中傅休奕桑椹賦曰繁實離離含丼吐液翠采三變或𤣥或白嘉味殊滋食之無斁太平御覽巻九百七十三
