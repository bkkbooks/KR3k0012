body:
  text: 太平御覽卷三百六宋李昉等撰兵部三十七請征伐出師軍行請征伐家語曰孔子北逰登于農山子路子貢顔回侍側孔子四望喟然嘆曰二三子各言爾志吾將擇焉子路進曰由願得白羽若月赤羽若日鐘鼔之音上震于天旌旗繽紛下蟠于地蟠音盤由當一隊而適之必也攘地千里刼攘也搴取也旗執馘唯由能之使夫二子從我焉孔子曰勇哉史記曰終軍請願受長纓必羈南越王而致之闕下又曰單于嘗為書嫚太后樊噲曰臣願得十萬衆横行匃奴中季布曰髙皇帝將兵四十餘萬衆困於平城噲奈何以十萬衆行匃奴中面欺且秦以事于胡陳勝等起范曄後漢書曰馬援擊武陵五溪蠻深入軍没援因復請行時年六十二帝恐其老未許之援自謂曰臣尚能披甲上馬帝令試之援據鞍顧盼以示可用帝笑曰矍鑠哉是翁也矍鑠勇貌也東觀記矍哉是翁矍音許約反遂遣援又曰更始郾王尹尊及諸大將在南方未降者尚多帝召諸將議兵事未有言沈吟久之乃以檄叩地曰郾最强宛為次誰當擊之賈復卒然對曰臣請擊郾帝笑曰執金吾擊郾吾復何憂唐書曰李晟以軍功授特進光禄卿尋轉試太常卿大厯初李抱玉鎮鳳翔署晟為左軍都將四年吐蕃圍靈州抱玉遣晟將兵五千以擊吐蕃晟辭曰以衆則不足以謀則未多乃請將兵二千人疾出大散關至臨洮屠定秦堡焚其積聚虜堡帥慕容谷鍾而還吐蕃乃解靈州圍而去又曰馬燧討李懐光師次于焦離堡其夜賊將吳冏棄太原堡走其下皆降燧率諸軍濟河兵凡八萬陣於城下是日賊將牛俊斬懐光首以降降者一萬六千斬賊將閻晏孟實張清吳冏等七人以狥其為懷光所脅者赦之燧自從京師至河中凡二十七日上乃下詔褒美遷光禄大夫兼侍中初徳宗欲罷兵燧不可請得一月芻粮足以平河中至是果然又曰徳宗幸奉天詔李晟與李懐光合軍拒朱泚時每將出合戰晟必自異衣錦裘繡㡌於前親自指道懐光望見之乃謂晟曰將帥當持重豈宜自飾以啗賊耶晟曰晟在涇源軍士頗相畏服故欲令其先識以奪其心耳懐光益不恱隂有異志兵遷延不進晟因見懐光曰冦賊偷據天子行在近縣兵柄廟畧屬在於公公宜以時速進晟願以所部傳奉嚴令為公前驅雖死不悔懐光益忌之又曰史敬奉靈武人少事本軍為衙將元和十四年敬奉大破吐蕃於鹽州城下賜實封五千戸先是西戎頻嵗犯邊敬奉白節度使杜叔良請與三千人備一月粮深入吐蕃界叔良以二千五百人授之敬奉既行十餘日人莫知其所向皆謂吐蕃盡殺之矣乃由他道深入突出蕃衆之後戎人驚潰敬奉率衆大破之殺戮不可勝記驅其餘衆於蘆河獲羊馬駝牛萬數敬奉形甚短小若不能勝衣至於野外馳逐能擒奔馬自執鞭勒隨鞍躍上然後羈帶矛矢在手前無强敵甥姪及僮使僅二百人每以自隨臨入敵輙分其隊為四五隨逐水草每日各不相知及相遇已皆有獲虜矣三國典畧曰北齊平廣陵王孝珩曰奈何嗣君無獨見之明宰相非柱國之寄内參羣奸離間骨肉恨不得握兵符受廟算出萬死先士卒展我力耳又曰齊主曰今日飲酒樂哉武衛將軍斛律光進曰關西未平人為仇敵陛下亦何樂哉㑹當馬歩十萬三道渡由平道陷玉壁收長安自𤓰凉一帶悉在掌握使百官襲冠冕軍士釋介胄然後稱樂齊王謂羣臣曰明日當有此意憂國如家卿輩無及之者平原叚王昭出謂光曰卿勝先帝耶先帝以四十萬攻玉壁不利而還將兵如盤擎水誤即傾覆何容易而輕言之光笑曰非卿所知出師易曰出師以律失律凶也書曰張皇六師肅將天威兼弱攻昧推亡固存無作神羞詩曰維師尚父時維鷹揚禮記曰師出不踰時為怨思也踰時即内有怨女外有曠夫又曰天子將出征類于上帝宜乎社造乎禰禡於所征之地禡御祭也受命于祖告祖受成于學定兵謀也出征執有罪反釋奠於學以訊馘告周禮曰牙璋以起軍旅又曰類祭先出師告天祭地造祭將與兵造於先祖祭告榖梁曰甲午治兵出曰治兵習戰入曰振旅習戰也後漢書曰光武起王莽徴天下能為兵法者六十三家數百人並以為軍吏選練武衛招募猛士説文云募廣求也旌旗輜重千里不絶時有長人巨無霸王莽連率韓博上竒有竒士長一丈大十圍自謂巨無霸出于蓬萊東南五城西北昭如海濵軺車不能載三馬不能勝卧則枕鼔以鐵箸食見前書長一丈大十圍以為壘尉鄭注周禮軍壁曰壘崔瑗中壘校尉箴曰堂堂黄帝設為壘壁尉者主壘壁之事又驅諸猛獸虎豹犀象之屬以助威武自秦漢出師之盛未嘗有也又曰車駕東歸勅岑彭書曰兩城若下便可將兵南擊蜀虜人苦不知足既得隴復望蜀每一發兵彭頭鬢為白又曰馬嚴拜將軍長史將北軍五校士羽林禁兵三千人屯西河美稷美稷縣名衛護南單于聽置司馬從事牧守謁敬同之將軍勅嚴過武庫祭蚩尤武庫掌兵器令一人秩六百石前書音義曰蚩尤古天子好五兵故今祭之帝親御阿閣阿曲也觀其士衆時人榮之又曰馬成拜揚武將軍督誅虜將軍劉龍振威將軍宋登射聲校尉王賞發㑹稽丹陽九江六安四郡兵擊李憲時帝幸夀春設壇塲祖禮遣之又曰涼部叛羗揺蕩四州朝廷憂之扵是詔鄧騭將左右羽林北軍五校士及諸部兵擊之車駕幸平樂餞送又曰馬援出師詔百官祖道又曰光武籌赤眉必破長安欲乘釁并關中而方事山東未知所寄以鄧禹沈深有大度故授以西討之畧乃拜為前將軍持節中分麾下精兵二萬人遣西入關令自選偏禆以下可與俱者晉書曰何曽正元中為鎮北將軍都督河北諸軍事假節將之鎮文帝使武帝齊王攸辭送數十里曽盛為賔主備太牢之饌侍從吏騶莫不醉飽又載記曰苻堅以苻融為鎮東大將軍代王猛為冀州牧融將發堅祖于霸東奏樂賦詩堅母苟氏以融少子甚愛之比發三至霸上其夕又竊如融所内外莫知是夜堅寢于前殿魏延上言天市南門屏内后妃星失明左右閽寺不見后妃移動之象堅推問知之驚曰天道與人何其不逺遂重星官後魏書曰車駕南征以劉藻為征虜將軍督統軍髙聰等四軍為東道將别辭於洛水之南孝文曰與卿石頭相見藻對曰臣雖不逮古人度亦不留賊虜陛下輙當釃曲阿之酒以待百官帝大笑曰今未及曲阿且以河東數郡賜卿後周書曰武帝保定四年冬十月甲子詔大將軍大冡宰晉國公護率軍伐齊帝於太廟庭授以斧鉞護總大軍出潼關大將軍崔景宣率山南諸軍出豫州少師楊標出枳關丁夘幸沙苑勞師三國典畧曰侯景西逼梁湘東王遣晉州刺史蕭惠正率兵援于霸陵惠正辭以不堪舉天門郡守胡僧佑以自代王以為武猛將軍令其進發僧佑謂其子玘曰汝可以膏塗門一朱一白吾當以死决之不捷不歸也王聞而壯之厚撫其家謂僧佑曰景便於陸道不嫻水鬭賊若水戰但以大艦臨之自當必克若其歩戰自可鼔棹直就巴丘不須交鋒又曰周遣常山郡公于謹率中山公宇文護大將軍楊志等歩騎五萬南伐太祖餞於青泥谷時庾信來聘未返太祖問之曰我遣此兵馬縛取湘東關西作博士卿以為得不信曰必得之後王勿為不忠太祖笑而頷之白虎通曰王者征伐所以必皮弁素幘何伐者凶事素服示有悽愴也王者將出辭於禰還假祖禰者言子辭面之禮尊親之義也王制曰王者將出類於上帝宜于社造于禰尚書曰歸假于藝祖出以告天至告祖先吿廟後告天者示不敢留尊者之命也告天何示不敢自專非出辭反面之道也與宗廟異義還不復告天者天道質無内外故不復吿也尚書言歸假于祖禰不見告天知不告也又曰遣將軍必於廟何制法度者祖也王制曰受命于祖受成于學此言於祖廟命遣之也摯虞决疑要注曰古者帝王出征伐以齊車載遷廟之主及社主以行故尚書甘誓曰用命賞于祖不用命戮於社秦漢及魏行不載主也衛公兵法曰諸大將出征且約舉兵二萬人而即分為七軍如或多或少臨時更定大率十分之中以三分為竒兵太白隂經曰參七星伐三壘連體十星為十將西方白虎宿也主殺伐此星出而天下秋草木揺落有若軍威故兵出而法焉張平子南都賦曰爾其則有謀臣武將皆能攫戾執猛破堅摧剛虞子陽霍將軍北伐詩曰擁旄為漢將汗馬出長城魏明帝善哉行曰我徂我征伐彼蠻虜練師簡卒爰整其旅輕舟竟川傍依於浦桓桓猛毅如熊如虎發桴若雷吐氣成雨旌旄指麾進退合矩軍行禮記曰前有水則載青旌前有塵埃則載鳴鳶前有車騎則載飛鴻行前朱雀而後𤣥武左青龍而右白虎招揺在上急繕其怒左傳曰凡師出一宿為舍再宿為信過信為次後漢書于栗磾傳曰太宗南臨孟津謂磾曰河可橋乎對曰杜預造橋遺事可想乃編次大船構橋於野坂六軍既濟太宗深嘆焉隋書曰煬帝征高麗宇文述為扶餘道將軍臨發帝謂述曰禮七十者行役以婦人從公宜以家累自隨古稱婦人不入軍臨陣時耳至于營壘之間無所傷也項籍虞姬即其故事唐書曰太宗率衆平汾晉至龍門關履氷而渡進屯栢壁白虎通曰王法年四十受兵何重不絶人嗣也師行不必反戰不必勝故須其有世嗣年六十歸兵者何不忍並鬭人父子也孫子曰凡用兵之法馳車千乘輕車也駕馳千乘也革車千乘重車也言萬乘之重也一車駕四卒十竒一重養二人主炊家子一人主保國守依壯斯二人主養馬凡五人歩兵十人重以大軍駕牛養二人主炊象主一人主保國守裝炊二人也帶甲十萬士卒數也千里而饋粮則内外之費賓客之用膠漆車甲之奉日千金然後十萬之衆舉矣又曰出其所必趣使敵不得往相救也行千里而不勞者行於無人之地出空擊虛擊其不意又曰凡用兵之法將受命於君合軍聚衆曰因人結行位也交利而舍軍門為利門左右門為期門以軍營為轅門以人營為人門兩軍相當為空利也莫難於軍争從始受命至扵交利軍争難也又曰凡據軍相敵絶山依谷近水草也視坐處髙向陽也巡士謂視前坐處於軍當在髙戰降無登無近髙也降下也謂山下也戰扵山下敵引之上山無登逐也此處山谷之軍也絶水必逺水敵引使渡客絶水而來迎之於水内令之半渡而擊之利欲戰無附於水而迎於客也視在處髙水上亦營度其髙也無迎水流恐即我也處水上之軍也絶斥之澤唯亟去無流交軍於斥澤之中必依水草而倍衆樹不得已専敵戰而㑹井澤之中此處斥澤之軍也平陸處易軍之利也而左右倍髙前死後生轉便此處平陸之軍也凡四軍之利黄帝所以勝四帝者也黄帝始立四方諸侯亦稱帝以此四地勝之也凡軍喜髙而惡下貴陽而賤隂喜一作好山南曰陽山北曰隂養生處實是為必勝軍無百疾丘陵隄防必處髙其陽而右背也陽者積土所皆當處其陽而右之便也此兵之利而地之助也故用兵之法髙陵勿向也敵若據山林以附險阻陳待敵陳勿攻趣之因地勢不便有損之衡也背丘勿迎敵背丘陵為陣無有後患則當隠之乎現勿迎而擊之又曰上雨水沫至欲涉者待其定也恐半渡而水便溺也絶澗過天井天牢天羅天陷天郄大害必亟之勿近也山峻水深為絶澗四方高中央下為天井深水所居朦胞者為天羅陂陁泥濘車騎滅没者為天陷澗夾道深數丈長尺者謂之天郄矣吾逺之敵近之吾迎之敵背之也用兵長逺六害令敵近信則利敵也凶軍旁有險阻薄漢并生葭葦小林翳薈烏㑹反者必謹覆索之此伏奸之藏處也險者一髙一下之地阻者必水草也漢者池也并生葭葦者衆草所聚也小林者衆木所居也翳薈者所以屏敵之處也衛公兵法曰軍馬行動須知次第出先右虞候馬軍為首次右虞候歩軍次右軍馬軍次右軍步軍次首軍馬軍次前軍步軍次右軍馬軍次中軍步軍次右軍馬軍次右軍步軍次左軍馬軍次右軍步軍次左虞候馬軍次左虞候歩軍其馬軍去歩軍一二里外行每有髙處即令三五騎馬於上立顧以候不虞以後餘軍在前立馬四顧右虞候既先發安營路平道路修理泥淖橋津廵行水草左虞候排比隊仗整齊軍次使不交雜若軍逥入先左虞候馬軍次左虞候步軍次左馬軍次左歩軍其次第准前却轉其虞候軍職掌初發交換諸軍營各量虞候子並使排比依軍次行如此發引卒逢冦賊部位甚易若令壘散行牽卒難就萬一賊至何能應變又曰諸軍計伐例有數營發引逢賊首尾難救行引之時須先為方陣應行之兵分為四輜重為兩道引戰鋒等隊亦為兩道引其第一分初發輜重及戰鋒分為四道行兩行户郎切下同輜重在心雙引兩行戰鋒隊並合各在輜重外左右夾雙引其次一分戰鋒隊與前般左右行戰鋒隊相當輜重隊與前行輜重隊相當又其次一分准上最後一分亦唯上初發第一分别戰輜重相當如其逢賊前分四行兩行輜重抽縮兩行戰鋒横列作前面甚易其次兩分先作四行長引其戰鋒既在外便充兩面其後分亦先作四行其輜重進前其戰鋒隊横列相接使充後面亦易其方陣立即可成如此發引縱使狹路急緩亦得成陣每軍戰鋒等隊須過本軍輜重尾輜重稠行戰鋒等隊稠引長令輜重併近前頭戰鋒隊相去十步下一隊輜重隊相去十步下一隊輜重隊相去兩歩下一隊如此即須相得若逢川陸平坦彌加穏便其戰鋒輜重隊等分布使均又曰請兵馬發行或逢泥淖或阻山河其路有須填補有須開拓左右虞候軍兵先多於軍取充虞候子右虞候先將此兵修理橋梁泥濘開拓窄路左虞候排窄路捍後収拾䦨遺諸兵士每下營訖先令兩隊共掘一厠又曰行軍沙磧鹹鹵之中有野馬黄牛蹤尋之有水鳥所集處有水地生葭葦蘆菼荻蒲之處下有伏泉地有蟻壤之處下有伏泉太白隂經濟水具篇曰軍行過大水河渠溝澗無津梁舟筏難以濟渡太公以天艎天船皆質朴不便於用令隨事逐物變化而用之以濟巨川又曰木罌以木縛甕為筏甕受二石力勝一人甕間閱五十底以繩勾聯編槍於其上形長而方前置梭頭後置楯左右置棹又曰槍筏十根為一束力勝一人四千一百六十六根即為一筏皆去鑚刃以束為魚鱗以横括而縛之可渡四百一十六人為三筏計用槍一萬二千五百根率渡一千二百五十人十渡則一軍必濟又曰蒲筏以蒲九尺顛倒為束束十道繹之以束槍為筏量長短多少隨蒲豐儉無蒲亦用葦筏量大小以濟人又曰挾絙以善水者繫小繩先浮渡水次引大絙於兩岸立大橛繫定絙浮渡大軍可為數十道又曰浮􅇸以渾脫羊皮吹氣令滿繫其孔束於腋下而浮渡太平御覽卷三百六
