body:
  text: 太平御覽卷五百八十三宋李昉等撰樂部二十一琵琶羯皷琵琶釋名曰琵琶本胡中馬上所鼓推手前曰琵引手却曰琶因以為名晉書曰石季倫善弹琵琶宋書曰庾仲文為吏部尚書好貨先與劉徳願殊惡徳願自持琵琶甚精麗遺之便復欵然南史曰宋范􅁮善弹琵琶能為新聲上欲聞之屢諷以微㫖􅁮偽若不曉終不肯為上嘗宴飲歡適謂曰􅁮我欲歌卿可弹􅁮乃奉㫖上歌既畢􅁮乃罷絃蕭子顯齊書曰太祖曲江宴羣臣數人各使傚伎藝褚淵弹琵琶王僧䖍弹琴沈文季歌張敬兒舞王敬則拍張王儉曰臣無所解唯知誦書因跪上前誦相如封禅書上笑曰此盛徳之事吾何以堪之遽止使陸澄誦孝經自仲尼居起儉曰澄所謂博而寡要臣請誦之乃誦君子之事上章上曰善張子布更覺非竒隋祕書監牛𢎞脩皇后房内之樂文帝龍潜時頗好音樂甞以琵琶作歌二首名曰地厚天髙託言夫妻之義因莭取之為房内曲命婦人並登歌上夀並用之職在宫内女人教習之樂府雜錄曰貞元中有王芬曹保保子善才其孫綱及裴興奴善弹琵琶其曹綱善用撥聲若風雨不事扣絃其裴興奴善於攏撚用撥稍軟時人云曹綱有右手裴興奴有左手武宗朝朱崖李太尉有樂吏亷郊者師於曹綱精妙入神嘗謂儕流曰教授人亦多矣未曽有此性靈弟子也甞因清夜擕樂器於平泉别墅臨池弹蕤賓調芰荷間有聲意其魚躍也及弹别調即寂然因復弹蕤賓久之池中物跳擲上岸觀之乃一片方響蕤賓鐡盖以聲律諧和相應故也其妙若此又曰貞元中有康崑崙弹琵琶第一手因長安大旱詔移兩市以祈雨及至天門街市人廣較勝負及鬭聲樂即街東有康崑崙琵琶最上必謂街西無以敵也遂請崑崙登綵樓弹一曲新翻調錄要即錄要目是也本因樂工進曲上令錄出要者因以為名自後來誤書緑腰也其街西亦建一樓東市大誚之也及崑崙度曲畢西市樓上出一女郎抱樂器先云我亦彈此曲兼移在楓香調中及下撥聲如雷其絶妙入神崑崙即驚駭乃拜請為師女郎乃更衣而出及見即僧也盖西市豪族厚賂荘嚴寺僧善本善本名俗姓叚也以定東􅆵之聲也翌日徳宗召入令陳本藝異常嘉奨因令教授崑崙奏曰且請崑崙弹一調子乃弹之師曰本領何雜也兼帶邪聲崑崙曰叚師神人也臣少年初學琵琶偏於隣舍女巫處授一品絃調子后乃易數師叚精監𤣥妙如此叚師奏曰遣崑崙不近樂器十年後使忘其本領然後可教詔許之后盡叚師之藝也又曰開元中有賀懐智善琵琶以石為槽鵾雞筋作絃用鐡撥弹之又曰琵琶始自烏孫公主造馬上弹之有直項者曲項者葢便於急闗中也古曲有陌上桑范􅁮石苞謝弈皆善此樂也風俗通曰琵琶近代樂家所作不知所起長三尺五寸法天地與五行也四絃象四時也以手琵琶之者因以為名語林曰謝鎮西著紫羅襦據胡床在大市佛圖門樓上弹琵琶作大道曲異苑曰南平國兵在姑蘇有鬼附之毎占吉凶輒索琵琶随彈而言事事有驗云是老鼠所作名靈侯王保言期䧏幕祠儀曰琵琶出於絃鞉笙簧基於絲竹竹林七賢傳曰阮咸善琵琶荀朂雅解音律自以逺不及也文士傳曰孔輝善弹琵琶呉歸命恒使為樂孫放别傳曰君性好音能操琴及琵琶以自散傅𤣥琵琶賦序曰聞之故老云漢遣烏孫公主念其行道思慕使二知音者載琴筝筑箜篌之屬作馬上之樂觀其器盤圓柄直隂陽之序也四絃法四時也以方語目之故云琵琶也取易傳於外國也杜摰以為嬴秦之末蓋苦長城之役百姓絃鼗而鼓之二者各有所據以意斷之烏孫近焉石崇琵琶引曰王明君者本為昭君以觸文帝諱改匈奴請婚元帝以明君配焉昔公主嫁烏孫令琵琶馬上作樂以慰其思其送明君亦然故序之云耳傅子曰朱生善弹琴琵琶雖伯牙之妙無以加也文士傳曰孔煒字正忠解音律弹琵琶異苑曰永嘉中李謙素善琵琶元嘉初往廣州夜集坐倦悉寝唯謙獨揮弹未輟便聞忩外有唱佳聲毎至契㑹弹之無不擊莭謙怪語曰何不進耶對曰遺生已久無宜干突始悟是鬼幽明錄曰司空桓豁在荆州有叅軍五月五日剪鸜鵒毎教令學語遂無不名與人相問顧叅軍善弹琵琶鸜鵒毎令聽移時錄異傳曰呉赤烏三年句章民楊度至餘姚夜行有一年少持琵琶求寄載度許之鼓琵琶作數十曲曲畢乃吐舌擊目以怖度而去復行數十里許又見一老父寄載自云姓王名戒因復載之謂曰鬼工鼓琵琶甚哀戒曰我亦能鼓即是向鬼復擊眼吐舌度怖幾死語林曰桓宣武外甥恒在坐鼓琵琶宣武醉后指琵琶曰名士固亦操斯器三輔决錄曰游楚上表乞宿衛拜駙馬都尉楚無學好遊遨音樂畜歌者琵琶筝笛毎行将以自隨樂府雜錄曰唐文宗朝女弟子鄭中丞善於胡琴中丞即宫中之人也内庫有兩面琵琶號大小忽雷鄭常弹小忽雷因題頭脱送於崇仁坊南趙家修理大約樂器多在此坊中南北二趙家最妙太和中有權相舊吏梁厚本荘在渭南縣之西北臨渭水一日因垂釣忽見一物流過長五尺許悉以錦纒其上令家僮接得就岸乃秘器也及發棺視之乃一女郎也粧色儼然久伺之口鼻間餘息未絶遂移於曲室中将養經旬漸能言詢之云是鄭中丞也昨以忤聖㫖命内官縊殺投於渭河錦即諸子弟相贈耳及如故因垂涕感謝厚本即納為妻言其琵琶今尚在南趙家值鄭注之亂莫有知者梁乃潜賂樂匠贖得之毎至夜深方敢輕弹後遇良辰美景飲於花下酒酣不覺朗弹數曲洎有黄門放鷂子過其門私於墻外聽之曰此是鄭中丞琵琶聲也不日召入内乃赦厚本之罪仍加錫賜也明皇雜錄曰天寳中上命宫女數百人為梨園弟子皆居宜春北院上素曉音律時有馬仙期李龜年賀懐智洞知律安祿山自范陽入覲亦獻白玉簫管數百事安皆陳於梨園自是音響殆不類人間有中官白秀貞自蜀使迴得琵琶以獻其槽以邏逤檀為之清潤如玉光輝可見有金縷紅文蹙成雙鳳貴妃毎抱是琵琶奏於梨園音韻淒清飄如雲外而諸王貴主洎虢國以下競為貴妃琵琶弟子毎授曲畢皆廣有進獻其後龜年流落江南毎遇良辰勝景常為人歌數闋坐客聞之莫不掩泣罷酒羯皷羯皷錄曰羯皷出外夷以戎羯之皷故曰羯皷其音主太蔟一均龜茲髙昌踈勒天竺諸部皆用之次在都曇荅獵皷之下都曇似腰皷而小荅獵即背皷也雞婁皷之上狀如漆桶山桑為之下以小牙床承之擊用兩杖其音焦殺明烈尤宜急曲促破作戰杖連碎之聲又宜髙樓曉影明月清風破空透逺特異衆樂杖用黄檀狗骨花楸須乾𦂳至縱濕氣而復柔膩乾取發越響亮膩取戰裊健舉抱用鋼鐡鐡當精煉棬須至匀若不鋼則應絛髙下紐捩不停不匀則皷面緩急似若琴徽之􅂒病𤣥宗洞曉音律由於天縱凡是管絃悉造其妙若製作曲調隨意即成如不立章度取適長短應指發聲皆中㸃拍至於清濁變轉律吕呼召君臣事物相制使古之夔曠無以過也尤愛羯皷横笛云八音之領袖也諸樂不可方此嘗值二月詰旦巾􅌨方畢時宿雨初晴景色明麗小殿庭内栁杏方吐覩而歎曰對此景物豈可不與他判斷之左右相目之将備酒唯髙力士遣取羯皷上旋命之臨軒縱擊一曲名春光好上自製神思自得及顧栁杏皆已發拆指笑曰此事不喚我作天公可乎左右皆稱萬嵗又製秋風髙毎至秋空逈徹纎羅不起即奏之必逺風徐來庭葉墜落其妙絶入神也如此又曰汝陽王璡寧王長子也姿容妍美秀出藩邸上特鍾愛焉自傳受又以其聦悟敏恵妙逹其㫖毎隨遊幸頃刻不舍璡甞戴砑綃帽打曲上自摘槿花一朶置於帽上著處二物皆極滑久之方安遂奏舞山花一曲不墜本色所謂定頭項難在不動揺上大喜笑賜金器一橱因誇花奴璡小名也資質明瑩肌膚光細非人間人必神仙謫墜也寧王謙讓隨而短之上笑曰大哥不須慮阿瞞自是相師上於諸親自稱此號夫帝王之相且須英特越逸之氣不然則有深沉包育之量若花奴但端秀過人悉無此態固無猜也而又舉止淹雅更得公卿間令譽耳寧王又謝之曰如此則臣乃輸之上曰若此則阿瞞亦輸大哥矣寧王又謙謝上曰阿瞞贏處亦多大哥太用撝抑衆皆歡笑也上性雋邁雅不好琴甞聴弹三㺯未及畢叱琴者曰待詔出去謂宦者曰速召花奴将羯皷來為我解穢黄幡綽亦知音者上嘗使人召之不時至上怒絡繹使尋捕之既至及殿側聞上理鼓固止謁者不令報俄頃上又問侍官奴來未曲罷改奏纔三數十聲綽即入請曰頼稍遲我向來怒意至必撾焉適方思之長入供奉已五十餘日暫一日出外不可不許他東西過往綽拜謝畢内官有偶而笑者上詰之官言綽尋至聽鼓而候其時入上問之綽語其方怒及解怒之際皆無差悞上竒之復厲聲謂之曰我心膚内事安有侍官奴聞鼓聲能料之耶今且謂我何如綽遂走下堦面北鞠躬大聲曰有勅竪金雞上大笑而止又曰宋開府雖耿介不倫亦深好聲樂善羯皷南山起雲北山起雨即宋開府所為也承恩顧與上論皷事曰不是青州石末即是魯山花甆撚小碧上掌下須有朋肯聲據此乃漢震第二皷也且􅀈用石末花瓷固是腰皷掌下朋肯聲是以手拍非羯皷明矣又謂上曰頭如青山峰手似白雨㸃此即羯鼓之能事也上即命開府之家悉傳之東都留守鄭叔祖母即開府之女今尊賢里鄭氏第一小樓即是婦女習皷之所也又曰嗣曹王臯有巧思精於器用為荆南節度使有羇客懐二棬欲求通謁先啟於寳府府中觀者訝之曰豈足尚也客曰但啟於尚書當解耳及見臯捧而嘆曰不意今日獲逢至寳因指其鋼鈎之状賓但唯唯或復非之臯曰諸公或未信乎命取食柈自選其極平者遂重二棬於柈心以油注之盤中棬滿而油不浸漏葢相契無際臯曰此必開元中供御棬也不然無以至此問其客曰某先生在黔中得於髙力士衆方深服僚佐潛問其價宜償幾何客曰不過三百緡及臯遺之財帛器皿其直果稱焉又曰廣徳中蜀客雙流縣丞李琬者亦能之調集至長安稅居務本里夜聞羯皷聲曲頗妙於月下歩尋至一小宅門户極卑隘叩門請謁皷工曰君所為者豈非耶婆色雞乎一本作耶婆娑雞也雖至精能然而無尾何也工大異之曰君固知音者此事無人知某太常工人也祖父傳此藝尤能此曲近因張通儒而入長安某家流散父没西河此曲遂絶今但按舊譜數本尋之竟無結尾聲故夜夜求之琬曰曲不盡意乎工曰盡琬曰意盡則曲盡又何索乎工曰奈何聲不盡也琬曰可言矣夫曲有如此當以他曲解之方可盡其聲矣夫耶婆色雞當用掘柘急徧解之工如其所教果得諧叶聲意皆盡工泣謝之而即言於寺卿奏為主簿累官至太常少卿為宗正卿又曰永泰中杜鴻漸為三川副元帥兼西川節度使亦能擊羯皷之成都有以削杖二枚獻於鴻漸者鴻漸得之示於衆曰此舊物也當衣襟下收貯積時矣匠曰某於脊溝中養之二十年及鴻漸出蜀至利州西界望嘉驛入漢川自西南來始至嘉陵頗有山川景致至夜月色又佳乃與從事楊崖州杜亞軰驛樓望月行觴讌話曰今日出難危脫積廹外則不辱命於朝廷内則不中禍於微質皆諸賢之力也既保此安歩又瞰此殊境安得不自賀乎遂命家童取羯皷笛以所得杖酣奏數曲四山猿鳥忽皆飛鳴從事頗異之曰昔夔之擊拊百獸舞庭此豈逺耶漸曰漸但於此稍當致功猶未臻妙尚能及是况聖主御天賢臣考樂飛走之類又何不感因言某有别墅近花巖閣毎值風清月白時或登閣奏此初見羣羊於川下數舉頭躑躅不已某謂以鼓然也及鼓止亦止某復鼓之亦復然遂以疾徐髙下而節之無不相應旋有二犬自其家走而吠之及羊側遂漸止聲仰首若有所聴少選即復宛頸揺尾亦從而變態是率舞固無難矣某後不敢為之近者士林閒無習之者唯僕射韓臯善不肯露焉鄂州節度使時聞黄鶴一兩集而已太平御覽卷五百八十三
