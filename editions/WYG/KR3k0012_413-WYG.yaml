body:
  text: 太平御覽卷四百一十三宋李昉等撰人事部五十四孝中陳書曰徐孝克陵第三弟事所生母盡孝每侍宴高宗無所食噉至席散當其前膳羞損減高宗密記以問中書舍人管斌不能對自是斌以意伺之見孝克取珍果内伸帶中斌莫能識其意後更㝷訪之知還以奉母斌以啟高宗高宗歎嗟久之乃勅所司自今孝克前饌賜以餉其母後屬兵荒母患病欲粳米為粥不􅀎常辦母亾之後孝克遂常噉麥有遺粳米者對而悲泣終身不復食之崔鴻十六國春秋前趙録曰太宰王祥字季海性至孝言及二親未有不嗚咽摧慟每忌日輙三日不食燕書曰周存字道名上谷漁陽人王彭祖叛母遇㓂離失時所在分崩州郡隔異存冐難相求自河以北無不周遍存亡無問後傳在昌黎而時已屬段氏昌黎土地燕之所統存徑投高祖客之為置酒於坐問存君失母來幾年相見當識否高祖言未止存涕泗覆面㝷聲而對辭甚悲酸舉坐莫不忼慨高祖亦為之動容由是恩遇倍加存居停朞月不得母問將辭歸高祖意欲留之而未顯也存覺微㫖陳謝曰聶政荆軻刺客之流意氣之顧甘死􅁗韓今明公無求於徴用而見接以國士應終身奉給以答厚恩然老母未審存亡弟小無所依倚寢食不敢廢心昔徐庶指方寸以求辭今存披肝膽以表情願明公恕之高祖矜之聽去後魏書曰趙琰字叔起天水人為淮南王他府長史時禁制甚嚴不聽越闗葬於舊兆琰積三十餘年不得葬二親及蒸嘗禮拜未嘗不嬰慕每於時節不受子孫慶賀年逾耳順而孝思彌篤嵗月推移遷􅉎無冀乃絶鹽粟斷諸滋味二十年間食麥而已年八十卒遷都洛陽子應等乃還鄉葬焉又曰長孫慮代人也母因飲酒其父眞呵叱之誤以杖擊便即致死眞為縣囚執處以重坐慮列辭尚書乞慮身代父老命使嬰弱衆孤得蒙存立尚書奏云慮於父為孝子於弟為仁兄㝷究情狀特可矜感高祖詔特恕其父死罪以從遠流又曰辛少雍字季和隴西狄道人也少聰頴有孝行尤為祖父紹先所愛紹先性嗜羊肝常呼少雍共食及紹先卒少雍終身不食肝乂曰張彛字慶賔清河東武城人太和中為給事黄門侍郎後從駕南征母憂解任彛居喪過禮送葬自彭城達家千里徒歩不乘車馬顔貌毁瘠當世稱之又曰㓂治字祖禮上谷人也世宗時為荆州刺史治兄弟並孝友敦睦白首同居父亡雖久而猶於平生所處堂字備設幃帳几杖以時節開堂列拜垂涕陳薦若宗廟然吉凶之事必先啟告遠出行返亦如之又曰孝文帝以文明太后再周忌日哭於陵泣絶膳二日哭不輟聲又曰蕭順字子和任城文宣王之子遭父憂哭泣嘔血身自負土時年二十五便有白髮免喪抽去不復更生除吏部尚書兼右僕射上省登階見榻甚故問都令史徐仵起仵起對曰此榻曾經先王所坐順即哽塞涕泣交流久不能言遂令换之又曰楊引三嵗喪父為叔所養母年九十三嵗終引年七十五哀毁過禮三年服終恨不識父追服斬衰誓終身命經十三年哀慕不改為郡縣鄉閭三百餘人上狀稱美有司奏宜旌賞復其一門旌其純孝後周書曰樂運少好學渉獵經史而不持章句年十五而江陵滅運隨例遷長安其親屬等多被籍没運積年為人傭保皆贖免之乂事母及寡嫂甚謹由是以孝義聞梁故都官郎中琅琊王澄美之為次其行事為孝義傳又曰荆可河東猗氏人也性質朴容止有異於人能苦身勤力供養其母隨時甘㫖終無匱乏及母喪水漿不入口三日悲號擗踊絶而後蘇者數四葬母之後遂于墓側晝夜哭負土成墳蓬髪不櫛沐菜食飲水而已然可家焦塋城極大榛蕪至家十餘里而可猶宿其中與禽獸雜處遠近邑里稱之大統中可鄉人以可孝行之至足以勸勵風俗乃言焉太祖令州縣表異之及服終後猶若居喪大冡宰晉公護聞可孝特引見與言論時有㑹於䕶䕶亦至孝其母閻氏没於敵境不測存亡每見可自傷久乖膝下而重可至性及卒之後猶思其純孝收可妻子於京城常給其衣食北齊書曰李元忠母老多病患乃專心醫藥研習積年遂善方伎性仁恕見有疾者不問貴賤皆為救療又曰李密平棘人元忠族弟性方直有行檢因母病積年得名醫治療不愈乃精究經方洞曉鍼藥母病乃除唐書曰高祖嘗宴侍臣果有蒲桃侍中陳叔達執而不食問其故對曰臣母患口乾求之不得高祖曰卿有母遺乎遂嗚咽流涕因賜帛百疋以市甘珍又曰歐陽通為中書舍人調露中起復每入朝必徒跣至城門然後着靴直宿則席地籍蒿非公事不言未嘗啟齒歸必哀號無時國朝奪情唯通得禮乂曰聊城人王少元者父隋末於郡西為亂兵所害少元遺腹生年十嵗問父所在其母告之因哀泣便欲求屍以葬時白骨蔽野無由可辨或曰以子血沾父骨即滲焉少元乃刳其體以試之凡經旬日竟獲父體以葬盡禮病創歴年方瘉音庾貞觀中本州聞薦拜除王府叅軍又曰陳集原隴州開陽人也代為嶺表酋長父龍樹欽州刺史集原㓜有孝行父纔有病即終日不食永徽中喪父嘔血數升枕服苫廬悲感行路資財田宅及僮僕三千餘人並以讓兄弟則天時官至左豹韜衛將軍又曰元讓雍州武功人也弱冠明經擢第以母疾遂不求仕躬親藥膳蒸蒸致養不出閭里者數十年及母終廬於墓側蓬髪不櫛沐菜食飲水而已咸亨中孝敬監國下令表其門閭永淳元年廵按使奏讓孝悌殊異擢拜太子右内率府長史後以嵗滿還鄉里鄉人有所争訟不詣州縣皆就讓決焉聖厯中中宗居春宫詔拜太子司議郎及謁見則天謂曰卿既能孝於家必能忠於國今授此職須知朕意宜以孝道輔弼我兒㝷卒又曰張志寛河東人隋末喪父哀毁骨立為州里所稱㓂賊聞其名不犯其閭後為里尹在縣忽稱母疾取急縣令問其故志寛對曰母嘗有所苦志寛亦有所苦向患心疼是以知母有疾令初怒曰妖妄之詞繫於獄外遣馳驗之果如斯言令異之以聞高祖旌表門閭就拜員外散騎侍郎又曰裴敬彛絳州聞喜人也曾祖子通隋開皇中大中大夫母終廬於墓側哭泣無節目遂喪明俄有白鳥巢於墓樹子通兄弟八人皆友悌著名詔旌表其門鄉人至今稱為義門裴氏敬彛少聰敏七嵗解屬文性又端謹宗族咸重之號為甘露頃年十四侍御史唐臨為河北廵察使敬彛父智周時為内黄令為部人所訟敬彛詣臨論其寃臨大竒之因命作詞賦智周事竟釋特表薦敬彛補陳王府典籖智周在官忽暴卒敬彛時在長安忽涕泣不食謂所親曰大人每有痛處吾即輙然不安今日心痛手足皆廢事在不測得無戚乎遂請急倍道言歸果聞父喪羸毁逾禮事母復以孝聞乾封初累轉監察御史時母病有醫人許仁則足疾不能乘馬敬彛每自背負母病高祖特詔贈以縑帛仍官造靈轝服闋拜著作郎兼修國史儀鳳中自中書舍人歴吏部侍郎左庶子則天臨朝為酷吏所陷配流嶺南㝷卒又曰給事中李日知事母至孝時母年老常疾病日知輙急調侍數日而鬂髮變白㝷加朝散大夫其母未受命婦邑而卒將葬發引吏人齎告身而至日知於路上即時慟絶久之乃蘇左右皆哀慟莫能仰視廵察使衛州司馬路敬潜聞其孝悌之跡使求其狀日知辭讓不報服闋累遷黄門侍郎莊子曰夫事其親者不擇地而安之孝之至也尸子曰孝子一夕反起視其親衣之厚薄處之高卑淮南子曰公西華之養親也若與朋友處曾參之養親也若事烈君嚴主又曰孔子立孝不過勝母之閭説苑曰曾子芸𤓰而誤斷其根曾晳怒援大杖擊之曾子仆有頃乃蘇蹷然而起進曰曩者參得罪大人用力杖參得母疾乎退屏鼓琴而歌欲令晳知其平也孔子聞之告門人曰參來勿納也曾子自以無罪使謝孔子孔子曰汝不聞瞽瞍有子名舜舜事瞽瞍索而使之未嘗不在側求而殺之未嘗可得小箠則待大箠則走今子委身以侍暴怒殺身以䧟父不義不孝孰是之大乎説苑曰韓伯逾有過其母笞之泣母曰他日未嘗泣今日何泣也對曰逾向日得笞常痛今母力衰不能痛是以泣也家語曰子路問於孔子曰有人于此夙興夜寐耕芸樹藝手足胼胝以養其親然而名不稱孝何也子曰意者身不敬與辭不愼與色不悦與有一于此破其孝名古之人有言曰人與事不女欺言人與事實相通不欺也今盡養親之道而無三者之闕何為無孝之名乎孔子謂子路曰舉其身非力之少勢不可也夫内行不脩身之罪也脩身而身不彰友之罪也故君子入則篤行出則交賢何為無孝名也吕氏春秋曰樂正子春下堂傷足瘳而數月不出猶有憂色門人問之答曰吾聞曾子曰父母全而生之亦當全而歸之吾忘孝道是以憂也又曰凡理國家者必先務本務本莫過於孝夫孝三皇五帝之本務而萬事之紀也執一術而百善至盧盤佶孝子傳曰華光字榮祖彭城人父亡六日年四嵗問父所在母辛送光至父冡光再拜伏哭欲留冡下母抱歸悲咽三日不食至年七嵗欲見父像乃畫其父像朝夕拜謁如父師覺授孝子傳曰老萊子者楚人行年七十父母俱存至孝蒸蒸嘗着斑斕之衣為親取飲上堂脚跌恐傷父母之心僵仆為嬰兒啼孔子曰父母老常言不稱老為其傷老也若老萊子可謂不失孺子之心矣又曰閔損字子騫魯人孔子弟子也以徳行稱早失母後母遇之甚酷損事之彌謹損衣皆藁枲為絮其子則綿纊重厚父使損御冬寒失轡後母子御則不然父怒詰之損黙然而已後視二子衣乃知其故將欲遣妻損諫曰大人有一寒子猶上􅂷心若遣母有二寒子也父感其言乃止又曰程曾子孝孫桂陽人年七嵗喪母哀號哭泣不異常人祖母憐而嚼肉食之覺有味便吐出蕭廣濟孝子傳曰申屠􅈴字君逰河内汲人少失父與母孤貧傭作供養夏天多蚊子卧母床下以身遮之又曰宿倉野陳留尉氏人也年七嵗遭荒父母饑苦倉野求自賣與潁川王氏得大麥九斛後王氏免之累官除上黨太守後㝷覔父母經太原南郭忽見母遂還舊居母卒悲號而死又曰王敬廬陵石陽人父喪未殯假瘞宅後野火熛燎驚力不能救投火而死又曰媯皓字完起呉郡餘杭人父昆南都太守被劾入重罪皓年十六髠頭詣闕通章不省皓不飲食懐石腰中俱詣公卿及行路時輒出石置地叩頭流血覆面莫不傷懐遂奏理昆罪又曰伏恭字叔齊琅琊東武人也恭父大司湛孝謹敦睦世號伏不鬭恭事後母著孝建武初累遷太僕上臨辟雍於萬人中拜司空衆以恭孝行故先之又曰朱百年㑹稽山隂人家貧母以冬月亡無絮自此不衣綿與同縣孔凱善時寒月就孔宿飲酒醉眠孔以卧具覆之百年覺引去謂孔凱曰綿定竒溫因流涕悲慟又曰郭世通㑹稽永興人年十四喪父事後母勤身供養婦生男夫婦共議養此兒所廢者大乃瘞之母亡服竟追思未嘗釋衣又曰桑虞字子綱魏郡黎陽人晉黄郎沖之子喪父虞年十四毁瘠過禮日食百粒以糝藜藿又曰何子平廬江􅏦人事母至孝為揚州從事月俸得白米輒貨市粟麥人或問之答曰尊老不辦常得生米何容得食白粲有贈鮮者不可寄家則不肯受母喪年將六十有孺子之慕宋大明末饑荒八年不得營葬書夜號呌居室不蔽雨日兄子伯與為葺治子平曰我情事未申天地一罪人屋何宜覆孟宗列傳曰宗事母至孝母亦能訓之以禮宗初為雷池監奉魚於母母還其所寄遂絶不復食魚後宗典知糧榖乃表陳曰臣昔為雷池監母三年不食魚臣若典糧榖臣母不可以三年不食米臣是以死守之世説曰晉王祥事繼母朱氏甚謹家有柰樹結子好常使守之時大風雨祥猶至抱樹而泣母常夜持刀往祥所暗斫之値祥私起刃及被而已祥知母恠意不已因跪前請死朱氏於是感悟愛之如己子捜神記曰呉猛蜀郡人小兒時在父母傍卧時夏月多蚊而終不揺扇懼蚊虻之去我及父母也太平御覽卷四百一十三
