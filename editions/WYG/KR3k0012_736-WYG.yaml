body:
  text: 太平御覽卷七百三十六宋李昉等撰方術部十七祝符術祝說文曰祝祭主賛詞者周禮曰大祝掌六祝之辭以事鬼神􅅘祈福祥求永貞一曰順祝二曰年祝三曰吉祝四曰化祝五曰瑞祝六曰筴祝又曰掌六祈以同鬼神􅅘作六辭以通上下親疎遠近辨六號辨九祭九􅉔又曰小祝掌小祭祀䘮祝掌大䘮􅂆防之事甸祝掌四時之田詛祝掌盟詛類造攻說禬禜之祝號左𫝊曰晉范文子反自鄢陵使其祝宗祈死曰君驕侈而克敵是天益其疾也難將作矣愛我者惟祝我使我速死無及於難范氏之福也六月戊辰士爕卒又曰宋皇國父為太宰為平公築臺妨於農収子罕請俟農功之畢公弗許築者謳子罕聞之親執扑以行築者而抶其不勉者曰吾儕小人皆有闔廬以避燥濕寒暑今君為一臺而不速成何以為役謳者乃止或問其故子罕曰宋國區區而有詛有祝禍之本也又襄二十七年曰楚子木問於趙孟曰范武子之德何如對曰夫子之家事治言於晉國無隠情其祝史陳信於鬼神無愧辭又曰齊侯疥遂痁期而不瘳諸侯之賔問疾者多在梁丘據與裔欵言於公曰吾事鬼神豐於先君有加矣今君疾病為諸侯憂是祝史之罪也諸侯不知其謂我不敬君盍誅於祝固史嚚以辭賔公悅告晏子晏子曰日宋之盟屈建問范㑹之德於趙武趙武曰夫子之家事治言於晉國竭情無私其祝史祭祀陳信不愧其家事無猜其祝史不祈建以語康王康王曰神人無怨宜夫子之光輔五君以為諸侯主也公曰據與欵謂寡人能事鬼神欲誅於祝史子稱是語何對曰若有德之君外内不廢上下無怨動無違事其祝史薦信無愧心矣是以鬼神用饗國受其福祝史與焉其所以蕃祉壽考者為信君使也其言忠信於鬼神其適遇滛君外内頗邪上下怨疾動作避違從欲厭私髙臺深池撞鐘舞女斬刈民力輸掠其聚以成其違不恤後人暴虐滛從肆行非度無所還忌不思謗讟不憚鬼神神怨民痛無悛於心其祝史薦信是言罪也其蓋失數羙是矯誣也進退無辭則虛以求媚是以鬼神不饗其國以禍之祝史與焉所以夭昏孤疾者為暴君使也其言僣嫚於鬼神公曰然則若之何對曰不可為也言非誅祝史所能治山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之塩蜃祈望守之縣鄙之人入從其政偪介之關暴征其私承嗣大夫強易其賄布常無藝徵歛無度宫室日更滛樂不違内寵之妾肆奪於市外寵之臣僣令於鄙私欲養求不給則應人民苦病夫婦皆詛祝有益也詛亦有損聊攝以東姑尤以西其為人也多矣雖其善祝豈能勝億兆人之詛君若欲誅於祝史脩德而後可公說使有司寛政毁關去禁薄歛已責又曰衞太子禱曰曾孫蒯聵敢昭告皇祖文王烈祖康叔文祖襄公鄭勝從亂晉午在難不能治亂使鞅討之蒯聵不敢自佚備持矛焉敢告無絶筋無折骨無面傷以集大事無作三祖羞大命不敢請佩玉不敢愛韓詩外𫝊曰齊桓公至海丘見封人曰爾何為者也對曰臣海丘封人也桓公曰叟年幾何曰臣八十有三矣桓公曰羙哉壽也叟盍為寡人壽也對曰野臣不知為君王之壽桓公曰盍以叟之壽祝寡人封人奉觴再拜曰使吾君固壽金玉之賤人民是寶桓公曰善哉祝乎叟盍復祝乎封人曰使吾君好學而不怠賢者在側諫者得入曰善哉祝乎封人曰無使羣臣百姓得罪於吾君亦無使吾君得罪於羣臣百姓桓公不悅曰此言非夫前二言之善也叟其革之封人瀾然涕下曰願與吾終言之此言乃夫前二言之上也臣聞臣得罪於君可恩便僻之左右而謝也君乃赦之昔桀得罪於湯紂得罪於武王此君得罪於臣也至今未有為謝者公曰善扶而載之自御以歸禮外篇成王冠周公使祝雍曰辭達而已勿多也祝雍曰近於民遠於佞近於義嗇於時惠於財任賢使能丕顯先帝之光耀以承皇天之嘉禄欽順仲春之吉日遵並大道邦域康阜萬福之休靈始加昭明之元服推遠邪佞之志𢎞積文武之龍德肅勤髙祖之清廟六合之内靡不䝉德永永與天無極又曰百姓成羣立社祝曰今某月日君為某立社社祭土而主隂氣也五穀用成萬民以生敢用肥豚嘉蔬清酒敬致大神自今日以來福請雨止惟靈是聼子孫眉壽萬神含靈止雨祝曰天生五穀以養生民今天雨不止傷五穀如何神靈而行而止殺牲以賽神靈雨則不止鳴鼔攻之朱緑繩索而脅之史記曰楚大發兵加齊齊王使淳于髠之趙請救兵齎金百斤車馬十駟淳于髠仰天大笑冠纓索絶王曰先生少之乎髠曰何敢王曰笑豈有說乎髠曰今者臣從東方來見道旁有穰田者操一豚蹄酒一壺而祝曰甌窶滿篝汙邪滿車五穀蕃熟穰穰滿家臣見其所持者狹而所欲者奢故笑之吳越春秋曰勾踐五年夏五月將與大夫種范蠡入臣於吳羣臣皆送臨水祖道大夫種前為祝其辭曰皇天祐助前沈後楊禍為德根憂為福堂威人者㓕服從者昌王雖牽致其後無殃君臣生離感動上皇衆夫哀悲莫不感傷臣謹再拜伏稱萬嵗上酒三觴勾踐仰天太息舉杯垂涕嘿無所言宋書曰王悦宋明帝泰始中為黄門郎上以其廉介賜良田五頃以為侍中在門下盡心力檢校御府太官太醫諸署時承奢汰之後奸竊者衆悦案意刻覈無所避獲奸巧甚多於是衆署共呪詛悅之病甚恒見兩烏衣人廹之及卒上乃收典掌者十許人桎梏之送淮隂宻令渡瓜歩江投之中流北史曰後魏時有沙門惠憐自云呪水飲人能差諸病病人就之者日有千數靈太后詔給衣食事力使於西南療百姓北齊書曰婁太后為愽陵王納崔㥄妺為妃勅中使曰好作法用勿使崔家笑人婚夕顯祖舉酒祝曰新婦宜男孝順富貴㥄奏曰孝順出自臣門富貴恩由陛下尸子曰鮑叔為桓公祝曰使臣無忘在莒時管子無忘在魯時寗武子無忘車下時靈鬼志曰石虎時有胡道人驅驢作估于外國深山中行有一絶澗窈然無底行者恃山為道魚貫相連忽有惡鬼牽之下入澗中道人急性便大嗔惡尋跡澗中惡鬼祝誓呼諸鬼神下遠忽然出一平地城門外有一鬼大鏁項脚著大桎鬼見道人便乞食曰得食當與汝既至門乃是鬼王所治前見王道人便自說驅驢載物為鬼所奪尋跡至此湏臾即得其驢載物如故賈誼新書曰湯見設􅃠者四面張􅃠而祝之曰自天下者自四方至者皆羅我網湯曰嘻盡之矣非桀其孰能如此令去三面教之曰蛛蝥作網今之人脩緒欲左者左欲右者右欲髙者髙欲下者下吾請受其犯命者民聞之曰德及禽獸而况我乎於是下親其上說苑曰齊遣淳于髠到楚為人短小楚人甚薄之謂曰齊無人耶而使子來子何長也對曰臣無長腰中七尺之劔欲斬無狀王曰止吾但戯子耳即與髠共飲酒謂髠曰吾有􅄷在吳國子定能為報之乎對曰來見道旁郢民持一頭魚上田祝曰上得萬木下得千斛臣竊笑之以為禮薄而辭多祭輕而望重王今與吾半日之樂而委以吳王非其計楚王嘿然新序曰寅中行將軍召其大祝而欲加罪曰子為我祝辭令不精也犧牲不肥澤也威儀不謹敬耶齊戒不潔清耶乃使吾國將亡何也祝簡對曰昔吾先君中行宻子有車十乘不憂其薄憂其德義之不足也今之主君有車百乘不憂德義之薄惟患車之不足也且舩車飭則賦歛厚賦歛厚則民怨而謗詛矣君苟以為祝之有益於國則謗詛亦將為亡矣一人祝之一國詛之一人祝不勝萬人詛國亡亦宜乎祝其何罪中行子嘿然而慙風俗通論曰案明帝起居注東廵太山到榮陽有烏飛鳴乘車上虎賁王吉射之中而祝曰烏鳴啞啞引弓射洞右掖陛下壽萬嵗臣為二千石明帝賜錢二百萬世說曰劉伶嗜酒其婦止之伶祝曰天生劉伶一飲一斛五斛觧醒婦人之言慎不可聼蔡邕祖餞祝曰今嵗淑月日吉時良爽應孔加君當遷行神龜吉兆休氣煌煌著卦利貞天見三光鸞鳴雍雍四牡彭彭君既升輿道路開張風伯雨師洒道中央陽遂求福蚩尤群兵倉龍來轂白虎扶行朱雀道引𤣥武作侣勾陳居中厭伏四方君徃臨邦長樂無強符黄帝出軍訣曰昔者蚩尤揔政無道殘酷無已黄帝封之於涿鹿之野暴兵中原黄帝仰天歎息愀然而睡夣西王母遣人披𤣥狐之裘以符受之曰太一在前天一備後得兵契信戰則尅矣黄帝寤思其符立壇請而祈之祭以太牢用求神祐湏臾𤣥龜巨鼇銜符出從水中置壇中而去黄帝再拜稽首親自授符視之乃所夣故黄帝佩之以攻即日擒蚩尤龍魚河圗曰𤣥女出信符付黄帝制蚩尤葛仙公别𫝊曰仙公付書符投江中順流而下次又投一符逆流而上次投一符不上不下停住水中而向二符皆還就之神仙𫝊曰漢章帝問劉馮殿下有恠常有朱衣披髮持燭以相随而走可劾不馮曰可帝因使人偽為之馮以符攝之使人頓地帝驚曰以相試耳乃觧之又仙人帛和弟子孫真舅氏當葬路遠不得車馬和以一凾符與真誡曰汝持此行二十里當有以車牛給汝者又有厨供不可發此凾真行果有一少年御一車牛給真并送酒食到即舅家以凾著衣箱中真弟不知發凾凾有紙畫車牛一人御之因失車牛所在列仙𫝊曰涓子釣於澤得符於鯉魚腸中續搜神記曰吳猛字世雲有道術狂風暴起猛擲符上便有一飛鳥接符去湏臾風静人問之答云南湖有遭此風者兩舫人是道士呼天求故符以止風抱朴子曰劉安君用藥及符能令人含笑則為婦人蹙面則為老夫踞地則為小兒葛洪神仙𫝊曰葛𤣥見賣大魚者謂曰暫煩此魚徃河伯處魚主曰魚已死𤣥曰無苦乃丹書紙内魚口中投水俄頃魚還躍上岸吐墨書青色如木葉而飛去術後漢書曰郭憲字子横建武七年代張堪為光禄勲從駕南郊憲在位忽乃向東北含酒三潠執法奏為不敬詔問其故憲對曰齊國失火故以此厭之後齊果上火災與郊同日又曰樊英字季齊善風角星筭河洛七緯常有暴風從西方來起英謂學者曰成都市火甚盛因含水西向潄之乃令記其日時客後有從蜀都來云是日大火有黑雲卒從東起湏臾大雨火遂得㓕於是天下稱其術藝邵氏家𫝊曰邵信臣為少府南陽遭火燒數萬人信臣時在丞相匡衡坐心動含酒東向潄之遭火處見雲西北來冥晦大雨以㓕火雨中酒香桂陽列仙𫝊曰成武丁正旦大㑹以酒沃廷中有司問其故對曰臨武縣失火以酒救之遣騐果然神仙傳曰欒巴為尚書正旦㑹得酒西南潄云成都失火作雨救之後使至果如其言抱朴子曰外國方士能祝龍臨淵禹歩龍浮出長數十丈方士吹之則縮短數寸掇取著壺中輙四五寸以水養之餘國少雨屢旱者輙賫一龍徃賣之一龍千金取頭著淵中即興雲雨也又曰廬江太守華念思就道士學㣲視術未滿百日夜見天文及四鄰不復有屋舎籬障有妾死已久亦見其形與語如平生念思方信道術又曰季阿者行道逢奔車阿兩脚中車脚即折弟子占弼見之驚怖阿湏臾取斷脚相續如故也淮南萬畢術曰慈石提棊取雞磨針鉄以相和慈石棊頭置局上自相投也又曰鵲腦令人相思取雌雄鵲各一燔之四道通丙寅日與人共飲酒置腦酒中則相思也又曰老槐生火膠橈水則清敝箕止鹹取箕以内醬中鹹著箕矣又曰首澤浮針取頭中垢以塗塞其孔置水即浮又曰燒角入山則虎豹自遠惡其臭也又曰赤布在戸婦女留連取婦人月事布七月七日燒為灰置楣上即不復去勿令婦人知取苓皮置􅑥中自沸如雨也又曰梧木成雲取梧木置十碩瓦􅑥中氣盡則出雲又曰銅甕雷鳴取沸湯置甕中沉之井裏則鳴數十里取家祠黍以啖兒兒不思母又曰取門冬赤黍漬以狐血隂乾之欲酒取一丸置舌下酒吞之令人不醉又曰門冬赤黍薏苡為丸令婦人不妬又曰取雞子去殻然艾火内空中疾風髙舉自飛去取亡人衣褁磁石懸家中亡者自歸矣又曰取蜘蛛塗布天雨不能濡之又曰取馬尾犬尾置朋友夫妻衣中自相憎矣又曰削冰令圓舉以向日以艾承其影則火生又曰取牛膽塗熱釡即鳴矣又曰取伯勞血塗金人不取化為石也又曰拔劔倚門兒不驚又曰狼皮在户羊不出牢羊畏狼又曰燒木賣木賣酒人民自聚取失火家木刻作人形朝朝祭之人聚也又曰取守宫蟲餌以丹隂乾塗女人身男合即㓕又曰蝟膏塗鐡柔不折甑瓦止烏鳴取甑底抵之則止又曰犀角置狐穴中狐不歸又曰鳩脛血塗雞頭不能起又曰馬齧人取彊蠶塗上唇即止復不齧人太平御覽卷七百三十六
