  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_557-1a, image: WYG0898/WYG0898-0157c.png}
body:
  text: 太平御覽卷五百五十七宋李昉等撰禮儀部三十六塜墓說文曰塜髙墳也壟丘也墓兆域也釋名曰塜種也象山頂之髙者壠起墓孝子思慕之處也丘陵象其形也書曰武王克商封比干之墓周禮曰大司徒以本俗六安萬民一曰媺音美宫室二曰族墳墓又曰塜人掌公墓之地辨其兆域而為之圖先王之葬居中以昭穆為左右公君也圖謂畫其地形及丘龍所處而塟之先王造塋者昭居左穆居右夾處東西凡諸侯居左右以前卿大夫士居後以其族子孫各就其所出王以尊卑處其前後而亦併昭穆凡死於兵者不入兆域戰敗無勇投諸塋外以罰之凡有功者居前居王墓之前處昭穆之中央以爵等為丘封之度與樹數别尊卑也王公曰丘諸臣封漢律曰列侯墤髙四尺闗内侯以下至庶人各有差大葬既有日請度甫竁遂為之尸竁尺絹切又上内切葬穿壙也又音串及竁以度為丘遂共喪之􅉎器及葬言鸞車象人鸞車巾車所飾遣車也亦設鸞旗象人謂以芻為人言問其不如法及􅉎執斧以涖臨下棺也遂入藏凶器正墓位蹕墓域守墓禁位謂丘封所居前後也禁所謂營限也凡祭墓為尸凡諸侯及諸臣塟於墓者授之兆為之蹕均其禁又曰墓大夫掌邦墓之域為之圖凡邦中之墓地民所塟地令國民族塟而掌其禁令族塟各從其親凡争墓地者聴其獄訟帥其屬而廵墓厲居其中之室以守之厲塋限遮列禮曰適墓不登壠助葬必執紼禮記曰孔子既得合葬於防言既得者少孤不知其墓曰吾聞之古者墓而不墳墓謂兆域土之髙者曰墳今丘也東西南北之人不可以不識音志也於是封之崇四尺四尺葢周之制也孔子先反掌修虞事門人後雨甚至後時封也孔子問焉曰爾來何遲也曰防墓崩孔子不應三三言之以孔子弗聞孔子泫然流涕曰吾聞之也古不脩墓脩猶治也又曰易墓非古也又曰孔子曰朋友之墓有宿草而不哭焉宿草謂陳根也為師喪三年於朋友期可又曰子路去魯謂顔淵曰何以贈我贈送曰吾聞之也去國則哭于墓而後行反其國不哭展墓而入無君事主於孝哭言哀去展省視之謂子路曰何以處我處猶安也子路曰吾聞之也過墓則式過祀則下居者主致敬又曰晉趙文子與叔譽觀于九原叔譽叔向也文子曰死者如可作也吾誰與歸叔譽曰其陽處父乎文子曰行并直於晉國不没其身其智不足稱也并猶専也謂剛而専已為狐射姑所殺没終也其咎犯乎文子曰見利不顧其君仁不足稱也我則隨武子乎利其君不忘其身謀其身不遺其友晉人謂文子知人左傳曰蹇叔曰晉人禦師必於殽殽有二陵焉其南陵夏后臯之墓也又曰鄭子展子産帥車七百乘伐陳陳侯扶其太子􅅯師奔墓又曰吴將伐齊越子率其衆以朝吴將皆喜唯子胥懼曰是豢吴也夫闔閭聞之賜之屬鏤以死屬鏤劒名將死曰樹吾墓檟檟可材也吴其亡乎史記曰黄帝崩葬橋山武帝廵朔方還祭黄帝塜曰吾聞黄帝不死今有塜何也左右曰黄帝已上天羣臣藏其衣冠故有塜帝曰吾誠得如黄帝視去妻子如脫屣也又曰樗里子卒葬渭南章臺之東曰後百歲當有天子之宫夾我墓至漢興長樂宫在其東未央宫在其西武庫正直其墓漢書曰朱買臣獨行歌道中負薪墓間故妻與夫俱上塜見買臣饑寒呼飯飲之又曰驃騎將軍霍去病卒天子悼之發屬國𤣥甲軍陳自長安至茂陵為塜像祁連山又曰嚴延年東海下邳人為河南太守母來見訊囚大驚謂延年曰天道神明人不可獨殺我不自意當老見壯子被刑戮也行矣為汝東歸掃除墓地耳遂去歸郡見昆弟宗人復為言之後歲餘果敗東海莫不賢其母又曰哀帝命將作為董賢起塜營義陵傍内便房剛栢題凑外為徼道周垣數里闕罘罳甚盛又曰莽奏貶傅太后為定陶恭王母丁太后為丁姬莽言恭王母不臣丁姬妾至葬渭陵冡髙與元帝山齊請發恭王母及丁姬塜取其璽綬消滅徙恭王母歸定陶葬王塜次而葬丁姬復其故太后以為已定之事不湏復發莽固争之後詔曰因改故棺為致椁作塜祠以太牢謁者護既發𫝊太后塜崩壓死殺數百人開丁姬椁火出四五丈吏卒以沃滅廼得入竞燔椁中物開傳太后椁時臭聞數里公卿在位皆阿莽共入錢帛遣子弟及諸生四夷凡十餘萬人操持作具助將作掘平恭王母丁姬塜二旬間皆平莽又周棘其處以為世誡云時有羣鸞數千銜土投丁姬穿中又曰張賀為掖庭令及宣帝即位賀已死子又早亡上追思賀恩封其冡置守冢二百家又曰夏侯勝字公長遷太𫝊卒官賜冡塋葬平陵太后為素服五日報師傅之恩儒者以為榮又曰原涉自以先人墳墓儉約非孝也廼大治冡舎周閣重門初武帝時京兆曹氏葬茂陵傍謂之為京兆阡涉慕之廼買地開道立署曰南陽阡人不肯從謂之原氏阡東觀漢記曰帝感李通首創大謀每幸南陽常遣使者以太牢祠通冡又曰建武三年以皇祖皇考墓為昌陵後改為章陵因以舂陵為章陵縣二十六年春正月初作夀陵將作大匠竇融上言園陵廣寰無慮所用帝曰古帝王之葬皆陶人瓦器木車茅馬使後世之人不知其處太宗始終之義景帝能遵孝道遭天下反覆而獨完其福豈不美哉今所制地不過二三頃無為陵地裁令流水而已又曰祭彤字次孫早孤以至孝稱值天下亂野無烟火而彤獨在塜側每賊過見其尚㓜而有志節竒而哀之後漢書曰楊震字伯起改葬華隂逺近畢至先葬日有鳥髙丈餘喪前悲鳴葬畢乃去於是立石鳥像於其墓所又曰郭伋徵大中大夫卒時年八十六帝親臨賜塜塋地又曰种暠上音冲下音杲為遼東郡薨并凉邊民咸為發哀匈奴聞暠卒舉國傷惜單于每入朝賀見墳墓輙哭祭又曰帝祠章陵過湖陽祠樊重墓追爵謚為夀張敬侯立廟於湖陽車駕每南廵帝幸其墓賞賜大會又曰韓稜遷南陽太守特聴得過家上冡郷里以為榮又曰蔡順母平生畏雷自亡後每有震雷順輙圜冡泣曰順在此後太守鮑衆舉孝亷順不能逺離墳墓遂不就又曰温序拜謁者遣護𦍑校尉序行部至襄武為隗囂别將荀字所拘刼伏劒而死序主簿韓遵從事王忠持屍歸殮光武聞而憐之命忠送喪到洛陽城傍為冡地賜榖千斛縑五百疋除三子為郎中長子夀服竟為𤣥平侯相夢序告之曰乆客思鄉里夀即棄官上書乞骸骨歸葬帝許之乃反舊塋焉魏畧曰曹操微時人莫知之惟橋𤣥見而異焉謂曰今天下將亂安之者其在君乎操感其知已及後經過𤣥墓輙悽愴致祭魏志曰管輅過毌丘儉墓下倚樹哀吟曰𤣥武藏頭蒼龍無足白虎銜尸朱雀悲哭四危以備法當滅族卒如其言又曰幽州牧劉虞署田疇為從事奉使未至虞已為公孫瓚所害及至謁祭虞墓陳章表哭泣而去吴書孫堅家在富春塟于東城冡上數有光怪雲氣五色王隠晉書曰初太康元年汲縣民盗發魏安釐王塜得竹書漆字又曰交廣記吴將吕岱為廣州遣掘尉佗塜費損無獲佗雖僣然能慎終其身乃令後不知其處鑒于牧豎所殘也又曰愍帝建興中曹嶷發景公及管仲塜尸並不朽繒帛珍寳巨萬又曰金鄉縣北鑿石為塜云得白蛇白兎及得金故曰金鄉又曰王褒字偉元少立操尚父為晉文王所害絶世不仕立屋墓側以教授為務旦夕常至墓前朝拜輙悲號斷絶墓前一栢樹褒常所攀又曰滕脩南陽人也為廣州牧脩在海南積年為邊夷所附卒請葬京師帝嘉其惠賜墓田一頃又曰東海王越屯許路經滎陽過嵇紹墓哭之悲慟刋石立文表賜官爵帝乃遣使策賜侍中光禄大夫加金章印綬進爵為侯賜墓田一頃守冢一户祠以少牢又曰盧志言于成都王頴曰黄橋戰亡者有八千餘人既經夏暑露骨中野可為傷惻昔周塟枯骨况此等致死王事乎頴乃造棺八千餘枚以成都國秩為衣服殮塟祭於黄橋復樹枳籬為之塋域又立都祭堂刋石立碑紀其赴義之功使亡者家四時祭祀有所晉書載記曰西湖梁國兒于平凉作夀塜每將妻妾入塜飲讌酒酣伏靈床而歌時人或譏之國兒不以為意前後征伐屢有功姚興以為鎮北將軍年八十餘乃死宋書曰宋文帝元嘉二十五年行幸江寧經司徒劉穆之墓遣使致祭焉後魏書曰李冲字思順髙祖時為尚書僕射卒塟覆舟山近杜預塜髙祖之意也後車駕自鄴還洛經冲墓左右以聞髙祖卧疾望墳掩淚又曰傅永字脩期常登北邙于平坦處奪矛躍馬盤旋瞻望有終焉之志逺慕杜預近好李冲王肅欲附葬于墓遂買左右地數畆遺勅子叔偉此吾之永宅也禮系曰天子墳髙三雉諸侯半之卿大夫八尺士四尺天子樹松諸侯樹栢大夫樹楊士樹榆尊卑差也楚漢春秋曰惠帝崩吕太后欲為髙墳使從未央宫坐而見之諸侯諌東陽侯垂泣曰日夜見惠帝塜悲哀流涕無以傷生也臣竊哀之於是太后乃止蕭方等三十國春秋曰晉義熙九年盗發故驃騎將軍卞壼墓剖棺掠之壼屍面如生兩手悉拳爪生逹背戰國策曰齊宣王見顔觸曰觸前觸亦曰王前王作色曰士貴乎觸曰士貴昔秦攻齊令曰有敢去柳下季壟五十步而採樵者罪死不赦令曰有能得齊王頭封萬户由是觀之生王之頭不如死士之壟雀鴻前趙録曰張暠隴西人也事母至孝母死既塟於墓側哀感幽顯歲餘而墓地自裂棺亦自破母還蘇活方言曰塜秦晉之間謂之墳或謂之培或謂之堬或謂之采或謂之垠或謂之壟自闗以東謂之丘小者謂之塿大者謂之丘凡塟而無墳謂之墓所以安墓謂之撫太平御覽卷五百五十七
