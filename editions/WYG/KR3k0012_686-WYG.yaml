  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_686-1a, image: WYG0899/WYG0899-0158a.png}
body:
  text: 太平御覽卷六百八十六宋李昉等撰服章部三冕纓弁冕說文曰冕大夫以上冠䆳冕延垂旒紞纊昔者黄帝初制釋名曰祭服曰冕冕猶俛也俛平直貌也𤣥上纁下前後垂珠有文飾也白虎通曰麻冕者何周宗廟之冠也十一月之時陽氣俛仰黄泉之下萬物被施如冕前俛而後仰故謂之冕也所以用麻為之者女功之始示不忘本不以皮皮乃太古未有禮文之服也又冕所以前後􅃉延者何示進賢退不能也垂旒者示不視邪纊塞耳示不聴䜛故水清無魚人察無徒明不尚極知下故禮曰天子玉藻十有二旒前後􅃉延世本曰黄帝作旃冕宋均曰通帛為旃冕冠之有旒􅀿劭云周始垂旒也又三禮圖曰黄帝戴黄冕周禮曰弁師掌王之五冕朱裏延紐延冕之覆也紐小鼻笄所貫也五采繅十有二就繅合五色絲為之垂于延之前後各十有二所謂邃延也就成也繩之毎一匝而貫五采玉十二斿則十二玉也又曰司服掌王之服祀昊天上帝則大裘而冕祀五帝亦如之六服同冕享先王則衮冕享先公饗射則鷩冕祀四望山川則毳冕祭社稷五祀則絺冕祭羣小五祀則𤣥冕禮曰有虞氏皇而祭周人冕而祭皇冕属畫羽飾之又曰諸侯冕而舞大武諸侯之僣禮也又曰王戴冕璪十有二旒則天數也又曰𤣥冕齋戒鬼神隂陽也又曰天子之冕朱緑藻十有二諸侯九上大夫七下大夫五士三此以文為貴也又曰魏文侯問於子夏曰吾端冕而聽古樂則惟恐卧鄭𤣥曰端𤣥衣又曰君子端冕則有敬色大戴禮曰古者冕而前旒所以蔽明黈纊塞耳所以揜聴書曰王麻冕黼裳由賓階隮鄭康成曰三升布冠也卿士邦君麻冕蟻裳入即位蟻謂色𤣥也太保太史太宗皆麻冕彤裳𫝊曰晉士㑹帥師滅赤狄晉侯請于王以黻冕命士㑹將中軍且為太傅又曰公還及方城季武子使公冶問問公起居公冶季氏屬大夫公與公冶冕服以卿𤣥冕賞之固辭而後受公冶疾聚其臣曰我死必無以冕服斂非徳賞也又曰王使詹桓伯辭於晉曰我在伯父猶衣服之有冠冕水木之有本源民人之有謀主伯父若裂冠毁冕拔本塞源專棄謀主雖戎狄其何有余一人論語曰子曰禹吾無間然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕又曰行夏之時乗殷之輅服周之冕又曰麻冕禮也今也純儉吾從衆國語曰周襄王賜晋文公命晉侯端委入太宰以王命命之冕服内史贊之三命而後即服冕家語曰子路問於孔子曰有人於此披褐而懐玉如何子曰國無道隠名可也國有道則衮冕而執玉五經要義曰冕制奈何禮器曰冕冠長六寸廣八寸員前冕緇布在上五采組十二夏殷之冕如周制矣其旒色異夏冕黑白赤組旒殷冕黑黄青組旒應劭漢官儀曰周冕與古冕畧等周加垂旒天子前後垂真白珠各十二蔡邕獨斷曰漢明帝採尚書臯繇及周官禮記以定冕制皆廣七寸長尺二寸係白珠于其端十二旒三公及諸侯九旒卿七旒又曰祀天地明堂平冕崔豹古今注曰牛享問曰冕旒稱繁露何也答曰綴而下垂如露之繁多故曰繁露摯氏决疑要注曰秦除六冕之制明帝漢明帝也永平中使諸儒案古文始復造衮冕符子曰龍逢諌桀曰臣觀君之冕非冕冕危石觀君之履非履履春氷未有冠危石而不壓蹈春氷而不䧟也陳夀益部耆舊傳曰郭賀拜荆州刺史明帝廵狩到南陽特見嗟嘆賜以三公之服黼黻冕旒勅去幨露冕使百姓見此衣服以彰其徳何法盛晉中興書曰初中興儀服不備又冕旒飭以翡翠珊瑚雜珠顧和奏舊冕十二旒皆用玉今不能得玉可用白璇珠於是始下太常改治王智深宋記曰明帝詔曰朕以大冕郊祀天地宗祀明堂以法冕祀太廟元正大㑹朝諸侯以絺冕小㑹宴饗餞送諸侯臨軒命王公以繡冕征伐不賔講武校獵隋書曰六等之冕皆有黈纊黄錦為之其大如橘自皇太子以下並犀導青纓纓說文曰纓冠系也釋名纓頸也自上而下繫於頸也禮曰𤣥冠丹組纓諸侯之齊冠也𤣥冠綦組纓士之齊冠也又曰𤣥冠紫纓自魯桓公始也傳曰石乞孟黶敵子路以戈擊之斷纓子路曰君子死冠不免不使冠在地結纓而死漢舊儀曰冠髙山之冠飛羽之纓漢書曰終軍字子雲濟南人上書請受長纓必羈南越王而致之闕下乃使使越越王舉國内属又曰江充見犬臺宫晋灼曰黄圖上林有犬臺宫也冠襌纚歩揺冠飛翮之纓張宴曰冠禪纓小歩則揺纓隨冠而動若鳥翮然晋書曰石季龍子儀陽公鑒時鎮闗中役煩賦重失闗右之和其女官李松勸鑒文武有長髪者拔為冠纓餘以給宫人季龍聞之大怒以其右僕射張離為雍州刺史以察之信然徴鑒還鄴収松下廷尉後魏書曰李彪嘗使齊着大頭纓纓裾至腰張融笑之曰北國士大夫㡌裾亦有等級不彪曰上士至腰中士至膝下士之徒盖髪而已山海經曰拘纓之國一手把纓管子曰桓公親郊管仲詘纓㨗袵孟子曰孺子歌曰滄浪之水清兮可以濯我纓楚詞亦同莊子曰昔趙恵文王喜劔太子患之募左右孰能說王左右曰莊子當能太子乃使人以千金奉莊子不受與使者俱徃太子曰吾王所見唯劔士篷頭突鬢冠曼胡之纓短後之衣瞋目而語難王恱之今大夫必儒服而見王事必大逆莊子曰請為劔服又曰原子居衞正冠而纓絶振衿而肘見言貧也淮南子曰聖人見鳥獸髯胡之制作緌纓之首飾韓子曰鄒君好服長纓左右皆作長纓纓甚貴鄒君患之問左右左右對曰君服之百姓亦多服是故貴鄒君因自斷其纓而出國中皆不服長纓說苑曰楚莊王賜羣臣酒日暮燭滅乃有人引美人之衣者美人援絶其冠纓告王趣火來視絶纓者王曰賜人酒使醉失禮柰何欲􅂋婦人之節而辱士乎乃命皆絶其冠纓尉繚子曰天子𤣥冠𤣥纓諸侯素冠素纓自大夫以下皆皂冠皂纓後漢崔駰逹指曰有事則褰裳濡足無事則攝纓整衿魏徐翰齊都賦曰纎纚細纓薄配蟬翼自尊及卑須此元服晉陸機詩曰冠冕無醜士長纓皆俊民晉成公綏七唱曰瓊弁曜首玉纓照目宋謝靈運七濟曰翠緌媚纓朱裳妍形劉梁七舉曰華組之纓從風紛紜弁釋名曰弁如兩手相合抃時也以爵韋為之謂之爵弁以鹿皮為之謂之皮弁以韎韋為之謂之韋弁也系本曰魯昭公作弁宋均曰作素弁也五經通義曰皮弁冠前後玉飾白虎通曰皮弁者何謂也所以法古至質冠之名也弁之言樊也所以持髪也上古先質服鹿皮取其文章也故禮曰三王共皮弁素積爵弁何謂也其色如爵頭周人宗廟之冠也周尚赤所以不純赤但如爵頭也三禮圖曰爵弁士助君祭之服以祭其廟無旒韋弁王及諸侯兵服也三禮冠弁圖曰皮弁以鹿皮淺毛黄白色者為之髙尺二寸春三月習大射行冠之事輿服志曰皮弁與委貎同制長七寸髙四寸制似覆杯前髙廣後卑銳所謂夏之母追上音牟下音唯殷之章甫也行大射禮於辟雍公卿諸侯大夫行禮者冠季貎執事者冠皮弁衣緇麻衣重巴輿服志曰爵弁一名冕廣八寸長二寸如爵形前小後大其上似爵頭色有收持笄所謂夏收殷冔况羽切者也祠天地五郊明堂雲翹舞樂人服之詩曰淑人君子其帶伊絲其弁伊騏又曰有匪君子充耳琇瑩㑹弁如星又曰有頍者弁實維伊何又曰側弁之俄屢舞傞傞禮曰三王共皮弁素積又曰祭之日王皮弁以聽祭報又曰太學始教皮弁祭莱示敬道也又曰古者天子諸侯必有公桑大昕之朝君皮弁素積卜三宫夫人世婦之吉者桑于公桑左傳曰楚子玉自為瓊弁玉纓未之服也先戰夢河神謂已曰畀予予賜汝孟諸之麋又曰天王使劉定公勞趙孟於頴館於洛汭劉子曰美哉禹功明徳逺矣微禹吾其魚乎吾與子弁冕端委以治民臨諸侯禹之力也周禮曰司服掌王之吉凶衣服凡兵事韋弁服鄭𤣥曰以韎韋為弁也春秋傳曰晋郄至衣韎之跗注是也眡朝則皮弁服鄭𤣥曰視朝視内外之事也皮弁之服十五升白布衣積素以為裳也凡甸冠弁服鄭𤣥曰甸獵也冠弁委貌也其緇布衣亦積素以為裳諸侯以為視朝之服凡㓙事服弁服弁服䘮冠也其服斬衰齊衰凡弔事弁絰服弁絰者如爵弁而素加環絰又曰弁師掌王之皮弁㑹五采玉􅋒象邸玉笄􅋒結也皮弁之縫中貫結五采玉以為飾邸下祗也以象骨為之諸侯及公卿大夫之冕韋弁皮弁弁絰各以其等為之儀禮曰士冠服爵弁服鄭𤣥曰此與君祭之服同也榖梁曰弁冠雖舊必加於首周室雖衰必先諸侯家語曰諸侯皮弁以告朔于太廟卒朔然後服之以視朝漢書曰韓延夀為頴川太守令文學校官諸生弁執爼豆又曰王莾初献新樂於明堂太廟羣臣始冠麟􅅊之弁魏志曰帝以楊彪故漢太尉使着鹿皮冠彪辭讓不聽竟着布單衣皮弁以見隋書曰新羅嘗遣使朝貢李子雄至朝堂與語因問其冠制所由其使者曰皮弁遣象安有大國君子而不識皮弁也子雄因曰中國無禮求諸四夷使者曰自至已来此言之外未見無禮憲司以子雄失詞奏劾其事竟坐免又曰何稠叅㑹今古多所改創魏晉以來皮弁有纓而無笄稠曰此古田獵之服也今服以入朝宜變其制故弁施象牙簮導自稠始也鄴中記曰石季龍宫婢數十人盡着皂褠頭着神弁如今之禮先冠也太平御覽卷六百八十六
