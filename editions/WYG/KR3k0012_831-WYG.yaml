body:
  text: 太平御覽巻八百三十一宋李昉等撰資産部十一獵上周禮地官曰鄉師凡四時之田前期出田法于州里簡其鼓鐸旗物兵器修其卒伍田法人徒及所當有及期以司徒之大旗致衆庶而陳之以旗物辨鄉邑而治其政令刑禁巡其前後之屯而戮其犯命者斷其爭禽之訟又曰迹人掌邦田之地政為之厲禁而守之凡田獵者受令焉又曰小司徒凡起徒役毋過家一人以其餘為羨唯田與追胥竭作鄭司農云羨饒也田謂獵也追寇賊也竭作盡行又夏官大司馬之職曰中春遂以蒐田有司表貉誓民鼔遂圍禁火弊獻禽以祭社有司大司徒掌大田役治徒庻之政令表貉立表而貉祭也誓民誓以犯田法之罰也中夏遂以苗田如蒐之法車弊獻禽以享礿夏田為苗擇取不孕任者若治苗去不秀實者云車弊驅獸之車中秋遂以獮田如蒐之法羅弊致禽以祀祊秋田為獮獮殺也羅弊罔止也秋田主用罔中殺者多也皆殺而罔止中冬遂以狩田以旌為左右和之門羣吏各帥其車徒以叙和出左右陳車徒有司平之旗車卒間以分地前后有屯百步有司巡其前後險野人為主易野車為主冬田為狩言守取之無所擇也軍門曰和今謂之壘門立兩旗以為之叙和出用次第出和門也旗軍吏所載分地明其部曲疎數前后有屯百步車徒異羣相去之數也險野人為主人居前易野車為主車居前既陳乃設驅逆之車有司表貉于陳前驅出禽獸使趨田者也逆逆要不得令走禮記王制曰天子諸侯無事則歲三田一為乾豆二為賓客三為充君之庖三田者夏不田盖夏時也乾豆謂腊之以為祭祀豆實也庖廚也無事而不田曰不敬田不以禮曰􅍊天物不敬者簡祭祀畧賓客天子不合圍諸侯不掩羣為盡物也天子殺則下大綏諸侯殺則下小綏綏當為緌緌有虞氏之旌也下謂弊之大夫殺則止佐車佐車止則百姓田獵佐車驅逆之車獺祭魚然後虞人入澤梁豺祭獸然後田獵鳩化為鷹然後設罻羅草木零落然後入山林昆蟲未蟄不以火田取物必順時候也梁絶水取漁者罻小網也昆明也明蟲者得陽而生得隂而藏不麛不卵不殺胎不殀夭重傷未成物殀斷殺少長曰夭不覆巢覆敗也又月令曰季春之月田獵罝罘羅網畢翳餧獸之藥毋出九門為鳥獸方字乳傷之逆天時也獸罟曰罝罘鳥罟曰羅網小而柄長謂之畢翳射者所以自隱也凡諸罟毒藥禁其出九門明其常有時不得用耳今月令無罘翳為弋又季秋之月天子乃教於田獵以習五戎班馬政教於田獵因田獵之禮教民以戰法也命僕及七騶咸駕載旌旐授車以級整設於屏外僕戎僕及馭夫七騶謂趣馬主為諸官駕説者也級等次也整正列也設陳也屏所田之地門外之蔽司徒搢扑北面誓之天子乃厲設執弓挾矢以獵厲飾謂戎服尚威武也命主祠祭禽於四方以所獲禽祀四方之神也司馬職曰羅弊致禽以祀祊左傳文十年曰陳侯鄭伯㑹楚子于息冬遂及蔡侯次于厥貉將以伐宋宋逆楚子遂道以田孟諸宋公為右盂鄭伯為左盂盂田獵陳名命夙駕載燧又襄四年曰昔周辛甲之為太史也命百官官箴王闕辛甲周武王太史闕過也使百官各為箴辭戒王過於虞人之箴虞人掌田獵曰茫茫禹迹畫為九州茫茫逺貌畫分也經啓九道啓開九州之道民有寢廟獸有茂草各有攸處德用不擾人神各有所歸故得不亂在帝夷羿冒于原獸冒貪也忘其國恤而思其麀牡言但念獸武不可重重猶數也用不恢于夏家羿以好武雖有家而不能恢大之獸臣司原敢告僕夫獸臣虞人僕夫不敢斥尊虞箴如是可不懲乎於是晉侯好田故魏絳及之及后羿事又襄十七年曰衛孫蒯田于曹隧越境而獵孫蒯林父之子飲馬于重丘重丘曹邑毁其瓶重丘人閉門而訽之訽罵也曰親逐其君爾父為厲厲惡鬼林父逐君在十四年是之不憂而何以田為又襄三十年鄭豐巻將祭請田焉弗許田獵也曰唯君用鮮鮮野獸也衆給而已衆臣祭芻豢為足又昭公曰齊侯田于沛言疾愈行獵沛澤名招虞人以弓不進虞人掌山澤之官公使執之辭曰昔我先君之田旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之仲尼曰守道不如守官君招當往道之常也非物不進官之制也君子韙之韙是也又定公上曰魏獻子屬役於韓簡子及原壽過簡子韓起孫不信也原壽過周大夫而田於大陸焚焉禹貢大陸在鉅鹿北嫌絶逺疑此田在汲郡呉澤荒蕪之地大陸幷見燒也爾雅廣平曰陸還卒於寗寗今修武縣吳澤范獻子去其柏椁以其未復命而田也范獻子代魏子為政去其柏椁示貶之又哀公下曰西狩於大野叔孫氏之車子鉏商獲麟大野在高平鉏野縣東北大澤是也車子㣲者鉏商名以為不祥以賜虞人時所未常見故怪虞人掌山澤之官仲尼觀之曰麟也然後取之言魯史所以得書獲麟也穀梁𫝊昭公曰秋蒐于紅正也因蒐狩以習用武事禮之大者也艾蘭以為防置旃以為轅門禽雖多天子取三十焉其餘以與士射於宫射而中田不得禽則得禽是以古之貴仁義而賤勇力也毛詩鵲巢曰騶虞鵲巢之應也鵲巢之化行人倫既正朝廷既治天下純被文王之化則庶類蕃殖蒐田以時人如騶虞則王道成也彼茁者葭茁出也葭蘆也謂蘆始出者著春田之早晩也一發五豝虞人翼五豝以待公之發于嗟乎騶虞騶虞義獸有至信之徳則應彼茁者蓬蓬草一發五豵豕一嵗曰豵于嗟乎騶虞又緇衣叔于田曰叔于田巷無居人不如叔也洵美且仁又雞鳴曰還刺荒也襄公好田獵從禽獸而無厭國人化之遂成風俗習於田獵謂之賢閑於馳逐謂之好焉子之還兮遭我乎峱之間兮並驅從兩肩兮揖我謂我儇兮從逐也獸三嵗曰肩儇利也又雞鳴盧令曰盧令刺荒也襄公好田獵畢弋不修民事百姓苦之故陳古以風焉盧令令其人美且仁又嘉魚曰吉日美宣王田也吉日維戊既伯既禱田車既好四牡孔阜升彼大阜從其羣醜吉日庚午既差我馬獸之所同麀鹿麌麌漆沮之從天子之所周易曰比卦王用三驅失前禽也尚書五子之歌曰太康尸位以逸豫滅厥德黎民咸貳乃盤遊無度畋于有洛之表十旬弗反尚書歸藏曰穆王獵于戈之墅韓詩内𫝊曰春曰畋夏曰蒐秋曰獮冬曰狩天子抗大綏諸侯小綏羣小獻禽其下天子親射之於門夫田獵因以講道習武簡兵也爾雅曰春獵為蒐郭璞注曰春蒐取不孕者夏獵為苗為苗稼除害也秋獵為獮獮殺也順秋氣也冬獵為狩得獸取之無所擇宵田為獠管子曰獠獵畢弋今江東亦呼獵為獠音為遼或曰即今夜獵載鑪照也火田為狩放火燒草獵亦為狩史記曰西伯將畋卜之曰所獲非熊非羆霸王之輔西伯果遇吕望釣於渭濵遂載歸號太公望又曰任安字少卿邑中人民俱出獵安常為人分麋鹿雉兎部署老小當壯劇易處衆人皆喜又曰今上為膠東王時韓嫣與上學書相愛及上為太子愈益親嫣善騎射上即位欲事伐匃奴而嫣先習胡兵以故益尊貴嫣常與上卧起江都王入朝有詔得從入獵上林中天子車駕馬未行而先使嫣乗副車從數十百騎馳騖視獸江都王望見以為天子避從者伏謁道旁嫣驅不見既過江都王怒為皇太后泣請得歸國入宿衛比韓嫣太后由此嗛嫣戰國䇿曰魏文侯與虞人期獵是日飲酒樂天雨文侯將出左右曰今日飲酒樂天又雨君焉出文侯曰吾與虞人期獵雖樂豈可不一㑹期哉乃往漢書曰李廣被黜與故潁隂侯屛居藍田南山中射獵嘗夜從一騎出從人田間飲還至霸陵亭尉醉呵止廣廣騎曰故李將軍也尉曰今將軍尚不得夜行何故也宿廣亭下魏志曰夏侯淵之子稱年十六淵與之畋見奔虎執楯驅馬逐之禁之不可一箭而中名聞太祖太祖把其手喜曰我得將矣又曰文帝將出遊獵鮑勛停車上疏曰五帝三王靡不明本立教以孝治天下如何在諒闇之中修馳騁之事乎毁其表而竟行獵中道頓息問侍臣獵之為樂何如八音也侍中劉􅁮對曰獵勝于樂勛抗辭曰夫樂上通神明下和人理故移風易俗莫善於樂况獵暴華葢於原野乎因奏劉􅁮佞諛不忠又曰蘇則從文帝獵蹉跮失鹿帝大怒踞胡床拔刀悉収督吏將斬之則稽首曰臣聞古之聖王不以禽獸害人今陛下方隆唐堯之化而以獵戱多殺羣吏愚臣以為不可敢以死請帝曰卿直臣也遂皆赦之又曰清河令徐季隆使人行獵令管輅筮其所得輅曰當獲小獸復非食禽雖有人牙㣲而不彊雖有文章蔚而不明非虎非兎其名曰貍獵人暮歸果如輅言魏末帝傳曰初帝以母廢未立為嗣文帝與俱獵見子母鹿文帝彎弓射其母令帝復射其子帝置弓泣曰陛下已殺其母臣不忍殺其子帝曰奴語動人心遂定為嗣也呉志曰孫權每出獵常乗馬射虎虎常突前攀持馬鞍張昭變色而前曰將軍何有當爾夫為人君者謂能駕御英雄驅使賢才豈謂馳逐於原野校勇於猛獸者乎如有一旦之患柰天下笑何權謂昭曰年少慮事不過逺以此慙君然猶不能已江表𫝊曰曹公與孫權書曰近者奉辭伐罪旌麾南指劉琮束手今水軍八十萬與將軍會獵於呉王隱晉書曰魏舒字陽元少工射着韋衣入山澤每獵大獲南史曰宋衡陽王義季鎮荆州嘗大蒐於郊有野老帶苫而耕命左右斥之老人擁耒對曰昔楚子盤遊受譏令尹今陽和扇氣播厥之始一日不作人失其時大王馳騁為樂驅斥老夫非勸農之意義季止馬曰此賢者也命賜之食齊書曰王僧達為宣城太守性好遊獵常與少年數十人澤中逐麞鹿每衆騎趂鹿馬相亂景宗於衆中射之人皆懼中馬足應弦輙斃以此為樂後景宗為揚州刺史出行常欲褰車帷幔左右輙諫以位望隆重人所重瞻不宜然景宗謂所親曰我昔在鄉里騎馬快如龍與年少輩數十騎拍弓弦作霹靂聲箭如餓䲭鳴平澤中逐麞數肋射之渴飲其血饑食其肉甜如甘露漿覺耳後生風鼻頭出火此樂使人忘死不知老之將至今來揚州作貴人動轉不得路行開幔小人輙言不可閉置車中如三日新婦邑邑使人無氣南史曰宋臧熹常與溧陽令阮崇獵遇猛獸突圍獵徒並散熹射之應弦而倒崔鴻十六國春秋後趙録曰石虎遣司農中郎將費霸帥工匠四千於東平罡山造獵車千乘轅長三丈高丈八尺格虎車四十乘立級行樓三層於其上自靈昌津南至滎陽東極陽都而還使御史監司其中禽獸有犯者罪至大辟又曰虎命太子宣行祈山川遊獵藪澤乘大輅羽葆華葢建天子旌旗十有六軍闕八萬出金明馳逐終夕所在陳列行宫四面各以百里為度驅圍禽獸皆暮集行宫文武跪立圍守重行烽炬羅星光燭如晝勁騎百餘馳射其中宣與顯德羙人乘輦觀之嬉娯忘返獸殫乃止禽獸奔逸當之者坐有爵者奪又秦録曰姚興性好遊畋頗損農業時京兆杜延以左僕射齊難無匡輔之益著豐草詩以箴之難具以聞馮翊相靈作德獵賦以諷焉興皆覽而善之賜以金帛然終不能改也後魏書曰于栗磾進新安公道武田於白登山見熊將數子顧栗磾曰能搏之乎對曰若搏之不勝豈不虛斃一壯士自可驅致御前而制之尋皆擒獲帝顧而謝之又曰宿石常從獵文成親欲射猛獸石扣馬諫引帝至高原上後猛獸騰躍殺人詔褒美其忠許後有犯罪者宥而勿坐又曰來大千常從明元校獵見獸在巖上持矟直刺之應手而死帝嘉其勇壯北史曰齊元恒字集和自言寧三日不食不能一日不畋獵又曰齊崔子植位冀州别駕走馬從禽髪繋木而死後周書曰達奚震武之子也少驍勇便騎射太祖嘗於渭北校獵時兎過太祖前震與諸將競射之馬倒而墜震足不傾躓因步走射之矢發中兎顧馬纔趨遂迴身騰上太祖喜曰非此父不生此子乃賜震雜物百叚唐書曰武德七年十二月庚辰臘上曰臘者獵也膢臘以供宗廟朕當躬親其事以申孝享之誠於是出狩於鳴犢泉又曰蘇世長拜諫議大夫嘗從幸涇陽校獵至高陵合圍是日大獲陳禽獸於旌門上入御營顧謂朝臣曰畋樂乎世長進曰陛下遊獵薄廢萬幾不滿十旬未為大樂上色變既而笑曰狂態發也又對曰為臣私計則狂為陛下國計則忠矣又曰唐儉授民部尚書從太宗於洛陽苑射猛獸儉見羣豕突出林中太宗引弓四發殪四豕有一雄彘及馬鐙儉懼將摶之太宗拔劍斷豕頭笑曰天䇿長史不見上將撃賊耶何懼之甚對曰漢髙祖以馬上得之不可以馬上理之陛下以神武定四方豈復逞雄心於一豕太宗納之因罷獵又曰貞觀十四年太宗欲親幸同州遊獵櫟陽縣丞劉仁􅁤上疏曰四時蒐狩前王恒典事有沿革未必因循今年甘雨應時秋嫁甚盛盡力収穫月半猶未畢功貧家無力禾不治擬種麥直據尋常料喚田家已有所妨今既祗供獵事兼之修理橋道縱謂太簡動費一二萬工百姓収斂實為狼狽臣願陛下少留萬乘之尊垂聴一介之説退延旬日穫刈總了則盡閑暇家得康寧鑾駕徐動公私交泰上降璽書勞之又曰太宗謂髙昌王麴文泰曰丈夫在世樂事有三天下太平家給人足一樂也草淺獸肥以禮田狩弓不虛發箭不妄中二樂也六合大同萬方咸慶張樂髙宴上下歡洽三樂也今日王可從禽明日當飲宴耳又曰髙宗狩于陸渾縣六日止飛山髙宗親御弧矢獵四鹿及兎數十頭晩次御營望見大官烹宰欲供百官之膳因問侍中許圉師曰朕目撃彼羊在於格下見其無罪就戮非無憫惻之情今欲以死獸易之可乎圉師對曰昔宋文侯見人欲將牛釁鐘因曰吾觀此牛觳無罪而就死也乃不釁鐘陛下取已死之鹿代欲刲之牛則堯舜之用心也遂釋其羊不殺九日又於山南布圍大順府果毅王萬興以輙先促圍集衆欲斬之上謂侍臣曰軍令有犯罪在不赦恐外人謂我翫好畋獵輕斷人命又以其經從征遼有功特令放免又曰髙宗出獵在路遇雨因問諫議大夫谷郍律曰油衣若為不漏對曰用瓦為之必不漏矣上大悦因此不復出獵又曰髙宗駕幸自九成宫還宫仍西狩校習自麟遊西北遶岐梁歴普潤止雍為兩圍殿中侍御史杜易簡賈言忠監圍山阜懸危杖䇿不得暫停凡五目而合劾奏將軍劉𤣥意黄河上等斷圍𤣥意勒罷黄河上圍因軍容齊整詔特原之又曰呉王恪好畋獵損居人田苗侍御史柳範奏彈之上因謂侍御臣曰權萬紀事我兒不能匡正其罪合死範進曰房𤣥齡事陛下猶不能諫止畋獵豈可獨非萬紀太平御覽巻八百三十一
