  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_216-1a, image: WYG0895/WYG0895-0020c.png}
body:
  text: 太平御覽卷二百一十六宋李昉等撰職官部十吏部四司郎中員外吏部郎中六典曰吏部郎中掌考天下文吏之班秩階品魏志曰諸葛誕字公休為吏部郎人有所囑託輒顯其言而亟用之後有當否則公議其得失以為褒貶自是群寮莫不慎其所舉魏志曰袁侃論議清當柔而不犯善與人同當興廢之間人所趣務者常謙退不為也時人以是稱之厯選部郎號為清平魏氏春秋曰許允為吏部郎選郡守明帝疑其所用非次召入將加罪允妻阮氏跣出謂曰明主可以理奪難以情求允頷之而入帝怒詰之允對曰某郡守雖限滿文書先至年限在後某守雖後日限在前帝取事視乃釋遣出望其衣歎曰清吏也蜀志曰趙戬字叔茂京兆長陵人質而好學言稱詩書愛惜於人不論疎密辟公府入為尚書選部郎董卓欲以所私並充臺閣戬拒不聽卓怒召戬欲殺之觀者皆為戬懼而戬自若及見卓列辭正色陳説是非卓雖㓙戾屈而謝之晉書曰山濤為吏部郎文帝與書曰足下在事明雅邁時念多所乏人今致錢二十萬絲百斤榖二百斛又曰李重字茂曽遷尚書吏部郎詢朝衆而斥華競存公平而塞私謁是以群才罔不畢舉又曰吏部郎缺文帝問人於鍾㑹㑹曰裴楷清通王戎簡要皆其選也於是以楷為吏部郎又曰徐寧少知名為與縣令時廷尉桓彛稱有人倫鑒識䕶軍庾亮每屬之訪一佳吏部郎彛嘗去職至廣陵尋親舊還遇風停浦中累日憂悒因上岸見一室宇有似廨署訪之云是與縣彛乃造之寧清惠博渉相遇欣然因留數夕彛大賞之結交而别至都謂庾亮曰吾為卿得一佳吏部郎亮問所在彛曰人所應有不必有人所應無不必無徐寧真海岱清士因為叙之即遷吏部郎又曰杜錫字世嘏補吏部郎不敢用鄉曲一人又曰王戎少頴悟二十四為吏部郎又曰李𦙍為吏部清慎選舉號為㢘平荀綽晉後畧曰武含字景緯官厯中庶子遷散騎常侍以母在日誨云汝脩其志仕當為尚書郎懼進叙有違前言乃辭常侍為吏部郎晉中興書曰阮放與從弟孚齊名為吏部郎銓管之任甚有稱譽性清約不理産業為郎不免饑乏王導庾亮以其名士供給衣食放由是得立又曰畢卓字茂世新蔡人少亦放達泰興末為吏部郎常飲酒廢職比舍郎釀熟卓因醉夜至其甕間取酒飲之掌酒者不察執而縳之郎往視之乃畢吏部也遽釋其縳卓遂引主人宴於甕側取醉而去卓嘗謂人曰右手持酒杯左手持蟹螯拍浮酒池中便足了一生宋書曰王僧綽為吏部郎叅掌大選究識流品諳悉人物拔才舉能咸得其分又曰何尚之遷吏部郎告休定省傾朝送别於冶渚及至郡叔度謂曰聞汝来此傾朝相送可幾客答曰殆數百人叔度笑曰此是送吏部郎耳非關何彦徳也昔殷浩亦嘗作豫章定省送别者甚衆及廢徙東陽舡泊征虜亭積日乃至親舊無復相窺者又曰王㣲字景𤣥吏部尚書江湛舉㣲為吏部郎㣲與湛書曰君平生云揚我名者殺我身天爵且猶滅名安用吏部郎哉其舉何陋其事不經非獨搢紳者不道僕妾皆笑之又曰王悦之為吏部郎隣舍有㑹同者遺悦之餅一甌辭不受曰此費誠小然少来不願當之又曰袁淑為吏部郎其秋大舉北伐淑侍坐從容曰今當鳴鑾中岳席卷趙魏檢玉岱宗今其時也臣逢千載之㑹願上封禪書一篇太祖笑曰盛徳之事我何足以當之齊書曰陸慧曉遷吏部郎尚書令王晏選門生補内外要局慧曉為用數人而止晏恨之送女伎一人欲與申好慧曉不納吏曹都令史厯政以來諮執選事慧曉任已獨行未嘗與語帝遣左右單景儁以事誚問慧曉謂景儁曰六十之年不復能諮都令史為吏部郎也上若謂身不堪便當拂衣而退帝甚憚之又曰謝脁遷尚書吏部郎中上表三讓中書疑朓官未及讓以問沈約曰宋元嘉中范曄讓吏部朱循之讓黃門蔡興宗讓中書並三表詔答其事宜然近代小官不讓遂成恒俗恐此有乖讓意王藍田劉安西並貴重初自不讓今豈可慕此不讓耶孫興公孔覬並讓記室今豈可三署皆讓耶謝吏部今授超階讓别有意豈關官之大小梁書曰顧憲之字士思為吏部郎初其祖覬之嘗為吏部於庭列植嘉樹謂人曰吾為憲之種耳至是憲之果為此官又曰王亮字奉叔為吏部郎銓序著稱及後為吏部尚書拘資次而已當代謂為不能後魏書曰宋繇沮渠蒙遜平酒泉於繇室得書數千卷鹽米十斛而已蒙遜歎曰孤不喜尅李歆欣得宋繇耳拜尚書吏部郎中委以銓衡之任又曰鄧淵博覽經書長於易筮太祖定中原擢為吏部郎淵明解制度多識故事與崔𤣥伯叅定朝儀律令音樂及軍國文記詔䇿多淵所為又曰孝文帝欲創革舊制選置百官謂羣臣曰為朕舉一吏部郎給卿三日假尋曰朕已得之矣乃徴崔亮為之亮字敬儒自叅選事垂將二十年㢘慎明决尚書曰非崔郎中選事不辦又曰韋瑒為吏部郎性貪婪鬻賣官吏皆有定價王藴别傳曰藴字叔仁為吏部郎欲使時無屈滯曽下鼓急出日昃乃至家去臺數里髙褰車帷先後與語不得進也一官缺求者十輩藴連状呈宰録曰某人有地某人有才不得者甘心無怨晉懐帝永嘉官名曰吏部郎太原温畿字元甫世論以其為人夷曠似玉郭子曰劉道貞少時漁釣草澤善歌嘯聞之者莫不留連有一老嫗識其非常人甚樂其歌嘯乃殺豚進之道貞食豚盡了不謝嫗見其不飽又進一豚又食半餘半還之後道貞為吏部郎嫗兒為小令史道貞乃超用之兒不知所由問母而後知之於是齎牛酒以詣道貞道貞笑曰去去無可復相報者世説曰山濤舉阮咸為吏部郎白曰清真寡欲萬物不能移也山濤啟事曰人才既自難知中人已下情偽又難吏部郎以碎事日夜相接非但當正已而已乃當能正人議郎杜㸃徳履亦佳太子庶子崔諒中郎陳淮皆有意正又其次不審有可用者不袁宏與謝僕射書曰聞見擬為吏部郎不知審爾果當至此誠相遇之過梁陸倕拜吏部郎表曰銓衡庶品歴選賓實阮咸貞素屢薦未登陸亮忠心裁居散職自非季重清識李毅恬正何以區分管庫式鑒胥吏吏部員外郎六典曰吏部員外郎二人一人掌判南曹每嵗選人有解状簿書資厯考課必由之以覆其實乃上三銓其三銓進甲則署焉一人掌判曹務凡預太廟齋郎帖試如貢舉焉唐書曰崔郾為吏部員外奸吏不敢欺孤寒无援者未嘗留滯銓叙之美為時所稱五代史後唐書曰蕭頃遷吏部員外郎先是張濬由中書出為右僕射曲為朱温判官高邵使祖廕求一子出身官省寺皆稱无例濬指揮甚急吏徒惶懼頃乃判状云僕射未集郎官未赴省上指揮吏曹公事且非南宫舊儀濬聞之慙悚致謝由是名振司封郎中司封員外郎六典曰司封郎中員外郎掌邦之封爵凡有九等一曰王正一品食邑一萬戸二曰郡王從一品食邑五千戸三曰國公從一品食邑三千戸四曰郡公正二品食邑二千戸五曰縣公從二品食邑一千五百戶六曰縣侯從三品食邑一千户七曰縣伯正四品食邑七百户八曰縣子正五品食邑五百户九曰縣男從五品食邑三百户職員令曰司封郎中掌封壐皇宗諸親内外命婦及國官邑官告身并選流外親品等第等司勲郎中司勲員外郎六典曰司勲郎中員外郎掌邦國官人之勲級凡勲十有二轉為上柱國比正二品十一轉柱國十轉為上䕶軍比正三品九轉為䕶軍比從三品八轉為上輕車都尉比正四品七轉為輕車都尉比從四品六轉為上騎都尉比正五品五轉為騎都尉比從五品四轉為驍騎尉比正六品三轉為飛騎尉比從六品二轉為雲騎尉比正七品一轉為武騎尉比從七品考功郎中六典曰考功郎中員外郎掌内外文武官吏之考課凡應考之官皆具録當年功過行能本司及本州長對衆讀議其優劣定為九等考第各於所由司准額校定然後送省唐書曰代宗幸陜考功郎中裴諝步懷考功及南曹三印赴行在上見而謂之曰疾風知勁草果信矣考功員外郎唐書曰席豫襄陽人周湖州刺史固七世孫近徙家河南豫進士及第開元中累官至考功員外郎典舉得士為時所稱唐書曰孫逖為考功員外郎選貢士二年多得俊才初年則杜鴻漸至宰輔顔真卿為尚書後年拔李華蕭頴士趙驊登上第逖謂人曰此三人便堪掌綸誥又曰劉思直宋州寧陵人也遷考功員外郎始奏請明經加帖進士試雜文自思直始也又曰鄭澣為考功員外郎刺史有驅迫人吏上言政績請刋石紀政者澣探得其情條責亷使巧跡遂露人服其敏識又曰李渤穆宗即位召為考功員外郎十一月定京官考不避權倖皆行昇黜奏曰宰臣蕭俛段文昌崔植是陛下君臨之初用為輔弼安危理亂决在此時况陛下思天下和平敬大臣禮切固未有昵比左右侈滿自賢之心而宰相之權宰相之事陛下一以付之實君義臣行千載一遇之時也此時若失他更無時而俛等上不能推至公申烱誡陳先王道徳以沃君心又不能正色匪躬振舉舊法復百司之本如此則教化不立矣臣聞政之興廢在於賞罰俛等作相已来未聞奨一人徳義舉守官奉公者使天下在官之徒有所激勸又不聞黜一人職事不理持䘵養交者使尸䘵之徒有所懼如此則刑法不立矣邪正莫辨混然無章教化不行賞罰不設天下之事復何望哉一昨陛下遊幸驪山宰相翰林學士是陛下股肱心腹宜皆知之蕭俛等不能先事未形忘軀懇諫而使陛下有忽諫之名流於史冊是䧟君於過也孔子曰所謂大臣者以道事君不可則止若俛等言行計從不當如是若言不行計不從須奉身速退不宜尸素於化源進退戾也何所避辭其蕭俛段文昌崔植三人并翰林學士杜元頴等並請考中下御史大夫李絳左散騎常侍張惟素右散騎常侍李益等諫幸驪山鄭覃等諫畋遊是皆恐陛下行幸不息恣情無度又恐馬有銜蹶不測之變風寒生疾之憂急奏無所詣國壐委於婦人中倖之手絳等能率御史諫官論列於朝有懇激事君之禮其李絳張惟素李益三人伏請賜上上考外特與遷官以彰陛下優忠賞諫之美其崔元畧冠供奉之首合考上下縁與于翬上下考于翬以犯􅂍處死准令須降請賜考中中大理卿許季同任使于翬韋道冲􅅊正牧皆以犯贓或左降或處死合考中下然頃者䧟劉闢之亂弃家歸朝忠節明著今宜以功補過請賜考中中少府監裴通職事脩舉合考中上以其請追封所生母而捨嫡母是明罔於君幽欺其先請考中下伏以昔在宰夫入寢擅飲師曠李調今愚臣守官請書宰相學士中下考上愛聖運下振頽綱故臣懼不言之為罪不懼言之為罪也其三品官考伏縁限在今月内進輒先具如前其四品已下官續具條流聞奏状入留中不下議者以宰輔曠官自宜上疏論列而渤越職釣名非盡事君之道唐新語曰李迥秀任考功員外知貢舉有進士姓崔者文筆非佳迥秀覽之良久謂曰清河崔郎儀貌不惡鬚眉如㦸精彩甚高出身何處量豈必須進士再三諭而遣之聞者大噱太平御覽卷二百一十六
