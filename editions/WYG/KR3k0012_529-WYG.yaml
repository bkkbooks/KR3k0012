body:
  text: 太平御覽卷五百二十九宋李昉等撰禮儀部八五祀四望髙禖禱祈五祀禮記祭法曰王為羣姓立七祀曰司命曰中霤曰國門曰國行曰太厲曰户曰竈諸侯為國立五祀曰司命曰中霤曰國門曰國行曰公厲大夫立三祀曰族厲曰門曰行適士立二祀曰門曰行庶人立一祀或立户或立竈五祀門户中霤也此者小神居人之門又月令曰孟春祀户孟夏祀竈季夏祀中霤孟秋祀門孟冬祀行餘見吉禮門白虎通曰何謂五祀者門户竈井中霤也又曰曲禮下記云天子祭天地四方山川五祀嵗遍諸侯方伯祀山川祭五祀歳遍士祭其先凡祭有廢莫敢舉有舉莫敢廢當祭而祭不祭而祭為之滛無福祭五祀所以嵗遍何慎五行也五經異議曰大戴說禮器云竈者老婦之祭許君按月令孟夏之月其祀竈五行之神王者所祭非老婦也鄭𤣥曰竈神祝融是老婦又曰王為羣姓立七祀一曰司命主督察三命也二曰中霤王宫室居處也三曰門四曰户出入五曰國行主道路也六曰太厲主殺也七曰竈主飲食也漢書議曰祠五祀謂五行金木水火土也木正曰勾芒火正曰祝融金正曰蓐収水正曰𤣥冥土正曰后土皆古賢能治成五行有功者也主其神祀之魏名臣奏曰秦静議云祭法七祀有國行今月令謂行為井是俗廢行而祀井武帝始定天下興復舊祀造祭祀門户井竈中霤文帝稱詔静按凡諸祠祀所以尊敬神靈不宜稱詔髙堂隆議曰國中霤門井竈多不遍唯祀在者故曰祭五祀在於廟今毎門户輙祭之自漢以来非舊典也祭井自漢從水類不列五祀宜除祭井祀行世本曰㣲作禓五祀㣲者殷王八世孫也者强死男也謂時儺索室駈疫逐强死鬼也五者謂門户及井竈中霤也傅𤣥五祀議曰禮大記云室中央中霤謂四霤之中也祭於漏井盖失之矣七祀之文皆云祀行而無井祭竈而不祭井於事則闕夫設祀者非唯報功而已亦神道設教使民慎之幽明也臣以為帝之都城宜祭一門正宫一門正室一户井竈中霤亦各擇其一正者祭之四望尚書舜典曰正月上日受終于文祖在璿璣玉衡以齊七政肆類于上帝禋于六宗望于山川遍于羣神嵗二月東廵狩至于岱宗柴望秩于山川肆覲東后孔安國曰望秩于山川者以尊卑祭之也五嶽視三公四瀆視諸侯其餘小者或卿大夫伯子男周禮春官上曰大宗伯之職國有大故則旅上帝及四望四望五岳四鎮四瀆也又春官曰小宗伯之職掌兆五帝于四郊四望四類亦如之又春官上典瑞曰掌玉瑞玉器之蔵四珪有邸以祀天旅上帝兩珪有邸以祀地旅四望又春官大司樂曰乃奏姑洗歌南吕舞大韶以禮四望又公羊傳僖下曰夏四月卜郊不從乃免牲猶三望者何望祭也則曷為祭太山河海山川有能潤于百里者天子秩而祭之五經通義曰王者所以因郊祭日月星辰風伯雨師山川何以為皆有功于民故祭之也皆天地之則神從官也縁天地之義亦欲及之故嵗一祭之禮日出于南門外禮月四瀆于北門外禮山川丘陵于西門外禮風伯雨師于東門外禮各即其位也以示明之其祭之柰何乎曰祭日者懸祭月者毁祭風者明祭雨者布祭山川者沉各象其貌也三輔黄圖曰宰衡王莽奏曰冬至使有司祭天神于南郊髙祖配而望羣陽夏至使有司祭地于北郊髙后配而望羣隂隋書志曰梁朱异議鄭衆云四望謂日月星海鄭𤣥曰五岳四瀆尋二鄭之說互有不同竊以望是不即之名凡厥遥祭皆有斯月豈容局于星海拘于海瀆請今天司有闕水旱之議爰有四海名山大川能興雲致雨一皆備祭髙禖禮記月令曰仲春𤣥鳥至之日以太牢祀于髙禖天子親往后妃率九嬪御乃禮天子所御帶以弓韣授以弓矢立于髙禖之前髙禖祀名也髙尤尊也禖者祈子孫之祀也天子所御謂后妃以下王妾御者韣弓衣也帶以弓衣使得男也𤣥鳥遺卵娥簡狄吞之生契以為禖官漢書曰太子據立為皇太子初上年二十九乃得太子甚喜為立禖禖求子禖神使東方朔枚臯作禖祝續漢書曰仲春之月立髙禖祀于城南禮以特牲五經異議曰王者一嵗七祭天地仲春后妃郊禖禖亦祭天也五經要議曰契母簡狄以𤣥鳥至之日祀于髙禖而生契髙禖者盖先王所以祈子孫也𤣥鳥感陽而至集人棟宇有孳乳之祥故重其至日因以用事五經異議曰鄭記曰𤣥鳥至之日以太牢祀于髙禖注曰髙辛氏世娥簡狄吞燕子而生契後王以為禖官嘉祥其祀焉王權問曰以注言之先商之時未有髙禖生民詩曰克禋克祀以祓無子傳以為古者必以髙禖為姜嫄禋祀上帝而生稷是則髙禖之祀非以生契後之立也譙喬荅曰先商之時自必有禖氏祓除之祀位在南郊盖亦以𤣥鳥之至日然其所禋乃于上帝娥蕳狄吞一子之後王以為禖官嘉祥祀之以配帝謂之髙禖晉束晳髙禖壇石議曰元康六年髙禖壇上石破為二叚詔問置此石来㡬時出何經典今應復不博士議禮無髙禖置石之文未知設造所由既以毁破無可改造說髙辛氏有簡狄吞卵之祥今此石有吞卵之象盖俗說所為而史籍無記但可改聚復于舊處而已太常以為吞卵之言盖是逸俗之失義固今毁破便宜廢除下四府博士議賊曹屬束晳議夫未詳其置之故而欲必其可除之理理不可然按郊祀志秦漢不祀髙禖漢武帝五子傳武帝晚得太子始為立禖其事未之能審許慎五經異說云山陽民祭皆以石為主然則石之為主由来尚矣其此象矣而祭祀龜策祭器敝則埋之而改置新石今破則宜埋而更造不宜遂廢収其破石埋之故處于禮無依于事不肅思所未安也時公卿從太常所處此議不用其後得髙堂隆故事魏青龍中造此禮詔書更鐫石令如舊置髙禖壇上埋破石入地一丈隋書禮志曰梁太廟北門内道西有石文如竹葉小屋覆之宋元嘉中脩廟所得陸澄以為孝武時郊禖之石然則江左亦有此禮矣後齊髙禖為壇于南郊傍廣輪二十六尺髙九尺四陞三壇禱祈周書曰四月孟夏王初祈禱于宗乃嘗麥于廟毛詩甫田曰琴瑟擊鼓以御田祖以祈甘雨以介我稷黍以榖我士女又生民行葦曰曽孫唯主酒醴唯醹酌以大斗以祈黄耉又臣工噫嘻曰春夏祈榖于上帝也周禮春官上小宗伯曰小宗伯掌大灾乃執事禱祠于上下神祗又春官下太祝掌六祝之辭以事鬼神示祈福祥求永貞神天神鬼人鬼示地祗也禮記月令曰孟春是月也天子乃以元日祈榖于上帝左傳襄上曰郊祀后稷以祈農事也又定上曰魯昭公出故季平子禱于煬公九月立煬宫平子逐君懼而請禱于煬公昭公死于外以為獲福故立又哀上曰衞太子禱曰曽孫蒯瞶敢昭告于皇祖文王烈祖康叔文祖襄公鄭勝亂從勝鄭聲公名釋君助臣為従于亂晉午在難午晉定公名不能治亂使鞅討之鞅趙簡子名論語八佾曰王孫賈問曰與其媚于奥寜媚于竈何謂也宗廟及五祀之神皆祭于奥室西南隅謂之奥也子曰不然獲罪于天無所禱也明堂媚其尊者夫竈老婦之祭又述而曰子疾病子路請禱子曰有諸觀子路知禱禮否子路對曰有之誄曰禱爾于上下神祗誄天神之辭也子曰丘之禱久矣五經異義曰禮祭法云天子有祧逺廟曰祧將祧而去之故曰祧去祧曰壇去壇曰墠皆蔵于祖廟有事則禱無事則止說文曰吉事祈福為禱漢書曰文帝曰昔先王逺施不求其報望祀不祈其福命吾聞祠官祝釐如淳曰釐福皆於朕躬不為百姓夫以朕之不徳而専饗獨美其福百姓不與是重吾不徳也其令祠官致祀無有所祈東觀漢記曰鄧太后嘗體不安左右憂惶至令禱祠願以人為代太后聞之即譴怒勅掖庭令以下何故乃有此不祥之言左右咸流涕歎太后臨大病不自顧而念兆民後病瘳豈非天地之應與晉中興書曰大旱經久大興四年四月始雨有奏應報賽宗廟山川中宗詔曰祈廟云報賽非奉尊上辭也吾意有疑以為舊山川有許報故雨賽非大事不應告廟臣子無要君之道黷稱賽於禮有違唐書曰憲宗謂宰臣曰禳災祈福之說其事信否李藩對曰臣竊觀自古聖逹皆不禱祠故楚昭王有疾卜者謂河為祟昭王以河不在楚非所獲罪孔子以為知天道仲尼疾病門人子路請禱仲尼以神道助順繫於所行已既全徳無愧屋漏故荅子路云丘之禱久矣書云恵廸吉從逆凶言順道則吉從逆則凶詩云自求多福則禍福之来感應行事若苟為非道則何福可求是以漢文帝毎有祭祀使有司敬而不祈其見超然可謂盛徳若使神明無知則安能降福必其有知則私己求媚之事君子尚不可恱也况于明神乎由此言之則履信思順天自祐之苟異于此實難致福故堯舜之務唯在脩已以安百姓管仲云義于人者和于神葢以人為神主故但務安人而已虢公求神以至危亡王莽妄祈以速漢兵古今明誡書傳所記望陛下每以漢文孔子之意為准則百福具臻矣上深嘉美之又曰文宗開成中以久旱分命郡官徧祠祈禱于紫宸殿對宰臣憂形於色宰臣以星官所奏天時當爾乞不過勞聖慮上凛然改容曰朕為天下主無徳及人致此災旱今又謫見于上若三日不雨退歸南位更選賢英主天下宰臣嗚咽流涕各請罪乞免相位是夜㴻雨大洽又曰孔戣為廣州刺史先是准詔禱雨南海神多令従事代戣必自越風波而往而韓愈為潮州刺史作詩華陽國志曰良輔為郡五官時天大旱請雨不降輔出禱乃積薪祝神曰二日不雨則欲自焚謝罪百姓言終而雨長沙郡耆舊傳曰祝良為洛陽令時亢旱天子祈不得良乃曝身階庭告誠引罪自晨至午紫雲沓起甘雨大降民為之歌曰天久不雨烝民失所天王自出祝令持苦精答感應滂沱而下列仙傳曰厯陽有彭祖仙室前世禱請風雨莫不輒應常有兩虎在祠左右祀訖即有虎跡異苑曰晉簡文既廢世子道生次子郁又早卒而未有息濮陽令在弟前禱至三更忽有黄氣自西南來逆室前爾夜幸李太后而生孝武皇帝韓子曰衛人有夫婦禱者而祝曰使我無故得百束布其夫曰何少也對曰益是子將以買妾吕氏春秋曰昔殷湯尅夏而天下大旱五年不収湯乃以身禱于桑林曰予一人有罪无及萬方萬方有罪在予一人無以一人之不敏使上帝鬼神傷民之命于是剪髮其手自以牲用祈福于上帝雨乃大至淮南子曰聖人者不恥身賤而愧道之不行不憂命之短而憂百姓之窮也是故禹為水以身解于陽肝之河湯為旱以身禱于桑林之下聖人之憂民如此其明也太平御覽卷五百二十九
