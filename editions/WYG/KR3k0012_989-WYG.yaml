body:
  text: 太平御覽卷九百八十九宋李昉等撰藥部六天門冬麥門冬术茯苓猪苓卷栢甘草厚朴黄精胡麻當歸逺志細辛續斷肉蓯蓉藷藇地黄天門冬爾雅曰薔蘼虋音門冬也郭璞注曰今門冬也一名滿冬山海經曰條谷山其草多虋冬列仙傳曰赤須子豊人好食天門冬齒落更生神仙傳曰甘始者太原人服天門冬在人間三百餘年博物志曰天門冬莖間有茨而葉滑曰絺體一名顛棘根以浣縑素越人名為浣草似天門冬而非也凡服此先試浣衣如法者便非天門冬抱朴子曰杜子服天門冬御十八妾有子百四十人日行三百里又内篇曰天門冬或名地門冬麥門冬潜夫論曰夫理世不得真賢譬如治疾不得真藥也治疾當得麥門冬反蒸横麥也不識真合而飲之疾以寖劇而不知為人所欺也遊名山志曰泉山竹際及金州多麥門冬盛宏之荆州記曰魚復縣岩崖内生麥門冬廣州記曰鄣平縣偏饒麥門冬建康記曰建康出麥門冬本草經曰麥門冬味甘平生川谷治心腹結氣傷中胃脈絶久服輕身不飢不老生函谷川谷吳氏本草曰麥門冬一名羊韭秦名烏韭楚名馬韭越名羊韭齊名愛韭一名禹韭一名㸑韭一名忍冬一名忍陵一名不死藥一名禹餘粮一名僕壘一名隨脂神農岐伯甘平黄帝桐君雷公甘無毒李氏甘小温扁鵲無毒生谷中肥地葉如韭肥澤叢生採無時實青黄术爾雅曰术山薊本草選术一名山薊今术似薊而生山中山海經曰女几之山其草多术列仙傳曰涓子好餌木接食其精至三百年神仙傳曰陳子皇得餌术要方服之得仙去霍山其妻姜氏疾病其壻用餌术之法服之病自愈至一百七十嵗登山取术重擔而歸不息不極顔色氣力如二十時人抱朴子内篇曰南陽文氏其先祖漢末大亂飢困欲死遇人教之食术云遂不飢數十年乃來還鄉里顔色更少氣力轉神藥經曰必欲長生當服山精茯苓廣雅曰茯神茯苓也史記龜策傳曰茯苓在絲之下狀似飛鳥之形新雨已天清静無風以夜捎絲去之即以簼燭此地徐廣曰簼籠也盖然火而籠罩其上也火滅即記其處明則掘取之入地四尺至七尺得矣茯苓者千嵗松根食之不死齊書曰陶𢎞景永明中上表辭禄許之賜以東帛勑所在月給茯苓五斤白蜜二斤以供服餌淮南子曰下有茯苓上有絲茯苓千嵗栢枝也絲生其上而無根一名女蘿也抱朴子内篇曰任子季服茯苓八十年仙人玉女往從之面體如玉澤范子計然曰茯苓出嵩高三輔神異經曰西北荒有人飲甘露食茯苓典論曰潁川郄儉能辟穀餌茯苓初儉至市茯苓價暴貴數倍典術曰茯苓者松脂入地千嵗為茯苓望松樹赤者下有之神仙傳曰秀眉公餌茯苓得仙又曰黄初起以弟初平得道乃棄妻子就初平共服松脂茯苓至五萬日能坐在立亡日中無影有童子之色及俱還鄉里親戚死亡畧盡乃復還去初平改字為赤松子初起改字為魯班其後之能服此藥得仙者數十人列仙傳曰犢子鄴人也少在黒山上採松子茯苓餌而服之且數百年時壯時老時好時醜時人乃知仙人也廣志曰茯神松汁所作勝茯苓或曰松根茯苓貫著之生朱提濮陽縣博物志曰神仙傳云松栢脂入地中千年化為茯苓茯苓千年化為琥魄一名江珠今太山出茯苓而無琥魄江珠益州永昌郡出琥魄而無茯苓或云燒蜂窠所作未詳二説嵩高山記曰取松栢茯苓二斤醇酒漬之和以白蜜日三服乃通靈名山畧記曰鬱川岀茯苓吳氏本草曰茯苓通神桐君甘雷公扁鵲甘無毒或生華山大松根下入地三丈一尺二月七月採本草經曰茯苓一名茯神味甘平生山谷治胷脅疝氣憂患悸驚生太山猪苓莊子曰豕槖藥也司馬彪注曰豕槖一名靈粮如猪豕治渇本草經曰猪苓一名猳脂味甘平生山谷治痎瘧解毒蠱疰不􅖤利水道久服輕身能不老生衡山吳氏本草曰猪苓神農甘雷公苦無毒如茯苓或生宛句八月採卷栢建康記曰建康出卷栢范子計然曰卷栢出三輔本草經曰卷栢一名萬嵗栢味辛而温生於山谷治五臓邪氣吳氏本草曰卷栢一名豹足一名求股一名萬嵗一名神枝時神農平桐君雷公甘生山谷鄭氏婚禮謁文曰卷栢藥草附生山顛屈卷成性終無自伸甘草本草經曰甘草一名美草一名蜜甘厚朴廣雅曰重皮厚朴也范子計然曰厚朴出𢎞農本草經曰厚朴味苦温生山谷治中風傷寒熱血痺死肌去蟲生太山吳氏本草曰厚朴一名厚皮神農岐伯雷公苦無毒李氏小温生交阯黄精廣雅曰黄精龍銜也又曰黄精葉似小黄也抱朴子曰黄精一名菟竹一名雞格一名垂珠服其花勝其實花生十斛乾之則可得五六升服之十年乃可得益夀列仙傳曰修羊公魏人也在華陰山石室中中有懸石榻臥其上榻盡穿陷畧不食時取黄精服之神仙傳曰王烈字長休邯鄲人也常服黄精又曰白菟公服黄精而得仙永嘉記曰黄精出松陽永寧縣逰名山志曰石室藥多黄精博物志曰黄帝問天姥曰天地所生豈有食之令人不死者乎姥曰太陽之草名黄精餌食之可以長生胡麻廣雅曰狗蝨鉅勝藤苰胡麻也孝經搜神契曰鉅勝延年宋均注曰世以鉅勝為枸把子晉書安帝記曰殷仲堪在荆州以胡麻為廩廣志曰胡麻一名方莖服之不老善耐風濕其葉名青蘘也淮南子曰汾水濛濁而宜胡麻列仙傳曰闗令尹喜與老子俱之流沙西服鉅勝實莫知所終魯女生别傳曰女生長樂人也少好道初服餌胡麻及术絶穀八十餘年更少壯色如桃華一日能行三百里走如麞鹿抱朴子曰胡麻好者一夕蒸之如炊須暴乾復蒸細篩白蜜和丸如雞子大日二枚一年面色美身體滑二年白髮黒三年齒落更生四年入水不濡五年入火不燋六年走及奔馬或蜜水和作餅如糖狀炙食一餅抱朴子内篇曰胡麻服餌不老耐風濕吳氏本草曰胡麻一名方莖一名狗蝨神農雷公甘平無毒立秋採青葉本草經曰胡麻一名巨勝味甘平生山澤治傷中虛羸補五臓益氣久服輕身不老生上黨崔寔四民月令曰二月可種胡麻謂之上時也當歸爾雅曰薜山蘄廣志曰山蘄當歸今似芹而麄大蘄音巨巾切吳志曰曹公聞太史慈遺書以篋封之發㸔無所道但貯當歸魏氏春秋同異曰姜維得母書并當歸維曰良田百頃不在一畆但有逺志不見當歸其背親徇利如此范子計然曰當歸出隴西無苦者善秦州記曰隴西襄城縣有牛山是出當歸建康記曰建康出當歸不堪用廣州記曰鄣平縣出當歸博物志曰神農經曰下藥治病謂大黄善能除實當歸善能止痛崔豹古今注曰牛亨問將離别相贈以芍藥何也荅曰芍藥一名將離故將别贈以芍藥猶相招則贈以文蕪文蕪一名當歸本草經曰當歸一名子歸味甘温生川谷主治逆止氣温瘧寒熱生隴西吳氏本草曰當歸神農黄帝桐君扁鵲甘無毒岐伯雷公辛無毒李氏小温或生𦍑胡地逺志爾雅云葽鳥丁切繞蕀蒬今逺志也似麻黄赤華葉鋭而黄其上謂之小草蕀蒬音棘寃抱朴子内篇曰陵陽仲服逺志二十年有子三十七人坐在立亡世説曰謝太傅始有東山之志復命屬掾不獲已始就桓公司馬於時人有致桓公藥草者中有逺志公取以問謝此藥又名小草何以物有二稱謝未即荅爾時郝隆在座謝因曰郝叅軍多知識試復通㸔郝應聲曰此甚易解處則為逺志出則為小草於是謝公殊有慚色桓目謝而笑曰郝叅軍此通乃不惡亦甚有會本草經曰逺志一名棘菀一名葽繞久服輕身不忘葉名小草生太山及宛句細辛山海經曰浮戯之山東有蛇谷上多少辛管子曰五沃之土羣藥生少辛范子計然曰細辛出華隂色白者善名山記曰松陽之山草多細辛永嘉記曰細辛出松陽本草經曰細辛一名少辛味温生山谷治欬逆明目通利九竅久服輕身生華陰吳氏本草曰細辛一名少辛一名細辛神農黄帝雷公桐君辛小温岐伯無毒李氏小寒如葵葉赤色一根一葉相連三月八月採根續斷范子計然曰續斷出三輔廣州記曰鄣平縣出續斷本草經曰續㫁一名龍豆味苦㣲温生山谷治傷寒補不足金瘡癰傷折跌續筋骨婦人乳癰崩中漏血久服益力生常山吴氏本草曰石龍芻一名龍脩一名龍鬚一名續㫁一名龍珠一名草毒一名龍華一名懸莞神農李氏小寒雷公黄帝苦無毒扁鵲辛無毒生梁州七月七日採范注方曰續斷即是馬薊葉相似但大於小薊耳葉似旁翁菜葉但小厚兩邊有刺刺人其花紫色肉蓯蓉本草經曰肉蓯蓉味甘㣲温生山谷治五勞七傷補中除莖中寒熱養五藏強陰益精氣多子婦人癥瘕久服輕身生河西吳氏本草曰肉蓯蓉一名草蓯蓉神農黄帝鹹雷公酸李氏小温生河東山隂地長三四寸藂生或代郡雁門二月八月採隂乾用之藷藇山海經曰景山北望少澤其草多藷藇湘中記曰永和初有採藥衡山者道迷粮盡過巖下見一老翁與四五年少對坐執書告以飢與之食物如薯蕷指教所去五六日至家而不復飢范子計然曰藷藇本出三輔白色者善本草經曰署豫一名山芋味甘温生山谷治傷寒中虛羸補中益氣力長肌肉除邪氣寒熱久服輕身耳目聰明不飢延年生嵩高吳氏本草曰薯蕷一名藷薯秦楚名玉廷齊魯名山芋鄭越名土藷一名山藥一名脩腕一名兒草神農甘小温桐君雷公苦無毒或生臨朐鍾山始生赤莖細蔓五月華白七月實青黄八月熟落根中白皮黄類芋二月三月八月採根惡甘遂曹毗杜蘭香降張碩傳曰蘭香與碩三署預實曰食此可以辟露碩食二懐一欲以歸香曰可自食不得持去異苑曰署預一名山羊根既入藥又復可食若掘取黙黙則獲唱名不可得地黄爾雅曰芐音户地黄郭璞注曰一名地髓江東呼芋也抱朴子曰楚文子服地黄八年視有光上車弩本草經曰地黄一名地髓治傷中長肌肉生咸陽太平御覽卷九百八十九
