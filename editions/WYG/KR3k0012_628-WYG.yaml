body:
  text: 太平御覽卷六百二十八宋李昉等撰治道部九貢舉上周禮地官鄉大夫之職曰正月之吉受教法于司徒退而頒之于其鄉吏使各以教其所治以攷其徳行察其道藝以歲時登其夫家之衆寡辨其可任者以歲時入其書三年則大比考其徳行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賔之賢者有徳行者也能者有道藝者也衆寡鄉民之善者無問多少也鄭司農云興賢者謂若今之舉為孝亷也興能者謂若今之舉茂才也𤣥謂變舉言興者謂合衆而尊寵之厥明鄉老及鄉大夫羣吏獻賢能之書于王王再拜受之登于天府内史貳之王拜受之重得賢士也上其書于天府天府掌祖廟之寳藏者内史副寫其書者當詔王爵禄之時也禮記王制曰命鄉論秀士升之司徒曰選士移名于司徒也秀士鄉大夫所考有徳行道藝者司徒論選士之秀者而升之學曰俊士可使習禮者學大學升於司徒者不征於鄉升於學者不征於司徒曰造士不征免其徭役造成也士升國學則才徳成就大樂正論造士之秀者以吿于王而升諸司馬曰進士司馬夏官卿主邦政者進受爵也司馬辨論官材論進士之賢者以吿于王而定其論各署其所長論定然後官之任官然後爵之命之位定然後禄之又文王世子曰凡語於郊者語謂論説於郊學必取賢歛才焉或以徳進或以事舉或以言揚大樂正論造士之秀者升諸司馬曰進士謂此矣又射義曰古者天子之制諸侯嵗獻貢士於天子天子試之於射宫其容體比於禮其節比於樂而中多者得與于祭其容體不比於禮其節不比於樂而中少者不得與于祭數與于祭而君有慶數不與於祭而君有譲天子将祭必先習射于澤澤者所以擇士也已射于澤而后射于射宫射中者得與于祭不中者不得與於祭漢書曰髙帝十一年詔曰賢士大夫既與我定有天下而不與吾共安利之可乎有肯從我逰者吾能尊顕之以布告天下御史中執法下郡守其有意稱明徳者必身勸為之駕詣丞相府署其行義年有其人而不言者免官又曰惠帝四年詔舉民孝弟力田者復其身髙后元年初置孝弟力田二千石者一人又景帝後元二年詔曰亷士寡欲易足今訾筭十以上乃得官亷士算不必衆有市籍不得官無訾又不得官朕甚愍之訾算四得官有市籍謂賈人有財不得為吏貲萬錢算百二十七也十算十萬也時疾吏之貪以為衣食足知榮辱故限貲十萬乃得為吏亷士無貲减至四算得官又曰武帝建元初始詔天下舉賢良方正直言極諌之士其理申商韓非蘇秦張儀之言亂國政者皆罷之又曰元光元年舉董仲舒對策曰今郡守縣令民之師帥所使承流而宣化也故師帥不賢則主徳不宣恩澤不流今吏既亡教訓於下或不承用主上之法暴虐百姓與奸為市言小吏有為奸欺者守令不舉乃反與之交易求利也貧窮孤弱寃苦失職甚不稱陛下之意夫長吏多出于郎中中郎吏二千石子弟選郎吏又以富貲未必賢也且古所謂功者以任官稱職為差非所謂積日累乆也故小材雖累日不離于小官賢材雖未乆不害為輔佐是以有司竭力盡知務理其業而以赴功今則不然累日以取貴積乆以致官是以亷耻貿亂賢不肖混淆也諸侯列卿郡守二千石各擇其吏民之賢者嵗貢各二人以給宿衛且以觀大臣之能所貢賢者有賞不肖者有罰夫如是諸侯吏二千石皆盡心於求賢天下之士可得而官使也授之以官以使其材無以日月為功實試賢能為上量材而授官録徳而定位録徳存視之也則亷耻殊格賢不肖異處矣帝因是令郡國舉孝廉各一人又限以四科至五年詔徴吏人有明當代之務習先聖之術者縣次給食令與計偕又元朔元年詔曰夫本仁祖義褒徳録賢勸善刑暴夲仁祖義謂以仁義為本始也五帝三王所由昌也故詔執事興舉孝亷庶幾成風夫十室之邑必有忠信三人並行厥有我師今或闔郡而不薦一人是化不下䆒而積行之君子壅于上聞也究隆也言壅遏不得聞于天子也且進賢受上賞蔽賢䝉顯戮古之道也其與中二千石禮官愽士議不舉者罪是時天下慎法莫敢謬舉而貢士盖鮮故有斯詔有司奏議曰古者諸侯貢士一適謂之好徳再適謂之賢賢三適謂之有功廼加九錫不貢士一則黜爵再則黜地三則黜爵地畢矣夫附下罔上者死附上罔下者刑與聞國政而無益于民者斥在上位而不能進賢者退其不舉孝不奉詔當以不敬論為其不求士報國也不察㢘為不勝任也當免奏可凡國之官非傅相其地既自署置又調屬僚及部人之賢者舉為秀才亷吏而貢于王庭多拜為郎居三署無常員或至千人属光禄勲故郷校牧守居閑待詔或郡國貢送公車徴起悉在焉光禄勲復於王署中銓第郎吏嵗舉秀才亷吏出于他官以補缺員後漢制同又元封五年詔曰盖有非常之功必待非常之人故馬或奔踶而致千里踶踏也奔踶者乗之即奔立則踶人也踶音徒計反士或有負俗之累而致功名負俗謂被世議論也累音力瑞反夫泛駕之馬泛覆也音芳勇反本作覆後通用耳覆駕者言馬有逸氣而不循軌轍也跅弛之士跅者無檢局也弛放廢不遵禮度也跅音吐谷反弛音式爾反亦在御之而已其令州縣察吏民有茂才異等茂才異等者超等軼羣不與凡同可為将相及使絶國者絶逺之國初公孫𢎞以儒術為丞相天下學士靡然向風時太常孔臧等曰請太常博士官置弟子五十人復其身郡國縣官有好文學敬長上肅政教順鄉里出入不悖所聞令二千石謹察可者常與計偕詣太常得受業如弟子一歲皆輒課能通一藝以上補文學掌故缺其髙第可以為郎中者太常籍奏即有秀才異等輒以名聞其不事學若不材及不能通一藝輙罷之而請諸能稱者又曰孝昭始元初遣故廷尉王平等五人前為此官今不居皆謂之故持節行郡國舉賢良孝宣帝時諌大夫王吉上言曰今使吏得任子弟子弟以父兄在為郎率多驕驁不通今古至于積功理人無益于人此伐檀所為作也伐檀詩篇名刺不用賢也宜明選求賢除任子弟之令又曰孝元帝永光元年二月詔丞相御史舉質樸敦厚遜譲有行者光禄嵗以此科第郎從官始丞相御史舉其四科人以擢用之而見在郎及從官又令光禄毎歳依此科考校定其第髙下用知其人賢否又詔列侯舉茂材諌大夫張勃舉太官獻丞陽湯獻丞上貢獻物湯有罪勃坐削户百㑹薨故賜謚曰繆侯以舉不得人故其懲勃也如是故官得其材位必乆安為令者長子孫官以為姓號三代以降斯之為盛漢書音義曰甲乙科謂作簡策難問列置案上任試者意投射取而答之謂之射策一者為甲次為乙若録政化得失顯而問之謂之對策後漢書曰建武七年下詔曰比隂陽錯誤日月薄蝕百姓有過在予一人公卿司𨽻州牧舉賢良方正各一人遣詣公車朕将覧試焉又曰韋彪上議曰宜以才行為先不可拘以閥閲然其要歸在于選二千石二千石賢則貢舉得其人矣帝深納之又曰章帝建初元年詔曰夫鄉舉里選必累功勞今刺史守相不明真偽茂才孝亷嵗以百數既非能顕而常授之政事甚無謂也每尋前代舉人貢士或起􅅵畆不繫閥閲史記明其等曰閥積其功曰閲前代舉人務取賢才不拘閥閲也敷奏以言則文章可採明試以功則政有異績文質彬彬朕甚嘉之其令太傅三公中二千石二千石郡國守相舉賢良方正能直言極諫之士各一人又章帝建初五年詔曰公卿以下其舉直言極諫能指朕過失者各一人遣詣公車将親覧問焉其以巖穴為先勿取浮華漢官儀曰建初八年十二月己未詔書辟士四科一曰徳行髙妙志節清白二曰經明行修能任愽士三曰明曉法律足以决疑能案章覆問文任御史四曰剛毅多畧遭事不惑明足照奸勇足以㫁可任三輔中有孝悌清公之行自今以後審四科辟多士刺史二千石嵗舉茂才尤異者孝亷亷吏務實校試以職有非其人不習官事正舉者故舉不實為法罪之後漢書和帝永光五年詔曰選舉賢良為政之本科别行能必由鄉曲而郡國舉吏不加簡擇故先帝明勅在所令試之以職乃得充選又徳行尤異不須經職者别署狀上而宣布以來出入九年二千石曽不承奉恣心從好司𨽻刺史訖無紏察今新蒙赦令且復申勅後有犯者顕明其罰在位不以選舉為憂督察不以發覺為負非獨州郡也是以庶官多非其人下人被奸邪之傷由法不行故也又永光六年詔曰朕以𦕈末奉承鴻烈隂陽不和水旱違度濟河之域㓙饉流亡而未獲忠言至謀所以匡救之策寤寐永歎用思孔疚惟官人不得于上黎民不安於下有司不念寛和而競為苛刻覆案不急以妨民事甚非所以上當天心濟元元也思得忠良之士以輔朕之不逮其令三公中二千石二千石郡守相舉賢良方正能直言極諌之士各一人昭巖穴披幽隠遣詣公車朕将親覧焉帝乃親臨策問選補郎吏又永元七年詔曰元首不明化流無良政失于人謫見于天深惟庶事五教在寛是以舊典因孝亷之舉以求其人有司詳選郎官寛博有謀才任典城者三十人既而悉以所選出補長相又永平十三年詔曰幽并凉州戸口率少邉役衆劇束修良吏進仕路狹撫接夷狄以人為本其令縁邉郡户口十萬以上嵗舉孝亷一人不滿十萬二嵗舉一人五萬以下三歳舉一人又曰安帝永初元年詔公卿内外衆官郡國守相舉賢良方正有道術之士明政術逹古今能直言極諌者各一人又永初二年詔曰昔在帝王承天理人莫不據璇璣玊衡以齊七政朕以不徳遵奉大業而隂陽差越變異並見間令公卿郡國舉賢良方正逺求博選開不諱之路兾得至謀以鑒不逮而所對俱循尚浮言無卓爾異聞其百僚及郡國吏人有道術明習灾異隂陽之度璇璣之數者各使指變以聞二千石長吏明以詔書博衍幽隐朕将親覽待以不次兾獲嘉謀以承天誡又詔其明經任博士居鄉里有亷清孝順之稱才任理人者國相嵗移名與計偕上五年又詔曰為政之本莫若得人褒賢顯善聖制所先濟濟多士文王以寜思得忠良正直之臣以輔不逮其令三公特進侯中二千石郡守諸侯相舉賢良方正逹於政化能直言極諌之士各一人及至孝與衆卓異者并遣詣公車朕将親覽焉又曰胡廣南郡人初為郡縣吏太守法雄之子真從家來省其父真頗知人㑹嵗終應舉雄勅真􅂇其求才雄因大㑹諸吏真自於牖間宻占察之乃指廣以白雄遂舉孝亷既到京師試以章奏安帝以廣為天下第一旬月拜尚書郎五遷尚書僕射又陽嘉元年太學新成詔曰試明經者補弟子增甲乙之科員各十人除郡國耆儒九十人皆補郎舍人時尚書令左雄議改察舉之制限年四十以上儒者試經學文吏試章奏如有顔回子竒之類不拘年齒尚書僕射胡廣尚書郭䖍駁之曰選舉因材無拘定制六竒之策不出經學鄭阿之功非必章奏甘竒著用年垂强仕終賈揚聲亦在弱冠漢承周秦兼覽夏殷祖徳師經叅雜伯軌聖主賢臣代以致理貢舉之制莫或廻革今以一臣之言不可剗戻舊章竟從雄議於是雄上言郡國孝亷古之貢士出則宰人宣協風教若其面墻則無所施用孔子曰四十不惑禮稱強仕請自今孝亷年不滿四十不得察舉皆先詣公府諸生試家法文吏課牋奏副之端門練其虗實以觀異能以美風俗有不承科令者正其罪法若有茂才異行自不拘年齒帝從之乃班下郡國明年廣陵孝亷徐淑年未及舉䑓郎疑詰之對曰詔書有如顔囬子竒不拘年齒是故夲郡以臣充選郎不能屈雄詰之曰昔顔回聞一知十孝亷聞一知幾耶淑無以對乃遣還郡于是濟陽太守胡廣等十餘人皆坐謬舉免黜惟汝南陳蕃頴川李膺下邳陳球等三十餘人得拜郎中自是牧守畏慓莫敢輕舉迄于永熹十餘年間察選公平務得其人雄又奏徴海内名儒為博士使公卿子弟為之受學加其俸禄及汝南謝亷河南趙建年始十三各能通經雄並奏拜童子郎自是負書來學者雲集京師又桓帝詔曰孝亷亷吏皆當與城牧人禁奸舉善興化之本常必由之詔書連下分明懇惻而在所翫習遂至怠慢選舉乖錯害及元元頃雖頗繩正猶未懲改方今淮夷未殄軍師屢出百姓疲瘁困于徴發庶望羣吏惠我勞人蠲滌貪穢以祈休祥其令秩滿百石十嵗以上有殊才異行乃得參選贓吏子孫不得察舉杜絶邪偽請託之源令亷白守道者得信其操信音伸古字通又曰初平四年試儒生四十餘人上第賜位郎中次太子舍人下第者罷之詔曰孔子歎學之不講則所識日忘今耆儒年踰六十去離夲土營求粮資不得專業結童入學白首空歸長委農野永絶榮望朕甚愍焉其依科罷者聴為太子舍人齊書左僕射王儉請觧領選謂褚顔囬曰選曹之始近自漢末今若反古使州郡貢計三府辟士與衆共之猶賢一人之意古者選衆今則不然竒材絶智所以見遺於草澤也梁書天監中沈約上疏曰當今士子繁多畧以萬計常患官少才多無地以處秀才自别是一種仕官非若漢代取人之例也假若秀才對五問可稱孝亷荅一策能通此乃雕蟲小道何闗理功得失以此求才徒虛語爾後魏書孝文時韓麒麟子明宗上言曰前代取士必先正名故有賢良方正之稱今州郡貢察徒有秀才之名無秀才之實而朝廷但檢其有門地不復弹坐如此則可别貢門地以叙士人何假置孝秀之名也夫門地者是其父祖之貴烈亦何益于皇家苟有竒才雖屠釣奴虜之賤亦可用之苟非其人雖三后之冑自墜于皂𨽻矣或云代無竒才不若取士于門地此亦失矣豈可以世無周召便廢宰相而不置哉但當校其才長銖重者即先叙之則賢才無遺矣北齊書曰課試之法中書策秀才集策考貢士考功郎中策亷良天子常服乗輿出坐於朝堂中楹秀才各以真草對有脱誤者呼起位席後書有濫劣者飲墨水一升文理孟浪者奪席脫容刀後周書曰宣帝大成元年詔舉髙才愽學者為秀才郡舉經明行修者為孝亷上州嵗一人下州嵗一人隋書曰文帝開皇中制諸州貢士歳三人工商不得入仕太平御覧卷六百二十八
