front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_067-1a, image: WYG0893/WYG0893-0547c.png}
body:
  text: 太平御覧卷六十七宋季昉等撰地部三十二池谿壑池廣雅曰沼池也說文曰隍城池也有水曰池無水曰隍詩曰東門之池可以漚麻又曰王在靈沼於牣魚躍沼池也牣滿也箋云靈沼之水魚盈滿其中皆飛躍言亦得其所也韓詩外傳曰齊景公出弋昭華之池傳曰齊伐楚楚子使屈完對曰楚國方城以為城漢水以為池齊雖衆無所用之史記封禪書曰秦始皇逰海上祠名山大川及八神仙人羡門之屬八神一曰天齊祠天齊天池名臨南郊山漢書曰昆明池漢武帝元狩三年所穿也初漢欲求身毒國為昆明池夷所閉昆明有滇池方三百里名曰滇河漢将伐昆明以通身毒使謫卒伐棘上林象滇河作昆明池以習水戰池周廽四十里漢武帝平昆明以其地為益州郡其滇水原深廣末反淺狹有似倒流故曰滇河潘岳關中記曰昆明池漢武帝習水戰也中有靈沼神池云堯時理水訖停船此池蓋堯時已有汚池漢代因而深廣耳曹毗志怪云漢武鑿昆明池深極悉是墨灰無復土舉朝不觧以問東方朔朔曰臣愚不足以知之可試問西域胡也以朔不知難以核問至後漢明帝時外國道人入來洛陽時有憶方朔言者乃以武帝時墨灰問之胡人云天地大刼将盡則刼燒此刼燒之餘乃知朔言者是又曰昭帝元始元年春三月黄鵠下建章宮太液池又曰宣帝詔曰池籞未御幸者蘇林曰折竹以䋲綿連若禁籞使人不得往來也假與貧民郡國宫舘勿復脩治又曰宣帝神爵元年詔曰金芝生于涵徳殿銅池中銅作池也魏志曰太祖還鄴作𤣥武池以肄舟師晉書曰山簡㳺優卒嵗唯酒是躭諸習氏荆土豪族有家園池簡每出嬉逰多之池上置酒輙醉名之曰髙陽池時有童兒歌曰山公出何許徃至髙陽池日夕倒載歸酩酊無所知時時能騎馬倒著白接䍦舉鞭向葛疆何如并州児疆家在并州簡愛將也又曰荀勗久在中書專管機事失之甚怏怏或有賀之者勗曰奪我鳯凰池諸君賀我耶後魏書曰文明皇太后馮氏與髙祖幸靈泉池醼群臣太后忻然歌髙祖亦和歌歌者九十人唐書曰蔣鎮為諌議大夫時戸部侍郎判度支韓滉上言河中鹽池生瑞鹽實土徳之上瑞上以秋霖稍多水潦為患不宜生瑞命鎮馳驛檢按之鎮奏與滉同仍上表賀請宣付史舘並請置神祠錫其號寳應靈慶池又曰文宗用鄭注言即命左右神策軍差入淘曲江昆明二池仍許公卿士大夫之家於江頭立亭舘以時遊賞遁甲開山圖榮氏觧曰境北有陽石山中有神龍池黄帝時雲揚先生飬龍於此帝王厯代飬龍之處國有水旱不時祀池請雨晉宫閣名曰靈芝池廣長百五十歩深二丈上有連樓飛觀四出閣道釣臺中有指南舟袁山松宜都記曰佷山縣東六十里有山名下魚城四面絶崖唯两道可通皆峻嶮山上周廽可二十里有林池水民田種於山上昔永嘉亂土人登此避賊賊守之經年食盡取池魚擲下與之禾不窮賊遂退散因名此為下魚城辛氏三秦記曰昆明池通白鹿源有釣魚綸絶而去夢於漢武求去其鈎明日逰於池見大魚銜鈎帝去其鈎而逝又間三月帝復逰池濵得明珠一雙武帝曰豈昔魚之報也湘州記曰湘南縣有架山下有小池常涸民齋戒往請自然而滿事訖還乾雷次宗豫章記曰去洪井六七里有風雨池山橋水出激著樹木星散逺灑如風雨焉襄陽記曰峴山南有䂖季倫習都大魚池依范蠡飬魚法當中築一釣臺季倫将亡勅其兒曰必𦵏我近魚池山季倫每臨此輙大醉而歸臨川記曰崇仁縣有鹹池按陳書司空黄法􅉤音翟字仲昭崇仁縣巴山人也侯景亂法􅉤扵鄉里聚徒以助髙祖有功薨墓在崇仁縣巴山鄉故老相傳法􅉤有竒術常欲變置鹹池於家山之下幅圎六十餘畆至今水味獨鹹於他水而湛然清潔禽畜不敢觸之西京雜記曰梁孝王好宫室苑囿之樂作曜華之宫築園園中有靈山山安膚寸石又鴈池池中鶴洲鳬渚竒果異樹珍禽怪獸畢備王日與宫人及賔客弋釣其中又曰積草池中有珊瑚樹髙一丈二尺一云三柯上四百六十二條是越國王趙佗所進號為烽火樹至夜光景照焉述征記曰廣陽門北有魏明帝流杯池穆天子傳曰天子西征於𤣥池天子三日休於𤣥池之上天子乃樹之竹種竹池邊是曰竹林又曰天子觴西王母于瑶池上西王母為天子謡三輔故事曰漢武帝作昆明池武帝崩後於池中飬魚以給諸陵祠餘付長安市池有二石人如牽牛織女像又曰未央宫西有大池池中有臺王莽死於是焉廣州先賢傳曰丁宻字靖公蒼梧人父艱泣血三年飛鳬一雙逰宻廬傍小池郡國志曰晉州臨汾縣臭水池百畜不飲一名翻鑊池今池上有脂潤又曰成都郡秦惠王二十七年使張儀築以象咸池沃野千里號曰陸海有萬嵗池是築城取土處又曰合浦海曲出珠號曰珠池又有夷人號越邑多採甲香為業世説曰晉明帝欲作池臺元帝不許時明帝為太子養武士一夕中作池曉便成即今謂太子池是也又曰太原王國寳治宅因浚池忽見一物如酒杓形長四尺許飛去水經注曰隴西神馬山有淵池龍馬所生即是水西流謂之馬池又曰蔡州西即蔡倫故宅傍有蔡子池倫漢黄門郎順帝之世始𢷬故魚網為紙用代簡素自其始也又曰滇池中有神馬家馬交之則生駿駒日行五百里顧子曰與子華逰於東池子華曰水有四徳池為一焉沭浴群生流澤萬世仁也揚清激濁盪滌塵穢義也弱而難勝勇也導江䟽河變盈流謙智也顧子曰我得汝於池上矣方輿記曰興元府南鄭縣天池山上有池方二十里冬夏不竭久飲之可愈痼疾故號天池又曰梅福池一名風雨池梅福種蓮池福歎曰生為我酷身為桎梏形為我辱智為我毒於是棄南昌縣尉去妻子入洪崖山得道為神仙代代有人見或在玉笥山逢之今西山有梅君壇南昌開元觀有梅君堂焉又曰明月池在興道縣西北中有一臺云是漢髙所營水經注云形如偃月故號明月池又曰七女池昔有人無男而飬七女父亡七女負土𦵏父取土之處今成一池號曰七女池邊又有七女塚吕氏春秋曰衛靈公天寒鑿池宛春諌曰天寒公曰天寒乎宛春曰公衣狐裘坐熊席陬隅有竈是以不寒淮南子曰隂氣極則下至黄泉故不可鑿池穿井谿尚書大傳曰吕尚釣於磻谿得魚腹中有玉璜春秋說題辭曰谿者隱也老子曰知其雄守其雌為天下谿爾雅曰水注川曰谿桓彛别傳曰彛字茂倫明帝世彛與當時英彦名徳庾亮温嶠羊曼等共集清谿池上郭璞與焉乃援筆屬詩以白四賢並自序武昌記曰樊山東有山谿夏時凛凛恒有寒氣故謂之寒谿王韶之始興記曰連水下流有斟谿一日十溢十竭盛宏之荆州記曰酈縣北五十里有菊谿源出䂖澗山有甘菊村人食此水多夀又曰零陵郡西有渡溪山獸從數十里徃飲之經越他水皆不飲傍有半䂖坑上䂖形極方峭名為仙人樓又曰桂陽郡横谿水甚深冬夏不乾俗謂之貪泉也又曰郡西南五十里有萬嵗山有䂖窟出鍾乳山上悉生靈夀木下有一谿名為千秋水其傍有居民即號萬嵗村水經注曰長陽谿源右穴中有神魚大者二尺小者一尺居民釣魚先陳所須多少拜而請之拜訖投釣得魚過數者水輙波涌暴風卒起樹木摧折水側生異花路人欲是者皆當先請不得輙取又曰白馬谿水出宜陽山有大䂖厥狀似馬故谿以物色受名也水經注曰向城有水二源俱北流合為一川名為天漿谿也又曰閩中有徐登者女子化為丈夫與東陽趙昞並善仙術時遭兵亂相遇於谿各矜其所能登先禁谿水為不流昞次禁枯桞為生䄺二人相視而笑登年長昞師事之後登身故昞東入章安百姓未知昞乃升茅屋搘鼎而爨主人驚怪昞笑而不應屋亦不損又嘗臨水求渡船人不許昞乃張蓋坐中長嘯呼風亂流而渡於是百姓神服從者如歸市水經注曰山陰縣西南四十里有二谿東谿廣一丈九尺冬暖夏冷西谿廣三丈五尺冬冷夏暖二谿北出行三里至徐村合成一谿廣五丈餘而温涼不雜蓋山經所謂苕水也又曰朐䏰縣有龜溪出靈龜咸熈元年獻龜於相府言出自此溪也郡國志曰豫州吳房縣吳王闔閭之弟夫槩王奔楚楚封之於堂溪郡國志曰王昭君秭歸人也有香溪即昭君每常逰翫之處又曰資陽縣有環溪百丈池所謂溪流如環其池深百尺也又曰陵陽山在石埭縣北三里按輿地志云陵陽令竇子明於溪側釣魚一日釣得白龍子明憐而放之後數年又釣得一白魚割其腹中乃有書教子明燒錬食餌之術三年後白龍來迎子明遂得上昇其溪環繞山足今有仙壇醮祭不絶信州圖經曰師溪水源出黄蘗山北面在弋陽縣東南一百十餘里昔有隱士胡趨居於此處衆人師之故名師溪越絶書薛燭謂越王曰若耶之溪涸而出銅也古歐冶子鑄劍之所故戰國䇿云涸若耶以取銅破堇山而出錫焉郡國志曰歐冶子鑄劍之處下有孤潭深而清有孤䂖聳出潭上有大櫟樹謝客兒與弟惠連作詩句屢屢刻於樹上呉興記曰前溪在縣東南流入太湖謂之風渚夾溪悉生箭箬稜溪在市北東出餘不亭晉車騎將軍沈充作前溪歌曲傳者以為指此溪也管子曰桓公征北孤竹迴未至卑耳之谿援弓而射未敢發謂左右曰見前人乎對曰不見公曰寡人見人長尺而人物具焉管仲曰臣聞霸王之君興則登山神見公拜曰仲父之聖若此世說曰郗僧施青谿中汎舟一曲處輒作一篇詩謝益夀見詩嘆曰青谿中曲何可窮水經注曰磻溪即太公釣所也䂖髙深泉䆳宻林障秀阻人迹罕交東南隅有䂖室蓋太公所居也水次平䂖即太公垂釣之處也其水清泠神異北流注於渭廣州記曰百管谿周迴丈餘水極沸涌如猛火煎油聲臨海圖經曰銅溪在縣西北五十里其水黄色狀似銅故號銅溪也孫興公天台山賦云過靈溪而一躍善歌録曰武溪水源出武山東南流注于溪故為歌曰武溪深復深飛鳥不能渡逰獸不能臨又下潦上霧看飛鳥墮水中即此也壑周易略例曰隆墀永歎逺壑必盈禮記曰大蜡之祭辭曰土反其宅水歸其壑山海經曰東海之水有大壑列子曰渤海之東不知幾億萬里有大壑實惟無底之谷曰歸墟莊子曰大壑之為物注焉而不滿取焉而不竭又曰藏舟於壑藏山於澤謂之固矣然而夜半有力者負之而走昧者不知也孟子曰志士不忘在溝壑太平御覽卷六十七
