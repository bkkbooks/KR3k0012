front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_812-1a, image: WYG0900/WYG0900-0197c.png}
body:
  text: 太平御覽卷八百十二宋李昉等撰珎寳部十銀黄銀水銀鉛錫銀周禮夏官下曰正南曰荆州其利丹銀爾雅曰白金謂之銀其美者謂之鐐郭璞曰遼音也孝經援神契曰神靈滋液有銀甕不汲自滿史記封禪書曰殷得金徳銀山溢蘇林注曰溢出又曰蓬萊方丈瀛洲此三神山黄金白銀為宫闕太史傳曰安息國以銀為銀錢如其王面王死輙更錢效王面焉又曰舜為父母淘井將銀錢安罐中與父母漢書曰王莾時珠提銀重八兩一流直千五百八十張晏日珠提縣名萬揵為出銀池銀一流直千是為銀貨西域傳曰無雷國出銀司馬彪續漢書曰大秦國以金錢為錢十銀錢當一金錢魏志曰郭修手刅蜀大將軍費禕追加褒寵謚曰威侯子龍加封拜奉軍都尉賜銀千餅魏武上雜物疏曰御物中宫貴人公主皇子純銀漆帶鏡一枚西貴人純銀叅帶五皇子銀匣一皇子雜用物十六種純金叅帶方嚴四具又曰御物及貴人公子皇子有純銀香爐也魏志曰穢國男女繫銀廣數寸以為餙蜀志曰先主平蜀賜諸葛亮等銀千斤吳志曰孫皓時言掘地得銀長一寸廣一分刻上有年月於是改年為天䇿又曰婁圭為劉表所圍圭飲食健兒數百人人賜銀一斤使繋表晉故事曰成帝咸康元年有司奏上元給賜衆官銀檢金部見銀一萬五千兩充給宋起居注曰廣州刺史韋􅍢銀鉿二板齊書曰明帝每有儉約欲鑄壊大官元日上夀銀酒鎗尚書令王宴等咸稱盛徳蕭頴胄曰朝廷盛禮莫過三元此一品既是舊物不足侈帝不恱後預曲宴銀器滿席頴胄曰陛下前欲壊酒鎗恐宜移在此器也帝甚慙南史曰梁陶季直丹陽和陵人也祖愍祖宋廣州刺吏父京仁中散大夫季直早慧愍祖甚愛異之嘗以西凾銀列署於前令諸孫各取一季直時年四嵗獨不取曰若有賜當先父伯不應度及諸孫故不取愍祖益竒之陳書曰周文育從南海出至大庾嶺遇卜者卜之曰君北下不遇作令長南入則為公侯又當暴得銀二千兩若不見信以此為驗其夕宿於逆旋有賈人求與文育博文育勝之得銀二千兩且遂却入嶺南崔鴻十六國春秋前趙録曰聰引帝入讌語帝曰卿為豫章王時贈朕柘弓銀研卿頗憶不曰臣安敢忘之但恨爾時不得早識龍顔後趙録曰大武殿室皆錫楹金柱後魏書曰銀出始興陽山縣又出桂陽陽安縣驪山有銀礦二石得銀七兩白登山亦有銀礦百石得銀七兩宣武帝詔並置銀官每令探鑄又曰孝明皇帝開柏州銀山之禁與人共之又曰太武皇帝和平二年詔中尚坊作黄金合盤鏤以白銀劒以玫珚唐書曰武徳中方何人師市奴合金銀并成上異之以示侍臣封徳彛進曰漢代方士盈劉安等皆觧學術唯云黄白不成金銀為食器可得不老又曰貞觀中治書侍御史權萬紀上言宣弼二出諸山大有銀坑採之極是利益每嵗可得錢百萬貫上謂曰朕貴為天子是事無所少之惟須嘉言善事有益於百姓買且國家賸得數百萬錢何如得一有才行人不見卿推賢進善之事又不能按舉不法震肅權豪惟只言稅鬻銀坑以利為多美昔堯抵壁於山投珠於谷由是崇名美號見稱千載後漢桓靈二帝好利賤士為近代庸暗之主卿遂欲將我比桓靈耶是日放令還第又曰太宗引杜淹為天䇿朝兵曹叅其文學舘學士常侍宴賦詩時有八人同作淹為稱賞賜以銀鍾又曰貞觀中鴻臚奏髙麗莫支離貢白金黄門侍郎禇遂良進曰莫支離虐殺其主九夷所不容陛之以之興兵將事弔伐為遼山之人報主辱之恥若受其貢何所致伐太宗納焉又曰元和十四年涇原節度使王潜進銀三千兩熟線綾三千疋涇州宻邇疆境其土無百姓其軍皆仰給度支舊矣若主無名上獻雖吳蜀沃富猶謂取諸人以干媚不免於譏責今則盗削軍實以充貢獻而求恩澤葢以時急於利勢使然也又曰太和中尚書左丞王起進亡兄播銀壺瓶二百枚又玉通犀帶刀劒器仗等管子曰上有􅖳者下有銀列子曰周穆王執化人之袪騰而上天暨化人之宫搆以金銀絡以珠玉淮南子曰夫淇衞箘簬餙以銀錫有薄縞之􅀈不能獨穿也抱朴子曰銀但不及金玉服可地仙穆天子𫝊曰天子乃賜夷狄之人戲黄金之鹿麋今有地中得玉琢金狗之屬皆古者賜夷狄之竒貨又曰披圖視觀天子之寳器有燭銀銀青精光如燭山海經曰扭陽之山其陽多白銀郭璞曰即銀也少陽之山其下多赤銀銀之精也東方朔神異經曰南方有銀山長五十餘里髙百餘丈皆悉白銀不雜土石不生草木東方朔十洲紀曰東方外有東明山有宫焉左右闕而立其髙百尺建以五色門有銀牓以青碧鏤題曰天地長男之宫南方有誾明山有宫焉有銀牓題曰天地中女之宫桓譚新語曰期門郎程偉好黄白事娶婦得怪女偉無衣焉婦致兩疋繒後見夫方扇炭欲燒筒中水銀婦乃出其中藥以投之立成銀偉就求道不授發狂而死白虎通曰王者易姓而起必升封太山何報告之義或曰封金銀䋲或曰石塗金銀䋲封之以印璽瑞應圖曰王者晏不及醉刑罰中人不為非則銀甕出阮諶王禮圖曰牛鼎受一斛天子餙以黄金錯以白銀幽明緑曰徐琦每見一女子姿色甚美使解臂上銀給贈之列異記曰故司𨽻校尉上黨鮑子都少時上計緣於道中遇一書生獨行無伴卒得心痛子都下車為按摩奄忽亡不知姓名有書一卷銀十餅即賣一餅以殯殮其餘銀以枕之索書着腹上哭之謂曰若子魂靈有知當令子家知子在此今奉使命不獲乆留遂辭而去吳越春秋曰禹登委山得五金簡青玉為字編以白銀異物志曰金隣國去扶南二千餘里土地出銀異苑曰𢎞農楊子聞土中作聲掘得銀後三年有虵去梁上落糞皆成碎銀作器賣於市得者尋以破㓕地境圖曰銀氣夜正白流散在地撥之隨手合又曰白銀精變白雄雞酈元注水經曰潺水出潺山水原有金銀礦洗取火合之以成金銀南越志曰遂成縣任山銀沙自出外國事曰私呵謂國王供養道人食日銀三兩任預益州記曰陶保至益州大飢米二合直銀一兩王韶之始興記曰冷君西北有小首山宋元嘉元年夏霖雨山崩自興及麓崩處有光耀有若星辰焉居人聚觀皆是銀鑠鑄得銀也又曰秋水源山盤石上羅列十甕皆葢以青盆其中悉是銀餅人有遇之者但得開觀之不可取取輙迷悶晉太元初林駈家僕竊三餅有虵傷而死其夜林駈夣神語曰君奴不良盗銀三餅已受顯戮願以銀相備駈覺奴死銀在其傍有徐道者自謂能致乃集祭酒盛奏章書撃鼓吹入山須臾雷霆雨石倒樹折木道遂懼走湘州記曰曲江縣有銀山山多素霧廣州記曰廣州布政司用銀易朱遂成縣任山有銀空有銀砂柱陽記曰臨賀山有黒銀黄銀禮斗威儀曰君乘金而黄則黄銀見隋書曰辛公義為牟州刺史時山東霖雨自陳汝至于滄海皆苦水災境内犬牙獨無所損山出黄銀獲之以獻詔水部郎婁前就公義禱乃聞空中有金石絲竹之響唐書曰太宗嘗賜房𤣥齡黄銀帶顧謂曰昔如晦與公同心輔朕今日所賜惟獨見公因泫然流涕又曰如聞黄銀多為鬼神所命取黄金帶遣𤣥齡親送于靈所也水銀史記曰秦始王葬以水銀為百川江河大海機轉相輸終而復始皇覧曰關東賊發始皇墓中有水銀廣雅曰水銀為之澒吳越春秋曰閶闔葬墓中澒地廣六丈神仙𫝊曰封君逹隴西人服錬水銀年百餘嵗常騎青牛鉛尚書禹貢曰海岱惟青州岱畎絲枲鉛松怪石宋記曰髙漸離秦始皇曤其目使撃筑漸離乃以鉛置筑中舉筑扑秦始皇帝漢書曰江都王建官人八子有通者輙令以鉛杵㫪不中程輙掠廣洲王去數召姬榮愛與飲后昭信譛之銷鉛灌其口中漢書曰或盗靡錢質而取鉛如淳曰或曰民盗靡漫而其鉛以更鑄作錢東觀漢記曰曹褒􅃦則抗鉛范子計然曰黒鉛之錯化成黄丹丹再化之成水粉淮南子曰鉛不可為刀又曰鉛之與丹異類殊色而可以為丹者誠得數也抱朴子曰愚民不信黄丹及葫粉是化鉛所作桓子新論曰淮南王之子聘迎道人作金銀又云字鉛與公鉛則金之公而銀者金之昆弟也茅君内𫝊曰取鉛十斤安鐡器中猛火大燒之三沸投九轉之華一銖於鉛中攪之立成黄金神仙𫝊曰尹軌字公度有一人遭父䘮當葬而貧窮及公度過省之孝子説甚辛苦公度愴然曰卿假求數十斤鉛得否孝子言猶可得耳乃具一百斤公度將入前山中架小塵下於爐火中鋪鉛以其所帶管中藥如棗大投拂鉛中攪之皆成好銀以與之告曰念卿貧困故以相與慎勿多言述異記曰河間有雨鉛城漢世天雨鉛地鏡圖曰草青莖赤秀下有鉛𤣥中記曰鉛錫之精為老婢錫周禮夏官下職方曰揚州其利金錫爾雅曰錫謂之靷周官考工記曰凡鑄金之狀金與錫黒濁之氣竭黄白次之黄白之氣竭青氣次之然後可鑄史記曰江南出柟梓魯柱錫連徐廣曰連音蓮鉛之禾錬者也淮南子曰明鏡之始照未見其容也及杚之以錫磨之以氈則鬚眉見山海經曰龍山之下多赤錫濯山多白錫越絶書曰赤堇山破而出錫吳越春秋曰越王兄常聘歐冶子不能鑄鉛錫為干將神仙𫝊曰尹軌字公度常見一人本宦族子弟仕郡遇公事簿書不了當陪官錢百萬賣田宅車牛不售而停見收繫公度語所富人曰子可以百萬錢借我我欲以救人後三十在倍當相還富人喜敬之即以百萬錢與公度以與遇事者曰卿能得一百二十斤鉛不遇事者即具之公度於䥶中銷錫復以其腰間管中藥一方寸匕投沸錫中攪之皆成金郎稱賣與人得錢百萬以還人近光熈元年間公度到南陽太和山中􅀶物志曰積艾草三年燒之津液下流成􅖳錫太平御覽卷八百十二
