  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_653-1a, image: WYG0898/WYG0898-0796c.png}
body:
  text: 太平御覽卷六百五十三宋李昉等撰釋部一叙佛漢書曰漢使驃騎將軍霍去病出隴過焉耆山得休王屠祭天金人顔師古注曰作金人以為天神之主而祭之即今佛像是其遺法也後漢書曰浮圖者佛圖也西域天竺國有佛道焉佛者漢言覺也將以覺悟羣生也統其教以修善慈心為主不殺生類專務清静其精進者號為沙門漢言息心蓋息意去欲而歸無為也又以為人死精神不滅隨復受形所行善惡皆有報應故所貴行善修道以練精神練而不已以至無生而得佛也身長丈六尺黄金色項佩日月光變化無常無所不入故能化通萬物而大濟羣生初夢見金人長丈餘頂有日月光以問羣臣或曰西方有神其名曰佛其形丈六尺而黄金色陛下之所夢得無是乎於是遣使之天竺而問道術遂於中國而圖其形像焉有經書數千卷以虛無為宗包羅精粗無所不統善為宏濶勝大之言所求在於一體之内而所明在於視聽之表故世俗之人以為虛誕然歸於𤣥㣲深逺難測故王公大人觀死生報應之際莫不矍然自失也晉書曰後趙百姓以佛圖澄故多奉佛皆營造寺廟相競出家眞偽混淆多生愆過季龍下書料簡其著作郞王度奏曰佛外國之神非諸華所應祠奉漢代初傳其道唯聽西域人等得立寺都邑以奉其神漢人皆不出家魏承漢制亦修前軌今可斷趙人悉不聽詣寺燒香禮拜以遵典祀宋書曰顧歡以佛道二家立教之異學者互相非毁乃著夷夏論曰道經云老子入關之天竺維魏國國王夫人名曰浄妙老子因其晝寢乘日精入浄妙口中後年四月八日夜半時剖左腋而生墜地即行七步於是佛道興焉此出𤣥妙内篇佛經云釋迦成佛有塵刼之數出法華無量壽然二經所説如合符契道則佛也其聖則符其迹則反歡雖同二法而意黨道教司徒袁粲託為道人通公駁之後魏書釋老志曰凡設教大抵言生生之數皆因行業而起有過去當今未來厯三世識神常不滅凡為善惡必有報應漸積勝業陶冶麤鄙經無數形藻練神明乃致無生而得佛道也其間階次心行等級非一皆縁淺以至深藉微而為著率在於積仁順蠲嗜欲習虛静而成通照也故其始修心則依佛法僧謂之三歸又有五誡去殺盜媱妄言飲酒大意與仁義禮智信同名為異耳南史曰郭祖深以武帝溺情内教朝政弛縱輿襯詣闕上封事曰比來慕法普天信向家家齋戒人人懴禮不事農業空談彼岸夫農桑者今日濟育功德者將來勝因豈可惰本勤末置近效賖也時帝大𢎞釋典將以易俗故祖深尤言其事以為都下佛寺五百餘所窮極宏麗僧尼十餘萬資産濃沃所在郡縣不可勝言道人又有白徒尼則畜養女皆不貫人籍天下戸口幾亡其半而養僧尼多非法養女皆服羅紈蠧俗傷法抑由於此恐方來處處成寺家家剃落尺土一人非復國有南史曰天竺諸國皆事佛道自後漢明帝法始東流自此以來其教稍廣别為一家之學元嘉十二年丹陽尹蕭摹之奏曰佛教被於中國已厯四代而自頃以來更以奢競為重請自今以後有欲鑄銅像者悉詣臺自聞興造塔寺精舍皆先列言須許報然後就功先是晉世庾氷始創議欲使沙門敬王者後桓𤣥復述其議並不果行宋大明六年孝武使有司奏沙門接見皆盡敬詔可隋書經籍志曰釋迦在世四十九年教化乃至天龍人鬼並來聽法弟子多有得道證果後於拘尸那城娑羅雙樹間以二月十五日入般湼槃湼槃亦曰泥洹譯言滅度亦言常樂我浄弟子迦葉等追撰述其教為十二部經唐書曰傅奕上疏請除去釋教髙祖付羣臣詳議太僕卿張道源稱奕奏合理中書令蕭瑀與之争論曰佛聖人也奕為此議非聖人者無法請寘嚴刑奕曰禮本於事親終於奉上則忠孝之理著臣子之行成而佛踰城出家逃背其父以匹夫抗天子以繼體悖所親瑀非生於空桑乃遵無父之教臣聞非孝者無親瑀之謂矣瑀不能答但合掌曰地獄之設正為是人又曰㑹昌中道士趙歸眞舉羅浮道士鄧元起有長年之術帝遣中使迎繇是與衡山道士劉𤣥静膠固而排釋氏而圻寺之請行焉牟子曰或問曰佛從何而生寜有老祖牟子曰佛生天竺假行王家父曰白浄夫人曰白浄妙四月八日佛精從天來夫人晝寢夢見象六牙欣然悦之遂感而孕因以八日從母右脇而生太子有三十二相八十種好頰如師子皮不受塵水手足皆鈎鎻毛悉向上又曰子得佛道以來良有益否牟子曰吾自得佛道來如開浮雲見白日如執火炬入𠖇室矣建康實録曰吳赤烏十年胡人康僧㑹入境置經行所朝夕禮念有司以聞帝曰昔漢明帝感夢金人使往西方求之得摩騰竺法蘭來中國立經行教今無乃是遺類乎因引見僧㑹其言佛教滅度已久唯有舍利可以求請遂於大内立壇結静三七日得之帝崇佛道以是江東初有佛法髙僧傳曰釋慧嚴宋髙祖素所知重文帝在位情好尤宻先是帝未甚崇信京尹蕭摹之上啓請創起寺及鑄像帝乃與侍中何尚之吏部郞羊𤣥保等議之謂尚之曰謝靈運常言六經典文本在濟俗為本必求靈性真奥豈得不以佛經為指南耶近顔延之推達性論尤為名理羊𤣥保進曰此談蓋天人之際豈臣所宜預竊恐秦楚論强兵之術孫吳畫吞併之計將無取於此耶帝曰此非戰國之具良如卿言尚之曰夫人禮隱逸則戰士怠貴仁德則兵氣衰若以孫吳為志苟在吞噬亦無取於堯舜之道豈唯釋教而已邪帝悦曰釋門有卿亦猶孔氏之有季路世説曰殷中軍見佛經云理亦應阿堵上注云佛經之行中國尚矣而記傳無聞莫詳其始牟子曰漢明帝夜夢見神人身有日光飛上殿前意甚欣悦明日問羣臣有通人傅毅對曰聞天竺有得道者號曰佛輕舉能飛身有日光殆將其神也於是上悟遣羽林郞秦景博士弟子王遵等十二人之大月氏國寫取佛經四十二部在蘭䑓石室又曰庾公常入佛圖見卧佛曰此子疲於津梁時人以為名言湼槃經云如來背痛於雙樹間北首而卧故後之圖繪者為此像也佛地論曰佛者覺也覺一切種智復能開覺有情如睡夢覺故名為佛姓釋迦號牟尼佛普曜經曰佛兠率天降神於西域迦羅衛國浄飯王宫摩耶夫人剖右脇而生時多靈瑞生而能言本相經曰年十九踰城出家學道勤行精進禪定六年成道具三十二相八十種好湼槃經曰醍醐之教踰於佛性從乳出酪從酪出蘇從生蘇出熟蘇熟蘇出醍醐醍醐蘇之精也法顯記曰佛生於殷末道成於周初至成王十二年經律始到新頭河河即張騫所到之處佛骨記曰佛有四牙廣半寸長半寸一牙在呵條國又一牙在天上又一牙在海龍王宫又一牙在乾陁國國王使大臣九人守保之月朝捧擎牙出或放光明香花數十斛散牙上而牙不没唐韓愈論佛骨表曰伏以佛者夷狄之一法耳自後漢時流入中國上古未嘗有也昔黄帝在位百年年百一十歲少昊在位八十年年百歲此時天下太平百姓安樂壽考然而中國未有佛也其後殷湯亦年百歲湯孫太戊在位七十五年武丁在位五十九年書史不言其年壽所極盖亦非因事佛而致然也漢明帝時始有佛法明帝在位纔十八年耳其後亂亡相繼運祚不長宋齊梁陳元魏已下事佛漸謹年代尤促唯梁武帝在位四十八年前後三度捨身施佛宗廟之祭不用牲牢晝日一食止於菜果其後竟為侯景所逼餓死䑓城國亦尋滅事佛求福乃更得禍由此觀之佛不足信也亦可知矣髙祖始受隋禪則議除之當時羣臣才識不逺不能深究先王之道古今之宜推闡聖明以救斯弊其事遂止陛下睿聖文武數千百年以來未有倫比即位之初即不許度人為僧尼道士不許創立寺觀臣常以為髙祖之志必行於陛下之身縱未能即行豈可恣之轉令盛也今聞陛下令羣僧迎佛骨於鳳翔御樓以觀舁入大内又令諸寺逓迎供養臣雖至愚必知陛下不惑於佛以祈福也直以年豐人樂狥人之心為京師士庶設詭異之觀戱玩之具耳然百姓愚㝠易惑難曉苟見陛下如此將謂真心信佛皆云天子大聖猶一心敬信百姓何人更惜身命以至焚頂燒指百十為羣解衣散錢自朝至暮轉相倣傚惟恐後時老少奔波棄其業次若不明加禁遏更歴諸寺必有斷臂臠身以為供養者傷風敗俗傳笑四方非細事也夫佛本夷狄之人與中國言語不通衣服殊製口不言先王之法言身不服先王之法服不知君臣之義父子之恩假如其身尚在奉其國命來朝京師陛下容而接之不過宣政一見禮賓一設賜衣一襲衛而出境不令惑衆也況其身死已久枯朽之骨凶穢之餘豈宜令入宫禁孔子曰敬鬼神而逺之古之諸侯行弔於其國尚令巫祝以桃茢祓除不祥然後進弔今無故取朽穢之物親臨觀之巫祝不先桃茢不用羣臣不言其非御史不舉其失臣實恥之乞以此骨付之有司投諸水火永絶根本斷天下之疑絶後代之惑使天下之人知大聖人之所作為出於尋常萬萬豈不盛哉豈不快哉太平御覽卷六百五十三
