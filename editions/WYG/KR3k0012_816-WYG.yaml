body:
  text: 太平御覽卷八百一十六宋李昉等撰布帛部三羅綺織盛綾縠紗綃綈罽紬羅釋名曰文羅䟽也纚簁也麤可以簁物也魏文帝詔曰江東為葛可寧比羅紈綺縠魏志自公侯已下大夫已上皆服綾錦綺羅金縷之物自是以下雜綵之服通於賤人也晉書曰謝𤣥好帶紫羅香囊叔父安惡之不欲傷其意因賭而焚之遂絶晉令曰第一品已下不得服羅綃東宮舊事曰太子納妃絳真文羅一幅帔一絳林文繡羅一幅帔一絳真衣羅袴一王孫子曰隨珠曜日羅衣從風燕丹子曰荆軻左手執秦王袖右手揕其胷秦王願聽琴聲而死召姬人鼔琴聲曰羅縠單衣可掣而絶淮南子曰齊俗有紫繡羅紈漢武内傳曰帝以七月七日掃除宮掖之内設大床於殿上以紫羅薦地燔百和香燃九微燈以待西王母西京雜記曰趙飛燕為皇后女弟在昭陽殿遺書曰今日嘉辰貴姉懋膺洪冊上檖三十條以陳踊躍金花紫羅面衣織成襦羅帷羅幌羅帳羅幬黃庭經曰黃庭為不死之道受者先齋九日然後受之結盟立誓期以勿洩古者盟以𤣥雲之錦九十尺金簡鳯文羅四十尺徐延年别𫝊曰進士姓徐名延年仙人以新黃羅衣衣之王子年拾遺記曰周成王五年因祗國獻女工一人善於工巧體貌輕潔被纎羅雜繡之衣又曰吳王孫權居昭陽宮趙夫人乃織為羅縠累月而成裁之為幔内外視之飄飄如煙氣輕動而房内自凉異苑曰張仲書為司空廣陵城北元嘉年七月中輙見門側有紫氣赫然後空中忽雨絳羅於其庭内廣七八分長五六寸又以箋紙繼之廣長亦與羅等紛紛甚張惡而焚之猶有數片府州多相傳示張經宿暴疾而死世説曰武帝降王武子供饌悉用琉璃器婢子百餘人皆綾羅袴以手擎飲食宋玉風賦曰躋于羅帷經于洞房司馬相如美人賦曰女以玉釵挂臣冠羅袖拂臣衣張衡南都賦曰羅韈懾惵而容與古詩曰明月何皎皎照我羅衣帷古歌詩曰大婦織綺羅中婦織流黃小婦無所作携琴上髙堂阮籍詩曰西方有佳人皎皎如日光被服纎羅衣左右佩雙璫綺廣雅曰鬱金流黃綦綺説文曰綺文繒也釋名曰綺欹也其文欹斜不順經緯之縱橫也有杯文形似盃也有長命其采色相間皆橫也幅言長命者服之使人命長本造者之意也有棋文方文如棋也漢書曰班伯侍講金華殿在織襦紈之間非其好也又曰賈人不得衣錦繡綺縠又曰孝文六年遺匃奴書使者言單于服繡俗綺衣東觀漢記曰馬后袍極麤䟽諸王朝望見反以為綺后曰此繒染色好故直用之漢書儀曰祭天用六綵綺席六重長一丈干寳晉紀曰初洛中名服有白石綺織者尤之曰石非繒綵之稱晉令曰第三品已下得服雜杯之綺第六品已下得服七綵綺東宮舊事曰太子納妃有七綵杯文綺被一絳石杯文綺被一七綵杯文絳袴長命杯文綺袴司馬相如長門賦曰張羅綺之幔帷垂楚紐之連綱班固西都賦曰紅羅颯纚綺組繽紛潘岳秋興賦序曰今兼虎賁中郎將寓直散騎之省珥璫冕裳綺紈之士此焉遊處古詩曰客從逺方來贈我一端綺文作雙鴛鴦裁為合歡被又曰緗綺為下裳紫綺為上襦曹植詩曰西北有織婦綺縞何繽紛清晨秉機杼日暮不成文織成廣邪曰天竺出細織成續漢書輿服志曰虎賁武騎皆鶡冠虎文章衣襄邑歲獻織成虎文魏畧曰大秦國出金織成帳吳時魏國𫝊曰大秦國天竺國皆金縷織成晉後畧曰張方兵入洛諸官府大刼掠御寳織成流蘇皆分割為馬棧矣晉令曰織成衣為禁物搜神記曰陳節方諸神東海君以織成青襦一領遺之西京雜記曰宣帝被收繫郡邸獄臂上猶帶史良姊合采婉轉絲繩繫身毒國寳鏡一枚大如八銖錢及即位常以琥珀笥盛之緘以戚里織成錦一曰斜文織成錦西京雜記曰趙飛燕為皇后其女弟昭儀在昭陽殿遺飛燕書曰今日嘉辰貴姊懋膺洪冊上檖三十五條以陳踊躍之志内有織成衣裾杜蘭香傳曰蘭香降南羣張碩與碩織成袴衫鄴中記曰石虎冬月施流蘇斗帳懸金薄織成腕囊又曰石虎皇后出女妓二千為鹵簿冬月皆着紫綸巾蜀錦袴脚着五文織成鞾又曰石虎獵着金縷髙柔婦與柔書曰今奉織成祙一量綾釋名曰綾者其文望之似氷凌之理也漢官典儀曰尚書郎直供青􅀈白綾被魏畧曰大秦國有金縷繡雜色綾其色利得中國絲素解以為胡綾魏志曰楊阜字義山為城門校尉常見明帝着帽被縹綾半袖阜問帝曰此於禮何法服也帝黙然晉武康起居注曰詔臨邑使主范柳所貢物多絳綾是其所珍可籌量增賜晉安帝紀曰桓𤣥㓜時㑹於西堂設伎樂上施絳綾帳縷金以為餙晉修復山陵故事曰帝改服着白綾帽荀朂為晉文王與孫皓書曰餉雜色綾十端後魏書曰辛穆字叔宗舉茂才東雍州别駕初隨父在下邳與彭城陳敬文友善敬文弟敬武為沙門從師送學經久不返敬文病臨卒以雜綾二十疋托穆與敬武穆久不得見經二十年始於洛陽見敬武以物還之封題如故世稱亷信唐書曰太宗初七品以上服龜甲雙具十花綾其色緑九品以上服絲布及雜小綾其色青又曰長慶中浙西觀察使李德裕上表曰臣當道奉詔更令織定羅絲袍段及滿幅盤絛綾一千疋况立鵝天馬掏豹盤絛文彩珍奇只合聖躬自服今所織千疋費用至多在臣愚誠亦所未諭乞酌臣當道物力所宜更賜節减即海隅蒼生無不受賜詔許罷進盤絛綾一千疋漢武内𫝊曰西王母侍女服紺綾之掛西京雜記曰霍光妻遺淳于衍散花綾二十五疋綾出鉅鹿陳寳光妻𫝊其法霍顯召入其第使作之一疋值錢一萬又與緑綾七百端直錢百萬符丕答謝𤣥書曰今往大文羅大綾各五十疋縠三禮圖五綵方山冠以綵縠為之説文曰縠細繒也釋名曰縠粟也其形戚戚如也戰國策曰先生正計見齊宣王宣王曰願聞先生直言正計諫曰王之憂國憂民不知王之愛一尺之縠王使為人冠不使左右便辟使工者以為優也治齊國非左右便辟無使也故王之愛民不如一尺之縠漢書曰江充召見太一宮自請愿以所常被服衣冠見上上許之充衣紗縠單衣東觀記曰建初二年詔齊相其止勿復送氷紈方董巴輿服志曰羽林左右監左右虎賁皆冠鶡紗縠單衣魏志曰袁術遂僣號荒侈滋甚後宮數百服綺縠餘梁肉楊子法言曰或曰霧縠之鹿曰女工之蠧潜夫論曰小民或刻剥綺縠以榆葉水波文抱樸子曰勁弩之餘力不能動霧縠宋玉風賦曰主人女翳承日之華更被母縠之單衣司馬相如子虛賦曰雜羅綃􅂷霧縠言細好如霧出以復須也劉積魯都賦曰其女工則絳綺縠荀朂為晉文王與孫皓書曰餉縠三端紗東觀漢記曰馬融􅀶洽通儒教養諸生千數融好侈飾常施紗帳前授生徒後列女樂晉書曰武帝泰始元年帝多用良家子女以充内職自擇其美者以絳紗繫臂梁書曰王僧孺㓜貧其母鬻紗布以自業事具鹵簿門後魏書曰遊明根以年踰七十表求致仕罷詔許之引入陳謝悲不自勝帝言别慇懃仍為流涕賜青單衣委貌冠被褥錦袍等物北齊書曰琅琊王儼字威仁武成第三于拜京畿大都督領軍大將軍領御史中丞遷大司徒初從北宮出將上中丞凡京畿步騎領軍之官属中丞之威儀司徒之鹵簿莫不畢備帝與后在華林園東門外張幕隔青紗步障觀之北史齊盧道䖍聘妻元氏甚聦悟常升髙坐講老子道䖍弟元明隔羅帷以聽馬唐書曰太宗幸蒲州刺史趙元楷課父老服黃紗單衣迎謁路左東宮舊事曰皇太子初拜有絳紗單衣王子年拾遺記曰漢武帝思夫人問少君曰朕思李氏其可得乎少君曰可遙見而不可同帷幄耳潜英石色青輕如毛羽寒盛則石溫暑盛則石冷刻之人像不異真人使此往後則夫人至矣乃遣人至暗海經年而還得此石命工依李夫人形刻成置於輕紗幕裏宛若生時帝大悦又曰江漢之民至暮春上巳之日禊集招祗之祠或結五色紗囊盛食沈於波中以食蛟龍水蟲畏之不侵食也蔡克别傳曰克字子尼體貌尊嚴莫有媟嫚髙平劉整雋才白衣居家車服奢䴡謂人曰紗縠吾之常服耳遇蔡子在坐而竟日不自安齊諧曰餘杭縣有一人姓沈名縱與父同入出至二更中忽見一人着紗􅀈披絳綾袍云是鬪山王闘山在餘杭縣秦記曰符堅以大常􅅊逞母宋𫝊其父業周官音義乃就宋家立講堂書生百人隔絳紗幔而受業焉綃毛詩義䟽曰揚之水素衣朱繡繡當為綃綃綺禮記玉藻曰君子狐青裘豹褎𤣥綃衣以裼之君子大夫士也綃綺屬也染之以𤣥於狐青裘相冝也廣雅曰綃謂之緗晉令曰第六品已下不得服羅綃王子年拾遺記曰燕昭王二年廣延國來獻善舞者二人昭王處以單綃華幄又曰吳王孫權居昭陽宮倦暑乃褰紫綃之帷曹植洛神賦曰踐遠遊之文履曳霧綃之輕裾綈説文曰綈赤黃色也釋名曰綈似􅡻缺之色緑而澤也史記曰范睢改名為張禄相秦秦伐魏魏使須賈於秦睢微行弊衣徒步入邸見須賈賈驚曰范叔無恙乎今叔何事睢曰為人賃作賈意哀之留坐飲食曰叔寒如此哉乃取其綈袍以賜之後睢見賈賈䪺首言死罪睢曰公所以得不死者以綈袍戀戀有故人之意故釋公漢書曰文帝身衣戈綈如淳曰戈帛也漢書儀曰太官賜宮奴婢各三千人大置酒日皆綈褠蔽膝漢舊儀曰印綬盛以篋篋以緑綈白表赤裏西京雜記曰漢制天子玉几冬則加綈錦其上謂之綈几公侯皆以竹木為之不得加綈之餙王子年拾遺記曰漢成帝於太液池傍起霄遊宫以漆為柱鋪黒綈之幕又造飛行殿所幸之宫咸以氊綈藉地惡車轍馬跡之喧也竹林七賢論曰舊俗七月七日法當曬衣諸阮庭中爛然莫非錦綈阮咸時緫角乃竪長竿標大布犢鼻於庭中曰未能免俗爾鄴中記曰石虎中尚方御府中巧工作錦織成署皆數百人有青綈或白綈或緋綈或黃綈或緑綈或紫綈范子計然曰綈出河東䀋鐵論曰鼲鼦旃罽不益錦綈之實是以王者不珍張衡西京賦曰木衣綈錦土被朱紫罽􅅊輝光毛詩問曰七月之時旡褐箋云褐毛布也賤者之所服也今􅄢亦用為之爾雅曰氂􅄢也郭璞注曰毛􅈊所以為􅄢也又曰氂毛也􅄢胡人續羊毛作衣説文曰􅄢西胡毳布也吳厯曰魏文帝賜吳王太子􅄢二張吳志曰孫堅為董卓軍所攻堅與數十騎潰圍而出堅常着赤􅄢幘令親近時祖茂著之車騎爭逐茂堅故從間道得免干寳晋記曰孫皓遣使詔書賜班􅄢五十張絳􅄢二十張紫青􅄢各十張崔鴻十六國春秋西秦録曰沮渠䝉遜尚書郎王杇送戎􅄢千疋銀三百斤鄴中記曰石虎御府􅄢有巴頭文􅄢鹿子􅄢花􅄢扶南傳曰安息國出五色􅄢鹽鐵論曰今富者黄金珢勒罽繡弇汗桓譚新論曰余歸沛遁病䝉絮被絳􅄢襜乘騂馬宿下邑東亭亭長疑是賊發卒余令勿鬬乃間而去此安靜自存也曹植辯道論曰甘始謂王曰諸梁時西域胡來獻􅄢悔不取也班固與弟超書曰竇侍中前寄人錢八十萬市得雜􅄢十餘張也紬説文曰紬大絲繒也釋名曰紬抽也抽引絲端細緒也又謂之絓掛也掛於帳端振舉之也北史曰袁聿修爲太常少卿出使巡者仍令考校官人得失經兖州時刑劭為刺史别後送白紬為别信聿修不受與劭書云今日仰遇有異常行𤓰田李下古人所慎願得此心不貽厚饋劭亦欣然頓解報書云老夫忽忽意不及此敬承來㫖吾無間然弟昔為清郎今日復作清郎矣太平御覽卷八百一十六
