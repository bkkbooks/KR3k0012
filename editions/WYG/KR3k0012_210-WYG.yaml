body:
  text: 太平御覽卷二百十宋李昉等撰職官部八録尚書尚書令録尚書漢書曰張安世領尚書事職典樞機以謹慎周宻自著每言大政已决輙移病出門有詔令乃驚使吏之丞相府問焉自朝廷大臣莫知其與議也又曰孔光字子夏領尚書事凡典樞機十餘年守法度修政事不希苟合或問温室省中樹皆何木也光荅以他語其慎密也如此應劭漢官儀章帝詔曰司空牟融典職六年勤勞不息以融為太尉録尚書事又和帝䇿書曰故太尉鄧彪元公之族三讓彌髙海内歸仁為群賢首以彪為太傅録尚書事百官總已以聽又曰靈帝䇿書曰故太尉陳蕃忠亮謇諤有不吐茹之節司徒胡廣敦徳允正五世從政今以蕃為太傅與廣參録尚書事又曰冲帝䇿書曰太尉趙峻二世掌典機衡有匪石不二之心大司農李固公侯之苖忠直不囬今以峻為太傅固為太尉參録尚書事晉書曰元康元年誅楊駿詔曰司徒王渾秉徳中正器量宏逺厯位内外文武勲庸著在方䇿宜參弼機衡以亮天工其令録尚書事又曰賈充為太尉録尚書事及征吴為大都督吴平遣侍中程咸犒勞增邑八千户又曰㑹稽王道子元顯並録尚書事時道子為東錄元顯為西錄晉中興書曰泰和元年詔㑹稽王體道冲虛理識明允阿衡李文有保乂之規輔弼哀皇盡翼亮之道朕承洪緒仍聞善誘慎徽五教儀形具瞻登賢顯親國之典也其以為丞相録尚書事入朝不趨賛拜不名劍履上殿給羽葆鼓吹班劔六十人又曰元興元年八月庚子尚書下舍火是時桓元用事出鎮姑熟身雖在外實遥録尚書故天火示不復用也又曰明帝后庾氏為太皇后九月癸卯皇太后臨朝稱制司徒王導録尚書事傅咸晉故事曰何劭王戎張華裴楷楊濟和嶠為愍懐太傅通省尚書事張華為光禄大夫尚書七條事皆諮而後行惠帝之世太保衞瓘太宰河間王顒太傅東海王越皆録三省尚書事沈約宋書曰髙武帝永初三年尚書令揚州刺史徐羨之為司空録尚書事又曰孝武帝即位以大将軍江夏王義恭為太尉録尚書事又曰諸公録尚書事古制也王肅解尚書納于大麓曰堯納舜於尊顯之官使之録萬機之政按漢氏諸吏平尚書奏事後霍光以大司馬大将軍平尚書事齊書曰明帝為宣城王録尚書事廢帝昭業思蒸魚大官以無録公命不與後魏書曰北海王祥初遷大将軍録尚書事祥受命其夜暴風雲電㧞其庭中桐樹大十圍倒立本䖏天威如此識者知其不終三國典略曰齊以并省尚書令髙阿那肱為録尚書事那肱才伎庸劣不渉文史尚書郎中源師常白那肱云龍見當雩那肱問曰何䖏龍見作何顔色師答曰此是龍星須雩祭也非是真有龍見那肱曰漢兒多事强知星宿唐書官品志曰録尚書一人位在令上掌與令同但不紏察今則紏弹禁事與御史中丞更相亷察陶氏職官要録曰後漢章帝以太傅趙喜太尉牟融並録尚書事尚書有録名自此始也因是以来每帝㓜即位輙置太傅録尚書事尚書令六典曰尚書令掌總領百官儀刑端揆其属有六尚書一曰吏部二曰户部三曰禮部四曰兵部五曰刑部六曰工部凡庶務皆㑹而决之漢官儀曰尚書令主賛奏總典綱紀無所不統秩十石故公為之者朝㑹不階奏事增秩二千石天子所服五時衣賜尚書令其三公列卿将大夫五營校尉行于中道遇尚書令僕射左右丞皆廽車預避衞士𫝊不得紆䑓官䑓官過乃得去漢書曰張安世字子騁少以父任為郎用善事給事尚書精力於職休沐甞出上行幸河東失書三篋詔問莫能對唯安世識之具陳其事後搆求得書以相校無所遺失上竒其才擢為尚書令東觀漢記曰陳忠為尚書令數進忠言辭㫖宏麗前後所奏悉條於官上閣以為故事又曰侯覇為尚書令深見任用樊淮為尚書令明習漢家故事周密畏慎申屠剛為尚書令謇謇多直言無所屈撓後漢書曰宋均拜尚書令每有駮議多合上㫖均甞刪剪疑事帝以為有奸大怒收郎縛格之諸尚書惶恐皆叩頭謝罪均顧厲色曰盖忠臣執義無有二心若畏威失正均雖死不易小黄門在傍入具以聞帝善其不撓即令貸郎又曰申屠剛遷尚書令光武甞欲出逰剛以隴蜀未平不宜晏安逸豫諫不見聽遂以頭觸乗輿輪帝遂為止又曰郭賀字喬卿為尚書令百姓歌之曰厥徳仁明郭喬卿忠正朝廷上下平又曰侯霸拜尚書令條選善政有便於民者除其煩苛時令立春下寛大詔書由霸始建言多施用又曰陳蕃出為豫章太守性方峻不接賔客徴為尚書令送者不出郭門華嶠後漢書曰申屠剛為尚書令時内外羣臣多是帝自遷舉加以法理嚴察職事過苦尚書近臣乃至捶撲牽曳於前群臣不敢言惟剛毎極諫張璠漢記曰左雄為尚書令在位者各肅清時稱左伯豪為尚書令天下皆慎選舉伯豪雄字也漢書曰尚書令秦官銅印墨綬司𨽻校尉御史中丞皆獨席坐京師號曰三獨坐言其尊重如此魏志曰陳矯字季弼為尚書令魏明帝卒至尚書門矯跪問何之帝曰欲案行文書耳矯對曰此臣職分非陛下所宜臨也若不稱則請就黜帝便囬車又曰荀彧字文若為尚書令常以書陳事臨薨皆焚毁故竒䇿密謀不得盡聞又非正道不用心名重天下莫不以為儀表海内英俊咸宗焉魏志春秋曰荀攸字公達為尚書令從太祖征伐常謀謨帷幄時人及子弟莫知其所言太祖每稱之曰公達外愚内智外怯内勇外弱内强不伐善無施勞智可及愚不可及雖顔回寗武子不能過文帝在東宫太祖謂曰荀公達人之師表也汝當盡禮敬之攸甞病世子問疾獨拜床下其見尊異如此初攸入尚書太祖聞名與語大悦謂荀彧鍾繇曰公達非常人也吾得與之計事天下尚何憂哉蜀志曰費禕代􅃽琬為尚書令于時戰争多事衆務煩猥禕識悟過人每省讀書記粗舉目暫視究其意㫖其敏速倍於人終亦不忘常以朝晡聽事其間接賔客飲食嬉戯加之博奕每盡人之歡後遷大将軍録尚書事董允代禕為尚書令旬日之中事多停滯允歎曰人才力相懸若此非吾所及又曰􅃽琬字公琰諸葛亮每言公琰託志忠雅當與公讃王業可也密表後主臣若不幸後事宜以付琬亮卒琬為尚書令時新喪元帥逺近危悚琬出類㧞萃處群僚之右既無戚容又無喜色神宇舉止有如平常由是衆望漸服又曰劉巴字子初代法正為尚書令躬履清儉不治産業又自以歸附非素懼見猜嫌恭黙守靖退無私交非公事不言又曰董允字季陽為尚書令庶事無留門無停賔又歴職内外治身儉約謙靖少言為政不煩號為清能然持法刻深好用文俗吏故居大官名聲損於郡縣時晉書曰樂廣為尚書令所在當時功譽爛然為後人所思又曰裴秀為尚書令秀創制朝儀廣陳刑政朝廷多遵用之以為故事在位四載為當世名公又曰李允為尚書令雖厯職内外而在公退食在家貧儉兒病無以市藥上賜錢十萬又曰荀朂守尚書令課試令史以下覈其才能有闇於文法不能决疑處事者即時遣出帝甞謂曰魏武帝言荀文若之進善不進不止荀公達之退不肖不退不休二令君之美亦望於君也又曰㑹稽王道子甞集朝士置酒於東府尚書令謝石因醉為委巷之歌王恭正色曰居端右之重集藩王之第而肆滛聲欲令羣下何以取則石深銜之又曰王彪之字叔虎為尚書令與謝安共掌朝政安每稱曰朝之大事衆不能决者諮之王公無不得判又曰大熈元年詔曰夫緫百揆得失管王政之開塞者端右之職也是以自漢代以来每選此官必慎其人議郎王戎可為尚書令又曰衞瓘字伯玉拜尚書令性嚴整以法御下待參佐尚書郎若掾焉又曰熊逺啓曰伏見吏部以太尉荀組為尚書令復領荆州牧自三代以来未聞以納言之官而出領牧伯者晉中興書曰卞壼為尚書令司徒王導稱疾不朝壼奏導専任不敬事寝不行舉朝憚壼又曰萬恊遷尚書令詔曰尚書令恊抗志髙亮才鑒博雅朕甚嘉之晉書曰百官表注尚書令一人唐虞官也是謂文昌天府銅印墨綬五時朝服納言幘進賢兩梁冠佩水蒼玉官品第三俸月四十五斛領都緫攝諸曹出納王命晉公卿禮秩曰尚書令拜受命皆䇿命薨則於朝堂發哀古之冢宰以在端右故也晉故事曰賈充為尚書令以目疾表置省事於是遂置省事吏四人品職章服與諸曹令史同宋書曰王僧䖍為尚書令甞為飛白書題尚書壁曰圓行方正物之定質循之不已則溢髙之不已則躓引之不已則遺是故去之宜疾當時嗟賞以比座右銘又曰武帝踐祚王瑩遷尚書令時有猛獸入郭上意不悦以問群臣皆莫能對瑩在御筵乃歛板荅曰昔擊石拊石百獸率舞陛下應籙御圖武象来格帝大悦衆咸服焉齊書曰謝胐字敬冲徴為司徒尚書令朏辭脚疾不堪謁仍角巾肩輿詣雲龍門謝既見乗小車就席齊職儀曰秦漢之世委政公卿尚書之職掌印奏令賛文書僕射主開閉令不在則僕射奏下其事魏氏重内職八座尚書任同六卿舜舉八元八愷以隆唐朝今號八座為元愷謂賢能用事義如昔也梁書曰何敬容為尚書令貪吝為時所嗤鄙其署名敬字則大作苟小為文容字大為文小為口陸倕戯之曰公家苟既竒大文亦不小敬容遂不能荅又日漏禁中語故嘲誚日至甞有容姓吉問卿與邴吉逺近曰如明公之與蕭何唐書曰太宗在藩甞為尚書令其後人臣莫敢為遂廢其官廣徳元年冬代宗以親賢有大勲遂特拜為尚書令又曰廣徳二年冬詔郭子儀於尚書省事尚書令事命宰臣以下特遣射生五百騎執㦸翼從自朝堂至於省賜以教坊音樂五代史梁書開平三年詔外尚書令為正一品按唐典尚書令正二品至是以将授趙王鎔此官故外之㑹稽先賢𫝊曰沈勲徽詣南宫賜酒拜尚書令持節臨辟雍名冠百寮襄陽耆舊𫝊曰劉季和曰荀令君至人家坐處三日香徐廣軍服儀制曰尚書令軺車黒耳後户通典曰大唐尚書令朝服鷩冕八旒七章三梁冠鷩雉也其毛可為冠也武徳初太宗為秦王時甞居之其後人臣莫敢當故自龍朔二年制廢尚書令又曰舊尚書令有大㕔當省之中今謂之都堂世説曰崇禮闥在東掖門内路西即尚書省崇禮門東建禮門内即是尚書令下舍之門太平御覽卷二百十
