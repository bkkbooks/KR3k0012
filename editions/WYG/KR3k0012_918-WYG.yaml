body:
  text: 太平御覽卷九百十八宋李昉等撰羽族部五雞春秋運斗樞曰玉衡星􅄆為雞周禮春官上大宗伯曰工商執雞鄭𤣥曰取其守時而動也禮記曲禮下曰祭宗廟之雞曰翰音又月令曰季冬之月雉雊雞乳又内則曰子事父母雞初鳴咸盥潄左傳宣五曰楚子為乗廣三十乗分為左右廣雞鳴而駕月中而說又成五晉與楚旦而戰見星未巳子反命軍吏察夷傷補卒乗繕甲兵展車馬雞鳴而食唯命是聽又襄二荀偃令曰雞鳴而駕塞井夷竈唯余馬首是瞻又襄三齊莊公朝指殖綽郭最曰是寡人之雄也州綽曰君以為雄誰敢不雄然臣不敏平隂之役先二子鳴晉伐齊及平隂州綽獲殖綽郭最故自比於雞鬬勝先鳴又襄五曰公膳日雙雞又昭五曰賔孟適郊見雄雞自斷其尾問之侍者曰自憚其犧也又昭六曰季郈之雞闘季平子郈昭伯二家相近故鬪雞季氏芥其雞以芥子播其羽郈氏為之金距平子怒毛詩曰女曰雞鳴刺不說徳也陳古義以刺今不說徳而好色也女曰雞鳴士曰昧旦子興視夜明星有爛又曰君子于役不知其期曷至哉雞栖于塒日之夕矣牛羊下來君子于役如之何勿思又緇衣曰風雨思君子也亂世則思君子不改其度風雨淒淒雞鳴喈喈既見君子云胡不夷風雨蕭蕭雞鳴膠膠既見君子云胡不瘳風雨如晦雞鳴不已既見君子云胡不喜又雞鳴思賢妃也雞既鳴矣朝既盈矣匪雞則鳴蒼蠅之聲尚書牧誓曰古人有言曰牝雞無晨牝雞之晨惟家之索論語曰子路遇丈人以杖荷蓧止子路宿殺雞為黍而食之又曰子之武城聞絃歌之聲夫子莞爾而笑曰割雞焉用牛刀爾雅曰雞大者蜀蜀子雓未成雞曰僆絶有力奮雞三尺為鶤栖於杙為桀鑿垣而栖為塒郭璞曰蜀蜀雞也雓雞子名也江東呼雞少者為僆春秋說題辭曰雞為積陽南方之象火陽精物炎上故陽出雞鳴以類感也雞之為言佳也佳而起為人期莫寳也春秋考異郵曰雞應旦鳴詩汜厯樞曰候及東次氣發雞池三號氷始泮卒于丑以成歳及東及於寅也承丑之季故謂之次氣也雞為畜陽也丑之孚向晨鳴雞得其氣感之而喜故鳴也尚書曰大寒之日雞始乳易通卦騐曰萬民鬭雞鳴皆翹首結帶正衣裳史記曰子路性鄙好勇力冠雄雞佩猳豚陵暴孔子孔子乃設禮義稍誘之子路乃委質請為弟子又曰孟嘗君至闗闗法雞鳴出客孟嘗君客之居下坐者有能為雞鳴遂發傳去又曰越巫立越祀而以雞卜上信之漢書曰徵昌邑王賀到濟陽求長鳴雞又曰昌邑王之立為皇太子私置雞豚以食又曰龔遂為渤海太守使人家養五雞又曰王奉先好鬭雞宣帝㣲時數與奉先㑹後即位以其女為媫好立為皇后奉先封侯又曰方士曰益州有金馬碧雞之神可祭祀致也宣帝使王褒往祀焉范􅁮後漢書曰河南樂羊子妻不知何氏女嘗有他舍雞謬入垣内姑盗殺食之妻對不食而泣怪問之妻曰自傷居貧使食他肉姑竟棄之後漢書曰范式字巨卿與汝南張元伯為友二人春到京以暮秋為期元伯以九月十五日殺雞炊黍以待巨卿母謂元伯曰相去千里汝何信之審也言未畢而巨卿至相隨升堂再拜母極說九州春秋曰魏王入漢中討劉備不得進欲守復難意欲棄之乃發令云雞肋官屬不知主簿楊修曰夫雞肋棄之則可惜噉之無所得以此知漢中王欲去也乃白魏王遂還呉録曰魏文帝遣使於呉求長鳴短鳴雞羣臣以非禮欲不與孫權敇付使江表傳曰南郡獻長鳴承露雞南越志曰雞冠四開如蓮花鳴聲清徹也魏志曰馬韓國出細尾雞其尾皆五尺餘郭頌魏世語曰劉放孫資共典樞要夏侯獻曹肇心不平殿中有雞棲樹二人相謂曰此亦久矣其能復幾指謂中書監劉放中書令孫資王隠晉書曰郗詵母病苦車及亡不欲車塟而貧無以得馬乃養雞種蒜竭其方術喪過三年得馬八匹舉棺至家晉書曰祖逖與劉琨俱為司州主簿情好綢繆共被同寢中夜聞雞鳴蹴琨覺曰此非惡聲因起舞又曰桓𤣥既被殺安帝反正其餘擁衆假號皆平桓氏遂滅元興中衡陽有雌雞化為雄八十日而冠萎及𤣥建國於楚衡陽屬焉自篡至敗凡八旬晉中興書曰殷浩北伐江逌為長史及丁零反叛浩令逌伐之乃取數百雞以長繩連之脚皆繫火一時驅放羣雞駭􅄆飛過塹集羌營皆燃因其驚亂縱兵擊之晉書庾征西翼書少時與逸少齊名右軍後進庾猶不分在荆州與都下人書云小兒輩賤家雞愛野雉皆學逸少之書須吾下當比之又載記曰符朗善知味㑹稽王道之殺雞以食之既進朗曰此雞栖於半露撿之騐焉晉書武帝嘗幸琅琊城宫人常從早發至嘲北埭雞始鳴令呼為雞鳴埭南史曰齊鬱林王好鬭雞宻買雞至數千又曰傅琰字秀珪為山隂令二野父争雞琰問雞何食一云粟一云豆琰使破雞得粟罪言豆者魏收後魏書曰崔光字長仁東清河鄃人也正始元年夏有典事史元顯獻四足四翼雞詔􅄆騎侍郎趙邕以問光光表曰翅足衆多亦羣下相扇動之象雛而未大脚羽差小亦其勢尚㣲易制御也武帝覧之恱後數日而茹皓等並以罪失伏誅於是禮光愈重又曰傅乾受嗜雞肉葵菜食傅靈越乃為作之下以毒藥乾受飯還而卒北史曰宋世良為清河太守發奸摘伏有若神明嘗有吏休滿還郡食人雞豚又有一幹受人一帽及食二雞世良叱而語之吏幹叩頭伏罪於是上下震悚莫敢犯禁又曰齊彭城王浟為滄州刺史有隰沃縣主簿張達嘗詣州夜投人舍食雞羮浟察知之守令畢集浟對衆曰食雞羮何不償價直也達即伏罪合境乃稱神明三國典要曰齊長廣王湛即皇帝位於南宫大赦改元其日將赦庫令於殿門外建金雞宋孝王不識其義問於光禄大夫司馬膺之赦建金雞其義何也膺之曰案海中日占曰天雞星動當有赦由是帝王以雞為候唐書曰劉武周父匡徙家馬邑匡嘗與其妻趙氏夜坐庭中忽見一物狀如雄雞流光燭地飛入趙懷振衣無所見因而娠遂生武周為人驍勇善騎射莊子曰荘子謂惠子曰羊溝之雞司馬彪注曰羊溝鬭雞處三歳為株株魁師也相者視之則非良雞也然而數以勝人者以狸膏塗其頭也雞畏狸故又曰越雞不能伏鵠卵魯雞固能矣司馬彪曰越雞小雞也魯雞大雞也今蜀雞也列子曰紀渻子為周宣王養鬭雞十日而問雞可鬭乎曰未也方虚矯而恃氣十日又問之曰未也猶疾視而盛氣十日又問之曰㡬矣雞雖有鳴者色無變望之似木雞矣其徳全矣異雞無敢應者燕丹子曰燕太子丹質於秦逃歸到闗丹為雞鳴遂得逃歸尸子曰戰如鬭雞勝者先鳴韓子曰使雞司夜令狸執鼠皆因其能淮南子曰雄雞夜啼庫兵動戎馬驚淮南萬畢術曰桃弧之象令雞夜鳴戰國策曰秦惠王謂寒泉子曰蘇秦欺敝邑欲以一人之智反覆山東之君夫諸侯之不可一猶連雞之不能俱止於棲也吕氏春秋曰善學者若齊王之食雞也食其蹠數千而後足又曰白圭謂魏王曰布丘之鼎以烹雞多泊之則淡而不可食布丘魏邑肉汁曰泊少泊之則焦而不熟然而視之蝺焉羮無所可用蝺音齲韓詩外傳曰田饒謂魯哀公曰君不見夫雞乎頭戴冠者文也足搏距者武也敵在前敢鬭者勇也見食相呼者仁也守夜不失時者信也雞雖有五徳君猶日瀹而食之者何也以其所從來近也夫鵠無此五徳君猶貴之以其所從來者逺也神異經曰東方有人長七丈頭戴雞朝吞惡鬼三千暮吞三百名黄父又名食邪以鬼為飯以露為漿也西京雜記曰成帝時交趾越巂獻長鳴雞即下漏驗之晷刻無差長鳴雞一鳴一食時不絶長距善鬬崔豹古今注曰雞一鳴燭夜列仙傳曰祝雞翁者雒陽人也居尸鄉北山下養雞皆有名字千餘頭暮栖樹晝放散食欲取呼名即至販雞及子得千萬錢輒置錢去論衡曰傳言淮南王得道畜産皆仙犬吠天上雞鳴雲中陳子要言曰棄晨雞候犬亦猶棄當世之實才須故人之執政也太𤣥經曰雌雞鳴晨雄雞宛頸隨其後風俗通曰呼雞朱朱俗曰雞本朱公化而為之今呼朱朱也謹按說文解喌喌二口為讙州其聲也讀若祝祝者誘致禽畜和順之意喌與朱音相似耳又曰臘除夕以雄雞著門上以和隂陽按今人卒病皆殺雄雞傅其心病賊風者作雞散東門雞頭治蠱信善也異苑曰朱文繡與羅子鍾為友俱仕於梁繡既死羅子鍾哭之其夜俱亡梁南七里有雞山𦵏繡於其中北九里有雉澗埋鍾於其内繡神靈變為雞鍾魂魄化為雉清鳴哀響來往不絶故詩曰雞山别飛響雉澗和清音荀恱申鍳曰覩孺子之驅雞而見御民之術孺子之驅雞急則驚緩則滯馴而安之然後入門嵇康宅無凶吉論曰夫同棲之雞一欄之羊賔至而有死者豈異之哉幽明録曰晉兖州刺史沛國宋處宗嘗買得一長鳴雞愛養甚至栖籠著牕間雞遂作人語與宗談論極有𤣥致終日不輟處宗因此功業大進越絶書曰雞山勾踐以畜雞将伐呉以食死士也呉越春秋曰婁門外雞陂墟者呉王牧雞處西河記曰涼州罪人於市将刑忽有白雄雞飛於人邉請命引頸長鳴伏地向吏驅之去輒來刺史張義免其坐王子年拾遺記曰太初二年月氏貢䨇頭雞四足一尾鳴則俱鳴又曰含塗國去王都七萬里人善服鳥獸雞犬皆使能言郭子横洞㝠記曰有逺飛雞夕則還依人曉則絶飛四海外朝往夕還裴𤣥新言曰正朝縣官殺羊懸其頭於門又磔雞以副之俗說以厭其厲氣𤣥以問河南任君任君曰是月土氣上升草木萌動羊齧百草雞啄五榖故殺之以助生氣崔實四民月令曰十二月東門磔白雞頭可以合藥本草經曰丹雞一名戴丹又曰烏雄雞主補中其血治踒折骨凡雞肉不食小兒令生蚘蟲又令消髓萬洪方曰五月七日深井深冢多有毒氣不可入也宜先以雞毛試投其中直下無毒毛迴四邉不可入也師曠曰古長吏乗車出入行步道上有雞飛集車上者雄遷雌去雜五行書曰欲求婦取雄雞兩毛燒煮酒中飲之所求必得用戊子日此是天地合日必得三往不得女當死龍魚河圖曰𤣥雞白頭食之病人雞有六指亦殺人雞有五色殺人焦贑易林旅之夬曰十雉百雛常與母俱抱雞捕虎誰者為怙又歸妹之无妄曰雞方啄粟為狐所逐走不得息惶懼喘慄又歸妹之損曰爭雞失羊亡其金囊利得不長又巽之遯曰三雞啄粟十雛從食飢鳶卒擊忘其兩叔廣志曰雞有胡髯五指金骹反翅之種大者蜀小者荆白雞金骹者善奮并州所獻呉中送長鳴雞長倍於常雞永昌郡無雞異物記曰伺潮雞潮水上則鳴博物志神農本草經曰雞卵可以作虎魄法取茯苓雞腵卵黄白渾雜者熟煮之及尚軟隨意刻作物形以沽酒漬數宿既堅内着粉中假者乃亂真此世所恒用作無不成也干寳搜神記曰安陽城南亭宿者輒死書生明術數入亭宿端坐誦書夜半有皂衣人及赤幘者呼亭主此有宿客耶應曰然喑嗟而去須臾有黄衣問如前生問曰向黒衣者誰荅曰北舍母猪赤幘者誰荅曰西舍老雄雞也汝是誰荅曰我是蝎也明旦掘之得蝎大如琵琶毒長四尺并殺猪雞亭遂安静幽欣期交州記曰長鳴雞出日南白澤圖曰老雞能呼人姓名殺之則止南州異物志曰狼育之雞特禀異聲狼育地名又曰雞有四距重翼者龍也殺之震死夢書曰雞為武吏有冠距也夢見雄雞憂武吏也衆雞入門吏捕也羣鬭舍中驚兵怖也論墓書曰養白雞令識其主聲形以五月五日九月九日任意用五色絲長五寸係雞頸將雞於名山放雞著山仰頭呪曰必存鳴晨雞心開悟沈懐逺南越志曰雞冠四開如蓮花鳴聲清徹也荆州歳時記曰正月一日三元之日也雞鳴而起先於庭中爆竹帖畫雞或斲鏤五彩及土雞於户上風土記曰乃有鷄子五薫練形正旦皆㑹生吞雞子一箇謂之練形又晨薦五辛以助五藏氣呉録曰合浦朱虛縣有山雞黒色樹棲魏志曰平原太守劉邠印囊及山雞毛着器中使管輅筮輅曰内方外圓五色成文含寳守信出則有章此印囊也髙岳岩岩有鳥朱身羽翼𤣥黄鳴不失晨此山雞毛也異苑曰山雞愛其毳映水則舞魏武時南方獻之帝欲其鳴舞而無由公子蒼野令人取大鏡著其前雞鑑形而舞不知止遂至死韋仲将為之賦甚美博物志曰雞有美毛自愛其毛終日映水自眩則溺臨海異物志曰山雞状如人家雞安陽諸山中多此雞利距好鬬當時以家雞置其處取即可得南越志曰曽城縣多鵕䴊鵕䴊山雞也利距善鬪世以家雞鬭之可禽也光色鮮明五采炫燿辛氏三秦記曰陳倉山在太白之西去長安八百里上有石雞與山雞各别趙髙使燒山山雞飛去石雞不去晨鳴山頭聲聞三十里或云是玉雞陳倉城上有神不入取不得得雄者王得雌者霸穆公得雌故霸山海經曰鷩雉一名山雞養之禳火災左思呉都賦曰山雞歸飛而來栖顧愷湘中賦曰陽鴛山雞陸璣與弟書曰天淵池養山雞甚可嬉周書曰成王時蜀守獻文翰者若皇雞鳥有文采者皇雞似鳬冀州謂之澤時爾雅曰翰天雞也郭璞曰翰雞赤羽見周書說文曰翰天雞也一名晨風𤣥中記曰東南有桃都山有火樹名曰桃都枝相去三十里上有天雞日初出照此木天雞即鳴天下雞皆隨之鳴臨海異物志曰彩雞黄冠青綬常住杉樹下頭上有長黄毛頭及頰正青如垂縷尹子曰揚州之雞裸無毛南越志曰髙興縣多客雞如家雞五采至則年穰孫綽望海賦曰石雞清響以應潮慧軀輕近以逺潔石雞形似家雞而欠色在海中山上每潮水將至輒鳴相應若家雞同晨也商人欲知水道往來以至此為候也周景式廬山記曰白水南行十餘里有雞山傍有大山竦上有石雞冠距如生道士李於此下住常寳玩之雞一旦忽摧毁告人曰雞卒如此吾其終乎因與親知訣别後月餘果卒似知命云太平御覽卷九百十八
