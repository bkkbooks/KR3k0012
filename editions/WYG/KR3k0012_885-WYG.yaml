body:
  text: 太平御覧卷八百八十五宋李昉等撰妖異部一恠春秋潜潭巴曰異之為言恠也謂先發感動也左傳莊公曰初内蛇與外蛇鬬於鄭南門中内蛇死六年而厲公入公聞之問於申繻曰猶有妖乎對曰人之所忌其氣燄以取之妖由人興也人無釁焉妖不自作人棄常則妖興故有妖又文公曰有蛇自泉宫出入于國如先君之數秋八月聲姜薨毁泉臺又㐮六曰或呌於宋太廟曰譆譆出出鳥鳴于亳社如曰譆譆甲午宋大灾伯姬卒又哀上曰有雲如衆赤烏夾日以飛三日楚子使問諸周太史周太史曰其當王身乎若禜之可移於令尹司馬國語曰季桓子穿井獲如土缶其中有羊焉使問之仲尼曰吾穿井而獲狗何也對曰以丘之所聞羊也丘聞之木石之恠䕫蝄蜽水之怪曰龍罔象土之怪曰墳羊張璠漢紀曰梁冀池中船無故自覆後被誅後漢書曰彭寵自立為燕王多見變怪堂上聞蝦蟇聲在爐火下鑿地求之不得後為奴所殺魏志曰鉅鹿張臶正始中戴鵀鳥巢臶門隂臶告門人曰夫戴鵀陽鳥而巢門隂此㓙祥也乃援琴作詩旬日而卒又曰朱建平善相相應璩曰君年六十二位為常伯先此一年當獨見一白狗也璩年六十一為侍中直内省忽見白狗衆人悉不見於是併急遊觀飲讌自娯年六十二卒呉志曰諸葛恪將征淮南有孝子著縗衣入其閣中令外詰問曰不自覺入時守備亦悉不見後恪遂被誅晉書曰齊王冏輔政有一婦人詣大司馬門求寄産吏詰之曰我截臍便去耳言畢不見明年冏誅王隐晉書曰王凌居幽州有狐居凌府門中翟雉入㕔事遂為石勒所殺晉書曰趙王倫簒時有雉飛入殿中自太極東堦上殿驅之更飛西鍾下有頃飛去又倫於殿上得異鳥問皆不知名翌日向夕宫西有素衣小兒言其服留鳥翳倫使録小兒并鳥閉置空室明旦開視戸如故並失人鳥所在倫目上有瘤時以為妖焉又曰温嶠旋于武昌至牛渚磯水深不可測世云其下多怪物嶠遂燬犀角而照之須臾見水族覆火竒形異狀或乗車馬著赤衣者嶠其夜夢人謂己曰與君幽明道别何意相照也意甚惡之至鎮未旬日因齒疾而卒北齊書曰趙郡王叡奏後主云和士開不宜居内出士開為兖州刺史太后欲留過百日叡正色不許叡出夜方寢見一人長可丈五尺當門向床以臂壓王良久遂失甚惡之而明日被誅沈約宋書曰蕭思話在青州常所用銅斗覆在藥厨下忽於斗下得二死雀思話歎曰斗覆而雙雀殞其不祥乎既而被繫宋書曰劉敬宣嘗夜與寮屬宴空中有投一隻芒屩於坐墜敬宣食盤上三尺五寸已經人著耳鼻間並欲壊頃之而敗䘮易洞林曰呉興太守袁元瑛當之官筮卦吉㐫曰法至官當主赤蛇為妖不可殺至果有赤蛇在銅虎符石凾上蟠元瑛擿殺之其後果為賊徐馥所害唐明皇雜録曰李適之既貴且豪嘗列鼎於前以具膳羞一旦庭中鼎躍出相闘家僮告適之適之乃往其所引酒自誓而闘亦不觧鼎耳及足皆落明日適之罷知政事俄為李林甫所䧟貶宜春太守而終又曰李林甫宅屢有妖怪其南北隅溝中有火光大起或有小兒持火出入林甫惡之奏於其地立嘉猷觀林甫之疾也晨起盥餙將入朝命取書嚢即常時所要事目也忽覺頗重於常持者開視之即有二䑕出焉投下於地即變為蒼狗雄目張牙仰視林甫命弓射之殷然即滅林甫惡之不踰月而卒世説曰衞瓘永熙中家人炊飯墮地盡化為螺出足而行瓘終見誅列異傳曰中山王周南正始中為襄邑長䑕從穴中出在㕔上語曰周南汝以某月某日當死周南不應䑕還穴中至期復出冠幘絳衣而語曰周南汝日中當死周南復不應日適中䑕曰周南汝不應死我復何道言訖䑕遂顛蹶而死即失衣冠周南使卒來取視之如常䑕耳捜神記曰漢武大始四年十月趙有蛇從郭外入與邑中蛇闘孝文廟下邑中蛇死後二年秋有衞太子事自趙人江充起又曰王莽居攝東郡太守翟義知其將簒漢謀舉義兵兄宣教授諸生滿堂羣鵝鴈數十在中庭有狗從外入嚙之皆死驚救之皆㫁頭狗走出門求不知處宣大惡之後數日莽夷其三族又曰魏司馬太傅討公孫淵父子先時淵家數有怪一犬著冠幘絳衣上屋襄城北市生肉長圍各數尺有頭目口喙無手足而動揺占者曰有形不成有體無聲其國滅又曰呉時廬陵郡亭重屋中常有鬼物宿者輙死自後使官莫敢入舍丹陽人湯應者膽武使至廬陵便止亭宿吏啓不可應不聽盡遣所將人還外持一口大刀至三更聞有扣閤者應遥問是誰答云部郡相聞應使進致詞去須臾扣閤者如前曰府君相聞應復使進著皂衣又去應謂是人了無疑也須臾復扣閤言部郡府君相詣應乃知是鬼持刀迎之見二人皆盛衣服俱進坐畢府君者便與應談談未畢而部郡跳應背後應顧以刀擊中之府君下坐走應追至亭後墻下及之斫傷數下應還卧逹曙將人往尋之見血跡追皆得之云稱府君者是老狶部郡是老貍自後遂絶又曰夏侯藻母病困將詣淳于智卜有一狐當門向之嘷呌藻愕遂馳詣智智曰其禍甚急君速歸在嘷處拊心啼哭令家人驚怪大小畢出一人不出啼哭勿休然後其禍僅可救也藻如之母亦扶疾而出家人既集堂屋五間拉然而崩又曰淳于智字叔平濟北人性沉深有思義自為書生善易髙平劉柔夜卧䑕齧其左手中指意甚惡之以問智智為筮之曰䑕本欲殺君而不能當相為使之反死乃以朱書其手腕橫文後三寸為田字可方一寸使夜露手以卧其夜大䑕伏死手前又曰東陽留寵字道和居于姑孰每夜門庭有血數升不知所從來如此三四後寵為折衝將軍見遣北征將行而炊食悉變為虫寵遂北征軍敗於檀邱為徐龍所殺續捜神記曰廣州有三人共在山中伐木忽見石窠中有二卵大如升取煑之始湯熱便聞林中如風雨聲須臾有一蛇大十圍長四五丈徑來於湯中衘卵去三人無幾皆死又曰代郡張平者符堅時為賊帥自號井州刺史養一狗名曰飛鷰形若小驢忽夜上㕔事屋上行行聲如平常未經年果為鮮卑所逐敗走降苻堅未幾便死又曰新野庾謹母病兄弟三人悉在白日侍疾常燃火忽見帳帶自卷自舒如此數四須臾聞牀前狗闘聲非常舉家共視了不見狗見一死人頭在地頭猶有血兩眼尚動甚可憎惡其家怖懼乃不持出門即於後園中瘞之明旦往視乃出土上兩眼猶爾即又埋之後旦亦復出乃以塼頭合埋之不復出也數日其母遂亡異苑曰謝文静於後府接賔婦劉氏見狗衘謝頭來久乃失所在婦具説之謝容無易色是月而薨又曰安固李道豫元嘉中狗當路眠豫蹴之狗曰汝即死何以蹋我經年豫死又曰晉惠帝羊后將入宫衣中忽有火光自後蕃臣遘兵洛陽失御后為劉曜所嬪又曰有人姓劉在朱方人不得共語若與之言人必遭禍難及身死疾唯一士謂無此理偶值人有屯塞耳劉聞之忻然而往自説被謗有能見明答云舉世雷同亦何足䘏須臾火發資畜服玩蕩盡於是舉世號為劉鵂鶹脫遇諸途皆閉車走馬掩目奔避劉亦杜門自守嵗時一出則人驚散過於見鬼又曰太原王徽之字伯猷元嘉四年為交州刺史在道有客命索酒炙言未訖而炙至徽之取自割終不入投地大怒少頃顧視向炙已變為徽之頭矣驚愕反矚目覩其首在空中揮霍而沒又曰檀道濟元嘉中鎮尋陽十二年入朝與家分别顧瞻城闕歔欷逾深識者是知道濟之不南旋也故時人為其歌曰生人作死别荼毒當奈何濟將發舟所養孔雀來衘其衣驅去復至如此數焉以十三年三月伏誅又曰武昌戴熙家道貧陋墓在樊山南占者云有王氣宣武桓公仗威西下停武昌令鑿之得一物大如水牛青色無頭脚時亦動揺斫刺不陥乃縱著江中得水便有聲如雷響發長川熙後嗣淪胥殆絶又曰烏傷葛輝夫義熙中在女家宿至三更有兩人把火至堦前疑是㐫人往打之欲下杖悉變蝴蝶繽紛飛散有一物衝輝夫腋下便倒地少時死述異記曰郭中産宅在江陵枇杷寺南宋元嘉中起齋屋以竹為窓櫺竹遂漸生枝葉長數丈欝然如林仲産以為吉祥及孝建中被誅又曰嘉興朱休之元嘉中兄弟對坐犬向休之蹲視二人而笑揺頭語曰言我不能歌聽我歌梅花今年故復可奈汝明年何其家斬犬棄于路側至梅花時兄弟相闘弟㦸傷兄收禁皆死又曰宋大明中頓邱縣令劉順酒酣晨起見榻牀上有一聚凝血如覆盆形劉氏武人了不驚怪乃令擣虀親自切血染虀食之棄其所餘後十許載至元徽二年為王道隆所害又曰周登之家在都宋明帝時統諸靈廟甚被恩寵母謝氏奉佛法太始五年夏月暴雨有物形隐煙霧垂頭属㕔事前地頭頸如大赤烏飲庭中水登之驚駭謂是善神路之汲水益之飲百餘斛水竭乃去二年而謝氏亡亡後半嵗明年帝崩登之自此事遂衰敗又曰宋驃騎大將軍河東桞元景大明八年少帝即位元景乗車行還使人在中庭洗車轅晒之有飃風中門而入直來衝景明年而闔門被誅幽明録曰呉北寺中終祚道人卧齋中䑕從坎出言終祚後數日當死終祚呼奴令放犬䑕云亦不畏此且犬入户必死犬至果爾終祚嘗為商閉户謂䑕曰汝正使我欲富貴耳今既逺行勤守吾房勿令有所零失時桓温在南州禁殺牛甚急終祚載數萬竊買牛皮還東貨之得三十萬還時室猶闔也都無所失其怪亦絶自是稍富又曰石虎時太武殿圖賢人之像頭忽悉縮入肩中又曰義興周超為謝晦司馬在江陵妻許在母家遥見屋裏月光一死人頭在地血流驚怪即便失去後超被法又曰元嘉九年南陽樂假嘗在坐忽聞空中有人呼其夫婦名甚急半夜乃止殊自驚懼後數日婦入厨下忽舉體衣服緫是血未一月而夫婦相繼病卒又曰諸葛長民富貴後嘗一月或數十日輙於夜眠中驚起跳踉如與人相打狀毛脩之嘗與同宿駭愕不逹此意良久長民告毛公此物竒健非我無以制之毛曰是何物長民曰我正見一物甚黒而手脚不分明毎日中及夕輒來共闘深自驚懼焉屋中柱及椽桷間悉見有蛇頭令人以刀懸斫應刀隐滅去輙復出悉以紙裹柱桷紙内䔩䔩如有行聲又曰劉感在呉時呉郡縣有一女忽夜乗風雨恍惚至郡城内自覺去家正一炊頃不少沾濕曉在郡廨上自云我天使也府君宜起迎我當大富貴不爾必有㓙禍劉問所來亦不知自後二十許日劉果誅又曰桓温時叅軍夜坐忽見屋梁上有一伏兎切齒向之兎來轉近引刀斫之見正中兎而反傷其膝流血甄異記曰徐州人呉清以太元五年被差征人殺鷄求福置鷄頭在柈中忽然而鳴其後破賊賊帥邵寳臨陣戰死于時殭尸狼藉莫之能識清見一人着白錦袍疑是主帥便斬以聞推校之乃是寳以功得為清河太守越自行伍猥蒙榮位鷄之妖更為祥桓譚新論曰吕仲子婢死育女四嵗數來為沐浴浣濯道士云其家青狗為之殺之則止陽仲亦言所知家嫗死忽起飲食醉後而坐祭牀上如是三四家益厭苦其後醉行壊垣得老狗便打殺之推問乃里屠沽家狗元晏春秋曰新安寺有槐而鵲巢之雄雞奪而棲焉永將寄次于野縣其空乎夏五月丙申璉卒䘮次于縣空縣送之賈誼鵩鳥賦曰誼為長沙太傅有鵩飛入誼舍止于坐隅鵩似鴞不祥鳥也太平御覧卷八百八十五
