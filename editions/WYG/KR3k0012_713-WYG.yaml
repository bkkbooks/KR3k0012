body:
  text: 太平御覽卷七百十三宋李昉等撰服用部十五匣匱厨匣説文曰匣匱也論語季氏曰孔子謂冉求虎兕出於匣拾遺記曰含塗國人善服鳥獸雞犬皆使之能言雞犬牛豕死者以玉為匣埋海上其主遊戯海上於地中聞犬豕雞之聲主者猶識掘而取還養如昔焉唯毛羽之秃落久乃恱澤魏武帝上雜物疏曰銀鏤漆匣四枚古歌曰流塵生玉匣匱説文曰匱櫝也匣也論語子罕云韞櫝而藏諸求善價而沽諸論語季氏曰龜玊毁於櫝中左𫝊曰昭王七年𫝊曰燕人歸燕姬以瑤甕玉櫃國語曰夏之衰也褒之神化為二龍而言曰余褒之二君也夏后布幣而䇿告之龍幣亡而漦在櫝藏之王隠晉書曰甘卓家金匱鳴聲似搥鏡清而悲師言金匱將離是以悲鳴尋而將軍周憲等承望敦意害卓唐書曰王伾下劣闒茸不能如叔父有大志唯務金帛寳玩為無門大櫃上開一孔使足以受物夫妻寢止其上韓子曰楚人賣其珠於鄭者為木蘭之櫝薫衣桂椒綴以珠玉餙以玟瑰緝以翡翠鄭人買櫝而還珠此未可謂善鬻珠也李尤匱匣銘曰國有都邑家有匣匱貨賄之用我之利器厨魏畧曰扈累字伯重京兆人常隨青牛先生先生字正方晩知星厯風角鳥情累得其術有婦無子後亦喪婦獨居道側以塼為障施一厨牀食宿其中晉陽秋曰顧愷之尤好丹青嘗以一厨畫寄桓𤣥悉糊題其前𤣥乃發厨後而取之封題如舊以還之愷之見封題如初但失其畫直云妙畫通靈變化而去猶人登仙也沈約宋書曰収范曄家樂器服玩並皆珍麗妓妾亦盛餙母住止單陋唯有一厨盛樵薪齊書曰衡陽王鈞母區貴人卒鈞哀毁甚先是貴人花釵厨子鈞以為玩弄貴人亡後每嵗時及朔望輒開禮再拜鯁咽見者皆為之悲又曰陸澄當世稱為碩學讀易三年不解文義欲撰宋書竟不成王儉戯之曰陸公書厨也南史曰謝𢎞㣲臨終語左右曰有上厨書須劉領軍至可於前燒之慎勿開也拾遺記曰郭况家富以玉器盛食故東京謂郭家為瓊厨金窟東宫舊事曰皇太子拜有栢書厨一梓書厨一范寗敬曰籍官之大信而比散在衆曹此不可也可令作十五厨籍一縣一厨太平御覽卷七百十三
  hash: sha256:c4855bb5981a9b2c6e54f17cde1c151e04f46f3895acf95fa3a7e47b27f4df10
