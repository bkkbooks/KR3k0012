body:
  text: 太平御覽卷八百五十宋李昉等撰飲食部八飯飱黍飯周書曰黄帝始蒸榖為飯周禮天官曰食醫曰食齊眡春時飯宜温也禮曰飯目諸飯也黍稷稻粱白黍黄粱稰穛又曰文王有疾武王不脱冠𢃄而養文王一飯亦一飯文王再飯亦再飯又曰侍食於君子則先飯而後已毋放飯毋流歠小飯而亟之數噍毋為口容論語曰子曰飯䟽食飲水曲肱而枕之樂亦在其中矣爾雅曰饙餾稔也食饐謂之餲摶者謂之􅶊米者謂之糪春秋運斗樞曰粟五變而以陽化生為苖秀為禾三變而粲謂之粟四變入臼米出甲五變而蒸飯可食説文曰饙􅀢飯也餾飯氣蒸也饡以羮澆飯也饖飯傷熱也饐飯傷濕也釋名曰飯分也使其粒各自分也乾飯而暴乾之也史記曰亷頗之奔魏也魏不能用也而趙數困於秦趙人思復得頗頗亦思復為趙用趙王因使使之魏視頗尚可用不郭開怨頗不欲令還多與使者金令毁之使者至頗為之一飯一斗米十斤肉被甲上馬以示可用使者還報曰亷將軍年雖老尚善飯然與臣少頃三遺矢矣王以為老遂不召又曰孟嘗君待客夜食有人蔽火光客怒以為飲不等輟食辭去孟嘗君起自持其飯比之客慙自刎漢書曰公孫𢎞為丞相食脱粟之飯又曰王莾使中黄門黄葉領長安莾聞城中饑饉以問葉葉取市所賣粱肉飯羮持入示莾曰民食咸如此莾信之續漢書曰羊陟拜河内尹常食乾飯後漢書曰王郎起光武至南宫遇大風雨引車入道傍空舎馮異抱薪鄧禹􅅡火光武對竈燎衣異進麥飯兎肩謝承後漢書曰左雄為冀州刺史長食乾飯司馬苞為太尉常食漉飯李固為太尉常食麥飯王暢為南陽太守作飯鹽豉菜茹羊茂為東郡太守常食乾飯胡劭為淮南太守使鈐下閣外炊曝作乾飯袁閎飯糠茹菜漢儀曰齋二人施案陳三十六肉食九榖飯魏書曰卞太后左右食菜粟飯魏畧曰王朗會稽敗太祖盛㑹嘲之曰不能效君昔在㑹稽折秔米飯朗曰適宜實難如朗昔者未可折而折明公今日可折而不折也吴書曰袁術在壽春百姓飢窮以桑椹蝗蟲為乾飯又曰是儀服不精細食不重膳家無儲蓄孫權聞之幸儀舍求視蔬飯親嘗之歎息即増俸賜晋書曰石崇家稻米飯在地經宿皆化為螺時人以為滅族之應又曰衛瓘家人炊飯墮地盡化為螺歳餘而及禍又曰殷仲堪自在荆州連年水旱百姓飢饉仲堪食常五碗盤無餘殽飯粒落席間輙拾以噉之雖欲率物亦緣其性真素也宋書曰衡陽王義季都督荆州嘗太獵於郊有野老𢃄苫而耕命左右斥之老人擁耒對曰昔有楚子盤逰貽譏令尹今陽和扇氣播厥之始一日不作人失其時王左右馳騁為樂驅斥老夫非勸農之意義季止馬曰此賢者也命賜之食老人曰吁願大王均其賜也苟不奪人時則一時皆享王賜老人不偏其賜矣斯飯也弗敢嘗問其名不言而退南史曰宋初呉郡人陳遺少為郡吏母好食鐺底飯遺在役恒帶嚢每煮食輙録其焦以貽母後孫恩亂聚得數升恒𢃄自随及敗逃竄多有餓死遺因此得活母晝夜泣涕目為失明耳無所聞遺還入户再拜號咽母豁然即明梁書曰謝藺五歳時父亡不食乳媪欲令飯藺終不進舅阮孝緒聞之歎曰此兒在家則曽子之流事君則藺生之匹因名曰藺稍授以經史過目便能諷誦孝緒每曰吾家陽元也袁叔字陽元又曰齊苟兒之役臨汝侯嘲羅研之曰卿蜀人樂禍貪亂一至於此對曰蜀中積弊實非一朝百家為村不過數家有食窮廹之人什有八九束縛之使旬有二三貪亂樂禍無足多怪若令家畜五母之雞一母之豕牀上有百錢布被甑中有數升麥飯雖蘇張巧説於前韓白按劍於後將不能使一夫為盗况貪亂乎又曰魚𢎞為湘東王鎮西司馬述職西上道中乏食緣路採菱米飯給所部宏度之後人覔一菱不得又於窮洲之上捕得數百獼猴以為脯以供酒食又曰傅翽代劉𤣥明為山隂令問𤣥明曰願以舊政吿新令尹答曰我有竒術卿家譜所不載臨别當相示既而曰作縣唯日食一升飯而莫飲酒此第一䇿也又曰裴元禮為西豫州刺史居䘮惟食麥飯又曰沈仲永定二年兼起部侍郎尚書監起太極殿恒卧布袍芒履以麻䋲為𢃄又囊麥飯䬳以噉之朝士咸共誚其所為陳書曰孔奐為武康令武帝尅日决戰乃令奐多營麥飯以荷葉褁之一宿之間得數萬褁軍人食訖盡棄其餘崔鴻前秦録曰苻堅以乞活夏黙為左鎮郎胡人䕶磨那為右鎮郎奄人申香為拂盖郎黙等身長一丈八尺並多力善射三人毎食飯一石肉三十斤後魏書曰楊播兄弟雍睦播每出或日斜不至不先飯待還然後食又曰盧義僖為都官尚書性清儉不營財雖居顯位每至困乏麥飯蔬食然亦甘之也又曰闞駰甚貧弊不免饑寒性能多食一飯至三㪷乃飽卒無後唐書曰太宗謂侍臣曰朕自皇太子立也遇物必誨見其將飯吿稼穡艱難不奪農時乃可常有又曰蔣沇乾元後授陸渾盩厔咸陽髙陵西令當軍旅之時瘡痍未平沇竭心撫綏所至安輯副元帥郭子儀每統兵由其縣必誡軍吏曰蔣令清嚴幹辦供億固當有素士衆得蔬飯見饋則已無撓清政其為時人所知如此墨子守備曰乾飯人二升偹隂雨晏子春秋曰晏子相齊食脱粟之飯尹子曰晉國苦奢文公儉以矯之因食脱粟之飯莊子曰子輿與子桑友而霖雨十旬子輿曰子桑殆病矣褁飯而往食之又曰宋銒尹其為人太多其自為太少曰請置五升之飯足矣列子曰楚王好細腰宫中皆以三飯為節期年有黎黒之色孟子曰齊人有一妻一妾其良人出必饜酒肉而後反其妻云富貴人共飯食也瞷其所之乃就郊外乞人祭飯韓子曰堯食糲蒸之飯又曰孫叔敖為令尹糲飯菜羮枯魚之膳又曰嬰兒之相與戲以塵為飯以水為飲以泥為羮以木為胾淮南子曰為客治飯而自食藜藿名尊於實仁義之名重於治飯之實也六韜曰堯王天下滋味重累弗食温飯煖羮不酸餒不易家語曰孔子厄於陳蔡従者七日不食飯子貢以所齎貨竊犯圍出吿糴於野人得米一石焉顔回仲由炊之於壊屋之下有塵埃墮飯中顔回取而食之呂氏春秋曰飯之美者𤣥山之禾不周之粟陽山之穄南海之稻呉越春秋曰寡人載飯與羮以逰國中僮子戯而遇孤孤即餔而啜之神異經曰東南有人名黄父以鬼為飯以霧為漿説苑曰吕望行年五十賣飯棘津論衡曰䑕渉飯中損而不食風俗通曰俗説不大餓不在車飯謂正得一車飯不復活也或曰輔車上飯小小不足濟也案呉郡名酒杯為􅦝言大餓人得一􅦝飯無益也寕相六不守熟案蒸飯更泥謂之饀音與相似也􅅗夫論曰夫粱飯食肉有好於面目不若糲粢藜蒸之可食於口也物理論曰忿㸑之未熟覆甑而棄之所害亦多矣西京雜記曰公孫𢎞起家徒歩至丞相故人齊賀従之𢎞食以脱粟覆以布被賀怨曰何用故人富貴乎脱粟布被我自有之𢎞大慙賀乃吿人曰公孫𢎞内服貂蟬外服麻枲内厨五鼎外膳二餚豈可以示天下哉於是朝廷自此疑矯焉𢎞聞之歎曰寕逢惡賔不逄故人風土記曰精折米十取七八淅使青蒸而飯色乃紫紺于東流水飯食而除不祥通俗文曰飯臭曰饐沙入飯曰糝録異𫝊曰袁公路年十八常飯乳食蜜飯異苑曰衛士度苦行居士也其母常誦經曽出自齋空中下大鉢香飯滿中母分賦齋人皆七日不飢禰衡别𫝊曰劉表常作上事極以為快衡見之便滅敗投地曰作此筆者為食飯不孟宗别𫝊曰宗為光禄勲大會醉吐麥飯察者以聞詔問食麥飯意宗答臣家足有米麥飯是愚臣所安是以食之孔衍在窮記曰彭城王送橡飯十斛葛仙翁𫝊曰仙翁與客對食吐口中飯盡成飛蜂良久乃張口蜂皆飛還入口中成飯安成記曰安成郡毛亭二十里田疇膏腴厥稻馨香飯若凝脂四王起事曰恵帝還洛陽路中作飯食宫人有持升餘米飯者澆以供至尊世説曰荀公曹在武帝坐上食進飯曰此是勞薪炊也帝宻遣問外云寔是故車脚時鏡新書曰歳暮家家具有餚䔩謂為宿歳之儲以入新年也相聚酣歌名為送歳留宿飯至新年十二則棄於街衢以為去故取新除貧取富陶朱公倚頓此事無輟又留此飯須驚蟄雷鳴擲之屋上令雷聲逺焦贛易林曰南箕無舌飯多沙糖離騷曰精瓊糜以為粻宋玊風賦曰主人之女為臣炊彫胡之飯潘尼釣賦曰紅麯之飯糅以菰粱五味道洽餘氣芬芳枚乗七發曰楚苖之食安胡之飯摶之不解一啜而散桓驎七説曰香箕為飯雜以粳菰散如細蚳摶似凝膚應璩新詩曰竈下炊牛矢甑中莊豆飯孫子楚祀介子推祝文曰􅀥飯一盤王粲七釋曰西旅游粱御宿清穄𤓰州紅麯參揉相半軟滑膏潤入口流散傅選七誨曰孟冬香秔上秋膏粱彫胡菰子丹具東牆濡潤細滑流澤芬芳飱説文曰飱散也投飯於水中各散也通俗文曰水澆飯曰飱春秋左氏𫝊曰晉公子重耳及曹曹共公聞其駢脅欲觀其裸薄而觀之僖負覊之妻曰吾觀晉公子之従者皆足以相國若相夫子必反其國反其國必得志於諸侯得志於諸侯而誅無禮曹其首也子盍早自貳焉乃饋盤飱寘璧焉公子受飱反璧又曰晉侯問原守於寺人勃鞮對曰昔趙衰以壺飱従徑餒而不食遂使處原韓子曰晉文出亡箕鄭挈壺飱而従迷失道與公相失飢而道泣弗敢食及公反國克原而使為之守曰夫輕飢餒之患而必全壺飱是將不以原畔也渾軒聞之曰夫輕而非日以不動壺飱之故其不以原畔不亦無術乎夫明主不恃吾不可畔也不恃其不我畔恃吾不可欺也戰國䇿曰中山君走有二人隨其後曰臣父嘗戯君下壺飱哺臣父故來死君也國語曰越王召范蠡而問焉曰諺有之日觥飯不及壺飱觥大也大飯盛饌未具不能以虛腹待之不及壺飱之救飢疾也又曰敵國賔至闗尹以吿膳宰致飱熟食曰飱廩人獻餼沈約宋書曰文帝為王𤣥謨作四時詩曰粟飯充夏飱顧和與蔡謨書曰夏侯家言食漿酪飱猶勝於羮飯耳黍釋名曰黍汝也相黏汝也禮記曲禮上曰飯黍無以箸又曲禮下曰祭宗廟黍曰薌合論語微子曰丈人止子路宿殺雞為黍而食之家語曰孔子侍坐於哀公賜之桃與黍孔子先食黍而後食桃左右皆掩口而笑公曰黍者所以雪桃非為食之也孔子對曰邱知之矣夫黍者五榖之長也郊祀宗廟以為上乗果屬有六而桃不與焉為其不列祭祀不登郊廟邱聞之也君子以賤雪貴不聞以貴雪賤也今以五榖之長雪果之下者従上雪下也臣以為妨於教害於義故不敢公曰善謝承後漢書曰范式與張元伯為友春别京師以秋為期至九月十五日殺雞為黍言未絶而巨卿至魏畧曰沐並字德信名有志介嘗過姉姉為殺雞為黍而不留北齊書曰李士謙自以少孤未嘗飲酒食肉口無殺害之言親賔至輙陳樽爼對之危坐終日不倦李氏宗黨豪盛每春秋二社必髙會極宴無不沈醉諠亂嘗集士謙所盛饌盈前而先為設黍謂羣従曰孔子稱黍為五榖之長荀卿亦云食先黍稷古人所尚寧可違乎少長肅然無敢弛惰退而相謂曰既見君子方覺吾徒之不德也又曰盧道䖍為尚書會同僚於草屋下設雞黍之膳談者以為髙幽明録曰漢武帝與近臣宴于未央殿噉黍臛也襄陽記曰司馬徳操嘗造龎徳公值其渡沔上先人墓徑入上堂呼徳公妻子使速作黍禰衡别傳曰黄祖在䝉衝舟宴客作臛黍衡得便自飽食不顧左右復摶以弄戯竹林七賢論曰阮咸兄子簡亦曠達自居居大䘮行遇大雪寒凍遂詣浚儀令令為他賔設黍臛簡又食之以致清議廢頓三十年孟子曰葛伯率其民要其有酒食黍稻者奪之有童子以黍肉餉殺而奪之淮南畢萬術曰取冢墓黍啖兒不思母風俗通曰今宴飲大會皆先黍臛盧諶祭法曰祠用白黍黄黍太平御覽卷八百五十
