  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_779-1a, image: WYG0899/WYG0899-0788a.png}
body:
  text: 太平御覽卷七百七十九宋李昉等撰奉使部三奉使下三輔故事曰婁敬曰臣願為髙車使者持節往至匈奴庭與其分土定界敬至曰汝本處北海之濵秦亂汝侵其界居中國地今婚姻以成當還汝本牧還我中國地作丹書鐵劵曰自海以南冠蓋之士是處焉自海以北控弦之士處焉割土盟子然後還華陽李郃别傳曰郃字孟節漢中人和帝即位分遣使者循州郡觀風俗皆微服單行使者二人當到益州投公舍宿時夏月露坐為出酒與談公仰視問二人曰君發京師時寧知二使者何日發耶二人驚相視而曰不聞問公何以知之公指星有二使星向益部二人知其深明遂共談甚嘉異焉風俗通曰周秦常以歲八月遣輶車之使采異代方言還奏之事藏秘室晏子春秋曰晏子使吳吳稱曰天子請見晏子就之言曰臣受命敝邑使於吳王臣迷惑入於天子之廟敢問吳王惡存吳王夫差請見以諸侯之禮又曰晏子使楚楚王進橘置削晏子不剖而并食之王曰橘未剖對曰臣聞之賜人主者𤓰桃不剖橘柚不剖臣故不敢剖臣非不知又曰晏子使楚楚人以小門而延晏子晏子不入曰使狗國者從狗門入今臣使楚不當狗門入也王曰齊無人耶對曰齊之臨淄三萬户張袂成帷揮汗成雨何為無人齊以賢者使賢主不肖者使不肖主嬰不肖是故使王也又曰晏子聘楚楚王知其賢智欲辱之使人縛一人從殿前過佯問之此何罪也左右答曰此齊人也今犯盜王謂晏子曰齊國善盜乎晏子曰臣聞江南生橘江北為枳土地使然也臣察此人在齊不為盜今來楚而盜亦土地使然也楚王大慙漢雜事曰吳楚七國及齊孝王城守膠西濟南三國圍齊齊使路中大夫告於天子還報曰堅守比至三國圍齊已數重矣無從入三國將與路中大夫盟反言漢已破大夫許之至城下望見齊王曰漢已發兵百萬使太尉周亞夫擊破吳楚引兵救齊齊必堅守三國將誅路中大夫韓詩外傳曰越王勾踐使亷稽獻民於荆荆使者曰越夷狄之國也臣請欺其使者荆王曰越王賢人也其使者亦賢人慎之使者出見亷稽曰冠則得以見亷稽曰夫越亦周室之列封也不得處中國則江海之陂與黿鱣魚鼈為伍文身剪髪而後處焉今來至上國必曰冠乃得見不冠不得見如此則大國使適越亦將劓墨文身剪髪而後得見乎荆王披衣出謝又曰魏文侯疾有子曰擊次曰訢訢少而立以為嗣封太子擊於中山三年不往來其傅趙倉唐諫曰父忘子子不可忘父何不遣使乎擊曰願之久矣未得所使倉唐對曰未有所使則臣請使擊曰諾於是乃問君何所好與所嗜曰君嗜晨鳬好北犬遂求晨鳬北犬賫行倉唐至曰北藩中山之君有北犬晨鳬使倉唐再拜獻之文侯曰嘻擊知吾好北犬晨鳬也即見使者文侯曰擊無恙乎倉唐唯唯三問而不對文侯曰不對何也倉唐曰臣聞諸侯下命君既已賜敝邑使得小國侯不敢對也文侯曰中山君無恙乎倉唐曰臣來時拜送于郊文侯曰中山王君長短若何矣倉唐曰聞諸侯比諸侯諸侯之朝則側者皆人臣無所比之然君所賜之裘幾能勝之矣文侯曰中山之君亦何好乎對曰好詩文侯曰於詩何好曰好黍離與晨風文侯曰黍離詩何哉對曰彼黍離離彼稷之苗行邁靡靡中心揺揺知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉文侯曰怨乎曰非敢怨也時思也文侯曰晨風謂何對曰詩云鴪彼晨風欝彼北林未見君子憂心欽欽如何如何忘我實多於是文侯大悦曰欲知其子視其母欲知其君視其使中山君若不賢惡能得賢遂廢太子訢而召中山君以為嗣說苑曰秦王以五百里地封鄢陵君君不受使虞且謝秦王忿然作色謂且曰亦嘗見天子之怒乎曰臣未嘗見也王曰天子之怒伏尸百萬流血千里且曰大王亦嘗見布衣􅅊帶之士怒乎王曰布衣􅅊帶之士怒則解冠徒跣以頭搶地耳何難之有且曰乃庸夫之怒耳布衣之士怒伏尸二人流血五步即持其匕首起視秦王曰今將是矣秦王變色長跪曰先生就坐寡人喻矣又曰趙王遣使者之楚方鼔瑟而送之誡之曰必如吾言注事具瑟門又曰齊淳于髠聘楚髠為人形貌短小楚王薄賤之謂之曰齊無人耶而使子來乎何長也髠對曰臣無所長要頻七尺之劔欲斬無狀王王曰止吾但戲子耳與髠共飲酒又曰晉楚之君為好㑹苑丘之上宋使人往晉楚大夫曰趣以天子禮見吾為子見使者曰冠雖敝義居上履雖新義居下周室微諸侯未之能易也師雖昇宋城臣猶不更臣之服也遂以諸侯禮見之又曰楚使者聘齊齊王享之梧宫使者曰大哉梧乎王曰江海之魚吞舟大國之樹必巨使者曰昔燕攻齊遵雒路渡濟橋焚雍門殺齊左而虛其右王歜絶頸而死於杜山公孫差格死于龍門飲馬乎淄澠定獲乎瑯琊王與太后奔于莒逃于城陽之山當此之時則梧之大何如乎刀渤對曰使者問梧之年耶昔荆平王為無道加諸申氏殺子胥父與其兄子胥被髮乞食於吳闔廬以為相三年將兵復讎于楚戰勝乎栢舉級頭百萬囊瓦奔鄭王保於隨引師入郢胥行郢都親射宫門臨于王塚笞其墓若此則梧可為拊也又曰明君之使人也任之以事不制之以辭王逸子曰或問張騫可謂名使者歟曰周流斷城東西數萬其中胡貊皆知習俗始得大蒜蒲蔔苜蓿等語林曰魏武將見匈奴使自以形陋不足雄逺國使崔季珪代當坐自捉刀牀頭座既畢令人問魏王何如使答曰魏王信雅望非常然牀頭捉刀人此乃英雄也魏王聞馳遣殺此使天文要集曰天節星主奉使小而明則使中正也梁元帝鄭衆論曰漢世啣命匈奴困而不屈者二人而已子卿手持漢節卧伏氷霜仲師固無下拜陽絶水火况復風生稽落日隱龍堆翰海飛沙臯蘭走霰豈不酸鼻痛心憶雒陽之宫陛屑泣横悲思長安之城闕直以為臣之道義不為生事君之節生為義盡豈望拔幽泉出重仞經長樂抵未央及還望塞亭來依堠火傍觀上郡側眺雲中雖在己之願自隆而於時之報未重梁劉孝儀北使還與永豐侯書曰足踐寒地身犯朔風暮宿客亭晨炊謁舍飄颻辛苦迄留氈鄉雜種覃化頗慕中國兵𫝊李緒之法樓擬衞律所治而毳幕難掩酪漿易厭王程有限時反王關射鹿匈奴乃共歸國刻龍漢節還持入塞馬衘苜蓿嘶逗胡墟人獲蒲蔔歸種舊里稚子出迎善隣相勞倦握蟹螯函覆蝦椀每取朱顔畧多自醉用此終日亦自娛恱太平御覽卷七百七十九
