  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_217-1a, image: WYG0895/WYG0895-0027c.png}
body:
  text: 太平御覽卷二百一十七宋李昉等撰職官部一十五兵部尚書兵部侍郎兵部四司郎中員外戸部尚書戸部侍郎戸部四司郎中員外兵部尚書六典曰兵部尚書侍郎之職掌天下武官選授及地圖輿馬甲仗之政令其屬有四一曰兵部二曰職方三曰駕部四曰庫部總其職務而行其制命凡中外百司之事由於所屬咸質正焉五代史晉史曰王權轉兵部尚書高祖徳契丹屈節以事之馳馹乘軺道路交織一日勅權為使權以前世累為將相未嘗自稱臣於戎虜者謂人曰我雖不才年今耄矣豈能稽顙於窮廬之長乎違詔得罪亦所甘心由是停任兵部侍郎唐書曰太宗以楊𢎞禮有文武材擢拜兵部侍郎專典兵機之務𢎞禮每入叅謀議出則統衆攻戰駐蹕之陣領馬步二十四軍出其不意以擊之所向摧破太宗自山下見𢎞禮所統之衆人皆盡力殺獲居多甚壮之謂許敬宗等曰越公兒郎故有家風矣又曰崔湜遷兵部侍郎父挹為禮部侍郎父子同為南省副貳有唐已來未有其事兵部郎中兵部員外郎六典曰兵部郎中二人一人掌判帳及天下武官之階品衞府之名數一人掌判簿以總軍戎差遣之名數員外郎二人職方郎中職方員外郎六典曰職方郎中員外郎掌天下之地圖及城隍鎮戍烽候之數辨其邦國都鄙之逺近及四夷之歸化者外夷每有蕃客至委鴻臚訊其人本國山川風土脩圖以進周禮曰夏官職方氏中大夫之職掌天下地圖主四方之職貢駕部郎中駕部員外郎六典曰駕部郎中員外郎掌邦國輿輦車乘傳驛厩牧官私馬牛雜畜簿籍辨其出入司其名數北史曰馮子琮為尚書駕部郎中攝庫部孝昭曽閲簿領試令口陳子琮闇對無有遺失隋書曰辛公義為駕部郎勾檢馬牧所獲十餘萬疋帝喜曰唯我公義奉國竭心庫部郎中庫部員外郎六典曰庫部郎中員外郎掌邦國軍州戎噐儀仗為元正冬至陳設并祠祭喪葬所供之物皆辨其出入之數量其繕造之功以分給焉宋書曰文帝宴㑹有荒外歸化人帝問尚書庫部顧琛曰庫中仗有幾許琛詭對曰有十萬人仗舊武庫仗多袐不言帝既問失言及琛詭對甚善之又曰江智淵除尚書庫部郎時高流官序不為臺郎智淵門孤援寡獨有此選意甚不悦固辭不拜唐書曰孔若思遷庫部郎中若思常謂人仕至郎中足矣至是持一石止水滿於座右以示有止足之意戸部尚書六典曰戸部尚書侍郎之職掌天下田户均輸錢榖之政令其屬有四一曰戸部二曰度支三曰金部四曰倉部總其職務而行其制命凡中外百司之事由於所屬皆質正焉漢書曰成帝置尚書五人其三曰民曹主人吏上尚書事呉志曰孫休初即位户部尚書階下讀奏梁書曰到溉為左民尚書溉身長八尺美風儀善容止所蒞以清白自脩性又率儉不好聲色虛室單牀傍無姬侍自外車服不事鮮華冠履十年一易朝服或至穿補傳呼清路示有朝章而已又曰何𦙍字子季為左民尚書後辭官隱於若邪山雲門寺勑給白衣尚書禄𦙍固辭又曰到洽為御史中丞兄溉為左民尚書舊中丞不得入尚書下舍洽引服親不應有礙刺省詳决乃許入溉省亦以其兄弟素篤不能相别也又曰周𢎞正為左民尚書夏月著犢鼻褌衣朱衣為有司所彈其放達如此戸部侍郎唐書曰李林甫引蕭炅為户部侍郎嘗與嚴挺之同行慶弔客次有禮記一卷炅讀之曰蒸嘗伏獵炅早從官無學術不識伏臘之意誤讀之挺之戲問炅對如初挺之白張九齡曰省中豈得有伏獵侍郎由是出為岐州刺史又曰李絳為户部侍郎嘗因次對憲宗曰戸部比有進獻至卿獨無何也絳曰將户部錢獻入内藏是用官物以結私恩上聳然益嘉其直又曰長慶中孟簡代崔群為户部侍郎是官有二員其判使案者别居一署謂之左户元和以還號為清重之最宰輔登用多由此而去又曰張平叔長慶中為戸部侍郎平叔狡險大言因王播以進既掌財用常屈公利以便嬖倖多狎之既有寵於上進退便僻雜以優諧或自稱老奴無復大臣之體嘗奏事畢降階復昇又有論奏佻盪輕脱上每為笑容之在班列間玩狎郎吏譁肆無忌請變㩁鹽法請宰相為之使因以自求樞機之任每月内制出輙疑授已整衣冠以俟後人多笑之又曰庾敬休字順之為户部侍郎奏两川米價騰踊百姓流亡請糶兩川闕官職田䘵米以救貧人從之户部郎中六典曰户部郎中員外郎掌分理户口井田之事凡天下大道任土所出而為貢賦之差隋書曰高構徴拜比部郎㝷轉民部時内史侍郎晉平東與兄子長茂争嫡尚書省不能斷朝臣三議不決構斷而合理上以為能召入内殿勞之曰我聞尚書郎上應列宿觀卿才識方知古人之言信矣嫡庶者禮教之所重我讀卿判數遍詞理愜當意所不能及也賜米百石由是知名唐書曰韋維少習儒業博渉文史舉進士自大理丞累至戸部郎中善於剖判時員外郎宋之問工於詩時人以為戸部有二妙戸部員外郎唐新語曰吕太一遷戸部員外戸部與吏部隣司吏部移牒戸部令􅘘宇悉竪棘以防令史交通太一報牒曰眷彼吏部銓綜之司當須簡要清通何必竪籬揷棘省中賞其俊抜度支尚書晉書曰初魏文帝置度支尚書專掌軍國支計朝議以征討未息動須節量及明帝嗣位欲用安平王孚問左右曰有兄風不答曰似兄帝曰吾得司馬懿二人復何憂哉轉為度支尚書又曰當陽侯杜元凱為度支尚書内以利人外以救邉備物致用以濟當時之益者五十餘條朱鳳晉書曰文帝立度支尚書軍糧計校一由之以司馬孚為之晉起居注曰咸寧五年詔曰一年不收使公私俱匱不唯天時乃人事有不盡也故摠要者正在度支尚書也其以散騎常侍中書令張華為度支尚書後魏書曰陽平王子匡除度支尚書匡與尚書令高肇不平常無降下之色時世宗委政於肇朝夕傾憚惟匡與肇抗衡先自造棺置於㕔事意欲輿棺詣闕論之隋書曰長孫平開皇三年徴拜度支尚書平見天下州縣多罹水旱百姓不給奏令民間每秋家出粟麥一石已下貧富為差等儲之閭里以備㓙年名曰義倉度支郎中唐書曰崔仁師為度支郎中嘗奏度支財物數千言手不執本太宗怪之令黃門侍郎杜正倫齎本仁師對唱一無差殊太宗大竒之六典曰度支郎中員外掌判天下租賦少多之數物産豐約之宜水陸道路之利每嵗計其所出而支其所用凡物之精與地之近者以供國物之粗與地之逺者以供軍皆料其逺近時月衆寡好惡而節制之度支員外郎唐書曰張濬為度支員外郎黃巢將逼關輔濬託疾請告侍其母挈族避亂商州賊犯京師僖宗出幸途無供須衞軍不得食漢陰令李康獻糗餌數百騾綱軍士始得食僖宗召康問之曰卿為縣令安操心及此康對曰臣為塵吏安敢有此進獻張濬員外教臣也帝異之金部郎中金部員外郎隋書曰盧昌衡字子均為僕射祖孝徴所薦遷尚書金部郎孝徴每曰吾用盧子均為尚書郎自謂無愧幽明矣六典曰金部郎中員外郎掌判天下庫藏錢帛出納之事頒其節制司其簿録倉部郎中六典曰倉部郎中員外郎掌判天下倉儲受納租税出給禄廩之事凡中外文武官品秩有差嵗再給之唐書曰畢諴歴駕部員外郎倉部郎中故事勢門子弟鄙倉駕二曹居之者不悦惟諴受命恬然恭遜口無異言執政多之倉部員外郎唐書曰長慶中孟簡遷倉部員外郎屬順宗登極王叔文竊政驟為戸部侍郎簡為其屬中立正色挺然不附叔文心忌而不敢退黙言於宰相韋執誼換刑部員外郎太平御覽卷二百一十七
