  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_253-1a, image: WYG0895/WYG0895-0291c.png}
body:
  text: 太平御覽卷二百五十三宋李昉等撰職官部五十一内史郡丞郡參軍督郵内史史記曰汲黯字長孺公孫𢎞為相乃上言曰右内史界部中多貴人宗室難治非素重臣不能任請徙黯為内史數嵗官事不廢漢書曰倪寛遷右内史寛既治民勸農業表奏開六輔渠六輔為京兆馮翊扶風河東河南河内也定水令以廣溉田収租稅時裁闊狹與民相假貸以故租多不入後有軍發右内史以負租課殿當免民聞皆恐失之大家車牛小家擔負輸租襁屬不絶課更最上由此愈竒寛晉書曰孔季恭為呉興内史呉興頻䘮太守言項羽神為祟君居郡事竟無害也又曰王薈字敬文恬虛守靖不競營利少厯清官除吏部郎侍中建威將軍呉國内史時年饑粟貴人多饑死薈以私米作饘粥以餉餓者所濟活甚衆梁書曰顧憲之為衡陽内史先是郡境連嵗疾疫死者大半棺木尤貴悉裹以生席棄之路傍憲之下車分告屬縣求其親黨悉令殯𦵏其家人絶滅者憲之為出公禄使綱紀營䕶之又土俗山民有病輙云先亡為禍皆開冢剖棺水洗枯骨名為除祟憲之曉諭為陳生死之别事不相由風俗遂改時刺史王奐新至惟衡陽獨無訟者乃歎曰顧衡陽之化至矣又曰傅昭為安成内史郡自宋以來兵亂相接府舍稱㓙每昏旦聞人鬼相觸在任者鮮以吉終及昭至有人夜見甲兵出曰傅公善人不可侵犯乃騰虛而去有頃風雨忽至飄郡㕔事入隍中自是郡遂無患咸以昭貞正所致又曰傅昭為安成内史郡多猛獸為害昭乃命去檻穽猛獸竟不為害又曰殷鈞字季和陳郡長平人也為臨川内史鈞體多疾閉閣卧理而百姓化其徳刼盗皆奔出境又曰伏暅為永陽内史在郡清潔政務安靜郡人何貞秀等一百五十四人詣州言狀湘州刺史以聞詔勘有十五事為吏人懐帝善之隋書曰樊子盖為河南内史屢有治績文帝謂曰今為公别造玉麟符以代銅獸也唐書曰契丹作亂山東不安起及王善授滑州刺史則天謂曰邊賊反叛卿雖疾可將妻子日行三十里緩歩至彼與朕卧理此州以斷河路也因問朝廷得失及善陳理亂之宜十餘道則天曰彼末事也此為本也卿不可行也拜為内史郡丞漢書曰黄覇為頴川郡守有郡丞老病聾督郵欲逐之覇曰許丞亷吏雖老尚能拜起送迎止頗重聽何傷其善助之無失賢者意又曰黄覇為河南太守丞覇為人明察内敏又習文法為丞處職當於法令太守甚任之吏民愛敬焉東觀漢記曰光武議靈臺所處上謂桓譚曰吾欲讖决之何如譚黙然曰臣不讀讖上問其故譚復言讖非經上大怒曰桓譚非聖無法將下斬之譚叩頭流血良久乃得觧出為六安郡丞意忽忽不樂病卒時年七十餘又曰趙典兄子温初為京兆郡丞歎曰大丈夫生當雄飛安能雌伏遂棄官而去後官至三公謝承後漢書曰劉平為濟陽郡丞太守劉育甚重之任以郡職漢名臣奏曰張禹奏曰案令丞相奏事司直持案長史將簿中二千石奏事皆與其丞合縁以臣下各得盡心竭誠而事公明王隠晉書曰范晷字彦長南陽人僑居清河仕為郡五官後為河内郡丞時裴叔則為河内郡知之為裴所伏後為侍御史隋書曰張湏陁為齊郡丞屬嵗饑榖米湧貴湏陁將開倉賑給官屬咸曰待詔勑不可擅與湏陁曰今帝在逺遣使徃來必淹嵗序百姓有倒懸之急如待報至當委之溝壑矣吾若以此獲罪死無所恨先開倉而後上狀帝知之而不責也又曰王文同為栢山郡丞有一人豪猾每持長吏短前後守令咸憚之文同下車聞其名召而數之因令左右剡木為大橛埋於庭出尺餘四角各埋小橛令其露心於木橛上縳四支於小橛以棒毆其背應時潰爛郡中大駭吏人相視懾氣唐書官品志曰丹陽會稽吳郡呉興及萬户郡丞並六百石汝南先賢傳曰周防字偉公年十六仕郡小吏世祖廵狩汝南召掾史試經防尤能誦讀拜為守丞防以未冠請去師事徐州刺史盖豫明經舉孝亷拜郎中晉陸機奏曰伏見司徒下諌議大夫張暢除當為豫章内史丞暢才思清敏志節貞厲秉心立操早有名譽其年時舊比多厯郡守惟暢陵遲白首未齒而佐下藩遂蹈汚濁於暢名實居之為劇前後未始有此愚以為宜觧舉試以近縣詔暢既為是人所稱便差代郡參軍晉書曰阮孚避亂渡江元帝以為安東參軍蓬髮飲酒不以王務縈心北史曰盧文偉少孤有志尚頗渉經史年三十八始舉秀才除本州平北府長流參軍說刺史斐雋按舊迹修督亢陂溉田萬頃人頼其利晉劉𢎞教曰太康以來天下無虞遂共尚無為貴談莊老少有說事外託論公務内但共談笑今既同舟而載安可不人人致力耶督郵韋昭辯釋名曰釋云督郵主諸縣罰以負督郵殷糺攝之也漢書曰田延年為河東太守行縣在平陽召故吏五六十人延年皆臨見令有文者東有武者西閱數十人次到尹翁歸獨伏不肯起對曰翁歸文武兼備唯所施設延年召上辭問甚竒其對使歸府案事發姦窮竟事情延年大重之徙署督郵河東二十縣分為兩部閎孺部汾北翁歸部汾南又曰孫寶為京兆尹以立秋日署故吏侯文為東部督郵入見勑曰鷹隼始擊當順天氣取姦惡以成嚴霜之誅掾部詎有人乎文曰無其人不敢空受職寶曰誰文曰霸陵杜穉季寶曰更言其次文曰豺狼方横道不宜復問狐狸穉季聞之杜門不通水火穿後墻為小户不敢犯法東觀漢記曰趙勤字孟卿南陽棘人明逹好學介然特立太守駱珍召署曹吏至掾督郵太守桓虞下車葉令雍霸及新野令皆不遵法乃復勤督郵到葉見霸不問縣事但髙談清論以激勵之覇即陳責觧印綬去勤還入新野界令聞覇已去遣吏奏記陳罪復還印綬去虞乃歎曰善吏如良鷹矣下韝即中又曰虞延陳留人光武東廵過小黄髙帝母昭靈后園陵在焉延為部督郵詔呼引見問園陵之事延占拜可觀其陵樹株蘖皆諳其數爼豆犧牲頗曉其禮帝善之勑延從駕到魯還經封丘城門門小不容羽盖上怒使撻侍御史延因陛見引咎以為罪在督郵上詔曰以陳留督郵虞延故貸御史罪後漢書曰馬援為郡督郵送囚至司命府王莽置司命上公已下糺察囚有重罪援哀而縱之遂亡命北地遇赦因留牧畜又曰陳球為繁陽令時魏郡守諷縣求賄球不與太守怒撾督郵令逐球督郵不肯曰魏郡十五城獨繁陽有異政今逐之將致議於天下太守乃止司馬彪續漢書曰鍾離意仕郡為督郵縣亭長受民鷄酒府下記考之意封還記詣閤白見以春秋責重先内後外政化之本由近及逺宜先清府内且闊細微太守賢之謝承後漢書曰㑹稽謝夷吾字堯卿為西部督郵烏程長有罪太守第五倫使夷吾徃収之到縣入閤便大哭以三百錢為禮便歸倫問其故對曰三十日中當死故不収之至時果如其言又曰許慶字子伯家貧為督郵乘牛車鄉里號曰軺車許慶嘗與友人談論漢無統嗣倖臣専勢世俗衰薄賢者放退慨然據地悲哭時人稱許子伯哭世又曰聞人襲為郡督郵行則負擔卧則無被連􅍪皮以自覆不受飲食之費魏志曰滿寵字伯寧山陽昌邑人年十八為郡督郵時郡内李朔等擁部曲害於平民太守使寵糺焉朔等請罪不復侵掠又曰髙唐隆字叔平平陽人魯髙堂生後也少為諸生太守薛悌命為督郵督軍與悌爭名悌面呵之隆按劍叱督軍曰昔魯定見侮仲尼厯階趙彈秦筝相如進缶臨臣名君義之所討也督軍失色悌起止之列異𫝊曰汝南北部督郵西平劉伯夷有大才畧案行到懼武亭夜宿或曰此亭不可宿伯夷乃獨住宿去火誦詩書五經訖卧有頃轉東首以絮巾結兩足以幘冠之㧞劍觧帶夜時有異物稍稍轉近忽來覆伯夷伯夷屈起以􅃑掩之以𢃄繫魅呼火照之視得一老狸色赤無毛持火燒殺之明日發視樓屋間得魅所殺人髪結數枚於是亭遂清淨舊說狸髠千人得為神也漢魏先賢行狀曰故宗正南陽劉伯字奉先少履清節忠亮正直研精文學無不綜覧嘗為督郵時豫章太守虞績以饕餮穢汚徴至郡界當就法車不肯就坐伯乃㧞刀毆績績恐就車乃徑上尚書以肅王道廣州先賢𫝊曰徐徴字君求蒼梧荔浦人少有方直之行不撓之節頗覧書傳尤明律令延熹五年徴為中部督郵時唐衡恃豪貴京師號為唐獨語遣賔客至蒼梧頗不拘法度徴便収客郡市髠笞乃白太守太守大怒収徴送獄主簿伏閣曰此人無故賣買既侵百姓汙辱婦女徐徴上念明政據刑申耻今便治之郡無復爪牙之吏後督郵當徒跣行奉諸貴戚賔客耳太守荅知徴為是廹不得已會稽先賢𫝊曰茅開字季闔餘姚人為督郵平决厭衆心嘗之部厯其家不入門當路向堂朝拜府君益善之鍾離意别𫝊曰汝南黄讜拜會稽太守召意署北部督郵時郡中大疫黄君轉署意中部督郵意乃露車不冠身循行病者門入家賜與醫藥詣神廟為民禱祭其所臨户四千餘人後日府君出廵灾情百姓攀車啼曰明府不湏出也但得鍾離督郵民皆活也馬融長笛賦序曰融既博覽又好音樂能鼔琴吹笛為督郵獨卧平陽鄔中有洛客舍逆旅吹笛融聞甚悲遂作長笛賦云爾太平御覽卷二百五十三
