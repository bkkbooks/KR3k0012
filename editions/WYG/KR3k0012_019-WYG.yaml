front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_019-1a, image: WYG0893/WYG0893-0183c.png}
body:
  text: 太平御覽卷十九宋李昉等撰時序部四春中春中史記曰孝惠帝曽春出逰離宫叔孫生曰古者有春嘗果今方櫻桃熟願陛下因取櫻桃獻宗廟上乃許之諸果獻由此興也又曰正月為端月端首也又律書曰明庶風居東方明庶者明衆物盡出也二月也律中夾鐘夾鐘者言萬物隂陽相夾厠也其于十二子為卯卯之為言茂也言萬物茂也其于十母為甲乙甲者萬物剖孚甲而出也乙者言萬物生軋軋也南至於氐氐者言萬物皆至也又曰漢武帝以正月上辛祠太一甘泉以昏祠到明而終常流星經于祠壇上使童子百七十人俱歌春歌青陽夏歌朱明秋歌西灝冬歌𤣥冥漢書曰孟春之月羣居者將散遒人振木鐸徇于路以采詩獻之大師比其音聲以聞於天子又曰王温舒事張湯為酷吏及為河内太守㑹春温舒頓足曰嗟乎令冬益展一月足吾事矣其不愛人如此又曰宣帝時魏相奏請明經通知隂陽者四人各主一時時至明言所職以和隂陽如髙祖時令謁者趙堯舉春李舜舉夏倪湯舉秋貢禹舉冬之類宣帝從之東觀漢記曰章帝行幸勅御史司空道橋所過厯樹木方春日無得有所伐輅車可引避也後漢書曰張奐為武威太守其俗多妖忌凡二月五日産子及與父母同日者悉殺之奐示以義方嚴加賞罰風俗遂改百姓為立祠又曰章帝建初三年二月祀五帝于明堂遂登靈臺望雲物赦天下又曰元初二年春正月詔曰令人有産子者復無算三歲諸懷妊者賜月養榖復其夫勿算一歲著以為令又詔三公曰方春生養萬物孚甲冝助萌芽以育時物其令有司罪非誅死且勿案驗又丙午詔曰畿内七十以上暮春赴京師將行養老之禮又曰王莽上書曰夫三皇象春五帝象夏三王象秋五覇象冬皇王運德也覇者繼帝續之以成厯數故其道駮謝承後漢書曰鄭宏為臨淮太守春行有兩白鹿隨車夾轂而行宏後為太尉續漢書曰太守常以春行縣至縣勸人農桑振救乏絶第五倫為太守因春行見鄭宏竒之署督郵鄭宏時為鄉嗇夫律厯志曰日行東陸謂之春魏略曰孟康為𢎞農守尚寛平羣吏二百餘人渉春遣休常四分遣一分無宿諾晉書曰郭黁奴敦反西平人也少明于易仕郡主簿張天錫末年符氏每有西伐之問太守趙凝使黁筮之黁曰若郡内二月十五日失囚者東兵當至凉祚必終凝乃申條屬縣至十五日鮮卑折握送馬與凝凝怒其非駿幽之廐内鮮卑懼而夜遁凝以吿黁黁曰是也國家將亡弗可復振春秋繁露曰春氣喜故生又曰春之為言偆也偆音蠢者喜樂之貌也春秋元命苞曰春者神明推移精華結紐又曰春含名蠢位東方動春明達春之言蠢東之言動含此名以自明自達也六合俱生萬物應節惟于時為春以其蠢動無節應此時節也五行並起各以名利自六合俱生以通五行各有隂陽交合故能然也其精青龍龍之言萌也隂中之陽也老子曰衆人熙熙若享太牢如登春臺莊子曰夫春氣發而百草生正得秋而萬寶成夫春與秋豈無得而然哉天道已行矣又曰春夏先秋冬後四時之序也萬物化則萌區有壯盛衰之殺變化之流也又曰舜以天下讓善卷善卷曰予立于宇宙之中冬日衣皮毛夏日衣葛絺春耕夏種形足以勞動秋收冬斂身足以休食日出而作日入而息逍遥于天地之間而心意自得吾何以天下為哉文子曰政失于春歲星盈縮不居其常春政不失禾黍滋又曰因春而生因秋而殺所生不徳所殺不怨則幾于道矣尸子曰春風瑞風也一名景風一名惠風春為𤼵生夏為長贏􅴜為收成冬為安寧爾雅以為四時之别名也又曰春為忠也東方為春春動也是故鳥獸孕榮華生萬物遂忠之至也鶡冠子曰斗柄指東天下皆春列子曰荆之南有㝠靈者五百歲為春五百歲為秋上古有大椿者以八千歲為春八千歲為秋管子曰孟春之朝君自聽朝論爵賞管子曰鄰人謂展禽曰魯黜夫子三夫子無憂色何也禽曰春風鼓百草敷蔚吾不知其為茂秋霜降百草零落吾不知其為枯茂枯非四時之悲欣榮辱非吾心之憂喜淮南子曰何謂五星東方木也其帝太昊其佐勾芒執規而治春漢書魏相上書太昊乘震執規司春又曰日陽之主也是故春則羣獸除除冬毛㣲墮也又曰太陽治春則欲行柔惠温良又曰春為規規之言度也轉而不復圓而不垸復過也垸轉也復而不縱廣大以寛感動有理發通有紀優優簡簡百怨不起規度不失生氣乃理又曰孟春與孟秋合孟春始盈孟秋始縮故正月失政七月凉風不至又曰仲春始出仲秋始内又曰春肅秋榮冬雷夏霜皆賊氣之所至又曰四時者春生夏長秋收冬藏取與有節出入有時開闔張歙不失其序歙讀曰翕又曰春女悲秋士哀知物化矣周禮仲春之月令媒氏㑹男女女當外嫁于夫家骨肉相離故女悲秋金氣用事戰士執兵勝敗未卜故士哀也又曰孟春之月東宫御女青色衣青采鼓琴瑟其兵矛其畜羊二月官倉其樹杏二月播種故官倉也杏有核在中隂在内陽在外也故其樹杏也三月官鄉其樹李三月折民戸口故言鄉也李有核義與杏同又曰季春三月豐隆乃出將其雨也豐隆雷也至秋三月地氣下藏乃收其殺百蟲蟄伏静居閉戸青女乃出以降霜雪十二時之氣以至于仲春二月之夕乃布收其藏而閉其寒女夷鼓歌以司天和以長百榖禽獸草木蔡邕月令章句曰季春戴勝降于桑又曰仲春之月天子獻羔開氷又曰仲春𤣥鳥至𤣥鳥燕也崔寔四民月令曰二月祀大社之日薦韭卵于祖禰五行志曰於易震在東方為春為木者也兌在西方為秋為金離在南方為夏為火坎在北方為冬為水春與秋日夜分寒暑平是以金木之氣易以相變故貌傷則致秋隂常雨言傷則致春陽常旱也至于冬夏日夜相反謂夏日長夜短冬日短夜長也寒暑殊絶水火之氣不得相併故視傷常燠聽傷常寒者其氣然也又曰夾鍾言隂夾助木節宣四方之氣而出種物也位于卯在二月東陽記曰山南有春草巖出龍鬚多藥物西京雜記曰賈佩蘭云在宫時正月上辰出池邉盥濯食蓬餌以去妖形荆州記曰陸凱與范曄為友在江南寄梅花一枝詣長安與曄并贈詩云折梅逢驛使寄與隴頭人江南無所有聊贈一枝春荆楚歲時記曰正月夜多鬼鳥度家家搥牀打户捩狗耳滅燈燭以禳之𤣥中記云此鳥名姑獲一名天地文一名隱飛鳥一名夜行逰女好取人女子養之有小兒之家即以血㸃其衣以為誌故世人名為鬼鳥荆州彌多斯言信矣又曰正月未日夜蘆苣火照井厠中百鬼走博物志曰宋國有田夫常衣黂分衮反緼僅以過冬暨春東作自曝于日不知天下之有廣厦奥室綿絲狐貉顧謂其妻曰負日之暄人莫知者以獻吾君將有賞臨海異物志曰鶗鴂一名田鵑春三月鳴晝夜不止音聲常自呼俗言取梅子塗其口兩邊皆赤上天自言乞恩須待梅子熟鳴乃得止耳又曰春風生露甘育萬物吕氏春秋曰天行不信不能成歲地安不信草木不茂春風不信百華不盛果實不生又曰仲春之月𤣥鳥至至之日以太牢祠于髙禖蔡邕曰髙禖神明也又曰仲春之月先春三日奮鐸以令于兆民曰雷且發聲有不戒其容止者生子不備必有凶灾耕者少舎晏子春秋曰齊景公夏逰獵又起太臺之役晏子諫曰夏春起役㳺獵奪民農時國家空虛不可景公曰吾聞相賢者國成臣忠者主逸吾年無幾矣欲遂吾所樂卒即律反吾所好子其息矣晏子曰聞文王不敢盤于逰畋故國昌而民安楚靈不廢乾谿之役起章華之臺而民叛之今君不思將危社稷而為諸侯笑臣聞忠不避死諫不違罪君不聽臣臣將逝矣景公曰唯唯揚子法言曰或曰為政先殺後教是歟於戲天先秋而後春乎將先春而後秋乎梁元帝纂要曰春亦曰發生芳春青春陽春三春九春風曰陽風暄風柔風惠風景曰媚景和景韶景時曰良時嘉時辰曰良辰嘉辰芳辰節曰芳節嘉節韶節淑節草曰弱草芳草木曰華木華樹芳樹林曰芳林茂林鳥曰陽鳥時鳥陽禽候鳥時禽好禽周禮曰龜人掌六龜攻龜用春時各以其物入于龜室上春釁龜祭祀先卜釁者殺牲以血塗之也筮人上春相筮周書時訓解曰驚蟄之日桃始華又五日倉庚鳴又五日鷹化為鳩桃不華是謂陽否又曰倉庫灾倉庚不鳴臣不從主鷹不化鳩㓂戎數起春分之日𤣥鳥至又五日雷乃發聲又五日始電𤣥鳥不至婦人不娠雷不發聲諸侯失民又云逺人不服不電君無威震太平御覽卷十九
