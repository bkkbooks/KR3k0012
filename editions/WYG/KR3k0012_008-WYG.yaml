body:
  text: 太平御覽卷八宋李昉等撰天部八雲霄漢霞雲釋名曰雲猶云云衆盛意也說文曰雲大澤之潤氣也又雲山川氣也從雨云象回轉形也霠於金反雲覆日也霃音沉渰於檢反雲久隂也凄雨雲起也雨雲貌也詩云有渰凄凄興雨祁祁易曰雲行雨施品物流行又雲從龍風從虎聖人作而萬物覩又召雲者龍又雲上于天需又坎為雲又宻雲不雨自我西郊宻静也雲靜止不渝紂恩澤不加于民也不雨之灾自其君也西郊亦謂文王也詩曰薈兮蔚兮南山朝隮注曰薈蔚雲興貌南山曹南山隮升雲也又上天同雲雨雪雰雰又英英白雲露彼菅茅英英白雲貌露亦有雲言天地之氣無㣲不著無不覆飬也禮曰天降時雨山川出雲又山林川谷丘陵能出雲為風雨周禮曰保章氏以五色雲物辨吉凶之祲祥鄭氏註曰占視日旁雲氣青為蟲白為䘮赤為兵荒黒為水黃為豐傳曰凡分至啓閉必書雲物為備故也分謂春秋分至謂冬夏至啟立春夏也陽氣用事為啓閉立秋冬也隂氣用事為閉雲五雲也風氣日月星辰也分至啓閉天地之大節隂陽之分也故遂登觀臺望氣以審妖祥變亂之氣先見於八節書其雲物之形言其所致務為之備也又魯哀公五年有雲如衆赤鳥夾日以飛三日楚使問周太史太史曰其當王身乎日為君妖氣守之雲在楚境上禍不及他國也禜之可移于令尹司馬也王曰除心腹之疾而置諸股肱何益終不禜孔子曰楚昭王知天道矣不失國宜哉又黄帝氏以雲紀官故為雲師而雲名有景雲之瑞公羊傳曰觸石而出膚寸而合不崇朝而徧雨乎天下者惟泰山雲爾語曰不義而富且貴於我如浮雲易通卦驗曰冬至陽雲出箕如樹木之状小寒合凍蒼陽雲出氐大寒降雪黒陽雲出心立春青陽雲出房如積水雨水黄陽雲出亢驚蟄赤陽雲出翼春分正陽雲出軫如積白鵠清明白陽雲出奎榖雨大陽雲出張如車蓋立夏初陽雲出觜赤如硃小滿上陽雲出七星芒種長陽雲出羅夏至少隂雲如水波萃萃小暑雲五色出大暑隂雲出南赤圵蒼立秋濁隂雲出如赤繒處暑赤雲出白露黄隂雲出秋分白隂雲出寒露正隂雲出如冠纓霜降大隂雲出上如羊下如蟠石立冬隂雲出而黒大雪降隂雲出而分冬至日謹候見雲送迎從其鄉来嵗美民和京房易飛候曰凡候雨有黒雲如羣羊奔如飛鳥五日必雨又視四方常有大雲五色其下賢人隱也青雲潤澤蔽日在西北為舉賢良黄雲如覆車大豐也又凡候雨以晦朔弦望有蒼黒雲起細雲如杼軸蔽日月五日必雨尚書中候曰堯沉璧于河白雲起迴風揺漾又周成王舉堯舜禮沉璧于河白雲起而青雲浮至乃有蒼龍負圖臨河也尚書大傳曰舜為賔客禹為主人百工相和而歌卿雲于時八風循道卿雲藂藂注言和氣應也藂或為簇又五岳皆觸石出雲膚寸而合不崇朝而雨又舜時卿雲見于時百工和歌舜歌曰卿雲爛兮糺縵縵兮或以為雲出岫迴薄而難名状也禮統曰雲者運氣布恩普博也禮斗威儀曰人君乗水而王其政和平則景雲見也又景明也言雲氣光明也又周成王治平觀于河青雲浮于河也春秋文耀鈎曰楚有蒼雲如霓圍軫七蟠中有荷斧之人向軫而蹲于是楚唐史畫遺灰而雲滅故曰唐史之策上滅蒼雲宋均注曰軫楚分也雲水氣灰火氣畫遺灰故雲滅春秋元命苞曰隂陽聚為雲春秋説題辭曰雲之為言運也觸石而起謂之雲含陽而起以精運也春秋合誠圖曰帝堯之母曰慶都生而神異常有黄雲覆上春秋孔演圖曰舜之將興黄雲升于上又湯將興白雲入房白雲金精入湯房也孝經援神契曰王者徳至山陵則景雲見史曰天子孝則景雲見史記曰若烟非烟若雲非雲郁郁紛紛蕭索輪囷是謂卿雲卿雲喜氣也又髙祖過沛擊筑自為歌曰大風起兮雲飛揚威加海内兮歸故鄉安得猛士兮守四方又范増云髙祖之上有雲為龍虎之形此天子氣也又黃帝與蚩尤戰于涿鹿之野常有五色雲金枝玉葉止于帝上有花葩之象因作華蓋漢書郊祀志曰武帝封太山夜有光晝有白雲起于封中又封泰山後雲氣成宫闕漢書曰相如作大人賦帝覽之飄飄有凌雲之氣又武帝迎汾隂鼎至甘泉宫黃雲蓋其上又宣帝祠甘泉宫有頃紫雲從西北來散于前范蔚宗後漢書曰樊英隠壺山之陽曽有暴風從西方起英謂學者曰成都市火甚盛因含水西向噀之時客有從成都來者云是日大火有黒雲卒從東方起須臾大雨火滅魏志曰文帝生于沛國譙縣上有雲氣青色而圓蓋終日不觧望氣者以為至貴人之證非人臣之氣蜀志曰先主為兒戲於桑樹下上有雲覆童童如車蓋晉書曰樂廣有風姿衛瓘曰此人若披雲霧而覩青天又阮咸性曠達不拘顔延年五君詠曰仲容青雲噐又咸和元年雲鬬聲如暴風雨宋書曰大明八年宣太后陵前後數有光及五色雲芳香四滿又五彩在松如車蓋又孝康建元二年二月乙未日上有雲如錦文光色潤澤又世祖在江州起義建軍有紫雲二叚落于身上穆天子傳曰天子觴西王母于瑶池之上王母為謡曰白雲在天丘陵自出道路悠逺山川閒之東方朔别傳曰凡占長吏下車當視天有黄雲來覆車五榖大熟青雲致兵白雲致盗烏雲多水赤雲多火長沙耆舊傳曰祝陽為洛陽令時大旱告誡引罪紫雲忽起漢武帝内傳曰帝登尋真之臺齊戒到七月七日夜忽見天西南如白雲起直來趣宫須臾聞雲中簫鼓之聲復半食頃西王母至乘紫雲之輦臨發雲氣勃鬰盡為香氣漢武帝故事曰上幸梁父祠地主其日山上有白雲又有呼萬嵗聲封禪之上肅然白雲為蓋東方朔十洲記曰天漢三年月氏音支國獻神香使者曰國有常占東風入律百旬不休青雲干吕連月不散意中國將有好道君故捜竒藴而貢神香也西京雜記曰瑞雲曰慶雲曰景雲雲五色曰慶或曰卿雲雲外赤内青謂之矞雲雲三色曰矞亦瑞雲也矞以律反雨雲曰油雲孟子曰油然作雲沛然下雨雪雲曰同雲詩曰上天同雲雨雪雰雰同雲謂雲隂竟天同為一色雲師曰屏翳吕氏春秋曰屏翳曰雨師雲將亦雲之師司馬彪注荘子將雲之主師劉澄之揚州記曰婁縣有馬鞍山天將雨輙有雲来映此山山出雲應之乃大雨抱朴子玉策記曰千嵗之龜五色具焉浮于蓮葉之上或在藂蓍之下其上時有雲風土記曰烏程縣􅀈音卞山望氣云有黄氣紫雲人無敢卜𦵏焉王子年拾遺記曰崑崙山有九層其上每一層有雲氣五色從下望之皆有城闕之象又崑崙之西方曰須彌山九層其第七層有景雲出以映朝日又爛石色紅似肺燒之有香烟聞數百里烟氣升天則成香雲香雲遍潤則成香雨捜神記曰薊子訓至洛見公卿數十處去後皆白雲起王韶之始興記曰堯山長嶺望之如雲張野廬山記曰有白雲冠帶峯嵓呼為上帶洞㝠記曰吉雲之國俗常以雲占吉凶有吉事則滿室五色照人著草木皆成五色露莊子曰廣成子謂黄帝曰汝治天下雲氣不待族而雨草木不待黄而落奚足云至道又華封人謂堯曰夫聖人鶉居而鷇飲鳥行而無章迹也天下有道與物皆昌千嵗厭世去而上仙乘彼白雲至于帝鄉抱朴子曰俗有見逰雲西馳而謂月之東行孟子曰油然作雲沛然下雨又湯一征自葛始天下信之人望之若大早之望雲霓淮南子曰周室之雲巃力孔反嵸七孔反尞力交反摷士交反彭歩光反薄而為雨周室宻也尞摷彭薄藴積之貌又伯益作井而龍登𤣥雲龍在黄泉下恐害及故云又山雲蒸柱潤礎又八極之雲是雨天下吕氏春秋曰山雲草莽水雲魚鱗旱雲烟火雨雲水氣無不比類其所生以示人又至亂之世君臣相賊其雲有若犬馬若白鵠遁甲開山圖曰遼東有襄平山多饒鬼目之菜生而有神虎龍蛇大魚守之雲氣覆之食之令人不飢滎氏注曰鬼目菜形似魚守之常有氣如龍虎蛇魚之状河圖帝通紀曰雲者天地之本也河圖始開曰黄泉之埃上為黄雲青泉之埃上為青雲赤泉之埃上為赤雲白泉之埃上為白雲𤣥泉之埃上為𤣥雲河圖括地象曰崑崙山出五色雲氣兵書曰有雲如丹蛇隨車後大戰殺將又韓雲如布趙雲如牛楚雲如日宋雲如車魯雲如馬吳雲如犬越雲如龍頭蜀雲如囷言當處雲似之又雲如雄雉或如雄鷄臨城其城必降魏武兵書按要曰孫子稱司雲氣非雲非烟非塵非霧形似鳥獸客吉主人忌韋頴秦書曰苻堅時有黄雲五色時以為瑞賜民酺五日黄子𤼵相雨書曰四方有濯魚雲疾者立雨遲者少雨雖至江漢雲疾者即日雨洛書曰蒼帝起青雲扶日赤帝起赤雲扶日黄帝起黄雲扶日白帝起白雲扶日軍國占候曰有黒雲似一疋布者其國兵起天文要集曰河有黒雲狀似船若一疋布維河不出十日大雨又北斗者不欲雲覆之有黒雲覆之天大雨地圖曰望石氣如浮雲其珠玉之精也京房風角要訣曰候雨法有黒雲如一疋帛向日中即日大雨二疋為二日大雨三疋為三日大雨黄帝岐伯經曰岐伯乘絳雲之車駕十二白鹿㳺于蓬萊之上徐幹中論曰文王遇姜公于渭陽灼然如披雲見白日孫氏瑞應圖曰景雲者太平之應也一曰非氣非烟五色氤氲謂之慶雲瑞應圖曰矞雲也有狀外赤内黄歸藏曰有白雲自蒼梧入大梁論衡曰龍無雲雨不能叅天吳範占候風氣秘訣曰有青雲如雉臨城營軍散走山海經曰符陽之山怪雲所出陸賈新語曰邪臣之蔽賢猶浮雲之蔽日月也宋玉髙唐賦叙曰楚襄王與宋玉逰雲夢之臺髙唐之觀上有雲氣須臾之間變化無窮問曰此何氣也玉曰朝雲也昔者先王嘗逰髙唐怠而晝寢夢見婦人曰妾巫山之女也為髙唐之客聞君逰髙唐願薦枕席王因幸之去而辭曰妾在巫山之陽髙丘之岨朝為行雲莫為行雨朝朝暮暮陽臺之下旦朝視之如言故為立廟號曰朝雲孫卿雲賦曰圎者中規方者中矩又託地而㳺宇反風而下雨楚辭曰青雲衣兮白霓裳又冠青雲之崔巍漢武帝秋風辭曰秋風起兮白雲飛司馬相如封禪頌曰自我天覆雲之油油魏文帝詩曰西北有浮雲亭亭似車蓋應瑒詩曰清朝浮四海日暮歸故山張孟陽詩曰流波戀舊浦行雲思故山傅𤣥詩曰浮雲合愁氣悲風坐自歎又𤣥歌詩曰青雲徘􅆦為我愁腸又雲為車兮風為馬玉為山兮蘭在野雲無期兮風有止思心多端誰能理陸機雲賦曰望九畿以逺肆明皇極而永舒蔽陽光于暘谷間天文于帝居齊濛荒于無極等渾昧于太初又浮雲賦曰若層臺髙觀重樓疊閣或如鐘首之鬰律乍似塞門之寥廓若靈園之列樹攅寶耀之炳粲金柯分玉葉散龍逸蛟起熊厲虎戰鸞翔鳳翥鴻驚鶴奮成公綏雲賦曰舒則彌綸覆四海卷則消液入無形狎獵鱗次參差交錯狀崔巍其不安吁可畏而欲落龍伸蠖屈蜿蜒逶迤連翩鳳飛虎轉相隨或繡文錦章依㣲要妙綿邈凌虛輕翔浮漂陶潜歸去来辭曰雲無心而出岫鳥倦飛而知還霄釋名曰霄青天也無雲氣而青碧者也又曰近天氣也關令尹喜内傳曰當喜在胎之始其母夢綘霄流繞其旁有長人謂曰汝咽之既覺口盈味既生雙光若日飛流滿堂良久不知所在抱朴子曰凌厲九霄淮南子曰隂陽為騶乘雲霄與造化俱廣雅曰赤霄常霄氣與造化俱雜字詁訓曰霄摩天赤氣也楚辭曰若王喬之乗雲載赤雲而凌青霄揚雄甘泉賦曰騰青霄而軼浮景孫楚鶴賦曰假使此鳥生自崑崙長于丹穴遨逰𤣥圃縹霄之際左思蜀都賦曰干青霄而秀出舒丹氣而為霞郭璞逰仙詩曰尋仙萬餘日今乃見子喬振髪載翠霞觧褐披絳霄漢詩曰倬彼雲漢昭回于天倬明也又倬彼雲漢為章于天傳曰昭公四年星孛及漢水祥也賈逵觧曰天漢水也或曰天河爾雅曰析木謂之津箕斗之間津也郭璞注曰津漢津也箕猶尾斗有斗天漢之津梁大戴禮曰夏小正秋七月漢案户漢天河也案户言直南北也孝經援神契曰河者水之伯上應天漢史記天官書曰漢者金之散氣其本曰水漢星多則多水少則旱孟康曰漢河漢也水生於金也漢書曰項羽封髙帝為漢王帝不恱蕭何謀曰語曰天漢其稱甚美願大王王漢撫其民還定三秦天下可圖也捜神記曰謝端少䘮父母為鄰人所養年十七未婚後感天漢中白水素女潜為其炊以備飲食端後怪而潜候之得見言曰天哀汝孤貧恭順使我相為守舍今既見便去留不可博物志曰舊説云天河與海通近世有居海者年年八月有浮槎去來不失期人有多齎糧乘槎而去芒芒忽忽不覺晝夜奄至一處有城郭屋舎甚嚴遥望多織婦見一丈夫牽牛渚次飲之牽牛人乃驚問曰何由至此此人具道來意即問為何處答曰君還至蜀訪嚴君平則知之乃與一石而歸後至蜀問嚴君平君平曰此織女支機石也某年月日有客星犯牽牛宿正此人到天河時也抱朴子曰天河從西北極分為兩頭經于南極其一經南井中過其一經東井中過河者天之水也隨天而轉入地下過張衡靈憲曰水精為天漢河圖括地象曰河精上為天漢三輔黄圖曰始皇都咸陽端門四逹以則紫宫渭水貫都以象天河横橋南渡以法牽牛物理論曰星者元氣之英水之精也氣發而升精華上浮宛轉隨流名之曰天河一曰雲漢衆星出焉古詩曰河漢清且淺相去詎幾許盈盈一水間脉脉不得語傅𤣥擬天問曰七月七日牽牛織女特㑹天河唐史宋之問明河篇曰明河可望不可親願得乗槎一問津更將織女支機石還訪成都賣卜人霞釋名曰霞白雲映日光而成赤色假日之赤光而成也故字從雨遐聲漢武内傳曰上元夫人謂西王母曰阿瓊有六甲之術用之可以逰景雲之宫登流霞之堂十洲記曰崑崙山之上有瓊華之室紫翠丹房景雲燭目朱霞九光王子年拾遺曰燕昭王二年海人乗霞舟然龍膏又崑山第八層有五色霞抱朴子曰咀六氣于丹霞楚辭曰潄正陽而含朝霞河圖曰崑崙山有五色水赤水之氣上蒸為霞而赫然論衡曰河東蒲坂項曼都好道學仙去三年而反家問其状都曰欲飲食仙人輙飲我以流霞每飲一杯數日不飢揚雄甘泉賦曰吸青雲之流霞兮飲若木之露英王延夀魯靈光殿賦曰霞皎雲蔚若隂若陽魏文帝辭曰丹霞蔽日彩虹垂天曹子建洛神賦曰逺而望之皎若太陽昇朝霞阮籍清思賦曰厭白玉以為面霏丹霞以為裳左思蜀都賦曰舒丹氣而為霞陸機列仙賦曰即絳闕于朝霞陸機雲賦曰外聚紫霞郭璞江賦曰撫陵陂而鳬躍吸翠霞而夭矯孫綽天台山賦曰赤城霞起以建標張孟陽詩曰朝霞迎白日丹霞臨暘谷郭璞逰仙詩曰朝霞升東山朝日何晃朗嵇含恱情詩曰朝霞炙瓊林夕影映靈芝太平御覽卷八
