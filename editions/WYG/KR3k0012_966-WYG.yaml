front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_966-1a, image: WYG0901/WYG0901-0506a.png}
body:
  text: 太平御覧卷九百六十六宋李昉等撰果部三甘橘甘謝承後漢書曰丹陽張磐字子石為廬江太守尋陽令嘗餉一奩甘其小男年七嵗就取一枚磐奪取付還卒以兩枚與之磐奪兒甘鞭卒曰何故行賂於吾子宋書曰彭城王義康時四方獻饋皆以上品薦義康而以次者供御上嘗以冬月啖甘嘆其味並劣義康在坐曰今年甘殊有佳者遣人還東府取甘大三寸又曰元嘉末魏太武征彭城遣使送九種鹽并胡皷仍求黃甘梁書曰吕僧珎既有大勲任總心膂性甚恭慎當直禁中盛暑不敢解衣每侍御座屏氣鞠躬飲食未嘗舉筯醉後取一甘食武帝笑曰卿今日便是大有所進禄外令月給錢十萬唐書曰羅浮甘子開元中始有山僧種於南樓寺其後嘗資進獻幸蜀奉天之嵗皆不結實又曰天寳中中書門下奏曰臣等今日因奏事承徳音聞江南為橘江北為枳盖以地氣有殊物性因變朕近於宫内種甘子樹數株今秋已來結實一百五十顆乃與江南及蜀道所進無别亦可謂稍異也晉令曰閬中縣置守黃甘吏一人風土記曰甘橘之屬滋味甜美時異者也有黃者有頳者頳者謂之壺甘廣志曰甘有二十一核有成都平蔕甘大如升色蒼黃揵為南安縣出黃甘神異經曰東方朔云東南外有建春山其上多美甘樹京口記曰京城東門射堂前甘樹十餘株盧諶祭法曰冬祠用甘㐮陽記曰李衡字叔平為丹陽太守衡素不治家妻諫不聽後宻遣十人於武陵龍陽洲上作宅種柑千樹臨死勑兒曰汝母惡吾不治家故窮如是吾洲内有千頭木奴不責汝衣食嵗上一疋絹亦足用矣及衡甘成嵗得絹數千疋荆州記曰枝甘江以甘得名宜都郡江北舊有甘園名宜都甘湘州記曰州故大城内有陶侃廟地是賈誼故宅誼時種甘猶有存者崔豹古今注曰甘實形如石榴者謂為壺甘也唐新語曰益州每嵗進甘子皆以紙褁之他時長吏嫌紙不敬代之細布既而恐甘子為布所損每懐憂惧俄有御史甘子布至長吏以為推布褁甘子事俱曰果為所推及子布到驛長吏但叙以布褁甘子為敬子布初不知之久而方悟聞者莫不大笑又曰安禄山將反宰臣韋見素請以平章事追之𤣥宗許焉草詔訖中留之遣中使輔璆琳送甘子且觀其變璆琳受賂而還因言無反狀𤣥宗謂宰臣曰禄山必無二心詔本朕已焚矣異苑曰河内司馬元允元嘉中為新淦令䘮官月旦設祭甘化而為鳶又曰南康皈美山石城内有甘橘橙柚就食其實任意取足脫持歸者便遇大虵或顛仆失徑家人啖之亦病述異記曰南康郡有東望山山頂有湖清深又有果林周四里許衆果畢植間無雜木行列整齊如人功也甘子熟時有三人共食致飽訖懷二枚欲以示外人便共尋覔向逕廻旋半日迷不能得即聞空中語云放雙甘乃聽汝去懐甘者恐怖放甘於地轉盻即見歸逕乃相與俱返廣古今五行記曰唐髙宗調露中連州見一甘樹四月中有子如拳大剖之有兩頭蛇又曰唐光宅中季崇貞任益州刺史㕔事前有甘樹有子大如雞子晩熟微有小孔如針郡官咸異之方欲將進久而方罷因剖之得一赤斑蛇長尺餘崇貞後為兵所殺洛都賦曰若夫黃甘荔支殊逺之珎雖非方土之所産重九譯而來臻潘安仁笙賦曰披黃苞以授甘傾縹瓷以酌酃張載詩曰三巴黃甘𤓰州素奈渴者所思銘之裳帶郭璞柚讃曰厥苞橘柚精者曰甘孔坦表曰天恩例賜靈酒黃甘不勝受遇謹表以聞張衡七辯曰荔支黃甘宗炳甘頌曰煌煌嘉賔磊如景星南金其色隋侯厥形橘焦贛易林剥之屯曰北山有莱橘柚所聚荷嚢載畚盈我筐筥尚書禹貢曰淮海惟楊州厥苞橘柚錫貢小曰橘大曰柚周禮冬官上考工記曰橘踰淮而北為枳此地氣然也春秋運斗樞曰璇星散為橘史記曰蘇秦説燕文侯曰君誠能聽臣齊必致魚鹽之海楚必致橘柚之園漢書曰江陵千樹橘其人皆與千戸侯等東觀漢記曰馬援好事至荔浦見冬筍名曰苞筍上言禹貢厥苞橘柚疑謂是也又曰建武中單于來賜橙橘謝承後漢書曰張磐為廬江太守尋陽令餉橘一奩小男年七嵗卒以兩橘與之磐還橘鞭卒又曰沛國桓嚴字文林罷隕縣舍揚州從事屈豫室庭有橘樹一株遇其實熟數垂室内嚴乃以竹蕃樹四靣時風吹兩實墮地以書䋲縳繫樹枝後漢書曰亷范為成都太守部人楊由善風雲占候嘗有風吹削哺哺當作柹音孚廢切太守以問由對曰方當有薦木實者其色黃赤頃之五官掾獻橘數苞魏志曰倭國有橘不知滋味呉志曰陸績年六嵗於九江見袁術出橘績懐三枚拜辭墮地術謂曰陸郎作賔客而懐橘乎績跪答曰欲歸遺母術大竒之呉録地理志曰朱光禄為建安郡中庭有橘冬月樹上覆褁之至明年暮春初夏色變青黑味尤絶美上林賦曰盧橘夏熟盧黑也盖近是也呉厯曰呉王饋魏文帝大橘魏文帝詔群臣曰南方有橘酢正裂人牙時有甜耳建武故事曰咸和六年平西將軍庾亮送橘十二實共同一蒂以為瑞異百官畢賀中興書曰王者徳盛則嘉禾生橘亦嘉味之流晉中閣名曰華林園橘十二株宋書曰孝武大明中芳香琴堂東西有雙橘連理改芳香琴堂為連理堂齊書曰豫章王嶷夣忽見形於第後園乗腰輿指麾處分呼直兵直兵無手板左右授一玉手與之曰橘樹一株死可覔補之因出後園閣直兵倒地仍失手板南史曰虞愿始數嵗家中橘樹冬熟諸兒競取之愿獨不取家人皆異之三國典略曰梁侯景未平王僧辯獻嘉橘一蔕二十五子于湘東王王答之曰昔文康獻橘十有二子用今方古彼有慙色今景之兇惡既稔凱歌之聲已及嘉瑞之橘逺臻但增歡慰晏子曰晏子使楚楚王謂其左右曰晏嬰齊之智辨士也吾欲傷之坐定而縳一人至問何為曰齊人坐盗王視晏子曰齊人善盗乎晏子對曰嬰聞橘生於淮北則為枳枝葉徒似其實味不同水土異也今民生於齊不盗入於楚得無效楚民之善盗耶王笑曰寡人取病焉又曰晏子使楚楚王進橘置削晏子并食不剖王曰橘當云割對曰臣開之賜人主前者𤓰桃不削橘柚不剖今者萬乗無教故不敢割臣非不知也莊子曰三皇五帝之禮義法度譬猶楂梨橘柚其味相反而皆可適於口淮南子曰夫橘樹之江北化而為橙吕氏春秋曰常山之北投淵之上有百菓焉群鳥所食箕山之東青馬之所有甘櫨焉箕山許由隐所青馬崑崙山東江浦之橘雲夣之柚漢上之卷所以致之山海經曰洞庭之山其木多橘正論曰橘柚之貢堯舜不嘗山龍之華帝王不以為䙝服而命臣餘黃甘厭文繡者盖以萬數者也鹽鐵論曰孝武皇帝平百越以為園圃而民皆厭橘柚宋躬孝子傳曰王虗之廬陵西昌人䘮父母二十年鹽酢不入其口所住屋夜有光庭中橘樹隆冬三實㑹稽先賢傳曰嚴遵從光武遇蜀郡獻橘栗上持付公卿遵獨不取水經曰劉備時巴郡結舫水居者五百家縣有甘橘官荔枝園夏至則熟二千石常設厨膳命大夫共㑹樹下食之南夷志曰日橘大釐城有之其味甚酸穹􅀈有大橘如覆杯湘州記曰泉陵縣有焦山山上多橘裴淵廣州記曰羅浮山有橘夏熟實大如李雲南記曰雲南出甘橘甘蔗橙柚梨蒲桃李梅杏桃糖酪之類悉有魏王花木志曰盧橘蜀生有給客橙似橘而非若柚而香冬夏華實相繼或如弹丸或如拳通嵗食之亦名盧橘異物志曰橘為樹白華而赤實皮既馨香又有善味江南則有之不生他所交阯有橘置長官一人秩三百石主嵗貢御橘續捜神記曰晉孝武帝世宣城秦精嘗入武昌山中採藥忽見一人身長一丈遍體皆毛從山北來乃探懐中二十枚橘與精甘美異常異苑曰南康歸美山石城有橘就食任意取足脱持歸者便道遇大蛇任昉述異記曰越多橘柚園越人嵗多橘税謂之橙橘越中有王氏橘園胡氏梅山賀氏之𤓰廣五行記曰陳後主夢黃衣人圍城繞城橘樹盡伐去之及隋兵至上下通服黃衣未幾為隋滅之嶺表記異曰山橘子大者冬熟如土𤓰次者如弹丸其實金色而葉緑皮薄而味酸偏能破氣客廣之人帶枝葉藏之入膾醋尤加香美楚辭曰后皇嘉樹橘來服皇天也后土也服習也言皇天后土生美橘樹異於衆受命不遷生南國深固難從更其志兮緑葉素榮分其可喜又曰斬伐橘柚列樹苦桃司馬相如子虛賦曰橘柚芬芳又上林賦曰盧橘夏熟楊雄蜀都賦曰於西則鹽泉鐵冶橘林銅陵張衡南都賦曰遊女弄珠於漢臯之曲注曰遊女漢女也鄭大夫交甫於漢見之而贈以橘柚曹植橘賦曰播萬里而遥植列銅雀之園庭背江洲之暖氣處𤣥朔之肅清孫楚杖賦曰朱橘甘美紫梨甜脆傅元菊賦曰詩人覩王睢而咏后妃之徳屈平見朱橘而申真臣之志焉繁休伯三胡賦曰􅋕似鼬皮色象蔞橘左思蜀都賦曰家有鹽泉之井户有橘樐之園栢梁臺詩太官令曰植梨橘栗桃李梅古詩曰橘柚垂華實乃在深山側聞君好我甘竊獨自雕餙崔琦七賦曰于斯江澤寔産橘柚孟冬之月於時可食撫以玉手永用華餙王褒僮約曰南安拾栗採橘太平御覧卷九百六十六
