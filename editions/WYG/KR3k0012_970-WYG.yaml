body:
  text: 太平御覽卷九百七十宋李昉等撰果部七梅石榴㮏梅爾雅曰梅柟似杏實酢尚書說命曰若作和􅅅爾為鹽梅毛詩鵲巢摽有梅曰摽有梅男女及時也摽有梅其實七兮摽落也盛極則墮落者梅也求我庻士迨其吉兮詩義疏曰梅杏類也樹及葉皆如杏而黒煑而乾為腊置􅅅臛韲中可含以香口又谷風四月曰山有嘉卉侯栗侯梅又墓門曰墓門有梅有鴞萃止大戴禮夏小正曰正月煑梅為豆實呉歴曰孫亮出西苑方食生梅使黄門至中藏取蜜以漬蜜中有䑕屎侍中請付獄推亮曰此易知耳令破䑕屎屎裏燥亮大笑曰乆在蜜中中當濕今外濕裏燥必黄門所為黄門首服左右莫不警悚宋書曰武帝女夀陽公主每日卧於含章簷下梅花落公主額上成五出之華拂之不去皇后留之自後有梅花粧後人多效之南史曰桞惲嘗與琅瑘王瞻慱射嫌其皮闊乃摘梅帖烏珠之上發必命中觀者驚駭梁書曰任昉為新安太守郡有蜜嶺梅舊為太守所採昉以冐險多毒物故作郡時停之唐書曰蕭昉為嶺南節度使昉性公亷南海雖富珍竒月俸之外不入其門家人疾病醫工治藥湏烏梅左右於公厨取之昉知而令還之促買於市淮南子曰百梅足以為百人酸一梅不足以為百人酸喻多能齊少少不能有所成也抱朴子曰綺里丹法以鉛百斤合五石煑之皆成銀以雄黄煑之皆成黄金金太剛以猪膏煑之太柔以梅煑之山海經曰靈山其木多梅說苑曰越使執一枝梅遺梁王梁王之臣韓子顧謂左右曰惡有一枝梅遺列國之君乎論衡實知篇曰使聖人空坐獨思則不知百世後有馬生牛牛生驢桃生李李生梅也世說曰魏武帝行失道三軍皆渇帝令曰前有大梅林饒子丼酸可以觧渇士卒聞之口皆出水地理志曰南陵有梅根冶風俗通曰夏禹廟中有梅梁忽一春生枝葉又曰五月有落梅風江淮以為信風又其霖􅍂號為梅雨沾衣服皆敗黝桂陽先賢傳曰人謂蘇統後園梅樹下種藥藥可治百病呉氏本草曰梅核眀目益氣不饑東方朔别傳曰朔與門生俱行見一鳩占皆不同一生曰今日當得酒一生曰其酒必酸一生曰雖得酒不得飲也三生皆到須臾主人岀酒樽中即安於地贏而覆之訖不得酒出門問見鳩飲水故知得酒鳩飛集梅樹上故知酒酸鳩飛去所集枝折墮地折者傷覆之象故知不得飲也西京雜記曰上林有朱梅同心梅紫蔕梅燕支梅麗枝梅紫花梅侯梅周䖏風土記曰夏至之雨名為黄梅雨廣志曰蜀名梅為䕩大如雁子梅䕩皆可以為油脯黄梅以熟䕩作伍瑞休江陵記曰洪亭村下有白藉洲東南得邴洲上頭有枚廻村舊云是梅槐合生成樹是以名之音訛謂之枚廻荆州記曰陸凱與范曄相善自江南寄梅一枝詣長安與􅁮并贈詩曰折花逢馹使寄與隴頭人江南無所有聊贈一枝春神異經曰北方荒外有石湖焉方千里中有横公魚夜化為人刺之不入煑之不死以烏梅二七個煑之即死可已邪病述異記曰嘉興縣睪陶村朱休之有弟朱元元嘉二十五年十月清旦兄弟對坐家中有一犬來向休前遍視二人而笑遂揺頭歌曰言我不能歌聽我歌梅花今年故復可柰汝明年何其弟驚懼斬犬榜首路側至嵗末梅花時兄弟相忿奮㦸傷兄官收治並被囚繫經嵗得免至夏舉家疾母及兄弟皆卒任昉述異記曰邯鄲有故邯鄲宫基存焉中有趙王果園梅李至冬而花春得食嶺南異物志曰南方梅繁如北杏十二月開語林曰范王至能啖梅人嘗致一斛湏臾啖盡潘岳閒居賦曰梅杏郁李之屬左思蜀都賦曰梅杏羅生栢梁臺太官令曰柤棃橘栗李桃梅張恊七命曰燀以秋橙酢以春梅接以商王之箸承以帝辛之盃石榴廣雅曰若榴石榴也晉隆安起居注曰武陵臨沅縣安石榴子大如椀其味不酸一蔕六實宋書曰元嘉末魏太武征彭城遣使求丼蔗安石榴張暢曰石榴出自鄴下亦當非彼所乏北史曰齊安徳王延宗納趙郡李祖收女為妃後帝幸李宅宴而妃母宋氏薦二石榴帝前問諸人莫知其意帝投之問魏收曰此竟何意收曰石榴房中多子王新婚妃母欲子孫衆多帝大喜詔收卿返将來仍賜羙錦二疋唐書曰孔紹安大業末為監察御史時髙祖為隋討賊於河東詔紹安監髙祖之軍深見遇及髙祖受禪紹安自洛陽間行奔髙祖見之甚恱拜内史舍人時夏侯端亦嘗為御史監髙祖軍先紹安歸朝授秘書監紹安因侍宴應詔詠石榴詩曰祗為來朝晚開花不及春時人稱之神仙傳曰劉馮者沛人也封桑郷侯學道於樓丘子常服石桂英及中岳石榴垂四百年如十五㓜童瀬郷記曰老子祠堂北有石榴二株鄴中記曰石虎苑中有安石榴子大如椀盞其味不酸廬山記曰香爐峰頂有大盤石可坐數百人石垂生山石榴三月中作花色似石榴而小淡紅敷紫蕚輝􅁮可愛襄國記曰龍崗縣有好石榴慱物志曰張騫使西域返得安石榴廣志曰安石榴有甜酸二種陸機與弟雲書曰張騫為漢使外國十八年得塗林安石榴也李龍徳陽殿賦曰蒲桃安若曼延䝉蘢應吉甫安石榴賦曰余徃日為中書直廬上有安石榴枝葉甚荗故為之賦傳𤣥安石榴賦曰鳥㝛中而纎條結龍辰升而丹華繁其在晨也灼若旭日栖扶桑其在夕也赩若燭龍吐潜光庾儵若石榴賦曰逺而望之燠若摛繢被山阿廹而察之赫若龍輝耀緑波夏侯孝若石榴賦曰接翠蕚於緑蔕冐紅牙於丹鬚赩然含㽔璀爾散珠雪酲觧䬼怡神實氣潘岳閒居賦曰石榴蒲桃之珍磊落蔓延於其側又安石榴賦曰實有嘉木名安石榴修條外暢榮幹内樛丹輝綴於朱房緗的㸃於紅鬚煌煌煒煒熠耀委累似琉璃之栖鄧林若珊瑚之暎緑水光眀燐爛含丹耀紫味滋芳神色麗瓊蘂潘尼安石榴賦曰石榴者天下之竒樹九州之名果也是以屬文之士或叙而賦之遥而望之煥若隨珠耀重淵詳而察之灼若列㝛出雲間千房同柯十子如一繽紛磊落垂光耀質左思呉都賦曰蒲桃亂潰石榴竟裂張載重作石榴賦曰於是天廻節移龍火西夕流風晨激行露朝白紫房獨熟頳膚自拆剖之則珠散含之則氷釋充嘉味於庖龍極甜酸之滋液上薦清廟之靈下羞玉堂之客張恊安石榴賦曰乃剖乃折金房緗槅范堅安石榴賦曰紅鬚内艶頳牙外標似華燈之映翠幕若丹瓊之厠碧瑶殷元安石榴賦曰余以暇日散愁翰林覩潘張石榴二賦雖有其羙猶不盡善容復措辭故聊為書之賦曰或珠離於璇琬或玉碎於雕觴璘彬灑暎􅁮紫纓緗璀若瑶萊之攅鐘瓛粲若靈蚌之㑹珠璫徐藻妻陳氏石榴賦曰堆木之珍莫羙若榴擢鮮葩於青春結芳實於素秋王倫妻羊氏安石榴賦曰振緑葉於柔柯垂彤子之衰累張載書曰大谷石榴木滋之最膚如凝脂汁如清瀬渇者所思銘之裳帶曹植棄妻詩曰石榴植前庭緑葉揺縹青翠鳥飛来集拊翼以悲鳴糜元詩曰蒼蒼陵上栢参差列成行童童安石榴列生神道旁㮏晉書曰成帝杜皇后崩先是三呉女子相與簮白花望之如素㮏傳言天宫織女死為之着服至是而后崩三國典略曰楊愔一門四世同居家甚隆盛昆弟就學三十餘人庭有㮏樹實落千地羣兒咸争愔獨坐不顧季父暐見之謂賔客曰此兒恬裕有我家風蕭廣濟孝子傳曰王祥後母庭有㮏樹始着子使守視祥晝驅烏雀夜則驚䑕時雨忽至祥抱樹至曙母見惻然紫虗南岳夫人傳曰夫人姓魏名華性樂神仙季冬夜半有四真人並年可二十降夫人靖室因設酒饌陳𤣥雲紫㮏夫人還王屋山王子喬等並降時夫人與其人為賔主設三𤣥紫㮏𤣥晏春秋曰衞倫過子論及於時味倫因命僕取糗進子子曰麥也有杏李柰味見杏部杜恕篤論曰日給之華與柰相似也柰結實而日給零落虛偽之與真實相似也虗偽敗而真實成西京雜記曰上林苑有白㮏紫㮏花紫緑㮏花緑廣志曰柰有白赤青三種張掖有白柰酒泉有赤㮏西方例多㮏家以為脯數十百斛以為畜積如收藏棗栗若㮏汁黑其方作􅅅以為豉用也漢武故事曰上握蘭園之金精摘圓丘之紫㮏釋名曰㮏油擣㮏實也和以塗繒上􅏫而發之形似油也㮏脯切㮏曝乾之如脯也盧諶祭法曰夏祠法用白㮏秋祠法用赤㮏晉太始起居注曰太始二年六月嘉㮏一蔕十五實或七實生於酒泉王子年拾遺記曰崑崙山上有㮏冬生子碧色湏玉井之水洗方可食郭子横洞冥記曰有紫㮏大如升甜如蜜核紫花青虎丘山疏曰山下三面有春秋二㮏本草經曰柰味苦令人臆脹疾人不可多食晉宫閣名曰華林園有白柰四百株左太冲蜀都賦曰朱櫻春就素柰夏成潘安仁閒居賦曰二柰耀丹白之色潘尼東武觀賦曰飛丼𤓰於浚水投素㮏於清渠曹植求祭先王表上文帝曰乞請白㮏二十枚又謝賜㮏表曰即夕殿中虎賁宣詔賜臣等冬㮏一奩詔使温啖夜非食時而賜見及㮏以夏熟今則冬至物以非時為珍恩以絶口為厚實非臣等所冝􅂪荷詔曰此㮏乃從梁州來道里既逺東來轉暖故㮏色非如夏也張載詩曰江南郡蔗釀液豐沛三巴黄丼𤓰州素㮏凡此數品殊羙絶快渇者所思銘之裳帶太平御覽卷九百七十
