body:
  text: 太平御覽卷八百五十五宋李昉等撰飲食部十三豉虀豉説名曰䜴嗜也五味調和須之而成乃可甘嗜也故齊人謂豉聲如嗜史記曰糵麴鹽豉千荅徐廣曰或作合器名謝承後漢書曰羊續為南陽太守鹽豉共一壺袁宏漢記曰李傕數設酒請郭汜或留汜妻懼與傕婢妾私而奪己愛思有以離間之傕送饋汜妻乃以豉為藥汜將食妻曰食従外来儻或有故遂摘藥示之曰一栖不兩雄我固疑將軍之信李公也明日傕請汜大醉汜疑傕藥之絞糞汁飲之乃解於是遂相疑猜也三輔决録曰南陽舊語曰前隊大夫范仲公鹽豉蒜果共一筩言其亷儉也豫章列士𫝊曰羊茂為東郡太守出界賣鹽豉博物志曰外國有豉法以苦酒溲豆暴令極燥以麻油蒸訖復暴三過乃止然後細𢷬椒屑篩下随多少合投之中國謂之康伯以是胡人姓名𫝊此法者云下氣調和金樓子曰茄一名金鹽地榆一名玉豉惟此二物可以煮石廣志曰苦秦豉也楚辭招魂曰大苦酸鹹辛甘發些古歌曰美䜴出魯門虀周禮曰醯人掌共五虀記曰卒食客自前跪徹飯韲以授相者釋名曰蟹韲去其匡熟𢷬令如虀也通俗文曰醃韮曰虀醃薤曰􅀢東觀漢記曰王莽將敗北海逄萌載韲器於市曰辛乎因潜蔵不見魏志曰華他嘗見病咽塞者語之曰向来道隅有賣餅人蒜虀甚酸可取三升飲之如言立吐一蛇王隠晉書曰袁甫曰美莫過稻不可以為虀語林曰石崇恒冬月得韮虀王愷貨崇帳下答云是𢷬韮根雜以麥苖楚辭曰懲於羮而吹虀又曰呉酸毛蔞不沾薄毛萊也言呉人工調鹹酸也崔寔四民月令曰八月収韮菁作𢷬虀𢎞君舉食檄曰大市覆甖之蒜東里獨姥之醯大鹽雜以薑椒叛奴使之舂虀嶺表異録曰容南土風好食水牛肉言其脆美則柔毛肥彘不足比也每軍將有局筵必先此物或炮或炙盡此一牛既飽即以聖韲銷之既至即以鹽酪薑桂調而啜之腹遂不脹北客到彼多赴此筵但能食肉罔有啜虀者太平御覽卷八百五十五
  hash: sha256:4a3a78300446fd0be3b79008681770e73973d3fedbe382c7741d876d8d305c34
