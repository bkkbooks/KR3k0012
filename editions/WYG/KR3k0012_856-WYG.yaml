body:
  text: 太平御覽卷八百五十六宋李昉等撰飲食部十四茹菹瓮茹史記曰公儀休食茹而美㧞其圍葵後漢書曰孔奮為姑臧長時居縣者不盈數月輙致豐積奮在職四年財産無所増事母孝謹雖自儉約而奉養極求珎膳躬率妻子同甘菜茹沈約宋書曰文帝為王𤣥謨作四時茹古詩云堇茹供春膳粟飱充夏飡傅𤣥詩曰厨人進藿茹有酒不盈杯枚乗七發曰白露之茹菹周禮曰朝事之豆其寔韭菹昌本菁菹茒菹饋食之豆其寔葵菹加豆之實芹菹深蒲菭菹筍菹王舉則共七菹記曰麋鹿為菹野豕為軒皆聶而不切麕為辟雞􅊵為宛脾皆聶而切之切葱若薤實之醯以柔之又曰水草之菹陸産之醯小物備矣三牲之爼八簋之實美物備矣昆蟲之異草木之實隂陽之物備矣𫝊曰王使周公閲來饗有菖歜詩曰中田有廬疆埸有𤓰是剥是菹説文曰菹菜酢也毛詩義䟽曰蒲周禮以為菹謂蒲始生取其中心入地蒻大如指白生噉之甘脆又煮以苦酒受之加食筍法大美今呉人以為菹廣雅曰韲墜醸䔯菹也蒼頡解詁曰䔯酢菹也釋名曰菹阻也生醸之遂使阻於寒温之間不得爛也呂氏春秋曰文王好菹孔子聞之䠞頞而食之三年然後食之賈誼新書曰楚恵王食寒菹而得蛭因遂吞之腹有疾而不能食之令尹入問曰王安得此疾王曰我因食寒菹而得蛭念譴之而不行其罪是法廢而威不立非所以使國間也譴而行其誅也則庖宰監者皆當死心又弗忍也故吾恐蛭之見也因遂吞之令尹避席再拜而賀曰臣聞天道無親惟徳是輔王有仁徳天之所奉也是夕也恵王寢後而蛭出其夕病心腹之積皆愈晉書曰吳隠之年十餘歳丁父母憂食鹽菹以其味甘掇而棄之盧諶祭法曰秋祠有菹消范汪祠制曰孟冬不鹹菹瓮釋名曰生􅀈葱薤曰瓮言柔滑瓮瓮然也太平御覽卷八百五十六
