body:
  text: 太平御覽卷八十一宋李昉等撰皇王部六帝舜有虞氏帝舜有虞氏史記曰虞舜名重華冀州人也作什器於夀丘就時於負夏舜父頑母嚚弟象傲皆欲殺不可得即求常在側舜耕厯山厯山之人皆讓畔漁雷澤雷澤之人皆讓居陶河濵河濵器不苦窳堯乃賜舜絺衣與琴為築倉廪予牛羊舜舉八愷使主后土以揆百事舉八元使布五教于四方臯陶為大理平民各伏得其實伯夷主禮上下咸讓垂主工師百工致功益主虞山澤辟棄主稷百榖時茂契主司徒百姓親和龍主賔客逺人至四海咸戴帝舜之功於是禹乃興九韶之樂鳯凰來翔舜年五十攝行天子事年五十八而堯崩年六十一代堯踐帝位即位三十九年南廵狩崩于蒼梧之野葬於南江九嶷帝王世紀曰舜姚姓也其先出自顓頊顓頊生窮蟬窮蟬有子曰敬康生勾芒勾芒有子曰橋牛橋牛生瞽瞍妻曰握登見大虹意感而生舜於姚墟故姓姚名重華字都君龍顔大口黑色身長六尺一寸有聖徳始遷於負夏販於頓丘債於傅虚家本冀州每徙則百姓歸之其母早死瞽瞍更娶生象傲而父頑母嚚咸欲殺舜舜能和諧大杖則避小杖則受年二十始以孝聞堯以二女娥皇女英妻之見舜於貳宫設饗禮送為賔主南面而問政為司徒太尉試以五典有大功二十夢眉長與髮等堯乃賜舜以昭華之玉老而命舜代已攝政明年正月上日始受終于文祖太尉行事堯崩三年喪畢以仲冬甲子月次于畢始即真以土承火色尚黄乃詢四岳闢四門明四目達四聰東巡狩登南山觀河洛受圖書褒賜羣臣尊任伯禹稷契臯陶伯益時有苖氏負固不服禹請征之舜曰我徳不厚行武非道也吾其敷吾德也乃修教三年執干戚而舞之有苖請服立誹謗之木申命九官十二牧及殳斨朱虎熊羆等二十五人三載一考績黜陟幽明於是俊乂在官羣后徳讓百僚師師以五采章施于五色為服以六律五聲八音協治用之和洽烝民乃粒萬邦作乂庶績咸熈乃作大韶之樂簫韶九成鳯凰來儀擊石拊石百獸率舞故孔子稱韶盡美矣又盡善也景星曜於房羣瑞畢臻德被天下初舜既踐帝位而父瞽瞍尚存戴天子車服而朝焉天下大之故曰大舜都於咸陽或營蒲坂嬀汭嬪于虞故因號有虞氏二妃元妃娥皇無子次妃女英生商均次妃登北氏生二女霄明燭光有庶子八人皆不肖故以天下禪禹舜年八十即眞八十三而薦禹九十五而使禹攝政攝五年有苗氏叛南征崩于鳴條年百嵗殯以瓦棺葬於蒼梧九嶷山之陽是爲零陵謂之紀市在今營道縣下有羣象爲之耕洛書靈准聽曰有人方面日衡重華握石椎懷神珠椎讀曰錘錘平輕重也握謂知玉衡之道懷神珠喻有聖性也璿璣玉衡以齊七政厯象日月星辰正月上日舜受終鳯凰儀黄龍感朱草生蓂莢孶西王母授益地圖西王母得益地之圖來獻尚書舜典曰慎徽五典五典克從納于百揆百揆時敘賔于四門四門穆穆納于大麓烈風雷雨弗迷帝曰格爾舜詢事考言乃言底可績三載汝陟帝位尚書帝命驗曰虞舜聖在側陋光耀顯都握石椎懷神珠椎讀曰錘神珠喻聖性尚書中候考河命曰帝舜曰朕惟不乂蓂莢浮著獸舞鳯晨蓂莢浮著萌芽百獸率舞鳯凰司晨也又曰若稽古帝舜曰重華欽翼皇象翼奉也象厯也舜敬奉皇天之厯數也又曰舜至于下稷榮光休至稷讀曰側下之側曰西之時休美也榮光氣也黃龍負卷舒圖出水壇畔赤文緑錯錯分也文而以緑色分其間尚書大傳曰舜不登而髙不行而逺又虞夏傳曰維元祀巡狩四嶽八伯堯始得羲和令為六卿主春夏秋冬并掌方嶽之事是為四嶽出則為伯後乃分置八伯壇四奥沈四海祭水曰沈封十有二山肇十有二州濬川韓詩外傳曰昔舜甑盆無膻而功不以巧獲罪詩含神霧曰握登見大虹意感生帝舜大戴禮曰宰我曰請問帝舜孔子曰橋牛之孫瞽瞍之子也曰重華好學孝友聞於四方陶稼事親寛裕温良教而知時畏天而愛民恤逺而親親世以孝聞于天下三十在位嗣帝位三十九年乃死葬于蒼梧之野禮記曰舜作五絃之琴以歌南風之詩又曰舜其大孝也與德為聖人尊為天子富有四海之内宗廟饗之子孫保之又曰舜其大智也與舜好問而好察邇言隠惡而揚善執其兩端用其中于民其斯以為舜乎邇近也近言而善易以進人察而行之也兩端過與不及也用其中于民賢與不肖皆能行之也斯此也其德如此乃號為舜而克成其志也又曰子曰後世雖有作者虞帝弗可及也矣君天下生無私死不厚其子子民如父母有惻怛之愛有忠利之教禮含文嘉曰舜損己以安百姓樂動聲儀曰孔子曰簫韶者舜之遺音也温潤以和似南風之至其為音如寒暑風雨之動物如物之動人雷動禽獸風雨動魚龍二儀動君子財色動小人言樂之動人也深故舉見事以為喻是以聖人務其本春秋演孔圖曰舜目四瞳謂之重明承乾踵堯海内富庶瞳瞳子也踵猶履也履其所行也春秋運斗樞曰舜以太尉受號即位為天子五年二月東巡狩至于中月與三公諸侯臨觀太尉公官名唐虞五載一巡狩中月月半也臨觀為舟以泛于河中也黄龍五彩負圖出置舜前圖以黄玉為匣如櫝長三尺廣八寸厚一寸四合而連有户此含樞紐之命故龍匣黄也四合百橨道相合也有户言可開闔也白玉檢黄金繩之為泥封兩端章曰天黄帝符璽五字廣袤各三寸深四分鳥文文字也四或為三舜與大司空禹臨侯望博等三十人集發大司空公官名臨侯國氏望博名圖𤣥色而綈狀可舒卷長三尺二寸廣九寸而如也三或為五中有七十二帝地行之制天文官位度之差孝經援神契曰舜龍顔重瞳大口手握襃龍顔取象車故有此骨表也重瞳取象雷多精光也大口以象斗星又為天作喉舌握襃手中褎字喻從勞苦起受襃飭致大位也論語曰舜有臣五人而天下治五人者禹稷契臯陶伯益又曰無為而治者其舜也與夫何為哉恭己正南面而已矣論語撰考䜟曰堯舜昇登首山觀河渚有五老遊於河渚相謂曰河圖將來告帝期五老流星上昴有頃赤龍負玉苞舒圖出堯與大舜等共發曰帝當樞百則禪虞百年而禪于舜堯喟然歎曰咨爾舜天之厯數在爾躬孔叢子曰舜身六尺有竒面頷無毛亦聖也韓子曰厯山農者侵畔舜往耕期年而耕者讓畔河濵漁者争坻舜往漁期年而漁者讓長東夷之陶者苦窳舜往陶期年而器以牢墨子曰堯舉舜於服澤之陽孟子曰鷄鳴而起孳孳為善者舜之徒也鷄鳴而起孳孳為利者蹠之徒也又曰帝使其子九男事之二女女焉百官牛羊倉廪備以養舜於畎畝之中後舉而加諸上位又曰舜生於諸馮遷於負夏卒於鳴條東夷之人也諸馮負夏鳴條皆地名也負夏在東夷之地故曰東夷之人也又曰舜之飯糗茹草也若將終身焉及其為天子也被袗衣鼔琴二女果若固有之袗衣畫繪者也此言舜窮居之時若將終身及其為萬乘之主被服繪繡若固常自所有也分定使之然也又曰舜之居深山之中與木石居與鹿豕遊其所以異於深山之野人者幾希又曰舜流共工于幽州放驩兠于崇山殺三苗于三危殛鯀于羽山四罪而天下咸服又曰大舜有大焉善與人同舎己從人樂取於人以為善自耕稼陶漁以至為帝無非取於人者取諸人以為善是與人為善者也故君子莫大乎與人為善又曰天下大悅而將歸己視天下悅而歸己猶草芥也唯舜為然舜不以天下歸己為樂號泣于田也不得乎親不可以為人不順乎親不可以為子舜盡事親之道而瞽瞍底豫瞽瞍底豫而天下化瞽瞍底豫而天下之為父子者定此之謂大孝又曰堯崩三年之喪畢舜避堯之子於南河之南天下諸侯朝覲者不之堯之子而之舜訟獄者不之堯之子而之舜謳歌者不謳歌堯之子而謳歌舜故曰天也夫然後之中國踐天子位焉莊子曰羊肉不慕蟻蟻慕羊肉羊肉羶也舜有羶行百姓悅之故三徙成都至鄧之墟十萬家堯聞舜之賢舉之童土之地童土不生草之地曰冀得其來之澤舜來施恩澤也又曰舜讓天下於善卷善卷曰余立於宇宙之中冬日衣皮毛夏日衣葛絺春耕種足以勞動秋收斂足以休食日出而作日入而息逍遥於天地之間而心意自得吾何以天下為哉悲夫子之不知余也遂不受於是去而入深山莫知其處又曰舜以天下讓其友北人無擇北人無擇曰異哉后之為人也居於畎畝之中而遊堯之門已若是而已又欲以辱行漫我吾羞見之自投清冷之淵尸子曰舜兼愛百姓務利天下其田厯山也荷彼耒耜耕彼南畝與四海俱有其利其漁雷澤也旱則為耕者鑿瀆儉則為獵者表虎故有光若日月天下歸之若父母又曰舜南面而治天下天下太平燭於玉燭息於永風食於膏火飲於醴泉舜之行其猶河海乎千仭之溪亦滿焉由此觀之禹湯之功不足言也又曰堯問於舜曰何事曰事天何任曰任地何務曰務人又曰舜一徙成邑再徙成都三徙成國其致四方之士堯聞其賢徴之草茅之中與之語政至簡而易行與之語道廣大而不窮於是妻之以媓媵之以娥九子事之而託天下焉又曰舜云從道必吉反道必凶如影如響又曰舜事親養老為天下法其遊也得六人曰雒陶方回續牙伯陽東不識秦不空皆一國之賢者也又曰昔者舜兩眸子是謂重明作事成法出言成章又曰舜舉三后而四死除何為飢渴寒暍勤勞鬭爭又曰有虞之君天下也使天下貢善商周之君天下也使天下貢財公孫𢎞曰舜牧羊於黄河遇堯舉為天子陸賈新語曰舜藏黄金於嶄巖之山捐珠玉於五湖之淵以塞淫邪之欲淮南子曰舜之時共工振滔鴻水滔漫也共工炎帝之後隨髙堙下壅百川以為民害以薄空桑空桑地名在魯龍門未開吕梁未發江淮通流四海涬溟民皆上丘陵赴樹木舜乃使禹疏三江五湖决伊闕導瀍澗通溝洫注之東海鴻水漏九州乾萬民皆寧又曰昔者舜耕于厯山厯山在濟陽城南期年而田者爭處磽确以封畔肥饒相讓也釣於河濵期年而漁者争處湍瀬湍疾瀬淺以曲隈深澗相與也又曰舜作室築牆茨屋辟地令民皆去巖穴各有室家南征三苗道死蒼梧列子曰舜嘗駕五龍以騰康衢武嘗服九駮以馳文塗此上御也徐氏中論曰小人恥其面不如子都君子恥其行不如舜禹杜夷幽求曰以舜禹之登庸孔氏之窮屈不似鼓鼈之與晨驥乎符子曰舜禪夏禹於洞庭之野吕氏春秋曰舜有九男不予其子而授禹至公也風土記曰舜東夷之人生於桃丘媯水之汭損石之東舊說言舜上虞人也虞即會稽縣距餘姚七十里始寧上虞南鄉也後為縣桃丘即姚丘方相近也今吳北亭虞濵在小江裏縣復五十里對小江北岸臨江山有立石所謂損石者也斜角西南指俗呼為蒍公轉髙石也太平御覽卷八十一
