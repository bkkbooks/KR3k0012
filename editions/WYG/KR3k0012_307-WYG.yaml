body:
  text: 太平御覽卷三百七宋李昉等撰兵部三十八㑹兵麾兵犒師㑹兵書曰戊午師逾孟津陳于商郊俟天休命甲子昧爽受率其旅若林㑹于牧野旅衆也若林言盛多㑹逆拒戰罔有敵于我師前徒倒戈一戎衣而天下大定言與衆同心則有成也榖梁曰齊侯兵車之㑹四未嘗有大戰愛民也後漢書曰初卷人維汜卷縣名屬河南郡故城在今鄭州原武縣西北妖言稱神有弟子數百坐伏誅後其弟子李廣等宣言汜神化不死以誑惑百姓十七年遂共聚㑹徒黨攻没晥城晥縣名屬廬江郡今舒州懐寧縣殺晥侯劉閔自稱南嶽大師遣謁者張宗將兵數千人討之復為廣所敗於是使馬援發諸郡兵合萬餘人擊破廣等斬之又曰章和二年護羗校尉張紆誘誅燒當種羗迷吾等由是諸羗大怒謀欲報怨朝廷憂之公卿舉鄧訓代紆為校尉諸羗激忿遂相與解仇結婚交質盟詛大事曰盟小事曰詛衆四萬餘人期外合渡河攻訓又曰吳漢為安樂令㑹王郎起北州擾惑漢素聞光武長者獨欲歸心乃說太守彭寵曰漁陽上谷突騎天下所聞也君何不合二郡精銳兵附劉公擊邯鄲此一時之功也一時言不可再遇也寵以為然又曰朱鮪聞光武北征而河内孤使討難將軍蘇茂副將賈彊率兵三萬餘人渡鞏河攻温鞏温並今洛川縣臨黄河故曰鞏河檄書至冦恂即勒軍馳出並移告屬縣發兵㑹於温下軍吏皆諫曰今洛陽兵渡河前後不絶宜待衆軍畢集乃可出也恂曰温郡之藩蔽失温則郡不可守遂馳赴之旦日合戰偏將軍馮異遣救及諸縣兵適至及士馬四集旌旗蔽野恂乃令士卒乘城鼓噪大呼言曰劉公兵到蘇茂軍聞之陣動恂因奔擊大破之又曰吳漢悉發幽州兵與光武㑹清陽諸將望見漢還士馬甚盛皆曰是寧肯分兵與人耶及漢至幕府上兵簿幕大也兵簿軍之士名賬諸將人人多請之光武曰屬者恐不與人屬近也今所請又何多也諸將皆慙晉書天文志曰征吳之役三河徐兖之兵悉出交戰於吳楚之地唐書曰憲宗時鄆州李師道翻覆違命詔宣武義成武寜横海四節度之師與田𢎞正㑹軍討之𢎞正奏請取黎陽渡河㑹李光顔等軍齊進帝召宰臣於延英殿議可否皆曰閫外之事大將制之既有奏陳宜遂其請裴度獨以為不可奏曰魏博一軍不同諸道而過河之後却退不得須更進擊亦見成功若取黎陽渡河即纔離水界便至滑出徒有供餉之勞又生顧望之勢况𢎞正光顔並少威斷更相疑惑恐或至遷延然兵事不從中制一定處分或慮不可若欲於河南持重則不如河北養威不然即且秣馬厲兵候霜降後於楊劉渡河直抵鄆但得至陽谷已來卜營則兵勢自盛形自不撓上曰卿言是矣乃詔𢎞正取陽劉渡河及𢎞正軍既濟河而南距鄆州四十里築壘賊勢果蹙頃之誅師道三國典略曰周武帝率六軍趣鄴齊主令羣臣議之廣寜王孝珩議曰今大冦既深事藉機便請使城王便領騎州道兵自土門入聲取并州獨孤永業便領洛州兵自潼關入聲取長安臣請領京畿兵出溢口鼓行逆戰賊軍逺來日増疲老聞南北有兵自然應退誓衆書曰帝曰咨禹惟時有苖弗率汝徂征三苗之民數干王命率循也徂往也不循帝道帝舜乃命禹討之禹乃㑹羣后􅊎于師曰濟濟有衆咸聽朕命㑹諸侯伐有苖也軍旅曰􅊎濟濟衆盛之貌蠢兹有苖昏迷不恭蠢動昏蔽也言其所以討侮慢自賢反道敗徳狎侮先王輕慢典誥反正道敗徳義君子在野小人在位廢仁賢任奸佞民棄不保天降之咎言民叛天災之肆予以爾衆士奉辭伐罪肆故也辭謂帝命罪謂侮慢以下事爾尚一乃心力其克有勲三旬苖民逆命益賛于禹曰惟徳動天無逺弗届禹拜昌言班師振旅帝乃誕敷文徳舞干羽於兩階七旬有苖格又曰啓與有扈戰于甘之野王曰六事之人予􅊎告汝有扈氏威侮五行怠棄三政天用𠞰絶其命用命賞于祖不用命戮于社予則孥戮汝又曰羲和湎廢時亂日往征之告于衆曰羲和尸厥官昏迷于天象以干先王之誅今予奉將天罰火炎崑岡玉石俱焚天吏逸徳烈于猛火殱厥渠魁脅從罔治嗚呼威克厥愛允濟愛克厥威允罔功爾衆士懋戒哉欽承天子威命又曰魯侯伯禽宅曲阜徐夷並興東郊不開作費誓公曰嗟人無譁聴命善糓乃甲胄敿乃干無敢不弔備乃弓矢鍛乃戈矛礪乃鋒刃無敢不善峙乃糗糧無敢不逮汝則有大刑魯人三郊三遂峙乃楨榦甲戌我惟築無敢不供汝則有無餘刑又曰惟戊午王次于河朔次止也戊午渡河而􅊎既􅊎而止于河之北羣后以師畢㑹諸侯盡㑹止也王乃徇師而􅊎曰嗚呼西土有衆咸聽朕言徇循也周在西故稱西土也今商王受力行無度行無法度播棄黎老昵比罪人鮐背之人稱黎老棄不禮敬也昵近也罪人謂天下逋逃小人也予有亂臣十人同心同徳言我治亂之臣雖少而心徳同也雖有周親不如仁人周至也紂至親雖多不若周家之多仁人也又曰武王伐紂曰今予發惟恭行天之罰今日之事不愆于六歩七歩乃止齊焉夫子朂哉不愆于四伐五伐六伐七伐乃止齊焉朂哉夫子尚桓桓如虎如貔如熊如羆于商郊弗迓克奔以役西土朂哉夫子爾所弗朂其于爾躬有戮又曰爾衆士同力王室史記曰太尉行令軍中為吕氏右袒為劉氏左袒軍中皆左袒後漢書曰齊武王伯升既破甄阜軍乃陳兵􅊎衆焚積聚破釡甑鼓行而前晉書曰元帝以祖逖為奮威將軍豫州刺史給千人廩布三千疋不給鎧仗使自招募仍將本流徒部曲百餘家渡江中流擊檝而誓曰祖逖不能清中原而復濟者有如大江辭色壯烈衆皆慨嘆屯于淮隂起冶鑄兵噐得二千餘人而後進又載記曰王猛與慕容評戰陳於渭源而􅊎衆曰王景畧受國厚恩任兼内外今與諸軍深入賊地宜各勉進不可退也願戮力行間以報恩顧受爵明君之朝慶觴父母之室不亦美乎衆皆勇奮破釡棄粮大呼競進後周書曰太祖率李弱獨孤信等十二將東伐至潼關太祖乃誓於師曰與爾有衆奉天威誅暴亂惟爾衆士整爾甲兵戒爾戎事無貪財以輕敵無暴民以作威用命則有賞不用命則有戮爾衆士其勉之遣子讌居軍前徇地唐書曰髙祖起義兵西圗關中精甲三萬髙祖仗白旗誓衆於太原之野引師即路又曰太宗征王世充陳兵榖水之上歩騎五萬太宗舉旄誓衆曰隋室無道毒被蒼生我國家受命于天寧濟億兆世充敢抗大邦數行侵暴誅殺良善恣其淫酷國家為百姓除害事不獲已各宜整爾軍旅修爾噐械立勲自効躬行天罰敢有犯命者斬無赦又曰朱泚亂韋臯於隴州築壇於庭血牲與將士等盟曰上天不弔國家多難逆臣乘間盗據皇宫而李楚琳亦扇兇徒傾陷城邑酷虐所加咸被其毒既不事上安能恤下皋是用激心憤氣不遑底寜􅊎羣公竭誠王室凡我同盟一心竭力伏願除兇祖先之靈必當幽賛言誠則志合義感則心齊粉骨塵軀决無所顧有渝此志明神殛之迨于子孫亦罔遺育皇天后土當兆斯言又通使於吐蕃以助古司馬兵法曰古者逐奔不逺縱綏不及所以示君子且有禮不逺則難誘不及則難陷以禮為固以仁為勝既勝之後其教可復是故君子貴之也有虞氏戒於國中欲人體其命也舜以農隙教民以戰畋獵簡練故民安之也夏后氏誓於軍中欲民先成其慮也禹㑹軍聚衆復教以進退左右前後離合周旋之度殷􅊎于軍門之外欲民先意待事也殷既尊虞夏之教民又作於軍門外復簡試周將交刃而􅊎之以致意也周承三代之教民既已知兵又復聲望􅊎之軍徳薄民俗巧也又曰賢王制禮樂法度乃作五刑與甲兵以討不義巡狩省方㑹諸侯考不同其有失命亂常背徳逆天之時而危有功之君王者以有功徳者為君長賊臣欲簒殺之徧告於諸侯章明於有罪乃告于皇天上帝日月星辰以禱于后土四海之神山川冡社冡社者天子大社也乃造于先王然後冡宰徴師于諸侯造就也就造于先祖廟也曰某國為不道征之以某月日師至于某國至于所征之國與天子㑹天子正刑刑者天子之法也刑以征不義伐不從王者之法也冡宰與伯布命于軍曰入罪人之地無殃民無獵田無有虐無毁土功無糞牆屋無伐樹木無取六畜無取禾粟無取噐械見其老幼奉歸勿傷雖遇壯者不校勿敵若傷人醫藥歸之既誅有罪王及諸侯正其國舉賢更立明主復職王者與四方諸侯伐無道之國整頓其民人舉賢良更立為君奉尊王法復百官之職事矣論衡曰師尚父為周司馬率師伐紂到孟津之上仗鉞把旄號其衆曰蒼兕蒼兕水中之獸也善覆人船因神以化欲令急渡汝不急渡蒼兕害汝河中有此怪獸時時出浮一身九頭人畏惡之未必非覆人船者也文選曰勒三軍􅊎將帥元戎竟野戈鋋彗雲麾兵莊子曰市南宜僚弄丸兩家之難解孫叔敖甘寢秉羽而郢人投兵晉書曰張重華攻石季龍遣謝艾為使持節軍師將軍率歩騎三萬進軍臨河麻秋以三萬衆拒之艾乘軺車冠白幍鳴鼔而行秋望而怒曰艾年少書生冠服如此輕我也合黒矟龍驂三千人馳擊之艾左右大擾左戰帥李偉勸艾乘馬艾不從乃下車踞胡牀指麾處分賊以為伏兵發也懼不敢進張瑁從左南縁河而絶其後秋軍乃退艾乘奔擊遂大敗之又曰陳敏一旦據有之刑政無常不為英俊所服且子弟兇暴所在為患周玘顧榮之徒常懼禍敗遣使宻報征東將軍劉凖遣兵臨江已為應及兵至敏使弟昶及將錢廣次烏江以拒之錢廣玘鄉人也潛使圗昶廣遣其屬何康投募白事扵昶昶傾視書康揮刀斬之稱州下已殺敏動者誅三族吹角為内應廣先勒兵在朱雀橋陳兵敏師萬人將戰未濟榮以白羽扇麾之敏衆潰散單騎東奔為義師所斬梁書曰魏中山王元英冦北徐州髙祖詔韋叡率衆㑹焉英自率衆來戰叡乘素木輿執白角如意以麾軍一日數合英甚憚其强劉璠梁典曰韋叡字大懐京兆杜陵人也叡雖有曠世之度涖民以惠愛為本所居必治將兵仁愛被服必於儒者雖臨陣交鋒常緩服乘輿執竹如意以麾進止北史曰唐永身長八尺少耿介有將帥才嘗讀班超傳慨然有萬里之志正光中為北地太守永善取下士人競為之用臨陣常著白裙襦把角如意以指麾處分辭色自若在北地四年與賊數十戰未嘗敗北時人語曰莫陸梁恐爾逢唐將永所營之處至今猶稱唐公壘後魏書曰毛法仁言聲壯大至於軍旅田狩唱呼處分震於山谷後周書曰李逺字萬嵗幼有噐局志度恢然嘗與羣兒為戰鬭之戲指麾部分便有軍陣之法郡守見而異之召使更戲羣兒懼而散走逺持杖比之復為向勢意氣雄壯殆甚於前郡守曰此小兒必為將帥非常人也又曰建徳中東伐齊帝引兵發京師壬寅渡河與諸軍合十二月戊申次於晉州恐王師卒至於城南穿塹自喬山屬於汾水庚戌帝諸軍八萬人置陳東西二十餘里帝乘常御馬從數人巡陣處分所至輙呼主帥姓名以慰勉之將士感見知之恩各自思勵隋書曰李子雄從幸江都帝以仗衛不整顧子雄歩伍之容子雄立指麾六軍肅然帝大恱曰公真武侯才也尋轉右武侯大將軍唐書曰徳宗時鄭權為涇原節度使劉昌從事昌病亟請入覲度軍中必有變以權寛厚善容衆俾主留務既而兵果為亂權挺身扵白刃中抗詞以明逆順因殺其首亂者數人士皆戢伏又曰昭宗時玉山都頭楊守信楊復恭稱兵闕下陣于通化門上陳兵於延喜門是夜令劉崇望守度支軍明日曉入含光門未開門内禁軍列于左右俟門開即刼掠兩市及聞傳呼宰相來門方啓崇望駐馬慰諭之曰今聖上在街東親總戎事公等禁軍何不樓前殺賊立取功名切不可剽掠街市圗小利以成惡名也將士唯唯從崇望至長樂門守信見兵來即遁軍士呼萬嵗是日庫市獲全軍人不亂係崇望之方略也五代周史曰世宗至泗州太祖皇帝乘勝麾軍焚郭門奪月城帝親冒矢石以攻其壘丙午日南至從臣拜賀於城之上語林曰諸葛武侯與司馬宣王在渭濱將戰宣王戎服涖事使人視武侯素輿葛巾持白毛扇指麾三軍皆隨其進止宣王聞而歎曰可謂名士饗士左傳曰宋華元將戰殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗君子謂羊斟非人也以其私憾敗國殄民刑孰大焉史記曰樂毅并護趙楚韓魏燕之兵以伐齊破之濟西諸侯罷歸而燕軍樂毅獨追至于臨淄齊湣王之敗濟而亡走保於莒樂毅獨畱徇齊皆城守樂毅攻入臨淄盡取齊寳財物噐輸之燕昭王大恱親至濟上勞軍行賞饗士封毅於昌國號為昌國君東觀漢記曰上大發關東兵自將上隴隗囂衆潰走圍解於是置酒髙會勞賜諸將來歙班坐絶席在諸將之右賜歙縑千疋後漢書曰吳漢圍蘇茂於廣樂劉永將周建别招聚收集得十餘萬人救廣樂漢將輕騎迎與之戰不利墮馬傷膝還營建等遂連兵入城諸將謂漢曰大敵在前而公傷卧衆心懼矣漢乃勃然裹瘡而起椎牛饗士令軍合戰破之又曰劉盆子既降帝令縣厨賜食衆積困餒十萬餘人皆得飽飫又曰鄧禹至長安軍昆明池大享士卒率諸將齋戒擇吉日修禮謁祠髙廟收十一帝神主遣使來詣洛陽因循行園林為置吏士奉守焉後周書曰若于惠於諸將最少早喪父事母以孝聞太祖嘗造射堂新成與諸將宴射恵竊歎曰親老矣何時辦此乎太祖聞之即日徙堂於惠宅其見重如此淮南子曰員中規方中矩動成戰止成文可以諭衆而不可以陳軍滌杯而食洗爵而飲盥而後饋可以養少而不可以享衆黄石公記曰動為事機舒之彌四海卷之不盈懐柔而能剛則其國彌光弱而能强則其國彌章一簞之醪投之於河令士衆迎飲三軍為其死戰如風發攻如河決軍無財士不來軍無賞士不往香餌之下必有懸魚重賞之下必有死夫犒師左傳曰夏齊師伐我北鄙公使展喜犒師使受命于展禽齊侯未入境展喜從之曰寡君聞君親舉玉趾將辱於敝邑使下臣犒執事又曰三十三年秦師過北門及滑鄭商人弦髙將市於周遇之以乘韋先牛十二犒師商行賈也乘四韋也先韋乃及牛也古者將獻饋於人者必先之曰寡君聞吾子將歩於敝邑敢犒從者不腆敝邑為從者之淹居則具一日之積腆厚也奄乆也積芻米菜薪也行則備一夕之衛又曰楚子以驛至于羅汭驛𫝊也羅水名吳子使其弟蹶由犒師楚人執之將以釁鼓王使問焉曰汝卜來􅁻乎對曰􅁻且吳社稷是卜豈直為一人使臣獲釁鼓而敝邑知備以禦不虞其為􅁻孰大焉乃弗殺後漢書曰岑彭長驅入江關令軍中無得擄掠所過百姓皆奉牛酒迎勞彭見諸耆老為言大漢哀愍巴蜀乆見虜役故興師遂伐以討有罪為人除害讓不受其牛酒百姓皆大喜恱争開門降晉書曰桓温進兵至霸上耆老牛酒迎温曰不圗今日復見官軍後梁畧曰大寳元年西魏將楊忠來逼荆鎮上懼其至送遣犒軍既而與忠結盟并送質子與魏相約為兄弟之親於是聘使往還相望道路後魏書曰鄧穎從世祖幸漢南髙車莫弗庫若於率騎數萬驅鹿百餘萬詣行在所詔穎為文銘于漢南以昭功徳淮南子曰秦繆公使孟明舉兵襲鄭鄭賈人弦髙蹇他他弦髙黨人相與謀曰師行數千里又數過諸侯之地其勢必襲鄭凡襲國者以為無備也以知其情必不敢進乃矯鄭伯之命以十二牛為勞三帥相與謀三帥秦將白乙孟明西乞曰守備必固進必無功乃還師而反晉先軫舉兵擊之先軫晉大夫也大破之鄭伯乃以存國之賞賞弦髙髙辭太平御覽卷三百七
