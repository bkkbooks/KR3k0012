body:
  text: 太平御覽卷九百八十四宋李昉等撰藥部一藥歸藏經曰昔嫦娥盗不死之藥奔月易曰旡妄之疾勿藥有喜象曰旡妄之藥不可試也書曰若藥弗瞑眩厥疾弗瘳周禮曰醫師掌聚毒藥以供醫事疾醫以五藥養病凡藥以酸養骨以辛養筋以鹹養脉以苦養氣以甘養肉以滑養竅鄭𤣥注曰毒藥之辛苦者也五藥草木䖝石榖禮記曰君有疾飲藥臣先嘗之親有疾飲藥子先嘗之醫不三世不服其藥又曰季春餧獸之藥無出九門鳥獸方乳傷之為逆天時天子九門者路門應門雉門庫門臯門城門近郊門逺郊門關門孟夏之月聚畜百藥左傳曰季孫之愛我也疾疹也孟孫之惡我也藥石也常志相違戾猶藥石之療疾也美疢不如藥石孟孫死吾亡無日矣又曰許悼公疾太子止飲之藥卒太子奔晉書曰弑其君君子曰盡心力以事君舍藥物可也藥物有毒當由醫非凡人所知許止不舍藥物所以加弑君之罪也論語曰康子饋藥拜而受之曰丘未逹不敢嘗史記曰長桑君與扁鵲藥服之三十日見人五藏漢書曰灌夫擊吳身中大創十餘適有萬金良藥故得不死又曰王嘉為丞相數上封事言不宜封董賢上怒有詔假謁者節召丞相詣廷尉詔獄使者既到府掾吏涕泣共和藥進嘉嘉引藥杯以擊地謂官屬曰丞相幸得備位三公奉職有罪當伏刑都市以示萬衆丞相豈兒女耶何謂咀藥而死東觀漢記曰上嘗與朱祐共買蜜合藥上追念之即賜祐白蜜一石問如何長安時共買蜜乎又曰鄧訓為䕶烏桓校尉吏士嘗大病瘧轉易至數十人訓身煑湯藥咸得平愈其無妻者為適配偶又曰王閑者王莽叔父平河侯譚之子王莽簒位濳忌閑乃出為東郡太守閑懼誅常繫藥手内莽敗漢兵起閑獨完全華嶠後漢書曰張楷字公超家貧無以為業常乗驢車至縣賣藥九州春秋曰清州刺史焦和多為䧟水丸沉河湟宼不得渡吳書曰合肥之役凌統身被六七創有卓氏良藥故不得死魏志曰太祖性嚴掾屬公事往往杖之何䕫常畜毒藥誓死無辱是以終身不見及晉書曰餘杭隠士郭文字文舉王導聞其名遣人召之永昌中大疫文病亦殆導遺之藥文曰命在天不在藥也王隠晉書曰李涓為尚書令家至貧兒病無錢買藥上賜錢千萬李涓一作李風又曰程咸字延休其母夢白頭公授藥曰服此當得貴子後生咸至侍中又曰符生常使太醫令程延合安胎藥問人參好惡并藥分多少延曰雖小小不具自可堪用生以為譏已遂斬之又曰陸抗與羊祐推札僑之好抗嘗遺酒祐飲之不疑抗有疾祐饋之藥抗亦推心服之南史曰髙祖㣲時伐荻新洲見大蛇長數丈射傷之明日洲中聞臼杵聲往視之見童子數人皆青衣于樁中擣藥問其故曰我王為劉寄奴所射合藥傅之帝曰神何不殺之童子曰寄奴王者不死不可殺帝叱之皆散乃收藥而反又客經下邳逆旅㑹一沙門謂帝曰江表將亂能安之者其在君乎帝先患手瘡經年不愈沙門有黄藥因留與帝既而忽亡帝以黄散傅瘡一傅而愈寶其餘及所得童子藥毎遇生瘡傅之並愈南史曰南郡王子隆年二十一而體過充壯常使徐嗣伯合蘆茄丸服以自銷損又曰豫章王嶷薨後見形于沈文季曰吾未應死皇太子加膏中十一種藥使我癰不瘥湯中復加藥一種使我利不㫁吾已訴之先帝先帝許還東邸當判此事因胷中出青紙文書示文季曰與卿少舊因卿呈主上俄失所在文季秘而不傳甚懼此事少時太子薨矣魏書曰邢巒為侍郎甚見親遇高祖因幸藥園至司空府南見巒宅遣使謂巒曰期行藥園至此見卿第宅乃佳東望德館情有依然又曰天竺烏長國婆羅門為上族解天文人有爭訟服之藥曲者發狂直者無恙隋書曰隋大舉伐陳王頒力戰被傷恐不堪復鬭悲感嗚咽夜中睡夢有人授藥比寤而瘡不痛時人以為忠感又曰楊素寝疾帝毎令醫診候賜以上藥然密問醫人恒恐不死素又自知名位已極不肯服藥亦不将愼毎語弟約曰我豈須臾活耶唐書曰太宗幸襄城宮登于邏坂見暍者僵於路駐馬命左右取藥飲之乃蘇又曰天竺方士那邏邇婆娑寐自言夀二百嵗云有長生之術太宗信之深加禮敬館之金颷門内造延年之藥令崔敦禮監之發使天下採諸竒藥異石不可稱數後竟不就又曰元和中山人柳泌言靈藥可得上信之乃以為台州刺史賜紫令採靈藥又曰柳公綽有道士獻藥試之有驗問所從來曰合此藥於薊門時融方叛公遽謂曰惜哉至藥來於賊臣之境雖驗何益乃沉之于江而逐道士荘子曰宋人有善為不龜手之藥者龜手裂若龜文世世以洴音平澼音僻絖音曠為事洴澼漂也絖絮也冬漂絮則手拘能為藥以自治客聞之請買其方百金以説吳王説可以戰吳王使之将冬與越人水戰大敗越人列地而封之能不龜手一也或以封或不免于洴澼絖則所用之異也唐子曰仙人韓終即韓馮之兄為宋王採藥王不肯服終因服之遂得仙淮南子曰羿請不死之藥於西王母嫦娥竊而奔月嫦娥羿妻也羿從洒丹請不死之藥于西王母未及服之嫦娥盗服得仙奔入月中為月精又曰今夫地黄主屬骨如甘草生肉之藥也以其屬骨而責其生肉以其生肉而責其屬骨是王孫綽之欲倍偏枯之藥而欲以生殊死之人亦謂失論矣王孫綽魯人也又曰崑崙墟旁有一井玉横維其北極之隅横有光色横或作彭城不死藥之噐四水者帝之神泉以和百藥以潤萬民抱朴子曰神農經曰上藥令人身安命延昇天神仙遨遊上下役使萬靈體生毛羽行厨立至又曰餌五芝及丹砂玉札曾青雄黄雲母太乙禹餘糧各可單服之皆令人飛行長生又曰中藥養性下藥除病能令毒蟲不加猛獸不死惡氣不行衆妖羣屏孝經援神契曰椒薑禦温菖蒲益聰巨勝延年威喜辟兵此皆上聖之至言方術之實録也又曰仙藥之上者丹砂次則黄金次則白金次則諸芝次則五玉次則五雲次則明珠次則太乙禹餘粮次則石中黄子次則石桂英次則石腦次則石流丹次則石􅏁次則曾青次則松栢脂茯苓地黄麥門冬木巨勝重樓黄連石掌杼石家紫一名托盧是也或名仙人杖或名西王母杖或名天精或名却老或名地骨或名枸把也戰國䇿有獻不死之藥於荆王者謁者操以入中射之士問曰可食乎曰可因奪而食之王怒使人殺中射之士士曰臣問謁者謁者曰可食臣故食是臣無罪罪坐謁者也且客獻不死之藥臣食之而王殺臣是死藥也王乃殺無罪之臣而明人之欺王王乃不殺説苑藥曰湯藥食先甞于卑然後至于貴藥食甞乎卑然後至乎貴教也藥言獻於貴然後聞於卑道也又曰孔子曰良藥苦口利于病忠言逆耳利于行吕氏春秋曰魯有公孫綽者吿人曰我能治偏枯今吾倍為偏枯之藥則可以起死人以物固有不可以為小而可以為大可以為半而不可以為全者矣又曰良醫醫病病萬變藥亦萬變病變而藥不變嚮之夀民今為殤子矣又曰若用藥者得良藥則活人得惡藥則殺人義兵之為天下良藥也亦大矣論衡曰太王亶父睹王季之可立故易名曰歴歴者適也太伯覺悟採藥以避王季山海經曰大荒之中有黄木赤枝青葉羣帝取藥又曰大荒有山名豊阻玉門日月所入有靈山巫咸巫昉巫即巫盼巫彭巫姑巫眞巫祀巫謝巫羅十巫從此升降百藥爰在酈善良註水經曰茷山甚嵒峻重疊淮栢齊隂攢柯峙泉水石轉深蓋羣仙居宿之所是以世人目巖為𢷬藥巖名此水為𢷬藥水漢武内傳曰王母謂武帝曰太上之藥乃有風實雲子玊津金漿冥陵驎膽炎山夜日東掇扶桑之丹椹俯採長河之文藻大真紅芝九色鳯腦有得食之後天而老此太上之所服非衆仙之所寶也次藥有斑龍黒胎閬風石髓蒙山白鳯之胏靈丘蒼鸞之血有得服之後天而逝此天帝之所服非下仙之所逮也又曰武帝崩遺詔以雜道書四十卷置棺中到延康二年河東工曹李及入上黨抱犢出採藥于巖窟中得此書盛以金箱其書後題臣姓名記日月是武帝時物也河東太守張純以箱及書奏獻宣帝帝示武帝時左右侍臣有典書中郎見書流涕曰此是帝崩時殯殮物也東方朔别傳曰孝武皇帝好方士敬鬼神使人求神仙不死之藥甚至初無所得天下方士四面蜂至不可勝言東方朔諳方士虛語以求尊顯即云上天欲以喻之其辭曰陛下所使取神藥者皆天地之間藥也不能使人不死獨天上藥能使人不死耳上曰然天何可上也朔對曰臣能上天上知謾􅑲極其語即使朔上天取其不死之藥朔既辭去出殿門復還曰今臣上天若謾詫者願得一人為信驗上即遣方士與朔俱往期三十日而反朔等既辭而行日日過諸侯傳飲往往留十餘日期又且盡無上天意方士謂之曰期且盡日日飲酒為奈何朔曰鬼神之事難預言當有神來迎我者于是方士晝卧良乆朔遽覺之曰呼君極乆不應我今者屬從天上來方士大驚還具以聞上以為面欺詔下朔獄朔啼曰朔頃幾死者再上曰何也朔對曰天公問臣下方人何衣臣朔曰衣出蠶蠶若何朔曰蠶喙􅀢􅀢類馬邠邠類虎天公大怒以臣為謾言繫臣使人下問還報曰有之名蠶天公乃出臣今陛下苟以臣為詐願使人上問之上大驚曰善齊人多詐欲以喻我止方士也罷諸方士弗復用也由是朔日以親近列仙傳曰樂子長者齊人也少好道直到霍林山遭仙人受服巨勝赤松散方仙人吿之曰蛇服此藥化為龍人服此藥老翁成童昇雲上下改易形容崇氣益精起死養生子能服之此藥可以度世子長服之年百八十色如少女妻子九人皆服此藥老者還少少者不老又曰燕王遣韓終採藥王先使韓終服之面如金色又曰安期生賣藥海邉時人以為千嵗公又曰瑕丘仲賣藥於寗後地動舍壊仲死人取屍棄水以其藥賣之仲披裘而從詣之取藥又曰崔文子太山人賣藥都市後有疫死者萬計文子擁朱幡持黄散循問民服其散愈者萬計後在蜀賣黄散赤丸世故寶之又曰負局先生者語似燕代間人也常負磨鏡局循呉市中磨一鏡一錢磨時輒問主人得無有疾苦者有輙出紫丸藥以與之得莫不愈後上吳山絶崖頭懸藥與下人曰吾欲還蓬萊山與汝曹神水崖頭一旦有水白色從石間來下服之病多愈髙士傳曰韓康字伯休京兆霸陵人採藥名山賣於長安市口不二價三十餘年時有女子從康買藥康價不移女子怒曰公是韓伯休耶乃不二價也康歎曰我本避名今女子皆知我又何用藥為乃避入覇陵山中魯世女生别傳曰封君逹隴西人也少好道初服黄連丸五十餘年乃入鳥䑕山又于山中服水銀百餘年還鄉里年如二十者常騎青牛改號為青牛道士桂陽先賢畫贊曰蘇耽常住門庭有衆賔來招耽吿母曰人招耽去已種藥在後園梅樹下可治百病一葉愈一人賣此藥過足供養矣便隨賔去母捉牽之四體如醉足不能舉邴原别傳曰魏太子為五官中郎将原為長史太子讌㑹衆賔客數十人太子建議曰君父各有篤疾有藥一丸可救一人當救君耶父耶衆人紛然或君或父時原在位不與此論太子諮之于原原悖然對曰父太子亦不復難曹毗杜蘭香傳曰神女蘭香降張碩問禱祀如何香曰消摩自可愈疾淫祀無益香以藥為消摩王子年拾遺記曰燕昭王坐祇明之室晝而假寐忽夢西方有白雲蓊蔚而起俄而闇于庭間有人衣服皆毛羽駕花虬之車從雲中而出直詣王所王夢中與語問以上仙之術羽人曰大王精智未開欲求常生不可得也王請受絶慾之教羽人指畫王心應手而裂王乃驚悟因患心疾乆之乃昇于泉照之館復見其前所夢人曰前日本欲易王之心乃出方寸緑囊囊中有續脉明丸補血精散其細若灰以手摩王之臆俄而即愈王因請其方曰其用物也有九名神明芝煎以蒼鷹之血黑河鱗膽煑以崐嶼之脂貯以玉璽緘以金繩封以玉印王得服之後天而死若溺于滛嗜于慾求者秪苦心焉語畢化為青鳬入天際王求合藥終不能成黑河北極也其水濃黑不流上有濃雲生焉有黑鯉千尺如鯨常飛於南海博物志曰夫性之所以和病之所以愈是當其藥應其病則生違其藥失其應則死本草經曰太一子曰凡藥上者養命中藥養性下藥養病神農乃作赭鞭鈎􅀈尺制切從六隂陽與太一外五岳四瀆土地所生草石骨肉心皮毛羽萬千類皆鞭問之得其所前治主當其五味百七十毒異苑曰魏武北征踰頓升嶺眺矚見一崗不生百草王粲曰是古塜此人在世服生礜石死而石上熱蒸在外故草木焦滅即令鑿之果得大墓有礜石滿室仲宣博聞强記皆類此也一説粲在荆州從劉表登鄣山見此異任昉述異記曰漢世古諺云雖有神藥不如少年雖有珠玉不如金錢太原神釜崗中有神農嘗藥之鼎在焉咸陽山中有神農鞭藥處一名神農原一名藥草山山中有紫陽觀世傳神農于此辨百藥也養生畧要曰神農經曰五味養精神强䰟魄五石養髓肌肉肥澤諸藥其味酸者補肝養心除腎病其味苦者補心養痺除肝病其味甘者補肺養痺除心病其味辛者補肺養腎除痺病其味鹹者補腎養肺除肝病故五味應五行四體應四時夫人性生于四時然後命于五行以一補身不死命神以母養子長生延年以子守母除病究年嶺表録異曰廣之屬郡及鄉里之間多畜蠱彼之人悉能驗之以草藥治之十得七八藥則僉釵肥形如石斛古漏子食之能即吐肝漆濃汁煎吃陳家白藥子一名吉利本梧州陳氏有此藥是善攻蠱毒有中者即求之前後救人多矣遂以為名今封康州有得其種者廣府毎嵗常為土貢焉諸解毒藥功力皆不及陳家白藥王彪之閩中賦曰藥草則青珠黄連卷栢决明蓯蓉鹿茸漏蘆松榮痊疴則年永練質則翰生謝靈運山居賦曰本草所載山澤不一盧扁是别和緩是悉三枝六根五華九實樂府歌詩曰仙人騎白鹿髪短耳何長道我奉上藥覽之獲無疆來到主人門奉藥一玉箱主人服此藥身體日康强髪白復還黑延年壽命長魏文帝有詩曰西山一何髙髙髙殊無極上有兩仙童不飲亦不食與我一丸藥光耀有五色服藥四五日身體生羽翼應劭表曰臣劭居郡舊因計吏獻藥闕而不修慙悸交集無辭自文今道少通謹遣五官孫艾貢茯苓十斤紫芝六枝鹿茸五斤五味一斗計吏發行輙復表貢太平御覽卷九百八十四
