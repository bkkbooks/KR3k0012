  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_826-1a, image: WYG0900/WYG0900-0310a.png}
body:
  text: 太平御覧巻八百二十六宋李昉等撰資産部六織紡績漂澣織説文曰織作帛緫名也經織從絲也緯織横絲也經緯綜機縷也織績餘也禮記内則曰女子十年不出執麻枲治絲繭織紝組紃學女事左傳文公上仲尼曰臧文仲妾織蒲是不仁也毛詩國風大東曰跂彼織女終日七襄史記曰公儀休相魯去織婦㧞園葵戰國䇿曰甘茂相秦武王曰曽子處屈人有與曽子同名姓者而殺人人告曽子之母母曰吾子不殺人也織自若有頃人又曰曽參殺人曽子母懼投杼踰墻而走魏志曰太祖始丁夫人又劉夫人生子脩及清河長公主劉早終丁飬子脩亡於穣丁常言将我兒殺之都不復念遂泣哭无節太祖忿之遣歸家欲其意折後太祖就見之夫人方織外人傳公至夫人踞機如故公到撫其背曰顧我共載歸乎夫人不顧又不應太祖却行立於外户復云得无尚可耶遂不應太祖曰真訣矣遂絶魏志曰中山恭王褒徙封濮陽太和二年就國尚儉約勅妃妾紡績紝織習為家人之事吴志曰陸凱上言云自昔先帝時後宫列女及諸織絡數不滿百諸有蓄積貨財有餘先帝崩後㓜景在位便改奢侈不蹈先跡伏聞織絡及諸徒坐乃有千數又曰華覈上疏云今吏士之家少無子女多者三四少者一二通令户有一女十萬家則十萬人人人織績一嵗一束則十萬束矣使四疆之内同心戮力數年之間布帛必積恣民五色唯所服用禁綺繡無益之飾此救乏之上務富國之本業也南史曰齊孝宣陳皇后家貧少勤織作家人矜其勞或止之后終不改唐書曰盧坦為夀安令時河南尹徴賦限窮而縣人訴以機織未就坦請延十日府不許令人就織而輸勿顧限也違之不過罰令俸耳既成而輸坦亦坐罰由是知名墨子非樂曰使婦人為之廢紡織績紝之事荘子曰民有常性織而衣耕而食是謂同徳又曰叔文相莒三年歸其母自織請其母曰文相莒三年有馬千駟今主猶自績文之所得事皆将去之母曰婦人不好績紡織紝必有滛泆之心韓子曰吴起示其妻以組曰為我織組令如是組已就而效之其組異善起曰非詔也使衣而歸其父請往之起曰家無虛言又曰魯人身善織履妻善織縞而欲徙於越或謂之曰子必窮矣魯人曰何也曰履之也而越人舟行縞為冠之資而越人被髪以子之所長也㳺扵不用之國欲使無窮其可得乎國語曰勾踐非其身之所種則不食非人之所織則不衣十年不改於國焦贛易林蒙之無妄曰織帛無成緯畫無名長子逐兎鹿失先路列女傳曰孟子之少也既學而歸孟母方織問曰學何所至矣子曰自若也母以刀斷其機子懼而問其故母曰子之廢學若吾斷斯機也夫君子學以立名問則廣之是以居則安寕動則逺害今而廢之則是不免於斯役而無以離於患禍何以異於織而中道廢而不為豈能衣其夫子而長不乏粮食哉孟子懼旦夕勤學不息又曰文伯相魯敬姜謂之曰吾語汝治國之要盡在經耳畫者所以正枉也不可不强故幅可以為将畫所以均不服也故畫可以為正物所以治蕪與草也故物可以為都大夫持而不出入而不絶者捆也以為大行人推而往引而來者綜也可以為闗内之師主多少之數者均也均可為内史服重任行逺道正直而固者軸也可以為相舒而無窮者摘摘者可以為三公文伯載拜受教孝子傳曰董永性至孝而父死賣身以備棺斂既葬即詣主人将償其值路逢一女子云能織願為永妻永不得已與同詣主人問其故永具以對主人曰必爾者但令爾婦為我織縑百疋於是妻謂主人曰必爾百疋具焉主人大驚即遣永夫妻出門妻謂永曰我天之織女卿篤孝賣身葬父故天使我為君償債耳言終忽然不見仇池記曰仇池縣庫下悉安織婢綾羅絹布數十張機崔元始正論曰僕前為五原太守土地不知緝織冬至織草卧其中若見吏以草纒身令人酸鼻吾乃賣儲歭得二十餘萬詣雁門廣武迎織師使功手作機及紡以教民織具以上聞古艶歌曰孔雀東飛苦寒無衣為君作妻中心惻悲夜夜織作不得下機三日載疋尚言吾遲古歌辭曰大婦織綺羅中婦織流黄小婦無所為携琴上髙堂大人且徐徐調絃遽未央古詩曰迢迢牽牛星皎皎河漢女纎纎擢素手札札弄機杼被徒元書曰冝修田農作園圃織紡紝績為坐作之本利常令供食之物有廉幅紡績左傳昭十九年初莒有婦人莒子殺其夫己為嫠婦及老託於記鄣紡焉以度而去之因紡纑連所紡以度城而藏之以待外攻者欲以報仇及師至則投諸外投繩城外隨之而出毛詩國風東門之枌曰不績其麻市也婆娑又曰八月載績載𤣥載黄我朱孔陽為公子裳漢書曰張安世尊為公侯食邑萬户身衣弋綈夫人自紡績又曰冬民既入婦人同巷相從夜績女工一月得四十五日必相從者所以省費燎火同巧拙而合習俗也晋書曰鄭柔妻曹氏事舅姑甚孝躬紡績之勤以充奉飬南史曰宋袁粲幼孤飢寒不足母琅邪王氏太尉長史誕之女也躬事紡績以供朝夕又曰齊劉楷為交州與垣曇深同行曇深未至交州而卒曇深妻鄭獻英榮陽人時年二十子文凝初生乃隨楷到鎮晝夜紡績居一年私装了乃告求還又曰梁武丁貴嬪少時與隣女月下共織諸女並患蚊蚋而貴嬪弗之覺也鄉人魏益德將聘之未成而武帝鎮樊城嘗登楼以望見漢濱五采如龍下有女子擘絖則貴嬪也又丁氏因人以聞之於帝帝贈以金環納之時年十四嵗又曰諸暨東灣里屠氏女父失明痼疾親戚相弃鄉里不容女移父母逺住紵舍晝採樵夜紡績以供飬父母陳書曰程靈洗為公侯伎妾無游手並督之紡績至於散用貲財亦不儉恡隋書曰孝婦覃氏者上郡鍾氏婦也與其夫相見未幾而夫死時年十八事後姑以孝聞數年之間姑及伯叔皆相繼而死覃氏躬自節儉晝夜紡績蓄財十年而葬八喪為州里所敬上聞而賜米百石表其門閭又曰鄭善果母清河崔氏既寡之後恒自紡績每夜分而寐善果曰兒封侯開國位居三品秩俸幸足母何自勤如是耶荅曰嗚呼汝年已長成吾謂汝知天下之理今聞此言故猶未也至於公事何由濟乎今此秩俸乃是天子報爾先人之徇命也當須散贍六姻為先君之惠妻子奈何獨擅其利以為富貴哉又絲枲紡績婦人之務上至王后下至大夫士妻各有所製若堕業者是謂驕逸吾雖不知禮其可自敗名乎唐書曰永泰二年夏賜安南節婦金氏兩丁侍飬金氏本賊帥陶齊亮之母以忠義訓齊亮不受遂絶齊亮自績而衣自田而食州里稱之乃詔本道每使季給銀二兩充衣服以終其身國語曰公父文伯退朝其母方績文曰以歜之家而主猶績懼干季孫之怒也季孫康子位尊又為大宗其以歜為不能事主乎其母歎曰魯其亡乎使僮子備官而未之知耶春秋後語曰甘茂奔齊路逄蘇代將為齊使於秦甘茂曰臣得罪於秦逃遁至此無所容跡吾聞貧人女與富人女會績貧人女曰我無錢以買燭而子燭幸有光子可以分我餘光無損子明而得一斯便焉斯在也今臣困而子方使秦而當路矣茂之妻子在秦願君以餘光振之振整也蘇代許諾列女傳曰齊女徐吾者東海上貧婦人也隣婦李吾之屬合燭相從夜績徐吾曰我無以買燭而子之火光有餘分我餘光無損子明而我為便不亦可乎異苑曰昔有老姥雨夜紡績斷失其􅜒所在姥獨罵云何物鬼擔去户外即有應言暫寄避雨實不偷􅜒宜就覔之姥驚懼窺外無所見􅜒亦尋獲王子年拾遺記曰魏文帝所愛美人薛靈芸常山人父業經為鄭鄉亭長母陳氏随業舍於亭傍靈芸年十七生居貧賤至夜每聚隣婦夜績以麻蒿自照漂説文曰漂水中撃絮也史記曰韓信從下鄉城下釣有漂母見信飢飯信竟漂數十日越絶書曰伍子胥至溧陽見一女子擊絮於瀬水中子胥曰豈得可食乎女曰諾即發其簞食清其壺漿而與之子胥謂女子母令之露子胥行五歩還顧女子自投瀬水之中荘子曰宋人有善為不龜手之藥者世世以澼絖為事澣禮記禮器曰晏平仲祀其先人豚肩不揜豆澣衣濯冠以朝君子以為隘矣又内則曰父母舅姑冠𢃄垢和灰請潄衣裳垢和灰請澣又曰是日也妻以子見父貴人則為衣服由命士以下皆潄澣又曰妾生子三月之末潄澣夙齊見於内寢毛詩葛覃曰薄汙我私薄澣我衣又栢舟曰心之憂矣如匪澣衣漢書曰石奮以上大夫禄歸老于家長子建為郎中令少子慶為内史建老白首萬石君尚無恙每五日洗沐歸親入子舍竊問侍者取親中帬厠牏身自澣洒復與侍者不敢令萬石君知之以為常晋書曰王師敗績於湯隂百官侍衞莫不潰散唯嵇紹以身捍衞遂被害於帝側血濺御服天子深哀歎之及事定左右欲澣衣帝曰此嵇侍中血勿去又曰鄭袤妻曹氏食無重味服澣濯之衣宋書曰左僕射謝景仁性矜嚴整潔居宇浄嚴每坐唾輙唾左右人衣事畢即聼一日澣濯每欲唾左右争求受又曰汪湛為吏部尚書家甚貧不營財利餉饋盈門一無所受無兼衣餘食嘗為上所召遇澣衣稱疾經日衣成然後起梁書曰武帝雖衣澣衣而左右衣必湏潔嘗有侍臣衣𢃄捲摺怒曰卿衣𢃄如䋲将何所縛又曰昭明太子統欲以已率物服御朴素身衣浣衣膳不兼肉南史曰陳王逡之率素衣裳不澣几案塵墨唐書曰肅宗性儉約衣服無綺繡嘗出衣袖示韓擇木曰朕已三浣矣淮南子曰楚荘王誅里史孫叔敖制冠浣衣仲長子昌言曰攻玉以石浣布以灰龍魚河圖曰婦人無以夫衣合集浣之使之不利韓詩外傳曰孔子南逰適楚至阿谷隧有處子佩璜而澣者孔子抽觴以授之子貢曰以觀其詞子貢曰将南之楚逢天之署欲乞一飲婦人曰阿谷之隧阿曲之泥其水載清流而趣海飲則飲何問婢子風俗通東海王景典議曰晏平仲以齊君奢故澣其朝冠振其鹿裘太平御覧卷八百二十六
