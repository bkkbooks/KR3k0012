front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_363-1a, image: WYG0896/WYG0896-0237c.png}
body:
  text: 太平御覽卷三百六十三宋李昉等撰人事部四字形體頭上字禮記冠義曰冠而字之成人之道也春秋説曰字者餙也謝丞後漢書曰傅爕字南容北地靈州人也本字幼起慕南容三復白圭乃改焉晋中興書曰諸葛恢字道明賾弟也弱冠知名試字即丘長轉臨沂令值天下亂避地江左于時頴川荀闓字道明陳留蔡謨字逹明俱有名譽號曰中興三明時人為之歌曰京都三明各有名蔡氏儒雅荀葛清又曰孔愉字敬康少與同郡張茂字偉康丁潭字子康俱知名號曰㑹稽三康徐廣晋紀曰桓温才氣雄雋恢爽陵邁温嶠見其㓜時知必非常故父彛字曰温白虎通曰人所以有字何所以冠徳明功敬成人也故禮士冠經曰賔北面字之又曰冠而字之敬其名也所以五十乃稱伯仲者五十知天命思慮定也能從四時長幼之序故以伯仲號也荀氏家傳曰荀愷字茂伯小而智外祖晉宣王甚器之字為虎子弟悝為龍子王每謂曰候汝長大當共天下陳武列傳曰武胡人育於臨水令陳君奇之起議欲易其故字武長跪自啓曰里語有之都亭鼠數聞長者謂今當易字寔有私心嘗聞長卿慕藺相如之行故字相如往在鄉里乆聞故老之説稱漢使蘇武執忠守志不服單于流于漠北擁節牧羊寄秋鴈以訢心因行雲而託誠髙山仰止意竊慕之陳氏嘉其志遂名之曰武又欲令字仲顯其本是胡人而石勒石虎諱胡曰國人故因字之曰國武尹文子曰康衢長者字僮曰善搏音愽字犬曰善噬賔客不過其門者三年長者恠而問之以寔對於是改之賔客復往聖證論曰學者不知孟軻字按子思書及孔叢子有孟子居即軻也軻少居坎軻故名軻字子居也形體釋名曰形有形像之異也體第也骨肉毛血表裏大小相次第也尚書大傳曰堯八眉舜四瞳子禹其跳湯扁文王四乳八者如八字者也其跳者踦也其發聲也踦歩足不能相過也扁者枯也言湯躰半小家扁枯言皆不善也韓詩外傳曰惟天命本人情人有五藏六府何謂五藏情藏於腎神藏於心魂藏於肝魄藏於肺志藏於脾何謂六府咽喉入量之府胃者五穀之府大腸轉輸之府小腸受成之府膽積精之府膀胱液之府也孝經援神契曰人頭圎象天足方法地五臟象五形四肢法四時九竅法九分目法日月肝仁肺義腎智心禮膽㫁脾信膀胱决難髪法星辰節法日嵗腸法鈐鈐鈎也主鍵閉東觀漢記曰詔書令功臣家名自記功狀不得自増加以變時事或自道先祖形貎表相無益事實復曰齒長一寸龍顔虎口竒毛異骨形容極變亦非詔書之所知也又曰上復以朱祐為䕶軍常舍止於中祐侍醼從容曰長安政亂云有日角之相從以觀上風采上曰召刺姦収䕶軍祐由是不復言江表傳曰孫權生而方頥大口目有精光晋起居注曰懷帝琅邪恭王子母曰夏侯氏帝生有白毫生於目左角龍顔隆凖眼有精曜蜀李書曰武帝諱雄字仲雋始祖第三子帝身長八尺三寸美容貎工相之曰此君将貴相有四目如重雲其鼻如龜龍口如方器耳如相望法為貴人位過三公不疑也帝毎周旋鄉里有識者皆器重之有劉化者道術士也太康中每語鄉里曰李仲雋有大貴之表終為人主也車頻秦書曰符墜時四夷賔服凑集関中四方種人皆奇貌異色晋人為之題目謂胡人為側鼻東夷為廣面闊額北狄為匡脚面南蠻為腫蹄方方以類名也吳均齊春秋曰太祖神容魁梧天表英特體有龍文寛雅沉深喜怒不形於人隋書曰髙祖文帝龍顔額有五柱入頂目光外射晏子春秋曰伊尹倨身湯傴孫卿子非曰衞靈公有臣公孫吕長七尺面居三尺廣三寸鼻目取具名振天下管子曰子産日角晏平仲月角尾生犀角栁下惠史魚反角文子曰人頭之圎以法天足之方以象地天有四時五行九解三百六十日人亦復有四肢五臟九竅三百六十節天有風雲寒暑人亦有取於喜怒膽為雲肺為雨脾為風腎為電肝為雷以與天地相類而心為之主耳目者日月也而血氣者風雨也日月失行而薄蝕無光風雨非時毁折生災五星失行州土受其殃天地之道愛其神明人之耳目何能乆勤而不愛精神何能乆馳而不止是故聖人内而不失也孔叢子曰安釐子欲以馬回為相問子順曰囘為人便便亮直之丈夫也順曰聞諸孫卿其為人長目而豕視必體方而心圓臣見其面非不偉其體幹而疑其目王卒用之果以謟得罪荘子曰老萊子弟子出薪遇仲尼反以告曰有人於彼修上而趣下末僂而後耳耳却近後而上僂也視若營四海不知其誰氏之子老萊子曰是丘也淮南子曰形者生之舍也又曰夫神者所受於天也而形躰者所禀於地也故曰一生二二生三三生萬物故曰一月而氣二月而血三月而胎四月而胞五月而筋六月而骨七月而成八月而動九月而躁十月而生形躰以成五藏乃形是以肺主目腎主鼻胆主口肝主耳又地形篇曰東方川谷之所主日月之所生其人鋭形小頭隆鼻大口鳶肩企行竅通於目筋氣属焉倉色主肝長大早知而不夀南方陽氣之所浹暑温居之其人墮形鋭上大口决眦竅通於耳血脉属焉赤色主心早壯而夭西方髙上川谷出焉日月入焉其人皆方面脩頸卯行竅通於鼻皮革属焉白色主肺而勇敢不仁北方幽晦不明天之所閉者也寒氷之所積者也其人翕形短頸大肩下尻竅通於隂骨幹属焉黒色主腎其人蠢愚而夀中央四逹風氣之所通雨露之所㑹也其人大面短頸美鬚竅通於口膚肉属焉黄色主胃而惠聖愽物志曰東方少陽日月所出山谷清朗其人姣好西方少隂日月所入其土􅆼㝠其人髙鼻深目多毛南方太陽上下水沃其人大口北方太隂土平廣深其人廣面縮頸中央四抄風雨交山谷岐其人端正神仙傳曰王扎金筩内經皆云老子黄色美鬚廣顙長耳大目疎齒方口厚唇有叅午逹理魚目虎鼻純骨雙柱耳有三門足蹈二五手把十文烈女傳曰叔姬之生叔魚也生而視之曰是虎目豕喙鳶肩而牛腹谿壑可滿是不可猒也李邰别傳曰公長七尺八寸多鬚髯八眉左耳有奇表項枕如鼎足手握三公之字管寕别傳曰寕身長八尺龍顔秀眉論衡曰蒼頡四目而佐帝公子重耳駢脅為諸侯覇蘇秦骨鼻為六國相張儀仳脅相秦魏頭上説文曰首頭也顝口為碩顒大頭也顆小頭也釋名曰頭獨也處體髙而獨尊也首始也易未濟卦曰飲酒濡其首有孚失是飲酒濡首有孚失是酖酒無節又曰説卦曰乾為首韓詩外傳曰禽息秦大夫薦百里奚不見納繆公出當車以頭擊闑腦乃精出曰臣生無補于國不如死也繆公感悟而用百里奚禮斗威儀曰君乗火而王其民鋭頭君乗土而王其民大頭禮記少儀曰頭容直不傾顧也頭頸必中頭容直也樂汁圖曰赤帝鋭頭黒帝大頭宋均注曰鋭頭象朱鳥也左傳昭二年曰竪牛奔齊孟仲之子殺諸塞關之外投其首于寕風之棘上春秋元命苞曰頭者神所居上員象天氣之府也嵗必十二故人頭長一尺二寸爾雅曰元首也左傳曰狄人歸先軫之元孝經援神契曰頭圓象天足方法地史記曰藺相如為趙使秦持璧却立倚柱謂秦王曰趙王齋戒五日使臣奉璧今大王見臣禮節甚倨得璧傳之美人以為戲弄臣故復取璧大王必欲急臣臣頭今與璧俱碎於柱矣又曰湏賈使秦見范睢睢數之曰為我告魏王急持魏齊頭來不者我屠大梁賈歸告齊亡匿趙平原君所齊遂自頸趙王取頭與秦又曰欒布為梁大夫使於齊未還漢誅彭越梟頭雒陽下詔曰有敢收視者捕之欒布從齊還奏事彭越頭下戰國策曰三晋分智氏趙襄子最怨智伯漆其頭以為飲器史記同又曰白頭如新傾盖如舊漢書曰項藉頋見漢騎司馬吕馬童曰若非吾故人乎馬童面之指王翳曰此項王也羽曰吾聞漢購我頭千金邑萬户吾為公得乃自剄王翳取其頭又曰高祖招田横横至尸鄉廐謂從者曰陛下欲一見我面耳今斬吾頭馳三十里形猶未敗遂自頸令客奉其頭又曰秦始皇即位三十七年内平六國外攘四夷死人如亂麻暴骨長城之下頭顱相属於道又曰孫敬字文寶好學晨夕不休及至眠睡疲寝以繩繫頭懸屋梁後為當世大儒又曰陳遵長八尺餘長頭大鼻容貌甚偉又曰御史大夫陳萬年子咸亢直有異才萬年常召咸於床下教戒之咸睡頭觸屏風萬年怒之咸叩頭為謟也萬年不復言又曰建元中匈奴降者言匈奴月氏王以其頭為飲器師古曰飲酒之器東觀漢記曰岑彭引兵從車駕破天水與吳漢圍隗囂於西城勑彭曰兩城若下便可将兵南擊蜀慮人苦不知足既平隴復望蜀毎一發兵頭鬚為白後漢書曰賈逵自為兒童常在太學不通人間事身長八尺二寸諸儒為之語曰問事不休賈長頭又曰張讓叚珪誅何進為詔以故太尉樊陵為司􅈻校尉少府許相為河南尹尚書得詔版疑之曰請大将軍出共議中黄門以進頭擲與尚書何進反已伏誅典畧曰李催移保黄白城梁與張横等破之送其首初催兄子循及利等侍上無禮及催頭到有詔髙懸之魏畧曰龎意手斬一級不知是郭援戰罷之後衆人皆言援死而不得其首援鍾氏之甥意後於鞬中出一頭鍾繇見之而哭意謝繇繇曰援雖我甥乃國賊也卿何謝焉魏志曰辰韓國兒生以石壓其頭欲其褊故今辰韓人皆褊頭又曰袁紹辟牽招為督從軍招卒事袁尚後遼東送尚首懸在馬市牽招覩之悲感設祭頭下太祖義之又曰劉廙字恭嗣年十嵗講堂上司馬徳操撫其頭曰孺子黄中通理寕自知不蜀志曰秦宓使吳吳主問宻天有頭乎曰有詩云乃睠西顧以此推之頭在西方又曰魏延字文長義陽人延夢頭上生角以問占夢趙直直告之曰角之為字刀下為用頭上用刀其㐫甚矣延後果誅楊儀蹋延頭曰庸能復作惡又曰先主與張飛趙雲等沂流而上分定郡縣時巴郡嚴顔率衆守城不降及城䧟縛顔至飛呵顔曰汝見大軍至何以不降而敢拒戰顔答曰我州但有断頭将軍無降将軍也飛怒命左右牽去砍頭大笑曰斫頭便斫頭何為怒耶於是飛壮而釋之引為上客太平御覽卷三百六十三
