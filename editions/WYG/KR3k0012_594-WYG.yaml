body:
  text: 太平御覧卷五百九十四宋李昉等撰文部十章表奏劾奏駮奏章表釋名曰下言章上言表思之於内施之於外也李充韓林論曰表宜以遠大為本不以華藻為先若曹子建之表可謂成文矣諸葛亮之表劉主裴公之辭侍中羊公之讓開府可謂徳音矣文心雕龍曰堯咨四岳舜命八元並陳詞帝庭匪假書翰然則敷奏以言即章表之義也至太甲既立伊尹書誡思庸歸亳又作書以纘文翰獻替事斯見矣降及七國未變古式言事於主皆稱上書秦初定制改書曰奏漢定禮儀則有四品一曰章二曰奏三曰表四曰議章以謝恩奏以按劾表以陳情議以執異章者明也詩曰為章於天謂文明也其在文物赤白曰章表者標也禮有表記謂徳見于儀其在噐式揆景曰表表章之目蓋取諸此也案七畧藝文謡詠必錄章表奏議經國樞機然闕而不纂者乃各有故事而在職司也前漢表謝遺篇寡存及後漢察舉必試章奏左雄奏議臺閣為式胡廣章表天下第一並當時之傑筆也觀伯始謁陵之章足見其典文之美焉昔晉文受策三辭從命是以漢末讓表以三為斷曹公稱為表不必三讓又勿得浮華所以魏初章表指事造實求其靡麗則未足羙矣至文舉之薦襧衡氣揚采飛孔明之辭後主志盡文暢雖華實異㫖並表之英也琳瑀章表有譽當時孔璋稱徤則其標也陳思之表獨冠羣才觀其體贍而律調詞清而志顯應物制巧隨變生趣執轡有餘故能緩急應節迨晉初筆札則張華為雋其三讓公封理周辭要引義比事必得其偶及羊公之辭開府有譽於前談庾公之讓中書信美於徃載序志􅂋類有文雅焉劉琨勸進張駿自叙文致耿介並陳事之美表也原夫章表之為用所以對揚王庭昭明心曲既其身文亦且國華章以進闕風矩宜明表以致禁骨采宜耀循名課實以文為本者也是以章式炳賁志在典謨使要而非畧明而不淺表體多包情偽屢遷必雅意以扇其風清文以馳其麗然懇惻者詞為心使浮侈者情為文屈必使繁約得正華實相勝唇吻不滯則中律矣子貢云心以制之言以結之蓋一辭意也東觀漢記曰馬援征潯陽山賊上書除其竹林譬如嬰兒頭多蟣虱而剔之書奏上大悅出示尚書盡数日敕黄門取頭虱章持入張蟠漢記曰周舉上書言得失尚書郭度見之歎息上䟽願退位避舉常置其章於座吳志曰東萊人太史慈字子義為郡奏曹史會郡與州有隙先聞者為善時州章已去郡守選慈以行至洛詣公車見州吏始欲通章慈曰章題署得無誤耶取来視之乃以刀截敗其章因其亡去還通郡章州遂受短由是知名晉書曰樂廣善清言而不長於筆將譲尹請潘岳為表岳曰當得君意廣乃作二百句語述己志岳因取次比之便成名筆時人咸云廣不假岳之筆岳不取廣之㫖無以成斯美也北史曰董紹傳孝武崩周文與百官推奉文帝上表勸進令吕思禮薛憕作表前後再奏帝尚執謙冲不許周文曰為文能動至尊唯董公耳乃命紹為苐三表操筆便成表奏周文曰開進人意亦當如此也又曰胡方回為鎮北司馬為鎮修表有所稱慶世袓覧而歎美問誰所作既知方回召為中書博士賜爵臨涇子又曰邢卲善屬文每一文初出京師為之紙貴讀誦俄遍逺近於時袁翻與范陽袓塋位望通顯文筆之美見稱先達以邵藻思華贍深共嫉之每洛中貴人拜職多憑邵為謝章表嘗有一貴職初授官大事賔食翻與卲俱在坐翻意主人託其為讓表遂命卲作之翻甚不悅每告人曰邢家兒常作客章表自買黄紙冩而送之邵恐為翻所害乃辭以疾北齊書曰盧詢祖有術學文章華美為後生之俊舉秀才至鄴趙郡李祖勲嘗晏諸文士齊文宣使小黄門勑祖勲曰蠕蠕既破何無賀表使者佇立待之諸賓客為表詢祖俄頃便成其詞有云十萬横行樊將軍請而受屈五千深入李都尉去以不歸時重其工三國典畧曰周武帝下令上書者並為表於皇太子以下稱啓後周書曰柳慶領記室時北雍州獻白鹿羣臣欲草表陳賀尚書蘇綽謂慶曰近代已來文章華靡逮於江左彌復輕薄洛陽後進祖述不已相公柄民宰物職典文秀宜製此表以革前弊慶操筆立成辭義兼美綽讀而笑曰枳橘猶自可移况才子也隋書曰魏楊遵彦命李徳林製讓尚書令表援筆立成不加竄㸃因大相賞異以示吏部郎中陸卬卬云已大見其文筆浩浩如河之東注比來所見後生制作乃㳙澮之流耳卬仍命其子乂與徳林周旋戒之曰汝每事宜師此人以為模範唐書曰令狐楚為太原掌記鄭儋在鎮暴卒不及指撝後事軍中諠譁將欲有變中夜忽數十騎持刄廹楚至軍門諸將逼之令草遺表楚在白刄之中搦筆立成讀示三軍無不感泣由是聲名益重典論曰陳琳阮瑀之章表書記今之俊也魏文帝與吳質書曰孔璋章表殊徤㣲為繁富世說曰司馬景王令中書令虞松作表再呈輙不可意令松更定松意竭不能改心存之形於顔色鍾㑹察其憂問松松以實答㑹取為定五字松悅服以示景王景王曰不當爾耶誰所定也曰鍾會向亦欲啓之會公見問不敢饕其能王曰如此可大用可令來會平旦入見至二鼓乃出出後王獨拊手歎息曰此真王佐才也博物志曰漢承秦法羣臣上書皆云昧死王莾慕法古改曰稽首光武因而不改朝臣曰稽首輕宜稽首再拜奏陸士衡文賦曰奏平徹以閑雅漢書雜字曰㤗初之制改書為奏又曰羣臣奏事皆為兩通一詣后二詣帝凡羣臣之書通於天子者四品一曰章二曰奏三曰表四曰駮議文心雕龍曰昔唐虞之臣敷奏以言秦漢之輔上書稱奏陳政事獻典儀上急變劾愆謬摠謂之奏奏者進也文敷於下情進於上也秦始立奏而法家少文觀王綰之奏勲徳辭質而義近李斯之奏驪山事畧而意逕故無膏潤形於篇章矣自漢以來奏事或稱上䟽儒雅繼踵采殊可觀若夫賈誼之務農晁錯之兵事匡衡之定郊王吉之觀禮温舒之緩獄谷永之諫仙理既切至辭亦通辨可謂識大體矣後漢羣臣嘉言罔伏楊秉耿介於灾異陳蕃憤懣於尺一骨鯁得焉張衡指摘於史職蔡邕銓列於朝儀博雅明焉魏代名臣文理迭興若髙堂天文王觀教學王朗節省甄毅考課亦盡節而知治矣晉氏多難灾屯流移劉頌殷勤於時務温嶠懇切於費役並體國之忠規矣夫奏之為筆固以明允篤誠為本辨析踈通為首強志足以成務博見足以窮理酌古御今治繁總要此其體也典畧曰王粲才既髙辨鍾繇王朗等雖名為魏相至於朝廷奏議皆閣筆不敢措手唐書曰文宗嘗謂侍臣曰近日諸候章奏語大浮華有乖典實宜罰掌書記以戒其流李石曰古人因事為文今人以文害事懲弊抑末實在於斯論衡曰谷子虞唐子髙章奏白事筆有餘力劾奏文心雕龍曰按劾之奏所以明憲清國昔周之太僕䋲愆紏謬秦有御史職主文法漢置中丞總司按劾故位在鷙擊砥礪其氣必使筆端振風簡上凝霜者也觀孔光之奏董賢則實其姦回路粹之奏孔融則誣其釁惡名儒之與險士固殊心焉若夫傅咸勁直而按辭堅深劉隗切正而劾文濶畧各其志也後之弹事迭相斟酌惟新日用而􅃇凖不差然函人欲全矢人欲傷術在紏惡勢必深峭詩刺䜛人投畀豺虎禮疾無禮方之鸚猩墨翟非儒目以豕彘孟軻譏墨比諸禽獸詩禮儒墨既其如兹奏劾嚴文孰云能免是以近世為文競於詆訶吹毛取瑕刺骨為戾復似善詈多失折衷若能闢禮門以懸規標義路以植矩然後踰墻者折肱㨗徑者㓕跡何必躁言醜句詬病為切哉是以立範運衡宜明體要必使理有典刑辭有風軌總法家之式秉儒家之文不畏强禦氣流墨中無縱詭隨聲動簡外乃稱絶席之雄直方之舉耳晉書曰何曽嘉平中為司𨽻校尉撫軍校事尹模憑寵作威奸利盈積滿朝畏憚莫敢言者曽奏劾之朝廷稱焉又曰敬王恬字元愉少拜散騎侍郎累遷散騎常侍黄門郎御史中丞值海西廢簡文帝登祚未解嚴大司馬桓溫屯中堂吹警角恬奏劾温大不敬請科罪溫視奏歎曰此兒乃敢彈我也又曰劉毅以孝亷辟司隸都官從事京邑肅然毅將彈河南尹司隸不許曰攫獸之犬鼷鼠蹈其背毅曰既能攫獸又能殺䑕何損於犬投傳而去南史曰徐陵為御史中丞時安成王頊為司空以帝弟之尊權傾朝野直兵鮑叔叡假王威權抑塞辭訟大臣莫敢言陵乃奏彈之文帝見陵服章嚴肅若不可犯為歛容正坐陵進讀奏狀時安成王殿上侍立仰視文帝流汗沾背陵遣殿中御史引王下殿自是朝廷肅然隋書曰郎茂為尚書左丞時工部尚書宇文愷左翊衞大將軍于仲文競河東銀窟茂奏劾之曰臣聞貴賤殊禮仕農異業所以人知局分家識廉耻宇文愷位望已隆禄賜優厚㧞葵去織寂爾無聞求利下交曾無愧色于仲文大將近臣趨侍堦庭朝夕問道虞芮之風抑而不慕分銖之利知而必争何以貽範庶寮示民軌物若不糺䋲將虧政教愷與仲文竟坐得罪唐書曰顯慶中中書侍郎李義府恃寵用事聞婦人淳于氏有美色坐事繫大理乃託大理寺丞畢正義枉法出之將納為妾或有宻言其狀者上令給事中劉仁軌侍御史張倫鞠義府義府恐洩其謀遂令正義自縊於獄中上知而特原義府之罪侍御史王義方對仗叱義府令下義府顧望不肯退義方三叱上既無言義府始趨出義方乃讀彈文曰義府請託公行交遊羣小貪冶容之美原有罪之淳于恐漏洩其謀殞無辜之正義雖挾山超海之力望此猶輕廻天轉日之威方斯更劣此而可恕孰不可容金風戒節玉露啓途霜簡與秋典共清忠臣將鷹鸇並擊請除君側少答鴻私碎首玊階庶明臣節伏請付法推斷以申典憲上以義府有定䇿之功特釋而不問義方以毁辱大臣貶為萊州司户叅軍初義方謂其母曰奸臣當路懐禄而曠官不忠老母在堂赴難以危身不孝進退惶惑所以未能决也母曰吾聞王陵母自殺以成子之義汝若死事盡忠立名千載吾死不恨也及義方將赴萊州義府謂之曰王學士得御史是義府所舉今日之事豈無媿乎對曰義方為公不為私昔孔子為魯司㓂七日誅少正卯於兩觀之下今義方任御史旬有六日不能除奸臣於䨇闕之前實以為愧又曰元和十二年御史臺請奏和彈御史被彈即向下來次監奏或有故不到即殿中侍御史於御史下立以偹其闕臣伏以朝官入閤失儀和彈侍御史先合彈奏若彈奏失錯向上侍御史及中丞大夫遞相彈奏奏畢復入本班候監奏出閤然後侍罪此乃殿庭舊制於事為宜今若移一殿中於和彈侍御史下防向上数人失錯如或殿中自錯則又更立何人只合和彈御史便了不必更差殿中况乖故實終慮駁雜伏請自今已後依閤内故事縱和彈御史自有錯失不被彈候奏班退監奏畢然後出待罪翼從簡易永得遵行從之駮奏李充翰林論曰駮不以華藻為先世以傅長虞每奏駮事為邦之司直矣晉書曰稽紹傳曰陳準薨太常奏謚紹駮曰謚號所以垂之不朽大行受大名細行受細名文武顯於功徳靈厲表其闇蔽自頃禮官恊情謚不依本凖謚為過宜謚曰繆事下太常時雖不從朝廷憚焉唐書曰許孟容遷給事中論駮無所憚貞元末方鎮殂歿其主留務判官雖不代位亦例皆超擢寖以為常十八年浙東觀察使裴肅卒以攝副使齊總為衢州刺史孟容以總無出人才一旦超為郡守非舊制也封還詔書時乆絶論駮及孟容舉職班行為之惴恐徳宗聞開悟召對慰勉遂寢其事又曰李藩為給事中制勑有不可遂於黄勑後駮之吏曰宜别連白紙藩曰别以白紙是文狀豈曰批勑也太平御覧卷五百九十四
