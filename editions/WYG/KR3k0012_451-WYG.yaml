body:
  text: 太平御覽卷四百五十一宋李昉等撰人事部九十二諫諍一尚書云木從繩則正后從諫則聖毛詩序曰上以風化下下以風刺上主文而譎諫言之者無罪聞之者足以戒故曰風禮記曰為人臣之禮不顯諫顯明也謂明言其惡不㡬微言三諫而不聽則逃之逃去也君臣有義則治不義則離子之事親也三諫而不聽則號泣而隨之又曰父母有過下氣怡色柔聲以諫又曰子曰事君逺而諫則讇也近而不諫則尸利也尸謂不知人事無辭讓也子曰邇臣守和宰正百官大臣慮四方邇近也和謂調和事君者子曰事君欲諫不欲陳陳謂言其過于外也左傳曰衛公子州吁嬖人之子也有寵而好兵公弗禁石碏諫曰臣聞賤妨貴少陵長逺間親新間舊小加大淫破義所謂六逆也君義臣行父慈子孝兄愛弟敬所謂六順也去順效逆所以速禍也又曰魏獻子為政以戍為梗陽大夫梗陽人有獄魏戍不能斷以獄上其大宗賂以女樂訟者之大宗也魏子将受之魏戍謂閻没女寛曰二子晉大夫魏子之屬主以不賄聞於諸侯若受梗陽人賄莫甚焉吾子必諫皆許諾退朝待扵庭饋入召之召二大夫食比置三歎既食使坐魏子曰吾聞諸伯叔諺曰唯食忘憂吾子置食之間三歎何也同辭對曰或賜二小人酒不夕食昨飲酒醉故不夕食饋之始至恐其不足是以歎中置自咎曰豈将軍食之而有不足是以再歎及饋之畢願以小人之腹為君子之心屬厭而已獻子辭梗陽人屬足也小人二子自謂小人復居則恐食之不足厭飽則恐君亡君子居尊官食重禄而知不足故願以其腹為君子之心又曰公将如棠觀魚臧僖伯諫曰凡物不足以講大事其材不足以備器用則君不舉焉材謂皮革齒牙骨角君将納民扵軌物者也故講事以度軌量謂之軌取材以章物采謂之物不軌不物謂之亂政亂政亟行所以敗也又曰宋華督已殺孔父而弑殤公召荘公于鄭而立之以親鄭以郜大鼎賂公納于太廟非禮也臧哀伯諫曰君人者将昭徳塞違以臨照百官猶懼或失之故昭令徳以示子孫夫徳儉而有度升降有數文物以紀之聲名以發之百官扵是乎戒懼而不敢易紀律今滅徳立違而寘其賂器扵太廟以明示百官百官象之又何誅焉國家之敗由官邪也官之失徳寵賂章也郜鼎在廟章孰甚焉周内史聞之曰臧孫達其有後扵魯乎君違不忘諌之以徳又曰初鬻拳強諫楚子楚子弗從臨之以兵懼而從之鬻拳曰吾懼君以兵罪莫大焉遂自刖也楚人以為大閽謂之太伯使其後掌之又曰荘公如齊觀社非禮也曹劌諫曰不可夫禮所以整民也故㑹以訓上下之則制財用之節朝以正班爵之義帥長㓜之序征伐以討其不然諸侯有朝王有廵狩廵四方也以大習之大習會朝之禮君舉必書書而不法後嗣何觀公不聴又曰丹桓公楹桓公楹謂桓公之廟楹楹柱也刻其桷經書刻桓公桷桷謂之榱榱椽也皆非禮也御孫諫曰臣聞之儉徳之恭也侈惡之大也先君有恭徳而君納諸大惡無乃不可乎秋哀姜至公使宗婦覿用幣御孫諫曰男䞇大者玉帛公侯伯子男執玉至諸侯世子附庸孤卿執帛也小者禽鳥卿執羔大夫執鴈士執雉以章物也女䞇不過榛栗棗脩以告䖍也榛小栗也脩脯也䖍敬也皆取名以示敬也今男女同䞇是無别也男女之别國之大節也由夫人亂之無乃不可乎又曰晉侯假道扵虞以伐虢宫之竒諫曰虢虞之表也虢亡虞必從之晉不可啓冦不可翫一之為甚其可再乎諺所謂輔車相依唇亡齒寒者其虞虢之謂也輔頰輔也車牙車也又曰晉靈公不君厚歛以雕墻從臺上彈人觀其避丸宰夫胹熊蹯不熟殺之寘諸畚使婦人載之以過朝趙盾士季見其手問其故而患之将諫士季曰諫而不入則莫之繼也會請先不入則子繼之三進及霤而後視之曰吾知所過矣将改之猶不改宣子驟諫公患之又曰晉師為楚所敗師歸桓子請死晉侯欲許之士貞子諫曰不可城濮之役師三日榖文公猶有憂色左右曰有喜而憂如有憂而喜乎公曰得臣猶在憂未歇也困獸猶鬭况國相乎及楚殺子玉子玉得臣公喜而後可知也曰莫余毒也已是晉再勝而楚再敗也楚以是再世不競今天或者大警晉也而又殺林父重楚勝其無乃乆不競乎榖梁曰陳靈公通扵夏徴舒之家公孫寧儀行父亦通扵其家咸𠂻其衵服以戯扵朝泄冶聞之入諫曰使國人聞之則猶可使仁人聞之則不可君愧泄冶不能用其言而殺之周禮地官保氏掌諫王惡諫者以禮義正之論語曰事父母幾諫孝經曰曾子曰敢問子從父之令可謂孝乎子曰是何言歟是何言歟昔者天子有争臣七人雖無道不失其天下諸侯有争臣五人雖無道不失其國大夫有争臣三人雖無道不失其家士有争友則身不離扵令名父有争子則身不䧟扵不義史記曰主父偃上書闕下朝奏暮召入見所言九事其八事為律令一事諫伐匈奴其辭曰臣聞明主不惡切諫以博觀忠臣不避重誅以直言是故事無遺策而功流萬代又曰趙髙親近胡亥日毁惡蒙氏求其罪過舉殺之子嬰諫曰君誅殺忠臣而立無節行之人是内使羣臣不相信而外令鬬士之意離也臣竊以為不可胡亥弗聴又曰趙肅侯遊大陵出扵鹿門大夫祁午扣馬諫曰耕事方急一日不作百日不食肅侯下車而謝之又曰秦夷郡縣城銷兵刃不復用不立子弟為王功臣無為諸侯者使後無攻戰之患始皇三十四年置酒咸陽宫博士僕射周青臣等頌稱始皇威徳齊人淳于越進諫曰臣聞之殷周千餘嵗封子弟功臣自為枝輔今陛下有海内而子弟為匹夫卒有田常六卿之臣無輔弼何以相救哉事不師古而能長久者非所聞也又曰沛公入秦宫室帷帳狗馬重寳婦女以千數意欲留居之樊噲諫沛公出舍沛公不聴張良曰夫秦無道故沛公得至此夫為天下除殘賊宜縞素為資今始入秦即安其樂此所謂助紂為虐且忠言逆耳利扵行良藥苦口利扵病願聴樊噲言沛公乃還軍灞上又曰髙帝欲以趙王如意易太子叔孫通諫上曰太子仁孝天下皆聞之吕后與陛下攻苦食淡其可背哉必廢嫡立少臣願先伏誅以頸血汚地髙帝曰公罷矣吾直戯耳叔孫通曰太子天下本一揺天下振動奈何以天下戯又曰司馬相如嘗從上至長楊獵是時天子方好自擊熊馳獸相如上疏諫曰臣聞物有同類而殊能者故力稱烏獲捷言慶忌勇期賁育臣之愚以為人誠有之獸亦宜然今陛下好陵險阻射猛獸卒然遇軼材之獸駭不存之地犯属車之清塵是胡越起扵轂下而羗夷接軫也又曰楚荘王即位三年不出號令日夜為樂令國中曰有敢諫者死無赦伍舉入諫荘王左抱鄭姬右抱越女坐鐘鼓之間伍舉曰願有進隠曰有鳥在阜三年不飛不鳴是何鳥也荘王曰三年不飛飛将冲天三年不鳴鳴将驚人舉可退矣吾知之矣居数月淫益大甚蘇從乃入諫王曰若聞令乎對曰殺身以明君臣之願也扵是乃罷淫樂聴政所誅者数百人所進者数百人任伍舉蘇從以政國人大恱又曰孫叔敖病且死属其子曰我死必貧困徃見優孟言我孫叔敖子也居数年其子窮困負薪逢優孟與言曰我孫叔敖子也父且死時属我貧困往見優孟孟曰若無逺有所之即為叔敖衣冠抵掌談語嵗餘像孫叔敖楚王及左右不能别也荘王置酒優孟前為壽荘王大驚以為孫叔敖復生也欲以為相優孟曰請歸與婦計之三日而為相荘王許之三日優孟復來王曰婦言何對曰婦言慎無為楚相孫叔敖盡忠為亷以治楚楚王以得覇今死其子無立錐之地貧困負薪以自飲食必如孫叔敖不如自殺於是荘王謝優孟乃召孫叔敖子封寝邱侯四百户以奉其祀又曰優旃者秦倡侏儒也二世立欲漆其城優旃曰善主上雖無言臣固将請之漆城雖扵百姓愁費然佳哉漆城蕩蕩㓂來不能上即欲就之易為漆耳顧難為䕃室於是二世以其故止又曰武帝少時東武侯母嘗飬帝帝壮時號之曰大乳母所言未嘗不聴公卿大臣皆敬重乳母乳母家奴從者横暴長安中當道掣頓人車馬奪人衣服聞之于上不忍致之法有司請徙乳母扵邊奏可乳母當入至前靣見辭乳母先見郭舍人為下泣舍人曰即入見辭去疾歩数還顧乳母如其言謝去歩疾数顧郭舍人疾言罵之曰咄老女子何不疾行陛下已壮矣寧尚須汝乳而活耶尚何還顧扵是人主憐悲之乃下詔止無徙乳母又曰始皇長子扶蘇諫曰天下初定逺方黔首未集今皆重法繩之臣恐天下不安唯上察之始皇怒使扶蘇北監蒙恬兵扵上郡漢書曰上朝東宫趙談參乘袁盎伏車前曰臣聞天子所與共六尺輿皆天下豪英今漢雖之人陛下獨奈何與刀鋸之餘同載扵是上笑下趙談談泣下車又曰吳王謀反枚乘諫曰夫舉吳以訾扵漢譬由蠅蚋之附羣牛腐肉之齒利劒鋒也又曰南越自相攻上欲救之淮南王上書曰臣聞越非有城郭邑里也處谿谷之間篁竹之中習扵水鬬便扵用舟地深昧而水險中國之人不知其勢阻而入其地雖百不當其一夫頼宗廟之靈方内大寧戴白之老不見兵革民得夫婦相守子孫相保陛下之徳也陛下方寸之印丈二之組鎮撫方外不勞一卒不煩一戰而威徳並行又曰王吉字子陽為昌邑中尉上疏諫曰大王不好書術而樂逸遊口倦乎叱咤手苦扵轡捶身勞乎車輿朝則冐霜露晝則被塵埃夏則為大暑之所暴炙冬則為風寒之所侵薄以輭脆之玉體犯勤勞之煩毒夫廣厦之下細氊之上明師居前勸誦在後上論唐虞之際下及殷周之盛考仁聖之風習治國之道訢訢焉發憤忘食日新厥徳其樂豈徒銜撅之間哉又曰鮑宣每居位嘗上書諫民有七亡而無一得欲望國安誠難也民有七死而無一生欲望刑厝誠難也陛下擢臣岩穴誠冀有益毫毛豈徒欲臣美食大官重髙門地哉又曰龔遂字少卿山陽人以明經為昌邑郎中令王動作不正遂為人忠厚剛毅有大節内諫争扵王外責𫝊相引經義陳禍福至扵涕泣蹇蹇亡已靣刺王過王至掩耳起走曰郎中令善愧人及國中皆畏憚焉王嘗與騶奴宰人遊戯飲食過度遂入見王涕泣􅂰行左右皆出涕王曰郎中令何為遂曰臣痛社稷之危也又曰張敞為膠東相王太后數出逰獵敞上書諫曰臣聞秦王好淫聲華陽后為不聴鄭衛之曲楚荘好畋獵樊姬為不食鳥獸之肉口非惡芳甘耳非憎絲竹也所以抑心意絶嗜欲将以帥二君而全宗祀也禮君母出門則乘輜軿下堂則從傅姆進退則鳴玉佩内飾則結綢繆此言尊貴所以自歛制不縦恣之義也唯觀徃古令后姬有所則書奏后不復出又曰成帝起昌陵數年不成復還歸延陵制度奢大劉向上書諫曰闔閭違禮厚葬十有餘年越人發之秦皇帝葬于驪山之阿下錮三泉髙五十餘丈周五里水銀為江海黄金為鳬雁珍寳之藏機械之變棺槨之麗宫館之盛不可勝量工匠計以萬數數年之間被項羽之災罹牧豎之禍丘壠彌髙者發掘必速竊為殿下羞之上甚感向言而不能從又曰王莽新即位恃府庫之富欲立威福乃拜十二部将率同時十道並出窮追匈奴因分其地立呼韓邪十五子莽将嚴尤諫曰周宣王時獫狁内侵至于涇陽命将征之盡境而還其視戎狄之侵譬猶蚊䖟之螫驅之而已故天下稱明是為中策漢武帝選将治兵輕粮深入逺戍雖有剋獲之功胡輙報之兵連禍結三十餘年中國罷耗匈奴亦創而天下稱武是為下策秦始皇不忍恥而輕民力築長城之固延衺萬餘里轉輸之所行起扵負海疆境既完中國内竭以䘮社稷是為無策莽不聴轉兵轂如故天下騷動又曰王莽新即位立威而窮追匈奴莽将嚴尤諫曰今天下遭陽九之阨比年飢饉此一難也不能奉軍粮二難也胡地沙鹵多乏水草三難也胡地秋冬甚寒春夏甚風多此四難也輜重自隨虜徐遁逃五難也功必不成莾不聴又曰成帝時王氏擅權羣臣莫敢言梅福上書諫曰昔髙祖納善若不及從諫如轉圜此髙祖所以無敵扵天下也又曰枚乘上書諫吳王曰夫以一縷之任係千鈞之重上懸之無極之髙下垂之不測之泉雖甚愚之人猶知其絶也又曰谷永上疏諫成帝曰臣聞三代之所以隕社稷皆由婦人與羣惡願陛下追觀夏商周秦所失也又曰伍被楚人諫淮南王曰昔伍子胥諫吳王吳王不用乃曰臣今見麋鹿㳺姑蘇之臺也今臣亦将見宫中生荆棘露霑衣也因涕泣而起太平御覽卷四百五十一
