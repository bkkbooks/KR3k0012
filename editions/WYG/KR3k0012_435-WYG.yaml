body:
  text: 太平御覽卷四百三十五宋李昉等撰人事部七十六勇三吳志曰孫堅年十七與父共載船至錢塘㑹海賊胡王等從匏里上掠賈人財物方於岸上分之行旅皆住船不敢進堅謂父曰此賊可擊請討之父曰非爾所圗也堅行操刀上岸以手東西指麾若分部以羅遮賊状賊望見以為官兵捕之即委財物散走堅追斬得一級以還父大驚由是顯聞又曰曹公出濡湏甘寧為前部督受勅斫敵前營權特賜米酒衆肴寧乃賜手下百兵食食畢寧先以銀椀酌酒自飲兩碗乃酌與都督伏不肯持寧引白削置膝上呵謂之曰卿見知於至尊孰與甘寧甘寧尚不惜死卿何得獨惜死乎都督見寧色厲即起拜持酒自次通酌各兵一銀椀至二更時銜枚出破敵敵驚動遂退寧益貴重増兵二千又曰董襲字元岱餘姚人權討黄祖祖横兩艨艟守江口以栟櫚大紲縳石為矴上有千人以弩交射重不得進襲将敗死百餘人被兩鎧乘舸船突入艨艟襲乃以刄斷其紲艨艟於是横流制不能已大兵遂進祖乃開門走追斬之明日大㑹權舉觴屬襲曰今日之㑹斷紲之功也又曰甘寧字興覇性奢靡嘗以繒錦維舟去或割棄勸權襲黄祖擒之隨魯肅至益陽拒關公公擇鋭士五千人從上流淺瀨夜渡寧曰請以五百人往對之彼聞吾咳唾聲必不敢渉渉即成擒矣又曰凌統字公績從征合肥為右部都督時權徹軍還前部已發魏将張遼等奄至津北統率親近三百人䧟圍拔權出敵已毁橋權䇿馬馳驅統復還戰左右盡死所殺數十人度權已免乃還橋敗道絶被甲潜行權既御船見之驚喜統痛親近無返者悲不自勝權引袂拭之謂曰公潰亡者已矣苟使卿在何患无人蜀志曰闗雲長本字長生河東解人先主入益州令其督荆州軍事嘗為流矢所中貫左臂遂令鑿骨醫之時與諸将飲食血流盈器言笑自若及破曹仁於樊城威振華夏曹公議都遼以避其鋭司馬宣王蔣濟以為彼既得志孫權必大怒權後果用吕蒙計平荆州又曰張飛字翼徳􅃰州人先主背曹公依劉表於雷陽聞曹公卒至棄妻子而奔乃以飛将二十騎拒之後飛據水斷橋瞋目横槊曰張翼徳在此爾曹敢來决死否衆無敢近者先主入益州飛與諸葛亮分定郡縣飛勇亞闗雲長雲長善待卒伍而驕士大夫飛敬愛君子而不恤小人先主常戒之及先主伐吳臨發益州於是飛帳下張逵殺之持其首順流奔于孫權晉書曰桓石䖍小字鎮惡有材幹趫捷從父在荆州於獵圍中見猛獸被數箭而伏諸督将素知其勇戲令抜箭石䖍因急往拔得一箭猛獸跳石䖍亦跳髙於猛獸猛獸伏復抜一箭以歸嘗從桓冲入關冲為苻健所圍垂沒石䖍躍馬赴之抜冲于數萬衆中而還莫敢抗者三軍嘆息威震敵人又曰吳彦字士則吳郡人出自寒微有文武才幹身長八尺手格猛獸膂力絶羣陸抗奇其勇畧将拔用之衆情不允乃㑹諸将宻使狂人拔刀跳躍而走彦不動舉几禦之衆伏其勇乃擢用焉又曰唐䦨字仲初潁川鄢陵人也祖輝安北長史父東以勇力聞武帝時有西域健兒趫揵無敵晉人莫敢與校帝募勇士為對東應選遂撲殺之名震殊俗又曰王殄多權畧凡有所掠必預圗成敗舉無遺䇿弓馬迅捷膂力過人青土號為飛豹又曰周處為人勇暴不可當處嘗居義興水中有蛟龍山上有白額虎鄉里有周處時人謂之三横有里人説處請殺虎虎死入水擊蛟龍沒行數十里處與之俱經三日三夜人謂已死矣皆相慶賀處殺蛟龍廽聞鄉里相賀始知身之患人也於是反身脩已至洛陽惠帝拜為将軍累遷為建威将軍後征西沒於陣贈西平将軍又曰郭黙殺江州太守自稱刺史為人勇健常身披重甲操三丈矛時人莫不憚之後陶侃及庾亮率軍滅之又曰蔡裔仕偽趙為振武将軍少有勇力呼聲如雷嘗有盗入室裔撫机一呼賊衆皆殞時人憚之又曰李特巴西人少仕州郡雄勇善騎射沉毅有大度嘗至劔閣箕踞太息顧盼險阻曰劉禪有如此之地面縳於人豈非庸才耶後聚流人衆至數萬遂攻城自稱大将軍為益州刺史後稱蜀為羅向所殺子孫六世至勢為大司馬桓温所滅共四十六年又曰劉元海匈奴中人祖扶羅助漢討黄巾遂以衆留定難屬董卓亂屯于河内元海即扶羅之孫也髫齓英惠及長好學尤好左氏傳孫吳兵法畧皆誦之兼愛武事妙絶於衆猨臂善射趫捷膂力過人姿儀魁偉身長八尺四寸鬚長三尺太始中武帝召與語大悦之及惠帝失馭冦盗蜂起成都王頴表元海為将軍後王浚伐頴元海説頴曰今二鎮跋扈衆餘十萬恐非宿衛所能禦請為殿下還説五部以赴國難頴曰五部之衆可保發否鮮卑烏丸勁速如風雲何易可當吾欲奉乘輿還洛陽避其鋒鋭徐𫝊檄天下以逆順制之君意如何元海曰殿下武皇帝之子有殊勲於王室威恩允洽四海欽風孰不思為殿下沒命捐軀者何難發之有乎王浚豎子東瀛䟽屬豈與殿下争衡乎殿下一發鄴宫示弱於人洛陽何復得至縱達洛陽威權不復在殿下也檄紙尺書誰人奉之且東胡之悍不踰五部願殿下勉撫士衆鎮以靖之當為殿下以二部下推東瀛二部梟王浚二豎之首可指日而懸矣頴悦拜元海為北單于元海至左國城二旬之間衆已五萬元海謂劉宣等曰夫帝王豈有常哉大禹出於西戎文王生於東夷惟徳所授耳遂僣稱漢王子孫四世至曜為石勒所滅合二十五年又曰石季龍趙王石勒從子也身長七尺五寸趫捷便弓馬勇冠當時至於降城䧟壘不復料别善惡坑塹士女鮮有遺類指授攻討所向無前故勒委以專征之任所在立功後廢𢎞而僣位時豪傑侵恣賄賂公行季龍患之擢殿中御史季宸為御史中丞特親任之自此百僚震懾州部肅清季龍曰朕嘗謂良臣猛獸髙歩通衢而豺狼避路信矣哉季宸是也賞賜甚厚後以疾卒又曰石閔趙王季龍養子也善謀䇿勇力絶人既殺石鑒遂僣國號大魏戎卒三十萬旌旗鐘鼓綿亘百餘里雖石氏之盛無以過之慕容雋遣慕容恪率衆伐之閔與恪十戰皆敗恪恪乃以鐵鏁連馬䇿簡善射卑勇而無剛者五千方陣而前閔所乘赤馬日行千里左杖䨇刄右執劔㦸順風擊之斬鮮卑三百餘級俄而燕騎大至圍之數匝閔躍馬潰圍馬死為恪所擒斬之左右七里草木悉枯又曰苻生健之子也㓜而無賴及長力舉千斤雄勇好殺手格猛獸走及奔馬擊刺騎射冠絶一時何法盛晉中興書曰周訪字士達尋陽人遷武昌太守時杜𢎞作亂冦豫章訪進討𢎞别帥杜𢎞張彦等禦訪訪為流矢所中折齒口中流血壯氣益勇先登奮擊臨陣擒彦殺數百人又曰劉遐字正長廣平人性果毅便弓馬遭天下亂遐自為隖主攻抄日至无時不戰遐每奮擊直入賊軍䧟堅摧鋭鄉人邵績深知之以女妻焉遂立壁河濟之間胡不敢逼王隠晉書曰叚疋磾召弟文鴦還厭次石虎來先縱騎抄城左右鴦登城臨見不勝其忿欲出擊胡磾疑有伏不聽出民出大為胡所殺掠鴦单将壯士數十騎出擊胡所殺甚多胡騎退鴦追躡磾率歩繼鴦虎伏騎起磾鴦力戰殺胡數十鴦還赴磾磾已散還鴦所乘馬乏頓虎呼曰大兄乆望共天同不違願今日見何故復戰請持杖語鴦罵曰汝為冦虜乆應死吾兄不能用吾計故令汝得至此吾寧死不忍為汝擒遂下馬與胡戰矟折執刀戰不降虎軍四面解馬羅披自鄣前捉鴦自辰至申力極斫殺人而後見得也又曰石勒攻夏口朱伺銜鐵面以弩的射賊大帥數人皆殺之並以磊石弓箭雨下所向摧破賊皆抛船上岸於水邉作陳伺身被數十箭氣色不變諸軍尋至賊兵便崩退投水死者百數夏口之全伺之勲也宋書曰蒯恩字道恩蘭陵人髙祖出征恩縣差為征民充甲士使伐焉道恩常負大束兼倍餘髙祖聞之即給器杖恩大喜因征妖賊常為先登多斬首級既習戰陳膽力過人又曰宋越朱陽人為郡吏太守夏侯穆擢為隊主郡有為冦盗者常使越討伐往輙有功家貧無以市馬常刀楯歩出單身挺戰衆莫能當每一捷郡将輙賞錢五千因此得買馬又曰宋慤為江夏王國上将軍十五年不徙官元嘉二十二年伐林邑慤自奮願行義恭舉慤有膽勇乃降除振威将軍又曰薛安都與副将譚金追魯爽于小峴爽自與腹心壮騎斷後譚金先薄之不能入安都望見爽便躍馬大呼直徃刺之應手而倒左右范雙斬爽首爽累世驍猛生習戰陣咸云萬人敵安都單騎直入斬之而反時人皆云雲長之斬顔良不過也徐爰宋書曰桞元景字孝仁河東解人也良家子少便弓馬慕尚将師數隨父伐蠻夙以勇稱孫巖宋書曰拓䟦燾字佛貍壯健有筋力勇於戰鬭忍虐好殺部衆畏之攻城臨敵皆親貫甲胄又曰宗慤字元幹南陽湼人也兄泌娶妻始入門夜被刼慤年十四挺身與刼相拒十餘人皆披散不得入室時天下無事士人並以文義為業而慤任氣好勇故不為鄉曲所知齊書曰桓崇祖在淮隂見上便自比韓信白起咸不信唯上獨許之崇祖再拜奉㫖及破虜啓上謂朝臣曰崇祖許為我制虜果如其言恒自擬韓白今真其人也又曰張敬兒年少便馬有膽氣好射虎發無不中南陽新野風俗出騎射而敬兒尤多膂力又曰魚復侯子響勇力絶人開弓四斛力數在園池中帖騎馳走竹樹下身無虧傷又曰周山圗鎮軍将軍張永征薛安都於彭城山圗領三千人迎軍至武原為虜騎所追合戰多所傷殺虜圍轉急山圗據城自固然後更結陣死戰突圍出虜披靡不能禁衆服其勇呼為武原将又曰焦度初青州刺史顔師㑑出鎮差度領幢主送之索虜㓂青州師伯遣度領軍與虜戰於沙溝杜梁度身破陣大捷師伯援為已輔國府參軍虜遣清水公冦清口度又領軍救援刺虜騎将豹皮子堕馬獲其装鎧矟手殺十人師伯啓孝武稱度氣力弓馬並絶人帝召還充左右見度身形黒壮謂師伯曰真健物也又曰周盤龍子奉叔單馬率二百餘人結陣虜萬餘騎張左右翼圍繞之一騎走還報奉叔已沒盤龍方食棄筯馳馬奮弰直奔虜陣自稱曰周公來虜素畏盤龍驍名即時披靡時奉叔已大殺虜得往在外盤龍不知乃衝東擊西奔南走北賊衆莫敢當奉叔見其父乆不出復躍馬入陣父子兩騎索攪數萬人虜衆大敗盤龍父子由是名播北國形甚羸細而臨軍勇果諸将莫逮又曰崔惠景恭祖者慧景宗人驍果便馬弰氣力絶人頻經軍陣討王敬則與左興盛軍容袁文曠争及敬則首訴明帝曰恭祖秃馬絳衫手刺倒賊故文曠得斬其首以死易勲而見枉奪若夫此勲要當刺殺左興盛帝以其勇使謂興盛曰何容令恭祖與文曠争功遂封二百户又曰桓康蘭陵人果勇驍悍宋太初中隨武帝起義為郡所縶衆皆散康装擔一頭貯穆后一頭貯文惠太子竟陵王子良自負至山中與門客肅欣祖三十餘人相結破獄出武帝郡兵追急康死戰破之隨武帝起兵摧堅䧟陣所經村邑恣行暴害江南人畏之以其名怖小兒畫其形状於寺中病瘧者冩其形帖於床壁無不立愈位至蘭陵太守梁書曰王神念少善射驍勇既老不衰常於髙祖前手執二刀楯左右交度馳馬往來冠絶羣伍又曰侯景懐朔人也少而不覊髙歡以為将雄勇冠時征伐數有大功景謂髙歡曰若假臣三萬人當横行天下要須縳取蕭衍老翁遣作太平寺主及歡敗於沙苑景謂歡曰宇文㤗忸於戰勝今必至殆請以勁騎數千至關中取之歡以告其妃婁氏婁氏曰彼若得㤗景亦不歸髙歡乃止後歡死景乃以河南十三州降于梁髙澄使慕容紹宗圍景於長社景乃走紹宗追之至渦陽景遣使謂紹宗曰欲送客耶将定雌雄耶紹宗曰决戰景乃令将士皆披甲持短刄但低視斫人腦馬足遂敗紹宗軍禆将斛律光尤之紹宗曰吾戰多矣未見此賊爾相持連月景食盡其将景顯等降紹宗衆遂潰景乃與腹心數十騎南走後稍收散卒得馬卒八百人晝夜兼行追軍不敢逼遣使謂紹宗曰景若就擒公復何用紹宗乃縱之遂攻夀春下之據其城太平御覽卷四百三十五
