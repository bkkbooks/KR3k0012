body:
  text: 太平御覽卷九百十四宋李昉等撰羽族部一鳥周禮曰庖人供六禽辨其名物六禽雁鶉鷃雉鳩鴿又曰中秋獻良裘王乃行羽物行羽物以飛鳥賜羣吏中秋鳩化為鷹順始殺大班羽物又曰射鳥氏掌射鳥祭祀以弓矢敺鳥鳶凡賔客㑹同軍旅亦如之又曰羅氏掌羅烏鳥蜡則作羅襦大蜡歲十二月合取萬物而索饗之襦細宻之羅又曰仲春羅春鳥獻鳩以養國老行羽物春鳥蟄而始出是時鷹化為鳩與春鳥變舊為新宜以養老生氣行謂賜物又曰掌畜掌養鳥而阜蕃教擾之阜猶盛也蕃蕃息也祭祀供卵鳥其卵可薦之鳥歲時貢鳥物鴞鴈之屬以四時来共膳獻之鳥雉及鶉鴽之屬又曰翨氏翨音翼掌攻猛鳥各以其物為媒而掎之猛鳥鷹隼之屬置其所食之物於絹中鳥來下則掎其脚以時獻其羽翮又曰哲簇氏哲音摘又他歴切簇音倉獨切掌覆夭鳥之巢覆毁也夭鳥惡鳴之鳥若鴞鵩以方書十日之號十有二辰之號十有二月之號十有二歳之號又曰庭氏掌射國之夭鳥若不見其鳥獸則以救日之弓與救月之矢夜射之若神也則以太隂之弓與枉矢射之禮曰獻鳥者佛其首畜鳥者則勿佛也又曰執禽者左手又曰大羅氏天子之掌鳥獸者也又曰鳥皫色而沙鳴鬱皫普表切又曰凡生天地之間者有血氣之屬必有知有知之屬莫不知愛其類今是大鳥獸則失喪其羣匹越月踰時焉則必反巡過其故鄉翔回焉鳴號焉蹢躅焉踟蹰焉然後乃能去之小者至扵燕雀猶有啁噍之頃焉然後乃能去之凡有血氣之屬者莫知扵人故人扵其親也至死不窮左傳曰郯子來朝公與之晏叔孫昭子問焉曰少皥氏以鳥名官何郯子曰我髙祖少皥氏之立也鳯鳥適至故紀扵鳥為鳥師而鳥名詩曰伐木丁丁鳥鳴嚶嚶嚶其鳴矣求其友聲易曰比王用三驅失前禽邑人不誡吉又曰井泥不食舊井無禽又曰旅鳥焚其巢又曰小過有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也書曰日中星鳥以殷仲春厥民析鳥獸孳尾孔安國曰乳化曰孳交接曰尾日永星火以正仲夏厥民因鳥獸希革夏時鳥獸毛羽希少改易改革也宵中星虛以殷仲秋厥民夷鳥獸毛毨毨理也毛更生整理也日短星昴以正仲冬厥民隩鳥獸氄毛鳥獸皆生耎毳細毛也周書旅獒曰珍禽竒獸不育于國論語曰鳥之將死其鳴也哀又曰鳥獸不可與同羣爾雅曰鳥之雌雄不可别者以翼右掩左雄左掩右雌鳥少美長醜為鶹鷅二足而羽謂之禽春秋孔演圖曰鳥化為書孔子奉以告天赤鵲集書上化為黄玉刻曰孔提命仰應法為赤制又曰黑帝治五角之禽以觸民宋灼注曰陽數五也瑞應帝王世紀曰禹葬㑹稽有羣鳥為民田春耕則銜去草根秋則啄除其蕪穢謂之鳥社禽經曰山禽之咮多短水禽之咮多長山禽之尾多修水禽之尾多促林鳥以朝嘲水鳥以夜㖡序命厯曰羲皇燧人始名物蟲鳥獸尚書考靈曜曰鳥為春候歸蔵啓筮曰金水之子其名曰羽蒙乃之羽民是生百鳥史記曰秦仲知百鳥之音與之語皆應焉又曰楚莊王即位三年不出號令日夜為樂令國中曰有敢諫者死無赦伍舉入諫莊王左抱鄭姫右抱越女坐鐘鼓之間伍舉曰願有進隱隱謂隱蔵其意曰有鳥在扵阜三年不蜚不鳴是何鳥也莊王曰三年不蜚蜚將冲天三年不鳴鳴將驚人舉退矣吾知之矣又曰楚襄王十八年人有好以弱弓微繳加歸雁之上者王聞而召之問焉對曰小臣之好射鶀音其鴈羅鸗徐廣曰鸗野鳥也音龍小矢之發也何足為大王道也且稱楚之大因王之賢所弋非直此也昔者三王以弋道徳五伯以弋戰國故秦魏燕趙者鶀鴈也齊魯韓衛者青首也青首小鳬有青首鄒費郯邳者羅鸗也外其餘則不足射也見鳥六䨇以喻上文秦趙等十二國故曰六雙唯王所取王何不以聖人為弓勇士為繳時張而射之此六雙者可得而囊載也其樂非特朝夕之樂也其獲非特鳬雁之實也漢武故事曰武帝作玊堂以玉璧薄椽頭鑄為大鳥黄金塗長五丈栖屋上續漢書曰楊震将􅌾大鳥来止亭樹下地安行到柩前正立低頭淚出衆人更共摩取抱持終不驚駭其鳥五色髙丈餘兩翼長二丈三尺人莫知其名也魏志曰髙唐隆臨終上疏諫明帝臣觀黄初之際天兆其戒異類之鳥育長鷰巢口爪俱赤此魏室之大異也晉書曰趙王倫篡位時有異鳥行於殿上問羣下皆不知名其日向夕宫西有素衣小兒言是服劉鳥倫使録小兒并鳥閉置空室明旦開視户如故並失人鳥所在倫目上有瘤以為妖焉南史曰甄括字彦約中山無極人也居江陵數歳䘮父哀感有若成人家貧養母常得珎羞及居䘮廬於墓側恒有鳥𤣥黄雜色集於廬樹括哭則鳴括止則止齊書曰曲江公蕭欣年七歳出齋時有一左右小兒善弹飛鳥無不應弦墜落欣曰凡戱多端何急弹此鳥自空中翔飛何闗人事左右感其言遂不復弹鳥梁書曰何𦙍居獸丘西寺講經論學徒隨之有異鳥如鶴集講堂馴狎如家禽南史曰海中浮鵠山去地千餘里上有女人年三百歳有女道士百四十五人年並出百俱在學道遣士獻紅席梁武帝方捨身時其使適至云其草常有紅鳥居下故以為名觀其圖狀則鸞鳥也又曰梁武帝捨身時有男子不知何許人於衆中自割身以飼饑鳥血流遍體而顔色不變開講日有三足鳥集殿之東户自户適於西南縁楣三飛三集白雀一見於重雲閣前李樹後魏書曰波斯國有鳥形如槖駞有羽翼飛而不能髙食草與肉亦能噉火又曰彭城王􅎰従沔北除使持莭都督南征諸軍事立中軍大將軍府􅎰於是親勒大衆須臾有二大鳥従南而来一向行宫一向府幕各為所獲􅎰言於帝曰始有一鳥望旗顛仆臣謂大吉帝戲之曰鳥之畏威豈獨中軍之略也吾亦分其一耳此乃大善北史曰后周盧勣為渭州刺史鳥䑕山絶壁千仞由来乏水諸羌苦之勣馬足所踐急泉湧出有白鳥翔飛止㕔前乳子而後去人為之謡曰我有丹陽山飛玉漿濟我夷人神鳥来翔隋書曰焬帝征遼東帝舎臨頓見大鳥丈餘縞身朱足游泳自若上異之詔虞綽為銘帝覽而善之命有司勒於海上又曰大業十二年二月甲子夜有二大鳥似鵰飛入大業殿止於殿堦至明而去又曰王世充將欲簒位羅取雜鳥書帛繫其頸自言符命而散放之或有弹射得鳥而来獻者亦拜官爵唐書曰太宗謂禇遂良學問稍長性亦堅正既冩忠誠甚親附於朕譬如飛鳥依人自加憐愛又曰永徽中吐蕃大羅國獻大鳥髙七尺其足似駞有翅而能飛日行三百里能噉銅鐡夷俗呼為駞鳥上以太宗懷逺所致獻於昭陵乃刻象於陵之内又曰永徽中萬年宫有小鳥生大鳥又曰大厯八年有大鳥見於武功縣羣鳥隨而噪之武功縣神䇿行營將張白芬射而獲之以獻是鳥兩翅有四足足有爪長四尺三寸其尾色赤形類蝙蝠又曰大中十年舒州吳塘堰有衆禽成巢闊七尺髙一丈而水禽山鳥鷹隼燕雀之類無不馴狎又有鳥人靣緑毛爪喙皆紺色其聲曰甘人呼為甘蟲莊子曰飛鳥之影未嘗動也文子曰有鳥將張羅待之得鳥者一目也今為一目之羅即無得鳥時孫卿子曰鳥窮則噣人窮則詐淮南子曰鳥排空而飛獸厥實而走又曰射者扞烏號之弓彎綦衛之箭重之逄䝉子之巧以要飛鳥猶不與羅者競多何則以所持之小也張天下以為之籠因江海以為之罟又何亡魚失鳥之有乎又曰一目之羅不可以得鳥無餌之鈎不可以得魚待士無禮不可以得賢又曰毛羽者飛行之類也故屬於陽又曰繫舟水中鳥聞之髙翔魚聞之沉淵又曰鳥不于防者雖近弗􅀈鳥燕之屬是也其當道者雖逺弗釋當道謂作防客者故曰不釋也又曰夫飛鳥主巢狐狸主穴巢者巢成而得棲焉趨舎行義亦人之所棲宿也又曰鳥魚皆生於隂屬於陽故鳥魚皆卵魚逰於水鳥翔扵雲又曰羽嘉生飛龍羽嘉羽蟲之先也飛龍龍之有羽者飛龍生鳯凰鳯凰生鸞鳥鸞鳥生庶鳥凡羽者生扵庶鳥也又曰蒲且之連鳥於百仭之上而詹何之鶩魚於大淵之中此皆得清淨之道也又曰羽者嫗伏毛者孕育淮南畢萬術曰人靣擊地飛鳥自下取蘗木為人形似鳥面血塗人靣以擊地鳥自飛下抱朴子軍術曰衆鳥羣飛徘徊軍上不過三日有暴兵至焉鳥聚軍中將當賞功増秩鳥集將軍之旗將軍増官鳥集軍中莫知其名敗軍也阮子曰髙鳥擇木而集智士擇主而翔晏子春秋曰景公射鳥野人駭之公令吏誅之晏子曰鳥獸故非人所養野人駭之不亦宜乎公曰善自爾已来一弛鳥獸之禁又曰景公好弋使顔涿聚主鳥而亡公召欲殺之晏子曰涿聚有三罪為君主鳥而亡之一也使君以鳥殺人二也諸侯聞之以君重鳥輕士三也公曰勿殺之春秋後語淳于髠曰夫鳥同翼者聚飛而獸同足者俱行各有儔也又曰魏有吏羸脉者與王處廩下仰見飛鳥引弓虛發而鳥墮下魏王怪而問曰何以得致此羸脉曰此蘗生也王曰先生何以知之對曰其飛徐其鳴悲其飛徐者故瘡痛也其鳴悲者久失羣也故瘡未息而驚心未去聞弦音烈而髙飛故隕也蘗餘也先被傷而餘瘡未差故聞弦聲而舊瘡驚而隕也羸五違切瘡與創同又曰燕王使騎刼代將樂毅奔趙士卒離心田單乃令城中食者先祭先祖於庭中飛鳥悉飛舞其上啄其食燕人皆怪之穆天子傳曰曠原之野飛鳥之所觧羽春山飛鳥之所栖息清水温泉飛鳥百獸之所飲食家語曰孔子在衛顔回侍側聞哭聲甚哀子曰回汝知此何哭對曰此哭非但為死又為生離回聞桓山之鳥生四子焉羽翼既成将分於四海其母悲鳴而送之哀聲有似於此謂其往而不返也回竊以音類而知之又曰蒼鳥羣飛孰使萃之蒼鳥蒼鷹楚辭曰稷維元子帝何笁之投之于氷上鳥何燠之笁厚也篤也一曰笁字當為天祝予之祝投棄也燠温也鳥以羽翼覆温之白虎通曰鳥能飛何鳥者陽也飄輕故飛也禽者何鳥獸之摠名明為人所禽制蔡邕月令章句曰天官五獸前有朱雀鶉火之體凡鳥生於水衝波傳曰顔淵子路於洙泗見五鳥色曰焚巢之鳥也廣志曰東齊多鳥爵千百為羣小戶種植咸以爵為患博物志曰子路與子貢過鄭神社社樹有鳥子路捕鳥神社牽攣子路子貢説之乃止又曰稽山之隂禹塟焉聖人化感鳥獸故象為民佃春耕鳥啣㧞草根秋啄除其穢故縣官禁民不得殺傷此鳥犯者刑之無赦會稽典録曰夏方字文玉家遭癘父母伯叔一時死凡十三䘮方年十四晝則負土哀號暮則撫棺哭泣比葬年十七烏鳥集聚猛獸乳其側幽明録曰苻堅時有射師經嵩山望見松上有一䨇白鳥似鵠而大至樹下又見一蛇長五丈許上樹取鳥未至鳥一丈鳥便欲飛蛇張口飲之鳥不得去相持一食頃鳥轉欲困射師引弩射三矢蛇隕而鳥得颺去須臾雲晦雷發驚耳駭目而鳥廻其上毛落紛紛雷息電滅鳥亦髙飛十洲記曰東海祖洲有不死之草似菰苖秦始皇時死者横道有鳥如烏狀銜此草以覆死人靣登時起坐而遂活異苑曰蘭陵昌慮縣華山有井鳥巢其中金喙黑色而圓翅此禽見則大水荆楚歳時記曰春分日民並種戒火草於屋上有鳥如烏先雞而鳴架架格格民候此鳥則入田以為候人架犁格也又曰夏七月有鳥名穫榖其聲自呼農人候此鳥則犁耙上岸太平御覽卷九百十四
