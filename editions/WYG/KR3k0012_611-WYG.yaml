  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_611-1a, image: WYG0898/WYG0898-0528c.png}
body:
  text: 太平御覽卷六百十一宋李昉等撰學部五勤學史記曰蘇秦洛陽人與魏人張儀同師事鬼谷先生讀書至睡秦輒引錐刺股血流至踝漢書曰董仲舒廣川人景帝時為博士少躭學業下帷讀書弟子傳以相授莫見其面十年不窺園圃乗馬三年不知牝牡又曰路温舒字長君父使牧羊温舒取澤中蒲截以為牒編用寫書後漢書曰桓榮字春卿沛國龍亢人也少與族人元卿俱在田捃拾而榮開書讀之講誦不息元卿􅅓榮曰但自苦氣力何時復施用乎榮笑不應日夜不倦世祖聞召拜議郎使人教授太子帝稱善曰得生幾晚後為太子少傅帝賜其車馬衣服榮得之陳於庭謂父兄曰此吾稽古之力也元卿嘆曰我本農家子豈意學之為利乎又曰法真隠居大澤講論術藝歴年不窺園圃又曰何休作公羊解詁覃思不窺園者十有七年又曰趙昱常就東莞綦母公受公羊傳至厯年潛思不窺園門親疎稀見其面又曰張霸字伯饒成都人好學七嵗通春秋復欲進餘經父母曰汝小未能也霸曰我饒為之故字伯饒四遷侍中謝承後漢書曰戴封字平仲年十五詣大學師事東海申君申君卒送喪到東海道經其家父母以封當還豫為娶妻封暫過拜親不宿而去又曰髙鳳字文通南陽葉人家以農畝為業而勤學專精讀誦妻嘗之田曝麥於庭令鳳護之懼雞以竿授之時天暴雨而鳳持竿讀書不覺潦水大至流其麥矣又曰袁閎傳黄巾賊起攻没郡縣百姓驚散閎誦經不移賊相約語不入其閭鄉人就閎避難皆得全免又曰曹襃博雅疎通尤好禮士常憾朝廷制度未備慕叔孫通為漢禮儀晝夜研精沉吟專思寝則懐抱筆札行誦習文書當其立志忘所之適又曰承宫少孤年八嵗為人牧豕鄉里徐子盛者以春秋經授諸生數百人宫過息廬下樂其業因就聽經續漢書曰宫過徐子盛好之因棄其豬而留聽經主怪其不還求索得宫欲笞之門下生共禁止因留之為諸生拾薪執苦數年勤學不倦又曰崔琦字子瑋濟北相瑗之宗也引古今成敗以戒梁冀冀不能受乃作外戚箴又作白鵠賦以為諷後除臨濟長不敢之職解印綬去冀令刺客求之見琦耕於陌上懐書一卷息輙偃而詠之刺客賢之實告琦因得脱走又曰荀爽字慈明幼好學太尉杜喬見而稱曰可為人師爽遂躭思經籍慶弔不行徵命不應司馬彪續漢書曰杜喬字叔榮其祖二千石以孝稱雖二千石子常歩擔求師又曰李固少有雋才雅志好學為三公子常躬歩驅驢負書隨師魏志曰楊俊同郡王象少孤為人僕𨽻年十七見使牧羊而私讀書因獲捶楚俊美其才即贖著家中聘娶立屋然後與别居官至散騎常侍魏畧曰常林少單貧為諸生帶經耕鋤其妻自擔餉饋之相敬如賓又曰賈逵字梁道好春秋左傳及為牧守常自課讀之月一遍蜀志曰譙周字允南躭古篤學家貧未嘗營產業誦讀典籍欣然獨笑以忘寝食研精六經頗曉天文而不留意諸子文章非心所存呉志曰魯肅為人方嚴寡於玩飾治軍整頓禁令必行雖在軍陣手不釋卷又曰闞澤字徳潤山隂人常為人傭書所寫誦之亦過虞溥江表傳曰張紘事父至孝居貧躬耕稼帶經而鋤孜孜汲汲以夜繼日至於弱冠無不窮覽晉書曰王育少孤貧為人傭牧羊豕近學堂常有暇拾薪以顧書手抄書板截蒲以學書日夜不止亡失羊豕其主笞之育甚有慙色將鬻已以償於是郭子敬聞而嘉之代育還羊豕給其衣食令育與其子同學育博通經史仕偽漢官至太傅又曰車𦙍字武子南平人勤學不倦家貧常不得油夏月則練囊盛數十螢火以照書晉中興書曰孫盛字安國為秘書監好學自少及長手常不釋卷既居史官乃著晉陽春秋又曰劉實長不滿三尺績學不倦雖居官職至於皓首手不釋卷崔鴻春秋前燕録曰豫州刺史張怖字文祖清河武城人也怖少孤貧隨母長於舅氏令其牧牛怖幼而好學事母以孝聞每日必於牧牛之暇採樵二束菜二本一以供母一以雇人書晝則折木葉學書夜則以所書者讀之宋書曰沈攸之字仲逹晚好讀書史漢事多所諳憶常嘆曰早知窮達有命恨不十年讀書又曰鄭鮮之字道子滎陽開封人鮮之下帷讀書絶交游之務又曰王歆字體泰瑯琊人家貧好學三日絶糧執書不輟父母家人或謂之曰困窮如此何不耕農為求活乎歆答曰我當以典籍自耕耳武帝以其博學有文才累遷中書侍郎揚州牧後魏甄琛中山人也舉秀才入都累嵗常以奕碁通夜不止手下蒼頭奴常令執燭或時睡則加杖如此非一奴不勝痛楚乃曰郎君辭父母仕宦若為讀書執燭不敢辭罪今博奕是何事也琛惕然大慚遂寫書研習經史聞見日優仕至侍中蕭子顯齊書曰顧歡字景怡呉郡鹽官人也年六七嵗書甲子有簡三篇歡推計遂知六甲家貧父使驅田中雀歡作黄雀賦雀食稻過半父怒欲撻之見賦乃止鄉中有學舍歡貧無以受業於舍壁後倚聽無遺忘者八嵗誦孝經詩論及長篤志好學母年老躬耕誦書夜則燃糠自照又曰隱士沈驎士遭火燒書數千卷驎士年過八十耳目猶聪明以火故手抄冩燈下細書復成二三千卷滿數十篋南齊春秋曰江泌字士清少貧晝日斫屧夜讀書隨月光握卷升屋北齊書曰杜弼字輔𤣥髙祖命弼帶并州驃騎府長史弼性好名理探味𤣥宗自在軍旅帶經從役又曰李鉉字寳鼎家素貧苦常春夏務農秋冬入學三冬不畜枕每至睡時假寐而已後魏書曰李道固衞國頓丘人髙祖賜名焉家寒少孤有大志好學不倦初受業於長樂監伯陽稱美之晩與漁陽髙悦北平陽尼等將隱於名山不果而罷悦兄閭博學髙才家富典籍遂於悦家手抄口讀不暇寝食三國典畧曰齊右僕射富平子魏收字伯起鉅鹿曲陽人幼習騎射欲以武藝自達太學博士鄭伯猷調之曰魏郎弄㦸多少收慙悟乃折節讀書坐板牀積年板亦為之鋭減収常為庭竹賦以自發名伯猷謂之曰卿不值老夫猶當逐兎後周書曰樊深博物性好學老而不怠朝暮往還常據鞍讀書至馬驚墜地損折肢體終亦不改後除國子博士梁史曰沈約十三而遭家難潛竄㑹赦乃免既而流寓孤貧志好學晝夜不釋卷母恐其以勞生疾常遣減油滅火而晝之所讀夜輙誦之遂博通羣籍善屬文濟陽蔡興宗聞其才而善之及為郢州引為安西外兵叅軍記室興宗嘗謂其諸子曰沈記室人倫師表宜善事之梁書曰韋叡族弟愛字孝友沉靜有器局年十二常遊京師值天子出遊南苑邑里諠譁老幼爭觀愛坐讀書不釋卷宗族莫不異之沈峻字士嵩師事宗人沈驎士嵩在門下積年晝夜自課或睡寐輙以杖自擊其篤志如此又曰江革字休暎考城人吏部郎謝眺常過革第時大雪見革敝絮單席而躭學不倦眺乃脱其所著衣并手割半氊與革後建安王為雍州刺史表求記室人或薦之以為征北記室叅軍與弟觀少長共居不忍離别苦求同行叅軍沈約任昉同與革書曰此雍府妙選英才文房之職總卿昆弟可謂馭二龍於長途騁騏驥於千里又曰劉峻字孝標平原人勤學去學舍五六里常行讀書不輟地有坑坎每常倒蹶然後始悟隋書曰皇甫績字功明三嵗而孤為外祖韋孝寛所鞠養常與諸外兄博奕孝寛以其惰業篤以嚴訓愍績嘆曰我無庭訓養於外氏不能克躬何以成立深自感激命左右自杖孝寛聞而對之流涕於是學問渉經史又曰盧思道字子行年十六遇中山劉松為人作碑以示思道讀之多所不解於是感激閉戸讀書師事河間邢子才後思道為文以示劉松松又不能甚解思道乃喟然嘆曰學之有益豈徒然哉又曰劉炫字光伯少以聰敏見稱與信都劉焯閉戸讀書十年不出又曰王邵篤好經史遺落世事用思既專性頗怳忽至對食閉目凝思盤中之肉輙為僕從之所噉邵弗之覺唯責肉少數罰厨人厨人以情白依前閉目伺而獲之厨人方免笞辱其專固如此唐書曰李磎昭宗朝為宰相磎自在臺省聚書至多手不釋卷時人號曰李書樓所撰文章及註解書傳之間疑近百餘卷經亂悉亡世説曰管寧華歆常同席讀書有乗軒冕過門者寧讀書如故歆出觀寧割席分坐曰子非吾友也邴原别傳曰原字根矩家貧早孤隣有書舍原過其傍而泣師問曰童子何悲原曰一則羡其不孤二則羡其得學師亦哀原之言而為之泣曰童子茍有志我徒相教不求資也楚國先賢傳曰孫敬好學時欲寤寐奮志懸頭屋梁以自課常閉戸號為閉户先生廬江七賢傳曰文黨字翁仲欲逰學時與人俱入叢木謂侣人曰吾欲逺學先試投我斧高木上斧當掛乃仰投之斧果上掛因之長安受經七賢傳曰阮籍有竒才異質或閉戸讀書連月不出或遊行丘林經日不返益都耆舊記曰朱倉字雲卿廣漢人畜錢八百文之蜀從處士張寧受春秋糴小豆十斛肩之為糧閉戸精誦寧矜憐之歛得米二十石倉不受嵇康髙士傳曰逢真王莽辟不至嘗為杜陵門下掾終身不窺長安但閉戸讀書未嘗問政吕氏春秋曰甯越中牟之鄙人也苦耕稼之勞謂其友曰何為而可以逸此苦也其友曰莫如學學三十年則可以逸矣甯越曰請以十五嵗人將休吾不休人將卧吾不卧學十五嵗而齊威公師之世要論曰有讀書倦而刺其掌墨子曰墨子使衛載書甚多强唐子見而怪之又曰昔周公旦朝讀書百篇夕見七十士相天子猶如此況無事敢廢此乎鄒子曰朱買臣孜孜脩學不知雨之流粟漢武帝洞㝠記曰董謁字仲𤣥出隱無常常息人家於座以筆題掌還以竹籜寫之書竟䑛掌中加以少來精動䑛之累爛世謂之董仲𤣥掌録西京雜記云匡衡好學貧無燭隣家甚富穿壁引光照書漢書曰倪寛千乗人受業孔安國在太學為弟子都養太平御覽卷六百十一
