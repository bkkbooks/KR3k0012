body:
  text: 太平御覽巻六百二十四宋李昉等撰治道部五三管子曰國有四維一維絶則傾二維絶則危三維絶則覆四維絶則滅傾可正危可安覆可起滅不可復措也四維一曰禮二曰義三曰亷四曰恥又曰政之所行在順民心政之所廢在逆民心民惡憂勞我佚樂之民惡貧賤我富貴之民惡危墜我安存之民惡滅絶我生育之又曰凡牧民者使士無邪行女無淫事士無邪行教也女無淫事訓也教訓成俗而刑罰省也又曰善為國者使民若饑魚之歸餌渴馬之走飲也又曰堯舜之民非生而治桀紂之民非生而亂治亂在上也又曰聖人設度量置儀法如天地之堅如列星之固如日月之明如四時之信然後令徃而民從之老子曰治大國若烹小鮮烹小鮮不敢撓恐其糜也治國煩則亂治身煩則精神散以道莅天下者其鬼不神以道徳治天下則鬼不敢見其精神以犯人也又曰聖人虛其心實其腹弱其志强其骨常使民無知無欲使夫知者不敢為也為無為則無不治矣又曰聖人無恒心以百姓心為心善者吾善之不善者吾亦善之信者吾信之不信者吾亦信之欲善信者吾因而善信之不善信者吾亦以善信教之聖人在天下惵惵為天下渾其心聖人治天下常惵惵用心心皆為天下百姓皆注其耳目聖人皆孩之百姓傾注耳目以觀聽聖人視百姓如嬰兒又曰以政治國以竒用兵以無事取天下以政教治國以竒計用兵皆不合道惟無事可以取天下吾何以知其然哉以此下文知之天下多忌諱而民彌貧國多忌諱人失作業故貧人多伎巧竒物滋起法令滋章盜賊多有法令益明竊盜為奸盡成盜賊故聖人云我無為而民自化我好静而民自富我無事而民自正我無欲而民自朴又曰其政悶悶其民淳淳其政察察其民􅆙􅆙文子曰水濁則魚噞政苛則民亂墨子曰葉公子髙問政于仲尼曰善為政者若何對曰善為政者逺者近之而舊者新之墨子聞之曰葉公子髙未得其問也仲尼亦未得其對也孟子曰為髙必因丘陵為下必因川澤為政必因先王之道孫卿子曰魯有子訟父者康子曰殺之孔子曰不教而誅之是虐殺不辜三軍之敗不可誅也獄行不治不可刑也上陳教而先服之則百姓從風矣先教而後刑則民知罪矣夫一仭之牆民不能踰百仭之山童子升而游焉陵遲乆矣能謂民弗踰乎訟者聞之乃請無訟荘子曰至徳之世山無蹊隧澤無舟梁烏鵲之巢可攀援而闚又曰聞在宥天下不聞治天下在之者恐天下之淫其性也宥之者恐天下之遷其徳也天下不淫其性不遷其徳豈有治天下者哉不淫不遷無為守分性既正矣徳又定焉人皆治道何勞布政有治天下者哉昔堯之治天下也使天下欣欣然人樂其性也是不恬也桀之治天下也使天下瘁瘁焉人苦其性是不愉也夫不恬不愉非徳也非徳而可長乆者天下無之也又曰黄帝將見大隗于具茨之山適遇牧馬童子問塗焉曰若知具茨之山乎曰然若知大隗之存乎曰然黄帝曰異哉小童非徒知具茨之山又知大隗之所存請問為天下小童曰夫為天下者亦奚以異乎牧馬哉亦去其害馬而已矣又曰黄帝立為天子十九年令行天下聞廣成子在崆峒之上故徃見之曰吾欲取天地之精以佐五穀以養民人又欲官隂陽以遂羣生為之奈何廣成子曰而所欲聞者物之質也而所官者物之殘也自而治天下雲氣不待族而雨草木不待黄而落日月之光益以荒矣而佞人之心翦翦焉又奚足以語至道哉翦翦狹劣也尸子曰范獻子泛於河大夫皆在君曰孰知欒氏之子大夫莫答舟人清涓捨檝答曰君奚問欒氏之子若脩晉國之政内得大夫外不失百姓雖欒氏之子其若君何若不脩晉國之政内不得大夫而外失百姓則舟中之人皆欒氏子也君曰善申子曰明君治國而晦晦而行行而止止故一言正而天下定一言倚而天下靡商君書曰善治者使跖可信不能治者使伯夷可疑韓子曰或曰景公不知用勢師曠晏子不知除患夫獵者託車輿之安用六馬之足使王良左轡則身不勞而易及輕獸國者君之車勢者君之馬不乗君之車不因馬之利釋車而下走者也故曰景公不知用勢之主師曠晏子不知除患之臣也又曰桓公謂管仲曰官少而索者衆索求也寡人憂之管仲曰君無聴左右之請因能而授禄因功而與官人莫敢索君何憂焉又曰堯舜在上位雖有十桀紂而不能亂者勢治也桀紂在上位雖有十堯舜而不能治者勢亂也又曰徒慕毛嬙西施之美無益吾面用脂澤粉黛則倍其初明法度必賞罰則國富而治法度賞罰者國之脂澤粉黛也孔叢子曰夫子適齊晏子就其館既燕而私焉曰齊其危夫譬若載無轄之車以臨千仞之谿其不顛覆亦難兾也子吾心也子以齊為遊息之館當或可救子幸不吾隠也夫子曰死病不可醫夫政令者人君之銜轡所以制下也今齊君失之已乆也子雖欲挾其輈而扶其輪良弗及也抑猶可以没齊君及子身過此而徃齊其田氏矣又曰定公問曰周書所謂庸庸祗祗威威顯民何謂也孔子曰不失其道明之於民之謂也夫能用可用則政治矣敬可敬則尚賢矣畏可畏則省刑矣人君審此三者明以示民而國不興未之有也又曰哀公問書稱䕫曰於予擊石拊石百獸率舞庶尹允諧何謂也孔子對曰此言善政之化乎物也古之帝王功成作樂其功善者樂和樂和則天地且猶應之况百獸乎䕫為帝舜樂正實能以樂盡治禮之情公曰然則政之大本莫尚䕫乎孔子曰夫樂所以歌其成功非政之本也衆官之長既咸熈熈然後樂乃和焉又曰孔子之衛衛將軍文子問曰吾聞魯公父氏不能聴獄信乎孔子曰不知其不能也夫公父氏之聴獄有罪者懼無罪者恥文子曰有罪者懼聴之察刑之當也無罪者恥何恥乎孔子曰齊之以禮則民恥矣刑以止刑則民懼矣文子曰今齊之以刑刑猶弗勝何禮之齊孔子曰以禮齊民譬之於御則轡也以刑齊民譬之於御則鞭也執轡于此而動于彼御之良也無轡而用䇿則馬失道矣文子曰以御言之左手執轡右手運用不亦速乎若任轡無䇿馬何懼哉子曰吾聞古之善御者執轡如組兩驂如舞非䇿之助也是以先王盛于禮而薄于刑故民從命也廢禮而尚刑民彌暴矣又曰子思問於夫子曰伋聞夫子之詔正俗化民之政莫善於禮樂也管子任法以治齊而天下稱仁焉是法與禮樂異用而同功也何必但禮樂哉子曰堯舜之化百世不輟仁愛之風逺矣管仲之智足以定法材非管氏而專任法終必亂成矣又曰新桓固謂子順曰賢者所在必興化致治今子相魏未聞異政而即自退其有不得志者乎何去之速也答曰以無異政所以自退也且死病無良醫今秦有吞食天下之心以義事之固不獲安救亡不暇何化之興昔伊摯在夏吕望在商而二國不治豈伊吕之不欲哉勢不可也又曰尹曾謂子魚子之讀先王之書將奚為答曰為治也世治則助之行道世亂則獨治其身治之至也又曰建初元年大旱天子憂之問羣臣政教得失子豐乃上疏曰臣聞為不善而災至得其應也為善而災至遭時運之㑹耳非政所致也昔成湯遭旱因自責省畋散積減御損膳而大有年意者陛下未為成湯之事焉天子納其言淮南子曰治國者若耨田去其害苗而已今沐者墮髮而猶為之不已以其所去者少所利者多又曰聖主之治政也猶造父之御也齊輯乎轡銜之際而緩急乎唇吻之和正度乎胷臆之中而執節乎掌握之間内得于中心外合于馬志是故能進能退履繩而旋曲中規取道致逺而氣力有餘誠得其術也是權勢者人主之車輿也大臣者人主之駟馬也體離車輿之安而手失駟馬之心能無危者古今未之聞也是故輿馬不調王良不能取道君臣不和唐虞不能為治執術以御之則管晏之智盡矣明分以治之則跖蹻之奸止矣又曰惠子為惠王為國法惠王梁惠王也惠子惠王師也已成而示之諸先生示為國法先生皆善之奏之惠王惠王甚說之以示翟璜曰善惠王曰善可行乎翟璜曰不可惠王曰善而不可行何也翟璜對曰今夫舉大木者前呼邪許後必應之此舉重勸力之歌也豈無鄭衛激楚之音哉然而不用者不若取其宜也治國有禮不在文辯故老子曰法令滋章盜賊多有此之謂也又曰田駢以道術說齊王齊王應曰寡人之治齊國也道術難以除患願聞國之政田駢對曰臣之言無政而可以為政譬之若林木無林而可以為林願王察其所謂而自取齊國之政焉己雖無除其患天地之間六合之内可陶冶而變化也齊國之政何足問哉又曰昔者五帝三王之莅政施教必用參伍何謂參伍仰取象于天俯取度于地中取法于人乃立明堂之朝行明堂之令明堂布政之宫有十二月之政令以調隂陽之氣而和四時之節以辟疾病之菑俯視地理以制度量察山林水澤肥墽髙下之宜立事生財以除饑寒之患中之考乎徳以制禮樂行仁義之道以治人倫而除暴亂之禍乃澄列金木水火土之性故立父子之親而成家别清濁五音六律相生之數以立君臣之義而成國察四時季孟之序立長幼之禮而成官此之謂參制君臣之義父子之親夫婦之辨長幼之序朋友之際此之謂五倫乃裂地而州之分職而治之築城而居之割宅而異之分財而衣食之立大學而教誨之夙興夜寐而勞之此治之紀綱也然得其人則舉失其人則廢又曰天地之生物也有本末其養物也有先後人之于治國也豈得無終始故仁義者治之本也今不知事脩其本而務治其末是釋其根而灌其枝也且法之生也以輔仁義重法而棄義是貴其冠履而忘其頭足也故仁義者為厚基者也不益其基而張其廣者毀不益其基而増其髙者覆趙政不増其徳而累其髙故滅智伯不行仁義而務廣地故亡國語曰不基其棟不能任重重莫若棟基莫若徳國之有民也猶城之有基木之有根根深即本固基美則上寜又曰禹以夏王桀以夏亡湯以殷王紂以殷亡非法度不存也紀綱不振而風俗壊也三代之法不亡而世不治者無三代之智也六律具存而莫能聴者無師曠之耳也故法雖在必待聖而後治律雖具必待耳而後聴故國之所以存者非以有治也以有賢人也其所以亡者非以無法也以無聖人也又曰治國譬若張琴大絃不絙絙急也則小絃絶矣故急轡數䇿者非千里之御也清聲不過百里無聲之聲施于四海是故禄過其功者損名過其實者蔽情行合而名副之禍福不虛矣身有醜夢不勝正行國有妖祥不勝善政太平御覽卷六百二十四
