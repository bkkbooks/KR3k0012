body:
  text: 太平御覽卷八百九十四宋李昉等撰獸部六馬二史記曰造父以善御幸於周穆王御西巡守樂而忘歸又楚王有愛馬衣以文繡置華屋之下㗖以棗脯馬死欲以大夫禮塟之樂人優孟入殿門大哭曰請以人君之禮塟之以彫玉為棺文梓為槨豫章為題湊發甲卒為壙老弱負土諸侯聞之皆知大王賤人貴馬也王曰為之奈何曰請為王言六畜之塟以壟竈為椁銅䥶為棺齊以薑桂薦以木蘭衣以火光塟人腹中王乃以馬屬大官又曰陸地牧馬二百蹄牛蹄角於與千户侯等又曰東胡使求馬冒頓問羣臣羣臣曰千里馬匈奴寶也勿與冐頓曰與人隣國奈何惜一馬遂以與也又曰冐頓圍高祖於平城所騎西方盡白馬東方盡青龍北方盡烏驪南方盡騂馬又曰郭隗謂燕昭王曰臣聞古人有以千金求市千里馬而不能得於是與涓人金請為市之賫千金覔之而絶域有千里馬已死乃用五百金市其首而還王怒曰安用死馬首乎徒費五百金涓人笑曰死馬首尚用五百金况生馬乎天下以王好馬馬將至矣未期年果有獻千里馬者三匹又曰任安為衞將軍舎人與田仁㑹俱為舎人居門下同心相愛二人家貧無錢用以事將軍家監家監使養惡齧馬兩人同牀卧仁竊言監不知人哉任安曰將軍尚不知人何乃家監也又曰項王駿馬名騅常騎及被圍於垓下乃悲歌忼愾為歌詩曰力拔山兮氣蓋世時不利兮騅不逝及至烏江謂亭長曰吾騎此馬五嵗所當無敵嘗一日千里不忍殺以賜公又曰大宛有善馬在貳師城匿不肯與漢使天子既好宛馬使壯士車令等持千金及金馬以請宛王貳師城善馬宛國饒漢物相與謀曰貳師馬宛寶馬也遂不肯與漢使漢使怒妄言椎金馬而去宛貴人怒遮攻殺漢使取財物天子大怒拜李廣利為貳師將軍發屬國騎及郡國少年數萬人以伐宛期至貳師城取善馬漢書曰孝文皇帝時有獻千里馬者詔曰鸞旗在前屬車在後吉行日五十里朕乗千里馬獨先安之乃還馬又曰鄭當時以任俠自喜孝景時為天子舎人五日洗沐常置驛馬長安諸郊請謝賓客夜以繼日又曰萬石君過宫門闕必下車趨見輅馬必式焉又曰初天子發書易曰神馬當従西北來得烏孫馬好名曰天馬及得大宛汗血馬益壯更名烏孫馬曰西極馬宛馬曰天馬又武帝求賢詔曰馬或奔踶而致千里士有負俗之累而立功名夫泛駕之馬亦在御之而已又曰元狩二年馬生余吾水中元鼎四年馬生渥洼水中作天馬之歌又曰大宛國别邑七十餘城多善馬汗血言其先天馬子也又天馬歌曰太一貺天馬下霑赤汗沫流赭志俶儻精權竒籋浮雲晻上馳體容與迣萬里今安匹龍為友又歌曰天馬來従西極涉流沙九夷服天馬來歴無草徑千里循東道天馬來開逺門竦予身遊崑崙天馬來龍之媒逰閶闔觀玉臺又曰孝武之世聞天馬蔔萄則通大宛安息自是之後明珠文甲通犀翠羽之珍盈於後宫龍文魚目汗血之馬充於黄門又曰烏孫國大昆彌治赤谷城山多松柏不田作種樹隨畜逐水草與匈奴同俗國多馬富人至四五千匹又王褒聖主得賢臣頌曰及至駕齧膝驂乗旦王良執靶韓哀附輿縦馳騁騖忽如景靡過都越國蹷如歴塊追奔電逐遺風周流八極萬里一息何其遼哉人馬相得也又曰御史大夫衞綰奏馬髙五尺九寸以齒未平不得出闗又曰昌邑王賀召皇太后果下馬乗之後漢書曰光武時有獻名馬者日行千里又進寶劔價兼百金帝以馬駕鼔車劔賜騎士又曰劉盆子既立乗軒車大馬赤屏泥絳䄡絡又曰更始既誅王莾乃北都洛陽申屠建李松自長安送乗輿服御又遣中黄門從官奉迎遷都二年二月更始自洛陽而西初發李松奉引馬驚奔觸北宫鐵柱門三馬皆死又曰賈復持劉嘉書北渡河及光武於柏人因鄧禹得召見光武竒之禹亦稱有將帥節扵是署復破虜將軍督盜賊復馬羸光武解左驂以賜之又曰馬援於交阯得駱越銅鼔乃鑄為馬式還上表曰夫行天莫如龍行地莫如馬馬者兵甲之本國之大用安寧則以别尊卑之叙有變則以濟逺近之難昔有騏驥一日千里伯樂見之昭然不惑近世有西河子輿亦明相法子輿傳西河儀長孺長孺傳茂陵丁君都君都傳成紀楊子阿臣援嘗師事子阿受相馬骨法考之行事輙有効騐臣愚以為傳聞不如親見視影不如察形今欲形之於生馬則骨法難備具又不可傳之於後孝武皇帝時相馬者東門京鑄銅馬法獻之詔立於魯班門外更名魯班門曰金馬門臣謹依儀氏䩭中帛氏口齒謝氏唇鬐丁氏身中備此數家骨相以為法馬髙三尺五寸詔置宣德殿下以為名馬式卓茂為丞相府史嘗出行有人認其馬茂問曰子亡馬幾何時對曰月餘日矣茂有馬數年心知其謬嘿解與之挽車而去顧曰若非公馬幸至丞相府歸我他日馬主别得亡者乃詣府送馬叩頭謝之茂性不争如此又或問第五倫曰公有私乎對曰昔人有與吾千里馬者吾雖不受每三公有所選舉心不能忘而亦終不用也又曰光和元年京師馬生人又洪範五行傳云秦孝公二十一年有馬生人非其類也必有非其姓者其後始皇養吕不韋子終以絶嗣此非姓也又曰光和四年春正月初置騄驥廐丞領受郡國調馬豪右辜𣙜馬一匹至二百萬又曰明帝賜東平王蒼隂太后器服及大宛馬一疋血従前􅈩上小孔中出嘗聞武帝歌天馬霑赤汗今親見其然也又曰明德馬后過濯龍門上見外家問起居馬如游龍倉頭衣緑褠領袖正白顧視御者不及逺矣謝承後漢書曰朱震字伯厚性剛烈曾為従事奏濟隂太守單匡贓罪並連匡兄中常侍車騎將軍超三府喭曰車如雞棲馬如狗疾惡如風朱伯厚又曰桓典為御史是時宦官秉政典無所迴避常乗驄馬京師畏憚為之語曰行行且止避驄馬御史獻帝春秋曰曹操與吕布軍戰敗布得操騎而不知是操問曰曹使君何在荅曰騎黄馬者是也因得免魏志曰濊國出果下馬漢時恒獻之又曰龎惪禦關公親與公交戰射中額時惪常乗白馬公軍謂之白馬將軍又陳思王表文帝曰臣於武皇帝世得大宛紫騂馬一疋形應圖法善持頭尾教令習拜今已能拜又能行與鼓節相應謹以奉獻又文帝與孫權書曰前使于禁郭及夫所道吾纎驪馬本欲使禁自致之念將軍儻欲速得今故先以付徃此二馬朕常所自乗甚調良善走數萬疋選之真可樂也中國雖饒馬知名絶足亦時有耳又曰朱建平善相馬文帝將出取馬建平道遇之語人曰此馬之相今日死矣帝將乗馬馬惡衣香齧帝膝帝大怒即殺之魏書曰曹公所乗馬名絶影為矢所中傷頰及足呉書曰孫堅於西華失利堅被瘡墮馬卧草中軍衆分散不知堅所在堅所騎驄馬馳還營培地將士隨馬於草中得堅又曰諸葛恪為將蜀使至上謂使曰元遜為將軍君還蜀可報丞相為致佳馬恪起陳謝上曰卿未得馬何為謝對曰夫蜀陛下外廐陛下有詔臣必得之是以謝也呉志曰魏使以馬求易珠璣孔翠瑇􅈘孫權曰此皆孤所不用而可以得馬何苦而不聼與交易九州春秋曰初吕布騎將侯成遣客牧馬十五疋客悉驅馬去向沛城欲歸劉備吕布將騎逐之竟得馬還諸將合禮賀成成醸五六斛酒獵得十餘頭豬未飲食先持半豬五斗酒自入詣布前跪曰蒙將軍恩逐得所失馬江表傳曰孫策性好馬將步騎數百策驅馳逐鹿所乗馬精駿又曰孫權征合肥敗馬上津橋橋南已撤丈餘無板谷吉利在馬後使權持鞍撫鞚利於後著鞭以助馬勢遂得超渡太平御覽卷八百九十四
