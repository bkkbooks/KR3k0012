body:
  text: 太平御覽卷三百七十三宋李昉等撰人事部一十四毛髮鬢髻毛釋名曰毛貌也冒也在表所以别形貌且以覆冒也左傳僖中曰君子不禽二毛二毛頭有二色又襄五曰宋芮司徒生女子赤而毛弃諸堤下共姬之妾取以入名之曰棄長而美漢書曰宣帝身足下有毛卧居數有光耀師古曰遍身及足下有毛列子曰禽子問楊朱曰去子體一毛以濟一世為之乎楊子曰世故非一毛所濟出以語孟孫孟孫曰積一毛以成肌膚積肌膚以成一節一毛故萬分之一物奈何輕之山海經曰毛民為人身生毛郭璞注曰臨海東南海中有毛人晉永嘉四年得之也列仙傳曰偓佺食松實形體生毛長數寸又曰毛女字玉名姜在華隂山世又見之體生毛所止巖中恒有鼓琴聲自稱秦皇時宫人也神仙傳曰劉根學道入嵩髙山石室中冬夏不衣身毛長三尺神異經曰八荒中有毛人長七八尺身形頭上皆毛毛如獮猴長尺餘見人則口開吐舌名髯公一名髯猑尋陽記曰桓稜遣人尋廬山下嶺見毛人長大體悉毛語不可解山居道士亦時見此臨海異物志曰毛人洲王張與毛長短如熊周綽得毛人送詣秣陵髮釋名曰髮拔也拔擢而出歸蔵啓筮曰共工人面蛇身朱髮易説卦曰巽其於人也為寡髮毛詩􅅠柏舟曰鬒髮如雲不屑髢也鬒黒髮也如雲言羙長也又魚藻曰彼都人士臺笠緇撮彼君子女綢直如髮其性情宻緻操行正直髮之本末無隆殺彼都人士垂帶而厲彼君子女卷髮如蠆蠆螫虫也尾赤槤然似婦人髪未曲上卷也又采緑曰終朝采緑不盈一匊予髪曲局薄言歸沐局卷也婦人夫不在則不容飾令曲卷其髮憂思之甚也禮斗威儀曰君乗木而王為人美髮左傳僖中曰初平王東遷辛有適伊川見被髪而祭于野者曰不及百年此其戎乎其禮先亡矣僖公二十二年秦晉遷陸渾之戎於伊川又昭元年曰齊侯田于莒盧蒲嫳見泣且請曰余髮如此種種余奚能為嫳慶封之黨種種短也放之于境自言衰老不能復為之公曰諾子雅曰彼其髮短而心甚長其或寢處我矣又昭七年曰昔有仍氏生女黰黒有仍古諸侯也美髮為黰而甚美光可鑑髪膚光色可以照人名曰元妻以髪黒故又哀上曰公㑹呉子伐齊將戰公孫夏命其徒歌虞殯陳子行命其徒具唅玉唅玉亦示必死公孫揮命其徒曰人尋約吳髮短約繩也八尺為尋呉髪短欲以繩貫其首又哀上曰太伯端委以治周禮仲雍嗣之斷髮文身羸以為飾豈禮也哉言其權時制宜以辟灾害非以為禮也又哀下曰初衛侯自城上見已氏之妻髮美使髠之以為吕姜髢穀梁傳哀公曰吳夷狄之國斷髪文身論語憲問曰子曰微管仲吾其被髪左衽矣孝經曰身體髮膚受之父母不敢毁傷孝之始也史記曰箕子諫紂不聽乃被髪佯狂為奴又曰范睢先事魏中大夫湏賈賈使齊睢從齊王聞睢辯賜金及牛湏賈以為睢持隂事告齊既歸以告魏相魏齊大怒使笞擊范睢睢既相秦號曰張禄而魏弗知使湏賈於秦睢謂賈曰汝罪有㡬曰擢賈之髪續賈之罪未足也又曰太伯虞仲知古公欲立季歴以傳昌二人亡如荆蠻文身斷髮以讓季歴又曰藺相如使秦相如持璧却立倚柱怒髮上穿冠又曰衛皇后字子夫與武帝侍衣得幸頭解上見其髮鬢悦之因立為后漢書曰蘇武留匈奴凡十九嵗始以强壯出使乃還髮鬢盡白又王莽𫝊曰更始元年置百官莽聞之愈恐欲外示自安乃染其髮鬢楚漢春秋曰上敗彭城薛人丁固追上上被髮而顧曰丁公何相急之甚乃罵而去上即位欲陳功上曰使項失天下是子也為人臣兩心非忠也下吏笞之東觀漢記曰眀徳馬后美髪為四起大髻但以髮成尚有餘繞髻三匝又曰和熹鄧后六嵗諸兄持后髮后曰身體髪膚受之父母不敢毁傷孝之始也何弄人髪乎又曰劉盆子年十五被髮徒跣卒見衆拜恐怖啼泣謝承後漢書曰汝南李光字伯眀為兖州母亡後歸視牀處得亡母亂髮光持悲號氣絶復續又曰獻帝幸𢎞農郭汜虜畧百官婦女有美髪者皆斷取之又曰曹操逼獻帝廢伏后以尚書令華歆郗慮副勒兵入宫收后閉户蔵壁中歆就牽后出時帝在外殿后被髮徒跣行泣過訣曰不能復相活耶帝曰我亦不知命在何時魏志曰曹仁討雲長於樊于禁助仁秋大霖雨漢水溢禁等軍没禁遂降吳文帝踐祚權遣還見禁鬚髪皓白形容憔悴拜安遠將軍欲遣使吳先令謁髙陵帝預於陵屋圖禁降伏之狀禁慙恚發疾薨魏畧曰眀帝既嗣立追痛甄后之薨故郭太后以憂暴崩甄后臨没以帝屬李夫人夫人説甄后見譖之禍不獲大斂被髪覆面帝哀恨流涕命殯葬太后皆如甄后故事魏氏春秋曰眀帝天姿秀出立髮委地口吃少言而沉毅好斷吳志曰留賛為將臨敵必被髮呌天自抗音而歌左右應之戰無不捷王隠晉書曰陶侃為吏鄱陽孝㢘與親人過侃宿母截髮以供賔諸客歎曰非賢母不生此子也又曰顧悦之與簡文帝同年而髪早白上問故對曰松柏之姿經霜猶茂蒲栁之質望秋先凋又曰初武帝未為世子文帝問裴秀曰人有相不秀曰中撫軍垂髮至地伸手過膝非人臣之相也又曰故中牟令蘇韶字孝先咸寧初亡諸子迎䘮至襄城弟九子節夢見鹵簿行列甚肅見韶曰卿犯鹵簿應髠刑節俛受剔覺循見頭髪視截如大指大後又夢見韶截之節素美髪五截而盡沈約宋書曰臨川王義慶招集文士何長瑜自國侍郎至平西記室叅軍嘗於江陵寄書與宗人何朂以韻語序義慶州府僚佐云陸展染鬢髪欲以媚側室青青不解久星星行復出北齊書曰王琳字子衡山隂人也琳體貌閑雅髪垂委地齊書曰徐寅嘗有罪繫旦日原之而髮皓白武帝問其故曰臣思􅄽於内而髪變於外當時稱之唐書曰髙祖竇皇后生而髪垂過頸三嵗髮與身齊又曰龜兹國男女皆剪髮垂與項齊唯王不剪髪新羅國其婦人髪繞頭以綵為飾髪甚長美家語曰顔囘魯人字子淵年二十九髪早白韓子曰文公時宰人上炙而髮繞之又曰昔齊桓宫中有三市婦唱三百被髪而御婦人淮南子曰萬術曰理髮竈前婦安夫家帝王世紀曰老􅅨初生而髪白故號老子吕氏春秋曰殷湯尅夏而大旱湯乃以身禱於桑林剪其髮自以為犧牲祈福於上帝山海經曰脩般民白民其人被髮曹瞞傳曰太祖嘗行過麥中令士卒無敗麥犯者死騎士皆下馬持麥以相付時太祖馬騰入麥中太祖曰制法而自犯之何以帥下然孤為軍帥不可殺請自刑因㧞劍割髮置地許逵别傳曰薊子訓齊人有神術人髪白者請子訓但與對坐共語宿昔間髮皆黒樊英别傳曰英被髪忽㧞刀斫舍中妻問故曰郄生道遇鈔郄生還云道遇賊被髪老人相救得全郄生名巡字仲信陳郡夏陽人能傳英業黄庭經曰髪神名蒼華列仙傳曰容成公黄帝善補導事髮白更黒寗先生稷邱君髮白更黒寗先生被髪鼓琴赤斧餌丹砂毛髪皆赤阮邱被髪覆耳成璜道士兒邱與老子黄庭經讀三遍通之俱入浮陽山白髪更黒髪長二尺餘神異經曰東荒山中有大石室東王公居之長一丈頭髮皓白身人形而虎尾與一玉女更投壺又曰西方有人焉不飲不食被髮東走已往復来其婦恒追擥録之不肯聽止婦頭亦被名曰狂一名顛一名覆此人夫妻與天地俱生狂走東西以投晝夜異苑曰有人誤吞髮便得病但欲咽猪脂張口時喉中有一頭出受膏乃取小鈎餌而引得一物長三尺餘其形似蛇而悉是脂縣於屋間旬日融盡唯髪在焉列女傳曰吳伯陽妻顧昭君早寡剪髮以眀志又曰樂羊學書其妻貞義截髮以供其費又曰廣漢馮季宰妻者李氏之女名珥字進早寡無嗣奉養繼姑守心純固以義自防珥母愍其孤苦隂有所許珥斷髮自眀鄉人稱之陳留風俗傳曰小黄縣者宋地陽武東黄鄉也因黄水以名縣沛公起兵野戰䘮皇妣于黄鄉天下平定乃使使者梓棺招魂幽野於是丹蛇在水自洒濯入梓棺其浴處有遺髮故諡曰昭靈夫人益部耆舊傳曰蜀郡公乗㑹妻同縣張氏女也㑹早卒後欲問者女乃斷髮割耳以眀不嫁車頻秦書曰符堅建元十八年新羅國獻美女國在比濟東其人多美髪髪長丈餘林邑國記曰朱崖人多長髪漢時郡守貪殘縳婦女割頭取髮由是叛亂不復賔伏廣志曰黄頭夷髪黄如苕箒戴延之西征記曰陕縣大城西北角水漫漫起鬰勃萬數十丈有如物居水中父老云銅翁仲頭髪當與水齊晉軍至髮不復出唯見水黒嗟嗟有聲聲聞數里翁仲本在大司馬門外為賊所徙至此而没譚藪曰後魏盧景裕生而頭髪白有四十九莖因名曰白頭王子年拾遺録曰帝嚳髙辛氏娶於陬氏女女生而髮與足齊墜地能言乃納於帝又曰張儀蘇秦二人共遞剪髪以相活或傭工寫書行遇聖人之文無以題記則以墨畫於掌内及服裏還更以竹寫之晉左思白髮賦曰星星白髪生於鬢垂雖非青蠅穢我光儀䇿名觀國以此見疵將拔將鑷好爵是縻白髮將拔惄然自訴禀命不幸值君年暮逼廹秋霜生而皓素始覽眀鏡惕然見惡朝生晝拔何辠之故子觀橘柚一皜一曄貴其素華匪尚緑葉願戢子之手攝子之鑷咨爾白髪觀世之途靡不追榮貴華賤枯赫赫閶闔藹藹紫廬弱冠求仕童髫獻謨甘羅乗軫子竒剖符英英終賈髙論雲衢拔白就黒此自在吾白髮臨拔瞋目號呼何我之寃何子之誤甘羅自以辯慧見稱不以緑髪而名著賈生自以良才見異不以烏鬢而見舉聞之先民國用老成二老歸周周道肅清四皓佐漢漢徳光眀何必去我然後要榮咨爾白髪事故有以爾之所言非不有理曩貴耆老今薄舊齒皤皤榮期皓首田里雖有二毛河清難俟隨時之變見歎孔子髪乃辭盡誓以固窮昔臨玉顔今從飛蓬髪膚至昵尚不克終聊用擬辭比之國風鬢説文曰鬢頬髪也釋名曰其上連髪曰鬢鬢賔也賔崖也為面額之崖岸也晉書曰魏造凌雲殿牓未題匠誤定之使韋仲將縣橙書之比訖鬢髪盡白還戒子孫宜絶此法神仙傳曰薊子訓鄉曲諸老鬢髪白者使宿昔之間皆黒崔豹古今注曰魏文帝宫人絶所愛者有莫瓊樹薛夜来陳尚衣陳巧笑瓊樹始制為蟬鬢望之縹緲如蟬翼故曰蟬鬢述異記曰尹䧺年九十左鬢生角長半寸吳質表曰質已四十三矣白髪生鬢神相書曰雙眉插鬢上夀相也髻説文曰髻結髪也漢書曰尉他魋髻服雯注曰令兵椎頭結也續漢書五行志曰桓帝元嘉中京師婦女作墜馬髻者側在一邊自梁兾家所為京師皆效天戒若曰兾婦女將收捕吏卒頓令曳髻傾邪東觀漢記曰梁鴻妻椎髻着布衣操作具而前鴻大喜曰此真梁鴻妻也能奉我矣字之曰徳曜孟光又曰馬廖上表長樂宫曰長安語曰城中好髙髻四方髙一尺王隠晉書曰賈后作頡子髻太子見頡子象干寳晉紀曰初賈后造首紒以繒縳其髻天下化之名頡子紒也搜神記曰元康中婦人結髻者既成以繒急束其環名曰纈子髻始自中宫天下翕然化之及其末年有愍懐之事唐書曰田悦既敗謂其下曰吾不能自剄公當斬吾首以取功勲衆皆憐之曰死生以之悦曰吾雖死寧忘厚意於城下乎乃自割一髻以為要誓於是將士各斷其髪結為兄弟誓同生死唐書曰中天竺國人皆為螺髻於頂餘髪剪之使拳世説曰王曇孫年十四便歌謝公召至曇孫作兩丸髻梁兾别傳曰兾未誅時婦人作不聊生髻神仙傳曰麻姑至蔡經家是好女子年十八許作髻餘髪散垂之至腰枚乗梁苑園賦曰若乃採桑之婦連袖方路靡陁長髻便娟數顧太平御覽卷三百七十三
