front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_365-1a, image: WYG0896/WYG0896-0250a.png}
body:
  text: 太平御覽卷三百六十五宋李昉等撰人事部六面眉面説文曰面顔前也從􅔣音首象人面形􅀈音于願切面不正也頢昔括短面也頷音胡感切面黄也顬音刀丁切面痩淺顬顬也􅎼面慙赤也河圖曰蒼帝方面赤帝圎面白帝廣面黒帝深面周易革卦曰上六君子豹變小人革面禮記内則曰女子出門必擁蔽其面左傳僖三十三年曰晋侯敗狄于箕先軫免胄入狄師死焉狄人歸其元面如生言其有異于人又襄六年鄭子産曰人心之不同也如其面焉吾豈敢謂子面如吾面乎襄二十五年晉程鄭卒子産始知然明問為政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀也子産喜以語子太叔且曰他日吾見蔑之靣而已今吾見其心矣哀十六年楚白公作亂殺子西子期于朝而刼惠王子西以袂掩面而死葉公在蔡方城之外皆曰可以入矣及北門乃胄而進又遇一人曰君胡胄國人望君如望嵗焉日月以幾兾君來若見君面是得艾也艾安也史記曰孟戱中衍鳥身人面趙之先也漢書曰李夫人病篤上自臨候之夫人遂轉靣向壁歔欷而不復言又曰哀帝初即位博士申咸毁給事中薛宣不供養行喪服薄於骨肉不宜復列封侯使在朝省宣子沉為右曹侍郎數聞其語賕音求客楊明欲令創咸面目使不居位㑹司𨽻缺沉恐咸為之遂令明遮斫咸宫門外㫁鼻脣身八創事下有司沉减死一等宣坐免為庶人又曰朱博為左馮翊長陵大姓尚方禁少時曽盗人妻見斫創着其頰府功曹曰白除禁調守尉博聞知以他事召見視其面果有瘢博辟左右問禁是何等創也禁乃叩頭服博笑曰大丈夫固時有是因親信以為耳目又曰孔休守新都相休謁見莽莽縁恩意進其玉具寶劒欲以為好休不肯受莽因曰誠見君面有瘢美玉可以㓕瘢欲献其玉彘耳又曰張禹為兒數隨家至市喜觀於卜相者乆而頗曉其别蓍布卦意卜者愛之又竒其面貌謂禹父曰是兒多知可令學經東觀漢記曰耿秉為征西将軍鎮撫單于以下及薨南單于舉國發哀剺面流血後漢書曰應奉年二十時嘗詣彭城相袁賀賀時出行閉門造車匠於内開扇出半面視奉即委去後數十年於路見車匠識而呼之魏畧曰徐庶名福本單家子好任俠擊劒中平末嘗為人報讎白堊突面被髮而走蜀志曰張裕曉相術毎舉鏡照靣自知死刑未嘗不撲之于地又曰劉琰妻胡入賀太后太后令特留胡經月乃出胡有美色琰疑其與後主有私呼卒檛胡至於以履搏面而後弃遣胡告具言琰坐下獄有司議曰卒非檛妻之人面非受杖之地琰竟弃市吳志曰諸葛恪父瑾長面孫權大㑹羣臣使人牽一驢檢其面題曰諸葛子瑜恪跪曰乞請筆益兩字因聼與筆恪續其下曰之驢舉坐忻笑乃以驢賜恪王隠晋書曰趙孟字長舒入補尚書都令史善於清談有國士之風其面有疵黯諸事不决皆言當問疵面也晋中興書曰王珂為桓温主簿叅軍文武數萬人悉識其面晋書曰初王恭敗梟首於東街王平之抽槊刺其面又曰王温字元子豪爽有風槩姿貌甚偉面有七星又曰劉牢之面紫赤色鬢目驚人而沉毅多計又曰劉裕於東府聚摴蒱大擲一判應至數百萬餘人並黒犢唯裕及劉毅在後毅次擲得雉大喜褰衣繞床呌謂同座曰非不能盧不事此耳裕因挼五木乆之曰老兄試為卿答即成盧焉毅意殊不快然素黒其靣如鐵色焉宋書曰沈慶之謂帝曰耕當問奴織當問婢今論爭伐問白面書生事何由濟又曰明帝大㑹新亭接勞諸軍主摴蒱賭官李安人五擲皆盧帝大驚目安人曰卿面方如田封侯状也又曰劉瑀為右衛将軍因求益州甚不得意至江陵與顔竣書曰朱循之三世叛兵一日居荆州青油幕下作謝宣明面齊書曰東昏即位多行殺戮沈昭畧與沈文季徐孝嗣同召入省例賜藥酒昭畧罵徐孝嗣曰廢昏立明古今令典宰相無才致有今日即擲甌破面曰作破靣鬼時年四十後梁書曰宋如周有才學為度支尚書如周面狹長宣帝嘗戯之曰卿何謗法華經如周踧踖自陳不謗帝又言之如周懼而出告蔡大寶寶知其㫖笑謂之曰君當不謗餘經止應不信法華法華云聞經隨喜面不狹長如周乃悟後魏書曰清河王懌被誣見害朝野貴賤知與不知含悲䘮氣逺夷在京師聞懌䘮為之以刀劈面者數百人三國典畧曰髙長恭以淮南之亂恐為将帥嘆曰我去年面腄今年何為不發至是齊主使徐之範飲以毒藥長恭謂妃鄭氏曰我盡忠事上何辜於天而遭鴆賜之禍春秋後語曰秦急攻趙求救於齊齊王曰必以長安君為質兵乃出長安君者太后之小子也太后愛之不肯遣大臣强諌太后怒謂左右曰敢復言長安君為質者老婦必唾其面山海經曰大荒之山日月所入有顓頊之子三靣一臂不死郭璞注曰人頭三邉各有靣也又曰一目國一目中其面而居尸子曰子貢問孔子曰古者黄帝四面信乎孔子曰黄帝合巳者四人使治四方大有成功此之謂四靣也又曰禹長頸鳥啄面貌亦惡天下從賢之者學也孫卿子曰衛靈公有臣公孫吕身長七尺面長三尺廣三寸名動天下荘子曰孔子謂盗跖曰今将軍身長九尺二寸面目有光脣如激丹齒如含貝音中鐘聲而名曰盗跖丘竊為将軍耻之韓子曰古人目短於自見故以鏡觀燕子太子曰田光云脉勇怒而面青骨勇怒而靣白荆軻者神勇也怒而不變説苑曰吳王将死曰吾以不用子胥言以至於今死者無知則已死者有知吾何面見子胥也遂䝉絮覆靣自刎吕氏春秋同輿論曰袁紹妻劉性妬忌紹死其尸未殯殺其妾五人恐死者有知皆髠髪黒面論中曰小人耻其面不如子都君子耻其行不如堯舜譙周法訓曰昔有人使妻為母作粥妻不肯乃以刀劈傷妻面此可為孝乎傅子曰相者三亭九候定於一尺之面語林曰王武子與武帝圍碁孫皓㸔王曰孫歸命何以好剥人面皮皓曰見無禮於其君者則剥其皮乃舉碁局武子伸脚在􅈰下又曰劉眞長病積時公主毁悴将終喚主主既見其如此乃舉指之云君危篤何以自脩飾劉便牽被覆面背之不忍視又曰王右軍見杜宏治歎曰面如凝脂眼如㸃膝如神仙中人又曰何晏字平叔羙姿容帝疑其傳粉賜湯餅令晏食之汗出流靣拭之轉白世説同世説曰康僧淵目深而鼻髙王丞相毎調之僧淵曰鼻者面之山目者面之淵山不髙則不靈淵不深則不清又曰鍾㑹撰四本論始畢甚欲使稽康一見署懷中不敢出户外遥擲面便走郭子曰琅邪諸葛忘名面病鼠瘻劉眞長見嘆曰鼠乃復窟穴人面乎異苑曰陳郡謝石字石奴少患面創諸治莫愈乃自幽逺止於岩下中宵有物來䑛其創隨䑛隨除既不見形竟為是龍而䑛處悉白故世呼為謝白面㑹稽後賢記曰貞女謝仙女者謝承孫也吳歸命侯采仙女充後宫仙女乃炙面服醇醯以取黄痩竟得免黄帝八十一問曰人面獨能寒何也曰頭者諸陽之脉㑹也諸隂脉皆至頸項不還上獨諸陽脉上頭故面能寒耳相决曰奇毛生身及面皆豪貴白毫黒毛生共孔帶印綬蔡邕女戒曰夫心猶面首也一旦不脩飾則塵垢穢之人心不思善則邪惡入之人盛飾其靣而莫脩其心惑矣眉説文曰眉目上毛也釋名曰眉媚也有娬媚也毛詩淇澳碩人曰螓首蛾眉螓首顙廣而方巧笑倩兮美目盼兮尚書大傳曰堯有眉八如八字也淮南子同大戴禮曰曽子曰敢問不勞可以為名乎孔子愀然揚眉曰參女以明主為勞乎昔者舜左禹而右臯陶不下席而天下治禮説曰君子乗金而王為人美眉左傳定公八年曰公侵齊門于陽州顔息射人中眉顔息魯人退曰我無勇吾志其目也穀梁傳曰長狄兄弟三人逓為害㫁其首而載之眉見於軾戰國策曰豫讓欲報趙襄子㓕鬢去眉吞炭漆春秋後語曰呂不韋謂太后曰詐腐刑嫪毐則得給事中乃令人以腐罪告之㧞其鬚眉以為宦者漢書曰張敞為婦畫眉長安中傳京兆眉憮應劭曰憮大也孟康曰憮音詡北方人謂好為詡也東觀漢記曰王莽天鳳五年樊崇起兵於莒恐其衆與莽兵亂乃皆朱其眉由是號曰赤眉又曰明徳馬后眉不施黛獨左眉小缺補之以縹又曰馬援自還京數被進見為人鬒髯眉目如畫又曰梁鴻居呉賃舂毎歸妻為其食不敢於鴻前仰視舉案齊眉鄧粲晋記曰荆州民宗廞嘗以酒犯王平子怒叱左右捽廞郭舒厲色謂左右曰使君醉汝軰何敢妄動平子大恚曰别駕狂耶枉言我醉因遣炙舒眉頭舒跪受炙平子意釋而廞得免宋書曰王元謨在雍人言欲反元謨馳啓自觧帝知其虚馳遣主書呉喜公慰撫之曰七十老公反欲何求聊復為笑想足以伸卿眉頭耳元謨性嚴未曽妄笑時人言元謨眉目未曽伸故以此見戱梁書曰武寕王太威字仁容羙風儀眉目如畫三國典畧曰梁簡文方頰豊下眉目秀發隋書曰元暉字叔平河南洛陽人也父智鬚眉如畫進止可觀少得羙名于京師唐書曰毛若虚絳州太平人也眉毛覆於眼性殘忍初為蜀郡縣尉天寶末為武公丞年已六十餘矣帝王世紀曰文王虎眉列仙傳曰陽都女生而連眉衆以為異列仙傳曰莫耶子赤鼻眉濶一尺列仙傳曰干将子赤鼻眉廣三寸荆州先賢傳曰馬良字季常襄陽宜城人兄弟五人皆有令名良眉中有白毛鄉里頌曰馬氏五常白眉最良吳越春秋曰伍子胥眉間廣一尺韓子曰失鏡無以正鬚眉失道無以知迷惑吕氏春秋曰吳闔閭使民習戰劍如眉流血不可止淮南子曰今盆水在庭清之終日未能見眉睫濁之不過一撓而不能察方圓察見也人神易濁而難清猶盆水之類也風俗通曰桓帝元嘉中京師婦人作愁眉愁眉者細而曲折此梁兾家所爲京師皆效之天戒若曰将収捕兾婦女憂愁之眉也抱朴子曰有古强者自云四千嵗云見堯舜禹湯説之了了世云堯眉八采不然也直兩眉頭甚竪似八字眉唐書曰人多患逺見百歩而不自知眉頰知眉頰者復不能察百歩西京雜記曰卓文君妖冶好眉色如望逺山語林曰庾公道王尼子非唯事事勝於人布置鬚眉亦勝人我軰皆出其轅下樊氏相法曰眉中長毫百二十嵗太平御覽卷三百六十五
