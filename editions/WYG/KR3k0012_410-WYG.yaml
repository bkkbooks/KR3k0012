  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_410-1a, image: WYG0896/WYG0896-0596c.png}
body:
  text: 太平御覧卷四百十宋李昉等撰人事部五十一交友五請友不許世交附父子交絶交交友五傅幹與張叔威書曰吾與足下義結執素恩比同生東方朔與公孫𢎞書曰爵禄不相責以禮同類之逺近為叔東門先生居蓬户空穴之中魏公子一朝以百騎馳造太公望未嘗與文王同席而坐一朝譲以天下半丈夫相知何必接塵而逰垂髪齊年哉張奥與延叔堅書曰吾與叔剖心相知當以流言相猜耶郭璞贈温嶠詩曰人亦有言松竹有林友亦臭味異本同岑言以文得交以淡成謝朓贈友人詩曰芳州有杜若可以訂佳期清風動簾夜孤月照忩時安得同携手酌酒賦新詩陸倕贈京邑僚友詩曰時逢世道㤗騫足歩髙衢江闗寒事早夜露傷秋草心属姑蘇臺目送邯鄲道李郭成同舟潘夏時方駕歡娯終美景敷文永清夜促膝豈異人戚戚皆姻婭蕭鈞晩景遊泛懐友詩曰龍門低御溝鳯轄轉芳洲雲峯初辨夏麥氣早迎秋山翠餘烟積川平晩照收浪隨文鷁轉波逐彩鳯浮風花輕未落巖泉咽不流一辭金谷苑空想竹林遊潘岳詩曰投分寄石友白首同所歸古善哉行日没參横北斗闌干親友在門㤀寢與餐請交不許後漢書曰侯覇欲友王丹覇子見丹下車拜丹答拜覇子曰大人方願交歡奈何拜小子丹曰君房有是言丹未之許也又曰張覇遷侍中虎賁中郎將鄧隲當朝貴戚聞覇名行欲與為交逡廵不答衆笑其不識世務魏志将軍張遼與其䕶軍武周有隙就刺史温承求交吳質質辭之以疾遼出遇質曰僕委意於君何以相孤如此質曰古人之交也多取知其不貪奔北知其不怯聞流言而不信欲可終也武伯南身為雄士徃者将軍稱之不輟於口今以睚眦之恨反成嫌隙况質才薄豈能終好是以不願也遼感其言復與周平蜀志曰劉巴字子初零陵先賢傳曰張飛嘗就巴宿巴不與語飛遂忿恚諸葛亮謂曰飛雖貴武人愛慕足下足下雖天爵髙宜少降意巴曰丈夫處世當交四海英雄如何與兵子共語晉書曰解系字少連濟南人也系及二弟結育並清身潔己共有聲譽時荀朂門宗𢎞盛朂諸子謂系等曰我與卿為友應向我公拜朂曰我與君尊先使君親厚系曰不奉先君遺教公若與先君厚徃日衰頓當埀書問親厚之誨非所敢承朂聞之大慙梁書曰庾詵字彦實新野人也性純夷蕳質罕所遊狎河東桞惲欲與之交拒而不許齊春秋曰王曾祐字喬宗亭然獨立不交當代名士王思逺之徒託意請交並不降意自天子及侯伯未嘗與一人游焉嵇康髙士傳曰井丹字太春狄道人也愽學故京師為之語曰五經紛綸井太春未嘗書刺侯謁人梁松請友丹不肯見後遂隠遁皇甫士安髙士傳曰嚴遵字君平蜀人也揚雄少從之遊數稱其徳李温為益州牧喜曰吾得君平為從事矣雄曰可備禮相見其人不可屈王鳯請交不許歎曰益我財者損我神生我名者殺我身故不許時人服之世説曰何晏鄧颺夏侯太初並求傅嘏交而嘏終不許諸人力因荀粲説合之傅曰夏侯太初志大心勞能合虛譽誠所謂利口覆國之人鄧颺何晏有神而躁愽而寡要外好名利而内無闗鑰此三賢者皆敗徳之人耳逺之猶恐罹禍况可親之哉後皆如其言又曰南陽宗世林與魏武同時而薄其為人不與之交及魏武作司空總朝政從容問宗曰可以交未答曰松栢之志具存世交後漢書曰孔僖字仲和魯人也祖父建少遊長安與崔篆仕王莾為建親愛僖與崔篆孫駰復相友善焉晉書曰咸寜初有司奏何少及兄遵等受其故人袁毅貸雖經抑宿宜皆禁止事下廷尉詔曰太保與毅有累世之交遵等所取善薄一皆置之父子交左傳襄五年曰初伍叅與蔡太師子朝友其子伍舉與聲子相善聲子子朝之子也伍舉出奔鄭将遂奔晉聲子時如晉遇之於鄭郊班荆相與班布也布荆至地闗友世親也魏書曰陳羣字長文通達有識度其所交皆父黨也如魯國孔融與羣父紀友又與羣交王隠晉書曰王戎隨父渾在郎舍日時阮籍亦為郎每詣渾輙云與卿語不如阿戎戎時年十五籍乃交焉北齊書曰陵昻字雲駒洛陽人也父子璋魏中書監昻為河間邢邵所賞邢只與子璋交遊嘗謂子璋云吾以卿老蚌出明珠髙士傳曰班嗣在京師家有賜書内建於財父黨揚子雲已下莫不造門唐書曰郗士美字和夫少好學善紀覧父友顔真卿蕭頴士軰與之討論經傳論難如流既而相謂曰吾曹異日當交郁之閒矣汝南先賢傳曰薛勤字㤗祖仕郡為功曹陳仲舉時年十五為父齊了詣勤預而祭之明日造馬仲舉父出迎勤勤曰足下有不凡子吾来候之不從卿也言議盡日道學論曰許邁字叔齊清虛接真遐棲世表志在徃而不返故自改逺遊與王右軍父子為世外之交王亦辭榮好飬生之事每造逺遊未嘗不彌日忘返束晢吊蕭孟思文曰東海蕭惠字孟思者父昔為御史與晢先君同僚孟思及晢且有同遊分義早着孟思夫婦皆云門無立副晢時有伯父役兄之憂未獲日致之一篇以予其媿絶交毛詩谷風曰谷風刺幽王也天下俗薄朋友道絶焉又曰伐木廢則朋友缺矣史記曰相國曹叅始㣲時與蕭何善及為将相有隙又曰越石父賢在縲絏之中晏子出遭之塗解左􅆖贖之載歸弗謝入閨久之石父請絶晏子戄然攝冠謝曰嬰雖不仁免子於厄何求絶之速也石父曰不然吾聞君子屈於知己而伸於知己者方吾在縲絏之中彼不知我也夫子既已感悟而贖我是知己知己而無禮固不如縲絏之中漢書曰張耳陳餘始居約時相然信死豈頋問哉及據國争權卒相滅亡勢利之交古人羞之盖謂是矣又曰蕭育少與陳咸朱愽為友著聞當世徃者有王貢故長安人語曰蕭朱結綬王貢彈冠言其相薦達也始育以公卿子顯名咸最先進年二十餘為御史中丞時朱愽尚為杜陵亭長為咸育所舉援後遂並歴刺史郡守相友為九卿而愽先至将軍上卿歴位多於咸育遂至丞相育與愽後有隙不能終故世以友為難也范􅁮後漢書曰許初少厲名節好人倫多所賞識邵色又李達杜直有髙氣邵初善之而終有隙東觀漢記曰梁鴻初與京邑蕭友善約不為臣及友為郡吏鴻以書責之而去又曰王良字仲子東海人少清髙為司徒司直以病歸一嵗復徵至滎陽疾篤不任進道乃過其友人友人不肯見曰不自忠言竒謀而取大位何其徃来屑屑不憚煩也遂拒之良慙自後連徵輙稱疾魏志鍾繇傳曰王弼為人淺而不議物情初生黎荀融友善黎奪其黄門郎於是恨黎與融亦不終又曰管寜與華歆同學歆聞車馬聲出門寜割席曰子非吾友也徐廣青箱記曰相國掾調有盛名同郡任覽與調友善鄭衰謂覧曰諷姦雄必以禍終子宜絶之後諷果敗齊書曰初劉逖與祖班以文儀相得結陳雷之契又為俊耿班之女将免魏彦深也等以告逖仍付宻啟令其奏聞彦深等頓知之先自申理班由是疑逖告其所為及班被出逖遣弟離婚其輕交易絶如此唐書曰韋澳貫之之子也太和六年擢進士兄温與御史中丞髙元裕友善温請用御史謂澳曰髙二十九持憲綱欲與汝相面汝必得御史澳不答温曰髙君端士汝可輕耶澳曰然恐無呈身御史終不詣元裕之門袁淑真隠士傳曰鶡冠者或曰楚人也隠居山林衣弊履穿以鶡為冠莫測其名因服成號著書言道家事馮煖嘗師事焉煖後顯於趙鶡冠子懼其薦已也乃與煖絶焉新序曰吳有士張胥鄙譚夫吾前交而後絶張胥鄙有罪拘将死譚夫吾合徒取之出於通而後知真夫吾輟行辭曰吾義不同子故前交而後絶吾聞之君子不以安肆志不為免易行吾今從子是安則肆志危則易也吾因子而生不若及拘而死闔廬聞之命吏釋之胥鄙辭曰吾義不因於譚夫吾故不受其任矣今利以是出誠以譚夫故免也遂觸裔而死譚夫吾聞之曰致任而不受佞也又知而出之愚也佞而不可以接上愚不可以事君吾行虛矣人惡以吾力王吾亦耻以比立於世乃絶頸而死後漢朱公叔絶交論曰世之務交逰也甚矣不愽于業不忌于居犯禍以追之背公以從之利進義退公輕私重劉孝標廣絶交論曰騁黄馬之劇談縱碧雞之雄辨於是有弱冠王孫綺紈公子道不挂於通人聲未遒於雲閣是曰談交魚以泉涸而煦沫鳥因将死而鳴哀斷金因於湫隘刎頸起於苫盖是曰窮交馳騖之俗澆薄之倫無不操權衡秉纎纊衡所以量其重輕纊所以屬其鼻息若衡不能舉纊不能飛雖顔冉龍輪鳯輿曽史蘭薫雪白視若逰塵遇如土梗近世有樂安任昉見一善則旴衡搤腕遇一才則揚眉抵掌雌黄出於唇吻朱紫由其月旦於是冠盖輻凑衣裳雲合輜軿轊坐客恒滿及瞑目東越歸骸洛浦繐帳猶懸門罕清酒之彦墳未宿草野絶動輪之賔藐爾諸孤朝不謀夕自昔把臂之英金蘭之友曾無羊舌下泣之仁寜慕郈成分宅之徳大行孟門豈曰嶃絶是以耿介之士疾其若斯獨立髙山之頂歡與麋鹿同羣袁嶠與禇左軍觧交曰皇后踐登正祚臨御皇朝将軍之於國外姓之太上皇也與将軍遊起少長雖世譽先後而臭味同歸平昔之交與數而降其跨之欣隨位事而替雖欲詠濠泗脫落儀刑其能乎稽康與山濤絶交書曰足下見直木必不為輪曲者必不為桷盖不欲枉其天才令得其所不可自好章甫强越人以文冕也今但願守陋巷教子孫時時與親舊叙濶陳説平生濁酒一杯彈琴一曲志願畢矣太平御覧卷四百十
