  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_300-1a, image: WYG0895/WYG0895-0602a.png}
body:
  text: 太平御覽卷三百宋李昉等撰兵部三十一卒騎卒説文曰𨽻人給事者為卒衣有題識者也玉篇曰卒衆之名也屯戍之兵也桂苑曰卒𨽻人也管子曰管仲相齊作内政而寄軍令二百人為卒卒有正卒聚也韻海曰南楚謂卒為弩父卒主擔弩導因以為名也又行鞍杖者也皆赤幘綘韝左𫝊曰齊侯求逢丑父三入三出毎出齊師以帥退入於狄卒狄卒者狄人從晉討齊也狄卒皆抽戈盾冐之又曰楚令尹子重將為陽橋之役赦罪悉師王卒盡行彭名御戎蔡景公為左許靈公為右又曰晉侯將伐鄭楚子救鄭六月晉楚遇於鄢陵苖賁皇言於晉侯曰楚之良在中軍王族而已請分良以擊其左右而三軍萃於王卒必大敗又曰宣子謂鞅曰矢及君屋死之鞅用劒以帥卒而樂氏退攝車從之又曰楚伐舒鳩吳人救之楚子彊子息桓子駢子子孟五人以為師卒先斃吳師吳師奔登山以望見楚師不繼復逐之傅其諸軍又曰齊為鄎故國書髙無㔻帥師伐我及清季孫謂其宰冉求曰齊師在清必魯故也季氏之甲七千冉有以武城人三百為己徒卒老幼守宫次於雩門之外五日右師從之又曰蔡衛不支固將先奔既而萃於王卒可以集事從之又曰子玉使伯棼請戰曰非敢必有功也願以間執䜛慝之口王怒少與之師唯西廣東宫與若敖之六卒實從之狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績子玉收其卒而止故不敗史記項羽本記曰是時吕后父吕公為漢將兵居下邑漢王間徃從之稍稍收其士卒漢書曰吳王劉濞傳曰吳王先起兵誅漢吏二千石以下膠西王膠東王為渠率與菑川濟南共攻圍臨菑趙王遂亦隂使匈奴與連兵七國之發也吳王悉其士卒下令國中曰寡人年六十二身自將少子年十四亦為士卒先諸年上與寡人同下與少子等皆發二十餘萬人又司馬遷傳曰且陵提歩卒不滿五千深踐戎馬之地足厯王庭垂餌虎口横挑强胡陵李陵也又刑法志曰戰國之時轉相攻伐齊愍以騎擊强魏惠以武卒奮秦昭以鋭士勝又五行志曰綏和二年八月鄭通里男子王褒衣綘衣小冠帶劍入北司馬門上前殿觧帷組結佩自云天帝使我居此收縛考問故公車大誰卒病狂易不自知入宫下獄大誰者非常之人名大姓誰是也本以誰何為稱因用名官大誰長今比卒即長所領之卒也又食貨志曰董仲舒説武帝曰今荒淫越制踰侈以相髙邑有人君之尊里有公侯之富小民焉得不困又曰月為更卒一嵗屯戍三十倍於古更江衡切更卒為給郡縣一月而更也又胡建傳曰建字子孟河東人也孝武天漢中守軍正丞貧亡車馬常歩與走卒起居所以慰薦走卒甚得其心慰者自上安之也薦者舉藉之也晉書天文志曰積卒十三星在房星南主為衛也又謝萬𫝊曰萬乃召集諸將都無所説直以如意指四座云諸將皆勁卒諸將益恨之又劉元海載記曰元海薨和嗣立呼延攸等恨不叅顧命也説和曰先帝不惟輕重之計而使三王總强兵於内大司馬握十萬勁卒居於近郊陛下今便為寄坐禍難未可測也又劉曜載記曰劉岳攻石生於洛陽配以近郡甲士五千宿衛精卒一萬濟自盟津鎮東呼延謨率荆司之衆自崤澠而東莊子曰孔子徃見盗跖盗跖乃方休卒太山之陽膾人肝而脯之魏武歩戰令曰嚴鼓一通歩騎士悉裝再通騎上馬歩結屯三通以次出之隨幡所指住者結屯幡後聞急鼓音整陣斥候者視地形廣狹從四角面立表制陣之宜請部曲各自案陣兵曹舉事不如令者斬陳孔璋檄吳王校部曲文曰又使征西將軍夏侯淵等帥兵甲五萬巴漢鋭卒五萬又曰城都屠鈎踐武卒散於黄池曹植求自試表曰伏見先帝武臣宿兵年耆即世者有間矣雖才不乏世宿將舊卒猶習戰也阮嗣宗為鄭冲勸晉王牋曰東誅叛逆前軍獨尅擒闔閭之將斬輕鋭之卒以萬計威加南海名懾三越干寳晉記論曰將相侯王連頭受戮乞為奴僕而猶不獲免嬪嬙妃主虜辱於戎卒豈不哀哉陸士衡辨亡論曰告類上帝拱揖羣后虎臣毅卒循江而守劉孝標辨命論曰楚師屠漢卒睢水鯁其流秦人坑趙士震沸聲若雷班固西都賦曰列卒周匝星羅雲布左太冲吳都賦曰雕題之士鏤身之卒又魏都賦曰薄戍綿羃無異蛛蝥之網弱卒鎻甲何異螳螂之衛王仲宣從軍詩曰汎舟蓋長川陳卒被原隰謝靈運擬魏太子鄴中集詩曰官渡厠一卒烏林預艱阻賈誼過秦論曰率罷散之卒將數百之衆轉而攻秦斬木為兵掲竿為旂又曰信臣精卒陳利兵而誰何顔延年楊給事中誄曰立於將卒之間以輯華裔之衆騎釋名曰騎岐也兩脚岐别也史記曰韓信伐趙未至井陘選輕騎二千人人持一赤幟從間道望趙軍又曰今上為膠東王時韓嫣與上學書相愛及上為太子益愈親嫣善騎射上即位欲事伐匈奴而嫣先習胡兵以故益尊貴漢書曰霍去病年十八為侍中善騎射又曰趙充國字公孫隴西上邽人也始為騎士以六郡良家子服䖍曰金城隴西天水安定北地上郡也善騎射特補羽林後漢書曰景丹從擊王郎將倪宏等於南䜌郎兵迎戰漢軍退却續漢書曰南䜌賊迎撃上營得上鼔車輜重數乘也丹等縱突騎擊大破之追奔十餘里死傷者從横丹還世祖謂曰吾聞突騎天下精兵今乃見其戰樂可言耶遂從征河北又曰吕布為曹操所敗布見操曰今日已徃天下定矣操曰何以言之布曰明公之所患不過於布今已服矣令布將騎明公將歩天下不足定也東觀後漢記曰鄧禹攻赤眉輙不利吏士散已盡禹獨以二十四騎還詣雒陽又曰叚熲起於徒中為并州刺史徴還京師馬騎五萬餘疋又曰馬防將緹騎宿𤣥武門張蟠漢記曰蔡邕上書靈帝曰幽州突騎冀州强弩天下精兵也魏志曰曹休字文烈太祖族子太祖指休謂左右曰此吾家千里駒也使與文帝同居止見待如子常從征伐使領虎豹騎又曰光和中凉州賊起發幽州突騎三千假公孫瓚都督行軍事討之吳志曰孫堅領豫州刺史遂治兵於魯陽城當進軍討董卓遣長史公讐稱將兵從事還州督軍粮施帳幔於城東門外祖道送稱官屬並㑹卓遣歩騎數萬人逆堅輕騎數十先到堅方行酒談笑勅令部曲整頓行陣無得妄動後騎漸益堅徐罷坐導引入城乃謂左右曰向所以不即起者恐兵相蹈襲諸君不得入耳卓兵見堅士衆甚整不敢攻城乃引還又曰孫䇿騎士有罪逃入袁術營隱於内廐䇿指使人就斬之訖詣術謝術曰兵人好叛當共疾之何為謝耶蜀志曰曹公入荆州先主奔江南曹公追之及當陽之長阪先主棄妻子奔使張飛將二十騎據水斷橋瞋目横矛曰張翼徳也何敢來共决死敵皆無敢近者又曰趙雲字子龍隨先主為先主歩騎晉書載記曰苻堅伐晉舎大軍於項城以輕騎八千兼道赴之令軍人曰敢言吾至夀春者㧞舌而族之宋書曰傅𢎞之素善騎射髙祖至長安𢎞之於姚泓馳道内援弧戲馬或馳或驟徃返二十里中甚有節制羗胡聚觀者數十人並驚惋嘆息梁書曰曹景宗謂所親曰我昔在鄉里騎快馬如龍與年少軰數十騎拓弓絃作霹靂聲箭如餓鴟呌平澤逐麞數肋射之後周書曰太祖常從數騎於野忽聞簫鼓之音以問從人皆莫之聞也唐書曰貞觀中左右屯營始置飛騎㨂才力驍㨗善騎射者為之太宗時出遊幸則從焉衣五色袍乘六閑駿馬賜猛獸皮韉以標異之又加階級廩食各有差五代周史曰顯徳中世宗車駕至濠州城下戊子親破十八里灘砦在濠州東北淮水之中四面阻水上令甲士數百人跨馳以濟太祖皇帝以騎軍浮水而渡遂破其砦虜其戰艦而迴三國典略曰陳韋翽字子羽有志操以孝著稱髙祖以為驍騎將軍領朱衣直閣驍騎之職舊領營兵梁世以來其任愈重翽素有名望毎大事恒令夾侍左右時人人榮之號曰俠御将軍禰衡别𫝊曰衡着官布單衣以杖捶地數罵曹操及毁其先祖無所不至操及勅外取上廐駿馬三疋并騎二人須㬰外給馬辦曹公謂孔文舉曰禰衡小人無狀乃爾孤今殺之無異䑕雀耳顧此子有異才逺近聞之將謂孤不能容物劉景升天性憸急不能容受此子必當殺之乃以衡置馬上兩騎挾送至南陽也㑹稽典録曰朱育謂鍾離曰大皇帝以神武之姿欲得五千騎乃可有圗今騎無從出而懐進取之志奈何鍾離曰大皇以中國多騎欲得騎以當之吳神鋒弩射三四里洞穿三馬騎敢近之乎鄴中記曰石虎皇后出女騎千人皆著五采靴鄴城故事曰凉馬臺一名閲馬臺亦名戲馬臺案鄴中記云趙王虎建武六年造凉馬臺在城西漳水之南約次為臺虎常於此臺簡練騎卒虎牙宿衛號雲騰黒矟騎五千人每月朔晦閲馬於此臺乃於漳水之南張幟鳴鼔列騎星羅虎乃登臺射􅐴箭一發五千騎一時奔走從漳水之南齊走至於臺下隊督以下皆班賚虎又射一箭騎五千又齊走於漳水之北其五千流散攅促若數萬人皆騎以漆矟從事故以黒矟為號季龍又常以女騎一千人為鹵簿皆着紫綸巾熟錦袴金銀縷帶五文織成靴逰臺上六韜曰選士之法取年四十以下長七尺五寸以上材輕健疾力過倫等能馳騎彀射前後左右周旋進退超越溝塹馳山林險阻絶大澤越强敵亂大衆者名曰武騎之士不可不厚也三畧曰欲知敵形色可勝之符先以二十八騎惑之騎象二十八宿也淮南子曰夫善游者溺善騎者墮各以其所好反自為禍禍害也是故好事者未嘗不中中傷也好為情欲之事者未嘗不自傷也爭利者未嘗不窮也通典曰孫臏云用騎有十利一曰迎敵始至二曰乘敵虛背三曰追敵散亂四曰迎敵前擊敵後使敵奔走五曰遮其粮食絶其軍道六曰敗其津關廢其橋梁七曰掩其不備卒擊其未振八曰攻其慢怠出其不意九曰燒其積聚市里十曰蹂其田野係累其子弟此十者其騎戰利也夫騎者能離能散能集百里為竒千里而赴出入無間故名離合之兵也太平御覽卷三百
