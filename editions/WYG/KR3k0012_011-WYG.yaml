front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_011-1a, image: WYG0893/WYG0893-0120c.png}
body:
  text: 太平御覽卷十一宋李昉等撰天部十一雨下祈雨霽雨下河圖帝通紀曰雨者天之施也遁甲開山圖曰霍山南岳有雲師雨虎榮氏解曰雲師如蠶長六寸有毛似兎雨虎如蠶長七八寸似蛭雲雨之時出在石上肉甘可熟而食又鄭有不毛山上有無為之君分布雲雨於九州之内榮氏曰不毛山不生樹木古無為君常處其上布灑雲雨九州之内平均河圖秘徴曰君急恚怒無雲而雨黄帝素問曰清陽為天濁隂為地地氣上為雲天氣下為雨雨出地氣雲出天氣又天氣下而為雨太公金匱曰武王師到牧野陣未畢而暴風疾雨電雷幽㝠前後不見太公曰善雷電者是吾軍動應天也太公隂符謀曰昔紂嘗以六月獵於西土西土之老少相與謀曰君王逆天此其命固不夀也後數日而暴風大雨發屋㧞木漂殺人民六畜明年諸侯謀合四方兵起又武王兵入商郊前歌後舞甲子進兵乙丑而雨太公兵法曰將有三禮武王曰敢問三禮太公曰將冬日不服裘夏日不操扇天雨不張幔蓋名將禮太公對敵權變逆順法曰夫軍出逢天無雲而雨天泣也軍没不還魏武帝兵書按要曰大軍將行雨濡衣冠是謂灑兵其師有慶又三軍將行其旗墊然若雨是謂天露三軍失徙將軍雨甚是謂浴屍先陣者敗亡雜兵書曰諸雲氣諸變暈日月蝕風散之雲振之雨壓之皆觧又大人之兵如虎如狼如風如雨如雷如震振振暝暝天下盡驚又如軍營風雨從後來沾衣裳大吉又有大雲雨軍内滂沱甚者軍罷無功桓寛鹽鐵論曰孔子大聖也嘗居上位相魯三月不令而行不禁而止沛若時雨之灌萬物莫不興起也王充論衡曰道至天者翔風起甘雨降霽而隂曀者謂之甘雨非謂雨水味甘也又太平之時五日一風十日一雨又周公時雨不破塊風不鳴條旬而一雨雨必以夜丘陵髙下皆熟神異經曰西海上有人焉乘白馬朱鬛白衣赤冠從十二童子馳馬西海如飛名曰河伯使者其所至之國雨水滂沱樂動聲儀曰焦明至爲雨備焦明水鳥楚辭曰雷塡塡兮雨𠖇𠖇潘尼苦雨賦曰瞻中堂之浩汗聽長霤之涔涔成公綏隂霖賦曰沉竈生鼃中庭運舟傅咸愁霖詩曰舉足没泥濘市道無行車蘭桂賤朽腐柴粟貴明珠張孟陽雜詩曰雲根臨八極雨足灑四溟霖瀝過二旬散漫亞九齡堦下伏泉涌堂上水衣生尺燼重尋桂紅粒貴瑶瓊又詩曰騰雲似湧煙宻雨如散絲劉楨詩曰和風從東來𤣥雲起西山夜中發此氣明旦飛甘泉應璩與韋誕書曰夫以原憲懸磬之居而値皇天無已之雨室宇漸而作漏堂館洽而為泥祈雨禮記月令曰命有司為民祈祀山川百源大雩帝用盛樂乃命百縣雩祀百辟卿士有益於人民者以祈穀實雩者祭祁雨之名大雩爲用盛樂也漢書曰董仲舒爲江都相理國以春秋灾異之變推隂陽所以錯行故求雨閉諸陽縱諸隂其止雨反是范蔚宗後漢書曰諒輔仕郡為五官椽時夏大旱太守自出禱山川連日而無所降輔乃自暴庭中慷慨呪曰輔爲股肱不能進諫納忠和調隂陽至令天地否隔萬物枯焦咎盡在輔今敢有所請若至日中不雨乞以身塞無狀於是積薪聚艾茅以自環搆火將自焚未及中時天雲晦合須㬰澍雨謝承後漢書曰戴封字平仲遷西華令其年大旱禱請無獲乃積薪坐其上以自焚火起而大雨逺邇歎服遷中山相又曰爰延轉議郎徐州遭旱延使持節到東海請雨豐澤應時與京師同日俱霈還拜五官中郎將又曰周暢性仁慈為河南尹夏旱久禱無應因收葬洛城傍客死骸骨萬餘人應時澍雨歲乃豐稔又章和元年有詔以鄭宏為大尉時旱朝廷百僚皆暴請雨夏炎熱小雨郡官即還舎宏彌日不旋大雨如注稼穡遂豐又汝南周獲善占天文為郡門下椽鮑昱爲汝南太守時郡境大旱昱自往問何以致雨獲曰急罷三部督郵明府當自北出到四十里亭雨可致也昱從之果得大雨每行縣輒軾其閭東觀漢記曰曹褒為河内大守時自春至六月無雨穀貴百姓頗流離褒到省吏職退去貪殘屢得澍雨其秋大熟百姓給足流民皆還又和熹鄧后永初二年三月京師旱至五月朔太后幸雒陽省獄舉寃未還宫澍雨大䧏司馬彪續漢書曰永初六年張奮代劉方為司空時歲灾旱祈雨無應乃表即時引見口陳時政之宜明日和帝召太尉司徒幸洛陽即大雨三日蜀夲紀曰秦王誅蜀侯惲後迎葬咸陽天雨三月不通因葬成都故蜀人求雨祠蜀侯必雨王隱晋書曰束晳太康中郡大旱苖稼敗晳乃命邑人躬共請雨三日中雨水三尺衆人以其有術數精誠於神明百姓歡喜為之歌曰束先生通神明請天三日甘雨零我黍以萌我稷以生何以醻之報束長生高閭燕志曰太平十五年自春不雨至於五月有司奏右部王荀妻産妖傍人莫覺俄而失之乃暴荀妻於社大雨普落魚豢典略曰舊制求雨太常禱天地宗廟社稷山川已賽如其常祭牢禮四月立夏旱乃求雨立秋雖旱不禱求雨到七月必賽之秋冬春三時不求雨崔鴻春秋前燕録曰建熈七年五月慕容暐下書曰朕以寡德蒞政多違亢陽三時光隂錯緒農植之辰而零雨莫䧏其令有司徹樂大官以菜食常供祭奠旣而澍雨又前凉録曰張植為西城校尉與奮威將軍牛覇率騎救張冲六月至于流沙無水士卒渇甚植乃剪髮肉袒徒跣升壇慟泣請雨俄而雲起西北雨水成川植殺所乘馬祭天而去又前秦録曰沙公西域沙門也有秘術毎旱苻堅常使呪龍龍便下鉢中天輒大雨後魏書曰孝文太和二年京師旱祈天於北苑親自禮焉減膳避正殿澍雨大洽三年帝祈雨於北苑是日大澍雨益都耆舊傳曰趙瑶為閬中令遭旱請雨於靈星應時大雨葛仙翁傳曰吳主曾與仙翁坐於榭上望見道間人民請雨土人累時不得仙翁曰雨可得耳即書符著社廟中日午大雨尺餘水長沙耆舊傳曰祝良為洛陽令時亢旱天子祈雨不得良暴身階庭告誡引罪紫雲沓起甘雨乃䧏佛圖澄傳曰石虎時自正月至六月不雨澄詣滻口祠稽首暴露即有二白龍䧏祠下於是雨遍數千里干寳搜神記曰湯旣克夏大旱七年洛川竭湯乃以身禱於桑林剪其髮自以為犧牲祈福於上帝於是大雨即至洽于四海又湘東新年縣有一穴穴中有黑土歲旱人則共壅水於此穴穴淹則立大雨宋永初山川記曰鄱陽長夀山山形似白馬雲出於鞍中不崇朝而雨盛宏之荆州記曰宜都縣有一山獨立峻絶西北有石穴一獨行百歩許二大石其間相去一丈許俗名其一為陽石其一為隂石水旱為灾鞭陽石則雨鞭隂石則晴又湘東有雨母山山有祠壇每祈禱無不䧏澤以是名之又耒陽縣有雨瀬此縣時旱百姓同壅之則甘雨普䧏若一鄉獨壅雨亦偏隨方所其信若符刻顧微廣州記曰鬰林郡山東南有一池池邉有一石牛人祭祀之若百姓殺牛祈雨以牛血和泥泥石牛背祀畢則天雨大注抱朴子曰使者甘宗所奏西域事云方士能神呪者臨泉禹歩吹氣龍即浮出長數十丈更吹龍輒縮至長數寸乃掇取著壺中壺中或有四五龍以少水養之聞有旱處便賫龍往賣一龍數值千金發壺出龍著潭中復禹歩吹之長數十丈須㬰而雲雨四集又厯陽有彭祖仙室請雨必得晏子春秋曰齊景公時旱欲祠靈山晏子曰山以石為身草木為髮天茍不雨髮焦身熱獨不欲雨乎祠之何益公曰祠河伯可乎曰河伯以水為國以魚鼈為民久旱國將亡民將滅獨不欲雨乎君避殿暴露其索雨乎公出野暴露天果大雨淮南子曰土龍致雨許愼註曰湯遭旱作土龍以象雲從龍也又董仲舒請雨秋用桐木魚山海經曰東荒北隅有山名土丘應龍處南極殺蚩尤與夸父不得復上故下數旱旱而為應龍之狀乃得大雨今之土龍本此也遁甲開山圖曰綘北有陽石山有神龍池黄帝時遣雲陽先生養於此帝王厯代養龍之處國有水旱不時即祀池請雨爾雅孫炎註曰攝木生江上有竒枝高三四丈生毛一名楓子天旱以泥塗之即雨傅咸自叙曰太始九年自春不雨渉夏節聖皇勞慮分使祈禱余以太子洗馬兼司徒祈越三朝雨大䧏退作喜雨賦霽說文曰霽雨止也霋雨齊也霩火節反雨止雲罷貎魏略五行志曰延康元年大霖雨五十餘日魏有天下乃霽魏將受祚之應也晉中興徴祥記曰咸和四年隂霖五十餘日蘇峻滅乃霽長沙耆舊傳曰文度字仲儒為郡功曹吏時霖雨廢人業太守憂悒占度補戸曹度奉教齋戒在社三日夜夢白頭翁謂曰爾來何遲翌旦度具白所夢於太守曰昔禹夢青繡文衣男子稱蒼水使者禹知水脉當若是椽此夢將若此也明果大霽扶南日南傳曰金陳國入四月便雨六月乃止少有晴日六月不雨常晴歲歲如此太平御覽卷十一
