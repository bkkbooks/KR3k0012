body:
  text: 太平御覽卷一百十四宋李昉等撰皇王部三十九唐憲宗章武皇帝穆宗文恵皇帝敬宗昭愍皇帝憲宗章武皇帝唐書曰憲宗章武皇帝諱純順宗長子母曰莊憲王太后大厯十三年生於長安之東宫内六七歳時德宗抱置膝上問曰汝誰子在吾懐對曰是第三天子德宗異之貞元四年六月封廣陵王順宗即位之年四月冊為皇太子八月己巳即皇帝位於宣政殿先是連月霖雨是日晴霽人情忻悦丁未始御紫宸殿對百寮庚戌詔曰朕以寡昧纂承洪業永思理本所寳惟賢至如嘉禾神芝竒禽異獸盖王化之虛美也所以光武形於詔令春秋不書祥瑞朕誠德薄思及前人自今以後有祥瑞有司不得上聞其珍禽竒獸亦宜停進冬十月壬申貶中書侍郎同中書門下平章事韋執誼為崖州司馬以交王叔文也元和元年春正月丙寅朔皇帝率羣臣扵興慶宫奉上太上皇尊號丁卯御含元殿受朝賀畢御丹鳯樓大赦天下改元癸未詔以太上皇舊恙愆和親侍藥膳權不聽政以髙崇文檢校工部尚書充神䇿行營節度使甲申太上皇崩乙酉宰相杜佑攝冡宰戊子制曰劍南西川疆界素定藩鎮守備各有區分頃因元臣薨謝隣藩不睦劉闢乃因虛搆隙以忿結讎遂勞三軍兼害百姓朕志存含垢務欲安人遣使宣諭委之旄鉞比聞道路壅塞未息干戈輕肆攻圍擬圗吞併為君之體義在勝殘命將興師葢非獲已宜令興元嚴礪東川李康掎角應接神䇿行營節度使髙崇文神䇿兵馬使李元奕率步騎之師與東川元興之師類㑹進討甲午髙崇文由斜谷路李元奕由駱谷路俱㑹扵新潼關辛卯羣臣請聽政戊戌上謂宰臣曰前代帝王或怠扵聽政或躬覽繁務其道何如杜黄裳對曰帝王之修已簡易擇賢委任不宜於怠肆安逸然事有綱領小大有常務其逺者大者至如簿書獄訟百吏能否本非人主所自任也但擇人委任責其成效賞罰必信誰不盡心傳稱帝舜之徳曰夫何為哉恭已正南面而已以能舉十六相去四凶也豈與勞神疲體自任耳目之主同年而語哉但人主之勢患在不能推誠人臣之弊患在不能自竭由是上疑下詐禮貌或虧欲興治理自然難致茍無此弊何患不至於理上稱善久之五月辛卯冊太上皇后王氏為皇太后九月辛亥髙崇文奏收成都擒劉闢以獻癸丑以山人李渤為左拾遺徴不至二年春正月上親朝獻太清宫御丹鳯樓大赦天下己酉以户部侍郎武元衡為門下侍郎同平章事以中書舎人翰林學士李吉甫為中書侍郎同平章事二月庚午司天造新厯成詔題為元和觀象厯九月庚申李錡據潤州反殺判官王淡大將趙琦遂合蘇常湖杭睦等五州戍將殺刺史脩石頭城欲謀僣逆癸酉潤州大將張子良李奉仙等執李錡以獻十一月斬錡詔削屬籍十二月戊辰上謂宰臣曰朕覽國書見文皇帝行事少有過差諫臣論諍往復數四况朕之寡昧涉道未明今後事或未當卿當每事十論不可一二而已己卯史官李吉甫撰元和國計簿總天下方鎮凡四十八管州府二百九十五縣一千四百五十三户二百四十四萬二百五十四其鳯翔鄜方邠寧振武涇原銀夏靈鹽河東易定魏博鎮冀范陽滄景淮西淄青十五道凡七十一州不申户口每嵗賦入倚辦止於浙江東西宣歙淮南江西鄂岳福建湖南等八道口四十九州一百四十四萬户比量天寳供税之户則四分有一天下兵戎仰給縣官者八十三萬餘人比量天寳士馬則三分加一率以兩户資一兵其他水旱所損徴科發歛又在常役之外是嵗吐蕃回紇奚契丹渤海䍧牱上音臧下音歌南詔並朝貢三年春正月癸巳羣臣上尊號曰睿聖文武皇帝御宣政殿受冊禮畢御丹鳯樓大赦天下庚子涇原段祐請脩臨涇城在涼州北九十里拒犬戎之衝要詔從之四年秋七月御製前代君臣事迹十四篇書於六扇屏風是月出書屏以示宰臣丁未渭南暴水壊廬舎二百餘户口溺死六百人命府司賑給八月安南都䕶張丹奏破瓌王國三萬餘人獲戰象兵械并王子五十九人十月冊鄧王寧為皇太子癸巳以冊儲肆赦繫囚死罪降徒流以下逓降一等工部侍郎歸登給事中吕元膺為皇太諸王侍讀五年八月乙亥上謂宰臣曰神仙之事信乎李藩對曰神仙之説出於道家道家所宗老子五千文為本老子指歸與六經無異前代好怪之流假托老子為神仙之説故秦始皇遣方士載童男女入海求仙藥漢武帝嫁女與方士求不死藥二主受惑卒無所得文皇帝服胡僧長生藥遂致暴疾不救古詩曰服食求神仙多為藥所誤誠哉言也君人者但務求理四海樂推社稷延永自然長年也上深然之六年十一月乙丑制以户部侍郎李絳為中書侍郎同平章事十二月辛卯皇太子寧薨諡曰恵昭七年五月上謂宰臣曰卿言呉越去年水旱昨有御史自江淮回言不至為灾人不甚困李絳對曰臣得兩浙淮南狀相繼言歉旱方隅授任皆朝廷信重之臣御史非良或容希媚此當出姦佞之口况推誠之道君人大本任大臣以事不可以小臣言間之伏望明示御史姓名正之典刑上曰卿言是也朝廷大體以恤人為本一方不稔即宜賑救濟其饑寒况可疑之耶向者不思而有此問朕言過矣八年三月辛未上以久旱親於禁中祈雨是夜澍雨沾足六月庚寅京師大風雨毁屋飛瓦人多壓死溝瀆暴漲行人不通辛丑出宫人二百車任從所適以水灾故也九年十月甲子制曰朕嗣膺寳位於兹十年每推至誠以御方夏庶以仁化臻於太和宵衣旰食意屬於此今淮西一道未承朝命擅自繼襲肆行冦掠將士等迫於受制非是本心思去三面之羅庶遵兩階之義宜以山南東道節度使嚴綬兼充申光蔡等州招撫使十年正月嚴綬帥師次蔡州界己亥制削奪呉元濟官爵六月鎮州節度使王承宗遣盜夜伏靜安坊刺宰相武元衡死之刺御史中丞裴度傷首而免十二年五月唐鄧節度使李愬屢敗賊於呉房獲賊將李佑七月以裴度守門下侍郎同平章事充彰義軍節度申光蔡觀察處置等使仍充淮西宣慰使十月李愬率師入蔡州執呉元濟以獻淮西平十三年正月御含元殿受朝賀禮畢御丹鳯樓大赦天下七月詔削奪淄青節度使李師道官爵仍令宣武魏博義成等五鎮之師分路進討十二月上謂宰相曰臣事君但力行善事自致公望何乃好樹朋黨朕甚惡之裴度對曰君子小人未有無徒者君子之徒同心同德小人之徒是朋是黨上曰他人之言亦與卿等相似豈易辨之哉度曰君子小人觀其所行當自區别矣上曰凡好事口説則易躬行則難卿等既言之須行之勿空口説度等謝曰陛下處分可謂至矣臣等敢不激勵然天下之人從陛下所行不從陛下所言臣等亦願陛下每言之則行之上頗忻納十四年春正月以東師宿野不受朝賀三月上謂宰臣曰聽受之間大是難事推誠選任所謂委寄必合盡心及至所行臨事不無偏黨朕臨御以來嵗月斯久雖不明不敏然漸見物情每於行為務欲詳審比令學士集前代昧政之事為辨謗略每欲披閲以為鑒戒耳崔羣對曰無情曲直辨之至易稍懐欺詐審之實難故孔子有衆好衆惡之論浸潤膚受之説葢以曖昧難辨故也若擇賢而任之待之以誠糾之以法則人自歸公孰敢行偽陛下詳觀載籍以廣聰明實天下幸甚七月羣臣上尊號曰元和聖文神武法天應道皇帝是日御宣政殿受册御丹鳯樓大赦天下八月上謂宰臣曰天下事重不可一日曠廢若遇連假不坐有事即詣延英請對崔羣以殘暑方甚目同列將退上止之曰數日不見卿等時雖暑熱朕不為勞九月上謂宰相曰朕讀𤣥宗實録見開元初鋭意求理至十六年以後稍似懈倦開元末又不及中年何也崔羣對曰𤣥宗少厯民間身經迍難故即位之初知人疾苦躬勤庶政加之姚崇宋璟蘇頲盧懐慎等守正之輔孜孜獻納故致治平及後承平日久安於逸樂漸逺端士而近小人宇文融以聚歛媚上心李林甫以姦邪惑上意加之以國忠故及於亂願陛下以開元初為法以天寳末為戒即社稷無疆之福也時皇甫鏄以謟刻欺蔽在相位故羣因以止之上服方士栁泌金丹藥起居舍人裴潾上表切諫以金石含酷烈之性加燒煉則火毒難制若金丹已成且令方士自服一年觀其效用則進御可也上怒貶潾為江陵令十五年春正月甲戌上以餌金丹小不豫罷元㑹庚子夕上崩於大明宫之中和殿享年四十三謚曰聖神章武孝皇帝廟號憲宗葬於景陵穆宗文惠皇帝唐書曰穆宗文惠皇帝諱恒憲宗第三子也母曰懿安皇后郭氏貞元十一年七月生於大明宫之别殿初名宥封建安郡王元和七年七月冊為皇太子改名恒十五年正月憲宗崩閏月庚午即皇帝位於太極殿東序戊申上見羣臣於紫宸門外辛亥以蕭俛段文昌為中書侍郎同平章事上始御延英對宰臣二月辛丑御丹鳯樓大赦天下壬寅勅舉賢良方正直言極諫科目人宜令中書門下尚書省四品以上於尚書省同試三月壬子召侍講學士韋處厚路隨於太液亭講毛詩關雎尚書洪範等篇既罷並賜緋九月辛丑大合樂於魚藻宫觀競渡又召李愬李光顔入朝欲以重陽日宴羣臣拾遺李班上疏諫云元朔未改園陵尚新雖易月之期俯從人欲而三年之制猶服心喪夫遏密施禁葢為濟人合樂内庭事將未可不聽十月鎮州王承元以所部四州請命以魏博節度等使田𢎞正為鎮州節度使以承元改滑州節度使長慶元年正月己亥朔上親薦獻太清宫太廟是日法駕赴南郊日抱珥宰臣賀於前辛丑祀昊天上帝於圜丘即日還宫御丹鳯樓大赦天下改元長慶内外文武及致仕官三品以上賜爵一級三月庚子上觀伎樂於麟德殿歡甚謂給事中丁公著曰比聞外間公卿士庶時有歡宴葢時和民安甚慰予心公著對曰誠有此事然臣之偶見風俗如此亦不足嘉百司庶務漸恐勞煩聖慮上曰何至於是對曰夫賓宴之禮務達誠敬不繼以淫故詩人美樂且有儀而戒屢舞前代名士良辰宴聚或清談賦詩投壺雅歌雖以杯酌獻酧不至於亂國家自天寳以後風俗奢靡宴席以諠譁沉湎為樂而居重位秉大權者優雜倨肆於公吏之間曾無愧恥公私相効漸以成俗由是物務多廢獨聖心求理安得不勞宸慮乎陛下宜頒訓令禁其過差則天下幸甚時上荒於酒樂公著因對諷之頗深嘉納三月幽州劉總請分割地土入朝公卿皆疑獨上推誠納之以宣武節度使張𢎞靖為幽州節度使以總為鄆州節度使秋七月壬子羣臣上尊號曰文武孝德皇帝上受冊於宣政殿禮畢御丹鳯樓大赦天下甲寅幽州監軍使奏軍亂囚節度使張𢎞靖於别館害判官韋雍張宗元崔仲卿鄭塤軍人取朱滔子洄為留後洄自以年老令軍人立其子克融為留後八月乙巳鎮州監軍宋惟澄奏軍亂節度使田𢎞正并家屬將佐三百餘口並遇害軍人推衙將王庭凑為留後二年三月甲子詔雪王庭凑仍授鎮州大都督長史充成德軍節度等使三軍將士待之如初仍令韓愈往彼宣諭十月詔江淮諸州旱損田苖頗多所在米價不免踴貴眷言疲瘵須議優矜宜委淮南浙東浙西宣歙江西福建等道觀察使各於當道有水旱處取常平義倉斛斗據時估減半價糶以恵貧民十一月庚午命景王率禁軍百騎侍從皇太后幸華清宫又幸石甕寺癸酉上幸華清宫迎皇太后巡狩於驪山下即日馳還皇太后翌日方還庚辰上與内官擊鞠禁中有内官歘然墜馬如物所撃上恐罷鞠升殿遽足不能履地風眩就牀自是外不聞上起居者三日十二月丁亥詔五坊鷹隼解放獵具並毁之庚寅宰臣李逢吉率百寮至延英門請見上不許裴度與諸大臣三上疏請立皇太子辛卯上於紫宸殿見百寮李逢吉奏景王成長請立為皇太子左僕射裴度又極言之癸巳詔立景王為皇太子丙午上御宣政殿冊立皇太子受册畢百寮謁太子於東宫三年正月丁巳上以疾苦不受朝賀是日大風昏翳竟日四年正月辛亥上御正殿受朝如常儀上餌金石之藥處士張皋上疏切諫上悅召之求皋不獲辛未上大漸詔皇太子監國事壬申上崩於寢殿時年三十謚曰聖文惠孝皇帝廟號穆宗葬於光陵敬宗昭愍皇帝唐書曰敬宗昭愍皇帝諱湛穆宗長子母曰恭僖太后王氏元和四年六月七日生於東宫之别殿長慶元年封景王二年立為皇太子四年正月穆宗崩皇太子即位時年十六二月辛巳朔上衰服見羣臣於紫宸門外癸未貶户部侍郎李紳為端州司馬辛卯勅没掖庭宫人先配内園宫人並宜放出任其所適己亥冊大行皇帝皇太后為太皇太后三月上御丹鳯樓大赦天下天下常貢之外不得進獻六宅十宅諸王女宜令每年於選人中選擇降嫁甲寅始於延英對宰臣甲子故山南東道節度使牛元翼家屬悉為王庭湊所害上惜其横死傷悼久之仍歎宰執非才縱奸臣䟦扈翰林學士韋處厚奏曰理亂之本非有他術順人則理違人則亂陛下當食歎惜恨無蕭曹今有一裴度尚不能用此馮唐所以感悟漢文雖有頗牧不能用也戊辰羣臣入閣日髙猶未坐有不任立而踣者諫議大夫李渤出次請御殿俄而始坐班退左拾遺劉栖楚極諫叩頭龍墀血流上為之動容丙申賊張韶等百餘人至右銀臺門殺奄者揮兵大呼進至清思殿登御榻而食弓箭庫左神䇿軍兵馬使康藝全率兵入宫討平之是日上聞變急幸左軍丁酉上還宫羣臣稱慶諫議大夫李渤以上輕易致盜言甚激切五月制以吏部侍郎李程户部侍郎竇易直並同中書門下平章事十二月回鶻吐蕃奚契丹遣使朝貢寳厯元年春正月辛亥親祀昊天上帝於南郊禮畢御丹鳯樓大赦改元二月桂管防禦觀察使李徳裕獻丹扆箴六首上深嘉之命學士韋處厚優其答詔四月羣臣上徽號曰文武大聖廣孝皇帝御宣政殿受冊禮畢御丹鳯樓大赦天下七月甲申拾遺李漢舒元褒薛延老於閣内奏曰近日除授往往不由中書進擬多是内中宣出臣恐紀綱寖壊奸邪恣行伏希詳察上然之詔度支進銅三千斤金箔十萬翻脩清思院新殿及昇陽殿二年五月幽州軍亂殺其帥朱克融及男延齡軍人立其第三子延嗣為留後辛巳神䇿苑内古長安城中脩漢未央宫掘池獲白玉牀長六尺六月減放内苑役二千五百人帝性好土木自春至冬興作相繼庚申鄆州進打毬人石定寛等四人辛酉幸凝碧池令兵士千餘人於池中取大魚送入新池癸亥以旱命京城諸司疏理繫囚帝好深夜自捕狐狸宫中謂之打夜狐十月辛丑帝夜獵還宫與中官劉克明田務澄許文瑞打毬軍將蘇佐明王嘉憲石定寛等飲酒帝方醉入室更衣殿燭忽滅劉克明等同謀害帝即時殂於室内時年十八諡曰睿武昭愍孝皇帝廟號敬宗葬莊陵太平御覽卷一百十四
