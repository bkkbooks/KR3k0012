body:
  text: 太平御覽巻五百五十三宋李昉等撰禮儀部三十二葬送一易下繫曰古之葬者厚衣之以薪葬之中野衣之以薪而埋之於中野不封不樹䘮期無數後世聖人易之以棺槨葢取諸大過尚書曰周公在豐致政老在豐也將没欲葬成周周公薨成王葬于畢成王不敢臣周公故歸于武王葬畢也禮記曲禮上曰助葬必執紼紼引車之索也禮記檀弓上曰太公封于營丘比及五世皆反葬于周君子曰樂樂其所自生禮不忘其本古之人有言曰狐死正丘首仁也正丘首正首丘也仁思也又曰舜葬于蒼梧之野葢二妃未之從也古不合葬又曰葬于北方北首三代之達禮也幽之故也北方北首回北也又曰子栁之母死子碩請具具䘮之器用也子栁魯叔仲皮之子子碩兄也子栁曰何以哉言無其財子碩曰請粥庶弟之母粥謂嫁之也妾賤取之曰買之也子栁曰如之何其粥人之母以葬其母也不可又曰公叔文子升于瑕丘蘧伯玉從二子衞大夫也文子獻公之孫名㧞也文子曰樂哉斯丘也死則我欲葬焉伯玉曰吾子樂之則瑗請前刺其欲害人瑗伯玉也又曰成子髙寢疾成子髙齊大夫即國成伯髙也慶遺入請曰夫子病革矣如至大病則如之何觀其意也革急也慶遺封之族子髙曰吾聞之也生有益于人死不害于人吾縱生無益于人吾可以死害于人也哉我死擇不食之地而葬我焉不食謂不墾耕又曰國子髙曰葬也者藏也欲人弗得見也是故衣足以飾身棺周于衣土周于椁反壤樹之哉又曰孔子之喪有自燕來觀舍于子夏氏子夏曰聖人之𦵏人與人之𦵏聖人也子何觀焉昔者夫子言之曰吾見封之若堂者矣見若防者矣防形旁殺平上而長見若覆夏屋者矣覆謂茨瓦者夏屋今之門廡也其形旁廣而平見若斧者矣從若斧者焉馬鬛封之謂也禮記檀弓曰季武子成寢杜氏之葬在西階之下請合葬焉許之入宫而不敢哭季武子曰合葬非古也自周公以來未之有改也吾許其大而不許其細何居命之哭又曰子游問䘮具夫子曰稱家之有亡子游曰有亡惡乎齊惡乎齊問豐省之不同夫子曰有無過禮苟亡矣斂首足形還葬懸棺而封不設碑縴不備禮也人豈有非之者哉又曰宋襄公葬其夫人醯醢百甕禮記檀弓下曰季子臯葬其妻犯人之禾申祥以告曰請庚之申祥子張子庚償也子臯曰孟氏不以是罪予朋友不以是棄予以吾為邑長于斯也買道而葬後難繼也子臯恃寵虐民非禮也又曰延陵季子適齊于其反也其長子死葬于嬴博之間嬴博齊也今太山縣是也孔子曰延陵季子吳之習于禮者也往而觀其葬焉其坎深不至于泉其斂以時服以生時服既葬而封廣輪掩坎其髙可隱也輪從也隱據也既封左袒右還其封且號者三曰骨肉歸復于土命也若䰟氣則無不還之也還廻也而遂行孔子曰延陵季子之于禮其合矣乎又曰子路曰傷哉貧也生無以為養死無以為禮也孔子曰啜菽飲水盡其歡斯之謂孝斂首足形還葬而無椁稱其材斯之謂禮還猶疾也禮記王制曰天子七日而殯七月而葬諸侯五日而殯五月而葬大夫士庶人三日而殯三月而葬尊者舒卑者速春秋傳曰天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至三年之䘮自天子達庶人縣封葬不為雨止不封不樹䘮不二事禮記曾子問曰葬引至于堩日有食之則有變乎且不乎堩道也變謂異禮孔子曰昔吾從老􅔶助葬于巷黨及堩日有食之老􅔶曰丘止柩就道右止哭以聽變既明友而后行曰禮也巷黨黨名也反葬丘問之曰夫柩不可以反也日有食之不知其已之遲數則豈如行哉已止也數讀為速老􅔶曰夫柩不早出不墓宿侵晨夜則近姧寇也見星而行者唯罪人與奔父母之䘮者乎日有食之安知其不見星也為無日而慝作豫止且君子行禮不以人之親痁患痁患病也以人之父母行禮而恐懼其有患害不為也禮記曾子問曰並有䘮如之何何先何後并謂父母若親同者同日死也孔子曰葬先輕而後重其奠也先重而後輕禮也自啟及葬不奠不奠務于當葬者行葬不哀次不哀次輕于在殯者及葬奠而後辭于殯遂脩葬事殯當為賔聲之悞也辭于賔為告辭啟其時也其虞也先重而後輕禮也禮記䘮大記曰君葬用輴四綍二碑御棺用羽葆大夫葬用輴二綍二碑御棺用綈士葬用國車二綍無碑比出宫御棺用功布大夫廢輴此言輴葬也禮記中庸曰父為大夫子為士葬以大夫祭以士父為士子為大夫葬以士祭以大夫左傳隱公曰公將如棠觀漁者臧僖伯諌不從冬臧僖伯卒公曰叔父有憾于寡人叔父有諌觀漁不聽也寡人弗敢忘葬之加一等又曰元年冬十月庚申改葬惠公公弗臨賈逵曰改葬改備禮也葬嗣君之事公不臨言無恩禮曰改䘮細也故不書惠公之薨也有宋師太子少葬故有闕是以改葬言事以明禮闕故改又曰天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至左傳僖上曰許穆公卒于師葬之以侯禮男而侯禮加一等凡諸侯薨以朝㑹加一等諸侯命有三等公為上等侯伯為中等子男為下等死王事加二等于是有以衮斂死王事謂朝天子以命用師衮斂者上公九命服衮也左傳宣上曰葬敬嬴旱無麻始用葛茀記禮變之所由茀所以引柩殯則有之以備大葬則以下柩雨不克䘮禮也禮卜葬先遠日辟不懐也懐思之也左傳成上曰宋文公始厚葬用蜃炭益車馬使用殉重器備椁有四阿棺有翰檜君子謂華元樂莒于是乎不臣臣治煩去惑者也今二子者君生則從其惑死益其非是棄君于惡德何臣之為左傳昭二曰叔孫卒杜洩將以路葬且盡卿禮路王所賜叔孫車南遺謂季孫曰叔孫未乗路葬焉用之且冡卿無路介卿以葬不亦左乎左傳昭三曰鄭簡公卒為葬除除葬道及游氏之廟游氏子大叔族也將毁焉子大叔使其除徒執用以立而無庸毁用毁廟具曰子産過女而問何故不毁乃曰不忍廟也諾將毁矣教毁廟者之辭既如是子産乃始辟之毁之則朝塴弗毁則日中而塴春秋説題辭曰葬尸下藏也人生于隂含陽元死入地歸所與也宋均注人生隂謂胞胎中論語先進曰顔淵死門人欲厚葬之子曰不可門人厚葬之子曰囘也視予猶父也予不得視猶子也非我也夫二三子也言顔路不聽門人厚葬之白虎通曰周公以王禮葬何以為周公踐祚理政與天同至原天之意子愛周公與文武不異故以王禮爾雅曰葬藏謂之壙宅兆塋域地也説文曰窆葬下棺也史記曰項王已死楚地皆降漢獨魯不下漢乃引天下共欲屠之為其守禮義為王守節乃持項王頭示魯魯父兄乃降始懐楚王初封項籍魯公及其死魯最後下故以魯公禮葬項籍榖城史記曰臨江閔王榮以孝景前四年為太子四歲廢為臨江王四年坐侵廟壖為宫上徴榮詣中尉府中尉郅都責訊王王恐自殺葬藍田鷰數萬銜土置塜上百姓憐之又曰郭娣子負解之勢與人飲强灌之人怒㧞刀刺殺解娣子亡去解娣怒曰以翁伯之義人殺吾子賊不得棄其尸于道不葬欲以辱解解使人微知賊處賊窘自歸具以實告解解曰殺之固當吾兒不直遂去其辜其娣乃收而葬之諸公聞之皆多解之義戰國策曰秦宣太后愛魏餘病且死令曰我死必以魏子為狥庸芮為之説后曰以死者為有知乎曰無知芮曰何乃空以生之所愛殉無知之死人哉若死者有知先王之積忿久矣太后救過不暇何得私魏子乎太后乃止漢書曰韓信淮隂人家貧無行不得推擇為吏又不能治生為商賈常從人寄食其母死無以葬乃行營髙燥地旁可置萬家者為塜又曰張良始所見下邳圮上老父與書者後十三歲從髙帝過濟北果得榖城山下黄石取而葆祠之及良死并葬黄石每上塜伏臘祠黄石又曰衞青貴而平陽侯曹壽有惡疾就國長公主問列侯賢者左右皆言大將軍主歎曰此出吾家常從我奈何左右曰于今尊貴無比于是主諷皇后言之上乃詔青尚平陽主合葬起塜又曰三長史害張湯自殺昆弟厚葬湯母曰湯為天子大臣被惡言而死何厚葬為載以牛車有棺而無椁上聞之曰非此母不生此子迺盡誅三長史又曰主父偃方貴幸時客以千數及死無一人視獨孔車收葬焉上聞之以車為長史者又曰霍光薨上與皇后太后親臨光䘮太中大夫任宣與侍御史五人持節䕶喪賜金錢繒絮繡被百領衣五十筐璧珠璣玉衣如淳曰漢儀注以玉為襦如鎧狀連綴之以黄金為縷腰以下玉為札長尺廣二寸半為甲下至足亦綴以金縷也便房黄腸題凑各一具蘇子曰以栢黄心致縷棺外曰黄腸木頭皆内向故曰題凑如淳曰便房壙中便室也漢儀天子陵中明中髙丈二尺四周二丈二尺内梓宫次便椁栢黄膓題凑也東園温明服䖍曰東園處此器形如漆桶開一面畵之以鏡置其中以懸尸上大斂并葢之也皆如乗輿制度載光尸柩以輼輬車黄屋左纛發材官輕車北軍伍校軍士陳之茂陵以送其葬諡曰宣城侯發三河卒穿土起塜祠堂置園邑三百家又曰金日磾薨賜葬其塜地送以輕車介士軍至茂陵諡曰敬侯又曰楊王孫者孝武時人也學黄老之術家累千金厚自奉養生亡所不至及病且終先令其子曰吾欲倮葬以反吾真必亡易吾意死則為囊盛尸尸入地七尺即下從足引脱其囊以身親土其子欲黙而不從重廢父命􅁒從之心又不忍乃往見王孫友人祁侯與王孫書王孫報曰葢聞之聖王縁人不忍其親故為制禮今則越之吾是以倮葬將以矯世吾聞之神精者天之有形骸者地之有精神離形各歸其真故謂之鬼鬼之為言歸也屍塊然獨處豈有知哉裹以幣帛隔以棺椁支體絡束口含玉石欲化不得鬱為枯腊千載之後棺槨朽腐迺得歸土就其真宅祁侯曰善遂倮葬又曰朱雲年七十餘終于家病不呼醫藥遺言以身服斂棺周於身土為椁韋昭曰燒土為椁也為丈五墳葬平陵東郭外又曰韋𤣥成為相病且死因使者自曰不勝父子私願乞骸骨為葬父母上許焉又曰朱邑病且死囑其子曰我故為桐鄉吏其民愛我必葬桐鄉後世子孫奉我不如桐鄉民及死其子葬之桐鄉西郭外民果共為邑起塜立祠歳祠祭至今不絶又曰孔光薨王莽白太后使九卿策贈以太師博山侯印信賜與秘器金錢雜帛少府供帳公卿百官㑹弔送葬載以乗輿及副各一乗羽林孤兒諸生合四百人輓送車萬餘輛將作穿復土河東卒五百人起墳如大將軍王鳳制度又曰董賢死見廢倮暴其尸因埋獄中賢所厚吏沛人朱詡自劾去大司馬府備棺木收賢屍葬之王莽聞之大怒以他罪擊殺詡又曰楚王戌女解憂妻烏孫公主上書言年老思願得歸骸骨葬漢地天子愍而迎之公主與孫男女三人俱來後二歲薨三孫因留守墳墓又曰樓䕶字君卿結交士大夫無所不傾其賢士長者尤見親敬母死送葬者致車二三千兩後漢書曰永平十二年詔曰昔曽閔奉親竭歡致養仲尼葬子有棺無椁䘮貴致哀禮存儉今百姓送終之制競為奢靡生者無擔石而力財盡于墳土伏臘無糟糠而牲牢兼于一奠糜破積代之業以供朝夕之費豈孝之意哉令有司其申明科禁宣下郡國范􅁮後漢書曰孔僖拜臨晉令卒官遺令即葬二子長彦並十餘歲蒲坂令許君勸令反魯對曰今載柩而歸則違父令舍墓而去心所不忍遂留華隂續漢書曰張奐光和四年卒遺令曰吾前後仕進十腰銀艾不能和光同塵為讒邪所忌但地底㝠㝠長無曉期而復纒以纊綿牢以釘宻為不喜耳今幸有前穿朝隕夕下措屍靈牀幅巾而已奢非桓文儉非王孫推情從意庶免咎恡諸子從之又曰周暢字伯持性仁慈為河南尹永初二年夏旱久禱無應暢因收葬洛城傍客死骸骨凡萬餘人應時澍雨歲乃豐稔位至光禄勲東觀漢記曰光武發薊還士衆喜樂鼓聲歌詠八荒震動過范陽命諸將收葬吏士又東平王蒼將葬章帝詔有司加贈鑾輅乗馬龍旂九旒虎賁百人又曰東海王彊薨追念彊雅性恭儉不欲令厚葬以違其意詔中常侍杜岑東海相傅曰王恭謙好禮以德自終勅官屬遣送務行約省茅車瓦器以成王志又曰王丹聞里有䘮憂輙度其資用教之儉約因為其制曰定葬其親䘮不過留殯一月其下以輕重差焉又曰梁鴻病因與髙伯通及㑹稽士大夫語曰昔延陵季子卒于嬴博之間不歸其鄉慎勿聽妻子持尸柩去後伯通等為求葬處有要離冡髙燥衆云要離古烈士今伯鸞亦清髙令相近遂葬要離冡旁子孫歸扶風太平御覽卷五百五十三
