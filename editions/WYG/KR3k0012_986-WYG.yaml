body:
  text: 太平御覽卷九百八十六宋李昉等撰藥部三芝下抱朴子曰千嵗之枯木其下根如坐人長七寸刻之有血以其血塗足可以步行水上不沒以塗人鼻入水水為之開可以止住淵底以塗身則隠形欲見則拭之又可以治病病在腹内則刮腹一刀圭其腫痛在外者隨其所在刮一刀圭以摩之皆下手即愈假令左足有疾則刮塗之左足也又曰松樹枝三千年者其皮中有聚脂狀如龍形名曰飛節芝大者十斤得末服之盡一斤得五百歲又曰樊桃芝其木如昇龍其花葉如丹蘿其實如翠鳥高不過五尺生於名山之陰東流泉水之上以夏至後祠之得末服之一株得五千嵗又曰木渠芝寄生大水上如蓮花九莖一叢其味甘而辛建木芝實生於都廣其皮如攖蛇其文如鸞鳥此芝得服之白日昇天也又曰黄蘆子尋木華元液華此三芝生於泰山要鄉及奉高有得服之皆令人夀千嵗也又曰千嵗燕其窠户北向其色多白而尾毛屈取隂乾末服得五百嵗凡此百二十種皆肉芝也又曰參成芝赤色有光扣之枝葉如金石之音折而續之即復如故又曰􅌲芝或生於深山之中或生於大木之下泉水之側其狀或如宮室或如車馬或如龍虎或如飛鳥無他色亦百二十種自有圖也皆當禹步往採之刻以骨刀凡岀草芝又有百二十種隂乾服之則令人與天地相畢或得千嵗二千歳又曰肉芝者謂萬嵗蟾蜍頭上有角頷下有丹書八字以五月五日日中時取之隂乾百日以其足畫地即為流水千嵗蝙蝠色如白雪集則倒懸腦重故也此二物得而隂乾末服之令人夀四萬嵗千嵗烏五色其額上兩骨起似角以羊血浴之乃剔取服之夀千嵗行山中見小人乗車馬長七八寸者乃肉芝也取服之即成仙凡百二十種皆肉芝也漢武内傳曰仙芝上蕊有大虹芝五行論曰章帝時零陵生芝草五本又初稟篇曰朱草之莖如鍼紫芝之􅂒如豆如珠玉者稟氣而生亦猶此也茅君内傳曰句曲山上有神芝五種第一曰龍仙芝似蛟龍之相負服之為太極仙卿第二曰參成芝赤色有光叩之其枝葉如金石之音折而續之即如故服之為太極大夫第三曰燕胎芝其色紫形如葵葉象如燕欲飛狀光明洞徹服之拜為太清龍虎仙君第四曰夜光芝其色青實正白如李夜視其實如月光照洞一室服一株為太清仙官第五曰玉芝色白如玉剖食拜三官真御史也神仙傳曰漆飛黄子張虛字子黄遼人也行𤣥素之道年二百嵗有少容服九英葢芝石象而成道也又曰子舊服赤烏散及夜光芝仙人採芝圖曰芝生於名山食之令人乗雲能上天觀望八極通見神明鳳凰芝草生於名山之上金玉之間石上隂乾始食一年令人羽翼皆生夀千嵗能乗雲與鳳凰俱乾末服方寸能令人昇仙中者數萬嵗下者千嵗欲求芝草入名山必於三月九月此山間出神藥之月也勿以山浪日必以天輔時三竒會尤嘉三竒吉門到山須六隂之日明堂之時帶靈寳符牽白犬抱白雞以白鹽一㪷及開山符檄著大石上執吳唐草一抱以入山山神喜必得芝也又採芝欲得王相専和之日支干上下相生為佳此諸芝名山多有之但凡庸道士心不精志行穢徳薄又不暁入山之術雖得其圖不知其狀亦終不能得也山無大小皆有鬼神所䕶其鬼神不以芝與人人雖踐之而終不可見也又曰草芝有獨搖芝無風自動其莖大如手指赤如丹素葉如莧其根有大魁如斗有細者如雞子十二枚周繞大根四方似倣傚十二辰也相去丈許皆有細根如白髮以相連生高山深谷之上其所生左右無草得大魁末服之盡則千嵗服其細者一枚百嵗不可以他分也懐其大根即隠形欲見則左轉而出之又曰牛角芝生虎夀山及吳陵上狀如葱而特生如牛角長三四尺青色末服方寸七日服其三至百日則壽得百嵗矣又曰龍仙芝狀如昇龍之相負以葉為鱗其根則如龍蟠服一株得千嵗矣又曰紫珠芝其莖黄其葉赤其實如李而紫色二十四枚輒相連而垂如貫珠也又曰白符芝高四五尺似梅常以大雪而花季冬而實又曰朱草芝九曲曲有三葉三實也又曰五徳芝狀如橉莖方其葉五色各具而不雜狀如偃葢中嘗有甘露紫光起數尺又曰龍御芝常以仲春時生有三節一十二枚下根如人坐又曰水芝生於名山大谷之隂治食之能入水中乗雲行通神明能使百鬼甘露芝生於石山之隂常有五綵色覆之又曰車馬芝生於名山之中此尭時有車馬化為芝能得食之乗雲而行上有雲氣覆之又曰萬年芝生於名山之中及蓬萊山又曰地芝生於名山得食之延年益夀一舉千里走越江海又曰月芝生於名山之隂金石珠玉之間隂乾治食令人有毛二尺延夀萬嵗又曰玉芝生於名山之隂黄雲覆之此戊巳中宮黄帝之精食之益夀八千又曰黒雲芝生於名山大谷凉泉之間黒葢赤莖味鹹苦食之一年能入火不焦入水不漬又曰石芝生於名山之隂色黄上有不死之藥如甘露味極美取而食之令人不死赤松子所服山芝之生東西行三南北行五此為山芝其色白山芝者韓終所服也與天地相極延年益夀通神明矣又曰人芝生於名山之隂青葢白莖黄龍芝生於神山之中狀如黄龍雲氣芝生於名山之中葢白莖白裏赤天芝生於名山之隂千秋芝生於大谷中四方異色南赤西白北黒東青食之不老老者不死雷芝生於名山之隂白石之上有白雲覆之黄雲芝生於名山之中金石間上有黄雲覆之食之夀千嵗令人通見神明乗雲為車風為馬青雲芝出於名山之隂雲母芝生於名山澤泉之旁白虎芝生於名山之隂大木下狀如虎葢色青味辛食之令人有力又東方芝生於東山之隂南方芝生於神山之陽北方芝生於北海之山大谷水中狀異而澤西方芝生於崑崙之上金石間萬年芝生於名山之隂又曰夜光芝出於名山之陰大谷源泉中金石間有浮雲翔其上又曰大乙芝生於名山之隂葢黄莖赤得而食之令人不老與天地相保又曰虎芝生於名山之隂狀如虎食之身輕延夀八百年餘又曰鳴鳥芝生於名山多林之陽狀如鳥也有五色隂乾治食令人身輕與風俱行又曰赤龍芝生於名山之隂源泉澤泉中狀如龍其色赤以秋採之便有白色如龍食之使人能入水中孫氏瑞應圖曰芝草常以六月生春青夏紫秋白冬黒十洲記曰祖洲有養神丹芝似菰苗長三四尺人死以草覆之皆活服之長生秦始皇時大疫多有死者有烏銜此草以覆死人面登時皆活始皇聞以問北郭鬼谷先生先生曰此不死草也生瓊田中有鍾山仙家數千萬耕田種芝草嵩高山記曰嵩高山有人芝人芝者狀如小兒地芝者辟方一尺如黄金色覆以五色雲有神龍守之食之者可以遐年崔豹古今注曰元和二年芝生沛如人冠狀又生章武如人抱三子狀成帝建初五年芝生賴州常以六月中生一葉春青夏紫秋白冬黒十月復黄氣出尺五寸博物志曰名山生神芝不死之草上芝為車馬形中芝為人形下芝為六畜形唐新語曰崔希嶠以孝友稱丁内憂哀毁過禮為鄭縣丞芝草生所居一宿而葩葢盈尺杜寳大業拾遺錄曰七年六月東都永康門内會昌門東生芝草百二十莖散在地周十步許紫莖白頭或白莖黒頭或有枝或無枝亦有三枝如古㞢字者地内根並無綿不相連著乾陽殿東東上闗前槐樹上生芝九莖共本相扶而生中莖最長兩邊八莖相次而短有如樓閣甚潔白武賁郎將段文操留守畫圖表奏本草經曰青芝一名龍芝食之身輕不老神仙生太山上谷亦生五岳地上又曰黄芝一名金芝食之為神仙生嵩高山山谷中又曰赤芝一名丹芝食之為神仙生霍山山谷又曰黒芝一名𤣥芝生恒山上谷又曰紫芝一名木芝久服延年作神仙生山谷地上色紫形如桑吳氏本草經云紫芝一名木芝九歌曰采三秀兮於山間三秀芝草也石磊磊兮葛蔓蔓繆襲神芝讃曰青龍元年五月庚辰神芝生於長平之習陽其色紫丹其質光輝高尺八寸五分散為三十六莖枝榦連屬有似珊瑚之形詔御府匱而藏之具畫其形古瑞命記曰王者仁慈則生食之者則延年又曰神農氏芝論云山川與四時五行隂陽晝夜之精以生五色神芝皆為聖王休􅖤焉曰漢孝武顯宗世號隆盛而元封永平所記神芝方斯蔑如也具其枝榦條莖本末相承乃協於天官之數非神明其數孰能如此天台山賦曰五芝含秀而紛敷􅄞康詩曰煌煌靈芝一年生秀太平御覽卷九百八十六
