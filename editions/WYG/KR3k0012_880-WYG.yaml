body:
  text: 太平御覧卷八百八十宋李昉等撰咎徵部七地震地裂地䧟地㐫土踊地生毛地震京房易占曰地動陰有餘左𫝊曰南宫極震南宫極王子朝之卿士也萇𢎞謂劉文公曰君其勉之先君之力可濟也先君謂劉獻公文公父也獻公亦欲立子猛不欲令子朝得國今南宫極震死為天所弃先君之功事可成也周之亡也其三川震今西王之大臣亦震天弃之矣西王謂子朝也子朝居王城故謂之西王也東王必大克東王敬王居狄泉狄泉在王城之東故曰東王也史記曰周幽王二年三川震太史伯陽甫曰周將亡矣天地之氣不失其序若過其序民亂之也陽伏而不能出隂迫而不能蒸於是地震陽失而在隂原必塞原塞國必亡昔伊洛竭而夏亡河竭而商亡今周徳若二代之季矣其川原又塞塞必竭夫國必依山川山崩川竭國亡之徵漢書五行志曰魯文公九年地震劉向以為周㐮王失道楚穆王商臣殺父成王諸侯皆不肖權傾於下臣下强盛將動為害京房曰臣事雖正專則必震震於水則波於木則揺於屋則瓦落嗣子無徳專禄兹謂不順厥震動邱陵湧水出又曰魯㐮公十六年地震其後崔氏専齊欒盈専晉良霄傾鄭閽殺呉子燕逐其君楚滅陳蔡又曰魯昭公十九年地震劉向以為是時季氏將有逐君之變又曰昭公二十三年地震劉向以為是時周景王崩劉子單子立王子猛尹氏立王子朝季氏逐昭公黒肱叛邾呉殺其君僚宋五大夫晉二大夫皆以地叛又曰哀公三年地震仲尼見棄而季氏强又曰趙幽王五年代地大動自樂徐以西北至平陰臺屋墻垣大半壞地坼東西百三十步六年大飢秦滅之漢書曰惠帝時地震隴西壓四百餘家時諸吕用事又曰武帝時地震壓殺人明年皇后陳氏廢宣帝時地震河南以東四十九郡北海瑯琊壊宗廟城郭殺人千餘後又京師地震至北邊郡國三十餘壊城郭殺四百餘人後霍顯禹反誅清河王遷房陵皇后霍氏廢又曰元帝建昭四年藍田地震沙石流擁㶚水安陵岸崩擁水水逆流時石顯用事後漢書曰光武時地震裂其後武陵蠻夷反寇南郡詔捕王侯賔客死者數千人陰氣盛之應也又曰和帝時郡國十三地震時將軍竇憲專權伏誅後又地裂及震其年北海王威有罪自殺又曰安帝時郡國有十六地震明年郡國有十二地震京師人相食帝冲幼鄧氏執政後又郡國九地震明年海賊張伯路與平原劉文何周文光等叛攻殺令長後三年郡國十八地震淮南人飢明年鄧太后崩帝失政又曰順帝時京師頻地震岸崩及地䧟其年呉郡丞羊珍反郡府後二年凉州地百八十震山谷坼裂是日徐揚賊攻燒邑城殺掠民吏又曰冲帝時京師地震三郡沙湧土裂時帝年二嵗母后臨朝羣盗大起發掘憲陵攻燒城邑又曰桓帝時京師地震荆揚人多飢死後又震憲陵寢屋宫廟瓦落盡時梁兾専政又曰靈帝時地震海水溢又震鴻都府門時閹豎専政又曰初平二年井州牧董卓焚燒洛陽挾天子遷長安自為太師號尚父京師地震卓問著作郎蔡邕對曰地動陰盛大臣踰制又太史上言當有大臣戮死卓遣人言太尉張温與袁紹交通遂殺温二年司徒王允僕射士孫瑞及卓將吕布謀誅卓殺之又曰獻帝時雍州地頻震三輔大旱粟一石五十萬人相食續漢書曰建康元年九月丙午京都地震時順帝崩太后攝政為順帝作陵制度奢廣多壊吏民塜槨尚書欒巴諫太后怒癸夘詔收巴下獄欲殺之丙午地震太后乃出巴免為庶人漢獻帝春秋曰初平二年地震董卓問蔡邕邕曰天為陽故轉運于上地為陰故安静于下而震是失其性以陰而為陽也明公車不當青盖宜改之以應變卓改為緑盖晉書曰魏明帝時京都地震隐隐有聲揺動屋瓦明年公孫文懿叛自立魏髙堂隆曰地震者臣下强盛地故震動兾所以警悟人主不可不深思是灾及少帝繼廢竟禅晉又曰齊王芳時頻年地震時曹爽専政遷太后於永寧宫太后與帝相泣而别故頻震又曰蜀劉禅時地震時黃皓専政閹宦旡陽施猶婦人也此皓見任之應是年冬蜀亡又曰呉孫權時頻年地震時吕壹専政又權信讒廢太子和步隲上書曰伏見按事吹毛求疵欲䧟人以成其威福故地連震又曰晉武帝時頻年地震是時賈充楊駿逓掌朝權又曰惠帝元康四年郡國地震淮南洪水出或山崩地䧟壊城府殺百餘人此賈后使楚王瑋殺汝南王亮及太保衛瓘陰道盛陽道衰微之應又曰愍懐帝時頻年地震時司馬越専政石勒㓂汲郡又曰元帝太興元年頻地震或水湧山崩殺人時江南淮北有大兵劉曜石勒僣位又曰成帝時咸和四年頻年地震時蘇峻作亂又曰穆帝永和九年十年頻地震或有聲如雷雞雉皆鳴時帝幼母后専政石季龍僣號王師頻敗又曰十一年四月五月又頻地震是時姚㐮入許昌百姓愁苦之應及海西公簡文孝武時皆頻地震是時人主幼弱羣小弄權兵役連年海西見廢又曰孝武太元元年夏震含章殿四柱殺侍者二人後年苻堅畧㐮陽又曰安帝義熙年頻地震或有聲如雷時太尉劉裕謀逆宋書曰孝武大明六年地震有聲自河北來魯郡山揺地動彭城女墻四百八十丈墜落屋室傾倒衮州地裂泉湧二年不已其後衮州刺史夏侯祖權卒齊書曰廢帝東昏侯時地震一年不止其年䕶軍崔惠景反兵圍城帝閉門以拒之隋書曰梁武太清二年八月侯景舉兵反於豫州登壇㰱盟地震及圍城死者大半又曰太清三年建康地再震時侯景自為大丞相崔鴻十六國春秋曰前趙劉聰建元元年三月平陽城震崇明觀䧟為池水赤氣漫天有赤龍奮迅而去十一月地震二年八月平陽地震汾水大溢流漂數百家聰死子粲立為劉曜所殺曜自立又曰前秦苻堅時秦雍二州地震裂泉湧長安大風震電壊屋殺人堅懼而愈修徳政焉俄而苻雙等伐長安尋為戰敗又曰後秦姚泓時秦州地震三十二殷殷有聲山崩舍壊識者以為秦州泓之故鄉將滅之徵後宋髙祖入長安執於建康斬之又曰姚興四年所在地震前後一百五十六公卿百司抗表請罪興曰災譴之來咎在元首近代或歸罪三公甚非也朕當考躬省己思宋景之義公等何愆宜悉冠履復位後魏書曰太祖道武天賜六年夏地震其年帝愛姬萬美人與清河王紹通作亂帝被紹及萬美人殺之又曰宣武延平元年泌州地震䧟殺人甚衆又累年泌州秀容敷城鴈門山鳴地震不止其年幽州沙門劉僧紹反明年胡太后臨朝後天下大兵太后少帝為爾朱榮投於河隋書曰北齊武成清河年并州地震是時和士開専恣之應又曰隋文帝開皇二十年廢太子勇以晉王廣為皇太子將册之夜烈風大雪地震山崩人舍多壊殺人太子卒與僕射楊素弑帝吕氏春秋曰周文王寢病五日地動東西南北不出國郊百吏皆請曰臣聞地之動為主也羣臣皆悲曰請移之興事動衆以增國城文王曰我必有罪故天示此以罰我令動衆以增國城是重吾罪不可無幾疾瘳矣地裂尚書説曰黃帝將亡則地裂春秋考異郵曰臣恣盛地裂坼戰國䇿曰齊閔王奔莒淖齒數之曰嬴愽之間地坼至泉地以告也而王不知戒何得無誅乃殺之竹書紀年曰夏桀末年社坼裂其年為湯所放後漢書曰安帝時緱郡地裂後郡國地坼或泉湧越雋夷殺長吏燒城邑又曰南地坼長八十二里廣五十六里又洛陽新城地裂又緱氏地䧟裂京師地䧟時主幼冲宦者用事又曰建康元年隴西漢陽張掖北地武威地百八十震山谷坼裂壊城又曰冲帝初即位葬順帝是日鴈門京師太原三郡地震沙湧土裂又曰桓帝時河東地裂明年京師雲陽地裂時閹豎用事皇后梁氏崩後八年緱氏地裂是時頻年兵革又李膺等二百餘人受誣下獄又上黨地裂是時寇賊彌盛又曰靈帝時河東地裂十二處長十里是時閹豎用事政在私門續漢書曰和帝永元七年趙國易陽地裂京房易傳曰地坼裂者臣下分離不肯相從也是時南單于衆乖離漢軍追討崔鴻十六國春秋曰西秦乞伏乾歸太初十九年菀川地裂後四年乾歸為兄子公府所殺抱朴子曰軍中地裂急徙居不則軍敗地震心大戰或有謀反墨子曰三苗欲滅時地震坼泉湧地䧟今古五行記曰夏桀末年瞿山地䧟一夕為大澤深九丈其年為湯所放晉書曰武帝太康八年宣帝廟地䧟其年七月殿前地䧟方五尺深數丈中有破船是時帝不用和嶠之言而信賈充之佞至十一年惠帝立王室大亂又曰惠帝時五月城中地䧟方三十丈殺人六月又地坼人家䧟死八月地裂廣三十六丈長八十四丈人大飢又上庸四處山崩地䧟廣三十六丈長百三十丈大水出殺人時賈后亂政又夜暴雷雨賈謐家屋柱䧟入地壓床帳明年謐誅天下兵亂帝室從此㣲矣又曰懷帝時洛陽步廣里地䧟出鵝三又當陽地裂廣三丈長三百步時司馬越専政王室離散死者萬計又曰安帝時山陰地䧟方四尺有聲如雷後二年西明門地穿湧水毁門太尉劉裕矯詔殺害朝士俄而禅宋隋書曰梁武帝普通二年始興郡石鼓村地自開成井方六尺深三十丈侯景簒梁昇御床脚䧟入地後景被殺崔鴻十六國春秋曰前凉張天錫三年四月延興地震䧟水出又曰前趙劉聰永光年武庫地䧟深一丈五尺時中常侍王沉中宫僕射郭猗皆寵幸用事聰遊宴後宫或百日不出沉等奢僣貪殘賊害良善御史大夫陳元逹諫聰不從元逹自殺又曰後秦姚泓永和元年秦州地䧟裂巖嶺崩墜人舍壊是年為宋髙祖所擒斬於建康市又曰前秦苻堅末年洛陽地䧟堅後伐晉敗焉又曰安帝末年桓元簒晉昇太極殿殿無故䧟旬月宋髙祖殺之又曰北凉沮渠茂乾永和七年太廟階䧟六月城門崩其年九月茂乾面縳降于魏又曰西凉李歆嘉興元年三月燉煌謙徳門䧟至四年歆為沮渠蒙遜所敗又曰夏赫連勃勃鳯翔七年六月太廟䧟其年八月勃勃死隋書曰北齊後主永興年穆后如晉陽向北宫辭太后所乗七寳車無故䧟入地半沒四足是年齊滅后與帝俱入長安又曰隋煬帝大業十二年十二月洛州乾陽門内地䧟周濶丈餘至十四年帝遇殺天下大亂異苑曰晉武帝太康五年宣帝廟地裂䧟梁無故自折凡宗廟所以承祖先嗣永世不刋安居摧䧟是㷐絶之祥也地凶後漢書曰光武時岑彭伐蜀去成都數十里軍營北有地名曰彭亡彭聞之欲移㑹日暮是夜彭為公孫述刺客詐為逃奴刺殺之魏志曰太祖圍吕布張楊將眭固救布屯兵射犬巫誡之曰將軍字白兎而邑名射犬兎見犬必驚宜急移去固不從明日遂戰死晉書曰建業大社西宫地呉時右司馬丁奉宅呉後主孫皓殺之流徙其家晉元帝初為僕射周顗宅顗為王敦所害後為冠軍將軍蘇峻宅峻反被誅後為索忱宅忱為㑹稽王道子所親眤縁道子見殺又為武王司馬秀宅秀亦㐫至宋孝武時為雍州刺史臧質宅質反見殺故代稱為地㓙宋吏部尚書王僧綽常謂宅無吉㐫請以為第始造未居為元㓙所害王隐晉書曰祖約為豫州刺史府中地忽赤如丹約竟敗見殺土踊紀年曰梁惠成王七年地忽長十丈有餘髙尺半周隐王二年齊地暴長長丈餘髙一尺漢書曰成帝河平四年臨淮縣土踊起髙二丈時王莽専政崔鴻十六國春秋曰前凉張寔五年祁山地震從中陶原坂三里冐覆下川忽如見掩坂上草木存焉地生毛晉書曰武帝太始中皇甫晏為益州刺史西討屯兵人咸死之地生白毛俄被牙門將所殺又曰成帝時地生毛時天下大兵而中原擾亂百姓疲怨又曰孝武時京都地生毛而氐賊圍繞㐮陽彭城征戍連年不觧又京都地生毛苻堅滅後多役人勞又江陵交戰不觧又曰安帝義熙十年地生白毛連年征討勞擾之應京房曰金失其性地生毛以為人勞之應常璩華陽國志曰晉武帝太始八年蜀地生毛長七八寸生數里李勢欲亡地又生毛崔鴻十六國春秋曰後秦姚興時乞伏乾歸鎮州地震生毛而乾歸太初十九年七月為兄子公府所殺又曰北燕馮䟦太平十五年龍城地生白毛長一尺二寸月餘乃滅後遼西太守髙讃謀反伏誅隋書曰梁武帝大同年地生白毛長二尺時築浮山堰功垂就而潰百姓苦之又曰陳後主末年地生白毛時公役不息卒為隋滅又曰北齊武成河清年初滄州及長安地生毛時北築長城内興三臺人苦役焉唐書曰則天天授初淮南地生毛或白或蒼長者尺餘或遍居人床下揚州尤甚大如馬尾焚之如毛氣著作郎韓琬寓于揚州親掇之其年稱制太平御覧卷八百八十
