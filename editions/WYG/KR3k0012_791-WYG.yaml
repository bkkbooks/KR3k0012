body:
  text: 太平御覽卷七百九十一宋李昉等撰四夷部十二南蠻七西南夷夜郎滇卭莋嶲冉駹白馬白狼夷禪國牂柯濮尾濮木綿濮文面濮折腰濮赤口濮黒僰濮朱提昆彌西爨東女國西南夷梁祚魏國統曰西夷土有異犀三角夜行如大炬火照數十歩或時觧脫則藏於深宻之處不欲令人見之王者貴其異以為簮禮消除凶逆又曰西南夷有大湖名禁之水水中有毒氣中有物嘖嘖作聲射中木石則破裂中人則死其俗名曰鬼弹聞聲已至不可得見也郭義㳟廣志曰建寧郡其氣平冬不極寒夏不極暑盛夏如五月盛冬如九月天下之異地海内唯有此按月令記五氣之中位宜在西南如此豈當土行之方戊巳之域乎夜郎漢書曰南夷君長以十數夜郎最大武帝建元六年大行王恢擊東粤因兵威使番陽令唐蒙諷曉南粤南粤食䝉以蜀枸醤蒙問所從來曰道西北牂牁江江廣數里出畨禺城下蒙歸至長安問蜀賈人獨蜀出枸醬多持竊出市夜郎夜郎者臨牂牁江江廣百餘歩足以行船南粤以財物役屬夜郎西至桐師然亦不能臣使也蒙廼上書罪惡未成未疑漢家加誅隂勅旁郡守尉練士馬大司農先調榖積要害處調發也要害者在我為要於敵為害也調音徒釣切選任職太守徃以秋凉時入誅其王侯尤不軌者即以為不毛之地亡用之人聖主不以勞中國毛猶草也不毛言不生草木也宜罷郡放棄其民絶其王侯勿復通如以先帝所立累代之功不可隳壊亦宜因其萌芽早斷絶之及已成形後師興則萬姓被害矣鳳於是薦陳立為牂牁太守立至牂牁廼從吏數十人出行無何召興興將數千人出徃立數責因斷興頭出曉其衆皆釋兵降興子耶務収餘兵廹脅旁二十邑反立又撃平之後漢書曰夜郎者初有女子浣於遯水有三節大竹流入足間聞其中有號聲剖視之得一男兒歸而養之及長有才武自立為夜郎侯以竹為姓武帝平南夷夜郎侯迎降天子賜其王印綬後遂殺之夷獠咸以竹王非血氣所生甚重之求為立後牂牁太守吳覇以聞天子乃封其三子為侯死配食其父今夜郎縣有竹王神是也滇漢書曰南夷君長其西靡莫之屬以十數滇地最大皆椎髻耕田有邑聚楚威王時使將軍莊蹻將兵循江上略巴黔中以西莊蹻至滇池地方三百里旁地肥饒數千里以兵威定屬楚欲歸報㑹秦撃奪楚巴黔中郡道塞不通漢元狩中天子乃令王然于柏始昌吕越人等十餘軰間出西南夷指求身毒國至滇滇當羗乃留為求道四嵗餘皆閉昆明莫能通滇王與漢使言孰與我大及夜郎侯亦然各自以一州王不知漢廣大使者還因盛言滇大國足事親附天子注意焉漢晉春秋曰亮在南中所在戰㨗聞孟獲者為夷漢並所服募生致之既得使觀于營陣之間問曰此軍何如獲曰不知虛實故敗定易勝耳亮縱之使更戰七擒而亮猶遣獲止不去曰公天威也南人不復反矣遂至滇池南中皆平卭漢書曰自滇以北君長以十數卭都最大皆椎髻耕田有邑聚後漢書曰邛都夷者武帝開以為卭都縣無幾而地䧟為汚澤因名為卭池南人以為卭河其後復反叛元鼎六年漢兵自越嶲水伐平之以為越嶲郡其郡土地平原有稻田俗多逰蕩而喜謳歌畧與牂牁相類豪帥放縱難得制御王莽時郡守枚根調卭人長貴以為軍侯更始二年長貴攻殺根自立為卭谷王至光武因就封之授越嶲太守印綬後劉尚撃益州夷路由越嶲長貴聞之疑尚既定南邉威法必行已不得自放縱即聚兵托呼諸君長多醸毒酒欲先以勞軍因襲擊尚知其謀即分兵先據卭都遂掩長貴誅之徙其家屬於城都又曰永平中卭都太守巴郡張翕政化清平得夷人和在郡十七年卒夷人愛慕如䘮父母蘇祈斯文叟二百餘人齎牛羊送䘮至翕本縣起墳祭祀詔書嘉美為立祠堂後夷反亂天子以翕有遺愛拜其子湍為太守夷人歡喜皆奉迎道路曰郎君儀貌類我府君後湍頗失其心有欲反者諸夷耆老相曉語曰當為先府君故遂得以安南中八郡志曰卭河縱廣二十里深百餘丈多大魚長一二丈頭特大遥視如戴鉄盆狀李膺益州記曰卭都縣下有一老姥家貧孤獨每食輙有小蛇頭上戴一角在床間姥憐飴之後稍長大遂長丈餘令有駿馬蛇遂吸殺之令因大忿恨令姥責出蛇毋云在床下令即掘地愈大而無所見令遷怒殺姥蛇乃感人以靈言嗔令何殺我母當為母報讎此後每夜則聞若風四十許日百姓相見咸驚語汝頭郍忽戴魚是夜方四十里許一時俱䧟為湖土人謂之為䧟河唯毋宅無恙訖今猶存漁人採捕必依止宿每有浪輙居宅側恬静無他風静水清猶見城郭樓櫓畟然今水淺時土人下水取得舊木堅貞光黒如漆好事者以為枕相贈焉莋漢書曰自嶲以東北君長以十數莋都最大其俗或土著或移徙後漢書曰莋都夷者武帝所開以為莋都縣其人被髪左袵言語多譬類居處畧與汶山夷同土出長年神藥仙人山圖所居焉元鼎六年以為沉黎郡至天漢四年并蜀為兩部置兩部尉一居旄牛主徼外一居青衣主漢人也巂漢書曰桐師以東北至菓榆名為嶲昆明編髪隨畜遷徙無常處無君長地方可數千里永昌郡𫝊曰越嶲郡在建寧西北千七百里沿江都縣自建寧髙山相連至川中平地東西南北八千餘里郡特好桑蠶宜黍稷麻麥稻梁冉駹漢書曰自莋以東北君長以十數冉駹最大其俗或土著或移徙後漢書曰冉駹夷者武帝所開元鼎六年以為汶山郡今蜀郡西北通化郡地也至宣帝地節三年夷人以為賦重帝乃省并蜀郡為北部都尉其山有六夷七羗九氐各有部落其王侯頗知文書禮法俗嚴重貴婦人黨毋族死則燒其尸土氣多寒雖在盛夏氷猶未釋皆依山居止累石為高屋者至十餘丈為卭籠今彼土夷人呼為雕又土瘠地鹵不生榖粟麻菽唯以麥為資而宜畜牧有旄牛無角一名犝牛肉重千斤毛可為眊出名馬有靈羊可療毒又有食藥鹿麑有胎者其腸中糞亦療毒疾又有五角羊麝香輕毛毼鷄猩猩其人能作旄氊青頓班罽毞毲羊羧之屬青頓毲羧並未字詳此字書無二特多雜藥地有鹹土煑以為鹽鹿羊牛馬食之皆肥其西又有三河槃于虜北有黄石北地盧水胡其表乃為徼外後靈帝時復分蜀郡北部為汶山郡白馬漢書曰蜀之西冉駹以東北君長以十數白馬最大皆氐類也後漢書曰白馬氏者武帝元鼎中分開廣漢西部合以為武都土地險阻有麻田出名馬牛羊漆蜜氐人四面斗絶數為邉冦郡縣討之則依固自守元鳳初執金吾馬適建姓馬名適建等將三輔太常徒討破之建武初氐人悉附隴蜀及隗囂滅其酋豪乃背公孫述降漢馬援上復其王侯君長賜以印綬後囂族人隗茂反殺武都太守氐人大豪齊鍾留為種類所敬信威服諸豪與郡丞孔􅁬擊茂破斬之白狼夷後漢書曰永平中益州刺史梁國朱輔好立功名慷慨有大畧在州數嵗宣示漢徳威懐逺夷自汶山以東前代所不至正朔所不加白狼槃木唐菆等百餘國户百三十餘萬口六百萬以上舉種奉貢稱為臣僕輔上䟽曰臣聞詩云彼徂者岐有夷之行𫝊曰岐道雖僻而人不逺詩人誦詠以為符騐今白狼王唐菆等慕化歸義作詩三章路經卭來大山零高坂峭危峻險百倍岐道繈負老幼若歸慈母逺夷之語辭意難正草木難種鳥獸殊類有犍為郡掾田㳟與之習狎頗曉其言臣輙令訊其風俗譯其詞語今遣從事史李陵與恭䕶送詣闕并上其樂詩昔在聖帝舞四夷之樂今之所上庶備其一帝嘉之事下史官錄其歌焉東觀記載其歌並載夷人本語並重譯訓詁為華言今范史所載者是也至和帝永元十二年旄牛徼外白狼樓薄蠻夷王唐繒等遂率種人十七萬口内屬樿國音檀後漢書曰和帝永元九年椫國王雍由調遣使重譯奉國珍寳帝賜金印紫綬安帝永寧初復遣朝貢獻樂及幻人能變化吐火自支解易牛馬頭又善跳丸數乃至千自言我海西人海西即大秦也樿國西南通大秦明年元㑹安帝作樂於庭封雍由調為漢大都尉賜印綬金銀綵繒各有差牂柯後漢書曰初楚頃襄王時遣將莊豪從沅水伐夜郎軍至且蘭椓船於岸而歩戰既滅夜郎因留王滇池以且蘭有椓船牂柯處乃改其名為牂柯牂柯地多雨潦俗好巫鬼禁忌寡畜生又無蠶桑故其郡最貧有桄榔木可以為麵百姓資之又曰公孫述時牂柯大姓龍𫝊尹董氏與郡曹謝暹保境為漢乃遣使從番禺江奉貢光武嘉之並加褒賞桓帝時郡人尹珍自以生於荒裔不知禮義乃從汝南許慎應奉受經書學成還鄉里敎授自是南域始有學焉永昌郡𫝊曰牂柯郡在建寧東北千二百里處所險峻率皆高山而少平地唐書曰牂牁蠻首領亦姓謝氏其地北去兖州一百五十里東至辰州二千四百里南至交州一千五百里西至昆明九百里無城壁散為部落而居土氣欝熱多霖雨稻粟再熟無徭役唯征戰之時乃相屯聚刻木為契其法刼盗者二倍還贓殺人岀牛馬三十頭乃得贖以納死家風俗物産畧與東謝同其首領謝龍羽大業末據其地勝兵數萬人又曰武徳三年牂牁蠻首領謝龍羽遣使朝貢授龍羽牂州刺史封夜郎郡公貞觀四年復朝貢開元十年酋長謝元齊死詔立其嫡孫嘉藝襲其官封二十五年大酋長趙君道來朝獻方物元和三年五月勅自今已後委黔南觀察使差本道軍將充押領押領牂牁昆明等四年正月遣使來朝是月遣中使魏徳和領其使并賫國信物降璽書賜其王焉自後朝貢不絶臨海異物志曰桄榔木生牂牁外皮有毛似栟櫚而散其木剛作鋤利如鐵中更利唯中焦根乃致敗耳皮中有似𢷬稻米片又似麥麵作餅餌廣志曰桄榔樹大四五圍長五六丈洪直旁無枝條其顚生葉不過數十似葉破其木肌堅難傷入數寸得麵赤黄宻緻可食濮周書王㑹曰卜人丹沙註西南之蠻丹沙所出按卜人盖今之濮人也又曰湯令伊尹為四方獻令伊尹曰臣請正南甌鄧桂國指子産里百濮九箇請令以珠璣瑇瑁象牙齒文犀翠羽箘鶴短狗為獻永昌郡𫝊曰雲南郡在建寧南二十五里治雲南縣亦多夷濮分布山野千人五百女大小蹲踞道側皆持數種器杖時㓂鈔為郡邑之害尾濮永昌郡𫝊曰郡西南千五百里徼外有尾濮尾若龜形長四五寸欲坐輙先穿地空以安其尾若邂逅誤折尾便死男女長各隨宜野會無多嫁娶猶知識毋不識父扶南土俗傳曰枸利東有蒲羅中人人皆有尾長五六寸其俗食人按其地並西南蒲羅盖尾濮之地名也梁祚魏國統曰西南有夷名曰濮其地出瑇瑁犀象珠璣金銀葛樾桂木人皆蠻夷重譯乃通也木綿濮郭義㳟廣志曰木綿濮土有木綿樹多葉生房甚繁房中綿如蠶所作其大如拳文面濮文面濮其俗劖面而以青畫之折腰濮廣志曰折腰濮其俗生子皆折其腰赤口濮廣志曰赤口濮在永昌南其俗折其齒劖其唇使赤又露身無衣服墨僰濮廣志曰墨僰濮在永昌西南山居耐勤苦其衣服婦人一幅布為裙或以貫頭丈夫以榖皮為衣其境出白蹄牛馬犀象琥珀金桐華布朱提永昌郡𫝊曰朱提在犍南千八百里治朱提縣川中縱廣五六十里有大泉池水千頃名千頃池又有龍池以灌溉種稻與僰道接多猿羣聚鳴嘯於行人徑次聲聒人耳夷分布山谷間食肉衣皮雖有人形禽獸其心言語服餙不與華同有堂狼山山多毒草盛夏之月飛烏過之不能去又曰建寜郡朱提之東南六百里土氣和適盛夏之月熱不欝蒸孟冬時寒不􅆭慄又曰永昌郡在雲南西七百里郡東北八十里瀘倉津此津有瘴氣徃以二月渡之行者六十人皆悉悶亂毒氣中物則有聲中樹木枝則折中人則令奄然青爛也又曰興古郡在建寕南八百里郡領九縣經千里皆有瘴氣菽榖雞豕魚酒不可食之害人郡北三百里有槃江廣數百歩深十餘丈此江有毒瘴九縣之人皆號曰鳩民言語嗜欲不與人同鳩民咸以三尺布角割作兩䄡不復加鍼縷之功也廣頭着前狹頭覆後不盖其形與裸身無異昆彌國唐書曰昆彌國一曰昆明西南夷也在爨之西洱河為界即葉榆河其俗與突厥畧同相𫝊云與匈奴本是兄弟國也漢武帝得其地入益州部其後復絶諸葛亮定南中亦所不至武徳四年嶲治中吉𢎞使南寧因至其國諭之至十二月遣使朝貢貞觀十九年四月右武侯將軍梁建方討蠻降其部落七十二户十萬九千三百西爨唐書曰西爨者南寕之渠帥也自云本河東安邑人七世祖仕晉為南寧太守屬中國亂遂王蠻夷梁元帝時南寧州刺史徐文威徴詣荆州有爨瓉者遂據南寧之地延袤二千餘里俗多華民饒駿馬明珠犀象瓉死有二子震翫分統其衆隋開皇初遣使朝貢文帝遣韋世冲將兵鎮之析置㳟州協州昆州未幾復叛後遣史萬嵗撃之所至皆破踰西洱河臨滇池而還翫懼而來朝文帝誅之諸子沒為官奴不収其地因與中國絶高祖受禪拜翫子𢎞達為昆州刺史持其父屍歸葬本郷益州叚綸又遣俞大施至南寧諭其部落悉來歸欵自是朝貢不絶東女國唐書曰東女國西羗之别種以西海中復有女國故稱東女焉俗以女為王東與茂州黨項接東南與雅州接隔羅女蠻及白狼夷其境東西九日行南北二十日行有大小八十餘城所居名延康川中有弱水南流用牛皮為船以渡户四萬衆勝兵萬餘人散在山谷女王號為賔就有女官曰高覇平議國事在外官僚並男夫為之其王侍女數百人五日一聼政女王若死國中多歛金錢動至數萬更於王族求令女二人而立之大者為王其次為小王若大王死即小王嗣立或姑死而婦繼無有篡奪其所居皆起重層屋王至九層國人至六層其王服青毛綾裙下領衫上披青袍其䄂委地冬則羔裘餙以紋錦為鬟髻飾之以金耳垂璫足履索􅝿俗重婦人而輕丈夫文字同於天竺以十一月為正又曰東女國其俗每至十月令巫者詣山中散糟麥於空大呪呼鳥俄而有鳥如鷄飛入巫者之懐因剖腹而視之每有一榖來嵗必登若霜雪必多灾異其俗信之名為鳥卜其居喪服餙不改為父母則三年不櫛沐貴人死者或剝其皮而藏之納骨於缾中糅以金屑而埋之國王將葬其大臣親屬殉死者數十人隋大業中蜀王秀遣使招之拒而不受武徳中女王湯滂氏始遣使貢方物髙祖厚資遣之又曰垂拱二年東女國王劒臂遣大臣湯劒右來朝仍請官號則天冊拜劒臂為左玉鈴衛將軍仍以瑞錦製番服以賜之天授三年其王俄琰兒來朝開元十九年十二月其王趙曵夫遣子獻方物命有司宴于曲江令宰臣已下同宴又封曵夫為歸昌王賜其子帛放還復以男子為王貞元九年七月其王湯立悉與哥隣國王董臥庭白狗國王羅陁忽逋租國王董藐蓬各率其種落詣劒南西川内附其哥隣等國皆散居山川弱水王即國初女國之弱水部落其悉董國在弱水西故亦謂之弱水西悉董王舊皆分𨽻邊郡祖父例授將軍中即果毅等官自中原多故皆為吐畨所役屬其部大者不過三二千户各置縣令十數人理之土有絲絮嵗輸於吐畨至是悉與之同盟相率獻欵兼賫天寳中國家所賜官告三十九通以進西川節度使韋臯處其衆於維覇保等州給以種粮耕牛咸樂生業立悉等數國自來朝召見於麟徳殿官賞各有差太平御覽卷七百九十一
