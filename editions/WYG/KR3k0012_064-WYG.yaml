body:
  text: 太平御覧卷六十四宋李昉等撰地部二十九河北諸水淇水黄花水洹水清水滏水漳水易水汾水文水澮水晉水媯水沁水鴦漿水石臼水滹沱水衡水白溝水屯氏水鳴犢河水滭發水窮魚水漏水桑乾河水拒馬河水五渠水金河水淇水說文曰淇水出河内共北山東入河詩曰毖彼泉水亦流于淇又曰要我乎上宫送我乎淇之上矣又曰瞻彼淇澳菉竹猗猗又曰籊籊竹竿以釣于淇淇水悠悠檜楫松舟韓子曰昔紂為甲卒百萬飲卒于淇右飲馬于洹左洹水竭淇水不流武王甲卒三千破之隋圖經曰清淇西自魏郡朝歌縣界分為二𣲖一在郡東一在郡西俱南流入河酈道元注水經云淇水南與清水合而入白溝石㑹宿胥皆瀆之名淇又一名王莽河王莽所濬冀州圖經云淇水西從河内郡界入至黎陽而東北至臨河西至王莽河出焉又東經澶淵東入武陽河南即東郡界是水經曰淇水出河内隆慮縣西大號山水經注曰淇水出沮洳山水側頽波漰注衝激横山山上合下開可減六七十步巨石磥砢交積隍澗傾瀾莽蕩勢同雷轉激水散氣暖若霧合又曰詩云瞻彼淇澳菉竹猗猗毛云菉王芻也竹褊竹也漢武帝塞决河斬淇園之竹木以為用冦恂為河内伐竹淇川治夫百餘萬以輸軍資今日之淇無復此物唯王芻褊草不異黄花水隋圖經曰黄花水出隆慮縣西北崖上高十七里去地七里懸水東南注壑巖下狀若雞翅俗謂之雞翅水天台赤城之流也至谷潜入地下十里復出名曰栁水者是黄花水重發源也其谷號為黄花谷内有仙母塜谷西有洞穴謂之聖人窟洹水隋圖經曰洹水出隆慮縣西北俗謂安陽河即聲伯夢渉之所源出林慮山東平地清水水經註曰清水出河内脩武縣之北黒山黒山在縣北白鹿山東清水所出也上承諸陂散泉積以成川南流西南屈曲瀑布垂巖懸河注壑二十餘丈聲震山谷左右石壁層深獸跡不交隍中散水霧合視下見底其水厯澗流飛清泠洞觀之清水也滏水水經注曰滏水發源出石鼓山南巖下泉奮湧滚滚如湯其水冬温夏冷崖山有魏世所立銘水上有祠能興雲雨滏水又東流注于漳又謂之合河佛圖澄别傳曰石虎時自正月不雨澄詣滏口祠稽首曝露即日二白龍降于祠下於是雨遍千里山海經曰神國之山滏水出焉東流注于歐水郭璞注曰滏水在臨漳縣西滏山經鄴西北至列人縣入于漳其水熱漳水說文曰濁漳水出上黨長子鹿谷山東入清漳清漳出沾山大要谷北入河呂氏春秋曰史起引障水灌鄴田民初大怨後轉獲利相與歌曰鄴有聖令曰史公决漳水灌鄴旁古有斥鹵今稻粱風土記曰南易水本名漳水源出三門山按趙地記云六國時此水名易水埤倉及水經云洺水其目不知誰改俗謂山之下地名洺水因經之故曰洺水按燕趙記云其分有三易漳為南易是也鄴縣圖經曰濁漳水在縣西水東北津有永縣浦浦西五里俗謂之紫陌河北處即俗巫為河伯娶婦處也水經注曰清漳水東經沙縣故有沙河之稱又曰濁漳水出上黨長子縣西發鳩山又曰漳水出鹿谷山與發鳩連麓而在南淮南子曰謂之發苞山故異名互見山左則陽泉水注之右則散蓋水入焉三源同出一山但以南北為别耳尚書曰覃懐底績至于衡漳孔安國曰衡横也言漳水横流也易水水經曰易水出涿郡固安縣閻鄉西山燕丹子曰荆軻入秦不擇日發太子送之于易水之上荆軻起為夀歌曰風蕭蕭兮易水寒壯士一去兮不復還固安圖經曰易水又名安國河亦名北易水汾水說文曰汾水出太原晉陽山西南入河山海經曰管務之山其山無木而下多草其下多玉汾水出焉而流注于河十三州志曰出武周燕之燕京山亦管涔之異名也其山重阜修層有草無木泉源導於南麓之下荘子曰堯治天下之民平海内之政往見四子於姑射之山汾水之陽窅然䘮其天下焉説苑曰智伯圍趙襄子于晋陽决晋水以灌之晋陽之城不沒者三版智伯曰吾始知水之可以亡人國也汾水可以灌安邑綘水可以灌平陽淮南子曰汾水濛濁而宜麻水經曰汾水南冠爵津汾名也在介休縣之西南俗謂之雀鼠谷數十里其間道隘水左右悉結編梁閣道累䂖就路縈帶巖側或去水一尺或髙五六尺上戴山阜下臨絶澗俗謂之為魯般橋蓋通古之津隘亦在今之地險文水水經曰文水出大陵縣西山文谷東北入于汾注云縣西南山下武氏穿井給養井至幽深後一朝水溢平流東南注汾水又曰文水又南逕縣右㑹隠泉水口水出竭泉山之上頂俗云暘雨愆時是禱故山得其名非所詳也其山石崖絶險壁立崖半有一石室去地可五十餘丈爰有層松飾巖列栢綺望唯西側一處得厯級升陟頂上平地一十許頃沙門釋僧光表建二刹泉發于兩寺之門東流厯石沿注上下又東津渠隠沒而不恒流故有隠泉之名也兩澤並注則通入文水又南經兹氏縣故城東為父湖東西一十五里南北三十里世謂之西河在縣直東于五湖之西側臨湖澮水水經曰澮水出河東絳縣東澮交東髙山注云一名詳髙山亦曰河南山西南經翼城北合諸水謂之澮交左傳晋悼公謀去故絳欲居郇瑕魏獻子曰不如新田有汾澮以流其惡遂居新田又謂之絳蓋在絳澮之陽又西南過虒祁宫南入于汾晋水水經注曰山海經曰懸甕之山晋水出焉今在縣之西南昔智伯之遏晉水以灌晉陽濬其上源後人踵其遺迹畜以為沼沼西際山枕水有唐虞叔祠水側有涼臺結飛梁於水上左右雜樹交陰希見曦景晋川之中最為勝處媯水地記曰河東郡首山之東北山中有二泉水南流者曰媯水北流曰汭水二水西經厯山下異流同歸渾流而注入于河水經注曰尚書所謂釐降二女于媯汭孔安國曰舜居媯水之汭王肅曰媯汭虞地名皇甫謐曰納二女于媯水之汭馬季長曰水所入曰汭然則汭似非水名今則見有二水異源同歸渾流西注而入于河沁水水經曰沁水出上黨湼縣謁戾山注云沁即洎水也又曰沁水南廵石門石門是晋安平獻王司馬孚之為魏野王典農中郎將之所造也按其表云孚言臣被明詔典河内水利臣既到冀行沁水源出銅鞮山屈曲周廻水道九百里自太行以西王屋以東層巗高峻天時霖雨衆谷走水小石漂迸水門朽敗稻田汎濫嵗功不成臣輙按行去堰五里以外方石可得數萬餘枚臣以為累方石為門若天旱増堰進水若天霖雨陂澤充溢則閉防斷水竟其功足以成河雲雨由人經國之謀暫勞永逸聖王所願許可也陛下特出臣表勅大司農府給人工勿使稽延詔書聽許於是夾岸累石結以為門用而代木門矣鴦漿水山海經曰觧縣南有壇道山山下有水潜出停而不流俗為鴦漿水發于上而潜于下厥頂方平有良藥石臼水水經注曰漢永平中治滹沱石臼河按司馬彪後漢郡國志常山南行唐縣有石臼谷蓋資承滹沱之水轉山東之費自都盧至羊腸倉將憑汾水以漕太原用實秦晋苦役連年轉運所經凡三百八十九隘死者無算拜鄧訓為謁者監䕶水功訓隠括知其難言于肅宗從之全活數千人和熹鄧后之父也訓後貴盛叔父以為訓積善所致也滹沱水禮曰晋人將有事于河必先有事于滹沱隋圖經曰滹沱在深澤縣界光武為赤眉所追至滹沱河欲渡導吏還乃言水深無船左右懼上使王覇視之覇恐驚衆乃言氷堅可渡比至河氷亦合以囊沙布氷上乃渡未畢數騎氷觧今名其處為危渡口是也魏改曰清寧河此水常有蛟入五月恒暴變為人於岸上與人並行至懸岸處推人與之俱下衡水信都記曰衡水亦曰長蘆水即濁漳之下流也水有袁潭渡厯下慱城北而逶迤東北注謂之九争曲水味鹹苦俗稱苦河謂之黄漳河是也白溝水信都記曰白溝河地接館陶界隋焬帝導為永濟渠亦名御河南自相州洹水縣界流入又北難河出焉蓋魏時河難利導故此凟有難之稱焉屯氏水水經注曰大河故瀆北為屯氏河前漢書溝洫志曰自塞宣防河復北决于館陶分為屯氏河廣深與大河等鳴犢河水漢書地理志曰河水自靈縣别出為鳴犢河溝洫志曰元帝永光五年河决清河靈鳴犢口而屯氏河絶澤發水隋圖經曰滭發水今俗亦名妬女泉大如車輪水色青百姓祀之婦人不得艶粧衣新綵臨之必興雨雹故云妬女即介子推妹也窮魚水竹書記年曰晋荀瑶伐中山取窮魚之丘水經云水出魚山山石若巨魚水發其下漏水水經曰漏水一名澧水一名鴛鴦水俗謂之北泉源出龍岡縣東南平地以其道源總納衆泉合成一川故也亦謂之鴛鴦水魏都賦所云鴛鴦交谷是也桑乾河水水經曰桑乾河水潜承太原汾陽縣北燕京山天池也天池亦名大池在静樂縣北百四十里注云桑乾河水潜承燕京之池池在山東之上周廻里餘其水澄渟鏡浄潭而不流若安定朝那之湫池也池内曽無片草及其風漾有淪輙有小鳥翠色投池銜水若會稽之耘鳥矣拒馬河水水經注曰拒馬河水即漆水也東北經郎山西望衆崖競舉若鳥翼立石巉巗似劍㦸之狀又南流經刀山層巗直上衝霄望崖側若積刀環五渠水邢子勵記曰後漢延興初文安縣人孫願捕魚于五渠水中有羣魚從西來共以柴塞之忽有人謂願曰須臾當得大魚若願多求宜勿殺也後願下網果得大魚其狀如鯉而大頭以為異物遂殺食之俄然風雨晝昏唯聞鳥飛聲比風息雨霽有人乘船至者云前見群魚無數飛入于海願遂不復漁矣因呼入海之處為飛魚口也金河水郡國志曰雲中郡有紫河鎮界内有金河水其泥色紫故曰金河太平御覧卷六十四
