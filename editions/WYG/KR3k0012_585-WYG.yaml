body:
  text: 太平御覽卷五百八十五宋李昉等撰文部一叙文易賁卦象曰觀乎天文以察時變觀乎人文以化成天下春秋襄二十五年傳曰鄭子産獻捷于晉獻入陳之功士荘伯不能詰仲尼曰志有之言以足志文以足言不言誰知其志言之無文行之不逺論語曰孔子曰周監於二代郁郁乎文哉吾從周又曰子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也又曰大哉堯之為君也巍巍乎唯天為大唯堯則之蕩蕩乎民無能名焉巍巍乎其有成功煥乎其有文章揚子法言曰或曰良玉不雕美言不文何謂也曰玉不雕璵璠不作器言不文典謨不作經桓寛鹽鐵論曰内無其質而外學其文若畫脂鏤冰費日損功王充論衡曰學問習熟則能推類興文文由外而滋未必實才與文相副也魏文帝典論曰夫文本同而末異盖奏議宜雅書論宜理銘誄尚實詩賦欲麗文以氣為主氣之清濁有體不可力强而致古之作者寄身於翰墨見意於篇籍不假良史之辭不託飛馳之勢而聲名自傳於後故西伯幽而演易周旦顯而制禮不以隐約而弗務不以康樂而加思夫然則古人賤尺璧而重寸隂懼乎時之過已而人多不强力貧賤則懾於飢寒富貴則流於樂逸遂營目前之務而遺千載之功日月逝於上體貌衰於下忽然與萬物遷化斯志士之大痛也晉摯虞文章流别論曰文章者所以宣上下之象明人倫之叙窮理盡性以究萬物之宜者也王澤流而詩作成功臻而頌興勲徳立而銘著嘉美終而誄集祝史陳辭官箴王闕周禮太師掌教六詩曰風曰賦曰比曰興曰雅曰頌言一國之事繫一人之本謂之風言天下之事形四方之風謂之雅頌者美盛徳之形容賦者敷陳之稱也比者喻類之言也興者有感之辭也后世之為詩者多矣頌功徳者謂之頌其餘則總謂之詩頌詩之美者也古者聖帝明王功成治定而頌聲興於是奏於宗廟告於鬼神故頌之所美者聖王之徳也古之作詩也發於情止乎禮義情之發因辭以形之禮義之指須事以明之故有賦焉所以假象盡辭敷陳其志古詩之賦以情義為主以事類為佐今之賦以事形為本以義正為助情義為主則言省而文有例矣事形為本則言富而辭無常矣文之煩省辭之險易蓋由於此夫假象過大則與類相逺逸辭過荘則與事相違辯言過理則與義相失麗靡過美則與情相悖此四過者所以背大體而害政教所以司馬遷割相如之浮說揚雄疾辭人之富麗以淫也沈約宋書論曰民禀天地之靈含五常之徳剛柔迭用喜愠分情然則歌詠所興宜自生民始也周室既衰風流彌著屈平宋玉導清源於前賈誼相如振芳塵於後英辭潤金石髙義薄雲天自茲以䧏情志逾廣王褒劉向楊班崔蔡之徒異軌同奔逓相師祖雖清辭麗曲時發於篇而蕪音累氣固亦多矣若夫平子豔發文以情變絶唱髙蹤久無嗣響至於建安曹氏基命二祖陳王咸蓄盛藻自漢至魏四百餘年辭人才子文體三變相如巧為形似之言二班長於情理之說子建仲宣以氣質為體原其飈流所始莫不同祖風騷䧏及元康潘陸特秀律意班賈體變曹王縟采星稠繁文綺合綴平䑓之逸響採南皮之髙韻遺風餘烈事極江右爰逮宋氏顔謝騰聲靈運之興㑹標舉延年之體裁明宻並方軌前秀垂範後昆李充翰林論曰或問曰何如斯可謂之文荅曰孔文舉之書陸士衡之議斯可謂成文也陸景典語曰所謂文者非徒執卷於儒生之門攄筆於翰墨之采乃貴其造化之淵禮樂之盛也文心雕龍曰人文之元肇自太極幽贊神明易象惟先庖羲畫其始仲尼翼其終而乾坤兩位獨制文言言之文也天地之心哉若乃河圖孕乎八卦洛書韞乎九疇玉版金鏤之寳丹文綠牒之華誰其尸之亦神理而已自鳥跡代繩文字始炳炎皥遺事紀在三墳而年世𦕈邈聲采靡追唐虞文章則焕乎始盛元首載歌既發吟詠之志益稷陳謨亦垂敷奏之風夏后氏興業峻鴻績九序詠歌勲徳彌縟逮及西周文勝其質雅頌所被英華日新文王憂患繇辭炳燿符采複隠精義堅深重以公旦多才振其徽烈剬詩緝頌斧藻羣言至若夫子繼聖獨秀前哲鎔鈞六經必金聲而玉振雕琢性情組織辭令木鐸啟而千里應席珍流而萬世響冩天地之輝光曉生民之耳目矣故爰自風姓暨於孔氏𤣥聖創典素王述訓莫不原道心以敷章研神理以設教著象乎河洛問數乎蓍龜觀天文以極變察人文以成化然後能經緯區宇彌綸彛憲發揮事業彪炳辭義故知道聖以垂文聖因文以明道旁通而無滯日用而不匱易曰鼓天下之動者存乎辭辭之所以能鼓天下者迺道之文也又曰方其搦翰氣倍辭前暨乎篇成半折心始何則意翻空而易竒言徴實而難巧也是以臨篇綴翰必有二患理欝者苦貧辭溺者傷亂然則博見為饋貧之糧貫一為拯亂之藥博而能一亦有助乎心力矣又曰翬翟備色而翔翥百步肌豐而力沉也鷹隼無采而翰飛戾天骨勁而氣猛也文章才力有似於此若風骨乏采則鷙集翰林采乏風骨則雉竄文囿若藻曜而髙翔固文筆之鳴鳳也又曰括囊雜體功在銓别宫商朱紫隨勢各配章表奏議則凖的乎典雅賦頌歌詩則羽儀乎清麗符檄書記則楷式於明㫁史論序注則軌範於覈要箴銘碑誄則體制於𢎞深連珠七辭則崇事於巧豔此循體而成勢隨變而立功者也雖復契㑹相㕘節文互雜譬五色之錦各以本采為地矣又曰夫薑桂因地辛在本性文章由學能在天才故才自内發學以外成有學飽而才餒有才富而學貧學貧者迍邅於事義才餒者劬勞於辭情此内外之分也是以屬意立文心與筆謀才為盟主學為輔佐主佐合徳文采必霸才學褊狹雖美少功才量學文宜正體制必以情志為神明事義為骨髓辭采為肌膚宫商為聲氣然後品藻𤣥黄摛振金玉獻可替否以裁厥中斯綴思之恒數也夫文變無方意見浮雜約則義孤博則辭叛率故多尤需為事賊且才分不同思緒各異或製首以通尾或尺接以寸附然通製者葢寡接附者甚衆若統緒失宗辭義必亂義脉不流則偏枯文體夫能懸識湊理然後節文自㑹如膠之粘木石之合玉矣是以四牡異力而六轡如琴馭文之法有似於此昔張湯擬奏而再却虞松草表而屢譴並事理之不明而辭㫖之失調也及倪寛更草鍾㑹易字而漢武歎竒曹景稱善者乃理得而事明心敏而辭當也宋范􅁮獄中與諸生姪書以自序其略曰吾少懶學問年三十許始有向耳自爾以來轉為心化至於所通處皆自得之胸懐常謂情志所托故當以意為主以文傳意以意為主則㫖必見以文傳意則其辭不流然後能抽其芬芳振其金石耳金樓子曰王仲任言夫說一經者為儒生也博古今者為通人也上書奏事者為文人也能精思著文連篇章為鴻儒也若劉子政揚子雲之列是也盖儒生轉通人通人為文人文人轉為鴻儒也又曰古之學者有二今之學者四焉夫子門徒轉相師授通聖人經者謂之儒屈原宋玊枚乗長卿之徒止之為辭賦則為文今之儒博窮子史但能識其事不能通其理者謂之學至於不便為詩閆纂善為章奏如柏松若此之流謂之筆詠吟風謡流連哀思者謂之文唯湏綺縠紛披宫徴靡曼唇吻適㑹情靈揺蕩潘安仁清綺若是而評者止稱情切故知為文之難也曹子建陸士衡皆文士觀其辭致側宻事語更明雖不以儒者命家此亦悉通其義也若夫今之俗也縉紳稚齒閭巷小生茍取成章貴在恱目龍首豕足隨時之宜牛頭馬髀强相附㑹夫挹酌道徳憲章前言者君子所以行之也原憲云無財謂之貧學道不行謂之病末俗學徒頗或異此或假兹以為伎術或狎之以為戱笑未聞强學自立和樂慎禮者也齊書曰陸厥字韓卿少有風槩好屬文時盛為文章呉興沈約陳郡謝朓琅琊王融以氣類相推轂汝南周顒善識聲韻約等文皆用宫商将平上去入四聲以此制韵平有平頭犯尾蜂腰鶴膝五字之中音韵悉恊兩句之内角徴異同不可増減世為永明體厥與約書曰范詹事自序性别宫商識清濁特能適輕重濟艱難古今文人多不全了斯處縱有㑹此者不必從根本中來沈尚書亦云自靈均已來此秘未覩或闇與理合匪由思至張秦曹王曽無先覺潘陸顔謝去之彌逺大㫖欲宫商相變低昻舛節若前有浮聲則後須切響一簡之内音韻盡殊兩句之中輕重悉異辭既美矣理又善焉但觀厯代衆賢似不都闇此處而云此秘未覩近於誣乎案范云不從根本中來尚書云匪由思至斯則揣情謬於𤣥黄擿句著其音律也范又云時有㑹此者尚書云或闇與理合夫思有合離前哲固所不免文有開塞即事不得無之子建所以欲人譏彈士衡所以遺恨終篇自魏文屬論深以清濁為言劉楨奏書大明體勢之致齟齬妥帖之談操末續顛之說興𤣥黄於律吕比五色之相宣茍此秘未覩兹論為何所指耶至於掩瑕藏疾合少謬多則臨淄所云人之著述不能無病者也長林上門殆非一家之賦洛神池鴈便成二體之作王粲初征他文未能稱是楊修敏㨗暑賦彌日不獻率意寡尤則事促乎一日翳翳愈伏而理賒於七歩一人之思遲速天懸一家之文工拙壤隔何獨宫商律吕必責其如一耶梁書曰徐摛字士秀東海郯人也員外散騎常侍超之子文好新變不拘舊體梁武謂周捨曰為我求一人文學俱長兼有徳行者欲令與晉安遊處捨曰臣外弟徐摛形質陋小若不勝衣而堪此選梁武曰必有神仙之才亦不簡其貌也乃以摛為侍讀王為太子轉家令文體既别春坊盡學之謂之宫體宫體之號自斯而起典略齊主甞問於魏收曰卿才何如徐陵收對曰臣大國之才典以雅徐陵亡國之才麗以艷後周書曰庾信父肩吾為梁太子中庶子掌管記東海徐摛為左衛率摛子陵及信並為抄撰學士父子在東宫出入禁闥恩禮莫與比陵既有盛才文並絶艷故世號為徐庾體焉論語曰君子以文㑹友以友輔仁太平御覽卷五百八十五
