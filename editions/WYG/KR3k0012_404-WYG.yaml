body:
  text: 太平御覽卷四百四宋李昉等撰人事部四十五師韓詩外傳曰智如源泉行可以為表儀者人師也又曰哀公問於子夏曰五帝有師乎子夏曰臣聞黄帝學乎大墳顓頊學乎緑圖帝嚳學乎赤松子堯學乎務成子附舜學乎尹夀禹學乎西王國湯學乎貸子相文王學乎錫疇子斯武王學乎太公周公學乎虢叔仲尼學乎老耼此十一聖人未遭師則功業不能著乎天下名號不能傳乎後世尚書曰徳無常師主善為師周禮地官下曰師氏掌以媺詔王告王以善道也文王世子曰師也者教之以事而諭諸徳者也以三徳教國子一曰至徳二曰敏徳三曰孝徳教三行一曰孝行二曰友行三曰順行居虎門之左司王朝掌國中得失之事以教國子弟凡國之貴㳺子弟學焉大戴禮曰帝入大學承師問道禮記檀弓上曰事師無犯無隠左右就養無方服勤至死心喪三年心喪戚容比父而無服也又學記曰君子知至學之難易而知其美惡然後能博喻能博喻然後能為師能為師然後能為長能為長然後能為君故師也者所以學為君也是故擇師不可不慎也三王四代唯其師其此之謂乎凡學之道嚴師為難師嚴然後道尊道尊然後民知敬學是故君之所不臣於其臣者二當其為尸則弗臣也當其為師則弗臣也尸主也為祭主大學之禮雖詔於天子無北面所以尊師也善學者師逸而功倍又從而庸之不善學者師勤而功半又從而怨之又曰記問之學不足以為人師師無當於五服五服不得不親又文王世子曰師也者教之以事而喻諸徳者也左襄三十一年鄭人遊于鄉校鄉人之學校以論執政論政得失然明謂子産毁鄉校如何患人於中謗議國政子産曰其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之榖梁傳昭公曰子既生不免乎水火母之罪也成童不就師傅父之罪也就師學問無方心志不通師之罪也論語為政篇温故而知新可以為師矣又述而篇三人行必有我師焉孔叢子曰子思居魯穆公師而尊之春秋後語曰甘羅請張唐相燕吕不韋叱曰我自請不行汝安能行之甘羅曰夫項槖十歲為孔子師今臣十二歲矣君其試臣何遽叱乎史記曰孔子既没弟子思慕有若狀似孔子弟子相與立為師師之如夫子時又曰曹參為齊相乃避堂舍盖公而師之齊果大治又曰鄒子如燕昭王擁篲先驅請列弟子之座而受業築碣石宫身親往師之又曰文王為西伯鬻熊者為文王師有功於文王及武王㓕殷未之封也成王學勤事之後封其曾孫熊繹為楚子漢書曰初梁相褚大通五經為博士時倪寛為弟子及御史大夫缺徴褚大大自以為得御史大夫至雒陽聞倪寛為之褚大笑及至與寛議封禪於上前大不能及退而服曰上誠知人也又曰龔勝既歸鄉里二千石長吏初到官皆至其家如師弟子之禮又曰嚴彭祖字公子東海下邳人與顔安樂俱事眭孟弟子百餘人唯彭祖安樂為明質問疑誼各持所見孟曰春秋之意在二子矣孟死彭祖安樂各顓門教授又曰竇皇后兄弟長君少君絳侯灌將軍等曰吾属命乃懸兩人此兩人所出微不可不為擇師傅於是乃選長老之有行者與居長君少君由此為退讓君子不敢以富貴驕人又曰張良稱曰今以三寸舌為帝者師封萬户位列侯此亦布衣之極於良足矣又曰張禹成就弟子尤著者淮陽彭宣至大司空沛郡戴崇至少府九卿宣為人恭儉有法度而崇愷悌多智二人有異行禹心親愛敬宣而踈之崇每候禹常責師置酒設樂與弟子相娱禹將崇入後堂飲食婦女相對作優人管絃鏗鏘極樂昏夜乃罷而宣之來也禹見之於便坐講論經義日晏賜食不過一肉巵酒相對宣未嘗得至後堂及兩人皆聞知自得又曰􅄯錯潁川人也學申商刑名於軹生張恢所軹縣之儒生姓張名恢與洛陽宋盂劉帶同師以文學為太常掌故又曰孔霸亦治尚書事太傅夏侯勝昭帝末年為博士宣帝時為太中大夫以選授皇太子經遷詹事髙密相元帝即位徴霸以師賜爵闗内侯號褒成君又曰張禹初為師以上難數對已問經為論語章句獻之後漢書曰亷范初師事薛漢後辟公府㑹薛漢坐楚王事誅故人門生莫敢收視范獨往收歛之吏聞顯宗大怒召入詰責范叩頭曰臣無狀愚戅以為漢等皆已伏誅不勝師資之情罪萬死因貰之謝承後漢書曰董春字紀陽㑹稽餘姚人少好學師事侍中祭酒王君仲受古文尚書後詣京房授易究極聖㫖條列科義還為師立精舎逺方門徒學者常數百人東觀漢記曰顯宗即位尊桓榮以師禮常幸太常府令榮坐東面設几杖㑹百官驃騎將軍東平王蒼以下榮門生數百人天子親自執業每言太師在是既罷悉以太官供具賜太常家其恩禮如此永平二年璧雍初成拜榮為五更每大射養老禮畢上輙引榮及弟子升堂執經自為辨說又曰顯宗以張酺授皇太子業甚得輔導之體章帝即位出拜東郡元和二年東巡狩幸東郡引酺及門生并郡掾吏並會庭中帝先備弟子之儀使酺講尚書一篇然後修君臣之禮賞賜殊特續漢書曰李膺性簡亢無所交接唯以同郡荀淑陳寔為師友又曰楊政從代郡范升學升嘗為出婦所告坐繫獄政乃肉袒以箭貫耳抱升子􅇓伏道傍候車駕過泣涕辭請有感帝心詔曰乞楊生師即為放出升范􅁮後漢書曰歐陽歙字正思樂安千乗人為大司徒坐汝南贓罪千餘萬發覺下獄平原孔震年十七聞獄當斷馳之京師行到河内獲嘉縣自繋上書求代歙死曰伏見臣師大司徒歐陽歙為儒宗八世博士乞殺臣以代歙命書奏而歙已死獄中又曰鄭𤣥字康成北海髙密人也事扶風馬融融門徒四百餘人升堂進者五十餘生融素驕貴𤣥在門下三年不得見乃使髙業弟子傳授於𤣥日夜尋誦未嘗息倦㑹融集諸生考論圖說聞𤣥善算乃召見於樓上𤣥因從質諸疑義問畢辭歸融喟然謂門人曰鄭生今去吾道東矣又曰鍾皓字季明潁川長社人以篤行稱為士大夫所慕李膺嘗歎曰鍾君至徳可師魏志曰夏侯惇字元讓年十四就師學人有辱其師者惇殺之又曰荀攸字公達文帝在東宫太祖謂曰荀公逹人之師表汝當盡禮敬之攸曾病世子問病獨拜床下其見尊異如此晉書曰魏髙貴鄉公之入學也將崇先典乃命王祥為三老侍中鄭小同為五更祥南面几杖以師道自居帝北面乞言又曰王承為東海王越記室越與世子毘書曰嫻習禮度不如式瞻儀形諷味遺言不如親承音㫖王參軍人倫師表爾其師之徐爰宋書曰武帝登祚加顔延之金章紫綬領湘東王師後魏書曰陽平王之子欽託髙僧壽為子求師師至未幾逃去欽以讓僧夀僧夀性滑稽乃謂欽曰凡人絶粒七日乃死始經五朝便爾逃遁去欽乃大慙於是待客稍厚之裴景仁前秦記曰苻堅幸太學問博士經典博士盧壼對曰周官禮注未有其師韋逞母宋傳其父業得周官音義自非此母無可授後堅於是就宋立誦室書堂生徒百二十人隔絳紗幔而授業焉拜宋爵號宣文君賜侍婢十人崔鴻後秦録曰初姚泓之為太子受經太學博士淳于岐岐病在家泓以師者人之表範傳先聖之訓加在三之義不可以不重親詣省拜於牀下又前燕録曰劉瓉字彦真平原人經學博通為世純儒貞清非禮不動慕容廆重其徳學使太子皝師事之又後趙録曰張躍清河武城人也學敏才逹雅善清談勒偉其儀辯拜世子衛軍長史勅世子曰張長史人之表範汝其師之案世說或曰王趙鄧三叅軍人倫師表爾其師之謂王安期鄧伯道趙禮之也唐書曰賀徳仁越州山隂人少與從兄徳基俱事國子祭酒周宏正咸以詞學見稱時人語曰學行可師賀徳基文質彬彬賀徳仁徳仁仕陳至吳興王友入隋授豫王府記室叅軍王以師資禮之恩遇甚厚又曰員半千本名餘慶與彦同師事學士王義方甚嘉重之嘗謂曰五百年生一賢足下當之矣因改名半千及義方卒半千與萬先皆制師服告畢而去六韜曰文王十四田使扁布卜曰田于渭之陽將得焉非熊非彲非虎非羆天遺汝師以之佐昌文王乃齋戒三日田于渭陽卒見吕尚坐茅以漁文王再拜乃與之歸老子曰善人者不善人之師孫卿子曰干將莫邪鉅闕辟閭此皆古之良劍也然而不加砥礪則不能利不得人力則不能斷驊騮騏驥離緑耳此皆古之良馬也然而必前有御轡之制後有鞭䇿之威加之造父之御然後一日而致千里夫人雖有性質美而心辯智必將求賢師而事之擇良友而友之又曰國將興必尊師重傅尊師重傅則法度存師術有四而傳習不與焉尊嚴而憚可以為師耆艾而信可以為師誦說不懈可以為師知微而論可以為師又曰夫達師之教也弟子安焉樂焉悠焉遊焉肅焉嚴焉此六者得於學則邪僻之道塞焉此六者不得於學則君不能令於臣父不能令於子師不能令於徒鶡冠子曰伊尹酒保太公屠牛管子作革百里官奴海内荒亂立為世師莊子曰堯之師曰許由許由之師曰齧缺齧缺之師曰王倪王倪之師曰被衣又曰善卷堯聞其得道之士乃北面而師事之蒲衣八歲而為舜之師又曰申屠嘉刖者也與鄭子産同師伯昏瞀人列子曰列子既師壺丘子林友友伯昏瞀人反居南郭從之處者百數吕氏春秋魏文侯師子夏又曰神農師悉諸黄帝師大撓帝顓頊師伯夷父帝嚳師照帝堯師子州支父帝舜師許由禹師大成摯湯師小臣文王武王師吕望周公旦齊桓公師管夷吾晉文公師咎犯隨㑹秦穆公師百里奚公孫枝楚莊王師孫叔敖沈申吳王師伍子胥文之儀越王勾踐師范蠡此十聖六賢未見不尊師者也淮南子曰段干木晉之大駔為文侯師海内先賢傳曰仇覽字季智郭太齎刺從之曰暮求留宿明旦太下床拜之曰君非太友乃太師也荀氏家傳曰爽字慈名幼而岐嶷大學儒林咸嘆服之年十二太尉杜喬師焉江微陳留志曰樓望字次子雍邱人也少學春秋於少府丁子然以節操稱建武二十八年趙孝王聞其名遣大夫齎玉帛聘望為師不受邴原别傳曰原舊能飲酒自行後八九年間酒不向口單行負笈苦身持力至陳留則師韓子功潁川宗陳仲弓涿郡則盧子幹臨歸師友以原不飲酒會米肉送原原曰本能飲酒但以荒思廢業故斷之耳今當逺别因見貺餞可以一飲讌於是每坐飲終日不醉太史公素王妙論曰計然者蔡邱濮上人其先晉國公子也姓辛氏字文子當南㳺越范蠡師事之揚子法言曰務學不如務求師師者人之模範也又曰一鬨之市必立之平一巻之書必立之師又曰李仲元一世之師也見其貌者肅如也觀其行者穆如也桓譚新論曰談言三歲學不如三歲擇師又曰昔殷之伊尹周之太公秦之百里奚雖咸有天才然皆年七十餘乃升為王霸師論語曰通書千篇以上萬巻以下敷暢壅閉審定文義而以教授為人師者通人也潜夫論曰天地所貴者聖人聖人之所尚者徳義徳義之所成者智也智之所求者學問也雖有至聖不生而知雖有至智不生而能故志曰黄帝師風后顓頊師老彭帝嚳師融堯師瞀成舜師紀后禹師黑始湯師伊尹文武師姜尚周公師庶季孔子師老耼若此言而信則人不可以不就師矣夫此十一君者皆上聖也猶待學問其智乃博其徳乃碩而况於凡人乎符子曰元冥子謂田有子曰子有師乎田有子曰吾將以萬物為師矣韋昭辯名曰古者稱師曰先生應璩百一詩曰子弟可不慎慎在選師友師友必良徳中才可進誘太平御覽巻四百四
