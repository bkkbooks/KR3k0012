body:
  text: 太平御覽卷六百五宋李昉等撰文部二十一筆墨硯紙筆說文曰楚謂聿呉謂之不律燕謂之弗秦謂之筆釋文曰筆述也述而書之博物志曰蒙恬造筆崔豹古今注曰牛亨問曰古有書契以來便應有筆也世稱蒙恬造筆何也答曰自蒙恬始作秦筆耳以柘木為管以鹿毛為柱羊毛為被所謂蒼豪非􅇠豪竹管也非謂古筆也又問曰筆有彤管何也答曰彤赤漆耳使史官載事故以赤管言用赤心記事也毛詩栢舟静女曰静女其孌貽我彤管古者后夫人有女史彤管之法后妃羣妾以禮御於君所女史書其日月授之環以進退也箋云彤管筆赤管也彤管有煒悦懌女美曲禮曰史載筆士載言也漢書曰張安世持槖簪筆槖契槖也近臣負槖簪筆從備顧問或有所記事孝武帝數十年見謂忠謹東觀漢記曰班超字仲升家貧為官傭寫書嘗輟書投筆嘆曰大丈夫當效傅介子張騫立功異域以取封侯安能久事筆硯乎呉志曰曹公聞孫權以荆州資劉備大懼方作書不覺落筆於地南史曰江淹嘗宿於冶亭夢一丈夫自稱郭璞謂淹曰吾有筆在卿處多年可以見還淹乃探懷中得五色筆一以授之爾後為詩絶無美句時人謂之才盡梁書曰紀少瑜嘗夢陸倕以一束青鏤管筆授之云我以此筆猶可用卿自擇其善者其文因此遒進又曰鄭灼家貧好學抄義疏以日繼夜筆毫盡毎削用之隋書曰髙祖復鄭譯官爵令内史令李徳林立作詔書髙熲戱謂曰筆乾譯答曰出為方岳杖䇿言歸不得一錢何以潤筆上大笑又曰劉行本累遷掌朝下大夫周代故事天子臨軒掌朝典筆硯持至御坐則承御大夫取以進之及行本為掌朝將進筆於帝承御復欲取之行本抗聲謂承御曰筆不可得帝驚視問之行本言於帝曰臣聞設官分職各有司存臣既不得佩承御刀承御亦焉得取臣筆帝曰然因令二司各行其所職國朝傳記曰虞監草行本師於釋智永智永長居樓上學業成方下其棄筆頭至盈瓮唐書曰柳公權為司封員外郎穆宗政僻嘗問公權筆何盡善對曰用筆在心心正則筆正上改容知其筆諫也五代史周史曰和凝年十七舉明經至京師忽夢人以五色筆一束以與之謂曰子才可以舉進士自是才思敏贍年十九登進士又曰馬裔孫初為河東從事因事赴闕宿于邏店其地有上邏神祠夜夢神見召待以優禮手授以筆一大一小覺而異焉及為翰林學士旋知貢舉私自謂曰此二筆之應也洎入中書吏奉二筆熟視大小如昔夢中所授漢官儀曰尚書令僕丞郎月給赤管大筆一雙篆題曰北宫工作西京雜記曰漢制天子筆以錯寳為跗毛皆秋兎之毫官師路扈為之又以雜寳為匣厠以玉璧翡翠皆值百金揚子法言曰搥提仁義絶滅禮學吾无取焉五帝者三王之筆舌寧有書不用筆言不由舌耶刀不利筆不銛宜加砥削之論衡曰知能之人須三寸之舌一尺之筆然後能自通神仙傳曰李仲甫潁川人漢桓帝時賣筆遼東市一筆三錢如无錢亦與筆魏末傳曰司馬宣王欲誅曹爽呼何晏作奏曰宜上君名晏失筆于地世說曰王東亭嘗夢有人與大筆其管如椽既覺與人云當有大手筆事不日烈宗晏駕哀䇿謚議三者並所作也傅子曰漢末一筆之匣雕以黄金飾以和璧綴以隋珠文以翡翠此筆非文犀之植必象齒之管豐狐之柱秋兎之翰用之者必被珠綉之衣踐雕玉之履王羲之筆經曰漢時諸郡獻兎毛書鴻都門惟有趙國毫中用時人咸言兎毫无優劣管手有巧拙又曰有人以緑沉漆竹管及鏤管見遺録之多年斯亦可愛玩詎以金寳雕琢然後為貴也又曰昔人或以琉璃或以象牙為筆管麗飾則有之然筆須輕便重則躓矣筆墨法曰作筆當以鐵梳梳兎豪毛及羊青毛去其穢毛使不髯茹羊青為心名曰筆柱或曰墨池東宫舊事記曰皇太子初拜給漆筆四十枝銅博山筆牀一副搜神記曰王祐病有鬼至其家留赤筆十餘枝在薦下曰可使人簮之出入辟惡凡舉事皆無恙荆楚歳時記曰陸士衡云魏武帝劉媫妤以七月七日祈琉璃筆嶺表録異曰畨禺地無狐兎多用鹿毛野狸毛為筆又昭富春勒等州則擇雞毛為筆其用也亦與兎毛无異又曰嶺南无兎嘗有郡牧得其皮使工人削筆者醉失之大懼因剪鬚髩為筆筆甚善更使為之工者辭焉語其由以實對遂下令使一户輸人鬚或不能致輒責其值墨釋名曰墨晦也言似物晦黒也漢書王莽傳曰漢兵起莽以墨汚渭陵延陵周垣東觀漢紀曰和熹鄧后即位萬國貢獻悉禁絶唯歳供紙墨而已范子計然曰墨出三輔上價石百六十中三十下十韋仲將筆墨方曰合墨法好醇烟𢷬訖以細絹蓰于缸中蓰去草芥若細沙以細絹蓰塵埃此物至輕微不宜露蓰慮失飛去不可不愼墨一斤好膠五兩浸梣皮汁中梣江南樊鷄木皮也其皮入水緑色解膠又益墨色可下雞子白去黄五枚亦以真珠一兩麝香一兩皆别治細蓰都合調下鐵臼中寧剛不宜澤𢷬三萬杵杵多益善合墨不得過二月九月溫時敗臭寒則難乾凍鎔見風日碎破重不得過二兩蔡質漢官儀曰尚書令僕丞郎月賜隃糜大墨一枚小墨一枚東宫舊事曰皇太子初拜給香墨四丸修復山陵故事曰𤣥宫物有墨五丸神仙傳曰漢桓帝徴仙人王逺逺乃題宫門四百餘字皆說方來之事帝惡之削去内字復見墨入板裏葛龔與梁相書曰復惠善墨下士所无摧體骨碎肝膽不足明報曹植樂府詩曰墨出青松烟筆出狡􅇠翰古人感鳥跡文字有改判葛洪神仙傳曰班孟不知何許人也舒紙于前嚼墨一噴皆成字竟紙各有意義趙壹非草書曰後世慕崔杜張芝專欲草書為務十日一筆月數丸墨領袖如皂唇齒常墨屈指畫地爪折鰓出亦效顰之增醜也陸雲與兄機書曰一日上三臺曹公藏石墨數十萬斤云燒此消復可用然不知兄頗見之不今送二螺鄭氏婚禮謁文讃曰九子之墨藏于松烟盛宏之荆州記曰筑陽縣有墨山山石悉如墨顧微廣州記曰懷化郡掘壍得石墨甚多精好可寫書戴延之西征記曰石墨山北五十里山多墨可以書潯陽記曰廬山有石墨可書灾祥集曰天雨墨君臣无道䜛人進李尤研墨銘曰書契既造研墨乃陳烟石附筆以疏以申顧野王輿地志曰漢時王朗為㑹稽太守子肅隨在郡住東齋中夜有女從地出稱越王女與肅語曉别贈一丸墨肅方注周易因此才思開悟硯釋名曰硯研也研墨使和濡也晉書懷帝陷于平陽劉聰引帝入燕謂帝曰卿為豫章王時朕與王武子俱造卿武子稱朕于卿卿言聞名久矣卿以所作樂府文示朕曰聞君善詞賦試為㸔也朕與武子俱為盛徳頌卿稱善者久之又引朕射于皇堂朕得十二籌卿與武子俱得九籌卿又贈朕柘弓銀硯卿頗憶否帝曰安敢忘之恨爾日不得早識龍顔唐書曰柳公權常寳惜筆硯圖書自扄鐍之常評硯以青州石末為第一言墨易冷綘州黑研次之太公金匱曰研之書曰石墨相著而黑邪心讒言無得汙白伍緝之從征記曰夫子牀前有石硯一枚製甚古樸葢孔子平生時物也西京雜記曰天子以玉為硯取其不凍拾遺記曰張華撰博物志奏武帝帝賜青鉄硯是于闐國所獻鑄以為硯魏武帝上雜物疏曰御物有純銀參帶䑓硯一枚純銀參帶圓硯大小各一枚陳留志曰范喬年二嵗祖父馨卒臨終撫其首曰恨不見汝成人以吾所用硯與之至五嵗祖母以此言告喬便執硯啼哭東宫舊事曰皇太子初拜給漆石硯一枚崔實四民月令曰正月硯凍釋命童㓜入小學學篇章十一月硯凍命童㓜讀孝經論語世語曰曹爽與明帝少同筆硯晉傳𤣥硯賦採隂山之潜璞簡衆材之修宜節方圓以定形鍜金鉄而為池設上下之剖判配法象乎二儀木貴其能軟石美其潤堅加采漆之膠固含冲徳之清𤣥永嘉中記曰硯溪一源中多石硯劉澄之宋永初山川古今記曰興平石穴深二百許丈石青色堪為硯紙釋名曰紙砥也平滑如砥石也服䖍通俗文曰方絮曰紙東觀漢記曰黄門蔡倫典作上方造紙所謂蔡侯紙也董巴記曰東京有蔡侯紙即倫也用故麻名麻紙木皮名榖紙用故魚網作紙名網紙也王隠晉書曰魏太和六年博士河間張揖上古今字詁其巾部云紙今帋其字從巾古之素白依書長短隨事截絹枚數重沓即名幡紙字從系此形聲也後和帝元興中中常侍蔡倫以故布𢷬剉作紙故字從巾是其聲雖同系巾為殊不得言古之紙為今紙崔鴻前燕録曰慕容雋三年廣義將軍岷山公黄紙上表雋曰吾名號未異于前何便宜爾自今但可白紙為疏沈約宋書曰張永善𨽻書又有巧思紙及墨皆自營造上每得永表啓輒執玩咨嗟自嘆供御者不及也唐書曰杜暹為婺州叅軍秩滿將歸吏胥以紙萬餘張贈之暹惟受百幅時人嘆曰昔清吏受一大錢何異也語林曰王右軍為會稽謝公乞紙庫中惟有九萬枚悉與之桓宣云逸少不節拾遺記曰張華獻博物志賜側理帋萬畨南越所獻也後人言陟里與側理相亂南人以海苔為帋其理縱横袤側因以為名世説曰戴安道就范宣學所為范宣讀書亦讀書范宣抄紙亦抄紙桓𤣥偽事曰古旡紙故用簡非主于敬也今諸用簡者皆以黄紙代之又曰𤣥令平凖作青赤縹緑桃花紙使物精令速作之石虎鄴中記曰石虎詔書以五色紙著鳯雛口中范寗教曰土紙不可以作文書皆令用藤角紙盛宏之荆州記曰棗陽縣一百許歩蔡倫宅其中有造紙具其傍有池即名蔡子池倫漢順帝時人始以魚網造紙縣人今猶多能作紙葢倫之遺業也異苑曰張仲舒在廣陵晨夕輒見門側有赤氣布空中忽雨綘羅于其庭周廣七八分長五六寸皆以箋紙繫之廣長亦與羅等紛紛甚駛經宿仲舒暴疾死孫放西寺銘曰長沙西寺層搆傾頽謀欲建立其日有童子持紙花揷地故寺東西相去十餘丈于是建刹正當花處傅咸紙賦曰既作契以代繩又造紙以當䇿劉孝威謝官紙啓曰雖復鄴殿鳯銜漢朝魚網平凖桃花中宮穀樹固以慚茲靡滑謝此鮮華東宫舊事曰皇太子初拜給赤紙縹紅麻紙敕紙法各一百太平御覽卷六百五
