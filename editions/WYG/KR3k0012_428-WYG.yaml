body:
  text: 太平御覽卷四百二十八宋李昉等撰人事部六十九正直下王隠晉書曰劉毅字仲雄為司𨽻校尉言議切直無所囘撓故不至公輔王基薦毅方正亮直介然不羣言不苟合行不苟容又曰初武帝知太子闇弱後必亂國然不能擇才遣荀朂及和嶠重往觀之朂還盛稱太子德更進茂不同西宫之時嶠曰臣以為太子睿質如故不見更勝此自陛下家事非臣所盡知於是天下貴嶠而賤朂干寳晉記曰髙貴鄉公薨太子會朝臣而謀其日太常陳泰不至使其舅荀顗召之垂涕而入太祖謂曰𤣥伯何以處我對曰惟誅賈充可以謝天下太祖曰不可為更思其次泰曰但見其進不知其次太祖乃不復問鄧粲晉紀曰初傳王敦將下朝士共議周顗以為敦剛愎不仁親害平子必將稱兵以向朝廷敦既尅石頭顗與戴淵共詣敦謂顗曰伯仁卿負我顗答曰公戎車内侮下官親帥六軍不能其事使王旅敗績以此負公又問淵吾此舉動天下以為何如答曰見形者謂之逆體誠者以為忠敦笑曰若思卿能言晉中興書曰紀囘字公則雅性方範不畏彊禦丹陽尹桓景頗以佞事司徒導甚眤之會熒惑守南斗經旬導語囘曰南斗揚州分而熒惑守之吾當遜位以厭此謫囘答曰公與桓景造膝熒惑何由退舎導甚愧之又曰初庾氷兄弟毎説顯宗國有強敵宜須長君顯宗晏駕何充建議曰父子相傳先王舊典忽妄改易懼非長計氷等不從遂立康帝臨軒氷充侍坐帝曰朕嗣洪業二君之力也充對曰陛下龍飛臣氷之力若如臣議不覩升平之世其強正不撓率皆如此又曰王彬字世儒從兄敦入石頭中宗使彬銜命慰勞㑹周顗被殺彬往哭顗既而見敦敦怪其有涕洟問其所以彬曰向哭伯仁情不能已敦曰伯仁自致刑戮且凡人遇汝復何為哉彬曰伯仁世譽與君齊行忠烈之軌邈焉難逮其有何罪而致禍戮勃然數敦曰兄抗旌内侮戮殺忠義謀圖不軌禍必及門敦大怒厲聲曰爾之狂悖乃可至此為吾不能殺汝耶丞相導在坐勸彬起謝彬曰昨暴脚痛不能拜且此復何所謝意氣自若敦曰脚痛孰若頸痛然卒以至親不忍加害檀道鑾續晉陽秋曰初淮陵内史虞珧子妻裴以尺牘辯利兼服食絶穀常衣黄衣狀若學道司馬道子常延致之甚悦其才每與百官飲宴裴亦預焉悉令與賔客談衆人皆為降節王恭訴曰恭聞男女之别國之大節未聞宰相之坐有失行婦人舉坐竦然道子為慙崔鴻十六國春秋後趙録曰張進元城屠各人也為刺奸外部都督糾舉不避豪右軍中憚之號曰張霹靂又前凉録曰汜禕字休臧燉煌人為福禄令剛直不事上府酒泉太守馬漢遣督郵張休祖劾禕休祖曰君不聞寧逢三千頭虎不逢張休祖乎禕怒以印繫肘而就縛縛訖發印以告事聞休祖坐不解印擅縛令長以大不敬論禕遷居延令又前秦録曰王墮字安生京兆霸城人也博學有雄才性剛愎疾惡雅好直言疾董榮如仇讎毎朝見之畧不與言人謂之曰董尚書貴幸一時公宜降意墮曰何鷄狗而令國士與之言乎榮聞而慙恨故説苻生誅之及刑榮謂墮曰君今復敢不數董龍作鷄狗乎墮瞋目而叱之龍榮之小字也後魏書曰尉聿字成興性耿介肅宗時為武衛將軍領軍元义秉權百寮莫不致敬聿獨長揖不拜出為凉州刺史凉州緋色天下之最义送白綾二千疋令聿染之聿拒而不許又曰古弼代人也少忠謹善騎射初為獵郎使長安稱㫖轉門下奏事以敏正著稱太宗嘉之賜名曰筆取其直而有用後改名弼言其有輔佐才也上谷民上書言苑囿過度民無田業宜减大半以賜貧者弼覽而善之入欲陳奏遇世祖與給事中劉樹棊志不聽事弼侍坐良久不獲申聞乃起於世祖前捽樹頭掣下床以手搏其耳以拳毆其背曰朝廷不治寔爾之罪世祖失容放棊曰不聽奏事實在朕躬樹有何罪置之弼乃具狀以聞世祖竒弼公直皆可其奏以與百姓又曰遊肇之為廷尉也世宗常私勅肇有所降恕肇執而不從曰陛下自能恕之豈是令臣曲筆也其執意如此又曰于烈世宗初咸陽王禧當權遣家奴傳信與烈曰須舊羽林虎賁執仗出入烈曰天子諒闇事歸宰輔領軍典掌宿衛有詔不敢違理無私給奴惘然而返以報禧禧遣謂烈曰我號天子兒天子叔元輔之命與詔何異烈厲色曰若是詔應遣官人何由遣私奴索官家羽林烈頭可得羽林不可得禧惡其剛直遂議出之乃授恒州刺史又曰于忠嘗侍宴世宗賜之劒仗令出入周旋恒以自衞廷侍忠辭無文世宗曰今文人小心直不如卿欲使卿劬勞於下我無憂於上又曰録尚書髙陽王雍欲以令史朱暉為廷尉評頻煩托吏部尚書元順順不為用雍遂下命用之順投之於地雍聞大怒昧爽坐都㕔召順曰身天子之子天子之弟四海之内親尊莫二元順何人以身成命投棄於地順徐對曰髙祖遷宅中土創定九流官方清濁軌儀萬古而朱暉小子身為省吏何合為廷尉清官殿下既先皇同氣宜遵成㫖自有短垣而復踰之也周書曰王羆字熊羆霸陵人也直質木强處物平當州閭敬憚焉三國典畧曰初周萬年縣令樂運抑挫豪右時稱強直帝甚嘉之特許通籍事有不便咸令奏聞至是召運赴行在所既至問之曰卿来日見太子否運曰臣来日奉辭帝曰卿言太子何如人也運曰中人時齊王憲等並在帝側帝顧之謂曰百官佞我皆云太子聰明唯運獨云中人方驗其忠直因問中人之狀運曰班固比齊桓為中人管仲相之則伯竪貂輔之則亂可與為善可與為惡帝曰我知之矣超拜運為京兆郡丞吴均齊春秋曰王僧䖍性甚方直逺近望之咸曰如水鏡也唐書曰蘇世長髙祖待之意甚厚髙祖謂曰卿自謂諂佞耶正直耶對曰臣實愚直髙祖曰卿若直何為背世充而歸我對曰洛陽既平天下為一臣智窮力屈始歸陛下向使世充尚在臣據漢南天意雖有所歸人事足為勍敵髙祖太笑嘗又嘲之曰名長意短口正心邪棄忠貞於鄭國忘信義於吾家世長對曰名長意短實如聖㫖口正心邪未敢奉詔又曰桓彦範為大理凡所奏議若逢人主詰貴則辭色無懼争之愈厲又常謂所親曰今既躬為大理人命所懸必不能順㫖詭辭以求苟免又曰髙宗使宦者縁江採異竹將於苑中植之宦者所在縱暴還過荆州蘇良嗣囚之因上疏切諫稱逺求珍異以疲道路恐非聖人抑己愛人之道又小人竊弄威福以虧皇明言甚切直疏奏髙祖下詔慰勉遽令棄竹於江中又曰髙祖謂侍臣曰邢文偉事我兒能減膳切諫此正直人也遂擢拜右史又曰憲宗以李絳為相同列李吉甫便辟善逢迎上意絳梗直多所規諫故與吉甫不叶絳性剛訐毎與吉甫爭論人多直絳憲宗察絳忠正自立故絳論奏多所允從又曰武元衡從父弟儒衡字庭碩才度俊偉氣直貌莊言不妄發與人交友終始不渝相國鄭餘慶不事華潔後進趨其門者多垢衣敗服以望其知而儒衡謁見未嘗輒易所好但與之正言直論餘慶因亦重之晏子春秋曰景公觀於淄上歎曰使國可長保而傳之子孫豈不樂哉晏子曰今君臨民若㓂讎見善如避熱不亦難乎又曰景公晝被髪乘六馬御婦人以出正閨刖跪繫馬而反之曰非吾君也公慚而不朝晏子曰臣聞下無直辭上有墮君民多矯行今君有失而刖跪直禁是君之福也於是令刖跪陪資又曰景公見梁邱㨿公曰與我和晏子曰此同也和者君甘則臣酸君淡則臣鹹今據也君甘則甘所謂同也安得為和尹子曰范獻子逰河大夫皆在君曰孰知欒氏之子大夫莫答舟人清涓捨楫答曰君奚問欒氏之子曰吾不忘欒氏也其老者未死少者壯矣清涓曰善修晉國之政内得大夫外不失百姓雖欒氏子其若君何若不修晉國之政内不得大夫而外失百姓則舟中之人皆欒氏子也君曰善吕氏春秋曰熊意見齊王宣曰寡人聞子好直有之乎對曰意何能直意聞好直之士家不處亂國身不見汙君今意身得見君而家託乎齊意何能直夫賢主所以貴士者以其能直言也言直則枉者見人主欲聞枉而惡直是障水源而欲其流也説苑曰魏武侯浮西河而下中流謂吴起曰美哉山河之固此魏之寶也對曰在德不在險昔三苗氏左洞庭而右彭蠡德義不修而禹滅之夏桀之㞐左河濟而右太華伊闕在南羊腸在北彼敢不仁而湯放之殷紂之國左孟門而右太行常山在其北大河經其南修政不德而武王伐之由此觀之在德不在險若君不修德舟中之人盡敵國也武侯曰善又曰秦始皇既有天下乃召羣臣而議曰昔五帝禪賢三王世繼孰是將為之博士七十人未對鮑白令之對曰天下官則禪賢是也天下家則世繼是也故五帝以天下為官三王以天下為家秦始皇帝仰天嘆曰吾德出乎五帝將官天下誰可使人代我後者鮑白令之對曰陛下行桀紂之道欲為五帝之禪非陛下所能行也秦皇大怒曰令之前若何以言我桀紂之道也速説之不解則死令之對曰陛下築臺於營宫殿五里建千石之鐘立萬石之簴婦人連百倡優累於興作驪山宫室至雍相繼不絶所以自奉者殫天下竭民力陛下所謂自營僅存之主耳何暇比德於五帝欲官天下哉秦皇帝黙然無以應面有慙色新序曰齊景公遊於牛山之上而北望齊曰美哉國乎使古無死者則寡人將去斯如之何乃泣沾襟髙子曰然類君之賜蔬食惡肉可得而食也駑馬棧車可得而乘也且不欲死而况吾君乎俯而垂泣晏子拊手而笑曰樂哉今日嬰之遊也見怯欲一而諛臣二使古之無死者則太公丁公至今猶存吾君方為被簑笠而立乎畎畆之中唯事之恒何暇念死乎景公德焉又曰晉平公閒居師曠侍坐平公曰子生無目子之黙黙也師曠對曰天下有五黙黙而臣不得預一焉平公曰何謂也師曠曰羣臣行賂以採名譽百姓侵寃無所告愬而君不悟此一黙黙也忠臣不用用臣不忠下才處髙不肖處賢而君不悟此二黙黙也姦臣欺詐空虛府庫以其少才覆塞其惡賢人逐邪臣貴而君不悟此三黙黙也國貧民罷上下不和而好財用兵嗜欲無厭諂諛在傍而君不悟此四黙黙也至道不明法令不行吏民不正百姓不安而君不悟此五黙黙也國有五黙黙而不危者未之有也臣之黙黙何害乎國家哉又曰周舍立趙簡子門三日三夜簡子使問之曰夫子將何以教寡人對曰願為君諤諤之臣墨筆操牘隨君之後伺君過而書之簡子悦之又曰魏文侯與士大夫坐問曰寡人何如君也羣臣皆曰君仁君也至任座曰君非仁君也曰子何以言之對曰君伐中山不以封君之弟而封君之子是以知君非仁君也文侯怒逐任座次到翟璜對曰君仁君也曰何以言之對曰臣聞其君賢者其臣直間任座之言直是以知君之仁也文侯曰善復召任座郭子曰王含為廬江含字處𢎞敦兄也貪強狼籍王敦欲䕶其兄故於衆坐中稱家兄在郡為政定中善廬江人咸稱之何充為主簿在坐正色曰充即廬江人所聞異於此汝南先賢傳曰李宣字公休為太尉黄瓊所辟是時寒暑不和羌夷數起瓊見掾屬曰是太尉無德願諸掾有以匡之掾東平王象對曰昔堯遭洪水之變湯有六年之旱自上聖之君誰能無此明公日昃恪勤衮職修理小掾等無以加增如此至數人瓊欣笑决次宣乃仰曰明公被日月之衣居上司之位輔弼天子處諫諍之職未有對揚謇謇之言其所旌命不授岩谷之士小掾私以於邑小掾聞之三台不明責在三公願明公深思消復灾異進納忠良衆人黙黙慚愧華陽國志曰中山諸王毎過温縣必責求供給温吏民患之李宻至縣中山王過欲徴芻茭薪蒸宻引髙祖過師賔客老幼禮桑梓之恭一無煩擾伏惟明王孝思惟則本國望風式歌且舞誅求之疲不敢聞命後諸王經過不煩温縣又曰陳禪字紀山安漢人也拜諫議大夫西域獻幻伎天子與公卿觀之禪獨伏不視李固外傳曰梁兾欲立清河王蒜常侍曹騰聞議定見兾曰清河為人嚴明若遂即位將軍受禍不乆矣兾更㑹議立蠡吾侯子唯固與杜喬深㩀本議桓帝立固與杜喬以欲立蒜下獄太后詔出固兾乃復令黄門常侍作飛章劾奏復収固等繋獄皆死京師諺曰直如弦死道邊曲如鈎反封侯孔融别𫝊曰袁術僣亂曹操以楊彪與術婚姻誣以欲圗廢置奏彪下獄劾以大逆融聞之不及朝服往見操曰楊公四世清德海内所瞻周書父子兄弟罪不相及况以袁氏歸罪易稱積善餘慶徒欺人耳操曰此國家意融曰假使成王殺召公周公可得言不知耶纓緌搢紳所以瞻仰明公者以公聰明仁智輔相漢朝舉直措枉致之雍熈今横殺無辜則海内觀聽莫不解體孔融魯國男子便當拂衣而去操不得已遂理出彪樊英别傳曰順帝策書備禮𤣥纁徴英詔切郡縣駕載上道英不得已到京師稱疾不肯赴乃強輿入殿猶不以禮屈帝怒曰朕能生君能殺君能貴君能賤君能富君能貧君君何慢朕英曰臣受命於天生盡其命天也死得其命亦天也陛下焉能殺臣臣見暴君如見仇讎立朝猶不肯可得貴乎雖在布衣列環堵之中晏然自得不易萬乗之尊又可得而賤乎陛下焉能賤臣臣非禮之禄萬鍾不受也申其志雖簞食不厭也陛下焉能富臣焉能貧臣帝不能屈而敬其名使出就太醫飬疾日置羊酒語林曰晉王敦與世儒議下都世儒以朝廷無亂且唱兵始自古所難諫諍甚苦處仲變色曰吾過䝉恩遇受任南下卿自同姦邪阻遏義舉王法焉得相私因目左右令進世儒正色曰君昔嵗害兄今又殺弟自古多士豈有如此舉動言畢流涕敦意乃止王符論曰國以賢興以諂衰君以忠安以佞危此古今之常論而時所共知也然衰國危君繼踵不絶者豈時無忠信正直之士哉誠苦其道不得行耳太平御覽卷四百二十八
