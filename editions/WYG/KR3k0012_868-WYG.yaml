  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_868-1a, image: WYG0900/WYG0900-0574c.png}
body:
  text: 太平御覽卷八百六十八宋李昉等撰火部一火上釋名曰火化物也亦言煆也物入即皆毁壞也易曰水流濕火就燥又曰風自火出又曰天與火同人君子以類族辨物君子小人各得所同又曰火在天上大有君子以遏惡揚善順天休命又曰燥萬物者莫熯乎火書曰火炎崑崗玉石俱焚又曰惟女含徳不惕予一人予若觀火又曰若火之燎于原弗可嚮邇又曰五行二曰火火曰炎上炎上作苦詩曰叔在藪火烈具舉禮曰孟夏之月盛徳在火又曰季春出火為焚也謂焚萊也凡出火以火出建辰之月火始出又曰火之於民也尊而不親左傳曰人火曰火天火曰災又曰兵猶火也不戢将自焚也又曰火龍火畫火龍畫龍又曰古之火正或食扵心或食於咮以出内火是故咮為鶉火心為大火謂火正之官配食于火星也建辰之月鶉火星昏在南方則令民放火建戌之月大火星伏在日下夜不得見則令民内火禁放火也陶唐氏之火正閼伯居商邱閼伯髙辛氏之子也𫝊曰遷閼伯于商邱主辰辰大火也今為宋星然則商邱在宋地也祀大火而火紀時焉謂出内火時也相土因之故商主大火相土契孫商之祖也始代閼伯之後居商邱祀大火也又曰剡子云炎帝以火紀故為火師而火名又曰昭公十七年冬有星孛于大辰西及漢夏之八月辰星見在天漢西今孛星出辰西光芒東及天漢申須曰彗所以除舊布新也天事恒象天道恒以象類告示人今除於火火出必布焉諸侯其有火災乎今火向伏故知當須火出乃布散為災周禮曰春秋以木鐸修火禁又曰亨人掌供鼎鑊以給水火之齊又曰師卜掌開龜揚火以作龜致其墨又曰司爟掌行火之政令四時變國火以救時疾季春出火民咸從之季秋内火民亦如之以三月本時昏心星見于辰上使民出火九月本黄昏心星伏在戌上使民内火故春秋𫝊曰以出内火時則施火令凡祭祀則祭爟凡國失火野焚莱則有刑罰焉又曰穴氏掌攻蟄獸各以其物火之以時獻其珍異皮革又曰柞氏掌攻草木及林麓夏日至令刋陽木而火之冬日至令剥隂木而水之若欲其化也則春秋變其水火又曰秋官司烜氏掌以夫燧取明史記曰燕攻即墨田單乃収城中牛千頭為絳繒衣畫以五彩龍文束兵於角結火於尾穿城而出壮士銜枚隨其後牛所觸輒死壯士擊之城上大譟燕師大駭又曰龎涓追孫臏度其行暮當至馬陵乃斫大樹白而書之曰龎涓死此樹下於是令齊軍萬弩夾道而伏期曰見火舉而俱發龎涓夜至樹下見白書乃鑚火讀之未畢萬弩俱發龎涓大敗又曰蘇代謂魏王曰夫以王事秦猶抱薪救火薪不盡火不滅也又曰顔叔子獨居一室夜雨比舍屋崩有女子投之叔子令秉燭燭盡乃徹屋草續之至明不亂又曰武王既渡河有火自上復於王屋流為烏其色赤漢書曰項羽西屠咸陽燒其宫室火三月不滅又曰孝平后王莽女有節操及漢兵誅莽燔燔未央宫后曰何面見漢家因自投火而死又曰漢兵圍王莽城中少年朱弟張魚等恐見虜掠燒作室門呼曰反虜王莽何不出降火及掖庭莽避火宣室前殿火輒隨之又曰陳勝吳廣夜構火狐鳴呼曰大楚興陳勝王郡國志曰連渾府有火井深不可見厎炎氣上昇常若微電以草焚之則煙騰火發其山似火從地而發故名焚臺東觀漢記曰梁鴻牧豕長安上林苑中失火延及人家問所燒財物悉推豕償之其主言少鴻願以身傭作躬執其勤又曰長沙有義士古初遭父喪未𦵏隣人火起及初舎棺不可移初冒火伏棺上火乃滅又曰廉范字叔度為蜀郡太守成都地迫屋狹百姓夜作以供衣食又禁火民復蔽之失火者日屬范乃令夜作但使儲水百姓皆恱歌曰廉叔度來何暮不禁火民安作昔無襦今五袴典略曰秦伯出獵至於咸陽有火流下化為白雀銜緑丹書集於公車吳志曰張昭字子布孫權以公孫淵稱藩遣張彌許宴至遼東拜淵為燕王昭諫權權不從昭忿稱疾不朝權恨之土塞其門昭又於内以土封之淵果殺彌宴權數慰謝昭昭固不起權因出過其門呼昭昭辭病篤權燒其門欲以恐之昭更閉户權使人滅火往問良久昭諸子扶昭起權載之還宫晉書曰愍懷太子遹字熙祖惠帝長子也宫中嘗夜失火武帝登樓望之太子時年五嵗牽帝裾入閣中帝問其故太子曰暮夜倉卒宜備非常不宜令照見人主也由是奇之又曰張華字茂先武庫火華懼因此變作列兵固守然後救之累代之寶及漢髙斬蛇劔王莽頭孔子履等盡焚焉又曰韓康伯家貧窶伯年數嵗至大寒母方為作襦令伯捉熨斗而謂之曰且著􅃭尋當作複褌伯曰不復須母問其故對曰火在斗中而柄尚熱今著襦下亦當煖母甚異之又曰王獻之嘗與兄徽之共在一室忽然火發徽之遽走出不遑取履獻之神色恬然徐喚左右扶出又曰郭璞字景純門人趙載嘗竊青囊書未及讀而為火所焚又曰庾亮鎮武昌夜半望之見城内有數炬火從城上出如大車狀白布幔覆之與火俱出城東北行至江乃滅晉中興書曰殷浩北伐江逌為長史逌取數百雞以長繩連脚皆繋火一時驅放飛姚襄集營皆燃焉宋書曰周朗為廬陵内史郡後荒蕪頗多野獸母張氏欲見獵朗乃合圍縱火令母觀之火逸燒郡廨朗悉以秩米起屋償所燒之限梁書曰阮孝緒家貧無以㸑僮妾竊隣人樵以繼火孝緒知之乃為不食令撤屋而炊後魏書曰祖瑩好學以夜繼晝父母恐其成疾禁之後燃火讀書以衣被蔽塞窓戸恐為家人所覺蕭鸞遣魯康祚侵太倉口傅永以賊若夜來必應渡淮以火記其淺處永既設伏乃密令人以瓠盛火渡淮南岸當深處置之教之云若有火起即亦燃之其夜康祚等果親率領來斫永營東西二伏夾擊之康祚等輒奔淮水火既競起不能記其本濟之處遂望永所置之火而爭渡焉水深溺死斬首者數千級北齊書曰神武西征登鳯陵命中外府司馬李義深相府城局李士略共作檄文皆辭請以孫騫代神武乃引搴入帳自為吹火催促之搴神色安然援筆立就又曰文宣曽因近出令張耀居守帝夜還耀不時開門勒兵嚴備駐蹕門外久之催迫甚急耀以夜深須火至面識門乃可開於是獨出見帝帝笑曰卿欲效郅君章也使耀前開門然後入又曰張亮守河陽周文帝於上流放火船欲燒河橋亮乃備小艇百餘皆載長鏁鏁頭施釘火船將至即馳小艇以釘釘之引鏁向岸火船不得及橋橋之獲全亮之計也尚書大𫝊曰燧皇以火紀物火陽尊故託燧皇於天春秋元命苞曰火之為言委隨也故其立字人散二者為火也韓詩外𫝊曰晉平公藏寶之臺燒捄火三日三夜乃勝之公子晏束帛而賀曰臣聞王者藏於天下諸侯藏於百姓農夫藏於囷庾商賈藏於篋匱今百姓乏於外而賦斂無已昔桀紂殘賊為天下戮今皇天降災於藏臺是君之福也戰國策曰楚王遊雲夢野火之起也若雲蜺吳越春秋曰越王思報吳冬則抱冰夏則握火後趙録曰石勒禁火百姓苦之燃火者鞭之一百延火燒一家斬五部都督汝南先賢𫝊曰郭憲從南郊含酒東北三噀云齊失火以厭之後齊果上火事又曰蔡君仲有至孝之行母終棺在堂西舍失火火將至君仲伏屍號哭火越其家陳留耆舊𫝊曰劉昆為江陵令民有火災昆向火叩頭即霈然下雨詔問反風滅火虎北渡河何以致此昆曰偶然耳帝曰此長者之言也鄭𤣥别𫝊曰𤣥年十七在家見大風起詣縣曰某時當有火災宜祭爟禳廣設禁備時火果起而不為害樊英别𫝊曰英隠於壺山嘗有黑風從西方起英謂學者曰成都市火甚盛因含水西向潄之乃令記其日後有客從蜀來者云是日大火有黑雲平旦從東起須臾大雨火遂得滅葛仙公别𫝊曰公與客談話時天寒公謂客曰居貧不能得爐火請作一大火以共煖焉公因吐氣火赫然從口而出須臾火滿室坐客皆熱而脫衣也列仙𫝊曰陶安公六安冶師也數行火火一旦散上紫色衝天須臾朱雀止冶上曰安公安公冶與天通七月七日迎汝以赤龍龍至安公騎之東南上又曰欒巴為尚書正㑹得酒西向潄云成都失火潄而作雨驛至果如其言又曰甯封子黄帝陶正掌火能作五色烟列女𫝊曰梁節姑其室失火兄子與己子在内欲取兄子輙得己子火盛不復得入婦人曰梁國豈可户告人曉耶被不義之名何面目以見兄弟家人哉遂赴火而死搜神記曰糜竺常從洛歸未至家數十里見路次有好新婦從竺求寄載行二十餘里新婦謝竺曰我天使也當往燒東海糜家感君見載故以相語竺因請之曰不得不燒君快去我緩行日中必火發竺乃急行達家便出財物日中而火大發𤣥中記曰南方有災山焉在扶南國之東加營國之北諸薄國之西山從四月而火生十二月火滅正月二月三月火不燃山上但出雲氣而草木生葉枝條至四月火燃草木葉落如中國寒時草木葉落也行人以正月二月三月行過此山下取此木為薪燃之無盡時取其皮績之為火浣布十洲記曰炎洲在南海中地方二千里去北岸九萬里上有風生獸似豹青色大如狸張網取之積薪數車以燒之薪盡而此獸在火中不然以鐵椎鍜其頭數十下乃死以其口向風須臾便活而起以石上菖蒲塞其鼻即死取其腦和菊花服之盡十斤得壽五百嵗又有火林山山中有火光獸大如䑕毛長三四寸或赤或白山可百里許晦夜即見此山林乃此獸光照狀如火相似乃取其獸毛績以為布名曰火浣布國人服之此布垢汚唯以火燒布兩食許出振之其垢即去潔白如雪述征記曰北征有張母墓舊說張母是王氏妻王家𦵏經有年載後開墓而香火猶燃其家奉之稱清火道英雄記曰周瑜鎮江夏曹操欲從赤壁渡江南無船乗簰步皆反㳂漢水下至浦口未即渡瑜夜密使輕船走舸百艘艘有五十人施棹人持炬火持火者數千人至乃放火火燃即囘船走去須臾燒數千簰火起光上照天操乃夜去齊地記曰東武有火木燒之不死亦不損也太平御覽卷八百六十八
