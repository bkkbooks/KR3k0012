body:
  text: 太平御覽卷二百七十宋李昉等撰兵部一叙兵上叙兵上春秋元命苞曰蚩尤虎捲威文立兵宋均注曰捲手也手文威字也書曰洪範八政八曰師大戴記曰魯哀公問孔子曰蚩尤作兵與孔子曰蚩尤庶人之貪者也反利無義以䘮厥身何兵之能作兵與民皆生也左傳曰武有七德禁暴戢兵保大定功安民和衆豐財者也又曰舉不失德賞不失勞老有加惠旅有施舎見可而進知難而退軍之善政也兼弱攻昧武之善經也又曰兵猶火也不戢將自焚也又曰師直爲壯曲爲老又曰師克在和不在衆榖梁傳曰善爲國者不師善師者不陣善陣者不戰善戰者不死國語曰穆王將征犬戎祭公謀父諫曰不可先王耀德不觀兵夫兵戢而時動動則威觀則玩玩則無震注曰玩黷震懼也家語曰哀公問曰寡人欲吾國小則能守大則能攻其道若何孔子曰使君朝廷有禮上下和親天下百姓皆吾君之民也將誰攻焉苟違此道民叛如歸皆君之讎將誰守焉公曰善哉於是廢梁澤之禁㢮關市之稅以恵百姓史記曰范蠡云兵者㓙器戰者逆德漢書曰兵家者蓋出於古司馬之職王官之武備也後世燿金爲刃割革爲甲器械甚備下及湯武受命以師克亂而濟百姓動之以仁義行之以禮讓司馬法是其遺事也自春秋至於戰國出奇設伏變詐之兵並作漢興張良韓信序次兵法凡一百八十二家刪取要定著三十六家又刑法志曰自黄帝有涿鹿之戰以定火灾顓頊有共工之陣以定水灾唐虞之際至治之極猶流共工放讙兠竄三苖殛鯀然後天下服夏有甘扈之誓殷周以兵定天下矣天下旣定戢藏干戈教以文德而猶立司馬之官設六軍之衆因井田而制軍賦焉天子畿方千里提封百萬井岀軍賦六十四萬井戎馬四萬疋兵車萬乗故稱萬乗之主戎馬車徒干戈素具春振旅以蒐夏拔舎以苖秋治兵以獮冬大閲以狩皆以農隙以講武事焉連帥比年簡車卒正三年簡徒群牧五載大簡車徒此先王爲國立武足兵之略也又曰以仁義綏民者無敵於天下也至於齊桓晉文之兵可謂入其域而節制矣然猶未本仁義之大統也故魏秦之武鋭不可以當桓文之節制桓文之節制不可以當湯武之仁義故曰善師者不陣善陣者不戰善戰者不敗善敗者不亡又曰夫文德者帝王之利器威武者文德之輔助也夫文之所加者深則武之所服者大德之所施者博則威之所制者廣三代之盛至於刑措兵寢者以其本末有序帝王之極功也又曰魏相曰救亂誅暴謂之義兵敵加於己不得已而起謂之應兵爭忿小故不勝憤怒者謂之忿兵利人土地貨寳者謂之貪兵恃國家之大矜人民之衆謂之驕兵又曰晁錯上書云丈五之溝壍車之水壍音子亷反陵阜崎嶇積石相接此歩兵之地車騎五不當一平原廣澤漫衍相屬此車騎之地歩兵十不當一候視相及川谷分限此弓弩之地刀楯三不當一草木蒙蘢枝葉蔚茂此矛鋋之地長㦸三不當一穹崇險隘阻阨相視此刀楯之地弓弩三不當一老子曰師之所處荆棘生焉大軍之後必有㓙年又曰兵者不祥之器非君子之器不得已而用之又曰是以君子居則貴左故吉事尚左䘮事居右是以偏將軍處左上將軍處右戰勝以䘮禮處之也又曰善爲士者不武善戰者不怒又曰天下有道却走馬以糞天下無道戎馬生於郊又曰以正治國以奇用兵六韜曰用兵之道使如疾雷令民不及掩耳卒電不暇瞑目古司馬兵法曰古者以義理之謂之政治民用兵止亂討暴必以義也正不獲意則權權岀於戰不岀於仁也分不均求不勝謂之不獲意權極也平輕重而爲之功以死易生以危爲寧反覆往來而以詐成故曰不出於仁也是故殺人殺之可也以殺止殺可以生也攻其國愛其民攻之可也除民亂去君害以戰去戰雖戰可恃也故仁見親義見悅智見恃勇見方信見信将有五材民親悦恃方而信之故内得愛焉所以守也外得威焉所以戰也利加於人仁則守固威加於敵人則戰勝也又曰戰道不違時不以病民所以愛吾民也春秋興師爲違時春興師虜五榖夏興師傷人民故役不踰時寒暑不易服飢疫不行所以愛民也不加䘮不因㓙所以愛惠其人也敵有䘮飢疫不加兵愛彼民如己民冬夏不興師所以兼愛彼民也大寒甚暑吏士懈倦故國雖大好戰必亡天下雖平忘戰必危又曰天下旣平天子大凱春蒐秋獮諸侯振旅秋治兵所以不忘戰也又曰古者逐奔不過百歩縱綏不過三舎是以明其禮也不窮不能而哀憐傷痛是以明其仁也成列而鼓是以明其信也爭義不爭利是以明其義也又能捨服是以明其勇也知始知終是以明其智也六德以時合散以爲民紀者古之道也自古之政也仁義勇智信民之本隨時而施爲民綱紀古之所傳之道也又曰先王之治順天之道設地之宜官民之德而正名治物正者正官名也名正則官可治之立國辨職立國治民分守境界各任其職也以爵分禄以爵位尊卑賦其禄秩也諸侯悦懷海外來服服從已也獄弭而兵寢聖德之治也又曰有虞氏不賞不罰而民可用至德也夏后賞而不罰至教也殷罰而不賞至威也周以賞罰德衰也賞不踰時欲民速得爲善之利也罰不遷刻欲民覩不善之害也賞功不移晷罰惡不踰刻所以勸善懲惡欲疾速者也又曰夏后正其德也未用兵之刃故其兵不雜設軍不陣敵服故不用五兵殷義也始用兵之刃矣陣而不戰周力也盡用兵之刃矣周不及虞夏之教討暴征亂戰乃勝夏賞於朝貴善也以德化也殷戮於市威不善也以刑禁也周賞於朝戮於市勸君子懼小人也以賞進以罰禁三王章其德一也三王皆道德文武隨而施之其致一也又曰凡戰寛而觀其慮寛者先以單弱示不能以示敵變化慮其利害得失所在也進退以觀其固遣輕兵至敵所在視察進退固備虛危處所也危而觀其懼詐説危事以知敵恐怖得失之勢也靜而觀其怠敵靜而不動相視吏士知懈惰動而觀其疑輕兵挑戰相視敵人知其疑否也襲而觀其治欲襲敵先視其守備外内什伍器械虛實治亂所在也又曰凡戰以輕行輕危輕兵高林疾足能追奔逐北翼助進退當湏歩曲什伍爲卒節度行止輕兵無輕重故危之以重行重無功重兵持守堅固什伍不得進退不能得利故無功也凡戰相爲輕重重主持重固守輕主追兵取利相爲用也又曰民有勇心唯敵之視士卒勇鋭進退前后離合左右見勝利之形唯敵所在輙得其便也民有畏心唯北之視士卒恐懼各有嫌疑不求便利懷其北心當安隠教道開示勝形以服習之兩心交支兩利若一兩軍相當兵相支持各求便利共事一勝之勢在兩軍間有道者得之也兩爲之職在權之視謂知己知彼稱輕重量多少度進退知彼己虛實之所在也軍旅以舒徐以爲主舒則人力足雖交兵致刃徒人不趍車不馳也逐奔不踰列是以不亂軍旅之固不失行列之政不絶人馬之力遲速無過誡命軍旅政爲堅固也進退疾徐從金皷之聲也又曰軍庸不入國國庸不入軍軍庸入國則民德廢國庸入軍則民德弱軍國異庸强弱殊任故不相入入則亂也故在國言文而語温在朝恭以遜脩己以待人不召不至不問不言難進易退此申叙國庸之宜在軍抗而意在行遂而果介者不拜兵車不軾城上不趣危事不齒此申叙軍庸之宜抗者不待問也意者有慮於事而爲不湏令遂必也果勝也介者不拜車不軾騎不下所以遠屈而整行也止趨爲驚衆也故禮與法表裏也文與武左右也古者賢王明民之德盡民之善故無廢德無簡民賞無可生罰無可殺也民有一善處一事故能盡民之善無損德民能堪其事故賞罰無所施又曰凡從奔勿息敵或止於路則慮之追敵奔北無休解則敵於路旁設伏當視察反覆慮之自警戒也凡近敵都必有進路退必有反慮深入敵地必知進退便利道徑通塞利害所在避實從虛也又曰凡戰先則弊後則懾兵先舉則勞後起則士心不定而恐懼選良次兵是謂益民之强選良者擇取勁勇有才者爲前什伍相當以接之死地及見勝則心專强也棄任節食是謂開民之意自古之政也任者畜積器物焚儲蓄服御之具節餘食戰之日不餘食示必死戰也開塞生意以專民心此五帝三王用兵之道也曹公孫子兵法序曰操聞上古弧矢之利論語足食足兵易曰師貞詩云王赫斯怒黄帝湯武咸用干戈爲民也用武者滅用文者亡夫差偃王是也聖賢之於兵也戢而時動不得已而用之觀兵書戰䇿孫武深已孫子者齊人也名武爲吳王闔閭作兵法一十三篇試之婦人卒以爲將西破强楚入郢北威齊晉後百歲餘有孫臏是武之後也孫子曰兵者國之大事校之以計而索其情謂下五事彼我之情一曰道二曰天三曰地四曰將五曰法道者令民與上同意謂導以教令也故可與之死可與之生而人不畏危危疑也言上有仁化於下則能致命也天者隂陽寒暑時制地者遠近險易廣狹死生言以凡地形勢不同因時制度也將者智信仁勇嚴將宜五德備也法者曲制官道主用曲制者部曲幡幟金鼓之制官者爵賞道者粮路主者主掌軍資之人用者計度費用之物凡此五者將莫不聞知之者勝不知不勝又曰兵者詭道故能而示之不能用而示之不用言已實能用師外示無法近而示之遠遠而示之近欲進而治去道若韓信襲安邑陳舟臨晋而度夏陽故利而誘之亂而取之實而備之敵將實湏備之强而避之避其所長怒而下之待其衰解卑而驕之佚而勞之以利勞之親而離之攻其無備岀其不意擊其懈怠空虛也此兵之勝不可豫傳傳洩也又曰凡用兵之法全國爲上破國次之夫興兵深入長驅敵舉國來服爲上以兵擊破得之爲次全軍爲上破軍次之軍四千人全卒爲上破卒次之上一千人下五百人全伍爲上破伍次之百人至五人也是故百戰百勝非善之善不戰而屈人之兵者善之善者也夫不戰而敵自屈服上兵伐謀敵始有謀伐之易也又曰故用兵之法十則圍之以十敵一則圍之是爲將智勇等而兵利鈍鈞也若主弱客勁不用十也操所以倍兵圍下邳而生擒吕布也倍則分之以二敵一則一術爲正一術爲奇術音遂敵則能戰已爲士衆等差者猶設竒伏以勝之也少則能迯高壁壘勿與敵戰也不若則能避之引兵避之故小敵之堅大敵之擒也小不能當大也又曰凡治衆如治寡分數是也部勒爲分什伍爲數也鬭衆如鬭少形名是也旌旗曰形金鼓曰名三軍之衆可使必受敵而無敗者竒正是也先岀合戰爲常後岀爲竒也兵之所加如以瑕投卵者虛實是也以實擊虛也又曰故善動敵者形之敵必從之見羸形也與之敵必取之以利動之以卒待之以利害動敵也故善戰者求之於勢專在權也不責於人故能擇人而任勢任勢者權變明也任勢者其戰人也如轉木石木石之性安則靜危則動方則止員則行任勢自然故善戰人之勢如轉員石於千仞之山者勢也又曰凡先據戰地而待敵者佚有餘力也後據戰地而趍戰者勞故善戰者致人而不致於人能使敵人自至者利之也誘之以利能使敵人不得至者害之也岀其所必趍攻其所不救故敵佚能勞之以利煩之飽能飢之絶其粮道安能動之岀其所必趍也使敵必救又曰兵形象水水之行避高而就下兵之形避實而擊虛故水因地而制形兵因敵而制勝故兵無常勢水無常形能與敵變化而取勝者謂之神勢盛必衰形露必敗能因敵變化勝之若神故五行無常勝四時無常位日有長短月有死生兵無常勢盈縮隨敵也又曰故不知諸侯之謀者不能豫交不知敵情謀者不能交結也不知山林險阻沮澤之形者則不能行軍高而崇者爲山樹木所聚者爲林坑坎者爲險一高一下爲阻水草漸洳爲沮泉水所歸不流者爲澤也不用鄉道者不能得地利故兵以詐立以利動以分合爲變者也兵一分一合以敵爲變故兵疾如風擊虛空也徐如林不見利也侵掠如火疾如火也不動如山守固難知如隂似天隂不見列宿也動如雷霆又曰夜戰多火皷晝戰多旌旗所以變人之耳目也故三軍可奪氣將軍可奪心左氏言一皷作氣再而衰三而竭也是故朝氣鋭晝氣惰暮氣歸故善用兵者避其鋭氣擊其惰歸此治氣者也以治待亂以靜待譁此治心者也以近待遠以佚待勞以飽待饑此治力者也無邀正正之旗無擊堂堂之陣此治變者也正正整齊堂堂大也又曰用兵之法高陵勿向倍丘勿逆丘阪勿迎佯北勿從鋭卒勿攻餌兵勿食歸師勿遏懷歸故能死戰不可擊也圍師必闕司馬法曰兵三面開其一面示生路也若敵戰陸地必空一面以示其虛欲使戰守不周也此用兵之法也又曰故善用兵譬如帥然帥然者常山之蛇也擊其首則尾至擊其尾則首至擊其中則首尾俱至又曰踐墨循敵以决戰事行踐規矩無常者也是故始如處女敵人開户後如脱兔敵不及拒處女示弱脫兔往疾也吳子曰皷鞞金鐸所以威耳旄麾旗章所以威目禁令刑罰所以威心三者不立雖有國必敗於敵故曰心威於形不可不嚴管子曰夫爲兵之數存乎聚財論工造軍器制器兵器選士政教軍中號令服習謂使習武藝徧知天下謂徧知其地形隘易上將工拙士卒勇怯明於機數此八者皆强故兵未岀境而無敵八者悉備然後能正天下又曰凡民之所以守戰而死而不德其上者或守或戰雖復至死不敢恃之以德於上則有數存於其間以至此也曰古者親戚墓墳之所在也一變田宅富厚足居也二變不然則州黨與宗族足懷樂也三變不然則上之教訓習俗慈愛之於民也厚無所往得之也君之恩厚皆在於人無所他往故得人致死四變不然則山林澤谷之利足生也五變不然則地形險阻易守而難攻也六變不然則刑嚴而可畏也賞明而足勸也七變不然則有深怨於敵人也八變不然則有厚功於上也功厚則禄多故亦自爲戰而不徳於君九變今恃不信之人而求於利用不守之民而欲以固將不戰之卒而幸以勝此兵之三闇也尉繚子曰凡兵者羊腸亦勝鋸齒亦勝兵重者如山林輕者如燔如炮如漏如潰如堵垣壓人也雲霓覆人也又曰故兵岀如堵墻動如風雨車不結軌士不旋踵此本戰之道也所以養民也又曰城所以守戰戰所以守地也故務耕者其民不饑務守者其民不危務戰者其地不圍三者先王之本務也而兵最急太平御覽卷二百七十
