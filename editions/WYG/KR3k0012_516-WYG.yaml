  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_516-1a, image: WYG0897/WYG0897-0605c.png}
body:
  text: 太平御覽卷五百一十六宋李昉等撰宗親部六兄弟下晉書曰王覽字元通母朱氏御前妻子祥無道覽年數嵗見祥被楚撻輙涕泣抱持至於成童每諫其母母少止􅇯虐祥漸有時譽朱氏宻使鴆祥覽知之徑起取酒祥疑其有毒爭而不與朱氏遽奪反之自後朱氏與祥饌覽輙先嘗又曰庾氷字季堅兄亮以名德流訓氷以雅素垂風諸弟相率莫不好禮為世論所重亮常以為庾氏之寳又曰荀組字大章於時天下已亂組兄弟貴盛懼不容於世雖居大官並諷議而已又曰謝安弟萬為鎮西中郎将縂藩任之重安雖處衡門其名猶出萬之右自然有公輔之望又曰華悝字道𢎞少失父事母至孝年十三值年饑榖貴悝􅂼食而母甘肥不絶又撫育孤弟友愛甚至稱為慈兄由是少有聲譽又曰魏徐州刺史任城吕䖍有佩刀工相之以為必三公可服此刀䖍謂别駕王祥曰苟非其人刀或為害卿有公輔之量故以相與祥始辭之因強乃受及祥死之日以刀授弟覽曰吾兒凡汝後必興足稱此刀故以相與覽則導之祖王隱晉書曰祖逖字士雅范陽人與弟約將母詣洛交結人流逖舅程𤣥良良弟衛弟收並臺郎州郡有勢於洛更共扶讃兩甥故並錄清塗逖初為司州主簿舉秀才為大司馬齊王椽有將帥之風宋書曰謝𢎞微少孤事兄如父兄弟友睦之行世莫能及口不言人長短兄曜好臧否人物每言論常以他語亂之又曰蔡廓奉兄軌如父家事小大皆諮而後行公祿賞賜一皆入軌有所資湏悉就所典者請焉從髙祖在彭城妻郗氏求夏服廓答曰知湏夏服計給事自應相供無容别寄軏時為給事中又曰謝景仁愛其弟甝胡甘切而憎弟述嘗設饌請髙祖命甝預坐而髙祖召述述知景仁夙意又慮非髙祖命之請急不從髙祖馳遣呼述湏至乃歡及景仁有疾述盡心視湯藥飲食必嘗而後進不解𢃄不盥櫛者累旬景仁深懐慙愧也又曰張暢弟收為猘音冀犬所傷醫言食蝦蟆鱠即愈收甚難之暢含笑先嘗收因啖得差又曰庾登之字元龍潁川鄢陵人也少以強濟自立為吳郡太守坐事免官弟炳之為臨川内史登之隨弟之郡優遊自適又曰江夷字茂逺濟陽考城人也夷少自操厲為吳郡太守以兄疾去官後遷右僕射又曰陶潛與弟子書以言其志并為訓戒曰汝輩稚小家貧無役柴水之勞何時可免念之在心若何可言然雖不同生當思四海皆兄弟之義鮑叔敬仲分財無猜歸生伍舉班荆道舊遂能以敗為成因䘮立功他人尚爾况共父之人哉潁川韓元長漢末名士身處卿佐八十而終兄弟同居至於没齒濟北紀稚春晉時操行人也七世同財家無怨言詩曰髙山仰止景行行止汝其慎哉又曰孔顗字思逺不尚矯飾服用麤敗終不改易時吳郡顧顗之亦尚儉素衣裘器服皆擇其陋者宋世清約稱此二人顗弟道存從弟微頗營業二弟請假東遷輜重十餘舫皆是絹紙席之屬顗見之命上置岸側命左右取火燒之盡乃去道存代顗為江夏内史時都邑米貴道存慮顗甚乏遣吏載五百斛米餉之顗呼吏載米還彼吏曰都下米貴乞於此貨之不聽吏乃載米而去又曰蔡廓罷豫章郡還起二宅先成東宅與兄軌又曰徐湛之年數嵗時與弟淳之共車行牛奔車壊左右人馳來赴之湛之先令取弟衆咸歎其幼而有識又曰謝𢎞微寛重有雅量不以喜愠改色有蔡湛之者及見太傅兄弟謂人曰𢎞微貌類中郎而性似文靖齊書曰衡陽王道度太祖長兄也與太祖俱受學雷次宗宣帝問二兄學業次宗答曰其兄外朗其弟内潤皆良璞也又曰劉璡兄瓛夜隔壁呼璡不答方下牀著衣立然後應瓛問其久璡曰向束𢃄未竟其操如此又曰張岱少與兄太子中舍人寅新安太守鏡征北將軍永廣州刺史辨俱知名謂之張氏五龍隋書曰盧昌衡小字龍子風神澹雅容止可法博涉經史工草行書從弟思道小字釋奴宗中俱稱英妙故幽州為之語曰盧家千里釋奴龍子唐書曰温大雅厯遷黄門侍郎弟彦博為中書侍郎對居近侍議者榮之髙祖從容謂曰我起義晉陽為卿一門耳大雅將改葬其祖父筮者曰葬於此地害兄而福弟大雅曰若得家弟永康我将含笑入地葬訖嵗餘而卒又曰張嘉貞為并州長史為政嚴肅甚為人吏所畏開元初因奏事至京師上聞其善政數賞慰嘉貞因奏曰臣少孤兄弟相依以至今日臣弟嘉祐今授鄯州别駕與臣各在一方同心離居魂絶萬里乞移就臣側兄弟盡力報國死無所恨上嘉其友愛特改嘉祐為忻州刺史又曰韋述弟廸學業亦亞於述尤精三禮與述並為學士廸同為禮官時人榮之又曰張道源族孫楚金少有志行事親以孝聞初與兄越石同預郷貢進士州司将罷越石而薦楚金楚金辭曰以順則越石長以才則楚金不如固請俱退時李勣為都督歎曰貢士本求才行相推如此何嫌䨇舉也乃俱薦擢第又曰李遜幼孤寓居江陵與其弟建皆安貧苦易衣併食講習不倦遜兄造知二弟賢日為營丐成其志業建先遜一年卒兄弟同致休顯仕君子多之又曰楊汝士為劍南東川節度使時宗人嗣復鎮西川兄弟並居節制時人榮之又曰薛膺友悌弟齊為李絳山東西道從事絳遇害齊中飛矢墜於城下膺時為左補闕聞難不及請馳馬以赴齊歿膺與兄弟褒庠處䘮過禮朝之卿大夫暨縉紳徃弔者繼路聞其哀號弔者悲不能自持膺去左補闕庠去河南縣尉直𢎞文舘與褒皆屏去外飾野服布巾終喪蹈名教者推之續晉陽秋曰王珉有雋才與兄珣並有名而聲出珣右時人為之語曰法䕶非不佳阿彌難為兄韋昭吳書曰劉繇長子基遭家多難零丁困苦潛處味道不以為戚與羣弟居常夜卧早起妻妾希見其面諸弟敬憚事之猶父不妄交遊門無雜賓三十國春秋曰裴楷常建别宅甚美麗楷兄欲之楷便讓焉其性有大度皆斯類也世説曰諸葛瑾弟亮及從弟誕並有盛名各在一國於時以為蜀得其龍吴得其虎魏得其狗誕在魏與夏侯𤣥齊名瑾仕吳吴朝服其𢎞雅又曰謝奕作郯令有一老翁犯法謝以醇酒罰之乃至醉而猶未巳太傅時年七八嵗著青布袴在兄膝邉坐諫曰阿兄老翁可奈何故取作此謝於是改容曰阿奴欲放去耶即遣之㑹稽典錄曰謝淵字休德山隂人其先鉅鹿太守夷吾之後也世漸㣲替仕進不繼至淵兄弟一時俱興兄咨字休度少以質行自立幹局見稱官至海昌都尉淵起於衰末兄弟脩德貧無戚容歴位建威将軍又曰鍾牧字子幹牧兄駰計吏少與同郡謝贊吳郡顧譚齊名牧童齔時號為遲訥駰嘗謂人曰牧必勝我不可輕也時人皆以為不然三輔决録曰張宇穆之第二子也以父功當封自言兩目失明天子信之乃封弟恭其小弟好戯無度放散家財宇悉以所得千萬與之天子聞而嘉之又知其讓封徵拜議郎説苑曰宋襄公兹父為桓公太子桓公有後妻子曰公子目夷公愛之兹父為公愛之也欲立之請於公曰請使目夷立臣為之相以佐之公曰何故也對曰臣自知不足以處目夷之上公不許強以請公許之将立公子目夷目夷辭曰兄立而弟在下是其義也今弟立而兄在下是不義也公使目夷逃之衛兹父從之三年桓公有疾使人召兹父曰若不來是使我以憂死也兹父乃反公復立之為太子然後目夷歸楚國先賢傳曰隂興字君陵南陽新野人也拜衛尉薨明帝封興長子慶為嗣陽侯次子傳為隱强侯傳弟員丹皆為郎慶少脩儒術推所居第宅奴婢財物悉分與員丹但佩印綬而已當世稱之上以慶閨門孝悌行義敦宻褒顯朝廷以勵親戚擢為羽林右監劉向列女傳曰廣漢汝婦者汝敦之妻也居世殷富兄弟早孤而嫂貪慳敦以所受田宅奴婢三百餘萬悉讓與兄裁留園地數十畆起舍耕作土中得金一器敦以示妻妻曰本言讓先祖所有也此金非其有耶敦曰固吾意也乃俱擔金與兄嫂嫂初謂叔窮乏來欲借貸有不恱之色見金而喜兄乃惻然感悟棄妻還金海内先賢傳曰范丹字史雲讓財千萬與三弟風俗通曰陳留太守泰山吳文章少與兄伯武相失二十年後相㑹下邳市中共計爭鬭伯武歐之文章欲報心悽悵手不能興動觀者笑之更相借問乃親兄也相持啼哭觀者復曰兄校弟不得報兄向者所笑乃其義也典論曰劉表病疾其子琦還省疾病琦性慈孝蔡瑁恐琦見表父子相感更有託後之義謂曰将軍命君撫臨江夏為國東藩其任至重今釋衆而歸必見譴怒傷歎以増其疾非孝敬也遂遏於户外使不得見琦流涕而去江微陳留志曰李銓字𤣥機平丘人也少聪惠有志行銓兄全前母子後母甚不愛也而衣食皆使下銓始年五嵗覺己衣勝兄即脫不著湏兄得與己同然後受服之其母遂不得有偏及長銓内匡其母外奉其兄故閨門雍睦為邦族所稱晉諸公讚曰髙柔長子攜大将軍椽次誕歴三州刺史放率不倫决烈過人次光字宣茂少習家業明練法治晉武帝世為廷尉兄誕與光異操謂光小節常輕侮之光事誕愈謹又曰和嶠為少保散騎常侍性至儉吝嶠同母弟都素無名稱嶠輕侮之以此為損太平御覽卷五百一十六
