body:
  text: 太平御覽卷三百七十二宋李昉等撰人事部十三髀股臋膝脛腓脹足踝髀股說文曰脾股外也又曰股髀也釋名曰髀卑也在下稱也股固也為强固也易說卦曰巽為股春秋元命苞曰脾之為言跂也隂二故人兩髀尚書皋陶謨帝曰臣作朕股肱耳目左傳僖中曰宋公及楚人戰于泓宋公既成列楚人未濟司馬曰彼衆我寡及其未濟也請擊之公曰不可既陣而後擊之宋師敗績公傷股又襄四年曰齊侯襲莒門于且于且于莒邑傷股而退又襄二十五年曰崔杼之亂甲興公登臺而請弗許公踰牆又射之中股又哀下曰衛石圃攻公公踰北方而墜折股戰國䇿曰蘇秦讀書欲睡引錐自刺其股血流至踵漢書曰髙祖股上有七十二黒子又曰魏勃少時欲求見齊相曹參家貧無以自通乃早掃齊舍人門因得自進及灌嬰責其勸齊王反状勃曰失火之家豈暇先言大人然後救火乎因退股戰不能言嬰曰人謂勃勇庸妄人耳何能為乎東觀漢記曰耿弇擊張歩于東城飛矢中弇股以手中刀截之軍中無知者魏志曰諸葛亮軍退司馬宣王使張郃追之郃曰軍法圍城必闕歸軍勿追宣王不聽郃不得已逐之蜀軍乗髙布伏弓弩亂發矢中髀股江表傳曰孫䇿攻苲融為流矢中傷股不能乗馬因自輿還九州春秋曰劉備奔荆州劉表甚敬禮之備作上客數年嘗扵坐中起至厠見髀裏肉生流涕還坐表問備備曰昔年嘗身不離鞍髀肉皆消今不復騎髀裏生肉日月若馳老將至矣而功業不立是以悲耳晉中興書曰王恭敗單馬奔曲阿不堪久騎兩髀生瘡不能復去曲阿人殷礭以舡載之為胡浦尉所得三國典畧曰後周盧昌期祖英伯反宇文神舉討平之神舉以英伯壯節欲令寛赦軍人已割其髀肉如鵝卵矣英伯顔色不變遂遣誅之唐書曰李勣初平王世充獲其故人單雄信勣表稱其武藝命請以官爵贖之髙祖不許臨將就戮勣對之號慟割股肉以啖之曰生死永訣典略曰王符字節信安定人渡遼將軍皇甫規去官歸安定有人前以貨買鴈門太守者亦去官歸書刺従規規卧不迎使之入既坐問啖鴈美乎又以其刺刮髀聞符至大禮之段龜龍涼州記曰隠王張美人年色壮艷出家為道吕隆逼之張投門樓雙股頓折誦經顔色自若俄而死太公金匱曰武王伐殷丁侯不朝尚父乃引畫丁侯射之丁侯病遣使請尚父乃以十干日去别箭丁侯病乃愈四夷聞皆懼越裳氏獻白鳥也山海經曰長股國為人常被髮一曰長脚范注方曰青龍中司徒吏顔奮女苦風一脾偏枯農犢民為穿地作坑取雞矢荆葉燃之合煙内脛坑中視虫出長尺頭尾赤病愈臋廣雅曰臋謂之脽亦謂脺釋名曰臋遌也髙厚有殿遌也周易困卦初六曰臋困于株木入于幽谷三嵗不覿凶又姤卦曰臋無膚其行次且國語曰晉成公之生其母夢神規其臋以黒曰使有晉國故名之黒臋膝釋名曰膝申也可屈申也膝頭曰膞􅈩圓也因形圎而名之禮記檀弓下曰穆公問子思曰為舊君反服古歟子思曰古之君子進人以禮退人以禮今之君子進人若將加諸膝退人若將墜諸淵無為戎首不亦善乎又何反服之禮之有孝經曰故親生之膝下以養父母日嚴史記曰衛鞅復見孝公與語不自知膝之前扵席也魏志曰朱建平善相馬文帝将出取馬入建平曰此馬之相今日死矣文帝将乗馬馬惡衣香囓帝膝帝大怒即使殺之又曰諸葛亮後出岐山詔張郃督諸將至木門與亮軍交戰飛矢中郃右膝薨又曰蘇則與董昭俱為侍中昭嘗枕則膝卧則推下之曰蘇則膝非佞人之枕又曰鍾繇有膝疾拜起不便常輿車上殿魏畧曰初袁熙納甄后熙出行在幽州后留侍姑及鄴城破袁紹妻及后坐堂上文帝入紹舍后怖以頭伏姑膝上文帝謂曰袁夫人令新婦舉頭姑乃捧后令仰帝就視顔色非凡稱嘆之太祖聞遂為迎之又曰諸葛亮在荆州以建安初與潁川石廣元徐元直汝南孟公威等俱逰學三人務扵精熟而亮獨觀其大畧每晨夜從容常抱膝長嘯而謂三人曰卿諸人仕進可至郡守刺史三人問其所至亮但笑而不言三國典畧曰王僧辯平侯景或謂僧辯曰朝士来者孰當先至僧辯曰其周𢎞正乎俄而𢎞正與弟𢎞讓自投迎軍僧辯甚喜謂之曰公可坐膝上𢎞正對曰可謂加諸膝也老夫何足當之莊子曰黄帝聞廣成子在扵崆峒之上間居三月復徃邀之廣成子南首而卧黄帝従下風膝行而進列女傳曰桀日夜與妺嬉及宫人飲酒常置妺嬉扵膝上聽用其言黄帝素問曰膝者筋之府脛說文曰脛胻也釋名曰脛莖也直而長似物莖尚書泰誓曰商王受斮朝渉之脛孔安國曰冬月見朝渉水者謂其脛耐寒斬視之論語憲問耻曰原壤夷俟孔子曰幼而不遜悌長而無述焉老而不死是為賊以杖叩其脛後漢書曰馬援擊西羗中流矢貫脛帝以璽書勞之東觀漢記曰淳于恭養兄崇孤而敎誨學問時不如意輙呼責數以捶自擊其脛欲感之兒慙負不敢復有過魏畧曰北丁零有馬脛國聲似鴈鶩従膝脛以下生馬蹄走疾扵馬正部曰夏禹治水腓無胶脛無毛山海經曰交脛國為人交脛郭璞注曰脚脛曲相交所謂交趾也有赤脛民赤水之東有長脛之國腓脹說文曰腨腓脹也易艮卦曰六二艮其腓又咸卦六二曰咸其腓凶居則吉東觀漢記曰馬援為隴西太守擊羗中矢貫腓脹上聞賜羊三千牛三百頭以養病山海經曰無臋之國為人無臋韓子曰晉平公與亥唐坐而出叔向入公曵一足叔向問之公曰吾侍唐子腓痛足痺而不可伸足爾雅曰趾足也說文曰足在下也釋名曰脚却也以其坐時却在後也易說卦曰震為足尚書說命曰若跣弗視地厥足用傷禮記玉藻曰足容重又祭義曰樂正子春下堂而傷其足數月不出猶有憂色門弟子曰夫子之足瘳矣數月不出猶有憂色何也樂正子春曰父母全而生之子全而歸之可謂孝矣不虧其體不辱其身可謂全矣故君子頃歩而弗敢忘孝也今予忘孝之道予是以有憂色也一舉足而不敢忘父母一出言而不敢㤀父母是故道而不徑舟而不逰不敢以先父母之遺體行殆左傳荘公曰鄭伯治與扵雍糾之亂者刖强鉏君子謂强鉏不能衛其足又莊公八年曰齊亂殺孟陽于牀曰非君也不類見公之足扵戸下遂弑之又成下曰齊刖鮑牽仲尼曰鮑荘子之智不如葵葵猶能衛其足又昭二年曰衛襄公夫人姜氏無子嬖人婤姶生孟縶孟縶之足不能良行又哀下曰衛侯與諸大夫飲酒禇師聲子襪而登席公怒曰必斷而足榖梁傳定公曰公㑹齊侯于夹谷孔子曰笑君者罪當死使司馬行法焉手足異門而出史記曰韓信使人言齊偽詐多變願為假王漢王大怒張良陳平躡漢王足因附耳語曰漢方不利寕能禁信之王乎漢書曰漢王項羽相臨廣武之間漢王數羽十罪羽大怒伏弩射中漢王漢王傷胷乃捫足曰虜中吾指又曰張湯所愛史魯謁居病卧閭里主人湯自徃視病為謁居摩足又曰昭帝立遣李陵故人隴西任立政等三人俱至匈奴招陵單于置酒政等見陵未得私語即目視陵而數自循其刀環握其足隂喻之言可歸漢後漢書曰李固足下有龜文續漢書曰楊彪見漢祚將終遂稱脚攣不復行積十餘年王隠晉書曰陶侃為荆州杜弢音韜將王真遥語真横脚馬上侃說曰杜弢為益州刺史盗用庫金父死不奔䘮君本佳人何随之天下無白頭賊也真聞下其脚辭又順侃知其意使降人喻真真乞得先信乃截髮為信蜀賊糧盡真既降而走晉書曰陶潜無履江州刺史王𢎞顧左右為之造履左右請履度潜便扵座伸足令度焉𢎞要之還州問其所乘答云素有脚病向来籃輿亦足自反乃令一門生二兒共輿之三十國春秋曰王濟嘗與武帝棊濟伸脚在局下因問皓曰聞君生剥人靣皮何也皓曰見人臣無禮扵其君者則剥之武子大慙遽縮脚晉陽秋曰周顗既遇害王彬哭之甚哀敦怒曰周伯仁凡人遇汝何為如此彬曰伯仁長者君之親友在朝雖無蹇諤亦無所阿黨且加之極刑何痛如之左右見敦盛怒竊勸跪謝彬曰脚痛不能跪拜敦復曰脚痛孰與頸痛咸為失色續晉陽秋曰習鑿齒以脚病廢扵里巷苻堅㓕樊鄧素聞其名與釋道安俱輿而致焉與語大恱以其蹇疾裁堪半丁與諸鎮書曰晉氏平吴利在二陸今破漢南得士一人半耳三國典畧曰侯景左足上有肉瘤其状如龜戰應尅㨗瘤則隠起如其不勝瘤則低下及奔敗瘤䧟肉中唐書曰工部尚書賈直言父道冲以伎術待詔翰林因言事獲罪扵代宗皇帝詔逐之賜酖扵路直言偽令其父拜四方辭上下神祇伺使者視稍怠即取其酖以飲遂迷仆而死明日酖洩扵足而後復蘇代宗聞之减父死直言亦自此病躃家語曰南宫縚音韜見孔子未嘗越履徃来過之足不履影老子曰千里之行始扵足下韓子曰楚和氏得玉璞楚山之中獻之武王武王使玉人相之曰石也刖其左足武王薨文王即位又奉獻之玉人相之曰石也則其右足成王即位和抱其璞哭扵楚山之下三日三夜泣盡繼之以血王使玉人理之得寳焉名曰和氏璧又曰魯哀公問孔子曰吾聞䕫一足信乎對曰䕫之為人也獨通扵聲堯曰䕫一而足使為樂正又曰晉平公與亥唐坐而出叔向入公曵一足叔向問之公曰吾侍唐子腓痛足痺而不敢伸叔向不恱公曰子欲貴吾爵子子欲富吾禄子夫唐先生無欲也非正坐吾無以養之三輔舊事曰武帝發兵攻衛太子連鬭五日白虎闕前溝中血没足吴越春秋曰越王念吴欲復怨非一旦也苦思勞心夜以接日足凊則漬之以水冬寒則抱氷夏熱則握火愁心苦志懸胆扵戸出入嘗之不絶扵口帝王世紀曰大禹右足文履已字抱朴子曰老君足下有八卦穆天子傳曰至于巨蒐氏巨蒐之人乃獻白鶴之血以飲天子且具牛馬之湩以洗天子之足山海經曰柔利國為人一手反膝曲足一曰留利之國人足反折跛踵國其為兩足皆大郭璞注曰其人行足跟不着地周書曰晉平公使師曠見太子晉曰吾聞王子之語髙扵太山夜寐晝居不安不逺道願一言王子曰吾聞太師将来吾心甚喜既以見君子喜而又懼吾甚年少見子而懾盡忘吾度師曠束躅其足曰善哉善哉王子曰太師何舉足驟師曠曰天寒足跔是以數也王子曰請入坐遂席弦琴師曠歌無射瀨鄉記李母碑曰老子足蹈二五西京雜記曰廣川王發欒書冢柩明器朽爛無餘有一白狐見人驚走左右逐㦸之不能得傷其左足夕王夢一丈夫鬚眉盡白来謂曰何故傷吾左足仍以杖擊王左足王覺左脚腫痛生瘡至死不差王子年拾遺録曰周昭王夢羽人遺藥以之塗足則飛上天萬里之外蕭廣濟孝子傳曰五郡孝子者中山常山魏郡鉅鹿趙國人也少去鄉里孤無父母相随于衛國因結兄弟長元重次仲重次叔重次季重次稚重朝夕相事財三千萬于空城見一老姥兄弟下車再拜曰願為母母許焉積二十四年母得病口不能言五子乃仰天歎願使我母語即便得語謂五子曰吾太原董陽猛女嫁同縣張文賢死亡我男兒名焉遺七嵗值亂亡失心前有七星右足有黒識語未竟而卒五子送䘮㑹朝歌長晨出亡其記囊疑五子所竊收得三重詣河内告枉具言始末太守號哭曰生不識父與母相失痛不自聊知近為五子所養馳使放三重㑹稽典録曰黄昌為蜀郡太守初昌為州書佐婦寧于家遇賊遂流轉入蜀為民妻其子犯法乃詣昌昌疑不類蜀人因問所由對曰妾本㑹稽余姚戴次公女州書佐黄昌妻嘗歸家為賊所略遂至于此昌驚呼前謂曰何以識黄昌曰左足心有黒子常言當為二千石乃出足示之相持悲泣還為夫妻楚辭卜居曰漁父鼓枻歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足踝釋名曰踝跖踝踊也亦因其形踝踝也足後曰跟在下旁着地踵聚也上體之所鍾聚也史記曰蘇秦握錐自厲流血至踝英雄記曰向詡坐板牀有兩踝處入板中三寸許陸機别傳曰孟玖欺神都王頴曰陸機司馬孫承備知機情可考驗也頴扵是收承父子五人考掠備加踝骨皆脫出終不誣機太平御覽卷三百七十二
