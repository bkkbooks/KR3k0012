body:
  text: 太平御覽卷六百三十二宋李昉等撰治道部十三薦舉下唐書曰杜如晦少聰悟精彩絶人太宗引為秦府兵曹俄改陜州長史房𤣥齡白太宗曰餘人不足惜杜如晦聰明敏逹王佐之才若大王守藩無所用之必欲經營四方非此人莫可太宗乃請為秦王府掾封延平縣男補𢎞文舘學士貞觀初為右僕射又曰李大亮隋末為賊所獲同輩百餘人皆死賊帥張弼見而異之獨釋與語遂定交於幕下大亮既貴每懐張弼之恩貞觀末弼為將作丞自匿不言大亮遇諸途識之持弼手而泣悉推家産以遺弼弼辭不受大亮言於太宗曰臣有今日榮貴乃張弼之恩力也乞遷臣之官爵以授之太宗即日以弼為中郎將俄遷代州都督又曰岑文本初事蕭銑江陵平授秘書郎直中書省李靖驟稱其才擢拜中書舎人漸䝉恩遇時顔師古諳練故事長於文誥時無迨者冀復用之太宗曰我自舉一人公勿憂也乃以文本為中書侍郎專典樞宻又曰狄仁傑授汴州判佐工部尚書閻立本黜陟河南仁傑為人誣告立本驚謝曰仲尼觀過知仁足下可謂海曲之明珠東南之遺寳特薦之遷并州法曹又曰張柬之進士擢第為清源丞年且七十餘永昌初自免復應判策試畢有傳柬之考入下科柬之嘆曰余之命也乃委歸襄陽時中書舎人劉允濟重考策自下昇甲科為天下第一擢拜監察御史累遷荆州長史長安中則天問狄仁傑曰朕要一好人任使有乎仁傑對曰陛下作何任使則天曰朕方待以將相仁傑曰料陛下若求文章資厯則今之將相李嶠蘇味道亦足為文吏矣豈非文士齪齪思得大才以用之以成天下之務者乎則天悦曰此心也仁傑曰荆州長史張柬之其人雖老真宰相材也且久不遇若用之必盡忠於國家則天召以為洛州司馬他日又求賢仁傑曰臣前言張柬之猶未用也則天曰已遷之矣仁傑曰臣薦之請為相也今為洛州司馬非用之也乃遷秋官侍郎及姚崇將赴靈武則天令舉内外堪為宰相者崇曰張柬之沈厚有謀能斷大事且其人年老唯陛下急用之登時召見為同鳳閣鸞臺平章事年已八十與桓彦範敬暉等誅二張興復社稷忠冠千古功格皇天又曰張嘉貞落拓有大志亦不自異亦不下人自平鄉丞免歸鄉里布衣環堵之中蕭然自得時人莫之知也張循憲以御史出使還次蒲州驛循憲方復命使務有不決者意頗病之問驛吏曰此有客乎驛吏以嘉貞對循憲召以相見咨以使事積時凝滯者嘉貞随機應之莫不豁然乃命草表又出其意外他日則天以問循憲具以實對因請以己官讓與之則天曰卿能讓賢朕豈無一官自進賢耶乃召見内殿隔簾與語嘉貞儀貌甚偉神彩俊傑則天甚異之因奏曰臣生居草莱因不覩朝廷之事陛下過聴引臣天廷此萬代一遇也然咫尺之間若隔雲霧臣恐君臣之道有所未盡則天曰善遽命捲簾翌日拜監察御史開元中用之為相又曰姜皎薦源乾曜𤣥宗見之大悦驟拜為相謂左右曰此人儀形壯肅類蕭至忠朕故用之左右曰至忠以犯逆死何故念之𤣥宗曰我為社稷計所以誅之然其人信美才也又曰李勣少與鄉人翟讓聚衆為盜推李宻為主言於宻曰天下大亂本為饑苦若得陽黎一倉大事濟矣遂襲取之時在饑餓就食者數十萬人魏徴髙季輔杜正倫郭孝恪皆客遊勣一見便加禮敬引之卧内談論忘疲及虎牢獲戴胄亟相推薦咸至大官時稱勣有知人之鑒又曰李義府僑居於蜀袁天綱見而奇之曰此郎貴極人臣但夀不長耳因請舍之託其子曰此子有七品願提㧞之義府許諾因問天綱夀幾何對曰五十二此外非所知也安撫使李大亮侍中劉洎等交薦之召見拜監察御史後位至宰相白虎通曰諸侯所以貢士於天子者進賢稱善者也天躬求之者貪義也治國之道本在得賢得賢則治失賢則亂孔叢子曰子高見齊王齊王問誰可臨淄宰稱管穆焉王曰穆也容貌陋民不敬子高答曰夫見敬在德日臣所稱其才也君王聞晏子趙文子乎晏子長不過六尺面貎醜惡齊國上下莫不宗焉趙文子其身如不勝衣其言如不出口非但體陋辭氣又訥其相晉國晉國以寧諸侯敬服皆有德故也以穆軀形方諸二子猶悉賢之昔臣嘗行臨淄市見屠商焉身脩八尺鬚髪如㦸面正紅白市之男女未有敬之者無德故也王曰是所謂祖龍始者也誠如先生之言於是乃以管穆為臨淄宰韓子曰趙武薦四十六人於其君及武之死四十六人皆就賓位無其私德若此又曰武薦曰屋之士六十餘家戰國䇿曰淳于髠見七人於宣王王曰子來矣寡人聞千里一賢是比肩相望百世一聖若随踵而至者也今子一日而見七士不亦衆乎髠曰不然夫鳥同翼者而聚居獸同足者而俱行今求柴胡桔梗於沮澤則世不得一焉若求之梁父之隂則郤車而載耳夫物有儔等今髠賢者之儔王求士於髠譬如挹水於河而取火於燧也言易得也國語曰文公使原季為卿原季趙衰文公二年為原大夫辭曰夫三徳者偃之出也三徳欒枝先軫胥臣也偃狐偃也三子皆偃所進以徳紀民其章大矣不可廢也使狐偃為卿辭曰毛之智賢於臣其齒又長毛偃之兄也毛也不在位不敢聞命乃使狐毛将上軍狐偃佐之又曰趙宣子言韓獻子於靈公以為司馬河曲之役趙孟使人以其車乗干行秦與晉戰在晉文十一年獻子執而戮之衆咸曰韓厥必不沒矣其主朝升之而暮戮其車其誰安之宣子召而禮之曰吾聞事君者比而不黨夫周以舉義比也舉以其私黨也夫軍事無犯犯而不隠義也吾言汝於君懼汝不能也舉之而不能黨孰大焉勉之長臨晉國者非汝其誰勉之告諸大夫曰可賀我矣吾舉厥也而中吾乃今知免於罪矣免失舉之罪韓詩外傳曰魏文侯之時子質仕而獲罪焉去而北遊謂簡主曰吾所樹堂上之士半吾所樹朝廷之大夫半吾所樹邊境之人亦半今堂上之士惡我於明君朝廷大夫中我於法邊境之人刼我以兵是以不復樹徳於人簡主曰噫子言過矣春樹桃李夏得隂其下秋得食其實春樹蒺藜夏不得採其葉秋得其刺焉由此觀之在所樹也今子之所樹其非人耳吕氏春秋曰管仲病桓公徃問之曰仲父之病矣言其病困漬甚國人弗諱寡人將誰屬國管仲對曰昔者臣盡力竭智猶未足以知之也今病在於朝夕之中臣奚能言桓公曰此大事願仲父教寡人也管仲敬諾曰公誰欲相欲用誰相公曰鮑叔牙可乎管仲對曰不可夷吾善鮑叔牙牙之為人也清亷㓗直視不己若者不比於人一聞人之過終身不忘無己則隰朋其可乎隰朋之為人也上志而下求愧不若黄帝而哀不己若者自愧其徳不如黄帝又恐不若己也其於國也有不聞也不求聞其善志在利國而已其於物也有不知也物事也非是物不求知之其於人也有不見也務在濟民不求見也無己則隰朋可矣夫相大官也處大官者不欲小察不欲小智故曰大匠不斵但規模而已不自削大庖不豆和調五味不復自列大勇不鬬大兵不冦又曰魏公叔座疾恵王徃問之曰公叔之病甚矣将奈社稷何對曰臣之庶子鞅者願王以國聴之若不能聴勿使出境王不應出謂左右曰豈不悲哉夫以公叔之賢今謂寡人必以國聴鞅悖也公叔死公孫鞅西遊秦孝公聽之秦果强魏果弱又曰百里奚之未遇時至虢而虜飯牛於秦練以鬻五羊之皮公孫枝得而悦之獻諸穆公三日請屬事焉公曰貢之五羊之皮而臣之無乃為天下笑乎枝曰信賢而任之君之明也讓而下之臣之忠也君為明臣為忠彼信賢也境内将服敵國且畏夫誰暇笑我用之謀無不當舉必有功説苑曰田子方渡西河遇翟璜乗軒車子方曰子何以致此乎曰昔西河無守臣進呉起鄴無令臣進西門豹酸棗無令臣進屈侯鮒君欲攻中山臣進樂羊中山已㧞無使守之臣臣進李克進此五大夫爵倍於此又曰子貢問孔子曰今之臣孰賢孔子曰齊有鮑叔鄭有子皮子貢曰齊無管仲鄭無子産者乎孔子曰吾聞鮑叔之進管仲子皮之進子産未聞管仲子産有所進也又曰孟嘗君進客於齊王三年不見用故客反見曰不知臣之罪耶君之過耶孟嘗君曰寡人聞縷因鍼而入不因針而急女因媒而嫁不因媒而畜夫子之才必薄矣尚怨寡人哉客曰臣聞韓盧天下疾狗也見兎而指屬則不失兎望兎而放狗則累世不能得兎矣非不能屬者罪也於是孟嘗君復屬齊王王遂使為相又曰蘧伯玉使之楚逢公子晳濮水之上接草而待曰聞上士可以託邑中士可以託辭下士可以託才三言固可得託耶伯玉曰謹受命伯玉見楚王使事畢坐従容言士王曰何國最多士伯玉曰楚國多士而楚不能用王曰是何言也伯玉曰子胥生於楚而呉善用之賁皇生於楚而晉善用之今者臣之来逢子晳曰上士可以託邑中士可以託言下士可以託才三言者固可得託於是楚王發使追公子晳濮水之上子晳還重於楚伯玉之功也劉向新序曰楚莊王罷朝而晏樊姬問其故莊王曰與賢相語不知晏者也樊姬曰賢相為誰王曰虞丘子樊姬掩口而笑王乃問其故曰虞丘子為相數年未嘗進一賢不知賢是不智知而不進是不忠不忠不智安得為賢明日朝王以樊姫之言告虞丘子虞丘子稽首曰如姬之言於是辭位而進孫叔敖叔敖相楚而莊王霸樊姬之力也汝南先賢傳曰潁川鍾皓字季和為郡功曹太丘長陳寔為西門亭長皓深獨敬異嵗常禮待與同分義㑹辟公府臨辭太守問誰可代君曰府君欲得其人西門亭長可用寔卒為海内髙名之臣歸以公相之位三輔決録曰潁陽遊殷為郡功曹有童子張既書佐殷察異之具設賔饌以子楚託之後魏王以問既既稱楚文武兼才王遂以為漢興郡守管輅别傳曰趙孔耀至冀州見裴使君悲問顔色何以清减孔耀曰體本無藥石之疾然見清河郡有一騏驥拘繫後廐厯年去王良伯樂百八十里不得騁其足以起風塵以此憔悴耳使君言騏驥今何所在孔耀言平原管輅字公明年三十六雅性寛大與世無忌仰觀天文則能同妙甘公石申俯覧周易則能思齊季主遊歩道術開神無窮抱荆山之璞懐夜光之寳而為清河郡所録北黌文學可為痛心疾首者裴使君聞言慷慨曰如此便相為取之既檄召輅為文學従事一相見清論終日不覺罷倦天時大熱移床於庭前樹下乃至鷄鳴向晨後再出相見便轉為鉅鹿従事三相見轉為治中四相見轉别駕至十月舉為茂才文士傳曰張華薦成公綏曰竊見處士東郡成公綏年二十五字子安體珪璋之質資不器之量知深慮明足以妙見研思篤好足以致精貞幹勁操足以敦風篤俗淵才逹學足以𢎞遵世教固逸倫之殊俊縉紳之檢式也荀爽與郭叔都書曰陳季方才徳秀出超世逸郡金相玉質文章茂美終軍賈誼誠無以加宜遂貢之朝宁盛其龍光塩車之驥自非伯樂無以顯名採光剖璞自爾見寳實為足下利之孔融薦禰衡表曰伏見處士平原禰衡淑質貞亮英才卓犖初渉藝文登堂覩奥目所一見輙傳於口耳所一聞不忘於心性與道合思若有神若得龍躍天衢奮翼雲漢足以明近署之多士増四門之穆穆應璩薦賁伯偉文詣曹公曰璩聞景雲浮則龍翔應治道明則雋乂臻是故良哉之歌興於唐堯之世多士之頌形於周文之朝竊見太子舍人賁琳字伯偉稟性純和體素清峻宜授以千里之塗任以列曹之職陸機薦賀循郭納表曰伏見武康令賀循徳量􅃉茂才鑒清逺丞陽令郭納風度簡曠器識朗㧞准其才望資品循可尚書郎納可太子洗馬又陸機薦戴若思文曰盖聞繁弱登御然後髙墉之功顯孤竹在西然後降神之曲成伏見處士廣陵戴淵年三十字若思心智足以研幽才鑒足以辨物固窮樂志無風塵之慕砥節立行有渫井之㓗誠東南之貴寳聖朝之奇璞也楊方為虞領軍薦張道順文曰盖聞驪龍之珠必沈紫泉之裏垂天之翼必翔青冥之表竊見處士呉國張道順天挺珪璋明逹清秀下筆掩彫龍之文發言吐談天之藻慕西道之陽生希北巷之顔回若得清水淬其鋒越砥礪其鍔必騰躍天路出觀聖世琴操曰史魚者衛靈公之相時蘧伯玉執清亷之節修仁義之方史魚乃薦伯玉於靈公公曰諾其後未用史魚入曰臣聞抱玉朝君不如貢賢夫國危者則思仁思安者則急賢公何嫌疑靈公謂史魚以庭褒虛飾良久乃應之史魚出謂其子曰我薦伯玉於公公以我言為不信将自殺以明之我死後勿歛用伯玉乃歛語畢進藥自殺靈公聞之曰痛哉寡人謂史魚徒謙退欲進士者也不意乃至於身死臨喪拜伯玉代史魚公泣曰寡人負史魚悔無及矣太平御覽卷六百三十二
