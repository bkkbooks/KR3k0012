body:
  text: 太平御覽卷三百四十宋李昉等撰兵部七十一常旂旃物旗旟旐旞旌常釋名曰九旗之名日月為常畫日月於其端天子所建言常明也尚書曰惟乃祖乃父世篤忠貞服勞王家厥有成績紀于太常周禮曰日月為常十二旒河圗曰風后曰予告汝帝之五旗東方法青龍曰旗南方法赤鳥曰旐西方法白虎曰旟北方法𤣥蛇曰旂中央法黄龍曰常國語曰吳王㑹晋於潢池吳王白常白旂赤常赤旂文選曰建辰旒之太常又曰建太常􅀆裶裶旂釋名曰交龍為旂竒也畵作兩龍相依倚也通以一赤色為之旡文采諸侯所建也爾雅曰有鈴曰旂郭璞注曰懸鈴竿頭畵交龍旂旒詩曰王錫韓侯淑旂綏章龍旂陽陽和鈴央央又曰旂旐央央禮記月令曰天子春載青旂夏載赤旂秋載白旂冬載𤣥旂周禮曰交龍為九旂諸侯所建左傳曰周分魯大路大旂又曰三辰旂旗昭其明也三辰日月星也旃釋名曰旃戰也戰戰恭巳而已三孤所建象旡事也説文曰旃曲柄也所以招士衆也世本曰黄帝作旃爾雅曰因章曰旃郭璞曰以白絹為之不畵也周禮曰通帛為旃大赤周正赤旡所飾孤所建也左傳曰城濮之戰亡大斾之左旃旃旗名擊旐曰旃祁瞞奸命當此之事而不治為事令也司馬殺之以狥于諸侯漢書曰田蚡音憤前堂羅鍾鼔立曲旃如淳曰通白為旃蘇林曰柄上曲也孟子曰招庶人以旃西京賦曰虹旃蜺旄又曰樹修旃羽獵賦曰立厯天之旗曳捎星之旃物釋名曰雜帛為物以雜色綴其邊為翅尾也將帥之所建也禮含文嘉曰物以色應其名也物以類應其方也左傳曰蒍敖為宰擇楚之令典軍行右轅左追蓐古者行軍右為軍備左者追草為宿備前茅慮無如今斥堠持綘及白旛見騎賊舉綘旛見歩賊舉白旛備不虞有無茅明也或云楚以茅為旌旗也中權後勁中軍制謀後以精兵為殿也百官象物而動軍政不戒而備能用典矣旗釋名曰熊虎為旗期也將軍所建象其猛如熊虎與衆期其下也禮記曰龍旂九旒天子之旌也又曰行前朱鳥而後𤣥武左青龍而右白虎招揺在上急繕其怒注曰以此四獸為軍陣象天也畵揺招星于旌旗上以起居堅勁軍之威怒周禮曰司常掌九旗之物名各有屬以待國事日月為常交龍為旂通帛為旃雜帛為物熊虎為旗鳥隼為旟龜蛇為旐全羽為旞析羽為旌物各有所畵異物亦異名也又曰龍旂九斿以象大火也交龍為旗諸侯所建也大火蒼龍宿之心也其屬箕尾九星也鳥旟七斿以象鶉火也鳥隼為旟州里之所建也鶉火朱鳥宿之栁也其屬有七星也熊旗六斿以象參伐也熊虎為旗師都之所建也伐屬白虎宿與參連體而六星也龜蛇四斿以象營室也龜蛇為旐縣鄙之所建營室𤣥武宿也與東壁連體而四星也弧旌枉矢以象弧也覲禮曰侯氏載龍旂弧韣則旌旗之屬皆有弧弧以張弦為幅有衣謂之韣又為設矢象弧星有矢象妖有枉矢枉矢者蛇形有尾由此云枉矢蓋畫之也左傳曰均服振振取虢之旗又曰三辰旂旗昭其明也又曰狄人伐衛衛懿公戰于滎澤衛師敗績滅衛衛侯不去旗是以甚敗又曰越伐吳王孫彌庸見姑蔑之旗曰吾父之旗也不可以見讎而勿殺又曰鄭人擊簡子中簡子之肩斃于車中獲其蠭旗蠭旗旗名又曰公孫尨以徒五百人宵攻鄭師取蠭旗於子姚之幕下又曰鄭伐許潁考叔取鄭伯之旗蝥弧以先登子都自下射之顛史記曰李斯上書云今陛下建翠鳳之旗樹靈鼉之鼓漢書郊祀志曰武帝將伐南越以牡荆畫幡日月北斗登龍以象太一東觀漢記曰耿弇追張歩歩奔平夀乃肉袒負斧鑕於軍門而弇勒兵入據其城樹十二郡旗鼓令歩兵各以郡人詣旗下衆向十餘萬輜重七千餘皆罷遣歸鄉里沈約宋書輿服志曰五旗者五色各一旗以木牛豕承下蓋取負重而安稳也五旗纒竿即禮記徳車結旌不畫飾也戎事乃散之又武車綏旌垂舒之也北史曰盧賁嘗事隋文及受禪命賁清宫因典宿衛賁乃奏改周代旗幟更用嘉名其青龍騶虞朱雀𤣥武千秋萬嵗之旗皆賁所創也隋書曰凡旗太常畫三辰日月五星旂畫青龍皇帝升龍諸侯交龍旟畫朱鳥旌畫黄麟旗畫白獸旐畫𤣥武皆加雲氣其旜物在軍亦畫其事號加之以雲氣徽幟如之通帛為旜雜帛為物在軍亦畫其人官與姓名之事號徽幟亦畫之隨其所事也旌節又畫白獸而析羽於其上又曰司常掌旗物之藏通帛之旗六以供郊丘之祀一曰蒼旗二曰青旗三曰朱旗四曰黄旗五曰白旗六曰𤣥旗畫繢之旗六以充玉路之等一曰三辰之常二曰青龍之旗三曰朱鳥之旃四曰黄麟之旌五曰白獸之旗六曰𤣥武之旐皆左建旗而右建穆㦸又曰有繼旗四以施軍旅一曰麾以供軍將二曰旞以供師帥三曰旐以供旅帥四曰斾以供卒長唐書曰元和中淮南節度使馬總進吳元濟旌旗七百三十九事家語曰子路言志云願將旌旗繽紛下蟠于地詩推度災曰上出號令而化天下震雷起而驚蟄睹旗鼓動而三軍駭觀其前動化而天情可見矣戰國䇿曰建七星之旗天子之位也穆天子傳曰日月之旗七星之文今旒上畫日月及北斗星也周遷車服雜記曰晋元皇始制五牛之旗設青在左黄在中六韜曰武王伐紂懸紂之首於白旗古司馬軍法曰夏后氏𤣥首人之埶也殷曰白天之義也周曰黄地之道也旌首有旍曰旂三王所以立不失天地人之道也章夏后氏以日月上明也殷以虎上威也周以龍上文也郝萌占曰旗上有光人主大喜延年益夀黄公三畧曰欲敵形色可勝之符先戰以二十八騎角人青衣赤旗東方七人徵人赤衣黄旗南方七人商人白衣黑旗西方七人羽人黑衣青旗北方七人凡二十八騎象二十八宿軍令曰聞雷鼓音舉白幢綘旗大小船皆進戰不進者斬聞金音舉青旗船皆止不止者斬王孫子曰桀紂或放南巢或頭懸赤旗斯無他不節財而暴人也孫子曰言不相聞故為簧鐸視不相見故為旌旗夫金鼓旌旗所以一民之耳目也又曰無要正正之旗無擊堂堂之陣列子曰黄帝與炎帝戰以雕鶡鷹鳶為旗幟隋巢子曰天賜武王黄鳥之旗以伐殷淮南子曰凡國有難君自宫召將詔之曰社稷之命在將軍身今國有難願子將而應之將軍受命乃令祝史大小齊三日太廟鑚靈龜卜吉日以受旗鼓楚辭曰駕龍輈兮乘雷輈車轅也載雲旗兮逶迤又曰乗廻風兮載雲旗又曰揚彗星以為旗又曰乗赤豹兮從文貍辛夷車兮結桂旗宋玉髙唐賦曰晰兮若妖姬揚袂鄣日而望所思忽兮若駕駟馬建羽旗相如上林賦曰靡魚須之橈旃以魚須為旃柄驅馳逐戰也曳明月之珠旗以明珠綴飾旃王沉餞行賦曰曳招揺之修旗若蜿虹之垂天崔駰東廵頌曰升九龍之華旗文選曰雲旗拂霓又曰牙旗繽紛又曰旌旗拂天又曰揭竿為旗又曰曳彗星之飛旗又曰朱旗所拂九土披攘又曰朱旗綘天又曰建祝姑祝姑旗名又曰青霞雜桂旗旟釋名曰鳥隼為旟旟譽也軍吏所建也急疾趨事則有稱譽也爾雅曰錯革鳥曰旟郭璞注曰此謂全剥鳥皮毛置之竿頭也舊説刻革鳥置竿首也孫叔敖云革急也言畫急疾之鳥於旒也周官鳥隼為旟也按禮記鄭𤣥云載之以示衆詩云如鳥斯革今載鳴鳶即此類也自是鳥皮明矣詩曰孑孑干旟在浚之都又曰彼旟旐斯胡不斾斾斾䟽垂也周禮曰鳥隼為旟州里所建也州長之屬旐釋名曰龜蛇為旐兆也龜知氣兆之吉凶建之扵後察度事宜之形兆也爾雅曰續廣充幅長尋曰旐郭璞註曰如今幅長八尺者也詩曰設此旐矣又曰建旐設旄搏獸于敖周宣王也周禮曰龜蛇為旐四斿縣鄙之所建也旞釋名曰全羽為旞旞猶云偃也順滑貌也説文曰旞者𨗳車所載全羽允允而進也周禮曰全羽為旞𨗳車所進車象路也王以朝夕旡出入也旌釋名曰析羽為旌旌精光也綏有虞氏之旌也注旄竿首其形絫絫然也纕夏后氏旌也其貌襄襄也白斾殷旌也以帛繼旐末也翽陶也其貌陶陶下出也爾雅曰旄首曰旌郭璞註曰戴旌下竿頭如今之幢赤青旄也廣雅曰天子之旌髙九仞諸侯七仞大夫五仞士三仞詩曰孑孑干旌在浚之城又曰悠悠斾旌禮記曰前有水則載青旌鄭𤣥注曰載謂所舉旌首所以警衆者也鄭記王賛問曰舉旌於首曾皆以皮􅀞之耶鄭荅曰盖皆置皮於其首不􅀞羽為旌也周禮曰析羽為旌游車所建游車木路也王以田也全羽析羽皆五色文也又曰掌舍為帷官設旌門樹旌以門表左傳曰鄢陵之役欒鍼見子重之旌謂晉侯曰楚人謂夫旌子重之旌也又曰范宣子假羽毛於齊而弗歸析羽為旌王者游車所建齊私有之謂之羽毛又曰楚靈王之為令尹也為王旌竿尹無宇斷之曰一國兩君其誰堪之又曰衛宣公烝夷姜宣姜與朔搆急子公使諸齊使盗待諸隘而殺之夀子載其旗旌以先盗殺之急子後徃盗又殺焉又曰許伯曰吾聞致師者御靡旌摩壘而還靡旌驅疾也摩近也公羊曰楚莊王伐鄭鄭伯肉袒左執茅旌右執鸞刀以逆何休曰茅旌宗廟所用也為宗廟所用求以宗廟歸首也史記曰秦并天下以水徳之始旌旄節皆尚黑漢書文帝詔曰朝有進善之旌應劭注堯設五達之道令人進善也又曰髙祖使韓信與楚戰信潜伏人於楚軍之側既戰兵遂偽走楚逐之乃令軍拔楚旌立漢旌楚師望見奔走遂敗楚後漢書曰世祖進師臨河連旌㳂河十餘里戰國䇿曰蘇秦為趙合從扵楚威王曰寡人西接秦秦虎狼之國卧不安席食不甘味心揺揺然如懸旌漢武故事曰欒大有方術常扵殿前樹旌數百具因令自相擊庭中去地十餘丈觀者大駭孟子曰齊景公招虞人以旌不至將殺之非其招也夫招虞人以皮冠庶人以旃士以旂大夫以旌况以不賢人之招招賢人乎管子曰舜有告善之旌示不蔽也莊子曰楚昭王使延屠羊説以三旌之位萬鍾之禄也抱朴子曰軍術軍始出而旌旗繞竿者急住更待善時而出軍天文要集曰翼星明旌旗用趙氏兵書曰有鳥集將軍旌上將軍増秩禄文選曰蔽引當旌又曰旌旗拂天又曰蜺為旌翠為蓋又曰蓀橈兮蘭旌蓀蘇昆切橈音饒又曰建虹旌兮威夷太平御覽卷三百四十
