body:
  text: 太平御覽卷四百五十七宋李昉等撰人事部九十八諫諍七白虎通曰諫間也更也是非相間革更其行也又曰闚諫者禮也視君顔色不悅且却悅者復前以禮進退之又曰士不得諫者士賤不得豫政諫及之得因盡其禮傳曰大夫進諫士傳民語妻得諫夫者夫妻一體榮辱共之詩曰相䑕有皮人而無儀人而無儀不死胡為此妻諫夫之詩子諫父父不從不得去者父子一體無相離之性猶火去木而滅劉向新序曰魯哀公為室而大公儀子諫哀公毁室而止又曰莊辛諫楚襄王曰君王左州侯右夏侯從新安君與夀陵君同軒淫衍侈靡而亡國政郢其危矣王曰先生者惽歟妄為楚國祓歟對曰臣非敢為楚祓誠見之也不出十月十月王果亡失江漢鄢郢之地新序曰楚王亡失江漢鄢郢之地乃使召莊辛辛曰庻人有稱曰亡羊而補牢不為遲見兔而呼狗不為晩湯武以百里王桀紂以天下亡今國雖小絶長繼短以千里數且君王獨不見夫青蛉乎六足四翼蜚翔乎天地之間求蚊䖟而食之待甘露而飲之自以為無患不知五尺童子以竹竿加之乎四仞之上而下為蟲蟻食青蛉猶其小者黄雀俛啄白粒仰棲茂樹鼓其翼奮其翅自以為無患與民無爭不知公子王孫左抱彈右攝丸晝遊乎茂樹而夕和乎酸鹹黄雀猶其小者鴻鵠嬉游乎江湖修其六翮一舉千里自以為無患與民無爭不知弋者撰其弓矢修其防翳故朝遊乎江湖而暮調乎鼎爼鴻鵠猶其小者蔡侯之事又是也蔡侯南遊乎髙陵北經乎巫山嬉遊乎商蔡之囿不以國家為事不知子發受命靈王繼以朱絲也蔡侯之事猶其小者今君王之事又是也君王左州侯右夏侯從新安君與夀陵君滛行康樂遊娯馳騁不知穰侯方與秦王謀投之乎黽塞之外襄王大懼形體掉慄曰謹受令乃封辛為成陵君而用計焉戰國策文亦同又曰趙簡子上羊腸之坂羣臣皆偏􅃝推車而虎噲獨擔㦸行歌不推車簡子曰寡人上坂羣臣皆推車噲擔㦸行歌不推車噲為人臣而侮其主者其罪何若對曰為人臣侮其主者死又曰身死妻子為戮君既已聞為人臣侮其主之罪君亦聞為人君侮其臣者乎簡子曰為人君而侮其臣者如何對曰為人君侮其臣智者不為謀辯者不為使勇者不為鬭夫智者不為謀則社稷危辯者不為使則指事不通勇者不鬭則邊境侵三者不使則君難保簡子曰善乃罷羣臣推車以為上大夫舉酒飲羣臣以虎噲為上客又曰楚人有獻魚於楚王者曰今日魚獲食之不盡賣之不售棄之又惜故來獻之左右曰鄙哉辭也楚王曰不知漁者仁人也蓋聞囤倉粟餘者國有餓死民後宫多幽女者下多曠夫餘衍之蓄衆府庫者境内多貧困之民皆失君人之道漁者知之以此諭寡人也於是乃遣使恤寡而存孤獨出倉粟發幣帛而賙賑不足罷出後宫不御者出以妻鰥夫楚民大悅隣國歸之故漁者獻魚而楚國賴之又曰魏文侯與士大夫坐問曰寡人何如君羣臣皆曰仁君也次至翟璜曰君非仁君曰子何以言之對曰君伐中山不封君之弟而封君之長子臣以知君非仁君也文侯怒而逐翟璜璜趨而出次至任座文侯問寡人何如君也任坐對曰仁君也臣聞之其君仁者其臣直聞翟璜之言直臣是以知君仁也文侯曰善復召翟璜各納木新序曰魏文侯曰吾一見箕季而得四焉其墻壊而不築吾問何不築對曰不時是教我不奪農工其墻枉而不端吾問何不端對曰然是教我無侵封疆也從者食其桃箕季禁之豈愛桃哉是教我下無犯上也食我糟飡之食𤓰瓠之美豈不具五味教我無多歛於百姓以省飲食之養也王孫子新書曰楚莊王攻宋將軍子重諫曰今君厨肉臭而不可食罇酒敗而不可飲而三軍之士皆有饑色欲以勝敵不亦難乎莊王曰請有酒投之水有食饋之賢行軍中之有饑色者加五倍之賜又曰衛靈公座重華之臺侍御數百隨珠照日羅衣從風仲叔敖入諫曰昔桀而行亡今四境内侵諸侯加兵土地日削百姓乖離今君王寵無乃太盛歟靈公再拜曰寡人過矣㣲子之言社稷傾於是出宫女之不進者數百人百姓大悅莊子曰趙簡子出田鄭龍為右有一野人簡子曰龍下射彼使無驚吾馬三命鄭龍鄭龍不得對簡子怒鄭龍曰昔踐土之民不戮一人虎狼殺人固將救之簡子還車輟田曰今吾田也得士又曰梁君出獵見白鴈羣集梁君下車彀弓欲射之道有行者白鴈羣駭梁公怒欲殺行者其御公孫龍下車撫其心梁君忿然作色而怒曰龍不欲其君而顧與他人何也公孫龍對曰昔者齊景公之時天旱三年卜之曰必以人祠乃雨景公下堂頓首曰吾所以求雨者為民也今必使吾以人祠乃且雨寡人將自當之言未卒而天大雨方千里何為有徳於天而惠施民也今主君以白鴈之故而欲殺人無異於虎狼梁君援手與上車歸入郭門呼萬嵗曰樂哉今日也人獵皆禽獸吾獵獨得善言而歸又曰齊桓公讀書堂上輪扁斵輪堂下釋椎鑿而上問桓公曰敢問公之所讀者何言耶公曰聖人之言也曰聖人在乎公曰死矣然則君之讀者古人之糟粕也列子曰晉文公出欲㑹伐衛公子鉏仰而笑公問何笑曰笑臣隣之人也臣之隣人有送其妻適家者道見柔婦悦而有言然顧視其妻亦有招之者矣竊笑此也公悟其言乃止引師還未至而伐其北鄙者至矣見君火韓子曰衛靈公之時彌子瑕有寵專於衛國侏儒有見公者曰臣之夣踐矣公曰奚夣曰見竈為見公也公怒曰吾聞夣見人曰奚為見竈對曰夫人君兼照曰一國一人不能壅故將見主人而夣見竈夫竈一人煬焉則後人不能見矣今者一人煬君乎則臣雖夣見竈不亦可乎公曰善遂去癰疽退子瑕而用司空狗臺甲孔叢子曰陳恵侯大城因起陵陽之䑓未終而坐法死者數十人欲坑三監吏殺之夫子適見陳侯與登臺而觀焉夫子曰美哉斯臺自古聖王之為城臺未有不戮一人而能致功若此者也陳侯黙然而退遽竊赦所坑吏既而見夫子問曰昔周作靈臺亦戮人乎答曰文王之興附者六州六州之衆各以子道來故區區之臺未及期日而已成矣何戮之有乎夫以少少之衆能立大大之功惟君爾又曰齊王行車裂之刑羣臣諫争之弗聽子髙見齊王曰車裂之刑無道之刑而君用之臣竊以為下吏之過也齊王曰謹聞命遂除車裂又曰智伯欲伐􅄷由而道難不通乃鑄大鍾遺􅄷由􅄷由君悦除道將内之章晏謂曰不可此小之所以事大而今大以事小卒必隨之不可内不聽遂内之㬅丈因以㫁轂而馳至齊十月而􅄷由亡又曰秦繆公以女樂二八與良宰遺戎王戎王喜迷惑大亂由余驟諫而不聽因怒而歸繆公也諫木孔叢子曰趙簡子曰厥也愛我鐸也不愛我厥諫我必於無人之所鐸之諫我也喜質我於人中必使我愧尹鐸對曰厥愛君之愧也而不愛君之過也鐸也愛君之過而不憂君之愧也此簡子之賢也人主賢則人臣之言直又曰越饑請食於呉子胥諫曰不可與也夫呉之與越􅄷讎之國非呉喪越越必喪呉若燕秦齊晉山處陸居豈能踰五湖九江越十地以有呉哉今將輸之粟是長􅄷讎財匱民怨悔無及也殺諫庚符子曰龍逢進諫桀曰臣嘗觀君之冕非其冕也而冕危石君之履非其履也而履春冰未有冠危石而不壓踰春冰而不䧟者也桀乃笑而應之曰子且就炮烙之刑龍逢布武而趨赴火而死桓氏要論曰易曰王臣蹇蹇𫝊曰諤諤者昌變人之情抑人之欲咈人之耳逆人之意不爾不為諫也楚漢春秋曰惠帝崩吕太后欲為髙墳使從未央宫而見之諸將諫不許東陽侯垂泣曰陛下見惠帝冢悲哀流涕無已是傷生也臣竊哀之太后乃止汝南先賢傳曰郭憲字子横建武中為光禄勲車駕西征隗囂諫曰天下初定車駕未可動憲乃當車㧞佩刀以斷車靷帝不從遂上隴其後潁川兵起乃廻駕而還帝歎曰恨不用光禄之言也又曰郭憲字子横學貫祕奥師事東海王仲子王莽為大司馬權貴傾朝莽召仲子欲令為兒講仲子聞即褰裳欲往憲曰今君位為博士如何輕身賤道禮有來學無往教之義不宜輕道也於是仲子晏乃往莽問君來何遲仲子具以憲言答之莽隂竒焉又曰劉璋遣法正迎先主劉巴諫曰不可内也既入巴復諫曰若使之討張魯是放虎於山林也璋不聽巴閉門稱疾及攻成都令軍中其有害巴者誅及三族及得甚喜又曰時匈奴數犯塞帝患之乃召百僚廷議時郭憲以為天下疲弊不冝動衆諫諍不合乃伏稱眩瞀不復言帝令兩郎扶下殿憲亦不拜又曰薛勤字子㤗定逺侯班始尚公主主遇姑慠慢無婦禮姑殺主詔書怒欲滅其家勤建議抗志不顧遂奏上施行其立朝盡忠類皆如此又楚國先賢𫝊曰楊顒字子昭襄陽人為蜀丞相主簿諸葛亮每自校簿書顒直入諫曰為治有體不可相侵請為明公作家以喻之今有人使奴執耕稼婢典炊爨鷄主司晨狗主吠盗牛負重載馬渉逺路私業無曠所求皆足雍容髙拱飲食而已矣忽一旦損棄欲以身親其役為此碎務形疲神困終無一成豈智不如奴婢鷄犬哉失家之法耳是以古人稱坐而論道謂之三公作而行之謂之士大夫明公為治乃躬自校簿流汗竟日不亦勞乎亮謝鍾離意别傳曰明帝作北宫意諫曰昔湯遭旱以六事自責曰政不節耶使民疾耶宫室崇耶女謁盛耶讒說昌耶苞苴盈耶夫宫室廣大所以驚耳極觀非所以崇徳治平宣化海内東方朔别𫝊曰孝武皇帝時人有殺上林鹿者武帝大怒下有司殺之羣臣皆相阿殺人主鹿大不敬當死東方朔時在旁曰是人罪當死者三使陛下以鹿之故殺人一當死使天下聞之皆以陛下重鹿賤人二當死也匈奴即有急推鹿觸之三當死也武帝黙然遂釋殺鹿者之罪邵氏家傳曰邵信字孝信為執法都尉呉王嘗因迎春便道遊獵信從行露板諫曰今元正御節是萬物萌育之始豈可亡温養之徳而為逆害之道乎呉主省板即為廻駕虞溥江表𫝊曰孫權以鄭衆為郎中嘗與之言卿好於衆中而諫或失禮敬寧不畏龍鱗乎對曰君明臣直朝廷與下無諱實恃洪恩不畏龍鱗諌木顧子曰昔梁丘據之諫景公也於房而晏子之諫景公也於朝然晏之忠著於竹素梁丘之佞于今不絶亦惟公平正直者聖之所先矣宫殿甲漢書揚雄甘泉賦曰甘泉本因秦離宫既奢泰而武帝復増通天髙光迎風宫且其為巳久矣非成帝所造欲諫則非時欲黙則不能巳故遂推而隆之乃上比於帝室紫宫若曰此非人力之所為儻鬼神可也何晏表諫魏齊王曰臣晏言臣聞善為國者必先治其身慎其所習季末闇主不知損益亂生近昵譬之柱䑕崔駰與竇憲牋曰主簿崔駰言今旦漢陽太守稜吏卒數十人皆臂鷹牽狗陳於道側云欲上幕府駰聞傳曰禽獸之皮不足以備噐用其肉不可以將獻養則公不舉焉禮公侯非兕靡射且以服猛為民除害因以登臨噐械也故晉唐叔射兕於徒林以為大甲夫鷹犬所獲不過雉兎而有歴險阻之難斯乃細人匹夫之事非王公大人所為要資也崔駰與竇憲牋曰駰幸得充下舘序在衆賢後塵是以竭其惓惓敢進一言閻纂理愍懐太子表曰臣備近職雖未能自㓗天日請因閽守悾悾之職王景興與鍾元常書諫其室人大歸事曰朗白近聞室人孫氏歸或曰大歸也共經憂樂既久矣曷為一旦離析以至於歸而不反乎不得面談裁書叙心祖台之與王荆州書曰君頃復飲否古人以酒為誡通人徃徃累於此君受重任憂深責大至於酒事一條目下先急僕請以諫願君屛爵棄巵焚罍毁榼殛儀狄於羽山放杜康於三危流王武於幽都拘谷陽於崇山四罪既除道自康矣楚辭曰七諫者東方朔之所作也諫正也陳法度以正君也太平御覽卷四百五十七
