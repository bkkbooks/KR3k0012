body:
  text: 太平御覧卷四百五宋李昉等撰人事部四十六賔客尚書大傳曰舜為賔客禹為主人于時卿雲聚俊乂集百工相和而歌卿雲尚書洪範曰三八政七曰賔禮賔客無不敬周禮天官上曰太宰之職以八統詔王八曰禮賔小宰以官府之六聯合邦治二曰賔客之聯事凡朝覲㑹同賔客以牢禮之法掌其牢禮委積又曰膳夫凡王祭祀賔客食則徹王之胙爼又春官大宗伯職曰以饗燕之禮親四方之賔客賔客朝聘者也禮記曲禮曰凡與客入者每門讓於客客至於寢門則主人請入為席然後出迎客客固辭主人肅客而入肅進也進謂導也主人入門而右客入門而左禮記王制曰天子諸侯無事則嵗三田一為乾豆二為賔客左襄二十三年季武子無適子公彌長而愛悼子欲立之訪於臧紇曰飲我酒吾為子立之季氏飲大夫酒臧紇為客為上賓既獻臧孫命北靣重席新樽㓗之召悼子降逆之乂昭元曰趙孟叔孫豹曹大夫如鄭鄭伯兼享之及享具五獻􅇼豆於幕下趙孟辭私於子産曰武請於冡宰矣乃用一獻趙孟為客禮終乃宴又昭六曰㑹于黄父謀王室也王室有子朝亂謀定之趙簡子令輸王粟具戍人明年將納王納王於王城也宋樂大心曰我不輸粟我於周為客二王後為賔客若之何使客史記曰孟嘗君名文姓田氏父曰靖郭君田嬰使主家待賔客賔客日進名聲聞於諸侯嬰卒文代立是為孟嘗君孟嘗君在薛招致賔客以故傾天下之士食客數千人無貴賤一與文等孟嘗君待客坐語而屏風後嘗有侍史主記君所與客語問親戚居處客去孟嘗君已使使存問獻遺其親戚孟嘗君曾侍客夜食有一人蔽火光客怒以飯不等輟食辭去孟嘗君起自持其飯比之客慙自刎士以此多歸孟嘗君客無所擇皆善遇之人人各自以爲孟嘗君親已又曰平原君趙勝者趙之諸公子也諸子中勝最賢喜賔客賔客盍至者數千人又曰魏公子無忌者魏昭王少子安釐王異母弟也公子爲人仁而下士士無賢不肖皆謙而禮交之士以此方數千里爭徃歸之致食客三千人當是時諸侯以公子賢多客不敢加兵謀魏十餘年又曰春申君者楚人也名歇姓黄氏考烈王元年以黄歇爲相是時齊有孟嘗趙有平原魏有信陵方爭下士招至賔客以相傾奪輔國權是時楚復疆趙平原君使人於春申君春申君舍之於上舍趙使欲誇楚爲瑇瑁簮刀劒室以珠玉餙之請命春申君客春申君客三千餘人其上客皆攝珠履以見趙使趙使大慚又曰呂不韋陽翟大賈人也秦太子政立爲王尊不韋爲相國是時魏有信陵君楚有春申君趙有平原君齊有孟嘗君皆下士喜賔客以相傾不韋以秦之强羞不如亦招致士厚遇之至食客三千人是時諸侯多辨士如荀卿之徒著書布天下不韋乃使其客人人著所聞集論曰吕氏春秋又曰單父人吕公善沛令避仇從之客因家沛焉沛中豪傑吏聞令有客皆徃賀蕭何爲主吏孟康曰主吏功曹也主進文頴曰主斂禮進諸大夫曰不滿千金坐之堂下髙祖爲亭長素易諸吏乃紿爲謁曰賀錢萬貫不持一錢又曰司馬相如字長卿素與臨卭令王吉善吉曰長卿久客旅遊不遂可来過我舍於是相如後徃臨卭中富人卓王孫程鄭相謂曰令有賔客爲具召之戰國䇿曰汗明見春申君候問三月而後得見談卒春申君大説之汗明欲復談春申君曰僕已知先生息矣汗明慨然曰臣請爲説之君之賢實不如堯臣之能不及舜夫以賢舜事聖堯三年而後乃相知也今君一旦而知臣是君聖於堯而臣賢於舜也春申君曰善乃召門吏爲先生著客籍五日一見漢書曰蒯通見曹相國曰婦人有夫死三日而嫁者有幽居守寡不嫁者足下即欲求婦何取曰取不嫁者通曰然則求臣亦猶是也彼東郭先生曰梁石君齊之俊士也隠居不嫁嘗卑節下意以求仕也願足下使人禮之曹相國曰敬受命以爲上客又曰公孫𢎞徒歩數年至宰相封侯於是起客館開東閣以延賢人與叅謀議𢎞身食一肉脫粟之飯故人賔客仰衣食奉禄皆以給之家無所餘其後李蔡與石慶爲丞相相府客館邱墟而已又曰蘇建嘗責大將軍至尊重天下之賢士大夫無稱焉願將軍觀古名將所招選者勉之哉青謝曰自魏其武安之厚賔客天子常切齒彼親附士大夫招賢黜不肖者人主之柄也人臣奉法尊職而已何與招士又曰大將軍既益尊姊爲皇后然汲黯與抗禮或説黯自天子欲群臣下大將軍大將軍尊貴誠重君不可以不拜黯曰夫以大將軍有揖客反不重也大將軍聞愈賢黯大將軍衛青也又曰樓䕶字君卿爲人短小精辯論聽之者皆竦然與谷永俱為五侯上客又曰城都侯王商子邑為大司馬貴重商故人皆敬事邑唯樓䕶自安如舊節邑亦父事之不敢有闕時請召賔客邑居尊下稱賤子上夀坐者百數皆離席伏唯護獨東向正坐又曰鄭當時爲太子舍人每五日洗沐常置驛馬諸郊請謝賔客以夜繼日常恐不遍年少官薄然其知交皆天下名士又曰鄭當時始與汲黯列爲九卿中廢賔客益少當時死家亡餘財先是下邳翟公為廷尉賔客亦填門及廢門外可設雀羅後復為廷尉賔客欲徃翟公大署其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情廼見又曰陳遵嗜酒每大飲賔客滿堂輙闗門取客車轄投井中雖有急終不得去又曰張竦免官以列侯居長安貧無賔客時時好事者從之質疑問事論道經書而已又曰張楷治嚴氏春秋古文尚書門徒常數百人賔客慕之自父黨宿儒皆造門謝承後漢書傅賢遷廷尉賢素亷正自掌法官無私賔客袁山松後漢書曰陳蕃遷豫章在郡不接賔客獨坐一室唯徐孺子来為置對榻去則懸之及徴為尚書令送之者亦不出郭門東觀漢記曰崔瑗愛士好賔客盛修殽膳殫極滋味不問餘産張璠漢記曰孔融拜太中大夫雖居家失勢賔客日滿其門愛才樂士常若不足每歎曰坐上客常滿樽中酒不空吾無憂矣英雄記曰袁紹居雒陽西北陬不妄通賔客非海内知名不得相見魏畧曰𤣥徳屯於樊城諸葛亮入見初以諸生意待之坐集既畢衆賔皆去亮獨留𤣥徳亦不問其所言𤣥徳好毦時適有旄牛尾見與者因而手自結之亮乃進曰明將軍當復有逺志但結眊而已𤣥徳知非常人乃投毦而荅由此知亮乃以上客禮之魏志曰蔡邕貴重朝廷常車騎填巷賔客盈坐聞王粲在門外倒屣迎之蜀志曰簡雍字憲和涿郡人少與先主有舊隨從先主至荆州雍與麋竺孫乾共爲從事中郎常爲談客呉志曰孫權以魯肅諸葛瑾等爲賔客又曰諸葛融每㑹賔合罇促席問衆客所能或有愽奕或有樗蒲投壺於是甘菓繼進清酒徐行融周流觀之終日不厭王隠晉書曰􅄞喜爲太僕厩騶馮陵知其英俊待以賔友之禮以狀表上宋書曰袁粲字景倩陳郡人閒黙寡言善吟諷獨酌園庭以此自適居負南郭時䇿杖獨遊素寡徃來門無雜客文士過見不過一兩人南史曰謝瞻兄晦時爲宋臺右衛權遇已重於彭城還都過家賔客輻湊時聸在家驚駭謂晦曰吾家以逺退爲業汝遂勢傾朝野此豈門户福耶蕭子顯齊書曰謝超宗坐公事免詣東府門自通其日風寒􅃤厲太祖謂四座曰此客至使人不衣自暖矣超宗既坐飲酒數甌辭氣横出太祖對之甚欣㧞爲驃騎諮議及即位轉黄門郎後魏書曰崔道固爲劉義隆諸子叅軍事使向青州募人長史已下皆詣道固道固諸兄逼道固所生母自致酒炙於客前道固驚起接取謂客曰家無人力老親自執劬勞諸客皆知其兄等所作咸起拜謝其母母謂道固曰我不足以報貴賔汝宜答拜諸客皆歎羙三國典畧曰周獲梁俘王褒王充劉㲄懔殷不害等至長安太祖喜曰晉氏平呉之利二陸而已今定楚之功羣賢畢至可謂過之矣乃謂褒及充曰吾即王氏甥也卿等並吾之舅氏當以親戚爲情勿以去鄉分意皆厚禮待引爲賔客尹文子曰康衢長者字僮曰善摶字犬曰善噬賔客不過其門者三年長者怪而問之人以實對於是改之賔客復徃淮南子曰客有見人於孚子者客出孚子曰子之客獨有過望我而笑之是慢也談論而不稱師是叛也交淺而言深是亂也客曰望君而笑是公也談論不稱師是通也交淺而言深是忠也故客一體也或以爲君子或以爲小人從視之異説苑曰魏文侯與大夫飲酒使公乘不仁爲觴政曰飲不釂子曜切者浮以大白文侯飲不釂公乘不仁舉白浮君君視而不應侍者曰不仁退君已醉矣公乘不仁曰前車覆後車誡葢言其危爲人臣者不易爲君亦不易今君已設令令可不行乎君曰善白而飲之以公乘不仁爲上客又曰燕昭王問於郭隗曰寡人地狹民寡齊人削取八城匈奴駈馳樓煩之下以孤之不肖得承宗廟恐亡社稷存之有道乎隗曰帝者之臣其名臣也其實友也覇者之臣其名臣也其實僕也危國之臣其名臣也其實虜也今王将東面目指氣使以求臣則厮役之臣至矣南面聴朝不失揖讓之禮求臣則人臣之臣至矣北面等禮相亢下之以色不乘勢以求臣則朋友之臣至矣西面拘指逡廵而退以求臣則師傅之才至矣王誠欲興道隗請爲天下之士開路於是燕王常置郭隗爲上客三輔決録曰頻陽游殷字季齊初爲郡功曹有童子張旣者時未知名爲郡書佐殷察異之敕旣過家具設賔饌及旣至妻笑曰君甚悖乎張德容童昏小兒何異客哉殷曰卿勿怪乃方伯之器也殷遂與論霸王之事饗訖以子楚託之列士傳曰孟嘗君食客三千人厨有三列上客食肉中客食魚下客食菜齊市中有乞食人馮煖經冬無袴面有饑色願得上厨傳曰漢中楊子拒妻字大英子仲珎有髙名常請客母盛爲供具從忩中窺客罷讓之曰吾視汝所交皆不及已此自損之道也後嵗餘復請賔客皆耆德秀士母觀之喜曰無憂矣華陽國志曰任熈字伯遠開門待賔客朝無少長必有供膳陸績别傳曰孫䇿在吳張紘爲上客共論四海未安當用武治而平之績年少末座遥大聲言曰昔管仲相齊桓公九合諸侯一匡天下不用兵車孔子曰遠人不服修文徳以來之今論者不務道徳之術而唯當用武績雖童䝉竊所未安世說曰孫長樂兄弟就謝公宿言至厖雜大夫在壁後聽之具聞其論謝公明還問劉昨客何似劉荅曰亡兄未有如此賔客謝深有愧色郭子曰桓大司馬病篤桓温字元子也謝公省病謝安字安石也從東門入桓遥矚而歎曰吾門中不乆復見如此客蘇州志曰通賢橋東有吳丞相顧雍宅雍至孟名著四代常居此宅門無雜賓投刺攝齋者不過一時英俊俗說曰謝僕射陶太常詣吳領軍坐乆呉留客作食日己申使婢賣狗供客比得一頓食殆無復氣可語太平御覧卷四百五
