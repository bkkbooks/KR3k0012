body:
  text: 太平御覽卷四十二宋李昉等撰地部七河南宋鄭齊魯諸山砥柱山邙山熊耳山鼓鐘山陸渾山崤山青要山缺門山三塗山女几山白馬山太陰山金門山轘轅山闕塞山牧羊山九山大嵬山桑山半石山天心山少陘山蘭岩山碭山厯山南城山奚公山稽山曹南山嶧山金鄉山瑯琊山龜山徂徠山危山報山尼丘山羽山華不注山長白山黌山陶山巫山魚山穀城山勞山蒙山謝祿山夾山桃山吠狗山砥柱山水經注曰砥柱山名也禹治洪水山陵當水者鑿之故破山以通河河水分流包山而過山見水中若柱然故曰砥柱搜神記曰齊景公渡于江沅之河黿銜左驂沒之衆皆驚惕古冶子於是拔劍從之邪行五里逆之三里至于砥柱之下乃殺黿頭右手挾左驂燕躍鵠踴而出仰天大呼水為通流三百歩觀者皆以為河伯也說文曰鳯鳥出東方君子之國過崐崙飯飲砥柱濯羽弱水暮宿風光邙山説文曰邙洛陽北土山上邑也十道志曰邙山在洛陽縣四十里元和郡國志曰北邙山是隴山之尾一名平逢山亦名郟山楊龍驤洛陽記曰北山連嶺修亘四百餘里實古今東洛九源之地也又戴延之西征記云邙山西匡東垣阜相屬其下有張母祠即永嘉中此母有神術能愈病故元帝渡江時延聖母於丹陽即此母也今祠存焉續漢書五行志曰靈帝時童謡曰侯非侯王非王千乘萬騎上北邙中平六年獻帝為中常侍叚珪等數人所執公卿百官隨其後到阿上乃得還此非侯非王上北邙也魏畧曰魏文帝獵北邙上時盛夏炎暑行者或中暍鮑勛切諫遂因此罷去魏志曰明帝即位欲平北邙令登臺以觀見孟津廷尉辛毗諫曰天地之性髙髙下下今而反之既非其理加以損費人功民不堪役帝乃止熊耳山河圗括地象曰熊耳山地門也其精上為畢附耳星史記齊桓公曰寡人南伐至郡陵登熊耳山以望江漢東觀漢記曰赤眉初降輦輸鎧甲兵弩積與熊耳山等盛𢎞之荆州記曰南鄭脩縣北有熊耳山山東西各一峯傍竦南北望之若熊耳上多漆下多椶浮豪之水出焉西流注于洛又案山書謂此山上有青丹之樹得而服之成仙西京雜記曰葉似江蘺而紅綠色又有丹青樹葉一青一赤望之如繡長安謂之丹青樹是也鼔鐘山山海經曰鼔鐘之山帝臺之所以觴百神者也有草焉方莖而黄華圓葉而三成其名曰鳥酖可以為毒也今名鐘山在陸渾縣西南三十里陸渾山山海經曰陸渾山伊水出焉今亦號方山漢末隠士潁川胡昭隠居山中有石城逺望之有金壇玉匱晶然間出尤好竹木泉石時有野人居之長生不死春秋時遷陸渾之戎意其遺類崤山元和郡縣志曰二崤山在今澠池縣西北一名崤嶺也左傳謂秦將襲晉蹇叔哭送謂收子骨後漢末建安中曹公西討巴漢惡其險而更開北山道路多從之便又有石銘云晉太康三年𢎞農太守梁柳脩復舊道西征記曰崤山上不得鳴鼔角鳴則風雨忽至自東崤至西崤三十里東崤長坂數里峻阜絶澗車不得方軌西崤全是石坂十二里險絶不異東崤傳曰杞子自鄭使告于秦曰鄭人使我掌北門之管若潜師以來國可得也穆公召孟明西乞白乙使出師於東門之外蹇叔之子與師哭而送之曰晉人禦師必於崤崤有二陵焉其南陵夏后臯之墓也其北陵文王之所避風雨也必死是間余收爾骨焉漢書曰景帝三年吳楚反以周亞夫為太尉擊吳楚亞夫發至㶚上趙渉遮説亞夫曰吳王素富懐輯死士久矣此知將軍且行必置間人於崤澠阨陿之間將軍何不從此右去走藍田出武關抵雒陽間不過差一二日直入武庫擊金鳴鼔諸侯聞之以為將軍從天而下也太尉如其計至雒陽使吏搜崤澠間果得吳伏兵三輔舊事曰鄧禹敗於潼關後大破赤眉於崤青要山山海經曰青要山實惟帝之密都畛水出焉有草黄華赤實服之美人色水經注云强山東阜即騩山有美􅀥焉十道志曰青要山又名强山缺門山水經注曰缺門山山阜之不相接者一里故得名二壁争髙升聳相亂是也三塗山地里志曰三塗山在陸渾縣南左傳謂四嶽三塗九州之險或曰三塗者伊闕大谷轘轅三道是也女几山元和郡縣志曰女几山在福昌縣西南三十四里山海經曰女几山上多玉下多金其獸即豹麋麝禽多鷮翟鳩白馬山十道志曰白馬山水經注云溪水出宜陽白馬山山上有大石厥狀似馬故溪澗以物色受名焉滑州白馬山門山圗云白馬羣行山上悲鳴則河决馳走則山崩謂此山也西征記云山有神白馬故名焉太陰山十道志曰太陰山左傳謂晉梁丙陰趯率戎伐頴又云蠻子赤奔晉之陰也且自雒以東至陸渾謂此山也金門山阮籍宜陽記曰金山之竹堪笙管楊泉物理論云宜陽金山竹為律管河内葭莩為灰可以調氣水經注曰金門溪出金山也戴氏西征記曰宜陽縣地名金門塢轘轅山十道志曰轘轅山在緱氏縣之東南左傳曰欒盈過周王使候出諸轘轅是也按轘轅道有十二曲今置關焉薛綜注東京賦云轘轅坂十二曲道將去復還故曰轘轅闕塞山洛陽記曰闕塞山在河南縣左傳晉趙鞅納王使汝寛守闕塞伏虔謂南山伊闕是也杜預云洛西南闕口也俗名龍門是也牧羊山陽城記曰牧羊山在陽城東八十里下有九十六泉即滄河之上源也父老云昔有一神蛟身自山而降下飲泉竭故以為名九山陽城記曰九山在縣南三十五里水經注云相澗水經九泉東仲長子云昔有上者身遊九山之上施心不拘之鄉即此山也山陰有九山廟碑晉永康二年立文曰九山府君者太華元子之稱也大嵬山陽城記曰大嵬山在密縣東南五十里即具茨之山黄帝登具茨之山升於供隄之上受神芝圗於黄蓋童子即此也又名具茨山也又有方山一名浮戲山泥水出焉又有洧水出密縣西南馬嶺山桑山春秋曰鄭大旱使屠擊有事於桑山斬其木不雨子產曰有事於山藝山林也藝養䕶也而斬其木有罪大矣奪之官邑半石山山海經曰半石山其上有草生而秀髙大葉與花皆赤而不實其名嘉榮服者不遷喜怒在緱氏南十五里天心山道書福地志曰天心之山方圓百里形如城四面有門上有石墻長千餘丈山髙谷深多生薇蘅其草有風不偃無風獨揺天心山又名錫義山在豐利縣東六十五里少陘山山海經曰少陘山器難之水出焉舊傳器難之水即索水也少陘山一曰嵩渚山俗名周山去滎陽縣三十五里蘭岩山搜神記曰滎陽縣南有蘭岩山峭㧞千丈常有雙鶴不絶往來神仙傳曰昔有夫婦隠此山數百年化為兩鵠忽一旦有一鵠為人所害其一鵠嵗常哀鳴碭山水經注曰碭縣分水北有碭水碭芒二縣之間山澤深固多懐神智有仙者涓子注主並隠碭山得道漢髙隠之吕后望氣知之即於是處也厯山水經注曰雷澤西南十里許有一小山孤立峻上亭亭嵥峙謂之厯山山北有小阜南屬迤澤之東北有陶墟相傳為舜耕陶所在墟阜聯屬濵帶瓠子河鄭𤣥云山在河東今有舜墓皇甫謐曰或言今濟陰厯山是也與雷澤相比余謂鄭𤣥之言為然河東賦曰登厯山觀而遥望兮聊浮濟河之岩今雷首厯觀厯山西枕大河校之圖緯於是為安南城山後漢書曰鄭𤣥漢末遭黄巾之難客於徐州今孝經序鄭氏所作其序云僕避于南城之山棲遲岩石之下念昔先人餘暇述夫子之志而注孝經蓋康成之孫所作也今西上可二里所有石室焉周廽五丈俗云是康成嘗注孝經處也奚公山楊曄徐州記曰奚公山奚仲造車之所山上軌轍猶存嵇山水經注曰嵇山嵇氏故居也嵇康本姓奚㑹嵇人先人自㑹稽遷于譙之銍縣故為嵇氏取嵇字之義以為姓蓋志本也曹南山十道志曰曹南山曹風所謂薈兮蔚兮南山朝隮是也有泥水出焉即漢書云髙祖即位於泥水之陽今壇存焉泥音沆嶧山書禹貢曰嶧陽孤桐泗濵浮磬鄭𤣥注曰嶧山今在下邳西葛嶧山也詩曰奄有鳬嶧遂荒徐宅鳬宅二山爾雅曰魯國鄒縣有嶧山絶石相積搆屬而成山史記曰始皇二十八年始皇東行郡縣上鄒嶧山立石與魯諸生議刻石頌秦德三代地理書曰秦始皇乘羊傳車登嶧山鄒氏記曰鄒山古之嶧山也孤桐之所植邾文公之所卜下山是鄒縣本是邾國魯穆公改鄒山從邑變故謂鄒山嶧陽猶多桐樹也地理志云嶧山在鄒縣北繹邑之所依名也山東西二十里南北一十三里髙秀獨出積石相臨無土壤石間多孔穴洞洞相通往往有如數間屋處其俗謂之嶧山孔嶧遭亂輙將居人入嶧外冦雖衆無所施害永嘉中太尉郗鍳將鄉曲逃此山胡賊攻守不能得今山南有大嶧名曰郗公山北有絶岩秦始皇觀禮於魯登於嶧山之上命丞相李斯以大篆勒名山嶺名曰畵門詩所謂保有鳬嶧者也金鄉山戴延之西征記曰焦氏北有數山漢司𨽻校尉魯恭穿山得白蛇白兎不葬更葬山南鑿而得金故曰金鄉山山形峻峭塚前有石祠石廟廟四壁皆青石隠起自書契以來忠臣孝子貞婦及孔子弟子七十二人形像像邊皆刻石記之文字分明又有石牀長八尺磨瑩鮮明叩之聲聞甚逺時太尉從事中郎傅珍之諮議參軍周安穆折敗石牀各取之為魯氏之後所訟三人並免官瑯琊山史記曰始皇二十六年滅齊遂登瑯琊山築層臺於上秦皇樂之因留三月是也郡國道記云瑯琊臺在故城東南十里州東南一百七十里臺上有始皇碑碑上有六百字可識餘多剥落臺側有四時祠即齊地八祠之一又云臺上有神泉人或汚之即立竭龜山水經注曰龜山在博縣一十五里昔夫子傷政道之陵遲故望山而懐操故琴操中有龜山操焉山北即龜陰之田也春秋定公十年齊人來歸龜山之田是也徂徠山水經注曰鄒山記云徂徠山在梁甫奉髙博三縣界猶有美松亦曰尤疎之山危山漢書五行志曰哀帝時無鹽危山土自起覆草如馳道狀報山報山石轉立晉灼曰漢注作報山山脅右一枚轉側起立髙九尺六寸旁行一丈廣四寸東平王雲及后謁自之石所祭治石象報山立石祠之三年息夫躬吿之王自殺后謁棄市國除尼丘山水經注曰沂水出魯城東南尼丘山西北山即顏母所祈而生孔丘也山東一十里有顏母廟防山南數里孔子父葬處禮所謂防墓崩者也羽山十道志曰羽潭一名羽池潭東有羽山漢志曰東海郡祝其縣有羽山殛鯀之所郡國志曰鍾離沫城有羽山殛鯀處其水恒清牛羊不飲書曰殛鯀于羽山又曰蒙羽其藝左傳昭公七年鄭子產聘于晉平公有疾韓宣子逆客私焉曰寡君寢疾于今三月矣並走羣望有加而無瘳今夢黄熊入于寢門其何厲鬼也對曰以君之明子為大政其何厲之有昔堯殛鯀于羽山其神化為黄熊入于羽淵實為夏郊三代祀之韓子祀夏郊晋侯乃間華不注山傳曰齊師與晉戰於鞍齊師敗績晉逐之三周華不注山水經注曰華不注山牙桀立孤峰特起青崖發翠同㸃黛焉長白山郡國志曰長白山陳仲子夫妻隠處郭氏述征記曰長白山能興雲雨山西南有太湖山二山並有石室敗赤漆船上有記皆謂之堯時物黌山三齊記略曰鄭𤣥註詩經常棲黌山山有石井不竭猶生細草葉形似韭俗稱鄭公書帶陶山齊地記曰范蠡浮海出齊變姓名自號鴟夷子間行止於陶山因號陶朱公焉後改曰鴟夷山在今平陰縣東巫山又曰巫山一名孝堂山左傳曰齊侯登巫山以望晉師即此山下也山上有石室俗傳云郭巨葬母之所因名孝堂山焉在平陰縣魚山郭延生述異記曰魚山一名吾山瓠子歌所謂也魏熹平中有神女智瓊降弦超室西征記曰魚山臨河神女智瓊與弦超㑹所魏陳思王曹植嘗登此山有終焉之志遂葬其西亦其封圉也按魚山在東阿縣東北穀城山漢書曰穀城山昔張良受黄石公素書謂云山下黄石即吾也穀城山一名黄石山在東阿縣東北勞山伏琛齊記曰不其城南二十里有大勞山小勞山在海側晏謀齊記曰俗云太山自言髙不如東海勞即此也蒙山髙士傳曰老萊子隠於蒙山之陽以葭為蓋蓬為室岐木為牀耆文為蓆衣縕飲水墾山播植楚王親至其門方織畚王去有間其妻擕菜畚挾薪而至問車馬跡之多答曰楚王妻曰可食以酒肉者可加以鞭捶可授以官祿者可隨以鈇鉞先生受人官祿為人所制妾不能為人所制者妻棄畚菜而去也東蒙山在蒙山之東故曰東蒙論語云昔者先王以為東蒙主是社稷之臣也何以伐為謝祿山郡國志曰東海郡有謝祿山按漢書王莽時東海徐宣謝禄等擊王莽時田况大破之曾屯兵於此因名謝祿山在縣西一里夾山地理志曰懐仁縣有夾山左傳齊魯㑹于夾谷即此也在縣西四十里桃山地理志曰桃山華萊山也一名義珠山山上有井不可窺窺者不盈嵗輒死又云山上井有鳥巢於井中此鳥金喙黑色見則大水吠狗山地理志曰吠狗山宋武北伐南燕之時至此山夜聞犬吠明日視之唯見石狗太平御覽卷四十二
