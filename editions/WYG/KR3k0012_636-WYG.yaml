  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_636-1a, image: WYG0898/WYG0898-0684c.png}
body:
  text: 太平御覽卷六百三十六宋李昉等撰刑法部二叙刑下晉書曰楊亮為太傅楊駿參軍時京邑多竊盗駿更欲重其法盗百錢加大辟請官屬㑹議亮曰昔楚江乙母失布以為盗由令尹公若無欲盗將自止何重法為駿慙而止後魏書曰韓麒麟為齊州刺史寛刑罰從事劉普慶説曰明公杖節分憂無所斬戮何以示威答曰人不犯何以戮乎若須立威當以卿始慶慙懼而退梁書曰武帝敦睦九族優惜朝士有犯罪者皆諷臣下屈法申之百姓有罪即按以法其縁坐老㓜不免一人逃亡舉家質作人既窮急奸宄益深後帝親南郊秣陵老人遮帝曰陛下為法急於黎庶緩於權貴非長久之術誠能反是天下幸甚帝銳意儒雅踈簡刑法自公卿大臣咸不以鞠獄留意姦吏招權巧文弄法貨賄成市多致枉濫大率二嵗刑以上嵗至五千人是時居徒作者具五任其無任者著斗械任即保也若疾病權解之後周書曰大象元年詔罷髙祖所約法初髙祖作刑書要制用法嚴重及帝即位以海内初平恐物情未附乃除之隋書曰後周大象元年詔髙祖所立刑書用法深重其一切除之然帝數行肆赦為奸者皆輕犯刑法政令不一下無適從於是又廣刑書要制而更峻其法謂之刑經聖制宿衞之官一日不直罪至削除逃亡者皆死而家口籍没上書字誤者科其罪鞭朴杖皆一百二十為度名曰天杖其後又加至二百四十又作礔礰車以威婦人其決罪人云與杖者即一百二十多打者即二百四十又曰開皇十六年八月詔决死罪者三奏而後行刑唐書曰貞觀五年詔京師諸司奏決死囚雖立五復一日即了未暇審思五奏何益縱有追悔又無所及自今後宜二日中五覆奏下諸州三覆奏又手勅曰比来斷獄多據律文雖情有可矜而不敢違法守文定罪或恐有寃今後門下省覆奏有據法合死而情可矜者宜録状以聞又曰太宗嘗録囚徒憫其將死為之動容謂侍臣曰刑典仍用蓋風化未洽之咎愚人何罪而肆重刑乎更彰朕之不徳也用刑之道當審事理之輕重然後加之以刑罸何不察其本而一槩加誅非所以恤刑重人命也又曰貞觀中制從立春至秋分不得奏決死刑其大祭祀及致齊日朔朢上下弦二十四氣雨未晴夜未明斷屠日月及假日並不得奏決死刑又曰貞觀中制古者行刑君為徹樂減膳今庭無恒設之樂莫知何徹然對食即不啖酒肉自今以後刑人日勿進酒肉内教及太常並宜停教又曰永徽中髙宗謂侍臣曰獄訟繁多皆由刑罰枉濫故禮曰刑者成也一成而不可變末代斷獄之吏皆以苛刻為明是以秦氏網宻秋荼而獲罪者衆今天下無事四海乂安欲與公等共行寛政今日刑罰得無枉濫乎太尉無忌對曰陛下欲致刑網寛平臣下猶不識聖意此法弊已久非止今日若稍存體國即共號癡人意在深文便為能吏所以罪雖合杖必致遣徙理有可生務入於死非憎其人䧟於死刑務取名耳陛下矜而令放法司亦宜固請但陛下喜怒不妄加於人刑罰自然適中髙宗曰卿言之是矣又曰聖歴初天后謂侍臣曰近者朝臣多被周興来俊臣推勘逓相牽引咸自承服國家有法朕豈能違中間疑有枉濫更使近臣就獄親問皆有承引不虛朕不以為疑即可其奏自周興俊臣死後更無聞有反逆者然則已前就􅓍者不有寃濫耶姚元崇對曰自垂拱已後被告身死破家者皆由枉酷自誣而死告者特以為功天下號為羅織甚於漢之黨錮陛下令近臣就獄問者近臣亦不保何敢輒有動揺被問者若翻言懼遭其毒手頼上天降靈聖情發寤誅鋤兇䜿朝廷乂安今日已後臣以㣲軀及一門百口保見在内外官更無反逆者若後徵騐反逆有實臣請受知而不告之罪上大說曰前宰相皆順成其事陷朕為淫刑之主聞卿所說甚合朕心又曰陸象先為益州刺史在官務以寛仁為政司馬韋抱貞言望明公稍行杖罰以立威名不然恐下怠惰無所懼也象先曰為政者理則可矣何必嚴刑樹威損人益己恐非仁恕之道又曰開元三十五年刑部斷獄天下死罪惟有五十八人大理少卿徐㠐上言大理獄院中相傳殺氣太盛鳥雀不棲至是鵲巢具樹於是百僚上表賀以為幾至刑措又曰代宗性仁恕言事者諫曰陛下為政傷於太寛朝典由是不肅上笑而答曰今時運艱難凡人臣事朕者窺少禄利耳今府庫空竭無俸入俾之優足但峻刑科是君上有威無恩朕所不忍行也管子曰夫争强之國先争刑令國之輕重者刑也文子曰道狹然後任智徳薄然後任刑明淺然後任察任智者心亂任刑者上下恐任察者下求善以事其上荘子曰賞罰利害五刑之辟教之末也禮法數度刑名之詳治之末也又曰民為外刑者金與木也為内刑者動與過也宵人之離外刑也金木訊之離内刑也隂陽食之免内外之刑者唯真人能之司馬法曰先王之治從天之道設地之宜乃作五刑以禁民僻乃興甲兵以討不義制瑞節以通使巡狩省方以㑹諸侯考不同正禮月正時歴考不同者正法度齊於天子法度也正禮者上下之禮也月正時歴者月正朔名也時歴時氣正月相應也名文章車服名者爵也文章車服所以顯有徳異尊卑使不踰制度也天子法度不從命為亂常法也比徳逆天之時比敗徳不行也不順時生殺之叙也凡徵師於諸師征之不㑹朝廷聘則劉劉殺也諸侯皆叛不㑹朝廷聘則殺之廢貢職擅稱兵相侵削廢天子之命則黜不從王者法度則征其罪而黜之也改歴史衣服文章易禮變刑則放不奉王法則放之逺方娶同姓以妾為妻變太子専罪大夫擅立關絶降交則幽幽繫慢神省哀奪民之時重稅粟畜貨重則罰暴虐自佚宫室過度官婦過數則削地損爵尹子曰秦穆公明於聴獄斷刑之日揖士大夫曰寡人不敏使民入於刑寡人與有戾焉二三子各據爾官無使民困於刑繆公非樂刑民不得已也此其所以善刑也又曰車輕道近則鞭策不用鞭䇿之所用逺道重任也刑罰也者民之鞭策也商君書曰晉文将欲明刑於是合諸卿大夫於兾宫顛頡後至吏請其罪遂斷顛頡之脊人皆懼曰顛頡之有寵也斷脊以狥而況於我乎乃無犯禁者國大理吕氏春秋曰臯陶作刑韓子曰殷之法灰棄於道者刑子貢以為重問之仲尼仲尼曰灰棄於道者必燔人人必怒怒必鬬鬬則三族殺雖刑之可也又曰楚國法太子不得乗車至第門時天大雨至急召太子庭中有淖太子遂馳至第門廷理以殳擊馬遂敗其駕太子泣請王誅之王乃益廷理爵三級淮南子曰聖人因民之所善而勸善因民之所惡以禁奸故賞一人而天下譽之罰一人而天下畏之故至賞不費至刑不濫孔子誅少正夘而魯國之邪塞子産誅鄧析而鄭國之姦禁又曰趙政晝決獄夜理書趙政秦皇帝也御史冠蓋接於郡縣覆督稽留戍五領以備越築城以守胡然姦邪萌生盗賊羣居事愈煩而亂愈多故法者治之具也而非所以中也又曰子發為上蔡令民有當刑獄斷論定決於令前子發喟然有慘䘏之心罪人以刑而不忘其恩子發楚威王臣也在春秋後自此其後子發得罪於威王而奔於刑者於城下之廬追者至蹀足而怒曰子發親決吾罪而吾怨之㦧於骨體使我得肉而食之子其知厭乎追者皆以為然不索其内果活子發白虎通曰聖人治天下必有刑罰所以助治順天之度也故懸爵賞者示有所勸也設刑罰者明有所懼也傳曰三王肉刑應世立法五刑者五帝之鞭䇿刑所以五何法五行也五帝畫其衣象五行也世本曰伯夷作五刑㑹稽典録曰闞澤字徳潤山隂人也初吕壹姦罪發聞有司窮治奏以大辟或以為宜加焚裂用彰其惡吳王以問澤澤曰盛明之世不宜有此刑遂從之徐幹中論曰政之大綱有二二者何賞罰之謂也君明於賞罰之道則治不難矣賞罰重者不在乎必重而在於必行必行則雖不重而人肅不行則雖重而人怠故先王務賞罰之必行書曰爾無不信朕不食言汝不從誓言予則孥戮汝桓範世要論曰徳多刑少者五帝也刑徳相半者三王也刑多徳少者五霸也純用刑而亡者秦也又曰夫刑辟之作所從来尚矣聖人以治亂人以亡是以古昔帝王莫不詳慎之者以為人命至重一死不生一斷不屬故堯舜之明猶惟刑之恤是以聖人制法設三槐九棘之吏肺石嘉石之訴然猶復三刺僉曰可殺然後殺之罪若有疑即從其輕此蓋詳慎之至也杜恕篤論曰聖人之制刑也非以害民也將以利民也故民從而安之非以陷民也将以導民也故民從而化之斷一人之獄而天下義之是安之也斷一人之獄而天下伏之是化之也當於民心合於道理所斷於民者不行於身公之也君臣正論曰書稱欽哉惟刑之恤又曰宥過無大刑故無小此前王明徳慎罰之意也昔漢文感緹縈之孝遂去肉刑近則太宗視明堂之圖欲寛背罰于公以隂徳救物袁安恥織罪鞠人此前代聖主賢臣欽恤之意也太平御覽卷六百三十六
