front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_269-1a, image: WYG0895/WYG0895-0403a.png}
body:
  text: 太平御覽卷二百六十九宋李昉等撰職官部六十七酷令長縣丞主簿縣尉酷令長漢書曰何並字子㢘為長陵令道不拾遺卭成太后外家王氏貴而侍中王林卿坐法免歸長陵上冢因留飲連日並恐其犯法乃自造門上謁謂林卿曰冢間單外君宜以時歸林卿曰諾林卿素驕慙於賓客林卿既去北渡涇橋令騎奴還至寺門㧞劍剥其建皷並自從吏兵追林卿行數十里林卿迫窘乃令奴冠被其襜䄖自代乘從車騎身變服從間徑馳去㑹日暮追至收縛冠奴奴曰我非侍中奴耳並心知已失林卿乃曰君因自稱奴得脱死耶叱吏斷頭持還縣所剥皷置都亭下署曰故侍中王林卿東觀漢記曰董宣為洛陽令擊持豪强在縣五年七十四卒官詔遣使臨視唯布被覆屍妻子對哭家無餘財上歎曰董宣死乃知貧耳晉書曰何曽孫機為鄒平令性亦矜傲責鄉里謝鯤等拜或誡曰禮敬年爵以徳為主令鯤畏勢懼傷風俗機不以為慙羡為離狐令既驕且恡陵駕人物鄉閭疾之如讐永嘉之末何氏㓕亡無遺焉梁書曰沈瑀為餘姚令富吏鮮衣美服以自彰别瑀怒曰汝等下縣吏何自擬貴人耶悉使著芒履粗布侍立終日足無蹉跌跌加榜棰瑀㣲時常自至此鬻瓦器為富人所辱故因以報焉由是士庶駭怨縣丞史記曰詔捕淮南太子淮南相怒夀春丞留太子建不遣如淳注曰丞主刑獄囚徒故責之漢書曰黄覇為潁川太守務在成就全安長吏許丞老病聾督郵白欲逐之覇曰許丞㢘吏雖老尚能拜起送迎正頗重聴何傷且善助之母失賢者意如淳曰許縣丞也後漢書曰張𤣥字君夏河陽人也少習春秋顔氏兼通數家法建武初舉明經補𢎞農文學遷陳倉縣丞清浄無欲専心經書方其講問乃不食終日及有難者輒為張數家之說令擇從所安諸儒皆伏其多通著録千餘人𤣥初為縣丞嘗以職事對府不知官曹處吏白門下責之時扶風琅琊徐業亦大儒也聞𤣥諸生試引見之與語大驚曰今日相遭真解矇矣遭逢也遂請上堂難問極日吳志曰㑹稽妖賊許昌起於句章自稱陽明皇帝扇動諸縣衆以數萬孫堅以郡司馬募召精勇得千餘人與州郡合討破之刺史臧旻列上功状詔書除堅鹽瀆丞數嵗徙盱眙丞又徙下邳丞又曰孫堅為下邳丞厯佐三縣所在有稱吏民親附鄉里知舊好事少年往來者常數百人堅接撫待養有若子弟也唐書曰武徳元年詔京令五品丞一人七品正六人八品畿令六品丞一人七品正四人八品上縣令六品丞一人八品正四人九品中下縣各有差後改正為尉主簿後漢書曰繆肜字孺公仕縣為主簿時縣令被章見考吏皆畏懼自誣而肜獨證據掠考苦毒至乃體生蟲蛆因轉换五獄踰渉四年令卒以自免又曰寧陽主簿詣闕訴其縣令之枉積六七嵗不省乃復上書曰臣聞陛下為臣父臣為陛下子臣章百上終不見省臣豈可北詣單于以告寃乎帝大怒尚書劾以大逆虞詡駮之曰主簿所訟乃君父之怨百上不達乃有司之過又曰仇覽字季智一名香初為蒲亭長有陳元者母告其不孝覽為陳慈孝之道卒成孝子考城令王涣政尚嚴猛聞覽以徳化人署為主簿謂覽曰主簿聞陳元之過而不罪得無少鷹鸇之志耶覽曰以為鷹鸇不若鸞鳯涣謝遣曰枳棘非鸞鳯所棲百里非大賢之路乃以月俸資遣令入太學其名大振唐書曰蘇弁為奉天主簿朱泚之亂徳宗倉卒出幸縣令杜正元上府計事聞大駕至官吏惶恐皆欲奔竄山谷弁諭之曰君上避狄臣下當伏難死節昔肅宗幸靈武至新平安定二太守皆潜遁帝命斬之以狥諸君知其事乎衆心乃安及車駕至迎扈儲峙無闕徳宗嘉之就加試大理司直汝南先賢傳曰李宣之子名表宋公令冦端召表為主簿表不樂為吏於寺門中焚燒衣幘端怒収表欲殺之陳仲舉聞之至宋公欲請表先過宣宣問何故來曰欲見冦令請足下兒宣曰吾子犯罪罪當死如有枉君豈妄殺人宜從此還端追問仲舉仲舉具以語之乃歎曰李宣烈士也即原之蘇林廣舊𫝊曰仇香字季智為書生性謙恭勤恪威嚴矜荘貎不為晝夜易容言不為喜怒變聲雖同儕羣居必正色後言終身無泄狎之交以是見憚學通三經然無知名之援郷里之舉年四十召為縣主簿唐職貟令曰主簿掌付事勾稽省署抄目紏止縣内非違監印給紙筆之事縣尉春秋元命苞曰天尉主甲卒設武備今時尉官亦准此義也史記曰張湯給事内史為寗成掾以湯為無害言大府調為茂陵尉治方中漢書音義曰方中陵上土作方也湯主治之也蘇林曰天子即位豫作陵諱之故言方中如淳曰大府幕府也茂陵尉主作陵之尉也韋昭曰大府公府也漢書曰李廣出鴈門匈奴兵多破廣又亡失多當斬贖為庶人屏居藍田南山射獵嘗夜一騎出從人田間飲還至亭覇陵尉醉呵止廣廣騎曰故李將軍尉曰今将軍尚不得夜行何故也宿廣亭下居無何匈奴入隴西殺太守於是上乃召廣拜為右北平太守廣請覇陵尉與俱因斬之又曰梅福字子真九江夀春人也少學長安明尚書榖梁春秋為郡文學補南昌尉後去官東觀漢記曰光武起兵大冠絳衣騎牛殺新野尉乃得馬又曰逢萌字子康北海人少有大節志意抗厲家貧給事為縣亭長尉過迎拜問事㣲久尉去舉拳撾地嘆曰大丈夫安能為人役耶遂去學問後漢書曰橋𤣥案梁冀客陳助羊昌罪由是著名舉孝亷補洛陽左部尉梁不疑為河南尹以公事當詣府受對𤣥耻為所辱乃棄官還鄉里又曰令長國相亦皆有尉大縣二人小縣一人主盗賊案察姦軌應劭漢官儀曰大縣丞左右尉所謂命卿三人小縣一丞一尉命卿二人續漢書百官志曰邊縣有障塞尉掌禁備𦍑夷犯塞秩比二百石魏志曰太祖除洛陽北部尉初入尉廨繕治四門造五色棒縣門左右各十餘枚有犯禁者不避強豪皆棒殺之後數月靈帝愛幸小黄門蹇碩叔父夜行則殺之京師斂迹莫敢犯者近習寵臣咸欲害之而不能傷蜀志曰先主率其屬從校尉鄒靖討黄巾有功除安喜尉督郵以公事到縣先主求謁不通直入縛督郵杖二百解綬係其頸著馬枊五𦵏反棄官亡命唐書曰顔師古隋仁夀中授養安尉尚書左僕射楊素見師古年弱貌羸因謂曰安養劇縣何以克當師古曰割雞焉用牛刀素竒其對到官果以幹理聞又曰員半千晉州臨汾人上元初應八科舉授武陟尉屬頻嵗旱飢勸縣令殷子良開倉以賑貧餒子良不從㑹子良赴州半千便發倉粟以給饑人懐州刺史郭齊宗大驚因而按之時黄門侍郎薛元超為河北道存撫使謂齊宗曰公之百姓不能救之而使恵歸一尉豈不愧也遽令釋之又曰王無競字仲烈其先琅琊人因官徙居東萊宋太尉𢎞之十一代孫無競有文學初應舉下筆成章及第解褐授趙州欒城縣尉又曰李勉為開封尉升平日久且汴水陸所湊邑居龎􅄂號難治勉與聨尉盧成軌等並有擒姦擿伏之名又曰柳公綽為渭南尉公綽性謹重動遵禮法屬嵗饑其家雖給而每飯不過一器嵗稔復初又曰包佶授藍田尉時有詔命畿内諸縣城奉天時嚴郢為京兆政尚峻暴加以朝㫖甚迫尹正之命急如風霆本曹尉常重規其室方娠而疾畏郢之暴不敢以事故免佶因請代役當時義之又曰竇叅強直果斷少以門䕃積官至萬年尉時同僚有直官曹者将夕聞親疾叅請代之㑹獄囚亡走京兆尹按直部將奏叅遽請曰彼不及以状謁叅實代之宜當罪坐貶江夏尉人多義之唐新語曰盧荘道年十六授長安尉太宗将録囚徒京宰以荘道㓜年懼不舉欲以他尉代之荘道不從但閒暇不之省也時繫囚四百餘人令丞深以為懼翌日太宗召囚荘道乃徐書状以進引諸囚人荘道評其輕重留繫日月應對如神太宗驚歎又曰魏奉古為雍丘尉時姚珽蒞汴州郡寮畢謁珽覽刺召奉古前持廐略令示奉古奉古一覽便諷千餘言珽驚起曰仕宦且四十年未嘗見此又曰朱履霜好學明法理補山隂尉廵察使委以推按故人或遺以數兩黄連固辭不受曰不辭受此歸恐母妻詰問從何而得不知所以對也又曰楊再思為𤣥武尉使于京舍於客院盗者竊其装嚢邂逅遇之盗者謝罪再思曰足下有遺行勿復聲惡恐傍人害足下可留公文餘並奉遺不形容色時人莫測其量又曰𤣥宗聴政之暇從禽自娛又於蓬萊宫側立教坊以習倡優曼衍之戯酸棗尉袁楚客以為天子春秋方壮宜節之以雅恐從禽好鄭将蕩上心乃引由余太康義上疏以諷𤣥宗納之又曰鄭蜀濱頗善五言竟不聞達年老方授江左一尉親朋餞别於上門蜀濱賦詩留别曰畏途方萬里生涯近百年不知将白首何處入黄泉酒酣詠之聲調哀感滿座為之流涕竟卒于官魯國先賢傳曰二世時山東盗賊起二世問諸臣曰今當何如博士諸生三十餘人前曰人臣無将将即反罪至死無赦願陛下急發兵擊之二世怒叔孫通前曰諸生言皆非明主在上四方輻輳安有反者此乃䑕竊狗盗守尉今捕誅之何足可憂二世喜乃賜通衣帛拜為博士諸生或譏通之諛通曰我幾不免虎口乃亡去之薛薛已降楚遂從項梁梁又死從項羽先賢行状曰程堅字諶甫為北陽尉貧無車馬每出追逰常歩行邵間事給焉捜神記曰蒋子文者廣陵人嗜酒好色挑撻無度常自言已青骨死當為神當漢末為秣陵尉遂死及吳大帝之初其故吏見子文于道乘馬執白羽扇侍從如平生吏見驚走子文進馬追之謂曰我當為此土地之神以福爾下民爾可宣告百姓為我立祠不爾将有大咎荆州圖記曰澧陽縣西十里澧水之南岸有白石雙立状類人形髙各三十丈週􅂞等四十丈古之相𫝊昔有克縣左尉與零陵尉共論疆因相傷害化為此石即以為二縣界首東標零陵西碣克縣克縣廢省今臨澧縣則其地也墨子曰備城法百歩一亭亭一尉焉宋武帝詔曰百里之任總歸官長縣尉實效甚㣲其費不少二品縣可置一尉而已餘悉停省太平御覽卷二百六十九
