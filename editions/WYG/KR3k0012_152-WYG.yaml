body:
  text: 太平御覽卷一百五十二宋李昉等撰皇親部十八公主上公主上易泰卦曰帝乙歸妹以祉元吉尚書堯典曰釐降二女于媯汭嬪于虞注曰降下也嬪婦也楚辭曰帝子降兮北渚目渺渺兮愁予王逸注曰帝子堯子也毛詩曰何彼穠矣美王姬也雖則王姬亦下嫁於諸侯車服不繫其夫下王后一等猶執婦道以成肅雍之德也何彼穠矣棠棣之華曷不肅雝王姬之車何彼穠矣華如桃李平王之孫齊侯之子春秋左傳曰襄公四年昔虞閼父為周陶正以服事我先王閼父舜之後當周之興閼父為武王陶正我先王賴其利器用也與其神明之後也舜聖故謂之神明庸以元女大姬配胡公庸用也元女武王之長女胡公閼父之子滿也而封諸陳以備三恪周得天下封夏殷二王後又封舜後謂之恪并二王後為三國其禮轉降示敬而已故曰三恪又莊公元年單伯送王姬王將嫁女于齊命魯為主單伯送焉天子嫁女于諸侯使同姓諸侯主之尊卑不敵故不親主婚築王姬之館于外公羊傳曰天子嫁女於諸侯天子至尊不自主婚必使諸侯同姓者主之史記曰婺女天孫也又曰公叔相魏尚魏公主而害吳起公叔之僕曰易去也魏相曰奈何其僕曰吳起為人節㢘而自喜名也君因先與武侯言曰夫吳起賢人也而侯之國小又與强秦壤界臣竊恐起之無㽞心也武侯即曰奈何君因謂武侯曰試以公主起有留心則必受之無留心則必辭矣以此卜之君因召吳起而與歸即令公主怒而輕君起見公主之賤君也則必辭于是吳起見公主之賤魏相果辭魏武侯武侯疑之而弗信也又曰李斯長男由為三川守諸男皆尚秦公主諸女悉嫁諸公子告歸咸陽斯置酒于家百官長皆為壽門庭車騎以千數漢書曰單于兵强數苦北邊上問婁敬敬曰陛下誠能以嫡公主妻單于厚奉遺之彼知漢女送厚蠻夷必慕以為閼氏生子必為太子豈曽聞外孫與大父抗禮哉又曰周勃下廷尉吏侵辱之勃以千金與獄吏吏廼書牘背示之曰以公主為証公主孝文女曰勃子勝尚之故獄吏教引又曰宣平侯張敖尚惠帝姊魯元公主有女惠帝即位呂太后欲為重親以公主女配帝又曰孝武衞皇后字子夫為平陽主謳者武帝即位數年無子過平陽主既飲謳者進帝獨説子夫帝起更衣子夫侍尚衣軒中得幸還坐驩甚賜平陽主金千斤子夫上車主拊其背曰行矣强飯勉之即貴願無相忘又曰烏孫以馬千匹聘漢女元封中遣江都王建女細君為公王以妻焉賜乘輿服御物為備官屬侍御數百人贈送甚盛烏孫昆莫以為右夫人公主至其國自治宫室昆莫年老言語不通公主悲愁自為作歌天子聞而憐之遣使持帷帳錦繡給遺焉又曰林慮公主子昭平君尚武帝女夷安公主林慮病困以金千斤錢千萬為昭平君豫贖死罪帝許之林慮公主卒昭平日驕醉殺主傅母繫獄廷尉上請左右為言前入贖陛下許之帝曰吾弟老有是一子死以囑我故於是言之垂涕良久曰法令先帝所造因弟故而誣先帝之法吾何面目入髙廟乎遂可其奏又曰昭帝始立年八歳帝長姊鄂邑盖長公主居禁中共養帝盖主私近子客河間丁外人上與大將軍聞之不絶主懽有詔外人侍長主又曰初帝姑館陶公主號竇大主堂邑侯陳午尚之午死主寡居年五十餘矣董偃始與母以賣珠為事年十三隨母出入主家左右言其姣好召見曰吾為母養之因留第中教書計相馬御射頗讀傳記至年十八冠出則執轡入則侍内為人温柔愛人以故諸公接之名稱城中號曰董君又曰梁王以至親故故得自置相二千石出入逰戯僣於天子天子聞之于心不喜太后知帝弗喜迺怒梁使者弗接見按責王所為梁使見大長公主如淳曰景帝妹也而泣曰何梁王為人子知孝為人臣知忠太后曽不省也長公主具以告太后太后喜為帝言之帝心迺觧又曰烏孫公主遣女来至京師學鼓琴漢遣侍郎樂奉送主女過龜兹龜兹前遣人至烏孫求公主女來還㑹女過龜兹龜兹王器留不遣復使報公主公主許之後公主上書願令北宗室入朝而龜兹王降賔亦愛其夫人上書言得尚漢外孫為昆弟願與公主女俱入朝後數求朝賀樂漢衣服制度歸其國治宫室作徼道周衞出入傳呼如漢家儀外國胡人皆驢非驢馬非馬若龜兹王所謂騾也又曰薛宣封為侯時妻死而敬武馬公主寡居上令宣尚焉及宣免歸故郡公主留京師後宣卒主上書願還宣葬延陵奏可其子况私從燉煌歸長安㑹赦因留與主私亂也後漢書曰漢制皇女皆封縣公主儀服同列侯其尊崇者加號長公主儀服同諸藩王女皆封縣亭公主儀服同鄉亭侯肅宗唯特封東平憲王蒼瑯琊孝王京女為縣公主其後安帝桓帝妹亦封長公主同之皇女皇女封公主封公主者所生之子襲母封為列侯皆傳國于後鄉亭之封則不傳襲又曰光武姊湖陽公主新寡帝與共論朝臣㣲觀其意主曰宋公威容德噐羣臣莫及帝曰方且圖之後宋𢎞被引見帝令主坐屛風後因謂𢎞曰諺言貴易交富易妻人情乎𢎞曰臣聞貧賤之交不可忘糟糠之妻不下堂帝顧主曰事不諧矣又曰董宣為洛陽令時湖陽公主蒼頭白日殺人因匿主家吏不能得及主出行而以奴驂乘宣於夏門候之乃駐車叩馬以刀畫地大言數主之失叱奴下車因杖殺之主即還宫訴帝帝大怒詔宣欲箠殺之宣叩頭曰願乞一言而死帝曰欲何言宣曰陛下聖德中興而縱奴殺良民將何以治天下乎臣不須箠請得自殺即以頭擊楹血被面帝令小黄門持之使宣叩頭謝主宣不從帝强使頓之宣手據地終不肯俯主曰文叔為白衣時藏亡匿死吏不敢至門今為天子威不能行一令乎帝笑曰天子不與白衣同又曰鄧晨初娶世祖姊元及漢兵起晨將賔客㑹棘陽兵敗世祖即位封晨房子侯帝又感悼姊沒於亂兵追封諡元為新野節義長公主立廟于縣西封晨長子汎為吳房侯以奉公主之祀又曰竇憲字伯度女弟立為皇后憲恃宫掖聲勢遂以賤直請奪沁水公主園田主逼畏不敢計後肅宗駕出過園指以問憲憲喑嗚不能對又曰班始尚清河孝王女隂城公主順帝之姑貴驕淫亂與所嬖人居帷中召始入使伏牀下始積怒永建五年遂拔刀殺主帝大怒腰斬始同産皆棄市又曰竇融長子穆尚内黄公主穆子勲尚東海恭王彊女泚陽公主友子固亦尚世祖女湼陽公主竇氏一公三公主於親戚功臣中莫與為比又曰皇女義王建武十五年封舞陽公主適延陵鄉侯梁松舞陽縣屬潁川郡松梁統之子其傳云尚光武女武陽公主又鄧訓傳武陽公主子梁扈有罪訓與交通此云舞陽誤松坐誹謗誅又曰皇女中禮十五年封湼陽公主適顯親侯大鴻臚竇固涅陽屬南陽郡顯親縣屬漢陽郡固竇融子肅宗尊為長公主皇女紅夫十五年封館陶公主適駙馬都尉韓公光主坐與淮陽王延謀反誅又曰館陶公主為子求郎明帝不許而賜錢千萬謂羣臣曰郎官上應列宿出宰百里茍非其人則民受其殃是以難之也又曰明帝永平二年少府隂就子豐殺妻酈邑公主就坐自殺續漢書曰印璽綬王公主玉匣銀縷夫人貴人長公主銅縷謝承後漢書云楊喬為尚書容儀偉麗數上書言政事桓帝愛其才貌詔妻以公主喬固讓不聽遂閉口不食七日而死魏志曰明帝愛女淑薨追封諡淑為平原公主為之立廟也魏略曰初東阿王植到闗自念有過宜當謝帝乃留其從官著闗東將兩三人微行見清河公主欲因主以謝而闗吏以聞帝使人迎之不得太后以為自殺也對帝泣下魏末傳曰何晏婦金鄉公主即晏同母妹公主賢明謂其母沛王太妃曰晏為惡日甚將不保身母笑曰汝得無妬晏耶俄而晏死有一男年五六歲宣王遣人録之晏婦藏其子王宫中向使者摶頰乞之使者具以白宣王宣王亦聞晏婦有先見之言心常嘉之且為沛王故特原不殺吳志曰朱據字子範吳郡人有姿貌乃尚公主拜左將軍封雲陽侯謙虚接士輕財好施晉書曰王濟字武子以知名尚武帝妹常山公主公主妬忌兩目失明終無子又曰武帝勑衞瓘第四子宣常尚繁昌公主瓘自以諸生之胄婚對微素抗表固辭不許又曰孫秀子㑹年二十為射聲校尉尚帝女河東公主公主母喪未朞便納聘禮㑹形貌短陋奴僕之下者初時與室兒於城西販馬百姓忽聞其尚主莫不駭愕又曰桓温尚南康公主温與庾翼友善恒相期以寜濟之事翼常薦温於明帝曰桓温少有雄略願陛下勿以常壻畜之宜委以方郡之任託其𢎞濟艱難翼卒以温為都督荆梁四州諸軍事又曰武帝為晉陵主求婚王珣曰謝混雖不及劉貞長不減王子敬帝曰如此便足㑹帝崩袁松欲以女妻之珣曰卿莫近禁臠臧榮緒晉書曰賈后二女宣華女彦封宣華𢎞農郡公主女彦年八嵗聦明岐嶷便能書學諷誦詩論病困賈后欲議封女彦語后曰我尚小未及成人禮不用公主及薨諡哀獻皇女以長公主禮送葬又曰孝懷詹事裴紹息猷尚滎陽長公主紹字承伯秀從兄子猷不願婚聞紹在中書即聘温嶠妹中丞傳宣奏猷大不敬又曰帝之姑姊妹皆為長公主加緑綬晉中興書曰王敦字處仲尚武帝女襄城公主天下大亂敦將還䑓悉以主嫁時侍婢百餘人配給將士金寳一時棄捐又曰臨海公主惠帝第四女羊皇后所生初封清河公主未出適值永嘉亂轉賣長城民錢温温以送女女遇主甚酷主自告吳興太守周禮以聞於是殺温及女適譙國曹統又曰南康宣公主興男帝長女庾后所生初封遂安縣主適桓温又曰新安縣公主道福簡文第三女徐淑媛所生適桓濟重適王獻之晉讃曰初衞瓘子宣尚世祖女繁昌公主宣遇黄門不厚致有讒構楊駿欲專朝政諷内外奪宣主瓘由此去位上㑹諸妃主議問主宣待汝薄今欲離汝意云何主素訥不能自申但泣泣是不欲離諸妃主因言泣是婦人重於再出故泣耳於是遂離與妹姑書稱故新婦宋書曰公主納徵虎豹皮各一又曰王偃字子游其母晉孝武帝女鄱陽公主宋受禪封永城君偃尚宋武帝第二女吳興長公主諱榮男常倮偃縳諸庭樹時天夜雪噤凍久之偃兄恢排閣詬主乃免偃謙虚恭謹不以世事闗懷位右光禄大夫贈開府儀同三司子藻位東陽太守尚文帝第六女臨川長公主諱英媛公主性妬而藻别愛左右人吳崇祖景和中主讒之於廢帝藻下獄死主與王氏離婚又曰何瑀尚武帝少女豫章康長公主諱次男公主先適徐喬美容色聰敏有智畧文帝世禮待特隆瑀豪競於時與平昌孟靈休東海何朂等並以輿馬相尚公主與瑀情愛隆宻何氏疎戚莫不盡被恩紀又曰趙倩尚文帝第四女海鹽公主甚愛重倩嘗因言戯以手擊主事上聞文帝離婚又曰褚湛之字休𤣥秀之子也尚宋武第七女治安公主拜駙馬都尉著作佐郎公主薨復尚武帝第五女吳郡宣公主諸尚主者並因世胄不必皆有才能湛之謹實有意幹故為文帝所知厯顯位太平御覽卷一百五十二
