body:
  text: 太平御覽卷六百二十七宋李昉等撰治道部八賦斂周禮天官下掌皮曰掌秋斂皮冬斂革又地官下旅師曰凡用粟春頒而秋斂之匱時而施之饒時而斂之委人掌斂野之賦斂薪芻凡疏材木材畜聚之物聚斂也野賦邦甸山澤之賦疏同蔬草之可食者凡畜聚之物瓜瓠葵茅禦冬之具也以稍聚待賓客以甸聚待覊旅又地官下曰掌染草掌以春秋歛染草之物以權量受之待時而頒之禮記王制曰古者公田藉而不税藉之言借也借民力而治田美惡取于此不税民之所自治也孟子曰夏后氏五十而貢殷人七十而助周人百畆而徹則云古者謂殷時也市㕓而不税㕓市物邸舍也闗譏而不征譏異服異言也征亦税也又大學曰百乗之家不畜聚歛之臣與其有聚歛之臣寕有盗臣左傳宣公曰晉靈公不君厚歛以雕墻從䑓上弹人而觀其辟丸也又文公曰縉雲氏有不才子縉雲皇帝時官名貪于飲食冐于貨賄侵欲崇侈不可盈厭聚歛積實不知紀極不分孤寡不恤窮匱冐亦貪也盈滿也實財也天下之民以比三凶非帝子孫故别以比三凶謂之饕餮貪財為饕貪食為餮榖梁傳文公曰天王使毛伯來求金求車猶可求金甚矣毛詩葛屦曰碩䑕刺重歛也國人刺其君重歛􅅙食于民不修其政貪而畏人若大䑕也碩䑕碩䑕無食我黍三嵗貫女莫我肯顧逝将去女適彼樂土樂土樂土爰得我所論語先進曰季氏富於周公孔子曰周公天子之宰相也而求也為之聚歛而附益之是時冉求為季氏宰為之急賦税子曰非吾徒也小子鳴鼓而攻之可也鄭曰小子門人也鳴鼔聲其罪以責之也春秋繁露曰木有變春彫冬榮水氷春多雨此徭役衆賦歛重百姓貧窮道多饑人救之者薄賦斂省徭役出倉穀賑困窮矣韓詩外傳曰晉平公藏寶之䑓燒士大夫聞者皆趨車馳馬救火三日三夜乃勝之公子晏獨奉束帛而賀曰臣聞王者藏于天下諸侯藏于百姓農夫藏于囷庾商賈藏于篋匱今百姓困乏于外而賦歛無已昔桀紂殘賊為天下戮今皇天降灾於藏臺是君之大福也漢書曰秦為亂政虐刑殘滅天下北為長城之役南有五嶺之戍外内騷動百姓罷敝頭㑹箕歛家家箕頭數出以箕歛之也以供軍費財匱力盡又曰入物者補官出貨者除罪選舉陵夷亷耻相冐武力進用法嚴令具興利之臣自此而始又曰衛青北擊胡賦税既竭不足以奉戰士有司請令民得買爵及贖禁錮免臧罪置賞官名曰武功爵又曰孝武時山東被水灾民多饑乏于是天子遣使虗郡國倉廪以賑貧猶不足又募豪富人相假貸而富商賈或滯財役貧轉轂百數不佐公家之急黎民重困是時禁苑有白鹿而少府多銀錫有司言曰古者皮幣諸侯以聘享金有三等黄金為上白金為中赤金為下乃以白鹿皮方尺縁以繢為皮幣直四十萬王侯宗室朝覲享聘必以皮幣薦璧然後得行又曰東郭咸陽孔僅為大農丞師古曰姓東郭名咸陽姓孔名僅二人也領鹽鐵事而桑𢎞羊貴幸咸陽齊之大䰞鹽孔僅南陽大冶皆致産累千金𢎞羊洛陽賈人之子以心計故三人言利析秋毫矣其明年大将軍驃騎大出擊胡賞賜五十萬金是時財匱戰士頗不得禄矣大農上塩鐵丞孔僅咸陽言山海天地之藏宜屬少府陛下勿私以屬大農佐賦願募民自給費因官器作䰞鹽官與牢盆蘓林曰牢價直也今世人言顧手牢浮食竒民欲擅斡山海之貨以致富羡役利細民除故塩鐵家富者為吏吏益多賈人矣商賈以幣之變多積貨逐利于是公卿言郡國頗被灾害貧民無産業者募徙廣饒之地陛下損饍省用出禁錢以賑元元寛貸而民不齊出南畆商賈滋衆貧者蓄積無有皆仰縣官異時筭軺車賈人之緡錢皆有差下請算如故率緡錢二千而筭一師古曰率計有二千錢者則出一筭諸作有租及鑄以手所作而賣之者率緍錢四千筭一非吏比者三老北邉騎士軺車一筭師古曰比例也身非為吏之例非為三老非為北邉騎士而有軺車皆令出一筭比音必寐反商賈人軺車二算商賈人有軺車又使多出一算重其賦舡五丈以上一算匿不自占占不悉戍邊一歲没入緡錢悉有盡也有能告者以半畀之畀與也音必寐反賈人有市籍及家屬皆無得名田賈人有市籍身及家内貨不得有田也以使農敢犯令没入田貨又曰晁錯奏古者之稅民不過什一其求易供使民不過三日其力易足至秦則不然用商鞅之法改帝王之制除井田民得買賣富者田連阡陌貧者亡立錐之地又顓川澤之利管山林之餘荒滛越制踰侈以相髙邑有人君之尊里有公侯之富小民安得不困乎又曰自貢禹在位數言得失書數十上禹以為古民亡賦筭口錢起武帝征伐四夷重賦于民民産子三嵗則出口錢故民重困至于生子輙殺之甚可悲痛宜令兒七嵗去齒乃出口錢年二十乃筭也又曰何武兄弟五人皆為郡吏郡縣敬憚之武弟顕家有市籍租常不入縣數負其課市嗇夫求商捕辱顕家顯怒欲以吏事中傷武曰以吾家租賦徭役不為衆先奉公吏不亦宜乎東觀漢記曰馬防多牧馬畜賦歛羗胡帝不喜之數加譴斥所以禁遏甚備由是權勢稍損賔客亦衰范􅁮後漢書曰靈帝南宫灾張譲趙忠等説帝令歛天下田畆税十錢以修宫室發太原河東狄道諸郡材木及文石毎州郡部送至京師黄門常侍輙令譴呵不中者因强折賤買十分顧一因復貨之於宦官復不為即受遂至腐積宫室連年不成刺史太守復增私調百姓呼嗟江表傳曰魏文帝遣使求雀頭香大明珠象牙犀角玳瑁孔雀翡翠闘鴨長鳴雞羣臣奏曰荆揚二州貢有常典魏所求珍玩物非禮也不宜與權曰彼所求者于我瓦石耳孤何惜焉彼在諒闇中而求若是寕可與言禮哉皆具與之晋中興書曰孔嚴補大中正時東海王奕信用羣下上䟽求海鹽錢塘以水牛牽埭税取錢直嚴奏不可從帝詔曰奕為此舉元元損害豈稱䘏民之意耶省所啟敬納忠規又曰謝安弟石尚書令薨時年六十二嵗石無他才望以宰相弟兼有大勲遂居清顕而聚歛無厭取譏當世管子曰鮑叔曰必用夷吾之言公不聼乃令四封之内修兵闗市之征侈之侈過常也謂重其賦税又曰桓公踐位十九年㢮闗市之征賦征五十而取一取其貨賄五十之一上年十取三中年十取二下年十取一嵗饑不税嵗饑謂時嵗總饑故不税嵗饑㢮而税此歲饑謂有饑者有不饑者故㢮饑而税不饑又曰地辟而國貧者舟輿飾而䑓榭廣也賞罰信而兵弱者輕用衆使民勞也舟車飾臺榭廣則賦歛厚矣輕用衆使民勞則民力竭矣賦歛厚則下怨上民力竭則令不行下怨上令不行而求敵之勿謀也不可得也又曰桓公問曰梁聚謂寡人曰古者輕賦税而肥籍歛取下無順於此者矣梁聚之言何如管子對曰梁聚之言非也彼輕賦税則倉廩虛肥籍歛則噐械不奉而諸侯之皮幣不衣倉廪虛則倳賤無禄外皮幣不衣于天下内國倳賤梁聚之言非也又曰桓公見黄鵠謂管仲曰鴻鵠東西南北倐忽千里所恃者六翼也今仲父寡人之翼也管子對曰民勞而使之不時民饑而重歛焉雖黄鵠之有羽翼其若君何晏子春秋曰為君籍厚歛而託之為民進䜛䛕而託之用賢逺公正而託之不順君行此三者則危墨子曰聖王作舟車完固輕利可以任重致逺是以民樂而利之今則厚歛百姓飾車以文采飾舟以刻鏤是以其民饑寒並至而國亂矣又曰古之民未知飲食故聖人耕稼其為食也増以氣充虗今則厚歛百姓以為羙蒸庖魚鱉前則方丈孤寡凍餒雖欲無亂不可得也孟子曰求也為季氏宰無能改於其徳而賦粟倍他日孔子曰求也非吾徒也小子鳴鼓而攻之可也又曰耕者助而不税則天下之農皆悦而願耕于其野矣孫卿子曰成侯嗣君聚歛計數之君也未及取民者也鄭子産取民者也未及為政者也管仲為政者也未及修禮者也故修禮者王為政者强取民者安聚歛者亡荘子曰北宫奢為衛靈公賦歛以為鐘為壇于郭門之外三日而成上下之縣王子慶忌見而問焉曰子何術之設奢曰無敢設也奢聞之既彫既琢復歸于朴還用其本性也侗乎其無識任其純朴而已儻乎其怠疑無所取也萃乎芒乎其送往而迎來無所欣悦來者勿禁徃者無止任彼也從其强梁從乎衆也随其曲傅無所係也因其自窮用其不得不爾故朝夕賦歛而毫毛不挫當故無損而况有大塗者乎韓子曰趙簡主出税吏請輕重簡主曰勿輕勿重重則利入於上輕則利歸於民吏無所私利而正矣孔叢子曰子思言苟變于衛君曰其才可将五百乗衛君曰吾知其才可將然變嘗為吏賦于民而食人二雞子故弗用也子思曰夫聖人之官人如大匠之用木也取其所長棄其所短今君以二卵棄干城之将不可使聞於隣國也公曰謹受命淮南子曰或有罪而可賞或有功而可罪者始西門豹治鄴西門豹魏文侯之官倉無積粟府無儲錢庫無兵甲官無㑹計人數言其過於文侯文侯身行其縣果若人言文侯曰翟璜任子治鄴鄴大亂子能變道則可不能将加誅於子西門豹曰王主富民伯主富武亡國富府庫今君欲為伯者也臣故蓄積於民君以為不然臣請升城鼓之甲兵粟米可立致也乃登城而鼔之一鼓民被甲括矢挾鉀􅀢操兵弩而出再鼓負輦粟而至文侯曰罷之西門豹曰與民約信非一日之積也一舉而欺之其後不可復用也燕嘗侵魏八城請北擊之以復侵地遂舉兵擊燕復地而後反此有罪而可賞者也觧扁為東封觧扁魏臣治東封者上計而入三倍有司請賞之文侯曰吾地土非益廣也人民非益衆也入何以三倍對曰以冬伐木而積之於春浮之河而鬻之文侯曰民春以力耕暑以强耘秋以收歛冬間無事又伐木而積之負軛而浮之於河是用力不得休息也民以敝矣雖有三倍之入将焉用之此有功而可罪者也太公兵法曰武王問太公勝負何如太公對曰夫紂之行不由理積兵酒池賦歛甚數百姓苦之國語曰闘且廷見令尹子常子常令尹子襄之孫囊瓦子常與之語問畜貨聚馬歸以語其弟曰楚其亡乎不然令尹其不免乎吾見令尹問畜聚積實若餓豺狼焉殆必亡者也晁錯上書曰隂陽不和水旱為灾一亡也縣官重責更賦租税二亡也貪吏並出受取不已三亡也說苑曰晉平公好樂多賦歛下治城郭曰敢諌者死國人憂之有咎犯者諌公曰善乃屏鐘鼔除竽瑟遂任犯參治國焉又曰晏子飲景公酒令噐必新家老曰財不足歛於民晏子曰止夫樂者上下同之今上樂其樂下傷其費是獨樂者也不可新序曰魏文侯出逰見路人反裘而負芻文侯曰胡為反裘而負芻對曰臣愛其毛文侯曰若不知其裏盡而毛無所植明年東陽上計錢十倍大夫畢賀文侯曰此非所以賀我也譬無異夫路人反裘而負芻也将爱其毛不知其裏盡毛無所植也今吾田地不加廣士民不加衆而錢十倍必取士大夫也吾聞之下不安者其上不可居也此非所以賀我又曰中行寅将亡乃召其太祝而欲加罪焉祝簡對曰昔吾先君中行穆子皮車十乗不憂其薄也憂徳義之不足也今主君有車百乗不憂徳義之薄也惟患車之不足也夫舟車飾則賦斂厚賦斂厚則民怨詛矣且君苟以祝為有益於國乎則詛亦将為亡矣國亡不亦宜乎桓譚新論曰漢定以來百姓賦歛一嵗為四十餘萬萬吏俸用其半餘二十萬萬藏于都内為禁財少府所領園地作務之八十三萬以給宫室供養諸賞賜郭子曰王夷甫婦大寕女才拙而性剛聚歛無厭夷甫患之而不能禁其鄉人幽州刺史李陽京師大俠猶漢之樓䕶䕶字君卿郭氏素憚之夷甫驟諌之乃云非但我言卿不可李陽亦謂不可郭氏乃為少損京氏别對灾異曰火灾者何人君貪財賦歛盡民貨即火為起不救必有日蝕之灾矣其救之也舉亷直之士為首也太平御覽卷六百二十七
