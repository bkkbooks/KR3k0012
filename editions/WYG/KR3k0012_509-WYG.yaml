body:
  text: 太平御覽卷五百九宋李昉等撰逸民部九逸民九皇甫士安髙士𫝊曰嚴遵字君平蜀人常賣卜成都市日得百錢以自給卜訖則閉肆下簾以著書為事揚雄少從之遊數稱其徳李強為益州牧喜曰吾得君平為從事足矣雄曰君可備禮與相見其人不可屈也王鳯請交不許歎曰益我貨者損我神生我名者殺我身故不仕時人服之又曰鄭朴字子真修道靜黙世服其清髙大將軍王鳯以禮聘之遂不屈揚雄法言盛稱其徳曰谷口鄭子真耕於巖石之下名振京師焉又曰李𢎞字仲元蜀人居成都之圭里里中化之班白不負擔男女不錯行𢎞嘗為縣令郷人共送之元無心就行因共酣飲月餘不去刺史使人喻之仲元曰本不知官惟揚雄重之曰不夷不惠居於可否之間又曰鄭𤣥字康成北海髙宻人也學孝經論語通京氏易公羊春秋三正厯九章算術周官禮記左氏春秋大將軍何進辟𤣥州郡廹脅不得已而詣進設几杖之禮以待𤣥𤣥以幅巾見進一宿而逃去公府前後十餘辟並不就又曰任安字定祖少好學隐山不營名利時人號安曰任孔子連辟不就建安中讀史記魯連傳嘆曰性以潔白為治情以得志為樂性洽情得體道而不憂彼棄我取與時而無爭遂終身不仕號曰任徴君又曰管寧字㓜安靈帝末以中國方亂乃與其友邴原渉海依遼東太守公孫度虛舘禮之其後中國少安人多南歸唯寧不還黄初中華歆薦寧寧知公孫淵必亂乃因徴辭還以為大中大夫固辭不就寧凡徴命十至輿服四賜常坐一木榻上積五十年未嘗箕踞榻上當􅂰皆穿常著布裙貉裘唯祀先人乃著舊布單衣加首絮巾遼東郡國圖形於府殿號為賢者又曰胡昭字孔明棄妻子不應袁紹之命武帝亦辟昭昭自陳本志帝曰人各有志出處不同勉卒髙尚義不相屈昭乃隐陸渾山中又曰焦先字孝然世莫知其所出或言生漢末及魏受禪嘗結一草廬於河之湄獨止其中冬夏袒不著衣卧不設席又無草蓐以肉親土其體垢汙皆如泥滓不行人間或數日一食行不由邪徑目不與女子迕視口未嘗言雖有驚急不與人語後野人火燒其廬先因露寢遭冬雪大至先袒卧不移人以為死就視如故後百餘嵗卒嵇康髙士傳曰子州友父者堯舜各以天下讓友父友父曰我適有勞憂之病方治之未暇在天下也又曰石户之農不知何許人與舜為友舜以天下讓之石户夫負妻戴擕子以入海終身不反又曰伯成子髙不知何許人也唐虞時為諸侯至禹復去而耕禹往趨而問曰堯舜治天下吾子立為諸侯堯授舜舜授予吾子去而耕敢問其故何耶子髙曰昔堯治天下至公無私不賞而民勸不罰而民畏今子賞而不勸罰而不畏徳自此衰刑自此作夫子盍行無留吾事偘偘然遂耕而不顧又曰卞隨務光者不知何許人湯將伐桀因卞隨而謀曰非吾事也湯遂伐桀以天下讓隨隨曰后之伐桀謀於我必以我為賊也而又讓我必以我為貪也吾不忍聞乃自投又讓務光光曰廢上非義殺民非仁無道之世不踐其土况於尊我哉乃抱石而沉廬水又曰小臣稷者齊人抗厲希古桓公三往而不得見公曰吾聞士不輕爵禄無以易萬乗之主萬乗之主不好仁義無以下布衣之士於是五往乃得見焉又曰亥唐晉人也髙恪寡素晉國憚之雖蔬食菜羮平公每為之欣飽公與亥唐坐有間亥唐出叔向入平公伸一足曰吾向時與亥子坐腓痛足痺不敢伸叔向勃然作色不恱公曰子欲貴乎吾爵子子欲富乎吾禄子夫亥先生乃無欲也吾非正坐無以養之子何不恱哉又曰涓子齊人餌术服食甚精至三百年後釣於河澤得鯉魚中符後隐於岩石山能致風雨告伯陽九仙法淮南王少得其文不能解其㫖又曰商容不知何許人也有疾老子曰先生無遺教以告弟子商容曰將語子過故鄉而下車知之乎老子曰非謂不忘故耶容曰過喬木而趨知之乎老子曰非謂其敬老耶容張口曰吾舌存乎曰存吾齒存乎曰亡知之乎老子曰非為其剛亡而弱存乎容曰嘻天下事盡矣又曰闗令尹喜州大夫也善内學星辰服食老子西遊喜先見氣物色􅃒之果得老子老子為著書因與老子俱之流沙西服巨勝實莫知所終又曰康市子者聖人之無欲者也見人爭財而訟推千金之璧於旁而訟者息又曰狂接輿楚人也耕而食楚王聞其賢使使者持金百鎰聘之曰願先生治江南接輿笑而不應使者去妻從市來曰門外車馬迹何深也接輿具告之妻曰許之乎接輿曰富貴人之所欲子何惡之妻曰吾聞至人樂道不以貧易操不以富改行受人爵禄何以待之接輿曰吾不許也妻曰誠然不如去之夫負釡甑妻戴紝器變姓名莫知所之嘗見仲尼過而歌之曰鳯兮鳯兮何徳之衰往者不可諫來者猶可追後更名陸通好養性在蜀峨嵋山上世世見之皇甫士安髙士傳曰陸通字接輿楚昭王政亂通佯狂不仕故曰狂接輿也又曰榮啟期者不知何許人也披裘帶索鼓琴而歌孔子曰先生何樂也對曰天生萬物唯人為貴吾得為人是一樂也以男為貴吾得為男二樂也人生有不免於襁褓吾年九十五矣是三樂也貧者士之常死者民之終居常以待終何不樂也又曰長沮桀溺者不知何許人也耦而耕孔子過之使子路問津焉長沮曰夫執輿者是誰子路曰是孔子是魯孔丘歟曰是也是知津矣問於桀溺桀溺曰子為誰曰仲由孔丘之徒歟對曰然與其從避人之士豈若從避世之士哉耰而不輟子路以告孔子孔子憮然曰鳥獸不可與同羣吾非斯人之徒歟又曰荷蓧丈人不知何許人也子路從而後問曰子見夫子乎丈人曰四體不勤五榖不分孰為夫子植其杖而耘子路行以告子曰隐者也使子路反見之至則行矣又曰顔闔者魯人也魯君聞其賢以幣聘焉闔方服布衣自飲牛使者問曰此顔闔家耶曰然使者致幣闔曰恐聽誤而遺使者羞使者反復來求之闔乃鑿坯而遁又曰市南宜僚楚人也姓熊白公為亂使石乞告之不從承以劔而僚弄丸不輟魯侯問曰吾學先生之道勤而行之然不免於憂患何也僚曰君今能刳形洗心而遊無人之野則無憂矣又曰太公任者陳人孔子圍陳七日不火食太公往弔之曰子㡬死乎夫直木先伐甘井先竭子其飾智以矜愚修身以明汙昭昭如揭日月而行故汝不免於患也孰能削迹捐勢不為功名者哉無責於人人亦無責焉孔子曰善辭其交遊巡於大澤入獸不亂羣而况人也又曰漢隂丈人者楚人也子貢適楚見丈人為圃入井抱甕而灌用力甚多子貢曰有機於此後重前輕曰桔橰用力寡而見功多丈人作色曰聞之吾師有機事者必有機心機心存於胸則純白不備子貢愕然慙不對有間丈人曰子奚為曰孔丘之徒也丈人曰子非博學以疑聖知獨絃歌以買聲名於天下者乎方且亡汝神氣墮汝形體何暇治天下乎子往矣勿妨吾事又曰延陵季子名札呉王之子最少而賢使上國還㑹闔閭使專諸刺殺王僚致國於札札不受去之延陵終身不入呉國初適魯聽樂論衆國之風及過徐徐君欲其劒札心許之及還徐君已死即觧帶挂樹而去又曰范蠡者徐人也相越滅呉去之齊號䲭夷子治産數千萬去之陶為朱公復累巨萬一日蠡事周師太公服飲桂水去越入海百餘年乃見於陶一旦棄資財賣藥於蘭陵世世見之又曰屠羊說者楚人隐於屠肆昭王失國說往從王王反國欲將賞說說曰大王失國說失屠羊大王反國說反屠羊臣之爵禄復矣又何賞之有王使司馬子綦延之以三珪之位說曰願長反屠羊之肆耳遂不受又曰閭丘先生齊人也齊王獵於杜山杜山父老十三人相與助王王賜父老衣服父老皆謝先生獨不拜王曰少也復賜無徭役先生復獨不拜王曰父老幸勞之故答以二賜先生獨不拜何也閭丘曰聞王之來望得夀得富得貴於大王也王曰死生有命非寡人也倉廩備蓄無以富先生大官無闕無以貴先生閭丘曰非所敢望願選良吏平法度臣得夀矣賑乏以時臣得富矣令少敬長臣得貴矣太平御覽卷之五百九
