body:
  text: 太平御覽卷五百六十五宋李昉等撰樂部三雅樂下律吕雅樂下國語曰夫琴瑟尚宫鍾尚羽石尚角大不踰宫細不過羽故樂器重者從細輕者從大凢絲尚商匏竹尚徴革木一聲吕以和樂律以平聲金石以動之絲竹以行之歌以詠之匏以宣之土以贊之革木以節之物得其常曰樂極極之所集曰聲聲相保曰和細大不踰曰平如是金摩之石擊之絲木越之匏竹節之以節八風春秋感精符曰冬至日人主與羣臣左右縱樂五日天下人衆亦家縱樂五日以迎日冬至人主致八能之士備人主乃使八士撞黄鍾之鐘擊黄鍾之皷公卿大夫列士乃使八能之士擊黄鍾之皷用馬革皷員徑八尺一寸鼓黄鍾之瑟瑟用槐木瑟長八尺一寸吹黄鍾之律間音以竽補竽長四尺二寸天地以和應黄鍾之音得㽔賔之律應則公卿大夫列士以德賀於人主因請政所行請五官之符管各受其賞聲之調者詩氣和則人主以禮賜公卿列士五日儀定天地之氣和人主公卿大夫列士章之徳則隂陽之咎如度數夏日至之禮如冬至日之禮舞八樂皆以肅敬為戒八音者雲門五英六莖大巻大韶大夏大濩大武也黄鍾之音調諸氣和人主之音順則㽔賔之律應磬聲和公卿大夫列士誠信林鍾之律應此謂冬至日成天文夏至日成地理頴容春秋釋例曰周用六代之禮樂故有雲門咸池大韶大夏大濩大武也魯受四代之禮樂故不舞雲門咸池示有䧏殺也五經通義曰受命而王者六樂焉以太一樂天以咸池樂地以肆夏樂人以大夏樂四時以大濩樂五行神明以大武樂六律各象其性而為之制以樂其先祖又曰歌舞同處耶異耶歌者象徳舞者象功君子尚徳下功故歌在堂舞在庭歌以養形歌者有聲舞者有形何言歌在堂也以燕禮曰升歌鹿鳴以是知之何以言舞在庭也援神契曰合忻之樂舞於堂西夷之樂陳於户以是明之韓詩外傳曰古者天子左右五鍾将出則撞黄鍾而左右鍾應之焉鳴中規律駕者有文御者有數立則磬折拱則抱鼓出入中䂓折旋中矩然後太師奏升車之樂吿出也入則撞㽔賓以治容貌則顔色齊顔色齊則肌膚安㽔賔以治有聲鵠震馬鳴及倮介之虫無不延頸以聴㽔賔在内者皆玉色在外者皆金聲然後少師奏升堂即席告入也此言物類相感聲相應之義也又曰湯作濩聞其宫聲使温良而寛大聞其商聲使人方㢘而好義聞其角聲使人隠惻而愛人聞其徴聲使人樂養而好施聞其羽聲使人恭儉而好禮白虎通曰樂者樂也君子樂得其道小人樂得其欲聲音何聲鳴也聞其聲即知其所生聲者宫商徵角羽也音引也剛引弱清濁和而相引也音有八謂金石絲竹匏土革木也太平乃作樂所以防滛奢民有饑寒何樂之防孟子曰孟子見齊宣王曰王之好樂甚則齊國其庶幾乎臣請爲王言樂今王鼓樂於此百姓聞王鐘鼓之聲管籥之音舉疾首蹙頞而相告曰吾王之好鼓樂夫何使我至於此極也父子不相見兄弟妻子離散此無他不與民同樂也今王鼓樂於此百姓聞王鐘鼓之聲管籥之音舉欣欣然有喜色而相吿曰吾王庶幾無疾病與何以能鼓樂也此無他與民同樂也今王與百姓同樂則王矣墨子曰程繫問於墨子曰聖人不爲樂昔諸侯倦於聽治息於鐘鼓之樂士大夫倦於聽事息於竽瑟之樂農夫春耕夏耘秋收冬藏息於謳吟之樂今夫子曰聖王不爲樂此譬猶馬駕而不税弓張而不弛墨子曰昔者堯舜有茅茨且以爲禮且以爲樂湯放桀於大水環天下而自立作樂命曰濩又修九韶武王勝殷伐紂環天下而自立用先王之樂又自命樂曰象周成王立因先王之樂命曰騶虞周成王之治天下也不若武王武王之治天下也不若成湯成湯之治天下也不若堯舜故樂逾繁者治逾寡自此觀之非所以治天下也又曰齊康公有樂工萬人食必梁肉衣必文繡子思子曰繁於樂者重於憂厚於味者薄於行君子同則有樂異則有禮莊子曰澶漫爲樂擿擘爲禮而天下始公矣又曰北門成聞黃帝張咸池之樂於洞庭之野始聞之懼後聞之怠卒聞之而惑蕩蕩黙黙乃不自得帝曰汝殆其然哉吾奏之以人徵之以天行之以禮義建之以太清奏之以隂陽之和燭之以日月之明或謂之死或謂之生行流散從不主常聲此之謂天樂也淮南子曰奏雅樂者如於陽阿採菱許慎注曰楚樂之名也邯鄲有鬻曲者託之李竒諸人皆爭學之後復知其非皆棄其曲此未始知音也李竒趙之善樂者也穆天子傳曰天子西征至于𤣥池之上乃奏廣樂三日終是曰樂池山海經曰祝融生子長琴是處揺山始作樂世說曰荀公曽善觧音聲時論謂之闇觧遂調律吕正雅樂毎至正㑹殿庭作四指自謂宫商無不諧韻阮咸妙賞時論謂之神觧毎至公㑹作樂荀心識阮意必謂之不調而阮口初無言直意忌之遂出阮為始平太守後有田父耕於野地中得周時王尺便是天下正尺荀試以校已所治鍾鼓金石絲竹皆短校一米於此伏阮之妙觧徴阮南還說苑曰孔子至齊郭門之外遇一嬰兒擊一壺相與俱行其視精其心端孔子謂御曰趣驅之韶樂方作故樂不獨自樂又以樂人非獨以自正也又以正人樂説曰聖人作樂不以自娱以觀得失之效故不取備於一人必須八能之士故八音或調隂陽或調五行或調盛衰或調律歴或調五音與天地神明合徳者則七始八氣終各得其宜也七始謂四方天地人也又曰上元者天氣也居中調禮樂教化流行摠五行為一下元者地氣也為萬物始質也為萬物之容範中元者人氣也其氣以定萬物通於四時象天心理禮樂通上下四時之氣和合人之情以慎天地者也時元者受氣於天布之於地以時出時入物者也風元者禮樂之本萬物之首物莫不以風成熟也聖王之知物極盛則衰暑極則寒樂極則哀是以日中則昃月盈則蝕天地盈虚與時消息制禮作樂者所以改世俗致祥風和雨露為萬姓獲福於皇天者聖人作樂䋲以五元度以五星縁貞以道徳彈形以䋲墨賢者進佞人伏䋲正也度靡也貞正也弹割也要覧曰桓君山曰余兄弟頗好音嘗至洛聴音終日而心足由是察之夫深其㫖則欲罷不能不入其意故改已風俗通曰案劉韶鍾律書曰春宫秋律百世必調秋宫春律萬物必榮夏宫冬律雨雹必降冬宫夏律雷必發聲夫音樂至重所感者大故曰知禮樂之情能作知禮樂之文能述華譚論曰夫無聲者五音之祖無形者萬物之君本其祖然後精商徴之妙理其君然後正硏樸之容推精樸以檢得失稽清濁以接存亡夫宿瘤瘼母經目而人不視者何一尺之靣醜也西施毛嬙靡服而人左顧者何一尺之靣好也夏姬以容貌而陳亡濮水以聲好而國滅夫何滛哇之有乎是以聖王知物之感人無窮而情之好惡無節無窮則人不能防其行無節則中材不能制其欲是以為制可行之禮立中庸之法使賢者俯就不肖者企及明不及以為教也阮籍樂論曰聖人之作樂将以順天地之體成萬物之性也故定天地四方之音以迎隂陽八風之聲均黄鍾中和之律開羣生萬物之氣奏之圜丘而天神下奏之方丘而地祗上楚之風好勇故其俗輕死鄭衛之風好滛故其俗輕蕩輕死故有蹈水赴火之歌輕蕩故有桑間濮上之曲懐永日之娱抱長夜之欣亡終身之樂成滛縱之行故江淮以南其民好殺漳汝之間其民好奔吴有雙劍之節趙有挟瑟之容氣發於中聲入於耳手足飛揚不覺其駭也桓譚新論曰揚子雲大才而不曉音余頗離雅操而更為新㺯子雲曰事淺易善深者難識卿不好雅頌而悦鄭聲宜也律吕周禮曰太師掌六律六同以合隂陽之聲陽聲黄鐘大簇姑洗㽔賔夷則無射隂聲大吕應鍾南吕函鍾小吕夹鍾皆文之以五聲宫商角徴羽皆播之以八音金石􅁟革絲木匏竹注云以合隂陽之聲者聲之隂陽各有合也黄鍾子之氣也十一月建焉而辰在星紀太吕丑之氣也十二月建焉而辰在𤣥枵太簇寅之氣也正月建焉辰在娵訾應鍾亥之氣也十月建焉辰在析木之津姑洗辰之氣也三月建焉而辰在大梁南吕酉之氣也八月建焉而辰在夀星㽔賔午之氣也五月建焉而辰在鶉首林鍾未之氣也六月建焉而辰在鶉火夷則申之氣也七月建焉而辰在鶉尾中吕巳之氣也四月建焉而辰在實沈無射戌之氣也九月建焉而辰在大火夾鍾卯之氣也二月建焉而辰在降婁辰與建交錯貿處如表裏然是其合也其相生則以隂陽六體為之黄鍾初九下生林鍾之初六也林鍾又上生太簇之九二太簇又下生南吕之六二南吕又上生姑洗之九三姑洗又下生應鍾之六三應鍾又上生㽔賔之九四㽔賔又下生大吕之六四大吕又上生夷則之九五夷則又上生夾鍾之六五夾鍾又下生無射之上九無射又上生中呂之上六同位者象夫妻異位者象子母律娶妻而吕生子者也又曰典同掌六律六同之和以辨天地四方隂陽之聲以為樂器注云陽聲屬天隂聲屬地天地之聲布於四方故書同或作銅鄭司農云陽律以竹為管隂律以銅為管竹陽也銅隂也各順其性吕氏春秋曰黄帝詔伶倫作為音律伶倫自大夏至西方之崑崙之隂取竹於嶰谷以生竅厚薄均者斷两節間其長九寸而吹之以為黄鍾之宫日含少次制十二管以崑崙之下聽鳳之鳴以别十二律其雄鳴為六雌鳴亦六比黄鍾之宫適合皆可生之而律之本也故曰黄鍾徴而均鮮全而不傷其為宫獨尊象大聖之德可以明至賢之功故奉而薦之於宗廟以歆迎功徳世世不忘是故黄鍾生林鍾林鍾生大吕大吕生夷則夷則生太簇太簇生南吕南吕生夹鍾夹鍾生無射無射生姑洗姑洗生應鍾應鍾生㽔賔三分所生益之一分以上生三分所生去其一分以下生黄鍾大吕太簇夹鍾姑洗仲吕㽔賔為上林鍾夷則南吕無射應鍾為下先大聖至理之世天地之氣和以生風日至則月鍾其風以生十二律故仲冬短至則生黄鍾季冬生大吕孟春生太簇仲春生夹鐘季春生姑洗孟夏生仲呂仲夏生㽔賔季夏生林鍾孟秋生夷則仲秋生南吕季秋生無射孟冬生應鍾天地之風正十二律也樂書曰雅樂部器隨律定聲合得其所也合黃鍾之均則用黄鍾之器合太簇之均則用太簇之器是故旋宫法北聲律克諧則無錯器度音咸取中聲恊律是以三倍黄鍾而大至於雷霆謂黄鍾律之度三分九寸而倍成一尺八寸則合雷霆之濁聲也九寸而减餘四寸五分則應中宫之清聲也惟當九寸是謂正聲而可恊和神人感通天地流而不息合同而化是故地風上隮天氣下降隂陽相摩天地相蕩鼓之以雷霆奮之以風雨動之以四時煖之以日月而百化興焉如此則樂者天地之和也故書曰聲依永律和聲則五音不失其常六律不差其度謂孤竹之管律應夹鍾聲與氣諧故感天神而降孤竹之管律應林鐘聲與氣諧故感地祇而出隂竹之管律應黄鐘聲與氣諧故感人鬼而至樂器云昔晉人有銅藻􅐻無故自鳴問之於張茂先答曰此器與洛陽宫中鐘聲相諧宫中撞鐘故鳴也若以鑢之音殊其鳴可止後果如其言也是故樂之制器法度均聲得之毫釐失之千里故大樂之道與政通矣古今樂録曰北齊神武霸府田曹􅄁軍信都芳代號知音能以管候氣觀雲色嘗與人對語即指天曰孟春之氣至矣人徃騐管之飛灰已應毎月所候言皆無爽又為輪扇二十四埋地中以測二十四氣毎一氣感則一扇住並與管灰相應毎合符契焉又曰隋文帝遣毛爽及蔡子元子晉明等以候節氣依古於三重宻室之内以木為案十有二具每取律吕之管隨十二辰置之於案上而以土埋之上平於地中實葭莩之灰以輕緹素覆律吕毎地氣至與律㝠符則飛灰衝素散出於外而氣應有早晩灰飛有多少或初入月天氣即應或至中下旬間氣始應者或灰飛出三五夜而盡或終一月才飛少許者帝異之問牛𢎞對曰灰飛半出為和氣灰全出為猛氣吹灰不能出為哀氣和氣應者其政平猛氣應者其臣縱哀氣應者其君暴帝駮之曰臣縱君暴其政不和非月别異也今十二月律於一嵗内應並不同安得暴君縱臣若斯之甚也𢎞不能對太平御覽卷五百六十五
