front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_431-1a, image: WYG0896/WYG0896-0753a.png}
body:
  text: 太平御覽卷四百三十一宋李昉等撰人事部七十二勤儉約儉嗇勤尚書無逸自朝至于日中昃弗遑暇食用咸和萬民又大禹謨曰克勤於邦又金縢篇曰昔公勤勞王家惟予冲人弗及知又梓材曰先王既勤用明徳又周官曰功崇惟志業廣惟勤左傳宣下曰郤成子曰吾聞之非徳莫如勤非勤何以求民文王猶勤况寡徳乎又宣下曰民生在勤勤則不匱禮記祭法曰舜勤衆事而野死冥勤其官而水死東觀漢記曰明帝行部署不用輦晝甲夜乃觧偃讀衆書乙夜盡寐先五皷起率常如此又曰陳寵辟司徒鮑昱府掾屬專尚交逰以不肯親事為髙寵常非之獨勤以事務又曰班超居家常執勤苦不恥勞辱又曰王丹字仲因毎嵗農時輒載酒肴於田間候勤者與而勞之魏氏春秋曰髙文惠為刺姦令夙夜匪懈至擁膝抱書而寐太祖常夜㣲出覘察諸吏見而哀之徐觧衣覆之而去魏志曰叚灼上䟽理鄧艾曰艾值嵗㐫艾為區種身被烏衣手執耒耜以率将士上下相感莫不盡力吴志曰諸葛恪征淮南以滕允為都督掌統留事允白日接賔客夜省文書或至曉不寐王隐晉書曰陶侃少長勤勑自強不息常語人曰大禹聖者乃惜寸隂至於凢俗宜惜分隂晉書曰任愷素有識鑒加以在公勤恪甚得朝野稱譽唐書曰杜佑性勤而無倦雖位極將相手不釋卷質明視事接對賔客夜則燈下讀書孜孜不怠與賔佐談論人憚其貴而伏其博杜預自叙曰在家則滋味經籍居官則畢力理治公家之事知無不為夏仲御别𫝊曰夏統字仲御永興人與母兄弟居恒星行夜歸採稆求食母老病不綜家事仲御四鼓起洒掃庭内鑚火炊㸑之後徑便入野孟子曰鷄鳴而起孳孳為善舜之徒也淮南子曰墨子無黔􅊳孔子無暖席是故聖人䝉恥辱以干世主者非以貪禄慕位也欲事天下之利除萬民之害也又曰跬步不休跛蹩千里積累不輟可成丘阜鹽鐵論曰禹治洪水身親其勞簮墮不輟冠挂不顧儉約尚書大禹謨曰禹克儉于家周書曰文王疾召太子發曰吾括柱茅茨蓋為民愛費也禮記檀弓下曰晏子一狐裘三十年又禮器曰晏平仲祀其先人豚肩不掩豆澣衣濯冠以朝君子以為隘矣左傳桓公曰臧哀伯諫曰清廟茅屋大輅越席太羮不致粢食不鑿昭其儉也又閔公曰衞文公大布之衣大帛之冠又襄公上曰季文子卒大夫入歛公在位無衣帛之妾無食粟之馬無藏金玉無重器備又襄五年曰叔向曰子展儉而壹又哀上曰子西曰二三子無患矣吾昔聞闔閭食不二味居不重席室不崇壇器不彫鏤宮室不觀舟車不飾衣服財用擇不取費選取堅厚不尚細靡公羊傳曰宣公曰晉靈公無道趙盾趨入靈公望見再拜知其欲諫以拒之盾出公使勇士徃殺之勇士入俯而闚其戸方食魚飱勇士曰嘻子誠仁人也為晉國重卿而食魚飱見子之儉也君使我殺子吾不忍殺子也吾亦不可復見遂刎頸而死論語里仁曰以約失之者鮮矣又㤗伯曰子曰禹吾無閒然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕卑宫室而盡力乎溝洫漢書曰公孫宏起徒步數年至宰相封侯於是開東閣以延賢人食一肉脱粟之飯故人賔客仰衣食俸禄皆以給之又曰辛慶忌居處恭儉飲食被服尤節約東觀漢記曰第五倫性節儉雖為二千石常衣布躬莝養馬妻炊爨飲食受俸禄常取赤米又曰王良為大司徒司直在位恭儉妻子不入官舍布被瓦器時司徒吏鮑恢以事到東海候其家而良妻布裠曳柴從田中歸恢告曰我司徒吏也故来授書欲見夫人妻曰妾是也恢乃下拜歎息而還又曰李恂為兖州刺史清約率下食不二味謝承後漢書曰東郡趙咨為東海相人遺其雙枯魚者噉之二嵗不盡以儉化俗又曰朱寵子字仲威為太尉家貧食脱粟飯卧布被朝廷賜錦被􅆝肉皆不敢受張璠漢記曰荀爽為三公食不過一肉脱粟飯坐皮褥范曄後漢書曰羊陟拜河南尹計日受俸食乾飯茹菜又曰宣秉字巨公馮翊雲陽人為御史中丞遷司𨽻校尉秉性節約常布服被疏食瓦器帝常幸其府舍見而歎曰楚國二龔不如雲陽宣巨公即賜布帛帳帷又曰祭遵為人亷約小心克已奉公賞賜輙盡與士卒家無私財身衣韋袴布被夫人裳不加縁帝以是重焉魏略曰常林字伯槐厯宰守刺史所在檢身節用其家常飢乏糟糠緼弊魏志曰太祖平柳城頒所獲器物以素屏風素馮几賜毛玠曰君有古人之風故賜君古人之服玠居顯位常布衣􅂼食吴志曰是儀字子羽北海營陵人為尚書僕射服不精細食不重膳孫權聞之幸儀舎求視􅂼食親嘗乏對之歎息晉書曰帝以山濤清儉無以供養特給日契加賜牀帳茵蓐禮秩崇重時莫為比濤居榮貴貞慎儉約雖爵同干乘而無嬪媵王隐晉書曰李允厯職内外而至貧儉兒病無以市藥上賜錢十萬晉中興書曰王􅘙為母立屋過制中宗流涕諫之帝所幸鄭夫人􅂁無文繡其恭儉率下如此又曰陸納字祖言徵拜左民尚書将應召綱紀白曰宜装幾舫納曰吾家不在此已勅私奴乘駕装弁食粮米無所須也臨發載被襆而已其餘皆封還官崔鴻十六國春秋趙録曰孟卓字君偉廣平人少脩清苦之志有一單裳十年不澣又前燕録曰太尉陽騖字士秋右北平無終人也騖母李氏博學有母儀慕容晃常升堂拜敬性尤清儉好施無倦位為台保爵封郡公常乘弊車瘠牛卒無殮財後漢書曰孝文帝性儉素常服澣濯之衣鞍勒䥫木而已宋書曰文帝性存儉約不好奢侈車府令嘗以輦䇨故請改易之輦席舊以烏皮縁欲代以紫皮上以䇨未至於壊紫色貴竝弗聴也䇨音貢又曰孝武大明中壊上所居隂室於其處起玉燭殿與羣臣觀之牀頭有土障壁上挂葛燈籠麻䋲拂侍中袁顗盛稱曰已為過矣又曰顔延之性既褊傲兼有酒過肆意直言曾無廻隐故論者多不知之居身清儉不營財利布衣􅂼食獨酌郊野當其為􅃴傍若無人蕭子顯齊書曰髙帝即位後身不御精細之物勅中書舎人桓景貞曰主衣中似有玉𤓰導此制始自大明末後太始增其光麗留此著主衣政是興長疾原可即時打破後宫器物欄檻以銅為飾者改用䥫内殿施黄紗帳宫人著紫皮覆華盖除金花𤓰以用鐵廻釘毎曰使我治天下十年當使黄金與土同價又曰太官進食有裹蒸明帝曰我食此不盡可四片破之餘充晩食又曰太始已来相承奢侈太祖輔政上表禁民間華偽不得作成綉裙衣道路不得着錦履不得作局脚檉柏牙牀箱籠錦縁不得以七寳飾樂器又諸雜漆物不得以金銀為花獸又曰王逡之字宣約瑯邪臨沂人也少好學儉素衣服不浣几案塵墨齊春秋曰王儉字仲寶臨沂人不好聲色衣裘服用取給而已梁書曰到溉字茂灌美風儀善容止所蒞以清白稱性又率儉不好聲色虛室卑衣傍無姬侍後周書曰辛慶之位遇雖隆而率性儉素車馬衣服不尚華侈志量淹和有儒者風度特為當時所重唐書曰虞世南隋時世基當朝貴盛妻子被服擬於王者世南雖同居而躬履勤儉不失素業又曰李藩為相憲宗謂曰前代理天下或家給人足或國貧下困其故何也藩對曰古人云儉以足用盖足用繫於儉約誠使人君不貴珠玉惟務耕桑則人無滛巧俗自敦本百姓既足君孰與不足帝曰儉約之事是我誠心唯當上下相朂以保此道又曰于休烈在朝凡三十餘年厯掌清要家無儋石之蓄恭儉深仁未嘗以喜愠形於顔色而親賢下士推轂後進雖位崇年髙曾無倦色文子曰量腹而食度身而衣節乎已者貪心不生矣墨子曰晉文公好惡衣臣下皆衣䍧羊之裘以韋𢃄劒吕氏春秋曰周明堂茅茨蒿柱土階三尺以見儉也風俗通曰大禹闕百品之羞而菲庖厨殷湯寐寝黄屋駕而乘露輿魏武别𫝊曰武皇帝子中山恭王衮尚儉約教勅妃妾紡績織絍習為家人之事桓階别𫝊曰階為趙郡太守時俸盡食醤􅀈上聞之數戯曰卿家作醤頗多成不詔曰煌煌大魏富有四海棟梁大臣而有􅂼食非吾所以禮賢之意也其賜射鹿師二人并給媒弩三輔决録曰前隊大夫有范仲翁鹽豉蒜果共一筩言其麤儉也㑹稽典録曰陳脩字奉先遷為豫章太守性清潔恭儉十日一炊不燃官薪殷康明慎曰古人云驕奢人之殃恭儉福之塲古今善言曰靈帝時欲用羊續為三司而中官求其賂續出黄紙補袍以示使者延篤與李文徳書曰吾食赤烏之䴸麥飲化益之元醴折張騫大宛之蒜㰱晉國郇瑕氏之鹽魏武令曰吾衣被皆十歳也嵗嵗觧浣補納之衞顗奏曰武皇帝之時後宫食不重肉衣不錦綉茵席不縁物無丹漆用能平定天下遺福子孫儉嗇毛詩曰汾沮洳刺儉也沮洳漸洳也又曰葛屨刺褊也魏地狭隘其民機巧趨利其君儉嗇褊急又曰蟋蟀刺晉僖公也儉不中禮故作是詩以閔之論語曰如有周公之才之美使驕且吝其餘不足觀也已又曰出納之吝謂之有司史記曰魯人俗儉嗇曹邴氏尤甚以鐵冶起富至巨萬然家自父兄子孫約俛有拾仰有取三輔决録曰平陵士孫奮富聞京師性儉恡嘗宿客舍顧錢直甚少主人曰君惜錢如此欲作士孫景卿耶魏畧曰曹洪家富而性嗇文帝前在東宫嘗從洪貸絹百疋洪不稱意及犯法自分必死晉書曰王戎性好興利廣収八方園田水碓周遍天下積實聚錢不知紀極而又儉嗇不自奉養天下人謂之膏肓之疾女􅃴裴頠貸錢數萬久而未還女後歸寧戎色不悦女遽還責然後乃歡從子將婚戎遺其单衣婚訖而更責於家有好李常出貨之恐人得種恒鑚其核以此獲譏於世後魏書曰崔光韶家足於財而性儉恡衣弊馬瘦食味麄薄始光韶在都同里王蔓於夜遇盗害其二子孝荘詔黄門髙道穆令加檢捕一方之人家别搜索至光韶宅綾絹錢布匱箧充積議者譏其矯嗇郭子曰王丞相性儉節帳下甘果盈溢不散涉春敗爛都督白之公别令拾去勅云慎不可使大郎知之大郎名恱字長豫晉書曰和嶠家産殷富擬於王者然性至恡以是獲譏杜預以為嶠有錢癖又晋書曰和嶠清河人也為平昌太守家巨富而性恡嗇埋錢數百斛其母季春思堇惜錢不買太平御覽卷四百三十一
