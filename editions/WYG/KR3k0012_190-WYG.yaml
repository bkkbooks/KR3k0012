  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_190-1a, image: WYG0894/WYG0894-0681c.png}
body:
  text: 太平御覽卷一百九十宋李昉等撰居處部十八倉囷庾倉説文曰倉穀藏也倉廩取而藏之故謂之倉周禮注曰藏米曰廩釋名曰倉藏糓物也詩云乃求千斯倉乃求萬斯箱又曰豐年多黍多稌亦有髙廩萬億及秭又曰我倉既盈我庾維億尚書曰武王克商發鉅橋之粟大賚于四海而萬姓悦服鉅橋紂倉也傳曰楚荘王賑廩同食注賑廩開倉同食上下無異禮記月令曰季春發倉廩賜貧窮又曰五穀皆入必量於嵗又曰循行積聚無有不斂又曰孟冬命有司穿竇窖修囷倉謹盖藏務積聚又曰國無九年之畜為不足無三年之畜曰急周禮曰儲畜以待凶荒又曰倉人掌粟入之藏辨九穀之物以待邦用若穀不足則止餘法用有餘則藏之以待凶而頒之又曰廩人掌九穀之粟以待國之匪頒賜稍食以歳之上下數邦用以知足否以詔國用以治年之豐凶公羊傳曰桓公御廩災御廩者何粢盛之所藏也論語曰舊穀既沒新穀既升春秋左助期曰天廩倉神名均明史記曰舜母嫉舜舜父使舜塗倉下放火而燒舜舜垂席而下得無傷又曰李斯年少時觀倉中鼠食粟居大廡下斯乃嘆曰人之賢不肖譬如鼠矣在所處耳乃從荀卿學帝王之術又曰宣曲任氏之先為叔道倉吏秦之敗豪傑皆爭取金玉而任氏獨窖倉粟及楚漢交兵民不得田而豪傑金玉盡歸任氏又曰髙帝七年立太倉漢書曰汲黯因使矯制發倉救河内飢民上釋罪又曰武帝之初民給家足太倉之粟陳陳相因詩曰如岡如阜如山如陵又曰宣紀曰耿夀昌奏設常平倉豐則糴歉則糶以利民又曰王嘉奏事曰孝文時吏居官者或長子孫以官為氏倉氏庫氏則倉庫吏之後也又鄒陽上書吳王曰吳有諸侯之位而實富於天子轉粟西京陸行不絶水行滿河如淳曰言漢京師仰須山東漕運以自給耳不如海陵之倉又賈捐之上書曰武帝元狩六年太倉粟紅腐不可食郡國志曰衡山石廩峯一如倉庾有二户一開一閉閉者有闗鑰之形王子年拾遺記曰曹曽遇世亂家家焚廬曽積書萬卷慮其先文湮沒乃積石如倉廩以藏書世謂曹家書倉焉水經注曰汾陽故城積粟所在名之曰羊腸倉在晉門閭陽北石磴縈委若羊腸故以為名即今羊腸坂是也越絶書曰君均東倉春申君造西倉名曰君均西倉門週一里八步又曰吳兩倉春申君所造一名均輸洛陽記曰有常滿倉天門集曰廩星主倉説苑曰子路為蒲令備水災與民春修溝瀆為民煩苦故人予一簞食一壺漿孔子聞之使子貢止之子路忿然不悦往見夫子曰由也以㬥雨将至恐有水災故與民修溝瀆以備之而民多匱於食故與人一簞食一壺漿而夫子使賜止之何也夫子止由之行仁也夫子以仁教而禁其行仁也由也不受子曰爾以為餓何不告於君發倉廩以給食之而以爾私饋之是汝不明君之惠見汝之私義也速已則可矣否則汝受責不乆矣子路心服而退又曰北郭騷踵見晏子曰竊悦先生之義願乞所以養母者晏子使人分倉粟府金而遺之辭金而受粟有間晏子見疑於景公出犇北郭子召其友而告之曰吾悦晏子之義而乞所以養母者吾聞之曰養及親者身更其難今晏子見疑吾将以身白之遂造公庭求復之曰晏子天下之賢者也今去齊國國必侵矣方必見國之侵也不若先死請絶頸以白晏子逡巡而退因自殺也公聞之大駭乗馳而自追晏子及之郊請而返之晏子不得已而返之聞北郭子之以死白已也太息而歎曰嬰不肖罪過固其所也而士以身明之哀哉魏志曰袁渙為魏國郎中令及卒太祖為之流涕以穀二千斛一教以太倉穀千斛賜郎中令家一教以垣下穀千斛與曜卿家外不解其意教曰以太倉穀者官法也垣下穀者新舊也吳書曰建康宫城即吳苑城城内有倉名曰苑倉故開北瀆通轉運於倉所時人亦呼為倉城晉咸和中修苑城為宫惟倉不毁故名太倉在西華門内道北晉書鄭黙出為東郡太守值歳荒民饑黙輒開倉賑給乃舎都亭自表待罪朝廷嘉黙憂國詔書褒歎比之汲黯頒告天下若郡縣有此比者聴出給入為散騎常侍又曰王渾武帝受禪加揚烈将軍遷徐州刺史時年饑荒渾開倉賑贍百姓賴之又曰王藴為吳興太守民饑輒開倉贍䘏主簿請先列上待報藴曰行仁義敗無恨坐違科免官士庶詣闕左降晉陵太守又食貨志曰漢宣帝時年豐人少利時大司農中丞耿夀昌上計令郡國皆築倉以穀賤增其價而糴以利農穀貴減其價而糶以利人名曰常平倉百姓利之後漢書曰韓韶字仲黄潁川舞陽人也少仕郡辟司徒府泰山賊公孫舉偽號厯年守令不能破多為坐法尚書選三府掾屬能治劇者乃以韶為嬴長嬴縣故城在今兖州塼城縣東北賊聞其賢相戒不入嬴境餘縣多被寇廢耕桑其流入縣界求索衣糧者甚衆韶愍其飢乃開倉賑之所贍萬餘户主者爭謂不可韶曰長活溝壑之民而以此伏罪含笑入地矣太守素知韶多徳竟無所坐又曰隗囂既敗公孫述欲安衆以成都郭外有秦時舊倉述改名白帝倉述以色尚白故改之自王莽以来常空述即使人言白帝倉出穀如山陵百姓空市里往觀之述乃大會羣臣問曰白帝倉竟出穀乎皆對言無述曰訛言不可信道隗王破者復如此矣俄而囂将王元降述以為将軍又曰虞詡時朝歌賊甯季等數千人攻殺長吏屯聚連年州郡不能禁乃以詡為朝歌長故舊皆弔詡曰得朝歌何衰詡笑曰志不求易事不避難臣之職也不遇盤根錯節何以别利器乎始到河内太守馬稜勉之曰君儒者當謨謀廟堂之上反在朝歌邪詡曰初除之日士大夫皆見弔勉詡籌之知其無能為也朝歌者韓魏之郊背太行臨黄河去敖倉百里而青冀之人流亡萬數賊不知開倉招衆刧庫兵守成皋斷天下右臂不足憂也今其衆新盛難與爭鋒兵不厭權願寛假轡䇿勿令有所舉閡而已及到官設令三科以募求壮士自掾吏以下各舉所知攻刧者為上偷盜為次帶喪服而不事家業者為下収得百餘人詡為之饗會悉貰其罪使入賊中誘令刧掠乃伏兵以待之遂殺賊數百人又潜遣貧民能縫者傭作賊衣以綵縫其裾為幟幟記也續漢書曰以綘縷縫其裾也有入市里者吏輒擒之賊由是駭散咸稱神明晉陽秋曰泰始四年七月立常平倉豐則糴歉則糶以利民也管子曰錯國不傾之地積不涸之倉藏不竭之府注不涸之倉言務五榖也述征記曰東城二石橋舊於王城之東北開渠引洛水名曰陽渠東流經洛陽於城之東南然後北迴通運至建春門以輸常滿倉永嘉郡記曰青田溪發源太湖湖是白土無復細石中生藴藻冬天水熱如湯故衆魚歸之名曰魚倉益州記曰今成都縣東有頺城毁垣土人云古白帝倉也異苑曰餘姚縣倉封閉甚宻而年年輒大損耗是富陽縣桓王陵上雙石龜所食即斷毁龜口於是無復虧減三輔故事曰漢大将軍周亞夫軍於細栁今石激是也石激西有細栁倉城東嘉禾倉老子曰田甚蕪倉甚虚管子曰倉廩實而知禮節又曰不務地利則倉不盈荘子曰諸中國之在海内不似稊米之在太倉乎韓子曰韓昭侯之時黍種貴昭侯令人覆廩吏果竊黍種糶之淮南子曰近敖倉者不為之多飯期滿腹而已鹽鐵論曰匈奴因山谷為城池水草為倉廩地理志曰敖倉在河南廣武山鄭國所置漢王與項王争天下運敖倉之粟是也囷西京雜記曰曹元理善算友人陳廣漢者有二囷忘其石數算欠一斗乃有鼠大如斗在其中吳志曰周瑜過魯肅求資肅有米三千石乃指一囷與之續異記曰晉陵無錫尉嚴無欲貯穀後囷乃成蛇草焚之便貧詩曰胡取禾三百囷兮庾毛詩曰曽孫之庾如坻如京注庾露積也韓詩外傳曰王者藏於天下諸侯藏於百姓農夫藏於囷庾商賈藏於篋笥太平御覽卷一百九十
