body:
  text: 太平御覽卷七十八宋李昉等撰皇王部三天皇地皇人皇有巢氏燧人氏太昊庖犧氏女媧氏炎帝神農氏天皇項峻始學篇曰天地立有天皇十二頭號曰天靈治萬八千歲以木德王洞真記曰天皇十二頭一姓十二人也註曰古人質以頭為數猶今之數鳥獸以頭為計若曰十頭鹿非鹿十頭也徐整三五厯記曰溟涬始芽濛鴻滋萌歲起攝提元氣肇啟有神靈人十二頭號曰天皇春秋緯曰天皇地皇人皇兄弟九人分為九州長天下也河圖括地象曰天皇九翼題名旋復帝系譜曰天地初起即生天皇治萬八千嵗以木德王遁甲開山圖曰天皇被跡在柱州崑崙山下榮氏注曰天皇兄弟十二人身貌相類不可分别治在柱州崑崙也地皇項峻始學篇曰地皇十二頭各萬八千嵗洞紀曰地皇十二頭帝系譜曰地皇治一萬八千嵗以火德王二五厯紀曰有神聖十二頭號地皇遁甲開山圖曰地皇興於熊耳龍門山榮氏注曰地皇兄弟九人面貌皆如女子貌皆相類蛇身獸足生於龍門山中人皇春秋命厯序曰人皇氏九頭駕六羽乗雲車出谷口分九州朱均注曰九頭兄弟九人項峻始學篇曰人皇九頭兄弟各三分人各百嵗依山川土地之勢裁度為九州各居其一方因是而區别遁甲開山圖曰人皇起於刑馬榮氏注曰人皇兄弟九人生於刑馬山身有九也二五厯紀曰有神聖人九頭號人皇馬摠云一百六十五代合四萬五千六百年天皇地皇人皇為太古有巢氏禮曰昔先王未有宫室冬則居營窟夏則居橧巢鄭𤣥注曰冬則居土暑則聚薪柴居其上也項峻始學篇曰上古皆穴處有聖人教之巢居號大巢氏今南方人巢居北方人穴處古之遺俗也皇甫謐以為有巢在女媧之後韓子曰上古之世人民少而禽獸多人不勝禽獸蛇虺有聖人構木為巢以避羣害而人悅之使王天下號之曰有巢氏遁甲開山圖曰石樓山在琅琊昔有巢氏治此山南王天下百有餘代未詳年代也燧人氏無文籍未有甲厯紀年嵗易通卦驗曰燧皇始出握機矩表計㝠圖其刻曰蒼渠通靈鄭𤣥注曰矩法也燧皇也謂燧人在伏羲前作其圖謂之計㝠時無書刻石而謂之且刻曰蒼精渠肩之人能通神靈之意也尚書大傳曰燧人為燧皇燧人以火紀官火陽也陽尊故託燧皇於天禮含文嘉曰燧人始鑚木取火炮生為熟令人無腹疾有異於禽獸遂天之意故謂燧人古史考曰太古之初人吮露精食草木實穴居野處山則食鳥獸衣其羽皮飲血茹毛近水則食魚鼈螺蛤未有火化腥臊多害腸胃於是有聖人以火德王造作鑚燧出火教人熟食鑄金作刃民人大悅號曰燧人禮曰昔者先王未有火化食腥也食草木之實鳥獸之肉飲其血茹其毛此上古之時也後聖人有作作起然後修火之利范金鑄作器用合土瓦瓴甓及甒大以炮以燔以烹以炙以為醴酪王子年拾遺録曰遂明國有大樹名遂屈盤萬頃後世有聖人遊日月之外至於其國息此樹下有鳥啄樹粲然火出聖人感焉因用小枝鑚火號燧人氏太昊庖犧氏皇王世紀曰太昊帝庖犧氏風姓也蛇身人首有聖德都陳作瑟三十六絃燧人氏沒庖犧氏代之繼天而生首德於木為百王先帝出於震未有所因故位在東方主春象日之明是稱太昊制嫁娶之禮取犧牲以充庖厨故號曰庖犧皇後世音謬故或謂之宓犧一解云宓古伏字後誤以宓為密故號曰宓犧一號雄皇氏在位一百一十年易繫辭曰古者庖犧氏之王天下仰則觀象於天俯則觀法於地中觀鳥獸之丈與天地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情又曰作結繩而為網罟以畋以漁蓋取諸離河圖曰伏犧禪於伯牛鑚木作火易坤靈圖曰宓犧時立允部民易理易通卦驗曰宓犧方牙蒼精作易無書以畫事鄭𤣥曰宓犧時質樸作易以為政令而不書但以畫其事之形象而已詩含神霧曰大跡出雷澤華胥履之生庖犧宋均注曰雷澤地名華胥伏羲母禮含文嘉曰伏者别也犧者獻也法也伏犧德洽上下天應之以鳥獸文章地應之以龜書伏犧乃則象作易卦左傳曰郯子曰太皥氏以龍紀故為龍師而龍名杜預注曰太皥伏羲氏風始祖也有龍瑞故以龍命官昭公十七年春秋内事曰伏羲氏以木德王天下之人未有宅室未有水火之和於是乃仰觀天文俯察地理始畫八卦定天地之位分隂陽之數推列三光建分八節以文應瑞凡二十四消息禍福以制吉凶又曰天地開闢五緯各在其方至伏羲乃合故以為元孝經援神契曰伏羲氏日角衡連珠宋均曰伏羲木精人也日角者骨表取象日所出房所立有星也衡中有骨表而連珠象玉衡有星也又曰鈎命訣曰華胥履跡恠生皇犧跡者神異之跡也履跡而生以為竒恠也遁甲開山圖曰仇夷山西絶孤立太昊之治伏羲生處帝系譜曰伏羲人頭蛇身以十月四日人定時生崔寔政論曰太昊之世設九庖之官魏陳王曹植庖羲賛曰木德風姓八卦創焉龍瑞名官法地象天庖厨祭祀罟網魚畋瑟以象時神德通𤣥女媧氏帝王世紀曰女媧氏亦風姓也承庖羲制度亦蛇身人首一號女希是為女皇未有諸侯有共工氏任智刑以强伯而不王以水承木非行次故易不載歸藏曰昔女媧筮張雲幕枚占之曰吉昭昭九州日月代極平均土地和合四國山海經曰女媧之腸化為神處粟廣之野郭璞注曰女媧古神女而帝者人面蛇身一日中七十變其腸化為此神粟廣野名也禮曰女媧之笙簧女媧三皇承宓羲者笙簧笙中之簧也世本曰女媧作笙簧也淮南子曰往古之時四極廢九州裂天不兼覆地不周載火濫焱而不滅水浩洋而不息猛獸食精民髙誘注曰精善也鷙鳥攖老弱於是女媧鍊五色石以補蒼天女媧隂氏佐伏羲治者也斷鼇足以立四極黒龍水精也故力牧太山稽殺之以止雨也極者至也冀州九州中謂合四海之内積蘆灰以止淫水蘆葦也葦生於水故積聚其灰以止其淫水平地出水為淫水民生背方州抱周天方州地也和春陽夏殺秋約冬枕方寢繩方矩四寸也寢繩直身而卧也風俗通曰俗說天地開闢未有人民女媧摶黄土作人劇務力不暇供乃引繩於泥中舉以為人故富貴者黄土人也貧賤者絙也遁甲開山圖曰女媧氏沒大庭氏王有天下五氣異色次有柏皇氏中央氏栗陸氏驪連氏赫胥氏尊盧氏祝融氏混沌氏昊英氏有巢氏葛天氏隂康氏朱襄氏無懷氏凡十五代皆襲庖羲之號自無懷氏已上經史不載莫知都之所在共工氏水德君木火之間霸而不王女媧是三皇之稱三皇者多有不同以太昊炎帝為二皇其一或稱女媧或稱祝融或稱共工未知孰是自女媧至無懷十五代合一萬七千七百八十七嵗魏陳王曹植女媧賛曰古之國君製造笙簧禮物未就軒轅纂成或云二君人首蛇形神化七十何德之靈炎帝神農氏帝王世紀曰神農氏姜姓也母曰任姒有喬氏之女名女登為少典妃遊於華陽有神龍首感女登於常生炎帝人身牛首長於姜水有聖德以火承木位在南方主夏故謂之炎帝都於陳作五絃之琴凡八世帝承帝臨帝明帝直帝來帝哀帝榆㒺又曰本起烈山或時稱之一號魁隗氏是為農皇或曰炎帝時諸侯夙沙氏叛不用命炎帝退而修德夙沙之民自攻其君而歸炎帝營都於魯重八卦之數究八八之體為六十四卦在位百二十年而崩葬長沙易下繫曰神農氏作斵木為耜揉木為耒耒耜之利以教天下蓋取諸益禮含文嘉曰神者信也農者濃也始作耒耜教民耕其德濃厚若神故謂神農也古史考曰炎帝有火應故置官司皆以火為名傳曰郯子曰炎帝以火紀故為火師而火名杜預注曰神農姜姓之祖也有火瑞以火紀事名官也春秋命厯序曰有神人名石耳蒼色大眉戴玉理日月清明有次序故神應和氣以生也玉理猶玉英玉勝也駕六龍出地輔號皇神農始立地形甄度四海東西九十萬里南北八十一萬里所為如此其教如神農植樹木使民粒食故天下號曰皇神農也甄紀地形逺近山川林澤所至孝經鈎命訣曰任已感龍生帝魁任已帝魁之母也魁神農名已或作姒也典略曰武王伐紂封神農之後於譙文子曰赤帝為火灾故黄帝擒之越絶書曰神農不貪天下而天下共富之不以其智自貴於人而天下共尊之莊子曰妸荷甘與神農同學於老龍吉神農隱几闔户晝瞑妸荷甘日中奓户而入曰老龍死矣神農隱几擁杖而起嚗然放杖而笑曰天知予僻陋慢誕故棄予而死已矣夫子無所發予之狂言而死已夫悟死不足驚故還放杖而笑尸子曰神農氏夫負妻戴以治天下堯曰朕之比神農猶旦之與昏也又曰神農氏七十世有天下豈每世賢哉牧民易也淮南子曰古者民茹草飲水採樹木之實食蠃蚌之肉時多疹病毒傷之害於是神農乃始教民播種五穀相土地之宜燥濕肥磽髙下嘗百草之滋味泉之甘苦令民知所避就當此之時一日而遇七十毒又曰神農之治天下也神農馳於胷中知不出於四域懷其神試之心甘雨以時五穀蕃殖春生夏長秋收冬藏月省時考終嵗獻貢以時嘗穀祀于明堂之制有善而無惡風雨不能襲燥濕不能傷養民以公其民樸重端慤不忿爭而財足不勞形而成功因天地之貢資而與之和同是故威厲而不試刑措而不用法省而不煩教化如神其地南至交趾北至幽都東至陽谷西至三危莫不聽從當此之時法寛刑緩囹圄空虚而天下一俗莫懷姦心又曰神農皇帝襲九空重九望九空九天也九望九地也神農本草曰神農稽首再拜問於太一小子曰曽聞古之時壽過百嵗而殂落之咎獨何氣使然耶太一小子曰天有九門中道最良神農乃從其嘗藥以拯救人命周書曰神農之時天雨粟神農耕而種之作陶冶斤斧為耒耜鉏耨以墾草莽然後五穀興吕氏春秋曰神農教曰士有當年不耕者則天下或受其饑矣女有當年不績者則天下或受其寒矣故夫親耕妻親績賈誼書曰神農以為走獸難以久養民乃求可食之物嘗百草實察鹹苦之味教民食穀陸景典畧曰神農嘗百草嘗五穀蒸民乃粒食荆州圖記曰永陽縣西北二百三十里厲鄉山東有石穴昔神農生於厲鄉禮所謂烈山氏也後春秋時為厲國穴髙三十丈長二百丈謂之神農穴太平御覽卷七十八
