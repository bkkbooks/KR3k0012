body:
  text: 太平御覽卷九百三十九宋李昉等撰鱗介部十一牛魚天牛魚水猪魚鹿魚鰕魚鰩魚珠鼈魚赤􅀈魚何羅魚鰼鰼魚䲃魚鮨魚鱅鱅魚葴魚縳魚鯥魚䰷魚䱻魚冉遺魚鰠魚􅀈魮魚嬴魚䰽䰽魚􅚝魚􅗫父魚師魚文魚鯩魚􅀈魚飛魚豪魚鯸鮐魚鰕􅲬魚鮠魚丹魚䖶魚􅗫魚望魚班文魚蕭拆魚䱐䰽魚蕃踰魚龍魚牛魚博物志曰東海中有牛魚目似牛剥其皮懸之潮水至則毛起潮去則伏臨海異物志曰牛魚形如犢子毛色青黃好眠卧人臨其上覺則聲如大牛聞一里魏武四時食制曰海牛皮生毛可以餙物出揚州天牛魚南越記曰天牛魚方圓三丈眼大如斗口在脅中露齒無唇兩肉角如臂兩翼長六尺尾長五尺水猪魚南方草物狀曰水猪魚隨海潮薄岸邊食人人乗船刺之大者圍九丈長二三尺似猪鹿魚臨海異物志曰鹿魚長二尺餘頭上有角腹下有脚如人足嶺表録異曰鹿子魚頳其尾鬛皆有鹿班赤黃色余曾覧羅州圖云州南海中有洲每春夏此魚躍出洲化而為鹿曽有人拾得一魚頭已化鹿尾猶是魚南人云魚化為鹿肉腥不堪食郭璞江賦曰或鹿觡象鼻鹿觡頭角如鹿鰕魚爾雅曰鯢大者謂之鰕今鯢魚似鰠四脚前似獼猴後似狗聲如小兒啼大者長八尺異物志曰鯢魚有四足如龜而行疾有魚之體而以足行故曰鰕魚􅍭水仰天不動小鳥就飲因而吞之異物記曰鰕實四足而有魚名頭尾􅀈岐而行生長山澗出入沉流頂上有光迎風濆流云是懶婦怨懃自投鰩魚吕氏春秋曰觀水之魚名曰鰩狀如鯉有翼左思吳都賦曰文鰩夜飛而觸綸珠鼈魚山海經曰葛山澧水出焉中多珠鼈之魚如肺而有目六足有珠其味酸甘食之不厲山海經圖讚曰澧水之鱗狀如浮肺體兼三材以貨賈客吕氏春秋曰魚之美者澧水之魚名曰珠鼈六足有珠澧水在蒼梧九疑之西赤鱬魚山海經曰青丘之山英水出焉中多赤鱬音需其狀如魚而人面其音如鴛鴦食之已疥山海經圖讚曰赤鱬之狀魚身人頭何羅魚山海經曰譙明之山譙水出焉其中多何羅之魚一首十身其音如吠犬食之已癰鰼鰼魚山海經曰涿光之山囂水出焉而西流其中多鰼鰼之魚音習其狀如鵲而十翼鱗皆在羽端其音如鵲可以禦火又經圖讚曰鼓翮一運十翼䎙翻厥鳴如鵲鱗在羽端雒書曰鰼鰼魚狀如鵲食之不癉出涿光之山䲃魚山海經曰獄法山瀤澤之水出焉音懐其中多䲃魚音藻狀如鯉鷄足食之已疣又山海經圖讚曰䲃之為狀半鳥半鱗鮨魚山海經曰北嶽之山諸懐之水出焉其中多鮨魚音脂魚身犬首音如嬰兒食之已狂鱅鱅魚山海經曰􅈪􅀢之山速株食水出焉中多鱅鱅之魚音容狀如犁牛音如彘山海經圖讚曰魚號鱅鱅如牛虎駮葴魚山海經曰栒狀之山􅯤音枳水出焉中多葴魚狀如儵喙如葴食者無疫南越記長針魚口四寸縳魚山海經曰鷄山黒水出焉其中有縳魚音團狀如鮒彘毛其音如豕見則天大旱又圖經縳魚并顒鳥讚曰顒鳥栖林縳魚處川俱為旱徵灾延普天測之無象厥類惟元吕氏春秋曰魚之美者洞庭之縳鯥魚山海經曰柢音帶山多水有魚出焉狀如牛陵居虵尾有翼在魼榻二音下其音如留牛其名曰鯥音六冬死夏生蟄類也食之無腫疾山海經圖讚曰魚號曰鯥處不在水厥類惟牛鳥翼虵尾䰷魚音蚌山海經曰英山禺水出焉北流注于招音詔水其中多䰷魚狀如鼈其音如羊䱻魚音謂山海經曰樂遊之山桃水出焉其中多䱻魚其狀如蛇而四足漢書地理志曰子􅀈之水其中澤多䱻魚冉遺魚山海經曰英鞮之山涴水出焉中多冉遺之魚魚身蛇首六足目如馬耳食之使人不昧可以禦凶鰠魚山海經曰鳥鼠同穴之山渭水出焉其中多鰠魚音騷其狀如鱣魚動則其邑大兵山海經圖讚曰物以感應亦有數動壯士挺釣氣激江涌鰠魚潛淵出則民悚􅛈魮魚山海經曰鳥鼠同穴之山濫音藍水出於其西多􅛈魮之魚其狀如覆銚鳥首而魚翼魚尾其聲如磬是生珠玉山海經圖讚曰形如覆銚包玉􅍭珠有而不積泄以尾閭闇與道㑹可謂竒魚嬴魚山海經曰邽音圭山濛水出焉其中多嬴魚魚身而鳥翼聲如鴛鴦見其國大水䰽䰽魚山海經曰少咸之山敦水出焉其中多䰽䰽之魚音沛食之殺人􅚝魚山海經曰懸甕之山晉水出焉其中多􅚝魚音紫其狀如鯈而赤鱗其音如叱食之不驕或作怪山海經圖讚曰微哉􅚝魚食則不驕物有所感其用無摽􅗫父魚山海經曰陽山留水出焉其中有􅗫音滔父之魚其狀如鮒魚首彘身食之已嘔山海經圖讚曰􅗫父魚首厥體如豚師魚山海經曰饒山歴號之水出焉中有師魚食之殺人文魚山海經曰景山睢音姐水出焉中多丹粟文魚有斑彩也鯩魚山海經曰半石之山來需音須之水出焉其中多鯩魚音綸黑文狀如鮒食者不睡鰧魚山海經曰半石之山合水出其隂是多鰧音騰魚其狀如鱖居逵逵水之中穴相交通蒼文赤尾食者不癰可以已瘻飛魚王子年拾遺録曰仙人寗封食飛魚而死死百年生故寗仙遊涉七言頌云着藻灼爍千載舒萬齡暫死餌飛魚山海經曰騩音槐山正迴之水出焉而北流注于河其中多飛魚其狀如豚而赤文服之不畏雷可以禦兵郭璞山海經圖飛魚讃曰飛魚如豚赤文無羽山海經曰牛首之山勞水出焉是多飛魚其狀如鮒食之可以已痔衕張駿山海經飛魚讚曰飛魚如鮒登雲遊波林邑國記曰飛魚身圓長丈餘羽重㳫翼如胡蟬出入群飛遊翔翳㑹而沉則泳海底豪魚山海經曰渠豬之山渠豬之水出焉是多豪魚其狀如鮪而赤喙尾赤羽食之可以已白癬鯸鮐魚音侯貽左思吳都賦曰王鮪鯸鮐劉逵曰鯸鮐狀如科斗虫大者長尺餘腹白背青有黄文性有毒雖小獺文魚不敢近也蒸煮肥美鰕􅲬魚潘岳滄海賦曰􅀈鯸􅲬鮠魚午囬切廣志曰鮠魚一名河豚丹魚抱朴子曰南陽丹水有丹魚先夏至十日夜伺之魚夜浮水側有赤光割取血以塗足可以步行水上䖶魚廣志曰䖶魚一名鮦音同􅗫魚劉敬叔異苑曰􅗫魚凡諸魚欲生􅗫輙以頭衝其腹􅗫魚自欲生者亦更相撞觸故世人呼為衆魚之生母也嶺表録異曰􅗫魚南人云魚之欲産子者須此魚以頭觸其腹而産俗呼為生母魚望魚魏武四時食制曰望魚側如刀可以刈草出豫章明都澤一云金澤斑文魚魚豢魏略曰濊國出斑魚皮漢時恒獻之郭義恭廣志曰斑文魚出東夷嵗獻其皮蕭拆魚魏武四時食制曰蕭拆魚海之乾魚也䱐䰽魚魏武四時食制曰䱐䰽魚黑色大如百斤猪黃肥不可食數枚相隨一浮一沉一名敷魚常見首出淮及五湖三十六國春秋曰吳人夏丞為孝亷髙士夏仲御以母疾將市藥于京師隨丞入洛時值禊飲賈充見而訪之仲曰我㑹稽夏仲御也充問卿居海濵能戱船不仲曰能之充因命焉仲御即登船鼓拽容止可觀為䱐䰽之形俄然雲霧杳𠖇白魚躍入其舟充甚異之蕃蹹魚魏武四時食制曰蕃蹹魚如鼈大如箕甲上邊有髯無頭口在腹下尾長數尺有節有毒螫人龍魚山海經曰龍魚陵居其狀如狸或曰龍魚似狸一角也一曰鰕魚音遐即有神聖乗此而行九野一曰鱉魚在天野北郭璞山海經圖讚曰龍魚一角似狸居陵候時而出神聖攸乗飛騖九域乗雲上升括地圖曰龍魚一名鰕魚狀如龍而有神聖乗此以行九野郭璞江賦曰或虎狀龍顔太平御覽卷九百三十九
