body:
  text: 太平御覽卷八百六十三宋李昉等撰飲食部二十一肉炙肉禮曰曰毋反魚肉為己厯口人同穢也濡肉齒决乾肉不齒决又曰六十非肉不飽又曰觴酒豆肉讓而受惡傳曰公将如棠觀魚臧僖伯諫曰鳥獸之肉不登於爼則公不射古之制也又曰齊伐我曹劌請見其鄉人曰肉食者謀之劌曰肉食者鄙未能逺謀又曰公膳日雙鷄卿大夫之膳食饔人竊更之以鶩御者知之去其肉而以其洎饋又曰有酒如淮有肉如坻有酒如澠有肉如陵穀梁𫝊曰公曰天王使石尚來歸脤脤也者何也俎實也祭肉也生曰脤熟曰膰論語曰子在齊聞韶三月不知肉味又鄉黨曰魚餒而肉敗不食肉雖多不使勝食氣祭於公不宿肉祭肉不出三日出三日不食之矣爾雅曰肉謂之敗又曰肉曰脱之家語曰夫食肉者勇悍戰國策曰晩食以當肉安歩以當車史記曰亷頗奔魏趙王使使者視頗尚可得用不趙使見頗頗為之一飯㪷米肉十斤又曰公孫𢎞為丞相食一肉帝王世紀曰夏桀為肉山脯林漢書曰黄霸為潁川太守使吏出不敢舎陲亭食於道傍烏攫其肉民有欲詣府口言事者適見覇與語道此後日吏謁見霸迎勞之曰甚苦食扵道傍乃為烏所盗肉吏大驚又曰武帝為酒池肉林令外國客遍觀又曰陳平為里社分肉甚均父老曰善陳孺子之為宰平曰嗟乎使平宰天下亦當如此肉矣又曰張湯父為長安丞出湯為兒守舎父還䑕盗肉父怒笞湯湯搜室得䑕及餘肉劾䑕掠治又曰伏日賜從官肉大官丞日晏不來東方朔獨㧞劒割肉即懐肉歸太官奏之朔入免冠謝上曰先生起自責也朔再拜曰朔來受賜不待詔何無禮也㧞劒割肉一何壮也割之不多又何亷也歸遺細君又何仁也上笑曰使先生自責乃反自譽賜酒一石肉百斤歸遺細君又曰成帝許后上䟽曰故時酒肉有所賜外家輙上表廼决東觀漢記曰太尉趙喜聞魯恭志行每歲時遣子送米肉辭譲不敢當又曰卓茂為宻令民有言亭長受其米肉者茂問之亭長從汝求乎有事與之自以恩意遺人乎民曰自遺之茂曰人異於禽獸者以有仁愛也亭長素為善吏歳時遺之禮也又曰賊經姜詩不敢驚孝子致米肉詩埋之後吏譴詩掘出示之又曰閔仲叔客居安邑老病家貧不能買肉日買猪肝一片謝承後漢書曰李萇家晝則躬耕夜則讀書日為母市斤肉􅆝米作食又曰桓任字儀遼後母生時不食猪羊肉故終身不以猪羊肉入口又曰李充延平中詔公卿巾二千石各舉隱士大儒務取髙行以勸後進将徴充為博士侍中大将軍鄧隲貴戚傾時無所下借下音假借音子夜反以充髙節每卑敬之嘗置酒請客賓客滿堂酒酣隲跪曰幸託椒房位列上将幕府初開欲辟天下竒偉以匡不逮惟諸君博求其器充乃為陳海内隱居懐道之士頗有不合隲欲絶其論以肉啖之充抵肉於地曰說士猶甘於肉遂出徑去隲甚望之漢舊儀曰齊法食肉三十六兩英雄記曰兾州刺史韓馥問諸從事曰馥何有長何短于治中劉子曰前勞賜有餘肉百斤賣之一州調度奢儉不復在是猶可勞賜勤吏士賣之示狹吴志曰趙達嘗過故知取盤中隻箸再縱横之乃言卿東壁下有美酒一斛又有鹿肉三斤何以辭無王隱晉書曰愍懐太子令人屠肉已自分齊手揣輕重斤兩不差云其母本屠家之女也太康起居注曰尚書郭奕有疾日賜酒米各五升猪羊肉各一斤石崇崔亮母疾日賜清酒粳米各五升猪羊肉各一斤半臧榮緒晉書曰趙高為丞相指鹿為馬持蒲作肉晉中興書曰陸納為呉興太守辭大司馬桓温因問温曰醉可飲幾酒肉食多少温曰温酒不過三升便醉白肉不過十臠納後伺間求入自言外有㣲禮温勑而受止有酒一斗鹿肉一盤一坐愕然納曰公近云三升今有一斗以備餘瀝温歎服晉書曰周訪鄉人盗訪牛於冡間殺之訪得之宻埋其肉不使人知宋書曰衡陽王義季鎮荆州隊主續豐母老家貧無以充養遂不食肉義季哀其志以錢米給豐母并豐噉肉齊書曰髙祖雖從官而家業本貧為建康令時明帝等冬月猶無縑纊而奉贍甚厚后母撤去兼肉曰於我過矣魏書曰𫝊昭性尤篤慎子婦嘗得家餉牛肉以進昭昭召其子婦曰食之則犯法告之則不可取而埋之隋書曰王邵篤好經史遺落世事用思既專性頗恍忽至對食閉目凝思盤中肉輒為僕從所食邵忽覺唯責肉少數罰厨人厨人以情白之依前閉目伺候僕人方見笞辱墨子曰孔子厄於陳蔡子路烹豚孔子不問肉所由來食之晏子春秋曰梁丘據見晏子中食而肉不足王孫子曰楚荘伐宋厨有臰肉将軍子重諫王以肉饋於賢公孫尼子曰殷紂為肉圃孟子曰孔子為魯司冦從而祭膰肉不至不税冕而行不知者以為肉也其知者以無禮也又曰庖有肥肉廐有肥馬民有飢色野有餓殍此率獸而食人也又曰雞豚狗彘之畜無失其時七十者可以食肉矣韓子曰夫百日不食以待梁肉餓者不育令待堯舜之賢乃治當世之民是猶待梁肉而救餓之說也又晏子對景公曰田成子殺一牛取一豆肉餘以食士燕丹子曰荆軻入秦過陽翟買肉爭輕重屠辱軻武陽欲擊軻止之淮南子曰今屠牛而烹其肉或以酸或以甘煎􅆈燔炙有萬方其本一牛之體吕氏春秋曰肉之美者猩猩之唇獾獾之炙雋觾之翠述蕩之掔音文獸名旄象之約旄象牛獸也旄牛肉美貴之也又曰嘗一臠而知一羮之味一鼎之調又曰肥肉厚酒務以相强命之曰爛腸之食劉向新序曰趙簡子使使者聘孔子於魯以胖牛肉迎於河上使者謂船人曰孔子即上船中河安流而殺之孔子至使者致命進胖牛之肉孔子仰天而歎曰美哉水乎洋洋也使丘不濟此水者命也夫桓譚新論曰九江太守龎真案縣令髙受社祭釐有生牛肉二十斤劾以主守盗上請逮捕詔釐非贓天下縁是諸府縣社臘祠祭竈不但進熟食皆復多肉米酒脯醋諸竒珎益盛是故諸郡府至殺牛數頭又曰闗東鄙語世人聞長安樂出門西向笑知肉味美則對屠門而大嚼風俗通曰陳伯敬目有所見不食其肉王充論衡曰仲子兄禄萬鍾以兄之禄為不義而不食之避兄離母處於陵他日歸有饋其兄生鵝者曰惡用是鶂鶂者他日其母殺是鵝與之食其兄自外來至曰鶂鶂之肉而仲子耻負前言即吐而出之典畧曰凢宗廟三歳大祫每大牢分之左辦上帝右辦上后爼餘委肉積於前數千斤名堆爼博物志曰食鷰肉不可入水為蛟所吞龍肉以醢則文章生方言曰燕之北郊朝鮮洌氷間凡暴肉及披牛羊五臓謂之膊説文曰殽雜肉也腌漬肉也膊切肉也廣志曰北方有牧草便於其畜故北方出美肉異苑曰山隂有人嘗食牛肉左脾作牛鳴菜食乃止廣州先賢傳曰丁宻不食有目之肉桂陽先賢畫賛曰程曽字孝孫七歲亡母號慕毁悴王母哀憐嚼食哺之知有肉遂吐不食華陽國志曰孝子郎偶二親病時不能食肉偶終身不食肉董卓别傳曰吕布殺卓百姓欣慶相賀長安酒肉為暴貴江氏家傳曰廷年七歲葬父有酒肉左右或戱郎曰為孝何如肉食廷瞿然歛容遂不食十洲記曰崑崙銅柱下有回屋焉壁方丈上有鳥名曰希右翼覆西王母其肉若醢仙人甘之笑林曰甲買肉過入都厠拄肉着外乙偷之未得去甲出覔肉因詐使口䘖肉曰挂着外門可得不失若如我銜肉着口豈有失理世説曰羅友作荆州從事桓宣武為王車騎集别友求集良久辭去出宣武曰卿向以諮事今何以去答曰友聞白羊白肉美一生未嘗得故來求食食了無事可諮魏曹植與呉質書曰舉泰山以為肉竭東海以為酒陸凱表曰吕䝉凌統早亡先帝痛悼不已子並㓜稚皆肉省中稱肉食之炙釋名曰炙炙也炙於火上也脯炙以􅄳蜜䜴汁淹之脯脯然也釡炙於釡中汁和爇之也銜炙細蜜肉和以薑椒鹽豉已乃以肉銜裹其表而炙之也貊炙全體炙之各以方割出於胡貊之為也禮曰膾炙處外母嘬炙詩曰執爨踖踖為爼孔碩或燔或炙又曰有􅇠斯首炮之燔之君子有酒酌言獻之傳曰欒寧將飲酒炙未熟聞亂使告季子季子子路也為孔氏宰邑也召獲駕乗車軺獲衛大夫駕乗言不欲戰也行爵食炙奉衛侯輙出奔韓子曰晉平公時進炙而髪繞之平公使殺庖人庖人呼天曰嗟乎臣有三罪而死不自知乎平公曰何謂也對曰臣刀之利風靡骨㫁而髪不截是臣之一死也桑炭炙之肉紅白而髪不燒是臣之二死也炙熟又重睫而視之髪繞而目不見是臣三死也意者堂下有譛臣乎殺臣不亦枉乎謝承後漢書曰陳正字叔方為太官令與黄門侍郎有隙因進御食以髪繞炙中光武見之怒将斬正正曰臣當死者三山炭増冶吐炎燋膚爛肉而髪不銷臣罪一也匣出佩刀砥礪而􅃜肌截骨曽不能㫁髪臣罪二也臣少時目閲奏章猶讀五經今具御食臣與丞及庖人六目齊視豈不如黄門兩目臣罪三也制赦之晉書曰王羲之年十三謁周顗顗異之時重牛心炙座客未噉顗割噉羲之於是始知名齊書曰桂陽之役詔檄久之未辦齊髙帝引江淹入中書省先賜酒食淹素能飲啖食鵝炙垂盡進酒數升訖文誥亦辦隋書曰煬帝初在藩魚俱羅弟賛以左右從累遷大都督及帝嗣位拜車騎将軍賛性凶暴虐其部下令左右炙肉過不中意以籖刺瞎其眼有温酒不適者立斷其舌孟子曰嗜秦人之炙無以異於嗜吾炙夫物則亦有然者也然則嗜炙亦有外與又曰曽晳嗜羊􅀥而曽子不忍食羊􅀥公孫丑問曰膾炙與羊􅀥孰美孟子曰膾炙哉公孫丑曰然則何謂食膾炙而不食羊􅀥曰膾炙所同也羊􅀥所獨也孝子傳曰王祥後母病欲黄雀炙乃有黄雀數枚飛入其幕因以供母説苑曰智伯以庖人忘炙而不知韓灰知小而不忘知大也世説曰顧榮字彦先輟已炙啖行炙曰豈有終日執之而不知其味也耶明皇雜録曰杜甫後漂寓湘潭間旅於衡州耒陽縣頗為令長所厭甫投詩於宰宰遂致牛炙白酒以遺甫甫飲過多一夕而卒集中猶有贈聶耒陽詩也太平御覽卷八百六十三
