body:
  text: 太平御覽卷一百八十宋李昉等撰居處部八宅宅釋名曰宅擇也言擇吉䖏而營之説文曰宅人所託也周禮曰凢任地國宅無征鄭注云國宅城中無征稅也禮記曰獻田宅者操書契左傳曰初景公欲更晏子之宅曰子之宅近市湫隘囂塵不可以居請更諸爽塏者辭曰君之先臣容焉臣不足以嗣之及晏子如晉公更其宅反則成矣既拜乃毁之為里室皆如其舊則使宅人反之諺曰非宅是卜惟鄰是卜二三子先卜鄰矣卒復其舊宅漢書曰蕭何買田宅必居窮僻處曰令後世賢師吾儉不賢毋為勢家所奪又曰魯恭王餘好治宫室苑囿壞孔子舊宅以廣其宫聞鍾磬琴瑟之聲遂不敢復壞於其壁中得古文經傳吳志曰周瑜與孫策同年相友善瑜推道南大宅以舍策升堂拜母有無通共晉書曰裴楷性寛厚與物無忤不持儉素每遊榮貴輒取其珍玩雖車馬器服宿昔之間便以施諸窮乏嘗營别宅基搆甚麗與兄共遊行牀帳儼然櫺軒疎朗兄心甚願之而口不言也楷心知其意便使住之又曰杜后母裴氏為廣德縣君裴氏名穆長水校尉綽孫太傅主簿遐女太尉王夷甫外孫中表之美髙於當世遐隨東海王越遇害無子唯穆渡江遂享榮慶立第南掖門外民所謂杜老宅云又曰有奏王公國家京城不宜有田宅未暇作諸國邸當使有往來之處今限京師得有宅一所齊書曰劉繪字士章彭城人也太常峻弟父勔宋末權貴門多人客解褐著作郎太祖每歎曰劉公為不亡矣繪聰警善𨽻書為竟陵王後進賓客時張融周顒並有言工融音㫖緩韻顒辭致綺健繪之言吐頓挫有風氣時人為語曰劉繪貼宅别開一門言在二家之中也又朝野為語曰三人共宅夾清漳張南周北劉中央言處二人間王隠晉書曰魏舒字陽元幼喪父母為外家寗氏所養寗氏起宅相者云當出貴外甥外祖父母以盛氏甥小而魏為應相也舒曰當為外家成此宅相後為司徒又曰上黨鮑瑗家多喪禍貧苦淳于智卜之卦成謂曰為君安宅者女子工耶曰是也又曰此人已死耶曰然智曰此人安宅失宜既害其身又令君不利君舍東北有大桑樹君徑入市門數十步當有一人折新馬鞭者便就請買還懸此樹三年當得物瑗承言詣市果得馬鞭懸之三年後浚井中得十萬銅錢雜器復可二十餘萬於是家業用展病者亦愈晉書曰孔愉營山隂湖南侯山下數畆地為宅草屋數間便棄官居之俸資數百萬悉無所取又曰桓𤣥得志常欲以謝安宅為營謝混曰召伯之仁猶惠及甘棠文靜之德更不保五畆宅耶𤣥聞慚而止宋書曰初大杜西空地吳時丁奉宅孫皓流徙其家晉有江左初為周顗蘇峻宅其後為袁眞宅又為章武王司馬秀宅皆㓙敗後給臧壽亦頻遇喪禍故世稱惡地王僧綽常以正達自居謂宅無吉凶請為第始築未居而敗又顔延之傳曰子峻既貴重權傾一朝凡所資供延之無所受器服不改宅宇如舊見峻起宅謂曰善為之無令人笑汝拙也齊書曰齊世祖武皇帝諱􅄨字龍逺太祖長子也小字龍兒生於建康清溪宅其夜陳孝后劉昭后夢龍據屋上故字之焉梁書曰髙祖宋大明八年甲辰生於秣陵縣同夏里三橋宅後魏書曰就德興反於營州使尚書盧同往討之大敗而返屬侍中穆紹與元順侍坐因論同之罪同先有近宅借紹頗欲焉元順勃然曰盧同終將無罪太后曰何得如侍中之言順曰有好宅與要勢侍中豈慮罪也紹慚不復敢言又邢巒傳曰孝文因行藥至司空府南見巒宅謂巒曰朝行藥至此見卿宅乃住東望德館情有依然巒對曰陛下移構中京方建無窮之業臣意在與魏升降寧容不務永年之宅帝謂司空穆亮僕射李冲曰巒之此言其意不小五代史晉史曰羅紹威前唐時嘗建第洛陽福善里莊宗同光中始賜明宗梁租庸使趙巖宅雖華以趨内逺乃召紹威子周敬易第後明宗即位一日夢中見一人儀形瓌秀若素識者上夢中曰此得非前宅主羅氏乎及寤訪其子孫左右對曰周敬見列明廷召至果符夢中所見上謂侍臣曰朕不欲使大勲之後乆無土地因授左馮翊非承家為善何以至此五代史周書曰漢初以晉入蕃將相第宅賜隨駕大臣以趙榮第賜太祖太祖召榮子前刑部郎中易則告之曰所賜第除素屬版籍外如别有契券已所置者可歸本直即以千餘緡遺易則易則惶恐辭讓太祖堅與之乃受孔子家語曰魯哀公問於孔子曰寡人聞東益宅不祥信有之乎孔子曰不祥有五而東益宅不與焉夫損人而自益身之不祥也棄老而取幼家之不祥也釋賢而任不肖國之不祥也老者不敎㓜者不學俗之不祥也聖人伏匿愚者擅權天下之不祥也不祥有五而東益宅不與焉淮南子曰魯哀公欲西益宅史爭之以為西益宅不祥哀公作色怒左右數諫不聽乃以問其傅曼折曜對曰天下三不祥而西益宅不與焉哀公大悦復問何為三不祥對曰不行禮義一不祥嗜欲無止二不祥不聽正諫三不祥哀公喟然自反不益宅風俗通曰宅不西益俗説西者為上上益宅者妨家長也原其所以西益者禮記曰南向北向西方為上爾雅曰西南隅謂之隩尊長之處也不西益者恐動揺之耳審西益有害增廣三面豈能獨吉乎國語魯文公欲弛孟文子之宅文公魯僖公之子弛毁也孟文子魯大夫公孫敖之子文伯穀也宅有司所居公欲毁之以益宫也使人謂之曰吾欲利子於外之寛者對曰夫位政之建也署位之表也車服表之章也宅章之次也祿食之次也君議五者以建政為不易之故也今有司來命易臣之署與其車服而曰將易而次為寛利也夫署所以朝夕䖍君命也臣立先臣之署服其車服為利故而易其次是辱君命也不敢聞命若罪也則請納禄與車服而違署唯里人之所命次公弗取臧文仲聞之曰孟孫善守矣其可以蓋穆伯而守後於魯乎穆伯文子之父公孫敖也滛乎魯姬出奔而死於齊今文子守官不失禮故可掩蓋其父惡守其後嗣也公欲弛郈敬子之宅亦如之公文公也郈敬子魯大夫郈惠伯之後𤣥孫敬伯同也亦如之者亦謂之欲利子於外之寛者也對曰先臣惠伯以命於里嘗禘烝享之所致君胙者無乃違乎請有數矣出入受事之幣以致君之命者亦有數矣今命臣更次於外從司徒以班徙次亦弗取孟子曰五畆之宅樹墻下以桑匹婦蠶之則老者足以衣帛矣韓子曰有與猛者隣欲賣宅避之人曰是其貫將滿矣子姑待之答曰吾恐以我滿貫也遂去之淮南子曰任一人之能不足以治三畆之宅循道理之數因天地之利然則六合不足均也抱朴子曰葛盧佐光武有大功受爵立宅舍於博望里今基址石礎存焉郡國志曰虢州楊震宅西有龍望原南崖有太尉公藏書窟太元初人逐獸入穴見古書二千餘卷又曰洛陽董卓宅在永和里掘地輒得金玉寳玩後魏邢巒掘得丹砂及錢銘曰董太傅之物後夢見卓索巒不與經年而卒又曰洛陽石崇宅有綠珠樓今謂之秋泉又曰洛陽蘇秦宅在利仁里後魏髙顯業每夜見赤光於光處掘得金百斤銘曰蘇家金業為造寺又曰幹山南有許詢宅又曰長沙南寺賈誼宅亦陶侃宅又曰婁縣山下有巫咸故宅在焉又曰鄂州西塞山有黄琬宅丁固宅又曰潯陽湓城亭有陶濳宅又曰柳州城東北有仙人蘇耽宅又曰淯陽有小長安東陽城有范蠡祠即故宅也又曰恒州九門縣新市城有藺相如宅又曰鄧州梅溪出紫山南百里奚故宅在焉又曰密州髙密西有鄭𤣥宅亦曰鄭𤣥城後移塟於屬阜墓側有稻田萬頃斷水造魚梁歳收億萬世號萬疋梁輿地志云縣東南白沙有龎士元宅於漢水之北司馬德操宅在於漢水之南隔魚梁望衡對宇歡情自接每至相思則褰裳涉水樓承先别傳曰樓元到廣州密步虞仲翔故宅處遂徘徊躑躅哀咽慘愴不能自勝三輔決錄曰郭祥為太尉長史起大宅在髙陵城西世稱曰長史宅瀨鄉記曰老子祠在瀨鄉曲仁里譙城西出十里老子平生時敎化學堂故處也漢桓帝修建屋宇為老子廟廟北二里李夫人祠老子所生舊宅劉禎京口記曰唐頽山週廻二里餘山南得路得郄鑒故宅五十餘畆又曰長村東大瀆瀆北有謝𤣥故宅戴元西征記曰東陽門外道北吳蜀二主第宅去城二里墟基猶存又曰潼關北去蒲坂城六十里城中有舜廟城外有宅井及二妃壇南去城二十里有田舜所耕山上亦有宅述征記曰豐水九十里有漢髙祖宅又曰山陽縣城東北二十里魏中散大夫嵇康園宅今悉為田墟而父老猶謂嵇公竹林地以時有遺竹也成都記曰成都縣南百步有嚴君平司馬相如揚雄宅今草𤣥亭餘跡尚存陳留耆舊傳曰董宣為北海太守大姓公孫舟造起大宅工占之云宅成當出一喪舟使子取行人殺之以塞咎宣收舟拷殺之世説曰鍾㑹荀濟二人情好不協荀有寳劒可直百萬常在母鍾太夫人處㑹善書學荀手跡作書與母取劎仍竊去不還荀後知是鍾而無由得求思所以報之於是潜往畫鍾門堂並作太傅形象衣冠狀貌如平生之容鍾來入門便感慟宅遂空廢徐邈别傳曰邈字仙民舊疑嵗辰在卯舉世認承傳為定範此宅之左即彼宅之右地何得俱忌邈以為太歳之屬自是遊神譬如日出之時向東皆逆非為藏體地中水經注曰齊城門外有晏嬰宅盛宏之荆州記曰新野郡西七里有揚溪源出紫山南流入涓故耆老傳云溪西有百里奚宅又曰新野郡南有越相范蠡祠宅三户人傳云祠處即是宅又曰襄陽范蠡祠南有晉河南尹樂廣宅周廻十餘畆曩舊井猶未頹檀道濟置邏其中即名為樂宅又曰襄陽西北十餘里名為隆中有諸葛孔明宅又曰宛有伍子胥宅范汪荆州記曰義陽六安縣有光武宅枕白水所謂飛龍白水也蘇州記曰周文學孔子弟子言偃宅在常熟縣西史記云言偃吳人也字子游又吳地記云宅有井井邊有洗石周四尺輿地志云梁蕭正德為郡太守為蕭將去莫知所在吳地記曰陸氏宅在長谷谷在吳縣東北谷名華亭谷水下通松江昔陸遜陸凱居此谷吳志云漢廬江太守陸康與袁術有隙使侄遜與其子績率宗族逃此避難居于是谷谷東有崑山祖墓在焉故陸機思鄉詩髣髴谷水陽婉孌崑山隂列仙傳云厯陽有彭祖宅禱祠風雨應期而至襄沔記曰晉永興中鎭南將軍襄陽郡守劉宏于隆中諸葛故宅立碑表廬使太傅掾犍為李興為文又曰繁欽宅王粲宅并在襄陽井臺猶存又曰長流廨西有梁曹儀同景宗柳儀同慶逺韋儀同叡諸宅並相隣次郭城西門韋叡少時有南陽人蔡那善相叡宅應出三公刺史貴不可言時叡宅有草房十間那宅在城南悉是瓦屋求叡換宅疑而不許叡兩兄闡纂有令聞位望在叡之右鄉里謂此人應班槐棘其後闡纂相繼而終叡奉龍飛遂成宅相簡文徴書既至遊憇此宅望氣之言殆有徴矣丹陽記曰有張子布宅在淮水南對瓦官寺其前張侯橋也橋近宅因以為名仲雍荆州記曰秭歸縣有屈原宅宅東北有女嬃廟擣衣石至今存焉韋述兩京記曰東京宜人坊其半本隋齊王暉宅煬帝愛之初欲盡坊蓋宅帝問宇文愷曰里名為何愷曰里名宜人帝曰既號宜人柰何無人可以半為王宅又曰仁和坊兵部侍郎許欽明宅欽明户部尚書圉師猶子與中書令郝處俊鄉黨親族兩家子弟類多醜陋而盛飾車馬以遊里巷京洛為之語曰衣裳好儀觀惡不姓許即姓郝又曰崇仁坊西南隅長寧公主宅既承恩盛加雕飾朱樓綺閣一時勝絶又有山池别院山谷虧蔽勢若自然中宗及韋庶人數遊於此第留連彌日賦詩飲宴上官昭容操翰於亭子柱上寫之韋氏敗公主隨夫為外官初欲出賣木石當二千萬山池别院乃不為數遂奏為觀請以中宗號為名詞人名士競入遊賞又曰延壽坊東隅駙馬裴巽宅髙祖末裴行儉居之自行儉以前居者輒死自儉卜居有狂僧突入髠其庭中大柳樹中有豕走出徑入比隣其家數日暴死盡此宅清宴又曰永興坊西門北魏徴宅本宇文愷宅及徴居之太宗幸焉時將營小殿賜徴為堂又曰通化坊東南鄖公殷開山宅西北顔師古宅又有歐陽詢宅時人謂之吳兒坊又曰延壽坊北門之西有中書令閻立本宅宅内西亭中有立本畫山水墨跡又曰明敎坊龍興觀西南隅開府宋璟宅南門之東國子司業崔融宅璟造宅悉東西相對不為斜曲以避惡名融為則天哀筞用思精苦下直馬過其門不覺文就而卒又曰尚善坊東南隅岐王範宅宅有薛稷畫鶴世稱妙絶又曰勸善坊東北隅太子太師鄭公魏徴宅山池院有進士鄭光義畫山水為時所重又曰宣風坊北街之西中書令蘇味道宅有三十六柱亭子時稱巧絶祿山事跡曰祿山舊宅在道政坊𤣥宗以隘陋更於親仁坊選寛爽之地出内庫錢粮更造宅焉勑所司窮其華麗不限功力財物堂殿院宇重複窈窱周匝委曲户牖交䟽髙臺臨池宛若天造帷帳幔幕充牣其中至九年八月祿山獻俘將至京方命入此新宅春秋内事曰隂宅以日奇陽宅以月耦隂宅先内男子當令奇陽宅先内女子當令耦乃吉隂宅内男子三人陽宅内女子二人地鏡圖曰人望百家宅法中有赤氣者家有貲財白氣者家有財不保黑氣有五其伏在宅中青氣者有銀地寳也嵇康宅無吉㓙論曰設為三公之宅而命愚人居之必不為三公可知也夫壽夭之不可求甚於貴賤然則宅百年之宫而望殤子之壽孤逆魁忌以速彭祖之夭必誣矣然則果無宅也是性命自然不可求矣樓觀本記曰隋之開皇元年勅㫖樓觀者本尹先生卜居之勝宅老君説經之聖跡乃元敎根源致福之首宜令所司别作圖様開拓舊居太平御覽卷一百八十
