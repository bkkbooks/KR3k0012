body:
  text: 太平御覽卷七百三十四宋李昉等撰方術部十五巫上說文曰巫祝也女能事無形舞降神也象人兩褎舞形與工同意周禮春官曰司巫掌羣巫之政令若國大旱則帥巫而舞雩國有大烖則帥巫而造巫恒凡䘮事掌巫降之禮男巫掌望祀望衍授號旁招以茅女巫掌嵗時祓除釁浴旱暵則舞雩若王后弔則與祝前凡邦之大烖歌哭而請禮曰君臨臣䘮以巫祝桃茢執戈惡之以所異於生也又曰襄公朝于荆康王卒荆人曰必請襲欲使㐮之公依魯人曰非禮也荆人強之巫先桃茢荆人悔之巫祝桃茢君臨臣䘮之禮又曰嵗旱穆公召縣子而問然曰天久不雨吾欲暴巫而奚若曰天則不雨而望之愚婦人於以求之毋乃已疏乎已猶甚也巫主接神亦覡天哀而雨之春秋傳說巫曰在女曰巫在男曰覡周禮女巫旱暵則舞雩傳曰晉侯改塟共太子秋狐突適下國遇太子太子使登僕而告之曰夷吾無禮余得請於帝矣將以晉􅂌秦秦將祀余對曰臣聞之神不歆非類民不祀非族君祀無乃殄乎且民何罪失刑乏祀君其圗之君曰諾吾將復請七日新城西偏將有巫者而見我乎許之遂不見又曰夏大旱公欲焚巫尪臧文仲曰非旱備也修城郭貶食省用務穡􅂆分此其務也巫尪何為天欲殺之則如勿生若能為旱焚之滋甚公從之是嵗飢而不害又曰初楚范巫商似商似范巫之名謂成王與子玉子西曰三君皆將強死城濮之役王思之故使止子玉曰毋死不及止子西縊而懸絶王使適至遂止之使為商公沿漢泝江將入郢王在渚宫下見之懼而辭曰臣免於死又有讒言謂臣將逃臣歸死於司敗也王使為公尹又與子家謀殺穆王穆王聞之殺闘宜申及仲歸又曰晉侯夣大厲披髮及地搏膺而踊曰殺余孫不義余得請於帝矣壞大門及寢門而入公懼入於室又壞戸公覺召桑田巫巫言如夣公曰何如曰不食新矣六月丙午晉侯欲麥使甸人獻麥饋人為之召桑田巫示而殺之將食張如厠陷而卒又曰晉中行獻子將伐齊夣與厲公訟弗勝公以戈擊之首墜于前跪而戴之奉之以走見梗陽之巫臯他日見諸道與之言同巫曰今兹主必死若有事於東方則可逞獻子許諾晉伐齊又曰公在楚楚人使公親襚公患之穆叔曰祝殯而襚則布幣也乃使巫以桃茢先殯茢黍穰楚人弗禁既而悔之書曰敢有恒舞于宫酣歌于室時謂巫風論語曰人而無恒不可以作巫醫史記曰魏文侯時西門豹為鄴令徃到鄴㑹長老問民之疾苦長老云苦於河伯娶婦以故貧豹問其故對曰鄴三老廷掾常嵗歛百姓取其錢數百萬用其三二十萬為河伯娶婦與巫共分其餘錢持歸當時其巫行視小家女好者云是當為河伯婦即聘取洗沐為治新繒綺縠之衣間居齋戒為治齋宫河上張緹帳帷女居其中為具牛酒飲食十餘日共粉飾之如嫁女牀席令女居其上浮之河中始浮行數十里乃没其人家有好女者恐大巫祝為河伯取之以故多持女遠遁亡以故城中益空無人又貧困所從來久遠矣民人俗語曰即不為河伯娶婦水來漂溺人民西門豹曰至為河伯娶婦時願與三老巫祝父老送女河上幸來告語之吾欲徃送女皆曰諾至其時西門豹徃㑹之河上三老女子豪長父老皆㑹與人民觀之者三千人其巫子老女也年七十從弟子女十人所衣皆繒單衣立大巫旁西門豹曰呼河伯婦來視其好醜即將女出帷中來至前豹視之顧謂三老巫祝父老女子曰是女不好煩大巫嫗為入報河伯更求好女後日送之即使卒共抱女巫嫗投之河中有頃曰巫嫗何久也弟子趨之復以弟子一人投河中有頃曰弟子何久也復使一人趨之復投一弟子河中凡三弟子西門豹曰巫嫗弟子女也不能白事煩三老入白之復投三老河中西門豹簮筆聲罄折嚮河神立侍良久長老旁觀者皆為驚恐西門豹顧曰巫嫗三老不來還奈之何復使廷掾與豪長一人趨之皆叩頭且破額血流地色若死灰西門豹曰諸且留待之湏臾豹曰廷掾起矣河伯留之夕也皆罷歸去鄴吏民大驚恐是後不敢復言河伯娶婦又曰武帝時游水人發根言上都有巫病鬼而下之上召置祠之甘泉及病使人問神君神君曰天子無憂病於是病愈又曰栢梁災越巫勇之曰越俗有火災後起屋必用勝服之於是作建昌宫度為千門萬户又曰起巫立越祠而以雞日十上信之又曰孝武帝天漢二年秋上禁巫祠道中者文頴曰始漢家於道中祠凡禍咎移之於行人百姓以其不經今止之也後漢書曰樊崇等至𢎞農與更始諸將連戰克勝衆遂大集乃分萬人為一營凡三十營置三老從事各一人進至華隂中常有齊巫鼓舞祠城陽景王以求福助巫言景王大怒曰當為縣官何故賊有笑巫者輙病軍中驚動時方望弟陽怨更始賊其兄乃逆說崇等曰更始荒亂令不行故使將軍得至於此今將軍擁百萬之衆西向帝城而無稱號名為郡賊不可以久不如宗室仗義誅伐以此號令誰敢不服崇等以為然而巫言益甚前及鄭乃相與議曰今廹近長安而鬼神如此當求劉氏共尊立之六月遂立盆子為帝自號為建世元年又曰許楊字偉君汝南平輿人也少好術數王莽輔政召為郎稍遷酒泉都尉及莽簒位楊乃變姓名為巫醫逃匿他界莾敗方還鄉里又曰第五倫為㑹稽太守㑹稽俗多滛祀好卜筮人常以牛祭神百姓財産以之困匱其自食牛肉而不以薦祠者發病且死為牛鳴前後郡守莫敢禁倫到官移書屬縣曉告百姓其巫祝有衣託鬼神者詐怖愚人皆案論之有妄屠牛者吏輙行罰人初頗恐懼或呪詛妄言倫案之愈急後遂絶百姓以安又曰順帝時廷尉河南吳雄字季髙以明法律斷獄平起自孤官致位司徒雄少時家貧䘮母營人所不封土者擇塟其中䘮事趨辦不問時日巫醫皆言當㓕族而不顧及子訢孫恭三世廷尉為法名家又曰宋均為九江太守陵道縣有虞后二山人共祠之衆巫遂取百姓男女以為公嫗嵗嵗改易既而不敢嫁娶前後守令莫敢禁均乃下書曰自今以後為山娶者娶巫家勿􅅰良人於是遂絶又曰安丘望之字仲都京兆長陵人少持老氏經恬静不求進官號曰安丘丈人成帝聞之欲見望之辭不肯見為巫醫於人間也獻帝起居注曰李傕性喜鬼怪左道之術常有道人女巫繫神卜祭八丁符劾厭勝之具無不為又於朝廷省門外為董卓作神坐數以牛羊祠之天子使在中郎將李國持節拜傕為大司馬在三公之右傕自為得鬼神之助乃厚賜諸巫東觀漢記曰髙鳳年老執志不倦名聲著聞太守連召請恐不得免自言本巫家不應為吏又曰班超使西域于闐王廣德超至禮意甚疎其俗信巫言神怒何故向漢漢使有驪馬急求取以祠我廣德就超請馬超許之而令巫自來取馬有頃巫至超即斬其首還廣德因辭譲之吳志曰景帝有疾求視鬼者得一人景帝欲試之乃取白鵝而埋之於中架小屋施床機以婦人紙履服物着其上乃使覡視之告曰若能說此冡中鬼形狀者即信當厚賜加賞矣竟日盡夕無言帝問之急乃曰實不見有鬼但見一白鵝立墓上所以不即白之者疑是鬼神變化作此相當候其真形而定無復移易不知何故不敢不以實上聞景帝乃厚賜之晉書曰夏統字仲御從父敬寧祠先人迎女巫章丹陳珠二人並有國色裝服甚麗善歌舞又能隠形匿景甲夜之初撞鐘擊鼔間以絲竹丹珠乃拔刀破舌吞刀吐火雲霧杳冥流光電發統諸從兄弟欲徃觀之難統於是共紿之曰從父間病疾得瘳大小以為喜欲因其祭祀並徃賀之卿可俱行乎統從之入門忽見丹珠在中庭輕歩徊舞靈談鬼笑飛觸挑拌酬酢翩翻統驚愕而走不由門破藩直出又曰武悼楊后既為賈后所幽死賈后又信妖巫謂太后必訴寃先帝乃覆而殯之施諸厭劾符書藥物又曰李矩屯滎陽劉聰遣從弟暢歩騎三萬討矩屯于韓王故壘時暢卒至城東未暇為備遣使奉牛酒詐降於暢暢大饗渠帥人皆醉飽矩謀夜襲之兵士以賊衆皆有懼色矩令郭誦禱鄭子産祠曰君昔相鄭惡鳥不鳴凶胡臭羯何得過庭使巫揚言東里有教當遣神兵相助將士聞之皆踊躍爭進又載記曰石虎太子􅃉保母劉芝初以巫術進既養􅃉有深寵通賄賂豫言論權傾朝廷親貴多出其門封芝為宜城君又曰李雄母羅氏死雄信巫覡之言多有忌諱至欲不塟其司空趙肅諫之宋書曰前廢帝子業好遊華林園竹林堂使婦人倮身相逐有一婦人不從命斬之後經少時夜夣遊後堂有一女子罵曰爾悖虐不道明年不及熟矣帝怒遂於宫中求得似所夣者戮之其夕復夣所戮女罵曰汝枉殺我以訴上帝至是巫云此堂有鬼帝日與隂山公主及六宫綵女凡數百人隨郡巫捕鬼屏除侍衛帝見自射之又曰王僧綽豫叅朝政兄徵懼其太盛勸令損抑僧綽乃求吳郡及廣州並不許㑹巫蠱事泄上先召僧綽具其言之又曰明帝選王儉尚陽羡公主拜駙馬都尉帝以儉嬌母武康主因太初蠱事不可以為婦姑欲開冡離塟儉因入自陳宻以死請故事不行齊書曰鬱林王在西州令女巫楊氏禱祝急求天位及文惠薨謂由楊氏之力倍加敬信呼楊姿宋氏已來人間有楊姿兒歌蓋此徵也武帝有疾又命楊氏日夜祈禱又曰明帝身有衣絳衣服飾皆赤以為厭勝巫覡云後湖水願經過宫内致帝有疾帝乃自至太官水溝左右啓太官無此則不立决意塞之欲南引淮流㑹崩事寢又曰東昏侯偏信蔣侯迎來入宫晝夜祈禱左右朱光尚詐云見神動輙諮啓並云降福遂加位國朱又為靈帝車服羽儀一依王者又曲信小祠日有十數巫師魔媪迎送紛紜光尚輙託云神意范雲謂光尚曰君是天子要人當思百全計光尚曰至尊不可諫止當託神鬼以達意耳後東入樂遊人馬忽驚以問光尚光尚曰先帝大瞑不許數出帝大怒拔刀與光尚尋覔既不見處乃縛菰以為人形比而斬之又曰諸暨東洿里屠氏女朱明病痼疾親戚相棄鄉里不容女移父母遠住紵舍晝採樵夜紡績以供養父母俱卒親營殯葬負土成墳忽空有聲云汝性可重山神欲相報使汝可為人療病必得大富女謂是魃魅弗敢從遂得病積時鄰舍人有溪蜮毒者女試療之自覺病便差遂以巫道為人療病無不愈家産日益鄉里多欲娶之女以無兄弟誓守墳墓不嫁又曰武陵王畢為祠部尚書巫覡或言曰畢有非常之相以此自負武帝聞之故無寵未常處方岳焉又曰王敬則母為女巫常謂人云敬則生時胞衣紫色後應得鳴鼓角人笑之曰汝子則為人吹角可矣後果封侯給鼓吹又曰袁君政字世忠為豫章内史性不信巫邪有師世榮稱道術為一郡巫長君政在郡小疾主簿熊丘薦之師云湏病者衣為信命君政以所着襦與之事竟取縛云神將送與北斗君政使檢諸身於衣裏獲之以為亂政即刑於市而焚神一郡無敢行巫梁書曰沈約病夣齊和帝劔斷其舌令巫視之言如夣乃呼道士奏赤章於天稱禪代之事不由已出又曰元帝背生黑子巫媪見曰此大貴不可言又曰蔡撙為臨海太守有百姓楊元孫以婢採蘭貼與同里正黄權約生子酬乳哺直權死後元孫就權妻吳氏贖婢吳背約不還元孫訴撙判還本主吳能為巫出入撙内以金釧賂撙妾遂改判與吳元孫撾登聞鼓訟之為有司劾時撙已去郡雖不坐而常以為恥又曰王神念為青冀二州刺史性剛正所更州郡必禁止滛祠時東北有石鹿山臨海有神廟祓巫欺惑百姓遠近祈禱糜費極多及神念至便令毁拆風俗遂改後魏書曰郭祚少而孤貧姿貌不􅊆鄉人莫之識也有女巫相祚後當富貴祚渉厯經史習崔浩之書尺牘文章見稱於世舉秀才對䇿上第拜中書博士累遷黄門侍郎又曰定州流人觧思安其兄慶賔懼後追責規絶名貫乃認城外死屍詐稱其弟為人所殺迎歸殯葬頗類思安見者莫辨又有女巫楊氏自云見鬼說思安被害之苦飢渇之意慶賔又誣疑同軍兵蘇顯甫李蓋等所害經州訟之二人不勝楚毒各自欵引獄將决李崇疑而停之宻遣二人非州内所識者偽從外來詣慶賔告曰僕住在北州比有一人見過寄宿夜中共語疑其有異便即詰問迹其由緒乃云是流兵背役逃走姓觧字思安時欲送官苦見求稱有兄慶賔今住揚州相國城内嫂姓徐名脱矜愍為徃告報見申委曲家兄聞此必重相報所有財當不愛惜今但見質若徃不獲送官何晩是故相告指申此意君欲見顧幾何當放賢弟若其不信可見隨看之慶賔悵然失色求其少停當備財物此人具以報崇攝慶賔問曰爾弟逃亡何故妄認他屍慶賔伏引更問蓋等乃云自誣數日之間思安亦為人縛送崇召女巫視之鞭笞一百崇斷獄精審皆此類也三國典略曰初齊神武之克鄴城於北上臺建立䄂文蓋布衣時所䄂也每祠之日惟與巫潘嫗父數人行事親自宰割外無見者至是齊主焚除此廟并擲巫於火令殺燒之又曰齊髙緯夜夣黑衣貴人迭相驅逐乃向之拜巫者烏衣以厭之又於華林園自著破衣裳為窮兒入市躬自交易焉築西鄙諸城為羌兵鼓譟凌之多作黑衣人共相執縛親率内叅臨拒或實彎弓射人自晉陽東廵單馬馳騖前不得有人衣解髪散而歸又曰崔季舒未遇害家池蓮莖化為人面着鮮卑㡌妻盡魘魘寤云見人長一丈遍體黑毛欲來逼已巫曰此是五道將軍入宅者不祥又曰侯景之首至於江陵梟之於市然後煑而漆之以付武庫先是謡曰苦竹町市南有好井荆州軍殺侯景及首至湖東付諮議叅軍宗季長季長宅東有苦竹町以景首置其中用市南井水煑之先是巫言有鬼萬計斷頭折脛入宅去來云季長大懼設齋迎佛有數萬鳥自江津飛噪集其家焉北史曰齊琅琊王儼之未獲罪鄴北城有白馬佛塔是石季龍時為澄公所作儼將修之巫曰若動此浮圗北城失主不從破至第二級得白蛇長數丈廻旋失之數旬而敗又曰竇㤗母初夣風雷暴起若有雨狀出庭觀之見電光奪目駛雨霑灑寤而驚汗遂有娠朞而不産大懼有巫曰渡河湔裙産子必易便向水所忽見一人曰當生貴子可徙而南㤗母從之俄而生㤗隋書曰衛昭王爽討突厥明年徵為納言髙祖甚重之未幾爽寢疾上使巫者薛榮宗視之云衆鬼為厲爽令左右驅逐之居數日有鬼物來繫榮宗榮宗走下階而斃其夜爽薨又曰李景為代州搃管先是府内井中甃上生花如蓮并有龍見時變為鐡馬甲士又有神人長數丈見於城下其跡長四尺五寸景問巫對曰此是不祥之物來食人血耳景大怒推出之旬日而兵至死者數萬焉又曰李宻破宇文化及化及還其勁兵良馬多􅀾死士卒皆勸王世充欲乗其弊而擊之恐人不一乃假托鬼神言夢見周公乃立祠於洛水上遣巫宣言周公欲令僕射急討李宻當有大功不則兵皆疫死兵多楚人俗信妖妄故出言以惑之衆皆請戰太平御覽卷七百三十四
