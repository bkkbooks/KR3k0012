body:
  text: 太平御覽卷九百六十宋李昉等撰木部九皂莢辛夷茱茰糓蔦合歡白銀􅚴桄榔欀杔莎木木綿杬魄樕樸檴奕文木詔平仲君遷古度柜具多射干時好摩厨榕尖漏都桶都咸千嵗慎火勝火播栘皂莢廣志曰雞栖子皂莢也宋書曰明帝憎婦人妬劉休妻王氏妬帝聞之賜休妾勅王氏二十杖令休於宅後開小店使王氏親賣掃箒皂莢以此辱之齊書曰明帝每用皂莢訖餘與左右曰此猶堪明日用又曰王儉素恨虞玩之東歸儉不出送朝廷無祖餞者玩之卒後員外孔皚詣儉求㑹稽太守儉方盥投皂角於地曰卿卿俗惡虞玩之至死煩人三國典畧曰梁元初甘露降荆州皂莢樹陳書曰梁末童謡云不見馬上郎只有黄塵起黄塵汚人衣皂莢相料理及王僧辨平群臣奏高祖曰王僧辨本乘巴馬擊侯景馬上郎王字也黄塵陳也世不解皂莢之義及陳滅於隋氏姓楊楊者羊也説者以江東人謂羖羊角為皂莢神仙傳曰劉綱受老君道成上大皂莢樹飛去入雲又曰雲翁斬皂莢樹以杯承之皆是好酒洛陽宫殿簿曰建始殿前槐及皂莢二十株幽明録曰曲阿虞晚所居宅内有一皂莢樹大十餘圍高十餘丈枝條扶疎䕃覆數家諸鳥依其上晚令砍上枝巢墮胎死空中有罵者曰虞晚汝何意伐我家居更以瓦石擲之大小並委頓如此一年消滅扶南傳曰安息國出酢皂莢可食味羡美范子計然曰皂莢出三輔上價一枚一錢葛洪治溺死方曰𢷬皂莢褁以綿納死人下部中水出即活辛夷本草經曰辛夷一名辛引一名侯桃一名房木神農本草曰辛夷生漢中魏興凉洲川谷中其樹似杜仲樹高一丈餘子似冬桃小楚辭曰飲菌若之朝露兮構桂木而為室所飲食潔清所處芬香雜橘柚以為園兮列辛夷與椒楨又曰乘赤豹兮從文狸辛夷車兮結桂旗茱茰洞林曰郭璞避難至新息有人以茱茰令璞射之璞曰子如小鈴含𤣥珠構支言之是茱茰説文曰椒似茱茰出淮南揚州有茱茰樹風土記曰茱茰椒也九月九日成熟赤色可採世俗亦以此日折茱茰費長房云以挿頭髻可避惡雜五行書曰舍東種楊茱茰各三株增年益夀除患害曹植樂府歌曰茱茰自有芳不若桂與蘭糓毛詩鶴鳴曰樂彼之園爰有樹檀其下維糓糓惡木也詩義疏曰幽州謂之糓桑或曰楮桑荆揚交廣謂之糓今江南績其皮以為布又搗以為紙長數丈潔白光澤甚好葉初生可以為蔬説文曰糓楮也裴淵廣州記曰蠻夷取糓皮熟搥為褐褁髻布鋪以疑􅂒錢塘記曰靈隠山四布似蓮華中央夾生糓樹甚高大韓子曰宋人有為其君以象刻楮葉者三年而成亂之楮葉中而不可别也呉氏本草曰糓樹皮治喉閉喉痺一名楮魏王花木志曰南方記楮子如梅實二月花色仍連實七八熟土人鹽藏之味辛出交趾蔦音鳥爾雅曰寓木宛童也寄生樹也一名蔦漢書曰武帝使東方朔射覆郭舍人曰朔中榜臣百不中賜臣帛乃覆樹上寄生朔曰蔞藪也舍人曰朔果不中朔曰生肉為膾乾肉為脯着肉為寄生盆下為蔞藪上令榜舍人合歡古今注曰欲蠲人之憂則贈以丹棘丹棘一名忘憂欲蠲人之忿則贈以青棠青棠一名合歡能忘忿枝葉繁弱枝相交結每一風來輙自相解不相牽綴嵇康種之舍前本草經曰合歡味甘平生川谷安五臟和心氣令人歡樂無憂又曰服之輕身明目出益州仲長統昌言曰漢安帝時有異物生長樂宫東廡栢樹永巷南閨合歡樹議者以為芝草也群臣皆賀受賜晉宫閣名曰華林園合歡四株神農本草曰合歡生豫州河内川谷其樹似狗骨樹嵇康養生論曰萱草忘憂合歡蠲忿白銀湘洲記曰益陽縣西山多銀木晉宫閣名曰華林園白銀八株􅚴交州記曰􅚴赤色堪作牀逰名山志曰樓石山多章􅚴皆為三四五圍鄧徳明南康記曰南康縣瞢忘鄧切水極源去郡並九百地多章􅚴樹桄榔蜀志曰興吉南漢縣桄榔樹峰頭生葉有麺大者收麺乃至百斛華陽國志同呉録曰交趾南海縣出桄榔中有米屑為麺臨海異物志曰桄榔木外皮有毛似栟櫚而散生䋏音昨綆漬之不腐其木剛作鈠釤鋤利如鐵中濕更利惟中焦即致敗耳皮中有粉似稻􅀈又似麥麵取麵裹餅餌甚美廣志曰桄榔樹大四五圍長五六丈拱直旁無枝條顛頂生葉似椶葉斫其木肥堅難傷入數寸得麵博物志曰蜀中有樹名桄榔皮裏出屑如麵用作餅食謂之桄榔麵魏王花木志曰桄榔出興吉國者樹高七八丈其大者一樹出麵百斛交趾又有樹其皮有光屑取之乾𢷬以水淋之如麵可作餅餌嶺表録異曰桄榔樹枝葉並蕃茂與棗㯽榔等樹小異然葉下有鬚如鹿馬尾廣人採之以織巾其子尤宜鹹水浸漬即麄脹而韌彼人以此縳舶不用釘線木性如竹紫黑色有文理而堅工人解之以制博奕局此樹皮中有屑如麵可為餅食之水經曰漢興縣溪中多生邙竹桄榔樹出緜而夷人資以自給欀音湘杔呉録地理志曰交趾望縣有欀樹其皮中有如白米屑者乾𢷬水淋之似麵可作餅郡内皆有之左思呉都賦曰文欀貞橿莎木蜀志曰莎木大四五圍長六七丈樹顛生葉出麵一樹出一石正白而味似桄榔南中八郡志曰莎樹大四五圍長十餘丈樹皮能出麵大者百斛色黄鳩民部落而就食之廣志曰莎樹多枝葉兩邉行列若飛鳥翼其麵色白樹收麵不過一斛𢷬篩乃如麵不則如磨屑為飯滑軟木綿呉録地理志曰交阯定安縣有木緜樹高大實如酒杯中有綿如絲之綿又可作布名曰緤一名毛布廣州記曰枝似桐枝葉似胡桃而稍大出交廣二州羅浮山記曰木綿正月則花大如芙蓉花落結子方生綿出葉耳子内有綿甚白蠶成熟則南人以為緼絮絡葵博物志曰人食絡葵為狗囓則瘡不或致死蔊字林曰蔊辛菜也荶字林曰荶菜似蒜生水中波稜唐書曰太宗時尼婆羅獻波稜菜葉類紅藍實如蒺藜人食之能益食味太平御覽卷九百六十
