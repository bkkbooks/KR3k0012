  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_800-1a, image: WYG0900/WYG0900-0106a.png}
body:
  text: 太平御覽卷八百宋李昉等撰四夷部二十一北狄二總叙北狄下史記曰唐虞以上有山戎獫狁葷粥又曰武王伐紂而營雒邑復居扵豐鎬遂放戎狄涇浴之北乃入貢命曰荒服又曰趙武靈王北破林胡樓煩築長城自代傍隂山下至髙闕為塞而置雲中鴈門代都漢書曰山戎伐燕告急扵齊桓公北伐山戎山戎走又曰晉文公攘戎翟居于西河圁洛之間號曰赤翟白翟師古曰春秋所書晉師滅赤狄潞氏卻缺獲白狄又曰晉北有林胡樓煩之戎燕北有東胡山戎服􅐚曰烏桓之先也後為鮮卑又曰晉悼公使魏絳和戎翟戎翟朝晉後百餘年趙襄子踰句注而破之并代以臨胡貉後與韓魏共滅智伯分晉地而有之則趙有代句注以北而魏有西河上郡以與戎畧又曰秦滅六國而始皇帝使䝉恬將數十萬衆北擊胡悉収河南地因河為塞築四十四縣城臨河徙讁戍以充之而通直道自九原至雲陽因邊山險壍谿谷可繕者繕之起臨洮至遼東萬餘里又渡河據陽山北假中當是時東胡強而月氐盛又曰􅄧日旄頭胡星也昴畢間為天街胡貉月氐扵喪引之民􅄧之主又曰揚雄上書云北地之狄五帝所不能臣三王所不能制又曰前世豈樂傾無量之費役無罪之人快心扵狼望之北哉以為不一勞者不久佚不暫費者不永寕是以忍百萬之師以摧餓虎之喙運府庫之財填盧山之壑而不悔也又曰狄不服中國未得髙枕安寝也又曰外國天性忿鷙形容魁徤負力怙氣難化以為善易𨽻以惡其強難詘其和難得故未服之時勞師逺攻又曰狄真中國之堅敵也又曰王莾征匈奴嚴尤諫曰周秦漢征之皆未得上策者也周得中策漢得下策秦無策焉周宣王時獫狁内侵至扵涇陽命將征之盡境而還其視戎狄之侵境譬猶蛟蟲之螫敺之而已故天下稱明是為中策漢武帝選將練兵約齎輕糧深入逺戍雖有克獲之功胡輙報之兵連禍結三十年中國疲耗匈奴亦創艾而天下稱武是為下策秦始皇不忍小耻而輕民力築長城之固延袤萬里轉輪之行起扵負海疆場既完中國内竭以喪社稷是為無策今天下比年饑饉三十萬衆具三百日糧兵先至者聚居暴露勢不可用一難也邊既空虛内調郡國不相属及此二難也計一人三百日食用糧十八斛非牛力不能勝胡地沙鹵多乏水草軍出未滿百日牛必物故此三難也胡地秋冬甚寒春夏甚風食糒飲水師有疾疫此四難也輜重自隨則輕鋭者少幸而逄虜危殆不測此五難也莾不聽又曰夷狄之為患也考自漢興忠言嘉謀之臣曷嘗不運籌策相與争扵廟堂之上乎髙祖時則文敬吕后時有樊噲王恢韓安國季布孝文時賈誼晁錯孝武時有朱買臣公孫𢎞董仲舒人持所見各有異同然揔其要歸兩科而已搢紳之儒則守和親介胄之士則言征伐皆偏見一時之利害也又曰文帝徙六郡良家材力之士聚天下精兵軍扵廣武顧問馮唐與論將帥喟然歎息思古名臣此和親無益之明効也又曰董仲舒以匈奴可恱以厚利結之以盟誓故與之厚利以没其意與盟扵天以堅其約質其愛子以累其心使邊城守境之民父兄緩帯稚子咽哺胡馬不窺扵長城而羽檄不行扵中國不亦便扵天下乎又曰孝武時雖征伐克獲而士馬物故亦各相當雖開河南之野建朔方之郡亦棄晉陽之北九百餘里匈奴人民每年來降漢單于亦輙拘當漢使以相報復其桀鷔尚如斯又曰孝宣之世單于臣服三世稱藩賔扵漢庭是時邊城晏閉牛馬布野又曰王莾簒位始開邊隙單于由是歸怨自絶莾斬其侍子邊境之禍搆矣又曰蕭望之曰戎狄荒服言其來服荒忽無常時至時去宜待以客禮又曰夷狄之人飲食不同言語不通僻居北郵寒露之野逐草隨畜射獵為生隔以山谷擁以沙幕天地所以絶外内也又曰晁錯上書曰戰勝之威民氣百倍敗兵之卒没世不復自髙后以來隴西三困扵匈奴矣民氣破傷罔有勝意又曰以蠻夷攻蠻夷中國之形也今匈奴地形技藝與中國異上下山坂出入溪澗中國之馬弗與也險道傾反且馳且射中國之騎弗與也風雨罷勞饑渇不困中國之人不與也此匈奴之長技也又曰材官騶發矢道同的則匈奴之革笥木薦弗能支也又曰胡貉之地積隂之處也木皮三寸凍厚六尺食肉而飲酪其人宻理鳥獸毳毛其性耐寒又曰胡人衣食之業不著扵地其勢易以擾亂邊境何以明之其俗如飛鳥走獸廣野美草甘水則止草盡水竭則移以是觀之往來轉徙時至時去此矯捷之生業也又曰匈奴欲立威者始扵折膠後漢書曰耿秉上言曰今北虜分争以夷伐夷國家之利又曰聞匈奴𫝊論曰并兵窮討掩其宻宂躡北追奔三千餘里破龍祠焚􅄢幕銘功封石偈呼而旋又曰王莾時盧芳詐稱武帝之後奔匈奴十二年芳與賈覽共攻雲中久不下其將隨昱得芳之衆昱詣闕拜昱為五原太守封鐫胡侯晉書曰前漢末匈奴大亂五單于爭立而呼韓邪單于失其國携率部落入臣扵漢嘉其意割并州北界以安之扵是匈奴五千餘落入居朔方諸郡與漢人雜處後漢末群臣競言胡人猥多宜先為之所建安中魏帝始分其衆爲五部立其中貴者爲帥復改帥爲都尉其左部都尉所統可萬餘落居扵太原右部都尉可六千餘落居祁縣中部都尉可六千餘落居大陵縣又曰晉武帝踐祚後匈奴二萬餘落歸化帝復納之使居河西故宜陽城下復與晉人雜居由是平陽西河新興上黨樂平靡不有焉又侍御史郭欽上䟽曰戎狄强獷歴古爲患魏初置西北諸郡皆爲戎居今雖服從若百年之後有風塵之警胡騎自平陽上黨不三日而至孟津北地河西太原馮翊安定上郡盡爲狄庭矣宜及平呉之威謀臣猛將之略出北地西河安定復上郡實馮翊扵平陽以北諸縣募取死罪徙三河三魏四萬家以充之裔不亂華漸徙平陽𢎞農魏郡京兆上黨雜胡峻四夷出入之防明先王荒服之制萬世之長策也又曰太康七年有萎莎胡率部來降又曰北狄以部落為類其入居塞者有鮮支種有烏譚種有赤勒種有捍蛭種有萎莎種有赤莎種有欝鞞種有秃童種有大樓種不相雜錯又曰其國號左賢王右賢王左弈蠡王右弈蠡王左扵六王右於六王左漸尚王右漸尚王左朔方王右朔方王左獨鹿王右獨鹿王左顯鹿王右顯鹿王左安樂王右安樂王凡十六等皆用單于親子弟賈誼新書曰臣聞强國戰智王者戰義帝者戰德故湯祝網而漢陰降舜舞干羽而三苗服今漢帝中國也宜以厚德懷四夷孰敢不承帝意陛下爲臣建三表設五餌以此與單于爭則下匈奴猶振槁也臣且以事勢諭天子之言使匈奴大衆信陛下也若日出之灼灼故聞君一言雖有㣲逺其志不疑仇讎之人其心不殆若此則信諭矣一表也臣又且以事勢諭陛下之愛匈奴之自視也苟狄面而戎狀者其自以爲見愛扵天子也猶弱子之扵慈母也若此則愛諭矣一表也臣又且以事勢諭陛下之好令胡人之自視也苟其技之所長與其所工可以當天子之意如此則好諭矣一表也愛人之狀好人之役愛有實以諾可期十死一生彼必將至此謂三表匈奴之來者家長以上必衣繡家少者乃衣文錦爲銀車五乘大雕畫之駕四馬載緑盖從數騎御驂乘且雖單于之出入也不輕都此矣今匈奴降者時時得此而賜之一國聞之見之者希心而相告人人冀倖以為吾至可以得此將以壞其目一餌也匈奴之使至者若天降者也大衆之聚也上必將召賜食焉飯物盛美胾炙醯醢方數尺扵前令一人坐此胡人觀者數在旁得賜者之喜也且笑且飯味皆所嗜而謂未嘗得也令來者時時得此而饗之一國聞之者見之者涎而相告人自以吾至亦將得此以此壞其口一餌也降者若使者至也必使人有所召客焉胡人之欲觀者勿禁令婦傳白黒繡衣而侍其堂者三二十人或薄或掩為其故戱使樂府吹簫皷鞀令使降者時得此而樂一國聞之者見之者人人唯恐其後至也以此壞其耳一餌也凡降者陛下必有所居令有髙堂􅃉宇善厨大囷廐有編馬庫有陣車時時大具召胡客饗胡令其居處樂皆過其慮其單于或出時時賜此匈奴一國傾心而冀人人汲汲其時將以此壞其腹一餌也扵來降者上必時時所召幸拊循而後得入官扵胡嬰兒貴人子好可愛有數十人爲繡衣出則更從入則更侍胡嬰兒得近侍胡貴人得佐酒上前使付酒錢出繡衣具帯衣服時以賜之令數人得此而居之一國聞者見者人人唯恐後至也以此壞其心一餌也晉中興書曰北狄其地南接燕趙北並沙漠東漸九夷西界六戎世世自祖君臣不禀中國正朔西域記曰諸胡俗婚姻相然許者先送同心指環崔豹古今注曰秦所築長城土色如紫漢塞亦然故稱紫舉焉李陵報蘇武書曰終日無覩但見異類韋韝毳幕以禦風雨又曰出禮義之鄉入無知之俗又曰胡笳夜動牧馬悲鳴吟嘯成群邊聲四起又曰鑠王師兮征荒裔勦匈奴兮截海外封神邱兮建隆碣熙帝載兮振萬世古詩曰胡馬依北風越鳥巢南枝蔡琰詩曰邉亭與華異胡風春夕起陸機樂府詩曰駈馬陟隂山山髙馬不前借問燕山侯勁虜在燕然古詩曰出自薊北門遥望胡地桑陳琳樂府詩曰飲馬長城窟水寒傷馬骨太平御覽卷八百
