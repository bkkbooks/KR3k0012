  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_022-1a, image: WYG0893/WYG0893-0199c.png}
body:
  text: 太平御覽卷二十二宋李昉等撰時序部七夏中夏中莊子曰井魚不可以語海夏蟲不可以語氷文子曰政失于夏熒惑逆行夏政不失則降時雨列子曰鄭思文學琴于師襄當夏而叩羽弦以召黄鐘霜雪交下川池暴泙管子曰夏日不煬非愛火也冬日不盥非愛水也為不適于身不便于體也夫明王不美宫室非喜小也為傷本也又南方其時曰夏夏氣陽陽生火其徳施舍是謂曰徳又春不收枯骨朽胔伐枯木而去之則旱至矣鄒子曰季夏取桑柘之火尸子曰夏為樂南方為夏夏興也南任也是故萬物莫不任興蕃殖充盈樂之至也韓子曰季孫相魯令五月掘長溝子路輙私飯之孔子覆其飯曰魯有民焉汝輙愛之何也淮南子曰明庶風後四十五日清明風至則出幣帛使諸侯立夏長養布恩惠故聘問諸侯抱朴子曰洪從祖仙翁每大醉夏輙入源泉底一日許乃出能閉氣胎息故耳又謂夏必長而蒜麥枯謂冬必凋而竹栢茂曰盛陽宜暑夏天未必無凉日極隂宜寒隆冬未必無暫温也又曰世之豪士暑夏之日露首袒身唯在樗蒲彈碁不離綺紈之側也又曰或問不熱之道答曰或以立夏日服六壬六癸之符或服𤣥冰之丸或服飛霜之散幽求子曰扇翣徹動凉風夏生范子計然曰德取象於春夏刑取象於秋冬周書時訓曰六月節温風至温風不至即時無寛教蟋蟀居壁若不居壁恒急之暴又曰鷹乃學習若不學習㓂戎不備又曰六月中氣後五日腐草化為螢若不化螢即穀實鮮落土潤溽暑若不溽暑即急應之罰大雨時行若不時行即恩不及下又曰夏取棗杏之火符瑞圖曰麟夏鳴曰養真隠訣曰四月戌日天地凶門日不可入山建創四月十一日地破日不可開山動土又曰立夏之日日中玉帝㑹諸仙人於紫微宫見四真人論求道之功罪董勛問禮俗曰五月俗稱惡月俗多持齋放生案月令仲夏隂陽交死生分君子齋戒止聲色節嗜慾素問曰岐伯曰夏三月此謂蕭季天地氣交萬物華實夜卧早起毋厭於日使志毋怒使英華成秀使氣得泄若所愛在外此夏氣之應養生之道也逆之則傷心秋為痎瘧冬至重病大衍星分圖曰五月午日日月㑹于鶉首又曰六月日月㑹于鶉火嶺表録異云枹木屐輕如通草夏月著之隔卑濕地氣如杉木今廣州諸郡牧守初到任皆有枹履又曰南中夏秋多惡風彼人謂之颶南越志云風起則人心恐懼或云風四面具足二義皆有理也壞屋折樹不足喻也甚則吹屋瓦如飛蝶或二三年不一風或二年兩三風亦繫亷帥政德之否臧者然𤼵則自午及酉夜半必止此乃飄風不終朝之義也投荒録曰新州男子婦人皆縝髮如雲每沐以灰投水中遂就水而沐之以彘膏塗其髮五六月秔秫未穫時民飢盡髠取髮鬻于市既髠即復以彘膏塗之至來年五六月又可鬻矣投荒録曰嶺南方盛夏率一日十餘隂十餘霽雖大雨傾注頃即赫日已復驟雨大凡嶺表夏之炎熱甚於北土宜州特熱又多蒸鬰此為甚惡自三月至九月皆蒸熱梁元帝纂要曰夏曰朱明夏氣赤而光明亦曰長贏以征切朱夏炎夏三夏九夏天曰昊天言氣浩汗風曰炎風節曰炎節草曰茂草雜草木曰蔚林茂林宻樹茂樹孟夏亦曰維夏首夏季夏亦曰徂暑徂往也言暑始往四時纂要曰四月也是謂乏月冬穀既盡宿麥未登宜賑乏絶救飢窮九族不能自活者救之無固藴畜而忍人之貧貪貨殖之宜忘種福之利君子弗取也陸機纂要曰夏樹名連隂夏雨名綿雨攝生月令曰四月為乾生氣卯死氣酉是月也萬物已成天地化生勿冒極熱勿大汗後當風勿暴露星宿皆成惡病勿食犬秫勿含生薤勿食雞肉勿食虵蟬是月肝臟少氣不行火氣漸臨水力漸衰稍補腎助肺調和胃氣無失其時是月八日不逺行宜安心静念沐浴齋戒必得福慶齊民月令曰四月八日不宜殺草木始服生衣宜進温酒服温藥是月也無壞麛卵伐大樹是月也宜以夙興酉陽雜俎曰俗忌五月上屋言人五月蛻精神如上屋即自見其形魂魄則不安矣窮神秘苑幽明録曰漢武帝與羣臣宴於未央殿方食棗帝見梁上有一老翁長八九寸仰觀屋宇視帝脚東方朔曰此水木之精其名操兼夏乃巢林冬即居河此來訴爾殿名未央仰視者謂未止也下視脚者願止此也帝乃悉罷諸役徐整長厯曰北斗當崑崙氣注天下春夏為露秋冬為霜兵書曰夏出兵赤旗在前執前行地鏡經曰五月中草木葉有專厚而無汁枝下垂者其地有玉師曠占曰春夏一日有霜雪者君父治政大嚴將以大殺天下人也何以言之霜威殺萬草坐大殺也見變如此宜損威重人之命也焦贛易林曰仲春孟夏和氣所在生我嘉福國無殘賊又曰六月種黍歲晩不雨秋不縮酒神失其所趙自勉造化權輿云潮者隂陽之氣所激五月無潮隂氣微也八月最大則隂盛也陸機要覧曰昔雨山有神人焉逍遥於中岳與左元放逰薊子訓所坐欲起子訓意欲留之一日之中三雨今呼五月三時雨亦為留客雨桓譚新論曰漢中逸人王仲都夏大暑使曝日坐又環以十爐火不言熱而身不汗出五行大義論曰未者昧也隂氣已長萬物稍衰其體薆昧於未又時物向成皆有氣味也又曰六月採芑征伐無道張仲方叔尅勝飲酒五行體性論云土在四時之中處季夏之末陽衰隂長居位之中總於四德謂金木水火積塵成實氣則有間有間故水火成實所能持也故土以含散持實為體稼穡為性又曰土苞四德故其體兼虛實也論衡曰夫虎出有時猶龍見有期也隂物以冬見陽蟲以夏出出應其氣氣動其類參伐以冬出心尾以夏見參伐則虎星心尾則龍象星出而物見氣至而類動天地之性也又盛夏之時當風而立隆冬之月嚮日而坐其夏欲得寒冬欲温也或當風鼓翣向日燃爐然而天終不為冬夏氣易者寒暑有節不為人變改又陽燧取火于五月丙午日中之時消煉五石鑄以為器摩勵生光仰以向日則火來至此取真火之道也又陽燧取火於天消鍊五石五月盛夏鑄以為噐乃能得火今又但取刀劍銅鈎之屬摩以向日亦得火焉又以夏進爐以冬奏奏亦進也扇此無益人君不遇灾患幸矣又方今盛夏雷雨時至龍多登雨雲雨興龍相應乘雲雨而行物類相致非有為也又夏蜻蛚蟋蟀也鳴寒螿啼感隂氣也雷動而雉驚啟蟄而蛇出感陽氣也又世俗之事亦有縁也夫正月嵗始五月陽盛子以此月生精盛熾熱厭勝父母父母不堪將受其患羣相倣傚莫不謂然然有空諱之言無實凶之效世俗惑之誤謂舉正月五月子者子將殺父與母不得舉也以舉之父母偶死則信而謂之真矣夫正月五月子何故殺父與母人之含氣在腸腹之内其生十月而産共元氣也正月與二月何殊五月與六月何異而謂之凶世傳此言久矣又震雷者乃太陽之微氣也何以明之正月始雷五月陽盛故五月雷迅冬乃雷潛盛夏之時太陽用事隂氣乘之隂陽分爭則相激射為毒毒中人輙死中木木折中屋屋壊諸葛亮出師表曰五月渡瀘深入不毛之地陶潛集曰潛常言五月六月中北牕下卧凉風暫至自謂羲皇上人穆天子傳曰季夏丁卯天子北升于舂山之上以望四野曰舂山是惟天下之髙山也孶木蕃不畏霜天子乃取孶木華之實持歸種之又天子四月休于濩澤今平陽濩縣澤是也濩音獲於是射鳥獲獸宋躬孝子傳曰何子平事母至孝年六十有孺子之慕夏避清凉永昌郡傳曰朱提郡有堂狼山山多毒草盛夏之月飛鳥過之不能得去嵇康髙士傳曰被裘公者吳人延陵季子出遊見道中有遺金顧而謂公曰取彼金公投鎌瞋目拂手而言曰何子之髙而視之卑五月被裘而負薪豈取金者哉季子大驚既謝而問姓名公曰吾子皮相之士而安足語姓名也襄陽耆舊傳曰黄穆字伯開博學為山陽守有德政弟奐字仲開為武陵太守貪穢無行武陵人諺曰天有冬夏人有二黄言不同也周處風土記曰仲夏雨濯枝盪川註云此節常有大雨名濯枝又梅熟時雨謂之梅雨又仲夏長風扇暑注云此節東南常有風至俗名黄雀長風盛𢎞之荆州記曰宜都銀山縣有風穴穴口大數尺名為大風井夏則風出冬則風入樵人有冬過者置笠穴口風吹之經日還涉長陽溪而得其笠又橘洲在郡南四里對南津看常如不及至夏水懷山諸洲皆沒橘洲獨在荆楚歲時記曰四月也有鳥名穫穀其名自呼農人候此鳥云犁耕岸爾雅曰鳲鳩鴶鞠郭璞云今布穀也江東呼穫穀崔寔正論云夏扈趍耕鋤即竊脂𤣥鳥鳴穫榖則其夏扈也又俗忌五月曝牀薦席異苑云新野庾寔嘗以五月曝席忽見一小兒死在席上俄失之其後寔子遂亡忌始於此或問董勛曰俗五月不上屋云五月人晚上屋見影魂便去勛答曰盖秦始皇自為之禁夏不得行漢魏未改案月令仲夏可以居髙明可以逺眺望可以升山陵可以處臺榭注云順陽在上也今云不得上屋正與禮悖所云見小兒死而禁曝席何以異此乎俗人月諱何代無之但當矯之歸於正洞㝠記曰東方朔母田氏寡夢太白星臨其上因有娠田氏歎曰無夫而孕人得棄我乃移向代郡之東方里五月生朔仍以所居為姓捜神記曰夫金之性一也以五月丙午日中鑄為陽燧以十一月壬子夜半鑄為隂燧言丙午日鑄為陽燧可取火壬子日鑄為隂燧可取水又吳猛性至孝小兒時在父母邊卧時夏月多蚊蟲而不揺扇懼蚊蟲去我及父母王子年拾遺記曰洞庭之山浮於水上其下有金堂數百間帝女居之四時聞金石絲竹之音徹于山頂楚懷王時與羣才賦詩於水濵故云瀟湘洞庭之樂聽之令人難去雖咸池簫韶之音不能比焉每四仲之節王常繞山以遊宴各舉四仲之氣以為樂章推仲夏律中夾鍾乃作輕風流水之詩讌于山南時中蕤賔乃作皓露秋霜之曲武昌記曰楚山東有小溪盛夏時凛然常有寒氣故謂之寒溪洽聞記云驩州安逺縣西北百六十里有温山其山冬夏常雨山傍有水冬夏常熱至寒時野獸依集水邊取其暖氣西京雜記曰天子夏設羽扇宋王元謨壽陽山記曰明義樓南有明義井夏有冷漿甜飲米飲羅羽扇有三浴室上以清王侯宰吏中以凉君子士流下以凉庶類也楚辭曰滔滔孟夏兮草木莽莽滔滔孟夏四月純陽用事煦然蒸萬物草木之類莫不莽莽然茂盛傷懷永哀兮汩徂南土徂往也太平御覧卷二十二
