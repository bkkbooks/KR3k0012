  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_580-1a, image: WYG0898/WYG0898-0317a.png}
body:
  text: 太平御覽巻五百八十宋李昉等撰樂部十八笛篪籥管笛釋名曰笛滌滌然也史記曰黄帝使伶倫伐竹於崑谿斬而作笛吹之作鳳鳴風俗通曰笛漢武帝時工人丘仲所造也本出羌中笛滌也所以滌邪穢納之雅正也長尺四寸七孔樂書曰笛者滌也丘仲所作可以滌蕩邪氣出揚正聲是故列和善吹裁十二之音應律荀朂樞問依三尺二調成均剪雲夢之霜筠法龍吟之異韻三孔為籥文舞執之邠人吹也五孔為􅐟械樂周師掌之六孔為笛羗人吹之七孔下調漢部用也今之七星古之長笛一定為調合鐘磬之均各有長短應律吕之度雅樂部内咸用之也馬融自叙曰融性好音律鼓琴吹笛為督郵獨卧郿平陽塢中有洛客舍逆旅吹笛相和融去京師踰年蹔聞甚悲而樂之追慕簫琴笙頌而笛獨無乃作長笛賦晉書曰桓伊字叔夏善音樂有蔡邕柯亭笛長吹之王徽之越京泊舟青溪側伊素不相識於岸上過徽之便使人謂之曰聞君善吹笛試為我一奏伊時已貴顯素聞徽之名便下車踞胡床為作三調之弄便上車去客主不交一言晉書向秀作思舊賦曰隣家有吹笛發聲寥亮追想疇昔遊晏之好晉中興書曰帝舅王愷甞置酒王遵王敦俱往女妓吹笛小失聲愷怒便令黄門毆殺之一座改容敦神色自若沈約宋書曰晉太始十年中書監荀朂中書令張華今郝生鼓琴宋同吹笛以為新引相和唐書曰文宗時雲朝霞以善吹笛進上為新聲雅樂朝霞能承意變聲頗符上㫖由是有寵世說曰謝仁祖妾阿紀有國色善吹笛仁祖死阿紀誓死不嫁郗曇時為北中郎設權計遂得阿紀為妾阿紀終身不與曇言幽明記曰永嘉中泰山巢氏先為相縣令居住晉陵家婢採薪忽有一人追尋隨婢還家不使人見見形者唯婢而已毎與婢飲宴輙吹笛而歌歌曰閑夜寂以清長笛亮且鳴若欲知我者姓郭名長生又曰代郡界有一亭常有怪不可詣止有諸生壮勇行歌止宿鬼吹五孔笛有一手都不能得攝笛諸生不耐忽便謂汝止有一手􅄼得遍笛我為汝吹來鬼云謂我少指耶乃出數十指指出諸生知其可擊㧞劒斫之得一老雄雞從者並雛雞文士傳曰蔡邕吿呉人曰吾昔常經㑹稽髙遷亭見屋椽竹東間第十六可為笛取用果有異聲右歌辭曰長笛續短笛長願陛下保夀無極傅子曰列和善吹笛呉姬之聲無以加也西京雜記曰髙祖初入咸陽宫周行府庫金玉珍寳不可稱言其尤驚異者玉笛長二尺三寸六孔銘曰昭華之琯樂纂曰唐𤣥宗時樂人孫處秀善吹笛好作犯聲當時皆以為新異流美樂人皆效之其聲變態日増因有犯調即今之所尚也又曰太和十年中書監荀朂中書令張華出御府銅竹律二十五具命太樂郎劉秀等較試其三具與杜䕫及左延年法律同其二十二具視其銘題尺寸是笛律也問恊律中郎将列和辭昔魏明帝時令和永受笛聲以作此律欲使學者别居一坊歌詠講習依此律調但識其尺寸之名則絲竹歌詠皆得均含歌聲濁者用長笛長律歌聲清者用短笛短律凢絃歌調張清濁之制不依笛尺寸名之則不可知也又曰黄鍾笛晉時三尺八寸元嘉九年太樂令鍾宗之減為三尺七寸十四年治書令史奚縱又減五分為三尺六寸五分劉和之東箱長笛四尺二寸又曰㽔賓箱笛晉時二尺九寸宗之減為二尺六寸縱又減二分為二尺五寸八分又曰姑洗箱笛晉時三尺五寸宗之減為二尺九寸七分縱又減五分為二尺九寸二分又曰司馬法軍中之樂鼓笛為上使聞之者壮勇而樂和細絲髙竹不可用也慮悲感人士卒思歸之故也又曰横笛小箎也漢靈帝好胡笛有胡笛箎岀於胡吹即此也梁胡歌云快馬不須鞭拗折楊栁枝下馬吹横笛愁殺路傍兒此歌辭元出北國知横笛是北國名今横笛皆去義觜其有觜者謂之義觜笛國史補曰李舟好事甞得村舍煙竹截以為笛堅如鐡石以遺李牟牟吹笛天下第一月夜泛江維舟吹之嘹亮逸發俄有客立於岸呼船請載既至請笛而吹其聲精壮山石可裂牟平生未甞見及入破呼吸盤擗應指粉碎客散不知所之舟著記疑其蛟龍也又曰李牟秋夜吹笛於𤓰州舟檝甚隘初發調群動皆息及數奏微風䬃然而至俄頃舟人賈客有怨嗟悲泣之聲篪釋名曰篪啼也聲從孔出如嬰兒啼聲也毛詩彼何人斯云伯氏吹塤仲氏吹篪周官曰巫師掌教吹篪爾雅曰大篪謂之沂郭璞曰篪以竹為之長一尺四寸圍圓三寸一孔上出寸三分名翹横吹之小者尺二犍為舍人曰大篪其聲悲沂鏘然也詩云仲氏吹篪也廣雅曰篪以竹為之長尺四寸有八孔前有一孔後有四孔頭有一孔月令仲夏之月命樂師吹篪詩莭南山云仲氏吹塤伯氏吹篪土曰塤竹曰篪箋云伯仲論兄弟也我為汝息如兄如弟其相應和如塤篪言俱為王臣宜相親愛之史記曰伍子胥至於江上無以餬其口行吟蒲伏肉袒吹篪乞食於呉市東觀漢記曰明帝幸南陽舊宅召校宫子弟作雅樂奏鹿鳴上御塤篪和之以娯嘉賓齊書曰世祖於南康郡作伎有絲無管空中聞有篪聲調節相應世本曰蘇成公造篪吹孔有觜如酸棗蘇成公平王時諸侯古史考曰古有篪尚矣蘇成公善篪而記者因以為作謬也又曰暴新公所造舊志曰一曰管史臣案非也雖不知暴新公何代人而非舜前人明矣舜時西王母獻管則是已有器新公安得造篪洞㝠記曰建元二年帝幸騰光䑓以望四逺於䑓上撞玉鐘擊懸離之磬吹霜條之篪唱來雲依日之曲洛陽伽藍記曰後魏河間王琛有婢朝雲善吹篪能為團扇歌隴上聲琛為秦州刺史羌叛屢討不勝琛令朝雲假為貧女吹篪而乞羌聞之皆流涕相謂曰何故捨墳井在山谷為㓂耶即相尋而降秦民語曰快馬健兒不如老嫗吹篪管蔡邕章句曰管者形長一尺圍一寸有孔無底其器今亡風俗通曰管漆竹長一尺六孔十二月之音象物貫地而牙故謂之管爾雅曰大管謂之簥其中謂之篞小者謂之􅩭郭璞注曰管長尺圍寸併漆之有底賈氏謂之如箎大孔建為舍人曰大管者聲髙大故曰簥簥者髙也中者聲精宻故曰篞篞者宻也小者聲音清故曰篎篎者妙也廣雅曰管象篪長尺圍寸有六孔無底班固曰黄帝作律以玊為管長尺六孔為十二月音至舜時西王母獻白玊管漢章十二年零陵營道舜祠下得笙一白玊管則古者又以玊為管矣班氏用銅之言或然之義未為得也求律所生太極之數起於一在子以三乗之得三在丒以次至酉得一萬九千八百四十三篇黄鍾之母以為法周天十二辰得十七萬七千一百四十七黄鍾之子以為實實始法而一得則九寸則諸律也大戴禮曰舜時西王母獻白玉琯說文管如篪六孔十二月之音物開地而牙故謂之管從竹官聲琯者古者有玉管焉樂法圖曰次主東律東律主黄鍾聖人承天樂用管宋均注曰管黄鍾九寸管也吹管者以知律管音調則律厯正周禮春官小師曰小師掌教簫管鄭司農曰箎如管六孔𤣥謂管如􅐟而外併兩而吹之又曰孤竹之管於圓丘奏之孫竹之管於方丘奏之隂竹之管於宗廟奏之鄭𤣥云孤竹竹特生者也孫竹竹枝根未生者也隂竹生山北籥釋名曰籥躍也氣躍出也爾雅曰大籥謂之産中者曰仲小者曰筠郭璞曰籥如笙三孔而短犍為舍人云仲其聲適仲吕也小者形聲細小曰筠也禮記曰葦籥伊祁氏之樂也籥春分之音萬物振躍而出也周官笙師掌教吹籥籥師教國子舞羽吹籥籥章掌豳籥鄭𤣥云如地之竹也又曰籥師掌教國子秋冬吹笛籥歴代文舞之樂所執羽籥毛詩曰左手執籥右手秉翟太平御覽巻五百八十
