  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_909-1a, image: WYG0901/WYG0901-0103a.png}
body:
  text: 太平御覽卷九百九宋李昉等撰獸部二十一狼狐狢狼爾雅曰狼牡貛牝狼其子獥吉堯切絶有力迅説文曰狼似犬銳頭而白頰前高後廣詩曰狼䟦其胡載㚄其尾㚄音致跲也又曰子之昌兮遭我乎峱之陽兮並驅従兩狼兮周禮天官獸人曰冬獻狼禮曰狼臅膏又曰君之車厥右虎裘厥左狼裘左傳曰伯石始生子容之母走謁諸姑子容母叔向嫂伯華妻姑叔向母也曰長叔姒生男兄弟之妻相謂姒也姑視之及堂聞其聲而還曰是豺狼之聲也狼子野心非是莫䘮羊舌氏矣遂弗視史記大宛傳曰烏孫王昆莫初生棄於野狼徃乳之漢書曰江都王建宫人有過者令狼齧殺之建觀而大笑為樂又曰髙祖使太子将兵四皓曰今使太子將兵無異羊禦狼也宋書曰王仲徳初遇苻氏之敗兄叡同起義兵與慕容垂戰敗仲徳被重創走與家屬相失路經大澤困未能去乃卧林中有一小兒青衣年可七八歳騎牛行見仲徳驚曰漢已食未仲徳言未小兒去須臾復来得飯與之食畢欲行而暴雨莫知津逕有一白狼至前仰天而號號訖銜仲徳衣因渡水仲徳隨後得濟與叡相及後魏書曰匈奴單于生二女姿容甚美國人皆以為神單于曰吾有此女安可配人將以與天乃於國無人之地築髙臺置二女其上曰請天自迎之經三年其母欲迎之單于曰不可未徹之間耳復經一年乃有一老狼晝夜守臺下為穴經時不去其小女曰吾父處我扵此欲配天而今狼来或是神物遂乃就之其姊大驚曰此是畜生無乃辱父母也妹不従下為狼妻而産子後遂滋繁成國故其民好引聲長歌猶似狼嘷又曰初道武避窟咄難遣穆崇還察人心崇單馬與従者微服入其營㑹火光為舂妾所識賊皆驚起崇求従者不得因匿坑中徐乃竊馬奔走於大澤有白狼向崇號崇覺寤馳馬隨狼去遂免難道武異之命崇立祀子孫世奉焉後周書四夷傳曰突厥之先匈奴之别種也為鄰國所破其族有一小兒棄草澤中有牝狼以肉飼之及長與狼交合遂有孕焉彼王聞此兒尚在重遣殺之使者見狼在側并欲殺狼狼遂逃扵髙昌國之北山山有洞穴穴内有平壤茂草周廽數百里四面俱山狼匿其中遂生十男長大外託妻孕其後各為一姓阿史郍即其一也又曰突厥旗纛之上施金狼頭侍衛之士皆謂附離夏言亦狼也盖本狼生志不忘本耳唐書曰薛延陀部落嘗有二客乞食於主人者主人引與入帳命妻具饌其妻顧視客乃狼頭人也主人不知覺妻告隣人共視之狼頭人已食主人而去相與逐之至鬰督軍出見二人追者告其故二人曰我是也我即神人薛延陁當滅我来取之追者懼而反走又曰髙祖時孝子袁師年居父母二䘮以孝聞晝夜負土為墳又塟曽祖父母經二十載其功始畢有白狼號鳴於墓側詔旌表其門帝王世紀曰商湯都亳有神牽白狼銜金鈎入湯庭國語曰周穆王時将征犬戎祭公謀父諫不聽遂征之得四白狼四白鹿以歸自是荒服者不至述異記曰周幽王時牛化為虎羊化為狼洛陽有避狼城云幽王時羣臣為狼食故築城避之今洛中有狼村是其處也穆天子傳曰春山百獸所聚爰有豺狼野馬山海經曰孟山其獸多白狼白虎又圖讃曰矯矯白狼有道則逰應符變質乃銜靈鈎淮南畢萬術曰取狼皮以當空户則羊畏不敢出矣毛詩草木蟲魚䟽曰狼能為小兒啼聲以誘人去數十歩乃止其猛㨗者人不能制雖善用兵者亦不能尅也其膏可以煎和其皮可以為裘狐説文曰狐妖獸也鬼所乘也有三徳其色中和小前大後死則首丘謂之三徳禮檀弓曰君子曰樂樂其所自生禮不忘其本古之人有言曰狐死正丘首仁也言不忘本也易解卦曰九二田獲三狐得黄矢貞利又曰未濟亨小狐汔濟濡其尾詩國風曰南山崔崔雄狐綏綏又曰有狐綏綏在彼其梁又曰莫赤匪狐莫黑匪烏漢書曰陳勝令吳廣之次所旁叢祠中張晏曰戍人所止處也叢鬼所憑也夜構火狐鳴呼曰大楚興陳勝王卒皆夜驚恐旦日卒中徃徃指目勝廣晉書曰王浚據幽州有狐踞府門躍入㕔事後浚果敗又曰凉武昭王暠子歆為凉州牧時有狐上南門主簿范稱曰諺曰野獸入家主人将去狐上南門又狐者胡也天意若曰有人居於此城南面而君也後竟為沮渠䝉遜所滅王隠晉書曰劉世則女病媚積年韓有令作布嚢張在忩間乃閉户驅逐須臾嚢大脹急縛口懸樹間視之惟有二三斤狐毛病遂差又曰淳于智濟北人夏侯藻母病因五皷中出詣智卜有一狐當門向之嘷唳藻駭􅕎馳告智智曰禍甚急君速歸在狐嘷喚處撫心啼哭勿休然後其禍僅可救也藻如之母亦扶病而出家人既集堂屋五間拉然暴崩唐書曰哥舒翰素與禄山思明不協上每和解禄山謂翰曰我父是胡母是突厥公母是突厥父是胡與公族類頗同何得不相親乎翰應之曰古人云野狐向窟嘷不祥以其忘本也敢不盡心焉禄山甚怒以為譏其胡也莊子曰夫豐狐文豹是何罪之有哉其皮為之災也管子曰代出狐白之皮隂陽之變六月而一見公貴買之代人忘其難得喜其貴價必相率而求之取此物者因令齊載金錢之代各求狐白皮代王聞之果去其農處山林求狐二十四月不得一狐離支聞而伐之王即将其士卒服於齊慎子曰廊廟之材非一木之枝狐白之裘非一狐之皮范子曰狐皮出天外穆天子傳曰天子獵於滲澤得白狐𤣥狢祭於河宗山海經曰青丘之國有狐而九尾郭璞注曰世平則出為瑞也又曰武都之山有黑水焉其上有𤣥狐蓬尾蓬蓬其尾也説苑曰蓬狐文豹竹書紀年曰夏帝杼東征獲狐九尾周宣王時馬化為狐𤣥中記曰五十歳之狐為淫婦百歳狐為美女又為巫神禮斗威儀曰君乗火而王其政訟平南海輸以文狐春秋潜潭巴曰白狐至國民利不至下驕恣韓詩外傳曰狐水神也春秋後語曰楚宣王以昭奚恤為相諸侯畏之王問羣臣曰吾聞北方畏昭奚恤其誠何如江乙對曰虎求百獸而食之得狐狐曰子無噉我天帝令我長百獸子若食我是逆天帝之命子以我不信請為子先行子隨我後觀百獸見我能無走乎虎以為然隨狐而行百獸見之皆走虎不知獸之畏己反以為畏狐也今王地方五千里帯甲百萬而任之於昭奚恤然則北方非畏昭奚恤畏王之甲兵也故人臣見畏者君威也君不用則滅亡矣趙􅁮吳越春秋曰禹年三十未娶行塗山恐時暮失嗣曰吾之娶也必有應矣已乃有白狐九尾而造於禹禹曰白者吾服也九尾者王證也於是塗山人歌之曰綏綏白狐九尾龎龎成子家室我都彼昌禹乃娶塗山女淮南子曰夫狐之搏雉也必卑體弭毛以待其来也雉見而信之故可得而禽也淮南畢萬術曰犀角置狐穴中狐不歸抱朴子曰玊榮記曰狐及狸狼皆壽八百歳滿三百暫變為人形西京雜記曰廣川王去疾聚其無頼少年逰獵無度國内冢墓盡發之嘗發欒書冢無餘物有一白狐見人驚走左右截之不得傷左足於是王夢一丈夫髪眉盡白来謂王曰何故傷我左足以杖叩王左脚王乃患脚至死不愈白虎通曰狐死首丘不忘本也徳至鳥獸則九尾狐見九者子孫繁息也於尾者後當盛也崔豹古今注曰章帝元和二年白狐九尾見信都魏略曰文帝受禪九尾狐見於譙郡名山記曰狐者先古之淫婦也其名曰紫紫化而為婦故其名自稱阿紫伏滔北征記曰皇天塢北古特陶穴晋時有人逐狐入穴行十餘里得書二千卷又曰河氷厚數丈氷始合車馬未過須狐先行此物善聽聽水無聲乃過酈善長水經注曰狐性多疑故俗有狐疑之説管輅傳曰夜有一小物如獸手持火以口吹之書生舉刀斫斷腰視之狐也自此無火灾郭璞九尾狐讃曰青丘竒獸有尾之狐有道祥見出則銜書作瑞於周以標靈符劉敬叔異苑曰有胡道洛者自云廣陵人好音樂醫術之事體有臊氣恒以名香自防唯忌猛犬自審死日誡弟子曰氣絶使殯勿令狗見我尸也死於山陽歛畢覺棺空開看不見尸體時人咸謂狐也捜神記曰酒泉郡每太守到官無㡬輙卒死後渤海陳斐見授此郡斐行卜卜者曰逺諸侯放伯裘能觧此則無憂斐既到官侍有張侯醫有王侯卒有史侯斐恒逺之夜半有上斐被者便以被冒取之物跳踉音狼訇訇作聲乃言曰我無惡意赦我當報恩斐曰汝為何魅曰我本千年狐今為魅垂化為神幸放我我字伯裘府君有急難呼我斐乃喜便放之忽然有赤光如電後每事先以語斐於酒泉境界無毫髮之奸咸曰聖君月餘主簿李音私通斐侍婢既而驚遽懼為伯裘所白遂與諸侯謀殺斐伺旁無人便伏入欲格殺之斐即呼伯裘有物如曵疋練諸侯伏地失魂乃以次縳取皆伏即殺音等伯裘乃辭謝斐曰未能白奸乃為府君所召猶用慙又曰燕昭王墓有老狐化男子詣張華講説華怪之謂雷孔璋曰今有男子少美髙論孔璋曰當是老精聞燕昭王墓有華表柱向千年可取照之當見如言化為狐又曰吳中有一書生皓首稱胡博士教授諸生忽復不見九月十九日士人相與登山遊觀聞講書聲命僕尋之見空冢中羣狐羅列見人即走老狐獨不去是皓首書生續捜神記曰襄陽習鑿齒為荆州主簿從桓温出獵時大雪於江陵城西見草上雪氣出伺觀見一黄物射之應箭死徃取乃一老雄狐脚上帶綘綾香嚢又曰吳郡顧旃獵至一崗忽聞人語聲云咄咄今年衰乃與衆尋覔崗頂有一穽是古時冢見一老狐蹲冡中前見一卷簿書老狐對書屈指有所計校放犬咋殺之取視口中無復齒頭毛皆白簿書悉是奸宿女人名已經奸者朱鈎頭所䟽名有百數旃女正在簿次金樓子曰狐白之裘天子被之而在廟堂為狐計者不若走於平澤狢説文曰狢似狐善睡周禮考工記曰狢踰汶則死土氣然也爾雅曰狢子狟穆天子傳曰天子獵於滲澤得𤣥狢以祭河宗後秦記曰姚襄遣叅軍薛瓉使桓温温以故戱瓉瓉曰在北曰狐在南曰狢何所問也太平御覽卷九百九
