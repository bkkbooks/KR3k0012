front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_771-1a, image: WYG0899/WYG0899-0732c.png}
body:
  text: 太平御覽卷七百七十一宋李昉等撰舟部四艇舴艋筏檝篙槳櫓柂纜笮帆帆檣五兩榜桅筌􅰢牂柯泝斗艇釋名曰二百斛以下曰艇其形徑梃一人二人所乗行者也廣雅曰舼音卭艇舟也淮南子曰越舼蜀艇不能無水而行陸機思歸賦曰棹河淵之輕艇舴艋上知格切下音猛廣雅曰舴艋舟也臨海記曰西北有白鵠山髙三百丈上有一舟名舴艋前頭有石鼓石艇世云石鼓鳴則土地㓂亂隆安初此鼓屡鳴果有孫恩賊此處多山精水祟不可輕陟山下平地便望見舴艋民王志祭山神求到鼔所遂得至捉槌打鼓閭里咸聞如金玊之響下山便病死葢登山召禍擊鼓自殺也異苑曰檀道濟元嘉中鎮潯陽入朝伏誅濟未下時有人施罟於柴桑江收得大船孔鑿若新使匠作舴艋云勿加斷斧工人誤截兩頭檀以為不祥殺三巧手欲以塞諐匠違約加斵凶兆先通矣宋元嘉起居注曰有司奏云揚州刺史王𢎞上㑹稽從事韋詣解列先風聞餘姚令何玢之造作平牀一乗舴艋一艘精麗過常用功兼倍請免玢今官詔可其奏筏論語曰道不行乗桴浮于海從我者其由與子路聞之喜東海漢記曰吳漢教乗筏從江下巴郡盗賊解散張堪為陪義長公孫述遣擊之有同心士三千人相謂曰張君養我曹為今日也乃選習水三百人斬竹為椑渡水英雄記曰曹操進軍至江上欲從赤璧渡江無船作竹椑使部曲乗之從漢水來下出大江注浦口未即渡周瑜又夜密使輕船走舸百艘燒椑操乃夜走吳録曰孫䇿欲渡江船少欲徃便求䇿姑王氏分命伐蘆為樑以佐船渡人吳録地理志曰蒼梧髙要縣郡下人避瘴氣乗筏來停此六月來十月去嵗嵗如此雷次宗豫章記曰望蔡縣有一石室入室十餘里得水廣數十歩清深不測邉有筏竹遊者伐竹為筏過水莫能䆒其源出好鍾乳淮南子曰方車蹠越乗桴入朝欲無寵不可得也許慎曰桴木筏越絶書曰木客大冡者句踐之兄弟冢也初徙之琅邪使樓船卒二千八百人伐松栢以為桴故曰木客也檝說文曰檝舟棹也書曰若濟巨川用汝作舟檝詩曰檜檝松舟方言曰檝或謂之橈或謂之櫂吳越春秋曰子胥伐楚因引軍襲鄭治漁者之子在鄭乃還列女傳曰趙簡子南擊荆至河津津吏醉卧不能渡簡子怒將殺之津吏之女娟乃持檝而前走曰妾父聞主君將渡恐風波之起水神動駭故禱祝九江三淮之神不勝杯酌餘瀝醉於此君命誅之願以微軀易父之死簡子將渡用檝少一人娟曰妾居河濟之間重乎世習舟檝之事願備員持檝簡子遂與渡中流奏河激之歌簡子乃聘以為夫人其母遽曰河水激揚濟之不易淮南子曰七尺之檝動大船者因水為資也人君發一言之號而令行於民者衆為資也說苑曰襄城君始封之日衣翠衣帶玉劍履縞舄立乎流水之上大夫莊辛過而說曰願把君之手其可乎襄城君作色不言莊辛遷延稱曰君獨不聞鄂君乗清翰之舟張翠葢㑹鍾鼔之音越人推檝而歌曰今夕何夕兮搴中洲流今日何日兮得與王子同舟山有木兮木有枝心恱君兮君不知於是鄂君揄袂而擁之舉繡被而覆之襄城君乃奉手進之楊子法言曰灝灝音浩于海濟樓船之力也航人無檝如航何李軌法曰喻有民無禮樂治也抱朴子曰瓊艘瑶檝無渉川之用金弧玊弦無激矢之能是以清潔而無政事者非撥亂之器儒雅而乏治畧者非翼亮之才左思吳都賦曰篙音髙工檝師選自閩隅翼御長風狎翫靈胥篙方言曰所以刺船謂之篙盛𢎞之荆州記曰魚復縣瞿塘灘上有神廟先極靈驗刺史二千石經過皆不鳴鼓角篙旅恐觸石有聲乃以布裹篙頭王韶始興記曰含進公口下流有枯木曰聖鼔上下人以篙犯之者皆虐喻益期與韓豫章牋曰馬伏波昔開道篙跡鑿石猶存槳方言曰所以隠櫂謂之槳楊泉五湖曰赤檜升棹檀槳細堅櫓釋名曰在旁曰櫓櫓旅也用旅力然後舟行也吳志曰呂蒙襲關羽尋陽盡伏精兵於􅖻􅑳中使白衣揺櫓作啇賈服晝夜兼行至羽所置屯候盡收縳之是故不聞知遂到南郡柂釋名曰船尾曰柂拖也在後見拖曳且弼正船不使他戾也方言曰船後曰舳好舳制水也郭璞曰今江東呼為舳也孫放别傳曰庾公建學校孫君年最㓜入為學生班在諸生之後公問君何獨居後荅曰不見船柂耶在後所以正船尋陽記曰廬山西嶺有甘泉曽見一柂從山嶺流下此溪中人號為柂下溪宣穆所遣人見山湖中有敗艑而後柂流下信其不妄孫綽子曰動而不乗不理若汎舟而無柂趙壹嫉邪賦曰奚異渉海之失柂坐積薪而待燃張華遊仙詩曰遊仙廹西極弱水隔流沙雲榜鼔露柂飃忽陵飛波纜爾雅曰汎汎楊舟紼縭維之紼繂也縭緌也吳書曰甘寧住止常以繒錦纜舟去輒割棄以示奢笮纂文曰竹索謂之笮茅索謂之笮釋名引舟者曰笮笮作也起舟使動作也漢鼓吹曲曰桂樹為君船青絲為君笮木蘭為君棹黄金錯其間㠶釋名曰隨風張幔曰㠶使舟疾汎汎然韻集曰颿船張也颿音凡馬疾步也音義與帆同長沙耆舊傳曰夏隆仕郡時潘濬為南征太守遣隆脩書致禮濬飛帆中流力所不及隆乃於岸邉㧞刀大呼指濬為賊因此被收濬竒其以權變自通解縳賜以酒食吳時外國傳曰從加郍調州乗大伯舶張七帆時風一月餘日乃入秦大秦國也南州異物志曰外徼人隨舟大小或作四帆前後㳫載之有盧頭木葉如牖形長丈餘織以為帆其四帆不正前向皆使邪移相聚以取風吹風後者激而相射亦並得風力若急則隨宜城成之邪張相取風氣而無髙危之慮故行不避迅風激波所以能疾永嘉記云郡有石帆又有破石傳云古有神人以破石半為帆故名石帆吳郡録海記曰海虞縣有穿山下有洞空髙十丈廣十餘丈山皆在海中行侶舉帆從空中過陸景典語曰孤將與水軍一萬從風舉帆朝發海島暮至沓渚世說曰顧長康作殷荆州佐請假還東爾時例不給布帆顧苦求之然乃發至破冡便遭風大敗作牋與殷云地名破冡而出行人安稳布帆無恙馬融廣成頌曰然後方艅艎連舼舟張雲帆施蜺幬靡鬼􅄓風陵迅流發櫂歌從水驅郭璞江賦曰鼓帆迅越䞟漲絶泂儵忽數百千里俄頃飛亷無以希其蹤渠黄不能及其景孫綽望海賦曰若乃惟馨陳祈祝不愧言成或適於東或歸於西啇客齊暢潮流徃還各資順勢雙帆同懸倐如繡驊背馳拏奴加切如交隼輕軒帆檣吳書曰孫和被黜之長沙過蕪湖有鵲啣薪巢於帆檣故官僚以為檣末傾危非乆安之像遂以憂終郭璞江賦曰舳艫相接萬里連檣泝洄㳂流或漁或啇五兩淮南子曰若綄胡管切之候風也許慎曰綄候風扇也楚人謂之五兩兵書曰凡候風法以雞羽重八兩建五重旗取羽繫其巔立軍營中郭璞江賦曰氛祲於青旭占五兩之動静榜補孟切明堂月令曰榜舫人習水者也司馬相如上林賦曰榜人歌聲流喝鳥邁切釋名曰船答籚桅五灰切釋名曰船前立柱曰桅桅巍也巍巍高貌也筌􅰢釋名曰舟中牀以薦物者曰筌言但有筌也筌牀也其上板曰􅰢言所覆衆慮也牂柯魏略曰沐並字徳信少有志氣吳將朱然圍樊城遣兵於硯山斫牂柯材兵作食先熟者呼共食後熟者曰不可呼者曰汝欲作沐徳信耶其名乃播異域雖華夏不知者以為前世人也華陽國志曰楚頃襄王遣將軍莊蹻洴沅水出且蘭且子余切以伐夜郎王㭬牂柯繫船於且蘭既克夜郎而秦奪楚黔中地無路得歸遂留王之號為莊王以且蘭有㭬船牂柯處因改其名為牂柯異物志曰牂柯者繫船伐也其山在海中小而髙以繫船伐也俗人謂之越王牂柯逺望甚小而髙不似山望之以為一株樹在水中也潯陽記曰郡西北有一松楊樹枝條繁茂垂隂數畝傳云陶桓公牂柯成此樹豫章記新淦音紺縣北二十五里曰封溪今有聶友所伐梓繫着牂柯處昔聶友於此左右夜照射遇一白鹿友遂射之鹿帶箭走友即躡跡追尋不得見向箭着一梓樹友即伐樹數斧便有血出而落之梯隨復故創音瘡不可得斷友更多時手力復伐之輦其梯而焚之樹遂斷砍以二板以還繫着渚下以樟木為牂柯後有船行遇風柂皆沒唯友船獨全尋看乃向梓板夾扶其船友大異之後友在京都此板於豫樟來至友許輒有大喜中更異梓板有憂所用樟木為牂柯者遂生為樹合猶存其木合抱始倒植之今枝條皆向下板門中亦述其事泝斗廣雅曰泝斗謂之栕以之切纂文曰杼水斗也太平御覽卷七百七十一
