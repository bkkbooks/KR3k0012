body:
  text: 太平御覽卷一百二十六宋李昉等撰偏霸部十南凉秃髪烏孤秃髪利鹿孤秃髮傉檀南燕慕容德慕容超南凉秃髮烏孤崔鴻十六國春秋南凉録曰秃髪烏孤河西鮮卑人也八世祖疋孤率其部自塞北遷于河西疋孤卒子夀闐立夀闐卒孫樹機能立壮果多謀畧太始中殺秦州刺史胡列于萬斛堆敗凉州刺史蘇愉于金山又殺凉州刺史楊欣于舟嶺盡有凉州之地武帝為之旰食能死從弟務丸立丸死丸孫推斤立斤死子思復鞬立部衆轉盛遂據凉土鞬卒子烏孤襲位養民務農循結隣好吕光封烏孤廣武郡公益州牧左賢王太初元年正月改元自稱大将軍大單于西平王以弟利鹿孤為驃騎将軍傉檀為車騎将軍二年改稱武威王三年正月徙于樂都八月孤因酒走馬馬倒傷脇笑曰幾使吕光父子大喜俄而患甚顧謂羣臣曰方難未靖宜立長君言終而薨在王位三年偽諡武王廟號烈祖晉書曰秃髪烏孤其先與後魏同出八世祖疋孤率其部落自塞北遷于河西其地東至麥田牽屯西至顯羅南至澆河北接大漠疋孤子壽闐之在孕母胡掖氏因寝而産於被中鮮卑謂被為秃髪因而氏焉秃髪利鹿孤崔鴻十六國春秋南凉録曰利鹿孤烏孤弟太初三年八月即位大赦改治西平建和元年正月大赦改年延耆老訪政治二年羣臣固請即尊號不許乃僣稱河西王三年三月寝疾令曰昔我諸兄弟傳位非子者葢以泰伯三讓周道以興故也武王創踐寳厯垂諸樊之謀終能克昌家業者其在車騎乎吾寝疾惙頓是将不濟内外多虞國機務廣其令車騎經摠百揆以成先王之志薨諡康王葬西平陵秃髪傉檀崔鴻十六國春秋南凉録曰傉檀利鹿孤弟也少機警有才畧建和三年襲位徙號凉王遷于樂都改為𢎞昌元年秦遣使拜車騎将軍廣武公四年六月秦遣授河右諸軍事凉州刺使鎮姑臧七月讌羣寮于宣德堂仰視而嘆曰古人言作者不居居者不作信矣前昌松太守孟偉進曰張文王築城苑繕宫廟構此堂為貽厥之資萬世之業秦師濟河漼然瓦解此堂之建年垂百載十有二主唯信順可以乆安仁義可以永固願大王勉之檀曰非君無以聞讜言也八月以鎮南大将軍文支鎮姑臧檀遷于樂都雖受制于秦車服禮制一如王者十一月遷于姑臧嘉平元年十一月僣即凉王位于南郊大赦改年嘉平置百官立世子虎臺為太子二年正月以子明德歸為中郎将領昌松太守歸雋爽聰悟檀甚寵之年始十三命為昌髙殿賦援筆即成影不移漏檀覽而善之擬之曹子建七年傉檀議欲征西乙弗孟愷諫曰連年不收上下飢弊南逼熾磐北迫蒙遜今逺征雖尅後患必深傉檀曰孤将畧地卿無阻衆謂其太子武臺曰今不種多年内外俱窘事宜西行以拯此弊蒙遜近去不能卒來旦夕所慮唯在熾磐彼名㣲衆寡易以討禦吾不過一月自足周旋汝謹守樂都無使失墜傉檀乃率騎七千西襲乙弗大破之獲牛馬羊四十餘萬熾磐乘虛來襲一旬而城潰安西樊泥自西平奔告傉檀傉檀謂衆曰今樂都為熾磐所䧟卿等能與吾籍乙弗之資取契汗以贖妻子是所望也遂引師而西衆多逃返遣鎮北段茍追之茍亦不還于是将士皆散傉檀曰熾磐昔委質於吾今而歸之不亦鄙乎四海之内無所容其身何其痛哉吾老矣寧見妻子而死遂歸熾磐六月至西平熾磐使郊迎以上賔之禮歳餘為熾磐鴆死諡景王時年五十一武臺亦為熾磐所害少子保周歸魏魏以為張掖王自烏孤太初元年歳在丁酉至傉檀薨嵗凡十有九年晉書曰烏孤以安帝隆安九年僣立至傉檀三世凡十九年以安帝義熈九年滅南燕慕容德崔鴻十六國春秋南燕録曰慕容德字𤣥明皝之少子皝每對諸宫人言婦人姙娠夢日入懷必生天子公孫夫人方姙夢日入臍中獨喜而不敢言晉咸康二年晝寝生德左右以告方寝而起皝曰此兒易生似鄭荘公長必有大德遂以德為名年十二而皝薨哀毁過禮年十八長八尺二寸額上有日角偃月重文元璽初封梁公建熈初進號安北将軍封范陽王入為魏尹秦滅燕徙于長安秦伐凉德請征自効後為張掖太守苻堅伐晉垂請德為副堅敗德乃隨垂如鄴垂稱燕王復封范陽王建興元年為司隷校尉八年司徒垂臨薨謂太子寳曰鄴是舊郡宜委范陽王永康元年以德鎮鄴及寶失中山奔龍城以徳為丞相領冀州承制南夏徳曰中山既没魏必乘勝來攻鄴元年正月徳率户四萬三千車二萬七千乘自鄴徙滑臺遇風船没魏軍垂至衆懼欲退保黎陽其夕流澌氷合是夜濟訖氷亦尋消徳大恱改黎陽津為天子津徳入滑臺趙王麟等九十八人上言今中山傾䧟龍都蕭條趙魏遺黎鵠企皇澤伏願仰承俯順以安宗廟謹上皇帝尊號徳許之令曰假順來議且依燕元故事統符行帝制奏詔而已改永康三年為元年大赦殊死已下置百官封進有差寶自龍城南奔至黎陽城西數里伏於河西遣中黄門趙思告北地王鍾曰上以去年二月得丞相表即自南征段速骨作逆於乙連今失據來此呼丞相奉迎鍾馳使白狀寶遣思迎之後見採樵者知徳稱帝懼而北奔初苻登既滅登弟廣率所部二千來降拜冠軍處之乞活堡至是復叛稱秦徳畱撫軍魯陽王和守滑臺率衆攻廣斬之和長史李辨殺和以滑臺降魏徳曰苻廣雖平撫軍失據進有强敵退無所托計將安出尚書潘聰曰滑臺四通八達非帝王之居青齊沃壌號曰東秦地方二千里户餘十萬四塞之固可謂用武之國徳猶豫未決於是遣牙門蘇撫問沙門朗公報曰山西絶俗之士不應預聞朝議但有待之累非有託無以立陛下今來即朗之檀越敬覽潘尚書之議可以興邦撫又問以年世朗以周易筮之曰燕衰庚戌撫曰幾何曰年則一紀世則及子撫曰何其促乎答曰卦兆然也豈闗人哉撫秘不敢言徳大恱三月徳引而南五月次薛城八月入廣固即皇帝位於南郊大赦改元為建平元年又曰漢宣憫吏民犯諱故改名朕今増一備字以二字為複名庶開臣子避諱之路於是叙賞有差褒徳仕賢新舊咸恱十月太極端門並就以工匠張剛為材官將軍尚方令二年十月徐州刺史潘聰青州刺史鞠仲來朝讌于延賢堂酒酣徳嘆謂羣臣曰朕雖寡薄拱已南面在上不驕夕惕于位可稱自古何等主也仲曰陛下中興之聖后少康光武之儔也顧命左右賜仲帛千匹仲疑多陳譲徳曰卿知調朕朕不知戲卿乎卿飾對非實故亦虛言相賞賞不謬加何足謝也韓範進曰臣聞天子無戲言忠臣無妄對今日之論可謂君臣俱失德大悦賜範絹五十匹三年三月德如齊城登營丘望見晏嬰塜顧左右曰禮大夫不逼城葬平仲古之一賢人達者而生居近市死葬近城豈有意乎青州秀才晏謨對曰孔子稱臣先人平仲賢矣豈不知高其梁豐其禮蓋政在家門故儉以矯世生居狹隘卒豈擇地而葬乎所以不逺門者猶冀悟平生意也德悦之三月以太牢祀漢城陽景王廟遂北登社首山東望鼎足因目牛山問謨以齊之山川賢否故事謨厯對詳辯畫地成圖德深嘉之拜尚書郎五年二月夜地震在栖之雞皆驚攪飛散三月德疾動經旬幾于不振會前尚書右丞曹黙自冀州来奔以白酒解之乃瘳以黙為御史中丞封永熈侯五年正月兄子超自秦還九月汝水竭十一月得疾篤夢皝曰汝既無子何不早立超為太子不爾惡人生心戊午引見群臣于東陽殿議立超為太子俄而震起百寮驚越德亦不安還宫疾甚呼段后公主及超申以後事執超手曰若得至曉更見公卿顧託以汝死無所恨舉目視公主欲有所言竟遂不能段后大言今日召董中書作詔立超開目頷之是夕薨于顯安宫年七十為十餘棺夜分出四門潜瘞山谷莫知其屍所在虛葬于東陽陵諡獻武皇帝廟號世宗在位五年慕容超崔鴻十六國春秋南燕録曰慕容超字祖明德兄北海王納之子秦滅燕以納為廣武太守數歳去官與母公孫太妃就弟德家于張掖德從苻堅南征留金刀辭母而去及垂起兵山東張掖太守苻昌誅納及德之諸子公孫太妃以耄不合刑納妻段氏以懷姙未决執于郡獄獄掾呼延平德之故吏也将公孫及段氏逃于羌中而生超焉公孫氏臨卒授超金刀曰聞汝叔已中興於鄴都吾朽病将没相見理絶汝脱得東歸可以此刀還汝叔也後因吕隆歸秦秦徙凉州民于長安超因而東歸母謂超曰母子得全濟者呼延氏之力也惠而不報天豈祐人平今雖死吾欲為汝納其女以答厚惠于是納之超至長安徉狂行乞由是往來無禁濟隂人宗正謙善卜相西至長安賣術于路超行而遇之因就謙相謙竒其姿貌超乃内斷于心不告於妻辭母詣㶚上乃與謙俱歸至諸關禁自稱張伏生二十日達梁父建平六年四月至廣固呈以金刀且宣祖母臨終之言德撫之號慟超身長八尺腰帶九圍姿器魁傑有類于德德愛之名之曰超封北海王拜侍中驃騎大将軍司𨽻校尉開府置佐十一年立為太子己未僣即皇帝位大赦改建平六年為太上元年三年七月遣中書令韓範聘秦姚興許還超母妻八月秦使兼員外散騎常侍韋宗還聘贈以千金超復遣右僕射張華給事中宗正元聘秦送大樂伎一百二十人姚興大悦還超母妻十月華發長安宗正元先馳反命超悦乃遣征虜公孫五樓率騎二千迎于境上超親率六宫迎于馬耳關四年正月大赦尊父北海穆王為穆皇帝母段氏為皇太后居長樂宫妻呼延氏為皇后五年二月晉相劉裕率衆來伐三月晉師渡淮超聞晉軍之盛自率衆四萬拒戰大敗奔還廣固徙郭内民人保小城晉攻䧟大城長圍列守超請為藩臣以大峴為界裕不許六年正月超登天門朝羣臣于城上殺馬以饗将士文武皆有遷授二月尚書悦壽開門納晉師超出奔為晉師所執送建康市斬之時年二十六殺鮮卑王公已下三千餘人以男女萬餘口為軍賞始建平元年歳在己亥僣號居齊至為劉裕所滅在己酉凡十有一年晉書曰超在位六年初德以安帝隆安四年僣立至超二世凡十一年以義熈六年滅太平御覽卷一百二十六
