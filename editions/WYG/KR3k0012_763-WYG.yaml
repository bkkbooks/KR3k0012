body:
  text: 太平御覽卷七百六十三宋李昉等撰器物部八斧鋸椎鑿斧釋名曰斧甫始也凡将制器始以斧伐木已乃制之也易曰得其資斧我心不快龍魚河圖曰斧神名狂章周語曰神農作陶冶斧破木為耜鋤耨以墾草莽然後五􅂖興詩曰析薪如之何匪斧不克取妻如之何匪媒不得又曰蠶月條桑取彼斧斨音牆以伐逺揚又曰破斧美周公也旣破我斧又缺我斨周禮曰大喪及窆執斧以涖匠師匠師主豐碑之士執斧以帥之使戒其士禮曰禮諸侯賜鈇鉞然後誅又曰天子負斧依南鄉而立傳曰楚子執齊慶封將戮之負之斧鉞以狥於諸侯使言曰無或如齊慶封弑其君弱其孤以盟其大夫春秋元命苞曰斧鑚主亂行斬狂詐斧之為言補也漢書曰分周為二有逃責之臺被竊鈇之言應邵曰周穆王出至路邊竊取過人又曰暴勝之為直指使者衣繡持斧逐捕盜賊又曰王莽司徒王尋初發長安宿覇昌廐亡其黄鉞尋軍士房揚素狂直廼哭曰此經所謂喪其齊音資斧者也應邵曰齊利也亡其利斧言無以復斬斷也東觀漢記曰祭遵襲略陽使䕶軍王忠皆持刀斧伐樹開道又曰蔣翊字元卿後母憎之候翊寢操斧斫之值翊如厠謝承後漢書曰㑹稽戴就字景成為都曹掾太守為州所奏就見伏考燒斧以著腋下就罵獄卒此無火氣何不熟燒魏志曰太祖延張繡及其將帥置酒高㑹太祖所至人常持大斧立後刃徑尺太祖所至之所常輒舉目之繡及將帥莫敢仰視晉書曰魏舒常適野王主人妻夜産俄而聞車馬之聲相問曰男也女也曰男書之十五以兵死復問宿者誰曰魏公舒後十五載詣主人問所生兒父母曰因條桑為斧傷而死舒自知為公晉咸和起居注曰有司奏魏氏故事正旦賀公卿上殿虎賁六人隨上以斧柄挂衣裙上令宜依舊為儀注謂曰此非前代善制其除之三輔舊事曰王莽夢大厦殿前五銅人語莽惡之斧斫開銅人腹東陽記曰晉中朝時有民王質者入山伐木至石室中見童子數人彈琴而歌因留跂斧柯而聽之童子以物與之狀如􅀥核質含之便不復飢也童子曰汝來已久宜去質承聲起斧柯漼然爛盡旣歸去家已數十年列女傳曰丁仲謀妻氏共夫至交阯夫為賊所殺妻船上得一斧舉而破賊列仙傳曰赤斧手中常有赤斧録異傳曰陳世母黄亡後還家但聞聲世忽亡斧黄言問家奴福盜之幽明録曰文翁常欲斷大樹欲斷䖏去地一丈八尺翁先祝曰吾若得二千石斧當著此處因擲之中所欲一丈八尺處後果為郡賈逵别傳曰逵廟一柏樹有人竊來斫伐投斧數下斧刃乃折於樹中七賢傳曰文黨字仲翁與人俱入山取木謂侣人曰吾欲逺學先試投斧髙木上斧當柱乃投之斧果止因之長安受經廷尉史事曰廷尉髙文惠上民傅晦詣民籍牛塲上盜黍為牛所覺以斧擲斨晦脚物故依律牛應弃市監棗超議晦旣夜盜牛本無殺意宜减死一等六韜曰操刀不割失利之期執斧不伐賊人将來繁葉不去将為斧柯列子曰有人亡鈇者意其隣人子視其行歩竊鈇也顔色竊鈇也言語竊鈇也動作態度無為而不竊鈇也俄而於其谷而得其鈇他日復見其隣子之動作態度無似竊鈇矣孟子曰斧斤以時入山林材木不可勝用也荀卿子曰林木茂而斧斤至焉吕氏春秋曰孔甲田于東陽萯音倍山天大風晦孔甲迷惑入于民室主人方乳乳産也或曰后來是良日也是子必大吉或曰不勝之是子必大殃后取其子以歸曰以為余子誰敢殃之子長成幕動折撩斧斫斬其足遂為守者以其無足遂使守門淮南子曰巨斧擊桐薪不待利時日而後破之又曰古之遣将君親操斧持頭授将軍柄曰閫以外者将軍裁之說苑曰雍門周說孟嘗君以秦楚之强而報於弱薛譬猶蕭斧而伐朝菌也𤣥晏春秋曰隣人亡斧及雞意予竊之居三日雞還斧又自得隣人大愧志林曰齊斧齊當為齋凡師出必齋戒入廟受斧故云齊也抱朴子曰介象燒斧而立其上久不知熱諸葛亮教曰前後所作斧都不可用前伐鹿角壊刀斧千餘枚賴賊已走間自令作部刀斧百枚用之百餘日初無壊者乃知彼主者無意宜收治之非小事也若臨敵敗人軍事矣鋸釋名曰鋸倨也其體直所截應倨句之平也說文曰鋸槍唐也古史考曰孟莊子作鋸史記曰公孫鞅之事考公也設刀鋸以禁奸邪信賞罰以致理後漢書曰獻帝欲復肉刑孔融議曰雖忠如鬻拳信如楚和智如孫臏一離刀鋸没世不齒呉志曰孫皓愛妾使人至市賊奪百姓財物司市陳聲繩之以法皓大怒假他事燒鋸斷聲頭王隱晉書曰趙王倫欲廢賈后而門鑰在市中處所部司馬多木作有利鋸至期倫乃命三部司馬以鋸截闗開門晉書曰胡母輔之字彦國少擅髙名王澄常與人書曰彦國吐佳言如鋸木屑霏霏不絶誠為後進領䄂也又中興書曰符健荒滛暴虐常露刀張弓椎鉗鋸鑿殺人之具備置左右宋書曰後廢帝名昱初在東宫惰業好嬉師傅不能禁及嗣位漸自放恣晨出暮歸從者並執鋌矛加以虐刑鍼椎鑿鋸之徒不離左右莊子曰禮若亢鋸之柄亢舉也禮有所斷割偤舉鋸之柄以㫁物也又曰天下好智而百姓永竭矣於是乎釿音斤鋸顓焉繩墨殺焉椎鑿决焉管子曰軍中必有一斧一鋸尸子曰水非石之鑽繩非木之鋸列女傳曰臧文仲為魯使齊齊拘之文仲使人遺公書恐人得之乃謬其詞曰臧我羊食我以銅魚公及大夫莫能知之乃問臧孫母母泣曰吾子拘有木治矣木治梏也臧我羊者臧善也羊者有母告妻善養母食我以銅魚銅魚有文錯錯者所以治鋸也鋸者所以治木是以知有木治繫於獄矣淮南子曰夏屋連房公輸無所措剞居綺切劂居月切削鋸然猶未能贍人中之欲也世說曰晉元皇初見賀司空言及呉時孫皓燒鋸截一賀頭是誰司空未復言元皇曰燒是賀邵司空流涕曰昔者先臣遭遇無道君創巨痛深無以上荅明詔元皇慙愧三日不出衡山記曰雞頭陂西有石室有人採藥暮宿其中曉見一鋸在壁上視有形無復鉄貫椎說文曰椎擊也齊謂之柊音終楑音葵鐓丁回切千斤椎也纂文曰􅀈揆方椎益州記曰市橋莋音作橋今各有一鐵椎大十許圍長六七十尺云初橋引機運此椎以繫橋柱本有三今餘二管子曰一農必有一椎莊子外物篇曰儒以金椎控其頤徐别其頰無傷口中珠列子曰昔伊尹操商樞姬公揮周機管子執齊鉞范蠡奮越椎世說曰永嘉三年中牟縣故魏任城王䑓下池有漢時鐵椎長六尺入地三尺頭西南指不動桓譚論曰孔子問屠牛坦曰屠牛有道乎曰刺必中解割必中理盤筯則引終葵而椎終葵方椎孫勝優劣論曰子房奮椎為天下唱義義聲既震則秦亡可知矣鑿釋名曰鑿有柄鑿用以穿鑿也說文曰鑿鑿也通俗文曰石鑿曰鏨作澹切鑿克曰銃昌仲切小鑿曰􅀈音潺柄曰摬音擎受摬曰鍃七紅切古史考曰孟莊子作鑿尸子曰利椎不如方鑿管子曰軍必有一鑿莊子曰齊桓公讀書堂上輪扁斵輪堂下釋椎鑿而上問桓公抱朴子曰魏明帝好聞椎鑿之聲搜神記曰陳仲舉㣲時嘗宿黄申家婦方産夜有叩門者須㬰門内有言客堂下有人不可進曰從後往須㬰還留者問曰何等名可與㡬嵗應以何死荅曰男也名奴得十五歲當以兵死仲舉告其家父母不使執寸刃年十五有置鑿於梁上者其末出奴以長木鈎取鑿堕䧟腦而死太平御覽卷七百六十三
