body:
  text: 太平御覽卷三百九宋李昉等撰兵部四十戰中戰中後漢書曰吳漢討公孫述乃進軍攻庫都抜之光武戒漢曰成都十餘萬衆不可輕也但堅據廣都待其來攻勿與爭鋒若不敢來公轉營廹之須其力疲乃可擊也漢乗利遂自將歩騎二萬餘進逼成都而去城十餘里阻江北為營作浮橋使副將劉尚將萬餘人屯於江南相去二十餘里帝聞大驚使讓漢曰公既輕敵深入又與尚别營事有緩急不復相及賊若出兵綴公而大衆攻尚尚破公即敗矣急引兵還廣都詔書未到述果使其將謝豐袁吉攻漢使别將攻尚漢敗入壁豐圍之漢乃召諸將勵之曰今劉尚二處受圍勢既不接其禍難量欲潛師就尚于江南并兵禦之若能同心一力人自為戰大功可立如其不然敗必無餘成敗之機在此舉也于是饗士秣馬閉營三日不出乃多掛幡旗使煙火不絶夜銜枚引兵與尚合軍豐等不覺明日分兵拒江北自將攻江南漢悉兵迎戰自晨至晡遂大破之斬謝豐袁􅁻獲甲首五千餘級于是引兵還廣都留劉尚拒述具以状上帝報曰公還廣都甚得其宜述必不敢畧尚而擊公也若先攻尚公從廣都五十里悉歩騎赴之適當置其疲困破之必矣自是漢與述戰於廣都之間八戰八克又曰凉州賊王國圍陳倉不拔而遂去皇甫嵩進兵擊之董卓曰不可兵法窮冦勿廹歸衆勿追今我追國是廹歸衆追窮冦也困獸猶鬬蜂蠆有毒况大衆乎嵩曰不然前吾不擊避其鋭也今而擊之待其衰也所擊疲師非歸衆也國衆且走莫有鬬志以整擊亂非窮冦也遂獨進擊之使卓為後拒連戰大破斬首萬餘級國走而死人曰曹操擊陶謙袁過拔取睢陵夏丘皆屠之殺男女數十萬人鷄犬無餘泗水為之不流又曰廉范遷雲中太守㑹匈奴大入塞烽火日逼故事虜入過五千人移書傍郡吏欲傳檄求救范不聽自率士摧之范兵不敵乃令軍中蓐食晨往赴之斬首數百級續漢書曰耿弇字伯昭扶風人少學詩禮見郡督尉試騎士建旗鼓肆馳騁由是心善將率後上聞弇為張步所攻欲自往陳俊曰步兵盛可且閉營待上至弇曰上且到臣子當擊牛釃酒以待百官反欲以賊虜遺君父耶遂合戰破之蜀志曰夏侯淵敗曹公争漢中地運米北山下數千萬􅇸黄忠以為可取趙雲遣兵隨忠取米雲將數十人輕行出圍行視忠等值曹公揚兵大出雲勢逼且鬭且却入營更大閉門偃軍鼓公軍至疑有伏兵雲擂鼓於後射公公軍驚駭自相蹂踐墮漢水死者甚多先主明旦自來至雲營圍視昨戰䖏曰子龍一身都是膽子龍趙雲字也作樂飲宴至暝晉中興書曰桓温步騎四萬自江陵向關中伐偽立荆州刺史郭敬進擊青泥皆破之至于灞上戎首多降居民皆壺漿路側耆老或泣曰不圗今日復見官軍兵帥苻健以五千人守長安小城時運道艱難而關中大飢温率衆還詔遣侍中黄門慰勞於襄陽犒軍十一年温進征討大都督司冀州諸軍事委以専征之任温乃合衆治兵七月率衆伐羗十月温次伊水羗帥姚襄來逆軍屯于北遣使詣温奉身歸命願勅前鋒小却當拜伏路左温答曰我自修復中原展敬山陵無豫君事欲來相迫何復求却於是方軌齊進襄率驍勇萬餘人距水前戰温命小弟冲及諸將奮擊襄大敗奔北自相殺害死者數千越北芒而奔走温屯故太極殿前賊周成率衆降温徙入金墉謁先帝諸陵被侵毁者皆修復之選陵令守護又曰謝𤣥進號冠軍將軍加領徐州刺史還于廣陵以功封東興縣侯八年秦主苻堅傾國大出衆號百萬先遣苻融慕容煒張蚝苻方四師至穎口梁成王先等守洛澗詔加衛將軍安為征討大都督𤣥為前鋒都督徐兖青三州揚州之晉陵幽州之燕國諸軍事與叔父征虜將軍石從弟輔國將軍琰西中郎將桓伊龍驤將軍𤣥等抵之衆八萬𤣥先遣廣陵劉牢之五千人直指洛澗邸斬梁成及成弟雲步騎奔潰争赴淮水斬首一萬級生擒五千餘人十月苻融進屯夀陽𤣥與琰等選精銳八千人決戰肥水南臨陣斬苻融俘獲萬計得偽輦及雲母車其餘寳噐山積錦罽數萬端牛馬驢騾駱駝十萬疋又曰苻堅率衆五十萬向夀春謂融曰晉人若知朕來便一時還南固守長江雖百萬之衆無所用之今秘吾來令彼不知彼顧江東在此必當戰若其亂敗求守長江不復可得則吾事濟矣乃秘不言堅自來於是以小將旗列屯淝北晉征虜將軍謝石冠軍將軍謝𤣥輔國將軍謝琰西中郎將桓伊等並阻水南一時涉渡淝水融曰及其未成列擊之必克也堅曰不然我長於歩彼便於水今捨歩入水是以所短撃其所長非良策矣可須彼過水一時擊之彼既背水進退無術乃可盡殺然後船舫渡江直指㑹稽觀禹朝萬國之處不亦樂乎列陳以待晉軍既濟戰于淝北堅被重創三軍潰亂堅馳還長安晉書曰劉毅泝江追桓𤣥戰於峥嶸州于時官軍數千𤣥兵甚盛而𤣥懼有敗衂常漾輕舸扵舫側故其衆莫有鬭心官軍乘風縱火盡銳争先𤣥衆大亂又曰將軍王敦反兵至石頭欲攻晉將劉隗其將杜𢎞曰劉隗死士衆多未易可尅不如據石頭其守將周禮少恩兵不為之用必敗禮敗隗自走敦從之禮果開城門納𢎞諸將與敦戰晉師大敗又曰前秦苻堅率兵來伐晉將軍謝石謝𤣥拒之堅遣其尚書朱序說石等以衆盛欲脅而降之序謂石曰若秦百萬之衆皆至則莫可以敵也及其衆未集宜在速戰若挫其前鋒可以得志晉將使請戰許之堅師列陣逼肥水晉師不得渡晉將使謂堅將苻融曰君懸軍深入置陣逼水此持乆之計豈欲戰者乎若小退師合將士周旋僕與君公緩轡而觀之不亦美乎堅衆皆曰宜阻水莫令得上我衆彼寡勢必萬全堅曰但却軍令得過我以鐵騎向水逼而殺之不然因其濟水而覆之於是麾軍却陣軍遂奔退制之不可止𤣥以八千精卒渡肥逼之融馳騎略陣馬倒被殺軍遂大敗晉師乘勝追擊死者相枕堅為流矢所中單騎遁走又曰慕容超載記曰於是賀賴盧公孫五樓為地道出戰王師不利崔鴻十六國春秋曰前秦苻堅遣將吕光領兵伐龜兹光軍其城南五里為營深溝髙壘廣設疑兵以木為人被之以甲羅之壘上龜兹王帛純嬰城自守乃傾國財寳請諸國來救温宿尉頭等國王合七十餘萬衆以救之胡便弓馬善矛矟如連鏁射不可入衆甚憚之諸將咸欲每營結陣按兵以拒之光曰彼衆我寡衆營又相逺勢分力散非良策也於是遷營相接按陣為勾鏁之法精騎為逰軍彌縫其闕戰于城西大敗之純遁走王侯降者三十餘國又曰西魏末東魏遣將侯景髙敖曹等圍西魏將獨孤信於洛陽東魏大將齊神武繼後西魏大將周文等率軍救信進軍瀍東景等夜解圍去及晨周文率輕騎追之至於河上景等北據河橋南屬邙山為陣與諸軍合戰周文馬中流矢驚逸遂失之因此軍中擾亂都督李穆以馬授周文兵復振于是大捷斬髙敖曹虜其甲士萬五千赴河死者以萬數是日置陣既大首尾懸逺從辰至未戰數十合氛霧四塞莫能相知獨孤信李逺居右趙貴怡峯居左戰並不利又知周文所在皆棄其率先歸開府唐公等為後軍遇信等退即與俱還由是乃班師洛陽亦失守大軍至𢎞農守將皆已棄城西走又曰後魏末賊莫折後熾所在冦掠州人李賢率鄊兵與涇州刺史史寧討之後熾列陣以待賢謂寧曰賊聚結嵗乆徒衆甚多數州之人皆為其用我若總為一陣併力擊之彼既同惡相濟理必總萃於我勢既不分衆寡莫敵我便救首尾無以制之今若令諸軍分為數陣多設旗鼓犄角而前以脅諸柵以别將統精兵直指後熾按甲而待莫與交鋒後熾欲前則懼我疑兵令其進不得戰退不得走以俟其懈攻之必破後熾一敗則衆柵不攻自拔矣寜不從戰屢敗北賢乃率數百騎徑入後熾營收其妻子僮𨽻五百餘人并輜重等屬後熾與寧戰勝方欲追奔忽與賢遇乃棄寧與賢接戰賊遂大敗後熾單騎遁走北史曰後魏孝文南伐齊將陳顯達率衆拒戰元嵩身修三丈免胄直前勇冠三軍將士從之顯達奔潰帝大恱曰任城康王大有徳福文武頓出其門以功賜爵髙平縣侯後周書曰天和六年宇文憲帥衆二萬出自龍門齊將新蔡王康徳以憲兵至潛軍宵遁憲乃西歸仍掘移汾水水南堡復入於齊謂略不及逺遂弛邊備憲乃渡河攻其伏龍等四城二日盡拔又進攻張辟克之獲其軍實夷其城壘斛律明月時在華谷不能救之乃北攻姚襄城陷之時汾州又見圍日乆糧援路絶遣柱國宇文盛運粟以饋之憲自入兩乳谷襲克齊栢栢城進軍姚襄齊人嬰城固守以為汾州之援齊平原王段孝先蘭陵王髙長恭引兵大至憲命将士陣而待之大將軍韓歡為齊人所乘遂以奔退憲身自督戰齊衆稍却㑹日暮乃各收軍又曰齊神武遂渡河逼華州刺史王羆嚴守知不可攻渉洛軍於許原西太祖據渭南徴諸州兵皆㑹乃召諸將謂之曰髙歡越山渡河逺來至此天亡之時也吾欲擊之何如諸將咸以衆寡不敵請待歡更西以見其勢太祖曰歡若得至咸陽人情轉騷擾今及其新至便可擊之即造浮橋於渭令軍人齎三日糧輕騎渡渭輜重自渭南夾渭而西冬十月壬辰至沙苑距齊神武軍六十餘里齊神武聞太祖至引軍來㑹癸巳旦侯騎告齊神武軍且至望太祖軍少竟馳而進不為行列總萃於左軍兵將交太祖鳴鼔士皆奮起于謹等六軍與之合戰李弼等率鐵騎横擊之絶其軍為二遂大破斬六千餘級臨陣降者二萬餘人通典曰後周末隋文帝作相輔少主相州總管尉遲逈舉兵不從隋文遣將韋孝寛討之逈男惇率衆十萬入武徳軍於沁東拒之與孝寛隔水相持乃布兵二十餘里麾軍小却欲待孝寛軍半度而擊之孝寛因其却乃鳴鼔齊進惇遂大敗又曰後周末隋文帝遣將韋孝寛率兵討尉遲逈於相州軍進至州逈悉出其卒十三萬陣扵城南逈舊習軍旅雖老猶被甲臨陣其麾下三千兵皆關中人為之力戰寛等軍失利而却鄴中士女觀者如堵髙熲與李詢乃整陣先犯觀者因其擾而乘之逈衆大敗遂拔其城又曰後漢末曹公征張魯於漢中使張遼與樂進李典等將千餘人守合肥教與護軍薛悌署遼曰賊至乃發俄而吳主孫權率十萬衆圍合肥乃共發教云若權至著張李將軍出戰樂將軍守護軍勿得與戰諸將皆疑遼曰公征在外比救至我敗必矣是以教及其未合逆擊之折其盛勢以安衆心然後可守成敗之機在此一戰諸君何疑李典亦與遼同於是遼夜募敢死之士得八百人椎牛饗將士明日大戰平旦遼披甲持㦸先登陷陣殺數十人斬二將大呼自右衝壘入至權麾下權大驚衆不知所為走登髙塚以長㦸自守權不敢動遥見所將衆少乃聚圍遼率左右麾直前急擊圍開遼將麾下數十人得出餘衆號呼曰將軍棄我乎遼復還突圍拔出餘衆權人馬皆披靡披疋靡反無敢當者自朝戰至日中吳人奪氣還修守備衆心乃安諸將咸服權攻合肥十餘日城不可拔還遼率諸軍追擊之㡬復獲權孫盛曰夫兵固詭道竒正相資若將帥不知則棄師之道也至於合肥之守懸弱無援專任勇者則好戰生患專任怯者則懼心難保且彼衆我寡心必懐貪惰以致命之兵擊貪惰之卒其勢必勝勝而後守則必固是以魏武雜選武力參以同異為之宻教宜其慮事至當而應若合符契妙矣北齊書曰慕容紹宗與侯景戰於渦陽大破景軍溺死於渦水為不流景走淮南太平御覽卷三百九
