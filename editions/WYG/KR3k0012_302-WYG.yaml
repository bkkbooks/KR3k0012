body:
  text: 太平御覽卷三百二宋李昉等撰兵部三十二先鋒殿鄉導伏兵先鋒後漢書曰祭彤拜遼東太守至則厲兵馬廣斥候彤有勇力能挽三百斤弓虜毎犯塞常為士卒前鋒數破走之東觀漢記曰賈復以偏將軍從上㧞邯鄲繫青犢大戰日中賊陣堅不却上傳召復曰吏士飢且可朝食復曰先破之然後食耳於是被羽先登所向皆靡諸將皆服其勇魏志曰張遼字文逺為征東將軍征孫權被甲戰先䧟陣御壘入至麾下晉書劉牢之𫝊曰太元初謝𤣥北鎮廣陵時苻堅方盛𤣥召募牢之與東海何謙瑯琊諸葛樂安髙衡東平劉軌西河田洛晉陵孫無終等以驍猛應選𤣥以牢之為叅軍領精銳為前鋒百戰百勝號為北府兵敵人畏之又曰元興初㑹稽王道子將討桓𤣥詔司馬柔之兼侍中以騶虞幡宣告江荆二州至姑熟為𤣥前鋒所害又載記曰髙句麗及宇文叚國等謀滅廆以分其地太興初二國伐廆廆曰彼軍初來鋒甚銳若逆擊之落其計矣又曰吕隆載記曰宜曜勁鋒示其威武彼以我逺來必决死拒戰可一舉而平宋書曰劉懐慎彭城人也少謹慎質直始叅髙祖鎮軍車騎將軍事振威將軍彭城内史從征鮮卑毎戰必先士卒及尅廣固懷慎率所領先登髙祖距盧循於石頭屢戰尅㨗又張暢傳曰虜攻彭城南門并放火暢躬自前戰身先士卒宋書曰武帝北伐廣固田子領偏師與龍驤將軍孟龍符為前鋒龍符戰没田子力戰破之又曰孟龍符懐王第三子也驍勇有膽氣髙祖伐廣固以龍符統歩騎為前鋒賊數十圍攻之以衆寡不敵遂見害追贈青州刺史又表曰龍符投􅃑義切前驅効命擢鋒三㨗每為衆先及西勦桓歆北殄索虜朝議爵賞未及施行㑹臣北伐復統前旅臨朐之戰氣貫三軍于時逆徒實繁控弦掩澤龍符匹馬電躍所向摧靡奮戈深入知死不吝後周書曰髙祖東伐齊齊王憲率所部先向晉州明日諸軍總集稍逼城下齊人亦大出兵陣於營南髙祖召憲馳徃觀之憲返命曰易與耳請破而後食帝恱曰如汝所言吾無憂矣内史桞昻私謂憲曰賊亦不少王安得輕之憲曰憲受委前鋒情兼家國掃此逋㓂事等摧枯商周之事公所知也賊雖衆其如我何既而諸軍俱進應時大潰其夜齊主遁走憲輕騎追之又曰李弼背侯莫陳恱以秦州歸國太祖謂弼曰公與吾同心天下不足平破恱得金寳奴婢悉以好者賜之拜秦州刺史從太祖平竇㤗先鋒陷敵太祖以所乘騅賜之及㤗所著弁甲亦賜之唐書曰太宗擊王世充選千騎為竒兵皆皁衣𤣥甲分為左右隊建大旂令騎將秦叔寳程齩金尉遲敬徳翟長孫等分統之每臨陣太宗躬被𤣥甲先鋒率之候機而進所向摧殄常以少擊衆賊徒氣懾殿廣雅什詁曰殿後也桂苑曰殿鎮也軍後也開元文字曰樂只君子殿天子之邦謂鎮也孟之反不伐奔而殿言在軍後也前曰啓后曰殿傳曰公與石祁子玦寗莊子矢使守曰以此贊國擇利而為之與夫人綉衣曰聽於二子渠孔御戍子伯為右黄夷前驅孔嬰齊殿又曰十一月丁卯朔入平隂遂從齊師夙沙衛連大車以塞隧而殿殖綽郭最曰子殿國師齊之辱也子姑先乎乃代之殿又曰子儀之亂析公奔晉晉人寘諸戎車之殿以為謀主殿後軍也又曰公侵齊門于陽州顔息射人中眉退曰我無勇吾志其目也師退冉猛偽傷足而先其兄㑹乃呼曰猛也殿又曰處父曰然則亂也必及於子先備諸與孟孫以壬辰為期陽虎前驅林楚御桓子虞人以鈹盾夾之陽越殿越陽虎從弟也又曰侯犯止之曰謀免我侯犯請行許之駟赤先如宿侯犯殿又曰夏衛公孟彄伐曹克郊還滑羅殿又曰追鄭師姚般公孫林殿而射多死又曰宋公伐曹將還禇師子肥殿曹人詬之不行子肥宋大夫又曰陳瓘陳莊渉泗孟之側後入以為殿論語曰孟之反奔而殿将入門䇿其馬曰非敢後也馬不進也史記綘侯世家曰周勃沛人也髙祖之為沛公以中涓從攻胡陵勃擊章邯車騎殿後漢書曰岑彭圍隗囂於西城囂將行巡周宗將蜀救兵到囂得出還冀漢軍食盡燒輜重引兵下隴耿弇亦相隨而退囂出兵尾擊諸營彭殿為後拒尾謂尾其後也凡軍在前曰啓在後曰殿後周書曰髙祖伐齊還以齊王憲為後拒齊主自率衆來追至於髙梁橋憲以精騎二千阻水為陣齊領軍叚暢直進至橋隔水招暢與語語畢憲問暢曰若何姓名暢曰領軍叚暢也公復為誰憲曰我虞候大都督耳暢曰觀公言語不是凡人今日相見何用隱其名位陳王紳梁公侯莫陳苪内史王誼等並在憲側暢固問不已憲曰我天子太弟齊王也指陳王已下並以名位告之暢鞭馬而去憲即命旋軍而齊人遽追之戈甲甚銳憲與開府宇文忻各統精兵百騎為殿以拒之斬其驍將賀蘭豹子出褥環等百餘人齊衆乃退又曰楊寛從天穆引軍趣成皋令寛與爾朱兆為後拒尋以衆議不可乃迴赴石濟寛夜行失道後期諸將咸言寛少與北海周旋今不來矣天穆答曰楊寛非輕於去就者也其所逗遛必有他故吾當與諸軍保明之語訖候騎白寛至天穆撫髀而笑曰吾固知其必來遽出將帳迎之握其手曰是所望也唐書曰胡賊掠宜君令竇軌討之初不利軌斬其部將十四人㧞隊中小帥以代之軌率數百騎殿於後令衆曰聞鼓聲有不進者自後斬之既鼓士卒爭進擊賊破之斬首千餘級虜男女二萬餘口鄉導孫子曰不用鄉導者不得地利不任役鄉人而導軍者則不能得道路之便利先知逕直之計者勝此行軍之法也衛公兵法曰凡是賊徒好相掩襲須擇勇敢之夫選明察之士兼使鄉導潛厯山原宻其聲晦其迹或刻為獸蹄而履於中途或上刻禽形而幽伏於叢薄然後傾耳以遥聽竦目以深視專智以度事機注心而候氣色見水㾗則可以測敵濟之早晩觀樹動則可以辨來㓂之馳驅也故烟火莫若謹而審旌幟莫若齊而一爵賞必動而不欺刑戮必嚴而不捨知敵之動靜而我必有其備知彼之去就而我必審其機豈不保其全哉必湏先視敵國道路逺近水潦山林路徑險阨城邑大小溝渠深淺蓄積多少兵車之數豪傑姓名審而知之用兵之要也伏兵易曰伏戎于莽三嵗不興左傳曰北戎侵鄭鄭伯患之曰彼徒我車懼其侵軼我也徒歩兵也軼突也公子突曰使勇而無剛者嘗冦而速去之嘗試也勇則能往無剛則不恥退也君為三覆以待之覆伏兵也戎輕而不整貪而無親勝不相讓敗不相救先者見獲必務進進而遇覆必速奔後者不救則無繼矣乃可以逞從之戎人之前遇覆者奔祝􅅨逐之𠂻戎師前後擊之盡殪為三部伏兵祝􅅨帥勇而無剛者先犯戎兵而速奔以遇三伏兵至後伏兵起戎還走祝􅅨返逐之戎前後及中三處受敵故曰𠂻戎師殪死𠂻丁仲反戎師大奔十一月甲寅鄭人大敗戎師又曰吳侵楚楚將養由基奔命楚司馬子庚以師繼之養由基曰呉乘我喪謂我不能師也必易我而不戒戒備也子為三覆以待我我請誘之子庚從之戰于庸浦庸浦楚地大敗吳師又曰秋九月晉侯飲趙盾酒伏兵甲將攻之其右提彌明知之右車右也趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫獒焉明搏而殺之鬭且出提彌明死之又曰衛侯在平夀平夀衛下邑公孟有事於蓋獲之門外有事祭也蓋獲衛郭門也齊氏帷於門外而伏甲焉齊豹之家後漢書曰馮異招集諸營保數萬人與賊約期㑹戰使壯士變服與赤眉同伏於道側旦日赤眉使萬人攻異前部異裁出兵以救之裁小出兵所示弱也賊見勢弱遂悉衆攻異乃縱兵大戰日昃賊氣衰伏兵卒起衣服相亂赤眉不復識别衆遂驚潰追擊大破於崤底降男女八萬人通典曰後漢末荆川牧劉表遣𤣥德北侵至鄴曹公遣將李典夏侯惇拒之𤣥德一旦燒屯去惇率諸軍追擊之典曰賊無故退疑必有伏南道窄狹草木深不可追也惇不聽與將于禁追之典留守惇等果入賊伏裏戰不利典往救𤣥德覩見救至乃退又曰後漢末吕布與陳宫等將萬餘人來與曹公戰時兵皆四出在者不數千人屯營不固曹公乃令婦人守陳餘悉令將持兵拒之屯西有大堤其南樹木幽深布疑有伏乃相謂曰曹操多詐勿入伏中引軍南七十餘里明日復來曹公隱兵堤裏出半兵堤外布益進乃令輕兵挑戰既合伏兵乘堤歩卒並進遂大破之晉書曰鎮南將軍杜元凱伐吳樂鄉城晉牙門管定周㫖等伏兵樂鄉城外吳都督孫歆先遣車出拒晉將王濬於上流大敗而還㫖等發伏兵随歆軍入歆不覺直至帳下於是進逼江陵吳督將伍延偽請降而列兵登陴晉師攻尅之十六國春秋曰後晉石季龍攻晉將劉演于廩丘晉將邵續使文鴦救演季龍退止盧開津以避之鴦文弗進屯于景亭又兖川豪右張平起兵救演季龍夜棄營設伏于外揚聲將歸河北張平以為信然入于空營季龍迴擊敗之遂䧟廩丘又曰夏赫連勃勃進屯依力川後秦姚興來伐至三城勃勃騎禦之興遣其將姚文宗拒戰勃勃偽退設伏以待之興將榆生等追之伏兵夾撃皆擒之北齊書曰叚韶與右丞相斛律光率師伐周五月攻服秦城周人於姚襄城南更起二鎮東接定陽又作深塹㫁絶行道韶乃宻抽壯士從襲之又遣潛渡河告姚襄城中令内外相應渡者千有餘人周人始覺於是合戰大破之諸將咸欲攻其新城韶曰此城一面阻河三面地險不可攻縱令得之一城地耳不如更作一城壅其要路破服秦城併加以圍定陽計之長者將士咸以為然遂圍定陽其城主楊範固守不下韶登山以觀城乃縱兵急攻之七月屠其外城韶謂光曰此城三面重澗險阻並無走路唯慮東南一處耳賊若突圍必從此出但簡精兵專守自是成擒光乃令壯士千餘人設伏於東澗口其夜果如所䇿賊遂出城伏兵擊之大潰範等面縛盡獲其衆後魏書曰万俟醜奴作亂闗中魏將賀㧞岳率兵討之岳以輕騎八百北渡渭殺畧其民以挑之醜奴大將尉遲菩薩果率歩騎三萬至渭北岳以輕騎數十與菩薩隔水交言岳稱揚國威菩薩自言强盛徃復數返時已逼暮於是各還岳宻於渭南傍水分精騎數十為一處隨地形便置之明日自將百餘騎隔水與賊相見岳漸前進先所置騎隨岳而集騎既漸増賊不復測其多少行二十許里至水淺可濟之處岳便騎馬東出似奔遁賊謂岳走乃棄歩兵南渡渭水輕騎追岳東行十餘里依横岡設伏待之賊以路險不得齊進前後繼至半度岡東岳乃迴與賊戰身先士卒急撃之賊便退走岳號令所部賊下馬者皆不聽殺賊顧見之便悉投馬俄而虜獲三千人馬亦無遺遂擒菩薩乃渡渭北降卒萬餘隋書曰煬帝征吐谷渾至覆袁川時吐谷渾主無數騎而遣其名王詐為渾主保于我真山帝令將張定和率師擊之定和既與賊相遇輕其衆少呼之命降賊不肯定和下被甲挺身登山賊伏兵於岩石之下發矢中之而斃唐書曰武徳中太宗圍王世充於中都竇建徳自河北率兵十二萬來救太宗自率騎二千五百歩卒千人趣虎牢四月建徳自滎陽西上築壘於板渚太宗以五百騎出虎牢東二十餘里將挑戰先伏李勣程齩金秦叔寳等齩五巧切令尉遲敬徳執矟造建徳壘下大呼致師賊衆大驚擾出兵數千騎太宗逡巡漸却遂引以入伏内李勣等奮擊大破之獲其大將殷秋石瓚斬首數百級又曰羅士信仕王世充率千餘人奔於糓州髙祖以為新安道行軍總管使圍世充士信進居前鋒退居後殿凡所虜獲悉分士卒以此為常身未曽自取人有功者觧衣下馬而賞之然持兵嚴暴有不用命者無間親友必皆斬决由是下不附而畏之及大軍至洛陽士信以兵圍世充千金堡其中人大罵之士信怒夜遣百餘人將嬰兒數十從南而來至於堡下詐言從東都來投羅總管也因命嬰兒啼譟既而陽驚曰此千金堡吾軰錯矣忽然而去堡中謂是東都逃人遽出兵追之士信伏五千人於路側候其開門而奔擊遂破之殺無遺類也又曰武徳中苑君璋及突厥吐渾設末攻馬邑髙滿政設三伏以待之突厥至城下伏兵發大破之斬首二百餘級以滿政為朔州總管曲赦馬邑又曰王君廓從大軍往討下轘轅羅山二縣王充遣將魏隱率兵拒之君廓撤營偽遁設伏以待之隱縱兵疾進發伏破之又曰太宗初為右元帥摠兵十萬徇東都軍屯西苑營於三王陵凡三月方欲旋師俄而隋將叚達率萬餘人自後而至太宗發伏以擊之賊師大敗親自追奔至金城斬四十餘級又曰王君廓亡命聚徒數千人轉掠長平進逼下縣河東郡丞丁榮以兵拒之又遣使慰諭君廓見其使謬為恭敬稱欲歸首榮心輕之于是曜兵登山下望十餘里君廓悉匿其衆于山谷中榮無所見引兵而退纔至山下君廓追擊之吳越春秋曰公子光伏甲于私室中具酒而王僚乃被棠夷之甲三重使軍衛陳于道鱄諸置刃魚腹而進刺王僚貫胛達背王僚立死世説曰桓𤣥伏甲設饌廣延朝士因此欲誅謝安王坦之王甚懼問謝謝之寛容愈表于貎望階趨席方作洛生詠諷浩浩洪流桓𤣥憚其曠逺乃起解兵王謝舊齊名于此始别優劣太平御覽卷三百二
