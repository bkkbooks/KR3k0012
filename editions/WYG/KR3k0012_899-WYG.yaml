body:
  text: 太平御覽卷八百九十九宋李昉等撰獸部十一牛中春秋濳潭云宫内有牛鳴政教衰諸侯相并牛兵之符也楊方五經鈎沈曰東夷之人以牛骨占事呈吉示凶無徃不中牛非含智之物骨有若此之效穆天子傳曰泰山百獸之所聚也爰有赤豹野牛又曰天子大饗正諸侯王七萃之士於平衍鵶韓之人獻用牛三百良馬百匹牥牛二百牥牛能行沙中如􅀈駞又曰天子北征舍于珠澤釣于流水因獻良馬三百牛羊二千皇甫謚帝王世紀曰黄帝於東海流波山得竒獸狀如牛蒼身無角能走出入水中則風雨光如日月其音如雷鳴黄帝殺之以其皮為皷聞五百里世本曰骸作服牛骸黄帝臣也又云少昊時人始駕牛孔子家語曰子路拯溺者其人拜之以牛子路受之孔子曰魯人必拯溺矣焦贑易林曰殺牛逐兔任非其人費日無功相牛經曰牛經自甯戚傳百里奚漢世西河薛公得其書以相牛千百不失至魏世髙堂生傳晉髙祖宣皇帝其後王愷秘其書又曰牛岐胡夀岐牽兩腋股下分為三眼去角近行駃眼欲得大眼中有白脈貫童子最快頸骨長且大駃壁堂欲得闊壁堂角眼間也倚欲得如絆馬聚而正也膺庭欲得廣膺庭胷前天關欲得成天闗背接骨㒞骨欲得垂脊中央欲得下蘭株欲得大尾株豐岳欲得大膝株骨垂星欲得有怒肉垂星蹄上也肉覆蹄間名怒肉力柱欲得大而成當也骨懸蹄欲得如八字陽鹽欲得廣陽鹽者夾尾株前兩臁上常有似馬者有黄色洞胡無夀株淵無夀旋毛當目下也上池有亂毛者妨主凶上池角中央也身欲得如卷大膁踈肋難飼龍頭突目好跳豪筋欲得成就豪筋脚後横筋也毛欲得短密若長踈不耐寒氣尾不用至地尾毛少骨多者有力膝上肉欲得堅角欲得細鼻如鏡難牽口方易飼漦府方易飼荘子曰聲氏之牛夜亡而遇䕫止而問焉曰我尚有四足動而不善子一足而起踴何以然䕫曰以吾一足王於子矣莊子曰夫􅈊牛其大如垂天之雲此能為大矣而不能執䑕又曰魯聞顔闔得道之人使幣致焉顔闔守廬粗布之衣而自飯牛魯君之使者問此顔闔家耶闔曰然使者致幣闔對曰恐聽謬而遺使者罪不若審之使者還反復求之則不得也又曰庖丁為文惠君解牛曰臣之刀十九年所解牛數千而刀刃若新發於硎彼節者有間而刀刃無厚以無厚入有間而恢恢乎其游刃必有餘地是以十九年刀刃如新管子曰屠牛長朝解九牛而刀可以剃髪則刃逰於其間也又曰或聘莊子莊子應其使曰子見夫犧牛乎衣以文繡食以芻菽及其牽入於太廟雖欲為狐犢得乎孟子曰臣聞胡齕云王坐於堂上有牽牛而過堂下者王見之曰牛何之對曰將以釁鐘王不忍其觳觫欲以羊易之是見牛而不見羊也晏子春秋曰金公之牛老於闌牢不勝服也車蠧於瓦石不勝乘也列子曰宋人有好行義者三世不懈家無故而黒牛生白犢以問孔子孔子曰此吉祥也以享上帝居一年其父無故而盲牛又復生白犢其父令其子問孔子孔子曰吉祥也復以祭居一年中其子又盲其後楚攻宋圍其城民易子而食之析骸而炊之丁壯皆乘城戰死者大半此人父子有疾皆免也吕氏春秋曰昔葛天氏之樂三人操牛尾捉足以歌八闋注事具樂部又曰使烏獲疾引牛尾絶力殚事牛不行逆也使五尺豎子引其鼻而恣所之順也又曰亂國之妖有牛馬言韓子曰商太宰嘗使庶子行市還云市門多車太宰召市吏問曰市何多牛馬耶吏怪太宰是神知又曰詹何坐弟子侍有牛鳴於門外弟子曰是黑牛也而白在其蹄詹何曰然黑牛也而白在其頭使人視之果黑牛以布裹其角尸子曰夫龍門魚之難太行牛之難以德報怨行之難也淮南子曰牛岐蹄而戴角馬被毛而全足者天也絡馬之口穿牛之鼻者人也又曰剥牛皮鞟以為皷正三軍之衆然為牛計者不若服軛也又曰城上視牛如羊如豕所居髙也又曰戴角者無上齒無角者膏而兑前豕馬之屬前小有角者脂而兑後牛羊後小又曰季春之月乃合㹎牛騰馬游牝于牧又曰取牛膽塗熱釡即鳴矣又曰牛膽塗目莫知其誰注曰取八嵗黄牛膽桂三寸著膽中百日已成因使巧工刻象人丈夫著目下為女子著頭上為小兒著頥下盛以五采囊先宿齋無令人知也文子曰語曰好牛可察也好則物之通稱牛則物之定形而通稱定形不可不察也重白而憎黑嗜甘而逆苦能定名則萬事不亂也卞子曰郭林宗謂仇季智曰子嘗有過否季智曰吾嘗飯牛牛不食一搏牛耳説苑曰秦穆公使賈人載鹽徴諸賈人百里奚以五羖羊之皮將車之秦秦穆公觀鹽見百里奚飯牛肥問何以致也對曰臣飲食以時使之不以暴有險先後之以身是以肥也穆公知其君子也乃以為之師張温自表曰昔百里奚賢秦穆公欲用之穆公好牛奚因賃官以養牛蹄上垂肉三寸公使禽息行牛息入言之公不信怒息復言之公又怒吏曰再怒其主罪當刖使守門公出禽息跪而請之曰夫養牛者願君勿忘也公乃問百里奚奚曰臣之長非養牛者也乃養民也公視牛察之則賢人也遂與同車而出謝息息曰所以不死者君未知客也今已知之矣乃觸門而死抱朴子曰南方水牛無冬夏常卧水中又曰智禽衘蘆以逆綱水牛結陣而却虎矣説苑曰齊桓公出獵逐鹿入山谷中見一老父問曰此何谷曰愚公之谷曰何也曰畜牸牛子大賣之買駒少年曰牛不能生馬遂持駒去旁人聞臣以為愚因以為谷也管子曰此臣之過也使尭在上臯陶為大理者安有取人駒乎論衡曰十圍之牛為牧豎所驅又曰牡馬見雌牛不相合者異類也風俗通曰賣牛勿握角令不售按恐觸人人不敢取又曰秦昭王使李氷為蜀守開成都兩江溉田江神嵗取童女二人為婦氷自以其女與神為婚徑至神祠勸神酒杯但澹水不耗氷厲聲責之因忽不見良久有兩蒼牛鬭於岸旁有頃氷還流汗謂官屬曰吾鬭大極不當相助耶南面腰中正白者我綬也主簿刺殺北面者江神遂死焉又曰丁壯小犢跳梁弄角飲水數石生芻十束當風露夜至死不曲博物志曰介葛盧聞牛鳴知生三犢盡為犧牲嵇叔夜以為無此皆先儒妄説又曰蜀牛不施繩右前曰排左側曰促而牛解人語又曰九真有神牛生谿上里時時共鬭即海沸而昏或出鬭岸上人家牛皆怖人或遮捕即霹靂號曰神牛捜神記曰義興方叔保傷寒垂死令郭璞占之不吉令求白牛厭之求不得璞為致之即日有白牛從西來叔保大驚遂病瘥語林曰宋岱為青州刺史禁淫祀著無鬼論有一書生葛巾修刺詣岱曰君絶我輩血食二十餘年君有青牛髯奴所以未得相困耳奴已叛牛已死今日得相制矣言絶而失明日岱死邵子曰滿奮字武秋髙平人畏風在晉武帝坐北窻有琉璃屏實宻似踈奮有懼色帝乃笑之奮曰臣猶呉牛見月而喘述異記曰牛之不角者呼為犝牛金樓子曰東海中有牛剥其皮貫之潮水至則毛起潮去則毛彌諸葛亮集曰木牛者方腹曲頭一角四足頭入腹中舌著於腹載多而行少則否宜可大用不可小使杜預奏事曰臣前在南聞於魏興西北山有野牛野羊牛之大者二千斤羊之大者千數百斤袁喬江賦曰呉時有錢約釣於牛渚獲一金鎖引之則金牛汎然而出約懼而捨因以為名束晳延遊賦曰乘露車以偃蹇駕蘭單之疲牛連縋索以為鞅結斷綆而為鞦臧彦駃牛賦曰殊相元備名不虛假偉質魁梧骨竒形雅竦若驚鹿駃若奔馬太平御覽卷八百九十九
