  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_523-1a, image: WYG0897/WYG0897-0651c.png}
body:
  text: 太平御覽卷五百二十三宋李昉等撰禮儀部二叙禮下禮記外傳曰吉凶賔軍嘉即五禮之目也吉禮者祭祀郊廟社禝之事是也起自神農氏始教民種穀禮始於飲食吹葦籥擊土鼔以迎田祖致敬鬼神祭皆用樂此伊耆氏即神農别號賔禮者䘮紀之說年榖不登大夫去國之事也黄帝始養生送死也賔禮者貢獻朝聘之事是也軍禮者始黄帝與蚩尤戰於涿鹿之野嘉禮者好㑹之事也起自伏羲以儷皮焉始制嫁娶亨通者嘉㑹之事其後有冠冠者代父之事昏有繼世之道物有代謝之期悲發於中乃非純吉故為喜慰之事者也鄉飲酒郷射食耆老王燕族人之事是也四者亦嘉㑹族人之事也但前代象天其禮質而畧後代法地其事煩而文唐虞之際五禮明偹周公所制文物極矣左傳文下曰齊侯侵我西鄙遂伐曹入其郛討其來朝也季文子曰齊侯其不免乎已則無禮而討於有禮者曰女何故行禮禮以順天天之道也已則反天而又以討人難以免矣又文公曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失隊曰見有禮於其君者事之如孝子之養父母也見無禮於其君者誅之如鷹鸇之逐鳥雀也又宣十六年晉侯使士㑹平王室定王享之原襄公相禮殽蒸蒸升也升殽於爼武子私問其故享當體薦而殽蒸故其怪問之武士㑹諡季字也王聞之召武子曰季氏而弗聞乎王享有體薦享則半觧其體而薦之所以示共儉宴有折爼體觧節折升之於爼物皆可食所以示慈恵也公當享卿當宴王室之禮也武子歸而講求典禮以脩晉國之法又昭二年晉侯使韓宣子來聘公即位故且告為政而來見禮也觀書於太史氏見易象與魯春秋曰周禮盡在魯矣吾乃知周公之徳與周之所以王也又昭公四年楚靈王使問禮於左師與子産左師曰小國習之大國用之敢不薦聞獻公合諸侯之禮六其禮六儀也宋公故獻公禮子産曰小國共職敢不薦守獻伯子男㑹公之禮六鄭伯爵故獻伯子男㑹公之禮又昭五年公如晋自郊勞至於贈賄無失禮晋侯謂女叔齊曰魯侯不亦善於禮乎對曰魯侯焉知禮公曰何為自郊勞至於贈賄禮無違者何故不知對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也又昭七年曰孟僖子病不能相禮乃講學之苟能禮者從之及其將死也召其大夫曰禮人之幹也無禮無以立吾聞將有逹者曰孔丘僖子没時孔子年二十五嵗聖人之後也我若獲没得以夀終必屬說與何忌於夫子使事之而學禮焉以定其位又昭二十五年鄭子太叔見趙簡子問揖讓周旋之禮焉對曰是儀也非禮也簡子曰敢問何為禮對曰吉也聞諸先大夫子産曰夫禮天之經也地之義也民之行也天地之經而民實則之簡子曰甚哉禮之大也對曰禮上下之紀天地之經緯也民之所以生也是故先王尚之又昭二十六年齊景公曰善哉吾今而後知禮之可以為國也晏子對曰禮之可以為國也久矣與天地並君令臣恭父慈子孝兄愛弟敬夫和妻柔姑慈婦聼禮也君令而不違臣恭而不二父慈而教子孝而箴兄愛而友弟敬而順夫和而義妻柔而正姑慈而從婦聼而婉禮之善物也又定下曰公㑹齊侯於祝其實夾谷夾谷即祝其地孔丘相㑹儀也犂彌言於齊侯曰孔丘知禮而無勇若使萊人以兵刧魯侯必得志焉又定下曰邾隐公來朝子貢觀焉邾子執玉髙其容仰公受玊卑其容俯子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之禮也將左右周旋進退俯仰於是乎觀之今正月相朝而皆不度心已亡矣又哀上曰太宰嚭呉大夫召季康子季康子使子貢辭太宰嚭曰國君道長而大夫不出門此何禮也對曰豈以為禮畏大國也大國不以禮命於諸命苟不以禮豈可量也寡君既共命焉其老豈敢棄其國太伯端委以治周禮仲雍嗣之斷髪文身臝以為飾豈禮也哉春秋說辭題曰禮者所以設明而體天地節目之端也論語有子曰禮之用和為貴先王之道斯為美小大由之有所不行知和而和不以禮節之亦不可行也子曰道之以政齊之以刑民免而無耻道之以徳齊之以禮有耻且格又子曰夏禮吾能言之杞不足徴也殷禮吾能言之宋不足徴也又子張問十世可知也子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世亦可知也又曰顔淵問仁子曰克己復禮為仁一日克己復禮天下歸仁焉為仁由己而由人乎哉顔淵曰請問其目子曰非禮勿視非禮勿聼非禮勿言非禮勿動顔淵曰囘雖不敏請事斯語矣又子曰禮云禮云玊帛云乎哉言禮非但崇此玊帛而已所貴者乃責其安上治民而已矣漢書曰漢王已并天下諸侯共尊為皇帝於定陶叔孫通就其儀號髙帝悉去秦儀法為簡易群臣飲醉爭功或妄手㧞劍撃柱上患之通知上益饜之說上曰夫儒者難與進取可與守成臣願徴魯諸生與臣弟子共起朝儀上曰可試為之令易知度吾所能行為之七年長樂宫成諸侯羣臣朝十月大行設九賔臚句傳於是皇帝輦出房百官執㦸傳警引諸侯王以下至吏六百石以次奉賀自諸侯王以下莫不震恐肅敬至禮畢盡伏置法酒文頴曰作酒令法也蘇林曰嘗㑹酒天子中起更衣然後入置酒諸侍坐殿上皆伏抑首以尊卑次起上夀觴九行謁者言罷酒御史執法舉不如儀者輙引去竟朝置酒無敢諠譁失禮者於是髙皇帝曰吾乃今日知為皇帝之貴也拜通為太常賜金五百斤通出皆以五百金賜諸生諸生乃喜曰叔孫生聖人知當世務也又曰王者必因前王之禮而順時施宜有所損益節人之心稍稍制作又曰宣帝時諫議大夫王吉上疏願述舊禮明王制驅一代之人躋仁夀之域范􅁮後漢書曰曹褒傳曰詔召𤣥武司馬班固問改定禮制之宜固曰京師諸士多能說禮宜廣招集乃能共議得失帝曰諺言作舎道傍三年不成㑹禮之家名為聚訟互生疑異筆不得下昔堯作大章一䕫足矣章和元年正月乃召褒詣嘉徳門令小黄門持班固所上叔孫通漢儀禮十二篇敕褒曰此制散畧多不合經今宜依禮條正使可施行於南宫東觀盡心集作典畧曰孔子過宋與弟子習禮於大樹下宋司馬桓魋使㧞其樹去適鄭六韜曰太公對文王曰禮者治之粉澤也管子曰禮者因人之情縁義之理為人節文者也孟子曰惻隐之心仁之端也辭讓之心禮之端也孫卿子曰禮者人主以為羣臣尺寸尋丈檢式也禮有三本天地生之本先祖類之本君師治之本故國之本在禮也又曰人生有欲則求求則爭爭則亂亂則窮先王惡亂也故制禮義以養之禮者養也稲梁五味所以養口也椒蘭芬馨所以養鼻也雕琢刻鏤黻黼文章所以養目也疏房越席沐浴机筵所以養體也荘子曰三王五帝之禮儀法度不同於同而同於治故辟三王五帝之禮儀法度其猶柤梨橘柚果𤓰之屬耶其味相反而皆可於口文子曰老子云為禮者雕琢人性矯拂其情目雖欲之禁以法心雖樂之節以禮越朔周旋屈節異儀肉凝而弗食酒散而不飲外束其形中愁其意汨隂陽之和而迫性命之情慎子曰禮從俗政上國有貴賤之禮無賢不肖之禮有長㓜之禮無勇怯之禮有親踈之禮無愛惡之禮也淮南子曰禮者體情而制文者也又曰夫水積則生相食之䖝言大魚食小魚土積則生食肉之獸禮飾則生偽慝之儒夫吹灰而欲無昧渉水而欲無濡不可得也說苑曰齊景公登酎晏子脩食禮以侍公曰禮寡人厭之矣吾欲得天下勇士與之圗國晏子對曰君子無禮是庶人也庶人無禮是禽獸也禮而治國所以御民也轡者所以馭馬也無禮而治國家者嬰未嘗聞也景公曰善乃飾酎更席以為上客尸子曰秋為禮西方為秋秋肅也萬物莫不肅敬禮之至也韓詩外傳曰晏子聘魯下堂則趨授立則跪子貢怪之問孔子孔子問晏子晏子對曰夫上堂之禮君行一臣行二也今君之受幣也卑臣敢不跪乎孔子曰善禮中又有禮也董生書曰理者天所為也文者人所為謂之禮禮者因人情以為節文以救其亂也夫隄者水之防也禮者人之防也刑防其末禮防其本也白虎通曰夫禮者隂陽之際也百事之㑹也所以尊天地賔鬼神序上下之道也袁淮書曰禮者縁人情而為節度者也嚴父愛親之情也尊親敬長之義也物禮論云禮者履也律也義同而名異孫卿禮賦曰爰有大物非絲非帛文理成章非月非日為天下眀生者以壽死也以塟城廓以固三軍以强粹而王駮而霸無一焉而亡也太平御覽卷五百二十三
