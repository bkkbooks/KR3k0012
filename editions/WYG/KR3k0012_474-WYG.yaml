body:
  text: 太平御覽卷四百七十四宋李昉等撰人事部一百一十五禮賢易曰賁于丘園束帛戔戔又曰康侯用錫馬蕃庶書日三接尚書曰所寶惟賢則邇人安又曰釋箕子囚封比干墓式商容閭毛詩曰鹿鳴燕羣臣嘉賓也既飲食之又實幣帛筐篚以將厚意我有嘉賓鼓瑟吹笙吹笙鼓簧承筐是將又曰南山有臺樂得賢也得賢則能為邦家立太平之基周禮曰三年則大比考其德行道藝而興賢者以禮賓之禮記曰賢者狎而敬之又曰天子存二代之後猶尊賢也尊賢不過二代又曰孔子曰吾食于少施氏而飽少施氏食我以禮左傳曰晉伐魯范文子謂欒武子曰季孫於魯相二君矣妾不衣帛馬不食粟可不謂忠乎信讒慝而棄忠良若諸侯何家語曰孔子之鄭遇程子於途傾葢與語三日而别國語曰勾踐滅吳及至五湖范蠡辭於王曰君王勉之臣不復入越國矣遂乗輕舟以浮五湖莫知所終極王命工以良金寫蠡之狀而朝禮之又令大夫朝之環會稽三百里為蠡邑史記曰周公戒伯禽曰我一沐三握髪一飯三起以待士猶恐失天下之賢人又曰子貢所至國無君不分庭與之抗禮又曰鄒奭者齊諸鄒亦頗采鄒衍之術以紀文於是齊王嘉之自淳于髠以下皆命曰列大夫為開第臨康莊之衢又曰魏有隱士曰侯嬴為大梁夷門監者公子聞之於是置酒大㑹賓客坐定公子從車騎虛左自往迎侯生侯生攝弊衣冠直上上坐公子執轡愈恭又曰戎王使由余於秦繆公示以宫室積聚由余曰使鬼為之則勞神矣使人為人之亦苦矣繆公於是與由余曲席而坐傳器而食又曰百里奚曰臣友蹇叔賢而時莫知繆公使人厚迎蹇叔以為上大夫又曰伊尹名阿衡或云許士湯使聘迎之三反然後肯往又曰騶子如燕昭王擁篲先驅請列弟子之坐而受業又曰越石父賢在於縲紲之中晏子出遇之途解左驂贖之載歸弗謝入門久之越石父請絶晏子瞿然攝衣冠謝又曰周威王聞莊周賢使使厚幣迎之許以為相又曰趙良說商君曰夫五羖大夫荆之鄙人也聞穆公好賢願見被褐食牛期年穆公知之舉之牛口之下而加之百姓之上秦國莫敢毁也又曰四皓隱商洛山惠帝為太子為書卑辭安車迎以為客乃出漢書曰曹參之相齊七十城天下初定悼惠王富於春秋參盡召長老諸先生問所以治諸儒以百數參未知所之聞膠西有葢公善治黄老言使人厚幣請之既見葢公蓋公為言治道貴清淨而民自定推此類言之參於是避正堂舎公焉又曰初楚元王交禮待申公等穆生不嗜酒元王每致酒常為穆生設醴及王戊即位常設醴後㤀設焉穆生退曰可以逝矣又曰雋不疑字曼倩渤海人治春秋為郡文學進退必以禮名聞州郡武帝末郡國賊盜羣起暴勝之為直指使者衣繡持斧逐捕盜賊東至渤海素聞不疑賢遣吏請與相見不疑冠進賢冠帶櫑具劒佩環玦褒衣博帶盛服至門下使解劒不疑叱曰劒者君子武備所以衞身不可解請退勝之望見不疑容貌衣冠甚偉躧履起迎又曰高祖詔曰賢士大夫有肻從我遊者吾能尊顯之布告天下有意稱明德者必身勸為之駕遣詣相國府又曰武帝初即位王藏乃上書請立明堂以朝諸侯不能就其事乃言師申公於是上使使束帛加璧安車以蒲裹車輪駕四馬迎申公弟子二人乗軺傳從至見上問治亂之事申公時已八十餘對曰為治者不在多言顧力行何如耳以為太中大夫舎魯邸議明堂事又曰御史大夫朱博奏王莽為庶人莽就國南陽太守以莽貴重選門下掾孔休守新都相休謁莽莽進禮自納休亦聞其名與相荅後莽疾休候之莽緣恩意進其玊具寶劒欲以為好休不肻受莽曰誠見君靣有瘢美玊可以滅瘢欲獻其彘耳解其彘休復辭莽曰君嫌其價耶遂椎碎之自裹以進休休乃受莽徴去欲見休休稱疾不見莽又曰大將軍既益尊然汲黯與抗禮或説黯曰天子欲羣臣下大將軍尊貴誠重君不可不拜黯曰夫以大將軍有揖客反不重耶大將軍聞愈賢黯又曰梁孝王大營宫室為複道自宫連屬於平臺招延四方豪傑自山東遊士莫不至又曰光武側席以求幽人又曰沛公至髙陽見酈食其沛公方踞使兩女子洗足食其入長揖不拜曰足下必欲聚徒合兵誅無道秦不宜踞見長者於是沛公輟洗起衣延食其上坐又曰趙壹字元叔舉郡上計到京師司徒袁逢受計吏皆拜伏庭中莫敢仰視壹獨長揖而已逢令讓之曰計使而揖三公何也對曰酈食其長揖漢王今揖三公何遽訝哉逢即斂袵下堂執其手延置上坐又曰井大春名丹少通五經善談難故京師為之語曰五經紛綸井大春守靜不交勢利建武中帝子沛獻王輔等五人皆好賓客請丹不能致信陽侯陰就光烈皇后弟也以外戚别使人要刼之丹不得已既至就故為設麥飯葱菜之食丹推去曰以君侯能供養故來何為如此就便設饌就欲起左右進輦丹曰昔桀駕人輦者是耶坐上失色就去輦談終日乃去謝承後漢書曰帝東廵過任城乃幸鄭均舎勅賜尚書禄以終其壽故人號為白衣尚書又曰包咸字子良永平五年遷大鴻臚每進見錫以几杖入朝不趨贊事不名經傳有疑輙遣小黄門就舎郎問顯宗以咸有師傅恩而素清苦常時賞賜珍玩束帛俸禄增於諸卿又曰徐穉字孺子豫章人家貧常自耕稼恭儉義讓所居服其德屢辟公府不起時陳蕃為太守以禮請署功曹穉不免之既謁而退蕃在郡不接賓客唯穉來特設一榻去則懸之後舉有道拜太原太守皆不就袁山松後漢書曰周璆字孟玉為樂城令逍遥無事縣中大治去官徴聘不至陳蕃為太守璆來置榻去則懸之續漢書曰皇甫規安定人有以貨買雁門太守還家書刺謁規規卧不迎既入而問曰卿前在郡食雁美乎有頃曰王符在門規素聞符名乃遽起衣不及帶屐履出迎援符手而還與同坐極忻時人為之語曰徒見二千石不如一縫掖言書生道義之為貴東觀漢記曰顯宗張以酺授皇太子經為東郡太守元和二年東廵狩幸東郡酺引及門生并郡縣掾吏並㑹庭中帝先備弟子之儀使酺講尚書一篇然後脩君臣之禮常賜殊特又曰和帝永元三年詔曰高祖功臣蕭曹為首有傳世不絶之義曹相國容城侯無嗣朕甚閔焉望長陵東門見二臣之墓生既有節終不遠身可遣使者以中牢祠大鴻臚悉求宜為嗣者又曰永平中江革為五官中郎將朝會帝詔使虎賁迎扶掖革每進拜上輙自禮之小有疾輙太官送食寵遇甚厚京師貴戚衞尉順陽侯馬廖侍中竇憲等各奉書致禮遺革終不發書無所當受上以此重之又曰東平憲王蒼上書表薦名士左馮翊桓虞等虛已禮下與㕘政事又曰上還幸祭遵營時遵病上為重茵席覆以御葢又曰東平憲王蒼開東閣延英雄袁宏後漢記曰崔駰詣竇憲始及門憲倒屣迎之曰吾受詔交公公何得薄哉魏志曰文帝引故漢太尉楊彪待以客禮詔曰乃祖以來世著名節年過七十行不踰涯可謂老成人矣所宜寵異以彰舊德其賜公延年杖又曰太祖北征烏桓未至先遣使辟田疇又命田豫喻指疇戒其門下趨治裝門人謂曰昔袁公慕君禮命五至君義不屈今曹公使一來而君若恐弗及者何也疇嘆而應之曰此非君所識遂隨使者到軍署司空户曹掾引見諮談明日出令曰田子泰非吾所宜吏者即舉茂才隨軍又曰管寧遇天下亂往遼東投公孫度度虛館以待之又曰鉅鹿張臶字子明養志不仕廣平太守盧毓到官三日綱紀白承前致板謁臶毓教曰張先生所謂上不事天子下不友諸侯豈此板謁所可光飾哉但主簿奉書致羊酒之禮又曰太祖北征柳城遇涿郡令曰此中郎將盧植名著海内舉為儒宗乃國之棟幹也孤到此州嘉其餘風春秋之義賢者之後有異於人亟遣掾脩餙墳墓并致薄酹以彰厥德又曰王粲徙長安左中郎將蔡邕見而奇之時邕才學顯著貴重朝廷常車騎塡巷賓客盈坐聞粲在門倒屣迎之粲至年既幼弱容狀短小一坐盡驚邕曰此王公孫有異才吾不如也吾家書籍文章盡當與之吳志曰孫䇿得張昭甚悅謂曰吾方有事於四方待子不得輕矣乃上為校尉待以師友之禮又曰碩邵年二十起家為豫章太守下車禮先賢徐孺子之墓優待其後又曰呂蒙疾發孫權迎置内殿欲數見又恐其勞動常穿壁瞻之又曰太守王朗以虞翻為功曹孫䇿征會稽復命為功曹待以交友之禮蜀志曰先主得諸葛亮情好日宻闗張諸人不悅先主解之曰孤之有孔明猶魚之有水也又曰諸葛亮表曰先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中諮臣以當世之務蕭子雲晉書曰明帝以太常桓榮為五更躬式其閭親行養老禮崔鴻北涼錄曰沮渠蒙遜令曰秘書郎中燉煌劉彦明學冠當時道先區内可授𤣥虛先生拜以三老之禮起陸沉觀於東苑以處之崔鴻前凉録曰宋纎字令文不應州郡辟命唯與陰顒齊好友善太守楊宣畫其象於閣出入視之崔鴻前秦録曰苻堅要結英豪王景畧呂婆樓强汪梁平等皆有王佐之才堅並傾身禮之以為股肱羽翼管子曰桓公在位管仲隰朋侍立有間二鴻飛而過桓公歎曰仲父今彼鴻鵠有時而南有時而北有時而往有時而來寡人之有仲父猶飛鴻之有羽翼孔藂子曰子魚居衞與張耳陳餘相善㑹陳勝吳廣自立為王耳餘並為將遂言之陳王大悅遣使者賫千金加束帛以車三乗迎之子魚遂往陳王郊迎而執其手議時務孟子曰舜見帝帝館於貳室迭為賓主是天子而友匹夫用下敬上謂之貴貴用上敬下謂之尊賢其義一也韓子曰文王伐崇與大夫謀襪係解視左右而自結之又曰齊桓公於時有處士小臣稷桓公三往見之不得見公曰吾聞布衣之士而輕爵禄雖萬乗無以異萬乗之主不好仁義亦無以下布衣之士於是五往乃得見董子曰禹見耕者五耦而式過十室之邑而下見山仰之見谷俯之備有道德之人避俗之士也淮南子曰淮南王安養士數千人其中高才八人又曰一目之羅不可以得鳥無餌之鈎不可以得魚遇士無禮不可以得賢呂氏春秋曰魏文侯見叚干木立倦而不敢息及見翟璜踞於堂而與之言翟璜不悅文侯曰叚干木官之則不肻禄之則不受今汝欲官則相至欲禄則上卿既受吾爵又責吾禮無乃難乎韓詩外傳曰周公攝天子位七年布衣之士執贄所師見者十人所友見者十二人窮巷白屋所先見者四十九人時進善者百人教士者千人官朝者萬人當此之時誠使周公驕而且吝則天下賢士至者寡矣又曰楚襄王遣使者持金千斤白璧百雙聘莊子欲以為相莊子曰獨不見太廟之牲乎衣以文繡食以芻豢出則清道而行止則居帳之内此豈不貴乎乃其不免於死宰執旌居前或持在後當此之時雖欲為孤犢從雞䑕遊豈可得乎僕聞之左手據天下之國右手刎其頸愚者不為也環濟吳記曰皇太子登字子高上為選置師傅妙簡俊秀於是諸葛恪張休顧譚陳表等以選入侍誦講詩書其待接僚屬以布衣之禮與恪休譚等或同輿而載或共牀而寢劉縚先聖本紀曰伊尹耕於有莘之野王馳往見之彭氏子諌曰伊尹賤人可徒致之君無辱車乗王曰夫一草之本可已天子病者天子猶欣喜食之子誠不欲藥人病也遂黜彭氏之子皇甫士安高士傳曰老萊子楚人耕於蒙山之陽萑葭為牆蓬蓽為屋板木為牀蓍艾為席或言楚王楚王遂至老萊子之門曰寡人愚陋獨守宗廟先生幸臨之老萊子曰僕山野之人不足以守政又曰亥唐者晉人也晉平公時朝多賢臣祁奚趙武師曠叔向皆為卿大夫名顯諸侯唐獨善不官隱於窮巷平公聞其賢致禮與相見而請事焉平公待於門唐曰入公乃入唐曰坐公乃坐唐曰食公乃食唐之食公也雖疏食菜􅅅公不敢不飽又曰朝福也者涿郡人以行義脩潔著名昭帝時大將軍霍光秉政表顯義士詔郡國條奏行狀天下得福等五人福治義最高以德行徴至京兆病不進會稽典畧曰范蠡字少伯越之上將軍也本楚宛三户人被髪佯狂倜儻負俗文種為宛令遣吏奉謁吏還曰范蠡本國狂人生有此病種笑曰吾聞士有賢聖之資必有佯狂之義内有獨見之明外有不知之毁此固非二三子之所知也駕車而往蠡知種之必來謂兄嫂曰今日有客願假衣冠有頃種至抵掌而談旁觀者聳聽說苑曰鄒子說梁王曰伊尹有莘氏之媵臣湯立以為三公管仲城陰之狗盜齊桓以為仲父百里奚乞食於路穆公委之以政寗戚叩轅行歌桓公任之以國太公望出夫朝歌之屠年七十而相周九十而封齊故詩云綿綿之葛在於曠野良工得之以為絺綌良工不得枯死於地又曰齊桓公設庭燎為士之欲造者期年而士不至東野鄙人有以九九之術見者桓公曰九九足以見乎對曰臣非以九九為足以見也臣聞主君設庭燎以待士期年而士不至夫士之所以不至者君天下賢君也四方之士皆自謂不及君故不至也夫九九薄能耳而君猶禮之况賢於九九者乎桓公曰善乃因禮之期月四方之士相擕而至又曰齊桓公使管仲治國管仲對曰賤不能臨貴公以為上卿而國不治桓公曰何故管仲對曰貧不能禦富桓公賜之齊市租一年而國不治桓公曰何故曰疏不能制近桓公立以為仲父齊國大安而遂覇天下孔子曰管仲之賢而不得此三權者亦不能使其君南面而伯又曰燕昭王問於郭隗曰寡人地狹民寛齊人削取八城匈奴驅樓煩之下以孤之不肖得承宗廟恐危社稷存之有道乎郭隗對曰帝者之臣其名臣其實師也王者之臣其名臣其實友也覇者之臣其名臣其實僕也亡國之臣其名臣其實虜也今王將東面目指氣使以求臣則厮役之才至矣北面等禮不乗之以勢求臣則朋友之才至矣西面逡廵以求臣即師傅之才至矣誠欲興道隗請為天下之士開路於是燕王置郭隗為上客又曰宋司城子罕之貴子韋也入與共養出同與衣司城子罕亡子韋不從子罕既復更召貴之左右曰君善子韋也亡不從來貴之君獨不愧於君之忠臣乎子罕曰吾唯不用子韋故至於亡今吾之得復尚是子韋之道德餘教也又曰楊回北見趙簡子曰臣居鄉三逐事君五去聞君好士故走來見簡子聞之絶食而歎左右進諌曰居鄉三逐是不容衆也事君五去是不忠尚也簡子曰子不知也夫美女醜婦之仇盛德君子亂世所疏也正直之行邪枉所憎也遂出見之因授以為相而國大治又曰朝無人猶鴻鵠之無翼也劉向新序曰魏文侯過叚干木之閭而式其僕曰君何為式曰叚干木葢賢者安敢不式且吾聞叚干木未肻以已易寡人之貴也叚干木光乎德寡人光於地干木富於義寡人富乎財地不如德財不如義寡人當事之世說曰陳仲舉為豫章太守至便問徐穉子所在欲先省之主簿曰羣情欲府君先入廨陳曰武王式商容之閭席不暇暖吾之禮賢有何不可又曰何晏為吏部尚書有位望時談客盈坐王弼未弱冠往見之聞弼來乃倒屣迎之邴原别傳曰原字根矩上北伐單于還往昌國原至門下通謁上甚喜覽履而起遠出迎原曰誠副饑虛之心虞孝叔高士傳曰宗少文博學善屬文清心簡務宋高祖領荆州辟為主簿少文不應高祖乃徹衞率爾從之遊近登第樹聽其高談嘆曰不知禮乃覺心明張璠漢記曰荀爽弟兄八人時人謂之八龍舊居豪里縣令苑康曰昔髙陽氏有才子八人署其里曰髙陽里葛洪西京雜記曰公孫𢎞自以布衣為宰相乃開東閣營客館以招天下之士阮籍秦記曰昔子夏處西河之上而文侯擁篲鄒子居黍谷之陰而昭王陪乗夫布衣窮居韋帶之士王公大人所以屈體而下之者為道存也葛洪西京雜記公孫𢎞營客館以招天下之士其外曰欽賢之館待大賢次曰翹材之館以待其材次曰接士之館以待國士又曰文帝為太子立思賢苑以招賓客虞預㑹稽典録曰陳囂山陰人宗正劉向黄門侍郎揚雄薦囂待義可厲薄俗孝成皇帝特以公車徴囂時已年七十每朝請上常待以師傅之禮又曰光武嘗出南郊嚴遵曳長裾持鹿扇住立不動天子下車揖而别曹植公讌詩曰公子敬愛客終晏不知疲清夜遊西園飛葢相追隨太平御覽卷四百七十四
