  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_196-1a, image: WYG0894/WYG0894-0722c.png}
body:
  text: 太平御覽卷一百九十六宋李昉等撰居處部二十四苑囿苑囿風俗通曰苑藴也薪蒸藴積也言畜魚鱉䖏也囿猶有也説文曰苑有園曰囿一曰養禽獸曰囿毛詩文王靈臺曰王在靈囿麀鹿攸伏左傳僖上曰齊侯與蔡姬乘舟于囿蕩公公懼變色禁之不可公怒歸之未絶蔡人嫁之又成下曰十八年秋築鹿囿書不時也又曰冬築郎囿書不時也季孫欲速成叔孫昭子曰焉用速成其以勤民也無囿猶可無民其可乎又曰鄭之有原圃猶秦之有具囿注皆囿名也毛萇詩注曰囿所以養禽獸天子百里諸侯四十里大戴禮曰正月祭韮囿周官曰囿人掌㳺囿之獸禁鄭𤣥注云㳺囿囿之離宫小苑逰觀處也禁者其蕃衛也囿㳺之獸㳺牧之獸也史記曰漢二年東畧地故秦苑囿園池皆令民田之滑稽傳曰秦始皇欲大苑囿東至函谷闗西至陳倉優旃曰善多縱禽獸於其中寇從東方來令獸觸之足矣始皇以故輟止又蕭相國請曰上林中多空地願令民得田苑中上大怒曰相國多受民財乃為民請吾苑乃下廷尉械繋數日王衛尉侍曰便於民而請真宰相事陛下距楚數嵗陳豨黥布反上自擊之當是時相國守闗中揺足則闗已西非陛下有也相國不此時為利今乃利賈人之金乎陛下何疑於是使持節赦出何徒跣謝上曰休矣相國為民請吾苑吾不許我不過為桀紂主而相國為賢相耳漢書曰武帝好㣲行往南山下乃知帝㣲行數出也然尚廹於太后未敢逺出丞相御史知㫖乃使右輔都尉徼循長楊以東右内使發小民供待㑹所後乃私置更衣從宣曲以南十二所中休更衣師古曰宣曲宫名在昆明池西投宿諸宫長楊五柞信楊宣曲尤幸於是上以為道逺勞苦又為百姓所患乃使太中大夫吾丘夀王待詔能月算者二人舉籍阿城以南阿城本秦阿房宫也盩厔以東宜春以西隄封頃畝及其價直欲除以為上林苑屬之南山又詔中尉左右内史表屬縣草田欲以償鄠杜之民時東方朔在傍進諫曰臣聞謙遜静慤天表之應應之以福驕溢靡麗天表之應應之以異今陛下累廊臺恐其不髙也師古曰廊者堂下周屋也弋獵之處恐不廣也如今不為變則三輔之地盡可以為苑何以償盩厔鄠杜乎奢侈起制天為之變上林雖小臣尚以為大也夫南山天下之阻也南有江淮北有河渭其地從汧隴以東商雒以西厥壤肥饒漢興去三河之北止覇産以西都涇渭之南此所謂天下陸海之地秦之所以虜西戎兼山東者也其山出玉石金銀銅鐵豫章檀柘異類之物不可勝原此百工所取給萬民所仰足也又有秔稻梨栗桑麻竹箭之饒土宜薑芋水多䵷魚貧者得以人給家足無飢寒之憂故酆鎬之間號為土膏其賈畝一金今規以為苑絶陂池水澤之利而取民膏腴之地上乏國家之用下奪農桑之業棄成功就敗事損耗五榖是其不可一也且盛荆棘之林而長養麋鹿廣狐兎之苑大虎狼之虛又壊人冡墓發人室廬令㓜弱懐土而思耆老泣涕而悲是其不可二也斥而營之垣而囿之騎馳東西車騖南北又有深溝大渠夫一日之樂不足以危無隄之輿是其不可三也故務苑囿之大恤農時非所以彊國富人也夫殷作九市之宫而諸侯畔靈王起章華之臺而楚民散秦興阿房之殿而天下亂糞土愚臣忘生觸死逆盛意犯隆指罪當萬死不勝大願願陳泰階六符以觀天變不可不省是日因奏泰階之事上廼拜朔為太中大夫給事中賜黄金百斤然遂起上林苑如夀王所奏云又曰武帝初建元三年微行始出北至池陽西至黄山南獵長楊東㳺宜春微行常用飲酎已八九月中與侍中常侍武騎及待詔隴西北地良家子能騎射者期諸殿門故有期門之號自此始微行以夜漏下十刻廼與常稱平陽侯旦明入山下騎射鹿豕狐兎手格熊羆馳騖禾稼稻秔之地民皆號呼罵詈也又曰宣帝神爵三年起樂逰苑三輔黄圖云在杜陵苑又曰元始元年罷安定呼池苑以為安民縣又曰枚乗説吳王曰漢上林離宫積聚玩好圏守禽獸不如長洲之苑㳺曲臺臨上路不如朝夕之池又曰房太子既冠就宫為立博望苑以通賔客范曄後漢書曰永初六年春正月庚申詔越雋置長利髙望如昌三苑又令益州置萬嵗苑犍為置漢平苑又曰延熹二年初造昆陽苑置丞尉又曰安帝永初元年以廣平逰獵地假與貧民廣成苑名在汝州又曰靈帝光和三年作罼圭靈崐苑罼圭苑有二東罼圭周圍一千五百歩中有魚梁臺西苑周三百三十歩並在洛陽宣平門外又曰靈帝光和五年始制圃囿置以宦者為令又曰楊賜為少府光禄勲代劉郃為司徒帝欲造罼圭靈崐之苑賜上疏諫曰竊聞使者並出規度城南人田欲以為苑昔先王造苑囿裁足以容修三驅之禮薪萊芻牧皆悉往焉先帝之制左補鴻池右作上林不奢不約以合禮中今猥規郊城之地以為苑囿壊沃衍廢田園驅居人奢禽獸殆作非所謂若赤保子之義今城外苑已有五六陽嘉元年起西苑延熹三年造顯陽苑洛陽宫殿名有平樂苑上林苑桓帝延熹元年置鴻徳苑可以遣情意順四時也宜惟夏禹卑宫太宗露臺之義以慰下人之勞書奏帝意欲止以問侍中任芝中常侍曹松等曰昔文王之囿百里人以為小齊宣七十里人以為大今與百姓共之無害於政也帝恱遂令築苑漢官典職曰宫内苑聚土為山十里九坂種竒樹育麋鹿麑麂鳥獸百種激上河水銅龍吐水銅仙人銜盃受水下注天子乗輦逰獵苑中漢舊儀曰上林苑中廣長三百里置令丞左右尉苑中養百獸天子遇秋冬獵射苑中取禽獸無數其中離宫七十所皆容千乘萬騎又曰武帝時使上林苑中官奴婢及天下民貧貲不滿五十萬徙置苑中人五日五錢到帝得七十億萬以給軍擊西域續漢書獻帝紀曰昭寧元年董卓住兵屯陽苑使者就拜司空續漢書百官志曰上林苑令一人六百石主苑中禽獸東觀漢記曰桓帝延熹元年初置鴻徳苑張璠漢記曰梁冀多饒苑囿西至𢎞農東至滎陽南入魯陽北到河淇崔鴻十六國春秋後趙録曰趙王八年春正月立桑梓苑於襄國後燕録曰慕容熙築龍勝苑廣袤十餘里役二萬人又起景靈山苑内基廣五百歩峰髙十七丈又起逍遥宫甘露殿連房數百觀門相交鑿天河渠引入宫晉宫閣名曰洛陽有洪徳苑靈昆苑平樂苑河南十二境簿曰河南縣有鹿子苑洛陽城西有桑梓苑孟子曰齊宣王問孟子曰文王之囿方七十里有諸何其大也孟子曰民猶以為小也王曰寡人之囿方四十里民以為大何也曰文王之囿芻蕘雉兎者往焉與民同之民以為小宜矣王之囿殺麋鹿者如殺人是以四十里為穽也民以為大不亦宜乎吕氏春秋曰昔先王之為苑囿園池足觀望勞形而已矣非好侈節乎性也陶季直京都記曰覆舟山周廻二十里有林名白水苑又曰建康縣北呉朝為桂林苑南朝宫苑記曰樂㳺苑在覆舟山南北連山築臺觀苑内起正陽林光等殿又曰桂林苑在落星山之陽吳都賦云數軍實于桂林之苑即此也又曰芳林苑一名桃花園本齊髙帝舊宅在廢東府城邉秦淮大路北齊王融作曲水詩序載懐平浦乃睠芳林即此也又曰南苑在臺城南鳯臺山宋孝武以南苑地給張永云曰給三百年期訖更啟即此也渚宫故事云湘東王於子城中造湘東苑穿地構山長數百丈植蓮蒲縁岸雜以竒木其上有通波閣跨水為之南有芙蓉堂東有禊飲堂堂後有隐士亭北有正武堂堂前有射堋馬埒其西有鄉射堂堂安行堋可得移動東南有連理樹太清初生此連理當時以為湘東踐祚之瑞北有映月亭修竹堂臨水齋前有高山山有洞石潜行宛委二百餘歩山上有陽雲樓極髙峻逺近皆見北有臨風亭明月樓顔之推云屢陪明月宴並將軍扈義熙所造三輔黄圖曰二觀十四宫在甘泉苑垣内甘泉苑起仙人觀石虎鄴中記曰鄴城西三里桑梓苑有宫臨漳水凡此諸宫皆夫人侍婢又並有苑囿養獐鹿雉兎虎數逰宴於其中西京雜記曰廬陵王胥有勇力恒於别囿學格熊羆後遂能空手搏之又曰樂逰苑自生玫瑰樹樹下多苜蓿又曰文帝為太子立思賢苑以招賔客又曰梁孝王好宫室苑囿之樂作耀華之宫築兎園園中有白室山山上膚寸石落猿巖棲龍岫又有雁池池間有鶴洲鳬渚宫舘相連延亘數里竒果異樹瑰禽怪獸靡不畢備王與宫人賔客弋釣其中韓子曰秦大飢應侯請發五苑果棗悉以活民王曰秦法賞有功誅有罪今發五苑是有功無功俱賞也禮稽命微曰外内之制各得其所四方之事無有畜滯則麟逰囿六畜繁多天苑有徳星應白虎通曰苑囿所以在東方何苑囿養萬物者也東方所以生也戰國䇿曰張儀說韓王曰大王不助秦鴻臺之宫樂林之苑非韓之有也拾遺記曰黄帝為養龍之囿洞𡨕記曰北及𤣥坂去空同七十萬里日月不至其地自明有紫河萬里流沫千丈中有寒河霜下方香茂也北有潰陽之山有兎如鼠能飛毛色光如漆以腦和丹食則不死帝使放兎於昭祥苑苑在甘泉宫西周千里萬國獻異物皆集此中三輔黄圖曰甘泉苑起仙人觀縁山谷行至雲陽三百八十里入右扶風周廻五百四十里西京記曰東宫有九殿禁苑在宫城之北苑中有四面監分掌宫中種植及修緝又置苑總監都統並屬司農寺又曰東都苑隋曰㑹通苑又改為芳華又曰神都苑周廻一百二十六里東面七十里南面三十九里西面五十里北面二十四里太平御覽卷一百九十六
