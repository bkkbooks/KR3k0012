body:
  text: 太平御覽卷五百九十六宋李昉等撰文部十二誄弔文哀辭哀䇿誄釋名曰誄累也累列其事而稱之也說文曰誄謚也周禮春官曰太史掌建邦之六典大䘮執法以蒞勸防鄭司農云勸防引六紼遣之日讀誄累其行而讀之為之謚也䘮事攷焉為有得失小䘮賜謚禮記檀弓曰魯哀公誄孔丘曰天不愸遺一老莫相予位焉嗚呼哀哉尼父又曾子問曰賤不誄貴㓜不誄長禮也唯天子稱天以誄之諸侯相誄非禮也檀弓上曰魯莊公及宋人戰于乗丘縣賁父御卜國為右馬驚敗績公墜佐車授綏公曰末之卜也縣賁父曰它日不敗績而今敗績是無勇也遂死之三人赴敵而死圉人浴馬有流矢在白肉公曰非其罪也流矢中馬非御與右之罪遂誄之士之有誄自此始也傳曰誄者累其行迹而為之謚也漢書曰景帝中元二年春三月令諸侯王薨列侯初封及之國大鴻臚奏謚誄䇿應邵曰諸侯王皆属大鴻臚故薨奏其行亦賜與謚及哀䇿誄文也列侯薨及諸侯太傅初除之官大行奏謚誄䇿師古曰大鴻臚本名典客大行令即典客之属官也後改曰大行令如淳曰三公薨以䇿書誄其行東觀漢記曰杜篤字季雅客居美陽與美陽令遊數從請託不諧頗相恨令奴收篤送京師㑹大司馬吳漢薨世祖詔諸儒誄之篤於獄中為誄辭最高世祖美之賜帛免死魏志明帝詔曹植曰吾既薄才至於賦誄特不閑從兒陵上還哀懐未散作兒誄為田家公語耳答曰奉詔并見聖思所作故平原公主誄文義相扶章章殊興句句感切哀動聖明痛貫天地楚王臣彪等聞臣為讀莫不揮涕晉中興書曰郄超死之日貴賤操筆為誄者四十餘人其為物所宗如此齊書曰謝超宗有名譽善屬文為新安王子鸞國常侍王母殷淑儀卒超宗作誄奏帝大嗟賞謂莊曰超宗殊有鳳毛文章流别論曰詩頌箴銘之篇皆有徃古成文可放依而作惟誄無定制故作者多異焉見於典籍者左傳有魯哀公為孔子誄文心雕龍曰周世盛徳有銘誄之文大夫之才臨䘮能誄誄者累其徳行旌之不朽也夏商之前其詳靡聞周雖有誄未被於士又賤不誄貴㓜不誄長其在萬乗則稱天以誄之讀誄定謚其節文大矣自魯莊戰乗丘始及於士迨尼父之卒哀公作誄觀其愸遺之辭嗚呼之嘆雖非睿作古式存焉至柳妻之誄惠子則辭哀而韻長矣暨乎漢世承流而作揚雄之誄元后文實煩穢沙麓撮其要而摯疑成篇安有誄徳述尊而濶畧四句乎杜篤之誄有譽前代吳誄雖工而結篇頗踈豈以見稱光武而顧盻千金哉傅毅所製文體倫序孝山崔瑗辨㓗相叅觀序如傳辭靡律調固誄之才也潘岳搆意専師孝山巧於叙悲易入新麗所以隔代相望能徴厥聲者也至如崔駰誄趙劉陶誄黄並得憲章貴在簡要陳思叨名而體實繁緩文皇誄末㫖言自陳其乖甚矣若夫殷臣誄湯追褒𤣥鳥之􅍈周史歌文上闡后稷之烈誄述祖宗盖詩人之則也至於序述哀情觸類而長傅毅之誄北海云白日幽光雰霧杳冥始序致惑遂為後式景而效者彌取於巧矣詳夫誄之為制盖選言以録行傳體而頌文榮始而哀終論其人也曖乎若可覿道其哀也悽焉如可傷此其㫖也又曰陳思之文羣才之㒞也而武帝誄云尊靈永蟄明帝頌曰聖體浮輕輕浮有似於蝴蝶永蟄頗擬於昆䖝施之尊極不其蚩乎南史曰宋謝莊作宣貴妃誄首賛尭門方之漢鈎弋也及廢帝即位下莊于獄曰卿作此誄時知有東宫否列女傳曰柳下惠死門下將誄之妻曰將述夫子徳耶二三子不若余知乃為誄曰夫子之信誠與人無害兮嗚呼哀哉神魂泄兮夫子之謚冝為惠兮門人從之世說曰長孫樂作王長史誄云余與夫子交非勢利心猶澄水同此𤣥味王孝伯見云才士不遜亡祖何至與此人周旋又曰謝太傅問主簿陸退張憑何以作母誄而不作父誄退答云故當是丈夫之徳表於事行婦人之美非誄不顯弔文文心雕龍曰弔者至也詩云神之弔矣言神至也君子令終定謚事極理哀故賔之慰主亦以至到為言也壓溺乖道所以不弔矣又宋水鄭火行人奉辭國災人亡故同弔也及晋築虒􅄗齊襲燕城史趙蘇秦翻賀為弔害民搆怨亦亡之道凢斯之例弔之所設也或驕貴以殞身或狷忿以乖道或有志而無時或美才而兼累追而慰之並名為弔自賈誼浮湘發憤弔屈體周而事覈辭清而理哀盖首出之作也又相如之弔二世全為賦體桓譚以為其言惻愴讀者嘆息及卒章要切斷而能悲也揚雄弔屈思積功寡意深文畧故辭韻沉膇班彪蔡邕並敏於致語然影附賈氏難為並驅耳胡阮之弔夷齊褒而無文仲宣所製譏呵實工然則胡阮嘉其清王子傷其隘各其志也彌衡之弔平子縟麗而輕清陸機之弔魏武詞巧而文繁降斯已下未有可稱者矣夫弔雖古義而華詞未造華過韻緩則化而為賦固宜正義以䋲理昭徳而塞違割析襃貶哀而有正則無奪倫矣左傳莊十一年曰秋宋大水公使弔焉曰天作滛雨害於粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱臧文仲曰宋其興乎禹湯罪已其興也勃焉桀紂罪人其亡也忽焉且列國有㓙稱孤禮也言懼而名禮其庶乎史記曰相如從上至長楊還過宜春宫奏賦以哀二世行失也其辭曰東馳土山兮北碣石瀬彌節容與兮歴弔二世持身不謹兮亡國失勢信䜛不寤兮宗廟㓕絶墳墓蕪穢而不脩兮魂無歸而不食漢書曰揚雄怪屈原文過相如至不容作離騷自投江而死悲其文未嘗不流涕也以為君子遇不遇命也何必沉身哉廼作書徃徃摭離騷文而反之自岷山投諸江流以弔屈原名曰反騷禰衡别傳曰南陽㓂松栢託劉景昇景昇嘗待遇景昇當蹔小出屬守長胡政令給視之松栢父子宿與政不佳景昇不在松柏子在後羅入盗迹胡政無狀便爾殺之景昇還慙悼無已即治殺胡政為作三牲醊焉正平為作板書弔之時當行在馬上即駐馬授筆倚柱而作之彌衡弔張衡其辭曰南岳有精君誕其姿清和有理君逹其機故能下筆繡辭揚手文飛昔伊尹值湯吕尚遇旦嗟矣君生而獨值漢蒼蝇争飛鳳凰已散元龜可覊河龍可絆石堅而朽星華而㓕惟道興隆悠永靡絶君音永浮河水有竭君聲永流旦光沒發余生雖後身亦存遊士貴知己君其勿􅁨糜元弔比干曰余既詰紂之後又感比干亢辭進諫不顧其身而受刳屠之戮殺身之後紂不悔寤失身快㓙君之心而無益於世故復責而弔之糜元弔夷齊曰少承洪烈闕於王側聞先生餓於首陽敢不敬弔寄之山崗嗚呼哀哉夫五徳更運天秩靡常如有絶代之主必有受命之王故堯終於虞舜禹殄於成湯且夏后氏之末祀殷氏之所亡若周武為有失則帝乙亦有傷子不棄殷而餓死我獨背周而深藏所在誰路而子經之首陽誰山而子匿之彼􅅔誰菜而子食之行周之道藏周之林讀周之書彈周之琴飲周之水食周之芹而謗周之主謂周之滛是誦聖之文聼聖之音居聖之世而異聖之心束晢弔蕭孟恩文曰東海蕭惠孟恩者父昔為御史與晢先君同僚孟恩及晢旦夕同逰分義早著孟恩夫婦皆亡門無血𦙍時有伯母從兄之憂未獲自徃致文一篇以弔其魂并修薄奠其文曰舊友人陽平束晢謹請同業生李察奉脯脩一束麥糒一器以致詞於處士蕭生之墓曰嗚呼哀哉精爽遐登形骸幽匿有耶亡耶莫之能測敬薦薄饋魂兮来食孟恩孟恩豈猶我識束晢弔衛巨山曰元康元年楚王瑋矯詔舉兵害太保衛公及公四子三孫公世子黄門郎巨山與晢有交好時自本郡來赴其喪作弔文一篇以告其柩曰同志舊友陽平束晢頃聞飛虎肆暴竊矯皇制禍集於子宗嗣㡬㓕越自異方來赴來别遥望子弟銘旌藂立既闚子庭其殯盈十徘徊感慟載拜載泣歛袂升階子不我揖引袂授祛子不我執哀哉魂兮於焉栖集李充弔􅄞中散曰先生挺邈世之風負髙明之質神蕭蕭以宏遠志落落以遐逸忘尊榮於華堂括卑静於蓬室寧漆園之逍遥安柱下之得一寄欣孤松取樂竹林尚想榮莊聊與抽簮味孫觴之濁醪鳴七絃之清琴慕義人之𤣥㫖詠千載之徽音凌晨風而長嘯託歸流而詠吟乃自足於丘壑孰有慍乎陸沉馬樂原而跂足龜悅塗而曵尾疇廟堂而足榮豈和鈴之足視乆先生之所期羗𤣥逹於遐㫖尚遺大以出生何殉小而入死嗟乎先生逢時命之不丁冀後凋於嵗寒遭繁霜於夏零㓕皎皎之玊質絶琅琅之金聲援明珠以彈雀捐所重而為輕諒鄙心之不爽非大雅之所營袁宏友李氏弔嵇中散曰宣尼有言曰惟仁者能好人能惡人自非賢智之流不可以褒貶明徳擬議英哲矣故彼嵇中散之為人可謂命世之傑矣觀其徳行竒偉風韻劭邈有似明月之映幽夜清風之過松林也若夫吕安者嵇子之良友也鍾㑹者天下之惡人也良友不可以不明明之而理全惡人不可以不拒拒之而道顯夜光匪與魚目比映三秀難與朝華争榮故布鼓自嫌於雷門礫石有忌於琳琅矣嗟乎道之喪也雖智周萬物不能違顛沛之難故存其心者不以一𤯝累懐撿乎跡者必以纎芥為事慨逹人之獲譏悼髙範之莫全凌清風以三嘆撫絲桐而悵焉聞先覺之髙唱理極滯其必宣候千載之大聖期五百之明賢聊寄憤於斯章思慷慨而泫然哀辭文章流别論曰哀辭者誄之流也崔瑗蘇順馬融等為之率以施於童殤夭折不以夀終者建安中文帝臨淄侯各失稚子命徐幹劉楨等為之哀辭哀辭之體以哀痛為主縁以嘆心之辭文心雕龍曰哀者依也悲實依心故曰哀也以辭遣哀盖下淚之悼故不在黄髪必施天昏昔三良殉秦百夫莫贖事均夭横黄鳥賦哀抑亦詩人之哀辭乎漢武封禪而霍嬗暴亡帝傷而作詩亦哀辭之類也降及後漢汝陽王亡崔瑗哀辭始變前式然履突鬼門怪而不辭駕龍乗雲僊而不哀又卒章五言頗似歌謡亦髣髴乎漢武也至於蘇順張升並述哀文雖發其情華而未極心實建安哀辭唯偉長差善行女一篇時有惻怛及潘岳繼作實踵其美觀其慮善詞變情洞悲苦叙事如傳結言摹詩促節四言鮮有緩句故能義直而文婉體舊而趣新金鹿澤蘭莫之或繼也原夫哀辭大體情主於痛傷而辭窮乎愛惜㓜未成徳故譽止於察惠弱不勝務故悼加乎膚色隐心而結文則事愜觀文而属心則體奢奢體為辭則雖麓不哀必使情徃會悲文來引泣乃其貴耳班固馬仲都哀辭曰車騎將軍順文侯馬仲都明帝舅也從車駕於洛水浮橋馬驚入水溺死帝顧謂侍御曰班固為馬上三十歩哀辭南史曰劉孝綽三妹一適東海徐悱文尤清壯所謂劉三娘者也悱為晉安郡卒喪還建業妻為祭文詞甚悽愴悱父勉欲為哀辭見之乃閣筆三國典畧曰齊文宣崩楊愔選其挽歌令樂署歌之其魏收四首陽休之祖珽劉逖各二首盧思道獨出八首於是晉陽人謂思道八挽盧郎中書郎李愔戯謂逖曰盧八問訊劉二逖每銜之至是愔上感恩賦自陳文宣之世遭遇䜛譛逖為帝奏其文誹謗先帝齊主怒令鞭之逖喜曰髙搥兩下執鞭一百何如喚劉二時哀䇿文章流别論曰今所為哀策者古誄之義世說曰王東亭夣人以大筆與之如椽子大覺曰當有大手筆事少日烈宗崩哀䇿謚議皆王所作國朝傳記曰褚遂良為太宗哀䇿文自朝還馬誤入人家而不覺也又曰崔融司業作武后哀文因發疾而卒時人以三二百年來無此文太平御覽卷五百九十六
