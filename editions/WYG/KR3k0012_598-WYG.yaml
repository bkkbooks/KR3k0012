body:
  text: 太平御覽卷五百九十八宋李昉等撰文部十四符契劵鐡劵過所零丁符說文曰符信也漢制以竹長六寸分而相合釋名曰符付也書所制命於上付傳行之文心雕龍曰符者孚也徴召防偽事資中孚三代玊瑞漢世金竹末代從省代以書翰矣史記曰秦昭王破趙長平又進圍邯鄲魏昭王之子無忌號信陵君其姊為趙惠文王弟平原君夫人平原君數遺公子書請救於魏魏王使將軍晉鄙將十萬衆救趙實持兩端以觀望平原君使者相屬謂公子曰今邯鄲旦暮降秦魏救不至獨不憐公子姊耶公子患之過候嬴問計嬴屏人語曰嬴聞晉鄙兵符長在王卧内而如姬最幸力能竊之嬴聞如姬父為人所殺公子使客斬其仇頭進敬如姬如姬欲為公子死無所辭公子誠一開口以請姬姬必許諾公子從其計如姬果盗晉鄙兵符與公子遂矯魏王令奪晉鄙兵進擊秦秦軍遂觧又曰吕不韋說華陽夫人請立子楚夫人然之承太子間從容言子楚質於趙者絶賢徃來者皆稱譽之乃涕泣曰妾幸得充後宫不幸無子願得子楚立以為嫡嗣以託妾身安國君許之乃與夫人刻玉符約以為嫡嗣漢書曰文帝二年九月初與郡守相為銅虎竹使符應劭曰銅虎符第一至第五國家當發兵遣使者詳合符符合乃應之竹使以箭五枚長五寸鐫刻篆書第一至第五張晏曰符以代古之圭璋從簡易又曰終軍從濟南當詣愽士歩入關關吏予軍繻張晏曰繻音湏繻符書紙裂而分之臣瓉以為漢出入關用傅猶今之過所軍棄繻而去後為使建節出關關吏識之曰此使者乃前棄繻生也後漢書曰初禁網尚簡但以璽書發兵未有虎符之信杜詩上䟽曰臣聞兵者國之㓙噐聖人所慎舊制發兵以虎符其餘徴調竹使而已符䇿合會取為合信所以明著國命歛持威重也間者發兵但用璽書或以詔令如有奸人詐偽無由知覺愚以為軍旅尚興賊虜未殄徴兵郡國宜有重慎可立虎符以絶奸端昔魏之公子威傾隣國猶假兵符以觧趙圍若無如姬之仇則其功不顯事有煩而不可省費而不得已盖謂此也書奏從之東觀漢記曰延熹五年長沙賊起攻没蒼梧取銅虎符太守甘定刺史侯輔各奔出城又曰郭丹字少卿初之長安買符以入凾谷關嘆曰丹不乗使者車終不出關後果如本心又曰赤眉欲立宗室以木札書符曰上將軍與兩空札置笥中大集㑹三老從事令劉盆子等三人居中央一人奉符以年次探之盆子最㓜探得將軍三老等即皆稱臣隋書曰髙祖頒青龍符於東方總管刺史西方以騶虞南方以朱雀北方以𤣥武又頒木魚符於總管刺史雌一雄一又頒木魚符於外官五品以上又曰煬帝謂樊子盖曰朕遣越王留守東都示以皇枝盤石社稷大事終以委公特宜持重戈甲五百人而後出此亦勇夫重閉之義也無頼不軌者便請鋤之凡可以施行無勞形迹今為公别造玉麟符以代銅獸列女傳曰楚昭貞姜者齊侯之女楚昭王之夫人也昭王平王子昭王軫也昭王出遊留夫人漸臺之上而去漸臺水上之臺王聞江水大至遣使者迎夫人忘持符夫人曰妾聞召宫人以符今使者不持符妾不敢從行使者於是反取符及還則大水至臺下夫人流而死王曰嗟乎夫人守義而死不為茍處約持信以成其貞乃號曰貞姜契劵釋名曰劵綣也相約束繾綣以為限也大書中央中破别之也契刻也刻識其數也世說曰劵契也别之書以刀刻其旁也故曰契也漢書曰髙祖㣲時好酒及色從王媪武負貰酒時飲醉卧武負王媪見其上有怪髙祖每酤留飲酒讐數倍大見怪嵗竟兩家常折劵棄責以簡牘為契劵既不徴索故折毀之棄其所負也楚漢春秋曰髙祖初封侯者皆書劵曰使黄河如𢃄泰山如礪漢有宗廟無絶世也東觀漢記曰樊重字君雲南陽人家素富外孫何氏兄弟争財重耻之以田二頃觧其忿縣中稱美推為三老年八十餘終其所假貸人間數百萬遺令焚削文契債家聞之皆慙争徃償之諸子竟不肯受晉書曰諸侯官司徒吏應給職使者每嵗先計偕文書上道五十日宣勑使使各手書書定見破劵諸送迎者所受别郡校數冩朱劵為簿集上宋書曰顧綽覬之子也私財甚豊鄉里士庶多負債覬之禁不能止及覬之為吳郡太守出文劵一大厨悉令焚之宣言遠近皆不湏還綽懊嘆彌日唐書曰太宗時東謝渠帥來朝東謝者南蠻之别種也在黔安之東地方千里其俗無文書刻木為約又曰羅讓為福建觀察使兼御史中丞甚著仁惠有以女奴遺讓者讓問其所因女奴曰本某家人兄姊九人皆為官所賣其留者唯老母耳讓􅆭然焚其劵書以女奴歸其母夢書曰劵契為有信夢得劵契有信士也文心雕龍曰契者結也上古純質結繩執契今羗胡徴數負販記緡其遺風也又曰劵者束也明白約束以備情偽字形半分故周稱判書古有鐡劵以堅信誓王褒髯奴則劵之楷也戰國䇿曰孟嘗君使馮驩收債於薛曰債畢市吾家所寡者馮驩召民畢集以債賜民因燒其劵還見孟嘗君曰君家所寡者義也臣竊矯命舍債以賜民此為君市義也魏子曰仲尼無劵於天下而徳著古今善惡明也王褒僮約曰蜀郡王子淵以事到湔上寡婦楊惠舍惠有夫時奴名便了子淵倩奴行酤酒便拽大杖夫冢顛曰大夫買便了時但要守冢不要為他家男子酤酒子淵大怒曰奴寕欲賣耶惠曰奴父訝人人無欲者子淵即决劵買之奴復曰欲使者皆上劵不上劵便了不能為也子淵曰諾劵文曰神爵三年正月十五日資中男子王子淵從成都安志里女子楊惠買亡夫時户下髯奴便了决賈萬五千奴當從百役使不得有二言晨起灑掃食了洗滌居當穿臼縛箒裁盂鑿井浚渠縛落鉏園斫陌杜埤音脾地刻大枷屈竹作杷削治鹿盧織履作麄黏雀張烏結網捕魚繳鴈彈鳬種薑養羊長育豚狗二月春分焚槎發芋鷄鳴起舂兼落三重調治馬户滌杯整案園中㧞蒜斵蘇切脯飲酒裁得染唇漬口不得傾盃覆斗用錢推訪堊敗㯶索綿亭買席徃來都洛當為婦女求脂澤販轉出旁蹉牽犬販鵞武都買茶楊氏池中擔荷入市不得夷蹲旁卧惡言醜罵㯶栟櫚也皮可為繩作絙也音鑿蜀土收芋皆窖藏之至春乃發馬戸水門也蜀每落水流養魚欲食乃取之堊白㵛也蹉市名武都縣名出茶楊氏池名出荷多作刀矛持入益州貨易牛羊自敎精慧不得痴愚持斧入山斷輮裁轅若有餘殘當作爼机木屐及彘盤焚薪作炭礨石薄岸治舍盖屋晝削筏代牘日暮欲歸當送乾薪兩三束四月當披九月當穫十月收豆掄夌窖芋南安拾栗採摘持車載輳多取蒲茅益作繩索雨墮所無為當編蔣織薄植種桃李梨柿柘桑三丈一樹八尺為行果類相從從横相當果熟收歛不得吮嘗犬吠當起驚告隣里棖門柱户上樓擊鼓持盾曵矛還落三周勤心疾作不得遨遊奴老力索種莞織席事訖休息當舂一石夜半無事洗衣當白若有私錢主給賔客奴不得有奸私事當關白奴不聼教當笞一百讀劵文適訖辭窮咋索仡仡叩頭兩手自縛目淚下落鼻涕長一尺審如王大夫言不如早歸黄土陌蚯蚓鑽額早知當爾王大夫酤酒真不敢作惡也輮車輞也礨石竹籠盛石以薄岸也豕盤猪槽也南安縣出摽掄麥種夌也十月民輸租載輳有利也漢時官不禁報怨民家皆髙樓以避有急即上樓擊鼔以告邑里令救援也石崇奴劵曰余元康之際至在榮陽東住聞主人公言聲太髙湏㬰出趣吾車曰公府吾怪吾家嘵嘵耶中買得一惡羝奴名宜勤身長九尺餘力舉五千觔挽五石力弓百歩射錢孔言讀書欲使便病日食三斗米不能柰何吾聞公賣不公喜便下絹百疋聞謂吾曰吾湖王子性讀書公府事一不上劵則不為公府作劵文曰取東海巨塩東齊羝羊朝歌浦薦八板㸠牀員之安邑梨栗之鄉常山細縑趙國之編許昌總沙房之綿作章當此髙平英榆之轂無尾髑髏之狀大良白槐之幅茱茰之輞河東亂櫛桑轅大山桑光長安䨇入白屋釘鏁巧手出於上方見好弓杯可斫千張山隂青􅀈鳥嘷柘桑張金好墨過數市蠡之井市豪筆備郎寫書嘷角憤道金案玊枕宜勤供筆更作多辭乃歛吾絹而歸邵氏家傳曰邵仲金好賑施年八十一臨卒取其貸錢物書劵自於目前焚之曰吾不能以徳教子孫不欲復以賄利累之及貸者還錢子孫不受曰不能光顯先人豈可傷其義乎鐡劵東觀漢記曰桓帝延熹八年妖賊蓋登稱大皇帝有璧二十珪五鐡劵十一後伏誅晉中興書曰初帝在關中與氐羗破鐡劵約不役使又曰應詹都督天門等郡天門武陵溪蠻並反詹誅其魁帥餘皆當降自元康以來政令不一谿蠻並反詹召蠻酋破鐡劵與盟由是懐化數郡無虞其後天下大亂唯詹保全一境三國典畧曰梁任果降周果字静蠻南安人也世為方隅豪族仕於江右志在立功太祖嘉其遠來待以優禮後除始州刺史封樂安公賜以鐡劵聼世傳襲又曰侯景圍臺城陳昕說范桃棒令率所領二千人襲殺王偉宋子仙𢃄甲歸降桃棒許之後昕夜入宫城宻啓梁主梁主大恱使命納之并鐫銀劵賜桃俸曰事定日當封汝為河南王即有景衆并給金帛女樂以報元功而太子恐其詭詐猶預不决隋書曰李穆累以軍功進爵為伯從太祖擊齊師於芒山太祖臨陣墜馬穆突圍而進以馬策擊而詈之授以從騎潰圍俱出賊見其輕侮謂太祖非貴人遂緩之以故得免既而與穆相對泣顧謂左右曰成我事者其此人乎即令撫慰關中所至剋定擢授武衞將軍賜以鐵劵恕其十死又曰越王侗立以叚逹為納言右翊衞大將軍攝禮部尚書王世充亦納言左馮翊大將軍攝吏部尚書元文都内史令左驍衞大將軍盧楚亦内史令皇甫無逸兵部尚書右武衞大將軍郭文懿内史侍郎趙長文黄門侍郎委以機務為金書鐡劵藏之宫掖於時洛陽稱叚達等為七貴唐書曰李懐光既解奉天之圍不獲朝見因大怒徳宗遣中使喻㫖加太慰賜鐡劵懷光怒甚投劵於地曰人臣反則賜鐵劵今賜懷光是使反也過所釋名曰過所至關津以示之或曰傳轉也移轉所在執以為信也史記曰寗成為右内史外戚多毁成之短抵罪髠鉗是時九卿死罪即死少被刑而成極刑自以不復收於是觧脫詐刻傳出關歸家漢書曰文帝十三年詔除關無用傳張晏注曰傳信也若今過所李竒曰傳棨也顔師古曰或用棨或用繒帛棨者刻木為合符魏畧曰倉慈為燉煌太守胡欲詣國家為討過所廷尉决事曰廷尉上廣平趙禮詣雒治病愽士弟子張䇿門人李臧賫過所詣洛還債禮冐名度津平裴諒議禮一歲半刑䇿半嵗刑晉令曰諸度關及乗船筏上下經津者皆有所寫一通付關吏零丁齊諧記曰國歩山有廟甚靈吕思與少婦投宿失婦思逐覔見大城㕔事一人紗㡌馮几左右競來擊之思以刀斫計當殺百餘人餘者便乃大走向人盡成死狸看向㕔乃是古始大冡上穿下甚明見一羣女子在冡裏見其婦如失性人因抱出冡口又入抱取在先女子有數十中有通身已生毛者有毛脚靣成狸者湏臾天曉將婦還亭亭吏問之具如此答前後有失兒女者零丁有數十吏便歛此零丁至冡口迎此羣女隨冡遠近而報之各迎取於此後一二年廟無復靈戴良字文讓失父零丁曰敬白諸君行路者敢告重罪自為積惡致天災困我今月七日失阿爹念此酷毒良可痛傷當以重幣贈用相賣請為諸君說事狀我父軀體與衆異脊背傴僂卷如胾唇吻參差不相值此其庶體何能備請復重陳其面目鴟頭鵠頸獦狗髆眼淚鼻涕相追逐吻中含納無齒牙食不能嚼左右蹉頗似西域脊駱駝請復重陳其形骸為人雖長甚細材面目芒蒼如死灰眼眶白陷如米羮柸太平御覽卷五百九十八
