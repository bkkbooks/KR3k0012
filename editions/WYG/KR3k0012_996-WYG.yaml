front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_996-1a, image: WYG0901/WYG0901-0708a.png}
body:
  text: 太平御覧卷九百九十六宋李昉等撰百卉部三菊苕萱苜蓿菅茅紫草藍蒨菊爾雅曰菊治蘠今人秋華菊也又圖讃曰菊名日精布華𤣥月仙客是尋薄採薄捋禮記月令曰季秋之月菊有黄花周書曰寒露之日鴻鴈來賔又五日菊有黄華菊無黄華土不稼穡晉書曰羅含致仕還家階庭忽蘭菊藂生人以為德行之感續晉陽秋曰陶淵明嘗九月九日無酒出菊叢中摘盈把坐其側久之望見白衣人至乃王𢎞送酒即便就酌山海經曰女几之山其草多菊廣志曰菊有白菊風俗通曰南陽酈縣有甘谷谷中水甘美云其山上有大菊水從山上流下得其滋液谷中三十餘家不復穿井仰飲此水上夀百二三十年中百餘下七十八十名之為天司空王暢太尉劉寛太傅袁隗為南陽太守聞有此事令酈縣月送水三十斛用飲食澡浴終然無益抱朴子曰劉生丹法白菊花汁蓮花汁樗汁和丹蒸之服一年得五百歲仙方所謂日精又曰日精更生周盈皆一菊也而根莖花實異名或無效者以由不得真菊又曰菊花與苡薏相似直以甘苦别之耳菊甘而薏苦今所有真菊但為少耳神仙傳曰康風子服甘菊花栢實後得仙愽物志曰菊有二種苖花如一唯味小異苦者不冝服崔氏四民月令曰九月九日可採菊華王韶之神境記曰滎陽郡西有靈源山其澗生靈芝石茵巖有紫菊風土記曰日精菭音苔蘠皆菊華莖之别名九月律中無射而數九俗尚九日而用候時之草也盛𢎞之荆州記曰酈縣北八里有菊水其源悉芳菊被崖間水甚甘馨太尉胡廣乆患風羸恒汲飲水後疾遂瘳年及百嵗非唯天夀亦菊所延也名山記曰道士朱孺子吴末入玊笥山服菊花乘雲升天本草經曰菊有筋菊有白菊花黄菊花一名節花一名傳公一名延年一名白花一名日精一名更生一名隂威一名朱羸一名女花其菊有兩種一種紫莖氣香而味甘美葉可作羮為真菊菊一種青莖而大作蒿艾氣味苦不堪食名薏非真菊也吴氏本草經曰菊華一名女華一名女室淮南萬畢術曰以牡菊灰散池中蛙盡死楚辭曰朝飲木蘭之墜露兮夕餐秋菊之落英又曰春蘭兮秋菊長無絶兮終古鍾㑹菊賦曰縹幹緑葉青柯紅芒芳實離離暉藻煌煌故夫菊有五美焉圓華髙縣凖天極也純黄不雜后土色也早植晚登君子徳也冐霜吐頴象勁直也流中輕體神仙食也潘尼秋菊賦曰汎流英於青醴似浮萍之隨波嵇含菊花銘曰煌煌丹菊暮秋彌榮親尊是御永作億齡苕毛詩疏曰苕饒也幽州謂之翹饒蔓生莖如勞豆而細葉似蒺䔧而青其華細緑色可生食味如小豆藿本草經曰陵蒔一名陵苕陸機疏云一名鼠尾生下濕水中七八月華華紫似今紫草可以染皂煮以沐頭髪即黑萱毛詩伯兮曰焉得諼草言樹之背背北堂也願言思伯使我心痗說文曰萱忘憂草也崔豹古今注曰欲忘人之憂則贈以丹棘一名忘憂草也愽物志曰神農經曰中藥養性謂合歡蠲忿萱草忘憂風土記曰花曰宜男姙婦佩之必生男又名萱草本草經曰萱一名忘憂一名宜男一名妓女録異記曰婦人𢃄宜男草生男束晢發蒙記曰甘棗令人不惑萱草可以忘憂任昉述異記曰萱草一名紫萱又名忘憂草吴中書生謂之療愁花嵇康養生論云萱草忘憂苜蓿史記大宛有苜蓿漢使取其實來於是天子始種苜蓿及天馬多外國使來衆離宮别觀旁盡種苜蓿極望漢書西域𫝊曰􅄢賔國有苜蓿大宛馬嗜苜蓿武帝得其馬漢使採蒲桃苜蓿種歸天子益種離宮别館旁晉書曰華廣免官為庶人晉武帝登陵雲臺見廣苜蓿園阡陌甚整依然感舊太康初大赦乃得襲爵西京雜記曰樂逰苑中自生玫瑰樹下多苜蓿一名懐風時或謂之光風在其間常蕭蕭然日昭其光彩故名苜蓿為懐風茂陵人謂之連枝草愽物志曰張騫使西域所得蒲陶胡葱苜蓿述異記曰張騫苜蓿園在今洛陽中苜蓿本胡中菜騫始於西國得之楊􅃷之洛陽伽藍記曰宣武塲在大夏門東北今為光風園苜蓿出焉菅爾雅曰白華野菅菅茅屬也毛詩陳風東門之池曰東門之池可以漚菅又白華周人刺幽后也曰白華菅兮白茅束兮又題綱曰白華野菅草也其性柔紉堪用取此白華而將白茅束之喻申后被褒姒所代惡人蒙善好人見弃也春秋成公九年傳曰雖有絲麻無弃菅蒯雖有姬姜無弃憔悴周書曰成王時㑹人獻以菅㑹或作禽亦東南蠻菅草堅反山海經天帝之山其下多菅異物志曰香菅似茅而葉長大於茅不生洿下之地􅉌陵山岡凡所蒸享必得此菅苞裹助調五味益其芬菲芧爾雅曰藗音速牡茅也易泰卦㧞茅茹以其彚征吉王弼注曰茅之為物㧞其根而相率同起茹相牽引之貌也彚類也陽以其類引而升故為茹而征吉必矣象曰㧞茅征吉志在外也又易繫辭曰藉之用茅慎之至也尚書禹貢曰荆州厥貢苞匭菁茅孔安國曰茅以縮酒毛詩召南野有死麕曰野有死麕白茅包之陸機毛詩䟽義曰白茅苞之茅之白者古用包褁禮物以充祭祀縮酒用之毛詩豳風七月曰晝爾于茅宵爾索綯周禮天官上曰甸師祭祀供蕭茅左傳僖公四年齊侯伐楚謂楚曰爾貢苞茅不入王祭不供無以縮酒寡人是徴史記封禪書曰管仲說齊桓公古之封禪江淮之間一茅三脊所以為藉孟康曰所謂零茅也典畧曰武王伐殷微子啓肉袒靣縳牽羊把茅膝行而前吴志曰徐盛與曹休戰賊積茅草欲焚盛盛燒舩而去賊一無所得吳録地理志曰桂陽郴縣有菁茅可染布零陵有香茅古貢之縮酒吴志曰劉備連營挑戰陸遜曰吾已曉破之術乃勑各持一把茅以火攻之遜率諸軍同時俱攻破其四十餘營晉書地理志曰零陵縣有香茅氣甚芬香古貢之以縮酒沈約宋書曰江夏王義恭大明年有三脊茅生石頭西岸累表勸上封禪上甚恱之唐書曰開元十三年撫州三脊茅生六韜曰文王畋于渭陽見吕尚坐茅以漁文王勞而問焉莊子曰小巫見大巫抜茅而弃此其所以終身弗如尹文子曰堯為天子衣不重帛食不兼味土階三尺茅茨不剪尸子曰湯救旱素車白馬布衣身嬰白茅以身為牲說文曰茅菅也陸賈新語曰伊尹居負薪之野修道徳於茅廬之下風俗通曰謹按詩曰手如柔荑者茅始熟中穰也既白且滑漢武故事曰帝拜欒大為天道將軍使着羽衣立茅上授玊印大亦羽衣立白茅上受印示不臣也神仙傳曰介象受氣禁術能茅屋上燃火煮雞使茅不焦又曰曹公捕左慈有人見知便斬以獻曹公大喜定視之是一束茅耳盛𢎞之荆州記曰零陵郡有香茅桓公所以責楚廣州記曰董奉與士燮同處積載思欲還豫章爕情拘留不能免後乃託以病死爕開棺乃是茅人楚辭曰蘭芷變而不芳兮荃蕙化而為茅楊雄反騷曰費椒楫以要神兮又勤索彼瓊茅一莖三脊茅紫草爾雅曰藐茈也郭璞曰可以染紫一名茈䓞廣雅云廣雅曰紫艿紫草也艿音仍說文曰茈藐紫草山海經曰勞山多茈草一名紫英潯陽記曰石井山曽有行人見山上有採紫草者此人謂村人掲鍤而徃見山上人便去聞有呼昌容者曰人來取爾草既至山頂寂寞無所見列仙𫝊曰昌容常山之道士也自稱殷王子二百餘年而顔色如少能致紫草與染家得錢以遺孤老淮南子曰紫草生於山不能生磐石之山抱朴子曰黄金成以為丸以紫草煮一丸咽其汁可百日不飢愽物志曰平氏陽山紫草特好其他者色淺吴氏本草曰紫草節赤二月花本草曰紫草一名地血藍毛詩小雅采緑曰終朝采藍不盈一襜襜衣蔽膝也禮記月令曰仲夏之月令民毋刈藍註為傷陽也此月藍始可别謝承後漢書曰𢎞農楊震字伯起常種藍自業諸生恐震年大助其功傭震喻罷之孫卿子曰青生於藍而青於藍秦子曰常聞仁人當如園圃之藍不異衆草染而後彰趙岐藍賦序曰余就毉偃師道經陳留此境人皆以種藍染紺為業藍田彌望黍稷不殖慨其遺本念末遂作賦焉蒨爾雅曰茹藘音閭茅蒐郭璞注曰今之蒨可以染絳毛詩曰東門之墠刺亂也男女不待禮而相奔者也東門之墠茹藘在阪箋云城東門之外有墠墠邉有茅蒐生焉易越而出此女欲奔男之辭說文曰茅蒐茹藘也人血所生可以染絳史記曰千畝巵茜蒨草根子可用染也千畦薑韮其人皆與千户侯等山海經曰釐山之隂多蒐郭璞曰蒐茅蒐也范子計然曰蒨根出北地赤色者善也太平御覧卷九百九十六
