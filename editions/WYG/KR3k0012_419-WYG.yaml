body:
  text: 太平御覽卷四百一十九宋李昉等撰人事部六十仁德仁惻仁德釋名曰仁忍也性惡殺好善含忍之也禮記經解曰上下相親謂之仁又中庸曰仁者人也親親為大又表記曰子曰仁有三與仁同功而異情與仁同功其仁未可知也與仁同過然後其仁可知也仁者安仁智者利仁畏罪者强仁子曰仁之為器重其為道逺舉者莫能勝也行者莫能致也取數多者仁也夫勉於仁者不亦難乎子曰中心安仁者天下一人而已矣又緇衣曰子曰禹立三年百姓以仁遂焉豈必盡仁言百姓効禹為仁非百姓仁也又大學曰一家仁一國興仁堯舜率天下以仁而民從之又曰仁者以財發身不仁者以身發財又儒行曰温良者仁之本敬慎者仁之地寛裕者仁之作遜接者仁之能禮節者仁之貌言談者仁之文歌樂者仁之和分散者仁之施儒皆兼而有之猶且不敢言仁也又鄉飲酒義曰天地温厚之氣始於東北盛於東南此天地之仁氣也毛詩生民曰行葦忠厚也周家忠厚仁及草木尚書太甲曰民㒺常懐懐于有仁民所歸無常以仁政為常又秦誓曰雖有周親不如仁人論語里仁曰里仁為美居仁者之里是為美擇不處仁焉得智求善居而不處於仁者之里不得為有智又曰君子無終食之間違仁造次必於是顛沛必於是又顔淵曰顔淵問仁子曰克己復禮為仁一日克己復禮天下歸仁焉為仁由已而由人乎哉顔淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顔淵曰囘雖不敏請事斯語矣又顔淵曰仲弓問仁子曰出門如見大賔使民如承大祭已所不欲勿施於人在邦無怨在家無怨仲弓曰雍雖不敏請事斯語矣又子路曰如有王者必世而後仁聖人受命而興必父子相承然後天下之民能仁也又憲問篇子路曰桓公殺公子糾召忽死之管仲不死曰未仁乎子曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁重言如其仁者九合諸侯功齊天下此仁為大死節仁小者也又衞靈公篇民之於仁甚於水火水火吾見蹈而死者未見蹈仁而死者也甚於水火於仁最急也又曰志士仁人無求生以害人有殺身以成仁又陽貨篇子張問仁於孔子孔子曰能行五者於天下為仁矣請問之曰恭寛信敏惠恭則不侮寛則得衆信則人任焉敏則有功惠則足以使人又微子篇微子去之箕子為之奴比干諫而死孔子曰殷有三仁焉此三人紂同姓大臣微子知紂惡而去之箕子比干不忍去故或見奴或見殺家語曰或問孔子曰顔淵何人也曰仁人也丘弗如爾雅曰太平之人仁大戴禮曰君子執仁志先行後言千里之外皆兄弟也尚書考靈耀曰春行仁政順天之常尚書大傳曰子張曰仁者何樂於山也孔子曰夫山者􅠇然高􅠇然高則何樂焉夫山草木生焉鳥獸蕃焉財用殖焉生財用而無私為四方皆伐焉每無私予焉出雲風以通乎天地之間陰陽和合雨露之澤萬物以成百姓以享此仁者之所樂於山者也又曰周人以仁接民而天下莫不仁故曰文矣言文王仁故謂之文矣又曰舜不登而高不行而逺拱揖於天下而天下稱仁又曰誓可以觀義五誥可以觀仁甫刑可以觀誡洪範可以觀度韓詩外傳曰仁道有四仁者有聖仁者有智仁者有徳仁者有謙史記曰帝堯其仁如天其智如神又曰孔子適周問禮於老子辭去老子送之曰吾聞富貴者送人以財仁人者送人以言吾不能富貴竊仁人之號送子以言又曰高祖仁而愛人喜施意豁如也漢書曰何武為人仁厚後漢書曰王莽末虞延從女弟年在孩乳其母不能活之棄於溝中延聞其號聲哀而收之養至成人范曄後漢書曰劉寛字文饒𢎞農人遷南陽太守温仁多恕吏人愆過但用蒲鞭罰之示辱而已又曰宣秉所得禄俸輒以收養親族其孤弱者分與田地自無儋石之儲前漢書音義曰齊人名小甖為儋今江淮人為一石為一儋石音丁濫切齊書曰虞愿為晉安太守郡出蚺虵膽可用為藥有人餉愿愿放之二十餘里外山中一夜虵還歸床下復送四十里外山經宿復還故處愿更令逺乃不復歸論者以為仁心所致也又曰江泌字士清性行仁義衣敝虱多以棉裹致之食菜不食心以其有生意也崔鴻後燕録曰趙秋字子武汲郡朝歌人也輕財好施鄰人李元度母死家貧無以葬秋謂其兄曰赴死生救不足仁之本也家有二牛以與之元度得以葬他年秋夜行見一老母遺秋金一餅曰子能葬我是以相報子五十以後當富貴不可言勿忘元度也老子曰大道廢有仁義文子曰積惠重厚使萬物忻忻樂其性者仁也莊子曰仁義先王之蘧廬蘧廬猶傳舎也可以一宿而不可以久處古人假道於仁託宿於義莊子曰義人利物之謂仁曾子曰伯夷叔齊仁者也鬻子曰除天下之害謂之仁孟子曰齊宣王問交鄰國有道乎對曰唯仁者能以大事小故湯事葛文王事昆夷又曰君行仁政斯民親其上而死其長矣又曰當今之時萬乗之國行仁政民之悅之猶解倒懸也又曰夫仁天之尊爵人之安宅又曰為富不仁矣為仁不富矣又曰為天下得人謂之仁又曰三代之得天下也以仁其失天下也以不仁國之所以廢興存亡者亦然天子不仁不保四海諸侯不仁不保社稷卿大夫不仁不保宗廟士庶人不仁不保四體今惡死亡而樂不仁是猶惡醉而强酒也又曰仁則榮不仁則辱今惡辱而居不仁是猶惡濕而居下又曰仁之勝不仁猶水之勝火荀卿子曰仁義禮善之於仁譬之若貨財粟米之於家也多有之者富少有之者貧無有之者窮尹子曰仁則人親之義則人尊之智則人用之也又曰文王四乳是謂至仁六韜曰仁之所在者天下歸之呂氏春秋曰士尹池為荆使於宋司城子罕觴之南家之牆犨於前不直猶曲出西家之潦經其宫而不止士尹池問其故子罕曰南家工人也為鞔百也鞔履一曰靷也吾將徙之其父曰吾為鞔以食三世矣今徙是宋國之求鞔者不知吾處也吾將不食也是弗徙也西家髙吾宫庳潦之經吾宫也利故弗禁也士尹池歸荆適攻宋士尹池諫於荆王曰宋不可攻其主賢其相仁故釋宋攻鄭新序魏文侯曰仁人者國之寳也國有仁人則羣臣不爭姚信士緯曰孟軻驅世士於仁義之域行者步中正之途抱朴子曰仁者為政之脂粉刑者御世之轡策符子曰春秋華林傳曰不知不言其所以仁延篤仁孝論曰夫人之有孝猶四體之有心腹枝葉之有本根仁以枝葉扶疏為大孝以心體充實為先也曹植仁孝論曰且禽獸悉知愛其母知其孝也唯白虎騏驎稱仁獸者以其明盛衰知治亂也孝者施近仁者及逺逸士傳曰高鳯隣里有爭財鬭者兵刃相加鳯脫衣巾為叩頭曰仁義遜讓不可廢也㑹稽典錄曰陳囂字子公山陰人也同縣車嫗年八十餘無子慕囂仁義欲求寄命囂以車嫗有財未敢便許乃諮於長者長者僉曰其宜囂遂迎嫗朝夕定省如其所親出家財以供餚膳嫗以壽終囂殯殮畢皆免其奴令守嫗墓財物付與嫗内外衣服不入殯者以置槨中制服三月由是著名流稱上國矣仁惻周公曰文王在鄗召太子發曰吾與汝童牛不服童馬不馳是謂大仁樂喜耀稽曰仁者有惻隠之心本生於木仁生於木故惻隠出於自然也禮記表記曰中心􅉃怛愛人之仁也左傳文下曰邾文公卜遷于繹史曰利於民而不利於君公曰苟利於民孤之利也天生民而樹之君以利之也民既利孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之短長時也民苟利矣遷也吉莫如之遂遷於繹邾文公卒君子曰知命家語曰孔子曰啟蟄不殺方長不折此高柴之行漢書曰汲黯字長孺濮陽人河内失火燒千餘家上使黯往視之還報曰家人失火比屋延燒不足憂臣過河内貧人傷水旱萬餘家父子相食臣謹以使持節發河内倉粟以賑貧民請歸節伏矯制罪上賢而釋之東觀漢記曰曹褒在射聲營舎有停棺不葬百餘所褒親自履行問其意故吏對曰此等多是建武以來絶無後者不得埋掩褒愴然為買空地悉葬其無主者設祭以祀之遷城門校尉將作大匠時疾疫褒巡行病徒為致醫藥經理饘粥多蒙濟活又曰鍾離意辟大司徒侯霸府詔部送徒詣河内時冬寒徒病不能行路過𢎞農意輒移屬縣使作徒衣縣不得已與之而上書言狀意亦具以聞上得奏以見霸曰君所使掾何乃仁於用心誠良吏也又曰趙憙為赤眉所廹亡走遇更始親屬皆裸跣塗炭饑困不能前憙見之悲感所裝縑帛資糧悉以與之又曰吳祜字季英陳留人遷膠東侯相政唯仁簡以身率物民有相爭訴者輒閉閣自責然後斷其訟以道譬之或身對閭里重相和解自是之後爭隙省息矣又曰崔篆為建新大尹班春所至之縣獄犴填滿篆垂涕曰嗟乎刑罰不中乃陷民於穽此皆何罪而至於是遂平理所出二千餘人掾吏叩頭諫曰誠仁者之心然獨為君子將有悔乎篆曰殺一大尹贖二千人蓋所願也遂稱疾去矣謝承後漢書曰韓韶字仲黄潁川人韶為贏長贏隣境歳饑多被冦廢耕桑其民流入縣界求索衣糧者衆韶愍其饑困開倉賑之所廩贍萬餘户主者爭謂不可韶曰長活溝壑之民而以此伏罪可含笑入地也范曄後漢書曰史弼字公謙陳留人為平原相時詔書下舉鈎黨郡國所奏相連及者多至數百唯弼獨無所上詔書責曰青州六郡其五有黨平原何理而得獨無弼曰先王疆理天下畫界分境水土異齊風俗不同他郡自有平原自無胡可相比若望上司誣陷良善滛刑濫罰以逞非理則平原之民户可為黨相有死而已所不能也從事大怒即收郡僚職送獄遂奏弼㑹黨禁中解弼以奉贖罪得免濟活者千餘人英雄記曰劉翊字子相潁川人遷陳留太守出闗數百里見士大夫病亡道次翊以馬易棺脱衣殮之又逢知故困餒於路不忍委去因殺所駕牛以救其乏衆人止之翊曰視没不救非志士遂俱餓死晉中興書曰劉驎之南陽人少有信義去家百餘里有一孤姥病將死歎息謂人曰誰當埋我唯有劉長史耳何由令知驎之先聞其有患故往候之值其命終乃身為營棺殯送之其仁愛惻隠若此㑹稽典録曰盛吉字君達山隂人拜廷尉吉性多仁恩務在哀矜毎至冬月罪當斷夜省刑狀其妻執燭吉手持丹筆夫妻相向垂泣所當平活若無繼嗣吉令其妻妾得入經營使有遺類視事十二年天下稱其有恩列女傳曰雋不疑母仁而善教不疑為尹行縣録囚徒還其母輒問所平反活幾何人即不疑多所平反平其事反死為生也母喜笑為飲食言語異於他時或毋所出母怒為之不食由是故不疑為吏嚴而不殘君子謂不疑母能以仁教子孟子曰君子之於禽獸也見其生不忍見其死聞其聲不忍食其肉是以君子逺庖厨也孟子曰惻隠之心仁之端羞惡之心義之端辭讓之心禮之端是非之心智之端人有四端猶有四體也莊子曰古公亶父居豳狄人攻之事之以皮帛而不受事之以珠玉而不受狄而所求者地古公亶父曰與人兄居而殺其弟與人父居而殺其子吾不忍也子皆免居矣為吾臣與為狄臣奚以異且吾聞之君子不以所用害所養因杖䇿而去民相連而從之遂成國於岐山下也尸子曰巫馬期為荆使於巴見擔酖問之是何以曰所以酖人也於是請買之金不足又益之車馬已得之盡注之於江韓子曰仁者謂其中心忻然愛人也其喜人之有福而惡人之有禍世說曰桓車騎時有陳莊者為府將性仁愛雖在行陣未嘗殺戮太平御覽卷四百一十九
