body:
  text: 太平御覽卷八百一十七宋李昉等撰布帛部四絹廣雅曰繁繐鮮支縠絹也説文曰絹似霜釋名曰絹䋌也其絲䋌厚而疏也東觀漢記曰南陽太守杜謂坐遣客為弟報仇被徵㑹病卒喪無所歸詔使持喪郡國邸賻絹七千疋謝承後漢書曰陳留夏馥避黨事遁迹黑山弟靖載絹往餉之於深陽縣客舍見馥顔色毁不復識聞其聲乃覺之華嶠後漢書曰李傕等大戰𢎞農百官士卒死者不可勝數董承宻招白波帥李岳等率衆來共擊傕等大破之乗輿乃得進承夜潜過曰先具舟船為應帝步出營臨河岸髙不得下時中官伏德扶中宫一手持十疋絹乃取德絹連續挽而下餘人匍匐岸側或自投水亡又曰陳寔居鄉閭平心率物有盜夜入其室止於梁上寔命子孫訓之曰不善之夫未必本不善習與性成如梁上君子是也盜驚自投地寔徐譬之曰視君狀貌不似惡人宜深克己反善然當由貧今遺絹二疋自是一縣無復盜竊魏畧曰文帝在東宫嘗從曹洪貸絹百疋洪不稱意及洪犯法自分必死後遂得原魏志曰趙儼為朗陵長時袁紹舉兵南侵遣人招誘豫州諸郡多受其命惟安陽郡不動而都尉李通急斂户調儼見通曰方今天下未集諸郡並叛懷附者復收其緜絹小人樂亂能無遺恨且逺近多虞不可不詳也通曰紹與大軍相持甚急左右郡縣背叛乃爾若絲絹不調送觀聴者必謂我顧望有所湏待也儼曰誠亦如君慮然當權其輕重小緩調當為君釋此患乃書與荀彧又曰孫禮為揚州刺史吳大將全琮帥數萬衆來侵冦時州兵使休在者無幾禮躬勒禦之戰於芍陂禮身蹈白刃馬被數鎗手秉桴鼓奮不顧身賊衆乃退詔書慰勞賜絹七百疋魏畧曰鮮卑素利等數來客見多以牛馬遺田豫豫輙送官胡以為所遺豫物顯露不如持金乃宻懐金三十斤謂豫曰願辟左右勿看所遺豫從之胡因跪曰我見公貧故前後遺公牛馬公輙送官今宻以此上公可以為家資豫張袖受之答其厚意胡去後皆悉付外具以狀聞於是詔褒之曰昔魏絳開懐以納戎今卿舉袖以受狄朕甚嘉焉乃即賜絹五百疋豫得賜分以其半藏小府後胡復來以半與之又曰田豫罷官歸居魏縣㑹汝南遣健步詣征北感豫宿恩過拜之豫為殺雞炊黍送詣陌頭謂之曰罷老苦汝來過無能有益若何健步愍其貧羸流涕而去還為故吏民説之汝南為具資絹數千疋遣人餉豫豫一不受魏志曰景初中賜倭土王白絹五十疋魏文帝詔曰今與孫驃騎和通商旅當日月而至而百賈偷利喜賤其物平價又與其絹故官逆為平凖耳官豈少此輩物耶吳志曰丹陽太守李衡每欲冶家妻輒止之衡初遣客十人於武陵龍陽洲上作宅種柑千株臨死勑兒曰汝母惡吾治家故窮如是然吾洲里有千頭木奴不青汝衣食嵗上絹一疋亦足用耳衡亡後二十餘日以問母曰此當是種柑也汝家失千户各七八年必汝父遣為宅汝父嘗稱太史公言江陵千樹橘當封君吾答曰人患無德貧方好耳此何為吳末柑成嵗得絹數千疋家道殷足吳錄曰袁博為太守黄君奏為孝亷為華令以俸禄市縑絹餉黄君家黄氏負鄉里債債家到門輒應云待華令家餉王隠晉書曰王尼見太傅越曰公負尼物越答初不識此事尼曰昔楚人失布謂令尹盜者以令尹執政不能奉禮率法至使盜賊公行是與自盜無異也尼舍資財軍冦撥略公為宰輔未能禁賊令尼窮困是亦明公負物也越意解笑與尼絹五十疋王隠晉書曰劉實為伐蜀人作爭功文書得千疋絹又曰蘇節從兄韶亡後着黄絹單衣來與節言虞預晉書曰武帝論平吳功唯羊祜王濬張華三人各賜絹萬疋其餘莫得此比干寳晉記曰華譚依周馥及琅琊王遣甘卓攻馥譚先於卓有恩卓募人入城求譚入者至舍問華侯在不吾甘揚威使也譚曰不知華侯所在抽絹二疋授之使人還以吿卓曰是華侯晉陽秋曰有司奏依舊調編絹武帝不許又曰荆州刺史庾氷中子襲嘗貸官曹絹十疋氷怒撻之市絹還官又曰胡威字伯虎父質之為荆州也威自京都省之停廐中十餘日吿歸臨辭質賜絹一疋為道路糧威跪曰大人清髙不審於何得此絹質曰是吾俸之餘故以與汝耳又曰桓温入蜀聞有善星人招致之獨執其手於星下問國祚修短星人曰太微紫微文昌三宫氣候决無憂虞五十年外不論耳温不悦送絹一疋錢五千與之晉中興書曰翟湯字道淵潯陽人太守干寳遣船餉之𠡠吏曰翟公亷讓卿致書訖便委船還湯無人送致乃更貨易絹物因寄還寳宋書曰沈慶之年八十夢有人以兩疋絹與之謂曰此絹足度寤而謂人曰老子今年不免矣兩疋八十尺也足度無盈餘矣是嵗果卒又曰李安民行南齊州事城局參軍王迥素為安民所親盜絹二疋安民流涕謂曰我與卿契濶備常今日犯王法乃卿負我也於軍門斬之又曰孝武時齊庫上絹年調鉅萬疋綿亦稱此期嚴限峻民間買絹一疋至二三千綿一兩三四百貧者賣妻子甚者或自縊死沈懷文具陳民困由是緜絹薄有所减又曰阮佃夫佞幸專權有人餉絹二百疋嫌少不答書齊書曰豫章王嶷拜陵還過延陵季子廟觀沸井有水牛突部伍直兵執牛推問嶷不許取絹一疋横繫牛角放歸其家又曰蕭赤斧遷給事太子詹事卒於家貧無絹衾衣梁書曰吉士瞻少時嘗於南蠻國中擲塼無褲褰露為儕輩所侮及平魯休烈軍得絹三萬疋乃作百褲其外並賜軍士不以入室又曰劉孝綽為吏部郎坐受人絹一束為餉者所訟左遷信威臨賀王長史又曰任昉為義興太守及被代登舟止有絹七疋米五石至都無衣鎮軍將軍沈約遺裙衫迎之又曰費昶善為樂府嘗作鼓吹曲武帝重之勑曰才意新拔有足嘉異昔邯鄲博物卞蘭巧辭束帛之賜實為勸善可賜絹十疋又曰周石珍建康之廨𨽻也世以販絹為業又曰傅昭為臨海太守縣令嘗餉粟寘絹於簿下昭笑而還之又曰裴䆳為北梁秦二州刺史復開創屯田數千頃倉廩盈實省息邊運人吏獲安乃相率餉絹千餘疋䆳從曰汝等不應爾吾又不可逆汝納其二疋而已後魏書曰李崇在官和厚明於决㫁然性在財賄販肆聚歛上令王公以下從者百餘人皆令任負布絹即以賜之多者過二百疋少者百餘惟長樂公兩手持絹二十疋而出亦不異衆而當世稱其亷儉尚書令任城王澄疾不起賜絹百疋崇與章武王融以所負過多顛仆於地崇乃傷腰融至損脚時人為之語曰陳留章武傷腰折股貪人敗類穢我明主又曰爾朱榮之奉荘帝召百官悉至河隂素聞元順類諌諍惜其諒直謂朱端曰可語元僕射但在省不湏來順不達其㫖聞言不及衣冠遂便出走為鮮子康奴所害家徒四壁無物歛尸令史王才達裂裳覆之帝􅃯侍中元祉曰宗室喪亡非一不可周贍元僕射清苦之節死乃益彰特贈絹百疋又曰楊津除岐州刺史巨細躬親孜孜不倦有武功人賫絹三疋去城十里為賊所刼時有使者馳驛而至被刼人因以告之使者到州以狀白津乃下教云有人着某色衣乗某色馬在城東十里被殺不知姓名若有家人可速收視有一老母行哭而出云是己子於是遣騎追收并絹俱獲自是闔境懾服又曰楊津為華州刺史先是受調絹度尺特長從事因縁共相進退百姓苦之津乃令依公尺其輸物尤好者賜以盃酒而出其所輸少劣者為受之但無酒以示其耻於是競相勸勵官調更勝又曰趙柔有人與柔鞾數百枚者柔與子善明鬻之于市有從柔買索絹二十疋有商人知其賤與柔三十疋善明欲取之柔曰與人交易一言便定豈可以利動心遂與之搢紳之流聞而敬服又曰陸馥為相州刺史發姦摘伏事無不驗百姓以為神明無敢刼盜者在州七年家至貧約徵為散騎常侍百姓乞留馥千餘人獻文不許謂羣臣曰馥之著政雖古人何以加之賜絹五百疋又曰李元忠去任歸魚川孝莊時盜賊蠭起清河有五百人西戎還經南趙郡以路梗共投元忠奉絹千餘疋元忠惟受一疋殺五牛以食之遣奴為導曰若逢賊但道李元忠遣如言賊皆舍避又曰韓麒麟為齊州刺史立性恭慎恒置律令於坐傍臨終之日惟有俸絹數十疋清貧如是又曰平陽王子衍轉徐州刺史至州病重帝𠡠徐成伯乘傳療疾徐成伯還帝曰卿定名醫賚絹三千疋成伯辭請受一千帝曰詩云人之云亡邦國殄瘁以是而言豈惟三千疋乎又曰辛穆再轉汝陽太守遇水澇人飢上表請輕租賦帝從之遂勅汝陽一縣聴以小絹為調又曰髙允卒詔給絹一千疋布二千疋錦五百斤錦五十疋雜綵百疋榖千斛以周喪用也又曰王靈字羅漢為南兖州刺史取官絹因染遂有割易御史糾劾㑹赦免又曰宋鴻貴為定州北平府恭軍送戍兵于荆坐取兵絹四百疋兵欲吿之乃斬兵十人又曰公孫軌為武牢鎮將初太武將北征發驢以運糧使軌部調雍州軌令驢主皆加絹一疋乃與受之百姓語曰驢無强弱負絹自壯衆共嗤之北齊書曰崔暹遷尚書左僕射儀同三司時調絹以七尺為缺暹言之乃依舊焉又曰孝昭常賜百官射王晞中的當得絹為不書箭有司不與晞陶陶然曰我今可謂武有餘文不足矣隋書曰庫狄士文嘗入朝遇上置酒髙㑹賜公卿入左藏任取多少人皆極重士文獨口啣絹一疋両手各持一疋上問其故士文曰臣口手俱滿餘無所湏上異之别加賞物勞而遣之唐書曰侍御史馬周上䟽云徃者貞觀之初一疋絹纔得一斗米而天下帖然百姓知陛下甚憂憐之故人人自安曽無怨讟自五六年來頻嵗豐稔一疋絹得粟十餘石而百姓皆以為陛下不憂憐之咸有怨言以今所營為者頗多不急之務故也又曰太宗初即位風聞諸曹案典受賂乃遣左右試以財物遺之有司聞令史受餽絹一疋上將殺之裴矩進諫曰此人受賂誠合重誅但陛下以物試人則行極法所謂䧟入其罪恐非道德齊禮之義上善之又曰髙宗朝詔自今已後天下嫁女受財三品已上之家不得過絹三百疋四品不過二百疋六品七品不得過百疋皆充所嫁女之資装等用其夫家不得受陪門之財又曰文宗太和六年賜故衞國公李靖五代孫前鳳翔司録參軍彦芳絹二百疋衣笏一副并還先奏髙祖太宗書詔及官誥衣物等後唐史曰賜宰相李愚絹百疋錢百緡鋪陳物十三件時愚病上令中使宣問愚所居寢室蕭然四壁卧敝氈而已中使具言其事上曰嘻宰相月俸錢幾何而委頓如此故有是賜四王起事曰張方移惠帝於長安兵入内殿取物人持調御絹二疋幅自魏晉之積將百餘萬疋三日揵之尚不缺角四王起事曰惠帝於鄴與成都王還洛陽出城倉卒上下無持資食乏調道中有驅羊二百餘口者便將之洛得以為糧至洛盧志啓以古藏絹倍還羊主搜神記曰永嘉中有天竺胡人能取絹與人各執一頭剪㫁之已而取兩段合持之則復還連絲可練無異故體也又曰吳先主病遣人於門觀不祥巫啓見一鬼着絹布似是大臣將相其夜先主夢見魯肅來入衣巾如之述異記曰清河崔基寓居青州朱氏女姿容絶倫崔傾懷招攬約女為妾後三更中忽聞扣門外崔披衣出迎女雨淚嗚咽云適得暴疾喪亡忻愛永奪悲不自勝女於懷中抽兩疋絹與崔曰近自織此絹欲為君作禪衫未得裁縫今以贈離崔以錦八尺答之女取錦曰從此絶矣言畢倐然而滅至旦吿其家女父曰女昨夜忽然病夜亡崔曰君家絹帛無零失耶答云此女舊織餘絹兩疋在箱中女亡之始婦出絹欲裁為送終衣轉盻失之崔因此具説事狀先賢行状曰范郃字孝悌少時曽省外家逢掠者驅其牛取衣物去郃還車知賊不得席後三疋絹乃追呼令取之賊知長者悉還所取而辭謝焉三輔决録曰平陵士孫奮貲至一億七十萬富聞京師而性儉恡從子端辟梁冀掾奮送絹五疋食以乾魚鄴中記云石虎以辰日臘子日祀祖於殿庭立五仙人髙數丈五采幢葢大㑹羣臣於太武殿上命探其所得有得絹百疋有得數十疋者有得一二疋者虎輙大笑以為樂孔舒元在窮記曰大安二年六月賊變入門時見家有絹布三千餘疋及衣被器物皆令婢使輦出着庭中恣其所取魏武帝令曰今清時但當盡忠於國効力王事雖私結好於他人用千疋絹萬石榖猶無所益又曰東曹掾田疇言前以無功横被封賞之賜以實自歸教從所執昨到下車見絹三千疋榖五千斛驚愕恠懼未敢自寧乞還藏府以為軍儲世語曰王經字彦聿初為江夏太守大將軍曹爽附絹二十疋令交市於吳經不發書棄官歸母問歸狀經以實對母以經典兵馬而擅去送吏杖經五十爽聞不復罪經世說曰范宣年八嵗後園桃葉誤傷指大啼人問痛耶答曰非為痛也但身體髪膚不敢毁傷是以啼耳宣潔行亷約韓豫章遺絹百疋終不肯受後韓與范同車就車裂二丈韓云寧可使婦無裩耶范笑而受之孝子傳曰董永父貧不遂葬以身質錢一萬既葬就役逢一女子求為永妻云能織絹永請主人主人令織一旬三百疋債足女辭曰我天之織女也帝見君孝使我共償債耳因遂不見事具孝感門太平御覽卷八百一十七
