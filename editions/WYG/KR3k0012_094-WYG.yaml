body:
  text: 太平御覽卷九十四宋李昉等撰皇王部十九魏烈祖明皇帝齊王高貴鄉公陳留王烈祖明皇帝魏志曰明皇帝諱叡字元仲文帝太子也生而太祖愛之常今在左右年十五封武德侯黃初二年為齊公三年為平原王以其母誅故未建為嗣也七年夏五月帝病篤乃立為皇太子丁巳即皇帝位詔太傅三公以文帝典論刻石於廟門之外青龍見郟之靡陂井中丁酉幸陂觀龍於是改元為青龍靡陂為龍陂二年三月山陽公薨帝素服發哀遣使持節典護喪事追諡山陽公為漢孝獻皇帝葬以漢禮孫權入居巢湖口向合肥新城又遣將陸遜孫韶各將萬餘人入淮沔六月征東將軍滿寵進軍拒之秋七月帝親御龍舟東征權攻新城將軍張穎等拒守力戰帝軍未至數百里權遁走羣臣以為大將軍方與諸葛亮相持未解車駕可西幸長安帝曰權走亮膽破大將軍必制之吾無憂矣遂進軍幸壽春録諸將功封賞各有差八月大耀兵饗六軍遣使者持節犒勞合肥壽春諸軍辛巳行還許昌宫司馬宣王與亮相持連圍積日亮數挑戰宣王堅壘不應㑹亮卒其軍退還景初元年泰山茌縣言黃龍見茌仕俚反於是有司奏以為魏得地統宜以建丑之月為正月定厯改元為孟夏四月服色尚黃犧牲用白戎車乗黑首白馬建大赤之旗朝㑹建太白之旗改太和厯為景初厯其春夏秋冬孟仲季月雖與正歲不同至於郊祀迎氣礿祠蒸嘗巡狩蒐田分至啓閉班宣時令中氣早晩敬授民事皆以正歲斗建為厯數之序二年十二月帝寢疾不豫太尉宣王還至河内帝驛馬召到引入卧内執其手謂曰吾疾甚以後事屬吾君君其與爽輔少子吾得見君無所恨矣宣王頓首流涕即日帝崩於嘉福殿年三十六葬高平陵魏書曰帝生數歲而有岐嶷之姿武皇帝異之曰我基於爾三世矣毎朝讌㑹同與侍中近臣並列帷幄好學多識特畱心於法理容止可觀望之儼恪即位之後容受直言聽受吏民士卒上書一月之中至數十百封雖文辭鄙陋猶覽省究意無厭倦又曰青龍三年起太極諸殿築總章觀高十餘丈建鳳翔於其上又於上林囿中起陂池楫櫂越歌又於列殿之北立八坊諸才人以次第序處其中貴人夫人已上轉南附焉其秩名擬百官之數帝常遊宴在内乃選女子知書可附信者六人以為女尚書使典省外奏事處分當畫可自貴人已下至尚保及給掖庭洒掃習伎歌者各有千數通引縠水過九龍前為玉井綺欄蟾蜍含受神龍吐出使博士馬均作司南車水轉百戲歲首建巨獸魚龍曼延弄馬倒騎備如漢西京之制築閶闔諸門闕外罘音浮罳音思太子舍人張茂以吳蜀數動將出征而帝盛興宫室畱意於玩飾賜與無度帑藏空竭乃上書諫之魏氏春秋曰魏明帝天姿秀出立髮委地口吃少言而沈毅好斷初諸公受遺輔導帝皆以方位處之政自已出而優禮大臣開容善直雖犯顔極諫無摧戮也其君人之量如此之偉然不思建德垂風不固維城之基至使大權偏據社稷無衛悲夫魏畧曰明帝欲平北邙令登臺見孟津辛毗諫曰若九河溢涌洪水為害丘陵皆夷何以禦之帝乃止魏末傳曰初帝為平原王母甄后妬文帝殺之故不立為太子嘗從文帝獵見鹿子母文帝射殺鹿母詔明帝射鹿子明帝曰陛下已殺其母臣不忍殺其子因涕泣文帝即放弓箭以此深竒之而建樹之意定矣廢帝齊王芳魏志曰齊王諱芳字蘭卿明帝無子養王及秦王詢宫省事祕莫有知其所由來者魏氏春秋曰或云任城王楷子也青龍三年立為齊王景初三年正月明帝病甚乃立為皇太子是日即皇帝位二月西域重譯獻火浣布詔大將軍太尉臨試以示百僚帝加元服賜羣臣各有差大將軍司馬景王將謀廢帝以聞皇太后太后今曰皇帝芳春秋已長不親萬幾耽淫内寵沈漫女德日延倡優縱其醜謔日迎六宫家人畱止内房毁人倫之叙亂男女之節恭孝日虧悖傲滋甚不可以承天叙奉宗廟遣芳歸藩於齊以避皇帝位是日遷居别宫時年二十三歲使者持節送衞營齊王宫於河内之重門制度皆如藩國之禮儀魏畧曰景王將廢帝遣郭芝入白太后后與帝對坐芝謂帝曰大將軍欲廢陛下立彭城王據帝乃起去太后不悦芝曰太后有子不能教今大將軍意已成又勒兵在外以備非常但當從㫖將復何言太后曰我欲見大將軍口有所説芝曰何可見耶但當速取璽綬太后意折乃遣傍侍御取璽綬着坐側芝出報景王景王甚懽又遣使者授齊王印綬當出就西宫帝受命遂載王車與太后别垂涕始從太極殿南出羣臣送者數千人太尉司馬孚悲不自勝餘多流涕王出後景王又使使者請璽綬太后曰彭城王我之季也今來立我當何之且明帝當絶嗣乎吾以為高貴鄉公者文皇帝之長孫明皇帝之弟子於禮小宗有後大宗之義其詳議之景王乃更召羣臣以皇太后令示之乃定迎高貴鄉公是時太常已發二日待璽綬於溫事定有請璽綬太后令曰我見高貴鄉公小時識之明日我自欲以璽綬手授之魏世譜曰晉受禪封齊王為邵陵公年四十三太始十年薨諡曰厲公廢帝高貴鄉公魏志曰高貴鄉公諱髦字彦士文帝孫東海定王霖子也正始五年封郯縣高貴鄉公少好學夙成齊王廢公卿議迎立公十月公至於元武館羣臣奏請舍前殿公以先帝舊處避止西廂羣臣又請以法駕迎公不聽庚寅公入於洛陽羣臣迎拜西掖門南公下輿將答拜儐者請曰儀不拜公曰吾人臣也遂答拜至止車門下輿左右曰舊乗輿入公曰吾被皇太后徵未知所為遂步至太極東堂見於太后是日即皇帝位百僚陪位者欣欣焉甘露元年夏四月幸太學問諸儒曰聖人幽贊神明仰觀俯察始作八卦後聖重之為六十四立爻以極數凡斯大義罔有不備而夏有連山殷有歸藏周曰周易易之書其故何也易博士淳于俊對曰庖犧因燧之圖而制八卦神農演之為六十四黃帝堯舜通其變三代隨時質文各繇其事故易者變易也名曰連山似山出納雲氣連天地也歸藏者萬事莫不歸藏於其中也帝又曰若使庖犧因燧皇而作易孔子何以不云燧人氏没庖犧氏作乎俊不能答講易畢復命講尚書帝問曰鄭𤣥云稽古同天言堯同於天也王肅云堯順考古道而行之二義不同何者為是博士庾峻對曰先儒所執各有乖異臣不足以定之然洪範稱三人占從二人之言賈馬及肅皆以為順考古道以洪範言之肅義為正帝曰仲尼言唯天為大唯堯則之堯之大美在乎則天順考古道非其至也今發篇義以明聖德而舍其大更稱其細豈作者之意耶峻對曰臣奉遵師説未喻大義至於文質折中裁之聖思復命講禮記帝問曰太上立德其次務施報為治何由而教化各異皆修何政而能致於立德施而不報乎博士馬照對曰太上立德謂三皇五帝之世以德化民其次施報謂三王之世以禮為治也帝曰二者教化厚薄不同將主有優劣耶時使之然乎照對曰誠由時有樸文故化有薄厚辛未帝幸辟雍㑹命羣臣賦詩侍中和逌音由尚書陳賽等作詩賦稽畱有司奏免官詔曰吾以闇昧愛好文雅廣延詩賦以知得失而乃爾紛紜良用反側其原逌等主者宣勅自爾已後羣臣皆當翫習古義修明經典稱朕意焉魏氏春秋曰公神明爽雋德音宣朗罷朝景王私曰上何如主也鍾㑹對曰才同陳思武類太祖景王曰若如卿言社稷之福也又曰甘露元年二月帝讌羣臣於太極東堂與侍中荀顗尚書崔贊袁亮鍾毓中書令虞松等並講述禮典遂言帝王優劣之差帝慕夏少康因問顗等曰有夏既衰后相殆滅少康収集夏衆復禹之績漢高祖拔起隴畆驅帥豪雋芟夷秦項包舉宇内斯二主可謂殊才異畧命世大賢者也考其功德誰宜為優顗等對曰夫天下重噐王者天授聖德應期運然後能受命創業至於階縁前緒興復舊績造之與因同流可也至如高祖臣等以為優帝曰自古帝王功德言行互有高下未必創業者皆優紹繼者咸劣也湯武高祖雖俱受命賢聖之分所覺懸殊少康殷宗中興之美夏啓周成守文之盛論德校實方諸漢祖吾見其優未聞其劣顧所遇之時殊故所名之功異爾少康生於滅亡之後降為諸侯之𨽻﨑嶇逃難僅以身免能布其德而兆其謀卒滅過戈克復禹績祀夏配天下不失舊物非至德宏仁豈濟斯勲漢祖因土崩之山勢仗一時之權專任智力以成功業行事動靜多違聖檢為人子則數危其親為人君則囚繫賢相為人父則不能衞子身没之後社稷幾傾若與少康易時而處或未能復大禹之績也推此言之宜高夏康而下漢祖矣漢晉陽秋曰帝見威權日去不勝其忿乃召侍中王沈尚書王經散騎常侍王業謂曰司馬昭之心路人所知也吾不能坐受廢辱今日當與卿自出討之王經曰昔魯昭公不忍季氏敗走失國為天下笑今權在其門久矣朝廷四方皆為之致死不顧逆順之理非一日也且宿衞空闕兵甲寡弱陛下何所資用而一旦如此無乃欲疾除而更深之耶禍殊不測宜見重詳帝乃出懷中板令投地曰行之決矣正使死何所恨况不必死耶於是入白太后沈業奔走告文王文王為之備帝遂帥僮僕數百鼓譟而出文王弟屯騎校尉伷音胄入遇帝於東止車門左右呵之伷衆奔走中護軍賈充又逆帝戰於南闕下帝自用劒揮衆欲退太子舍人成濟問充曰事危矣當云何充曰今日之事無所問也濟即前刺帝刃出於胷文王聞大驚自投於地曰天下其謂我何太傅孚奔往枕帝股而哭哀甚曰殺陛下臣之罪也葬高貴鄉公於洛陽西北三十里屈澗之濱下車數乗不設旌旐百姓相聚而觀之曰是前日所殺天子也或掩面而泣悲不自勝帝王世紀曰高貴鄉公為太子舍人成濟所害年二十以公禮葬之陳畱王魏志曰陳畱王諱奐字景明武帝孫燕王字之子也甘露三年封安次縣常道鄉公高貴鄉公卒公卿議迎立公六月入於洛陽即皇帝位於太極前殿大赦改元景元四年詔伐蜀命征西將軍鄧艾督帥諸軍趨甘松沓中雍州刺史諸葛緒督諸軍趨武都高樓首尾踧討若擒姜維便當東西並進掃滅巴蜀又命鎭西將軍鍾㑹由駱谷伐蜀所至輒克十一月蜀主劉禪降巴蜀皆平咸熙二年命晉王冕十有二旒建天子旌旗進王妃為王后世子為太子八月相國晉王薨太子炎紹封襲位總攝百揆十二月禪位於晉改次於金墉城而終館於鄴時年二十在位六年帝王世紀曰陳畱王即位禪晉封陳畱王就國治鄴奉魏宗祀魏世譜曰晉封帝為陳畱王年二十八太安元年崩諡曰元皇帝魏志評曰古者以天下為公唯賢是與後代世位立子以嫡若嫡嗣不繼則宜取旁親明德若漢之文宣者斯不易之常凖也明帝既不能然情繫私愛撫養嬰孩傳以大噐託付不專必參枝族終於曹爽誅夷齊王替位高貴公才惠夙成好問尚辭亦文帝之風流也然輕躁肆忿自陷大禍陳畱王恭已南面宰輔統政仰遵前式揖讓而禪遂饗封大國作賓於晉比之山陽班寵有加焉太平御覽卷九十四
