body:
  text: 太平御覽卷一百二十宋李昉等撰偏霸部四後趙石勒石𢎞石虎石閔石勒崔鴻十六國春秋後趙錄曰石勒字季龍上黨武鄉羯人父周曷朱勒生時赤光滿室白氣自天屬于庭中長而壯健有膽力雄武好騎射㓜而力耕每聞鞞鐸之聲或在前後歸以告其母母曰作勞耳鳴非不祥也㑹并州刺史司馬騰執諸胡山東賣充軍實將詣兾州兩胡一枷勒亦在中東至中原賣與茌平人師權為奴毎夜於野嘗聞皷角之聲諸奴亦聞歸以白權權奇而免之勒與馬牧帥汲桑往来勒以能相馬自託於桑而傭於武安臨水為遊軍所囚㑹有羣鹿旁過軍人競逐之勒乃獲免俄而見一老父謂勒曰向羣鹿者我也君應為中州主故相救耳勒拜而受命遂招集王陽䕫安等十八騎復東如赤龍諸苑中乗苑馬逺掠繒寳以賂汲桑永興元年關東所在盜起二年陽平人公師蕃等自稱將軍起兵趙魏衆至數萬勒與汲桑率牧人乗苑馬數百騎以赴之桑始命勒以石為姓以勒為名永嘉元年勒歸劉淵拜為輔漢將軍晉平王淵薨聰襲位劉曜王彌圍洛陽勒帥精騎二萬㑹之王彌既平洛陽將先誅勒勒請彌燕于己營手斬彌而并其衆將軍郭墨畧獲天竺沙門佛圖澄以其有道術見於勒試之有効甚尊重之前趙嘉平二年張賔說勒曰邯鄲襄國趙之舊都依山憑險形勢之固可擇此二邑而都然後命將四出授以奇略王業可圗石勒於是進據㐮國聰授勒都督幽冀并營四川諸軍事冀州牧進封本郡公邑萬户三年以征虜將軍為魏郡太守鎮鄴三臺基謀之崩由於此矣前趙嘉麟元年劉琨遣姚澹帥衆来討勒與戰澹軍大敗琨長史李𢎞以并州来降七月劉聰疾甚以勒為大將軍錄尚書事受遺輔政勒固辭乃止劉曜稱尊號將授勒太宰大將軍加九錫增封十郡并前二十郡出入警蹕如曹公輔漢故事曜聞平樂之言停太宰之授勒大怒曰趙王趙帝孤自取之名號大小豈爾所呼耶征虜虎與左右長史張敬張賔等上號曰大司馬雖位冠九台非伯者之號請改稱大將軍大單于領兾州牧依魏王在鄴故事以二十四郡户二十九萬為趙國十一月勒即趙王位建社稷立宗廟以張離等為門生主書司典胡人出内重其禁法不得侮易衣冠華族號胡為國人二年令曰國人不聽執嫂及在喪婚娶至於燒葬令如本俗八月始置軒懸之樂八佾之舞作金根大輅黄屋左纛天子禮樂於斯備矣三年黎陽民陳武妻産三男一女上書自陳令曰昔周之興也四乳八子今武妻一乳四子可謂慶過姬祥美加曩日其賜乳婦一人榖百石雜繒十四疋庶以肅迎嘉祥冬十月勒親與鄉老齒坐懽飲語及平生勒曰李陽壯士也孤方取之何以不来父老歸語令速来漚麻池之忿是布衣之恨孤方崇信于天下寧讎匹夫乎令曰武鄉吾之豐沛也其復之三世十一月李陽至勒與酣謔引陽臂笑懽之曰卿雖老臂中猶有力頗復與人鬭孤往日厭卿老拳卿亦飽孤毒手因賜里第一區拜為都尉陽與勒隣居嵗長爭漚麻池迭相歐撃四年二月拜子𢎞為世子勒雅好文學雖在軍旅之中常令儒生讀春秋史漢諸傳而聽之聞酈食其勸立六國後大驚曰此法當失何以得成天下至留侯諫乃曰賴有此耳其天資英逹類如此八年八月修三臺三月以世子衛將軍𢎞鎮鄴太和十年劉曜圍洛陽㐮國大震勒統步騎四萬赴金墉濟自大碣先是流澌風猛軍至冰泮清和濟畢流澌大至勒以為神靈之助命曰靈昌津戰于西門曜軍大潰石堪執曜送之二年曜子熙等去長安奔于上邽車騎虎尅上邽遣主簿趙封奉傳國玉璽送之秦隴西平建元年二月車騎石虎等上尊號勒不許固請勒號趙天王行皇帝事大赦八月羣臣又固請以名位不正宜即尊號九月僣即皇帝位大赦改年正月勒南郊有白氣自壇屬天勒大悅四月勒如鄴議營新宫廷尉續咸諫曰臣聞唐虞之治采椽茅茨土階三尺美彰于詩書漢文惜百金不營露臺稱之於千古迨夏商之瓊臺瑤陛楚章華秦阿房資財内竭華夷外叛勒詔曰且勅停作以申吾直臣之氣七月大霖雨中山西北暴水漂流巨木萬餘根集于堂陽勒大悅謂公卿曰此非為灾天意欲吾營鄴都耳於是營之勒以成周漢晉舊京欲有移都之意乃命洛陽為南都置行臺治書侍御史于洛陽以太尉中山王虎為大司馬程遐為開府儀同三年正月大饗于建德殿酒酣勒謂徐光曰朕方自古開基何等主也光對曰陛下神武籌畧過于髙皇雄藝卓犖超絶魏祖三五以来無可比也其軒轅之亞乎勒笑曰人苦不自知卿言亦已太過朕若逢髙皇當北面事之與韓彭輩競鞭而爭先耳倘遇光武當並驅于中原未知鹿死誰手大丈夫行事當磊磊落落如日月皎然終不能如曹孟德司馬仲達欺人孤兒寡婦狐媚以取天下也朕在二劉之間耳軒轅豈所擬乎羣臣皆稱萬嵗四年雍州刺史石生上言西鄉行有蛇鼠鬭於安定府門二日蛇死臨涇馬生角長安城中雞鳴音皆曰基慈安定㕔事前後聞誦書聲求之不得七日乃止隕石于肥鄉六月勒寢疾召中山王虎太子𢎞中常侍嚴震等侍疾禁中七月薨于西閣偽諡明皇帝號髙祖晉書曰勒年十四隨邑人行販洛陽倚笑上東門王衍見而異之顧謂左右曰向胡雛吾觀其聲視有奇志恐將為天下之患馳遣收之㑹勒已去石𢎞崔鴻十六國春秋後趙録曰石𢎞字大雅勒第三子母程夫人右光禄遐之妹建平元年立為太子虛衿愛士好為文詠其所親昵莫非儒素勒謂徐光曰大雅愔愔殊不似將家子光曰漢祖以馬上得天下孝文以𤣥黙守之聖人之後必世勝殘天之道也勒大恱程遐言於勒曰中山怏怏不可以輔少主乞早除之以便大計勒不從勒薨虎執政臨軒収程遐等召子䆳將兵入宿衛文武無不奔散𢎞大懼策拜中山王虎為丞相以十三郡封為魏王又加九錫虎偽譲後乃受之延煕元年七月改頓丘為魏國公魏郡立黎陽十月𢎞賫璽綬親詣魏公喻襌意虎曰𢎞昏昧愚暗處喪無禮不可以君臨萬國奉承宗廟便當廢之云何襌譲十一月廢𢎞為海陽王𢎞就車容色自若幽𢎞及太后南陽王恢于崇訓宫尋殺之時年二十二石虎崔鴻十六國春秋後趙錄曰石虎字季龍勒之從子勒父昌朱㓜而字之故或謂之勒弟晉永興中與勒相失嘉平元年劉琨送勒母王及虎于葛陂時年十七性殘忍好馳獵遊蕩無紀度尤善彈數彈人軍中每患之勒怒之白母王氏曰此兒凶暴無度使軍人殺之聲名可惜不若自除之母曰徤犢走車破轅且當小忍勿便殺也至十八檢攝恭謹嚴重愛士弓馬迅捷勇冠當時勒深喜焉拜征虜將軍性酷虐無道軍中勇幹策畧與已侔者輒因事害之至於降城陷壘坑斬士女鮮有遺類勒屢加責誨而行意自若然御衆嚴而不煩莫敢犯者指授攻討所向無前故勒寵信彌隆任以専征之任既廢殺𢎞稱居攝趙大王建武元年正月大赦改元虎荒遊廢政外耽營繕使太子䆳還省以書奏事選守牧祀郊廟惟征伐刑斷乃親覽之四月南遊臨江而還京師大震是月觀省臺城賜匠有差九月遷都鄴宫三年徙洛陽鍾􅒶九龍翁仲等于鄴是嵗太武殿東西宫皆就太武殿基二丈八尺下穿伏室置衛士五百人於其中東西七十五步南北六十五步皆漆瓦金鐺銀楹金柱珠簾玉璧窮極伎巧起靈風室九殿於顯陽後選召百官州郡民女以充之後庭服綺縠玩珍奇者萬餘人内置女官十八等教宫人星占及馬步射置女太史于靈臺仰觀灾祥以考外太史之虛實禁郡國不得私學星䜟左校令成公段造庭燎于崇杠之末髙十餘丈上盤置燎下盤置人絙繳上下虎試而恱之三年太保安䕫等文武五百九人上皇帝尊號安等方入而庭燎油灌下盤死者七人虎大怒腰斬成公段于閶闔門辛巳即天王位大赦親王貶為郡公藩王為縣侯太子䆳總百揆其後荒酒淫色驕恣無道或盤遊于田浹旬不返或夜百騎宿于宫臣家淫其妻妾裝飾宫人美淑者斬首洗血置于盤上傳共視之又納諸比丘尼有姿色者與之交䙝而殺之合牛羊肉煮而食之亦賜左右所以識其味也虎荒耽内遊威刑失度䆳以事為可呈呈之虎怒曰小事何足呈也時有所不聞復怒曰何以不呈誚責杖捶月至再三䆳甚恨私謂中庶子李顔等曰官家難稱吾欲行冐頓之事卿從我乎顔等伏不敢對事發幽䆳于東宫殺之及妃張氏并男女二十六人盡賜死合一棺埋之誅其宫臣友黨二百餘人立河間公宣為太子建武六年追尊皇考樂平敬公為太宗孝皇帝八年六月上黨孟門上有神人之像坐于山上三日而去虎遣使以太牢祀之九年十二月武鄉送雄虎變為雌産一狼子日噬虎腦而殺之後三日狼子亦死佛圗澄聞之流涕十年虎起河橋於靈昌津採石為中濟石無大小輒隨流用工五日餘不成虎如靈昌津沉壁告誠壁浮于渚水波上騰津所殿觀莫不傾壊壓死者百餘人虎恚甚斬工匠而還十一年發雍梁十六萬人成長安未央宫既又發豫荆兖二十六萬人成洛陽宫十三年二月虎親耕籍田于桑梓苑十四年三月虎夢龍飛西南自天落地旦問佛圖澄澄曰禍將至矣陛下宜父慈子和深以慎之四月秦公韜起宣光殿于太尉府梁長九丈太子宣視而惡之斬匠截梁而去韜怒增之十丈宣聞之恚甚謂楊杯牟成等曰韜凶豎悖逆敢違我如是汝等能殺之者吾入宫盡以韜之國分封汝等韜既死主上必親臨喪因行大事無不濟矣楊杯等許諾八月殺韜宣奏之虎哀絶久之乃蘇召太子宣積柴于鄴北火焚殺之議立太子於東堂虎曰吾欲以純灰三斛自滌其腸何為専生惡子兒子年二十便欲殺父今世方十嵗比其二十吾已老矣齊公世為皇世子立昭儀劉氏為皇后十一月饗羣臣於太武殿前佛圗澄殿上褰衣而行吟曰棘子成林將壊人衣虎發石而祝之有棘子生焉冉閔小字棘故澄及之十二月大雷雨虎問佛圗澄澄曰其為我乎至戊子而澄卒大寧元年正月虎僣即皇帝位于郊大赦改年二月有沙門從雍州来稱見佛圗澄西入闗虎掘之無屍唯有一石虎惡之曰石者朕也葬我而去吾將死矣因而寢疾四月薨於金華殿晉書曰季龍始咸康元年僣立至此太和六年凡在位十五年世子即位尊劉后為太后彭城王遵先鎮關右至是勒兵而還戎卒九萬次于蕩隂石閔為前鋒都督太后令授遵丞相加九錫增封十郡己丑至安陽亭貫甲耀兵入自鳯陽門升太武前殿盡哀退如東閣羣臣敦勸即位大赦封世為譙王邑萬户廢太后劉氏為昭儀尋皆殺之世立凡三十三日尊其母鄭氏為皇太后立妃張氏為皇后大司馬義陽王鑒為太傅沛王沖為太保石閔為都督中外諸軍事錄尚書事甲午太武殿灾諸門觀閣蕩然其乗御服燒者大半光熖照天月餘乃滅己未雨血周徧鄴城六月𦵏虎顯原陵偽諡武皇帝廟號太祖十一月石閔刼司空李農及右衛王基密謀共廢遵閔使將軍蘇彦周成帥甲士三十八人執遵于南臺如意觀遵時方與婦人彈碁問周成等曰反者誰也成曰義陽王鑒當立遵曰我尚如是汝等立鑒復能㡬時遂殺之于琨華殿誅鄭太后張皇后遵字大祗虎第九子凡在位者百八十三日鑒即位大赦以石閔為將軍封武徳王李農為大司馬鑒使中書令李松殿中將軍張才等夜誅閔農等于琨華殿不克禁中擾亂鑒偽不知夜斬松才於西中華門龍驤將軍孫伏都劉銖等結羯士三千人伏於朝天門亦欲誅閔等時鑒在中臺伏都帥三十餘人將升臺挾鑒以攻之鑒見而問其故伏都曰閔農等反已在東掖門臣嚴帥衛士謹先啟知鑒曰卿好陳力勿憂無報也伏都等攻閔不尅閔農攻斬伏都等自鳯陽門至琨華横尸相枕諸胡羯無少長皆斬之死者二十餘萬人于時髙鼻多鬚至有濫死者青龍初元年正月石閔欲滅二石之號議曰孔子曰死姓而王七月者七十有三國繼趙李䜟書炳然且徳星鎮衞宜改號大衛復姓冉氏又大赦閏月改元廢鑒殺之誅虎孫三十八人盡殪石氏鑒在位一百三日鑒字大郎虎第三子也晉書曰季龍十三子五人為冉閔所殺八人自相殘害初䜟言㓕石者陵尋而石閔封蘭陵公季龍惡之改蘭陵為武興郡至是終為閔所滅石勒以成帝咸和三年僣立二主四子凡二十三年以穆帝永和五年滅石閔崔鴻十六國春秋後趙録曰石閔字永曾虎之養孫也父瞻字𢎞武本姓冉名良魏郡内黄人也其先漢黎陽騎都督累世牙門勒破陳午於河内獲瞻時年十二長而勇悍便弓馬臨陣不顧勒奇之曰此兒壯健可嘉命虎子之厯位左積射將軍封西華侯閔幼而果銳虎撫之如孫及長身長八尺善謀勇力絶人虎即位封為修武侯厯位北中郎將虎之敗於昌黎閔軍獨全由此功名大顯永興元年閏月司徒申鍾司空即闓等四十八人上尊號於閔僣皇帝位於南郊大赦改元號稱大魏復姓冉氏追尊親隆元皇帝考瞻烈祖皇帝尊母王氏為太后妻董氏為皇后子智為皇太子以司馬李農為太宰諸子皆封為縣公新興王祗聞石鑒之死稱尊號於襄國改年永寧石祗遣相國汝隂王石琨帥衆十萬伐鄴六月進據邯鄲閔盡衆拒之琨軍大敗二年三月閔攻襄國百餘日祗怯乃去皇帝之號改稱趙王遣太尉張奉乞師于慕容雋中軍張春請救於姚弋仲三月祗相國汝隂王琨自兾州救祗弋仲復遣子襄帥騎三萬八千雋遣將軍恱綰帥甲士三萬勁卒十三萬四方攻之祗衞其後閔師大敗閔與千萬騎奔還鄴祗使劉顯帥衆十萬追奔伐鄴閔盡衆出戰大敗之追奔至於陽平顯懼密使請降求殺石祗為効四月劉顯殺祗及其丞相樂安王炳太保張舉等遣拜顯上大將軍大單于單州牧祗炳皆虎之庶子也七月劉顯稱尊號襄國三年二月劉顯帥衆伐常山太守蘇彦告難閔帥八千救彦敗顯于常山追奔及于襄國顯大將軍曹伏駒開門為應遂入襄國誅顯及其公卿已下百餘人焚襄國宫室遷其民于鄴三月慕容雋已尅幽薊畧地至于兾州閔帥騎擊之與慕容恪遇於魏昌城恪方陣而前閔衆寡不敵所乗赤馬曰朱龍日行千里潰圍東奔行二十餘里馬無故而死遂為恪所禽送之于薊雋立閔而問之曰汝奴僕下才何敢妄稱天子閔曰天下大亂爾曹夷狄人面獸心尚欲簒逆我一時英雄何為不可作帝王耶雋怒鞭之三百遣慕容評帥衆圍鄴五月送閔於龍城告廆皝廟而殺之鄴中飢人相食虎時宫人被食畧盡冉智尚幼蒋幹遣詹事劉猗奉表降晉八月長水校尉馬願龍驤將軍田香開門隆評蒋幹懸縋而下奔于倉垣評送閔后董氏太子智太尉申鍾及諸王公卿于薊初慕容雋斬閔於遏陘山山左右七里草木悉枯蝗䖝大起自五月不雨至於十二月雋遣使者祀之諡曰武悼天王其日大雨雹是嵗太和八年也太平御覽卷一百二十
