body:
  text: 太平御覽卷八百四宋李昉等撰珎寳部三玉上尚書堯典曰在璿璣玉衡以齊七政又𦙍征曰火炎崑崗玉石俱焚山脊曰崑崗山出玊言火逸而害玊又禹貢曰華陽黒水惟梁州厥貢璆雍州厥貢惟球琳琅玕又顧命曰成王被冕服憑玉几又曰太玉夷玉天球在東序尚書中侯曰湯沉璧扵洛黒鳥隨魚止化為黒玉赤勒文尚書説曰有人能起載玉英鄭𤣥曰王果實召載為骨衣也尚書大𫝊曰堯致舜天下贈以昭華之玊周書曰武王俘商舊寳萬四千佩玉億有八萬周禮天官下曰玊府掌王之金玉玩好兵器凢良貨賄之藏共王之服王佩玉珠玉齊則共食玉玊是陽精之純者食之可禦水寒又春官上大宗伯曰王作六器以禮天地四方以蒼璧禮天以黄琮禮地以青珪禮東方以赤璋禮南方以白琥禮西方以𤣥璜禮北方儀禮聘禮曰凡執玉無籍者襲鄭元注曰籍言修也大載禮曰玉在山而木潤淵生珠而崖不枯珠者隂中之陽也故勝火玉者陽中之隂也故勝水禮記月令曰孟春之月天子衣青衣服蒼玊又曲禮上曰受珠玉者以掬又曰飲玉爵者勿揮又曰執玉不趨志重玉也又檀弓曰石駘仲卒無適子有庶子六人卜所以為後者曰沐浴佩玉則兆五人者皆沐浴佩玉石祁子曰孰有執親之喪而沐浴佩玊者乎不沐浴佩玉又月令曰孟春之月衣服蒼玊又玊藻曰古之君子必佩玉右徴角左宫羽趨以采齊行以肆夏周還中䂓折還中矩進則揖之退則揚之然後玉鏘鳴也又曰君子無故玉不去身君子扵玉比徳焉天子佩白玊而元組綬公侯佩山元玉而朱組綬大夫佩水蒼玊而純組綬公子佩瑜玊而綦組綬士佩瓀玟而緼組綬玉有山𤣥水蒼者視之文色所似也綬者所以習佩玊相承受也又學記曰玉不琢不成器人不學不知道又聘義曰子貢問扵孔子曰敢問君子貴玉而賤珉何也為玊之寡珉之多與孔子曰非為珉之多故賤之也玉之寡故貴之也夫昔者君子比徳扵玊焉温潤而澤仁也縝宻而栗知也廉而不劌義也垂之如墜禮也叩之其聲清越以長其終詘然樂也瑕不掩瑜瑜不掩瑕忠也孚尹旁逹信也氣如白虹天也精神見扵山川地也圭璋特逹徳也天下莫不貴者道也詩云言念君子温其如玉故君子貴之也禮含文嘉曰玉石得宜則太白常明禮稽命徴曰王者得禮制則澤谷之中有白玊焉禮斗威儀曰君乘金而玉則紫玉見扵深山左𫝊桓公曰初虞叔有玉虞公求用不獻既而悔之曰周諺有之匹夫無罪懷璧其罪吾焉用此以其賈害乃獻之又莊公曰虢公晉侯朝王享禮命之宥命之以幣物有助也皆玊五㲄非禮也又僖上曰天王使邵武公内史過賜晉侯命受玊隋過歸告王曰晉侯其無後乎又僖下曰楚子玉自為瓊弁玊纓未之服也先戰夢河神謂巳曰畀余余賜汝孟豬之麋弗致也大心與子西使榮黄諫弗聽榮季曰死而利國猶或為之况瓊玊乎是糞土也而可以濟師將何愛焉弗聽又僖下曰晉侯執衛侯歸之于京師使醫衍酖衛侯寗俞貨醫使薄其酖不死公為之納玉扵王與晉侯皆十㲄王許之乃釋衛侯又文公子曰秦伯使西乞術來聘且言將伐晉襄仲辭玉又曰莒太子僕以其寳玉來奔又成上曰晉及齊戰于鞍齊師敗齊侯使賔媚人賂以紀甗玊磬與地不可則聽客之所為又襄十五年曰宋人或得玉獻諸子罕子罕弗受獻玊者曰以示玉人玉人以為寳也故敢獻之子罕曰我以不貪為寳爾以玊為寳若以與我皆䘮寳也不若人有其寳稽首而告曰小人懷璧不可以越鄉言必為盗所害納此以請死也請免死子罕寘諸其里使玊人為之攻之富而後使復其所賣玉得富又曰襄公十八年晉侯伐齊將濟河獻子以朱絲係玉二㲄而禱曰齊環怙恃其險負其衆庶環齊靈公名負依此棄好背盟陵虐神主神主民也謂數伐魯民人㑹臣彪將率諸侯以討焉彪晉平公名稱臣者明上有天子以謙告神㑹臣猶未臣其守臣偃實先後之守官之臣偃獻子名苟㨗有功無作神羞官臣偃無敢復濟偃信巫言故以死自誓唯爾有神裁之沈玉而濟又昭七年曰燕暨齊平燕人歸燕姬嫁女扵齊侯賂以瑶罋玉櫝斚耳不克而還瑶玉也櫝匱也斚耳玉爵又曰公賜公衍羔裘使獻龍輔扵齊侯龍輔玉名遂入羔裘齊侯喜與之陽榖齊邑名又曰公疾徧賜大夫從公者大夫不受賜子家子雙琥一環一璧輕服細好之服受之大夫皆受其賜已未公薨子家反賜扵府人曰吾不敢逆君命也大夫皆反其賜又昭十六年曰晉韓起聘于鄭宣子有環其一在鄭商玊環同工共朴相與雙宣子謁諸鄭伯謁請子子産弗與曰非官府之守器也寡君不知子太叔子羽謂子産曰韓子亦無幾求晉國亦未可以貳晉國韓子不可偷也偷薄也若屬有䜛人交鬬其間鬼神而助之以興其凶怒悔之何及吾子何愛扵一環其以取憎扵大國也盍取而與之子産曰吾非偷晉而有二心将終事之是以弗與忠信故也僑聞君子非無賄之難立而無令名之患僑聞為國非不能事大字小之難無禮以定其位之患夫大國之人令扵小國而皆獲其求將何以給之一共一否為罪滋大大國之求無禮以斥之何饜之有吾且為鄙邑則失位矣若韓子奉命以使而求玊焉貪滛甚矣獨非罪乎出一玊以起二罪吾又失位韓子成貪將焉用之且吾以玉賈罪不亦鋭乎鋭細小也韓宣子私覲扵子産以玊與馬曰子命起舎夫玉是賜吾生而免吾死也敢不籍手以拜以玊馬籍手拜謝子産又昭十七年曰鄭禆竈言扵子産曰宋衛陳鄭將同日火若我用瓘斚玊瓉鄭必不火子産弗與以為天災流行非禳所息故也為明年宋衛陳災傳又定上曰蔡昭侯為兩佩與兩裘以如楚獻一佩一裘扵昭王昭王服之以享蔡侯又曰蔡侯歸及漢執玊而沈曰余所有濟漢而南者有若大川自誓言若復渡漢當受禍也又曰季平子行東野還未至丙申卒于房陽虎以璵璠歛仲梁懷弗與曰改歩改玉昭公之岀季孫行君事佩璵璠祭宗廟今定公立復位臣改君歩則亦當去璵璠陽虎欲逐之告公山不狃曰彼為君也子何怨焉又定下曰邾隱公來朝子貢觀焉邾子執玊髙其容仰公受玊卑其容俯子貢曰以禮觀之二君者皆有死亡焉又曰陽虎脱甲如宫取寳玊大弓以出又哀上曰衛太子禱曰大命不敢請佩玊不敢愛又曰呉申叔儀乞糧於公孫有山氏曰佩玊蘂兮予無所繫之榖梁𫝊隱公曰賵玊曰唅春秋孔演圖曰孔子論經有鳥化為書孔子奉以告天赤爵集書上化為玊刻曰孔氏命作應法春秋説題辭曰孔子以受黃玉𦵏魯城北毛詩國風曰將翺將翔佩玊鏘鏘又竹竿曰巧笑之瑳佩玊之儺又小雅曰他山之石可以攻玉又大雅曰維玉及瑶鞞琫容刀詩含神霧曰孔子曰詩者天地之心刻之玉板藏之金府韓詩外𫝊曰良玉度尺雖有千仭之土不能掩其光周易鼎卦曰上九鼎玊鉉大吉旡不利孝經援神契曰神靈液百寳用則玊有璞宋匀曰尊卑不失其服玉者英華也論語子罕曰子貢曰有美玊扵斯韞櫝而藏諸求善賈而沽諸子曰沽之哉沽之哉我待賈者也又季氏曰孔子曰求虎兕出於柙龜玉毁扵櫝中是誰之過與逸論語曰璠璵舊魯之寳玊也孔子曰美哉璠璵逺而望之煥若也近而視之瑟若也一則理勝一則孚勝又曰玉十謂之區治玊謂之琢亦謂之雕雙玊為㲄五㲄為區雕治璞也皷音角瑳玉色鮮白也瑩玊色也瑛玊光也瓊赤玊也璿瑾瑜美玊也璑舞三采玊也玲瑲琤瑱瑝煌玊聲也璬玊珮玉也瑱充耳也璪玊飾以水藻也史記曰范蠡事越王勾踐二十餘年竟滅呉范蠡曰君行令臣行意乃載輕寳珠玉乘舟浮玉行終不反漢書曰陳平求見漢王拜平為都尉絳灌等或䜛平曰雖美丈夫如冠玊耳又曰文帝始幸雍新垣平以望氣見平使人持玊杯闕下獻之平言上曰闕下有寳玊氣果有獻玊杯者又郊祀志曰宣帝祀河東之明年鳳凰集投翔於所集處得寳玉乃起萬夀宫又曰王莾就國孔休守新都相休謁見莾莾進其玊具寳劒休不肯受莾因曰誠見君面有瘢美玊可以滅獻其璏耳即辭解其璏休復辭莾遂推碎之自裹以進休也後漢書曰孝明帝時汴渠成故行幸滎陽巡行河渠薦嘉玉潔牲以禮河神續漢書曰桓帝時光禄吏舎下夜有青氣視之得玉鈎玦各一鈎長七寸三分玦五寸四分身中皆雕鏤又曰三老五更杖玊杖民年七十授之以玉杖華嶠後漢書曰嘉平中袁逄為三老賜玉杖范􅁮後漢書曰梁冀金玉珠璣異方琛恠積藏寳魏志曰漢夫餘王𦵏用玉鉀常豫以付𤣥莬郡王死則迎取以𦵏公淵伏誅𤣥莬庫猶有玉鉀一具今夫餘庫有玉璧珪瓉數代之物傳世以為寳耆老言先代之所賜也魏略曰大秦國出采玉五色夫餘國出赤玉晉書曰中興東遷舊章多闕而冕旒飾以翡翠珊瑚及雜珠等顧和奏舊冕十有二旒皆用玉珠今用雜珠等非禮若不能玉可用白璇成帝扵是始下太常改之沈約宋書曰紫玉王者不藏金玉則光見深山崔鴻十六國春秋南燕録曰南長史悦夀謂南海王法曰向見北海王子天資𢎞雅神爽髙邁始知天族多竒玊林皆寳又前凉録曰辛攀字懷逺隴西狄道人兄鑒曠弟寳迅皆以才識知名秦雍為之記曰三龍一門金友昆玉又曰初吕光之稱王也遣市大人扵于闐國六月収取玊燕書曰文帝熙平二年左部民得玊璽玊鼎趙書曰劉聪徙治平陽扵汾水中得白玉髙四寸二分龍鈕文曰有新保之後魏書曰崔挺為光州刺史掖縣有人年踰九十扳輿造州自稱少曽充使林邑得一美玊方尺四寸甚有光彩藏之海島六十嵗忻逄明政今願奉之挺曰吾雖得謝古人未能以玉為寳遣船隨取光潤果然迄不肯受乃表送都又曰李預字元凱歴征西大將軍長史帶馮翊太守府觧罷郡遂居長安羡古人飱玉法乃採訪藍田躬往掘得若環璧雜器者凡大小百餘頗有麤黒者亦挾盛以還至而觀之皆光潤可玩預乃椎七十枚為屑食之餘多惠人後預及聞者更求玉扵前處皆無所見翊公源懐等得其玊琢為器佩皆鮮明可寳預服經年云有效騐而世事寢食皆不禁節又加好酒損志及疾篤謂妻子曰吾酒色不絶自致扵死非藥過也然吾尸體必當異勿速殯令後人知食服之妙時七月中旬長安毒熱預死四宿而體色不變其妻常氏起玉珠二枚唅珠口閉常謂曰君自云飱玊有神騐何不受唅言訖齒唇啟納珠因噓其口都無穢氣舉殮棺堅直不傾委死時有遺玉數升嚢盛納諸棺中又曰髙祐為中書侍郎時有人扵零邱得玉印一以獻詔以示祐曰印上有榴書二字文曰守夀夀者命也我獲其命是以歸我之徴又曰穆弼有風格善自位置髙祖定代族欲以弼為國子助教弼辭曰先臣以來象賢累世比較徒流實用慙屈髙祖曰朕勵胄子故屈卿光白玊投泥豈能相汚弼曰既遇明時耻深扵泥滓又曰孝武中扵廣平王第掘得古玉印𠡠召祖螢與李琰之令辨何世之物螢云此是于闐國王晋奉康中所獻乃以墨塗字觀之果如螢言時人稱為博物後周書曰武帝保定中晉公䕶獲玊斗以獻北史曰于瑾平江陵獲大玊徑四尺圍七尺及諸輿輦法物以獻又曰隋文時王郡上表云稽覽國史又云政道則隂物變為陽物鄭𤣥注云葱變為韮亦是謹按自六年以來逺近山石多變為玉石為隂玉爲陽太平御覽卷八百四
