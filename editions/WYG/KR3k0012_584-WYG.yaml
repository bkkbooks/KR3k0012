body:
  text: 太平御覽卷五百八十四宋李昉等撰樂部二十二觱篥五絃六絃七絃太乙方響缶鐸鐃鐲角銅鉢壤撫相舂牘拍板觱篥樂部曰觱篥者笳管也卷蘆為頭截竹為管出於胡地制法角音九孔漏聲五音咸備唐以編入鹵部名為笳管用之雅樂以為雅管六竅之制則為鳳管旋宫轉氣以應六管者也通典曰篳篥本名悲篥出於胡中其聲悲或云儒者相傳胡人吹以驚中國馬後乃以蘆為首竹為管也通典曰桃皮東夷有卷桃皮以為篳篥也二貝大蠡也容可數升並吹之以節樂亦出南蠻樂府雜錄曰篳篥者本龜茲國樂也亦名悲篥有類於笳也徳宗朝有尉遲青官至将軍大歴中有幽州王麻奴者解吹觱篥河北推為第一手頗踞傲自負除戎帥外莫有輕易請者時有從事姓盧不記名䑓拜将入京臨岐把酒請麻奴吹一曲子相送麻奴偃蹇大以為不可盧乃怒曰汝藝亦未足稱者殊不知上國有尉遲将軍冠絶今古麻奴大怒曰某之此藝海内豈有及者耶今即往彼定其優劣不數月到京訪尉遲所居即常樂里也乃於側近僦居日夕加意吹之尉遲毎經其門過如不聞麻奴尚未分因賂其門者方得通見即設席於地令坐乃於髙般渉調中吹一曲勒部羝曲終流汗浹背尉遲頷頥謂曰此曲何必於髙般渉費許多氣力也耶因自出銀字管於平般渉調中吹之麻奴驚愧垂泣拜之曰某生於逺方偶有寡藝實為無敵今日幸聞天樂方悟前非遂将樂器碎之而歸終身不復言觱篥明皇雜錄曰明皇既幸蜀西南行初入斜谷屬霖雨渉旬於棧道雨中聞鈴聲與山相應上既悼念貴妃採其聲為雨霖鈴曲以寄恨焉時梨園弟子善吹觱篥者張野狐為第一此人從至蜀上因以其曲授野狐洎至徳中車駕復幸華清宫從官嬪御多非舊人上於望京樓下命野狐奏雨霖鈴曲未半上四顧凄凉不覺流涕左右感動與之歔欷其曲今傳於法部五絃國史補云趙璧弹五絃人問其術璧曰吾之於五絃也始則心驅之中則神遇之終則天隨之方吾浩然眼如耳目如鼻不知五絃之為璧璧之為五絃也音律圖曰五絃不知誰所造也今世有之比琵琶稍小盖北國所出也又曰二絃未詳所起形如琵琶二絃四隔孤柱一合散聲二隔聲八柱聲一緫十一聲隨調應律又曰秦漢未詳所起與琵琶同以不開目為異四絃四隔合散聲四隔聲十二總二十聲随調應律六絃又曰六絃史盛作天寳中進形如琵琶而身長六絃四隔孤柱一合散聲六隔聲二十四柱聲一總三十一聲隔調應律七絃又曰七絃鄭善子作開元中進形同阮咸而大近身旁有少缺取其身便也絃十三隔孤柱一合散聲七隔聲九十一柱聲一總九十九聲隨調應律太一又曰太一司馬縚作開元中進十二絃六隔合散聲十二隔聲七十二絃散聲應律吕以隔聲旋相為宫合八十四調今入雅樂宫懸内用之矣又曰天寳樂任偃作天寳中進類石幢十四絃六柱黄鍾一均足倍七聲移柱作調以應律舞者亦執焉方響三禮圖方響梁有銅磬葢今方響也方響以鐡為之脩八寸廣二寸圓上方下架如磬而不設業倚架上以代鐘磬人間所用者纔三四寸樂府雜錄曰唐咸通中有調音律官呉續為鼓吹署丞善打方響其妙超羣本朱崖李太尉家樂人也缶易曰日昃之離不鼓缶而歌則大耋之嗟凶毛詩宛丘曰坎其擊缶宛丘之道爾雅曰盎謂之缶注云盆也史記曰秦王與趙王㑹渑池藺相如從秦王曰寡人聞趙王好音請奏琴趙王鼓琴秦從史書曰某年某月秦王命趙王鼓琴相如亦奉缶秦王秦王不肯相如曰五歩之内請以頸血濺太王秦王不懌為一擊之相如亦命趙從史書曰某年某月秦王為趙王擊缶淮南子曰夫窮鄉之社扣甕拊瓶相和而歌自以為樂常試為之擊建鼓撞巨鐘乃始知夫瓮瓶之足羞也徐幹中論曰聽黄鍾之音知擊缶之細渉庠序之教知不學之困吕氏春秋曰堯使質以麋􅛘置缶而鼓之也墨子曰農夫春耕夏耘秋收冬藏息於吟缶大周正樂曰今缶永泰初司馬㴞進獻廣平樂葢有八缶具黄鍾一均聲樂府雜錄曰唐大中初有調音律官大興縣丞郭道源善擊甌用越甌邢甌共一十二旋加減水以筯擊之其音韻妙于方響也鐸周禮曰二十五人為兩置司馬一人因以名焉木舌金鈴曰鐸軍中振之以通皷也後周書曰長孫紹逺為太常廣召工創造樂器土木絲竹各得其宜唯黄鍾不調紹逺毎以為意甞因退朝經韓使君佛寺過浮圖三層之上有鳴鐸焉忽聞其音雅合宫調取而配奏方始克諧禮義纂曰鐸大鈴振之以通皷也樂書正樂曰鐸如鐃以木為舌揺之以和皷也樂書曰木鐸者鈴也鑄銅為之以木作舌故天将以夫子為木鐸也言施政教時天将命以號令天下文舞所執而鳴之以振文教樂書曰金鐸者形同木鐸以金為舌號令為度鳴而警衆武舞所執以振武教者也鄭注司馬職云掩上振之為摝摝者止行息氣也六軍三三而居其間相逺故振鐸以通之使軍衆知可進可止之節也司馬法曰皷聲不過閶鼙聲不過闒鐸聲不過琅廣古今五行記曰晉愍帝建興四年晉陵人陳寵在田得銅鐸五枚皆有龍虎形大周正樂曰唐朝承周隋離亂之后樂懸散失獨無徴音國姓所闕如者不敢聞逹其事天后末御史大夫李嗣真常宻求之不得一旦秋爽聞砧聲有應之者在今弩營是當時英公宅乂數年無由得之一旦秋爽敬業舉兵敗走后瀦其宫嗣真乃求得喪車一鐸入而振之於東南隅果有應也遂掘之得石一叚裁為四具補樂懸之散闕今享宗廟郊天掛簨簴者乃嗣真所得也鐃釋名曰鐃鐃也宫懸用之飾以流蘇禮記曰始奏以文文擊皷以驚衆也復亂以武武擊鐃而退也周禮曰金鐃止皷鐃如鈴無舌有秉執而鳴之以止皷也樂書曰金鐃小者似鈴執而鳴之以止皷也舞武工人所執謂振而退武也大者懸而擊之象鐘形薄旁有二十四鐃應音律而和樂也說文曰鉦鐃也鈴柄中上下通鉦也銑小鐃也軍法卒長執銑漢有鼓吹曲有鐃歌鐲周禮曰鼓人以金鐲節鼓形如小鍾軍行鳴之以為鼓節也近代有大銅疊懸而擊之又曰卒長執鐃兩司馬執鐲言鐲鐃之用為鉦鐸之屬以金鐃止皷而金鐲節皷然是四金之數故鐲者非雅樂器也角通禮義纂曰長鳴角也按蚩尤帥蝄蜽與黄帝戰於涿鹿帝命吹角為龍鳴以禦之魏武帝征烏桓軍士思歸乃減角為中鳴其聲尤悲以應胡笳晉宋以䧏㳂襲用之有長鳴角唐禮大駕陳一百二十具是承晉魏之制也宋樂志曰西戎有吹金者銅角長可二尺形如牛角書記所不載或云出羌胡以駕中國焉又曰角長五尺形如竹筒本細末稍大未詳所起今鹵部及軍中用之或以竹木或以皮為之無定制按古軍法有吹角者此器俗名㧞邏廻葢胡人驚軍之音所以書傳無之海内亂離至侯景圍䑓城始用之也銅鈸又曰銅鈸是西凉樂也以皮紐相擊應節今法樂用之通典曰銅鈸亦謂之銅盤出西戎及南蠻其圍數寸隠起如浮漚貫之以韋相擊以和樂也南蠻國大者圍數尺或謂齊穆士素所造也壤風土記曰壤者以木作之前廣後鋭長一寸餘其形如覆節僮少以為戲也堯時有八九十老人擊而歌曰日出而作日入而息鑿井而飲耕田而食帝力何有於我哉拊相大周正樂曰拊相以韋為之實以糠拊之以節樂也風俗通曰相拊也所以輔相於樂奏樂之時先擊相舂牘周禮笙師曰掌教舂牘應雅鄭司農云以竹大五六寸長七尺短者一二尺其端有兩空髤畫以兩手築地形如舂杵亦謂之頓相相助也以節樂也或謂梁孝武築㫿陽城方十三里造時唱聲以小鼓為節築者下杵和之后世謂此聲為睢陽樂又曰雅形如漆筩有椎詩云訊疾以雅是也拍板樂府雜錄曰𤣥宗令黄幡綽撰拍板譜幡綽乃於紙上畫一耳進之問其故對曰但能聰聽則無失其節奏也牛僧孺目為樂句太平御覽卷五百八十四
