  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_631-1a, image: WYG0898/WYG0898-0649a.png}
body:
  text: 太平御覽卷六百三十一宋李昉等撰治道部十二薦舉中東觀漢記曰光武召鄧禹曰吾欲北發幽州突騎諸將誰可使者禹曰呉漢與鄧𢎞俱客蘓𢎞𢎞稱道之禹數與語其人勇鷙有智謀諸將鮮及上以禹為知人上欲定河内問禹諸將誰可守河内者禹曰冦恂文武備足有牧民禦衆之才上乃用之又曰東平王蒼薦吏呉良上以章示公卿曰蕭何薦韓信設壇即拜不復考試以良為議郎又曰王丹字仲回初有薦士於丹者丹選舉之而後所舉者䧟罪丹坐免客慚自絶俄而徴丹復為太子太傅乃呼客見之謂曰何量丹之薄不為設食以罰之相待如舊又曰南陽太守杜詩上疏薦伏惠公曰竊見故大司徒陽都侯伏恵公自行束脩訖無毁玷篤信好學守死善道經為人師行為儀表衆賢百姓鄉望徳義㣲過斥退久不復用識者愍惜儒士痛心又曰上嘗問宋𢎞通愽之士𢎞薦沛國桓譚才學洽聞幾幾近也及揚䧺劉向父子於是召譚拜議郎給事中上毎宴輙令鼔琴好其繁聲𢎞聞之不悦悔於薦舉聞譚内出遣吏召之譚至不與席而讓之曰吾所以薦子欲令輔國家以道而今數進鄭聲以亂雅樂非碩徳忠正也後大㑹羣臣上使譚鼔琴見𢎞失其常度上怪而問之𢎞乃離席免冠謝曰臣所以薦桓譚者望能以忠正導主而令朝廷耽悦鄭聲臣之罪也又曰杜林字伯山扶風人為御史先與鄭興同寓隴右乃薦之上乃徴興為太中大夫又曰陳寵字昭公沛人為尚書寵性淑純周宻重慎時有表薦輙自手書削草人莫能知又曰韋豹字季明數年辟公府輙以事去司徒劉愷辟之謂曰卿輕人好去就故爵位不踰今嵗垂盡當辟御史意在相薦子其留乎豹曰犬馬齒衰豈敢久待論薦之私非所當遂跣而起愷追之遥去不顧范􅁮後漢書曰東平王蒼以至戚輔政時班固始弱冠説蒼曰將軍以周召之德立於本朝今者将軍幕府新開廣延羣俊四方之士顛倒衣裳将軍宜効唐殷之舉審伊臯之薦令逺近無偏幽隠必逹光名宣於當世遺烈著於無窮竊見故司空掾桓梁京兆祭酒馮晉扶風掾李育京兆督郵郭基凉州從事王雍恒農功曹殷肅此六子者皆有殊行絶才徳隆當世如蒙徴納以輔髙明此山梁之秋夫子所為嘆也蒼納之又曰曹騰加位特進其所進達皆四海内名人陳留虞放邊韶南陽延固張温𢎞農張奐潁川唐谿等皆所舉也漢雜事曰傅喜為右将軍傅太后與政事喜數諫之后不悦喜上印綬病在家司空何武尚書唐林上書曰魯以季友治亂楚以子玉輕重魏以無忌折衝項以范増存亡故楚跨有南土帶甲百萬鄰國不以為難子玉為将文公仄席而坐及其死也君臣相慶百萬之衆不及一賢於是上拜喜為大司馬髙武侯又曰谷永為尚書薦薛宣曰竊見少府宣材茂行潔達於從政有退食自公之節寡私黨遊説之助臣恐陛下忽於羔羊之詩捨公實之臣任華實之譽是以越職陳宣行能唯留神考察上然之遂以宣為御史大夫魏志曰太祖既定河東而髙幹舉并州叛衛固與范先通謀太祖謂荀彧曰河東被山帶河當今天下之要地也君為我舉蕭何冦恂以鎮之彧曰社畿可於是拜畿為河東太守固等率伏又曰潁川盧志才籌畫之士太祖甚器之早卒太祖與荀彧書曰自志才亡後莫可與計事汝潁固多奇士誰可以繼之彧薦郭嘉召見與論天下事太祖曰使孤成大業者必此人也嘉亦喜曰真吾君矣又曰張郃字雋義河間人也郃雖武将而愛儒士嘗薦同郡畢諶經修行明詔曰昔祭遵為将常置五經大夫居軍中與諸生雅歌投壺今将軍外勤戎旅内存國朝朕嘉将軍之意擢諶為愽士又曰桓範薦徐宣曰臣聞帝王之用人度世論才争奪之時以策畧為先分定之後以忠義為首故晉文行舅犯之策而賞雍季之言髙祖用陳平之智而托後於周勃竊見尚書徐宣體忠厚之行秉直亮之性清雅特立不随世俗確然難動有社稷之節今僕射缺宣行掌後事腹心任重莫如宣者帝遂以宣為右僕射又曰陳羣薦廣陵陳矯丹陽戴乾太祖並用之後乾以忠義死矯為名臣蜀志曰諸葛亮自比管仲樂毅時人莫之許惟徐元直徐庶字元直謂為信然時先主屯新野庶謂先主曰諸葛孔明者卧龍也将軍豈願見之乎先主曰與君俱来庶曰此人可就見不可屈致将軍宜枉駕顧之由是先主遂造亮凡三徃乃見於是情好日宻闗侯張飛等不悦先主解之曰孤有孔明猶魚之有水也願諸君勿言關張乃止呉志曰劉繇字正禮東萊人兄岱字公山平原陶丘洪薦繇令舉茂才刺史曰前年舉公山奈何復舉正禮乎洪曰若使君用公山於前擢正禮於後所謂御二龍於長衢騁騏驥於千里不亦可乎又曰周瑜薦魯肅才宜佐時當廣求其比以成功業不可令去也權即召肅與語甚悦之衆賔罷退獨引肅還相對食又曰凌統字公績呉郡人為孫權将甚見親重時有薦同郡盛暹於權者以為梗概大節有過於公績權曰但令如公績足矣後召暹夜至公績已卧聞之攝衣出門執其手以入其愛善不害如此晉書曰桓彛字茂倫性通朗早有盛名有人倫識鑒㧞才取士或出於無聞或得之孩抱時人方之許劭又曰劉恢嘗薦呉郡張憑卒為美士衆以此服其知人又曰華譚字令思廣陵人除甄城令過漢水作莊子讃序以示功曹後見功曹答教不常譚疑其不能為私問是廷掾張延所作譚即㧞延薦達於部遂得升擢比譚為廬江延已為郡譚至廬江舉寒族周訪為孝亷訪果立功名時以譚為知人又曰江統為司徒左長史東海王越為兖州牧以統為别駕委以州事與統書曰昔王子師為豫州未下車辟荀慈明下車辟孔文舉貴州人士有堪應者否統舉髙平郄鑒為賢良陳留阮脩為直言濟北陳收為方正時以為知人徐廣晉紀曰張華少自牧羊而篤志好學初為縣史盧欽奇其才數稱薦之晉中興書曰賀循㑹稽人郡鈐下有楊方者字公廻初為郡威儀少好學有異才以門役在閣下公事之暇輙讀五經鄉邑未之别也諸葛恢聞方學召為給使見而異之謂有殊常之才即解役散置左右以聞人待焉由是邦壤敬異方始得周旋鄉貴虞喜兄弟以儒學立名並知㧞之後恢欲薦功曹於中宗使方具事主簿虞預以薦文美送示太常賀循遂向京師稱美之司徒王導辟以為掾方始在都交遊貴人間縉紳咸厚遇之宋書曰劉道産在雍州有恵化逺蠻歸懐皆出緣沔為村落戸口殷盛及産死羣蠻大為冦暴孝武西鎮襄陽江夏王義恭薦栁元景乃以為武威将軍随郡太守至廣設方畧斬獲數百郡境肅然又曰荀伯子好學博覽經傳解褐奉朝請員外散騎侍中著作郎徐廣重其才學舉伯子及王韶之並為佐郎同撰晉史齊書曰傅昭字茂逺御史中丞劉休薦於武帝永明初以為南郡王侍讀又曰孔休源字慶緒州舉秀才太尉徐孝嗣省其策深善之謂同坐曰觀此足稱王佐之才瑯琊王融雅相友善為薦之司徒竟陵王為西邸學士又曰江革字休映弱冠舉南徐州秀才時胡諧之行州事王融與諧之書令薦舉諧之方貢瑯琊王汎便以革代之又曰武帝将下都劉懐珍白帝曰夏口是兵衝要地宜得其人髙祖納之與武帝書曰汝既入朝當須文武兼資人委以後事武帝乃舉栁世隆自代轉為武陵王前軍長史江夏内史行郢州事又曰明帝詔求異士始安王遥光表薦王昧及東海王僧儒徐暕散騎從事中郎将又曰梁武帝之臨雍州問京兆杜惲求州綱紀惲言栁慶達武帝曰文和吾已知所問未知者耳因辟為别駕又曰陸厥字韓卿少好屬文永明元年詔百官舉士同郡司徒右曹掾顧曇之表薦厥堪秀才梁書曰何遜字仲言八嵗能賦沈約嘗謂遜曰吾毎讀卿詩一日三復猶不已其為名流所稱如此天監中兼尚書水部員外郎南平王引為賔客後薦之於武帝與呉均俱進倖又曰朱异字彦和呉郡人也有詔求異能之士五經博士明山賔表异髙祖召見使説孝經周易甚説之謂左右曰朱异實異能後見山賔謂曰卿所舉殊得其人仍召异直西省又曰陸襄字師卿天監三年都官尚書范軸表薦襄起家為著作郎陳書曰陸瓊字伯玉幼聰慧有令名深為文帝所貴及討周迪陳寳應等都官符及諸大手筆並中勑付瓊及宣帝為司徒妙問僚佐吏部尚書徐陵薦瓊於宣帝言其識見優敏文史足用近居郎署嵗月過淹左曹掾缺允膺兹選雖階次小踰其屈滯已積乃除司徒左曹北齊書曰祖鴻勲范陽人也僕射臨淮王或表薦鴻勲有文學宜試一官勑除奉朝請人謂之曰臨淮舉卿便以得調竟不相識恐非其宜鴻勲曰為國舉才臨淮之務但鴻勲何從而謝之或聞而喜曰吾得其人矣太平御覽卷六百三十一
