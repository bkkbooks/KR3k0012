body:
  text: 太平御覽卷六百十七宋李昉等撰學部十一談論史記儒林傳云轅固以治詩孝景時為博士與黄生争論景帝前曰湯武非受命乃弑也轅固曰不然桀紂虐亂天下之心皆歸湯武湯武誅桀紂不得已而立非受命何黄生曰冠雖弊必加於首履雖新必闗於足何者上下之分也桀紂雖失君上也湯武雖聖臣下也臣下不能匡過以尊主而誅之代立非弑而何轅固曰必若所云是髙祖代秦非邪帝曰食肉不食馬肝不為不知味也學者不言湯武受命不為愚也漢書儒林傳曰武帝時江公與董仲舒並通五經能持論善屬文江公訥於口上使與舒議不如仲舒又曰揚雄為人簡易佚蕩不能劇談黙而好深湛之思又曰賈生徴見孝文帝方受釐坐宣室上因感鬼神事而問鬼神之本賈具道所以然之故至夜半帝前席既罷曰吾久不見賈生自以為過之今不及也東觀漢記曰尹敏與班彪相厚每相談論常對案忘食晝即至暝夜即徹旦晉書曰潘京字世長舉秀才到洛尚書令樂廣京州人也共談累日深歎其才謂京曰君天才過人恨不學耳若學必為一代談宗京感其言遂勤學不倦時武陵太守戴昌亦善談論與京共談京假借之昌以為不如己笑而遣之令過其子若思京方極其言論昌竊聽之乃歎服曰才不可假遂父子俱屈焉又曰郭象者字子𤣥少有才理好老荘能清言太尉王衍每云聽象語如懸河瀉水注而不竭又曰樂廣嘗與裴頠清言欲以理服之而頠辭論豐博廣笑而不言時人謂頠為言談林藪又曰朝賢嘗上巳禊洛或問王濟昨遊有何言談濟曰張華善說史說漢裴頠論前言往行衮衮可聽王戎談子房季札之間超然𤣥箸又曰王衍妙善𤣥言唯談老莊為事每捉玉柄麈尾與手同色義理有所不安隨即改更世號曰口中雌黄朝野翕然謂之一世龍門矣又曰胡母輔之宇彦國與王澄等為友澄嘗與人書曰彦國吐佳言如鋸木屑霏霏不絶誠為後進領袖也又曰趙孟字長舒為尚書都令史善於清談其面有疵黯時人言諸事不決皆當疵面又曰裴遐善𤣥理音辭清暢泠然若琴瑟常與河南郭象談論一座嗟服又曰殷仲堪能清言每云三日不讀道徳論便覺舌本間強晉中興書曰殷浩弱冠與京兆杜乂並有美譽善言𤣥理又唐元規少好黄老能言𤣥理時人方之夏侯泰初又曰謝弈女道韞王凝之妻也凝之弟獻之嘗與賓客論議辭理將屈道韞遣婢白獻之曰欲為小郎解圍乃以青綾步障自蔽申獻之前議客不能屈又曰孫盛年十歲避難渡江及長博學善言名理於時殷浩擅名一時與抗論者唯盛嘗詣浩談論對食奮擲麈尾毛悉落飯中食冷而復煖者數四至日暮忘食理竟不定沈約宋書曰髙祖少事戎旅不經涉學及為宰相頗慕風流時或談論人皆依違不敢難也鄭鮮之難必切至未嘗假借要須髙祖辭窮理屈然後置之髙祖或時慙恧變色動容既而謂人曰我本無學術談義尤淺比時言論諸賢多見寛容唯鄭不爾獨能盡人之意甚以此感之時人謂之格佞南史曰謝靈運辨博辭義蜂起王惠嘗與之談時然後言時荀伯子在坐退而告人曰靈運固自蕭散直上王郎有如萬頃陂焉又曰謝瞻傳曰靈運好臧否人物琨患之欲加裁折未有其方謂瞻曰非汝莫能乃與晦瞻𢎞微等共遊戯使瞻與靈運共車靈運登車便商較人物瞻謂曰秘書早亡談者亦互有同異靈運黙然言論自此衰止南史張敷好讀𤣥言兼屬文論弱冠初父邵使與髙士南陽宗少文談繫象往復數番少文欲屈握麈尾歎曰吾道東矣於是名價日重後周書曰蘇綽屬太祖與公卿往昆明池觀漁行至城西漢故倉地顧問左右莫有知者或曰蘇綽博物多通請問之太祖乃召綽具以狀對太祖大恱因問天地造化之始歴代興亡之迹綽既有口辯應對如流太祖益喜乃與綽並馬徐行至池竟不設網罟而還遂留綽至夜問以治道太祖卧而聽之綽於是指陳帝王之道兼述申韓之要太祖乃起整衣危坐不覺膝之前席語遂達曙不厭詰朝謂周惠達曰蘇綽真竒士也又曰裴文舉字道裕少忠謹涉獵經史總管韋孝寛特相欽重每與談論不覺膝前於席又曰㓂雋字祖雋上谷昌平人也世宗尚儒重徳特欽賞之與相見同席而坐因顧訪洛陽故事雋容止端詳音韻清朗帝與之談不覺為之前席南史劉繪傳曰永明末都下人士盛為文章談義皆凑竟陵西邸繪為後進領袖時張融以言辭辨捷周顒彌為清綺而繪音采不贍麗雅有風則時人為之語曰三人共宅夹清漳張南周北劉中央言其處二人間也又曰張緒性清淡善談𤣥王儉嘗云緒過江所未有北士可求之耳不知陳仲弓黄叔度能過之不三國典略曰陳袁憲樞之弟也幼聰敏好學梁武帝修建庠序别開五館其一館在憲宅西憲常招引諸生與之談論每有新義出人意表國子博士周𢎞正謂憲父君正曰賢子今欲策試不君正曰經義猶淺未敢令試居數日君正遣門下客岑文豪與憲侯𢎞正㑹𢎞正將登講座弟子畢集乃授憲麈尾令樹義時謝岐何妥在坐𢎞正謂曰二賢雖窮奥賾得無憚此後生耶何謝遞起義端憲酬對閑敏神色自若𢎞正因謂文豪曰卿還諮袁吳郡此郎已堪見代為博士矣梁書曰沈約齊初為征虜記室帶襄陽令所奉主即齊文惠太子太子入居東宫為步兵校尉管書記時東宫多士約特被親遇時王侯到宫或不得進約每以為言太子曰吾平生嬾起是卿所悉得卿談論然後忘寢卿欲我夙興可恒早入又曰簡文在東宫召戚衮講論又嘗置宴集𤣥儒之士先命道學互相質難次令中庶子徐摛馳騁大義間以劇談摛辭辨從横難以答抗諸儒懾氣時衮說朝聘義摛與往復衮精采自若領答如流簡文深加歎賞隋書曰辛彦之拜禮部尚書與秘書監牛𢎞撰新禮吳興沈重名為碩學髙祖嘗令彦之與重論議重不能抗於是避席而謝之曰辛君所謂金城湯池無可攻之勢髙祖大恱唐書曰楊綰凡所知友皆一時名士或造之者清談終日未嘗及名利或有客欲以世務干者綰言必𤣥逺不敢發詞内愧而退大厯中徳望日崇天下雅正之士爭趨其門至有數千里来者莊子曰孔子見老耼歸三日不談弟子問曰夫子見老耼將何規哉孔子曰吾與汝處於魯之時人用意如飛鴻者吾徒狗而逐之用意如井魚者吾為鈎繳以投之吾今見龍合而成體散而成章乘乎雲氣而養乎陰陽余口張不能噏舌出不能縮戰國䇿曰蘇秦說李兊明日復見抵掌而談兊送秦明月之珠和氏之壁抱朴子曰王充所作論衡北方都未有得之者蔡伯喈嘗到江東見之歎為髙文度越諸子恒愛玩而獨秘之及還中國諸儒覺其談論更逺嫌得異書或捜求其隠處果得論衡捉數卷將去伯喈曰唯我與爾共之勿廣也亦出著書門管輅別傳曰輅父為瑯琊即丘長輅時年十五瑯琊太守單子春雅有才度聞輅一時之俊欲得相見輅父即遣輅造之大會賓客百餘人坐上有能言之士輅問子春府君多嘉賓有雄貴之姿輅既年少膽志未剛若欲相觀懼失精神先飲三升清酒盡之然後而言子春大喜便酌三升酒獨使飲之酒盡之後問子春今欲與輅為對者府君邪四坐之士邪子春曰吾自欲與卿旗鼔相當輅言始讀書論易本學問微淺未能上引聖人之道陳周漢之事但論金木火水鬼神之情耳子春言此最難者而卿以為易邪於是唱大論之端遂造陰陽文彩葩流枝葉横生少引聖籍多發天然子春及衆士互共攻刼論難鋒起而輅人人答對言皆有餘至日向暮酒食不行於是發聲徐州號之神童冀州刺史裴徽召輅為文學從事相見親輅終日不覺罷倦􅄪相見轉為治中四相見轉為別駕前至十月舉為秀才物理論曰夫虛無之談無異春鼃秋蟬聒耳而已荆州先徳傳曰龎士元師事司馬徳操徳操蠶月躬採桑後園士元往助之因與共談論甚歡遂移日忘餐徳操於是異之世說曰何晏為吏部尚書有位望時談客盈坐王弼年未弱冠往見之晏聞弼名倒履出户迎之因條向者勝理語弼曰此理僕以為極可得復難不弼便作難一坐便以為屈於是弼自為客主數番皆一坐所不及也又曰衛玠字叔寶少有名理瑯琊王平子髙氣不羣遺世獨逺每聞玠之語議至乎理會之間要妙之際輒絶倒於坐前後三聞為之三倒時人遂曰衛玠談道平子三倒及玠年壯論者以為出於王武子之右也世云王家三子不如衞家一兒玠於武昌見大將軍王敦與之談論彌日信宿敦顧謂僚屬曰昔王輔嗣吐金聲于中朝此子復玉振于江表微言之緒絶而復續不意永嘉之末復有正始之音清言勝致亹亹入微倘平叔在當復絶倒矣又曰孝武將講孝經謝太傅與諸人私庭講習車武子謂袁彦伯曰不問則徳音有遺多問則重勞二謝袁曰必無此嫌車曰何以知爾袁曰何嘗見明鏡疲於屢照清流憚於惠風也郭子曰張憑舉孝亷出京負其才氣心渴慕時彦欲詣劉真長郷里及同舉者咸共哂之張遂徑往詣劉既前處之下坐通寒温而已真長方洗濯料事神意不接良久張欲自發而未有其端頃之王長史諸賢来清言各有隔而不通處張忽遥於末坐判之言約㫖逺便足以暢彼我之懐舉坐皆驚真長延之上坐遂清言彌日因留宿遂復至曉張退劉曰卿且前去我正爾往取卿共詣撫軍撫軍簡文張既還船同侣笑之曰卿何許宿還張笑而不答須臾真長至遣使覔孝亷船同侣惋愕既同載俱詣撫軍至門劉謂撫軍曰下官今日為公得一太常博士妙選既前撫軍與之語言咨嗟稱善數日乃止曰張憑勁粹為理之窟即用為太常博士又曰范𤣥平江宰𤣥平欲屈引長史曰長史王仲祖卿助我王曰此非拔山之力所能助也異苑曰陸機初入洛次河南偃師時久結隂望道左人居因往投宿見一年少置易投壺與機談機心服之而無以酬抗既曉便去稅驂逆旅問嫗嫗曰此東數十里無村落正是山陽山王家墓耳機乃怪還睇昨路空野霾雲拱木蔽日知所遇者信王弼也又曰陸雲獨於空巗中忽見一家牆院整搆雲時飢乏因而詣前見一年少可二十餘風姿可嘉論叙平生不異於人尋其說老子極有辭致雲出臨別語云我是山陽王輔嗣雲出門還望向處正是一冢雲始謂斯須已經三日幽明録曰阮瞻素秉無鬼論世莫能難每自謂理足可以辨正幽明忽有一鬼通姓名作客詣阮寒温畢聊談名理客甚有才情末及鬼神事返覆甚苦遂屈乃作色曰鬼神古今聖賢所共傳君何獨言無即僕便是鬼於是忽變為異形須臾消滅阮黙然意色大惡後年餘病死太平御覽卷六百十七
