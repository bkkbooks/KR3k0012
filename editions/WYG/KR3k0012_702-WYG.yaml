  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_702-1a, image: WYG0899/WYG0899-0271a.png}
body:
  text: 太平御覽卷七百二宋李昉等撰服用部四扇葢扇揚雄方言曰扇自闗而東謂之扇自闗而西謂之箑世本曰武王作翣帝王世紀曰武王自孟津還返於國見暍人王自左雍之以扇續漢書曰梁冀輿服之制作擁身扇東觀漢記曰黄香至孝夏則以扇侍於親側魏略曰韓宜字景然為丞相軍謀掾步入宫門内與臨淄侯相遇時新雨地有􅅺潦冝碍不得去以扇自鄣晉書曰武帝太始中博選良家以充後宫先下書禁天下嫁娶使官者馳傳州縣召充選者使楊后選所取后妬不取端正唯取長白時卞蕃女有美色帝舉扇障面語后云卞蕃女好后曰蕃三世后族不冝枉以卑位帝乃止又曰何植字元幹常以縳筆織扇為業以奉供養又曰庾亮出鎮於外以帝舊故執朝權王導不能平嘗遇西風起輒舉扇自蔽曰元規塵汚人又曰王羲之字逸少居蕺山見一老姥持六角扇賣之羲之書其扇各為五字姥初歎惋因謂姥曰無若但言是王右軍書以求百錢價姥如言人競買之后姥復將數扇來請書羲之不答又顧榮傳曰廣陵相陳敏反渡江攻揚州刺史劉機阻兵據州郡有鼎峙之意遣顧榮斂舟於岸敏率萬人出不獲濟榮自麾羽扇敏衆大潰也晉中興書曰安帝義熈元年禁絹扇及樗蒲續晉陽秋曰謝安賞袁宏機對辯速宏為東陽郡時賢祖道治亭安起執宏手顧左右取一扇授云聊以贈行宏應聲曰輒當奉揚仁風慰彼黎庶合坐稱其率要又曰謝安鄉人有罷中宿縣者還詣安問其歸資荅曰嶺南彫弊唯有五萬蒲葵扇謂非時為滯貨安乃取其一中者捉之於是京都士庶競而慕焉增價數倍旬日則無所賣矣宋書曰明帝王皇后嘗宫内大襟而祼婦人觀之以為歡笑后以扇障面獨無所言又明恭王后傳曰廢帝失德太后每加朂譬始猶見順後狂慝稍甚太后常賜帝玉柄毛扇帝嫌毛柄不華因此欲加酖害太毉煮藥左右止之乃止又曰范曄謀逆被擊上有白團扇甚佳送􅁮令書詩賦美句􅁮受㫖授筆而書曰去白日之炤炤襲長夜之悠悠上循覽悽然齊書曰竟陵王子良孫賁字文奐形不滿六尺神識耿介幼好學有文才能書善畫於扇上圖山水咫尺之内便覺萬里為遥又曰劉祥字顯徴輕言肆行不避髙下建元中為正員郎司徒禇彦回入朝以腰扇障日祥從側過曰作如此舉止羞面見人扇障何益彦回曰寒士不遜祥曰不能殺袁劉安得免寒士又曰蕭子顯頗負才氣及掌選見九流賔客不與交言但舉扇一揮而已衣冠竊恨梁書曰臨川王宏子正表幼不慧常執白團扇湘東王取題八字銘玩之正表不知􅅓之終常揺握又曰栁惲早有令名少工篇什為詩云亭皋木葉下隴首秋雲飛瑯瑘王融見而嗟賞回書齋壁及所執白團扇南史張敖字景𦙍生而母亡年數嵗問之雖童䝉便有感慕之色至十嵗許求母遺物而散施已盡唯得一畫扇乃緘録之每至感思輒開笥流涕又曰羊欣字敬元㑹稽王世子元顯每使書扇常不奉命元顯怒乃以為後軍府舍人又曰何戢美容儀動止與禇彦回相慕時人呼為小禇公家業富盛性又華侈衣被服飾極為奢麗出為吴興太守頗好畫扇宋武賜戢蟬雀扇善畫者顧景秀所畫時吴郡陸探微顧寳元皆能畫歎其巧絶戢因王晏獻之後魏書曰爾朱弼字輔伯節閔帝時封河間郡公尋為青州刺史韓陵之敗欲奔梁數日與左右割扇為約弼帳下都督馮紹隆為弼信待説弼曰今方同􅆻濶冝當心瀝血示衆以為信弼從之大集部下弼乃踞胡床令紹隆持刀吱心紹隆因推刄殺之唐書曰中宗為皇太子太后以時熱令皇太子外朝用扇鄣日太子讓之詔不許太公六韜云將冬不衣裘將夏不操扇名禮將之也管子曰夏行五政三曰禁扇去笠淮南子曰失火而鑿池披裘而用扇不能救也又曰夫夏日不披裘非愛之也煖有餘於身也冬日不用箑者非簡之也清有餘也抱朴子曰風不輟則扇不用日不出則燭不息春秋繁露曰以龍致雨以扇逐暑崔豹古今注曰雉尾扇起于殷髙宗有雊雉之祥服章多用翟羽周制以為皇后夫人車服輦車有翣即緝雉羽為之以障翳風塵也漢朝乗輿服之後以賜梁孝王魏晉以來為常准諸王皆得用之又曰障扇長柄扇也漢世豪傑多為雉尾而制長扇也又曰五明扇舜所作也既受堯禪廣開視聽求賢人以自輔故作五明扇秦漢公卿大夫皆用之魏晉非乗輿不得用也東宫舊事曰皇太子初拜供漆要扇青竹扇各一太子納妃同心扇三十單竹扇二十修復山陵故事曰𤣥宫中用絹團扇六枚西京雜記曰朱買臣為㑹稽太守懐章綬還至金亭而國人未知也所知錢谷見其墨露乃勞之曰得無罪乎遺以紈扇買臣至郡引為上客又曰長安巧工丁緩作七輪扇連七輪大皆徑尺相連續一人運之則滿堂寒戰又曰趙飛燕為皇后其弟上遺雲母扇五明扇七華扇翟扇蟬翼扇又曰天子夏則設羽扇冬則設繒扇晉中興徴祥説曰舊為羽扇柄者刻木以象骨翮用十毛取全數也中興初王敦始改用長柄使其下出可捉而減其羽用八識者以為服妖也柄使可執者國柄之象毛減用八者是羽翮損少而飛羽不終之應也鄴中記曰石虎作雲母五明金箔莫難扇此一扇之名也薄打純金如蟬翼二面彩漆畫列仙竒鳥異獸其五明方中辟方三寸或五寸隨扇大小雲母帖其中細縷縫其際雖掩盡而彩色明徹看之如謂可取故名莫難也虎出時以此扇挾乘輿亦用象牙桃枝扇其上竹或緑沉色或木蘭色或作紫紺色或作鬱金色異物志曰扶南國昔但知作大扇遣人持之不知人各自用也及今熱時各自用也拾遺記曰周昭王時塗脩國獻青鳯丹鵲各一雌一雄夏至取鵲翅為扇一名遊飄一名條翮一名仄影時有南甌獻二美女更揺此扇侍于王側世説曰王大將軍在西朝時見周顗轉扇障面而得住後渡江左不能復爾王歎曰不知吾進伯仁退敦性強梁自少而長季倫斬妓曽無異色如斯傲狠憚于周顗則不然之言又曰温嶠娶姑女既婚交禮女以手披紗扇撫掌大笑我嫌是老奴果如所疑又曰羊孚作雪讚云資清以化乘氣以霏值象能鮮即潔成暉桓𤣥遂以書扇語林曰諸葛武侯與宣王在渭濵將戰武侯乘素輿葛巾白羽扇指麾三軍三軍皆隨其進止又曰胡母彦國至湘州坐㕔事斷官事爾時三伏中傍揺扇視事其兄子光從容顧謂曰彦國復何為自貽伊戚又曰庾翼為荆州都督以毛扇上成帝帝疑是故物侍中劉劭曰栢梁雲構匠者先居其下管絃繁奏䕫牙先聆其音翼之上扇以好不以新季恭聞之曰此人宜在帝左右俗説曰顧虎頭為人畫扇作稽阮而都不㸃眼睛主問之顧荅曰那可㸃睛㸃睛便語列仙傳曰介之推隨晉重耳去國后辭禄與母入介山從伯陽游後世見在東海王治賣扇搜神記曰魯少千山陽人漢文帝微服懷金欲問其道少千執象牙扇出應門續搜神記曰吴猛好道術嘗渡江以白羽扇畫水横流直過不用舟檝也異苑曰髙平檀茂宗義熈中喪亡其母劉氏夣見宗云方永違離今以此扇奉别母流涕覺於屏風間得扇上皆如蜘蛛網絡婦人集曰没太子妻李氏為夫所遣婦與夫書并致安衆扇兩雙古詩曰綾扇如團月出自機中素畫作秦女形乘鸞入煙露班婕妤扇詩曰新裂齊紈素鮮潔如霜雪裁為合歡扇團團似明月出入君懷䄂動揺微風發魏陳王曹植九華扇賦曰昔吾先君常侍得幸漢桓帝帝特賜尚方竹扇不方不員其中結成文名曰九華其辭曰形五離而九折篾氂解而縷分效虬龍之蜿蜒法雲霓之烟煴因形致好不常厥儀方不應矩圓不中規隨皓腕以徐轉發惠風之微寒時氣清以芳厲紛飄動乎綺紈徐幹團扇賦曰惟合歡之奇扇肇伊洛之纎素仰明月以取象規圓體之儀度傅咸狗脊扇賦曰葢卑以自居君子之經孤寡不榖王侯脩名尚不媿狗脊之為號亦焉顧九華之妙形葢釋名曰盖在上覆葢人也通俗文曰張帛避雨謂之繖葢禮檀弓下曰弊葢不棄為埋狗也左傳定曰齊侯伐晉夷儀敝無存死于霤下鬭死於門霤下齊侯謂夷儀人曰得敝無存者以五家免乃得其尸公三禭之與之犀軒直葢家語曰孔子將行命從者持葢既而果雨又曰孔子將行雨無葢門人曰商也有焉孔子曰商也之為人也甚短于財吾聞與人交者推其長者違其短者故能以久也史記曰五羖大夫相秦也有勞不坐乘暑不張葢漢書曰上官傑少時為羽林郎從武帝上甘泉天大風車不得行解葢投之傑奉葢雖風常屬車雨下葢輒御上竒其材力焉又曰黄霸為揚州刺史三年宣帝詔賜車葢持髙一尺以彰有德又王莽傳曰或言黄帝時見華葢登仙莽乃造華葢髙八丈一尺皆金瑵羽葢載以秘機四輪車駕六馬輓者皆呼登仙續漢書曰靈帝時講武平樂觀建十重五彩華葢髙十丈建九重華葢髙九丈又曰祠老子於濯龍中設華葢八座東觀漢記曰隗囂破上歸過汧幸登祭遵勞之時遵有疾詔賜重茵覆以御葢後漢書曰光武東巡虞延從駕到魯還經封丘城門門下小不容羽葢帝怒使撻御史延救之乃止吳志曰曹休入皖城陸遜破之權令左右以御葢覆遜又曰周泰字幼平數戰有功孫權覆以御葢又曰劉基孫權愛敬之嘗從御樓船上時雨甚權以葢自覆又令覆基餘人不得也又曰賀齊為將騎飾所乘船青葢綘幨晉安帝記曰桓𤣥遊于水南飄風飛其輗葢後義兵起遂敗宋元嘉十年起居注曰御史中丞荀伯子奏左衛將軍何尚之公事每罩笠有虧體制建野笠于公門弃華繖而不得御宋元嘉二十九年起居注曰訶羅單國奉孔雀葢一齊書曰始安王遥光𫝊江祏被誅東昏召遥光入殿告以祏罪遥光懼還省便佯狂號哭自此稱疾不復入臺先是遥光行還入風飄儀􅓫出城外遥光后敗梁書曰王籍為中散大夫彌日忽忽不樂乃至徒行市道不擇交遊有時途中見相識輒以笠傘覆面南史曰殷孝祖與賊合戰每常以皷葢自隨軍中人相謂曰殷統軍可謂死將至矣今與賊交鋒而以羽儀自標顯若此射者十手攅射欲不斃得乎是日中流矢死又曰扶南其俗罩古具繖文子曰大丈夫恬然無思淡然無慮以天為葢以地為輿又宋玉大言賦曰圓天為葢方地為輿淮南子曰葢非撩不能蔽日輪非輻不能追疾然而撩葢未足恃也撩葢骨也孔叢子曰夫子適郯郯子遇子於途傾葢而語終日而别命子路將束帛贈焉尉繚子曰吳起與秦人戰僕𠻳之葢足以蔽霜露說苑曰田子方遇瞿横乘軒車戴華葢疑以為人君也崔豹古今注曰華葢黄帝所作也與蚩尤戰于涿鹿之埜常有五色雲氣金枝玉葉止於帝上有花蘤之象故因而作華葢又曰典葢太公所作武王伐紂大風折葢太公因折葢之形而制曲葢焉戰國常以賜將帥自漢朝乘輿用之因謂睥睨葢有軍號者賜其一也搜神記曰湖坡吏丁初忽見少婦人姿容可愛白衣戴傘呼初初疑而待顧是婦自投波中是大蒼獺衣傘皆是蓮荷異苑曰義熈中烏傷小吏見女子戴青繖姿容甚麗遂要之女至多電光乃是大狸抽刀斫殺其繖乃枯荷葉真人周君傳曰紫陽真人周義山子通合㑹仙人在金屋銅門之内以紫雲為葢真人王君傳曰太上大道君授務成君綉羽葢雙明珠俗説曰徐于木年少時嘗夜夣見鳥從天上飛銜繖樹其廷中如此凢三過銜來作惡聲而去徐後果得繖遂以惡終青鳥子葬書曰作墓發土夕夣見罩繖入市者富貴楚辭曰孔葢兮翠旍言以孔雀翅為軍葢翠羽為旍具也登九天兮撫慧星又曰乘水車兮荷葢駕雨龍兮驂螭宋玉髙唐賦曰蜺為旍翠為葢風起雨霽千里而逝司馬相如大人賦曰屯余車其萬乘兮綷雲雨而樹華旗綷字對切阮籍清思賦曰折丹木以蔽陽竦芝葢之三重劉植魯都賦曰葢如飛鵠馬如遊魚太平御覽卷七百二
