  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_842-1a, image: WYG0900/WYG0900-0442c.png}
body:
  text: 太平御覽巻八百四十二宋李昉等撰百榖部六黍稔粱東薔黍尚書君陳曰我聞曰至治馨香感於神明黍稷非馨明徳惟馨又盤庚曰若農不服田畆罔有黍稷尚書大𫝊曰夏昏火中可以黍稷毛詩曰黍離閔宗周曰彼黍離離彼稷之苖行邁靡靡中心揺揺韓詩曰黍離百邦作也薛書注曰詩人求巳兄不得憂不識物視彼黍乃以為稷又甫田曰今適南畆或耘或耔黍稷薿薿薿盛貎又魚藻黍苖曰芄芄黍苖隂雨膏之儀禮昏禮曰賛設黍于醬東又饋食禮曰侑食摶黍稷授祝祝以授尸禮記月令曰仲夏之月農乃登黍又曲禮曰黍曰薌合又内則曰羊冝黍豕宜稷左𫝊昭公曰其蔵氷也黑牡秬黍以享司寒杜預注曰黑牡秬黍也司寒北方𤣥㝠之神也萬物皆牡黑司事於外故祭其神以上黍春秋佐助期曰黍神名侜佞蘭郝春秋説題辭曰精移火轉生黍夏出秋改杜預注曰天春之夏故移也農書曰黍之言暑也必須暑改得隂乃成也黍者縮也故其立字禾入米為黍酒以扶老幼為酒以序尊卑且禾為黍協序宜養老也爾雅曰秬黑黍秠一稃二米郭璞注曰秬亦黑黍但中米異耳漢和帝時任城生黑黍或三四實實二米得黍三斛八斗是史記封禪書曰管仲諫桓公曰古者封禪鄗上黍所以為盛應劭注曰鄗上山也音曜漢書曰冀州民五男三女畜宜牛羊榖宜黍稷後漢書曰陳宫遭天下䘮亂遂将諸生避地漢中後與妻子之蒙隂山肆力耕種禾黍比熟人有認之者宫不與計推之而去由是顯名晉書曰劉聰時河東大蝗惟不食黍豆靳准率部人收而埋之哭聲聞於十餘里後乃鑚土飛出復食黍豆頻年飢甚崔鴻十六國春秋前秦録曰苻堅宴羣臣於釣臺秘書侍郎趙整以堅頗好酒因為酒徳之歌曰登黍西秦採麥東齊春封夏發鼻納心迷隋書曰李士謙隠居有牛踐其田者士謙牽至深處飼之過於本庄望見盗刈其禾黍者趨而避之其家僮嘗執盗粟者士謙慰諭之曰窮困所致義無相害遂令放之又曰李士謙自以少孤未嘗飲酒食肉口無殺害之言至於親賔来萃輙陳爼豆對之危坐終日不倦李氏宗黨豪盛每至春秋二社必髙會極歡無不沉醉諠亂嘗集士謙所盛饌盈而先為設黍謂羣従曰孔子稱黍為五榖之長荀卿亦云食先黍稷古人所尚容可違乎少長肅然不敢弛惰退而相謂曰既見君子方覺吾徒之不徳也士謙聞而自責曰何乃為人所踈頓至於此唐書曰徳宗以中和節令文武百官進農書獻穜稑種是日百寮始進兆人本業三卷司農獻粟及黍各一斗韓子曰韓昭侯之時黍種嘗貴甚昭侯令人覆廩吏果竊黍種糶之山海經曰廣都之野后稷塟焉爰有膏黍膏稷又曰魚山有人一目是少昊子孫食黍韓子曰吳起攻秦小亭倚一車轅北門外令曰能徙此於南門外者賜上田上宅及有徙者賜如令俄又置一石赤黍東門外令曰能徙此於西門外者賜如初民爭徙之乃下令曰攻亭能登者仕之大夫賜之上田上宅於是攻之一朝而㧞淮南子曰冬三月天子衣黑衣乗𤣥駱𤣥駱黑馬白鬛食黍與彘又曰三代積徳而王齊桓繼絶而霸故樹黍者無不穫稷樹恩者無不報徳又曰渭水多力而宜黍淮南畢萬術曰取門冬赤黍漬以狐血隂乾之欲飲酒取一丸置舌下酒吞之令人不醉門冬赤黍薏苡為丸令婦人不妬白虎通曰清明風至則黍稷滋閶闔風至則種宿麥黍抱朴子曰張子和丹法用鉛朱砂與清水合封之蒸之於赤黍米中也紀年書曰恵成王八年雨粟國語曰子餘使公子賦黍苖子餘曰重耳之仰君也若黍苖之仰隂雨也若君實庇䕃膏澤之使能成嘉榖薦在宗廟君之力也在宗廟為祭主家語曰孔子侍坐於哀公賜之桃與黍焉哀公請用之孔子先食黍而後桃其左右皆掩口而笑之公曰黍者所以雪桃非為食也孔子對曰丘知之矣然黍者五榖之長郊社宗廟以為上盛果屬有六而桃為下祭祀不用不登郊廟丘聞之君子以賤雪貴不聞以貴雪賤也今以五榖之長雪果蓏之下者從上雪下也臣以為妨於教害於義故不敢公曰善吕氏春秋曰得時之黍芒莖而徼下穂芒以長摶米而薄糠舂之易而食之不噮比縣切而香如此者不餲先時者大本而華莖殺而不遂遂長葉髙短穂後時者小莖而麻長短穂而厚糠小米令而不香令新也又曰今以百金與摶黍以示兒子兒子必取摶黍也以和氏之璧與百金以示鄙人鄙人必取百金矣又曰飯之美者南海之秬楊泉物理論曰粱者黍稷之緫名崔寔四民月令曰四月可種黍謂之上時汜勝之書曰黍者暑也種必待暑先夏至二十日此時有雨强土可種黍畆三升黍心未生雨灌其心心傷無實凡種黍皆如禾欲䟽於禾穪衡别𫝊曰十月朝黄祖在艨衝舟上㑹設黍臛衡年少在坐黍臛至久自飽食畢摶以弄􅃧其輕慢如此劉向别録曰言鄒衍在燕有谷地美而寒不生五榖鄒子居之吹律而温至生黍到今名黍谷焉列女後𫝊曰東平衡農師太尉薨農欲奔赴無糧自致妻願従行行止紡績庶以自資行至聚亭遇天霖雨留獨母舍母舍後有空園農曰此園可以種黍従求分種之獨母曰此久廢園唯恐生劣收不多耳何分之有乎農遂與妻斬荆棘種之黍將熟獨母改更曰黍當分農欲委去妻曰不如収歛以示之安其事然後乃去農遂従之後還獨母以昔黍歸農遂不取説文曰秬黑黍也一稃二米所以醸鬯也黍禾屬黏者以大暑而種故謂之黍孔子曰可以為酒廣雅曰粢黍也黍穰謂之䅀崔豹古今注曰宣帝元康四年長安雨黑黍粟如禾和帝元興元年黑黍穂一禾二實或三四實生任城得粟三斛八斗以薦宗廟廣志曰有牛黍有稻尾秀成赤黍有馬革大黑黍或云􅀈黍有温毛黄黍有嫗亡鷰頷之名呉氏本草曰黍神農甘無毒七月取隂陽益中補氣京房易妖占曰天雨黍粟大人出走荆楚歳時記曰十月十一日黍臛俗謂之秦歳首未詳黍臛之義今北人此日設麻羮豆飯當為其始熟甞新耳博物志曰地節三年種蜀黍其後七年多虵稔范􅁮後漢書曰烏丸國其地宜稔穆天子𫝊曰天子至赤烏赤烏獻稔麥百載廣志曰有赤稔有白黑青黄燕頷凡五種吕氏春秋曰飯之美者有陽山之稔説文曰稔糜也崔豹古今注曰糜稔也粱禮記曲禮曰祭宗廟之禮粱曰薌萁又郊特牲曰飯黍稷稻粱白黍黄粱爾雅曰虋赤苖芑白苖郭璞注曰虋赤粱粟芑白粱粟皆好穀也揵為舍人曰别名赤白苖也又曰是伯夷所食首陽山草也廣雅曰藋粱木稷也續漢志曰桓帝之初京都童謡曰城上烏尾畢逋公為吏子為徒一徒死百乗車車班班入河間河間姹女工數錢以錢為室金為堂石上慊慊舂黄粱下有懸鼔我欲擊之丞相怒城上烏者處髙獨食不與下共謂人主多聚歛也公為吏子為徒者言蠻夷叛逆父既為軍吏子弟又為卒徒往擊之也一徒死百乗車者言前一人徃討既死矣後又遣百乗車往也車班班者言乗輿班班入河間迎靈帝也姹女數錢言帝既立其母永樂太后好聚金錢以為堂室也石上慊慊者言太后雖積金錢猶慊慊常若不足使人舂黄粱而食之也我欲擊之者言太后教常侍賣官受錢天下忠䔍之士怨望欲擊鼔求見丞相懸鼓者復怒而止我也唐書曰涼州都督計欽明嘗出按部有吐蕃數萬奄至城下欽明拒戰久之力屈被執将欽明至靈州城下欽明大呼曰賊中都無欽城内有美醬乞二升粱米乞二升墨乞一錠是時賊營四靣阻泥河惟有一路得入欽明詐乞此物以喻城中兾有簡兵練將候夜掩襲城中無悟其㫖者尋遇害淮南子曰不能耕而欲黍粱不能織而意衣裳無事而求其功難矣又曰珎怪竒味人之所美也而堯糲粱之飯藜藿之食糲粗也文繡狐白人所好也而堯布衣掩形鹿裘禦寒國語曰欒伯為公族大夫公曰夫膏粱之性惟正呂氏春秋曰吳起為鄴令民歌之曰終古斥鹵生稻粱楊泉物理論曰粱者黍稷之緫名也神仙𫝊曰吳大帝時有一人種粱在山中患猿猴食之聞介象有道聊従乞辟猿猴法象吿之無他法也汝明日往粱所望見羣猴方往時便大喚語之曰已白介君使猿猴莫復来食粱此人倉卒間謂象欺弄之明日視粱遇羣猴適欲下樹試承象語語猴即各還山去遂便絶跡廣志曰有具粱解粱􅈙東赤粱魏武帝以為粥本草曰白粱味甘微寒無毒主除熱益氣有襄陽竹根者最佳黄粱出青冀楚辭招魂曰稻粱穱麥拏黄粱傅休弈雉賦曰飲以華泉之水食以𤣥山之粱東薔左思魏都賦曰東薔之粱魏書曰烏丸地宜東薔廣志曰東薔色青黑粒如葵子幽粱并皆有之西河語曰貸我東薔償我田粱上林賦曰東薔彫胡太平御覽巻八百四十二
