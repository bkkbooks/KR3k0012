  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_903-1a, image: WYG0901/WYG0901-0067a.png}
body:
  text: 太平御覽卷九百三宋李昉等撰獸部十五豕爾雅曰豕子豬江東呼爲豨䝐豶䝐羊箠切俗呼小豶猪為䝐子也么幼最後生者俗呼為么豚奏者豱音温今豱皆短頭皮理腠蹙也豕生三豵音宗二師一特所寢􅀈疾陵切四蹢皆白􅘻音該其跡刻絶有力􅙊音厄牝豝彘五尺為豝大豕為􅙊説文曰豰許卜切小㹠也膎肫生三月也豵子公切豘生六月也或曰一歲曰豵豝牝豕豶􅭘也豣公切妍三歲豕豭牡豕也䝐豶也豛音役俗名豬曰豛豷於麗切豕息也豢以穀圈養豕也何承天纂文曰梁州以豕為豬之切於河南謂之彘吳楚謂之豨火豈切漁陽以大猪為􅙊齊徐以小猪為䝒仕圭切􅀈音覓白豕黑頭也豱豕奏毛也方言曰豬燕朝鮮之間謂之豭關東西謂之彘或謂之豕南楚謂之豨其子謂之豚或謂之豯音奚吳揚之間謂之豬子春秋説題辭曰斗星時散精為彘四月生應天理崔豹古今注曰猪一名長喙參軍易説卦曰坎為豕又睽卦曰上九聧孤見豕負塗載鬼一車又大畜曰六五豶豕之牙吉又姤卦初六繫于金柅貞吉有攸往見㓙羸豕孚蹢躅禮記曲禮下曰凡祭豕曰剛鬛豚曰腯肥又曰士無故不殺犬豕又月令曰孟夏農乃登麥天子乃以彘嘗麥又王制曰秋薦黍豚又禮器曰晏平仲祭其先人豚肩不掩豆又内則曰豕望視而交睫腥望視逺視也腥作星肉如米者論語曰陽貨欲見孔子孔子不見饋孔子豚詩國風騶虞曰彼茁者葭一發五豝豕牝曰豝又曰彼茁者蓬一發五豵一歳曰豵箋云豕三歳曰豵又魚藻漸漸之石曰有豕白蹢烝渉波矣左傳莊八年曰齊無知弑其君十二月齊侯㳺扵姑棼遂田于貝丘見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼墜于車傷足䘮屨反誅屨於徒人費弗得鞭之見血走出遇賊于門刦而束之費曰我奚御哉袒示之背信費請先入伏公而出閗死于門中石之紛如死于階下遂入殺孟陽於床曰非君也不類見公之足于户下遂殺之而立無知又昭七年曰昔有仍氏生女樂正居䕫取之生伯封寔有豕心貪婪無饜謂之封豕又曰衛靈公夫人南子與宋朝通衛太子使齊過宋宋野人以婁猪刺而歌之云既定爾婁猪盍歸吾􅀈猳史記曰子路性鄙好勇伉直冠雄鷄佩猳豚漢書曰公孫𢎞菑川人少時為獄吏有罪免家貧牧豕海上又曰郅都景帝時為郎嘗從遊上林賈姫在厠野彘入厠上目都都不行上乃欲自持兵救賈姫都諫之乃止彘亦不傷賈姫又曰燕刺王旦將作亂厠中羣豕出壞太子竈東觀漢記曰承宫字少子琅琊人少孤年八歲人令牧豕鄉里徐子盛明春秋經授諸生數百人宫過其廬下見諸生講誦好之因棄猪而聽經猪主怪不返行索見宫欲笞門下生共禁止因留精舎門下拾薪執苦數十年間遂通經又曰朱浮與彭寵書責之曰伯通自伐以功為髙天下徃時遼東有豕生子白頭異而獻之行至河東見羣豕皆白懷慙而還若以子功論於朝廷則為遼東豕也續漢書曰曹萌字元偉以仁厚稱鄰人有亡豕者與萌豕相類詣門認之萌不與爭後所亡豕自還其主大慙送所認豕辭謝萌萌笑而受之袁山漢紀曰吳祐放猪於垣澤中誦經而行遇父故人謂之曰子二千石子掉鞭而誦經行吟於澤畔縱子旡恥奈君父何祐守志如初與北海公沙穆逰太學資乏變服為傭祐賃使舂遂為死交於杵臼之間張璠漢紀曰莎車王殺于闐王于闐大都末岀城見野豕欲射之豕乃語曰旡殺我我為汝殺莎車將軍都末異之即與兄弟共殺莎車王謝承後漢書曰朱穆字文元嘗養猪有病使人賣之於市語之曰如售當自告買者言病也賣猪者售不言病且直過多穆怪其故齎半直以還買猪者辭不敢穆棄錢而自去魏志曰挹妻國在扶餘東北常穴居土氣寒於扶餘其俗好養猪食其肉衣其皮冬以猪膏塗身又曰管輅嘗至郭恩家碓上雞閗謂恩曰當有老人將豚一口從東候公舎有小口傷亦旡所苦明日果有親知老翁携肫饋恩恩射雞為饌迸箭着小女子脚舉家惶怖竟無所害又有人失婦使輅卜之輅曰君明日於路覔擔猪者乃逐之行次猪忽䋲斷走入他舎突破主人甕見其婦出看猪遂擒之晉書曰阮咸至宗人間共集不用杯觴斟酌以大甕盛酒圓坐相向大酌更飲時有羣豕来飲其酒咸直接去其上便共飲之又曰愍懷太子嘗從帝觀豕牢言扵帝曰豕甚肥何不殺以享士而使久費五榖帝嘉其言即使享之因撫其背謂廷尉傅祗曰此兒當興我家又曰韓友字景先廬江舒人也龍舒長鄧林父病疾積年垂死友為筮使畫作野猪着卧處屛風上因是遂差又曰吕光死其子纂立有猪生子一身三頭又有龍出井中蟠於殿前纂以為美瑞羅計獨以為災俄而吕超殺纂又曰劉聰時豕着進賢冠升聰殿與人闘北史曰陸逞除京兆尹都界有豕生數子經旬而死其家又有豶豕遂乳養之諸豚頼之以活時以逞仁政所致也皇甫謐髙士傳曰孫期字仲彧濟隂人少為諸生治京氏易古文尚書家貧事母至孝牧豕于大澤中以奉養焉逺人従其學者皆執經壠畔以追之里落化其仁讓黄巾賊起過其里陌相約不得犯孫先生舎郡舉方正遣吏賫羊酒請期期驅豕入草不顧也三輔決録曰五門子孫凡民之位馬氏兄弟五人共居北地作客舎養猪賣豚故民間謂曰苑中三公鉅下二􅀸五門嚄嚄但聞豚聲董正别傳曰司馬徽字徳操時人呼為水鏡嘗有人妄認徽猪徽便推與之後數日亡猪者得其猪既以猪還徽乃叩頭自責徽又厚謝之華陽國志曰何隨字季業清㢘退讓嘗有屠者牽猪過隨門索斷失之强認隨溷中猪隨牽與之屠人尋自得亡者還隨隨以與之越絶書曰雞山豕山者勾踐以畜雞豚將伐吴以食死士也墨子曰孔子窮於陳蔡之間藜藿不糂乗感切子路烹豚孔子不問肉所從來而食之符子曰朔人獻燕昭王以大豕曰養奚若使曰豕也非大圊不居非人便不珍今年百二十矣人謂豕仙王乃命豕宰養之十五年大如沙墳足如不勝其體王異之令衡官橋而量之折橋豕不量又命水官舟而量之其重千鈞其巨無用燕相謂王曰奚不饗之王乃命宰夫膳之夕見夢於燕相曰造化勞我以豕形食我以人穢吾患其生久矣仗君之靈得化吾生始得為魯津之伯燕相㳺乎魯津有赤龜奉璧而獻一云夜光珠孝經援神契曰彘水伏故去喙淮南子曰六九五十四四主時時主彘彘故四月而生又曰黄帝理天下狗彘吐菽粟於路無忿爭之人山海經曰􅀈豬大者肉重千斤豪猪如豕而白毛毛大如笄而黒端郭璞注曰豬也夾脾有麄毫長數尺能以頸上毫射物博物志曰商丘子有養猪法卜式有養猪羊法祖台之志怪曰吳中有一士夫於都假還至曲阿塘上見一女子甚美留其宿士解臂上金鈴繫女臂令暮更來遂不至使人求都無此女過猪圏見一母猪臂上繫金鈴養生要集曰白豕白蹄青爪不可食也異物志曰鬰林大猪一蹄有四五甲多膏買者以鉄錐刺其頭入七八寸得赤肉乃動習鑿齒襄陽耆舊傳曰木蘭橋者今之猪欄橋是也山海經圖曰豪彘讚曰剛鬛之族號曰豪狶毛如攢錐中有激矢宋袁淑大蘭王九錫文曰癸亥十年九月乙亥朔十三日丁亥北燕伯使使者豪豬􅁽命大蘭王曰咨惟君稟太隂之沉精標羣形於元質體肥腯而洪茂長無心以㳺逸資豢養於人主雖無爵而有秩此君之純也君昔封國殷商號曰豕氏業隆當時名垂於世此君之美也白蹢彰於周詩渉波應乎龍象歌詠垂於人口經千載而流馨此君之徳也君相與野遊惟君為雄顧羣數百自西徂東俯歕沫則成霧仰奮鬛則生風猛毒必噬有敵必攻長驅直突陣無全鋒此君之勇也太平御覽卷九百三
