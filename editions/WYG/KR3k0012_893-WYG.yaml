body:
  text: 太平御覽卷八百九十三宋李昉等撰獸部五馬一説文曰馬怒也武也馬一嵗曰􅑓二嵗曰駒三嵗曰駣八嵗曰􅦩高六尺曰驕七尺曰騋八尺曰龍騊駼北野之良馬也驁駿馬也以壬申日死乗馬者忌之爾雅曰騊駼馬野馬北海内有獸狀如馬名騊駼青色騊駼一名野馬騉蹄趼善升甗甗山形似甑上大下小時有昆蹄之馬蹄平如趼善升甗甗山隒也趼音吟燕切甗音魚建切騉駼枝蹄趼善升甗小領盜驪盜驪千里馬也領頸也昆駼之馬枝蹄如牛而下平絶有力駥膝上皆白􅑓四骹皆白驓四蹢皆白首俗呼為踏雪馬蹢蹄也前足皆白騱後足皆白翑前右足白啓左白踦後右足白驤左白􅑓駵馬白腹騵驪馬白跨驈驪黒色跨髀間白州驠尾本白騴尾白駺馰顙白顛白達素懸素鼻莖也俗所謂漫髗徹齒􅆕顙皆白惟駹回毛在膺宜乗樊光曰俗謂之官府馬伯樂相馬法旋毛在腹下如乳者千里馬也在肘後減陽在幹茀方在背闋廣皆别旋毛所在之名逆毛居馻騋牝驪牡𤣥駒褭驂𤣥駒小馬别名褭驂耳或曰此即腰褭古之良馬名牡曰騭牝曰騇駵白駁黄白騜駵馬黄脊騝驪馬黄脊騽青驪驎驒色有淺深斑駁隱驎今連錢驄也青驪繁鬛騥驪白雜毛駂黄白雜毛駓隂白雜毛駰隂淺黒今之泥驄也蒼白雜毛騅彤白雜毛騢白馬黑鬛駱白馬黑脣駩黑喙騧一目白瞷二目白魚既差我馬差擇也宗廟齊亳戎事齊力田獵齊足又坤卦彖曰牝馬地類行地无疆又説卦曰震其於馬也為善鳴為􅑓足為作足為的顙又曰乾為良馬為老馬為瘠馬為駁馬又屯卦曰六四乗馬般如匪冦婚媾徃吉无不利又下繫曰服牛乗馬引重致逺以利天下蓋取諸隨又曰坤元亨利牝馬之貞王弼文言注曰以龍叙乾以馬明坤隨事義而取象也禮記曰月令孟春之月天子駕蒼龍孟夏之月天子駕赤駵孟秋之月天子駕白駱孟冬之月天子駕鐵驪又學記曰始駕馬者反之車在馬前又内則曰馬黑脊而般臂漏又曰大夫士下公門式路馬乗路馬必朝服歩路馬必中道蹙路馬芻有誅路馬死埋之以帷詩國風卷耳曰陟彼崔嵬我馬虺隤又曰陟彼高岡我馬𤣥黄又魯頌曰䮐頌僖公也僖公能遵伯禽之法牧于坰野而史克作頌駉駉牡馬在坰之野薄言駉者有驈有皇有驪有黄以車彭彭駉駉牡馬在坰之野薄言駉者有騅有駓有騂有騏以車伾伾駉駉牡馬在坰之野薄言駉者有驒有駱有駵有騅以車繹繹駉駉牡馬在坰之野薄言駉者有駰有騢有驔有魚以車袪袪又曰叔于田乗乗馬執轡如組兩驂如舞叔于田乘乗黄兩服上襄兩驂鴈行又曰皎皎白駒食我場藿縶之維之以永今夕皎皎白駒在彼空谷生芻一束其人如玉左傳僖十五年曰秦晉戰于韓晉惠公乗小駟鄭入也慶鄭曰古者大事必乗其産生其水土而知其人心安其教訓而服習其道惟所納之無不如志今乗異産以従戎事及懼而變將與人易亂氣狡憤隂血周作張脈僨興外彊中乾進退不可周旋不能君必悔之弗聼及戰公戎馬旋濘而止公號慶鄭鄭曰愎諫達卜固敗是求又曰晉侯伐齊齊師夜遁邢伯吿中行伯曰有班馬之聲齊師其遁又昭四年傳曰楚使椒舉如晉求諸侯晉侯欲勿許司馬侯曰不可公曰晉有三不殆其何敵之有國險而多馬齊楚多難有是三者何鄉而不濟對曰恃險與馬而虞隣國之難是三殆也四嶽三塗陽城太室荆山中南九州之險也是不一姓冀之北土馬之所生無興國焉恃險與馬不可以為固也又宣傳曰宋人以文馬百駟以贖華元于鄭半入華元逃歸又昭二十九年曰衛侯來獻其乗馬曰啓服塹而死公將為之櫝子家子曰從者病矣請以食之乃以帷裹之又定三年曰唐成公如楚有兩肅爽馬子常欲之弗與三年止之唐人或相與謀請代先従者許之飲先従者酒醉之竊而獻之子常子常歸唐侯自拘扵司敗曰君以弄馬之故隱君身棄國家羣臣請相夫人以償馬必如之唐侯曰寡人之過也二三子無辱皆賞之又定傳曰衞公子地有白馬四公嬖向魋向魋欲之公取而朱其尾鬛以與之地怒使其徒抶魋而奪之魋懼將走公閉門而泣之目盡腫糓梁傳僖公曰晉獻公將伐虢荀息請以屈産之乗垂棘之璧假道於虞公曰此晉寶也荀息曰是取中府藏外府取中廐藏外廐也晉舉虞荀息牽馬操璧而前曰璧猶是也馬齒長矣周禮夏官下曰校人掌王馬之政辨六馬之屬種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物天子十有二閑馬六種邦國六閑馬四種家四閑馬二種凡馬特居四之一春祭馬祖執駒夏祭先牧頒馬攻特秋祭馬社臧僕冬祭馬步獻馬講馭夫凡大祭祀朝覲㑹同毛馬而頒之餙幣馬執扑而従之凡賓客受其幣馬大喪飾遣車之馬及𦵏埋之田獵則帥驅逆之車凡將事扵四海山川則餙黄駒凡國之使者共其弊馬凡軍事物馬而頒之又夏官下曰趣馬掌贊正良馬而齊其飲食簡其六節掌駕説之頒辨四時之居治以聼馭夫巫馬掌養疾馬而乗治之相醫而藥攻馬疾受財于校人馬死則使其賈粥之入其布于校人又曰庾人掌十有二閑之政教以阜馬佚特教駣攻駒及祭馬祖祭閑之先牧及執駒散馬耳圉馬正校人員選馬八尺以上為龍七尺以上為騋六尺以上為馬又曰圉師掌教圉人養馬春除蓐釁廐始牧夏庌馬冬獻馬射則充椹質茨牆則剪闔圉人掌養馬芻牧之事以役圉師凡賓客喪紀牽馬而入陳廞馬亦如之又夏官上曰馬質掌質馬馬量三物一曰戎馬二曰田馬三曰駑馬皆有物賈凡受馬扵有司者書其齒毛與其賈馬死則旬之内更旬之外入馬耳以其物更其外否孝經援神契曰德至山陵則澤出神馬龍魚河圖曰白馬𤣥頭食之殺人下病食馬肉亦殺人無以賣馬錢娶婦洞林曰殷鴻業來作卦身在申本命酉乗馬南行西北走逕趨木家化為狗賴子救之不成咎鴻業丁酉生後八月中有急事借馬南出行數里馬欻驚更西北走向戍地入李家遂落地馬因齧之主人出救得免不見傷也尚書中候曰尭沈璧於河龍馬衘甲赤文緑色臨壇吐圖方言曰飲馬槖闗西曰裺嚢或曰裺篼或曰㡞篼廣雅曰飛兔飛鴻野麋騀鹿騶吾走狐驒騱金喙馬屬也字林曰驫衆馬走也􅕁馬卧土中也䩥馬帶也鞚馬勒也太平御覽卷八百九十三
