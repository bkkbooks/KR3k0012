body:
  text: 太平御覧卷六百九十二宋李昉等撰服章部九佩環玞笏佩説文曰佩大冠帶佩也必有巾故從巾釋名曰佩倍也言其非一物有倍貳也有珠有玉有容刀有帨巾有􅀈之属也詩曰青青子佩悠悠我思佩玉也又曰有女同車顔如舜華將翺將翔佩玉瓊琚又曰知子之來之雜佩以贈之雜佩者珩璜琚瑀衡牙之類知子之順之雜佩以問之問遺也知子之好之雜佩以報之又曰彼留之子貽我佩玖又曰我送舅氏悠悠我思何以贈之瓊瑰玉佩又曰巧笑之瑳佩玉之儺又曰鞙鞙珮璲不以其長鞙鞙玉貌璲瑞也以瑞玉為偑珮之鞙然周禮曰王府掌王之金玉玩好共王之服玉佩玉禮曰主佩倚則臣佩垂主佩垂則臣佩委又曰石駘仲卒無適子有庻子六人卜所以為後者曰沐浴佩玉則兆五人者皆沐浴佩玉石祁子曰孰有執親之䘮而沐浴佩玉者乎不沐浴佩玉石祁子兆又曰古之君子必佩玉左徵角右宫羽趨以采齊路門之外樂莭也行以肆夏登堂之樂莭也周旋中䂓折旋中矩進則揖之退則揚之然後玉鏘鳴也故君子在車則聞鸞和之聲行則鳴佩玉是以非辟之心無自而入也君在不佩玉左結佩右設佩朝於君亦結左齊則綪結佩而爵韠凡帶必有佩玉唯䘮否佩三有衡牙居中央以前後觸君子無故玉不去身君子於玉比德焉天子佩白玉而𤣥組綬公佩山𤣥玉而朱組綬大夫佩水蒼玉而純組綬世子佩瑜玉而綦組綬士佩瓀玫而緼組綬孔子佩象環五寸而綦組綬大戴禮曰上車以和鸞為莭下車以佩玉為度左傳曰蔡昭侯為兩佩與裘以如楚獻一佩一裘於昭王服之以享蔡侯亦服其一子常欲之弗與三年止之事具玉部又曰吳申叔儀乞粮於公孫有山氏申叔儀吳大夫公孫有山魯大夫舊相識曰佩玉蘂兮余無繫之蘂言服飾偹也無以繫佩言吳王不恤下也魚豢魏略曰有雙璜珩琚􅀈牙琨珠為佩者乃漢明帝采古文始制也晉書曰祥著遺令子孫云吾氣絶不須沐浴勿纒尸皆潮澣故衣隨時所服所賜山𤣥佩衛氏玉玦綬笥皆勿以歛齊書曰永明元年有司奏貴妃並加金章紫綬淑妃佩于寘玉隋書曰何稠恭㑹今古多所改創從省之服初無佩綬稠曰此乃晦朔小朝之服安有人臣謁帝而除去印綬兼無佩玉之莭乎乃加獸頭小綬及佩一隻國語曰秦穆公使公子縶弔公子夷吾子梁退而私於縶曰請以黄金三十鎰白玉之珩六雙不敢當公子納之左右又曰王孫圉聘於晉定公饗之趙簡子鳴玉以相鳴佩玉以相禮問於王孫圉楚之白珩猶在乎珩玉佩之璜者對曰然簡子曰其為寳也㡬何矣曰未嘗為寳先王之玩也周書曰武王俘商得舊寳玉萬四千佩玉億有八萬石摯虞决疑要注曰漢末䘮亂絶無玉佩魏侍中王粲識舊佩始復作之今玉佩受法於粲三禮圖曰凡玉佩上有雙衡長五寸慱一寸下有雙璜徑三寸衡牙蠙珠以約其間上下為衡半璧為璜璜中横以衝牙以蒼珠為瑀董巴漢輿服志曰古者君臣佩玉三代同之五覇興兵佩以戰器去佩留其係璲以為章表秦乃以采組連結謂之綬漢承秦制用而弗改至孝明皇帝乃為大佩衡牙雙渠璜皆以白玉乘輿給以白珠公卿諸貴以采絲其玉視冕旒蔡邕輿服志曰孝明帝作蠙珠之佩以郊天地白虎通曰所以必有佩者表意見所能故修道無窮即佩環能大道德即佩琨能决嫌疑即佩玦是以即其所佩知其所能若農夫佩其耒耜工匠佩其斧斤婦人佩其針縷也孔藂子曰子産死鄭人大夫舍玦婦人舍珠玉説􅁐曰㐮成君始封之日衣翠衣帶玉佩至流水之上大夫荘辛見而悦之又曰經侯􅂈魏太子左服玉具劍右帶珮環左光照右右光照左太子不視經侯曰魏國有寳乎太子曰主信臣忠百姓戴上此魏國寳也經侯應聲觧劍佩而去鹽鐡論曰子思銀佩尚書舊傳曰淑妃脩媛脩華脩容􅀈妤佩采瓊玉貴人佩于寘玉鄴中記曰石虎岀行有女鼓吹尚書官属皆着錦袴佩玉晉令曰皇太子妃佩瑜玉諸王郡公太宰太傅太保司空諸長公主諸王世子大司馬大將軍太尉佩𤣥玉晋宋舊事曰太后皇后白玉佩穆天子傳曰七萃之士天子賜以左佩玉華玉華之佩佩之精者又曰天子渴於沙中沙中無水七萃之士高奔戎刺其左驂之頰取其清血而飲天子天子美之乃賜奔戎佩玉一雙列仙傳曰江濵二女者不知何許人歩逰江濵逢鄭交甫挑之不知神人也女遂解珮與之交甫悦乃受珮而去數十歩空懐無珮女亦不見拾遺記曰燕昭王時西王母降與昭王遊乎燧林之下説炎皇鑚火之術取緑桂之膏燃以照夜忽有飛娥衘火状如丹雀來拂桂膏之上此娥出員丘之穴穴洞達於九天中有細珠如流沙可穿而結因用為珮又曰漢成帝時乘輿服皆尚黑宫中美女服皂班姬以下皆𤣥綬䃜佩又曰漢昭帝元始元年穿淋池廣千歩中植分枝荷一莖四葉状如駢盖日照則葉低廕根莖若葵之衛足也名曰低光荷實如𤣥珠可以飾珮漢武内傳曰上元夫人帶六出火玉之佩捜神記曰元康中婦人之飾有五兵佩楚辭曰扈江離與薜荔扈被也紉秋蘭以為佩紉蘭素香草也又曰雲衣兮披披披披長貌玉佩兮陸離又曰連蕙若以為佩兮過鮑肆而失香又曰盍吾逰此春宫春宮東方青帝宮折瓊枝以繼珮潘岳西征賦曰飛翠綏拖鳴玉出入禁門者衆矣想佩聲之遺響若鏗鎗之在耳曹植七啓曰佩則結緑懸黎之妙㣲符彩照爛流景揚輝曹植與陳琳書曰帶蛇虹以為紳連日月以為佩殷仲堪與相王牋曰所致玉佩光潤清越傅𤣥大言賦曰腰佩六氣首戴天文環説文曰好倍肉謂之瑗肉好若一謂之環禮曰孔子佩象環五寸而綦組綬謙不比德亦不事也象環有文者也環者取可修無窮左傳曰穆叔之子仲壬與公御萊書觀於公宫公予之環使豎牛入不示岀命佩之又曰宣子有玉環其一在鄭商玉環同工共朴自共為雙宣子謁諸鄭伯謁請也宋書曰江夏王義恭孝武即位以在藩所服玉環大綬賜之梁書曰桞惔武帝之鎮㐮陽惔祖道帝觧玉環贈之天監二年元㑹帝謂曰卿佩玉環是新亭所贈耶對曰既瑞感神衷臣謹服之無斁白虎通曰修道無窮即佩環也瑞應圖曰黄帝時西王母乘白鹿來獻白環舜時復來獻白環王子年拾遺記曰顓頊時溟海之北有勃鞮國皆衣毛無翼而飛帝乃更衣以文豹為飾獻黒玉環色如淳漆荀卿子曰大夫待放于境君賜以環即返以玦即去西京雜記曰趙飛鷰為后女弟昭儀上五色玉環春秋後語曰秦始皇聞齊王后賢嘗使遺之連環曰齊人多知能解此乎后以羣臣莫能解乃引椎破之謝秦使曰謹以解矣以報始皇壮其志益不敢謀齊劉向列女傳曰齊桓公行覇諸侯朝之衛獨不至公謀伐衛衛姬脱簮珥解環珮再拜請衛之罪荘子内篇云彼是莫得其偶謂之道樞樞得其環中以應於無窮夫是非反覆相尋無窮故謂之環中空矣今以是非為環而得其中者也無是非者也無是非故能夫是非無窮故應亦無窮玦説文曰玦玉珮珮如環而有缺故云玦詩曰芄蘭之葉童子佩韘韘玦也左傳曰狄人伐衛將戰衛懿公與石祁子玦與寗莊子矢使守莊子寗速也玦玉玦曰以此賛國擇利而為之賛助也玦示以當决斷矢示以禦難又曰晉侯使申生伐東山皋落氏佩之玦狐突曰金寒玦離胡可恃也罕夷曰金玦不復雖復何為君有心矣國語曰獻公使申生伐東山衣偏裻音篤之衣佩之金玦太子見里克曰君賜我以偏衣金玦何也克曰孺子懼乎衣金之偏而掘金不偷矣太子遂行狐突御戎先友為右告先友曰君賜與我此衣何也先友曰中分而合玦之權在此行也狐突歎曰以龎衣純龎雜色純純德謂太子而玦之以金銑者寒甚矣胡可恃也典略曰項羽與沛公飲范増數目羽舉所佩玉玦以示者三羽黙然後漢書曰更始謀殺升伯升伯光武之兄乃㑹諸侯以成其計繡衣御史申徒建隨獻玉玦更始竟不能殺東觀漢記曰明帝詔曰馮魴以忠孝出入八年數進忠言直諌賜以玉玦續漢書曰桓帝永興二年光禄勲史舍壁下有青氣視之得玉鈎玦各一魏氏春秋曰明帝張掖郡金山𤣥川溢涌寳石負圖有玉匣開盖於前上有玉玦二璜一魏略曰太祖征漢中太子在孟津聞鍾繇有玉玦使臨淄侯曹子建也因人説之繇遂送焉太子與繇書曰南陽宗惠叔稱君侯昔有美玦聞之驚喜笑與作㑹當自白書恐傳言未審以是令舍弟子建因荀仲茂時從容喻圖指鄴騎既到寳玦初至捧柙跪發五内震駭䋲窮柙開爛然滿目猥以䝉鄙之姿得覩希世之寳不煩一介之使不損連城之價既有秦昭章臺之觀而無藺生詭奪之誑嘉貺益腆敢不欽承謹奉賦一篇王隠晋書曰禮能使决疑者珮玦故遺其臣亦授之以玦晉受命有二玦其一當魏厯數既終當禪大晋故與之玦凡受命居天子之位皆衆人之所疑以武皇帝能斷决應天順人受曹氏禪而無疑得應珮玦故以賜焉是以有二玦蕭子顯齊書曰太祖在淮隂治城得錫玦大數尺下有篆字人莫識記僧眞曰何須辦文此自乆逺之物即九錫之徵也太祖曰卿勿妄言北齊書曰樂陵王百年傳慱陵人賈德胄教百年嘗作數勅字德胄封以奏帝帝怒召百年百年知不免割帶玦留與妃斛律氏及百年被誅妃把玦哀號不食而死玦猶在手拳不可開其父自擘之乃開白虎通曰能决嫌疑則佩玦瑞應圖曰舜時西王母獻白環玦隋果子曰召人以環䋲人以玦莊子曰儒者受佩玦者事至而斷西京雜記曰趙飛鷰為皇后女弟昭儀上珊瑚玦孟達與諸葛亮書曰今送綸㡌玉玦各一以徵意焉笏釋名曰笏忽也君有教命及所啓白則書其上備忽忘也或曰笏可以薄疏物禮曰笏天子以球玉諸侯以象大夫以魚須與鬚同文竹士竹本象可也見於天子與射無説音脱笏入太廟説笏非古也小功不説笏當事免則脱之免悲哀哭踊之時凡有指畫於君用笏造受命於君必書笏笏畢用也因飾焉畢畫也笏度二尺有六寸其中愽三寸其殺六分而去一殺猶抒也天子抒上終葵首諸侯不終葵首又曰将適公所書思對命思所思念将以告君書之於笏為失忘也又曰侍坐於君子欠伸運笏澤劍首還履問日之蚤莫請退可也運澤猶習弄也大戴禮曰天子御珽珽言珽然方正於天下諸侯御茶茶前詘後直下天子也茶音舒大夫服笏前詘後詘無所不履也又曰五經要義曰天子之笏謂之珽珽然無所屈也周書曰武王不閑外門以示無懼去劒搢笏以示無仇後漢書曰陳蕃為光禄勲范滂為主事以公儀詣蕃執板入閤至坐不奪投板振衣而去郭泰責蕃曰以階級言滂宜有敬以類數推之至閤宜省所景切吳志曰朱治領吳郡舉孫權為孝亷後權為吳王治每見權常執板交拜板即笏也晉書曰王敦表温嶠為丹陽尹因餞㑹錢鳳自起行酒至鳳未飲嶠偽醉以手板擊鳳幘墜作色曰錢鳳何人温太眞行酒敦不恱兩釋之又曰桓温秉政謝安王坦之往候之坦倒持手板宋書曰建平王𢎞文帝子也元㐫劭弑立孝武入討劭録宏殿内自㧞莫由孝武先嘗以一手板與宏遣左右親信周法道賫手板詣孝武事平以為尚書左僕射又曰庾道愍尤精相板宋明帝時山陽王休祐屢以言語忤顔見道愍託以已板為他物令道愍占之道愍曰此乃甚貴然使人多憎忤祐以禇彦回詳宻求换其板他日彦回侍明帝自稱下官帝多忌甚不悦休祐具状以言帝意乃觧又曰綦母珍之在西州時有一手板相者云當貴每以此言動帝又圖黄門即帝嘗問之曰西州時手板何在珍之曰此是黄門手板官何須問帝大笑齊書曰豫章王嶷薨見形於第居地也後園乘腰輿指麾處分呼直兵直兵無手板左右授一玉手板與之謂曰橘樹一株死可覔補之因出後園閤直兵倒地仍失手板宋書曰明帝起事諸方並舉兵帝謂蔡興宗曰頃日人情言何事當濟否興宗曰今米直豐賤而人情更安以此籌之清蕩可必但臣之所憂更在事後猶羊公言既平之後方當勞聖慮耳尚書禇彦回以手板築興宗不已上曰如卿言北齊書曰爾朱榮既誅得其手板上有數牒啓皆左右去留人名非其腹心在出限帝曰竪子若􅂈今日便不可制又曰文㐮疑文宣佯愚慮其有後變将隂圖之以問崔暹暹曰嘗與二郎俱在行位試以手板拍其背而不瞋乃将犀手板换暹竹者自揩拭而翫視之以是知其實痴不足慮也帝既鏁暹責其往昔打背暹自陳所對文㐮之言已功以贖死帝悟曰我免祸乃暹之力釋而勞之唐書曰髙宗欲立武昭儀禇遂良諌不從致笏殿階曰還陛下此笏乃觧巾叩頭流血又曰崔滌𤣥宗時嘗朝夕宫掖出入無間慮有所漏洩乃於滌笏上親札慎宻二字以誡之又曰𤣥宗以張九齡體弱簮笏不勝命置笏嚢又曰李絳靣論吐突承瓘用兵無功合從顯責又論承瓘於軍中立聖政碑事不可舉上初怒色變絳語不已詞㫖懇切因泣下上察其意乃大開悟拜絳為中書舍人即命曵去所立碑曰㣲絳言吾不知為損又靣賜絳紫袍親為絳擇笏以賜之因謂之曰爾他時勿易此心又曰朱泚盜據宫闕乃遣将軍韓旻領兵疾趍奉天召叚秀實與之謀議秀實從實欲圖之隂説大将劉海賔何明禮等同謀殺泚明日泚召秀實議事秀實勃然而起奪源休笏以擊之泚傷額流血海賔等不至秀實遂被害又曰魏謩文宗時為起居舍人上謂之曰卿家有何舊書詔對曰比多失墜唯簮笏獨存輙令進之鄭覃曰在人不在笏上曰覃不觧我意此乃甘棠之義非在笏而已三禮圖曰士竹笏帥以象骨大夫莭以魚須輿服雜事曰古者貴賤皆執笏圭書君上之政令有事則搢之於腰帶中近代以來唯八座尚書執笏者白筆綴手板頭以紫嚢裹之其餘王公卿士但執手板主于敬不執笏示非記事官也周遷車服雜事曰應仲逺云昔荆軻逐秦王其後謁者持匕首以備不虞從此侍官執刀劍漢髙祖偃武修文始制以手板代焉江表傳曰孫權既即尊位請㑹百官歸功周瑜張昭勸迎曹公權不從而周瑜敗之及是昭舉笏欲褒贊功德未及言權曰如張公之計今已乞食矣昭大慚伏地流汗又曰獻帝嘗見郗慮及少府孔融問融曰鴻豫何所優長融曰可與適道未可與權慮舉笏曰融昔宰北海政散民流其權安在遂與融互相長短穆天子傳曰天子大服冕禕帗帶搢笏夾佩郭璞云帗韠也夾佩左右両佩也奉璧南靣立于寒下受河宗也郭子横洞冥記曰孟岐清河之逸人也年可七百嵗語及周初時事如目前岐時侍周公升壇上岐以手摩成王之足周公以玉笏與之郡國志曰晋明為太子時嘗戯殿前以玉手板摩弄銅蟠螭口手傾溜入螭服中不能出人後見一白䑕出入螭口世説曰王子猷作桓車騎騎兵恭軍桓曰卿在府乆此當相料理初不荅髙祖以手板柱頰云西山朝來致有爽氣相手板經曰相手板法出蕭何或曰四皓初出殆不行世東方朔見而喜之曰此非庸人所至衛司空陳長史見此書歎服以示許士宗韋仲将管輅見而推歎郭景純以夜兼晝方得其妙理相手板以閑太之時取五行尋四時定八節明二十四氣百不失一板長一尺五寸廣一寸五分上狹而薄下廣而厚八角十二芒並欲端正平板形皆完净板㐫少吉多者可用吉少㐫多者不可用服也舊用白直檀刺榆桑拓四材也畨當令理通直從上至下直如弦不得出邉絶理板頭是君座板頭與君共事必不得中分板作四分上一分為二親左為父右為母第二分都為婦第三分左為男右為女第四分左為奴右為婢婢之不卒方留為田宅財物牛馬猪羊雞犬之属以五行十二時分若其處崩毁傷踢破裂弔節蝎穿兆隨所属物必損失死亡板兩邉左為城右為社寛博文彩班班光澤清净必得封邑仲長子曰以笏書君教令記善刺過今之板以象焉劉義恭啓事曰聖恩優重猥賜華纓玉笏珍冠飾首琛板耀握非臣朽薄所宜服之太平御覧卷六百九十二
