body:
  text: 太平御覽卷二百六十宋李昉等撰職官部五十八良太守上良太守上漢書曰黄霸字次公淮陽人也為潁川太守力行教化外寛内明得吏民心是時鳯皇神雀數集郡國潁川尤多天子下詔稱揚曰潁川太守霸養視鰥寡贍助貧窮獄或八年無重罪囚可謂賢人君子矣書不云乎股肱良哉其賜霸爵關内侯黄金百斤又曰文翁廬江人也少好學景帝末年為蜀郡太守仁愛好教化見蜀地僻陋有蠻夷風文翁欲誘進之乃選郡縣小吏開敏有才者張叔等十餘人親自飭厲遣詣京師受業蜀地學於京師者比齊魯焉又曰龔遂字少卿山陽人宣帝問遂曰渤海廢亂朕甚憂之君何以息其盜賊以稱朕意遂曰海濱遐逺不沾聖化其民困於飢寒而吏莫恤今欲使臣勝之將安之上曰選用賢良固欲安之遂曰臣聞治亂繩不可急惟緩之然後可治願丞相御史無拘臣以文法得一切以便宜從事上許焉遂單車獨行至府郡中翕然盜賊亦皆罷民有帶持刀劍者使賣劍買牛賣刀買犢曰何為帶牛而佩犢乎又曰朱博遷琅琊太守齊部舒緩養名博新視事右曹掾史皆移病卧博問對言惶恐故事二千石新到輒遣吏存問致意乃敢起就職博奮髯抵几曰觀齊兒欲以此為俗耶乃召見諸曹史書佐及縣大吏選其可用者出教署之皆斥寵諸病吏郡中大驚又勑功曹官屬多褎衣大祒祒音紹謂大袴也不中節度自今掾史衣皆令去地三寸又曰尹翁歸字子況為東海太守郡中吏人賢不肖及奸邪盡知之東海大治以髙第入守右扶風滿嵗為真政雖任刑其在公卿之間清潔自守語不及私温良廉退不以行能驕人甚得名譽於朝廷又曰薛宣字貢君東海太守左馮翊滿嵗稱職宣為吏賞罰明用法平而必行所居皆有條教可紀多仁恕愛利又曰朱邑字仲卿廬江人少時為舒桐鄉嗇夫廉平不苛以愛利為行未嘗笞辱人存問孤寡遇之有恩所部吏民愛敬焉遷北海太守又曰趙憙字伯陽為平原太守後青州大蝗入平原界輒死嵗屢有年百姓歌之又曰汲黯為東海太守治官好清静擇丞史任之責其大指而已黯素多病卧閣内不出嵗餘東海大治召為淮陽太守黯辭之上曰君薄淮陽耶吾欲得君卧而治之乃行又曰王尊為東郡太守河溢堤壞尊執珪請以身塡金堤而水稍却又曰王尊字子貢涿郡人也為安定太守到官出教告屬縣曰令長丞尉奉法守城為民父母抑强扶弱宣恩廣澤甚勞苦矣太守以今日至府願諸君自勉正身又曰馮立字聖卿以任為郎遷五原太守徙西河上郡立在職公亷治行略與兄野王相似而多知有恩貸好為條教吏人嘉美野王立相代為太守人歌之曰大馮君小馮君兄弟繼踵相因循聰明賢智恩惠民政如魯衛德化均周公康叔猶二君後遷為東海太守土下濕病痺天子聞之徙太原太守更治五郡所居有迹又曰韓延夀字長公燕人為淮陽太守治甚有名徙潁川多豪強難治延夀教以禮讓令文學教官諸生冠皮弁執俎豆為吏民行喪娶禮百姓遵用其教徙為東郡太守吏無追捕之苦人無捶楚之憂皆便安之接待下吏恩施甚厚入守左馮翊行縣至髙陵民有昆弟相與訟田延夀大傷之曰幸得為郡不能宣明教化至令民有骨肉争訟既傷風化咎在馮翊當先退是日移病不聽事因入卧傳舍閉閤思過於是訟者宗族傳相責讓此兩昆弟皆自髠肉袒謝終死不敢復争延夀恩信周遍二十四縣莫敢復以辭訟自言者推其至誠吏民不忍欺紿又曰召信臣字翕卿九江夀春人也以明經甲科為郎超為零陵太守病歸復徵為諫議大夫遷南陽太守躬勸耕農開通溝渠為民作均水約束刻石立於田畔以防争吏民親愛之號曰召父荆州刺史奏信臣為百姓興利郡以殷富賜黄金四十斤遷河南太守治行常為第一又曰班伯為定襄太守定襄聞伯素貴年少自請治劇畏其下車任威吏民竦息伯請問耆老父祖有故人舊恩者延之滿堂日為供具執子孫禮諸所賔禮皆名豪懷恩醉共諫伯曰宜頗攝錄盜賊具言本謀亡匿處伯曰是所望於父師矣乃召屬縣長吏選精進掾史分部收捕旬日盡得郡中震懾咸稱神明又曰蕭育字次君哀帝時南郡多盜賊拜育為南郡太守上以育耆舊名臣乃以三公使車載育入殿中受策使車三公奉使之車也如安車加賜黄金二十斤育至南郡盜賊斷跡東觀漢記曰杜詩字君公為南陽太守性節儉而治清平以誅暴立威信善於計略省愛民役造作水排鑄為農器用力省見功多時人方於召信臣故南陽人為之語曰前有召父後有杜母又曰馬援字文淵扶風人為隴西太守務開寛信恩以待下任吏以職但總大體而已賓客故人日滿其門諸曹時白外事輒曰此丞掾任何足相煩若大姓侵小民黠羌欲旅距此乃太守事耳又曰朱暉字文季再遷臨淮太守暉好節概有所拔用皆厲行之士吏民畏愛為之歌曰強直自遂南陽朱季吏畏其威民懷其惠又曰祭彤為遼東太守彤之威聲揚於北方胡夷皆來内附野無風塵乃悉罷緣邉屯兵及彤卒烏桓鮮卑追思無已毎朝京師過彤冡拜謁仰天號泣乃去又曰張堪字君遊遷漁陽太守教民耕種百姓殷富童謠曰桑無附枝麥穗兩岐張君為政樂不可支視事八年匈奴不敢犯塞又曰第五倫字伯魚為㑹稽太守性節儉雖身居二千石位常蔬食布衣妻自炊爨初代當發百姓老小闐府門攀車扣馬啼呼曰捨我何之其得人心見愛如此又曰郭伋為潁川太守辭去之官光武詔曰郡得賢能太守去帝城不逺河潤九里冀京師并蒙其福也又曰秦彭遷山陽太守時山陽新遭地動後飢旱穀貴米石七八萬百姓窮困彭下車經營勞來為民四誡以父母妻子兄弟長㓜之序擇民能率衆以為鄉三老選鄉三老為縣三老令與長吏叅職崇儒雅貴庠序尚德化春秋饗射升降揖讓務以禮示民吏民畏愛不敢欺犯又曰侯霸字君房為臨淮太守治有能名及王莽之敗霸保固自守卒全一郡更始元年遣使徵霸百姓老弱相攜號哭遮使者車或當道而卧皆曰乞侯君復留民乃誡乳婦勿得舉子侯君當去必不能全使者慮霸就徵臨淮必亂不敢受璽書而具以狀聞又曰耿純字伯山鉅鹿人請治一郡盡力自効上笑曰卿乃欲以治民自効乃拜純為東郡太守後坐事免上過東郡數千人號呼涕泣云願復得耿君上復以純為東郡太守又曰王阜為益州太守邉郡吏多放縱阜以法繩正吏民不敢犯禁政教清静百姓安業甘露降白烏見連有瑞應世謂其持法平正寛慈惠化所致又曰魏霸為鉅鹿太守霸性清約質朴為政寛恕正色而已不求備於人掾史有過輒私責數不改休罷之終不暴揚其惡又曰秦彭字伯平為山陽太守以禮訓民不任刑名崇好儒雅百姓懷之莫敢欺犯轉潁川太守鳯凰麒麟嘉禾甘露之瑞集於郡境元成間宗族五人同為二千石故號為萬石秦氏又曰沈豐字聖達為零陵太守為政愼刑重殺聴理辭訟初不厯獄嫌疑不決一斷於口鞭杖不舉市無刑戮僚友有過初不暴揚有竒謀異略輒為談述曰太守所不及也到官一年甘露降芝草生又曰宗慶字叔平為長沙太守民養子者三千餘人男女皆以宗為名後漢書曰光武南定河内而更始大司馬朱鮪等盛兵據洛陽又并州未安光武難其守問於鄧禹曰諸將誰可使守河内者禹曰昔髙祖任蕭何於關中無復西顧之憂所以得專精山東終成大業今河内帶河為固戸口殷實北通上黨南迫洛陽冦恂文武備足有牧人御衆之才非此子莫可使也乃拜恂河内太守行大將軍事又曰冦恂字子翼為潁川太守拜執金吾後光武幸潁川百姓遮道曰願陛下復借冦君一年乃留之又曰楊震遷東莱太守當之郡道經昌邑故所舉荆州茂才王宻為昌邑令謁見至夜懷金十斤以遺震曰故人知君君不知故人何也宻曰暮夜無知者震曰天知地知我知子知何謂無知宻愧而出轉􅃰郡太守性公亷不受私謁子孫常蔬食步行故舊長者或欲令為開産業震不肯曰使後代稱為清白吏子孫以此遺之不亦厚乎又曰孟嘗遷合浦太守郡不産榖實而海出珠寶與交阯比境常通商販貿糴糧食先時宰守並多貪穢詭人採求不知紀極珠遂漸徙於交阯郡界於是行旅不至人物無資貧者餓死於道嘗到官革易前弊求人病利曽未踰嵗去珠復還又曰任延為九真太守九真不識父子之性夫婦之道延乃移書屬縣各使男年二十至五十女年十五至四十皆以年齒相配其貧無禮聘令長吏以下各省俸祿以賑助之同時相娶者二千餘人是嵗風雨順節穀稼豐衍其産子者始知種姓咸曰使我有是子者任君也多名子為任又曰陳寵轉廣漢太守西川豪右并兼吏多姦貪訴訟日百數寵到顯用良吏王渙鐔顯等以為腹心鐔音徒南反訟者日減郡中清肅先是雒縣城南雒縣名故城今在益州維縣南也毎隂雨常有哭聲聞於府中積數十年寵聞而疑其故使吏案行還言代衰亂時此下多死亡者而骸骨不得葬寵愴然矜歎即勑縣盡収歛葬之自是哭聲遂絶又曰宋均為九江太守山陽楚沛多蝗其飛至九江界者輒東西散去又曰劉寵為㑹稽太守簡除煩苛禁察非法郡中大化徵為將作大匠山隂縣有五六老叟龎眉皓髮自若耶山谷間出人齎百錢以送寵寵為人選一大錢受之又曰曹褒為河内太守時春夏大旱糧穀踊貴褒到乃省吏併職退去奸殘澍雨數降其秋大熟百姓給足流民皆還又曰鮑德為南陽太守時嵗多荒灾惟南陽豐穰吏人愛恱號為神父又曰亷范遷蜀郡太守其俗尚文辨好相持短長范毎厲以淳厚不受偷薄之說成都民物豐盛邑宇逼側舊制禁民夜作以防火灾而更相隱蔽燒者日屬范乃毁削先令但嚴使儲水而已百姓為便乃歌之曰亷叔度來何暮不禁火民安堵平生無襦今五袴又曰馬嚴為陳畱太守下車明賞罰發奸慝郡界清静時京師訛言賊從東方來百姓奔走轉相驚動諸郡惶急各以狀聞嚴察其虛妄獨不為備詔書勑問使驛係道嚴固執無賊後卒如言又曰黄香為魏郡太守郡舊有内外園田常與人分種收穀嵗數千斛香曰田令商者不農王制仕者不耕王制曰上農夫食九人下士視上農夫祿足以代耕者伐冰食祿之人不與百姓争利乃悉以賦人課令耕種又曰中平三年江夏兵趙慈反殺南陽太守秦頡攻沒六縣拜羊續為南陽太守當入郡界乃羸服間行侍童子一人觀厯縣邑採間風謠然後乃進其令長貪潔吏民良猾悉逆知其狀郡内驚悚莫不震懾乃發兵與荆州刺史王敏共擊趙慈斬之獲首五千餘級屬縣餘賊並詣續降又曰羊續為南陽太守續妻後與子秘俱往郡舍續閉門不内妻而自將秘行其資藏惟有布衾敝袛裯鹽麥數斛而已説文曰袛裯短衣也袛音丁奚反裯音丁勞反顧勑秘曰吾自奉若此何以資爾母乎使與母俱歸又曰三府舉王堂治劇拜巴郡太守堂馳兵赴斬賊虜千餘級巴庸清静吏民生為立祠又曰樊準拜鉅野太守時飢荒之餘人庶流離家戸且盡準課督農桑廣施方略朞年間穀粟豐賤數十倍而趙魏之郊數為羌所鈔暴準外禦冦虜内撫百姓郡境以安又曰伏湛更始立以為平原太守倉卒兵起天下驚擾而湛獨晏然教授不廢謂子曰夫一穀不登國君撤膳禮記曰年穀不登君膳不祭肺今人皆飢奈何獨飽乃共食麤糲糲粗米九章算術曰粟五十糲率三十一斛粟得六斗米為糲也悉分俸祿以賑鄉里來客者百餘家又曰鮑昱後拜汝南太守郡多陂池嵗嵗決壞後年費常三千餘萬昱乃上作方梁石洫洫梁也以石為之猶今之水門也水常饒足溉田倍多人以殷富又曰第五訪為張掖太守嵗飢粟石數千訪乃開倉賑給以救其敝吏懼譴争欲上言訪曰若上須報是棄人也須待也太守樂以一身救百姓遂出穀賑人順帝璽書嘉之由是一郡得全謝承後漢書曰鄭𢎞遷淮隂太守消息徭賦政不煩苛行春天旱随車致雨白鹿方道夾轂而行𢎞恠問主簿黄國曰鹿為吉為凶國拜賀曰聞三公車轓畫作鹿明府必為宰相續漢書曰宋均為九江太守五日一聽事冬以日終夏以平旦時多虎均曰夫虎豹在山黿鼉在泉物性之所託故江淮之間有猛獸猶江北之有鷄豚也數為民害咎在貪殘今退檻穽進忠良虎遂東渡江又曰劉寛字文饒𢎞農人為南陽太守温仁多恕遇民如子口不出詈言吏人有過但用蒲鞭罰之示辱而已又曰羊茂學字季寶豫章人為東郡太守冬坐白羊皮夏處單版榻常食乾飯出界買鹽致妻子不厯官舎華嶠後漢書曰岑熈為東郡太守好聘禮隱逸顯之於朝與叅政事視事三年人歌之曰我有枳棘岑君伐之我有蝥賊岑君遏之狗吠不驚足下生氂含哺鼓腹焉知凶災我嘉我生獨于斯時美矣岑君於戲休兹張璠漢記曰宋登字叔揚出為潁川太守市無偽價道不拾遺病免卒於家汝隂人配社祀之又曰陳球為零陵太守球到郡設方略期月間賊虜消散而州兵朱葢等反與桂陽賊胡蘭數萬人轉攻零陵零陵下濕編木為城不可守備郡中惶恐掾史白請遣家辟難球怒曰太守分國虎符受任一郡豈顧妻孥而沮國威重乎復言者斬乃悉郡内吏民老弱與共守城漢雜事曰蔣滿為上黨太守長子萬為北地都尉次子輔為安定太守滿與萬俱知名並見徵時徵為二千石者十三人俱引見萬退却不敢與父並詔譴贊謁者曰何以不齊左右曰此父子也上歎息曰乃父子剖符耶即先詔曰上黨太守滿經行篤著信行山東其以滿為淮陽王相誨導東蕃𢎞農股肱郡其以萬為𢎞農太守父子同日拜於前上嘉之太平御覽卷二百六十
