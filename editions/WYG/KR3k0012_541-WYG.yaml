body:
  text: 太平御覽卷五百四十一宋李昉等撰禮儀部二十婚姻下媒婚姻下論語曰子謂公冶長可妻也雖在縲絏之中非其罪也以其子妻之子謂南容邦有道不廢邦無道免於刑戮以其兄之子妻之公冶長弟子魯人也南容弟子南宫縚也爾雅曰女子之夫為壻壻之父為姻婦之父為婚婦之父母壻之父母相謂為婚姻國語曰董叔將娶於范氏叔向曰范氏富盍已乎曰欲為繫援焉繫援欲自結連於大援也他日董祈愬之於范獻子曰不吾敬也獻子執而紡之紡猶懸也懸於庭之槐也叔向過之曰子盍為我請乎叔向曰求繫既繫矣求援既援矣欲而得之又何為焉家語曰伯夏生叔梁紇叔梁紇娶於魯施氏生女九人無男叔梁紇曰雖有九女是無子也乃求婚於顔氏顔氏有三女小曰徴在顔父問三女曰鄒大夫雖父祖為士然先聖之裔也今其人身長九尺文武絶倫吾甚憐之雖年長性嚴不足為疑三子孰能為之妻二女莫對徴在進曰從父所制將何問焉父曰即爾能矣遂以妻之又曰男子二十而冠有為人父之端女年十五許嫁有適人之道羣生閉藏乎隂而為化育之始聖人因時以合偶男女窮天數也霜降而婦功成嫁娶者行焉季秋霜降嫁娶者始於此氷泮而農桑起婚禮殺於此焉龍魚圗曰以賣馬錢娶婦令多惡病夫妻離别漢書曰陳平邑有富人張負有女孫五嫁夫輙死人莫敢娶平欲得之邑中有大䘮平家貧侍䘮以先徃後去罷為助張負既見之䘮所獨視偉平平亦以故後去隨平至其家家貧負郭窮巷以席為門然門外多長者車轍張負欲以女孫與平其子仲曰平貧奈何與之女負曰固有美如陳平長貧賤者乎卒與女平貧乃假貸幣以聘與酒肉之資以内婦又曰張耳大梁人少時及魏公子無忌為客嘗亡命逰外黄外黄富人女甚美庸奴其夫亡邸父客素知張耳謂女曰必欲求賢夫從張耳女聴為請决嫁之女家厚奉給耳耳以故致千里客及官魏外黄令陳餘亦大梁人好儒術逰趙井陘富人公乗氏以其女妻之又曰張放得幸成帝放取皇后弟平恩侯許嘉女上為放供帳賜甲第充以乗輿服飾于時號為天子娶婦皇后嫁女又曰王閎妻父蕭咸為中郎將董賢父恭慕之欲以賢為弟求婚咸恐私謂閎曰董公為大司馬册文云允執其中此堯禪舜之文長老見者莫不心懼此豈家子所能堪耶閎性有知略聞咸言心亦悟乃還報謙逺之意恭不恱又曰鄭崇字子㳺本髙宻大族世與王家相嫁娶命敬恭聽宗爾父母之言夙夜無愆視諸衿鞶去不辭誡不諾葢恥之重去也鄭𤣥别傳曰故尚書左丞同縣張逸年十三為縣小吏君謂之曰爾有賛道之徳玊雖美湏雕琢而成器能為書生以成其志不對曰願之乃遂拔於其輩妻以弟女列女傳曰邵南申女者申人之女也旣許嫁於農家禮不備而欲迎之女與其人言其人媒氏往求命之者以為夫婦者人倫之始也不可不正夫家輕我違制不可以行夫家訟之女曰一物不具一禮不備守節持義必死不徃又曰魯師春姜者魯師氏之母也嫁其女三徃而三逐春姜問故以輕其室人也春姜召其女而笞之曰夫婦人以順從為務貞慤為首故婦事夫有五平旦纚筓而朝則有君臣之嚴洗盥饋食則有父子之敬報反而行則有兄弟之道必期必誠則有朋友之信寢席之交然後有夫婦之際君子謂春姜曰知陰陽之順逆也楚國先賢傳曰孫擕字文英與李元禮俱娶太尉桓焉女時人謂桓叔元兩女俱乗龍言得壻如龍也世說曰王戎儉恡其從子壻與一單衣裁後便責之戎女適裴氏貸錢數萬女歸戎不悅女還錢乃懌世說曰温嶠從姑劉氏家值亂離唯有一女姑問嶠有求婚意答云佳壻難得但如嶠比云何姑答云喪破之餘乞得粗相存活便足慰吾餘年敢希汝比却數日嶠報姑云已得婚處門第粗可壻身不減嶠因下玉鏡臺一枚姑大喜既婚交禮女以手披紗扇大笑曰固嫌是此老奴果如所疑玉鏡臺是嶠為劉越石長史北征劉聰所得也後漢書曰袁術僭亂曹操託楊彪與術婚姻誣以欲圖廢置奏取下獄劾以大逆孔融聞之不及朝服往見操曰楊公四代清徳海内所瞻周書父子兄弟罪不相及况以袁氏歸罪楊公操曰此國家之意融曰假使成王殺召公周公可得言不知耶操遂理出彪魏志曰王褒與管彦各男女始生許為婚彦為西夷校尉褒女更許人彦弟馥問褒褒曰賢兄𦵏父於洛陽隨母還臨淄用意如此何昏之有魏氏春秋曰司空東萊王基當世大儒豈不達禮而納司空王忱女以姓同源異故也又曰陳矯本劉氏子出嗣舅氏而婚於本族徐宣每非之廷議其闕太祖以矯才量欲全之乃下令曰喪亂以來風敎凋薄謗議之言難同褒貶自建安五年已前一切勿論其以斷前誹議者以其罪罪之魏志曰桓楷字伯緒劉表辟為從事祭酒欲妻以妻妹蔡氏楷自陳已結婚他處拒不受也又曰王粲父名謙名公之胄何進為長史欲與為㛰見二子使擇焉謙不許魏書評曰夏侯曹氏世為婚姻故淳淵仁洪休尚真等並親舊肺腑貴重於時左右勲業咸有勞効吳書曰陶謙字恭祖丹陽縣人甘公出遇之塗見其状貎異而呼之住車與語甚悅之因許妻以女甘夫人怒曰聞陶家兒逰戯無度如何以女許之甘公曰彼有竒表後必大成遂與之後為徐州牧吳志曰吕範字子衡汝南細陽人少為縣吏有客觀其姿邑人劉氏家富女美範求之母嫌欲勿與劉氏曰觀吕子衡寧為久貧者耶王隠晉書曰初后父楊駿欲以女妻鄭黙子預黙忌其太盛拒而不婚晉書曰王籍之為太子文學居叔母之䘮而婚丞相司直劉隗奏之帝下令云詩稱殺禮多婚以㑹男女之無夫家者正今日之謂也可以解禁止自今後為置其防又曰阮修字宣子貧居四十未有妻王敦等斂錢為婚皆名士也時慕之者求入錢而不得宋書曰江湛字微淵濟陽考成人也為義康司徒主簿司空檀道濟為子求湛妹婚不許義康有命又不從時人重其立志義者也吳均齊春秋曰桓閎字叔通太祖輔政使禇淵致意為子晃求女婚閎不敢從命曰辭霍不婚常所嘉揖齊大非偶所以不敢承殊眷太祖雖嘉其退讓而心不能懽也蕭子顯齊書曰王秀之字伯奮臨沂人也吏部尚書禇淵見秀之正㓗欲與結婚秀之不肯以此頻為府外兵參軍梁書曰江蒨方雅有盛格僕射徐勉權重唯蒨及王規與抗禮不為之屈勉因蒨門客翟景為子繇求婚於蒨蒨不荅景再言之乃杖景四十由此與勉忤韓子曰楚王謂田鳩曰墨子者顯學也其身體可則也其言多不辯何也田鳩對曰昔者秦伯嫁女於晉公子為之飾装從文衣之媵七十人至晉晉人愛其妾而不愛公女此可謂善嫁妾矣不可謂善嫁女也又曰齊桓公㣲服以巡民家人有年老而自養者公問其故對曰臣有子五人家貧無以妻之使傭未及反公歸以告管仲管仲曰蓄積有腐棄之財而民饑餓宫中有怨女而民無配公曰善乃詔令宫中婦女而嫁之因下令曰丈夫三十而室女子十五而嫁又曰衛人嫁其子而教之曰必私積聚為人婦而出常也其成居幸也其子因私積聚其姑以為多私而出之其子所以返者倍其所以嫁其父不自罪於教子非也而自知益其富淮南子曰禮三十而娶文王十五而生武王非法也嵗星十二嵗而周天天道一備故國君十二嵗而冠冠而娶十五而生子重國嗣不從古制也白虎通曰婚姻者何謂昏時行禮故曰婚婦人因夫而成故曰姻又曰人道何以有嫁娶者以為情性之大者莫大於男女之交人倫之始莫若夫婦男三十而娶女二十而嫁何陽數竒隂數偶男長女㓜者何陽道舒隂道促男三十筋骨以堅強任為人父女二十肌膚充盛任為人母合為五十應大衍之數生萬物也又曰禮曰女子十五許嫁納采問名納吉請期親迎以鴈為贄納徴用𤣥纁故不用鴈也納徴𤣥纁束帛離皮𤣥三法天纁二法地也陽竒隂偶明陽道之大也離皮者兩皮也以為庭實庭實偶也又曰嫁娶必以春何春天地交通萬物始生隂陽交接之時也詩曰士如歸妻迨氷未泮夏小正曰二月冠子娶婦之時也夫有惡行妻不得去地無去天之義夫雖有惡猶不可去也故郊特牲記曰壹與之醮終身不改悖逆人倫殺妻父母廢絶綱紀亂之大者也義絶乃得去耳天子諸侯一娶九女者何重國廣繼嗣也適九何地有九州承天之施無所不生一娶九女亦足承君施九而無子百亦無益也又曰男二十五繫心女十五許嫁感隂陽也陽數八隂數一男八嵗毁齒陽氣數竒三八二十四加一而繫心隂數偶故再成十四加一為五故十五許嫁各加一者明專一繫心所以繫心者防其淫佚也又曰婚經曰賔升北面奠鴈再拜稽首降出婦從房中降自西階壻御婦車授綏遣女於禰廟重先人之遺體不敢自專故告禰也父母親戒女何親親之至父曰戒之敬之夙夜無違命母施衿結褵曰勉之敬之夙夜無違宫事父誡於阼階母誡於西階庶女及門内施鞶申以父母之命世説曰王文度為桓公長史桓為兒求坦女王許桓藍田既還因言桓求婚已女藍田大怒文度還云下官家中既得婚處桓公曰吾知矣此尊君不肯又曰王丞相初在江左欲結吳人請婚陸太尉太尉曰培塿無松栢薰蕕不同器吾雖不才義不為亂倫之始也又曰諸葛恢大女適庾亮兒次女適王忱兒亮子被蘓峻害改適江霦恢兒娶鄧攸女於時謝尚書求其小女壻恢乃云羊鄧是平婚江家我顧伊庾家伊顧我不能復與謝褒兒婚也又曰諸葛恢女既寡誓不復再出其女性甚凶彊無有登車理恢既許江思𤣥婚乃移家嫁之初紿女云宜徙於是家人一時去獨留女在後比其覺已不復得出江郎暮来女哭詈積日漸久歇江霦暝入宿但在對牀上後觀其意轉帖乃詐厭良久聲氣轉急女乃喚婢云喚江郎覺江於是躍来就之云自是天下男子厭何預卿事而見喚耶既爾相闗不得復不與人語於是黙然而慙遂為夫妻聖證論云嫁娶古人皆以秋冬毛詩曰東門之楊其葉牂牂毛萇傳曰男女失時不逮秋冬也李固助展允婚教曰告文學師議曹史展允篤學貧苦慈孝推讓年将知命配匹未定聞之愴然其閱哀之夫冠娶仕進非可以已請允兄弟無意亦朋友不好事之罪也前遣師輔為允娶云譚處士等各欲佐助迄今未定出錢千率先大夫天府内史守助佐幹及譚豫等其欲議朋友少徴條名目允貧也禮宜従約二三萬錢足以成婚虞翻與弟書曰長子容當為求婦其父如此誰肯嫁之者造求小姓足使生子天其富人不在舊族楊雄之才非出孔氏之門芝草無根醴泉無源家聖受禪父嚚母頑虞家世法出癡子魏袁准正論曰或曰同姓不相娶何也曰逺别也曰今之人外内相婚禮歟曰中外之親近於同姓同姓且猶不可而况中外之親乎古人以為無疑故不制也今以古之不言固謂之可婚不知禮者也或曰國語云同徳則同姓同姓雖逺男女不相及異徳則異姓異姓雖近男女相及也斯言何故也曰司空季子有為而言也文公將求秦以反國不敢逆秦故也梁簡文帝資遣孔燾二女教曰夫人思至鄉事惟悼徃表閭式墓義匪字孤至如游殷之息見撫張既橋𤣥之子受託魏王斯故美在令終愛兼身後故無錫令孔燾經術𢎞長志履貞槩遊處積年一朝長徃聞其在室二女並未有行可廣訪姻家務求偶對媒毛詩七月曰伐柯如之何匪斧不克娶妻如之何匪媒不得毛詩氓曰送子渉淇至於頓丘匪我愆期子無良媒周禮地官下曰媒氏掌萬民之判凡男女自成名以上皆書年月日名焉令男三十而娶二十而嫁又地官曰媒氏凡男女之隂訟聽之于勝國之社隂訟爭中冓事以觸法者家語曰孔子之郯遇程子於塗顧謂子路曰取束帛以贈先生子路對曰由聞士不中間不見女無媒君子不與交禮焉白虎通曰男娶女嫁何隂卑不能自專就陽而成之故傳曰陽唱隂和男行女隨男不專娶女不專嫁必由父母湏媒妁何逺恥防淫佚也淮南子曰女因媒而嫁不因媒而親闞駰十三州志曰烏孫國嫁娶責馬聘先令媒者與婦宿徐乃壻近桓公傳曰元顯娶妾始用六禮以尚書僕射為媒人長史為逆客屈原離騷曰吾令豐隆乗雲兮求宓妃之所在解佩纕以結言兮吾令蹇脩以為理蹇脩伏羲氏之自言宓妃解佩帶取玉結言契令蹇脩為媒以通辭禮也莊子曰親父不為其子媒親父譽之不若非其父者太平御覽卷五百四十一
