body:
  text: 太平御覽卷九百四十九宋李昉等撰蟲豸部六蟾蜍春秋運斗樞曰政紀乖則蟾蜍月積四頭咸翔咸翔為妖韓詩新臺曰魚網之設鴻則罹之嬿婉之求得此戚施薛君戚施蟾蜍也喻醜貎文子曰蟾蜍辟兵壽在五月之望淮南子曰月照天下而蝕於蟾蜍騰蛇游霧而殆於蝍蛆蟾蜍月中蝦蟇食月故曰食於蟾蜍之大腹也騰蛇畏蝍蛆不敢動故曰殆殆猶畏也蝍蛆蟋蟀爾雅謂之蛬又曰抱朴子曰蟾蜍壽三千嵗又曰肉芝者謂萬嵗蟾蜍頭上有角領下有丹書字再重以五月五日午時取之隂乾百日以其足畫地即為流水書符帶之於身辟五兵若敵人射已者弓弩矢皆反還自向也又曰辟兵法或以月蝕刻時三嵗蟾蜍喉下有八字者取其血以書所持之刀劍即辟五兵𤣥中記曰蟾蜍頭生角得而食之壽千嵗又能食山精之化也張衡靈憲曰羿請不死之藥於西王母姮娥竊之以奔月河圖曰蟾蜍去月天下大亂西京雜記曰廣川王發晉靈公冢得玊蟾蜍一枚大如拳腹空容五合水光潤如新玉取以為書滴崔氏寔四民月令曰五日取蟾蜍可治惡疽瘡詩曰蟾蜍食明月虹蜺薄朝日蝦蟇易通卦驗曰夏至小暑蝦蟇無聲山海經曰藟音誄山湖水出焉東流注於食水其中多活師科斗也爾雅謂之活東爾雅曰蟼蟇郭璞注云蛙類音驚亦曰景科斗活東蝦蟇子也周禮秋官下曰蟈氏掌去鼃黽焚牡鞠菊同以灰洒之則死齊魯之間謂鼃為蟈黽耿黽蟈與耿黽尤怒鳴而聒人耳故去之漢書曰武帝元鼎五年秋蛙與蝦蟇相鬭是嵗四將軍衆十萬征南越開九郡後漢書曰馬援為隗囂使公孫述歸謂囂曰子陽井底蛙耳言述知識褊狹如坎井之蛙事見莊子而妄自尊大不如専意東方東觀漢記曰彭寵堂上聞蝦蟇聲在火爐下鑿地求之無所得張璠漢記曰靈帝鑄天禄蝦蟆吐水於平昌門外橋東注入宫又作翻車渴烏施於橋西洒南北郊晉書曰有蛙鳴于華林園惠帝問左右曰為官乎為私乎侍中賈𦙍對曰在官地為官在私地為私宋書曰張暢弟収嘗為猘犬所傷醫云食蝦蟇膾収甚難之暢含笑先嘗収因此乃食創亦即愈齊書曰沈僧昭别名法朗少事天師道士中年為山隂縣梁武陵王紀為㑹稽太守宴坐池亭蛙鳴聒耳王曰殊廢絲竹之聴僧昭呪厭十許口便息及日晩王又曰欲其復鳴僧照曰王宴已䦨令汝鳴即便喧聒又曰卞彬蝦蟆賦云紓青拖紫名為蛤魚世謂比令僕也又曰蝌斗唯唯羣浮闇水唯朝繼夕聿役如鬼比令史諮事也南史孝義傳曰丘傑字偉時呉興烏程人也年十四遭母喪以熟菜有味不嘗於口嵗餘忽夣見母曰死亡是分别耳何事乃爾荼苦汝噉生菜遇蝦蟆毒靈牀前有三味藥可取服之傑驚起果得甌中有藥服之下科斗子數升三國典略曰周天和二年齊武安妖人與其徒偽云盲躄因飲泉水下得金佛其躄遂愈於是逺近信之男女務集水中有黄老蝦蟇如金色乍作乍没齊武安及百官已下莫不敬之隋書曰煬帝在東宫中數有妖變乃命衛尉少卿蕭吉禳邪氣於宣慈殿座祭神是時孟冬地乆無水乃有蝦蟆從西南來入至座忽然而失文子曰禽子問曰多言有益乎墨子曰蝦蟇蛙黽日夜恒鳴口乾舌擗而人不聽今觀晨雞待旦而鳴天下俱動多言何益惟言之時也韓子曰越王句踐欲其民輕死出見鬭黽乃下軾從者曰王何敬也曰以其勇氣故也其後國人輕命死戰淮南子曰夫蝦蟆為鶉蠆為蟌音聰皆生於非其類老蝦為鶉水中䖝所化蠆化為蟌蟌者蜻蜓也唯聖人能知其化又曰蘭芝以芳未嘗見霜芳香也皷造辟兵壽盡五月之望皷造五月葢謂闕一日蝦蟆闕世也人望闕美闕蝦蟆美國語曰趙襄子以尹鐸有寛政於晉陽其民必和乃守晉陽後晉師圍而灌之沉竈生鼃民無叛意神仙傳曰指蝦蟆使舞皆應絃節使止乃止燕丹為太子自喜得荆軻永無秦憂日與軻之東宫臨池而觀軻拾瓦投蛙太子令人奉盤金物理論曰夫虛無之談尚其華藻此無異於春蛙秋蟬聒耳而已風俗通曰蝦蟆善掉尾俗說蝦蟆一跳八尺再跳丈六從春至冬袒裸相逐無他所作掉尾肅肅謹按蝦蟆既處水中其尾又短正使掉之豈能肅肅乎原其所以當言夏馬患蚋掉尾振撃常肅肅也蝦蟆夏馬音相似崔豹古今注曰科斗蝦蟆子也一名懸鈎一名𤣥魚形圓有尾聞雷則尾脱脚生也廣五行記曰懷州凝真觀東廊下柱已五十餘年矣道士徃往聞有蝦蟆聲不敢居處後因柱朽壞以他柱易之斫之於柱中得一蝦蟆其柱又無孔隙嶺表録異曰唐林藹為高州太守有鄉野小兒牧羊聞田中有蛤鳴蛤即大蝦蟆牧童遂捕之蛤躍入一穴中得一銅鼓其色翠緑土射數處損缺其上隱起多鑄蛙黽之狀疑其鳴蛙即銅鼓精也楚辭曰蝦黽遊於藥池芳藥之池成公綏隂霖賦曰百川泛濫横潦流竈中生黽庭通舟蟋蟀易通繋卦曰蟋蟀之䖝隨隂迎陽居壁向外趣婦女織績女工之象今失節不居壁是女工不成有淫佚之行因夜為姦故為門户夜開門户人之所由出入今夜不閉明非也易通卦驗曰立秋蜻蛚鳴白露下蜻蛚上堂京房易妖占曰七月建申為夷則蟋蟀鳴毛詩蟋蟀在堂嵗聿其暮今我不樂日月其除又豳七月曰七月在野八月在宇九月在户十月蟋蟀入我床下箋云自七月至十月入我床下皆謂蟋蟀也言將寒冇漸非卒來也陸璣毛詩疏義曰蟋蟀似蝗而小正黑有光澤如漆有角翅一名蛬一名蜻蛚人謂之王孫幽州人謂之􆀋蟙督促之言也里語曰趣織鳴懶婦驚詩義問曰蟋蟀食蠅而化成也劉芳毛詩義筌曰蟋蟀今促織也一名蜻蛚楚謂之蟋蟀或謂之蛬南楚謂之王孫也方言同蔡邕月令章句曰蟋蟀或謂之蛬亦謂之蜻蛚斯螽莎雞之類禮記月令曰季夏之月蟋蟀居壁春秋考異郵曰立秋趣織鳴宋均曰趣織蟋蟀也立秋女工當時成也春秋濳潭巴曰蟋蟀集天子無逺兵春秋説題辭曰趣織為言趣織也織事遽興故趣織鳴女作時成也爾雅曰蟋蟀蛬也郭璞曰今促織也一名蜻蛚也周書時訓曰小暑之日温風至又五日蟋蟀居壁袁洪後漢書曰崔駰上書曰竊聞春陽發而倉庚鳴秋風厲而蟋蟀鳴葢氣使之然也干寶搜神記曰朽葦為蛬麥為蝴蝶崔豹古今注曰蟋蟀一名吟蛬秋初生得寒則鳴噪濟南謂為懶婦也又曰莎雞一名促織一名絡緯一名蟋蟀促織謂鳴聲如急織也絡緯其聲如紡也促織一名促機絡緯一名紡績阮籍詩曰開秋肇凉氣蟋蟀鳴牀帷感物懷殷憂悄然令心悲盧諶蟋蟀賦曰何兹䖝之資生亦靈智之攸授享神氣之么芔體形容之㣲陋于時㣲涼既成大火告去𤣥乙辭宇翔鴻南顧風颯颯而動柯露零零而隕樹月轉景而西頺漢迴波而東注厲清響于干霄激悲聲以迄署王褒聖主得賢臣頌曰虎嘯而風冽龍興而致雲蟋蟀俟秋吟蜉蝣出以隂楚辭曰澹容與而獨倚兮蟋蟀鳴於西堂虭蟧詩義疏曰蝘音蝘一名虭音刀蟧音勞蟪蛄也爾雅曰蜓蚞螇螰即蝭蟧也一名蟪蛄齊人呼螇螰梃木奚鹿四音家語曰孔子謂宰予曰違山十里蟪蛄之聲猶在於耳莊子曰蟪蛄不知春秋司馬彪注曰蝭蟧春生夏死夏生秋死故不知嵗之春秋也揚雄方言曰蛥蚗折决齊謂之螇螰奚鹿楚謂之蟪蛄或謂之蛉蛄秦謂之蛥蚗自關而東謂之虭蟧紹料二音或謂之蝭蟧音帝或謂之蜓蚞音廷木西楚與秦通名江東人呼為蟂蟧風土記曰秋而蟪蛄鳴於朝寒蛩鳴於夜鼠負爾雅曰蟠鼠負也郭璞曰此瓮器底䖝也舊說伊威鼠負别名未詳也毛詩東山曰伊威在室伊威委黍也陸璣毛詩疏義曰伊威在室一名委黍一名鼠婦在壁瓮底土中似白魚者也說文曰蟠蟅音石鼠婦也伊威委黍鼠負也干寳搜神記曰豫章有一家婢作竈下忽有人長數寸來竈間壁婢誤以履踐殺一人須臾遂有數百人着縗麻持棺迎喪凶儀皆備出東門入園中覆舩下就視皆是鼠婦作湯澆殺遂絶葛洪治瘧方曰取鼠婦䖝十四枚各以糟封裹之丸十四丸臨發服七丸便愈陶𢎞景本草經曰鼠婦一名蟠蟅一名伊威一名委黍俗謂䑕婦多在孔中闕則闕而字乳殊似乖理又名䑕姑俗用此說闕蠧韓詩曰枯魚銜索于何不蠧爾雅曰蝎蛣􅔒木巾蠧䖝蝎桑蠧穆天子傳曰天子東遊次雀梁蠧書于羽陵謂暴書蠧因曰蠧書也杜寶大業拾遺曰七年始安郡獻桂蠧四瓶瓶各一千頭紫色香新有味啖之止隂痰之疾强䖹爾雅曰蛄䗐强䖹也郭璞曰米榖中蠧小黒䖝也建平人呼為䖹子音施方言曰蛄䗐音施謂之强䖹郭璞註曰江東謂之蛄䗐也齧桑爾雅曰蠰音餉齧桑郭璞曰似天牛也長角體有白㸃喜齧桑樹作孔藏其中江東為為齧髪守𤓰爾雅曰蠸音權輿父守𤓰郭璞注曰今𤓰中黄甲小虫喜食𤓰葉名曰守𤓰蚰蜒爾雅曰螾􅨪入耳蚰蜒也􅨪音衍方言曰自關而東蚰􅀈謂之螾􅣓或謂之入耳或謂之䗅音長􅫡所宜切趙魏之間或謂之蚨虶音扶于北燕謂之䖡蚭郭璞曰䖡効六切蚭音尼蜰音肥廣五行記曰春秋魯莊公二十九年蜰劉向以為此非中國所有南越盛暑男女同川澤淫亂所生為蟲臭惡時公娶齊淫女作夫人後漢書曰王莽地皇間蜰蔽天至長安入未央宫莽發吏捕之於時天下大亂尋而莽敗見殺蜚廉本草經曰蜚廉味鹹治血瘀遂下血破積聚喉痺生髙地山澤中二月採之呉氏本草曰蜚廉蟲神農黄帝云治婦人寒熱蠁爾雅曰國音各貉蟲蠁今呼蛹蟲為蠁廣雅云土蛹蠁蟲􅀢􅀢音求搜説文曰􅀢􅀢多足蟲也廣雅曰􅀢􅀢􅀈􅀢也博物志曰蠳螋蟲溺人影亦隨所着處生瘡盧氏曰以雞腸草搗塗經日即愈塵蟲呉氏本草曰塵蟲一名土鼈蛇公異苑曰海曲有物名蛇公形如覆蓮花正日庾闡楊都賦曰蛇公光於海曲螲蟷上知栗切下多郎切爾雅曰王蛈音鐡蝪音湯也郭璞曰即螲蟷似鼅鼄在穴中有葢今河北人皆呼為蝪也金花竺法真登羅山疏曰金花䖝大如斑猫形色文彩如金是龜屬得之養翫彌日慈母淮南子曰慈母不知晦太平御覽卷九百四十九
