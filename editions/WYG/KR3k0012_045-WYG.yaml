body:
  text: 太平御覽卷四十五宋李昉等撰地部十河北諸山大伾山枉人山鮒鰅山天門山蘇門山萬谷根山郡山嬰山牢山介山静巖山風山菅涔山五臺山謁泉山懸罋山五指山紇乾山元姬山白登山火山三山稷山霍山平山發鳩山抱犢山房山韓信山湯山干山言山黑山雷公山鼓山隆慮山鮮卑山大碣石山白狼山鳴雞山釡山川橋山大翮山小翮山飛龍山無終山燕山龍山孔山大伾山隋圗經曰大伾山按書云至於大伾又名青檀山今名黎陽東山劉澄山川記云黎國也詩云黎侯失國而寓於衛其臣勸之以胡為乎泥中胡為乎中露二句觀之黎乃國名非山名也又張楫有云成臯山即大伾山謬矣枉人山隋圖經曰枉人山俗名山陽三山或云紂殺比干於此山因得名古凢伯國之地也鮒鰅山山海經曰鮒鰅山顓頊葬其陽九嬪葬其陰郡國志曰顓頊所葬俗名青冢山焉天門山水經注曰天門山俗謂之百家巖下可容百家故以為名山有石穴狀如門纔得通人自平地東南入便至天井蘇門山十道志曰蘇門山一名蘇嶺俗又名五巖山魏氏春秋云即阮籍見孫登長嘯有鳯凰集登隠之處故號登為蘇門先生萬谷根山郡國志曰晉陽萬谷根山即羊腸坂也皇甫謐云羊腸塞在龍山西即晉陽西河郡隋煬帝大業四年經此幸汾陽改名深谷嶺十二州志云晉陽有羊腸蟠曲在其西北九十里也隋圗經曰朱山去萬谷根山二十里頭上有石墟魏太武避暑之所羊腸坂在焉郡山後魏興國土地記曰太原郡山有石室方丈四尺四壁有篆字人莫之識嬰山隋圗經曰嬰為并州之主牢山又曰牢山在太原縣東北趙書曰劉聰遣子粲襲據晉陽猗廬救之遂獵于夀陽牢山檢閲皮肉山為之赤也介山并州記曰介山一名横嶺左傳僖二十四年晉侯賞從亡者介之推不言祿遂與母偕隠而死晋侯求之不獲以綿上為之田曰以志吾過且旌善人杜預註曰西河介休縣城南有地名綿上也静巖山郡國志曰靈石縣有静巖山在東北二十里即太岳也下有五龍泉即文公封介子推綿上之田是也風山水經注曰河水南經圵屈縣故城西十里有風山上有穴如輪風氣蕭瑟習常不止當其衝飄也三伏亦寒草木常不定衆風之門故也菅涔山水經注曰菅涔山汾水所出土人亦謂箕菅山見多菅草或以為名又為菅子山前趙録云劉元海族子曜嘗隠避於菅涔之山夜忽有二童子入跪曰菅涔王使小臣奉謁趙皇帝獻劒一口置前再拜而去以燭視之劒長二尺光輝非常背有銘云神劒服御除衆毒曜遂服之隨時變為五色也又有生城堆故縣城於此置也又有汾陽宫隋大業四年置隋末廢也又有汾水出山陽山海經曰菅涔之山汾水出焉西流至于河十二州記云汾水出周五縣之燕京山蓋菅涔之異名也五臺山水經注云五臺山有五巒巍然故曰五臺晉永嘉三年鴈門郡人五百餘家避亂入此山見山中人為先驅因而不返遂棲巖野往還之士稀有望見其村居者至詣㝷訪莫知所在故俗人以為仙者之都矣中臺之山山頂方三里西北陬有一泉水不流謂之太華泉蓋五臺之層秀仙經云此山名為紫府仙人居之其九臺之山冬夏常氷雪不可居即文殊師利常鎮毒龍之所今多佛寺四方僧徒善信之士多往禮焉謁泉山隋圗經曰西河謁泉山一名隠泉山有石室子夏退居之所水經注曰謁泉山俗云暘雨愆時謁禱是應故得其名懸罋山郡國志曰懸罋山一名龍山亦名結絀山多鮆魚食之不驕晉水出焉又有象山前趙録劉聰征劉琨不克略晉陽踰象山而歸也又汾水自陽曲縣界流入南過晉陽縣晉水從縣南流注之又有洞過水西入于汾晉水下口也又有晉祠水經注曰踞西山枕汾水有唐叔虞祠水側有凉堂晉川之中最為勝處姚勗序行記云髙洋天保年中起樓觀於此五指山李穆叔趙記曰鰅陽東北有五指山巖石孤聳上有一手一足之迹厥大如箕指數俱全郡國志曰北齊宣王遣人量之長七尺十六國春秋云石勒當生之時此山上草木皆為鐵騎之形紇乾山冀州圗經曰紇乾山在城東北登之望桑乾代郡數百里内宛然郡國志云望之數百里内夏恒積雪故彼人語曰紇乾山頭凍死雀何不飛去生處樂神仙人歌曰紇乾山頭有神井入地千尺絶清泠是山北十里有白登山元姬山冀州圗經曰元姬山在馬邑後魏書云道武侍人姓李善謳歌死葬此山魏主思之樂府為之曲其曲存焉白登山冀州圖經曰白登山在定襄縣西五里火山水經注曰西溪水源出火山火山有火井南北七十歩深不見底炎熱上昇常若雷之發響以草爨之則烟騰火發其山一名焚臺井東五六尺有湯井廣輪與火井烟狀熱勢相同東有火井祠嵗時祀之井北百歩有東西谷廣十歩許南㟁下有風穴厥大容人其深不測而穴中肅肅常有微風雖三伏亦凛冽三山隋圖經曰河東都三山即舜所耕厯山也禹貢所謂壺口雷首至於太岳壺口山在慈州太岳在晉州雷首在河東界此山有九名謂厯山首山薄山襄山耳􅀥山渠猪山獨頭山陑山等名又湯伐桀升自陑之所稷山隋圖經曰稷山在綘郡后稷播百榖于此山又左氏傳謂晉侯治兵于稷以畧狄土是此也後漢書髙梁山隋已後又謂稷山霍山隋圗經曰霍山在洪洞縣東北霍水出焉水經注曰發源成潭潭闊七十歩而不測其深爾雅曰霍山出珠玉焉又有聖人崖崖有七穴相通水經注云霍山北有雀鼠谷中道險左右柱結成偏梁閣道累石成路俗謂之魯般橋也平山隋圗經曰平山在平陽一名壺口山尚書既載壺口治梁及岐即此地也今名姑射山在縣西平水出其下山海經曰憲山之南三百里有姑射山冀州圗經云西入文成郡以山為界莊子云堯見姑射神人杳然喪其天下即是此山也發鳩山山海經曰上黨發鳩山多柘木有鳥狀如鳩而文首白啄赤足名曰精衛其鳴自相呼云炎帝女東遊溺海化鳥今猶啣石以填之抱犢山道書福地記曰抱犢山在上黨東南髙七丈有石城髙十丈方一里東南角有草名玉照下枝冬生花髙五六尺味頗甘取其末服之方寸七日不飢宜五穀多物無惡毒冦賊不至玉匱云抱犢山東去恒山之南數百里云南有穴行三百里出美陽縣西七十里名洞口隋圗經曰卑山卑音蔽今名抱犢山四面危絶山頂有二泉後魏葛榮亂百姓抱犢上山因以名之也房山隋圗經曰房山嶺上有王母祠甚靈俗號為王母山後漢書曰章帝永和三年幸趙祠房山即謂此山也在縣西北十里濊水出焉亦為石臼水又謂濁鹿水出行唐東入愽陵謂之木刀溝一謂袈裟水又從此過石童山南流入滹沱河前燕録曰慕容雋時房山王母祠前樹自拔根下得玉圭璧八十三顆光色稍竒雋以為岳神之命以太牢祭之每祀有一虎來往祠側性頗馴狎而不害於物韓信山隋圗經曰韓信山圓峻呼為韓信臺又呼為土門口西入井陘即太原路是也旁又有韓信城信破趙駐軍於此處焉湯山山海經曰湯山湯水出焉此湯能愈疾為天下最隋圗經云湯後側巖有石室一户無塵穢俗號曰聖人室下經銅烏廟有碑題云漳河神壇是也干山言山李公緒記曰栢人縣有干山言山衞詩云出宿於干飲餞於言是也黑山九州要記曰黑子昔居汲郡黑山採茯苓餌五百嵗或老或少魏志漢獻帝初平二年黑山賊于毒白繞眭固等十萬餘衆以掠魏郡也又云一名青山列仙傳曰犢子鄴人在黑山常牽一黄犢來過鄴城沽酒陽都女見而悅之遂留相奉侍陽都女眉生而連者也土地十三州志云黑山險為逋逃藪隋區子圗志云周太祖諱黑因改黑山為青山也雷公山隋圗經曰雷公山耆老傳曰魏時黑山郡盗張燕等不立君長直以名號為稱多髯者謂之髭公大聲者謂之雷公時雷公賊保此山因以為名鼓山隋圗經曰鼓山亦名塗山宋承初古今山川記云鼔山如石鼓形二所南北相當二鼓相去十里冀州圗經云鄴城西有石鼓鼓自鳴即有兵起破城邑魏都賦云神鉦迢遞於髙巒是也齊末此鼓鳴未幾云鄴城有兵而齊滅隋文季年又鳴聞數百里也隆慮山隋圗經曰隆慮山一名林慮在隋縣西二十里山有三峯南第一峯名仙人樓髙五十丈下有黄花谷北巖出瀑布水注成池黄花谷西北有洞穴去地十餘仞下有小山孤竦謂之玉女岩髙九百丈其山北一峯名舉峯其地有偏橋即抱犢山也南接大行北連恒岳顏修内傳曰橋順字仲產有二子曰璋曰琮師事仙人盧子基於是隆慮山棲霞谷教二子清虚之術服飛龍藥一丸十年不飢魏文帝詩曰西山有雙童豈亦謂此也乎鮮卑山隋圗經曰鮮卑山在栁城縣東南崔鴻十六國春秋慕容廆先代居遼左號曰東胡其後雄昌與匃奴争盛秦漢之際為匃奴所敗分保鮮卑山因復以山為號也棘城之東塞外又有鮮卑山在遼西之西北一百里與此異山而同號大碣石山地理志云大碣石山在右北平驪城西南王莽改曰掲石也漢昭帝亦常登之以望鉅海而勒其石今於此婉轉有石如埇道數十里當山頂望之大石如柱形往往而見立於海之中潮水大至及潮波退不動不沒不知深淺世名之天橋柱也狀若人造亦非人力所為豈昭亦指此以為碣石也白狼山郡國志曰白狼山一名鹿首山魏武於此逢獅子處事見獸部鳴雞山隋圗經曰鳴雞山在懐戎縣東北本名磨笄山昔趙襄子殺代王其夫人曰代已亡矣吾將何歸遂磨笄於山而自殺代人憐之為立祠因以名其山為磨笄山每夜有野雞羣鳴於祠屋上故亦謂鳴雞山釡山後魏輿地圗風土記曰洛城西北三里有釡山形似釡故以名之其下有舜祠瞽叟祠存焉川喬山山海經曰川喬山有黄帝祠大荒有軒轅臺射者不敢西向畏軒轅故也梁湘東王臨終詩云寂寥千載後誰上軒轅䑓大翮山小翮山山海經曰大翮山小翮山有神廟昔王次仲年小入學而逺常先到其師怪之謂不歸使人候焉實在家等軰常見次仲捉一小棘木長三尺餘至著屋間欲取輙不見及年弱冠變蒼頡舊文為今𨽻書秦始皇時官務繁多次仲為文簡略赴急用之大嘉使徵不至始皇大怒詔檻車送之次仲吟詠化為大鳥出車外翻然髙飛徘徊長引至于西門山落二翮因名之也飛龍山隋圗經曰飛龍山又名封龍山十六國春秋前趙錄云王俊遣祁𢎞率鮮卑討石勒戰於飛龍山下勒師大敗酈道元水經注云汶水東經飛龍山北又趙記云每嵗有疾風雹雨東南而行俗傳此山神女為東海婦三石人猶存衣冠俱全具其北即張耳故墟耳無終山隋圗經曰無終山一名歩陰山又名翁同山神仙傳云仙人白仲理者遼東人也隠居無終山中合神丹又於山中作金五千斤以救百姓即此山也水經注云翁伯周末避亂遁無終山山前有泉水甚清夏嘗澡浴得玉澡架一雙於泉側搜神記云無終山又有楊翁玉田昔雍伯雒陽人父母終葬於無終山山髙八十里上無水雍伯置飲有人就飲與石一升令種之後玉生得白璧五雙聘北平徐氏而遂家焉燕山隋圗經曰燕山在易縣東南七十里巖側有石鼓去地百餘丈望之若數百石因左右梁貫之鼓東南有石人援之狀同擊勢云燕山石鼓鳴則有兵龍山隋圗經曰龍山在易縣西南三十里有龍山石上往往有仙人及龍跡西鬰谷有一地大如車輪春則風出東夏出南秋出西冬出北有沙門法猛以夏日入其東穴見石堂石人欲窮諸穴便有一人厲聲云法師有滯三穴皆如東者不宜仍來見穢猛仍意不息不覺忽在穴外也孔山水經注曰易水東經孔山北隋圗經曰孔山有孔表裡通徹故名耳太平御覽卷四十五
