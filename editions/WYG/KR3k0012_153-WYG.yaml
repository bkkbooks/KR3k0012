body:
  text: 太平御覽卷一百五十三宋李昉等撰皇親部十九公主中公主中沈約宋書曰山隂公主淫欲過度謂帝曰妾與陛下俱托體先帝陛下六宫百數妾唯一駙馬事不均平帝為置靣首左右三十人進爵㑹稽郡長公主秩同郡王食湯沐邑二千户帝每出主與朝臣常共陪輦主以吏部褚淵美貎就帝請以自侍帝許之淵侍主十日備見逼迫誓死不回遂得免也又曰徐達之尚武帝長女㑹稽宣公主為彭城沛二郡太守子湛之字孝源幼孤為武帝所愛常與江夏王義恭寢食不離於側永初三年詔以公主一門嫡長湛之致節之後封枝江縣侯數歲與弟淳之共車行牛奔車壞左右人馳来赴之湛之先令取弟衆咸歎其幼而有識及長頗渉文義事祖母及母以孝聞元嘉中為黄門侍郎祖母年老辭以朝直不拜後拜秘書監㑹稽公主居長嫡為文帝所禮家事大小必諮而後行西征謝晦使公主留止䑓内總攝六宫每不得意輒號哭上甚憚之初武帝微時貧陋過甚嘗往新洲伐荻有納布衫襖等衣皆敬皇后手自作武帝既貴以此衣付公主曰後世若有驕奢不節者可以此衣示之湛之為大將軍彭城王義康所愛與劉湛之等頗相附及義康得罪事連湛之文帝大怒將致大辟湛之憂懼無計以告公主公主即日入宫及見文帝因號哭下牀不復施臣妾之禮以錦囊盛武帝納衣擲地以示上曰汝家本貧賤此是我母為汝父作此納衣今日有頓飽食便殘害我兒子上亦號哭湛之由此得全又曰王僧綽幼有大成之度衆便以國器許之好學練悉朝典年十三父曇首卒文帝引見下拜便流涕哽咽上亦悲不自勝襲封豫章縣侯以選尚文帝東陽獻公主初為江夏王義恭司徒參軍累遷尚書吏部郎參掌大選宏識流品任舉咸盡其分又曰宋世諸公主莫不嚴妬明帝每疾之湖熟令袁慆妻以妬賜死使近臣虞通之撰妬婦記左光禄大夫江湛孫斆尚孝武帝女上乃使人為斆表讓婚曰伏承詔㫖當以臨海公主降嬪臣寒門悴族人凡質陋閭閻有對本隔天姻如臣素流家貧業寡年近將冠皆已有室荆釵布裙足得成禮自晉氏以来配尚公主雖累經美胄亟有名才至如王敦懾氣桓温歛威真長佯愚以求免子敬炙足以違禍王偃無中都之質而倮雪於北階何瑀闕龍工之姿而投軀於深井謝莊迨自害於矇叟殷沖幾不免於强鉏制勒甚於僕𨽻防閑過於婢妾行来岀入人理之常當待賔客朋從之義而令掃轍息駕無窺門之期廢筵抽席絶接對之理非唯交友離異仍乃兄弟疎濶姆妳爭媚相勸以嚴妮媪競前相謟以急其間又有應答問訊卜筮師母乃至殘餘飲食詰辨與誰衣被故弊必責頭領或進不獲前或入不聽出不入則嫌於欲疎求出則疑有别意召必以三晡為期遣必以日岀為限夕不見晩魄朝不識曙星至於夜步月而弄琴晝拱袂而披卷一生之内與此長乖又聲影才聞則少婢奔迸裾袂向席則醜老叢来左右整㕞以疑寵見嫌賔客未冠以少容致斥如臣門分代荷殊榮足守前基便預提拂清官顯位或由才升一叨婚戚咸成恩假是以仰冒非宜披露丹實非唯上陳一已規全身願實乃廣申諸門受患之切伏願天慈照察特賜蠲停若恩制頒降披請不申便當刋膚剪髮投山竄海帝以此表遍示諸主以諷切之并為戯笑梁書武帝之女臨安安吉長城三主並有文才而安吉最得令稱又曰王琳字孝璋位司徒左長史琳齊代娶梁武帝妹義興長公主琳有子九人並知名長子銓字公衡美風儀善占吐尚武帝女永嘉公主拜駙馬都尉銓雖學業不及弟錫而孝行齊焉時人以為錫銓二王可為玉昆金友母長公主疾銓形貌瘠貶人不復識及居喪哭泣無常因得氣疾位侍中丹陽尹卒於衞尉卿又曰柳偃字彦逰年十二梁武帝引見詔問讀何書對曰尚書又問有何美句對曰德唯善政政在養人衆咸異之詔尚武帝女長城公主拜駙馬都尉又曰謝覽字景滌尚齊錢塘公主拜駙馬都尉武帝平建業朝士皆拜覽時年二十餘為太子舍人長揖而已意氣閒雅視瞻聰明武帝目送良久謂徐勉曰覺此生芳蘭竟體想謝莊正當如此自此乃被賞味又曰謝朓及殷叡素與梁武帝以文章相得帝以大女永興公主適叡子鈞第二女永世公主適朓子謨及帝為雍州二女並暫隨母向州及帝即位二公主始隨内還武帝意薄謨又以門單欲更適張𢎞策子𢎞策卒又以與王志子諲而謨不堪歎恨為書狀如詩贈公主以呈帝甚加矜歎而婦終不得還尋用謨為信安縣稍遷王府諮議又曰殷叡子鈞尚武帝女永興公主自宋齊以来公主多驕淫無行永興公主加以險虐鈞形貌短小為公主所憎每被召入先滿壁為殷叡字鈞輒流涕以岀主命婢束而反之鈞不勝怒而言於帝帝以犀如意擊主碎於背然殊恨鈞又曰張纉字伯緒年十一尚武帝第四女富陽公主拜駙馬都尉封利豪亭侯召補國子生起家祕書郎時年十七身長七尺四寸眉目疎朗神采爽發武帝異之嘗曰張壯武云後八世有逮吾者其此子乎後魏書曰金根車公主封君皆乘之但有騑而已又曰太祖嘗引崔𤣥伯講論漢書至婁敬説漢髙祖欲以魯元公主妻匈奴善之嗟嘆良久是以諸公主皆釐降於賔附之國又曰陸昕之風望端雅尚常山公主拜駙馬都尉公主奉姑有孝稱初與穆氏瑯琊長公主並為女侍中又性不妬忌以昕之無子為納妾媵而皆育女公主有三女無男以昕之從兄希道第四子彰為嗣又曰蕭寳寅尚南陽長公主賜帛一千疋併給禮具公主有婦德事寳寅盡肅雍之禮好合雖積年而敬事不替寳寅每入室公主必立以待之相遇如賔自非太妃疾篤未曽歸休寳寅器性温順自處以禮奉敬公主内外諧穆清河王懌親而重之又曰馮穆尚順陽公主宋翻為河隂令公主家奴為刼攝而不送翻將兵圍主宅執主婿馮穆步驅向縣時正炎暑立之日中流汗霑地又曰陳留公主寡居秦州刺史張彛意願尚公主公主亦許之僕射髙肇亦望尚公主公主意不可肇怒譛彛於世宗停廢數年又曰髙道穆為御史中尉莊帝姊壽陽公主犯行清路執赤棒卒呵之不止穆令棒破其車公主深以為恨泣以訴帝帝謂主曰髙中尉清貞之人彼所行者公事豈可以私責之又曰宿石元明帝時拜中壘將軍嘗從獵帝親欲射虎石叩馬諫引帝上髙原上後虎騰躍殺人詔石為忠臣切諫免虎之害賜馬一匹尚上谷公主拜駙馬都尉又曰劉昶尚武帝武邑公主更尚建興公主又尚平陽長公主及昶終與三公主同塋異穴又曰劉輝字重冒正始初尚蘭陵長公主世宗第三姊也公主頗嚴妬輝常私幸主侍婢有身主笞殺之害其孕子節解以草裝實婢腹裸以示輝遂忿憾疎公主公主姊因聽講言其故靈太后太后初勑清河王懌窮其事懌與髙陽王雍廣平王懷奏其不知之狀無可為夫婦之禮請離婚削除封位太后從之又曰嵇拔世為訖奚部帥其父根皇始初率衆歸魏太祖嘉之拔尚華隂公主生子敬元紹之逆也公主有功超授敬大司馬封長樂王蠕蠕傳曰太昌元年六月阿那環遣使朝貢併為長子請尚公主孝武詔以范陽王誨之長女瑯琊公主許之未及成婚帝入闗東西魏競結阿那環為婚好西魏文帝乃以孝武時舍人元翌子女稱為化政公主妻阿那環弟塔寒又曰阿那環遣使朝貢因復求婚詔以常山王隲妹樂安公主許之改封為蘭陵郡長公主阿那環奉馬千匹以為聘禮請迎公主詔兼宗正卿元壽兼太常卿孟詔等送公主自晉陽北邁資用器物咸加豐渥阿那環遣迎公主於新城之南陳書曰沈君理美風儀博涉有識覽陳武帝鎮南徐州深見器重命尚㑹稽長公主及帝受禪拜駙馬都尉封永定亭侯為吳郡太守時兵革未寧百姓荒弊君理總集士卒修飭器械深以幹理見稱又曰蔡凝字子君美容止及長博學有詞章尤工草𨽻累遷太子中舍人以名家子被選尚義興公主拜駙馬都尉中書侍郎遷晉陵太守及將之郡更令左右修中書􅇬宇謂賔友曰庶来者無勞尋授吏部侍郎凝年位未髙而才地為時所重常端坐西齋自非素貴名流罕所交接趨時者多譏焉宣帝嘗謂凝曰我欲用義興主壻錢肅為黄門郎卿意何如凝正色曰帝戚恩由聖㫖則無所復問若格以僉議黄門之職故須惬人望帝黙然而止肅聞而不平義興公主日譛之尋免官遷交阯後周書曰尉遲侯兠性𢎞裕有鑒識尚太祖姊昌樂大長公主生迴及侯兠病且卒呼二子撫其首曰汝等並有貴相但恨吾不見爾各宜勉之隋書曰文帝時蘭陵公主寡上為之求夫選親衞柳述及蕭瑒等以示相者孫鼎鼎曰瑒當封侯而無貴妻之相述亦通顯而守位不終上曰位由我耳遂以主降述又曰蘭陵公主字阿五髙祖第五女也美姿儀性婉順好讀書髙祖於諸女特所鍾愛初嫁儀同王奉孝卒適河東柳述時年十八諸姊並驕踞主獨折節遵於婦道事舅姑甚謹遇有疾病必親奉湯藥髙祖聞之大悦由是述漸見寵遇初議主婚晉王廣欲以主配其妃弟蕭瑒髙祖許之後乃以主適述晉王因不悦及述用事彌惡之髙祖既崩述徙嶺表煬帝令主離絶將改嫁之公主以死自誓不復朝謁上表請免主號與述同徙帝大怒曰天下豈無男子欲與述同徙耶主曰先帝以妾適於柳家今有罪妾當從坐不願陛下屈法申恩帝不從主憂而卒又曰南陽公主煬帝長女也美風儀有志節造次必以禮年十四嫁許國公宇文述子士及以謹肅聞及述病且卒主親調飲食手自奉上世以此稱之及宇文化及弑逆主隨至聊城而化及為竇建德所敗士及自濟北西歸大唐時隋代衣冠並在其所建德引見之莫不惶懼失常唯主神色自若建德與語主自陳國破家亡不能報怨雪耻淚下盈襟聲辭不輟情理切至建德及觀聽者莫不為之動容敬異焉及建德誅化及時主有一子名禪師年且十歲建德遣武賁郎將於士澄謂主曰宇文化及躬行弑逆人神所不容今將族滅其家公主子法當從坐若不能割愛亦聽留之主泣曰武賁既是隋室貴臣此事何須見問建德竟殺之主尋請建德削髮為尼士及右衞將軍述之子也以父勲封新城縣公隋文帝嘗引入卧内與語竒之令尚煬帝女南陽公主太平御覽卷一百五十三
