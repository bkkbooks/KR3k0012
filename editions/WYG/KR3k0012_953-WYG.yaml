  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_953-1a, image: WYG0901/WYG0901-0425a.png}
body:
  text: 太平御覽卷九百五十三宋李昉等撰木部二木下松木下郭子横洞㝠記曰太初三年東方朔從西國還漢得聲風木十枝枝皆九尺大如指眞可愛縉雲封禪之時許貢其木為車輦之用此木樹上有紫鷰黄鵠集其間實如細珠風吹如玉磬因以為名春夏馨香秋冬聲清有武士則如金革之響有文章則如琴瑟之音上以枝遍賜羣臣百嵗皆以枝頒賜人有疾者枝則汁出死者枝則折昔老聃在於周世年七百枝未汁偓佺生於堯時已年三千嵗植此竟未折上乃以枝賜東方朔朔曰臣已見枝三遍枯死死而復生何啻于汁折而已哉里語曰年未半枝不汁此木五千嵗一濕萬嵗一枯縉雲之世此木生於閭閻也又曰缺光元年起夀福靈壇濶百歩四周起銅梁銅柱上列種垂龍之木木似青梧髙十丈有朱露色如丹汁灑其葉落地皆成珠其枝似龍之側垂赤白珠枝樹比壇髙八尺文錯雜金色虞喜志林曰東海之魚墜一鱗崑崙之木落一葉聖人皆能知之王韶之始興記曰漢将滅越越王築城伐木将運之一夜木數千頭頓生越王之徵方言曰木細枝謂之杪江淮揚楚之間謂之篾鹽鐵論曰茂木之下無豐草大塊之間無美苖搜神記曰盧江舒縣陸亭流水邉有大樹常有黄鳥數千枚巢其頭下有故祠後見一婦人着繡衣自稱黄祖能興雲雨地境圖曰財在丘􅇕者為木變故木有折枯者其旁有財折所向在焉其在南方去木八尺其在東方去木六尺離騷曰一夫九首㧞木九千又曰嫋嫋兮秋風洞庭波兮木葉下又曰罾何為兮木上又曰攀芙蓉兮木末又曰樹輪囷以相糺兮林木跃􅀈音委枝葉盤紆也左思蜀都賦曰其樹則擢修幹竦長條扇飛雲拂輕霄羲和假道於峻嶺陽鳥回翼乎髙標王彪之閩中賦曰木則藤虹籠采於峻藂流星麗光於髙林松書曰青州厥貢岱畎絲枲鉛松怪石詩曰徂徠之松新甫之栢又曰松栢丸丸松桷有延旅楹有閑又曰山有喬松隰有游龍龍紅草也又曰淇水悠悠檜檝松舟又曰蔦與女蘿施于松栢又曰如松栢之茂無不爾或承如松栢之枝葉常茂盛無衰落時也左傳曰晉侯使張輅輔躒致楚師求御於鄭欲得鄭人自御知其地利故也鄭人卜宛射犬吉子太叔戒之曰大國之人不可與也言不可與等也欲使其卑下人對曰無有衆寡其上一也太叔曰不然培塿無松栢又曰楚郟敖即位王子圍為令尹康王弟鄭行人子羽曰是謂不宜必伐之昌松栢之下其草不殖言楚君弱令尹强物不兩盛禮記曰其在人也如竹箭之有筠也如松栢之有心也二者居天下之大端矣故貫四時而不改柯易葉禮斗威儀曰君乗木而王其政平則松為長生論語哀公問社於宰我宰我對曰夏后氏以松殷人以栢周人以栗又曰嵗寒然後知松栢之後彫也史記曰松栢為百木之長也而守宮闕也漢書曰賈山言治亂曰秦為馳道五十歩三丈而樹厚築其外隐以金椎服䖍曰作壁通道隐築也以鐵椎築之樹以青松為馳道之麗使其後世曾不得逍遥而託足焉應劭漢官儀曰秦始皇上封泰山逢疾風暴雨頼得松樹因覆其下封為大夫松秦山曰岱宗小天門猶有秦時五大夫松張勃吳録曰丁固字子賤會稽人寳鼎中拜司徒初為尚書夢松生腹上謂人曰松字十八公也後十八年為公遂如夢王隠晉書曰山濤遭母䘮歸鄉濤雖年老居䘮過禮手植松栢又曰庾顗見和嶠曰森森如千丈松雖䂺砢多節宜施大厦梁棟之用又曰慕容垂攻符丕丕時粮竭馬無草但削松木而食之宋書曰顧歡好學鄉中有學舍歡貧無以受業於舍壁後倚聼無遺忘者夕則燃松節讀書齊書曰張湛好於齋前種松栢時人曰張湛屋下陳屍梁書曰陶洪景特愛松風庭院皆植松毎聞其響歡然為樂有時獨遊泉石望見者以為仙人陳書曰張譏字直言後主嗣位譏為國子博士秉文事後主常幸鍾山開善寺召從臣坐於寺西南松林下勅譏竪義時索麈尾未至後主勅取松枝手以屬譏曰可代麈尾而顧羣臣曰此乃張譏韻事魏書曰甄琛䘮父於塋兆之内手植松栢隆冬之月負掘水土鄉老哀之咸助力十餘年墳成木茂又曰彭城王從幸代都次于上黨之銅鞮山路大松樹十數根時帝進繖遂行而賦詩令人示􅎰曰吾作詩雖不七歩亦不言遠汝可作之比至吾所令就也􅎰去帝十餘歩遂且行且作未至帝所而就詩曰松林經幾冬山川何如昔風雲與古同嘉話曰賈嘉隠年七嵗以神童召見時太尉長孫無忌司空李勣於朝堂立語􅃧謂隐曰以公配木則為松樹無忌連問之吾配以何樹嘉隐對曰槐樹無忌問何以不能矯對嘉隠應聲曰何須矯對但取其以鬼配木耳穆天子傳曰天子昇長樹之山長樹長松也説苑曰智伯為室美士茁夕焉智伯曰室美矣夫對曰美則美矣意臣亦有懼也智伯曰何懼對曰臣以秉筆事君記有之曰髙山峻原不生草木松栢之地其土不肥今土木勝人臣懼不安人也室成三年而智氏亡矣周書曰太姒夢周梓化為松荘子孔子曰天寒既至霜雪既降吾是知松栢之茂尸子曰荆有長松文梓孫卿子曰嵗不寒無以知松栢事不難無以知君子呂氏春秋曰故百仞之松本傷於下而末槁於上抱朴子曰松三千嵗者皮中有聚芝如龍形名曰飛節芝又曰玊策記稱千嵗松樹四邊披起上抄不長望而視之有如偃蓋其中有物或如青牛青羊青犬或如人服之皆壽萬嵗又曰天陵偃蓋之松大谷倒生之栢凡此諸木皆與天地齊其長乆也又謂夏必長而薺麥枯謂冬必彫而松栢茂符子曰符子登乎泰山下臨千仞之淵上䕃百丈之松蕭蕭然神徃乎一丘矣言不出乎耒耜心不過乎俗人其猶木犬守户瓦鷄司晨矣先聖本記曰許由欲觀帝意曰帝坐華堂面雙闕榮顧亦得矣余坐華堂森然有松生於戸雲生於牖雖面雙闕異乎鸞之榮崑崙余安知其所以取榮哉帝美由師之列仙傳曰仇生赤當湯時為木正常食松脂自作石室周武王祠之偓佺好食松實能飛行速如走馬以松子遺尭不能服異苑曰漢末大亂宮人小黄門上墓樹上避兵食松栢實遂不復飢舉體生毛長尺許亂離既平魏武聞而始收養還食穀米齒落頭白神境記曰榮陽南有石室室後有孤松千丈常有䨇鵠晨必接翮夕輒偶影傳云昔有夫婦二人俱隐此室中年既數百化為䨇鵠一者失之尋為人所害一者獨棲此松㷀立哀哭𤣥中記曰松脂淪入地中千嵗為茯苓博物志曰荒亂不得食可細切松栢葉水送令下隨能否以不飢為度粥清送為佳當用栢葉五合松葉三合不可過度嵩髙山記曰嵩髙上有大松樹或百嵗千嵗其精變為青牛或為伏龜採食其實得長生雲南記曰雲南有丈松子如雜羅松子周景式廬山記曰石門巖即松林也南臨石門澗澗中仰視之離離如駢麈尾號為麈尾松西嶺松如馬鬛有葉五粒者名五粒松服之長生范子計然曰松脂出隴西松膠者善聖賢冡墓記曰東平王無疆傳云王歸國思京師後薨葬東平其冡上松栢皆西靡漢武内傳曰仙之上藥有松栢之膏服之可以延年焦贛易需之坤曰温山松栢常茂不落廣州先賢傳曰顧竒至孝母䘮竒獨立墳歴年乃就居䘮踰制種松栢成行王羲之遊都記曰永寜縣界海中有松門栢島嶼上皆生松故曰松門也豫章記曰徐孺子墳在郡南時杜牧守徐興于墓邉種松太守謝景立碑太守夏侯嵩於碑邉立思賢逸碑今並在松大合抱本草經曰松脂一名松膏一名松肪味苦温中乆服輕身延年世説曰孫興公自建一齋齋名止足齋前種一松枝髙勢逺隣居謂孫曰松樹非不森然可憐但未成棟梁耳孫公曰楓柳雖復合抱亦何所施也又曰李元禮冽冽如長松下風周君颼颼如小松下風金樓子曰梁武帝拜山陵杖而後起涕涙所灑松為變色顏氏家訓曰齊世有席毗者清幹之士官至行臺尚書􅅓鄙文學嘲劉逖云君軰詞藻譬若朝露須臾之翫非宏才也豈若吾徒如千丈松樹常有風霜不可彫悴也劉應之曰可哉西京雜記曰東京龍興觀有古松樹枝偃倒垂相傳云已經千年常有白鶴飛止其間蔡孚賦偃松篇𤣥宗賜和御書刻石記之公卿咸和焉晉陽記曰郡西北有松樹枝條欝茂垂隂數畆傳云陶桓公時來栽此樹夢書曰松為人君夢見松者見人君之徴也宋玊風賦曰夫風縁於太山之阿舞於松栢之下扶風歌曰南山石嵬嵬松栢何離離上枝拂青雲中心大數圍古艷歌曰馬啖栢葉人啖松枝不可常飽聊可遏飢庾肅之松讚曰流潤飛津沈精幽結貞㽔含芳仰拂素雪太平御覽卷九百五十三
