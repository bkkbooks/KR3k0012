body:
  text: 太平御覽卷七百七十四宋李昉等撰車部三輅輿同輿附輦輅釋名曰天子所乗曰玉輅輅亦車也謂之輅言行路也象輅金輅木輅各隨以為所飾名之也書曰大輅在賔階面綴輅在阼階面大輅玉綴輅金面前皆南嚮先輅在左塾之前先輅象次輅木金玉象皆以飾車木則無飾皆在路寢門内左右塾前北面凡所陳列皆象成王生時禮曰大輅者天子之車也又曰鸞車有虞氏之輅也軥音鈎車夏后氏之輅也又曰天子居青陽左个乗鸞輅駕蒼龍天子居明堂左个乗朱輅駕赤駵天子居太廟太室乗大輅駕黄駵天子居總章左个乗戎輅駕白駱天子居𤣥堂左个乗𤣥輅駕鐵驪周禮曰有虞氏尚陶夏后尚匠殷人尚梓周人尚輅又曰王之五路一曰玉路錫樊纓十有再就建太常十有二斿以祀金路鈎樊纓九就建大旂以賓同姓以封象路朱樊纓七就建大赤以朝異姓以封革路龍勒條纓五就建大白以即戎以封四衛木路前樊鵠纓建大麾以田以封蕃國又曰王后之五路重翟錫面朱總厭翟勒面繢總安車彫面鷖總皆有容盖翟車貝面組總有握輦車組輓有翣羽盖左傳曰清廟茅屋大路越音活席大羮不致粢食音寺不鑿昭其儉也又曰賜之大路之服戎輅之服論語曰行夏之時乗殷之輅服周之冕說苑曰晏子朝乗弊車駕駑馬景公見之曰嘻夫子之禄寡耶何乗不佼古巧切之甚也晏子對曰賴君之賜得以壽三族及國交遊皆得生焉臣得煖衣飽食弊車駑馬以奉其身於是足矣晏子出公使梁丘據遺之輅車乗馬三反不受公不恱趣音促召晏子曰夫子不受寡人亦不乗晏子對曰君使臣臨百官之吏節其衣服飲食之養以先齊國之民然猶恐其侈靡而不顧其行也今輅車乗馬君乘之上臣亦乘之下民之無義侈其衣食而不顧其行者臣無以禁之遂讓不受也董巴輿服志曰殷瑞山車金根之色殷人以為大輅於是秦皇作金根之車漢承秦制為乗輿即孔子所謂乗殷之輅也鹵簿令曰玉輅駕六馬太僕卿馭駕士三十二人並平巾幘青衫大口袴千牛衛將軍一人陪乗執金裝長刀御乗輦其輅衫腰輿後行次金輅象輅木輅革輅以次相隨並駕六馬各駕士三十二人並平巾幘大口袴衫色各從輅色巾幘絩袗大袴又曰玉輅青質以玉飾諸末重輿左青龍右白虎金鳳翅畫苣文鳥獸黄屋左纛金鳳一在軾前十二鑾在衡二鈴在軾龍輈設鄣塵青盖繡飾黄裏博山鏡子樹羽輪金根朱班重牙左建旗十有二旒皆畫升龍其長曳地右載闟許及切㦸長四尺廣三尺黻文旂首金龍頭銜結綬垂鈴綏駕蒼龍金綬方釳許乞切插翟尾五焦鏤錫鞶纓十有二就祭祀納后則供之金輅赤質以金飾諸末餘與玉輅同駕赤駵饗射禮還飲至則供之象輅黄質以象飾諸末餘同玉輅駕黃駵行道則供之革輅白質輓之以革餘同玉輅駕白駱巡狩臨兵事則供之木輅黑質以漆飾諸末餘與玉輅同駕黑駵田獵則供之諸盖旌旂及鞶纓皆從輅色盖裏俱用黄其鏤錫與五輅同金根車青質盖三重餘同玉輅籍田則供之又曰皇太子金輅赤質以金飾諸末重較箱畫苣文鳥獸黄屋伏鹿軾龍輈金鳳一在軾前設鄣塵朱盖黄裏輪畫朱牙左建旂九旒右載闟㦸斾首金龍頭銜結綬及鈴綏駕赤駵四八鑾在衡二鈴在軾金鑁方釳插翟尾五焦鏤錫鞶纓九就從事祀享正冬大朝納妃則供之又曰王公以下象輅以象飾諸末朱班輅八鑾在衡左建朱旗旗畫龍升降各一右載闟㦸革輅以革飾諸末左建旜通帛為旜餘同象輅木輅以漆飾之齊國餘同革輅諸皆朱質朱盖朱旗旜一品九旒二品八旒三品七旒四品六旒其鞶纓就數皆准此張平子東京賦曰天子乃撫玉輅時乗六龍又曰乗鸞輅而駕蒼龍又曰奉引既畢先路乃發又曰龍輅充庭雲旗拂霓輿周易曰君子得輿民所載也又曰輿說輻夫妻反目象曰輿說輻中無尤也又曰壯于大輿之輹又曰見輿曳其牛掣其人天且劓无初有終象曰見輿曳位不當也无初有終遇剛也續漢書輿服志曰上古聖人見轉蓬始知為輅行可載因物生智後謂之輿晉書曰王導有羸疾不堪朝㑹顯宗親幸之置酒作樂又詔自今已後輿載入殿不得施拜晉諸公讚曰司徒傅樞以足疾遜位不許板輿上殿晉起居注曰太始四年正月臨軒太宰安平王孚載輿昇殿宋書曰陶潛解印後有脚疾使一門生二兒舉藍輿詣王𢎞既至欣然而與之飲酌語林曰武侯與宣王在渭濵将戰宣王戎服莅事使人視武侯乗輿葛巾持白羽扇指揮三軍皆隨其進止宣王聞而嘆曰可謂名士世說曰孟旭未逹時家貧在京常見王恭乗髙輿服鶴􅌁裘於時㣲雪旭於籬間窺之嘆曰此真神仙中人也陳留耆舊傳曰洛陽令董宣死之日詔使視之有蘭輿一乗白馬一疋帝曰宣之清死乃知之幽明録曰謝安石當桓温之世恒懼不免夜忽夢乗桓輿行十六里見一白雞而止莫有解此夢者及温死後代居宰相歴十六年而得病安方悟云乗桓輿者代居其位也十六里者得十六年也見白雞住者今太嵗在酉吾疾殆不起乎少日而卒淮南子曰以天為盖以地為輿四時為馬韓子曰與人乗輿則欲者貴也非與人仁不貴則不售也潘安仁閒居賦曰太夫人乃御板輿升輕軒逺覽王畿近周家園左太冲蜀都賦曰輿輦雜沓冠帶混并張平子東京賦曰乗輿廵乎岱岳勸稼穡於原陸又曰皇輿夙駕䡨於東階䡨却也曹子建七啟云駕超野之駟乘追風之輿宋玉髙唐賦曰王乃乗玉輿駟倉螭同輿魏志曰太祖軍摩陂召夏侯惇常與同輿載諸将無得比者蜀志曰曹公自東征助先主圍呂布於下邳先主從曹公還表先主為左将軍禮之愈重出則同輿呉志曰太子登字子髙善待僚屬畧同布衣之禮諸葛恪桓譚等同轝而載晉中興書曰紀瞻字士逺為鎮東王左長史丹陽宣城親安三郡中正王常幸瞻家同乗輿還府瞻甚見遇鄉郡榮之輦傳曰猛獲奔衛南宫萬奔陳以乗車輦其母一日而至又曰齊慶克通于聲孟子與婦人䝉衣乗輦而入于閎巷門又曰孟氏之臣秦莒父輦重如役莒父孟獻子家臣歩挽重車以從師榖梁傳曰晉君召伯尊而問焉伯尊來遇輦者不辟使車右下而鞭之爾雅曰徒御不驚輦者也漢書曰淮南王長早失母常附呂后孝惠然常心怨辟陽侯孝文初即位自以為最親驕蹇數不奉法上寛赦之三年入朝從上入苑獵與上同輦常謂為大兄又曰𫝊昭儀有寵於上生定陶恭王多伎藝上甚愛之坐則側席行須同輦又曰班媫妤班况之女孝成帝妃也賢才通辨帝遊於後苑嘗欲與同輦媫妤辭曰觀古賢聖之君皆有名臣在側三代末主乃有嬖妾今欲同輦無乃似之乎上善其言而止太后聞之喜曰古有樊姬今有班婕妤漢武故事曰又起明光宫發燕趙美女二千人充之常從行國載之後車與上同輦者十六人員數常滿又曰上常輦至郎署見一人老郎鬂眉皓白衣服不完上問公何時為郎何其老也對曰臣姓顔名駟江都人以文帝時為郎上曰何其不遇也駟曰文帝好文而臣好武景帝好老臣尚少陛下好少而臣已老是以三世不遇晉書曰山濤呉平之後詔天下罷車役示海内乂安州郡悉去兵大郡置武吏百人小郡五十人帝嘗講武於宣武塲濤時有疾詔乗歩輦從因與盧欽論用兵之本以為不宜去州郡武備其論甚精於時咸以濤不學孫呉而暗與之合帝稱之曰天下名言也而不能用及義寜之後屢有變難冦賊歘起郡國皆無以備制天下遂以大亂如濤言焉又曰張敞東宮舊事太子有坐輦步輿王韶晉書曰義軍起桓𤣥問衆曰朕其敗乎曹靖之對曰神怒民怨臣實憂懼𤣥曰神何為怒民何為怨對曰移晉宗廟飄零落薄無所祭之不及祖先此其所以怒也𤣥曰卿何不諫對曰輦轂諸君子皆以為堯舜之世臣何敢諫又曰梁冀與妻孫夀共乗輦張明盖飾以金銀以騁娯樂晉公卿禮秩曰太宰平王給雲母輦晉太康起居注曰齊王歸藩詔賜衣香輦一乗後魏書禮志曰天樓輦輛十二加以玉飾衡輪雕采與輅同駕牛十二又曰乾象輦羽葆圓盖畫日月五星二十八宿天階雲漢山林雲氣仙聖賢明忠孝莭義遊龍飛鳳朱雀𤣥武白虎青龍竒禽異獸可為飾者皆辨圖焉太皇太后助祭郊廟則乗之鄴中記曰石虎大駕有金銀輦雲母輦武剛輦數百乗虎皇后出乗嵩路輦或玉路輦或朱漆卧輦以純雲母代紗中外四望皆通徹又曰石虎少逰獵體轉壯大不復乗馬作獵輦使二十人擔之如今之歩輦上安徘徊曲盖坐處轉闗若射鳥獸身有所向闗隨身而轉王君内傳曰神人乗三雲之輦拾遺記曰周穆王馭黄金碧玉之輦從朝至暮而窮宇宙之内潘岳籍田賦曰天子御玊輦䕃華盖金根照曜以炯晃龍驥騰驤而沛艾鄒陽上呉王書曰闘城不休救兵不至死者相隨輦車相屬轉粟流輸千里不絶枚叔七發云出輿入輦命曰蹷痿之機又曰輦道邪交湟池紓曲曹子建公讌詩云輕輦隨風移劉公幹公讌詩云輦車飛素質從者盈路傍丘希範應詔詩云輕荑承玉輦細草藉龍騎荑草輦從上行太平御覽卷七百七十四
