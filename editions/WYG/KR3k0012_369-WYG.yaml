front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_369-1a, image: WYG0896/WYG0896-0285a.png}
body:
  text: 太平御覽卷三百六十九宋李昉等撰人事部十頸項肩脾臂腕腋肘頸項釋名曰頸徑也徑挺而長也説文曰頸頭莖也脰項也河圖曰黒帝修頸毛詩碩人曰領如蝤蠐領頸也禮斗威儀曰君乗木而王其民長頸宋均註曰以青龍也春秋元命苞曰北方至寒其人形短頸短頸畏寒傳曰晉伐齊齊侯禦諸平張晉州綽射殖綽中肩兩矢夹脰脰頸也史記曰范蠡遣大夫種書曰越王長頸鳥啄可與共患難不可與共樂又曰沛公軍至㶚上秦王子嬰以組係頸降軹道旁漢書曰張耳陳餘相與為刎頸之交刎頸之交者言契深重雖斷頸絶頭無所顧也又曰周昌嘗燕入奏事髙帝方擁戚姬昌還走髙帝逐得騎昌項問曰我何如主也昌仰曰陛下即桀紂主也又曰蚡取燕王女為夫人太后詔列侯宗室皆徃賀灌夫行酒至臨汝侯灌賢賢方與程不識耳語夫無所發怒詈罵賢坐迺起更衣稍稍去竇嬰去因戯夫戱音麾招麾之令出也夫出蚡遂怒曰此吾驕灌夫罪也迺令騎留夫不得出籍福起為謝按夫項令謝夫愈不肯順蚡迺戯騎令縳夫置傳舍後漢書曰董宣既格殺湖陽公主家蒼頭帝使宣謝公主宣不服上使人按其項於地宣不肯伏因號為强項令魏書曰文帝既立為嗣喜因抱辛毗頸曰辛君知吾喜不魏志曰母邱儉使王傾至海上海上人云得一破船而生人項有面與語不曉不食而死蜀志曰先主率其屬従校尉鄒靖因有功除安喜尉督郵以公事到縣先主求謁不通直入縳督郵杖二百觧綬繫其頸着馬抑棄官七命王隠晉書曰杜預初伐吴吴人知預病癭每見大樹似癭者輙以刀斬破白題曰杜預頸唐書曰屈突通或說歸降義軍通泣曰吾蒙國重恩歴事兩主受人厚禄安可逃難惟死而已自磨其頸曰要當為國家受人一刀耳家語孔子頸似皋陶孔叢子曰子髙逰趙還魯平原君客鄒文李節與子髙别文節流涕交頸子髙撫手而已尸子曰禹長頸鳥啄扶南傳曰毗塞國王身長一文二尺頸長三尺自古不死莫知其年知未然事號為長頸王繁欽三胡賦曰􅄢賔之胡象炙蝟頂須如持囊肩釋名曰肩堅也說文曰肩􅈩也春秋元命苞曰文王龍顔阜肩左傳昭二十年曰衛公孟縶狎齊豹初齊豹見宗魯於公孟薦逹也為驂乗焉將作亂而謂之曰公孟之不若子所知也勿與乗吾將殺之對曰吾由子事公孟今聞難而逃是僣子也使子言不信子行事乎吾將死之公孟有事於盖獲之門外宗魯驂乗齊氏用戈擊公孟宗魯以背蔽之斷肱以中公孟之肩皆殺之又昭二十六年成大夫公孫朝告于齊曰孟氏魯之敝室也敝壊也用成已甚弗能忍也請息肩于齊齊師圍成又定上曰楚子渉睢濟江入于雲中雲夢澤也王寢盗攻之以戈擊王王孫由于以背受之中肩爾雅曰北方有比肩民焉迭食而迭望此即半體之人各有一目一鼻一孔一臂一脚亦猶魚鳥之相合也崔鴻十六國春秋後趙録曰初太武殿既成圖畫自古賢聖忠臣烈士是月皆變為胡状旬餘頭悉入肩中喉冠㠹髣髴㣲出石虎大惡之國語曰叔魚鳶肩其母曰是必為賄死荘子曰支离䟽肩髙於頂又曰盧敖見若士深目鳶肩淮南子曰東方之人鳶肩文北方人大肩梁冀别傳曰冀鳶肩文士傳曰趙益肩髙二尺髙自抗竦為鄉黨所擯車頻秦書曰苻堅生肩背有赤色隠起状如篆文洛神賦曰肩若削成胛釋名曰胛闔也與胷脇背相㑹闔說文曰􅈩肩胛也春秋元命苞曰胛之為言附着也如龍蟠虎伏合附着也吴越春秋曰専諸刺王僚貫胛逹背臂釋名曰臂禆也在傍曰禆也左傳荘公曰初公築臺臨黨氏見孟任従之閟而以夫人言許之則割臂盟公生子般焉又襄二曰公孫丁射尹公佗貫臂春秋元命苞曰湯臂四肘是謂神剛象月推移以綏四方史記曰吴起東出衛郭門與其母决嚙臂而盟曰起不為卿相不復入衛門果如其言漢書曰李廣隴西人猿臂善騎射又曰陳湯擊郅支時中寒病臂不屈伸湯入有詔無拜又王莽𫝊曰甄豐子尋作符命而誅尋手理有天子字莽觧其臂入視曰此一太子也或曰一六子也明尋子父當戮死也又曰劉歆上議曰武帝立五廟國東伐朝鮮起𤣥莬樂浪以斷匈奴右臂西伐大宛結烏孫以裂匈奴左臂續漢書曰單超河南人梁冀振動天下延熹二年皇后崩帝呼單超等入謀誅冀及更召徐璜具瑗等五人遂定其議帝起囓臂出血為盟冀及宗親黨與悉誅之後漢書曰楊璇平蒼梧桂陽猾賊荆州刺史趙凱誣奏璇實非身破賊而妄有其功遂檻車徴璇防禁嚴宻無由自訟乃嚙臂出血以書衣為章具陳破賊形勢以付子弟詣闕通之詔原璇更拜議郎凱受誣人之罪魏志曰太祖所乗馬名絶影被流矢所中并中太祖右臂吴志曰太史慈字子義東莱人也長七尺美鬚髯猿臂善射蜀志曰先主長七尺五寸自頋見耳垂臂下膝又曰闗雲長為矢所中貫在左臂隂雨常痛伸臂與醫刮骨去毒血流盤器雲長割炙引酒自若晉書曰都官従事濟南劉享奏何曽綺麗華飾瑩牛蹄角後曽辟享為掾因小事杖享破臂晉中興書曰交州刺史王諒為州人梁碩所圍城䧟碩逼奪諒節諒不與碩遂斷諒右臂諒正色曰死不畏臂斷何有哉崔鴻十六國春秋後趙録曰石勒引李湯懽酣揚臂笑視之曰卿雖老臂中猶有力頗復與人鬭不孤徃日懕卿老拳後漢記曰姚襄垂臂過膝三國典畧曰陸法何進扵巴陵見王僧辯謂之曰貧道已却侯景一臂更何能為檀越宜即逐取侯景三國典略曰髙歡營主尉景欲執爾朱兆歡囓臂止之唐書曰髙宗幸東都太子於京師監國因留薛元超以侍太子臨行謂元超曰朕之留卿如去一臂闗西之事悉以委卿列子曰甘蠅古之善射者飛衛學射扵甘蠅紀昌學射於飛衛盡衛之術計天下之敵已一人而已乃謀殺飛衛相遇於野二人交射矢鋒觸而隊扵地飛矢先窮紀昌惟一既發飛衛以棘刺之端扞之而無差於是二子泣而投弓相拜於途請為父子尅臂以誓不得告術扵一人荘子曰仲尼謂顔淵曰吾終身與汝交臂而失之可不哀與又曰浸假而化予之左臂以為雞予因以求時夜浸假而化予之右臂以為彈予因以求鶚炙又曰韓衛相争侵地子華子見昭僖侯昭僖有憂色子華子曰今使天下書銘於君之前曰左手攖之則右手廢右手攖之則左手廢然而攖之必有天下君攖之乎僖侯曰寡人不攖也子華子曰自是觀之兩臂重於天下也身又重於兩臂韓之輕於天下逺矣燕丹子曰荆軻拾瓦投龜太子令人奏奉盤金軻用竭復進軻曰非為太子愛金也但臂痛耳淮南子曰羿右臂長而善射新序曰崔杼弑莊公申蒯漁於海將入死之門者以告崔杼令勿内蒯曰汝疑我乎乃斷其左臂以與門者以示杼陳八列令其入蒯拔劍呼天而鬭殺七列不及崔杼一列而死白虎通曰湯臂二肘是謂抑翼攘去不義萬民蕃息璅語曰晉師曠晝侍平公鼓瑟輟而笑曰齊君與嬖人戱墜床傷臂公書記之使問其候果如其言山海經曰長臂國人捕魚水中兩手各操一魚又曰竒肱之人惟有一臂劉欣期交州記曰儋耳之東人臂一骨外國事曰大拳國人猿臂長脇西京雜記曰宣帝被收繫郡部獄臂上猶帶史良娣舍綏宛轉繩係寳鏡一枚幽明録曰有人相羊叔子父墓有帝王之氣叔子於是乃自掘斷墓後相者又云此墓猶當出折臂三公叔子上騎乗及為襄陽縣督盤馬落地遂折臂論衡曰書傳稱曾子孝與母同氣曾子出薪於野客至而欲去曾子母以右手搤左臂曾子左臂立痛即馳至此虛也臂痛曾子臂亦痛母死曾子亦死乎俗說曰釋道安生便左臂上一肉廣一寸許着臂如釧將可上下時人謂之印手菩薩楚辭曰九折臂而成醫腕釋名曰腕者言宛屈也左傳定下曰晉師將盟衛侯于鄟澤趙簡子曰群臣誰敢盟衛君者渉佗成何曰我能盟之將㰱渉佗捘衛侯之手及腕衛侯怒腋釋名曰腋繹也言可張翕尋繹也說文曰胳下也胠腋下也漢書五行志曰髙后八年三月祓覇上還過軹道見物如蒼狗㦸髙后腋忽不見卜之趙王如意為􅑂遂病腋下而崩東觀漢記曰江革為五官中郎将将朝會詔使虎賁迎送扶腋寵遇甚厚孔融上書曰先帝褒厚老臣懼其殞越是故扶接助其氣力三公刺腋近為憂之非警戒也云備大臣非其類也神仙傳曰老子母感大流星而娠懐之七十嵗乃生剖母左腋而出肘釋名曰肘注也可隠注也傳曰師陳於鞌郄克傷於矢曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之又曰欒盈之亂范鞅遇欒樂曰樂勉之死將訟汝於天樂射之不中又注則乗槐本而復或以㦸鈎之斷肘而死春秋後語曰智仲率韓魏之兵以伐趙襄子於晉陽决晉水以灌晉陽之城不没者三板智伯行水魏桓子御韓康㕘乗智伯曰吾不知水之可以亡人國乃今知之然汾水可以灌安邑絳水可以灌平陽魏桓子肘韓康子韓康子履桓子之足接於車上而智伯地分身死國亡為天下笑謝承後漢書曰羊續為南陽太守志在矯俗裳不下膝弹琴出肘叚龜龍凉州記曰吕光左肘生肉印及征西域印内隠起文字曰巨覇也莊子曰子貢徃見原憲憲杖策而應正衿肘見又曰支離叔與滑介叔觀於冝伯之伯之立崑崙之墟黄帝之所休俄而栁生於其左肘其意蹶蹶然惡之支離叔曰子惡之乎滑介叔曰亡予何惡生者假借也假之而生塵垢也生為晝夜且吾與子觀化化及我何惡哉吕氏春秋曰宻子賤治單父恐魯君聽䜛令已不得行術將行請迎史二人俱至單父使其書将書宓子掣其肘書不善則怒史患之請歸報魯君太息曰宓子以此諫寡人自今以去單父非寡人有太平御覽卷三百六十九
