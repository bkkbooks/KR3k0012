body:
  text: 太平御覽卷七百九十宋李昉等撰四夷部十一南蠻六結胷國羽民國讙兜國厭火國三苗國臷國臷徒結切交脛國不死國支舌國三首國焦僥國長臂國三身國一臂國竒肱國丈夫國巫咸國女子國軒轅國白民國長目國無䏿國一目國和利國深目國大人國君子國跂踵國無腸國聶耳國青邱國黑齒國𤣥股國毛民國勞民國氐人國姑射國蜮國沃國反風國林郍國無論國句稚國歌營國加陳國師漢國扈利國姑奴國察牢國類人雕題國狼臙國瓮人黄頭人儋耳國穿胷國西屠國金隣國波遼國屠都乾國波延國究原國奴後國炎人國黄孫落頭民鮫人松外諸蠻結胷國山海經曰結胷國其人結胷郭璞注曰臆前胅出如人結喉也羽民國山海經曰羽民國其人長頭身生羽一曰其人長頰外國圖曰羽民能飛不能逺其人卵産去九疑四萬里讙兜國山海經曰讙兜國其人人面有翼鳥啄讙兜堯臣有罪自投南海而死帝矜之使其子居南海而祠之也一曰讙朱國神異經曰南方荒中有人人手鳥足杖翼而行但食海中魚雖有翼不足以飛倚為徑行勢也一名讙兜為人狼惡姦疎不畏風雨不忌禽獸有所觸犯死乃休耳厭火國山海經曰厭火國其人獸身黑色火出其口中似獮猴黑色也三苗國書曰堯竄三苗于三危山海經曰三苗國在赤水東神異經曰西北荒中忙食有人焉皆人形而腋下有翼不能飛名曰苗民為人饕餮滛逸無禮外國圖曰昔唐以天下授虞有苗之君非之苗之民浮黑水入南海是為三苗氏去九疑三萬三千里臷國山海經曰臷國其為人黄能操弓射蛇一曰盛國在三毛東括地圖曰禹誅防風氏夏德二龍降之禹使范氏御之以行經南方防風國見禹使怒射之有迅雨二龍升去臣俱以刃自貫其心死禹哀之療以不死草皆生是名穿胷去會稽萬五千里交脛國山海經曰交脛國在貫胷東其人交脛外國圖曰交脛民長四尺不死國山海經曰不死國在交脛東其人黑色壽不死有員邱山上有不死樹支舌國山海經曰支舌國在不死東三首國山海經曰三首國一身三首焦僥國後漢書曰安帝永初中永昌徼外焦僥種夷陸類等三千餘口舉種内附獻象牙封牛其人長三尺穴居善游鳥獸懼焉列子曰中州以東三十萬里得焦僥國人長一尺五寸山海經曰周饒國為人短小冠帶一曰焦僥國在三首東也家語曰吳之客問孔子曰人之長極幾何對曰焦僥民長三尺短之極也長者不過十是數之極也外國圖曰焦僥民善没游善捕鷙鳥其草木夏死而冬生去九疑三萬里又曰從啖水南曰焦僥其人長尺六寸一曰迎風則偃背風則伏不衣而野宿長臂國山海經曰長臂國人長一尺五捕魚水中兩手各操一魚也三身國山海經曰三身國一首而三身一臂國山海經曰一臂國在三身北一臂一目一鼻孔竒肱國山海經曰竒肱國其人一臂丈夫國括地圖曰殷帝大戊使王孟採藥於西王母至此絶糧食木實衣木皮終身旡妻而生二子從背間出是為丈夫民去玉門二萬里巫咸國山海經曰巫咸國在女丑北右手操青蛇左手操赤蛇在登葆山羣巫所從上下也操藥徃來外國圖曰昔殷帝大戊使巫咸禱於山河巫咸居於此是為巫咸氏去南海萬千里女子國山海經曰女子國在巫咸北兩女子居水外周之有黄池婦人入浴出即懐孕矣生男三嵗輒死周猶遶也軒轅國山海經曰軒轅國在窮山之際其不壽者八百嵗其國在山南邊也君居日山之南也在女子國北人面蛇身尾交背上不敢西射畏軒轅之丘言敬畏黄帝威靈故不敢向之射也白民國山海經曰白民之國在龍魚北白身被髪其人體洞白也又曰白民之國帝俊生帝鴻帝鴻生白民博物志曰日南有野女羣行不見夫其體皛胡了反白祼􅃝无衣長股國山海經曰長股國在雄常北被髪國在赤水東長臂人身如中人臂長二丈以類推之則此人脚過三丈矣黄帝時至或曰長脚人負長臂人常入海中捕魚無䏿國山海經曰海外自東北陬至無䏿國在長股東為人旡䏿䏿肥腸也其人穴居食土旡男女死即埋之其心不朽死百二十嵗乃復更生也一目國山海經曰一目國一目中其面也和利國山海經曰和利國在一目東為人一手一足反膝曲足居上反卷曲也一曰留利之國人足反折深目國山海經曰深目國為人舉一手一目無腸國山海經曰無腸之國在深目東為人長而無腸聶耳國山海經曰聶耳國在無腸國東為人兩手聶其耳言耳長行則以手攝持之居海水中跂踵國山海經曰跂踵國在拘纓東其人兩足皆大其人行脚跟不着地也一曰踵國大人國山海經曰大人國為人獸身人面大耳珥兩清蛇君子國山海經曰君子國人衣冠帶劍青丘國山海經曰青丘國其人食五穀衣絲帛其狐九尾黒齒國山海經曰黑齒國東夷𫝊曰倭國東四千餘里有祼國東有黑齒國船行一年始可至也異物志云西屠染齒亦以倣此也為人黑齒𤣥股國山海經曰𤣥股之國髀以下皆盡青黒其人衣魚以魚皮為衣食鷗鷗水鳥也毛民國山海經曰毛民國為人身生毛今去臨海郡東二千餘里毛人在大海中洲島上為人短小面體有毛如猪熊穴居無衣服晉永嘉四年吳都司鹽都尉戴建云在海邊得一船上有男女四人狀皆如此言語不通送諸丞相府未至路死有一人在上賜婦生子出入市井中漸曉人語自説其所在是此毛民神異經曰八荒之中有毛人焉長七八尺皆人形身軀頭上皆毛毛如獼猴長尺見人則臭若賜切目開口吐舌上唇覆面下唇覆胷臨海水土物志曰毛人之洲乃在漲嶼身無衣服鑿地穴雖云象人不知言語齊長五尺毛如熊豕衆輩相隨逐捕鳥鼠無五穀惟捕鳥鼠魚肉以為食耳勞民國山海經曰勞民國為人黑食菜菓實也有一鳥兩頭也或曰教民面目手足盡黑氐人國山海經曰氐人國在建木西人面而魚身無足自胷以上人以下魚也姑射國山海經曰姑射國在海中蜮國山海經曰有蜮山者有蜮民之國桑姓射蜮自食蜮短狐也含沙射人中則病死此山出之也沃國山海經曰有沃之國言其土饒沃也沃民是處鳳皇之卵是食甘露是飲凡其所欲其味盡存反風國道書曰反風之國香逆風聞千里也林郍國竹之扶南記曰林郍國蠻其國未多日黎與毗寒同大洲放二萬里無論國南州異物志曰無論國有大道左右種枇杷諸花果白日行其下隂涼蔽熱十餘里一亭皆有井水食麥飯飲蒲桃酒如膠若飲以水和之其味甘美句稚國南州異物志曰句稚去典遊八百里有江口西南向東北行極大﨑頭出漲海中淺而多磁石歌營國南州異物志曰歌營國在句稚南可一月行到其南文灣中有洲名蒲類上有居人皆黑如漆齒耳白眼赤男女皆祼形康泰扶南土俗常望海船過則遮船將鷄猪山果易鐵器加陳國南州異物志曰加陳在歌營西南師漢國南州異物志曰師漢國在句稚西從句稚去行可十四五日乃到其國亦稱王上有神人及明月珠但仁善不忍殺生土地平博民有萬家扈利國南州異物志曰扈利國在奴調洲西南邊海姑奴國南州異物志曰姑奴國去歌營八千里民人萬餘户皆乗四轅車駕二馬或四馬四會所集也舶船常有百餘艘市會萬餘人晝夜作市船皆鳴鼔角人民衣被同中國察牢國南州異物志曰察牢在安息中間大國也去天竺五千里人民勇徤舉國人皆稱王種國旡常王國人常選耆老有德者立為王三嵗一更舉土地所有與天竺同慕其土地不出國逺行類人南州異物志曰扶南海隅有人如獸身黑若漆齒白如素隨時流移居旡常處夏則入水捕魚冬則入山射鹿也食惟魚肉不識禾稼寒旡服以沙自覆時或屯聚猪犬鷄糅雖忝人形旡踰六畜雕題國異物志曰雕題國畫其面及身刻其肌而青之或若錦衣或若魚鱗狼臙國異物志曰狼臙國男無衣服女横布帷出與漢人交易不書市暮夜會俱以鼻齅金則知好惡瓮人異物志曰瓮人齒及目甚鮮白面體異黑若漆皆光譯為奴婢强勒者黄頭人異物志曰黄頭人羣相隨行旡常居處其類與禽獸同或依大樹以草被其枝上而庇隂其下髪正黄如掃箒見漢人散入草終不可得也儋耳國異物志曰儋耳夷生則鏤其頭皮尾相連并鏤其耳匡為數行與額相連狀如雞腹下垂肩上食藷時諸切以績為業穿胷國異物志曰穿胷人其衣則縫布二幅合兩頭開中央以頭貫穿胷不突穿西屠國異物志曰西屠國在海外以草漆齒用白作黒一染則歴年不復變一號黑齒交州南外國𫝊曰有銅柱表為漢之南極界左右十餘小國悉屬西屠有夷民所在二千餘家金陵國異物志曰金陵一名金陳去扶南可二千餘里地出銀人民多好獵大象生得乗騎死則取其牙齒外國𫝊曰從扶南西去金陳二千餘里到金陳波遼國外國𫝊曰從西圖南去百餘里到波遼十餘國皆在海邊屈都乾國外國𫝊曰從波遼國南去乗船行三千里到屈都乾國地有人民可二千餘家皆曰朱吾縣民叛居其中波延國外國𫝊曰從屈都乾國東去船行可千餘里到波延州有民人二百餘家專採金賣與屈都乾國究原國外國𫝊曰究原有獠民出錫鐵雞舌香及赤白五色鸚鵡鳥究原達永昌一嵗奴後國外國𫝊曰從林陽西去二千里奴後國可二萬餘户與永昌接界炎人國博物志曰楚之南炎人之國其親戚死刳肉棄之然後埋其骨乃成孝子黄孫博物志曰黄孫天毒君之孫也名貴貧躁而好自飲汁父母笑之愧而去居此黄孫國去九疑二萬一千里落頭民博物志曰南方有落頭民其頭能飛其種人常有所祭號曰蟲落故因取名焉以其頭飛因眼便去以耳為翼將曉還復着體吳時徃徃得之鮫人博物志曰南海外有鮫人水居如魚不廢織績其眼能泣珠松外諸蠻唐書曰松外諸蠻貞觀末為冦遣兵從西洱河討之其西洱河從巂州西千五百里其地有數十部落大者五六百户小者二三百户無大君長有數十姓以楊李趙董為名家各擅山川不相役屬自云其先本漢人有城郭村邑弓矢矛鋋言語雖小訛舛大畧與中夏同有文字頗解隂陽歴數自夜郎滇池以西皆云莊蹻之餘種也其土有稻麥粟豆種穫亦與中夏同而以十二月為嵗首菜則葱韮蒜䔉菁菓則桃梅李柰有絲麻女工蠶織之事出紽絹絲布廣七寸以下早蠶以正月生二月熟畜有馬牛猪羊雞犬飯用竹筲搏之而取羮用象杯若鷄彛有船無車男子以氊皮為帔女子絁布為裙衫仍披氊皮之帔頭髻一盤而成形如髽阻𤓰切男女皆跣至於死喪哭泣棺槨襲歛無不畢備三年之内穿地為坎殯於舍側上作小屋三年之外出而𦵏之蠡蚌封棺取其耐濕父母死皆斬衰布衣逺者至四五年近者二三年然後即吉其被人殺者䘮主以麻結髪而黑其面衣裳不准緝服内不廢㛰妻不避同姓其俗有竊盜殺人滛穢之事酋長即立一長木為擊鼔警衆共會其下强盜者衆共殺之若賊家富强但燒其屋宅奪其田業而已太平御覽卷七百九十
