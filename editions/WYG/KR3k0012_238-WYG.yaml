body:
  text: 太平御覽卷二百三十八宋李昉等撰職官部三十六大將軍寮屬附車騎將軍驃騎將軍驍騎將軍衛將軍前將軍後將軍左將軍右將軍大將軍史記曰武帝伐匈奴以衛青為大將軍位在諸公上公卿皆拜惟汲黯獨揖有言大將軍尊貴不冝爾黯曰大將軍有揖客獨不貴耶青聞之愈重黯漢書曰武帝以霍光為大將軍輔昭帝田千秋為丞相及昭帝初即位未任聽政事一决大將軍光千秋居相位謹厚有重名光謂千秋曰始與君俱受先帝遺詔令光治内君侯治外宜有以教督使光無負天下千秋曰唯將軍畱意即天下幸甚終不肯有所言後漢書曰竇憲為大將軍威震天下復出屯武威會帝西祠園陵詔憲與車駕會長安及憲至尚書以下議欲拜之伏稱萬嵗韓稜正色曰夫上交不諂下交不瀆禮無為人臣稱萬嵗之制議者皆慙而止又曰詔鄧隲班師朝廷以太后故遣五官中郎將迎拜隲為大將軍到河南使大鴻臚親迎中常侍賫牛酒郊勞王主以下候望於道及至大會羣臣賜束帛焉應劭漢官儀曰和帝以竇憲為大將軍位冠三公又曰梁冀為大將軍以三世姻媾援立之功公卿希有上比伊霍舉髙第茂才官屬皆倍餘府魏志曰文帝以孫權為大將軍吳王加九錫又曰太傅司馬宣王奏免曹爽皇太后詔召髙文惠假節行大將軍事㨿爽宫太傅謂之曰君為周勃矣後魏書曰莫題有謀䇿為大將軍平慕容麟賜爵東宛侯後太祖欲廣宮宇規度平城四方數十里將模鄴洛長安之制運材數百萬以題機巧令監定焉陳思王輔臣論曰知慮深奥淵然難測恭以奉上愛以接下納言左右為帝喉舌曹大將軍也大將軍寮屬魏志曰王謙為大將軍何進長史進以謙名公之胄欲與為婚見二子使擇焉謙弗許以疾免臧榮緒晉書曰魯芝字世英躭思墳籍研精稽古自三代之奥典聖人之㣲言皆該覽焉大將軍曹爽輔政髙選賢明以為官屬延芝為司馬續漢書曰李固字子堅拜議郎為洛陽令大將軍梁冀請為從事中郎晉書曰鄭沖字文和以儒雅為業簞食瓢飲布衾縕袍不以為憂大將軍曹爽以為從事中郎又曰李喜景帝輔政命喜為大將軍從事中郎喜到引見謂喜曰昔先公辟君而不應今孤命君而至何也對曰先公以禮見待喜得以禮進退明公以法見繩喜畏之而至帝甚重之何法盛晉中興書曰郭舒大將軍王敦以為從事中郎會敦討劉隗切諫敦大怒曰人中間言卿癡故炙卿眉頭今疾復發耶勿復語也舒曰明公聽舒一言舒聞古之狂也直周昌汲黯朱雲皆不癡也昔堯立誹謗之木舜懸敢諫之鼓公為勝堯舜耶而乃折舒使不得言敦黙然也竹林七賢傳曰阮籍字嗣宗為太傅司馬宣王叅軍遷景王大將軍從事中郎通典曰從事中郎漢末官也陳湯為大將軍王鳯從事中郎是也在主簿上所掌與長史同華嶠後漢書曰崔駰字亭伯辟大將軍竇憲府掾憲新輔政貴重掾二十人皆故刺史二千石惟駰以處士年少擢在其間憲擅權驕恣駰數諫之出為長岑長不得意不之官而歸華嶠後漢書曰馬融字季長為大將軍鄧隲舎人晉陽秋曰義興周延為左率轉尚書遷大將軍諮議叅軍車騎將軍漢書曰元光元年以中尉程不識為車騎將軍屯鴈門應劭漢官儀曰帝以元舅馬防為車騎將軍銀印青綬吳志曰孫壹奔魏以壹為車騎將軍儀同三司封吳侯以故王芳貴人邢氏妻之邢美色妬忌下不堪命遂共殺壹及邢氏蜀志曰鄧芝字伯苗義陽新野人益州從事張裕善相芝徃從之謂芝曰君年過七十位至大將軍封侯為車騎將軍賞罰明斷善䘏卒伍身之衣食資仰於官不苟素儉然終不治私産妻子不免飢寒死之日家無餘財後魏書曰王衍字文舒為散騎常侍出為征東將軍西兖州刺史衍屇治未幾屬爾朱仲逺稱兵内向州既路衝為其攻逼衍不能守為仲逺所擒以其名望不害也令騎牛從軍久乃見釋還洛陽為車騎將軍隋書曰長孫覽周武帝在藩與覽親善及即位彌加禮焉超拜車騎大將軍毎公卿上奏必令省讀覽有口辯聲氣雄壯凡所宣傳百僚屬目帝毎嘉歎之覽初名善帝謂之曰朕以萬幾委卿先覽遂賜名焉驃騎將軍漢書曰武帝以霍去病為嫖姚校尉征匈奴累有功寵冠羣臣置驃騎將軍秩與大將軍同百官表注曰明帝即位以東平王蒼為驃騎輔政開東閣延英雄及蒼歸國有驃騎時吏丁牧周栩以蒼敬賢下士不忍去之遂為王家大夫數十年事祖及孫帝聞襃美又曰驃騎將軍漢官也長史司馬各一人金章紫綬五時朝服武冠佩山𤣥玉光武中興諸將皆稱大後天下既定武官悉省東觀漢記明帝詔曰東平王蒼寛博有謀可以託六尺之孤臨大節而不可奪其以蒼為驃騎將軍又曰張意拜驃騎將軍討東甌備水戰之具一戰大破所向無前又曰其將軍不常置比公者又有驃騎將軍建武二十年復置驃騎將軍位次公有長史一人後漢書曰劉隆為驃騎將軍行大司馬事隆奉法自守視事八嵗上將軍印綬罷賜養牛上罇酒十斛應劭漢官儀曰漢興置驃騎將軍次相隋書曰崔彭轉驃騎將軍宿衛性謹宻在省闥二十餘年毎當上在仗危坐終日未嘗有怠惰之容上甚嘉之上毎謂彭曰卿當上日我寢處自安又嘗曰卿弓馬固以絶人頗知學不彭曰臣少愛周禮尚書毎於休沐之暇不敢廢也上曰試為我言之彭因說君臣戒愼之義上稱善韋昭辨釋名曰驃騎將軍車騎將軍秩比三公辨云此二將軍秩本二千石世說曰何驃騎弟第五以髙情遜避而驃騎令仕對曰然第五之稱何必減於驃騎陳思王輔臣論曰魁傑雄特秉心平直威嚴足憚風行草靡戎昭果毅折衝厭難者司馬驃騎梁簡文帝讓驃騎揚州刺史表曰常願侯服就列希同特進之班角巾還第不競龍驤之賞而天澤無涯名器總集竊以驃騎之官既為上將神州之重實號中土故以彈壓六戎冠冕九牧豈止司隸綘節金吾緹騎況復任總皇畿位重連率何則驃騎之號歴選為重元狩之中始自去病永平之建特授劉蒼齊獻為公主所申吳漢因羣臣之舉驍騎將軍漢書曰李廣為驍騎將軍後出鴈門擊匈奴匈奴生得廣廣時傷陽死睨傍胡兒善馬暫騰而上南馳得脫廣亡失多當斬贖為庶人東觀漢記曰光武以劉桓為驍騎將軍攻中山又曰建武九年以劉喜為驍騎將軍攻涿郡華嶠後漢書曰馬成字軍遷拜驍騎將軍北屯常山積數年上以其勤勞徵歸京師邉民多上書請之上復以成鎭撫之魏志曰任城威王彰字子文性勇而鬚黄為驍騎將軍北出塞為寇所要彰獨與麾下數百騎突虜王聞之曰我黄鬚兒定可用也又曰董卓立獻帝表太祖為驍騎將軍與計事太祖乃變姓名間行東歸齊書曰江斆為侍中轉都官尚書領驍騎將軍王晏啓武帝曰江斆今重登禮閣兼寄六軍慈渥所覃實有優忝但語其事任殆同閒輩天㫖既欲升其名位愚謂以侍中領驍騎望實清顯有殊納言上曰斆常啟吾為其鼻中惡今既以何𦙍王瑩還門下故有此迴换耳衛將軍漢書曰文帝至渭橋羣臣奉天子法駕迎代邸皇帝即日夕入未央宫夜拜宋昌為衛將軍領南北軍又曰文帝三年遣灌嬰擊匈奴發中尉材官兵屬衛將軍長安晉書曰虞濳字思奥為衛將軍貎如不武内實堅明前將軍漢書曰前後左右將軍皆周末官秦因之位亞上卿金印紫綬又曰武帝征西夷有前後左右將軍宣元以後雜錯更置或為前或為後或為左或為右雖不出征猶有其官在諸卿上為國爪牙所以揚示威靈於四逺折衝萬人如虎如羆又曰左右前後將軍皆周官也秦漢因置以征四夷後雖不征伐其官常存又曰傅喜為右將軍傅太后與政喜數諫后不恱上印綬病在家何武等上疏固請乃拜前將軍魏志曰張遼字文逺鴈門馬邑人也聶壹之後以避怨變姓少為郡吏武力過人文帝即位轉前將軍又黄初二年遼至洛陽宫文帝引遼會建始殿親問破吳意狀帝數息顧左右曰此亦古之劭虎也蜀志曰先主為漢中王遣詩拜雲長為前將軍及聞黄忠為後將軍怒曰大丈夫終不與老兵同列不肯受拜詩謂之曰夫立王業者所用非一昔蕭曹與髙祖少小親舊而陳韓亡命後至論其班列韓最居上未聞蕭曹以為怨也今漢中王以一時之功隆崇於漢升然意之輕重寧當與君侯齊乎王與君譬猶一體同休等戚禍福共之愚謂君侯不冝計官號之髙下爵位之多少也僕一介之使銜命之臣君侯不受拜如是便還但相謂惜此舉動恐有後悔耳乃大感悟即受拜漢升黄忠字也後魏書曰谷楷昌黎人濮陽公渾曾孫也稱有斡局為前軍將軍楷眇一目而性甚嚴忍時人號為瞎虎後將軍漢書曰趙充國為後將軍西羌反上使御史大夫邴吉問誰可將者充國時年七十餘對曰無踰於老臣者矣遣問焉曰將軍度羌虜何如當用幾人充國曰百聞不如一見兵難隃度踰遙也臣願馳至金城圖上方略然羌戎小夷逆天背叛滅亡不久願陛下以屬老臣勿以為憂東觀漢記曰邳彤字偉君信都人也為曲陽卒正更始即位上以大司馬平河北至曲陽彤舉城降為後大將軍魏志曰曹洪為文帝所廢明帝即位拜後將軍蜀志曰黄忠字漢升先主為漢中王欲用忠為後將軍諸葛亮說先主曰忠之名望素非關馬之倫而今使令同列馬張在近親見其功尚可喻指關羽遥聞之恐必不恱得無不可乎先主曰吾當解之遂與羽等同位賜爵關内侯晉中興書曰應詹字思逺太興三年為後軍將軍晉起居注曰太始八年置後軍將軍掌宿衛左將軍漢書曰公孫賀封南窌窌音芳孝反以左將軍出定襄無功失侯又曰辛慶忌字子真為左將軍為國虎臣匈奴西域親附敬其威信東觀漢記曰賈復字君文治尚書事舞隂李生李生竒之謂門人曰賈生容貎志意如是而勤於學此將相之器徵詣洛陽拜左將軍南擊赤眉新城轉西入關擊盆子於澠池破之魏志曰文帝即位以李郃為左將軍詔郃與曹眞討安定盧水胡及東羌晉書百官名臣曰王濟字武子起家中書郎遷左軍將軍山濤啟事曰左將軍裴楷通理有才義右將軍漢書曰常惠以明習外國事勤勞數有功為右將軍又曰何武薦辛慶忌宜在爪牙乃拜為右將軍魏志曰徐晃字公明為右將軍性儉約畏愼為將常逺斥候歎曰古人患不遭明君今我遇之當以功自効蜀志曰諸葛亮上疏曰臣以弱才叨竊非據親秉旄鉞以厲三軍不能訓章明法臨事而懼至有街亭違命之闕箕谷不戒之失咎皆在臣授任無方臣明不知人臨事多闇春秋責帥臣職是當請自貶三等以督厥咎於是以亮為右將軍行丞相事所總制如前何法盛晉中興書曰郭黙為右軍將軍黙既逺人樂為邊將不願内轉謂劉𦙍曰我能禦胡而不用更用虛名者且右軍主禁兵禁兵不妄出有急方便配給兵將無素是謂棄之安得不亂又曰王羲之字逸少導之從子也㓜訥於言人未之知年十三嘗見周顗異之時重牛心炙座客未啖先割啖之羲之於是聞名及長尤善草隸書為今古冠絶累遷為右將軍不樂京師遂徃會稽與謝安孫綽等遊處山隂有道士養羣鵝羲之意甚恱道士云為寫黄庭經當舉羣相贈乃為寫訖籠鵝而去太平御覽卷二百三十八
