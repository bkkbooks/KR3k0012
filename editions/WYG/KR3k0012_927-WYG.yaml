body:
  text: 太平御覽卷九百二十七宋李昉等撰羽族部十四異鳥鵬鷖希有金翅鳥意怠大風兼兼世樂端竒青鳥治鳥木客惡鳥鴞鵩鴝鵅鴆鬼車不孝鳥鵬莊子曰北溟有魚其名為鯤鯤之大不知幾千里化而為鳥其名為鵬鵬背不知幾千里也怒而飛翼若垂天之雲是鳥也海運將徙於南溟南溟者天池也水擊三千里摶扶揺而上者九萬里晏子傳曰景公謂晏子曰天有極大物乎對曰有鵬浮遊雲背陵蒼天該於天地漻漻乎不知其翮之所在也幽明錄曰楚文王好獵有一人獻一鷹擊鵬雛事具鷹門異類傳曰漢武時西域獻黒鷹得鵬雛東方朔識之晉書曰賈彪鵬鳥賦序曰余覽張安世鷦鷯賦以其質為處䙝而陋以逺害愚以為未若大鵬栖形遐逺自育之全也此固禍福之機聊賦之云又曰阮脩夫鵬賛曰蹌蹌大鵬誕自北溟假精靈鱗神化以生如雲之翼如山之形海運水擊扶揺上征又曰習鑿齒詣釋道安值衆僧齋皆捨鉢斂衽唯道安食不輟齒曰大鵬從南來衆鳥皆戢翼向從東老鴟腩腩低頭食鷖一名天雞神異經曰北海有大鳥其高千里頭文曰天維又曰雞左翼文曰鷖右翼文曰勤左足在海北崕右足在海南崕其毛蒼其喙赤其脚黒名曰天雞一名鷖勤頭河東止海央唯捕鯨魚死則北海水流不犯觸人不干物或時舉翼飛其兩羽初如雷如風驚動天地張氏曰先北海多鯨魚而産子多北海屯塞故鳥食此魚海水通流希有東方朔神異經曰崑崙銅柱有屋壁方百丈上有一鳥名希有張左翼覆東王公右翼覆西王母一嵗再登翼之東王公也其啄赤目黄如金其肉苦醎仙人甘之金翅鳥符子曰齊景公謂晏子曰韓人既得寶千乗聚萬駟矣方欲珍懸黎㑹金玉其得之耶奚若晏嬰曰臣琬琰之外有鳥焉曰金翅民謂為羽豪其為鳥也非龍肝不食非鳳血不飲其食也常飢而不飽其飲也常渇而復充生未幾何失其天年而死珠玉之珍非乃為君之患也齊書曰初武帝梦金翅下殿摶食小龍無數乃飛上天明帝初其梦竟驗意怠莊子曰東海有鳥名意怠進不敢為前退不敢為後食不敢先嘗必取其緒行列不斥而人不得害以免于患大風淮南子曰堯使羿繳大風於青丘大風鷙鳥在東方一云大風風伯也兼兼周書曰成王時巴人獻比翼鳥爾雅曰南方有比翼鳥焉不比不飛其名曰兼兼郭璞註曰似烏赤色一曰一翼相得乃飛也山海經曰有鳥其狀如鳬一翼一目相得乃飛名曰蠻比翼鳥色青赤見則大水史記曰管仲說桓公古之封禪南海致比翼之鳥瑞應圖曰王者得其高逺則比翼鳥至一本云王者有徳則至愽物志曰崇吾之山有鳥焉一足一翼一目相得乃飛名曰鶼鶼見則天下大水世樂臨海異物志曰世樂鳥五色頭上有冠丹喙赤足有道則見端琦說苑曰晉平公出朝其鳥環平公不去平公顧謂師曠曰是鳳邪曠對曰東方有鳥名為端琦憎鳥而愛狐令吾君必衣狐裘以朝乎平公曰然青鳥山海經曰三危之山有三青鳥歸青鳥主為西王母使者别自栖息于此山食紀年曰穆王十三年西征直于青鳥之所解漢武故事曰七月七日上於承華殿齋正中忽有一青鳥從西方來集殿前上問東方朔朔曰此西王母欲來也有頃西王母至有二青鳥如挾侍王母旁又曰鉤弋夫人卒上為起通靈䑓常有一青鳥集䑓上晉中興書曰顔含嫂病困須蚺蛇膽不能得含憂歎累日忽有一童子持青囊授含蚺蛇膽也童子化為青鳥飛去神仙傳曰東陵聖母廣陵海陵人杜氏妻也學劉綱道座在立亡杜公不言誣言聖母作奸收付獄聖母從窓中飛去於是逺近為立廟甚有神常有一青鳥在祭所人有失物者青鳥便飛集物上路無失遺晉郭璞青鳥賛曰山名三危青鳥所解往來崑崙王母是𨽻穆王西征旅軫斯地治鳥捜神記曰越地深山有鳥大如鳩青色名曰治鳥穿大樹作窠如五六升器口徑數寸周飾以堊赤白相分状如射侯伐木者見此樹即避之或夜㝠不見鳥亦知人不見已也鳥曰咄咄上去明日便急上去曰咄咄下去明日便宜急下去若不便去但言笑而已可止火也若有穢惡及犯其所止者則虎害之白日見其形鳥也夜聴其鳴亦鳥也時作人形三尺入澗中取石蟹就人間火炙之越人謂此越祝之祖木客異物志曰木客鳥大如雀數千百頭為羣飛集有度不與衆鳥相厠又俗云木客白黄文者謂之君長有翼有綬飛高而正赤者在前謂之五伯居前正黒者謂之鈐下緗色而頳雜者謂之功曹左脇有白帶似鞶囊者謂之主簿長次君後其五曹官属各有章色廬陵郡東有之惡鳥爾雅曰梟鳥郭璞注曰土梟鳥少美長醜為流栗史記曰古者天子常以春祠黄帝用一梟如淳曰漢使東郡送梟五月五作梟羮以賜百官以其惡鳥故食之春秋後語曰蘇代謂魏王曰王獨不見夫博之所以貴梟乎博之堅者為梟楚詞賦云梟而羮乎五百梟克堯切便則食不便則止令主曰事始以行不可更是何言歟王之用智不若梟乎王乃止其行後漢書曰朱浮與彭寵書曰惜乎棄休令之加名造䲭梟之逆謀晉書曰張重華為石季龍所攻重華掃境内使其征南將軍裴恒禦之恒壁於廣武欲以持久弊之張躭舉主簿謝艾兼資文武必能折衝禦侮殲彌凶類重華召艾艾曰昔耿弇不欲以賊遺君父黄權願以萬人當冦乞假臣兵七千為殿下吞王曜麻秋等重華大恱以艾為中堅将軍配歩騎五千擊秋引師出振武夜有二梟鳴於牙中艾曰梟邀也六愽得梟者勝今梟鳴牙中克敵之兆於是進戰大破之斬首五千級又載記曰乞伏乾歸略于五谿有梟集于其手甚惡之六年為兄子公府所殺并其諸子十餘人北史李元忠性甚攻弹嘗從文襄入謁魏帝有梟鳴殿下文襄命元忠弹之問得幾丸而落對曰一丸承大将軍意氣兩丸足矣如其言而落之唐書曰有梟晨鳴于張率更庭樹其家以為不祥連唾之張聞之曰急灑埽吾當改官言未畢賀者已在門淮南子曰白公之嗇財若梟之愛其子也許慎曰梟子大食其母也淮南萬畢術曰甑止梟鳴取破甑瓦向抵之輙自止物相勝其性耶魯連子曰齊辨士田巴服徂丘議稷下毁五帝罪三王離堅白合同異一日服千人有餘刼者子弟百人魯仲連年十二號千金駒往詣田巴曰吾聞白刃交前者不救流矢急不暇救也今楚軍南陽趙代髙唐燕人失守聊城國之危在旦夕先生奈何不能却者先生之言有似梟鳴出聲而人惡之願先生勿復言田巴曰謹聞命矣說苑曰齊景公為露寝之臺成而不通焉栢常騫曰為臺甚急臺成君何為不通焉公曰然梟昔鳴梟者其聲無不惡也吾惡之甚是以不通焉栢常騫曰臣請禳而去之公曰何懼對曰築新室為置白茅焉公使為室成置白茅焉栢常騫夜用事明日問公曰今旦聞梟聲乎公曰一鳴而不復聞使人往視之梟當陛布翼伏地而死又曰梟逢鳩鳩曰子安之梟曰我将東徙鳩曰何故梟曰一鄉皆惡鳴故徙也鳩曰更鳴則可不更鳴東徙亦惡子之聲桓譚新論曰王翁時男子畢康殺其母詔焚燒其屍暴其罪于天下余上章言宣帝時公卿朝㑹丞相語次曰聞梟生子長且食其母然乎有賢者應曰但聞烏子反哺耳丞相大慙君子之於禽獸尚為之諱况人乎又曰余前為典樂大夫有梟鳴于庭樹叢中皆懼余後與典侯闘皆坐免說文曰梟不孝鳥也至日捕梟磔之趙一解㯽賦曰甑瓦可以令梟寂嶺表録異曰北方梟人家以為怪共􅁖之南中晝夜飛鳴與鳥鵲無異桂林人羅取生鬻之家家養使捕鼠以為勝狸鴞禮記内則曰鴞胖人亦尚之毛詩曰墓門有梅有鴞萃止夫也不良歌以訊之又曰翩彼飛鴞集于泮林食我桑揕懐我好音又詩義䟽曰鴞大鳩綠色􅁖聲鳥也入人家凶賈誼所賦是也其肉甚美可為美臛又可炙漢供御物各随其時唯鴞冬夏施以美故也荘子曰見卵而求時夜見弹而求鴞炙魏志曰夫鴞天下賤鳥也及其在林食椹則懐我好音晉書曰王羲之好鴞炙三國典略曰齊大上王武城之長也母曰胡太后梦於海上坐玉盆日入裙下遂有娠生於并州其日有鴞鳴於産帳之上盛宏之荆州記曰巫縣有鳥如雌雞其名為鴞廣志曰鴞楚鳩所生如騾駏􅀈種類不孳乳也鵩西京雜記曰賈誼有長沙鵩鳥集其坐隅而鳴長沙俗以為鵩至人家主人當死誼作鵩鳥賦齊死生等榮辱以遣憂累焉賈誼鵩鳥賦曰誼為長沙王傳三年有鵩鳥飛入舍止於坐隅鵩似鴞不祥鳥也誼既謫居長沙長沙卑濕自傷悼以為夀不長為賦以自廣漢太常孔臧仲尼之後以才學知名作鴞賦曰季夏庚子思道静居爰有飛鴞集我室隅異物之來吉凶是符昔在賈生有識之士忌兹鵩鳥卒用䘮已咨我令考信道秉直變怪生家謂之天神修德威邪化及其鄰梅陶鵩鳥序曰余既遭王敦之難遂見忌錄居於武昌其秋有野鳥入室感賈誼鵩鳥依而作焉神仙傳曰尹軏字公度人有怪鳥鳴其屋上者以語公度公度為一奏符着鳥鳴處其各鳥伏符下死鴝鵅爾雅曰鵅鵋郭璞注曰江東呼鵂鶹為忌欺亦曰鴝鵅音句格纂文曰鵂鶹一名忌欺白日不見人夜能食蚤虱也蚤爪音相近俗人云鵂鶹拾人棄爪相其吉凶妄說也愽物志曰鵂鶹一名鵄鵂晝目無所見夜則目至明人截爪甲棄露地此鳥夜至人家拾取𤓰分别視之則知吉凶凶者輒便鳴其家有殃莊子曰鵂鶹夜撮蚤察秋毫末晝暝目不見丘山殊性也淮南萬畢術曰鵄鵂致鳥取鵄鵂折其大羽絆其兩足以為媒張羅其旁鳥聚矣南史曰侯景入臺城在昭陽殿廊下居處常有鵂鶹鳥鳴呼景惡之使人窮山野捕焉三國典略曰侯景矯豫章嗣王揀命禪位於已將拜受冊命忽有丹嘴鵲集于冊書又夜有鵂鶹鳴于太極殿上景深以為􅁖自控弦伺之鴆廣雅曰鴆雄曰運日雌曰隂諧東觀漢記曰公孫叔欲徴李業為博士業故不起乃遣人持鴆起便賜藥業乃飲鴆而死晉中興書曰穆帝詔曰佽飛督王饒忽上吾鴆鳥一口云以避惡此凶物豈宜妄進於是鞭饒二百使殿中侍御史孫雲楚其鳥於四逹之衢晉書曰石崇出為南中郎將荆州刺史領南蠻校尉加鷹揚將軍崇在南中得鴆鳥雛以畜於後軍將軍王愷時制鴆鳥不得過江為司𨽻校尉傅祗所糺詔原之燒鴆於都街山海經曰女几之山琴鼓之山玊山豐山岷山其鳥多鴆郭璞注曰如鵰紫啄色赤紫食蛇蝮也淮南子曰運日知晏隂諧知雨吴氏本草曰運日一名羽鴆神農本草曰鴆生南方大毒入五臟爛殺人鬼車荆楚嵗時記曰正月七日多鬼車鳥度家家搥門打户捩狗耳㓕燭燈禳之𤣥中記云此鳥名姑獲一名天地少女夜遊取人家女人養之有小兒以血㸃其衣為驗嶺表録異記曰有如鵂鶹又名鬼車春夏之間稍遇隂晦則飛鳴而過嶺外尤多愛入人家鑠人魂氣或云九首曽為犬齧下一首常滴血血滴之家即有凶咎三國典略曰齊後有九頭鳥見色赤似鴨而九頭皆鳴𤣥中記曰姑獲鳥夜飛藏盖鬼神類衣毛為鳥脫毛為女人名為天帝少女一名夜行逰女一名釣星一名隐飛鳥無子喜取人子養之以為子人養小兒不可露其衣此鳥度即取兒也荆州為多昔豫章男子見田中有六七女人不知是鳥匍匐往先得其所解毛衣取藏之即往就諸鳥諸鳥各走就毛衣衣此飛去一鳥獨不得去男子取以為媍生三女其后母使女問父知衣在積稻下得之衣之而飛去後以衣迎三女三女兒得衣飛去今謂之鬼車不孝鳥神異經曰不孝鳥状如人身犬毛有齒猪牙額上有文曰不孝口下有文曰不慈鼻上有文曰不道左脅有文曰愛夫右脇有文曰憐婦天故生此異鳥以顯忠孝也太平御覽卷九百二十七
