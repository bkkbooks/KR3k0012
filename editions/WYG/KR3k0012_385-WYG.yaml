  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_385-1a, image: WYG0896/WYG0896-0417a.png}
body:
  text: 太平御覽卷三百八十五宋李昉等撰人事部二十六㓜智下唐書曰李百藥字重規隋内史令徳林子也為童兒時多疾病祖母趙氏故以百藥為之名七嵗觧屬文父友齊中書舍人陸乂馬元熙甞造徳林讌集有讀徐陵文者云既取成周之禾將刈瑯耶之稻並不知其事百藥時侍立進曰傳稱鄅人藉稻杜預注云鄅國在瑯耶開陽乂等大驚異之又曰禇亮字希明㓜聰敏好學善屬文覽無所不至經目必記扵心喜逰名賢尤善談論年十八詣陳僕射徐陵與商𣙜文章深異之陳後主聞而召見使賦詩江緫及諸詞人在坐莫不推善又曰陳叔逹陳宣帝子年十餘嵗侍宴賦詩十韻援筆便就僕射徐陵甚竒之又曰劉仁軌尉氏人也㓜少恭謹好學遇隋末䘮亂不遑専習每行坐所在輙書空畵地由是慱渉文史又曰權徳輿生四嵗能屬詩七嵗居父䘮以孝聞十五日文數百篇編為童䝉集集十卷名聲日大又曰蔣義字徳源史官呉兢外孫以外舍富墳史㓜便記覽不倦七嵗時誦庾信哀江南賦數遍而成誦在口以聰悟强力聞扵親黨間又曰髙郢子定㓜聰警絶倫七嵗時讀尚書湯誓問郢曰奈何以臣伐君郢曰應天順人不為非道又問曰用命賞于祖不用命戮于社是順人乎父不能對列子曰孔子東逰見兩小兒辯日問其故一小兒曰我以為日始出去人近而日中時逺一兒曰我以為日出時逺而日中近一兒曰初出大如車葢及中才如盤葢此不為逺者小而近者大乎一兒曰日初出蒼蒼凉凉及其中如探湯此不為近者熱而逺者凉乎孔子不能决兩小兒笑曰孰為汝多知乎尸子曰蒲衣生八嵗舜譲以天下周王太子晋生八年而服師曠魯連子曰齊之辯士田巴辯扵狙邱議扵稷下毁五帝罪三王訾五伯離堅白合同異一日而服千人有徐刼者其弟子曰魯連連謂徐刼曰臣願得當田子使之必不復談可乎徐刧言之巴曰走弟子年十二然千里駒也願得待議扵前可乎田巴曰可魯連得見曰今楚軍南陽趙伐髙堂燕人在遼國亡在旦暮先生將奈何田巴曰無奈何魯連曰危不能為安亡不能為存無貴學士矣今先生之言有似梟鳴出聲人皆惡之願先生勿復談也田巴曰謹受教明日見徐刼曰先生之駒乃飛兎腰􅒁也豈特千里哉孔叢子曰孟子居尚㓜請見子思子思見之甚悦其志命子上侍坐焉禮敬子居甚崇子上不願也客退子上請曰白聞士無介不見女無媒不嫁孟孺子無介而見大人道說敬之白也未喻敢問子思曰然吾昔從夫子扵郯遇程子扵途傾葢而語終日而别命子路將束帛贈焉以其道同扵君子也今孟子居孺子也言稱堯舜性樂仁義世所希有也事之猶可况加敬乎又曰子和為臨晋令寢疾不瘳乃命其二子留𦵏焉二子長曰長彦年十有二次曰季彦年十嵗父友西洛人姚進先有道徴不就養志于家長彦季彦常受教焉既除䘮家有先人遺書兄弟相勉諷誦不倦于時蒲坂令許君然造其宅勸使歸魯奉以車二乘辭曰載柩而反則違父遺命舍墓而去則心所不忍君然曰以孫就祖扵禮為得願子無疑答曰若以死有知也祖猶隣宗族焉父獨留此不已劇乎吾其定矣遂還其居扵是甘貧研精墳典十餘年間㑹徒數百故時人為之語曰魯孔氏好讀經兄弟誦講可不聼學士來者有聲名不過孔氏那得成郭氏曰梁國楊氏子年九嵗甚聰慧孔君平詣其父父不在乃呼兒出為設菓菓有楊梅孔指以示兒此君家菓兒應聲荅曰未聞孔雀是夫子家禽周書曰晋平公使叔譽扵周見太子晋與之言五稱而五窮李固列傳曰固被誅弟子汝南郭亮始成童逰學洛下乃詣闕上書乞收固屍不許因往臨哭喪不去太后聞而誅之孔融列傳曰孔文舉年四嵗時每與諸兄共食梨引小者人問其故荅曰我小兒法當取小由此宗族竒之又曰融十嵗隨父詣京師聞漢中李公清亷直亮慕之欲往觀其為人遂造公門謂門者曰我公通家子孫也門者白之公曰髙明父祖甞與孤逰乎跪而應曰先君孔子與明公先李老君同徳比義而相師友則融與明公累世通家坐中數十人莫不歎息咸曰異童子也太中大夫陳偉後至曰人小了了大或未能佳少府尋聲荅曰君子之㓜時豈當慧乎李公撫掌大笑顧少府曰髙明長大必為偉器范曄後漢書云詣李膺也何宴别傳曰宴小時養扵魏公七八嵗天性慧悟衆無智愚莫不貴異之魏武帝讀兵書有所未觧試以問宴一一分散所疑無不氷釋邴原别傳曰原字根䂓十一喪父家貧少孤隣有書舍原過其傍而泣師乃問曰童子何悲原曰一則願其不孤二則羡其得學師亦哀原之言而謂之曰童子苟有志我徒相教不求費也扵是遂就書一嵗之間誦孝經論語管輅别傳曰輅年八九嵗便喜仰視星辰得人輙問其名夜不肯寐自言家雞野鵠猶尚知時况扵人乎與比隣兒共戯土壤中輙書地作天及日月星辰每荅言說事語皆不常宿學耆人不能及父為琅琊顧邱長時年十五來在官舍始讀論語及易便開源布華辭義斐然是時黌上諸生四百餘人皆伏其才琅琊太守單子春雅有才度聞輅一黌之雋欲見之父遣輅造之大㑹賔客百餘人輅既年少懼失精神請先飲三升清酒然後言子春大喜便酌酒獨使飲之春曰吾自欲與卿旗鼔相當扵是唱大語之端遂經乎隂陽子春及衆士卒共攻刼請難風起而輅對答言皆有餘至日向暮酒食不得子春語衆人曰此年少盛有才器聼其言語正似司馬子逰獵之賦何其磥硌雄壯英神暢茂必能明天文地理變化之數扵是發身徐州號之神童傅宣别𫝊曰宣字世和北地况人也年十三而著河喬賦有文義傅嘏别𫝊曰嘏字照先年八嵗䘮母號泣不絶聲自然之哀同扵成人年十四嵗使學疑不再問三年終誦五經皆究其義羣言無不綜覽何禎别傳曰禎廬江潜人父他字文竒有雋才早卒禎在孕而孤生遇荒亂歸扵舅氏齠齓乃追行䘮哀泣合禮鄉邑稱焉十餘荒耽志博覽研精群籍名馳淮泗杜祭酒别𫝊曰君在孩提之中異扵凡童舉宗竒之年六七嵗在縣北郭與小兒輩行竹馬戯有車行老公停車視之歎曰此有竒相吾恨不見徐邈别𫝊曰君諱邈字仙民東莞人岐嶷朗慧聰悟七嵗渉學詩賦成章趙至别傳曰至字景真代郡人流客緱氏令新之官至年十三與母共道傍觀母曰汝先世本非㣲賤家也世亂流離遂為士忤耳後能至此不至荅曰可耳便求就師讀書早起聞父耕叱牛聲釋書而泣師問其故荅曰自傷不能致榮使老父不免勤苦師大異之稱其當為大器傅暢自叙曰暢字洪迎年四嵗散騎常侍扶風魯叔虎以徳量喜與余戯常觧衣褶被其背脫余金環與侍者謂余當懐􅀈之而經數日不索遂扵此見名言論甚重孝子𫝊曰華光字榮祖彭城人年七嵗欲見父像求畫其父形像朝夕拜謁母有病輙呼天禱祠母即瘳愈每得珍甘置父像前劉向别傳曰楊信字子烏雄第二子㓜而聰慧雄笇𤣥經不㑹子令作九數而得之雄又疑易羝羊觸藩彌日不就子烏曰大人何不云荷㦸入榛列子傳曰孔融被誅㓜女七嵗男九嵗以其㓜弱得寄他舍主人有遺肉汁男渇而飲之曰今日之渇豈得久活何頼知肉味乎兄哭泣而止或言扵曹操遂盡殺之及收至女謂兄曰若死者有知得見父豈非至願延頸就刑顔色不變文士傳曰張惇字子純與張儼及朱異俱僮少往見驃騎將軍朱據聞三人才名欲試之曰為吾賦一物然後坐儼賦犬曰守則有威出則有獲韓盧宋鵲書名竹帛純賦席曰席為冬設簟為夏施揖讓而坐君子攸冝異賦弩曰南嶽之幹鍾山之銅應機命中獲隼髙墉㨿大欣悦又曰桓驎字元鳯沛國龍元人伯父焉知名官至太尉驎精好年十三四在烏坐有宿客為詩曰甘羅十二楊烏九齡昔有二子今則桓生恭羗等縱異世齊名驎即應聲荅曰邈矣甘羅超等絶倫卓彼楊烏命世稱賢嗟予蠢弱殊才侔年仰慙二子俯媿過言又曰劉楨字公幹少以才學知名年八九嵗能誦論語詩論及篇賦數萬言警悟辯㨗所問應聲而荅當其辭氣鋒烈莫有折者又曰阮瑀少有雋才應機㨗麗蔡邕學歎曰童子竒才朗朗無雙又曰王弼字輔嗣山陽髙平人㓜聰逹年十餘嵗便能誦詩書讀莊老善通其意又曰杜育童孺竒才博學能著文章心解性逹無所不綜一時稱為舞陽杜孔子三輔决録曰張既字徳容為童兒郡功曹逰殷察異之殷先歸勅家設賔饌及既至殷妻笑曰張徳容童昏小兒何異扵客哉殷曰方伯之器也殷遂與既論覇王之畧饗訖以子楚託之海内先賢傳曰童子汝南謝廣河南趙建年十二通經詔以為二童應化而皆拜郎中汝南先賢𫝊曰郭亮童㓜之年則有尚義之心年十四始欲出學聞頴川杜周甫精黌于長杜亮造門而師學焉朝受其業夕已精講動聲則宫商清暢推義則尋理釋結周甫竒而偉之又曰黄憲字叔度世貧賤父為牛醫潁川荀淑甞至順陽遇憲扵逆旅時年十四淑悚然異之揖與語移日不能去謂曰子吾之師表也既而前至袁閬所曰子國有顔子寧識之乎閬曰君見叔度耶零陵先賢𫝊曰周不疑字文直長安人始嬰孩時已有竒異至年十三曹公聞之欲拜識既見即以女妻之不疑不受時有白雀瑞儒林並以作頌不疑見操授紙筆令復作操異而竒之廣州先賢𫝊曰董正字伯和南海人少有令姿貧寒不戚耽意術籍志在規俗年十五通毛詩三禮春秋㑹稽先賢𫝊曰淳于長通年十七説宓氏易經貫洞内事萬言兼春秋鄉黨稱曰聖童益都耆舊𫝊曰張覇字伯饒蜀郡城都人也年數嵗知禮義鄉人號為張曽子七嵗通春秋復欲進餘經父母曰汝小未能也覇曰我饒為之故字伯饒㑹稽典畧曰王充字仲仁為兒童逰戯不好狎侮父誦竒之七嵗教書數又曰餘姚伍賤字士㣲父為倉監失去官糓簿領自辛至扵死賤為執竿檢校相當由是見異號為神童江氏家𫝊曰江㽔字世林年十一始知樗蒲數以為逰祖毋費為說往事有以博奕破業廢身者扵是即棄五木終身不以為戯荀氏家𫝊曰朂字公魯年十二能通春秋屬文從外祖鍾繇甚竒之常稱此兒當繼司空又曰荀淑子爽字慈明一名諝㓜而好學年十二能通春秋論語太尉杜喬見而稱之曰可為人師爽遂耽思經書慶弔不行徴命不應潁川為之語曰荀氏八龍慈明無雙華陽國志曰童子李餘涪人兄夷殺人亡命母慎當死餘年十二詣吏代母死吏以餘年小不許因自刎死吏以白令令哀傷言郡郡上書出慎太守與令以家財𦵏餘圖畫府庭凉州記曰武王呂光字世明以石氏建武四年生夜有光輝舉舍異之因名曰光年十嵗與諸兄弟扵里巷闕軍戯羣童咸推為主割土處中部分五鄉黨皆時所宗世說曰崔駰有文才不其縣令往造之駰子瑗年九嵗書門曰雖無干木君非文侯何為光光入我閭里令見之問駰曰必兒所書召瑗使書乃書曰君使臣以禮臣事君以忠又曰徐孺子年九嵗常月下戯人語之曰若令月中無物極當明矣徐曰不然譬如人眼中有瞳子無此可不暗乎又曰孔文舉有二女大者六嵗小者五嵗父眠小者床頭盗酒飲之大兒謂曰酒以行禮何以不拜荅曰偷酒那得復行禮又曰夏侯稱字義權自孺子而好合聚衆羣兒為之渠帥戯必為軍旅戰陣之事有違者輙嚴以鞭捶衆莫敢逆父淵隂竒之使讀項羽傳及兵書不肯曰能則自為耳安能學人年十六淵與之畋見奔虎稱驅馬逐之一箭而倒名聞太祖把其手喜曰我得汝矣與文帝為布衣之交每讌㑹景陵一座辯士不能荅世之髙士多從之逰弟榮字㓜權㓜聰慧七嵗能屬文誦書日千言經目輙識文帝聞而請焉賔客百餘人入奏一刺悉書其鄉邑姓氏世所謂爵里刺也示之一過而使遍談不謬一人帝深竒之漢中之敗榮年十三左右提之走不肯曰君親在難焉所逃死乃奮劒戰遂歿又曰孫盛為庾公記室叅軍從獵其第二兒齊莊俱行庾公不知忽扵獵塲見齊莊時年七八嵗謂曰君亦復來耶應聲荅曰所謂無小無大從公于邁又曰何晏年七嵗明慧若神魏武帝竒愛以晏母在宫内欲以為子晏乃畫地令方自處其中曰何氏之廬又曰鍾㑹少有令譽年十二三魏文帝聞之語父繇曰可令卿二子來扵是命見毓面有汗文帝問曰卿面何以獨汗毓對曰戰戰惶惶汗出如漿復問㑹卿何不汗對曰戰戰慄慄汗不得出又曰王戎七嵗甞與諸小兒逰看道邉有李樹子壓枝折諸兒競走取之惟戎不去人問之荅曰樹在道傍而子多苦李也取之信然又曰王濬冲裴叔則二人總角詣鍾士季客問鍾向二童是誰鍾曰裴楷清通王戎簡要二十年此二賢當為吏部尚書冀爾時天下無復滯才語林曰孫策年十四詣袁術俄而外通劉豫州來便求去袁曰劉豫州何若荅曰英雄忌人既出下東階而劉備從西階上但得轉顧是孫足下行殆不復前矣又曰劉道真年十六在門前弄塵垂鼻至胸洛下年少乗車從門過曰年少甚塠􅀈劉便隨車問為惡為善因對曰令君翁塠􅀈毋亦塠􅀈上呼囬反下從囬反太平御覽卷三百八十五
