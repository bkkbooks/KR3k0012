body:
  text: 太平御覽卷五百一十八宋李昉等撰宗親部八子易蠱卦曰幹父之蠱有子考無咎厲終吉又家人卦曰家人嗃嗃悔厲吉婦子嘻嘻終吝儀禮曰父為長子服三年何也正禮乎上又所重也禮記内則曰由命士以上父子皆異宫又祭義曰身也者父母之遺體也行父母之遺體敢不敬乎詩曰貽厥孫謀以燕翼子左傳隠公曰衛莊公之子州吁有寵而好兵公弗禁石碏諫曰臣聞愛子教之以義方不納於邪又宣公上曰楚司馬子良生子越椒子文曰必殺之是子也熊虎之状而豺狼之聲不殺必滅若敖氏矣論語曰陳亢問於伯魚曰子亦有異聞乎對曰未也嘗獨立鯉趨而過庭曰學詩乎對曰未也不學詩無以言鯉退而學詩他日又獨立鯉趨而過庭曰學禮乎對曰未也不學禮無以立鯉退而學禮陳亢退而喜曰問一得三聞詩聞禮又聞君子之逺其子也孝經曰父子之道天性也周書曰周公三撻伯禽徃見啇子啇子曰南山有橋父道也北山有梓子道也盍徃觀之而伯禽徃視梓橋明日朝伯禽俯而趨周公迎而撫之曰汝安見君子哉史記曰吴起衛人好用兵嘗學於曾子事魯君出衛郭門與其母决囓臂而盟曰起不為卿相不復入衛也又曰司馬談為太史天子建漢家之封而太史公留滯周南不得從事發憤而卒子遷適見父於河洛之間太史公執遷手下泣曰其先即周之太史後世中衰絶於余乎汝後為太史則續吾祖矣漢書曰張湯杜陵人父為長安丞父出湯為兒守舍遭鼠盗肉父還怒之笞湯湯掘地燻鼠得餘肉劾鼠掠治訊鞫鞫論報取鼠磔堂下父忽視其文辭如老吏大驚異遂使書獄焉又曰王遵字子貢涿人遷益州刺史先是王陽為益州至卬峽九折坂歎曰奉先人遺體奈何數乗此險後以疾去及遵至此阪問吏曰此非王陽所畏道耶吏曰是遵叱其馭曰驅之王陽為孝子王遵為忠臣又曰曹參代蕭何為相國日夜飲酒子窋為中大夫惠帝怪之令窋言曰無以請事何以憂天下窋洗沐歸具言參怒之乃笞二百曰趣入侍天下事非汝所當言又曰路温舒字長君鉅鹿人父為里門監使温舒牧羊因取澤中蒲截為牒編之寫書又曰揚雄蜀人自揚季至雄五代一子也又曰韋賢字長孺魯人質樸少欲篤志於學通詩書易以教受號鄒魯大儒為丞相薨少子元成字少翁以明經厯位丞相故鄒魯諺曰遺子黄金滿籯不如一經又曰張禹字子文河内軹人父徙家蓮勺禹為小兒數至市卜相者竒其面貌謂禹父曰此兒多智可令經學矣又曰疏廣字仲翁東海蘭陵人也明春秋為太子太傅知止足與兄子受上疏乞骸骨上賜黄金二十斤太子贈五十斤歸郷里請故舊賔客為樂嵗餘子孫竊謂昆弟老人勸説買田宅廣曰吾豈不念子孫哉顧有田廬足供衣食今更增益以為贏餘教子孫怠惰耳賢而多財損其志愚而多財益其過且富者衆之怨也吾既無教化於子孫不欲益其生怨也又曰朱邑字仲卿廬江人少時為桐郷嗇夫病且死囑其子曰我為桐郷吏其民愛我必葬之桐郷後世子孫奉祀我不如桐郷民及死其子葬之民果為起冢立祠又曰石奮從髙祖至景帝時為九卿子慶等四人官至二千石景帝尊寵號為萬石君以上大夫祿歸老於家子孫有過不誚讓便對案不食後漢書曰馮勤字偉伯魏郡人曾祖楊宣帝時為𢎞農太守有子八人皆為二千石魏趙間號萬石君又曰周華字宣光汝南人子勰字臣勝自曽祖楊至勰孫六代一子皆知名又曰吳祐字季英陳留人父恢為南海太守祐年十二隨父到官恢欲殺青簡竹以寫書祐諫曰今大夫踰越五嶺逺在海濵其俗誠陋舊多珍怪上為國家所疑下為權威所望此書若成即載之兼兩昔馬援以薏苡興謗王陽以衣囊徼名嫌疑之間先賢所慎恢竒之乃撫其首曰吴氏世不乏季子矣又曰崔烈涿郡人靈帝開鴻都門牓賣官爵烈入錢五百萬得為司徒及拜日天子臨軒拜百寮畢㑹帝欣謂親幸曰悔不少靳烈至三公聲譽日減烈不自安問子釣曰吾為三公於議如何釣曰嫌大人銅臭烈舉杖撃之釣時為虎賁中郎服虎弁戴鶡尾狼狽而走烈罵曰死卒父撻而走豈孝乎釣曰舜之事父也小杖受大杖走此恐陷父於不義非不孝也烈慙而讓官魏志曰張廣字嗣宗魯第二子也魯雅為魏武所寵諸子未勝纓並遣中使拜授官爵南鄭城碑曰位尊上将體極人臣五子十室榮並爵均童年嬰稚抱拜王人命婚帝族或尚或嬪又曰吳威字伯庸父質操厲清白為荆州太守威至荆州省之十餘日歸質賜絹一匹威跪問曰大人清髙何得此物質曰俸祿之餘耳武帝問威曰卿清何如父清威曰臣不如父逺矣帝曰何對曰父清畏人知臣清畏人不知是以不如也又曰賈充字公閭父逵晚生充言充後當有充閭之慶故名充字公閭晉書曰羊祜字叔子年數嵗令乳母取所棄金鐶乳母曰汝先無此物祜即指隣人李氏東垣桑樹中探得之主人驚曰此吾亡兒所失物也時人謂祜前身為李氏之子又曰華嶠字叔駿才學深博為秘書監性嗜酒率常沉醉撰漢紀九十七卷其十典未成而終秘書監何劭奏嶠子徹為佐著作續成之亦未竟而卒又曰王隱字處叔陳人世寒素父銓歴陽令有著述志每私録晉事及功臣行狀未就而卒隠儒素自守不交權貴博學多聞受遺業為著作郎令撰晉史又曰孫盛字安國次子放字齊荘幼稱令惠年七八嵗在荆州與父俱從庾亮出獵亮謂曰君亦來耶放應聲答曰無小無大從公于邁亮曰欲齊何莊放曰齊莊周亮曰不慕仲尼耶放曰仲尼生而知之者非所企及亮大竒之曰王輔嗣不過也又曰庾翼字稚恭孫盛字安國翼子愛客常候孫盛盛不在見盛子放謂之曰安國何在放曰徃稚恭家愛客曰孫氏大盛有兒如此放曰不如諸庾之翼翼既而語人曰我固得重呼奴父乎又曰袁宏為東征賦並列過江諸名德獨不載桓彛其子温怒焉宏一時之文宗為文不欲令人顯問時並遊青山飲歸温命宏同載因問曰君作東征賦何獨不及家君宏對曰尊公稱謂非下官敢專既未遑啓不敢顯之温疑其不實乃曰欲謂何宏曰風鑒散朗或搜或引身雖可亡道則不殞宣城之節信而為允也温泫然而止又不及陶侃侃子胡奴常於曲室抽刀逼問宏曰家君勲績如此云何相忘宏急答曰精明百錬在割能㫁功以濟時識以靜亂長沙之勲為史所讃胡奴乃止又曰謝尚字祖仁豫章太守鯤之子也八嵗神悟夙成鯤嘗攜之或曰此兒一座顔囘也尚應聲曰座無尼父焉别顔回一席之賓莫不驚異又曰王述字懐祖遷尚書僕射述每受職不為虛讓其子坦之諫曰故事應讓述曰汝為我不堪也坦之曰非也但克讓自美事耳述曰既云堪何為復讓也人謂汝勝我殆不如也坦之為桓温府功曺見温時倒執手板真不如父也温子欲求婚於王因坦之言於父坦之還家省父而述愛坦之雖長大猶抱之於膝上坦之乃言婚事於述大怒遽推坦之於膝下曰汝竟癡也詎可以女妻兵乃止又曰阮籍謂王渾曰濬冲清賞非卿倫也共卿言不如共阿戎談及戎子邁有美名少而肥大戎令食糠益轉肥也又曰王祥二子烈芬並知名為祥所愛同時而病将亡遺囑烈欲還葬舊土芬欲留𦵏京邑祥涕泣曰不忘郷仁也不戀本達也惟仁與達二子有焉又曰王衍䘮幼子山簡弔之衍悲不自勝簡曰孩抱中物何至於此衍曰聖人忘情下人不及情情之所鍾正在吾輩也簡服其言更為之慟又曰魏舒字陽元為司徒子混字延廣有才行為太子舍人年二十七卒朝野咸為舒惜每哀慟退而歎曰吾不及荘生逺矣豈以無益自損更不復哭又曰胡母輔之字彦國嗜酒子謙字子光才學不及父而傲縱過之至酣醉時常自呼其父字輔之不以介意世以為狂又曰石崇字季倫渤海南皮人苞之少子也生於青州故小名齊奴少敏惠勇而有謀父苞臨終分財與諸子獨不及倫其母為言之苞曰此兒雖少後自能致又曰郗超字景興一字嘉賓父愔為司徒愔事道超奉佛愔好聚積錢數千萬常開庫任超所取超性好施一日之中散與親故都盡桓温辟為征西大将軍椽温懐不軌超為之謀轉司徒左長史而卒初雖黨桓氏以愔忠於王室不軌之事不令愔知将死出一箱書付門生曰本欲焚之恐父年老老必傷愍為弊我亡後若大損寝食可呈此箱不爾即便焚之愔果哀悼成病門生依旨呈之則悉與温徃反宻計悉見愔於是大怒曰小子死恨晩矣更不復哭又曰庾氷字季堅都督江荆七郡軍事子襲常貸官絹十疋氷怒捶之市絹十疋還官又曰王濛字仲祖父汭字文開為當塗令美姿容嘗覽鏡自照稱其父字曰王文開生如此兒又曰王導字茂𢎞子恱字長豫弱冠有髙名事親色養導甚愛之常與恱奕棋爭道導笑曰相與有瓜葛那得爾耶導性儉帳下甘果爛敗令棄之云勿使大郎知恱為中書郎先導卒導先夢人以百萬錢買恱潛為祈禱者備矣尋掘地得錢百萬意甚惡之一一皆藏閉比恱疾篤導憂念特至不食積日忽見一人形狀甚偉被甲持刀導問是何人曰僕蔣侯也公兒不佳欲為請命故來耳導因求之食至數斗食畢謂導曰中書命盡非可救也言訖不見恱亦殞絶又曰劉殷字長盛新興人有子七人五人各授一經其一子授太史公記一子授漢書一門之内七業俱興北州之學殷最為盛門又曰索靖子琳字巨秀少有逸群之才靖每曰琳宗廟之器非簡劄之用州郡之任不足汚吾兒也又曰戴若思廣陵人父昌㑹稽太守若思徃武陵時郡人潘京素有理筌識鑒父遣若思與語潘稱若思有公輔之才又曰王獻之字子敬羲之子也謝安甚欽之請為長史因問獻之曰君書何如尊君答曰固不同安曰外論不爾對曰人那得知獻之嘗書義之自後掣其筆不得嘆曰此兒當有大名又以掃箒沾泥書大字方一丈甚以為工宋書曰戴顒字仲若淮南人父逵喜琴顒及兄勃並受琴於父父歿所傳之聲不忍復奏各造新弄五部顒又製長弄一部並傳於世齊書曰世祖常問王儉當今誰能作五言詩對曰謝朏得父之膏腴梁書曰謝朏祖𢎞微宋太常卿父莊齊光祿朏十嵗能屬文莊多遊山水賦詩使朏命篇􅄃筆便就王景文謂荘曰賢子足稱神童荘笑曰真吾家千金又曰王僧孺父延年為常侍僧孺五嵗父友饋延年柰者先與僧孺孺曰大人未見不敢先嘗不受又曰栁惲字文暢父世隆善彈琴為士流第一惲每奏其聲常感傷憂思後因之變體寫古曲家語曰吳延陵季子聘於上國其長子死葬於嬴博之間歛以時服其坎深不至泉其髙可隠孔子曰延陵季子之合於禮也列子曰魏人有東門吳者年四十有一子喪之而不憂其相室曰公之愛子也天下無有今子死不憂何也東門吳曰吾嘗無子之時不憂今子死乃與向無子同又奚憂焉吕氏春秋曰晉平公問祈黄年曰國無尉其誰可乃云其子君子聞之曰祈黄年可謂至公矣三輔要録曰韋康字元將京兆人孔融與康父端書曰前見元将來淵才髙茂雅度𢎞毅偉世之器也昨日又見弟仲将來懿性真實文敏篤誠保家之主也不意雙珠出於老蚌郭子曰楊脩字德祖九嵗聪惠孔文舉詣其父父不在乃呼脩脩為設果果有楊梅融指視曰此爾家果耶脩應聲曰未聞孔雀是夫子家禽也姓氏英賢録曰宋顔竣字士遜有令名太祖問其父延之曰諸子誰有卿風延之曰竣得臣筆測得臣文夐得臣義濯得臣酒世說曰豫章太守顧雍之子在郡卒雍時盛集賓客自與客碁而信至無兒書雖神色不變而心了其故以爪掐掌流血沾襟客散方歎曰已無延陵之髙豈有喪明之痛於是豁然神氣自若又曰客有問陳季方曰足下家君有何功徳而荷天下之重名季方曰吾家君譬如桂樹生於太山之阿上有萬仞之髙下有不測之淵上為甘露所沾下有淵泉所潤當此之時焉知有太山之髙淵泉之深不知有功德與無也太平御覽卷五百一十八
