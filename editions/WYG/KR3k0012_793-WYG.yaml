body:
  text: 太平御覽卷七百九十三宋李昉等撰四夷部十四西戎二罽賔條支安息大月氐大宛踈勒康國副貨安國烏萇烏郍曷渴槃陁本和大夏米國鄧至安息乙弗敵伏盧尼石國宕昌鏺汗色和顯伽色尼白蘭乾陁史國師子穆國奄蔡何國嚈噠罽賔漢書曰罽賔國王治循鮮城去長安萬二千二百里地平温和有苜蓿雜草花木檀櫰栢竹漆種五糓蒲陶有金銀銅錫以金銀為錢文為騎馬幕為人面師古曰即漫也出封牛水牛象大狗沐猴孔雀珠璣珊瑚琥珀璧瑠璃自武帝始通唐書曰貞觀十六年罽賔國遣使獻褥特鼠喙尖而尾赤能食蛇有被蛇螫者鼠輙嗅而尿之其瘡即愈條支漢書曰條支國臨西海暑濕田宜稻有大鳥卵如甕後漢書曰條支國城在山上周廻四十里臨西海水曲環其南及東北三面路絶唯西北隅通陸出獅子犀牛安息漢書曰安息國王治畨兠城去長安萬一千六百里風氣物類與罽賔同亦以銀為錢文獨為王面幕為夫人面王死輙更鑄錢有大馬大爵其屬小大數百城方數千里最大國臨媯水商賈車船行旁國畫革旁行為書記師古曰西方之國書皆横行不直下也武帝始遣使至安息王令將二萬騎迎於東界去王都數千里行比至過數十城民人相屬因發使隨漢使者以大鳥卵及犂靬眩人來獻天子大悅後漢書曰章帝章和元年安息王遣使獻獅子符㧞形似麟無角也北史曰周武天和二年其王遣使朝獻大月氐漢書曰大月氐國治監氏城去長安萬一千六百里物類民俗與安息同出一封橐駝師古曰脊上有一封也控弦十餘萬故強輕匈奴師古曰恃其強盛而輕易匈奴也至冒頓單于攻破月氐以其王頭為飲器月氐乃逺去過大宛西擊大夏而城之北史曰大月氐北與蠕蠕接數為所侵遂西徙都薄羅城其王寄多羅勇武遂興師越大山南侵北天竺自乾陁羅以北五國盡屬之後魏太武時其國人商販京師自云能鑄石為五色琉璃於是採礦山中於京師鑄之既成光澤美於四方來者乃詔為殿容百人光大映徹自此中國琉璃遂賤異物志曰月氐俗乗四輪車或八牛可容二十人王稱天子大宛漢書曰大宛國王治貴山城去長安萬二千五百五十里以蒲桃為酒富人藏酒至萬餘石久者至數十嵗不敗其俗嗜酒宛别邑七十餘城多善馬馬汗血言其先天馬子也孟康曰言大宛國有髙山其上有馬不可得因取五色母馬置其下與集生駒皆汗血因天馬子云張騫始為武帝言之上遣使持金馬以請宛王不肯於是天子遣貳師將軍李廣利將兵伐宛連四年宛人斬其王毋寡首獻馬三千匹漢軍乃還又曰宛王蟬封與漢約嵗獻天馬二疋漢使采蒲桃苜蓿種歸天子以天馬多益種蒲桃苜蓿離宫舘旁極望焉異物志云大宛馬有肉角數寸觧人語及知舞與皷節相應西域圖記曰其青馬騮馬多白耳白馬驄馬多赤耳黄馬赤馬多黒耳踈勒漢書曰踈勒國王治踈勒城去長安九千三百五十里後漢書曰耿㳟為戊巳校尉引衆入踈勒城中乏水穿井十五丈不得水恭整衣服向井拜飛泉湧出賊遂退異物志曰踈勒國高宗末其王遣使送釋迦佛袈裟長二丈五尺有餘髙宗以審是佛衣應有靈異遂燒之以騐虛實置於猛火之上經日不燃觀者莫不悚駭心懼後每使朝貢隋書曰踈勒國都白山南百里其王字阿你厥手足皆六指産子非六指者不育王戴金獅子冠多稻粟麻麥銅鉄銀雌黄唐書曰踈勒國王姓裴俗事祅神有胡書文字貞觀九年遣使獻名馬又曰開元六年𤣥宗遣使冊立其王裴安定為踈勒王康國隋書曰康國者康居之後遷徙無常不恒故地然自漢以來相承不絶其王本姓温月氐人也舊居祁連山北昭武城因被匈奴所破西踰葱嶺遂有其國支庶各分王故康國左右諸國並以昭武為姓示不忘本也王字代失畢為人寛厚甚得衆心其妻突厥達可汗女也都於薩寳水上阿禄迪城大臣三人共掌國事其王索髪冠七寳金花衣綾羅錦繡白疊其妻有髻幪以皂布丈夫剪髪錦袍名為強國而西域諸國多歸之又曰有刑律置於祅祠决罸則取而斷之重罪者族次重者死賊盗截足人皆深目髙鼻多鬢髯善於商賈諸夷交易多凑其國有大小皷琵琶五弦箜篌笛婚姻䘮制與突厥同國立祖廟以六月祭之諸國皆來助祭俗奉佛為國書氣候温宜五糓勤修園蔬樹木滋茂出馬駞驢封牛黄金碙沙甘香阿薩郍香瑟瑟麖皮氍㲣錦疊多蒲桃富家或致千石連年不敗大業中始遣使貢方物後遂絶焉唐書曰康居人多嗜酒好歌舞於道路生子必以蜜納口中以膠置掌内欲其成長口嘗甘言掌持錢如膠之粘物又曰以十二月為嵗首有婆羅門為之占星候氣以定吉凶頗有佛法至十一月皷舞乞寒以水相潑盛為戱樂又曰貞觀九年遣佛貢獅子太宗嘉其逺至命秘書監虞世南為之賦自此朝貢至十一年入獻金桃銀桃詔令植之於苑囿又曰萬嵗通天年中則天封其大首領篤婆鉢提為康國王仍拜左驍衛將軍又曰開元六年遣使貢獻鏁子甲水精盃馬瑙鉼駞鳥卵之類副貨北史曰副貨國去代一萬七千里東至阿副使且國西至沒誰國中間相去一千里南有連山不知名北至竒沙國相去一千五百里國中有副貨城周匝七十里宜五糓蒲桃唯有馬駞騾國王有黄金殿殿下有金駞七頭各高三尺其王遣使朝貢安國隋書曰安國漢時安息國也王姓昭武氏與康國王同族字設力登妻康國王女也都在郍宻水南城有五里環以流水宫殿皆為平頭王坐金駞座高七八尺每聼政與妻相對大臣三人評理國事風俗同於康國唯妻子姊妹及母子逓相禽獸此為異也煬帝即位之後遣司𨽻從事杜行滿使於西域至其國得五色塩而反西百餘里有畢國可千餘家其國無君長安國統之大業五年遣使貢獻後遂絶焉烏萇北史曰烏萇國在賖彌南北有葱嶺南至天竺婆羅門胡為其上族婆羅門多解天文吉凶之數其王動則訪决焉土多林菓引水灌田豐稻麥事佛多諸寺塔寺極華麗人有爭訴服之以藥曲者發狂直者無恙為法不殺犯死罪唯徙於林山西南有檀特山山上立寺以驢數頭運食山下无人控御自知徃來烏郍曷隋書曰烏郍曷國都烏滸水西舊安息之地王姓昭武亦康國種類字佛食都城方二里勝兵數百人王坐金羊座東北去安國四百里西北去穆國二百餘里東去𤓰州七千五百里大業中遣使貢方物渇槃陁北史曰渇槃陁國在葱嶺東朱駒婆西河經其國東北流在高山夏積霜雪亦事佛道附於嚈達通典曰渇槃陁後魏時通焉亦名漢陁國亦名渇陁國理葱嶺中在朱俱婆國西至䕶宻國北至踈勒國其王本踈勒人累代相承居此國有户二千餘有懸度山在在國南四百里懸度者山名也谿谷不通以䋲索相引而度其間四百里中徃徃有棧道因以為名今按懸度葱嶺邐迤相屬郵置所絶道阻且長故行人由之莫能分别然法顯宋雲所經即懸度山也又有頭痛山在國西南向罽賔歴大頭痛小頭痛之山赤土身熱之坂宋膺異物志曰大頭痛小頭痛山皆渠捜之東踈勒之西經之者身熱頭痛夏不可行行則至死惟冬可行尚嘔吐山有毒藥氣之所為冬乃枯歇故可行也鉢和北史曰鉢和國在渇槃陀西其土尤寒人畜同居穴地而處又曰大雪山望若銀峰其人惟食餅麵飲麥酒服氊裘有二道一道西南向嚈噠一道西南趨烏萇亦為嚈噠所屬大夏史記曰大夏在宛西南二千餘里媯水南其俗土著有城屋與大宛同俗無大君徃徃城邑寡小其兵弱畏善賈及大月氐西徙皆臣畜大夏人可萬餘其都曰藍市城有市販賣諸物東南有身毒國張騫曰臣在大夏時見笻竹杖蜀布問曰安得此大夏國人曰吾賈人徃市之身毒身毒國在大夏東南可數千里米國隋書曰米國都郍宻水西舊康居之地也無王其城主姓昭武康國王之支庶字閉拙都城方二里勝兵數百人西北去康居百里大業中頻貢方物鄧至通典曰鄧至羗之别種也後魏時通焉有像舒理者代為水酋帥因地名為號稱鄧至王其地自干亭以東平武以西汶嶺以北宕昌以南風土習俗與宕昌同魏㳟帝初其主檐術因亂來奔周文帝遣兵送還自後旡聞安息北史曰安息國在葱嶺之西都尉捜城西與波斯相接東去長安一萬七千五百里周武太和二年其王遣使來獻乙弗敵通典曰乙弗敵後魏時聞焉在吐谷渾北國有屈海週廻千餘里衆有萬落風俗與吐谷渾同然不識五糓唯食魚與蘓子蘓子狀若中國枸杞子或赤或黒西有契翰一部風俗亦同土特多狼伏盧尼北史曰伏盧尼都伏盧尼城在波斯國北去代二萬七千三百二十里累石為城東有大河流中有鳥其形似人亦有如橐駞馬者皆有翼常居水中出水便死城北有云尼山出銀珊瑚琉璃琥珀多獅子石國隋書曰石國居藥殺水都城方十餘里其王姓石名湼國城之東南立屋置座於中正月六日七月十五日以王父母燒餘之骨金甕盛之置于牀上廵遶而行散放花香雜菓王率臣下設祭焉禮終王與夫人就别帳臣下以次列坐享罷有粟麥多良馬其俗善戰曽貳於突厥射匱可汗興兵滅之令特勒甸職攝其國事大業五年遣使朝貢其後不復至宕昌通典曰宕昌羌後魏時興焉亦三苖之次嗣與先零燒當罕开諸部姓别自立帥皆有地分不相統攝宕昌即其一也俗皆土著居有棟宇其屋織􅈊牛及羖羊毛覆之无法令徭賦唯征伐之時乃相屯聚不然則各事生業不相來徃皆衣裘褐牧養􅈊牛羊豕以供其食俗有蒸報无文字但取木榮落以記嵗時三年一相聚殺牛羊以祭天俗重虎皮以之送死有梁勤者代為酋帥得羌豪心乃自稱王其界自仇池以西千里席水以南南北八百里地多山阜部衆二萬餘落至其孫彌忽始遣使於後魏太武帝拜為宕昌王七葉孫彌秦皆受南北兩朝封爵後見兩魏分隔永熈末種人企定乃引吐谷渾冦金城後企定冦石門後周武帝天和中詔大將軍田𢎞討平之以其地為宕州鏺汗隋書曰鏺汗國都葱嶺之西五百餘里古渠捜國也王姓昭武字阿利㭍都城方四里勝兵數千人王坐金羊床妻戴金花多朱沙金鐵東去䟽勒千里大業中遣使貢方物色知顯北史曰色知顯國都色知顯城在悉萬斤西方北去代一萬二千九百四十里地平多五菓伽色尼北史曰伽色尼國都伽色尼城在悉萬斤南去代一萬二千五百里土出塩多五菓白蘭通典曰白蘭羗之别種後周時興焉東北接吐谷渾風俗物産與宕昌同周武帝保定元年朝獻使至乾陁北史曰乾陁國在烏萇西本名業波為嚈噠所破因改焉好征戰與罽賔闘三年不罷人怨苦之有闘象七百頭十人乗一象皆執兵仗象鼻縛刀以戰所都城東南七里有佛塔高七十丈周三百歩即所謂雀離佛圖也史國隋書曰史國都獨莫水南十里舊康居之地也其王姓昭武字逖遮亦康國王之支庶也城方二里勝兵千餘俗同康國北去康國二百四十里南去吐火羅五百里大業中遣使朝貢獅子通典曰獅子國東晉時通焉天竺旁國也西海之中延袤二千餘里多出竒寳地和適無冬夏之異五糓隨人所種不須時節其國舊無人止有鬼神有龍居之諸國商賈來共市易鬼不見其形但出珍寳明其所堪價商人依價取之諸國人聞其土樂因此競至或有停住者遂成大國能馴養獅子遂以為名風俗與婆羅門同而尤事佛法安帝義熈初遣使獻玉佛象象高四尺二寸玉色潔潤形制殊特若非人功歴晉宋代在建康瓦官守之又曰宋文帝元嘉五年其王刹利摩訶南遣使貢獻梁武帝大通元年後王迦葉伽羅訶犂耶亦遣使貢獻穆國北史曰穆國都烏滸河之西亦安息之故地與烏郍曷為隣其王姓昭武亦康國王之種類也字阿濫宻都城方三里勝兵二千人東北去安國五百里西去波斯國四千餘里大業中遣使貢方物奄蔡通典曰奄蔡漢時通焉西接大秦東南二千里與康居接去陽關八千餘里控弦十餘萬土氣溫和臨大澤無涯岸多楨松白草及貂至後漢改名阿䦨郍國後魏時曰粟特國一名溫郍沙何國北史曰何國都郍宻水南數里舊是康居地也其王姓昭武亦康國王之族類都城方二里勝兵者千人其王坐金羊座東去曺國百五十里西去小女國三百里東去𤓰州六千七百五十里大業中遣使貢方物嚈噠北史曰嚈噠國大月氐之種類也亦高車之别種其原出於塞北自金山而南在于闐之西都烏滸水南二百餘里去長安一萬一百里其王都㧞底延城蓋王舍城也其城方十餘里多寺塔皆餙以金寳風俗與突厥畧同兄弟共一妻無兄弟者妻帶一角㡌有兄弟者依其多少之數更加㡌焉衣服類加以纓絡頭皆剪髪其語與蠕蠕髙車及諸國不同衆可十萬無城邑依隨水草以氊為屋夏遷凉土冬逐暖處其王分諸妻各在别所相去或一二百里廵厯而行每月一處冬寒之時三月不徙王位不必傳子子弟堪者死便授之其國無車輿多駞馬用刑嚴急偷盗無多少皆要斬盗一責十死者富家累石為藏貧者掘地而埋隨身諸物皆置冡内人能鬪戰西域康居于闐安息及諸小國三十許皆役屬之號為大國又曰後魏明帝熈平中遣宋雲沙門法力等使西域求佛經時有沙門慧生者亦與俱行正光中還慧生所經諸國不能知其本末及山川里數盖舉其略云太平御覧卷七百九十三
