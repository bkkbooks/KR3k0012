  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_303-1a, image: WYG0895/WYG0895-0623a.png}
body:
  text: 太平御覽卷三百三宋李昉等撰兵部三十四征伐征伐上釋名曰伐豁也所向莫敢當前豁然破散也書曰葛伯讐餉湯初征自葛始東征西夷怨南征北狄怨曰奚獨後予易曰髙宗伐鬼方三年克之詩曰東山周公東征也我徂東山慆慆不歸我來自東零雨其濛又曰六月宣王北伐也六月棲棲戎車既飭四牡騤騤載是常服薄伐玁狁以奏膚功有嚴有翼共武之服又曰采芑宣王南征也蠢爾蠻荆大邦為讐又曰赫赫南仲薄伐西戎又曰浩浩昊天不駿其徳降喪飢饉斬伐四國又曰篤生武王保祐命爾燮伐大商燮和也又曰維師尚父時維鷹揚諒彼武王肆伐大商㑹朝清明肆疾也又曰文王有聲繼伐也武王能廣文王之聲卒其功也又曰撻彼殷武奮伐荆楚罙入其阻裒荆之旅傳云冞深也箋云有鐘鼓曰伐冞冒也殷道衰而楚人叛髙宗奮揚威武出兵以伐之也禮記曰吳侵陳斬祀殺厲師還出境陳太宰嚭使於師夫差謂行人儀曰是夫也多言盍嘗問焉師必有名人之稱斯師也者則謂之何太宰行人官名太宰嚭曰古之侵伐者不斬祀不殺厲不獲二毛今斯師也殺厲與其不謂之殺厲之師與曰反爾地歸爾子則謂之何曰君王赦敝邑之罪又矜而赦之師與有無名乎周禮曰大司馬之職以九伐之法正邦國馮弱犯寡則眚之賊賢害民則伐之暴内侵外則壇之野荒民散則削之負固不服則侵之賊殺其親則正之放弑其君則殘之犯令陵政則杜之内外亂鳥獸行則滅之大戴禮曰凡明王之所征者必皆道之所廢者也以彼廢道而不行然後率師以征之誅其君改其政弔其民而不主於奪其財也故曰明王之征也猶時雨之降也左傳曰夏鄭人侵許凢師有鍾鼓曰伐無曰侵輕曰襲又曰吳子諸樊伐楚門于巢攻巢門也巢牛臣曰吳王勇而輕若啓之將親門啓開門也我獲射之必殪殪謂死也是君也死疆其少安吳子門焉牛臣隠於短墻以射之吳子卒又曰晉師伐楚至於邲楚師出陣孫叔曰進之寧我薄人無人薄我詩云元戎十乘以先啓行先人也元戎戎車王者軍行必有戎車十乘在前開道軍志曰先人有奪人之心薄之也遂疾進師車馳卒奔乘晉軍桓子不知所為鼓於軍中曰先濟者有賞中軍下軍争舟舟中之指可掬也士季使鞏朔韓穿帥七覆于敖前故上軍不敗趙嬰齊使其徒先具舟于河故敗而先濟又曰晉伐齊齊侯駕將走郵棠郵棠齊邑郵羽求反太子與郭榮扣馬太子光也榮齊大夫曰師速而疾畧也言欲行畧其地無乆攻意将退矣君何懼焉且社禝之主輕則失衆君必待之將犯之太子抽劒斬鞅乃止甲辰東侵至濰南及沂齊侯納太子諫故不復敗也又曰鄭伯侵陳大獲徃嵗鄭伯請成于陳陳侯不許五父諫曰親仁善鄰國之寳也君其許鄭陳公也陳侯曰宋衛實難鄭何能為遂不許君子曰善不可失惡不可長其陳桓公之謂乎長惡不悛從自及也雖欲救之其將能乎又曰齊君之無道也興師而伐逺方㑹之又曰君姑修政而親兄弟之國庻免於難隨侯懼而修政楚不敢伐又曰楚北戎病齊諸侯救之鄭公子忽有功焉齊人餼諸侯使魯次之以周班後鄭鄭人怒請師於齊人以衛師助之故不稱侵伐又曰吳伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤又曰晉侯後復假道於虞以伐虢宮之竒諫曰虢虞之表也虢亡虞必從之晉不可啓㓂不可翫一之為甚其可再乎謂二年假晋道伐夏陽也諺所謂輔車相依脣亡齒寒者其虞虢之謂也謂頰輔與牙車也公不聽後遂為晉所滅又曰晉侯使太子申生伐東山皋落氏衣之偏衣珮之金玦先友曰衣身之偏握兵之要又何患焉狐突曰尨凉冬殺金寒玦離胡可恃也里克曰師在制命而已禀命則不威專命則不孝將焉用之又曰齊侯伐楚楚使與師言曰君處北海寡人處南海唯是風馬牛不相及也不虞君之渉吾地也何故管仲對曰昔召康公命我先君太公曰五侯九伯汝實征之賜我先君履東至于海西至于河南至于穆陵北至于無棣爾貢苞茅不入王祭不供寡人是徴昭王南征不復寡人是問對曰貢之不入寡君之罪也昭王之不復君其問諸水濵又曰衛人以燕師伐鄭鄭祭足原繁洩駕以三軍軍其前曼伯與子元潛軍軍其後燕人畏鄭三軍而不虞制人君子曰不備不虞不可以師又曰十年公㑹鄭伯伐宋壬申公敗宋師于菅庚午鄭師入郜辛未歸于我鄭伯後期而公獨敗宋師故鄭伯獨推進兵以入郜防入而不有命魯取之公上爵譲以自贊也君子謂鄭莊公於是乎可謂正矣以王命討不庭不貪其土以勞王爵又曰衛大旱寗莊子曰周飢克殷而年豐今邢方無道諸侯無伯伯長也天其或者欲使衛討邢乎從之師興而雨又曰公伐邾取須句公卑邾不設備而禦之卑小也臧文仲曰國無小不可易也蜂蠆有毒而况國乎公弗聽及邾戰於升陘我師敗績又曰楚子以諸侯伐吳使屈申圍朱方朱方吳邑慶封所封也屈申蕩之子也克之執慶封而盡滅其族慶封以襄二十八年奔吳也將戮慶封椒舉曰臣聞無瑕者可以戮人其肯從於戮乎言不肯黙而從戮也王不聽負之斧鉞以狥于諸侯使言曰無或如齊慶封弑其君而弱其孤以盟其大夫齊崔杼弑其君慶封其黨也故以弑君罪責之慶封曰無或如楚恭王之庻子圍殺其君兄之子麇而代之以盟諸侯王使速殺之又曰四月鄭人侵衛牧牧衛邑也經文夏四月葬衛桓公今傳不更言夏直以四月附鄭人侵衛牧者於下事宜得月以明事之先後故不復備舉經文也以報東門之役東門役在四年又曰秋衛伐邢以報免之役又曰夏趙盾救焦遂自隂地及諸侯之師侵鄭以報大棘之役又曰晉荀息請屈産之乘與垂棘之璧假道於虞以伐虢公曰是吾寶也對曰若得道於虞猶外府也公曰宫之竒存焉對曰宫之竒為人也懦而不能强諫且少長於君君暱之雖諫將不聴乃使荀息假道於虞曰冀為不道入自顛軨伐鄍三門冀之既病則亦唯君故今虢為不道保於逆旅敝邑之南鄙敢請假道以請罪於虢虞公許之又曰晉侯伐曹假道於衛曹在衛東故也衛人不許還自河南濟從汲郡南渡出衛南而東也侵曹伐衛公羊曰及鄭師伐宋丁未戰于宋戰不言伐何避嫌也又曰二月公侵宋曷為或言伐觕音鹿者曰侵精者曰伐精猶精宻也論語孔子曰天下有道則禮樂征伐自天子岀又曰季氏將伐顓㬰冉有曰今夫顓㬰固而近於費今不取後世必為子孫憂孔子曰求君子疾夫舍曰欲之而必為之辭逺人不服而不能來也邦分崩離析而不能守也而謀動干戈於邦内吾恐季孫之憂不在顓臾而在蕭牆之内也韓詩外𫝊曰楚王欲伐晉告士大夫有諌者死叔敖曰臣園中有榆榆上有蟬蟬方奮翼悲鳴不知螳蜋在其後欲攫而食之螳蜋取蟬不知黄雀在其後又曰修武屬河内本殷之甯邑武王伐紂勒兵於甯改曰修武懷州也家語曰孔子言於定公曰大夫家無藏甲邑無百雉之城髙丈長丈曰堵三堵曰雉古之制也今三家過制請皆損之乃使季氏宰仲由隳三都叔孫輒不得意於季氏因費宰公山不狃率費人以襲攻之入臺側孔子命申勾須樂頎勒士衆伐之費人北遂隳之强公室弱私家尊君卑臣政化大行又曰孔子曰明王之征猶時雨之降行地彌博得親彌衆是還師於衽席之上也國語曰吳伐越越勾踐請嫡女執箕帚嫡男奉槃匜以隨諸御槃匜􅏕噐也春秋貢獻不懈王府呉王曰吾將許越成申胥諌曰申胥楚臣伍胥不可許也大夫種勇而善謀將還玩吳國於股掌之上以得其志吳王不聽乃許盟將伐齊申胥諌曰越之在吳猶人有腹心之疾非越是圖而齊魯為憂夫齊魯譬諸疾疥癬也豈能渉江淮與我爭此地哉王弗聽又曰謀甫諫曰不可先王之於民也懋正其德而厚其性阜其財求而利其噐用明利害之鄉以文修之使務利而避害懐徳而畏威故能保世以滋大昔我先世后稷以服事虞夏及夏之衰也棄稷弗務我先王不窋用失其官而自竄於戎狄之間不敢怠業時序其徳纂修其緒修其訓典朝夕恪謹守以惇篤奉以忠信弈世載徳不忝前人至於武王昭前人之光明而加之以慈和事神保民莫不欣喜商王帝辛大惡於民庶民不忍欣戴武王以致戎于商牧是先王非務武也勤恤民隱而除其害也夫先王之制邦内甸服邦外侯服侯衛賔服夷蠻要服戎翟荒服甸服者祭侯服者祀賔服者享要服者貢荒服者王日祭月祀時享歳貢終王先王之訓也有不祭則修意有不祀則修言有不享則修文有不貢則修名有不王則修徳序成而有不至則修刑於是乎有刑不祭伐不祀征不享讓不貢告不王於是乎有刑罰之辟有攻伐之兵有征討之備有威讓之令有文告之辭布令陳辭而又有不至則又増修其徳無勤民於遠是以近無不至遠無不服今自大畢伯仕之終也大戎氏以其職來王天子曰予必以不享征之且觀之兵其無乃廢先王之訓而王幾頓乎吾聞夫犬戎樹惇能率舊德而守終純固其有以禦我矣王不聽遂伐之得四白狼四白鹿以歸自是荒服者不至又曰文公即位二年欲用其民用其征伐子犯曰民未知義未知戰上之義盍納天子以示之義時天子以子帶之難在鄭地乃納襄王於周曰可矣乎對曰民未知信乃伐原謂伐原令以三日之粮今盡不降命去之曰可乎對曰民未知禮盍大蒐備師尚禮以示之蒐所以明尊卑順少長習威儀也乃大蒐於被廬被廬晉地作三軍使郤縠將中軍以為大政大掌國政郄溱佐之溱晉大夫郄至之兄子犯曰可矣可用也遂伐曹衛岀榖戍釋宋圍敗楚師于城濮于是乎遂伯榖齊也戰國䇿曰趙且伐燕蘇代謂燕惠王曰今臣來過易水見蚌方岀曝而鷸啄其肉蚌合而拑其喙鷸曰今日不雨明日不雨即有蚌脯蚌亦曰今日不岀明日不岀必有死鷸兩者不能相捨而漁者併擒之今趙且伐燕不相友以弊大衆臣恐强秦之為漁父也願大王熟計之惠王曰善乃止又曰蘇秦謂秦惠王曰戰車萬乘奮擊百萬可并諸侯吞天下稱帝而治願大王少留意臣請奏其效王曰寡人聞毛羽不豐者不可以髙飛文章不成者不可以誅罰道徳不厚者不可以使民政教不順者不可以煩大臣秦曰臣固疑大王不能用也昔者神農伐蒲隨黄帝伐涿鹿堯伐驩兠舜伐三苗禹伐共工湯伐有夏文王伐崇武王伐紂齊戰而伯天下由此觀之未有不戰者也夫五帝三王五伯明主賢君常欲坐而致之其勢不能故以戰續之寛則兩軍相攻迫則杖㦸相撞兵勝於外義强於内威在於外民服於下今欲併天下陵萬乘黜敵國制海内臣諸侯非兵不可太平御覽卷三百三
