  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_810-1a, image: WYG0900/WYG0900-0184a.png}
body:
  text: 太平御覽卷八百十宋李昉等撰珎寳部九金中東觀漢記曰郭况遷為大鴻臚上數幸其第賞賜金帛京師號况家為金穴言其富貴謝承後漢書曰豫章張載字仲宗為廣陵太守舉孝子吳奉為孝亷奉齎金為禮載閉門不受奉以囊盛投載園中而逝載追不及賫金至廣陵還奉又曰富義字仲公常濟人死罪者後以金二斤謝之義不受金主候義不在嘿投金於豕塵上後葺治屋得金主已死義乃以付縣張璠漢記曰永昌太守鑄黄金之虵獻之梁兾益州刺史种暠發其事後漢書曰中興初有應嫗者生四子而寡見神光照社試探之乃得黄金自是諸子宦學并有才名至㻛七代通顯又曰荆州金銀之所出魏畧曰田豫為并州胡宻懐金三十斤曰此以上公豫張袖受之荅其厚意胡去之後皆悉付外具狀聞於是詔褒之曰昔魏綘開懐以納戎今卿舉䄂以受金朕甚嘉焉又曰大秦國出金織成帳也魏志曰繁昌縣授禪石碑中生金表送上群臣盡賀蜀志曰先主平蜀賜諸葛亮等金數百斤王隱晉書曰永嘉初陳國項縣賈逵石碑中生金人盗鑿取賣賣已復生此江東之瑞也又曰咸寕三年起居注載燉煌郡上金洞中生金百陶不消可以切玉又曰鄱陽樂安出黄金鑿土十餘丈披沙之中所得者大如豆小如粱米南郡象林南有四國皆稱漢人貢金供稅晉後略載賈后以鹿車詣金墉城飡金屑而死晉書曰清河王覃初為清河世子所佩金鈴歘生隱起如麻粟者祖母陳太妃以為不祥毁而賣之占者以金是晉行大興之祥覃為皇𦙍是其瑞也毁而賣之象覃見廢不終之驗也晉永和起居注曰廬江太守路永表言於榖城北見水岸邊紫赤光得金一枚文如印齒宋書曰彦回為吏部尚書有人求官宻䄂中將一餅金因求間出金示之曰人無知者彦回曰卿自應得官無假此物若必見與不得不相啓此人大懼收金而去彦回叙其事而不言其名時人莫之知也南史曰南海扶南國王諸農死子陽邁立陽邁初在孕其母夣生兒有人以金蓆藉之其色光麗夷人謂金之精者為陽邁中國云紫磨者因以為名宋初二年遣使貢獻以陽邁為林邑王宋書曰齊武帝常至劉俊宅晝卧覺俊自奉金澡灌受四升以沃盥因以與帝齊書曰金車王者至孝則出金汁王者有盛徳則游於後池林邑有金山金汁流於浦又曰梁武帝於襄陽起兵蕭頴胄以荆州應焉時長沙寺僧鑄黄金為龍數千兩埋土中歴相𫝊付稱為下方黄鐵頴胄因取此龍以充軍實梁書曰武陵王紀鎭蜀既東下黄金一斤為一餅百餅為簉至百簉銀五倍之其他錦􅄢稱是每戰則懸金以示將士終不賞賜又曰廬陵王續之子應不惠王嘗至庫内閱珍物見金鋋問左右曰此可食不荅曰不可應曰既不可食並緫乞汝南史曰林邑國有山皆赤色其中生金夜則飛出狀如螢火又曰甄法崇之孫彬有行業鄉黨稱善常以一束苧就州長沙寺庫質錢後贖苧還於苧束中有五兩金以手巾裹之彬得送還寺庫道人大驚云近有人以此金質錢時有事不得舉而失檀越乃能見還輙以金半仰酬復往千餘彬堅然不受詠曰五月披羊裘而負薪豈拾遺金者耶卒還金梁武帝布衣時聞之及踐祚以西昌侯藻為益州刺史乃以彬為府録事叅軍帯郫縣令將行同列五人帝誠以㢘慎至彬獨曰卿昔有還金之美故不復有此言相屬由此名得益彰陳書曰歐陽頠在嶺南交州刺史袁曇綬宻以金五百兩寄頠以百兩還合浦太守龔以四百兩付兒智矩餘人弗之知頠尋為蕭㪍所破貲財並盡惟所寄金獨存曇綬亦尋而卒至是頠並依信還之時人莫不嘆服之崔鴻十六國春秋後趙録曰建武元年十一月不雨雪二年八月糓價湧貴金一斤值米二升又前燕録曰汜昭字嗣先燉煌人辟州主簿志在理枉申滯人有於夜中報昭黄金者昭責而遣之後魏書曰趙柔字元順常在路得人所遺金珠一貫價值百縑柔呼主還之又曰孫軌字元慶為諸軍司馬太武平赫連昌引諸帥入其府藏各令任意取金玉諸將取之盈懐軌獨不取帝把手親探金賜之謂之曰卿臨財亷朕所以増賜者欲顯亷於衆人又曰段揮自慕容璝歸魏太武至長安人告暉欲南奔去置金於韉中帝宻遣視中果如告者斬之於市又曰李安世為主客令每有江南使至多出藏内珍物令都下富室好容服者貨之令使任情交易時齊劉纉至金玉肆問價纉曰北方金玉太賤當是山川所出安世曰聖朝不貴金玉所以同於瓦礫又皇上徳通神明地不愛寳故川無金山無玉纉初將大市得安世言慙而罷又曰副貨國城周匝七十里國王有黄金殿殿下有駞七頭髙三尺又曰狀豆國出金銀河鈎差國出金珠北史齊李㓜亷少寡欲為兒童時初不從家人所求請故常以金寳授之終不取強付輙擲之地後為南青州刺史主簿徐乾富而横暴歴政不能禁㓜亷初至因其有犯收繫之乾宻通䟽奉黄金百挺奴婢一十人㓜亷不受遂殺之北史隋獻皇后山陵後帝賜楊素金鉢一鉢實以金銀一鉢實以珠隋書曰上賜王公以下射王素箭為第一上手以外國所獻金精盤價值鉅萬以賜之唐書曰太宗謂侍臣曰水旱不時皆為人君失徳朕徳不修天當責朕百姓何罪而尚多窮困聞其鬻男女者朕甚愍焉於是遺御史大夫杜淹廵關内諸州出御府金寳贖還父母又曰開元中杜暹為監察御史西往覆屯蕃人齎金以遺暹固辭不受左右以不可失蕃人之情暹受而埋於幕下既出境乃移牒令收取之又曰徳宗詔曰朕聞王者不貴逺物所寳惟賢故堯設茅茨禹卑宫室光武捨去寳劒順帝封還大珠朕仰企前王思齊太素邕州所奏金坑誠徳其物豈尚兹難得之貨生其可欲之心耶其金坑任人採􅓯官不得占又曰真元元年四月南詔王異牟尋與其酋長定計遣使趙羅眉由南安使凡三軰致書於韋臯各齎生金丹沙為贄三分前臯所與年尋書各持其一為信嵗中三至京師且曰牟尋請帥大國永為藩臣所獻生金以喻向化之意堅如金也丹沙示其心赤耳上嘉之乃賜牟尋南詔王又曰韋執誼時為翰林學士受賕為人求科第夏卿不應執誼乃探懐中出金以内夏卿䄂夏卿驚曰吾與若頼先人徳致名位幸各已逹豈可如此自毁壊擺䄂而去執誼慙又曰路随為翰林學士乃兼金紫有以金帛謝除制者必叱之曰吾以公事接私賄耶終無所納管子曰玉起於禺氏山金起於汝漢珠起於赤野此相寳去七十里湯以杜山之金以贖民之賣子者禹以歴山之金贖賣子者江陽之珠天下一美上有丹沙下有黄金上有慈石下有銅金上有陵石下有鈆錫上有赭下有鐡葛盧山發而出金蚩尤取以為鎧雍狐山發而出金蚩尤取以為㦸楚有汝漢之黄金晏子曰景公為履黄金之綦僅能舉之列子曰齊人有欲金者清旦衣冠之市適鬻金者之所因攫其金而去吏捕得之問曰人皆在焉子攫人之金何故對曰取金之時不見人徒見金魯連子曰秦圍趙邯鄲魏使將軍新垣衍入邯鄲令趙尊秦為帝魯連子說罷之秦軍退平原君以千金為先生夀笑曰若即有取商賈之事連不忍為也莊子曰今大冶鑄金金踴躍曰我且必為鏌鎁大冶必以為不詳之物又曰以瓦注曰巧以黄金注者昏所要重則心矜又曰至仁無親至信碎金金玉小信之貝耳至信則隆又曰金石有聲不考不鳴也韓子曰荆南麗水之中生金又曰魯丹三說中山之君而不受也因散五十金事其左右復見未語而君與之食魯丹出不及舍遂去中山其御曰交乃始善我何故去之魯丹曰夫以人言善我必以其人言罪我未至境而公子惡之曰為趙來間中山君因索之又曰張譴相韓病將死公乘無正懐三十金而問之其病居一月公自問張譴曰君子死將誰使代子答曰無正法而畏上雖然不如公子食我之得民也張譴死因相公乘無正又曰荆王弟在秦秦不出也中尉之士曰資臣百金臣能出之因載百金之晉見叔向曰荆王弟秦秦不出也請以百金委之叔向受見金而見平公曰可以城壺邱矣平公曰何以對曰荆王弟在秦秦不出是秦惡荆也必不敢禁我城壺邱若禁之我曰為我出荆王之弟吾不城也彼如出之可以得禁彼不出是惡也不敢禁我城壺邱矣曰善能城壺邱謂秦之公曰為出荆州之弟吾不城也秦因出之荆王大恱以鍊百金百鎰遺晉墨子曰昔夏始飛亷折金以山鑄昆吾鼎成而不炊而方自烹不舉自藏不遷自行以祭昆吾之墟其兆繇曰蓬白雲一南一北一東一西九鼎使成遷三國夏失殷受殷失周受孟子曰齊王以兼金一百遺孟子兼金好金也列子曰夏革殷謂湯曰渤海之東不知幾億萬里有大􅊤中有山一曰岱輿二曰方壺三曰員嶠四曰瀛洲五曰蓬萊其上髙觀皆金闕淮南子曰玦五百嵗生黄澒五百嵗生黄金黄金千嵗為黄龍玦石也中央數五故五百嵗一化澒音胡貢反澒黄金水銀也秦以一鎰為一金而重一斤漢以一斤為一金又曰受藏金千斤於嶄巖之山所以塞貪鄙之心又曰予拯溺者金玉不若得尋常纒𫝊子曰懸千金於市人不敢取者分定矣委一錢於路童子爭者分不定矣抱朴子曰合金液用古稱黄金一斤都合用四十萬而成一劑可令八仙人也其次餌黄金一斤可得地仙又内篇曰山中亥日稱人字者金玉知其物則不能為害又曰景帝時戍將於廣陵掘一大塚棺中人面如生兩耳及鼻孔中皆有黄金大如棗許此假物不朽之效也太平御覽卷八百十
