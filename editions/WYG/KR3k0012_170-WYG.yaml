body:
  text: 太平御覽卷一百七十宋李昉等撰州郡部十六江南道上昇州宣州池州潤州常州蘇州湖州杭州睦州鄂州饒州信州江州洪州撫州吉州袁州虔州建州福州泉州漳州汀州南州昇州圖經曰昇州古揚州地春秋時為吳地戰國時越滅吳為越地後楚滅越其地又屬楚初置金陵邑秦併天下改金陵為秣陵屬鄣郡漢元封二年改鄣郡為丹陽郡漢志曰故鄣屬丹陽郡王莽曰侯望金陵圖云楚威王見此有王氣埋金鎮之故曰金陵秦併天下望氣者言東南有天子氣鑿地斷岡改金陵為秣陵吳志曰孫權長史張紘建計宜出都秣陵權從之建康圖曰西晉亂元帝自黄陵渡江以此城荒蕪乃居縣北府第幕府之名自此而立尋以江寧為瑯琊國蓋龔帝始封之名也厯宋齊梁陳六代皆都之輿地志曰金陵有東府城晉安帝時築其城西為簡文㑹稽第其東則丞相㑹稽王道子府謝安石薨以道子代領揚州州在第西故時人號為東府西州圖經曰金陵有古冶城本吳鑄冶之地也晉書曰元帝太興初以王導疾乆方士戴陽曰君本命在申申地有冶金火相爍遂移冶於石城宣州十道志曰宣州宣城郡禹貢揚州之域春秋時屬吳屬越越為楚所併又屬楚秦為鄣郡漢為丹陽郡地理志曰武帝元狩元年改鄣郡為丹陽郡屬揚州理宛城即今郡是也吳書曰孫皓以牛渚為督以何植為使而禦晉軍桓𤣥傳曰𤣥居南州大築齋第以郡在國南故曰南州齊州郡志曰梁承聖元年置南豫州十道志曰隋開皇中改南豫州為宣州漢志曰涇縣屬丹陽郡韋昭曰涇水出蕪湖圖經曰南陵縣有赭圻屯在縣西北晉書曰桓温入參朝政自荆州還至赭圻遂城赭圻鎮十道志曰南陵有鵲州春秋左氏傳曰昭五年楚伐吳吳敗之鵲岸廬江舒縣有鵲尾渚漢志溧陽縣屬丹陽郡溧水所出也又曰當塗縣侯國屬九江郡莽曰山聚應劭曰禹娶塗山有禹墟焉春秋左氏傳曰禹㑹諸侯於塗山晉書州郡志曰西晉愍懷之亂瑯琊王出鎮揚州因渡江南卜金陵建大業衣冠禮樂州郡邑名並隨渡江從北地當塗來江南自東晉始也金陵記曰姑熟之南淮曲之陽置南豫州六代英雄迭居於此以斯地為上游焉池州圖經曰池州池陽郡禹貢揚州之域春秋及秦漢為鄣郡之地吳為石城縣隋為秋浦縣唐武德中置池州三國志曰吳黄武二年封韓當為石城侯輿地志曰梁昭明太子以水出魚美故名其水為貴池又曰梁大同二年置石埭因貴池有兩石埭遂以為名潤州十道志曰潤州丹陽郡禹貢揚州之域春秋時吳國地謂之朱方吳為越所併地屬越戰國時越為楚所滅復屬楚秦併天下為㑹稽鄣二郡之地漢初為荆國故荆王劉賈所都之地吳王濞誅以其地併入江都國武帝又分屬丹陽㑹稽二郡左氏傳曰襄公二十八年齊慶封奔吳吳句餘予之朱方聚其族焉而居之富於其舊後漢書曰建安中吳大帝自吳徙都京口十六年遷都秣陵復於京口置京督以為鎮焉吳志曰京口所統藩衛尤要是以吳為重鎮圖經曰其城因山為壘縁江為境爾雅曰丘絶髙曰京因謂之京口又地理志曰秦時望氣者云其地有天子氣始皇使赭衣徒三千人鑿坑敗其勢改云丹徒圖經曰丹陽本漢曲阿縣也漢志曰曲阿故雲陽莽曰風美屬㑹稽郡史記曰秦始皇改雲陽為曲阿輿地志曰曲阿縣屬東南徐之境秦使官吏因東南有王氣在雲陽故鑿北崗截直道使曲以壓其氣故曰曲阿又曰丹徒界内土堅𦂳如蠟諺云生東吳死丹徒言吳多産出可以攝生自奉養丹徒地可以葬吳志曰岑昏鑿丹徒至雲陽而杜野小辛間皆斬絶陵壟功力艱辛杜野屬丹徒小辛屬曲阿圖經曰唐垂拱四年立金山縣後改名金壇取邑界句曲之山金壇之陵以為號真誥曰地脈似洛水北邙山土水似長安丹鳯門外井泉河圖曰乃有地脈土良水清句曲之山金壇之陵常州十道志曰常州毗陵郡禹貢揚州之域春秋時屬吳後屬越戰國屬楚秦漢為毗陵縣屬㑹稽郡輿地志曰晉陵縣春秋時吳之延陵也季札讓位耕於此因以封之漢改為毗陵漢志曰毗陵縣屬㑹稽郡季札所居舊為延陵漢改之也莽曰毗壇輿地志曰東海王越世子名毗中宗為越所表遣渡江故改此為晉陵又曰吳越之間謂荆為楚秦以子楚改為陽羡其地本名小震居在荆溪之北故云陽羡周處風土記曰陽羡本屬荆溪吳郡震澤之㑹也其地理則三江之雄潤五湖之腴表吳越春秋曰周改為陽羡漢志曰無錫屬㑹稽莽曰有錫周處風土記曰周武王追封周章於吳又封章小子斌於無錫也圖經曰昔有䜟述其地云無錫寧天下平有錫兵天下爭故名之蘇州十道志曰蘇州吳郡禹貢揚州之域周為吳國至闔閭强盛始都於此後為越所滅秦併天下為㑹稽郡釋名曰吳虞也太伯封於此以虞志也漢書地理志曰呉粤之君皆好勇故其民至今用劍輕死易發呉東有海海鹽章山之銅三江五湖之利亦江東一都㑹也越絶書曰闔閭起蘇臺三年聚財五年乃成髙見三百里漢志曰吳屬㑹稽郡周太伯所邑也具區澤在其西王莽曰泰徳十道志曰嘉興縣本漢由拳縣也漢志曰由拳縣屬㑹稽郡應劭曰古之檇里吳録地理志曰吳王時此地本名長水秦改曰由拳續漢志曰屬吳地吳黄龍五年嘉禾生於由拳改縣曰禾興後以太子名禾改曰嘉興圖經曰華亭縣本嘉興縣地天寶十年置因華亭谷為名晉書曰陸機被誅臨刑嘆曰華亭鶴唳不可得聞輿地志曰吳大帝以陸遜為華亭侯以其所居為封也華亭谷出佳魚蓴菜故陸機云千里蓴羮未下鹽豉湖州十道志曰湖州吳興郡禹貢揚州之域防風氏之國也春秋時為吳地後屬越越為楚所滅後屬楚秦漢屬㑹稽郡國語魯語曰吳伐越墮㑹稽獲骨節專車骨節長專擅一車也吳子使來好聘且問之仲尼曰骨何為大仲尼曰禹戮防風氏其骨節專車客曰防風氏何守也仲尼曰汪芒氏之君也守封禺之山者也汪芒長翟國名封山禺山在吳郡永安縣郡國志曰五湖之表州以為名也漢志曰烏程屬㑹稽郡有歐陽亭郡國志曰古有烏氏程氏居此能醖酒故以名縣地理志曰武康縣本烏程之餘不鄉地漢末童謠曰天子當興東南三餘之間吳乃改㑹稽之餘暨為永興分餘不為永安以協謡言吳興記曰長城縣吳王闔閭使弟夫槩居此築城狹而長晉武帝置縣因長城以名縣杭州十道志曰杭州餘杭郡禹貢揚州之域春秋時吳越地秦漢屬㑹稽郡史記曰楚威王伐越殺王無疆盡取故吳地至浙江又曰始皇三十七年東遊丹陽至錢塘漢志曰錢塘屬㑹稽郡西部都尉治王莽曰泉亭劉道真錢塘記曰昔縣境逼近江流縣在靈山下至今基址猶存郡議曹華信乃立塘以防海水募有能致土石者即與錢及成縣境蒙利乃遷此地於是置錢塘縣漢志曰於㬱屬丹陽郡朁音潛吳録地理志曰縣西㬱山蓋因山以立名舊㬱字無水至隋添水漢志曰餘杭屬㑹稽郡莽曰進睦吳興記曰秦始皇三十七年將止㑹稽塗山因以立為縣郡國志曰夏禹東去捨杭登陸於此乃以為名十道志曰鹽官本漢海鹽由拳二縣境漢志曰海鹽屬㑹稽郡故武原鄉有鹽官睦州十道志曰睦州新定郡禹貢揚州之域春秋時屬越國秦屬丹陽郡漢為歙縣也吳志曰大帝以後漢建安十三年使威武中郎將賀齊討丹陽黟歙山賊平之分歙為始新新定黎陽休陽四縣并黟歙凡六縣圖經曰隋置睦州取俗阜人和内外輯睦為義十道志曰桐廬縣吳黄武四年分富春置以桐溪側有大椅樹垂條偃蓋傍䕃數畝逺望似廬因謂之桐廬漢志曰富春屬㑹稽郡莽曰誅嵗鄂州十道志曰鄂州武昌郡禹貢荆州之域春秋時楚地秦屬南郡漢分置立江夏郡晉安帝義熙元年冠軍劉毅表以為夏口二州之中地居形要控接湖川邊帶溪沔請荆州刺史劉道規鎮夏口隋為江夏郡唐武徳四年為鄂州尚書禹貢曰江漢朝宗于海十道志曰江漢二水㑹于州之西界左傳曰吳伐楚沈尹射奔命于汭世紀曰楚子熊渠封中子紅于鄂今武昌縣也江夏記曰一名夏口一名魯口沙陽夏汭鄂渚新興釣渚皆其名武昌記曰大帝築城於江夏以程普為太守遂欲都鄂州改為武昌郡其民謡曰寧飲建業水不食武昌魚寧歸建業死不向武昌居繇是徙都建業齊書曰劉懷珍言於髙帝夏口兵衝要地宜得其人遂令栁世隆鎮焉十道志曰江夏縣本漢沙羡縣饒州十道志曰饒州鄱陽郡禹貢揚州之域春秋時為楚東境秦為番縣地屬九江郡漢為鄱陽屬豫章郡隋開皇九年為饒州地理志曰城即吳芮為番君時所築漢書貨殖傳曰譬猶戎狄之與于越不相入明矣韋昭注曰于越今餘干縣越之别名又曰淮南王安陳伐閩越之利書云越人欲為變必先守餘干中可積食而有材可治船慮越人有伐材積食之患徐湛鄱陽記曰北有堯山故以堯為號又以地饒衍遂加食為饒圖經曰以山川藴物珍竒故名饒信州圖經曰唐上元元年正月江淮轉運使元載以此邑川原夐逺闗防襟帶宜置州治可賜名信州以信美所稱為郡之名鄱陽記曰界内之山出銅及鉛鐡者有玉山江州十道記曰江州尋陽郡禹貢揚荆二州之境尚書禹貢彭蠡既瀦又曰九江孔殷周景武廬山記曰柴桑彭澤之郊古三苗國舊廬江也尋陽記曰春秋時吳之西境後吳為楚滅更為楚地秦屬廬江郡漢屬淮南國晉武太康十年因江水之名而置江州成帝咸和元年移理湓城即今郡是晉地道記曰尋陽南通五嶺北導長江逺行岷漢亦一都㑹也洪州十道志曰洪州豫章郡禹貢揚州之域春秋時吳地秦為九江郡漢為豫章郡豫章記曰太康中望氣者云豫章廣陵有天子氣故封愍懷太子為廣陵王領軍以鎮豫章後永興中懐帝遂以豫章王登天位隋平陳罷郡為洪州撫州十道志曰撫州臨川郡禹貢揚州之域春秋時吳地秦為九江郡漢為豫章郡今為南昌縣地後漢分南昌立臨汝縣吳太平二年分豫章之臨汝南城縣立臨川郡即今州也隋平陳置撫州晉書曰王羲之嘗為臨川内史置宅於郡城東偏旁臨逈漢特據層阜荀伯子臨川記曰王右軍故宅其地爽塏山川若畫每至重陽日二千石已下多遊萃於斯舊井及墨池並在漢地理志曰髙帝六年命大將軍灌嬰立洪州其年分洪州南境立南城縣以其在郡城之南故曰南城吉州十道志曰吉州廬陵郡春秋時為吳地戰國屬楚秦併天下屬九江郡南部都尉理漢為廬陵縣屬豫章郡豫章記曰靈帝末揚州刺史劉遵上書請置廬陵鄱陽二郡獻帝初平二年始立郡圖經曰隋平陳改廬陵郡置吉州以吉陽山為郡名袁州十道志曰袁州宜春郡禹貢揚州之域春秋時吳地秦屬九江郡漢為豫章郡之宜春縣晉武改宜春為宜陽隋平陳分洪州之宜陽為袁州漢書曰武帝封長沙定王子為宜春侯吳録曰宜春縣出美酒每嵗上貢封酒親付計吏虔州十道志曰處州南康郡春秋時吳地秦屬九江郡漢為贛縣地屬豫章郡後漢興平二年分豫章立廬陵郡而贛縣屬焉晉太康三年立為南康郡隋平陳立虔州以䖍化縣得名圖經曰贑縣章貢二水雙流至縣合為贑水其間置邑因以名縣十道志曰南康縣本漢南野縣也吳録曰南野縣有大庾山九嶺嶠以通廣州建州十道志曰建州建安郡古閩越之地秦閩中郡漢屬㑹稽吳分置建安郡陳屬閩州隋平陳屬泉州唐武德四年置建州因建溪為名方輿志曰浦城縣本漢東侯官之北鄉也吳永安三年改為吳興縣圖經曰晉尚書陸邁梁尚書郎江淹皆為吳興令按淹自序云吳興地在東南嶠外閩越之舊境是也福州福州圖經曰勾踐六代孫為楚所併其後有無諸以其境南泉山之地因而都之稱閩越王其弟餘善至孫繇又以東海嵎之地稱越王俱是㑹稽之越遂有三越之稱圖經曰梁承聖二年封蕭基為長樂侯於此十道志曰福州長樂郡亦閩越地秦為閩中郡漢髙帝立無諸為閩越王遂都於此晉置晉安郡陳置閩州唐開元十三年為福州開元録曰閩州越地即古東甌今建州亦其地皆蛇種有五姓林黄等是其裔郡國志曰漢武元鼎六年立都尉居候官以禦兩越所謂東北一尉西南一候也泉州十道志曰泉州清源郡秦漢土地與長樂同東晉南渡衣冠士俗多萃其地以求安堵因立晉安郡宋齊以後因之唐景雲二年置泉州天寳初為清源郡漳州十道志曰漳州漳浦郡厯代土地與長樂郡同唐分其地置漳州郡國志曰梁山有漳浦水一云漳溪水汀州十道志曰汀州臨汀郡厯代土地舊與長樂郡同唐開元二十六年分置汀州初置在新羅縣以其地瘴居者多死大厯中移理長泊汀白石村南州十道志曰南州南川郡禹貢梁州之域周省梁入雍戰國時巴國之地秦漢為巴郡之境太平御覽卷一百七十
