body:
  text: 太平御覽卷九百五十宋李昉等撰蟲豸部七蜻蛉青蚨蜂蝝蝗蠋水馬水蛭短狐沙虱十二時蜻蛉楊雄方言曰蜻蛉謂之蝍蛉説文曰蜻蛉一名桑根爾雅曰虰音丁蛵音升負勞荘子曰童子埋蜻蛉頭而為珠尸子曰荆莊王命養由基射蜻蛉曰吾願生得之養由基援弓而射之拂左翼戰國䇿曰莊辛謂楚襄王曰獨不見夫蜻蛉仰承甘露而飲之自以為無患與人無爭不知夫五尺童子将調飴膠絲加之四仞之上而下為螻蟻所食呂氏春秋曰海上有人好蜻蛉者毎朝居從海上遊有蜻蛉至者數萬前後左右盡蜻蛉也終日翫之不去其父告曰聞蜻蛉從汝居取而來吾將翫之明日往之海上而蜻蛉並無至者東方朔别傳曰上置蜻蛉蓋下羅諸數家獨使朔占對曰馮翊馮翊六足四翼頭如珠尾正直長尾短項是非勾簍即蜻蛚上善賜帛十疋崔豹古今注曰蜻蛉一名青亭一曰蝴蝶色青而大者是也小而黄者曰胡離一曰胡梨小而赤者曰赤卒一曰絳騶一曰赤衣使者好集水上亦名為赤弁丈夫又曰紺蝶一名蜻蛉似蜻蛉而色黝紺遼東人謂為紺幡亦曰童幡好以七月羣飛暗天海邉夷貊食之謂海中青蝦化為之青蚨廣雅曰蟱蝸青蚨也搜神記曰南方有蟲名􅝒􅘿音敦隅形如蟬大味辛美可食其子著草葉如蠶蛹得其子則母輙飛來雖潛取必知處殺其母塗錢子塗貫用去錢貨旋則自還淮南萬畢術曰青蚨還錢青蚨一名魚或曰蒲以其子母各置瓮中埋東行隂垣下三日後開之即相從以母血塗八十一錢亦以子血塗八十一錢以其錢更易市置子用母置母用子皆自還也蜂爾雅曰土蜂今江東曰火蜂在土中作房者為土蜂啖其子即馬蜂也今荆楚間呼為蟺音蟬木蜂似土蜂而小在樹上作房方言曰蜂燕趙之間謂之蠓螉䝉翁二音或謂之蚴蛻音幽悦其有蜜者謂之壼蜂山海經曰平逢山有神如人二首名曰嬌虫是蓋虫實惟蜜之廬又曰火蜂其狀如螽洪範五行傳曰秦昭王三十八年上郡大飢山木盡死人無所食蜂日食田苗左傳僖公曰邾人以須句故岀師公卑邾不設備而禦之臧文仲曰國無以小而易也無謂邾小蜂蠆有毒而况國乎孝經援神契曰蜂蠆垂芒蜂蠆毒在後故言垂芒謝承後漢書曰豫章嚴豐字孟侯為郡主簿太守賈萌舉兵欲誅王莾有飛蜂附萌車衡豐諫以為不祥之徴萌不從果見殺王隐晉書曰太尉陶侃表倉曹叅軍袁謙為高良太守未至百餘里浦中有蜜蜂蔽日而下謙不覺甚惡㑹得届郡文書賊欲乗虛攻郡謙欲速赴明早進西南卒遇大風飛沙天地晦合不復得還浦遂沒海中晉書曰鄒諶對武帝曰猛獸在田荷戈而出凡人能之蜂蠆懐䄂勇士為之驚駭出於意外故也淮南子曰蜂房不容鵠卵房巢也小形不足以苞大體也抱朴子曰軍行卒逢飛蜂及蜚虫若蜂尤多者必大戰驚於藏伏之賊列女傳曰尹吉甫子伯竒至孝事後母母取蜂去毒繫於衣上伯竒前欲去之母便大呼曰伯竒撲我吉甫見疑伯竒自死葛仙公别傳曰仙公與客對食客曰當請先生作一竒戯食未已仙公即吐口中飯盡成飛蜂滿屋飛集客身莫不震肅但皆不螫人良久仙公乃張口見蜂飛還入口中成飯永嘉地記曰七八月中常有蜂羣過有一蜂先飛覔止泊家中人知輙内木桶中以蜜塗桶中飛者聞蜜氣或停不過三四後便舉羣悉至博物志曰遠方諸山出蜜蠟處其處人家有養蜂者其法以木為噐或十斛五斛開小孔令纔容蜂出入以蜜蠟塗噐内外令遍安着簷前或庭下春月此蜂将作窠生育時来過人家園垣者捕取得三兩頭便内着噐中數宿蜂出飛去尋将伴來還或少經日漸益不可復數遂停住徃來噐中所滋長甚衆至夏開噐取蜜蠟所得多少隨嵗中所獲豐儉又曰諸逺方山郡僻處出蜜蠟蜜蠟所着皆絶巗石壁蜂飛去不還餘窠乃蠟著石不盡者有鳥形小於羣雀飛千數來啄之至春都盡其處皆破如磨洗至春蜂皆還洗處結窠如故年年如此物無錯亂者人亦各各占其平處謂之蠟蜜鳥謂之靈雀捕摶終不得也宣騐記曰元喜元年建安郡山賊百餘人掩破郡治抄掠百姓資産子女遂入府庫掠財寶先是諸公養蜂别置一室賊破户忽有蜜蜂數萬頭從衣簏出同時噬螫羣賊身首腫痛兩眼盲合先諸所掠皆棄而走蜂飛邀逐噬擊彌路賊遂惶懼從便道而去時是臘月所縳子女各還其家廣五行記曰秦昭王委政於太后與穰侯穰侯用事蜂蝗蔽天食人苖稼時嵗大饑人相食穰侯罷免歸第嶺表録異曰唐恂曽遊宣歙間見彼中人好食蜂兒狀如蠶蛹而瑩白大蜂結房於山林間其大如巨鐘其中不知幾百層村人採時須以草衣蔽身以捍毒螫復以烟火逼散蜂母然後攀縁崖樹㫁其根一房有蜂兒五斗或一石者三分中一趐足具矣即加鹽酪炒之曝乾以小紙囊貯之寄入京洛以為方物楚辭曰𤣥蜂如壺蝝左傳曰十年冬蝝爾雅曰蝝蝮蜪也音復陶蝗禮記月令曰孟夏行春令則䖝蝗為災陸機毛詩疏義曰阜螽蝗也今人謂之螽子兗州人謂之螣唐書曰貞觀中終南等數縣蝗文皇至苑中見蝗掇數枚而呪之曰民以穀為命而汝食之是害於百姓也百姓有過在予一人爾其有靈但當食我無害百姓將吞之侍臣恐致生疾遂諫止太宗曰所冀移灾朕躬何疾之避遂吞之自是不為灾漢實録曰乾祐初開封府陽武雍丘襄邑蝗府尹侯益遣人以酒餚致祭三縣蝗為鸜鵒聚食勅禁羅弋鸜鵒以其有吞噬之異也蠋毛詩豳七月曰蜎蜎者蠋烝在桑野爾雅曰蚅鳥蠋也郭璞注曰䖝大如指似蠶孫炎注曰蚅一名鳥蠋也廣志曰藿蠋有五色者槐香蠋五采有角甚臭白澤曰蠋有角五采文長尾者龍也殺之立死韓子曰鱓似蛇而蠶似蠋人見蛇則驚駭見蠋則毛起漁者持鱓婦人拾蠶利之所在皆為賁育水馬南州異物志曰交阯海中有䖝狀如馬形因名曰水馬婦人難產者手握此䖝或燒作屑服之則更易如羊之產也凡物之産羊至為易抱朴子曰以黑班蜘蛛及水馬合馮夷水仙丸服之可以居水中徐穉南方草木狀曰海中有魚似馬或黄或黑海中民人名作水馬捕魚得之不可啖食暴乾熇之婦人產難使握持之亦可燒飲水蛭爾雅曰蛭蟣郭璞注曰今江東呼水中蛭䖝入人肉者為蟣音祈也齊書曰蕭季敬為廣州刺史為都統周世雄所襲軍敗奔山中為蛭所嚙肉盡而死常璩華陽國志曰南廣郡土地無稻田蠶桑多蛇蛭虎狼王充論衡曰蛭食血之䖝惠王殆有集血之疾故食啖血之䖝而病愈也不然則賢者操行豈若蠶蛭除病賢者在側則常無病也張茂先博物志曰水蛭三㫁而成三物本草經曰水蛭一名至掌味鹹治惡血瘀結水閉破凝積利水道陶洪景集註本草經曰水蛭味鹹苦平微寒有毒一名蚑生薮澤池澤蚑音其短狐毛詩何人斯曰為鬼為蜮則不可得蜮短狐也韓詩外傳曰短狐水神也陸機毛詩疏義曰為鬼為蜮蜮短狐也一名射影如龜二足江淮水濵皆有人在岸影見水中投人影則殺人或曰射影也南方人欲入水以瓦石投水中令濁乃入也或有含沙射人入人肌其病如疥魯荘公十八年秋經曰書有蜮傳言不為災也穀梁傳荘公曰秋有蜮一云亡曰有言不常有蜮射人者也今短狐射人為疾是也左傳同廣雅曰射蜮短狐也書紀年曰晉獻公二年周惠王居於鄭鄭人入王府多取玊焉玉化為蜮射人齊書曰屠氏女晝採樵夜績以供養父母父母俱卒親行殯葬負土成墳忽空中有聲云汝至性可重山神欲相驅使汝可為人療病必得大富女謂是鬼魅弗敢從遂得病積時鄰舍人有被蜮毒者女識毒試療之自覺病便差遂以巫道為人療病無不愈者家産日益抱朴子曰短狐一名射工一名射影其實水䖝也狀似鳴啁而如合杯有翼能飛無目利耳口中有横物如聞人聲縁口中物如角弩以氣為矢激水而射人身中即發瘡不曉治之則殺人其病似大傷寒不日皆死又曰射工䖝冬天蟄於谷間大雪時索之此䖝所生其雪不積有氣起如灼蒸當掘之不過入地一尺則得也隂乾為末帯之夏天自辟射工也𤣥中記曰水狐者視其形䖝也其氣乃鬼也長三四寸其色黑廣寸許背上有甲厚三分許其口向前如角状見人則以氣射人去三二歩即射人中十人六七人死地理書曰江南山溪水中有射工䖝甲䖝之類也長一二寸口有弩形以氣射人影隨所着處發瘡不治則殺人沙虱廣雅曰沙虱蜁也音旋廣志曰沙虱色赤大不過蟣在水中入人皮中殺人唐書曰南中山川有鴆鳥之地必有犀牛有沙虱水弩必生可療之草又曰南平獠部落土氣多瘴癘山有毒草及沙虱蝮蛇也淮南萬畢術曰沙虱一名蓬活一名地脾抱朴子内傳曰沙虱雨後及晨暮踐沙必着人如毛髮端初着人便入皮裏可以針挑取之色正赤如丹着人身上若不即挑此䖝便行入身中殺人行有此䖝之地毎還輙當以火自炙令遍則䖝隨火去也水陸皆有之博物志曰深山窮谷多毒虐之物氣則有瘴癘人則有工䖝獸則有虎鳥則有鴆蛇則有蝮䖝則有射工沙虱草則有鈎吻野葛其餘則蛟莽之屬生焉本草經曰沙虱一名石蠶葛洪方曰辟沙虱用麝香大蒜合羊脂搗着小筒中𢃄之良十二時博物志曰交州南有䖝長或一寸大小如指有廉槾音且切形似白石英不知其名視之無定色在隂地色多因縁出日光中變易或青或緑或丹或黄或紅赤女人取以為首飾宗岱毎深以為物無定色引雲霞以為喻託此助成其説今孔雀毛亦隨光色變易或黄或赤但不能如此䖝耳嶺南異物志曰容州有䖝如守宮身圓而頸長頭有冠幘一日中隨時變色青黄赤白黑未嘗定土人不能呼名為十二時䖝囓不可療又曰南方有䖝大如守宮足長身青肉鬛赤色其首隨十二時變子時䑕丑時牛亥時猪性不傷人名曰避後見者有喜慶嶺表録異曰十二時䖝則蛇師蜥蜴之類也土色者身尾長丈餘腦上連背有鬐鬛草樹上行極迅速亦多在人家籬落間俗傳云一日隨十二時變色因名之太平御覽卷九百五十
