body:
  text: 太平御覽卷三百二十三宋李昉等撰兵部五十四敗敗禮記曰謀人之軍敗則死之又曰魯莊公及宋人戰于乘丘馬驚敗績左傳曰凢師敵未陣曰敗某師皆陣曰戰大崩曰敗績得雋曰尅覆而敗之曰取某師京師敗績曰王師敗績于某又曰夫兵之敗也如日月之蝕何損於明又曰及齊師戰於乾時我師敗績又曰公及邾師戰于升陘我師敗績又曰鄭伯侵陳大獲往嵗鄭伯請成於陳五父諫曰親仁善隣國之寳也陳侯不從故敗又曰晉侯及秦師戰于彭衙秦師敗績又曰宋師及齊師戰于獻齊師敗績又曰息侯伐鄭鄭伯與戰于境息師大敗而還君子知息之將亡也不度德鄭莊贒也不量力息國弱也不親親鄭息同姓之國不徵辭不察有罪言縱有恨當明徴其辭以審曲直不宜輕鬭犯五不韙韙是也而以伐人其䘮師也不亦宜乎又曰鄭師伐宋將戰華元殺羊食士食音嗣其御羊斟不與及戰斟曰疇昔之羊子為政疇昔猶前日也今日之事我為政與入鄭師故敗又曰狄人伐衛戰于滎澤衛師敗績衛侯不去其旗是以甚敗遂􅌍衛史記曰管仲曰吾嘗三戰三北鮑叔不以我為怯知我有老母也又曰曹沫者魯人也以勇力事魯莊公為魯將與齊戰敗三北魯莊公猶復以為將又曰齊桓公許與魯㑹于柯而盟于壇上曹沫執匕首刼齊桓公問曰子將何欲曹沫曰齊強魯弱大國侵魯亦以甚矣今魯城壞即壓齊境君其圖之桓公乃許盡還魯之侵地曹沫三戰所亡盡復于魯按魯連與燕將書曰曹子為將三敗三北亡地五百里向使曹子計不反顧義不旋踵刎頸而死則亦不免為敗軍擒將矣曹子棄三北之耻而退與魯君討桓公朝天下㑹諸侯三戰之所亡一朝而復之天下震動諸侯驚駭威加吳越又曰晉世家曰襄公墨絰四月敗秦師于殽虜秦三將孟明視西乞術白乙丙以歸遂墨以葬文公夫人秦女謂襄公曰秦欲得其三將戮之公許遣之先軫聞之謂襄公曰患生矣軫追秦將渡河已在船中頓首謝卒不反後三年秦果使孟明等伐晉報殽之敗也後漢書曰建武三年春正月甲子以偏將軍馮異為征西大將軍杜茂為驃騎大將軍大司徒鄧禹及馮異與赤眉戰于回谿禹敗績後閠九月乙巳馮異與赤眉戰於崤底大破之又曰鄧禹與赤眉戰敗帝徴禹還勑曰赤眉無糓自當來東吾折捶笞之非諸將憂也無得進兵禹慙於受任而功不得遂數以饑卒徼戰輙不利又曰鄧禹與車騎將軍鄧𢎞擊赤眉遂為所敗衆皆死散禹獨與二十四騎還詣宜陽謝上大司徒梁侯印綬有詔歸侯印綬數月拜右將軍又曰鄧𢎞與赤眉大戰移日赤眉佯敗棄輜重走車皆載土以豆覆其上兵士飢爭取之赤眉引兵還擊𢎞𢎞軍潰亂馮異與禹合兵救之赤眉小却異以士卒饑倦可休禹不聽復戰大為所敗又曰龎萌反攻殺楚郡太守引軍襲敗蓋延走北渡泗水破舟檝壊津梁僅而得免又曰公孫瓚為袁紹所圍遣子續求救于黑山賊張燕燕率兵十萬三道來救瓚未及至瓚乃宻使行人齎書告于續曰昔周末䘮亂僵屍蔽地以意而推猶為否也不圖今日親當其鋒袁氏之攻狀若鬼神梯衝舞於樓上鼓角鳴於地中日窮月急不遑啟處汝當碎首於張燕馳以告急父子天性不言而動言相感也且厲五千鐵騎於大隰之中下濕曰隰起火為應吾當自内出奮揚威武决命於斯不然吾亡之後天下雖廣汝欲求安足之地豈可得乎紹候得其書獻帝春秋候者得書紹使陳琳易其辭即此書如期舉火瓚以為救至遂便出戰紹設伏瓚遂大敗復還保小城自計必無全乃悉縊其姊妹妻子然後引火自焚魏志曰太祖在長安使曹仁攻蜀兵於樊又遣于禁助仁秋大霖雨漢水溢平地水數丈禁等七軍皆没禁與諸將登髙望水無所廻避蜀兵乘舟就攻禁遂降㑹孫權敗蜀獲其衆禁復在吳文帝踐祚權稱藩遣之帝引見禁鬚髮皓白形容憔悴涕泣頓首帝慰喻以荀林父孟明視之事魏書詔曰荀林父敗績於邲孟明喪師於殽晉秦不替使復其位後晉盡獲狄土秦覇西戎區區小國猶尚若斯而况萬乗乎樊城之敗水灾暴至非戰之咎也其復禁等官拜安遠將軍晉書曰陸機河橋之戰始臨戎而牙旗折意甚惡之列軍自朝歌至于河橋鼓聲聞數百里漢魏以來出師之盛未嘗有也長沙王乂奉天子與機軍接戰機軍大敗赴七里澗而死者如積焉又曰張浚為凉州牧西域長史李伯請討叛將趙真為真所敗議者以伯造謀致敗請誅之駿曰吾毎念漢世宗之殺王恢不如秦穆之赦孟明其以减死論羣心咸悦又曰孫恩為劉裕所擊窮蹙乃赴海自沉姻黨及妓妾謂之水仙投水從死者百數餘衆以恩妹夫盧循為主又曰盧循既敗走召妓妾問曰我今將自殺誰能同者多云雀䑕貪生就死實難有云官尚當死某豈願生於是悉配諸辭死者因投于外同黨盡誅又曰苻堅敗走劉牢之進屯鄄城討諸未服河南諸城望風歸順者甚衆苻堅子丕據鄴為慕容垂所逼請降牢之引兵救之垂聞軍至出新興城北走牢之與沛郡太守田次追之行二百里至五橋澤中争趣輜重軍稍亂為垂所擊牢之敗績士卒殱焉牢之策馬跳五丈澗得脱㑹丕救至因入臨漳集亡散兵復少振牢之以軍敗徵而還又曰苻堅敗壽春單騎遁還于淮北饑甚人有進壺飱豚髀者堅食之大悦曰昔公孫豆粥何以加也命賜帛十疋又曰毋丘儉文欽反司馬景王遣鄧艾督太山諸軍屯樂嘉欽將攻艾景王銜枚徑造樂嘉欽少子鴦年十八勇冠三軍謂欽曰及其未定請登城鼓譟擊之可破也既謀而行三譟而欽不能應鴦退相與引而東景王謂諸將曰欽走矣發鋭軍以追之諸將曰欽舊將鴦猛鋭引軍内入未有失利必不走也王曰一鼓作氣再而衰三而竭鴦三鼔而欽不應其勢已屈不走何待欽將遁謂鴦曰不先折其勢不得去也乃與騎十餘摧䧟陣所向皆披靡遂引去王遣驍騎八千翼而追之欽父子與麾下走保項儉聞欽敗棄衆遁淮南安風津都尉追儉斬之又曰苻堅率衆百萬屯壽陽列陣淝水謝𤣥謂苻融曰臨水為陣是不欲速戰請君稍却堅遂麾使陣退衆因亂不能止𤣥以精鋭决戰堅衆奔潰聞風聲鶴唳皆以為王師至草行露宿饑凍以死獲堅乘輿雲母車軍資山積又曰苻堅望八公山上草木皆類人形又見王師部陣謂融曰此亦勍敵也憮然有懼色及敗單騎遁于淮北饑甚人有進壺飱食者曰臣聞白龍厭天池之樂而見困余且今䝉塵之難豈自天乎晉中興書曰謝琰為㑹稽内史督五部事隆安四年孫恩攻上虞進及邢浦上黨太守張䖍碩戰敗於邢浦人情震懼羣賊鋭進咸以宜持重嚴備且列水軍於南湖又應分軍設伏以待之琰不聽外白賊至時尚未食琰曰要先􅌍此冦而後食耳跨馬而出廣武將軍桓寳為前鋒果敢能戰殺賊甚多而塘路迮狹魚貫不聚賊於艦中傍射前後斷絶琰至千秋亭與二子肇峻俱被害寳亦死之又曰劉道規及下邳太守孟懐玊等與桓𤣥戰于峥嶸洲義軍乘風縱火盡鋭爭先𤣥衆大潰燒輜夜遯𤣥故將劉統馮雅等聚黨四百人掩沒潯陽城建威將軍劉懐肅討平之其黨自相斬以降𤣥入江陵太守馮談勸使下戰𤣥欲歩出漢州投梁州而人情崩阻不可復合益州刺史毛璩弟璠卒璩使其從孫祐之叅軍費恬送璠䘮葬于江陵璩弟脩之為𤣥屯騎校尉𤣥計窮欲走漢中脩之誘以入蜀遂與石康等乘艦泝江數十里恬與祐之擊𤣥益州督䕶馮遷斫𤣥𤣥曰是何人耶敢殺天子遷曰欲殺天子之賊耳斬𤣥首并石康等五級庾頥之及殿中監萬蓋丁仙期皆死之𤣥年六十息昇六嵗云我是豫章王諸軍勿見殺遂送至江陵市斬之三十國春秋曰後燕慕容垂遣其子寳歩騎七萬伐後魏戰於叅合陂大敗寳以數千騎奔免士衆還者十一二寳恨叅合之敗屢言魏有可乗之機由是自率大衆伐魏至叅合見徃年戰處積骸如山設弔祭之禮死者父兄一時號哭軍中皆慟垂慚憤嘔血因而寢疾却還道卒宋書曰晉安王子勛舉兵潯陽宋將殷孝祖討之時賊據赭圻赭音者孝祖將進攻之與賊合戰常以鼓蓋自隨軍中人相謂曰殷統軍可謂死將矣今與賊交鋒而以羽儀自標顯若此射者十手攢射欲不斃得乎是日于陣中流矢死又曰王𤣥謨北圍滑臺為魏軍所追大破之流矢中臂二十八年正月還至厯城義叅遺𤣥謨書曰聞因敗為功臂上瘡將非金印之徵邪梁後畧曰丙午軍帥蕭方等至於長沙河東王譽率左右七千人置陣登髙以禦之方等兵精衆盛暗江水滿爭來赴戰俄爾之間方等衆潰譽軍以騎泅之悉皆投水方等與左右二百餘人馳徃赴舟舟中之指可掬方等溺于江中通典曰東魏大將齊神武與西魏大將周文帝戰邙山時周文見齊神武出旗鼔識之乃募取勇士三千令賀㧞勝摠之犯其軍適與齊神武相遇時募士皆用短兵接戰勝逐齊神武數里刃垂及之㑹勝馬為流矢所中死比副騎至齊神武已免去隋書曰煬帝使宇文述將兵東濟薩水去平壤城三十里因山為營文德復遣使偽降請述曰若旋師者當奉髙元朝行在所述見士卒疲弊不可復戰又平壤險固卒難致力遂因其詐而還衆半濟賊擊後軍於是大潰不可止九軍敗績一日一夜還至鴨渌水行四百五十里初渡遼九軍三十萬五千人及還至遼東城唯二千七百人帝怒以述等屬吏至東都除名為民唐書曰屈突通將自武關趨藍田以赴長安軍過潼關為劉文靜所遏不得進相持月餘通又令顯和以歩騎萬人夜襲文靜詰朝大戰義軍不利顯和縱兵入我二栅而戰者徃復數焉文靜為流矢所中義軍氣奪垂至於敗而文靜逰軍數百騎自南山而來擊其背顯和大敗疋馬而歸通勢彌蹙自摩其頸曰要當為國家受人一刀耳勞勉將士未嘗不流涕人亦以此懐之又曰安禄山之亂哥舒翰領兵馬歩十二萬賊將崔乾祐會戰初哥舒翰造氊車以氊蒙其車以馬駕之畫以龍虎之狀五色相烜以金銀餙其畫獸之目及爪將衝戰馬因其驚駭擬從而掎角攢戈矢而逐之賊知其計積薪蒭於隘路候氊車至順風縱火焚之駕馬奔駭燒氊車薪蒭烟熖昏黑兩軍不相辨我師謂賊軍在烟熖中遂集弓弩併力射之賊軍抽退盡日矢盡方覺無賊我師衆從關門六七十里路狹北抵黃河南抵古岸排蹴進不得賊抽軍從南山設疑曵柴揚塵以伺羅諸兵習險直透黄河古岸橫截我師我師敗績沉河而死十有二三又曰潼關之戰哥舒翰在河北髙阜上觀軍陣進退之勢于時有般糧船在河北岸左右言取船渡兵可得遂令將船百餘隻到南岸渡人舟中之指可掬登舟爭渡者不可勝數毎滿即沉如是登船沉者數十渡餘軍盡散還入關三國典畧曰齊師既敗軍士奔至江者縳荻為筏多被沒溺浮屍翳江至於京先是童謡曰虜馬萬疋入南湖城南酒家使虜奴至是梁軍士以齊兵質酒一人纔得一醉又曰周武伐齊齊主亦於塹北列陣謂髙阿那肱曰戰是耶不戰是耶那肱曰不如勿戰却守髙梁橋安坐報曰一把子賊馬上刺取擲著汾陽中諸内叅曰彼亦天子我亦天子彼能懸軍逺來我何為守塹示弱齊主曰此言是也使讓那肱曰爾富貴足惜性命耶乃過塹南引帝大喜齊主親戰東偏頗有退者淑妃怖曰軍敗矣穆提婆進曰大家去大家去齊主以淑妃奔髙梁關奚長樂諫曰半進半退戰家常體今兵衆全整未有傷敗陛下捨此安之御馬一動人情驚擾願速還安撫齊主將從之穆提婆引其肘曰長樂言何可信齊衆大潰軍資甲仗數百里間委棄山積在陣死者八千餘人齊主退走至洪洞戍又曰周遣大將軍王軌破陳於吕梁擒其司空南平郡公吳明徹徐州刺史董安公程文季等俘斬三萬餘人初軌潛於清水入淮口多竪大木以鐵鎻貫車輪横截水流遏斷船隻蕭摩訶謂明徹曰聞王軌鎻下流其兩邊築城今尚未立若見遣擊之彼必不敢相拒彼城若立則吾屬且為虜矣明徹乃奮髯曰搴旗陷陣將軍事也長算逺畧老夫事也摩訶失色而退一旬之間我兵益至摩訶又請明徹曰今求戰不得進退無路若潛軍突圍未足為耻願公率歩乗車輿徐行摩訶領鐵騎數千驅前後必當使公安逹京邑明徹曰弟之此計乃良圖也然老夫受脤専征不能戰勝攻取今被圍逼慙無地且歩軍既多吾為摠督必湏身居其後相率兼行遂欲破堰大軍以舫載馬北譙州刺史裴子烈議曰若决堰下船船必湏順倒不如前遣馬於事為允㑹明徹疾篤知事不濟遂從之乃遣摩訶率馬數千前還明徹决堰乘水而退至清口水勢漸㣲船礙車輪並不得渡軌圍而􅕚之明徹力窮就執陳之鋭卒於是殱焉衛公兵法曰或若軍有賢智而不能用者敗上下相親而各述已長者敗賞罰不當而衆多怨言者敗知而不敢擊不知而擊之者敗地利不得而惟欲前戰者敗勞逸無别不曉車騎之用者敗斥堠不審而輕敵懈怠者敗行於險道而不知深溝絶澗者敗陣無選鋒而竒正不分者敗凢此十敗非天之殃將之過也夫兵者寧千日而不使不可一時而不勝故白起對秦王曰明王愛其國忠臣愛其名寧復其重誅不忍為辱軍之將又嚴顔謂飛曰卿等無狀侵奪我州有斷頭將軍無降將軍也故二將咸重其名節寧就死而不求生者蓋知敗衂之耻斯誠甚矣説苑曰晉荆戰於邲晉師敗績荀林父將歸請死景公將許之士貞子曰不可城濮之役晉勝于荆而文公猶有憂色曰子玉猶存憂未歇也困獸猶鬭况國相乎及荆殺子玉乃喜今天或者大警晉也林父之事君進思盡忠退思補過社稷之衛也今殺之是重荆勝也景公曰善乃使復將潘安仁馬汧督誄序曰昔乗丘之戰賁父御魯莊公馬驚敗績賁父曰他日未嘗敗績今而敗績是無勇也遂死之又曰偏師禆將殞首覆軍者蓋以十數太平御覽卷三百二十三
