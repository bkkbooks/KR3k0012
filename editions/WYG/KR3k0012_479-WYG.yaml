body:
  text: 太平御覽卷四百七十九宋李昉等撰人事部一百二十報恩毛詩曰投我以木桃報之以瓊瑶匪報也永以為好也又曰無言不酬無德不報左傳曰靈公將殺趙盾伏甲而饗之初宣子田於首山舎翳桑見靈輙餓問其病曰不食三日矣食之既而為介倒㦸以御公徒而免之問何故曰翳桑之餓人也又曰晉大夫魏武子有寵妾無子武子疾命其子顆曰我死必嫁之及其疾困曰以殉武子卒顆嫁之曰疾困則亂吾從其治也其後及秦戰於輔氏大敗秦師獲杜回方戰見一老父結草以抗杜回杜回秦之力士杜回躓而顛故獲之夜夢一老人謂己曰予汝嫁妾之父也爾用先人治命故以是報戰國策曰中山君饗都大夫司馬子期在焉羊羮不徧子期怒而走於楚說楚以伐中山中山君亡走有二人挈戈隨其後者君顧二子奚為對曰臣父嘗餓且死君下壺飱哺之臣父且死言曰中山有事汝必死之故來死為君也中山君慨然曰吾以一杯羮亡國以一壺飱得二人史記曰王稽載范睢入秦為相雎乃入言之王曰非王稽之忠莫能内臣於函谷關非大王之賢聖莫能貴臣今臣官至於相爵在列侯王稽之官尚止於謁者非所以内臣之意也王召稽拜以為河東太守又曰袁盎自為呉相時有從吏嘗盗盎侍兒文穎云婢盎知之不泄遇之如初人有告從吏言君知爾與侍者通乃亡歸盎自追還遂以侍者賜之及袁盎使呉見守從吏􅃴為守盎校尉司馬乃悉以其齎裝置二石醇醪㑹天寒士卒饑渴飲酒醉西南陬卒皆卧司馬夜引袁盎起曰君可以去矣呉王期旦日斬君盎不信曰公何為者司馬曰臣故為從吏盗君侍兒者盎乃驚謝之而去又曰蘇秦旣貴乃遍報諸所嘗見德者其從者有一人獨未得報乃前自言蘇秦曰我非忘子子之至燕再三欲去我易水上方是時我困故望子深是以後子子今亦得矣又曰項王使召韓信信謝曰臣事項王官不過郎中位不過執㦸言不聽畫不用故去而歸漢王授我上將軍印與我數萬衆解衣衣我推食食我言聽計用故吾得以至此夫人深親信我我背之不祥雖死不易漢書曰髙祖為亭長送徒咸陽諸吏皆送錢蕭何獨以五百上定天下益何封三千户以荅其意又曰欒布彭越嘗與遊窮困賣傭為酒家保彭越贖布為梁大夫使于齊未反漢召彭越責以反夷三族梟首雒陽下詔有收視者輙捕之布還奏事彭頭下祠而哭之又曰高祖奪韓信軍徙為楚王都下邳信至國召所從食漂母賜千金及其下鄉亭長錢百曰公小人為德不竟史記云為惠不終也又曰張蒼陽武人有罪當斬解衣服鑕身長大肥白如瓠時王陵見而怪其美士乃言沛公赦勿斬以為常山相蒼德王陵及貴父事陵陵死蒼為丞相洗沐常先朝陵夫人上食然後敢歸又漢書盖寛饒左遷為衛司馬未出殿門斷其單衣令短離地冠大冠帶長劒躬按行士卒廬室視飲食居處有疾病者身自臨問加致醫藥遇之甚有恩及嵗交代上臨饗罷衛卒數千人皆叩頭自請復留更一年以報寛饒厚德宣帝嘉之拜寛饒為太中大夫又曰朱買臣為㑹稽太守悉召見故人與飲食諸嘗有恩者皆報復焉又曰宣帝在長安獄中邴吉保䕶養視上知吉有舊恩而終不言特賢之詔曰御史大夫與朕有恩厥德茂焉詩不云乎無德不報其封吉為􅀶陽侯食邑千三百户又曰陳平旣貴寵封侯乃謂高祖曰臣不因魏無知無以得見陛下請報之又曰張賀幸於衛太子太子敗賀下蠶室後為掖庭令而宣帝収養掖庭賀拊循恩甚宻及宣帝即位而賀已死上追思德賀賀一子早死子安世小男彭祖欲封之先賜爵關内侯東觀漢記曰建武二十六年上延集内戚讌會諸夫人各前言為趙熹所濟活帝甚嘉之後徴熹入為太僕引見謂曰卿非但為英雄所保也婦人亦懐卿之恩厚加賞賜袁宏後漢書曰鄭宏字巨君少事􅀶士焦貺貺門徒數百人當舉明經其妻勸貺曰鄭生有卿相才應此舉者也厚贈之楚王英謀反遍誣天下知名者貺以楚徴疾病道死妻子閉詔獄考掠連年諸生故人皆易姓名以避其禍宏獨髠首負鑕為貺訟罪明帝感悟乃免貺家屬魏志曰太祖平幽州召孫禮為司空軍謀掾初荒亂時禮與母相失同郡馬台求得禮母禮推家盡以與台又曰楊沛字孔渠為新鄭長課民並蓄桑椹收䝁豆積得千餘斛後為鄴令賜其生口十人絹百疋以報乾椹又曰曹真字子丹沛郡人本姓秦養曹氏或云其父伯南夙與太祖善袁術部黨與太祖相攻太祖出為冦所追走入秦氏伯南開門受之冦問所在答云我是冦遂害之由此太祖思其功遂變其姓又曰郭援捕得賈逵逵不肯拜謂援曰王府君臨郡積年不知足下曷為者也援曰促斬之諸將覆護乃囚之閉著土窖中以車輪盖上使人固守方且殺之逵從窖中謂守者此間無徤兒耶何使義士死乎時祝公道與逵非故而􅃴聞其言憐其守正乃夜盗引出折械遣去不語其姓名援破後逵知前出已者是祝公道河南人後坐他事當伏法逵救不能解為之改服呉録曰孫權旣斬黄祖作二函欲以盛祖及都督蘇飛首甘寧之在祖軍也獨飛厚之寧為請叩頭流血權曰為君置之若走如何對曰飛受更生之恩豈圖去若有萬一寧頭當代入函也乃舎之蜀志曰法正為蜀郡太守揚武將軍外統都畿内為謀主一飡之德睚眦之怨無不報復或謂諸葛亮曰法蜀郡太縱横將軍冝啓主公抑其威福亮答曰主公之在公安也北畏曹操之强東憚孫權之逼近則懼孫夫人生變於肘腋之下當斯之時進退狼䟦法孝直為之輔翼令翻然翺翔不可復制如何禁法使不得行其意耶晉書顧榮與同寮宴飲見執炙者貌狀不凡有欲炙之色榮割炙㗖之坐者問其故榮曰豈終日執之而不知其味及倫敗榮被執將誅而執炙者為督救免之干寳晉紀曰王濬在巴郡兵民苦役生男多不舉濬乃嚴其殺子之防而厚䘏之所育者數千人於此能稱兵矣父母戒之曰王府君生爾必勉之無愛生宋書王鎮惡嘗寄食澠池人李方家善遇之謂方曰若遭遇英雄主要取萬户侯當厚相報方答曰君丞相孫人才如此何患不富貴陳書曰隂鏗釋褐梁湘東王法曹叅軍天寒鏗嘗預賔友宴飲見行觴者因回酒炙以授之衆坐皆笑鏗曰吾儕終日酣飲而執爵者不知其味非人情也及侯景之亂鏗嘗為賊所擒或救之獲免鏗問其故乃前所行觴者唐書曰李晟嘗有恩者厚報之初譚元澄為嵐州刺史有恩於晟後坐貶於岳州比晟貴上䟽理之詔贈元澄寧州刺史元澄三子晟撫待勤至皆為成就宦學人皆義之呉越春秋曰呉師入郢引軍擊鄭定公前旣殺楚太子建而困於子胥由此怨鄭兵將入境定公大懼乃令於鄭邦中曰有能還呉軍者吾與之分邦而治漁者子聞而進曰臣能還之不用兵戈升糧得一橈行歌道中即還矣定公大悅乃與一橈子胥軍將至漁者子當路叩橈行歌辭曰蘆中人蘆中人子胥聞之大驚曰何等人者即請與語曰吾是漁者子吾國君怖懼令於國中有能還呉軍吾與之分國而治臣念先人與君相遭於途今從君乞鄭之罪也子胥曰吾䝉子先人之恩自致於此上天蒼蒼豈敢忘子之功乎於是乃釋鄭不伐又曰伍子胥伐楚還溧陽瀬水之上長嘆曰吾嘗饑於此乞食而殺一婦人將欲報之金不知其家遂投金瀬水之中而去有頃一嫗行哭而來問曰嫗何故之悲也嫗曰吾昔有女守吾年三十不嫁往年擊漂於此遇人窮飯之而已恐泄事自投於瀬水上而死今吾聞伍君來不得其家自傷空乏無為報者故行哭之悲也人曰胥欲報嫗百金不知嫗所在投金水中而去嫗乃取金以歸也劉向說苑曰呉赤布使於智氏假道於衛寗文子具紵絺三百製送之將歸呉智伯命造舟為梁赤布曰吾聞天子濟於水造舟為梁諸侯方舟大夫繼舟臣之職也具大其必有故使人視之則用兵在後赤布曰衛假吾道而厚贈我我見難不告是與為謀也稱疾而留使人告衛衛人驚戒智伯乃止又曰楚莊王賜羣官酒日暮燈燭㓕有引妾衣者妾得其冠纓持之趣火來上視絶纓者王曰賜人酒使醉失禮柰何欲顯婦人節而辱士乎乃令曰夜飲不絶纓者不歡羣臣百餘人皆絶乃大醉盡歡後二十年晉與楚戰有一臣常在前五合五獲甲首却敵卒勝怪而問之對曰臣當死往醉失禮王隱不誅也終不敢以隂蔽之德而不顯報常願肝膽塗地頸血湔敵人矣臣乃絶纓者也遂平晉軍楚得以强又曰陽虎得罪於衛北見簡子曰自今以來不復樹人矣簡子曰唯賢者為能報恩不肖者不能夫春樹桃李者夏得休息秋得食焉樹蒺藜者夏不得休息秋得其刺焉今君所樹者蒺藜也異苑曰景平中東陽大水永康人蔡嘉夫避往南壠夜有大䑕形如狸浮水而來徑伏嘉床角奴惡而不犯每食轉以餘飰與之水勢退嘉夫得反居䑕以前脚捧青紙裹約三寸許看奴啾啾狀如欲語從此去來不絶也又曰始興陽山縣人行田忽遇一象以鼻卷之遥入深山見一象脚有巨刺此人牽挽得出病者即起相與跼陸狀若懽喜前象復載就一汙濕地以鼻掘出數長牙送還本處彼境苗稷常為象所困其象俗呼大客因語云我田稼在此恒為大客所犯若念我者勿見侵便覺躑躅如相訓解於是一家業田絶無其患三秦記曰白鹿原人釣魚於原綸絶而去漢武夣魚求去其鈎明日戯於池見大白魚衘索帝曰豈非昨所夢取而去之間三日帝復遊池濵得明珠一雙武帝曰豈非昔魚之報桓冲之述異紀曰陳留周氏婢名興進入山取樵夢見一女語之曰近在汝目前目中有刺煩為㧞之當有厚報有見一朽棺頭穿壊髑髏墮地草生目中便為㧞草内着棺中以甓塞穿即於髑髏處得一雙金指環呉均續齊諧記曰𢎞農楊寳見一黄雀為鴟梟所摶取之以歸置巾箱中飬之百餘日毛羽成朝去暮還後寳乆讀書未卧有黄衣童子向寳再拜曰我王母使臣昔使􅅫萊不慎為梟所摶蒙君仁愛救拯今當受使南海不得奉侍以白環四枚與寳令君子孫㓗白且位登三事當如此環矣東陽元凝齊諧記曰富陽董昭之嘗乘船過錢塘江中央見有一蟻着一短蘆甚廹遽昭之曰此畏死也便以繩繫此蘆着船頭蟻縁繩出中夜夢一人烏衣從百許人來謝云僕不慎墮江䝉君濟活僕是蟻中王君若急難之日當見告後昭遇事繫獄蟻穴獄昭遂得脫盛宏之荆州記曰隋侯曾得大蛇不殺而遣之蛇後銜明月珠以報隋侯一名隋侯珠孔靈符㑹稽記曰射的山南有白鶴山一鶴為仙人取箭漢太尉鄭宏嘗採薪得一遺箭頃有人覔宏還之問何所欲宏曰常患若耶溪載薪為難願旦南風夕北風後果然劉義慶幽明録曰項縣人姚牛年十餘嵗父為鄉人所殺牛手刃之於衆中吏捕得官長深矜節孝為推遷其事㑹赦得免令後出獵逐鹿入草中有古深穽數處馬將趣之忽見一翁舉杖擊馬馬驚避不得及鹿令怒引弓將射之翁曰此中有穽恐君墮耳令曰汝為何人翁跪曰姚牛父也感君活牛故來謝恩遂㓕不見又曰苻堅時有射師經嵩山望見松山有一雙白鳥似鵠而大至樹下又見一蛇長五丈許上樹取鳥鳥欲飛蛇張口翕之鳥不去繽紛一飡頃射師彀弩射三矢蛇落鳥得去樹百餘歩山邉整理毛羽湏臾雲雷發射師懼不得旋踵見向鳥徘徊其上毛落紛紛似如相援如此數陣雲息電㓕射師得免鳥亦髙飛三輔决録曰髙陵龎智伯名勃為郡小吏東平衛農字剽為書生窮乏客鍜於勃家勃知其賢禮待顧眷當去送十里過舅家復貸錢贈之農受曰為馮翊乃相報别七八年果為馮翊勃為門下書佐忘之矣農召問乃寤舉孝廉為尚書郎左右丞魏郡太守又曰趙岐避難於四方江海岱霍無所不至自匿姓名布衣布絮賣餅北海市安丘孫嵩年二十餘遊市見趙歸㣲察知非常人駐車呼與共載曰我北海孫賓石顧終不相負岐聞嵩即以實告遂與俱歸嵩先入白母曰今日出得死友在外岐即嵩家積年乃出後詣劉表時北海孫嵩流離在劉表末座不為表所識岐遙識之向表說嵩表甚竒重之因共表嵩為青州刺史干寳搜神記曰噲叅寓居河内䖍恭父母忽有單鶴趣之叅撫視箭創甚重於是以膏藥摩之月餘漸愈放而飛去数十日間夜鶴雌雄二頭各銜一珠吐而去搜神記曰羊公雍伯本以儈賣為業性篤孝父母終葬無終山遂家焉山髙無水公汲水作義漿於坂頭行者皆飲之三年有一人就飲以一升石子與之使至髙平好地有石處種之得五雙白璧名玉田起於此也續搜神記曰晉咸康中豫州刺史毛寳戍邾城有一軍人於武昌市見人賣一白龜子長四五寸色白可愛其使買取持歸着瓮中養之日漸大近及尺許其人憐之持至江邉于水中視其遊去後邾城遭石虎敗毛豫州旣赴江莫不沉溺所養龜人于時被鎧持刀亦同自投入水中覺如見一石上水裁至腰湏􅁷浮去中流視之乃是先養白龜甲巳長六七尺旣送至東㟁出頭視之徐遊而去中江猶還顧者數四焉陳夀益部耆舊傳曰王忳嘗詣京師於空舎中有一書生病困愍而視之書生謂忳曰我當到洛陽而病腰下有金十斤願以相贈死後乞藏骸骨未及問姓名而絶忳即鬻金營葬餘金悉置棺下後數年縣署大度亭長初到日有馬馳入亭而止其日大風飄一繡被復墮忳前張氏家傳曰禧字彦祥除敦煌令嘗有鶴負矢集禧庭以甘草湯洗之傅藥留養十餘日瘡愈飛去月餘啣赤玊珠二枚置禧㕔前晏子曰北郭騷見晏子曰竊說先生之義願乞以養母晏子使人分粟及金以遺之辭金受粟有間晏子見疑於景公乃出奔北郭子曰養及親者身更其難遂告公庭曰晏子天下之賢也去齊齊國必侵不若先死乃自殺公自追及郊而反晏子曰士以身明人信哉吕氏春秋曰秦繆公嘗失右服馬公自往求見野人方食之於岐山之陽繆公笑曰食駿馬肉不飲酒余恐傷汝也遍飲而去居一年為韓原之戰晉人已環繆公之車晉梁由靡已扣繆公嘗食馬肉三百餘人疾闘車下遂大克晉反獲晉惠公以歸又曰趙簡子有兩白䯁甚愛之陽城胥渠劇陽城姓胥渠名劇猶病也廣門之官夜欵門而謁曰主君之臣胥渠有疾醫教曰得白䯁之肝則止不得則死請入通董安于御於側簡子曰殺白䯁取其肝以予陽城胥渠旡幾何趙興兵而攻翟廣之門官七百人皆先登而獲甲首太平御覽卷四百七十九
