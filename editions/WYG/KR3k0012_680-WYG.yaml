  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_680-1a, image: WYG0899/WYG0899-0114c.png}
body:
  text: 太平御覽卷六百八十宋李昉等撰儀式部太常旂旌斾旟旐旛麾旄頭雲䍐黄鉞豹尾警蹕太常釋名曰九旗之名日月為常畫日月於其端天子所建言常明周禮曰司常掌九旗之物名日月為常又曰節服氏掌祭祀朝覲衮冕六人維王之太常禮記曰成王封周公於曲阜命魯公世世祀周公以天子之禮樂是以魯君乗大路載孤韣旂十有二旒日月之章又曰旂有十二旒龍章而設日月以象天也旂釋名曰交龍爲旂旂依倚也通以赤色為之無文采諸侯所建也爾雅曰有鈴曰旂懸鈴於竿頭畫蛟龍於旒也詩曰載見辟王曰求厥章龍旂陽陽又曰魯侯戾止言觀其旂其旂筏筏鸞聲噦噦周禮曰龍旂九斿以象大火也傳曰臧哀伯諌曰三辰旂旗昭明也三辰日月星也畫於旂旗象天之明又曰子魚曰以先王觀之則尚德也昔武王克商成王定之選建明德以藩屏周故周公相王室以尹天下於周爲睦分魯公以大路大旂旌釋名曰析羽爲旌旌精也有精光也爾雅曰注旄首曰旌載旄於竿頭也周禮曰析羽爲旌凢軍士建旌旗甸亦如之凢射共獲旌嵗時共更旌禮記曰武車綏旌綏垂舒之德車結旌不盡飭結謂收歛之也左傳曰初衞宣公烝於夷姜生伋子屬諸右公子爲之娶於齊而美公取之生壽及朔屬壽於左公子夷姜縊宣姜與公子朔搆伋子公使諸齊将殺之壽子告之使行不可曰棄父之命惡用子矣有無父之國則可也及行飲以酒壽子載其旌以先盗殺之伋子至曰我之求也彼何罪請殺我乎又殺之又曰楚許伯御樂伯攝叔爲右以致晉師許伯曰吾聞致師者御靡旌摩壘而還又曰宋公享晉侯于楚丘請以桑林舞師題以旌夏旌夏大旌也以大旌表識其行列晉懼退入於房去旌卒享而還詩曰孑孑干旌在浚之城史記曰蘇秦説楚合從楚王曰寡人自料以楚當秦不見勝也内與羣臣謀不足恃也寡人卧不安席食不甘味而心揺揺然如懸旌而無所終薄今主君欲一天下収諸侯存危國寡人謹奉社稷以從於是六國從合而併力焉斾釋名曰雜帛爲斾以雜色綴其邊爲翅尾也将帥所建象物雜色也爾雅曰繼旐曰斾詩曰蕭蕭馬鳴悠悠斾旌又曰織文鳥章白斾央央左傳曰晉或以廣隊不能進楚人惎之脱扄少進馬還惎之拔斾投衡又曰晉侯伐齊齊登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而踈陳之使乗車者左實右僞以斾先輿曵柴而從之齊侯見之畏其衆也乃晚歸又曰八月辛未治兵建而不斾建立旌旗不曵其斾斾㳺也壬申復斾之諸侯畏之旟爾雅曰錯革鳥曰旟釋名曰鳥隼爲旟旟譽也軍吏所建急疾趨事則有稱譽矣周禮曰鳥旟七斿以象鵓火也詩曰衆維魚矣旐維旟矣大人占之衆維魚矣實維豐年旐維旟矣室家溱溱旐釋名曰龜蛇爲旐旐兆也龜知氣兆之吉㐫建之於後察事宜之形兆也爾雅曰緇廣充幅長尋曰旐周禮曰龜蛇四游以象營室詩曰我出我車于彼郊矣設此旐矣建彼旄矣彼旟旐斯胡不斾斾斾斾旒垂貌又曰出車彭彭旂旐央央旛釋名曰旙幡也其貌幡幡然也魏志曰陶謙字恭祖少孤以不覊聞年十四猶綴帛爲幡乗竹馬戯邑中宋書曰髙祖討盧循戰於左里髙祖麾之竿折幡沉於水衆咸懼髙祖笑曰昔覆舟之役亦如之今勝必矣果破賊麾蔡邕月令章句曰麾鳥翼以爲幢麾也魏志曰張遼從征袁尚於桞城卒與虜遇遼勸太祖戰氣甚奮太祖壮之自以所持麾授遼遂擊大破之斬單于蹋頓旄頭史記曰昴星曰旄頭漢書曰梁丘賀字長翁宣帝祠孝昭廟先驅旄頭劒挺墮音地首垂泥中挺引也劍自然引出也刅嚮乗輿車馬驚於是召賀筮之有兵謀不吉上還使有司侍祠是時霍氏外孫任宣坐逆謀反宣子章夜𤣥服入廟執㦸欲爲逆發覺伏誅東觀漢記曰東海王彊置虎賁旄頭應劭漢官儀曰舊曰羽郎爲林旄頭放髮馳今但用營士元中記曰秦始皇時終南有梓樹大數百圍䕃宫中始皇惡之興兵伐之天輙大風雨飛沙石人皆疾走至夜瘡合有一人中風雨傷寒不能去留宿夜聞有鬼來問樹言秦王㓙暴相伐得不困耶樹曰來即作風雨擊之其柰吾何鬼又曰秦王使三百人披頭以赤絲繞樹伐汝得無敗乎樹漠然無言疾人報秦皇案言伐斷中央有一青牛出逐之入水秦王因立旄頭騎摯虞决疑録要注曰世祖武皇帝因㑹問侍臣曰旄頭之義何指耶侍中彭權對曰秦記云國有竒怪觸山截水無不崩潰唯畏旄頭故使虎士服之衛至尊也中書令張華曰有是言而事不經臣以爲壮士之怒髪踴衝冠義取於此也徐爰釋疑畧曰乗與黄麾内與林班弓箭左右者罼䍐熊皮謂之旄頭魏武表曰不悟陛下復加後命命置旄頭以此東海雲䍐徐廣車服注曰雲䍐罼䍐也司馬相如上林賦曰弋𤣥鵠弄干鏚載雲䍐掩羣雅雅鳥張衡東京賦曰雲䍐九游闟㦸轇轕潘岳籍田賦曰五輅鳴鑾九旗揚斾瓊鉞入鋭雲䍐晻藹黄鉞説文曰鉞大斧也夏執𤣥戈殷執白戚周左仗黄鉞字林曰鉞斧也書曰武王左仗黄鉞右秉白旄周書曰武王陳牧野既誓以馳商師大崩商辛自燔於火王斬之以黄鉞懸諸太白左傳曰楚王将戮齊慶封負之斧鉞以狥於諸侯曰無或如齊慶封弑其君弱其孤以盟其大夫封反曰無或如楚共王之子圍殺其君之子而自立以盟諸侯漢書曰王莽使司徒王尋鎮洛陽初發長安宿覇昌廐亡其黄鉞尋士房楊素狂直乃哭曰此經所謂䘮其齊斧者也莽聞乃殺之吳志曰假陸遜黄鉞吳王親執鞭以見之晉公卿禮秩曰太尉賈充河間王顒梁王彤司徒王衍汝南王亮太𫝊楊駿東海王鉞義陽王望齊王収琅琊王伷東平公茍晞皆假黄鉞晉書曰石勒王彌冦京師以王衍都督諸軍持節假黄鉞以征之齊書曰髙帝輔政王儉議加黄鉞任遐曰此文事應報禇公彦回也帝曰禇脱不與卿将何計遐曰彦回保妻子愛性命非有竒才異節遐能制之果無違異崔豹古今注曰金斧黄鉞鐵斧𤣥鉞三代通用之以斷斬今以黄鉞爲乗輿之飾𤣥鉞諸公王得建之武王以黄鉞斷紂頭故王者以爲戒太公以𤣥鉞斬妲己故婦人以爲戒漢制諸公建𤣥鉞以太公助武王斷斬故爲諸公之飾大将出征特加黄鉞者以銅爲之黄金塗刃及柄不得純金也淮南子曰至精之感無所不通昔武王渡孟津而陽侯之波逆流而擊疾風晦㝠武王舉黄鉞瞋目麾之曰予任天下誰敢害吾意者於是風去而波罷遂得濟又曰國有難召将詔之曰社稷之命在将軍身今國有難願子将而應之将軍受命乃令祝史太卜齋三日之太廟鑚靈龜卜吉曰以受旗鼓君入廟門西面而立將堂下北面立王親操鉞持頭授将軍柄曰從此上至天者将軍制之又復操斧持頭授将軍其柄曰從此下至淵者将軍制之世説曰諸葛亮之次渭濵也魏明帝遣辛毘爲軍司宣王既與亮對渭濵而陣亮設誘譎萬方宣王果大怒憤将應以重兵亮遣間諜視之還曰有老夫毅然仗黄鉞當軍門立軍不得出亮曰此辛毘也徐爰釋疑略注曰豹尾黄鉞金鉦舊載馬車晉江左乗馬執之宋元嘉中復舊典豹尾崔豹古今注曰豹尾車周制也象君子豹變尾言謙也古軍正建之今唯乗輿得建焉漢書曰成帝趙昭儀方大幸每上甘泉嘗從在屬車豹尾中晉中興書徵祥説曰海西公初即位忘設豹尾亦服妖也豹尾儀服之主大人所以豹變也西海凢庸不可以主社稷故忘其豹尾示不能終晉書曰王敦謀逆以沈充錢鳯爲謀主明帝誅之使充鄉人沈楨往諭充以為司空充曰丈夫共事終始當同寜可中道改易禎陳成敗苦勸之充不納率兵臨發謂妻子曰男兒不竪豹尾約不還也齊書曰髙昭劉皇后年十七裴方明爲子求婚酬許已定后夢見先有迎車至猶如常家迎法后不肯去次有迎至龍旂豹尾有異於常后喜而從之既而與裴氏不成婚竟嬪於上武昌記曰樊口南百歩有樊山孫權獵於山下依夕見一姥問權獵何所得對云正得一豹姥曰何不􅆆其尾語竟忽然不見因爲立廟以其處樊山神故名爲樊山大姥蔡邕獨斷曰大駕屬車七十一乗最後一車懸豹尾豹尾已前皆省中警蹕周禮曰夏官𨽻僕掌蹕宫中之事蹕止行者又曰師氏掌以媺詔王告王以善道也使其屬帥四夷之𨽻各以其兵服守王門之外旦蹕蹕止行人使不得近王宫又曰鄉士掌大賓客率其屬夾道而蹕史記曰文帝過渭橋有一人橋下走出乗輿馬驚捕屬之廷尉曰縣人聞蹕聲匿橋下乆之出見車騎即走爾廷尉張釋之奏此人犯蹕當罰金事具刑法門漢書曰梁孝王竇太后少子愛之得賜天子旌旗從千乗萬騎出稱警入言蹕擬於天子又曰上官桀與燕王詐上書奏霍光道上稱蹕續漢書曰建安二十二年命魏王建天子旌旗出警入蹕東觀漢記曰姚期爲光武職曺椽從平河北上至薊薊大應王郎上驚去吏民遮道不得行期瞋目道左曰蹕大衆披辟後上即位上笑曰卿欲逐蹕耶又曰楊秉諌桓帝曰王者至尊出入有常警蹕而行清室而止漢舊儀曰皇帝出殿則傳蹕止人先置素室清宫而後住晉書曰桓𤣥京師警蹕不絶于道宋書曰竟陵王誕在石頭城内修乗輿法物習唱警蹕南史曰武帝永明末梁與兄懿卜居東郊之外范雲亦築室相依梁武每至雲所妻常聞蹕聲又嘗與梁武同宿顧嵩之舍妻方産鬼在外曰此中有王有相雲起曰王當仰屬相以見歸因是盡心推事又曰侯景即位唱警蹕識者以爲名景而言警蹕非乆祥也景聞惡之改爲備蹕人又曰備於此便畢矣周生列子曰庖饌班錯所享不過一味華盖結駟列道警蹕其榮不過容膝蘓子曰夫走卒警蹕列呼而行此諸侯之所謂榮華世俗之所謂富貴也楊雄甘泉賦曰八神奔而警蹕太平御覽卷六百八十
