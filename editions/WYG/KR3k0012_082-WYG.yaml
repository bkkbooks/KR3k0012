body:
  text: 太平御覽卷八十二宋李昉等撰皇王部七夏禹帝啓帝太康帝仲康帝相有窮后羿寒浞帝少康帝杼帝槐帝芒帝泄帝不降帝扃帝厪帝孔甲帝臯帝發帝桀夏禹史記曰夏禹名曰文命禹之父曰鯀鯀之父曰帝顓頊顓頊之父曰昌意昌意之父曰黄帝帝堯之時洪水滔天浩浩懷山襄陵下民其憂堯求能治水者羣臣四岳皆曰鯀可於是用鯀治水無功乃殛鯀於羽山堯崩舜問四岳曰有能成美堯之事者使居官皆曰伯禹為司空可成美堯之功舜曰嗟然命禹汝平水土維是勉之禹拜稽首讓于契后稷臯陶舜曰女其往視爾事矣禹為人敏給克勤其德不違其仁可親其言可信聲為律身為度稱以出亹亹穆穆為綱為紀禹乃遂與益后稷奉帝命命諸侯百姓興人徒以敷土行山表木定髙山大川禹傷先人之功不成受誅乃勞身焦思居外十三年過家門不敢入陸行乘車水行乘船泥行乘橇孟子橇形如箕橋行泥上如浮曰橇謂以板置泥上通行路也山行乘􅀈徐廣曰撪音丘遥反如淳曰􅀈車謂以鉄如錐長半寸施之履下以上下山不蹉跌也開九州通九道陂九澤度九山舜崩三年喪畢禹避舜之子商均於陽城天下諸侯皆去商均而朝禹禹於是遂即天子位南面朝天下國號曰夏后姓姒氏娶塗山氏之女生子曰啓禹東巡狩至于會稽而崩帝王世紀曰伯禹夏后氏姒姓也母曰修己見流星貫昴夢接意感又吞神珠薏苡胷折而生禹於石紐虎鼻大口兩耳參漏首戴鈎鈴當胷有玉斗足文履已故名文命字髙宻身長九尺二寸長於西羗而東夷卒也禹未登用之時父既降在匹庶有聖德夢自洗于河觀於河始受圖括地象也圖言治水之意四嶽舉之舜進之堯堯命為司空繼鯀治水乃勞身勤苦不重徑尺之璧而愛日之寸隂手足胼胝故世傳禹病偏枯足不相過至今巫稱禹步是也又納禮賢士一沐三握髮一食三起堯美其績乃賜姓姒氏封為夏伯故謂之伯禹天下宗之謂大禹年二十始用三十二而洪水平年百嵗崩于會稽因葬會稽山隂縣之南今山上有禹冢井祠下有羣烏耘田修己或云修紀未詳河圖握矩起曰帝命伯禹曰告汝九術五勝之常可以克之汝能從之汝師徒將興雒書靈准聽曰有人謂禹也大口兩耳參漏足文履已漏空也戊己土之日故當平水土故以為名也首戴鈎鈴有骨表如鈎鈴胷懷玉斗懷璇璣玉衡之道或以為有黒子如玉斗也書曰禹别九州分其圻界隨山濬川刋其木深其流任土作貢任其土地所有貢賦又曰正月朔旦受命于神宗受舜終事之命神宗即帝之宗廟言神尊也率百官若帝之初舜初攝帝故事尚書帝命驗曰禹白帝精以星感星金精也修己山行見流星意感栗然生姒戎文禹栗然威貌姒禹氏禹生戎地一名政命尚書璇璣鈴曰禹開龍門導積石决岷山治九貢龍門積石山名貢功也治九州之功又曰禹開龍門導積石出𤣥珪上刻曰延喜玉受德天錫佩禹功既成天出𤣥珪以錫之古者以德佩禹有治水功故天佩以𤣥玉尚書中候曰伯禹在庶伯禹即禹號也因為德謚庶庶人也四嶽師舉薦之帝堯四嶽四方諸侯也師衆也薦進也握括命不試爵授司空禹握括地象天已命之故不復試以衆官司空於周為冬卿掌制國之五溝行導水之事伯禹稽首讓于益歸稽首拜首至手益歸賢者堯臣歸讀曰䕫帝曰何斯若真何不聽讓之辭斯此也若汝也此汝真其人出爾命圖示乃天爾汝也禹方讓隠之故曰出汝所天命也圖括地象示讀曰祗祗是也乃天使汝治水非我也伯禹曰臣觀河伯面長人首魚身出曰吾河精也觀河觀於河水也授臣河圖帶足入淵河圖謂括地象帶足去也音帶伯禹拜辭禹將行故拜去詩含神霧曰禹之興黒風會紀黒力黒也風風后也並黄帝臣復神伯禹當斯而至也禮曰禹立三年百姓以仁遂焉大戴禮曰宰我曰請問禹孔子曰髙陽之孫鯀之子曰文命敏給克濟其德不回其仁可親其言可信聲為律身為度左凖繩右規矩履四時據四海平九州戴九天明耳目治天下禮含文嘉曰禹卑宫室垂意於溝洫百穀用成神龍至靈龜服玉女敬養天賜左傳曰禹會諸侯於塗山執玉帛者萬國春秋孔演圖曰天命之見侯其門靈龜穴庭𤣥龍御雲靈龜虚虎也穴庭者星入太微門𤣥龍水精也御雲者蓋此召氣也春秋元命苞曰禹之時民大樂其駢三聖相繼故樂夏名夏者大也孝經鈎命訣曰命星貫昴修紀夢接生禹命使之星謂流行之星也遁甲開山圖曰禹遊於東海得玉碧色長一尺二寸光如日月自照達幽㝠揚雄蜀王本紀曰禹本沒山廣柔縣人生於石紐其地名痢兒畔禹母吞珠孕禹拆堛而生於縣塗山妻生子啓紀年曰禹立四十五年論語曰子曰禹吾無間然矣孔子推禹功德之盛也言不能復間厠其間也菲飲食而致孝乎鬼神馬融曰菲薄也致孝鬼神祭祀豐潔也惡衣服而致美乎黻冕孔安國曰損其常服以盛祭祀卑宫室而盡力乎溝洫方里為井井間有溝溝深廣四尺十里為城城中有洫洫深廣八尺也符子曰禹讓天下於竒子竒子曰君言佐舜勞矣鑿山川通河漢首無髮股無毛故舜也以勞報子我生而逸不能為君之勞矣越絶書曰禹始憂民救水到大越於茅山大會計爵有功更名茅山謂之會稽及其王也巡狩大越吳越春秋曰禹案黄帝中經見聖人所記曰在九疑山東南天柱號曰宛委承以文玉覆以盤石其書簡青玉為字編以白銀禹乃東巡狩登衡山求之卧見赤繡衣男子自稱𤣥夷蒼水使者來候禹令禹齋三月更求之禹乃齋三月登宛委山取得書通水經遂周行天下使益疏記之名曰山海經又曰舜崩禹服喪三年朝夕號泣形體枯槁面目黎黒十州記曰禹治洪水畢乃乘蹻車到鍾山祀上帝於北阿歸大功於九天禹經諸侯五岳使工刻石識其里數髙下其字科斗書非漢人所了諸名山亦然鬻子曰禹之治天下也以五聲聽門縣鼓鐘鐸磬而置軺於簨簴曰教寡人以道者擊鼓諭寡人以義者擊鐘告寡人以事者振鐸語寡人以憂者擊磬有訟獄者揮鞀此之謂五聲是以禹嘗據饋而七起日中不暇食於是四海之士皆至隋巢子曰昔三苗大亂天命殛之夏后受之大神降而輔之司禄益食而民不饑司金益富而國家寶司命益年而民不夭四方歸之莊子曰昔者禹堙洪水親自操槖耜而滌天下之川股無䟦脛無毛沐甚雨櫛疾風置萬國禹大聖也而形勞天下如此使後世之墨者多以裘褐為衣以屐屫為服日夜不依以自為極曰不能如此非禹道也不足為墨孟子曰書曰洚水警余洚水者洪水也書尚書逸篇也水逆行洚洞無涯故曰洚水洪水也使禹治之禹掘地而注之海驅蛇龍而放之菹水由地中行江淮河漢是也險阻既逺鳥獸之害人者消然後人得平土而居之堯使舜治洪水通九州故曰掘地而注之海也菹澤生草者也今青州為澤有草者為菹水流行於地而去也民下居就平土故曰險阻逺也水去故鳥獸害人者盡消也尸子曰禹長頸鳥喙面貌亦惡天下從而賢之好學也已又曰古者龍門未闢吕梁未鑿禹於是疏河决江十年不闚其家生偏枯之病步不相過人曰禹步墨子曰禹葬衣衾三領桐棺三寸葛以綳補庚切之下不及泉上不通臭既葬收餘壤為壟若參耕之畝韓子曰禹之王天下也身執木畚以為民先服無完胈體無生雖臣虜之勞不若於此矣吕氏春秋曰禹年三十未娶行塗山恐時暮失制乃娶塗山女又曰禹南濟乎江黄龍負舟舟中之人恐懼禹仰而笑曰余受命於天竭力以濟萬民命受天也奈何憂於龍焉龍弭耳低尾而逃又曰昔者禹一沐而三握髪一食而三起以禮有道之士通乎已之不足通乎已之不足則不與物爭矣又曰禹之决江水也民聚瓦礫及其事已成功已立爲萬世利禹之所見者逺也而民莫知之賈誼書曰禹常晝不暇食而夜不暇寢矣方是時憂務民也淮南子曰昔者鯀作三仭之城諸侯倍之禹知天下叛之乃壞城平地散財物禁甲兵施之以德海外賔服四夷納職又曰禹沐淫雨櫛疾風决江䟽河鑿龍門闢伊闕修彭蠡之防乘四載隨山刋木平治水土定千八百國夙興夜寐以致聰明輕賦薄斂以寛民氓布德施惠以振困窮弔死問罪以養孤孀百姓親附政令流行又曰禹為水以身解於陽旰之河解禱也陽旰河在秦又曰堯之時天下大水禹身執畚鍤以為民先疏河而導九支支分鑿江而通九路辟五湖而定東海又曰禹之趨時冠挂而不顧履遺而不取冠有所挂著去不暇顧視非争其先也爭其時也說苑曰禹見罪人下車問而泣之左右曰夫罪人不順道故然焉君王何為痛之至於此也禹曰堯舜之民皆以堯舜之心為心今吾為君百姓皆以其心為心是以痛之抱朴子曰禹乘二龍郭支為馭黄帝𤣥女兵法曰禹問於風后曰吾聞黄帝有負勝之圖六甲隂陽之道今安在乎風后曰黄帝藏會稽之山下其坎深千丈廣千尺鎮以盤石致難得也禹北見六子問海口所出禹乃决江口鳴角會稽龍神為見匱玉浮禹乃開而視之中有天下經十二卷禹未及持之其四卷飛上天禹不能得也其四卷復下陂池禹不能極也禹得中四卷開而視之魏陳王曹植賛曰吁嗟夫子拯世濟民克卑宫室致孝鬼神蔬食薄服紱冕乃新厥德不囘其誠可親亹亹其德温温其仁尼稱無間何德之純又禹治水賛曰嗟夫夏禹實勞水功西鑿龍門疏河導江梁岐既闢九州以同天賜𤣥圭奄有萬邦又禹渡河賛曰禹濟于河黄龍乘船舟人並懼禹仰歎天予受天運勤功恤民死亡命也龍聞弭身周庾信禹渡江賛曰二江初鑿九谷新成風飛鷁涌水起龍驚樂天知命無待憂生危舟遂静亂楫還平帝啓歸藏曰昔夏后啓筮享神於大陵而上鈞臺枚占臯陶曰不吉史記曰昔夏后啓筮乘龍以登于天占於臯陶曰吉而必同與神交通以身為帝以王四鄉又曰啓禹之子其母塗山氏之女也有扈氏不服啓伐之大戰于甘將戰作甘誓遂滅有扈氏天下咸歸山海經曰大樂之野夏后啓於此舞九代馬乘兩龍雲蓋三層左手操翳右手操環珮玉璜在大運山北一曰大道之野帝王世紀曰啓升后十年舞九韶三十五年征河西又曰帝啓一名建一名余德教施于四海貴爵而尚齒養國老于東序養庶老于西序在位九年年八十餘而崩越絶書曰禹崩啓立曉知王事達君臣義吕氏春秋曰夏后伯啓與有扈氏戰于甘澤而不服六卿請復之夏后伯曰不可吾地不淺吾民不寡伐而不服是吾德薄而教不善也於是乎處不重席食不二味琴瑟不張鐘鼔不修子女不飾親親長長尊賢使能朞年而有扈氏服故欲勝人者必先自勝矣帝太康書曰太康尸位以逸豫滅厥德黎民咸貳乃盤遊無度畋于有洛之表十旬不返有窮后羿因民弗忍距于河厥弟五人御其母以從徯于洛之汭五子咸怨述大禹之戒以作歌其一曰皇祖有訓民可近不可下皇君也君祖禹有訓戒也近謂親之下謂失人者也民惟邦本本固邦寧言人君當安民以安國也予視天下愚夫愚婦一能勝予言能敬畏小民所以得衆心一人三失怨豈在明不見是圖三失過非一也不見謀是備其微予臨兆民懔乎若朽索之馭六馬十萬曰億十億曰兆言多也懔懼貌朽腐也朽腐之索禦六馬言危懼甚為人上者奈何不敬能敬則不驕在上不驕則髙而不危其二曰訓有之内作色荒外作禽荒作為也迷亂而荒色女色禽鳥獸甘酒嗜音峻宇雕牆甘嗜無厭足也峻髙大雕飾有一于此未或不亡此六者棄德之君有其一必亡况兼有乎其三曰維彼陶唐有此冀方陶唐帝堯氏都冀州統天下四方中今失厥道亂其紀綱乃底㓕亡言失堯之道亂其法制自致滅亡其四曰明明我祖萬邦之君有典有則貽厥子孫典謂經籍則法度貽遺也遺及後世關石和鈞王府則有荒墜厥緒覆宗絶祀金鐵衡石供民器用通用使和平則官民足言古制存而太康失其業以取亡其五曰嗚呼曷歸予懷之悲曷何也言思而悲也萬姓仇予予將疇依鬱陶乎予心顔厚有忸怩弗慎厥德雖悔可追言人君行已不慎其德以速㓕敗雖已改悔其可追及乎言無益也帝王世紀曰太康無道在位二十九年失政而崩帝仲康書曰惟仲康肇位四海𦙍侯命掌六師羲和廢厥職酒荒于厥邑𦙍后承王命徂征羲和廢其職官還其私邑以酒迷亂仲康命𦙍侯掌六師往就其邑討之帝相紀年曰帝相即位處商丘元年征淮夷二年征風夷及黄夷帝王世紀曰帝相一名相安自太康已來夏政凌遲為羿所逼乃徙商丘依同姓諸侯斟灌氏斟鄩氏羿遂襲帝號為羿帝有窮后羿帝王世紀曰羿有窮氏未聞其姓其先帝嚳以世掌射故以是加賜以弓矢封之於鉏為帝司射厯唐及虞夏至羿學射如吉甫其辭佐長故亦以善射聞與吳賀北遊使羿射雀左目羿引弓射之誤中右目羿俯首而愧終身不忘故羿善射至今稱之及有夏之衰羿自鉏遷于窮石因夏民以代夏政逼簒帝位故號有窮氏傳曰昔有夏之方衰也后羿自鉏遷于窮石因夏民以代夏政恃其射也不修民事而淫于原獸棄武羅伯因熊髠龍圉四子皆羿之賢臣而用寒浞土捉反寒浞伯明氏之讒子弟也伯明后寒棄之夷羿收之信而使之以為己相浞行媚于内而施賂于外愚弄其民而娛羿于田樹之詐慝以取其國家外内咸服羿猶不悛將歸自田家衆殺而烹之以食其子食羿子其子不忍食諸死于窮門殺之於國門靡奔有鬲氏靡夏遺臣事羿者有鬲國名浞因羿室生澆五呌反及豷音處恃其讒慝詐偽而不德于民使澆用師㓕斟灌及斟鄩氏二國夏同姓諸侯仲康之子后相所依處澆于過處豷于戈過戈二國名靡自有鬲氏收二國之燼以㓕浞而立少康少康滅澆于過后杼滅豷于戈后杼少康子有窮由是遂亡寒浞帝王世紀曰寒浞有窮氏既簒羿位復襲有窮之號浞因羿之室生澆及豷多力能陸地盪舟浞使奡率師㓕斟灌斟鄩氏殺夏帝封澆於過封豷於戈恃其詐力不恤民事初羿之殺帝相也妃有仍氏女曰后緍方娠逃出自竇歸于有仍生少康焉初夏之遺臣曰靡事羿羿死逃奔有鬲氏收斟灌斟鄩二國餘燼殺寒浞而立少康帝少康傳曰昔有過澆殺斟灌以伐斟鄩澆寒浞封於過滅夏后相后緍方娠逃出自竇后緍相妻也娠懷身也歸于有仍生少康為仍牧正牧官之長澆使椒求之逃奔有虞為之庖正虞思於是妻之以二姚思有虞君也自以二女妻少康姚姓也而邑諸綸綸虞邑也有田一成有衆一旅方十里為成五百人為旅能布其德而兆其謀兆始也以收夏衆撫其官職遂㓕過戈復禹之績祀夏配天不失舊物魏髙貴鄉公少康漢髙論曰少康生於滅亡之後降為諸侯之𨽻﨑嶇逃難僅以身免能布其德而兆其謀卒滅過戈光復禹績非至德𢎞仁豈濟斯勲漢祖因土崩之勢專任智力以成功業為子則數危其親為君則囚繫其賢相身没之後社稷幾傾若與少康易時而處或未能復大禹之績矣又論曰三代之世任德濟勲如彼之難秦項之際任力功成如此之易且太上立德其次立功就令漢祖功髙未若少康盛德之茂也帝杼直吕反紀年曰帝杼居原自遷于老王帝王世紀曰帝杼一號后杼或曰公孫曼能率禹之功夏人報祭之在位十七年帝槐紀年曰后芬立四十四年帝王世紀曰帝芬一名帝槐或曰祖武在位二十六年帝芒紀年曰后芒即位元年以𤣥珪賔于河東狩于海獲大魚后芒陟位五十八年帝王世紀曰帝芒一名和或曰帝芒帝泄帝王世紀曰帝泄一名帝世或曰泄宗在位十六年帝不降紀年曰不降即位六年伐九苑五十九年其弟立是為帝扃帝王世紀曰帝不降一名帝降或曰北成北字或作江字帝扃帝王世紀曰帝扃一名帝禹或曰髙陽在位二十二年帝厪音近紀年曰帝厪一名𦙍甲即位居西河天有妖孽十日並出帝王世紀曰帝厪一名頊或曰董江在位二十年帝孔甲左傳曰昭二十九年秋龍見于絳郊晉魏獻子問於蔡墨曰蟲莫智於龍以其不生得也信乎對曰古者畜龍故國有豢龍氏御龍氏有夏孔甲擾于有帝擾順也其德能順于天帝賜之乘龍河漢各二四頭為乘各二乘十六頭各有雌雄史記曰帝孔甲立好方鬼神事淫亂夏后氏德衰諸侯叛之天降龍二有雌雄孔甲不能食未得豢龍氏陶唐既衰其後有劉累學擾龍于豢龍氏以事孔甲孔甲賜之姓曰御龍氏漢書曰孔甲作盤盂銘三十六篇列仙傳曰師門為夏孔甲龍師孔甲不能修其心意殺而埋之外野一旦風雨迎之頃則山木皆焚孔甲祠而禱之未還而道死吕氏春秋曰夏后孔甲于東陽薲音頻山天大風晦孔甲迷入民室主人方乳乳産也咸言后來是良日子誰敢殃之長成人幕動折撩斧破斬足遂為守者以其無足為守門之官乃作破斧之歌帝臯紀年曰后昊立三年帝臯也帝王世紀曰帝臯一名臯茍帝發紀年曰帝發一名后敬或曰發惠其子立為桀帝桀歸藏曰昔桀伐唐而枚占於營營或曰不吉不利出征唯利安處彼狸為鼠書曰伊尹相湯伐桀升自陑遂與桀戰於鳴條之野尚書帝命驗曰桀失其玉鏡用其噬虎玉鏡喻以清明之道噬虎喻暴虐之風尚書帝命候曰夏桀無道殺關龍逢圮滅皇圖壞亂厯紀皇天也紀綱紀也天之圖厯龍逢引以諫桀也殘賊天下刑法峻也賢人遁逃避時虐也淫色嫚易男女無別不事祖宗韓詩外傳曰桀為酒池可以運舟糟丘足以望十里家語曰夏桀昆吾斬劉黎民如草木者焉天下討之如匹夫史記曰自孔甲以來諸侯多叛夏桀不務德而虐傷百姓百姓弗堪乃召湯而囚之夏臺已而釋之湯修德諸侯皆歸湯湯遂率兵以伐夏桀桀走鳴條放而死紀年曰后桀命扁伐山民山民女于桀二人曰琬曰琰桀愛二人女無子焉斵其名于苕華之玉苕是琬華是琰而棄其元妃于洛曰妺喜桀傾宫飾瑶臺作瓊室立玉門湯遂滅夏桀桀逃南巢氏自禹至桀十七世有王與無王用嵗四百七十一年帝王世紀曰帝桀淫虐有才力能伸鈎索鐵手能搏虎多求美女以充後宫為瓊室瑶臺金柱三千始以瓦為屋以望雲雨大進侏儒倡優為爛熳之樂設竒偉之戲縱靡靡之聲日夜與妺喜及宫女飲酒常置妺喜於膝上妺喜好聞裂繒之聲為發繒裂之以順適其意以人駕車肉山脯林以為酒池一鼔而牛飲者三千餘人醉而溺水以虎入市而視其驚伊尹舉觴造桀諫曰君王不聽羣臣之言亡無日矣桀聞言析啞然笑曰子又妖言天之有日猶吾之有民日亡吾乃亡耳兩日鬬蝕鬼呼於國桀醉不寤湯來伐桀以乙卯日戰于鳴條之野桀未戰而敗績湯追至大涉遂禽桀於焦放之厯山乃與妺喜及諸嬖妾同舟浮海奔于南巢之山而死博物志曰夏桀之時為長夜飲深宫中男女雜處三旬不出不聽政太公六韜曰桀時有瞿山之地桀十月鑿山陵通之於河民有諫者曰冬鑿地穿山是發天之隂泄地之氣天子後必敗桀以妖言殺之墨子曰桀女樂三萬人晨譟開於衢服文繡衣裳莊子曰桀之治天下也使天下之人瘁瘁焉人苦其性是不愉也墨子曰昔夏桀貴為天子富有天下勇力之人生裂兕虎指畫殺人王孫書曰桀紂為君從愚妄之言違長者之諫衣温而忘百姓之寒食美而忘天下之飢或身放南巢或頭縣白旗斯亦無他也但不節財而暴民也尸子曰伯夷叔齊飢死首陽無地故也桀放於厯山紂殺於鄗宫無道故也有道無地則餓有地無道則亡又曰昔者桀紂縱欲長樂以苦百姓珍怪逺味必南海之葷北海之鹽西海之菁東海之鯨此其禍天下亦厚矣又曰昔夏桀之時至德滅而不揚帝道掩而不興興舉也客臺振而掩覆客臺行禮客之室言不能行禮故天大振動而覆敗犬羣而入泉言將壞滅犬失其生故羣入淵一說犬禍彘御藪而席隩彘衘晨席入人隩内言彘禍美人婢首墨面而不容婢首亂頭也萃興髪并編為婢首不修容飾也曼聲吞炭内閉而不歌曼聲見世衰亂將滅故吞炭自敗音聲閉氣而不歌飛鳥鎩翼走獸决蹄鎩翼殘翼决致蹇也言桀無道田獵鳥獸悉被創殘翼廢脚蹇山無峻幹澤無佳水峻幹美材佳水清水言入山澤不以時故又曰桀為璇室瑶臺象廊玉牀璇瑶石之次玉也象才廊室也權天下虐百姓於是湯以革車三百乘伐于南巢南巢廬江居巢收之夏宫天下寧定百姓和輯譙周法訓曰桀紂雖有天下之位而無一人之譽也猶朽木枯樹逄風則仆也袁子正書曰桀紂有民不億之衆四嶽三塗之險京山終南之固及在鳴條之野一朝而失天下符子曰桀觀炮烙於瑶臺謂龍逢曰樂乎龍逢曰樂桀曰觀刑曰樂何無惻怛之心焉逢曰天下苦之而君為樂臣為君股肱孰有心悅而股肱不悅乎桀曰聽子諫諫得我功之不得我刑之龍逢曰臣觀君冕非冕也冕危石也臣觀君履亦非履也履春冰也未有冠危石而不壓踏春冰而不䧟桀嘆曰子知我之亡而不自知亡子就炮烙之刑吾觀子亡子不知我亡龍逢行歌曰造化勞我以生休我以炮烙乃赴火而死禹至桀合十九帝淮南子曰桀之力剔觡伸鈎觡角索鐡推移大麾大麾軍之大旗水殺黿鼉陸捕熊羆然革車三百乘困之鳴條鳴條今陳州平丘也禽之焦門太平御覽卷八十二
