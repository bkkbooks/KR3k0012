body:
  text: 太平御覧卷八百八十三宋李昉等撰神鬼部三鬼上易曰鬼神害盈而福謙又曰暌孤見豕負塗載鬼一車左傳莊公曰齊侯田于貝丘見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼墜于車傷足䘮屨又僖公曰晉侯改葬恭太子秋狐突適下國遇太子太子使登僕而告之曰夷吾無禮余得請於帝矣將以晉畀秦秦將祀余對曰臣聞之神不歆非類民不祀非族君祀無乃殄乎且民何罪失刑乏祀君其圖之君曰諾吾將復請七日新城西偏將有巫者而見我焉許之遂不見及期而往告之曰帝許我罰有罪矣弊於韓又文公曰有事於太廟躋僖公逆祀也於是夏父弗忌為宗伯曰吾見新鬼大故鬼小先大後小順也君子以為失禮又宣公曰楚司馬子良生子越椒子文曰是必滅若敖氏矣及將死泣曰鬼猶求食若敖氏之鬼不其餒而又宣公曰初魏武子有嬖妾無子武子疾命顆曰必嫁是疾病則曰必以為殉及卒顆嫁之及輔氏之役顆見老人結草以亢杜回杜回躓而顛故獲之夜夢之曰余而所嫁婦人之父也爾用先人之治命余是以報又成公曰晉侯夢大厲被髮及地摶膺而踊曰殺余孫不義余得請於帝矣壊大門及寢門而入公懼入于室又壊户公覺召桑田巫巫言如夢又昭公曰鄭子産聘于晉晉侯有疾韓宣子逆客私焉曰寡君寢疾於今三月矣並走羣望有加而無瘳今夢黄熊入於寢門其何厲鬼也對曰昔堯殛鯀于羽山其神化為黃熊以入于羽淵實為夏郊三代祀之晉為盟主其或者未之祀也乎宣子祀夏郊晉侯有間又昭公曰鄭人相驚以伯有曰伯有至矣則皆走不知所往鑄刑書之嵗二月或夢伯有介而行曰壬子余將殺帶也明年壬寅余又將殺段也及壬子駟帶卒國人益懼齊燕平之月壬寅公孫段卒國人愈懼其明月子産立公孫泄及良止以撫之乃止子太叔問其故子産曰鬼有所歸乃不為厲吾為之歸也又哀上曰初曹人或夢衆君子立于社宫而謀亡曹曹叔振鐸請待公孫疆許之旦而求之曹無之戒其子曰我死爾聞公孫疆為政必去之又哀下曰衞侯夢于北宫見人登昆吾之觀被髮北面而譟曰登此昆吾之虛綿綿生之𤓰余為渾良夫呌天無辜論語曰樊遲問知子曰敬鬼神而逺之可謂知矣爾雅曰鬼之為言歸也史記始皇本紀曰使者從闗東夜過華陰平舒道有人持璧遮使者曰為吾遺滈池君因言曰今年祖龍死使者問其故因忽不見置其璧去使者奉璧具以聞始皇黙然良久曰山鬼固不過知一嵗事也漢書郊祀志曰既滅兩粤粤人勇之乃言粤人俗鬼而其祠皆見鬼數有效昔東甌王敬鬼壽百六十嵗後世怠慢故衰耗廼命粤巫立粤祠安臺無壇亦祠天神帝百鬼漢書曰田蚡疾一身盡痛若有擊者呼服謝罪上使視鬼者瞻之曰魏其侯與灌夫共守笞欲殺之竟死後漢書曰第五倫為會稽太守俗好淫祀人常以牛祭神百姓財産以之困匱其自食牛肉而不以薦祠者發病且死先為牛鳴倫到官移書屬縣曉告百姓其巫祝有依託鬼神詐怖愚民皆按論之後遂斷絶又曰宋均為辰陽長其俗少學者而信巫鬼均為立學校禁絶淫祀人皆安之又曰劉根有神術太守史祈以為妖乃執而數之曰若有神可顯一驗根曰頗能使鬼乃左顧而嘯祈之亡父近親數十皆反縳在祈前向根叩頭曰小兒無狀分當萬死叱祈曰汝子孫不能光榮先祖而辱如此何不叩頭謝之祈哀驚悲泣頓首請罪根黙然忽去不知所之王隐晉書曰鎮南劉𢎞以故刺史王毅子衡陽太守矩為廣州矩至長沙見一人長大著布单衣自持奏在岸上矩省奏云京兆杜靈之仍入船共語稱叙稀濶矩問君京兆人何時發來答曰朝發矩恠問京兆去此數千里那得朝發今到杜答京兆去此乃數萬何止數千乎晉書曰鄒湛字潤甫嘗見一人自稱甄仲舒餘無所言如此非一久之乃悟曰宅西有積土敗瓦其中有死人甄仲舒者予舍西土瓦中人也檢之果然厚加歛葬葬畢遂夢此人來謝又曰蘇韶字孝先安平人仕至中牟令卒韶伯父第九子節在市上晝日韶自外入乗馬黃䟽单衣白襪絲履憑節車轅節謂兄弟曰中牟在此兄弟皆愕視無所見問韶君何由來韶曰吾欲改葬即求去數日又來兄弟遂與韶坐節曰若必改葬别自勅兒韶曰吾將為書節授筆韶不肯曰死者書與生者異為節作其字像畨書也乃笑喚節為書曰昔魏武侯浮於西河而下中流顧謂呉起曰美哉河山之固此魏國之寳也吾性愛好京洛每往來出入瞻視邙山樂哉萬世之基也北背孟津洋洋之河南望天邑濟濟之盛此志雖未言銘之於心矣不圖奄忽所懐未果前去十月便速改葬買數畆地便足矣節延韶入室設坐祀之不肯坐又無所饗謂韶曰中牟平生好酒可少飲韶手執盃飲盡曰佳酒也節視盃空既去盃酒乃如故前後三十餘來兄弟狎翫節問所疑韶言天上及地下事亦不能悉知也顔淵卜商今見在為脩文郎凡有八人鬼之聖者梁成賢者呉季子節問死何如生韶曰無異耳死者虛生者實此其異也節曰死者何不歸屍骸韶曰譬如㫁卿一臂以投地就剥削之於卿有患乎死之去屍骸如此也節曰厚葬美墳死者樂乎韶曰無在也節曰若無在何改葬韶曰今我誠無所在但欲述生時意耳韶欲去留之閉門下鎻鑰韶為之少住韶去節見門閉韶已去矣韶與節别曰吾今見為脩文郎官職不暇得來也節執手乃别自是遂絶續晉陽春秋曰㐮陽羅友在桓温府屢以貧乞禄温以其誕肆許而不用同府人有得郡者温為饑别友亦被命至獨晚温問之曰出門於中路遇見一鬼謂余曰見汝送人作郡不見人送汝作郡友始怖終慙不覺淹緩温笑而用之晉書曰周訪宿宫亭湖廟晨起如厠見一老父訪執之化為雄鴨晉陽春秋曰苻堅未敗長安市鬼夜哭一月止前趙録曰麟嘉三年螽斯則百堂灾自此鬼哭二宫夜夜不絶崔鴻十六國春秋後趙録曰魏豹字叔虎范陽人也遷中山太守所在有治名豹嬖妾先死豹後于廪丘南妾形見與豹言翌日而卒後魏書曰先是河邊人夢神謂己曰爾朱家欲渡河用爾作灅波津令為之縮水脉月餘夢者死及兆至有行人自言知水淺深以草往挿而𨗳焉忽失所在兆遂䇿馬渉渡宋書曰劉伯龍少而貧薄及長厯位尚書左丞武陵太守貧窶尤甚嘗在家慨然召左右將營十一之方忽見一鬼在傍撫掌大笑伯龍嘆曰貧窮固有命乃復為鬼所笑也遂止梁書曰范雲嘗與梁武同宿顧暠之舍妻方産鬼在外曰此中有王有相雲起曰王當仰屬相以見歸因是盡心推事老子曰以道蒞天下者其鬼不神非其鬼不神其神不傷人莊子曰齊桓公田於澤管仲御見鬼焉公撫管仲之手曰仲父有何見對曰臣無所見也公反誒詒為疾數日不出齊士有王子敖者告曰公則自傷鬼惡能傷公夫忿滀之氣散而不反則為不足上而不下則使人善怒下而不上則使人善忘不上不下中身當心則為病耳桓公曰然則有鬼乎曰有沉有履竈有髻户内之煩壤雷霆處之水有罔象丘有崒山有䕫野有徬徨澤有委蛇公曰請問委蛇之狀何如曰委蛇其大如轂其長若轅紫衣而朱冠其為物也惡聞雷車之聲則捧首而立見之者殆乎霸桓公冁然而笑曰寡人之所見者也墨子曰周宣王殺杜伯不以罪後宣王田於圃見杜伯執弓矢射宣王伏弓衣而死吕氏春秋曰梁北有黎邱部有竒鬼焉喜效人之子姪之狀邑丈人有之市而醉歸者黎邱之鬼效其子之狀扶而道苦之丈人歸酒醒而誚其子曰吾為汝父也豈為不慈哉我醉汝道苦我何故其子伏而觸地曰孽矣無此事也其父信之曰譆是必竒鬼我故聞之明日復飲於市欲遇而刺殺之明旦之市而醉其真子恐其父之不能返也遂往迎之丈人望見之㧞劍而刺之韓詩外傳曰人死曰鬼鬼者歸也精氣歸於天肉歸於土血歸於水脉歸於澤聲歸於雷動則歸於風瞑之歸於日月骨歸於木筋歸於山齒歸於石膏歸於露髮歸於革呼吸之氣歸復於人淮南子曰蒼頡作書鬼夜哭董仲舒五行逆順曰人君簡宗廟不禱祀則鬼夜哭風俗通曰汝南周翁仲初為太尉掾婦産男及為北海相吏周先能見鬼署為主簿使還致敬於本郡縣因告之曰事訖臘日可與小男俱待祠主簿事還翁仲問之對曰但見屠人弊衣蠡髻而踞神座持刀割肉有衣冠青墨綬數人彷彿堂東西不進不知何故翁仲問妻曰何以養此子嫗大怒曰君常言兒體質聲氣喜學似我公欲死為作狂語翁仲具告之祠祭如此嫗乃泣涕言昔以年長無男不自安實以女易屠者之男禆錢一萬此子年已十八遣歸其家迎其女女嫁為賣餅者妻後適隴西李文思文思官至南陽太守抱朴子曰按九鼎記及青靈經言人物之死俱有鬼也馬鬼常時以晦夜出行狀如炎火𤣥中記曰姑獲鳥夜飛晝藏盖鬼神類衣毛為飛鳥脱毛為女人名為帝少女一名夜道一名鈎星一名隐飛鳥無子喜取人子養為子人養小兒不可露其衣此鳥度即取兒也荆州為多昔豫章男子見田中有六七女人不知是鳥匍匐往先得其毛藏之往就諸鳥諸鳥各走就毛衣衣之飛去一鳥獨不得去男子以為婦生三女其母後令女問父知衣在積稲中得衣以飛去後以衣迎三女得衣亦飛去神異經曰東北方有鬼星石室三百户而共一門石榜題曰鬼門晝日不開至暮即有人語有火青色又曰南方有人長二三尺祼形而目在頂上走行如風名曰􅀈所見之國大旱赤地千里一名旱母一名狢遇者得之投溷中乃死旱灾銷也又曰西方深山有人焉長尺餘袒身捕鰕蟹性不畏人見人止宿喜依其火以炙鰕蟹伺人不在而盗人鹽以食蟹名山㺑其音自呌人常以竹著火中爆烞而山㺑皆驚犯之令人寒熱齊諧記曰廣陵王瓊之為信安令在縣忽有一鬼自稱姓蔡名伯喈或復談論誦詩書知古今靡所不諳問是昔蔡邕不答云非也與之同姓字耳問此伯喈今何在云在天上或下作仙人飛來去受福甚快非復疇昔也論衡曰上古之人有神荼鬱壘者昆弟二人生而執鬼居東海度朔山上立桃樹下簡閱百鬼鬼道理安若為人禍神荼與鬱壘縳以蘆索執以食虎幽明録曰阮瞻嘗著無鬼論而一鬼通姓名作客詣之寒温畢共談名理客甚有才辨與言良久及鬼神事乃作色曰鬼神古今聖賢所共傳君何獨言無即僕便是鬼於是變為異形須臾便滅阮嘿然大惡之年餘卒又曰王輔嗣注易輙笑鄭𤣥為儒云老奴無意于時夜分忽聞外閤有著屐聲須臾進自云鄭𤣥責之曰君年少何以輙穿鑿文句而妄譏詆老子也極有忿色言竟便退輔嗣心生畏惡經少時遇厲病而卒又曰阮徳如嘗於厠見一鬼長丈餘色黑而眼大著皂單衣平上幘去之咫尺徳如心安定徐笑語之曰人言鬼可憎果然鬼即赧愧而退又曰晉世王彪之年少未冠嘗獨坐齋前有竹忽聞大歎聲彪之惕然恠似其母因往看之見母衣服如昔彪之跪拜欷歔母曰汝方有竒厄自今已去當見一白狗若能東行出千里三年然後可得免災忽不復見彪之悲悵逹旦既明獨見一白狗恒隨行止便經營行裝將往會稽及出千里外三年乃歸齋中復聞前聲往見母如先謂曰能用吾言故來慶汝汝自今已後年踰八十位列台司後皆如母言又曰殷仲宗以隆安初入蜀為毛璩叅軍至涪陵郡暮宿在亭屋中忽有一鬼體上皆毛於牕櫺中執仲宗臂仲宗大呼左右來救之鬼乃去又曰河南楊起字聖卿少時病瘧逃於社中得素書一卷乃劾百鬼法所劾輙效為日南太守母至厠上見鬼頭長數尺以吿聖卿曰此肅霜之神劾之出來變形如奴送書京師朝發暮反作使當千人之力又曰東昌縣山有物形如人長四五尺裸身被髮髮長五六寸常在髙山巖石間住喑啞作聲而不成語能嘯相呼常隐於幽昧之間不可恒見有人伐木宿於山中至夜眠後此物抱子從澗中發石取鰕魚就人火邊燒炙以食時人有未眠者宻相覺語齊起共突擊便走而遺其子聲如人啼也此物便男女羣然引石擊人趣得其子然後止太平御覧卷八百八十三
