body:
  text: 太平御覧卷十五宋李昉等撰天部十五氣霧霾曀氣釋名曰氣猶愾也愾然有聲而無形也易曰天地氤氲萬物化醇又潜龍勿用陽氣潜藏又精氣為物游魂為變精氣氤氲聚而成物聚極則散而游魂為變又天地定位山澤通氣禮曰仲春行秋令則其國大水寒氣總至又三月之節是月也生氣方盛陽氣發洩勾者畢出萌者盡逹又三月之節是月也命國儺九門磔攘以畢春氣季春行冬令則寒氣時發草木皆肅又孟秋行冬令則隂氣大勝行春令則其國乃旱陽氣復還又八月之節是月也天子乃儺以達秋氣殺氣浸盛陽氣日衰又九月之節霜始降則百工休乃命有司曰寒氣總至人力不堪其皆入室又季秋行春令則暖風來至人氣懈惰又小雪之日後五日天氣上騰地氣下降又孟冬行春令則凍閉不宻地氣上洩又地氣沮洩是謂𤼵天地之房諸蟄則死又十二月中氣命有司大儺旁磔出土牛以送寒氣又社祭土而主隂氣也又鄉飲酒禮曰天地嚴凝之氣始於西南而盛於西北此天地之義氣也天地温厚之氣始於東北而盛于東南此天地之仁氣也周禮曰眡祲掌十煇之法以觀妖祥辨吉凶妖祥善惡之徴鄭司農云煇謂日光之氣又眡祲之官春分望氣傳曰節宜其氣尚書中候曰堯沉璧于河休氣四塞春秋繁露曰氣之清者為精人之精者為賢治身以積精為道春秋元命苞曰隂陽聚為雲氣史記曰海旁蜃氣象樓臺廣野氣成宫闕又項羽本紀曰范增説項羽曰沛公志不在小吾令人望其氣皆為龍虎成五彩此天子氣也宜急擊勿失又秦紀曰始皇東逰望氣者云五百年後金陵有天子於是始皇東遊以厭之改金陵為秣陵厭之以絶其氣漢武故事曰上廵狩河間見紫雲青氣自地屬天望氣者云下有竒綵女求之得拳夫人後生昭帝漢書曰宣帝號曰皇曽孫生數月遭巫蠱事曽孫雖在襁緥猶坐收繫郡邸獄邴吉為廷尉監治巫蠱憐曽孫無辜至後元二年武帝疾望氣者言長安獄中有天子氣上遣使者分條中都官獄繫者輕重皆殺之内謁者令郭攘夜至郡邸獄吉拒使者不得入曽孫賴吉得全應劭漢官儀曰世祖封禪夕有青氣上與天屬遥望不見山巔又髙祖在沛隐芒碭山每出遊上輙不欲令吕后知常在深僻處后亦常知所在髙祖問曰何以知之后曰君所居處上有紫氣又孝靈熹平八年八月辛未白氣如疋練衝北斗第四星為大獸狀明日揚州刺史臧旻攻盗賊斬首數千級東觀漢記曰和帝永平十二年癸酉夜白氣長三丈起國東北指軍市十日是月西域䝉竒踈勒二國歸義謝承後漢書曰郎顗上書曰去年閠月白氣從天漢入玉井西將有叛戾之患金精之變太尉所掌宜責以災異漢書五行志曰永興二年光禄勲舍壁下有青氣視之得玉鈎玦漢光武封禪儀曰元年封禪晝有白氣夜有赤光又建武三十二年二月十九日之山此日山上雲氣成宫闕百官皆見之二十一日夕牲時有白氣廣一丈東南極望二十二日禮畢正直壇所有氣與天屬遥望不復見山楚漢春秋曰亞父謀曰吾望沛公其氣衝天五色相繞或似龍或似蛇或似虎或似雲或似人此非人臣之氣也王隱晋書曰武帝咸寧元年洛陽太祖廟中有青氣占之者以為東莞音官王後當有天子後改封瑯邪江東之應也又魯勝字叔時以嵗日望氣乃長歎知將來多故便稱疾去官中書令張華敬之欲用之遣二子諭意竟不起又張華察牛斗間有紫氣乃豐城之劔氣也吳志曰朝宫井上旦有五色氣孫堅令浚之得漢傳國璽又孫堅𦵏富春城東塜有光上屬天蔓數里皆曰非凡氣也孫氏其興乎蜀志曰建安二十五年劉豹等上言二十二年中數有氣如旗從西竟東中天而行圖書曰必有天子出其方南中八郡志曰永昌郡有禁水水有惡毒氣中去聲下同物則有聲中樹木則折名曰鬼彈中人則奄然潰爛宋永初山川記曰寧州瘴氣莽露四時不絶列仙記曰老子西出關關令尹喜占氣知神仙過荆州記曰夷道縣有望州山山下有泉欲雨泉中有赤氣上騰于天莊子曰若夫乗天地之正而御六氣之辨以逰於無窮者彼惡乎待哉郭象曰御六氣之辨即是逰變化之塗也又人之生氣聚則為生散則為死列子曰太初者氣之始也又天積氣之所成孫卿子曰水火有氣而無生草木有生而無知抱朴子曰軍上氣黑如樓將軍移軍必敗其將勇則氣如火炎勢如張弩雲如日月赤氣繞之所見之地大勝不可攻也又或問登步之道曰或用棘心為飛車存念則五蛇六龍至乗之上升三十里名為太清其氣甚剛勝人也師言鳶飛漸髙直舒兩翅而自漸進乗剛氣也淮南子曰土地各以類生人是故山氣多男澤氣多女水氣多瘖於金反風氣多聾林氣多癃木氣多傴髙誘曰自此上至山氣多男皆生子乃有此疾也下氣多尰岸下下虚腫足曰尰石氣多力象石也險阻氣多癭暑氣多殀音夭寒氣多壽谷氣多痺丘氣多狂廣氣多仁下平者其聚為廣陵氣多貪象陵積聚也輕土多力利疾也重土多遲清水音小濁水音大湍水人重湍急流悍水也中土多聖人皆應其類也又太清之始世天覆以徳地載以樂四時不失其序風雨不降其虐日月淑清而揚光五星循軌而不失其行此氣之至休者也吕氏春秋曰天圎謂精氣圎通周復無雜故曰圎魏子曰北夷之氣象羣羊南夷之氣類船山海之氣象樓臺宫闕都邑氣象林木家語曰食氣者神眀而夀洽書曰有氣象人青衣無手在日西天子之氣象也遁甲開山圗曰巨靈者偏得元氣之道故以元氣一時生混沌又自老子生周清氣凌遲俗儒道士無所通驗河圗曰崑崙山有水水氣上蒸為霞地鏡圗曰望百姓家有黄氣蘖梔子樹也山有白氣而鬱鬱中有神龍三輔舊事曰漢作靈臺以四孟月登而觀黄氣為疾病赤兵黑水荆州圖曰宜都郡望周山袁山松宜都記曰鍾山山根有涌泉成溪溪水清天隂欲雨輙有赤氣故名曰丹溪論衡曰陳留虞延字君人夜生母見其氣如一疋絹徑上天以問人人曰吉氣與天通後位至司徒楚辭曰飡六氣而飲沆瀣兮潄正陽而含朝霞王逸曰飡吞也吞日精氣也凌陽子曰春日朝霞朝霞者日始出赤氣也秋日淪漢瀹漢者日沒後赤黄氣也冬日沆瀣沆瀣者北方半夜氣也夏飡正陽正陽者南方日中氣也又天問曰伯强安處惠氣安在注曰伯強是大疫鬼也所至恣惡氣傷和氣霧釋名曰霧冐也氣蒙冐覆地物也昏暗之時則為妖災明王聖主則為祥瑞禮記月令曰仲冬行夏令則其國乃旱氛霧㝠㝠爾雅曰地氣發天不應曰霧尚書中候曰桀無道地吐黄霧春秋元命苞曰霧隂陽之氣也隂陽怒而為風亂而為霧漢書曰袁盎諫文帝勿遷淮南王恐其逢霧露而死又王氏五侯同日俱封其日黄霧四塞又漢髙祖至平城匈奴圍上七日天大霧漢使人還往胡不覺後得逸平城之難又孝成帝建始元年夏四月黄霧四塞上問楊興等曰隂盛侵陽之氣也東觀漢記曰馬援謂官屬曰吾在浪泊西里間下潦上霧毒氣薫蒸仰視烏鳶站站都泰牒泰二音墮水中謝承後漢書曰河南張楷字公超性好道術能作五里霧於時關西華隂人裴優亦能作三里霧魏畧曰劉雄鳴每出霧中識道不迷惑時人因謂能為雲霧王隱晋書曰樂廣為尚書令衛瓘見而竒之因令諸子造焉曰此人之水鏡每見令人瑩然若開雲霧覩青天又大寧元年黄霧四塞王敦之應也宋元嘉起居注曰旴􅇇民王彭先丁母艱居䘮至孝元嘉之始父又䘮亡彭兄弟二人土工未就鄉人助彭作塼塼事須水濟值天旱穿井盡力不得水彭號窮無計一旦天霧霧消之後於塼竈前自然生水沈約宋書曰後漢正月朝天子臨徳揚殿受朝賀舍利從南方來戲於殿前激水化成比目跳躍𠻳水作霧翳日燕書烈祖後紀曰元璽六年烈祖遣侍中繆髙太子詹事劉猗賫傳國璽詣晋求救猗負引行數百里黄霧四塞迷荒不得進乃還易取行璽始得去帝王世紀曰凡重霧三日必大雨雨未䧏霧不可冐行又帝沃丁八年伊尹卒年百有餘嵗天霧三日沃丁葬以天子之禮祀以太牢親自臨䘮三年以報大徳焉又黄帝時天大霧三日帝逰洛水之上見大魚殺三牲以醮之天乃甚雨七日七夜魚流始得圖書今河圗也世傳大霧三日必有甚雨自此始也漢武内傳曰東方朔乘雲飛去仰望大霧覆之不知所在劉向列女傳曰陶答子妻者陶大夫答子之妻也答子化陶三年名譽不興家富三倍其妻數諫曰夫子能薄而官大是謂嬰害無功而家富是謂積殃昔楚令尹子文之化家貧而國富福結于子孫名垂於後代今夫子貪富務大不顧後害妾聞南山有𤣥豹霧雨七日不下食者何也欲以澤其衣毛而成其文章故藏以逺害今君與此背不無後患乎葛洪神仙傳曰欒巴為尚書郎一旦天大霧對坐不相見失巴所在後問其故乃是巴還成都與親故别也又淮南王聞有道術士必卑辭厚幣以致之於是八公乃往一人能坐致風兩立起雲霧王試之無不效李先生傳曰先生名廣字祖和本南陽人先主遣軍欲取先生先生起霧半天騎自相殺先主因此乃入呉宜都山川記曰郡西北三十里有丹山天晴山嶺忽有霧起廻轉如烟不過再朝雨乃降王烈之安城記曰縣人有謝廪者行田歸路中忽遇雲霧霧中有一人乗龜而行廪知為神人拜請隨去此人曰汝無仙骨不得去也湘州記曰曲江縣有銀山山常多素霧嵩髙山記曰有獵師在山見浮圗竒妙異常有金象比來尋求白霧忽起不知寺處東方朔十洲記曰漢武帝天漢中西胡國獻猛獸使者曰猛獸之出生崑崙或生𤣥圃食氣飲霧解人語當其神也立起風雲吐𠻳霧露百邪倂走因名猛獸王粲英雄記曰曹公赤壁敗行至雲夢大澤中遇大霧迷失道路王子年拾遺記曰平沙千里色如金細如絲風吹起如霧亦曰金霧西京雜記曰太平之代霧不塞望浸滛被泊而已又東海人曹公立興雲霧坐成山河叚龜龍涼州記曰吕光幸天淵池時天清朗忽然起霧有五色雲在光上陳留風俗記曰雍丘縣有祠名夏公后祠有神井能致霧雹博物志曰王爾張衡馬均者昔俱冐霧行一人無恙一人病一人死無恙者飲酒病者食死者空腹莊子曰騰水上溢故為霧抱朴子曰白霧四面圍城不出百日大兵至城下又與善人逰如行霧中雖不濡濕潜自有潤又通天犀角有白理如線自本徹末者以此角大霧重雲之夜置中庭終不沾濡蘇子曰蜀郡鄧公呼吸成霧韓子曰飛龍乗雲騰蛇㳺霧雲罷霧㪚與蟻螾與蚓字同同矣淮南子曰甚霧之朝可以細書不可望尋丈之外又騰蛇㳺霧困于蝍蛆又昔者馮夷大丙之御也皆得古道能御隂陽逰㣲霧經霜雪而無迹照日光而無影魏子曰霧之盛須㬰而訖暴雨之盛不過終日是以人君喜怒不見于容龍魚河圗曰山有大霧十日以上不除者山崩之候也京房妖占曰大霧君迷或云霧四時則時多隱士伏侯古今注曰漢元帝竟寧元年大霧樹皆白春秋潛潭巴曰大霧三日羣猾起上下承蒙上少下多故曰羣猾也志林曰黄帝與蚩尤戰于涿鹿之野蚩尤作大霧彌三日軍人皆惑黄帝乃令風后法斗機作指南車以别四方遂擒蚩尤望氣經曰十月癸巳霧赤為兵青為殃又六月三日有霧則嵗大熟地鏡圖曰古王之千嵗者行遊諸國其所居國必三日變為日中之霧漢武帝故事曰武帝𦵏茂陵芳香之氣異常積于墳埏之間如大霧黄帝𤣥女戰法曰黄帝與蚩尤九戰九不勝黄帝歸于太山三日夜夜霧㝠有一婦人人首鳥形黄帝稽首再拜伏不敢起婦人曰吾𤣥女也子欲何問黄帝曰小子欲萬戰萬勝遂得戰法焉徐幹中論曰文王遇姜公于渭陽執竿而釣文王得之灼若披雲而見白日霍若開霧而覩青天温嶠與陶侃箋曰霧氣過差則君道幽晦霾釋名曰霾晦也如物塵晦之色也詩曰終風且霾惠然肯來爾雅曰風而雨土為霾崔豹古今注曰漢昭帝元鳯三年天雨黄土白晝昏霾曀説文曰曀天隂沉也詩曰終風且曀不日有曀又曀曀其隂爾雅曰隂而風為曀太平御覽卷十五
