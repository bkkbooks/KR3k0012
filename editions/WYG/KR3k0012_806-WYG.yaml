body:
  text: 太平御覽卷八百六宋李昉等撰珎寳部五圭璧圭説文曰圭瑞玉也上員下方以封諸侯楚爵有執圭尚書禹貢曰禹錫元圭告厥成功又金縢曰既克商二年王有疾弗豫二公曰我其為王穆卜周公曰未可以戚我先王公乃自以為功為三壇同墠為壇扵南方北面周公立焉植璧秉珪乃告太王王季文王又顧命曰康王即位太保承介圭上宗奉同瑁由阼階躋大圭尺二寸天子守之同爵名瑁所以冐諸侯以齊瑞信方四寸邪刻之也尚書太傳曰古者圭必有冐故圭冐者天子與諸侯為瑞諸侯執所受圭以朝天子無過者復得以歸有過者留其三年周禮春官上大宗伯曰以玉作六瑞以守邦國王執鎮圭公執桓圭諸侯執信圭伯執躬圭子執糓璧男執蒲璧又春官上宗伯曰以青圭禮東方又典瑞曰王搢大圭執鎮圭鏁籍五采五就以朝日頫聘四圭有邸以旅天禮上帝四圭相連皆外嚮共一邸長尺二寸旅陳兩圭有邸以祀地旅四望􅀈圭有攅以肆先以祼賔客灌鬯之圭尺二寸肆陳牲器以祭也圭璧以祀日月星辰土圭以致四時日月封國則以土地土圭尺有五寸以求土中故謂土圭也鎮圭以徴守以恤凶荒榖圭以和難以聘女琬圭以治徳以結好琬圭九寸琬順也又秋官下小行人曰合六幣圭以馬也儀禮聘禮曰上介受圭屈受賈人禮記禮器曰諸侯以圭為寳以龜為瑞家不寳龜不藏圭又禮器曰禮有以素為貴者大圭而使所以伸信也又雜記曰賛大行曰圭公九寸侯伯七寸子男五寸博三寸厚半寸剡上左右各寸半五色玉也藻三采六等三禮射侯圖曰信圭七寸謂圭上琢人頭身之形侯所執也躬圭七寸謂圭上琢為四體之形伯所執也左傳昭六曰王子朝用成周之寳圭于河津人得諸河上又襄三十年曰鄭伯有之難㳺吉晉還聞難不入懼禍并及復命子介八月甲子奔晉駟𢃄追之及酸棗與子上盟用兩圭質于河子上駟帯也沈圭於河為信也酸􅀥陳留縣又昭十二年楚公尹路請曰君王命剥圭以為鏚秘鏚斧也秘柄也玉以飾斧柄也故請命榖梁定公𫝊曰定公八年盗竊玉玊者制圭也毛詩生民曰顒顒卭卭如圭如璋又抑曰白圭之玷尚可磨也斯言之玷不可爲也又韓奕曰韓侯入覲以其介圭入覲于王又嵩髙曰王遣申伯錫爾介圭論語鄉黨曰執圭鞠躬如也如不勝又雍也曰南容三復白圭孔子以其兄之子妻之墨子曰赤鳥含圭降周之岐社曰天命周文王伐殷墨子申徒狄曰周之靈圭出扵􅁟石莊子曰楚昭王延屠羊説以三圭之位司馬彪曰諸侯三卿皆執圭也山海經曰羭山之神祠以黄圭穆天子𫝊曰天子乃執白圭𤣥璧以見西王母也瑞應圖曰四海㑹同則𤣥圭出白虎通曰諸侯薨使臣歸圭扵天子推讓之義也又曰東方為圭之制上小下大狀如梨鋒太元經曰破璧毁圭逄不幸楚辭曰三璋圭雜扵甑窐兮窐音携也楚辭曰三圭重侯三圭謂公侯伯璧説文曰璧瑞玉環也瑗太孔璧也璜半璧也爾雅曰肉倍好謂之璧好倍肉謂之瑗尚書金縢曰周公植璧秉珪乃告太王王季文王曰爾不許我我乃屏璧與珪又顧命曰𢎞璧琬琰在西序大璧琬琰之圭為三重也尚書中侯曰堯沉璧於河白雲起也毛詩淇澳曰有斐君子如金如錫如圭如璧又雲漢曰靡神不舉靡愛斯牲圭璧既卒寧莫我聽周禮春官上大宗伯曰子執榖璧男執蒲璧以蒼璧禮天禮記曲禮下曰操幣圭璧則尚左手又禮器曰束帛加璧尊徳也左傳桓公曰鄭伯以璧假許田為周公祊故也又曰匹夫無罪懷璧其罪又僖上曰晉荀息請以屈産之乘與垂棘之璧假道扵虞以伐虢又曰楚子圍許男面縳衘璧又曰初申侯有寵扵楚文王文王將死與之璧使行曰唯我知汝専利而無厭我死汝必速行又曰秦伯納重耳及河子犯以璧受公子曰臣負覊紲從君扵天下臣之罪多矣臣猶知之而况君乎請由此亡公子曰所不與舅氏同心者有如白水投其璧扵河又僖中曰晉公子重耳及曹僖負覊之妻饋盤飱寘璧焉公子受飱反璧又文下曰秦伯以璧祈戰于河又成公上曰丑父􅃦于轏車轏土車蛇出於其下以擊之肱傷而匿之故不能推車而及為韓厥所及丑父欲為右故匿傷韓厥執縶馬前縶馬絆也執之示修臣僕之職再拜稽首奉觴加璧以進進觴璧亦以示敬又襄二十八曰齊人求崔杼之尸將戮之不得叔孫穆子曰必得之武王有亂臣十人崔杼其有乎不十人不足以𦵏𦵏必十人崔氏不能令十人同故必得既崔氏之臣曰與我其拱璧崔有大璧吾獻其柩扵是得之又襄三曰諸侯取郜田自漷水歸之扵我晉侯先歸公享晉六卿于蒲圃賄荀偃束錦加璧又襄六曰公薨于楚宫叔仲帶竊其拱璧以與御人納諸其懷而從之取由是得罪又昭四曰楚子以諸侯滅頼頼子靣縳銜璧士袒輿襯從之造于中軍中軍王所將王問諸椒舉對曰成王尅許在僖六年許僖公如是親釋其縳受其璧焚其櫬玉從之從舉言遷頼于鄢鄢楚邑也又曰楚共王無冢嫡有寵子五人無適立焉乃大有事扵群望而祈曰請神擇扵五人者使主社稷乃遍以璧見扵群望曰當璧而拜者神所立也誰敢違之既而與巴姬宻埋璧扵大室之庭使五人齊而入拜康王跨之靈王肘加焉子干子晳皆逺之平王弱抱入再拜皆壓紐又哀下曰衛人出莊公入于戎州巳氏初公自城上見巳氏之妻髪美使髠之以為吕姜髢既入焉而示之璧曰活我吾與汝璧巳氏曰殺汝璧將焉往遂殺之而取其璧史記曰鄒陽上書曰白圭顯扵中山人惡之於魏文侯賜以夜光之璧又曰臣聞明月之珠夜光之璧以闇投扵道衆莫不按劒相盻者何則無因而至前也又曰趙惠文王得楚王和氏璧秦昭王使人遺趙王書願以十五城請易璧遂使藺相如奉璧西入秦相如見秦王無意償趙城乃前曰璧有瑕請指示王王授璧相如因持璧却立倚柱怒髪上衝冠謂秦王曰趙王齋戒五日使臣奉璧傳之美人以戲㺯臣觀王無意償趙王城邑臣復取璧大王必欲急臣頭今與璧俱碎扵柱矣王恐其破璧乃辭謝固請相如使從他道以璧還趙又曰張儀已學而㳺諸侯常從楚相飲已而楚相亡璧門下意儀掠苔數百不服釋之又曰虞卿躡屩擔簦一見趙王賜白璧一雙黄金百鎰又曰始皇三十年有使者從關東夜過華隂平舒道有人持璧遮說使者曰為吾遺滈池君因言曰今年祖龍死使者問故因忽不見使奉璧具以聞始皇使御府視璧乃二十八年渡江所沉璧也漢書曰廼以白鹿皮為幣王侯朝對必以皮幣薦璧又天文志曰日月如合璧五星如連珠又曰沛公從百餘騎見項羽鴻門沛公如厮間道走軍服􅐚曰走音奏使張良謝羽問沛公安在良曰聞將軍有意督過已脱身去間至軍矣故使獻璧羽受之又曰文帝賜尉佗書及衣佗因使獻白璧一雙又曰王夫人者趙人幸武帝生子閎夫子死而帝痛之使者拜之曰皇帝謹使大中大夫明奉璧一賜夫人為齊王太后又曰王莾簒位冠軍張永獻符命銅璧言元后當為宣室父母後漢書曰驃騎將軍東平王蒼聞朱暉有義行辟為掾正月旦蒼將朝當奉璧賀故事少府給璧是時隂就爲少府卿貴驕吏傲不奉法蒼坐朝堂漏盡而求璧不可得顧謂掾屬曰若之何暉望見就主簿持璧即往紿之曰我數聞璧而未見試借觀之主簿授暉暉顧召令使奉之奉之扵蒼主簿遽白就就曰朱掾義士勿復求更取璧蒼罷朝謂暉曰掾自視孰與藺相如晉書載記曰燕常山大樹自㧞根下得璧七十三光色精竒有異常玊慕容擕以為岳神之命遣其尚書郎段勤以太牢祀之又石季龍起河橋扵靈昌津採石為中濟石無大小輙下隨流用功五百餘萬而不成季龍遣致祭沉璧扵河俄而所沉璧浮扵渚上晏子春秋曰和氏之璧井里之朴耳老子曰雖有拱璧以先駟馬不如坐進此道孫卿子曰聘人以珪問士以璧魯連子曰楚成章華之臺酌諸侯酒魯君先至王悦之與不琢之璧莊子曰孔子問子桑雩曰吾見逐扵魯伐木扵宋親而益踈何也對曰子獨不聞假之亡與假國名也林回棄千金之璧負赤子而趍彼以利合者廹窮相棄也以天屬者廹窮相収也韓子曰楚人和氏得璞玉扵荆山而獻之遂名和氏之璧又曰和氏之璧不飾以五采隨侯之珠不飾以黄金其質至美物不足以飾之文子曰聖人不貴赤璧而貴寸隂不布施以求得不髙下以相假此古人之德也淮南子曰禹之趍時冠掛不顧故曰不貴尺璧而重寸隂又曰和氏之璧夏后之璜揖讓而進以合欣夜以投人則為恐時與不時也又曰得和氏之璧不若以事之所適又曰璧瑗成器礛諸之功礛治玉石抱朴子曰安期先生者賣藥扵海邊始皇賜之金璧可直數十萬又曰虞舜之承禪曰捐璧扵谷中又曰景帝時戍將廣陵掘冢有人如生棺中有雲母厚丈許白璧三十枚以籍身山海經曰招揺之神祠用一璧穆天子𫝊曰天子賔扵西王母乃執珪璧以見之帝王世紀曰堯刻璧為書東次扵洛言當𫝊舜之意戰國策曰張儀為秦破從連橫説楚王楚王遣車百乘獻駭雞之犀夜光之璧又曰齊欲伐魏魏使謂淳于髠曰弊邑寶璧二雙文馬二駟請致之髠入説齊王曰魏齊之與國今伐之名醜而實危齊王乃不伐客謂齊王曰髠受魏璧馬王謂髠曰先生有之乎曰有之伐之事便魏雖刺髠於王何益若誠不便魏雖封臣扵王何損百姓無被兵之患髠有璧馬之寳扵王何傷又曰蘇秦説趙王扵華屋之下抵掌而談趙王封為武安君受白璧百雙黄金萬鎰河圖天靈曰秦王政以白璧沉河者有一黒公從河出謂政曰祖龍來天寳開中有玉牘也吕氏春秋曰郄成子為魯聘扵晉過衛右宰榖臣觴之陳樂而不樂乃送以璧郄成子曰觴我與我歡也陳樂而不樂告我憂也送我璧寄託之也衛其有亂乎背衛行三十里聞寗殖之難作右宰榖臣死之郄成子使人迎其妻子隔宅居之分禄賈誼新書曰梁有疑獄乃問陶朱公陶朱曰臣之家有二白璧其色相如其徑相如其澤相如然其價不相如一者千金一者五百金何則側而視之其一者厚倍之是以千金漢武帝内𫝊曰西王母上藥有赤河絳璧韓詩外𫝊曰楚襄王遣使以金千斤白璧百雙聘莊子以爲相莊子固辭白虎通曰方中員外曰璧内方象地外圓象天列異𫝊曰秦召公子無忌無忌不行使朱亥奉璧一雙秦王大怒將朱亥著虎圏中亥瞋目視虎眥裂血濺虎而虎終不敢動鍾離意别𫝊曰意為魯相省視孔子教授堂男子張伯剗草堦下土中得璧七枚懷藏其一以六白意意開瓮中素書文曰後世修吾書董仲舒模吾車拭吾履發吾笥㑹稽鍾離意璧有七張取一意召問白璧有七何藏一耶伯叩頭出之物理論曰語曰士非玊璧談者為價晉中興徴祥説曰王者不隱過則玊璧見不斵自成光若明月石虎鄴中記曰石虎太武殿懸大綬扵梁柱綴玉璧扵綬范享燕書曰昭文帝時左部民得紫璧以獻戴延之西征記曰朱公諮議王智先停柏谷遣騎送道人惠義䟽曰有金璧之瑞公遣迎取軍次扵崤東金璧至修壇拜受之又云冀州博陵郡王次寺道人法稱告弟子普巖曰嵩髙皇帝語吾言江東有劉將軍是漢家苖裔當受天命吾以四十二璧金一餅與之璧數是劉氏卜世之數也惠義以義熙十三年入嵩髙山即得璧金獻焉琴操曰楚昭王得和璧使大夫明光奉璧扵趙郡中羊由甫知趙無反遺乃䜛之扵王明光常背楚用趙今使奉璧何能述功徳及明光還怒之明光乃作歌曰楚光明魏文帝蔡伯喈女賦序曰家公與蔡伯喈有管鮑之好乃命使者周近持𤣥璧扵匈奴贖其女還以妻屯田郡都命使者張載擬四愁詩曰佳人遺我雲中翮何以贈之連城璧太平御覽卷八百六
