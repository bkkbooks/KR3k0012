body:
  text: 太平御覽卷九百十二宋李昉等撰獸部二十四狸貂貀􅀈貓獺蝟狸爾雅曰狸子􅡐余至切説文曰狸伏獸也禮曰狸首之班然又曰狸去正脊魏志曰清河令徐李龍使人獵令管輅筮其所得輅曰當獲小獸雖有爪牙㣲而不彊雖有文章蔚而不相非虎非雉其名曰狸獵人暮歸果如輅言晉書曰樂廣為河南尹先是河南官舎多妖怪前尹皆不敢處正寢廣居之不疑嘗外户自閉左右皆驚廣獨不顧見牆有孔掘牆得狸而殺之其怪亦絶唐書曰武𢎞度士彠兄子也父卒廬於墓側晨夕哀號有野狸每至𢎞度齋時必來求食往来馴狎無驚懼時以為孝感𤣥中記曰鈆錫之精為狐狸子思子曰謂狐為狸者非直不知狸也忽得狐復失狸者也琴操曰曾子鼓琴墨子立外而聽之曲終入曰善哉鼓琴身已成矣而曽未得其首也曽子曰吾晝卧見一狸見其身而不見其頭起而為之絃因而殘形淮南子曰狸頭似䑕以類推也許慎曰狸食䑕又曰狸頭止癙癙寒熱病也雞頭止瘻抱朴子曰虎尾不負狸身象牙不出䑕穴本草曰狸肉甘無毒主治濕鬼毒氣皮中如針刺歸藏曰昔者桀筮伐唐而枚占熒惑曰不吉彼為狸我為䑕勿用作事恐傷其父也風俗通曰汝陽西門習武亭有鬼魅宿者輙死其免者皆亡髮北部督郵西平郅伯夷到亭上樓宿誦六甲孝經易本記卧宻㧞劍解帶夜有怪異四五箇来覆伯夷以劍帯繫魅脚呼下燈照見一老狸身赤略無毛衣持下燒殺明旦發樓屋得所亡髮髻百餘因此遂絶神仙傳曰欒巴為豫章太守先是廬山廟中有人言語飲酒投桮音杯能使宫亭湖中分風行者舉帆相逄巴未到十數日廟中人不復作聲不知所在巴到自上表説廟鬼詐稱天官欺損百姓罪當窮治乞以事付功曹臣身行逐捕如不治討恐其復逰行天下所在血食枉病良民責以重禱乃至所在推求山川社稷問鬼踪跡此鬼乃到齊國為書生齊太守見之既有容美麗又有才辨學識論經義時在齊人莫不見知太守亦不知是鬼乃以女妻之生一男巴到與太守相見語畢問聞卿有一女壻明五經諸子可得相見否太守請婿詐病辭不出而巴求之不止婿告其言吾今日出必死如何女亦怪之不知何以巴知不敢出乃求奏板一枚并筆書符與太守曰以此與賢婿自當出也婿得符流涕與婦辭訣而出望見巴即身體已變為狸而靣故是人也巴厲聲呵言死狸敢爾何不正汝真形即盡為狸巴復曰斬之亦不見斬者而狸頭已斷巴又復言取狸子來須臾太守女所生亦變為狸子即又斬之巴辭還郡捜神記曰博陵劉伯祖為河東太守所止承塵上有神能語常呼伯祖與語及京師詔書吿下消息輙預告伯祖伯祖問其所食啖欲得羊肝買羊肝於前切之臠隨刀不見盡兩羊肝忽有一老狸𦕈𦕈在案前持刀者欲舉刀斫之伯祖呵止自與著承塵上須臾大笑曰向者啖肝醉忽失形與府君相見大慚愧後伯祖當為司隸神復先語伯祖云某月某日詔書當到至期如言及入司隸府神隨逐在承塵上輙言省内事伯祖大恐怖語神曰今職在刺舉若左右貴人聞神在此因以相害神答曰誠如府君所慮當相捨去遂即無聲幽明録曰呉興戴眇家僮客姓王有少婦美色而眇中弟恒往就之客私懷忿怒具以白眇中郎作此甚為無禮願尊勅語眇以問弟弟大罵曰何縁有此必是妖鬼勅令扑殺客初猶不敢約厲分明後来閉户欲縛便變成大狸従忩中出又曰董仲舒常下帷獨詠有客来詣語遂移日舒知其非常客又云欲雨仲舒因此戱之曰巢居知風穴居知雨卿非狐狸則是鼷鼠客聞此言色動形壊化成為狐狸也隋王度古鏡記曰大業七年五月余自御史告歸河東適侯生卒而得一鏡六月余歸長安宿於主人程雄家新授寄一婢頗稱端麗名曰鸚鵡余整冠履引鏡自照鸚鵡遥見便叩頭流血云不敢往余召雄問其故雄曰兩日前有一客携婢従東来時因病偶流寄扵此不知婢之由也余疑其精魅以鏡逼之遂自陳云本是華山廟前長松下千歳老狸乆行變惑罪當至死近為府君捕逐逃潛河渭之間為下封陳思恭義女思恭妻鄭氏見養恩厚嫁鸚鵡與鄊人柴華意不相浹惬逃而去東至韓城遂為行人李無慠所執無慠麄人也遂刼鸚鵡逰行至此不意天鏡一照自隠無路然已為人充羞復願忘形樂飲因而匣鏡置酒悉召雄家鄰里與共晏此婢大醉起舞歌曰寳鏡寳鏡哀哉余命自我離形扵今㡬姓生雖可樂死亦何傷何為眷戀守此一方歌畢化為狸而死述異記曰陳留董逸少時隣女梁瑩年稚色艶逸愛慕傾魂貽椒獻寳瑩亦納而未果獲逸隣人鄭充在逸所宿二更中門前有叩掌聲充卧望之亦識瑩語逸曰梁瑩今来逸驚躍出迎把臂入舎逸與瑩寢瑩仍求去逸攬持不置申欵逹旦逸欲留之瑩云為汝蒸豚作食食竟去逸起閉户施帳瑩因變形為狸従梁上走去金樓子曰狸不可使搏甝牛不可使捕䑕貂説文曰貂䑕屬也大而黄黑色出丁零國廣志曰貂出夫餘闗山圖曰霍山南岳其獸多赤貂東觀漢記曰建武二十五年烏桓詣闕朝賀獻貂皮魏書曰鮮卑有貂豽女滑切鼲音魂子皮毛柔蠕故天下以為名裘魏志曰挹樓國出好貂今所謂挹樓貂是也江表傳曰遼東太守遣使詣孫權送貂皮欲舉國歸吳晉書曰趙王倫簒位至於奴卒厮役亦加以爵位每朝㑹貂蟬盈座時為之諺曰貂不足狗尾續異苑曰貂出句麗國常有一物共居穴或見之身貌類人長三尺能制貂愛樂刀子其俗人欲得貂皮以刀挿穴口此物夜出穴置貂刀邉須人持皮去乃取刀隋書曰北室韋其俗以捕貂為業南室韋亦多貂貀汝滑切説文曰貀獸無前足漢津能捕豺貀購百錢爾雅曰貀無前足郭璞曰晉書太康七年召陵扶夷縣檻得獸似狗豹文有角兩脚即此類也或曰貀似虎而黒無前兩足也廣雅曰貀豹也唐書曰長慶中河東節度使李聰貢貀三頭貀猛捷之獸也穆宗好畋逰嘗詔諸道廣求此獸捜踐山谷郡縣吿勞防虞籠檻甚於豺虎及至林苑往往噬人後穆宗亦盡令逐之及敬宗即位聽復獻之􅏈音魂説文曰􅏈䑕出丁令胡以作裘魏略曰丁靈國出青􅏈子曰􅏈子皮江表傳曰魏文帝遣使使吳求􅏈皮豹犀羣臣以非禮欲不與權勅付使山海經曰獄法之山有獸焉如犬而人靣善投見人則笑其名曰􅏈其行如風見則大風山海經圖讃曰山􅏈之獸見乃歡唬厥性善投行如矢繳是惟氣精出則風作猫詩曰孔樂韓土有猫有虎爾雅曰虎竊毛謂之虥上盞切猫郭璞注曰竊淺也或曰竊毛鹿毛也禮曰古之君子使之必報之迎猫為其食田䑕也迎虎為其食田豕也故迎而祭之也尹子曰使牛捕䑕不如猫狌音生之捷北史曰獨孤陁性好左道其外祖母髙氏先事猫鬼轉入陁家每以子日夜祠之猫鬼每殺人取其財物置於所事猫鬼家鬼若降則人靣正青若被牽曵陁後敗免死唐書曰髙宗廢王后令宫人宣𠡠后拜曰但願大家萬歳昭儀長承恩澤死是吾分也蕭良娣承勅曰阿武狐媚翻覆至此百千歳願得一日為猫阿武為䑕吾扼其喉以報今日即足矣武后聞之不恱自是約六宫不許畜猫又曰朱泚軍中有猫乳䑕者泚獻之為祥代宗使中官示於朝宰臣率百僚皆賀崔祐甫獨否中官詰其故答曰此物之失常也可弔不可賀中官徴其状祐甫立草之略曰禮云迎猫為其食田䑕也以能除害故列祀典今反乳之是為失常且猫受人食養而棄職不脩亦何異法吏不勤觸邪疆吏不勤捍敵是天將垂戒故不敢賀衆皆服代宗嘉其正直獺禮記月令曰孟春之月獺祭魚然後虞人入澤梁説文曰獺如小狗水居食魚猵音編屬也遁甲開山圖曰霍山南嶽其獸多柴獺山邉水故有柴獺淮南子曰愛獺而飲之酒欲養之非其道言獺飲酒而敗風土記曰陽羡縣前有大橋下有白獺將有兵動獺出穴口向人嘷之魏略曰南蠻皆用獺為冠鹽鐡論曰水有猵音篇獺而池魚勞國有强禦而齊民消獨曰猵羣曰獺又如淳注博物志曰獱如馬自腰以下似蝙蝠毛似獺大可五六斤淳同鄊人吉武景福中征遼東時運船至於海中有猵獺跳上船船人皆謂海神共叩頭敬禮船左武令人云但魚耳可烹而食之神仙傳曰樊夫人者劉綱之妻也俱行道術各自方勝綱於是唾盤中水即作鯉魚夫人乃唾盤中便成獺而食魚綱每共試術事事不如永嘉地記曰濤山至髙常有採樵者見上有大湖又有自然石橋多獺及異色鳥獸蝟孝經援神契曰蝟多刺故不便超踰楊栁爾雅曰蝟毛刺淮南子曰鵲屎中蝟爛灰生蠅漆見蟹而不乾淮南畢萬術曰蝟膏塗鐡柔不折華陽國志曰滇池縣有白蝟山無石而多蝟也北齊書曰成帝夢大蝟攻破鄴城故索境内蝟膏以絶之識者以後主名緯聲與蝟相協亡齊徵也廣五行記曰梁末蜀人費秘刈麥值暴風雨隱於岩石間避雨去家數里遥見前路有數婦人皆著紅紫襴古寛切衣歌吟而来秘竊謂野外何因有此心異之漸近寂然無聲去秘數歩乃各住立少時悉轉向秘看之其靣並無七孔唯垂鳥毛而已秘驚怖仆地至二更秘兒怪父不至把火㝷覔見秘卧在道傍左側有十餘刺蝟見火即争散走秘至家百餘日死太平御覽卷九百十二
