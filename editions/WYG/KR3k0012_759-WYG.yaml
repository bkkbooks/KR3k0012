body:
  text: 太平御覽卷七百五十九宋李昉等撰器物部四簠簋瑚璉敦牟俎豆登附籩樏鉶鉢窪甄杯棬欓簠簋三禮圖曰簠受一升下足髙一寸中方外圓漆丹中蓋龜形諸侯飾以象天子玉飾盛黍稷簋受一升足髙一寸中圓外方挫其四角漆赤中蓋亦龜形其飾如簠盛稻粱易曰樽酒簋貳用缶納約自牖終无咎詩曰權輿刺康公禮賢人有始無終也於我乎每食四簋今也每食不飽于嗟乎不承權輿又曰於粲灑掃陳饋八簋周禮曰旊音倣人為簋實一觳音斛崇尺厚半寸脣寸儀禮曰佐食分簋敦言簋者客同姓之士用從周制禮曰管仲鏤簋而朱紘君子以為濫矣又曰周之八簋傳曰衞孔文子之攻太叔也訪於仲尼仲尼曰簠簋之事則嘗聞之矣甲兵之事未之學也孝經曰陳其簠簋而哀慼之墨子曰堯飯土簋啜􅁟鉶賈誼書曰古者大臣有坐不廉而廢者不謂不廉曰簠簋不飭瑚璉三禮圖曰瑚受一升形制未聞制度云如簋而平下璉受一升漆赤中蓋亦龜形大夫飾口以白金制度云如簋而鋭下禮曰夏后氏之四璉殷之六瑚論語曰子貢問賜也何如曰汝器也曰何器也曰瑚璉也敦牟三禮圖曰敦有足其形如今酒罇法牟受一斗如敦形古牟受一升平下漆赤中飾口以白金蓋亦龜形周禮曰若合諸侯則共珠盤玉敦敦盤類也珠玉以為餙也古以盤盛血以敦盛食也禮曰敦牟巵􅓢音移非餕莫敢用又曰有虞氏之兩敦黍稷器也儀禮曰主婦設兩敦黍稷于爼南爼豆說文曰豆古食肉器也爾雅曰木豆謂之豆瓦豆謂之登三禮圖曰豆以木受四升髙尺二寸漆赤中大夫以上亦雲畫諸侯加象飾口足天子玉餙登以九盛湇受斗二升口徑尺二寸足徑八寸髙二尺四寸小身有蓋似豆狀詩曰卭盛于豆于豆于登又曰籩豆大房大房餙爼周禮曰上公豆四十侯伯豆三十有二子男豆十有四儀禮曰宰夫自東房薦豆六設于醬東又曰太􅃵湇不加實于登也大戴禮曰武王踐祚於觴豆為銘焉禮曰魯季夏六月以禘禮祀周公於太廟爼用梡嶡又曰爼有虞氏以梡夏后氏以嶡殷以椇音矩周以房爼鄭𤣥曰梡斷木為之四足而已嶡之言蹶也謂中足為横距之象周禮謂之距椇之言枳椇也謂曲橈之也房謂足下跗上下兩間有似於堂房魯頌曰籩豆大房也夏后氏以楬若戞切豆殷玉豆周獻息列切豆楬無異物之飾也献䟽部之又曰禮有以多為貴者天子之豆二十有六諸公十有六諸侯十有二上大夫八下大夫六又曰子云觴酒豆肉譲而受惡民猶犯齒𫝊曰鳥獸之肉不登於爼皮革齒牙骨角毛羽不登於器則公不射古之制也論語曰衞靈公問陳於孔子孔子曰爼豆之事則嘗聞之矣軍旅之事未之學也史記曰孔子為小兒時常陳爼豆以為戯國語曰晉侯使聘周王召士季曰汝今我王室之一二兄弟以時相見將和恊典禮以示民訓則奉其犠象出其尊彛陳其鼎爼漢書曰韓延壽為頴川太守令文學諸生皮弁執爼豆為吏民行喪娶之禮又曰劉向說苑曰有司定法筆削救時務也至於禮樂則曰不敢是敢於殺人不敢於養人為其爼豆管絃之間小不備因絶不講是去小不備而就大不備東觀漢記曰劉昆敎授子弟恒五百餘人每春秋饗射常備列典儀以素木刳瓠葉為爼豆莊子曰祝宗人說彘曰汝奚惡死吾將加法汝肩尻乎彫爼之上賈誼新書曰昔周文王使太公望傅太子發嗜鮑魚而公弗與文王曰發嗜鮑魚何為弗與太公曰禮鮑魚不登乎爼豆豈有非禮而可以養太子乎籩說文曰籩竹豆也爾雅曰竹豆謂之籩書曰祀於周廟邦甸侯衞駿奔走執豆籩詩曰儐爾籩豆飲酒之飫又曰籩豆有楚殽核維旅禮曰鼎爼竒而籩豆偶隂陽之義也左𫝊曰楚子入享於鄭加籩豆六品又曰鄭伯饗趙孟為客爼五獻籩豆語曰籩豆之事則有司存韓子曰晉文公反國至河令籩豆捐之手足胼胝者後之咎犯聞之而哭公問之對曰籩豆所以食也而君捐之手足胼胝有功者也而君後之今臣與在後中不勝其哀故哭神異經曰西北荒中有玊饋之酒其上有玉樽玉籩樏音壘晉太康起居注曰齊王出蕃詔賜榼樏杯盤各有差東宫舊事曰漆三十五子方樏二葉蓋二枚抱朴子曰世有使酒之客以杯樏相擲者有矣世說曰王夷甫嘗属族之事族人大怒便舉樏擲其面陶侃表曰鹽塞荒儉唯作方九子樏趨以供事謹上五十葉曹毗杜蘭香傳曰蘭香降張碩賫方九子樏七子樏鉶音刑三禮圖曰鉶以盛􅅅受一升口徑六寸有足髙一寸有兩耳蓋士以鉄大夫以銅諸侯以白金飾天子以黄金飾周禮曰上公鉶四十有二侯伯鉶二十有八子男鉶十有八鉶􅅅器也禮曰實其簠簋籩豆鉶􅅅墨子曰堯飯􅁟簋啜􅁟鉶鉢沈約宋書曰廬江王禕以銅鉢二枚餉宋祖珍齊書曰竟陵王子良與丘令楷江栱等共打銅鉢立韻響滅則詩成可以觀覽北齊書曰元韶魏室竒寶多入韶家有二玉鉢相盛可轉而不可出二石偽事曰佛圖澄死以生所服金杖銀鉢送終後開棺視之唯見杖鉢存焉佛圖澄别傳曰澄以鉢盛水燒香呪之須臾鉢中生青蓮花西域諸國志曰佛鉢在乾陀越國青玉也受三升許彼國寶之供養乞願終日花香不滿則如言也願滿亦隨言也交州雜事曰太康四年刺史陶璜表林邑王范熊所獻銀鉢一口白水精鉢一口異苑曰司州衞士度苦行居士也其母嘗誦經長齋堂衆僧未食俱望見空中有一物下旣落其前乃是天鉢滿中香飯度以晉惠懷之際得道齊王融謝安陸王賜銀鉢啓曰素金之貴有訪仙經䥴刻之竒見符神鼎撤膳器於珍羞之席降寶玩於簞瓢之門窪俗說曰毛秦買一玉窪八十八分甌方言曰甌甂陳魏宋楚之間謂之㼵自關而西謂之甂其大者謂之甌通俗文曰小甌曰㼵抱朴子曰取金液及水銀以黄土甌盛置之猛火上皆化為丹以此丹金為盤盌食其中令人長生諸葛恢集曰詔賜恢白甌二枚袁彦伯羅山䟽曰善道開尸在石室北壁下形體朽壊止有白骨在昔成都識此道士聞之使人慨然其業行殊異當蟬蛻觧骨耳石室中先有甌盛香得便掃除燒香梁皇太子謝勑賚廣州甌等啓曰淮南承月之杯豈均符彩西國浮雲之椀非謂􅅛竒臣南珍靡究未讀奏曹之表方物罕逢不識議郎之畫杯說文曰㔶小杯也通俗文曰醬杯曰盞或謂之盌方言曰㿿椷盞盌􅦝􅡸杯也秦晉之郊謂之㿿自關而東趙魏之間曰椷或曰盞或曰盌其大者謂之盌呉越之間曰􅦝齊右平原以東或謂之􅡸杯其通語也陳楚宋魏之間謂之杯􅀢又謂之豆筥自闗而西皆謂之杯􅀢禮曰母没而杯棬不能飲焉口澤之氣存焉爾史記曰文帝十七年新垣平使人持玉杯闕下獻之刻曰人主延壽平所言詐下吏誅漢書曰項羽置太公於鼎爼上曰不降烹汝翁髙祖曰吾翁即若翁儻烹遺我一杯􅅅又曰元帝徴貢禹為諫議大夫禹奏曰臣嘗從之東宫見賜杯案盡文􅀞金銀飾非當所以食臣下也又曰朱愽為御史為人廉儉食不重味案上不過三杯又曰王嘉為丞相數上言不冝封董賢上怒詔丞相詣廷尉獄掾吏和藥進嘉引藥杯以擊地謂官属曰丞相幸得備位三公奉職負國當伏刑都市以示衆豈兒女子耶何為咀藥而死續漢書曰鄭𤣥飲三百餘杯不醉又禮儀志曰天子明器有瓦大杯十六容二升瓦小杯二十受二升謝承後漢書曰豫章宋叔平為定陵令素杯食麥飯髙𢎞為琅邪相桑杯盛醬唐書曰胡楚賔屬文敏速飲酒半酣而後操筆髙宗每命作文必以金銀杯盛酒令飲便以杯賜之呉越春秋曰闔閭女自殺以玉杯送之管子曰人君百杯而食又曰桓公管仲鮑叔牙甯戚四人飲叔牙奉杯而起曰願公無忘在莒時文子曰清之為明杯水而見眸子濁之為闇河水不見泰山韓子曰智伯身死三國分其首以為杯又曰紂為象箸箕子怖以為象箸必不加於􅁟鉶必將犀玉之杯象箸玉杯必不􅅅菽藿則必薦豹胎又曰樂羊為魏文侯攻中山其子在中山中山之君烹其子而遺之樂羊幕下而饗之盡一杯淮南子曰夫江河之腐胔音漬不可勝數也然祭者用之大也一杯酒蠅漬其中匹夫不嘗小也鹽鉄論曰古曰汙樽杯飲蓋無爵樽觴豆及其後庻人器用即竹栁陶匏而已唯瑚璉觴豆而後彫文彤漆今富者銀口黄耳金疊玉鍾中者玉紵器金錯属杯失一杯得銅杯十價錢而用不殊箕子之譏始在天子今在匹夫論衡曰項㬅都好道學仙去家三年而反曰有仙人將我上天離月數里而止月之旁甚寒饑欲食􅂺飲我流霞一杯王逸子曰顔淵之簞瓢則勝慶封之玉杯何者德行髙者能絶殊也晉咸康起居注曰詔送遼東使段遼等鸚鵡杯東宫舊事曰漆四升杯四十漆杯子三百漢武故事曰上崩後鄠縣有一人於市貨玉杯吏欲捕因忽不見縣送其器推問荗陵中物霍光呼問說市人形貎如先帝又曰武帝作承露盤仙人掌檠玉盃以取雲表之露十洲記曰周穆王時西胡獻夜光常滿盃盃容三升是白玉之精光明照室夕以杯於庭中仰向天北明水便滿盃中甘香異羙斯實靈神之器耳葛仙别傳曰仙公為客設酒不令人傳之見杯自至人前若不盡者則盃不去神仙傳曰左慈能分盃飲酒曹公聞試之慈㧞簮以畫盃盃即斷飲畢以盃擲屋棟杯懸著屋棟動揺似飛鳥欲落良乆乃墮地又曰劉剛未仙時姮娥降共語如人語不觧其意又曰劉剛未仙時姮娥降共飲留一明月杯云以示世人南州異物志曰鸚鵡螺狀似覆杯形如鳥頭向其腹視似鸚鵡故以為名南越志曰南海以鰕頭為長杯頭長數尺金銀鏤之晉廣州刺史嘗以杯献簡文簡文用以盛藥未及飲無故酒躍於外時廬江太守曲安逺頗解術數即命筮之安逺曰却三旬後庭將有告慶者永嘉郡記曰君鄣山袁君廟神降於祝史以神前杯灌地以大􅅅杯覆之有頃發杯而茵芝生於杯下後漢馮敬通杯銘曰樂則思舊燕則思歡民之失德乾餱以愆班彪上啓事曰官吏二千石布􅃭羊裘以白木杯飲食飾虛欲以求名干譽魏武帝上雜物䟽曰有銀畫象牙象盤五具陶侃故事曰侃上雜物䟽有上成帝螺盃一枚棬音卷方言曰盂海岱東齊北燕之間或謂之棬禮曰母没而杯棬不能飲焉口澤之氣存焉耳孟子曰告子云性猶把栁也義猶杯棬也孟子曰子能順把栁之性以為杯棬乎欓呉越春秋曰越以甘蜜九欓報呉増封之禮太平御覽卷七百五十九
