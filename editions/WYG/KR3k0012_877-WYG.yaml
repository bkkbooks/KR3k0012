body:
  text: 太平御覽卷八百七十七宋李昉等撰咎徴部四雲五色雲青雲黄雲赤雲黒雲氣白氣赤氣黒氣雨無雲而雨雨土雨沙雨灰雨血雨肉雨毛雨水雨花雨草雨榖雨魚雨螽雨錢雨水銀雨金雨續雨帛雲周禮春官曰眂祲掌十煇之法以觀妖祥四曰監八曰叙又曰保章氏以五雲之物辦吉凶水旱降豐荒之祲象京房易妖占曰天無雲雲自出且有兵出邑且有水如箒如鳥其有下兵洪範五行傳曰雲者起於山彌於天隂氣也王者失中臣下敢蔽君不明則雲隂象多蔽天光有雲如衆謂風師法有大兵吕氏春秋曰亂國之主衆邪之所積其雲狀有若火若馬若白鵠若衆軍其狀若人蒼衣赤首不動其名曰天衝有狀若懸旌而赤其名曰雲旌有狀若衆馬以鬬其名曰春秋􅅗潭記曰雲色沐沐不濁賢人去位小人得禄東觀漢記曰二公為昆陽正晝有雲直營而隕不及地而散吏皆壓佐袁山松後漢書曰中平四年雲氣如足相次重疊彌天國志厯曰晉咸和元年七月雲鬭聲如暴風雨五色雲宋書曰前廢帝景平二年有五色雲如錦其年五月司空徐羨之廢帝為榮陽正青雲河圗曰青雲闕月五榖不闕赤雲如人頭大戰月旁有白雲闕者三闕兵戰月始出有黑雲貫名激闕不出三日暴雨黄雲崔鴻十六國春秋曰後趙石勒建平四年有赤黄雲如幕長數十丈其年勒死又曰冉閔永興三年有雲黄赤色起東北長百餘丈是嵗閔為暴容闕所殺春秋運斗樞曰勢集於后族羣妃之黨僭黄雲四合女訛驚邦春秋感精符曰妻黨翔則黄雲入國侯今冬至日見黑雲有水雲黄白如人頭懸鏡之狀禍流赤雲左傳曰哀公六年有如衆赤鳥來日而飛三日楚昭王使問周太史曰其當王身乎若榮之可移於合尹司馬王弗榮而卒孔子曰楚昭王知天道矣不失國宜哉黒雲趙書曰石虎建武四年東南卒有雲黑稍分為三疋又貫日日没後分為七枚相去數十丈其間有白雲如魚鱗虎子韜曰常有刺客後果為太子宣所殺氣釋名曰祲侵也赤黑之氣相侵也周禮曰春官㫝祲掌十煇之法以觀妖祥一曰鄭司隂去祲陽氣象祲也左傳昭公十五年春將禘子武公戒百官梓慎曰禘之日其有咎乎吾見赤黑之祲非祭祥也喪氣也其在莅事乎二曰庚辰禘叔弓莅事簽入而卒春秋運斗樞曰赤人刺房吕氏春秋曰亂國之王其氣有豐上歛下有若水之狀有若山之狀春黄夏黑秋蒼冬赤崔鴻十六國春秋北燕錄曰𤣥始十一年春正月饗羣臣于謙光殿沮渠䝉遜曰南方有惡氣經天暴兵衆也不出一旬必有㓂問命治兵東苑以備之西秦遣騎七千來襲至縣孫侯嶺聞有備而還三護舊事曰漢作靈臺以四孟之月登臺而觀黄氣為疾病赤氣為兵黑氣為水也白氣漢書曰哀帝建平元年有白氣從地至天出㕘下貫太廟廣如疋布長十餘丈哀帝吤病候也續漢書曰孝和永和十六年四月丁未紫宫中生白氣如粉絮古為喪又曰孝靈嘉十二年八月辛未白氣如疋練衝北斗第四星占為大戰明年揚州刺史臧旻攻盗賊於建康折者數千級蜀李書曰哀帝即位有白氣一道帶天望氣者言宫中有伏兵果為卭都公所害也晉書曰懐帝永嘉三年十一月有白氣如帶自地昇天南北各一至五年石勒劉曜王皆㓂洛陽帝䝉塵于平陽劉聰封帝為侯又曰成帝咸和元年後蜀李雄王衡二十四年雄死太子班立有白氣如帶經天史占有隂謀班不悞為李竒所殺宋書曰文帝元嘉二十六年十二月夜有白氣貫於北斗属子地至明年魏太武至𤓰歩江陳書曰文帝天嘉五年六月夜有白氣四道出于北斗東南属子地後年四月帝崩太子伯宗立廢為臨海王又曰宣帝太建五年二月夜有白氣貫于北斗紫宫属子地至明年北齊闕至于江隋書曰蕭吉􅀈嗣位拜太府少卿行經華隂見楊素家家有白氣属天宻言於帝帝問其故吉曰其後素家當兵禍絶滅之象改𦵏可免後帝魏𤣥感曰公家宜改𦵏𤣥感亦徴知其故以為吉祥託以東遼來滅不是私門之事未幾𤣥感以反族誅赤氣漢書曰成帝永始三年二月癸未夜東方有赤白色氣大三四圍長二三丈索索如樹南方有大樹四五圍下莖十闕徐丈皆不至地䜟占曰東南之變氣狀如樹木以此知闕者明年十二月己卯尉氏男子楚並等謀反庚闕亡徒蘇令等為大賊一日有兩氣同時起而並闕等同月而俱發又曰王莽建國四年夏赤氣出東南竟天明年二月元帝王皇后崩後漢書曰獻帝興平末夜有赤氣貫紫宫明年改元運安政歸曹氏晉書曰惠帝大安二年赤氣竟天又永興二年十一月夜有赤氣竟天其年十二月成都王賴攻洛陽又曰懐帝永嘉元年正月天氣晝赤氣有聲如雷明年劉元海僭位宋書曰文帝元嘉七年十一月西北有赤氣中黑如旌旗至八年滑臺為魏軍圍粮盡城中燻鼠而食之後魏書曰莊帝永安三年十一月己丑有赤氣而霧從􅂋陽殿階西南角斜属廊髙一丈連地如綘紗自未至戌不滅帝見而惡之隋書曰周靜帝大定元年有赤氣起西方東行遍天下七月隋公堅襌又曰隋大業末越王伺束都留闕為王世克所幽世充自立為丞相百官摠已於晝省受冊設樂文武陪立於㕔西有赤氣如綘幔自辰至戌而滅旬日世充乃殺朝士元文都盧楚遂篡位黑氣史記曰周靈王二十年有闕黑氣如日至景王五大夫争權後漢書曰靈帝光華元年六月有黒氣堕所御温徳殿庭十月皇后宋氏廢至中平元年鉅鹿人張角稱黄巾師都三十六萬同反叛宋書曰明帝大始二年二月夜有黑氣五東西經天南行隋書曰梁元帝承聖三年六月有黑氣如龍見殿内其年元帝為西魏所擒又曰陳廢帝臨海王時十二月日入時有黒氣如雲入日中其年見廢雨史記曰夏傑末年大雨水闕為湯所放京房易妖古曰雨鳴瓦任滅武大臣專擅霖雨壊道尚書洪範咎徴曰狂恒雨若左傳曰莊公二十年秋宋大水公使吊焉曰天作滛雨害於粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱春秋繁露曰木有變明闕此徭役衆賦斂重故也京氏别對災異曰人君擅私闕恣意重情不異臣下同謀即致偏雨夜墮也不救致苦雨降萬民愁潦水絶道其救也興公道無私黨此災消矣漢書曰文帝後三年秋大雨晝夜不絶二十五日流散民家新垣平謀反又曰昭帝時秋大雨自七月至十月時帝幼霍光專政又曰成帝時秋大雨四十餘日時王氏舉宗在朝之應又曰哀帝時夏大雨雹又冬風雨雹其年郡國四十一處劉文光等攻厭闕殺闕長又曰王莽地皇中赤眉殺太師義仲莽遣太師王匡討之莽兵出東都門外天大雨沾衣長安一父老嘆曰是為泣時百姓飢莽令煑莫不為名不可又曰四年六月光武兵至昆至弟至莽使司徒王尋司空王邑將兵百萬圍之㑹天大風飛屋瓦雨下如注三分兵亂敗自相殘殺睢水為之不流後漢書曰靈帝時夏京師大雨水其秋中常侍曺節矯詔誅太傅陳蕃將軍竇武遷太后於北宫至後平京師又雨水暴出其年竇太后崩是苦雨之應也又曰獻帝初平初董卓逼帝入長安時入宫日大雨晝昏卓殺太𫝊袁隗太僕袁基及闕女宗族五十餘人又曰獻帝時夏大雨水時曺操殺皇后伏氏又曰獻帝末司徒王允殺董卓時李􅔸郭汜攻䧟長安殺戮甚衆及收卓屍闕𦵏日大風雨闕水從藏溢漂卓棺出於宂俄而􅔸汜皆被殺續漢書曰建光元年京都及國郡二十九日滛雨傷稼是時羗反末平百姓闕不解愁苦又曰桓帝延喜二年夏霖雨五十餘日是時大將軍梁冀秉政又曰靈帝建寜元年夏霖雨六十餘日是時大將軍竇武謀廢中官其年九月長闕五官之朱闕等共中常侍曺節起兵闗下武敗走追斬武兄弟死者數百人魏志曰明帝時大雨殺鳥雀時帝居喪不哀出入戈獵故有恒雨為罰之變晉書曰元帝時大雨四十餘日晝夜雷電時王敦興兵王師敗績又曰成帝時頻年大雨恒雷時蘇峻餘黨猶據石頭帝幼冲權在臣下也齊書曰明帝時王敬則為大司馬拜日大雨洪注文武失色敬則後竟被誅崔鴻十六國春秋曰後趙石勒將冦鄴霖雨二月不止王師敗季龍干匡靈赴水死者五百餘人勒軍大饑相食又曰石勒元年大霖雨滂溢衝山䧟谷巨松摧㧞東至于海原隰之間皆如山嶺後文騫擊勒姚萇大敗而歸後又霖雨中山暴水流漂巨木百萬後有季龍􅆲奪之事隋書曰魏靜帝時大雨七十餘日後元瑾荀濟劉思逸謀殺齊文宣不遂咸被誅又曰北齊武戍清河年大雨晝夜不息數十日山東大水人多饑死是年匈奴來冦荆州又曰後主天統三年積隂大雨時太后滛亂也隋書曰文帝仁夀元年夏驟電震雨大風㧞木宣君秋始木移於始平明年獨孤后盟唐書曰則天長安四年九月霖雨兼雪隂凡一百五十餘日至神龍元年正月五王誅二張孝和反正方見晴霽又曰徳宗真元二十一年順宗風病王叔文用事連隂雨不霽乃以憲宗為皇太子太子出日即晴傳所謂皇之不極厥罰恒隂皆此數也無雲而雨春秋感精符曰失陽事則無雲而雨林均注曰四月純陽事失陽故無雲而雨也河圖秘徴曰主急妄怒失陽事則主無雲而雨京氏别對災異曰無雲暴雨何人君封拜無功進無徳則致不雲而雨暴過惡暴楊誅反受罪宻雲而不雨其殺也誅彊䘏弱信及兆民雲雨時也隋書曰梁武帝雨自七月至十一月是時穎年興師士卒疲弊又曰元帝承聖中相州賊陸納推李洪鴉為王羽儀器甲甚精徒黨男銃時天日晴初無雲霧軍發之際倐然風雨時人謂為君泣百姓竊有知敗也元帝命竟陵太守王僧辦討平之京房曰若出軍之日無雲而雨此天泣軍沒不還雨不沾衣名曰鬼泣其軍必敗抱朴子曰無雲而雨是為雨血將軍當闕兵講武以應之大雨軍中甚必無功雨土京房易傳曰内滛亂百姓勞苦則天雨土尚書中候曰夏傑無道山亡土崩殷紂時十日雨土於亳紂章國滅伏侯古今注曰漢武帝元朔四年雨土又曰昭帝始元二年雨土晝昏又曰元帝建昭四年雨土梁書曰武帝大同元年雨土又雨黄塵如雪攬之盈掬時帝溺於佛法興造尤甚後魏書曰世宗景明四年凉州雨土如霧時舅尚書令髙肇專政俄而被殺隋書曰隋文帝開皇二年京師雨土四年闗中亂饑諸王各謀為逆時兩營都邑後闕夀宫闕匠死者大半雨沙隋書曰梁簡文時雨黄沙時侯景陵上其年人相食雨灰隋書曰梁武同太年雨灰色黄時帝惡人勝己又信佛法捨身為奴蔽賢絶道後有侯景之亂雨血戰國策曰齊湣王三十一年侵伐鄰國窮兵極武外怨於諸侯内失於百姓燕將樂毅連五國兵以伐之湣王出走楚淖齒救齊淖齒㑹王田于愽昌間地方數百里雨血沾衣羸博之地圻及至泉有人當闕而突求之不得去則又聞其聲齒曰王悉知之乎王曰不知淖齒曰天地人皆以告矣而王不知何得無誅遂殺湣王以無無鬪而敗漢書曰惠帝時宜陽雨血一項時諸吕用事殺三皇子建立非嗣退大臣王陵趙昌周昌右後大臣共誅滅諸吕僵尸流血之應又曰哀帝時山陽雨血廣三尺長五尺大者如錢小者如麻後二年王莽擅朝誅貴戚丁謂董賢用事晉書曰惠帝永康元年三月尉氏雨血明年正月趙王倫簒位遷帝於金墉城其後天下大兵禍流王室崔鴻十六國春秋曰前趙劉聰建元元年十二月雨血於左司𨽻寺覆地其月又雨血東宫延明殿徹瓦在地者深五寸二年四月雨血於東宫其年十二月又雨血於東宫廣袤頃餘鄰嘉元年二月雨血東宫其月又雨血於光極殿來年雨血平陽廣袤千里其月聰死劉燦為靳所殺又曰後趙石遵時雨血周闕鄴城俄為石鑒冉閔所廢遂滅石氏又曰南燕慕容超將敗更菜雨血俄而國亡又曰後蜀李勢末年大雨血俄降於桓温也隋書曰文帝時突厥雍閭可汗闕内雨血三日俄而為隋師所滅唐書曰髙祖武徳初突厥處羅可汗欲侵中夏㑹天雨三日乃止而處羅疽發而死雨肉後漢書曰桓帝時亷縣雨肉似羊肝如手時梁冀專政盗賊攻掠明年梁太后崩亦敗魏志曰公孫淵將亡襄平北市生肉長圍各數丈有頭目口喙無手足而動揺曰有形不成有體無聲其國滅亡其年司馬宣王討平之缺崔鴻十六國春秋曰前趙劉聰時有流星起于牽牛闕宫龍形委曲蛇形光昭地落于平陽北十里視之則闕聞平陽長三十步旁常有哭聲雨毛京房曰邪進賢退前樂後憂金失其性則雨毛也漢書曰武帝時天雨白毛明年又雨之闕征役繁興戸口凋散晉書曰武帝時闕白闕益州刺史皇闕為牙門張𢎞謀害晉書曰文帝闕皇六年師雨毛如馬尾闕三尺餘六七寸其月梁仕闕宇文闕劉闕以謀反闕十萬人築長城又於塲州開山造瀆以通運衆役繁與雨毛之應雨水漢書曰桓帝時京師雨水其年皇后梁氏崩梁冀與妻自殺崔鴻十六國春秋曰凉張駿二年九月雨水雨花隋書曰文帝仁夀年在仁夀宫頻天雨花大者征小寸如俞莢又曰毛州天雨金銀花遍四十餘里雨草京房曰君􅈔緑信哀厥妖雨草火失其性則草妖漢書曰元帝時雨草而葉相樛結大如彈丸時帝外氏權盛闕京房曰國若雨蘖人主殃又曰平帝時雨草狀如元帝時王氏專政至於莽乃簒位政在私門之家宋書曰明帝大始四年雨草于宫明年魏侵青州殺太守雨糓史記曰梁惠成王八年雨黍于京房曰雨五糓人相食又曰燕丹囚於秦天雨粟於燕後秦滅之後漢書曰光武未陳留雨粟形如稗實雨魚漢書曰成帝時雨魚長五寸已下時王氏專政崔鴻十六年國春秋曰浚蜀李期闕年大雨魚於宫中其色黄其年為李夀廢殺之又曰夏嚇連勃闕鳯翔元年五月雨魚闕萬尤為甚雨螽史記曰魯文公三年雨螽劉向以為宋殺大夫而無罪有暴虐賦斂之應雨錢廣五行記曰浚魏宣武景明年海陵人黄尋家貧忽風雨錢飛至家後巨富錢數萬其後被誅雨水銀隋書曰文帝仁夀四年八月仁夀宫内再雨水銀又陜州雨水銀奏髙祖知非祥其年太子逆殺漢王諒舉兵天下將亂之應雨金史記曰晉惠公二年雨金至六年秦穆公涉河伐晉雨續宋書曰孝武大明七年㑹稽雨續委於山澤續如麻紵脆似地毛至八年大餓横尸原野雨帛宋書曰文帝元嘉十七年七月張仲舒晨夕輙見門側赤氣赫然空中忽雨降羅於庭中廣七八分長五六寸皆以箋紙繋之廣長與羅等紛闕其闕舒惡而焚之舒經宿暴死太平御覧卷八百七十七
