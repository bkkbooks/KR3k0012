body:
  text: 太平御覽卷七百二十宋李昉等撰方術部一飬生易曰天地之大徳曰生𫝊曰君子有四時朝以聽政聽國政晝以訪問問可否夕以修念念所施夜以安身於是節宣其氣宣散也勿使有所壅閉湫子小切底音止以露其體湫集也底滯也露嬴也宣之則血氣集滯而體嬴露兹心不爽而昏亂百度兹此也爽明也百度事物之節老子養生要訣曰一人之身一國之象胷臆之設猶宫室也肢體之位猶郊境也骨節之分猶百川也腠理之間猶四衢也神猶君也血猶臣也氣猶民也故至人能理其身亦猶人君能治其國夫愛其民所以安其國愛其氣所以全其身民弊即國亡氣衰即身謝是以志人上士當施醫於未病之先不追修施於既敗之後故知國難保而易喪氣難清而易濁審機權可以安社稷制嗜慾可以保性命若能攝生者當先除六害然後可以延駐何名六害一曰薄名利二曰禁聲色三曰㢘貨財四曰捐滋味五曰屏虛妄六曰除嫉妬六者若存則養生之道徒設耳盖未見其有益也雖心希妙理口念真經咀嚼英華呼吸景象不能補其促矣誠知所以保和全真當須少思少念少笑少言少喜少怒少樂少愁少惡少好少事少機夫多思則神散多念則心勞多笑則臟腑上翻多言則氣海虛脱多喜則膀胱納客風多怒則腠理奔浮血多樂則心神邪蕩多愁則頭面焦枯多好則氣智潰溢多惡則精爽奔騰多事則筋脈乾急多機則智慮沉迷兹乃伐人之生甚於斤斧蝕人之性猛於豺狼無久行無久坐無久立無久卧無久視無久聽不饑强食則脾勞不渇强飲則胃脹體欲常勞食欲常少勞勿令過少勿令虛冬則朝勿虛夏則夜勿飽早起不在雞鳴前晚起不過日出後心内澄則真人守其位氣内定則邪物去其身行欺詐則神悲行争競則神沮輕侮於人當减算殺害於物必傷年修一善則魂神歡除一惡則魄神喜魂神欲人生魄神欲人死常欲寛泰自居恬淡自守則神形安静災病不生仙録必書其名死籍必消其咎養生之理盡在此矣至於錬瓊丹而補腦化金液以留神此上真之妙道非食穀啗血越分而修之萬人之中得者殊少深可誡焉莊子曰善養生若牧羊視其後者而鞭之周威公曰何謂曰魯有單豹者巖居而谷飲不與民共利行年七十而猶有嬰兒之色不幸遇餓虎殺而食之有張毅者髙門懸薄無不走也行年四十而有内熱之病以死豹養其内而虎食其外毅養其外而病攻其内此二子者皆不鞭其後者也夫守一方之事至於過理者不及於㑹通之適也鞭其後者去其不及也又曰養形必先之以物物有餘而形不養者有之矣有生必先無離形形不離而生亡者有之矣其來不能却其去不能止也悲夫世之人以為養形足以存生而養形果不足以存生則世奚足為哉文子曰太上養神其次養形神清意平百節皆寧養生之本也肥肌膚充腹腸開嗜欲養生之末也韓子曰神不注於外則身全身全之謂得得者得身也吕氏春秋曰凡生之長也順之也使生不順者欲也故聖人必先適欲室大則多隂臺髙則多陽多隂則蹷多陽則痿蹷也逆寒病也痿蹷不能行此隂陽不適之患也是故先王不處大室不為高臺味不衆珎衣不燀熱燀熱則理塞理塞則氣不達味衆珎則胃充胃充則中大鞔中大鞔則氣不逹以此求長生其可得乎昔先王之為苑囿園池也足以觀望勞形而已矣其為宫室臺榭也足以辟燥備濕而已矣其為輿馬衣裘也足以逸身煖骸而已矣其為飲食酏醴也足以適味充虛而已矣其為聲色音樂也足以安性自娱而已矣此五者之所以養性也非好儉而惡費也節于性也又曰天生隂陽濕燥寒暑四時之化萬物之變莫不爲利莫不為害聖人察之以便生故精神安乎形而年夀長焉長也者非短而續也畢其數也畢數之務在去乎害何謂去害大甘大酸大苦大辛大醎五者充形則生害矣大喜大怒大憂大恐大哀五者接神則生害矣大寒大熱大燥大濕大風大霧六者動精則生害矣諸言大皆謂過制故凡養生莫若知本則疾無由至矣又曰湯問伊尹曰欲取天下若何伊尹曰欲取天下天下可取身将先取身先為天下所取也凡事之本必先治身嗇其大寳大寳身也用其新棄其陳湊理遂通精氣日新邪氣盡去反其天年此之謂真人昔先聖王成其身而天下成治其身而天下治故善響者不於響於聲善景者不於景於形為天下者不於天下而於身詩曰淑人君子其儀不忒其儀不忒正是四國言正諸身也淮南子曰君子行正氣不行邪氣内便於性外合於義循理而動不繫於物者正氣也溺於滋味淫於聲色發於喜怒不顧後患者邪氣也邪與正相傷欲與性相害不可兩立一植一廢故聖人損欲而從事於性凢治身養性節寢處適飲食和喜怒便動静而邪氣自不生豈若憂瘕疵之興痤疽之發而豫之哉又曰今萬物之來擢拔吾性􅠡取吾精勢若泉源雖欲勿受庸可得乎今夫樹木灌以潦水疇以肥壤十人養之一人拔之則必無餘蘖况以一國同伐雖欲久生豈可得哉今盆水在廷清之終日未能見眉睫濁之不過一撓而不能察方員人神易濁而難清猶盆之類也又曰夫水之性清而沙土汨之人之性安而嗜慾亂之夫人之所受於性者耳目之於聲色也鼻口之於芳臭也肌膚之於寒煖也其情一也或通於神明或不免於癡狂者何也其所以為制者異也是故神智之淵也神清則智明智心之府也智公則心平人莫鑒於沬雨而鑒於止水者以其静也莫窺於生鐵而窺於明鏡者以其易也夫惟易且静故能形物之情性由此觀之神智之為用大矣是故虛室生白吉祥呈焉又曰至人守度循軌不變其宜不易其常直惟修繩曲因其當喜怒者道之邪悲憂者徳之失好憎者心之過愛惡者性之累夫大怒破隂大喜墜陽薄氣發揚驚怖為狂悲憂多病乃積成好憎繁禍乃相隨愛惡深偏乃自至故心無喜怒道之正也心無悲憂徳之至也好憎不形虛之至也無所愛惡平之至也能此數者則通於神明通於神明者得其内者也抱朴子内篇曰夫大元之山難知易求不髙不下不伸不沉絶險綿邈崔巍﨑嶇和氣絪緼童叟並遊玉井泓瑩灌溉莫休百二十官曹府相由艮坎列位𤣥芝萬採綘樹特生其實如珠金玉嵯峨醴泉出隅還年之玉井其清流子能脩之松喬同儔此一山也長谷之山杳杳巍巍𤣥靈飄飄玉屑霏霏金池紫房在手其隈愚人競往至則皆歸有道志士登之不哀抹服黄精以至天飛此二山也古賢之所為深於思也又曰凡養生者欲令多聞而博見而擇善徧修一事不足頼也又患好事之徒各矜其所長知𤣥素之術者則曰帷房中可以度世矣明吐納之道者則曰惟行氣還以延夀矣知屈伸之法者則曰惟導引可以老矣知草木之方者則曰惟田宅可以無窮矣學道之不能成就至偏枯之若此也又曰余祖鴻臚少時當為臨淄令云此縣有民家世夀者或出百嵗或八九十後其子孫轉多夭折他人居其故宅後亦累世夀考由此乃覺是宅之所為而不知者疑其井水殊乎乃試掘井左右得古人埋丹砂數十斛去井數尺此丹砂汁因泉漸入井是以飲其水而得夀况乃煉丹砂而服之乎又曰人亦有不病者各有所制攝生食不欲飽眠不欲扇星下不卧里語曰人在世間失一日如牽牛以詣屠所每進一歩死轉近也夫人九泉之下長夜㒺極始為螻蟻之根終與塵埃合體令人怛然心熱求生之心何可不至新論曰曲陽王根方七嵗欲與君惠從其學養生却老二術君惠曰龜鶴補三千嵗以人之才何乃不如蟲鳥耶白虎通曰男子乆閉房户所以常輔性命也㑹稽典録曰王充年漸七十嵗作養生之書凡十六篇養氣自守閉明塞聽愛精自輔服藥道引庶㡬復道劉根别傳曰取七嵗男齒女髪與已頭垢合燒復之一嵗則不知老常為之始老有以容也嵇康養生論曰養生有五難名利不㓕此一難也喜怒不除此二難也聲色不去此三難也滋味不絶此四難也神虛精散此五難也五者必存雖心希難老口誦至言咀嚼英華呼吸太陽不能不夭其年也五者無於胸中則信順日深𤣥徳日全不祈喜而自福不求夀而自延此養生大理所歸也又曰夫為稼於湯世偏有一溉之功者雖終歸於焦爛必一溉者後枯然則一溉之益固不可誣也而世常謂一怒不足以侵性一哀不足以傷身輕而肆之是猶不識一溉之益而望嘉穀於早苗者也是以君子知形恃神以立神須形以存悟生理之易失知一過之害生故修性以保神安心以全身愛憎不悽於情憂喜不留於心泊然無感而體氣和平又呼吸吐納服食輔養使形神相親表裏俱濟也夫種田者一畆十斛謂之良田此天下通稱也不知區種可百餘斛田種一也至於樹養不同則功収相懸謂商無十倍之價農無百斛之望此守常而不變者也且豆令人重榆令人瞑合歡蠲忿萱草忘憂愚智所知也薑辛害目豚魚不養世所識也虱處頭而黒麝食栢而香頸處險而癭齒居晉而黄推此而言凡所食之氣蒸性染身莫不相應豈惟蒸之使重而無使輕害之使闇而無使明薫之使黄而無使堅芬之使香而無使延哉神農曰上藥養命中藥養性者誠知性命之理因輔養以通也而世人不察惟五穀是嗜聲色是躭目惑𤣥黄耳務淫哇滋味煎其腑臟醴醪煮其腸胃香芳腐其骨髓喜怒悖其正氣思慮消其精神哀樂殃其平粹夫以蕞爾之軀攻之者非一途易竭之身而内外受敵身非木石其能久乎神仙傳曰彭祖云養夀之道但莫傷之而已夫冬温夏凉不失四時之和所以適身也美色淑姿安閑性樂不欣思慾之感所以通神也車服威儀知足無求所以一志也八音五色以養視聽之懽所以導心也凡此皆以養夀而不能斟酌之者反以速患古之智人恐不才之子不識事宜流遁不還破絶其源故經有上士别牀中士異被服藥百過不如獨卧色使目盲聲使耳聾味令口爽若能節其宜適抑揚其通塞者不减年算而得其益凡此之類譬猶水火可否失適反為害耳人不知其經脈損傷血氣不足肉骨空疎髓腦不實體已先病故為外物所犯因風寒酒色以發之耳若本充實豈有病乎凡逺思强健傷人憂過悲哀傷人喜樂過量傷人忿怒不解傷人汲汲所願傷人戚戚所患傷人寒煖失節傷人隂陽不交傷人人所傷者甚衆而獨責房室不亦惑哉男女相成猶天地相生也所以道養神氣使人不失其和天地得交接之道故無終竟之限人失交接之道故有殘折之期能避衆傷之事得隂陽之術則不死之道也天地晝離而夜合一嵗三百六十交精氣和合者有四時故能生育萬物不知窮極人能則之可以長存次則有服氣得其道則邪氣不能入治身之本要也其餘厯藏導引之術及念體中萬神有含影中形之事不干心志也人能愛精養體服氣錬神則萬神自守其不然者營衛枯疲萬神自逝非思念所留者也魏志曰吴普常問道於華佗佗謂普曰體欲勞動但不當使極耳如搖動則穀氣易消血脈流通病不得生譬猶戸樞不蠧流水不腐以其常動故也是以仙者及漢時有君士倩為導引之事熊經鳥顧引挽腰體動諸闗節以求難老吾有術一名五禽之戱汝可行之一曰虎二曰鹿三曰熊四曰猨五曰鳥亦以除疾並利蹄足以當導引體中不快起作一禽之戯普施行之遂年九十餘博物志曰魏武帝問封君逹養生之術君逹曰體欲常勞食欲常少勞無過虛省肥濃節醎酸减思慮損喜怒除馳逐慎房室春夏施㵼秋冬閉藏吾常行之有效髙湛養生論曰王叔和高平人也博好經方洞識攝生之道嘗謂人曰食不欲雜雜則或有所犯當時或無灾患積久為人作疾尋常飲食每令得所多飡令人彭亨短氣或致暴疾夏至秋分少食肥膩餅臛之屬此物與酒食𤓰果相妨當時不必即病入秋莭變陽消隂長寒氣總至多至暴卒良由渉夏取冷大過飲食不節故也而不逹者皆以病至之日便謂是受病之始而不知其所由來者漸矣豈不惑哉養生要曰旦起東向坐以兩手相摩令熱以手摩額上至頂上滿二九止名曰存泥丸又清旦初起以兩手兩耳極上下之二七止令人不聾次縮鼻閉氣右手從頭上引左耳二七止次引兩髪鬢舉之令人血氣流通頭不白又摩手令熱以摩身體從上至下名乾浴令人勝風寒時氣寒熱頭痛百病皆除莊子曰吹喣呼吸吐故納新熊經鳥伸為夀而已矣此道引之士養形之人也彭祖夀考者之所好也養生要伏氣經曰道者氣也寳氣道長存神者精也寳精則神長明生精者血脈之川流守骨之靈神精去則骨枯骨枯則死矣是以為道者務寳其精從夜半至日中為生氣時正僵仆瞑目握固握固者如嬰兒之捲手閉氣不息於中心數至生二日乃口吐氣出之曰増息如此身神具五臟安能閉氣數至二百五十華蓋明華盖眉也耳目從舉無病邪不入寳氣一名行氣一名長息其法正僵仆徐潄澧泉澧泉唾也而咽之因行氣口但吐氣鼻但内氣徐縮引之莫大極滿者難患十五息已一息自可吐也一息數之至九十息頻伸訖復為之滿四九三百六十息為一竟咽之乃鼻内氣也不爾或令欬凡内氣上外吐氣則氣不流自覺周身抱朴子曰城陽郄儉少時行獵墮空塜中飢餓見塜中先有大龜數數迴轉所向無常張口吞氣或俛或仰儉素亦聞龜能導引乃試隨龜所為遂不復飢百餘日後人有偶窺塜中見儉而出之後竟能咽氣斷􅂖魏王拘置土室中閑試之一年不食顔色悦澤氣力自若又曰爾乃咀吸寳華谷神大清外珎五耀内守九精修養雜訣曰老子云𤣥牝之門是謂天地根綿綿若存用之不勤言口鼻也天地之門以吐納隂陽生死之氣每至日面向午展兩手於膝之上徐按捺百節口吐濁氣鼻引清氣所以吐故納新是蹙氣良久徐徐吐之仍以左右手上下前後拓取如山納雲如地受澤若氣通則竟咽咽轉動若得十通即竟身體潤澤而光色渙耳目聰明飲食有味氣力倍加諸疾去矣守九精法言曰生氣侍牀鋪厚軟枕與身平仰卧展脚握手去身四五寸兩手亦去身四五寸㣲㣲鼻引大陽清氣入竟送此氣遍身體即閉氣至極後細從口吐之勿令耳聞吐氣之聲也著生論曰凡夫著生者先調元氣身有四氣人多不明四氣之中各主生死一曰乾元之氣化為精精反為氣精者運於神精益則神明精固則神暢神暢則生健若精散則神疲精竭則神去神去則死二曰坤元之氣化為血血復為氣氣血者通於内血壯則體豐血固則顔盛顔盛則生合若血衰則髪變血敗則腦空腦空則死三曰庶氣庶氣者二元交氣化為津津復為氣氣運於生生託於氣隂陽動息滋潤形骸氣通即生氣塞則死四曰象氣象氣者榖氣也榖濟於生終誤於命食榖味雖生蘊榖氣還死精能附血氣能附生常使循環即身永固乾元之陽陽居隂位臍下氣海是也坤元之隂隂居陽位腦中血海是也生者屬陽陽貫五臟喘息之氣是也死者屬隂隂納五味穢惡之氣是也氣海之氣以壮精神以填骨髓血海之氣以補肌膚以流血脈喘息之氣以通六腑以扶四支穢惡之氣以亂身神以腐五臟修養雜訣氣銘曰一氣未分三才同源清濁既異元氣各存天法象我我法象天我命在我不在於天昧用者夭善用者延性和志寂守一神閑靈芝在身不在於山返一守和理合𤣥𤣥精極乃明精極乃靈氣極乃精無氣乃冥因氣而衰因氣而榮因氣而死因氣而生喜怒亂氣性情交争擁搆成患神形豈寧錬陽消隂其氣自行以正逺邪其患自平乾坤澄净子後午前閉目平生掘固㝠然納息廬中吐息天闗入息㣲㣲出息綿綿以意引氣臟腑迴旋前後呵之榮衛通宣但有不和遣之踵前五呵六呵無􅍚不蠲凡欲胎息道引為先經脈不擁闗節不煩或如射鵰側身彎環或舉腰膝如蟾半圓交匝腦後左旋右旋勁屐兩足氣出指端擺掣四肢捉搦三闗熱摩尺澤氣海亦然叩齒集神合眸固闗寘心亡形任意往還覺氣調勻擁塞喉間擁氣則咽三五相連轉舌潄入咽下丹田以意送之色聲泊然一咽三咽再咽如前三十六咽胎息成焉大道無為為於無為不為無為莫若無為不思為思莫若無思萬法自然不假施為不寒不煖不渴不飢恬淡無為以道自怡妙中之妙㣲中之㣲懐道君子銘之佩之太平御覽卷七百二十
