body:
  text: 太平御覽卷三百三十六宋李昉等撰兵部六十七攻具上攻具上詩曰以爾鉤援與爾臨衝以伐崇墉左傳曰晉使解揚如宋使無䧏楚鄭人囚之以獻於楚楚子使反其言二而後許登諸樓車所謂雲梯使呼宋人而告遂致其君命楚子舍之以歸春秋感精符曰齊晋並爭吳楚更謀不守諸侯之節競行天子之事作衡車厲武將輪有刃衡者劒以相振懼宋均曰衡䧟敵之車也輪有鑿輪者刃衡馬軛也後漢書曰王尋王邑攻光武嚴尤説王邑曰昆陽城小而堅今假號者在宛亟進大兵亟急也紀力切彼必奔走宛敗昆陽自服邑曰吾昔以虎牙將軍圍翟義坐不得生以見責讓翟義字文仲方進少子為東郡太守王莽居攝義惡之乃立東平云子義名號柱天大將軍以誅莽乃使孫建王邑等將兵擊義破之義亡自殺故坐不一生今將百萬之衆遇城而不能下何謂䧟遂圍之數十重列營百數雲車十餘丈雲車即樓車稱雲其髙也升之以望敵猶墨子云般輸為雲梯之械瞰臨城中俯視曰瞰旗幟蔽地廣雅曰幟旛也埃塵連天鉦鼓之聲聞數百里説文曰鉦鐃也似鉦或為地道衝輣撞城衝撞車也詩臨衝閉閑許慎曰輣樓車也輣歩耕切又曰黄巾賊起盧植征之連戰破賊張角等走保廣宗植築圍鑿塹作雲梯垂當拔之帝遣小黄門左豐詣軍觀賊形勢或勸植以賂送豐植不肯豐還言於帝曰廣宗賊易破耳盧中郎固壘息軍以緩天誅帝怒遂檻車徵植袁山松後漢書曰朱雋擊黄巾賊趙𢎞於南陽斬之賊復以韓忠為帥雋兵力少不能急攻乃先起土山以臨之因偽修攻具曜兵於西南雋身自被甲將精卒乗其東北遂得入城忠乞䧏東觀漢記曰初王莽之遣王尋王邑也欲盛威武以震山東兵甲衝輣干戈旌旗戰攻之具甚盛後尋邑環昆陽城作營圍之數重雲車十餘丈瞰城中或為地道或衝車撞城積弩射城中矢如雨下城中負户而汲又曰伯升作攻城鬬車上曰兵法但有所圖畵者不可用伯升遂作後有司馬犯軍令當斬坐聞車上又曰隗囂破後有五谿六種冦侵見便鈔掠退阻營塹來歙乃大治攻具衝車度塹遂與五谿戰大破之又曰吳漢嘗獨厲吏士治兵事上時令人視吳公何為還言方修攻具上曰吳公隠若一敵國矣魏志曰太祖戰不利復壁袁紹為髙櫓起土山射營中太祖乃為發石車擊紹樓皆破紹為道地欲襲太祖營太祖輙於内為塹以拒之魚豢魏略曰郝昭字伯道守陳倉城為諸葛亮所圍起雲梯衝車以墮城昭火箭逆射其雲梯梯上之人皆燒死又曰衡山王賜謀反使枚赫陳善作輣車又曰膠東康王寄作樓車戰具以備淮南事及漢治淮南事連寄寄發病死韋昭吳書曰督將張異攻麻屯敗使將王告作臨車雲梯剋日攻拔之又曰魏遣曹真夏尚等到江陵連屯圍城攻擊甚急真等起土山鑿地道樓櫓臨城征北將軍朱然在城中晏然無恐隨形勢立備巧不得施張㪍吳錄曰黄武二年曹休令臧霜以輕船敢死萬人襲攻徐陵燒攻城車殺略數千人王隠晉書曰宣帝討公孫淵至襄平遂圍之起土山地道修櫓鉤撞發石雨下晝夜攻之斬傳其首又曰諸葛誕反淮南孟康王慕曰宜作土山歛諸侯材板薄櫓以為攻具又曰段匹磾所立代郡太守薛閭嵩與劉琨鴈門太守王處合軍謀殺磾奉琨宻作攻具欲夜襲磾磾兒强取處女為妾遂以攻具告磾磾遂斬王處薛閭嵩及其徒黨玉韶之晉記曰宋王圍慕容超張綱巧思絶人使為改其城上火石弓矢無所用之超黨震懾城内知亡矣晋起居注曰徐道覆蟻衆堅城因山固守今董平諸軍圍塹四合髙橦雲梯盡力並攻即日登城斬徐道覆以釁鉦鼓蕭方等三十國春秋曰吳王皓聞師之將興也乃使劉恪守牛渚使張悌造攻具於戲塲又曰劉裕攻南燕得燕人張綱治攻具既成設飛橋懸梯被以牛皮火石不能害攻城之士得肆力焉和范漢趙記曰麟嘉三年太子桀討趙同郭黙於洛陽黙使耿稚等夜北渡河襲太子營飛梯騰柵而入太子勒兵於東北穿柵而去又曰光初二年石勒召幽冀之衆十餘萬人造攻車飛梯攻平陽小城今上遣騎萬五千曵柴揚塵曀於山谷循汾州向平陽内外擊之勒師潰髙閭燕志曰光始五年春慕容燕與符后征髙麗至遼東為衝車馳道以攻之崔鴻前凉錄曰麻秋進攻枹罕圍塹數重雲梯抛車地突百道皆通於内城中亦起雲梯抛車穿地應之殺傷秋衆數萬後凉錄曰将軍竇苟從吕光攻龜兹每登雲梯入地道墜落蘇而復上車頻秦書曰苟長圍襄陽作飛雲車攻城尅之沈約宋書曰竟陵王誕據廣陵反世祖使慶之塞塹造道立行樓土山并諸攻具時夏雨不得攻城上使御史中丞庾徽之奏免慶之官以激之自四月至於七月乃屠城斬誕又曰元嘉二十七年虜主佛貍遂圍懸瓠城行汝南新蔡郡事陳憲嬰城自守虜多作髙樓施弩以射城内飛矢雨下城中負户以汲之又毁佛圖取金像以為大鈎施之衝車端以牽樓作蝦蟆車以填塹憲督厲將士登郭城督戰賊死者屍與城等又曰偽燕主慕容超尚書郎張綱乞師於姚興自長安返太山守仲宣執送之綱有巧思先是帝修攻具城上人曰汝不得張綱何能為也及至升諸樓車以示之故城内莫不失色超既求救不獲綱反見虜乃求稱藩割大峴為界獻馬千疋不聽又曰十月張綱修攻具成設飛樓懸梯木幔板屋冠以皮弓矢用之劉毅遣上黨太守趙恢以千餘人來援帝夜潜遣軍㑹之明旦恢衆五千方道而進每晉使將到輙復如之六年二月丁亥屠廣固孫嚴宋書曰栁元景等北討諸軍攻具進兵城下偽𢎞農太守李初古拔嬰城自固諸軍鼓譟陵城衝車四臨數道俱攻先登生禽李初古拔沈休文宋書曰晋安王子勛反以殷琰督豫州刺史大宋遣輔國將軍劉勔用草茅苞土擲以塞塹城内以火箭射之草未及然後土續至塹便欲滿隊主趙法進計以鐵之珠子灌之珠子流滑悉縁隟得入草扵是火然勔乃作大蝦蟆車載土牛皮蒙之三百人推以塞塹琰戸曹叅軍虞挹之造抛車擊之以石車悉破壊宋起居注曰劉道符露板曰七月二十日部率衆車虎士攻城鉤車至城東南樓下逆賊程天作等道窮數廹仍乞䧏齊書曰殷琰反帝遣輔國將軍劉勔西討之築長圍創攻道於東南角并作大蝦蟆車載土牛皮䝉之百人推以塞塹琰乃始䧏三國典畧曰侯景作尖頂木驢攻城石不能破也羊侃作雉尾炬灌以膏蠟取擲焚之乃退梁書曰侯景為曲項木驢攻城矢石不能制羊侃作雉尾炬施鐵鏇以油灌之擲驢上焚之俄盡賊又東西起二土山以臨城中震駭侃命為地道潜引其土山不能立又作登城樓髙十餘丈欲臨射城中侃曰車髙塹虛彼來必倒可卧而觀之及車動果倒衆皆服焉賊既頻攻不捷乃築長圍朱异張綰議出擊之帝以問侃侃曰不可賊多日攻城既不能下故立長圍欲引城中降者耳今擊之出人若少不足當賊若多則一旦失利門隘橋小必大致挫衂不從遂使千餘人出戰未及交鋒望風退走果以爭橋赴水死者大半隋書曰遼東之役何稠攝右屯衛將軍領御營弩手三萬人時工部尚書宇文愷造遼水橋不成師未得濟右屯衛大將軍麥鐵杖因而遇害帝遣稠造橋一日而就初稠製行殿及六合城至是帝在遼左與賊相對夜中施之其城周廻八里城及女垣各髙十仭上布甲士立仗建旗四隅置闕面列一觀觀下三門遲明而畢髙麗望見謂若神功是嵗加金紫光禄大夫唐書曰姜確為交河道行軍副摠管率衆數千先大軍出伊吾趣栁城谷依山採木造攻城器械其地有班超紀功碑確磨去其文刋頌國功而去陶公故事曰臣侃言郭黙狂狡肆行凶虐負阻城險用稽天誅城土山臨其城樓櫓攻具備設宋先朝故事曰慕容超大將垣遵舉城歸順髙祖使遵等攻城橦車築長圍髙三丈外三重塹周遷輿服雜事曰橨榅今之橦車也其下四輪從中𣙜之至敵城下又曰漢世祖造大戰車駕數牛上設樓櫓置疆塞之外以拒匈奴酈善長水經注曰交州刺史檀和之軍次區粟進逼城飛梯雲橋懸樓登壘鉦鼓大作風烈火颺城摧衆䧟靳區粟天范扶龍首十五已上沈截無赦太公六韜曰凡三軍有火噐攻圍邑有橨榅臨衝城中則有雲梯飛樓又曰凡三軍行師令衆旦則有雲梯逺望夜則有雲火萬炬又曰武王寢疾十日太公負王乃駕騖寘之車周且為御至于孟津大黄叅連弩大才扶咠車並戰具也飛鳬赤莖白羽以釵為首雷影青莖赤羽以銅為首副也晝則為光夜則為星方頭鐵搥重八斤亦軍備也大柯斧重八斤一名鐵越軍備也行馬廣二丈二十具渡溝飛橋廣五尺轉關鹿盧八具天缸一名天横以濟丈水也鷹爪方凶鐵把柄長七具天陣日月斗柄杓一此為左右一仰一背天陣地陣邱陵水泉有左右前後之利人陣車馬文武積楹臨衝攻城圍邑雲梯飛樓視城中也武衝大櫓三軍所湏雲火萬炬以防火也吹鳴箛作振萬里也太公金匱曰武王問太公今民吏未安賢者未定何以安之太公曰不湏兵噐可以守國耒耜是其弓弩鋤杷是其矛㦸簦笠是其兠鍪鏁斧是其攻具太公覆車試法曰諸出軍行將屯營置陳必法天文圓法北辰為上將角為衝車訾為鐵鉞敵當衝車者敗當鐵鉞者亂又曰諸出軍行將屯守攻陳設壇祠禱戎噐血塗金鼓神攻具必以斗加四季時令朱雀所居神與今日日上神王相而剋莊子曰梁麗可衝城不可以窒穴言殊噐也墨子曰備衝法絞善麻長八丈内有大樹則繫之用斧長六尺令有力者斬之又曰墨子自齊至郢見楚王楚王曰公輸般為我雲梯取宋矣墨子乃見公輸般解帶為城以牒為械公輸九設攻城之具機變墨子九拒之械盡墨子禦餘公輸屈曰吾知所以拒子矣吾不言子墨子亦曰吾知子之所以拒我吾不言楚王問其故曰公輸不過欲殺臣臣之弟子禽滑釐三百人已持臣守圉之噐在宋城上而待楚矣又曰禽子問雲梯既施而為之奈何子墨子曰雲梯者重噐也矢石沙灰以兩之薪火湯水以濟之如此則雲梯之功敗尹子又載般為蒙天之階階成將以攻宋墨子請獻十金般曰吾義固不殺人墨子再拜傅子序馬鈞曰鈞石車敵人於樹邊懸濕牛皮中之則墮石不能連屬而欲作一輪懸大石數十以機鼓輪為常則懸石飛擊敵城使首尾電至嘗試以輪車懸瓴數十飛之數百歩矣曹植東征賦曰循戈櫓於清流汜雲梯而容與禽元帥于中舟振靈威於東野陳琳武軍賦序曰迴天軍於易水之陽以討瓉焉鴻溝參周鹿菰十里薦之以棘為建修櫓干青霄竁深隧下三泉飛雲梯衡神鈎之具不在孫吳之篇三畧六韜之術者凡數十事秘莫得聞也乃作武軍賦曰鈎車轇轕九牛轉牽牽雷響激折櫓倒垣其攻也則飛梯行臨雲閣虛構上通紫電下過三壚繁欽為史叔良作移陵零檄曰金鼓震天丹旗曜野巨堙既設袁宏祖逖碑曰逖為豫州刺史薨時君柩未旋郡冦圍城衝櫓既附城將降矣勇士五百撫戈同泣非祖侯之為吾誰為死并力齊赴卷甲霄起遂陷堅乗負戈而反太平御覧卷三百三十六
