body:
  text: 太平御覽卷二百九十五宋李昉等撰兵部二十六審察避銳安衆審察孫子曰兵怒而不相迎交而不合又不相去必謹察之備竒伏也左傳曰齊師伐魯敗退魯莊公將逐之曹劌曰未可夫大國難測也懼有伏焉恐詐而奔也吾視其轍亂望其旗靡故逐之旗靡轍亂怖遽也又曰秦晉戰于河曲秦行人夜戒晉師曰兩君之士皆未憖也明日請相見也憖切也魚覲切晉大夫臾駢曰使者目動而言肆懼我也目動心不安言肆聲放失常節也將遁矣薄諸河必敗之薄廹也晉禆將胥甲趙穿當軍門呼曰死傷未收而棄之不惠也不待期而薄人於險無勇也乃止秦師果夜遁又曰晉侯伐齊齊侯畏其衆齊師夜遁師曠曰鳥烏之聲樂齊師其遁鳥烏得空故樂也邢伯曰有班馬之聲夜遁馬不聞見故鳴班列也齊師其遁叔向曰城上有烏齊師其遁又曰晉師伐楚將戰楚子登巢車以觀晉軍巢車車上為櫓楚將子重使太宰伯州犂侍於王後州犂晉伯宗子先奔楚王曰騁而左右何也騁走曰召軍吏也皆聚於中軍矣曰合謀也張幕矣曰䖍卜於先君也徹幕矣曰將發命也甚囂且塵上矣曰將塞井夷竈而為行也夷平行户郎切皆乗矣左右執兵而下矣曰聽誓也左將帥右車右竟敗楚於鄢陵鄢音􅟠魏志曰𤣥德遣將吳蘭屯下辯曹公遣曹洪征之以曹休參軍事𤣥德遣張飛屯固山欲斷軍後衆議狐疑休曰賊實斷道者當伏兵潜行今乃先張聲勢此其不能也宜及其未集促擊蘭破則飛自走洪從之進兵擊蘭大破之飛果走宋書曰東晉末武帝率兵北伐圍南燕慕容超於廣固未下時後秦姚興遣使告宋武云慕容見與鄰好以窮告急今當遣鐵騎一萬遥據洛陽晉軍若不退者便當長驅而進宋武答興使曰語汝姚興我定燕之後息甲三年當平關洛今能自送便可速來穆之聞興使入而宋武發遣已去以興所言并答具語穆之穆之曰常日事無大小必賜與謀此宜善詳云何率爾便答未能威敵正足怒彼耳若燕未可㧞興救奄至不審何以待之宋武笑曰此是兵機非卿所解故不語耳夫兵貴神速彼若審能遣救必畏我知寧容先遣信命此是其見我伐燕内已懐懼自强之辭耳興竟不能出師廣固終㧞擒慕容超平齊地又曰武帝自京口舉義兵討桓𤣥𤣥將桓謙屯於東陵卞範屯覆舟山西以拒之宋武疑賊有伏兵謂小將劉鍾此山下當有伏兵卿可率部下徃取之鍾應聲馳進果有伏兵數百一時奔走又曰雍州刺史袁覬舉兵反㳂流入鵲尾與官軍相持既乆官軍主張興世越鵲尾上據錢溪覬將劉胡攻之不下遣人傳唱錢溪已平官軍之衆並懼宋將沈攸之曰不然若錢溪實敗萬人中要應有逃亡來者必是彼戰失利唱空聲以惑衆耳勒軍中不得輒動錢溪信尋至果大破賊攸之悉以錢溪所送胡軍耳鼻示人覬駭懼急追胡還遂潰走後魏書曰司馬楚之討蠕蠕蠕蠕潜遣諜者蠕而宣切入楚之軍截驢耳而去有告失驢耳者諸將莫能察楚之曰必是覘賊截之以為驗耳賊將至即使軍人伐桞為城水灌令凍城立而賊至冰峻城固不可攻逼敗乃走散世祖聞而嘉之又曰韓果性强記兼具有權畧所行之處山川形勢輒能記憶兼善伺敵虛實揣知情状有潜匿溪谷欲為間遁者果登高視之所疑之處徃必有獲通典曰周武帝帥師攻圍高齊晉州齊後主將兵十萬自來援之時柱國陳王純屯千里逕大將軍永昌公椿屯雞棲原大將軍宇文盛屯汾水關并受齊王憲節度憲宻謂椿曰兵者詭道去畱不定見機而作不得遵常汝今為營勢令兵去之後賊猶致疑不湏張幕可伐疑也時齊分軍萬人向千里逕又令其衆出汾水關自率大兵與椿對陣宇文盛馳騎告急憲自以千騎救之齊人覩谷中塵起相率遽退盛與柱國侯莫陳昺渉汾逐之多有斬獲俄而椿吿齊衆稍逼憲又廻軍赴之㑹被勅追還夜返齊人果謂椿張幕不疑軍退翌日始悟軍䜟曰夫用兵者必察敵國之情視其倉廩度其餘糧以卜其强弱運糧二百里者無二年之食也運糧三百里者無三年之糧也是謂虛國民窮上下不相親則有離叛心上行暴虐則下刻急相殘賊是為亡國若進惡不退羣賢隠蔽不肖在位國受其害内貪外廉竊公為恩飾躬正顔以獲髙官是謂盜端避銳孫子曰少而逃之高壁壘勿與戰也彼衆我寡師不可敵則軍自逃守匿其形也不若則能避之若兵避之强弱不敵勢不相若則引軍避之待利而動故小敵之堅大敵之擒小不能當大言小國不量其力敢與大邦為讐雖權時堅城固守然後必見擒獲春秋傳曰既不能强又不能弱所以敗也無邀正正之旗無擊堂堂之陣此理變者也正正者整齊也堂堂者大也威盛貌正正者孤特相也言前有孤特之兵後有堂堂之陣必有竒伏詐誘之謀審察待之勿輕邀截此理變詐者也是故朝氣銳晝氣惰暮氣歸善用兵者避其銳擊其惰歸此理氣者也避其精銳之氣擊其懈惰欲歸此理氣者也故曹劌曰夫兵者勇氣也一鼔作氣再而衰三而竭彼竭我盈是以尅之也戰國䇿曰魏武侯問吳起曰暴冦卒至掠吾田野取吾牛馬則如之何起曰暴冦之來必精且强善守勿應潜伏路傍暮去必率車乗重裝驍騎逐擊勢必莫當遇我伏内如雪逢湯也後漢書曰袁尚據鄴率兵徃擊兄譚於南皮畱蘇畱審配守曹公圍鄴尚還救鄴諸將皆以為此歸師人自為戰不如避之公曰尚從大道來當避之若循西山來者此成擒耳尚果循西山來臨滏水為營夜遣兵犯圍公逆擊破走之城中崩潰通典曰東晉末武帝伐南燕慕容超領南賊盧循徐道覆乗虛襲建鄴循多疑少决毎欲以萬全為慮謂道覆曰大軍未至晉吏部尚書孟昶便親引自裁大勢言之事當計日潰亂令决負於一朝既非必定之道且殺傷士卒不如案兵待之宋武奔還拒守策之曰賊若新亭直上且當避之廻泊蔡州乃成擒耳於是登石頭城以覩循軍初見引向新亭宋武顧左右失色既而廽泊蔡州道覆猶欲上循使禁之羸老悉乗舟艦向白石宋武慮其從白石歩上乃率劉毅諸葛長民北出拒之賊遂率數萬屯丹陽郡宋武率諸軍馳歸衆慮賊過江咸謂當逕還拒戰宋武乃先引軍還石頭衆莫之曉是日大熱三軍疲頓既入城解甲息士洗浴飲食乆之乃出列陣于南塘命叅軍禇叔度朱齡石率驍勇千餘人過淮賊數千皆長刀矛鋋精甲曜日奮躍争進齡石所領多鮮卑善歩矟並結陣以待之賊短兵弗能抗死傷數百人乃退走安衆春秋曰晉文公卒將殯于曲沃出絳柩有聲如牛如牛吼聲虛苟切卜偃使大夫拜曰君命大事將有西師過軼我擊之必大捷焉秦伯使孟明視等三將襲鄭晉師禦之于殽而敗之聲自柩出故曰君命也大事也卜偃聞秦密謀故因柩聲以正衆心史記曰燕使騎刼代樂毅攻齊即墨齊將田單拒守乃令城中人食必祭其先祖於中庭飛鳥悉翔舞城中下食燕人恠之單復宣言曰神來下教我又令曰當有神人為我師者有一卒曰臣可以為師乎因反走田單乃起引還東嚮坐師事之卒曰臣欺君誠無能田單曰子勿言也因師之每出入約東必稱神衆心乃安竟破燕軍又曰秦二世初天下亂陳勝吳廣起兵於蘄欲收人心謀曰項燕為楚將數有功愛士卒楚人憐之或以為在今誠以吾衆為天下倡宜多應者謂首號令廣以為然乃行卜卜者知其指意曰足下皆成功然足下卜之鬼乎卜者云事成有功然湏假托鬼神乃可興起耳故勝廣曉其意則為魚書狐鳴以威衆也勝廣喜念鬼曰此教我先威衆耳廼丹書帛曰陳勝王置所罾魚腹中罾音曽卒買魚烹食得書已怪之矣又間令廣之次近所旁叢祠中夜篝火狐鳴呼曰大楚興陳勝王間謂竊令人行也宻於廣所次舍處旁側叢祠中謂之叢謂草木之岑蔚者也祠神祠也搆謂結起也呼火故切卒皆夜驚恐朝日卒中徃徃指目勝廣因而號令衆遂從之又曰高帝已封大功臣二十餘人其餘日夜争功不决未得行封帝在洛陽南宮從復道遥見諸將徃徃相與坐沙中偶語張良曰陛下起布衣以此屬取天下今為天子而所封者蕭曹故人及親愛而所誅者皆生平所讐怨今軍吏計功以天下不足遍封此屬畏陛下不能盡封又恐見疑平生過失及誅故即相聚謀反耳帝憂曰為之奈何良曰帝平生所憎羣臣所共知誰最甚者帝曰雍齒與我故數常窘辱我我欲殺之為其功多故不忍良曰今急先封則人人自堅矣於是帝乃置酒封齒什方侯已而急趣丞相御史定功行賞羣臣皆喜曰雍齒且為侯我屬無患矣漢書曰李廣以郎中令將四千騎出右北平愽望侯騫將萬騎與廣俱一道行數十里匈奴萬騎圍廣軍士皆恐廣乃使其子敢徃馳之敢從數十騎直貫敵騎出其右而還曰敵兵易與耳軍士乃安後漢書曰王郎起光武馳至下曲陽傳聞王郎兵在後從者恐及滹沱河候吏還白河水流澌澌音斯無船不可濟官屬大懼光武令霸徃視之霸恐驚衆欲且前阻水還即詭曰氷堅可渡官屬皆喜光武笑曰候吏果妄語也遂前比至河河氷亦合乃令霸䕶渡未畢數騎而氷解光武謂霸曰安吾衆得濟免者卿之力也霸謝曰此明公至徳神靈之佑雖武王白魚之應無以加此昔武王渡孟津白魚躍入王舟光武謂官屬曰王霸權以濟事殆天瑞也以為軍正晉書曰李矩守滎陽城劉聰將劉暢討矩奉牛酒詐降謀夜襲之兵士以賊衆皆有懼色矩令郭誦禱鄭子産祠曰君昔相鄭惡烏不鳴兇胡夏羯何得過庭使巫揚言東里有教當遣神兵相助將士聞之皆踴躍争進乃使誦選勇敢千人夜掩暢營獲鎧馬甚多斬首數千級暢僅以身免東里子産所居又曰劉裕討慕容超圍廣固城數月不㧞或說裕曰昔石季龍攻曹嶷瞻氣者以為澠水帶城澠音黽非可攻㧞若塞五龍口城必自陷季龍從之而嶷降慕容恪圍段龕亦如之而龕降降後無幾又震開之今舊跡猶在可塞之裕從其言於是城中男女患脚弱疾者大半時有蒼鵝飛入帳座衆咸驚愕其將胡色曰鵝者我也敵人歸我之徴衆大悅將攻城諸咸諫曰今徃亡之日兵家所忌裕曰我徃彼亡吉孰大焉乃命悉登遂克平廣固宋書曰嶺南賊盧循㓂建業太祖擊破之走至彭蠡湖乃悉力柵斷左里大軍至左里將戰太祖所執麾竿折幡沉水衆並怪懼太祖笑曰徃年霸舟之戰幡竿亦折今者復然賊必破矣即攻柵而進循兵雖殊死戰弗能禁諸軍乗勝奔之循單騎走所殺及投池水死凡萬餘人納其降附宥其逼略遣劉籓孟懐玉輕車追之循收散卒尚有數千人徑還廣州又禿髪利烏孤載記曰呂纂伐來使傉檀拒之纂士卒精銳進度三堆三軍擾懼傉檀下馬據胡牀而坐衆心乃安與纂戰敗之斬二千餘級崔鴻十六國春秋曰後趙石勒使將麻秋等伐張重華於武威重華將謝艾曰乞假臣兵七千為殿下吞之重華以艾為中堅將軍配歩騎五千擊秋引師出臨武威有梟鳥鳴於牙中艾曰梟邀也六愽得梟者勝今梟鳴牙中尅敵之兆於是進戰大破之斬首五千級又曰後燕慕容寳遣將慕容賀鱗率三萬餘人冦新市甲子晦後魏道武進軍討之太史令晁崇奏曰昔紂以甲子亡兵家忌不可出帝曰紂以甲子日亡周武不以甲子日勝乎崇無以對帝遂進軍新市賀鱗退阻𣲖水依漸洳澤以自固漸子亷切洳而據切甲戌帝臨其營戰於義臺塢大破之梁書曰庾域為華陽太守後魏軍攻圍南鄭時粮儲寡少人情恟懼恟許供切州有空倉數十所域手自封題指示將士云此中粟皆滿足支二年但努力堅守衆心以安虜退以功拜羽林監又曰楊公則随武帝大軍至新林公則自越城移屯領軍府壘北樓與南掖門相對嘗登樓望戰城中遥見麾蓋縱神鋒弩射之矢貫胡牀左右皆失色公則笑曰幾中吾脚談笑如初通典曰隋末李密據興洛倉破宇文化及還士卒皆疲倦隋將王充欲乗其弊而擊之恐衆心不一乃假託鬼神云夢見周公乃立祠於洛水上遣巫宣言公欲令今僕射討李密當有大功否則兵皆疲死充兵多楚人故妖言以惑之衆皆請戰遂破密唐書曰髙祖為山西河東撫慰大使行至太平關遇賊數千人時所將兵少左右皆懼髙祖謂之曰此烏合之賊易與耳因率騎十二人出擊之所向皆靡衆情始定世說曰魏武行役失汲道軍皆渇乃令曰前有大梅林饒子甘酸可以解渇士卒聞之口皆水出乗此得及前源三國典略曰梁蕭藻有操行以父非命而卒布衣菲食非公坐不聴音樂初為益州刺史時有焦僧䕶作亂掩據郫繁衆有數萬藻年未弱冠將自擊之乃乗平肩輿廵行賊衆流矢雨下從者舉楯以蔽藻命去之因是物情大安賊夜遁梁武常稱其小字歎曰子弟並如迦葉吾復何憂太平御覽卷二百九十五
