front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_731-1a, image: WYG0899/WYG0899-0451c.png}
body:
  text: 太平御覽卷七百三十一宋李昉等撰方術部十三相下唐書曰髙祖生長安紫氣充庭神光照室體有三乳左腋下有紫誌如龍初有善相者史良言於髙祖曰公骨法非常必為人主至於命也非所敢知久之史良復遇髙祖乃大驚曰骨法如舊年壽之相頓異昔時勿忘鄙言願深自愛髙祖心益自負又曰隋尚食奉御郭𢎞道字大寳𢎞農華陰人也性寛厚如愚而内敏仕隋歴通事舍人滄州長史煬帝時徵為奉御時髙祖為殿内少監深善之亟相往來情契愈昵𢎞道善相因言曰公天庭伏犀下接於眉此非人臣之相願深自愛髙祖取𢎞道銀盆置之於地引弓射之謂𢎞道曰倘言有驗當一發中之既發應弦而中𢎞道曰願公事驗之後賜賞金盆髙祖大悅又曰太宗年四嵗時忽有書生自言善相詣髙祖門曰公是貴人有大貴子因目太宗曰龍鳯之姿天日之表也公之貴以此兒後必由之而創功業年將二十必能濟世安民髙祖聞其言甚懼及書生辭出使人捕欲殺之以滅口而不知所在髙祖以為神陰採濟世安民之義遂以名焉又曰乙弗𢎞禮髙唐州人也隋焬帝居藩召令相已𢎞禮跪而賀曰大王骨法非常必為萬乘之主誠願誡之在德煬帝即位召天下道術人置坊以居之仍令𢎞禮統攝帝見海内漸亂𤣥象錯謬内懷憂恐嘗謂𢎞禮曰卿昔相朕其言已驗且占相道術朕頗自知卿更相朕終當奈何𢎞禮逡巡不敢荅帝迫之曰卿言與朕術不同罪當死𢎞禮曰臣本觀書相凢人之相有類於陛下者不得善終臣聞聖人不相故知凢聖不同耳自是帝嘗遣人監之不得與人交言又曰則天初在襁褓袁天綱來第中謂其母氏曰唯夫人骨法必生貴子乃召諸子令天綱相之見元慶元爽曰此二子皆保家之主官可至三品見韓國夫人曰此女亦大貴然不利其夫乳母時抱則天衣男子之服天綱曰此郎君神形奥徹不易可知試令行看於是步於牀前仍令舉目天綱大驚曰龍睛鳯頸貴人之極也更轉側視之曰若是女後當為天下之主也又曰乙弗𢎞禮善占相初泗州刺史薛大鼎隋時當坐事没為奴貞觀初與數人詣𢎞禮次至大鼎曰君奴也欲何所相咸曰何以知之𢎞禮曰觀其頭目真是賤人但不知餘處何如耳大鼎有慙色乃解衣視之𢎞禮曰看面不異前言占君自腰已下當為方岳之任其占相皆此類也貞觀末卒焉又曰袁天綱成都人也尤工相術以大業元年至洛陽時杜淹王珪韋挺就之相天綱謂淹曰公蘭臺成就學堂寛愽必得親糾察官以文藻見知謂王曰公三亭成就天地相臨從今十年以外必得五品要職謂韋曰公面似大獸之面交友極成必得大友攜接初為武職復語淹等二十年外終恐三賢同被責黜暫去即還淹尋遷侍御史武德中為天䇿府兵曹文學館學士王珪為太子中允韋挺隋末與隱太子友善後太子引以為率至武德六年俱配流嶲州淹等至益州見天綱曰袁公洛邑之言則信矣未知今日之後何如天綱曰公等骨法大勝往時終當俱受榮貴至九年被召入京共造天綱天綱謂松公曰當即得三品要職年壽非天綱所知王韋兩公在後當得三品者兼有年壽然晚途皆不稱惬韋公尤甚淹至京拜御史大夫檢校吏部尚書王珪尋授侍中出為同州刺史韋挺歴御史大夫太常卿貶授象州刺史皆如天綱之言大業末竇軌容遊德陽嘗求問天綱天綱語曰君額上伏犀貫玉枕輔角又成必於梁益州大樹功業武德初軌為益州行臺僕射引天綱深禮之天綱又謂軌曰骨法成就不異往時之言然目氣赤脈貫瞳子語則赤氣浮面如為將軍恐多殺人願深自戒慎武德九年軌坐事被徵將赴京謂天綱曰更得何官曰面上家人坐仍未見動輔角右畔光澤更有喜色至京必承恩還來此任其年果重授益州都督貞觀八年太宗聞其名召至九成宫時中書舍人岑文本令視之天綱曰舍人學堂成就眉覆過目文才振於海内頭又生角猶未大成若得三品恐是損壽之徵文本官至中書令尋卒其年侍御史張行成馬周同問天綱天綱曰馬侍御伏犀貫腦兼有玉枕文背如負物當富貴不可言近古以來君臣道合罕有如公者公面色赤命門色黯耳後骨不起耳無根只恐非夀者周復位至中書令兼吏部尚書年四十八卒謂行成曰公五岳四瀆成就下亭豐滿得官雖晚終居宰輔之地行成後至尚書右僕射天綱相人所中皆此類也申國公髙士亷嘗謂曰君更作何官天綱曰自知相命今年四月盡矣果至是月而卒又曰劉仁軌初為陳倉尉相工袁天綱謂曰君相當位隣台輔年將九十後如其言又曰張憬藏許州長社人少工相術與袁天綱齊名太子詹事蔣儼年少時常遇憬藏因問禄命憬藏曰公從今二年當得東宫掌兵之官秩未終而免職免職之後厄在三尺土下又經六年據此合是死徵然後常享富貴名位俱盛即又不合中天至六十一為蒲州刺史十月三十日午時禄絶儼後皆如其言嘗奉使往髙麗被莫離支困於地窖中經六年然後得歸及在蒲年六十一矣至期召人吏及妻子與之告别云當死俄而有勅許令致仕左僕射劉仁軌㣲時常與鄉人靖思賢各賫絹贈憬藏以問官禄憬藏謂仁軌曰公居五品要官雖暫解黜終當位極人臣仁軌後自給事中坐事令白衣海東效力固辭思賢之贈曰公當孤獨客死及仁軌為僕射思賢尚存謂人曰張憬藏相劉僕射則妙矣吾今已有三子田宅自如豈其言亦有不中也俄而三子相次而死盡貨田宅寄死於所親園内憬藏相人之妙皆類此竟不仕夀終又曰髙智周之少也與來濟郝處俊孫處約同遊寓于揚州江都人石仲覽傾産以待之嘗引相工視濟等相工曰四人皆宰相也而石氏不及焉然來早貴而末途屯躓髙晚達而最為夀耆夫速登者易顛徐進者少患天之道也仲覽貞觀末為兵部郎中卒後濟等乃貴皆如相工所言又曰金梁鳯不知何許人也天寶十三載客於河西善相人又言𤣥象時哥舒翰為節度使詔入京師裴冕為祠部郎中知河西留後左武威梁鳯謂冕曰𤣥象有變半年間有兵起郎中此時當得中丞不拜中丞即得宰相不離天子左右大富貴冕曰公乃狂言冕何至此梁鳯曰有一日向東京一日入蜀川一日來朔方此時公得相冕懼其言深謝絶之其後安禄山反南犯洛陽僣稱偽位哥舒翰東守潼闗累月奏冕為御史中丞追赴京梁鳯告曰事驗矣冕又問三日之兆梁鳯曰東京日即自磨滅蜀川日亦不能久此間日何轉分明不可說冕志之及潼關失守𤣥宗幸蜀肅宗北如靈武冕為之勸成策正改元為至德元年冕果為中書侍郎平章事冕奏之肅宗召拜都水使者梁鳯在河隴謂吕諲曰判官骨相亦合得宰相須得一大驚怖即得諲後至驛責讓驛長榜之驛吏將武性麄猛持弓矢突入射諲再發幾中諲面諲逾牆得免以報梁鳯梁鳯曰此必入相逾年諲以黄門侍郎知政事梁鳯在鳯翔李揆盧允二人同見之俱素服自稱選人梁鳯謂之曰公等並至清望官那得云無官揆允以實對梁鳯遣二人行謂揆曰公從舍人即入相一年内事謂允曰公好即是吏部郎中及克復兩京揆自中書舍人知吏部侍郎事入為中書侍郎平章事乃以允為吏部郎中其驗多此類佯聾自以晦後冕為右僕射兼御史大夫成都尹劍南節度使有進止令將行後梁鳯病卒後周史曰周𤣥豹者本鄴人少為僧其師有知人之鑑從遊十餘年苦辛無憚師知其可教遂傳其祕㫖既長還歸俗廬程寄褐嘗遊於燕與同志二人謁焉𤣥豹退謂鄉人張殷衮曰適二君子明年花發俱為故人唯彼道士他年甚貴來嵗二子果零落於趙魏間又二十年程登庸於鄴下周書曰師曠見太子晉曰汝聲清浮汝赤火色主不夀王子曰後三年上賔於帝所汝慎母謹殃將及汝師曠歸未及三年告死者至孔叢子曰魏安釐王問子順曰馬囘之為人雖少文梗梗亮直有大丈夫節也吾欲以為相可乎荅曰知臣莫若君何有不可至於亮直之節臣未明也聞諸孫卿其為人也長目而豕視者必體方而心員每以其法相人千百不失臣見囘甚疑其目王卒用之三月果以謟得罪金樓子曰宣脩容善許負之術曾正㑹登樓還語人曰太尉今年必當不濟時靜惠王尚康勝或以為不然曰行步向前氣韻殊下若其不爾不復言相至其年末靖惠王薨及昭明入朝又云必無嗣立之相俄而昭明薨荀卿子曰古者有姑布子卿今世之梁有唐舉相人也狀顔色而知其吉凶世俗稱之相形不如論心論心不如擇術形不勝心心不勝術術正而心從之則形相惡無害為君子也形相雖善而心術惡無害為小人荀子曰楚成王生太子啇臣乃召楚之善相者相之楚巫相之已而言於楚王曰子吉矣而王不吉臣聞鴟梟者食母而飛非其子之不吉但其母為之災今太子非子之不吉但其王為之災耳楚王怒而殺之論衡曰世人固有身􅇤而志立體小而名髙者於聖則否是以堯眉八采舜目重瞳禹耳參漏文王四乳然則世亦有四乳者此則駑馬一毛似􅂹耳又曰宋臣有公孫吕者長七尺面長三尺廣三寸名震天下若此之狀盖逺代而求非一世之異也使形殊於外道合其中名震天下不亦宜乎語云無憂而戚憂必及之無慶而歡樂必還之此心有先動而神有先知則色有先見也故扁鵲見桓公知其將亡申叔見巫臣知其竊妻而逃也苟子以為天不知人事邪則周公有風雷之災宋景有三次之福知人事乎則楚昭有弗禜之應荀文無延期之報由是言之則天道之與相占可知而不可知也太平御覽卷七百三十一
