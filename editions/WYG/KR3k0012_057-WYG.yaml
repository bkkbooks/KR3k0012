body:
  text: 太平御覽巻五十七宋李昉等撰地部二十二林麓原隰林説文曰平土有叢木曰林釋名曰林森也森森然也爾雅曰野外謂之林易曰即鹿無虞惟入於林中焦贛易林曰山林麓藪非人所處鳥獸無禮使我心苦詩曰肅肅兔罝施於中林﨣﨣武夫公侯腹心又曰林有樸䔩野有死鹿白茅純束又曰爰居爰處爰喪其馬于以求之于林之下又曰鴥彼晨風鬱彼北林毛萇曰先君招賢人賢人往從之駚疾如晨風之飛入于北林又曰有鶖在梁有鶴在林鄭𤣥曰鶖之性貪惡而反在梁鶴潔白而反在林也又曰厥初生民時惟姜嫄載生載育時維后稷誕寘之隘巷羊牛腓字之毛萇曰寘置也腓辟也宇慶曰鄭𤣥曰嫄置后稷羊牛之徑亦以為異也誕寘之平林㑹伐平林置之平林又為人所收也又贍彼中林甡甡其鹿鄭𤣥曰視彼中林其鹿相輩耦行甡甡然衆多今朝廷羣臣皆相欺皆不相與以善道言其鹿之不如又曰翩彼飛鴞集於泮林食我桑椹懐我好音鄭𤣥曰鶚惡鳴之鳥止於泮水之木食桑椹改其鳴歸就我善音喻人感于恩則化也禮曰草木零落然後入山林又曰林藪川澤有能取蔬食也虞教道之又曰林麓川澤以時入而不禁蔡邕月令章句曰叢木曰林受衆流注曰海周禮曰凡邦工入山而掄材不禁又曰林衡掌巡林麓禁令而平其守計以時其林麓而賞罰之鄭𤣥曰平其守者平其地各守林麓之部分又曰柞氏掌攻草木及林麓夏日至令刋陽木而火之冬日至令剝隂木而水之鄭𤣥曰刋剝也生山南為陽木生山北為陰木火之水之則使其肄不生鄭注曰竹木曰林大戴禮曰高山多林虎豹蕃孕焉深泉大川魚龍交焉左傳曰楚薳掩為司馬書土田度山林鳩藪澤牧濕皋楊方五經鈎深曰夫鳥遊曠澤之地而比翮者萬羣虎居繁林之藪而接豪者千數又曰夫霜樹落葉而鴻雁南飛桃林披華而去鳥深入家語曰芝蘭生于深林不以無人而不芳君子修道立徳不為窮困而改節史記曰殷紂厚賦税實鹿臺錢盈鉅橋粟廣沙丘苑臺大戲沙丘以酒為池懸肉為林為長夜之飲又曰稷母姜嫄見巨人跡心忻踐之而身動如孕胎期生子棄之隘巷馬牛不踐徙之林中㑹山林多人遷之渠中水上鳥以翼為覆之又曰單于秋馬肥大㑹蹛林課校人畜孟子曰斧斤以時入山林帝王世記曰桀為肉山脯林以酒為池使可運舟漢書曰草木未落斧不入於山林豺獺未祭罟網不布於埜澤又曰山林之士往而不能返朝廷之士入而不能出後漢書曰法雄為南郡太守移書屬縣曰凡虎狼之在山林猶人民之君城市張􅉷漢南記樊重家素富田至三百頃竹木成林六畜放牧桑漆魚池閉門成市魏志曰曹植上疏曰東有覆敗之軍西有殪没之將至使蜂蛤浮翔於淮泗􅀈鼬讙譁於林木臧榮緒晉書曰郄詵為雍州刺史帝於東堂餞之問詵曰卿自以為何如詵對曰臣舉賢良對䇿為天下第一猶桂林之一枝昆山之片玉世祖笑侍中奏免詵誥曰吾與之戲耳又曰華譚移前松滋令袁甫曰枯澤非應龍之泉平林非鸞鳳之窟又曰王戎少阮籍二十餘年相得如時輩遂為竹林之遊晉書曰劉伶與阮籍嵇康相遇忻然神解便攜手入林又曰嵇康以髙契難期每思郢質所與神交者唯阮籍山濤遂為竹林之遊務預其流者向秀劉伶阮咸王戎干寳晉紀曰初管輅過毌丘氏墓下倚樹哀吟精神不樂林木雖茂無形可交碑誄雖美無後可守後魏書曰魏之先居幽都也鑿石為祖宗之廟於烏洛侯國西北自後南遷其地隔逺遣其部侍郎李敞詣石室告祭天下以皇祖先妣配敞行大祭斬樺木立之以致牲體而還後所立樺木生殖成林其民益神之咸謂魏國感靈祗之應又曰太祖武帝以建國三十四年七月七日生於㕘合坡北明年有榆生于傾胞之次後遂成林又曰葬昭成皇帝於金陵營梓宫梯盡生成林顧愷之啟矇記曰汎林鼓于浪嶺註西北海有汎林或方三百里或百里皆生海中浮土上樹根隨浪鼔動山海經曰桃林方三百里在崑崙南夸父山北又曰夸父逐日影渇飲河不足道渇死其杖化為鄧林山謙之吳興記曰於潜縣北有天木山山上衆木甚美非常因名翔鳳林盛𢎞之荆州記曰宅上山頂有玉女遂營墳整固上有喬木叢生名為女貞林常有白猿栖遊哀鳴清絶又曰江陵縣東一百里有緑林山茂林蓊鬰襄陽大路經由其西所謂當陽之緑林也伍瑞體江陵記曰城西北六十里有林春秋魯文公六年楚飢戎侵其西至于阜山師火林即此城也又曰州城東北十二里有曹公林相傳云建安十三年曹闕任豫益州記曰廣平有石闕林禹闕處也地方百許里今人猶不敢居之外國圖曰桂林地多林木無平地衆猴居之無人民去九疑曰萬里龜林地險無平土衆龜居之應邵風俗通曰梅林在太山西南五六里今樹木不足義慶世說曰魏武行役失汲道三軍皆渴乃曰前有大梅林饒子甘酸可以解渴士卒聞之口皆出水乗此得及前源莊子曰孔子遊乎緇帷之林坐杏壇上弟子讀書孔子絃歌鼓琴曲未半漁父下船來國語曰唐叔射兕于徒林殪以為大甲越絶書曰麻林者越王種麻于此以為弓弦故曰麻林麓說文曰林屬於山曰麓一曰麓者山守林吏也左傳僖公十四年沙麓崩書洪範五行傳曰沙麓者山林也詩文王篇旱麓章曰瞻彼旱麓山足曰麓禮記曰林麓川澤以時入而不禁漢書曰王翁孺徙魏郡元城元城見公曰昔春秋時沙麓崩晉史卜之曰隂為雌陽為雄二火相乗後六百四十五年宜有聖女興今王翁孺徙其地日月當之翁孺生禁禁生元后漢書應劭曰麓林之大者風俗通曰尚書云堯禪舜納于大麓林屬于山者也原釋名曰元曰原如元氣廣大也書曰既修太原至于岳陽孔安國曰髙平曰原太原今以為郡又曰大野既豬東原底平孔安國曰東原至此而平言可耕也又曰若火之燎于原弗可嚮邇其猶可撲滅詩曰度其鮮原居岐之陽在渭之將萬邦之方下民之王鄭𤣥曰文王自知徳威謀居善原岐南渭水側為萬國所向作民之君又曰篤公劉于胥斯原既庶既繁而無永嘆鄭𤣥曰公劉之相此能以居民而無長嘆者也又曰鶺鴒在原兄弟急難又曰周原膴膴堇荼如飴又曰皇皇者華于彼原隰又曰漆沮之從天子之所瞻彼中原其祁孔有又曰中原有菽庶民採之又曰原隰既平泉流既清周禮曰原師辨原隰之名又曰大司徒之職辨五地之物生五曰原隰其動物宜臝物其植物宜叢物其民豐肉而庳禮曰孟夏之月天子始命野虞出行田原而勸民也又曰聖王所以順山者不使居川不使渚者居中原敝也傳曰晉侯蒐於清原作五軍以禦狄也又曰晉魏絳曰昔莘甲之為太史命百官箴王闕於虞人之箴曰在帝夷羿冒于原獸用不恢于夏家獸臣司原敢告僕夫又曰晉侯宋公齊國歸父秦小子憖次于城濮楚師背􅀈而舍晉侯患之聽輿人之誦曰原田每每舎其舊而新是謀公疑焉子犯曰戰也戰而捷必得志於諸侯若其不捷表裏山河必無害也春秋說題辭曰原端也平而有度也宋均曰度若則也公羊傳曰上平曰原穀梁傳曰中國曰大原夷狄曰大鹵國語曰温之㑹晉人執衛成公歸之于周使醫鴆之不死醫亦不誅臧文仲言於僖公曰刑大者陳之原野小者致之市朝五刑三次是無隠也今晉人鴆衛侯不死亦不誅其使者而惡之有諸侯之請必免之爾雅曰廣平曰原下濕曰隰廣平謂土寛博而平又曰可食者曰原郭璞曰可食謂種穀給食也史記封禪書曰秦文公作鄜畤靈公作吳陽上畤宣公又作宻下畤蓋三畤在此原故號三畤原臧榮緒晉書曰宣帝鎮關中諸葛亮攻郿據渭水南五丈原帝禦之對壘相持百餘日俄而亮卒唐書曰髙祖校獵于華池之萬夀原麑鹿見髙祖親御􅋃矢射而獲之郡國志曰韓馮翊有原詩曰有倬其道韓侯受命是此原也又古今地名云韓武子食菜於韓原亦秦晉戰於此地即獲杜回又秦獲晉恵侯以歸之處裴景仁符書建始五年鳳凰降滑濵社稷南原三日而去崔鴻前秦録曰丞相符雄與伯温戰白鹿原晉師敗績又曰符健攻張琚于亘秋還登石安原而歎曰美哉斯原也悵然有終焉之意又曰晉梁州刺史司馬勲率騎三萬自漢中秦川符健拒之五丈原勲敗還潘岳關中記曰周文王葬於畢長安東南有原名曰畢原又曰驪山有白鹿原周平王時白鹿出此原故名之又曰宣帝少依許氏長於杜縣樂之後葬於南原立廟于曲池文此亭曰樂遊原辛氏三秦記曰長安城北有平原數百里無山川湖水民井汲巢居井深五十丈有伯夷墓人食薇可長生或云夷叔食三年顔色如故戴延之西征記曰河東吾坂登七山原每登一原輒峭起五六里原土平廣不知其極周處風土記曰陽羨邑者蓋吳郡之名境原則平坦髙阜岡若伏龍也隰釋名曰隰蟄也蟄濕也說文曰隰坂下濕也春秋說題辭曰下濕者隰也下澤也尚書大傳曰下而平者謂之隰隰之猶言濕也詩曰淇則有岸隰則有泮毛萇曰泮陂也又曰山有扶蘇隰有荷華又山有漆隰有栗又曰山有榛隰有苓毛萇曰苓一名大苦卽今甘草又曰山有苞櫟隰有六駁鄭𤣥曰山之有撫隰之有六駁皆其所宜又曰隰桑有阿其葉有難鄭𤣥曰隰中之葉茂盛興君子不用而處也禮曰孟春之月天子祈穀于上帝善相丘陵阪險原隰土地所宜五穀所殖以教導民必躬親之又季夏行秋令則丘隰水濕禾稼不熟傳曰晉曲沃武公伐翼逐翼侯于汾隰驂絓而止夜獲之及欒共叔又曰楚薳掩為司空書曰度山林鳩藪澤牧隰臯太平御覽卷五十七
