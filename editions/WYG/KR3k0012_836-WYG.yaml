body:
  text: 太平御覽巻八百三十六宋李昉等撰資産部十六錢下貲財錢下崔鴻十六國春秋後趙録曰趙王三年得一鼎容四升中有大錢三十文曰當十當萬鼎銘十三字篆不可曉蔵之於永豐倉因此令私出行錢而民不樂乃重立禁制官錢至皆取錢釐四故不行也北史曰後魏元誕累遷齊州刺史在州貪暴大為人患有沙門為誕採藥還見誕問外消息對曰惟聞王貪願王早代誕曰齊州七萬家吾至来一家未得三斗錢何得言貪也後魏書曰王昕為汝南王恱騎兵叅軍恱數散錢於地令諸佐争拾之昕獨不拾悦又散銀錢以目昕乃取其一北史曰高恭之字道穆時用錢稍薄因表曰百姓之業錢貨為本救弊改鑄王政所先自項以来私鑄薄濫官司糺䋲挂綱非一在市銅價八十一文得銅一斤私鑄薄錢斤餘二百既示之以深利又隨之以重刑得罪者雖多奸鑄者彌衆今錢徒有五銖之文而無二銖之實薄甚榆葉上貫便破置之水上殆欲不沉此乃因循有漸科防不切朝廷兩失之彼復何罪昔漢文帝以五分錢小改鑄四銖錢至武帝復改三銖為半兩此皆以大易小以重代輕也論今據古宜改鑄大錢文載年號以記其始則一斤所成止七十六文銅價至賤五十有餘其中人工食料錫炭松砂縦復私營不能以自潤直至無利自應息止無復嚴刑廣禁也以臣測之必當錢貨䟽通公私獲允後用羊侃計鑄永安五銖錢又曰王則元象初除洛州刺史則性貪惏在州取受舊京諸象毁以鑄錢行于世時號河陽錢皆出其家後周書曰大象元年初鑄永通萬國錢以一當千與五銖大布並行北史曰隋鄭譯自隆州徴還帝令内史李徳林立作詔書復爵國公位上柱國髙熲􅃧謂曰筆乾答曰出為方岳杖策言歸不得一錢何以潤筆上大笑唐書曰武徳中置錢監於洛并益等諸州今上齊王元吉賜三鑪鑄錢右僕射裴寂一鑪敢有盗鑄者身死家口配沒又曰髙宗時詔復開元通寳錢其乾封新鑄錢令所司貯納初開元錢之文給事中歐陽詢制詞及書時稱其工其字合八分及篆隸三體其詞先上後下次左後右讀之自上及左廻環其義皆通議者云乾封不通商賈米帛翔踴以開元錢輕重大小近古最為折𠂻百姓便之又曰乾元中李輔國奏内飛龍廐鑄鐘投乾元新錢二文扵罏中而祈曰如聖躬萬福國祚無彊兇孽殄除四方寧謐則願不銷不爍一隂一陽并見於外鐘成一如所祈又曰崔衍居宣州十年頗以勤儉府庫盈溢及穆賛代衍宣州歳饉賛遂以錢四十二萬貫代百姓之税故宣州人不流散又曰元和中王鍔奏請於當管蔚州界加置鑪鑄銅錢漸廢錫錢詔河東道自用錫錢以来百姓不堪其弊其蔚州鼔鑄漸致銅錢則公私之間皆得充用宜委所司仔細計料量借錢本積漸加至五鑪又曰李希烈既平淮西節度使陳仙竒進錢一文大小如開通之狀文曰天下太平云於希烈庭中得之命宰臣召百寮遍示之後唐書曰朱守殷奏於積善坊役所得古文錢四百五十六文曰得一元寳四百四十文順天元寳一十六文守殷進納𠡠曰凡窺竒異盡繫休明所獲錢文式昭𤣥貺得一者佇歸於一統順天者式契於天心道煥一時事光千載殊休繼出信史必書宜付史舘又曰劉仁恭在幽州以墐土為錢令部人行使聚銅錢於山上鑿穴蔵之為無窮之計晉書曰右驍衛大將軍張籛始在雍州因春景舒和出遊近郊憇於大冡之上忽有黄雀啣一銅錢置之而去未㡬復於衙院晝卧見二雀相闘畢各啣一錢落於籛首後所獲三錢嘗秘於巾箱識者以為大富之徴又曰天福三年𠡠先許鑄錢仍令每一錢重二銖四黍十錢重一兩者切慮逐處闕銅難依先定銖兩宜令天下無問公私應有銅欲鑄錢者一任取便酌量輕重鑄造因兹不得入錫并鉄及令缺漏不堪久逺行用仍委鹽鐡司明行曉示誡約管子曰桓公請棧臺之錢散諸城陽鹿臺之布散諸濟隂商子曰今臣之所言民無一日之繇官無數錢之費其弱晋而强秦有過三戰之勝韓子曰或令孺子懷錢挈一甕往酤而狗齕之酒所以酸吕氏春秋曰趙宣子見翳桑之下有卧餓人不能起趙宣子命食之拜受而不食問其故曰臣有母請持以遺之宣子更賜之脯二束錢二百賈誼書曰銅刀布下不得採銅不得鑄錢則民反耕田矣鹽鐡論曰教與俗改弊與世易夏后以貝周人以紫石後世或金錢刀布極而衰終始之道也又曰古者市朝而無刀幣各以所有易所無抱布貿絲而已後世則有龜貝金錢又曰夫鑠金在鑪盗者不顧錢刀在路匹婦撥之論衡曰夫文章豈徒調弄筆為英麗哉載人𫝊行人名掦子法言曰蜀富賈人賫錢十萬願載一名子雲不聽夫富人無仁義正如圏中之鹿欄中之牛安得妄載又曰手中無錢而欲往市决貨貨主問錢何在曰無錢貨主必不與也胷中無學猶手中無錢也又曰淮陽鑄偽錢吏不能禁汲黯為太守不壞一鑪不刑一人髙枕卧淮陽政清郭子横洞㝠記曰帝升望月臺有三青鴨化為三小童皆着青絹文襦各握鯨文大錢五枚以置帝几前身止而影動因名曰輕影錢潛夫論曰諺曰牙不着身言忍之錢不出家言與之猶見朝廷而言不足憂也風俗通曰潁川黄子産每渡輒投錢於水又曰河南平隂龎儉奉魏郡鄴人遭倉卒之世失亡其父時儉三四歳在襁褓母抱流轉客居廬中鑿井得錢千餘萬遂巨富又曰錢刀俗説害中有利利旁有刀言人治下率多得錢財者必有刀劔之禍也漢書曰王莽造大錢作契刀錯刀五銖錢凡四品並行故稱錢刀也列仙傳曰祝雞翁洛人居尸鄉北山下養雞百餘年雞皆有名字千餘頭暮棲樹晝四散欲取呼名即至賣雞及子得千萬輙置錢豫章烈士傳曰施陽字季儒為舒令經江夏遇賊刼奪陽物賊去後車上有五千錢遣人追與賊聞知悉還其物陽以付亭長邴原别傳曰原字根矩避地遼東嘗行得遺錢拾以繫樹枝此錢既不見取而繫錢者多原問其故答曰謂之神樹原惡由己而成滛祀乃辯之由是里中遂歛其錢以為社也桓範世論曰靈帝置西園之邸賣爵號曰禮錢錢積如屋封塗漆書杜恕體論曰可以使鬼者錢也可以使神者誠也語林曰杜預稱王武子有馬癖和長興有錢癖竹林七賢傳曰王戎女適裴氏乏用遣女為貸錢數萬文而未還女歸戎色不悦女遽還錢乃懌干寳捜神記曰南方有蟲其形若蟬而大其子著草葉如蚕種得子以歸則母飛来就之殺其母以塗錢以其子塗貫用錢貨市旋則自還故淮南子術以之還錢名曰青鳬世説曰王武子私第近北邙山于時人多地貴濟好馬射買地作埒編錢布地竟埒時人號為金埒又曰郗公好聚歛數千子嘉賔甚不同常朝旦問訊郗家法子弟不坐因倚語移時遂及錢貨事郗公曰汝政當得錢耳一日開庫任意用郗公始止謂捐數百萬許嘉賔遂一日乞與人都盡郗公聞之大驚不能已也俗説曰王子敬學王夷甫呼錢為阿堵物後既詔出赴謝公主簿過會下與共擲散當其夕手自抱錢錢竟明日已後云何至須阿堵物葛仙翁别傳曰取十錢使人一一投井中公井上以器呼錢人見従井中一一飛出入公器中投人刻識之所呼皆得是所投者闗令内傳曰闗令尹喜周大夫也善於天文登樓四望見東極有紫氣喜曰應有聖人經過果有老子過喜設坐行弟子之禮老子時貧謂徐甲曰僱錢一百與約須逹安息國以黄金頓備錢還甲既見老子方欲逺逰疑遂不還乃作辭詣闗令就老子求直闗令以辭呈老子老子語甲曰前與女約至安息國頓以黄金相還云何不能忍耐便興辭訟乎汝隨我已三百餘歳汝命早應死頼我太𤣥生符在汝身耳言畢見符従甲口中出甲已成一聚白骨矣尹喜為請老子以符投之甲立更生喜即以見錢百萬與甲遣之汝南先賢傳曰平與閻敞字張為郡五官掾太守第五嘗被徴以俸錢三十萬寄敞敞理置堂上後嘗舉家病死唯見孤孫九歳嘗未死語云吾有錢三十萬寄掾閻敞孫長大来求敞見之悲喜取錢盡還之孫曰祖惟言三十萬今乃百三十誠不可當敞曰府君固謬言耳郎君無疑之列異傳曰西河鮮于冀建武中為清河太守言出錢六百萬作屋未成而死趙髙代之計功用錢凡二百萬後五官曹秉功曹劉啇言是冀所自取便表沒冀田宅奴婢妻子送日南俄而見冀鬼入府與啇秉等共計校定餘錢二百萬皆啇等匿冀乃表自列付啇上詔還冀田宅異苑曰桂陽臨武徐孫太元中江行見岸有錢溢出即輦着船中須臾悉變成土異苑曰剡縣陳務妻少寡與二兒為居宅中先有古塜姥母作茗先以著墳上兒患之曰枯墓何知欲掘除之母苦禁乃止夜即夢見一人自説沒世以来三百餘載謬䝉恵澤賢二子恒欲見毁相頼保䕶雖泉壤朽骨敢忘翳桑之報姥宵竊述焉明負杖晨興於外屋得錢十萬似久埋而貫皆新還吿兒兒並有慙色自是設饌幽明録曰海陵民王㝷先居家單貧嘗因大風雨散錢飛至其家来觸籬落誤落餘處拾而得之㝷後巨富錢至數千萬遂擅名扵江表三輔黄圖曰金寳一銀寳二龜寳三貝寳四布寳五泉寳六凡寳貨六種世有八品煩碎難行乃羅本寳五百枚為重十二斤百姓安之闞駰十三州志曰青州平原國和帝延平元年以封子懐王勝風俗與舊齊同然吏奸倍於民給衛士吏賦狐肉稍従假錢積至乃餘歳竟交代吏無償意衛士恨恚取狐肉沃以酒従而呪之曰狐肉狐肉尾斯尾斯身軀雖小錢多私之吏聞之恐乃償之錢盛宏之荆州記曰義熈十二年有童子羣浴南陽淯水忽岸邉有錢出如流沙因競取之手滿放地㝷復行去乃以衫衣褁縛各有所得王韶之始興記曰勞口東岸有石四方髙百餘仭其狀如䑓父老相傳此石昔有三人伐木以作橋扵石頂􅃧見數甕錢共取半甕還劉道真錢塘記曰防海水塘郡議曹華信家富乃議立此塘以防海水信始開募有致土石一斛即與錢一斗旬日之間来者雲集塘未成而諭云不復取於是載土者皆棄置而去塘以之成既遏絶潮汝一境蒙利縣遷治餘姚王莾時縣名泉亭於是改為錢塘百姓懷徳立碑塘所至今猶在地鏡圖曰錢銅之氣望之如有青雲又曰錢之為物無益飢寒之用而儲之家利其不朽古今行之盖亦由此又便交易小市之宜誠勝寸裂尺斷破為大小也過此以往無所一用軍國惟榖與帛錢雖可積未急寳也殷仲堪集太子令曰朝廷遂為吾營室顧吾不才而大興役費深用愧􅅥冬氣已應作者殊常寒苦可使監殿舍人一月賫酒肉稱勞賜之吾䝉月俸錢上生塵無所用之可以供事晉魯褒錢神論曰大矣哉錢之為體有乾坤之象其積如山其流如川動静有時行蔵有節市井便易不患耗折故親如兄弟字曰孔方失之則貧弱得之則富昌無翼而飛無足而走觧嚴毅之顔開難發之口錢多者居前錢少者居後綦母氏論錢曰黄銅中方叩頭對曰僕自西方庚辛分土諸國處處皆有長沙越雋僕之所守黄金為父白銀為母鉛為長男錫為少婦伊我初生周末時也景王尹世大鑄兹也貪人見我如病得醫飢饗太牢未之喻也成公綏錢神論曰路中紛紛行人悠悠載馳載驅唯錢是求朱衣素帶當塗之士愛我家兄皆無能已執我之手説分終始不計優劣不論能否賔客輻凑門常如市諺言錢無耳何可闇使豈虛也哉趙歧疾邪賦曰文籍雖滿腹不如一嚢錢曹植樂府歌曰巢許蔑四海啇賈争一錢鄭氏婚禮謁讃文曰金錢為質所歴長久金取和明錢用不止貲財周禮地官屬司闗曰司闗司貨賄之出入後漢書曰樊重字君雲世善農稼好貨殖重性温厚有法度三世共財子孫朝夕禮敬常若公家其經理産業物無所棄課役童隸各得其宜故能上下戮力財利歳倍管子曰倉廩實知禮節國用足則逺者来衣食足則知榮辱矣不務天時則財不生不務地利則倉不盈又曰桀有天下而用不足湯有土七十里用有餘天非獨為湯雨粟地非獨為湯出財物尸子曰農夫比粟啇賈比財烈士比義列子曰端木子貢之世也籍其先貲家累萬金放意所好生民無所不為也庖厨之下不絶烟火堂廡之上不絶聲樂行年六十乃棄其家事都散庫蔵及其死也無埋瘞之資孫卿子曰仁義禮智之於人也譬若財貨粟米之於家也多有者富少有者貧至無有者窮文子曰使信士分財不如探籌使亷士守財不如閉户羽翼美傷其骨枝葉茂害其根憂河之涸泣奚益也吕氏春秋曰白公愛財若梟之愛子梟養子長則食母白公則荆府庫不分人家語曰南宫敬叔以富得罪於定公而奔衛夫子聞之曰若其以貨䘮不若速貧之愈也䘮亡位也又曰孔子曰自季孫賜我千鍾也而交益親以賜於衆故益親自南宫敬叔之乗我以車也而道加行說苑曰安陵纏得寵於楚恭王江乙謂纏曰吾聞以財事人者財盡而交踈以色事人者華落而寵衰子安得長被幸乎鹽鐡論曰荆陽南有桂林之饒内有江湖之利左陵陽之金右蜀漢之材吳越之竹隋唐之材不可勝用江湖之魚萊黄之鮐不可勝食隴蜀丹砂毛羽荆陽皮革骨角江南柟梓竹箭燕齊魚鹽旃裘兖豫漆枲絺紵養生奉終之具也待啇而還潛夫論曰富貴人爭附之貧賤人争去之富貴而交者上有稱譽之用下有貨財之益與貧賤交者大有賑貸之費小有假貸之損故富貴易為交貧賤難得適又曰炎帝為市聚天下之貨各得其所孫綽子曰命駕而逰五都之市天下之貨畢陳矣風俗通曰陳留有富老年九十無男娶田家女為妻一交即氣絶後生得男其女曰我父死時年尊何一夕便有子争財數年不决丞相邴吉出上殿决獄云老翁兒無影亦復畏寒扵時八月取同歳小兒俱觧衣躶之老翁兒獨呼寒復令並行日中無影因以財與男又曰沛中有富豪家貲三千萬小婦子是男又早失其母其大婦女甚不賢公病困恐死後必當争財男兒判不全得因呼族人為遺令云悉以財屬女但以一劍與男年十五以付之兒後大姊不肯與劔男乃詣官訴之司空何武曰劔所以决斷也限年十五者智力足也女及婿温飽十五年幸矣議者皆服謂武原情度事得其理太平御覽巻八百三十六
