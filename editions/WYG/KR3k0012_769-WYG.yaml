body:
  text: 太平御覽卷七百六十九宋李昉等撰舟部二叙舟中方言曰舟自關而東謂之船自關而西或謂之舟方舟或謂之航又曰船首謂之閭或謂之鷁首郭璞注曰今江東貴人舟前作青雀是其象也東觀漢記曰鄧訓為䕶羗校尉縫革為船置於箄上以渡河掩擊明羗張璠漢記曰梁冀第池中船無故自覆問掾朱穆穆曰舟所以濟渡萬物不施遊戲而已今覆者天戒將軍濟渡萬民不可長念遊戲也漢宫殿疏曰武帝作大池周匝四十里名昆明池作豫章大船可載萬人船上起宮室吳記曰孫皓問中書令張尚詩言汎彼栢舟唯栢中舟乎尚曰詩云檜檝松舟亦中也皓忌其勝已因下獄晉令曰水戰飛雲船相去五十歩蒼隼船相去四十歩金船相去三十歩小兒先登飛鳥船相去五十歩晉朝雜事曰太康八年七月大雨殿前地陷方五尺深數丈中有破船晉宮閣記曰天淵池有紫宮舟升進船曜陽飛龍舟射獵舟靈芝池有鳴鶴舟指南舟舍利池有雲母舟無極舟都亭池有華潤舟常安舟崔鴻后録曰張彌帥衆一萬徙洛陽鍾簴九龍翁仲銅駞飛亷鍾一没於河募浮没三百人入河以竹絙牛頭轆轤引之乃出造萬斛舟載以渡之至於鄴穆天子傳曰天子乗鳥舟龍卒浮於大沼沼池龍下有舟字舟皆以龍鳥為形制今吳之青雀舫其遺制也山海經曰大人之國坐而削船世本曰共皷貨狄作舟共皷貨狄黄帝二臣又曰廩君名曰相姓巳氏即與樊氏瞫音審氏栢氏鄭氏凡五姓爭神以土為船雕文畫之而浮水中其船浮者神以為君他姓船不能浮獨廩君船浮因立為君蜀王本記曰秦為大白船萬艘欲攻楚呂氏春秋曰虞姁作舟又曰荆有佽飛者得寳劔渉江中流而有蛟夾繞其船佽飛㧞寳劔赴江刺蛟殺之舟中之人皆活荆王聞之位以執圭又曰楚人有渉江者其劔自舟中墜於水遽契其舟曰是吾劔所從墜也舟止從所契處入求之而舟已行劔不行若此不亦惑乎又曰伍員如吳過於荆至江上欲渉見一丈人刺小船方將漁從而請焉丈人渡之又曰管夷吾百里奚覆王之船驥也絶江者託於船致逺者託於驥淮南子曰湯武聖主也而不與越人乗舲音靈舟而浮於江湖舲舟小船也又曰楚人有乗船而遇大風者投於水非不貪生而畏死也惑於死而反忘生又曰龍船鷁首浮吹以虞此逰於水也於舟中吹􅄜與竽以為樂故曰浮吹以虞衡波傳曰孔子使子貢乆而不來孔子謂弟子占之遇鼎鼎易卦也皆言無足不來顔回掩口而笑子曰回也哂謂賜來也曰無足者乗舟而來至矣子貢果至驗如回言說苑曰梁相死惠子欲之梁渡河而遽墮水中船人救之曰子欲何之而遽也曰梁無相欲徃相之船人曰子居吾船檝之間而溺無我則死矣子何能相梁乎惠子曰居叟船檝之間則不如子至於安國家社稷子比我矇如未視狗耳又曰晋平公使叔向聘吴吴人餙舟以逆之左右各五百人有繡衣豹裘者錦衣狐裘者叔向歸以告平公吴其亡乎潜夫論曰人行之動天地譬車上御駟馬蓬中耀舟雖有覆載猶在我所之蔣子萬機論曰吳日争於五湖用舟檝而相觸怯勇共覆鈍相俱傾顧譚新言曰蓬萬生于泰山之上豫章長于窮藪之中良匠造舟興宮建廟必不取泰山之陋質而棄窮藪之美材明矣又曰奔車失轄泛舟無檝欲以不覆未之有也譙周法訓曰以道為天下者猶乗安舟而由廣路安舟難成可乆處也廣路難至可常行也又曰乗船曲折不失其瀆是善乗舟者袁准正書曰非所事而强學猶以百萬之師積之河濟之中其用舟檝固不如江漢之良杜夷幽求曰輕舟可以救溺濡幕可以濟焚抱朴子曰欲以弊藥必升騰者何異䇿蹇驢而欲尋追風櫂藍舟而欲濟大川語林曰劉道眞遭亂於河側自牽船見一老嫗採桑逆旅劉調之曰女子何不調機刺杼而採桑逆旅女答丈夫何不跨馬揮鞭而牽船乎王子年拾遺記曰周昭王二十四年塗脩國獻青鳳丹鵲各一雌一雄孟夏之時鳳鵲皆脫易毛羽聚鵲翅為扇緝鳳羽以飾車盖扇一名逰飄二名條翮三名虧光四名文影時東甌獻二美女一名延姢二名延娛使此二人更换此扇侍於王側輕風乍至冷然自􅋽昭王淪於江漢二女與乗舟夾擁同没漢水故江漢之民到今異之立祠於江湄數十年間人於江漢之上猶見王與二女乗舟檝於水際至暮春上已之日褉集於祠間或以時鮮甘味採杜蘭之葉以包裹之沉於水中或結五色紗嚢盛食或用金鐡之器並沉於波中人言蛟龍水中一裹之不侵食也其祠號曰招祗之祠又曰軒皇變乗桴以造舟楫水物為之翔踴滄海為之恬波又曰周武王東伐紂夜濟河時雲明如晝八面之旅皆薦賢而歌有大蜂􅃺如舟鳥飛集王舟因以鳥畫幡旗翌日而梟紂名其船曰蜂舟魯哀公二年鄭人擊趙簡子得其蜂旗則其遺類事出太公六韜又曰漢成帝嘗與飛燕汎戲太液池以沙棠為舟貴不沉沒也以雲母飾於鷁首一名雲母舟又刻大桐木為虬龍雕飾如真象以夾雲舟而行又曰比翼鳥多力能以喙啣南海之丹泥巢崑岑之𤣥木而止其中遇聖人則來翔集以表周公輔聖人之力也又曰漢武思李夫人之儔不可復得時始穿昆靈池泛翔禽舟帝自為曲使女伶歌之時日已西傾凉風激水女伶歌甚遒自賦葉落哀蝉之曲又曰張丞之母孫氏懐丞之時乗輕舫遊於江浦之際忽有白蛇三尺騰入舟中母呪曰若禎吉勿毒噬我乃將還置之房内一宿視之不復見蛇嗟而惜之韻集曰蠲鷁首天子船也吳越春秋曰吳王僚二年使公子光伐楚以報前來誅慶封也吳師敗而亡舟光懼困復得王舟泛而還又曰范蠡既滅呉乃乗扁舟出三江入五湖人莫知其所適郡國志曰濟州有浮山故老相傳云堯時大雨此浮水上時有人纜船於巖石間今猶有斷䥫鐀吳時外國傳曰扶南國伐木為船長者十三尋廣肘六尺頭尾似魚皆以鐡鑷露装大者載百人人有長短橈及篙音高各一從頭至尾面有五十人作或四十二人隨船大小立則用長橈坐則用短橈水淺乃用篙皆當上應聲如一杜蘭香别傳曰香降張碩碩既成婚香便去絶不來年餘碩船行忽見香乗車於山際碩不勝驚喜遥徃造香見香悲喜香亦有悅色言語頃時碩欲登其車其婢舉手折之嶷然山立碩復欲車前上車奴攘臂排之碩於是遂退續捜神記曰臨淮公荀序字休𤣥母華夫人憐愛過常年十嵗從南臨歸經青草湖時正帆風駛音史疾也序出塞郭上落水比得下帆已行數十里洪波淼漫母撫膺逺望少頃見一掘頭船漁父以檝撥船如飛載序還之云送府君還荀後位至常伯長沙相故云府君也又曰合肥口有大舶船云是曹公舶船常有漁人夜宿傍以船繫之但聞箏絃之音又音氣非常漁人又夢人驅遣去云勿近官舡此人驚覺即移船去相傳云曹公載數妓船覆於此今猶存焉異苑曰扶南國治生皆用黄金僦船東西逺近顧一觔時有不至所届欲滅金數船主便作幻誑使船底砥折􅃺欲淪滯海中進退不動衆人惶怖還請賽船合如初也又曰越嶲郡㑹無縣有元馬河中有銅船嵩陽記曰山東北五丫山上有池池有破舟云禹乗來也三春記曰俗云太一山有水神人乗船今有故漆船也劉欣期交州記曰安定縣有越王銅船潮退時有見者合浦四十里有潮又陰雨日百姓採樵見銅船出水上南州異物志曰外城人名船闕大者長二十餘丈高去水二三丈望之如閣道載六七百人物出萬斛太平御覽卷七百六十九
