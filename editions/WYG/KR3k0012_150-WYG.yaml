body:
  text: 太平御覽卷一百五十宋李昉等撰皇親部第十六諸王上諸王上漢書百官表曰諸侯王髙帝初置金璽組綬史記曰髙帝得定陶戚姬愛幸生趙王如意幾代太子者數矣賴大臣争之及留侯䇿太子得無廢髙帝崩惠帝立吕后使人鴆趙王遂斷戚夫人手足去眼燻耳飲瘖藥使居厠中名曰人彘居數日召惠帝視而知其戚夫人廼大哭因病歳餘不能起又曰燕王劉澤漢書曰澤高帝從祖昆弟高帝十一年封為營陵侯高后時齊人田生以畫干營陵侯澤澤大悦之用二百斤金為壽田生已得金假大宅令其子求事吕太后所幸大謁者張卿居數月請張卿臨酒酣屛人説張卿曰太后欲立吕産為王恐大臣不聽今卿最幸大臣所敬何不諷大臣以聞太后太后必喜諸吕已王萬户侯亦卿有卿大然之乃諷大臣立吕産為王田生因説張卿曰吕産王也諸大臣未服今營陵侯劉澤長為大將軍尚觖音决望今卿言太后裂十縣王之彼得王喜於諸吕益固矣張卿入言太后乃以澤為琅琊王又曰齊哀王襄悼惠王子高祖孫也太尉周勃誅諸吕大臣欲立齊王琅琊王澤曰齊王母家駟鈞惡戾虎而冠者張晏曰言鈞惡戾如虎而著冠者方以吕氏幾亂天下又立齊王是復為吕氏也漢書曰吳王濞高帝兄仲之子也高祖立濞於沛為吳王已拜受印高祖召濞相之曰若狀有反相因拊其背曰後五十年東南有亂豈若耶天下同姓一家汝慎無反濞頓首曰不敢又曰楚元王交髙帝少弟也高帝即帝位交與盧綰常侍上出入卧内傳語言諸内事隱謀文帝尊寵元王子爵比皇子又曰齊悼惠王肥其母高祖微時外婦也高祖六年立食七十餘城孝惠二年入朝帝與齊王燕飲太后前置齊王上坐如家人禮太后怒遣人酌兩巵鴆酒置前令齊王為壽齊王起帝亦起欲俱為壽太后恐自起反巵齊王怪之因不敢飲佯醉而去又曰濟北王興居初以東牟侯與大臣共立文帝於代邸曰誅吕氏臣無功請與太僕勝公入淸宫遂將少帝出迎皇帝入宫始誅吕氏時朱虛侯功尤大大臣許盡以趙地王朱虛侯章盡以梁地王東牟侯興居及孝文帝立聞朱虛東牟之初欲立齊王故黜其功又曰淮南王安為人好書鼔琴不喜弋獵狗馬馳騁亦欲以行隂德拊循百姓流名譽招致賔客方術之士數千人作為内書二十篇外書甚衆又有中篇八卷言神仙黄白之術張晏曰黄黄金白白銀亦二十萬言時武帝方好藝文以安屬為諸父辨博善為文辭甚尊重之每為報書及賜師古曰賜賜書帝召司馬相如等視草乃遣初安入朝獻所作内篇新出上愛秘之使為離騷傳旦受詔食時上又曰孝文皇后生景帝梁孝王孝王太后少子愛之賞賜不可勝道於是孝王築東苑方三十餘里廣睢陽城七十里大治宫室為復道自宫連屬於平臺三十餘里如淳曰平臺在大梁東北離宫所在得賜天子旌旗從千乗萬騎出稱蹕入言警擬天子招延四方豪傑自山東逰士莫不至又曰梁懷王揖文帝子也文帝愛之異於他子五年一朝因墮馬死又曰孝景栗姬生河間獻王德孝景二年立修學好古從民間得善書必為好寫與之留其真加金帛賜以招之繇是四方道術之人不遠千里或有先祖舊書多奉以奏獻王者故得書多與漢朝等脩禮樂被服儒術造次必於儒者武帝時獻王來朝獻雅樂及詔䇿問三十餘事其對推道術而言得事之中文約指明又曰江都易王非景帝子吳楚反時非年十五有材氣上書願擊吳景帝賜非將軍印吳已破二嵗為江都王治吳故國以軍功賜天子旌旗元光五年匈奴大入漢為賊非上書願擊匈奴上不許又曰孝景程姬生魯恭王餘二年立為淮陽王吳楚反破後徙王魯好治宫室苑囿狗馬好音樂口吃難言王初治室壞孔子舊宅以廣宫室聞鍾磬琴瑟之聲遂不敢復壞於其壁中得古文經傳又曰孝景賈夫人生中山靖王勝建元三年來朝天子置酒勝聞樂聲而泣帝問其故勝對曰臣聞悲者不可為累欷思者不可為歎息故高漸離擊筑易水上荆軻為之泣而不食雍門子一微吟孟嘗君為之於邑今臣之心結日乆而每聞窈𦕈之聲不知涕泣之集也夫衆喣漂山應劭曰喣吹煦聚蚊成雷朋黨執虎十夫橈椎臣身逺與寡莫為之先衆口爍金積毁銷骨叢輕折軸羽翮飛肉今臣雍閼不得間竊自悲也臣聞社鼷不灌屋鼠不燻何則所託者然也臣雖薄也得蒙肺腑位雖卑也得為東藩屬又稱兄今羣臣非有葭莩之親張晏曰葭蘆也莩葉裏白皮也鴻毛之重羣居黨議朋友相為使夫宗室擯却骨肉氷釋斯伯竒所以流離比干所以横分也勝又樂酒好内有子百二十餘人常與趙王彭祖相非曰兄為王專代吏治事王者當日聽音樂御聲色趙王亦曰中山王但奢淫不佐天子拊循百姓何以稱為藩臣又曰景帝唐姬生長沙定王發唐姬故程姬侍者景帝召程姬有所避不願進而飾侍者唐兒使夜進上醉不知幸之遂有身及生子因名曰發以母微無寵故王居卑濕貧國應劭曰景帝後二年諸王來朝有詔稱壽歌舞定王但張袖小舉手左右笑其拙上怪而問之對曰臣國小地狹不足迴旋帝以武陵零陵桂陽益焉又曰孝武李姬生燕刺盧達切王旦為人辯略博學經書及衞太子敗齊懷王又薨旦自以次第當立上書求入宿衞上怒下其使獄遂立少子為太子帝崩太子立是為孝昭帝賜諸侯王璽書旦得書不肯哭霍光秉政褒賜燕王錢三千萬益封萬三千户旦怒曰我當為帝何賜也多賫金寶走馬賂遺盖古曷反主上官桀及御史大夫桑𢎞羊等皆與交通數記疏光過失與旦令上書告之桀欲從中下其章旦聞之喜上疏是時昭帝年十四覺其有詐桀等皆伏誅旦聞之憂懣音悶置酒萬載宫會賔客臣妾坐飲王自歌曰歸空城兮狗不吠雞不鳴横術何廣廣兮蘇林曰廣音曠瓉以術為道路固知國中之無人華容夫人起舞曰髪紛紛兮寘渠骨籍籍兮亡居母求死子兮妻求死夫徊徘兩渠間兮君子獨安居坐者皆泣又曰孝武李姬生廣陵厲王胥倡樂逸逰故終不得為漢嗣始昭帝時胥見上年少無子有覬覦心迎女巫李女須使下神祝詛女須泣曰孝武帝下我左右皆伏言吾必令胥為天子胥多賜女須錢令禱巫山會昭帝崩胥曰女須良巫也殺牛塞禱及昌邑王徴復使巫祝詛之後王廢胥寖信女須等宣帝即位胥曰太子孫何以反得立復令女須祝詛如前又胥女為楚王延壽后弟婦相餽遺通私書後延壽謀反誅辭連及胥又聞漢立太子謂姬南等曰我終不得立矣居數月祝詛事發覺有司按驗天子遣廷尉大鴻臚即訊胥胥既見使者還置酒顯陽殿召太子霸及子女董訾胡生等夜飲使所幸八子郭昭君家人子趙左君皷瑟歌舞王自歌曰欲久生兮無終長不樂兮安窮奉天期兮不得須㬰千里馬兮駐待路黄泉下兮幽深人生要死何為苦心何用為樂心所喜出入無悰為樂亟蒿里召兮郭門閲死不得取代庸身自逝左右悉更涕泣奏酒至鷄鳴時罷胥謂太子霸曰上遇我厚今負之甚我死骨骸當暴幸而得𦵏薄之無厚也即以綬自絞死又曰淮陽憲王欽宣帝子好經書法律聰達有才帝甚愛之數嗟歎憲王曰真我子也又曰初楚元王敬禮申公等穆生不嗜酒元王每置酒常為穆生設醴也又曰王尊為東平相東平王以至親驕奢不奉法度傅相連坐及尊視事奉璽書至庭中王未及出受詔尊持璽書歸舍食已乃還致詔後謁見王太傅在前説相鼠之詩尊曰毋持布鼔過雷門王怒起入後宫復延請登堂尊謂王曰尊來為相人皆弔尊也以尊不容朝廷故見使相王耳天下皆言王勇王顧但負貴安能勇如尊乃勇耳王變色視尊意欲格殺之即好謂尊曰願觀相君佩刀尊舉掖顧謂傍侍郎前引佩刀視王王欲誣相拔刀向王邪王情得又雅聞尊髙名大為尊屈酌酒具食相對極歡東觀漢記曰東平獻王蒼少有孝友之質寛仁𢎞雅明帝即位詔以為驃騎將軍位在三公上四年蒼上疏願朝上以王觸寒涉道使中謁者賜乗輿豹裘蒼到洛陽使鴻臚持節郊迎引入不在讃拜之位升殿乃拜上親答拜諸王歸國上特留蒼八月飲酎畢大鴻臚奏遣蒼蒼發上親臨送流涕賞賜以億萬數又曰明帝詔書示諸國曰詔問東平王蒼處家何等最樂王對云為善最樂帝曰甚大稱是腰腹蒼美鬚髯腰帶圍八尺二寸後漢書曰北海靖王興每朝廷有異政京師雨澤秋稼好醜輒乘驛馬問焉其見親重如此又曰廣陵思王荆性刻急隱害善文法有才能中元二年世祖崩不悲哀而作飛書與東海王彊説之令舉兵為逆亂彊得荆書即其行書者封上之以親親隱其事遣荆止河南宫又曰明德后詔書流布咸稱至德王主諸室莫敢犯禁廣平鉅鹿樂成王在邸入問起居帝望見車騎鞍勒皆純墨無金銀綵飾馬踰六尺於是以白太后即賜錢各五百萬於是施親戚被服自如又曰沛獻王輔矜嚴有法度好經書善説京氏易孝經世號之曰沛王通論在國謹節終始如一稱為賢王顯宗敬重數賞賜焉又曰琅琊孝王京建武十七年追爵為王京性恭孝好經學顯宗尤加愛幸賞賜恩寵殊異莫與為比光烈皇后崩帝悉以太后遺金財寶賜京都莒好治宫室窮極伎巧皆飾以金銀上詩賦頌德帝嘉美下之史官又曰樂城靖王黨永平十五年封樂城王黨聰慧善史書如正文學字與肅宗同年尤相親愛又曰淸河王慶為太子竇后諷有司奏廢慶慶時雖幼而知避嫌畏禍言不敢及宋氏帝更憐之勑皇后令衣服與太子齊等慶小心恭孝自以廢黜尤畏事慎法每朝謁陵廟常夜分嚴裝衣冠待明約羣官屬不得與諸王車騎競驅常以貴人𦵏禮有闕每切感恨至四節伏臘輒祭於私寢竇氏誅後始使乳母於城北遥祠及竇太后崩慶求上冢致哀帝許之詔太官四時給祭慶垂涕曰生雖不獲供養終得奉祭祀私願足矣又曰李燮字德公靈帝時拜安平王相是時安平王續為張角賊所畧國家贖王還欲復其國燮奏曰續在國無政守藩不稱損辱聖朝不宜復國續竟歸藩燮以謗毁宗室輸作左校未滿歲王果坐不道被誅乃貴燮為議郎又曰董卓置𢎞農王於閣上使郎中令李儒進酖曰服此藥可以辟惡王曰我無疾是欲殺我耳乃與妻唐姬宫人飲讌别王悲歌曰天道易兮我何艱棄萬乗兮退宫藩逆臣見迫兮命不延逝將去汝兮適幽𤣥因令唐姬起舞姬抗袖而歌曰皇天崩兮后土頽身為帝王兮命天摧死生路異兮從此乖奈我㷀獨兮心中哀因泣下嗚咽王曰卿王者妃勢不復為吏民妻自愛從此長辭遂飲酖死時年十八漢名臣奏議杜業奏曰河間獻王經術通明積德累行天下推重衆儒皆歸之孝武帝時獻王朝武帝色難之謂獻王曰湯以七十里文王以百里王其勉之王知上意即縱酒聽樂因以終也漢雜事曰中元二年光武崩王莽之亂國無制度皇太子與諸王同席坐尊卑無别是時上下莫之是正太尉趙嘉乃正色横劍殿階扶下諸王以明尊卑又曰昭明太子性愛山水於田園穿築更立亭館與朝士名素高者逰其中嘗泛舟後池番禺侯軌盛稱此中宜奏女樂太子不答詠左思招隱詩云何必絲與竹山水有淸音軌慙而止魏畧曰任城王彰字子文武帝子也太子嗣立既葬遣彰之國始彰自以先王見任有功冀因此見授用而聞當隨例意甚不悦不待遣而去時以鄢陵瘠薄使治中牟及帝受禪因封為中牟王時大駕幸許昌北州諸侯上下畏其剛嚴每過中牟不敢不速又曰趙王朝幹一名良良本陳妾子良生而陳氏死太祖令王夫人養之良年五歲而太祖疾因遺令語太子言此兒三歲亡母五歲失父以累汝太子由是親視特隆於諸弟良年小常呼文帝言阿翁帝言良曰我汝兄耳愍其如是每為涕淚太平御覽卷一百五十
