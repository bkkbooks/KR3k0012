body:
  text: 太平御覧卷三百三十宋李昉等撰兵部六十一警備警備孫子曰用兵之法無恃其不來也恃吾有能以待之也無恃其不攻吾也恃吾不可攻也安則思危存則思亡常有備也左傳曰不備不虞不可以師又曰諸侯相見軍衛不徹警也又曰晋欒書伐楚將戰楚晨壓晋軍而陣壓乗其未備也軍吏患之晋將范匄趨進曰塞井夷竈陣於軍中而䟽行首䟽行有當陣前户决開疊戰道行部郎切晋楚唯天所授何患焉楚師輕窕固壘而待之三日必退退而擊之必獲勝焉終敗楚師戰國䇿曰蘇秦將合從說燕文侯曰燕地方二千里帶甲十萬車七百騎六千粟支十年南有碣石鴈門之饒北有棗栗之利又曰張儀為秦以連横説韓王曰秦帶甲百餘萬虎賁之士不勝計秦卒猶孟賁之與怯夫又曰江乙對宣王曰今王之地方五千里帶甲百萬而屬之於昭奚恤故北方之畏昭奚恤也春秋後語曰蘓秦南説楚威王曰楚天下之强國也王天下之賢主也西有黔中郡東有夏周海南有洞庭蒼梧北有汾陰地方五千里帶甲百萬車千乗騎萬疋粟支十年此霸王之資也史記曰周夫二人伐陳吳救之軍行三十里雨十日夜見星左史倚相謂荆大將子期曰雨十日甲輯兵聚吳又必至不如備之乃為陣而吳人至見荆有備而反史曰其反覆六十里其君子休小人為食我行三十里擊之必克從之遂破吳軍又曰秦將王翦率兵六十萬伐楚楚王悉國中兵以拒之王翦至堅壁而守之不肯戰楚兵數挑戰終不出王翦曰休士洗沐而善飲食拊循之親與士卒同食乆之王翦使人問軍中戲乎曰方投石超距於是王翦曰士卒可用矣楚又數挑戰而秦不出乃引而東翦因舉兵追之大破楚軍於南因滅其國又曰漢景帝時吳王濞反初吳王之渡淮與楚王遂西敗棘壁乘勝前鋭甚梁孝王恐大將軍擊吳又敗梁將士卒皆還走梁數使使報漢大將周亞夫求救亞夫不許又使使惡亞夫於上上使人告之救梁惡禹路反亞夫復守便宜不行梁使韓安國及楚死事相弟張羽為將軍楚相張尚諫呉王而死乃得頗敗呉兵呉兵欲西梁城守堅不敢西即走亞夫軍㑹下邑師欲戰亞夫壁不肯戰呉糧絶卒飢數挑戰遂夜奔亞夫壁亞夫終不出中夜驚内相擾亂至帳下亞夫卧不起湏㬰纔定吳士卒多飢死遂以叛散漢書曰傅喜以光禄大夫養病大司空何武尚書唐林皆上書言喜行義曰忠臣社稷之衞魯以季友治亂師古曰季氏亡則魯不昌楚以子玉輕重師古曰謂楚殺子玉而晋侯喜可知也魏以無忌為折衝師古曰信陵君也項以范増為存亡故楚跨有南土帶甲百萬隣國不以為難子玉為將則文公側席而坐及其死也君臣相慶百萬之衆不如一賢也後漢書曰更始初光武在河北擊銅馬賊於鄔吳漢將突騎來㑹清陽城賊挑戰光武堅營自守有出鹵掠者輙擊取之鹵與虜同掠奪取之也絶其粮道積月餘日賊食盡夜遁去追至館陶大破之受降未盡而髙湖重連賊從東南來與銅馬餘衆合光武復與大戰於蒲陽悉破降也又曰王霸馬武既破周建蘇茂營賊復聚挑戰霸堅卧不出軍吏皆曰茂前日已破今易擊也霸曰不然蘇茂客兵逺來粮食不足故數挑戰以徼一切之勝今閉營休士所謂不戰而屈人之兵善之善者也茂建既不得戰乃引還營建兄子誦反閉城拒之茂建遁去誦以城降又曰公孫瓉既為鮮于輔所敗慮有罪乃告於髙京以鐵為門斥去左右男人七嵗以上不得入門專侍姬妾其文簿書皆及而上之令婦人習為大言聲使聞數百歩以傳宣敎令䟽逺賔客無所親信故謀臣猛將稍有乖散自此之後希復攻戰九州春秋曰公孫瓉曰始天下兵起我謂唾掌而決至於今日兵革方始視此非我所決不如休兵力耕以救凶年兵法百樓不攻今吾諸營樓数里鹵即魯字見説文什目擄畧也上無覆屋也積榖三百萬斛食此足以待天下慶也魏志曰冀州牧韓馥長史耿武别駕閻純治中李厯諫馥曰冀州雖鄙帶甲百萬榖支十年又曰大軍南征吳到積湖大將漢寵帥諸軍在前與賊隔木相對令諸將曰今夕風甚猛賊必來燒營宜為之備諸軍皆驚夜半賊果遣十部來燒營寵掩擊破之又曰吳將諸葛恪圍新城司馬景王使鎮東將軍毋丘儉揚州刺史文欽等拒之儉欽請戰景王曰恪卷甲深入投兵死地其鋒未易當且新城小而固攻之未可㧞遂命諸將髙壘以弊之相持數月恪攻城力屈死傷大半景王乃令欽督鋭卒趣合偷斷要其歸路儉帥軍以為後繼恪懼而遁欽逆擊大破之斬首萬餘級吳書曰趙咨字徳度南陽人愽學多智應對辨㨗孫權為吳王擢為大中大夫使魏文帝嘲咨曰吳王頗知學乎咨曰浮江萬艘帶甲百萬任賢使能志在經畧雖有餘閒愽覧書傳渉厯史籍採竒異不效書生尋章摘句而已又曰吳難魏否咨曰帶甲百萬江漢為池何難之有蜀志曰先主率大衆東伐吳吳將陸遜拒之蜀主從建平連圍至夷陵界立數十屯以金帛爵賞誘動諸夷先遣將吳班以數千人於平地立營欲以挑戰諸將皆欲擊之遜曰𤣥徳軍東下鋭氣始盛且乗髙阻守險難可卒攻攻之縱下猶難盡克若有不利損我大勢非小故也今但奬勵將士廣施方畧以觀其變若此間是平原曠野當恐有猋沛交馳之憂猋音標今縁山行軍勢不得展自當疲於木石之間徐制其弊𤣥徳知其計不行乃伏兵八千人從谷口中出遜曰所以不聽諸君擊班者揣之必有巧故也諸將並曰攻彼當在初今乃令人五六百里相御持守又已經七八月其諸要害皆已固守擊之必無利矣遜曰𤣥徳猾虜更嘗事多其軍始集思慮精專未可干也今住已乆不得我便兵疲意沮計不復生犄角此冦正在今日乃先攻一營不利遜曰吾已曉破之術乃令人各持一把茅以火攻㧞俄而成勢遂率諸軍同時俱攻破四十餘營𤣥徳升馬鞍山陳兵自繞遜督促諸軍四面蹙之土崩瓦解死者萬數𤣥徳夜遁晉書曰王戎謂齊王冏曰公首舉衆臣定大業開闢以來未始有也然論功行賞不及有勞朝野失望人懐二志今二王帶甲百萬其鋒不可當若以王就第不失故位此求安之計也又曰大將羅尚遣廣漢都尉曽元牙門張顯等潜率歩騎三萬襲蜀賊李特素知之乃繕甲勵兵戒嚴以待之元等至特安卧不起待其衆半入發伏擊之殺傷者甚衆遂害曽元張顯等又曰安平王孚初為魏度支尚書以為禽敵制勝宜有備預每諸葛亮入冦關中邊兵不能制敵中軍奔赴輙不及事機宜預選歩騎二萬以為二部為賊之備又以關中連賊冦榖帛不足遣冀州農民五千屯於上邽秋冬習戰春夏脩田桑由是關中軍國有備矣崔鴻十六國春秋曰前趙劉曜遣將討𤣥羗大酋權渠率衆保險阻曜將游子遠頻敗之權渠欲降其子伊餘大言於衆中往日劉曜自來猶無若我何况此偏師自欲降乎遂率勁卒五萬人晨壓子逺壘門左右勸出戰逺曰吾聞伊餘有專諸之勇慶忌之㨗士馬之强人百匪敵其父新敗怒氣甚盛且西戎勁悍其鋒不可近也不如緩之使氣竭而擊之此曹劌之勝也乃堅壁不戰伊餘有彊驕色子逺候其無備夜分誓衆秣馬蓐食先晨具甲掃壘而出遲明設覆而戰遲直吏切生擒伊餘于陣盡俘其衆又曰北燕馮䟦據遼東其弟萬泥阻兵以叛䟦遣將馮𢎞與將軍張興討之𢎞遣使諭之曰昔者兄弟乗風雲之運撫翼而起羣公天意所鍾逼奉主上先踐寳位製土䟽爵當與兄弟共之奈何欲尋干戈於蕭墻棄友于而為閼伯過貴能改善莫大焉宜舎茲嫌同奬王室萬泥不從剋日出戰興謂𢎞曰賊明日出戰今夜必來驚營宜備不虞𢎞乃各嚴備仍人課草十束束火伏兵以待之是夜萬泥果遣壯士十餘人斫營衆火俱起伏兵邀擊俘斬無遺遂平萬泥等宋書曰桂陽王休範舉兵於尋陽已發東下朝廷惶駭宋相齊髙祖議曰昔上流謀逆皆因淹緩至於覆敗休範必逺懲前失輕兵急下乗我無備今應變之術不宜在逺若偏師失律則大沮衆心頓新亭堅守宫掖東府石頭以待賊至千里孤軍無復委積求戰不得自然瓦解請頓新亭以當鋒休範果敗又髙祖紀曰時議者欲分兵屯守諸津帝曰賊衆我寡分兵測人虛實一處失利則沮三軍之心若聚衆石頭則力不分也三國典畧曰梁武六王蕭紀在蜀一十七年開拓土宇噐甲殷積有馬八千疋既便騎射尤工舞弰後魏書曰任城王澄時四中郎將兵數寡弱不足以襟帶京師澄奏宜以東中帶營陽郡南中帶魯陽郡西中帶𢎞農郡北中帶河内郡選二品三品親賢兼稱者居之省非急之作配以強兵如此則深根固本強榦弱枝之義也靈太后初將從之後議者不得乃止唐書曰武徳中太宗領兵征仁杲於析摭城析音昔思厯切摭音炙之石切賊有十餘萬兵鋒甚鋭數來挑戰諸将咸請戰太宗曰我士卒新經挫衂鋭氣猶少賊驟勝必輕進好鬭我且閉壁以待其氣衰而後擊可一戰而破此萬全計也因令軍中曰敢言戰者斬相持者乆之賊粮盡軍中頗擕其將翟長孫梁胡郎率所部相繼來降太宗知仁杲心腹内離謂諸將曰可以戰矣因令行軍梁實營於淺水原以誘之賊大將宗羅侯日恃驍悍求戰不得氣憤者乆之及是盡鋭攻梁實冀逞其志梁實固險下以挫其鋒羅侯攻之愈急太宗度賊已疲復謂諸將曰彼氣將衰吾當取之必矣申令諸軍遲明合戰令將軍王寵陣淺水原南出賊之右以先拒之羅侯併軍共戰王軍幾敗太宗親御大軍奄自原北出其不意羅侯廽師相拒我師表裏齊奮呼聲動天羅侯氣奪於是大潰又曰武徳中太宗率師往河東討劉武周江夏王道宗時年十七從軍太宗登玉璧城望賊顧謂道宗曰賊恃其衆來邀我戰汝謂何如對曰羣軍鋒不可當易以計屈難與力競今深壁髙壘以挫其鋒烏合之徒莫能持乆粮運致竭自當離散可不戰而擒矣太宗曰汝意暗與我合賊果食盡夜遁追及介州一戰破之又曰薛萬均從李靖等擊􅁟谷渾軍次青海與弟萬徹率軍先路道遇虜於赤海萬均將十數騎擊走之追奔至積石山南道大風折旗㧞木萬均謂左右曰虜將至矣宜各設備俄而虜至萬均直前斬一賊將於是大潰殺傷畧盡又曰廣徳中安史故將分據河北吐蕃數犯京畿故郭子儀魚朝恩常統重兵守河中以備倉卒欲兵權在京師乃以魚朝恩元載王縉建議請於河中府創置中都置精兵五萬以為禁旅取關輔河東等十州税物以奉京師車駕常以秋杪行幸春首還京即河北西蕃無憂越軼代宗以為然載已潜遣人於河中料度創造宫殿及營私第既而言事者以為無故示賊以怯國計非便事竟不行又曰李晟討朱泚徳宗幸奉天詔以晟為左僕射平章事晟拜哭受命且曰長安宗廟所在為天下本若皆扈蹕誰復守京師乃浚隍壁繕兵粟馬以誅朱泚興復為己任初軍無芻藳乃令檢校户部郎中張彧假京兆少尹擇官吏以賦渭北畿縣不數日芻粮皆足乃勵説三軍曰今國歩多艱亂逆繼興屬車西幸關中無主吾等皆受國恩見危死節臣子之分况當此時不能清冦以取富貴非士也渭橋跨大川吾與公等戮力一心擇利而進復大業建不世之功能從我乎軍士皆泣下曰唯公所命晟亦歔欷流涕是時朱泚盗天邑懐光反咸陽河北偽稱國者三李納交逼陳宋晟内無貨財外無疆土以孤軍守危城為秉節嚮義者所歸於是戴休顔舉奉天之兵韓逰環悉邠寧之師尚可孤守藍田駱元光固華州皆歸欵於是晟軍大振又曰李元諒貞元初將本軍與侍中渾瑊㑹吐蕃盟於平源元諒謂瑊曰戎狄多詐不可無備公奉國命輕重宜有以防之瑊不從且不設備及㑹元諒命軍中皆衣甲持兵整部隊以候變去壇十里虜果衷甲乗瑊無備伏精騎以圍城士大夫皆衣朝服就執及軍士死者不可勝數所脱者百無一二瑊挺身走虜騎逐瑊至元諒軍士皆堅陣持滿虜騎望見之乃引去是日無元諒軍瑊幾不免元諒除盗必殺無赦戎冦甚憚之又曰元和中城臨涇源從涇源節度使叚祐之請也臨涇城直涇州西北九十里實險要之鎮從前因循不修常為犬戎所堡其界有青石嶺嶺多美土軍人耕穫屢為蕃冦掠奪祐請修築議者是非相半祐决城之功畢時方以為大利三國典畧曰齊司徒斛律光築吞周于隴定跨三城於境上太平御覧卷三百三十
