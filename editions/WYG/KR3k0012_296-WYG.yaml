body:
  text: 太平御覽卷二百九十六宋李昉等撰兵部二十七法令法令孫子曰法者曲制官道主用也曲制者部曲幡幟金鼔之制也官者百官之分用也道者粮路也主用者主軍費用卒未親附而罰之則不服不服則難用也卒已親附而罰不行者則不可用也故合之以文齊之以武是謂必取令素行以教其人也令素行則人服令素不行則人不服令素行人服者與衆相得也厚而不能使愛而不能令亂而不能理譬如驕子不可用也左傳曰晉侯之弟揚干亂行於曲梁行軍次也魏絳戮其僕僕御也晉侯怒謂羊舌赤曰合諸侯以為榮也揚干為戮何辱如之必殺魏絳無失也赤對曰絳無二志事君不避難有罪不避刑其將來辭何辱命焉言終魏絳至授僕人書僕晉侯御僕也將伏劔士魴張老止之公讀其書曰日君乏使使臣斯司馬臣聞師衆以順為武順莫敢違軍事有死無犯為敬守官行法守死不敢有失君合諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及揚干無所逃罪懼自犯不武不敬不能致訓至於用鉞用鉞斬揚干之僕臣之罪重敢有不從以怒君心言不敢不從戮也請歸死於司冦致死於司冦使戮也公跣而出曰寡人之言親愛也吾子之討軍禮也寡人有弟弗能致訓使干大命寡人之過也子無重寡人之過聴使死為重過敢以為請請使無死晉侯以魏絳為能以刑佐民矣反役與之禮食使佐新軍今欲顯絳故特為設禮食史記曰齊景公時晉伐阿鄄阿今濟陽郡東阿縣鄄音絹今濮陽郡鄄城縣而燕侵河上齊師敗績嬰乃薦司馬穰苴文能附衆武能威敵齊景公召穰苴與語兵事大說之以為將軍將兵扞燕晉之師穰苴曰臣素卑賤君擢之閭伍之中加之大夫之上士卒未附百姓弗信人㣲權輕願得君之寵臣國之所尊者以監軍乃可於是景公許之使莊賈徃穰苴既辭與賈約曰旦日日中㑹於軍門穰苴先馳至軍立表下漏待賈賈素驕貴不甚急親戚送之畱飲日中而賈不至苴仆表决漏入行軍勒兵申明約束約束既定夕時而賈至穰苴曰何後期為賈謝曰不佞大夫親戚送之故畱止苴曰將受命之日則忘其家臨軍約束則忘其親援桴鼔之急則忘其身今敵國深侵邦内騷動士卒暴露於境君不安席百姓之命皆懸於君何謂相送乎召軍正問曰軍法後期者云何對曰當斬遂斬莊賈以徇三軍三軍之士皆震慄晉師聞之為罷去燕師聞之度水而解又孫武以兵法見於吳王闔閭闔閭曰子之十三篇吾盡觀之可以小試勒兵乎對曰可闔閭曰可試以婦人乎曰可於是許之出宮中美人得百八十人孫子分為二隊以王之寵姬二人為隊長皆令持㦸令曰汝知爾心與左右手背乎婦人曰知之武曰前則視心左視左手右視右手後即視背婦人曰諾約束既畢乃設鐵鉞即三令五申之於是鼔之右婦人大笑武曰約束不明申令不熟將之罪也復三令五申而鼔之左婦人復大笑孫子曰約束不明申令不熟將之罪也既已明而不如法者吏士之罪也乃欲斬左右隊長吳王從臺上觀見且斬愛姬大駭趣使使下令曰寡人已知將軍能用兵矣寡人非此二姬食不甘味願勿斬也武曰臣已受命為將將在軍君命有所不受遂斬隊長二人以徇用其次為隊長於是復鼔之婦人左右前後跪起皆中規矩繩墨無敢出聲者於是武使使報王曰兵已整王可試下觀之惟王所欲用之雖赴水火無不可也王曰將軍請就舎寡人不願下觀武曰王徒好其言不能用其實於是闔閭知孫子能用兵卒以為將西破强楚入郢北威齊晉又文帝後六年匈奴大入邊乃以宗正劉禮為將軍軍霸上祝滋侯徐厲為將軍軍棘門以河内守周亞夫為將軍軍細栁以備胡上自勞軍直馳入將以下騎送迎已而之細桞軍士吏卒被甲銳兵刄彀弓弩持滿天子先驅不得入先驅曰天子且至軍門都尉曰軍中但聞將軍令不聞天子詔居無何上至又不得入於是上乃使持莭詔將軍吾欲入勞軍亞夫乃傳言開壁門士卒謂從車騎曰將軍約束軍中不得驅馳於是天子乃按轡徐行至軍中營將軍亞夫持兵揖曰介胄之士不拜請以軍禮見應劭曰禮介者不拜天子為動容軾車使人稱皇帝敬勞將軍成禮而去既出軍門羣臣皆驚文帝曰嗟乎此真將軍矣曩者霸上棘門軍若兒戲耳其將固可襲而虜也至於亞夫何得而犯耶稱善者乆之後漢書曰祭遵從征河北為軍市令舍中兒犯法遵格殺之光武怒命收遵主簿陳副諫曰明公常欲衆軍整齊今遵奉法不避是教令所行也光武乃貰之貰猶赦也以為刺姦將軍謂諸將曰當避祭遵吾舎中兒犯法尚殺之必不私諸卿也謝承後漢書曰張温以司空加車騎將軍征韓遂丙辰引温見於崇徳殿温以軍禮長揖不拜魏志曰曹仁字子孝少時不修行檢及長為將嚴整奉法常置科於左右案以從事吳志曰呂蒙圖雲長到南郡入城盡得將士家屬蒙撫慰約令軍中不得干厯人家有所求取蒙麾下士是汝南人取民家一笠以覆官鎧鎧雖公物蒙猶以為犯軍令不可以鄉里故廢法垂涕斬之晉書李特載記曰益州刺史趙厥以李庠為威冦將軍使征北道庠素東羌良將曉軍法不用麾幟舉手為行伍斬部下不用命者三人部陣肅然蕭子顯齊書曰李安民為徐州城局參軍王廻素為安民所親盗絹二疋安民流涕於門斬之厚為殮祭軍府皆震服焉北史曰後魏孝文車駕南征以宋弁為司徒東道副將軍人有盗馬靽者斬而徇於是三軍震懼莫敢犯法又後魏安定王休車駕南伐領大司馬孝文親行諸軍遇休以三盗人徇六軍將斬之有詔赦之休執曰不斬何以息盗詔曰王者之體亦有非常之澤雖違軍法可特原之休乃奉詔帝謂司徒馮誕曰大司馬嚴而執法諸軍不可不慎於是六軍肅然唐書曰闞稜容貌魁岸勇而多力毎臨陣手持大刀長一丈一舉輙斃數人前無當者及杜伏威據有江淮之地兵皆出自羣賊類多放縱有相侵奪者稜必殺之雖親故無所捨令行禁止路不拾遺後從伏威入朝拜左領軍將軍輔公祐之反也稜從軍討之及與陳正通相遇方接戰稜脫兠鍪謂賊衆曰汝不識我邪何敢來戰其衆多稜舊之所部由是各無鬭志或有遥拜者賊師遂潰又竇軌物入蜀將其甥從軍以為心腹嘗夜出呼之不以時至因斬之將吏重足而立見之者莫不股慄又哥舒翰好讀左氏春秋及漢書疎財重氣士多歸之河西節度王忠嗣以為大計軍副使安思順為大使翰常怏怏不能下之忠嗣遂使翰别為將討吐蕃于新城以同戴副使為副副使不為翰用頗沮之翰怒甚脫甲撾殺之投尸於坑中軍中股慄又馬燧討李懐光於河中帥歩騎三萬次於絳乃分兵收下縣略稷山㧞龍門降其將馮萬興任象王燧以兵圍攻絳州㧞其外城其夜偽刺史王尅同與大將達奚小進棄城走降其衆四千人又遣大將李自良谷秀分兵略定聞喜夏縣萬泉虞鄉永樂猗氏六縣降其將辛兟音詵及兵五千人谷秀以犯令擄士女斬之以徇又徳宗幸奉天詔以李晟為神䇿行營節度使晟軍令嚴肅所過樵採無犯自河中至蒲津而軍渭北進據東渭橋以逼朱泚時劉徳信將神䇿兵救襄城敗於扈澗聞難率餘軍前次渭南與晟合軍軍無統一晟不能制徳信因至晟軍晟乃斬之復以數騎入徳信軍中撫勞軍士無敢動者晟既并徳信軍軍益振又李晟收復都城朱泚乃與妻子及姚令言張芝等數千騎西走涇源餘兵靡散晟乃入據丹鳳門舍軍於外朝晟處於右金吾伏舎下令曰軍中五日不得通家問違者斬之遣京兆尹李齊運告諭於衆百姓安堵秋毫無犯晟大將髙明曜擄賊女妓一人司馬伷音胄取賊馬二匹晟立斬之軍士皆脅息莫敢仰視翌日晟以露布聞上覽之感泣百官皆出涕因上夀稱萬嵗曰李晟䖍奉聖謨盪滌凶慝然古之樹勲力復都邑者徃徃有之至於不驚宗廟不易市肆長安人不識旗鼔安堵如初三代以來未之有也上笑曰天生李晟為社稷萬民不為朕也百官再拜而退又永貞元年冬劉闢阻兵朝議討伐宰臣杜黄裳以為獨任髙崇文可以成功元和元年拜檢校工部尚書兼御史大夫充左神䇿行營節度使兼統左右神䇿奉天鱗遊諸鎮兵討闢時宿將專征者甚衆人人自謂當選及詔出大驚崇文在常武練卒五千常若冦至及是中使至常武夘時宣命而辰時出師五千噐用無缺者軍至興元軍中有折逆旅之匕箸者斬之以狥從閬中入遂却劔門之師觧梓潼之圍又髙崇文平劉闢王師入城介士屯於大造軍令嚴肅珍貨山積市井不移秋毫無犯又郗士美為招義節度使朝廷討王承宗士美遣兵馬使王獻領卒一萬為前鋒獻凶惡恃亂逗撓不進遽令召至數其罪斬之下令曰敢後出者斬士美親鼓之兵既合而賊軍大敗下三營還柏鄉屢以捷聞上大悦曰固知士美之能辦吾事於時四面七八鎮兵共十餘萬以環鎮冀未有首功多犯法士美兵勇敢畏法聲甚震承宗大懼指期有破亡之勢㑹詔班師至今兩河間稱之又李師道攻徐徐將王智興敗賊壁獲美妾智興懼軍士争之乃曰軍中有女子安得不敗此雖無罪違軍法也即斬之以狥韓子曰吳起為魏侯西河之守奏有小亭臨境吳起欲攻之乃倚車轅於北門外而令之曰有能徙此南門之外賜之上田上宅民莫之徙也或有徙之者遂賜之如令俄又置一石委之於東門之外而令之曰有能徙之於西門之外者賜之如初民則争徙之乃下令曰明日攻亭有能先登者賜之國大夫賜之上田上宅民争上於是攻亭一朝平之尉繚子曰古之善用兵者能殺卒之半其次殺其十三其下殺其十一殺其半者威立海内殺其十三者力加諸侯其十一者令行士卒故曰百萬之衆不鬭不如萬人之尸萬人之死不如百人之賊賞明如日月信行如四時令嚴如斧鉞卒有不死者未嘗聞也六韜曰武王問將何為威太公曰殺一人萬人懼者宜殺之殺一人三軍不知雖多殺其將不重也淮南子曰勾踐决一獄不辜投龍淵而切其股血流至足故戰武士必死魏武軍令曰兵欲作陣對敵當先整伍乃引兵就長而陣皆無諠譁明聽鼔音旗旛麾前則前麾後則後麾左則左麾右則右不聞令而擅前後左右者斬伍中有不進者伍長殺之伍長不進什長殺之什長不進部下殺之督戰部曲將㧞刄在後察違令不進者斬之一部受敵餘部有不進救者斬之武侯兵法曰軍有七禁一曰輕二曰慢三曰盗四曰欺五曰背六曰亂七曰誤此治軍之禁也若期㑹不到聞鼔不行乗寛自畱廻避務止初近而後逺喚名而不應軍甲不具兵噐不備此謂輕軍有此者斬之受命不傳傳之不審以惑吏士金鼔不聞旌旗不覩此謂慢軍有此者斬之食不廩糧軍不部兵予賜不均阿私所親取非其物借貸不還奪人首級以獲功名此謂盗軍有此者斬之變易姓名衣服不鮮金鼔不具兵刄不利噐仗不堅矢不着羽弓弩無絃主者吏士法令不從此謂欺軍有此者斬之聞鼔不行鳴金不止按旗不伏舉旗不起指麾不隨避前在後縱發亂行折兵弩之勢却退不鬭或左或右扶傷舉死因託歸還此謂背軍有此者斬之出軍行將士卒争先紛紛擾擾軍騎相連咽塞道路後不得前呼喚諠譁無所聽聞失行亂次兵刄中傷長將不理上下縱横此謂亂軍有此者斬之屯營所止問其鄉里親近相隨共食相保呼召不得越入他位干誤次第不可呵止度營出入不由門户奸邪所起知者不告罪同一等合人飲酒阿私所受大言驚語疑惑吏士此謂誤軍有此者斬之衛公兵法曰古之善為將者必能十卒而殺其三次者十殺其一三日威振於敵國一日令行於三軍是知畏我者不畏敵畏敵者不畏將盡忠一時輕生重節者雖讐必賞犯法怠惰敗事貪財者雖親必罰伏罪輸情質直敦素者雖重必捨遊辭巧飾虛偽狡詐者雖輕必戮善無㣲而不賞惡無纎而不貶斯乃勵衆勸功之要術也昔馬謖兵敗孔眀對泣而誅鄉人盗笠呂蒙流涕而斬馬逸踐麥曹操割髪而自刑兩椽辭屈黄蓋詰問而俱戮故知威克其愛雖少必濟如愛勝其威雖多必敗蓋賞罰不在重在必行不在數在必當尉繚子曰吳起與秦人戰陳尚未合有一夫不勝勇怒而前獲首級而返吳起斬之吏曰此壯士也不可斬吳子曰雖壯士不從令必斬之又褰旗斬將䧟陣摧鋒上賞破敵所得資物僕馬等並給戰士毎收陣之後禆將虞候輩収歛付總管均分之與敵鬭旗頭被傷救得者重賞漏泄軍情斬之背軍逃走者斬之後期者斬之有故不坐行列不齊旌旗不整金革不鳴斬之與賊私交通斬之言語書疏並同或說道釋祈禱鬼神隂陽卜筮灾祥訛言以動衆心并與其人徃還言議斬之無故驚軍呌呼奔走謬言烟塵斬之凡令覘候或更相推托謬說事宜兼復漏泄者斬之吏士所經厯侵掠者斬之奸人妻女及將婦女入營者斬之不戰而降敵没其家凡有私讐須先言令其避仇若不言因戰陣報復者斬之佈陣旗亂吏士驚惶罪在旗頭斬之陣定或輒進退或對敵亂行者前後左右所平之行便斬之或有弓弩已注矢而廻顧者或干行失位者後行斬之前行不動行斬于失之行守圍不固一火及主吏並斬之遇敵攻圍危急若前後左右部隊不救至䧟者全部隊皆斬之為敵所乗失旗鼓節鉞者全隊斬之陣之旗頭被敵殺争得屍首免坐不得者一旗並斬之凡戰敵失主將隨從者皆斬之一將遇敵禆將之下等差率不齊力同戰更相救助者任便斬之吏士雖破敵濫行殺戮發塜焚廬踐稼穡伐樹木者斬之擒獲敵人或有來降者直令見總帥不得輒詢問敵中之事若因違而以漏泄者斬之破敵先擄掠者斬之入敵境同凡隱欺破虜所収獲及吏士身死有欺隱其資物兼違令不収恤者斬之違總帥一時之令者斬之太平御覽卷二百九十六
