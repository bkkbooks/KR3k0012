body:
  text: 太平御覽卷九百九十四宋李昉等撰百卉部一草薜荔石蘭胡䋲覇薫楚薰楚蘅秦蘅龍鬢狼尾燕麥荆葵蜀葵莵葵鳬茈鳥韭鹿豆鹿葱草爾雅曰卉草也草謂之華木謂之榮不榮而實者謂之秀榮而不實者謂之英尚書禹貢曰兖州厥草惟繇繇茂也徐州草木漸包漸進也包叢生也楊州厥草惟夭少䘮曰夭毛詩鄭風野有蔓草曰野有蔓草零露漙兮蔓延也漙􅄎然盛多也毛詩問答曰國多共役男女怨曠於是女感傷而思男故出逰於洧之外託采芬香之草而為媱妷之行時草始生而云蔓者女情急欲以促時也周禮秋官下薙氏曰薙氏掌殺草春始生而萌之夏日至而夷之秋䋲而芟之冬日至而耜之鄭𤣥曰令實曰䋲也大戴禮曰孟春氷泮百草權輿禮記月令曰孟夏之月靡草死鄭元曰舊說靡薺葶歴之屬季夏之月大雨時行燒薙行水利以殺草薙廹地芟草也薙草乾燒之至此雨水畜水其中則草死不生也又曰霜䧏之日草木黄落又檀弓上曰曽子朋友之墓有宿草而不哭焉左傳曰松栢之下其草不殖又曰一薫一蕕十年尚猶有臭蕕臭草薫香草也春秋潭潜巴曰下不兼蜚亷之草為不生言瑞應之物應有上也論語曰君子之徳風小人之徳草草上之風必偃漢書五行志曰元帝永光二年天雨草葉相糺結如彈丸續漢書五行志曰靈帝中平元年夏東郡陳留濟陽長垣濟隂諸縣界有草生莖大如手指狀似鳩爵龍虵鳥獸之形五色各如其物毛相類目足趐皆具又曰西夜國生獨白草煎以為藥傅箭所射輙死崔鴻十六國春秋西秦録曰永和二年國中地震百草皆自及晉書載記曰符堅至壽春與苻融登城而望王師見部陣齊整將士精鋭又北望八公山上草木皆類人形頋謂融曰比亦勍敵也何謂少乎憮然有懼色後周書曰宇文深字奴干性鯁正有器局年數嵗便累石為營伍并折草作旌旗布置行列皆有軍陣之勢父永遇見之乃大喜曰汝自然知此於後必為名將又曰岩昌羗俗無文字但候草榮落以記嵗時吕氏春秋曰草有華有藟獨食之則殺人合而食之則益壽淮南子曰神農始嘗百草一日七十毒又曰迨至衰世草木之勾萌衘華佩實而死者不可勝數符子隣人謂展禽曰魯聘夫子夫子三黜無憂色何禽曰春風鼓百草敷蔚吾不知其茂秋霜降百草零落吾不知其枯人物志曰草之將精者為英獸之將羣者為雄張良是英韓信是雄也水經曰魏興錫義山山髙谷深多生薇蘅其草有風不偃無風獨揺又曰建寕郡山生牧靡可以解毒百卉方盛烏多悮食烏啄口中毒必急飛徃牧靡山啄牧靡以解毒也金樓子曰魯城北孔塋中不生刺人草木崔豹古今注曰牛亨問曰草木生類乎有識乎答曰物有生而有識者有生而無識者有不生而有識者有不生而無識者夫生而有識者蟲類是也生而無識者草木是也不生而有識者鬼神是也不生而無識者水土是也又曰天雨草狀如莎絞如丸無數皆名曰蓮蔞草郭子横洞㝠記曰東方朔曰臣有吉雲草十種種於九景山東二千歲一花此草難種東取璋琅山表之澗以灑之臣種來一千九百九十九年矣明年應生臣走徃刈収之以秣馬馬食不飢帝許之朔平旦去至暮而返背負數束其形葉似菱金色裁長二尺剉以餉馬即不覺飢武帝曰種之生否朔曰臣至東極過吉靈之澤多生此草移於九景之山全不如吉雲之地又曰甜溪水如蜜東方朔逰此水還將數斛以獻帝帝投隂井井裏遂恒甜而寒洗肉肌理柔滑瑶琨去玊門九萬里有碧草如麥剉之以釀則味如酒而釅烈驗之則顔色如醉飲一合則三旬不醒飲甜水則隨飲隨醒異苑曰青州劉㦎元嘉初射遇一麞割五臓以草塞之䠞然起走㦎恠而㧞塞便復還倒如此三為㦎宻録此種以來其治傷痍多愈三齊畧記曰不其城東有鄭𤣥教授山山下生草如薤葉長尺餘堅紉異常士人名作康成書𢃄草括地圖曰君子民𢃄劒使兩文虎衣野絲土方千里多薫華之草好譲故為君子國薫華草朝生夕死大極山西有采華之草服之乃通萬里之言服䖍通俗曰草盛曰菶甫朦切木茂曰葆音保方言曰凡草生而初逹謂之䓲䓲音悦小也荄杜根也東齊曰杜或曰苃慱物志曰太原晉陽以化生屏風草又曰黄帝問天老曰天地所生豈有食之令人不死者乎天老曰太陽之草名曰黄精餌而食之可以長生太陰之草名曰鉤吻不可食入口立死人信鉤吻之殺人不信黄精之益壽不亦惑乎又曰海上有草焉名曰蒒音師草其實食之如大麥從七月稔熟民歛穫名曰自然糓或曰禹餘粮又曰類草也其根名為弱頭大者大如升其外理白可以灰汁煑則凝成熟可以苦酒淹食之不以灰煑不成蜀人珎貴之異物志曰文草作酒能成其味以金買草不言其貴以羙用之故也王逸子曰草有𤣥巨暢威憙木有扶桑梧桐松栢皆受氣淳羙異於羣類者也風俗通曰靈帝光和十年陳留濟隂諸羣路邉草生作人狀操持弓弩牛馬萬狀􅊀具後闗東誅董卓陳留濟隂弃好即戎吏民殱殘草妖之興豈不或信抱朴子曰草有黄精一名白及有䲻頭鳶尾雞腸烏啄而非有翼之鳥也靈書記曰霍山上有神草三十四種典術曰壽榮草出少室金山丘下服之令人不老取葉服之可通百神又曰餌玊長生草一名通天價值千萬隂乾方寸七日甫服令人得仙師曠占曰黄帝問師曠曰吾欲知歲苦樂善惡可知不對曰歲欲豊甘草先生甘草薺也歲欲儉苦草先生苦草者葶藶也歲欲惡惡草先生惡草者水藻也歲欲旱旱草先生旱草者蒺藜也歳欲潦潦草先生潦草者蓬也淮南萬畢術曰廻風之草見八方取廻風草三寸三枝五寸五枝以城西面土三家不汲井口青泥南雞欲上栖不上者并治合為丸磨其面目出户視八方矣楚辭曰春草生兮萋萋王孫遊兮不歸古詩曰廻車駕言邁悠悠渉長道四顧何芒芒東風揺百草又曰新樹蘭蕙葩雜用杜衡草終朝採其華日暮不盈抱採之欲遺誰所思在遠道又曰穆穆清風至吹我羅裳裾青袍似春草長條從風舒又曰青青陵中草傾葉晞朝日陽春被惠澤枝葉可攬結草木為感恩况人含氣血薜荔山海經曰少華之山有草焉曰薜荔狀如烏韮縁木而生或生上石食之以已心痛楚辭曰罔薜荔兮為帷罔結也結薜荔為帷帳也擗惠櫋音眠兮既張擗折也以折惠覆櫋屋上也又曰採薜荔兮水中搴芙蓉兮木末又曰若有人兮山之阿被薜荔兮𢃄女蘿石蘭楚辭曰疏中石蘭兮以為芳王逸曰石蘭香草疏布也胡䋲楚辭曰索胡䋲之纚纚胡䋲香草也覇薫范子計然曰覇薫出覇陵也楚薰范子計然曰楚薫出洛陽也楚蘅范子計然曰楚蘅出楚國也秦蘅宋玊風賦曰夫風翺翔激水之上將擊芙蓉之精獵蕙草離秦蘅龍鬚山海經曰賈超之山草多龍鬚廣志曰龍鬚一名西王母簮水經曰自洮強南北三百里中地草並是龍鬚而無樵採周景式廬山記曰石門峰石間多龍鬚草逰名山志曰龍鬚草唯東陽永嘉有永嘉有縉雲堂意者謂鼎湖攀龍鬚時有墜落化而為草故有龍鬚之稱鄭緝之東陽記曰仙姥巖間不生蔓草盡出龍鬚本草經曰賈超山多龍鬚一名草續斷狼尾爾雅曰盂狼尾也廣志曰狼尾子可作桼燕麥爾雅曰蘥雀麥郭璞曰即燕麥古歌曰田中莵絲何嘗可絡道邉燕麥何嘗可穫楚葵爾雅曰荍音翹蚍婢支切衃房左切也郭璞曰今荆葵也似葵紫色謝氏云小草多華少葉葉又翹起毛詩陳風東門之枌曰視爾如荍詩義䟽曰荍名楚葵崔豹古今註曰荆葵一名茂葵一名芘芣花色奪目有紅有白有赤但花異葉不殊也戎葵爾雅曰菺音堅戎葵也郭璞曰今蜀葵花似木槿傅𤣥蜀葵賦序曰蜀葵其苗如𤓰瓠嘗種之引苗而生華經二年春乃發虞繁蜀葵賦曰惟茲珍草懐芬吐榮挺河渭之膏壤吸昴井之𤣥精繞銅爵而䟽植映昆明而羅生莵葵爾雅曰莃虛機切莵葵郭璞曰頗似葵而葉小狀如黎有毛汋啖之滑廣志曰莵葵爚之可食鳬茈爾雅曰芍都子切鳬茈也生下田苗似龍鬚而細根如指頭黒色可食東觀漢記曰王莽末南方枯旱民多餓羣入野澤掘鳬茈而食之鳥韮廣雅曰昔耶鳥韮也在屋謂之昔耶在墻謂之垣衣鹿藿爾雅曰蔨音卷切鹿藿也其實莥郭璞曰今鹿豆也葉似大豆大根黄而香蔓延生說文曰莥鹿藿之實也本草經曰鹿藿味苦平無毒主治蠱毒女子腰腹痛不樂腸癰瘰􅊓瘍氣生汶山山谷鹿葱風土記曰宜男草也宜懐娠婦人佩之必生男傅𤣥宜男花賦曰猗猗令草生於中方華曰宜男號膺禎祥嵇含宜男花序曰宜男花者世有之久矣多殖幽臯曲隰或華林𤣥圃荆楚之士號曰鹿葱苗可以薦於俎世人多女欲求男者取此草服之尤良也太平御覽卷九百九十四
