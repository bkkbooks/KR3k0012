  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_658-1a, image: WYG0898/WYG0898-0831a.png}
body:
  text: 太平御覧卷六百五十八宋李昉等撰釋部八戒律禪㙮寺戒律梁書曰武帝盛於佛教朝賢多啓求受戒江革精信因果而帝未知謂革不奉佛法乃賜革覺意詩五百字又手勑革曰果報不可不信革因乞受菩蕯戒又曰陶𢎞景曽夢佛受其菩提記名名為勝力菩薩乃詣鄮縣阿育王塔自誓受五大戒大同年卒遺令不湏沭浴以大袈裟覆衾蒙首足弟子遵而行之又曰陸杲素信佛法持戒甚精著沙門傳三十卷又曰蕭昱字子真歴位中書侍郎每求試邉州武帝以其輕脱無威望抑而不許普通五年徙臨海郡行至上虞有𠡠追還且令受菩薩戒既至恂恂盡禮改意蹈道持戒又精潔帝甚善之北齊書曰趙隠字彦深專意𤣥門崇敬佛道雖年踰期頥常持戒行髙僧傳曰佛若多羅此云功徳華􅄢賔人也少岀家專精十誦律部偽秦𢎞始中振錫入關姚興待以上賔之禮先是經法雖傳律藏未闡鳩摩羅什聞多羅既善斯部以秦𢎞始六年集義學僧數百餘人延請多羅誦出十誦梵本羅什譯為晉文三分獲二多羅遘疾棄世後有曇摩流支此云法樂西域人棄家入道徧一律藏馳名以𢎞始七年秋達闗中初佛若多羅誦出十誦未竟而亡廬山釋惠逺聞支既善毘尼希得究竟律部乃遺書通好流支既得逺書乃與羅什共譯十誦都畢支曰吾當更行無律敎處於是遊化餘方不知所卒毘婆羅論曰善分别戒名為毘尼藏大智論曰諸羅漢問誰能明了集毘尼藏皆言優婆離持律苐一請就師子坐問佛在何處説初毘尼戒優婆離言我聞佛在毘舎離爾時湏隣那迦藍陀長者子初犯戒以是因縁故結初罪如是二百五十戒義三部七法八法尼律増一開雜部菩部如是等八部十作毗尼藏經云五戒一不殺生二不偷盗三不邪淫四不妄語五不飲酒食肉故云五戒布施持戒忍辱精進禪定智慧以法能度死生故云六度聲色香味虧法怨忿汙人之凈心故云六塵禪寳林傳曰佛未湼槃時每告弟子迦葉曰吾以清凈法眼湼槃妙心寳相正法將付與汝汝可流布無令斷絶迦葉敬諾唯然受敎迦葉傳阿難阿難傳商那和修自此轉相傳授至般若多羅并佛二十八師般若多羅傳菩提達磨菩提達摩者天竺人也梁普通中泛海至于廣州後過江上嵩山少林寺達摩傳惠可惠可傳僧璨隠於晥山璨傳道信道信傳𢎞忍𢎞忍傳能惠能惠住韶州曹溪是為六祖髙僧傳曰釋道立不知何許人岀家事安公為師隠覆舟山岩居獨立不受供飬每潜入禪輙七日不起塔宋書曰謝尚嘗夢其父曰西南有氣至衝人必死勿當其鋒家無一全汝宜修福建塔寺可禳之若未暇立寺可杖頭刻作塔形見有氣来可指之尚悟懼未及造塔寺遂刻小塔施杖頭恒置左右後果有異氣遥見西南從天而下始如車輪稍漸彌大直衝尚家尚以杖指之氣便廽散闔門獲全氣所經處數里無復孑遺遂於永和四年捨宅造寺名莊嚴寺宋大明中路太后於宣陽門外造莊嚴寺改此為謝鎮西寺梁書曰阿育王寺塔阿育王即鐡輪王王閻浮提一天下佛滅後一日一夜役鬼神造八萬四千塔此即其一呉時有尼居其地為一精舍孫綝㝷除毁之㙮亦同滅吴平後諸道人復於舊處建立焉晉元帝初渡江更修飾之其後有西河離石縣畨人劉薩何遇疾暴亡七日更蘇説云觀世音語云汝縁未盡當得活可作沙門洛下齊城丹陽㑹稽並有阿育王塔可徃禮拜忽然醒寤因此岀家名惠達遊行至丹陽未知塔處及登越城西望見長干里氣色因就禮拜果是先阿育王塔屡放光明由是定知必有舎利集衆就掘得三石碑有鐡函函中有銀函七中亦盛三舎利及爪髪長一丈七尺詔遣沙門釋雲随使徃迎之先是武帝改造阿育王寺塔岀舊塔下舎利及佛𤓰髪青紺色衆僧以手伸之随手長短放之則旋屈為蠡形按經云佛髪青而細猶如藕莖絲佛三昧經云我昔在宫沭頭以尺自量髪一丈二尺放之右旋還成蠡文則與帝所得同也佛圖澄傳曰後趙尚書張離張良家富事佛起塔澄謂曰事佛在於清凈無欲慈矜為心檀越雖儀奉大法而貪恡未已游獵無度積聚不窮方世受見在之罪何福報之若可希也洛陽伽藍記曰永寜寺熈平元年靈太后胡氏所立也在宫前閶闔門外南一里中有九層浮圗初掘基至黄泉下得金像三十軀太后以為信法之徴永熈三年浮圖為火所燒後有人從象郡來云見浮圗於海中光明照耀儼然若新海上之民咸皆見之俄然霧起浮圗遂隠又曰西方佛沙伏國國王造一塔初成用真珠為羅網覆其上於後數年王乃思量此珠網價值萬金我崩之後恐人侵奪復慮大塔破壊無人修補一解珠網以銅鑊盛之在塔西北百歩掘地埋之上種樹名菩提枝條四布宻葉蔽天樹下四面坐像各高丈五恒有四龍典掌此珠若興心欲取即有禍變刻石為銘屬語將来若此塔壊勞煩後賢出珠修治寺後漢書曰陶謙同郡人笮融聚衆數百徃依於謙謙使督廣陵下邳彭城運粮遂大起浮圗寺上累金盤下為重樓又堂閣周回可容三千許人作黄金塗像衣以錦綵每浴佛輙多設飲飯布席於路其有就食及觀者且萬餘人宋書曰明帝以故宅起湘宫寺費極奢侈以孝武莊嚴寺刹七層帝欲起十層不可立分為兩刹各五層新安太守巢尚之罷郡還見帝曰卿至湘宫寺未我起此寺是大功徳虞愿在側曰陛下起此寺皆是百姓賣兒鬻婦錢佛若有知當悲哭哀愍罪髙浮圗有何功徳帝大怒馳曵下殿愿徐去無異容又曰巢尚之甚聰敏時百姓欲為孝武立寺疑其名尚之應聲曰宜名天保詩云天保下報上也時人服其機速又曰蕭惠開丁父艱家素事佛凡為父起四寺南岸南崗下名曰禪崗寺曲阿舊鄉宅名曰禪鄉寺京口墓亭名曰禪亭寺所封陽縣名曰禪封寺梁書曰何氏自晉司空充宋司空尚之世奉佛法建立塔寺至敬容又捨宅東為伽藍趍權者因助造搆敬容並不拒故寺堂宇頗為宏䴡時輕薄者因呼為衆造寺及敬容免職出宅止有常用噐物及嚢衣而已竟無餘財又曰謝舉宅内山齋捨以為寺泉石之美殆若自然舉託情𤣥勝尤長佛理注凈名經嘗自講説又曰武帝以三橋舊宅為光宅寺𠡠周興嗣與陸倕各製寺碑及成俱奏帝以興嗣所製自題又曰江紑字含潔幼有孝性年十三父蒨患眼紑侍疾將期月衣不觧帯夜夢一僧云患眼者飲慧眼水必瘥及覺説之莫能觧者與草堂寺智者法師善徃訪之智者曰無量夀經云慧眼見真能度彼岸蒨乃因智者啓捨同夏縣界牛屯里舎為寺乞賜嘉名勑答曰近見智者云慧眼水慧眼則五眼之一號可以慧眼為名及就創造泄故井井水清冽異於常泉依夢取水洗眼及煑藥稍覺有瘳因此遂差南史曰玉懿字仲徳父苖事符堅至二千石符堅之敗仲徳年十七及兄叡同起義兵與慕容垂戰敗被重創走與家属相失路經大澤困未能起卧林中有一小兒青衣年可七八嵗騎牛行見仲徳驚曰漢已食未仲徳言飢小兒去湏臾復来得飯與之食畢欲行而暴雨莫知津逕有一白狼至前仰天而號號訖䘖仲徳衣因渡水仲徳随後得濟與叡相及渡河至滑臺復為翟遼所留積年仲徳欲南歸乃棄遼奔泰山晉太元末徙居彭城宋元嘉九年又為徐州刺史仲徳三臨徐州威徳著於彭城立佛寺作白狼童子像於塔中以在河北所遇也又曰波斯國城外佛寺二三百所梁大通二年遣使獻佛牙又曰劉孝綽與到溉兄弟甚狎溉少孤宅近寺孝綽往溉許適見黄卧具孝綽為僧物色也撫手笑溉知其旨奮拳擊之傷口而去三國典略曰齊王初為胡昭儀起大慈寺未成改為穆皇后大寳林寺運石填井牛死無數唐書曰㑹昌五年四月括天下寺凡大寺四千二百蘭若四萬僧尼二十六萬五百七月𠡠併省天下佛寺上州各留寺一所中下州寺並廢上都東都各留十寺寺僧十人而已洛陽伽藍記曰白馬寺漢明帝所立也佛教入中國之始寺在西陽門外御道南明帝夢見金人長丈六項佩日月光明土人號曰佛遣使向西域求之乃得金像焉時以白馬負經而来因以為名寺上經函長存時放光明曜於堂宇是以道俗禮敬之如仰真容又曰崇義里有京兆人杜子休宅時有隠士趙逸云是晋武時人晋朝舊事多所記録正光初来至京師見子休宅歎息曰此中朝時太康寺也時人未之信遂問寺之由逸云龍􅋮将軍王濬平呉之後始立此寺夲有三層浮圗用磚為之指子休園中曰此是故處子休掘而騐之果得磚數萬并有石銘晋太康六年嵗次乙巳九月甲戌朔八日辛巳儀同三司襄陽侯王濬敬造子休遂舎宅為靈感寺云又曰宜夀里内包信縣令段暉宅地下常聞有鐘聲時見五色光明照於堂宇暉甚異之遂掘光所得金像一軀髙三尺并二菩薩趺上銘云晋太始二年五月十五日侍中中書監荀朂造暉遂捨宅為光明寺時人咸云此地是荀朂宅又曰修梵寺有金剛鳩鴿不入鳥雀不栖菩薩達摩云得其真相建康實録曰晋許詢捨永興山隂二宅為寺家財珍異悉皆是給既成啓奏孝宗詔曰山隂舊為祗洹寺永興居為崇化寺造四層塔物産既罄猶欠露槃相輪一朝風雨相輪等自備時所訪問乃是剡縣飛来又曰一乗寺梁邵陵王綸造梁末賊起遂延焼陳尚書故江總捨堂宇寺今之堂是也寺門遍畫凹凸花代稱張僧繇手跡其花乃天竺遺法朱及青緑所成逺望眼暈如凹凸就視即平世咸異之乃名凹凸寺又曰牛頭山西峰中有窟不測深淺古老相傳云辟支佛所出梁武帝於窟穴下置寺名曰仙窟寺有一石鉢盂莫知所来由形狀甚古唐神龍初鄭克俊取将入長安乃開禅寺志公履屐也髙僧傳曰釋法度少出家髙士名僧紹隠居瑯琊之攝山及亡捨所居山為栖霞精舎請度居之經嵗許忽聞人馬鼓角之聲俄見一人投刺于度曰靳尚度前迎之尚形甚都羽衛亦嚴致敬已乃言曰弟子有此山七百餘年法師道徳所歸謹捨以奉給并願受五戒永結来縁度為設㑹受戒而去又曰孫放西寺層搆傾頺沙門支雲惠謀欲建立其日有童子持紙蓮花挿故寺東西相去十餘丈於是建刹於中正當花所太平御覧卷六百五十八
