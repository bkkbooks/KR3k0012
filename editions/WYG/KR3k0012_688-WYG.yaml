  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_688-1a, image: WYG0899/WYG0899-0171c.png}
body:
  text: 太平御覽卷六百八十八宋李昉等撰服章部五貂蟬簮導白筆帢幍綃頭貂蟬徐廣車服雜注曰蟬取清髙飲露而不食貂取紫蔚温潤而光彩不彰灼又曰武官皆恵文冠本趙服也一名武弁大冠凡侍臣加貂蟬愚謂此土凉寒本以貂皮煖附施於冠因遂變而成飾也應邵漢官儀曰侍中金蟬左貂取金堅剛不耗蟬居髙食潔貂内勁悍而外温潤貂蟬不見傳記者因物論義予覽戰國䇿乃知為趙武靈王胡服也其後秦始皇破趙得其冠以賜侍中髙祖滅秦亦復如之後侍中皇權叅乗問貂璫何法不知其說復問地震云不為災還宫左遷議郎又曰中常侍秦官也漢興或用士人銀璫左貂世祖以來專用宦者右貂金璫漢書曰燕刺王旦郎中侍從着貂羽黄金附蟬又曰劉向上封事曰今王氏一姓乗朱輪華轂者二十三人皆青紫貂蟬充盈幄内又曰王莾篡位更漢制黑貂為黄貂又改漢家正臘日太后命去官属黑貂至漢家正臘月獨與其左右相對飲酒食肉晉書曰趙王倫簒位同謀者咸超階越次不可勝紀至於奴卒厮役亦加以爵位每朝㑹貂蟬盈坐故時諺曰貂不足狗尾續又曰劉聦破洛城將懐帝還平陽作赦書以六月十一日破洛羣王十二束手軍門貂蟬羽葆以充王府又曰阮孚字遥集為安東府叅軍蓬髪飲酒不以正務攖心後拜散騎常侍性既嗜酒常以金貂換酒為所司所彈帝宥之蕭子顯齊書曰侍中世為親近職魏晉選用稍増華重宋文帝元嘉中王曇首殷景仁等並為侍中情任親察景仁與帝接膝共話貂拂帝帝手抜貂置案上語畢復手挿之又曰王儉以朝儀草創衣服制則未有定凖議曰漢景六年梁王入朝中郎謁者金貂出入殿門左思魏都賦云藹藹列侍金貂齊光此藩國侍臣有之貂文又曰張敬兒被收敬兒脫冠貂投地曰用此物誤我又曰武陵昭王曄武帝即位歴中書祠部尚書巫覡或言􅁮有非常之相以此自負武帝聞之故無寵未嘗處方岳於御座曲宴醉伏地貂杪肉柈帝笑曰汗貂對曰陛下愛其羽毛而踈其骨肉帝不恱又曰何戢為侍中上欲轉戢領選問尚書令禇彦囬以戢資重欲加散騎常侍彦囬曰宋時王球從侍中中書令作吏部尚書資與戢相似領選職方昔小輕不容頓加常侍聖㫖每以蟬冕不宜過多臣與王儉既已左珥若復加戢則八座便有三貂若帖以驍游亦不為少迺以戢為吏部尚書加驍騎將軍又曰江淹累遷秘書監侍中衛尉卿初淹年十三孤貧常採薪以飬母曽於樵所得貂蟬一具將鬻以供飬其母曰此汝之休徴也汝才行若此豈長賤耶可留待得侍中着之至是果如母言又曰周盤龍為東平太守求觧職見許還為散騎常侍武帝戱曰卿着貂蟬何如兠鍪盤龍曰此貂蟬從兠鍪中生耳梁書朱弁除中書郎時秋日始拜有飛蟬正集弁武冠上時咸謂珥蟬之兆後果如其言又曰王規為晉安王長史王立為太子仍為散騎常侍太子中庶子侍東宫太子賜以所服貂蟬并降令書恱是舉也又曰陸雲公善奕棋常夜侍坐武帝冠觸燭火帝笑謂曰燭燒卿貂帝將因為侍中故以此戱之後魏書曰神龜元年詔加女侍中貂蟬同外侍中之飾任城王澄上表諫曰髙祖世宗皆有女侍中官未見綴金蟬於象揥珥鼲貂於鬚髪江南偽晉穆何后有女尚書而加貂璫此乃衰亂之世妖妄之服請依常儀追還前詔帝從之鄴中記曰石虎征討所得婦人美色萬餘選為女侍中着貂璫直皇后劉楨答魏文帝牋曰貂鼲之尾挂侍臣之幘潘岳秋興賦曰登春臺之熙熙珥金貂之烱烱成公綏七唱曰金鐺煌煌貂珥峨峨孫楚㑹王侍中座上詩曰顯允君子時推英邵𤣥貂左移華蟬増曜簮導釋名曰簮兟也以簪連冠於髪也導所以導擽鬢髪使入巾幘之裏也或曰擽鬢以事名之也服䖍通俗文曰幘導曰簮史記曰趙平原君使人於春申君趙使欲誇楚為玳瑁簮春申君客三千餘人上客皆玳簮躡珠履趙使大慙也又曰李斯上書曰宛珠之簮傅璣之珥漢書曰上從館陶公主飲上曰願謁主人公主乃下殿去簮珥徒跣頓首自引董君董君隨主前伏殿下又劉向列女傳曰周宣姜后齊女也宣王常晏起姜后脫簮珥待罪於永巷也又佞幸傳曰景帝没入鄧通家財一簮不得着身燕書曰髙祖慕容廆晉安北將軍張華雅有人鑒鎮薊撫御諸部髙祖童兒往見華甚異之謂髙祖曰君後為濟世之器匡難濟時者也脫所着幘簮以遺髙祖慇懃而别梁書曰羊侃家妓孫荆玉能反腰至地衘得席上玉簮後魏書曰胡太后幸闕口温水登鷄頭山自射象牙簮一發中之董巴漢輿服志曰太皇太后入朝服紺上皂簪以玳瑁為擿長一尺端為華勝上為鳯凰爵以翡翠為毛羽下有白珠垂黄金鑷左右各一横簮之以安幗結諸簮珥皆同又曰公卿列侯中二千石夫人玵繒幗黄金龍首衘白珠魚須擿長一尺為簮江表傳曰魏文帝遣使於吳求通犀簮羣臣曰貢有常典魏所求非法冝勿與孫權曰彼在諒闇之中而所求若此寧可復與言禮皆備以付使韓詩外傳云孔子遊少原之野有婦人中澤而哭夫子怪之使弟子問焉婦人對曰向日刈蓍薪而亡簮是以哀孔子曰刈蓍而亡簪有何悲焉婦人曰非傷亡簮吾所悲者不忘故也淮南子曰楚將子發好伎道之士有善為偷者往見子發子發禮之無幾何齊伐楚子發將軍當之兵三却齊師逾强於是善偷者夜出取幘明夕取枕明夕又取簮悉歸之齊師大駭謀曰今夕不去楚軍恐取吾首還師而去之故伎無細能無簿在人君用之也鹽鉄論曰禹治水過門不入當此之時堕簮不顧郭子横洞冥記曰帝好㣲行於長安城西夜見一玉螭遊於路董謁曰昔桀媚末喜於膝上以金簮貫玉螭腹為戯弄今螭腹有金穿痕安知非此耶神仙傳曰左慈能分盃飲酒曹公聞試之慈拔簮以畵盃即斷其間相去數寸幽明録曰孫權時南方遣使獻簮吏過宫亭湖廬山君廟請福神下教求簪吏叩頭曰簮獻天子必乞哀念神云臨入石頭當相還吏遂去逹石頭有三尺鯉魚跳入船吏破腹得之呉均續齊諧記曰東海蔣潜嘗至不其縣於野林中見一死人鳥来食之輙見一小兒長三尺許来驅鳥乃起去潜乃往視之見有犀導乃拔取衆鳥争集無復驅者夢書曰簮者為身簮者已之尊也夢着投簮身歡喜班固與竇憲牋曰將軍哀憐賜以玉躬所喜駭玳瑁簮絳單衣以魯縞之質被服鸞鳯之彩飾諸葛恢集詔荅恢曰今送一犀導小物耳然是情發於中則寄乎物班固與弟超書令遺仲叔玳瑁黑犀簮西京雜記曰武帝過李夫人就取玉簮搔頭宫人争效之玉價倍貴漢鐃歌有所思曲曰有所思乃在大海南何以為問遺雙珠玳瑁簮白筆魏畧曰明帝時常大㑹殿中御史簮白筆側階而坐上問左右此何官侍中辛毗對曰此謂御史舊簮筆以奏不法今但備官耳徐廣輿服雜注曰古者貴賤皆執笏有事則書之常簮筆今之白筆是其遺象帢服䖍通俗文曰帛幘曰帢王隐晉書曰諌議舒至尊臨温公夫子䘮議曰今白帢深或當右弟服至尊臨弔謂深𤣥而已崔鴻十六國春秋西凉録曰燉煌父老令孤熾夢白頭公衣帢謂熾曰南風動吹長木胡桐權不中轂言訖忽然不見李歆小字桐權至期而亡南史曰何𦙍夢見神女二十許人並衣帢行列在前俱拜牀下覺又見之便命營㓙具既而疾困不復瘳後魏書曰宋遊道與頓丘李奬一面便善奬曰我年位已髙㑹用弟為佐史令弟北面於我足矣遊道曰不能既而奨為河南尹辟遊道為中正使者相屬以衣帢待之握手歡謔潘京别傳曰陳躭初為州主簿司空何次道帢偏岸謿躭頓帢有所蔽也應聲報曰躭頓以蔽有明府岸以示無冝都山川記曰鹽水上有石室民駱都到室邊採蜜見一仙人裙衫白帢坐見都凝瞻不轉𫝊子曰漢末魏太祖以天下兇荒資財乏匱擬古皮弁裁縑帛以為帢合乎簡易隨時之義以色别貴賤于今施行可謂軍容非國容也世說曰陸雲好笑着帢映水見影笑不能止髙恵文婦與恵文書曰今奉緫帢十枚幍傅子曰幍先未有岐荀文若巾觸樹成岐時人慕之因而弗改今通為􅂟弔之服白紗為之或單或裌初婚冠送餞亦服之後魏書曰太和中文明太后崩齊遣其散騎常侍裴昭明謝峻等弔欲以朝服行事主客不許昭明等執志不移孝文勅尚書李冲選一與識者更與論執冲奏遣成淹昭明曰不聽朝服行禮議出何典淹曰𤣥冠不弔童孺共聞季孫將行請遭䘮之禮千載之下猶共稱之卿方謂議出何典何其異哉昭明曰唯賫袴褶不可以弔幸借衣幍以申國衆敕送衣幍給昭明等明早引入皆令文武盡哀後魏書裴植傳曰植母夏侯道遷姊也性甚剛峻於諸子皆如嚴君長城後非衣幍不見小有罪過必束帶伏門經三五日乃引見之督示嚴訓唯少子衍得以常服見之綃頭釋名曰綃鈔也鈔髪使上或謂之陌頭言其從後横陌而前也齊人謂之㡋言斂髮使上也禮記玉藻曰士練𢃄率下辟士以下皆禪不合而經積如今作綃頭為之東觀漢記曰建武中徴周黨著短布單衣布綃頭待見尚書欲令更服黨曰朝廷本以是故徴之安可復更遂以見自陳願守之志上聴之後漢書曰向栩河内朝歌人少為書生性卓詭不倫恒讀老子狀如學道又似狂生好被髪着絳綃頭吳越春秋曰勾踐與妻入臣吳王服犢鼻綃頭夫人衣無縁之裳施左闗之襦以養馬古詩曰羅敷好飬蚕採桑城南隅少年見羅敷脫巾着綃頭繁欽情詩曰何以結相知金薄畫綃頭太平御覽卷六百八十八
