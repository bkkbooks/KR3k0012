body:
  text: 太平御覽卷三百八十宋李昉等撰人事部二十一美丈夫下美婦人上美丈夫下唐書曰張知謇蒲州河東人徙家于岐少與兄知立知晦弟知黙勵志讀書皆明經擢第儀質瓌偉眉目踈朗曉立理文而清介自守故公卿爭進之又曰崔湜美姿儀有才名弟液滌及從兄涖並有文翰居清要每宴私之際自比東晋王導謝安之家謂人曰吾之門及出身厯宦未甞不為第一丈夫當先據要路以制人豈能黙黙受制扵人液尤善五言湜歎曰海子我家之神龜也海子即液小名宦至殿中侍御史又曰盧承慶美姿儀􅀶學有才幹貞觀初為秦州都督府户曹叅軍因奏河西軍事太宗竒其明辯擢拜考功員外郎遷民部侍郎太宗甞問厯代户口數承慶叙夏商後迄于周隋皆有依據上嗟賞之令蒹檢校兵部侍郎知五品選事莊子曰盗跖謂孔子曰長大美好人見而悦者此吾父母遺徳子雖不吾譽吾不自知耶傅元子曰蒯躬字叔孝性方嚴有容儀人望而畏之有過其門者皆整衣改容郭子曰潘安仁夏侯湛並有美容貌常同行人謂之連璧又曰謝哲字頴豫陳郡人也美風儀舉止藴藉而襟情豁然為士君子所重郭林宗别傳曰宗逰洛陽見河南尹李膺膺大竒之扵是名震京師復歸鄉里衣冠諸儒送至河上車數千輛宗唯與膺同舟而濟衆賔望之以為神仙焉晋謝安别傳曰王珣以疾辭職嵗餘辛桓𤣥與㑹稽王道子書曰珣神清朗悟經史明徹風流之美公私所寄忽爾䘮失歎悼之深豈但風流相悼而已荀氏家傳曰荀恱字仲豫儉之子儉早卒恱年十二能説春秋家貧無書每借人讀所見篇牘一覽多能誦記性靜美姿容又曰荀美字令則七嵗隨父在石頭蘇峻愛其姿神數喚之年十五擬因壻之不欲連姻帝室乃遁長沙監司追尋不得已遂尚潯陽公主風氣英秀明鬚眉俯仰眄睞容止可則皇甫謐逸士傳曰或問許子將荀靖與荀爽孰賢子將曰二人皆玉也慈明外朗叔慈内潤何晏别傳曰何晏南陽人大將軍進孫進遇害魏武納晏小養扵魏宫至七八嵗慧心天悟形貌絶美武帝欲以為子每扶將逰觀令與諸子長㓜相次晏㣲覺之坐則専席止則獨立或問其故荅曰禮異姓不相貫管輅别傳曰諸葛原與管輅别戒二事言卿樂酒量温克然不可保寧當莭之耶卿有氷鑑之才所見者妙仰觀如神禍如膏火不可不慎也呉地記曰陸閎字子春暢子也姿容如玉威儀秀異光武升臺見而偉之笑曰南方故多佳人三國典畧曰李繪儀貌端偉神情朗㑺舅河間邢晏每與之言歎其髙逺稱之曰若披烟霧如對珠玉宅相之竒良在此甥文襄嗣業晋代山東諸郡其特降書徴者唯繪清河太守辛術二人而已又曰梁楊白花字長茂武都仇池人大眼之子也少有勇力容貌瓌偉又曰山公目嵇叔夜之為人也巖巖若孤松之獨立又曰嵇叔夜之為人其醉也隗峩如玉山之將頺又曰衛玠從豫章來人久聞其姿觀者如堵玠先有羸疾發遂死時人謂看殺衛玠又有人歎王恭形茂者云濯濯如春月桞又曰王右軍見杜洪治歎曰膚如凝脂眼如㸃漆此神仙中人也又曰裴叔則有雋彩容儀脱冠麤服亂頭皆好有人見之曰裴叔則如玉山行光映照人也又曰時人目李宣國如玉山之將摧又曰衛伯玉為尚書令見樂廣與朝中名士談議竒之命子弟造之曰此人人之水鏡也瑩然若披雲霧而覩青天又曰撫軍問孫興公劉真長何如曰清簡令淑王仲祖何如曰温潤泊和又曰范豫章謂王荆州范㝤王忱曰卿風流雋望真後來之秀王曰不有此舅焉有此甥又曰庾子嵩目和矯森如千丈之松雖磊砢有節目施之大厦有棟梁之用也楊松玠談藪曰張緒字思曼少而閒雅風流吐納觀者忘倦永明主見靈和殿前桞條嫩弱披靡可愛嗟賞曰此楊桞風流可愛似張緒少年宋玉風賦曰楚襄王時宋玉休歸唐勒讒之扵王王謂玉曰體貌容冶口多㣲辭不亦薄乎玉謂王曰身體容冶受之二親口多㣲辭聞之聖人陳沈炯長安少年行曰長安好少年驄馬鐡連錢陳王装瑙文石勒晋后鑄金鞭歩捶如飛燕劒鍔似舒蓮去來新市北遨逰大道邊美婦人上周易曰冶容誨淫毛詩曰窈窕淑女君子好逑又曰靜女其姝俟我于城隅又曰匪女之為美美人之貽又曰云誰之思美孟姜矣又曰彼美孟姜洵美且都有女同行顔如舜英舜英木槿也又曰野有蔓草零露漙兮有美一人清揚婉兮又曰齊侯之子衛侯之妻東宫之妹邢侯之姨譚公惟私手如柔荑膚如凝脂領如蝤蠐齒如瓠犀螓首蛾眉巧笑倩兮美目盼兮又曰彼美淑姬可以晤歌又曰有女如玉又曰有女如雲又曰孌彼諸姬孌好貌左傳曰叔向欲娶申公巫臣氏其母曰吾聞甚美必有甚惡而天鍾美扵是將必以是大有敗也昔有仍氏生女黰黒光可以鑑名曰𤣥妻樂正后䕫娶之生伯封實有豕心夫有尤物足以移人苟非徳義則必有禍尤異也又曰宋華督見孔父之妻扵路目逆而送之曰美而艷色美曰艷又曰衛侯自城上見巳氏之妻髪美使秃之以為吕姜髢又曰稱鄭有徐吾犯之妹甚美公孫楚與公孫黒爭聘之公羊傳曰驪姬者國色也其顔色一國之選又曰邾婁顔夫人者姬盈女國色也爾雅曰美女為媛國語曰恭王逰扵涇上宻康公從三女奔之其母曰必致之扵王夫獸三為羣人三為衆女三為燦今以美物歸汝而何徳以堪之康公弗獻一年王滅宻賈逵注日燦美也戰國策曰晋文公得南威三日不朝遂推南威而逺之曰後代必有以色亡國者又曰隂姬與江姬争為后司馬喜為隂姬乃謂趙王曰臣聞趙佳麗之所出也今至境入都邑殊無美者臣未甞見人如中山隂姬者其眉目凖額權衡偃月乃帝王之后非諸侯姬也趙王大悦欲請之司馬喜歸謂中山君曰趙王非賢主也乃欲請隂姬王冝立以為后以絶趙王之意中山君遂立為后又曰張儀之楚見楚王曰彼周鄭之女粉白黛緑立扵衢閭之間非知而見之者以為神王曰楚僻陋之國寡人未見中國之女如此之美乃資以珠玉南后鄭䄂聞之大恐令人謂張子曰聞君將之晋有金千斤請供芻秣張子請王􅜠之王召鄭袖而􅜠之張子再拜曰儀有死罪儀行天地遍矣未甞見人如此之美也而儀言得美人是欺王也王曰吾固知天下無兩人矣史記曰紂囚西伯而閎夭之徒以有莘氏美女獻紂紂大悦乃放西伯又曰漢武帝時尹夫人與邢夫人同時武帝有詔不得見尹夫人自請武帝願見邢夫人帝令他夫人餙從者數十人來前尹夫人見之曰非邢夫人帝曰何以知之對曰觀其體貌形狀不足以當人主有詔邢夫人邢夫人故衣獨身來尹夫人望見曰真是矣扵是乃低頭而泣自痛其不如也諺曰美女入室惡女之仇漢書曰武帝李夫人本以倡進初夫人兄延年性知音律善歌舞侍立起舞歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國寧不知傾城與傾國佳人不可得帝歎息曰善世豈有此人乎平陽因言延年有女弟帝乃召見之實妙麗善舞李夫人少而早卒上憐愍焉圖畫其形扵甘泉宫華嶠後漢書曰梁冀妻孫夀色美而善為妖態作愁眉啼粧墮馬髻折腰歩齲齒笑以為媚惑東觀漢記曰趙喜與友人韓仲伯欲入武闗仲伯以其婦有色恐有强暴者而已受其害欲棄之怒責仲伯遂以泥塗其婦面載以鹿車身自推每逢賊輙為求哀言其病遂脱又曰初光武聞隂麗華美而悦歎曰娶妻當得隂麗華後為皇后漢武故事曰帝起明光宫發燕趙美女三千人以充之率取十五以上二十以下年滿四十者出嫁凡諸宫美人可七八十帝從行郡國載之後車與上同輩者十六人員數恒使滿皆自然美麗不施粉白黛黑衣軒者亦如之魏畧曰初袁紹子熙納甄后熙出奔幽州后留侍姑及鄴破紹妻及后坐于堂上紹妻自縳文帝語袁夫人令新婦舉頭姑乃捧后令仰帝就視見其顔色非凡稱歎之太祖為迎焉呉志曰周瑜從孫策攻皖城得喬公兩女國色也䇿自納大喬瑜納小喬又曰孫權歩夫人以美麗得幸寵冠後庭王隠晋書曰阮籍隣家處女有才色籍不與親生不相知未嫁而死籍往哭盡哀乃去晋陽春秋曰荀燦字奉倩常曰婦人者才智不足論自以容色為主驃騎將軍曹洪女有美色燦扵是聘焉容服帷帳甚麗専房宴寢厯數年後婦偶疾亡未殯傅嘏往唁燦大哭神傷曰佳人難再得痛悼不已嵗餘亦亡東燦晋記曰杜弢至長沙掠前始興太守尹虞二女皆國色也將妻之曰我父二千石終不為賊作婦遂自殺焉又曰謝鯤隣家有美女鯤挑之女織梭投之折其兩齒干寳晋記曰石崇有妓曰緑珠美如玉善舞孫秀使人求焉崇方登凉觀臨清水婦人侍側使者以告崇崇盡出婦妾數十人以示之皆藴蘭麝而披羅縠使者曰君侯服御美麗然本受㫖索緑珠崇勃然曰緑珠為吾所愛不可得也使者曰願加三思崇曰不然使者還以告故秀勸趙王倫殺之崔鴻十六國春秋前趙録曰劉聰使大鴻臚李宏往聘太保劉殷女謂宏曰此女輩皆姿色超世且太保扵朕實自不同宏曰太保裔自有周與聖源實别聰大悦賜金六十斤又後趙録曰石虎鄭后名櫻桃晋司徒僕射鄭世逹家妓也在中猥妓中虎數歎其貌扵太妃太妃給之又曰前秦苻堅滅燕慕容沖女弟年十四殊色堅納之車頻秦書曰苻堅時新羅獻美女國在百濟國東三十國春秋曰後梁吕超殺其君纂后楊氏國色超將妻焉謂其父恒曰后若自殺禍必及宗恒以此言告后后曰大人本賣女與氐羗以圖富貴一之以甚其可再乎恒不能强乃自殺唐書曰喬知之尤稱俊才所作篇詠時人多諷誦之則天時累除右補闕遷左司郎中知之有侍婢曰窈窕娘美麗善歌舞為武承嗣所奪知之怨惜因作緑珠篇以送與婢婢感憤自殺承嗣大怒因諷酷吏羅織知之下獄死南史恩倖傳曰阮佃夫見廬江王恢有妓張耀華美為廣州刺史將發要佃夫飲設樂見張氏悦之頻求此人恢曰不可佃夫拂衣出户曰惜指失掌邪遂諷有司以公事彈恢太平御覽卷三百八十
