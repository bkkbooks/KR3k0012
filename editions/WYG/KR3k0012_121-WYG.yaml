body:
  text: 太平御覽卷一百二十一宋李昉等撰偏霸部五前燕慕容廆五罪切慕容皝音晃前燕慕容雋慕容暐前秦苻洪苻健前秦苻生前燕慕容廆崔鴻十六國春秋前燕録曰慕容廆字奕落環昌黎棘城人昔高辛氏遊於海濵留少子厭次以君北夷世居遼左號曰東胡秦漢之際為匈奴所敗分保鮮卑山因以之為號曽祖莫䕶䟦魏初率其諸部入居遼西從司馬宣王討公孫淵有功拜率義王始建國於棘城之北見燕代少年多冠步揺䟦意甚好之遂歛髪襲冠諸部因呼之為歩搖其後音訛遂為慕容焉祖木延左賢王從毌丘儉征髙麗有功加號大都督父涉歸以全栁城之勲進拜單于遷邑遼東於是漸變胡風自云慕二儀之德繼三光之容遂以慕容為姓廆身長八尺有大度晉安北將軍張華一見竒之謂曰君後必為命世之器定難濟時者也涉歸率弟耐立将謀殺廆廆亡匿於遼東徐郁家太康五年國人殺耐迎廆立之太康十年又遷于徒河之青山元康四年定都大棘城所謂紫蒙之邑也永嘉六年王浚承制以廆為散騎常侍冠軍将軍前鋒大都督大單于皆讓不受擢舉賢良隨才授任魯國孔纂宿徳清望請為賔友平原劉讃儒學該通引為東庠祭酒其世子皝率國胄受業焉太興四年晉遣謁者拜廆使持節都督幽平東夷諸軍事車騎将軍平州牧封遼東郡公丹書鐵劵承制海東咸和元年加侍中位特進八年夏五月薨于文徳殿年六十五塟于青山晉遣使者贈車騎大将軍開府儀同三司諡襄公皝為燕王追諡武宣王雋稱尊追尊曰武宣皇帝廟號髙祖慕容皝崔鴻十六國春秋前燕録曰慕容皝字元貞廆第二子小字萬年長七尺八寸雄毅善權畧博學多材藝晉建武元年拜振武将軍永昌初拜左賢王太寧末拜平北将軍朝鮮公咸和八年六月即遼東公位行平州刺史督攝部内九年八月晉遣謁者拜皝鎮軍大将軍平州刺史大單于遼東公承制一如廆故事咸康元年七月立子雋為世子三年以左司馬封奕為長史九月奕等以皝任重位輕宜稱燕王於是上議十月僣即燕王位于文德殿大赦境内改偹羣司以封奕為相國追尊先公為武宣王先妣為王后起文昌殿出入警蹕立夫人段氏為王后世子雋為太子是歲棘城黒石谷有大石自立而行八年七月晉使鴻臚郭恡持節拜皝侍中大都督河北諸軍事大将軍燕王其餘官皆如故封諸功臣百餘人九月遷都龍城十二年四月黒龍一白龍一見于龍山皝率羣寮觀之去龍二百步祭以太牢二龍交首嬉翔解角而去皝大悦赦境内號新宫曰和龍立龍翔佛寺于山皝雅好文籍親造太上章以代急就又著典誡十五篇並以教胄子十四年皝親臨東庠考試學生其通經秀異者擢充近侍十月饗羣僚于承乾殿右長史宋諺性貪賜布百疋令自負而歸以愧其心十五年八月皝因見白兎馳射之馬倒被傷輦而還宫引太子雋囑以後事謂曰今中原未平方須經建委賢任哲此其時也恪智勇兼濟力堪任重汝其委之以成吾志九月薨于承乾殿年五十二冬十月葬龍山諡文明王雋稱尊追尊曰文明皇帝廟號太祖陵曰龍平晉書曰皝嘗田于西鄙将濟河見一老父服朱衣乘白馬舉手麾皝曰此非獵所王其還也祕之不言遂濟河連日大獲後見白兎馳射之馬倒被傷乃説所見輦而還宫引雋囑以後事以永和四年死在位十五年慕容雋崔鴻十六國春秋前燕録曰慕容雋字宣英皝第二子小字賀頼䟦十三月而生有神光之異身長八尺一寸善屬文雅長辭賦至於器物車室皆著讃以為勸戒皝之八年晉遣使者拜皝燕王以雋為安北将軍東夷校尉十一年進拜使持節鎮東将軍皝薨即燕王位赦其境内元年春正月雋依春秋列國故事稱元年正月聞趙魏大亂乃嚴兵将為進取之計七月晉使謁者陳沈拜雋侍中都督河北諸軍事幽冀并平四州牧大将軍燕王承制封拜一如廆皝故事元璽元年正月司南車成雋大悦告于皝廟四月遣輔國恪相國奕討冉閔戰于魏昌㢘臺閔師大敗擒送之閔大将軍蒋幹輔閔子智固守鄴城遣輔弼評等帥騎一萬以討之鄴北郡縣悉降輔國奕等一百一十人勸稱尊號令曰非常之事匪寡德所宜聞也八月尅鄴輔弼評等送閔妻董氏太子智太尉申鍾并乘輿服物及六璽送于中山傳國璽蒋幹先以送晉雋欲神其事業言數在已乃詐云閔妻得之以獻賜閔妻號奉璽君封冉智為海濵侯以輔弼評為司州刺史鎮鄴十月輔國恪等五百五人奉皇帝璽上尊號十一月僭即皇帝位于正陽前殿大赦改元時晉遣使詣雋謂之曰還白汝天子我承人乏為中國所推己為帝矣庚午下令曰追崇祖考古人令典其追尊武宣王為髙祖武宣皇帝文明王為太祖文明皇帝二年正月立后可足渾氏為皇后升平元年正月復立中山王暐為皇太子赦其境内改元曰光壽初廆有駿馬曰赭白有竒相逸力石虎之伐棘城皝将出避難欲乘之馬悲鳴蹄齧人莫能近皝曰此馬見異先朝孤嘗仗之濟難今不欲出者蓋先君之㫖也乃止虎尋奔退皝益竒之至是年四十九嵗而駿逸不虧雋比之鮑氏驄命鑄銅以圖其像親為銘讃鐫勒其旁置之薊城東掖門是月像成而馬死十一月自薊遷鄴十二月入鄴宫大赦繕宫殿復銅雀臺以吳王垂為東夷校尉平州刺史鎮遼東二年三月常山寺大樹自㧞根出得璧二十七圭七十三光色精竒有異常玉雋以為岳神之命遣尚書郎段勤以太牢祀之五月遼西獲黒兎三年三月雋夜夢石虎齧其臋寤而惡之命發其墓剖棺出屍踏而罵之曰死胡安敢夢生天子遣御史中尉楊約數其殘酷之罪鞭而投之漳水十二月雋寝疾謂大司馬恪曰吾患惙頓恐不濟修短命也復何所恨但二冦未除景茂冲幼慮其未堪家國多難吾欲逺追宋宣以社稷屬汝恪曰太子雖幼天縦聰聖必能勝殘刑措不可以亂正統雋怒曰兄弟之間豈虛飾乎恪曰陛下若以臣堪荷天下之任者寧不能輔少主也雋曰若汝行周公之事吾復何憂四年正月雋薨于應福前殿年五十三偽諡景昭皇帝廟號烈祖葬龍陵雋雅好文籍性嚴重未曽以慢臨朝雖閒居宴處亦無懈怠之色晉書曰雋在位十一年自初即位至于末年講論不倦覽政之暇唯與侍臣錯綜義理凡所著述四十餘篇也慕容暐崔鴻十六國春秋前燕録曰慕容暐字景茂雋之第三子元璽三年封中山王尋立為皇太子光壽四年僣即帝位大赦改元建熈元年以太原王恪為太宰録尚書行周公事專百揆上庸王評為太傅賛朝政司空陽騖為太保吳王垂為河南大都督十州諸軍事兖州牧鎮梁國五年正月暐南郊十月太尉奕迎神主和龍初暐委政太宰恪專受經于博士王勸助教尚鋒秘書郎杜詮並以明經講論左右至是通諸經祀孔子于東堂以勸為國子祭酒鋒國子博士詮散騎侍郎其執經侍講皆有拜授八年太宰恪卒九年十二月有神降于鄴自稱湘女有聲與人相接數日而去十年四月立貴妃可足渾氏為皇后六月晉大司馬桓溫率衆五萬來伐遂至枋頭吳王垂大敗之斬獲三萬餘級温奔還淮南垂既敗溫威德彌振太傅評大不便之太后遂與評謀殺垂十二月垂出奔秦十一年六月秦輔國将軍王猛鎮南将軍楊安率衆六萬來伐以太傅評下邳王厲等帥精兵三十萬拒秦師于潞川州郡盗賊大起鄴中怪異非常十月評及猛戰于潞川評師敗績單騎遁還猛乘勝追奔長驅至鄴十一月苻堅帥衆㑹猛來攻拔鄴城外亂散騎侍郎餘蔚䓁率扶餘髙句麗及上黨質子五百餘人夜開城門引納秦師暐與太傅評左衛将軍孟高等數十騎出奔昌黎堅遣将軍郭慶帥騎五千追之及暐于高陽秦将巨武執暐将縛之暐曰汝何小人而敢縛天子武曰我梁山巨武受詔縛賊何謂天子耶執暐送鄴堅問其奔状暐曰狐死首丘欲歸死于先人陵墓耳堅哀而釋之令還宮率文武出降堅入鄴宫升正陽殿徙暐及王公已下并諸鮮卑四萬餘户于長安封暐新興郡侯邑五千戸尋拜尚書堅征臺城為平南将軍别部都督淮南之敗隨堅還長安旣而吳王垂攻苻丕于鄴中山王冲起兵關中暐謀殺堅事發為堅所誅年三十五徳僭稱尊號偽諡幽皇帝晉書曰廆以武帝太康六年稱公至暐四丗暐在位十一年以海西公太和五年滅廆皝凡八十五年前秦苻洪崔鴻十六國春秋前秦録曰苻洪字廣世洛陽臨渭氐人其先有扈氏之苗裔子孫强盛世為氐酋其後家池生蒲長五丈節如竹形于時咸異之謂之蒲家因以為氏焉父懐歸為部落小帥母姜氏寝産洪先是隴右大雨霖百姓苦之謡曰雨若不止洪水必起故名之曰洪年十二父卒代為部帥好施多權畧善騎射屬劉氏之亂乃散千金招延俊傑戎晉襁負奔之權為盟主劉聰遣使拜平逺将軍不受自稱䕶氐校尉秦州刺史洛陽公羣氐推為首劉曜以洪為氐王及曜敗于洛陽洪率部人西保隴山石虎将軍攻上邽洪詣虎降虎跣出迎之拜冠軍将軍監六夷諸軍事涇陽伯趙建平四年石生起兵于關中洪遂西結張駿自稱晉北平将軍雍州刺史石虎旣滅生洪率户二萬下隴東如馮翊虎拜洪䕶氐校尉進爵為侯徙秦雍州民羌十餘萬户于關東遷洪龍驤将軍流民都督處于枋頭從征叚遼有功進封平西郡公佛圖澄觀苻氏有王氣虎陰欲殺之洪稱疾不朝太寧元年進位侍中車騎大将軍開府儀同三司雍州刺史改封本國略陽郡公時姚弋仲圖據關中恐洪先之遣子襄率衆五萬來伐洪洪迎擊敗之於是安定梁擾等並率關西民望説洪曰今胡運将終中原喪亂明公神武必成大業繼蹤周漢冝稱尊號以副四海之望洪以讖文有草付應王又孫堅之生背有草付字遂改姓苻氏自稱大将軍大單于三秦王初趙将軍麻秋西鎮枹音符䍐聞冉閔之亂率衆歸鄴洪使子龍驤雄逆擊獲之以秋為軍帥将軍秋説洪西都長安旣而秋因讌鴆洪将併其衆世子健收而殺之洪将死謂健曰關中周漢舊都形勝之國吾亡之後便可鼓行而西言終而薨年六十六苻健崔鴻十六國春秋前秦録曰健字運業洪第三子母𦍑氏夢感大羆而孕生之夜洪又夢族胄氐王蒲健謂之曰是兒興家門可以吾名字之於是名羆字世健後避石虎外祖張羆之名故改焉晉永和六年自稱征西大将軍開府都督關西諸軍事雍州刺史於是盡衆西行至孟津起浮橋以濟濟訖焚橋三輔堡壁悉降十一月入都長安于是左長史賈𤣥碩等請依昭烈稱漢中王故事表健為秦王繼而又請上尊號健偽讓再乃從之皇始元年正月僣即天王位國號大秦改晉永和七年為皇始元年追尊父洪為太祖武惠皇帝繕宗廟社稷于長安妻强氏為皇后子萇為皇太子靚為平原公生為淮南公弟雄丞相東海公其餘封受各有差是年野􅅙成繭野禾被原百姓採野繭而衣收野粟而食關西家給人足二年正月丞相雄等固請冝依漢晉兼皇王之美不可過自謙冲同趙之初號健從之僣即皇帝位于太極殿大赦諸公進爵為王立五等之封以次進之三年正月下書曰公卿已下歲舉賢良方正孝廉清才多畧博學秀才異行各一人或獻書規諌或面陳朕過其速以聞勿拘貴賤四年丞相東海王雄卒贈相國進封魏王諡敬武王雄字元才洪之季子趙建武中拜龍驤将軍雄頭大足短故軍中稱為大頭龍驤健甚重之曰元才吾之周公五年四月立淮南王生為皇太子六月健寝疾引太師魚遵丞相雷弱兒太傅毛貴司空王墮等囑以後事受遺輔政乙酉薨于太極前殿年四十九𦵏原陵偽諡明皇帝廟號世宗永興初追尊曰景明皇帝廟號髙祖苻生崔鴻十六國春秋前秦録曰苻生字長生健第三子幼而麤暴昏醉無賴祖洪甚惡之生一目七歲洪戲之問侍者曰吾聞瞎兒一淚信乎侍者曰然生怒引佩刀自刺出血曰此亦一淚也洪大驚鞭之生曰性耐刀槊不堪鞭捶洪曰汝為爾不已吾将以汝為奴生曰可不如石勒也及長力舉千鈞走及奔馬皇始五年僣即皇帝位大赦改年羣臣奏先帝晏駕甫爾不宜改號生怒不從窮推議主壽光元年七月殺右僕射段純以太子門大夫趙韶為右僕射太子舍人趙誨為中䕶軍著作佐郎董榮為尚書並以佞倖進也九月中書監胡文中書令王魚言于生曰比頻有客星孛于大角熒惑入于東井大角為帝座東井秦之分野不出三年國有大喪大臣戮死願陛下逺追周文脩德以禳之生曰皇后與朕對臨天下亦足以塞大喪之變於是殺皇后梁氏誅太傅録尚書毛貴車騎尚書令梁楞左僕射梁安后安之女孫又誅丞相雷弱兒諸羌悉叛弱兒南安羌酋也生雖在諒闇遊飲荒淫殺戮無道彎弓露刃以見朝臣錘鉗鋸鑿偹置左右未幾后妃公卿已下至于僕𨽻誅五百餘人二年正月嬖臣右僕射董榮言于生曰日蝕之災宜以貴臣應之生曰唯有大司馬國之懿戚不可其在王司空乃誅司空王墮壬戌饗羣臣于太極前殿飲酒樂奏生歌以和之命尚書令辛牢與勸旣而怒曰何不强酒猶有坐者引弓矢射牢殺之於是百僚大懼無不引滿昏醉汚服失冠蓬頭僵仆生以為樂三年四月姚襄遣姚蘭帥衆二萬七千進據黄洛生遣廣平王黄眉東海王堅連節將軍鄧羌等步騎萬五千以討之羌偽不勝引騎而退襄追之至於三原羌廻騎拒襄大戰獲襄襄有駿馬日行千里是戰也馬倒而擒之眉等振旅而歸初長安謡曰東海大魚化為龍男便為王女為公問在何所洛門東生荒暴日滋殘虐彌甚羣臣朝謁漏盡請見生曰日知盡乎湏待飲訖罕有見者或日暮不出百僚饑弊或至申酉乃出臨朝輒怒色厲聲惟行殺戮連月昏醉弗堪省覽或使宫人與男子裸交於殿前引羣臣臨而觀之或生剥牛羊驢馬活爓雞鴨數十為羣放之殿前或生剥死囚面皮令其歌舞觀以為樂宗室勲舊親戚忠良殺害畧盡朝士奔走草野皆曰從虎口出左右得度一日如過十年至於截脛刳胎拉脇鋸頭殺者動有千數生夜對侍婢曰阿法兄弟亦不可信明當除之是夜清河王苻法夢神告曰旦將禍集汝門惟先覺可以免之寤而心悸㑹侍婢來告乃與特進梁平老强汪等帥壯士數百人潜入雲龍門東海王堅與吕婆樓帥麾下三百餘人鼓噪繼進宿衛將士皆捨仗歸堅生猶昏寢不寤堅衆既至生驚問左右曰此輩何等人堅引生置别室廢為越王俄而殺之時年二十三偽諡厲王封子馗為越王太平御覽卷一百二十一
