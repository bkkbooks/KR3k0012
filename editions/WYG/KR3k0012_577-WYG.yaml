body:
  text: 太平御覽卷五百七十七宋李昉等撰樂部十五琴上說文曰琴禁也神農所作洞越練朱五絃周加二絃毛詩關雎曰窈窕淑女琴瑟友之注曰宜以琴瑟友樂之箋云賢女乃與琴瑟之志同也又􅅠柏舟定之方中曰樹之榛栗椅桐梓漆爰伐琴瑟又甫田車牽曰四牡騑騑六轡如琴箋云御群臣使之有禮如御四馬騑騑然使之均調緩急和也又緇衣鷄鳴曰琴瑟在御莫不静好禮記曲禮曰先生之書䇿琴瑟在前坐而遷之戒勿越也又曲禮下曰士無故不去琴瑟又明堂位曰拊搏玉磬揩擊大琴中琴四代之樂器也又檀弓上曰子夏既除䘮而見於孔子與之琴和之而不和彈之而不成聲樂由人心作而曰哀未忘也子張旣除䘮而見與之琴和之而和彈之而成聲作而曰先王制禮不敢不至也又檀弓上曰顔淵之䘮饋祥肉孔子出受之入彈琴而後食之彈琴以徹哀也又曰絲聲哀哀以立㢘㢘以立志君子聽琴瑟之聲則思忠義之臣又雜記曰大功將至辟琴瑟周禮曰雲和之琴冬日至於地上圜丘奏之空桑之琴夏日至於澤中方丘奏之龍門之琴扵宗廟奏之左傳曰初穆姜死使擇美檟自以爲襯與頌琴又曰晉侯觀于軍府見鍾儀問其族曰伶人也與之琴操南音公曰君子也言稱先職不背本也樂操土風不忘舊也又曰初衞侯有嬖妾使師曹誨之琴師曹鞭之公怒鞭師曹三百爾雅云大琴曰離二十絃或傳此是伏羲所制史記曰鄒忌以鼔琴見齊威王恱之舍之右室須臾王自鼔琴鄒忌推戸入曰善哉鼓琴也王勃然不恱去琴按劒曰夫子見之未察何以知其善忌曰大絃濁以溫小絃㢘折以清推之深而釋之舒均諧以鳴大小相盖回邪而不相害是以知其善忌復曰不獨語音夫治國家弭人民皆在其中王又勃然不恱曰若語五音旣信未有如夫子者也若治國家弭人民皆在其中又何為絃桐之間忌曰大絃急以温者君也小絃㢘折以清者相也推之深釋之舒者刑罰審也均諧之鳴者政令一也大小相盖回邪不相害者上下和鳴吏民相親也夫復而不亂者所以治昌連而徑者所以存亡故曰琴音調而天下治治國家弭人民無若乎五音者矣王曰善忌見三月而受相印淳于髠謂忌曰髠有愚志願陳諸前忌曰謹受教髠曰得人者昌失人者亡忌曰謹受命請無離前髠曰狶膏棘軸所以爲滑然而不能運方穿忌曰謹受命請事左右髠曰弓膠昔幹所以爲合然而不能傅合踈逺忌曰謹受命請謹自撫附萬民髠曰狐裘雖弊不可補以黄犬之皮忌曰謹受命謹請擇君子無親小人髠曰大車無轂不能載常任琴瑟無軫不能成五音忌曰謹受命請謹脩法律而督奸吏髠說畢趨出至門而盻其僕曰是人者吾語之微言其應我如響之應聲是人封不久矣居期年封扵下邳號曰成侯史記曰箕子諫紂不聽而被髮佯狂為奴隠而鼔琴以自悲又曰司馬相如素與臨卭令王吉相善臨卭富人卓王孫有女文君新寡好音相如謬與令相重而以琴心挑之相如始之臨卭車騎雍容閑雅甚都及飲卓氏弄琴文君竊從户窺之心恱恐不得當又曰荆軻左把秦王右揕其胷王乞聽琴而死召姬人鼔琴聲曰羅縠輕衣可裂而絶八尺屏風可超而越鹿盧之劒可負而拔王奮而去又曰黄帝使素女鼔五十絃琴帝悲不能自禁破為二十五絃又曰萬石君奮年十五為小吏侍髙祖與語愛其恭敬問曰君何有對曰獨有母不幸失明有姊能鼔琴髙祖乃召其姊為美人以奮為中涓徙其家長安中戚里東觀漢記曰上嘗問宋宏道通之士宏薦桓譚譚善鼔琴喜鄭聲上數聽恱之宏聞坐府上遣吏召譚責問之譚叩頭良久乃遣後上令譚鼔琴譚為之失次上召之宏言其故不復令譚給事後漢書曰初蔡邕在陳留鄰人有以酒食召邕者比往而酒已酣客有彈琴於屏邕在門濳聽之曰以樂召我而有殺心何也遂返將命者告主人曰蔡君至門而去邕素爲邦鄉所宗主人遂自追問其故邕具以吿莫不憮然彈琴者曰我向見螂螳方向蟬蟬將去而未飛螳螂為之一前一却吾心聳然唯恐螳螂之失蟬也此豈爲殺心而形于聲乎邕唯曰此足以當之矣又曰蔡邕字伯喈陳留人性沉審志好琴道以嘉平元年入清溪訪鬼谷先生所居山五曲曲有幽居靈跡毎一曲制一弄三年而成出呈馬融王允董卓等異之晉書曰王敬伯會稽餘姚人洲渚中昇亭而宿是夜月華露輕敬伯鼔琴感劉恵明亡女之靈吿敬伯就體如平生從婢二人敬伯撫琴而歌曰低露下深幕垂月照孤琴空絃益宵淚誰憐此夜心女乃和之曰歌宛轉情復哀願為煙與霧氛氲同共懐晉書曰阮瞻善彈琴人聞其能多往求聽不問貴賤長幼皆爲彈之神氣冲和不知向人所在内兄潘岳每令鼔琴終日達夜無忤色晉中興書曰戴逵字安道少有文藝善鼔琴太宰武陵王晞聞其能琴使人召焉逵對使者破琴曰戴安道不為王門伶人晞怒乃更引其兄述述亦能樂聞命忻然操琴而往逵不樂當世以琴書為娱不逺千里宋書曰蕭思話領左衞將軍嘗從太祖登鍾山北嶺中道有盤石清泉上使於石上彈琴因賜以銀鍾酒謂曰相賞有松石間意又曰衡陽王義季鎮京口長史張邵與戴顒姻通迎來止黄鵠山林澗甚美顒憇扵澗義季亟從之逰顒衣野服為義季鼔琴並新聲變曲皆與世異也又曰衡陽王義季鎮京口戴顒為義季鼔琴並新聲曲其三調逰絃廣陵止息之流皆與世異太祖每欲見之嘗謂黄門侍郎張敷曰當讌戴公山也以其好音長給正聲伎一部顒合何當白鵠二聲以為一調號為清曠又曰陶濳不解聲音而畜素琴一張每有酒適輒撫弄以寄其意蕭子顯齊書曰王仲雄善彈琴當時妙絶江左有蔡邕焦尾琴在尚衣庫上勑五日一給仲雄又曰尚書令栁世隆少立功名晩專以談義自業善彈琴世稱栁公雙璅為士品第一常自云馬矟第一清談第二彈琴第三在朝不干世務垂簾鼔琴風韻清逺甚獲世譽家語曰孔子學琴于師襄子襄子曰吾雖以擊磬為官然能于琴于琴已習可以益矣孔子曰丘未得其為志也有間曰已習其志可以益矣孔子曰丘未得其為人也有間孔子有所繆然深思焉繆然深思貌也有所皇然髙望而逺眺眺見曰丘殆得其為人矣始近黮然黑黮黑貌也頎然長頎長貌也曠然如望羊曠然用志曠逺也望羊視逺貌也奄有四方奄同也文王時三分天下有其二後周有四方文王之功一也非文王其孰能為此師襄子避席攝拱而對曰攝拱兩手薄心君聖人也其傳曰文王操又曰子路鼔瑟孔子聞之謂冉有曰甚矣由之不才也夫先王之制音也奏中聲以為節流入扵南不歸扵北夫南者生育之鄉北者殺伐之域也故君子之音温和居中以養生育之氣憂愁之感不加乎心暴厲之動不存乎體夫然者乃所以為治安之風也小人之音則不然亢厲微末以象殺伐之義中和之感不載乎心温和之動不存乎體夫然者乃所以為亂亡之風也家語曰伯牙鼔琴鍾子期聽之方鼔而志在太山鍾子期曰善哉乎鼔琴巍巍乎若太山少頃之間而志在流水鍾子期復曰善哉乎鼔琴蕩蕩乎若流水鍾子期死伯牙破琴絶絃終身不復鼔琴以為世無足為鼔琴者莊子曰孔子窮扵陳蔡七日不食絃歌鼔琴又曰孔子逰于緇帷之林休坐杏壇之上弟子讀書孔子絃歌鼔琴奏曲未半有漁父者下船而来孔子推琴而起曰其聖歟列子曰瓠巴鼔琴鳥舞魚躍鄭師文聞之從師襄三年不成無㡬見師襄曰已得之矣扵是當春而叩商絃以召南呂凉風忽至草木成實秋而叩角温風徐迴草木發榮夏而叩羽霜雪交下川池暴涸冬而叩徵陽光熾烈堅氷立散將終而逝景風翔慶雲浮甘露降醴泉湧前秦録曰苻堅末年好色寵幸鮮卑有趙整者援琴歌曰昔聞盟津河千里作一曲此自本來清是誰亂使濁又曰北園有棗樹布葉垂重隂外雖多棘刺内實有赤心世說曰王子猷病篤而子敬先亡猷問左右曰何以都不聞消息此以䘮矣語時了不悲便索轝臨殯子敬好琴故以置棺中因大慟曰所謂人琴俱亡扵是乃絶風俗通曰今琴長四尺五寸者法四時五行七絃者法七星大絃為君小絃為臣文王武王加二絃以合君臣之恩劉向列仙傳曰子主者不知何許人也言寗先生顧我一百餘年不還直詣江都王陳辭先生居龍首彈琴是我隣家九代孫琴操曰伏羲作琴長三尺六寸六分象三百六十六日也廣六寸象六合也文上曰池下曰岩池水中也前廣後狹象尊卑也上圓下方法天地也五絃官也大絃君也寬和而温小絃臣也清㢘不亂文王加二絃合君臣恩也宮為君商為臣角為民徵為事羽為物傅𤣥琴賦叙曰齊桓有鳴琴曰號鍾楚莊王有琴曰繞梁司馬相如有緑綺蔡邕有焦尾皆名器也蔡邕焦尾有證甚多相如故取古名目琴耳無其事也不異號鍾世說曰顧彦先平生好琴死後置琴床上張翰直上床彈琴不與孝子語而去語林曰嵇中散夜燈下彈琴忽有一人面甚小斯須轉大遂長丈餘單衣革帶嵇視之既熟乃吹燈滅之曰耻與魑魅争光阮籍樂論曰漢桓帝聞楚琴悽愴傷心倚戸而悲慷慨長息曰善哉為琴若此而足矣說苑曰應侯與賈子坐聞鼔琴聲應侯曰今日琴一何悲也賈子曰夫張急調下故使之悲耳因張者良材也調下者官卑也取夫良材而卑之官安能無悲乎應侯曰善揚雄琴清英曰晉王謂孫息曰子鼔琴能令寡人悲乎息曰今處髙臺􅃉宇連屋重户藿肉漿酒倡樂在前難可使悲者乃謂少失父母長無兄嫂當道獨坐暮無所止扵此者乃可悲耳乃援琴而鼔之晉王酸心哀涕曰何子来遲也蔡邕女訓曰舅姑若命之鼔琴必正坐操琴而奏曲若問曲名則捨琴興對曰某曲坐若近則琴聲必聞若逺左右必有賛其言者凡鼔小曲五終則止大曲三終則止無數變曲無多少厭尊者之聴未厭不敢早止若顧望視也則曲終而後止亦無中曲而息也琴必常調尊者之前不更調張私室若近舅姑則不敢鼔獨若絶逺聲音不聞鼔之可也鼔琴之夜有姊妹之宴則可也通禮纂義曰堯使無勾作琴五絃江表傳曰顧雍以從蔡伯喈學鼔琴伯喈貴異之謂曰卿必成故以名與卿雍伯喈同名由此蔡邕月令章句曰凡絃急則清慢則濁白虎通曰琴禁也以禁止淫邪正人心也韓詩外傳曰孔子南逰適楚至于阿谷之隧有䖏女珮璜而浣孔子曰彼婦人可與言矣抽琴去其軫以授子貢曰善為之辭以觀其語子貢曰扵此有琴而無軫願借子以調其音婦人對曰吾野鄙之人也僻陋而無心五音不知安能調琴子貢致其辭孔子曰丘知之矣山海經曰帝俊生晏龍始為琴瑟又曰東海之外大壑少昊孺帝顓頊扵此棄其琴瑟郭璞曰孺義未詳也蔡琰别傳曰琰字文姬陳留人漢左中郎將蔡邕之女其少聦慧秀異年六歲邕夜鼔琴絃絶琰曰第一絃邕故斷一絃而問之琰曰第四絃邕曰偶得之耳琰曰吳札觀風知興亡之國師曠吹律識南風之不競由此言之何不足知也馬明生别傳曰明生隨神女入石室金床玉几時自彈琴有絃五音普奏聞扵數里幽明録曰劉琮善琴忽得困病許遜曰近蔣家女鬼相録在山石間專使彈琴作樂恐欲致災也琮曰吾常夢見女子將吾宴戲恐必不免遜笑曰蔣姑相愛重恐不能相放耳以為誄之今去當無患也琮漸差文士傳曰嵇康臨死顔色不變謂其兄曰向以琴来不兄曰已至康取調之為太平引曲成歎息曰太平引絶扵今日耶捜神記曰吳人有燒桐以㸑者蔡邕聞其爆聲曰此良桐也因請之削以為琴而燒不盡因名焦尾琴有聲也揚雄琴清英曰昔者神農造琴以定神齊媱􅀈去邪欲反其天真者也舜彈五弦之琴而天下治文武加二絃以合君臣之恩也太平御覽巻五百七十七
