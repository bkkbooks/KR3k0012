body:
  text: 太平御覽卷四十一宋李昉等撰地部六㑹稽山天台山茅山廬山羅浮山蔣山九疑山玉笥山㑹稽山吴越春秋曰禹廵天下歸還越㑹稽修治國之道以㑹計名山又曰禹廵天下歸還大越登茅山以朝四方羣臣觀中州諸侯防風後至斬以狥衆示天下悉以臣屬也乃大㑹計治國之道更名茅山曰㑹稽越絶書亦載傳曰勾踐以甲楯五千保於㑹稽史記曰始皇本紀曰三十七年上㑹稽祭大禹望于南海而立石刻頌秦徳九土文括畧曰禹禪此山一石穴委曲黄帝藏書於此禹得之孔靈之㑹稽志曰㑹稽山在縣東南其上石狀似覆釡禹夢𤣥夷㑹蒼水使却倚覆釡之上是也今禹廟在下秦始皇嘗配食此廟又曰山有石室云是仙人射堂東髙岩有射的石還望的的如射侯形圓視之如鏡士人常以占糓食貴賤射的明則米賤暗則米貴諺曰射的白斛一百射的𤣥斛一千夏侯曽先志曰此山有石帆壁立臨川湧石亘山遥望芃芃有似張帆也又有懸巖名為射堂傳云仙人常射於此使白鶴取箭此是㑹稽東峰郡國志曰山上有草莖赤葉青人死佩之便活山海經曰㑹稽之山四方上多金玉下多碔砆上有禹塜及井天台山臨海經曰天台山上超然出天山有八重視之如一帆髙一萬八千丈周迴八百里又有飛泉懸流千丈似布故登真隠訣云此山有桐栢繞四明東南三百里啓蒙記注曰天台山去人不逺路經福溪水險清泠前有石橋路逕不盈尺長數十丈下臨絶㝠之澗唯忘其身然後能躋躋者梯岩壁捫蘿葛之莖度得平路見天台山蔚然綺繡列雙嶺於青霄上有瓊樓玉閣天堂碧林醴泉仙物畢具晋隠士白道猷得過之獲醴泉紫芝靈藥神異經曰餘姚人虞洪入山採茗遇一道士牽三青羊引洪至天台瀑泉曰吾丹丘子也聞子善具飲常思見惠山中有大茗可以相給祈子他日有甌犧之餘不相遺也因立奠祀後常與家人往山獲大茗焉晋書曰許邁與王羲之書云自山隂至臨海多有金庭玉堂仙人芝草異苑曰㑹稽天台山遐逺自非忽生忘形不能躋也赤城阻其逕瀑布激其衢石有莓苔之險淵有不測之深幽明録曰漢明帝永平五年剡縣劉晨阮肇共入天台山取榖皮迷不得返經十餘日糧盡飢餒殆死遥望山上有一桃樹大有子實而絶巖䆳澗了無登路攀葛捫蘿至上噉數枚而飢止體充復下山持杯取水飲步進漸見蕪菁葉從山腹流出甚鮮新復一杯流出有胡麻飯相謂曰此處去人徑不逺度山出一大溪溪邊有二女子資質妙絶見二女持杯出便笑曰劉阮二郎捉向所失流杯來晨肇既不識之二女便呼其姓如似有相見忻喜問來何晩耶遂同還家家皆瓦屋南壁下各有一大牀及東壁皆施綘羅帳角懸鈴上金銀交錯牀頭各十侍婢便勑云劉阮二郎經涉山阻向雖得瓊室猶尚虚弊可速作食有胡麻飯山羊脯甚美食畢行酒有羣女來各持三五桃子笑而言賀女壻來酒酣作樂劉阮忻怖交并至暮令各就一帳宿女徃就之言聲清婉令人忘憂至十日後求還去女云君已來是宿縁所牽何復欲還耶遂留半年氣候草木是春時百鳥呼鳴更懐土求歸甚苦女曰當如何遂呼前來女子有三四十人集㑹奏樂共送劉阮指示還路既出親舊零落邑屋改異無復相識問得七世孫傳聞上世入山迷不得歸孔靈符㑹稽記曰赤城山土色皆赤岩岫連沓状似雲霞懸溜千仞謂之瀑布飛流洒散冬夏不竭山谷絶澗峥嶸無底長松葛藟幽藹其上又曰赤城山内則有天台靈嶽玉室璿臺又曰天台山舊居五縣之餘地五縣者餘姚鄞剡台寧也孫綽天台山賦曰濟猶谿而直進落五界而􅌺征續捜神記曰㑹稽剡縣民袁相狼碩二人獵經深山重嶺甚多見一羣山羊六七頭遂經一石橋橋甚狹而峻羊去狼等亦隨渡向絶崖崖正赤壁立名曰赤城上有水流下廣狹如疋布剡人謂曰瀑布羊徑有山穴如門豁然而過既入内甚平敞草木皆香有一小屋二女子住其中年皆十五六容色甚美著青衣一名瑩珠見二人至忻然云早望汝來遂為室家忽二女出行云復有得壻者徃慶之曵屐於絶岩上行琅琅然二人思歸潜去歸路二女追還已知乃謂曰自可去乃以一綘囊與狼語曰慎勿開也扵是乃歸後出行家人開其囊囊如蓮花一重去一重復至五重中有小青鳥飛去狼還知此悵然而已後狼於田中耕家依常餉之見在田中不動就視但有殻如蟬蜕也茅山茅君内傳曰句曲山秦時名為華陽之天三茅君居之因而為名外金山因擅為號矣周時名其源澤澤為句曲之穴案山形曲折後人名為句曲之山山間有金陵之地四十七八頃是金壇之地肺也居其地必得度世許邁列傳曰延陵之茅山是洞庭西門潜通五岳茅山記曰大茅山獨髙處𤣥帝命東海神埋大銅鼎扵山頂深八尺上有盤石鎮之顓頊水徳故號𤣥帝又曰秦始皇三十七年逰㑹稽還扵此山北埋白璧一雙深七尺李斯刻篆璧文云始皇聖徳平章山河廵狩蒼州勒石素壁又曰王莽地皇三年七月遣使者章􅀢陳獻銅鐘五口黄金百鎰贈之於三茅君又曰中茅山其司山獨處司命君埋玉門丹砂六十斤鎮扵此山深二丈上有盤石鎮之其山左右泉流下皆小赤色飲之延年益夀左真人就司命乞得一十二斤以合九華丹山頂石壇石案香爐今在焉今三陽有姓閬多有壽長者蓋太陽北陽朱陽三析耳又曰小茅山漢光武帝以建武元年三月遣使吳倫賫金五十斤陳獻三茅君今山頂有金處存焉上有聚石又曰開城中髙修女真侯仙姑絶榖六十餘年夀逾百嵗帝嘗息此山洞入府獲覩徵祥又曰咸通中東海蓬萊觀龔道者初入此山㫁榖茹芝十餘年後因正月朔旦焚香洞門恍惚之間得入洞中經由一十三日備見洞府岩壁山川星辰日月靈異難詳又曰昔仙一人捧一大石臨險峻是謂神設一人推之若欲崩墜百人推之亦復如故真誥曰中茅前一長嶺直拄大茅山後古多積金寳故因此著名真白依東流水合神丹道壇竈存叠玉峰大茅山東南三山積叠亦有洞穴俗多呼叠石石與玉猶為同類山作三角又呼三角山殊無影響今去葛仙翁壇相近廬山廬山記曰山髙二千三百六十丈周迴二千五十里東南三十二里張僧鑿潯陽記云匡裕周武王時人屢逃徵聘結廬此山後登仙穹廬尚在弟子等呼為廬山又名匡山蓋稱其姓又按豫章匡裕字君孝共鄱陽令吳芮佐漢定天下封裕鄱陽廬君兄弟七人皆好道術遂寓精爽於洞之中故世謂廬山漢光武南廵時親見神靈封裕為文明公一云匡裕漢人一云周武時人未知誰是遠法師廬山記曰山海經曰廬江三天子都有匡裕先生者出自殷周之際隠遁避世潜居其下或云裕受道扵仙人而共逰其嶺遂記室懸岫即岩成舘故時人謂其所止為神仙之廬山南有石門似雙闕壁立千餘仞而瀑布流焉述異記曰廬山有三石梁長數千丈廣不盈尺俯盻杳然見底咸康中江州刺史庾亮迎吳猛擕弟子登山逰觀因過此梁見一老公坐住樹下以玉杯承甘露與猛猛遍與弟子又進至一處見崇臺廣厦玉宇金薤琳琅焜燿煇彩眩目多珍寳玉器不可識見數人與猛共言若舊相識周景式廬山記曰登廬山望九江以觀禹之迹其兹峯乎東南隠諸嶺不得駢瞩自廬山人迹所暨逈望無復出此者每雨其下成潦而上猶皎日逺法師逰山記曰自托此山二十二載凡再詣石門四逰南嶺東望香爐秀絶衆形北眺九疑流神覧視四岩之内猶觀之掌焉傳有石井方湖足所未踐張野廬山記曰廬山天將雨則有白雲或冠峯巖或亘中嶺俗謂之山帶不出三日必雨潯陽記曰廬山頂上有一池水池中有三石鴈霜落則飛山北有五老峰於廬山最為峻極横隠蒼穹積石巖巉逈壓彭蠡其形勢逈如中虞鄉縣前五老之形故名之廬山記曰紫霄峯秦始皇曾登之與雲漢相接故名之髙處有禹刻大如掌背隱起焉又曰王敦誅術士吳猛附船日行千里追者但見龍附其船猛令船人閉目人聞曵撥林木之聲懼而開目龍知人見遂委舟山頊今艑底在紫霄峯上又曰陶潛栗里今有平石如砥從廣丈餘相傳靖節先生醉卧其上在廬山南神仙傳曰董奉字君異侯官人少有道術居此山多救人疾苦種杏於此山十數年杏有十數萬株結實奉乃多倉廪宣言人買杏多少不湏來報但一噐榖一噐杏多者則為猛獸所害人懼無敢欺者得榖悉賑貧乏羅浮山南越志曰此山本名蓬萊山一峯在海中與羅山合因名焉山有洞通句曲又有璿房瑶室七十二所裴淵廣州記曰羅浮二山隠伏唯石樓一路可登晉中興書曰葛洪上羅浮山錬丹在山積年忽與廣州刺史鄧岱書云當欲逺行岱得書狼狽而洪已亡顔色如平生體輕弱如空衣時咸以為神仙茅君内傳曰羅浮山之洞週迴五百里名朱明燿真之天羅浮山記曰羅羅山也浮浮山也二山合體謂之羅浮在層城博羅二縣之境有羅水南流流于海舊說羅浮髙三千丈長八百里有七十二石室七十二長溪神湖神禽玉樹朱草相傳曰浮山從㑹稽來今浮山上猶有東方草木又曰鮑靚字子𤣥上黨人博究仙道為南海太守晝臨民政夜來羅浮山騰空往還裴淵廣州記曰羅山隠伏唯石樓一路時有閒逰者少得至山際大樹合抱極目視之如薺菜在地山之陽有一小嶺云蓬萊邊浮來者此因名號羅浮名山畧記曰羅浮山有阿育王塔三十二所雜道書南浮郡傳曰羅山諸仙人所居之山也惡人不得至上惡人至山有獸即擊之投扵岩下蔣山地輿志曰蔣山舊名金陵山因此山立名金陵徐爰釋門畧曰諸葛亮以為鍾山龍盤即蔣山也金陵圖曰後漢末蔣子文為金陵尉逐盗鍾山北為賊傷額而死常謂青骨死當為神至吳大帝立都子文乗白馬搔頭執鳥羽見形故令史曰吳王為立廟不爾當百姓大疫大帝猶未信又翌日見於路當令飛蟲入人耳後如其言帝乃立廟鍾山封子文為蔣侯名為蔣山是也沈約宋書云蕭思話領左衛常從太祖登鍾山北嶺石上彈琴因賜以銀鍾謂曰相賞有松石間意焉梁書曰武帝時旱甚詔於蔣山神求雨十旬不降帝怒命載荻焚廟并其神影日既午即將起火當神上忽有雲如繖蓋湏㬰驟雨堂中宫殿皆自震動帝詔使停火山謙之丹陽記曰京師南北並有連嶺而蔣山獨隆穹峻異其形像龍實揚都之鎮也孫權𦵏山南因名曰孫陵又曰出建陽門望鍾山之與覆舟似上東門首陽之與北邙也金陵地記曰秦始皇時望氣者云金陵有天子氣埋金玉雜寳於鍾山乃㫁其地更名曰秣陵又曰蔣山本少林木東晋令刺史罷還鄉種松百株郡五十株又曰周顒字彦倫隠居蔣山出為臨海令罷還都欲逰舊居孔稚珪作北山移文以譏之曰鍾山之英草堂之靈馳烟驛路勒移山庭九疑山山海經曰九疑山舜所𦵏焉永陵在長沙零陵界秦始皇三十七年十二月行至零陵望祀虞舜扵九疑也漢書曰武帝元封五年南廵狩至扵盛唐望禮虞舜扵九疑山海經曰南山蒼桐之丘蒼桐之淵其中有九山焉舜之所𦵏在長沙零陵界湘中記曰九疑山在營道縣九山相似行者疑惑因名九疑盛𢎞之荆州記曰九疑山盤基數郡之界連峰接岫競秀争髙含霞捲霧分天隔日郡國志曰九疑山有九峯一曰朱明峯二曰石城峯三曰石數峯形如樓四曰娥皇峯下有舜池池傍春日百鳥生卵人取之則迷路致不可得五曰舜源峯比衆峯最髙上多紫蘭六曰女英峯舜墓於此峯下七曰蕭韶峯峯下即象耕種之處八曰桂林峯馬明生遇安期授金液神丹之處九曰梓林峯周義山字秀通開石函得李山經讀之得仙也有九水七則歸流嶺北二則翻注廣南淮南子曰九疑之南陸事寡而水事多王歆之神境記曰九疑是舜之𦵏處也有青澗中有黄色黄蓮花芳氣盈谷此山之表復有一峯望之似人形暎出雲端如積玉髙扵諸山頂有飛泉如帶舜廟在山之陽玉笥山福地記曰此山地土肥美宜榖避兵又天監起居注云廬陵太守王希􅅨於此山之龍淵獲劍二口太真白龜山經曰本名羣玉山胚渾初分此山積五色氣而成形覩若羣玉之狀皆虚無之貌浮焉至庖犧氏之時山乃堅實委地變為五色遂號為群玉山至夏殷之世人多採其玉百靈慮損其山形遂化為五色土石而生之叢木今溪澗之中五色碧赤之石皆古變色玉笥山記曰漢武好仙察衆仙之迹知此山為靈感之司遂以山頂致降真壇日夕祈禱天乃降白玉笥置壇上武帝遣使取至其壇則飄風大振卷玉笥而去因封為玉笥山又漢武時邑民伐材於山為廨舘闕殿中梁一條邑民相謂曰欲精仙舘在其梁棟未可以凡木為之經數旬未獲忽一夜震雷風烈天降白玉梁一條光瑩耀目至今下有玉梁觀至魏武時遣人取之至其山門亭午之際雷霆大震化為白龍擘烟霧而去晋永嘉中有人見在都木岩下梁黄門侍郎蕭子雲建清虛舘兼撰立舘碑經五載忽有一人來謂之曰舘之東北有洞曰都木坑水自東注可以乆居矣子雲遂徙家居之後全家隠洞中不知所之大厯初有道士謝修通者宜春人也入山不出凡四十年如野人後遇一人引入溪源扵溪中得一碑長三尺乃蕭侍郎清虚之舘碑更行行半里見宅基古磚瓦石皆異遂結庵居之長慶初入都木坑偶見一宅重扉湏㬰有一青衣童子招修通入見一人紫綬峩冠佩劍立堂之左一人碧綬素簡立堂之右童子曰左者蕭君右者隗君即梅福也通乃叩頭再拜求住修通好食小蒜二君曰子乃葷腥之人安能住此與通嘉禾五穗松葉十斤令頓服之服之中半二君乃令歸精神似不足眼目睢盱門人相謂曰師修行不出凡七十年為邪氣所亂大道何昧昧通至寳厯初夢人告曰造一精舍待君既寤且曰我當死矣七日而卒門人求備棺櫬空見衣冠而已年九十八太平御覽卷四十一
