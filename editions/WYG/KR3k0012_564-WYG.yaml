body:
  text: 太平御覽卷五百六十四宋李昉等撰樂部二雅樂中傳曰呉季札来聘請觀於周樂使工為之歌周南召南曰美哉始基之矣猶未也猶有商紂未盡善也然勤而不怨矣為之歌􅆁鄘衛曰美哉淵乎憂而不困者也吾聞衛康叔武公之德如是其衛風乎為之歌王曰美哉思而不懼其周之東乎為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱乎大風也表東海者其太公乎為之歌豳曰美哉蕩蕩乎樂而不滛其周公之東乎為之歌秦曰美哉此之謂夏聲夫能夏則大大之至也其周之舊乎為之歌魏曰美哉渢渢乎大而婉儉而易行以德輔此則明主也為之歌唐曰思深哉其有陶唐氏之遺風乎不然何其憂之逺也非令徳之後誰能若是為之歌陳曰國無主其能乆乎自鄶曹以下無譏焉為之歌小雅曰美哉思而不貳怨而不言其周徳之衰乎猶有先王之遺民焉為之歌大雅曰廣哉熈熈乎熈熈乎樂聲也曲而有直體其文王之德乎為之歌頌曰美哉周之盛也其若此乎見舞韶濩者殷湯樂也曰聖人之𢎞猶有慙徳聖人之難也見舞大夏者禹之樂也曰美哉勤而不德非禹其誰能及之見舞韶箾者舜之樂也曰至矣哉大矣如天之無不覆也如地之無不載也雖甚盛德其蔑以加此矣若有他樂吾不敢請已又曰宋公享晉侯於楚丘請以桑林桑林殷天子樂名也荀罃辭荀偃士匄曰諸侯宋魯於是觀禮宋王者後魯以周公故皆用天子禮樂故可觀也魯有禘樂賓祭用之禘三年大祭則作四代之樂也别祭羣公則用諸侯樂也宋以桑林享君不亦可乎言俱天子樂也舞師題以旌夏旌夏大旌也題識也以大旌表識其形列也晉侯懼而退入於房去旌卒享而還及著雍疾著雍晉地卜桑林見祟見於卜兆也荀偃士匄欲奔請禱焉奔走還宋禱也荀罃不可曰我辭禮矣彼則以之猶有鬼神於彼加之言自當加罪於宋晉侯有間又曰晉侯與諸侯伐鄭鄭人賂晉侯以師悝師觸師蠲皆樂師名歌鍾二肆肆列也懸十六為一肆三十二枚也及其鏄鍾女樂二八晉侯以樂之半賜魏綘曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之魏絳於是乎始有金石之樂禮也大夫有功則賜樂也論語曰師摯之始闗雎之亂洋洋乎盈耳哉魯太師摯成闗雎之聲而首理其亂者洋洋乎盈耳聴而美之又曰樂云樂云鐘鼓云乎哉言樂不但崇此鐘鼓而已所貴者貴其移風易俗也又曰子語魯太師樂曰樂其可知也始作翕如也始作謂金作時人皆翕如變動之貎從之純如也從讀曰從從之謂八音皆作純如咸動之貌皦如也繹如也以成皦如使清濁别之貌也繹如志意條逹又曰子謂韶盡美矣又盡善也韶舜樂也美舜以徳禅于堯又盡善謂太平也謂武盡美矣未盡善也武周武王樂美武王以此功定天下未盡善致太平孝經曰移風易俗莫善於樂爾雅曰宫謂之重商謂之敏角謂之經徴謂之迭羽謂之桺郭璞注皆五音之别名未詳其義史記曰趙簡子疾五日不知人扁鵲曰昔秦繆公嘗如此五日不知人七日乃寤語大夫曰我之帝所甚樂與百神逰於鈞天廣樂九奏萬舞不類三代之樂其聲動人心又曰樂所以上事宗廟下變化黎庶又曰凢樂者使萬民感蕩滌邪穢斟酌以飭厥性又曰太史公曰音樂者所以動盪血脉通流精神而和正心也又曰凢音由於人心天之與人相通如影之象形響之應聲也故為善者天報之以福為惡者天報之以殃其自然者也故舜作五絃之琴歌南風之詩而天下治紂為朝歌北鄙之音身死國亡舜之道何𢎞也紂之行何隘也夫南風之詩生長之音也舜樂好之樂天下同意得萬國之歡心故得天下也夫朝歌者不時也北者敗也鄙者陋也紂樂好之萬民殊心諸侯不附百姓不親天下叛之故身死國亡漢書曰聲者蕩滌人之邪意全其正性也商章也物成熟可章度也角觸也物觸地而出戴芒角也宫中也居中央暢四方唱始施生為四聲納也徴祉也物盛大而蕃祉也羽宇也物聚藏宇覆之也恊之五行則角為木五常為仁五事為貌商為金為義為言徴為火為禮為視羽為水為智為聽宫為􅁟為信為思以君臣民事物言之則宫為君商為臣角為民徴為事羽為物又曰樂者歌九德誦六詩是以薦之郊廟則鬼神享之也又曰夫樂通神明安民庶故聽者無不虛己竦神悦而成流是以海内徧知上徳被服其風光輝日新化上遷善而不知所以然至於萬物不夭天地順而嘉應至故詩曰磬管鏘鏘降福穰穰魏志曰太祖以杜夔爲軍謀祭酒􅄁太樂事因令創制雅樂䕫善鍾律聰思過人絲竹八音靡所不能唯歌舞非所長散騎侍郎鄧靜尹商善詠雅樂歌詩尹臣能歌宗廟郊祀之曲舞師馮肅曉知先代諸舞揔究硏精逺考經語近採故事教習講律備作樂器復先代之樂皆自䕫始也吳録曰呉中目周瑜為周郎瑜精意音樂三爵之後其有闕誤瑜必知之而顧時吴人謡曰曲有誤周郎顧宋書臧喜傳曰武帝入京城進至建鄴桓𤣥走武帝使喜入収圖書器物封府庫有金飾樂器武帝問喜卿欲此乎喜正色曰主上幽逼播越非所將軍首建大義勤勞王室喜雖復不肖實無情於樂武帝笑曰聊以戯耳齊書蕭惠基傳曰自宋大明以来聲技之所尚多鄭衛而雅樂正聲鮮有好者惠基解音律尤好三祖曲及相和歌毎奏輙賞悦崖鴻十六國春秋曰後秦録姚興傳曰濟南公邕字子和興之弟也尤善音樂皆能度其盈虛増改曲調世咸傳之號濟南新調後魏書曰阮孚封萬年鄉男永安末樂器殘缺莊帝命孚修之上書曰昔太和中故中書監髙閭太平令公孫崇修造金石數十年間乃奏成功時大集儒生考其得失太常卿劉芳請别營造乆而方就復召公卿量校合否論者沸騰莫有適從登被㫖勅並勅施用往歲大軍入潞戍馬交馳所有樂器亡失垂盡臣至太樂署問太樂令張乾龜等云承前已來置宮懸四箱筍虡十六架編黃鍾之磬十四雖器名黃鍾而聲實夷則考之音制不甚諧韻姑洗懸於東北太簇編於西北㽔賓列於西南並皆器象差繆調律不和又有儀鍾十四簴懸架首初不扣擊今便刪廢以從正則臣今據周禮鳬氏修廣之規㲈氏倨句之法吹律求聲叩鍾求響損除繁重討論實錄依十二月爲十二吕各凖辰次當位懸設角聲既備用擊奏則爲還相爲宮之義又得律吕相生之體令量鐘磬之數各以下三架爲定奏可于時搢紳之士咸徃觀聽靡不咨嗟嘆服而反太傅錄尚書長孫承業妙觧聲律特復稱善隋書曰文帝性恭儉不好聲技嘗遣牛𢎞定樂帝曰非正聲雅樂清商九部舞皆令罷之又曰萬寳常不知何許人也父大通従梁将王琳歸於齊後復謀還江南事泄伏誅由是寳常被配為樂戶因而妙逹鍾律遍工八音造玉磬以獻於齊又嘗於人方食論及聲調時無樂噐寳常因取前食噐及雜以箸扣之品其髙下宫商畢備諧於絲竹大為時人所賞然厯周洎隋俱不得調開皇初沛國公鄭譯等定樂初為黄鍾調寳常雖為伶人譯等毎召與議然言多不用後譯樂成奏之上召寳常問其可否寳常曰此亡國之音豈陛下之所宜聞上不悦寳常因極言樂聲哀怨滛哇非雅正之音請以水尺為律以調器上從之寳常奉詔遂造諸樂噐其聲率下鄭譯調二律并撰樂譜六十四卷具論八音旋相為宫之法改絃移柱之規為八十四調一百四十四律變化終於一千八聲時人以周禮有旋宫之義自漢魏以来知音者皆不能通見寳常特創其事皆哂之至是試令為之應手成曲無所凝滯見者莫不嗟異於是損益樂噐不可勝記其聲雅淡不為時人所好太常善聲者多排毁之又太子洗馬蘇䕫以鍾律自命尤忌寳常䕫父威方用事凢言樂者皆附之而短常數詣公卿怨望蘇因詰寳常所為何所傳受㓜有一沙門謂寳常曰上雅好符瑞有徴祥者上皆悦先生當言從胡僧授學云是佛像菩薩所傳音律然則上必恱先生所為可以行矣寳常然之遂如其言以荅威怒曰胡僧所傳仍是四夷之樂非中國所宜行也其事竟寢寳常聽太常所奏樂泫然而泣人問其故寳常曰樂聲滛厲而哀天下不乆相殺盡時四海全勝聞其言者皆謂為不然大業之末其言卒騐寳常貧無子其妻因其卧疾刼盗其資物逃寳常饑餧無人贍竟餓而死及將死也取其所著書焚之曰何用此為見者於火中採得數卷見行於世時論哀之開皇之世鄭譯何妥盧賫蘇䕫蕭吉並討論文籍撰著樂書皆當世所為用至於天然識樂不及寳常逺矣安馬駒曹妙逹王長通郭金樂等能造曲為一時之妙又習鄭聲而寳常所為皆歸於雅此軰雖公議不附寳常然皆心服謂以為神又曰文帝開皇六年尚因周樂命工人齊樹提撿校樂府改换聲律益不能通俄而沛公鄭譯奏上請更修正於是詔太常卿牛𢎞國子祭酒辛彦之國子􅀶士何妥等議正樂然淪謬既乆積年議不定帝怒曰我受天命七年樂府猶歌前代功德命治書侍御史李諤引𢎞等下將罪之奏曰武王尅殷至周公相成王始制禮樂所事體大不可速成意乃觧又曰開皇中亡齊伎曹妙逹安馬駒等以藝逰王公之家新聲變曲傾動當世天子不能禁也帝令妙逹理郊廟樂咸冩傾杯行天之聲萬寳常觀於樂署部伎樂中惟百濟樂清有歌人間謳謡之曲為耳目之娯者不可勝載唐書曰鄭從讜在汴時以兄處誨嘗爲鎭帥殁於是郡訖一政受代不於署舉樂又曰王涯爲太常卿文宗以樂府之音鄭衛太甚欲聞古樂命涯詢於舊工取開元時雅樂選樂童按之名曰韶樂樂曲成涯與太常丞李廓少府監庾承憲押樂工獻於梨園亭帝按之於㑹昌殿上恱賜涯等錦綵又曰乾元初上謂于休烈曰古聖人作樂以應天地之和以合隂陽之序則人不夭札物不疵厲且金石絲竹之器也今比親享郊廟每聽懸樂宫商不備或鍾聲失度集樂工考磬來朕當於内自定太常集樂考試數日審知差錯然後令别鑄造磨刻及事畢上臨三殿親試考撃皆合五音羣臣稱慶又曰祖孝孫隨毛爽授律皆得爽之法一律而生五音十二律而爲六十音因而六之故有三百六十音以當一歲之日又祖性沉重依淮南本數用京房舊術求之得三百六十律各因其月律而爲一部以律數爲母以一中氣所有日爲子以母命子隨所多少分直歲以配七音起於冬至以黃鍾為宫應鍾為變宫㽔賔爲變徴其餘日建皆依運行每日各以本律為宫旋宫之義由斯著矣武徳之樂漢剋暴秦之所從作也言以武徳除亂使天下樂行也四時之樂文帝樂也言四海天下和平也又曰正月享西京太廟太樂令裴知古謂萬年令元行冲曰金石諧和當有吉慶之事其在唐室子孫乎其月中宗即位復國爲唐唐國史補曰宋沉善音律太常乆亡徴調沉考鐘律得之太平御覽卷五百六十四
