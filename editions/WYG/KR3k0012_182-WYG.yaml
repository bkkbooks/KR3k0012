body:
  text: 太平御覽卷一百八十二宋李昉等撰居處部十門門上説文曰門捫也在外為人所捫摸也從二户象形也閶闔天門也闔門扉也閈門也䦳門嚮也闤闠市門也閽門豎也閽昏也門常昏閉故曰閽即守門𨽻人也閻里中之門也易說卦曰艮為門爾雅曰閍謂之門注詩祝祭於祊是也又曰正門謂之應門宫中之門謂之闈謂相通小門也韓陽天文要集角天門也風俗通曰閈城外郭内里門也禮記注云天子五門臯門雉門庫門應門路門魯有庫雉路三門則諸侯三門也漢制内至禁省為殿門外出大道為掖門應劭注漢書曰掖者言在司馬門之旁掖王者行幸設車宫轅門周禮曰帷宫旌門無宫則供人門鄭注周官云次車為藩則仰車轅以表門張帷為宫則樹旌以表門陳列周衛則立長人以表門又曰掌舍掌王門之舍設梐枑再重設車宫轅門為壇壝宫棘門為帷宫則供人門轅門為次以為藩仰車以為門人門謂以人為衞立長人以為門又曰師氏掌以媺詔王居虎門之左司王朝注云虎門路寢門也王日視朝於路寢門外畫虎焉以明勇猛於守宜也尚書曰舜賔于四門四門穆穆又曰闢四門詩曰迺立臯門臯門有伉迺立應門應門鏘鏘又曰北門篇名刺士不得其志也言衞之忠臣不得其志耳出自北門憂心殷殷又曰東門之墠茹藘在阪又曰衡門篇名誘僖公也愿而無立志故作是詩以誘掖其君也衡門之下可以棲遲詩義問曰横一木作門而上無屋謂之衡門易曰重門擊柝以待暴客又曰出門同人无咎禮記曰凢與客入者每門讓於客客至於寢門則主人請入為席然後出迎客主人入門而右客入門而左又曰生男懸弧于門左又曰立不中門又曰婦人送迎不出門又曰兩君相見揖讓而入門入門而縣興又曰大夫士出入君門由闑右不踐閾又曰入門而問諱又曰孔子負手曳杖逍遥於門又曰天子諸侯臺門此以髙為貴者又月令曰孟秋之月其祀門祭先肺秋隂氣出故祀之於門所以順隂氣也又月令曰孟冬之月戒門閭修鍵閉左傳啓塞從時門户橋道謂之啓城郭墻塹謂之塞皆開閉之急不可一日而闕也又襄二年王叔之宰曰蓽門圭竇之人而皆陵其上難為上矣蓽門柴門圭竇小户穿壁上銳下方狀如圭也又曰新作髙門書不時也注本名稷門公更髙之改髙門也又曰鄭大水龍鬬於時門之外洧淵又曰公及邾師戰敗績邾人獲公胄懸諸魚門杜預曰魚門乃邾城門也又曰楚子囊圍宋門于桐門又曰楚子為陳夏氏亂遂入陳殺夏徵舒轘諸栗門轘車裂也栗門陳城門也論語曰子擊磬於衞有荷蕢而過孔氏之門者曰有心哉擊磬乎又曰邦君樹塞門管氏亦樹塞門又鄉黨曰入公門鞠躬如也史記曰金馬門者署門也門旁有銅馬故謂之曰金馬門又曰太史公曰余過大梁求所謂夷門者乃大梁城東門也又曰下邽翟公有言始翟公為廷尉賔客闐門及廢也門外可設爵羅翟公復為廷尉客欲往交公乃大署門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見又曰萬石君子慶為内史慶歸入外門不下車萬石君聞之不食慶恐肉袒請罪不許舉宗及兄建肉袒萬石君譲之曰内史貴人入閭里里中長老皆走匿而内史坐車中自如固當乃謝罷慶慶及諸子弟入里門趨至家又曰吕不韋説子楚曰吾能大子之門子楚笑曰盖自大子之門顧乃大吾門不韋曰吾門待子門而大耳漢書曰太液池有璧門又曰陳平家貧負郭窮巷以席為門然門外多長者車轍又曰魏勃家貧欲見齊相曹參無以自逹常早起掃其門人問故勃曰欲見相君無因故為子掃其門乃見參參用為舍人又曰梅福居家常以讀書飬性為事至元始中王莽顓政福一朝棄妻子去九江至今傳以為仙其後人有見福於㑹稽者變姓名為呉市門卒云又曰于定國父于公其閭門壊父老方共治之于公謂曰少髙大閭門令容駟馬髙車我治獄多隂徳未曽有寃子孫必有興者至于定國為丞相永為御史大夫封侯又曰張釋之為公車令頃之太子與梁王共車入朝不下司馬門如淳曰宫衞令諸出入殿門公車司馬門皆下不如令罰金四兩於是釋之追止太子梁王毋入殿門遂劾不下公門不敬奏之薄太后聞之文帝免冠謝曰教兒子不謹太后使使承詔赦太子梁王然後得入文帝繇是竒釋之拜為中大夫又曰鄭崇為尚書上謂曰君門如市人何以欲禁切主上師古曰言請求者多交通賔客崇對曰臣門如市臣心如水又曰鄒陽諫呉王曰今臣盡智畢議易精極慮則無國不可奸飾固陋之心則何王之門不可曳長裾乎又曰王尊為東平相是時東平王以至親驕奢不奉法度傅相連坐師古曰前任傅相者頻坐王得罪及尊視事奉璽書至庭中王未及出受詔尊持璽書歸舎食已乃還致詔後謁見王太傅在前説相鼠之詩師古曰詩鄘篇名刺無禮之詩也其辭曰相䑕有皮人而無儀人而無儀不死何為相視也言視䑕有皮雖處髙顕之地偷食茍得不知亷耻人而無禮儀亦與䑕同不如速死也尊曰毋持布鼔過雷門師古曰雷門㑹稽城門有鼔越擊此鼓聲聞洛陽故尊引之也布鼔謂以布為鼓故無聲王怒起入後宫尊亦直趨出就舍又曰盖寛饒字次公為諫議大夫行郎中户將事師古曰百官公卿表郎中令属官有郎中車户騎三将盖各以所主為名户将者主户衞劾奏衞將軍張安世子侍中陽都侯彭祖不下殿門師古曰過殿門不下車也并連及安世居位無補彭祖時實下殿門寛饒坐舉奏大臣非是左遷為衛司馬又曰蕭望之署小苑東門候時王仲翁出入從倉頭廬兒顧謂望之曰不肯錄錄反抱關為師古曰錄錄謂循常也言望之不能隨例捜索以為牾執政不得大官而守門望之曰各從其志又曰鉤弋夫人大有寵有娠十四月乃産是為昭帝武帝曰昔堯十四月而生今鉤弋亦然乃命其門曰堯母門范曄後漢書曰孔融云鄭君里門四方所由觀禮其廣令容髙車結駟馬名為通徳之門又曰郅惲字君章為上東門候帝常獵夜還惲拒門不開帝乃廻從中東門入賜惲布貶中東門候又曰李膺傳曰是時朝廷日亂綱紀頽壊膺獨持風裁以聲名自髙士有被其容接者名為登龍門以魚為喻龍門河水所下之口在今綘州龍門縣辛氏三秦記曰河津一名龍門水陸不通魚鱉之屬莫能上海大魚薄集龍門下數千不得上上則為龍袁宏漢紀曰建初二年間有司依舊典奏封諸舅太后詔曰前過濯龍門上見外家車如流水馬如龍吾不譴怒之但絶其歳用後漢書馬援傳曰孝武皇帝時善相馬者東門京鑄作銅馬法獻之有詔立馬於魯班門外則更名魯班門為金馬門又曰赤眉入長安更始單騎走從厨門出三輔黄圖洛城門王莽改曰建子門内有長安厨官俗名之為厨城門今長安故城北面之市門是也諸婦從後連呼曰陛下當下謝城更始即下拜復上馬去郭祚傳曰祚遷尚書右僕射故事令僕中丞騶唱而入宫門至於馬道及祚為僕射以為非盡敬之宜言於世宗帝納之詔御在太極唱至止車門御在朝堂至司馬門騶唱不入宫自此始也又曰張湛建武初為左馮翊在郡脩典禮設條教政化大行後告歸平陵望寺門而歩告請也告歸謂請假歸寺門即平陵縣門也主簿進曰明府位尊徳重不宜自輕湛曰禮下公門軾輅馬輅大也君所居曰輅寢車馬曰輅馬軾車前横木也乘車者必正立有所敬則撫軾謂小俛也禮記曰大夫士下宫門軾輅馬鄭𤣥曰所以廣敬孔子於鄉黨恂恂如也父母之國所宜盡禮何謂輕哉又曰虞延為陳留督郵勅延一人從駕到魯還經封丘城門下小不容羽盖帝怒使撻侍御史延因陛下見引咎以為罪在督郵言辭激揚有感上意乃制詔曰以陳留督郵虞延故宥御史罪魏書曰文帝初在東宫集諸儒於肅城門内講論大義侃侃無倦呉志曰張昭諫孫權不從稱疾不朝權自出過其門呼昭辭疾篤權使燒其門欲恐之昭更閉門權使滅火住門良久昭諸子共持昭起權載以還宫又曰初平中謡曰黄金車斑闌耳閶闔門出天子閶闔吳西郭門夫差所作又曰諸葛恪有遷都意更起武昌宫是月武昌門災改作端門晉書曰王衍既有盛才美貌明悟若神嘗自比子貢聲名藉甚傾動當世以善𤣥理唯談莊老每捉玉柄麈尾與手同色義理有所不安隨即更改世號口中雌黄朝野翕然謂之一世龍門又曰賀循時廷尉張闓住在小市將奪左右近宅以廣其居乃私作都門早閉晏開人多患之訟于州府皆不見省㑹卜循出至破崗連名詣循質之循曰見張廷尉當為及之闓聞而遽毁其門詣循致謝其為世所敬服如此又曰陳頵字延思陳國苦人也少好學有文義父訢立宅起門頵曰當使容駟馬車訢笑而從之又曰嵇含自號即丘子門曰歸原之門崔鴻十六國春秋夏錄曰赫連勃勃宫殿大成乃刻石都南頌其功徳其南門曰朝宋門東門曰招魏門西門曰服凉門北門曰平朔門又起沖天臺於南山欲登之望長安又後趙錄曰建武十年白虹出自太社經鳯陽門東南連天十餘刻乃滅于是閉鳯陽門唯元日乃開又後秦錄曰姚興從朝門逰于文武苑及昏而還將自平朔門入前驅既至城門校尉王滿聰被甲持杖閉門拒之乃廻從朝門而入旦而召聰謂之曰卿社稷之臣也朕有嘉焉于是進位二等隋書曰髙祖初為定州總管先是定州城西門乆閉不行齊文宣帝時或謂開之以便行路帝不許曰當有聖人來開之及髙祖至而開焉莫不驚異陳書曰髙祖七年改作雲龍神虎二門案宫殿簿雲龍門第二重宫墻東西門晉本名中東華門晉東掖門也梁改之西對第三重墻萬春門神虎門第二重宫墻西門晉本名中西華門西出西華門本晉西掖門宋改名西華東入對第三重墻千秋門水經注曰長安城惠帝七年築六年成即咸陽也本離宫無城故城之十二門東出北頭第一門宣平門王莽更名春王門正月亭民曰東城門其郭門曰東都門逄萌掛冠處也第二清明門一曰凱門王莽更曰宣徳門布㤙亭内有籍田倉亦曰籍田門第三霸門王莽更名仁夀門無疆亭民見門色青又名青城門亦曰青綺門召平種𤓰處也南出東頭第一門覆盎門王莽更曰永春門長茂亭其南有下杜城應劭曰故杜陵之下聚落也故曰下杜門又曰端門北對長樂宫第二門安門亦曰鼎路門王莽改曰光禮門顯樂亭第三西安門北對未央宫本名平門王莽更名信平門誠正亭西出南頭第一章門王莽更名萬秋門億年亭亦曰故光畢門也又曰便門第二直門王莽改曰直道門端路亭故龍樓門也第三西城門亦曰雍門王莽更名章義門著誼亭其水北有函里民名曰函里門又曰光門亦曰突門北出西頭第一門横門王莽更名翔都門左函亭如淳曰横音光外郭有棘門徐廣曰在渭北漢書徐厲居此以備匈奴又有通亥門也第二門洛門又曰朝名門王莽更名建子門廣世亭一名髙門太平御覽卷一百八十二
