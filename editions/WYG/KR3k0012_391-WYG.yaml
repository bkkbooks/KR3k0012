body:
  text: 太平御覽卷三百九十一宋李昉等撰人事部三十二笑說文曰啞笑也咥大笑听笑貌也忻笑喜也易同人卦曰先號咷而後笑又震卦曰震来􅊒􅊒笑言啞啞又旅卦曰鳥焚其巢旅人先笑後號咷毛詩􅆁栢舟終風曰終風且暴顧我則笑謔浪笑傲中心是悼又碩人曰巧笑倩兮美目盼兮又氓曰兄弟不知咥其笑矣總角之宴言笑晏晏信誓旦旦晏晏和柔也又蓼蕭曰燕笑語兮禮記檀弓曰魯人有朝祥而暮歌者子路笑之笑其為樂速也夫子曰由爾責扵人終無已夫三年之䘮亦已久矣夫禮斗威儀曰君乗土而王其民好大笑樂動聲儀曰人情喜則笑左宣十七年晉侯使郤克徴㑹于齊齊頃公帷婦人使觀之郤子將登婦人笑扵房又昭四曰晉韓起聘于鄭鄭伯享之子産戒曰苟有位扵朝無有不共恪孔張後至立扵客間執政禦之適客後又禦之適縣間客従而笑之事畢富子諫曰夫大國之人不可不慎也幾為之笑而不陵我言數見笑則心陵侮我也又昭六曰晉士彌牟逆叔孫于箕叔孫使梁其踁待扵門内曰余左顧而欬乃殺之右顧而笑乃止又昭七曰昔賈大夫惡娶妻而美三年不言不笑御以如皋射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射女遂不言不笑榖梁傳成元年季孫行父秃晉郤克眇衛孫良夫跛曹公子首傴同聘扵齊齊使秃者御秃者𦕈者御𦕈者跛者御跛者傴者御傴者蕭同叔子處臺笑之客不恱相與立胥閭而語移日不觧齊有知者曰齊患必在此始也又昭公曰楚靈王圍吴朱方執齊慶封将殺之使人令于軍中曰有若齊慶封弑其君者乎封曰子一息我亦且一言曰有若楚公子圍弑其兄之子麏而代之為君者乎軍人粲然皆笑論語憲問恥曰子問公叔文子扵公眀賈曰信乎夫子不言不笑不取乎公明賈對曰以告者過也夫子時然後言人不厭其言樂然後笑人不厭其笑義然後取人不厭其取又陽貨曰子之武城聞弦歌之聲夫子莞爾而笑曰割雞焉用牛刀莞爾小笑貌史記曰吴王問孫子兵法孫子曰願得大王寵姬二人以為軍陣長吴王曰諾使夫人為軍隊長各將一隊令宫女三百被甲而立告以兵法令隨鼓進退令曰聞一鼓皆莊二鼔操兵三鼓皆為戰形扵是宫女皆掩口而笑孫子操枹擊鼓三令五申其笑如故孫子怒目如明星聲如駭虎髮上衝冠鬢旁絶纓頋謂執法曰取鐵鎖引夫人斬之又曰有躃者盤散行汲趙平原君美人居樓上臨見大笑之明日躃者到門曰臣不幸癃病而君之後宫臨而笑臣臣􅂅得笑臣者頭應曰諾居嵗餘賔客門下舍人稍稍引去者過半平原怪之一人前對曰以君之不殺笑躃者君為愛色而賤士即去耳平原乃斬美人頭自造門進躃者因謝焉其後門下乃復稍稍来又曰髙祖奉玉巵為太上皇夀曰始大人常以某無賴不能治産業不如仲力今某之業所就孰與仲多殿上群臣皆呼萬嵗大笑為樂又曰孟嘗君之趙趙平原君客之趙人聞孟嘗君賢皆出觀之皆笑曰始以薛公為魁然也今視之𦕈小丈夫耳漢書曰公孫𢎞為人談笑多聞師古曰善扵談笑而又多聞也又曰匡衡字稚圭好學諸儒為之語曰無說詩匡鼎来匡說詩觧人頤如淳曰使人笑不能止東觀漢記曰光武㣲時與鄧晨觀䜟云劉秀當為天子或言國師公劉秀當之光武曰安知非僕乎建武三年上徴鄧晨還京師數讌見說故舊平生為忻樂晨従容謂帝曰僕竟辨之帝大笑又曰初桓榮遭倉卒困厄時嘗與族人桓元卿俱捃拾投閒輙誦詩元卿謂榮曰卿且盡氣爾當安復施用時乎榮笑而不應後榮為太常元卿来候榮諸子謂曰平生笑君盡氣今何如元卿曰我農民安能預知此又曰桓榮為博士入㑹庭中詔賜竒菓受者皆懐之榮獨舉手奉以拜帝笑止之曰此真儒生也愈見敬厚魏志曰賈詡字文叔文帝為五官将而臨淄侯植才名方盛各有黨有奪宗之議太祖因問詡黙然不對太祖曰與卿言而不答何也曰思袁本初劉景㫒父子也太祖大笑扵是太子遂定又曰明悼毛皇后父嘉本典虞車工卒暴富貴明帝令朝臣㑹其家飲宴其容止舉動甚蚩騃語輙自謂侯身時人以為笑蜀志曰馬忠為人寛濟有度量但談啁大笑忿怒不形扵顔色王隠晉書曰杜預伐吴軍入城至都督孫歆帳下生將歆詣預王濬先列得歆頭而預生送歆洛中大笑晉中興書曰石勒與李陽相近陽性剛愎每嵗與争漚麻池共相打撲互有勝負勒貴召陽引入言及平生酒酣宣陽肘曰卿年老臂中故有力不頗復與人鬭耶孤徃數得卿尊拳卿亦數遭孤毒手因大笑賞賜甚厚即日拜陽奉車都尉除始興太守時有醉胡乗馬徑入府門勒問門吏馮翥向走馬入門為是何人而不彈翥見問惶遽誤對忘諱曰向有醉胡乗馬馳来即以呵問胡人難與語非小吏所制勒笑曰胡正自難與言其後章武太守樊坦入辭居貧衣服甚陋曰樊章武貧耶朝服何以壊惡坦性踈謬對曰頃遇羯胡資財蕩盡是以窮弊勒大笑曰羯賊乃爾大惡取君物盡坦汗流而不敢謝勒賜坦衣恕而不問蕭子顯齊書曰徴張敬兒為護軍將軍常侍如故敬兒武將不習朝儀聞當内遷乃扵宻室中屏人學揖讓答對空中俯仰如此竟曰妾侍竊窺笑焉崔鴻十六國春秋後趙録曰桃豹字安歩范陽人少時以膽勇騎射稱嘗攘臂大言曰大丈夫遭魏太祖不封萬户侯位上將者非丈夫也時類笑之豹罵言爾䑕子軰安知君子豹變之志乎従起中原豹為十八騎之雄事勒甚恭又南燕録曰慕容徳建平四年妖賊王始聚衆扵太山莱蕪谷自稱太平皇帝置署公卿父固為太上皇兄林為征東弟為征西討擒之將刑焉市人皆罵之曰何為妖妄自貽族㓕父兄今並何在始曰太上皇䝉塵扵外征東征西為亂兵所害朕躬雖存復何聊賴其妻趙氏怒之曰君正坐口過以至扵此如何臨死猶有狂言始曰皇后何不達天命自古及今豈有不亡之國行刑者以刀鐶築之始曰朕當崩終不改號徳聞而笑謂左右曰熒惑之人死猶狂語何可不殺南史曰宋司徒禇彦囘送湘州刺史王僧䖍閣道壊堕水僕射王儉馬驚跣下車謝超宗拊掌笑曰落水三公堕車僕射唐書曰馬周疏曰人主每見前代之亡則知其政教之所由䘮而皆不知其身之失是故殷紂笑夏桀之亡而幽厲亦笑殷紂之㓕隋煬帝大業之初又笑齊魏之失國今之視煬帝亦猶煬帝之視齊魏不可不誡又曰李義府貌状温恭與人語必嬉怡㣲笑而偏忌隂賊既處權要欲人附已㣲忤意者輙加傾䧟故時人言義府笑中有刀戰國䇿曰楚王逰扵雲夢有狂兕觸車徑輪彎弓而射應發兕殪仰天而笑曰樂矣今曰之逰萬嵗千秋之後誰與同此樂乎安陵君泣涕數行而進曰臣入則侍綸席出則陪萬乗萬嵗千秋之後願得身㓕黄泉先蓐螻蟻王大恱晏子曰景公置酒太山之上酒酣公四望喟然嘆曰寡人将去此堂堂國而死耶左右泣者三人曰臣細人也猶将難死而况公乎晏子搏髀仰天大笑曰樂哉今日之飲也公怒曰笑何也對曰臣見怯君一諛臣三是以大笑公慙而更辭老子曰下士聞道大笑之不笑不足以為道列子曰晉文公出㑹欲伐衛公子鋤仰而笑公問何笑曰臣之隣人有送其妻適私家者道見桑婦恱而與言然頋視其妻亦有招之者臣竊笑之公悟其言乃引師還未至而有伐其北鄙者矣荘子曰齊桓公田扵澤見鬼焉公反誒詒為病數日不出齊士有皇子告敖者曰臣聞野有委虵惡聞雷車之聲則捧其首而立見者殆乎覇公囅然笑曰此寡人所見也不終日而病去又曰造適不及笑獻笑不及排所造皆適則忘適矣故不及笑排者推移之謂也夫禮笑不哀獻笑必樂哀樂存懐則不能與適推移矣又曰盗跖謂孔子曰人上夀百嵗中夀八十下夀六十除病瘦死䘮憂患其中開口而笑者一月之中不過四五日而已矣鄧析子曰故體痛者口不能不呼心恱者顔不能不笑孟子曰曾子曰脇肩謟笑病于夏畦脇肩竦體也謟笑强笑也此言其意勞苦甚扵仲夏之月治畦灌園者勤也吕氏春秋曰戎嘗冦周幽王擊鼓諸侯皆至褒姒大恱而笑王欲褒姒之笑數數擊鼓諸侯至無冦及真冦至擊鼓而諸侯不来遂為戎所㓕又曰强令之笑則不樂强令之哭則不悲不由中心也淮南子曰强哭者雖疾不哀强歡者雖笑不樂載哀者聞歌而泣載樂者見哭而笑說苑曰楚魏㑹扵晉陽將以伐齊齊王患之使人召淳于髠曰楚魏謀欲伐齊願先生與寡人共之淳于髠大笑而不應王怫然作色曰先生以寡人國為戯乎淳于髠對曰臣不敢以王國為戯也臣隣之祠田也以箧飲與一鮒魚其祝曰下田洿耶得榖百車洿耶下田也鷄堁者宜禾雞堁雞肝黒也臣笑其所以祠者少而所求者多王曰善賜之千金革車百乗立為上卿又曰趙簡子舉兵伐齊有被甲而笑者簡子曰子何笑對曰臣乃有宿笑簡子曰有以說之則可無則死對曰當桑之時臣隣家父與妻俱之田見桑中女因追之不能還反其妻怒而去之臣笑其曠也簡子曰今吾伐國失國是吾曠也還師而歸論衡曰天怒則隆隆雷聲天喜應啞啞而笑郍不聞笑也桓子新論曰闗東語曰人聞長安樂則出門西向笑知肉美味則對屠門而大嚼郭子曰王渾與婦鍾氏共坐見武子從庭前過渾謂婦曰生兒如是足慰人意婦笑曰若使新婦得配叅軍生兒故可不翅如此叅軍是渾中弟名淪字太冲為晉文王大将軍從征夀春遇疾亡時人惜焉世說曰二陸入洛而士龍不詣張公公問士衡雲何以不来機曰有疾恐公不悉故未敢自見俄而雲詣華華為人多姿制又好帛纒鬚雲見而大笑不能自已士龍嘗着纕幘上船因水中自見其影便大笑不能已幾落水中又曰王大將軍尚主如厠見漆箱中盛乾棗本以塞鼻王謂厠上亦下果食遂至盡既還婢擎金澡盤盛水琉璃椀盛澡豆王因倒豆著水中飲之謂是乾飯羣婢莫不笑又曰殷荆州有所識作賦示之殷甚以為有才語王恭適見新文甚可觀便於手中函出之王既讀殷笑不自勝王看竟既不笑亦不言好惡但以如意㸃之而已殷悵然自失語林曰弔王武子客正哭見孫子荆驢鳴變聲成笑又曰董昭失勢久為衛尉昭乃厚加意扵侏儒正朝大㑹侏儒作董衛尉啼靣叙太祖時事舉坐大笑眀帝悵然不怡月中以為司徒曹瞞别傳曰太祖為人佻易無威儀每與人談戯弄言确盡無所隠及歡恱大笑至以頭没杯案中肴膳皆沾汚巾幘璅語曰師曠侍晉平公鼔瑟輟而笑曰齊君與其嬖人戯墜於牀而傷其臂平公命人書之曰某年某月齊君戯而傷問之扵齊侯笑曰然有之東方朔别傳曰朔與上前射覆中之郭舍人亟屈被榜上輙大笑又曰南山有木名為柘良工採之可以射射中人情如掩兎舍人數窮何不早謝上乃搏髀大笑也荀朂别傳曰司徒缺帝問其人朂曰魏文用賈詡為公孫權笑之神異經曰東方有人不妄語恒笑倉卒見之如癡張華注曰今人癡好笑本此捜神記曰孫綝殺徐光而無血後綝上蔣陵有大風盪綝車頋見光在松樹上拊手笑之俄而綝誅蜀記曰譙周字允南巴西人體皂素樸無造次辯論之才諸葛亮領益州牧命周為勸學従事初見左右皆笑既出有司請推笑者亮曰孤欲不能忍况左右乎黄義仲交廣記曰合浦尹牙為郡主簿太守到官三年不笑牙問其故曰父為太尉所殺牙乃辭至洛為太尉養馬三年斷其頭而還南正論曰搔癬之為恱先笑而後愁養生要訣曰人語笑欲令至少不欲令聲髙若過誤笑損肺腸精神不足楚詞九歌曰若有人兮山之阿披薜荔兮帶女蘿既含涕兮又宜笑宋玉登徒子賦曰腰如約素齒如含貝嫣然一笑惑陽城迷下蔡太平御覽卷三百九十一
