  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_588-1a, image: WYG0898/WYG0898-0365c.png}
body:
  text: 太平御覽卷五百八十八宋李昉等撰文部四頌讃箴頌詩序曰頌者美盛徳之形容以其成功吿於神明也又曰蒸民吉甫美宣王也其詩曰吉甫作頌穆如清風陸機文賦曰頌則優游以彬蔚文章流别論曰頌詩之美者也古者聖帝明王功成治定而頌聲興於是史錄其篇工歌其章以奏於宗廟告於神明故頌之所美則以為名或以頌形或以頌聲其後已非古頌之意昔班固為安豐戴侯頌史岑為出師頌和僖鄧后頌與魯頌體意相類而文辭之異古今之變也揚雄趙充國頌頌而似雅傅毅顯宗頌文與周頌相似而雜以風雅之意若馬融廣成上林之屬純為文賦之體而謂之頌失之逺矣文心雕龍曰四始之至頌居其極頌者容也所以美盛徳而述形容也昔帝嚳之世咸墨為頌以歌九招自商頌以下文理克備夫化偃一國謂之風風正四方謂之雅容告神明謂之頌風雅序人故事兼變正頌主告神故義必純美魯以公旦次編商以前王追錄斯乃宗廟之正歌非饗燕之恒詠也時邁一篇周公所製哲人之頌規式存焉夫三閭橘頌情采芬芳比類屬興覃及細物矣至於秦政刻文爰頌其徳漢之恵景亦有述容沿世並作相繼於時矣若夫子雲之表充國孟堅之頌戴侯武仲之美顯宗史岑之述僖后或擬清廟或範駉那雖深淺不同詳畧有異其褒徳顯容典章一也原夫頌惟典懿詞必清鑠敷冩似賦而不入華侈之區敬慎如銘而異於規戒之域揄揚以發藻汪洋以樹儀雖􅊏巧委曲與情而變其大體含宏如斯而已漢書曰宣帝徴王襃為聖主得賢臣頌襃對曰夫荷旃被毳者難與道純綿之麗宻羮藜含糗者不足與論太牢之滋味今臣僻在西蜀生於窮巷之中長於蓬茨之下無有遊觀廣覽之知不足以塞厚望應明㫖敢不畧陳愚而抒情素又曰成帝時西羌嘗有警上思将帥之臣追美充國乃召黄門郎揚雄即充國圖畫而頌之後漢書曰帝召賈逵因勅蘭䑓給筆札使作神雀頌范􅁮後漢書曰肅宗治修古禮廵狩方岳崔駰上西廵頌稱漢徳帝雅好文章自見駰頌後嘗嗟嘆之問侍中竇憲曰寧知崔駰乎對曰班固數為臣說之然未見帝曰公愛班固而忽駰此葉公之好龍也可試見之駰由此候憲憲迎門笑謂駰曰亭伯吾受詔交公何得薄我哉遂揖入以為上客又曰傅毅與班固賈逵共典校書毅追美孝明帝功徳最盛而廟頌未立乃依清廟作顯宗頌十篇奏之又曰平望侯劉毅以和僖鄧太后有徳教請令史官著長樂宫聖徳頌以敷宣景耀勒勲金石縣之日月攄之㒺極以崇陛下烝烝之孝帝從之魏志曰黄初三年黄龍見鄴西漳水中王褒上頌賜黄金十斤晉春秋曰懐帝陥於平陽劉聦加帝開府儀同三司㑹稽郡公引帝入讌謂帝曰卿為豫章王時朕與王武子俱造卿武子稱朕於卿卿言聞名久矣卿以所作樂府示朕曰劉君聞君善詞賦試為㸔也朕與武子俱為盛徳頌卿稱善者久之又引朕射於黄堂朕得十二籌卿與武子俱得九籌卿又贈朕柘弓銀硯卿頗憶否帝曰安敢忘之恨爾日不得早識龍顔聦曰卿家骨肉何相殘之甚耶帝曰此殆非人事皇天意也大漢将興應乾受厯故為陛下自相驅耳且臣家若能奉武皇帝之業九族敦睦陛下何由得之聦甚有喜色晉書曰劉臻妻陳氏聦敏能屬文嘗正旦獻椒花頌其詞曰旋穹周廻三朝肇建青陽散暉澄景載焕又曰劉伶字伯倫沛國人也志氣曠放以宇宙為狹著酒徳頌為建威叅軍以夀終崔鴻春秋前燕錄曰慕容雋觀兵近郊見甘棠於道周從者不識雋曰唏此詩所謂甘棠於道甘者味之主也木者春之行也五徳屬仁五行主土春以施生味以養物色又赤者言将有赫赫之慶於中土吾謂國家之盛此其徴者也傳曰升髙能賦可以為大夫羣司亦各書其志吾得覽焉於是内外臣僚並上甘棠頌南史曰梁大同中嘗驟雨殿前往往有雜色寳珠梁武觀之甚有喜色虞寄因上瑞雨頌帝謂其兄荔曰此頌典裁清㧞卿之士龍也将加擢用寄聞之嘆曰美盛徳之形容以申擊壤之情耳吾豈買名求仕乎後周書曰顔之儀幼頴悟三嵗能讀孝經及長博渉書書好為詞賦嘗獻神州頌詞致雅贍梁元帝手勅報曰枚乘二葉俱得遊梁應貞兩世並稱文學我求才子鯁慰良深江陵平之儀隨例遷長安世宗以為麟趾學士隋書曰北齊中書侍郎杜䑓卿上世祖武成皇帝頌齊主以為未能盡善令和士開以頌示李徳林宣㫖云䑓卿此文未當朕意以卿有大才須叙盛徳即宜速作急進本也徳林乃上頌十六章並序武成覽頌善之賜名馬一疋鄭𤣥别傳曰民有嘉𤓰者異本同實縣侯欲表附文辭鄙畧君為改作又著頌二篇侯相髙其才王充論衡曰古之帝王建鴻徳者須鴻筆之臣褒頌紀徳也又曰永平中神雀羣集孝明詔上神雀頌百官上頌文比瓦石惟班固賈逵傅毅楊終侯諷五頌文比金玉崔駰四廵頌表曰臣聞陽氣發而鶬鶊鳴秋風厲而蟋蟀吟氣之動也唐虞之世樵夫牧􅆆擊轅中韶感於和也臣不知手足之動音聲敢獻頌云零陵先賢傳曰周不疑字文直曹公時有白雀瑞儒林並已作頌不疑見操授紙筆立令復作操竒之讃釋名曰稱人之美曰讃讃纂也纂集其美而叙之也文心雕龍曰讃者明也助也昔虞舜之祀樂正重讃葢唱發之詞也及益讃于禹伊陟讃于巫咸並颺言以明事嗟嘆以助詞者也故漢置鴻臚以唱拜為讃即古之遺語也至如相如屬筆始讃荆軻及遷史固書託讃襃貶約文以揔錄頌體而論詞又記傳後評亦同其名而仲治流别謬稱為述失之逺矣及景純注雅動植必讃讃兼美惡亦猶頌之有變耳然本其為義事生奨嘆所以古來篇體促而不廣必結言於四字之句盤桓於數韻之詞約舉以盡情昭灼以送文此其體也發言雖逺而致用葢寡大抵所歸其頌家之細條也李充翰林論曰容象圖而讃立宜使辭簡而義正孔融之讃楊公亦其義也晉書曰稽含紹之孫也𢎞農王粹以貴公子尚主館宇甚盛圖荘周於室廣集朝士使含為讃含援筆為之文不加㸃其畧曰嗟乎先生髙迹何局生處巖岫之居死寄雕楹之屋寄非其所没有餘辱粹有愧色又曰衞恒字巨山為黄門郎善草隸太康元年汲縣人盗發魏襄王冡得䇿書十餘萬言其一卷論楚事者最為工妙恒恱之故竭思以賛其美世說曰羊孚作雪讃曰資清以化乘氣以霏遇象能鮮即㓗成輝桓伊遂以書扇箴文心雕龍曰箴所以攻疾除患喻鍼䂖也又曰斯文之興盛於三代夏商二箴餘句頗存及周之辛甲百官箴闕惟虞箴一篇體義備焉迄至春秋㣲而未絶故魏綘諷君於后羿楚子訓民於在勤戰伐以來棄徳務功銘辭代興箴文委絶至揚雄稽古始範虞箴卿尹州牧二十篇及崔胡補綴惣稱百官指事配位盤鑒有徴可謂追清風於前古攀辛甲於後代者也至於潘朂符節要而失淺温嶠侍臣博而患繁王濟國子引多事寡潘尼乗輿義正體蕪凡斯繼作鮮有克終至於王朗雜箴乃寘巾履得其戒慎而失其所施觀其約文舉要憲章戒銘而水火井竈繁辭不已志有偏也夫箴誦於官銘題於器名目雖異而警戒實同箴全禦過故文資确切銘兼褒讃故理貴宏潤此其要也然矢言之道葢闕庸器之制久淪所以箴銘實用罕施後代惟秉文君子宜酌其逺大矣陸士衡文賦曰箴頓挫而清壮周書曰夏箴曰小人無兼年之食遇天饑妻子非其妻子也大夫無兼年之食遇天饑臣妾非其臣妾也卿大夫無兼年之食遇天饑臣妾轝馬非其有也國無兼年之食遇天饑百姓非其有也左傳襄四曰昔周辛甲之為太史命百官官箴王闕辛甲周武王太史也闕過也百官各以箴進箴王過也於虞人之箴曰虞人掌田獵者芒芒禹跡畫為九州芒芒逺貌畫分也經啟九道九道九州之道也啟開也民有寝廟獸有茂草各有攸處徳用不擾人神各有歸故徳不亂也在帝夷羿冐於原獸冐貪忘其國恤而思其麀牝言但念獵武不可重重尤數也用不恢於夏家羿以好武雖有夏家而不能恢大也獸臣司原敢告僕夫獸臣虞人也告僕夫不敢斥尊也范􅁮後漢書曰崔琦字子瑋梁冀聞其才請與交冀行多不軌琦數引古今成敗以誡之冀不能受作外戚箴晉書曰張華懼后族之盛作女史箴以為諷賈后雖凶妬而知敬重華又曰文帝子齊王攸武帝時為太子太傅獻箴於太子其畧曰毋曰父子之間昔有江充毋曰至親靡二或客潘崇䛕言亂真譛潤離親驪姬之讒晉侯疑申固親以道勿固以恩修身以敬勿託以尊世以為工後周書曰齊王憲友劉休徴獻王箴一首憲美之休徴後又以此箴上高祖高祖方剪削諸弟甚恱其文唐書曰元和中吏部郎中栁公綽獻太毉箴曰寒暑滿天地之間浹肌膚於外玩好溢耳目之前誘心知於内清潔為隄奔射猶敗氣行無間隙不在大睿聖之姿清明絶俗心正無邪志髙寡欲謂天髙矣氣蒙晦之謂地厚矣横流潰之聖徳超邁萬方頼之飲食所以資身也過則生患衣服所以稱徳也侈則生慢惟過與侈心必隨之氣與心流疾亦伺之上深嘉嘆降中使勞問又曰敬宗遊幸無度李徳裕獻丹扆箴六首宵衣箴曰先王聴政昧爽以俟雞鳴既盈日出而視伯禹大聖寸隂為貴光武至仁友賢不忌無俾姜后獨去簮珥彤管記言克念前志又有正服罷獻納誨辨邪防㣲等箴文多不載上甚嘉之胡廣百官箴叙曰箴諌之興所由尚矣聖君求之於下忠臣納之於上故虞書曰予違汝弼汝無面從退有後言墨子著書稱夏箴之辭崔漢叙箴曰昔楊子雲讀春秋傳虞人箴而善之於是作為九州及二十五箴規匡救言君徳之所宜斯乃體國之宗也太平御覽卷五百八十八
