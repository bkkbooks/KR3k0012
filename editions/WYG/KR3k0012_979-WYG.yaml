body:
  text: 太平御覽卷九百七十九宋李昉等撰菜茹部四瓠葫蘆蓼葵蕪菁瓠詩碩人曰齒如瓠犀又曰八月㫁瓠又曰匏有苦葉濟有深渉陸機毛詩䟽義曰匏有苦葉匏瓠也葉小可為羮揚州人云至八月葉即苦故曰苦葉論語曰吾豈匏𤓰也哉焉能繫而不食爾雅曰瓠棲瓣魏畧曰髙辛氏有老婦人居王宮得竒疾醫為挑之得物大如蠒盛以瓠覆以盤化為犬五色因名盤瓠晉書曰杜預病癭吳憚其智計以瓠繫狗項示之毎大樹有癭削斬使白乃題曰杜預頸及吳平盡捕殺之又曰祖逖在河南百姓感悦嘗置酒大㑹耆老坐中流涕曰吾等老矣更得父母死将何恨乃歌曰幸哉遺黎免俘虜三辰既遇慈父母㫖酒忘勞甘瓠脯何以咏思歌且舞其得人心如此宋書曰徐文伯曾祖熈好黄老隠于秦望山有過客求飲留一瓠瓢與之曰君子孫宜以道術救世當得二千石熈開之乃扁鵲醫經一卷齊書曰夏彬性好飲酒瓠壺瓢與皮為肴着皂巾十二年不改易以大瓠為籠什物及諸詭異自居下田後周書曰强練師不知何許人所至之處人皆敬而信之晉公䕶未誅之前曾手持一大瓠到䕶第門外抵而破之乃大言曰瓠破子苦未幾而護誅諸子並伏法管子曰一年之計莫若樹穀十年之計莫若樹木終身之計莫若樹人瓜瓠葷菜不備國之貧也荘子曰惠子曰魏王貽我大瓠之種我樹之而成實五石以盛水漿其堅不能自舉剖之以為瓢則廓落無所存非不大也吾為其無用剖之荘子曰夫子固拙于用大也國語曰諸侯伐秦將濟叔向見叔孫穆子穆子曰豹之業乃瓠有苦葉矣不知其他叔向退召舟虞與司馬曰夫苦瓠不材於人共濟而已遂行魯人與莒人先濟新序曰魏文侯見箕季牆壊不治問其故曰不時也又進瓠羮文侯曰牆壊不築教我無奪民農功貽我瓠羮教我無多求百姓王充論衡曰干將之刃未磨瓜瓠不能傷又曰婦人疎孕者子活乳數者子死譬苦瓠華多實少也風俗通曰燒穰殺瓠俗説家人燒黍穰則使田中瓠枯死也水經曰今豫州汝南郡城西北汝水左右出西北流又屈而轉東又西南㑹汝州若垂瓠耆老云城取名焉大康地志曰朱崖儋耳無水惟種大瓠藤㫁其汁用之亦足嶺南異物志曰儋崖種瓠成實率皆石餘葫蘆蜀志曰張裔字君嗣如瓠壺外澤而内麄三國典畧曰齊武成帝皇后胡氏安定人魏中書令兖州刺史延之女也母盧氏懐孕之初有胡僧來詣門曰此宅瓠蘆中有月崔豹古今注曰瓠壺蘆也壺蘆瓠之無柄者瓠有柄者懸瓠可作笙曲沃者尤善秋乃可用則漆其裏又曰瓢瓠也其總曰瓠瓢則别名世説曰陸士衡初入洛諮張公所宜曰詣劉道貞是其一既徃劉尚哀制中惟嗜酒禮畢初無他言惟問東吳有長柄壺蘆卿得種來否陸兄弟殊失望乃甚悔去廣五行記曰西域夷國有石駱駝腹下出水以金鐡器取便漏下唯瓠蘆盛之則不漏飲之令人體滑香净其國神秘不可數遇嶺南異録曰葫蘆笙交趾人多取無柄之瓠割而為笙上安十三簧吹之音韻清響雅合律呂蓼爾雅曰薔虞蓼詩曰閔予小子未堪家多難予又集于蓼禮曰膾秋用蓼鶉羮鷄羮鴽釀之蓼吳越春秋曰越王欲復怨非一旦也苦思勤心夜以接日卧則以蓼劉向别傳曰尹都尉書有種蓼篇魏子曰君以臣為本以民為根猶室與柱梁相持也梁不强則上下俱亡故蓼䖝在蓼則生在芥則死非蓼仁而芥賊也本不可失也任昉述異記曰長沙定王故宮有蓼園云定王故園也菜之辛者謂之蓼吳氏本草曰蓼實一名野蓼一名澤蓼葵廣雅曰蘬葵也詩曰七月烹葵及菽爾雅曰莃菟葵菺戎葵荍蚍衃韓詩外傳曰魯監門女從績中夜而泣其偶問其故曰宋司馬得罪于宋食吾園葵是嵗吾園亡葵越攻吳諸侯畏其威魯徃獻女吾姊預焉兄徃視之道畏而死由此觀之禍福相及也陸機毛詩疏義曰荍一名蚍􅗶音孚一名楚葵似蕪菁華紫緑色可食㣲苦也左傳曰齊慶克通于聲孟子鮑牽見之告國武子武子召慶克讓之夫人訴之乃刖鮑牽仲尼曰鮑荘子之智不如葵葵猶能衛其足葵傾葉向日以庇其根也史記曰公儀休為魯相食葵而美拔其園葵棄之晉書曰江綂上太子書曰今西園賣葵菜藍子鷄麵之屬則虧敗國體貶損令門北齊書曰有王姓孤獨種葵三畝數被人盗之彭城王浟宻令人書葵葉下明日市中㸔遂得偷者管子曰桓公北伐山戎出冬葵布之天下桓公憂北郭氏貧管子請禁出市三百歩者不得樹葵菜此則亦有以相及也淮南子曰聖人之于道猶葵之于日雖不能與終始其嚮之者誠也繆襲祭儀曰夏祀和羮芼以葵列仙傳曰丁次都者不知何許人也遼東丁氏僕人丁氏嘗使買葵冬得生葵問冬何有葵云從日南買來列女傳曰魯漆室有女過時未適人倚柱而嘆鄰婦謂曰何悲也欲嫁乎女曰吾憂魯君老而太子少也婦曰此魯夫人憂焉女曰昔有晉客舍吾家繫馬于園馬逸踐吾園葵使吾終嵗不厭葵味鄰女奔亡使吾兄追霧出以求溺流而死使吾終身無兄吾聞河流九里漸三百歩今魯㣲弱亂将及人三年魯果亂師曠占曰黄帝問師曠曰欲知牛馬貴賤秋葵下小葵生牛馬貴小葵不生牛馬賤博物志曰陳葵子㣲火炒令爆乾散着熟地中遍踏朝種暮生遠不過宿陳葵子秋種覆蓋令經冬不死至春有子是也潘岳閒居賦曰緑葵含露白薤負霜鮑明遠葵賦曰白莖紫蔕豚耳鴨掌古歌辭曰採葵莫傷根傷根葵不生結交莫羞貧羞貧交不成蕪菁爾雅曰須葑蓯也尚書曰荆州厥貢苞匭菁茅詩曰采葑采菲無以下體又曰爰采葑矣沫之東矣又曰采苓刺聽讒也采葑采葑首陽之東人之為言苟亦無從陸機毛詩疏義曰采葑蕪菁也郭云今崧菜也可食少味東觀漢記曰桓帝永興二年詔司𨽻蝗水為灾五穀不登令所傷郡國皆種蕪菁以􅂇民食吳厯曰劉備歸曹公曹公使親近覘諸将有賔客酒食者輙因事害之備時閉門将人種蕪菁公使人窺門即去備謂張飛曰吾豈種菜者乎曹公必有疑意不可復留其夜輕馬而去吳録曰陸遜諸葛瑾攻襄陽遜遣親人韓扁抄掠瑾聞之欲急去遜方催人種荳崧與諸将圍棊以示閒暇齊書曰武陵王􅁮性清簡尚書令王儉詣􅁮留儉設食盤中崧菜鮑魚而已儉重其眞率為飽食盡歡而去又曰周顒清貧寡欲終日蔬食雖有妻子獨處山舍甚機辨文惠太子問顒菜食何味最勝顒曰初春早韭秋末晩菘梁書曰范元琰家清貧以園蔬為業嘗出行見人盗其菘元琰遽退走母問其故乃以實答問盗者為誰答曰向所以退畏其愧耻今啓其名願不泄也於是母子秘之或有渉溝盗其筍者元琰因伐木為橋以度之自是盗大慙之一鄉皆不復草竊北史曰孟信為趙郡太守政尚寛和而權豪無犯山中老人曾以醇酒餽之信和顔接引殷勤勞問乃自出酒以鐡鐺温之素木盤盛蕪菁而已呂氏春秋曰菜之美者具區之菁浸淵之草名曰土英荆楚嵗時記曰仲冬是月也菜結霜蕪菁葵等雜菜乾之並為鹹葅有得其和者並作金釵色今南人作鹹葅以糯米熬搗為末并研胡麻汁和釀之石笮令熟葅既甜汁脆亦酸美呼其莖為金釵股醒酒所宜也急就篇曰老菁蘘荷冬日藏太平御覽卷九百七十九
