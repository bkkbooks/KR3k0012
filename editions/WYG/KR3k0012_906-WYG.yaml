body:
  text: 太平御覽卷九百六宋李昉等撰獸部十八鹿麋麂麈麑鹿説文曰麚音加牡鹿也夏至解角麟大牝鹿也􅂒音儒鹿麛也􅂒音束鹿迹也麛音迷鹿子也麉音肩鹿之絶有力者􅕱居履切大麋爾雅曰鹿牡麚牝麀音優其子麛其迹速絶有力􅂒音堅又音磬周易卦曰六三即鹿旡虞惟入于林中詩韓奕曰魴鱮音序甫甫麀鹿噳噳又靈臺曰麀鹿濯濯白鳥翯翯又吉日曰獸之所同麀鹿麌麌又野有死麕曰林有樸􅈪野有死鹿白茅純束有女如玉又曰鹿鳴宴羣臣嘉賔也呦呦鹿鳴食野之苹又蕩桑柔曰瞻彼中林甡甡其鹿左傳曰晉侯不見鄭伯以為貳於楚鄭子家使執訊而告趙宣子曰古人有言曰畏首畏尾身其餘㡬又曰鹿死不擇音小國之事大國也徳則其人也不徳則其鹿也挺而走險急何能擇又襄十四年傳曰范宣子執戎子駒支數之曰今諸侯之事我寡君不如昔者盖言語漏洩則職汝之由戎子駒支曰昔文公與秦伐鄭秦人竊與鄭盟於是乎有殽之師晉禦其上戎亢其下秦師不復我諸戎實然譬如捕鹿晉人角之諸戎掎之與晉踣之禮記月令曰仲夏鹿角觧又禮器曰居澤者不以鹿豕為禮史記曰趙髙欲為亂恐羣臣不聽乃先驗持鹿於二世曰馬二世笑曰丞相誤耳謂鹿為馬問左右左右或言馬以阿趙髙或言鹿髙因隂中言鹿者以法又曰邑中人民俱出獵任安常為人分麋鹿雉兎部署老小當壯劇易處衆人皆喜曰無傷也任少卿分别平又曰古者皮幣諸侯以聘享漢武帝乃以白鹿皮方尺緣以藻繢為幣直四十萬王侯朝覲享聘必以為幣薦璧然後得行漢書曰蒯通教韓信反髙祖髙祖召通至問曰汝何教韓信反耶蒯通曰臣聞狗各吠非其主當彼時臣以知齊王不知陛下且秦失其鹿天下共逐之髙才㨗足者先得又曰伍被諫淮南王曰昔子胥諫吳王吳王不用廼曰臣今見麋鹿遊姑蘇之臺今臣見宫中生荆棘也東方朔別傳曰武帝時有殺上林鹿者下有司收殺之朔時在旁曰是故當死者三使陛下以鹿殺人一當死天下聞陛下重鹿賤人二當死匈奴有急須鹿觸之三當死帝黙然赦之范􅁮後漢書曰雲南縣有神鹿兩頭食毒草又華陽國志曰熊倉山有神鹿食毒謝承後漢書曰鄭𢎞為臨淮太守行春兩白鹿車後夾轂而行𢎞怪問主簿黄國鹿為凶吉國拜賀曰聞三公車畵作鹿明府當為宰相後𢎞果為太尉魏志曰蘇則從文帝獵失鹿帝大怒踞胡床㧞刀悉收督吏將斬之則諫之乃止晉書曰許孜字季義東陽吳寧人也二親沒棄妻宿墓所列植松栢亘五六里時有鹿犯其松栽孜嘆曰鹿獨不念我乎明日忽見鹿為猛獸所殺置於所犯栽下孜悵惋不已乃作塜埋於隧側猛獸即孜前自投而死孜益歎息復亦埋之又曰謝鯤在豫章嘗行經空亭中夜宿此亭舊每殺人將晩有黄衣人呼鯤字爾開户鯤淡然無懼色便於忩中度手牽之膊斷視之鹿也尋血獲焉爾後此亭無復妖怪殺人也晉中興書曰陶淡字處淨太尉侃之孫一身孑然無有同産髫齔之時雅好𨗳養謂仙道可祈至年十五六便服食絶穀不婚娶居長沙臨湘縣下去家十里於山中立小草屋裁足容身時還家設小床常獨坐不與人共於野得白鹿子馴而養之至七八歳時恒與之俱徃還遂乃不復還家又曰殷仲堪上白鹿表曰巴陵縣青水山得白鹿一頭白者正色鹿者景福嘉義晉書載記曰石勒嘗傭於武安臨水為遊軍所囚㑹有羣鹿旁過軍人競逐之勒乃獲免俄而又見一父老謂勒曰向羣鹿者我也君應為中州主故相救耳勒乃拜而受其賜蕭子顯齊書曰始興盧度隠居西昌三顧山鳥獸隨之夜有鹿觸其壁度曰汝勿壞我壁鹿應聲去史記四夷傳曰扶南有鹿車國人養鹿如中國畜牛以乳為酪隋書曰開皇十七年羣鹿入殿門馴擾侍衛之内後周書曰文帝獵於邙山圍不齊獸多越逸帝怒諸將股慄俄有一鹿亦突圍而走賀若敦躍馬逐之鹿上東原棄馬歩逐山半便及掣之而下帝大悦諸將免罪唐書曰太宗幸懷州乙未狩於濟源之陵山親御弧矢太宗曰古者先驅以供宗廟今所獲鹿宜令有司造脯醢以充為薦享又曰禇無量丁母憂解職廬於墓側其所植松栢時有鹿犯之無量泣而言曰山中種草不少何忍犯吾先塋樹栽因通夕守䕶俄有羣鹿馴狎不復侵害魏名臣奏曰時殺禁地鹿者死郎中黄觀上䟽曰臣深思陛下所以不早取此鹿誠欲使亟蕃息然後大取以為軍國之用也然臣竊以為今鹿但有日耗終無得多也魏末傳曰明帝為平原王母甄后妬文帝殺之故不立為太子嘗従帝獵見鹿子母帝射鹿母語明帝射鹿子明帝曰陛下既已殺其母臣不忍復殺其子因大涕泣帝收弓矢由是立太子意定國語曰周穆王征犬戎得四白鹿而荒服者不至穆天子傳曰天子賜曹奴之人黄金之鹿白銀之麕色白如銀也又曰天子西升於藜丘之陽過并公博乃駕鹿逰乎山上又曰天子征于菹側魚切臺獵菹之獸於是有白鹿一迕音悟乗逸走出天子乗渠黄之乗馳焉山海經曰上申之山其獸多白鹿辛氏三秦記曰有白鹿原周平王時白鹿出此原太公六韜曰取天下若逐鹿得其鹿天下共其肉莊子曰至徳之世不尚賢不使能民如野鹿韓子曰夫馬似鹿者而題千金乃有百金之馬而無一金之鹿者馬為人用而鹿不為人用列子曰鄭人有薪於野者遇駭鹿却而擊之斃恐人見之遽而藏諸隍中覆之以蕉不勝其喜俄而遺其所藏之處遂以為夢焉従塗而詠其事傍人有聞者用其言而取之既歸告其室人曰向薪者夢得鹿而不知其處吾今已得之矣管子曰桓公問管子楚之强國舉兵伐之恐力不能過奈何對曰公貴買其鹿公即為百里之城使人載錢二千萬求生鹿於楚人楚人釋其耕農而逐鹿管子告楚人賈曰為我致生鹿賜子金百斤什至金千斤尸子曰鹿走而無顧六馬不能望其塵謂不反顧也吕氏春秋曰晏子遭崔杼之患其僕將馳晏子安之曰疾必不生徐必不死鹿生於山命懸於厨今嬰有所懸也抱朴子曰昔張盖蹹音㳫及偶高成二人並精思於蜀雲臺山石室中忽有一人着黄練單衣葛巾到其前曰勞乎道士辛苦幽隠於是二人顧視於鏡中乃見是鹿也因問曰汝是草中老鹿何敢詐為人形言未絶來人即成鹿而走去瀬鄉記曰李母碑曰老子乗白鹿以見於李母韓詩外傳曰齊景公逐白鹿於野封人曰使吾君夀金玉是賤人民是寳公曰善孫柔之瑞應圖曰黄帝時西王母使使乗白鹿獻白環之休符以有今方也春秋命厯序曰皇神駕六飛鹿化三百歳淮南子曰四九三十六六主緯緯主鹿鹿故六月而生春秋運斗樞曰瑶光散而為鹿江淮不祠則瑶光不明彘生鹿抱朴子玉䇿篇曰鹿壽千歳滿五百歲則其色白瑞應圖曰夫鹿者能壽之獸五色光暉王者孝道則至又曰王者承先聖法度無所遺失則白鹿来禮斗威儀曰君乗水而王其政和平北海輸白鹿衝波傳曰鹿生三年其角自墮崔豹古今注曰鹿者魚不能觸袁山松栢鹿詩序曰荆門山臨江皆絶壁峭峙五百餘丈亘帶激流禽獸所不能履北岸有一白鹿泅過江人見之競逐之謂至山下必得鹿忽然若飛超岡而去于今此壁謂之白鹿山泅音囚言浮過也神仙傳曰魯女生者長樂人服胡麻餌术絶榖八十餘年甚少世傳見之二百餘年入華山中有故人與女生相别五十年復入華山廟逄女生乃乗白鹿車従者玊女數十人列仙傳曰蘇躭與衆兒戯獵常騎鹿形雖如常鹿遇險絶之地能超越衆兒問曰何得此鹿異常鹿耶荅曰非鹿是龍也述異記曰漢成帝末年宫中雨一蒼鹿殺而食之其味甚美又曰鹿一千年為蒼鹿又百年化為白鹿又五百年化為𤣥鹿漢成帝時山中人得𤣥鹿烹而視其骨皆黒色仙者説𤣥鹿為脯食之得二千歲又曰餘干縣有白鹿土人皆傳千歲矣晉成帝遣人捕得有銅牌刻字在其角後云寳鼎二年臨江所獻博物志曰雲南郡出茶首茶首其音為蔡茂是兩頭鹿名也獸似鹿兩頭其腸中胎常以四月中取可以治毒永昌亦有之異苑曰鄱陽樂安彭世咸寜中以捕射為業入山與子俱行後忽倒地變成一白鹿跳而去其子終身不復弋獵至孫復習其事後忽射一白鹿乃於兩角間得道家七星符并有其祖姓名及鄉居年月在焉乃斷獵伏候古今注曰漢明帝永平九年三角鹿出江孝和帝永元十二年豫章徐子得白鹿髙丈九尺楚辭曰青莎雜樹薠音煩草靃靡白鹿麕麚或騰或倚樂府歌詩曰白鹿在上林苑中射工尚得脯腊之黄鶴摩天極高飛後宫尚得烹煑之金樓子曰夏禹之時神鹿行於河水搜神後記曰淮南陳氏於田中種豆忽見有二女子姿甚美着紫纈襦青裙天雨而衣不濡其壁先掛一銅鏡鏡中見二鹿遂以刀斫獲之以為脯宣驗記曰吳唐廬陵人也少好驅媒獵射發無不中家以致富後春月與子出獵正值鹿母引麑覺有人氣呼麑漸去麑不知所畏逕前就媒唐射麑即中鹿母驚走悲鳴唐乃自藏草中出麑致净地鹿母直来地俯仰頓伏絶而復起唐又射鹿母應弦而倒至前塲復逄一鹿上弩將欲急發箭反激還中其子唐擲弩抱兒撫膺而哭聞空中忽曰吳唐鹿之愛子與汝同唐驚聽不知所在髙堂隆集曰近日有司宣令有殺禁地鹿者身死財産沒官有能先覺白者厚賞賜之此為重禽獸而賤人過於齊宣矣杜祭酒别傳曰郡弟子三人隨道士邢邁入宣城涇縣白水山去縣七十里餌术黄精經歴年所有鹿走依舍邉伏眠邁等怪之乃為虎所逼邁乃咒虎退其鹿經日乃去南中八郡志曰麋冷縣深山中有大蛇長數丈圍三尺於樹上野鹿過便低頭繞之鹿於是有頃而死先含水濡之令濕乃合頭角併吞之訖便不能動至數日鹿乃消盡蛇自繞樹鹿角骨悉鑽皮出養瘡得一月乃愈又永初山川記曰髯蛇吞鹿至角乃止交州記曰合浦口有麚角當額上載科藤一株三四條長可一尋射師従禽每見而不敢射蕭廣濟孝子傳曰伍襲字世公丁父憂廬墓側有一鹿每襲哭輙踞墳而悲廣州先賢傳曰丁茂字仲慮交阯人至孝母終負土治塜列樹松栢白鹿逰乎左右又曰唐頌字徳雅畨禺人遭䘮六年廬於墓側白鹿捨食塜邉習鑿齒襄陽記曰習郁従光武幸黎丘與光武通夢見蘇頷神帝嘉之使立祠祀之有二石鹿夾道口百姓乃謂之鹿門麋爾雅釋獸曰麋牡麔牝麎其子䴠其跡躔絶有力狄麔音咎麎音辰䴠於兆切説文曰麋鹿屬也冬至解角春秋運斗樞曰揺光星散為麋春秋命厯序曰有人黄頭大腹出天齊號曰皇次駕六飛麋上下天地與神合謀周禮天官獸人曰獸人夏獻麋左傳宣王曰晋楚戰楚致晋師晉人逐之左右角之樂伯左射馬而右射人角不能進矢一而已麋興于前射麋麗龜晋鮑癸當其後使攝叔奉麋獻焉又曰魯莊公十七年多麋害稼又哀十四年傳曰宋桓魋之寵害于公將討之召左師同迹人来吿曰逢澤有界麋焉離騷曰麋何食兮庭中蛟何為兮水裔莊子曰鰌與魚遊麋與鹿交淮南子曰孕婦見兎其子缺脣見麋而子四目又曰逐麋者不顧雉兎新序曰晉文公逐麋而失之問農父古老古老以足指曰如是往公譲之古老曰虎豹厭閒而近人故得魚鱉厭深而之淺故得諸侯厭衆而亡其國文公懼歸有忻色欒武子問焉公曰今日逐麋失之而得善言故忻也魏略曰文帝將受禪有白麋見戴延之西征記曰徽音殿西南姚興起波若䑓有逍遥園西去三百歩有鹿子苑羌王養麋鹿數百頭麂爾雅曰麂音几大麕九均切旄毛狗足山海經曰女几之山有獸多麕郭璞曰麕似麞而大孫氏瑞應圖曰晉中興書元帝時有二白麂見於南昌郡臨海記曰郡西北侯官山有三足麂其聲嘶嗄二千石官長將有代謝則嗄麂鳴矣麈説文曰麈鹿屬也大而一角捜神記曰馮乗虞蕩夜獵見一大麈射之麈便云虞蕩汝射殺我耶明晨得一麈而入少時蕩死鄱陽記曰李嬰弟縚音韜二人善于用弩常得大麈解其四脚懸着樹間以蔵為炙於火上方欲共食山下一人長三丈許鼓歩而来手持大嚢既至取麈頭角皮并火上新肉悉内嚢中遥還山去兄弟後亦無恙麑音倪淮南子曰孟孫獵而得麑使秦西巴歸之麑母隨而啼西巴不忍縦而與之孟孫歸求麑安在西巴以寔對孟孫怒逐居一年復以西巴為傅秦子曰虎熊雄猛不可以寄麑鷹鷂飄繫不可以寄雛太平御覽卷九百六
