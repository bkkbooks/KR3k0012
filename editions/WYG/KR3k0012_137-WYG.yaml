body:
  text: 太平御覽卷一百三十七宋李昉等撰皇親部三東漢光武郭皇后光武隂皇后孝明馬皇后孝章母賈貴人孝章竇皇后孝章梁皇后敬隠宋皇后孝和隂皇后孝和鄧皇后曹大家附孝徳左皇后孝安閻皇后孝安李皇后孝順梁皇后孝冲母虞貴人孝質母陳妃孝崇匽皇后孝桓梁皇后孝桓鄧皇后孝桓竇皇后孝仁董皇后孝靈宋皇后孝靈何皇后孝靈王皇后孝獻伏皇后孝獻曹皇后光武郭皇后續漢書曰光武郭皇后真定槀人也安陽思侯昌女曰聖通世祖至真定納聖通有寵世祖即位聖通為貴人建武元年生皇子彊二年貴人立為皇后彊為太子是後后寵衰數懐怨懟廢十七年廢為中山王太后二十八年薨於北邙光武隂皇后續漢書曰光武光烈隂皇后南陽新野人名麗華宣恩哀侯陸女也陸卒後女年十九歲兄識嫁與世祖納后於宛當成里以后性寛仁宜母天下欲授以尊位后輒退讓以郭氏有子終不肯當遂立郭皇后建武四年生顯宗於元氏十七年郭皇后廢立為皇后十九年太子彊廢立顯宗為太子東觀漢記曰上微時過新野聞后羙心悅之後至長安見執金吾車騎甚盛因歎曰仕宦當作執金吾娶妻當得隂麗華更始元年遂納后於宛孝明馬皇后續漢書曰孝明明徳馬皇后伏波將軍新息侯援之女后年七歳幹治家事勅制僮御出入授計一以貫之諸家莫如其母不知其家事獨后所為也後聞之咸驚異焉母嘗使善卜者相后曰此女必當大貴遂為帝王妃然而少子建武二十八年年十三以選入太子宫接待同列侍承至尊先人後己發以至誠由是見寵永平三年春有司奏請立長秋宫以帥八妾上未有所言皇太后曰馬貴人徳冠後宫即其人也遂立為皇后身衣大帛御者秃裙不緣性不喜出入遊觀未嘗臨御牕牖又不好音樂上時幸苑囿離宫以故希從輒誡言不宜晨起因陳風邪霧露之誡辭意甚備上納焉誦易經習詩論春秋畧記大義讀楚辭尤善賦頌疾其浮華聽論輒摘其要讀光武皇帝紀至有獻千里馬寳劒者上以馬駕皷車劒賜騎士手不持珠玉后未嘗不嘆息也時有楚獄連年不斷囚證相引坐繫者甚多后慮其多濫承間為上言之上惻然感動於是夜起彷徨思論所納非臣下所得聞后志在克己奉上不以私家干朝廷兄為虎賁中郎將兩弟黄門郎訖永平世不遷明帝體不安召黄門防奉參醫藥夙夜勤勞帝崩后作起居注削去防參醫藥事章帝即位后為皇太后下詔告三輔二千石無得令馬氏婚親因權屬託奸亂吏治犯者正法以聞太后素自喜儉前過濯龍門上見外家問起居車如流水馬如龍蒼頭衣緑褠直領領袖正白顧視旁御者逺不及也亦不譴怒但絶其歳用冀以嘿愧其心耳於是親戚被服如一政教不嚴而從以躬率先之故也置織室蠶於濯龍中數來往觀視内以娛樂外以先女功太后崩合葬顯節陵東觀漢記曰后長七尺二寸青白色方口美髪為四起大髻但以髪成尚有餘繞髻三匝復出諸髪眉不施黛獨左眉角小缺補之如粟后素謹慎小感慨輒自責如平生事舅姑時新平主家御者失火及北閣後殿深以自過起居不歡至正月當上原陵言我守備不慎慙見原陵遂不上陳思王畫讚序曰昔明徳馬后美於色厚於徳帝用嘉之嘗從觀畫虞舜見娥皇女英帝指戲之曰恨不如此為妃又前見陶唐之象后指堯曰嗟夫羣臣百僚恨不戴君如是帝顧而笑孝章母賈貴人續漢書曰孝明賈貴人南陽人明徳皇后之姨女孝章皇帝之母也初選入後宫為貴人生章帝馬后無子帝既生而馬后母養之明帝謂馬后曰人未必當自生子也但患養之不勤愛之不至耳若能愛如己子則孝敬亦如親生矣於是馬后待章帝過於所生章帝感后養育之恩遂專名馬氏為外家故賈貴人不蒙舅氏之寵孝章竇皇后續漢書曰孝章章徳竇皇后右扶風平陵人竇勲之女后生二歳呼卜相工見后皆言大貴有容貌才能母沘陽公主欲内之帝聞后有才色數以問諸姬建初二年后與女弟隨主入見長樂宫進止得適人事修備奉事長樂宫下至侍御貢獻問遺皆得其歡心太后異之亦可焉入掖庭見北宫章徳殿后性敏給稱譽日聞太后亦緣意明年有司請立長秋宫遂立為后有寵專固後宫先是宋貴人生太子慶梁貴人生和帝后心忌害之皆誣以挾邪媚道貴人姊妹以憂卒孝章梁皇后續漢書曰孝章恭懐梁皇后安定烏氏女也父竦建初中以女二人選入宫有寵其弟産孝和皇帝竇后母養欲隔絶梁氏初和帝生竦兄弟不勝忻喜竊私相賀語言漏泄傳聞竇后惡之遂作飛語誣陷以惡詔書傅考竦死漢陽獄家屬徙九真二貴人以憂薨永元九年竇太后崩竦長女嬺上書自陳上遂見嬺泣涕問訊賞賜舍第財物以二貴人斂葬禮闕改殯之於承光宫上貴人尊號曰皇太后與姊貴人合葬於西陵上諡曰恭懐皇后儀比敬園追爵諡竦為褒親愍侯徴還竦家屬敬隠宋皇后續漢書曰敬隠宋皇后右扶風平陵人當陽穆侯楊之女也兩女皆有才能令色永平末俱選入宫配皇太子皆寵明帝崩太子即位是為章帝姊妹並為貴人建初三年小貴人生皇子慶二歳立為皇太子後竇后幸廢為清河王至永元九年竇后崩清河王上書求上貴人冢又為外祖母求詣洛陽治病詔曰聽之殤帝崩清河王子立是為安帝鄧太后崩安帝追尊小貴人曰敬隠皇后孝和隂皇后續漢書曰孝和隂皇后吳房侯綱之女也后為人聰慧有才能永元四年選入掖庭為貴人以先后近屬故有異寵立為皇后自和熹鄧后入宫後隂后寵衰怨恨后外母鄧朱數出入宫掖後有言后與朱共挾蠱道賜后䇿遷於桐宫以憂死葬臨平亭部孝和鄧皇后續漢書曰孝和和熹鄧皇后太傅高密侯禹之孫平夀敬侯訓之女也訓有五男三女長隲次惊悝𢎞閶女燕次綏綏即后也次容蚤卒有子女娥甫在襁褓時后年十二傷娥早孤親養撫育慈恩深至后七歳讀論語十二通詩諸兄讀經輒下意難問微意志在書不問家事傅母非之曰當習女工以供衣服今不是務寧當舉博士邪后重違母意則縫綻極女工事暮夜私買脂燭讀經傳宗族内外皆號曰諸生父訓心異之永元四年呼相工蘇文相后大驚曰此成湯之骨法也貴不可言七年中復與諸家女俱選入宫姿容窈窕進退辭令粲然有異於衆女八年十一月己夘后入掖庭為貴人諸兄除郎中后時年十六徳冠後宫后性恭肅小心承事隂氏夙夜兢兢接撫同列常克己下之上深喜焉遂有特寵后自入宫遂博覽五經傳記圖䜟内事風雨占候老子孟子禮記月令法言不觀浮華申韓之書上每欲官秩后諸兄弟輒為推讓孝和世隲裁虎賁中郎將京悝𢎞閶黄門郎和帝未崩數失皇子皇子生養於民間羣僚無知者及和帝崩是日倉卒上下憂惶后乃收斂皇子皇子勝長有微疾殤帝生百餘日后欲自養長立為皇子其夜即位尊皇后為太后帝在襁褓皇太后臨朝建元元年三月太后崩丙午合葬順陵東觀漢記曰后年五歳太夫人為剪髪夫人年老目冥剪中后額雖痛忍不言一額盡傷左右怪而問之后言夫人哀我為斷髪難傷老人意故忍之耳及為太后時宫中亡大珠一篋太后念欲下掖庭問之恐有無辜僵仆者乃親自臨見宫人閱問動察顔色開示恩信宫人即時首服不加鞭箠不敢隠情宫人驚懼咸稱神明曹大家附後漢書曰扶風曹世叔妻者同郡班彪之女也名昭字惠班一名姬博學高才世叔早卒有節行法度兄固著漢書其八表及天文志未及竟而卒和帝詔就東觀藏書閣踵而成之帝數召入宫令皇后諸貴人師事焉號曰大家每有貢獻異物輒召大家作賦頌及鄧太后臨朝預聞政事作女誡七篇年七十餘卒皇太后素服舉哀使者監護喪事所著賦頌銘誄論疏凡十六篇子婦丁氏為撰集之又作大家讚焉孝徳左皇后續漢書曰孝徳左皇后安帝母也父仲躬犍為武陽人后兄聖伯為妖言伏誅父母家産皆沒官后長掖庭有令色賜清河王王大恱特親幸自姬妾已下莫能與比六年生男為清河太子卒葬當利庭延平元年殤帝崩清河太子為皇帝尊清河孝王曰孝徳皇帝左姬曰孝徳皇后孝安閻皇后續漢書曰孝安安思閻皇后河南滎陽人侍中長水校尉暢之女也有才能令色立為皇后安帝崩閻后皇太后與兄顯定䇿禁中迎濟北惠王少子北卿侯懿立為皇帝奉後以其年少欲乆專政於是太后攝政永建元年崩諡安思后合葬恭陵孝安李皇后續漢書曰孝安恭愍李皇后以宫人侍上見幸生順帝為閻后所妬見鴆物故瘞葬城北帝即位左右以聞更以禮殯永元二年葬北陵諡曰愍皇后孝順梁皇后續漢書曰梁皇后大將軍商女后有光景之祥及長聰敏仰承兄姊俯接弟妹恩情周悉既有女工之巧尤好史書學問之事九歳能誦孝經論語遂治韓詩大義略舉常以列女傳圖置在左右宗族中外咸敬服焉永建三年與娣俱選入掖庭相工茅通見之大驚曰此所謂日角偃月相之極貴臣所未嘗見於是以為貴人恩寵日崇乃白上曰陽以博施為徳隂以不專為義盖詩人螽斯之福則百斯男之作所由興也願陛下思天行之均澤識貫魚之次序使小妾得免非謗之累於是上愈善之益親顧焉陽嘉元年立為皇后冲帝在襁褓太后攝政和平元年崩羣臣奏諡曰順烈皇后合葬獻陵孝冲母虞貴人續漢書曰孝順虞大家孝冲皇帝母也遭冲質俱天政在梁氏故與質帝母俱抑而無號嘉平四年小黄門趙祐議郎畢正上言春秋之義母以子貴孝冲皇帝母虞大家質皇帝母渤海陳夫人皆誕生聖帝未有稱號今遭盛明當以母氏序戴外戚朝廷之恩臣子雖賤尚有追贈况二母見存而徒曰大家夫人非所示後進母以子貴之義上感其言即日拜大家為貴人使中常侍持節就園授印綬孝質母陳妃續漢書曰樂安陳夫人孝質皇帝母也家本魏郡少以伎入孝王宫得幸生質帝梁冀欲專國權令帝母不得至京都又帝短祚是以外家無他寵靈帝拜夫人為孝王妃孝崇匽皇后續漢書曰蠡吾博園匽貴人者桓皇帝母也上年十四襲父蠡吾侯翼爵即帝位追尊帝父為崇皇陵曰博陵匽夫人為博園貴人和平元年有司上言為孝崇皇后即授印綬宫曰永樂孝桓梁皇后續漢書曰孝桓懿獻皇后順烈后之女弟也字女瑩上始即位備禮儀納采案舊令聘后納采鴈璧乗馬束帛如孝惠孝平故事聘后黄金二萬斤建和四年立為皇后時太后秉政皇后擅寵後宫太后崩後后恩稍衰後宫妊孕若産皇子后輒隨嫉害少有得全育者然終身亦無子後見御轉希至延熹二年以憂患崩葬懿陵孝桓鄧皇后續漢書曰孝桓鄧皇后字猛女母宣本微賤初適郎中鄧香生后後適梁紀故后冒姓梁氏永興中入掖庭為采女上誅后兄冀等立為皇后帝惡梁姓之同改姓薄氏復姓鄧氏后恃尊驕忌與上所幸郭貴人更相譖乃廢之凡立七年以憂死葬於北邙孝桓竇皇后續漢書曰孝桓竇皇后章徳皇后之族孫大將軍武之女也延熹八年鄧后廢立為皇后孝靈帝立尊皇后為皇太后臨朝武以宦者放縱日久謀悉誅其衆上欲獲忠節下以副輿論數入禁中進白太后太后以為此皆天所生漢興以來世世用事國故典常何可廢耶但當誅首惡耳中常侍管霸頗聞其語結謀誅武武自殺太后歸長樂宫嘉平元年六月崩合葬宣陵孝仁董皇后續漢書曰河間慎園董貴人孝靈皇帝母也靈帝即皇帝位追尊父萇為孝仁皇帝陵曰慎陵董太夫人曰慎園貴人及竇太后歸政還長樂宫迎貴人到京都奉璽綬上尊號為孝仁皇后稱永樂宫竇太后崩後永樂后數至前省與上相見與於政事中平六年上棄天下永樂后兄子重為驃騎將軍何太后臨朝重與太后兄大將軍進權勢相害后毎欲參與政事太后輒相禁塞后憤恚嗔罵曰汝輈張怙汝兄耶勅驃騎斬大將軍頭來何太后以告進進收重免官爵重自殺后憂怖病還河間崩合葬慎陵孝靈宋皇后續漢書曰孝靈宋皇后敬隐宋貴人之從孫執金吾酆之女無寵而久當正位後宫幸姬衆共譖惡誣以祝詛上信之遂䇿收璽綬后自致暴室獄以憂死父及兄弟皆被誅諸常侍小黄門在省闥者皆憐宋氏無辜共合錢物收葬后及酆父子於臯門亭宋氏舊塋孝靈何皇后續漢書曰孝靈靈思何皇后南陽宛人也以良家子選入掖庭見幸妊身就館生男為貴人父貞前卒召貴人同父兄何進為郎中靈帝崩何皇后子辯即位尊皇后為皇太后進為録尚書袁紹謀誅廢中官進以紹計白太后后不聽以為中官統禁省自古及今漢家故事不可廢也且先帝新棄天下奈何令我與士人共事乎及董卓屯顯陽議以為太后迫永樂后令崩逆婦姑之節遷太后於桐宫太后暴崩羣臣奏諡曰靈思皇后合葬文昭陵孝靈王皇后續漢書曰孝靈靈懐王皇后孝獻帝母王章女也才明聰敏能書㑹計以良家子應法相選入掖庭光和三年中愛幸妊身后畏何皇后服藥欲除妊胎安不動又后數夢負日而行遂不敢播四年三月癸巳生上庚子渇飲米粥遂暴薨上歸掖庭暴室嗇夫朱直擁養獨擇乳母歳餘永樂后自將護至三歳靈帝憫上早失所生追思后令色乃作追徳賦令儀頌陵曰文昭陵起墳立陵園北孝獻伏皇后續漢書曰孝獻伏皇后瑯琊東武人侍中輔國將軍不其侯完女也后坐與父完謀為書詐罔不道上收后下暴室詔獄憂死兄弟皆伏誅張璠漢記曰曹操入其二女於宫為貴人誣伏氏為亂使御史大夫郗慮仗節收后后被髪跣足走而執上手曰不能復相活耶上大號驚哭曰我亦不知命在何時顧謂慮曰郗公天下暴虐豈有此乎左右莫不流涕遂殺后也曹瞞列傳曰公遣華歆勒兵入宫收后后閉户藏壁中歆攘户廢壁牽后出孝獻曹皇后續漢書曰孝獻曹皇后丞相魏王操女也名憲建安十八年上納操二女憲節於後宫皆以為貴人明年伏后薨憲為皇后二十年獻帝禪位於魏憲拜山陽公夫人太平御覽巻一百三十七
