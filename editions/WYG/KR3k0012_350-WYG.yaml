body:
  text: 太平御覽卷三百五十宋李昉等撰兵部八十一箭下箭筒歩义櫜鞬射捍彈箭下書曰惟箘簵􅀢詩曰舍矢如破禮曰若竹箭之有筠也魏百官名曰三公拜賜鶉尾鶻尾䯞箭十二枝三箭畧記曰富平城孝明帝時改為厭次此城東南五十里有蒲臺髙丈八秦始皇所頓處時在臺下縈蒲繋馬夾道數百歩到今蒲生猶縈馬蒲似水楊而勁堪為箭博物志曰交州山夷名曰俚子弓長數尺箭長尺餘以燋銅為鏑塗毒藥於鏑鋒中人即死不時歛藏則鋒脹沸爛須臾燋􅋩都盡惟骨在耳其俗誓不以此藥法語人治之飲婦人月水及糞汁時有差者唯射豬犬者無他以其食糞故也燋銅者有聲以物打之徐聽其聲得燋毒者偏鑿取以為箭鏑焦贛易林曰䨇鳬俱飛以歸稻池經渉其澤為矢所射傷我胷臆劉向新序曰楚熊渠子夜行見􅃦石似伏獸射之飲羽異苑曰烏傷黄蔡義熈初於查溪岸照射見水際有物眼光徹其間相去三尺許形大如斗引弩射之應弦而中便聞從流奔驚波浪砰磕不知所向經年與伴共至一處名為竹落崗去先所二十許里有骨可長三丈餘見昔射箭貫在其中因語伴云此是我往年所射物乃死於斯㧞矢而歸其夕夢見一長人責誚之曰我在洲渚之間無關人事而横見殺害怨苦莫伸連時覓汝今始相得眠寤仍患腹疾而殞又曰永陽李增行經大溪見二蛟在水引弓射之中一即死增歸因復出市有女子素服啣涕提所射箭增怪而問焉女荅曰何用問為若是君許便以相還授矢而滅增惡而驟反未達家暴死於路孟子曰矢人豈不仁於函人哉矢人惟恐不傷人函人惟恐傷人列子曰逢䝉之弟子曰鴻超怒其妻而怖之引烏號之弓綦衛之箭射其目矢未注眸子睚不建矢墜地而塵不揚又曰飛衛學射於甘蠅諸法並善唯囓法不教衛宻將矢以射蠅蠅嚙得鏃矢射衛衛繞樹而走矢亦繞樹而射魯連子曰燕伐齊取七十餘城唯莒與即墨不下齊田單以即墨破燕軍殺燕將軍騎刼復齊城唯聊城不下燕將守城數月魯仲連乃為書約之於矢以射城中遺燕將軍書泣三日乃自殺尉繚子曰夫殺人百歩之外者誰也曰矢也韓子曰矢來無向則為鐵室以備之又曰智伯將伐趙趙襄子召張孟談問之曰柰無箭何孟談曰董安于之治晉陽也公宫之垣皆荻蒿枯楚廧之其髙至于丈君發而用之有餘箭矣於是發而試之堅則􅌲幹之勁不能過也君曰吾箭以足矣柰无金何孟談曰董之治晉陽宫公令舎之堂皆以錬銅為柱質君發而用之有餘金矣戰國策曰公宫之垣皆以荻稿其堅則􅌲簬之勁不能過也簬音路又曰水激則悍矢激則逺又曰楚王有白猿王自射之則摶矢而嬉嬉戲也使養由基射之始調弓矯矢未發而猿擁樹號矣由基楚共王之臣養叔也調調張也矯直也擁抱也諸葛子曰若能力兼三人身與馬如膠􅃮手與箭如飛䖟誠宜寵異亢倉子曰勾粤之幹鏃以精金鷙隼為之羽以之棓箠則其與稿考朴也無擇勾粤東粤幹妣幹也鷙隼雕鳥之類掊箠打撃也爾雅曰東南之美有會稽之竹箭焉夫勾越之幹以精金為鏃以隼翎羽之打撃則同於稿科無擇猶無異也及夫盪㓂爭䖍覿武决勝加之彊弩之上則三百歩之外不立敵矣楚辭曰舉長矢兮射天狼陳琳武軍賦曰矢則申息肅眘箘簵空流燋銅毒簳飛鏃嗚鍭子虛賦曰曵明月之珠旗建干將之雄㦸左烏號之雕弓右夏服之勁箭射雉賦曰昔賈氏之如臯始觧顔於一箭醜夫為之改貌憾妻為之釋怨吳都賦曰其竹則篔音于君切簹音都郎切箖音呤箊音於桂箭射筩柚梧有篁篻簩音勞有叢後漢李尤弧矢銘曰弦木為弧剡木為矢弧矢協并八極同紀晉江統弧矢銘曰幽都筋角㑹稽竹矢率土名珍東南之美易以獲隼詩以殪兕伐叛柔服用威不韙梁昭明太子弓矢贊曰弓用筋角矢製良工亦以觀徳非止臨戎楊葉命中猨墮張空箭筒釋名曰箭筒受矢之器以皮曰箙謂柔服用之也織竹曰笮相廹笮之名也說文曰筒所以盛弩矢人所以負也詩義問曰總所以覆矢也謂箭筒蓋也周禮夏官下司弓矢曰仲秋獻矢箙箙盛矢噐也獸皮為之也左傳曰公徒執氷而踞杜預注曰氷箭筒蓋也又曰晋楚戰楚熊負覊囚智罃智莊子以其族反之負覊楚大夫也智罃智莊子之子也厨武子御武子魏錡下軍之士多從之智莊子下軍大夫故也每射抽矢菆納諸厨子之房抽櫂也取好箭也房箭舎也武子怒曰非子之求而蒲之愛蒲楊邵可以為箭也董澤之蒲可勝既乎集異記曰丹陽張承先家有一鬼為張偷得一箭筒云慎勿至新亭射此三井陶家物張以借他鬼罵欲燒屋張馳取還乃止雜詩曰象弧雕服竹譜曰射筒竹簿肌而長中着箭因以為名歩义又音釵與前同釋名曰歩义人所帶以箭义其中馬上曰鞬鞬建也弓矢並建立其中也通俗文曰箭箙謂之歩义趙書曰石虎等破劉曜之後獲馬二百疋赤剡金銀歩义弓鞬三十具櫜鞬左傳曰晋楚治兵遇於中原其左執鞭弭右屬櫜鞬以與君周旋櫜以受箭鞬以受弓後漢書曰董卓膂力過人䨇帶兩鞬左右馳射方言曰所以藏矢謂之服藏弓謂之鞬櫜屬右曰鞬左氏傳魏百官名曰三公拜賜魚皮歩义一獾皮鞬一琢菆金校歩义一金校豹皮鞬一射捍音汗說文曰鞲射臂㧺也三禮弓矢圖曰􅀈者臂捍以朱􅅊為之謂之􅀈者所以遂弦也括地圗曰羿年五歳父母與入山其母處之大樹下待蟬鳴還欲取之羣蟬俱鳴遂捐去羿為山間所養羿年二十能習弓矢仰天歎曰我將射逺方矢至吾門止因捍即射矢摩地截草經至羿門隨矢去管子曰桓公弋管仲隰朋朝公望二子弛弓脫捍而迎之魯連子曰弦銲相第而增矢得髙焉專諸刺僚王闔廬乃成名焉彈廣雅釋噐曰􅀈謂之彈宋林曰彈行丸者又栟也栟使戰動棹彈也桂苑曰彈行丸弓又作弓開元文字曰引彈之謂行丸者也又彈栟也說文曰彈行丸也吳越春秋曰陳音對越王云弩生於弓弓生於彈彈生於古之孝子古者人民質朴死則裹以白茅投之中野孝子不忍父母為禽獸所食則作彈以守之故古人歌之曰斷竹續竹飛土逐肉遂令死者不犯鳥􅈢之殘也周禮曰凡句兵欲無彈刺兵欲無蜎左傳曰晉靈公不君從臺上彈人觀其避丸者􅂖梁曰靈公朝大夫而暴彈之也觀其避丸也漢書曰長安中姦猾浸多閭里群軰殺吏受財報仇相與探丸為彈得赤丸者斫武吏黒者斫文吏白者主治喪城中薄暮塵起剽刼行者死傷横道張璠漢記曰班超使于寘願將三十六人以為蒿矢彈丸之用魏書曰齊王芳為帝常喜以彈彈人魏書傳曰曹爽兄弟歸家勑洛陽縣發民八百人使尉部圍爽第四角作髙樓令人在上望視爽計窮愁悶持彈到後園中樓上人便唱言故大將軍東行南行爽還聽事上矣晉安帝紀曰瑯邪内史孫無終貪横忍虐妓妾有忤意者輙彈其面簫子顯齊書曰桓榮祖字華先下邳人榮祖善彈彈鳥毛盡而鳥不死每榮祖登城西樓彈之無不折翅而下崔鴻西秦録曰辛進字國都隴西人建𢎞初為散騎常侍從乞伏熾盤遊于後園霄觀彈鳥丸傷暮末毋怒故誅之隋書曰長孫晟善彈有鳶羣飛上曰公為我取之晟十發俱中並應而落賜賚極多韓詩外傳曰楚莊王將興師伐晋告大夫曰有敢諫者罪至死無赦孫叔敖進諫曰臣之園中有榆其上有蟬蟬方奮翼悲鳴欲飲清露不知螳螂在後曲其頸欲攫而食之也螳螂方欲食蟬而不知黄雀在後舉頭而啄音卓食之黄雀方欲食螳螂不知童子挾彈丸在榆下仰而欲彈之童子方欲彈黄雀不知前有深坑後有掘株也此皆貪前之利不顧後害者也非獨昆虫衆庶若此人主亦然楚國不殆而晉國以寜孫叔敖之力也西京雜記曰韓嫣好彈以金為丸所失日有十餘人皆逐之長安為之語曰若飢寒逐金丸異苑曰青溪小姑廟云是蔣侯第三妹廟中有大榖樹扶踈䕃瀆鳥常産肓其上太原中陳郡謝慶執彈乗馬激殺數頭至夜夢一女子衣裳楚楚怒云此鳥是我養何故見侵經年而謝慶卒名渙靈運父也幽明録曰元嘉初散騎劉雋家在丹陽郡後常閑居而天大驟雨見門前有三小兒皆可六七歳相牽狡獪而並不沾濡雋疑非人俄見共爭一瓠壺子雋引彈彈之正中壺霍然不見雋出人問前得一壺而泣曰此是小兒物不知何由在此雋具説之東方朔記曰東方朔對驃騎難曰以珠彈不如埿丸各有所用也莊子曰莊周遊乎雕陵之樊覩一異鵲自南方來何鳥哉執彈而留之覩一蟬方得美䕃而忘其身螳螂執翳而摶之見得而忘其形異鵲從而利之見利而忘其真莊周怵然曰物固相累二貌相招也指彈而射之虞人逐而訊之以周為盗粟又曰化予之左臂以為鷄予因以求時夜浸假而化右臂以為彈余因以求鴞炙又曰以隋侯之珠彈千仞之雀以所用者重所要者輕太𤣥經曰明珠彈於飛寅甘不復潜夫論曰丁夫不傳犁鋤懐挾彈或取好土作彈賣之其彈外不可禦盗内不足禁鼷䑕志彈鳥雀百發不得反一中無用而有害也世說曰前輩人忌日不樂王世將以忌日送客至新亭便持彈往衞洗馬墓下彈鳥夢書曰夢持彈者得朋友趙壹窮鳥賦曰有一窮鳥戢翼于野單網加上機穽在下前見蒼隼後見驅者繳彈張右羿弓彀左飛丸激矢交集於我思飛不得欲鳴不可舉頭畏觸揺足恐墮内獨怖急乍水乍火夏侯孝若繳彈賦曰張弱弓理繁繳望大羣以送丸審遣放而必獲古樂府歌曰鳥生八九子秦氏桂樹間秦氏家有遊蕩子立用睢陽彈强丸魏明帝猛虎行曰雙桐生空井枝葉自相加通泉浸其根𤣥雲潤其柯上有䨇棲鳥交頸鳴相和何意行路者秉丸彈是窠桓𤣥南林彈詩散帶乗駟馬揮彈出長林歸翮赴舊栖木末轉翔禽落羽尋絶響屢中輙應心後漢李尤彈銘曰昔之造彈起意弦木以彈為矢合竹為樸􅃮篩膠治弗用筋鏃丸彈之利以弋鳬鶩晋靈驕悖羣臣是彈樂其如躍觀其避丸太平御覽卷三百五十
