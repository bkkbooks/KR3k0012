body:
  text: 太平御覧卷八百八十八宋李昉等撰妖異部四變化下莊子曰夫白鶂之相視眸子不運而風化蟲雄鳴於上風雌應之於下風而化淮南子曰夫歴陽之都一夕反為湖勇力聖智與怯不肖者同命又曰有牛哀者病七日而化為虎兄啓户而入哀摶殺之又曰雌雄相接陰陽相薄羽者為雛鷇毛者為駒犢軟者為皮肉堅者為齒角人不怪也水生蚌蜃山生金玉人不怪也老槐生火久血為燐人不怪也水生罔象木生畢方井生墳羊人怪之聞見鮮而所識淺也論衡曰天地不變日月不易星辰不沒正也人受正氣故體不變男化為女女化為男由髙岸為谷深谷為陵也應政為變非常怪也蠐螬化為復育轉而為蝉蝉生翼翼不類蠐螬凡諸螟類多化也抱朴子曰周穆王南征一軍盡化君子為猿為鶴小人為蟲為沙又曰案老子玉策松脂入地千年變為茯苓茯苓千年變為琥珀琥珀千年變為石膽石膽千年變為威喜千嵗之狐豫知將來千嵗之貍變為好女千嵗之猿變為老人又曰伍被記八公造淮南王安初以老公不見通須臾皆成少年又墨子五行書云墨子能變形易貌坐在立亡蹙面則成老人含笑則成女子踞地則成小兒博物志曰化民食桑二十七年以絲自裹九年死又曰呉王江行食膾棄於中流化而為魚今魚有名王餘者長數寸大如筯猶有膾形又曰無啓民穴居食土無男女死埋之其心不朽百年還化為人又曰埋蜻蜓頭於西向户下則化成青蛛也又曰江漢有貙人能為虎俗云貙虎化為人好着葛衣其足無踵有五指者皆貙也越嶲國之老者時化為虎寧州南見有此物王子年拾遺記曰崑崙者西方曰須彌山最下層有螭潭百里多龍螭皆白色千嵗一蜕其五臟潭側有五色石云是白螭之膓化為此石又曰因墀國去王都十六萬里有解形之民放其身於空潭先使頭飛於南方次使左手飛於東方次使右手飛於西方自臍以下兩足孤立至暮頭還於體兩手不至遇疾風吹兩手於北海𤣥州上化為五足之獸則一指為一足也蜀王本紀曰蜀王之先名蚕叢後代名曰栢濩後者名魚鳬此三代各數百嵗皆神化不死其民亦頗隨王化去王獵至湔便仙去今廟祀之於湔時蜀民稀少後有一男子名曰杜宇從天墮止朱提有一女子名利從江源地井中出為杜宇妻宇自立為王號曰蜀王治汶山下邑鄆化民往往復出望帝積百餘嵗荆有一人名鼈靈其尸亡去荆人求之不得鼈靈尸至蜀復生蜀王以為相時玉山出水若堯之洪水望帝不能治水使鼈靈決玉山民得陸處鼈靈治水去後望帝與其妻通帝自以薄徳不如鼈靈委國授鼈靈而去如堯之禅舜鼈靈即位號曰開明竒帝生盧保亦號開明天為蜀王生五丁力士能徙蜀山王死五丁輙立大石長三丈重千鈞號曰石笋千人不能動萬人不能移蜀王據有巴蜀之地本治廣都後徙治成都秦惠王時蜀王不降秦秦亦無道出於蜀蜀王徙萬餘人傳獵褒谷卒見秦惠秦惠以金一笥遺蜀王蜀王報以禮物禮物盡化為土秦王大怒臣下皆再拜賀曰土者土地秦當得蜀矣秦王恐亡相見處乃刻五石牛置金其後蜀王以為金便令五丁拖牛成道致三枚於武都秦道乃得通石牛之力也武都人有善知蜀王者將其妻女適蜀及居蜀之後不習水土欲歸蜀王愛其女留之乃作伊鳴之聲六曲以樂之或曰前武都丈夫化為女子顔色美好盖山之精也蜀王取以為妻不習水土疾病欲歸蜀王留之無幾物故蜀王發卒於武都擔土於成都郭中葬之盖地數畆髙七丈號曰武擔以石作鏡一枚表其墓於是秦王知蜀王好色乃獻美女五人於蜀王愛之遣五丁迎女還至梓潼見一大蛇入山穴中五丁共引地山崩壓五丁五丁大呼秦王五女及送迎者悉化為石蜀王登臺望之不來因名五婦候臺蜀王親埋作冢皆致方石以誌其墓列異傳曰昔鄱陽郡安樂縣有人姓彭世以捕射為業兒随父入山父忽蹶然倒地乃變成白鹿兒悲號鹿遂跳躍逺逝遂失所在兒於是不捉弓終身至孫復學射忽得一白鹿乃於鹿角間得道家七星符并有其祖姓名年月分明視之惋悔乃燒去弧矢又曰武昌新縣北山上有望夫石狀若人立者傳云昔有貞婦其夫從役逺赴國難婦携幼子餞送此山立望而形化為石丹陽記曰孫皓寳鼎元年丹陽宣蹇之母年八十因浴於後湖化為鼈捜神記曰千嵗之雉入海為蜃百年之雀入江為蛤千嵗龜黿能與人語千嵗蛇斷而復續百年之䑕能相卜數之至也春分之日鷹變為鳩秋分之日鳩變為鷹時之化也故腐草之為螢也朽葦之為蚕也麥之為蛺蝶也羽翼生焉眼目成焉心知出焉自無知而化為有知而氣易也蛇之為鼈也蚕之為蝦也不失其血氣而形性變也又曰土蜂名曰蜾臝今世謂之蝄蜽細腰之類也其為物純雄而無雌不交不産常取桑䖝之子而育之則皆成己子焉又曰麥之為蝶由於濕也爾則萬物之變皆有以也農民止麥之化者漚之以灰聖人理萬物之化者濟之以道又曰南方有落頭民其頭能飛其種人部有祭祀號曰蟲落故因取名焉呉時將軍朱桓得一婢每夜卧後頭輙飛去或從狗竇或從天窓中出入以耳為翼將曉復還如此傍人怪之夜中照視唯身無頭其體㣲冷氣息裁屬乃蒙之以被至時頭還礙被不得安兩三度墮地噫咤甚愁體氣甚急狀若將死乃去被頭復起𫝊頸有頃平和桓以為大怪畏不敢畜乃放還之既而詳之乃知天性也時南征大將亦往往得之又嘗有覆以銅盤者頭不得進死又曰昔者髙陽氏有同産而為夫婦帝放之於崆峒之野相抱而死神鳥以不死草覆之七年男女同體而生二頭四手足是為蒙雙氏續捜神記曰尋陽縣北山中蠻人有術能使人化作虎毛色爪牙悉如真虎鄉人周眕有一奴使入山伐薪奴有婦及妹亦與俱行既至奴與二人云汝且上髙樹視我所為如其言既而入草須臾見一大黃班虎從草出奮迅吼喚甚為可畏二人大怖良久還草中少時復還為人語二人曰歸家慎勿道後遂向等軰説之周得知乃以淳酒飲之令熟醉使人解其衣服及身體事事詳悉了無所異惟於髻中得一紙畫作大虎虎邊有符周宻取録之奴既醒喚問之見事已露遂具説本末云先嘗於蠻中告糴有一蠻師云有此術以三尺布數升米􅀈一赤雄雞一升酒受此法又曰清河宋士宗母以黃初中夏天於浴室裏浴遣家中子女盡出戸獨在一室中良久家人不解其意於壁穿中闚不見人正見木盆水中有一大鼈遂開户大小悉入了不與人相承嘗先著釵猶在頭上相與守之積日轉懈遂自投出户外其去甚駛逐之不及遂便入水後數日忽還巡行宅舍如平生了無所言而去時人謂士宗應行䘮治服士宗以母形雖變而生理尚存竟不治䘮與江夏黃母相似異苑曰豫章郡吏易㧞義熙中受畨還家逺遁不返郡遣追見㧞言語如常亦為設食使者催令束裝㧞因語曰汝看我面乃見眼目角張身有黃班便豎一足徑出門去家先依山為居至林麓變成三足大虎所豎一脚即成其尾又曰邵陵髙平黃秀以元嘉三年無故入山經日不還其兒根生尋覔見蹲空樹中從頭至腰毛色如熊問其何故答云天譴我如此汝但自去哀慟而歸踰年伐山人見之其形盡為熊矣又曰苻堅建元年中長安樵人於城南見金走白堅堅遣載取倒化為銅鼎入門又變成大鐸異物志云東海有虎錯魚皆化虎上岸食人即呉都賦所謂沉虎潜鹿也越雋河有魚皆人形而著冠幘俗語曰古時郡陷人皆悉變而為魚也又曰司馬軌之字道援善射雉太元中將媒下翳此媒屢雊野雉亦應試令尋覔所應者頭翅已成雉半身後故是蛇晉中朝武庫内忽有雉時人咸謂為怪張司空云此蛇之所作耳即捜除庫中果得蛇蜕又曰元興二年衡陽雌雞化為雄八十日冠萎後桓元簒八旬而敗又曰隆安中有青雌雞化而為赤雄雞形尾都變冠彩皆具唯不能鳴幽明録曰宜陽縣有女子姓彭名娥父母昆弟十餘人為長沙賊所攻時娥負器出汲於溪聞賊至走還正見塢壁已破不勝其哀與賊相格賊縛娥驅出溪邊將殺之溪際有大山石壁髙數十丈娥仰天呼曰皇天有神明我為何罪而當如此因奔走向山山髙開廣數丈平路如砥羣賊亦逐娥入山山遂崩合冺然如初賊皆壓死山裏頭出山外娥遂隐不復出娥所汲器化為石形頭似雞土人因號曰雞山其水為娥潭齊諧記曰義熙四年東陽郡太末縣呉道宗少失父单與母居㑹道宗收債不在隣人聞其屋中砰礚之聲闚不見其母但有烏斑虎在其室中鄉曲驚怕恐虎入食其母便鳴鼓㑹人共往救之圍宅突進不見其虎但見其母語如常不解此意兒還母語之曰宿罪見譴當有變化事後一月日便失其母縣界内虎災屢起皆云烏斑虎百姓患之發人格擊之殺數人後人射虎中膺并㦸刺中其腹然不能即得經數日後虎還其家故床上不能復人形伏床上而死其兒號泣而葬其母如法朝夕哭臨又曰太元元年江夏郡安陸縣薛道詢年二十二少來了了忽得時行病瘥後發狂百藥治救不痊乃服散狂走猶多劇忽失踪跡遂變作虎食人不可復數有一女子樹下採桑虎往取食之食竟乃藏其釵釧著山門後還作人皆知取之經一年還家為人遂出都仕官為殿中令史夜共人語忽道天地變怪之事道詢自云吾昔嘗得病狂發遂化作虎噉人一年中兼道其處并所噉人姓名其同坐人或有食父子兄弟者於是號哭捉以付官遂餓死建康獄中太平御覧卷八百八十八
