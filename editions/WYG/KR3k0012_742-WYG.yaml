  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_742-1a, image: WYG0899/WYG0899-0529a.png}
body:
  text: 太平御覽卷七百四十二宋李昉等撰疾病部五瘡痱螫毒蠱癰疽瘻癬􅏿疥惡疾疫癘瘡周禮春官下曰瘍醫掌腫瘍潰􅅑金􅅑折瘍之祝祝當為注讀如注病之注禮記曲禮上曰頭有瘡則沐身有瘍則浴謝承後漢書曰媯皓母炙瘡發膿皓祝而愈之魏書曰孫觀遷青州刺史從征孫權於濡湏口為流矢所中穿左足力戰不顧太祖勞之曰將軍被瘡深重而猛氣益奮及瘡甚遂卒吴厯曰孫䇿為許貢客所傷既被瘡䇿引鏡自照曰面目如此尚可復建功立事乎推几大呼瘡皆分裂其夜卒江表傳曰周泰為濡湏督諸軍以泰本出於㣲賤咸輕傲之孫權乃入泰營於都巷中張幔大請官僚使泰脫衣幘見其瘡痍匝體指瘡而問何地戰傷泰具對權把其臂流涕沈約宋書曰劉邕所噉食每異於人性嗜瘡痂詣孟靈休靈休先患炙瘡瘡痂落牀上邕因取食之靈休瘡痂未落者悉褫取以飴邕靈休與何朂書曰劉邕向顧見噉舉體流血南康國吏二百人不問有罪無罪逓互與鞭取瘡痂常以給膳又曰張收嘗為猘犬所傷醫云宜食蝦膾收甚難之醫含笑先嘗收因此乃食瘡亦即愈後魏書曰長孫子彦末年濕發舉體生瘡雖親戚兄弟以為惡疾子彦曰如此惡疾世無良醫吾其死矣嘗聞惡疾蝮蛇螫之痛試為求之當令兄弟知我乃於南山得蛇以股觸之痛楚號呌俄而腫死抱朴子曰治金瘡以氣吹之立即斷痛登山論衡曰儒書言燕太子丹使荆軻刺秦王不得誅死後髙漸離復以擊筑見秦王王知燕之客乃膠其眼使之擊筑漸離置􅖳於筑中以為重而擊秦王秦王病瘡三月而死夫言髙漸離以筑擊秦王實也言中秦王病瘡三月而死虗也嵇康髙士傳曰孔休元嘗被人斫之至見王莽以其面有瘡瘢乃碎其玉劍琨與之華佗别傳曰瑯琊有女子左脚膝上瘡癢而不痛愈復發佗曰當得稻穅色犬繫馬牽走五十里斷犬後脚向瘡口湏㬰有蛇在瘡中出以鐵椎横貫引出長三尺許七日便愈異苑曰陳郡謝石少患面瘡諸治莫愈乃自匿逺山卧於巖下中宵有物䑛其瘡隨䑛隨除而䑛處悉白故世呼為謝白面又曰有田父耕地見傷蛇在焉有一蛇銜草著瘡上而傷者差田父收其餘葉治瘡皆驗又曰晉時長山趙宣母姙身如常而髀上癢搔之成瘡二兒從瘡出母子平安幽明録曰漢武在甘泉宫有玉女降與帝圍棋女風姿端正帝乃欲通之女因唾帝面遂成瘡帝避跪謝神女為出温水洗之事其温泉部西京雜記曰廣川王好發冡後發欒書冡爾夕王夢一丈夫鬢眉盡白以杖扣王左脚王覺左脚腫痛因生瘡至死不差三輔故事曰衛太子嶽鼻武帝疾避暑甘泉宫江充謂太子曰陛下惡太子鼻當持紙蔽其鼻及入充言曰太子不欲聞陛下膿臭蔽鼻而入帝大怒痱說文曰痱風病也漢書曰灌嬰矯先帝詔當棄市嬰陽病痱不食欲死或聞上無殺意嬰復食治病議定不死矣乃有飛語為惡言聞上故以棄市東觀漢記曰明帝行幸諸國勅執金吾馮魴將緹騎宿𤣥武門複道上詔曰􅃨道多風寒左右老人且病痱多取帷帳東西完塞窓皆令緻宻螫毒魏志曰彭城夫人夜之厠䘍螫其手呻吟無賴華佗令温湯漬手數易湯常令煖其旦即愈捜神記曰阮瑀傷於虺齅其瘡而雙虺出鼻中孔叢子曰宰我使齊反見夫子曰梁丘據遇毒三旬而瘳齊㑹大夫衆賔賀焉大夫並復獻攻毒之方弟子謂曰梁丘子瘳矣方安所施夫子曰三折肱而知為醫治梁丘遇虺害而獲瘳假有與之同疾者必問所以已之方衆人為具故各言其方也抱朴子曰蝮蛇中人不曉方術者但以刀割肉投地其肉沸如火炙須㬰焦盡嵇含遇䘍賦曰元康二年七月七日中夜遇䘍客有戯余者曰諺云過滿百為䘍所螫斯言信哉蠱周禮秋官曰庻氏掌除毒蠱以嘉草攻之左傳宣上曰晉克有蠱疾沈約宋書曰沛郡相縣唐賜徃此村飲酒還因得病吐蠱䖝十枚臨死語妻張曰死後刳腹中病張手破之臟悉糜碎捜神記曰蠱有怪物若鬼其妖形變化雜類殊種或為狗豕或為䖝蛇其人皆自知其形狀常行之於百姓所中皆死續捜神記曰曇逰道人清苦沙門也剡縣有一家事蠱人噉其食飲無不吐血死遊詣之主人下食遊便呪焉則雙蜈蚣長丈餘於盤中走出飽食歸安然無他疾靈鬼志曰滎陽郡有一家姓廖其家累世為蠱以致富子女豐恱後取新婦不以此語之家人悉行婦獨守家見屋中一大缸試發見一大蛇便作沸湯悉灌殺之家人還婦具說焉舉家驚惋無幾其家疾病亡畧盡疽癰廣雅曰痤疽癰也說文曰癰腫也痤小腫也釋名曰癰壅也氣壅不通結𠂻而潰也左傳襄公十九年傳曰晉荀偃癉疽生􅅑於頭濟河及著癰病目出史記曰卒有病癰者呉起為吮之卒母哭之曰徃年呉公吮其父父遂戰死今又吮此子妾不知其所死矣漢書曰項羽疑范増奪其權増怒曰天下且定而王自為之願賜骸骨羽許之亞父未至彭城疽發背而死又曰僕射鄭宗數以職事見責發頸癰而死又曰文帝病癰鄧通常為上吮之上問曰天下誰最愛我通曰莫如太子太子入上使吮癰太子色難聞通吮之慙遂恨通東觀漢記曰樊儵事後母至孝母常病癰樊至吮𠻳典畧曰趙戩病疽疾年六十餘聞魏王薨哭泣哀過瘡發而卒王隠晉書曰徐苖字叔胄弟亡臨殯癰太潰膿溢苖含去之宋書曰劉瑀與何􅅯並發背癰瑀疾已篤聞􅅯亡懽甚呌呼於是亦卒南史曰徐嗣伯春月出戯聞草屋中有呻吟聲嗣伯曰此病甚重更一日不療必死乃徃視見一老姥稱體痛而處處有􅗼黒無數嗣伯還煑斗餘湯送令服之訖痛熱愈甚跳投狀者無數須㬰所􅗼處皆披出長寸許乃以膏塗諸瘡口三日而復云此名針疽也又曰薛伯宗善徙癰疽公孫㤗患發背伯宗為氣封之徙置齋前栁樹上明日而癰消樹邉便起一瘤如拳大稍稍長二十餘日瘤大膿爛出黄赤汁升餘樹為之瘻損唐書曰李洧從父兄正已死洧以徐州歸順封潮陽郡王無何背發疽稍平乃大具糜餅飯僧於市洧乘平肩輿自臨其塲市人讙呼洧驚疽潰於背而卒孝子傳曰魏達父苦疽痺達吮喇而愈山海經曰帶山有鳥狀如烏五采名鵸䳜食之不疽又曰半石之山合水出焉多鰧魚蒼文赤尾食之不癰譙明之山譙水出焉多何羅魚一首十身食之已癰辛氏三秦記曰大魚如羊在長池中世人食之生癰瘡論衡曰儒書云齊桓公負婦人朝諸侯管仲告諸侯曰吾君疽瘡不得婦人瘡惡不愈諸侯信管仲故無叛者瘻說文曰瘻頸腫也山海經曰脫扈之山植猪之草可以已䑕郭璞注曰䑕瘻也淮南子曰貍頭已䑕雞頭已瘻洞林曰栁祖休婦病䑕瘻積年不差及困令兒就外卜之語之曰當得賤師姓石者治之事具䑕部癬說文曰癬乾瘡也山海經曰渠猪之山多豪魚赤啄赤尾食之可以已癬又曰槖山槖水出焉修郡之魚其音如鴟食之已癬􅏿說文曰􅏿中塞腫漢書曰趙充國討先零帝詔充國曰欲至冬擊虜將軍士寒手足皸􅏿豈有利哉皸拆裂也􅏿寒瘡也疥說文曰瘡瘙也周禮天官疾醫曰夏時有癢疥病禮記月令曰仲冬行春令民多疥癘左傳昭五曰齊侯疥遂痁朞而不瘳諸侯之賔問疾者多在焉國語呉語曰夫差既許越成乃大戒師徒將以伐齊子胥入諌曰越之在呉也猶人之有心腹之疾也今王非越是圗而齊魯以為憂夫齊譬諸疾疥癬也豈能渉江湖而與我爭此地哉山海經曰石脆之山其草多條其狀如韭而白花黒實食之已疥又曰竹山有草名曰黄雚狀如樗葉如麻白華赤實浴之已疥宋玊登徒子賦曰登徒子之妻既疥且痔登徒悦之使有五子惡疾韓詩外傳曰芣苢傷夫有惡疾也采采芣苢薄言捋之芣苢澤㵼也芣苢惡臭之菜猶捋之不已君子雖有惡疾猶不能去離也論語雍也曰伯牛有疾子問之自牖執其手包曰牛有惡疾不欲見人曰亡之命矣夫斯人也而有斯疾也斯人也而有斯疾也後魏書曰李庶生而天閹崔諶調之曰教弟種鬢以錐遍刺作孔挿以馬尾庶曰先以此方廻施貴族藝眉有效然後樹鬢世傳諶門有惡疾以呼沲為墓田故庶言及之列女傳曰蔡夫之妻者宋人之女也既嫁於蔡夫有惡疾其母將改嫁之女曰夫之不幸乃妾之不幸將何去之終不聽其母而作芣苢之詩疫癘說文曰疫皆民之疾也釋名曰疫役也言有鬼行疫也禮記月令曰孟夏行秋令則民多大疫續漢書曰元初中㑹稽大疫使光禄大夫將醫廵行魏書曰文帝在東宫氛癘大起時人彫傷帝深感歎與素所敬者大理王朗書言人生有七尺之形死為一棺之土惟立徳揚名可以不朽魏志曰司馬朗遷兖州刺史征呉到居巢軍中有疫即躬親廵視致藥於疾卒焉王隠晉書曰郭文舉得疫病危困不肯伏藥曰命在天不在藥鍾離意别傳曰黄讜為㑹稽太守呉大疫疾黄君轉署意中部得郵意乃露車不冠身循行病者賜與醫藥其所臨䕶日十餘人劉根别傳曰頴川太守到官民大疫掾吏死者過半夫人郎君悉病府君從根求消除疫氣之術根曰寅戌歲泄在亥今年太歲在寅於㕔事之亥地穿地深三尺方與深同取沙三斛著中以淳酒三升沃在地府君即從之病者即愈疫疾遂絶山海經曰復州之山有企踵之鳥如雞一足􅇾毛見則其國中大疫三輔決録曰井丹舉室疫病梁松自將醫藥治丹盛𢎞之荆州記曰治安郡有鳥焉其形似鵲白尾名為青鳥常以三月自蒼梧而度羣飛不可勝數山人見其來多苦疫氣魏文帝與呉質書曰昔年疾疫親故多罹其災徐陳應劉一時俱逝曹植說疫氣曰建安二十二年癘氣流行家家有僵尸之痛室室有號泣之哀或闔門而殪或覆族而䘮或以為疫者鬼神所作夫罹此者悉被褐茹藿之子荆室蓬戶之人耳若夫殿處鼎食之家重貂累蓐之門若是者鮮焉此乃隂陽失位寒暑錯時是故生疫而愚民懸符厭之亦可笑也太平御覽卷七百四十二
