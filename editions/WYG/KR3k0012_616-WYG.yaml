body:
  text: 太平御覽卷六百十六宋李昉等撰學部十讀誦禮記曲禮曰居䘮未葬讀䘮禮既葬讀祭禮䘮復常讀樂章論語曰南容三復白圭孔子以其兄之子妻之周禮春官下曰太史掌建邦之六典大祭祀與執事卜日執事太卜之屬及宿之日與羣執事讀禮書而協事協合也合事謂習錄所當共之事也又曰小史掌邦國之志大祭祀讀禮法史以書叙昭穆之俎簋讀禮法者太史與羣執事史此小史也史記曰太史公曰予讀孟子書至梁惠王問何以利吾國未嘗不廢書而歎息也曰嗟夫利誠亂之始也夫子罕言利者常防其原也又曰孔子晚善易韋編三絶鐵擿三折漆書三滅也又曰董仲舒下帷讀書三年不窺園圃漢書曰劉向專精經術晝誦書傳夜觀星宿又曰揚雄自有大度非聖哲之書不好也非其意雖富貴不事也東觀漢記曰章帝詔黄香令詣東觀讀所未嘗見書謂諸生曰此天下無雙江夏黄童也又曰髙鳳誦經晝夜不絶聲妻之田曝麥以竿授鳳令䕶雞鳳受竿誦經如故天暴雨流麥意在經不覺麥漂謝承後漢書曰王充字仲任家貧無書至京師入市閱書一見輒能誦憶又曰應奉字世叔讀書五行俱下又曰侯瑾字子瑜傭作為資暮還輒􅅡火以讀書後漢書曰和熹鄧后六嵗能史書史書周宣王太史史籀所作大篆十五篇十二通詩論語諸兄每讀經傳輒下意難問志在典籍不問居家之事母常非之曰汝不習女工乃更務學欲舉博士邪后重違母言晝脩婦業暮誦經典家人號曰諸生后又詔中宫近臣於東觀受讀經傳以教授宫人左右習誦朝夕濟濟范􅁮後漢書曰周磐字伯堅居貧養母儉薄不充常誦詩至汝墳之卒章慨然而歎乃解韋帯就孝廉之舉也又曰裴駿字神駒駿從弟安祖少而聰慧年七八嵗就師講詩至鹿鳴篇語兄云禽獸得食相呼而况人也自此之後未嘗獨食又曰向長字子平河内朝歌人也隠居不仕讀易至損益卦喟然而歎曰吾已知富不如貧貴不如賤但未知死何如生魏武本紀曰吾讀介推之避晉封申包胥之逃楚賞未嘗不廢書而歎魏畧曰侍中董遇好學避難採樵負販常挟經書投閑習誦人從學者遇不肯教云當先讀百遍而義自見吳志曰闞澤字徳潤好學居貧常為人傭書所冩既畢誦讀亦遍魏志曰賈逵􅇰好春秋課日讀一遍吳志曰留賛字正明性果烈好讀兵書及史傳每覽古良將攻伐之勢輒對書獨歎晉書曰陶潛字元亮好讀書不求甚解每有會意欣然忘食又曰殷仲堪能清言善屬文每云三日不讀道徳論便覺舌本間強其談理與韓康伯齊名士咸愛慕之又曰王恭抗直深存節義讀左傳至奉王命討不庭輒輟卷而歎又曰劉敏元字道光北海人也厲己修學不以險難改心好星厯隂陽術數潛心易太𤣥不好讀史常謂同志曰誦書當味義理何為費功於浮辭之文易者義之源太𤣥理之門能明此者即吾師也王隠晉處士傳曰王褒字偉元北海人也讀書至哀哀父生我劬勞未嘗不反覆流涕霑胷也沈約齊紀曰顧歡字𤣥平少喪父事母謹孝母䘮于墓側數年好事者或從受書每至哀哀父母生我劬勞悲慟不能禁自是學徒廢蓼莪之篇不復講授也崔鴻十六國春秋前燕録曰韓景山安平萑津人也年十嵗能屬文日誦書三與身齊博覽經籍無所不通宋書曰沈演之家世為將至演折節讀書讀老子百遍以達義理上知名北齊書曰趙郡王琛子叡初讀孝經至資於事父輒流涕歔欷又曰楊愔幼而䘮母曾詣舅源子恭子恭與之飲問讀何書曰誦詩子恭曰誦至渭陽未邪愔便號泣感咽子恭亦對之歔欷於是遂為之罷酒北史曰後魏元暉業領中書監録尚書事齊文襄嘗問之曰比何所披覽對曰數尋伊霍之傳不讀曹馬之書暉業以時運漸謝不復圖全唯事飲啗一日一羊三日一犢又嘗賦詩云昔居王道泰濟濟富羣英今逢世路阻狐兔鬱縱横梁書曰武帝每讀孝子傳未曾終軸輒輟書悲慟由是家門愛重探賾索隠窮理盡性究覽墳籍神悟知機讀書不待温故一過目皆通憶又曰范雲傳初竟陵王子良為會稽太守雲為府主簿王未之知後尅日登秦望山乃命雲雲以山上有秦始皇刻石此文三句一韻人多作兩句讀之並不得韻又大篆人多不識乃夜取史記讀之令上口明日登山子良命賓僚讀之皆茫然不識末問雲雲曰下官嘗讀史記見此刻石文進乃讀之如流水子良大恱因以為上賓又曰昭明太子統字徳施美姿貎善舉止讀書數行俱下過目皆憶陳書曰始興王叔陵修飾虛名每入朝常於車中馬上執卷讀書髙聲長誦陽陽自若歸坐齋中或自執斧斤為沐猴百戯隋書曰崔儦字岐叔以讀書為務頗自負而忽人嘗大署其門曰不讀五千卷書無得入我室又曰來䕶兒字崇善㓜而卓詭好立竒節幼讀書至擊鼓其鏜踴躍用兵羔裘豹飾孔武有力捨書而歎曰大丈夫在世當如是為國滅賊以建功名安能區區久事隴畞羣輩驚其言而壯其志又曰韋師字公穎少沉謹有至性初就學始讀孝經捨書而歎曰名教之極其在兹乎唐書章懐太子賢容止端雅上深所嗟賞謂司空李勣曰此兒已讀得尚書禮記曽遣讀論語賢賢易色􅄪三覆誦之乃云性愛此言因知夙成聰敏出自天性也又曰蕭徳言晚年尤篤志於學自晝達夜畧無厭倦每視閱五經必盥濯束帯危坐對之妻子候間請曰終日如是無乃勞乎徳言曰敬先聖之言豈憚如此又曰郭山惲蒲州河東人少通三禮景龍中累遷國子司業時中宗數引近臣及修文學士與之宴集嘗令各效伎蓺以為笑樂工部尚書張錫為談容娘舞將大匠宗晉卿舞渾脱左衞將軍張洽舞黄麞左金吾衞將軍杜元琰誦婆羅門呪給事中李行言唱駕車西河中書舍人盧藏用效道士上章山惲獨奏曰臣無所解請誦古詩兩篇帝從之於是誦鹿鳴蟋蟀兩章奏未畢中書令李嶠以其詞有好樂無荒之語頗涉規諷恐忤㫖遽止之帝嘉山惲之意墨子曰周公朝讀書百篇夕見七十五士莊子曰孔子遊於緇帷之林休於杏壇之上弟子讀書孔子絃歌鼔琴有漁父聽曲為法又曰臧與穀相與牧羊而俱亡其羊問臧奚事挟策讀書問穀奚事博塞以遊又曰桓公讀書於堂上輪扁斵輪於堂下釋椎鑿而問曰敢問公所讀者何言也公曰聖人之言也曰聖人在乎公曰已死矣曰然則公所讀者古人之糟粕也公曰寡人讀書輪人安得議乎有說則可無說則死扁曰以臣之事觀之斵輪徐則甘而不固疾則苦而不入不徐不疾得於手而應于心口不能言也有數存於其間臣不能以喻臣之子臣之子亦不能受之於臣是以行年七十而老斵輪古人與其不可傳者死矣然則君之所讀者古人之糟粕而已尚書大傳曰子夏讀書畢見夫子夫子問子何為於書乎子夏曰書之論事皎皎如日月之代明離離如參辰之錯行商所受於夫子者志於心弗敢忘也尸子曰孔子曰誦詩讀書與古人居說苑曰孔子讀易至於損益則喟然而歎子夏避席而問曰夫子何為歎也孔子曰夫自損者益自益者缺吾是以歎也子夏曰然則學者不可以益乎孔子曰否天之道成而必變未嘗得久也夫學者以虛受之昔堯履天子之位猶允恭以持之虛静以待下故百載而逾盛迄今而益章昆吾自臧而滿意窮髙而不衰故當時虧敗迄今而逾惡是非損益之徴歟日中則昃月盈則食天地盈虛與時消息是以聖人不敢當盛升輿而遇三人則下二人則軾調其盈虛故能長盛也子夏曰善請終身誦之神仙傳曰孔子讀書老子見而問曰是何書也曰易也聖人亦讀之老子曰聖人可也汝曷為讀之洞㝠記曰李充者馮翊人也自言三百嵗從始皇登會稽山以望江漢之流也少而好學為嬴秦博士門徒萬人伏生時十嵗乃就充石壁山中受尚書乃以口傳授伏子四代之事畧無遺脫伏子因而誦之常以細䋲十餘尋以縛腰誦一遍則結繩一結十尋之繩皆成結矣計誦尚書可數萬遍但食榖損人精會有遺失伏子今所傳百卷得其一二耳故堯舜二典闕漏尤多家語曰孔子讀史至于楚復陳陳夏徴舒弑其君楚莊王討之因取陳而有之申叔時諌莊王從之乃復陳國也喟然歎曰賢哉楚莊王也輕千乘之國而重一言之信非申叔之忠弗能進其義非莊王之賢不能受其訓春秋後語曰蘇秦歸曰雖多蓄書亦何以為於是夜發書箧數十得周書隂符戰國策云得太公隂符之謀伏而讀之欲睡引錐刺其股血流至踝朞年以成揣摩曰此可以說當世之君矣幽明録曰襄陽城南有秦民墓為性至孝親殁泣血三年人有為其詠蓼莪詩者民聞其義涕泗不自勝桓子新論曰劉子政子駿伯玉三人尤珍重左氏教子孫下至婦女無不讀誦俗說曰劉抑為僕射傅迪為左丞傅大讀書而不解其義劉唯讀老莊而已傅道劉云正讀十二卷何足本人劉道傅云讀書雖多而無所解可謂書簏物理論曰語云能理亂絲乃可讀書余雖無治絲之能而悟聞詩之義華陽國志曰徐誦字子産少讀書日不過五十字誦千遍乃傳終成儒學先賢傳曰延篤從唐季度受左氏欲寫傳本無紙乃借本誦之及辭歸季度曰卿欲寫傳何故辭歸答曰已誦之矣孝徳傳曰張楷字公超河南人也至孝自然䘮親哀毀每讀詩見素冠棘人未嘗不掩泗焉列女傳曰班婕妤况之女賢才通辨選入後宫每讀詩及窈窕淑女之篇必三復之晉潘岳閒居賦序曰岳讀汲黯傳見司馬安四至九卿而良史書之題以巧宦之目未嘗不慨然廢書而歎金樓子曰有人讀書握卷而輒睡者梁朝有名士呼書卷為黄嬭此葢言其怡神養性如黄嬭也又曰凡讀書必以五經為本所謂非聖人之書勿讀讀之百遍其義自見此外衆書自可汎而觀耳正史既見得失成敗此經國之所急五經之外宜以正史為先譜牒所以別貴賤明是非自宜留意或復中表親疎或復通塞升降百世衣冠不可不悉又自叙云吾夏時終夜下絳紗帷中有銀甌一枚貯山隂甜酒卧讀有時至曉率以為常又經病瘡肘膝爛盡比來三十餘載泛玩衆書萬餘矣又曰余年十四苦眼疾沈痼比来轉暗不能自讀書三十六年来恒令左右讀之吕曾生所謂誦詩讀書與古人居讀書誦詩與古人期兹言是也太平御覽卷六百十六
