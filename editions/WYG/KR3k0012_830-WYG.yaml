body:
  text: 太平御覽巻八百三十宋李昉等撰資産部十尺寸禮記王制曰古者以周尺八尺為步今以周尺六尺四寸為步古者百畝當今田百四十六畝三十步古者百里當今百二十一里六十步四尺二寸二分漢書曰度者分寸尺丈引也所以度長短也本起黄鍾之長以子糓秬黍中者率一黍之廣度之九十分黄鍾之長一為一分十分為寸十寸為尺十尺為丈十丈為引而五度審矣其法用銅高一寸廣二寸長一丈而分寸丈尺存焉用竹為引髙一分廣六分長十丈其方法矩髙廣之數隂陽之象也分者自三㣲而成著可分别也寸者忖也尺者蒦也丈者張也引者信也夫度者引於分忖於寸蒦於尺張於丈信於引引者信天下也職在内官内官置名廷尉掌之魏略曰昔長安市儈有劉仲始者一為市吏所辱乃感激蹹其尺折之遂行學問經明行修流名海内後以有道徵不肯就衆人歸其髙晉書荀朂别傳曰魏杜䕫制律乖錯朂知漢尺漸長於古四分䕫依為律故不諧乃令著作郎劉恭依周禮制尺鑄銅律吕以諧音韻後得古玉律鍾磬與新律合詔賜古尺一隋書曰世稱有田父於野地中得周時玉尺便是天下正尺荀朂試以較尺所造金石絲竹短較一米管子曰尺寸尋丈者所以定短長之準也故以尺寸量短長則萬舉而萬不失矣是故寸尺之度雖富貴衆强不為益長雖卑辱貧賤不為損度公正而無所偏故好詐之人弗能誤也故明法者不可巧以詐偽有尋丈之數者不可欺以長短又曰以規矩為方圓則成以尺寸量長短則行以法制民則安故事廣於理者其成若神孟子曰陳代謂孟子云枉尺直尋宜若可為枉尺直尋欲使孟子屈己信道也尸子云孔子曰詘寸而信尺小枉而大直吾不為也韓子曰釋法術而任心治堯不能正一國去規矩而委意度奚仲不能成輪廢尺寸而差短長工爾不能得中使中主守法術拙匠執規矩尺寸則萬不失孔叢子曰跬一舉足也倍跬謂之步四尺謂之仭倍仞謂之尋尋舒兩肱也倍尋謂之常五尺謂之墨倍墨謂之丈倍丈謂之端端謂之兩倍兩謂之疋兩有五謂之束家語曰孔子曰夫布指知寸布手知尺舒肱知尋舒身知常斯不逺之則也説苑曰度量衡以粟生之十粟為一分十分為一寸十寸為一尺十尺為一丈夢書曰丈尺為人正長短夢得丈欲正人也魏武上雜疏曰中官用物雜闕列尺一枚貴人公主有象牙尺三十枚宫人有象牙尺百五十枚骨尺五十枚量周禮冬官考工記曰㮚氏為量改煎金錫則不耗不耗然後權之權之然後凖之凖之然後量之量之以為鬴深尺内方尺而圜其外其實一鬴其臋一寸其實一豆其耳二寸其實一升重一鈞其聲中黄鍾之宫槩而不稅其銘曰時文思索允臻其極嘉量既成以觀四國永啓厥後兹器維則左𫝊昭公三年云晏子曰齊舊四量豆區釜鍾四升為豆各自其四以登於釡釡十則鍾陳氏三量皆登一焉鍾乃大矣以家量貸而以公量収之漢書曰量者龠合升斗斛也所以量多少也本起於黄鍾之龠用度數審其容以子糓秬黍中者千有二百實其龠以井水凖其槩十龠為合十合為升十升為斗十斗為斛而五量嘉矣其法用銅方尺而圜其外旁有庣焉其上為斛其下為斗左耳為升右耳為龠其狀似爵以縻爵禄上三下二參天兩地圜而函方左一右二隂陽之象也其圜象規其重二鈞備氣物之數合萬有一千五百二十聲中黄鍾始於黄鍾而反覆焉君制器之象也龠者黄鍾律之實也躍㣲動氣而生物也合者合龠之量也升者登合之量也斗者聚升之量也斛者角斗平多少之量也夫量者躍於龠合於合登於升聚於斗角於斛也職在太倉大司農掌之也孔叢子曰一手之盛謂之溢兩手之盛謂之匊四匊謂之豆豆四謂之區區四謂之釡釡二半謂之藪藪謂之缶缶謂之鍾鍾二有半謂之秉秉十六斛也曹瞞𫝊曰太祖常賦廩糓不足私謂主者曰如何主者曰以小斛量之太祖曰善後軍中言太祖欺衆太祖謂主者曰當特借汝死以厭衆不然事不解乃取徇曰行小斛盜宫榖斬之軍門風俗通曰斛者角也庾三斛四斗秉二十四斛秤廣雅曰秤謂之衡錘謂之權說文曰秤銓也禮記月令仲春曰是月也日夜分則同度量平權衡又經解曰禮之於正國也猶權衡之於輕重也繩墨之於曲直也規矩之於方圓也故衡誠縣不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圓漢書曰權衡者衡平也權重也衡所以任權而鈞物平輕重也其道如底以見準之正繩之直左旋見規右折見矩其在天也佐助旋璣斟酌建指以齊七政故曰玉衡論語云立則見其參於前也在車則見其倚於衡也又曰齊之以禮此衡在前居南方之義也權者銖兩斤鈞石也所以稱物平施知輕重也本起於黄鍾之重一龠容千二百黍重十二銖兩之為兩二十四銖為兩十六兩為斤三十斤為鈞四鈞為石忖為十八易十有八變之象也五權之制以義立之以物鈞之其餘小大之差以輕重為宜圜而環之令之肉倍好者周旋無端終而復始無窮已也銖者物繇忽微始至於成著可殊異也兩者兩黄鍾律之重也二十四銖而成兩者二十四氣之象也斤者明也三百八十四銖易二篇之爻隂陽變動之象也十六兩成斤者四時乗四方之象也鈞者均也陽施其氣隂化其物皆得其成就平均也權與物均重萬一千五百二十銖當萬物之象也四百八十兩者六旬行八節之象也三十斤成鈞者一月之象也石者大也權之大者也始於銖兩於兩明於斤均於鈞終於石物終石大也四鈞為石者四時之象也重百二十斤者十二月之象也終於十二辰而復於子黄鍾之象也千九百二十兩者隂陽之數也三百八十四爻五行之象也四萬六千八十銖者萬一千五百二十物厯四時之象也而歲功成就五權謹矣魏志曰鄧哀王冲字蒼舒少聰察岐嶷生五六嵗智意所及有若成人孫權曾致巨象太祖欲知其斤重訪之羣下咸莫能出其理冲曰置象大船之上而尅其水所至稱物以載之則立可知矣太祖大恱即施行焉吳志曰薛綜上疏云九真刺史朱符多以鄉人虞衰劉彦之徒分作長吏侵虐百姓强賊於民黄魚一枚收稻一斛唐書曰安禄山晩年益肥垂肚過膝自秤得三百五十斤每朝見𤣥宗戱之曰朕過見卿肚幾垂至地管子曰權衡者所以起輕重之數也然而人不事者非心惡利也權不能為之多少其數而衡不能為之輕重其量也知事權衡之無益故不事也又曰有權衡之稱者不可差以輕重有尋丈之數者不可差以長短又曰㑹諸侯令曰修道路偕度量一稱數莊子曰聖人不死大盜不止為權衡以稱之則拜與權衡而竊之雖有軒冕之賞弗能勸斧鉞之威不能禁掊斗折衡而民不爭也慎子曰厝鈞石使禹察錙銖之重則不識也縣於權衡則毫髪之於權衡則不待禹之智中人之知莫不足以識之矣慎子曰名臣之心猶權衡也權左橛則右重右重則左輕輕重迭相折天地之理也孔叢子二十四銖曰兩兩有半曰揵倍揵曰舉倍舉曰闕謂之鈸二鈸四兩謂之斤斤十二謂之衡衡有半謂之倍稱謂之鈞鈞四謂之石石四謂之皷然則皷四百八十斤也韓子曰人之不事衡石者非真亷而逺利也石不能為人多少衡不能為人輕重求索不得故人不事也明主之國官不敢枉法吏不敢為私貨賂不行是境内之事盡如衡石也説苑曰庶量衡以十粟生之十粟重一豆六豆重一銖二十四銖重一兩十六兩一斤三斤重一鈞四鈞重一石語林曰孟業為幽州其人甚肥或以為千斤武帝欲稱之難其大乃作大秤掛壁業入見帝曰朕欲試自秤有幾斤業荅曰陛下正是欲稱臣耳無所復勞聖躬於是遂稱業果得千斤夢書曰銓衡為人正也夢得衡為平端也以銓秤平財錢也重者價貴輕者賤也銓衡折敗無平人也李尤權衡銘曰夫審輕重莫若權衡正是非其唯賢明剪刀爾雅釋言曰劑剪齊也釋名曰剪刀剪進也稍進前也齊書曰雲幸於竟陵王子良江祏求雲女婚酒酣以巾箱中剪刀與雲曰且以為聘雲笑受之至是祏貴雲又因酣曰昔與將軍俱為黄雀今將軍化為鳯凰荆布之貨理隔華盛因出剪刀還之南史曰沙門寶誌不知何許人齊宋之交稍顯靈迹被髪徒跣語黙不倫恒以銅鏡剪刀鑷屬挂杖負之而趨預言未兆多驗修復山靈故事曰后梓宫用剪六枚東宫舊事曰太子納妃有龍頭金縷交刀四銀牙鏁綵帶副世說曰爰綜為新安太守郡南界有大石爰至其下醼飲忽有人得剪刀於石下者衆或疑之持問主簿主簿對曰昔呉長沙桓王嘗夢飲孫洲父老云此州狹而長君為長沙乎果應夫三刀為州得交刀君亦當交州後果交州衣軸世説曰張華將敗有飄風吹衣軸六七壁管禮記内則曰鍼管線纊荀卿針賦曰鏤管以為母魏武上雜物疏曰中宫雜物雜象牙管鍼筒一枚針説文曰針綴史也禮記内則曰舅姑衣裳綻裂紉針請補綴左𫝊成公上楚伐魯賂以執針百人呉書曰虞翻年十二客詣翻兄不過之乃與客書曰琥珀不受腐芥磁石不受曲鍼王隱晉書曰東宫舊制月請五十萬以供給衆用愍懷太子恒探取三月以供賤妾舍人杜錫數諫太子後取針着錫常坐處氊中錫上床刺足血流晉書曰鳩摩羅什講于寺姚興及朝臣大德沙門千餘人肅然觀聴什忽下髙座謂興曰有二小兒登吾肩慾障須婦人興乃召宫女進之一交而生二子焉興常謂什曰大師聰明超悟天下莫二何使法種無嗣遂以伎伎十人逼令受之爾後不住僧房别令廨舎諸僧多効之什聚針盈鉢引諸僧謂之曰若能見效食此者可以畜室爾因舉匕進針與常食不别諸僧愧服乃止又曰顧愷之常恱一隣女挑之弗從乃圖其形於壁以棘針釘其心女遂患心痛愷之因致其指女從之遂宻去針而愈宋書曰傅剡為山隂令賣針賣糖老姥爭團絲來詣剡剡樹團絲於柱鞭之宻視有鐵屑乃罰賣糖者南史曰齊王奐為雍州刺史加都督與寧蠻長史劉興祖不睦十一年奐遣軍主朱公息征蠻失利興祖欲以啓聞奐大怒収付獄以針畫漆合盤為書報家稱枉令啓聞而奐亦馳信啓上誣興祖扇動荒蠻上知其枉勅送興祖後魏書曰胡太后臨朝常幸西林園命侍臣射不能者罰之又自射針中之大悅呉楚春秋曰勾踐與妻入臣呉妻奉針縷北面為妾淮南子曰女必一刀一針然後成為女管子曰先針而後縷可以成帷先縷而後針不可以成衣針成幕蕢成城淮南萬畢術曰首澤浮鍼抱朴子曰彈鳥則千金不及丸泥縫緝則長劍不及數分之針又曰結巾投地而兎走針綴丹帶而蛇行西京雜記曰漢彩女常以七月七日夜穿七針於開􅁭樓俱以習之説苑曰客因孟嘗君寄于齊王而不用客反見孟嘗君曰不知君之過臣之罪孟嘗君曰夫縷因針而入不因鍼而急典論曰劉表子弟好酒設大針於坐端有罪狀者輙刺驗其醉醒王子年拾遺記曰魏文帝美人薛夜來妙於針巧雖處於深帷重幕之内不用燈燭裁衣製作立成非夜來所縫製帝不服也諸葛元𫝊曰昔元遜對元南陽韓文晃誤呼其父字晃難之曰何人子前呼人父字是禮乎諸葛笑答曰向天穿針而不見天何者不輕天意有所在耳即罰文晃酒一盃王即新奏議曰至於遺針御衣懼傷至尊之體故加之以髠刑欲將懲戒先傷以防絶後傷輿地志曰齊武起曾城觀七月七夕宫人登之穿針世謂之穿針樓劉義恭啓事曰聖恩賜金銀針七色縷幷格一犀棟刷匣副綿布兆珍服寶玩以協嘉辰孫卿針賦曰有物於此生於山阜處於室堂不盜不竊穿窬而行日夜合離以成文章以能合從又善連横下覆百姓上飾帝王者特用則存不用則亡臣愚弗識敢請之王曹大家縷賦曰鎔秋金之剛精形㣲妙而直端性通逺而漸進􅀶庶物而一貫醫針附魏志曰樊阿從華佗學何善針凡醫咸言背及胷藏之間不可妄針阿針背入一二寸巨闕入五六寸疾輒瘳三輔舊事曰為桐人長尺以針刺其腹理太子中曉醫術因言其事燉煌實録曰張存善針存有奴好逃亡存宿行針縮奴脚欲使則針解之王渾表曰臣有氣病善夜發服半夏湯或服湯不解尚取針前殿中醫趙恭思纂見給事醫在醫署纂能針有方伎乞以纂名課考稱課醫給臣自療治南史曰王僧孺多識古事侍即金元起欲注素問訪以砭石僧孺答曰古人當以石為針必不用鉄説文有此砭許慎云以石刺病也東山經高氏之山多針石郭璞云可以為砭針春秋美疢不如惡石服子慎注云石砭石也季世無復佳石故以針代之耳唐書曰貞觀中太宗幸甄權宅權潁川人醫術為天下最孫思邈師之以授針法時年二十三歲唐書曰太宗征髙麗江夏王道宗在陣損足上親針之鐕說文曰鐕所以綴著物者也鐕集纉綴衣細行也晉東宫舊事曰太子納妃金鐕二枚縫説文曰縫線也縷線也周禮春官下曰縫人掌王宫縫線之事以役女御縫王及后之衣服淮南子曰秦代天下婦不得剡麻考縷抱朴子曰髙巖將霣非細縷所綴龍門沸騰非掬壤所遏西京雜記曰賈佩蘭云在宫時七月七日臨百子池作于闐樂樂畢以五色縷相覊謂為連受鄴中記曰北方五月五日自作飲食祠神乃作五色縷花相遺謂為介子推離騷大招曰秦篝齊縷鄭綿絡崔駰縫銘曰惟嵗之始承天嘉德皇靈願國絲綏充贄以闕朝迪魏闕兖州刺史上物縫帳二絲縷十斤鄭氏婚禮謂文讃曰長命之縷女工所為例太平御覽巻八百三十
