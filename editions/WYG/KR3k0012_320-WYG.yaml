  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_320-1a, image: WYG0895/WYG0895-0750a.png}
body:
  text: 太平御覽卷三百二十宋李昉等撰兵部五十一拒守拒守下唐書曰乾符中元萬頃從李勣征髙麗勣嘗令萬頃作文檄髙麗其語有譏髙麗不知守鴨緑之險莫離支報云謹聞命矣遂移兵固守鴨緑官軍不得入萬頃坐是流于嶺外又曰李光弼守太原自賊圍城城中張一小幕止宿有急即自往救之行至府門未嘗迴頭不復省視妻子賊退復收拾噐械處置公事經二日然後歸家又曰史思明圍光弼於太原四面重圍十日不解每日使賊於陣前嫚罵光弼並戲弄城上人光弼使人穿地道以木撑之賊明日還於舊處立將戲之地道透陷遂把賊脚曵入地道中光弼得而對衆戮之城中大喜思明知事不集遂退歸河北又曰薛愿為頴川太守本郡防禦使時賊已陷陳留榮陽汝南等郡方圍南陽頴川當其來往之路愿與防禦副使龎堅同力固守城中儲蓄無多兵卒單寡自至徳元年正月至十一月賊晝夜攻之不息距城百里廬舍墳墓林樹開發斬徹殆盡而外救不至賊將阿史那承慶悉以鋭卒併攻為木驢木鵝雲梯衝柵四面雲合鼓噪如雷矢石如雨力攻十餘日城中守備皆竭賊夜半乗梯而入而愿堅俱被執送于東都將支解之或説禄山曰薛愿龎堅為義士也人各為其主屠之不祥乃繫於洛水之濵屬苦寒一夕凍死又曰張廵守睢陽在城中每戰登陴大呼以助威眥裂血流牙齒皆碎城將陷西向再拜曰為救不至臣智勇俱竭不能全一城今使逆賊見逼臣死之後願為鬼與賊為厲以答國恩及城陷尹子竒見廵問之曰聞公每督戰背裂齒碎實有之否廵應之曰然子竒曰何至此曰欲得殺逆賊遂至於此子竒以大刀剔其口見舌存者不過三數廵因大詬罵子竒責以悖逆損害平人子竒欲存之左右曰此人必不為我用又得衆死心不可留故害之又曰史朝義圍宋州劉昌在圍中城中食盡賊垂將陷之刺史李岑計蹙昌為之謀曰今河陽有光弼制勝且江淮足兵此廪中有數千斤麴可屑以食衆計援兵不二十曰當至東南隅之敵衆以為危昌請守之昌遂被鎧持盾登之陳逆順以告諭之賊衆甚畏之後十五日副元師李光弼救軍至賊乃宵潰光弼聞其謀召置軍中超授試左金吾衞郎將又曰元和中鄂岳都團練使李道古攻申州剋其羅城乃進圍逼其中城城中守卒夜率婦人登城而呼懸門竊發分出其衆道古衆驚亂多為虜殺又曰王凝為宣州黄巢自嶺表北歸大掠淮南攻圍和州凝令牙將樊儔舟師據采石以援之儔違令凝即斬之以狥命别將烏頴代儔赴援竟解厯陽之圍賊怒引衆攻宣城大將王涓請出軍逆戰凝曰賊忿而來宜持重待之彼衆我寡萬一不捷則州城危矣涓鋭意請行凝即集丁壯分守要害登陴設備涓果戰死賊乗勝而來則守有備矣賊為梯衝之具急攻數月禦備力殫吏民請曰賊之兇勢不可當願自書歸欵退之懼覆尚書家族凝曰人皆有族予豈獨全誓與此城同存亡也既而賊已退去時乾符五年也又曰王栖曜為常州别駕時江左兵荒召内常侍馬日新領汴滑五千人鎮之日新貪暴賊蕭庭蘭乗人怨訴逐之而刼其衆時栖曜遊奕逺郊遂為賊所脅進圍蘓州栖曜因其懈怠挺身登城率城中出攻賊衆大潰又曰張伾建中初以澤潞將鎮臨洺田悦攻之伾度兵力不能出戰嚴設守備嬰城拒守賊不能㧞累月攻之益急士多死傷糧儲漸乏救兵未至伾知事不濟無以激士心乃悉召將卒於軍門命其女出拜之謂曰將士辛苦守戰伾家無尺寸之物與公等為賞獨有此女幸未嫁人願出賣之為將士一日費衆皆大哭曰誓與將軍死戰無慮也㑹馬燧以太原之師至與軍衆合擊悦於城下大敗之伾率衆出戰士卒無不一當百圍解以功遷泗州刺史三國典略曰周獨孤永業恐洛州刺史段思文不能自固馳入金墉助守尉遲逈為土山地道曉夕攻戰永業選其三百人為爪牙每先鋒死戰逈不能剋又曰臺城未䧟侯景焚燒大司馬門後閣舍人髙善寳以私金千兩賞其戰士直閣將軍宗思領將士數人踰城出外灑水久之火滅景又遣持長柯斧入斫門將開善寳促鑿扇為孔以槊刺倒二人斫者乃退又曰陳人侵齊北徐州刺史祖班令不閉城門守陴者皆下街巷禁斷人行雞犬不許鳴吠陳人莫測所以疑人走城空不設警備中夜班忽令鼓譟陳人驚散曉復結陳向城班自臨戰陳人先聞其盲謂不能抗拒忽見親在戎行彎􅋃縱鏑怪之遂退時穆提婆憾之不已欲令城陷不遣救援班軍守百日城竟保全北史曰梁將吴明徹攻圍海西齊將郎塞固守乃至削木為箭剪紙為羽圍解還朝僕射楊愔迎勞之曰卿本文吏遂有武略削木剪紙皆無故事班墨之思何以相過墨子曰禽滑釐問曰雲梯施攻備已具武力又多争上吾城為之柰何墨子曰多下矢石雜以灰薪並水火以濟之若城外穿地來攻者宜城中多掘井以薄甕内井中使聽聰者伏甕聽之審知穴處鑿内而迎之吕氏春秋曰公輸般為髙雲梯欲以攻宋墨子聞之自魯而往裂裳裹足日夜不休十日十夜而至於郢見荆王曰臣北方之鄙人也聞大王將攻宋信有之乎王曰然墨子曰臣以宋必不可得王曰般天下之攻工也已為攻宋之械矣墨子曰請公輸般試攻之臣請試守之於是公輸般設攻宋之械墨子乃設守宋之備公輸般九攻之墨子九却之不能入故荆輟不攻宋墨子也能以術禦荆而存宋矣博物志曰處士東里䰟責禹亂天下事禹退作三城强者攻弱者守敵者戰城郭蓋禹始也賈誼過秦論曰有囊括四海之意并呑八荒之心當是時商君佐之内立法度務耕織修守戰之備外連衡而鬬諸侯又曰然後踐華為城因河為池據億丈之城臨不測之谿以為固良將勁弩守要害之處信臣精卒陳利兵而誰何任彦昇奏彈景宗曰故司州刺史蔡道恭率厲義勇奮不顧命全城守死自冬徂秋猶轉戰戰窮極摧醜虜危急韓子曰智伯圍襄子於襄陽决水以灌之城中巢處懸釡而炊易子食析骨炊史記曰楚莊王圍宋五月不解宋城中食盡易子而食祈骸而炊宋華元出告以情莊王曰君子哉遂罷兵去又曰齊田單攻聊城嵗餘不下魯連乃為書約之矢射城中遺燕將書曰今公以弊聊之人距全齊之兵是墨翟之守也食人炊骨士無反心是孫臏之兵也又曰趙襄子保晉陽三國攻晉陽嵗餘引汾水灌其城不沒者三版城中懸釡而炊易子而食漢記曰段熲破羗胡明年羗復冦張掖步下馬大戰弓刀折盡虜亦引退追之晝夜攻擊割肉食雪四十餘日後漢書曰車師與匃奴攻耿恭於疏勒中恭食盡乃煮鎧弩食其筋革又曰臧洪為東郡太守為袁紹所圍初尚掘䑕煮筋角後無所食取草實而食之魏志曰太祖圍張超於雍丘超言唯臧洪當來救吾衆人以為袁曹方睦洪為紹所表用必不敗好招禍洪聞之果徒跣號泣勒所部又從紹請兵馬救超紹不許遂為太祖所滅洪由是怨紹紹興兵圍之厯年不下紹忿洪無降意増兵急攻洪自度不得免呼吏士謂曰袁氏無道所圖不軌且不救洪郡將洪大義不得不死念諸君無事空與此禍耳可將妻子去吏士皆垂泣掘䑕煮筋角後無所食主簿唘内厨米三斗洪更作薄粥衆分醊之殺其愛妾以食士城中男女七八千人相枕而死莫有離叛城陷紹生執洪徐廣晉記曰霍彪為賊費黑所隔積百日殺馬燒皮鎧食又曰韓冕蘓碩等攻范城中饑米一斛萬錢晉書劉琨赴并州上表曰臣自涉州疆目覩困乏流移四散十不得存二㩦老扶弱不絶於路及其在者鬻賣妻子生相捐棄死亡接繼屍骨横野哀呼之聲感傷和氣羣胡數萬周匝四山動足遇掠開目覩冦唯有壺關可得告糴而此二道九州之險數人當路則百夫不敢進公私往反沒䘮者多嬰守窮城不得薪菜耕牛既盡又乏田噐以臣愚短當此至難憂如循環不遑寢食晉中興書曰中宗初鎮江左假郄鑒龍驤將軍兖州刺史徐龕石勒左右交侵鑒收合荒散保固一山随宜抗對百姓饑饉掘野䑕蟄燕而食之又十六國春秋曰蜀王李雄攻譙登于涪城無救援登固守不下士卒皆燻䑕食之一無叛者宋書曰朱修之留撫滑臺乃為索虜所攻圍修之糧盡救兵不至將士燻䑕食之城陷為虜所執上嘉其節蕭子顯齊書曰魏遣魏郡王元英圍南鄭退入斜谷天大雨軍士乃截竹炊米於馬上持炬炊而食之隋書曰李宻閒行入關被囚於京兆與王仲伯亡抵平原賊帥郝孝徳不甚禮之備遭饑饉至削樹皮食之太平御覽卷三百二十
