body:
  text: 太平御覽卷四百五十五宋李昉等撰人事部九十六諫諍五鍾離意别傳曰孝明帝作北宫意復諫曰頃天旱不雨陛下躬自勅責避正殿之榮今日雨而不濡豈政有改耶是天威未消也愚以為可命大匠止工作諸室減省不急以助時氣奏聞有詔曰朕之不徳敢不如教即日沛然大雨列女傳曰魏曲沃負者魏曲沃大夫如耳之母也曲沃邑也魏哀王為太子納妃而將自納焉負謂如耳曰王亂於不别何故不匡之如耳未遇閒㑹使於齊未值王之清閒而受使行也負因詣王門請見曰妾聞男女之别國之大節也婦人脆於志窳於心不可以邪開脆窳不堅固不宜以邪事開誘也是故十五而笄二十而嫁早成其號諡所以就之號諡笄嫁之名聘則為妻奔則為妾所以開善遏淫也節成然後許嫁親迎而後隨貞女之義也今大王為太子求配匹而自納之此毁貞女之行而亂男女之别妾恐王之國危也王曰然寡人不知也遂與太子而賜負粟三十鍾六石四升曰鍾又曰楚處莊姪者楚縣邑之女也頃襄王好遊觀之樂焉王左右謂王曰南遊於唐五百里有樂焉王將行姪年十二王旣見姪操幟伏於南郊道傍王車至姪舉其幟王使人問之姪曰願謁隠事於王王召之子何以成寡人對曰大魚失水有龍無尾墻欲内崩而王不視王曰不知對曰大魚失水者離國五百里也有龍無尾者年三十無太子墻欲内崩王不視者禍亂且成而王不改王曰何對曰王好臺榭而不恤衆庻出入不時耳目不聰強奏聞王左右使王日以滋甚王不亟反且及禍雖悔無逮王曰善命後車載之立反國比至國門已閉反者已定王乃發鄢郢之師以擊之僅而得勝乃立姪為夫人說苑曰齊晏子復於景公曰朝居嚴乎公曰朝居嚴則曷害於治國哉晏子對曰朝居嚴則下無言下無言則上無聞矣下無言則謂之喑上無聞則謂之聾聾喑則非害治國家而何且㤗山之髙非一石也累卑然後高也夫治天下者非用一士之言也又曰秦始皇時侯生諫始皇望見侯生大怒曰老虜不良誹謗而至乃敢復諫我侯生曰陛下奢侈失本滛佚趨末人力殫盡尚不知臣等恐言之無益而自取死也故逃而不敢言又曰趙簡子舉兵攻齊令軍中諫者罪死被甲之士名曰公盧望見簡子而笑曰臣有宿笑當之時臣隣家父與妻子俱之田見桑中女因往追之不能得還反其妻怒而去之曰笑其曠也簡子還師而歸又曰左儒友於杜伯皆臣周宣王宣王將殺杜伯而非其罪也左儒爭之王不許也王曰黨友也易而言則生不易而言則死左儒對曰臣聞古之士不枉義以從邪不易臣以求生王殺杜伯而儒死之又曰有能盡言於君用則留不用則去謂之諫又曰秦始皇帝太后不謹幸郎嫪毒封以為長信侯為生兩子毒專國事浸益驕奢與侍中左右貴臣俱博飲酒醉爭言而鬭瞋目大叱曰吾乃皇帝之假父也窶人子何敢乃與我抗所與鬭者走行白皇帝皇帝大怒毒懼誅因作亂戰咸陽宫敗始皇乃取毒四支車裂之取其兩弟囊撲殺之諫而死者二十七人矣齊客茅焦乃往上謁曰齊客茅焦願上諫皇帝皇帝使使者出問客得無以太后事諫也茅焦曰然使者還白曰果以太后事諫皇帝曰走往告之若不見闕下積死人耶使者問茅焦茅焦曰臣聞之天有二十八宿今死者已有二十七人矣臣所以來者欲滿其數耳臣非畏死人也走入白之茅焦邑子同食者盡負其衣物行亡使者入白之皇帝大怒曰是子故來犯吾禁趣炊鑊湯煮之是安得積闕下乎趣召之入皇帝按劍而坐口正沫出使者召之入茅焦不肯疾行足趦趄相過使者趣之茅焦曰臣至前則死矣君獨不能忍吾須㬰乎使者極哀之茅焦至前再拜謁起稱曰臣聞之夫有死者不諱死有國者不諱亡諱死者不可以得生諱亡者不可以得存死生存亡聖主所欲急聞也不審陛下欲聞之否皇帝曰何謂也茅焦對曰陛下有狂悖之行不自知也皇帝曰何等也願聞之茅焦對曰陛下車裂假父有嫉妬之心囊撲兩弟有不慈之心遷母棫楊宫有不孝之行從蒺藜於諫士有桀紂之治今天下聞之盡瓦解無嚮秦者臣竊為陛下危之也言畢乞行就鑕乃解衣伏鑕皇帝下殿左手接之右手麾左右曰赦之先生就衣今願受事乃立焦為仲父爵之為上卿皇帝立駕千乘萬騎躬執轡自行迎太后棫楊宫歸於咸陽太后大喜乃置酒待茅焦及飲太后曰抗枉令直使敗更成安秦之社稷使妾母子復得相㑹者盡茅君之力也又曰楚莊王築層臺延石千里延壤百里士有反三月之糧者大臣諫者七十二人諫者皆死矣有諸御巳者違楚百里而耕謂其耦曰吾將入見於王其耦曰以身乎吾聞說人主者皆尊寵之人也然且諫而死矣今子特草茅之人耳諸御巳曰若與子同耕而比力也至於說人主不與子比智矣委其耕入見莊王莊王謂之日諸御巳來汝將諫耶諸御巳曰君有義之用有法之行且已聞之土負水者平木負繩者直君受諌者聖君築層臺延石千里延壤百里民之釁咎血成流渠大臣且未敢諫也已何敢諌乎顧臣愚竊以虞不用宫之竒而晉并之陳不用子家羈而楚并之曹不用僖負羈而宋并之萊不用子猛而齊并之呉不用子胥而越并之秦不用蹇叔之言而秦國危桀殺關龍逢而湯得之紂殺王子比干而武王得之宣王殺杜伯而周室卑此三天子六諸侯皆不能尊用賢辯士之言故身死而國亡遂趨而出楚王遽而追之曰巳子其反矣吾將用子之諫先日說寡人者其說也不足以動寡人之心又以危加寡人故皆至而死矣今子說足以動寡人之心又不危諸寡人故將用子之諫明日令曰有能入諫者吾與為兄弟遂解層臺而罷民楚人歌之曰薪乎萊乎無諸御巳訖無子乎菜乎薪乎無諸御巳訖無人乎又曰齊桓公謂鮑叔曰寡人欲鑄大鍾昭寡人之名焉寡人之行豈避堯舜哉鮑叔曰敢問君之行桓公曰昔者吾圍譚三年得之而不自與者仁也吾北伐孤竹剗令支而反者武也吾為葵丘之㑹以偃天下之兵者文也諸侯抱美玉而朝者九國寡人不受者義也然則文武仁義寡人盡有之矣寡人之行豈避堯舜哉鮑叔曰君直言臣直對昔者公子糾在上位而不讓非仁也背太公之言而侵魯境非義也壇塲之上詘於一劍非武也姪娣不離懐衽非文也為不善遍於物不自知者無天禍必有人害天處甚髙其聽甚下如君過言天且聞之桓公曰寡人有過子幸教寡人是社稷之福也子不幸教㡬有大罪以辱社稷又曰楚昭王欲之荆臺游司馬子綦進諫曰荆臺之游左洞庭之陂右彭蠡之水南望獵山下臨方淮其樂使人遺老而忘死人君遊者盡以亡其國願大王勿往游焉王曰荆臺乃吾地也有地而游之子何為絶我游乎怒而繫之於是令尹子西駕安車駟馬至於殿下曰今日荆臺之遊不可不觀也王登車而拊其背曰荆臺之游與子共樂之矣歩馬十里引轡而止曰臣不敢下車願得有道大王肯聽之乎王曰第言之令尹子西曰臣聞之為人臣而忠其君爵禄不足以賞也若司馬子綦者忠臣也若臣者䛕臣也願大王殺臣之軀罰臣之家而禄司馬子綦王曰若我能止聽公子獨能禁我游後世游之無有極時奈何乎令尹子西曰欲禁後世易耳願大王山陵崩沲為陵於荆臺未嘗有持鐘皷管絃之樂而游於父之墓上者也於是王還車卒不游於荆臺令罷置孔子從魯聞之曰悲哉令尹子西見之十里之前而推之於百世之後也又曰荆文王得如黄之狗菌落之矰以畋於雲夣三月不反得舟之姬滛之朞年不聽朝保申諫曰先王卜以臣為保吉今王得如黄之狗菌落之矰畋於雲夣三月不反得舟之姬行朞年不聽朝王之罪當笞匍伏將笞王王曰不榖免於繦褓託諸侯矣願請變更保申曰臣承先王之命不敢廢王不受笞是廢先王之命也臣寧得罪於王無負於先王王曰敬諾乃蓆王王伏保申承細箭五十跪而加之王背如此者再謂王起矣王曰有笞之名一也遂致之保申曰臣聞之君子恥之小人痛之恥之不變痛之何益保申趨出欲自流乃請罪於王王曰此不榖之過保將何罪王乃變行從保申殺如黄之狗折菌落之矰逐舟之姬務竝乎荆兼國三十令荆國廣大至於此者保申敢極言之功也蕭何王陵聞之曰聖主能奉先世之業而以成功名者其唯荆文王乎故天下譽之至今明主忠臣孝子以為法又曰晉平公使叔向聘於呉呉人拭船以送之左五百人右五百人有綉衣豹裘者叔向歸以告平公平公曰呉其亡乎奚以敬舟奚以敬民叔向對曰君為髙峻之臺上可以發千兵下可以陳鐘皷諸侯聞君者亦曰奚以敬臺奚以敬民所敬各異也於是平公乃罷臺又曰齊景公好弋使燭鄒主鳥而亡之景公怒而欲殺之晏子曰燭鄒有罪請數之以其罪乃殺之景公可於是乃召燭鄒數之景公前曰汝為君主鳥而亡之是一罪也使吾君以鳥之故殺人是二罪也使諸侯聞之以吾君重鳥而輕士是三罪也數燭鄒罪已畢殺之景公曰止勿殺而謝之又曰齊景公正晝被髪乗六馬御婦人以出正閨刖跪繫其馬而反之曰爾非吾君也公慙而不朝晏子睹裔敖而問曰君何故不朝對曰昔者君正晝被髪乘六馬御婦人出閨刖跪繫其馬而反之曰爾非吾君也公慙而反不果出是以不朝晏子入公見曰昔者寡人有罪被髪乘六馬以出正閨刖跪繫馬而反之曰爾非吾君也寡人以天子大夫之賜得率百姓以守宗廟今見戮刖跪以辱社稷吾猶可以齊於諸侯乎晏子對曰民無直辭上有隠惡民多諱上君有驕行古者明君在上下有直辭君上好善民無諱言今君有失行而刖跪有直辭是君之福也故臣來慶請賞之以明君之好善禮之以明君之受諫公笑曰可乎晏子曰可乃召刖跪列於上大夫又曰景公飲酒移於晏子家前驅報門曰君至晏子被朝衣立於門曰諸侯得㣲有故乎國家得㣲有事乎君何為非時而夜辱公曰酒醴之味金石之聲願及子樂之晏子對曰布薦席陳簠簋者有人臣不敢與焉公曰移於司馬穰苴之家前驅報門曰君至司馬穰苴介胄操㦸立於門曰諸侯微有兵乎大臣得微有叛者乎君何為非時而夜辱公曰酒醴之味金石之聲願與夫子樂之對曰布薦席陳簠簋者有人臣不敢與焉公曰移於梁丘據之家前驅報門曰君至梁丘據左操瑟右挈竽行歌而至公曰樂哉今夕吾飲酒也㣲彼二子者何以治吾國微此一臣者何以樂吾身聖賢之君皆有益友無偷樂之臣景公弗能及故兩用之僅得不亡又曰吳濞反梁孝王中郎枚乘字叔聞之為書諫王其辭曰君王之外臣乘竊聞得全者昌失全者亡舜無立錐之地以有天下禹無十戸之衆以王諸侯湯武之王不過百里上不絶三光之明下不傷百姓之心者有王術也故父子之道天性也忠臣不敢避誅以直諫故事無廢業而功流於萬世也臣乘願披腹心而効愚忠恐大臣不能用也臣乘願大王聽臣乗之言夫一縷之任係千鈞之重上懸之無極之髙下垂之不測之淵雖甚愚之人且猶知衰絶也馬方駭而重驚之係方絶而重鎮之係絶於天不可復結墜入深淵難以復出其出不出間不容髮誠能用臣乘言以百舉必脫必若所欲為危於累卵難於上天變所為易於反掌安於㤗山今欲極天命之夀弊無窮之樂保萬乘之勢不出反掌之易以居㤗山之安乃欲乘累卵之危走上天之難此愚臣之所大惑也人生有畏其影而惡其迹者乃背而走無益也不如就隂而止影滅迹絶欲人勿聞莫若勿言欲人勿知莫若勿為欲湯之冷令一人炊之百人揚之無益也不如絶薪止火而已不絶之於彼而救之於此譬猶抱薪救火也故武王諤諤而昌紂嘿嘿而亡君無諤諤之臣父無諤諤之子兄無諤諤之弟夫無諤諤之婦士無諤諤之友其亡可待故曰君失之臣得之父失之子得之兄失之弟得之夫失之婦得之士失之友得之故無亡國破家悖父亂子放兄棄弟狂夫滛婦絶交敗友者也又曰易曰王臣蹇蹇匪躬之故人臣之所以蹇蹇為難而諫其君者非為身也將欲以匡君之過矯君之失也君有過失者危亡之萌也而見君之過失而不諫是輕君之危亡也夫輕君之危亡者忠臣不忍為也三諫而不用則去不去則亡身者仁之所為也是故諫有五一曰正諫二曰譎諌三曰忠諌四曰戅諌五曰諷諌孔子曰吾其從諷諌夫不諌則危君因諌則危身與其危君寧危身危身終不用則諌亦無功矣智者度君權時調其緩急而處其宜上不敢危君下不為危身故在國而國不危在身而身不殆昔陳靈公不聽泄冶之諌而殺之曹羈三諌曹君不聽而去春秋序義雖俱賢而曹羈合禮太平御覽卷四百五十五
