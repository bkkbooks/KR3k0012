body:
  text: 太平御覽卷二十五宋李昉等撰時序部十秋下立秋秋分秋下蔡邕月令章句曰仲秋白露節盲風至秦人謂蓼風爲盲風崔寔政論曰秋風厲而賞武臣顔氏家訓曰或問何故名治獄參軍為長流乎答曰帝王代紀云帝少昊崩其神降於長流之山事出山海經於紀主秋按周禮秋官司寇主刑罰長流之職也漢魏捕賊掾耳晉宋已來始爲參軍上屬司寇故取秋帝所屬為嘉名焉夏小正曰八月丹鳥羞白鳥羞進也白鳥蚊蚋辰則伏辰房星鴽為鼠九月内火火大火心星也漢舊儀曰八月飲酎畢夕牲以繡衣之皇帝暮視牲以隂燧取水于月以陽燧取火于日爲明水火左袒以水沃牛右肩手執鸞刀以切牛毛血薦之而即更衣李彫四部曰弔鳥山俗傳曰鳯死其上毎至七月九日晦望羣鳥常來集其上鳴呼也應劭風俗通曰周太常以八月輶軒使采異俗方言藏之祕府劉歆鍾律書曰春宮秋律百卉必彫秋宮春律萬物必榮魏丁儀刑禮論曰上天垂象聖人則之歲先春而後秋官之為理先禮而後刑論衡曰秋氣擊殺谷草谷草不任彫傷而死此言天時夫物以春生夏榮秋而熟老適自枯死隂氣適盛與之㑹遇何以驗之物有秋不死者生性未極也陸機要覽曰秋樹名成秋雨名愁地鏡經曰八月中草木獨有枝葉下垂者必有美玉又云八月後草木死者亦有玉梁元帝纂要曰秋曰白藏氣白而收藏萬物亦曰收成萬物成而収歛亦曰三秋九秋素秋商秋髙秋天曰旻天旻愍也愍萬物之彫風曰商風素風凄風髙風凉風激風悲風景曰朗景澄景清景時曰凄辰霜辰霜辰可施九月節曰素節商節草曰衰草木曰踈木竹曰霜柯霜筠七月孟秋亦曰初秋首秋上秋肇秋蘭秋八月仲秋亦曰仲商九月季秋亦曰暮秋末商季商杪秋亦曰授衣此時婦功畢始授衣盧公範饋餉儀曰凡八月旦上承露盤赤松子承栢上露爲囊以膏面皮古人用㸃炙枝以梨枝為之及銀盞中者朱砂銀枝子也盧公範者盧懷慎之家法也臨海異物志曰黄雀常以八月入海化爲魚博物志曰舊説天河與河海通近世有人居海渚者年年至八月浮槎來往返不失期其人乃至槎上賫糧食乗槎而去至天河見牽牛飲牛渚世説曰張季鷹辟齊王東曹掾在洛見秋風起囬思吳中蓴菜羮鱸魚鱠曰人生貴適志耳何能從宦數千里以要名爵遂命駕便歸俄而齊王敗人皆謂見幾而作又王子敬云從山隂道上行山川自相映發使人應接不暇若値秋冬之時尤難為懷隂陽五行厯曰一時爲三月一月爲一秋三月爲三秋又一日爲三秋故三月有九秋之名也明堂之制曰秋至以矩矩之爲度也肅而不勃剛而不匱取而無怨内而無害威厲而不懾令行而不廢殺伐既得仇敵乃克矩正不失百職乃服乙巳占曰太白主秋人君當秋之時太白以施政則吉逆則凶秋時行冬令則辰星之氣干於太白黑色而有芒角隂氣太勝戎兵乃來風灾數起國多盗賊邊境不寧而地震坼國有大喪重獄秋時行春令歳星之氣干於太白青色昩小則國旱君有大憂陽氣陵遲五糓不實秋雨不降草木非時生榮矣秋時行夏令則熒惑之氣干於太白赤色而怒國多火寒熱不節人多瘧疾蟄蟲不藏矣大衍星分圖曰八月酉日月㑹于夀星天文録曰胃昴趙之分野自胃七度止畢十二度於辰在酉大梁之疆也八月之時白露始降萬物堅成而彊大故曰大梁漢李陵與蘇武書曰窮秋九月塞外草衰夜不能寐側耳逺聼胡笳互動牧馬悲鳴吟嘯成羣邉聲四起晨坐聼之不覺淚下楚辭曰嫋嫋兮秋風洞庭波兮木葉下言秋風疾則草木搖湖水波而樹葉落矣又悲哉秋之爲氣也蕭瑟兮草木揺落而變衰憭慄兮若在逺行登山臨水兮送將歸泬㵳兮天髙而氣清寂寥兮收潦而水清憯悽増欷兮薄寒之中人愴怳曠浪兮去故而就新坎􅇄兮貧士失職而志不平廓落兮覊旅而無友生惆悵兮而私自憐燕翩翩其辭歸兮蟬寂寞而無聲鴈嗈嗈而南遊鵾雞啁哳上章流下陟轄切鳥鳴聲也而悲鳴獨申旦而不寢兮哀蟋蟀之宵征又皇天平分四時兮竊獨悲此凛秋白露既下降百草兮奄離披此梧楸去白日之昭昭兮襲長夜之悠悠兮魏曹植秋思賦曰四節更王兮秋氣悲遙思惝恍兮若有遺雲髙氣靜兮露凝衣野草變色莖葉稀鳴蜩抱木鴈南飛西風悽悷即計切朝夕臻扇箑屏棄絺綌捐晉潘岳秋興賦曰嗟秋月之可哀兮良無愁而不盡野有歸燕隰有翔隼逰氛朝興槁葉夕殞於時乃屏輕箑釋纎絺藉莞蒻御裌衣庭樹槭所責切以洒落勁風戾而吹幃蟬嘒嘒以寒吟兮雁雝雝而南飛天晃朗而彌髙日悠揚而浸㣲何微陽之短晷覺良夜之方永月朣朧以含光兮露凄清以凝冷熠燿熠熠螢也燦於階闥兮蟋蟀鳴于軒屏聼離鴻之晨吟兮望流火之餘景王諐期懷秋賦曰哀時來之慘凄悼秋風之可悲古樂府歌詩曰秋風蕭蕭愁殺人出亦愁入亦愁胡地多飈風樹木何修修離家日趨逺衣帶日趨緩心思不能言腸中車輪轉魏應璩雜詩曰秋日苦促短遙夜邈綿綿貧士感此時慷慨不能眠晉陸機為顧彦先作詩曰肅肅素秋節湛湛濃露凝太陽夙夜降少隂忽東升又悼亡詩曰皦皦牕中月照我室南端清商應秋至溽暑隨節䦨懔懔凉氣升始覺夏衾單晉張載詩曰靈象運天機日月如激電秋風兼夜戒㣲霜凄舊院嘉禾殞蘭圃芳草悴芝畹嚶嚶南翔鴈翩翩辭歸燕玉肌隨爪素􅌵氣應口見歛襟思輕衣出入忘華扇覩物識時移顧已知節變晉孫綽詩曰蕭瑟仲秋月飈戾風雲髙山居感時變逺詠興長謠踈林積凉氣虛岫結凝霄零露洒庭林宻葉辭榮條撫茵悲先落攀松羡後彫宋劉鑠詩曰昊天清且髙秋風發初凉白露下㣲津明月流素光凝烟泛城闕凄風入軒房朱葉先零落緑草就芸黄織羅還笥篋輕紈改衣裳宋江逌詩曰祝融觧炎轡蓐収起凉駕長林悲素秋茂草思朱夏鳴鴈肅雲嶺蟋蟀吟深榭寒蟬向夕號驚飈激中夜感物憎人懷悽然無忻暇宋謝惠連懷秋詩曰如何乘苦心矧復値秋晏皎皎天月明奕奕河宿爛蕭瑟含風蟬嘹唳度雲鴈寒商動清閨孤燈曖幽幔又𢷬衣詩曰衡紀無淹度晷運倐如催白露滋園菊秋風落庭槐肅肅莎雞羽烈烈寒螿啼夕隂結暮空霄月皓中閨美人式常服端飾相招㩦簪玉出北房鳴金步南階簷髙砧響發楹長杵聲哀宋湯恵休白紵舞歌詩曰秋風嫋嫋入曲房羅帳含月思心傷蟋蟀夜鳴斷人膓長夜思君心飛揚他人相思君相忘錦衾瑤席爲誰芳又八變歌曰北風秋初至吹我章華臺浮雲多暮色似從崦嵫來宋鮑照答湯惠休曰枯桑葉易零疲客心易驚今兹亦何早已聞絡緯鳴囬風滅且起卷蓬息復征愴愴簟上寒凄凄帳裏清物色延暮思霜露逼朝榮百物方蕭瑟長嘆從此興又和王䕶軍秋夕詩曰散滿秋雲逺蕭蕭霜月寒驚風西北起孤鴈夜往還金氣方勁殺陽氣㣲且殫泉涸甘井竭節後芳草殘何瑾悲秋夜曰欣莫欣兮春日悲莫悲兮秋夜立秋易説曰坤西南也主立秋京房易占曰立秋坤土王凉風用事易通卦驗曰立秋日凉風至白露下春秋考異郵曰立秋促織鳴女工急促之春秋元命苞曰瑤光星散爲鷹立秋之日鷹鸇擊三禮義宗曰七月立秋秋之言湫言湫聚也縮之意隂意出地始殺萬物故以秋爲節名五經要義曰磬立秋之樂也白虎通曰磬者夷則之氣象萬物之成月令占候圖曰立秋坤卦用事其神攝提二宮荆州分也晡時申西南凉風至黄雲如羣羊宜粟糓若晴朗風雲不至萬物不成望西南坤上有黄雲氣是正氣立秋應節萬物皆榮豆糓熟赤氣出其右萬物半死豆糓半収地動人民不安坤氣衰萬物不成地頻動牛馬病應在十二月坤氣見于江湖江湖水必竭坤氣退則地裂泉湧申時西南有赤黄氣或白潤厚白澤者粟大熟又立秋日午時竪竿影得四尺五寸二分半五糓熟立秋後四十五日内土氣在坤不得修造動土及逺行出軍事凶漢書曰孫寳爲京兆尹請侯文爲掾進見如賔禮數月以立秋日署文東部督郵且曰今鷹隼始擊當順天地取姦惡以成嚴霜之誅掾部詎有其人乎文曰無其人不敢受職寳曰誰也文曰霸陵杜穉季寳問其次文曰豺狼横道不宜復問狐狸後漢書曰申屠建等與御史大夫隗囂合以立秋日貙膢時共刼更始漢書音義曰貙獸也以立秋日祭獸王者亦以此日出獵用祭宗廟冀州北八月朔作飲食爲膢其俗謂曰膢獵社又貙音丑于反膢音娄續漢書曰立秋之日夜漏未盡五刻京都百官皆衣白絁皂領縁中衣迎氣于西郊又立秋之日西郊畢始揚威武斬牲于郊東門以薦陵廟其儀乘輿御戎輅白馬朱鬛躬執弩射牲牲以鹿麛太宰令謁者各一人載獲車送陵廟還宮遣使者賫束帛以賜武官肄兵習戰陣之儀斬牲之禮名曰貙劉如淳曰膢漢儀注立秋貙婁許慎曰俗以二月祭飲食冀州北部或以八月作飲食爲婁也祠令曰立秋祀白帝于西郊帝少昊配蓐収從祠又立秋後辰祀靈星于國城東南登真隱訣曰立秋之日日中五岳諸真人諸黄老于黄房雪庭山㑹仙官于日中定天下神圖靈圖藥圖符瑞圖曰立秋西方閶闔風至一名飈風白虎通曰立秋之日凉風至王者報地德禮西郊周書時訓曰立秋之日凉風至又五日白露降又五日寒蟬鳴凉風不至國無嚴政白露不降民多疾病寒蟬不鳴人臣力爭白露之日鴻雁來又五日𤣥鳥歸又五日羣鳥養羞鴻雁不來逺人背叛𤣥鳥不歸室家離散羣鳥不羞臣下驕慢秋分之日雷始收聲又五日蟄蟲坯户又五日水始涸雷不收聲諸侯淫汰蟄蟲不坯户民靡有頼水不始涸介蟲爲害五行休王論曰立秋坤元兊相乾胎坎没艮死震困巽廢離休陸機要覽曰列子御風常以立春歸乎八荒立秋遊乎風穴是風至草木皆生否則搖落謂之離合風秋分説文曰龍春分而登天秋分而入淵易説曰秋分閶闔風至雷始收聲鷙鳥擊𤣥鳥歸又兊西方也主秋分孝經説曰斗指酉爲秋分又曰秋分日在内衡文子曰隂陽調日夜分故萬物春分而生秋分而成生與成必得和之精故積隂不生積陽不化隂陽交化乃能成和此天地之氣和平故萬物得生成故也京房易候曰虹八月出西方粟貴又京房易候占曰秋分而人君釋鐘鼓之懸孔安國尚書注曰國虛𤣥武之中星皆以秋分日見以正三秋天文録曰仲秋秋分暮出角亢氐房東四舎爲漢中周書時訓曰秋分八月雷乃收聲不収聲即人民不安又云諸侯驕逸蟄蟲坯戸不坯戸即邊方不寧又云人靡有頼水始涸水不始涸即人多疾病又云介蟲爲害厯日䟽曰秋分八月之中氣也秋分之時日出于卯入于酉分天之中隂陽氣等晝五十刻夜五十刻一晝一夜二氣也中分故謂之秋分也太平御覽卷二十五
