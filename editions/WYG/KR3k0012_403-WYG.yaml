body:
  text: 太平御覽卷四百三宋李昉等撰人事部四十四道徳隂徳道徳禮記中庸曰天命之謂性率性之謂道脩道之謂教道也者不可湏㬰離也可離非道也又曰大哉聖人之道洋洋乎發育萬物峻極于天育生也峻髙大也優優大哉禮儀三百威儀三千待其人然後行故曰苟不至徳至道不凝焉又曰天下之逹道五所以行之者三曰君臣也父子也夫婦也昆弟也朋友之交也五者天下之逹道也智仁勇三者天下之逹徳也又曰君子之道四丘未能一焉所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也庸徳之行庸言之謹有所不足不敢不勉又曰君子之道造端乎夫婦及其至也察乎天地子曰道不逺人人之為道而逺人不可以為道又學記曰玉不琢不成器人不學不知道又曰大道不器謂聖人之道不如器施於一物也又樂記曰君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑不樂道謂仁義也欲謂邪淫也尚書大禹謨曰罔違道以干百姓之譽失道求名古人賤之又洪範曰無有作好遵王之道言無有亂為私好惡動必循先王之道又旅獒曰志以道寧言以道接在心為志發氣為言皆以道為本故君子勤道周易繋辭曰智周乎萬物而道濟天下又曰一隂一陽之謂道論語學而曰敏於事而慎於言就有道而正焉有道謂有道徳者正謂問事是非也又公冶長曰子謂子産有君子之道四焉其行已也恭其事上也敬其養民也惠其使民也義又曰子曰天下有道則見無道則隠邦有道貧且賤焉恥也邦無道富且貴焉恥也又衛靈公曰子曰人能𢎞道非道𢎞人又曰君子謀道不謀食又曰天下有道則禮樂征伐自天子出又曰君子學以致其道又曰子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉又顔淵曰季康子問於孔子曰如殺無道以就有道何如孔子對曰子為政焉用殺子欲善而民善矣君子之徳風小人之徳草草上之風必偃欲使季康子先自正也偃仆也草加之以風無不仆者猶民之化於上大戴禮曰篤仁而好學多聞而順道天子疑則問應而不窮者謂之道道者導天子之道老子曰道可道非常道王弼曰可道指事造形其非常道可道莊子曰魚相造乎水人相造乎道子思子曰天下有道則行有枝葉天下無道則言有枝葉又曰祝牧謂其妻曰天下有道我韍子珮天下無道我負子戴又曰原憲處魯居環堵之室上漏下濕匡坐而絃歌匡正也子貢乗大馬中紺而表素軒車不容巷往見原憲原憲革冠蹤履杖藜應門子貢曰嘻先生何病也原憲應之曰憲聞無財之謂貧學道而不能行之之謂病今憲貧也非病也子貢逡巡而有愧色文子曰夫道徳者匡邪以為正治亂以為定上下之儀也上有道徳即下有仁義積道徳者天與之地助之人輔之鬻子曰發政施命為天下福謂之道公孫尼子曰道為智者設賢為聖者用淮南子曰聖人之道若中衢樽過者斟酌雖多少不同而各得其宜也揚子法言曰仲尼之道猶四瀆經營中國終入大海又曰君子之道有四簡而易用也要而易守也炳而易見也法而易言也又曰聖人重其道而輕其禄衆人重其禄而輕其道鹽鐵論曰以道徳為城文王是也以道徳為胄湯武是也桓譚新論曰三皇以道治五帝以徳化王道純粹其徳如彼霸道駮雜其功如此王逸正部曰仲尼門人餔道醇飲道宗昌言曰道徳仁義天性也織之以成其物練之以致其情瑩之以發其光任子曰道徳之懐民道春陽之柔物也履深冰而不寒結本條而不折杜氏幽求子曰盖道清淡以無為為家恬虛寂静寛廣多包豈非聖人所宅乎又曰有道之國其鬼不神崔元始正論曰國不信道工不信度亡可待也傅子曰君子審其宗而後學明其道而後行中論曰道之於人甚簡且易不如採金攻玉渉艱難也符子曰為道者日損而月章為名者日章而月損釋名曰徳得也得事宜也周禮地官下師氏曰一曰至徳二曰敏徳三曰孝徳至徳中和之徳敏徳仁義順時孝徳尊祖愛親禮記學記禮樂皆得謂之有徳徳者得也又祭義曰天子有善讓徳於天又中庸曰雖有其位苟無其徳不敢作禮樂焉雖有其徳苟無其位亦不敢作禮樂焉又曰小徳川流大徳敦化此天地之所以為大也又禮記曰以徳報徳則民有所勸又大學曰富潤屋徳潤身左傳桓公曰臧哀伯諫曰君人者將昭徳塞違以臨照百官猶懼或失之故昭令徳以示子孫又僖公中曰庸勲親親暱近尊賢徳之大者也又曰徳以柔中國刑以威四夷又曰太上以徳撫民又文公上曰孝敬忠信為吉徳盗賊藏奸為凶徳又宣公上曰楚子觀兵于周疆定王使王孫滿勞楚子楚子問鼎之大小輕重焉對曰在徳不在鼎又成公上曰四王之王也湯禹文武樹徳而濟同欲焉又襄公四曰太上有立徳其次有立功又昭公三曰盛徳必百世毛詩蕩烝民曰徳輶如毛民鮮克舉之尚書舜典曰𤣥徳升聞乃命以位𤣥謂幽􅇓􅇓行道徳升聞天朝遂見徴用又大禹謨曰臯陶邁種徳徳乃降黎民懐之邁行種布也皋陶布行其徳下洽於民民歸服之又曰惟徳動天無逺不届又伊訓曰徳日新萬邦惟懐志自滿九族乃離又曰爾惟徳罔小萬邦惟慶爾惟不徳罔大墜厥宗又太甲曰徳惟治否徳亂為政以徳則治不以徳則亂又咸有一徳曰非天私我有商惟天佑于一徳非商求于下民惟民歸于一徳徳惟一動罔不吉徳二三動罔不㓙又泰誓曰同力度徳同徳度義力鈞則有徳者勝徳鈞則秉義者強又曰受有億兆夷人離心離徳予有亂臣十人同心同徳又曰樹徳務滋除惡務本立徳務滋長去惡務除本又洪範五福曰四曰攸好徳所好者徳福之道又旅獒曰玩人喪徳玩物喪志以人為戲弄則喪其徳又蔡仲之命曰皇天無親惟徳是輔又周官曰作徳心逸日休作偽心勞日拙為徳直道而行於心逸豫而名日美又君陳曰黍稷非馨明徳惟馨周易坤卦象曰地勢坤君子以厚徳載物又繋辭曰富有之謂大業日新之謂盛徳論語為政曰為政以徳譬如北辰居其所而衆星共之徳者無為猶北辰之不移而衆星共之又里仁予曰徳不孤必有鄰又先進曰徳行顔淵閔子騫冉伯牛仲弓又憲問子曰有徳者必有言有言者不必有徳又曰驥不稱其力稱其徳也驥古之善馬在徳謂在五御之威儀又季氏曰逺人不服則修文徳以來之尚書大傳曰有徳者尊其位而重其禄史記曰一年種之以榖十年樹之以木百年來之以徳東觀漢記曰張湛字子孝右扶風人以篤行純淑鄉里歸徳雖居幽室闇處必自整頓三輔以為儀表又曰淳于恭字孟孫北海人以謙儉推讓為節人有刈恭禾見之念其愧因伏草中至去乃起恭家井在門外上有盆隣里牧牛而争飲牛恭惡其争多置器其上為預汲水滿之小兒復争恭各語其家父母父母乃禁怒之里落皆化而不争三輔決録曰馮豹字徳文母為父所出後母遇之甚酷豹事之逾謹時人為之語曰道徳彬彬馮徳文王隠晉書曰庾衮字叔褒潁川人少遭大疫二兄亡次兄毗又疫其癘氣方熾衮父母諸弟皆出避衮獨不出諸父強之不可曰衮性不畏病納漿粥扶持不舎晝夜省柩哀臨十有餘旬疫勢既歇家人乃反而衮亦無患害宗黨歎曰異哉此子能守人之所不能守能行人之所不能行晉中興書曰衛玠字叔寶常以人有不及可以情恕非意相干可以理遣故終身不見其喜愠齊書曰張緒字思曼為吏部尚書每朝見太祖目送之謂王儉曰緒以位尊我我以徳貴緒又曰王秀之字伯奮為南郡内史州西曹荀丕欲交秀之拒而不納報丕書曰僕以徳為寶足下以位為寶各寶其寶於此敬宜也老子曰上徳不徳是以有徳下徳不失徳是以為徳上徳之人不徳毎有徳下徳而徳之必有失焉文子曰山髙者其木脩地廣者其徳厚又曰閑九竅滅志意棄聰明反無識含陽吐隂而與萬物同徳也莊子曰至徳之世不尚賢不使能韓子曰善為吏者樹徳不能為吏者樹怨孟子曰周于利者凶年不能殺周于徳者邪世不能亂鶡冠子曰徳及萬人者謂之豪徳過百人者謂之英孔叢子曰晏子身長不過六尺齊國莫不宗焉趙文子身如不勝衣相晉國以寧諸侯敬服其徳故也揚子法言曰耕道而得道獵徳而得徳傅子曰上徳之人其齊萬物也猶天之有春秋時至自生非徳之力太公金匱曰徳行則福徳廢則覆易叅同契曰道成則就􅇓伏候時海内先賢行狀曰王烈字伯善時有盜牛者主得之盜者曰我邂逅迷惑從今將改子既赦矣幸無使王烈聞之又曰戴良字叔鸞髙才磥硌義聲逺播少者懐之長者慕之鄉里縉紳下至黎庶莫敢有分争之家又曰徐孺子徴聘未嘗出門赴喪不逺萬里當夏江夏黄公薨徃會其葬家貧無以自供賫磨鏡具自隨每至所在賃磨取資然後得前既至設祭哭畢而返陳仲舉為豫章太守召之則到饋之則受但不服以成其節又曰仇覽字季智學通五經選為亭長民有孫元少孤與母居詣覽告元不孝覽謝遣之屬母歸勿言方為教之後覽賫禮詣元為陳孝子供養之意元遂感激卒為孝子時令河内王渙政尚清嚴聞覽得元不治心獨望之乃問覽在亭不治不孝得無失鷹鸇之志乎對曰竊以鷹顫不如鳳凰故不為也渙感覽言用措威刑㑹稽典録曰鄭宏字巨卿為郡督郵上計吏時計掾勾章任尚居素温富乗鮮車駕肥馬宏恒在後尚輙罵宏無愠容宏尚在京師遊學還郡俱見府君府君所問宏無不對而尚不知出又問宏掾行道數相折辱何以不荅宏謝曰過奉顯使無光國之美馬羸行遲掾恐失期賀以相催促自是其宜愚聞兩虎共鬭大者必傷小者必死兩為無益故不敢荅府君歎曰此謂長者太守所不能也汝南先賢傳曰黄憲字叔度不矜名以詭時不抗行以矯俗闚其門者莫敢踐其庭覩其流者不能測其深時人論曰顔子復生乎襄陽耆舊記曰龎徳公子奐字世文晉太康中為牂牁太守去官歸鄉里居荆南白沙鄉里人宗敬之相語曰我家池中龍種來歸鄉里仰其讓徳少壯皆代老者擔陳寔别傳曰寔字仲弓潁川人自為兒童不為戲弄等類所歸寔在鄉閭平心率物其争訟輙求判正曉譬曲直返無怨者至乃歎曰寧為刑罰所加不為陳君所短時歲荒民儉有盜夜入其室止於梁上寔隂見之乃起自整拂呼命子孫正色訓之曰夫人不可不自勉不善之人未必本惡習與性成遂至於此如梁上君是矣盜大驚自投於地稽首歸罪寔徐譬之曰似君子狀貌不似惡人宜深尅已反善然此當由困貧令遺絹二疋自是縣無復盜竊荀氏家傳曰荀彧徳行周備名重天下海内英俊咸嘉焉又曰鍾繇以為顔子既没能備九徳百行不二其過者唯荀彧乎或問繇曰君推荀君比之顔子自以不及其可得聞乎繇曰夫明君師臣其次友之以太祖之聰明毎大事常為先諮又荀彧是則古師友之義也吾等受命而行猶或不盡去固逺耶潘朂别傳曰朂寛賢容衆與天下人等休戚同有無不以家財為己有任嘏别傳曰嘏字照先樂安人幼以至性稱遇見荒亂家貧賣魚㑹官發魚魚貴數倍嘏取直如常㑹太祖創業召海内至徳嘏應其舉為臨淄侯庶子隂徳左傳宣公下曰魏顆敗秦師于輔氏獲杜囬秦之力人也初武子有嬖妾無子武子疾命顆曰必嫁是疾病則曰必以為殉及卒顆嫁之曰病疾則亂吾從其治也及輔氏之役顆見老人結草以抗杜囬亢禦也杜囬躓而顛故獲之夜夢之曰余而所嫁婦人之父也爾用先人之治命余是以報漢書曰于定國父于公為縣獄吏郡決曹獄平羅文法者于公所決皆不恨其閭門壊父老方共治之于公謂曰少髙大閭門令容駟馬髙盖車我治獄多隂徳未曾有所寃子孫必有興者至定國為丞相又曰邴吉字少卿魯國人為丞相寛大好禮初吉有隂徳於孝宣帝微時帝即位衆莫知之吉亦不言吉從大將軍長史遷至御史大夫帝聞將封之㑹吉病甚將使人加綬而封之及其生也太子太傅夏侯勝曰此未死也臣聞有隂徳者必饗其樂以及子孫今未獲其樂而病非其死病也後果愈乃封博陽侯終饗其禄後漢書曰何敞六代祖比干學尚書於晁錯注云比干字少卿經明行脩兼通法律為汝隂縣獄吏決曹掾平活數千人後為丹陽都尉征和三年三月辛亥天大隂雨比干在家中日夢貴客車騎滿門覺以語妻語未巳而門有老嫗年可八十餘頭白求寄避雨雨甚而衣履不沾漬雨止送至門乃謂比干曰公有隂徳今天賜公䇿以廣公之子孫因出懐中符䇿狀如簡長九寸凡九百九十枚以授比干曰子孫佩印綬者如此算又曰和熹鄧后叔父陔言常聞活千人者子孫有封兄訓為謁者使脩石臼河歲活數千人大道可信家必蒙福初太傅禹歎曰吾將百萬之衆未嘗妄殺一人其後代必有興者又曰永平中楚王英謀為逆事下郡覆考明年三府舉袁安能理劇拜楚郡太守是時英辭所連及繫者數千人顯宗怒甚吏按之急廹痛自誣死者甚衆安到郡不入府先往按獄理其無明騐者條上出之府丞掾吏皆叩頭争以為阿附反虜法與同罪不可安曰如有不合太守自當坐之不以相及也遂分别其奏帝感悟即報許得出者四百餘家又曰虞詡字升卿祖經為縣獄吏決平嘗曰東海于公髙其里門而其子定國卒至丞相吾決獄六十年矣雖不及于公其庶幾乎吾子孫何必不為九卿耶故字詡曰升卿謝承後漢書曰陳重字景公豫章宜春人舉孝亷在郎署有郎負息錢數十萬債主日至剪求無已重乃密以錢代還郎後覺知而厚辭謝之重曰非我之為將有同姓者終不言惠吳志曰鍾離牧字子翰㑹稽山隂人少居永興自墾稻田二十餘畆臨熟而縣民識之牧曰本以田荒故墾之耳遂以稻與縣人沈約宋書曰沈道䖍吳興武康人少而愛好老易郡州府凡二十命皆不就有人竊其園菜者外還見之乃自逃隠候竊者取足去後乃出唐書曰載初中徐有功為大理丞時酷吏來俊臣等搆陷無辜公卿震恐有功獨存平恕詔下大理者有功皆議出之前後濟活數十百家吕氏春秋曰宋景公時熒惑在心問子韋子韋對曰禍在君可移宰相公曰宰相所以治國家曰移於民公曰民死誰與為君曰移於歲公曰歲饑民必死子韋北面再拜曰君有至徳之言三天必賞告熒惑果徙三舎賈誼書曰楚惠王食寒葅得水蛭王不欲以飲食傷人乃吞之令尹避席再拜而賀曰臣聞天道無親唯徳是輔是夜惠王之㑹溷而蛭出其久病心腸之積皆愈又曰孫叔敖之為兒也出遊歸遂憂而不食其母問其故泣而對曰今日見兩頭蛇恐死其母曰今蛇安在曰敖聞見兩頭蛇者必死吾恐人又見之殺而埋之母曰無憂汝不死矣吾聞有隂徳者天必報之以福果不死矣髙士傳曰初晉宣帝布衣時與胡昭有舊昭同郡周士等謀欲害帝昭聞而渉險邀士於齊澠之間止士不肯昭泣以示誠士感義乃止昭雖有隂徳於帝口終不言續齊諧記曰楊寶年九歲時至華隂山北見黄雀為鴟梟所搏墜於樹下為螻蟻所困寶取之以歸置巾箱中唯食以黄花百餘日毛羽成乃飛去其夜有黄衣童子向寶再拜曰我王母使者君仁愛救拯實感成濟以白環四枚與寶曰令君子孫潔白位登三事當如此數矣㑹稽典録曰鄭宏為靈文鄉嗇夫民有弟用兄錢者未還之嫂詣宏訴之宏賣中單即今之汗袖也為叔還錢兄聞之遣其婢索錢還宏宏不受又曰夏香字曼卿永興人門側有大井傍設水瓮里中兒童各競牛争水共鬭香預為汲水多置器瓮由是無争專以徳化香至四節先慶酌二親退賫酒入肴勞問里中父老以此為常益都耆舊記曰王忳常詣京師於空舎中見一書生疾困愍而視之書生謂忳曰我當到洛而得病命在須臾腰下有金十斤願以相贈死後乞葬藏骸骨未及問姓名而命絶忳即鬻金一斤營其殯𦵏餘金悉置棺下人無知者後歸數年縣署忳大度亭長初到之日有馬馳入亭中其日風飄繡被復墮忳前即言於縣馬遂奔走牽忳入他舎主人見之喜曰今擒盜矣問忳忳具道得馬并繡被狀主人悵然良久乃曰被墮飄風與馬俱亡卿何隂徳而致此二物忳思自念有葬書生事因為説之道書生形貌及埋金之處主人驚曰是我子姓金名彦前徃京師不知所在不意卿乃葬之大恩久不報天以此彰卿徳耳忳悉以被馬還之彦父不取又厚遺忳忳辭讓而去時彦父為州從事因告新都令假忳休息與俱迎彦喪餘金具存由是顯名後漢書亦載廣州先賢傳曰羅威字徳仁南海番禺人也有鄰家牛數食其田禾既不可止遂為斷芻多著牛家門中不令人知數如此牛主驚怪不知為誰隂察求之乃覺是威自後便相約率收拾牛犢不敢復踐傷於威田豫章耆舊志曰施陽字季儒遷書令及除出發之官道經江夏遇冦賊興起刼奪陽無賊去後車上席下尚有五千錢追以與賊荀氏家傳曰荀遂字仲陽夫人有至行時歲荒饑有餘米糶之夫人恒㧻斛糴者傾量輙過本時人號曰㧻斛夫人太平御覽卷四百三
