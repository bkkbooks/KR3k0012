body:
  text: 太平御覽卷三百五宋李昉等撰兵部三十六征伐征伐下説苑曰趙簡子舉兵伐齊有被甲者笑之曰子何笑對曰臣有宿笑簡子曰有以説之則可無則死對曰當桑之時臣隣家夫與妻俱之田見桑中女因追之不能還反其妻怒而去之臣笑其曠也簡子曰今吾伐國失國是吾曠也還師而歸又曰中行獻子將伐鄭范文子曰不可得志於鄭諸侯讐我憂必滋長郤至又曰得鄭是兼國也則王者固多憂乎文子曰王者盛其徳而逺人歸故無憂今我寡徳而有王者之功故多憂今子見無事而欲富樂乎新序曰秦欲伐楚使者往觀楚重寳楚王聞之召令尹子西問焉曰秦欲觀楚寳噐和氏之璧隋侯之珠可以示諸乎對曰臣不知也召昭奚恤問焉對曰此欲觀吾國之得失而圗之非國之重寳也遂使恤應之恤發精兵三百人陳於西門之内為東西之壇秦使者至恤曰君客也請就上位東子西南面大宗子方次之葉公子髙次之司馬子反次之恤自居西面之壇稱曰客觀楚之寳噐楚所寳者賢臣也理百姓實倉廩使民人各得其所子西在此奉珪璧使諸侯解忿憤之難交兩國之欣使无兵革之憂大宗子方在此守封疆謹境界不侵鄰國鄰國亦不見侵葉公子髙在此理師旅正兵戎以當强敵提桴鼓以動百為之衆使皆赴湯火蹈白刃出萬死不顧一生司馬子反在此若懐忠貞之大義撮治亂之遺風昭奚恤在此唯大國所觀秦使者憮然無以對遂揖而去使者返言於秦君曰楚多賢臣未可謀也又曰湯居亳七十里地與葛伯為隣葛伯放淫不祀湯使人遺之牛羊葛伯食之又不以祀湯又使人問曰何為不祀曰無以供粢盛也湯又使亳衆往為之耕老弱饋食葛伯率其民要其有酒食黍稻者奪之不與者殺之有一童子以黍肉餉殺而奪之書曰葛伯仇餉此之謂也為其殺是童子而征之四海之内皆曰非富天下也為匹夫匹婦復讐也蜀王本紀曰秦惠王欲伐蜀乃刻五石牛置金其後蜀人見之以為牛能大便金牛下有養卒以告曰此天牛也能便金蜀王以為然即發卒千人使五丁力士拖牛成道􅃱三枚於城郭秦道得通石牛力也後遣丞相張儀等將兵隨石牛道伐蜀焉夷維記曰建安中曹操於南皮攻袁譚斬之操作鼓吹自稱萬嵗於馬上舞也紀年曰周穆王三十七年大起九師東至於九江架黿鼉以為梁遂伐越至於紆春秋後秦語曰陳軫為楚使來見秦恵王曰卞莊子方刺獸而管豎子止之曰兩獸方食牛食必甘甘必争爭必鬭鬭則大者傷小者死從傷而刺之一舉必有雙獸之功卞莊子以為然立待之頃有兩獸之功今韓魏相攻朞年不解是必大國傷小國亡從傷而伐之一舉必有兩國此猶莊子刺虎之類也恵王曰善又楚語曰白起將兵伐楚楚人黄歇者㳺學博聞襄王以為辯故使於秦說昭王曰天下莫强於秦楚今聞大王欲伐楚此猶兩虎相與鬭而怒必受其弊不如善楚秦王乃止不伐楚約為與國黄歇受約而歸又趙語曰張孟談隂見韓魏之君曰臣聞唇亡者齒寒今智伯率二君而伐趙趙亡矣趙亡則二君為之次二君曰我知其然吳越春秋曰夫差令於邦中曰寡人欲伐齊敢有諌者死太子友乃諷諫懐丸挾彈從後園而來衣沾履濡吳王夫差怪而問之太子友對曰臣逰後園聞秋蟬之聲往而觀之秋蟬登髙樹飲清露悲吟以為安不知螳螂超枝縁條曵腰聳距而稷其形夫螳螂翕心而進志在有利不知黄雀縁茂林徘徊枝隂欲啄螳螂也夫黄雀知伺螳螂之有味不知臣躊躇引彈蜚丸而集其背也又曰越王勾踐謂大夫種曰孤聞吳王淫而好色因此而謀之可乎大夫種曰可破唯君選擇美女二人而進之於是越王曰善哉乃使相者索國中得苧蘿山鬻薪之女名西施鄭旦而獻於吴又曰越王念吳欲復其讐乃中夜抱柱而哭又復承之以嘯於是羣臣咸曰君王何愁心之甚夫復讐謀敵非君王之憂是臣下急務也又曰吳王闔廬將伐楚登臺向風而嘯有頃而嘆羣臣莫有曉王意者子胥乃薦孫子孫子者吳人也名武善為兵法僻隱幽居世人莫知其能孟子曰春秋無義戰彼善於此則有之矣征者上伐下也敵國不相征也呂氏春秋曰智伯將伐仇繇之國山險無道乃遺以大鐘方九軌仇繇開道迎之人因其道取其國韓子曰智伯鑄大鐘遺仇繇其君大恱除道逆之因伐仇繇也又曰闔廬選多力者五百人敢死者三千人以為前陳進與荆戰五勝遂有郢東征至於庫盧西伐至扵巴蜀北逼齊晉命行中國又曰凡人之攻伐也非因利則因名也名實不得國雖欲彊大則勿為攻矣解在乎史墨東而輟不襲衛趙簡子可謂知動静矣晉趙簡子曰鞅將入衛史墨往觀之反曰蘧伯玉為政未可與校簡子輟不伐衛故曰史墨東而輟不襲衛也又曰楚之邊邑曰卑梁其處女與吳之邊邑處女桑於境上戲而侍卑梁之處女卑梁人挾其侍子以讓吳人吳人應之不恭卑梁人怒殺而去之吳人往報之盡屠其家卑景公怒曰吳人焉敢攻吾邑舉兵反攻之老弱盡殺之吳王夷昧聞之怒使人舉兵進楚邊邑堯夷而復去之吴公子光又率師與楚人戰於鷄父大敗之獲其帥又曰荆莊王欲伐陳使人視之使者曰陳不可伐也莊王曰何故對曰城郭髙溝洫深蓄積多也寧國曰陳可伐也寧國楚臣夫陳小國也而蓄積多賦歛重也則民怨上矣城郭髙溝洫深則民力罷矣興兵伐之陳可取莊王聽之遂取陳焉又曰箴尹為荆使於宋司城子罕觴之西家之潦經其庭而不禁箴尹問其故曰西家髙吾宫卑潦不經吾庭不得㵼焉是吾不禁也箴尹歸適遇荆欲攻宋箴尹諌於王曰宋不可攻也其君賢相仁賢者得民仁者能用之攻之必無功也淮南子曰堯時十日並出焦禾稼殺草木民人無食窫窳九嬰大風封豕鑿齒修蛇皆為害堯乃使羿誅鑿齒於疇華之澤南地也殺九嬰於凶水水火之怪在北狄之地繳大風於青丘之野大風鷙鳥也射十日而下其九日殺窫窳狀如龍首食人在西方也斷修蛇於洞庭在南方擒封豕於桑林封豕大彘也桑林湯禱旱地又曰晉伐楚三舍不止大夫擊之莊王曰先君之時晉不伐楚及孤之身而晉伐楚是孤之過也若何其辱羣大夫曰先臣之時晉不伐楚今臣之身而晉伐楚此臣之罪也請擊之王恱而泣涕沾襟起而拜羣大夫晉人聞之曰君臣争以過為在己不可伐也夜還師而歸又曰諸候伐秦及涇莫濟魯㐮十一年秦人伐晉以救鄭晉悼十四年晉使六卿帥諸侯之大夫伐秦至涇水無有先渡者也晉叔向見叔孫穆子曰諸侯伐不恭而討之及涇而止於秦何益何益於伐秦之事穆子曰豹之業及匏有苦葉矣不知其他業事匏有苦葉衛風篇名匏有苦葉濟有深渉深則厲淺則掲言其必濟不知其他叔向退召舟虞與司馬舟虞掌舟司馬掌兵曰夫苦匏不材於人共濟而已材若裁也不材於人言不可食共濟而已佩匏可以渡水魯叔孫賦曰匏有苦葉必將渉矣詩以言志具舟除隧不共有法隧道共具也舟虞具舟司馬除道法刑也是行也魯人以莒人先濟諸侯從之又曰文公立四年楚成王伐宋四年魯僖公二十七年宋背楚事晉故楚伐之公率齊秦伐曹衛以救宋魯僖二十八年春晉侯侵曹伐衛傳曰楚始得曹而新昏於衛也宋人使門尹班告急於晉門尹班宋大夫公吿大夫曰宋人告急舍之則宋絶舍不救則宋降楚與我絶告楚則不許我告請宋扵楚楚不許我我欲擊楚齊秦不欲其若之何又曰自大畢伯士之終也大畢伯士犬戎氏之二君終卒也犬戎氏以其職來王以其職謂其以大戎氏之寳來見王天子曰予必以不享征之且觀之兵謂犬戎有不享之罪欲觀兵以伐之也其無乃廢先王之訓而王幾頓乎委頓吾聞夫犬戎樹敦樹敦言犬戎立性敦厚師舊徳而守純終固師循也純専一也言犬戎氏修先王之舊徳奉其常賦天性専一終身不移所以穆王責之不當其有以禦我矣禦應距也王不聽遂征之得四白狼四白鹿以歸目是荒服者不至又曰商皇帝辛大惡于人商殷人本號辛紂名大惡大為人之惡也庶人不忍欣載武王以至戎于商牧再奏武兵扵商郊牧野也是先王非務武也恤民隠而除其害恤憂隠痛又曰忠臣者務崇君之徳諂臣者務廣君之地何以明之陳夏徴舒弑其君楚莊王伐之陳之人聽命莊王以計宥罪遣卒戍陳戍守也欲守城大夫畢賀申叔時使扵齊反還而不賀莊王曰陳為無道寡人起六軍以討之征暴亂誅罪人羣臣皆賀而子不賀何也申叔時曰有牽牛而往蹊人之田主殺其人而奪之牛罪則有矣罰亦重矣今君王以陳為無道舉兵而征之因誅罪人遣卒戍陳諸侯聞之非以王為誅罪人也貪陳國也蓋聞君子不棄義以為利王曰善乃罷陳之戍後諸侯聞之朝于楚此務崇君之徳也始張式為智伯謀張式晉人晉大將范中行子取弱而上下離心可伐以廣地於是伐范中行滅之已又教智伯求地於韓魏韓魏裂地而授之趙氏不予乃率韓魏而伐趙圍晉陽三年三國隂謀遂滅之此務為君廣其地也夫為君崇徳者霸為君廣地者滅故千乘之國修徳行者王湯武是也萬乘之國好廣地者亡智伯是也莊子曰犀首請魏伐齊季子請勿伐華子聞而醜之曰善言伐齊者亂人也善言勿伐者亦亂人也謂伐之與不伐亂人也者又亂人也列子曰晉文公出㑹欲伐衛公了御而笑之公問之對曰笑臣鄰之人有送其妻適私家者道見桑婦恱而與之言然顧視其妻亦有招之者臣竊笑也公悟乃引師而還未至而有伐其北鄙矣墨子曰天賜武王黄鳥之旗以伐紂又曰湯在鏕宫夢神謂之曰夏桀無道汝克戡之孫卿子曰堯伐驩兜舜伐三苖禹伐共工湯伐有夏文王伐崇武王伐紂此兩帝三王者仁義之兵於天下也尉繚子曰武王之伐紂也河水逆流左驂霆死地方百里戰卒三萬紂之陣起自黄鳥至赤斧其間百里武王不罷士民兵不血刃克殷誅紂韓子曰晉獻公欲伐虞虢乃遺之屈産之乘垂棘之璧女樂二人以縈其心以亂其政阮嗣宗為鄭冲勸晉王牋曰前者胡公東誅叛逆全軍獨尅擒闔閭之將斬輕銳之卒以萬萬計太平御覽卷三百五
