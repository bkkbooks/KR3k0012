body:
  text: 太平御覽巻六百七十四宋李昉等撰道部十六理所五岳山名圖曰性命魂神之所屬皆有理所神異經曰崑崙有銅柱其髙凌雲所謂天柱圍三千里員曲如削下有仙曽曹九府治所又曰崑崙三角其一角正北干晨星名曰閬風巔其一角正西名曰𤣥圃臺其一角正東名曰崑崙宫上有玉樓十二景雲映日朱霞九光西王母之治所真官仙靈之所宗登真隠訣曰上清之璄九天之門上皇太皇帝君王尊集群神於其中以定天下萬民之罪福又曰西華堂在上清王母所又曰文德宫張叔隠取之又曰八景城在上清玉晨道君所又曰赤城太元真人所居又曰上清有楊寥殿上皇大帝王尊集郡於真内又曰希琳殿在上清東海八停山上大帝君所居又曰琅玕殿在上清金闕聖君所居又曰上清之境有丹紫臺上皇大帝君尊集處王又曰七靈臺在上清境玉晨道君所居又曰明貞臺在上清境方諸東華山上青童君所居又曰上清境有希林臺大帝道君居之東方朔十州記曰有光碧堂西王母所處也三九素語曰蘭臺宫亦柱玉女處之玉房宫皇帝之女處之十洲記曰滄浪海島山有積石至多石象八石腦石桂英也又曰紫石宫室九老仙都治處也又曰崑崙山一名崑崚山一名𤣥圃臺上有積石圃大活井西母宴㑹之所也又曰崑崙有瓊華室西王母處之又曰𤣥洲在北海亥地有大𤣥仙都伯真公治也又曰聚窟洲在西海中北接崑崙多仙真宫第有辟邪天鹿之獸洲上有樹與楓木相似而芳華聞數里又曰神仙島有紫石宫室九老仙都治處仙官數萬人又曰方丈在東海中三天司命所居處群仙徃來其上大洞真經曰太素三元山有中黄太一上帝之館又曰玉晨大道經君治蘂珠日闕又曰玊皇道君居青雲之城玉階文階又曰玉容堂者虛無真人之逸宅亦真氣之明堂又曰玉容堂者大上之明堂也得道符籍之所治又曰萬華宫在小有玉真之天小有先生之所治又絶空之宫在𤣥洲之北九真仙山帝司禁君㑹仙之處也又曰圓華宫黄老之所處又曰大霞之中太虛元君之所處又曰秀華山太極真人呼曰圓明丹室五靈員君處之又曰青精君登紫空之山化玉室之内又曰崑崙山有金丹流雲之堂上接璇璣之輪下在大室之中西王母所治真仙之女所處也又曰玉室青精君之所處又曰玉華三元君處流逸之室又曰太虛有大霞之室合九雲而立宇大虛元君之所處也又曰青華之室青童君乗玊䑣之軿御圓珠之氣而入山室又曰太老之室在上清八皇老君乗廣車而入又曰流剛山上有暉景之室西王母治所也金根經曰青要帝君丘在玉國黄金紫殿青要帝君所處又曰八闕天人散香其間闕上有臺九層上玉晨鎮君所進居也有金暉紫殿後聖金闕帝君所居䖏也上清經曰上清南極長生司命君藏瑶臺丹靈宫又在蘭庭雲臺又登絶空之中紫碧後𤣥臺又曰有紫㣲𤣥珠殿中央黄老君居之又曰協晨虛觀􅀢層之室太上大道君閑居處也又曰元始居紫雲之闕碧霞為城又曰有黄房之室一石玊容之堂貞晨道君治其中太貞科崇𤣥臺天師朝禮處又曰有紫仙天師教化處也南貞說曰西王母女媚蘭字申林滄浪山受書為雲林夫人又曰北辰中𤣥道君李慶賔女受書為東宫雲照文人治方丈臺第十三朱館中又曰閬野者閬風之府是崑崙山有九府也是為九宫太極為太宫諸仙皆是九宫之官僚耳至於貞人乃九宫之公卿也又曰太方諸宫青君常治處也其上人皆天真髙仙大極公卿諸司命所有處服日月芒法雖已得道為貞猶故服之霍山赤城亦為司命之府惟太元貞人南嶽夫人在焉李仲甫在西方韓衆在南方餘三十二司命皆當在東華東華青童為太司命緫統也楊君亦去東􅎮執事不知當在第㡬耳又曰句曲山漢三茅君治其上各乗一白鵠集於處所時人亦有見者山生黄金漢靈帝時詔勅郡縣採句曲之金以充武庫至孫權時又遣宿衛人採金常輸於官又曰方丈西北有隂城大山滄浪西南揚長大仙其山多貞仙之所處是陽九百六應數之摽揭也秀華山有玊堂乃五靈真君所處也又曰金華山上有五宫太一所處又曰洲之上有景暉之室西母之治所神洲七轉七變經曰西隴濛汜之濵紫㣲玉堂王母請誥靈素章之處也飛龍隠訣曰北極真公治於北極廣虛之室大洞雌一篇曰三元君在元虛之室元始序曰寒靈丹殿在上清太𤣥王都道君請真文之處又有玉寳之殿帝尊所處也王君内傳曰紫清太素三元道君之所治也洞𤣥經曰太極紫瑶之闕太極𤣥光真君所治之處自天地已來人生死簿籍在其中玊清書曰玉户瓊門九皇上帝在其中茅君内傳曰玉清天中有散華臺是四斗七晨道君之所治也列仙傳曰太空瓊臺太平道君處之上清八景飛經曰玉寳臺三元君所登處也三元真一經曰黄闕紫户𤣥精之室身中三一尊君常栖息之所神祝經曰太上𤣥堂天人所止本行經曰有三元洞室妙真人之所處也道學傳曰茅山燕宫洞女冠錢妙真登壇處也定志經曰天尊靜處𤣥都𤣥陽七寳紫㣲口太一洞真經曰有太極紫宫薇天帝寳神所處也玉清經曰玊清宫髙真玊皇出入處洞真記曰冝都崇臺正紫泥之海東方朔宴息之所也洞真經曰太老寢室堂八皇老君居處也三元玉撿經曰廣靈之堂大素三元君處之在上清天𤣥母八門經曰五通仙堂者五通帝君在其内又曰散花玉堂室三素元君在其内玊清隠書曰瓊琳堂上皇玊帝寢宴處也道學傳曰洞室中有太隂堂龍威丈人所見真人之所處也龜山元籙曰文龜洞室上元君坐之處也葛洪神仙傳曰金華山有室一所丹溪人黄初平之隠處也清虛真人王君内傳曰委羽山洞週廻萬里名曰大有空明天司馬季主在其中又曰西域玉山洞周囘三千里名大𤣥緫有天司命君之所處也名山記曰益州西南青城山一名青城郡山形似城其山有崖舍亦壁張天師所治處南連峨嵋山遥望惟見兩青領山如蚕蛾之眉赤有洞天諸靈書所藏不知當是第㡬洞天也又曰赤城丹山洞周三百里名曰上玊清平夫此山下同臺方二百里司命君之府也玉京經曰𤣥都玊京山有七寳城太上無極大道虛皇君之所治也髙仙之𤣥都焉太有經曰太極𤣥宫在元景之上太上君居之三元布經曰上清玊景宫佩三元布人在其中道迹經曰秀華玉堂五靈真之所處也又曰真堂元始天王太一髙聖君說觀身太戒之所昇𤣥經曰玉清臺仙聖逰衍之所又曰廣漢郡新都縣去城都一百五十里山有芝草神道前有池水中神魚五頭昔王方平於此與太上相見治應斗宿又曰越雋郡卭都縣有小山名濛治山其髙無踰伊尹於此學道上芝英金液草服之度世治應奎宿又曰雲臺山有桃一樹三年一花五年一實懸無底之谷為趙昇乃自鄭鄭取得桃子餘者無能取之治應胃宿又曰天柱山有女乗白鶴仙人乗白鹿在雲臺治前有兩碑又曰玊局治在成都南永壽元年正月七日太上乗白鹿張天師乗白鶴來至此坐局脚玊牀郎名玊局治應鬼宿又曰鍾山在北海子地隔弱水自生神草仙家種芝課計頃畝如稻狀亦有玊石泉上有九元丈人宫主領天下水神又曰扶桑在碧海中大帝宫大眞東王所治處也又曰􅅫萊上有九天真宫蓋大真仙人所居玊京仙山經曰方諸宫青童君治之大丹宫南極元君治之白山宫大素真君治之西城宫惣真王君治之大真科有無央宫髙上大真居之龜山元録曰金華宫西華玉女處之七星移度經曰帝君上登太極瓊臺上元經曰眉竺仙住南岳五符經曰皇人在峩嵋山北絶岩之下蒼玊為屋龜元籙曰紫閣西華玉女居之神祝曰九合之室太上在其内玊晨明鏡經曰有太𤣥玉晨金華之室二素元君處之真誥曰茅山西南有四平山俗呼為方山其下洞室名色曰方臺洞與華陽通號為别宇幽館得道者處之又曰方隅山下有洞室名曰方源館幽人居之又曰包山下有石室銀户方圓百里又曰有天市壇范丘林受口訣處又曰存方臺仙人蔡天生隠其内又曰清虛宫司馬季主隠處也又曰積石臺朱孺子居之又曰􅃦静之室涓子處之又曰􅅫萊仙公洛廣休治􅅫萊山又曰許玊斧居方山洞為上清仙公又曰羡門今在蒙山大洞黄金之庭受書之為中元仙鄉又曰廣溪郡綿竹縣東九里有山昔韓衆於上得仙有大石洞為誌誌治應箕宿上清經曰啟金宫玉寳九霄文人居之七映宫紫映五霄具玉居之清元寳宫髙上虛皇君處之金靈宫紫虛髙有上元黄道君居之朱靈宫上皇虛君居之洞雲官皇上帝君處之金輝宫紫皇君居靈應宫髙停君居之變化宫中玊皇先生居之玉寳宫紫精君居之飛𤣥宫𤣥一君居之𤣥上宫玉皇先生居之變𤣥宫大帝君居之金門宫皇上帝君居之陽名洞真君居之元景宫大素君䖏之紫瑶宫北極君居之納靈宫南朱君居之音光宫西華君居之靈金宫中元君居之紫微宫東明君居之鳯生宫髙上君居之朗範宫元辰君居之七瑤宫九元君居之欝森宫太明君居之雲森宫元靈君居之洞霄宫三元君居之返香宫元昭君居之長命宫太極元君居之髙虚宫紫元君居之飛𤣥宫上真老君居之瓊容宫洞景君居之耀瓊宫太陽君居之明真宫景元君居之紫曜宫司命君居之通妙宫天皇君居之金華宫黄房君居之天皇宫太一君居之閒妙清宫府九天丈人居之又有丹府三天玉童居之又有重真府玉堂九霄丈人居之鳯生府九霄真人居之金府靈皇君居之丹神府上皇元道君居之生真府玉虛君居之金魂府萬始先生居之務虚府皇帝君居之紫曜府紫皇君居之神變府中元君居之九合府玉皇先生居之又有􅀢層之室玉晨道君處之又有幃縁之室太元真人處之漢武内傳曰有紫桂宫太上丈人君處之太平御覽卷六百七十四
