  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_193-1a, image: WYG0894/WYG0894-0700c.png}
body:
  text: 太平御覽卷一百九十三宋李昉等撰居處部二十一城下郭壕櫓附城下郭壕櫓附丹陽記曰石頭城吳時悉土塢義熙始加塼石因山為城因江為池諸葛亮曰鍾山龍盤石城虎踞良有之矣又曰趙城去宫八里案越絶書則東甌越王所立也又曰江寧縣北三十里有白馬城吳時為􅇏火之所太康地記曰梁孝王築睢陽城十二里以鼓唱節杵而下和稱睢陽因以為縣又曰鴈門馬邑縣秦時建此城輒崩不成有馬周旋馳走反覆父老異之因以築城遂名馬邑云搜神記亦載也述征記曰思子城漢武帝延和二年衛太子遇江充之亂奔湖自縊壺闗三老太廟令田千秋訴太子之寃築思子宫於湖其城存焉續述征記曰廣固城右有大澗甚廣阻之為固謂之廣固又曰白馬城魏黄初中曹彪封白馬王治于此城又曰小陽城在陽城西南半里許俗謂曰堯城羊頭山記邯鄲城邯山名鄲盡也邯山至此而盡也又曰曲阜城城内有曲阜焉逶迤長八九里東方朔十洲記曰崑崙之山積金為天城四面千里闗中記曰長安城其形似北斗其土本皆黒壤今城赤如火堅如金父老所傳鑿龍首山以為城也幽明録曰始興縣有臯天子國因山﨑嶇十有餘里坑塹數重阡陌交通城内堂塞碎瓦穿柱猶存東有臯天子冢臯天子未之聞也劉直京口記曰有小昇城鄧徳明南康記曰歸羨山下有石城髙數丈有一門門外有二石夾左右髙數百尺逺望嵯峨雲闕騰空故老謂之神仙㳺焉郡國志曰兖州兩觀城即仲尼為魯司寇誅少正卯之處又曰陜州魏城即芮伯萬母惡芮伯逐之出居于魏處也後晉獻公滅之以賜畢萬山河之間土地廹隘故魏國著十畝之詩又曰雲中府快馬城有綾羅泉即塞上翁所居之邑有快馬亭塞上翁六國前人姓李也又曰雍州霸陵城在通化門東二十里秦襄王葬于其坂謂之霸上又曰汴之髙陵城即髙陽之墟也繁陽城漢云外黄縣有繁陽亭張氏為外黄令有夏后祠神井能興雨雹也又曰徐州薛城髙厚無比多出暴桀子弟盖孟嘗君餘風也又曰六壁府後魏太平真君五年討胡於六壁即此城俗以城為六面因以為名焉又有虢城魏城相傳云晉既滅虞虢遷其人於此築城以居之又曰幽州無終縣西平城即李廣射石虎之處又曰復州竟陵城雲夣城城西大澤即古雲夣澤也却月城在河口魏將黄祖所守處又曰媯州涿鹿城即黄帝擒蚩尤處黄帝泉今枯而不流即古之版泉也又曰凉州昌松縣有鸞鳥城魏改為神鳥城張軌時有五色鳥集於其處築城又曰衛州有狗城盖紂養狗之處也又曰洛州夫人城即趙武靈王夫人築也又曰衛州有酒城又曰凉州卧龍城又云鳥城亦名翅城又曰登州文登縣有不夜城有尚書城有石橋即秦始皇造欲觀日處文登山始皇召文士而登此山又曰齊有士鄉城鄭𤣥云齊有士鄉城越有君子城又曰同州韓城即韓原也詩所謂韓侯受命是也此即春秋時秦擒晉恵公處又曰肅州福禄城因謝艾所築也又曰廉州宋大始年陳伯紹平夷至合浦見三青牛圍之不獲即其處置城俗號青牛城又曰箕子城石勒每破一州必簡别衣冠號為君子城洎平幽州擢荀綽裴憲等還襄國路經此後俗訛為箕子城又曰平州孤竹城即孤竹國也漢靈帝時遼西守㢘翻夣人云吾孤竹君之子也今遼海漂吾棺明日見浮棺因葬之又曰雲中府齊柳牙舘城有道人城初築時有仙人㳺其地遂名城焉又曰成都城秦恵王二十七年張儀築以象咸陽沃野千里號曰陸海有萬嵗池即築城取土之處也又曰定州博陵縣唐城尭為唐侯國於此又曰陽翟縣舊屬汝州有雞鳴城又曰隋州博望城即張騫封侯之國也又曰許州雍城即黄帝臣雍父始作杵臼處又曰朔州太平城後魏穆帝治也太極殿琉璃臺瓦及鴟尾悉以琉璃為之又曰鄭州博浪城即張良為韓報仇擊秦王處又曰雍州杜城在安僊門南七里春秋范宣子云在周為唐杜氏即是此也又曰益陽城魯肅築也人云登之望見長沙城邑人馬形色宛然相去三百里父老云長沙益陽一時相望又廣州萬人城即尉佗故城也又曰張掖郡竇融築千秋城萬嵗城又曰洛陽澠池縣有秦趙二城號為俱利城又曰定州博陵縣樂羊城魏文侯使樂羊取中山造又曰重泉城漢武為李夫人築又曰藍田有青泥城亦曰柳城又曰賀州蕪城池隍中頗出珠玉寳噐即尉佗拒防之所也又曰曹州漆園城莊周為吏處又曰曹州白鴈城即衛侯伐鄭至鳴鴈是此也又曰洛州王城宫城西入苑故郟鄏城也周武王伐殷遷九鼎此地也夏至之影尺有五寸謂之土中焉泉亭即春秋時泉臯伊洛之戎同伐京師又曰坊州鄜城即髙奴城俗謂髙樓城又曰汴有浚城鄘詩云孑孑干旌在浚之城即謂此也又曰爰有寒泉在浚之下水冬夏常冷因曰寒泉又曰滑泉鹿鳴城城内有鹿鳴臺又曰陳官城周二十里東晉所築號曰六門城宣陽門損上作虎刻木相對又施雲楣藻井又言武門上作重樓號曰西辰觀吳初築在府宫南號太初宫正殿曰神龍殿又有臨海赤烏殿孫皓起顯明宫引水激之飾以珠玉有彎﨑臨硎之觀門及樓皆擊鼓持夜齊以鼓多驚眠改為鐵磬過秦論曰秦踐華以為城因河以為池越絶書曰石城者吳王闔閭所置美人離城也又曰樓門外馬寧溪止復城者故越王無余君所治也又曰樓門外鴻城者故越王城也去縣百五十里吳雞籠山外陂故吳王所畜雞使李保養之去縣二十里闔閭姑蘇臺外有九曲路闔閭造以逰姑蘇之臺去縣三十里又曰吳大城周四十七里二百十歩陸門二有樓水門八南十四里四十二歩西面七里一百十二歩北面八里二百六十歩東面一十里七十九歩闔閭所造也吳郭周六十八里六歩吳小城周一十二里其下廣二丈七尺髙四丈門三皆有樓東宫周一里二百歩路西宫長秋門周一里二百二十六歩秦始皇帝二十一年守營者昭鷰失火燒之吳越春秋曰鯀築城以衛君造郭以居人此城郭之始也又曰范蠡視天文法於紫宫築作小城周千一百二十三歩一圓三方西北立飛翼之樓以象天門東南服蒲石竇以象地名陵門四達以象八風外郭築城而缺西北示服事吳也不敢壅塞内以取吳故缺西北而吳不知也又曰伍子胥乃使相土嘗水象天法地造築天城周廻四十七里陸門八以象天之八風水門八以象地之八牕築小城一十里陸門三東面者欲以絶越明矣立闔門者以象天門通閶闔風立地門者以象地户也闔閭欲西破强楚楚在西北故立閶門以通天氣也因復名破楚門水經注曰葉東界有故城犨縣東至瀙水逕泚陽縣界南北蟬聮數百里號為方城一謂之長城云酈縣有故城一面未詳里數號為長城即此城之西隅其間相去六百里北面雖無基築皆連山相接而漢水流其南故屈完答齊桓公云楚方城以為城漢水以為池郡國志曰葉縣有長城曰方城指此城也吳地記曰袁山松城晉書曰左將軍袁山松陳郡人時為吳郡太守隆安五年築此城在滬瀆邉以禦孫恩者孫恩圍山松於此城䧟害山松城今為波潮所衝已半毁江中山松城東夾江又有二城相對闔閭所築以備越處鄱陽記曰僊人城在縣東南其城皆峭壁危石直立千仞自古呼為僊人城每天空無雲秋日清澈其上宫殿倉廩厯厯可見趙曄吳越春秋曰堯聽四嶽之言用鯀修水鯀曰帝之遭天灾厥黎及康乃築城造郭以為國固淮南子曰崑崙山上有層城九重列女傳曰齊人杞梁襲莒戰而死其妻無所歸乃就夫尸於城下而哭之七日城崩妻遂投淄水而死郭說文曰郭廓也廓落在城也禮記月令曰孟秋之月修宫室補城郭又禮記曰正月無置城郭妨農也國語曰火見清風戒寒清風至而修城郭宫室月令曰孟冬坏城郭漢書曰馬援所過為郡縣治城郭謝承後漢書曰汝南廖扶畢志衡門死葬北郭號曰北郭先生風俗通曰郭郛也亦大也荘子曰孔子謂顔回曰回來家貧居卑胡不仕乎顔回對曰不願仕回有郭外之田五十畝足以給饘粥郭内之田十畝足以為桑麻鼓琴足以自娛學夫子之道足以自樂回故不仕矣魏畧曰秦國石為城郭管子曰内謂之城外謂之郭焦貢易林曰金城鐵郭上下同力寇不敢賊王肅表曰夫城之有郭猶裏之有表骨之有皮表裏各異則保障不完皮骨分離則一體不具壕釋名曰城下謂之壕壕翺也言都邑内所翺翔也祖駕處也禮記曰今大道既隐天下為家各親其親各子其子貨力為已城郭溝池以為固謀用是作兵由是起漢書神農之教曰有石城十仞湯池百歩帶甲百萬而無粟不能守櫓釋名曰櫓露也露上無覆屋也孫子兵法曰攻城之法修櫓枌榅其噐械三月而後成陸機洛陽記曰洛陽城周公所制東西十里南北十三里城上百歩有一樓櫓外有溝渠太平御覽卷一百九十三
