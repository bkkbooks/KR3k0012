body:
  text: 太平御覽卷一百二十七宋李昉等撰偏覇部十一西秦乞伏國仁乞伏乾歸乞伏熾磐乞伏慕末北燕馮䟦馮文通夏赫連勃勃赫連昌赫連定西秦乞伏國仁崔鴻十六國春秋西秦録曰乞伏國仁隴西鮮卑人其先自漠北南出大隂山五世祖祐鄰者晉太始初率户五萬遷居髙平川祐鄰卒子結權立遷于牽屯結權卒子利那立利那卒弟祁埿立祁埿卒利那子述延立遷于苑川述延卒祁埿子傉太寒立石勒之滅劉曜也懼而遷于麥田旡孤山太寒卒子司繁立秦始皇中遷于度堅山建元七年秦将王統來伐司繁率騎三萬拒統于苑川統潜襲度堅山部民五萬餘落悉降于統司繁乃詣統歸降苻堅拜南單于㽞之長安後以為鎮西将軍鎮勇士川甚有威惠之稱司繁卒國仁代鎮聞堅征晉奔敗國仁收衆至十餘萬又聞堅為姚萇所殺于是自稱大都督大将軍大單于領秦河二州牧改秦建元二十一年為建義元年置武陽苑川等十二郡築勇士都城以居之三年苻登遣使拜國仁大将軍苑川王四年六月薨偽諡曰烈王廟號烈祖乞伏乾歸崔鴻十六國春秋西秦録曰乞伏乾歸國仁弟雄武有度畧國仁薨羣僚以國仁子公府㓜稚乃立乾歸為将軍大單于河南王大赦改四年為太初元年立邉氏為后以南川侯出連乙都為丞相九月遷于金城二年正月苻登遣使拜為大将軍金城王六年立子熾磐為太子七年登遣使授左丞相河南王假黄鉞加九錫之禮十月氐王楊定步騎四萬來伐乾歸勒衆而進大敗定軍斬定及首級萬有七千于是盡有隴西之地十二月僣稱秦王大赦八年呂光來伐歸乃稱藩遣子勃勃為質既而悔之十三年秦征西大将軍姚碩德率衆來伐入自南安峽乾歸次隴西以拒碩德興潜師繼發乾歸聞兵将至率輕騎數千候興俄與中軍相失為興追騎所逼戰敗遁歸苑川乃率騎數百馳至允吾秃髪利鹿孤逆歸之于晉興乾歸将叛謀泄懼為利鹿孤所害謂其子熾磐曰姚興将盛吾将歸之今送汝兄弟及汝母為質于是送熾磐兄弟于西平乾歸遂奔長安姚興大悦拜持節都督河南諸軍事河州刺史歸義侯十四年遣乾歸還鎮苑川盡以部民配之十八年正月乾歸至長安十九年正月苑川地震裂五月又朝長安二十年姚興慮乾歸終為西州之患留拜主客尚書以其子熾磐為西夷校尉行河州刺史二十一年熾磐以長安亂将始乃招結諸部築城于嵻琅山以據之更始元年乾歸隨姚興如平流熾磐攻抱罕尅之遂遣使來告乾歸乾歸奔還苑川遂如抱罕留熾磐鎮之乾歸将衆二萬遷于度堅山諸将勸稱王七月僣稱秦王大赦改年置百官公卿以下皆復本位四年五月乾歸畋于五谿山有梟集于其手乾歸惡之六月為兄子公府所殺公府出奔熾磐遷于抱罕遣弟廣武将軍智達追擒公府于嵻㟍山南轘裂之八月葬乾歸于抱罕平陵偽諡武元王廟號髙祖乞伏熾磐崔鴻十六國春秋西秦録曰乞伏熾磐乾歸長子乾歸薨自稱大将軍河南王改元為永康元年以尚書令翟勒為相國封拜各有差二年熾磐討吐谷渾别統支旁於長柳川掘達于渴渾川大破之俘獲男女二萬三千五年正月有五色雲起于南山熾磐悦謂羣臣曰吾今年應有所定王業成矣于是繕甲整兵以伺四方之隙五月聞傉檀西征率步騎二萬襲樂都傉檀降遂幷南凉兵强地廣十月僣即秦王位置百官立妻秃髪氏為王后四年熾磐子元基自長安逃歸拜尚書左僕射建𢎞元年立第二子慕末為太子領撫軍大将軍都督諸軍事改元大赦熾磐寝疾顧命太子慕末乃薨于外寝六月葬武平陵諡文昭王廟號太祖乞伏慕末崔鴻十六國春秋西秦録曰乞伏慕末字安石熾磐之第二子㓜而好學有文才建宏元年立為太子熾磐薨僭即秦王位大赦改年為承𢎞元年二月立萬載為太子三年九月部民多叛慕末焚城邑毁寶器率户五千東徙乃為赫連定所拒遂圍安南十一月魏遣尚書厙結率騎五千迎慕末衛軍吉毗固諫以為不宜内徙遂從之厙結引還四年赫連定遣其叔北平公韋代率衆一萬攻南安城内大飢至人相食侍中乞伏延祚吏部尚書乞伏䟦踰城奔竄末乃銜璧出降送于上邽及宗族五百餘人悉為赫連所誅自國仁建義元年乙酉歳至辛未四十七年晉書曰熾磐在位七年而宋氏受禪以宋元嘉四年死子慕末嗣在位三年為赫連定所殺始國仁以孝武太元十年僣位至慕末四世凡四十有六載而滅北燕馮䟦崔鴻十六國春秋北燕録曰馮䟦字文起長樂信都人其先畢萬之後也子孫食采馮鄉因以氏焉晉永嘉之亂祖父和避地上黨父安雄武有器量為慕容永將永滅䟦東徙和龍家於長谷䟦夜夢天門開神光赫然燭于庭中永康末拜中衛将軍建始元年與二弟結謀襲殺慕容熈立髙雲為主正始元年以䟦為中外都督開府儀同三司録尚書事封武邑公太平元年雲為其幸臣離班桃仁所殺帳下督張泰李桑誅班及仁羣臣推䟦為主僣即天王位大赦令曰義貴適時不必改作故陳氏代姜不徙齊號即號燕國改為太平元年追尊祖和為元皇帝父安為宣帝子永為太子三年七月以太子永領大單于内置四輔七年建太學以長樂劉軒營丘張熾成周翟崇為博士簡二千石已下子弟年十五以上教之十四年宿軍地燃一旬乃滅十七年二月北部人趙夀女既嫁化為男娶妻而無子䟦問諸羣臣曰此何祥尚書左承傅權對曰漢世雌雞為雄隂變為陽君替臣僣之象卒有婦人專寵王莾簒今女為男臣将無君之徵䟦曰将何以禳之權曰桑糓生朝太戊脩德而殷道中興熒惑守心宋景責躬延齡二紀唯脩身崇善可以轉禍為福十八年八月立子翼為太子䟦戒之曰吾聞君人以學為本不學無以立尊敬師傅乃人倫之始汝其夙夜乾乾欽承明訓二十二年八月䟦寝疾召中書監申秀侍中楊哲于内寝謂之曰吾患當不濟卿等善相吾子參决萬機九月䟦疾甚輦而臨軒命太子翼勒兵聴政以偹非常宋夫人規立其子受惡翼聴政謂之曰上疾将瘳柰何便欲代父臨天下乎翼性仁弱遂還東宫一日三省疾宋夫人矯絶内外遣閽寺傳問而已翼及大臣皆不得見䟦弟𢎞于是舉壮士數十人衷甲入禁中宿衛皆不戰而散宋夫人命閉東閣𢎞家僮厙斗頭徑捷有勇力踰閣而入至于黄堂射殺女御一人䟦驚懼而薨𢎞遣使諭告曰天降凶禍大行崩背太子不侍疾羣公不奔喪疑有逆謀圖危社稷吾偹太弟之親遂攝大位以寧國家百官叩門入者進階二等太子翼率東宫兵出戰敗退兵皆奔散𢎞遣使搏死命宗正馮哲黄門盧昭典葬事于東宫葬䟦于長谷陵偽諡文成皇帝廟號太祖馮文通崔鴻十六國春秋北燕録曰馮𢎞字文通䟦之季弟高雲簒位拜中領軍封汲郡公太平元年拜尚書右僕射改封中山公遷尚書令司徒録尚書嗣跋即天王位大興元年正月壬午朔大赦改年二月立夫人慕容氏為皇后二年正月立少子王仁為太子六月有鼠集城西盈數里地中西行至水前銜馬尾後者迭相銜尾而渡識者以為民遷之象七月魏師來伐神高八月石城邊東營丘成周四郡並降魏九月魏師引還徙民四萬餘户而西三年六月魏永昌王來伐五年四月遣右衛孫德乞師于宋十二月又遣尚書陽伊請迎于句麗六年三月端門崩四月魏又遣侍中建興公虞弼東平公鵝青來伐尅白狼句麗将葛居孟光率衆數萬隨陽伊來迎屯于臨川尚書令郭生因民之憚遷開門而引魏軍魏軍疑而不赴生遂勒衆攻𢎞𢎞引句麗兵入自東門與生戰于闕下生中流矢卒句麗軍既入城取武庫甲以給其衆城内美女皆句麗軍人所掠五月乙卯𢎞率龍城見户東徙焚燒宫殿火一旬不絶令婦人被甲居中陽伊等勒精兵于外葛光率騎後殿方軌而進前後八十餘里魏軍追至遼水不擊而還遣使徵𢎞于句麗後二年為句麗所殺偽諡昭成皇帝自馮䟦太平元年歳在乙酉至𢎞滅亡之歳丙子二十八載夏赫連勃勃崔鴻十六國春秋夏録曰赫連勃勃朔方人匈奴右賢王去卑之後劉元海之族也曽祖父武前趙嘉平中以宗室封樓煩公拜征北将軍丁零中郎将祖豹子後趙建武中拜平北将軍左賢王父衛辰苻堅以為西單于督攝河西諸虜屯于代來城因秦末兵亂遂有朔方之地控弦之士三萬八千姚萇拜辰大将軍河西王大單于魏師來伐辰遣子力俟提率騎二萬拒戰河東為魏所敗遂乘勝濟河攻尅代來執辰殺之勃勃辰第三子奔秦髙平公没弈干弈干妻之以女姚興以勃勃為持節安北将軍五原公配以三交五部鮮卑及雜虜二萬餘落鎮朔方時河西鮮卑杜崘獻馬八千匹于秦濟河至大城勃勃留之召其衆二萬襲殺高平公没弈干而并其衆衆至數萬自稱天王大單于大赦改𢎞始十年為龍昇元年置百官以匈奴夏后氏之苗裔僣稱大夏以大兄右地伐為丞相代公發嶺北民夷十萬于朔方黒渠之南營起京城大赦改龍昇七年為鳯翔元年令曰朕之皇祖北遷幽朔改姓姒氏後從母為劉氏從母姓非禮也古之氏族無常王者繫天為子是為徽赫實與天連今改姓曰赫連氏庶協皇天之意支庶非正綂者以鐵伐為氏庶朕宗族子孫剛鋭如鐵皆堪伐人二年立夫人梁氏為后立子璝為太子四年九月劉裕滅秦入于長安十二月裕留子義真鎮長安而還勃大悦遂圖進取之計遣太子璝率騎二萬南伐長安五年義真遣龍驤将軍沈田子率衆逆戰璝擊敗之退屯列廽堡八月勃勃進據咸陽劉裕大懼乃召義真東鎮洛陽勃勃入長安正月羣臣勸勃勃稱皇帝三月築壇于灞上即皇帝位大赦改鳯翔六年為昌武元年冬十月太子璝領大将軍雍州牧録南臺尚書事鎮長安十一月勃勃還綂萬綂萬勃勃所都之城名也宫殿大成大赦改昌武二年為真興元年刻石都南頌紀功德四月追尊父衛辰曰桓皇帝廟號太祖母苻氏為皇太后祖豹子曰宣皇帝曽祖武曰景皇帝髙祖訓兒曰元皇帝五月雨魚于綂萬二年十月起冲天臺于綂萬南山欲登之以望長安六年勃勃将廢太子璝為秦王以酒泉公倫為太子璝聞将廢已率衆七萬北伐倫倫率騎三萬拒之既戰倫為璝所敗倫死之太原公昌率騎一萬襲殺璝率衆八萬五千歸于綂萬勃大悦立昌為太子七月勃勃寝疾甚輦升永安殿召羣臣囑以後事薨于永安殿年四十五諡武烈皇帝葬嘉平陵廟號世祖赫連昌崔鴻十六國春秋夏録曰赫連昌一名折勃勃之第三子身長八尺魁岸美姿貌勃勃薨即位于永安臺大赦改真興七年為永光元年七月杏城劉暏川有青石大如馬頭浮在水上逆流而行人見而送之十月魏乘虛來伐三年五月戰于黒渠為魏所敗昌與數千騎奔還魏追騎亦至昌留河内公費連烏提守高平徙諸城民七萬户于安定以都之四年二月魏軍至安定三月城潰昌奔秦州魏東平公鵞青追擒之送于魏魏封昌秦王尚始平公主為魏所殺赫連定崔鴻十六國春秋夏録曰赫連定勃勃第五子鳳翔二年封平原公雍州牧鎮長安率衆赴安定封平原王大将軍領司徒昌為魏所擒定遂率遺衆數萬據平原僣稱皇帝大赦改承光四年為勝光元年進征南大将軍白蘭王吐谷渾莫璝為開府儀同三司河南王十月畋于隂磐登苛藍山而望統萬城泣曰先帝以朕承大業者豈有今日乎使天假朕年當與諸卿建王季之業俄而有狐羣百數鳴于定傍令射之無所獲定惡之曰此大不善咄咄天道復何言三年二月魏軍來襲十月尅安定進攻平原十一月定遂掠民五萬户西奔上邽四年河南王莫璝因戎狄之衆東面以爭天下魏遣益州刺史没利延寧州刺史拾虎率騎三萬來伐遂擒定送于魏勃勃初號龍昇元年歳在丁未至是歳在辛未二十五年也太平御覽卷一百二十七
