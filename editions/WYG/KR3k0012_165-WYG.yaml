body:
  text: 太平御覽卷一百六十五宋李昉等撰州郡部十一隴右道秦州渭州蘭州㑹州河州洮州岷州廓州疊州蔀州凉州甘州肅州𤓰州沙州伊州西州庭州秦州十道志曰秦州天水郡禹貢雍州之域古西戎地秦始封之邑秦為隴西郡漢武置天水郡史記秦本紀曰周孝王時非子好馬及善畜養孝王分土邑之秦使續嬴氏漢志曰天水郡莽曰填戎明帝改曰漢陽秦州地記曰郡前有湖水冬夏無増減漢志曰上邽屬隴西郡故邽戎邑也又曰成紀清水並屬天水郡清水莽曰識睦漢志曰略陽道屬天水郡十二州志曰略陽即故冀城也又曰街泉戎邑道屬天水郡續漢書地理志有街泉亭渭州十道志曰渭州隴西郡春秋及戰國時羌戎所居秦昭王伐義渠戎王始置隴西郡禹貢曰導渭自鳥鼠同穴又曰終南敦物至于鳥鼠漢志䝠道戎邑也屬天水郡即今隴西縣䝠音完地理志曰漢陽有大坂名隴坻亦曰隴山郡處其西故曰隴西其山堆旁崩聲聞數百里揚雄所謂響若坻頽是也蘭州十道志曰蘭州金城郡禹貢雍州之域古西戎地秦併天下為隴西郡後漢書西羌傳羌無弋爰劒曽孫忍留湟中忍子研立研至豪健故羌中號為研種秦始皇時務併六國兵不西行故羌人得蕃息及秦併天下築長城以界之衆羌不復南渡漢興匈奴冒頓兵强臣服諸羌景帝時研種留何率種人求守隴西於是徙留何於狄道漢志曰狄道屬隴西郡以其地有狄種故云狄道又曰浩亹水出西塞外東至允吾入湟水詩大雅曰鳬鷖在亹亦其義也蘭州有浩亹故城浩亹音合門漢志曰金城郡領縣十三應劭曰初築城得金故曰金城瓚曰稱金取堅固也故墨子曰金城湯池會州十道志曰會州會寧郡禹貢雍州之域古西羌地秦併天下屬隴西郡漢屬金城郡唐武徳二年平李軌置西令貞觀八年改為會州元和郡縣志曰後周太祖為西魏相來秦會師於此因置州為名唐貞觀亦為粟州河州十道志曰河州安鄉郡禹貢雍州之域古西羌地秦併天下為隴西郡漢分置天水郡漢志曰枹罕屬金城郡故罕羌侯邑也枹音鈇字從木禹貢曰導河積石至於龍門積石山在金城西南西域傳曰河注蒲昌海潜行地下南出於積石山洮州十道志曰洮州臨洮郡禹貢雍州之域秦漢諸羌之地漢志曰洮水出西羌中北至枹罕東入西傾岷州十道志曰岷州和政郡禹貢雍州之域六國時屬秦秦併天下為隴西之臨洮縣史記曰蒙恬築長城起臨洮廓州十道志曰廓州寧塞郡禹貢雍州之域古西羌地漢書曰宣帝時諸羌數背叛後將軍趙充國屯隴西覉縻之諸羌不敢動後漢書段熲傳曰延熹中燒當燒河當煎勒姐等八種羌㓂隴西金城熲進討大破之明年燒河大豪㓂張掖熲斬燒河首虜五千餘人西羌於是弭定疊州十道志曰疊州合川郡禹貢梁州之域厯秦漢魏晉為諸羌所據後周書曰建徳六年西逐諸戎始綂有其地因置恒香郡後尋為疊州盖以其地多山重疊以名郡也又於三交口築城置甘松防又為三川縣以𨽻恒香郡至建徳九年改三川縣為常芬縣仍立芳州以邑𨽻焉取其地多芳草為郡之名蔀州十道志曰蔀州西平郡禹貢雍州之域古西戎之地漢志曰允吾屬金城郡今龍支縣即其地凉州十道志曰凉州武威郡禹貢雍州之域自六國至秦戎狄居焉漢初匈奴右地釋名曰西方寒凍或云河西土田薄故曰凉晉書曰姑臧城匈奴新築舊盖臧城語訛後云姑臧又曰惠帝末張軌求為凉州於是大城此地為一會府以據之號前凉後吕光據之號後凉禹貢曰原隰底績至于瀦野織皮崑崙折支渠搜西戎即叙續漢書曰西羌自賜支以西至河首左右居今河闗西可十餘里有河曲羌謂之賜支異物志曰古渠捜國當大宛北界瀦野今姑臧界瀦野是劉􅷶燉煌實錄曰晉安帝隆安元年凉州牧李暠㣲服出城逢虎道邊虎化為人遥呼暠為西凉君暠因彎弧待之又遥遥呼暠曰有事告汝無疑也暠知其異投弓於地人乃前曰燉煌空虛不是福地君之子孫王於西凉不如從酒泉言訖乃失暠乃移都酒泉續漢書曰安帝時匈奴冦常山於是西北有争民饑民用不足大將軍鄧隲欲棄凉州專務北邊曰譬若家人衣壊敗一以相補猶有所完若不如此將两無所保郎中虞詡曰大將軍之䇿不可者三先帝闢境而今棄之不可一也棄凉州郡即以三輔為塞園陵單外不可二也諺曰闗西出將闗東出相烈士武臣多出凉州風土壮猛便習兵事今羌所以不過三輔為腹心害者以凉州在其後也甘州十道志曰甘州張掖郡禹貢雍州之域自六國至秦戎狄居焉漢為匈奴右地尚書禹貢曰道弱水至于合黎十道志曰今張掖有合黎水漢志西域傳曰月支本居敦煌祁連間霍去病傳曰濟居延遂臻小月支攻祁連即此道也漢志曰張掖郡匈奴昆邪王地武帝時開之莽曰設屏應劭曰張國臂掖故曰張掖也又曰觻得屬張掖郡有千金渠西至樂涫入澤中莽曰官式涫音官觻音鹿又曰刪丹屬張莽曰貫虜肅州十道志曰肅州酒泉郡禹貢雍州之域古西戎地月支所居漢為武威酒泉郡也漢書曰武帝元狩二年昆邪王殺休屠王將其衆來降以其地為武威酒泉郡又匈奴傳曰漢置酒泉郡以隔絶胡與羌通之路又西通月支大夏以公主妻烏孫王以分匈奴西方之援國其水甘若酒故名酒泉後漢書曰班超乆在西域年老思土上書曰臣不敢望到酒泉郡但願生入玉門闗玉門屬敦煌今州地也去長安三千六百里酒泉今肅州也去長安二千八百里𤓰州十道志曰𤓰州晉昌郡禹貢雍州之域古西戎地戰國時烏孫月支居焉漢初為匈奴右地後為武威酒泉二郡漢志曰冥安屬敦煌郡冥水出焉又名籍端水出羌中入澤㝠安即晉昌地又曰廣至宜禾都尉治崑崙障莽曰廣桓即常樂地有宜禾故城沙州十道志曰沙州敦煌郡禹貢雍州之域古西戎地秦屬西戎漢置敦煌郡左傳范宣子數戎子駒曰昔秦人追逐乃祖吾離於𤓰州蒙犯荆棘以來歸我先君惠公有不腆之田與汝剖分而食之𤓰州地屬燉煌漢書曰武帝元鼎六年詔分酒泉置敦煌郡徙民以實之應劭曰敦大也煌盛也又西域傳曰東則接漢阸以玉門陽闗孟康曰陽闗在敦煌西界也今夀昌有陽闗及玉門故闗伊州十道志曰伊州伊吾郡本伊吾盧地在敦煌之北大磧之外南去玉門八百里後漢書曰永平十六年明帝命將北征取伊吾盧地置宜禾都尉以屯田又西羌傳曰伊吾地宜五穀桑麻葡萄其北有栁中皆膏腴之地故漢常與匈奴争車師伊吾之地以制西戎西州十道志曰西州交郡漢書西域傳曰車師後王國有新道通玉門闗戊巳校尉徐普欲開以省道里半避白龍堆之阸車師後王姑句以道當為拄置即馳突出髙昌壁入匈奴後魏書曰以其地勢髙峻人物昌盛因名髙昌庭州十道志曰庭州雍州之外流沙之西北前漢烏孫舊地東與匈奴接厯代為羣胡所居後漢西域傳曰貳師伐西域諸國震懼自敦煌西至鹽澤往往起亭而輪臺渠犂皆有田卒後漢書曰班超將兵擊伊吾於蒲類海太平御覽卷一百六十五
