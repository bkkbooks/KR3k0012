  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_443-1a, image: WYG0897/WYG0897-0082a.png}
body:
  text: 太平御覽卷四百四十三宋李昉等撰人事部八十四知人中晉書曰裴頠字逸民𢎞雅有逺識博學稽古少知名御史中丞周弼見而歎曰頠若武庫五兵縱横一時之傑也又曰荀朂父盼早亡朂依於舅氏岐嶷夙成十餘嵗能属文從外祖魏太𫝊鍾繇曰此兒當及其曽祖既長遂􅀶學逹於從政又曰郭奕時亭長李含有俊才而門寒為豪族所排奕用為别駕含後果有名位時以奕為知人又曰賀循少玩篇籍善属文博覽衆書尤精禮𫝊雅有知人之鑒㧞同郡楊方于卑陋卒成名於世又曰應詹鎮南大将軍劉𢎞詹之祖舅也請為長史謂之曰君器識𢎞深後當代老子于荆南矣乃委以軍政又曰楊方字公回少好學有異才初為郡鈐下威儀公事之暇輒讀五經鄉邑未知之内史諸葛恢見而竒之待以門人之禮由是始得周旋貴人間又曰郭奕字大業太原陽曲人也少有重名山濤稱其髙簡有雅量為野王令羊祜嘗過之奕嘆曰羊叔子何必减郭大業少選復又歎曰羊叔子去人逺矣遂送祜出界數百里又曰李憙薦樂安孫璞亦以道徳顯時人稱為知人又曰唐彬初受學於東海閬徳徳門徒甚多獨目彬有廊廟才及彬官成而徳已卒乃為之立碑又曰韋忠年十二䘮父哀慕毁悴杖而後起司空裴秀弔之匍匐號訴哀慟感人秀出而告人曰此子長大必為佳器歸而命子頠造焉又曰沛國戴晞少有才智與嵇紹從子含相友善時人許以逺致紹以為必不成器晞後為司州主簿以無行被斥州黨稱有知人之明又曰鄭袤字林叔滎陽開封人也髙祖衆漢太司農父㤗揚州刺史有髙名袤少孤早有識鑒荀攸見之曰鄭公業為不亡矣又曰王戎傳云阮籍與渾為友戎年十五隨渾在郎舍戎少籍二十嵗而籍與之交籍毎適渾俄頃去過戎良乆然後出謂渾曰濬冲清貴非卿倫也共卿言不如共阿戎譚又曰樂廣字彦輔父方叅魏征西将軍夏侯𤣥軍事廣時年八嵗𤣥嘗見廣在路因呼與語還謂方曰向見廣神姿朗徹當為名士卿家雖貧可令專學必能興卿門戸也又曰曹攄字彦逺譙國人也祖肇魏将軍攄少有孝行好學善属文太尉王衍見而器之調補臨淄令又曰潘京舉秀才到洛尚書令樂廣凉州人也共談累日深歎其才謂京曰君天才過人恨不學耳若學必為一代談宗京感其言遂勤學不倦又曰王澄傳云王衍有重名於世時人許以人倫之鑒尤重澄及王敦庾凱常為天下士目曰阿平第一子嵩第二處仲第三王澄嘗謂衍曰兄形似道人而神峯太雋衍曰誠不如卿落落穆穆然澄由是顯名又曰戴若思往武陵省父時同郡人潘京素有理鑒名知人其父遣若思就京與語既而稱若思有公輔之才又曰周顗傳曰同郡賁嵩有清操見顗歎曰汝潁固多竒士頃雅道陵遲今復見周伯仁将振起舊風清我邦族矣又曰劉隗伯父納字合言有人倫鑒識初入洛見諸名士而歎曰王夷甫大鮮明樂彦輔我所敬張茂先我所不觧周𢎞武巧於用短杜方叔拙於用長又曰周浚有人倫鑒識其鄉人史曜素㣲賤衆所未知浚獨引之為友遂以妹妻之曜竟有名於世又曰元修傳云王衍當時談宗自以論易畧盡然有所未了研之終莫悟每云不知此後當見能通之者不衍族子敦謂衍曰阮宣子可與言衍曰吾亦聞之但未知其亹亹之處定何如耳及與循談言寡而㫖暢衍乃歎服焉又曰桓􅉓字茂倫庾亮每属彛覔一佳吏部及至都謂亮曰為卿得一吏部矣亮問安在彛曰人所應有而不必有人所應無而不必無徐寕眞海岱清士因為叙之即遷吏部郎又曰謝𤣥時符堅盛邉境數被侵尅朝廷求文武良将可以鎮禦北方者安乃以𤣥應舉中書郎郄超素與𤣥不善聞而歎曰安違衆舉親然𤣥亦必不負舉時咸以為不然超曰吾嘗與𤣥共在桓公府見其使才雖履屐間亦得其任所以知之晋中興書何充字次道年在童齒伯父􅃉謂之曰我為兒時亡伯車騎謂我汝後當與伯父争名汝今器宇宏深亦當名出我右由是少有名望又曰吳隠之字處黙少有孝行遭母憂哀毁過禮時與太常韓康伯隣居伯母語伯曰汝後若居銓衡之職當用如此軰人及伯為吏部尚書因進用之遂厯清顯又曰范汪字𤣥平少失父年六嵗過江依外家庾氏荆州刺史王澄見而竒之以為興范族者必是人也又曰魏徐州刺史吕䖍有佩刀工相之以為必三公可服此刀䖍謂别駕王祥曰苟非其人刀或為害卿有公輔之量故以相與祥始辭之固強乃受祥死之日以刀授弟覧曰吾死矣汝後必興足稱此故以相與又曰王珣字元琳弱冠與謝𤣥俱辟大司馬桓公掾温語人曰謝掾年三十必擁旄仗節王掾當作黒頭公皆不易才也又曰薛謙與同郡紀瞻廣陵閔鴻吳郡顧榮會稽賀循同志友善號曰五雋初入洛司空張華見而歎曰皆南金也又曰陸華童齕中從兄機稱之為陸氏之寳我家不世之才也又曰禇季野翼從弟弱冠譙國橋彛見而異之曰禇季野有皮裏春秋又曰王敦為太子舍人滎陽潘滔為洗馬見而目之曰處仲蜂目已露但豺聲未振若不噬人亦當為人所噬沈約宋書曰桓𤣥聞義軍起便憂悴無復計或曰劉裕等衆力㣲弱豈便有成陛下何慮之甚𤣥曰劉裕足為一世之雄劉毅家無儋石之儲樗蒲一擲百萬何無忌劉牢之甥酷似其舅共舉大事何慮無成宋書曰謝𢎞㣲童㓜時精神端審時然後言叔父混嘗異之曰此兒深𠂻夙敏方成佳器有子如此足矣又曰謝𢎞㣲叔父混尚晋陵公主髙祖受命晋陵公主降東鄉君以混得罪前代東鄉君節義可嘉聴還謝氏自混亡至是數載而室宇修整倉廪充盈門徒業使不異平日田疇墾闢有加於舊東鄉君歎曰僕射平生重此子可謂知人僕射為不亡矣又曰袁淑字陽源陳郡陽夏人丹陽尹豹少子也少有風格年數嵗伯湛謂家人此非凡児齊書曰随郡王子􅂭能属文明帝謂儉曰我家東阿也儉曰東阿重出實為皇家藩屏又曰徐孝嗣姑適東莞劉舍舍兄藏為尚書左丞孝嗣往詣之藏退語舍曰徐即是令僕人三十餘可知矣汝冝善自結又曰江斆為丹陽丞時袁粲為尹見斆嘆曰風流不墜正在江郎數與宴賞流連日夜蕭子顯齊書曰禇淵字彦囬河南陽翟人也父卒悉推財與弟唯取書數千卷初與從弟炤同載道遇太祖淵舉手指太祖車謂炤曰此非常人将來不可測梁書曰沈瑀起家州從事奉朝請嘗詣齊尚書右丞殷濔濔與語及政事甚器之謂曰觀卿才幹當居我此職又曰范述曽字子𤣥吳郡錢塘人也好學從餘杭吕道惠受五經略通章句道惠學徒常有百數獨稱述曽曰此子必為王者師又曰賀琛字國寳㑹稽山隂人也伯父瑒歩兵校尉為世碩儒琛㓜瑒授其經業一聞便通義理瑒異之常曰此兒當以明經致貴又曰臧質㓜從徴士瑯琊諸葛璩受五經通章句璩學徒常有數十百人質處其間無所狎比璩異之歎曰此生重器王佐才也又曰賀瑒時沛國劉瓛為㑹稽府丞見瑒深器異之嘗與俱造吳郡張融指瑒謂融曰此生神明聰敏将來當為儒者宗又曰丘仲孚字公信吳興烏程人也少好學從祖靈鞠有人倫之鑒嘗稱為千里駒陳書曰杜之偉強識俊材頗有名當世吏部尚書張瓉深知之以為廊廟器又曰陸慶永陽王為吳郡太守聞其名欲與相見慶固辭以疾時宗人陸榮為郡五官慶嘗詣焉王乃㣲服過榮舍穿壁以觀之王謂榮曰觀陸慶風神凝峻殆不可測嚴君平鄭子真何以尚兹北史曰于謹南伐江陵以唐瑾為元帥府長史及軍還諸将多因擄掠大獲財物瑾一無所取唯得書兩車載之以歸或言於周文曰唐瑾大有輜重悉是梁朝珍玩周文初不之信然欲明其實宻遣使檢閲唯見墳籍而已乃歎曰孤知此人來二十許年矣必不以利汚義向若不令檢視恐常人有投杼之疑孤所以益明之耳凡受人委任當如此也隋書曰魏任城王楷薦李徳林因遺尚書令楊遵彦書云燕趙固多竒士此言誠不為謬今嵗所貢秀才李德林者文章學識固不待言觀其風神器宇終為棟梁之用至如經國大體是賈生晁錯之儔雕蟲小技殆相如子雲之軰今雖唐虞君世俊乂盈朝然修大厦豈厭夫良材之積也吾嘗見孔文舉薦禰衡表云洪水横流帝思俾乂以正平比夫大禹常謂擬諭非倫今以徳林言之便覺前言非大又曰楊素少落拓有大志不拘小節世人多未之知唯從叔祖魏尚書僕射寛深異之每謂子孫曰處道當逸羣絶倫非常之器非汝曹所逮也又曰柳荘少有逺量愽覧墳集兼善辭令濟陽蔡大寳有重名於江左時為岳陽王蕭詧諮議見荘便歎曰襄陽水鏡在於兹矣大寳遂以女妻之又曰髙構河東薛道衡材髙大當世每稱構有清鍳所為文筆必先以草呈構有所詆訶道衡未嘗不嗟伏大業七年終于家時年七十二所舉杜如晦房𤣥齡等後皆自致公輔論者稱構有知人之鑒又曰虞世基字茂世㑹稽餘姚人也父荔陳太子中庶子世基㓜沈静喜愠不形於色博學有髙才兼善草𨽻陳中書令孔奐見而歎曰南金之貴属在斯人少𫝊徐陵聞其名召之世基不往後因公㑹一見而竒之顧謂朝士曰當今潘陸也因以弟女妻焉隋書曰李徳林任城王楷為定州刺史重其才召入州館朝夕同遊殆均師友不為君民禮數嘗語徳林云竊聞蔽賢􅂪顯戮乆令君沉滯吾獨得潤身朝廷縱不見尤亦懼明靈所譴於是舉秀才入鄴李徳林㓜聰敏年數嵗誦左思蜀都賦十餘日便度髙隆之見而嗟歎遍告朝士云若假其年必為天下偉噐鄴京人士多就宅觀之月餘日中車馬不絶年十五誦五經及古今文集日數千言俄而該博墳典隂陽㑹緯候無不通涉善属文辭覈而理暢魏收嘗對髙隆之謂其父曰賢子文筆終當繼温升隆之大笑曰魏常侍殊為嫉賢何不近比老彭乃逺求温子又曰李士謙字子約趙郡平棘人也髫齕䘮父事母以孝聞母曽嘔吐疑為中毒因跪而嘗之為伯父魏岐州刺史瑒琛所嗟尚每稱曰此兒吾家之顔子也太平御覧卷四百四十三
