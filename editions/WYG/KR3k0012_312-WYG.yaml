body:
  text: 太平御覽卷三百十二宋李昉等撰兵部四十三决戰中决戰中後漢書曰賈復與五校戰於真定大破之復傷創甚光武大驚曰我所以不令賈復别將者為其輕敵果然失吾名將聞其婦有孕生女耶我子娶之生男耶我女嫁之不令其憂妻子也復病尋愈追及光武於薊相見甚歡又曰銚期從擊王郎將兒宏劉奉於鉅鹿下兒五奚反期先登陷陣手殺五十餘人被創中額攝幩復戰攝猶正也遂大破之又曰祭遵與景丹諸將南擊𢎞農厭新柏華蠻中賊東觀記曰柏華聚也弩中遵口洞出血流衆見遵傷稍引退遵呼叱止之士卒戰皆自倍遂大破之又曰帝在魯聞耿弇為張步所攻自徃救之未至陳俊謂弇曰劇虜兵盛可且閉營休士以須上來弇曰乗輿且到臣子當擊牛釃酒以待百官反欲以賊虜遺君父耶乃出兵大戰自旦及昏復大破之殺傷無數城中溝塹皆滿又曰岑彭征公孫述乃令軍中募攻浮橋先登者上賞于是偏將軍魯竒應募而前時大風狂急彭竒船還流而上直衝浮橋而攅柱鈎而不能去續漢書曰時大東風其攅柱有反把勾竒船不得去竒等乗勢殊死戰因飛炬焚之風急火盛橋樓崩燒彭復悉軍順風並進所向無前蜀兵大亂溺死者數千人又曰張步攻耿弇營與劉歆等戰弇升王宮壊臺望之臨淄本齊國所都即齊王宫中有壊臺也東觀記作􅉞臺視歆等鋒交乃引精兵横突步陣于東城下大破之飛矢中弇股以佩刀截之左右無知者又曰袁紹使麴義攻公孫瓉紹在後十數里聞瓉已破發鞍息馬惟衛帳下強弩數十張大㦸士百許人瓉散兵二千餘騎卒至圍紹數重射矢雨下田豐扶紹使却入空垣紹脫兠鍪抵地曰大丈夫當前鬬死而返逃垣墻間耶促使諸弩競發多傷瓉騎衆不知是紹頗稍引却㑹麴義來迎騎乃散退又曰鄧禹還長安張宗夜將鋭士入城襲赤眉中矛貫胛胛背兩腋間又轉攻諸營堡為流矢所激幾至于死又曰賈復從上擊青犢於射犬大戰至日中賊陣堅不却光武傳召復曰吏士皆饑可且朝飯復曰先破之然後食耳於是被羽先登被猶負也析羽為旌將軍之所執持以先登赴敵者也所向皆靡賊乃敗走諸將咸服其勇又曰陳俊字子昭拜強弩將軍所向皆破世祖曰戰將盡如此豈有憂乎魏志曰母丘儉字仲恭有幹䇿為幽州刺史加渡遼將軍儉以髙句驪數侵叛督諸軍出𤣥菟從諸道討之句驪王宫將步騎逆軍沸流水上大戰破走遂束馬懸車登丸都山屠句麗所斬獲首虜以千數遣𤣥菟太守王頎追過沃沮千餘里至肅慎界刻石記功刋丸都之山銘不耐之城又曰代郡烏桓反以任城王彰為北中郎將行驍騎將軍臨發太祖誡彰曰在家為父子受事為君臣動以王法從事爾其誡之彰北征入涿郡界叛胡數千騎卒至時兵馬未集惟有步卒千人騎百疋用田豫計固守要隟虜乃散退彰追之身自戰射胡騎應弦而倒者前後相屬戰過半日彰鎧中數箭意氣益厲乗勝逐北至於勝乾臣松之案勝乾縣名屬代郡今北虜居之號為乘乾郡去代二百餘里長史諸將皆以為新涉逺士馬疲又受節度不得過代不可深進違令輕敵彰曰率師專行惟利所在何節度乎胡走未逺追之必破從令縱敵非良將也遂上馬令軍中後出者斬一日一夜與虜相及擊大破之斬首獲生以千數彰乃倍常科大賜將士將士無不悅喜時鮮卑大人軻比能將數萬騎觀望強弱見彰力戰所向皆破乃請服北方悉平時太祖在長安召彰彰自代過鄴太子謂彰曰卿新有功今西見上勿宜自伐彰到如太子言歸功諸將太祖喜持彰鬚曰黄鬚兒竟大可用又曰龎徳與曹仁討雲長徳屯樊北十里㑹天霖雨十餘日漢水暴溢樊下平地五六尺徳與諸將避隄上雲長乗船攻之以船四面射隄上徳披甲荷弓箭不虛發將軍董衡部曲將統超等欲降徳皆收斬之自平旦力戰至日中雲長攻益急徳謂督將成何曰吾聞良將不怯死以苟免烈士不毁節以求生今日我死日也戰益怒氣愈壯而水漫盛船覆失弓矢船覆水中遂為雲長所得立而不跪雲長曰卿兄在漢中我欲以卿為將不早降何為徳怒曰丈夫何能降也魏王帶甲百萬威振天下汝地一隅耳豈能敵耶我寧為忠義鬼不求主也遂為所殺吳志曰孫權討黄祖祖横兩蒙衝挾守沔口以栟櫚大紲繫石為矴上有千人以弩交射飛矢雨下軍不得前董襲與凌統俱為前部各將敢死百人被兩鎧乗大舸船突入蒙衝裏襲身以刀㫁兩紲蒙衝乃横流大兵遂進祖便開門走兵追斬之明日大㑹權舉觴屬襲曰今日之㑹斷紲之功也晉書曰劉毅等討桓𤣥兵至竹里𤣥使其將皇甫敷吳甫之拒毅軍遇之於江東臨陣斬甫之進至羅洛橋又斬敷首𤣥大懼使桓謙何澹之屯覆舟山毅等軍至蔣山裕使羸弱登山多張旗幟𤣥不之測益以危懼謙等士卒多北府人素懼伏裕莫敢出鬬裕與毅等分為數隊進突謙陣皆殊死戰無不一當百時東北風急毅令放火煙塵障天鼓譟之音震駭京邑謙等諸軍一時奔散又曰周處攻齊萬年於六陌將戰軍人未食齊王彤促命速進而絶其後繼處知必敗賦詩曰去去世事已䇿馬觀西戎藜藿甘梁黍期之克命終言畢而戰自旦及暮斬首萬計弦絶矢盡左右勸退處按劒曰是吾効節授命之日何退之為且古者良將受命凶門以出蓋有進無退也今諸軍負信勢必不振我為大臣以身殉國不亦可乎遂力戰而殁又曰明威將軍朱伺隨陶侃討杜弢有殊功石勒夏口之戰伺用鐵面自衛以强弩射賊大帥數人皆殺之賊挽船上岸於水邊作陣伺逐水上下以邀之箭中其脛氣色不變諸軍尋至賊潰追擊之皆棄船投水死者大半賊夜還長沙伺追至蒲圻不及而反加威逺將軍赤幢曲蓋又曰朱伺劉浚與鄭攀戰楊口壘伺常所調弩忽禁不發伺甚惡之及賊攻䧟北門伺退入船底初浚開諸船底以木掩之名為船械伺既入賊舉鋌摘伺伺接鋌反以摘賊賊走上船屋大喚云賊帥在此伺從船底沉行五十步乃免又曰劉曜使其將軍平先丘中伯率勁騎追陳安安與壯士十餘騎於陜中格戰安左手奮七尺大刀右手執丈八蛇矛近交則刀矛俱發輙害五六逺則帶雙鞬服左右馳射而走平先亦壯健絶人勇㨗如飛與安摶戰三交奪其蛇矛而退㑹日暮雨甚安棄馬與左右五六人步踰山嶺匿于溪澗翼日尋之遂不知所在㑹連雨始霽輔威呼延青尋其徑迹斬安于澗曲隴上歌之曰隴上壯士有陳安丈八蛇矛左右槃戰始三交失蛇矛西流之水東流河一去不還奈子何劉曜命樂府歌之又曰秃髪傉檀追赫連勃勃遣善射者射之中勃勃乃勒衆逆擊敗之追奔八十餘里殺傷萬計斬大將十餘人以為京觀號髑髏臺還于嶺北又曰前秦苻堅為姚萇所殺苻登率兵攻姚萇皆刻鋒鎧為死休字示以戰死為志每戰以長矟鈎刃為方圓大陣知有厚薄從中分配故人自為戰所向無前又曰後趙石閔之亂石琨及張舉王朗率衆七萬伐鄴石閔帥騎千餘拒之城北閔執兩刃矛馳騎擊之皆應鋒摧潰斬級三千琨等大敗歸于冀州又曰朱伺善戰人或問之伺答曰諸人以舌擊賊伺惟以刀耳又問曰將軍前後擊賊何以每得勝耶伺曰兩敵共對唯當忍之彼不能忍我能忍是以勝耳又曰周訪討江沔間賊杜曽訪有衆八千進至沌陽曽銳氣甚盛訪曰先人有奪人之心善謀也使將軍李恒督左甄許朝督右甄訪自領中軍高張旗幟曽果先攻左右甄曽勇冠三軍訪甚惡之自於陣後射雉以安衆心令小將趙嗣領其父餘兵屬左甄力戰敗而復合嗣馳馬告急訪怒叱令更進號哭還戰自辰至申兩甄皆敗訪選精銳八百人自行酒飲之勅不得輒動聞鼓音乃進賊未至三十步訪親鳴鼔將士皆騰躍奔赴曽遂大潰殺千餘人遂定漢沔又曰劉裕舉兵伐後秦姚泓王鎮惡為前鋒軍至渭橋鎮惡所乗皆蒙衝小艦鎮惡登岸渭水流急倐忽間諸艦悉逐去時泓屯軍在長安城下猶數萬人鎮惡撫慰士卒曰卿諸人並家在江南此是長安門外去家萬里而乗舫衣糧並已逐流去豈復有生之計耶惟宜死戰可以立大功不然則無遺類矣乃身先士卒衆亦知無復退路莫不騰踊争先泓衆一時奔潰即䧟長安城崔鴻十六國春秋曰王猛討慕容暐暐遣慕容評屯於潞川猛與評相持猛覘知評賣水鬻薪不撫將士人思為亂有可乗之㑹乃遣逰擊將軍郭慶以鋭卒五千夜從間道出評營後傍山起火燒其輜重暐懼遣使讓評催之速戰評遣使求戰乃陣於潞原面衆曰今與諸君深入賊地當竭力致死有進無退共立大功以報國家受爵明君之朝稱觴父母之室不亦美乎衆皆踴躍破釡棄糧大呼竟進猛覩評師之衆也惡之謂鄧羗曰今日之事非將軍莫可㨗將軍勉之羗曰若以司𨽻見與者公無以為憂猛曰此非吾之所及必以本郡太守萬户侯相處羗不悅而退俄而兵交猛召之羗寢而弗應猛馳就許之羗於是大破許軍梁書曰大同初魏軍復圍南鄭杜􅅛瑶命第三子嶷帥二百人與魏前鋒戰于光道寺溪矢中其目失馬敵人交矟將至嶷斬其一騎躍而上馳以歸嶷膂力絶人便馬善射一日戰七八合所佩霜明朱弓四石餘力挽絲纒矟長二丈五同心敢死士百七十人每出殺傷數百人敵憚之號為杜彪又曰侯景圍王僧辨於巴陵元帝乃引僧祐於獄拜為假武節猛將軍封新市縣侯令援僧辨將行泣下謂其子玘曰汝可開朱白二門吾不㨗則死吉則由朱凶則由白也元帝聞而壯之又曰蔡道班為吳陽戍主攻蠻錫城反為蠻囚馮根年十六救之匹馬提雙劒左右奮擊殺傷甚多道班以免由是知名又曰武帝既次秣陵東昏遣大將王珍國盛兵朱雀門衆號二十萬及戰梁武軍引却王茂匹馬單刀直前外生韋欣慶勇力絶人執鐵纒弰翼茂而進故大破之茂勲第一欣慶功也陳書曰武帝入援建鄴杜僧明為前鋒與蔡路飬戰於南馬僧明馬被傷帝馳救之以所乗馬援僧明僧明上馬復進殺數十人因而乗之敗路飬南史曰陳將蕭摩訶随都督吳明徹濟江攻秦郡時齊遣大將尉破胡等率衆十萬來援其前鋒將蒼頭犀角大刀之號皆身長八尺膂力絶倫其鋒甚銳又有西域胡妙於弓矢絃無虛發衆軍尤憚之及將戰明徹謂摩訶曰若殪此胡則彼軍奪氣君有雲長之名可斬顔良矣摩訶曰願得識其形狀明徹乃召降人有識胡者云胡着絳衣樺皮表弓面兩端骨弭明徹遣人覘伺知胡在陣乃自酌酒飲摩訶摩訶飲訖馳馬衝齊陣胡挺身出陣前十餘人出戰摩訶斬之於是齊師退走後魏書曰呂羅漢父温佐秦州羅漢随侍隴右氐楊難當率衆數萬㓂上邽秦人多應之鎮將元意頭知羅漢善射共登西城樓令羅漢射難當隊將及兵二十三人應弦而殪賊衆轉盛羅漢進計曰今若不出戰示敵以弱衆情擕貳大事去矣意頭善之即簡千餘騎令羅漢出戰羅漢與諸騎䇿馬大呼直衝難當軍衆皆披靡殺難當左右隊騎八人難當大驚又曰宇文延字慶夀體貎魁岸眉目踈朗永平中釋褐奉朝請直後員外散騎常侍以父福老詔聽随侍在瀛州屬大乗妖黨突入州城延率奴客戰死者數人身被重創賊乃少退而縱火燒齋閣福時在内延突火而入抱福出外服體灼爛髪盡焦於是勒衆與賊苦戰賊乃散走以此見稱又曰趙遐為滎陽太守時蕭衍將馬仙琕率衆攻圍的城戍主傅文驥嬰城固守以遐為别將與劉思祖等救之次於鮑口去的城五十里夏雨頻降涉厲長丘將至的城仙琕見遐營壘未就徑來逆戰思祖率彭沛之衆望陣奔退遐孤軍奮擊獨破仙琕斬其直閣將軍軍主李魯生仙琕先分軍於的城之西阻水列栅以圍固城遐身自潜行觀水深淺結草為筏銜枚夜進破其六栅遂觧固城之圍進救的城都督盧昶率大軍繼之未幾而文驥力竭以城降賊衆軍大潰昶棄其節傳輕騎而走唯遐獨握節而還太平御覽卷三百十二
