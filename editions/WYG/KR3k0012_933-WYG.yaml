  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_933-1a, image: WYG0901/WYG0901-0294c.png}
body:
  text: 太平御覽卷九百三十三宋李昉等撰鱗介部五虵上周易繫辭下曰尺蠖之屈以求信也龍虵之蟄以存身也爾雅曰螣騰虵龍類也蠎王虵蠎最大故曰王左傳莊公曰初内虵與外虵鬭於鄭南門之中内虵死不踰年而厲公入又文十曰有虵自泉宮出入於國如先君之數自伯禽至僖公十七君秋八月辛未聲姜薨毁泉臺魯人以為虵如所出而聲姜薨故壊之又襄三叔向母曰深山大澤實生龍虵又襄五梓慎曰今兹宋鄭其饑乎虵乘龍虵元武之宿虛危之星史記曰秦文公夣虵自天下属地其口止於鄜衍文公問史敦敦曰此上帝之徴君其祠之於是作鄜畤漢書曰高祖以亭長送徒驪山夜行經豐西大澤中有大虵當道㧞劍斬之遂行後人至者見二老嫗哭虵曰此白帝子也向赤帝子過而殺之媪因忽然不復見後漢書曰華佗嘗行道有病咽塞者咽㗋也因語之曰向見道隅賣餅人䓅韲甚酸可取三升飲之病自當去即如佗言乃立吐一虵晉書曰杜預先在荆州因宴集醉卧齋中外人聞嘔吐聲竊窺於户而見一大虵垂頭而吐聞者異之又曰樂廣常有親客久闊不復来廣問其故答曰前在主家賜酒方欲飲見盃中有虵意甚惡之既飲而疾于時河南㕔事壁上角弓畫作虵廣意盃中虵即弓影也復置酒其處謂客曰酒中復有所見否答曰所見如初廣乃吿其所以客豁然而解又曰趙王倫􅆲位殿上有大蟒及小蟒耳間垂肉似重孝幘小蟒亦然又曰慕容熈逰於城南止大栁樹下若有人呼曰大王且止熈惡之伐其樹乃有虵長丈餘從樹而出又曰沮渠蒙遜攻浩亹而虵盤於帳前䝉遜笑曰前為螣虵今盤在吾帳天意欲吾迴師先定酒泉燒攻具而還沈約宋書曰劉秀之少孤貧有志操十許歳時與諸兒戱於前渚忽有大虵来勢甚猛莫不顛沛驚呼秀之獨不動衆並異焉南史曰梁主衣庫見黑虵長丈許數小虵隨之舉頭髙丈餘南望俄失所在帝又與宮人幸元州苑復見大虵盤屈於道羣小虵遶之並黑色帝惡之宮人曰此非恠也恐是錢龍帝勅所司即日取數十萬錢鎮於虵處以厭之因設法㑹赦囚徒賑窮乏退居栖心亭又有虵從屋墜落帝帽上忽然便失又龍光殿上所御肩輿復見小虵縈屈輿中以頭駕夾膝前金龍頭上見人走逐之不及梁書曰倭國有獸如牛名山鼠又有大虵吞此獸虵皮堅不可斫其上有孔乍開乍閉時或有光開時射中之虵則死矣陳書曰後主末年昏淫政亂祕書監傳繹上書諫諍後主逼令自盡死後有惡虵上屋来靈床當前受祭酧而去復来百有餘日時有彈指聲俄而陳滅後魏書曰東魏孝静帝武定中有大虵見武牢城上時北豫州刺史髙仲蜜以武牢叛死者數千人後司馬消難之任武牢虵又見消難亦叛土人謂之雌龍隋書曰焬帝大業末年翟讓初見李宻衣在格上宻腰帶化為赤虵譲心異之竟為宻所殺又曰薛濬初為兒童時與宗中諸兒逰戱澗濱見一黄虵有角及足召羣兒共視了無見者濬以為不祥歸而憂悴母逼而問之濬以實對時有胡僧詣宅乞食濬母怖而吿之僧曰此乃兒之吉應且是兒也早有名位然夀不過六七耳言終而出忽然不見時咸異之既而濬終於四十二六七之言於是驗矣又曰李宻據偃師王世充領兵討之夜有斑虵長丈餘向寢屋作聲如牛吼然仗者斬之明日戰大潰疋馬歸國唐書曰太宗屯桓壁常欲覘敵潛軍逺抄騎皆四散太宗與一甲士登邱而睡俄而賊兵四面雲合不之覺也㑹有虵逐鼠觸甲士驚起因見賊至遽白太宗懼而上馬馳百餘步為賊所及發大羽箭射之殪其驍将賊騎乃退當時以為神異焉又曰建中三年趙州寧晉縣仁孝里沙北有棠樹甚􅌗百姓禱之為神忽有羣虵數千自東南来趨北岸集棠樹下為二積留居南岸者為一積俄有三龜徑寸繞行積傍積虵盡死而後各登其積野人以告虵腹皆有瘡若矢所中又曰元和中五坊小使每羣聚於賣酒食家肆情飲啖将去畱虵一篋誡之曰吾以此虵致供奉者可善飼之無使饑渴主人賂而謝之方肯􅂝虵篋而去又曰李朝晟為邠州刺史城方渠無水師徒囂然遽有青虵乘髙而下視其跡水隨而流朝晟令築防環之遂為停泉軍人仰飲以是水不乏上聞詔致祠焉又曰􅄢賓國有鼠喙尖而尾赤能食虵有被虵螫者鼠輒嗅而尿之其瘡立愈後唐史曰清泰三年有虵與鼠鬭於獅子門外而鼠殺虵晉史曰髙祖即位之前一年歳在乙未鄴西李固橋下鼠與虵鬭鬭及日之中虵不勝而死行人觀者志之後唐果滅於申周史曰太祖常寝柴后見五色小虵入鼻間心異之知其必貴敬奉愈厚戰國策曰昭陽為楚伐魏覆軍殺將移師攻齊陳軫為齊王使見昭陽曰楚有祀者賜其舎人酒一巵舎人相謂曰數人飲之不足一人飲之有餘請各畫地為虵虵先成者飲酒一人先成引酒且飲之乃左手持巵右手畫地曰吾能為之足未成一人後成奪其巵曰虵故無足子安能為之足遂飲其酒為虵足者終亡其酒今公攻魏破軍殺将又将移師攻齊齊畏公甚戰勝不知止猶為虵添足昭陽解甲而歸孫子兵法曰善用兵者譬如率然率然常山之虵也撃其首則尾至撃其尾則首至撃其中身則首尾俱至慎子曰騰虵逰霧飛龍乘雲雲罷霧散與蚯蚓同韓子曰昔黃帝合鬼於西太山作為青角虎狼在前蟲虵伏後又曰蟺似虵而蠶似蠋音蜀人見虵則驚駭見蠋則毛起漁者持蟺婦人育蠶利之所在皆為賁諸又曰鴟夷子皮事田成子成子去齊亡之燕鴟夷子皮負傳而從至望邑曰子獨不聞涸澤之虵乎澤涸将徙有小虵隨之謂大蛇曰大虵行小虵隨之人以為虵之行者耳必有殺子子不如相御負我以行人必以我為神也乃相負越公道而行人皆避之今子美而我惡以子為我上客千乘之君也以子為我使者萬乘之卿也不如為我舎人田成子負傳而隨之至逆旅之君待之甚敬因獻酒肉淮南子曰越人得蚺虵以為上殽中國得而棄之無用又曰犧牛騂毛宜於牲其於致雨不若黑蜧黑蜧虵屬能致雨又曰神虵能斷而復属而不能使人勿斷也又曰昔容成氏之時道路鴈行而處容成黄帝時造厯士託嬰兒於巢上致餘糧於畆首虎豹可尾虵虺可蹷又曰虎豹不可使縁木蝮虵不可以安足淮南萬畢術曰烏喙虵肝病不苦虵肝和丸令人不倦抱朴子曰巳日山中稱寡人者社中虵也又曰隱居山澤制虵蝮之道曰昔員邱多大虵又生好藥黄帝将登焉廣成子敎之佩雄黄而虵去也今帶武都雄黄色如雞冠者五兩以入山林則不畏虵虵若中人以少許雄黄末敷之瘡中立愈又曰虵類雖多惟有蝮虵中人至急一日不治則殺人若不曉方術而為此虵所中者但以刀割瘡肉投地其肉沸如火須臾燋盡而人得活也山海經曰泰華山有虵名曰肥遺六足四翼見則天下大旱又曰巴虵吞象三歳而出骨君子服之已心腹之疾今南方蚺虵吞鹿已爛自纒於樹腹中骨皆穿鱗甲間出此類也又曰天同之山有虵名曰長虵其毛如彘毫其音如皷柝又曰鱗山多鳴虵其状如虵四翼音如磬見則大旱又曰黑齒國為人黑齒有虵一赤一青在其傍又曰雨師妾為人黑手各操一虵星經曰螣虵二十二星在室北近河主蟲虵說苑曰齊景公獵上山見虎下澤見虵問晏子曰此不祥耶曰有賢不知知而不用用而不任此不祥耳山是虎室澤是虵窟何不祥乎新序曰太子申生至靈臺虵遶左輪御曰速得國之祥太子遂不返伏劍而死賈誼書曰晉文公出田前駈還白前有大虵其髙如隄横道而處文公曰還車而歸其御曰臣聞祥則逆之妖則凌之今前有妖請攻之公曰不可吾聞天子夢惡則修道諸侯夢惡則修政大夫夢惡則修身若是則禍不至今我有失行而天感以妖我若攻之是逆天令也乃歸齋宿而請於廟退而修政居三日夢天誅虵曰爾何敢當聖君之路文公覺令人視之虵已焦爛矣又曰孫叔敖之為兒出逰還憂而不食其母問其故泣而對曰今旦兒見兩頭之虵恐死母問曰今虵何在曰聞見兩頭虵者死恐他人復見之已殺而埋之母曰無憂汝不死矣吾聞之有隂德者天必報以福列仙傳曰元谷者自言河間人餌巴豆雲母賣藥於都市七錢一丸治百病河間王病買酒服之下虵十餘頭酈善長水經注曰南鄉故城城南外舊有郡社栢樹大三十圍蕭欣為郡伐之忽有大虵從腹中墜下大數十圍長三丈小虵數十隨之入南山聲如風雨伐樹之前見夢於欣欣不以為意及伐之少日而死又曰漢水又東合洛水水有二源合注壑於神虵戍西左右山溪多五色虵性馴不為物毒又曰交州山多大虵名曰蚺虵長十丈圍七八尺常在樹上伺鹿獸鹿獸過便低頭纒之有頃鹿死先洏令濕訖便合頭角噉之骨背鎖反出山夷始見虵不動時以竹籖籖虵頭至尾殺而食之以為珍異異物志曰蚺唯大虵既洪且長采色駮犖其文錦章食灰吞鹿腴成飬創賓享嘉宴是豆是觴太平御覽卷九百三十三
