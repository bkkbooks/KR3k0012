body:
  text: 太平御覽卷二百九十三宋李昉等撰兵部二十四示緩務速示緩戰國䇿曰秦伐韓軍於閼與趙王召問趙奢對曰道逺險狹難救譬猶兩䑕鬬於穴中也將勇者勝王令奢救之去邯鄲三十里而令軍中曰有以軍事諫者死秦軍武安西秦軍鼓譟勒兵武安屋瓦盡震軍中候有一人言急救武安奢立斬之堅壁留二十八日不行復益壘秦間來奢善食遣之間以報秦將大喜曰夫去國三十里而軍不行乃増壘閼與非趙地也趙奢既已遣秦間乃卷甲而行趨之二日一夜至令善射者去閼與五十里而軍壘成秦人聞之悉甲而至奢縱兵擊破之閼與圍解通典曰曹公進軍攻袁尚將審配於鄴先鑿塹圍城周廻四十里初令淺示若可越審配遥見笑而不出争利曹公令一夜濬深之廣二丈决漳水以灌之數月城中餓死過半尚將馬延臨陣降尅鄴城又曰魏將司馬宣王征公孫文懿賊保襄平宣王進軍圍之㑹霖潦大水平地數尺三軍恐懼欲移營宣王令軍中敢言徙者斬都督令史張静犯令斬之軍中乃定衆賊汲水樵木自若諸將欲取之王皆不聽司馬陳珪曰昔攻上庸八部並進晝夜不息故能一旬之半㧞堅城斬孟達今者逺來而更安緩愚竊惑焉宣王曰孟達衆少而食支一年吾將士四倍於達而糧不淹一月以一月圖一年安可不速今賊衆我寡賊饑我飽水雨乃爾功力不設雖當促之欲何所為自發京師不憂攻戰但恐賊糧垂盡而圍洛未合掠其牛馬抄其樵采此故驅使走也夫兵者危道善因事變賊憑衆恃雨故雖饑困安肯束手當以無能示之若取小利以驚之非計也既而雨止遂合圍起土山地道楯櫓鈎橦竟發矢石雨下晝夜攻而㧞之又曰万俟醜奴稱亂關右魏將賀㧞岳討之軍於汧渭之間宣王告逺近曰今氣候漸熱非征討之時至秋凉更圖進取醜奴聞之遂以為實分遣諸軍散營農於岐州之北百里巨川因險立柵其千人以下為柵者亦有數處且田且守賊之勢分乃宻嚴備晡時潜遣輕騎先行斷路於後諸軍盡發昧朝攻圍先進柵拔之諸所俘執皆放之自餘柵悉降岳宣言徑趨涇州其刺史侯長貴亦以城降醜奴乃棄平亭而走晉書曰安平獻王孚𫝊曰吳諸葛恪圍新城以孚督諸軍二十萬禦之孚次夀春遣毌丘儉文欽等討諸將欲速擊之孚曰夫攻者借人之力以為功且當詐巧不可争力也故覊畱月餘乃進軍吳師望風而退宋書曰臨烈王道規曰兵法屈伸有時不可苟進諸桓世居西楚羣小皆為竭力桓震勇冠三軍難以争勝且可頓兵養銳徐以計䇿縻之不憂不尅也務速孫子曰乆則頓兵挫銳與攻則力屈頓弊屈盡乆暴師則國用不足夫頓兵挫銳力屈貨殫音單則諸侯乗其弊而起雖有智者不能善其後故兵聞拙速雖拙有速勝也未聞巧之乆也夫乆兵而國利者未之有也左傳曰先軫曰一日縱敵數世之患也又曰楚子伐隨隨少師謂隨侯曰必速戰不然將失楚師又曰武城黒謂子常曰吳用木也我用革也不可乆也不如速戰魏志曰夏侯淵性果悍進軍疾速人歌曰夏侯淵三日六百五日千晉書呂光載記曰光行至高昌聞堅冦晉光欲更湏後命部將杜進曰莭下任全方面赴機宜速何不了而畱乎又曰杜預破吳衆議且候來冬預曰兵威已震辟如破竹數節之後迎刄而解崔鴻十六國春秋曰後秦姚萇與苻登相持萇將荀曜據萬堡宻引苻登萇與登戰敗於馬豆原將衆復戰姚碩徳謂諸將曰上慎於輕戰毎欲以計取之今戰既失利而更逼賊者何也萇聞之而謂碩徳曰登用兵遲緩不識虛實今輕兵直進遥據吾東必荀曜䜿子與之連結也事乆變成其禍難測所以速戰者欲使䜿子謀而未就好之未深散敗其事耳果大敗之又曰姚萇與苻登相持未解登將魏褐飛自稱大將軍衛天王率羗胡萬人攻萇將姚當於杏城萇將雷惡地叛應褐飛攻萇將姚漢得於李潤萇議將討之羣臣咸曰陛下不憂六十里苻登乃憂六百里褐飛萇謂曰登非可卒殄吾城亦非登所能卒圖惡地多智非常人也南引褐飛東結董咸甘言美說以成姦謀若得杏城李潤惡地據之控制逺近相為羽翼長安東北非復吾有所過潜軍赴之萇將衆不滿二千褐飛惡地衆至數萬羗胡赴之者首尾不絶萇毎見一軍至輙有喜色羣下怪而問之萇曰今同惡相濟皆來㑹集吾得乗勝席卷一舉而覆其巢穴東北無復餘地褐飛等以萇兵少盡衆來攻萇固壘不戰示之以弱潜遣子崇率騎數百出其不意以乗其後褐飛兵擾亂萇遣將王超等率歩騎擊之褐飛衆大潰斬褐飛惡地請降萇待之如初通典曰後漢末荀攸從曹公征呂布至下邳布敗固守攻之不㧞連戰士卒疲曹公欲還攸與郭嘉說公曰呂布勇而無謀今三戰皆北其銳氣衰三軍以將為主主衰則軍無奮志且布之謀主陳宫有智而遲今布氣衰而未復宮謀之未定進急攻之布可㧞也乃引沂泗灌城城潰生擒布又曰蜀將諸葛亮伐魏魏將司馬宣王郭淮等禦亮張郃勸宣王分軍住雍郿為後鎮宣王曰料前軍能獨當之者將軍言是也若不能當而分為前後此楚之三軍所以為黥布擒也遂進軍隃音舒縻亮聞大軍且至乃自帥衆將芟上邽之麥諸將皆懼宣王曰亮慮多决少必安營自固然後芟麥吾得二日兼行足矣於是捲甲晨夜赴之亮覩塵而遁宣王曰吾倍道疲勞此曉兵者之所忌也亮不敢據渭水此易與耳進次漢陽與亮相遇宣王列陣以待之使將牛金輕騎餌之兵纔接而亮退也又曰蜀將孟達之降魏也魏朝以達領新城太守假節於是連吳固蜀潜圖中國謀洩將舉兵司馬宣王秉政恐達速發以書安之達得書猶豫不决宣王乃潜軍進諸將皆言達與二賊交搆宜審察而後動宣王曰達無信義此其相疑之時也當及其未定徃决之乃倍道兼行八日到其城下吳蜀各遣其將救達宣王分諸將以拒之初達與諸葛亮書曰宛去洛八百里去吾千二百里聞吾舉事表上天子比相返覆一月間也則吾城已固諸軍足辦吾所在深險司馬公不自來諸將來吾無患矣及兵到達又告亮曰吾舉事八日而至城下何其神速也上庸城三面阻水達於城外為水柵以自固宣王度其水破其柵直造城下八道攻之旬有六日達甥劉賢將李輔等開門出降遂斬達又曰東魏荆州刺史辛纂據穰城西魏將楊忠從獨孤信討之纂迎戰敗退走信令忠為前驅馳至其城北叱門者曰今大軍已至城中有應爾等求活何不避走聞者盡散忠乗而入彎弓大呼纂兵衛百餘人莫之敢禦遂斬纂以狥城中懾服唐書曰隋末髙祖義兵發太原次靈石縣賈胡堡隋將宋老生率精兵二萬屯霍邑以拒之㑹乆雨糧盡與長史裴寂及諸將議曰宋老生頓霍邑屈突通鎮河東二人同心非造次可進欲還太原以圖後舉太宗曰欲興大義以救蒼生當湏先入咸陽號令天下今遇小敵即便班師將恐義從之衆一朝解體還守太原一城之地皆為賊耳何以自全髙祖乃止太宗引師赴霍邑遂平老生又曰武徳中太宗征薛仁杲其將宗羅侯來拒大破於淺水原因率左右二十餘騎追奔直趨折摭以乗之仁杲列陣城下太宗據涇水以臨賊賊徒氣阻無敢進戰其驍將澤斡等數人臨陣來降請還取馬太宗縱遣之於是各乗良馬湏㬰並至仁杲大懼嬰城自守太宗具知賊中虛實將夕大軍繼至四面合圍因縱辯士諭以禍福仁杲遂開門降既而諸將奉賀因問曰始大王野戰破賊其主尚保堅城王無攻具輕騎騰逐不待歩兵徑薄城下咸疑不尅而竟下之何也太宗曰此以權道廹之使其計不暇發以故尅也羅侯恃徃前之勝兼復養銳日乆見吾不出意在相輕今喜吾出悉兵來戰吾雖破之擒殺蓋少若不急躡還走投城仁杲收而撫之則便未可得矣且其兵衆皆隴西人一敗被追不及廻顧散歸隴外則折摭自虛我軍隨而廹之所以懼而降也此乃成算諸君盡不識耶又曰武后初徐敬業舉兵於江都稱匡復皇家以盩厔尉魏思温為謀主問計於思温對曰明公既以太后幽執少主意在於匡復兵貴神速但宜早渡淮北親率大衆直入東都山東將士知公有勤王之舉必以死從此即指日刻期天下必定敬業將從其䇿薛璋又說曰金陵之地王氣已見宜早應之兼有大江設險可以自固請且攻取常潤等州以為王覇之業然後率兵北上鼔行而前此則退有所歸進無不利實為良算也敬業以為然乃自率兵四千人南渡以擊潤州思温宻謂杜求仁曰兵勢宜合不可分今敬業不知并力渡淮率山東之衆以取洛陽必是無能成事命也可知敬業尋亦悔之所以遂敗呂氏春秋曰凡兵欲急疾捷不可乆處所以兎起鳬舉喻急疾也雖有江河之險則陵之雖有太山之塞遂踰之衛公兵法曰用兵尚神戰貴其速簡練士卒申明號令曉其目以麾幟習其耳以鼓金嚴賞罸以戒之重芻豢以養之浚溝塹以防之指山川以導之召才能以任之述竒正以教之如此則雖敵人有雷電之疾而我亦有所恃也若兵無先備則卒不應卒不應則失於機失於機則後於事後於事則不制勝而軍覆矣故呂氏春秋云凡兵者欲急疾捷所以一决取勝不可乆而用之矣或曰兵之情唯主速乗人之不及然敵將多謀戎卒輯睦令行禁止兵利甲堅氣銳而嚴力全而勁豈可速而犯之耶荅曰若此則當卷迹藏聲蓄盈待竭避其鋒勢與其持乆安可犯之哉亷頗之拒白起守而不戰宣王之抗武侯抑而不進是也太平御覽卷二百九十三
