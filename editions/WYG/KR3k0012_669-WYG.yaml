  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_669-1a, image: WYG0899/WYG0899-0033c.png}
body:
  text: 太平御覽卷六百六十九宋李昉等撰道部十一服餌上神農經曰上藥令人身安命延又云餌五芝丹砂層青雲母太一禹餘糧各以单服令人長生中藥養性下藥除病此上聖之至言方術之實籙也仙藥之上者丹砂次者黄金白銀衆芝五玉五雲明珠也黄精與术餌之却粒或遇㓙年可以絶粒謂之米脯西極明科曰上清金液丹經九鼎神圖太一九轉大丹等几一百四十卷五符經曰胡麻本生大宛又名巨勝服之不息與世長存五榖之長也服之可以知萬物通神明又曰真人謂黄精獲天地之淳精依山寄居神化者也仙名此為戊巳芝玉訣經曰元始五常氣以陽光初明散元始之輝真人食其景而無窮三光經曰三光者仙道錬胎之術也泥丸者體形之上神也吐納經曰八公有言食草者力食肉者勇食榖者智食氣者神仙經曰丹為金服之上士也茹芝導引咽氣者中士也食餌草木者下士也食金石藥雖未去世百邪不近也若但服草木及餌金石適可令疾除命益耳不足却外禍也惟守真一則劇性不犯昔仙公各服一物以得數百年乃合神丹金液韓衆服菖蒲十三年身生毛目視書萬言皆誦之冬極不寒又菖蒲生須石上一寸九節已上紫花者尤善又曰煑石方東府左卿白石先生造也皆真人所授但未見真本世有兩本以省少者為佳又東華真人食石法即東府也亦是太清又曰紫㣲夫人撰术序其畧曰吾俱察草木之勝負若速益於己者反多不及之微驗乎所以長生久視逺而更虛我非謂諸物皆當减於术也直以术之用今之所要末世多疾冝當服餌夫道有内足猶畏外事之禍有外足者亦虞中崩之弊我見山林隠逸得服术者千年八百比肩五岳矣今撰术數方以傳好尚若必信用庻無横暴之災矣又曰南陽􅐱縣山中有甘谷水所以甘者谷山左右皆生甘菊菊花墮其中歴世彌久臨此谷中居民皆不穿井悉食甘谷水食者無不壽髙者百四五十歳下者不失八九十歳故司空王陽太尉劉寛太傅袁隗皆為南陽太守每到官常使􅐱縣月送甘谷水四十斛以為飲食此諸公多患風痺及昡暈皆得愈但不能大得其益如甘谷上居民從㓜便飲食此水又菊花與薏花相似直以甘苦别之耳菊甘而薏苦今真菊甚少耳率多生於水側緱氏山與􅐱最多仙方所謂日精更生周盈皆一菊而根莖花實異名矣其說甚美而近來服之者畧無所効正由不得真也八素經曰太上曰飛錬之法未可得真人之門户又四極明科云金液丹經九鼎神圖並真仙之秘書藏于名山太上太霄朗書曰除欲减私服御吐納上清列紀曰中黄之書皆白帝君所藏於瑶臺說丹藥秘法非有真籙不得其道也太上丹簡墨籙曰修金液之術當得太清丹經太丹隠書曰感召靈跡則天神下降上學之士服日月黄華金精飛根黄氣五厨經曰修奉和太不虧不盈天交上經曰太古之人所以壽考者不食榖也身安神樂修道易成五符經云食月之精可以長生食星之精上升太清登真隠訣云服雲牙可絶榖去尸蟲也可修真一之道裴真人曰喜怒損志哀樂損性榮華减德隂陽㓂身皆學道之大忌仙法之所嫉也莫若知而不為為而不敢散此仙之要道生生之本業也欲得延年當吞日華食物多飲慎便卧多則生病卧則蕩心心蕩則失性病生則藥不行學道者慎此劉向列仙傳曰務光夏時人好琴服蒲韮根又彭祖多服水精雲母中山人蘇林字子𤣥本衛人靈公末年師仇公教以服氣之法又尹喜之長沙服巨勝實又曰劉奉林周時人也學道嵩髙山積年後之委羽山能閉氣三日不息但服黄連已及千歳不能有所役使又曰董威輦不知何許人晉武帝時在洛陽白社中藍縷不蔽恒吞一石子終日不食南岳魏夫人内傳曰夫人名華存字賢安任城人也晉成帝時服金屑得道太元真人茅盈内傳曰金闕聖君命太極真人使正𤣥玊郎王忠鮑丘等與茅盈四節燕胎流明神芝長曜䨇飛夜光洞草使拜而食之佩璽服衣正冠北首𢃄符握鈴畢四使者告盈曰食太極四節隠芝者位為真卿食金闕燕胎玊芝者位為司命食東宫流明金英者位為司禄食長曜雙飛者位為真伯食夜光洞草者位為主惣左右御史之任子今盡食之矣夀畢天地位當為司命上真東岳卿君都統吳越之神仙真人周君内傳曰紫陽真人周義山字季通汝隂人也漢丞相勃七世孫父浚官至陳留内史君年十六隨浚在郡為人沉重喜怒不形好獨坐静處精思㣲宻常以平旦出日之初而東嗽日服氣旦旦如此真誥曰衡山張正禮漢末受西城君有虹景神丹方患丹砂難得去廣州為道士仙去飈室為上仙又曰張𤣥賔定襄人也魏武帝時曽舉茂才歸鄉里師事西河蒯公受服餌术方後遇真人樊子明於少室授以遁變隠景之道昔在天柱山今來華陽洞内為理禁伯又曰廬江潜山中有學道者鄭景世張仲華並以晉初受仙人孟徳然口訣以入山行守五藏含日法兼服胡麻服𤣥丹又曰平仲節河東人劉聦亂中夏仲節渡江入括蒼山體有真氣服餌仙去又曰趙廣信陽城人魏末渡江入剡小白山受李法服氣又受左君守𤣥中之道如此積年或賣藥人間多來都下市丹砂作九華丹仙去又曰虞翁生㑹稽人受仙介君食日精法呉時來隠狼伍山兼行服氣廻形之道精思積久仙去又曰朱孺子呉末入赤水山中服菊花及术後過西歸子從乞度世西歸子授以要言仙去又曰明星玉女者居華山服玊漿山中頂上有石龜其廣數畝髙且三仞其側有梯磴逹龜背見玉女祠前有五石臼號曰玉女洗頭盆其中水碧緑深澄雨不加溢旱不减耗内有玉女馬一疋又曰華隂山中有學道者尹受子張石生李方回並晉武帝時人受仙人管城子蒸丹餌术法又授蘇門周壽陵服丹霞之法又曰范㓜冲遼西人恒服三氣法青白赤氣各如綖服之十年遂得仙此髙元君太素内景法旦旦為之視日益佳其法簡其事驗又曰姜白真在太横山服石腦石腦如石小班色而軟又大茅山東亦有形狀真小如層青而色似鍾乳繁陽子昔亦服此裴君内傳曰佛面道人支子元裴君授以長生内術又云尋藥之與存思雖致同津而關源異緒服藥所以保形形康則神安存思所以安神神通則形保二理乃成相資而有道學傳曰許邁字叔元少名映後改名逺遊與王羲之父子為世外之交羲之亦辭榮養生毎造邁彌日忘歸詩書往復多論服餌又曰太清左卿黄觀之學道服金丹讀太洞經得道東府左卿曰玉生有煮石方文徳右仙監張叔隠受青精方太清右公李抱祖岷山人受青精飢飯方葛洪神仙傳曰劉京從邯鄲張君受餌雲丸又曰封君逹隴西人入鳥䑕山服餌年百餘歳常乗青牛又曰衛叔卿中山人也服雲母又曰孔元許昌人常服松脂茯苓又曰焦先字孝然河東人常食白石以分人熟如煮芋又曰虛夀光扶風人年七十餘乃得未央丸方服之年二百餘嵗不老又曰中候上仙范邈字度世舊名水服虹景丹得道撰魏夫人傳又曰清虛真人王褒字子登前漢安國侯王陵七世孫主仙道君以雲碧陽水晨飛丹腴二斗賜褒服之視見甚逺坐在立亡役使羣神太平御覽卷六百六十九
