body:
  text: 太平御覽卷七百四十五宋李昉等撰工藝部二射中後魏書曰胡太后親覽萬機手筆斷决幸西林園法流堂命侍臣射不能者罰之又自射針中之大悦賜左右布帛有差又曰胡太后幸温水登雞頭山自射象牙簪一發中之又曰長孫晟嘗使攝圗攝圗獨愛晟每共遊獵留之竟嵗有二鵰飛而争肉因以箭兩隻與晟請射取之晟馳往遇鵰相攫遂一發䨇貫焉攝圗喜命諸子弟貴人皆相親友兾眤近之以學彈射又曰爾朱兆字萬仁榮從子也少驍猛善騎射蹻捷過人榮曾送臺使見二鹿乃命兆前授之二箭曰可取此鹿供今食也遂停馬構火以待俄然射獲其一榮欲矜誇使人責兆曰何不盡取杖之五十又曰山偉字仲才河南洛陽人其先居代祖强工騎射彎弓五石初為駕部即顯祖獵於方山兩狐起於御前詔強射之百歩之内二狐俱死顯祖善之除内行長又曰元庫汗為羽林中郎從駕北廵有兔起於乘輿命庫汗射之應弦而斃太祖大悦賜金一枚以旌其能又曰楊播字延慶車駕耀威沔水上已設宴髙祖與中軍彭城王勰賭射左衛元遥在勰朋内而播居帝曹遥射侯正中籌限已滿髙祖曰右衛不得不解播對曰仰恃聖恩庶幾必争於是彎弓而發其箭正中髙祖笑曰雖養由基之妙何復過是遂與巵酒以賜之曰古人酒以養病朕今賞卿之能可謂今古之殊也又曰元幹機悟壮勇善弓馬太宗出遊白登之東北幹以其從有雙鴟飛於上太宗命左右射之莫能中者鴟旋飛稍髙幹自請射之以二箭而下雙鴟太宗嘉之賜御弓矢金帶以旌其能軍中於是號幹為射鴟都尉又曰靈丘南有山髙四百餘丈羣官仰射無能踰者文成帝彎弧發矢出三十餘丈過山南二百三十歩遂刋石勒銘又曰孝武即位諸蕃並遣使朝貢帝臨軒宴之有鴟飛於殿前帝素知竇熾善射因欲矜示逺人乃給熾御箭兩隻命射之鴟乃應弦而落諸蕃人咸歎異焉帝大悦又曰南平王渾好弓馬射鳥輙厯飛而中之日射兔得五十頭太武嘗命左右分射勝者中的籌滿詔渾解之三發皆中帝大悦器其藝能常引侍左右又曰奚康生陽翟人生驍武彎弓十石矢異尋常魏宣武聞之故作大弓兩張長八尺把中圍尺有二寸箭麤如今之長笛送與康生康生便集文武用之平射猶有餘力觀者以為絶倫西魏書曰文帝在天遊園以金巵置侯上令公卿射中即賜之宇文貴一發而中帝笑曰由基之妙正當爾進侍中北齊書曰斛律光嘗從文襄洹橋校獵雲表見一大鳥射之正中其頭形如車輪旋轉而下乃鵰也邢子髙嘆曰此射鵰手也當時號落鵰都督又曰斛律羡及光並工騎射少時好獵父金命子孫㑹射而觀之曰明月豐樂用弓不及我諸孫又不及明月豐樂世表矣每日出畋遊即較所獲光獲雖少必麗龜達腋羡雖多非要害之所光常蒙賞羡或被黜明月必背上著箭豐樂隨處即下手數雖多去兄逺矣聞者服其言明月光之字豐樂羡之字也又曰元景安善射孝昭嘗與功臣西園宴射設侯去堂百四十步中的者賜以良馬及金玉錦綵等有一人射中獸頭去鼻寸餘唯景安最後有矢未發帝令景安解之景安引滿中獸鼻帝嗟異稱善特賚又曰髙隆之於堋土上立三人像為壮勇之勢文宣曽至東山因射謂堋上可作猛獸以存古義何為終日射人隆之無以對又曰皮景和琅邪下邳人也髙祖嘗令景和射一野豕一箭而獲之深見嗟賞及周通好之後冠盖往來常令景和對接每與使人同射百發百中甚見推重後周書曰李逺嘗校獵於莎柵見石於藂薄中以為伏兔射之而中鏃入寸餘就而視之乃石也太祖聞而異之賜書曰昔李将軍廣親有此事公今復爾可謂世載其徳雖熊渠之名不能獨善其美又曰趙文少而修徳存忠節便弓馬能左右馳射又曰豆廬寧嘗與梁企定遇於平凉川相與肄射乃於百歩懸莎草以射之七發五中企定時以為能贈遺甚厚又曰賀拔勝從太祖宴於昆明池時有雙鳬遊於池上太祖乃授弓矢於勝曰不見公射久矣請以為歡勝射之一發俱中因拜太祖曰使勝得奉神武以討不庭皆如此也太祖大悦自是恩禮尤重又曰齊王憲子貴年十一從憲獵於監州圍中手射野馬及鹿一十有五隋書曰突厥入朝隋文賜之射突厥一發中的上曰非賀若弼無能當此乃命弼弼再拜祝曰臣若赤誠奉國當一發破的如其不然發不中也既射一發而中上大悦顧謂突厥曰此人天賜我也又曰韓洪平陳之役授行軍摠管及陳平晉王大獵於蒋山有猛獸在圍中衆皆懼洪馳馬射之應弦而倒陳氏諸將列觀於側莫不歎服焉王大喜賜縑百疋又曰宇文忻字仲樂年十二能左右馳射驍捷若飛常謂所親曰自古名将唯以韓白衛霍為美談吾察其行事未足多也若使與僕並時不令豎子獨擅髙名也其少慷慨若此又曰虞慶則㓜雄毅身被鎧帶兩鞬左右馳射本州豪俠皆敬憚之又曰史萬嵗京兆杜陵人也見羣飛鴈曰請射行中第三者射之應弦而落三軍莫不悦服唐書曰馮盎時羅竇諸洞獠叛詔令盎率部落二萬為諸軍先鋒時有賊數屯據險要不可攻逼盎持弓語左右曰盡吾此箭可知勝負連發七矢而中七人又曰薛仁貴領兵擊九姓突厥於天山将行髙宗出甲令仁貴試之上曰古之善射穿七札者卿且射五重仁貴射而洞之髙宗大驚更取金甲以賜之又曰李晟性雄烈有才善騎射年十八從軍身長六尺勇敢絶倫時河西節度使王忠嗣擊吐蕃有驍將乘城拒鬬頗傷士卒忠嗣募軍中能射者射之晟引軍一發而斃三軍皆大呼忠嗣厚賞之因撫其背曰此萬人敵也荘子曰吳王浮乎江登于狙之山衆狙見之狥而走逃於深榛有一狙焉見巧於王左射之敏給敏疾也給續也博㨗矢㨗速也矢性雖㨗而狙能博也王命相者趨而射之狙既死王顧謂其友顔不疑曰是狙也伐其巧恃其便以傲於予以至此殛也戒之哉又曰列御冦為伯昬無人射引之盈貫盈貫謂溢鏑也措杯水其肘上左手如拒右手如附技右手放發而左手不知故可措之杯水也發之適矢復沓矢去也箭適去復㰱沓也方矢復寓箭方去未至的已復寄杯於肘上言其敏捷之妙也當是時猶象人也不動之至伯昬無人曰是射之射非不射之射也又曰射者非前期而中謂之善射天下皆羿也可乎不期而中誤中者耳非善射也若謂謬中為善射則天下皆可謂之羿乎言不可矣列子曰列子學射中矣請於關尹子關尹子曰子知子之所以中者乎對曰弗知也關尹子曰未可退而習之三年又以報關尹子關尹子曰子知子之所以中者乎列子曰知之矣關尹子曰可矣守而勿失也非獨射為國與身亦皆如之又曰中山公子牟恱趙人公孫龍樂正子輿之徒笑之公子牟曰子何笑牟之悦龍也子輿曰吾笑龍之紿孔穿紿欺言善射者能令後鏃中前栝音濶發發相及矢矢相屬前矢造準而無絶落後矢之括猶銜弦視之若一焉孔穿駭之龍曰此未躋其妙者逢蒙之弟子曰鴻起奴其妻怖之引烏號之弓綦衛之箭射其目矢至眸也而眶不睫矢墜地而塵不揚是豈智者之言歟公子牟曰知者之言固非愚者之所曉也後鏃中前括均後於前也矢注眸子而眶不睫盡矢之勢也子何疑焉又曰甘蠅古之善射者彀弓而獸伏鳥下弟子名飛衛學於甘蠅而巧過其師紀昌又學射於飛衛飛衛曰爾先學不瞬而後可言射矣紀昌歸偃臥其妻之機下以目承牽挺三年之後雖椎末到眥而不瞬也以告飛衛曰未也必也視小如大視微如著而後告我紀昌以氂懸虱於牖南面而望之旬日之間浸大也三年之後如輪焉以覩餘物若丘山也乃以燕角之弧朔蓬之簳射之貫虱之心而懸不絶以告飛衛飛衛髙蹈拊膺曰汝得之矣紀昌既盡衛之術計天下之敵己者一人而已乃謀殺飛衛相遇於野二人交射中路矢鋒相觸而墜於地而塵不揚飛衛之矢先射紀昌之矢唯一發飛衛以棘刺之端扞之而無差焉於是二子泣而投弓相拜於塗請為之父子韓子曰李悝為魏文侯北地之守而欲民之善射者乃下令曰民之有狐疑之説者令人射杓音標中之者勝不中者不勝令且下而民皆習射日夜不休乃與奏戰大敗之以民之善射故也墨子曰或有於墨子學射墨子曰不可夫學者必量其力國士猶不可及今子非國士豈能我學又成射哉國先烈子善射皆不盡弓力善治不盡下情尸子曰荆荘王命養由基射青蛉王曰吾欲生得之養由基抜弓射之拂左翼焉王大善符子曰晉之相者桓氏世傳于楚善以道假乎射焉常以其所不晝射而患晝之不足以卒嵗故以夜而燭之又曰夏王使羿射於方矢之皮征寸之的乃命羿曰子射之中則賞子以萬金之費不中則削子以千邑之地羿容無定色氣戰於胷中乃援弓而射之不中更射之又不中夏王謂傅彌仁曰斯羿也發無不中而與之賞罰則不中的者何也傅彌仁曰若羿也口懼為之災萬金為之患矣人能遺其善去其萬金則天下之人皆不愧於羿矣夏王曰人聞子之言始得無欲之道淮南子曰尭時十日並出尭命羿仰射十日中其九焉又曰史皇産而能書史皇蒼鵠生而見鳥跡知著書虎曰史皇或曰鵠皇羿左臂修修長也而善射羿有窮之君也又曰越人學逺射參天而發適在五步之内越人不知射向天而發矢勢盡而還近在五步之内不易儀也儀射法也言其不知射故不知易去參天之法也世已變矣而守其故譬猶越人之射也言其守故不知變也又曰楚王有白猨王自射之則摶矢而熈熈戲也使養由基射之始調弓矯矢而發而猨擁柱號矣由基楚王之臣養姓調張矯直擁抱虎平幽通賦曰養流涕而猨虎是也又曰夫矢者所以射逺貫牢者弓力也其所以中杓部徹微者人心也又曰善射者發不失的善於射矣而不善所射所射者死故曰不善太平御覽卷七百四十五
