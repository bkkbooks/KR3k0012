body:
  text: 太平御覽巻五百七十九宋李昉等撰樂部十七琴下三禮圖曰琴第一絃為宫次為商次為角次為徴次為羽次為少宫次為少商廣雅曰伏羲氏琴長七尺上有五絃孫登别傳曰孫登字公和汲郡人清静無為好讀易弹琴頽然自得觀其風神若遊六合之外者當魏末居北山中石窟為宇編草自覆阮嗣宗見登披髪端坐岩下逍遥然鼓琴嗣宗自下趨進莫得與言嗣宗乃長嘯與琴皆諧和登因嘯和之響動林壑洞㝠記曰帝恒夕望東邊有青雲俄見雙白鵠集於䑓上倐忽變為二神女舞於樓下握鳳管之簫拊落霞之琴歌清呉春波之曲也劉向别錄曰雅琴之意事皆出龍徳諸琴雜事中趙氏者渤海人趙定也宣帝時元康神爵間丞相奏能鼓琴者渤海趙定梁國龍徳召入見温室使鼓琴時閑燕為散操多為之涕泣者也樂府解題曰魏武帝宫人有盧女者故将軍隂叔之子也七嵗入漢宫學鼓琴琴特鳴異善為新聲阮籍樂論曰漢帝聞楚琴倚扆而悲慷慨長息曰善哉為聲若此而足矣昔季流向風而鼓琴聽之者淚下孤山傳曰稷丘公華山道士漢武帝封禅公乃冠章甫擁琴来迎靈異志曰嵇中散神情髙邁任心遊憇甞行西南出去洛數十里有亭名華陽投宿夜了無人獨在亭中此亭由来殺人宿者多㓙至一更中操琴先作諸弄而聞空中稱善聲中散撫琴而呼之曰君何以不来此人便去云身是古人幽没於此數千年矣聞君弹琴音曲清和故来聽耳而就終殘毁不宜以接侍君子向夜髣髴漸見以手持其頭遂與中散共論聲音其辭清辨謂中散君試過琴於是中散以琴授之既弹悉作衆曲亦不出常唯廣陵散絶倫中散纔從受之半夕悉得與中散誓不得教他人又不得言其姓也琴書曰昔者至人伏羲氏王天下也仰觀象於天俯察法於地逺取諸物近取諸身始畫八卦削桐為琴又曰自堯相傳善琴者八十餘人有八十餘様雖少有差大體相似皆長三尺六寸法朞之數也上圓而歛象天也下方相平法地十三徽配十二律餘一象閏也本五絃宫商角徴羽也加二絃文武也至後蔡邕又加二絃象九星在人法九竅其様有異傳於四代所象鳳首翅足尾南方朱雀為樂之主也五分其身以三為上以二為下三天兩地之義也上廣下狹尊卑之象也中翅八寸象八風腰廣四寸象四時軫圓象陽轉而不窮也臨樂承露用棗唇用梓未逹先賢深意也又曰琴髙以琴養性初學於羅浮山後遊四海或傳禽髙非也又曰舜弹五絃之琴以歌南風之詩豈唯道在思親志兼憂民養萬物故感之又曰潁陽西北界李氏處女年十五六天寳八年二月遘疾七月不食䰟飛㝠㝠而昇上景在雲霧中於女仙人蘆藕苗間受琴清風弄等五十曲天寳十五載五月留守裴廻御史中丞蒋列驛騎上聞𤣥宗度為女道士賜琴三面留内供奉琴徳絃妙旁行不流所感無恒也又曰師涓紂之樂官也善鼓琴感駟馬嘘天仰秣或曰師曠傳雖二疑即是一風俗通曰琴者樂之統也君子所常御不離於身非若鐘鼓陳於宗廟列於簴懸也以其大小得中而聲音和大聲不諠譁而流漫小聲不湮滅而不聞適足以和人意氣感發善心也琴書曰堯大徳堯弹感天神降聽儼然言和之至也故堯制神人暢瑞應圖曰師曠鼓琴通於神明而白鵠翔竹林七賢傳曰嵇康臨死顧視日影索琴弹之曰袁孝尼甞從吾學廣陵散吾靳惜固不與廣陵散於是絶矣司馬相如美人賦曰上客何國之公子所從來無乃逺乎遂設㫖酒進鳴琴撫琴為幽閑之曲張戎樞響泉記曰余家世所寳琴書圖畫廣明之亂散失蕩盡其中二琴一名響泉一名韶磬皆希代之寳也宋玉賦曰臣甞行僕饑馬疲正值主人門開主人翁出獨有主人女在欲置臣堂上太髙堂下太卑乃便為蘭房奥室止臣其中其中有鳴琴焉臣援琴而鼓之為秋竹積雪之曲呉均續齊諧記曰王彦伯㑹稽餘姚人也善鼓琴仕為東宫扶侍赴告還都行至呉郵亭維舟中渚秉燭理琴見一女子披幃而進二女從焉先施錦席於東床乃就坐女取琴調之似琴而聲甚哀雅類今之登歌女子曰子識此聲否彦伯曰所未曽聞女曰此曲所謂楚明光者也唯嵇叔夜能為此聲自此以外傳習數人而已彦伯欲還之女曰此非艷俗所宜唯岩栖谷隐可以自娯耳當更為子弹之幸復聴之乃鼓琴且歌歌畢止於東榻遲明将别各深怨慕女取四端錦卧具繡臂嚢以贈彦伯為别彦伯以大籠並玉琴以荅之而去說苑曰雍門周以琴見孟甞君孟甞君曰先生鼓琴亦能令我悲乎周曰臣烏能令足下悲哉所能令悲者先貴而後賤先富而後貧不若身居髙妙適遭暴亂不若處之隐絶不及四隣屈折擯壓無所告訴臣一為之微操琴其涕零矣今足下千乗之君廣厦邃房下羅帷來清風鬬象棋舞鄭妾麗色滛目流聲娯耳水遊則連方舟載旗野遊則馳弋獵平原廣囿入則撞鐘擊鼓乎深宫之中雖有善琴者固未能使足下悲也然臣所為足下悲者一也千秋萬嵗之後宗廟必不血食髙基既已壊曲池既已壍墳墓既已平嬰児豎子採樵者躑躅其足而歌其上曰夫以孟甞君尊貴乃若是乎於是孟甞君泣焉垂臉周引琴而鼓之徐動宫徴拂羽角孟甞君涕泣増哀下而就之曰聞先生鼓琴立若破國亡邑之人也鄭緝之東陽記曰晉中朝時有王質者甞入山伐木至石室見童子四人弹琴而歌質因留趺斧柯而聴之童子以一物與質状如棗核質取而食之便不復饑遂復少留亦謂俄頃童子曰汝来已久何不速去質諾而起所坐斧柯爛盡既歸計離家已數十年矣舊宅遷移室宇靡存遂號痛而絶韓子曰昔衛靈公之晉於濮水之上宿夜聞有鼓琴聲者恱之問左右盡不聞乃召師涓而告謂之曰有鼓新聲者子為我聽而寫之師涓静坐撫琴寫之明日報曰臣得之矣公遂之晉晉平觴之虒祈之䑓靈公召師涓令坐師曠之傍援琴鼓之未終師曠曰此師延之作紂為靡靡之樂及武王伐紂延東走至於濮水而自投聞此聲者必於濮水之上先聞者其國削不可聽此平公曰此何聲也曰此所謂清商也公曰清商固宜悲乎師曠曰不如清徴公曰清徴可得聞乎師曠曰不可古之聴清徴者皆有徳義之君今主君徳薄不足以聴之平公曰願試聴之師曠不得已援琴一奏之有𤣥鶴二八南方來集於廊門之扈再奏之成列三奏之延頸而鳴舒翼而舞平公大恱提觴而起為師曠夀曰音莫悲於清徴乎師曠曰不如清角平公曰清角可得聞乎師曠曰不可昔者黄帝合鬼神於西山之上駕象車六蛟龍畢方並舘蚩尤居前風伯進掃雨師洒道虎狼潜形䖝蛇伏地鳳凰覆上大合鬼神作為清角今主君徳薄不足以聴之平公曰願試聴之師曠不得已而鼓之一奏之有雲從西北方起再奏之大風至大雨隨之裂帷幕破爼豆墮廊瓦坐者散走平公恐懼伏於廊室晉國大旱赤地西京雜記曰趙后有寳琴曰鳳凰皆以金玉隐起為龍鳳螭鸞古賢列女之象亦為歸風送逺之操淮南子曰孟春東宫御女青色采衣鼓琴瑟琴瑟木也春木旺桓譚新論曰神農氏為琴七絃足以通萬物而考理亂也八音之中唯絲最宻而琴為之首應劭風俗通曰琴者樂之首與八音並行君臣以之相御也孔叢子曰孔子晝息於室而鼓琴閔子自外聞之以告曽子曰嚮子之音清微而和淪入至道今也更為幽沉之聲幽則欲之所為發也沉則貪得之所為施也夫子何所感一若斯乎吾從子入而問焉曽子曰諾二子入問孔子孔子曰然而是也吾有之嚮見狸方取鼠欲其得之故為音汝二人者孰識諸曽子對以閔子夫子曰可以聴音矣家語曰孔子遊於泰山見榮啟期行郕之野鹿裘帶索抱琴而舞孔子問曰先生為樂何也對曰天生萬物唯人為貴吾既為人一樂也男尊女卑吾既為男二樂也人生有不見日月不免襁褓吾行年九十五嵗矣三樂也貧者士之常死者人之終處常得終又何憂乎孔子曰善吕氏春秋曰伯牙鼓琴鍾子期聴之方鼓琴志在太山鍾子期曰善哉乎鼓琴巍巍乎如太山志在流水鍾子期曰善哉乎鼓琴茫茫乎若流水鍾子期死伯牙擗琴絶絃終身不復鼓琴列仙傳曰華山毛女獵即見常居岩弹琴桓譚新論曰神農氏繼宓羲而王天下亦上觀法於天下取法於地近取諸身逺取諸物於是始削桐為琴繩絲為絃以通神明之徳合天地之和焉琴書曰師曠晉之樂官也工於琴能易寒暑召風雨為晉平公鼓之感𤣥鶴六下舞西京雜記曰張安世十五為成帝侍中善鼔琴能為雙鳳離鸞之曲世說顧彦先生好琴及喪家人常以琴置靈牀上張季鷹往哭顧不勝痛遂竟上牀鼓琴作數曲而去又曰㑹稽賀思令善弹琴常夜在月中坐臨風鳴絃忽有一人形貌甚偉著械有慘色在中庭稱善便與共語自云是嵇中散謂賀云卿手下極快但於古法未備因授以廣陵散遂傳之於今不絶大周正樂曰勝之逸人也常挾琴牧羊巨澤漢王知其賢将聘焉委以國政勝之曰吾廢牧羊之任而委四海之務是錯亂天地顛倒人倫竟逃於隂山之中又曰琴所以脩身理性反其天真也君子所以常御不離於身非若鐘鼓陳於宗廟列於簴懸也以其大小得中而聲音和大聲不諠譁而流漫小聲不湮滅而不聞適足以和人意氣感發善心也又曰瓠巴六國時人也工琴好古因夏日俯於池亭鼓之感魚躍潜藻而聴焉又曰嵇康字叔夜有邁俗之志為中散大夫或傳晉人非也常宿王伯通舘忽有八人云吾有兄弟為樂人不勝羈旅今授君廣陵散甚妙今代莫測又曰凡琴曲和樂而作命之曰暢暢者言其道之美暢從不敢自安也憂愁而作命之曰操操者言困阨危廹猶不失其操也又曰清角黄帝之琴鳴亷修營藍脅自鳴空中號鍾齊桓公琴繞梁荘王琴綠綺司馬相如琴焦尾蔡邕琴鳳凰趙飛鷰琴又曰賀韜呉人也常弹琴感鬼神見舞數曲斯亦妙之至也十二國史曰周師經仕魏文侯善鼓琴文侯躭之起舞經怒以琴撞文侯文侯怒使人曵下殿将殺之經曰乞申一言而死文侯曰何經曰臣撞桀紂之君不撞堯舜之主文侯曰寡人過矣乃捨之懸琴於壁以為戒晉紀曰孫登字公和不知何許人散髪宛地行吟樂天居白鹿蘇門二山弹一弦琴善嘯毎感風雷嵇康師事之三年不言樂纂曰趙耶利居士唐初天水人也以琴道見重海内帝王賢貴靡不欽風舊錯謬十五餘弄皆削凢歸雅無一微玷不合於古述執法象及胡笳五弄譜兩巻弟子達者三人竝當代翹楚貞觀十年終於曹夀七十六弟子宋孝臻公孫常數百年内将傳於馬氏國史補曰張𢎞静少時㑹名客觀鄭宥弹琴宥調二琴至切各置一榻動宫則宫應動角則角應稍不切乃不應宥師董庭蘭尤善汎聲又曰李汧公勉雅好琴常劒斵桐又取漆角為之多至數百張求者與之有絶代者一名響泉一名韻磬自寳於家京師又以樊氏路氏為第一路氏有房太尉石枕損處惜之不理蜀中雷氏斵琴嘗自品第一上者玉徽次者瑟瑟徽次者金徽又次螺蚌徽唐書樂志曰趙師字耶利天水人也在隋為知音至唐貞觀初獨歩上京遽入琴苑疇之嵇氏累代居曹遂令曹郡琴者所修五弄具列於曹妙傳濮州司馬氏琴道不墜於地也師云呉聲清宛若長江廣流緜緜徐逝有國士之風蜀聲躁急若擊浪奔雷亦一時俊快也世說曰晉戴顒字仲若父逹髙尚不仕顒年十六遭憂不忍傳父之琴與兄勃各造新弄勃五部顒十五部又制長弄一部並傳於世太平御覽巻五百七十九
