body:
  text: 太平御覽卷一百五宋李昉等撰皇王部三十後周太祖文皇帝孝閔皇帝明皇帝武皇帝宣皇帝静皇帝後周太祖文皇帝周書曰太祖文皇帝姓宇文氏諱泰字黒獺代郡武川人其先出自炎帝為黄帝所滅子孫遁居朔野有葛烏兎者雄武多筭畧鮮卑慕之奉以為主遂總十二部落世為大人其後裔孫曰普囬因狩得玉璽三紐有文曰皇帝璽普回異之以為天授其俗謂天曰宇謂君曰文因號宇文國幷以為氏焉太祖徳皇帝之少子也母曰王氏初孕五月夜夣抱子昇天纔不至而止寤而告徳皇帝徳皇帝喜曰雖不至天貴亦極矣魏孝昌二年燕州亂太祖始以統軍從爾朱榮征之先是北海王顥奔梁梁人立為魏王令率兵入洛魏孝莊帝出居河内以避之榮遣賀抜岳討顥仍迎孝莊帝太祖與岳有舊乃以别將從岳及孝莊帝反正以功封寕都予邑三百户遷鎮逺將軍步兵校尉万俟音墨其醜奴作亂闗右孝莊帝遣爾朱天光及岳等討之太祖遂從岳入闗先鋒破魏行臺尉遲菩薩等及平醜奴定隴右太祖功居多遷征西將軍金紫光祿大夫増邑三百户加直閣將軍行原州事太常元年岳以太祖為左丞相領岳府司馬加散騎常侍事無巨細皆委决焉表太祖為持節衛將軍夏州刺史魏永熙三年正月岳與侯莫陳恱討曹泥三月岳為恱所害四月太祖率輕騎臨恱軍恱大懼太祖驅兵奮擊大破之恱遁走追及斬之魏帝遣著作郎姚㓜瑜持節勞軍進太祖侍中驃騎大將軍開府儀同三司闗西大都督洛陽縣公承制封拜使持節如故七月丁未從帝洛陽率輕騎入闗太祖備儀衛奉迎謁見東陽八月齊神武襲䧟潼闗侵華隂太祖率諸軍屯壩上以待之齊神武留其將薛瑾守闗而退太祖乃進軍襲瑾虜其卒七千還長安進位丞相冬十月齊神武推魏清河王亶子善見為主徙都於鄴是為東魏閠十二月魏孝武帝崩太祖立魏南陽王寳炬為嗣是為文皇帝大統十七年春三月魏文帝崩皇太子嗣位太祖以冢宰總百揆三年魏帝有怨言魏淮安王育廣平王賛等垂泣諫之帝不聽於是太祖與公卿定議廢帝立齊王廓是為恭帝元年夏四月帝大饗羣臣魏史栁虬執簡書於朝曰廢帝文皇之嗣子年七嵗文帝託於安定公曰是子也才由於公不才亦由於公公其勉之公既受兹重寄居元輔之任又納女為皇后遂不能訓誨有成致令廢黜負文皇帝付嘱之意此咎非安定公而誰太祖乃令太常卿盧辯作誥諭公卿曰嗚呼我羣后暨衆士維文帝以襁褓之嗣託於予訓之誨之庶厥有成而予㒺能革變厥心庸暨乎廢墜我文皇帝之志嗚呼兹咎予其焉避予實知之矧爾衆人之心㢤惟予之顏豈惟今厚將恐來世以予為口實乙亥魏帝詔封太祖子邕為輔城公憲為安城公邑各二千户三年九月太祖有疾還至雲陽命中山公䕶受遺輔嗣子冬十月崩於雲陽宫還長安發喪時年五十三葬于城陵諡曰文公孝閔帝受禪追尊為文王廟曰太祖武成元年追尊為文皇帝孝閔皇帝後周書曰孝閔皇帝諱覺字陁羅尼太祖第三子也母曰元皇后大統八年生於同州七嵗封畧陽郡公時有善相者史元華見帝退謂所親曰此公子有至貴之相但恨其夀不足以稱之耳魏恭帝三年二月命為安定公世子十月乙亥太祖崩世子嗣位為太師大冢宰十二月丁亥魏帝詔以岐陽之地封帝為周公庚子禪位于帝元年春正月辛丑帝乃即天王位柴燎告天朝百官於路門追尊皇考文公為文王皇妣為文后大赦天下封魏帝為宋公帝性剛果見晉公䕶執政深忌之司㑹李植軍司馬孫􅁪以先朝佐命入侍左右亦疾䕶權重乃與宫伯乙弗鳯賀抜提等潜謀請帝誅䕶帝許之又引宫伯張光洛同謀光洛宻白䕶䕶乃出植為荆州刺史􅁪為潼州刺史鳯等遂不自安更奏帝將召羣臣入因此誅䕶光洛又白之時小司馬尉遲綱捴統宿衛兵䕶乃召綱共謀廢立令綱入殿中詐呼鳯等論事既至以次執送䕶第並誅之綱乃罷禁兵帝方悟無左右獨在内殿令宫人持兵自守䕶又遣大司馬賀蘭祥逼帝遜位遂幽舊邸月餘以弑崩時年十六䕶誅後諡孝閔皇帝陵曰靖陵明皇帝後周書曰明皇帝諱毓小名統萬突太祖長子也母曰姚夫人永熙三年太祖臨夏州生帝於統萬城因以名焉大統十四年封寕都郡公十六年行華州事尋拜開府儀同三司冝州諸軍事冝州刺史魏恭帝三年授大將軍鎮隴右孝閔踐祚進位柱國轉岐州諸軍事岐州刺史治有美政黎民懐之及孝閔帝廢晉公䕶遣使迎帝於岐州秋九月癸亥至京師止於舊邸甲子羣臣上表勸進備法駕奉迎帝固讓羣臣固請是日即天王位大赦天下乙丑朝羣臣於延夀殿武成元年春正月乙酉太師晉公䕶上表歸政帝始親覽萬㡬軍旅之事䕶猶總焉初改都督諸州軍事為總管八月己亥改天王稱皇帝追尊文王為文皇帝大赦改元二年春正月癸丑朔大㑹羣臣於紫極殿始用百戯三月辛酉重陽閣成㑹羣公列將卿大夫及突厥使者於芳林園賜錢帛各有差夏四月帝因食遇毒庚子大漸辛丑崩於延夀殿時年二十七諡曰明皇帝廟稱世宗葬昭陵武皇帝後周書曰髙祖武皇帝諱邕字禰羅突太祖第四子也母曰叱奴太后大統九年生於同州有神光照室㓜而孝敬聡敏有器質太祖異之曰成吾志者必此兒也年十二封輔城郡公孝閔帝踐祚拜大將軍出鎮同州世祖即位遷柱國授蒲州諸軍事蒲州刺史武成元年入為大司空治御正進封魯國公領宗師甚為世宗所親愛朝廷大事多共參議性沉深有逺識非因問終不敢言世宗每嘆曰夫人不言言必有中武成二年世宗崩遺詔傳位於帝帝固辭百官勸進乃從之壬寅即皇帝位大赦天下保定元年春正月戊寅詔曰寒暑亟周奄及徂嵗改元命始國之典章朕承寳圖冝遵故事可改武成三年為保定元年嘉號既新惠澤冝溥文武百官各増四級以大冢宰晉國公䕶為都督中外諸軍事四年十月詔大將軍大冢宰晉國公䕶率軍伐齊於太廟庭授以斧鉞於是䕶乃率軍出潼闗大將軍權景宣率山南諸軍出豫州少師楊標出軹闗天和元年正月大赦改元五月甲午詔曰道徳交喪禮義嗣興褒四始於一言美三千於為敬是以在上不驕滿而不溢冨貴所以長守邦國於焉久安故能承天静地和民敬鬼明並日月道合四時朕雖庸昧有志前古甲子乙夘禮云不樂萇𢎞表昆吾之稔杜蕢若怪切有楊觶之文自世道喪亂禮義紊毁此典茫然已墜於地昔周王受命請聞顓頊廟有戒盈之器室為復禮之銘矧伊未學而能忘此冝依是日省事停樂庶知為君之難為臣不易貽之後昆殷監斯在四年春正月辛夘朔廢朝以齊武成薨故也遣司㑹河陽公李綸等㑹塟於齊仍弔賻焉建徳元年三月癸夘朔日有食之齊遣使來聘丙辰誅大冢宰晉國公䕶䕶子柱國譚國公㑹㑹弟大將軍莒國公至崇業公静并柱國侯伏侯龍恩龍恩弟大將軍夀大將軍劉勇等大赦改元罷中外府二年秋七月己巳祠太廟自春末不雨至於是月壬辰集百寮於大徳殿帝責躬罪已問以治政得失五年十月乙酉帝總戎東伐以越王盛為右一軍總管圮國公亮為右二軍總管隋國公楊堅為右三軍總管譙王儉為左一軍總管大將軍竇恭為左二軍總管廣化公丘崇為左三軍總管齊王憲陳王純為前軍六年春正月尉遲勒擒齊王及其太子恒於青州四月乙巳至自東伐列齊王於前其王公等並從車輦旗幟及器物以次陳於其後授大駕布六軍備凱樂獻俘於太廟京邑觀者皆稱萬嵗戊申封齊王為温國公宣政元年三月於蒲州置宫廢同州及長春宫甲戌初服常冠以皂紗為之加簮而不施纓導其制若今之折角巾也上大將軍郯國公王軌破陳師於吕梁擒其將呉明徹等俘斬三萬餘人五月己丑帝總戎北伐遣柱國平原公姬願東平公宇文静舉等率軍五道俱入發闗中公私驢馬悉從軍癸巳帝不豫止於雲陽宫丙申詔停諸軍事六月丁酉帝疾甚還京其夜崩於乘輿時年三十六諡曰武皇帝廟稱髙祖塟孝陵宣皇帝後周書曰宣皇帝諱贇字乾伯髙祖長子也母曰李太后武成元年生於同州保定元年五月丙子封魯國公建徳元年四月癸巳髙祖親告廟冠於阼階立為皇太子詔皇太子巡撫西土文宣皇后崩髙祖諒隂詔太子總朝政五旬而罷髙祖每巡幸四方太子常留監國五年二月又詔皇太子巡西土因討吐谷渾宣政元年六月丁酉髙祖崩戊戌太子即皇帝位尊皇后為皇太后大象元年春正月癸酉受朝於露門帝服通天冠絳紗袍羣臣皆服漢魏衣冠大赦改元大成初置四輔官以上柱國大冢宰越王盛為大前疑相州總管蜀國公尉遲逈為大右弼申國公李穆為大左輔大司馬隋國公楊堅為大後丞二月辛巳詔曰皇太子衍地居上嗣正統所歸逺慿積徳之休允協無疆之祚帝王之量不肅而成天祿之期不期已至朕今傳位於衍乃睠四海深合謳歌之望俾予一人髙蹈風塵之表萬方兆庶知朕意焉可大赦天下改大成元年為大象元年帝於是稱天元皇帝所居稱天䑓冕二十有四旒車服旗鼔皆以二十四為節内史御正皆置上大夫皇帝衍稱正陽宫置納言御正諸御等官皆准天臺尊皇太后為天元皇太后二年五月甲午夜帝備法駕幸天興宫乙未帝不豫還宫詔隋國公堅入侍疾己酉大漸御正下大夫劉昉與内史上大夫鄭譯矯制以隋國公堅受遺輔政是日帝崩於天徳殿時年二十二諡曰宣皇帝葬定陵静皇帝後周書曰静皇帝諱衍後改為闡宣帝長子也母曰朱皇后建徳二年六月生於東宫大象元年正月癸夘封魯王戊午立為皇太子二月辛巳宣帝於鄴宫傳位授帝居正陽宫二年夏五月乙未宣帝寢疾詔帝入宿於露門己酉宣帝崩帝入居天臺廢正陽宫大赦天下停洛陽宫作大定元年春正月壬午詔曰朕以不天夙遭極罸光隂迅速遽及此辰窮慕纒綿言増號絶踰祀革號憲章前典可改大象三年為大定元年二月庚申大丞相隋王楊堅為相國總百揆備九錫之禮又加冕十有二旒建天子旌旗出警入蹕並依魏晉故事甲子隋王楊堅稱尊號帝遜於别宫隋氏奉帝為介國公邑萬户車服禮樂一如周制上書不為表答不稱詔有其文事竟不行開皇元年五月壬申崩時年九嵗諡曰静皇帝葬恭陵太平御覽卷一百五
