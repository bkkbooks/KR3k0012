  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_560-1a, image: WYG0898/WYG0898-0174a.png}
body:
  text: 太平御覽卷五百六十宋李昉等撰禮儀部三十九塜墓四禮論曰問君將臨墓主人先以除身無服將若不哭主人當哭否賀循答之云凡君臨臣民皆須先君哭禮也此際君宜哭則主人不敢以哭煩君耳又問墓中有何面為上荀納以為縁生奉終宜依禮坐蔡謨雖據周公明堂位東西以北為上與納反納又引廟位以答王濮陽北墓向南以西為墓上上黨郡記曰令狐徵君隠城東山中令狐終即為冢焉諸生遵師法而陪葬者三百餘家松千樹大皆數十圍高四五十丈今俗名其山曰令狐墓漢史所稱壺闗三老令狐茂者是也伏琛齊地記曰臨淄小城北門東二百餘步有晏嬰冢又曰齊桓公冢齊城之南東十五里在牛山桓公冢西南八里有仲父冢葬於牛山之阿又曰朱虎城東二十里有柴阜其西南隅有魏獨行君子管寧墓石碑猶存東北三十里柴阜東頭有魏徴士邴原墓石碑猶存吴地志曰閶門外女墳者吴王闔閭女墓乃以文石為椁藏金玉珍玩以人從死高墳深池池水成湖故名曰女墳亦與虎邱俱見發掘皆無所得也又曰閶門南有要離墓吴王闔閭既殺王僚而代之僚子慶忌亡奔衞慶忌勇健過人恐結諸侯還為國難伍子胥與要離為行人要離弱而謀于王曰殺臣妻子刑臣右手要離因亡奔衞慶忌聞吴王暴虐如此甚信之遂與俱還共襲吴王行及大江要離刺殺慶忌因亦自殺闔閭葬之於閶門南大城内門外有慶忌墓丘淵之齊道記曰先是嬴博二縣共界漢武帝封禪割此作縣以供祀故曰奉高東南三十里有延陵兒冢本云其高可隠今乃二丈餘似是後人培之伍輯之從征記曰齊襄王墓在汝水西墓西有僖公墓東有四舊墓傳云倨云黄市也墓皆方墓圓墳戴延之西征記曰彭城南有亞父范増冢冢高四十餘丈東北有隧道其城北三十里有劉向墓泗水東三里漢大夫龔勝冢石碣猶存又曰金鄉焦氏山北數里有漢司𨽻校尉魯俊冢前有古石祠堂堂壁皆有青石隠起自書契以來忠臣孝子貞婦孔子及弟子七十二人形像皆刻石記之伏滔北征記曰姑孰九井山北十里山有吴人大將諸葛瑾墓墓牆猶存西北十八里直瀆前墓是吴將甘寧墓也相者云此墓有王氣孫皓鑿其後計里名為直瀆續述征記曰太公冢在堯山北五里平地為墳高十丈曽有發之者冢深數十仭得一銅椁金玉甚多尚父五世葬周斯寔田和冢也和遷齊居於海上而别為諸侯亦稱太公也又曰宿預州縣水南大徐城古之徐國城北徐君墓季札解劒掛樹則斯地也又曰城陽縣城二里小城南九里有堯冢自漢迄于晉二千石及承尉刋名堯即位至永嘉三年二千七百有二十一載記于堯碑城東南六里堯母慶都墓稱曰靈臺堯陵北二里仲山甫墓墓前祠堂石室儼然若新皇覽冢墓記曰顓頊冢在東都濮陽縣頓丘城外廣陽里中王莽時使使者祠顓頊冢又曰秦始皇冢在驪山古之驪戎國今之新豐也晉獻公伐驪戎獲二女其山隂多黄金其陽多美玉謂藍田是也故貪而葬焉并天下徒七十餘萬穿入地洞三泉而致椁宫觀竒器珍怪諸物藏之令一匠人作機弩人有近穴輙射之以水銀為百川江河大海金銀為鳬鶴機闗轉相幹終而復始上具天文以人魚膏為燈度乆不滅后宫無子者皆殉從死者甚衆恐匠知之殺工匠於藏中因閇羡門復土樹草木以像山墳高五十餘丈周迴五里餘後項籍燒其宫觀闗東賊發之後牧羊兒亡羊羊入藏中持火覔羊燔其椁後賊遂取其銅又曰太上皇葬萬年高帝父也高帝葬長陵孝惠帝霸陵諸陵皆用瓦器不為墳王莽之亂天下無道獨無灾害景帝葬陽陵孝武皇帝葬茂陵孝昭皇帝葬平陵孝宣皇帝葬杜陵孝元皇帝葬渭陵元帝下詔曰無置徙民令天下無騷動之憂自是陵園不置邑孝成帝葬延陵孝哀帝葬義陵孝平帝葬原陵孝文皇帝弟淮南厲王長坐謀反後置園如諸王長好道事八公世之愚者云長仙醫巫說曰淮南好道百官皆得仙狗吠雲中雞鳴天上東平思王冢在東平松皆西靡又曰蒼頡冢在馮翊衙縣利陽亭南道旁墻高六尺學書者皆往上姓名投刺祀之不絶又曰蚩尤冢在東郡夀張縣闗鄉城中高七尺民常十月祀之有赤氣出如一疋絳帛民名為蚩尤旗又有髀冢在山陽郡鉅野縣傳言蚩尤與黄帝戰於涿鹿之野黄帝克之身體異處皆葬之又曰奚仲冢在魯國縣東去縣二十五里山上因名奚仲山下亭名奚仲亭又曰湯冢在濟隂薄縣北郭冢四方八十步高七尺上平又曰吴太伯冢在會稽吴縣北去城十里又曰周文王武王周公冢在京兆長安縣又曰王子黽音猛冢在南陽鄂縣西又曰夏育冢在濟南歴山上又曰秦穆公冢在甘泉宫祈年觀下又曰虢公冢在河内温縣東濟水南大冢是也其城南有虢公臺又曰葉公諸梁子高冢在南郡葉縣西北去城三里所近縣民皆祠之又曰魯大夫叔梁紇冢在魯國東陽聚安泉東北八十四步名曰防冢民傳曰防墳於墳地微高又曰孔子冢在魯城北便門外南去城十里冢塋方百畆冢南北廣十步東西十步高丈二尺冢為祠壇方六尺與地方平無祠堂冢塋中樹以百數皆異種魯人世世皆無能名其樹者魯民云孔子弟子異國人各持其國樹來種之孔子塋中不生荆棘及刺人草伯魚墓孔子冢東邊與孔子並大小相望子思冢在孔子冢南大小相望又曰伯樂冢在濟南定陶東南一里冢高五丈又曰師曠冢在右扶風名曰師曠山人民不敢上其山又曰楚武君冢在汝南郡鮦音紂陽縣葛陂鄉城東北民謂之楚王岑又曰鄭相子産塚在河南縣新鄭縣城外大塚是也又曰靖郭君冢在魯國薛城中東聚孟甞君冢在魯薛城中又曰文信君吕不韋冢在河南洛陽城北邙山道西大冢是也民傳言吕母冢不韋先墓故其冢名吕母不韋死獲過於始皇矣民傳云不韋好經書皆以葬漢明帝朝公卿大夫諸儒八十餘人論五經誤失符節令宋元上言臣聞昭王與不韋好書皆以書葬王至尊不韋乆貴冢皆以黄膓題凑處地高燥未壊臣願發昭王不韋冢又曰亞父冢在廬江居巢縣郭東居巢亭中又曰齊桓公冢在臨淄城二十里淄水南孟甞君與齊桓公冢同處唐書新語曰開元中集賢學士徐堅葬妻問兆域之制於張說曰長安神龍之際有黄州僧泓道通鬼神之意而以人事參之僕甞聞其言猶記其要墓欲深而狹深者取其幽狹者取其固平地之下一丈二尺為土界又一丈二尺為水界各有龍守之土龍六年而一暴水龍十二年而一暴當其隧者神道不安故深二丈四尺之下可以設窀穸墓之四維謂之折壁欲下濶而上歛其中頃謂之中樵中樵欲俯嶔而傍煞墓中米粉為飾以代石堊不置瓴甋瓦以其近於火不置黄金以其乆而為怪不置朱丹雄黄礬石以其氣燥而烈使墳上草木枯而不潤不置羽毛以其近於屍也鑄鐵為牛豕之象可以禦二龍玉潤而潔能和百神置之墓内以助神道僧泓之說如此又曰大理卿徐有功持法不濫及其葬也將穿冢筮者曰必有異應以旌善人果獲石堂其大如倉中空外堅四門八牖占曰此天所以祚有徳也置之墓中其後終吉後優詔褒贈寵及其子圖墓書曰大墓天剛嚴父之門八將之首位處乾尊欲得連堽隠軫狀如亂雲望之翽翽絶而復連小頓大起千里相牽夀過期頥世世登仙又曰望之如飛電即之如鳥驚法出勇士仗節御兵又曰夫欲依山葬者其山連延百里不絶一高一下小頃則大起出公卿若三重之山望之似城郭多諸支别者亦出公卿如新月形在腹中葬冢之所若至日没見日光者出封侯又曰凡相山陵之法山望如龜狀葬之出公卿封侯代代不絶山望如龍狀有頭尾蜲虵葬之出二千石凡依山作冢皆當立在山東為利得山之形力也山如龜形又巍巍直上如鬭狀出二千石又曰欲知貧富堽陵肥薄狀如馬形草木茂盛色黄紫皆富也堽陵多傷缺土色赤白地瘦草木黄赤不茂或多細石皆貧相冢書曰冢欲得見郡縣城郭欲得連屬長長無極冢青氣鬱鬱出二千石赤氣出公卿白氣出刑戮黄氣出封侯欲得雌龍地多子孫不用雄龍堽武子堽又曰凡葬於龍耳出貴侯青烏子稱山三重相連名傘山葬之出二千石張載七哀詩曰北邙何纍纍高陵有四五借問誰家冢皆云漢世主魏武帝遺命曰汝等時登銅雀臺望吾西陵墓田魏文帝為漢帝置守冢詔曰朕承符運受終革命其敬事山陽公如舜之宗堯有始冇卒傳之無窮前羣司奏處正朔欲使一皆從魏制意所不安其令山陽公於其國中正朔服色祭祀禮樂自如漢又為武昭宣明帝置守冢各三百家宋孝武置自古帝王守冢户詔曰先代帝王因時創業君人建國禮尊南面而歴運推移年代乆逺丘壠殘毀樵牧相趨塋兆煙蕪封樹莫辨自古以來帝王陵墓可隨近十户蠲其役以供守視宋高祖修楚元王墓詔曰夫褒賢崇徳千載彌尊敦本敬始義隆自逺楚元王積仁基徳啓藩斯境素風道隆作範後昆本支之祚實隆鄙宗遺芳餘烈奮于百代而丘封翳然墳塋莫翦感逺存往慨焉永懐夫愛人懐樹甘棠且猶勿剪追甄虛墓信陵尚或不絶况𤓰瓞所興開源自本者乎蠲復近墓五家長給洒掃太平御覽卷五百六十
