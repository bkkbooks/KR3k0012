body:
  text: 太平御覽卷一百二十五宋李昉等撰偏霸部九後凉呂光呂纂吕隆後燕慕容垂慕容寶慕容盛慕容熈慕容雲後凉吕光崔鴻十六國春秋後凉録曰呂光字世明略陽氐人其先自沛遷略陽因家焉世為氐酋父婆樓字廣平佐命前秦官至太尉光以趙建武中生于枋頭夜有神光之異故名焉年十歳與諸兒童逰戲邑里為戰陣之法童兒咸推為主長而身長八尺四寸目重瞳子左肘有肉印沉毅㘈重寛簡有大量人莫之知唯王猛異之曰此非常人言之苻堅舉賢良除美陽令民夷憚愛隣境肅清遷鷹揚将軍以功賜爵關内侯建元十九年以光為使持節都督西討諸軍事率将軍姜飛彭晃杜進康盛等率歩騎七萬討西域十二月至龜兹龜兹王帛純捍命不降光軍其城南五里為一營深渠髙壘廣設疑兵為木人被甲羅之壘上以為持乆之計二十年五月帛純乃傾國財寶請救于徻胡王遣弟呐龍侯将馗率騎二十餘萬救之胡便弓馬善矛槊鎧如連鏁射不可入及以革索為羂策馬擲人多有中者衆甚憚之從征諸將咸欲每營結陣按兵以拒諸胡光遷營相接陣為勾鏁之法精騎為遊軍彌縫其闕秋七月戰于城西大敗之帛純逃奔王侯降者三十餘國進入其城城有三重廣輪與長安城等城中塔廟千數帛純宫室壮麗煥若神居胡人奢侈富于生養家有蒲桃酒至千斛經十年不敗士卒淪没酒藏者相繼諸國貢欵屬路立帛純弟震為王以安之光撫寧西域威恩甚著秦以光為使持節散騎常侍都督玉門已西諸軍事安西将軍西域校尉進封順鄉侯二十一年正月大饗文武博議進止衆咸請還光從之三月引還以駝二萬餘頭致外國珍異千餘品駿馬萬餘匹而還九月光入姑臧自領凉州刺史䕶羌校尉太安元年苻丕以光為車騎大将軍凉州牧領䕶西域大都督酒泉公光始聞苻堅為姚萇所害奮袂哀怒三軍縞素大臨于城南傳檄諸州期孟冬大舉諡堅為文昭皇帝十月大赦境内改建元為太安十一月羣寮勸進曰長虵未殄方掃清國難宜進位元台十二月上光為侍中中外都督督隴右諸軍事大将軍凉州牧酒泉公三年八月甘露降逍遥園白燕翔于酒泉衆燕成列而從之麟嘉元年正月麟見金澤縣百獸從之于是羣寮奉請崇進名號光從之二月僣即王位于南郊大赦改元置官司丞郎以下猶攝州縣事三年九月大廟新成追尊父為景昭王祖為宣公曽祖為恭公髙祖為敬公龍飛元年五龍見于浩亹羣臣咸共賀勸光稱號六月僣即天王位于南郊大赦改年備置羣司立世子紹為太子四年九月光寝疾十二月疾甚立太子紹為天王光自號太上皇帝以子纂為太尉𢎞為司徒詔曰吾疾病不濟吾終之後使纂綂六軍𢎞管朝政汝恭己無為委重二兄庻可以濟今外有强寇民心未寧汝兄弟輯睦貽厥萬世若内相圖則禍不旋踵纂𢎞泣曰不敢有二心薨葬髙陵諡懿武皇帝廟號太祖呂纂崔鴻十六國春秋後凉録曰吕纂字永緒光之長庶子母趙淑媛少便弓馬不好讀書太安元年至于姑臧光臨薨執手戒之曰汝性麤武深爲吾憂開基既難守成不易善輔永業勿聽讒言光薨紹祕不發喪纂排閣入哭盡哀而出紹懼以位讓之曰兄功高年長宜承大綂纂曰臣雖長陛下國家之適不可以私愛而亂大倫驍騎吕超謂紹曰纂臨喪不哀步高視逺觀其舉止恐成大變宜早除之纂聞超謀遂率壮士數百踰北城攻廣夏門入自青角門升謙光殿紹登紫閣自殺呂超出奔廣武纂遂僣天王大赦改龍飛四年為咸寧元年諡紹隱王纂遊田無度荒躭酒色常與左右因醉馳獵于坑澗之間殿中侍御史王回扣馬諫不納番禾太守吕超擅伐鮮卑思盤思盤訴超于纂纂召超入朝怒曰卿恃兄弟桓桓欲欺吾也要當殺卿然後天下可定超頓首曰不敢纂引諸臣宴于内殿呂隆屢勸纂酒已至昏醉乘步輓車将超等遊于内至琨華堂東閣超取劍擊纂纂下車擒超超刺纂洞胷奔于宣德堂将軍魏益多入斬纂首以徇隆既簒位諡靈帝葬白石陵呂隆崔鴻十六國春秋後凉録曰呂隆字永基光弟寶之子既殺纂遂僣即天王位大赦改咸寧三年為神鼎元年二月追尊父寶為文皇帝超有佐命之勲拜為侍中都督中外諸軍事輔國大将軍録尚書封安定公二年秦遣鴻臚恒敦拜隆征北大将軍都督河西諸軍凉州牧建康公三年隆以二凉之逼遣賫􅈿寶請迎於秦秦遣尚書左僕射齊難率步騎四萬來迎隆率戸一萬隨難東遷既至長安秦以隆為散騎常侍尚書公如故超為安定太守其後坐與姚興少子廣平公弼謀反誅吕光以乙酉歳據凉州至于是歳歳在癸卯凡一十九年後燕慕容垂崔鴻十六國春秋後燕録曰慕容垂字道明皝第五子小字阿六敦母蘭淑儀垂少有器度長七尺七寸手垂過膝皝甚寵之常曰此兒闊達好竒終能破人家或能成人家故名霸字道業因墜馬傷前二齒慕容雋即王位因改名􅆙外以慕郤􅆙為名内惡而改之尋以讖記之文去夬以垂為名及雋僣稱尊號封吳王建熙十年以車騎大将軍敗桓温于枋頭威名大震太𫝊上庸王評深忌之垂遂出奔秦苻堅聞垂至大悦郊迎執手禮之甚重王猛惡垂雄畧勸堅殺之堅不從以為冠軍将軍封賔都侯厯京兆尹苻堅敗于淮南垂軍獨全堅以千餘騎奔之世子寶言于垂曰國家傾喪皇綱廢弛當隆中興之業建少康之功宜恭承皇天之意因而取之垂曰彼悉心投命若何害之乃以兵屬垂垂至澠池言于堅曰王師不利北境之民或因此輕重請奉詔輯寧朔裔且龍鄴舊都陵廟所在乞過展拜以申罔極堅許之權翼諌曰垂爪牙名将今之韓白且世豪東夏志不為人下頃以避禍歸誠非慕徳而至恐冠軍之號不飽其志列地百里未滿其心且垂猶鷹也飢則附人飽便髙颺遇風塵之會必有凌霄之志堅曰卿言是也但朕已許之匹夫猶重信况萬乗之主乎翼曰陛下重小信而忽社稷臣見其往不見其還關東之變垂其首乎垂自凉馬臺結草筏而渡至安陽修箋于長樂公丕垂至館之于鄴西會苻暉告丁零翟斌聚衆四千謀逼洛陽丕于是配垂兵二千遣廣武将軍苻飛龍率氐騎一千為垂之副丕戒飛龍曰垂為三軍之統卿為謀垂之主苻暉告急簡書相尋垂方圖飛龍停河内不進悉誅氐兵命左右殺飛龍濟河焚橋衆至三萬及洛陽苻暉閉關門拒守不與交通翟斌率衆會垂勸稱尊號垂曰新興侯國之正統孤之君也若以諸軍之力得平関東當以大義喻秦奉迎反正誣上自尊非孤心也乃自稱大将軍燕王承制行事翟斌為建義将軍封河南王弟德為范陽王衆至二十萬濟自石門長驅攻鄴元年正月朝羣寮于清陽宫以暐在長安依晉愍帝在平陽中宗稱王改年建武故事改秦建元為燕元元年立太子寶為燕太子攻㧞鄴郛丕固守中城垂塹而圍之于魏郡肥鄉築新興城以置輜重進師攻鄴開其西奔之路二年三月丕棄鄴奔幷州以魯陽王和為南中郎将鎮鄴十二年垂定都中山建興元年正月羣寮勸垂正尊號辛卯僣即皇帝位于南郊大赦改元建興立子寶為皇太子十年五月太子寶率衆八萬伐魏范陽王德為之後繼魏聞寳将至徙于河西寶臨河不敢濟引師還次于參合俄而魏軍大至三軍奔清寳與德等數千騎奔免十一年三月垂大衆出參合太子寳出天門垂至參合見積骸如山設祭弔之死者父兄各皆號哭軍中哀慟垂慚憤嘔血因而寝疾築燕昌城而還寳等至雲中聞垂疾皆引歸及垂于平城夏四月薨于上谷之爼陽年七十二諡武成皇帝廟號世祖晉書曰以太元二十一年死在位十三年墓曰宣平陵慕容寳崔鴻十六國春秋後燕録曰慕容寳字道祐垂第四子元璽四年生于信都少輕果無志操好人從己段后諌垂曰太子資質雍容柔而不斷非濟世之雄遼西髙陽陛下兒之賢者宜擇一樹之垂不納謂曰汝謂我為晉獻公乎建興十一年四月僣即皇帝位大赦改元為永康元年寳遣将軍趙王麟逼段后曰常謂主上不能嗣守大統今竟能不宜早自裁以全段氏后怒曰汝兄弟上逼殺母豈能保守社稷吾豈惜死念國滅不乆遂自殺八月立妃段氏為皇后濮陽公策為皇太子二年正月魏使修和寳不許二月魏攻中山其夜尚書慕容皓謀殺寳立趙王麟寶與太子策等萬騎就清河公㑹於薊以開封公慕容詳守中山五月中山饑麟出據新市與魏師戰于義臺敗績南奔魏入中山寶遣御史中丞兼鴻臚魯遂持節授司空范陽王德丞相冀州牧承制南夏封公封侯牧守三年二月寶發龍城以撫軍慕容騰為前軍歩騎三萬将南伐次于乙連長上段速骨宋赤眉因民之憚逺役殺司空樂浪王宙衆既幸亂投仗奔走寳馳還龍城又與長樂王盛等南奔尚書蘭汗殺速骨等十餘人奉太子策承制大赦遣迎寳及于薊寳欲北還盛等咸以汗忠欵虛寳未明宜就范陽王德寶從之乃自薊而南四月寳至鄴鄴中遺民固請留之寳不從南至黎陽城西聞范陽王德稱制懼而退乃還龍城次于廣都蘭汗又遣左将軍蘓超迎寳具申欵誠忠節無差寳于是命發汗遣弟難率五百騎迎寳至龍城汗引寶入于外邸殺之年四十四殺太子策及王公卿士百餘人汗自稱大將軍大單于昌黎王年號青龍七月長樂公盛襲誅汗盛即位偽諡寳惠愍皇帝廟號烈祖慕容盛崔鴻十六國春秋後燕録曰慕容盛字道運寳之庶長子秦建元十年生于長安二十年苻堅誅慕容氏盛東奔既至垂問以西事畫地成圖垂笑謂之曰昔魏撫明帝之首遂乃侯之祖之愛孫有由來矣于是封長樂公建興六年領北中郎鎮薊進爵為王及寳為蘭汗所殺盛馳赴哀盛潜結大衆謀討難及汗等斬之青龍元年七月告成宗廟大赦改元建平謙揖自卑不稱尊號以長樂王稱制諸王貶爵為公東陽公慕容根等九十八人上尊號盛不許十月根等又請盛許之丙子僣即皇帝位正月朝羣臣于承乾殿大赦改建平元年為長樂元年二年正月大赦盛去皇帝之號稱庶民天王三年八月右将軍慕容國謀率禁兵襲盛前将軍段璣等因衆心阻動潜于禁中鼓譟大呼盛聞變率左右出戰衆皆披潰俄有一賊從闇中擊傷盛足取輦升前殿召叔公河間公熈嘱以後事熈未至而薨年二十九偽諡昭武皇帝廟號中宗晉書曰盛幼而覊賤流漂長則遭家多難夷險安危僃嘗之矣懲寶闇而不斷遂峻極威刑纎芥之嫌莫不裁之于未萌防之于未兆于是上下震恐人不自安雖忠誠親戚亦皆離貳舊臣靡不夷滅安忍無親所以卒于不免是歳隆安五年也慕容熈崔鴻十六國春秋後燕録曰慕容熈字道文一名長生垂之少子燕元二年生于長山建興八年封河間王永康初隨寳奔龍城拜司𨽻校尉長樂元年遷僕射中外都督領昌黎尹盛薨僣即皇帝位大赦改長樂三年為光始元年二年正月熈引見州郡耆舊于宫問以民間疾苦司𨽻部民劉瓉對問稱㫖拜帶方太守是春大治宫室至四月立苻貴人為昭儀五月築龍騰苑廣十里餘役徒二萬起景雲山于苑内又起逍遥宫甘露殿連房數百觀閣相交鑿天河渠引水入宫又為苻昭儀鑿曲光海清凉池季夏暑熱士卒不得休息暍死者大半四年二月昭儀苻氏卒立苻貴嬪為皇后九月苻后遊畋熈從之北登白鹿山東過青嶺南臨滄海冬十一月乃還百姓苦之卒為狼虎所害及凍死者五千餘人五年十月擬鄴之鳯陽作𢎞光門累級三層建始元年正月大赦天下三月太史丞梁延年夢月化為五白龍夢中占之曰月臣也龍君也月化為龍當有臣為君寤而告人曰國符其将盡乎是月為苻后起承華殿髙承光一倍負土於北門土與穀同價典軍杜静載棺詣闕上書諫大怒斬之后嘗季夏思凍魚鱠冬須生地黄皆下有司切青不得加以大辟四月苻后崩熈悲號躃踊若喪考妣擁其尸而撫之曰體已就冷命遂斷矣于是僵仆氣絶乆而乃蘇服斬縗食粥百寮于宫内設位哭臨使有司按檢哭者有涙以為忠孝無淚則加罪羣臣震懼莫不含辛以為淚髙陽王妃張氏熈之嫂也美姿容熈欲以為殉乃毁其禭鞾中有弊氈遂賜死三女叩頭求哀熈弗許營陵周輪數里下固三泉内圖畫尚書八座之像熈曰善為之朕将隨后入此陵轜車髙大毁北門而出中衛将軍馮䟦左衛将軍張興先皆坐事亡奔以熈政之虐也與䟦從兄萬泥等二十二人結盟推夕陽公慕容雲為主發尚方徒五千人分屯四門入宫授甲閉門拒守中黄門趙洛生奔告熈熈曰此鼠盗耳朕還當誅之乃收髮貫甲馳還赴難夜就城攻北門不尅遂入龍騰苑左右潰散熈微服逃于林中為人執送雲等殺之年二十三雲葬之徽平陵諡曰昭文皇帝晉書曰垂以孝武帝太元八年僣立至熈四世凡二十四年以安帝義熈二年滅慕容雲崔鴻十六國春秋後燕録曰慕容雲字子雨寳之養子祖父高和髙句麗之支庶自云髙陽氏之苗裔故以髙為氏寶之為太子雲以武藝給侍東宫永康初拜侍御郎以疾去官及熈葬后馮䟦詣之告以大謀雲懼䟦等强之四月即天王位復姓髙氏大赦改建始元年為正始元年國仍號大燕以馮䟦為侍中都督中外諸軍録尚書事武邑公慕容歸為遼東公立燕之宗社三年冬十月雲臨東堂幸臣離班桃仁懷劍執紙而入稱有所啓抽劍擊雲雲以几拒班桃仁進而殺之立馮䟦為主即位偽諡為惠懿皇帝始垂以丙戌之歳建號中山至馮䟦之歳歳在己酉二十四年太平御覽卷一百二十五
