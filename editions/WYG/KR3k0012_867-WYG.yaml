  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_867-1a, image: WYG0900/WYG0900-0569a.png}
body:
  text: 太平御覽卷八百六十七宋李昉撰飲食部二十五茗爾雅曰檟苦茶樹小似梔子冬生葉可煑作羮食今呼早採者為茶晩採者為茗一名荈蜀人名為苦茶吳志曰孫皓每宴坐席無能否毎率以七升為限雖不能入口澆灌取盡韋曜飲食不過三升初見禮異密賜茶茗以當酒晉中興書曰陸納為吳興太守時衛將軍謝安嘗欲詣納納兄子俶怪納無所備不敢問之乃私蓄十數人饌安既至納所設唯茶果而已俶陳盛饌珍羞畢具及安去納杖俶四十云汝既不能光益叔父奈何穢吾素業晉書曰夏侯愷亡後形見就家人求茶又曰桓温為揚州牧性儉素每讌唯下七奠柈茶果而已宋録曰新安王子鸞豫章王子尚詣曇濟道人於八公山道人設茶茗尚味之曰此甘露也何言茶茗焉南齊書曰武帝遺詔靈坐勿以牲為祭唯設餅果茶飯酒脯而已唐史曰風俗貴茶茶之名品益衆劍南有䝉頂石花或散芽號為第一湖州顧渚之紫笋東川有神泉昌明硤州有碧澗明月房茱萸寮福州有方山之生牙䕫州有香山江陵太湖南有衡山岳州有㴩湖之含膏常州有久興之紫筍婺州有東白睦州有鳩坑洪州有西山之白露壽州有霍山之黄芽蘄門月團而浮梁之商貨不在焉又曰竟陵僧有於水濵得嬰兒者育為弟子稍長自筮遇蹇之漸繇曰鴻漸于陸其羽可用為儀乃姓陸氏字鴻漸名羽羽有文學多意思恥一物不盡其妙茶術最著鞏縣為瓷偶人號陸鴻漸買十器得一鴻漸市人沽茶不利輙灌之羽於江湖稱竟陵子又於南越稱桑苧翁貞元末卒又曰韓滉聞奉天之難以采練囊緘茶末徤歩具以進上又曰貞元九年春初稅茶先是諸道鹽鐵使張滂奏曰伏以去秋水災詔令减税今之國用須有供備伏請出茶州縣及茶山外商人要略委所由定三等時估每十稅一價錢充所放兩稅其明年已後所得税外収貯若諸州遭水旱賦税不辦以此代之詔曰可仍委張滂具䖏置條奏自是每歲得錢四十萬貫茶之有稅自此始也然税無虛歲遭水旱䖏未嘗以茶税錢拯贍又曰太和七年正月呉蜀貢新茶皆於冬中作法為之上務恭儉不欲逆其物性詔所貢新茶宜於立春後造又曰太和九年十月王涯獻茶以涯為𣙜茶使茶之有税自涯始又曰太和九年十二月諸道鹽鐵轉運榷茶使令狐楚奏㩁茶不便於民請停從之又曰元和十四年歸光州茶園於百姓從刺史房克讓之請又曰初常魯使西番烹茶帳中蕃人問曰何為者魯曰滌煩療渇所謂茶也蕃人曰我此亦有命取以出指曰此壽州者此顧渚者此蘄門者晏子春秋曰嬰相齊景公時食脱粟之飯炙三弋五邜茗菜而已廣雅曰荆巴間米茶作餅成以米膏出之若飲先炙令色赤擣末置瓷器中以湯澆覆之用葱姜芼之其飲醒酒令人不眠博物志曰飲真茶令少眠睡神農食經曰茶茗宜久服令人有功悦志本草曰茗苦茶味甘苦微寒無毒生瘻瘡利小便少睡去痰渇消宿食冬生益州川谷山陵道旁凌冬不死三月二日捋乾華佗食論曰苦茶久食益意思壺居士食忌曰苦茶久食羽化與韮同食令人身重陶𢎞景新録曰茗茶輕身換骨古丹邱子黄山君服之王浮神異記曰餘姚人虞洪入山采茗遇一道士牽三青牛引洪至瀑布山曰吾丹邱子也聞子善具飯常思見惠山中有大茗可以相給祈子他日有鷗蟻之餘不相遺也因立奠祀后令家人入山獲大茗焉廣陵耆老傳曰晉元帝時有老姥每旦擎一器茗往市易之市人競買自旦至暮其器不減茗所得錢散路傍孤貧乞人人或異之執而繋之於獄夜擎所賣茗器自牖飛去廣志曰茶叢生真煮飲為茗茶茱萸檄子之屬膏煎之或以茱萸煮脯胃汁為之曰茶有赤色者亦米和膏煎曰無酒茶晉書藝術傳曰燉煌人單道開不畏寒暑常服小石子所服者有桂花氣兼服茶酥而已續搜神記曰晉孝武世宣城人秦精入武昌山中採茗忽見一人身長一丈通體皆毛精見之大怖自謂必死毛人牽其臂将至山曲大叢茗䖏放之便去精因留採須臾復來乃探懐中橘與精精甚怖負茗而歸又曰桓宣武有一督将因時行病后虛熱更能飲複茗必一斛二斗乃飽裁减升合便以為大不足非復一日家貧后有客造之正遇其飲複茗客嘗聞世有此病仍令更進五升乃大吐有一物出如升大有口形質縮縐状如牛肚客乃令置之於盆中以一斛二斗複茗澆之此物噏之都盡而止覺小脹又増五升便悉混然從口中涌出既吐此物病遂差問此何病答云此病名斛茗瘕異苑曰剡縣陳矜妻少寡與二子同居好飲茶家有古􅊘每飲輒先祠之二子欲掘之母止之夜夢人云吾止此􅊘三百餘年今二子恒欲見毁頼相保䕶又享吾佳茗雖潜朽壤豈忘翳桑之報及曉於庭中獲錢十萬似乆埋者惟貫新母告二子祠禱愈切世説曰任瞻少時有令名自過江失志既不飲茗問人云此為茶為茗覺人有怪色自申明之曰向問飲為熱為冷又曰晉司徒長史王濛好飲茶人至輒命飲之士大夫皆患之每欲往候必云今日有水厄江氏傳曰統遷愍懹太子洗馬嘗上疏諫云今西國賣醯麫茶菜藍子之屬虧敗國體晉四王啓事曰惠帝䝉塵洛陽黄門以瓦盂盛茶上至尊晉劉琨與兄子南安州刺史演書曰前得安州乾茶二斤薑一斤桂一斤皆所須也吾體中煩悶恒仰真茶汝可信致之𫝊咸司𨽻教曰聞南方有蜀嫗作茶粥賣亷事毆其器具使無為賣餅於市而禁茶粥以困蜀姥何哉坤元録曰辰州溆浦縣山上多茶樹括地圖曰臨城縣東北一百四十里有茶山茶溪天台記曰丹邱出大茗服之生羽翼夷陵圖經曰木女觀望州等山茶茗出焉楊􅃷之洛陽伽藍記曰彭城王勰戯謂王肅曰卿不重齊魯大邦而愛邾莒小國肅對曰鄉曲所美不得不好勰復謂曰卿明日顧我為卿設邾莒之食亦有酪奴因此復號茗飲為酪奴時給事中劉縞慕肅之風專習茗飲彭城王謂縞曰卿不慕王侯八珍而好蒼頭水厄海上有逐臭之夫里内有學顰之即婦以卿言之是也其彭城王家有吳奴以此言戲之自是朝貴讌會雖設茗飲皆恥不復食惟江表殘民逺來降者好之時侍中元义欲為之設茗先問卿於水厄多少正徳不曉义意答曰下官雖生水鄉立身已来不遭陽侯之厄舉坐笑焉桐君録曰西陽武昌晉陵皆出好茗巴東别有真香茗煎飲令人不眠又曰茶花状似梔子其色稍白永嘉圖經曰縣東有白茶山吴興記曰烏程縣西温山出御荈淮隂圖經曰山陽縣南首二十里有茶坡茶陵縣圖經曰茶陵者謂山谷生茶茗本草拾遺曰臯盧苦平作飲止渇除疫不睡利水道明目生南海諸山中南人極重之廣州記曰酉平縣出臯盧茗之别名葉大而澁南人以為飲南越志曰茗苦澁亦謂之過羅陸羽茶經曰茶者南方嘉木自一尺二尺至數十尺其巴川峽山有兩人合抱者伐而掇之其樹如𤓰蘆葉如梔子花如白薔薇實如栟櫚蒂如丁香根如胡桃其名一曰茶二曰檟三曰蔎四曰茗五曰荈檟苦茶蜀西南人謂茶曰蔎早取為茶晩取為茗其上者生爛石中者生礫壤下者生黄土凡藝而不實植而不茂法如種􅆶三嵗可採陽崖隂林紫者上緑者次笋者上牙者次葉卷者上葉舒者次凡採茶在二月三月四月間茶之笋者生爛石沃土長四五寸若蕨薇始抽凌露采焉茶之牙發扵藂薄之上有三枝四枝五枝者選其中枝頴拔者采焉其日有雨不採晴有雲不採蒸擣拍焙穿封乾矣茶有千類萬狀鹵莽而言之如胡人鞾者蹙縮然犎牛臆者亷幨然浮雲出山者輪囷然輕颷拂水者㴠澹然有如陶家之子羅膏土以水澄泚之又如新治田者過暴雨流潦之經此皆茶之精腴也有如竹蘀者枝幹堅實難扵蒸擣故其形簏簁上音離下音師如霜荷者莖葉凋沮易其狀貌故其狀萎萃然此皆茶之老者也自采至于封七經日自胡鞾至于霜荷八等唐新語曰右補闕綦母景博學有著述才性不飲茶著代茶飲序其畧曰釋滯消壅一日之利蹔佳瘠氣侵精終身之累斯大獲益則歸功茶力貽患則不謂茶災豈非福近易知禍逺難見者乎雲南記曰名山縣出茶有山曰䝉山聨延數十里在縣西南按拾遺志尚書所謂蔡蒙旅平者䝉山也在雅州凡蜀茶盡出此魏王花木志曰茶葉似梔子可煮為飲其老葉謂之荈嫩葉謂之茗杜育荈賦曰調神和内倦解慵除張孟陽登成都樓詩云芳茶冠六清溢味播九區人生苟安樂兹土聊可娱左思嬌女詩曰吾家有嬌女皎皎頗白晳小字為紈素口齒自清厯有姊字蕙芳眉目粲如畫馳鶩翔園林草木皆生摘貪走風雨中倐忽數百適心為茶荈劇吹嘘對鼎䥶孫楚出歌曰茱萸出芳樹顛鯉魚出洛水泉白鹽出河東美䜴出魯川薑桂茶荈出巴蜀椒橘木蘭出髙山蓼蘇出溝渠粃粺出中田太平御覽卷八百六十七
