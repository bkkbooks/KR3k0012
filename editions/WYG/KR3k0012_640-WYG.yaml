body:
  text: 太平御覽卷六百四十宋李昉等撰刑法部六决獄易曰澤上有風中孚君子議獄緩死信發於中雖過可亮傳曰晉邢侯與雍子争鄐田久而無成士景伯如楚士景伯晉理官叔魚攝理攝代景伯韓宣子命斷舊獄罪在雍子雍子納其女於叔魚叔魚蔽斷也罪邢侯邢侯怒殺叔魚與雍子於朝宣子問其罪於叔向叔向曰三人同罪施生戮死可也雍子自知其罪而賂以買直鮒也鬻獄邢侯専殺其罪一也己惡而掠美為昬掠取也昏亂也貪以敗官為墨墨不㓗之稱殺人不忌為賊夏書曰昏墨賊殺臯陶之刑也請從之乃施邢侯而尸雍子與叔魚於市漢書曰高帝詔曰獄之疑者吏或不敢决有罪者久而不論無罪者久繋不决自今已後縣道官獄疑者各讞所属二千石官二千石官以其罪名當報之當謂處斷也讞平議也所不能决者皆移廷尉亦當報之廷尉所不能决謹具為奏附所當比律令以聞又曰景帝詔曰獄重事也人有智愚官有上下獄疑者讞有司有司所不能决移廷尉有令讞而後不當讞者不為失假令讞訖其理不當所讞之人不為罪失欲令理獄者務先寛自此之後獄刑益詳近於五聽三宥之意又曰張釋之為廷尉頃之上行出中渭橋有一人從橋下走乗輿馬驚於是使騎捕之屬廷尉釋之治問曰縣人来聞蹕匿橋下乆以為行過既出見車騎即走耳釋之奏此人犯蹕當罰金上怒曰此人親驚吾馬馬頼和柔令他馬固不敗傷我乎而廷尉云罰金釋之曰法者天子所與天下公共也今法如是更重之是法不信於民也且方其時上使使誅之則已今已下廷尉廷尉天下之平也一傾天下用法皆為之輕重民安所措其手足惟陛下察之帝良乆曰廷尉是也又曰于定國父于公斷决平羅文法者于公所决皆不恨郡中為生立祠東海有孝婦少寡無子養姑甚謹姑告隣人曰孝婦養我勤苦哀其無子守寡我老乆累壮丁奈何自經死姑女告吏婦殺我母吏捕孝婦孝婦自誣服于公以為不殺争之弗䏻乃抱其具獄哭于府上太守竟殺婦郡中枯旱三年後太守至卜筮其故于公咎其殺孝婦太守殺牛祭孝婦墓天乃大雨後于公令高大門閭容駟馬高蓋曰我治獄多隂徳子孫必有興者至定國為丞相朝廷稱之曰張釋之為廷尉天下無寃民于定國為廷尉民自以不寃又曰班固云今之聽獄者求所以殺之古之聽獄者求所以生之與其殺不辜寕失有罪今之獄吏上下相驅以刻為明深者獲功名平者多後患諺曰鬻棺者欲嵗之疫非憎人欲殺之利在於人死也今治獄吏欲陥害人亦猶此矣續漢書曰郭躬字仲孫潁川人辟公府以明法律特預朝議時有兄弟共以繩絞殺人各持一端罪不可分中常侍孫章傳詔命兄不教道弟報兄重弟減死章誤言兩報重獄已斷尚書奏矯制當斬上問躬躬曰當罰金上曰矯制殺人何謂罰金躬曰法令有故有誤章不過傳命之謬於事為誤誤者其文則輕帝曰章與囚同縣疑其故也躬曰周道如砥其直如矢君子不逆詐君王法天命刑不可委曲生意上曰善後漢書曰吴良為議郎永平中車駕近出而信陽侯隂就干突禁衛車府令徐匡鉤就車収御者送獄鉤留也詔書譴匡匡乃自繫良上言曰信陽侯就倚恃外戚干犯乗輿無人臣禮為大不敬匡執法守正反下于理臣恐聖化由是而弛帝雖赦匡猶左轉良為即丘長又曰寒朗字伯竒永平中以謁者守侍御史與三府掾共按楚獄顔忠王平辭及隧鄉侯耿建曲成侯劉建建等辭未嘗與忠平相見是時顯宗怒甚吏皆惶恐諸所連及率一切陥入無敢以情恕者朗心傷其寃試以建等物色獨問忠平而二人錯愕不能對朗知其詐乃上言建等無姦専為忠平所誣疑天下無辜類多如此帝曰即如是四侯無事何不早而乆繋耶朗曰臣恐海内别有發其姦者故未敢時上帝怒罵曰吏持兩端促提下左右方引去朗曰願一言而死小臣不敢欺欲助國耳臣見拷囚者咸共言妖惡大故臣子所宜同嫉今出之不如入之可無後責是以拷一連十拷十連百又公卿朝㑹陛下問以得失皆言舊制大罪禍及九族陛下大恩裁止於身天下幸甚及其歸舎口雖不言而仰屋竊歎臣於所陳死無悔帝意觧詔遣朗出後二日車駕幸洛陽獄録囚徒理出者千餘人又曰虞詡為司𨽻校尉臨終謂其子曰吾為朝歌長殺賊數百其中必有寃者自此二十餘年家門不増一口斯獲罪於天也又曰法雄為青州刺史毎行部録囚徒察顔色多得情偽長吏不奉法者皆觧印綬去又曰三府舉袁安能理劇拜楚郡太守是時楚王英反辭所連及繋者數千人顯宗怒甚吏案之急廹痛自誣死者甚衆安到府不入府先往案獄理其無明証者條上出之府丞掾吏皆叩頭争以為阿附反虜法與同罪不可安曰如有不合太守自當坐之不以相及也遂分别具奏帝感悟即報許得出者四百餘人又曰郭躬家代衣冠父𢎞習小杜律前書杜周武帝時為廷尉御史大夫斷獄深刻少子延年亦明律法宣帝時又為御史大夫對父故言小太守冦恂以𢎞為决曺掾斷獄至三十年用法平允為宏所决者退無怨情郡内比之東海于公年九十五卒晉書曰周處為廣漢太守有三十年滯獄處一朝悉决遣之理無不當又曰安帝義熈中劉毅鎮姑熟常出行南陵縣吏陳滿射鳥箭誤中直帥雖不傷人處法棄市承天議曰獄貴情斷疑則從輕昔有驚漢文帝乗輿馬者張釋之斷以犯蹕罪止罰金何者明其無心於驚馬也故不以乗輿之重而加異制今滿意在射鳥非有心於中人按律過誤傷人三嵗刑况不傷乎後魏書曰太平真君中以獄訟留滯始令中書以經義斷諸疑事髙允據律評刑三十餘載内外稱平允以獄者民之命也常嘆曰臯陶至徳也其後英蓼先亡劉項之際英布黥而王繼世雖久猶有刑餘之釁况凡人能無咎乎宋書曰謝荘為都官尚書奏改定刑獄曰舊官長竟囚畢郡遺督郵案騐仍就施行督郵賤吏非䏻異於官長雖冇案驗之名而無研究之實愚謂此制宜革自今入重之囚縣考正畢以事言郡并送囚身委二千石親臨覈辨必収聲吞釁然後就戮若二千石不能决乃度廷尉神州統外移之刺史有疑亦歸臺獄必令死者不怨生者無恨又曰沛郡相縣唐賜往北村彭家飲酒還因得病吐蠱虫二十餘枚臨死語妻張死後刳腹出病後張手自破視五蔵悉糜碎以張忍行割刳賜子副又不禁止論妻傷夫五嵗刑子不孝父母棄市竝非科例三公郎劉勰議賜妻痛往遵言兒識謝及理考事原心非存忍害謂宜哀矜顧顗之議以為妻子而行忍酷不宜曲通小情謂副為不孝張同不道詔如顗之議隋書曰裴藴授御史大夫與裴矩虞世基叅掌機宻善候伺人主微意若欲罪者則曲法順情鍜成其罪所欲宥者則附從輕典因而釋之是後小大之獄皆以付藴憲部大理莫敢與奪必禀進止然後决斷藴亦機辯所論法理言若懸河或輕重皆由其口剖析明敏時人不能致詰又曰裴政為少司憲用法寛平無有寃濫囚徒犯極刑者乃許其妻子入獄就之至冬将行决皆曰裴大夫致我於死死無所恨其處法詳平如此又曰郎茂除衛國令時有繋囚二百茂親自究審數日釋免百餘人歴年辭訟不詣州省魏州刺史元暉謂茂曰長史言衛國兵民不敢申訴者畏明府耳茂進曰民猶水也法令為隄防隄防不固必致奔突苟無决溢使君何患哉暉無以應之又曰于仲文字次武為安固太守始州刺史屈突尚宇文護之黨也先坐事下獄無敢繩者仲文至郡窮治遂竟其獄蜀中為之語曰明斷無雙有于公不避强禦有次武未㡬徴為御史大夫又曰梁敬真大業之世為大理司直時帝欲成光禄大夫魚俱羅之罪令敬真治其獄遂希㫖陥之極刑未㡬敬真有疾見俱羅為之厲數日而死唐書曰貞觀初太宗謂侍臣曰死者不可再生用法務従寛恕古人云賣棺者􅂅嵗之疫非憎于人利棺之售耳今有司覆一獄必求深刻欲成其考課作何道理令得平允侍中王珪曰俱任公正善人為法官若斷獄允當則増秩賜金如此則姦偽息矣太宗曰古者斷獄必訊於三槐九棘之官今三公九卿是也今後大辟罪結正法取公卿論之如是四年斷死刑二十九人天下㡬致刑措矣又曰吏部尚書長孫無忌嘗被召不解佩刀入東上閣門待罪僕射封徳彛議云監門校尉不之覺罪當死無忌誤帯刀入罰銅二十斤従之大理卿戴胄執奏曰校尉不覺與無忌帯入同為誤耳臣子之於尊極不得稱誤准律云供御湯藥飲食舟船誤不知者皆死陛下録其功非憲司所决若當據法罰銅未為得衷太宗嘉之免校尉死又曰李日知天授中遷司刑丞時用法嚴急日知獨寛平無寃濫嘗免一死囚少卿索元禮斷請殺之與日知往復至於數四元禮怒曰元禮不離刑曺此囚終無生理答曰日知不離刑曺此囚終無死法竟以兩状列上日知果直又曰潤州刺史竇孝諶妻龎氏為奴誣告云夜觧祈福則天令給事中薛季昶鞫之季昶斷錬成其罪龎氏坐斬侍御史徐有功執論龎氏罪不至死季昶又劾有功黨援惡逆法司結刑當棄市有功方視事令史垂泣以告有功曰豈吾獨死諸人長不死耶乃徐起而出則天覽法司所劾召有功詰之曰卿比斷獄失出何多耶對曰失出臣下之小過好生聖人之大徳願陛下捨小過𢎞大徳則天下幸甚則天黙然龎氏竟减罪流于嶺表又曰杜景徳為司刑丞天授中與徐有功来俊臣侯思正專理刑獄時人稱云遇徐杜者必生遇来侯者必死又曰李勉為膳部員外郎時闗東獻俘百人詔並處斬囚有仰天嘆者勉偶過問之對曰某被脅制守官非逆者勉上言曰无惡未殄遭㸃汚者半天下皆欲澡心歸化若盡殺之是驅天下以資兇逆也肅宗遽令奔騎宥釋由是歸化日至又曰顔真卿為監察御史五原有寃獄乆不决真卿至辨之天方旱獄决乃雨郡人呼之為御史雨又曰寳厯中京兆人有姑以小過鞭婦至死者府上其獄刑部郎中竇叅斷合償死刑部尚書栁公綽議曰尊毆卑非鬬且其子在以妻而戮其母非教也竟從公綽之議得减死又曰竇叅為奉先尉縣人曹芬𨽻北軍素兇暴與弟毆其女弟芬父救之不得遂投井死叅捕治芬兄弟同當死衆官皆請俟免喪叅曰子因父生父由子死若以喪延罪是殺父不坐也皆正其罪而殺之一縣皆伏又曰徳宗於廟堂別置三司以决庶獄辨争者輙撃登聞鼔裴諝上䟽曰夫諌鼔謗木之設所以達幽枉延直言今輕猾之徒援桴鳴鼔始動天聽竟因􅊏微若然者安用吏理乎上然之悉歸有司風俗通曰南郡讞女子何侍為許逺妻侍父何陽素酗酒從逺假求不悉如意陽數罵詈逺謂侍汝翁復罵者吾必撾之侍曰類作夫妻奈何相辱撾我翁者搏若母矣其後陽復罵逺遂撾之侍因上搏姑耳再三下司徒鮑宣决事曰夫妻所以養姑者也今逺自辱其父非姑所使君子之於凡庸不遷怒况所尊重乎當减死罪論又曰趙相汝南李統為冀牧阮况奏統耳目不聰宜免職任無㡬冀州有疑獄章帝問統統處當克厭上心帝曰君大聰明刺史不親郎君耳即日免况拜統侍中董仲舒決獄曰甲父乙與丙争言相鬬丙以佩刀刺乙甲即以杖撃丙誤傷乙甲當何論或曰毆父也當梟首論曰臣愚以父子至親也聞其鬬莫不有怵惕之心扶杖而救之非所以欲詬父也春秋之意許止父病進藥於其父而卒君子原心赦而不誅甲非律所謂毆父不當坐又曰甲夫乙将船㑹海盛風船没溺流死亡不得𦵏四月甲母丙即嫁甲欲皆何論或曰甲夫死未𦵏法無許嫁以私為人妻當棄市議曰臣愚以為春秋之義言夫人歸於齊言夫死無男有更嫁之道也婦人無專制擅恣之行聽従為順嫁之者歸也甲又尊者所嫁無淫佚之心非私為人妻也明於决事皆無罪名不當坐太平御覽卷六百四十
