body:
  text: 太平御覽卷二百三十一宋李昉等撰職官部二十九大理卿大理少卿大理正大理丞廷尉監廷尉評大理卿六典曰大理卿之職掌邦國折獄詳刑之事以五聽察其情一曰氣聽二曰色聽三曰視聽四曰聲聽五曰詞聽三慮盡其理一曰明慎以讞疑獄二曰哀矜以雪寃獄三曰公平以鞫庶獄少卿為之貳韋昭辯釋名曰廷尉縣尉皆古官也以尉尉民也凡掌賊及司察之官皆曰尉尉罰也言以罪罰姦非也尚書帝曰臯繇汝作士眀于五刑以弼五教論語曰孟氏使陽膚為士師士師典獄之官問於曾子曾子曰上失其道民散久矣如得其情則哀矜而勿喜韓詩外傳曰晉文公使李離為理過聽殺人自拘於廷請死於君君曰官有貴賤罰有輕重下吏之罪非子之罪也離曰法失則刑失刑失則死臣居官為長不與下吏讓位爵為多不與下吏分利君以為能聽微决疑故使臣為理今過聽殺無罪罪當死臣不能以虛自誣遂伏劒死君子曰忠矣仁矣家語曰季羔為衞士師刖人之足俄而有亂季羔逃刖者守門謂羔曰彼有􅆙羔曰君子不隧又曰此有室季羔入焉既罷羔問曰吾親刖子之足而子逃我何也刖者曰曩者君理人以法令先君後臣欲臣之免也臣知之臨當論刑君愀然不樂見於顔色臣又知之君豈私臣哉天生君子其道固然此臣之所以脫君也孔子聞之曰善哉為吏其用法一思仁恕則樹德加嚴暴則樹怨公以行之其子羔乎史記天官書曰斗魁四星貴人之牢曰大理漢書曰廷尉秦官掌刑辟有正右左監景帝中六年更名大理武帝建元四年復為廷尉又曰于定國為廷尉為人卑恭尤重經術其决獄平法務在哀矜罪疑從輕加審慎之心朝廷稱之曰張釋之為廷尉天下無寃民于定國為廷尉民自以不寃又曰朱博遷廷尉恐為官屬所誣召見正監典法掾吏謂曰廷尉本起於武吏不明法律幸有衆賢亦何憂然廷尉治郡斷獄以來二十年亦獨耳剽日久剽刼也疋妙反三尺律令人事出其中試與正監共撰前代决事吏議難知者數十事持問廷尉將為諸君覆之正監條白博皆召掾吏為平處其輕重十中八九官屬咸服又曰張釋之為廷尉文帝嘗行有人從渭橋下出乗輿馬驚捕之屬廷尉釋之奏其犯蹕當罰金上怒釋之曰法者所與天下公共也方以其時誅之則已今以下廷尉廷尉天下之平也一傾天下用法皆為之輕重民安所措其手足乎後有盗髙廟座前玉環者文帝令族之釋之奏當棄市上大怒釋之曰法如是也今盗宗廟器而族之如令愚人取長陵一抔土陛下何以加其法乎又曰張湯為廷尉决大獄欲傅古義乃請博士弟子治尚書春秋補廷尉史平亭疑法奏讞疑事必先為上分别其原以揚主之明言此自天子意非由有司也奏事有善則讓曰監掾史所為也亭者平也均也又曰杜周為廷尉其治大斆張湯而善候伺上所欲客謂周曰君為天下决平不循三尺法以三尺竹簡書法律令專以主意為獄獄者固如是乎周曰三尺安出哉前主所是著為律後主所是疏為令當時為是何古之法乎至周為廷尉獄亦益多矣二千石繫者新故相因不减百餘人又曰王先生者善黄老言處士也張釋之召居廷中王生年老與釋之及公卿㑹廷中立王生襪解顧謂釋之為我繫襪釋之前跪而繫之既退或讓王生曰何廷辱張廷尉乎王生曰廷尉方為天下名臣吾聊使繫襪欲重之諸公聞之賢王生而重張廷尉又曰下邽翟公為廷尉賔客填門及免官門外可設雀羅復為廷尉乃署其門曰一死一生乃知交情一貴一賤交情乃見又曰文帝初立聞河南守吳公治為天下第一故與李斯同邑乃徵吳公為廷尉又曰孔光為廷尉時定陵淳于長坐大逆誅長少妻乃始等六人皆以長事未發覺時棄去或更嫁及長事發丞相翟方進等議乃始等於法無以解論光以為夫婦之道有義則合無義則離乃始或嫁義已絶而欲以為妻論殺之名不正不當坐有詔以光議定東觀漢記曰陳寵為廷尉有疑獄輒手筆作議所活者甚多後漢書曰郭躬為廷尉躬家世掌法務寛平乃條諸重文可從輕者四十一事奏之事皆施行著于令又曰郭躬字仲孫為廷尉正遷廷尉家世掌法弟子鎮自廷尉左監遷廷尉凡郭氏為廷尉者七人後漢書曰楊賜遷廷尉乃嘆曰昔三后成功惟殷于民而咎繇不與焉盖􅈔之也􅈔耻也遂以世非法家固辭謝承後漢書曰范延夀宣帝時為廷尉時燕趙之間有三男共娶一妻生四子長各求離别爭財分子至聞于縣縣不能决獄讞之于廷尉於是延夀决之以為悖逆人倫比之禽獸生子屬其母以子並付母尸三男于市奏免郡太守令長等無師化之道天子遂可其言又曰傅賢遷廷尉素亷正自掌法官無私門賔客公卿宴㑹要請不往自以為貧無以報答其施常垂念刑法務從輕比至斷獄遲徊流涕在位四年治獄稱平華嶠後漢書曰吳雄字季髙以明法律斷獄平桓帝時為廷尉雄子訢孫恭三世相承為廷尉為法名家漢官儀曰光武時有疑獄見廷尉曹史張禹所問輒對處當詳衷於是册免廷尉以禹代之雖越次而授亦足以勵其臣節也魏志曰髙柔字文惠陳留圉人遷廷尉頃之護軍營士竇禮近出不還營以為亡表言逐捕没其妻盈及男女為官奴婢盈連至州府稱寃自訟莫有省者乃辭詣廷尉柔問曰汝何以知夫不亡盈垂泣對曰夫少單特養一老嫗為母事甚恭謹又哀兒女撫視不離非是輕狡不顧家室者也柔重問曰汝夫不與人怨讎乎對曰夫良善與人無讎又曰汝夫不與人交錢財乎對曰嘗出錢與同營士焦子文久求不得時子文適坐小事繫獄柔乃見子文問所坐言次曰汝頗曾舉人錢否子文曰自以單貧初不敢舉人物也柔察子文色動遂曰汝昔舉竇禮錢何言不舉耶子文怪知事露應對不次柔曰汝已殺禮便宜早服子文於是叩頭具首殺禮本末埋藏所柔使吏卒承子文辭往掘即得屍詔書復盈母子為平民班示天下以禮為戒又曰髙柔字文惠遷廷尉時獵法甚峻而宜陽典農劉龜竊於禁内射其功曹張京詣校事言之帝匿名収龜付獄柔請告者名帝大怒曰劉龜當死乃敢獵吾禁地送龜廷尉廷尉便當考掠何復請告者名吾豈妄収龜耶柔曰廷尉天下之平也安得以至尊喜怒而毁法乎重復為奏辭㫖深切帝意寢乃下張京名即還訊各當其罪又曰鍾毓遷廷尉聽君父已没臣子得為理謗又士為侯其妻不復改嫁毓所創也晉書曰孔坦字君平遷侍中廷尉多平當法合人情而時勢要自以愛憎為斷坦意不得皆行也晉中興書曰范堅為尚書右丞於時廷尉奏邵廣盗官幔合布四十疋依律棄市廣息雲宗二人自没為官奴婢以贖父尚書議可特聽堅駮之曰此為施一恩於今開萬怨於後顯宗從之正廣刑又曰王彪之遷廷尉時永嘉太守謝毅赦後殺郡人周矯矯從兄球詣州訴寃揚州刺史殷浩遣從事収毅付廷尉彪之以球為獄主身無主爵非廷尉所科不肯受與州相反覆穆帝發詔令受之彪之又上疏執據時人云張釋之以來復見斯事後魏書曰崔光韶遷廷尉卿時秘書監祖瑩以贓罪被劾光韶欲致之重法太尉城陽王徽尚書令臨淮王彧吏部尚書李神雋侍中李彧並勢望當時皆為瑩求寛光韶正色曰朝賢執事於舜之功未聞有一如何反為罪人言乎其執意不囘如此隋書曰文帝時議置六卿將除大理盧思道奏曰省有駕部寺留太僕省有刑部寺除大理斯則重畜産而賤刑名也又曰楊注字元度守大理卿注視事二日帝將親省囚徒其時繫囚二百餘人注通宵究審詰朝而奏曲盡事情一無遺誤帝甚嘉之唐書官品志曰廷尉卿梁國初建曰大理天監元年復改為廷尉有正監平三人元㑹廷尉三官與建康三官皆法冠𤣥衣朝服以監東西中華門手執方木長三尺方一寸謂之執方又曰郎楚之武德初為大理卿與太子少保李綱侍中陳叔達撰定律令又曰劉德威授大理卿太宗嘗問之曰近來刑網稍密其過安在德威奏言誠在主上不由臣下人主好寛則寛好急則急律文失入减三等失出减五等今則反是失入則無辜失出獲大罪所以吏各自愛競執深文非有教使之然畏罪之所致耳陛下但捨所急則寧失不經復行於今日矣太宗深然之又曰髙宗問大理唐臨獄繫囚之數臨對曰見囚五十餘人唯二人合死上以為囚數不多怡然形於顔色謂臨曰昔東宫卿已事朕朕承大位卿又居近職以疇日相委故授卿此任然為國之要在於刑法急則人殘法寛則失罪務令折中稱朕意焉又曰張文瓘為大理卿旬日决遣疑獄四百餘條其得罪者皆無怨言文瓘嘗有疾繫囚相與設齋以禱焉尋拜侍中兼太子賔客大理囚一時慟哭其得人心如此又曰大理卿袁仁敬暴卒繫囚聞之皆慟哭悲歌曰天不恤寃人兮何奪我慈親兮有理無申兮痛哉安訴陳兮又曰龍朔二年改大理卿為訴刑寺正卿唐新語曰唐臨為大理卿初蒞職斷一死囚先時坐死十餘人皆他官所斷㑹太宗幸寺親録囚徒他官所斷囚皆稱寃不已臨斷者嘿而無言太宗怪之問其故囚對曰唐卿斷臣必不枉濫所以絶意太宗歎息久之曰為獄固當若是囚遂見原五代史後唐書曰長興二年八月敇令後大理寺官員宜同臺省官例升進其法直官比禮直官任便㑹稽典録曰盛吉字君達為廷尉性多哀憐其妻謂吉曰君為天下執法不可使一人濫罪殃及子孫其囚無𦙍嗣者令其妻妾得入使有遺類視事十二年天下稱有恩又曰董昆字文通餘姚人也遷廷尉卿持法清峻不發私書又曰盛吉拜廷尉吉性多仁恩務在哀憐每至冬日罪囚當斷其妻執燭吉手持丹筆夫妻相向垂泣㑹稽後賢記曰孔坦遷廷尉卿獄多囚繫坦到官躬執辭狀口辨曲直小大以情不加楚撻每臺司録獄無所顧問皆靣决當時之事天文録曰平星主建廷平主天下之獄事若今廷尉之象故星讃曰平星執正綱紀也文子曰臯陶喑為大理天下無虐刑有貴乎言者也説苑曰楚令尹子文之族有干法者廷理拘之聞其令尹之族也而釋之子文召廷理而責之遂致其族人於廷理曰不是刑吾將死廷理懼遂刑其族人成王聞之不及履而至子文之室曰寡人㓜小置廷理其人以違夫子之意於是出廷理而尊子文之意反内政新序曰楚昭王時石奢為理有殺人者奢追之則其父也奢曰以父成政不孝也不行君法非忠也遂刎頸而死摯虞新禮儀曰故事祀臯陶於廷尉寺祀以社日新禮改以孟秋之月以應秋政大理少卿後魏職令曰廷尉少卿第四品上第二清用思理平斷明刑識法者北齊書曰宋世軌為廷尉少卿時大理正蘇珍之亦以平幹知名寺中為之語曰决定嫌疑蘇珍之視表見裏宋世軌謂之寺中二絶卒官廷尉御史諸囚皆哭曰宋廷尉死我等豈有生路也隋書曰趙綽為大理少卿侍郎辛亶嘗衣緋裩俗云利官文帝以為厭蠱將斬之綽曰據法不當死臣不敢奉詔上怒甚令斬綽綽解衣當斬上使人問曰竟如何綽曰執法不敢惜死上良久釋之他日又令斬二人綽曰此人坐當杖殺之非法上曰不闗卿事綽曰陛下置臣法司欲誤殺人豈得不闗臣事上曰撼大木不動者當退綽曰臣冀感天心何論大木上乃止時薛胄為大理卿胄斷獄以情而綽守法俱為稱職又曰源師煬帝即位拜大理少卿帝在顯仁宮勅宮外衞士不得輒離所守有一主帥私令衞士出外帝付大理繩之師據律奏徒帝令斬之師奏曰此人罪誠難恕若陛下初便殺之有司不闗文墨既付有司義歸恒典脱宿衞近侍者更有此犯將何以加之帝乃止唐新語曰太宗嘗謂侍臣曰大理之職人命所懸當須妙選正人用心存法無過戴胄者乃以為大理少卿又曰徐有功遷司刑少卿時周興來俊臣等羅告天下衣冠遇族者數千百家有功居司刑平反者不可勝紀時人方之于定國大理正六典曰大理正掌參議刑獄詳正科條之事凡六丞斷罪不當則以法正之禮記曰成獄辭史以獄成告於正正聽之鄭𤣥注云於周禮鄉師之屬今漢有正平丞秦所置也東觀漢記曰何敞六世祖比干遷廷尉正張湯為廷尉以殘酷見任増飾法律敞常爭之存者千數漢書曰黄覇字次公宣帝在民間時知百姓苦吏聞覇理法平召為廷尉正及夏侯勝非議下廷尉獄覇從勝受尚書謝承後漢書曰陳琳字伯真橋𤣥表琳明律令徵拜廷尉正魏志曰司馬芝字子華遷大理正有盗官練置都厠上者吏疑女工收以付獄芝曰夫刑罪之失失在苛暴今贓物先得而訊其辭若不勝掠或至誣服誣服之情不可以折獄且簡而易從大人之化也不失有罪庸世之治耳以今宥所疑以隆易從之義不亦可乎太祖從其議晉書曰江統字應元為廷尉正作三刑議又曰廷尉三官通視南臺持書舊尚書郎下遷梁制服獬豸冠介幘皁衣銅印墨綬晉中興書曰顧榮字彦先入洛以南土秀望累遷廷尉正南史曰顧協少清介有志操初為廷尉正冬服單薄寺卿蔡法度欲解褐與之憚其清嚴不敢發口謂人曰我願解身上襦與顧郎顧郎難衣食者竟不敢以遺之大理丞六典曰大理丞掌分判寺事凡有犯皆據其本狀以正刑名徒以上各呼囚與其家屬告以罪名問其狀欵不伏則聽自理唐書曰杜景佺徐有功為司刑丞與來俊臣侯思止同理獄人稱之曰遇徐杜必生遇來侯必死唐新語曰李日知為司刑丞嘗免一死囚少卿胡元禮異判殺之與日知往復至於再三元禮怒遣府史謂日知曰元禮不離刑曹此囚無不死法竟以兩聞日知果直廷尉監漢書曰邴吉字少卿稍遷廷尉監治巫蠱獄謝承後漢書曰陳咸字子威為廷尉監執獄多恩議人常從輕比多所全活皆稱其恩晉起居注曰廷尉監陸鸞上表求増築訊堂圖畫先賢像詔許之廷尉評六典曰大理評事掌出使推按凡承制而出推長吏據狀合停務及禁錮者先請魚書以往據所授之狀鞫而書之若詞有反覆不能首實者則依法拷之凡大理斷獄皆連署焉漢書曰宣帝詔曰今遣廷吏與郡鞫獄任輕禄薄其為置正平員四人其務平之涿郡太守鄭昌上言曰聖王立法明刑者非以為理救衰亂之起也今明主躬垂明聽不置廷平獄將自正若開後嗣不若删定律令律令一定愚人知所避就姦吏無所弄法今不正其本而置廷平以理其末代衰德怠則廷平將招權而為亂首也宣帝始置左右平而三輔决録注云何比干漢武時為廷尉右平謬矣又曰馬宫字游卿行能髙潔遷廷尉評又百官表曰宣帝地節三年初置左右平四人秩百石晉中興書曰顧榮字彦先遷廷尉評時趙王欲殺淮南王允官屬下廷尉議罪榮具明刑理不宜廣濫倫意解賴榮濟者甚衆隋書曰廷尉平置一人第六品下後改為評事唐新語曰敬昭道為大理評事時沂州有反者詿誤坐者四百餘人將𨽻于司農未即路繫在州獄昭道援赦文判而免之時宰相責大理奈何免反人家口大理羣官失色引昭道以見執政怒而責之昭道曰赦云見禁囚徒反者家口繫在州獄此即見禁也反覆詰對至於五六執政無以奪之詿誤者悉免三輔决録注曰茂陵何比干漢武時丞相公孫𢎞舉為廷尉右平獄無寃民號曰何公太平御覽卷二百三十一
