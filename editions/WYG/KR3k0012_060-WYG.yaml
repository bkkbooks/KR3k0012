  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_060-1a, image: WYG0893/WYG0893-0496c.png}
body:
  text: 太平御覽卷六十宋李昉等撰地部二十五海江海釋名曰海晦也主承穢濁其水黑而晦也說文曰海天池也書曰江漢朝宗于海禮記曰三王之祭川也皆先河而後海又曰洗之在阼其水在洗東祖天地之左海也禮斗威儀曰君乗土而王則海夷海夷水不揚波也論語子曰道不行乗桴浮於海公羊傳曰河海潤千里河海出雲及千里春秋感神符曰后妃恣則澤為海春秋考異郵曰黄星騁海水躍宋均曰黄星土精土主安静躍則失常史記曰天不足西北星辰西北移地不足東南以海為池也漢書曰霍去病擊匈奴封狼居胥山登臨瀚海如淳注日北海也謝承後漢書曰汝南陳茂嘗為交阯别駕舊刺史行部不渡漲海刺史周敞渉海遇風船欲覆沒茂抜劍訶罵水神風即止息晉書曰鮑靚為南海守嘗行部入海遇風飢甚聚白石煮食之以濟又曰李涓遼東人祖敏海溪河内太守去還鄉遼東太守公孫度欲强用之敏乘輕舟浮海莫知所終王隠晉書曰慕容皝上言曰臣躬征平郭逺假陛下天地之威將士竭命精誠感靈海為結氷凌行海中三百餘里臣自立國及問諸故老初無海水氷凍之嵗韓詩成王時越裳氏重三譯而朝天下不逆風不疾雨海之不波溢三年矣中國必有聖人老子曰江海所以能為百谷王者以其善下也列子曰渤海之東不知幾萬億里有大壑無底之谷名曰歸墟張堪註曰莊子云尾閭也莊子曰東海之鼈謂坎井之鼃曰夫海千里之逺不足以舉其大千仞之髙不足以極其深禹之時十年九潦而水弗加益湯之時八年七旱而涯不加損夫不為傾覆推移不以多少進退者此蓋東海之樂也又曰南海之帝為儵北海之帝為忽中央之帝為渾沌儵與忽時相與遇渾沌之帝渾沌待之甚厚儵與忽謀報渾沌之徳曰人皆有七竅以視聽食息此獨無有嘗試鑿之一日鑿一竅七日而渾沌死又曰接輿曰其于治天下也猶渉海鑿河而使蚊負山也又海水三嵗一周流波相薄故地動又曰周顧視車轍有鮒魚焉曰我東海之波臣也君豈有斗升之水活我哉又曰北㝠有魚其名為鯤化而為鳥其名曰鵬將徙于南溟水擊三千里又曰秋水時至百川灌河渚涯之間不辨牛馬河伯欣然自喜以天下之美為盡在已順流東行至于北海東面而視不見水端向若而歎北海若曰井蛙不可以語于海者拘于􅇕也夏蟲不可以語于氷者篤于時也曲士不可以語于道者束于教也天下之水莫大於海萬川歸之不知何時止而不盈尾閭泄之不知何時已而不虛春秋不變水旱不知此其過江河之流不可為量數司馬彪曰尾閭水之從海泄出者也文子曰古之善為君者法海以象其大注下以成其廣淮南子曰賁星墜而渤海決又曰海不讓水積水以成其大又曰庶女告天庶女少寡无子養姑者也姑無男有女女利母財而殺母以誣告寡婦不能自解故告天也雷霆下擊景公臺隕景公齊景公也雷擊景公臺隕墜之也肢體傷折景公為雷霆所傷折海水大出又曰舟在江海不為莫乗而不浮君子行義不為莫知而止休孟子曰觀于海者難為水遊于聖人之門者難為言抱朴子曰大厦既燔而運水于滄海此無及也說苑曰齊景公遊海上而樂之六月不歸告左右曰敢有先歸者致死不赦顔蠋進諫曰君樂海不樂治國彼若有治國者君安得樂此海乎遂歸中道聞國人謀不内之法言曰百川學海而至于海丘陵學山而不至于山山海經曰大荒中有山名曰天臺海水所入焉又曰桂林八樹在賁海東八樹而成林言其大也賁海仐番隅也又曰發鳩之山有鳥名曰精衛炎帝之女遊于東海溺而不返是故精衛常取西山之木石以填東海周景式孝子傳曰管寧避地遼東遇風船人危懼皆叩頭悔過寧思惟諐咎念常如厮不冠而已向天叩頭風亦尋靜神仙傳曰麻姑謂王方平曰自接待以来見東海三為桑田向到蓬萊水乃淺于往者畧半也豈復將為陵陸乎皇甫謐髙士傳曰姜肱字伯准十辟公府九舉有道皆不就靈帝時曹節白帝特徵肱隠身遯命浮桴入海名蓋天下幽明録曰海中有金臺山髙百丈結構巧麗窮盡神工横光巖渚竦曜星門臺内有金機彫文備制十洲記曰扶桑在碧海之卯地一面萬里有大帝宫太真東皇公所治處山外别有員海繞山員海水色正黒謂之溟海無風而洪波百丈唯飛仙能到其處𤣥中記曰天下之強者東海之沃焦焉水灌而不已沃焦者山名也在海東三萬里博物志曰舊說天河與海通近世有居海渚者年年八月有浮槎去來往返不失期此人乃立屋于槎上齎糧乗槎去忽不覺晝夜奄至一處有城郭屋舍望見室中多織女見一丈夫牽牛渚次飲之問此人何由至此此人即問此為何處荅曰君可詣蜀問嚴君平此人還問君平曰某月有客星犯斗牛即此人到天河也崔鴻十六國春秋前燕録曰慕容晃將乗海討其弟仁襲其不意羣臣以淩道危阻宜從陸地晃曰舊海不淩自仁反以來三凍皆成昔光武合滹沱之氷以濟大業天其或者欲乗此而尅之乎吾計決矣沮謀者斬二月晃親率三軍擒仁賜死東方朔十洲記曰祖洲東海中地方五百里上有不死草生瓊田中草似菰苗人已死者以草覆之皆活又曰扶桑在碧海中樹長數千尺一千餘圍兩榦同根更相依倚是以名扶桑關令内傳曰天有五億五萬五千五百五十里地亦如之各以四海為脈江釋名曰江公也小水流入其中所公共也說文曰江水出蜀湔氐徼外岷山尚書曰岷山導江東别為沱又說文曰江至㑹稽郡為浙江毛詩曰江有沱江有汜又曰滔滔江漢南國之紀春秋元命苞曰牛女為江湖江湖者所以開神潤化故其氣湍急家語曰楚昭王渡江有物大如斗圓而赤觸王舟舟人取之王大怪使之魯問孔子孔子曰此萍實也可剖而食之吉祥唯霸者能獲之使返王遽食之甚美謝承後漢書曰吳郡沈豐為郡主簿太守第五倫母老不能之官倫每至臘節常感戀垂泣遣豐迎母廣陵母見大江畏水不敢渡豐祭神令子孫對母飲酒因醉卧便渡又曰吳郡王閎渡錢塘江遭風船欲覆閎拔劍斫水罵伍子胥風息得濟續漢書曰張禹拜揚州刺史當過江行部中土人皆以江有子胥之神難于濟涉禹厲聲言曰子胥如其有靈知吾志在理察枉訟豈危我哉遂鼓楫而過魏志文帝伐吳至長江而歎曰天固以限南北也晉書祖逖渡江中流誓曰逖不清中原而復濟者有如大江又曰吳猛年四十邑人丁義始授神方因還豫章江波甚急猛不假舟楫以白羽扇畫水而渡又曰王濬有竒畧武帝謀伐吳命濬造船于蜀其木柿蔽江而下又曰陶侃語人曰大禹聖人乃惜寸隂至于衆人當惜分隂㕘佐以戲廢事者乃取其蒲博之具悉投于江莊子曰魚相忘于江湖孫卿子曰子路盛服見孔子孔子曰由是襜襜者何也昔者江出汝山其始出源可以濫觴及其至江之津也不方舟不避風不可涉非唯下流大耶今汝衣服既盛顔色充盈天下且孰肯諫汝乎三十國春秋曰劉裕次山陽聞何無忌敗績卷甲兼行將濟江而風急衆咸難之裕曰若有天命風當自息如其天不助舟覆溺何足怪即命登舟移時風止董覽吳地記曰夫差時子胥以忠諌見怒遂賜死浮尸于江夫差悔焉與羣臣設祭于江列仙傳曰江妃二女遊于江濵逢鄭交甫遂解珮與之交甫受珮而去數十步懐中無珮女亦不見列女傳曰楚昭王貞姜者昭王夫人齊女也昭王出遊留夫人漸臺江水大至遣使者迎夫人忘持符夫人曰王與宫人約召必以符今使者不持符妾不敢行于是使者返取符未還臺已壊沈水而流又曰廣漢姜詩妻事姑至孝姑好飲江水水去家七里妻常鷄鳴泝流而汲值風雪不能得水詩責遣之妻寄食隣家紡績以市珍珠使隣母遺姑詩聞追還舍側忽有涌泉出味如江水華陽國志又載論衡曰儒書言伍子胥恨吳王驅水為濤而溺殺今㑹稽錢塘丹徒江皆立子胥祠欲止其濤也袁山松宜都記曰對西陵南岸有山其峯孤秀人自山南上至頂俯臨大江如縈帶視舟船如鳬鴈又曰大江清濁分流其水十丈見底視魚遊如乗空淺處多五色石新序曰禹南濟于江黄龍負舟舟中之人皆失色禹仰天而嘆曰吾受命于天死生命也龍俯首而逝吳紀曰步隲表言北降人說北人多作布囊欲盛沙塞大江吳王曰此曹必不敢來若不如孤言當以牛千頭為君作闕後見吕岱說隲言北欲以囊塞江輒笑曰此江自開闢以來寜可以囊塞乎水經註曰昔吳郡太守張公直自九江守徵還道由廬山子女觀祠女戲廟像其妻夜夢神人致聘覺言于夫至明恐怖遽𤼵船引中流而不行妻曰愛一女而闔門受禍也公直不忍遂令妻下女于江其妻布席水上以其亡兄女代之而船得進尋公直知兄女怒妻曰吾何面在當世也復下已女於水中將渡遥見二女于岸側傍有一吏立曰吾廬君主簿敬君之義悉還二女風俗通曰江貢也所出珍物可貢獻也荆州記云江出岷山其源若甕口可以濫觴在益州建寧漏江縣潜行地底數里出楚都遂廣十里老子曰江海所以能為百谷王者以其不逆衆流也茍有逆衆流不至多矣太平御覽卷六十
