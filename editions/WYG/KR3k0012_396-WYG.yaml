body:
  text: 太平御覽卷三百九十六宋李昉等撰人事部三十七溺相似偶像溺大戴禮武王盤銘曰與其溺於人也寧溺於淵禮記檀弓上曰死而不吊者三謂輕身忘孝畏人或時以非罪攻已不有以説之死者孔子畏於匡是也壓行止危險之下溺不乘橋船又緇衣曰子曰小人溺於水君子溺於口大人溺於人皆在其所䙝也夫水近於人而溺人徳易狎而難親也易以溺人左傳哀下曰越圍呉晉趙孟使楚隆問呉王王曰勾踐將生憂寡人寡人死之不得矣王曰溺人必笑吾將有問也史黯何以得為君子對曰黯也進不見惡退無謗言王曰宜哉東觀漢記曰鄧訓字平叔永平中治滹沲石臼河從都慮至羊腸倉欲令通漕太原吏民苦轉運所經三百八十九隘前後沒溺死者不可勝筭建初三年拜訓謁者使監領其事更用驢輦嵗省億萬計活徒士數千人後漢書曰廉范西迎父䘮至葭萌載船觸石破沒范抱持棺柩遂俱沉溺衆傷其義鉤求得之僅免於死魏志曰管輅族兄孝國居在斥邱輅往從之與二客㑹客去後輅謂國曰此二人天庭及口耳之間同有㓙氣異變俱起雙魂無宅流魄于海骨歸于家少許時並當死也復數十日二人飲酒夜醉共載牛車渴下道入漳河中皆即溺死也又曰帝幸許昌杜畿居守受詔作御樓船於陶河試船遇風沒焉帝為之流涕詔曰昔冥勤其官而水死稷勤百榖而山死故尚書僕射杜畿於孟津試船遂至覆沒忠之至也朕甚愍焉追贈太僕謚曰戴侯呉録曰孫䇿討黄祖表曰臣討黄祖斬首二萬餘級其赴水溺死二萬餘口船六十餘艘財物山積唐書曰封徳彛隋開皇末江南作亂内史令楊素往征之署為行軍記室泊船海曲素夜召之徳彛墜水中人救免溺乃易衣以見竟寢不言素後知聞其故荅曰私事也所以不白素甚嗟異之莊子曰至徳者火弗能􅅡水弗能溺寒暑弗能害禽獸弗能賊孟子曰淳于髠曰嫂溺則援之以手乎孟子曰嫂溺不援是豺狼也吕氏春秋曰洧水大有富人溺死有人得富者尸請贖而求金甚多富人黨以告鄧析曰但安之必無買此者得尸者患其不贖又告鄧析鄧析曰但安之必無人更買又子路拯溺者其人拜之以牛子路受之孔子曰魯人必拯溺矣又曰荆人欲襲宋使人先表灌水灌水暴溢荆人不知循表而夜涉溺死者千有餘人淮南子曰與溺者金玉不如與之一尋常之纒又曰父溺則􅄃父髮而整之非敢僑侮以救死也説苑曰梁相死惠子欲之梁渡河而遽堕水中船人救之曰居船檝之間而溺無救則子死矣何能相梁乎惠子曰居廣艘長檝之間則不如子至安國家全社稷子之比我蒙蒙如未視之駒曹毗神女杜蘭香傳曰神女姓杜字蘭香自云家昔在青草湖風溺大小盡沒香時年三嵗西王母接而養之於崑崙之山於今千嵗矣異苑曰蜀郡張貞行船覆溺死貞婦黄因投江就之積十四日執夫手俱浮出又曰河内荀儒字君林乗氷省舅氏陷河而死兄倫求尸積日不得設祭氷側倫與河伯投牋一宿岸側氷開尸首執牋浮出倫又謝又曰潁川荀茂逺景平中至南康夜夢一人頭有一角為逺筮曰君若至都必得官問是何職荅曰官生于木於是而寤未解所况因復又夢部伍至揚州水門堕水而死作棺既成逺入中自試恨小即見殯瘞葬渚次悵然驚覺以告母兄船至水門過果落江而殞䘮儀一如其夢幽明録曰蔡廓作豫章郡未發大兒始迎婦在渚次兒欲渡婦船衣挂船頭遂堕水即沒徐羡之作揚州登勑兩岸厚賞漁人及崑崙共尋覔至二更不得婦哀泣之間髣髴如夢聞聓告之曰吾今在卿船下以告婢婢曰令水工沒覔果見坐在船下初出水顔色如平生三輔决録曰文帝竇后名猗清河觀津人也父遭秦之亂隠身漁釣墜淵而卒景帝即位后登尊號遣使者更填父所墜淵而築起大墳觀津城南青山是也益部耆舊傳曰孝女叔光雄者犍為人也父汮和永建初為縣功曹乘船墜水物故尸䘮不歸號泣晝夜心不圖存所生男女二人並數嵗雄乃各為囊盛珠環以繫兒數為决别之辭家人每闗防之後稍懈因乘小船於父堕處慟哭遂自投水死弟賢其夕夢雄告之却後六日當共父同出至期伺之果與父相持江上郡縣表上為雄立碑圖像其形焉博物志曰澹臺子羽渡水子溺死將葬之㓕明曰此命也吾豈與螻蟻為親戚魚鱉為仇讎遂以葬之又曰南郡宜城王子山到太山從鮑子直學筭到魯賦靈光殿歸渡湘水溺死時年二十許其弟子玉親見之樂府解曰公無渡河朝鮮津卒霍里子髙妻麗玉所作子髙晨起刺船有一白首狂夫被髪提壺亂流而渡其妻呼而止之乃遂溺死於是援箜篌而歌曰公無渡河相似春秋歴命序洛書曰人皇出於提地之日九男九兄弟相似别長九國家語曰孔子適鄭與弟子相失獨立東門或謂子貢曰東門有一人焉其形長九尺有六寸河目而隆顙其頭似尭其項似臯陶其肩似子産而腰已下不及禹三寸孔叢子曰萇宏語周文公曰吾觀仲尼有聖人之表其狀河目而隆顙是黄帝之形也修肱而龜背其長九尺有六寸是成湯之容體也然言稱先王躬履謙讓洽聞强記博物不群抑亦聖人之興者也史記曰孔子既沒弟子思慕有若狀似孔子相與共立為師如夫子時又曰楚相孫叔敖臨死屬其子貧困往見優孟乃為叔敖衣冠振掌談語嵗餘像叔敖王與左右不能别欲以為相優孟曰孫叔敖盡忠為楚令尹死其子負薪楚相不足為也王乃封敖子漢書曰夏陽人姓成名方遂居湖以卜筮為事有故太子舍人嘗從方遂卜謂曰子狀貎甚似衛太子方遂心利其言㡬得以富貴即詐自稱詣闕庭尉建召鄉里識者知張宗禄等方遂坐誣㒺不道要斬東市又曰馮立字聖卿遷西河上郡守立居職公廉治行畧與兄野王相似而多知有恩貸好為條教吏民嘉美野王與立相代為太守歌之曰大馮君小馮君兄弟繼踵相因循聰明賢智惠吏民政如魯衛徳化鈞周公康叔猶二君漢獻帝春秋曰孝靈皇帝王美人生皇子協協生十餘日何皇后妬殺美人靈帝母永樂董太后攝養協號曰董侯董侯似靈帝八嵗能讀詩書魏志曰初髙勾麗王生能開目視國人惡之及長果㓙虐數鈔曽孫位生亦能開目視國人惡之勾麗呼相似為位以似其曽祖故名曰位晉書曰桓𤣥聞義軍起憂懼曰何無忌劉牢之外甥酷似其舅共舉大事何慮不成又曰蜀人王富作亂郡縣討平之初諸葛孔明有盛徳于蜀土子瞻又身死王事蜀人思之謂瞻不死故將謂王富曰君狀貎甚似諸葛孔明子因此思尅復以扼巴蜀晉中興書曰王允之字淵猷年在惣角從伯敦知之謂為似已入則共寢檀道鸞晉陽秋曰初議以無隠之為黄門郎而隠之貎似太宗上不忍見故改焉齊書曰謝宏㣲性嚴正舉止必修禮度時有蔡湛之者及見謝安兄弟謂人曰宏㣲貎類中郎而性似文靖梁書曰王筠字元禮瑯琊人年十六為芍藥賦沈約曰王郎神似袁公袁公見人矜莊王郎見人必悟笑唯此條不能酷似耳袁粲即筠外祖也唐書曰王孝傑雍州新豐人髙宗末西討吐蕃戰於大非川為賊所獲吐蕃賛普見孝傑垂泣曰貎類吾父厚加敬禮孟子曰昔者孔子殁子夏子游子張以有若似聖人欲以所事孔子事之强曽子曽子曰不可江漢以濯之秋陽以暴之皜皜乎不可尚也劉昭幼童傳曰漢孝昭帝諱弗陵武帝少子也年五六歳壯大多智武帝云類我甚竒之江表傳曰孫皓夫人死皓哀愍葬於苑中皓治䘮於内半年不出國人見葬大奢麗皆為皓已死所葬者是也皓舅子何都顔狀似皓云都代立也孔融别傳曰融為大中大夫虎賁士貎似蔡邕每酒酣輒引與同坐曰雖無老成人尚有典刑續捜神記曰呉興施續為呉潯陽督能言論有門生亦有意理常秉無鬼論門生後渡江忽有一單衣白帢客來因共言語遂及鬼神客辭屈乃語曰僕便是鬼何以云無受使來取君門生請乞酸苦鬼問有似君者不云施續下之督與僕相似鬼許之便與俱歸與都督對坐鬼手中出一鉄鑿可長尺餘正自打之放鑿便去顧語門生慎勿道俄而都督云頭痛還所住至食時便亡説苑曰孔子之匡簡子將殺陽虎孔子似之甲士以圍孔子之舍子路怒奮㦸將下鬭孔子止之曰夫歌予和汝子路歌孔子和之三終而甲罷風俗通曰陳國張仲喈婦炊於竈下至井上謂伯喈曰我今日粧好否伯喈曰我伯喈也婦大慙愧其夕時伯喈到更衣婦復遂牽其背曰今旦大誤謂伯喈為卿荅曰我故伯喈也盖親宻無過夫婦然尚如此况於初未相見而責先識之乎世説曰桓豹奴是王混外甥形似舅桓甚諱之宣武云不恒似時似耳恒似則形時似是神桓愈不恱又曰魏黄初末呉人發長沙王呉芮塚容貎如故呉卒發者見淮南呉綱曰君何類長沙王綱曰先祖也去綱近五百年語林曰張衡死蔡邕母始懷孕此二子才貎甚相類時人云邕是衡之後身又曰桓温自以雄姿風氣是司馬宣王劉越石一輩器有以比王大將軍者意大不平征苻徤還於北方得一巧作老婢乃是劉越石妓女一見温澘然而泣温問其故荅曰官家甚似劉司空温大悦即出外修整衣冠又入呼問我何䖏似司空婢荅曰眼甚似恨小面甚似恨薄鬚甚似恨赤形甚似恨短聲甚似恨雌宣武於是㢮冠解帶不覺惽然而睡不怡者數日偶像説文曰偶人也尚書説命曰髙宗夢得説使百工營求諸野得諸傅巖王庸作書以誥曰以台正于四方台恐徳弗類兹故弗言恭黙思道夢帝賚予良弼其代予言乃審厥像俾以形旁求于天下孔安國注曰審所夢之人刻其形像以旁求之放於民間説築傅巖之野惟肖傅氏之巖在虞虢之界肖似所夢之形也史記曰孟嘗君將入秦賔客諫不聽蘇代謂曰今旦代從外來見木偶人與土偶人相與語木偶人曰天雨子將敗矣土偶人曰我生於土敗即歸土今天雨流子而行未知所止息也今秦虎狼國也而君欲往如有不得還無乃為土偶人所笑乎孟嘗君乃止國語曰越滅呉范蠡遂乘輕舟而浮於五湖莫知其終極越王命工以良金寫范蠡之狀朝禮之環㑹稽三百里以為范蠡地春秋後語曰秦欲攻安邑恐齊救之則以宋委於齊曰宋王無道為木人以像寡人射其面寡人地絶兵逺不能攻也王苟能破宋有之寡人如自得之戰國策曰孟嘗君將入秦蘇秦謂曰今臣經淄上有土偶人與桃梗人相與語桃梗謂土偶人曰子西岸土也八月雨降淄水至則子殘矣曰吾殘則復西岸子東園梗也刻削為人淄水至則去漂然將何所知矣孟嘗乃止漢書曰匈奴畏郅都之威刻木像都之狀交弓射之莫能中魏志曰鮑信與太祖擊黄巾信乃鬭死太祖購求信䘮不得乃刻木如信形祭而哭之魏畧曰時苖字徳胄鉅鹿人少清白為人疾惡出為壽春令令行風靡揚州治在其縣時蔣濟為治中苗以初至任欲謁濟濟素好酒適㑹其醉不能見苗苗恚恨還刻木為人署曰酒徒蔣濟立之於壇旦夕射之江表傳曰孫權使朱儁喻降闗雲長雲長乃作像人於城上而潜遁又曰孫皓以張布女為美人棒殺之後思其顔色使工巧刻作美人形相置坐側隋書曰栁䛒字顧言本河東人也拜秘書監封漢南縣公帝退朝之後命入閤言宴諷讀終日而罷恩若朋友帝猶恨不能夜召於是命匠刻木偶人施機闗能坐起拜伏似於䛒帝每在月下對酒輙令宫人運之於坐與相酧酢而為懽笑唐書曰邱行恭從太宗討王世充㑹戰於邙山之上太宗與諸騎相失唯行恭獨從尋有勒騎數人追及太宗矢中御馬行恭乃廻騎射之賊不敢前然後下馬㧞箭以其所乗馬進太宗貞觀中有詔刻石為人馬以像行恭㧞箭之狀立於昭陵闕前又曰侯君集滅髙昌國拜麴智盛為左武衛將軍及太宗崩刋石像智盛之形列之於昭陵𤣥闕之下又曰天寳中天下州郡皆鑄銅為𤣥宗真容擬佛像之制又曰天寳五年於太清宫刻石為李林甫陳希烈像侍於聖容之側孝子傳曰丁蘭早孤不識其母乃刻木作母而事之車頻秦書曰姚萇為符堅神像戰求其利軍中士衆出入並驚恐皆云畏符堅主像萇嚴皷斬之以首送符登抱朴子曰張華作博物志曰黄帝仙去其在臣徹者削木為黄帝像帥諸侯奉之亦見汲冡書太平御覽卷三百九十六
