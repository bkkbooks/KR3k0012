body:
  text: 太平御覽巻一百四十五宋李昉等撰皇親部十一嬪世婦女御美人才人保林女侍中女尚書女史嬪尚書堯典曰釐降二女于媯汭嬪于虞詩推度災曰關雎有原冀得賢妃正八嬪周禮天官内宰曰以隂禮教九嬪又曰九嬪掌婦學之灋以教九御婦徳婦言婦容婦功各帥其屬而以時御叙于王所婦嬪也婦徳謂貞順也婦言謂詞令也婦容謂婉娩也婦功謂絲枲也自九嬪以下而御各帥其屬者使亦九九相與從王于所息之燕寢也羣妃御見之法卑者宜先尊者宜後女御八十一人當九夕世婦二十七人當三夕九嬪九人當一夕夫人三人當一夕后當一夕十五日而徧自望後反之凡祭祀贊玉齍贊后薦徹豆籩玉齍玉敦黍稷器也若有賓客則從后當贊后行事大䘮帥叙哭者亦如之亦從后也周禮冬官匠人曰内有九室九嬪居之外有九室九卿朝焉禮記曰仲春之月𤣥鳥至以太牢祀于髙禖天子親往后妃帥九嬪御乃禮天子所御帶以弧䪅授以弓矢于髙禖之前又曰古者天子后立六宫三夫人九嬪二十七世婦八十一御妾國語曰齊㐮公卑聖侮士而唯女是崇九妃六嬪陳妾數百漢書曰王莽備九嬪視九卿魏志曰文帝增貴妃位次皇后又曰文徳郭皇后文帝踐祚為嬪甄后之死由后之寵也王隠晉書曰武帝采諸葛冲等女五十餘人入殿賜采女食皆憂不食楊后使設障謂曰可俱入障其中選者以綘繫臂胡芳泣左右止之曰陛下聞之芳曰死不畏何畏陛下帝壮其言故遂敬之芳父奮聞女中亦哭曰老奴不死唯有二兒男在九地之下女在九天之上拜芳為貴嬪晉書曰胡貴嬪名芳父奮泰始九年簡良家子女充扵内拜芳為貴嬪毎有顧問不飾言詞率爾而答進退方雅最蒙愛侍御服飾亞扵皇后帝與樗蒱傷上指帝怒曰此固將種也芳對曰北征公孫西拒諸葛非將種而何芳生平安公主王隠晉書曰又採侍御史齊國左維女為修儀有文才晉書曰左貴嬪名芬兄思芬少好學善綴文名亞扵思武帝聞而納之拜修儀後為貴嬪以才德見禮體羸多患常居别室每逰華林輒回輦逰之語及文義辭對清華左右侍聽莫不稱美及楊皇后崩芬敬獻誄咸寧三年納悼后芬受詔作頌及帝女萬年公主薨帝痛悼不已詔芬為誄甚獲恩賜焉重芬辭藻每有方物異寳必詔為賦頌以是屢獲賜焉晉諸公讚曰舊制貴嬪夫人比三公假金紫淑媛淑儀修容修儀媫妤容華充華為九嬪比九卿假銀青晉起居注曰泰始三年使使持節兼五官中郎將宗正丞司馬恢拜崇陽采女李琰為淑儀王宣為脩容徐琰為修儀吴淑為媫妤趙琰為充華九年有司奏禮為皇后聘以糓圭無妾媵拜授之制詔曰拜授可依魏氏故事十年上臨軒使持節兼太常洛陽令司馬啓拜采女胡芳為貴嬪又使使持莭兼御史中丞太子舍人馬誕拜采女劉媛為淑妃臧曜為淑媛芳為淑儀趙粲為修華陳琇為修容咸寧三年拜美人左嬪為修儀邢國為媫妤朱華為容華又曰恵帝元康二年詔曰才人謝玖進為淑妃有司奏當與三夫人以下同拜詔宜在後也永寧元年詔拜為貴人後魏書曰髙祖改定内宫三嬪視九卿六嬪視六卿山海經曰鮒隅山顓頊葬扵其陽九嬪葬扵其隂左貴嬪集有離思賦相風賦孔雀賦松栢賦泣漚賦有納皇后頌楊皇后登祚頌􅆚藥花頌鬰金頌菊花頌神武頌四言詩四首武元皇后誄萬年公主誄世婦周禮曰世婦掌祭祀賔客䘮紀之事帥女官而灌概為齍盛及祭之日蒞陳女官之具凡内羞之物蒞臨也内羞房中之羞周禮曰世婦每宫卿二人下大夫四人中士八人女府二人女史二人奚十有六人禮記月令篇曰仲春之月后親率九嬪御祠于髙禖之前又曰季春之月后齋戒親東嚮躬桑禮記㛰義曰古者天子二十七世婦以聽天下之内治以明章婦順故天下内治而家理蔡邕月令章句曰仲春之月以太牢祀于髙禖髙禖祀名髙猶尊也吉事先見之象也葢為人所以祈子孫之祀也𤣥鳥感陽而至故於其至日因以用事簡狄以𤣥鳥至之日有事髙禖而生契焉故詩云天命𤣥鳥降而生商后率九嬪御后者天子適妻也妃命也嬪婦也御妾也周禮天子一后三妃九嬪二十七世婦八十一御妻以應外朝公卿大夫之數也世婦不見卑者文畧御妻皆行世婦可知也后妃將九嬪女御皆為禖以祈孕姙也乃禮天子所御帶以弓韣天子所御謂后妃以下至妾姙有萌芽者也韣弓衣也祀以髙禖之命飲之醴酒帶以弓韣尚使得男也授以弓矢扵髙禖之前弓矢者男子之事也又曰季春之月后妃齋戒親東嚮躬桑齋戒者事扵先蠶也東嚮盛德在木也躬桑手三繰猶天子親耕三推也古者天子諸侯必有公桑蠶室近川而為之築宫仭有三尺棘墻而外閉之卜夫人世婦之吉者使之蠶室奉種浴于川公桑食之蠶事既升升成也分繭稱絲效功絲以斤兩故曰稱知其多少旌其成功也事在孟夏於是終言之也以供郊廟之服天子諸侯所服以致祭者必后夫人所親蠶也禮世婦卒蠶獻繭於夫人夫人親受之繅三盆手朱綠之𤣥黄之以為黼黻文章君服之以祀先王先公敬之至也故曰無敢怠承又曰孟夏之月蠶事既畢后妃獻繭扵天子進其成功也乃收蠶税以桑為均十而取一曰税乃收世婦以下所蠶之税也以桑為均者用桑多則繭多少則繭少也貴賤長少如一貴謂世婦賤謂妾御長謂力壯者也年無尊卑老壯各自以桑為均不得髙下為差也史記曰中宫天極星後勾陳四星末大星正妃餘三星後宫之属也漢書曰軒轅前大星女主象旁小星御者後宫属也范曄後漢書曰世婦主知䘮祭賓客後魏書曰髙祖改定内宫世婦視中大夫又曰宣武靈皇帝胡氏初召入掖庭為承華世婦生肅宗明皇后宋書宋武帝建德中詔曰正位扵中有聖通典質文相革損益不同五帝則四星之象三王立六宫之數劉曹已降等級彌繁選擇遍扵生民命秩方扵庻職椒房丹地有衆如雲本由嗜欲之情非闗風化之義朕運當澆季思復古始無容廣集子女屯聚宫掖𢎞贊後庭事從約簡可置妃二人世婦三人御妾三人自兹以來宜悉减省女御周禮天官冡宰曰女御昏義所謂御妻御猶進也侍也范蔚宗後漢書曰八十一御妻序扵王之燕寢頒官分務各有典司後漢書曰髙祖定内宫御女視元士淮南子曰孟春之月東宫女御青色衣青綵鼓琴孟夏之月南宫女御赤色衣赤綵吹笙竽孟秋之月西宫女御白色衣白綵撞白鐘孟冬之月北宫女御黑色衣黑綵擊磬石美人漢書曰漢興因秦之稱號正適稱皇后妾皆稱夫人及有美人之號焉至武帝各有爵位美人視二千石又曰萬石君奮其父趙人也姓石氏趙亡徙居温過河内時奮年十五為小吏侍髙祖髙祖與語愛其恭敬問曰何有對曰有姊能鼓琴髙祖曰若能從我乎曰願盡力扵是髙祖詔其姊為美人徙其家長安中戚里以姊為美人故也又曰孝恵章皇后宣平侯敖女吕太后欲為重親以公生女配帝欲其生子萬方終無子廼使佯為有娠取後宫美人子名之殺其母立所名子為太子又曰孝成趙皇后弟絶幸為昭儀謂成帝紿我言從宫中來即從中宫許美人兒從何生許氏竟當復立耶今許美人有子竟負約謂何帝曰約以趙氏故不立許氏使天下無出趙氏上者無憂也范曄後漢書曰夏殷以上后妃制其文略矣周禮王者備内職焉光武中興置美人無爵秩嵗時賞賜充給而已又曰虞美人者以良家子十三選入掖庭生舞陽長公主自漢興母氏莫不尊寵順帝即位加美人爵號而冲帝早夭梁冀秉政忌惡他族虞氏抑而不登但稱大家而已又曰王美人趙國人也豐姿色聰敏有才能明書㑹計以良家子應法相選入掖庭為何后所酖靈帝思美人作追徳賦令儀頌魏志曰漢制内官十有四等魏因漢法皆如舊制自夫人以下世有増損太祖建國始命王后其下五等有美人暨太和中自夫人以下爵凡十三等美人視二千石江表傳曰孫皓以張布女為美人有寵後美人忤皓皓怒棒殺之沈約晉書曰夏殷以上内職無聞姬氏之寵婦官為盛前漢列終十四世祖受命又有美人以比職焉後魏書曰髙祖改定内官美人視三品沈約宋書曰晉武帝採漢魏前事之制置三夫人其餘有美人視爵千石太祖以美人為散職蕭子顯齊書曰六宫位號漢魏以來因寵増置世不同矣建元元年有司奏置美人為散職才人范曄後漢書曰和帝數失皇子鄧后憂繼嗣不廣數選進才人以博帝意魏志曰明帝逰北園召才人以上曲宴極樂明日帝見王后后曰昨逰宴北園樂乎帝以左右泄之殺十餘人魏略曰明帝青龍三年於别殿之北置美人六人方諸才人以上王隠晉書曰太康七年出後宫才人妓女已下百七十人歸家又曰初恵帝幼時世祖遣才人謝玖侍恵帝因而有娠臨娶賈妃迎玖西宫遂生愍懐太子臧榮緒晋書曰懐帝王太后諱媛姬初武帝中拜才人早卒懐帝即位追尊曰皇太后也晉中興書曰謝夫人名玖家本貧賤又以屠宰為業玖清恵貞正有淑姿選入後宫為才人後魏書曰髙祖置女職中才人視四品沈約宋書曰晉武帝採漢魏之制置才人中才人爵視千石以下髙祖受命置二十人世祖又置中才人以為散位崔鴻十六國春秋後趙録曰石虎杜皇后名珠不知何許人平幽州入在王浚籍中虎見而悦之因請扵勒勒引見拜才人以賜虎性恭恵柔婉寵幸亞扵鄭后也保林漢書曰元帝加昭儀之號凡十四等保林視百石晉武帝起居注曰令出掖庭諸才人保林以下二百七十餘人女侍中後魏書曰髙祖置女侍中視三品又曰陸昕之容貌柔謹尚獻文女常山公主髙祖以其主壻持垂昵􅔔昕之亡公主奉姑有孝稱神龜初與穆氏瑯琊公主並為女侍中又曰于忠後妻中山王女微觧書計靈太后引以為女侍中又曰靈太后妹為元义妻封平原郡君拜女侍中鄴中記曰石虎置女侍中皆貂蟬侍直皇后女尚書魏畧曰明帝逰宴在内選女子知書可付信者為女尚書魏書曰髙祖置女尚書視三品晉東宫舊事曰迎太子妃之日諸長御皆在幄帳左右侍宫人重行北面以准女尚書西面以准女侍中陸翽鄴中記曰石虎征討所得美女萬餘以為宫人簡其有才藝者為女尚書女史毛詩曰静女刺時也衛君無道夫人無徳也静女其孌貽我彤管既有静徳又有美色又遺我以古人之法可以配人君者后夫人必有女史書其日月以両環進退也生子月娠則金環退之當御者以銀環進之著扵左手既御著扵右手事無大小記以成法箋云彤管色赤貌彤管有煒悦懌女美煒赤貌箋云赤管煒然女史以恱懌妃妾之徳美之至也毛詩義䟽曰女史彤管法如國史主記后夫人之過人君有柱下史后有女史外内各有官也周禮曰女史掌王后之禮職女史女奴曉書者掌内治之貳以詔后治内政内治之法本在内掌書而貳之逆内宫鉤考六宫之計書内令后之令凡后之事以禮從亦如太史之於王漢書曰班媫妤自傷賦曰陳女圖以鏡鑒兮顧女史而問詩范曄後漢書曰頒官分務各有典司女史彤管記功書過晉記曰元康中司空張華懼后族之盛乃作女史箴沈約宋書曰太宗留心後房擬外百官備置内職置後宫校事女史一人又紫極中監女史一人又光興中監女史一人又賛樂女史一人又中訓女史一人官品皆苐四後魏書曰髙祖置女職女史女賢人視三品崔鴻十六國春秋後趙録曰石虎置女太史於靈臺仰觀灾祥以考外太史騐察虛實太平御覽巻一百四十五
