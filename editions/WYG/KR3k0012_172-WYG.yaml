body:
  text: 太平御覽卷一百七十二宋李昉等撰州郡部十八嶺南道廣州韶州岡州循州潮州恩州春州賀州端州藤州新州勤州竇州桂州昭州康州封州瀧州髙州義州蒙州富州梧州潯州龔州鬱林州平琴州賓州澄州繡州象州栁州融州邕州貴州黨州横州田州嚴州山州淳州羅州潘州容州辯州白州牢州欽州南安都䕶府武峩州粤州芝州愛州福祿州長州驩州峯州陸州廉州巖州雷州禺州湯州瀼州籠州環州古州崖州儋州振州瓊州萬安州廣州十道志曰廣州南海郡秦置南海郡二漢因之兼置交州吳因之分置廣州宋齊皆因之梁陳並置都督府隋平陳又置潘州煬帝初復置南海郡唐為廣州山海經曰桂林八樹在賁禺東註云賁禺即番禺也吳錄曰番禺縣有禺山尉陀所葬南粤志曰肅連山西十里有靈州山焉其山平原彌望四野極目郭景純云南海之間有衣冠之氣者斯其地也廣州記曰尉陀築朝臺以朝天子南粤志曰朝臺下有趙陀城朝臺西三十里即崗旁江構粤華館以送陸賈因稱朝臺十道志曰番禺北津水今名廉平水韶州十道志曰韶州始興郡禹貢揚州之域春秋戰國皆楚地秦屬南海郡二漢屬桂陽郡吳置始興郡晉因之宋改為廣興齊復為始興隋平陳為韶州以韶石為名郡國志曰韶州科斗勞水間有韶石二狀雙闕永和二年有飛仙衣冠遊二石上昔舜遊登此石奏韶樂因以名之岡州十道志曰岡州義寧郡禹貢揚州之域秦漢並屬南海郡東晉末分置新㑹郡宋齊並因之隋平陳置封州後改為亢州後改為岡州郡國志曰岡州地近大海晴少雨多時遇甚風林宇悉㧞俗織竹為釡以蠣殻屑泥之煑鹽轉久彌密循州十道志曰循州海豐郡春秋時為百粤之地戰國時屬楚秦二漢南海郡地晉亦然隋平陳置循州南粤志曰郡東水道一十里趙陀昔為龍州尉所莅於此潮州十道志曰潮州潮陽郡亦古閩粤地秦時屬南海郡秦末屬尉陀漢初屬南粤後亦屬南海郡後漢因之晉置東官郡隋平陳置潮州郡國志曰稻得再熟蠶亦五收煑海為鹽十道志曰海陽縣本漢揭陽縣地南粤志曰潮陽縣窮海之北故曰潮陽恩州十道志曰恩州恩平郡秦屬南海郡二漢為合浦郡唐貞觀中置恩州春州十道志曰春州南陵郡古百粤地秦屬南海象郡漢合浦郡之髙涼縣地晉分恩平縣唐武德四年討平蕭銑置春州賀州十道志曰賀州臨賀郡秦屬南海郡二漢屬蒼梧郡吳分置臨賀郡晉因之宋為臨慶國齊復為臨賀郡陳因之隋平陳置賀州因賀水為名端州十道志曰端州髙要郡秦屬南海郡兩漢並屬蒼梧郡晉亦然宋齊並屬南海郡陳置髙要郡隋平陳置端州南粤志曰石室山傍洞雲霧自生風烟有二石門以為仙之下都藤州十道志曰藤州感義郡秦屬南海郡二漢並屬蒼梧郡晉屬永明郡隋平陳置藤州煬帝初州廢置永平郡唐復為藤州新州十道志曰新州新興郡古越地秦始皇畧取陸梁地置象郡今州即其地也漢為合浦郡之臨元縣晉穆永和七年分蒼梧郡於此置新寧郡梁隋唐為新州勤州十道志曰勤州銅陵郡秦屬南海郡二漢屬合浦縣隋屬信安郡唐置勤州為銅陵郡竇州十道志曰竇州懷德郡禹貢揚州之域古越地漢蒼梧郡之端溪縣先管羅竇洞因為名唐武德五年置南扶州貞觀八年改為竇州郡國志曰竇州悉以髙欄為居號曰干欄三日一市焉又曰特亮縣在河涸水北昔有白牛夜出光影照村村人見此牛光號為特亮也桂州十道志曰桂州始安郡禹貢揚州之域春秋時越地七國時為楚越之交始皇二十三年嘗發逋亡人贅婿賈人畧取陸梁地是為桂林郡焉二漢屬零陵蒼梧二郡吳置始安郡晉武改為始建齊復為始安梁天監六年置桂州於蒼梧鬱林之境無定理處大同六年移桂州於今理隋大業三年罷州唐武德四年復置桂州始安記曰吳越之境其人好劍輕死易發火耕水耨人養魚稻無千金之家好巫鬼好淫祀十道志曰臨桂縣茘水水源多生桂桂生處不生雜樹昭州十道志曰昭州平樂郡秦屬桂林郡地二漢屬蒼梧郡宋屬始建國齊屬始安郡隋亦然唐武徳四年置樂州貞觀八年改為昭州取昭潭為名盛𢎞之荆州記曰平樂縣西南數十里山間有兩石如人眼極大瞳子黒白分明郡國志曰俗以青石為刀劍如銅鐵法婦人以為環玦代珠玉也夷人往往化為貙貙小虎也康州十道志曰康州晉康郡秦屬南海郡二漢屬蒼梧郡晉分置晉康郡宋齊因之隋平陳廢晉康併入信安郡今髙要郡也唐復置康州封州十道志曰封州臨封郡土地所屬自秦已上與康州同今州即漢蒼梧郡之廣信縣也梁置信安郡兼置成州隋平陳廢郡改成州為封州瀧州十道志曰瀧州開陽郡瀧數江切土地所屬自漢已上與康州同晉分端溪置龍鄉縣今州即其地南越志曰龍鄉縣屬廣熈郡梁分廣熈置建州又分建州之雙頭洞置瀧州即此是也髙州十道志曰髙州髙涼郡秦以前土地與晉康同二漢屬合浦郡吳置髙涼郡晉因之梁置髙州隋平陳郡廢而髙州如故故唐為髙州南越志曰髙涼郡本合浦縣也建安十六年衡毅錢博拒歩隲髙安峽毅水死博與其屬亡于髙涼吕岱為刺史博既請降遂以博為髙涼都尉於是始増置髙涼郡焉義州十道志曰義州連城郡土地所屬秦以上與潘州同漢置蒼梧郡今州即蒼梧之孟陵縣唐武德四年江表底定於此置南義州貞觀二年於此置義州蒙州十道志曰蒙州蒙山郡漢武平南越置蒼梧郡今州即蒼梧之荔浦縣也隋置隋化縣唐置蒙州州有山號曰蒙山山下皆姓蒙因為州富州十道志曰富州開江郡秦桂林郡地二漢屬蒼梧郡梁為開江武城二郡地陳置静州改開江武城二郡為逍遥郡隋平陳並廢唐又置靜州貞觀八年改為富州因富水為名梧州十道志曰梧州蒼梧郡秦屬桂林二漢為蒼梧晉以後並因之梁屬成州隋平陳改為封州唐改為梧州漢書曰武帝元始六年開蒼梧郡禮記曰舜葬蒼梧之野潯州十道志曰潯州潯江郡秦屬桂林二漢以後並屬鬱林郡隋屬永平鬱林二郡地唐置潯州郡國志曰大賔縣漢布山縣地有堂牛與蛇同穴牛嗜鹽里人以皮裹手塗鹽入穴探之牛䑛之出外則不得入取其角為器一曰糖牛龔州十道志曰龔州臨江郡秦屬桂林郡漢平南越置蒼梧郡今州即郡之孟陵縣地唐置龔州鬱林州十道志曰鬱林州鬱林郡秦為桂林郡漢改為鬱林郡後漢因之梁置定州改為南定州隋平陳改為尹州煬帝初為鬱林郡唐為鬱林州平琴州十道志曰平琴州平琴郡舊鬱林郡地唐置平琴州或為平琴郡賔州十道志曰賔州安城郡古越地秦桂林郡地漢為鬱林郡又為鬱林郡之嶺方縣地唐貞觀五年置賔州澄州十道志曰澄州賀水郡古越地秦為桂林郡漢為鬱林郡之嶺方縣唐武德四年置澄州繡州十道志曰繡州常林郡秦屬桂林郡二漢屬鬱林郡吳以後因之唐平蕭銑置繡州象州十道志曰象州象郡秦屬桂林郡二漢為鬱林郡吳又分置桂林郡晉宋齊因之隋平陳置始安郡唐武徳四年置象州因象山為名秦之象郡今合浦郡非此象州栁州十道志曰栁州龍承郡秦漢土地與象州同晉以後屬桂林郡隋屬始平郡唐平蕭銑置昆州唐貞觀八年改為栁州融州十道志曰融州融水郡厯代土地與栁州同唐置融州邕州十道志曰邕州朗寧郡古越地秦為桂林郡漢鬱林郡之嶺方縣武德四年置南晉州貞觀六年改為邕州圖經曰人俗恡嗇流薄内儉外蠢椎髻跣足尚雞卜卵卜貴州十道志曰貴州懷澤郡虞舜暨周並為荒裔秦為桂林郡自漢以下與鬱林郡同唐置貴州黨州十道志曰黨州寧仁郡秦桂林郡地唐置黨州南越志曰黨州寧仁郡有京觀即古征黨洞殺俘虜處横州十道志曰横州寧浦郡古越地秦象郡地漢為合浦郡之髙涼縣地隋於此置簡州又改縁州唐改為横州田州十道志曰田州横山郡土地與朗寧郡同唐為田州嚴州十道志曰嚴州循德郡禹貢荆州之域漢武平南越置象郡唐乾封三年置嚴州地在嚴岡之側因為名圖經曰州門有長河水深八十丈從牂牱流下山州方輿志曰山州龍池郡土地與嚴州同唐為山州或為龍池郡淳州方輿志曰淳州永定縣秦屬桂林郡地唐武德四年置至永貞以犯憲宗廟諱改為巒州以巒山為名羅州十道志曰羅州招義郡禹貢揚州之域漢屬南粤宋元嘉三年鎮南將軍檀道濟巡撫於羅陵口築城以名之屬髙涼郡唐武德五年因其地復置州南越志曰招義縣者流人營也潘州十道志曰潘州南潘郡古甌駱粤地秦平百粤為桂林郡地漢為合浦縣地屬合浦郡唐武德四年置南宕州八年改為潘州嶺表記曰潘州昔有方士潘茂於此昇仙遂以名容州方輿志曰容州晉寧郡古越地屬象郡二漢屬合浦郡宋太始七年分合浦縣於此立南流郡齊梁陳不改隋廢唐武德四年置銅州貞觀八年改為容州因容山為名十道志曰鬼門闗在北流縣南三十里兩石相對狀若闗形闊三十餘丈昔馬援討林邑經此立碑石碣尚存昔時趨交趾皆由此闗已南尤多瘴厲去者罕得生還故諺曰鬼門闗十人去九不還郡國志曰斯地瘴氣春為青草瘴秋為黄茅瘴有江水辯州十道志曰辯州陵水郡古越地秦象郡地二漢屬合浦縣唐置辯州郡國志曰辯州在陵羅二水之間白州十道志曰白州南昌郡古越地秦象郡地漢為合浦郡唐武德四年置南州六年改為白州嶺表録曰州有一派水出自雙水山合容州江呼為緑珠井在雙角山下昔梁氏之女有容貌石季倫為交趾採訪使以真珠三斛買之梁氏之居舊井存焉牢州十道志曰牢州定州郡本巴蜀西南徼外夷秦屬象郡漢屬牂牱郡唐置義州改為智州貞觀十一年改為牢州以牢石為名欽州十道志曰欽州寧越郡厯代土地與白州同宋齊以來置宋壽郡梁又置安州隋平陳改為欽州南安都䕶府方輿志曰南安府今理宋平縣古越地禹貢揚州之域號為百粤在周為越裳重譯之地秦屬象漢為交趾日南二郡界後漢因之唐為交州又曰人俗雜蠻夷之風其人皆服布如單被穿中央以貫其首男子耕農女子織絍兵具矛楯長刀木弓竹矢或骨為鏃交州記曰南定縣人足骨無節身有毛卧者更挾始得起故名山海經曰交脛國人因脚脛曲戾相交所以謂之交趾南粤志曰龍編縣州之始有蛟龍編於水之間因以為瑞而名邑武峩州方輿志曰武峩州武峩郡土地與南安都䕶府同唐置武峩州粤州方輿志曰粤州龍水郡土地與南安府同唐為粤州或為龍水郡芝州方輿志曰芝州忻城郡土地與南安府同唐為芝州或為忻城郡愛州方輿志曰愛州九真郡秦象郡地漢武置九真郡後漢亦同晉屬九真郡宋齊因之梁置愛州隋為九真郡唐又為愛州福禄州方輿志曰福禄州福禄郡土地與九真同唐為福禄州長州方輿志曰長州文陽郡土地與九真同唐為長州驩州方輿志曰驩州日南郡古越裳氏國九譯所通者也秦屬象郡二漢屬九真郡吳分置九德郡晉宋齊因之隋置驩州後為日南郡唐為驩州郡國志曰龎山口洞人朱其兩齒為飾刻青作花文中山立市十日一㑹鑄銅為器火盤名勞勞以為財市峯州方輿志曰峯州承化郡古文郎國有文郎水亦陸梁地秦屬象郡二漢屬交趾郡吳分置新興郡晉改為新昌陳置興州隋平陳改為峯州煬帝初廢唐復置峯州林邑記曰蒼梧以南有文郎野人居無室宅依樹上宿食生肉採桑為業與人交易若上古之人陸州方輿志曰陸州玉山郡秦象郡地漢以來屬交趾郡梁分置南州及寧海郡隋平陳郡廢改南州為玉州煬帝初州廢唐復置玉州上元二年改為陸州州有陸水廉州方輿志曰廉州合浦縣秦象郡地漢置合浦郡後漢同吳改為珠官晉又為合浦郡宋因之兼置臨瘴郡及越州齊又因之隋改為禄州尋改合州唐置廉州後漢書曰孟嘗字伯周㑹稽上虞人為合浦太守先是太守多貪珠遂徙向交趾嘗到革前弊珠遂還稱為神明桓帝徵之巖州方輿志曰巖州安樂郡土地與合浦郡同唐為巖州或為安樂郡雷州方輿志曰雷州海康郡秦屬象郡地二漢以後並屬合浦郡梁分置合州大同末為南合州隋煬帝初廢唐為雷州投荒録曰雷州南濵大海多雷雷之聲近在簷宇之上雷州之北髙州之南數鄉亦多雷雷聲似在尋常之外俗俟雷時具酒肴設奠畏雷法甚嚴謹有以彘肉與鷄肉食者霹靂即止禺州十道志曰禺州溫水郡古百粤地婺女之分野秦屬象郡本巖昌之邊邑唐置巖州又改為禺州以南方番禺之地因名州湯州方輿志曰湯州湯泉郡秦屬象郡地唐置湯州或為湯泉郡瀼州十道志曰瀼州臨潭郡禹貢揚州之域春秋屬楚在鬱林之西南交趾之北隋大將軍劉方始開此路為鎮守尋又不通唐貞觀二年清平公李𢎞節遣欽州首領甯師宗招慰開拓尋劉方舊路得達交州為州在瀼水之東故以為名瀼音向章反籠州十道志曰籠州扶南郡古越地在南粤之西界唐貞觀十二年大使清平公李𢎞節招降獠置籠州以洞為名環州十道志曰環州整平郡禹貢揚州之域分𨽻桂州貞觀十二年李𢎞節招慰欵討環落洞故以名州州在遊盧水南整水北古州方輿志曰古州樂興郡土地同臨潭郡唐置古州或為樂興郡崖州方輿志曰崖州朱崖郡郡地海中之洲也洲方千里與今海康郡之徐聞縣對自徐聞徑度便風揚帆一日一夕即至梁置崖州漢書曰武帝元鼎六年開南海地置朱崖儋耳二郡元帝罷朱崖郡以其阻絶數反故罷之郡國志曰崖州婦人著緦綆以土為釡器用瓠瓢無水人飲唯石汁又有椒以安石榴花著甕中經旬即成酒其味香美能醉人交州記曰朱崖在大海中南極之中儋州十道志曰儋州昌化郡土地所屬與朱崖同漢元鼎六年定越地置儋耳郡唐武德四年置儋州漢書張晏註曰儋耳其俗鏤其頰皮上連耳匡分為數支狀似鷄腸因名焉海内南經曰有離耳郭景純註曰鎪其耳分令下垂為飾即儋耳也振州方輿志曰振州延德郡土地與朱崖郡同隋置臨振郡唐置振州瓊州方輿志曰瓊州瓊山郡土地與朱崖郡同唐貞觀六年割崖州置瓊州萬安州方輿志曰萬安州萬安郡土地與朱崖郡同唐置萬安州或為萬安郡太平御覽卷一百七十二
