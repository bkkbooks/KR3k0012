body:
  text: 太平御覧卷九百六十七宋李昉等撰果部四桃易通卦驗曰驚蟄大壯初九候桃始華不華倉庫多火焦贑易林師之坤曰春桃生華季女宜家毛詩周南桃夭曰桃夭后妃之徳也桃之夭夭灼灼其華又曰何彼穠矣華如桃李平王之孫齊侯之子又曰投我以木桃報之以瓊瑶又曰投我以桃報之以李大戴禮夏小正曰六月煑桃以為豆實崔氏四民月令曰三月桃花農人候時而種也禮記月令曰驚蟄之月桃始華春秋運斗樞曰玉衡星散為桃爾雅曰桃李醜核桃曰膽之孫炎注曰桃李之美背有核朋汁取其美者又曰旄冬桃榹桃山桃榹音斯實如桃而小不觧核周禮曰夏食鬰律桃李杏梅漢書曰文帝六年十月桃李華續漢書禮儀志曰仲夏之月陰氣萌作以朱索施門户各以所尚為饋周人木徳以桃為梗言氣相更也范􅁮後漢書曰杜林奏曰菓桃菜茹之饋集以成􅕹小事無妨於義以為大戮故國無㢘士家無完行唐書曰唐國貞觀十一年獻金桃銀桃詔令植之於苑圃後唐書曰潞州長栁巷田家有桃樹伐已經年舊坎仍在其仆木一朝屹然而起行數十歩復於舊坎其家駭異倉皇走散又曰莊宗在位多疾馮道因奏事言於帝曰臣願陛下寢膳之間動留調衞道因指御前果實曰如食桃不康翊日見桃思戒可也如食李不康翊日見李而思戒可也陛下幸思戒之矣管子曰五沃之土其果宜桃韓子曰昔彌子瑕有寵於衞君與君遊於果園食桃而甘以其半啖君曰愛我哉忘其口而啖寡人及彌子瑕色衰愛弛得罪於君曰是故嘗啖我以餘桃又曰孔子侍坐於魯哀公哀公賜之桃與黍仲尼先飯黍而後食桃公曰以黍雪桃也對曰黍五穀之長果六而桃為下君子不以貴雪賤梅子曰王莽畏漢髙神靈乃令虎賁㧞劍四面斫髙廟以桃湯赤鞭灑屋淮南子曰王子慶忌死於劍羿死於桃棓抱朴子曰桃膠以桑木灰漬服之百病愈久服身有光在晦夜之地如月出也多服之則可以㫁穀矣又内篇曰五原蔡誕入山而返欺家云到崑崙山有玉桃形如世間桃但光明洞徹而堅須玉井水洗之便軟而可食金樓子曰東南有桃都山山有樹樹上有鷄日初出照此桃天鷄即鳴天下之鷄感之而鳴樹下有兩鬼對持葦索取不祥之鬼食之今人正朝作兩桃人法乎此也說苑曰公孫僑相鄭路不拾遺桃李垂街人不敢取又曰孟嘗君將入西秦賔客諫之百通不聽也曰以人事諫我我盡知之若以鬼道則殺之謁者入曰有客以鬼道問客曰臣之來也過於淄水之上一土偶人方與木偶人語木偶人謂土偶人曰子先土也持子以為偶人遇天大雨水潦並至子必沮壊應曰我沮乃反吾真耳今子東園之桃也刻子以為梗遇天大雨水潦並至必浮子泛泛乎不知所止今秦四塞之國也有虎狼之心恐有木梗之患於是孟嘗君逡巡而退卒不敢西嚮秦晏子春秋曰公孫接田開疆古冶子事景公勇而無禮晏子言於公公饋之二桃曰三子計功而食公孫接田開疆先言功援桃而起古冶子又言其功令二子反桃二子慚而自殺古冶子曰耻人以言夸其聲不義也亦反其桃契領而死山海經曰夸父山北有林名曰桃林廣圍三百里其中多馬鹽鐵論曰夫桃李實多者來年為之穣新序曰魏文侯見箕季從者食其園桃箕季禁之文侯曰箕季豈愛桃哉是教我下無犯上也典術曰桃者五木之精也能厭伏邪氣者也桃之精生在鬼門制百鬼故令作桃鞭人着以厭邪此仙木也夢書曰桃為守禦辟不祥夢見桃者守禦官神農經曰玉桃服之長生不死若不得早服之臨死日服之其尸畢天地不朽王肅䘮服要記曰昔者魯哀公祖載其父孔子問曰寕設三桃湯乎答曰不也桃者起於衞靈公有女嫁乳母送所婦就夫家道聞夫死乳母欲將新婦返新婦曰女有三從今屬於人死當卒哀因駕素車白馬進到夫家治三桃湯以沐死者出東門北隅禮三終使死者不恨吾父無所恨何用三桃湯焉漢舊儀曰山海經稱東海之中度朔山山上有大桃屈蟠三千里東北間百鬼所出入也上有二神人一曰神荼二曰鬱壘主領萬鬼惡害之鬼執以葦索以食虎黃帝乃立大桃樹人於門户􅀞神荼鬱壘與虎葦索以禦鬼四王起事曰惠帝征成都王於安陽城北軍敗日已向中而大官尚未進食左右有賫秋桃十枚便以獻帝帝食三枚石超使人擘手奪三枚漢武故事曰東郡獻短人帝呼東方朔朔至短人指朔謂上曰王母種桃三千年結子此兒不良已三過偷之矣後西王母乃出桃七枚母自啖二以五枚與帝帝留核着前王母問曰用此何為上曰此桃美欲種之母歎曰此桃三千年一着子非下土所植也後上殺諸道士妖妄者百餘人西王母遣使謂上曰求仙信耶欲見神人而殺戮吾與帝絶矣又致三桃曰食此可得極壽漢武内傳曰西王母以七月七日降於帝宫命侍女索桃須臾以玉盤盛桃七枚大如雞卵形圓色青以呈王母王母以五桃與帝自食二桃西京雜記曰上林苑有奉桃櫻桃緗桃核桃霜桃金城桃胡桃綺桃含桃紫文桃妒記曰武陰女嫁阮宣武妬忌家有一株桃樹華葉灼耀宣嘆美之即便大怒使婢取刀斫樹摧折其華関令尹喜内傳曰喜從老子西遊省太真王母共食碧桃列仙傳曰師門者嘯父弟子也亦能使火食桃李葩夏孔甲為不能順其心意殺而埋之外野一日風雨迎之訖則山木皆焚孔甲祠而禱之未返而道死又曰葛由蜀羗人周成王世好刻木作羊賣之一旦騎半入蜀中王侯貴人追之上綏山皆得仙故里諺曰得綏山一桃雖不能得仙亦足以豪又曰楊都女隨犢子出種桃李一宿而返後數十年見在潘山下冬賣桃李神仙傳曰樊夫人與夫劉綱俱有道術各自言勝中庭有兩大桃樹夫妻各呪其一桃便闘綱所呪桃走出籬外又曰張陵沛人也有天神降之遂服丹能變化有趙升就陵受學陵以七事試之陵與諸弟子登雲臺山絶巖上有一桃樹大如臂旁生石壁下臨不測去上三四丈桃大有實陵謂諸弟子曰得此桃者當告以道要弟子皆流汗旡敢視者升曰神人所䕶何險之有乃從上自擲正投桃樹取桃滿懷而石璧峻峭不得返乃擲桃地上得二百枚陵分桃賜諸弟子餘二枚陵自食一留一以待升陵乃伸手引升升忽見返以向一桃與升又曰髙邱公服桃膠得仙鍾離意别傳曰周書言秦吏趙凱以私恨告園民呉旦生盗食宗廟御桃旦生對曰民不敢食也王曰剖其腹出其桃史記惡而書之曰桃食之當有遺核王不知此而割人腹以求桃非理也風俗通曰黃帝書稱上古之時兄弟二人曰荼與鬱住度朔山上桃樹下簡百鬼鬼妄榾人援以葦索執以食虎于是縣官以臘除夕飾桃人垂葦索􅀞虎于門效前事也𤣥中記曰木子之大者有積石山之桃實焉大如十斛籠嵩髙山記曰魏文帝時嵇叔夜胡昭在此學桃樹見在王子年拾遺記曰漢明帝時嘗獻巨核桃此桃霜下結花隆暑方熟嘗使植于林園俗謂相陵故聲之誤也又磅磄山去扶桑五萬里日所不及其地寒有桃樹千圍其花青黑色萬嵗一實陶潜桃源記曰晉太元中武陵人捕魚從溪而行忘路逺近忽見桃花林夾兩岸芳華鮮美落英繽紛林盡得山山有小口初極狹行數十歩豁然開朗屋舍連接鷄犬相聞男女衣着悉如外人見漁父驚為設酒食云先世避秦難率妻子家此遂與世隔問今何代不知有漢無論魏晉既出白太守遣人隨往尋之迷不復得晉中閣記曰華林園桃七百三十株白桃三株侯桃三株鄭緝之東陽記曰龍丘山有一巖外如窓牖内有石童巖前一桃樹其實甚甘裴淵廣州記曰廬山頂上有山桃人時登採拾只得于上飽啖不得持下下輙迷不能返石虎鄴中記曰石虎苑中有勾鼻桃重二斤南康記曰南康玉山上有石狗故老云古有寒桃生于嶺巔隐淪之士怪犬取其實因變成石焉楊衒之洛陽伽藍記曰景陽山百果園有仙人桃其色赤表裏照徹得霜乃熟亦出崑崙山一曰西王母桃也杜寳大業拾遺録記曰四年五月帝將北巡發自東都江東送白葉桃樹四株敇付西園種之其花似蓮花而小花有十餘重重有七八葉大于尋常桃花唐景龍文館記曰四年春上宴于桃花園群臣畢從學士李嶠等各獻桃花詩上令宫女歌之辭既清婉歌仍妙絶獻詩者舞蹈稱萬嵗上敕太常簡二十篇入樂府號曰桃花行廣志曰桃有冬桃夏桃秋桃神異經曰東北有樹焉髙五十丈其葉長八尺廣四五尺名曰桃其子徑三尺二寸小狹桃食之令人壽核中仁可以治嗽甄異傳曰譙郡夏侯文規亡後見形還家經庭前桃樹邊過曰此桃我昔所種子乃美好其婦曰人言亡者畏桃君不畏耶答曰桃東南枝長二尺八寸向日者憎之異苑曰太元中南陵郡江陵有棗樹一年忽生桃李棗三種花子幽冥録曰剡縣劉晨阮肇共入天台山採藥路迷不得返十三日糧盡飢餓欲死望山上有一桃大有子實而絶巖􅃉澗永無登路攀縁藤葛然後得上各啖數桃而不飢下山一大溪邊有二女姿質絶妙因要還家勅婢云劉阮二郎向雖得瓊實猶尚虛弊可速作食遂停半年懐土思歸女曰罪牽君如何便語以大路任昉述異記曰桃之大者謂之木桃詩云投我以木桃是也又曰耆舊説桓靈之世汝頴間禾麻為蒿莠桃李不實花而復落落而復花而官有朽粟嶺表録異曰偏核桃出畢占國肉不堪食胡人多收其核遺漢宫以稱珍異其形薄而尖頭偏如雀嘴破之食其桃仁味酸似新羅松子性熱入藥分與北地桃仁無異太清諸卉木方曰酒漬桃花而飲之除百病好容色本草經曰梟桃在樹不落殺鬼楚辭曰斬伐橘柚列樹苦桃夏侯孝若梁田賦曰沈朱李濫甘桃潘岳閑居賦曰三桃表櫻胡之别二柰耀丹白之色左思呉都賦曰洪桃屈盤丹桂灌叢曹毗魏都賦曰紫棃朱柿侯桃丹棗古歌辭曰桃生露井上李樹生桃傍虫來食桃根李樹代桃僵樹木身相代骨肉還相忘阮籍詩曰嘉樹下成蹊東園桃與李宋子侯董嬌嬈詩曰洛陽城東路桃李生路傍花花自相對葉葉自相當春風南北起花葉自低昻太平御覽卷九百六十七
