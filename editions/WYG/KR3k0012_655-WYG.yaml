body:
  text: 太平御覧卷六百五十五宋李昉等撰釋部三僧宋書曰僧道生彭城人幼而聰悟年十五便能講經及長有異觧立頓悟義時人推服元嘉十一年卒於廬山又曰徐湛之為南兖州刺史招集文士盡逰玩之適時有沙門釋永休善屬文辭采綺􅃩湛之與之甚厚孝武命使還俗姓湯位至揚州從事史又曰沙門慧琳秦郡秦縣人姓劉氏少出家住冶城寺有才章兼内外之學為廬陵王義真所知嘗著均善論頗貶議我佛法云有白學先生以為中國聖人經綸百世其徳𢎞矣智周萬變天人之理盡矣道旡隠旨敎罔遺筌聰睿廸哲何負於殊論哉有黒學道士陋之謂不照幽𠖇之途弗及来生之化雖尚虛心未能虛事不逮西域之深也為主客訓答其歸以為六度與五敎並行信順與慈悲齊伍論行於世文帝見論賞之元嘉中遂叅權要朝廷大事皆與議焉權侔宰相㑹稽孔愷常詣之慨然歎曰遂有黒衣宰相可謂冠履失所矣齊書曰趙僧岩北海人寥廓無常人不能測後忽為沙門栖遲山谷常以一壼自随一旦謂弟子曰吾今夕當死壼中大錢一千以通九泉之路蠟燭一條以照七尺之尸一夜而亡時人以為知命建康寔録曰沙門支遁字道林常隠剡東山不交人事好飬鷹馬而不乗放人或譏之遁曰貧道愛其神駿耳卒後戴安道常經其墓歎曰徳音未逺而拱木已積盖神理綿綿不與氣運俱盡耳支遁傳云夲姓關氏陳留人或云河東林慮人幼有神理聰明秀徹初至京師太原王濛甚重之曰造微之功不減輔嗣又曰王坦之初與沙門竺法師甚厚每共論幽𠖇報應使要先死者當報其事後經嵗師忽來云貧道已死罪福皆不虛唯當勤修道徳以升濟神明爾言訖不見坦之尋亦病卒梁書曰有惠岩惠議道人並住東安寺學行精整為道俗所推時闘場禅師窟東安談寺多禪都下為之語曰闘場禪師窟東安談議林髙僧傳曰攝摩騰中天竺人漢明帝遣中郎蔡愔等徃天竺尋訪佛法於彼遇見摩騰乃要還漢地明帝甚加賞接於城西門外立精舎以䖏之漢地有沙門之始也大法初傳未有歸信故藴其深觧无有宣述後卒於洛陽騰譯四十二章經一卷初緘在蘭䑓石室騰所住處今雒城西雍門外白馬寺是也又曰竺法蘭亦天竺人自言誦經論數萬章為天竺學者之師時蔡愔既至蘭與摩騰共契遊化遂相随而来昔漢武穿昆明池底得黑灰問東方朔朔云不知可問西域梵人法蘭至衆人追以問之蘭云世界終盡刦火洞燒此乃是也後卒於雒又曰康僧㑹其先康居人呉地初染大法風化未全僧㑹欲使道振江左乃杖錫東遊以呉赤烏十年初達建業宮立茆茨設像行道時呉國初見沙門疑為矯異有司奏曰有胡人入境自稱沙門容服非常事應檢察權曰昔漢明帝夢神號稱為佛彼之所事豈非其遺風耶即召㑹詰問有何靈騐㑹曰如来遷逝忽逾千載遺骨舎利神曜无方昔阿育起塔八萬四千夫塔寺之興以表遺化也㑹乃潔齋净室以銅瓶加几燒香禮請三七日果獲舎利權大歡服即為建塔號建初寺名其地為佛陁里又曰帛尸梨宻多羅此云吉支西域人時人呼為高座傳云國王之子當承繼世而以國讓弟遂為沙門宻天姿高朗風神超邁晉永嘉初始到中國值亂仍過江止建初寺丞相王導一見而竒之以為吾之徒也宻常在石子崗東行頭陁既卒因葬于此成帝懐其風為樹刹冡所後有關右沙門来遊乃於冡處起寺陳郡謝混賛成其業追旌徳事仍曰高座寺也又曰釋道安姓衛民常山扶桞人也形雖不逮於人而聰俊罕儔七嵗讀書再覧能誦年至十二出家日誦萬言師敬異之為受具戒至鄴過佛圗澄見而嗟賞與語終日因事澄為師澄講論往復疑難鋒起安挫銳觧紛行有餘力後避地南投㐮陽時㐮陽習鑿齒鋒辨天逸籠罩當時其先藉安高名早以致書通好及聞安至即徃修造既㘴稱言四海習鑿齒安曰彌天釋道安時人以為荅名常註諸經恐不合理乃誓曰若所說不甚違理願見瑞相乃夢見梵道人頭白眉毛長語安云君所註經殊合道理我不得入泥洹住在西域當相助𢎞通可時時設食後至逺公乃知和尚所夢賔頭盧也以晉太元十年卒年七十二羅什在西國因聞安風謂是東方聖人恒遥禮之初安生而便左臂有一皮廣寸許著臂上可得上下之惟不得出手時人謂之為邙手菩薩又曰慧逺姓賈鴈門樓煩人也届尋陽見廬峯清凈是以息心始住龍泉精舎刺史桓伊乃以為逺復於山東立房殿即東林是也既而謹律息心之士絶塵清信之賔並不期而至彭城劉遺民豫章雷次宗鴈門周續之新蔡畢頴之南陽宗炳等並棄世遺榮依逺逰止著治性論羅什見而歎曰邉國未有經便闇與理合豈不妙哉逺卜居廬阜三十餘年影不出山迹不入俗每送客常以虎溪為界焉慧逺集云隆安六年桓𤣥遺書於慧逺言沙門當致敬王者慧逺荅書論不可致敬之意又言袈裟非朝廷之服鉢盂非廊廟之器軍國非沙門之像竊所未安遂著沙門不敬王者論五篇一論在家二論出家三論出求宗不順化四論休極不兼應五論形盡神不㓕著是五論以明出家之法不合同俗以致敬於王者又曰竺道生姓魏鉅鹿人幼而穎悟聰哲若神初入廬山幽栖七年復還都止青園寺王𢎞范泰顔延之並挹敬風猷從之問道生曰夫象以盡意得意則象忘言以詮理入理則言息自經典東流譯人重阻多守滯文鮮見圓義在忘筌取魚始可與言道矣於是校閲真俗研思因果乃言善不受報頓悟成佛剖析經理洞入幽微乃說阿闡提人皆成得佛于時大夲未傳舊學以為邪説譏憤滋甚後湼槃大夲至于南京果稱闡提悉有佛性與前所說若合符契云又云釋惠觀姓崔清河人十嵗便以博見馳名晚適廬山咨禀慧逺聞什公入関乃自南徂北訪覈異同詳辨新舊風神秀雅思入𤣥微時人稱之曰通情則生融上首精難則觀肇苐一洛陽伽藍記曰融覺比丘曇謨最善於釋學講湼槃華嚴僧徒千人天竺國胡沙門菩提流支見而尊禮之號為菩薩流支觧佛義知名西土西土諸夷號為羅漢流支讀曇謨最大乗義章毎弹指賛歎昌言微妙即為胡書冩之傳於西域西域沙門常東向遥禮之號為東方聖人又曰僧肇法師制四論合為一卷曽呈廬山逺太師太師歎仰不已又呈劉遺民遺民歎曰不意方􅂁復有平叔方􅂁之語出遺民也又曰佛耶舎此名覺明日誦三萬言洞明三藏於羅什法師情好其出毗婆沙論及四分律為人髭赤時號為赤髭三藏談藪曰北齊髙祖多殺戮有稠禪師者以業行著稱箴之曰陛下羅刹化臨水必自見之如其言果見羣羅刹在其後於是乃禁斷鷹鷂造佛寺斷屠殺不食肉腥止食菜果而已又曰汝南周捨清信士也學通内外兼有才口謂沙門法雲曰孔子不飲盗泉之水法師何以捉鍮石香爐答曰檀越既能載纛貧道何為不執鍮僕射徐孝嗣修緝高座寺多在彼晏息法雲曰法師亦治蕭寺日夕遊此二寺隣接而不相徃来孝嗣嘗謂法師曰常在髙座不遊髙座寺答曰檀越既事蕭門何不至蕭寺又曰魏李恕聘梁沙門重公接恕曰向来余無葅膎户佳切恕父名諧以為犯諱怒曰短髪粗疎重公曰貧道短髪沙門種類以君交聘二國不辨膎諧重公常謁髙祖問曰弟子聞在外有四聲何者為是重公應聲答曰天保寺刹及出劉孝綽道以此為能綽曰何如道天子萬福唐髙僧傳曰三藏法師𤣥装陳留人姓陳氏貞觀初肇自咸京誓徃西國窮覧聖迹經六載至摩伽陁城凡十二年備歴聖君龍庭之文鷲嶺之秘皆研機覩奥矣又造迦葉結集之墟千聖道成之樹䖍心頂禮焚香散花設大施念於是五天億衆十八國王獻氊投珠積如山岳咸稱法師為大乗也及東歸太宗詔留於𢎞福道塲乃詔名徳僧靈潤等二十人譯梵自菩薩戒至摩訶般若總七十四部一千三百餘軸法師身長八尺眉目疎朗凡所遊歴一百二十八國長阿含經曰凡沙門衣鉢随身譬如飛鳥四十二章經曰僧行道如牛負深泥中疲極不敢左右顧増一阿含經曰沙門皆草蓐為牀又曰四河入海無復河名四姓為沙門皆稱釋種無為經曰沙門有三坐禅為上軰誦經為中軰助衆為下軰道安傳曰初魏晉沙門依師為姓故性各不同安以為大師之夲莫遵釋迦乃以釋命氏後獲増一阿含經果稱四河上入海無復河名既符於經遂為永式異僧上晋書曰鳩摩羅什天竺人也世為國相父鳩摩羅炎聰懿有大莭将嗣相位乃辭出家東度葱嶺龜兹王聞其名郊迎之請為國師王有妹年二十才悟明敏諸國交聘並不許及見炎心欲當之乃逼以妻焉既而羅什在胎其母慧觧倍常及年七嵗母遂與俱出家羅什從師受經日誦千偈義亦自通年十二其母携到沙勒國王甚重之遂停沙勒一年博覧五經為性率達不拘小檢專以大乘為化諸學者共師焉年二十龜兹王迎之還國廣説諸經四逺學徒莫之能抗西域諸國咸伏羅什神儁符堅聞之乃遣呂光率兵伐龜兹謂光曰若獲羅什即馳馹送之光還至梁州聞符堅為姚萇所害於是竊號河右羅什在梁州積年姚興破呂隆乃迎羅什待以國師之禮嘗講經於草堂寺忽下高座謂興曰有二小兒登吾肩慾鄣須婦人興召宫女進之一交而生二子焉又曰沙門曇霍秃髮傉檀時從河南来持一錫杖令人跪曰此是般若眼奉之可以得道人或藏其錫杖曇瞿大哭數聲閉目湏臾起而取之咸竒其神異莫能測也後兵亂不知所在又曰佛圗澄天竺人也姓帛氏少學道妙通𤣥術永嘉四年来適洛陽自云百有餘嵗常服氣自飬能積日不食善誦咒能役使鬼神以油麻雜菌支塗掌千里外事皆徹見掌中如對面焉腹旁有一孔常以絮塞之每夜讀書則拔絮孔中出光照於一堂又常齋時平旦至流水側從腹旁孔中引出五臟六腑洗之還内腹中卒於鄴宫寺後有沙門從雍州来稱見澄西入關石季龍掘而觀之唯有一石而無尸石季龍􅁖之曰石者朕也塟我而去吾將死矣明年季龍死梁書曰沙門釋寳誌不知何許人於宋泰始中見之出入鍾山往来都邑年已五十六矣宋齊之交稍顯靈迹被髪徒跣語嘿不倫或被錦􅂁飲啖同於凡俗恒以銅鐃剪刀鑷属柱杖負之好為懴記所謂志公符是也天監十二年卒將死忽移寺金剛像出置户外語人云菩薩當去旬日無疾而終先是琅琊王筠至莊嚴寺寳誌遇之與交言􅂬飲至亡𠡠令筠為碑盖先覺也洛陽伽藍記曰沙門寳公不知何許人也形貎􅃦陋心議通達過去未来預覩三世發言似懴不可得觧事過之後始騐其實胡太后問以世事寳公曰把粟與鷄喚朱時人莫觧建義元年后為爾朱榮所害始騐其言又曰法雲寺西域烏陽國胡沙門曇摩羅所立摩羅聦慧利根學窮釋氏至中國即曉魏言及𨽻書凡所聞見無不通觧京都沙門好胡法者皆就摩羅授持之戒行真苦秘咒神騐咒枯樹能生枝葉咒人變為驢馬見者莫不驚怖西域所賫舎利骨及佛牙經像皆在此寺髙僧傳曰耆域天竺人以晋惠之末至于洛陽見洛陽宫城云髣髴似㣼利天宫但自然之與人事不同耳又曰匠此宫者從㣼利天来成便還天上矣又曰犍陁勒者夲西域人来至洛陽積年衆雖敬其風操而終莫能測後謂衆僧曰洛東南有槃鵄山山有寺廟處基址猶存可共修立衆未之信試遂檢視入山到一處四面平坦勒示云此山寺基也即掘之果得寺下石其後講堂僧房處如言皆騐衆咸驚歎因共修立焉又曰釋曇始關中人晉孝武太元末賫經律數十部往遼東宣化顯授三乗髙句驪問道之始也義初復還関中足白於面雖屡渉泥水未嘗沾汚天下咸稱白足和尚又曰釋法成凉州人十六岀家學經律不餌五穀唯食松脂隠居巖穴習禪為務後小疾便告衆云亡常誦寳積經於是自力誦之始得半卷氣劣不堪乃令人讀之一遍裁竟合掌而卒侍疾十餘人咸見空有紺馬負金棺昇空而逰又曰竺曇猷燉煌人少苦行習禪定逰江左止剡之石城山乞食㘴禪後有神見形詣猷曰師威徳既重来止此山弟子輙推室以相奉天台山懸崖峻峙峰嶺挿天古老相傳云上有精舎得道者居之雖有石跨澗而横石斷之自終古以来無得至者猷行至橋所聞空聲曰知君誠篤今未得度却後十日自當来也猷每恨不得度石洞間度橋少許覩精舎神僧果如前所説因共燒香中食食畢神僧謂猷曰却後十年自當来此今未得主於是而返又曰釋曇諦其先康居人母黄氏晝寢夢見一僧呼黄氏為母寄一塵尾并鐡鏤書鎮二枝眠覺見兩物俱存因而懐孕生諦諦年五嵗以麈尾等示之諦曰秦王所餉母曰汝置何處答曰不憶至年十嵗出家學不從師悟自天發後見僧䂮音略法師䂮曰即先師𢎞覺法師也䂮晚入呉居虎丘寺唐髙僧傳曰萬廽姓張氏閿鄉人其形如愚蒙其跡乃神聖苦樂貴賤不關於心歌哭隠顯不恒其性剃髪褐衣好逰迦藍年十嵗有兄戍遼陽其母憶甚飯僧祈福師忽然啖齋餘出門徑去晩際執兄書至母驚問其由黙然而無對後兄来還言是日萬廽云從家来啖齋餘取書而反始知其靈神焉中宗賜號𤣥通大居士封雲誨公太平御覧卷六百五十五
