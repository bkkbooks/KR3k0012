body:
  text: 太平御覽巻五百七十八宋李昉等撰樂部十六琴中樂府解題曰水僊操伯牙學琴於成連先生三年不成至於精神寂寞情之専一尚未能也成連云吾師方子春今在東海中能移人情乃與伯牙俱往至蓬萊山留宿伯牙曰子居習之吾将迎師刺船而去旬時不返伯牙近望無人但聞海水汨滑崩折之聲山林窅寞群鳥悲號愴然而嘆曰先生将移我情乃援琴而歌曲終成連回刺船迎之而還伯牙遂為天下妙矣又曰雉朝飛操者齊宣王時處士沭犢子所作也年七十無妻出薪於野見雉雌雄相隨則心悲乃仰天嘆曰聖王在上恩及草木鳥獸而我獨以不獲援琴而歌以自傷又曰思歸引衛有賢女邵王聞其賢請聘之未至王薨太子曰吾聞齊桓得衛姬覇今衛女賢者欲留之大夫曰不可若賢必不我聽若不賢不足取太子不聽遂拘留深宫思歸不得歸援琴而歌曲終自縊而死揚雄琴清英曰尹吉甫子伯竒至孝後母譛之自投江中衣折帶藻忽夢見水仙賜其美藥唯念養親揚聲悲歌船人聞而學之吉甫聞船人之聲疑似伯竒援琴作子安之操琴操曰商陵牧子娶妻無子父母将改娶牧子援琴鼓之痛恩愛乖離故曰别鶴操揚雄琴清英曰雉朝飛操者衛女之所作也衛侯女嫁於齊太子至中道聞太子死問傅母何如傅母曰且往當䘮畢不肯歸終之以死焉傅母好琴取女自操琴於塜上鼓之忽三雉俱出墓中傅母撫雌雉曰女果為雉耶言未卒俱飛而起忽然不見傅母悲痛援琴作操故曰雉朝飛琴操曰古琴曲有歌詩五曲一曰鹿鳴二曰伐檀三曰騶虞四曰鵲巢五曰白駒又有一十二操一曰将歸操孔子所作孔子之趙聞殺鳴犢而歸作此曲也二曰猗蘭操孔子所作傷不逢時三曰龜山操孔子作季桓子受齊女樂孔子欲諌不得退而望魯龜山作曲喻季氏若龜山之蔽魯也四曰越裳操周公所作五曰拘幽操文王作文王拘於羑里作此曲六曰岐山操周人為太王所作七曰履霜操尹吉甫子伯竒無罪見逐自傷作此曲八曰雉朝飛操沐犢子所作沐犢子七十無妻見雉雙飛感之作此曲也九曰别鶴操商陵牧子所作取妻五年無子父母欲改娶其妻聞之中夜悲牧子因之作此曲十曰殘形操曽子夢見一狸不見其足而作此曲十一曰水仙操伯牙所作十二曰懐陵操伯牙所作又有九引一曰列女引楚樊姬所作二曰伯姬引魯伯姬所作三曰貞女引魯漆室女所作四曰思歸引衛女所作五曰霹靂引楚商梁出逰九臯之澤遇風雷霹靂畏懼而歸作此引六曰走馬引樗里牧恭所作牧恭為父報寃殺人而亡藏於山林之下有天馬引之感作此引七曰箜篌引樗里子髙所作即公無渡河曲八曰琴引秦時屠門髙所作九曰楚引楚龍丘子髙所作又有河間雜歌二十一章琴厯曰琴曲有蔡氏五弄雙鳳離鸞歸風送逺幽蘭白雪長清短清長側清調瑟調大遊小遊昭君胡笳廣陵散白魚歎楚妃歎風入松烏夜啼楚明光石上流泉臨汝侯子安之流漸洄雙燕離陽春弄恱人弄連珠弄中揮清暢志清蟹行清看客清便僻清婉轉清大周正樂曰師襄子夫子琴師也方子春教成連先生鼓琴能化人情者也成連先生教伯牙鼓琴者也鍾子期善聽知音者也子期死伯牙終身不鼓琴者也顔淵聽夫子琴知周衰者也涓子操琴心玉篇者也琴高以琴養性求仙於羅浮山中鼓琴於郢中奏陽春白雪者也雍門周以琴感孟甞君悲者也鄒忌與齊王言琴事以方正定徳者也榮啟期對夫子弹琴言三樂之事者也禽孟臨蠻户死而琴歌者也應侯鼓賈子對以取牛婦人者也子桑飢寒欲死鼓琴而歌者也師曠為晉平公操徴感𤣥鶴二七下舞者也師滑冩濮上琴聲者也子夏除䘮曰琴樂曰不敢不至者也閔子騫除䘮曰弹琴不成聲者也宓子賤治單父不下堂弹琴而邑自理者也踞轉鼓琴春秋晉大夫張骼輔轢者也衛師曹衛獻公令師曹教公嬖妾師曹鞭之公怒之鞭師曹三百者也又曰冦先生宋人也以釣魚為業宋景公問道不告殺之後十五年在宋城門下弹琴者也已上自堯神人暢至始皇九十三弄好事七十二人並為上石又曰杞梁妻者齊邑杞梁殖妻之所作也荘公襲莒殖戰而死荘公還遇其妻於路使使者道弔之妻曰今殖有罪君何辱命焉若殖免於罪賤妾有先人之弊廬妾不敢與郊弔也公乃弔諸室成禮而去妻歎曰上則無父中則無夫下則無子外無所依内無所倚将何以立吾莭豈能更二哉死而已矣於是乃援琴而鼓之又曰伐檀操者魏國女之所作也傷賢者隐蔽素飱在位閔傷怨曠失其嘉㑹夫聖主之制能治人者食於人不能治人者食於田今賢者隐退伐木小人在位食祿懸珍竒積百榖并包有土徳澤不加百姓傷痛上之不知王道之不施仰天長嘆援琴而鼓之又曰将歸操者孔子之所作也趙簡子循執玉帛以聘孔子孔子将往未至渡狄水聞趙殺其賢大夫竇鳴犢喟然而嘆之曰夫趙之所以治者鳴犢之力也殺鳴犢而聘余胡丘之往也夫燔林而田則麒麟不至覆巢破卵則鳳凰不翔鳥獸尚惡傷類而况君子哉於是援琴而鼓之又曰岐山操者周大臣之所作也太王居幽狄人攻之仁恩惻隐不忍流血選㨂珍寳犬馬皮幣束帛與之狄侵不止問其所欲欲得土地太王曰􅁟地者所以養萬民也吾将委國而去矣二三子亦何患無君焉遂杖䇿而出踰乎梁而邑乎岐山自傷力不能化夷狄為其所侵喟然嘆息援琴而鼔之又曰三子窮操者其思革子之所作也其思革子城石文子叔愆子三人相與為友聞楚成王賢而好士三子相與俱往見之至於磝磽嶔岩之間卒􅑮飄風暴雨相與俱伏空栁之下衣寒乏糧自度不得活三人相視而嘆曰與其饑寒俱死也豈若併衣糧於一人哉二人俱以其思革子為賢推衣糧與之革子曰死其共之今二子以賢愚相辭乃以死讓孰賢哉辭而不受二子曰吾自以相與猶左右手也左傷則右救之右傷則左救之子不我受俱死無名於世不亦痛乎於是思革子乃受之二子遂凍餓而死其思革子抱二子尸而埋之號天哭泣竭哀而去往見楚王楚王知其賢者於是㫖酒嘉餚設鐘鼓樂之其思革子愴然有憂悲之意楚王心動怪而不恱乃推罇罷樂引琴而進其思革子援琴而鼓之作相與别散之意王聞曰子琴音何哀苦也革子推琴離席長跪涕流而下對臣友三人石文子叔愆子竊慕大王髙義欲俱來謁至於磝磽嶔岩之間􅑮飄風暴雨衣寒糧乏度不能俱活二子俱不以臣為不肖推糧與臣二子􅑮凍餓死大王雖陳酒餙設樂誠不敢酣樂也楚王曰嗟乎乃如是耶於是賜其思革子黄金百斤命左右棺歛收二子而塟之以其思革子為相故曰三士窮又曰鹿鳴操者周大臣之所作也王道衰君志傾留心聲色内顧妃后設㫖酒嘉肴不能厚養賢者盡禮極歡形見於色大臣昭然獨見必知賢士幽隐小人在位周道陵遲自以是始故弹琴以風諌歌以感之庶幾可復歌呦呦鹿鳴食野之苹我有嘉賓鼓瑟吹笙吹笙鼓簧承筐是将人之好我示我周行此言禽獸得美甘之食尚知相呼傷時在位之人不能乃援琴以刺之故曰鹿鳴也又曰騶虞操者邵國女之所作也古有聖王在上君子在位役不踰時不失嘉㑹内無怨女外無曠夫及周道衰㣲禮義廢弛强凌弱衆暴寡萬民騷動百姓愁苦男怨於外女傷於内内外無主内迫情性外迫禮義歎傷所說而不􅑮時於是援琴而歌又曰猗蘭操者孔子之所作也孔子周流天下聘諸侯莫能任用自衛反魯過隐山中見薌蘭之獨茂也喟然而嘆曰夫蘭當為王者香今乃獨與衆草為伍譬猶賢者不得􅑮時與鄙夫為倫也凭車撫軾援琴而鼓之自傷不􅑮時也又曰龜山操者孔子之所作也齊人饋女樂季桓子受之魯君閉門不聽朝當此之時季氏專政上僣天子下畔大夫賢聖斥逐讒邪滿朝孔子欲諌而不聽復退而望魯魯有龜山蔽之辟季氏於龜山託勢位於斧柯季氏專政道猶龜山之蔽魯也傷政道之不用閔百姓不得其所欲誅季氏而力不能於是援琴而歌又曰白駒操者失朋友之所作也其友賢俱仕乎衰亂之世君無道不可匡輔依違成風諌不見受國士詠而思之援琴而長歌又曰越裳操者周公之所作也周公輔相成王成就文王之道天下太平萬國和㑹四夷納貢越裳重九譯而来獻白雉執贄曰吾君在外國也頃無迅風暴雨意者中國有聖人乎故遣臣來周公於是仰天而嘆之援琴而歌又曰拘幽操者文王之所作也紂為無道上逆天文下變地理刑無罪殺不辜斮朝渉刳孕婦百姓怨悲海内同心苦之文王為西伯種徳修仁布其恩惠天下三分有其二紂大怒其有仁心也召而朝之拘于羑里文王憂愁援琴而歌之故曰拘幽操也又曰聶政刺韓王者聶政之所作也聶政父為韓王治劒過時不成韓王殺之時政未生及壮問其母曰父何在母告之政欲殺韓王乃學塗入王宫㧞劒刺韓王不得走政踰城而出去入太山遇仙人學鼓琴漆身為厲吞炭變其音七年而琴成欲入韓國道逄其妻妻對之泣下對曰夫人何故泣妻曰聶政出遊七年不歸吾常夢相思見君對妾笑齒似政齒故我心悲而泣也政曰天下人齒盡政若耳胡為泣乎即别去復入山中仰天而嘆曰嗟乎變容易身欲為父報仇而為妻所知父仇當何時復報援石擊落其齒留山中三年習操持入韓國人莫知政政鼓琴闕下觀者成行馬牛止聽以聞韓王王召政而見之使之弹琴政即援琴而歌之内刀在琴中政於是左手持衣右手出刀以刺韓王殺之曰烏有使人生不見其父可得死乎政殺國君知當及母即自犁剥面皮斷其形體人莫能識知乃梟磔政形體市懸金其側有知此人者賜金千斤遂有一婦人往而哭曰嗟乎為父報仇耶顧謂市人曰此所謂聶政也為父報仇知當及母乃自犁剝面何愛一女之身而不揚吾子之名哉乃抱政尸而哭寃結䧟塞遂絶行脉而死故曰聶政刺韓王又曰曽子歸耕者曽子之所作也曽子事孔子十有餘年眷然念二親年衰養之不偹欲歸而重嘆之於是援琴而歌之又曰崔子渡河者閔子騫之所作也崔子早無母其後母常以其死母名呼之不應者後母輒笞之崔子惡其與母同名欲自殺恐揚父惡又死母名應則逆非義也則以能遊渡河為辭繫石於腹入水自沉是以父過不揚閔子騫大其能為父隐傷痛之故援琴而鼓之以美其意故曰崔子渡河又曰屈原自沉者屈原之所作也屈原楚同姓也為懐王佐博聞强識疏通政事入則與王議國計䇿以施號令出則接遇賓客應對諸侯上官大夫與之争寵害其器能譛之於王曰使屈原毎一出令伐功以其非巳莫能於是懐王怒而斥之屈原自傷懐忠而見疑憂愁面目黧黒臨河而哀思著離騷九歌九歎七諌之辭仰天而歎援琴而歌之又曰孔子厄者孔子之所作也孔子應聘於楚待禮於陳在陳絶糧從者病莫能興喟然而歎曰歸歟歸歟吾黨之小子狂簡斐然成章不知所以裁之於是援琴而鼓之以自殺其志故曰孔子厄又霍将軍歌者霍去病之所作也去病為討㓂校尉為人少言勇而有氣使擊匈奴斬首二千後六出斬首十餘萬級益封萬五千户侯祿與大将軍等於是志得意歡乃援琴而歌之又曰鳳凰來儀者周成王之所作也成王即位用周召畢榮之属天下大治殊方絶域莫不蒙化是以越裳獻雉重譯来貢太平之瑞同時而應麒麟游苑圃鳳凰翔舞於庭頌聲並作僉然大同於是成王乃援琴而鼓之又曰子安之者其門離湏之所作也其門離湏兄弟三人長兄從軍二年不歸離湏坐視被刑天下昏亂兵革騷動宗族離散離湏當逺往輸持其小弟往寄所知分别相去垂涕而决其弟歔欷謂離湏曰吾生不睹母長不識父遭顛沛擾攘之世兄從軍不歸子復逺輸未知反期一旦是非使吾無所依吾聞兄在林梨欲從之離湏止之曰兵革交錯道路不通子為我無往往必不還今吾兄弟分離死别不亦痛乎喟然不應涕泣而别離湏嘱其主人曰此子欲往慎為我勿遣也去數日卒夜往不知其處離湏來遂分布求之卒不得憂思不樂仰天而歎於是援琴而鼓之又曰力拔山者項羽之所作也項王為漢所圍於垓下諸侯兵悉到圍數重項王夜覺聞四面楚歌驚起坐仰天而歎曰漢得吾衆是何楚歌之多於是心悲援琴而鼓之又曰禹上㑹稽者禹之所作也堯時洪水滔天百姓巢居不安堯乃徴禹而使治之禹乃決江河上㑹稽山顧曰嗚乎洪水滔天下人愁悲上帝俞咨三過吾門不入父子道衰非欲伐功也傷君莫知不欲煩下民自是之後百姓降立黎庶乂安弹琴以自嘆故曰禹上㑹稽又曰箕子吟者箕子之所作也箕子紂之諸父也紂為無道殺比干醢梅伯斮朝涉刳孕婦奢淫驕恣不修道徳箕子知不可諌乃被髪佯狂痛宗廟之坵墟喟然援琴而鼓之又曰文王思士者文王之所作也文思得賢士與為治出游援蓍而卜之卦得所獲非龍非麟非虎非熊乃帝王之師也至渭之陽果遇吕尚與語大恱之曰吾先人太公有言當有聖人適周子其是耶遂載與之俱歸立以為師號曰太公望文王恱喜乃援琴而鼓之自叙思士之意故曰文王思士又曰武王伐紂者武王之所作也武王興師伐紂伯夷叔齊抜劒扣馬曰父死不塟而爭天下非孝也執贄而事之舉兵而伐之非義也武王以告太公望太公曰循大行者不顧細禮立大功者不恤後愆遂克殷誅紂於牧野於是天下晏然萬民懽忻武王援琴而鼓之太平御覽巻五百七十八
