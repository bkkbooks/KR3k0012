body:
  text: 太平御覽卷二百八十四宋李昉等撰兵部十五機略三機略三後漢書朱雋傳曰趙𢎞據宛城雋因急擊𢎞斬之賊餘帥韓忠復據宛拒雋雋兵少不敵乃張圍結壘起土山以臨城内因鳴鼓攻其西北賊悉衆赴之雋自將精卒五千掩其東北乗城而入忠乃退保小城惶懼乞降司馬張超及徐璆秦頡皆欲聴之雋曰兵有形同而勢異者秦項之際人無定主也故賞附以勸來耳今海内一統唯黄巾造冦納降無以勸善討之足以懲惡今若受之更開逆意賊利則進戰鈍則乞降縱敵長冦非良計也因急攻連戰不剋雋登土山望之顧謂張超曰吾知之矣賊今外圍周固内營逼急乞降不受欲出不得所以死戰也萬人一心猶不可當况十萬乎其害甚矣不如撤圍并兵入城忠見圍解勢必自出自出則意散易破之道也既而解圍忠果出戰雋因擊之大破之乗勝逐北數十里斬首三萬餘級忠等遂降又曰董卓將三萬討先零羗卓於望垣北為羗胡所圍粮食乏絶進退逼急乃於所渡水中偽立􅋣以捕魚而潜從􅋣下過軍賊追之以水深不得渡時衆軍敗退唯卓全師而還又曰臧宫將兵屯駱越越人謀叛從蜀宫兵少力不能制㑹屬縣送度輸車􅂾百乗至宫夜使鋸㫁城門限令車廻轉出入至旦越人候伺者聞車聲不絶而門限㫁相告以漢兵大至其渠帥乃奉牛酒以勞軍大陳兵㑹擊牛釃酒饗賜慰納之又曰梁州賊王國圍陳倉拜皇甫嵩為左将軍督前將軍董卓各率二萬人拒之卓欲速赴陳倉嵩不聴卓曰知者不後時勇者不留决速救則城全不救則城滅嵩曰不然百戰百勝不如不戰而屈人之兵是以先為不可勝以待敵之可勝不可勝者在我可勝者在彼彼守不足我攻有餘有餘者動於九天之上不足者䧟於九地之下今陳倉雖小城守固備非九地之䧟也王國雖強而攻我之所不救非九天之勢也夫勢非九天攻者地守者不拔國今已䧟受害之地受害䧟非九而陳倉保不拔之城我可不煩兵動衆而取全勝之功将何救焉遂不聴王國圍陳倉自冬迄春八十餘日城堅守固竟不能拔賊衆疲弊果自解去嵩進兵擊之卓曰不可兵法窮寇勿迫歸衆勿追司馬兵法之言今我追國是廹歸衆追窮寇也困獸歸鬬蜂蠆有毒况大衆乎嵩曰不然前吾不擊避其鋭也今而擊之待其衰也所擊疲師非歸衆也且走者莫有鬬志以整擊亂非窮寇也遂獨進擊之使卓為後拒連戰大破之斬首萬餘級國走而死卓大慚恨由是拒嵩又曰吳漢岑彭討公孫述述使其将延岑等悉兵拒廣漢及資中又遣将侯丹率二萬餘人拒黄石彭乃多張疑兵使䕶軍楊翕與臧宫拒延岑等自分兵浮江下還江州今南郡即漢江州縣泝都江而上都江城都江也襲擊侯丹大破之因晨夜倍道兼行二千餘里徑拔武陽使精騎馳廣都去城都數十里勢如風雨所至皆奔散初述聞漢軍至武陽繞出延岑軍後蜀地震駭又曰馬援為隴西太守發歩騎三千人擊先零羗将其妻子輜重移阻於允吾谷允吾音鈆牙援乃潛行間道掩赴其營羗大驚攘復逺徙唐翼谷中援復追討之羌引精兵聚北山上援陳軍向山而分遣數百騎繞襲其後乗夜放火擊鼓呌譟遂大潰又曰馮異與鄧禹率車騎将軍鄧𢎞等議攻赤眉異曰賊衆尚多可稍以恩信傾難卒用兵破也上今使諸将屯澠池要其東而異擊其西一舉取之此萬全計也禹𢎞不聴𢎞遂大戰移日赤眉佯敗棄輜重而走車皆載土以豆覆其上兵士餓爭之赤眉自引還擊𢎞𢎞軍大亂異與禹合兵救之赤眉小却異謂士卒餓倦可且休禹不聴復戰大為所敗又曰河南賊張步據地漢将耿弇討之壁於臨淄步與其三弟藍􅒮夀及故大彤渠帥重異等兵重姓異名也號二十萬至臨淄大城東将攻弇弇先出淄水上與重異遇突騎欲縦弇恐挫其鋒令步不敢進固示弱以盛其氣乃引歸小城陳兵於内步氣盛直攻弇夀與弇禆将劉歆等合戰弇升王宫壞臺望之臨淄本齊國所都即齊王宫中壞臺也視歆等交鋒乃自引精兵横衝歩陣於東乗下大破之又曰赤眉青犢十餘萬衆並在射犬光武引兵将擊之耿純軍在前去衆營數里賊忽夜攻純雨射營中士多傷純勒部曲堅不動選敢死千人俱持强弓各傅三矢使銜枚間行傅傅著也繞出賊後齊聲呼譟強弓並發賊衆驚走追擊之遂敗又曰光武遣将王霸馬武擊河南賊周建於垂恵賊帥蘇茂將五校兵四千餘人救建而先遣精騎遮擊馬武軍糧武往救之建縦城中兵出夾擊武武恃霸之援戰不甚力為茂建所敗武軍奔過霸營大呼求救霸曰賊兵盛出必兩敗努力而已閉營堅壁軍吏皆爭之霸曰茂兵精鋭其衆又多吾吏士心恐而馬武與吾相持兩軍不一此敗道也今閉營固守示不相援賊必乘勝輕進馬武無救其戰自倍如此茂建家疲勞吾乗其弊乃可克也茂建果悉出兵攻武合戰良久霸軍中壯士路潤等數十人㫁髪請戰霸知士心鋭乃開營後出精騎襲其背茂建前後受驚亂敗走又曰西域莎車國寶不供将兵校史班超發于闐疏勒諸國二萬五千人擊之莎車求救龜兹龜兹王遣左將軍發溫宿姑墨尉頭合五萬人助之超召諸将及于闐疏勒王議曰兵少不敵莫如各解散去于闐従東歸長史亦従此西歸夜半聞鼓聲便發衆皆以為然乃隂緩所擒得生口歸以超言告龜兹龜兹聞之喜使其将以萬騎於西界遮温宿王將八千騎于東界遶于闐王人定後超密令諸司馬勒兵至雞鳴馳赴莎車草營掩覆之胡皆驚走斬首五千級莎車遂降又曰光武遣将鄧禹西征至河東禹擊更始将王匡禹軍不利戰罷明日癸亥以六甲窮日不出禹因得更整兵勒衆明晨匡悉軍出攻禹禹令軍中無得徹動既至營下因𫝊發諸将鼓而並進大破之又曰馮異将數萬人與賊約期㑹戰使壯士變服與赤眉同伏于道側明日赤眉使萬人攻異前部異少出兵以救賊見勢弱遂悉衆攻異異乃縦兵大戰伏兵卒起衣服相亂赤眉不復識别遂驚潰大破之又曰曺公征河北師次頓丘黒山賊子毒等攻東武陽曺公引兵西入山攻毒等本屯毒聞之棄武陽還魏武要擊于内黄大破之又曰曺公征張繡于穰荀攸曰綉仰食于劉表表不能供也勢必離今緩之可誘致急之則相救公不聴與繡戰表果救之公敗歸又曰青徐黄巾三十萬衆入渤海界欲與黒山合公孫瓚率二萬人逆擊於東光南大破之斬首二萬餘級賊棄輜重數萬而奔走渡河瓚因其半濟擊之賊復大破死者數萬太平御覽巻二百八十四
