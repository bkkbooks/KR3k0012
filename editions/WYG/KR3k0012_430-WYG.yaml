body:
  text: 太平御覧卷四百三十宋李昉等撰人事部七十一信謹慎信釋名曰信申也相申束使不相違也易中孚卦信及豚魚又乾文言君子忠信所以進徳也韓詩外傳曰受命之主正其衣冠而立儼然人望而信之其次聞言而信次見行而信既聞其言既見其行衆皆不信民之下也又曰孟子少時聞東家嘗殺猪孟子問其母曰東家殺猪何為其母曰欲啖汝母悔失言曰吾懐是子席不正不坐割不正不食胎教之也今適有知而欺之是教之不信乃買東家猪肉以食之眀不欺也禮記儒行曰儒有不寳金玉而忠信以為寳又曰忠信以為甲胄左傳僖中曰晉侯圍原命三日之粮不降命去之諜出曰原将降矣軍吏曰請待之公曰信國之寶也民之所庇也得原失信何以庇民所亡滋多退一舍原降吕氏春秋云七日期原不下去之也明年復伐與士期必得而反原聞之乃下衛人曰文公信至矣乃歸之故曰攻原得衞新序云温人聞之而降故曰伐原得温又僖下曰王子虎盟諸侯于王庭要言曰皆奨王室無相害也君子謂是盟也信公羊傳曰荘公㑹齊侯盟于柯荘公将㑹曹子進曰君之意何如荘公曰寡人之生則不若死自傷與齊侯讎不能復也曹子曰然則君請當其君臣請當其臣荘公曰諾於是㑹荘公升壇曹子手劒而從之管子進曰君何求曹子曰城壊壓境齊數取魯邑以渝信君不圖歟君謂齊桓公也不當數侵魯地也願請汶陽之田管仲顧曰君許諾桓公曰諾曹子請盟已曹子摽劒而去之要盟可犯而桓公不欺曹子可讎而桓公不怨桓公之信著乎天下自柯之盟始也又僖中曰晉獻公死奚齊立里克謂荀息曰君殺正廢長而立㓜如之何願與子慮之荀息曰君嘗訊臣訊問臣對曰使死者反生生者不愧乎其言則可謂信矣里克知其不可與謀退殺奚齊荀息立卓子里克殺卓子荀息死之荀息可謂不食其言矣論語學而曰信近於義言可復也又顔淵曰子貢問政子曰足食足兵民信之矣子貢曰必不得已而去於斯三者何先曰去兵曰必不得已而去於斯二者何先曰去食自古皆有死民無信不立言民所特急者信也爾雅曰西至日所入為大蒙大䝉之人信史記蘇秦說燕王曰尾生與女子期於梁下女子不来水至不去抱梁柱而死又曰楚荘王圍宋五月不解宋城中急無食華元乃夜出見楚將子反告荘王王問曰城中何如曰析骸而炊易子而食王曰誠哉是言我軍亦有三日粮以其信故遂罷兵去又曰季札之初使北過徐君君好季札劒口弗敢言季札知之為使上國未獻還至徐君已死於是乃解其寶劒繫徐君冡樹而去從者曰徐君已死尚誰與乎季子曰不然心已許之豈以死背吾心漢書曰季布楚人以任侠為名以然諾聞楚人為之諺曰得黄金百斤不如季布一諾東觀漢記曰郭伋在并州行部到美稷有童兒數百騎竹馬迎拜問使君何時還伋計日告之既還先期一日乃止乎野亭須期而入又曰任延除細陽令毎至嵗時伏臘輙休遣繫徒各使歸家並感其恩徳應期而還有囚於家被病自載詣獄既至而死延率掾吏殯於門外百姓悦之范曄後漢書曰范式字巨卿山陽金鄉人也年少遊太學為諸生與汝南張劭為友劭字元伯二人並告歸鄉里式謂劭曰後二年當還将過拜尊親見孺子焉乃共尅期後期方至元伯具以白母請設饌以俟之母曰二年之别千里結言爾何信之審也對曰巨卿信士必不乖違母曰若然當為爾醖酒至其日巨卿果到升堂拜母盡歡而别又曰髙湖及銅馬餘衆降光武封其渠帥為列侯降者猶不自安光武知其意令各歸營勒兵乃自乘輕騎案行部陳降者相語曰蕭王推赤心置人腹中得不投死乎吴志曰太史慈字子義於神亭戰敗為孫䇿所執䇿素聞其名即解縳請見諮問進取之術慈曰州軍新破士卒離心欲出宣恩安集恐不合尊意䇿長跪答曰誠本心所望也明日日中望君来還諸将皆疑䇿曰太史子義青州名士以信義為先終不欺䇿明日大㑹諸将豫設酒食立竿視影日中而慈果至晉陽秋曰陸抗羊祜推僑札之好抗嘗遺祜酒祜飲之不疑抗有疾祜饋之藥抗亦推心服之唐書曰蕭至忠年少時與友人期於路隅㑹風雪凍冽諸人皆奔避就宇下至忠曰寜有與人期而求安失信乎獨不去衆咸歎服鬻子曰上下相親謂之和不求而得謂之信子思曰同言而信信在言前同令而化化在令外聖人在上民遷如化列子曰子華有寵於晉不仕而居三卿之右禾生子伯范氏之上客也出行坰外宿於田叟商丘開之舍中夜禾生子伯二人相與言子華之名勢能使存者亡亡者存富者貧貧者富商丘開先窘於飢寒潜於牖聴之因之子華子華之門徒皆世族也見商丘開年老力弱面目黧黒狎侮欺紿無所不為遂與商丘開俱乘髙臺於衆中漫言曰有能自投下者賞百金衆皆競應商丘開以為信然遂先投之形若飛鳥揚於地肌骨無䃣復指河曲之隈曰此波中有寶珠泳可得也商丘開復從而泳之水底潜行曰泳既出果獲珠焉衆昉同疑昉始俄而范氏之藏失火子華曰若能入火取錦者從所得多少賞焉商丘開徃無難色入火徃還埃不漫身不燋范氏之徒乃共謝之曰吾不知子之有道而紿子吾不知子之有神而辱子敢問其道商丘開曰吾亡道雖吾之心亦不知其所以然有一於此試與子言之曩子二客之宿吾舎也聞譽范氏之勢能使存者亡亡者存富者貧貧者富吾誠信無二心故逺而来及来以子黨之言皆實也唯恐誠之不至行之不及不知形體之所措利害之所著也心一而已物無迕者如斯已矣今昉知子黨之紿我我内藏猜慮外矜觀聽追夫昔日之不燋溺也怛然内熱惕然震悸矣水火豈復可近哉自此之後范氏門徒路遇乞兒馬醫弗敢辱也必下車而揖之宰我聞之以告仲尼仲尼曰汝不知乎夫至信也動天地感鬼神横六合而無逆豈但履危嶮入火水而已哉孫卿子曰君者治之原也源清則流清在上有信小民不待探籌投鈎荘子曰夫交邇則相靡以信交逺則忠之以言慎子曰折劵契屬符節賢不肖用之劵契不為人信人自用之韓子曰魏文侯與虞人期臘明日天疾風左右止文侯文侯曰不可以疾風故失信遂犯風徃戰國䇿同又曰齊索讒鼎於魯以其偽徃齊曰使樂正子来将聴魯君謂樂正子樂正子曰君胡不以真徃曰我愛之答曰臣亦愛臣之信又曰吴子示其妻以組曰子為我織組合如是組妻織組異善吴起曰非詔也使衣之而歸妻徃請之起曰家無虛言吕氏春秋曰吴起治西河欲諭其信於民乃置表於南門之外令於邑中曰有能僨此表者仕長大夫民相謂曰此必不信有一人曰試徃僨表還来謁之吴起見而仕大夫又復立表令於邑中如前邑人守門争表又曰晉文公伐原示信明年復伐之與士期必得原然後返原人聞之乃下衛人聞之以信為至矣乃歸晉故曰攻原得衞者此之謂也始文公非不欲原也不信得之不若勿得必誠以得之歸之者非獨衞也文公可謂知本矣又曰人主必信信之為政大矣信立則虛言可以賞矣虛言可以賞則六合之内皆為己府天行不信不能成嵗地安不信草木不大春風不信其華不盛夏暑不信其土不肥秋雨不信其榖不堅冬寒不信其地不閉天地之大四時之化而猶不能以不信成物也又况乎人事君不信則百姓誹謗社稷不寜處官不信則少不畏長貴賤相輕賞罰不信則民易犯法不可使令交友不信則離散欝怨不能相親百工不信則器械苦偽丹漆不真夫可與為始可與為終可與尊通可與卑窮者其唯信乎信而又信重襲於身乃通於天以此君人則膏雨甘露降寒暑四時當矣又曰齊桓公伐魯魯人不敢戰去魯國五十里而封之魯請比闗内侯以聴桓公許之曹劌謂荘公請從於是明日将盟荘公與劌皆懐劒至於壇上曰魯國去境數百里今去境五十里亦無生矣均其死也戮於君前管仲鮑叔進曹劌案劒當兩陛之間曰君將改圖毋或進者莊公曰封於汶陽可不則請死管仲曰以地衛君非以君衛地君其許之乃遂封汶南與之盟歸而欲勿予管仲曰不可人将刼君而不知不可謂智臨難而不能勿聽不可謂勇許之而不予不可謂信不智不勇不信有此三者不可以立功名予之雖亡地亦得信也以四百里之地見信於天下君猶得也荘公仇也曹劌賊也信於仇賊又况於非仇賊者乎夫九合而從之一匡而聽之乃從此生矣賈誼書曰禹與士民同務故不自言其信諭矣淮南子曰管子以小辱成大榮蘇秦以百誕成一信又曰胡人彈骨胡人盟約置酒人頭骨中飲以相誼越人齧臂中國唼盟所由各異其於信一也說苑曰魏太子謂經侯曰主信臣忠此魏國之寶也列女傳曰魯之母師者九子之寡母也臘日祀畢悉召諸子謂曰婦人之義非有大故不出夫家然吾父母家多㓜稚嵗時禮不理吾從汝謁徃監之謁請也監視也諸子皆稽首唯諾又召諸婦曰婦人有三從之義無專制之行少繫於父母長繫於夫老繫於子今諸子許我視私家願與少子俱以備婦人出入之制諸婦其慎房户之守吾夕而反於是使少子僕歸辦事天隂還失早至閭外而止待夕而入魯大夫從臺上見而恠之召而問之曰母從北来至閭外而止良乆乃入吾不知其故是以召母也對曰妾不幸早失夫獨與九子處臘日從諸子謁歸視私家與諸婦孺子期夕而反妾恐其酺醵醉飽酺醵合聚飲酒也人情所有也妾反失早故止閭外盡期而入大夫美之言於穆公穆公賜母尊號曰母師使朝謁夫人夫人諸姬皆師之會稽典録曰卓恕字公行上虞人恕為人篤信言不宿諾與人期約雖遭暴風疾雨雷電氷雪無不必至嘗從建業還家辭太𫝊諸葛恪恪問何當復来恕對曰某日當復親覲至是日恪欲為主人停不飲食以須恕至時賔客㑹者皆以為㑹稽建業相去千餘里道阻江湖風波難必豈得如期須臾恕至一座盡驚諸葛亮别𫝊曰魏明帝自征蜀幸長安遣宣帝督張郃諸軍勁卒三十餘萬潜軍宻向劒閣亮有戰士十萬十二更下在者八萬時魏軍始陳畨兵適交亮叅佐咸以敵衆強多非力所制宜權停下兵以并聲勢亮曰吾聞用武行師以大信為本得原失信古人所惜去者束装以待期妻子鶴望以計日皆勅速遣於是去者感恱願留一戰徃者憤勇咸思致命臨戰之日莫不㧞刄争先以一當十殺張郃却宣帝一戰大尅此之由也王符論曰夫十步之間必有茂草十室之邑必有忠信謹慎易頥卦曰君子以慎言語節飲食尚書堯典曰慎徽五典五典克從毛詩蕩抑曰敬慎威儀惟民之則周禮地官大司徒曰以賢制爵則民慎徳禮記中庸曰君子戒慎乎其所不睹恐懼乎其所不聞故君子慎其獨也又儒行曰敬慎者仁之地也又大學曰有國者不可以不慎辟則為天下僇矣是故君子先慎乎徳論語學而曰慎終追逺民徳歸厚矣又為政曰多聞闕疑慎言其餘則寡尤多見闕殆慎行其餘則寡悔尤過又述而曰子之所慎齊戰疾又公冶長曰季文子三思而後行孝經曰在上不驕髙而不危制節謹度滿而不溢髙而不危所以長守貴也滿而不溢所以長守富也家語曰孔子入后稷廟左前有金人焉三緘其口而銘其背曰我古之慎言人也戒之哉無多言多言多敗無多事多事無患安樂必戒無所行悔漢書曰成帝為太子寛博謹慎上嘗急召太子出龍樓門不敢絶馳道西至直城門得絶乃度又曰石建為太僕奏事事下建讀之驚恐曰書馬者與尾而五服䖍曰作馬字曲者五建上事誤作四今乃四不足一獲譴死矣弟慶為太僕御出上問車中幾馬慶以䇿數馬畢舉手曰六馬又曰金日磾自在左右目不忤視者數十年賜出宫女不敢近上欲内其女後宫不肯應其篤慎如此又曰霍光入禁闥小心謹慎未嘗有過又曰張安世職典樞機以謹慎周宻自著又曰孔光性周宻謹慎時有所言輙削槀沐日歸休兄弟妻子燕語終不及朝廷政事或問光温室省中樹皆何木也光嘿不應更答以他語其不泄如此東觀漢記曰陳寵字昭公沛人為尚書寵性周宻重慎時所表薦輙自手書人莫得知常言人臣之義苦不畏慎自在樞機謝遣門人不復教授絶知友之路又曰樊楚字文髙為尚書郎毎當直事常晨駐馬待漏雖在閒署冠劒不解於身毎齊祠恐失時乃張燈俯伏又曰隂識為執金吾居位數十年與賔客語不及國家其重慎如此又曰蔡倫字敬仲為中常侍有才學盡忠重慎毎至休沐輙閉門絶賔客勤體田野又曰樊宏字靡卿拜光禄大夫位特進宏為人謙慎毎當朝㑹先到俯伏待事時至乃起上聞之勅騶臨朝乃告勿令豫到又曰杜安字伯夷貴戚慕其名或遺其書安不發悉壁藏之後捕貴戚賔客安開壁出書而封如故由是不罹其患又曰張純字伯仁為虎賁中郎将純素重慎周宻時上封事輙削去草後漢書曰馬援在交趾還書誡兄子曰龍伯髙敦厚周宻吾愛之重之願爾曹效之又曰馬光字叔山為衛尉卿上以光周宻謹慎特親異之又曰皇甫嵩為人愛慎勤書前後上表陳諫有補益者五百餘事皆手書毁草不宣於外吴志曰闞澤字徳潤山隂人也性謙恭篤慎人有非短口未嘗及容貌似不足者王隐晉書曰李康嘗答司馬文王問因以為家誡曰昔侍於先帝時有三長史俱見臨辭出上曰為官長當慎當勤當清修此三者何患不治乎上問臣曰必不得已於斯三者何先吾對曰慎乃為先夫清者不必慎慎者自清上曰卿言得之矣晉書曰羊祜多所進逹而人不知所由或謂祜慎宻太過者祜曰是何言與夫入則造膝出則詭辭君臣不宻之誡吾惟懼其不及不能舉賢取異豈得不愧知人之難哉且拜爵公朝謝恩私門吾所不取晉起居注曰太康四年制曰選曹銓簡人才宜得恪謹寡欲抑華崇本尚書朱整周慎敬讓以自居是其人也後魏書曰庾岳代人也置相州即拜岳為刺史公亷平當百姓稱之鄴舊有園池時菓初熟丞吏送之岳不受曰菓未進御吾何得先食其謹慎如此北齊書曰封隆之字祖裔渤海脩人也性寛和有度量義旗始建首叅經畧竒謀妙䇿宻以啓聞上書削槀罕聞於外髙祖嘉其忠謹毎多從之隋書曰髙熲字昭元渤海脩人也少明敏尤善詞令所出竒䇿宻謀及損益時政世皆無知之者又曰李徳林字公輔博陵平安人也從入官已後典機務甚宻慎常云古不言温樹何足稱也唐書曰温彦博自掌知機務即杜絶賔客國之利害知無不言太宗嘉之及薨謂侍臣曰彦博以憂國之故勞精竭神我見其不逮已二年矣恨不縱其閒逸致夭性靈又曰陸元方在官清謹再為宰相則天将有遷除毎先以訪之必宻封以進未嘗露其私恩臨終取前後草奏悉命焚之且曰吾隂徳於人多矣其後庶幾福不衰矣又有書一匣常自緘封家人莫有見者及卒視之乃前後勅書其慎宻如此又曰楊再思在位累載屈節希㫖無所規弼然慎畏未嘗忤違或謂再思曰公名髙位重何為屈折如此再思曰世路艱難直者受禍苟不如此何以全其身哉又曰髙郢性恭慎亷潔罕與人交游守官奉法勤恪掌誥累年家無制草或謂曰前軰皆留制集公焚之何也曰王言不可存私家時人重其慎宻太公金匱曰黄帝曰予之居上揺揺恐夕不至朝尸子曰言美則響美言惡則響惡身長則影長身短則影短名者響也行者影也是故慎而言将有和之慎而行将有隨之淮南子曰君子之居民上也若以腐索御馬恐失民意若履薄氷蛟在其下又曰若行獨梁不為無人不競其容殷康明慎曰犇車之上無仲尼覆舟之下無伯夷蓋言慎也魏任嘏别𫝊曰嘏字紹先梁安博昌人也文帝時為黄門侍郎毎納忠言輙手書壊本自在禁省歸書不封帝嘉其淑慎太平御覽卷四百三十
