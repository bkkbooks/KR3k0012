body:
  text: 太平御覽卷四百九十四宋李昉等撰人事部一百三十五詭詐説文曰詭責也又横射物為詭詐欺也詩曰無縱詭隨以謹無良禮曰用人之智去其詐論語曰古之愚也直今之愚也詐戰國策曰楚懐王拘張儀將殺之靳尚為請王之幸夫人鄭袖曰子亦自知且賤於王乎鄭袖曰何尚曰張儀者秦王之忠信有功臣也今楚拘之秦王欲出之秦王有愛女美又簡擇宫中佳麗習音者以從之資以金玉寳器以上庸六縣為湯沐邑欲因張儀内之楚王必受之而忘子子踈必矣鄭袖遽説王出張子又曰張丑為賈於燕燕王欲殺之走且出境境吏得之丑曰燕王所為将殺我者人言我有寳珠也今我以亡矣而燕王不我信令子致我我且言子之奪我而吞之燕王必且殺子刳子之腹君不可説吏恐而赦之史記曰趙武靈王立吳姬子何為惠文王自號為主父令何主治國而自胡服將士大夫西北畧胡地而欲從雲中九原直南龍秦於是詐自為使者入秦秦昭王不知而恠其狀甚偉非人臣之量使人逐之而主父騎已脫門矣秦人大驚主父所以入秦者欲自略地因觀秦王為人也又曰張儀説楚王曰大王誠能聽臣閉闗絶約於齊臣請獻商於之地六百里使秦女得為大王箕箒之妾楚王大恱而許之遂閉闗絶約於齊使一將軍隨儀儀至秦陽失綏堕車不朝三日楚王聞曰以寡人絶齊未甚邪乃使勇士至宋借宋之符北罵齊王齊王大怒折節下秦秦齊之交合儀乃朝謂楚使曰臣有奉邑六里願獻大王左右使者曰臣受命於王以商於之地六百里不聞六里還報王大怒又曰新垣平使人持玉杯上書闕下云有寳玉氣來者臣已視之果有獻玉杯者刻曰人主延夀平又言臣視日再中於是始更以十七年為元年令天下酺平言曰臣望汾隂有金寳氣意周鼎其出乎其見不迎則不至於是上使治廟汾陰南臨河欲祠出周鼎人有上書告新垣平所言皆詐也漢書曰陳勝吳廣起兵乃丹書帛曰大楚興陳勝王置人所罾魚腹中卒買魚烹食得而恠之又令廣隱社作狐鳴曰陳勝王吳廣相又曰韓信與家臣謀欲發兵攻吕后其舍人得罪信囚欲殺之舍人弟上書告信欲反狀於吕后后乃與蕭何謀詐令人從上所來言陳豨已死群臣皆賀相國紿信曰雖病强入吕后使武士縳信斬之長樂鐘室信方斬曰吾不用蒯通之計反為女子所詐豈非天哉又曰孝惠張皇后宣平侯敖女也吕太后欲為重親以公主女配帝欲其生子千方無子廼使佯為有身取後宫美人子名之殺其母立所名子為太子又曰人不患其不知患其為詐也又曰宣帝始元五年有男子來乗黄犢車衣黄襜褕着黄㡌詣北闕自稱衛太子京兆尹雋不疑収縳之廷尉驗治卒得姧詐又曰傅介子與士卒俱齎金幣揚言以賜外國為名至樓闌王意不信介子佯引去至其西界使譯謂曰漢使者持黄金錦綉行賜諸國王不來受我去之西國矣即出金幣以示譯譯報王王貪漢物來見使者介子與之飲陳物示之飲酒皆醉介子謂王曰天子使私報王王起隨介子入帳中屏語壯士二人從後刺之刅交胷立死又曰李廣以衞尉為将軍出鴈門繫匃奴匃奴兵多破廣軍單于素聞廣賢令曰得李廣必生致之胡騎得廣佯死得脫匈奴騎數百追之廣行取弓射殺追騎又曰梓潼人哀章學問長安素無行見王莽居攝即作銅匱為兩檢書言王莽為真天子即日昬時衣黄衣持匱至髙廟莽至廟拜受金匱又曰匈奴寇邉甚王莽乃大募天下有竒伎術可以攻匈奴者将待以不次之位言便宜者以萬數或言能渡水不用舟楫或云不持升量服食藥物三軍不饑或言能飛一日千里可窺匈奴輙試之取大鳥翮為兩翼頭與身皆着毛通引環紐飛百歩墮莽知其不可用苟欲獲其名皆拜為将軍賜以車馬范曄後漢書曰王郎起北州擾惑吳漢素聞世祖長者獨欲歸心乃説太守彭寵出止外亭念所以譎衆未知所出望見道中有一人似儒生者漢使人召入為具食問以所聞生因言劉公所過為郡縣所歸邯鄲舉尊號者實非劉氏漢大喜即詐為世祖書移檄漢陽使生賫以詣寵令具以所聞説之漢復隨後入寵甚然之於是遣漢將兵擊王郎又曰王莽時尚書缺詔將大夫六百石以上試對政事天文道術以髙第者補之翟酺自恃能髙而忌太史令孫懿恐其先用乃徃候懿既坐言無所及唯涕泣流連懿怪而問之酺曰圖書有漢孫登以才智為中官所害觀君表相似當應之酺受恩接愴君之禍耳懿憂懼移病不試由是酺對第一拜尚書又曰靈帝時宦官得志並起第擬則宫室帝嘗登永安候臺宦官恐其望見居處乃使中大夫尚垣諫曰天子不當豋髙登髙則百姓虛散自是不敢升髙東觀漢記曰和熹鄧后臨朝權在外戚杜根以安帝年長宜親政事乃與同時郎上書直諫太后大怒収報根等令盛以縑囊於殿上撲殺之執法者以根知名語行事人使不加力既而載出城外根得蘇太后使人檢視遂詐死三日目中生蛆因得迯竄也又曰隗囂敗公孫述懼欲安其衆成都郭外有秦時舊倉改名白帝倉自王莽以來常空述詐使人言白帝倉出穀如山陵百姓空市里徃觀之述乃大㑹羣臣問曰白帝倉出穀乎皆對言無述曰訛言不可信道隗王破者復如此矣又曰臧宫将兵至中盧屯駱越是時公孫述将田戎任滿與征南大将軍岑彭相拒於荆門彭等戰數不利越人謀叛從蜀宫兵力不能制㑹屬縣送委輸車數百乗至宫夜使鋸斷城門限令車周轉出入至旦越人候伺者聞車聲不絶而門限斷相告以漢兵大至其帥乃奉牛酒以勞軍魏志曰司馬宣王稱病因李勝出為荆州刺史曹爽等令勝辭宣王自陳無他功効横􅂪時恩當為本州宣王令兩婢侍邉持衣衣落復上指口言渇主飲婢進粥宣王持杯飲粥皆流出沾胷勝愍然為之涕言曰今主上尚幼天下賴明公然衆情謂公舊風病發何意尊體乃爾宣王徐更言年老沉疾死在旦夕君當屈為并州并州近胡好善為之恐不復相見如何勝曰當遷本州非并州宣王仍復陽為惛謬曰君方到并州努力自愛錯亂其辭狀如荒語勝復曰當忝本州非并州也宣王乃若微悟者謂勝曰懿年老意荒不解君言今當與君别自顧氣力轉微後必不更㑹同欲自力設薄主人生死共别令師昭兄弟結君為友因流涕哽咽勝亦長嘆吳志曰孫峻謀置酒誅諸葛恪恪将見駐車宫門峻已伏兵於帷中恐恪不時入事洩自出見恪曰使君若尊體不安自可須復當具白主上欲以嘗知恪意答曰當力入散騎常侍張約朱思宻書與恪曰今日張設非常疑有他故恪省書而去未出門逢太常滕裔恪曰卒腹痛不任入裔不知峻計謂恪曰君自行旋未見今上置酒請君已至門直當力進恪踟蹰而還劍履上殿謝亮還坐設酒峻因曰使君疾未善乎當有常服藥酒自可取之恪意乃安則飲所賫酒數行亮還入内峻起如厠着短服出曰詔収諸葛恪恪驚起杖劒未殊而峻刅交下晉書曰謝𤣥等既破苻堅有驛書至謝安安方對客圍碁㸔書既竟便攝放牀上了無喜色棊如故客問之徐答云小兒輩遂已破賊既罷還内過户限心喜甚不覺屐齒之折其矯情鎮物如此又曰桓𤣥以厯代咸有肥遁之士而已世獨無乃徴皇甫謐六世孫希之為著作併給其資用皆令讓而不受號曰髙士時人名為充隠又曰紀瞻為㑹稽内史時有詐作大將軍府符収諸吏暨令令已受拘瞻覺其詐便破檻出之訊問使者果伏詐妄又曰崔洪口不言貨財手不執珠玉汝南王亮嘗讌公卿以琉璃鍾行酒酒及洪洪不執亮問其故對曰慮有執玉不趨之義故爾然實乖其常性故為詭也晉中興書曰晉元帝叔父東安王繇為成都王頴所害懼禍及謀出奔其夜月明禁衛甚嚴不能得去有頃天暴風雨晦冥邏者散帝乗間得脫至河陽為津吏所止從者宗典後至以馬鞭拂之謂曰舍長宫禁貴人而汝被駐耶因大笑由是被釋又曰温嶠知王敦不可復諫乃潛謀㓕之先夙夜綜其府事而附其欲錢鳯敦所信也嶠謂人曰錢世儀精神滿腹嶠素有知人之稱鳯聞而恱之深結好於嶠㑹丹陽尹缺嶠説敦曰京尹輦轂喉舌冝得文武兼之公宜自選其才敦然之問嶠誰可作者嶠曰愚謂錢鳯可用然裁之在公敦思維良久曰無復勝君嶠即苦辭敦不從表補丹陽尹猶懼錢鳳為之奸因敦置酒與嶠别嶠曰違離宇下情戀不已願自起行酒以展岐路之心行酒鳯未飲嶠因偽醉以手㧞擊鳯幘為之墜作色曰錢鳯何人温太真行酒而敢不飲鳯不恱敦以為醉兩釋之明日鳯曰嶠與朝廷甚宻必未可信或懐反噬宜更思之敦曰太真昨醉小加聲色豈得以此相詭貳由是鳳謀不行而得還都又曰王允之年在搃角敦深知之謂為似已入則共寝甞夜飲辭曰醉先眠敦將錢鳳計逆允之悉聞慮敦或疑於眠處大吐敦果照視見眠吐中不復疑之唐書曰李義府擢拜中書侍郎同中書門下三品監脩國史賜爵廣平縣男義府貌狀温恭與人語必嬉怡微笑而褊忌隂賊既處權要欲人附己微忤意者輙加傾䧟故人言義府笑中有刀又以其柔而害物亦謂之李猫尹文子曰虎求百獸食之将食狐狐曰子無食我也天帝令我長百獸今子食我是逆天帝命也子以我言不信吾為子先行子隨我後觀百獸之見我不走乎虎以為然故遂與行獸見之皆走虎不知獸之畏己而走以為畏狐也韓子曰司城子罕謂宋君曰慶賞賜予者民之所好也君自行之誅罰殺戮者民之所惡也臣請當之於是戮細民而誅人臣君曰與子罕議之居期年民知死生命制於子罕故一國歸焉子罕親刼奪宋之政淮南子曰夫狐之搏雉也卑體弭毛以待其來也雉見而信之故可得而禽也使狐瞋目見其必殺之勢雉亦知憚驚逺飛以避其怒矣夫人偽詐以相欺非直禽獸詐也吳越春秋曰要離為王殺慶忌曰請以罪出走殺臣之妻子焚之吳市飛其灰購臣千金與百里之邑詐徃慶忌必信臣也王曰諾要離以罪出走王殺其妻子焚之吳市飛其灰購之千金與百里之邑吕氏春秋曰趙簡子病召太子告曰我則死已葬上夏屋之山以望簡子死已𦵏襄子上夏屋以望代曰先君必以此殺之也反歸慮所以取代乃先善之代君好色請以其弟妻之襄子為代君而請觴之先令舞者置兵羽中數百人又先具大金斗代君至酒酣舉斗而擊之腦塗地舞者操兵以鬭盡殺其從者陸賈新語曰秦二世之時趙髙駕鹿而從行王曰丞相何為駕鹿髙曰馬也王曰丞相誤耶以鹿為馬也髙曰乃馬也陛下以臣之言為不然願問群臣於是乃問羣臣群臣半言馬半言鹿當此之時秦王不敢信其目而從邪臣之言鹿與馬之異形乃衆人之所知也然不能别其是非况於闇昧之事乎王符潛夫論曰昔紂好色九侯聞之乃獻厥女紂則大喜以為天下之麗莫若此也以問妲己妲己懼進御而奪己愛也乃為俯而泣曰君王年既老耶明既衰耶何貌惡之若此而覆謂之好也紂於是渝而以為惡妲己恐天下之愈進美女因曰九侯之無道也乃欲以此惑君王也而弗誅何以革後紂則大怒遂脯淑女而烹九侯論衡曰儒書稱武王伐紂太公隂謀食小兒以丹令身絶赤長大教言商亡商民見身赤以為天神及言商亡皆謂商㓕世説曰鍾㑹宻白鄧艾有反狀㑹善効人書於劒閣要艾草表白事皆易其言令辭指倨傲多自矜伐葛仙公别傳曰時有一老人頗能治病從中國來其人言年已數百嵗後他坐仙公欲知此公定年俄一人從天下舉坐瞻目良久集地着朱衣進賢冠即問此公曰天遣我來問君定年幾何故欺詐民人速以實對公大怖下地長跪言曰無狀實九十三仙公因撫手大笑忽然失朱衣人所在太平御覽卷四百九十四
