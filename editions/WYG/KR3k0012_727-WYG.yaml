body:
  text: 太平御覽卷七百二十七宋李昉等􅁧方術部八筮上說文曰筮易卦用著也從竹弄古文也周禮春官上曰筮人掌三易以辨九筮之名一曰連山二曰歸藏三曰周易九筮之名一曰巫更二曰巫咸三曰巫式四曰巫目五曰巫易六曰巫比七曰巫祠八曰巫叅九曰巫環以辨吉凶鄭𤣥曰此九巫讀皆當為筮字之誤也凡國之大事先筮而後卜禮記曲禮曰假爾太龜有常假爾太筮有常卜筮不過三求吉不過三也卜筮不相襲也卜不吉則又筮筮不吉則又卜是瀆龜筮也卜筮者先聖之所以使民信時日敬鬼神畏法令决嫌疑定猶豫也又表記曰天子無筮謂出征廵狩也天子至尊大事皆用卜也諸侯有守筮守筮守國之筮有事則用天子道以筮諸侯非其國不以筮左傳莊公曰初懿氏卜妻敬仲懿氏陳大夫也龜曰卜其妻占之曰吉是謂鳯凰于飛和鳴鏘鏘有媯之後將育于姜媯陳姓也姜齊姓也五世其昌並于正卿十世之後莫之與京京大也陳厲公蔡出也姊妹之子曰出也故蔡人殺五父而立之五父陳它生敬仲其少也周内史有以周易見陳侯者周太史也陳侯使筮之遇觀之否曰是謂觀國之光利用賔于王此其代陳有國乎不在此其在異國乎非此其身在其子孫光逺而自他有耀者也坤土也巽風也乾天也風為天於土上山也有山之材而照之以天光於是乎居土上故曰觀國之光利用賔于王庭實旅百奉之玉帛天地之美具焉故曰利用賔于王猶有觀焉故曰其在後乎因觀文以傳占故言有非在已之言故知在子孫也風行而著于土故曰其在異國乎若在異國必姜姓也姜太嶽之後也山嶽則配天物莫能兩大陳衰此其昌乎變而象艮故知當今興於太嶽之後也得太岳之權則有配天之大功故知陳必衰也又閔公曰晉獻公以魏賜畢萬卜偃曰畢萬之後必大卜偃晉掌卜大夫也萬盈數也魏大名也以是始賞天啓之矣天子曰兆民諸侯曰萬民今名之大以從盈數其必有衆初畢萬筮仕於晉遇屯之比辛廖占之曰吉辛廖晉大夫也屯固比入吉孰大焉其必蕃昌震為土車從馬足居之兄長之母覆之衆歸之六體不易合而能固安而能殺公侯之卦也公侯之子孫必復其始又閔公曰成季之將生也桓公使卜楚丘之父卜之曰男也其名曰友在公之右在右言用事間于兩社為公室輔兩社之間朝廷執政所在季氏亡則魯不昌又筮之遇大有之乾曰同復于父敬如君所及生有文在其手曰友遂以命之又僖公曰秦伯伐晉卜徒父筮之吉涉河侯車敗詰之秦伯涉河則晉侯車敗秦伯不解謂敗在已故詰之對曰乃大吉也三敗必獲晉君其卦遇蠱曰千乗三去三去之餘獲其雄狐夫狐蠱必其君也於周易卦利涉大川往有事亦秦勝晉之卦也蠱之貞風也其悔山也嵗云秋矣我落其實而取其材所以克也今嵗已秋風吹落山木之實則為人所取實落材亡不敗何待三敗及韓晉矦車三壞也又曰初晉獻公筮嫁伯姫於秦遇歸妹之暌史蘇占之曰不吉其繇曰士刲羊亦无􅎺也女承筐亦無貺也西隣責言不可償也將嫁女於西遇不吉之卦故知有責讓之言不可報償也歸妹之暌猶無相也歸妹女嫁之卦也暌乖離之卦也震之離亦離之震為雷為火為嬴敗姫車說其輹火焚其旗不利行師敗于宗丘歸妹暌孤寇張之弧姪其從姑六年其逋逃歸其國而棄其家明年其死於髙梁之虛及惠公之在秦曰先君若從史蘇之占吾不及此夫韓簡侍曰龜象也筮數也物生而後有象象而後有滋滋而後有數先君之敗德及其可數乎史蘇是占勿從何益又僖公曰狐偃言於晉侯曰求諸侯莫如勤王諸侯信之且大義也繼文之業而信宣於諸侯今為可矣使卜偃卜之曰吉遇黄帝戰於阪泉之兆公曰吾不堪也對曰周禮未改今之王古之帝也公曰筮之遇大有之暌曰吉遇公用享於天子之卦戰克而王饗吉孰大焉且是卦也天為澤以當日天子降心以逆公不亦可乎大有去暌而復亦其所也又成公曰晉楚將戰苗賁皇言於晉侯曰楚之良在其中軍王族而已請分良以擊其左右而三軍萃於王卒必大敗之公曰筮之史曰吉其卦遇復曰南國蹙射其元王中厥目復陽長之卦陽氣于南行推隂故曰南國蹙也南國蹙勢則離受其咎故曰王中厥目為諸侯又為日陽氣激南飛矢之象故曰射其元國蹙王傷不敗何待公從之又襄公曰穆姜薨于東宫始往而筮之遇艮之八史曰是謂艮之隨隨其出也君必速出姜曰亡是於周易有曰隨元亨利貞无咎元善之長也亨嘉之㑹也義利之和也貞事之幹也體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事然故不可誣也是以雖隨無咎今我婦人而與於亂固在下位婦人卑於丈夫而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利棄位而姣姣淫之别名不可謂貞有四徳者隨而無咎我皆无之豈隨也哉我則取惡能無咎乎必死於此弗得出矣又襄公曰齊棠公之妻東郭偃之姊也棠公齊棠邑大夫也偃臣崔武子棠公死偃御武子以弔焉見棠姜而美之使偃取之為已娶也偃曰男女辨姓今君出自丁成出自桓不可武子筮之遇困之大過史皆曰吉示陳文子文子曰夫從風坎為中男坎曰夫也變而為巽故曰從風也風隕妻不可娶也風能隕落變隕落故不可也且其繇曰困于石據于蒺藜入于其宫不見其妻凶困六三爻辭也困于石往不濟也據于蒺藜所恃傷也入于其宫不見其妻凶無所歸也崔子曰􅄔也何害先夫當之矣寡婦曰婺言棠公已當此凶也遂取之又昭公曰初穆子之生也莊叔以周易筮之莊叔穆子父得臣也遇明夷之謙以示卜楚丘楚邱卜人姓名也楚丘曰是將行行出奔也而歸為子祀奉祭祀也以讒人入其名曰牛卒以餒死明夷日也日之數十故有十時亦當十位自王以下其二為公其三為卿日上其中食日為二旦日為三明夷之謙明而未融其當旦乎故曰為子祀日之謙當鳥故曰明夷于飛明而未融故曰垂其翼象日之動故曰君子于行當三在旦故曰三日不食離火也艮山也離為火火焚山山敗於人為言敗言為讒故曰有攸往主人有言言必讒也純離為牛世亂讒勝勝將適離山焚則離勝故曰其名曰牛謙不足飛不翔垂不峻翼不廣故曰其為子後乎吾子亞卿也抑少不終又曰衛襄公嬖人婤姶生子名之曰元孔成子以周易筮之曰元尚享衛國主其社稷遇屯又曰余尚立縶尚克嘉之遇屯之比以示史朝史朝曰元亨又何疑焉成子曰非長之謂乎對曰康叔名之可謂長矣孟非人也將不列於宗不可謂長且其繇曰利建侯嗣吉何建建非嗣也二卦皆云子其建之康叔命之二卦告之筮襲於夢武王所用也弗從何為又昭公曰南蒯之將叛也枚筮之遇坤之比曰黄裳元吉以為大吉也示子服惠伯曰即欲有事何如惠伯曰吾嘗學此矣忠信之事則可不然必敗外彊内温忠也和以率貞信也故曰黄裳元吉黄中之色也裳下之飾也元善之長也中不忠不得其色下不共不得其飾事不善不得其極外内倡和為忠率事以信為共供養三德為善非此三者弗當且夫易不可以占險將何事也且可飾乎中美能黄上美為元下美則裳叅成可筮猶有闕也筮雖吉未也又哀公曰衛侯夢于北宫見人登昆吾之觀被髪北面而譟曰登此昆吾之虛綿綿生之𤓰余為渾良夫呌天無辜公親筮之胥彌赦占之曰不害與之邑寘之而迯奔宋衛侯貞卜其繇曰如魚窺音頳尾衡流而方羊裔焉大國滅之將亡闔門塞竇乃自後踰又曰巴人伐楚圍鄾初右司馬子國之卜也觀瞻曰如志故命之及巴師至將卜帥王曰寧如志何卜焉使帥師而行敗巴師于鄾故封子國於析君子曰惠王知志夏書曰官占惟先蔽志昆命于元龜其是之謂乎志曰聖人不煩卜筮惠王其有焉又曰晉荀瑶伐齊將戰長武子請卜知伯曰君告于天子而卜之以守龜於宗祧吉矣吾又何卜焉且齊人取我英丘君命瑶非敢燿武也治英丘也以辭伐罪足矣何必卜周易繫辭上曰大衍之數五十其用四十有九分而為二以象兩掛一以象三揲之以四以象四時歸竒於扐以象閠五嵗再閠故再扐而後掛天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也乾之䇿二百一十有六坤之䇿百四十有四凡三百有六十當期之日二篇之䇿萬有一千五百二十當萬物之數也是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣顯道神徳行是故可與酬酢可與祐神矣又曰蓍之德圜而神卦之徳方以知神以知來知以藏往探􅄨索隱鈎深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜歸藏曰蓍末大於本為上吉蒿末大於本次吉荆末大於本次吉箭末大於本次吉竹末大於本次吉蓍一五神蒿二四神荆三三神箭四二神竹五一神筮五犯皆藏五筮之神明皆聚焉洪範五行傳曰若煩數溷瀆或不精嚴神不告也或觀卦察兆吉不得也或龜不神筮不靈此其所以過差聖人不得專用也龜筮共違于人神靈不祐也漢書曰宣帝八月飲酎行祠孝昭廟先驅旄頭劒挺墮拂泥中刃向乘輿車馬驚於是召梁􅉌賀筮之有兵謀不吉上還使有司行祠是時霍氏外孫代郡太守任宣坐謀反誅宣子章為公車丞亡在渭城中夜𤣥服入廟居廊間執㦸立廟門待上至欲為逆事發伏誅後漢書曰許曼者汝南平輿人也祖父峻字季山善卜占之術多有顯驗時人方之前代京房自云少嘗篤病三年不愈乃謁太山請命太山主人生死故請命也行遇道士張巨君授以方術所著易林至今盛行於代曼少𫝊峻學桓帝時隴西太守馮緄始拜郡開綬笥有兩赤蛇分南比走緄令曼筮之卦成象曼曰三嵗之後君當為邉將官有東名當東北行三千里復五年更為大將軍南征延熹元年緄出為遼東太守討鮮卑至五年復拜車騎將軍擊武陵蠻賊皆如占其餘多此類云東觀漢記曰沛獻王輔善京氏易永平五年京師少雨上饗雲臺自作卦以周易林占之其䟽曰蟻封穴戸大雨將至上以問輔輔上書曰蹇艮下坎上艮為山坎為水山出雲為雨蟻穴居知雨將至故以蟻為興又曰孝順梁皇后永建三年春三月丙午𨕖入掖庭相工通見之瞿然驚駭却再拜賀曰此所謂日角偃月相之極貴臣所未嘗見太史卜之兆得戴房又筮之得坤之比又曰明德皇后嘗久病至卜者家為卦問咎祟所在卜者卦定釋蓍仰天嘆息問之卜者乃曰此女雖年少后必將貴為帝妃不可言也魏志曰管輅父為利漕利漕民郭恩兄弟三人皆得躄疾不知何故使輅筮其所由輅曰卦中有君本墓中有女鬼非君伯母當叔母也昔饑荒之世當有利其數斗米者排著井中嘖嘖有聲推一大石下破其頭孤魂寃痛自訴於天於是恩涕泣服罪又曰管輅往見安平太守王基令作卦輅曰當有賤婦人生一男兒墮地便走入竈中死又床上當有一大蛇銜筆小大共視須㬰便去又烏來入室與鷰共鬭鷰死烏去有此三恠基大驚問其吉凶輅曰直客舍久逺魑魅魍魎為恠兒生便走非能自走直宋無忌之妖將其入竈也大蛇銜筆直老書佐耳烏與鷰鬭直老鈴下耳今卦見其象而不見凶知非妖咎之徴自無所憂也後卒無恙又曰舘陶令諸葛原遷新興太守管輅往祖餞賔客並㑹之原自起取燕卵蜂巢蜘蛛著於器中使射覆卦成輅曰第一物含氣須變依于宇堂雄雌以形翅翼舒張此燕卵也第二物家室倒懸門戸衆多藏精育毒得秋乃化此蜂窠也第三物觳觫長足吐絲成羅尋網求食利在昏夜此蜘蛛也舉坐驚喜又曰管輅舉秀才吏部尚書何晏請之曰聞君蓍爻神妙試為作一卦知位當至三公不又問夜連夢青蠅數十頭來鼻上驅之不肯去有何意故輅曰夫飛鴞天下賤鳥及其在林食椹則懷我好音况輅心非草木不敢不盡忠昔元凱之弼重華宣慈惠和周公之翼成王坐而待旦故能流光六合萬國咸寧此乃履道之休應非卜筮之所明也今君侯位重山嶽勢若雷電而懐德者鮮畏威者衆殆非小心翼翼多福之人又鼻者艮此天中之山臣松之案相書鼻為天中鼻有山象故曰天中之山髙而不危所以長守貴也今青蠅臭惡而集之焉位峻者顛輕豪者亡不可不思害盈之數盛衰之期是故山在地中曰謙雷在天上曰壯謙則裒多益寡壯則非禮不履未有損已而不光大行非而不傷敗願君侯上追文王六爻之㫖下思尼父彖象之義然後三公可决青蠅可驅也又管輅過魏郡太守鍾毓共論易義輅因言卜可知君生死之日毓使筮其生日月如言無蹉跌毓大愕曰君可畏人也命以付天不以付君遂不復筮又曰平原太守劉邠取印囊及山鷄毛著器中使筮輅曰内方外圓五色成文含寶守信出則有章此印囊也髙嶽巖巖有鳥朱身羽翼𤣥黄鳴不失晨此山鷄毛也又曰清河令徐季龍使人行獵令管輅筮其所得輅曰當獲小獸復非食禽雖有爪牙㣲而不彊雖有文章蔚而不明非虎非熊其名曰狸獵人暮歸果如輅言又曰鄧艾當伐蜀夢坐山上而有流水以問殄虜䕶軍爰邵邵曰易卦山上有水曰蹇蹇繇曰蹇利西南不利東北孔子曰蹇利西南往有功也不利東北其道窮也往必尅蜀殆不還乎艾憮然不樂吳志曰虞翻字仲翔㑹稽人嘗與孔融書示以所著易注融答書曰聞延陵之理樂覩吾子之理易乃知東南之美者非徒㑹稽之竹箭也可謂探􅄨窮通矣闗某既敗權使筮遇節之臨翻曰不出三日必當斷頭果如其言權曰卿不及伏羲可與東方朔為比矣又曰陸機之克步闡孫皓意張乃使尚廣筮并天下遇同人之頤對曰吉庚子歲青葢當入洛陽故皓不修其政而恒有窺上國之志王隱晉書曰淳于智字叔平濟北人也性沉深有思義少為諸生善易髙平劉柔夜卧䑕齧其左手中指意甚惡之以問智智為筮之曰䑕本欲殺君而不能當相為使之反死乃以朱書其手腕横文後二寸為田字辟方一寸二分使夜露手以卧明旦有大䑕伏死手前譙國夏侯藻母病困五皷中出詣智卜有一狐當門向之嘷喚藻愁愕遂馳詣智智曰其禍甚急君速歸在狐嘷處撫心啼哭令家人驚恠大小畢出一人不出啼哭勿休然後其禍僅可救也藻如之母亦扶病而出啼家人既集堂屋五間猝然暴崩䕶軍張邵母病篤筮之使西出市沭猴繫母臂令傍人搥拍恒使作聲三日三夜放出邵從之其猴出門即為犬所咋死母於此漸差又曰上黨鮑瑗家多䘮病貧苦或謂之曰淳于叔平神人也君何不試就卜知禍所在瑗性質直不信卜筮曰人生有命豈卜筮所移㑹智適來應思逺謂之曰君有通靈之思而但為貴人用此君寒士貧苦多屯蹇可為一卦智乃令詹作卦卦成謂瑗曰為君安宅者女子耶瑗曰是也此人安宅失宜既害其身又令君不利君舍東北有大桑樹君徑至市入門數十步當有一人持荆馬鞭者當就請買還以懸此桑樹三年當暴得財也瑗承其言詣市果得馬鞭懸之正三年浚井得錢十萬銅鉄雜器復可二十餘萬於是家業用展病者亦愈又曰韓友字光景廬江舒人也善卜占行京費厭勝之術龍舒長鄧子林婦病積年垂死醫巫皆息友為筮之使畫作野猪象著卧處屏風上一宿覺佳於是遂差舒縣廷掾王睦病卒已復魄友為卜之令以丹畫板作日月置床頭及卧虎皮馬鄣泥上登時愈劉世則女病鬼魅積年巫為祈禱伐空冢故城間得鼉數十猶不差友筮之令作布囊女發時張囊著牕牖間友閉戸作氣若有所驅逐斯須之間囊大脹如吹葱葉因便敗女仍大發友乃更作皮囊二枚㳫張之施如前囊復脹滿因急縛囊口懸著樹間十許日漸消下開視有一二斤毛狀如狐毛女遂大差太平御覽卷七百二十七
