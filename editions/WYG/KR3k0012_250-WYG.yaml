  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_250-1a, image: WYG0895/WYG0895-0274a.png}
body:
  text: 太平御覽卷二百五十宋李昉等撰職官部四十八司隸校尉州牧司隸校尉通典曰司隸周官也掌五隸之法辯其物而掌其政令五隸謂罪隸蠻隸閩隸夷隸貉隸也物謂衣服兵噐之屬帥其民而捕其盗賊漢書曰諸葛豐為司隸無所廻避京師為之語曰間何闊逢諸葛言間者何久濶不相見以逢諸葛故也侍中許章以外屬貴幸賔客犯法與許章相連豐欲奏劾適逢章出豐駐車舉節招章曰下欲収之章馳去豐奔車逐之章突入殿得免由此成帝遂収豐節也又曰鮑宣字子都明經為司隸丞相孔光行園陵官屬行馳道中宣使鈎止丞相掾史没入其車馬以摧辱宰相事下御史中丞官欲捕從事閉門不内宣坐閉拒使者大不敬下獄博士弟子咸舉幡太學下曰欲救鮑司隸者會此下諸生會者千有餘人朝日遮丞相孔光自言丞相車不得行宣得减罪一等又曰蓋寛饒字次公為司隸校尉常步行好直言犯上無所廻避又曰王駿為司隸校尉奏免丞相匡衡東觀漢記曰鮑永為司隸校尉時趙王良從上送中郎將來歙䘮還入夏城門中與五官將軍相逢道廹良怒召門候岑遵叩首馬前永劾奏良曰今月二十七日車駕徃臨故中郎將來歙之䘮車駕既過須臾王良從後到與右中郎將張邯相逢城門中道廹狹叱邯旋車又召門候岑遵詰責使前走數十歩按良諸侯藩臣蒙恩入侍知遵帝城門使候吏六百石而肆意加怒令叩頭都道走馬頭前失藩臣之禮大不敬也後漢書曰鮑昱為司隸在職奉法守正有父風永平五年坐救火遲免又曰鮑永為司隸鮑恢為都官從事並不避强禦詔筞曰貴戚且當歛手以避二鮑其見憚如此永子昱復為司隸初拜使封胡降檄世祖遣問昱曰有所怪否對曰臣聞故事通官文書不著姓又當司徒露布怪使司隸下書而著姓也上曰吾故欲天下知忠臣之子復為司隸又曰李膺字元禮拜司隸校尉張讓弟朔為野王令貪殘無道畏膺而逃藏讓舍柱中膺率將吏卒破柱取朔付獄殺之讓訢寃於帝帝詔詰膺膺曰昔仲尼為魯司冦七日而誅少正卯今臣到官已積旬懼以淹留為諐不意獲速疾之罪乞留五日克殄元惡帝謂讓曰汝弟之罪也自是宦官屏氣休沐不敢復出帝問其故並叩頭泣曰畏李司隸也又曰司隸校尉下邳趙興亦不䘏諱忌䘏憂也毎入官輒更繕修館宇移穿改築故犯妖禁而家人爵禄益用豐熾官至頴川太守子峻太傳以材器稱孫安世魯相三葉皆為司隸時稱其盛又曰江馮上言宜令司隸校尉督察三公陳元議以為不宜使有司省察公輔乃止續漢書曰陽球字方正漁陽人也少有勇氣為尚書令中常侍王甫曹節等秉權勢球常唾手拊髀曰陽球作司隸此曹子何得爾耶尋為司隸明日詣闕謝恩甫時休下在舍球表甫罪収送洛陽詔獄自臨拷之甫子萌亦見収又曰牟融拜司隸校尉典司京都執憲持平多所舉正百僚莫不敬憚又曰百官志曰司隸校尉一人二千石孝武時置持節常察舉百僚以下及京師近都犯法者謝承後漢書曰華松擢為司隸校尉是時貴戚專勢有司軟弱莫敢糺罰松下車閉閣不通私書不與豪右相見姦慝犯者輙死奏馬氏三侯羣豪歛手應劭漢官儀曰司隸校尉糺皇太子三公以下及旁州郡國無不統陛坐見諸卿皆獨席魏志曰徐宣遷司隸校尉從至廣陵大軍乘舟風浪驟起帝舩廻到宣舩在後淩波而急進羣寮無至者帝壯之又曰鍾會為司隸校尉雖在外司時政損益當世興廢無不畢綜晉書曰𫝊𤣥轉司隸校尉獻皇后崩於𢎞訓宫設䘮位舊制司隸於端門外坐在諸卿上絶席而入殿按本品秩在諸卿下以次坐不絶席而謁者以𢎞訓宫為殿内制𤣥位在卿下𤣥恚怒厲聲色而責謁者謁者妄稱尚書所處𤣥對百僚而罵尚書已下御史中丞庾純奏𤣥不敬𤣥又自表不以實坐免官然𤣥天性峻急不能有所容毎有奏劾或值日暮捧白簡整簮𢃄竦踊不寐坐而待旦於是貴游懾伏臺閤生風臧榮緒晉書曰𫝊咸以議郎長兼司隸校尉咸前後固辭辭㫖懇切上不聽勑使者逼就拜授咸感傷鯁咽以身無兄弟職無假到官之日䘮祭無主重自陳乞遂不見聽聽於官舎設靈坐朔望奉祭咸卧病治職時朝廷寛弛豪右放恣郡縣容縱寇盗充牣攻簒囚徒掠奪市道公私請託朝野溷淆咸於是奏免河南尹京都肅然貴戚憚之數月之間三奏免選官奏按謇愕終無曲撓雖不見從有司肅然晉志曰漢武帝初置十三州刺史各一人又置司隸校尉察三輔三河𢎞農七郡晉諸公贊曰劉毅字仲雄為司隸奏太尉何曽尚書劉寔父子及羊琇張佗等所犯狼藉司部守令事相連及覩風投印綬者甚衆皆以為毅能繼諸葛豐葢寛饒也崔鴻十六國春秋前秦録曰王猛望燕師之衆惡之謂鄧羌曰今日之事非將軍莫可以㨗也成敗之機在斯一舉將軍其勉之羌曰若以司隸見與者公無以為憂唐書官品志曰司隸臺大夫一人正四品掌諸廵察其所掌六條一察品官以上理政能不二察官人貪殘害政三察豪强姦猾侵害下人及田宅踰制官司不能止禁者四察水旱蟲灾不以實言枉徴賦役及無災妄蠲免者五察部内盗賊不能窮逐隠而不申者六察徳行孝悌茂材異行隠而不貢者每年二月乘軺廵郡縣十月入奏英雄記曰董卓謂王允曰欲得一快司隸校尉誰可作者允曰惟有盖元固京兆耳卓曰此明智有餘不可假以雄職列異𫝊曰故司隸校尉鮑子都少時上計掾於道中遇一書生獨行時無伴卒得心痛子都下車為按摩奄忽而亡不知姓名有素書一卷銀鉼即賣一鉼以殯其餘銀及素書着腹上咒之曰若子魂靈有知當令子家知子在此今使命不獲乆留遂辭而去至京師有駿馬隨之人莫能得近惟子都得近子都歸行失道遇一闗内侯家日暮往宿見主人呼奴通刺奴出見馬入白侯曰外客盗騎昔所失驄馬侯曰鮑子都上黨髙士必應有說因自曰此乃吾馬昔年無故失之子都曰昔年上計遇一書生卒死道中具述其事侯乃驚愕曰此吾兒也侯迎䘮開槨視銀書如言侯乃舉家詣闕上薦子都聲名遂顯至子永孫昱並為司隸及其為公皆乘驄馬故京師歌曰鮑氏驄三入司隸再入公馬雖痩行歩工𫝊咸集叙曰司隸校尉舊號卧虎誠以舉綱而萬目理提領而衆毛順州牧漢書曰何武與翟方進奏曰古選諸侯賢者以為州伯今部刺史居牧伯之位選第大吏所薦位髙至九卿所惡立退任重職夫春秋之義用貴治賤不以卑臨尊刺史位下大夫而臨二千石輕重不相凖請罷刺史更置州牧以應古制奏可續漢書曰皇甫嵩領冀州牧奏請一年租以賑饑民民歌曰天下亂兮市為墟母不抱子兮妻失夫頼有皇甫兮復安居吳志曰吕範拜揚州牧性好威儀州人如陸遜全琮及貴公子皆修敬䖍肅不敢輕脱也其居家服飾窮極奢靡然勤事奉法故權悦其忠不怪其侈又曰吕岱𫝊廖式作亂圍城邑零陵蒼梧鬰林諸郡騷擾岱自表輒行星夜兼路權遣使追拜岱交州牧晉書曰張茂為凉州牧武公軌之子也築靈鈞臺周輪八十餘堵其髙九仞武陵人閆増夜叩門呼曰武公遣我來曰何故勞百姓而築臺乎姑臧令辛巖以増妖妄請殺之茂曰吾信勞人増稱先君之令何為妖乎太府主簿馬魴諌曰今世難未夷惟當𢎞道業不宜勞役崇飾臺榭比年以來轉覺衆物日奢於往每所經營輕違雅度實非士女所望於明公也茂曰吾過也命止作役又曰張駿為凉州牧刑清國富羣僚勸進稱凉王領秦凉二州牧置公卿百官如魏武晉文故事駿曰此非人臣所宜言也敢有言此者罪在不赦然境内皆稱之為王北史曰裴俠常與諸牧守俱謁周文文命俠别立謂諸牧守曰裴侯清慎奉公為天下之最令衆有如俠者可與之俱立衆皆黙然無敢應者周文乃厚賜俠朝野懽服焉號為獨立使君北史曰後魏廣陽王嘉遷司州牧嘉表請於京四靣築坊二百二十三各周一千二百歩乞發三正復丁以充茲役雖有暫勞奸盗永止詔從之後周書曰蘇綽為六條詔書奏施行之太祖甚重之常置諸坐右又令百司習誦之其牧令守長非通六條計帳不得居守太平御覽卷二百五十
