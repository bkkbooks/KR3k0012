body:
  text: 太平御覽卷四百一十八宋李昉等撰人事部五十九忠貞管子曰忠者臣下之高行孟子曰教人以善謂之忠淮南子曰交淺而言深是忠也抱朴子曰竭身命以徇國經夷險而一節者忠臣也說苑曰逆命利君謂之忠又曰卑身賤體夙興夜寐進賢不懈數稱往古之行事以厲主意庶幾有益以安國家如此者忠臣也禮記文王世子曰為人臣者殺身有益于君則為之又檀弓曰公叔文子卒其子戍請諡於君君曰昔者衛國有難夫子以其死衞寡人不亦貞乎左傳隠公曰衞州吁殺桓公石厚從州吁如陳石碏使告于陳曰此二人者寔弑寡君敢即圖之陳人執之而請莅于衛君子曰石碏純臣也惡州吁而厚與焉大義滅親其是之謂乎又曰僖公上曰晉獻公使荀息傅奚齊公疾召之曰以是藐諸孤言其幼賤與諸子縣藐辱在大夫其若之何對曰臣竭其股肱之力加之以忠貞公曰何謂忠貞對曰公家之利知無不為忠也送往事居耦俱無猜貞也又曰僖公中曰晉惠公卒懷公立命從亡人亡人重耳期朞而不至無赦狐突之子毛及偃從重耳在秦不召懷公執狐突曰子來則免對曰子之能仕父教之忠古之制也策名委質貳乃辟也二心辟罪也今臣之子名在重耳有年數矣若又召之教之貳也父教子貳何以事君又宣公上曰楚子滅若敖氏令尹子文其孫箴尹克黄箴尹官名使於齊還及宋聞亂其人曰不可以入矣其人克黄從臣箴尹曰棄君之命獨誰受之君天也天可逃乎遂歸復命而自拘於司敗又襄公十四年曰楚子囊將死遺言謂子庚必城郢楚徒都郢未有城郭君子謂子囊忠君薨不忘增其名謂前年諡君為恭也將死不忘衛社稷可不謂忠乎忠民之望也又曰晉人執季文子舎之於苕邱范文子謂樂武子曰季孫於魯相三君矣妾不衣帛馬不食粟可不謂忠乎韓詩外傳曰有大忠有次忠有下忠以道覆君而化之大忠也以德調君而補之次忠也以是諫非而怨之下忠也周公於成王可謂大忠管仲於桓公可謂次忠子胥於夫差可謂下忠又曰崔杼殺莊公陳不占聞君有難將死之餐則失哺上車失軾僕曰雖往其有益乎不占曰死君義也無勇私也遂驅車北至公門外聞鐘鼔戰鬭之聲遂駭而死國語曰􅇾之亂宣王在召公宫國人圍之召公乃以其子代宣王王長而立之戰國策曰吳入郢棼冒勃蘇羸音盈糧潛行十日而薄秦朝鶴立不轉晝吟宵泣七日不得告水漿無入於口秦王聞而走之冠劒不相及左奉其首右濡其口於是秦救楚退吳師復楚漢書曰初吳王芮高祖賢之制詔御史長沙王忠其定差甲令臣讃曰漢以芮忠故特王之非故時令也又曰匈奴求和親羣臣議上前􅀶士狄山曰和親便上問張湯湯曰此愚儒無知狄山曰臣固愚忠若御史大夫湯乃詐忠又曰王莽既篡使者即拜龔勝為講學祭酒勝曰吾受漢家厚恩無以仰報今年老矣旦暮入地豈一身事二姓下見故主哉勝因勑以棺斂喪事語畢遂不復開口飲食積十四日而死東觀漢記曰上於大㑹中指王常謂羣臣曰此家率下江諸將輔翼漢室心如金石忠直臣也是日遷常為漢忠將軍又曰吳漢性忠厚自從征伐在左右上未安則側足屏息上安然後退舎兵有不利軍營未竟漢常獨繕檠弓㦸閱具兵馬激揚吏士上時令人視吳公何為還言方作戰攻具上常曰吳公差強人隠若敵國又曰上為大司馬以王霸為功曹令史從渡河北賓客隨者數十人稍稍引去上謂霸曰潁川從我者皆逝而子獨留始驗疾風知勁草又曰鮑昱字文淵拜司𨽻校尉詔昱請尚書使封胡降檄上遣小黄門問昱有所怪不對曰臣聞故事通官文書不著姓又當司徒露布怪使司𨽻下書而著姓也帝報曰吾故欲令天下知忠臣之子復為司𨽻又曰鮑永字君長到京兆灞陵過更始家引車入陌欲下從事諫止永曰親北面事人何忍車過其墓雖以獲罪司𨽻不辭也遂下車哭盡哀而止西至右扶風椎牛上荀諫冡上聞之問公卿曰奉使如此何如時太中大夫張湛對曰仁者百行之宗忠者禮義之主仁不遺舊忠不忘君行之髙者上悦之謝承後漢書曰梁冀奏誅李固固臨命與胡廣趙戒書曰固受國厚恩是以竭其股肱不顧死亡志欲扶持王室比隆文宣何圖一朝梁氏迷謬公等曲從以吉為凶成事為敗漢家衰微從此始矣公等受主厚祿顛而不扶傾覆大事後之良史豈有所私固身已矣於義得矣夫復何言廣戒得書悲慙長歎范曄後漢書曰來歙與蓋延馬成進攻公孫述將王元環安於河池下辯陷之乘勝遂進蜀人大懼使刺客刺歙未絶馳召蓋延見歙因伏悲哀不能仰視歙叱延曰虎牙何敢然今使者中刺客無以報國故呼巨卿欲相屬以軍事而反效兒女子涕泣乎刃雖在身不能勒兵斬公邪延收淚強起遂受所誡歙自書表曰臣夜人定後為何人所賊傷中臣要害何人謂不知何人也臣不敢自惜誠恨奉職不稱以為朝廷羞夫理國以得賢為本太中大夫叚襄骨鯁可任願陛下裁察又臣兄弟不肖終恐被罪陛下哀憐數賜教督投筆抽刃而絶魏志曰典韋拜都尉太祖引置左右將親兵數百人常繞帳韋性忠至謹重常晝立侍終日夜宿帳左右稀歸私寢英雄記曰曹操圍張超於雍邱臧洪從袁紹請兵將赴其難紹不聽之超城遂陷張氏族滅洪由是怨袁紹不與通紹增兵急攻洪殺愛妾以食兵將流涕莫有離叛城陷生執洪紹問臧洪何相負若是今日服未洪據地瞋目曰諸袁事漢四世五公可謂受恩今王室微弱因際㑹觖望非冀惜洪力弱不能為天下推刃報讎何謂服乎紹命殺焉洪邑人陳容在座見洪當死起謂紹曰將軍舉大事而先誅忠義豈合天意紹慙使人牽出曰臧洪儔空復汝為容顧曰夫仁義豈有常所蹈之則君子背之則為小人今日寧與臧洪同日死不與將軍同日生遂復見殺在紹坐者無不歎息蜀志曰先主退軍義陽傅彤㫁後拒戰兵食俱盡吳將語彤令降罵曰吳狗豈有漢將軍降者遂戰死子僉為領軍都督景曜六年又臨危授命諸嘉其奕世忠義晉中興書曰王敦欲誣帝以不孝於衆坐明帝罪云温太真在東宫久最所知悉因厲聲問嶠謂懼威必與已同嶠正色對曰鉤深致逺小人無以測君子當今諒闇之際有至性可稱敦嘿然不悦然憚其居正不敢害之又曰王敦作逆石頭城既陷王師敗績周顗往詣敦敦曰伯仁卿負我顗曰公戎車犯順下官親帥六軍不能其事使王旅摧敗以此負公敦憚其辭正不知所答顗與戴淵俱被收路經太廟顗大言曰天地先帝之靈臣忠於社稷王敦無道陵虐天下神祗有靈當速殺敦無令縱毒以傾王室語未終人以㦸傷其口不得復言血流至踵顔色不變士庶聚觀皆為流涕於石頭南門外石上害之蕭子顯齊書曰王敬則轉安城王車騎將軍蒼梧王狂虐左右人不自保敬則以太祖有威名歸誠奉事毎下直輒往領軍府夜着青衣扶匍道路為太祖聽察崔鴻十六國春秋前凉錄曰麻秋以書誘致宛成都尉宋矩矩至謂秋曰辭父事君當立功義功義不立當守名節矩終不背主覆宗偷生於世乃先殺妻子自刎而死秋曰義士也命吏人葬之重華嘉其誠節賜振威將軍又曰前燉煌太守辛憑隴西人也唯有一子髦至狄道省墓遇辛晏反叛為晏所執憑勸張茂討晏茂曰髦在彼如何憑曰人臣奉主豈顧子乎茂曰汝純臣賜爵闗内侯又前趙錄曰王廣永嘉之亂聚族避世及為揚州刺史被蠻賊圍一百二十日外救不至糧食罄絶鷄犬雀䑕靡有將士泣曰將軍忠於本朝故有今難豈有背將軍理哉衆相枕而死者五千人又南凉錄曰振武將軍尉賢政固守浩亹不下熾磐招之曰樂都已潰卿妻子皆在吾所孤城獨守何所為也政曰受凉王厚恩為國家藩屏雖知樂都已陷妻子為擒先歸獲賞後順受誅然不知主存亡未敢聞命妻子小事豈足動懷磐乃遣虎臺手書喻政政曰為國儲不能盡忠反面縛於人棄父負君墮萬世之業賢政義士豈如汝乎三國典略曰齊山東維州刺史傅伏堅守不降帝遣􅅊孝寛將伏子仁寛招伏曰并州已平故遣公兒來報今授上大將軍武卿郡公以金馬腦二酒鍾為信公宜急下伏不受謂孝寛曰事君有死無二此兒為臣不忠為子不孝願即斬以示天下帝又遣髙阿那肱等百餘人臨汾召伏伏出軍隔水相見問至尊何在阿那肱曰已被捉獲别路入闗伏仰天大哭率衆入城於㕔事前北面哀號良久乃降帝見之曰何不早下伏流涕而對曰臣三代被任草命不能自死羞見天地帝執其手曰為臣當若此朕平齊國唯見公一人乃自食一羊肋以骨賜伏曰骨親肉疎所以相付授上儀同唐書曰隋屈突通與竇琮戰於稠桑通結陣以自固竇琮縱通子壽令往諭之通大呼曰昔與汝為父子今與汝為仇讎命左右射之桑顯和呼其衆曰京師陷矣汝並闗西人欲何所去衆皆釋伏通知不免乃下馬東南向再拜號哭曰臣力屈兵敗不負陛下天地神祗實所鑒察遂擒通送于長安髙祖謂曰何相見晚耶通泣對曰通不盡人臣之節力屈而至此髙祖曰隋室忠臣也命釋之又曰馮立事隠太子太子誅左右悉散立歎曰豈有人生受其恩死逃其難立乃率兵犯𤣥武殺將軍敬君𢎞謂其徒曰微以報太子矣遂解兵而遁俄來請罪太宗數之立對曰出身事主期之效命當戰之日無所顧憚因歔欷悲不自勝太宗宥之立謂所親曰逢莫之大恩終當以死奉荅俄而突厥至便橋立率數百人力戰殺獲甚衆太宗深嘉歎之又曰安金藏為太常工人時睿宗為皇嗣或有誣告皇嗣潛有異謀者則天令來俊臣按之左右不勝楚毒皆欲自誣唯金藏大呼謂俊臣曰公既不信金藏言請剖心以明皇嗣不反則引佩刀自剖其胸五臟並出流血被地氣遂絶則天聞之令舁入宫中遣醫人却内五藏以桑白皮縱合之傳藥經宿乃蘇則天臨視歎曰吾有子不能自明不如爾之忠也即令停推睿宗由是獲免新序曰陳恒弑簡公而盟盟者完其家召他人曰不盟是弑父母也盟之是無君臣之禮乃盟以免父母死而自殺以禮其君又曰智伯之時有士曰長兒子魚絶智伯而去之三年將東之魯而道聞智伯死曰吾聞忠臣無餘祿吾聞智伯之死動吾心餘禄加於我至今尚存吾將往依之遂反而死之續説苑曰趙苞漢靈帝時為武威守夷戎畏其武毅母及妻子自郡來遇鮮卑萬騎入塞為其所掠苞出擊賊陳歩騎二萬鮮卑恐懼出母示苞苞悲號謂母曰為子無狀欲以微祿奉養不圖作禍今為王臣不得顧私母曰人各有命何得毁忠節耶立忠榮親孝莫大焉行矣勉之苞瞑目援桴虜衆碎斬其帥伏屍十里母妻子皆為賊所害苞收母殯斂奏請歸葬天子策柬封為列侯葬訖謂鄉人曰食禄避難不忠殺母全義不孝何面目立於天下遂自殺又曰宦者田鵬事齊至内侍中齊主走青州圖入陳出覘為周人所獲歐問齊主所在紿云已去周人折其支毎折一支辭色逾厲四支俱絶而死許肅别傳曰肅為愍帝侍中左衛將軍趜武將與肅齊心拒守而外救已退城遂陷沒齒逼愍帝送于平陽肅後冒難侍左右劉載乃以帝為歸漢王頃之陰行鴆毒帝因食心悶欲見許侍中肅馳詣賊相見帝已不復能語肅曰不審陛下尚識臣不帝猶能執肅手流涕肅歔欷登牀帝遂殂於扶抱之中晝夜號泣哀感異類載外欲明已不害乃偽責諸臣欲盡誅之羣臣迸竄唯肅獨曰備位故臣願乞得殯殮然後就戮載特聽許事訖詣載曰國亂不能匡君亡弗能死舉目莫非愧恥將何顔以存所以忍辱正以山陵未畢故耳微情已敘甘就刑戮賊共義之曰此晉之忠臣宜加甄賞載遂從議故得全免庾珉别傳曰珉字子琚位列侍中劉聰作亂京都傾覆珉時直在省謂僚佐曰吾必死此屋内既天子蒙塵珉與許遐等侍從聰設㑹使帝行酒珉至帝前乃慨然流涕聰曰此動人心即時遇害太平御覽卷四百一十八
