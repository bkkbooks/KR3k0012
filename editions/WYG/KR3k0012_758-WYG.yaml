  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_758-1a, image: WYG0899/WYG0899-0642a.png}
body:
  text: 太平御覽卷七百五十八宋李昉等撰器物部三盆甕罃坩鉼甒魁槃盆爾雅曰盆謂之缶易曰初六有孚盈缶又曰九三日昃之離不鼔缶而歌則大耋之嗟㐫詩曰坎其擊缶宛丘之道周禮曰盆實二鬴厚半寸禮曰夫奥者老婦之祭也盛於盆尊於瓶又曰世婦卒􅅙遂献繭于夫人及良日夫人繅三盆手史記曰秦趙㑹澠池藺相如曰趙王竊聞秦王善爲秦聲請奏盆缻音缶皆瓦器竹以盛酒奏大鼓之以節歌於是秦王不懌爲一擊缻趙御史書曰某年某月秦王爲趙王擊缻又曰惲書云醉後仰天撫缶而歌又曰司馬遷書云僕以為戴盆何以望天續晋陽秋曰桓宣武與妻妾坐月下流星墜下銅盆水中光如二寸珠妾酌飲之生𤣥晏子春秋曰景公飲酒鼔盆莊子曰莊子妻死惠子弔之莊子箕踞鼔盆而歌淮南子曰今夫窮鄙之社也扣盆拊瓶相和而歌自以為樂矣嘗試為之擊建鼔撞巨鐘然後知盆瓶之足羞藏詩書修文學而不知至論之至則拊盆扣瓶之徒爾又曰屠者觀義車者歩行陶人用皿盆匠人處狹廬又曰今盆水在庭清之終日未能見目睫濁之用一撓而難察方圓人神易濁而難清猶盆之水乎又曰日東至則盆水溢世說曰阮仲容至宗人共集輒以大盆盛酒王韶之始興記曰林源山有石室盤石上行羅十甕皆蓋以青盆中悉是瓶銀交州雜記曰夷俗以銅盆與甕贖罪潘岳笙賦曰傾縹盆以酌甕說文曰罌甀也甀小口􅑥也􅒤似􅑥長頸受十甕􅑥也通俗文曰甕􅑥下孔曰瓹方言曰酃瓭甒䍃㽀㼻甕瓿甊㽈甖也靈桂之郊謂之㼚其小者謂之瓭周魏之間謂之甒秦之舊都謂之㽀淮汝之間謂之䍃江湘之間謂之㼻自關而西晋舊都河汾之間其大者謂之甀其中者謂瓿甊自闗而東趙魏之間謂之甕或謂之甖東齊海岱之間謂之㽈甖其通語也爾雅曰甌瓿謂之瓵易曰井谷射鮒甕敝漏禮曰宋襄公葬其夫人醯百甕又曰儒有蓬戸甕牖易衣而出併日而食左傳曰齊侯伐燕燕人歸燕姬賂以瑶甕玉櫝斚耳不克而還孝經援神契曰銀甕也不汲自隨不盛自盈漢書曰陳平家貧居甕牖東觀漢記曰王渙為落降令盗賊發不逺走或藏溝渠或伏甕下渙以方畧取之皆稱神明王隱晋書曰太孫臧外祖蔣廸吳興人後廸作酪當釀未成大甕自行廸打酪甕破問景養飬曰當生太子儲副又曰畢卓為吏部郎性嗜酒比舍郎酒熟卓因醉夜至其甕間盗飲之為掌酒者所縛旦視之乃畢吏部也墨子曰備城百歩一井井十甕莊子曰子貢過漢隂見一丈夫方將為圃畦鑿隧而入井抱甕而出淮幽怪志曰建康小吏曹著為廬山府君所迎見門前有大甕可受數百斛但見風雲出其中鍾離意别傳曰意為魯相孔子堂有甕背有丹書自夫子亡後無敢發者意乃發甕得素書為學華嚴國志曰趙琰青州刺史㕔置水甕得貴要之書投於其中淮南萬畢術曰銅甕雷鳴語林曰楊雅舒冬月釀酒令人抱甕為煖世說曰胡廣本姓黄五月五日生父母惡之乃置甕投於江湖見甕流下聞兒啼取兒養之遂位登三司廣不持本親服云於本親以我為死人深譏之罃說文曰罃備火長頸鉼也方言曰罃陳魏宋楚之間謂之㼶或謂之㼡燕之東北朝鮮冽水之間謂之瓺齊之東北海岱之間謂之儋所謂家無儋石之儲者也音儋或作甔周洛韓鄭之間謂之甀或謂之罃罃謂之㼰史記曰韓信擊魏從夏陽以木罌渡軍襲安邑服䖍曰木埤綺以缶以罌為渡異苑曰月支國有佛髪盛以琉璃罌幽明録曰清河崔茂伯女結婚裴氏剋期未至女暮天提一金甖受二升許徑到裴牀前立以甖贈裴甄異傳曰晉隆安中呉縣張君才忽有鬼來令才取百甖盛水半以絹覆頭明日視之滿甖皆金才家先貧因此遂富墨子守備曰用大瓦甖容十升以上百步十甖盛水旦用之淮南萬畢術曰馬蹄破甖坩纂文曰大坩為坑東宫舊事曰白坩五枝世說曰陶侃少時作魚梁史嘗以坩鮓餉母母責侃曰女為吏以官物見餉非惟不能益吾乃以増吾憂裴淵廣州記曰董奉至晉興五里封一白坩置髙崖中而去人欲取不能得今猶在缾說文曰缾甕也甕壅也汲缾也瓴形似缾易曰汔至亦未繘井羸其缾㐫左傳曰衞孫蒯田于曹隧飲馬于重丘毁其缾重丘人閉門而訽之曰親逐而君爾父為厲是之不憂何以田為衞石賈孫蒯伐曹取重丘又曰晉人來治杞田季孫將以成與之謝息為孟孫分守不可曰人有言曰雖有挈缾之知守不假器禮也又曰邾子在門臺閣以缾水沷延史記曰田常說髙祖曰秦形勝之國也地勢便利其以下於諸侯譬猶居髙屋之上建瓴水也漢揚雄作酒賦以諷諫成帝其辭曰子猶缾矣觀缾之居居井之湄處高臨深動常近危酒醪不入藏水滿懐不得左右牽於纆徽一旦擊礙為瓽所轠身投黄泉骨肉為泥自用如此不如鴟夷鴟夷滑稽腹大如壺盡日盛酒人復藉酤前凉録曰張􅀈時西域致金水缾皆作拂菻竒狀曽子曰一井五缾泄之可待監流者衆也吕氏春秋曰見缾水之氷而知天下寒淮南子曰古者抱缾而汲唐子曰猛將之發觀于虎而鑒于鷹故攻如擊電避如收霧閑之如在缾開之如散臯西域記曰踈勒王致魏文帝金水缾歐登於明堂缾歐瓦器也周鼎潛乎深泉古樂府詞曰後園鑿井銀作牀金缾素綆汲寒漿甒方言曰甒瓮甖嬰也禮曰君尊瓦甒此以小為貴也儀禮曰東方之饌两瓦甒三禮圖曰醴甒以瓦為之受五斗口髙二寸徑一尺六寸中身瓮下平有盖魁易洞林曰太子洗馬荀子兾家中以龍銅魁作食欻鳴李尤􅅅魁銘曰羊􅅅不徧駟馬長驅槃說文曰槃承槃也裭槃也周禮曰若合諸侯則共珠槃玉敦大戴禮曰隨武子槃之銘曰與其溺於人也寧溺於淵禮曰湯之盤銘曰苟日新日日新又日新左傳曰晉文公及曹僖負羈之妻曰吾觀晉公子之從者皆足以相國若以相國公子必反其國反其國必得志於諸侯得志於諸侯而誅亂曹其首也子蚤自貳焉乃饋盤飱寘璧焉又曰莒人伐我東鄙圍台季武子救台遂入鄆取其鍾以為公盤史記曰平原君與楚王合從言利害毛遂謂楚王曰取鷄狗馬之血來毛遂捧銅槃血跪進曰當歃血盟而定之又曰武帝作栢梁銅柱承露盤後漢書曰左慈有術於銅盤釣鯔魚漢官儀曰封禪壇南有玉盤中有玉龜焉晉陽秋曰武帝時御府令蕭譚承徐循儀䟽作漆􅀞銀盤詔殺之晉四王啟事曰惠帝還洛陽道中有老人蒸鷄素木槃中盛以奉帝沈約宋書曰髙祖儉諸子食不過五醆槃後魏書曰太武帝作黄金槃十二具鏤以白銀錯以玫瑰珠玉隋書曰上賜王公已下射楊素箭為第一上以外國所献金精槃價直鉅萬賜之荀卿子曰君者槃也民者水也槃圓則水圓槃方則水方燕丹子曰太子出羙人能琴者荆軻曰好手太子斷手以玉槃奉之淮南子曰窺面於槃水則圓於㮎水則修面形不變其故有所圓修者皆所自窺之異也抱朴子曰以丹金為槃置食其中令人長生郭子曰王光禄曰正得殘槃冷炙脩復山陵故事曰武帝悼后𤣥宫漆烏瓦槃一枚東宫舊事曰長槃五漆尺槃三十漆栢炙柈二神異經曰西北荒有金樓上有銀槃廣五十丈搜神記曰髙辛氏有老婦人得耳疾醫為挑治得卵大如繭盛以瓠離之以槃俄而卵化犬因名槃瓠王子年拾遺記曰董偃以玉精為槃承氷而進又曰漢明帝夜讌群臣於華林園詔大官進櫻桃以赤瑕瑛為槃賜羣臣而去其葉月下視槃與櫻桃共一色衆臣笑云是空槃時帝使坐於廷中欲以承露詔使舉燭復照衆乃知槃中不空也皆拜謝為樂風土記曰越俗飲燕叩懿槃為樂取大素圓槃以著腹上以右手五指彈之為節舞者應槃節而作舞鄴中記曰石虎㑹上御食逰槃兩重皆金銀叅軍百二十醆彫飾並同其叅帶之間茱萸盡㣲如破髪近看乃得見動遊槃則圎轉也又曰石虎皇后浴室中有雙長生樹又安槃受十斛於二樹之間交州雜事曰太康四年刺史陶璜表送林邑王范熊所献縹紺水精槃各一枚述征記曰逍遥宫門裏有銅浴槃一面徑丈二尺魏景初中所鑄妬記曰武歴陽女嫁阮宣子劉通妬忌禁婢甌覆槃不得相合神仙傳曰沈義為人所迎見老君以金案玉槃賜之俗說曰桓𤣥寵丁牛期食畢便廻槃與之梁丘儉承露盤賦曰偉神盤之殊異邈迢逓以秀峙古樂府曰琉璃琥珀象牙盤張衡四愁詩曰羙人贈我青琅玕何以報之雙玉盤李尤盤銘曰或以承觴或以受物旣與清觴又成口食蔡邕盤銘曰華盤就用以享嘉賓内納其實外若𤣥真陳思王集曰明帝承露盤在芳林圃中上盤徑四尺九寸下盤徑五尺銅龍繞其根劉義恭啓事曰恩㫖以犀鏤金錯酒杯槃垂賜太平御覽卷七百五十八
