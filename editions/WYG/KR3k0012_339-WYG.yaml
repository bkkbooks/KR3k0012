body:
  text: 太平御覽卷三百三十九宋李昉等撰兵部七十叙兵噐牙叙兵噐禮記曰冕弁兵革藏於私家是謂脅君周禮曰司兵掌五兵五兵者戈殳㦸矛牟夷左傳曰孔文子將攻太叔訪于仲尼仲尼曰簠簋之事則嘗聞之矣兵甲之事未之學也春秋佐助期曰太尉主甲卒神名辦㑹曰庫兵動鼓自鳴諸侯得衆也漢書曰兵不鋭利與空手同甲不堅宻與袒裼同弩不及逺與短兵同射不能中與亡矢同中不能入與亡鏃同此將不省兵之禍也又曰韓延夀在東郡試騎士治飾兵車畵龍虎建幢棨植羽葆古車又取官銅候月蝕鑄作刀劒倣効尚方蕭望之以為僣上不道棄市又曰李陵至浚稽山與單于相值圍陵陵軍居兩山間以車為營陵引士營外為陳前行持㦸楯后行持弓弩東觀漢記曰盆子䧏鎧甲兵弩積城西門髙與熊耳山等又曰王莽之遣王尋王邑也欲盛威以震山東甲衝輣干戈旌旗甚盛又曰鄧遵永初中遷度遼將軍討擊羗虜斬首八百餘級得鎧弩刀矛㦸楯楯首二三千枚又曰吳漢性忠厚篤於事上自初從征伐常在左右兵有不利軍營不如意漢常獨膳激揚吏士吳志曰賀齊性奢侈尤好軍事兵甲噐械極為精好干櫓戈矛葩爪文畫弓弩矢箭咸取上材王隠晋書曰羊祜表伐吳曰勁弩長弓不如中國長矛楯㦸不如中國馬騎陵厲又不如中國吳唯便水戰一入其地則長江非復吳有晋起居注曰成帝咸和元年四月乙丑詔曰作瑯琊王大車斧六十枚侍臣劒八枚將軍手㦸四枚三國典略曰梁邵陵王綸篤好書史妙工草𨽻為丹陽尹擅造甲仗梁武帝知之綸並沉于江中及是出征噐械並闕乃獨嘆曰吾昔聚仗本備非常朝廷見疑逼使分散今日討逆卒無所資太公六韜曰春以長矛在前夏以大㦸在前秋以弓弩在前冬以刀楯在前此四時應天之法也太公金匱曰武王曰五帝之時無守戰之具國存者何太公曰守戰之具皆在民間耒耜者是其弓弩也鋤爬者是其矛㦸也簦笠者是其兠鍪也䥥斧者是其攻戰之具也雞狗者是鉦鼓也古司馬兵法曰兵不雜則不利長兵以衛短兵以守太長則犯太短不及太輕則鋭鋭則易亂太犯則不齊兵長短相衛太長太輕者不如法也犯者觸柱也故不齊不及者逺於利也鋭者不固則破故奔此擾亂也又曰弓矢圍殳矛守戈㦸助凡五兵當長以衛短短以救長迭戰則乆皆戰則彊李氏曰迭更也言更或更息則可堪乆悉舉軍戰衆多者彊軍令曰始出營竪矛㦸舒幡旗鳴鼔角行三里辟矛㦸結幡旗鳴鼓角未至營三里復翌矛㦸舒幡旗鳴鼓角至營復結幡旗止鼔角違令者髠吕氏春秋曰古之至兵士民未合而威已踰矣敵已服矣豈必用枹鼓干戈哉淮南子曰兵革錞麾金鼓鈇鉞所以飾怒也又曰所謂兼國有地者伏尸數十萬破車以千百數傷弓弩矛㦸矢石之創者扶輿於路故世至枕人頭食人肉葅人肝飲人血甘之於猫豢牛羊猶牛肉豢豕肉故自三代以後者天下未嘗得安其情性而樂習俗保其修命而不夭於人虐也所以然者何諸侯力政天下不合而為一家也又曰齊桓公將欲征伐甲兵不足令有重罪者出犀甲一㦸犀甲收其堅也㦸車也長丈六尺犀或作三有出三甲也有輕罪者贖以金分輕小以金分出金匱道罪至重有分兩也説而不勝者出一束箭不勝猶不直也箭十二為束也百姓皆説乃矯箭為矢矢箭之竿好者也鑄金而為刃刃五刃也劒矛矢也以伐不義而征無道遂覇天下崔寔政曰論兵噐精利有蔡太僕之弩龍亭之劒至今擅名天下陸機要覽曰東弓南矛西劒北㦸北中鼓亦曰四兵鹽鐵論曰强楚勁鄭有犀兕之甲堂谿之揵内據金城外任利兵是以威行諸夏强伏敵國故孟賁畜臂衆人輕之怯夫有備其氣倍以吳楚之士舞利劒蹶强弩以與狢虜騁扵中原一人當有百不足道之也邯鄲五經折疑駮曰矢絶扵弦不可追止執㦸在手制之在人山海經曰天地東西二萬八千里南北二萬六千里出銅之山四百六十七出鐵之山三千六百九十此天下之所分壤樹榖也戈㦸之所發也刀鎩之所起也能者有餘拙者不足干寳搜神記曰晉元康中婦人以金銀象角瑇瑁為斧鉞戈㦸而戴之以當笄蓋妖之大者也樊文淵七經義綱格論曰車上五兵戈殳車㦸酋矛牟夷歩卒五兵戈殳車㦸酋矛㦸魏文典略曰昔周有雍孤之㦸屈盧之矛孤父之戈上世名噐又曰抱朴子曰劒㦸不能於縫衣佳饌不可飼牛馬又曰陳吳之徒奮劒而大呼劉項之倫揮戈而飈駭又曰或問辟五兵之道抱朴子答曰吳大皇帝曽從介先生受要道云但知北斗姓氏及日月名字便不畏白刃大皇帝以試告左右數十人常為先登䧟陳皆不傷也鄭君云但誦五兵名亦驗矣刀名大房虛星主之矢名防隍熒惑主之弓名曲張角星主之弩名逺望張星主之㦸名大將參星主之臨戰時嘗細祝之或以五月五日作赤靈符着心前或丙午日日中作燕軍龍虎三囊符嵗易之嵗符嵗易月符月易日符日易或佩西毒兵信符或佩南極爍金符或取牡荆以作六隂神將符指敵人或以月蝕時刻三嵗蟾蜍喉下之有八字者血以書所將之刃劒或交鋒之際乗魁履岡呼四方之長亦有明效也魏文帝校獵賦曰扽冲天之素旄兮靡格澤之修旃雄㦸趪音皇而躍厲兮黄越扈而揚鮮又曰千乗亂擾萬騎奔走經營原隰騰越峻岨彤弓斯彀戈鋋具舉徐幹齊都賦曰矢流鏑絓胡卦切張羅攅飛鋋抱雄戈繆襲藉田賦曰靈旂蔚以燾奡兮雄㦸偈以嵯峨彎枉矢扵狼狐兮建黄鉞於匏𤓰繁欽征天山賦曰有漢丞相武平侯曹公仗節東征觀六軍扵三江浮五湖以耀武左駢雄馬右攅干將彤弧朱矰丹羽綘房望之如火映奪朝陽應璩詩曰放戈釋甲胄乗軒入紫微從容侍帷幄光輔日月暉崔駰安豐侯詩曰被兕甲兮跨良馬揮長㦸兮彍强弩曹植詩曰皇考建世業余從征四方櫛風而沐雨萬里蒙露霜劒㦸不離手鎧甲為衣裳魏元帝董逃行曰曩背大河南轅跋渉遐路澷澷師徒百萬譁諠戈矛若林成山旌旗拂日蔽天應璩書曰左執屈盧之勁矛右秉干將之雄㦸髙冠拂雲長劒耿介簫管振音厥聲載路馮軾虎視清風震疊可謂堂堂乎難與並為仁也太白隂經曰工欲善其事必先利其噐噐之於事如影之隨形響之應聲其相湏如左右手故曰噐械不精不可言兵五兵不利不可舉事上古庖犧氏之時弦木為弓剡木為矢神農氏之時以石為兵尚書曰砮石中矢鏃黄帝之時以玉為兵蚩尤之時爍金為兵割革為甲始制五兵建旗幟樹䕫鼓又曰鼓以佐軍威又曰纛六口大將中營建出引六軍古者天子六軍諸侯三軍今天子十二諸侯六軍故纛有六以主之又曰門旗二口色紅八幅大將牙門之旗出引將軍前列又曰門槍二根以豹尾為刃榼出居紅旗後止居帳門前左右安立又曰五方旗五口各具方色大將中營建出六纛後在營亦於纛後隨方而建又曰嚴警鼓一十二面大將營前左右行列各六面在纛後又曰角十二具於鼓左右後列各六具以代金又曰隊旗二百五十面尚色圗禽與本陣同五幅又曰刃二百五十口尚色圗禽與諸陣不同各自為誌認出居隊後恐士卒交雜又曰陣將門旗各任所色不得以紅恐雜大將軍又曰陣將鼔一百二十五面恐設疑驚敵用又曰甲六分七千五百領又曰戰袍四分五千領又曰槍十分一萬二千五百根恐揚兵縛筏用又曰牛觔排二分二千五百面馬軍以團牌代四分支又曰弩二分弦三幅箭一百分二千五百張弩七千五百條弦二十五萬隻箭又曰弓十分弦三副箭一百五十分一萬二千五百張弓三萬七千五百條弦三十七萬五千隻箭射甲箭五萬隻又曰生􅀈箭二萬五千隻長箭垜箭又曰弓袋胡鹿長弓袋並一萬二千五百副又曰佩刀八分一萬口又曰陌刀二分二千五百口又曰棓二分二千五百張馬軍及陌刀並以啄錐鉞斧袋各四支分又曰搭索二分二千五百條馬軍用也牙兵書曰牙旗者将軍之精凡始竪牙必以制日制日者謂上尅下日也立牙之日吉氣來應大勝之徵凶氣先應破軍殺將黄帝出軍决曰始立牙之日喜氣來應旗幡指敵或從風舉揮揮終日繞竿勇氣奔逸是謂堂堂之陣此大勝之徵又曰有所攻伐作五采牙幢青牙旗引住東赤牙旗引住南白牙旗引住西黒牙旗引住北黄牙旗引住中又曰始立牙之日凶氣先應旗旛皆垂或逆風滂浡牙竿摧折旗旛絶裂還繞繳竿如此終日勢弱又曰將軍出兵有所討伐引兵出城門望見白雲及白水者舉白牙旗隨天氣四時也真人水鏡經曰凡軍始出立牙竿必令先竪若有折將軍不利牙旗竿軍之精也即周禮司常職云軍旅㑹同置旌門是也抱朴子曰軍始舉牙立旗風氣和調旛校飄終日不息者其軍有功魏志曰典韋初為張邈士屬司馬趙寵牙門長大莫能勝韋一手建之寵異有才力吳志曰陸遜為右部督㑹丹陽賊帥費棧扇動山越權遣遜討棧棧支黨多所徃兵少遜乃益施牙幢分布鼔角夜潜山谷間鼓譟而前應即破散又曰黄武八年夏黄龍見樊口於是權稱尊號因瑞改元又作黄龍大牙常在中軍諸軍進退視其所向命胡綜作賦吳書曰賀齊從上討合肥時城中出戰徐盛失牙齊别拒擊得盛所失牙晋書曰陸機始臨戎而牙旗折意甚惡之後戰軍果大敗魏書曰奚斤代人也魏初大將行師唯長孫嵩拒劉裕及斤征河南獨給漏刻及二十牙旗吳胡綜大牙賦曰狼弧垂曜實惟兵精聖人觀法是效是營始作噐械爰求厥成明明大吳實天生徳乃律天時制其神軍取象太乙五將二門疾則如電遲則如雲進止有度約而不煩四靈既布黄龍處中周制日月實曰大常桀然特立六軍所望後漢滕輔祭牙文曰恭羞太牢潔薦遐靈推轂之任實討不庭天道助順正直聰明晋袁宏祭牙文曰天生五才治道所司廢一不可撥亂輔時赫赫晋徳乃武乃文中世不競王度塹屯戎狄滑夏䖍劉生民蠢爾東胡被髪左袵思我皇澤稽首海裔受爵納貢服膺累世後嗣不恭實叛實戾侵我神畿隔我嘉恵哀彼黎民嬰此彫殘况荷大寵任其艱難慨然發憤撫劒忘飡敢建髙牙烈烈桓桓晋顧愷之祭牙文曰維年月日録尚書事豫章公裕敢告黄帝蚩尤五兵之靈兩儀有正四海有王晋命在天世徳重光烈烈髙牙闐闐伐鼓白氣經天闡揚神武宋王誕伐廣固祭牙文曰敬建崇牙顯兹威靈使鳴金輟釁旡戰有寧皇風幽被凱斾歸旌宋鄭鮮之祭牙文曰潔牲先事薦兹敬祭崇牙既建義鋒增厲人鬼一揆三才同契惟兹靈鍳庶必有察逆順幽辨忠孝顯節使凶醜時殱主寧臣悦振旅上京凱歸西蕃神噐増暉四境永安唐陳子昻禡牙文曰蓋先王作兵以討有罪姦慝竊命戎夷不恭則必肆諸市朝大戮原野皇家子育萬國寵綏百蠻青雲干吕白環入貢乆有年矣契丹凶羯敢亂天常乃蜂聚丸山豕食遼塞宴安鴆毒作為攙搶天厭其凶國用致討皇帝命我肅將王誅今大軍已集吉辰協應旄頭首建羽斾前列夷貊感威將士聼誓方俟天命為民殄災惟爾有神尚殱乃醜召太一㑹雷公翼白虎乗青龍星流彗掃永清朔裔使兵不血刃戎夏大同以昭我天子之徳允乃神人之功豈非正直克明無縱大讎以作神羞太平御覧卷三百三十九
