body:
  text: 太平御覽卷七百五十四宋李昉等撰工藝部十一愽塞摴蒱蹴鞠藏鈎愽說文曰愽局戱六箸十二碁也論語曰飽食終日無所用心難矣哉不有愽奕者乎為之猶賢乎已家語曰哀公問於孔子曰吾聞君子不愽有之乎孔子曰有之為其二乗也公曰有二乗何為不愽孔子曰為其兼行惡道也史記曰宋湣公與南宫長萬愽争公怒辱之曰吾始敬若今子魯虜也長萬病此言遂以局殺湣公又曰魏王與信陵君愽北境舉烽火言趙冦入界信陵君曰臣有客能知趙王隂事言趙王獵非冦也又曰劇孟好愽多少年之劇又曰蔡澤說范睢曰君獨不觀夫愽者乎或欲大投或欲出分功此皆君之所明知也漢書曰孝文帝時皇太子與吴太子愽吴太子争道不恭皇太子以愽局提吴太子殺之又曰吾丘夀王字子贛少年以善格五召待詔注乗五閣不得行故曰格五也又曰格五行塞白乗至五格不得行又曰陳遵祖父遂字長子宣帝微時與遂有故相隨愽奕數負進及宣帝即位遂稍遷至太守賜遂璽書曰制詔太原太守官尊禄厚可以償博進矣范􅁮後漢書曰耿恭為戊巳校尉恭至部移檄烏孫示漢威徳昆彌以下皆遣使獻名馬及奉宣帝所賜公主愽具願遣子入侍又曰客星經帝座或問趙延因上封事曰河南尹鄧萬有龍潜之舊封為通侯恩重公卿恵豐宗室加禮引見與之對􅀶上下渫黷有虧尊嚴魏畧曰孔桂性便妍曉愽奕太祖愛之每在左右又曰杜畿與衛固少相狎侮共愽争道畿曰我今作河東也固發衣罵之及畿之官而固為功曹晉中興書曰桓𤣥强與人博奕取其田宅穆天子傳曰天子北入邴與井公博三日而決梁冀别傳白冀好格五六博神仙𫝊曰中山衛叔卿服雲母得仙漢武使其子度世往華山求之度世望見父上有紫雲白玉為床與數人􅀶戲度世問父所與􅀶者是誰曰洪崖先生許由巢父也秦記曰吕光破龜兹始獲鳩摩羅什光死子纘立戲弄羅什或共碁愽及殺子云斫壺盧頭什曰不斫壺盧頭其壺盧斫人頭後纉弟字曰壺盧果斬纉頭凉州記曰吕光太安二年龜兹國使至獻寳貨竒珍汗馬光臨正殿設宴㑹文武愽戲西域𫝊曰諸愽戲取人牛馬財物者其俗皆倍償述征記曰極西南端門外有石石色青而細修之作愽碁以遺江東甚可珍玩西京雜記曰許愽昌安陵人也善六愽竇嬰好之常與居處其書曰方畔揭道張𤣥究屈髙𤣥屈張又曰張道揭畔方方畔揭道張究屈𤣥髙髙屈究張居三輔而誦之法用六箸或謂之究以竹為之長六分或二用二箸􅀶昌又作六愽經一篇今世𫝊之莊子曰臧與糓牧羊而俱亡其羊問臧奚事則挟䇿讀書問糓奚事則愽塞以逰事業不同其亡羊均也列子曰虞氏者梁之富人也登高樓大路設樂飲酒繫愽樓上抱朴子曰南陽文氏求食入山見高崕上有數人對愽淮南子曰善愽者不欲牟不恐不勝平心定意投得其齊行由其理雖不必勝得籌必多韓子曰薛公之相魏昭侯也有楊胡蕃者於王甚重而不為薛公薛公患之於是乃與之愽與之百金令與昆弟愽戲俄又益之二百金又曰齊宣王問莊賈曰儒者愽乎對曰愽也者貴梟勝者必殺梟是殺其所貴也儒者以為害義故不愽尹文子曰愽者盡關塞之宜得周通之路楊子法言曰或問侍君子􅀶乎曰侍坐則聽言有酒則觀禮焉事􅀶乎說苑曰秦始皇時嫪毐驕奢後與帝左右愽争行乃瞋目大呼又曰晉靈公驕奢造九層之臺謂左右曰敢諌者斬孫息聞之求見公曰子何能孫息曰臣能累十二愽碁加九雞子於其上公曰吾少學未甞見也子為寡人為之孫息即正顔色定志意以棊子置於下而加九雞子於上左右慴息靈公俯伏氣息不續公曰危哉孫息曰公為九層之臺三年不成危甚於此風俗通曰漢武帝與仙人共愽其投石中馬蹄處於今尚在典略曰荆軻與魯勾踐􅀶争道勾踐怒而叱之軻去而逃婁春秋舊事曰倪寛為漢司馬農卿與太子愽争局犯罪而還遁甲經曰天一逰亭六行亭亭天之一貴神也戰鬭􅀶戲漁獵但可背不可向也薛孝通譜曰烏曹作愽其所由来尚矣雙箭以象日月之照臨十二碁以象十二辰之躔次則天地之運動法隂陽之消息表人事之窮達窮變化之機微履謙謝則知沖謝以致福觀殺伐則知當路而速禍行其道則掎鹿有歸保其家乃瞻烏爰集隠顯藏用莫不合道龍潛雀起率皆趣良足以諧暢至娱治恊妙賞者也魏曹植古冶子等讃曰齊疆接子勇節徇名虎門之􅀶忽晏置釁矜而自伐輕死重分魏王粲彈碁賦序曰因行騁志通權達理六愽是也晉李尤愽銘曰夫無用心􅀶奕猶賢方平處下自不邪偏摴蒱晉書曰桓𤣥見人有好園宅悉欲取之勒以蒱摴而賭𤣥微聞義軍起憂懼弗能寢食或曰劉裕等狂惑事必無成𤣥曰裕為一世之雄加以果於用兵劉毅家無擔石之儲摴蒱一擲百萬何無忌劉牢之外甥酷似其舅共舉大事何為無成又曰葛洪字稚川性寡欲無所愛玩不知碁局幾道摴蒱齒名又曰王獻之年數歳甞觀門生摴蒱曰南風不競門生曰此郎亦管中窺豹特見一斑又曰武帝喜胡貴嬪帝甞與之摴蒱争道遂傷上指帝怒曰此固將種也對曰北伐公孫西拒諸葛非將種而何帝甚有慚色又曰謝鯤婿殷叡好摴蒱奪其妺裝物以還戲債劉湛謂謝宏微曰謝氏累代財産充殷君一朝戲債卿視而不言譬棄物江海以為亷耳又曰陶侃字士衡見諸參佐或以談戲廢事因取其摴蒱愽具悉以投於江乃曰摴蒱者牧猪奴戲耳又曰劉毅於東府聚樗蒱大擲一判應至數百萬餘人並黒犢以還唯劉裕及毅在後毅次擲得雉大喜褰衣繞牀呌謂同座曰非不能盧不事此耳裕惡之因挼五木久之曰老兄試為卿答既而四子俱黒其一子轉躍未定裕厲聲喝之即成盧焉毅意殊不快然素黒其面如鐵色焉既而和言曰亦知公不能以此見借又曰周顗之死也王敦坐其罪有一㕘軍摴蒱馬於􅀶頭被殺因謂敦曰周家奕世令望而坐不至公及伯仁將登而墜有似下官此馬又曰慕容寳初攻長安與韓黄李根等因讌摴蒱危坐整容誓之曰世云摴蒱有神豈虛言哉若富貴可期頻得三盧於是三擲三盧宋書曰何尚之少時頗輕薄好摴蒱既長折節蹈道以操立見稱為陳郡謝琨所知與之遊處齊書曰李安民擊雀尾江城有功明帝大㑹新亭樓勞軍諸王樗蒱官賭安民五擲皆盧帝大驚目安民曰卿面方如田封侯相也安民少時貧窶有一人從門過相之曰君後當大富貴與天子交手共戲至是果驗後周書曰王思政雖被任委自以非相府之舊毎不自安太祖曽在同州與羣公宴集出錦􅄢及綾絹數千令諸將摴蒱取之物既盡太祖又解所服金帶令諸人遍擲曰先得盧者即與之羣公將遍莫有得者次至思政乃斂容跪坐而自誓曰王思政羇旅歸朝䝉宰相國士之遇方願盡心效命上報知已若此誠有實令宰相賜知者願擲即為盧若内懐不盡神靈亦當明之使不作盧便當殺身以謝所奉辭氣慷慨一坐盡驚即㧞所佩刀横於膝上攬樗蒱拊髀擲之比太祖止之已擲為盧矣徐乃拜而受之江㽔别𫝊曰㽔年一十始學摴蒱祖母為說往事有以愽奕破業廢身者於是即棄五木終身不為戲抱朴子曰林盧山中有一亭其中有鬼每宿者常有十許人衣袍或白或黒或男或女有郅伯夷過宿而坐誦經夜有十餘人與伯夷對坐自持摴蒱伯夷宻以鏡照之乃羣犬也郭子曰桓公年少至貧甞摴蒱失數百斛米齒既惡意亦沮自審不復振乃請求於袁彦道桓具以情告袁欣然無忤便即俱去出門云我不但相卿要為卿破之我心要作快齒卿但快唤既戲袁形勢呼喝概壯擲必盧雉二人齊呌敵家震懼喪氣俄頃獲數百萬􅀶物志曰老子入胡自作摴蒱焉俗說曰殷伯弟為何無忌恭軍在潯陽與何共摴蒱得百萬便住何大怒罵殷世說曰温嶠位未髙時屢與揚州淮中賈客摴蒱每輒不競甞一過大輸物盡戲屈無因得反與太尉庾亮友善嶠於舫中大唤庾亮卿可贖我庾即送值温得還異苑曰潁川宋寂元嘉中晝忽有一足鬼長三尺遂為寂驅使欲與隣人樗蒱而無五木鬼乃取刀斫庭中楊枝於户間作之即燒灼黒白雖分明但樸爾又曰昔有人乗馬山行岫裏有二老翁相對摴蒱遂下馬以䇿拄地而觀之自謂俄頃望視其馬鞭漼然已爛顧瞻其馬鞍骸枯朽歸還無復親識一慟而絶庾翼集曰頃聞諸君有摴蒱過差者初為是政事閒暇以娱以甘故未有言也今知大相聚集漸以成俗聞之能不憮然繁欽威儀箴曰其有退朝偃息閒居營操弄碁文局摴蒱言不及義勝負是圖塞說文曰塞行碁相塞謂之塞齊書曰沈文季字仲達吴興武康人也尤善塞用五子穆天子𫝊曰天子北入邴與井公塞魏王郎塞勢曰余所與逰處唯東莱徐先生素習九章能為計數問何以代􅀶奕者乎曰塞其次也乃試習其術以驚睡焉邉韶塞賦序曰余離羣索居無講誦之事欲學無友欲農無耒欲奕無局欲􅀶無楮問可以代􅀶奕者乎曰塞其次也書曰始作塞者其明者乎故其用物也約其為樂也大藏鈎辛氏三秦記曰昭帝母鈎弋夫人手拳而有國色先帝寵之世人藏鈎法此也西京雜記曰戚夫人以百錬金為彄環照見指骨上惡之以賜侍兒荆楚嵗時記曰藏彄之戲辛氏以為鈎弋夫人所起周處成公綏並作彄字藝經庾闡則作鈎字其事同也俗云此戲令人生離有禁忌之家廢不修也風土記曰臘日飲祭之後叟嫗兒童為藏鉤之戲分二曹以校勝負若人偶即敵對人竒即使竒人為逰附或屬上曹或屬下曹名為飛烏以齊二曹人數一鉤藏在數手中曹人當射知所在一藏為一籌三籌為一都異苑曰晉海西公時有貴人㑹因藏鉤歘有一手間在衆臂之中修骨巨指毛粗色黒舉坐咸驚尋為桓大司馬所誅舊𫝊藏彄令人生離斯騐深矣晉庾闡藏彄賦曰歎近夜之藏彄復一時之戲望以道生為元師以子仁為佐相盛翁子藏彄賦序曰余以臘後要命中外以行彄為戲心悅其事故賦之云蹴鞠風俗通曰丸毛謂之鞠郭璞二蒼解詁曰鞠毛丸耳蹋戲史記蘇秦𫝊曰臨淄民無不吹竽鼓瑟擊筑鬭雞走狗六􅀶蹴鞠漢書曰東方朔云董君貴寵天下莫不聞郡國走馬蹴鞠之客輻輳於董氏焉魏略曰孔桂字叔林性便妍好蹴鞠故太祖愛之每在左右唐書曰姜交𤣥宗即位召拜殿中少監數召之卧内侍宴私以后妃連榻間以擊毬常呼之為姜七梁冀别𫝊曰好鞠西京雜記曰成帝好蹴鞠羣臣以蹴鞠勞體非至尊所宜帝曰朕好之可擇似不勞者奏之劉向作弹碁以獻帝大悅賜青羔裘紫絲履以服朝覲焉又曰太上皇帝徙長安居深宫悽悵不樂高祖竊因左右問以生平所好皆屠販少年鬭雞蹴鞠以為忻今皆無此故不樂也劉向别録曰蹴鞠者𫝊言黄帝所作或曰起戰國時記黄帝蹴鞠兵勢也所以練武士知有方也令軍士無事得使蹴鞠有書二十五篇㑹稽典録曰漢末三國鼎峙年興金革上以弓馬為務家以蹴鞠為學於是名儒洪筆絶而不續太平御覽卷七百五十四
