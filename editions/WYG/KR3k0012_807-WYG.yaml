body:
  text: 太平御覽卷八百七宋李昉等撰珎寳部六璋琮璜瓉瑁珊瑚瑇瑁貝璋説文曰璋半圭也尚書顧命曰康王即位太保秉璋以酢報祭曰酢也毛詩棫樸曰濟濟辟王左右奉璋又斯干曰乃生男子載㺯之璋又板曰天之牖民如壎如篪如璋如圭如取如攜周禮春官上大宗伯曰以赤璋禮南方又典瑞曰牙璋以起軍旅以治兵革牙璋君令之銅虎符又秋官下小行人曰合三頫有璋也公羊傳定公八年曰陽虎竊寳玉而走晉寳者何制璋也爾雅曰大璋八寸謂之琡璋半圭也山海經曰招揺之神祠用一璋吕氏春秋曰成功用璋琮説文曰琮瑞玊也八寸以車釭周禮春官上大宗伯曰以黄琮禮地又秋官下小行人職曰合六幣琮以錦又冬官下玉人曰璧琮八寸以頫聘駔琮五寸宗后以為權大宗十有二寸射四寸厚寸是謂内鎮宗后守之駔琮七寸鼻寸有半寸天子以爲權瑑琮八寸諸侯以享夫人白虎通曰圓中方外曰琮琮起􅁟功位西方吕氏春秋曰大喪用琮璜説文曰璜半璧也尚書中侯曰文王由磻谿之水吕望釣其涯王下拜曰乃今見光景扵斯尚曰望釣得玊璜周禮春官上大宗伯曰以𤣥璜禮北方又秋官下小行人曰合六幣璜以黼左𫝊文公曰周公相王室以君天下於周公為睦分魯公以大路大旂夏后氏之璜又哀下曰宋向魋出奔衛公父文伯攻之求夏后氏之璜與之他玉而奔齊白虎通曰璜以徴召位在北方又曰何謂五玉玉謂圭璧琮璜璋又曰孔子卒受魯君璜玉𦵏之北文子曰夏后之璜不能無纇淮南子曰夏后氏之璜不能無考又曰精神可寳非直夏后之璜楚辭曰璜臺十成誰可極焉傅𤣥歌詩有所思兮在天一方何用贈之玊珮珠璜瓉説文曰瓉三玊一石也天子用全純玊也上公用朧四玊一石侯用瓉伯用將玉石半相將也尚書文侯命曰平王錫晉文侯秬鬯圭瓉作文侯之命毛詩文王旱麓曰瑟彼玉瓉黃流在中毛詩大雅江漢曰釐爾圭瓉秬鬯一卣告于文人周禮春官小宗伯曰凡祭祀賔客以時將瓉祼又冬官下玊人曰祼圭有瓉以祀廟禮記王制曰諸侯賜圭瓉然後為鬯未賜圭瓉則諧鬯扵天子得其器乃敢為其事圭瓉鬯爵也鬯秬酒也又明堂位曰季夏三月以禘禮祀周公扵太廟灌用玊瓉大圭又祭統曰君執圭瓉祼尸大宗執璋瓉亞祼及迎牲左𫝊昭四曰有星孛扵大辰西及漢鄭禆竈言扵子産曰宋衛陳鄭將同日火若我以瓘斚玉瓉鄭必不火子産不與漢書曰王莾加九命秬鬯圭瓉魏志曰天子命魏文踐祚錫命孫權秬鬯圭瓉北史曰于謹受華州刺史賜秬鬯一卣珪瓉副焉白虎通曰圭瓉宗廟之盛禮也瑁尚書顧命曰乃受同瑁王受瑁爲主受同以祭周禮冬官下玉人曰天子執瑁四寸以朝諸侯白虎通曰天子執瑁以朝諸侯瑁之為言冐也上有所覆下有所冐也珊瑚説文曰珊瑚色赤生扵海中或生扵山也孝經援神契曰珊瑚鉤瑞寳也神靈滋液百珎寳用則見廣雅曰珊瑚珠也晉書曰石崇王愷争豪武帝每助愷嘗以珊瑚樹賜之高二尺許枝柯扶踈世所罕比愷以示崇崇便以鐡如意擊之應手而碎愷既惋惜又以爲疾己之寳聲色方厲崇曰不足多恨今還卿乃令左右悉取珊瑚有三四尺者六七株條榦絶俗光彩耀目如愷比者甚衆愷恍然自失矣又四夷傳曰大秦國一名犁鞬在西海之西其地東西南北各數千里有城邑其地周廻百餘里屋宇珊瑚爲棁而琉璃為墻壁水精為柱礎也宋書曰劉勔為鬱林太守勔既至隨宜剪定大致名馬并獻珊瑚宋記曰大明六年鬱林郡獻珊瑚連理樹南史曰秩南國梁天監二年跋摩復遣使送珊瑚佛像并獻方物又曰波斯國有醎池生珊瑚樹長一二尺亦有琥珀馬腦真珠玫㻁等國内不以為珎西京雜記曰積草池中有珊瑚樹髙一丈二尺一本生三柯上四百二十六條是南越國王趙佗所獻號爲絳火樹至夜光景昭然漢武故事曰武帝起神堂前庭植玊樹葺珊瑚為枝述異記曰鬰林郡有珊瑚市海客市珊瑚處也珊瑚碧色生海底一樹數十枝枝間無葉大者髙五六尺尤小者尺餘鮫人云海上有珊瑚宫漢元封二年鬱林郡獻瑞珊瑚婦人帝命植扵殿前謂之女珊瑚忽一旦柯葉甚茂至靈帝時樹死咸以爲漢室將亡徴也山海經曰珊瑚生海中欲取之先作鐡網沉水底珊瑚貫網而生歳髙二三尺有枝無葉形如小樹因絞網出之珊瑚皆摧折在網中孫氏瑞應圖曰珊瑚鈎者王者恭信則見一本云不珎玩弄則出廣志曰珊瑚有長者為御車柱出西海底𤣥中記曰珊瑚出大秦西海中生水中石上初生白一年黃三年赤四年蟲食敗司馬相如上林賦曰玟㻁碧林珊瑚藂生班固兩都賦曰珊瑚之樹上栖碧雞傅𤣥紫華賦曰炳參差以照耀兮何光麗之難形葩艶挺扵碧枝兮煥若珊瑚之翠英播安仁石榴賦曰似長離之栖鄧林若珊瑚之映緑水瑇瑁周書王㑹曰伊尹謂湯曰請以瑇瑁爲獻孝經援神契曰神明滋液則瑇瑁背背文也春秋考異􅀈曰承石取鐡瑇瑁􅀈􅀈自目致也􅀈芥也􅀈音若史記曰趙使使于春申君欲誇楚為瑇瑁簮歛器悉飾以瑇瑁又曰江南出丹沙犀象瑇瑁珠璣漢書西域傳賛曰故能覩犀布瑇瑁則建珠崖七郡感荺醬竹枝則開䍧牱越雋續漢書輿服志曰貴人助蠶瑇瑁釵范􅁮後漢書曰賈綜傳云交阯土多珎産明璣翠羽象犀瑇瑁異香美木之屬莫不自出前後刺史率多無清行有司舉琮為交阯刺史又曰和熹鄧皇后臨朝上方珠玉犀象瑇瑁雕鏤之物皆絶又曰天竺國出象犀玳瑁也呉録曰嶺南盧賔縣漲海中玳瑁似龜而大呉録曰魏使以馬求易珠璣翡翠玳瑁孫權曰此皆孤所不用而得馬若何而不聽晉命曰士卒百工不得服犀玳瑁齊書曰少帝夜醉乘馬從西歩廊向北馳走如此兩三將倒臨汝侯坦之諫不從執馬控帝運拳坦之着倒地坦之與曹道剛扶抱還夀春殿瑇瑁牀上卧齊書曰廬陵王子卿為荆州刺史在鎮營造服飾多違制度作瑇瑁乘具詔責之令速還都唐書曰憲宗朝訶陵國獻僧耆女二人瑇瑁榼生犀等西京雜記曰韓嫣以玳瑁爲牀南方異物志曰玳瑁如龜生南海大者如蘧篨背上有鱗大如扇發取鱗因見其文欲以作器則煑之刀截任意所爲冷乃以梟魚皮錯治之後以枯木條葉營之乃有光輝廣志曰玳瑁形似龜出南海巨延州司馬相如子虛賦曰網玳瑁釣紫貝張衡東京賦曰翡翠不裂玳瑁不簇孫徳施南榴枕賦曰委之玳瑁席停之象牙床劉禎清慮賦曰後布玳瑁之席前設觜蠵之筵左思呉都賦曰蠵璧玳瑁金質黒章繁欽寄情詩曰何以表别離取後玳瑁釵班固與竇憲書曰明將軍賜固駮玳瑁簮髙文惠與婦書曰今致玳瑁梳一枚貝説文曰貝海介蟲也古者貨貝而寳龜至周而有泉到秦廢貝行泉尚書禹貢曰淮海惟揚州厥篚織貝又顧命曰大貝鼖鼔在西房毛詩曰萋兮斐兮成是貝錦又義䟽曰貝鼊之屬又有紫貝其白質如玊而紫㸃為文皆行列相當大者有徑一尺六寸今九真交阯以爲杯盤寳物也爾雅曰貝居陸􅀈在水者蜬大者􅀈小者􅜽音即今之紀貝亦有紫色者出日南元貝貽貝黒色貝也餘蚳黃白文音治黄質白文也餘泉白黃文以白爲質黄為文㸃今之紫貝以紫為質黒為文㸃也蚆博而􅀈􅀈者中央廣兩頭鋭􅀈大而險險者謂汙薄􅜽小而揗即上小貝揗謂狹而長此皆説貝之形容也春秋運斗樞曰瑶光得江吐大貝尚書大傳曰文王囚扵羑里散宜生之江淮之浦而得大貝如車渠以獻紂歸藏曰有人將來遺我貨貝以正則貝以求則得有喜則至漢書曰文帝賜南越王尉佗書及衣佗因使者獻貝五百又曰王莾時大貝四寸八分已上二枚為一朋直三百一十六牡貝三寸六分已上一朋直百五十公貝一寸四分已上一朋直三十小貝寸二分已上一朋直十不盈寸三分不得爲朋率枚直錢三是貨南史曰南海有婆利國在廣州東南二月日行出文螺紫貝有石名蚶貝羅初採之柔軟及刻削為物暴乾之遂大硬山海經曰隂山濁谷之水注于蕃之澤中多文貝又曰隂山漁水中多文貝邽山䝉水多黃貝赤色之東蒼梧之野有文貝太公六韜曰商王拘周西伯昌于羑里太公謂散宜生求物以免君罪九江得大貝石焉鹽鐡論曰數與俗改幣與世易夏后以𤣥貝周人以紫石也本草經曰貝字一名貝齒生東海楚辭九歌曰魚鱗兮龍堂紫貝闕兮朱宫河伯以魚鱗盖畫龍文紫貝作闕者丹其宫之義也廣州志曰貝凡有八紫貝最為美者出交州大貝出巨延州與行賈貿易萬震南州異物志曰乃有大貝竒姿難儔素質紫飾文若羅朱不磨不瑩彩輝光浮思雕莫加欲琢靡踰在昔姬伯用免其拘羸徐哀南方記曰班貝羸大者圍之得六寸小者圍之得五寸在扵海邊捕魚人時有得之者大貝出諸薄貝延州土地採賣之以易絳青劉欣期交州記曰大貝出日南如酒杯小貝貝齒也善治毒俱有紫色南州異物志曰交趾北南海中有大文貝質白而文紫天姿自然不假雕琢瑩而光色煥爛相貝經曰相經朱仲受之扵琴髙琴髙乘魚浮扵海河水産必究仲學仙扵琴髙而得其法獻珠扵漢武云不知所以嚴助為㑹稽太守仲又遺助以徑尺之貝并致此文扵助曰黃帝唐堯夏禹三代之真瑞靈竒之秘寳其有次此者貝盈尺狀如赤電黒雲謂之紫貝素質紅黒謂之珠貝有青地緑文謂之綬貝黒文黄畫為之霞貝紫愈疾珠明目綬消氣鄣霞伏蛆蟲不能延齡增夀其害一也復有下此者鷹啄蟬脊以逐温去水無竒功貝大者如輪文王請大秦貝徑半尋穆王得其殻懸於昭觀秦穆公以遺燕黽可以明目遂宜玊宜金南貝如珠璣或曰駮其性寒其味甘已水毒浮貝使人寡無以近婦人黒白各半是也濯使人善驚無以親童子黃脣㸃齒有赤鮫是也雖貝使病瘧黒鼻無皮是也㬭目使人胎消勿以示孕婦赤帶通脊是也慧貝使人善忘忽已近熾内榖赤絡是也䁝貝使童子愚女滛有青唇赤鼻是也碧貝使人盗脊上有縷句唇是也雨則重霽則輕委貝使志强夜行伏迷鬼狼豹百獸赤中員是也雨則重霽則輕太平御覽卷八百七
