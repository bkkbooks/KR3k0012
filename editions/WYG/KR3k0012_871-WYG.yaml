front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_871-1a, image: WYG0900/WYG0900-0594a.png}
body:
  text: 太平御覽卷八百七十一宋李昉等撰火部四庭燎烟炭灰庭燎説文曰庭燎火炬也禮曰庭燎之百由齊桓公始也詩曰庭燎羙宣王因以箴之曰夜如何其夜未央庭燎之光君子至止鸞聲鏘鏘周禮曰閽人掌守王宫之中門之禁大祭祀䘮紀之事設門燎蹕宫門廟門凡賓客亦如之又曰凡邦之大事共墳燭庭燎中春以木鐸修火禁於國中晉中興書曰哀帝興寕元年詔庭燎樹端門内晉起居注曰成帝咸和八年十二月有司奏庭燎在公車門外今更集議舊在端門内依舊門内施詔曰尚書奏九年庭燎當在端門内明帝時在公車門内可依舊安趙書曰石勒造庭燎於橦末髙十丈上盤置燎下盤安人以燎絙繳上下石虎鄴中記曰石虎正㑹庭中端門外及閶闔殿前設庭燎各二合六處各六丈説苑曰齊桓公設庭燎爲士之欲造見者期年而士不至東野鄙人有以九九之術見者桓公曰九九何足以見乎臣非以九九爲足以見也臣聞主君設燎以待士期年而士不至夫士所以不至者以君天下賢君也四方之士皆自論不及君故不至也夫九九薄能耳而君猶禮之况勝於九九者乎桓公曰善禮之期月而士至烟説文曰烟火氣也焆焆然也漢書曰元帝時有童謡曰井水溢滅竈烟灌玊堂流金門謝承後漢書曰吴郡徐相為長沙大守常食乾飯不發烟㸑沈約宋書曰桓𤣥使桓謙屯東陵口卞範之屯覆舟山西髙祖躬先士卒以奔之東北風急因命縱火烟爓張天許邁别傳曰邁少名暎髙平閻慶等皆就暎受業暎曰閻君可服氣以斷榖彭君宜餌藥以益氣慶等將去暎爲燒香有五色烟出暎亦自去莫知所在列女傳曰寗封子黄帝時人也爲帝陶正有神人遇之爲其掌火能出五色烟三秦記曰秦始皇葬驪山牧羊豎火失燒之三月烟不絶廣古今五行記曰前京御史宋詡房壁中烟出掘而視之别柱燋然詡謂弟澄曰柱之爲字主在木右宋字含木木燋宋破而主存此灾之大者也宜思防之其後張邕誅宋混諸黨王子年拾遺記曰員嶠之山四百里有池周千里色隨四時變中有神龜八足六眼背負七星日月八方之圖腹有五岳四瀆象時岀雲石之上望之煌煌如列星矣於㝠昧當雨之時而光色彌明此石常浮於水邊方數百里其色多紅燒之有烟數百里升天則成香雲遍潤則成香雨又曰晉文公焚林以求介推有白鵶繞而噪或集介子之側火不能焚晉人嘉之爲立臺號曰思烟臺列子曰秦之西有義渠之國者其親戚死聚柴積而焚之烟上謂之登遐然後成爲孝子抱朴子曰伯喈識絶音於烟燼之餘也淮南子曰冬至甲子受制木用事火烟青七十二日丙子受制火用事火烟赤七十二日戊子受制土用事火烟黄七十二日庚子受制金用事火烟白七十二日壬子受制水用事火烟黑西域諸國志曰屈茨國有山夜則有光火晝則烜烟焉風俗通曰俗所謂藴者糞除不潔草芥叢集衆火就燒之謂之藴者其烟氣緼緼取其希有淆亂鍾㑹芻蕘論曰焚林成烟其狀如雲顔延之廷誥曰火含烟而妨火桂懐蠧而殘桂然烟勝則火滅蠧壯則桂折焦贑易林大畜之艮曰千里望烟渙散四方形體㓕亡終不見君炭説文曰炭燒木也記曰季秋草木黄落乃伐薪爲炭左傳曰邾子在門臺門上有臺臨庭閽以瓶水洒庭邾子望見怒閽曰夷射姑旋焉旋小便也命執之見其不潔執射姑也弗得滋怒自投於床廢於鑪火爛遂卒又曰宋文公卒始厚葬用蜃炭燒蛤爲炭以􅄟葬又曰宋元公惡寺人桞欲殺之及喪桞熾炭於位以温地將至則去之使公坐其處比葬又有寵言元公好惡無常周禮曰宫人共王之沐浴沐浴所以自潔凡寢中之事掃除執燭供爐炭又曰掌炭掌灰物炭物之徵令以時入之以權量受之以共邦之用凡炭灰之事又曰赤茇氏掌除墻屋貍蟲以蜃炭攻之灰洒毒之除墻屋者除貍蟲藏逃其中者蜃大蛤也擣其炭以攻之則走洒灰以毒之則死史記曰竇皇后弟少君為人所畧賣為主人入山作炭寒卧岸下岸崩百餘人皆壓死少君獨不死淮南子曰先冬夏至懸鐵炭於衡各一端今適停冬陽氣至炭仰而鐵低夏隂氣至炭低而鐵仰以候二至焉晉書曰王沈為豫州刺史下教求直言之士主簿禇䂮入告曰堯舜周公所以能致忠諫者以其誠欵之心著也氷炭不言而冷熱之質自明者以其有實也若好忠直如氷炭之自然則諤諤之臣將濟濟而盈廷逆耳之言不求而自至矣又曰孫登住宜陽山有作炭人見之知非常人與語登不應後魏書曰髙聰卒有妓十餘人有子無子皆令燒指吞炭出家為尼邵氏家傳曰邵貞字徳方山隂人性詳審赴張氏葬或落生炭於君履中坐人謂君不見疾呼君困不爲廻顧神仙傳曰嚴清㑹稽人也於山中作炭忽有人與清一卷素書曰汝骨應得道長生故授神書也齊地記曰東南盧水水側有勝火木方人俗音曰挺木經野火燒之不死炭亦不滅東方有不灰之木豫章記曰豐城縣葛鄉有石炭二百頃可燃以炊㸑交州記曰竈頭山越人炊㸑之處掘而得炭淮南子曰譬猶氷炭鈎繩也何時而可合又曰懸羽與炭而知燥濕之氣燥欲炭輕濕欲炭重又曰夫濕之至也莫見其形而炭已重矣風之至也莫見其象而木已動矣又曰天下莫相憎於膠漆而莫相愛於氷炭膠漆相賊氷炭相息也抱朴子曰柳乃速朽者也而燔之為炭則億載而不敗戰國䇿曰豫讓欲報襄子滅鬚去眉變其形容作乞人而往乞其妻曰狀貎不似吾夫其音何類吾夫之甚讓乃吞炭而變其聲異苑曰信安鄭徽年少時登前橋仿佯見一老翁以小嚢與徽云此是君命慎勿零落若有破損便爲㓙兆言訖失所在徽密開看見一挺炭乃宻秘之雖家人不之知也永初三年年六十病篤語子弟云吾齒盡矣可試啟此嚢見炭碎折於是遂亡桓譚新論曰舉火夜作燃炭乾墻王况釋時論曰融融者皆趍熱之士得鑪冶之門者唯挾炭之子鹽鐵論曰氷炭不可以同噐語林曰洛下少林木炭止如粟狀羊琇驕豪乃𢷬小炭爲屑以物和之作獸形後何君之徒共集乃以温酒火熱既猛獸皆開口向人赫然諸豪相矜皆服而效之賈誼鵬鳥賦曰天地爲鑪兮造化爲工隂陽爲炭兮萬物爲銅灰周禮曰蟈氏掌去鼃黽焚壯鞠以灰洒之則死以其烟被之則凡水蟲無聲又曰㡛帛以攔爲灰渥淳其帛實諸澤噐滛之以蜃清其灰而盝之而揮之清澄也盝晞也史記曰秦商鞅作苛法有棄灰於道者刑之漢書曰韓安國坐法抵罪獄吏田甲辱之安國曰死灰獨不復燃乎甲曰燃即溺之又曰武帝穿昆明池得黒灰有外國人云此是天地刼灰之餘也問東方朔信然後漢書曰楊璇爲零陵太守時蒼梧羣賊攻刼琰制車數十乗置灰車中從風散灰賊不得視因以敗之魏略曰文欽爲廬江太守爲都督王陵所奏欽訴曹爽爽謂曰陵責卿載灰兩船何為乎曰聞足下起染舍故作此灰耳吳録曰張舉子清爲句章令有婦殺夫者因焚屋言燒死其弟疑而訟之舉按屍開口視之無灰令人取猪二頭一殺一生而俱焚之聞視其口所殺者無灰生者有灰乃明夫先即婦殺後燒之婦遂首服焉隋書曰齊神武覇府田曹叅軍信都芳深有巧思能以管候氣仰觀雲色嘗與人對語仰指天曰孟春之氣至矣人徃驗管而飛灰已應毎月所候言皆無爽又爲輪扇二十四埋地中以測二十四氣毎一氣感則一扇自動他扇並住與管灰相應若符契焉又曰開皇九年平陳後髙祖遣毛爽及蔡子元于普明等以候節氣依古於三重宻室之内以木爲案十有二具每取律吕之管随十二辰位置於案上而以土埋之上平於地中實葭莩之灰以輕緹素覆律吕毎其月氣至與律㝠符則火飛衝素散岀於外而氣應有早晩灰飛有多少或初入月其氣即應或至中下旬間氣始應者或灰飛岀三五夜而盡或終一月纔飛少許者髙祖異之以問牛𢎞𢎞對曰灰飛半出爲和氣吹灰全出爲猛氣吹灰不能出爲衰氣和氣應者其政平猛氣應者其臣縱衰氣應者其君暴髙祖駮之曰臣縱君暴其政不平非月别而有異也今十二月律於一嵗内應並不同安得暴君縱臣若斯之甚也𢎞不能對莊子曰鄭有巫曰季咸知人之死生存亡禍福夀夭期以嵗月旬日若神鄭入見之皆棄而走不喜自聞死日列子見之而心醉以告壺子曰嘗試與來以吾示之明日列子與之見壺子岀而謂列子曰嘻子之先生死矣不活矣不可以旬數矣吾見恠焉見濕灰焉濕灰均於寂魄此乃至人無感之時也又曰南郭子綦隠几而坐仰天而嘘㗳焉似喪其偶㗳焉解體若失其配匹也顏子成游立侍乎前曰何居乎形固可使如稿木而心固可使如死灰乎淮南子曰月暈以蘆灰環之缺一靣則暈亦缺一靣焉又曰爛灰生蠅又曰仲夏之月無燒灰草木盡成無暴布不可以小功干盛陽也又曰夫吹灰而欲無昩渉水而欲無濡不可得也又曰女媧殺黒龍以濟冀州黒龍爲冀州害積蘆灰以止滛水黒蘆也一曰葦灰也又曰伐薪爲炭燔草而爲灰抱朴子曰吳世姚光者有火術吳主試之積荻數千束裹之因猛火而燔荻了盡謂光當已化爲烟燼而光端坐灰中振衣而起把一卷書吳主取而視之不能解也又曰外國作米精鹽實是合五百種灰以作之今交廣多有其法太平御覽巻八百七十一
