  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_776-1a, image: WYG0899/WYG0899-0769a.png}
body:
  text: 太平御覽卷七百七十六宋李昉等撰車部五轍軸轂輻輞軛輾輨枕軾箱轙轊環釭轄錬輠當盖轑杠覆笭枸心較幰䋺茵轍左傳曰齊師敗績公将馳之曹劌居衛切曰未可下視其轍登軾而望之曰可矣遂逐齊師既克公問其故對曰夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之又曰昔穆王欲肆其心周行天下將皆必有車轍馬跡焉漢書曰户牖富人張負有女夫輙死人莫敢娶陳平欲得之負至平家乃負郭窮巷以席為門多長者車轍負歸謂子仲曰固有美如陳平而長貧賤者乎卒與之女老子曰善行無轍迹莊子曰汝不知夫螳蜋乎怒臂以當車轍不知其不勝任也又曰莊周貸粟於監河侯侯曰將得邑金貸子三百周曰有中道而呼者周視車轍中有鮒魚焉周問之曰子何為者對曰我東海之波臣也君豈有升斗之水而活我哉餘具魚事中劉伯倫酒徳頌曰有大人先生以天地為一朝萬期為須㬰日月為戸牖八荒為庭衢行無轍迹居無室廬幕天席地縱意所如謝靈運送孔令詩曰河流有急瀾浮驂無緩轍豈伊川途念宿心愧将别顔延年贈王太常詩曰林閭詩宴開亟廽長者轍陸韓卿荅兄希聲詩曰駿足思長坂柴車畏危轍傅武仲舞賦曰或踰埃赴轍霆駭電滅軸説文曰軸持輪也周禮曰軸有三理一者以為媺音美也二者以為久也三者以為利也釋名曰軸複也重複非一之言也又曰伏免在軸上似之也左傳曰齊侯執陽虎將東之陽虎願東陽虎欲西奔晉知齊必反已故詐以東為願也乃囚諸西鄙盡借邑人之車鍥若結切其軸麻約而歸之載葱音忩靈寢於其中葱靈輜車名而逃追而得之囚於齊又以葱靈逃奔宋遂奔晉適趙氏史記曰淳于髠曰狶膏棘軸所以為滑也然不能運方穿漢記曰臨江閔王榮立為太子廢為臨江王坐侵廟壖地為宮上徵榮榮行祖於江陵北門既上車軸折車廢江陵父老流涕竊言曰吾王不反矣漢書曰李陵擊匈奴矢盡斬車軸而持之轂詩曰文茵暢轂駕我騏􅑓周禮曰轂也者以為利轉也凡斬轂之道必矩其隂陽陽也者稹音奠理而堅隂也者疏理而柔是故以火養其隂而齊諸其陽則轂雖敝不藃音耗轂小而長則祚鋤革切大而短則摯音致又曰行澤者欲短轂行山者長轂短轂則利長轂則安左傳曰楚子與若敖戰臯滸射汰輈以貫笠轂榖梁傳曰長轂五百乗綿地千里長轂兵車四馬曰乗春秋考異郵曰黄池之㑹滕薛扶轂魯衛恭乗後漢書曰崔駰字享伯涿郡安平人祖母帥氏能通經學百家之言王莽寵以殊禮賜號義成夫人金印紫綬文軒丹轂顯於新代老子曰三十輻共一轂當其無有車之用桓譚新論曰楚之郢都車掛轂民摩肩市路相交號為朝衣新而暮衣弊左太沖蜀都賦曰累轂疊迹叛衍相傾張平子東京賦曰乗軒並轂又曰疏轂飛軨又公讌詩曰神飈接丹轂輕輦隨風移沈休文餞吕僧珍詩曰持轂二崤道揚斾九河隂輻易曰輿説輻夫妻反目周禮曰輪人為輪斬三材必以其時三材轂輻牙輻也者以為直指也望其輻欲其揱音消爾而纎也進而眂之欲其肉稱也參分其轂長二在外一在内以置其輻凡輻量其鑿深以為輻廣輻廣而鑿淺則是以大扤雖有良工莫之能固鑿深而輻小則是故固有餘而强不足也故竑其輻廣以為之弱則雖有重任轂不折參分其輻之長而殺其一則雖有深泥亦弗之溓也輞釋名曰輞羅也周輪之外也周禮曰輪人為輪斬三材必以其時牙也者以為固抱也凡揉牙外不亷而内不挫旁不腫謂之用火之善是故規之以眂其圜也萭之以眂其匡也又曰六分其輪崇以其一為之牙圍三分其牙圍而漆其二軛續漢書曰文虎伏軾龍道衡軛齊書曰呉興有項羽神䕶郡㕔事太守不得止太守到郡必須祀以軛下牛李安民奉佛法為太守到郡不與神牛着屐上㕔事又於㕔上人闗齋俄而牛死𦵏廟側今呼為李公牛冢韓詩外傳曰武王伐紂到邢丘軛折為三天雨三日不休武王召太公而問之曰未可伐乎太公曰不然軛折為三軍當分為三也天雨三日欲洗吾兵也韓子曰鄭縣人得車軛不知其名問人曰此車軛也俄得一人復問對曰此車軛也問者大怒曰曩者車軛今又車軛是何衆也輾釋名曰輾似人履輨説文曰輨軨轂上􅀈也枕釋名曰枕横在前若卧床之有枕方言曰軫謂之枕周禮曰車軫四尺謂之一等戈柲音必六尺有六寸既建而迤崇於軫四尺謂之二等六分其廣以一為之軫圍參分軫圍去一以為式圍五分其軫間以其一為之軸圍軫之方以象地也軾周禮曰參分軫圍去一以為軾圍參分式圍去一以為較圍釋名曰軾式也式所敬也左傳曰齊與魯戰于長勺齊師敗績公将馳之曹劌曰未可下視其轍登軾而望之曰可矣又曰子玉使闘勃請戰曰請與君之士戲君憑軾而觀得臣與寓目焉又曰叔山冉博人以投中車折軾晉師乃止又曰長狄僑如之首眉隠于軾漢書曰酈生憑軛軾下齊七十二城宋玉九辨云倚結軫兮歎息涕潺湲兮霑軾箱方言曰箱謂之緋詩曰睆彼牽牛不以服箱通俗文曰車箱曰較風俗通曰車一曰兩相與為體也原其所以參車獨言兩箱轅及輪兩而耦故稱兩耳轙爾雅曰載轡謂之轙郭璞曰車軛上環轡所貫轊説文曰轊車軸端也杜林説轂轄也方言曰車轊齊謂之􅀈鮑明逺蕪城賦曰當昔全盛之時車挂轊人駕肩廛閈撲地鼓吹沸天環釋名曰游環在服馬背上驂馬之外轡貫之游移前却無常處爾雅曰游環謂之捐徐捐切郭璞曰着車衆環詩曰游環脅驅釭説文曰釭轂之鑯也方言曰車釭燕齊海岱之間謂之鐹音戈或謂之錕自闗而西謂之釭錕音衮續捜神記曰鄭茂病亡殯殮訖未得𦵏忽然婦及家人夢茂云巳未應死偶悶絶耳可開棺出我燒車釭以熨頂頭如言乃活轄釋名曰轄害也車之禁害也詩曰出宿于干飲餞于言載脂載牽還車言邁左傳曰諸侯賔至甸設庭燎僕人廵宮車馬有所賔從有待巾車脂轄𨽻人牧圉各贍其事漢書曰陳遵嗜酒每大飲賔客滿堂輙閉門取客車轄投井中雖有急終不能去蔡邕獨斷曰乗輿之車皆輻轄輻轄者施轄於外乃服設轄銘曰載馳非轄不行臨政設教非賢不明張平子東京賦曰重輪貳轄疏轂展軨潘正叔贈陸機詩云星陳夙駕載脂載轄鍊釋名曰鍊簡也錬釭軸之間使不相忘輠釋名曰輠裹也裹軹頭也禮曰叔孫武叔朝見輪人以杖闗轂而輠輪者以是有爵而后杖也史記曰淳于髠齊人也博聞强學其諫説慕晏嬰之為人然而乗意觀色為務故齊人謂之炙輠輠車之盛膏者炙之不盡猶有餘流言髠之智不盡如炙輠當通俗文曰車當謂箳篁郭林宗别傳曰昔仲琰為從事嘗柴車駕牛編荆為當盖周禮曰輪人為蓋達常圍三寸上欲尊而宇欲卑上近部平者也隤下曰宇上尊而宇卑則吐水疾而霤逺蓋者主為雨設者也盖巳崇則難為門也盖巳卑是蔽目也是故盖崇十尺良盖弗冐弗紘殷畆而馳不隊謂之國工盖之圜也以象天也盖弓二十有八以象星也蔡邕獨斷曰乗輿車皆黄盖者並以黄為裏也方言曰盖在上如屋舎之覆盖董卓别傳曰卓諷朝廷使光禄宣璠持莭拜卓為太師位諸侯上引還長安百官迎路拜揖卓遂僣擬車服乗金華青盖畫兩轓時人號為竿摩車轑音老釋名曰轑似弓曲也説文曰轑盖弓也淮陽名車穹周禮曰弓鑿廣四枚鑿上二枚鑿下四枚鑿深二寸有半下直二枚鑿端一枚弓長六尺謂之庇軹五尺謂之庇輪四尺謂之庇軫參分弓長而操其一參分弓長以其一為之尊杠周禮曰輪人為盖逹常圍三寸桯音楹盖杠也圍倍之六寸信其桯圍以為部廣部廣六寸部長二尺桯長倍之四尺者二覆笭釋名曰笭横在車前者織竹作之空笭笭也廣雅曰覆笭謂之辟枸心廣雅曰從下枸軸也通俗文曰軸限者謂之枸較周禮曰參分式圍去一以為較圍參分較圍去一以為軹圍釋名曰重較其較重卿所乗也幰通俗文曰張布曰幰儀制令曰諸車一品清油纁道幰朱裏朱絲絡􅃠三品以上清通幰朱裏五品以上青徧幰碧裏六品以下皆不得用幰鹵簿令曰安車紫油通幰紫油纁朱裏四望車清油通幰清油纁並朱絲絡網后及皇太子車幰並准此風土記曰周禮以拂拭車一義謂施嚴帷幰潘岳籍田賦曰㣲風生於輕幰纎埃起乎朱輪潘尼書曰朝從長塗暮棲所集歸雲乗幰浮悽風尋帷入䋺釋名曰䋺遒也在後遒迫使不得却縮也王隠晉書曰山濤為尚書有人題曰閣中有大牛王齊鞅裴揩鞦和嶠踖踧不敢休茵釋名曰茵車中所坐也用虎皮有文采詩曰隂靷鋈續文茵暢轂漢書曰邴吉為丞相馭吏嗜酒數逋蕩逋亡也蕩放也謂其所供之職而漸放也常從吉出醉嘔丞相車茵上西曹主吏白欲斥之吉曰以醉飽之失去士使此人復何所容西曹但忍之此不過汚丞相車茵爾遂不去也太平御覽卷七百七十六
