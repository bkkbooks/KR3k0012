  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_174-1a, image: WYG0894/WYG0894-0568c.png}
body:
  text: 太平御覽卷一百七十四宋李昉等撰居處部二室室說文曰室實也釋名曰室實也物滿實其中也毛詩曰斯干宣王考室也築室百堵西南其户又曰如彼築室于道謀是用不潰于成鄭箋云如當路築室而與行道之人謀之所謂路人之意不同故不得成又曰彼姝者子在我室兮又曰宛其死矣他人入室尚書曰若考作室旣厎法厥子乃弗肯堂矧肯構周禮冬官匠人曰内有九室九嬪居之外有九室九卿居之禮記檀弓下曰晉獻文子成室晉大夫發焉文子趙武也作室成晉君獻之謂賀也諸大夫亦發禮以往張老曰美哉輪焉美哉奐焉歌於斯哭於斯聚國族於斯文子曰武也得歌於斯哭於斯是全要領以從先大夫於九原也北面再拜稽首又曰室中不翔又曰儒有一畝之宫環堵之室左傳襄公十五年向戌來聘見孟獻子尤其室曰子有令聞而美其室非所望也對曰我在晉吾兄為之毁之重勞且不敢間又曰鄭伯有嗜酒為窟室而夜飲酒擊鐘焉朝至未巳朝者曰公焉在其人曰吾公在壑谷壑谷窟室又曰吳公子光伏甲於窟室而享王掘地為室又曰怒於室而色於市論語曰子游為武城宰子曰汝得人焉爾乎曰有澹臺滅明者行不由徑非公事未嘗至於偃之室也澹臺滅明者孔子弟子子游之同門也修身正行公事乃肯來我室得與之語耳非公事不肯來言無私謁國語曰智襄子為室美士茁曰美則美矣抑臣亦有懼也襄子曰何懼對曰臣以秉筆事君記曰髙山峻原不生草木松柏之地其土不肥臣懼其不安人也室成三年而智氏亡說苑同又曰趙文子為室斵其椽而礱之礱磨張老夕焉而見之不謁而歸文子駕而往曰吾不善子亦告我何其速也對曰天子之室斵其椽而礱之加密石焉諸侯礱之大夫斵之士首之首之斵其首也備其物義也從其等禮也今子貧而忘義富而忘禮吾懼不免何以敢告文子歸勿令礱也春秋繁露曰廣室多隂逺天地之和也故聖人弗為漢書曰文帝徵賈誼入見上方受釐坐宣室因感鬼神事與誼言之又曰武帝為竇太主置酒宣室使謁者引内董君是時東方朔陛㦸殿下辟㦸而前曰董偃斬罪三安得入乎上曰何謂也朔曰偃以人臣私侍公主其罪一也敗男女之化而亂㛰姻之禮傷王制其罪二也陛下富於春秋積思於六經留神於王事馳騖於唐虞折節於三代偃不遵經勸學反以靡麗為右奢侈為務盡狗馬之樂極耳目之欲行邪枉之道徑淫辟之路是乃國家之大賊人主之大蜮師古曰蜮魅也音或說者以為短狐非也短狐射工用於此不當其義今俗猶言魅蜮者是也偃為淫首其罪三也上黙然不應良久曰吾已設飲後而自改朔曰不可夫宣室者先帝之正處也非法之政不得入焉故淫亂之漸其變為簒是以豎貂為淫而易牙作患慶父死而魯國全管蔡誅而周室安上曰善有詔止更設酒北宫引董君從東司馬門入更名東交門蘇林曰以偃從北門入交㑹於内故名之焉賜朔黄金三十斤董君之寵由是日衰又霍光傳曰葢主等廢奏光光聞止畫室中不敢入帝召入慰勉之注畫室近臣計畫之室師古曰雕畫之室也又曰孔光典機務十餘年守法度修政事上有所問據經法以心所安而對不希㫖茍合如或不從不敢强諌爭以是久而安時有所言則削草藁以為張主之過以奸直人臣大罪也師古曰奸求也奸忠直之名也奸音干也有所薦舉惟恐其人之聞知沐日歸休兄弟妻子燕語終不及朝省政事或問光温室省中樹皆何木也晉灼曰長樂宫中有温文殿光黙不應更答以他語其不泄如是又曰京房所言屢中天子悅之數召見問房對曰古帝王以功舉賢即萬化成瑞應著末世以毁譽取人故功業廢而致災異宜令百官各試其功災異可息詔使房作其事房奏考功課吏法上令公卿朝臣與房㑹議温室皆以房言煩碎上下相司不可許上意鄉之時部刺史奏事京師上召見諸刺史令房曉以課事刺史復以為不可行唯御史大夫鄭𢎞光禄大夫周堪初言不可後善之又漢三年魏王豹叛漢附楚漢使大將韓信擊虜豹薄姬内人傳詣雒陽織室漢王見薄姬内後宫幸之生文帝後漢書曰祭彤為太僕從東巡過魯帝坐孔子講堂顧指子路室謂左右曰此太僕之室太僕吾之禦侮也又曰袁閎見時險亂而家門富盛常對兄弟歎曰吾先公福祚後代不能以德守之而競為驕奢與亂代爭權此即晉之三郤矣延嘉末黨事將作遂散髪絶世欲投跡深林以母老不宜逺遁乃築土室四周於庭不為户自牖納飲食東向拜母母思閎時往就視母去便自掩閉兄弟妻子莫得見也及母歿不為制服設位時莫能名或以狂生目之潛身十八年黄巾賊起攻沒郡縣百姓驚散閎誦經不移賊相約語不入其閭鄉人就閎避難皆得全免年五十七卒於土室又曰馬援之攻五溪蠻初軍至下雋有兩道可入從壺頭側路近而水嶮壺頭山名也在今辰州沅陵縣東武陵記此山頭與泉海方壺山相似因名壺頭從充則塗夷而運逺充縣屬武陵郡帝初以為疑及軍至耿舒欲從充道援以為費粮不如進壺頭搤其喉咽搤持充賊自破以事上之帝從援䇿三日進營壺頭賊乗髙守隘船不得上㑹暑甚士卒多疫死援亦因以中病遂乃穿岸為室以避炎氣武陵記曰壺頭山傍有石窟援所穿室也室中有大蛇如舟土人云是馬援當日之餘靈也賊每乗險鼔譟援曳足以觀之左右哀其壯意莫不為流涕漢書曰陳蕃家居不掃室賔客謁之者或曰可掃一室乎蕃曰丈夫當為國家掃除天下豈徒室中晉書曰嵇含字君道祖喜徐州刺史父蕃太子舍人含好學能屬文家在鞏縣亳丘自號亳丘子門曰歸厚之門室曰慎終室宋書曰武帝六年五月初置隂室于覆舟山備藏氷也唐書曰太子承乾盛農之時營造曲室累月不止左庶子于志寧切諫不從家語曰魯有獨處者隣有嫠婦亦獨處室夜暴風雨室壞趨而託之魯人閉戸不受三輔黄圖曰明堂有十二室法十二月陽龍驤洛陽記曰顯陽殿北有避雷室西有禦龍室神異經曰西北荒有石室有二百二十人同居齊壽千二百嵗十洲記曰崑崙山上有瓊華之室淮南子曰西方有金室列女傳曰彭祖殷大夫也厯夏至商末號七百嵗厯陽有彭祖仙室漢宫殿名曰神明臺武帝造髙五丈上有九室今人謂之九天臺武帝求神仙置九天道士百人洛陽宫室名曰洛陽有望舒凉室含章鞫室清暑凉室老子曰鑿戸牖以為室當无有室之用管子曰堯有衢室之問者下聴於民也晏子曰景公謂晏子曰寡人欲朝夕相見為夫子築室於閨内可乎對曰臣聞之隠而顯近而結惟至賢耳如臣者飾其容止待令猶恐罪戾也今君近之是逺之也又曰景公問晏子曰吾欲服聖王之服居聖王之室如此則諸侯其至乎對曰法其節儉則可法其服室則无益也拾遺録曰老君居反景之室日與世人絶迹又曰燕昭王坐祇明之室升於泉昭之館此館常有白鳯白鸞遶集其間列子曰虛室生白張湛注云夫視有若虚者虚室而純白獨生莊子曰原憲居圜堵之室蓬户不完桑以為樞甕以為牖上漏下濕匡坐而弦歌尸子曰厚積不登髙臺不處髙室多傷大室多隂故皆不居吕氏春秋曰髙亢作室又曰齊宣王為室大蓋百畝堂上三百户三年而未成羣臣莫敢諫淮南子曰髙陽將為室問匠人匠人對曰未可也木尚生加塗其木必將撓生材任重塗今雖成後必將敗髙陽魋曰不然夫木枯則益勁塗乾則益輕以勁材任輕塗今雖惡後必善匠人辭窮無以對受命而為之室其始成竘然善也而後果敗又曰崑崙有璿室又曰有石城金室又曰古者民擇處復穴鑿崖岸之腹冬日則不勝霜雪寒露夏日則不勝暑熱蚊䖟聖人乃作為之築土構木以為室上棟下宇以蔽風雨以避寒暑百姓安之鹽鐵論曰匈奴織栁為室旃席為蓋說苑曰延陵季子遊於晉曰吾入其都新室惡故室美故牆髙新牆卑是以知民力屈也又曰一室之中有王道焉父母之謂也故君正則百姓治父母平則子孫孝慈是以孔子家兒不知倨所以然者生而見善教也新序曰魯哀公為室而大公儀子諫曰室大衆而人處則曄少與人處則卑願公適也曰聞命矣築室不輟明日又諫國小室大百姓必怨吾君諸侯聞之必輕吾國公曰聞命矣築室不輟明日又諫曰左昭右穆為室而大以臨二先君無乃害於孝乎於是哀公毁室而止風俗通曰論語夫子宫牆數仞禮記季武子入宫不敢哭由是言之宫室一也秦以來尊者以為常號乃避云室耳弟子職曰室中揖手論語曰譬如宫牆由此言之宫其外室其内也楚辭曰砥室翠翹挂曲瓊些言卧之室以砥為壁平而滑凙以翠鳥之羽雕飾王鈎以懸衣曲瓊玉鈎也又曰鑿山楹而為室兮下披衣於水渚霧露濛濛其晨降兮雲依斐而承宇又曰網户朱綴刻方連冬有奥突奥複室突大室夏室寒事見居處部上又曰築室兮水中葺之以荷蓋又曰像設君室静閒安髙堂邃宇檻層軒潘岳狹室賦曰伊今館之褊狹良窮弊而極微李尤室銘曰室以安寧寢息幽閒室寒空隟遮遏風寒无曰寂漠屋漏昭然太平御覽卷一百七十四
