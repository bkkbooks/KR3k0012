front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_646-1a, image: WYG0898/WYG0898-0753c.png}
body:
  text: 太平御覽卷六百四十六宋李昉等撰刑部十二斬梟首棄市考竟斬釋名曰斬蹔也蹔加兵即斷也周書曰武王使尚父以大奔馳商師大蒯商辛乃内登于鹿臺之上自燔王崩于火武王先入乃射三發而後下車擊之以輕吕劍名也斬之以黄鉞懸諸大白旗乃適二女之所射之王發擊之以輕吕斬之以𤣥鉞懸諸小自旗左傳成上曰韓獻子將斬人郤獻子馳將救之至則既斬之矣郤子速使以徇告其僕曰吾以分謗也家語曰郟谷之㑹齊侯奏宫中之樂俳優侏儒戲於公前孔子趨進厯階而上不盡一等曰匹夫而侮諸侯者罪應誅請有司速加法焉於是斬侏儒手足異處齊侯懼有慙色史記曰韓信亡楚歸漢未知名為連敖坐法當斬其輩十三人已斬次當至信信乃仰視適見滕公曰上不欲就天下乎何為斬壯士滕公奇其言壯其貌釋而不斬與語大悦之又曰張蒼坐法當斬解衣身長肥白如瓠時王陵見而怪其美士乃言沛公赦勿斬漢書曰王訢濟南人以郡縣吏積功稍遷為被音罷陽令武帝末軍旅數發郡國盜賊羣起繡衣御史暴勝之逐捕盜賊以軍法從事二千石以下勝之過被陽欲斬訢解衣伏質仰天言曰使軍専殺生之柄威震郡國今復斬一訢不足以增威不如時有所寛以明恩貸令盡死力勝之壯其言貰不誅因與相結厚也東觀漢記曰任光字伯卿初為鄉嗇夫漢兵攻宛軍人見光冠服鮮明令解衣将刼而奪之會光禄勲劉賜適至視光容貌長者乃救全之後漢書曰趙王在長安為赤眉所得赤眉欲斬之白馬從事見趙王儀狀鬚眉美好絶衆䕶而活之又曰獻帝疾愈大會未央殿董卓朝服升車而馬驚墜泥還入更衣其少妻止之卓不從遂行乃陳兵夾道自壘及宫左騎右步屯衛周匝令吕布扞前後王允乃與士孫瑞密表其事使瑞自書詔以授布令騎都尉李肅與同心勇士十餘人偽著衛士服於右掖門内以待卓卓将至馬驚不行怪懼欲還吕布勒令進遂入門肅以㦸刺之卓衣甲不入傷臂墜卓顧大呼曰吕布何在布曰有詔討賊臣卓大罵曰庸狗敢如是耶布應聲持矛刺卓趣兵斬之主簿田儀及卓蒼頭前赴其尸布又殺之馳賫赦書以令宫陛内外士卒皆稱萬嵗魏略曰京兆鮑出字文才值世飢餓出覔食後賊入室以繩貫其母手掌驅出走追斬賊得其母還魏志曰于禁字文則昌豨叛太祖遣禁征之禁急進攻豨與禁有舊詣禁降諸将皆以為豨已降當送太祖也禁曰諸君不知公常令先圍而後降者不赦夫奉法行令事上之節也豨雖舊交禁可失節乎自臨與豨訣隕涕而斬之郡中震慄無求不獲又曰夏侯𤣥格量𢎞濟臨斬東市顔色不變舉動自若又曰鄧艾父子既因鍾會至成都先送艾然後作亂會已死本營将士追艾檻車迎還衛瓘遣田續等討艾遇於綿竹而斬之蜀志曰魏延夢頭上生角以問占夢趙直直詐延曰夫麟有角而不用此不戰賊欲自破之象也退而告人曰角之為字刀下用也頭上用刀其凶甚矣後為馬岱所斬又曰劉璋勅闗戍諸将文書勿復白通先主先主大怒召璋白水軍督陽琛責以無禮斬之又曰張松書與先主及法正曰今日大事誰可立功如何釋此去乎松兄廣漢太守肅懼禍退以白璋發其謀於是璋収斬松晉書曰楚王瑋既誅汝南王亮衛瓘尋又詔解嚴云瑋矯詔當正法瑋臨死出其懐中青紙詔以示監刑尚書劉頌流涕言此詔書也奉此而行謂為社稷今更為罪託體先帝受枉如此幸見申列頌亦歔欷不能仰視又曰苟晞字道将河南山陽人為兖州刺史斷决如流人不敢欺以從母子為都䕶犯法晞斬之既而素服哭曰殺汝者兖州刺史哭弟者苟道将以嚴刻斬戮號曰屠伯後為石勒所殺又曰石閔仕偽趙石鑒為侍中録尚書事鑒使石苞夜誅閔不克反為閔攻殺鑒苞等胡人欲殺閔踰城不可勝數閔知胡人不為己用頒令下每人斬一胡文官賞爵一級武官立拜牙門時一日之中斬胡一萬人於是鼻髙多鬚濫死者甚衆胡人死至二十餘萬又曰皇甫謐字方回少遵父操永嘉中博士徵不起避亂荆州閉門居未嘗入城府蠶而后衣耕而後食南土人士咸尊敬之刺史陶侃禮之甚厚王敦弟王廙代侃廙至荆州大失物情百姓叛廙大行誅戮立威以方回為侃所禮責其不來詣已乃收而斬焉荆土華夷莫不流涕三十國春秋曰丙寅丞相斬都運令史淳于伯于建康於是以刀拭柱血逆流至二丈三尺下四尺五寸其直如絃後魏書曰段暉從世祖至長安有人告暉欲南奔世祖問曰何以知之告者曰暉置金於馬韉中不欲逃走何由爾也世祖密遣視之果如告者之言斬之於市齊書曰庾𢎞逺字士操清實有士譽仕齊為江州長史刺史陳顯達舉兵敗斬於朱雀航将刑索帽著之曰子路結纓吾不可以不冠而死又曰陳顯達起兵官軍繼至顯達不能抗退走至西州趙譚注矟刺落馬斬之於籬側血涌湔籬似淳于伯之被刑也崔鴻前趙録曰卜珝隠于龍門山嘗與郭璞論易栩曰吾大厄在四十一亦未見子之令終璞曰誠不能免然在江南不在此也鎮北靳沖攻太原不克歸罪於珝斬之劉聰大怒曰此人朕所不加刑沖何人哉遣御史臣諸衍持節斬沖也周書曰刑部侍郎辛亶嘗衣緋褌俗云利於官上以為厭蠱将斬之蘇綽曰據法不當死臣不敢奉詔上怒甚謂綽曰卿惜辛亶而不自惜也命左僕射髙熲将綽斬之綽曰陛下寧可殺臣不得殺辛亶至朝堂解衣當斬上使人謂綽曰竟何如對曰執法一心不敢惜死上拂衣而入良久乃釋之明日謝綽勞勉之賜物三百段漢新書曰奉車都尉竇固征匈奴騎都尉秦彭副固令彭别屯彭擅斬右司馬固奏彭不由督率賊殺人公卿議皆以為固議是公府掾郭躬以為彭得專斬人上曰軍正校尉一統于督何得專殺躬對曰一統者謂在部曲也今彭别將軍事至急勢不得聞督將有詔躬上殿令尚書與公卿雜難躬曰督將受斧鉞稱令故得擅行法都尉行軍法何以明之躬對曰軍正校尉别將兵假斧鉞即得專軍法難者曰今不假故不得擅殺躬曰漢制假􅯆㦸以當鈇鉞議者皆屈上從之晉朝雜事曰夜遣通事令史張林黄門令史駱休開神虎門迎故太傅趙王至太極殿前召收中書監張華侍中賈謐尚書裴頠解結侍郎杜斌等斬之於東鍾下華等大呼自稱忠臣張林詰之曰公等知太子無罪何不諫諫若不從何不去也遂斬之華陽國志曰王濬自城都帥水陸軍及梁州水師七萬人伐吳臨發斬牙門将李延所愛将也以争騎斬之衆莫不肅商君書曰晉文公将欲明刑以親百姓顛頡後至吏請其罪若曰用軍法吏遂斬顛頡之首以徇晉國之士皆懼曰顛頡之有寵斬以徇而况我乎韓子曰禹合諸侯會稽之上防風後至禹斬之王韶孝子傳曰周青東郡人也母病積年青扶持左右身體羸瘦村里乃斂錢管助湯藥母痊許嫁同郡周小君疾未獲成禮乃來見青屬累父母青許之俄而命終青供養為務十年中翁姑感之勸令更嫁青誓以匪石翁姑並自殺女姑告青害殺收考遂以誣欵七月刑青於市青謂監殺者曰乞樹長竿繫白旛青若殺翁姑血入泉不殺血上天既斬乃縁竿上天梟首傳曰叔孫昭子殺豎牛投其首於寧風之棘上漢書曰三族令先黥劓斬左右趾梟首葅其骨謂之具五刑又曰漢王病愈西入關至櫟陽存問父老梟故塞王欣頭櫟陽市又曰五行志曰江充掘巫蠱太子宫太子乃斬充舉兵與丞相劉屈氂戰太子敗走自殺明年屈氂復坐呪詛腰斬妻子梟首續漢書曰張濟為河南令中常段珪奴乗犢車于道濟即收捕梟首懸尸珪門也後魏書曰宋鴻貴為定州北平府叅軍送戍兵於荆州坐取兵絹四百匹兵欲告之乃斬兵十人又疎凡不達律令見律有梟首之罪乃兵斷之手以水洗然後斬决尋坐伏法時人哀兵之苦嘆鴻貴之愚也廷尉决事曰河内太守上民張太有狂病病發殺母弟應梟首遇赦謂不當除之梟首如故棄市禮曰刑人於市與衆弃之史記曰始皇平六國制天下藏詩書及偶語棄市漢書曰中元二年改磔曰弃市應劭曰先諸死刑皆弃于市故曰弃市自非妖逆不磔也又曰竇嬰矯先帝詔當弃市嬰陽病痱不食欲死或聞上无意殺嬰復食治病晉書曰范堅遷尚書右丞時廷尉奏殿中帳吏邵廣盜官幔三張合布三十匹有司正刑弃市廣二子宗年十三雲年十二操黄旛撾登聞鼔乞恩辭求自沒為奚官奴以贖父命尚書朱映議以為天下之人無子者少事遂行便成永制堅亦同映議又曰咸和二年句容令孔恢罪弃市詔曰恢自陷刑網罪當大辟但以其父年老止有一子為惻然可憫赦之隋書曰文帝意每尚慘急奸回不止京市白日公行掣盜人間强盜亦往往而有帝患之問羣臣斷禁之法楊素等未及言帝曰朕知之矣詔有人能糾告者沒賊家産業以賞糾人時月之間内外寧息其後無賴之徒候富人子弟出路者而故遺物於其前偶拾取則擒以送官而取其賞大抵被陷者甚衆帝知之命盜一錢已上皆弃市行旅皆晏起早宿天下凜凜焉考竟釋名曰獄死曰考竟考竟者考得其情竟其命於獄也後漢書曰陽嘉三年春詔以久旱京師諸獄無輕重皆且勿考竟須得澍雨又曰丹陽方儲明風角為洛陽令功曹掾宋憲家客為憲所風夜殺人斷頭著奩中置廏門下欲令儲去官儲摩死者近問誰所殺有頃曰死人言為功曹所殺收功曹考竟又曰向栩字甫興性卓詭不倫狀如學道又似狂生張角起栩不欲國家興兵但遣将河上北向讀孝經賊自滅張讓讒栩與角同心收送黄門北寺獄考竟之太平御覽卷六百四十六
