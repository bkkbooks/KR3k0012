body:
  text: 太平御覽卷六百三十四宋李昉等撰治道部十五急假釋名曰急及也言操切之使相逮及也漢書曰髙祖常告歸之田李斐注曰告請也言請休謁也寕安也吉曰告㓙曰寜也漢律吏二千石有予告有賜告予告者在官有功最法所當得也賜告者病滿三月當免天子優賜其告使得帶印綬将官属歸家理病至成帝時郡國二千石賜告不得歸家自馮野王始也漢律吏五日得一休沐言休息以洗沐也又曰汲黯多病病且滿三月上常賜告者數終不愈又曰馮野王為琅琊太守成帝時王鳳輔政京兆尹王章譏鳳顓權薦野王代鳳上初納其言而後誅章於是野王懼不自安遂病滿三月賜告與妻子歸杜陵大將軍鳳風音諷御史中丞劾奏野王賜告養病而私自便杜欽素髙野王奏記於鳳為野王言曰竊見令曰吏二千石告過長安謁如淳曰謁者自白得告也不分别予賜予予告也賜賜告也今有司以為予告得歸賜告不得歸是一律兩科失省刑之意夫三最予告令也在官連有三最則得予告也病滿賜告詔恩也令告則得詔恩則不得失輕重之差又二千石病賜告得歸有故事不得去郡亡著令鳳不聽竟免野王官謝承後漢書曰許荆字子張少喪父養母孝順家貧為吏無有舟車休假常單步荷擔上下清節稱於鄉里又曰范丹字史雲陳留人也為郡功曹毎休假上下常單步策杖同類以車牛與之不取又曰吴馮字子髙為州郡吏休假先存恤行喪孝子次贍病畢拜覲鄉里耆老先進然後到家名昭逺近後漢書曰光武皇帝紀告寕之典魏志曰王思正始中為大司農年老目暗又少信時有吏父病篤近在外舎自白求假思疑其不實發教曰世有思婦病母豈此謂乎遂不與假吏父明日死思無恨意其為人刻薄如此又曰祝皓字子春南陽平氏人也志節抗烈篤於仁義為吏歸休周旋鄉里弔死問病畢乃還家晉起居注曰孝武大元元年詔大臣疾病假滿三月解職王隠晉書曰王􅊂音夷字季孫洛中貴盛名士王澄胡母輔之等皆與􅊂交時􅂒為兵曹佐大将軍幕澄等持羊酒詣軍門吏疏名内請入見大将軍澄等既入語吏過王􅂒炙羊酒飲乾而去竟不見将軍聞之因與􅊂長假遂得離兵宋書曰王敬宏子恢之為秘書郎惔之曽請假還家定省敬宏尅日見之至輙不果假日将盡恢之乞求奉辭敬𢎞呼前至閤復不見又曰謝景仁弟述嘗設饌請宋武帝帝還召述述知非景仁夙意又慮非帝之命請急不從帝馳遣呼述頃至乃飡其見重如此又曰謝靈運自以名輩應㕘時政王曇首王華名位素不踰之並見任遇意不平多稱疾不朝直出郭逰行或一百六七十里經旬不歸既不表聞又不請急上不欲傷大臣諷㫖令自解靈運表陳疾賜假東歸又曰庾炳之居選部請急還家尚書令使来諮事一人善弹一人工歌留與宿有司以違制奏焉又曰伏晅音咺自以名輩素在始興内史何逺前為吏俱稱亷白逺累見擢晅循階而已意望不滿多託疾居家尋求假到東陽迎妹喪因留㑹稽築宅自表解職詔以為豫章内史乃出拜侍御史虞㬭奏曰風聞豫章内史伏晅去嵗啟假以迎妹喪為辭因停㑹稽不去入東始貨宅賣車以此而推則是本無還意晅深懐誹怨形於顔色請以大不敬論有詔勿論遂得就郡又曰謝裕字景仁晦從父也為左僕射裕性矜嚴居家守静毎唾輒唾左右衣事畢即聴假一日浣濯毎唾左右争来受之徐爰宋書曰申恬字道猷少懐貞恪志業介然拜殿中将軍禁省八載不休急時莫之比齊書曰衡陽公諶字彦平髙帝絶服族子武帝即位除步兵校尉領御仗主内兵仗委付之心膂宻事皆便㕘掌鬱林即位深委信諶諶毎請急出宿帝通夕不能寐諶還乃安梁書曰太清元年大舉北侵初謀元帥帝欲用蕭範時朱异取急外還聞之遽入曰嗣王雄豪盖世得人死力然所至殘暴非常非吊人之才昔陛下登北顧亭以望謂江右有異氣今日之事尤宜詳矣後魏書曰邢虬字神寳為光禄卿虬母在鄉遇患請假而歸值秋水暴長河梁斷絶虬得一船而渡漏而不溢時人異之唐書曰髙志寛蒲州安邑人隋末喪父哀毁骨立為州里所稱賊帥王君廓屢為冦掠聞其名獨不犯其閭隣里賴之而免者百餘家後為里正詣縣母疾取急求歸縣令問其狀對曰母常有所苦志寛亦有所苦向患心痛知母有疾令怒曰妖妄之辭也繫之於獄馳騐其母竟如所言令異之慰諭遣去㐮陽耆舊傳曰習温長子宇為執法郎取急歸賓從甚盛温怒杖宇責之曰吾聞生於亂世貴而能貧始可以後亡况侈競乎文士傳曰顧榮兼侍中安慰河北以前後功封嘉興伯求急還南既造江渚欣然自得風俗通曰濟北李登為從事史病得假歸家復移刺延斯後被召登自嫌不甚羸瘦謂雙生弟寕曰我兄弟相似人不能别汝類病者代我至府寕曰府君大嚴得無不可登曰我新吏耳無能覺者我自行見訴必死寕便詣府醫藥遂許之後為人所言事發覺遂殺登世說曰車武子為侍中與王東亭諸人期共逰集車早請急出過詣王子敬于時宅在建陽門内道北車求去王問卿何以怱怱車答曰與東亭諸人期共行王曰卿何以乃作此不急行車遂不敢去盡急還臺又曰顧長康作殷州請假還東爾時例不給苦求之乃得又曰張敷為宋臺秘書郎自彭城請假還東于時相國府有一叅軍督䕶亦請假武帝遣傳令語敷云可載之荅曰臣性不雜遂不載俗説曰張邀在彭城請假當歸東傅亮時為宋臺侍中下舫中與張别張不起授兩手指着舫户外傅遂不執其手熟視張面云樝是梨中之不臧者便去陸機思歸賦序曰余牽役京室去家四載以元康六年冬取急歸而羌虜作亂王師外征機興憤而成篇范寗啓國子生假故事曰國學開建彌歴年載講誦之音靡聞考課之績不著良由道逹之訓未𢎞鑽仰之心弗至陵替文源宜見整正謂應斷假精加督勵嚴其師訓舉善黜違啓斷衆官受假故事曰伏見内外衆官陳假紛紜煩黷無已舊有急假一月五急一年之中六十日為限不問虛實相率如此誣罔視聽煩穢官曹舉世行之不以為非急假之制唯以父母妻子為辭而伯叔兄弟制所不及長偷薄之風傷敦睦之化臣謂宜去病解故制一年令賜表假日隨其所欲之適任其取日多少假寕令曰諸内外官五月給田假九月給受衣假為兩番各十五日田假若風土異宜種收不等通隨給之又曰諸百官九品私家廟除程給假五日四時祭祀各給假四日並課主祭者去任所三百里内亦給程若在京師除祭日仍各依朝㕘例又曰諸文武官若流外已上者父母在三年給定假三十日其拜墓五年一假十日並除程若已經還家者計還後給其五品已上所司審勘於事毎闕者奏不得輒自奏請親冠假三日五服内親冠給假一日並不給程又曰諸婚給假九日除程周親婚嫁五日大功五日小功已下一日並不給程以下無主者百里内除程者本服周親已上疾病危篤逺行久别及諸急難並量給假太平御覽卷六百三十四
