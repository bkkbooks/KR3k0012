  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_992-1a, image: WYG0901/WYG0901-0680c.png}
body:
  text: 太平御覧卷九百九十二宋李昉等撰藥部九欵冬芫華羊躑躅旋華黃芩恒山蜀漆蕪荑秦皮枳實防風大黃石斛半夏射干蓪草牛膝牡丹茵芋獨活紫威大㦸栝楼􅀢核地膚貝母海藻豕首當陸敗醬綸布石龍苪虵床雲實欵冬爾雅曰菟奚顆凍也郭璞注曰欵冬生水中華紫赤凍音東述征記曰洛水至嵗末凝厲則欵冬生層氷之中本草經曰欵冬一名槖吾一名顆冬一名虎鬚一名莵奚味辛温𫝊咸欵冬賦曰余曽逐禽登于北山于時仲冬之月也氷凌盈谷積雪被崖顧見欵冬煒然始敷賦曰華艷春暉既麗且殊以堅氷為膏壤吸霜雪以自濡非天然之真貴曷能彌寒暑而不渝芫華本草經曰芫華一名去水味苦辛温治欬逆上氣殺蟲生淮原建康記曰建康出芫華范子計然曰芫華出三輔呉氏本草曰芫華一名去水一名敗華一名兒草根一名黃大㦸神農黃帝有毒扁鵲岐伯苦李氏大寒二月生葉青加厚則黒華有紫赤白者三月實落盡葉乃生三月五月採華芫花根一名赤芫根神農雷公苦有毒生邯鄲九月八月採隂乾久服令人洩可用毒殺魚羊躑躅廣雅曰羊躑躅决光也建康記曰建康出躑躅本草經曰羊躑躅味辛温生川谷治賊風濕痺惡毒生太行山呉氏本草經曰羊躑躅花神農雷公辛有毒生淮南治賊風惡毒諸邪氣旋華本草經曰旋華一名筋根一名羙草去面皯黒色令人恱澤根主腹中寒熱邪氣生豫州或豫章黄芩說文曰菳黃芩也廣雅曰䒲葿黄文内虛黄芩也本草經曰黃芩一名腐膓味苦平生川谷治諸熱范子計然曰黃芩出三輔色黃者善呉氏本草曰黃芩一名黃文一名妬婦一名虹勝一名經芩一名印頭一名内虛神農桐君黃帝雷公扁鵲苦无毒李氏小温二月生赤黃葉兩兩四面相值莖空中或方員髙三四尺四月花紫紅赤五月實黒根黃二月至九月採恒山廣雅曰恒山菜蜀漆也漢書地理志曰武陵有佷山縣孟康注曰音恒出恒山藥逰名山記曰橫陽諸山草多恒山永嘉記曰恒山出松陽永寧縣本草經曰一名𤣥草味苦寒生川谷主治傷寒發温瘧鬼毒胷中結吐逆生益州呉氏本草曰恒山一名七葉神農岐伯苦李氏大寒桐君辛有毒二月八月採蜀漆本草經曰蜀漆味辛平治瘡及欬逆寒熱腹癥堅邪氣蠱毒鬼蛀建康記曰建康出蜀漆范子計然曰蜀漆出蜀郡呉氏本草曰蜀漆葉一名恒山神農岐伯雷公辛有毒黄帝辛一經酸如漆葉藍菁相似五月採蕪荑本草經曰蕪荑味辛一名无姑一名􅀢音殿䕋音唐去三虫化食逐寸白散腹中嗢喘息秦皮本草經曰秦皮味苦微寒生川谷治風濕痺寒氣除熱目中青翳乆服頭不白輕身生廬江建康記曰建康出秦皮呉氏本草曰梣皮一名秦皮神農雷公黃帝岐伯酸无毒李氏小寒或生寃句水邊二月八月採淮南萬畢術曰岑皮致水枳實山海經曰北嶽之山其上多枳晏子春秋曰晏子使楚楚王使縳一人過問曰縳者何為者耶對曰齊人坐盗王視晏子曰齊人固善盗乎晏子對曰橘生江南江北為枳水土異也今民生於齊不盗入楚則盗得旡楚之水土使民盗耶崔實四民月令曰九月九日収枳實本草經曰枳實味苦寒生川澤治大風在皮膚中如麻豆苦癢除寒熱結止痢長肌肉利五藏益氣輕身生河内呉氏本草曰枳實苦雷公酸旡毒李氏大寒九月十月採隂乾防風本草經曰防風一名銅芒甘温生川澤治大風頭眩痛目盲無所見煩滿風行周身骨節疼痛乆服輕身生沙苑范子計然曰防風出三輔白者善呉氏本草曰防風一名回芸一名回草一名百枝一名蕳根一名百蜚一名百種神農黄帝岐伯桐君雷公扁鵲甘無毒李氏小寒或生邯鄲上蔡正月生葉細圓青黑黄白五月黄花六月實黒二月十月採根日乾琅邪者良大黄廣雅曰黄良大黄也盛宏之荆州記曰建平出大黄本草經曰大黄味苦寒生川谷治下瘀血閉寒熱破㿂瘕積聚留飲宿食蕩滌膓胃安五臟推陳致新通利水糓道調中化食生河西吳氏本草曰大黄一名黄良一名火参一名膚如神農雷公苦有毒扁鵲苦無毒季氏小寒藥中將軍或生蜀郡北部或隴西二月卷生黄赤葉四四相當黄莖髙三尺許三月華黄五月實黒三月採根根有黄汁切隂乾石斛盛宏之荆州記曰隋郡來陽縣有龍石山山上多石斛精好如金釵也廬山記曰石門山石間多生石斛范子計然曰石斛出六安本草經曰石斛一名林蘭一名禁生味甘平生山谷治傷中下氣虛勞補五臟羸痩乆服除痺腹腸胃強隂出六安吳氏本草曰石斛神農甘平扁鵲酸李氏寒半夏禮記月令曰仲夏之月半夏生范子計然曰半夏出三輔色黄者善廣州記曰鄣光縣出半夏建康曰建康出半夏極精本草經曰一名地文水玉味辛平生槐里川谷吳氏本草經曰半夏一名和姑生微丘或生野中葉三三相偶二月始生白華員上射干廣雅曰鳶尾鳥蓮射干也昜通卦驗曰冬至射干生抱朴子曰千嵗之射干其根如坐人長七尺刺之有血以其血塗足下可歩行水上不没以塗人鼻入水水為之開以其血塗身則隱形欲見則拭去之孫卿子曰西方有木名曰射干莖長四寸生於高山之崖臨百仞之淵木非能長也所立者高也范子計然曰射干根如安定建康記曰建康出射干本草經曰射干一名烏扇一名烏蒲味苦辛生川谷治欬逆上氣生南陽吳氏本草曰射干一名黄逺也蓪草廣雅曰附支蓪草也本草經曰蓪草一名附支味辛平生山谷去惡蟲除脾胃寒熱利九竅血脉闗節不忘生石城建康記曰建康出蓪草范子計然曰蓪草出三輔吳氏本草曰蓪草一名丁翁一名附支神農黄帝辛雷公苦生石城山谷葉青蔓延止汗正二月採牛膝廣雅曰牛莖牛膝也本草經曰牛膝一名百倍味苦辛生川谷治傷寒濕痿痺四支拘攣膝痛不可屈伸乆服輕身耐老生河内建康記曰建康出牛膝吳氏本草曰牛膝神農甘一經酸黄帝扁鵲甘李氏温雷公酸無毒生河内或臨卭葉如夏藍莖本赤二月八月採牡丹廣雅曰白术牡丹也范子計然曰牡丹出漢中河内赤色者亦善逰名山志曰泉山多牡丹本草經曰牡丹一名鹿韭一名鼠姑味辛寒生山谷治寒熱癥傷中風驚邪安五臟出巴郡吳氏本草曰牡丹神農岐伯辛季氏小寒雷公桐君苦無毒黄帝苦有毒葉如蓬相值黄色根如栢黒中有核二月八月採根陰乾人食之輕身益壽茵芋吳氏本草曰茵芋一名卑共性微温有毒狀如莾草而細軟獨活本草經曰獨活一名䕶羗使者味苦平生益州久服輕身吳氏本草曰獨活一名䕶羗使者神農黄帝苦無毒八月採此藥有風花不動無風獨揺紫葳本草經曰紫葳一名茇華一名陵苕味鹹㣲寒無毒生川谷治婦人乳餘疾崩山癥血寒熱飬胎生西海建康記曰建康出紫葳范子計然曰紫葳出三輔吳氏本草曰紫葳一名武威一名瞿麥一名陵時一名鬼目一名茇華神農雷公酸岐伯辛扁鵲苦醎黄帝甘無毒如麥根黒正月八月採或生真定大㦸爾雅曰蕎卭鉅郭璞注曰今藥草大㦸也本草經曰大㦸一名卭鉅枯樓毛詩東山曰我來自東零雨其濛果臝之實亦施于宇果臝括樓也又唐蟋蟀葛生曰蘝蔓于野詩義䟽曰蘝栝樓爾雅曰果臝之實栝樓今齊人呼之為天𤓰本草經曰栝樓一名地樓味苦寒生川谷吳氏本草曰栝樓一名澤姑㽔核本草經曰㽔核味甘温生川谷主治心腹邪結氣明目赤痛傷涙出目腫眥爛乆服益氣輕身生凾谷晉宫閣記曰華林園㽔三株吳氏本草曰㽔核一名􅀢神農雷公甘平無毒生池澤八月採補中強志明耳目久服不飢地膚本草經曰地膚一名地華一名地脉一名地菜貝母毛詩􅅠風載馳曰陟陂阿丘言採其䖟䖟貝母也爾雅曰􅔾音䖟貝母也郭璞曰枳如小貝根負而白華葉似韭海藻爾雅曰􅙛海藻也藥草也一名海蘿如亂髪生海中􅙛音覃本草經曰海藻著頸下破散結廣雅曰海蘿海藻豕首爾雅曰茢音列薽音真豕首郭璞注曰本草經曰彘顱一名蜍蘭今江東呼豨首本草經曰豕首一名劇草一名蠡實吳氏本草曰一名澤藍一名豕首神農黄帝甘辛無毒生寃句五月採當陸爾雅曰蓫音逐薚音陽馬尾也郭璞注曰江東謂之當陸闗西為薚本草經曰當陸一名夜呼敗醬范子計然曰敗醬出三輔本草經曰敗醬似結梗其氣如敗豆醬綸布本草經曰綸布一名昆布味酸寒無毒主十二種水腫癭瘤聚結氣瘻瘡破積聚石龍芮范子計然曰石龍芮出三輔吳氏本草經曰石龍芮一名水堇虵床吳氏本草經曰虵床一名虵珠􅀶物志曰虵床亂蘼蕪雲實本草經曰雲實味辛温生川谷治泄利脹癖殺虫蠱毒去邪惡多食令人狂走久服輕身通神明生河間范子計然曰雲實生三輔吳氏本草經曰雲實一名員實一名天豆神農辛小温黄帝醎雷公苦葉如麻兩兩相值髙四五尺大莖空中六月花八月九月實十月採太平御覽卷九百九十二
