  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_563-1a, image: WYG0898/WYG0898-0195c.png}
body:
  text: 太平御覽卷五百六十三宋李昉等撰樂部一雅樂上易曰雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考書曰夔命汝典樂教胄子胄子國子也古者司樂以教國子詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和周禮曰大合樂以致鬼神以和邦國以諧萬民以安賓客以悦逺人以作動物又曰天子宫懸四靣如宫諸侯軒懸去南靣餘三靣其形如軒亦曰典懸大夫判懸又去其北靣士特懸凢樂鐘磬之半為堵全為肆又曰大司樂掌成均之法以治建國之學政而合國之子弟焉鄭𤣥注曰均調也樂師主調其音大司樂主受此成事已調之樂以樂徳教國子中和祗庸孝友中猶忠也和柔適也祗敬庸有常也以樂語教國子興道諷誦言語興謂以善物諭善事也道讀曰導也者言古以諭今以樂舞教國子雲門大卷大咸大韶大夏大濩大武又曰大司樂分樂而序之以祭以享以祀乃奏黄鍾歌大吕舞雲門以祀天神乃奏大簇歌應鍾舞咸池以祭地祗乃奏姑洗歌南吕舞大韶以祀四望乃奏㽔賔歌函鍾舞大夏以祭山川乃奏夷則歌小吕舞大濩以享先妣乃奏無射歌夹鍾舞大武以享先祖凢六樂者文之以五聲播之以八音又曰凢六樂者一變而致羽物及山澤之祗再變而致臝物及山林之祗三變而致鱗物及丘陵之祗四變而致毛物及墳衍之祗五變而致介物及土祗六變而致象物及天神又曰凢樂圜鍾為宫黃鍾為角太簇為徴姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣凢樂函鍾為宫大簇為角姑洗為徴南吕為羽靈鼓靈鼗孫竹之管空桑琴瑟咸池之舞夏至於澤中之方丘奏之若樂八變則地祗皆出可得而禮矣凢樂黃鍾為宫大吕為角太簇為徴應鍾為羽路鼔路鼗隂竹之管龍門之琴瑟九徳之歌九㲈之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣又曰凢樂事以鐘鼔奏九夏肆夏王夏昭夏納夏章夏齊夏簇夏祴夏驁夏以鍾鼓者先撃鍾次撃鼓九夏夏大也樂之大歌有九祴讀為陔鼓之陔王出入奏王夏尸出入奏肆夏牲出入奏昭夏四方賓客奏納夏臣有功奏章夏夫人祭奏齊夏族人侍奏族夏客醉而出奏陔夏公出入奏驁夏禮曰凢音之起由人心生也人心之動物使之然也感扵物而動故形於聲聲成文謂之音文猶文章比音而樂之及干戚羽旄謂之樂干楯也戚斧也武舞所執也羽翟也旄牛尾也文舞所執也樂者音之所由生也其本在人心之感於物也是故其哀心感者其聲噍以殺其樂心感者其聲嘽以緩其喜心感者其聲發以散其怒心感者其聲粗以厲其敬心感者其聲直以亷其愛心感者其聲和以柔是故先王慎所以感之者宫為君商為臣角為民徴為事羽為物五者不亂則無沾懘之音矣凡音濁者尊清者卑沾懘弊敗不和音也宫亂則荒其君驕商亂則卑其臣壊角亂則憂其民怨徴亂則衰其事勤羽亂則危其財匱五者皆亂迭相陵謂之慢鄭衛之音亂世之音也比於慢矣桑間濮上之音亡國之音也其政散其民流誣上行私而不可止也是故知聲而不知音者禽獸是也知音而不知樂者衆庶是也惟君子為能知樂是故不知聲者不可與言音不知音者不可與言樂知樂則幾於禮矣禮樂皆得謂之有徳徳者得也樂者為同禮者為異同則相親異則相敬同謂齊好學異為别貴賤也樂勝則流禮勝則離流謂合行不敬也離謂所居不和也樂由中出和在心也禮自外作敬在貌也樂由中出故静禮自外作故文大樂必易大禮必簡樂至則無怨禮至則不争揖讓而天下治者禮樂之謂也大樂與天地同和大禮與天地同節和故百物不失節故祀天祭地明則有禮樂幽則有鬼神如此則四海之内合敬同愛矣故知禮樂之情者能作識禮樂之文者能述述謂訓其義也作者之謂聖述者之謂明樂者天地之和也禮者天地之序也和故百物皆化序故羣物皆别化猶生也别謂形體異也王者功成作樂治定制禮其功大者其樂備其治辨者其禮具五帝殊時不相沿樂三王異世不相襲禮樂極則憂禮粗則偏矣及夫敦樂而無憂禮備而不偏者惟大聖乎春作夏長仁也秋歛冬藏義也仁近於樂義近於禮故聖人作樂以應天制禮以配地禮樂眀備天地官矣夫禮樂之極乎天而蟠乎地行乎隂陽而通乎鬼神窮髙極逺而測深厚是故志微噍殺之音作而民思憂啴諧慢易繁文簡節之音作而民康樂粗厲猛起奮末廣賁之音作而民剛毅亷直勁正荘誠之音作而民肅敬寛裕肉好順成和動之音作而民慈愛流僻邪散狄成滌濫之音作而民滛亂故樂行而倫清耳目聰眀血氣和平移風易俗天下皆寕故曰樂者樂也君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑而不樂道謂仁義也欲謂邪滛也是故君子反情以和其志廣樂以成其教樂行而民嚮方可以觀徳矣方由道也德者性之端也樂者德之華也金石絲竹樂之器也詩言其志也歌永其聲也舞動其容也三者本於心然後樂器從之又曰魏文侯問子夏曰吾端冕而聼古樂惟恐卧聼鄭衛之音則不知倦敢問古樂之如彼何也新樂之如此何也子夏對曰今夫古樂進旅退旅和正以廣絃匏笙簧㑹守拊鼓始奏以文復亂以武治亂以相訊疾以雅君子於是語於是道古修身及家平均天下此古樂之發也今夫新樂進俯退俯姦聲以濫溺而不止及優侏儒獶雜子女不知父子樂終不可以語不可以道古此新樂之發也文侯曰敢問溺音何從而出也子夏對曰鄭音好濫滛志宋音燕女溺志衛音趍數煩志齊音傲僻驕志四者滛於色而害於徳是以祭祀弗用也詩云肅雍和鳴先祖是聴夫肅肅敬也雍雍和也夫敬以和何事不行為人君者謹其所好惡而已矣君好之則臣為之上行之則民從之詩云誘民孔易此之謂也然後聖人作為鞉皷椌楬壎箎此六者徳音之音也然後鐘磬竽瑟以和之干戚旄狄以舞之所以祭先王之廟也所以獻酬酳酢也所以官序貴賤各得其宜也所以示後世有尊卑長㓜之序也鐘聲鏗鏗以立號號以立横横以立武君子聼鐘聲則思武臣石聲磬磬以立辨辨以致死君子聼磬聲則思死封疆之臣絲聲哀哀以立亷亷以立志君子聼琴瑟之聲則思志義之臣竹聲濫濫以立㑹㑹以聚衆君子聼竽笙簫管之聲則思畜聚之臣皷鼙之聲讙讙以立動動以進衆君子聼鼓鼙之聲則思將相之臣君子之聼音非聼其鏗鏘而已也彼亦有所合之也君子曰禮樂不可斯須去身致樂以治心則易直子諒之心油然生矣易直子諒之心生則樂樂則安安則乆乆則天天則神天則不言而信神則不怒而威致樂以治心者也致猶深審也子讀如不子之子油然新生好兒也善心生則寡於利欲寡於利欲則樂矣志明行成不言而見信如天也不怒而見威如神也致禮以治躬則莊敬莊敬則威嚴心中斯須不和不樂而鄙詐之心入之矣鄙詐入之謂利欲生外貎斯須不莊不敬而易慢之心入之矣故樂也者動於内者也禮也者動於外者也樂極和禮極順内和而外順則民瞻其顔色而弗與争也望其容貌而不生慢易焉極至也故德輝動於内而民莫不承聽理發諸外而民莫不承順故曰致禮樂之道舉而措之天下無難矣樂也者動於内者也禮也者動於外者也故禮主其减樂主其盈减猶倦也盈猶益也禮减而進以進為文樂盈而取以反爲文禮减而不進則銷樂盈而不反則放故禮有報而樂有反禮得其報則樂樂得其反則安得謂曉其義禮之報樂之反其義一也夫樂者先王之所以飾喜也軍旅鈇鉞者先王之所以飾怒也故先王之喜怒皆得其儕焉又曰孔子閒居子夏曰敢問何謂三無孔子曰無聲之樂無體之禮無服之䘮子夏曰三無既得而聞之矣敢問何詩近之孔子曰夙夜基命宥宻無聲之樂也威儀棣棣不可選也無體之禮也凢民有䘮匍匐救之無服之䘮也子夏曰言盡於此而已乎孔子曰猶有五起焉無聲之樂氣志不違無體之禮威儀遲遲無服之䘮内恕孔悲無聲之樂氣志既得無體之禮威儀翼翼無服之䘮施於四國無聲之樂氣志既從無體之禮上下和同無服之䘮以畜萬邦無聲之樂日聞四方無體之禮日就月將無服之䘮純徳孔明無聲之樂氣志旣定無體之禮施及四海無服之䘮施於孫子又曰入門而金作示情也升歌清廟示德也下管象武示事也是故古之君子不必親相與言也以禮樂相示而已又曰故天子之為樂也以賞諸侯之有徳者也德成而教尊五穀時熟然後賞之以樂也又曰郊特牲曰賔入大門而奏肆夏示易以敬也卒爵而樂闋孔子屢嘆之樂由陽来者禮由隂作者隂陽和而萬物得也左傳曰曹太子来朝享曹太子初獻樂奏而歎酒始獻也施父曰曹太子其有憂乎非歎所也施父魯大夫也又曰晉郄至如楚聘且莅盟楚子享之子反相為地室而懸焉郄至將登金奏作於下繋鐘而奏樂也驚而走出太平御覽卷五百六十三
