body:
  text: 太平御覽卷七百十五宋李昉等撰服用部十七歩搖假髻髪歩搖釋名曰后首飾曰副副覆也以覆於首上有垂珠歩則搖也周禮曰王后首飾為副所以副首為飾若今歩搖也續漢書輿服志曰皇后入廟歩搖以黄金為山題貫白珠桂枝相糺八爵九華雄虎赤熊天鹿辟邪後漢書曰和熹鄧后賜馮貴人赤綬以未有歩搖環佩各加賜一具晉書曰慕容廆曽祖莫䕶䟦魏初率其諸部入居遼西從宣帝伐公孫氏以功拜率義王始建國於􅈎城之北時燕代多冠歩搖冠䕶跋見之乃歛髪襲冠諸部因呼之為歩搖其後音訛遂為慕容焉江表𫝊曰孫皓使尚方以金作歩搖假髻以千數令宫人着以相撲朝成夕敗輒命更作晉令曰歩揺蔽髻皆以禁物西京雜記曰趙飛鷰為皇后其女弟上遺黄金歩搖宋玉風賦曰主人之女垂珠歩搖梁范静妻沈氏歩搖花詩曰珠花縈翡翠寳葉間金瓊剪荷不似製為花如自生低枝拂衣領㣲歩動瑤英假髻周禮曰追師掌王后首服為副鄭𤣥云副婦人首飾三輔謂之假髻東觀漢記曰章帝詔東平王蒼惟王孝友之徳今以光烈皇后假髻帛巾各一衣一篋遺王可時瞻視以慰凱風寒泉之思晉中興書曰徵祥説曰太元中公主婦女緩鬢假髻以為盛飾用髪豐多不可行戴乃先於籠上装之名曰假髻或名假頭至於貧人不能自辦自號無頭就人借髪後孫思桓𤣥之亂死者萬計被戮之家多亡頭首至大歛時皆以繩縳菰草為頭假髻之患也晉令曰士卒百工部得看假髻髲釋名曰髲被也髪少者得以被􅂇其髪也詩曰鬒髪如雲不屑髢也𫝊曰衛莊公見城州巳氏之妻髪美使髠之以為吕姜髢後為巳氏所殺也吳志薛綜上事云漢氏朱崖叛以長吏覩其人好髪髠取為髲故百姓怨叛南越志曰聞安縣出頭髲異􅁐曰琅琊費縣民家恒患失物作繩樞施穿窗因擊得一髲長三尺許後不復失物太平御覽卷七百十五
  hash: sha256:a988bb5b88d1f772d9dde3c418c14bd76ac93c93178e9a222592b3b197a82066
