body:
  text: 太平御覽卷八百一十四宋李昉等撰布帛部一絲素繒纈綵染絲尚書禹貢曰濟河惟兖州厥貢漆絲海岱惟青州厥篚檿絲周禮天官下典絲曰典絲掌絲入而辦其物以其賈揭之堂其藏與其出以待興功之時頒絲于外内皆以物受之凡上之賜予亦如之又冬官考工記曰慌氏凍絲以浴水漚其絲七日去地天暴之晝暴諸日夜宿諸井七日七夜是謂水凍禮記月令曰季春之月蠶事既登分繭稱絲又内則曰子能言教男唯女俞男鞶革女鞶絲又曰王言如絲其出如綸又曰少儀曰國家靡敝則君子不履絲左傳隠公曰公問於衆仲曰衛州吁其濟乎對曰臣聞以德和民不聞以亂以亂猶治絲而棼之也春秋考異郵曰四月蠶餌絲毛詩鵲巢羔羊曰羔羊之皮素絲五紽羔羊之革素絲五緎羔羊之縫素絲五總又鵲巢何彼穠矣曰其釣維何維絲伊緡又邶柏舟緑衣曰緑兮絲兮女所治兮又鄘柏舟干旄曰孑孑干旄在浚之郊素絲紕之良馬四之又淇澳氓曰氓之蚩蚩抱布貿絲匪來貿絲來即我謀又曰淑人君子其帶伊絲其弁伊騏又絲衣曰絲衣其紑載弁俅俅又曰雖有絲麻無棄菅蒯謝承後漢書曰丹楊方儲為郎中章帝使文郎居左武郎居右儲正住中曰臣文武兼備在所施用上嘉其才以繫亂絲付儲使理儲㧞佩刀三斷之對曰反經任勢臨事宜然袁宏漢記曰郭泰傳童子魏照求入其房供給洒掃泰曰當精義講書何來相近照曰經師易獲人師難遭欲以素絲之質附近朱藍魏畧曰文帝欲受禪野蠶成絲晉陽秋曰武帝時有司奏以青絲為牛靷詔以青麻代之晉書曰呂光竊號河右中書監張資病光博營救療有外國道人羅义云能差資病光喜給賜甚重羅什知义誑詐告資曰义不能為益徒煩費耳冥運雖隠可以事試也乃以五色絲作繩結之燒為灰末投水中灰若出水還成繩者病不可愈須臾􅁅聚浮出復為繩又療果無效少日資亡宋書曰諸葛門上言夫歲時有利害之收而蠶桑有經營之苦機杼居不變之勤而民用有奢儉之異今南至有五絲命縷之服仲夏北至比肆連行糾繩縻無用之工𤣥黃侵衣革之費飾綵雖貴始無所入尺絶寸分終於捐棄即一邑以推百城其費慱矣謹率愚管謂宜禁革後魏書曰幽州刺史張亮初有薛琡夢亮於山上柱絲覺而告亮且占之曰山上絲幽字君為幽州乎未暮而受管子曰齊桓公伐楚濟漢水踰方城使貢絲於周室墨子見染絲者歎曰染於蒼則蒼染於黃則黃五色則為五色故染不可不慎非獨染絲治國亦然淮南子曰蠶餌絲則商絃絶商金聲春蠶吐絲金死故絶也山海經曰歐絲之野有一女子跪樹而歐絲郭璞注曰蠶類也呂氏春秋惠子曰使女工化為絲不能治絲大匠化為木不能治木家語曰子張問入官子曰修身返道故夫女工必自擇絲麻良匠完材賢君選左右論衡曰蠶合絲而商弦絶按子生而父氣衰新絲既登故休者自壞耳桓譚新論曰昔神農始削桐為琴繩絲為絃以通神明之德合天地之序風俗通曰五月五日賜五色續命絲俗説益人命正部曰皎皎練絲得藍則青得丹則赤得蘖則黃得泥則黑士緯曰絲俱坐於蠶為繒則賤為錦則貴神仙傳曰仙人用五色絲作續命幡七安五色竹林七賢論曰髙令袁毅為政貪濁賂遺朝廷以警虛譽遺山濤絲百斤衆人莫不受濤不欲為異乃受之命内閣懸之梁而不用也後毅事露令吏治濤所濤於梁上下絲已數年塵埃黃黑印如初以付吏西京雜記曰公孫𢎞以元光五年為國所推上為賢良國人鄒長倩贈以素絲一襚為書以遺之曰五絲為鑷倍鑷為升倍升為􅀈倍􅀈為記倍記為緵倍緵為襚此自少之多自微之著也士之立功勲效名節亦復如之勿以小善為不足修而不為也王子年拾遺記曰成王時因祇國致女工一人善織新輕素以五色絲内口中手引而結之則成文神仙傳曰園客者濟隂人貌美而良邑人多欲以女妻之客終不娶常種五色香草積數十年服食其實忽有五色蛾集香草之上客收而薦之以布生花蠶焉至蠶時有一女自來助客養蠶亦以香草食之蠶收得蠒百二十枚蠒大如甕每一繭繰六七日絲乃盡繰訖此女與園客俱去梁四公記曰扶桑國使貢方物有黃絲三百斤即扶桑蠶所吐桑灰汁所煮之絲也帝有金鑪重五十斤繫六絲以縣鑪絲有餘力楚辭曰茅絲兮同綜冠履兮共䖍宋玉鈞賦曰夫𤣥淵之鈎也以三尋之芉八絲之綸荀卿琴賦曰絃以園客之絲徽以鍾山之玉枚乘七發曰龍門之桐髙百尺而無枝斬以為琴繭之絲以為絃稽康蠶賦曰食桑而吐絲前亂而後治古樂府歌詩曰羅敷善蠶桑採桑城南隅青絲為籠繩柱柱為籠鈎何用識夫婿白馬紫驪駒青絲繫馬尾黃金籠馬頭蔡邕廣連珠曰參絲之絞以絃琴緩張則撓急張則絶陸凱奏事曰諸暨永安出御絲素釋名曰素樸素也已織則工用不復加功餙也史記曰蘇氏遺燕王書云齊紫敗素而買十部東觀漢記曰鄭據建初五年辟司徒府拜侍御史上䟽詔書示官府賜據六十疋漢書儀曰天地鬼神璽皆以武都紫泥封都布紫曰素裹漢官儀曰印綬盛以篋篋以緑綈表曰素裹魏志曰學者資於人猶藍之染素范子計然曰白素出三輔疋八百孟子曰陳相道許行之言孟子曰許子必種粟而後食乎曰然許子冠乎曰冠曰奚冠曰冠素曰自織之與曰否以粟易之曰許子奚為不自織曰害於耕韓子曰齊桓公好衣紫國人皆好服之至五素不槈不紫其綵門鹽鐵論曰縞素不能自分於緇黑賢聖不能自治於亂世班固與弟書云今賫白素三百疋欲以市月支馬宋玉美人賦曰腰如束素徐幹團扇賦曰惟合懽之奇扇肇伊洛之素古詩曰新人能織繡故人工織素織縑日一疋織素五丈餘以縑持比素新人不知故班媫妤詩曰新裂齊紈素鮮潔如霜雪裁為合懽扇團圓象明月揚雄答劉歆書曰天下上計孝亷又内郡衛卒㑹者椎常把三十弱翰筆齎油素四尺以問其異方語歸即以鈆㰅次之於鈆槧三十七歲於今矣繒史記曰烏氏倮以繒遺戎王戎王十倍報之帝王世記曰妺喜好聞裂繒之聲桀為發繒裂之漢書曰灌嬰睢販繒者又曰廣川王立昭信為后幸姬陶望鄉為脩美人主繒帛昭信譛望卿曰與我無禮衣服常鮮於我盡取善繒丐諸宮人獻帝紀曰是時新廷都宮人多亡衣服帝彼發御府繒以作之李催不欲曰宮中有衣服胡為復作也詔賣廐馬百餘疋御府大司農出雜繒二萬疋與所賣廐馬直賜公卿已下及貧民不能自存者李催曰我邸閣儲峙少乃悉載置其營賈詡曰此上意不可距也催中不從又曰李僱特合羌胡數十人先以御物繒綵與之晉書曰單道關燉煌人常衣麤褐或贈以繒服皆不着宋書曰朱陽百居山陽有時出山陽為妻買繒綵三五事好飲酒遇醉或失之後周書曰梁王蕭歸朝於鄴髙祖與之宴大悦賜雜繒萬段良馬數千疋并賜齊後主被妾及常所乘五百里駿馬以遣之纈西河記曰西河無蠶桑婦女着碧纈裙上加細布裳且為戎狄姓着紫纈襦襖以外國色錦為袴褶後魏書曰封回為都官尚書冀州大中正榮陽鄭雲事長秋鄉劉騰貨紫纈四百疋得為安州刺史除書旦出曉往詣回坐未定問安州興生何事便回曰卿荷國寵恩位至方伯雖不能㧞園葵去織婦宜思方畧以濟百姓如何見造問興生乎封囬不為商賈何以相示雲慙失色綵尚書禹貢曰徐州厥篚𤣥織荆州厥篚𤣥纁禮記玉藻曰無君者不貳采非列采不入公門史記曰通邑大都采千疋比千乘家漢書曰孝文六年遺單于赤綈緑縁各四十疋東觀漢記曰光武起義與朱季市弓弩絳衣赤幘謝承後書曰陳重同舎郎有歸寧者誤持同舎郎絳去嫌重取重不申曲直置絳還之去即還得絳甚愧於重袁山松後漢書曰劉盆子拜竟復從劉仲卿居仲卿為盆子制絳單衣張璠漢記曰朱雋少孤母以販繒綵為事同郡周起負官債百萬縣催責之雋竊母帛為起償債魏志曰景初中賜倭女王蒨絳五十疋綵青五十疋吳書曰陸遜破曹休當還西降上賜遜繒丹漆梁書曰張譏㓜喪母有錯綵經帕母之遺製及自所識家人具以告之每歲時輙封帕哽噎不能自已唐書曰武德中太宗平并州悉復故地上悅置酒含章殿宴羣臣極懽遣入御府賜繒綵皆負重而出韓子曰齊桓公好服紫一國盡服紫五素不得一紫公想之管仲曰君勿衣紫也謂左右曰吾惡紫臭公曰諾三日境内莫有衣紫風俗通曰夏至着五綵辟兵題綵曰遊光厲鬼知其名無溫疾五采辟五兵也按取新斷織繫户亦此類也世語曰王經彥偉初為江夏太守大將軍曹爽附絳二十疋令交市於吳經不納書棄官歸崔實四民月令四八月清風戒寒趣染綵色摯虞決疑曰古者男子皆衣綵有故乃素服秦漢以來服色轉變今惟朝廷五服用綵裴𤣥新言曰五月五日集五綵繒謂之辟兵不解以問伏君伏君曰青赤白黑為之四面黃居中央名曰襞方綴之於複以示婦人養蠶之功也傳聲書誤以辟兵李陵與蘇武詩曰有鳥西南飛熠熠似蒼蠅朝發天地隅暮寄日南陵欲寄一言書託之箋綵繒張載擬四愁詩曰佳人贈我筒中布何以報之流黃素蔡邕女誡曰禮女始行服纁七絳也上正色也紅紫不以為䙝服緗緑不以為上繒貴厚而色尚深為其堅紐也母邱儉報弟書曰今别致絳二百疋可以供送葬之事染周禮天官下曰染人掌染絲帛凡染春暴練夏纁𤣥秋染夏冬獻功地官下曰掌染草掌以春秋斂染草之物以權量受之以待時而頒之冬官考工記曰鐘氏染羽以朱湛毋林三月而熾之鄭司農云湛漬也丹林赤粟𤣥湛讀如斬車帷裳之漸熾燭也羽所以釋旌七及王后之車淳而漬之淳沃也三日為曛五日為緅七日為緇染纁者三入而成又用染以黑則為緅禮記月令曰季夏命婦官染采黼黻文章必以法故無或差貸黑黃蒼赤莫不質良無敢詐偽以給郊廟祭祀之服以為旗章以别貴賤等服之度質正也良善也所用染者當得其真采正善爾雅曰一染謂之縓彫絹反再染謂之頳三染謂之纁青謂之􅀢黑謂之黝漢書王莾傳曰更始元年拜置百官莾聞之愈恐欲外示目安乃染其鬚髮吳録曰九貞移風縣有赤絮膠人䂓土知蟻發以木枝挿其中則蟻縁而生漆折漆以染絮其色正赤宋書曰陶季直五歲喪母哀若成人初母未病令於外染衣卒後家人始贖季直抱之號慟聞者莫不酸戚呂氏春秋曰素染於青染於黃五入而五色堯舜三王染於賢聖而治桀紂幽厲染於㓙佞而亡愽物志曰蕪蘇子染法蕪蘇子一升可染一疋直以水浸之耳釋名曰緗桑葉初生色也廣志曰鳥丸與匈奴同俗丈夫婦人為木幘朱染之如杆盆以香頭神仙傳曰昌容者商王女也修道於常山食蓬虆根二百餘年能致紫草賣與染家得錢以與貧病者環濟要畧曰正色有五謂青赤黃白黑也間色五謂紺紅縹紫流黃也太平御覽卷八百一十四
