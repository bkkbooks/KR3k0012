body:
  text: 太平御覽巻二百八十九宋李昉等撰兵部二十機畧八機畧八隋書曰楊義臣與漢王將喬鍾葵相拒義臣自以兵少悉取軍中牛驢得數千頭復令兵數百人持一鼓潛驅之澗谷間出其不意義臣晡後復與鍾葵戰兵初合命驅牛驢者疾進一時鳴鼓塵埃漲天鍾葵軍不知以為伏兵發因而大潰縱擊破之以功進位上大將軍又曰長孫晟討突厥達頭密定計曰突厥飲泉亦可行毒因取諸藥毒水上流達頭人畜飲之多死於是大驚曰天雨惡水其亡我乎因夜遁晟追之斬首千餘級又曰高熲獻取陳之䇿曰江北地寒田收差晩江南土熱水田早熟量彼收穫之際徴集士馬聲言掩襲必屯兵禦守足得廢其農時彼既聚兵我便解甲再三若此賊以為常後雖集兵彼必不信持疑之頃我乃濟師登陸而戰兵氣益壯文帝行其䇿陳人益弊又曰賀若弼鎮淮南先是弼請縁江防人每交代之際必集厯陽於是大列旗幟營幕野陳人以為大兵至悉發國中士馬既知防人交代其衆復散後以為常不復設備其後弼以大軍濟江陳人弗之覺也遂滅陳通典曰隋末王世充與李密相持於東都充夜渡陳於洛水之北其時密亦渡洛水陳兵與充相對月城西至石窟密兵多馬騎長槍宜路寛放縱充兵多戈兵􅀈䂎宜隘險然南逼洛水北限天山地形偏促騎不成列縱䂎蹙之密軍失利密與數子登船南濟自餘兵馬皆東走月城充乗勝長驅直至月城下密既渡南岸即䇿馬西上直向充本營左右麾旌相繼而至充營内見密兵來逼急連舉六烽充乃捨月城之圍收兵西退自洛北達於黒石中間四十餘里奔赴顛狽大喪師徒密之行也東北之圍不救而自解西南之寇不戰而成功充伏其權竒不復輕出又曰隋漢王諒據并州及隋將楊素率衆數萬討諒時晉絳吕三州並為諒城守素各以二千人縻之而去諒遣將趙子開擁衆十餘萬横絶徑路屯據高壁嶺布陣五十里素令諸將以兵臨之自引兵入霍山縁崖谷而進直指其營一戰破之殺獲數萬又曰隋開皇中文帝大議伐陳諸將皆云大江濶逺兵不習水以此為疑不若登南岸秦兵一可當百襄邑公賀若弼獻十䇿其一事請多造船須船既多賊必防擬更甚今南地無馬請付傍江諸州二十歳已上老馬令飼以平陳為名賊必懼求馬擬戰宻勅刺史私賣博大船江南下濕特不宜馬不逾周年並當死盡終不為彼用陳主陳叔寶果造大船市馬輸船既多方覺不便而止高熲請所博得船運諸州米貯壽陽城役徒於壽陽穿大池以魚蓮遨遊為名造船教水戰仍以賀若弼為壽州總管終以此平陳又曰隋將軍劉方率兵討林邑國其王梵志率其徒乘臣象而戰方軍不利方於是多掘小坑草覆其上因以兵挑之梵志悉衆而陣方以戰偽奔北梵志逐之至坑所其衆多陷轉相驚駭軍遂亂縱兵擊大破之又曰隋末宇文化及殺煬帝復悉兵來攻李宻於黎陽宻知化及粮且盡因偽與和弊其衆化及弗之悟大喜恣其兵食冀宻饋之㑹宻下有人獲罪亡投化及具以告宻情化及大怒其食又盡乃度永濟渠與宻戰於童山之下自辰達酉宻為流矢所中頓於汲縣化及掠及郡北趣魏縣其將王智略張童仁等率所部兵歸於宻者前後相繼又曰隋末楊𤣥感反攻東都刑部尚書衛𤣥與戰兵始㑹𤣥感詐令人大呼曰官軍已得𤣥感矣官軍稍怠𤣥感與數千騎乘之衞𤣥兵於是大潰又曰隋煬帝征高麗隋將于仲文率軍從樂浪道軍次烏骨城仲文簡羸馬驢數千置於軍後既而率衆東過高麗出兵掩襲輜重仲文􅂞擊大破之又曰隋漢王諒作亂遣其將余公理自太行下河内隋將史祥討之軍於河陰久不得濟祥謂軍吏曰余公理輕而無謀才用素不足稱又新得志謂其衆可恃恃衆必驕且河北人先不習兵所謂擁市人而戰不足圖也乃令軍中修攻具攻河陽公理使諜知之果屯兵於陽内城以備祥祥於是艤船河南公理聚甲兵以當之祥乃簡精鋭於下流潛度公理率衆拒之祥至溴水湨古闃反兩軍相對公理未成列祥縱擊大破之又曰隋末李宻破宇文化及還其勁兵良馬多死隋將王充守東都欲乘其弊練精勇得二萬餘人馬千餘疋於洛水南宻軍偃師北山上時宻新得志於化及有輕充之心不設壁壘充夜遣三百餘騎潛入北山伏谿谷之中令軍士秣馬蓐食既而宵濟人奔馬馳遲明而薄宻出兵應之陣未成列而兩軍合戰其伏兵蔽山而上潛登北原乘高而下馳壓宻營營中大亂無能拒之者即入縱火宻軍大驚而潰唐書曰太宗屯虎牢竇建德悉衆而南陳兵於汜水王充將郭士衡陣於南周亘數里鼓譟請戰諸將大懼太宗數騎升高丘安坐以望之謂諸將曰賊起山東未見大敵今度險而囂是無正令逼城而陣有輕我也我按兵不出彼乃氣衰陣久卒饑勢將自退追而擊之何往不尅吾與公等為約必以午後破之如或不然寡人為無謀矣建德乃遣兵渉汜水太宗令總管王君廓以少擊之待河北馬渡方欲與建德列陣自辰至午士卒饑寒人皆坐列又爭飲水太宗乃令宇文士及將三百騎經賊陣之西馳而南上誡之曰賊若不動汝宜引歸如覺動宜出東面士及纔過賊衆果動逡廵欲退太宗曰可以擊也親率輕騎追而及之衆軍繼至建德􅂞師陣未及整列太宗先登以擊之所向皆靡俄而衆軍合戰囂塵四起太宗率史大柰程知節秦叔寶宇文歆等纒幡而入出其陣後張我旗幟賊顧見之衆乃大潰追奔三十里斬首三千餘級虜其衆五萬餘人一時放散又曰太宗討劉黑闥相持兩月餘黑闥率歩騎二萬南渡洺水結陣而至晨壓我營太宗遣輕騎當之賊皆殊死戰於是親率精騎擊賊馬軍破之因乘勝蹂其歩軍自午及昏諸軍四合賊大潰斬首萬餘級溺水死者及千人黑闥與二百騎北走悉虜其衆先是太宗遣兵堰洺上流令黑闥得渡及戰之日遽令決堰水大至深丈餘賊衆以為神由是敗走又曰武德中突厥突利頡利二可汗到原州太宗率兵拒之雨甚太宗乃召諸將謂之曰虜控弦鳴鏑弓馬是憑今雨彌時弧矢俱弊突厥人衆如鳥鎩所介切羽我屋宿火食槍槊犀利料我之逸揣敵所勞此而不乘夫復何待今欲先令勁兵亂其陣乃率突騎驅其後虜俗進不相讓退不相救自此以北澗谷深長特有一道魚貫以度因而迫之彼十萬騎坑穽中物耳追至黄河縱不盡擒必當十獲八九此曉兵者所共解諸君勿疑於是潛師夜出冐雨而進醜徒震駭因縱反閒於突利悦而歸心二可汗内離頡利欲戰不可因請和而去又曰貞觀中蘇定方率兵討突厥賀魯大雪平地二尺軍中咸請停兵候晴定方曰虜恃雪深謂我不能前進必當憇息追之可及若緩以縱之則漸逺難追省日兼功在此舉也於是勒兵凌雪晝夜兼進所經收其人衆遂至雙河去賀魯所居二百餘里布陣長驅徑至金牙山賀魯牙帳時賀魯集衆欲獵定方縱兵擊之盡破其牙帳生擒數萬人賀魯脱走投石國定方於是悉命諸部歸其所居埋瘞骸骨存問疾苦復其産業賀魯所擄掠者悉檢責還之於是西域諸國安堵如故令副將蕭嗣業往石國以追賀魯遂擒歸於京師又曰貞觀中突厥諸部離叛朝廷將圖進取以李靖為代州道行軍總管率驍騎三千自馬邑出其不意直趨惡陽嶺以逼之突利可汗不虞於靖見官軍掩至相謂曰唐兵若不傾國而來靖豈孤軍而至一日數驚四年靖進擊定襄城破之突厥諸部落並走磧北突利可汗來奔又曰貞觀中吐谷渾冦邊以李靖為西海道行軍大總管統兵部尚書侯君集刑部尚書任城王道宗等五總管征之軍次伏埃城吐谷渾燒去野草以餒我師退保大非川諸將咸曰春草未生馬已羸疲不可赴敵唯靖決計而進深入敵境遂踰積石山前後戰數十合殺傷者甚衆大破其國又曰武德中突厥突利頡利二可汗到原州太宗率兵拒之兩陣將交太宗以數騎出謂之曰不念昔日香火之言乃來相侵知二可汗外同内異故以此言疑之頡利見太宗輕出又聞香火之言乃陰猜突利因遣使曰王不須慮我無惡意更欲與王自斷當耳於是歛軍引却又曰貞觀中北狄鐵勒薛延陁發同羅僕骨􅂞紇等衆合二十萬度漢屯白道川據善陽嶺以擊突厥可汗李思摩之部思摩引其種落走朔州留精騎以拒戰延陁乗之及塞太宗令張儉李勣等率兵數道擊之時太宗誡之曰延陀負其兵力踰漠而來經途數千馬已疲瘦夫用兵之道見利速進不利速退其掩思摩不能疾擊思摩既入長城又不能速退吾先勅思摩燒薙秋草延陁粮實日盡野無所獲頃者偵人來云其馬齧噉林木枝皮畧盡卿等掎角思摩不須前戰俟其將退一時奮擊制勝之舉也於是李勣擊延陁之衆破之先是延陀擊突厥沙鉢羅及社爾皆以歩兵戰而勝及其將來寇也先講武於國中教習歩戰每五人以一人經習戰陣者使執馬而四人前戰克勝即授馬以追奔失於應接罪至於死没其家口以賞戰人至是遂行其法突厥先合輙退延陁乘勝而逐之勣兵拒擊而延陁萬矢俱發傷我戰馬李勣乃令去馬歩陳率長矟數百為隊齊奮以衝之其衆潰散副總管薛萬徹率數千騎收其執馬者其衆失馬莫知所從因擊之乃大敗又曰武后初徐敬業起兵於揚州武太后令將軍李孝逸討之敬業拒於高郵之下阿谿敬業置陣既久士卒多疲怠皆顧瞻陣不能整孝逸遂率衆擊之因風縱火敬業懼燒而退孝逸進擊大破之又曰武德中薛萬均與羅藝守幽燕竇建德率衆十萬乘至范陽萬均謂藝曰衆寡不敵今若兵鬭百戰百敗當以計取可令羸兵弱馬阻水背城為陣以誘之賊若渡水請公精騎百人伏於城側待其半渡而擊之破之必矣從之建德引兵渡水萬均擊之大破又曰武德初王世充據東都太宗往征之屯青城宫營壘未立王世充衆三萬自方諸門出臨榖水以禦大軍諸將大懼太宗以精騎陳於北邙登後魏宣武陵以觀賊陣謂左右曰賊勢迫矣悉衆而出利在一戰今日破之其後不能出矣乃令屈突通率歩卒五千度水布陣以當之因戒通曰待兵交即放煙吾當率馬軍南下兵纔接太宗以騎衝之挺身先進表􅂻賊勢衆殊死戰散而復合者數焉地既險隘賊多􅀈䂎䂎鋋也􅀈算也騎戰稍難太宗親自射之莫不應弦而倒辰起及午賊衆始退因乗之迫於城塹俘斬七千人自是不敢復出又曰高宗遣將裴行儉討突厥於黑山至朔州謂其下曰兵法尚詐者以權謀制敵也若御其下則非誠信不可行遣副將蕭嗣業運粮被掠兵多餒死所以敗也狡寇忸􅏸不可以不備乃詐為粮軍三百乘每車伏壯士五人各齎陌刀勁弩以羸兵數百人援之兼伏精兵居險以待之賊果大下羸兵棄車散走賊驅馬就泉井解鞍牧馬方擬取粮車中壯士齊發伏兵亦至殺獲殆盡賊衆奔潰自是續遣粮運無近之者又曰馬燧為魏博招討使田悦求救於淄青恒州李納遣大將衛俊將兵僅萬人以救悦李惟岳亦遣二千餘人救悦收合散兵二萬餘壁於洹水淄青軍其東恒州軍其西首尾相應燧帥諸軍進屯於鄴奏請益河陽兵詔遣河陽節度使李芃將兵㑹之軍次於漳悦遣將王光進以兵守長橋築月城以為固軍不得度燧乃於下流以兵車數百乘維鐵鎖絶中流實以土囊以遏水水稍淺諸軍畢渡是時軍粮少悦深壁不戰欲老燧軍燧令諸將持十日粮以進前次倉口與悦等夾洹水而軍李抱真等問曰粮少深入何也燧曰粮少利速戰兵法善於致人而不致於人今田悦與淄青恒州三軍為首尾計以老我師若分軍擊其左右兵少未必可破悦且來救是前後受敵也兵法所謂攻其必救固當戰也燧為諸公合而破之燧乃造三橋逾洹水日挑戰悦不敢出洹水兵自以軍少懼為燧所并引軍合於田悦燧令於軍中曰悦死傷之餘安敢出戰所恃者淄青軍爾吾當先破納軍則田悦坐受降也淄青軍聞懼亦引軍合於田悦燧明日復挑戰乃伏兵萬人欲邀之燧乃令諸軍半夜皆食先雞鳴時擊鼓潛率師傍洹水西徑趨魏州令曰聞賊至即為陣又令百騎鳴鼓角留於後乃抱薪持火待軍止鼓角匿其旁伺悦軍渡焚其橋軍行十數里悦乃率淄青恒州兵歩騎四萬餘踰掩其後乘風縱火鼓譟而進燧乃坐軍前除草斬榛棘廣百歩以為陣募勇士得五千餘人分為前引以俟賊至比悦軍至則火息氣乏力少衰乃縱擊之悦大敗時神䇿昭義河陽軍少却河東軍勝諸軍還鬭合擊之大破迫切洹水悦軍走橋橋已焚矣悦軍亂赴水斬首二萬殺賊大將孫晉卿安墨啜生獲三千餘人溺水死者不可勝數淄青軍殆盡死者相枕藉三十里悦收兵得千餘人夜走至魏州又曰元和十二年唐鄧節度使李愬奏以九月二十六日圍蔡州吳房縣攻其外城毁之斬首千餘級初將出攻左右曰以往亡日請避之愬曰賊以往亡謂吾不能來正可擊也及戰勝而歸賊以梟騎五百追愬愬下馬據胡牀令於衆曰後􅂞戈者斬由是衆悉力戰射殺賊將孫忠慮賊衆乃退或勸愬曰乘其退可拔吳房愬曰取之賊必合勢而固其穴不如留之使分其力太平御覽卷二百八十九
