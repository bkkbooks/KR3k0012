  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_502-1a, image: WYG0897/WYG0897-0520a.png}
body:
  text: 太平御覽卷五百二宋李昉等撰逸民部二逸民二後漢書曰王符字節信安定臨涇人好學有志隠居著書度遼將軍皇甫規解官歸安定鄉人有貨得鴈門太守者還家謁規規卧不迎既入而問卿在郡食鴈美乎有頃王符在門規素聞符名乃驚遽而起衣不及帶屣履出迎援符手而還與同坐極歡時人為之語曰徒見二千石不如一縫掖言書生道義之為貴也又曰向栩字輔興河南朝歌人常讀老子莊子好學道常坐竈北板牀上積久板乃有膝踝足指之處時賔就之輙伏不起時人莫能測後徴拜侍中侃然正色百官畏之又曰梁鴻字伯鸞扶風平陵人同縣孟氏有女狀肥醜甚黒力舉百鈞擇對不嫁年至三十父母問其故女曰欲得賢如梁鴻者鴻聞聘之入門七日而鴻不答妻乃跪床下請曰竊聞夫子髙義簡斥數婦妾偃蹇數夫今而見擇敢不請罪鴻曰吾欲裘褐之人可以俱隠今乃衣綺縞𫝊粉墨豈鴻所願哉妻曰以觀夫子之志耳妾自有隠居之服乃為椎髻布衣操作具而前鴻大喜曰此真梁鴻妻也字曰徳曜名孟光因共入霸陵山後至吳為人賃舂每歸妻為具飡舉案齊眉又曰戴良字叔鸞汝南慎陽人母卒兄伯鸞居廬啜粥非禮不行良獨食肉飲酒哀至乃哭二人俱有毁容或問良曰子之居喪禮乎對曰然禮所以制情佚也情苟不佚何禮之論夫食㫖不甘故致毁容之實若味不存口故食之可也又曰法真字髙卿扶風郿人博通内外圖典為闗西大儒弟子自逺方至者數百人性恬靜寡欲不交人間事太守見之曰欲以功曹相屈光賛本朝如何真曰以明府見待有禮故敢自同賔末若欲吏之真將在北山之北南山之南者矣太守戄然不敢復言又曰漢濵老父不知何許人桓帝幸竟陵過雲夢臨沔水百姓莫不觀者老父獨耕不輟尚書郎張温異之使問曰人皆觀老父獨不觀何也父曰我野人耳不達因請問天下亂而立天子耶治而立天子耶立天子以父天下耶役天下以奉天子耶昔聖王宰世茅茨不剪而萬民以寧今子之君勞民自縱逸逰無忌吾為子羞之又何忍與人觀之乎温大慙問其姓名不告而去謝承後漢書曰龍丘萇吳郡人篤志好學王莽簒位隠居太山以耕稼為業公車不應徴更始時任延年十九為東部尉折節下士鍾離意為主簿自請萇為門下祭酒教曰龍丘先生清過夷齊志慕原憲都尉灑掃其門猶懼辱之何召之有又曰鄭敬字次卿汝南人閑居不修人倫都尉逼為功曹㕔事前樹時有清汁以為甘露此木汁耳辭病去隠處精學同郡鄧敬公為都郵過存敬敬方釣魚於大澤因折芰為坐以荷薦肉瓠瓢盈酒言談彌日蓬廬蓽門琴書自娛世祖公車徴不行又曰楊后字仲桓廣漢人潛身藪澤耦耕誦經司徒楊震表薦其髙操公車時徴不就益州刺史焦叅行部致謁后惡其苛暴時耕於大澤即委鉏疾遊叅志恚之收其妻子録繋欲致后還不知后所在乃出其妻子又曰張奉字公先弟表字公儀河内人兄弟少有髙節立精舍教授惡衣麄食太𫝊袁隗以女妻奉送女奢麗奴婢百人皆被羅縠輜軿光路婦入門數年奉住精舍有如路人其妻待奉入朝乃徃前跪曰家公年老不以妾頑陋使待君巾櫛自知不副雅操君如欲執梁鴻之節妾欲懐孟光之微志奉無以答妻悉徹玩飾被服奴婢著縵帛執紡具奉然後納之諸公連徴不就謂之張氏兩賢又曰符融字偉明少為都官郎恥之委去私事少府李膺膺常貴融融幅巾褐衣振袂清談膺捧手髙聽歎息不暇郭林宗始入京師詣融融一見與定至交海内服融髙識公府連徴不就魏志曰張臶在甸切字子明少遊太學後遁常山并州牧髙榦辟不至表安樂令不就後遷居任縣廣平太守盧敏到官三日綱紀白承前致版謁臶敏教曰張先生所謂上不事天子下不友諸侯豈此版所可先飾哉但遣主簿奉書致羊酒之禮王隠晉書曰魏末有孫登字公和汲郡人無家屬時人於汲郡北山上土窟中得之夏則編草為裳冬則被髪覆之為人無言好讀易鼔琴初宜陽山中作炭者忽見有人不語精神不似常人帝使阮籍徃視與語亦不應籍因大嘯野人乃笑曰爾復作向聲又為嘯籍將求出野人不聽而去登岸嘯如簫鼓笙簧之音聲震山谷而還問炭人曰故是向人耳尋求不知所止推問久之乃知姓名孫登别𫝊又載又曰庾衮字叔褒潁川人與弟子治藩必跪而授條麥熟穫者已畢采捃尚多衮退待間及其捃也不屈行不旁掇跪而把之每饑率其邑人于山林拾橡為郡功曹舉清白異行皆不就位亂携妻子入林慮民歸之保於大頭山而田其下有終焉之心眩發柱杖扶起杖跌墜崖而死又曰董京字威輦不知何許人大始初值魏禪晉遂被髪佯狂常宿白社中時乞於市得殘碎繒絮結以自覆全帛佳綿則不肯受著作孫楚就社中與語遂載與歸終不肯坐後數年去莫知其所其寢處得一石子其詩曰末世流奔以文代質逝將抱此𤣥虛歸我寂寞之室又曰夏統字仲御會稽人常學戯船其母疾市藥于洛陽賈充聞而訪之問曰卿居海濵作何戱習仲御曰能戯船耳充因命焉仲御登舟歌枻為鯆􅀈䱐􅀈之歌學䱐甫之狀俄雲霧杳㝠白魚躍入其舟充甚異之因就與語仲御不對充正服謝之仲御引棹而去弗之見也充乃嘆曰可謂木人石心哉初仲御在鄉也人或説之使仕仲御勃然作色謂之曰我安能逐俗低眉下意乎聞君之言不覺寒毛競豎白汗四匝顔如渥丹心如火炙舌不住齒口不能張兩耳閉塞雙目俱瞑也遂竟不仕又曰董養字仲道惠帝時遷楊后于金墉有侍婢十餘人賈后奪之然後絶膳八日而崩仲道喟然歎曰天人既滅大亂將至傾危宗廟在其日矣顧謝鯤阮千里等曰時既如斯難可保也不如深居岩洞耳乃荷檐妻子推鹿車入于蜀山莫知所至又曰郭文字文舉河内人隠居不仕常居臨安及吳興餘杭依山結廬臨清澗植穀種蔴以供衣食常着褐布披鹿皮其山多虎豹文獨無藩籬格障虎豹並不至大興中楊州刺史王導聞其名乃自迎與相見尋而逃去莫知所在又曰郭瑀字元瑜燉煌人也避世不仕涼州牧張天錫遣使者孟公明備禮徴瑀乃指翔鴻以示之曰此鳥飛青雲之外翔深谷之中自東自西安可籠也遂逃入山公明乃拘其門人瑀歎曰吾入山逃禄避罪豈謂隱其行義翻乃害人乎乃出就徴及至姑臧值天錫母卒括髪入拜三踊而出還入南山天錫弗能强之後莫知所在又曰霍原字休明燕國廣陽人也少有志力叔父坐法當死原入獄訟之楚毒備加終免叔父年十八觀太學行禮因留貴遊子弟聞而重之初原以賢良徴累下州郡以遣皆不到也又曰郭琦音竒字公偉太原晉陽人也少方直有雅量博學武帝欲以琦為著作郎問琦族人尚書郎郭彰彰素疾琦答曰不識帝曰若如卿言即堪郎矣遂決意用之及趙王倫簒位又欲用琦琦曰我以為武帝吏不容復為今世吏終身處於家又曰魯褒字元道南陽人也好學多聞以貧素自居元康之後綱紀大壊褒傷時之貪鄙乃隠姓名而著錢神論以刺之褒不仕莫知所終又曰任旭字次龍臨海章安人也㓜孤兒童時勤於學及長立操清修不染流俗郷曲推而優之永康初恵帝博求清節俊秀之士太守仇馥薦旭清貞潔素學識通博詔下以禮發遣旭以朝廷多故尚志隱遁辭疾不行元帝初鎮江東聞其名辟為祭酒並不就咸和二年卒魏氏春秋曰阮籍少時常遊蘇門山山有隱者莫知其姓有竹實數斛自杵而舂籍従之與談太古無為之道五帝三王之義蕭然不經聽乃對之長嘯其音響亮蘇門生莞爾而笑籍既降蘇門生亦嘯若鸞鳯之音焉太平御覽卷五百二
