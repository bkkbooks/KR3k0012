body:
  text: 太平御覽卷九百五十七宋李昉等撰木部六楊柳下桂杉楓豫樟楊柳下齊書曰阮孝緒建武末青溪宫東門無故自崩大風拔東宫門外楊柳以問孝緒曰青溪皇家舊宅齊為木東為木位今東門自壊木其衰矣又曰劉悛之為益州刺史獻蜀柳數株條甚長狀若絲縷武帝植於太昌靈和殿前嘗嗟翫曰此楊柳風流可愛似張緒當年其見賞如此又曰何㸃性好事聞陸惠曉與張融並宅其間有池池上有二柳樹㸃嘆曰此池便是醴泉此樹便是交讓隋書曰柳幾字匡時初幾在周與族人文成公昻俱歴顯要及幾昻並為外職楊素時為納言方用事因上賜宴素戲幾曰二柳俱摧孤楊獨聳坐皆歡笑幾竟無言又曰周初有童謡曰白楊樹頭金雞鳴祗有阿舅無外甥静帝隋氏之甥既遜位而崩諸舅强盛又曰渤海公高熲少明敏有器局畧渉書史尤善詞令初孩孺時家有柳樹高百尺許亭亭如葢里中父老曰此家當出貴人唐書曰司稼卿梁孝仁高宗時監造蓬萊宫於諸庭院列種白楊將軍契苾何力鐵勒之渠率也於宫内縱觀孝仁指白楊云此木易長三數年間宫中可得隂映何力一無所應但誦古詩白楊多悲風蕭蕭愁殺人意謂此是塚墓間木非宫中所宜種孝仁遽令㧞去更樹梧桐又曰乾元中虢州刺史王竒光奏閿鄉縣界女媧墳天寳十三載大雨晦暝失所在至今河上側近忽聞雷風聲曉見其墳湧出上有雙楊柳樹下有巨石各高丈餘畫圖進上以示百官又曰吕渭為禮部侍郎中書省有柳樹建中末枯死興元元年車駕還京其樹再榮人謂之瑞柳以為賦題上聞而惡之渭因入閣遺失請託文紀遂出為潭州刺史又曰吐蕃土風寒苦物産貧薄所部邏婆川唯有楊柳人以為資更無草木又曰范希朝鎮振武單于城中舊少樹希朝於他處市柳子命軍人種之至今成林居人賴之春秋後語曰魏哀王以田需為相需音湏甚貴信之惠子謂田需曰子必善事左右今夫樹楊横之則生折而樹之又生戰國策曰夫楊横樹之亦生倒樹之亦生説不同故存之也然使十人樹楊一人㧞之則無生楊矣夫以十人之衆樹易生之物不勝一人㧞者何也樹之難去之易今子雖自樹於王而欲去子者衆則必危矣戰國䇿曰楚有養由基者善射楊葉百歩而射之百發百中管子曰五沃之土宜柳莊子曰支離叔觀於㝠伯之邱崑崙之墟黄帝之所休俄而柳生其左肘孟子告子曰性猶把柳義猶杯棬邱負切許慎淮南子注曰展禽之家有柳樹身行惠徳因號柳下惠一曰邑名抱朴子曰夫木槿楊柳斷植之更生倒之亦生横之亦生生之易者莫若斯矣山海經曰廆山之西有谷焉名曰雚谷其木多柳鳳伯之山熊山真陵之山木多柳平邱山爰有楊柳沃民之國有白柳崔豹古今注曰白楊葉圓楊葉長柳葉亦長細栘時題切楊圓葉弱帶微風則大揺一名高飛一名獨揺蒲柳生水邉葉似青楊亦曰蒲楊亦曰栘柳亦曰蒲栘焉水楊即蒲楊也枝勁韌音刃任矢用又有赤楊霜降則葉赤樹理亦赤也説文曰楊蒲柳也從木昜聲檉河柳也從木聖聲柳小楊也從木卯聲續搜神記曰上虞魏金家在縣北忽有一人著孝服皂笠手巾掩口來詣金家語云有錢一千萬銅器亦如之在大柳樹之下取錢當得而於君家大不吉僕㝷為君取便去自三十年遂不復來金亦不取錢盛𢎞之荆州記曰縁城堤邉悉植細柳綠條散風清隂交陌三齊略記曰高城東南有蒲臺高八尺始皇所頓處臺下有蒲縈焉至今蒲生猶榮似水楊而堪為箭孔氏志怪書曰㑹稽盛逸嘗蚤興路未有行人見門内柳樹上有一人長二尺餘朱衣冠冕俯以䑛樹葉上露良久忽見人神意如有驚遽即隠不見世説曰顧悦之與晉簡文帝同年悦之髪早白帝問卿何以先老對曰蒲柳之姿望秋先零松栢之質隆冬轉茂廣五行記曰周宣帝大定二年永州得白楊剖而為兩叚廣志曰白楊一名高飛木葉如大柳崔寔四民月令曰三月三日以及上除採柳絮柳葉浴瘡本草經曰柳葉一名柳絮夢書曰楊為使者魏文帝柳賦曰昔上與袁紹戰於官渡是時余始植斯柳在余年之二七植斯柳乎中庭始圍寸而高尺今連拱而九成曹植柳頌曰余以閑暇駕言出逰過友人楊徳祖之家視其屋宇寥廓庭中有一柳樹戲刻枝葉故著斯文桂爾雅曰梫音侵木桂今南人呼桂皮厚者為木桂桂樹葉似枇杷而大白花不著子叢生岩嶺間禮斗威儀曰君乘金而王其政訟平芳桂常長春秋運斗樞曰椒桂合剛陽椒桂陽星之精所生也合猶連體而生也春秋潛潭巴曰宫桂鳴下土諸侯號有聲桂好木植於宫中猶天子封有聲譽者為諸侯今乃鳴是乃成聲名於下土之祥也山海經曰招揺之山臨乎四海其上多桂桂長丈餘味辛臯塗之山上多桂木桂林八樹在賁隅東八樹成林言其大也春秋後語曰蘇秦在楚三年乃得見談卒辭行威王曰寡人聞先生若聞古人今先生不逺千里而臨寡人曾不肯留願聞其説蘇秦對曰楚國之食貴於玉薪貴於桂謁者難得見於鬼王難得見於帝今令臣食玉炊桂因鬼見帝何事不去威王曰先生就舍寡人聞命矣漢書陸賈傳曰尉佗獻桂蠧二器桂樹蠧蟲晉書曰郗詵遷雍州刺史武帝於東堂㑹送問詵曰卿自以為何如詵對曰臣舉賢良對䇿為天下第一猶桂林之一枝崑山之片玉唐書曰垂拱四年三月有月桂子降於台州經十餘日乃止又曰南中有泉流出山洞常帶桂葉好事者因謂為流桂泉後人乃立棟宇祀漢高之神莊子曰桂可食故伐之抱朴子曰桂可以葱㳿合蒸作餌亦可以竹瀝合餌之可以先知和石腦服之七年能歩行水上長生不死淮南子曰月中有桂樹郭子横洞㝠記曰武帝使董謁乘琅霞之輦以升壇至三更西王母駕𤣥鑾之輿至壇之四面列種軟條青桂風至枝自拂階上逰塵㝷陽記曰廬山上有三石梁長數十丈廣不盈尺杳然無底呉猛將弟子登山過北梁見一翁坐桂下以玉杯盛甘露漿與猛廣志曰桂出合浦而生必以高山之巔冬夏常青類自為林間無雜樹交趾置桂園列仙傳曰范蠡好食桂賣藥世人往往見之神仙傳曰離公婁服竹汁餌桂得仙許由巢父箕山得石丹沙石桂英服之闞子曰魯人有好釣者以桂為餌黄金為鈎拾遺記曰岱嶽一名浮折北有玉梁千丈駕𤣥流之上岸旁有丹桂可為舟世説曰客問陳季方曰君家有何功徳而荷天下重名曰吾家君譬如桂樹生泰山之阿上有萬仞之高下有不測之深上為甘露所霑下為川泉所潤當斯之時樹焉知太山之高川泉之深不知有功徳也金樓子曰夫翠飾羽而體分象美牙而身䘮蚌懐珠而致剖蘭含香而遭焚膏以明而遂煎桂以蠧而成疾羅浮山記曰羅山頂有桂山海經所謂賁隅之桂賁隅畨禺也臨海記曰白石之山望之如雪山有湖傳云金鵞之所集桂樹之所植説文曰桂江南之木百藥之長地理記曰桂陽郡有桂嶺放花遍白林嶺盡香又曰台山有八桂嶺漢武帝悼李夫人賦曰氣沉潛以悽戾兮桂枝落而銷亡楚詞注曰淮南王安好道與八公共登山攀桂樹安作詩曰攀桂樹兮淹留唐景龍文館記曰薰風殿其材木皆用青桂白檀香氣氛氲盈於四逺杉爾雅曰被煔音占或作杉似松生江南可以為船及棺以其理之不腐也晋咸康起居注曰侍御史秦武奏平陵前道東杉樹一株萎死以栢栽補之請收陵令推劾西京雜記曰太液池中有小池名孤樹池池中有洲洲上有煔樹一株十餘圍望之如車葢故取名之鄧徳明南康記曰巘山有漢太傅陳蕃墓遥望兩杉樹聳柯出嶺垂隂覆谷劉欣期交州記曰合浦東二百里有一杉樹葉落隨風飄入洛陽城内漢時善相者云此休徴當出王者故遣千人伐樹役夫多死三百人坐斷株上食適足相容名山志曰華子山岡上杉千仞被在崖側楓爾雅曰楓欇欇欇之葉反天風則缺故曰欇又樹似白楊葉圓岐有脂而香今之楓香是也後周書曰武帝天合元年秋七月辛丑梁州上言鳳凰集於楓樹羣鳥列侍以萬數山海經曰黄帝殺蚩尤棄其械化為楓樹金樓子曰楓脂千嵗為虎魄名山記曰天姥山上長楓千餘丈蕭蕭臨澗水晉宫闕名曰華林園楓香三株南方草木狀曰楓香樹子大如鳥卵二月花色白乃連著子八九月間曝乾可燒唯九真郡有之異苑曰烏傷陳氏有女未醮著屐徑上大楓樹顛更無危眩顧曰我應為神今便長去唯左倉右黄當暫歸耳家人悉出見之舉首辭訣於是飄聳輕越極睇乃沒既不了蒼黄之意每春輙以蒼狗秋以黄犬設祀於樹下任昉述異記曰南中有楓子鬼楓木之老者為人形亦呼為靈楓嶺表録異記曰楓人嶺多楓樹樹老則有瘤癭忽一夜遇暴雷驟雨其樹贅則暗長三數尺南中謂之楓人越巫云取之雕刻神鬼易致靈騐離騷招魂曰湛湛江水上有楓目極千里傷春心豫章左傳哀公白公作亂殺子西子期子期曰昔者吾以力事君不可不終抉豫章以殺人而後死陳書曰侯景之平也太極殿被焚承聖中議欲營之猶闕一柱七月有樟木大十八圍長四丈五尺流泊陶家後渚監軍鄒子慶以聞詔曰令沈衆兼起部尚書構太極殿莊子曰騰猿得豫章􅄃蔓而生長於其間便也淮南子曰藜藿之生蠕蠕然日加數寸以為櫨棟加益也櫨猶屋也楩柟豫章之生也七年而後知故可以為棺舟高士傳曰堯聘許由為九州長由惡聞洗耳於河巢父見謂之曰豫章之木生於高山工雖巧而不能得子避世何不藏身地理志曰豫章郡城南有樟樹長數十丈立郡因以為名至晉永嘉年尚茂廣志曰豫章生七年外始辨凡木似豫章故待七年當分别神異經曰東方有豫章千丈有士操斧行斫行合新語曰賢者之處世猶金石穴於沙中豫章産於幽谷水經曰豫章城之南西門曰松陽門門内有樟樹高七丈五尺大二十五圍枝葉扶疏垂隂數畝應劭漢官儀曰豫章郡樹生庭中故以名郡而此樹常中枯逮晋永嘉中一旦更茂豐蔚如初咸以為中宗之徴祥也豫章記曰新塗縣封谿有攝友所用樟樹木戕柯者遂生任昉述異記曰豫章之為木也生七年而後可知漢武寳鼎二年立豫樟宫於昆明池中作豫樟木殿太平御覽卷九百五十七
