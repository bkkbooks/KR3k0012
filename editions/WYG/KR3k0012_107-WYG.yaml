body:
  text: 太平御覽卷一百七宋李昉等撰皇王部三十二隋恭皇帝李宻王世充竇建德隋恭皇帝隋書曰恭皇帝諱侑元徳太子之子也母曰韋妃性聡敏有器度大業三年立為陳王後數載徙為代王邑萬户及煬帝親征遼東令於京師總留事十一年從幸晉陽拜太原太守尋鎮京師義兵入長安尊煬帝為太上皇奉帝纂承大業十三年十一月壬戌上即皇帝位於大興殿詔大赦天下改義寕元年大辟罪已下咸赦除之甲子以光祿大將軍太尉唐公為假黄鉞使持節都督内外諸軍事尚書令大丞相進封唐王二年三月丙辰左屯衛將軍宇文化及弑太上皇於江都宫立秦王浩為帝戊辰詔唐王備九錫之禮加璽紱逺逰冠緑綬位在諸侯王上唐國置丞相已下一依舊式五月戊午詔曰天禍隋國大行太上皇遇盗江都酷甚望夷釁深驪北憫予小子奄逮丕諐哀號永感心懐麋潰仰惟荼毒仇復靡申形影相弔㒺知啓處相國唐王應期命世扶危拯溺自北走南東征西怨總九合於一匡決百勝於千里糾率夷夏大庇民黎保乂朕躬繄王是賴徳侔造化功格蒼旻兆庶歸心厯數斯在屈為人臣載違天命在昔揖讓相推茍非重華誰堪命禹當今九服崩離三靈改卜大運去矣請避賢路兆謀布徳願已莫能私重命駕須歸藩國予本代王及予而代天之所使豈其如是廣憑稽古之典以誅四㓙幸値維新之恩預充三恪雪寃恥於皇祖守禋祀於孝孫朝聞夕殞及泉無恨今遵故事遜於舊邸庶官羣辟改事唐朝冝依前典輒上尊號若釋重負感泰兼懐假手真人俾除醜逆濟濟多士明知朕意仍勅有司凡有表奏皆不得以聞是日上遜位於大唐唐以上為酅國公武徳二年夏五月崩時年十五史臣曰恭帝年在幼冲遭家多難一人失徳四海土崩羣盗蜂起豺狼塞路南巢遂徃流彘不歸既鍾百六之期躬踐數終之運謳歌有屬笙鏞變響雖欲不遵堯舜之迹其庸可得乎李宻唐書曰李宻字𤣥邃遼東襄平人也父寛隋上柱國蒲山公宻以父䕃為左親侍常在仗下煬帝顧見之退謂許公宇文述曰向者在仗下小兒為誰許公對曰故蒲山公李寛子宻也帝曰箇黒色小兒視瞻異常勿令宿衛他日述謂宻曰弟聡令如此當以才學取官王衛藂脞非養賢之所宻大喜因謝病專以讀書為業時人希見其面嘗欲尋包愷乘一黄牛被以蒲韀仍將漢書一帙掛於角上一手捉牛靷一手翻書卷尚書令越國公楊素見於道從後按轡躡之既及問曰何處書生躭學若此宻識越國公乃下而再拜自言姓名又問所讀書答曰項羽傳越公竒之與語大恱謂其子𤣥感等曰吾觀李宻識度汝等不及於是𤣥感傾心結託大業九年煬帝伐髙䴡調兵將天下騷動𤣥感將謀舉兵潛遣人入闗迎宻以為謀主宻至謂𤣥感曰今天子出征逺在遼外今公擁兵出其不意長驅入薊直扼其喉前有髙䴡退無歸路不過旬朔賫粮必盡舉麾一召其衆自降不戰而擒此計之上也闗中四塞天府之國若西入長安掩其無備天子雖還失其襟帶據險臨之故當必尅萬全之勢此計之中也若隨近逐便先向東都頓堅城之下勝負殊未可知此計之下也𤣥感曰公之下計乃上䇿也宻計遂不行及𤣥感敗宻乃間行入闗為捕者所獲時煬帝在髙䴡宻與其黨俱送帝所及出闗外防禁漸弛宻乃多市酒食每夜讌飲諠譁竟夕使者不以為意行至邯鄲宻等七人夜穿牆而遁詣淮陽隐姓名自稱劉智逺聚徒教授經數月宻鬱鬱不得志為詩曰金風盪初節玉露凋晩林此夕窮途士鬱陶傷寸心野坪葭莩合村落藿藜深眺聽良多感徒淚獨霑襟霑襟何所為悵然懐古意秦俗猶未平漢道將何冀樊噲市井屠蕭何刀筆吏一朝時運㑹萬古傳名諡寄言世上英虚名其所愧詩成而泣下數行㑹東都賊帥翟讓者聚黨萬餘人宻徃歸之宻因王伯當以䇿干讓曰當今主昏於上人怨於下銳兵盡於遼東和親絶於突厥方乃巡逰揚越委棄京都此亦劉項奮起之㑹以足下雄材大畧席卷二京誅滅暴虐則隋氏不足亡也翟讓深加敬異遣說諸小賊所至皆降宻又說讓曰今兵衆既多粮無所出若直取滎陽休兵館榖待士馬肥充然後可與人爭利讓以為然於是破金堤闗掠滎陽諸縣堡城多下之滎陽太守楊慶及通守張須陁以兵討讓讓懼將逺避之宻曰須陁勇而無謀兵又驟勝既驕且狠可一戰而擒之公但列陣以待為公破之將戰宻分兵千餘人於林木間設伏讓與戰不利稍却宻發伏自後掩之須陁衆潰與讓合擊大破之遂斬須陁於陣讓於是令宻别統所部宻尋復說讓曰昏主蒙塵播蕩吳越羣兵競起海内飢荒明公以英傑之才統驍雄之旅宜當廓清天下誅剪羣凶豈可求食草間為小盗而已今東都士庶中外離心留守諸官政令不一明公親率大衆直掩興洛發倉粟以賑窮乏逺近孰不歸附百萬之衆一朝可聚先發制人此機不可失也讓曰請君先發僕領諸軍便為後殿得食之日當别議之大業十三年春宻與讓領兵七千人出陽城北踰方山自羅口襲興洛倉破之恣人所取老弱襁負道路不絶衆至數十萬隋越王侗遣虎賁郎將劉長恭率步騎二萬五千討宻宻一戰破之長恭僅以身免讓於是推宻為主號魏公二月於鞏南設壇塲即位稱元年其文書行下稱行軍元帥魏公府拜翟讓為司徒封東郡公於是城洛口以居之隋虎賁郎將裴仁基率其子行儼以虎牢歸宻因遣仁基與孟讓率兵二萬餘人襲興洛倉破之入東都郛郭掠居人燒天津橋東都出兵乘之仁基等大敗宻復親率兵三萬逼東都將軍段達等出兵七萬拒之戰於故都城隋軍敗走宻復下興洛而據之大修營塹以偪東都仍作書數煬帝十罪以移郡縣宻兵鋒甚銳毎入陣與隋軍連戰㑹宻為流矢所中卧於營内東都復出兵乘之宻衆大潰棄興洛倉歸於洛口煬帝遣王世充率勁卒五萬擊之宻與戰不利世充營於洛西與宻相拒百餘日大小六十餘戰武陽郡丞元寳蔵黎陽賊帥李文相平原賊帥郝孝徳並歸於宻共襲破黎陽據之翟讓部將王儒信勸讓為大冢宰總統衆務以奪宻之權讓兄寛復謂讓曰天子止可自作安得與之汝若不能作我當為之宻聞其言隂有圖讓之計㑹世充列陣而至讓出拒之為世充所擊讓軍少失利宻率精銳赴之世充敗走明日讓至宻所欲為宴樂具饌以待之宻引讓入座以良弓示讓讓方引滿宻遣壯士自後斬之并殺其兄寛及王儒信讓部將徐世勣單雄信等頓首求哀宻并釋而慰諭之乃命徐世勣單雄信王伯當分統其衆未㡬世充襲倉城宻復破之世充復移營洛北造浮橋悉衆以擊宻宻與千餘騎拒之不利而退世充因薄其城下宻簡銳卒數百人以邀之世充大潰乘勝陷偃師於是修金墉城居之有衆三十餘萬將作大匠宇文愷叛東都降於宻東至海岱南至江淮郡縣莫不遣使歸宻竇建徳朱粲楊士林孟海公徐𤣥朗盧祖尚周法明等並遣使通表於宻勸進於是宻下官屬咸勸宻即尊號宻言東都未平不可議此及義旗建宻負其强盛欲自為盟主乃致書於髙祖為兄請合從以滅隋髙祖覽書笑曰李宻陸梁放肆不可以折簡招致吾方安輯京師未遑東討即相阻絶此便是更生一敵吾寧推顧使驕其志我得留闗中大事濟矣乃復書曰天生蒸民必有司牧當今為牧非子而誰惟弟早膺圖籙以寧兆民宗盟之長屬籍見容得復封于唐斯榮足矣宻得書甚恱示其部下曰唐公見推天下不足定於是不虞義師而專意於世充俄而宇文化及率衆自江都北指黎陽兵十餘萬宻乃自將步騎二萬拒之隋越王侗稱尊號遣使者授宻太尉尚書令東南道大行臺行軍元帥魏國公令先平化及然後入朝輔政宻將與化及相抗恐前後受敵因卑辭以報謝焉化及至黎陽與宻相遇宻遣徐世勣守倉城化及攻之不能下宻知化及粮且盡因偽與和以弊其衆化及弗之悟大喜恣其兵食冀宻饋之後知其詐化及怒與宻大戰於衛州之童山下宻為流矢所中頓於汲縣化及力竭粮盡衆多叛之掠汲縣北趣魏縣宻引兵而西遣使朝於東都執弑煬帝者于𢎞達以獻越王侗侗召宻入朝至温縣聞世充作難而止乃歸金墉城宻雖據倉而無府庫兵數戰皆不獲賞又厚撫初附之兵由是衆心漸離武徳元年九月世充以其衆五千來决戰宻留王伯當守金墉自引精兵就偃師北阻邙山以待之世充軍至宻遂敗績萬餘人馳向洛宻將入洛口倉城邴元真已遣人潛引世充宻因知之不發其事欲待世充兵半渡洛水然後擊之及世充軍至宻候騎不時覺比將出戰世充軍已濟矣宻自度不能支引騎而遁往赴武平元真以城降於世充宻將入黎陽或人謂宻曰向殺翟讓徐世勣等傷幾死創猶未平安可保乎時王伯當棄金墉保河陽宻以輕騎自武平歸之謂伯當曰兵敗矣徒苦諸君我今自刎請以謝衆伯當抱宻號呌慟哭衆皆莫敢仰視宻復曰諸君幸不相棄當共歸闗中宻雖無功諸君必冨貴於是從入闗尚二萬人髙祖遣使迎勞相望於道宻大喜謂其從曰我有衆百萬一朝至此命也今敗歸國幸蒙殊遇當思竭忠以奉所事耳且山東連城數百知吾至此遣使招之盡當歸此於竇融勲亦不細豈不堪一台司見處乎及至京師禮數益薄尋拜光祿大夫卿封邢國公未㡬聞其所部將帥皆不附世充髙祖使宻領本兵往黎陽招集故時將士經畧世充時王伯當為左武衛將軍亦令為副宻行至桃林髙祖復徴之宻大懼謀將叛伯當力止之宻不從因謂宻曰義士之立志不以存亡易心伯當荷公恩禮期以性命相報乃簡驍勇數十人著婦人衣載貲装蔵刀裾下詐為妻妾自牽之入桃林縣舎須臾變服突出因據縣城驅掠畜産直趣南山時右翊衛將軍史萬寳留鎮熊州遣副將盛彦師率步騎數千追躡至陸渾縣南七十里與宻相及彦師伏兵山谷宻軍先渡横出擊敗之遂斬宻王世充唐書曰王世充字行滿祖西域人祖支頹耨世充頗涉經史尤好兵法及龜筮推步之術開皇中以軍功拜儀同善敷奏明法律然舞弄文法髙下其心或有辨駁之者世充利口飾非辭義鋒起衆雖知其不可而莫能屈大業中累遷江都郡丞兼領江都宫監時煬帝數幸江都世充善候人主顔色阿諛順旨毎入言事帝必稱善乃雕飾池臺因奉逺方珍物以媚於帝由是益信之十年齊郡賊帥孟讓自長白山㓂掠諸郡至盱眙有衆十萬世充以兵拒破之煬帝以世充有將帥才畧復遣領兵討捕諸小盗所向盡平十一年突厥圍煬帝於雁門世充盡發江都人將往赴難在軍中蓬首垢面悲泣焦勞曉夜不解甲藉草而卧煬帝聞之以為忠益信任之十二年遷江都通守及李宻攻陷洛口倉逮逼東都煬帝詔世充大發兵於洛口以拒宻又遣就軍拜世充為將軍趣令破賊世充引軍渡洛水與李宻戰世充軍敗績乃率餘衆歸河陽時天寒大雪比至河陽纔存數千世充自繫請罪越王侗遣使赦之徴還洛陽置營於含嘉倉城収合亡散復萬餘人俄而宇文化及作難越王侗遂嗣位於東都拜世充為吏部尚書封鄭國公進拜尚書左僕射總督内外諸軍事世充去含嘉城移居尚書省專宰輔政以其兄世暉為内史令入居禁中弟咸擁兵馬鎮諸城邑未幾李宻破宇文化及還其勁兵民馬多戰死士卒疲倦世充欲乘其弊而擊之恐人心不一乃假托鬼神言夢見周公乃立祠於洛水遣巫言周公欲令僕射急擊李宻當有大功否則兵皆疾死充兵多楚人俗信妖言皆請戰充簡錬精勇得二萬餘人馬二千餘疋軍於洛水南宻軍偃師北山上充令軍人秣馬蓐食遲明而薄宻宻軍潰以數十騎走河南率餘衆入朝世充盡収其衆振旅而還侗進世充太尉以尚書省為府備置官屬充嘗於侗前賜食還家遂大吐嘔疑遇毒所致自是不復詣朝諷侗欲加九錫之禮二年三月遂䇿授相國總百揆封鄭王加九錫備物段達雲定興等入見於侗曰天命不常鄭王功徳甚盛願陛下揖讓吿禪遵唐虞之迹侗怒四月假為侗詔䇿禪位遣兄世暉廢侗於含涼殿僣皇帝位建元曰開明國號鄭立子𤣥應為皇太子世充每朝聽必殷勤訓諭言詞重復千端萬緒或輕騎逰厯街衢亦不清道謂人曰昔時天子深坐九重下情無由開徹世充非貪寳位本欲救時今當如一州刺史毎事親覽當與士庶共評朝政今特於順天門外置座聽朝又令西朝堂受屈抑東朝堂受直諌於是獻書言事日有數百條疏奏既煩省覽難遍數日不復更出世充遣其將士鴆殺侗諡曰恭皇帝十一月世充率衆東徇至滑州以兵臨黎陽世充屯兵不敢進倉粟日盡城中人相食七月秦王率兵攻之陳兵於青城宫世充悉兵來拒隔澗而言曰隋末喪亂天下分崩長安洛陽各有分地世充唯願自守不敢西侵王乃過相侵逼逺入吾地三分其道千里饋粮以此出師未見其可太宗謂曰四海之内皆從正朔惟公執迷獨阻聲教東都士庶亟請王師開張義勇咸思致力至尊重違衆願有所弔伐若轉禍來降則冨貴可保如故相抗無假多言世充無以對太宗分遣諸將攻其城鎮所至輒下九月王君廓攻抜世充轘轅後河南州縣相次降附十一月竇建徳遣人結好并陳救援之意世充乃遣其兄子琬及内史令長孫安世報急且乞師四年二月世充率兵出方諸門與王師相抗世充兵敗因乘勝追之屯其城門世充不復敢出但嬰城自守以待建徳之援三月秦王擒建徳并王琬長孫安世等于虎牢回至東都城下以示之且遣安世入城言敗狀世充惶惑不知所為將潰圍出南走襄陽問諸將皆不答乃率其將吏詣軍門請降秦王以世充至長安髙祖數其罪世充對曰計臣之罪誠不容誅但陛下愛子秦王許臣不死髙祖乃釋之與兄苪妻子同徙於蜀將行為仇人獨孤循徳所殺世充自簒位凡三年而滅竇建徳唐書曰竇建德漳州漳南人少時頗以然諾為重為里長犯法適亡去㑹赦得回父卒送𦵏者千餘人有所贈皆讓而不受大業七年募人欲討髙䴡本郡遂補建德為隊長是時山東大水人多流亡邑人孫安祖者妻子俱已餒死縣以安祖驍勇過人亦選在其中安祖辭貧自往言於漳南令令怒遂笞之安祖刺殺令亡投建徳建徳舍之是嵗山東大饑建徳謂安祖曰丈夫不死當立大功豈可為迯亡之虜也髙雞泊中廣大數百里奥阻深逺可以迯難乘間而去虜掠足以自資既得衆人且觀時變當必有大功於天下矣安祖然其計建徳招誘逃亡兵及無産者因得數百人令安祖率之入泊中為盗安祖自稱將軍時有隃人張金稱者亦結聚得萬餘人在河阻中蓚人髙士達亦得兵數千餘人在於清河界中時諸盗賊徃來漳南者所遇皆殺掠居人焚燒舎宅獨不入建徳之閭由是郡縣意建徳與賊交結遂收繫家屬無少長盡皆殺之建徳聞其家已被屠戮乃率麾下二千人亡歸於士達士達自稱為東海公以建徳為司兵後安祖為張金稱所殺其兵數千人又盡歸於建徳自此盗兵漸至萬餘人猶徃來髙雞泊中十二年涿郡通守郭絢率精兵萬餘人來討士達士達自以智畧不及建徳乃推軍司馬咸以兵授焉建徳既初董衆欲立奇功以㓕羣盗請士達守其輜重自簡精兵七千人以拒絢大破絢軍絢於是以數千騎遁走遣將追及平原斬其首以獻士達由是建徳之聲勢益振隋遣太僕卿楊義臣率兵萬餘人討張金稱破之於清河所獲賊衆皆屠滅餘㪚草澤間者後皆相聚共投建徳義臣乘勝至平原欲入髙谿泊建徳謂士達曰吾觀隋將善用兵者惟義臣耳新破金稱逺來襲我其鋒不可當請引兵避之令其欲戰不得空延嵗月必將疲倦乘便襲擊可有大功今若争鋒恐公不能當也士達不從其言因留建徳守壁自率精兵迎擊義臣果破士達於陣前斬之乘勝追奔將圍建徳守兵既少聞士達敗衆皆潰散建徳率百餘騎亡去義臣殺士達以為建徳不足憂建徳急還平原招集士卒得數千人軍復大振始自稱將軍此後諸郡縣長吏率城以降之軍容於是益盛勝兵十餘萬人十三年正月築墻塲於河界樂夀邑中自稱長樂王進攻河間頻戰不下其後城中食少又聞煬帝被殺郡丞王琮率吏卒發喪建徳遣使弔之琮因使請降始都樂夀號曰金城宫自是郡縣率多下之武徳二年宇文化及僣號於魏縣建徳即日起兵討化及保聊城建徳四面攻城陷之建徳入城先謁隋皇后蕭氏語稱臣遂悉收弑煬帝首謀者斬之梟首於轅門之外囚化及并其二子同収檻車後斬之攻陷洛州虜刺史袁子斬之遷都於洛州因號為萬春宫又與王世充交結遣使朝隋越王侗於洛陽後世充為侗廢立事乃與之絶交因始自為進尊號别立名位以振當時大建天子旌旗出入警蹕下書言詔追諡煬帝為閔帝然猶依附突厥隋義城公主先嫁突厥又傳化及首以獻公主既與突厥相連兵鋒益盛南侵相州河北大使淮安王神通不能拒退奔黎陽相州陷又進攻衛州陷黎陽九月建徳自帥師圍幽州羅藝出與戰大破之斬首千二百級先是曹州濟隂人孟海公擁精兵三萬據周橋城以掠河南之地其年十一月建徳自率兵渡河以擊之四年二月建徳尅周橋虜海公留其將范願守曹州悉發海公及徐圓朗之衆來救世充軍至滑州世充行臺僕射韓洪開城納之遂進逼元州梁州營州皆陷之屯於滎陽三月春秦王入武牢進薄其營多所傷殺并擒其將殷秋石瓚時世充弟世辨為徐州行臺遣其將郭士衡領兵千人從之合衆十萬餘號為三十萬次成皋築宫於坂堵以示必戰又遣間使約世充為表裏秦王遣將軍王君廓領輕騎千餘抄其粮運獲其將張青持等其衆多思歸洛州凌敬進說曰兵宜悉濟河攻取懐州河陽使重將居守更率衆鳴鼓建旗踰太行入上黨先聲後實傳檄而定漸趨壺口騷駭蒲津收河東之地此䇿之上也行此必有三利一則入無人之境師有萬全二則招士得兵三則鄭圍自解建徳將從之而世充之長史長孫安世隂賫金玉啗其諸將以亂其謀衆咸進諌曰凌敬書生耳豈可與言戰乎建徳從之敬固争建徳怒扶出焉於是悉衆進逼武牢官軍按甲剉其銳建徳結陣於汜水秦王遣騎挑之建徳進軍而戰竇杭當之建徳少却秦王馳騎深入大破之建徳中創竄於牛口渚車騎將軍白士讓楊武威生獲之建徳所領兵衆一時奔潰妻曹氏及其左僕射齊善行將數百騎遁於洛州餘黨欲立建徳養子為主善行曰夏王平定河朔士馬精强一朝既被擒如此豈非天命有所歸也不如委心請命無為塗炭生人遂以府庫財物分與故將各令㪚去善行乃與建徳右僕射裴矩行臺曹旦及建徳妻率其官屬舉山東之地奉傳國八璽來降七月秦王俘建徳至京師斬於長安市年四十九自起至滅凡六嵗河北悉平太平御覽卷一百七
