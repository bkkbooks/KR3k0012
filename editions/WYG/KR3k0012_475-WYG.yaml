body:
  text: 太平御覽卷四百七十五宋李昉等撰人事部一百十六待士毛詩曰鹿鳴燕群臣嘉賓也既飲食之又實幣帛筐篚以將其厚意然後忠臣嘉賓得盡其心矣家語曰孔子喟然嘆曰向使銅鞮伯華無死天下其定矣子路曰願聞其為人子曰其㓜也敏而好學其壯也有勇而不出其老也有道而能下人有此三者以定天下何難乎子路曰㓜而好學壯而有勇則其可也若夫有道誰下哉子曰由汝不知也吾聞以衆攻寡無不克也以貴下賤無不得也昔者周公居冡宰之尊制天下之政猶下白屋之士白屋草舎日見百七十人斯豈以無道也欲得士之用也戰國策曰管燕得罪齊王謂其左右曰子孰能與我赴諸侯乎左右莫對管燕漣然流涕曰悲夫士何為其易得而難用也田需對曰士三食不得厭而君鵝鶩有餘食下宫蹈羅紈曵綺縠而士不得以為縁且財者君之所輕死者士之所重君不肯以輕與士而責士以所重事君非士易得而難用也又曰孟嘗君舎人有與君夫人相愛者或以聞孟嘗君曰覩貌相說者人之情也勿言君朞年乃召愛夫人者而謂之曰子與文遊久矣大官未可得小官公不欲衛君與文布衣之交請具車馬皮幣願公以此從衛君逰衛君欲約兵攻齊是人謂衛君曰孟嘗君不臣不肖以臣欺君今君約天下之兵攻齊是足下欺孟嘗君也願君勿以齊為心如不聽臣臣血湔足下衿衛君乃止乂曰中山之君所傾蓋輿車而朝窮閭隘巷之士者七十家史記曰西伯敬老慈少禮下賢者日中不暇食以待士伯夷叔齊太顛閎夭散宜生之徒皆歸之又曰齊宣王喜文學遊說之士自如鄒衍淳于髠之徒七十六人皆賜列第為上大夫是以齊稷下學士復盛又曰帝召田横乃與其客二人乘傳詣雒陽未至户鄉廐置横謝使者遂自刎令客奉其頭從使者奉之高帝拜二客為都尉以王禮葬横二客穿其冡旁孔自刎而從之海中五百人聞横死皆自殺於是乃知田横兄弟能得士也又曰孟嘗君君在薛招致諸侯賔客及亡命有罪者皆歸孟嘗君孟嘗君舍業厚遇之以故傾天下之士食客數千人無貴賤一與之等孟嘗君待客夜食有人蔽火光客怒以飯不等輙辭去孟嘗君起自以其飯比之客慙自剄又曰信陵君為人仁而下士士無賢不肖皆謙而禮交之不敢以其富貴而驕士士以此方數千里爭歸之又曰鄒陽上書梁王曰蘇秦相燕燕人惡之於王按劒而怒食以駃騠白圭顯於中山人惡之魏文侯投以夜光之璧何則兩主二臣剖心析肝相信豈移於浮辭哉又曰周公曰我一沐三握髪一飯三起以待士猶恐失天下之賢人也漢書司馬遷云愚以為李陵素與士大夫絶甘分少能得士死力雖古名將不能過也又曰班伯為定襄太守至郡問耆老父母故人有舊恩者迎延嘗滿日為供具執子孫禮又曰朱􅀶好樂士大夫為郡守九卿賔客滿門欲仕宦者舉薦之欲報仇怨者解劒以帶之其趨待士如是􅀶以此自立然終用敗又曰鄭當時為太子舎人每五日洗沐常置驛馬長安諸郊請謁賔客夜以繼日又曰鄭當時遷大司農戒門下客至無貴賤無留門者執賔主之禮以其貴下人東觀漢記曰竇固為奉車都尉與駙馬都尉耿秉北征匈奴遂滅西域開通三十六國在邉數年羗胡親愛之炙肉未熟人人長跪前割血流指間進之於固固輙為噉不穢賤也是以親之如父謝承後漢書曰皇甫嵩為三公以身起於汗馬常折節下士也魏書曰劉平結客刺劉𤣥德𤣥德不知待客甚厚客以狀語之而去是時人民饑饉多抄略𤣥德外禦冦難内豐財施士之下者必與同席而坐同簋而食無所簡擇衆多歸焉蜀志曰曹公還許先主為左將軍禮之逾重出同輿坐同席又曰董允嘗與尚書令費禕中典軍胡濟等期遊宴嚴駕已辦而郎中董恢詣允脩敬恢年少官㣲見允停出逡巡求去允不許曰本所以出者欲與同好遊談也今君已自屈方展闊舎此之談就彼之宴非所謂也乃命解禕等罷駕不行其守正下士凡此類也呉志曰顧邵當之豫章發在近路會張景病時送者百數邵辭賔客曰張中節有疾若不能來别恨不見之蹔還與訣諸君少相待其留心下士唯善所在皆此類也王隱晉書曰王渾字元冲平呉後處兩州吳人新附皆有畏懼之心渾撫循羈旅勞謙接納坐無空席門不停賔於是江東諸士莫不敬愛宋書曰羊欣嘗詣領軍將軍謝混混拂席改服然後見之時混族子􅂕運在坐退告族兄瞻曰將軍見羊欣遂易衣改席欣由此益知名王智深宋紀曰謝景仁嘗詣髙祖髙祖乃命召景仁弟述時為豫州主簿不從高祖遂輟箸不食湏述至乃食其見重如此後魏書曰陵馥為相州刺史封長廣公為政清平抑强扶弱州中有德宿老名望素重者以禮待之詢之政事責以方略如此者十人號曰十善又簡取縣强門百餘人以為假子誘接慇懃賜以衣服令各歸為耳目於外於是發姦擿伏事無不騐百姓以為神明又曰賈思伯性謙和傾身禮士雖在街途停車下馬接誘恂恂曽無倦色客有謂思伯曰公今貴重寧能不驕伯曰衰至便驕何常之有當時以為雅言唐書曰李勉禮賢下士終始盡心以名士李廵張叅為判官卒於幕三嵗之内每遇宴飲必設虛位於筵次陳膳執酹辭色悽惻論者美之又曰裴度以平賊報國為己任自德宗朝宰相歸私第百官不敢及門度以方討不庭宰臣宜日接多士冀有所得因奏諸私家通賔客上方屬意遂許之四方布衣盡得以策畫干丞相至今宰臣私接士因度之請也又曰楊炎樂賢下士以汲引為己任天下士子趨嚮之又皇甫謐逸士傳曰公儀潜魯人也少而厲行樂道不事諸侯與子思友魯穆公聞其賢因子思而致命欲以為相謂子思曰公儀子必輔寡人寡人將三分魯國而與之晉諸公讃曰張華􅀶識多聞無物不知薦舉高朗經傳有美於華起家為太子舎人病疽截手遂廢朝廷重之就以為國子博士髙閭燕志曰李陵居長谷之東先主與高雲遊讌往來每憇其家陵與其妻王氏每夜自賫酒饌而至晏子春秋曰晏子之晉至中牟覩弊冠衣裘負芻息於途側晏子問曰何者對曰我越石父也不免饑凍為人臣僕晏子解左驂贖之載以俱歸崔鴻十六國春秋後秦録曰太尉文成公姚顯字子章興之弟也清秀明發文武兼才為令録十餘年無粃政機務之暇賔客如雲謙虛傳受待士以布衣之禮或昏夜靜處與賢士談論政事王孫子新書曰楚莊王攻宋厨有臭肉罇有敗酒將軍子重諫曰今君厨有臭肉而不可食罇有敗酒而不可飲三軍之士皆饑色欲以勝敵不亦難乎說苑曰趙簡子遊於西河而樂之歎曰安得賢士而與處焉舟人古桑對曰鴻鵠髙飛逺翔其所恃六翮也背上有毛腹下有毳無尺寸之數去之滿把飛不能為之髙不知門下左右客千人者亦有六翮之用乎將盡毛毳也新序同苐稱晋平公又云三千餘人又曰周公一日白屋之士所下者凡七十人而天下之士皆至晏子所與同衣食者百人而天下之士亦至又曰周威王問於寗子曰取士有道乎對曰有窮者逹之亡者存之疾者起之士則四方而至矣故士存則國存士亡則國亡子胥怒而亡之包胥怒而存之胡可不貴乎俗說曰謝萬詣簡文萬來無衣幘可前簡文曰但前不湏衣幘即呼使入萬着白綸巾鶴􅌁裘履板而前旣見共談移日大器之漢雜事曰于定國謙遜下士士雖貧徒歩徃過皆與均禮又曰公孫𢎞為丞相起客舘開閣延賢人與叅謀議身自食脱粟飯一器盡以俸禄與故人賔客又曰倪寛為人卑體下士務在得人心擇用仁孝推誠與下不求名譽英雄記曰袁紹有姿貌威容愛士養名旣累世台司賔客所歸加以傾心折節莫不爭赴其庭士無貴賤與之抗禮又環濟吳中記曰孟仁少以敏逹知名從南陽李恭學其母賢而有智為作大被或問其故母曰小兒無德以致客學者多貧故為大被庶可得氣類相接也黄石公記曰黄梁昔將用兵人有饋一簞醪者使投之於河令將士迎而飲之夫一簞醪不能味一河水三軍思為之死非滋味及之也劉向新序曰燕相得罪於君將出亡召門下諸大夫曰能從我出乎三問莫對燕相曰士之不足養也有進者曰饑年惡歳士糟糠不足而君之犬馬有餘榖隆冬冽寒士短褐不完而君之臺觀帷錦繡自若財者君之所輕死者士之所重也君不能施君之所輕而求得士死胡可得也鬻子曰吾不恐四海之士留於道路也吾恐其留門庭是以四海之士皆至莊子曰子張見魯哀公不禮託僕夫而去曰臣聞君好士故不逺千里以見君不禮士也有似葉公子髙之好龍室彫文盡冩以龍於是天龍下之窺頭於牖拖尾於堂葉公見之棄而還走失其魂魄五色無主是葉公非不好龍也好夫似龍而非龍也今君非不好士也好夫似士而非士者也新序同吕氏春秋曰張儀將西遊於秦過東周客有語之於昭文君者曰張儀壯士也君西遊於秦願君之禮貌之昭文君見謂之曰寡人國雖小請與客共之張儀乃北面再拜淮南子曰楚相子發好求伎道之士士有術者無不養楚有善為偷者往見曰臣楚市偷也願以伎該一卒該備也卒一人後無幾何齊興兵伐楚於是市偷進請曰臣有薄伎願為君行之子發曰諾不問其辭而遣之偷則夜出解齊將軍之帷而獻之子發因使人歸之曰卒有出採薪者得將軍之帷謹歸之於執事明夕復往取其枕子發又使歸之明夕復因取簮又使歸之於是齊師大駭將軍與軍吏謀之曰今夕不去楚軍恐取吾首即還師而去故伎無細薄在人君用之又曰淮南王安養士數千人其中高才八人蘇非李南左呉陳田伍被雷被毛被晉昌號為八公燕丹子曰荆軻之燕太子自御虛左荆軻援綏不讓後日與軻之東宫臨池而觀軻拾瓦投鼃太子令人奉槃金軻用抵鼃盡而復進軻曰非為太子愛金也臂痛耳後共乘千里馬軻曰千里馬肝美太子即殺馬進肝曁樊將軍得罪於秦秦求之急乃來歸太子為置酒陽華之臺酒中太子出美人能琴者軻曰琴者好手即進之軻曰但愛其手太子即斷其手盛以玊盤奉之太子常與軻等案而食同床而寢吕氏春秋曰勾踐苦㑹稽之耻欲深得民心以致必死於呉有甘肥不足分弗敢食有酒流之江民同之韓子曰呉起出遇故人而止之食故人曰諾故人至暮不來呉起至暮不食而待之王孫子曰楚莊王攻宋有酒投之水共飲之有食視軍中之饑色者加賜之太平御覽卷四百七十五
