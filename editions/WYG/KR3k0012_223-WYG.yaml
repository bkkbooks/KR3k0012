body:
  text: 太平御覽卷二百二十三宋李昉等撰職官部二十一諫議大夫補闕拾遺諫議大夫六典曰諫議大夫掌侍從贊相規諫諷諭凡諫有五一曰諷諫二曰順諫三曰規諫四曰致諫五曰直諫漢書曰韋𤣥成字少翁以父任爲郎少好脩文業尤謙遜其接人貧賤者益加由是名譽日廣以明經擢爲諫議大夫又曰劉輔以美才擢爲諫議大夫成帝欲立趙媫妤爲皇后輔上書曰陛下乃觸情縱欲以卑賤之女母天下乎里語曰腐木不可以爲柱卑人不可以爲主臣辱諫諍之官不敢不盡死言又曰貢禹字少翁元帝徴爲諫議大夫數虛已問以政事時年糓不登禹奏言宫室制度宜從儉省天子納其善言又曰夏侯勝字長公明洪範五行爲諫議大夫爲人簡易無威儀見時謂上爲君誤相字於上前上以此親信之又曰王褒字子淵蜀人也益州刺史王襄欲宣風化於衆庻聞褒有俊材請與相見使褒作中和樂職如淳曰言王政中和在官者樂其職也宣布詩如淳曰國語所謂宣布哲人之令德也蘇林曰歌之名也選好事者令爲鹿鳴之聲習而歌之時何武爲童子選在歌中武歌於太學宣帝召見曰此盛德之事吾何足以當之益州刺史因奏言褒有軼材上乃徴褒旣至詔褒爲聖主得賢臣頌擢爲諫議大夫又曰揚雄字子雲以耆老乆次轉爲諫議大夫疾免復召爲諫議大夫家至貧嗜酒人稀至其門時有好事者載肴酒以從遊學又曰孔光字子夏經學尤明舉止方正爲諫議大夫東觀漢記曰郭丹字少卿從師長安買符入函谷關乃慨然而歎曰丹不乗使者車不岀此關旣至京師嘗爲都講更始二年爲諫議大夫持節歸南陽自去家十三年果乗高車岀關後漢書曰陳禪字紀山爲諫議大夫西南禪國王獻樂及幻人能吐火自支解易牛馬頭大㑹作之於庭禪離席舉手曰帝王之庭不宜作夷狄之樂又曰韋彪字孟達上疏曰諫議之職應用公直之士通才謇正有補益於朝者今或從徴試輩爲大夫動舉州郡並宜清選其任責以言績其二千石視事雖乆而爲吏人所便安者宜增秩重賞勿妄遷徙惟畱聖心又曰江革轉諫議大夫賜吿歸天子思革篤行詔齊相曰諫議大夫江革前以病歸今起居何如夫孝者百行之冠衆善之始也縣以見糓千斛賜巨孝常以八月長吏存問致羊酒以終厥身又曰劉陶字子竒拜諫議大夫靈帝世天下日危陶上疏言天下亂皆由於宦竪宦竪見事急共讒陶詔收黄門北寺獄陶自知必死對使者曰讒邪相求考掠日深臣恨不列稷卨伊周之蹤而與比干龍逄爲儔事敗乃悔復何可及閉氣而死續漢書曰周舉字宣光梁商表爲從事中郎商疾甚帝問遺言對曰臣從事中郎周舉清慎高亮可任諫議大夫謝承後漢書曰傅翻字君成轉諫議大夫天性諒直數陳讜言武帝嘉之又曰虞承字叔明拜諫議大夫雅信忠謇在朝堂犯顔諫争終不曲撓散禄賑給諸生言德無比魏志曰賈逵字梁道河東襄陵人也自爲兒童戱常設部伍祖父習異之曰汝大必爲將帥口授兵法數萬言爲丞相主簿太祖善之拜諫議大夫與夏侯尚並掌軍計又曰賈逵字梁道太祖征𤣥徳先遣逵至斜谷觀形勢道逢水衡載囚數十逵以軍事急輙竟重者一人皆放其餘太祖善之拜諫議大夫蜀志曰尹黙字思潛以左氏傳教授後主踐祚拜諫議大夫晉書曰李尤字伯仁侍中賈逵薦尤有揚雄之才明帝召作東璧雍德陽諸觀銘拜諫議大夫後魏書曰張普惠字洪賑常山九門人爲諫議大夫任城王澄謂普惠曰不喜得諫議唯喜諫議得君唐書曰高祖嘗嘲蘇世長曰名長意短口正心邪棄忠良於鄭國忘信義於吾家世長對曰名長意短實如聖㫖口正心邪未敢奉詔昔竇融以河西降漢十世封侯臣以山南歸國唯蒙屯監於是拜爲諫議大夫又曰蘇世長擢拜諫議大夫從幸涇陽校獵大獲禽獸於旌門高祖入御營顧謂朝臣曰今日畋樂乎蘇世長進曰陛下遊獵薄廢萬機不滿十旬未爲大樂高祖色變旣而笑曰狂態發耶世長曰爲臣私計則狂爲陛下國計則忠矣又曰王珪爲諫議大夫嘗有論諫太宗稱善遂詔毎宰相入内平章大計必使諫官隨入與聞政事又曰太宗問諫議大夫禇遂良曰舜造漆器禹雕其俎當時諫舜十有餘人食器之間苦諫何也遂良對曰雕琢害農事纂組傷女工首創奢滛危亡之漸漆器不已必金爲之金器不已必玉爲之所以諫臣必諫其漸及其滿盈無所復諫上然之又曰蕭鈞遷諫議大夫時有左武候引駕盧文操踰垣盗左藏庫物高宗以引駕職在糾繩身行盗竊命有司殺之鈞進諫曰文操所犯情實難原然恐天下聞之必謂陛下輕法律賤人命任喜怒貴財物臣之所職以諫爲名愚衷所懷不敢不奏帝謂曰卿職左司諫能盡忠規遂特免其死罪顧謂侍臣曰此乃眞諫議也又曰武后臨朝置匭四區共爲一室列於朝堂東方春色青有能告以養人及勸農可投書於青匭銘之曰延恩南方夏赤色有能正諫論時政之得失可投書於丹匭銘之曰招諫西方秋色白有能自陳抑屈可投書於素匭銘之曰申寃北方水色𤣥有謀智者可投書於𤣥匭銘之曰通𤣥宜令正諫大夫補闕拾遺等一人充使知匭事每日所有投書至暮即進天寳九載三月改匭爲獻納又曰李景伯遷諫議大夫中宗嘗宴侍臣及朝集使酒酣令各爲逥波詞衆皆爲謟佞之詞及自要榮位次至景伯曰逥波爾時酒巵㣲臣職在箴規侍宴旣過三爵諠譁竊恐非儀中宗不悦中書令蕭至忠稱之曰此真諫官也又曰至德元年制諫議大夫論事自今已後不湏令宰相先知又曰乾元二年四月兩省諫官十日一上封事直論得失無假文説旣成殿最用存沮勸又曰陽城爲諫議大夫裴延齡讒􅉲陸䞇等坐貶黜德宗怒不解在朝無救者城聞而起曰吾諫官也不可天子殺無罪人而信用姦臣即率拾遺王仲舒等數人守延英門上疏延齡姦佞贄等無罪状德宗大怒召宰相入語将加城等罪良乆乃解令宰相諭遣之於是金吾将軍張萬福聞諫官伏閣諫趍往至延英門大言賀曰朝廷有直臣天下必太平矣遂遍拜城及王仲舒等曰諸諫議能如此言事天下安得不太平已而連呼太平太平萬福武人時年八十餘自此名重天下又曰崔郾遷諫議大夫穆宗即位荒於禽酒坐朝恒晚郾與同列鄭覃等延英切諫穆宗甚嘉之畋遊稍簡又曰文宗嘗於便殿召栁公權周墀對公權論事切直忤㫖周墀爲之惴慄公權詞氣益堅上徐謂公權曰朕知舎人不合却作諫議以卿論事有爭臣之風今授卿諫議大夫又曰孔戣爲諫議上疏以事四條陳諷後有李渉投匭上言吐突承瓘公忠戣爲匭使覽副状大怒逐之因上疏苦諫遂貶渉倖臣聞之側目人皆爲危之戣髙步公卿間以方嚴見憚又曰馮定爲諫議大夫李訓事敗伏誅衣冠横罹其禍中外危疑及改元御殿中尉仇士良請用神策仗衞在殿門定抗疏論罷人情危之又請許左右史隨宰臣入延英記事又曰㑹昌元年中書門下奏據六典隋置諫議大夫七人從四品上大厯元年昇門下侍郎爲正三品兩省遂闕四品建官之道有所未周詩云袞職有闕仲山甫補之周漢大臣願入禁闥補過拾遺張衡爲侍中常居帷幄從容諷諫此皆大臣之任故其秩峻其任重則君敬其言而行其道况謇諤之地宜有老成之人秩未優崇則難用耆德其諫議大夫望依隋書舊制昇爲從四品分爲左右以備兩省四品之闕向後與丞郎出入迭用以重其選從之五代史周書曰顯德五年勅諫議大夫宜依舊正五品上仍班位在給事中之下按唐六典諫議大夫四員正五品上皆𨽻門下省班在給事中之下會昌二年十一月中書門下奏昇爲正四品下仍分爲左右以備兩省四品之闕故其班亦升在給事中之上近朝自諫議大夫拜給事中者官雖序遷位則降等至是以其遷次不倫故改正焉三輔决録曰第五頡字子陵爲諫議大夫洛陽無主人鄉里無田宅寄止靈臺中或十日不炊補闕六典曰補闕唐垂拱中創立四員左右各二天授年初左右各加三員通前爲十員其或才職相當不待闕而授言國家有過闕而補正之故以名官焉又曰左右補闕掌供奉諷諫扈從乗輿凡發令舉事有不便於時不合於道大則廷議小則上封若賢良之遺滯於下忠孝之不聞於上則條其事狀而薦言之唐書曰王源中字正蒙早以文學知名升進士第宏詞科累遷至左補闕時典禁軍者不循法度至有臺府人吏皆爲追擒源中上疏其略曰夫臺憲者紀綱之地府縣者責成之所設有罪犯宜歸司存安有北軍勢重於南衙輦下權傾於仗内乞還法司庶守職分憲宗可其請又曰裴垍在中書有獨孤郁李正辭嚴休復自拾遺轉補闕及㕘謝之際垍廷語之曰獨孤與李二補闕孜孜獻納今之遷轉可謂酬勞無愧矣嚴補闕官業或異於斯昨者進擬不無疑緩休復悚恧而退又曰文宗以魏謩爲補闕上嘗言於宰臣曰太宗皇帝得魏徴採拾闕失弼成聖政今我得魏謩於疑似之間必極匡諫雖不敢希及貞觀之政庶幾處於無過之地今授謩左補闕於内狀備述諫疏激切詔中書善爲之詞唐書曰貞元中韋渠牟爲右補闕内供奉僚列初輕之上在延英旣對宰相多使中貴人召渠牟於官次同輩始注目矣歲中遷左諫議大夫時延英對秉政財賦之臣晝漏率下二三刻爲常渠牟奏御率下五六刻上笑語欵洽往往外聞又曰韋温爲左補闕忠鯁救時宋申錫被誣温昌言曰宋公履行有素身居台輔不當有此是姦人䧟害也吾輩諫官豈避一時之雷電而致聖君賢相蒙蔽惑之咎耶因率同列伏閣切爭之由是知名拾遺六典曰拾遺唐垂拱中創立四員左右各二天授初左右各加二員通前爲十員才可則登不拘階級言國家有遺事拾遺而論之故以名官焉又曰左右拾遺掌供奉諷諫扈從乗輿凡發令舉事有不便於時不合於道大則廷議小則上封若賢良之遺滯於下忠孝之不聞於上則條其事狀而薦言之唐書曰李邕少知名長安初内史李嶠及監察御史張廷珪並薦邕詞高行直堪爲諫爭之官由是召拜左拾遺又曰李邕爲左拾遺御史中丞宋璟奏侍臣張昌宗兄弟有不順之言請付發推斷則天初不應邕在陛下進曰臣觀宋璟之言事關社稷望陛下可其奏則天色稍解始允宋璟所請旣岀或謂邕曰吾子名位尚卑若不稱旨禍將不測何爲造次如是邕曰不顛不狂其名不彰若不如此後代何以稱也又曰李邕爲左拾遺及中宗即位以妖人鄭普思爲秘書監邕上書諫曰蓋人感一飱之惠殞七尺之身况臣爲陛下官受陛下禄而得目有所見口不言之是負恩矣自陛下親政日近復在九重所以未聞在外羣下竊議道路籍籍皆云普思多行詭惑妄説妖祥唯陛下不知尚見驅使此道若行必撓亂朝政臣至愚至賤不敢以胸臆對揚天庭請以古事明證孔子云詩三百一言以蔽之曰思無邪陛下今若以普思有竒術可致長生乆視之道則爽鳩氏乆應得之永有天下非陛下今日可得而求若以普思可致仙方則秦皇漢武乆應得之永有天下亦非陛下今日可得而求若以普思可致佛法則漢明梁武乆應得之永有天下亦非陛下今日可得而求若以普思可致鬼道則墨翟干寳各獻於至尊矣而二王得之永有天下亦非陛下今日可得而求此皆事渉虛妄厯代無效臣愚不願陛下復行之於明時唯堯舜二帝自古稱聖臣觀所行故在人事敦睦九族平章百姓不聞以鬼神之道聽理天下伏願陛下察之則天下幸甚疏奏不納又曰許景先常州義興人後徙家洛陽少舉進士授夏陽尉神龍初東都起聖善寺報慈閣景先詣闕獻大像閣賦詞甚美麗擢拜左拾遺又曰蕭昕爲左拾遺昕常與布衣張鎬爲友舘而禮之表薦曰如鎬者用之爲王者師不用則幽谷一叟爾𤣥宗擢鎬拾遺不數年岀入將相又曰元和中以左拾遺杜從郁爲秘書丞從郁司徒佑之子也初自司議郎爲左補闕崔羣􅅊貫之左拾遺獨孤郁等上疏以爲宰相之子不合爲諫爭之官於是降爲左拾遺羣等又奏云拾遺與補闕雖資品不同而皆是諫官父爲宰相而子爲諫官若政有得失不可使子論父於是改授之又曰元和中延英宰相臣對訖左拾遺楊歸厚次請對時上坐乆宣令後坐日對來歸厚堅詞固請宰相諭之不退上乃召見歸厚首論中官許遂振次厯詆宰輔皆過激切然而自階求試其詞甚繁逾刻而罷又曰元稹除左拾遺稹性鋒鋭見事風生旣居諫垣不欲碌碌自滯事無不言即日上疏論諫職又曰寳厯中左拾遺李漢右拾遺舒元褒薛廷老等五人於閣内諫曰臣伏見近日除授往往不由中書進擬或是宣出臣恐自此紀綱寖壞姦邪恣行伏乞聖恩詳察上厲聲曰更有何事舒元褒進曰陛下近日修造亦太多上色變曰何處修造元褒俛首不能對薛廷老奏曰臣等是諫臣有所聞即合論奏亦豈知陛下修造之所但見般輦瓦木絶多即知修造不已伏乞稍留聖慮上曰所奏知然後各復位議者以爲不廢其職又曰太和三年左拾遺舒元褒等論中丞温造凌供奉官事今月四日左補闕李虞與温造街中相逢造怒不廻避遂捉李虞祗承人禁身一宿决􅆃杖十下者臣等謹案國朝故事供奉官街中除宰相外無所逥避今温造蔑朝廷典故凌陛下近臣恣行胸臆曾無畏忌伏以事有雖小而關分理者即不可失也分理一失亂由之生遺補官秩雖卑乃陛下侍臣也中丞雖高乃法吏也侍臣見凌是不廣敬法吏壞法何以持繩前時中書舎人李虞仲與造相逢造乃曵去引馬知制誥崔咸與造相逢又捉其從人當時縁不上聞所以强暴益甚臣等又聞元和長慶中中丞行李不過半坊今乃遠至兩坊謂之籠街喝道但以尊崇自處不思僣擬之嫌陛下若不因此特有懲革伏恐從此供奉官輩便湏逥避中丞累朝制度失自陛下臣等官叅諫列實爲陛下惜之奉勅憲官之職在指佞觸邪不在行李自大侍臣之職在獻可替否不在道途相高並列通班合知名分如聞喧競亦以再三旣招人言甚損朝體其臺官與供奉官同道聽先後而行道途任祗揖而過其叅從人則各隨本官之後少相僻避勿信衝突又聞近日已來應合有導從官手力多者街衢之中行李太過自今傳呼前後不過三百歩唐書曰歸登爲右拾遺裴延齡以姦佞有恩欲爲相諫議大夫陽城上疏切諫德宗赫怒右補闕熊執易等亦以危言忤㫖初執易草疏成示登登慘然曰願寄一名雷電之下安忍令足下獨當自是同列切諫登每聯署其奏無所逥避時人稱重又曰王仲舒字𢎞中貞元十年策試賢良方正能直言極諫等科仲舒登乙第超拜右拾遺裴延齡領度支矯誕大言中傷良善仲舒上疏極論之又曰趙宗儒拜右拾遺翰林學士父驊改秘書少監與父並命出於中㫖當時榮之太平御覽卷二百二十三
