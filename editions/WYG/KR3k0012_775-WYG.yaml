  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_775-1a, image: WYG0899/WYG0899-0761c.png}
body:
  text: 太平御覽卷七百七十五宋李昉等撰車部四指南車軺車畫輪車四望車畫雲車雲母車通幰車象車騾車犢車羊車鹿車露車乗輿雜車轅輪軌指南車崔豹古今註曰指南車起於黄帝帝與蚩尤戰涿鹿之野蚩尤作大霧士皆迷路故作指南車鹵簿令曰指南車駕四馬正道匠一人駕士十四人皆平巾幘緋衫大口袴洪範五行傳曰晋獻公雖與指南車終不覺矣齊桓公中才矣而指南而五失之則惑管仲桓公指南車也崔鴻後趙録曰尚方令解飛機巧言若神妙思竒發造指南車就賜爵闗内侯鬼谷子曰肅慎氏獻白雉於文王還恐迷路問周公作指南車以送之又曰鄭人之取玉也必載司南之車為其不惑也述征記曰去端門百餘歩道南得尚方北門中有指南車車上有仙人持信旛車轉而人恒指南左思呉都賦曰俞騎騁路指南司方出車檻檻被練鏘鏘軺車釋名曰軺遥逺也四向逺望之車也説文曰軺車小車也謝承漢書曰許處字子伯家貧為督郵牛車鄉里號曰軺車督郵晉書曰李矩假為滎陽太守矩招懐離散逺近多附之石勒親率大衆襲矩矩遣老弱入山令所存散牛馬因設伏以待之賊争取牛馬伏發呼聲動山谷遂大破之斫獲甚衆勒乃退加矩冠軍將軍軺車幢盖傳曰漢世賤人乗軺則貴人乗輜軿李尤軺車賦曰輪以代步屏以蔽容畫輪車晉起居注曰穆帝永和六年皇太后嘗與帝俱出拜陵剋曰尚書江啓太后乗輪車以輦為副詔曰故當乗輦車至建平陵門外易載東宫舊事曰皇太子初拜有畫輪四望車四望車魏漢楊彪書曰今贈足下四望通幰七香車二乗青㹀牛二頭晉陽秋曰魏書云詔曰唯有一息足堪負荷思所以散其憂懐終傷道車四望畫雲車漢書曰武帝作畫雲車曹子建洛神賦曰六龍儼其齊首載雲車之容裔雲母車呉百官名曰劉蜀主得賜雲母車一乗晉書曰惠帝自鄴還洛殿中官屬偹雲母輦及雲母車奉迎晉太康起居注曰齊王出鎮詔賜清油雲母犢車傅子曰以雲母飾車謂之雲母車臣下不得乗時賜王公貴臣通幰車傅子曰有追鋒車施通幰遽則乗之象車晉諸公讃曰平呉後南越獻馴象作大車駕之載黄門鼓吹數十人晉中朝散大駕鹵簿曰象車鼓吹一部十三人騾車蜀志曰後主劉禪乗騾車降鄧艾晋令曰乗傳曰出使朝暮裘以上即自表聞聼闕白眼騾車副使攝事犢車釋名曰祥車祥善也善飾之車也犢車是也謝承後漢書曰頴陽劉詡好賑貧乏陳國張季禮吊師喪值氷寒車毁牛病不能進詡逢之推所乗車强牛與之季禮後知是詡還其車閉門不受桓譚别傳曰譚時為太常録尚書事後徙交趾初呉以罪徙者皆収家財入官及君下獄簿其資唯有犢車一乗牛數頭奴婢不滿十人無尺帛珠金之寳上聞而嘉之皆以君財付叔文後晉書曰武帝賜汝南王亮追鋒車皂輪犢車又曰太傅王導妻曹氏妬導憚之乃宻營别館以處衆妾曹氏知之将往焉導恐妾被辱乃命短轅犢車猶恐遲之以所執麈尾柄驅牛而進晉令曰百工不得服大絳紫襈假髻真珠璫珥文犀瑇瑁越疊以飾路張乗犢車羊車釋名曰羊車以羊所駕名車也晉書曰武帝平呉之後復納孫皓宫人數千自此掖庭殆將萬人而並寵者甚衆帝莫知所適常乗羊車恣其所之至便宴寢宫人乃取竹葉插戸以鹽汁洒地以引帝車又曰衛玠字叔寳五嵗風神秀異摠角乗羊車入市見者以為玉人觀者傾都晉太元起居注曰司𨽻校尉劉毅奏䕶軍羊琇私角弩四張又乗羊車請免官罪詔曰羊雖無制非素乗者可如所奏鹿車後漢書曰更始拜趙憙為五威偏将軍助諸将於昆陽憙被瘡有戰勞還拜中郎将更始敗憙為赤眉所圍迫憙乃踰屋走與所友善韓仲伯等數十人携小弱越山阻近出武闗仲伯以婦色美慮强暴者害欲棄之於道熹責怒不聼因以泥塗仲伯婦面載以鹿車身推之毎前逢賊或逼略熹輙言其病状以得免東觀漢記曰杜林寄隗囂終不能降志辱身乃出令曰杜伯山天子所不能臣至簪蒿蓆草不食其粟諸侯所不能友盖伯夷叔齊耻食周粟今且從師友之位須道開通使順所志林雖居於囂而終不屈莭建武六年弟成物故囂乃聴林持喪東歸既遣而悔之令刺客楊賢於隴坻遮殺之賢見林身推鹿車載致弟喪乃歎曰當今之世誰能行義我雖小人何忍殺義因亡去列女傳曰東海鮑宣妻者桓氏之女也字少君宣常就少君父學父竒其清苦故以女妻之装送資賄甚盛宣不恱謂妻曰少君生尊寵習美飾而吾貧賤不敢當禮妻曰大人以先生修徳守約故使妾侍執巾櫛唯命是從宣笑曰然是吾志也妻乃悉歸車馬侍御服飾更着短衣裳挽鹿車歸鄉里拜姑禮畢提瓮出汲循行婦道禮莭恭備鄉邦稱之宣哀帝時為司𨽻校尉子永中興初為魯郡太守永之子顯嘗從容問曰太夫人寜復識挽車時不曰先姑有言存不忘亡安不忘危吾焉敢忘乎晉書曰劉伶不以家産有無介意常乗鹿車擕一壺酒使人荷鍤而隨之謂曰死便埋我其遺形體如此通曰鹿車窄小裁容鹿也或云樂車乗牛馬者剉軒飲酌逹曙令乗此雖為勞極然入傳舍偃卧無憂故曰樂車無牛馬而能行者獨一人所致耳露車晉陽秋曰平原王幹隂雨則出犢車而内露車或問其故曰露者宜内也晉中興書曰王尼洛陽傾覆避亂江夏王澄時為荆州刺史見尼欣然願共給之尼常歎滄海横流無安處早喪婦止有一息不用居宅惟畜露車牛一乗毎行輙使兒御詣人暮則宿車上無有定處少時澄卒荆土飢荒尼求食不能得乃殺車牛煮食之遂父子餒死晉王公百官志曰蜀劉主得賜露車七十乗孫主賜露車三十乗道與元缺公牋曰有露車一乗轅復摧折以犂轅續之左﨑右􅝝强弱相負傍行斫轅乗輿雜車鹵簿令曰記里車白鷺鸞旗等三車並駕四馬正道匠各一人駕士各十四人皆平巾幘緋衫大口褲又曰辟惡車太僕令一人在車執弩箭平巾幘緋裲襠大口袴皮軒左右金吾隊正一人在車執弩服同太僕令其行正道駕馬行數駕士服色人數儀並同記里等車又曰安車四望車並駕四馬駕士各二十四人服同上又曰羊車駕果下馬一小吏十四人並青絲布裙紫碧腰襟青耳屩辮髪又曰屬車十二乗並駕牛駕士各八人服同記里等車又曰黄鉞車或曰金鉞車左武衛隊正一人在車次豹尾車右武衛隊正一人在車皆執武弁朱衣革帶並駕三馬駕士各十二人服同上轅周禮曰輈人為輈輈有三度國馬之輈深四尺有七寸田馬之輈深四尺駑馬之輈深三尺有三寸唯轅直且無橈也左傳宣下曰軍行右轅左追蓐又曰改乗轅而北之又曰公孫閼與頴考叔争車頴考叔挾輈以走子都拔棘以逐之弗及又曰師及齊師戰于炊鼻齊子淵捷從洩聲子射之中楯瓦繇朐汰輈匕入者三寸東觀漢記曰江革母年八十革不欲揺動之常自居轅輓車不用牛馬晉儀注曰皇后乗油畫雲母安車駕驂馬油畫雲母安兩轅趙書曰後石逺獵車千乗轅長三尺韓子曰呉起為西河守秦有小亭臨境欲攻之不足以徴卒乃取車轅倚於北門外令曰有能徙至南門外者賜上宅民莫之徙也有徙者賜之如令又置一石亦令曰有能徙者賜之如初民争徙之乃令曰明旦攻城有先登者賜之上田上宅民争上一朝而拔之夢書曰賈人夢車轅折敗者憂亡衣物何以言之轅字丢衣故知亡衣物方言曰楚衛之間轅謂之輈司馬長卿諫獵書曰車不及還轅人不暇施巧潘正叔迎大駕傳云狐狸夾兩轅豺狼當路立輪釋名曰輪彌綸也周匝之言也易曰既濟初九曳其輪濡其尾无咎禮曰古者貴賤皆杖叔孫武叔朝見輪人以其杖闗轂而輠輪者於是有爵而後杖也記庶人失禮所由始也叔孫武叔魯大夫叔孫州仇輪人作車輪之官又曰御婦車而壻授綏御輪三周先俟于門外周禮曰凡察車之道必自載於地者始也是故察車自輪始凡察車之道欲其樸屬而㣲至不樸屬無以為完久也不微至無以為戚速也又曰輪人為輪斬三材必以其時三材既具巧者和之凡為輪行澤者欲杼行山者欲侔杼以行澤則是刀以割塗也是故塗不附侔以行山則是摶以行石也是故輪雖敝不甐於鑿又曰軫之方也以象地也盖之圎也以象天也輪輻三十以象日月也左傳曰余折以御左輪朱殷豈敢言病吾子忍之榖梁傳曰晉人與姜戎要而擊殺之疋馬竒輪無反者史記曰古封禪用蒲輪惡傷土石草木續漢書曰張綱字文紀與杜喬䓁八人受詔行天下號為八俊七人皆奉命唯綱獨埋輪於洛陽都亭不去也或問之曰豺狼當路安問狐狸遂奏梁冀等罪京師震悚荘子曰桓公讀書於堂上輪扁斵輪於堂下釋椎鑿而上問曰公所讀者何言曰聖人之言曰在乎曰已死矣曰然則君之所讀者古人之糟粕也公曰寡人讀書輪人安得議乎有說則可無說則死輪扁曰以臣之事觀之斵輪徐則甘而不固疾則苦而不入不徐不疾得之於手而應於心口不能言有數存焉臣不能以喻臣之子臣之子亦不能受之於臣是以行年七十而老斵輪古之人與其不可傳也死矣然則君之所讀者古人之糟粕也夫今古不同變化異時故宜􅅸學任性張衡思𤣥賦曰魂眷眷而屢顧兮馬倚輈而徘􅆦雲霏霏兮繞余輪風𣺌𣺌兮震余旟張協洛褉賦曰權戚之族綵綺停鑣華輪朱轂集乎長州之浦曜乎洛水之曲曹子建七啟曰飛轅輪轉又應制詩云輪不輟運鸞無廢聲應吉甫華林集曰備言錫命羽盖朱輪奚氏本造後裔飾雍輪以代歩屏以蔽容輪軿并合出入道同追仁越義惟禮是恭梁昭明太子文選序曰椎輪為大輅之始大輅寜有椎輪之質軌禮曰國中以䇿彗䘏勿驅塵不出軌又曰今天下車同軌書同文行同倫莊子曰軌結于十里之外輪不迹於地張平子東京賦曰同衡律而壹軌量急舒於寒燠呉季重與太子牋曰其皆克復舊職追尋前軌今獨不然曹子建七啟曰當軌見籍值足遇踐飛軒電逝獸逐輪轉謝靈運祖徳詩曰秦趙欣來蘇燕魏遲文軌陸士龍荅兄機詩曰衡軌各殊迹牽牛非服箱王僧逹荅顔延年詩曰君子聳髙駕塵軌實為林太平御覽卷七百七十五
