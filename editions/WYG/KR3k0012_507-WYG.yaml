  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_507-1a, image: WYG0897/WYG0897-0547c.png}
body:
  text: 太平御覽卷五百七宋李昉等撰逸民部七逸民七皇甫士安髙士𫝊曰荷蕢者衛人也避亂不仕自匿姓名孔子擊磬于衛乃荷蕢而過孔氏之門曰有心哉擊磬乎既而曰硜硜乎莫已知而已矣深則厲淺則掲孔子聞之曰果哉蔑之難矣又曰石門守者魯人也亦避世不仕自隠姓名為魯守石門主晨夜開閉之子路從孔子入石門而宿晨門曰奚自子路曰自孔子遂識之孔子曰是知其不可而為之者與時人賢焉又曰東郭順子者魏人也脩道守貞田子方師事之而為魏文師友侍坐於文侯數稱谿工文侯曰谿工子師也子方曰非也無擇之里人也稱道數嘗無擇稱之文侯曰然則子無師耶子方曰有文侯曰子師誰子方曰東郭順子也文侯曰然則夫子故未嘗稱之子方曰其為人也貞靜而容物物無道正容悟之使人意也消若無擇何足以稱之子方出文侯曰逺哉全徳之君子始吾以聖智之言仁義之行為至矣吾聞子方之師形解而不敢動口鉗而不敢言語其所學為至耳文侯為之嘿然又曰壺丘子林者鄭人也道徳甚優列禦冦師事之乂曰列禦冦者鄭人也隐居不仕鄭穆公時子陽為相專任刑列禦冦乃絶迹窮巷面有饑色或告子陽曰列禦冦盖有道之士也居君之國而窮居無乃不好士乎子陽聞而悟使官載粟數十乗以與之禦冦出見使再拜而辭之入見其妻妻憮然而怒曰聞為有道之妻子皆得樂今子之妻子有饑色君遺先生食先生不受豈非命也哉禦冦笑曰君非自知而遺我也以人之言而遺我至於其罪我也又必且以人之言此我所以不受也居一年鄭人殺子陽其黨皆死禦冦安然獨全終身不仕著書八篇言道家之意號曰列子又曰段干木者晉人也少貧賤心志不遂乃怡情節逰西河師事卜子夏與田子方李克翟璜呉起等居於魏皆為將唯干木守道不仕魏文侯就造其門段干木踰墻而避之尊以客禮出過其廬而式其僕問曰干木布衣也君式其廬不已甚乎文侯曰段干木不趨勢利隐處乎窮巷聲馳千里敢不式乎文侯以名過齊桓公者蓋能尊段干木敬卜子夏友田子方故也又曰公儀潜魯人也與子思為友穆公因子思而致命欲以為相子思曰公儀子所以不至也若饑渴待賢納用其謀雖蔬食飲水伋亦願在下風如以髙官厚禄為釣餌而無信用之心公儀子智若魚者可也不爾則不踰君之庭且臣不佞又不能為君操竿下釣以傷守節之士潜竟終身不屈又曰王斗齊人也脩道不仕與顔歜並時曾造齊宣王門欲見宣王宣王使謁者延斗入斗曰趨見王為好勢趨見斗為好士於王如何謁者還報王曰先生徐之寡人請從王趨而迎之於門曰寡人奉先君之宗廟社禝願聞先生直言正諫斗曰王之憂國愛民不若王之愛尺縠王曰何謂斗曰王使為冠不使左右便辟而使工者何也為能之也今王治齊國非左右便辟則無使也臣故曰不如愛尺之縠也王乃謝曰寡人有罪於國家矣於是舉士五人任之以官齊國大治王斗之力也又曰黔婁先生者齊人也修身清節不求進於諸侯魯恭公聞其賢遣使致禮賜粟三千鍾欲以為相辭不受齊王又禮之以黄金百斤聘以為卿又不就著書四篇言道家之務號曰黔婁子終身不屈以夀終又曰原憲居環堵之室甕牖桑樞上漏下濕緼衣無表手足胼胝三日不舉火十年不製衣坐而彈琴子貢相衛結駟連騎排藜藿入窮閭巷不容軒來見憲憲韋冠杖藜而出應門正冠則纓絶歛袵則肘見納履則踵决子貢曰嘻先生何病也憲笑曰憲聞之無財謂之貧學道而不能行者謂之病若憲貧也非病也若夫仁義之匿車馬之飾憲不忍為子貢逡巡面有慚色終身耻其言之過也又曰曾参字子輿魯哀公致邑焉參辭不受曰吾聞受人者常畏人與人者常驕人縱君不我驕我豈無畏乎又曰陳仲子齊人其兄戴為齊卿食禄萬鍾仲子以為不義將妻子適楚居於於陵自謂於陵仲子窮不苟求不義之食遭嵗饑乏粮三日乃匐匍而食井上李實之蟲者三咽而能視身自織屨妻擘纑以易食楚王聞其賢欲以為相遣持金百鎰至於陵聘仲子仲子入謂妻曰楚子欲以我為相今日為相明日結駟連騎食方丈於前意者可乎妻曰夫子左琴右書樂在其中矣結駟連騎所安不過一肉而懐楚國之憂竟可乎於是謝使者遂相與逃而為人灌園又曰披裘公者呉人延陵季子出遊見中道有遺金顧而覩公曰取彼金公投鎌瞑目拂手而言曰何子處之髙而視之卑五月披裘而負薪豈取金哉季子大驚既謝而問姓名公曰子皮相之士何足語姓名哉又曰江上丈人者楚人也楚平王以費吾忌之䜛殺伍奢奢子貟亡將奔呉至江上欲渡無舟而楚人購貟甚急自恐不脫見丈人得渡因觧所佩劒以與丈人曰此千金之劒也願獻之丈人不受曰楚國之法得伍貟者執爵珪金千鎰吾尚不取何用劔為不受而别莫知其誰貟至呉為相求丈人不能得毎食輙祭之曰名可得聞而不可得見其為江上丈人乎又曰漁父者楚人也見楚亂乃匿名隐釣於江濱楚頃襄王時屈原為三閭大夫名顯於諸侯為上官靳尚所譛王怒遷之江濱被髮行吟於澤畔漁父見而問之曰子非三閭大夫歟何故至斯原曰舉世混濁而我獨清衆人皆醉而我獨醒是以見放漁父曰夫聖人不凝滯於物故能與世推移舉世混濁何不隨其流揚其波汨其泥衆人皆醉何不餔其糟歠其醨何故懐瑾握瑜自令放焉乃歌曰滄浪之水清可以濯吾纓滄浪之水濁可以濯吾足遂去深自閉匿人莫知焉又曰河上丈人者不知何國人也明老子之術自匿姓名居河之湄著老子章句故世號曰河上丈人當戰國之末諸侯交爭馳說之士咸以權勢相傾唯丈人隐身脩道老而不虧專業於安期先生為道家之宗焉又曰樂臣公者宋人也其先宋公族其後别從趙其族樂毅顯名於諸侯而臣公獨好黄老恬靜不仕及趙為秦昭王滅臣公東之齊以老子顯名齊人尊之號稱賢師趙人田叔等皆尊事之又曰蓋公者齊之膠西人也明老子師事樂臣公楚漢之起齊人爭往干世主唯蓋公獨遁居不仕及漢定天下曹叅為齊相延問諸儒數百人何以治齊人各殊叅不知所從蓋公善黄老乃使人厚幣聘之公為言治道貴清淨則民定遂推此為類為叅言之叅恱乃避正堂舎之師事焉齊果大治及叅入相漢遵蓋公之道故天下歌之蓋公雖為叅師然未嘗仕以夀終又曰四皓者皆河内軹人也或在汶一曰東園公二曰角里先生三曰綺里季四曰夏黄公皆脩道潔已非義不動秦始皇時見秦政虐乃退居藍田山而作歌曰莫莫髙山深谷逶迤曄曄紫芝可以療饑唐虞世逺吾將何歸駟馬髙蓋其憂甚大富貴之畏人不如貧賤之肆志乃共隐洛地沛山以待天下定及秦敗漢髙聞而徴之不至自匿終南山不屈也又曰黄石公者下邳人也遭秦亂自隐姓名初張良易姓為張自匿下邳歩逰沂水圯上遇衣褐衣老墜履圯下顧謂良曰孺子取履良愕然欲毆之為其老也强忍下取履因跪進焉公笑以足受而去良殊驚公行數里還謂良曰孺子可教也後五日平明與我期此良愈怪之復跪曰諾五日平旦良往公怒曰與老人期後何也後五日早㑹良鷄鳴往公又先在怒曰何後復五日早㑹良夜半往有頃公亦至喜曰當如是乃出一篇書與良曰讀是則為王者師後十三年孺子見我濟北榖城山下黄石即我遂去不見良旦視其書乃是太公兵法良異之因講習以說他人莫能用後與沛公遇於陳留沛公用其言輙有功後十三年從髙祖過濟北榖城山下得黄石良乃寳祠之及死與石并葬焉又曰魯二徴士者皆魯人也髙祖定天下即皇帝位博士叔孫通曰徴魯諸儒三十餘人欲定漢儀禮二士獨不肯罵通曰天下初定死傷者未起而欲定禮樂禮樂所由起百年之徳而後興吾不忍為公所為也公所為不合古吾不行也公往矣無汙我通不敢致而去又曰安期先生者琅琊人受學河上丈人賣藥海邊老而不仕時人謂之千嵗公秦始王東遊請與語三夜賜金璧值數千萬出置阜鄉亭而去以玉舄為報留書與始皇曰後數千年求我於蓬萊山下及秦敗安期先生與其友蒯通同往見項羽欲封之卒不肯見列仙𫝊又曰東郭先生者與其友梁石君俱脩道隐居不仕曹叅為齊相尊禮士時范陽人蒯通為叅客入見叅曰婦人有夫死三日嫁者有幽居守寡不出門者足下即欲求婦何取叅曰取不嫁者通曰然則求人亦由是也彼東郭先生暨石君齊之遺士也今隐未嘗卑節下意以求仕願足下禮之叅遂致禮聘二人亦終不仕齊人羙焉又曰田何齊人也自孔子授易世𫝊至何及秦焚學以易為卜筮之書獨不焚故何傳之不絶漢興何以齊諸田徙社故號曰社田生以易受弟子東武王仲洛陽王孫丁寛齊服生梁項生等皆顯當世惠帝時何年老家貧守道不仕帝親幸其廬以受業終言易者宗之又曰王生者漢文景時人也善為黄老退居不仕與南陽張釋之交當時釋之為公車令太子與梁王共入廟不下司馬門釋之劾奏太子不敬文帝善之遷至廷尉及文帝崩太子代立為帝是謂景帝釋之懼稱病欲去用王生計乃見上謝之景帝不過也王生平常與釋之及公卿㑹庭中立王韤解顧謂釋之前跪而繫之既退或讓生曰獨柰何辱張廷尉使跪繫韤乎生曰吾年老且賤矣自度終無益張廷尉方為天下名臣吾豈敢使廷尉使繫韤乎欲重之也諸公聞之皆賢王生而重張廷尉太平御覽卷五百七
