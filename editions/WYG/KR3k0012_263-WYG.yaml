body:
  text: 太平御覽卷二百六十三宋李昉等撰職官部六十一别駕治中長史司馬别駕應劭漢官儀曰元帝時丞相于定國條州大小為設吏員治中别駕諸部從事秩皆百石漢書曰黄霸為揚州刺史三嵗宣帝詔賜車葢特髙一尺别駕主簿車緹油屏泥於軾前以彰有德東觀漢記曰郭伋任并州行部童兒騎竹馬迎拜問使君何日當還伋語别駕計日告之後漢書曰袁紹領冀州以審配為别駕委以腹心并摠幕府紹又以田豐為别駕豐勸迎天子紹不納及敗曰吾慙田别駕謝承後漢書曰周景為豫州辟陳蕃為别駕不就景題别駕輿曰陳仲舉座也不復更辟蕃惶懼起視職又曰陳茂豫州刺史周敞辟為别駕從事與俱行部到潁川楊翟傳傳中有置美酒一押敞去勑御騶載酒以行茂見於外取押擊柱破之敞問茂刺史年老酒益氣别駕破押名亦何益茂答曰所過皆以明使君傳車騑驂載酒非宜也魏志曰崔琰字季珪太祖破袁氏領冀州牧辟琰為别駕語琰曰比案戸籍可得三十萬衆故為大州也琰曰今天下分崩九州幅裂二袁兄弟親尋干戈冀方蒸庶暴骨原野未聞王師仁聲先路存問風俗救其塗炭而計校甲兵惟此為先斯豈彼州士女所望於明公哉太祖改容謝之于時賓客皆為失色又曰李膺自蜀使至郡武帝恱之謂曰今李膺何如昔對曰今勝昔問其故對曰昔事桓靈之主今逢堯舜之君帝嘉其對以如意擊席者久之乃以為益州别駕又曰王基字伯輿東萊人時青土初定刺史王凌表請基為别駕凌流稱青土葢亦由基協和之輔也吳書曰陸遜為右護軍鎭西將軍權嘉遜功德欲殊顯之雖為上將列侯猶欲令厯本州舉命乃使揚州牧吕範就辟别駕從事晉書曰王祥徐州刺史吕䖍檄為别駕祥乃應召䖍委以州事于時冦盜充斥祥率勵兵士頻討破之州界清靖教化大行時人歌之曰海沂之康實賴王祥邦國不空别駕之功鄧粲晉記曰王澄為荆州刺史士人宗廞以酒忤澄澄叱左右棒之别駕郭舒厲色曰使君醉澄曰狂邪誑言我醉因炙舒眉晉中興書曰初魏徐州刺史任城吕䖍有佩刀工相之以為必三公可服此刀䖍語别駕王祥曰苟非其人刀或為害卿有公輔之量故以相與祥始辭之䖍強與乃受祥死之日以刀授弟覽曰吾兒凡汝後必興足稱此刀故以相與又曰長沙鄧粲髙潔著名桓沖召粲為别駕粲起就職時南郡劉尚公亦治操不仕粲既就職尚公語粲曰卿道廣學深衆所推懷忽然改節誠失所望粲笑答曰足下可謂有志於隱而未知隱之為道朝亦可隱市亦可隱初在我不在於物尚公無以難之雖然粲名譽鮮半矣又曰鄧騫字長真長沙人也譙王承為魏乂所敗乂求騫甚急鄉人為懼騫笑曰欲用我耳乃往詣乂喜謂曰君可謂古之解揚也以為别駕續晉安帝記曰益州刺史李邈㣲時居漢川與别駕姜顯餞送刺史顯忽邈邈曰大丈夫何至守偏地為姜顯所陵即不復還家仍附舡下自是十五年而鎮梁漢顯猶栖遲即檄為别駕後周書曰栁慶為雍州别駕有賈人持金二十斤詣京師交易寄人停止毎欲出行常自執管鑰無何緘閉不異而失之謂是主人所竊郡縣訊問主人遂自誣服慶聞而歎之乃問賈人曰卿鑰行置何處對曰恒自帶之慶曰頗與人同宿乎曰無與人同飲乎曰日者曾與一沙門再度酣宴醉而晝寢慶曰主人特以痛自誣非盜也彼沙門乃眞盜耳即遣吏逮捕沙門乃懷金逃匿後捕得盡復所失之金隋書曰趙軌為齊州别駕徴入朝父老相送各揮涕曰别駕在官水火不與百姓交是以不敢以壺酒相送公清若水請酌一杯水奉餞軌受而飲之唐書曰德宗命王䖍休幕客昭義軍節度掌書記盧頊為洺州别駕知州事賜緋魚袋賞有功也時元詣㨿洺州頊白於䖍休請入城說下之頊見詣為陳利害詣請随頊歸朝故為不次授官三輔决錄曰蘇章為冀州刺史召安平崔瑗為别駕豫章烈士傳曰孔恂字巨卿新淦人為别駕車前舊有屏星如刺史車曲翳儀式時刺史行部發去日晏怒命去之恂曰明使君發自晏而欲撤去屏星毁國舊儀此不可行别駕可去屏星不可省即投傳而去曹操别傳曰武皇帝為兖州以畢諶為别駕兖州亂張孟卓刼諶母弟帝見諶曰孤綏撫失和聞卿母弟為張邈所執人情不相逺卿可去孤自遣不為相棄諶涕泣曰當以死自効帝亦垂涕答之諶明日便亡走及破下邳得諶還以為掾王允别傳曰允仕郡民有路拂者少無行而太守王球召以補吏允犯顔固争球怒收欲殺之刺史鄧盛聞而馳傳辟為别駕從事允由是知名路拂以癈弃管輅别傳曰趙孔曜言輅於冀州刺史裴徽即檄召輅一相見清論終日不見疲倦天時大熱移床在庭前樹下乃至雞鳴向晨然後出自爾四見引輅為别駕江氏家傳曰統字應元太傅東海王領州牧請君為别駕與君書曰昔子師作豫州未下車辟荀慈明下車辟孔文舉貴州人士有堪此求者否君舉髙平郄道微為賢良陳畱阮宣子為直言濟北程𢎞叔為方正皆於時選為允顧和别傳曰顧球時為揚州别駕顧榮謂球曰卿速步公孝如是超卿矣和字公孝庾亮集答郭遜書曰别駕舊與刺史别乘同流宣化於萬里者其任居刺史之半安可任非其人應享與州將牋曰誨命欲求佳别駕自頃諸府大開搜延路廣海無遺蚌山亡逸璞歸數日卧思始得一人陳國有袁琇字惠瑛者才識可以經於治亂棲跱可以勸礪後進享具所服聞而未嘗接顔交言也又宗令文早有名輩相與通家門素所具抑亦其次治中通典曰治中從事史一人居中治事主衆曹文書漢制也謝承後漢書曰陳禪為州治中從事刺史為人所劾受納贓賂禪當傳栲乃至笞掠無笇五毒畢加神意自若辭對無變事遂釋應劭漢官儀曰司隸功曹從事即治中也魏志曰審配字正南魏郡人少忠烈慷慨有不可犯之節袁紹領冀州委配腹心之任以為治中别駕又曰太祖令曰頻年已來不聞嘉謀豈吾開延之不勤耶自今已後諸掾屬治中别駕常以月旦各言其失吾將覽也又曰毛玠字孝先陳畱平丘人也少為縣吏以清公稱將避亂荆州未至聞劉表政令不明遂住魯陽太祖臨兖州辟為治中從事蜀志曰龎統以從事耒陽令不治免官魯肅遺先主書曰龎士元非百里之才使處治中别駕之任始當展其驥足耳乃以為治中江表傳曰孫權尅荆州將吏悉皆歸附而潘濬獨稱疾不見權遣人以床就家轝致之濬伏面着床席涕泣交横權至慰勞與語使親近以手巾拭其面濬起下地拜謝即以為治中王隱晉書曰唐彬檄為治中别駕忠肅公亮匡救違闕盡規誨以納善不顯諫以彰主失當朝正色焉又曰譙郡太守李銓稱散吏戴熾當盡州席坐後竟為治中檀道鸞晉紀曰習鑿齒少博涉才情秀逸桓温竒之自州從事嵗中三轉至治中梁書曰蕭洽為南徐州治中既近畿重鎭吏數千人前後居之者皆致巨富洽為之清身率職饋遺一無所受妻子不免飢寒又曰陸襄字師卿為揚州治中襄父終此官乃固辭髙祖不許聽與府司馬换廨居之也益部耆舊傳曰栁琮字伯騫為治中與人交結乆而益親其所援進皆世所稱致位牧守鄉里為之語曰得黄金一笥不如栁伯騫所識又曰張彦字伯春為治中從事刺史毎坐髙床治中單席於地鄧德明南康記曰昔有盧躭仕州為治中少有棲山之術善解飛毎夕輙凌虛歸家曉則還州曾元㑹曉不及朝則化為白鵠至閣前􅂞翔欲下威儀以箒擲之得一隻履躭乃驚還就列時步隲為廣州刺史意惡之便以狀列聞遂至誅滅世說曰習鑿齒才具不常桓宣武器之未三十用為荆州治中謝牋曰不遇明公荆州老從事耳長史後周書曰劉璠為蕭循益州長史及太祖既納蕭循之降又許其返國循至長安累月未之遣也璠因侍宴太祖曰我與古誰比對曰常以公命世英主湯武莫逮今日所見曾齊桓晉文之不若太祖曰我不得比湯武望與伊周為匹何桓文之不若乎對曰齊桓存三亡國晉文不失信於伐原語未終太祖撫掌曰我解爾意欲激我耳於是即命遣循還陳書曰蕭濟為揚州長史髙宗嘗勅取揚州曹事躬自省覽見濟條理詳悉又無滯畱乃顧謂左右曰我本期蕭長史長於經傳不意精練繁劇乃至於此隋書榮毗𫝊楊素薦毗為華州長史世號為能素之田宅多在華隂左右放縱毗以法繩之無所寛貸毗因朝集素謂之曰素之舉卿適以自罰也毗答曰奉法一心者但恐累公所舉素笑曰前者戲耳卿之奉法素之望也又曰髙祖時制刺史二佐毎嵗暮更入朝上考課唐書曰張惟一為荆州長史以防禦使陳希昂為司馬希昻衡州酋帥家兵千人在部下自為藩衞有牟遂金仕至將軍為惟一將希昻積憾持兵領衆入惟一衙索遂金頭遂金藏於惟一後院惟一懼截遂金頭與之兵始退自此之後政歸希昻惟一寄坐而已司馬北史曰魏蘇亮拜黄門侍郎文帝子冝都王武為秦州刺史以亮為司馬帝謂亮曰黄門郎豈可為秦州司馬以朕愛子出藩故以心腹相委勿以為恨三國典略曰齊以太子率更令崔龍子為司州司馬初龍子為司徒功曹嫁女與穆提婆以求此職提婆許之以其品懸絶先轉為率更令至是成婚既畢即便用之尋有謠言謗於路側曰司州司馬崔老鴟取錢能疾判事遲御史馮士斡見而劾之遂免其官北史曰隋房恭懿厯德澤二州司馬盧愷復奏其政美上甚異之復賜以帛諸州朝集稱為勸勵之首以為上天宗廟之所祐助豈朕寡薄能致之乎隋書曰劉模為嵐州司馬楊諒既作亂刺史喬鍾葵發兵將赴逆模拒之曰漢王所圖不軌公荷國厚恩致位方伯謂當竭誠効命以答慈造豈有大行皇帝梓宫未掩翻為厲階鍾葵失色曰司馬反耶臨之以兵辭氣不撓鍾葵義而釋之軍吏進曰若不斬模何以厭衆心於是囚之於熾畨取模貲財分賜黨與及諒平煬帝嘉之拜開府授天興令太平御覽卷二百六十三
