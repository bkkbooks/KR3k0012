body:
  text: 太平御覽卷七百三十八宋李昉等撰疾病部一總叙疾病上説文曰疾病也疹病加也疢熱也痺癆病也疽黄病也痞入病也釋名曰疾病也客氣中人急疾也病並也與正氣並在膚體中也疹診也有結聚可得診見也痛通也通在膚脈中也癢揚也其氣在皮中人揺發之揚出也爾雅曰痛瘖虺頺𤣥黄劬勞咎卒瘽瘉鰥戮癙癵㾖痒疷疪閔逐疚􅸟􅂒痱􅓠瘵􅇤病也方言曰南楚􅍚愈謂之差或謂之間或謂之知通語曰或謂之愈或謂之了或謂之瘳或謂之除奄於怯反渫音業㣲也晉楚之間凡病不甚曰奄溝郭曰半卧生起也凢病少愈而加劇謂之不斟斟益也或謂之何斟言雖小損無所益也瘼音莫復病也東濟海岱之間曰瘼或曰憂秦曰瘎昔門或諶周易无妄卦曰无妄之􅍚勿藥有喜周禮天官下曰􅍚醫掌養萬民之􅍚病四時皆有癘疾春時有痟首疾夏時有痒疥􅍚秋時有瘧寒􅍚冬時有嗽上氣􅍚又曰醫師掌醫之政令凢邦之有疾病者有疕瘍者造焉則使醫分而治之禮記曲禮下曰君使士射不能則辭以􅍚曰某有負薪之憂又曰曽子寢疾病樂正子春坐於􅇃下曽元曾申坐於足童子隅坐而執燭童子曰華而睆大夫之簀與子春曰止曽子聞之瞿然曰呼曰華而睆大夫之簀與曽子曰然斯季孫之賜也我未之能易也元起易簀曽元曰夫子之病革矣不可以變幸而至于旦請敬易之又喪服大記曰􅍚病外内皆掃君大夫徹懸士去琴瑟聲音動人病欲静也寢東首于北牖下廢床徹䙝衣加新衣體一人男子不死于婦人之手婦人不死于男子之手又曰君於大夫􅍚三問之士􅍚一問之左傳成十五年曰晉侯􅍚病求醫于秦秦伯使醫緩為之未至公夢􅍚為二竪子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何醫至曰􅍚不可為也在肓之上膏之下攻之不可逹之不及藥不至焉不可為也公曰良醫也厚為之禮而歸之又昭上曰晉侯有􅍚鄭伯使公孫僑如晉聘且問病叔向問焉曰寡君之疾病卜人曰實沉臺駘為祟史莫之知敢問此何神也子産曰若君身則亦出入飲食哀樂之事也山川星辰之神又何為焉僑聞之君子有四時朝以聽政晝以訪問夕以脩令夜以安身於是乎節宣其氣勿使有所壅閉湫底以露其體今無乃壹之則生􅍚矣又昭上曰晉侯有疾求醫於秦秦伯使醫和視之曰􅍚不可為也是謂近女室疾如蠱非鬼非食惑以喪志良臣将死天命不祐公曰女不可近乎對曰節之天有六氣降生五味發為五色徵為五聲滛生六􅍚又昭二曰鄭子産聘于晉韓宣子曰寡君􅃦􅍚今夢黄熊奴才反入于寢門其何厲鬼也對曰堯殛鯀于羽山其神化為黄熊以入于羽淵實為夏郊三代祀之晉為盟主其或未知祀乎韓子祀夏郊晉侯有間春秋榖梁傳曰季孫行父秃晉郄克跛孫良父𦕈曹公子手僂同聘于齊齊使秃者御秃者跛者御跛者僂者御僂者蕭同叔子處臺而笑之客不悦相立胥閭而語移日不解齊有知者曰齊患必此始也春秋公羊傳曰衛縶不立惡􅍚也國語魯語曰子叔聲伯如晉郄犨欲與之邑弗受郄犨晉卿若成叔也歸鮑國謂之曰子何以辭苦成叔之邑對曰吾聞之不厚其棟不能任重重莫若國棟莫若徳夫苦成叔欲兩國而無大徳亡無日矣譬之如􅍚余懼易焉論語曰曽子有􅍚召門弟子曰啟予足啟予手史記曰陳軫適至秦惠王曰子去寡人之楚亦思寡人不陳軫對曰聞夫越人莊舄乎王曰不聞曰越人荘舄仕楚執珪有頃而病為越聲楚王曰舄故越之鄙人今仕楚執珪貴極矣亦思越不對曰凡人思故在其病也彼思越則越聲不思越則且楚聲使人往聽之猶尚越聲也今臣雖棄逐之楚豈能無秦聲哉又曰留侯多􅍚即導引不食榖漢書曰王章為諸生學長安獨與妻居章病無被卧牛衣中與妻决涕泣其妻呵怒之曰仲卿京師尊貴在朝廷人誰踰仲卿者今病困不自激卭乃返涕泣何鄙也又曰朱雲年七十餘終於家病不呼醫飲藥遺言以身服歛棺周於身土周於椁魏志曰太傅鍾繇有膝疾時華歆亦以高年疾病朝見皆使虎賁轝上殿就坐後三公􅍚常以為故事吴志曰吕䝉獲關某封爵未下㑹疾發權時在公安迎置内殿所以治䕶者萬方募封内有能愈䝉疾者賜千金恐其勞動常穿壁瞻之見其小能下食則喜顧左右言笑不然則咄嗟夜不能寐病中瘳為下赦令羣臣畢賀後更増篤權自臨視命道士於星辰下為之請命晉書曰王戎先有吐􅍚居喪増甚帝遣醫療之并賜藥物又斷賔客晉書曰樂廣字彦輔嘗有親客久濶不復來廣問其故答曰前在坐䝉賜酒方欲飲見盃中有虵意甚惡之既飲而􅍚作時河南㕔事壁上有角漆畫作蛇廣意盃中虵即角影也復置酒於前處謂客曰酒中復有所見不荅曰所見如初廣乃吿其所以客豁然意解沉疴頓愈又風俗通曰予之祖郴為汲令以夏至日請主簿杜宣賜酒時北壁上有懸弓照於盃中其影如虵宣畏惡之然不敢不飲其日便得病云虵入腹郴召宣於故處設酒杯中有一虵因謂宣此乃壁上弓影耳非他怪宣意遂解甚夷懌又曰皇甫諡字士安因病服寒食散而性與之忤每委頓不倫嘗悲忿叩刄欲自殺叔母諌而止諡嘗上䟽曰久嬰篤􅍚軀半不仁右脚偏小十有九載又服寒食藥違諸節度辛苦荼毒于今七年隆冬祼􅃝食氷當暑煩悶加以咳逆或若温瘧或類傷寒浮氣流腫四支酸重於今困劣宋書曰羊欣有病不服藥飲符水而已兼善醫術撰藥方數十卷沈休文宋書曰謝述有心虛疾性理時或􅆾謬除吴郡太守以疾不之官裴子野宋畧曰殷景仁入居西州疾篤上為之累息勅西州道上不得有車聲謝綽宋拾遺曰宋慤表曰臣昔貧賤時嘗􅍚病家人為臣齋勤苦七日臣晝夜夢見一童子青衣持縑廣數寸與臣臣問之用此何為荅曰西王母符也可服之服竟便覺一二日病差梁書曰范雲忽中􅍚居二日半召醫徐文伯視之文伯曰緩之一月乃復欲速即時愈正恐二年不復可救雲曰朝聞道夕死可矣而况二年文伯乃下火而壯焉重衣以覆之有頃許汗流於地即起二年果卒南史曰褚澄善醫術建元中為吳都太守百姓李道念以公事到澄見謂汝有重病荅曰舊有冷病至今五年衆醫不差澄為診謂曰汝病非冷非熱當是食鷄子過多所致今取蒜一升煮服仍吐一物如升涎褁之動開㸔是鷄雛羽翅𤓰距具足能行走澄曰此未盡更服所餘藥又吐得如何者雞十三頭而病差當時稱妙北史曰齊蘭陵王長恭有戰功帝忌之人謂長恭勿預事長恭然其言未能退及江淮冦擾恐復為将歎曰我去年面腫今何不發自是有疾不療後魏書曰李諧為人短小六指因癭而舉頥因跛而緩歩因謇而徐言人言李諧善用三短北史曰周裴俠嘗遇􅍚沉頓士友憂之忽聞五鼔便即驚起問左右可向府耶所苦因此而瘳晉公䕶聞之曰裴俠危篤若此不應憂公因聞聲疾病遂愈此豈非天祐其勤恪也唐書曰太宗謂侍臣曰治國與養病無異也病人覺愈彌須將䕶若有觸犯必至殞命治國亦然天下稍安尤須兢慎若便縱逸必至䘮敗又曰有患應病者問醫官蘇澄云自古無此方今吾所撰本草網羅天下藥物亦謂盡矣試將讀之應有所覺其人每發一聲腹中輙應唯至一藥再三無聲過至他藥復應如故澄因為處方以此藥為主其病自除老子曰知不知上不知知病聖人不病以其病病夫唯病病是以不病莊子曰尭以天下譲許由許由不受又讓於子州支父子州支父曰以我為天子可也雖然我􅃴有憂幽之病方且治之未暇治天下也又曰子耒有病喘喘然將死其妻子環而泣之子黎徃問之倚其户與之語曰偉哉造化以女為䑕肝乎以女為虫臂乎子耒曰父母於子東西南北唯命之從隂陽於人不翅為父母言隂陽於人甚於父母又曰南榮曰里人有疾里人問之病者能言其病病猶未病也若􅂒之問大道也譬猶飲藥以加病者也司馬彪曰加増加也􅂒願聞衛生之經而已矣衛生謂衛䕶其生全性命列子曰龍叔謂文摰曰子之術㣲矣吾有疾病子能已乎文摯曰唯命所聽然先言子所病之證龍叔曰吾郷譽不以為榮國毁不以為辱得而弗喜失而弗憂視生如死視富如貧此奚疾哉奚方能已之乎文摯乃命龍叔背明而立文摯從後向明而望之旣而曰嘻吾見子之心矣方寸之地虛矣㡬聖人也子心六孔流通一孔不達今以聖智為病者或由此乎非吾淺術所能已也又曰秦人逢氏有子少而慧及壯而有迷罔之疾聞歌以為哭視白以為黒饗香以為杇嘗甘以為苦行非以為是意之所之天地四方水火寒暑無不倒錯者焉列子曰鼻将窒者先覺燋朽體将僵者先亟犇佚心将迷者先識是非故物不至者則不反又曰宋陽里華子中年病忘朝取而夕忘夕與而朝忘在􅂗則忘行在室則忘坐不識先後不識今古魯有儒生自媒能治之華子之妻以居室之半請其方儒生曰吾試化其心變其慮庶㡬其瘳乎於是試露之而求衣飢之而求食幽之而求明生欣然吿其子曰疾可已也然吾方宻𫝊不可吿人試屏左右獨與居室七日而積年之病一日都盡又曰楊朱之友曰季梁季梁得病七日大漸其子環而泣之請謁醫季梁謂楊朱曰吾子不肖如此之甚汝奚不為我歌以曉之乎其子弗曉終謁三醫而季梁之疾自瘳墨子曰墨子病洗鼻問曰先生以鬼神為明福善禍惡今先生聖人也何故病墨子曰病者多方有得之勞苦有得之寒暑今有百門而閇其一賊何處不入哉管子曰凡國都皆有養疾聾盲喑啞跛躄偏枯不耐自生者上収而養之尹子曰與死者同病難為良醫與亡國同道不可為謀又曰人将疾也必先不甘魚肉之味韓子曰秦昭王有疾百姓買牛而家為王禱魏子曰待扁鵲乃治病終身不愈也用道術則無所不治也淮南子曰土地各以類生人是故山氣多男澤氣多女水氣多瘖風氣多聾林氣多瘧木氣多傴生子多有此疾岸下氣多尰温氣所生石氣多力險阻氣多癭暑氣多殘殘折不緒寒氣多夀谷氣多痺丘氣多狂平氣多仁下而平也陵氣多貪象陵積聚春秋後語曰齊桓公六年越醫扁鵲過齊桓侯客待之入朝見曰君有疾在腠理不治将深腠理皮膚也桓侯曰寡人無疾扁鵲出桓侯謂左右曰醫之好利欲以不病為功後五日復見曰君疾在血脈後五日復見曰疾在腸胃後五日見桓侯而還走桓侯使人問其故曰疾在骨髓臣是以無請也桓侯遂卒戰國䇿曰扁鵲見秦武王示之病扁鵲請除之左右曰君之病在耳之前目之下也除之使耳不聰目不明君以吿扁鵲鵲怒而投其石曰君與智者謀之而與不智者敗之使秦政如此則一舉而亡國矣韓詩外傳曰人主之病十有二發非有賢醫莫能治也何謂十二發曰痿瘚逆脹滿支隔盲煩喘痺風賢醫治之如何曰省事輕刑則痿不作無使小民飢寒則蹶不作無令財貨上流則逆不作無使倉廩積腐則脹不作無使府庫充實則滿不作無使群臣縱恣則支不作無使下情不上通則隔不作上則恤下則盲不作法令奉用則煩不作無使下怨則喘不作無使賢人伏匿則痺不作無使百姓歌吟誹謗則風不作夫重臣群下者人主之心腹支體也心腹支體無患則人主無疾矣故非有賢醫莫能治也人皆有此十二疾而不用賢醫則國非其國也趙􅁮吴越春秋曰越王出石室召范蠡謂之曰吴主疾病三月不愈孤聞人臣之道主疾臣憂且吴王遇孤恩澤甚厚恐疾之無瘳也唯先生卜焉范蠡曰今日日展陽隂上下和親無相入者法日天一救且何憂哉王不死明矣到己巳當有瘳也吕氏春秋曰齊王疾􅇤使人之宋迎文摯視疾摯謂太子曰王疾可已雖然必殺摯非怒王則不可治怒而摯必死太子請之文摯往而不至三齊王已怒文摯至不觧履登􅇃王重怒叱而起病乃已生烹文摯物理論曰趙簡子有疾扁鵲診侯出曰疾可治也而必殺醫焉以吿太子太子保之扁鵲頻召不入入而着履登􅇃簡子大怒便以㦸追殺之扁鵲知簡子大怒則氣通血脈暢逹也太平御覽卷七百三十八
