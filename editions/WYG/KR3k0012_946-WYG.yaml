body:
  text: 太平御覽卷九百四十六宋李昉等撰蟲豸部三莎鷄毛詩豳七月曰六月莎雞振羽莎雞羽成而振迅之陸璣毛詩疏義曰莎雞如蝗而斑色翅數重下翅正赤或謂之天雞六月飛而振羽索索聲幽州人謂之蒲錯也爾雅曰螒天雞也孫炎注曰小蟲黒身赤頭一名莎雞郭璞注曰一名樗雞也廣志曰莎雞似蠶蛾而五色赤曰犨雞螽斯毛詩螽斯曰螽斯后妃子孫衆多也言若螽斯不妬忌則子孫衆多也螽斯羽詵詵兮螽斯蜙蝑也毛詩豳七月曰五月斯螽動股斯螽蜙蝑也蜙蝑陸璣毛詩疏義曰爾雅云螽斯蜙宣龍切蝑相魚切也楊雄云春黍也幽州謂之春箕角長青色班黒其股似瑇􅈘文五月中以兩股相瑳作聲聞數十步毛詩題綱曰螽斯名蜙蝑一名春黍似蝗而小青色長股而鳴喻后妃之性不妬忌子孫衆多爾雅曰蜤音斯螽蜙蝑郭璞注曰蜙䗥也俗呼春黍蝙蝠春秋運斗樞曰行失瑤光則伏翼兩頭並翔廣江淮山瀆之祠則揺光明服翼九足服翼附鼠也孝經援神契曰蝙蝠伏匿故夜食爾雅曰蝙蝠服翼也齊人呼為蟙䘃或謂之仙鼠闕墨二音抱朴子曰千嵗蝙蝠色如白雪集則倒懸腦重故也此物得而隂乾末服之令人壽萬嵗𤣥中記曰百嵗服翼其色赤止則倒懸千嵗服翼色白得食之壽萬嵗水經曰交州丹水亭下有石穴甚深未嘗測其逺近穴中蝙蝠大者如鳥多則倒懸得而服之使人神仙荆州記曰宜都夷道縣有石穴穴中有蝙蝠如鳥則倒懸崔豹古今註曰蝙蝠一名仙鼠又曰飛鼠五百嵗則色白腦重集物則頭垂故謂為倒挂鼠食之得仙幽明録曰淮南郡有物髠人髪太守朱誕曰吾知之矣多置黐音離以塗壁夕有數蝙蝠大如雞集其上不得去殺之乃絶屋簷下已有數百人頭髻范注治瘧方曰蝙蝠七枚合擣五百下發日雞鳴服一丸日中一丸遇發乃與粥清一升耳守宫毛詩節正月曰哀今之人胡為虺蜴蜴螈也虺蜴之性見人則走陸璣毛詩疏義曰蜴一名蠑螈蜥蜴也或謂之蠦䘃一名蛇醫如蜥蜴青緑色大如指形狀可惡也春秋考異郵曰土勝水故守宫食蠆宋均曰守宫生於土蠆藏物屬坎水也爾雅曰蠑螈蜥蜴蝘蜓蝘蜓守官也轉相解傳異語别四名也漢書東方朔傳曰武帝置守宫盆下使射之朔曰臣以為龍又無角謂之為蛇又有足跂跂脉脉善緣壁若非守宫即蜥蜴上曰善賜帛十匹抱朴子曰謂蜥蜴為神龍者非但不識神龍亦不識蜥蜴又曰沙礫無量而珠璧甚尠雞隼屯飛而鸞鳯罕出虺蜥盈數而虬龍希覿王充論衡曰禹南濟於江黄龍負舟舟中人五色無主禹乃笑而稱曰我受命於天竭力以勞萬民生寄也死歸也視龍猶蝘蜓也龍去而亡患揚雄方言曰秦晉四夏謂之守宫其在澤者謂之蜥蜴南楚謂之蛇醫或謂之蠑螈北燕謂之祝蜒桂林之中謂之守宫大而能鳴者謂之蛤解許慎説文曰滎蚖蛇毉以注鳴者也在壁曰蝘蜓在草曰蜥蜴蜥蜴守宫也淮南萬畢術曰守宫塗臍婦人無子取守宫一枚置甕中及蛇醫以新布宻裹之懸於隂處百日治守宫蛇醫分等以唾和之塗婦人臍磨令温即無子矣又曰守宫飾女臂有文章取守宫新合隂陽者牝牡各一藏之瓮中隂乾百日以飾女臂則生文章與男子合隂陽輒滅去又曰取七月七日守宫隂乾之治合以井花水和塗女人身有文章則以丹塗之不去者不淫去者有姦徐懷逺南越志曰成陽縣樹多守宫大者能鳴謂之蛤解郭義恭廣志曰守宫鱗色如虵而四足似蝘蜓長尺餘蝘蜓有屋壁間者有草野者石上者博物志曰蜥蜴或蝘蜓以器養之食以朱砂體盡赤所食滿七斤擣萬杵以㸃女人支體終身不滅故號曰守宫崔豹古今注曰蝘蜓一曰守宫一曰龍子善於樹上捕蟬食之其長細五色者名為蜥蜴其短大者名為蠑螈一曰蛇醫大者長三尺其色𤣥紺善魅人一曰𤣥螈一名緑螈曹叔雅異物志曰魚跳躍則蜥蜴從草中下稍相依近便共浮水上而相合事竟魚還水底蜥還草中干寶搜神記曰淮南書佐劉雅夢見青蜥蜴從屋入腹内因苦腹痛夢書曰守宫為寡婦着垣牆也夢見守宫憂寡婦人也呉氏本草經曰石龍子一名守宫一名石暢一名石龍子揚子雲解嘲曰今子乃以鴟梟而笑鳯凰執蝘蜓而嘲龜龍不亦病乎蜣蜋爾雅曰蛣蜣蜣蜋也郭璞曰黒甲蟲噉糞土者張揖廣雅曰天柱蜣蜋也一作天杜許慎説文曰蜣蜋一曰天柱衝波傳曰蜣蜋無鼻而聞香抱朴子曰𤣥蟬潔饑不羨蜣蜋穢飽郭義恭廣志曰交州無蜣蜋崔豹古今注曰蜣蜋能以土包糞轉而成丸莊周所謂蛣蜣之智在於轉丸者也一名蜣蜋一名蛣蜣一名弄丸一名轉丸夢書曰蜣蜋為憂財輔以行者夢見蜣蜋憂財糧也白魚爾雅曰蟫白魚書中蟲一名蛃魚音淫張揖廣雅曰白魚蛃魚也齊書曰明帝初有疾無輟聽覽羣臣莫知及疾甚勑臺省府署求白魚以為藥外始知之本草經曰白魚一名衣魚治婦人疝疪小便泄利小兒頭中風項彊皆宜摩之生咸陽呉氏本草經曰衣中白魚一名蟫范注方曰治小便不利取白魚二七擣之令糜爛分為數次須臾服之即通也螳螂易通繋卦曰螳螂摶蟬之蟲乘寒而殺物自隠蔽而有所害捕搏之象也周書時訓曰芒種之日螳螂生是謂隂息韓詩外傳曰齊莊公出獵有螳螂舉足將拒其輪問其御曰此何蟲對曰此螳螂也為蟲知進而不知退不量力而輕就敵公曰此為天下勇士矣迴車避之勇士歸焉淮南子同又曰楚莊王將伐晉告士大夫有諫者死孫叔敖曰臣園中有榆榆上有蟬蟬方奮翼悲鳴不知螳螂在後欲攫而食之螳螂方取蟬不知黄雀在其後也禮記曰月令仲夏之月螳螂生蔡邕月令章句曰螳蜋蟲名食蟬殺蟲鄭禮記注曰螳蜋螵蛸母也王瓚曰爾雅云莫貈螳螂同類物也今沛魯以南謂之螳蜋燕趙之際謂之食厖爾雅曰莫貈螳蜋蛑莫貈一名螳蜋一名蛑即不過也郭云有斧蟲不過蟷蠰蟷蠰螳蜋别名螳壤二音其子螵蛸一名􅡯蟭蟷蠰卵也張揖廣雅曰芊芊齕肱螳蜋也􅡯蟭鳥洟冒焦螵蛸也華嶠後漢書曰蔡邕在陳留其隣有以酒食召邕者比至而酒酣焉客有彈琴於屛邕至門濳聽之曰嘻以樂召我而有殺心何也遂反將命者告主人曰蔡君向來至門而去主人遽自追而問其故邕具以告彈琴者曰我向鼓絃見螳蜋方向鳴蟬蟬將去未飛螳蜋為之一前一却吾心聳然唯恐螳蜋失之也此豈為殺心而形於色者乎邕曰此足以當之矣呉越春秋曰呉王夫差令於邦中曰寡人欲伐齊敢有諌者死太子友因諷諫以激於王以清旦懷大挾彈從後園而來衣浹履濡呉王夫差怪而問之太子對曰臣遊後園聞秋蟬之鳴往而視之秋蟬登髙樹自以為安不知螳螂超枝縁條曵腰舉吻欲哺其形也螳蜋貪心務進志在乎利蟬不知黄雀方緣茂林徘徊枝葉欲啄螳蜋也莊子曰莊周游於雕陵之樊覩一異鵲自南方來者執彈而留之宿留伺其便也覩一蟬方得美䕃而忘其身螳蜋執翳且摶之執草以自翳見得而忘其形異鵲從而利之見利而忘其真真身也莊周􅇶然曰噫物固相累亦類相召也捐彈而反走又曰螳蜋怒臂以當車轍不知不勝任也是才之美者也司馬彪曰非不有美才顧不勝任耳揚雄方言曰螳蜋謂之髠或謂之虰或謂之􅀈􅀈郭璞曰今江東呼為石蜋爾雅作蛑方言依此失之許慎讒文曰螳蜋不過也一名蟷蠰一名研父邯鄲氏笑林曰楚人居貧讀淮南方得螳蜋伺蟬自鄣遂可以隱形遂於樹下仰取葉螳蜋執葉伺蟬以摘之葉落樹下樹下先有落葉不能復分别掃取數斗歸一一以葉自鄣問其妻曰汝見我不妻始時恒答言見後乃厭倦不堪紹云不見嘿然大喜齎葉入市對面取人物吏遂縛詣縣縣官受辭自説本末官大笑而不治夢書曰螳蜋為亡人蔽其草也夢見螳蜋憂亡命者范子計然曰螵蛸出三輔上價三百吳氏本草經曰桑蛸條蝕也一名害焦成公綏螳蜋賦曰戢翼鷹峙延頸鵠望推翳俟前翹翼後抗鳥伏蛇騰鷹撃隼放俯飛蟬而奮猛躍蟪蛄而逞壯距車輪而軒翥固齊侯之所尚郭璞螳蜋讃曰螳蜋氣蟲揮斧奮臂當轍不迴勾踐是避勇士致文勵之以義蝍蛆春秋考異郵曰土勝水故蝍蛆搏蛇宋均曰蝍蛆生土地伏物屬於坎坎水也為隱伏爾雅曰蒺藜蝍蛆郭璞曰似蝗大腹長角能食蛇腦張揖廣雅曰蝍蛆蜈蚣也莊子曰蝍蛆甘𢃄司馬彪曰𢃄小蛇也蝍蛆喜食其眼抱朴子曰南人入山皆以竹管盛活蜈蚣蜈蚣知有蛇之地便動作於管中如此則草中便有蛇也蜈蚣見蛇能以氣禁之蛇即死淮南子曰月照天下蝕於蟾蜍塍蛇游一而殆于蝍蛆蟾蜍月中蝦蟇也食月故曰食於蟾蜍蝍蛆葢蜈蚣也殆猶畏忌也沈懷逺南越志曰綏定縣多蜈蚣其大者能以氣吸蜥蜴劉欣期交州記曰大蜈蚣出徐聞縣界取其皮可以鞔鼓宋均記永亦同沈瑩臨海異物志曰晉安東南呉嶼山蜈蚣千萬積聚或云長丈餘以作脯味似大蝦嶺南異物志曰珠崖人每清明見海中逺山羅列皆如翠屛而東西不定悉蜈蚣也嶺表録異曰蜈蚣南越志云大者其皮可以鞔鼓取其肉曝為脯美於牛肉又云長數丈能噉牛里人或遇之則鳴鼓燃火炬以驅逐之陶濳續搜神記曰曇遊道人清苦沙門也剡縣有一家事蠱人噉其食飲無不吐血死遊詣之主人下食遊依常呪願一雙蜈蚣長尺餘便於樓中跳走遊快飲食安然無他王琰宜祥記曰沙門安能開者北人也嘗見蜈蚣長三尺自屋墮地旋徊而去葛洪遐觀賦曰蜈蚣大者長百步頭如車箱可畏惡越人獵之屠裂取肉白如瓠稱金爭買以多為美太平御覽卷九百四十六
