body:
  text: 太平御覽卷九百七十五宋李昉等撰果部十二甘蕉扶留芋菱芡蓮藕甘蕉晉宮閣名曰華林園芭蕉二株南夷志曰南詔土無食噐以芭蕉葉藉之廣志曰芭蕉一曰芭苴或曰甘蕉莖如荷盂重皮相裹大如盂斗葉廣二尺長一丈子有角子長六七寸或三四寸生為行列兩兩共對若相抱形剥其上皮色黄白味似葡萄甜而脆亦飽人其根大如芋魁而石青色其莖解散如絲織以為葛謂之蕉葛雖脆而好色黄白不如葛色出交阯建安南州異物志曰甘蕉草類望之如樹株大者一圍餘葉長一丈或七八尺廣尺餘二尺許花大如酒杯形色如芙蓉著莖末百餘子大名為房根似芋塊大者如車轂實隨華毎華一闔各有六子先後相次子不俱生花不俱落此葉有三種一種子大如梅長而鋭有似羊角名羊角蕉味最甘好一種子大如雞卵有似牛乳味㣲减羊角蕉一種大如藕子長六七寸形正方少甘味最下取其葉以灰練之績以為絲異物志曰芭蕉葉大如筵席其莖如芋取鑊煑之為絲可紡績女功以為絺綌今交阯葛也其内心如蒜鵠頭生大如合蚌因為實房一房有數十枚其實皮赤如火剖之中黑剥其皮食其肉如蜜甚美食之四五枚可飽而餘滋味猶在齒牙一名甘蕉顧徽廣州記曰甘蕉與蕉花實根葉不異眞是南土暖不經霜凍四時花葉展其熟耳其未熟亦苦澁也南方草物狀曰蕉樹子房相連累甜美亦可蜜藏遊名山志曰赤巖山水石之間有甘蕉林髙者十丈卞敬宗甘蕉讚曰扶疎似樹質則非木扶留吳録地理志曰始興有扶留藤縁木而生味辛可以食㯽榔蜀記曰扶留木根大如斗視之似柳根又有蛤名古賁生水中取燒為灰曰牡厲粉先以㯽榔著口中又以扶留長寸古賁灰少許同嚼之除胷中惡氣異物志曰古賁灰牡厲灰也與扶留㯽榔三物合食而後善也扶留藤似木防已扶留㯽榔所生相去遠為物甚異而相成俗曰㯽榔扶留可以忘憂交州記曰扶留有三種一名檴扶留其根香美一名南扶留葉青味辛一名扶留藤味亦辛廣志曰扶留藤縁樹生其花實即蒟也可為醬左思吳都賦曰石肌氷松東風扶留芋説文曰齊人謂芋為莒孝經援神契曰仲冬昴星中收莒芋廣雅曰葄菇水芋也亦曰烏芋漢書曰汝南郡有鴻隙大陂翟方進為丞相奏破之郡中追怨童謡曰壊陂誰翟子威飯我豆食羮芋魁又曰秦破趙遷卓氏曰吾聞岷山之下沃野下有蹲鴟蹲鴟芋也至死不飢乃求遠遷致之臨卭富至童八百人崔鴻十六國春秋蜀録曰李雄克成都衆甚飢餒乃將民就穀于郪山掘野芋而食之南史孝義傳曰鮮于文宗漁陽人年七嵗䘮父父以種芋時亡至明年芋時對芋嗚咽如此終身汜勝之書曰區種芋法區收三石汝南先賢傳曰袁安字召公除隂平長時年飢荒民皆菜食租入不畢安聼使輸芋曰百姓飢困長何得食穀先自引芋吏皆從之汝南先賢傳曰薛包歸先人冡側種稻芋稻以祭祀芋以充飢耽道説禮𤣥虛無為列仙傳曰酒客為梁丞使民益種芋曰三年當大飢卒如其言梁民不死風土記曰博土芋蔓生根如鷄鴨卵華陽國志曰何隨字季業蜀郡郫人除安漢令蜀亡去官送吏行乏輒取道側民芋隨以綿繫其處使足所取直民相語曰聞何安漢清廉持綿追還之終不受因為語曰安漢令取糧為之償廣志曰凡十四芋有君子芋大如魁有車轂芋有旁巨芋有邊芋此四芋魁大如缾少子葉如繖葢緗色紫莖長丈餘易熟長味芋之最善者也莖可作羮臛有蔓芋縁枝生大者二三升有雞子芋色黄有百果芋畝收百斛有卑芋七月熟有九面芋大不美有蒙控芋有青芋有曹芋子皆不可食莖可為葅又有百子芋出葉榆縣有魁芋無旁子生永昌本草經曰芋土芝八月採左思蜀都賦曰瓜疇芋區菱爾雅曰菱蕨􅀈今水中芰也尚書大傳曰鉅野菱鉅野大野也周書曰冬食菱藕周禮天官下籩人職曰加籩之實菱國語曰屈到嗜芰有疾召其宗老而屬之屈到楚卿宗老家臣曰祭我必以芰及祥宗老将薦芰屈建命去之建到之子子木曰夫子不以私欲干國之典也漢書循吏傳曰龔遂為渤海太守勸民秋冬益畜果實菱芡謝承後漢書曰袁閎父賀為彭城相亡閎到郡迎䘮飢食菱芡渇飲行潦梁書曰魚𢎞為湘東王鎮西司馬述職西上道中乏食縁路採菱作飯給所部𢎞度所後人覔一菱不得又於窮洲之上捕得獼猴數百為脯以供酒食淮南子曰楚靈王作章華之臺棄疾承民之怨而立公子比百姓避而去之乃食菱飲水枕塊而死呂氏春秋曰厲叔事莒陽公自以為不知而去居于海上夏日則食菱芡冬日則餐橡栗杜恕篤論曰夫萍之浮與菱之浮相似也菱植根萍隨波是以堯舜歎巧言之亂德仲尼惡紫之奪朱風俗通曰殿堂象東井形刻荷菱水物所以厭火也羅浮山記曰綏寜縣元龜淵中出菱甚為甘㫖廣志曰鉅野大菱大於常菱淮漢以南荒年以菱為蔬范汪祠祭曰孟冬之祭菱芡楚辭曰制芰荷以為衣兮集芙蓉以為裳左思蜀都賦曰其沃瀛則有緑菱紅蓮潘岳西征賦曰鳬躍鴻漸唼喋菱芡郭璞江賦曰忽忘夕以宵歸詠採菱以叩舷曹植九愁曰採菱華而結辭孫楚論屈建文曰加籩之品菱芰存焉楚多陂塘菱芰所生父自嗜之而抑按宰祝既毁就養無方之禮又失奉死如生之義奪乎素欲建何忍焉芡周禮天官下籩人職曰加籩之實芡漢書曰龔遂為渤海太守勸民冬益畜果實菱芡淮南子曰狸頭愈䑕雞頭已瘻䑕齧人瘡狸愈之瘻頭腫茨雞頭水中草幽州謂之鴈頭亦愈瘻崔豹古今注曰芡雞頭也一名鴈頭一名芰葉似荷而大葉上蹙皺如沸實有芒刺其裏如珠可以療飢止渴方言曰䓈芡雞頭也北燕謂之䓈青徐淮泗之間謂之芡又曰南楚江湖之間謂之雞頭或謂之雁頭説文曰芡雞頭也本草經曰雞頭一名鴈頭生雷澤劉騊駼𤣥根賦曰芳林臻臻朱竹離離菱茨吐榮若攄錦而布繡蓮爾雅曰荷芙蕖其實蓮蓮謂房也其中的蓮房中子也的中薏子中心苦者也毛詩陳宛丘澤陂曰彼澤之陂有蒲與荷有美一人傷如之何史記曰龜千嵗遊於蓮葉之上焉吳時外國志曰大秦國有蓮藕雜果宋起居注曰元嘉十八年有司奏揚州刺史王濬解稱州治後池有兩蓮駢生雙房分體又十六年華林有雙蓮同幹秀出華池又曰太始二年八月嘉蓮雙葩並實合跗同莖生豫州鱧湖又六年雙蓮一蔕生東宮𤣥浦池三國典畧曰齊王還鄴髙麗新羅并遣使朝貢先是徐州蓮二莖兩蔕古云異木連枝遠人入欵斯其應也北齊書曰後主武平中特進侍中崔季舒宅中池内蓮莖皆作胡人面仍着鮮卑㡌俄而季舒見殺三國典畧曰周平齊齊㓜主胡太后等並歸於長安初武成殂後有謡云千錢置果園中有芙蓉樹破劵不分明蓮子隨他去調甚悲苦至是應焉又曰髙緯所幸馮淑妃名小蓮也後唐書曰監軍張承業本朝舊人權貴任事人士脅肩低首候之唯馬郁以猾稽侮狎毎賔僚宴集承業出異方珍果陳列于前客無敢先甞者當郁前者食必盡承業私戒主膳者曰他日馬監至惟以乾蓮于置前而已郁至窺之知其不可啖異日鞾中置鐡鎚出以擊之承業大笑曰為公易饌勿敗予案夏侯湛芙蓉賦曰緑房翠蔕紫餙紅敷黄螺圓出垂甤散鬚纓以金牙㸃以素珠孫楚蓮華賦曰攢聚星列纎離相扶㣲若𤣥黎投幽夜粲若鄧林飛鵷鶵樂府歌曰江南可採蓮蓮葉何田田藕爾雅曰荷芙蕖其根藕吳時外國志曰大秦國有蓮藕雜果齊書曰永明中巴東王子嚮殺行事劉夤等武帝聞之謂羣臣曰子嚮遂反戴僧静大言曰諸王應自反豈唯巴東武帝問其故答曰諸王無罪而一時被困一挺藕一杯漿皆諮籖師不在則竟日忍渇唐史曰蘇州進藕其最上者名傷藕或云荷名或云葉甘為蟲所傷或云故傷其華以長其根近多重臺荷蓋蓮房中又生花亦甚異也司馬相如子虛賦曰咀嚼菱藕夏侯湛芙蓉賦曰咀菱藕於𤣥泉謝朓詩曰秋藕折輕絲太平御覽卷九百七十五
