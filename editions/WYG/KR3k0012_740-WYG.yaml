body:
  text: 太平御覽卷七百四十宋李昉等撰疾病部三聾盲瘖啞吃秃􅙄齲齒兔缺癭傴僂疣贅瘤跛躄偏枯附尰聾説文曰聾無聞也從耳從龍秦晉謂之􅀈又益梁之州謂聾曰􅀈秦晉聴而不聞聞而不達謂之􅀈又曰生而聾謂之聳釋名曰聾籠也如在䝉籠之内不察也左傳僖中曰耳不聴五聲之和為聾漢書曰黄霸為頴川太守長吏許丞老病聾督郵白欲逐之霸曰許丞廉吏雖老尚能拜起送迎正頗重聴何傷且善助之無失賢者東觀漢記曰尹敏遷長陵令永平五年詔書捕男子周慮慮素有名字與敏善過候敏坐繫免官出乃嘆曰瘖聾之徒真世之有道者也何謂察察而遇斯禍也老子曰五音令人耳聾莊子曰耳之與形吾不知其異也而聾者不能自聞淮南子曰土地各以類生人水氣多瘖風氣多聾説苑曰仲尼曰非其地而樹之不生非其人而語之不聴得其人如聚沙而雨之非其人若聚聾而皷之抱朴子曰豹􅈢之裘不為負薪施九成六變不為聾夫設談藪曰後魏中書侍郎裴敬憲字伯茂敬憲新構山亭與賓客集謂邢子曰山池始就願為一名子才曰海中曰蓬萊山仙人之所居宜名蓬萊裴聾也敬憲患耳故以戯之憲初不悟於後覺忻然謂子才曰長忌及户髙則無慮公但大語聾亦何嫌盲廣雅曰矇瞍瞽盲也説文曰聾目無眸也𦕈一目小也眺目不正也瞎目病也睞童子不正也眄目偏合也青目病生醫音縊也瞍無目也周易履卦曰六三眇能視跛能履象曰眇能視不足以有明也跛能履不足以與行也毛詩臣工有瞽曰有瞽有瞽在周之庭禮記檀弓上曰子夏喪其子而喪其明明目精也曾子弔之曰吾聞之朋友喪明則哭之曽子哭子夏亦哭曰天乎予之無罪也曽子怒曰商女何無罪也吾與女事夫子於洙泗之間退而老於西河之上使西河之民疑女於夫子爾罪一也喪爾親使民未有聞焉爾罪二也喪爾子喪爾明爾罪三也而曰女何無罪與子夏投其杖而拜曰吾過矣吾過矣又仲尼燕居曰治國而無禮譬猶瞽之無相與倀倀乎其何之韓詩外傳曰海之上有勇士曰菑邱訢以勇遊於天下過神淵飲馬其僕曰馬飲此者必死訢言飲之其僕以其言飲之馬果死菑邱拔劔而入三日三夜殺二蛟一龍而去雷神隨而擊之十日十夜眇其左目漢書曰杜欽字子夏少好經書家富而目偏盲故不好為吏茂陵杜業與同姓字俱以才能稱京師衣冠謂欽為盲杜子夏以相别欽惡之為小冠髙廣二寸由是京師謂欽為小冠杜子夏業為大冠杜子夏東觀漢記曰杜篤仕郡文學掾以目疾二十餘年不窺京師魏畧曰夏侯惇從征吕布為流矢所中傷左目時夏侯淵與惇俱為軍師軍中號惇為盲夏侯惇惡之每照鏡恚怒輒撲鏡著地魏畧曰太祖聞丁儀為令士雖未見欲以愛女妻之以問五官將曰女人觀貌而儀目不便誠恐愛女未必悦也以為不如與伏波子懋太祖從之尋辟儀為掾到與論議嘉其才乃曰丁掾好士也即使其兩目盲當與女何况但𦕈乎沈約宋書曰景王嬰孩時有目疾宣王令華佗治之出眼曈割去疾而内傅藥梁書曰鄱陽王恢有孝性初鎮蜀所生費太妃猶停都後於都下不豫恢未之知一夜忽夢還侍疾及覺憂惶廢寢食俄而信至太妃已瘳後有目疾久廢視瞻有道人慧龍得治眼術恢請之及至空中忽見聖僧及慧龍下針豁然開朗咸謂精誠所致也又曰江紑字含潔㓜有孝性年十三父蒨患眼紑侍疾將朞月衣不解帶夜夢一僧云患眼者飲慧眼水必差及覺説之莫能解者紑第三叔禄與草堂寺智者法師善徃訪之智者曰無量夀經云慧眼見真蒨乃因智者啓捨同夏縣界牛屯里舍為寺乞賜嘉名勅荅云純臣孝子徃徃感應晉世顔含遂見冥中送藥近見智者以卿第二息云飲慧眼水慧眼是五眼之一號可以慧眼為名及就創造泄故井水清冽異於恒泉依夢中取水洗眼及煮藥稍覺有瘳因此遂安時人謂之孝感又曰元帝字世誠武帝第七子也初武帝夢眇目僧執香爐稱託生王宫既而綵女石氏侍始褰户幔有風迴裙梁武帝意感幸之乃生元帝賜綵女姓曰阮進為修容修容常失珠謂是左右所盗乃炙魚目不知其珠孝元吞之信宿之間珠遂便出一目致𦕈魚之報焉南史曰梁湘東王於江東泛舟顧而言曰今可稱有樂功曹劉源曰帝子降兮北渚王作色曰當道目𦕈𦕈兮愁予即坐者股慄酒叛朝衛又邵枚不可詩賊之因寅根肖之病非啞復非聾相思下雙淚望真有大功後魏書曰祖珽以罪徙於光州别駕張奉禮希大臣意上言班雖為流囚常與刺史對坐𠡠報曰牢掌奉禮曰牢者地牢也乃為深坑置諸内夜中以蕪菁子燭熏眼因此失明異苑曰丹陽多寳寺元嘉中畫佛堂作金剛寺主奴婢惡戯以刀刮其目眼輒見一人甚壯五綵衣持小刀挑目精數夜眼爛於今永盲後越書曰戎陽一目瞽劉曜冦洛水復降曜曜復敗生擒起前石使人罵曰瞎狗何降賊復持瞎來陽曰臣不降即死死則大王那得復見瞎狗前石笑曰瞎狗不足汚刀活之文子曰師曠瞽為太師列子曰宋人有好行仁義者三世不懈家無故黒牛生白犢以問孔子孔子曰此吉祥也以薦上帝居一年其父無故而盲牛又復生白犢其子又問孔子孔子曰吉祥也復教以祭居一年其子又盲其末楚攻宋圍城民易子而食析骸而炊丁壯皆乘城戰死者太半父子有疾皆免及圍解而盲疾俱復莊子曰連叔謂肩吾子曰夫瞽者不知文章之觀又曰目之與形吾不知其異也盲者不能自見又曰許由曰夫𦕈者無以與乎眉目顔色之好尹文子曰瞽者無目而耳不可以􅕉察視也精於聴也又曰聾者不歌無以自樂盲者不觀無以接物韓子曰寐則盲者不知覺而使之視則窮矣淮南子曰今夫盲者行於道遇君子則易道遇小人則蹈於溝􅊤桓譚新論曰余為典樂大夫得樂家記言文帝時得魏文侯時樂人竇公年百八十嵗兩目皆盲帝問其何服食至此對曰臣年十三失明父母教為樂鼓琴不導引不知夀得力何余以為竇公少肓專一内視故有此夀抱朴子曰魏武收左慈慈走入市吏𫝊言慈一目𦕈葛巾單衣於是一市皆然也又曰董君異以玉屑與盲人服之而愈世説曰顧愷畫殷荆州形殷不許顧曰明府正當嫌眼明㸃童子飛白抑上若輕雲之蔽月又曰桓南郡與殷荆州語次因作危言桓公曰矛頭浙米劔頭炊殷云百嵗老公攀枯枝井上轆轤卧小兒殷有一叅軍云盲人騎瞎馬臨深池殷曰咄咄逼人仲堪𦕈故也法顯記曰祗洹精舍西北四里有榛名曰得眼本有五百盲人依精舍住佛為説法盡還得眼盲人歡喜刺杖著地頭面作禮杖遂生長大世重之無敢伐者遂以得眼為名楚辭九章曰離婁㣲睇瞽以為無明蔡邕瞽師賦曰夫何矇昧坐瞽兮心窮忽以欝慰目冥而無暏兮羌求湏以張志瘖瘂釋名曰瘖唵然無聲也漢書曰韓延夀待下吏恩施甚厚而約誓明或欺負之者延夀自刻責吏聞者自傷悔其縣尉至自刺死及門下掾自剄人救不殊因瘖不能言延夀聞之對掾吏涕泣遣吏醫治視又曰吕后斷戚夫人手足去眼薰耳飲瘖藥呉書曰程普殺叛者數百人皆使投火即日病瘖百餘日卒文子曰臯陶瘖而為士師淮南子曰瘖者可使守圉不可使通語又曰夫大怒破隂大喜墜陽滿氣發瘖驚怖為狂又曰水氣多瘖黄帝素問曰瘖者何病岐伯曰胞之絡脈何以言之胞絡繫於腎少隂脈貫腎繫舌本故不能言續搜神記曰沛國一士人姓周生三兒向應可語便瘂皆七八嵗有一人經門過來乞問主人此是何聲云是僕兒頻生三子皆瘂不能語客曰君冥罪還内省我於外待君主人異其言知非常人便入内思良久而出謂客曰昔為小兒時當牀上有燕巢中有三子其母從外食哺子子輒出頭作聲受之積日如此時屋下攀得其巢試以指内巢中燕子亦出口承之乃取三蒺䔧各與其子吞之既死其母尋還不復見其子出户徘徊悲鳴而去有此事今甚悔之客曰是矣便聞其三兒言語周正異苑曰髙恵清隆安中為太傅主簿忽一日有羣䑕更相啣尾自屋梁相連至地清尋得瘖疾數日而亡露騐記曰王導河内人也兄弟三人並得時疾其宅有鵲巢旦夕翔鳴忽甚諠噪俱惡之念云差當治此鵲既差果張取鵲斷舌而殺之兄弟悉得瘖疾吃説文曰吃言語難也方言云􅟌極吃也或謂之軌或謂之嬰郭璞軋見穀氣不利也江東名吃為嘆也漢書曰魯恭王餘口吃難言又曰司馬相如吃而善著書又曰揚雄為人簡易口不能劇談劇甚也一説言吃不能疾言也鄭𤣥自序曰趙商子字子聲河内温人博學有才能講難而吃不能劇談管子曰吾畏事不敢為事畏言不敢為言故行年六十如老吃耳新序曰周昌者沛人以軍功封汾隂侯御史大夫髙帝欲廢惠帝立戚夫人子如意羣臣固争莫能得昌廷争之強上問其説昌為人吃曰臣口不能言臣則知其不可也陛下欲廢太子臣期期不奉詔世説魏明帝口吃少言而内明斷世説云鄧艾口吃語稱艾艾晉文王戯之曰艾艾為是㡬艾鄧荅曰鳳兮鳳兮故是一鳳秃禮記曰秃者不免穀梁傳曰魯季孫行父禿聘于齊齊使秃者御音迓蔡邕獨斷曰古幘無巾如今半幘而已王莽乃施巾故語曰王頭秃幘施屋秦書曰符堅徴隱士張臣和至長安堅賜以衣冠和辭日年老頭秃不可加冠野服而入既見歸矣􅙄釋名曰鼻塞曰􅙄晉書曰謝安字安石本能為洛下書生詠有鼻疾故其音濁名流愛其詠而不能及或手掩鼻以斆之崔鴻春秋後趙録曰王謨字思賢齆鼻言不清暢尫短無威儀將拜曲陽令石勒疑之長史曰請試之政教嚴明百城尤最幽明録曰晉司空桓豁在荆州有㕘軍教鸜鵒令語遂無所不名當大㑹令効人語有一人齆鼻語難學因以頭内瓮中以効焉齲齒釋名曰齲朽也蟲齧之齒􅆙朽也續漢書曰桓帝元嘉中京師婦女作齲齒笑齲齒笑者齒痛也淮南子曰啄木愈齲又曰决物治齲君子不與兔缺續晉陽秋曰魏詠之生而兔缺相者云後當貴年十八聞荆州殷仲堪帳下有術人能治之因西上仲堪與語令師看焉師曰可割補之但應百日食粥不語笑詠之曰半年不語亦當治之况百日也師為治而差宋書曰孝武狎侮羣臣各有稱目多髯者謂之羊短長肥瘦皆有比擬顔師伯缺齒號之曰齴癭説文曰癭頸瘤也崔贑易林曰癭瘤痬􅦤為害傷范􅁮後漢書曰貞定王劉揚造作䜟記云赤九之後癭揚為主揚病癭以惑衆魏畧曰賈逵前在𢎞農與校尉争公事不得理乃發憤生癭後所病稍大自啟欲割之太祖惜逵恐其不活教謝主薄吾聞十人割癭九人死逵尤行其意而癭愈大宋書曰杜預病癭初攻江陵呉人以瓠壼繫狗頸示之山海經曰天目之山有草如葵名曰杜衡食之能令人癭博物志曰山居之民多癭養生論曰頸處險而癭莊子曰闔跂離無脤甕㼜大癭典術曰服食天門冬治癭除百病傴僂禮記喪服四制曰傴者不榖梁𫝊成公曰曹公子手僂聘於齊齊使僂者御蕭同姪子處臺笑之孫卿子曰周公僂背莊子曰子輿病曲僂頤隱於齊肩髙於頂淮南子曰木氣多僂疣贅説文曰疣贅也釋名曰疣丘也出皮上聚髙如地之有丘也贅横生一肉著體梁書曰武帝丁嬪生而有赤痣體又多疣及帝納之無何並失莊子曰彼以生為附贅懸疣以死為决疣潰癰夫若然者惡知死生先後之所在也太𤣥經曰割疣贅惡不得大山海經曰求如之山滑水出焉中有滑魚狀如鱓其音如梧食之已疣又曰旄山有䱹魚狀如􅀈食者不疣瘤釋名曰瘤流也聚而生瘤腫也魏畧曰晉景帝先若瘤目割之㑹母邱儉反而瘤發及儉走竟以自終蔡謨表曰臣先有瘤生在腰上十數年初無患苦忽自潰晉書曰趙王倫得異鳥問皆不知名累日向夕宫西有素衣小兒言是服劉鳥倫使録小兒并鳥閉置牢室明旦開視並失所在倫目上有瘤時以為妖焉沈約宋書曰朱齡石舅頭有大瘤齡石伺舅眠密徃刮之舅即死列女傳曰齊宿瘤者東郭採桑之女項有大瘤故以名焉閔王出而女採桑如故王召問之對曰受之父母教採桑不教觀王王曰此奇女也取以為后女死後燕遂屠齊跛躄偏枯附方言曰自關西秦晉之間足蹇謂之逴勅畧反周易歸妹初九曰歸妹以婚跛能履禮記喪服四制曰跛者不踊身有瘤疾不可備禮也左𫝊宣公下曰晉侯使郄克㑹于齊頃公集婦人使觀之郄子登婦人笑於房跛而登故笑之又穀梁傳成公曰衞孫良夫跛郄克𦕈聘於齊齊使跛者御跛蕭同姪子處臺笑之春秋後語曰秦攻趙急求救於齊齊王曰必長安君為質長安君者太后之少子也太后愛之不肯遣大臣強諫太后怒左師觸龍請見太后曰老臣病足㑹不能疾走不得見久矣自恐太后體有所苦也太后曰老婦恃輦而行長沙耆舊傳曰夏叔丁母憂過禮遂患風濕一脚偏枯皇甫謐表曰久嬰篤疾半身不仁右脚偏小尰毛詩巧言曰彼何人斯居河之麋無拳無勇職為亂階既㣲且尰爾勇伊何骭􅅑為㣲腫足為尰漢書賈誼傳誼上書曰方今天下之勢方病大腫一股之大㡬如要一指之大㡬如股失今不治必為痼疾堅久之疾後雖有扁鵲不能為已淮南子曰岸下氣多尰太平御覽卷七百四十
