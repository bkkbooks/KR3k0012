body:
  text: 太平御覽卷五百一十九宋李昉等􅁧宗親部九孫女子壻孫爾雅曰子之子為孫孫之子為曾孫曾孫之子為𤣥孫𤣥孫之子為来孫言有往来之親来孫之子為昆孫昆後也昆孫之子為仍孫仍重也仍孫之子為雲孫言輕逺若浮雲毛詩文王有聲曰貽厥孫謀以燕翼子禮記曲禮曰君子抱孫不抱子此言孫可以為王父尸以孫與祖昭穆同也子不可以為王父尸雜記曰祭稱孝子孝孫䘮稱哀子哀孫史記曰張蒼父不滿五尺蒼長八尺蒼子復長八尺餘孫類長六尺後漢書曰龎叅字仲連緱氏人拜漢陽太守郡民任棠有竒節隐教叅至先候之棠不與言但㧞薤一大本水一盆致於屏前自抱孫兒伏于户下見逸民部又曰虞詡字升卿陳國人孝養祖母縣舉為順孫又曰馮氏兄弟形皆偉壮唯馮勤祖父偃長不滿七尺恥短陋恐子孫似之乃為子娶長伉生勤勤長八尺三寸魏志曰王粲字仲宣山陽人蔡邕見而竒之時邕顯貴車馬填門粲在門邕倒屣迎之粲年幼貎弱短小一座皆驚邕曰此王公之孫有才吾不如也吾家有書籍當悉與之晉書曰張慿字長宗祖鎮蒼梧太守慿年數嵗鎮謂其父曰我不如汝有佳兒慿曰阿翁詎宜以子戯父乎又曰李宻字令伯父早亡母改醮祖母劉氏躬撫養宻奉事以孝謹聞有暇即講學忘疲師事譙周周門人方之㳺夏泰始初徴為洗馬宻以祖母年老上表自陳曰母孫二人更相為命己具祖門中又曰李𦙍字宣伯祖敏為公孫度所廹浮海莫知所終子娶妻生𦙍遂絶房室以憂卒𦙍以祖不知所亡設木主以事之由是顯名宋齊語録曰虞愿字士恭㑹稽人祖為給事中庭中有橘樹冬熟子孫争取愿獨不取祖及家人並異之又曰張元字孝始祖喪明三年元每憂涕讀佛書以求福祐後見藥師經云盲者得視遂請七僧燃燈七日七夜轉藥師經行道每自責曰為孫不孝使祖喪明今以燈施普照法界願祖目見明元求代暗其夜夢一老人以金治其祖目謂之曰勿憂悲三日之後必差元于夢中喜躍驚覺乃遍告家人居三日祖目果漸見明從此遂差後周書曰薛登字景猷汾隂人早喪父家貧躬耕以養祖母暇則覽文籍以孝見稱列子曰北山愚公者年且九十面山而居懲北山之寒出入之迂也遂率子孫荷擔扣石墾壌箕畚運於北海之尾河曲智叟笑而止之愚公長息曰雖我之死有子在焉子又生孫孫又生子子又生孫孫孫子子無窮匱也而山不加增何苦不平河曲智叟無以應之又曰舜問乎丞曰道可得而有乎夫道性命非汝有也是天地之委順也子孫非汝有也是天地之委蛻也陳留志曰范喬字伯孫年二嵗祖父馨臨終執其手曰恨不見汝成人因以所用硯留與之後家人告喬喬執其硯涕泣孝子𫝊曰原榖者不知何許人祖年老父母厭患之意欲棄之榖年十五涕泣苦諌父母不從乃作輿舁棄之榖乃随収輿歸父謂之曰爾焉用此凶具榖乃曰恐後父老不能更作是以􅂑之耳父感悟愧懼乃載祖歸侍養克己自責更成純孝榖為純孫又曰吳郡陸仲元者晉太尉玩曽孫自玩至仲四世為侍中時人方之金張二族幽明録曰許遜少孤不識祖墓傾心所感忽見祖語曰我死三十餘年於今得正𦵏是汝孝悌之至因舉標牓曰可以此下求我於是迎喪𦵏者曰此墓中當出一侯及小孫長遂封女禮記内則曰女子出門必擁蔽其面夜行以燭無燭則止女子十年不出恒居内也姆教婉娩聴從婉謂言語也言婉之言媚也媚謂容貌也執麻枲治絲繭織紝組紃學女事以供衣服觀於祭祀納酒漿籩豆爼醢醴相􅂇奠當乃女時而知十有五年而笄二十而嫁凡女拜尚右手右隂也左傳㐮五年曰初宋芮司徒生女子赤而毛棄諸堤下恭姬之妾取以入長而美名之曰棄榖梁傳曰禮送女父不下堂母不出門父戒之曰謹慎從汝舅之言母誡之曰謹慎從汝姑之言諸母鞶紳誡之曰謹慎從汝父母之言無違宫事史記曰齊太倉令淳于公有罪當刑詔徙繋長安獄公無男有五女将行罵曰生女不生男緩急非有益小女緹縈随父至長安上書曰妾父為吏齊中皆稱其亷平今坐法當刑妾悲夫死者不可復生㫁者不可復續願入官沒為婢贖父之罪書奏天子悲憐其意遂為除肉刑漢書曰王章為京兆尹為大将軍王鳯所陥下廷尉獄妻子皆收章小女年十二夜起號哭曰每旦獄上呼囚常至九今八而止家君素剛烈先死者必我家君也及明問之果章死矣東觀漢記曰孝女郁字叔異五嵗母不能食郁亦不肯食故字曰異也後漢書曰孔融被誅女年七嵗幼弱遂得全寄住他舎主人有遺肉汁男飲之女曰今日之過豈得乆活何賴肉味乎或有言於曹操收之将殺女謂兄曰若死而有知得見父母豈非志願乃延頸就刑晉書曰周顗字伯仁母李氏名絡秀汝南人少時在室顗父俊為安東将軍時嘗出獵遇雨而至絡秀之家㑹秀父兄不在絡秀見周俊至與一婢於内宰猪具數十人􅄿盛精而不聞人聲俊恠使覘之獨見一女甚美因求為妾其父兄不許絡秀曰門户殄瘁何惜一女若連貴族将来庶有大益父兄遂許之生顗嵩謨而顗等才長絡秀謂之曰我屈節為汝家妾門户計耳汝不與我家為親吾亦何惜餘年顗等從命由是李氏遂得為方雅之族又曰胡奮字元威安定人為䕶軍泰始末武帝怠於政事而躭於顔色大採公卿女以為六宫奮女𨕖為貴人奮唯有一男為南陽王友早亡及聞女為貴人哭曰老奴不死惟有二子男入九地之下女登九天之上嘗謂后父楊駿曰卿恃女更豪耶見前代與帝家婚未有不滅門者見君舉措益速禍耳駿曰卿女不在天子家乎奮曰我女為卿女妾耳又曰羊耽妻辛氏字憲英魏侍中辛毗之女也聰明有才鍳初文帝為太子抱毗項曰知我喜否毗以告憲英英曰太子代君主社稷者也代君不可以不慼主國不可以不懼今宜慼而反喜何以能乆魏其不昌乎又曰愍懐太子妃太尉王衍之女字惠風太子廢衍請絶婚而歸恵風號泣行路流涕後劉曜陷洛陽以恵風賜其下将妻之恵風㧞劍拒曰吾太尉之女太子之妃誓不為逆胡所辱遂害之又曰韋逞母宋氏世家儒學母早喪父躬養之及長授以周官音義謂曰世𫝊儒業無男可傳汝宜授之勿令絶世又曰吳隐之字處黙濮陽人謝石請為将軍主簿隐之将嫁女石知其素儉令移尉厨帳就其家經營使者至方見賣犬此外蕭然無辦又曰靳康女不知何許人美姿容有志操劉曜誅靳氏訖将納其女為妾女曰陛下既誅其父母焉用妾為妾聞逆人之誅也尚洿宫伐樹况其子女乎號泣請死曜慙乃因免之晏子春秋曰齊景公有所愛槐樹令吏守之犯槐者刑傷槐者死有不聞令而犯之者吏収之将加之刑犯者女説晏子曰妾聞明君不為禽獸以殺人今吾君以樹木之故殺妾父孤妾身恐害明君之政損明君之義晏子早朝而復其言於君公乃令吏罷守槐之役岀犯槐之囚華陽國志曰荀崧小女灌㓜而竒節崧為㐮城太守為杜曽所圍力弱食盡欲投於故吏平南将軍石覽計無所出灌時年十三乃率勇士數十人踰城突圍夜出賊追甚急灌督厲将士且戰且前得入楊山獲免向覧乞師又為崧書與南中郎将周訪仍結弟兄訪即遣子撫率三千人㑹石覧俱救崧聞兵至散走灌之力也又曰王廣女美姿容性慷慨有丈夫之節廣仕劉聰為西揚州刺史楊芳攻陷揚州廣被殺女年十五芳納之於闇室中撃芳不中芳曰何故反女曰蠻畜我誅父賊吾聞之父讐不同天母讐不同地汝逆害人父母又以無禮陵人吾所以不死者欲誅汝爾所恨不得梟汝首於通衢以塞大恥乃自殺又曰楊姬生自寒素父坐獄楊渙為尚書郎告歸姬乃邀道扣渙言訟父罪言詞慷慨涕泣推感渙愍之語郡縣令為出其父因竒其才為子文方以禮聘之汝南先賢𫝊曰戴良字叔鸞嫁五女皆布裙無縁蔡琰别𫝊曰琰邕之女年六嵗邕中夜鼔琴絃絶琰曰第二絃絶邕乃故絶一絃琰曰第四絃邕曰汝安得中之琰曰昔吳季札觀樂知國之興亡師曠吹律識南風之不競由此言之何得不知邕竒之異苑曰順陽南鄉楊豐為虎所噬女香年十四手無寸刃直搤虎頭父遂得免子壻爾雅曰女之夫為壻壻之父為姻兩壻相謂為婭儀禮曰婿女子之夫傳曰何以服緦報之也左傳桓公曰祭仲專鄭伯使其婿雍紏殺之雍姬知之謂其母曰父與夫孰親其母曰人盡夫也父一而已何可比焉遂告祭仲曰雍氏舎其室而将享子于郊吾惑之以告祭仲殺雍紏尸諸周氏之汪公載以出曰謀及婦人宜其死也又文公下曰趙穿晉君之婿也論語曰子謂公冶長可妻也雖在縲絏之中非其罪也以其子妻之南容三復白圭孔子以其兄之子妻之史記曰陳餘者大梁人好儒術數逰趙富人公乗氏以其女妻之知餘非庸人漢書曰京房字君明東郡人習易淮陽憲王舅張博從京房受學以女妻房房與相親後漢書曰馬融扶風人為人美辭貌有俊才初京兆摯恂以儒術教授隐于南山不應徴聘從其逰學通經籍恂遂竒融才以女妻之晉書曰韓謐字長深母賈氏賈充女也父夀字徳真南陽人美貌充辟為司空掾充讌賔僚女從青璅中窺見夀悦焉感想發於寤寐有婢往夀家説其光彩艶逸夀聞動心令通慇懃夀勁捷過人至夕踰垣而入家人莫知惟充覺女恱暢異於常日時西域有貢香著人衣一月不歇帝甚貴之唯以賜充女宻盗以遺夀僚佐與充宴聞香芬馥自此充意女與夀通乃夜半佯有盗驚起伺之惟東北角有狐狸行處充考問女左右知之充遂因妻焉又曰郗鍳使門生求女壻於王導導令自東廂徧觀諸子門生歸謂鍳曰王氏諸少年並佳然聞信至咸自矜持唯一人在東床坦腹食獨若不聞鍳曰此正佳婿也訪之乃羲之也宋書曰劉秀十餘嵗時與諸兄戯忽有一大蛇来勢甚猛莫不驚怖秀獨不動衆共異焉東海何承天雅相知器以女妻之齊書曰謝朓為王敬則婿曽告敬則其女常懐刀欲報朓朓不敢相見及當拜吏部謙抑尤甚尚書郎范縝嘲以卿人才無慙小𨕖但恨不可刑于寡妻朓有愧色及臨訣歎曰天道其不可昧乎我不殺王公王公因我而死三十國春秋曰前趙殷州刺史杜廣初為劉景廐卒以馬肥良引為直士侍立通夜未曾休倦景因問之廣流涕申欵曲有章條景執其手曰吾罪人也乆負賢者謂妻曰為女求夫三年不覺廐中有麒麟於是妻之捜神記曰楊公字雍伯洛陽人至情篤孝父母殁塟無終山楊公常為人補履終不取價無終山上無水楊公乃行車汲水為義漿居三年有一人就楊公飲出一升石子與之使向好平地有石處種之玊當生其中并得好婦楊公後種其石數年時往看玉子生焉北平徐氏冇女甚有名行人多求不許楊公有佚氣試求焉徐氏以為狂乃戯媒人曰雍伯能得白璧一雙當聴為婚致命雍伯於種石中索得五雙白璧以至徐氏大驚遂以女妻之太平御覽卷五百一十九
