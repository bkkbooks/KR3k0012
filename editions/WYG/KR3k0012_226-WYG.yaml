body:
  text: 太平御覽卷二百二十六宋李昉等撰職官部二十四御史中丞下持書侍御史御史中丞下晉書曰熊遠字孝文遷御史中丞中宗毎嘆其公忠謂遠曰卿在朝政正色不茹柔吐剛忠亮至勁可謂王臣又曰庾峻字山甫爲御史中丞優而不尅又曰周處字子隱爲御史中丞奏征虜將軍石崇大將軍梁王肜等正繩直筆權豪震肅又曰劉暾他昆切字長升兼中丞奏免尚書僕射等十餘人朝廷嘉之遂以即真謝靈運晉書曰漢官尚書爲中臺御史爲憲臺謁者爲外臺是爲三臺自漢罷御史大夫而憲臺猶置以丞爲臺主中丞是也晉中興書曰譙王恬字元愉音逾爲御史中丞値海西公廢太宗即位未解嚴大司馬桓温屯中堂夜吹警角恬奏劾温大不敬請理罪明日温見奏事歎曰此兒乃敢彈我真可畏也又曰熊遠遷御史中丞尚書郎盧綝入直逢尚書令刁恊大司馬門外恊醉使綝避之綝以當直不肯避恊令人牽綝墮馬至恊乘馬而後釋遠請免恊官詔令白衣領職又曰劉瑀音禹遷御史中丞瑀氣尚人爲憲司甚得志彈蕭惠開云非才非望非勲非地彈王僧遠云廕藉高華人品冗末朝士莫不畏其筆端又曰蕭惠開拜御史中丞世祖與劉季之詔曰今以蕭惠開爲憲司冀當稱職但往一服額已自殊有所震及在任百寮畏憚之八年入爲侍中詔曰惠開前任憲司奉法直繩不阿權戚朕甚嘉之可更授御史中丞又曰鄭鮮之遷御史中丞明憲直繩甚得直司之體外甥毅權重當時朝廷莫不歸附鮮之盡心高祖獨不屈毅甚恨焉又曰荀伯子爲御史中丞莅職勤恪有匪躬之稱立朝正色内外憚之凡所奏彈莫不深相呵毁或延及祖宗其言切直又頗雜嘲戯故世人以此非之齊書曰王僧䖍遷御史中丞甲族由來多不居憲職王氏分枝居烏衣者位宦微减僧䖍爲此官乃曰此乃烏衣諸郎坐處我亦可試爲耳又曰江淹爲御史中丞明帝作相謂淹曰君昔在尚書中非公事不妄行在官寛猛能折衷今爲南司足以震肅百寮也曰今日之事可謂當官而行更恐不足仰稱明旨耳於是彈中書令謝朏音斐司徒左長史王繢音回䕶軍長史庾𢎞遠並以託疾不預山陵公事又奏收前益州刺史劉悛梁州刺史隂智伯並贓貨巨萬輙収付廷尉臨海太守沈昭畧永嘉太守庾曇隆又諸郡二千石并大縣官長多被劾内外肅然明帝謂曰自宋以來不復有嚴明中丞君今日可謂近世獨歩梁書曰樂藹遷御史中丞初藹發江陵無故於舡得八車輻如中丞健歩避道者至是果遷焉又曰王僧孺兼御史中丞僧孺幼貧其母鬻紗布以自業擕僧儒至市道遇中丞鹵薄駈廹墜溝中及是拜日引騶清道悲感不自勝頃之即真後魏書曰李彪爲中尉號爲嚴酷以姦欵難得乃爲木手擊其脇腋氣絶而後屬者時有汾州叛胡得其兇渠皆鞭而煞之彪之病也體上瘡潰痛毒備極又曰李彪遷御史中尉彪爲高祖所寵性又剛直遂多所彈糺遠近畏之豪右屏氣高祖嘗呼爲李生又從容謂群臣曰吾之有李生猶漢之有汲黯北齊書曰齊王高澄用崔暹爲御史中尉宋遊道爲尚書左丞謂之曰卿一人處南臺一人處北省當使天下肅然又曰琅琊王儼字仁威武成第三子累爲御史中丞魏氏制中丞岀清道與皇太子分路行王公皆逕住車去牛頓車於地以待中丞過其或違遲則赤棒棒之自都鄴後此儀寢絶武成欲雄寵儼乃使一依舊制初從北宫岀將上宫丞凡京畿歩騎領軍之官屬中丞之威儀司徒之鹵簿莫不畢備於時儼總領四職帝與胡后在華林園東門外張幕隔青紗歩障觀之遣中使驟馬趍仗不得入自言奉勅赤棒應聲碎其鞍馬驚人墜帝大笑以爲善更勅令駐車傳語良乆觀者傾京邑陳書曰徐陵除散騎常侍御史中丞時安成王爲司空以帝弟之尊勢傾朝野直兵鮑僧叡假王威權抑塞辭訟文臣莫敢言者陵聞之乃爲奏彈道南臺官屬引奏案而入世祖見陵服章嚴肅若不可犯爲歛色正容坐陵進讀奉狀時安成王殿上侍立仰視世祖流汗失色陵遣殿中御史引王殿下遂劾免侍中中書監自此朝廷肅然隋書曰後魏延昌中王顯有寵於宣武御史中丞請革選史此後踵其事毎一殿中更置御史自開皇後始自吏部選用依舊直入禁中唐書官品志曰中丞一人掌督司百僚皇太子已下其在宫宫門行行馬内違法者皆糾彈之雖在馬外而監司不糺亦得糺之專道而行逢尚書丞郎亦得停駐又曰張易之縱恣益横嘗私引相工李引㤗占吉㓙言渉不順御史中丞宋璟音冏請窮究其狀武太后曰易之等已上聞璟曰謀反大逆無容首免易之等分外承恩臣知言岀禍從然義激於心雖死不恨太后不悦内史姚璹音孰恐忤旨遽宣勅令岀璟曰天顔咫尺親奉德音不煩宰相擅宣王命太后意解及収易之等就獄尋詔原之命就宅謝罪璟拒而不見曰公事當公言之若私見法無私也又曰御史丞姚庭筠奏稱律令格式懸之象魏奉而行之事無不理比見諸司寮寀不能遵守章程事無大小皆悉聞奏臣聞爲君者任爲臣者奉法故曰汝爲君目將司明也則知萬機務綜不可徧覽也所以設官分職者委任責成百工惟時以成垂拱之化比者或脩一水牕或伐一枯木並皆上聞旒扆取斷宸衷豈代天理物至公之道也自今已後若縁軍國大事及牒式無文者任奏取進㫖日餘據章程合行者各令准法處分其故生疑滯致有稽失者請令御史隨事糺彈上從之又曰盧奕懷慎之少子也與兄奐音喚齊名天寳十一年爲御史中丞始懷慎及奐並爲此官父子三人爲中丞清節不易時人美之又曰齊映爲御史中丞從德宗幸梁州每遇險映嘗執轡㑹上馬驚跳奔益甚上懼傷映令捨轡映堅執乆之乃止問其故對曰馬奔踶音弟不過傷臣如捨之或犯清塵雖臣萬死何以塞責上嘉歎無己又曰御史中丞武元衡奏貞元二年御史中丞竇叅所奏凡諸使亷憲官者除元帥都統節度觀察都團練防禦等使餘並在本官之位其後蘇弁音卞于碩音石以度支節中兼御史中丞鄧求以易州刺史兼御史大夫皆奉進㫖令在同類之上伏以前後異同遵守不一臣謹議伏請自今常叅兼御史大夫中丞者在檢校官立在本品同類之下從之又曰元和中御史中丞王播奏監察御史舊例在任二十五月轉准具員不加今請仍舊例在任十三月轉准具員加至十八月今請减至十五月侍御史舊例在任六月轉准具員加十三月今請至十月從之又曰文宗開成初中丞狄兼謩謝官上曰御史中丞朝廷紀綱一臺理則朝廷理朝廷理則天下理無曠厥職兼謩奏百凡天下有礙法不得中道事臣盡得以彈奏上曰大抵以顧望畏忌爲心者自失職業卿梁公之後將嗣家聲不可不留意又曰文宗謂宰臣曰丁居晦作中丞何如因悉數大臣而品第之歎曰宋申錫堪任此居惜哉又曰牛僧孺可爲大夫宰臣鄭覃曰頃爲中丞未嘗搏擊恐無風望上曰不然鸞鳯與鷹隼事異又曰居晦作此官朕曽以時諺謂杜甫李白輩爲四絶問居晦曰此非君上要知之事常以此記得居晦今所以擢爲中丞又曰㑹昌元年中書門下奏御史中丞爲大夫之貳縁大夫秩崇官不常置中丞嘗爲憲臺之長今寺監少卿監司業少尹並爲寺置之貳皆爲四品中丞官名至重見秩未崇望升爲從四品從之又曰薛存誠爲給事中瓊林庫使奏召工徒太廣存誠以爲此皆姦人竄名以避征徭不可許咸陽尉裘儋都甘切與軍鎮相競軍人無理遂肆侵誣儋反受罰二勅繼至存誠皆執之上聞甚悦命中丞嘉勞由是選拜御史中丞又曰孔緯爲御史中丞緯器志方雅嫉惡如讐旣總憲綱中外不繩而自肅又曰盧坦爲御史中丞裴均爲僕射左班踰位請退之均不受坦曰姚南仲爲僕射例如此均曰南仲何人坦曰南仲是守正而不交權幸者尋罷爲右庶子時人歸咎於均三國典略曰梁張綰字孝卿雍州績之弟也梁主䇿其百事綰對闕其六乃號爲百六公常爲御史中丞兄績爲僕射元日朝㑹及百司就列兄弟並導騶兩陛前世未有時人榮之崔鴻十六國春秋趙録曰叚凱驍勇好讀書爲御史中丞明筆直繩無所阿避傅咸集奏曰司𨽻中丞得糺太子而不得糺尚書臣所未譬朝廷無亦易之梅陶日叙曰余居丞曾以法鞭皇太子傅友莫不致諫余笑而應之堂高由陛下太子所以榮者由於吾奉王者法吾敢枉道曲媚後皇太子特見延清賜以請讌之禮如師袁淑謝中丞章曰竊惟此職昭賛實預損益必湏兼威正刺骨窮文使權家勲族不敢藉强而侮物戚門右姓不得稱雄以掩衆昔傅咸臣治僚寀戢懼孫實稱疾卿尹皆怠持書御史漢書曰宣皇帝元鳯中路温舒上書緩刑帝深采覽之季秋後請讞魚列反又音獻時帝幸宣室齋宫而决事命侍御史二人持書遂置持書御史通典曰御史中丞舊持書御史也國諱改焉後厯代皆同風俗通曰頃者廷尉多墻靣而苟充兹位持書侍御史不復平議讞當糺紛豈一事哉里語曰縣官漫漫寃死者半後漢書曰蔡邕以侍御史轉持書御史遷尚書三日之間周遷三臺續漢書曰百官志曰持書御史秩百石掌選明法律者爲之天子疑獄以法律讞是非糺六品以下桓帝以後不治獄充位而已魏書曰王觀字偉臺東郡亶邱人也明帝幸許昌召觀爲治音持下同書侍御史典行臺獄時多倉卒喜怒而觀不阿音順㫖晉書曰杜預爲鎮南入辭口啟陳壽史才通博宜補黄散也黄黄門侍郎散散騎常侍上曰壽可作治書否預對曰唯在聖詔即手詔用之又曰太始四年置黄沙獄持書御史一人秩與中丞同掌詔獄及廷尉不當皆理之梁書曰謝幾卿天監初除征虜鄱陽王記室尚書三公侍郎尋爲侍御史舊郎官轉是職者世謂爲南奔幾卿失志多陳疾臺事略不復理後爲散騎侍郎後魏書曰高道悦拜治書御史正己當官亡憚强禦奏舉任城王澄等免官高祖詔褒美之隋書曰栁彧遷治書侍御史於時刺史多任武將類不稱職彧上表曰方今天下太平四海清謐共治百姓任其才能昔漢光武一代明哲超自布衣備知眞僞與二十八將披荆棘定天下及功成之後無所職任伏見詔書以上柱國和干子爲把州刺史其人年垂八十鐘鳴漏盡前任趙州闇於職務政由群小賄賂公行百姓吁嗟謌謡滿道乃云老禾不早殺餘種穢良田古人乃云耕當問奴織當問婢此言各有所能也干子弓馬武用是其所長治民蒞職非其所解至尊思治無忘興寢如謂優老尚年自可厚賜金帛若令刺舉所損殊大臣死而後已敢不竭誠上善之干子竟免又曰梁毘爲持書侍御史時京師饑上令禁酒劉昉使妾任僦也屋當罏酤酒毘劾奏昉曰臣聞處貴則戒之以奢持滿則守之以約昉既位列群公秩高庶尹縻爵稍乆厚禄已淹正當戒滿歸盈監斯止足何乃規麴蘖之潤競錐刀之末身昵酒徒家爲逋藪若不糺繩何以肅厲有詔不治昉欝欝不得志又曰栁彧爲治書御史右僕射楊素當塗顯貴百寮慴憚無敢忤者嘗以少譴勅送南臺素恃貴坐彧牀彧從外來見素如此於階下端笏謂素曰奉勅治公之罪素遽下彧遽按而坐立素於庭辨詰事狀素由是銜之唐書曰孫伏伽初以三事上諫高祖大悦擢拜治書侍御史兼賜帛三百疋時軍國多事賦歛繁重伏伽屢奏請改革舊政高祖並納之因謂裴寂曰隋末無道上下相蒙主則驕矜臣唯謟佞上不問過下不盡忠使社稷傾危身死疋夫之手朕撥亂反正志在安人平亂任武臣官方委文吏庶得各展器能以匡不逮此毎虛心接待兾聞讜言惟李綱差盡忠欵孫伏伽可謂誠直餘人猶踵弊風俛眉而已豈朕所望哉江總贈孔中丞詩曰我行五嶺表辭卿二十年聞鸎欲動詠披霧即依然疇昔同僚寀今隨年代改借問藏書處唯君故人在故人名官高清簡肅權豪誰知懷九歎徒然泣二毛傅咸御史中丞箴叙曰百官之箴以箴王闕余承先君之蹤竊位憲臺懼有忝累垂翼之責且造斯箴以自朂勵不云自箴而云御史中丞箴者凡爲御史中丞欲通以箴之也詞曰煌煌天文衆星是環爰立執法其暉有煥執憲之綱秉國之憲鷹揚虎視肅清違慢謇謇匪躬是曰王臣旣直其道奚顧其身身之不顧孰有弗震邦國若否惟仲山甫是明焉用彼相莫扶其傾淮南搆逆實憚汲生赫赫有國可無忠貞憂責有在繩必以直良農耘穢勿使能植無禮是逐安惜翅翼若爾庶寮各敬乃職無爲罰先無怙厥力怨及朋友無慙於色得之天子内省有恧音匿慙也是曰作箴惟以自勅太平御覽卷二百二十六
