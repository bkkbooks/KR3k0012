body:
  text: 太平御覽卷一百宋李昉等撰皇王部二十五東晉安皇帝桓𤣥附恭皇帝安皇帝晉書曰安皇帝諱德宗孝武帝長子也太元十二年八月辛巳立為皇太子二十一年九月庚申孝武崩辛酉太子即位太赦癸亥以司徒㑹稽王道子為太傅攝政隆安元年春正月己亥朔帝加元服改元增文武位一等太傅㑹稽王道子歸政四月甲戌兖州刺史王恭豫州刺史庾楷舉兵以討尚書左僕射王國寶建威將軍王緒為名甲申殺國寶及緒以說于恭恭乃罷兵二年七月兖州刺史王恭豫州刺史庾楷荆州刺史殷仲堪廣州刺史桓𤣥南蠻校尉楊佺期等舉兵反八月江州刺史王愉奔于臨川九月辛夘加太傅㑹稽王道子黃鉞遣征虜將軍㑹稽王元顯等討桓𤣥輔國將軍劉牢之次新亭使子敬宣擊敗恭恭奔曲阿長塘湖尉収送京師斬之尋遣太常殷茂諭仲堪追𤣥𤣥等走于尋陽三年十一月甲寅妖賊孫恩陷㑹稽内史王凝之死之呉國内史桓謙等並委官而遁遣衞將軍謝琰等逆擊走之四年五月孫恩冦浹口庚寅謝琰為孫恩所陷死之恩轉冦臨海六月輔國司馬劉裕破恩於南山恩將盧循陷廣陵元興元年正月庚午朔大赦改元以後將軍元顯為驃騎將軍征討大都督鎭北將軍劉牢之為元顯前鋒將軍譙王尚之為後部以討桓𤣥二月庚午帝戎服餞元顯于西池丁巳遣兼侍中齊王柔之以騶虞幡宣告荆江二州丁夘桓𤣥敗王師于姑熟三月壬申桓𤣥自為侍中丞相録尚書事二年春正月辛丑建威將軍劉裕破徐道復于東陽乙夘桓𤣥自稱大將軍丁巳冀州刺史孫無終為桓𤣥所害秋八月𤣥又自號相國楚王九月南陽太守庾仄起義兵為𤣥所敗冬十一月壬午𤣥遷帝于永安宫癸未移太廟神主于琅琊國十二月壬辰𤣥簒位以帝為平國王辛亥帝蒙塵于尋陽三年春二月帝在尋陽庚寅夜濤水入石頭漂殺人户乙夘建武將軍劉裕帥沛國劉毅東海何無忌舉義兵庚辰斬桓𤣥所署徐州刺史桓修于京口及青州刺史桓𢎞于廣陵丁巳義師濟江三月戊午劉裕斬𤣥將呉甫之于江東斬皇甫敷于羅落己未桓𤣥衆潰而逃庚申劉裕置畱臺具百官壬戌𤣥司徒王謐推劉裕行鎮軍將軍徐州刺史都督揚徐兖豫青冀幽并八州諸軍事假節劉裕以謐領揚州刺史録尚書事辛酉劉裕誅尚書左僕射王愉及愉子荆州刺史子緩司州刺史溫詳辛未桓𤣥逼帝西上庚戌宻詔以幽逼于𤣥萬幾虚曠令武陵王遵依舊典承制總百官行事加侍中餘如故并大赦謀反大逆已下唯桓溫一祖之後不宥夏四月己丑大將軍武陵王遵稱制總萬幾庚寅帝至江陵庚戌輔國將軍何無忌振武將軍劉道規及桓𤣥將庾稚何澹之戰于湓口大破之𤣥復逼帝東下五月癸酉冠軍將軍劉毅及𤣥戰于崢嶸洲又破之己夘帝復幸江陵辛巳荆州别駕王康崖南郡太守王騰之奉帝居于南郡壬午督護馮遷斬桓𤣥于南貊州乘輿反正于江陵閏月己丑桓𤣥揚武將軍桓振陷江陵帝復蒙塵于賊營義熙元年正月帝在江陵南陽太守魯宗之起義兵襲破襄陽己丑劉毅次于馬頭桓振以帝屯于江津辛夘宗之破振將溫楷于祚溪進次紀南為振所敗振武將軍劉道規擊桓謙走之乘輿反正帝與琅琊王幸道規舟二月丁巳畱臺備乘輿法駕迎帝于江陵三月桓振復襲江陵荆州刺史司馬休之奔于襄陽建威將軍劉懐肅討振斬之帝至自江陵六年十二月壬辰劉裕破盧循于豫章七年春二月壬午右將軍劉藩斬徐道復于始興傳首京師夏四月盧循走交州刺史杜惠斬之十二年八月劉裕及琅琊王德文率衆伐姚泓庚午大赦冬十月庚寅姚泓將姚光以洛陽降己丑遣兼司空高密王恢之修謁武陵十三年秋七月劉裕克長安執姚泓収其彛器歸京師十四年十二月戊寅帝崩于東堂在位二十三年時年四十七葬休平陵帝不慧自少及長口不能言雖寒暑之變無以辨也凡所動止皆非已出故桓𤣥之簒因此獲全桓𤣥晉書曰桓𤣥字敬道一名靈寶大司馬溫之孽子也其母馬氏嘗與同輩月下夜坐見流星墜銅盆中忽為二珠燦然明淨競以瓢接取馬氏得而吞之若有感遂有光照室占者竒之故小名曰靈寶妳媼毎抱詣溫輒易人而後至其重兼常兒溫甚愛異之臨終命以為嗣襲爵年七歲溫服終府州文武辭其叔父沖沖撫𤣥頭曰此汝家故吏也𤣥因涕泣被面衆並異之及長形貌瓌竒丰神疎朗博綜藝術善屬文常負其才地以雄豪自處時咸憚之年二十三拜為太子洗馬時議謂溫有不臣之迹故折𤣥兄弟而為素官後出補義興太守鬱鬱不得志嘗登高望震澤歎曰父為九州伯兒為五湖長棄官歸國自以元勲之門而負謗于世乃上疏曰臣聞周公大聖而四國流言樂毅王佐而被謗騎劫巷伯有豺獸之慨蘇公興飄風之刺惡直醜正何代無之先臣蒙國殊遇姻婭皇極西平巴蜀北清伊洛竊號之冦繫頸北闕園陵復修大恥再雪飲馬灞滻懸旌趙魏勤王之師功非一㨗太和末皇基有潛移之懼遂奉天順人翼登聖朝晉室之基危于殷漢先臣之功高于伊霍矣至於先帝龍飛九五陛下之所以繼明南面請問談者誰之由也若陛下忘先臣大造之功信貝錦萋斐之説臣等自當奉還三封受戮市朝然後下從先臣歸先帝𤣥宫耳疏寢不報𤣥在荆楚積年優游無事荆州刺史殷仲堪敬憚之及中書令王國寶用事謀削弱方鎭内外騷動知王恭有憂國之言𤣥潛有意於功業乃説仲堪宜興晉陽之師以内匡朝廷已當悉荆楚之衆順流而下推王恭為盟主此桓文之舉也俄而王恭信至招仲堪及𤣥匡正朝廷國寶既死于是罷兵詔以𤣥為廣州刺史其年王恭又與庾楷起兵討江州刺史王愉及譙王尚之兄弟𤣥仲堪謂恭事必克捷一時響應仲堪令𤣥與楊佺期為前鋒𤣥至湓口獲王愉詔以𤣥為江州各西還屯于尋陽共相結納推𤣥為盟主後荆州大水仲堪賑恤飢者倉廩空竭𤣥乘其虚而伐之至江陵仲堪數道拒之不克佺期自襄陽來救期敗走殷仲堪亦見害于是平荆雍詔以𤣥督八州荆州牧𤣥于是樹腹心兵馬日盛其後孫恩逼京師𤣥建牙旗聚衆外託勤王實欲觀釁以兄偉為冠軍江州刺史畱偉守江陵抗表率衆下至尋陽移檄京師罪狀元顯𤣥既興師犯順慮衆不為用恒有迴斾之計既過尋陽不見王師意甚悦將吏亦振先使其將馮該等攻譙王尚之敗之劉牢之遣子敬宣降𤣥至新亭元顯自潰𤣥入京師矯詔加已總百揆為丞相黃鉞羽葆鼔吹府置官屬乃徙太傅道子于安成害元顯于市多僇朝望改易百官各置所親大赦改元為大亨𤣥將出居姑孰其中書令王謐對曰公羊有言周公何以不之魯欲天下一乎周也願靜根本以公旦為心𤣥善其對而不從遂大築城府乃出鎭焉大政皆咨之小事則決于僕射桓謙及卞範之後諷朝廷封諸子弟為公自知怨滿天下欲速定簒逆殷仲文卞範之等又共催促之于是先改授郡司其黨皆三公又矯詔封十郡為楚王加九錫備物楚國置丞相以下一遵舊典又諷天子御前殿而䇿授焉𤣥屢偽讓詔遣百僚敦勸乃就命𤣥偽上表求歸藩又自作詔畱之遣使宣㫖𤣥又上表固請又諷天子作詔固畱十一月矯制加具備天子禮服僭御禮樂焉又矯詔使王謐兼太保奉帝璽禪位于已帝出居永安宫移晉神主于琅琊廟初𤣥恐帝不為手詔又慮璽不可得逼臨川王寳請帝自為手詔因奪取璽比臨軒璽已久出𤣥甚喜百官到姑孰𤣥偽讓朝臣固請乃于城南七里𤣥立郊壇以𤣥牡告天百僚陪列而儀注不備㤀稱萬歲遂升壇燎于南郊大赦改元永始初偽詔改元為建始右丞王攸之曰永始復是王莽始執權之歲也其兆號不祥冥符僣逆如此國號大楚以南康平固縣奉晉帝為平固王車旗正朔如舊典遷居尋陽依陳畱王處鄴宫故事追尊其父溫宣武皇帝諸子皆為王𤣥入建康宫逆風迅雷激其儀飾皆傾及小㑹西堂設鼔樂殿上施絳帳鏤黃金為顔四角作金龍頭銜五色羽葆流蘇羣臣私相謂曰此頗似轜車亦王莽仙蓋之流也𤣥以其妻劉氏為皇后更造大輦容三十人坐以二百人舁之性好畋遊以體大不堪乘馬又作徘徊輿施轉開合動作無滯𤣥自簒盜之後驕奢荒侈遊畋無度以夜繼晝性又急暴呼召嚴速直官咸繫馬省前禁内雜亂無復朝廷之體于是百姓疲苦朝野勞悴怨怒思亂者十室八九焉劉裕劉毅何無忌等共謀克復裕等斬桓修于京口斬𢎞于廣陵裕率義軍至竹里𤣥遣呉甫之皇甫敷北拒義軍裕等於江乘與戰臨陣斬敷及甫之𤣥聞之大懼乃召諸道術人推算數為厭勝之法乃問衆曰朕其敗乎曹靖之對曰神怒人怨臣實懼焉𤣥曰人或可怨神何怒對曰移晉宗廟飄泊無所大楚之祭不及于祖此其所以怒也𤣥曰卿何不諫對曰輦上君子自以為堯舜之世何敢妄言𤣥愈忿懼使桓謙何澹之屯東陵卞範之屯覆舟山帥衆二萬拒義軍裕至蔣山使老弱登山分張旗幟數道並前𤣥懼候還云裕軍四塞不知多少𤣥益憂惶于時東北風急義兵放火烟塵漲天鼔噪之音震駭京邑劉裕執鉞麾而進謙等諸軍一時奔潰𤣥率親信數千人聲言赴戰遂出南掖門西至石頭使殷仲文具舟相與南奔或勸其戰𤣥不暇荅直以䇿指天而經日不得食左右進以粗飯咽不能下其子昇時年數歲抱𤣥胷而撫之𤣥悲不自勝劉裕以武陵王遵攝萬幾立行臺總百官遣劉道規躡𤣥𤣥至尋陽江州刺史郭昶之給其器用殷仲文自後至望見𤣥舟旌旗輿服備帝者之儀嘆息曰敗中復振故可也𤣥于是逼乘輿西上于道作起居注叙其拒義軍之事自謂經畧指授算無遺䇿諸將違節度以致虧喪非戰之罪𤣥至江陵石康納之未三旬衆盛謂其羣黨曰卿等並清塗翼從朕躬都下竊位者方應謝罪軍門其觀卿等入石頭並雲霄中人也𤣥遣何澹之守湓口何無忌劉道規等破之帥舟艦三百發江陵以徐放為常侍遣説無忌等解軍謂放曰諸人不識天命致此妄作遂懼禍屯結卿三州所信可明示朕心若退軍解甲當與之更始授任江水在此朕不食言時道規已至𤣥與戰於崢嶸洲於時義兵數千𤣥兵甚盛而𤣥懼有敗常漾輕舸於舫側故其衆莫有鬭心義軍乘風縱火盡鋭爭先𤣥衆大潰𤣥畱永安太后及皇后于巴陵殷仲文時在𤣥艦求出别船収集散軍因叛𤣥奉二后奔於江陵𤣥欲出漢州投梁州刺史桓希而制令不行𤣥乘馬出城至門左右於闇中斫之不中前後相殺交橫𤣥僅免于是荆州别駕王康産奉帝入南郡時益州刺史毛璩使其從孫祐之送弟璠喪葬江陵有衆二百璩弟子修之先為𤣥校尉誘𤣥以入蜀達枚囘洲祐之迎擊𤣥矢下如雨𤣥被箭其子昇拔去之益州督䕶馮遷抽刀而前𤣥拔頭上玉簪與之仍曰是何人耶敢殺天子遷曰欲殺天子之賊耳遂斬首時年三十六自簒逆至敗時凡八旬矣恭皇帝晉書曰恭帝諱德文安帝母弟也初封琅琊王厯中軍將軍散騎常侍衞將軍開府儀同三司侍中領司徒録尚書六條事元興初遷車騎大將軍桓𤣥執政進位太宰加衮冕之服緑綟綬𤣥簒位以帝為石陽縣公與安帝俱居尋陽及𤣥敗隨至江陵𤣥死桓振奄至躍馬奮戈直至堦下嗔目謂安帝曰臣門户何負國家而屠滅若是帝乃下牀謂振曰此豈我兄弟意耶振乃下馬致拜振平復為琅琊王又領徐州刺史尋拜大司馬領司徒加殊禮義熙五年置左右司馬長史從事中郎四人加羽葆鼔吹十二月戊寅安帝崩是日即帝位大赦元熙元年春正月壬辰朔改元以山陵未厝不朝㑹立后褚氏甲午徵劉裕還朝二年夏六月壬戌劉裕至于京師傅亮承裕密㫖諷帝禪位草詔請帝書之帝欣然謂左右曰桓𤣥之時天命已去為劉公所延二十年矣今復何恨乃書赤紙為詔甲子遂遜于琅琊第劉裕以帝為零陵王居于秣陵行晉正朔車旗服色一如其舊有其文而不備其禮宋永初二年九月崩于内房時年三十六謚恭皇帝葬沖平陵續晉陽秋曰初安皇不慧起居動止不自己出帝每侍左右雖涼溫飢飽之中而恭謹備焉時人稱其順弟又雅信佛鑄見貨十萬造丈六金像于瓦官寺擇日齋戒迎像竟步從十許里安皇帝歸陵有詔當出送八座奏諫以為宜加珍攝乃止沈約宋書曰禇秀之妹為恭帝后兄弟並盡忠孝高祖知恭帝生男輒令方便殺焉或誘賂内人或密加毒害前後如此非一恭帝居秣陵宫帝懼見禍與褚后共止一室慮人鴆毒自食于床前高祖將殺之不欲遣人内入褚淡之兄弟褚后出别宫相見兵人乃踰垣而入進藥於恭帝恭帝不肯飲曰佛教自殺者不得復人身乃以被掩殺之中興書曰昔中宗以丁丑之歲始稱晉王改築宗廟使郭璞筮之云載祀二百及今禪代庚申之歲凡百有二年而天禄永終璞精於術數理無乖貳抑以百二期促故倒其辭為二百耶史臣曰安帝即位之辰鍾無妄之日道子元顯並傾朝政主昏臣亂未有不亡者也雖有手握戎麾心存舊國迴首無良忽焉消散于是桓𤣥承釁勢踰飈指六師咸泯隻馬徂遷是以宋高非典午之臣孫恩豈金行之冦若乃世遇顚覆則恭皇斯甚於越之民詎燻丹穴㑹稽之侣寧嘆入臣去黃屋而歸來灑丹書而不恨夫五運攸革三微數盡猶高秋凋候理之自然觀其零落人有為之流連者也太平御覽卷一百
