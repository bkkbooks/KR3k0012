body:
  text: 太平御覽卷二十六宋李昉等撰時序部十一冬上冬上釋名曰冬曰上天其氣上騰與地絶也故月令曰天氣上騰地氣下降說文曰冬四時盡也字從夊古終字從仌古氷字書曰申命和叔宅朔方曰幽都平在朔易日短星昴以正仲冬厥民隩鳥獸氄毛又曰冬祁寒小民亦惟曰怨咨詩曰我有㫖蓄亦以禦冬又曰豐年之冬必有積雪又曰十月納禾稼黍稷穜稑上音童下音陸禾麻菽麥又曰二之日鑿氷沖沖又曰冬日烈烈飄風發發又曰坎其擊皷宛丘之下無冬無夏植其鷺羽坎其擊缶宛丘之道無冬無夏植其鷺翿禮月令曰十月之節日在房立冬爲十月節昏虛中曉張中斗建亥位之初其日壬癸壬癸屬水主冬其帝顓頊其神𤣥㝠昔顓頊氏以水繼天而王故爲冬帝水正曰𤣥㝠故𤣥㝠爲水神佐顓頊於冬其蟲介北方𤣥武介蟲之長凢有甲之類皆屬於水故曰其蟲介介甲也其音羽三分音去一以生羽數四十八屬水以爲最清物之象也冬炁和則羽聲調樂記曰羽亂則危其財匱也律中應鍾十月氣至則應鍾之律應應鍾者姑洗之所生三分去一管長四寸七分其味鹹其臭朽臭味鹹朽皆屬於水其祀行祭先腎冬隂氣充塞於外祀之於行從辟除之類行謂道也祭先腎者謂隂在下腎亦在下凡祀之爼先進腎立冬之月水始氷後五日地始凍後五日野雉入大水爲蜃食黍與鴈冬味之宜其器閎以奄太史以先立冬三日謁于天子曰某日立冬盛德在水天子乃迎冬北郊迎冬為祀黒帝叶光紀於北郊以顓頊配佐以𤣥㝠星三辰七宿從祀可以築城郭造宮室穿竇窖修囷倉謂改築城郭創造宮室修囷倉以備積貯天子始裘謂初衣寒衣又曰十月中氣日在尾小雪十月中氣昬危中曉翼中斗建亥位之中小雪之中虹藏不見後五日天氣上騰地氣下降後五日閉塞而成冬謹闗梁塞蹊徑蹊徑謂山澤禽獸道又曰十一月之節日在箕大雪為十一月之節昬營室中曉軫中斗建子位之初律中黄鍾十一月氣至則黄鍾之律應黄鍾者律之始也管長九寸其日其音其數並同孟冬大雪之日鶡旦不鳴後五日虎始交後五日荔挺出又曰十一月中氣日在南斗冬至為十一月中氣昬東壁中曉角中斗建子位之中冬至之日蚯蚓結後五日塵角觧後五日水泉動是月也祀昊天上帝於圜丘命有司祭馬步謂仲冬祭馬歩於大澤用剛日伐木取竹箭此時堅成可伐取又曰十二月之節日在南斗小寒為十二月之節昬奎中曉亢中斗建丑位之初律中大呂十二月氣至則大呂之律應大呂者蕤賔之生三分益一管長八寸四分其日其音其數並同孟冬小寒之日鴈北鄉後五日鵲始巢後五日野雉始雊天子乃命將帥講武習射角力講武角力校武士材力所以備畋獵之禮也天子乃厲飾執弓挾矢以獵厲飾謂衣戎服尚威武以獵修祭禽之禮謂所獵得禽獸以供蜡祭又曰十二月中氣日在婺女大寒爲十二月中氣昏婁中曉氐中斗建丑位之中大寒之日雞始乳後五日征鳥厲疾後五日水澤腹堅天子親往嘗魚時魚潔美氷方勝取而藏之春秋傳曰月在北陸而藏氷計耦耕修耒耜寒氣過農事將興出土牛以示農耕之早晚若立春在十二月望則䇿牛人近前示其農早也立春在十二月晦及正月朔則策牛人當中示其農中也立春近正月朔則策牛人近後示其農晚也天子乃與公卿大夫共飭國典論時令以待來歳之宜周官建寅之月懸法於象魏以示人四時之令皆以此為準故以建丑之月與公卿先飭之命有司大儺旁磔以送寒氣大儺爲歳終逐除隂疫以送寒氣故周官命方相氏率百𨽻索室驅疫以逐之旁磔磔犬於門春磔九門冬禮大故徧磔於十二門明扶陽抑隂之義犬屬金冬金盡春興春為木故殺金以助木氣也又曰季冬之月命告民出五種命農計耦耕修耒耜具田噐又曰是月也日窮於次月窮於紀星回于天數將㡬終歲且更始專其農人無有所使又曰孟冬之月天子乃祈來年于天宗注云天宗日月星辰也又曰孟冬命有司循行積聚無有不歛坯城郭戒門閭又曰夫爲人子之禮冬温夏凊又曰冬之爲言中也中者藏也又曰國子春夏教詩書秋冬學羽籥又曰儒有居處齊莊坐起恭敬言必誠信行必篤敬道途不爭險易之利冬夏不爭隂陽之和又曰昔者先王之未有宮室冬則居營窟夏則居橧巢大戴禮曰季冬聽獄論刑者所以正法又曰方冬三月草木落庶虞藏五糓必入于倉於時有事燕于皇祖考息國老六人以成冬事又曰司空司冬以制度制地事准撥山林規表行次畜水行表灌浸以節四時之事理地逺近以任民力以節民食又曰古者天子常以季冬考德以觀治亂德盛者治也德不盛者亂也德盛者得之也德不盛者失之也周禮曰小司寇孟冬祀司民獻民數於王王拜受之以圖國用而進退之司民星謂軒轅角也又曰凌人掌氷正歲十有二月令斬氷三其凌正歲季冬火星中大寒寒氷方盛之時春秋傳曰火星中而寒暑退凌氷室也三者之為消釋度也三其凌三倍其氷又曰占夢職季冬聘王夢獻吉夢於王王拜而受之聘問也夢者事之祥凶吉之占在日月星辰季冬日窮於次月窮於紀星廽於天數將㡬終於是發弊而問焉若休度之云耳因獻羣臣之吉夢於王歸美焉詩云牧人乃夢衆維魚矣兆維旟矣此所獻吉夢又曰天府掌季冬陳玉以貞來歳之媺惡鄭𤣥注曰問事之正曰貞問歳媺惡謂問於龜又曰大呂丑之氣十二月建丑而辰在𤣥枵又曰冬官其屬六十掌邦事又曰以玉作六器以禮天地四方以𤣥璜禮北方注曰禮北方謂黒精之帝顓頊𤣥㝠配食焉半璧曰璜象冬閉藏地上無物惟天半見又曰冬見曰遇遇者偶也義取不期而偶至大行人云冬遇以惕諸侯之慮傳曰公父定叔出奔衛三年而復曰不可使共叔無後使以十月入曰良月也就盈數焉傳曰酆舒問於賈季曰趙衰趙盾孰賢對曰趙衰冬月之日趙盾夏月之日冬日可愛夏日可畏爾雅曰冬爲上天言時無事在上臨下孫炎曰冬天藏物物伏於下天清於上又曰冬爲𤣥英炁黒而清英又曰冬爲安寧四時之别名尸子以為太平祥風名又曰冬獵為狩狩守也冬物畢成圍守取無簡擇易通卦驗曰大雪魚負氷鄭𤣥曰魚上近氷也易統圖曰日東行北方黒道曰北陸京房易曰冬至坎王廣莫風用事人君决大刑斷獄訟繕宮殿尚書大傳曰殷以季冬為正月又曰周以仲冬為正月又曰北方伏方也伏方也者萬物伏藏之方伏藏之方則何以謂之冬冬者中也中也者萬物藏於中也故曰北方冬也陽勝則吁荼萬物而養之外也隂盛則呼吸萬物而藏之内也吁荼氣出即温呼吸氣入則寒温則生寒則殺也故曰呼吸也者隂陽之交接萬物之始終尚書大傳曰冬者􅄧昬中可以収歛蓋藏田獵斷伐當告乎天子而天子賦之民故天子南面而視四星之中知民之緩急急則不賦籍不舉力役籍公家之常徭故曰敬授民時此之謂也又曰平在朔易日短朔始也傳曰天子以冬命三公謹蓋藏閉門閭固封境入山澤田獵以順天道以佐冬固職也詩含神霧曰魏地處季冬之位土地平夷又曰唐地處孟冬之位得常山太岳之風音中羽其地磽确上苦交切下苦割切而収故其民儉而好畜此唐堯之所起三禮義宗曰冬日壬癸者壬任也癸揆也言萬物更任生於黄泉皆有法度也又曰十二月小寒為節者亦形於大寒故謂之小言時寒氣猶未是極也大寒為中者上形於小故謂之大十一月一陽爻初起至此始徹隂氣出地方盡寒氣併在上寒氣之逆極故謂大寒也逸禮曰冬則衣黒衣佩𤣥玉乗𤣥輅駕鐵驪載𤣥旗以迎冬于北郊其祭先豕居明堂後廟啓北戸春秋繁露曰冬氣衰故藏又曰木有變春凋冬榮此徭役衆賦歛重也春秋考異郵曰冬風曰廣莫風春秋感精符曰天統十二月建子天始施之端也謂之天統者周以為正漢書記律黄鐘為天統史記曰漢髙祖既定天下叔孫通定朝儀羣臣朝十月儀於長樂宮執㦸尊卑次序諸侯王已下莫不震恐帝曰吾乃今日知為皇帝之貴也前漢書曰魏相書曰北方之神顓頊乗坎執權司冬張晏曰水為智智謀重故為權東方朔上書云臣朔年十三讀書三冬文史足用又曰冬民既入婦人同巷相從夜績女工一月得四十五日必相從者所以省費燎火同巧拙而合習俗也龔遂為渤海太守勸民冬益收果實菱芡民皆頼之焉續漢書曰嚴延年字次卿爲河南太守冬月傳屬縣囚㑹府下流血數里河南號為屠伯又曰宋均為九江守五日一聽事冬以日中夏以平旦後漢律厯志曰日行北陸謂之冬又曰季冬之月星回歲終隂陽以交勞農大享臘先臘一日儺謂之逐疫漢舊儀曰顓頊氏有三子生而亡去為疫鬼一居江水是為虎一居若水是為㒺兩蜮鬼一居人宫室區隅漚庾善驚人小兒月令章句曰日行北方之宿北方太隂恐為所抑故命有司大儺所以扶陽抑隂也盧植禮記注曰所以逐衰而迎新又曰是月也立土牛六頭於國都郡縣城外丑地送大寒月令章句曰是月之昏建丑丑為牛寒將極故出其物類形象以示送達之且以示升陽也後漢書曰鍾離意辟大司徒侯霸掾詔令部送徒詣河内時冬寒徒病不能行路過𢎞農輙移屬縣使作徒衣縣不得已與之上書白狀意亦具以聞光武得奏以示霸曰君所使掾何乃仁於用心誠良吏也又曰汝南舊俗十月饗㑹百里内縣皆賫牛酒到府讌飲又曰叚熲對桓帝討先零東羗術畧曰三冬兩夏足以成之又曰黄香舉孝亷為郡五官貧無奴僕香身執勞苦冬無袴而親調滋味魏畧曰顔裴字文林為京兆尹課民當輸租致薪兩束為冬寒氷炙筆硯風化大行又曰賈逵世為著姓少孤家貧冬常無袴又曰吉茂字叔暢從少至長冬則披裘夏則短褐臣役妻子室如懸磬又曰邴原就師學一冬講孝經論語自在齠齔有異及長金玉其行又曰董遇好學人從學遇不好教曰當先讀書百遍其義自見從者云苦難得暇日遇曰當以三餘冬歲之餘夜日之餘雨時之餘吳志曰左臺御史孟宗有孝道母性嗜筍及母亡冬節至宗入林哀泣而筍生得以供祭祀晉書曰王敦憚周顗每見輒面熱雖冬月扇面不休又曰吳隱之冬月無被常蓋衣披絮勤苦同於貧庶隠之時為牧守又曰公孫鳳字子鸞隠昌黎九成山冬夏草布寢處山林弹琴吟咏陶然自得又曰劉殷母王氏盛冬思堇而不言食不飽者一旬矣殷怪而問之母言其故殷時年九歲乃於澤中慟哭聲不絶者半日於是忽然有人云止聲殷収淚視地便有堇生焉因得斛餘而歸宋書曰朱百年與孔覬友善百年家室素貧母以冬月亡衣並無絮自此不衣綿帛嘗寒時就覬宿衣悉裌布飲酒眠覬以卧具覆之百年不覺也既覺引卧具去體謂覬曰綿定竒温因流涕悲痛覬亦為之傷感也齊書曰沈瑀為揚州從事湖屬縣方山埭髙峻冬月公私行旅以為難明帝使瑀循行乃開四港斷行客就作三日便辦又曰孝子王虛之庭中楊梅樹隆冬三實又毎夜所居白光如燭墓左柰樹一冬再實時人咸以為孝感所致梁書曰安成王秀為郢州刺史務行德義每冬月常作袴襦以賜貧凍者又曰任昉素清貧卒後其子西華冬月著葛帔練裙道逢平原劉孝標泫然矜之謂曰我當為卿作計乃著廣絶交論以譏其舊交也吳越春秋曰越王念復吳怨非一旦也苦身勞心夜以接日目卧則攻之以蓼足寒則漬之以水冬常抱氷韓詩外傳曰冬不浴非惡水情有餒也穆天子傳曰季冬甲戌天子冬遊飲于留祁射于麗虎讀書于菞丘君舉必書也菞音犁西王母獻酒于天子天子遺其靈鼓乃化為黄蛇周禮曰靈鼓四面洪範以為鼓妖嵇康髙士傳曰善卷古之賢人也舜以天下讓之善卷曰予立宇宙之中冬則衣皮毛夏則衣絺葛何以天下為哉汝南先賢傳曰周舉為并州刺史太原一郡舊俗以介子推焚骨有龍忌之禁至其亡月咸言神靈不樂舉火由是土人每至冬中輙一月寒食莫敢烟爨老少不堪歲多死者舉既到乃作弔書以置子推之廟言盛冬止火殘損人命非賢者之意以宣示愚民使還温食於是衆惑稍解風俗頗革列士傳曰孟嘗君食客三千人齊市有乞食馮諼至冬無袴而有饑色皇甫謐髙士傳曰焦先字孝然冬夏不著衣卧不設席禰衡别傳曰十月朝黄祖於艨衝舟上㑹設黍臛衡年少在坐黍臛至先自飽食畢摶㺯戲擲其輕慢如此列仙傳曰丁次都不知何許人為遼東丁氏傭嘗為丁氏置葵問曰冬何有葵云從日南買來神仙傳曰王仲都漢中人少修道術元帝時常以隆冬單衣載駟馬車於上林昆明池環氷而馳御者狐裘猶寒振欲死而都無變色背上蒸氣休休然休休氣盛貌師覺孝子傳曰王祥少有徳行早失母後母憎而譛之祥孝彌謹盛寒河水堅氷網罟不施母偶欲生魚祥解褐扣氷求之忽氷少開有雙魚出游祥垂綸而獲之時人謂之至孝所致也宗躬孝子傳曰何子平事母至孝母喪年六十有終身之慕夏避清凉冬不衣絮盛𢎞之荆州記曰宜都銀山有風穴大數尺名風井夏則風出冬則風入樵人有冬過者置笠穴口風吸之經日還長陽溪而得笠太平御覽卷二十六
