  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_615-1a, image: WYG0898/WYG0898-0552a.png}
body:
  text: 太平御覽卷六百十五宋李昉等撰學部九講説廣雅曰講讀也說文曰講和解也易文曰麗澤兊君子以朋友講習論語曰徳之不修學之不講聞義不能徙不善不能改是吾憂也漢書曰夏侯勝每講常謂諸生曰士患不明經經術苟明其取青紫如俛拾地芥耳又曰孔光居公輔位前後十七年時㑹門下諸生講問疑難舉大義其弟子多成就為博士又曰董仲舒治春秋孝景時為博士下帷講誦弟子以次授業或莫見其面又曰班伯為中常侍成帝方嚮學鄭寛中與張禹朝夕入說尚書論語於金華殿中召伯受焉又曰元帝時少府五鹿充宗貴幸為梁丘易充乗貴辦口諸儒莫能抗皆稱疾不敢㑹有薦朱雲者召入攝齊升堂抗首而說音動左右既論難連枉五鹿君文穎曰枉屈也諸儒為之語曰五鹿嶽嶽朱雲折其角西京雜記曰長安有儒生惠莊聞朱雲折五鹿充宗之角乃歎息曰繭栗犢反能爾邪吾終恥溺溝中死遂裹糧從雲雲與言莊不能對逡巡而去拊心語人曰吾口不能劇談此中多有東觀漢記曰朱祐字仲先光武學長安時過朱祐祐嘗留上須講竟乃談語及車駕幸祐家問主人得无留我講乎又曰建初四年詔諸儒㑹白虎觀講五經同異又曰桓榮為博士顯宗即位乗輿幸太常府令榮坐東面設几杖㑹百官及榮門生數百人天子親自執業又曰桓榮拜議郎入侍太子每朝㑹傳令榮於公卿前敷奏經書帝稱善又曰顯宗親於辟雍自講所制五行章句已後令桓郁說一篇上謂郁曰我為孔子卿為子夏起予者商也又問郁曰子幾人能傳學郁曰臣子皆未能傳學孤兄子一人學方起上曰努力教之有起者即白之又曰楊政字子行治梁丘易與京兆祁聖元俱善説經書京師語曰說經鏗鏗楊子行論難播播祁聖元又曰周舉字宣光姿貎短陋而博學洽聞為儒者所宗京師語曰五經縱横周宣光也又曰井丹字大春通五經時人語曰五經紛綸井大春又曰魯平字叔陵兼誦五經闗東號曰五經復興魯叔陵又曰陳嚚字君期韓詩語曰闗東說詩陳君期又曰賈逵字景伯能講左氏及五經本文以大小夏侯尚書教授諸儒為之語曰問事不休賈長頭後漢書曰漢鄭𤣥西入闗因涿郡盧植事扶風馬融融門徒四百餘人升堂者五十餘生融素驕貴𤣥在門下三年不得見乃使髙業弟子傳授於𤣥𤣥日夜尋誦未嘗怠倦㑹融集諸生考論圖緯聞𤣥善筭乃召見於樓下𤣥因質諸疑義問畢辭歸融喟然謂門人曰鄭生今去吾道東矣又曰盧植於馬融肄學列女樂在於前植侍講積年未曽轉盼馬融是以敬之又曰大將軍袁紹總兵冀州遣使要鄭𤣥大會賓客𤣥最後至乃延升上座𤣥身八尺飲酒一斛秀眉明目容儀温偉紹客多豪俊見𤣥儒者未以通人許之競設異端百家互起𤣥依方辨對咸出問表皆得所未聞莫不嗟服謝承後漢書曰董春字紀陽少好學究極聖㫖後還歸立精舍逺方門徒學者常數百人諸生每升講堂鳴鼓三通横經捧手請問者百人追隨上堂難問者百餘人又曰戴憑字次仲徴拜郎中公卿大會羣臣就席馮獨立世祖問之對曰博士說經皆不如臣坐居臣上是以不得就席正旦朝賀帝令羣臣說經或有不通輒奪其席以益通者馮重坐五十餘席京師諺曰解經不窮戴侍中後漢書曰丁鴻字孝公少好尚書十六能論難永平中引見說文侯一篇賜衣被章帝會諸儒白虎觀上善鴻難說號曰殿中無雙丁孝公魏志曰文帝初在東宫氛癘大起時人凋䘮帝深歎感之與素所敬者大理王朗書云人生有七尺之形死惟一棺之土唯立徳揚名可以不朽其次莫如著篇籍疫癘數起士人凋落余獨何人能全其壽故論撰所著典論詩賦盖百餘篇集諸儒於肅成門内講論大義侃侃無倦晉書曰鄭冲為散騎常侍光禄勲嘉平三年拜司空及髙貴鄉公講尚書冲執經親授沈約宋書曰魏齊王每講肄經通輒使太常釋奠先聖先師於辟雍又曰元嘉十五年徴雷次宗至京師開舘聚徒授教使丹陽尹何尚之立𤣥學太子率更令何承天立史學司徒參軍謝元立文學凡四學並建之梁書曰中宗於敬賢殿講老子僕射王褒執經百僚皆預講席中宗談析捷辨間以嘲謔在座者相顧解頤又曰沈峻字士嵩武康人也博通五經尤長三禮吏部郎中陸倕與僕射徐勉書薦峻曰凡聖賢可講之書必以周官立義然則周官一書實為羣經源本此學不傳多歴年所唯助教沈峻特精此書比日開講羣儒劉巖沈熊之徒皆執經下座北面受業莫不歎服人無間言也又伏曼容傳曰宋明帝好周易常集朝臣於清暑殿講詔曼容執經曼容素美風采明帝恒以方嵇叔夜使呉人陸探微畫叔夜像以賜之為尚書外兵郎與袁粲罷朝相㑹言𤣥理時論以為一臺二絶又曰賀琛字國寶幼孤伯父瑒授其經業一聞便通義理瑒異之常曰此兒當以明經致貴瑒卒後琛家貧常往還諸暨販粟以養母雖自執舟楫閒則習業尤精三禮年二十餘瑒之門徒稍從問道初瑒於鄉里聚徒教授四方受業者三千餘人瑒天監中亡至是復集琛矣琛乃築室郊郭之際茅茨數間年將三十便事講授既世習禮學究其精微占述先儒吐言辦潔坐之聽受終日不疲後周書梁晉熙郡王蕭大圜當元帝時以世多忌恐讒愬生焉乃屏絶人事門客左右不過兩三人不妄遊狎恒以講詩禮書易為事梁元帝嘗自問五經要事數十條大圜辭約㫖明應答無滯梁元帝甚歎美之因曰昔河間好學爾既有之臨淄好文爾亦兼之然東平為善彌髙前載吾重之愛之爾當傚焉北史曰後魏元善遷國子祭酒上嘗親臨釋奠令善講孝經于是敷陳義理兼之以諌上大恱曰聞江陽之說更起朕心賚絹一百疋衣一襲又曰盧景裕博通經典齊文襄入相於第開講招延時雋今景裕解所注易景裕理義精微吐發閑雅時有問難或相詆訶大聲厲色言至不遜而景裕神彩儼然風調如一從容往復無隙可尋由是士君子嗟美之後周書曰吕思禮東平壽張人也性温潤不雜交遊年十四受學于徐遵明長于論難諸生為之語曰講書論易其鋒難敵隋書曰後齊將講于天子先定經于孔父廟置執經一人侍講二人執讀一人摘句二人錄義六人奉經二人講之旦帝服通天冠𤣥紗袍乘象輅至學坐廟堂上講訖還便殿改服絳紗袍乘象輅還宫講畢以太牢一釋奠孔父配以顔淵列軒懸樂六佾舞行三獻畢皇帝服通天冠絳紗袍又曰馬光為太子博士嘗因釋奠髙祖親幸國子學王公已下畢集光升坐講禮啓發章句已而諸儒生以次論難者十餘人皆當時碩彦光剖析疑滯雖辭非俊辨而理義𢎞贍又曰元善通博在何妥之下然以風流醖藉俯仰可觀音韻清朗聽者忘倦由是為後進所歸妥每懐不平心欲屈善因善講春秋初發題諸儒畢集善私謂妥曰名望已定幸無相苦妥然之及就講席妥遂引古今滯義以難善多不能對善深銜之二人由是有隙唐書曰太宗幸國子學視釋奠祭酒孔穎達講孝經右庶子趙𢎞智問之曰夫子門人曾閔俱稱大孝而今獨為曾說不為閔說何邪荅曰曾孝特優門人不能逮也制㫖駁曰朕聞家語云昔曾晳使曾參鋤瓜而誤斷其根晳怒援大杖以擊其背稱手仆地絶而復蘇孔子聞之語門人曰參来勿内既而曾子請焉孔子曰舜之事父也使之常在側欲殺之不可得小箠則受大杖則走參欲于父委身以待暴怒陷父於不義不孝莫大焉由斯而言孰愈于閔子騫也穎達不能對太宗又謂侍臣曰諸儒各生異意皆非聖人論孝之本㫖也夫孝者善事父母自家刑國忠於其君戰陣勇朋友信揚名顯親此之謂孝具在經典而論者多離其文迥出事外以此為教勞而非法可謂孝之道邪論林曰劉真長于桓公宣武座講説禮記桓公云時有㑹心處便覺咫尺𤣥門吳氏世傳曰殷亮建武中徴拜博士諸儒講論勝者賜席亮至八九三國典畧曰東魏崔暹子達拏年十三暹令儒者權㑹教其說周易兩字乃集朝貴名流令達拏升髙座問講趙郡睦仲讓陽屈服之暹大恱擢仲讓為司徒中郎鄴下為之語曰講義兩行得中郎太平御覽卷六百十五
