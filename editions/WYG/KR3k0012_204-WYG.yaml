front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_204-1a, image: WYG0894/WYG0894-0781c.png}
body:
  text: 太平御覽卷二百四宋李昉等撰職官部二丞相上丞相上尚書君奭我聞在昔成湯既受命則有伊尹格于皇天又説命曰高宗夢得説使百工營求諸野説築傅巖之野惟肖爰立作相王置諸其左右命之曰朝夕納誨以輔台徳若金用汝作礪若濟巨川用汝作舟楫若嵗大旱用汝作霖雨啓乃心沃朕心若藥弗瞑眩厥疾弗瘳若跣弗視地厥足用傷韓詩外𫝊曰田饒事魯哀公而不見察田饒謂哀公曰臣将去若黄鵠舉矣哀公曰何謂也饒曰君獨不見鷄乎雖有五徳君猶日捕而食之者何以其所從来者近也夫黄鵠一舉千里止君園池食君魚鼈啄君黍梁無此五徳猶貴之以其所從来者逺也臣将去若黄鵠舉矣哀公曰止吾将書子之言也饒曰臣聞食其食者不毁其器䕃其樹者不折其枝有臣不用何書其言遂去之燕燕用為相三年燕政大治哀公喟然嘆息為之避寝左傳曰仲虺居薛為湯左相又曰齊桓公置射鈎而使管仲相國語曰季文子相宣公成公無衣帛之妾無食粟之馬仲孫他諫曰子為魯上卿相二君矣妾無衣帛馬不食粟人其以子為愛且不華國乎文子曰吾亦願之然吾觀國人其父兄之食粗而衣惡者猶多矣吾是以不敢又曰石奢楚昭王相也堅直㢘正無所避行縣道有殺人者相追之乃其父也縱其父還自繫使人言之王曰殺人者臣之父也夫以父立政不孝也廢法縱罪非忠也臣罪當死王曰追而不及不當伏罪奢曰不私其父非孝也不奉王法非忠也王赦罪上惠也伏誅而死臣職也遂不受命自刎而死又曰五羖大夫之相秦也勞不坐乘暑不張盖行國中不驅車乘不操干戈功名藏於府庫徳行施於後世五羖大夫死國中男女流涕童子不歌謡舂者不相杵又曰秦荘襄王薨太子政立尊吕不韋為相國號稱仲父又曰二世誅李斯乃拜趙高為中丞相事無大小皆決之又曰趙高為丞相欲為亂恐羣臣不聽乃先設騐持鹿獻於二世曰馬也二世笑曰丞相誤耶謂鹿為馬問左右或黙或言馬以阿順趙高或言鹿者高因隂中以法又曰韋丞相賢者魯人以讀術為吏至大鴻臚有相工相之當至丞相有男四人相之至第二子名元成相工曰此子貴當封侯丞相曰我為丞相有長子是安從得之後賢竟為丞相病死而長子有罪論不得嗣而立元成又曰魏相者濟隂人以文吏至丞相其人好武令諸吏帶劔前奏事或有不帶劔者當入奏事乃借劔而敢入又曰匡衡為御史大夫嵗餘韋丞相死代為丞相封樂安侯衡十年之間不出長安城門位至丞相豈非遇時而合也漢書曰陳平武陽人周勃沛人高帝即位以勃為右丞相以平為左丞相帝問勃曰一嵗决獄錢榖出入㡬何勃不知汗出浹背上問平平曰有主者上曰主者誰曰決獄責廷尉錢榖責治粟内史上曰君所主何事平曰臣主佐天子理隂陽調四時理萬物撫四夷上曰善於是出勃語平曰君獨不早教我乎又曰蕭何沛人陳豨反上自将聞吕后用何計誅韓信拜何相國何病惠帝自臨視何疾因問君百嵗後誰可代君對曰知臣莫若主帝曰曹參何如何曰帝得之矣臣雖死無恨矣又曰曹參沛人聞蕭何薨告舍人趨治装吾當入相使者果召參為相擇郡國長史訥文辭謹厚者為丞相史參日夜飲酒賔客見参不事皆欲有言至者参輙飲以醇醉而後去終莫聞説又曰蕭何拜相國益封五千户兵卒五百人為衞衆人皆賀召平獨吊謂何曰禍自此始也何乃讓封悉以家財佐軍上喜又曰張蒼免相文帝以皇后弟竇廣國賢有行欲相之恐天下以吾私廣國乆念不可高帝時大臣餘見無可者乃以御史大夫申屠嘉為丞相嘉為人廣直門不受私謁時大中大夫鄧通方愛幸賞賜累鉅萬文帝常燕飲通家是時嘉入朝而通居上旁有怠慢之意嘉奏事畢因言曰陛下幸愛其臣則富貴之至於朝廷之禮不可以不肅朝罷嘉為檄召通通至詣丞相府免冠徒跣頓首謝嘉嘉坐自如弗為禮責曰夫朝廷者高皇帝之朝廷通小臣戯殿上大不敬當斬使吏令行斬之如淳曰嘉語其吏曰今便行斬之上度丞相已困通使使持莭召通而謝丞相此吾弄臣君釋之又曰公孫𢎞潁川人武帝以𢎞為丞相掌列侯唯𢎞無爵詔封平津鄉侯六百五十戶丞相封侯自𢎞始也𢎞食一肉脱粟飯故人賔客仰衣食家無餘財又曰公孫賀字子叔北地人引拜為丞相不受印綬泣涕曰臣本邉鄙鞍馬騎射不任宰相又曰車千秋本姓田為高寢郎訟太子寃曰子弄父兵罪當笞天子之子過誤殺人何罪哉臣嘗夢見白頭公教臣言於是上召見千秋千秋體貎甚嚴帝説之曰高廟神靈使公教我公當遂吾為輔相數月為丞相封富民侯千秋一言悟主旬月至宰相世未嘗有又曰蔡義河内人詔求能為韓詩徵義待詔久不進見者義上疏曰臣行能無所比容貌不及衆而不棄人倫者竊以聞於先師自託於經術願賜清間之燕盡忠思於前上召見説詩悦之擢為光禄大夫代楊敞為丞相時年八十餘短小無鬚眉貎類老嫗行歩傴僂常兩吏扶乃能行又曰邴吉為丞相寛大好禮讓掾吏有罪輙予長休吉終無所案騐客或謂吉侯為漢相奸吏成其私吉曰夫以三公之府有案吏之名吾竊陋焉後人代吉公府不案吏自吉始也士馭吏嗜酒數逋蕩嘗從吉出醉嘔丞相車茵上西曹主吏白欲斥之吉曰以醉飽之失去士使此人将復何所容西曹忍之此不過汙丞相茵耳遂不去也又曰王商字子威涿郡人為丞相有威重長八尺餘身體鴻大容貎過人河平四年單于来朝引見白虎殿丞相商坐未央庭中單于前拜謁商商起離席與言單于仰視商貎大畏之遷延却退天子聞而嘆曰此真漢相也又曰邴吉為丞相常出逢鬭者死傷横道吉不問又逢人逐牛牛喘息吐舌止駐使騎吏問逐牛行㡬里吏恠之吉曰人鬭殺傷長安令京兆尹所當禁吾偹宰相不親小事方春少陽用事未可以熱恐牛近行此時氣失節三公典調隂陽之所憂也又曰薛宣為丞相相府辭訟例不滿萬錢不為移書後皆遵用薛侯故事然官属譏其煩碎無大體不稱賢相也又曰韋賢字長孺為丞相年七十餘乞罷歸賜第丞相致仕自賢始也又曰田蚡為丞相黜黄老刑名百家之言延文學儒者數百人儒由是興又曰丞相有病皇帝法駕親至問疾及瘳視事則賜以飬牛上尊酒如淳曰律稲米一㪷得酒一斗為上尊稷米一斗得酒一㪷為中尊粟米一斗得酒一㪷為下尊顔師古曰稷即粟也中尊者冝為黍米不當言稷且作酒自有醇澆之異為上中下耳非必繫於米也詔曰有天地大變天下大過皇帝使侍中持節乗四白馬賜上尊酒十斛牛一頭䇿告殃咎使者去半道丞相追上病使者還未白事尚書以丞相不起病聞若丞相不勝任使者䇿書駕輅馬即時布衣歩出府免為庶人若丞相有他過使者奉䇿書騅騩馬即時歩出府乗棧車牝馬歸田里思過又曰大司空朱博奏曰帝王之道不必相襲高帝置御史大夫次丞相典政度以職相叅厯載二百天下安寧今更大司空與丞相同故事選中二千右為御史大夫任職者為丞相位次有叙所以尊聖徳重國相也今中二千石未更御史而為丞相非所以重國政也臣願罷大司空以御史大夫為百僚師表詔從之又曰相國丞相皆秦官金印紫綬掌承天子助理萬機秦有左右丞相高帝更名相國蕭何曹參並為之哀帝更名大司徒漢書曰李通自為宰相謝病不視事連年乞骸帝每優寵之令以公位歸第飬疾漢舊儀曰丞相車兩黑轓騎者戈絳掾吏見禮如師白録不拜朝示不臣也聽事閣曰黄閣無鍾鈴漢雜事曰田蚡為丞相中二千石拜謁蚡不為禮汲黯為主爵都尉見蚡未嘗拜揖之而已漢舊儀曰丞相有病皇帝法駕親至問疾薨即移于第中賜棺賻𦵏地塟日公卿以下㑹送應劭漢官儀曰丞相有疾御史大夫日一問起居百官亦如之魏志曰曹公初平十三年漢罷三公官置丞相御史大夫夏六月以公為丞相又曰鍾繇字元常魏國初建為大理遷相國文帝在東宫賜繇五熟釡為之銘曰於赫有魏作漢藩輔厥相惟鍾實幹心膂靖共夙夜匪遑安處百僚師師楷茲度矩蜀志曰諸葛亮率諸軍攻祁山魏明帝使張郃距亮亮使馬謖督諸軍在前馬謖違亮節度為所破戮謖以謝衆上䟽自貶以右将軍行丞相事吴志曰張昭字子布初孫權當置丞相衆議歸昭權曰方今事職充者貴重非所以優也後孫劭卒百僚復舉昭權曰孤豈為子布愛乎顧丞相事煩而此公性剛所言不從怨咎将至非所以益之又曰顧雍為丞相孫權常遣中書郎詣雍有所諮訪若合雍意事可施行雍即與相反覆究而論之為設酒食如有不合雍即正色改容嘿然不言無所施設即退告權權曰顧公懽悦是事合宜也其不言者是意未平也孤當重思之其見敬信如此又曰荀彧為右丞相王蕃調彧曰魚潜於淵出水吹沫何則物有本性不可横處非分也或出自溪谷羊質虎皮虚受光赫之寵跨越三九之位犬馬猶能識養将何以報厚施乎彧曰唐虞之朝無謬舉之材造父之門無駑騫之質蕃上誣明選下訕楨幹亦何傷於日月多見其不知量耳又曰顧雍字元歡吴郡人也代孫邵為丞相平尚書事其所選用文武将吏隨能所任心無適莫時訪逮民間及政職所宜輙宻以聞若見納用則歸之於上不用終不宣泄權以此重之又曰歩騭字子山代陸遜為丞相猶誨育門生手不釋書被服居處有如儒生然門内妻妾服餙奢綺頗以此見譏又曰陸凱遷丞相孫皓性不好人視已羣臣侍見睛莫敢迕凱説皓曰夫君臣無不相識之道若卒有不虞不知所赴皓聽凱目視晉書曰東海王越為太傅問王尼何以獨不拜尼數越事事非宰相以是不拜又曰山濤薨魏舒領司徒有頃即真舒居位持重為任職不顯人之短咸推有宰相望禄賜散之九族家無餘財齊書曰褚淵美儀貎善容止俯仰進退盛有風則每朝㑹百僚逺國莫不延首目送之宋明帝常歎曰禇淵能遲行緩歩便特此得宰相矣又曰明帝頋命江祐兄弟及始安王遥光尚書令徐孝嗣領軍蕭坦之更日帖勅時呼為六貴皆宰相也齊職儀曰相國緑綟綬衮冕服湯以伊尹為宰相仲虺為右相高宗得傅説立為相魏襄王以公孫衍為相國趙孝成王以㢘頗為相國太平御覽卷二百四
