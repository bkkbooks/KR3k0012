  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_900-1a, image: WYG0901/WYG0901-0049a.png}
body:
  text: 太平御覽卷九百宋李昉等撰獸部十二牛下逸士傳曰堯讓天下於許由由逃之巢父聞之而洗耳於池濱樊堅字仲父牽牛飲之見巢父洗耳乃驅牛而還恥令牛飲其下流關中記曰周元年老子之度關令尹喜先勅門吏曰有老公従東來乘青牛薄板車者勿聼過關其日果見老公乘青牛車求度關吏入白之喜曰諾道今來矣我見聖人矣即帶印綬出迎設弟子之禮楊泉物理論曰武帝拜少翁為文成嵗餘無效應乃作帛以飲牛陽言此牛有異應殺而視之得帛書武帝識其手跡其言妖怪乃急窮竟其事事急而首服於是誅文成而隱其事地鏡圖曰齊氣之見為牛雲氣占曰趙雲如牛北夷之氣如牛郭子横洞𡨕記曰元封三年大秦獻花蹄牛高六尺尾繞環角生四耳又曰元封三年大秦獻牛善走多力使輦銅石以起望仙宫迹在石上皆如花形故陽關之外有花牛津英雄記曰董卓少嘗遊羌中與豪帥相結後更歸耕扵野諸豪帥有來従之者卓乃殺耕牛與之共宴樂皇甫謐高士傳曰民有牛暴管寧田者寧為牽著涼處自飲食還牛主主得牛大慙先賢行狀曰王烈字彦光通識逹人時國中有盜牛者牛主得之盜者曰我邂逅迷惑従今已後將改過子既已赦宥幸無使王烈知之人有以告烈烈以布一端遺之間年中行路老人擔重有人代擔行數十里欲至家置之而去問姓字不以告老父復行失劍於路有人行而遇之欲置而去懼後人得之遂守之至暮劍主還見之即前擔人也老父􅀈其袂曰子前代吾擔不得姓名今子復守吾劒未若子之仁者請告吾姓名吾將以告王烈乃語之而去老父以告烈烈曰世有仁人吾未之見使人推之乃昔時盜牛人也廣州先賢傳曰羅威字德仁南海番禺人隣家牛數入食其禾既不可逐乃為斷芻多著牛家門中不令人知數如此牛主驚怪不知為誰隂廣求乃覺是威自後更相約率檢犢不敢復侵威田𤣥中記曰大月支及西湖有牛名曰反牛今日割取其肉三四斤明日其肉已復瘡即愈也又曰萬嵗樹精為青牛漢桓帝出逰河上忽有一青牛従河中出人驚走太尉何公時為尉中將軍有勇走逆牛見公走還何公以左手挽牛足右手持斧斫牛頭而殺之青牛者萬年之木也嵩髙記云山有大松或千嵗其精變為青牛蜀王本紀曰秦惠王欲伐蜀乃刻玉石牛置金其後蜀人見之以為牛能便金蜀王以為然即發卒千人使五丁力士拖牛成道致三牧於成都秦道得石牛力也後遣丞相張儀等隨石牛道伐蜀楊龍驤洛陽記曰石牛在城西石虎當衰石牛夜喚聲聞三十里事奏虎虎遣人打落牛耳及尾以鐵釘釘四脚今具存劉道真錢塘記曰明聖湖有金牛嘗有見者神化莫測遂以名湖涼州異物志曰有水牛育於河中鬱林異物志曰州宿者其實水牛蒼毛豕身角若擔矛衞䕶其犢與虎為讐又曰周留牛毛青大腹鋭頭青尾其狀似豬齊地記曰東萊牛島上常以五月海牛産乳海牛形似牛而無角騂色虎聲爪牙亦如虎脚似鼉魚尾似鮎魚尾長尺餘其皮甚軟可供百用牛見人奔入水以杖擊鼻則得之史苓武昌郡記曰武昌牛崗故老相傳云有金牛出此今半已崩破坑大數十丈牛因躍出踐崗邊石遺迹尚在常璩華陽國志曰牛飲江者昔程鄭於此飲牛江為之竭因以名劉欣期交州記曰九真居風山有夷人與一嫗向田見金牛出食斫得鼻鎖長丈餘後人徃徃見牛夜出光曜數十里也盛宏之荆州記曰䴏尾洲南有龍籠二洲二洲之間舊云多異魚而投罟揮網輙便挂絶有水客沈而視之見有石牛二頭酈元注水經曰沮陽城東八十里有牧牛山下有九十九泉即滄河之上源也耆舊云山下本有百泉競發有一神牛駮身自山而降飲泉竭故山得其名裴氏廣州記曰有石牛每旱殺牛以血和泥泥石牛背既畢則雨洗牛背泥盡方止顧㣲廣州記曰陽縣里民有一兒年十五六牧牛牛忽䑛此兒隨所䑛處肉浮白而甚快遂聼牛日日䑛之兒俄而病死其家塟兒殺此牛以供賔客凡食此牛肉者男女二十餘人悉變為虎法真登羅山疏曰増城縣南有烈青洲洲南又有牛潭漁人見金牛常出水盤石上義熙中縣民張安釣此潭於石上躡得金鎖大如指長數十尋尋之不已俄有物従水中引之力不能禁以刀扣斷唯得數尺遂致富後義興周靈分亦好釣嘗見此牛寢伏石上旁有金鎖徃掩之得二丈許祖台之志怪曰荀晞為兗州鎮去京師五百里有貢希珍異食者欲貽都邑親貴慮經信宿之間不復鮮美募有牛能日行數百里者當厚賞之有人進一牛云此牛日行千里晞乃命其丁車善馭書疏發遣旦發日中到京師取答書還至一更始竟便逹晞以其駿快筋骨必將有異遂殺而觀之亦無靈異唯雙筋如小竹大自頭挾脊著肉裏故外不覺也又曰陶太尉㣲時䘮塟家貧親自營作塼有一斑牸牛塼已載致忽然失去便自尋覔忽於道中逢一老翁問云君欲何所覓太尉具答便舉手指云向於山岡上見一牛眠山圩中必是君牛此牛所眠處便好作墓安墳當致極貴小之亦復位極人臣世為方岳又指一石曰此山亦好但不如向耳亦當世出刺史也言訖便不見太尉墓之皆如其言劉敬叔異苑曰余以義熙十三年為長沙景王驃騎叅軍在西州得一黄牛時將貨之便晝夜衘草不食淹涙瘦瘠又曰即墨有古冡或發之有金牛塞墓門不可移動犯之則大禍異物志曰合浦牛如槖駞案頂上有特骨大如覆斗足犍疾其行如馬日三百里列仙傳曰陽都女者市上酤酒家女也生而眉連耳細而長皆言此天人也㑹犢子牽一黄犢來過都女悦之遂留相奉侍都女隨犢子出取桃李一宿而返皆連兠甘美郭季産集異記曰兖州人船行忽見水上有浮鎖牽取得數十許丈乃得一白牛與常牛無異而形甚光鮮可愛人知是神物乃放之於是入水鎖亦隨去干寶捜神記曰晉大興元年武陽太守王諒牛生子一頭八足兩尾而共一腹又曰武都故道有怒特祠上生梓樹焉秦文公二十七年使人伐之樹創隨合經日不斷文公乃益發卒持斧者至四十人猶不斷士疲還息其一人傷足不能去卧樹下聞鬼相與言勞乎攻戰其一人曰何足為勞又曰秦公必將不休如之何荅曰秦公其如予何又曰赭衣灰坋子如之何黙然無言卧者以吿於是令工皆衣赭隨斫創坋以灰樹斷化為牛使騎擊之不勝或墮於地髻解被髪牛畏之乃入水不敢出故秦自是置旄頭騎又曰桓𤣥時牛疫有一人食死牛肉因得病亡復生云初死時見一人執籙將至天上有一貴人問云此人何罪對曰此人坐食疫死牛肉貴人云今須牛以轉輸肉以充百姓何故復殺之催遣還又曰桓𤣥在南郡國第居時出詣殷荆州於鵠坑逢一老公馳青牛形色瓌異桓即以所乘馬易牛乘至零陵駃疾非常因自駕飲牛牛逕入水不出桓遣人覘守經日絶跡也又曰元嘉中益州刺史吉翰遷為南徐州先於蜀中載一青牛不常自乘恒於目前養視翰遘疾多日牛亦不肯食及亡牛流涕滂沱吉氏䘮未還都先遣馳牛向宅牛不肯行知其異即待䘮既下船便隨去又曰桓冲鎮江陵正㑹夕當烹牛牛忽熟視帳下都督甚久目中泣下都督呪之曰汝若能向我跪者當啓活也牛應聲而拜衆甚異之都督復謂曰汝若須活遍拜衆人者真徃牛涕殞如雨遂拜不止值冲醉不得啓遂殺牛冲醉止得啓冲聞之歎息都督痛加鞭罰又曰䕶軍瑯琊王華有一牛甚快常乘之齒已長華後夣牛語之曰衰老不復堪苦載載二人尚可過此必死華謂偶爾夣與三人同載還府此牛果死神仙傳曰呉有徐隨居丹徒左慈過隨門下有宿客車六七欺慈云徐公不在慈去客皆見牛在楊樹杪車轂中皆生荆木長一二丈客懼入報隨隨曰此左公也遣追之客乃逐慈叩頭陳謝客還見牛如故車轂中無復荆木也郭養恭廣志曰鎮牛似鹿又似牛肉美皮温常處滇濱也滇音顛宣騐記云天竺有僧養一牸牛日得三升乳有一人乞乳牛曰我前身為奴偷法食今生以乳饋之所給有限不可分外得也嶺表錄異曰自瓊至振多溪澗中有石鱗次水流其間或相去三二尺近似天設可躡之而過有乘牛過者牛皆促歛四蹄跳躍而過或失則隨流而下見者皆以為笑彼人喭曰跳石牛骨碌好笑又好哭又曰瓊州不産驢馬人多騎黄牛亦餙以鞍韉加之衘勒可騎者即自小習其步驟亦甚有稳快者太平御覽卷九百
