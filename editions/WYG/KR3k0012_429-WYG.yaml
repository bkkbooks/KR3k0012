body:
  text: 太平御覽卷四百二十九宋李昉等撰人事部七十公平尚書洪範曰無偏無黨王道蕩蕩無黨無偏王道平平禮記曰昔衞獻公出奔反國及郊將班邑於從者而後入柳莊曰如皆守社稷則孰執覊勒如皆從即孰守社稷君反國而有私也無乃不可乎於是弗果班又孔子閒居曰子夏曰三王之德叅於天地敢問何如孔子曰奉三無私以勞天下曰敢問何謂三無私子曰天無私覆地無私載日月無私照奉斯三者以勞天下又儒行曰儒有内稱不避親外舉不避怨左傳文六曰賈季奔狄宣子使臾駢送其孥孥妻子也宣子以賈季中軍之佐同官故也夷之蒐賈季戮臾駢臾駢之人人臾駢家臣也欲盡殺賈氏以報之臾駢曰不可吾聞前志有之曰敵惠敵怨不在後嗣忠之道也敵猶對也夫子禮於賈季我以其寵報私怨無乃不可乎介人之寵非勇也介因也損怨益仇非智也以私害公非忠也釋此三者何以事夫子盡具其孥與其噐用財賄親帥扞之送致諸境又襄三曰祁奚請老晉侯問嗣焉稱解狐其讎也將立之而卒解狐已卒又問焉對曰午也可午祁奚子於是羊舌職死矣晉侯曰孰可以代之對曰赤也可赤職之子伯華於是使祁午為中軍尉羊舌赤佐之君子謂祁奚能舉善矣稱其讎不為諂立其子不為比舉其偏不為黨商書曰無偏無黨王道蕩蕩祁奚之謂矣又昭二十八曰晉韓宣子卒魏獻子為政魏舒魏戊為梗陽大夫戊舒之庶子也梗陽在太原也魏子謂成鱄鱄晉大夫吾與戊也縣人其以我為黨乎對曰何也夫舉無他唯善所在親踈一也論語雍也曰子游為武城宰孔子問曰汝得人焉爾乎汝為此宰寕得賢人與之爾語助也對曰有澹臺滅明者行不由徑非公事未嘗至於偃之室也史記曰邑人出獵任安常為人分麋鹿雉兎部署小大劇易衆人皆喜曰任少卿分别乎又曰陳平為社宰分肉甚均里父老曰善哉陳孺子之為宰乎曰嗟乎使平得宰天下亦如此肉漢書曰蕭何不與曹參相能及何病惠帝自臨視因問君即百嵗後誰可代君對曰知臣莫若主帝曰曹參何如何稽首曰帝得之矣臣死不恨又曰朱邑惇篤於故舊然性公正不可交以利天子器之東觀漢記曰耿嵩字文都鉅鹿人履清髙之節髫童介然特立不隨於俗鄉黨大夫莫不敬異之王莽敗盗賊起宗族在兵中榖食飢貴宗家數百人升合分糧時嵩年十二三宗人長少咸共推令主廩莫不稱平又曰隂興字君陵盡忠竭思其無益於國雖在骨肉不以私好害公義與張宗鮮于褒不相善而知其有用猶稱其所長而薦之張汜杜禽之徒興厚善以其華而少實私貨以財終不為言是以世稱其忠乎又曰第五倫字伯魚京兆尹閻興召為主簿時長安鑄錢多姦巧乃署倫為督鑄錢掾領長安市倫平銓衡正斗斛市無阿枉百姓悦服又曰吴漢嘗出征妻子在後買田業漢還讓之曰軍師在外吏士不足何多買田宅乎遂以分與昆弟外家謝承後漢書曰張陵清河人初為梁兾弟𦙍舉孝亷正月初嵗百官朝賀兾恃豪勢不恤王憲帶劒入省陵主臺中威儀呵兾使出勅羽林虎賁奪其劒𦙍謂陵曰昔舉君適所以自伐也答曰明府不以陵之不德誤見擢序不敢阿公以報私恩𦙍有媿色華嶠後漢書曰蔡孟喜汝南頓人以禮化鄉里鄉里有諍訟者輒詣喜決之其所平處皆曰無怨范曄後漢書曰袁紹官渡之役審配二子為曹操所擒逢紀與配不睦紹以問之紀對曰配天性烈直每所言行慕古人之節不以二子在南為不義也公勿疑之紹曰君不惡之耶紀曰先所争者私情今所陳者國事紹曰善乃不廢配又曰蘇章字孺文扶風平陵人順帝時遷兾州刺史故人為清河太守章行部案其姦贓乃請太守為設酒殽陳平生甚欣太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲者私恩也明日兾州刺史案事者公法也遂舉正其罪典畧曰荀彧在臺閣不以私欲撓意彧有羣從一介才徳實簿或謂彧曰以君當事不可以某為議郎耶彧笑曰官者所以表才也若如汝言衆人其謂我何其持心平實皆類此也魏志曰王觀字偉臺東郡廪邱人為南陽太守明帝即位詔下書使郡縣條為劇中平者主者欲言郡為中平觀教曰此郡濵近外虜數有冦害云何不為劇耶主者曰若郡為外劇則恐於明府有任子觀曰夫君者所以為民也郡外劇則於役調當有降差豈可為太守之私而負一郡之民遂言為外劇郡送任子詣鄴時觀但有一子而又幼弱其心公如此又曰魏國初建時未立太子臨淄侯植有才而愛太祖狐疑以函令宻訪於外唯崔琰露板答曰盖聞春秋之義矣立子以長如五官郎將仁孝聰明宜承正統琰以死守之植琰之兄女壻太祖貴其公亮蜀志廖立傳曰諸葛亮為人公直表廖立徙汶山立聞亮卒泣曰吾其左袵矣又李𫝊曰亮表廖平徙梓潼平聞亮卒乃發病死習鑿齒曰夫水至平而邪者取法鏡至公而醜者忘怒水鏡之所以窮物而不怨者以其無私也水鏡無私猶以免謗况大人君子懐樂生之心流矜恕之德爵之而非私誅之而非怒天下豈有不服也哉故蜀志評曰諸葛亮之為國開誠心布公道其盡忠益時者雖讎必賞犯法怠慢者雖親必罰吴志曰吕䝉字子明嘗以部曲事為江夏太守蔡遺所白䝉無恨意及豫章太守顧邵卒權問所用蒙因薦遺奉職佳吏權笑曰君欲為祁奚耶於是用之甘寧麄暴好殺既嘗失䝉意又時違權令權怒之䝉輒陳請曰天下未定闘將如寧者難得宜容忍之權遂厚寧卒得其用徐廣晉紀曰劉𢎞字和季在襄陽帝在西京命𢎞選良才乃稱守宰徴士武陵五朝字世朗髙士荆王牙門將魯國皮初有動江漢𢎞上言朝為零陵太守初為襄陽内史詔以襄陽顯郡初資名未允以𢎞壻前東平太守夏侯陟為襄陽𢎞曰夫總天下者當與天下同心治一國者當以一國推實吾總荆州十郡安得十女壻然後為治乃表陟婚親舊制不得相臨燕書曰梁琛使秦琛從兄奕先在秦為尚書郎㑹罷秦王欲令琛止奕舎琛語有司曰昔諸葛亮兄弟各處三國及其聘集公朝相見退無私面君子之志余敢忘乎竟不詣奕數就邸舎因問東國起㞐琛曰今二方鼎據兄弟並蒙附寵論心各有所在今欲以東國事語君恐非西國之所欲聞周書曰王羆字熊羆京兆霸陵人也性嚴急處物必當毎至享㑹自秤量酒肉給付將士時人尚其均平宋書曰張邵有佐命功元嘉五年為征虜將軍領寧蠻校尉初王華與邵不和及華叅要親舊為之危心邵曰子陵方𢎞至公豈以私隙害正義是任也華實舉之唐書曰房𤣥齡為尚書左僕射既任總百司䖍恭夙夜盡心竭節不欲一物失所聞人之善若巳有之明達吏事而縁飾以文雅審定法令意在寛平不以求備取人不以己長格物隨能収叙無隔卑賤論者稱良相焉又曰張文瓘為大理卿旬日決遺疑事四百餘條莫不允當自是人有抵罪者皆無怨言又曰奚陟字殷卿知吏部選事銓綜平允有能名選吏部侍郎所莅之官時以為稱職又曰韋承慶自天授以来三掌天官選事銓授平允海内稱之又曰楊纂除吏部侍郎典選十餘載銓叙人倫稱為允當然而抑文雅進黠吏觀時任數頗為論譏尹子曰自井中窺星所見不過數星自邱上望之則見其始出也夫私心井中公正邱上也慎子曰有權衡者不可欺以輕重有尺寸者不可差以長短有法度者不可巧以詐偽又曰夫投鈎分財投策分馬非已鈎策為均也使得美者不知所以德得惡者不知所以怨故蓍龜所以立公識也權衡所以立公正也書契所以立公信也度量所以立公審也法制禮籍所以立公義也凡立公所以棄私也國語曰趙宣子言韓獻子於靈公以為司馬宣子趙孟獻子韓厥河曲之役趙孟使人以其乘車奸行獻子執而戮之衆咸曰韓厥必不役矣其主朝登之而夕戮其車車車僕也宣子召禮之告諸大夫曰可賀我矣吾舉厥而忠吾今知免於罪矣家語曰澹臺滅公正而無私韓詩外傳曰直者順道而行順理而言公平無私不為安肆志不為危易行又曰楚有白公之難有壯之善者辭其母將死君難其母曰棄母死君可乎壯之善曰聞事君者内其禄而外其身今之所飬母者君之禄也請往死之比而朝三廢車中其僕曰子懼如是何不返也壯之善曰懼吾私也死吾公也吾聞君子不私害公遂往死之韓子曰古之全大體者則天地觀江海不以致累心不以私累已寄治亂於法術託是非以賞罰屬輕重於權衡不逆天理不傷情性不引繩之外不推繩之内不急法之外不緩法之内守成理因自然禍福主乎道法而不出乎愛惡榮辱之責任在已而不在乎人故名成於前德垂於後治之至也又曰解狐與荆伯柳為怨趙簡子問於解狐曰孰可以為上黨守對曰荆伯柳可趙簡子曰非子之讎乎對曰臣聞忠臣舉賢不避仇讎而廢人不阿親近簡子曰善遂以荆伯柳為守又韓詩外𫝊曰魏文侯問觧狐曰寡人將立西河之守誰可用觧狐舉其讎荆伯柳文侯用之又曰為人臣者北面委質有口不以私言有目不以私視又曰解狐薦其讎以為相其讎往拜謝觧狐引弓迎而射之吕氏春秋曰堯有子十人不予其子而授舜舜有子九人不予其子而授禹至公也周語曰舜冇商均此曰九子不知出何書又曰墨者鉅子腹䵍居秦秦王善之其子殺人秦王令曰先生之年長矣非有他子寡人已令吏弗誅對曰墨者之法殺人者死傷人者刑此所以禁殺傷天下之義也王雖為之賜賜愛而令吏弗誅腹䵍不可不行墨者之法遂殺之子人之所私也忍所以行大義鉅子可謂公矣又曰晋平公問祁黄羊曰南陽無令其誰可乃舉其讎解狐又問國無尉其誰可乃舉其子午孔子聞之曰祁黄羊可謂至公也又曰天無私覆地無私載日月無私燭聖人無私為又曰昔先聖王之治天下必先公公正也公則天下平矣其得之必以公其失之必以偏偏孔下正又曰荆人有遺弓者弗肯索曰荆人遺之荆人得之又何求焉孔子聞之曰去其荆而可矣老耼聞之曰去其人而可矣故老耼則至公得矣又曰天下非一人之天下也天下之天下也書云皇天無親惟德是輔故天下之天下隂陽之和不私長一類甘露時雨不私長一物私猶異也萬民之主不阿一人又曰夏不衣裘非愛裘也暖有餘也冬不用翣翣扇也非愛翣也清有餘也清寒聖人不為私非愛費也節乎已也説苑曰人臣之公治官事則不營私處公門則不言貨當公法則不阿親奉公舉則不避仇讎忠於事君謂之公又曰楚令尹虞丘子言於莊王曰臣聞奉公行法可以得榮能淺行薄無望上位臣為令尹十年國不加治竊不俊士孫叔敖秀才多能其性無欲君舉而授之政則國可寜莊王從之賜虞丘子田三百號曰國老以孫叔敖為令尹少焉而虞丘子家干法孫叔敖執而戮之虞丘子喜入見於王言孫叔敖果可使持政奉國法而不黨施刑戮而不亂可謂公平莊王曰夫子之賜也又曰楚令尹子文之族奸法者廷理拘之聞其令尹族也失之子文召廷理責之曰令立廷理者將以伺犯王令察觸國法者也於犯法甚明而使廷理縁吾私心釋之是吾不公之心明著於國執一國之柄而以私聞吾生無義吾不若死遂致其族人於廷理曰不是刑也吾將死廷理懼遂刑其族人又曰晉文侯問於咎犯誰可使為西河守者對曰盧子羔可曰子羔非汝之仇與曰君問可為守者非問臣之仇也子羔見咎犯謝之曰君幸赦臣之過薦於君得為西河守咎犯曰薦子者公也吾不以私事害公義子其去矣顧告謝之矣周生列子曰天下所以平者政平也政所以平者心平也心所以平者衡平也衡所以平者銖兩平也銖兩所以平者毫釐平也無所不均也無所不平也謂之太平夫天之於物無所偏以君之散恩無所内外任子曰以義事主不私其巳以仁接人不謀其欲火佚焚家家不罪火食過傷人人不罪食以其積之於仁義無私害也伊尹放太甲太甲無怨心管仲黜伯氏無怨言以其積之於公正無私惡也抱朴子曰君人者必修已以先四海去偏黨以平王道遣私情以標至公魏武令曰令壽春漢中長安先欲使一見各徃督令之欲擇慈孝不違吾令亦未知用誰也兒雖小時見愛而長大能善必用之吾非有二言也不但不私臣吏兒子亦不欲有所私諸葛亮書曰吾心如秤不能為人作輕重應享與州將牋曰夫公正治化之本德教之基公則無私正則無邪無邪無私而患政教不行未之有也昔叔向論叔魚之罪石碏討石厚之亂祁奚稱解狐之賢臧紇思孟孫之愛春秋嘉之敦崇世教經乎百王厝乎盛衰其義不傾公正之徳𢎞矣重矣明君之所以總天下賢臣之所以奉上士庶之所以繫仰徳化之所以美盛公正也可不勉哉曹羲至公論曰夫世人所謂掩惡揚善者君子之大義保明同好朋友之至交斯㫖之作盖閭閻之白談所以救愛憎之相謗崇居厚之大分耳篤正之至理折中之公議也其士不料其數而係其故善惡不分以覆過為𢎞朋友忽義以雷同為美善惡不分亂實由之朋友雷同敗必從焉談論者以當實為清不以過難為貴相知者以等分為交不以雷同為固是以達者存其義不察於文識其心不求於言嵇康釋私論曰不知冒隂之可以無景而患景之不匿不知無情之可以無患而恨情之不巧其不哀哉未有抱偽而身立清世藏情而信著明君者也是以君子既有其質又觀其鍳貴夫亮達希而存之惡夫矜恡棄而達之言無苟諱而行不苟隱不以愛之而苟善不以惡之而苟非心無所矜而情無所繫體精神正而是非允當忠感明天子而信篤乎萬民寄胷懷於八荒垂坦蕩於永日斯非賢人君子髙行之美者乎太平御覽卷四百二十九
