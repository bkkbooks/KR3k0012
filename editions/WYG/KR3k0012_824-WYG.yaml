  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_824-1a, image: WYG0900/WYG0900-0295a.png}
body:
  text: 太平御覽巻八百二十四宋李昉等撰資産部四穫穡捃架園圃穫說文曰穫刈禾也毛詩小雅曰歳聿云暮采蕭穫菽又周頌良耜曰穫之銍銍積之栗栗尚書金縢曰秋大熟未穫天大雷電以風禾盡􅅯大木斯㧞邦人大恐又大誥曰厥父菑厥子乃弗肯播矧肯穫齊書曰齊文恵太子嘗幸東田觀穫稲范雲時從文恵顧雲曰此刈甚快雲曰三時之務亦甚勤勞願殿下知稼穡之艱難無徇一朝之晏逸也文恵改容謝之虞喜志林說晏子曰景公為長府有風猶作不已晏子歌曰禾有穂兮不得穫秋風至兮盡零落歌終而流涕公乃止之穡說文曰穡榖可收嗇也尚書大誥曰予永念曰天惟䘮殷若嗇夫予曷敢不終朕畆又無逸周公曰嗚呼君子所其無逸先知稼穡之艱難乃逸則知小人之依相小人厥父母勤勞稼穡厥子乃不知稼穡之艱難乃逸乃諺既誕否則侮厥父母曰昔之人無聞知物理論曰穡猶收也古今之言云爾稼農之本穡農之末農本輕而末重前緩而後急稼欲少穡欲多耨欲緩收欲速此良農之務捃毛詩大田曰彼有不穫穉此有不歛穧彼有遺秉此有滯穂伊寡婦之利東觀漢記曰桓榮遭倉卒與族人元卿俱捃拾投閑輒講元卿謂曰卿但盡氣耳當復有施行時乎後榮為太常諸子謂元卿曰平生笑吾盡氣今何如元卿曰我農家安能豫知如此魏畧曰焦先行不踐邪徑必循阡陌及其捃拾不失大穂飢不可食寒不可衣結草以為蓘裳被頭徒跣每出見婦人則隱翳湏至乃出王隐晉書曰庾袞字叔褒年飢捃者猶殷袞乃引其群子以退曰待其間既捃焉從者以為徒捃也捃無傍掇晉書夏統字仲御幼孤寡養親以孝聞每採捃求食星行夜歸或至海邉捕蟛􅀈資養宋書曰沈道䖍居武康北石山下以捃拾自資同捃者或爭穟道䖍諫之不止悉以其所得與之爭者愧恧後爭輒云勿令居士知庾異行别傳曰異妻樂氏生子澤初異與妻捃而産於澤遂以命之架釋名曰架加也加杖於柄頭以撾穂而出榖也或曰羅架三杖而用之或曰以杖轉於頭故名之也廣雅曰拂謂之架說文曰拂架也拂擊木連架也國語曰權節其用耒耜耞芟耞拂也所以擊草方言曰僉宋魏之間謂攝殳或謂之度自闗而西謂之拂僉連架也所以打榖王褒僮約曰刻木為架屈竹作耙架擊木也園說文曰園以樹菓也易賁卦曰賁于邱園束帛戔戔毛詩車鄰駟鐵曰駟鐵美襄公也始命有田狩之事園囿之樂焉遊於北園四馬既閑又國風将仲子兮曰将仲子兮無踰我園無折我樹檀又小雅雞鳴曰樂彼之園爰有樹檀其下惟籜周禮天官大宰九職二曰園囿毓草木史記曰董仲舒廣州人以治春秋當孝景時為博士下帷講誦三年不觀於舍園漢書曰梁孝王𫝊曰王有罪入朝乘布車從兩騎入匿長公主園布車䘮人乗之也又曰田蚡召客飲坐其兄盖侯北向自坐東向以為漢相尊不可以兄私撓由此滋驕治宅第田園極膏腴市買郡縣器物相属於道後漢書曰竇憲恃宫掖聲勢以賤直請奪沁水公主田園主逼畏不敢計後肅宗駕出過園指以問憲憲隂喝不得對隂喝猶噎塞也後發覺帝大怒召憲切責曰深思前過奪主園時何用愈趙髙指鹿為馬久念使人驚怖昔永平中嘗令隂愽鄧疉二人更相糾察故諸豪戚莫敢犯法者而詔書切切猶以舅氏田宅為言今貴主尚見侵奪何况小人哉國家棄憲如孤雛腐䑕憲大震懼皇后為毁服深謝良久乃得解使以田還主雖不繩其罪然亦不授以重任續漢書百官志曰濯龍園在洛陽西北角謝承後漢書曰吴祐遷膠東侯相時戴宏父為縣丞宏年十六從在丞舍祐每行園嘗聞諷讀之音竒而候之亦與為友宏卒成儒宗知名東夏為河間相因自免歸家不復仕身灌園蔬以經書教授年九十八卒又曰中平二年造萬金堂於西園獻帝春秋曰吕布問太祖明公何痩太祖曰君何以識孤布曰昔在洛會浸氏園太祖曰然孤忘之矣所以痩者不早相得故也魏畧曰顔裴為京兆太守起菜園使民投閑灌治之魏志曰明帝之幸郭元后時毛皇后愛寵日衰景初元年帝逰後園召才人以上曲晏極樂元后曰宜延皇后帝弗許乃禁左右使不得宣后知之明日見帝后曰昨逰宴北園樂乎帝以左右泄之殺十餘人魏畧曰青龍十二年起土山於芳林園西北輒使公卿群寮皆負土成山樹松竹雜木善草於其上捕山禽雜獸置其中又曰馬鈞居京都城内有地可為園患無水以灌之乃作飜車令童兒轉之而灌水自覆更入更出其巧百倍於常晉書曰華廙免官後栖遲家巷武帝登凌虛臺望見廙苜蓿園阡陌甚整依然感舊太康初大赦乃得襲封王隱晉書曰王衍字夷甫戎叔父也終於平北将軍家故甚豐親故借衍車帷帳器物者衍因與不復録資財盡出洛城西先人舊園田土又曰王戎為荆州刺史坐遣吏修園宅應免官詔以贖論又曰孝宗欲於後園修立池苑江逌諫以強賊未滅宜旌軍備嘗存儉約以率群下又曰汜騰字無忌應孝㢘舉除郎中天下兵亂去官歎曰生於亂世貴而能貧乃可免也散家財五十萬以施宗族柴門灌園琴書自適南史曰臧榮緒幼孤躬自灌園以供祭祀宋書曰茹法亮於宅為魚池釣臺土山樓館長廊将一里竹林花木之美公家園林不能及又曰沈道䖍居武康北石山下有人竊園中菜道䖍自外還見之即自逃隠待竊者後乃出齊書曰會稽孔珪家起園列植桐栁多灌山泉始窮真趣衡陽王鈞往逰之珪曰殿下處朱門遊紫闥詎得與山人交耶荅曰身處朱門而情遊江湖形入紫闥而意在青雲珪大美之又曰豫章王嶷薨後常見形於第後園乘腰輿指麾處分呼直兵直兵無手板左右授一玊手板與之謂曰橘樹一株死可覔補之因出後園梁書曰徐勉為書示其子崧曰中年聊於東田間營小園者非存播藝以要利正欲穿池種樹少寄情實爾又以郊除閑曠終可為宅倘獲懸車致仕實欲歌笑於斯又曰劉慧裴隐居東林寺又于山北構園一所號曰離垢園時人乃謂為離垢先生燕書曰愍帝時有異爵素質縁首集于端門東園樹栖翔二旬而去夏以異爵故大赦名東園曰白爵園後漢書曰胡太后親覽萬幾手筆斷决幸西林園法流堂命侍臣射不能者罰之又曰髙聰為中尉所彈遂廢于家斷絶人事唯修營園菓世稱髙聰梨以為􅎇異又曰元欣好營産業多所樹藝京師名菓皆出其園又曰景穆季年頗親近左右營立田園以收其利北史曰齊盧景裕不容心世事居無二産惟在注解其叔父職居顯要而景裕止於園舍情均郊野謙恭守道真素自得由是世號居士北齊書曰河南獻王孝瑜文襄於鄴東起山池遊觀時俗昡之孝瑜遂於第作水塘龍舟植幡矟於舟上數集諸弟宴射為樂武成幸其弟見而悅之故盛興後園之翫於是貴戚慕效處處營造後周書曰後周文帝在天遊園以金巵置侯上令公卿射中者即以賜之宇文貴一發而中帝笑曰由基之妙正當耳唐書曰何潘仁西域之人也家富於財潘仁厚自奉養引致賓客煬帝時常犯法懼罪遂亡入司竹園鳩集亡命衆至數萬及義兵起求得平陽公主而奉之以義師荘子曰漢隂丈人為園畦鑿隧而入井抱甕而灌一日浸百畦子貢教以為桔橰列子曰楊朱見梁王曰王者治天下如運諸掌梁王曰先生有一妻一妾不能治三畆之田園不能耘言治天下何也韓子曰昔彌子瑕寵於衛君與遊東園食桃而甘以其半啖君曰愛我哉淮南子曰夫臨江之鄉其人汲水以溉其園江水弗減也又曰山有猛獸林木為之不斬園有螫蟲藜蓼為之不採說苑曰吴王欲伐荆告左右敢諫者死舍人有少孺子者欲諫不敢懐丸操彈於後園露濕其衣如是三旦王曰子来何若沾衣如此對曰園中有榆其上有蟬蟬髙居早鳴飲露不知螳螂在其后螳螂委身曲附欲取蟬而不知黄雀在其傍黄雀方延頸欲啄螳螂而不知丸彈在其下也此三者皆務得其前利不顧其後之有患也吴王曰善哉乃罷兵風俗通曰園瑗也從口袁聲四皓園公亦本園者𤣥晏春秋曰又好桑農種藏之事且養鷄鶩園圃之事懃不舍力焉王子年拾遺記漢明帝時常山獻巨桃核此桃霜下結花隆暑方熟亦云仙人所食常使植於桑園此園皆植寒果也又曰魏明帝起靈禽之園方國所獻異鳥獸皆畜此園也世說曰王子敬會稽人經吴聞顧辟彊有名園先不識主人徑徃其家顧方集賓友酣宴園中而王遊厯既畢指麾好惡傍若無人又曰簡文幸華林園顧謂左右曰會心處不必在逺翳然林水便自有濠梁間想覺鳥獸自来親人又曰管寧華歆共園中鋤菜見地片金管不釋鋤與凡石不異華拾而擲之向秀别𫝊曰向秀常與􅄞康偶鍛於洛邑與吕安灌園於山陽收其餘利以供飲食之費淮陽先賢曰蘇躭嘗聞夜有賓来躭吿母曰人招躭去已種藥着後園梅樹下治百病一葉愈一人賣此藥過足供養仇池記曰城東有苜蓿園園中有三水碓三秦記曰漢武帝名園曰樊川一名御宿有大梨如五升缾名含消又曰漢武帝菓園有大栗十五枚一斤華陽國志曰何隨家養竹園人盗其筍隨過行見恐盗者覺怖走竹傷其足挈履徐步歸幽明録曰武宣程覊舉家常使種葱後連理樹生於園圃殷仲堪遊園賦曰爾乃扶䇿神遊以詠以吟落葉掩蹊菓下成林曺植詩曰公子愛敬客終夜不知疲清夜遊西園飛盖相追隨劉䛑之公牋曰昔申酉之際遭湯旱流烟今子歳值堯水㴞天延燒其廬突壊其園謝𤣥與姊書曰此二日東行遊歩園中已極有任家湖形模也姊相瞩此亦有所散圃說文曰種菜曰圃毛詩鷄鳴曰東方未明折栁樊圃狂夫瞿瞿又七月曰九月築場圃十月納禾稼周禮地官下曰場人掌國之場圃而樹之菓蓏􅎇異之物以時歛而藏之禮記射禮曰孔子射於矍相之圃觀者如堵墻左𫝊荘公曰子頽有寵衞國以為師及恵王即位取衞國之圃以為囿遂奉子頽以代王又僖公下曰秦師襲鄭鄭使皇武子辭曰鄭之有原圃猶秦之有具囿也又哀公下曰衞侯為虎幄於籍圃於籍田之圃新造幄幕皆以虎獸為飾也論語曰樊遲請學為圃子曰吾不如老圃荘子曰古之人假道於仁託宿於義以遊逍遥之廬食於苟簡之田立於不貸之圃逍遥為無也苟簡易養也不貸無出也古謂是采真之遊韓子曰景公欲移晏子家於豫章之圃晏子辭孟子曰今有場師舍其梧檟養其貳棘則為賤場師也淮南子曰崑崙山有蔬圃之地灌之潢水三周山海經曰淮江之山實惟帝之平圃風俗通曰圃補也從口甫聲拾遺録曰崑崙山第二層下有芝田蕙圃皆數萬頃群仙種耨焉曺植籍田賦曰夫凡人之為圃各植其所好焉好柑者植乎薺好苦者植乎茶好香者植乎蕳好辛者植乎廖至於寡人之圃無不植也太平御覽巻八百二十四
