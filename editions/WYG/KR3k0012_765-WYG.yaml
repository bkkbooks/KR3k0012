  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_765-1a, image: WYG0899/WYG0899-0693a.png}
body:
  text: 太平御覽卷七百六十五宋李昉等撰器物部十箕帚畚斛斗升蓑笠桔橰椸枷梯把扒箕帚世本曰少康作箕帚詩曰維南有箕不可以簸揚維南有箕載翕其舌禮曰凡為長者糞之禮必加帚於箕上以袂拘而退其塵不及長者以箕自向而扱之又曰汜埽曰埽埽席前曰拚拚方問切席不以鬛執箕膺擖又曰良弓之子必學為箕史記曰張儀說楚王曰大王誠能聽臣臣請使秦太子入質於楚楚太子質於秦請以秦女為大王箕帚之妾效萬室之都以為湯沐之邑又曰鄒子如燕昭王擁篲先驅請列子之坐而受業漢書曰秦為亂政虐刑殘滅天下北為長城之役南有五嶺之城内外搔動百姓罷音皮弊頭㑹箕歛計人頭數出榖以箕歛之以供軍費又曰上歸櫟陽五日一朝太公家令說曰天無二日土無二王帝雖子人主也太公雖父人臣也奈何令人主拜人臣如此則重威不行後上朝太公太公擁篲迎門郤止上大驚下扶太公太公曰帝人主也奈何以我亂天下法也又曰魏勃欲見齊相曹參無因常早掃參之門又曰賈誼上書曰秦人借父擾鋤慮有德色母取箕帚立而誶語晉書曰王獻之善𨽻書有父風以掃帚沾泥書大字方一丈甚善王隱晉書曰庾衮孤兄女曰芳將嫁美其服矣衮刈荆苕為箕帚焉召諸子于堂男女以班而謂芳曰汝少孤今汝適人将事舅姑洒掃庭内婦人之道故賜汝此匪器之美欲汝之温恭朝夕雖休勿休也齊書曰劉休妻王氏妬帝聞賜休妾勅杖王氏二十令休於宅後開小店使王氏賣掃箒皂莢以辱之國語曰越王勾踐行成於呉曰一介適女執箕箒於王宫淮南子曰周鼎不㸑而不可賤掃箒日用而不足貴南越志曰鮑靚為南海太守嘗夕飛往羅浮山曉還有小吏晨洒掃忽見兩鵲飛入小齋吏箒擲之墜於地視乃靚之履也西域志曰佛箒在月支國長三丈許似孔雀尾也異苑曰北海徐寔婢蘭義熈中忽患羸黄而自拂拭有異於常家共伺察見行掃箒從壁角來趣婢取而焚之婢即平復雜五行書曰常以正月三日買箕四枚懸堂上四壁令人治生大得治田蠶萬倍錢財自入季尤箕銘曰神農植谷以養蒸民箕主簸揚糠粃及陳畚左傳曰晉靈公不君宰夫胹熊蹯不熟殺之寘諸畚使婦人載以過朝又曰宋災樂喜為司城以為政陳畚挶具綆缶畚箕籠也晉中興書曰王猛少貧賤鬻畚為事常至洛陽貨畚有一人於市貴買其畚云家近在此可隨我取直猛隨去忽至深山中此人語猛且住樹下當先啓道君須㬰猛進見一老翁踞牀髭鬢悉白侍從十許人引猛云大司馬公可進猛因拜老翁曰王公何縁拜即十倍直畚道君遣人送猛出山既顧視乃是嵩髙山也淮南子曰禹之時天下大水禹身執畚鍤以為民先韓詩外傳曰鮑焦衣敝膚見挈畚持蔬遇子貢子貢曰子何以至此鮑焦曰天下之遺德教者衆矣吾何以不至此子貢曰吾聞非其世者不生其利汚其君者不履其土今子非其世而持其蔬乎鮑焦曰吾聞賢者重進而輕退亷士易愧而輕死乃捐其蔬立槁於洛水之上斛廣雅曰斛謂之皷方斛謂之角書曰協時月正日同律度量衡合四時之氣節月之大小日之甲乙齊一也律法治丈尺又斛斗斤兩皆均同周禮曰㮚俗作中氏為量改煎金錫則不耗不耗然後權之權之然後凖之凖之然後量之其銘曰時文思索允臻其極嘉量既成以觀四國永啓厥後兹器維則漢書曰量者龠合升斗斛也所以量多少也本起於黄鍾之龠用度數審其容以子穀秬黍中者千有二百實其龠以井水凖其槩合龠為合十合為升十升為斗十斗為斛而五量嘉矣其法用銅方尺而圓其外旁有庣音祧焉其上為斛其下為斗左耳為升右耳為合合者合龠之量也升者登合之量也斗者聚升之量也斛者角斗平多少之量也夫量者龠於龠合於合登於升聚於斗角於斛也職在太倉大司農掌之後漢書曰第五倫為京兆主簿倫平銓衡正斗斛市無阿枉百姓恱服之魏志曰太祖常討賊廩榖不足私謂主者主者曰可小斛以足之太祖曰善後軍中言太祖欺衆太祖謂主者曰特當借汝死以厭衆不然事不觧遂斬之題屍曰冐小斛盜軍榖故斬之崔鴻十六國春秋後凉録曰吕光與龜兹王戰大敗之故大奢侈厚於養家有蒲桃酒或千斛經十年不敗士卒淪没酒藏者相繼荀氏别傳曰荀遂字仲陽隱居不仕時歲飢荒來糴者遂妻常昻其斛糴者歸量輙過其本時人號為昻斛夫人莊子曰聖人不死大盜不止為之斗斛以量之則并與斗斛而竊之權衡以稱之則并與權衡而竊之雖有軒冕之賞弗能勸斧鉞之威弗能禁剖斗折衡而民不爭天文要集曰斗星仰則天下斗斛不平覆則歲稔雜令曰諸量以秬黍中者容一千二百為龠一龠為合十合為升十升為斗十斗為斛楚辭曰世並舉而好朋一升斛而相量今之人皆好朋黨並相薦舉將其貪佞之心以量清潔之士衆比周而肩隨賢者逺害而隱藏㪷史記曰鴻門之㑹沛公使張良以玉㪷一雙予亞父亞父受玉斗撞而破之又曰田乞仕齊景公為大夫其收賦稅於民以小斗受之其粟予民以大斗行隂德於民而景公弗禁由是田氏得衆心宗族益强人思田氏漢書曰王莾攝政鑄作威斗威斗者以五石銅為之形若北斗長二尺五寸欲以厭勝衆兵旣成命有司負之莾出在前入則御旁說苑曰合升斗之微以滿倉廪王逸子曰自幽厲禮壊樂崩天綱弛絶諸侯力政轉相吞滅德不能懐威不能制至於赧王遂喪玉斗升漢書律厯志曰嘉量法用銅方尺而圎其外左耳為升右耳為合左傳曰齊舊四量豆區釡鍾四升為豆各自其四以登於釡釡十則鍾鍾乃大矣陳氏三量皆登一焉葛洪神仙傳曰王方平語蔡經家人曰吾欲賜汝等酒此乃出天厨其味醲非俗人所宜飲之或能爛人膓今當以水和之汝輩勿怪也乃以一升酒以一斛水攪之以賜經家家人飲之一升許皆醉良久蓑笠廣雅曰草謂之蓑簦謂之笠詩曰爾牧来思荷蓑荷笠又曰彼都人士臺笠緇撮禮曰大羅氏天子之掌鳥獸者也諸侯貢屬焉草笠而至尊野服也諸侯於蜡使使者戴草笠貢鳥獸也國語曰越王勾踐棲於㑹稽乃令三軍求通吳王謀臣大夫種曰譬如蓑笠時雨至必求之今君臣旣棲於㑹稽之上而求謀臣無乃後乎又曰呉王夫差使王孫滿告勞于周曰齊人為不道不供承王事夫差不忍被甲帶劒簦笠備雨器也相望於艾陵天舎其蓑齊師還言敗而還夫差豈敢自多又曰管仲曰今夫農羣萃而州處察其四時時雨既至挾其槍刈耨鏄以旦暮從事於田野脫衣就功首戴茅蒲身衣襏襫音撥奭茅蒲簦笠也撥襫蓑也沾體塗足以從事於田野史記曰瞽瞍使舜上廪從下焚廪舜乃以兩笠自扞而下得不死又曰虞卿觧其相印與魏齊間行走大梁欲因信陵君以走楚信陵君未肯見曰卿何人齊曰虞卿躡屩擔簦一見趙王賜白璧一雙黄金百鎰再見拜為上卿聞君急士之窮而歸公子呉志曰吕蒙汝南富坡人䝉襲南郡入城約軍中不得于人家有所求取蒙麾下士是汝南人取民家一笠以覆官鎧蒙以為犯軍令不可以鄉里故廢法遂斬之晏子曰景公出遊曰嗚呼使古而無死何如晏子曰若使古而無死丁公太公将有齊國吾將戴笠衣褐以行畎􅺅之中也風土記曰越人結交約曰卿雖乗車我戴笠後日相逢下車揖盛𢎞之荆州記曰冝都有風穴樵人有冬過者置笠穴口風吸之經日還渉長陽溪而得其笠則知溪穴潜通矣馮敬通詣鄧禹牋曰今日裘與蓑孰急見雨則裘不用上堂則蓑不御此更為􅃴者也今敬通逢堂蓑之不御也本草曰敗天公主鬼注精魅此竹笠之敗也曹植九詠曰越江兮刈蘭暮秋兮薄寒被蓑兮戴笠置露兮踐歡王褒僮約曰雨墜如注瓮扳薜戴子公薜蓑衣也子公笠也桔橰通俗文曰機汲曰桔橰禮曰捧席如橋衡井上有桔橰衡在土低仰者也莊子曰子貢南遊楚漢隂見一丈人為圃畦於漢隂鑿隧而入井抱甕而灌用力多而見功寡子貢曰鑿木為機後重前輕挈水若流其名桔橰圃者曰聞有機事必有機心吾非不知葢不為也又曰獨不見夫桔橰者乎引之則俯舎之則仰被人之所引非引人者也故俯仰而不得罪於人汝南先賢傳曰蔡君仲井桔槔壊母在每年命修不忍治而扶老生繞之扶老籐也椸枷音移架禮曰男女不同椸枷又曰不敢懸於夫之楎音揮椸竿謂之椸爾雅曰竿謂之箷古詩曰甖中無升米架上無懸衣梯說文曰梯木階也禮曰復有林麓則虞人設階無林麓則狄人設階蜀志曰劉琦問自安之計於諸葛亮亮不答琦逰後園登楼去梯謂亮曰可以言未謂劉曰君不見申生在内而危重耳居外而安乎崔鴻十六國春秋後凉録曰竇荀洛陽人也以壯勇知名從吕光攻龜兹登雲梯入地道或時墮落蘇而復上光深竒之孟子曰瞽瞍使舜完廩捐階搜神記曰和嘉鄧后夢登梯以捫天體蕩蕩正青若重乳者后仰欽之石虎鄴中記曰石虎太子宣與母弟蔡公韜迭秉政事宣嫌終有代己之勢八月社日韜登東明觀遊暮還酌宴作女妓罷宣遣力士鉅鹿楊材等十餘人夜縁梯入韜第斫殺之鹽鐵論曰防塞吏門而民猶為非况導之為利乎傳曰諸侯好利則大夫鄙大夫鄙則士貪士貪則庻人盜是開利室内罪民梯也世說曰韋仲將能書魏明帝起殿欲安扁使仲将登梯題之既下頭鬢皓然因是勅戒兒孫勿復學書稽含雞賦曰余庭有栖雞而一雄最武當慿梯升栖守時告晨未嘗有殆郭璞遊僊詩曰靈溪可潜盤安事登雲梯杷朳方言曰杷無齒為杷宋魏之間謂之渠拏或謂之渠疏周生烈曰夫忠謇朝之杷朳正人國之掃篲也秉杷執彗除凶掃穢國之福主之利也太平御覽卷七百六十五
