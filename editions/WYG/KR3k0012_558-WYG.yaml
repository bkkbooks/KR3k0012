  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_558-1a, image: WYG0898/WYG0898-0163a.png}
body:
  text: 太平御覽卷五百五十八宋李昉等撰禮儀部三十七塜墓二宋書曰王𤣥謨從弟𤣥象位下邳太守好發塜地無完椁時人間垣内有小塜墳上始平每朝日初升見一女子立塜上近則亡或以吿𤣥象便命發之有一棺尚全有金蠶銅人以百數剖棺見一女子可二十姿質若生卧而言曰我東海王家女應生資財相奉幸勿見害女臂有玉釧斬臂取之於是女復死又曰大明三年孝武幸籍田經袁湛墓使致祭増守墓五户又曰何承天博見古今為一時所重張永甞開𤣥武湖遇古塜塜上得一銅斗有柄文帝以訪於朝士承天曰此亡新威斗王莽時三公亡皆賜之一在塜内一在塜外時三公居江左者唯甄邯為大司徒必邯之墓也俄而又啓塜内更得一斗復有一石銘曰大司徒甄邯之墓又曰張裕曽祖澄當葬父郭璞為占墓地葬某處年過百歲位至三司而子孫不蕃某處年幾減半位裁卿校而後累世貴顯澄乃葬其劣處位光禄年六十四而亡其後子孫遂昌又曰周山圖為淮南太守時盗發桓温塜大得寳物客竊取以遺山圖山圖不受簿而還官齊書曰栁世隆曉數術於倪塘創墓與賓客踐履十往五往有常坐處及卒墓正取其坐處焉又曰王倫之為豫章太守下車祭徐孺子許子將墓又曰初荀伯玉微時有善相墓者謂其父曰君墓當出暴貴者但不乆耳又出失行女子伯玉聞之曰朝聞道夕死可矣頃而伯玉姊當嫁明日應行今夕逃隨人去尋求不能得後出家為尼伯玉卒敗亡又曰富陽人唐㝢之僑居桐廬父祖相傳圖墓為業㝢之自云其塜墓有王氣山中得金轉相誑惑永明二年冬㝢之聚黨遂陷富陽至錢塘又曰始興王鑑鎮蜀於州園地得古塜無復棺但有石椁銅器十餘種並古形玉璧三枚珍寳甚多不可皆識金銀為蠶形者數斗又以朱沙為阜水銀為池左右咸勸取之鑑曰皇太子昔在雍有發古塜者得玉鏡玉屏風玉匣之屬皆將還都吾意常不同乃遣功曹何佇之為起墳諸寳物一不得犯又曰宜都王鑑鎮姑熟于時人發桓温女冢得金巾箱織金篾為嚴器又有金蠶銀璽等物甚多條以啓聞鬱林勅以賜之鑑曰今取往物後取今物如此循環豈可熟念使長史蔡約自往脩復纎毫不犯又曰文惠太子鎮雍州有盗發古塜者相傳云是楚王塜大獲寳物玉履玉屏風青絲綸簡廣數分長二尺皮節如新有得十餘簡以示王僧䖍云是科斗書考工記曰周官所闕文也南史曰齊前將軍陳天福坐討唐㝢之於錢塘掠奪百姓財物棄市先是天福將行令家人預作夀冢未至東又信催速就冢成而罪因以葬焉梁書曰丁貴嬪薨昭明太子遣人求得善墓地將斬草木有賣地者因閫人俞三副求市若得錢三百萬與之三副宻啓武帝言太子所得地不如今之所得地於帝吉帝末年多忌便命市之葬畢有道士善圖墓云地不利長子若厭伏或可中延乃為蠟鵝及諸物埋墓側長子位有宫監鮑邈之魏雅者二人初並為太子所愛邈之晚見疎於雅宻啓武帝云雅為太子厭禱帝宻遣檢㸃果得鵝等物大驚將窮其事徐勉固諌得止唯誅道士又曰蕭斆大陽初為梁州刺史梁州有古墓名曰尖塜或云張騫墳欲有發者輙聞鼓角與外相拒推埋者懼而退斆謂無此理求自監督及開唯有銀鏤銅鏡方尺唐書曰代宗時虢州刺史王竒光上言閿鄉縣女媧墓去天寳末失所在今一夜河上側近忽聞風雷聲曉見其墓踊出上有雙栁樹下有巨石其栁各高丈餘又曰天后西幸京師路經楊𤣥感墓上誦李百藥過𤣥感墓詩曰劒有萬人敵文為一代英除昏志不遂僣亂道難平歎曰百藥唯解綴文不識大義又曰韓思復則天朝為太常博士定南郊儀注云太妃鼔吹排羣邪守大體國家賴之睿宗朝為給事活嚴善思於雷霆之下拒武三思於陷附之中𤣥宗御筆題碑云有唐忠孝韓長公之墓又曰伊慎兗州人善騎射始為果毅校尉喪母將營合附不識其父之墓晝夜號哭未浹日夢寐有指遵焉遂發壟果得舊記驗又曰盧坦為侍御史會李錡反有司請毀錡祖父廟墓坦常為錡從事乃上言曰淮安王神通有功於草昧且古人之父子兄弟罪不相及况以錡故可累五代祖乎乃不毀因賜神道守墓五户以備洒掃白虎通曰春秋之義王者墳高三仞樹以松諸侯半之樹以栢大夫八尺樹以欒士四尺樹以槐庶人無墳樹以楊晏子曰梁丘據死景公召晏子吿之曰據忠臣愛我欲厚葬之高大其壟晏子對曰不可公遂止列子曰燕人長於楚老而還過晉國同行者紿晉之城指曰此燕國之城其人愀然變容紿指社曰此若里之社若猶汝也乃喟然而嘆指舎曰此若先人之廬乃泫然而泣指壟曰若先人墓其哭不自禁同行者啞然大笑曰余等紿乃晉國耳其人大慚及至燕國之城社真見先人之廬塜悲心更微傅子曰太原人發塜破棺中有婦人將出與語生人也視其塜上木三十歲不知此婦人三十歲常生地中也將一朝歘然生偶與發塜者會之也抱朴子曰吴景帝時於江陵掘冢取板治城後發一大冢内有重閤石扉皆樞轉開閉四周徼道通事且廣高可乗馬又鑄銅為人數十枚長五尺皆大冠衣執劒列侍靈坐皆刻銅人背後石壁言殿中將或言侍郎似王公冢也破其棺棺中有人鬢毛班白鮮明面體如生人棺中有白玉璧三十枚藉尸兵人舉出死人以倚冢壁一玉長一尺形似冬𤓰從死人懐中出墮地兩耳及鼻中有黄金如棗此等有假物而不朽者也吕氏春秋曰世之為丘壟也其大若山其樹若林以此觀世示富則可矣以此為死則不可自古及今未有不亡之國者則是無不掘之墳也是故大墓無不掘者而世争為之豈不悲哉堯葬於穀林通樹之舜葬於紀市不變其肆禹葬於會稽不變人徒是故先王以儉葬也非愛其費非惡其勞以為死者慮也越絶書曰宋大夫華元冢在華原陳留小黄縣城北吴越春秋曰虎丘者吴王闔閭墓也下池廣六十步深一丈五尺銅棺三重中池廣六尺有金雁玉鳬專諸魚腸之劒以送焉取丘臨海潮千萬人築治之以葬後金精上地為白虎據墳故以虎丘名之越傳曰禹到大越上苗山更名山曰會稽因死葬焉穿地深七尺上無㵼泄下無流水壇高三尺土階三等周圍方一畆華陽國志曰周失綱紀蜀先稱王有名􅅙藂其目縱死作石階石棺國人化之故俗以石棺椁為縱目人冢又曰蜀有五丁能移山舉萬鈞其王薨輙立大石長三丈重十鈞為墓誌又曰蜀遣使朝秦秦惠王許嫁五女於蜀蜀遣五丁力士奉迎蛇山崩同時厭殺五丁及秦五女蜀王痛傷命曰五婦塜今其人或名五丁塚又曰武都有一丈夫化為女子美而艶葢山精也蜀王納為妃不習水土欲去王必留之乃作東平之歌以樂之無幾殁故王哀之乃遣五丁之武都擔土為妃作冢三輔夾録曰竇后父名倚遭秦亂隠身釣魚隊淵而卒后登尊號遣使者於父墜所築起大墳世說曰戴公見林法師墓曰徳音未逺而拱木已積冀神理綿綿不與氣運俱盡耳又曰黄初末吴人發長沙王吴芮冢以其材於臨湘為孫堅立廟容貌如生衣服不朽後預發者見吴綱曰君可類長沙王芮但微短耳綱瞿然曰是先祖也自芮之卒至冢發四百餘年綱芮之十世孫也又曰有人相羊祜墓應出受命君忌其言遂使掘㫁墓後以壊之相者云墓相雖壊猶有折臂公俄而祜墜馬折臂後至三公又曰郭景純過江居于暨陽母亡安墓不盈百步時人以為近水景純曰將當為陵今沙漲去五十里皆為人居家桑田博物志曰漢末發范友明冢奴猶活友明是霍光女聓奴記言光家事廢立之際多與漢書相應又曰漢末有發前漢宫人冢者宫人猶活既出平復如舊列士傳曰羊角哀葬友人左伯桃與荆將軍冢比他日角哀夢伯桃語已曰蒙子之恩而獲厚葬荆將軍自以豪欲役伏吾吾不聴與連戰不勝期十五日大合戰以决勝負得子則勝不得則負矣角哀至期日陳兵詣其冢上三輔决録曰趙嘉年三十餘有重疾七年不藥乃為命勅兒曰丈夫生一世處無箕山二公之操仕無伊摰吕尚之勲天不我與復何言哉聊立一圓石樹吾墓前刻之曰漢有逸民姓趙名嘉有志無時命也奈何後病愈楚國先賢傳曰李善字次孫南陽人也本同縣李元蒼頭建武中元家死没唯孤兒續始生善親自哺養世祖拜善及續並為太子舎人善顯宗時辟公府時以能治劇再遷日南太守從京師之官道經南陽李元冢未至一里乃脫服持劒去草及拜墓哭泣甚悲身炊爨自執俎鼎以修祭揚雄家牒曰子雲天鳯五年卒葬安陵阪上所厚沛郡桓君山平陵如子禮弟子鉅鹿侯子芭共為治喪諸公遣世子朝郎更行事者會送桓君山為歛賻起祠塋侯芭負土作墳號曰揚塚七畧曰揚雄死弟子共為起墳號曰揚塚趙岐别傳曰岐字臺卿年九十餘建安六年卒先自為夀藏圖季札子産晏嬰叔向四像居賓位又自圖其像居主位皆為賛頌勅其子曰我死之日墓中聚沙為牀布簟白衣散髮其上覆以单被即日便下下便掩王子年拾遺記曰舜葬蒼梧之野有鳥如丹雀自丹州而來吐五色之氣氣如雲白日憑霽諸雀羣飛銜土以成墳太平御覽卷五百五十八
