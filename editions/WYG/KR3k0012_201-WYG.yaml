  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_201-1a, image: WYG0894/WYG0894-0761a.png}
body:
  text: 太平御覽卷二百一宋李昉等撰封建部四徳行封討亂定䇿封奉使封尊賢繼絶封死王事子孫封異域降封雜恩澤封雜名號封宦者封遜讓誅貶徳行封漢書在恩澤表漢書曰宣帝以劉徳謹重封為陽城侯又曰邴吉有隂徳於孝宣帝微時帝即位衆莫知吉亦不言吉從大將軍長史轉遷御史大夫帝聞將封之㑹吉病甚將使人加紳而封之及其生存也太子太傅夏侯勝曰此未死也臣聞有隂徳者必饗其樂以及子孫今未獲其樂而病甚非死也後愈封為博陽侯東觀漢記曰建武元年詔曰故密令卓茂束身自修執節惇固斷斷無他其心休休焉夫士誠能為人所不能為則名冠天下當受天下重賞故武王誅紂封比干之墓表商容之閭今以茂為太傅封褒徳侯賜安車一乗衣一襲金五百斤討亂定策封漢書在恩澤表漢書曰莽何羅與弟重合侯通謀逆時霍光金日磾上官桀等共誅之功未録武帝病封璽書曰帝崩發書以遺詔封金日磾為秺侯上官桀為安陽侯光為博陸侯文穎曰博大陸平取其嘉名無此縣也食邑北海之河東臣瓉案漁陽有博陸城也皆以前捕反者功封時衞尉王莽子男忽侍中揚語曰帝崩忽常在左右安得遺詔封三子事羣兒自相貴耳光聞之切讓王莽莽酖殺忽奉使封史記曰髙祖使劉敬使匈奴還報曰匈奴不可擊此必見短伏竒兵以争利上怒械繫敬必往而厄於白登七日乃得解還至廣武赦敬封千户號建信君漢書曰武帝以校尉張騫從大将軍擊匈奴知水草處軍得以無飢渴因前使外國功封博望侯又昭帝以平樂廐監傅介子誅樓蘭王封為宜陽侯又元帝以甘延夀使西域郅支單于封義成侯蜀志曰陳震字孝起使吴賀孫權踐阼及到武昌權與震昇壇㰱血還封陽亭侯尊賢繼絶封尚書大𫝊曰武王勝殷箕子走之朝鮮因以封之禮記郊特牲曰天子存二代之後尊賢不過二代又禮記曰武王克殷未及下車而封黄帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於杞投殷之後於宋史記曰武王克紂以紂子武庚禄父續殷祀使管蔡相之武王崩成王少管蔡疑周公乃與武庚作亂周公以王命誅之命微子啟為殷後奉其先祀國于宋至宋王偃立於是齊魏楚伐宋滅之而三分其地漢書曰自古受命及中興之君必興滅繼絶修廢舉逸然後天下歸仁四方之政行高祖撥亂日不暇給然猶修祀六國来聘四皓適魏則壠無忌之墓適趙則封樂毅之後又曰武帝元狩中復詔御史以鄼二千四百户封蕭何曽孫慶為鄼侯布告天下令明知朕報蕭相國徳厚也又曰武帝過洛陽下詔以三十里地封周後為周子南君又曰封周公後公孫相如為褒魯侯又曰元始四年靳翕夏侯嬰陳平張良周勃等一百一十八人詔爵復家東觀漢記曰建武二年封殷紹嘉公為宋公周承休公為衞公十四年封孔子後孔志為褒成侯魏志曰文帝以議郎孔羡為崇聖侯奉孔子祀晉中興書曰元帝封孔亭為奉聖侯不食户邑又曰元帝詔封魏後曹勵為陳留王吕氏春秋曰武王勝殷封帝堯之後於犂丘成湯之後於宋以奉桑林死王事子孫封左𫝊曰晉荀瑶率師伐鄭次于桐丘鄭駟宏請救于齊齊師将興陳成子属孤子三日朝属㑹也孤子死事者之子也設乘車兩馬繫五邑焉乘車兩馬大夫車服也繫五邑加之五邑也命顔􅃰聚之子晉隰之後而父死焉隰役在哀二十三年國之多難未汝恤也今君命汝以是邑也服車而朝無廢前勞漢書曰周苛以内史守滎陽罵項羽死高帝封苛子成為高景侯又曰􅐱食其使約諸侯至齊死事高帝封食其子疾為高梁侯又曰趙王反内史王棹相建徳諫不聽遂燒殺棹等景帝封棹子乘之建徳子横皆為侯楚王反太傅趙夷吾相張尚並諫不聽死景帝封夷吾子周尚子居皆為侯魏志曰鮑信為濟北相協視太祖身以遇害太祖追録信功封子郈為新都亭侯說苑曰邯鄲傳舍吏子李談説平原君令盡散家財以饗士攻秦國平原從其計勇敢三千人皆出從談赴秦軍秦軍為却三十里亦㑹楚魏救至秦軍遂罷李談死封其父為李侯異域降封漢書曰匈奴王徐盧等五人降漢景帝欲侯之以勸後周亞夫曰彼背其王降陛下陛下侯之即何以責人臣不守節者乎上曰丞相議不可用乃悉封徐盧等為列侯亞夫因謝病免相又曰武帝時匈奴王及太子相都尉以下趙信南越王兄建徳等凡三十五人来降並封侯又曰宣帝時匈奴單于先賢禪等二人降並封侯魏志曰鮮卑軻比能明帝時将其部衆降拜歸義侯雜恩澤封漢書髙后以大謁者張澤勸王諸吕封為建陽侯又曰孝武以方術封欒大為樂成侯又曰宣帝掖庭令張賀有舊恩封賀子彭祖為都陽侯又曰王莽居攝安衆侯劉崇與張紹攻宛而敗詔從兄竦崇父嘉詣闕自歸竦因嘉作奏莽莽大悦太后下詔惟嘉父子兄弟雖有属不可阿私以千户封嘉為師禮侯嘉子七人皆賜爵關内侯後又封竦為淑徳侯長安人為語曰欲求封過張伯松力戰鬭不如巧為奏東觀漢記馬防子鉅為常從小侯上欲冠之夜拜為黄門侍郎華嶠後漢書曰元和元年遂置鴻都學畫孔子及七十二弟子像其諸生皆勅州郡三公舉用辟召或出刺太守入為尚書侍中乃有封侯賜爵者士君子皆耻與為列魯國先賢志曰汶陽鮑氏起於鮑吉吉字利主桓帝初為蠡吾侯吉為書師及桓帝立厯位至河南尹詔曰吉與朕有龍􅅗之舊其封西鄉侯宗族以吉勢力至刺史二千石者五雜名號封漢書曰初高祖微時常避事時與賔客過其丘嫂食應劭曰丘氏女也孟康曰西方謂亡女婿為丘婿丘空也空有嫂也張晏曰丘大也長嫂稱也丘嫂厭叔與客来佯為羮盡鑠釡客以故去已而視釡中有羮由是怨嫂及立齊代等王而伯子獨不得侯太上皇以為言高祖曰某非敢忘封之也為其母不長者七年十月封其子信為頡羮侯又曰霍去病以校尉伐匈奴乃封為冠軍侯又曰趙破奴以司馬再從驃騎将軍擊匈奴封為從驃騎侯東觀漢記曰彭寵奴子密殺寵詣闕降封為不義侯魏志曰初平二十年置名號爵十八級闗中侯爵十七級皆金印紫綬又置闗内外侯十六級銅印龜鈕墨綬五大夫五級銅印環紐亦墨綬皆不食租與舊列侯關内侯凢六等注曰臣松之以為今之虗爵蓋自此始也搜神記曰張顥為梁相天新雨後有鳥如山鵲飛翔堕地市人擿之堕地化為石顥椎破之得一金印文曰忠孝侯顥蔵之秘府後行校書東觀奏言曰堯舜時朝有此官天落印宜可復置宦者封東觀漢記曰孫程為中黄門安帝崩初江京等譛誣太子廢為濟隂王居西鍾下徴北鄉侯為嗣程等十八人殺江京閆顯等立隂濟王為帝以功封程為浮陽侯萬户又封中黄門王康華容侯王國為酈侯續漢書曰吕强為中黄門靈帝例封侯者以强為都鄉侯强辭讓懇惻帝乃聼之數上書諫諍為中常侍趙忠等所譛死晉起居注曰惠帝永平元年詔曰中常侍董猛固讓封邑其封為武安侯猛前求餘户封三兄今皆封為亭侯遜讓史記曰晉文公賞從亡者未得隱者介之推推亦不言禄使人召之則亡遂求所在聞其入緜上山中於是文公環緜山而封之以為介推田號曰介山且記吾過以旌善人旌表之也又曰魯連説魏人新垣衍以帝秦之害秦軍為卻平原君欲封魯連魯連辭謝者三曰吾與富貴而屈於人寧貧賤而肆意戰國䇿曰趙王以武城封孟嘗君擇舍人以為武城吏而進之曰鄙説借車者馳之借衣者被之夫人借衣車者非親即兄弟也夫馳親友之車被兄弟之衣文以為不可今趙王不以文不肖封之以武城􅂅大夫之徃也無伐樹木無廢室屋然趙王悟而知文也僅可使全而歸之漢書曰初武帝遺詔以討莽何羅功封金日磾為秺侯日磾以帝少不受封又曰武帝詔曰匈奴逆天理亂人倫車騎将軍青度西河至高闕輕鋭之卒執訊獲醜驅馬牛羊百有餘萬全甲兵而還益封三千户以千户封青三子皆為侯青固謝云皆諸校尉之力臣青子在襁緥中未有勤勞而受之封非待罪行間以勸士力戰之意又曰張延夀歴位九卿國在陳留别邑在魏郡租入嵗千餘萬延夀自以身無功徳何以乆堪數上書減户邑天子以為有讓迺封平原一國户口如故而租税減半又曰張賀為掖庭令牧養皇曽孫恩甚宻皇曽孫即位是為宣帝而賀已死欲封其冡為恩徳侯其子彭祖小與上同席研書欲封之先賜爵關内侯賀弟安世深辭讓上曰吾自為掖庭令不為将軍也安世乃不敢言東觀漢記曰竇融數辭爵位曰臣有一子質性頑鈍何乃當𫝊以連城廣土享諸侯之國也因㑹見詔曰公欲讓職還土今相見不宜論也又曰永元元年以定䇿功増封鄧隲三千户讓不獲遂逃避使者上疏自陳又曰劉愷字伯預以當襲父爵封居崇侯讓與弟憲有司奏之侍中賈逵上書陳之和帝詔愷致國與弟遁亡所守彌固乃拜為郎又曰丁綝拜河南太守及封功臣上令各言所樂綝曰昔孫叔敖教其子受必求磽确之地綝徳薄功微鄉亭可矣上從之封為定陵謝安鄉食千户又曰帝欲封樊興置印綬於前固讓曰臣未有先登陷陣之功一家數人並受爵土令天下觖望上嘉興之讓不奪其志又曰封朱祐為渦侯邑七千三百户自陳功薄而國大願受南陽五百户足矣上不許也又曰翟歆字敬子父于以功封臨沮侯歆當嗣爵以母年老國逺上書辭讓詔許乃賜關内侯又曰丁綝卒子鴻上書讓國與弟盛既𦵏乃挂縗絰冢廬而逃又曰大将軍竇憲封武陽侯食邑二萬户憲固辭封詔曰大将軍憲前嵗出征克滅北狄朝加封賞固辭不受舅氏舊典並䝉爵土其封憲冠軍侯邑二萬户魏志曰田疇從太祖入盧龍塞太祖猶欲侯之疇素與夏侯惇善太祖語惇曰且往以情喻之荅曰疇負義逃竄之人耳蒙恩令活已為多矣豈可賣盧龍塞以易賞禄哉獨不愧於心乎太祖知不可屈乃拜為議郎魏志曰王基拔夀春進封東武侯上疏固辭歸功參佐由是長史司馬等七人皆侯又曰司馬宣王誅曹爽進蒋濟封都鄉侯上疏固辭不許孫盛曰蒋濟之辭邑可謂不負心矣蔡邕獨斷曰漢總名諸侯王之子弟封者為諸侯異姓者為徹侯避武帝諱曰通侯法律家皆曰列侯功徳為朝廷優異者賜位在三公下其次諸侯在九卿下其小國侯以肺腑􅀫衛親𫝊至子孫墳墓於京師者亦随㑹見諸侯誅貶漢書曰高帝子淮南厲王長孝文六年謀反徙蜀至雍死趙王如意趙王恢趙王友為吕后所殺孝景子膠東王自殺孝武子燕王旦廣陵王胥並自殺齊王肥子濟北王興居濟南王辟光膠西王卭膠東王雄渠高帝兄子吴王濞弟孫楚並反伏誅淮南王長子安衡山王賜江都王非子建並謀反誅楚王六世孫延夀淮南王曽孫寛並謀反死武帝子孫侯者凡坐酎金等失侯及誅免者一百九人又曰陳平薨子何代立坐畧人妻棄市國除始平曰我多隂謀道家之所禁吾世即廢亦已矣終不能復興又曰平陽侯曹參六世孫宗坐䦨入宫掖門配城旦留侯張良子不疑坐謀殺楚内使贖為城旦封絶其餘功臣子孫皆罪免輙復立嗣又曰高后封諸吕五人為侯八年九月並誅張澤一人免文帝元年軹侯薄昭自殺景帝魏其侯竇嬰有罪棄市武帝樂成侯欒大斬昭帝安陽侯上官桀桑樂侯安反誅宣帝平江侯王遷自殺昌永侯田廣明自殺陽成侯田延年盜都内錢自殺元帝樂安侯匡衡免成陵侯淳于長大逆誅宜鄉侯馮叅自殺商陽侯薛宣坐不忠孝免哀帝之時𫝊晏丁滿朱博王家𫝊商鄭崇董賢孫龎息夫躬並誅免平帝甄豐劉歆為王莽所殺高陵侯翟方進子盧坐弟舉兵為王莽所殺東觀漢記曰光武子楚王英謀反自殺廣陵王荆誼自殺又曰成徳侯朱鮪𤣥孫祀坐殺人國除昌成侯桓公孫述坐與楚謀反國除又曰魏成曽純坐訐訕國除山桑侯王常孫廣坐楚事國除利取侯畢尋𤣥孫守坐姦人妻國除首鄉侯段普曽孫勝坐殺婢國除夕陽侯邢崇孫之為賊所盜亡印綬國除廣平侯吴漢無後國除潁陽侯祭遵無子國除華嶠後漢書曰傅俊子昌徙封蕪湖侯建初中遭母憂固上書以國貧不之封乞錢五萬為關内侯肅宗貶為關内侯竟不賜錢魏志曰曹洪性恡文帝少時求假不稱恨之後犯罪死太后謂郭后曰今曹洪犯死吾敕帝廢后后泣涕請乃得免前官削爵土又曰彭城王據坐私遣人詣尚方作禁物削户二千申王衮楚王彪並入朝犯京都禁削縣户又曰楚王彪坐王陵同謀延彪都昌遣御史案騐收治使至國乃自殺又曰廣初三年臨淄侯植監國謁者灌均希㫖奏植酒悖刦脅使者有司奏治罪帝以太后故貶為安都侯太平御覽卷二百一
