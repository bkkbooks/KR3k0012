body:
  text: 太平御覽卷一百五十九宋李昉等撰州郡部五虢州汝州鄭州宋州曹州亳州單州許州陳州潁州蔡州虢州十道志曰虢州𢎞農郡禹貢豫州之域春秋為虢地七國時秦韓之境秦為三川郡漢元鼎中置𢎞農郡左傳曰晉人以屈産之乘垂棘之璧假道於虞以伐虢漢志曰武帝置𢎞農縣於秦故函谷闗山嶺下戴延之西征記曰函者道形如函也帝王世紀曰虢有三焉周興封虢仲於西虢此其地也封虢叔於東虢即成臯是也今陜郡平陸縣是北虢漢書曰楊僕爲樓舩將軍耻爲關外人於是徙關新安割秦河南南陽二郡之西境於故函谷置𢎞農郡漢書郊祀志曰黃帝以首山之銅鑄鼎於荆山之下後名其地爲鼎湖郡國縣道記曰盧氏西虢之别也遁甲開山圖曰盧氏山宜五穀可以避水災因山以名縣汝州十道志曰汝州臨汝郡禹貢豫州之域春秋時爲周王畿及鄭楚之地十三州志曰戰國時梁屬魏秦置三十六郡屬三川郡漢爲河南郡之梁縣也左傳昭二十九年傳曰陶唐氏既衰其後有劉累學擾龍于豢龍氏以事孔甲能飲食之夏后嘉之賜氏曰御龍龍一雌死潛醢以食夏后饗之而使求之懼而遷于魯縣即魯山縣也又曰楚白公之亂葉公率國人攻白公白公奔山縊死葉公遂邑焉即今葉縣也家語曰葉公好龍窓壁背畫龍形眞龍爲降葉公見之喪魄漢書曰漢王至成臯轅生説漢王曰漢楚相拒滎陽數歲漢常困願王岀武關項王必引南走王深壁令滎陽成臯且休息使韓信等輯河北地連燕齊君王乃復走滎陽如此則楚所備者多漢得休息王從其計岀兵宛葉間左傳曰邘晉應韓武之穆也注曰應城在襄城城父縣西南韓詩外傳曰周成王與弟戲以桐葉爲珪以封汝周公曰天子無戲言王應時而封曰應侯今應城是也鄭州十道志曰鄭州滎陽郡禹貢豫州之境秦兼天下爲三川郡帝王世紀曰黃帝都於有熊今新鄭是也漢志曰新鄭本高辛氏大正祝融之墟國語曰鄭桓公爲司徒問於史伯曰王室多故余懼及焉何以逃死史伯對曰王室將危戎翟必昌不可福也當成周者南有荆蠻申吕應鄧陳蔡隋唐北有衛燕翟鮮虞路泉徐蒲鮮虞姬姓路泉徐蒲皆赤翟隗姓也西有虢晉隗霍楊魏芮八國姬姓也東有齊魯曹宋滕鄒莒是非王之父子母弟甥舅也皆蠻夷戎狄之人也非親作頑不可入也其濟洛河潁之間乎言此四水之間可逃是其子男之國虢之國虢鄶爲大虢東虢仲之後鄶姬姓虢叔恃勢鄶仲恃險皆有淫侈怠慢之心加以貪冒君若以周難之故寄孥與賄焉不敢不許孥妻子賄財也周亂如是驕而貪必將背君君若以成周之衆奉辭伐罪無不克矣克二邑鄢弊補丹依㽥厯華君之土也言克虢鄶此八邑可得若前華後河右洛左濟主芣醜而食溱洧芣醜山名主爲神主之也修典則以守之可以少固公説乃東孥與賄虢鄶受之十邑皆可寄也後桓公之子武公竟取十邑之地而主之今河南新鄭是十邑謂前八邑及虢鄶韓詩外傳曰鄭國俗以二月桃花下水時㑹于溱洧之上以自袚除也故詩曰溱與洧方渙渙兮漢書曰漢王數困滎陽成臯間計欲捐成臯以東屯鞏雒以距楚酈食其曰夫敖倉天下轉輸乆矣臣聞其下藏粟甚多楚人抜滎陽不能堅守敖倉此天所以資漢願足下急進兵攻滎陽據敖倉之粟即天下之所歸矣晉書曰阮籍嘗登廣武山見劉項戰處嘆曰時無英主使豎子成名其地在滎陽也地道記曰陽武滎陽有博浪沙張良爲韓擊秦始皇處宋州十道志曰宋州睢陽郡理宋城縣虞舜十二州爲豫州之境周爲青州之域武王封微子之邑後爲齊楚魏所滅三分其地魏得其梁陳留齊得濟隂東平楚得沛梁即今州也禮記曰武王克殷下車而封殷之後於宋禹貢曰導菏澤被孟瀦孟瀦澤在今虞城縣博物志曰宋北至泗水南迄睢渦有孟瀦之澤碭山之基元和郡國志曰秦併天下改爲碭郡後改爲梁國漢文帝封子武爲梁王自漢至晉爲梁國屬豫州宋改爲梁都隋於睢陽置宋州唐書曰天寳末祿山亂兩河郡縣多所隱没張巡許逺守睢陽城賊將尹子竒併力攻圍踰年不下城中食盡竟爲賊所陷巡等抗詞不撓遂被害陳留風俗傳曰宋之地猶有先王遺風重厚多仁好稼穡惡衣食以致蓄藏史記曰梁孝王築東苑三百里是曰免園又爲複道自宫屬諸平臺三十餘里圖經曰梁王有修竹園園中竹木天下之選集諸方遊士各爲賦故館有鄒枚之號又有鴈騖池周迴四里亦梁王所鑿又有清泠池有釣臺謂之清泠臺漢志曰寧陵屬陳留莽曰康善孟康曰故葛伯國今葛鄉是也漢書曰梁孝王武以孝文十二年徙梁梁爲大國居天下膏腴地北界秦山西至高陽四十餘城多大縣於是孝王築東苑方三百餘里廣睢陽城七十里大治宫室爲複道自宫連屬於平臺三十餘里曹州十道志曰曹州濟隂郡理濟隂縣禹貢豫州之域周爲曹國地後屬宋七國時屬齊漢爲濟隂郡地在濟水之南故以爲名曹詩曰薈兮蔚兮南山朝隮左傳僖二十八年曰晉侯圍曹門焉多死曹人尸諸城上磔晉死人於城上晉侯患之聽輿人之誦曰移舍於墓言將發塚曹人兇懼因其兇也而攻之入曹而分衛之田以賜宋人晉侯有疾曹伯之豎侯獳貨筮史使曰以曹爲解齊桓公爲㑹而封異姓今君爲㑹而滅同姓曹叔振鐸文之昭也先君唐叔武之穆也且合諸侯而滅兄弟非禮也公説復曹伯尚書曰夏師敗績遂伐三鬷俘厥寳玉孔安國曰三鬷國名今定陶也水經曰菏水俗謂之五丈溝經定陶漢書曰高祖五年春三月甲午即皇帝位於定陶汜水之陽左傳曰衛孫蒯田于隧飲馬于重丘重丘人毁瓶因詬之重丘今乗氏縣亳州十道志曰亳州譙郡置在譙縣禹貢豫州之域春秋時陳國之譙邑六國時屬楚秦爲碭郡地漢爲譙縣屬沛郡左傳曰楚成得臣帥師伐陳遂取焦夷杜注焦今譙國史記曰周武王封神農之後於譙國漢書地理志曰王莽以譙爲延成亭魏志曰後漢熹平五年黃龍見譙太史令單颺以爲其國當有王者興不及五十年亦當復見文帝即位果如其言以先人舊都立爲譙國與長安許昌鄴洛陽號爲五都元和郡國志曰後魏立南兖州周武改爲亳州魏畧曰太祖於譙東五十里澤中築起精舍讀書射獵閉絶賓客史記曰老子苦縣人也苦縣即今真原縣也單州五代史曰單州本單父縣梁爲輝州後唐同光二年復舊𨽻宋州周廣順中割𨽻曹州史記曰宓不齊字子賤爲單父宰反命於孔子曰國有賢不齊者五人教不齊所以治者孔子曰惜哉不齊所治者小所治者大則庶幾矣吕氏春秋曰宓子賤治單父彈鳴琴身不下堂而單父治許州十道志曰許州許昌郡禹貢豫州之域周爲許國左傳曰許太岳之𦙍也説文曰許炎帝之後也武王伐紂時封之也漢志曰潁川許縣舊許國也魏畧曰後漢建安元年太祖迎獻帝都於許即此邑也魏文帝即位改許昌縣焉左傳曰鄭伯請釋泰山之祀而祀周公以泰山之祊易許田後漢書曰宋寵爲潁川太守問功曹鄭凱曰聞貴郡山川多産竒秀前賢往哲可得聞乎凱對曰鄙郡稟嵩高之靈中岳之精是以聖賢龍蟠俊乂鳯集昔許由巢父恥受堯禪洗耳河濱重道輕帝邈世高蹈樊仲父者志堅心遐恥山河之功賤天地之重抗節㕘雲公儀許由俱岀陽城留侯張良竒謀輔世𤣥算入微濟生民之命恢帝王之畧功成而不居爵厚而不受岀于父城胡元安體曽參之志行履樂正之純業喪親泣血骨立形存精神通於神明雉兔集於左右岀潁陽彪義山英姿秀偉逸才挺岀究孔子之房隩存文武於將墜岀於昆陽杜伯夷經學見於師門政事熙於國朝清身不茍有於陵之操損己存公有公儀之節岀定陵又曰獻帝建安元年遷都許魏畧曰黃初五年文帝東征留郭后於永始臺霖雨百餘日城樓多壞有司請移后曰昔楚昭王岀遊貞姜留漸臺江水至使者迎而無符不岀即没今帝在逺未有急禁何移也又景福殿賦曰鎭以崇臺實曰永始臺在許昌縣魏志曰荀彧字文若潁川潁隂人也董卓之亂彧謂父老曰潁川四戰之地天下有變當爲兵衝宜急去無乆留鄉人皆懷土猶豫㑹冀州牧韓馥迎彧獨將宗族至冀州後董卓遣李儒等岀關東所過虜掠至潁川鄉人留者多見殺畧陳州十道志曰陳州淮陽郡置在宛丘縣元和郡國志曰禹貢豫州之域本太昊之墟周武王封嬀滿於陳春秋時楚滅之秦楚屬潁川郡漢高祖分置淮陽國後漢改爲陳國毛詩陳風曰坎其擊鼓宛丘之下又曰東門之池可以漚麻注水經曰東門池水至清而不耗不生諸草爾雅曰陳有宛丘又曰丘山有丘爲宛丘漢書曰高帝十一年立子友爲淮陽王罷潁川郡以益之七賢傳曰漢武岀淮陽到監鄉帝問陳翼曰此名爲何翼曰監鄉上曰何欺乎翼曰臣言不欺若不欺佩刃當生白毛若欺則無毛視之刃果有毛監鄉在廬江縣潁州十道志曰潁州汝隂郡置在汝隂縣元和郡國志曰禹貢豫州之域春秋胡子國楚滅之秦併天下爲潁川郡在漢則汝南郡之汝隂縣也魏晉於此置汝隂郡後魏改置潁州毛詩曰遵彼汝墳伐其條枚史記曰蒙恬伐楚寢丘今汝隂縣有寢丘故城在焉吕氏春秋曰楚孫叔敖戒其子曰我死王必封汝無受利地荆楚之間有寢丘其地爲不利可長有也其子從之楚功臣封二葉而滅唯寢丘不奪一名沈丘蔡州十道志曰蔡州汝陽郡禹貢豫州之地圖經曰春秋時爲沈蔡二國之地後爲楚魏二國之境秦兼天下以其地爲三川漢爲汝南郡地形志曰謂之懸瓠城亦名懸壺城又水經曰水周城形如懸瓠故名焉史記曰周武王克殷封叔度於蔡挾武庚作亂周公殺管叔而放蔡叔與車七乗子胡改行率德周公聞之舉胡以爲魯卿士故魯國治復封胡于蔡是爲蔡仲輿地志曰新蔡縣平侯自上蔡徙都之故曰新蔡漢志曰汝南郡高帝置王莽曰汝汾又曰鮦陽屬汝郡在銅水之陽也鮦音紂又曰吳房本房子國也楚靈王遷房于楚吳王闔閭弟夫槩亡犇楚楚封於此爲堂谿氏以封吳故曰吳房史記蘇秦説韓王曰韓之劍㦸岀堂谿又曰李斯上蔡人也二世二年七月具斯五刑論要斬咸陽市斯岀獄與其中子俱執顧謂子曰吾欲與客復牽黃犬岀上蔡東門逐狡兔可得乎後漢書曰許劭字子將汝南平輿人也兄虔亦知名汝南人稱平輿淵有二龍焉平輿故城今蔡州汝陽縣東北有二龍鄉月旦里太平御覽卷一百五十九
