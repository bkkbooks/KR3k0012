body:
  text: 太平御覽卷四百四十四宋李昉等撰人事部八十五知人下唐書曰王珪㓜孤性雅澹少嗜慾志量沉深能安於貧賤體道履正交不苟合叔父頗當時通儒有人倫之鑒嘗謂所親曰門戸所寄惟在此兒耳又曰裴行儉有人倫之鑒自掌選及為大總管凡遇賢俊無不甄採每制敵摧兇必先期揵日時有後進楊炯王勃盧照隣駱賔王並以文章見稱吏部侍郎李敬元盛為言譽以示行儉行儉曰才名有之爵禄盖寡楊應至令長餘並鮮能令終是時蘇味道王勮未知名因調選行儉一見深禮異之仍謂曰有晩年子息恨不見其成長二公十數年當居衡石願記識此軰其後相繼為吏部皆如其言行儉嘗所引偏禆有程務挺張䖍朂崔之􅈯王方翼党金毘劉敬同郭待李多祚黒齒之盡為名将位至刺史将軍者數十人其所知賞多此類也又曰狄仁傑受汴州判佐時工部尚書閻立本為河南道黜陟使仁傑為吏人誣告立本見而謝曰仲尼云觀過知仁矣足下可謂海曲之明珠東南之遺寳薦授并州都督法曹又曰張守珪儀形瓌荘善騎射性慷慨有節義時盧齊卿為幽州刺史深禮遇之常共榻而坐謂曰足下數年外必節度豳凉為國之良将方以子孫相託豈得以僚属常禮相與耶又曰李勉以故吏前宻縣尉王晬子對切勤幹俾攝南鄭令俄有詔處死勉問其故乃為權倖所誣勉詢将吏曰上方藉牧宰為人父母豈以譛言而殺不辜乎即停詔拘晬飛表上聞晬遂獲宥而勉竟為執政所排追入為大理少卿謁見面陳王晬無罪政事修舉盡力吏也肅宗嘉其守正即日除太常少卿王晬後以推擇拜大理評事龍門令終有能名時稱知人又曰李晟徳宗之幸山南既入駱谷謂渾瑊曰渭橋在賊腹内兵勢懸隔李晟可辨事乎瑊對曰李晟秉義執志臨事不可奪以臣計之破賊必矣帝意始安又曰楊嗣復字繼之僕射於陵之子也初於陵十九登進士第二十再登􅀶學宏詞科調補潤州句容尉浙西觀察使韓滉有知人之鑒見之甚悅滉有愛女方擇佳婿謂其妻柳氏曰吾閱人多矣無如楊生貴而壽生子必為宰相於陵秩滿寓居楊子而生嗣復後滉見之撫其背曰名位果踰於父楊門之慶也因字曰慶門竟如其言又曰于邵傳云樊澤嘗舉賢良方正邵一見之於京師謂樊将相之材也不五年澤為節度又曰李徳裕與牛僧孺有隙或以韋温厚於牛僧孺言於徳裕徳裕曰此人堅正中立君子也又曰劉三復長慶中李徳裕拜浙西觀察使三復以徳裕禁宻文臣以所業文詣郡干謁徳裕閲其文倒屣迎之乃辟為從事後魏書曰崔亮傳云崔亮字敬儒清河東武城人也時隴西季冲當朝任事亮從兄言之於充充與亮語因謂亮曰比見卿仙人相命語使人胸中無復促廹之念竒之延為舘客冲謂兄子竒曰大崔寛和篤雅汝冝友之小崔生峭整清徹汝冝敬之二人終将大至孔叢子曰魏安釐王問子順馬回之為人雖少文然梗直有丈夫之節吾欲以為相可乎答曰知臣莫若君何有不可至於亮直之節臣未之明也曰何故荅曰臣聞諸孫卿其為人長目而永視者必體方而心圓每以其法相人千百不失一臣見回非不偉其體幹然甚疑其目王卒用之三月回果以諂得罪淮南子曰寗戚欲干齊桓公困窮無以自逹於是為商旅将牛車暮宿於郭門之外桓公郊迎客夜爝火甚盛從者甚衆戚飯牛車下望見桓公而悲擊角而習商歌桓公聞之撫其僕之手曰異哉歌者非常人也命後車載之賜衣冠説苑曰楚令尹虞丘子復相荘王曰臣聞奉公行法可以得榮能淺行薄無望上位臣為令尹十年矣國政不治獄訟不息臣竊選國俊士孫叔敖秀才多能其性無欲君舉而授之政則國可使寜而士民可使附荘王從之賜虞丘子采田三頃號曰國老以孫叔敖為令尹虞丘子家干法叔敖執而戮之虞丘子喜曰叔敖果可使持政矣傅子曰昭烈襲蜀丞相椽趙㡬曰𤣥徳其不濟乎拙於用兵每戰每敗奔亡不暇何以圖人徴士傅朝曰𤣥德寛仁有度能得人死力諸葛亮逹治知變正而有謀而為之相翼德雲長勇而有義皆萬人之敵而為之将此三人者皆人傑也以𤣥德之畧三傑佐之何為而不濟也郭子曰兾州刺史楊淮字彦清二子喬髦有識俱總角為成噐淮與裴頠樂廣友善遣見之頠謂淮曰喬當及卿髦小减也廣謂淮曰喬自及卿髦尤精出淮笑曰我二兒之優劣乃裴樂之優劣議者許之又曰王仲祖云真長知我勝我自知又曰王渾妻鍾生女甚賢明令武子為妺擇嘉婿而未有其人兵家子有才欲以妻之獨與母議初不告事定乃白母曰誠是地也自可貴要當令我見之於是武子令此兵與羣小雜處使母微察之母曰刑衣者汝可㧞乎武子曰是母曰此才足以㧞萃然地寒非長年不足展其才用觀其形骨恐不可與婚數年果死吕氏春秋曰魏公叔痤疾惠王往問之曰公叔之病甚矣将奈社稷何對曰臣之中庶子鞅也願王以國聽之若不能聽勿出境王不應出而謂左右曰豈不悲哉以叔之賢而今謂寡人以國聴鞅也公叔死公叔鞅西遊秦秦孝公聽之秦果強魏果弱竹林七賢論曰山濤與阮籍􅄞康皆一面而契若金蘭濤妻韓氏嘗以問濤濤曰當年可為友者唯此二人耳妻曰負羇之妻亦觀狐趙意欲一窺之可乎濤曰可也二人至妻勸濤留之宿具酒食夜穿牖而窺之濤入曰所見何如吾妻曰君才殊不如也正當以識度相友濤曰然伊軰亦常以我度為勝世説曰袁宏少貧常為人傭載靈運出鎮西常夜泊舟江渚清風明月聞賈客舫上有詠聲甚有清致聽所詠詩又所未嘗聞嘆美不能已即遣人委曲訊問乃是袁宏自誦其詠史詩遂厚相賞重又曰郄太尉遺門生與王丞相書求女婿曰請往東齊中選之門生歸白郄云王家諸郎亦皆可然聞覔女婿咸自矜持唯有一郎在東床上坦腹食如不聞郄云此正嘉婿既而訪焉乃逸少也又曰顧和始為揚州從事月旦當以停車州門外周侯詣丞相厯和車邉過和覔虱夷然不動周既過反還指顧心曰此中何所有顧擇虱如故徐應曰此中最是難量地周侯既入語丞相曰卿州吏有一令僕才語林曰夏少明在東國不知名聞裴逸民知人乃裹粮寄載入洛從之未至裴家少許見一人着黄皮袴褶乘馬将獵夏問逸民家逺邇荅君何以問夏曰聞其名知人故從㑹稽來投之裴曰身是逸民明可更來明往逸民果知之又嘉其志局乃用為西門侯於此遂知名又曰魏武将見匈奴使自以形陋不足雄逺國使崔季珪代乃自捉刀立牀頭坐既畢使試問曰魏王如何使荅曰魏王固自雅望非常然牀頭捉刀人此乃英雄魏王聞之追殺此使世説曰王濬冲裴叔則二人於總角時詣鍾士季湏臾去後客問向二童子是誰曰裴王客曰何如鍾曰裴楷清通王戎簡要湏三十年此二賢當為吏部尚書兾爾時天下無復滯才崔鴻前燕録曰慕容廆㓜而魁岸美姿貎身長八尺雄傑有大度晋司空張華一見竒之謂廆曰君長必為命世之器定難濟時者也遺廆冠簮以結殷勤崔鴻前秦録曰姜宇字子居天水兾人也少孤貧為河北陳不識家牧羊年十五身長七尺九寸聰慧美風儀每夜專讀書睡則懸頭于屋梁逹旦而止不識竒之将妻以女其妻弗聽不識乃置酒引宇令女潜觀之問女曰姜宇人士才明吾欲以汝妻之汝母難宇家之牧人汝意云何女曰觀宇之姿才豈復為人牧羊也遂妻之宇後厯位京兆尹御史中丞郭林宗别傳曰郭㤗字林宗入潁川則友李元禮至陳留則結符偉明之外黄則親韓子助過蒲亭則師仇季智止學舍則收魏徳功觀耕者則㧞茅季偉皆為名士至汝南見袁閎不宿而去從黄憲三日乃去過新蔡薛懃問之曰足下見袁奉髙不宿而去從黄叔度乃彌日何也㤗曰奉髙之流雖清而易挹叔度汪汪若千頃之波澄之不清撓之不濁難測量也何顒别傳曰顒字伯求有人倫鑒同郡張仲景總角造顒顒謂曰君用思精而韻不髙将為良醫卒如其言顧和别傳曰和自君孝總角時顧榮曰此吾家􅂹興衰宗必此子也顧珠亦有令聞榮謂珠曰卿速歩君孝超卿矣孟嘉别傳曰􅁃亮㧞孟嘉為勤學從事禇裒為豫章太守出朝亮正旦大㑹州府人士率嘉集坐第甚逺問亮曰江州有孟嘉其人何在亮曰在坐卿但自覔褒歴觀之乆指嘉謂亮曰此人少異将無是乎衛玠别傳曰劉真長謝仁祖並知名時人商畧中朝人士或問𢎞治可得方衛洗馬不謝曰安得相比其間可容數人三輔决録曰龎知伯名勃為郡小吏東平衛農為書生窮乏乃客鍜於勃家知伯知其賢尤加禮待顧直過償及去送十里過舅家復貸錢贈之農不肯受勃曰不受令勃不安農乃受曰為馮翊乃相報後果為馮翊太守勃子為門下書佐又曰游殷字㓜齊與司𨽻校尉胡􅎮有隙輕誣構殺之初殷為郡功曹有童子張既者時未知名為郡書佐殷察異之既過家具設賔饌及既至殷妻笑曰君甚勃乎張徳容童昏小兒何異殷曰卿勿怪乃方伯之噐也殷遂與論霸王之事饗訖以妻子託之􅎮害殷月餘得病目脫但言伏罪游㓜齊将鬼來於是遂死諺曰生有知人之明死有鬼靈之驗又曰王諶字子嗣博學有才辨洛陽仲景伯武厚吳季髙未知名諶數稱二人於朱伯厚有宰輔之噐退語二人曰卿必為公後景伯至司徒季髙至司空世以是服諶之知人也㑹稽典録曰盛憲字孝章常出行逄一童容貌非常憲怪而問之是魯國孔融融時年十餘嵗憲下車執手載以歸舍與融談宴知其不凡便結為兄弟因升堂見親汝南先賢傳曰薛勤字恭祖仕郡功曹陳仲舉時年十五為父賫書詣勤勤見而察之明日往造焉仲舉父出見勤勤曰足下有不凡子吾來候之不從卿也言議盡日乃歎曰陳仲舉有命世才王佐之具又見黄叔度於童㓜云當為世盛徳其後二賢英名並耀於世又曰謝甄禀氣聰爽明識逹理見許子将兄弟弱冠之嵗曰平與之淵有二龍出焉察其盼昩則賞其心覩其顧步則知其道襄陽耆舊記曰昭烈訪世事於司馬徳操操曰儒生俗士豈識時務哉此間自有伏龍鳯雛備問誰曰諸葛孔明龎士元也並用為軍師中郎又曰潘記見温習十數嵗時曰此兒名士必為吾州里議主勅子弟與善温後果為荆州太守又曰李衡字叔平漢末父将走入吳以下户調為武昌度民聞羊衜有人物往與之衜曰多士之世尚書劇曹郎才也勸習筮仕以女配之太平御覧卷四百四十四
