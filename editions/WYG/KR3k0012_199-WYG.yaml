body:
  text: 太平御覽卷一百九十九宋李昉等撰封建部二公封侯封伯封子封男封同姓封外戚封公封韋昭辨釋名曰公直也取其正直無私易師卦曰大君有命開國承家周書曰能移於衆與百姓同之謂之公周禮地官曰大司徒職曰諸公之地封土方五百里其食者半又春官曰大宗伯職曰公執桓圭晉書曰陶侃有善相者師圭謂侃曰君左手中指有堅理當為公若徹於上貴不可言侃以針决之見血洒壁而為公字以紙裛手公字愈明後魏書曰許洛陽為鴈門太守家田三生嘉禾皆異壟合頴世祖善之進爵北地公魏志咸熙元年相國晉王奏建五等諸公地方七十里邑一千八百户置相一人典祠典書典衛典禮各一人妾六人車前司馬十人旅賁四十人侯封周易豫卦曰豫利建侯豫順以動故天地如之况建侯行師乎又比卦曰地上有水比先王以建萬國親諸侯又屯卦曰盤桓居貞利建侯周書曰能樹名生物與天道俱謂之侯周禮春官大宗伯職曰侯執信圭又典命職曰諸侯伯七命其國家宫室車旗衣服禮儀皆以十為節漢書解詁曰列侯金印紫綬以賞有功功大者食縣邑小者食鄉亭後漢書曰馮石襲母公主封獲嘉侯亦為侍中稍遷衞尉能取悅當代為安帝所寵常幸其府留飲十許日賜駮犀貝劒佩刀以班犀飾劍也紫艾綬艾即盭緑色也其色似艾玉玦各一半環曰玦以飾帶也又曰丁綝建武元年拜河南太守及封功臣帝令各言所樂諸將皆占豐邑美縣唯綝願封本鄉或謂綝曰人皆欲縣子獨求鄉何也綝曰昔孫叔敖勅其子受封必受墝埆之地今綝能薄功㣲得鄉亭厚矣帝從之封為定陵新安鄉侯食邑五千户徙封陵陽侯又曰韓歆封扶陽侯好直言無隠諱帝每不能容常因朝㑹聞帝讀隗囂公孫述相與書歆曰亡國之君皆有才桀紂亦有才帝大怒以為激發歆又証嵗將饑㓙指天畫地言甚剛切坐免歸田里帝猶不釋復遣使宣詔責之又曰建武二年定封景丹櫟陽侯帝謂丹曰今闗東故王國雖數縣不過櫟陽萬户邑夫富貴不歸故鄉如衣繡夜行故以封卿耳前漢書武帝謂朱買臣之詞也丹頓首謝又曰光武下詔封諸將博士丁恭議曰古帝王封諸侯不過百里故利以建侯取法於雷又曰隂興遷侍中賜爵闗内侯帝後召興欲封之置印綬於前興固譲曰臣未有先登陥陣之功而一家數人並䝉爵土令天下觖望誠為盈溢臣蒙陛下之恩澤至厚富貴已極不可復加至誠不願帝嘉興之譲不奪其志又曰傅昌嗣建初中遭母憂因上書以家貧不願之封乞錢五十萬為闗内侯肅宗怒貶為闗内侯竟不賜錢魏志曰張魯自漢中將其餘衆降封魯及五子皆為列侯又曰文帝黄初二年分三公戸邑封子弟各一人為列侯又咸熙元年晉王奏建五等諸侯地七十里邑千六百户官屬同諸公妾五人車前司馬八人旅賁三十六人吴志曰全琮字子璜蜀遣將雲長圍逼㐮陽琮上䟽陳討雲長之計權時已與吕蒙隂議襲之恐事泄故寢琮表不荅及功成權置酒公安顧謂琮曰君前陳此孤雖不相荅今日之捷亦君之功也於是封華亭侯晉書曰高貴鄉公將攻文帝召王沉及王業告之沉馳白帝以功封安平侯邑二千户沉既不忠於主甚為衆論所非又曰衞瓘都督幽州以其離間二虜功賜子亭侯瓘乞以封弟未受命而亡子容受封亭侯瓘六男無爵悉譲於弟逺近稱之隋書曰李崇字永隆英果有籌筭膽力過人周元年以父賢勲封廽樂縣侯時年尚少拜爵之日親族相賀崇獨泣賢怪而問之對曰無勲於國而㓜少封侯當報主恩不得終於養是以悲耳賢由是大噐之伯封周書曰率衆時作謂之伯周禮春官大宗伯職曰伯執躬圭孝經援神契曰伯白也魏志曰咸熙元年春晉王奏建五等伯地方六十里邑千二百户妾四人車前司馬八人旅賁二十八人後周書曰王勇論討茹茹功别封永固縣伯邑五百户時有别封者例聴廽授次子勇獨請封兄子元興時人義之子封周禮春官典命職曰子男五命其國家宫室車旗衣服禮儀皆以五為節又曰春官大宗伯職曰子執榖璧魏志曰蔣愷濟之孫也咸熙中開建五等以濟著勲前朝改封愷為下蔡子又曰咸熙元年相國晉王奏五等諸子地方五十里邑八百戸相一人典祠令典書丞典衞丞各一人妾三人車前司馬四人旅賁二十人齊書曰王敬則封重安縣子邑三百五十户敬則少時於草中射獵有蟲如鳥頭集其身摘去乃脫處皆流血敬則惡之詣道士卜道士曰不須憂此封侯之瑞也敬則聞之喜故出都自效至是如言環濟要畧曰子獨孳孳栖下之稱也男封周禮地官大司徒職曰諸男之地封疆方百里其食者四之一又春官典命職曰男執蒲璧環濟要畧曰男任治事受王命為君也魏志曰咸熙元年相國晉王奏建五等男地方三十五里邑四百户相一人典祠長典書丞各一名妾二人車前司馬二人旅賁十二人又次國男方二十五里邑二百户同姓封毛詩閟宫曰乃命魯公俾侯于東奄有龜蒙遂荒大東𫝊曰昔周公弔二叔之不咸故封建親戚以蕃屏周管蔡郕霍魯衛毛􅅨郜雍曹滕畢原酆郇文之昭也文昭十六國也䢴晉應韓武之穆也武穆四國凡蔣邢茅胙祭周公之𦙍也周公𦙍六國也又曰武王邑姜娠太叔夣天謂已余命而子曰虞將與之唐及生文在手曰虞遂以命之史記曰吴太伯太伯弟仲雍皆周太王之子而季厯之兄二人知太王欲立季厯乃適荆蠻以避季厯義而歸之者千餘家立為吴太伯太伯無子吴仲雍氏立五世武王克商求太伯仲雍之後得周章周章已君吴因而封之又曰武王封吴周章之弟虞仲於虞列為諸侯十二世而為晉所滅又曰周公旦武王之弟佐武王平紂而封於少皥之墟曲阜是為魯公凡四十四世而楚考烈王滅魯又曰管叔鮮蔡叔度武王之弟武王巳克殷封鮮於管封度於蔡周公誅武庚殺管叔放蔡叔蔡既遷而死其子曰胡胡乃改行率徳周公言於成王復封於蔡凡二十五世至侯齊而楚恵王滅蔡又曰曹叔振鐸者武王弟也武王已克殷封振鐸於曹凡二十四世至伯陽而宋滅曹又曰衞康叔者武王弟也周公以成王之命伐武庚放蔡叔殺管叔以殷餘民封康叔為衞君凡三十九世至君角而秦并天下廢為庶人又曰晉叔虞者成王之弟成王與叔虞戯削桐葉為珪以唐封汝史佚因言請擇日立叔虞成王曰吾與之戯耳史佚曰天子無戯言遂封叔虞於唐唐在河汾之東三十五世至靖公而韓魏趙三分其地又曰鄭桓公友者周厲王庶子封於鄭二十四世至鄭君乙而韓哀侯滅鄭併其地又曰越王句踐其先苗𦙍夏后少康之子封㑹稽以奉守禹之祀斷髮文身二十餘世至允常子句踐立滅吴稱覇後十世閩君揺佐諸侯平秦髙祖以揺為楚王漢書曰漢興之初尊王子弟大啓九國京師内外凡十五郡公主列侯頗食邑其中而國大者跨州兼郡小者連城數十也又曰高祖封兄喜為代王匈奴入代廢為合陽侯子濞為吴王又曰吕后封楚王郢為下邳侯齊王肥子章朱虛侯興居東牟侯又曰孝文封齊王肥子十人為侯淮南王子四人為侯後改封王又曰孝景封楚王子四人為侯梁王子二人為侯又曰淮南厲王死後孝文憐淮南王有子四人年皆七八嵗迺封子安為阜陵侯子勃為安陽侯子賜為陽周侯子良為東城侯又曰梁孝王死竇太后泣極哀不食帝哀懼不知所為與長公主計之迺分梁為五國盡立孝王男五人為王女五人皆令食湯沐邑奏之太后太后乃悅為帝一飡又曰孝武帝令諸王推恩分子弟諸王子孫一百七十七人為侯又曰武帝以子宏為齊王子旦燕王子胥廣陵王子休昌邑王傳子賀為昭帝後即位二十七日廢歸故縣又曰武帝使御史大夫張湯䇿立子閎為齊王曰於戯小子閎受兹青社朕承祖考維稽古建爾國家封於東土世為漢蕃輔立子旦為燕王曰小子旦受兹𤣥社建爾國家封於北土子胥為廣陵王曰小子胥受兹赤社建爾國家封於南土又曰宣帝詔曰盖聞象有罪舜封之其封昌邑王賀為海昏侯又曰宣帝封子厥為淮陽王宇為東平王囂為楚王竟為中山王廣陵王子胥宏為高宻王又曰昭帝封諸王子孫十二人宣帝六十三人元帝封四十八人成帝封四十三人哀帝封九人平帝封四十八人為侯續漢書曰靈帝封河間王子廋為濟南王奉帝父孝仁祀魏志曰明帝太和六年春二月詔曰古之帝王封建諸侯所以藩屏王室也詩不云乎懐徳惟寧宗子維城秦漢繼周或強或弱俱失厥中大魏創業諸王開國隨時之宜未有定制非所以永為後法也其改封諸侯王皆以郡為國晉起居注曰武帝詔皇子裕生七嵗矣得疾始封安平王又曰武帝詔安平獻王孫承昔以父早亡不建大祚以縣封之今以三縣封為武邑王又曰恵帝詔侍中司馬越討楊駿之功封東海王食六縣晉百官名曰武帝以齊王㽔為遼東王紹弟定國後賛為廣陵王紹弟廣徳後陳留風俗𫝊曰周成王戱其弟桐葉之封周公曰君無二言遂封之於唐後帝慎其徳其詩曰媚兹一人應侯慎徳是也華陽國志曰武帝封子穎為成都王以蜀廣漢犍為汶山十萬户為王國邑蜀郡太守號為成都内史外戚封史記曰武帝衞后弟青封長平侯四十皆封侯貴震天下天下歌曰男生無喜女生無怒獨不見衞子夫覇天下漢書曰文帝封太后弟薄昭為軹侯又封王舅駟鈞為侯又曰景帝封太后弟姪竇廣國為章武侯竇彭祖為皮侯竇嬰以破吴楚功封魏其侯弟王信為益靖侯又曰武帝封太后同母弟田蚡為武安侯勝周陽侯皇后弟衞青以伐匈奴封長平侯皇后娣子霍去病以伐匈奴封冠軍侯漢書曰元帝封王皇后父禁為陽平侯薨長子鳳嗣又曰王音既以從舅越親用事小心親職嵗餘上下詔封音為安陽侯食邑與五侯等俱三千户又曰成帝封太后兄子莽為新都侯宣帝博皇考皇舅孫史丹為武陽侯皇后兄趙欽為新成侯父趙臨為成陽侯太后姊子淳于長定陵侯中山王舅馮恭為宜陽侯又曰哀帝欲封祖母傅太后從弟商鄭崇諫曰孝武皇帝封親舅五侯天為赤黄晝昏日中有黒氣今祖母從昆弟二人已侯許皇后父高武侯以三公封尚有因緑今欲復封商壊亂制度逆天人心非傅氏之福東觀漢記曰封馬防兄弟三人各六千户為潁陽侯特以勤勞綏定西羌以㐮城美亭一千二百户増防防身𢃄三綬寵貴至盛又曰鄧訓自中興後累世寵貴凡侯者二十九人貴盛莫比後漢書曰明徳馬后詔不得封外戚章帝省詔悲歎復重請曰漢興舅氏之封侯猶皇子之為王也太后誠存謙虛奈何令臣獨不加恩三舅乎且衛尉年尊兩校尉大有病衛尉太后兄廖兩校尉防兄光也如今不諱使臣長抱刻骨之恨宜及吉時不可稽留太后報曰吾反覆念之思令兩善豈徒欲獲謙譲之名而使帝受不外施之嫌哉以恩澤封爵外家為外施也昔竇太后欲封王皇后之兄竇太后文帝后也王皇后景帝后也兄即王信後封為益靖侯丞相條侯言受高祖約無軍功非劉氏不侯條侯周亞夫也前漢書高帝與功臣約非劉氏不王非功不侯如違約天下共擊之也今馬氏無功於國豈得與隂郭中興之后等耶後漢書曰隂識封隂鄉侯二年以征伐軍功増封識譲曰天下初定將帥有功者衆臣託屬掖庭仍加爵邑不可以示天下帝甚美之魏志曰黄初二年詔曰后族之家不得横受茅土之爵以此詔𫝊後世若有違背天下共誅之又曰明帝追封甄后父逸安成鄉侯豫襲封後改為魏昌侯子暢嗣父封暢弟温韡豔皆列侯又以後亡從孫黄合𦵏帝愛女淑追封黄列侯吴志曰孫皓元年十二月封后父牧為高宻侯舅何等三人皆列侯王隠晉書曰武帝封楊后父鎮軍楊駿為臨晉侯后母太原龎為安昌鄉君太學生王銓曰侯稱臨晉後必制國也駿漸驕傲胡奮語駿卿恃女更豪耶人與天家婚未有不滅門者早晚事耳駿曰卿女復不在天家耶奮曰我女與卿女作婢何能増損又曰楊駿以女超居重位自鎮軍將軍遷車騎將軍封臨晉侯識者議之曰夫建諸侯所以藩屏王室也后妃所以供粢盛𢎞内教也后父始封而以臨晉為侯兆於亂也太平御覽卷一百九十九
