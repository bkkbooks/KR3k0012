body:
  text: 太平御覽卷四百一十七宋李昉等撰人事部五十八忠勇左傳莊公曰齊侯田于貝邱墜于車傷足䘮屨反誅屨於徒人費誅責也弗得鞭之見血走出遇賊于門刼而束之費曰我奚御哉袒而示之背信之費請先入詐欲助賊伏公而出鬬死于門中又文公上曰戰於殽也晉梁宏御戎萊駒為右戰之明日晉襄公縛秦囚使萊駒以戈斬之囚呼萊駒失戈狼曋取戈以斬囚禽之從公乗遂以為右箕之役先軫黜之而立續簡伯狼曋怒其友曰盍死之曋曰吾未獲死所其友曰吾與汝為難曋曰周志有之勇則害上不豋於明堂死而不義非勇也共用之謂勇吾以勇求右無勇而黜亦其所也謂上不我知黜而宜乃知我矣子姑待之及彭衙既陳以其屬馳秦師死焉晉師從之大敗秦師又宣公下曰楚圍宋宋人告急於晉使解揚如宋使無降曰晉師悉起將至矣鄭人囚而獻諸楚楚子厚賂之使反其言反言晉不求不許三而許之登諸樓車使呼宋人而告之遂致其君命楚子將殺之使與之言曰爾既許不穀而反之何故非我無信女則棄之速即爾刑對曰臣聞之君能制命為義臣能承命為信信載義而行之為利謀不失利以衛社稷民之主也義無二信信無二命君之賂臣不知命也受命以出有死無霣又可賂乎臣之許君以成命也死而成命臣之祿也寡君有信臣下臣獲考考成也死又何求楚子舎之以歸又成公上曰鞍之戰齊逄丑父使公下如華泉取飲鄭周父御佐車宛茷為右載齊侯以免韓厥獻丑父郤獻子將戮之呼曰自今無有代其君任患者有一於此將為戮乎郤子曰人不難以死免其君我戮之不祥赦之以勸事君者乃免之又昭公二十年曰初齊豹見宗魯於公孟為􅆖乗焉將作亂而謂宗魯曰公孟之不善子所知也勿與乗吾將殺之對曰吾由子事公孟子假吾名焉故不吾逺也雖其不善吾亦知之抑以利故不能去是吾過也今聞難而逃是僣子也使子言不信也子行事吾將死之以周事子周終也齊氏用戈擊公孟宗魯以背蔽之斷肱以中公孟之肩皆殺之國語曰晉文公誅觀狀以伐鄭鄭復勅曹觀公駢脅之狀故見伐也鄭人以名寶行成公不許曰與我詹而師還詹鄭大夫叔詹伯也詹請徃鄭伯不許詹固請曰一臣可以赦百姓君何愛焉鄭人以詹與晉人晉人將烹之詹曰臣欲盡辭而公聽其辭詹曰天降鄭禍使􅁋觀狀臣曰不可夫晉公子賢明若使復國而得志於諸侯禍不赦矣今禍及矣尊明勝患智也殺身贖國忠也乃就烹據鼎而疾號曰自今以徃智忠以事君者與詹同乃不殺厚為之禮而歸之漢書曰漢之三年項王圍漢王於滎陽漢將紀信説漢王曰事已急矣請為王誑楚王可間出於是陳平夜出女子滎陽東門被甲二千人楚兵四面擊之紀信乗王車黄屋左纛李斐曰纛毛羽幢在乘輿車衡曰城中食盡漢王降楚軍皆呼萬歳漢王與數十騎從城西門出走成臯項王燒殺紀信漢書曰莽何羅本姓馬明帝馬后恐其先人有反者易曰莽也與江充相善及充敗衛太子後上知太子寃乃夷滅充宗族黨與何羅懼及遂謀為逆金日磾視其志意有非常心疑之隂獨察其動静與俱上下何羅亦覺日磾意以故久不得發是時上行幸林光宫服䖍曰甘泉一名林光臣瓚案林光本秦離宫在甘泉日磾小疾卧廬何羅矯制發兵明旦上卧未起何羅從外入日磾奏厠心動立入坐内户下須㬰何羅袖白刃從東廂上見日磾色變走趨卧内欲入行觸寳瑟僵日磾得抱何羅因傳曰莽何羅反上驚起左右拔刃欲格之上恐并中日磾止勿格日磾捽胡投何羅殿下得擒縳之窮治皆伏􅇳東觀漢記曰王郎遣將攻信都信都大姓馬寵等開城内之收太守宗廣及李忠母妻子皆繫獄而令親屬招呼忠時寵弟從忠為校尉忠即時召見責數以背恩反賊因格殺之諸將皆驚曰家屬在人手中殺其弟何猛也忠曰若縱賊不誅則二心也上聞而美之謂忠曰今吾兵已成矣將軍可歸救老母妻子忠曰蒙明公大恩思得效命誠不敢内顧宗親又曰信都反為王郎郎所置信都王捕繫祭彤父弟及妻子使為手書呼彤曰降者封爵不降族滅彤涕泣報曰事君者不得顧家又曰張步攻耿弇時上在魯聞弇為步所攻自往救之未至陳俊謂弇曰虜兵盛可且閉營休士以須上來弇曰乗輿且到臣子當擊牛釃酒以待百官反欲以賊虜遺君父耶乃出大戰自旦及昏復大破之後數日車駕至臨淄自勞軍也范曄後漢書曰温序字次房太原祁人為䕶羌校尉行部至襄武為隗􅅝别將荀宇所拘刼宇謂序曰子若與我併威同力天下可圖也序曰受國重任分當效死義不貪生苟背恩德宇等復曉譬之序素有氣力大怒叱宇等曰虜何敢廹脅漢將因以節撾殺數人賊衆爭欲殺之宇止之曰此義士死節可賜以劒序受劒銜鬚于口顧左右曰既為賊所殺無令鬚汙血遂伏劒而死英雄記曰王允誅董卓卓部曲將李傕郭汜不自安遂合謀攻圍長安城陷呂布奔走布駐馬青瑣門外招允曰公可以去乎允曰若國家社稷之靈上安國家吾之願也如其不獲則奉身以死之漢雜事曰景帝時吳楚七國反齊孝王狐疑膠西濟北二國圍齊齊使路中大夫於天子還報曰堅守北至二國圍齊數重無從入二國與路中大夫盟曰若反言漢已破大夫許之至城下望見齊王曰漢已發兵百萬使太尉周亞夫擊破吳楚方引兵救齊齊必堅守二國誅之魏志曰許褚從征袁紹於官渡徐他等謀為逆以褚常侍左右憚之不敢發伺褚休下日他等懷刀入褚至下舎心動即還侍他等不知入帳見褚大驚愕他色變褚覺之即擊殺他等太祖亦親信之又曰諸葛恪圍合肥新城城中遣士劉整出圍傳消息為賊所得拷問所傳語賊謂整曰諸葛公欲活汝汝可具服整罵曰我當必死為魏國鬼不苟求活逐汝去也終無他辭又遣士鄭像出城傳消息恪遣騎尋跡得像歸面縛繞城令整像大呼言大將軍已還洛不如早降像更呼城中大軍近在圍外壯士努力賊以刀築口不使得語遂大呼令城中聞詔追賜整像爵闗中侯又曰王脩字叔治北海人魏國既建為大司農郎中令徙為奉常其後嚴才反與其徒屬數十攻掖門脩聞變召車馬未至更將官屬步至宫門太祖在銅爵臺望見之曰彼來者必王叔治也相國鍾繇謂脩曰舊京城有變九卿各居其府脩曰食其禄焉避其難居府雖舊非赴難之義也又曰諸葛誕為鎮東將軍殺揚州刺史樂綝㨿壽春反遣司馬昭征之斬誕誕麾下五百人不降昭令曰不降皆斬衆咸曰願從諸葛公死不恨矣每斬一人諸人顔色不變時人謂之後代田橫蜀志曰鄧艾伐蜀遣書誘諸葛瞻若降者必表為琅琊王瞻怒斬艾使遂大戰敗臨陣死時年三十七衆皆散瞻長子尚與瞻俱死又曰先主奔荆州曹公追之先主棄妻子走使張飛將二十騎距後飛㨿水斷橋瞋目横矛曰我張翼德也可來共决無敢近者又曰嚴顔巴郡人益州牧劉璋使顔守巴郡先主入蜀圍成都璋出迎降諸郡皆伏惟顔守而不屈使張飛攻巴郡生擒顔呵曰汝見將軍至何得不降令逆戰乎顔曰卿等無狀奪我州我但有斷頭將軍無降將軍飛怒令左右斬之顔曰斫頭便斫何怒耶飛壯其忠節釋之王隠晉書曰嵇紹以天子蒙塵奔詣行在所值王旅不振敗績於蕩隂百官左右皆奔散惟紹儼然端冕以身扞衛兵交御輦飛箭雨集遂以見害晉中興書曰譙王承為湘州刺史王敦遣叅軍桓羆説承以劉隗專寵令討之請承為軍司承歎曰吾其死矣地荒人鮮勢孤援絶赴君難忠也死王事義也惟忠與義亦復何求便唱義衆府長史長沙人虞悝慷慨有志節共盟示囚桓羆馳檄湘州於是一州之内並皆同赴又曰蘇峻反桓彝為宣城内史往赴朝廷長史裨惠等以郡兵寡弱山人易擾可按甲以湏後舉􅂜厲色曰夫見無禮於其君者誅之如鷹鸇之逐鳥雀今社稷之難而欲逡巡將何以云衆力雖寡義無寜處長驅往進尋王師敗績彝慷慨流涕皆勸偽通以紓交至之禍如其不然重兵必至彝曰吾受國厚恩不能死節焉能忍辱與之通問如其不濟此即命也遣俞縱進軍左右以力不敵勸縱退軍縱曰吾承桓侯厚遇吾之不可負桓侯猶桓侯不可負國也遂力戰而死峻遣韓冕因進軍討彜力屈被害又曰易雄長沙瀏陽人為舂陵令聞王敦作逆譙王承檄至雄馳檄逺近列敦罪惡俄而王師敗績敦得肆暴收雄姑熟以檄示焉雄曰有之惜雄位微力弱不能救國難安以生為今曰即戮得為忠鬼乃其願也沈約宋書曰劉胡叛淮南定陵人賈襲宗本縣已為胡所得率三十人救沈攸之沈攸之言於建安王休仁休仁拔為司徒叅軍督䕶使還鄉里招集為胡所擒以火炙之問臺軍消息一無所言瞋目謂胡曰君稱兵内侮窺覦神器未聞竒謨逺畧而為炮烙之刑僕本以身奉義死亦何有胡乃斬之後魏書曰河間公元齊烈帝之𤣥孫也少雄傑魁岸世祖愛其勇壯引侍左右從征赫連昌世祖馬蹶賊衆逼帝齊以身蔽捍决死擊賊賊乃退世祖得上馬是日微齊以身蔽捍幾至危殆乃賜爵浮陽侯又曰叔孫俊字醜歸少聰敏年十五内侍左右朱提王悅懐刃入禁欲為大逆俊覺悅舉動有異便引掣之乃於悅懐中得兩匕首遂執悅殺之范亭燕書曰孟高字宏義長壯有雄姿慕容暐即位左遷衛將軍出避難將向龍都禁衛四散唯高及殿中將艾郎等十餘騎從行逹福禄逢賊高獨力戰射殺之唐書曰劉感岐州鳯泉人武德初以驃騎將軍鎮涇州薛仁杲率衆圍之感嬰城拒守城中糧盡遂殺所乘馬以分將士感一無所噉惟取馬骨取汁和木屑食之城垂陷者數矣長平王叔良援兵至仁杲解而去感與叔良出戰為賊所擒仁杲復圍涇州令感語城中云援軍已散徒守孤城何益也宜早出降以全家室感許之及至城下大呼曰近賊饑餓亡在朝夕秦王率數十萬衆四面俱集城中勿憂各宜自勉以全忠節仁杲大怒執感於城邊埋脚至膝馳騎射殺之又曰張巡守睢陽在圍中每戰皆登城大呼以助軍勢皆血流面牙齒皆咬碎城將陷巡西向拜曰臣不能全孤城今為賊陵逼誓願為鬼與賊為厲以答聖明及城陷尹子竒入城見巡問曰聞公每督戰皆裂嚙碎牙因以大刀剔其口見其存者不過三數將存之巡大詈之賊黨皆曰此人必不為我用又得衆死心不可留故害之五代史曰後唐應順末少帝失位自洛涉河與數百騎欲奔鄴時晉高祖改鎮常山亦自郡詣闕夜與帝遇於獲嘉東遂俱入衛郡郵舎中是夜少帝伏甲欲與徒臣謀害晉高祖詐屏人對語方坐於亭廡帝宻遣御士石敢袖鎚立其後伏甲者俄起左右驚擾敢素有勇力擁高祖入一室以巨木塞門敢力當其鋒尋死焉呂氏春秋曰荆莊襄王獵於雲夢射隨兕中之申公子培刦而奪之王曰何其暴而不敬也命吏誅之左右大夫皆進諫曰子培賢者也又為王百倍之臣此必有故願王察之也不出三月子培疾而死荆興師戰於兩棠大勝晉歸而賞有功者申公子培之弟進請賞於吏曰人之有功也於軍旅臣之兄有功也於車下王曰何謂也對曰臣之兄犯暴不敬之名觸死亡之罪於王之側愚以忠於君王之身而持千歳之壽也臣以兄賞請故記曰殺隨兕者不出三月是以臣之兄驚懼而爭之故伏其罪而死王令人發平府而視之於故記果有乃厚賞之申公子培其忠也可謂穆行矣穆美也穆行之意人知之不為勸人不知之不為沮行無高乎此者又曰人殺衞懿公熒澤盡食其肉獨舎其肝宏演使還哭畢呼天而號盡哀而止曰臣請為襮􅀶卜二音因自出其肝内懿公之肝襮表也新序曰崔杼殺莊公申蒯漁於海將入死之其御止之曰君無道聞於天下不可死也申蒯曰安得食亂君之禄而死治君之事乎申蒯至門曰請入吊門者以告崔杼杼令勿内申蒯曰汝疑我乎吾與汝臂乃㫁左臂以與門者以示崔杼杼陳八列令其入申蒯拔劒呼天鬭殺七列未及崔子一列而死又曰楚有士申鳴者在家而養其父孝聞於楚國王欲授之相申鳴辭不受其父曰王欲相汝汝不受乎申鳴對曰捨父之孝子而為王之忠臣何也其父曰使有禄於國立義於庭汝樂吾無憂矣吾欲汝之相也申鳴曰諾遂入朝楚王因授之相居三年白公為亂殺司馬子期申鳴將往死之父止之曰棄父而死其可乎申鳴曰聞夫仕者身歸於君而禄歸於親今去子事君得無死其難乎遂辭而往因而兵圍之白公謂石乞曰申鳴者天下之孝子也往刼其父以兵申鳴聞之必來來與之語白公曰善遂往取其父持之以兵告申鳴曰子與吾吾與子分楚國子不與吾子父則死矣申鳴流涕而應之曰始吾父之孝子也今吾君之忠臣也吾聞之也食其食者死其事受其禄者畢其能今吾已不得為孝子矣乃君之忠臣也吾何得以全身援桴鼔之遂殺白公其父亦死王賞之百斤金申鳴曰食君之食避君之難非忠臣也定君之國殺臣之父非孝也名不可兩立行不可兩全也如是而生何面目立於天下遂自殺襄陽耆舊傳曰魏伐蜀羅獻為巴東太守得後主委質定問乃帥所部臨于都亭三日吳聞蜀已敗遂起兵西上外托援救内欲襲獻城以固其國遣盛㬅等水陸到說獻以合同之計獻乃㑹議曰今本朝傾覆吳為同盟不恤我難而邀其利可主降於北臣求福於東乎今守孤城百姓未定宜一决戰以定衆心遂銜枚夜擊破㬅旋軍保城告誓將士厲以節義莫不用命襄陽記曰先主以習珍為零陵北部都尉孫權遣潘濬討珍珍師數百人登山自將濬乃單將左右自到山下交語珍謂曰我必為漢鬼不為吳臣矣濬攻珍圍守月餘糧箭並竭珍謂羣下曰珍受漢中王厚恩不得不報之以死諸君何為者耶乃伏劒自裁又曰晉伐吳張悌渡江戰吳軍大敗諸葛靚過迎悌悌不肯去垂泣曰仲思今是我死日且我作兒童便為卿家丞相所拔常恐不得其死負名賢知故今身殉社稷復何所遁華陽國志曰曹公察雲長不安使張遼以情問之曰極知曹公待我厚然吾受劉將軍恩不可背之要當立功報公公聞而美之是歳袁紹遣顔良攻東郡太守劉延於白馬公使雲長為先鋒雲長望麾䇿馬刺良於萬衆之中斬其首還遂解延圍表封雲長漢壽亭侯重加賞賜雲長封其物拜書告辭而歸先主周處别傳曰氐人齊萬年為亂乃以處為建威將軍進軍火戰奮劒慷慨仰天嘆曰古者將受賑鑿凶門以出蓋有進無退我為大臣以身殉國不亦可乎遂戰死太平御覽卷四百一十七
