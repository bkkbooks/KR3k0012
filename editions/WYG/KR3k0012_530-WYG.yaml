  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_530-1a, image: WYG0897/WYG0897-0696c.png}
body:
  text: 太平御覽卷五百三十宋李昉等撰禮儀部九齋戒儺齋戒易上繫曰明于天之道而察于民之故是興神物以前民用聖人以此齋戒洗心曰齋防患曰戒禮記天官冢宰曰祀五帝則掌百官之誓戒與其具脩祀五帝謂祀郊及明堂誓戒要之以刑重失禮也明堂位所謂各揚其職百官廢職服大刑是其辭之畧也所當共脩掃除糞洒前期十日帥執事而卜日遂戒前期前所諏之日也十日散齋七日致齋三日執事宗伯卜之而百官以齋戒禮記曲禮曰齋者不樂不弔哀樂則失正其思也又檀弓上曰是故君子非有大故不宿于外非致齋也非疾也不晝居于内又王制曰天子齋戒受諫嵗中羣臣奉嵗事諫王所當改為也司位以嵗之成質于天子冢宰齋戒受質大樂正大司寇市三官以其成従質天子大司徒大司馬大司空齋戒受質百官各以其成質于三官大司徒大司馬大司空以百官之成質于天子百官齋戒受質又郊特牲曰孔子曰三日齋一日用之猶恐不敬二日伐鼓何居又郊特牲曰齋之𤣥也以隂幽思也故君子齋三日必見其所祭者又玉藻曰將適公所必齋戒居外寝又祭義曰古者天子諸侯必有養獸之官及嵗時齋戒沐浴而躬朝之犧牷祭牲必於是取之敬之至也又祭義曰致齋于内散齋于外齋之日思其居處思其笑語思其志意思其所樂思其所嗜齋三日乃見其所為齋者又祭統曰及時將祭君子乃齋齋之為言齊也齊不齊以致其齊也是故君子非有大事也非有恭敬也則不齋不齊則于物無防也嗜欲無止也及其將齋也防其邪物訖其嗜欲耳不聽樂又曰齋者不樂言不敢散其志也心不苟慮必依于道手足不苟動必依于禮是故君子之齋也専致其精明之徳也故散齋七日以定之致齋三日以齊之定之之謂齋齋者精明之至也然後可以交于神明也是故先期旬有一日宫宰宿夫人夫人亦散齋七日致齋三日君致齋于外夫人致齋于内然後會于太廟又坊記曰子云七日戒三日齋承一人焉以為尸過之者趨走以教敬也又表記曰子曰齋戒以事鬼神擇日月以見君恐民之不敬也禮記外傳曰凡大小祭祀必先齋敬事天神人鬼也齋者敬也齋其心思其貎然後可以入廟齋必變食去葷􅧍也居必遷坐易其常處故散齋於外致齋於内又曰大祀散齋七日致齋三日則十日齋矣祭前旬外之日則有戒告内外内外百官齋謂之夙戒中祀七日小祀三日春秋合誠圖曰黄帝請問太乙長生之道太乙曰齋戒六丁道乃可成家語曰季桓子將祭齋三日而二日鍾鼓之音不絶冉有問于孔子曰孝子之祭也散齋七日慎思其事致齋三日而一用之猶恐不敬而二日伐鼓何居論語鄉黨曰齋必有明衣布明衣親身以自潔也以布為之齋必變食居必遷坐又述而曰子之所慎齋戰疾史記曰藺相如謂秦王曰趙送璧時齋五日今大王亦宜齋遂許齋五日舍相如廣成傳舍秦王齋五日後乃設九賔于庭引相如又曰秦二世夢白虎嚙其左驂馬殺之心不樂問占夢人曰涇水為祟二世乃齋望夷宫閆樂殺之更立子嬰為王漢書曰丞相蕭何薦韓信于漢王曰宜擇日齋戒沐浴設壇場具禮幣乃可拜為大將軍至拜乃韓信也然而一軍大驚又曰宣帝詔曰迺者鳯凰甘露降集京師嘉瑞並見修興太乙五帝后土之祠祈為百姓䝉福鸞鳯萬舉集止于旁齋戒之暮神光顯著薦鬯之夕神光交映或降于天或登于地或從四方來集于壇上帝嘉享海内承福後漢書曰殤帝崩太后與兄車騎將軍鄧隲定䇿禁中其後使隲持節以王青盖車迎安帝齋于殿中又後漢書曰周澤字稚都為太常嘗卧疾齋宫其妻哀澤老病就問所苦澤大怒以妻干犯齋禁遂収送謝罪當世疑其詭譎時人語曰生世不諧作太常妻一嵗三百六十日三百五十九日齋一日不齋醉如泥于寳晉記曰劉毅為司𨽻校尉常齋而疾其妻出㸔之表觧齋唐書曰貞元九年冬徳宗以是嵗有年蠻夷朝貢思親告郊廟于祀事尤重慎及將散齋謂宰臣曰在禮散齋歸正寝攝心奉祭不可聞外事其常務勿奏乃齋于别殿及命皇太子諸王行祭者皆受誓一日又曰貞元中徳宗方有事于郊廟詔以皇太子為亞獻親王終獻上令問柳冕當受誓戒否冕奏准開元禮並以前七日受誓戒記云各揚其職不供其事國有常刑冕以誓皇太子更其詞云各揚其職肅奉常儀又曰憲宗元和中南郊隂氣凝閉浃旬不開宰臣議請改日上曰郊廟事重吾齋戒有日豈可廢乎至獻享之際景物澄清人大恱鬼谷子曰周有豪士居鬼谷號為鬼谷先生蘇秦張儀往見之先生曰吾將為二子陳言至道子其齋戒擇日而學後秦儀齋戒而往莊子曰顔回曰吾無以進矣敢問其方仲尼曰齋吾將語若顔回曰回之家貧唯不飲酒不茹葷者數月矣若此則可以為齋乎曰是祭祀之齋非心齋也回曰敢問心齋仲尼曰一若志無聽之以耳而聼以心無聴之以心而聽以氣唯道集虛虛者心齋也又曰梓慶削大木為鐻鐻成見者驚猶鬼神魯侯見而問焉曰子何術以至此曰臣工人何術之有雖然有一焉臣將為鐻未嘗敢以耗氣也必齋以静心器之所以凝神者其是與又曰祝宗人𤣥端以臨牢筴説彘曰汝奚惡死吾將三月㹖汝十日戒十日齋藉白茅加汝肩尻于雕爼之上韓子曰燕王欲攻衞人請以棘刺之端以為猴成攻人曰君欲觀之半嵗不入其宫不飲酒不食肉雨霽日出視之晏隂之間而棘刺之母猴乃可見也燕王固養之而不能觀也捜神記曰王業和帝時為荆州刺史毎出行部沐浴齋素以祈于天地當啟佐愚心無使有枉百姓在州七年恵風大行苛慝不作儺禮記月令季春日命國儺九門磔攘以畢春氣洪範傳曰言之不從則有大禍也又月令仲秋日天子乃儺以逹秋氣此儺之陽氣恐傷暑至此不衰害亦將及故儺以通氣又月令季冬日命有司大儺旁磔以送寒氣大氣為嵗終逐阥除疾以送寒氣所以扶陵􅀈阥之義冬盡春興為木以助木氣又郊特牲曰鄉人禓禓强鬼也謂時儺然豈威疾連强鬼也孔子朝服立于阼存室神也神依人也禮記外傳曰方相氏之官嵗有三時率領羣𨽻駈索厲疾之氣于宫室之中亦攘送之義也天以一氣化萬物及常各行其徳除氣留滯則傷後時謂之不和而疾疫興焉大儺者貴賤至于邑至皆得駿疾命國儺者但于國城中行之耳周禮夏官曰方相氏掌􅂪熊皮黄金四目𤣥衣朱裳執戈揚盾帥百𨽻而時儺以索室驅疫續漢書曰先蜡一日大儺謂之逐疫其儀選中黄門子弟十二已下百二十人為侲子皆赤幘皂製執大鼗方相氏服如周制及十二獸有衣毛角中黄門行之冗從僕射將之以逐惡鬼于禁中設桃梗鬰儡葦茭畢執事者皆罷葦㦸桃枝以賜公卿將軍禮緯曰顓頊有三子生而亡去為疫鬼一居江水是為瘧鬼􅂒鬼一居宫室區隅善驚人小兒于是常以正嵗十二月令禮官方相氏掌熊皮黄金四目𤣥衣纁裳執戈揚盾帥百𨽻及童子而時儺以索室而駈疫鬼以桃弧葦矢工鼓且射之以赤丸五糓洒掃以除疾殃後魏書曰髙宗和平三年十二月因嵗除大儺之禮遂耀兵武更為制令歩兵陳于南騎士陳于北各擊鍾鼓以為節度其步兵所衣青赤黒别無部隊楯矟矛㦸相次周回轉易以相就赴有飛龍騰蛇之變為函箱魚鮮四門之陣凡十餘法踐起前却莫不應節陣畢南北二軍皆鳴鼓角衆盡大謤各令其將交去来挑戰歩兵更進退以作擊南敗北捷以為盛觀自後可以為常唐書曰舊駈儺侲子等金吾將軍並具襴笏引入閣門謹按大儺者所以駈除羣厲合黄威武盛其光儀襴笏之門常奏朝服舊制未稱合請各依鋪綉具􅀢秩帶儀刀部引出入建康實録曰孫興公常㸔戯為儺至桓宣武家宣武覺其應對不凡推問之乃興公宣城記曰呉時洪臣為廬陵太守有清稱徴還船車皆載土時嵗暮除逐人就乞見土而去莊子曰游島問雄黄曰今逐疫出魅擊鼓呼噪何也雄黄曰黔首多疫黄帝氏立巫咸使黔首沐浴齋戒以通九竅鳴鼓振鐸以動其心勞形趨歩以發隂陽之氣飲酒茹葱以通五臓夫擊鼓呼噪逐疫出魅鬼黔首不知以為魅祟也張衡東京賦曰卒嵗大儺駈逐羣厲方相秉鉞巫覡操茢侲子萬童丹首𤣥製桃弧棘矢所發無臬飛礫雨散剛癉畢斃煌火馳而星流逐赤疫于四裔然後凌天池絶飛梁囚耕父于清泠溺女鬼于神潢㢘品大儺賦曰于吉日之上戊将大蜡于臘烝先兹日之酉久宿潔浄以清澄乃班有司聚衆大儺天子坐華駿臨朱軒凭玉几席文彌率百𨽻之侲子羣鼔噪于官垣太平御覽卷五百三十
