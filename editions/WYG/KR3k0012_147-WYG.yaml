body:
  text: 太平御覽巻一百四十七宋李昉撰皇親部十三太子二左傳曰初宋芮司徒生女子芮司徒宋大夫赤而毛棄諸堤下其身色赤而生毛也恭姬之妾取以入名之曰棄長而美恭姬宋伯姬也平公入夕視夕也平公恭姬子也恭姬與之食公見棄而視之尤尤過也意悅之視之遇乆也姬納諸御納之平公之御嬖生佐公嬖棄而生佐佐立為宋元公惡而婉婉順也佐貌惡心順太子痤美而狠太子貌美而心狠戾不從教合左師畏而惡之合左師向戌也寺人惠墻伊戾為太子内師而無寵寺人宋閹士惠墻氏伊戾名以公寺人為太子内師掌内官秋楚客聘於晉過宋楚客道遇宋太子知之請野饗之公使往伊戾請從之公曰夫不惡女乎夫謂太子伊戾無寵於太子故曰夫不恶汝對曰小人之事君子也惡之不敢逺好之不敢近敬以待命敢有二心乎縱有供其外莫供其内言我内師也當為内師供内使也臣請往也遣之至則欿用牲加書徵之伊戾詐為盟書以為太子反徵而騁告公曰太子將為亂既與楚客盟矣公曰為我子又何求對曰欲速速疾也欲疾代公得位故與楚客謀共弑父也公使視之則信有焉有盟也問諸夫人夫人佐母弃也與左師則皆曰固聞之固久也乆聞太子欲為亂公囚太子太子曰唯佐也能免我召而使請曰日中不來吾知死矣左師聞之聞太子與佐期日中聒而與之語聒讙也欲使失期於佐過期乃縊而死經書宋公殺其世子痤平公用伊戾之譖聽夫人左師之言使世子無罪而死直書宋公殺之者所以深罪之也佐為太子公徐聞其無罪也乃烹伊戾又曰許悼公瘧許悼公靈公之子名買瘧寒疾也五月戊辰飲太子止之藥卒經書夏五月戊辰許世子弑其君買止悼公子襄太子也公疾不瘳止獨進藥雖嘗而不由醫以至於卒太子奔晉書曰弑其君禮君有疾飲藥臣先嘗之親有疾飲藥子先嘗之醫不三世不服其藥止進藥而不由醫故書弑告於諸侯君子曰盡心以事君言事君之道但當盡其忠心與其實力舍藥物可也藥物有毒當由醫非凡人所知譏止不舍藥物所以加弑君之名又曰楚平王卒令尹子常欲立子西子西平王之長庶子公子申也曰太子任弱其母非嫡太子任即昭王也其母謂秦嬴也太子建實聘之子西長而好善立長則順建善則治王順國治可不務乎子西怒曰是亂國而惡君王也謂夫人太子故嘗聘之廢而不立是為亂國迫惡君王也國有外援不可不黷也外援謂太子任泰之外孫黷易也秦為任外援不可易王有嫡嗣可亂也敗親速讐亂嗣不祥我受其名賂吾以天下吾滋不從楚國何為不殺令尹懼乃立昭王又曰齊燕姬生子不成而死燕姬齊景公夫人昭十一年燕人所歸不成未冠也諸子鬻姒之子荼荼嬖諸子諸公子鬻姒景公妾也淳于人所納女荼安孺子諸大夫恐其為子也言於公曰君之齒長矣未有太子若之何為子為太子也荼少故恐立之言君長未有太子一旦不諱當若之何欲立早立長也公曰二三子聞於憂虞則有疾疢亦姑謀樂何憂於無君言二三子當國家閒暇無憂虞惟恐疾疢在其閒今無疾疢何為不自謀自樂何憂無君乎公疾使國惠子髙昭子立荼國㑹子國景之子國夏也昭髙姬之子髙張也寘羣公子於萊寘置菜齊東鄙邑欲使逺齊公羊傳曰子般卒子卒云子卒此其稱子般卒何何林注曰据子赤不言子赤卒君存稱世子明當嗣父位為君也君薨稱子某縁民臣之心不可一日無君故稱子某繼父也名者尸柩尚在以君前名臣踰年稱公不曠年無君也又曰公孫慈如牟公及齊侯宋公陳侯衛侯鄭伯許男曹伯㑹王世子于首戴曷為殊㑹王世子據宰周公不殊别也世子貴也世子猶世世子也觧貴意也言當世父位儲君副主不可以諸侯㑹之為大故殊之使若諸侯為世子所㑹也自王者言之居逺世子在三公下禮䘮服斬衰曰公士大夫之衆臣是也自諸侯言之世子尊於三公此禮之威儀各有所施言及者因其文可得見汲汲也世子所以㑹者時桓公德衰故上假王世子示以公義也糓梁傳曰曹伯使其世子姑射來朝朝不言使言使非正也庾信註曰禮諸侯之嫡誓於天子攝其君則下其君一等未誓則以玉帛繼子男此謂同急王命也至於相朝非急㑹使曹伯或不朝魯未為有闕乃使世子攝朝言非禮之正也使世子伉諸侯之禮而來朝曹伯失正矣諸侯相見曰朝以待人父之道待人之子以内為失正矣内失正曹伯失正葢言二者俱失之世子可以己矣則是放命也放違也言世子違命而止是當不義則争之又曰陳侯之弟招殺世子姬師招成公子姬師襄公子所謂悼太子者也哀公愛其世子留托之招欲其立之哀公有疾招殺太子姬師而立留鄉曰陳公子招鄉曰在元年今曰陳侯之弟招何也曰盡其親所以惡招也盡其親謂稱公子又稱弟招先君之公子今君之母弟也兩下相殺不志乎春秋此其志何也世子云者惟君之貳也云可以重之存焉志之也諸侯之尊兄弟不得以屬通其弟云者親之也親而殺之惡也孝經曰昔者明王之以孝治天下不敢遺小國之臣而况於公侯伯子男乎鄭𤣥注曰古者諸侯五年一朝天子使世子郊迎芻米百車以客禮待之晝坐王殿夜設庭燎思與相見問其勞苦也孔子家語曰邾隠公既即位將冠使大夫因孟懿子問於孔子孔子曰其禮如世子之冠冠於阼階所以著代王肅注曰主人之位明代交也醮於客位加有成冠於阼階賔禮之而用酒於客位敬而成之户西為阼也三加彌尊喻其志喻其志使彌尊初加緇布冠再加皮弁再加爵弁也冠而字之敬其名雖天子之元子猶士也其禮不變天下無生而貴者又曰孔子曰古者王世子雖幼其即位則尊為人君治成人之事者也何冠之有孟懿子曰然則諸侯之冠異天子與怪天子無冠禮而諸侯有冠禮故以為問也孔子曰君薨而世子主䘮是亦冠己君子無所殊諸侯亦人君與天子無異孔叢子曰穆公問於子思曰立太子有常乎荅曰有之在周公之典曰文王舍適而立次㣲子舍孫而立其弟是何法也子思曰殷人質而尊故立其弟周人文而親其親故立其子亦各有禮也文質不同其禮則異文王舍適立次權也漢舊儀曰皇后太子各食三十縣曰湯沐邑白虎通曰何以知天子子亦稱世子也春秋傳曰公㑹世子於首止是也或曰天子之子稱太子尚書曰太子發升于舟是也中候曰廢考立發為太子明文王時稱太子也或云諸侯之子稱世子春秋傳曰晉太子申生鄭太子華齊太子光由是觀之周制太子世子亦不定也漢制天子稱皇帝其嫡嗣稱皇太子諸侯王之嫡嗣稱世子後代咸因之又曰太子夫人無諡者何本婦人隨夫太子無諡其夫人不得有諡也冠義曰天子之元子猶士也士無諡知太子亦無諡也又曰天子之太子諸侯之世子皆以諸侯禮娶與君同示無再娶之義也又曰天子之太子諸侯之世子皆就師於外者尊師說先王之道也故曲禮有之曰禮聞來學不聞徃教也又易曰匪我求童蒙童蒙求我記曰小學在公宮南之左大學在郊又曰王太子王子羣后之太子公卿大夫元士之嫡子皆造小學小學經藝之宫大學辟雍鄉射之宫紀年曰幽王八年立褒姒之子伯服為太子史記曰諸侯共立故幽王太子宜臼是為平王史記燕世家曰燕見秦且滅六國秦兵臨易水禍且至太子丹隂飬壯士二十人使荆軻獻督亢地圗於秦王秦王覺之殺軻使將軍王翦擊燕二十九年秦㧞我薊燕王亡徙居遼東斬丹以獻秦燕丹子曰太子丹質於秦秦王遇之無禮不得意欲歸秦王不聽謬言令烏白頭馬生角乃可丹仰天而歎烏即白頭馬生角秦不得已而遣之為機發之橋欲䧟丹丹過之橋為不發夜到關丹為鷄鳴遂得逃歸故怨於秦欲報之養勇士無所不至丹與其傅麴武書曰丹不肖生於僻陋之國長於不毛之地未曽得覩君子雅訓欲有所陳幸垂覽之丹聞丈夫之道節義亷恥不却以虧其莭受辱以生正直之所羞也故有刎喉不顧據鼎不避者斯豈樂死而忘生哉其心所守也今秦王反戾天常虎狼其行遇丹無禮諸侯最甚毎念之痛入骨髓計燕國之衆不能敵之曠年相守力固不足欲收天下勇士集海内英雄破國空藏以奉養之重幣甘辭以市於秦秦貪我賂而信我辭則一劒之任當千萬之師須更之間可觧丹萬世之恥若其不然令丹生無日於天地死懐恨於九泉必令諸侯無以為歎易水之北未知誰有此盖以大夫恥也謹遺書願熟思之史記呂后本紀曰太后髙祖微時妃也生孝惠帝為人仁弱髙祖以為不類我常欲廢太子立戚姬子如意如意類我幾代太子者數矣頼大臣争之及用留侯策太子得不廢又張良世家曰上欲廢太子立戚夫人子趙王如意大臣多諌争未能得堅决者也呂后恐不知所為人或謂呂后曰留侯善畫策上信用之呂后乃使建成侯呂澤刼留侯曰君常為上謀臣今上欲易太子君安得髙枕而卧乎留侯曰始上數在困急之中幸用臣策今天下安定以愛欲易太子此骨肉之間雖臣等百餘人何益呂澤强要曰為我畫計留侯曰此難以口舌争也顧上有不能致者天下有四人四人者年老矣皆以為上慢侮人顧逃匿山中義不為漢臣然上髙此四人今公誠能無愛金玉璧帛令太子為書卑辭安車因使辯士請之來以為客時時從入朝令上見之則必異而問之上知此四人賢則一助也於是呂后令呂澤使人奉天子書卑辭厚禮迎四人四人至客建成侯所漢髙十一年黥布反上病欲使太子將徃擊之四人相謂曰凡來者以將存太子太子將兵事危矣乃說建成侯曰太子將兵有功則位不益太子無功還則從此受禍矣且太子所與俱諸將皆嘗與上定天下驍將也今使太子將之此無異使羊將狼也皆不肯為盡力其無功必矣臣聞母愛者子抱今戚夫人日夜侍御趙王如意常抱居前上曰終不使不肖子居愛子之上明乎其代太子位必矣君何不急請呂后承間為上泣言黥布天下猛將也善用兵今諸將皆陛下故等夷夷猶儕也乃令太子將此属無異使羊將狼也莫肯為用且使布聞之則鼓行而西耳晉灼曰鼔行而西言無所畏上雖病强載輜車卧而護之諸將不敢不盡力上雖苦為妻子自强於是呂澤立夜見呂后呂后承間為上泣涕而言如四人意上曰吾惟豎子固不足遣而公自行耳於是上自將兵而東群臣居守皆送至覇上留侯病自强起至曲郵長安縣有曲郵聚見上曰臣宜從病甚楚人剽疾願上無與楚人争鋒因說上曰令太子為將軍監關中兵上曰子房雖疾强卧而傅太子是時叔孫通為太傅留侯行少傅事漢十二年上從擊破布歸疾益甚愈欲易太子留侯諫不聽因疾不視事叔孫太傅稱說引古今以死争太子上佯許之猶欲易之及讌置酒太子侍四人者從太子年皆八十有餘鬚眉皓白衣冠甚偉上怪之問曰彼何為者四人前對各言名姓曰東園公甪里先生綺里季夏黄公上乃大驚曰吾求公數嵗公避逃我今公何自從吾兒遊乎四人皆曰陛下輕士善罵臣等義不為辱故恐而亡匿竊聞太子為人仁孝恭敬愛士天下莫不延頸欲為太子死者故臣等來耳上曰煩公幸卒調䕶太子如淳曰調䕶猶營䕶也四人為壽已畢趨去上目送之召戚夫人指示四人者曰我欲易之彼四人輔之羽翼已成難動矣呂后真而主矣漢書外戚傳曰孝景王皇后武帝母也入太子宮太子幸愛之生三女一男男方在身時王夫人夢日入其懐以告太子太子曰此貴徴也未生而文帝崩景帝即位王夫人生男是時薄皇后無子後數嵗景帝立齊栗姬男為太子而王夫人男為膠東王長公主嫖有女欲與太子為妃栗姬妬而景帝諸美人皆因長公主見得貴幸栗姬日怨怒謝長主不許長主欲與王夫人王夫人許之㑹薄皇后廢長公主日譛栗姬短景帝常属諸姬子曰吾百嵗後善視之栗姬怒不肯應言不遜景帝心銜之而未發也長公主日譽王夫人男之美帝亦自賢之又以曩者所夢日符計未有所定王夫人又隂使人趣大臣立栗姬為皇后大行奏事文曰子以母貴母以子貴今太子母號宜為皇后帝怒曰是乃所當言耶遂按誅大行廢太子為臨江王栗姬愈恚不得見以憂死卒立王夫人為皇后男為太子漢武帝故事曰武帝生猗蘭殿四嵗立為膠東王七嵗立為皇太子漢書曰衛皇后生戾太子據元狩元年立為皇太子年七嵗矣初上年二十九乃得太子甚喜為立禖張晏曰禖者求子月令曰祀髙禖是使東方朔枚臯作禖祝少壯詔受公羊春秋又從瑕丘江公受糓梁及冠就宮上為立博望苑使通賔客從其所好故多以異端進者元鼎四年納史良娣韋昭曰良娣官也戾太子有妃有良娣有孺子凡三等産子男進號曰史皇孫張晏曰皆以舅氏姓為氏以相别也武帝末衛后寵衰江充用事充與太子及衛氏有隙恐上晏駕後為太子所誅㑹巫蠱事起充因此為姦是時上春秋髙意多所惡以為左右皆為蠱道祝詛窮治其事充典治巫蠱遂至太子宮掘蠱得桐木人太子召問少傅石德德懼為師傅并誅因謂太子曰奸臣如此太子將不念秦扶蘇事耶太子急乃收捕充斬以狥遂部賔客為將率與丞相劉屈氂等戰太子兵敗亡不得上怒甚群下憂懼不知所出壺關三老茂上書云子盗父兵以自免耳書奏天子感悟太子之亡也東至湖藏匿泉鳩里主人家貧常賣履以給太子太子有故人在湖聞其富瞻使人呼之而發覺史圍捕太子太子自度不得脱即入室自經後車千秋言太子之寃上遂擢千秋為丞相而族滅江充家上憐太子無辜乃作思子宮為歸來望思之䑓於湖天下聞而悲之宣帝即位有司奉諡曰戾置奉邑三百家又曰孝元皇帝宣帝太子也母共哀許皇后宣帝微時生民間年二嵗宣帝即位八嵗立為太子壯大柔仁好儒見宣帝所用多文法吏以刑名繩下大臣楊惲盖寛饒等坐刺議辭語為罪而誅嘗侍讌從容言陛下持刑太深宜用儒生宣帝作色曰漢家自有制度本以覇王道雜之奈何純任德教害政乎且俗儒不達時宜好是古非今使人眩於名實不知所守何足委任乃歎曰亂我家者太子也繇是踈太子而愛淮陽王曰淮陽王明察好法宜為吾子而王母張媫妤尤幸上有意欲用淮陽王代太子然以少依許氏俱從微起故終不背焉又曰孝宣帝王后宣帝即位召入後宮稍進為婕妤霍皇后廢上憐許太子早失母幾為霍氏所害於是乃選後宮素謹慎而無子者遂立王婕妤為皇后令母養太子又曰孝成皇帝元帝太子也母曰王皇后元帝在太子宫生甲觀畫室如淳曰甲觀觀名畫室室名三輔黄圖云太子宫有甲觀師古曰甲者甲乙丙丁之次也為世嫡皇孫宣帝愛之字曰太孫常置左右年三嵗而宣帝崩元帝即位帝為太子壯好經書寛博謹慎初居桂宫上嘗急召太子出龍樓門張晏曰門樓上有銅龍若白鶴飛廉之為名也不敢絶馳道應劭曰馳道天子所行道也葢若今之中道師古曰絶横度也西至直城門晉灼曰黄圗西出南頭第二門得絶乃度還入作室門上遲之問其故以狀對上大恱乃著令令太子得絶馳道云其後幸酒樂燕樂幸酒好酒樂燕沈讌上不以為亂既而定陶恭王有才藝母傅昭儀又愛幸上以故常有意欲以恭王為嗣頼侍中史丹護太子家輔助有力上亦以先帝尤愛太子故得無廢又曰孝哀皇帝元帝庻孫定陶㳟王子也嗣立為王好文辭法律元延四年入朝盡從傅相中尉時成帝少弟中山孝王亦來朝獨從傅上以問定陶王對曰令諸侯王朝得從其國二千石傅相中尉皆國二千石故盡從之上令誦詩通習能說他日問中山王獨從傅何法令不能對帝由此賢定陶王數稱其才為加元服而遣之時年十七矣明年徴立為皇太子謝曰臣幸得繼父守藩為諸侯王材質不足以假充太子之宫太平御覽巻一百四十七
