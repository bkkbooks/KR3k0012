body:
  text: 太平御覽卷五百一十三宋李昉等撰宗親部三伯叔母從伯叔族父姑伯叔母爾雅曰父之兄妻為世母父之弟妻為叔母禮記曾子問曰婚禮既納幣有吉日女之母父死則如之何孔子曰壻使人弔如壻之父母死則女之家亦使人弔父喪稱父母喪稱母父母不在則稱伯父世母又雜記曰孔子曰伯母叔母䟽衰踊不絶地姑姊妹之大功踊絶於地如知此者由文矣哉家語曰孔子之舊人曰原壤其叔母死夫子將助之以木子路曰由也昔聞諸夫子毋友不如己者過則勿憚改姑已如何姑且已亡孔子曰凡人有喪匍匐救之况舊故非友同志乃為友故友非舊友吾其徃及為之槨原壤登木曰久矣予之不託於音也遂歌曰狸首之斑然執女手之卷然夫子為之隱陽不聞以過之子路曰夫子屈節而極於此失其舉矣豈未可以已乎孔子曰吾聞之親者未失其為親也故者未失其為故也禮記亦載稱原壤之母也蜀志曰許靖字文休汝南平輿人也靖與曹公書曰世路戎夷禍亂遂合駑怯偷生自竄蠻貊成濶十年吉㐫禮廢涉南海循岸渚五千餘里復遇疫疾伯母殞命并及羣從自諸妻子一時略盡復相扶持前到此郡計為兵害及病亡者十遺一二生民之艱辛苦之甚豈可具陳哉晉書曰羅含字君章桂陽人也含孤幼為叔母朱氏所養少有志尚晝卧夢一鳥文采異常飛入口中因驚起說之朱氏曰鳥有文采汝後必有才章自後􅇨思日新又曰餘杭婦人經年荒賣其子以活夫之兄子吳興太守孔褒薦之又曰皇甫謐字士安幼名靖安定朝那人漢太尉嵩之曾孫也後叔父徙居新安年二十不好學遊蕩無度甞得瓜果輙進叔母任氏任氏曰孝經云三牲之養獨為不孝汝今年餘二十目不存教心不入道無以慰我因歎曰昔孟氏三徙以成仁曾丈烹豕以為教豈我居不卜隣教有所闕何爾魯鈍之甚也脩身篤學自汝得之於我何有因對泣涕謐乃感激就郷人席坦受書勤力不怠居貧躬自稼穡帶經而農遂博綜典籍百家之言自號𤣥晏先生又曰羊耽妻辛氏字憲英隴西人鍾㑹為鎮西将軍憲英謂耽從子祜曰鍾士季何故西出祜曰將為滅蜀也憲英曰㑹所在縱非持久處下之道吾畏其他志也㑹果反祜甞送錦被憲英嫌其華反而覆之又曰杜有道妻嚴氏字憲京兆人貞淑有識量生子植植從兄預為秦州刺史被誣徴還憲與預書戒之曰諺曰忍辱至三公卿今可謂辱矣能忍之公是卿座預後果為儀同三司三十國春秋曰羊祜年十五而孤事伯母蔡氏以孝聞蔡氏每歎曰羊叔子可謂能養今顔叔子也其諸葛孔明之亞乎宋書曰謝瞻字宣逺陳郡陽夏人衛将軍晦第三兄幼孤叔母劉氏撫育有恩同於至親從伯叔爾雅曰父之從父昆弟為從祖父吳志曰朱異字季文為陽武将軍孫權與論攻戰辭對稱意權謂異從父驃騎將軍㩀曰本知季文􅝸烏外切定見之後過所聞臧榮緒晉書曰王沉字處道少孤為從叔司空昶所養沉事昶如父虞預晉書曰王渾從子陵字彭祖司空王沉賤嬖也少時不為親黨所知渾謂弟深等曰卿等莫輕彭祖此兒平世不减方州牧伯亂世可為都督三公懐愍之世果為幽冀都督位至鼎輔如渾所說晉書曰王彪之字叔彪從伯導曰選曹欲以汝為尚書郎汝幸可作諸王佐耶彪曰多少既不足計當相任之於時至於超遷是所不願又曰王羲之字逸少司徒導之從子也深為伯敦導所器重又曰魏舒字陽元任城人也身長八尺二寸姿望秀偉飲酒石餘而遲鈍質朴不為郷親所重從叔父吏部郎衡有名當世亦不知之使守水碓歎曰舒堪數百戸長我願畢矣舒亦不介意後遷至司徒劇陽子又曰檀平之字子慶髙平人少有志力閨門雝肅為世所稱孤從兄子歆兄弟五人皆稚弱憑之撫養若己所生又曰荀崧從弟馗早亡二息序􅂒許金切年各數嵗崧迎與共居恩同其子太尉臨淮公荀顗因廢絶朝廷以崧屬近欲以崧子襲封崧哀序孤微乃讓封於序論者稱焉宋書曰謝景仁陳郡陽夏人也衛將軍晦從叔父也祖據太傅安弟父兄宣城内史景仁博聞強識𤣥每與之言不倦也又曰王誕字茂世瑯琊臨沂人也少有才􅇨晉孝武崩從叔尚書令珣為表策文久而未就謂誕曰猶少序節物一句因出本示誕誕覽畢便益之接其冬秋代變後云霜繁廣除風迴髙殿珣嗟歎清拔因而用之拜秘書郎宋齋語録曰梁特進沈約撰史王希􅡭嘗問約曰從叔太常何故無𫝊約戯之曰賢從叔父有何可載答曰從叔惟忠與孝君當不以忠孝為美約有慙色博物志曰蔡邕有書近萬卷末年載數車與王粲粲亡後粲子預魏諷反被誅邕所與粲書悉入粲從子景字長緒崔鴻前凉録曰范績字𢎞基績幼有名稱族叔上洛太守眺拊其首曰汝吾宗千里駒也歴仕三朝士友服其清亮舉秀才為郎中遷中都謁者族父爾雅釋親曰父之從祖昆弟為族父後漢書曰侯覇字君房河南宻人族父淵以官有才辨任職元帝世佐石顯等領中書號曰太常侍蜀志曰費褘字文偉江夏􅀈人也􅀈音盲少孤依族父伯仁伯仁姑益州牧劉璋母也晉書曰顧和字君孝侍中衆族子也曾祖容吳荆州刺史祖相臨海太守和二嵗喪父總角便有志操族叔榮雅重之曰此吾家騏􅂹興吾宗者必此子也時宗人球亦有令聞為州别駕榮謂之曰卿速歩君孝超卿矣陳留志曰阮武字文業魏末為清河太守族子籍在總角未知名武見而偉之以為勝已明於知人皆此類也姑釋名父之姊妹曰姑姑故也言於己為久故之人也廣雅曰姑謂之威威故也說文曰威姑也爾雅曰父之姊妹為姑王父之姊妹為王姑曾祖王父之姊妹為曾祖王姑髙祖王父之姊妹為髙祖王祖姑父之從父姊妹為從祖姑父之從祖姊妹為族祖姑毛詩曰泉水衛女思歸也問我諸姑遂及伯姊父之姊妹稱姑先生曰姊箋云則又問姑及姊親其類也先姑後姊尊姑也禮記曲禮曰姑姊妹女子子已嫁而返兄弟不與同席而坐不與同器而食又檀弓曰姑姊妹之薄也蓋有愛我而厚之者左傳僖上曰初晉獻公筮嫁伯姫於秦遇歸妹之暌史蘇占之曰不吉歸妹暌孤寇張之弧姪其從姑六年其逋逃歸其國而棄其家明年其死於髙梁之墟震為木離為火火從木生離為震妹於火為姑謂我姪者吾謂之姑謂子圉質於秦也漢書曰成帝班媫妤彪之姑也後漢書曰桓􅁮字文林姑為楊賜夫人父鸞卒姑赴哀将至止於傳舍整飾從者而後入􅁮心非之及姑勞問終無一言號哭而已賜遣吏祠因縣發取祠具􅁮拒不受後每至京師未甞舍楊氏晉書曰阮孚母祖姑家胡婢也父咸通之生子咸遺姑書曰不意今日遂生子姑答曰靈光殿賦云胡人遥集於上楹便可以遥集為字咸從之列女傳曰魯義姑者魯野人之婦也齊攻魯至郊遥見一婦攜一兒抱一兒及軍至乃棄抱者而抱攜者将欲射之遂止而問曰所抱者誰之子對曰兄之子所棄者誰之子曰己子也妾見大軍至不能兩全遂棄所生之子軍曰子之於母甚痛於心何棄所生而抱兄子對曰子之於母私愛也姪之於姑公義也夫背公而向私者妾不為也於是齊軍遂止曰魯郊有婦人猶持節行况於朝廷乎遂囬軍不伐魯君聞之賜束帛號曰義姑又曰梁宣節姑者梁之婦人也其室失火兄子與己子三人在内入取兄子輙得其子及火盛不復得入婦人将赴火其友曰本取兄子卒適得己子至於中心亦已足矣何至赴火婦曰梁國豈可以戸告人曉也被不義之名何以見弟兄吾欲復投吾子又失母子之情誓不生遂赴火而死君子曰可謂節姑也先賢行状曰蔡伯喈母袁曜卿之姑女又曰鍾元皓妻李膺之姑生子覲與膺同名太平御覽卷五百一十三
