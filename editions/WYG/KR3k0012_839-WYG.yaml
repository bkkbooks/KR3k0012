body:
  text: 太平御覽巻八百三十九宋李昉等撰百榖部三禾稻秔秫禾尚書微子之命曰唐叔得禾異莖同穎獻諸天子王命唐叔歸周公于東作歸禾又金縢曰周公居東秋大熟未穫天大雷電以風禾則盡偃王啓金縢得周公代武王之説王出郊天乃反風禾盡起尚書大傳曰成王時有苖異莖而生同為一穟大㡬盈車長充廂人有上之者王召周公而問之公曰三苖為一穟抑天下其和為一乎果有越裳氏重譯而来毛詩甫田曰禾易長畆終善且有易治也長畆竟畆也禮記檀弓下曰季子臯塟其妻犯人之禾申詳以吿曰請更之子臯曰孟氏不以是罪予朋友不以是棄予以吾為邑長於斯也買道而塟後難繼也左傳隠公曰夏四月鄭祭足帥師取温之麥温周地蘇氏邑也秋又取成周之禾春秋運斗樞曰旋星明則嘉禾液春秋感精符曰日下輸於地則嘉禾興春秋説題辭曰天文以七列精以五故嘉禾之滋莖長五尺五七三十五神盛故連莖三十五穗以成盛德禾之極也又曰禾者䘖滋液䘖滋液以生故曰禾榖為名也孝經援神契曰徳下至地則嘉禾生春秋繁露曰禾寔於野粟缺於倉皆竒怪非人所意乎此可畏也史記封禪書曰管仲説桓公曰古之封禪北里之禾所以為盛蘇林注曰北里地名漢書曰武帝外事四夷而民去本董仲舒説上曰春秋他榖不書至於麥禾不成則書之以見聖人於五榖最重麥與禾又郊祀志曰王莽簒位興神僊事種五梁禾於殿中各順其色置其方靣煮二十餘物漬種計粟斛成一金言此黄帝榖僊之術又曰莽使中郎平憲誘羌還云天下太平一禾長丈餘故乞内屬續漢書曰承宫字少子琅邪人常在䝉隂山中耕種禾黍臨熟人認之宫便推與由是發名也東觀漢記曰光武以建平元年生於濟陽縣是歳有嘉禾生一莖九穂大於凡禾縣界大熟因名上曰秀又曰淳于恭字孟孫有盗刈禾恭見之念其愧因伏草中盗去乃起後漢書王符論曰夫養稂莠者傷禾稼惠奸宄者賊良人又曰蔡茂初在廣漢夢坐大殿極上有三穗禾茂跳取之得其中穗輒復失之屋之大者古通呼為殿也極殿梁也三輔間謂屋梁為極以問主簿郭賀賀離席慶曰大殿者宫府形象也極而有禾人臣之禄也取中穗是中台之位也於字禾失為秩曰失之所以得禄秩也衮職有闕其補之旬間而茂遷焉吳志曰赤烏七年宛陵言嘉禾生㑹稽始平言嘉禾生改年為嘉禾晉書曰庾衮居貧禾熟穫者已畢而採捃尚多衮乃引其羣子以退曰待其間及其捃也不曲行不旁掇跪而把之則亦大獲又與土人入山拾橡分夷險序長㓜推易居難禮無違者臧榮緒晋書曰朱冲字巨容躬植禾蓺蔬鄰牛侵犯持芻送牛而無恨色晉起居注曰武帝世嘉禾三生七莖同穗晉中興徴祥説曰王者徳盛則嘉禾生仁卉出義熈十三年鞏縣民宋曜扵田中獲嘉禾九穂同本是時羌平六合寧後魏書曰許謙字元遜代人也子洛陽為鴈門太守家田三生嘉禾皆異壟合穎世祖善之進爵北地公也北史曰趙肅授原州總管司馬在道夜行其左右馬逸入田中暴人禾輙駐馬待明訪禾主酬直而去唐書曰朔方莭度郭子儀言寧朔縣界荒地廣十五里有黑禾榖出遍地每日附近百姓掃盡經宿還生前後可得五六千石其禾圓實味甘美臣以為天啓興王先瑞百榖故漢稱雨粟周頌來牟豈若瑞禾自出家給人足盖陛下富教安人務農敦本光復社稷康濟黎元之應也又曰代宗為皇太子乾元初上降誕豫州奏百姓李氏有嘉禾生及是冊禮特詔改名豫又曰永泰元年秋京兆府上言鄠縣嘉禾生穂長一尺餘穂上粒重疊如連珠又曰馬燧大厯四年為懐州刺史乗兵亂後其夏大旱人失耕種燧乃務敦教化將吏有父母者燧輙造之施敬收瘞暴骨去其煩苛至秋田生穭禾人頗便之穭音呂禾再生也又曰元和中東川觀察使潘孟陽上言龍州武安川中嘉禾生有麟食之復生麟之来一鹿引之羣鹿随焉光華不可正視畫工就圖之并嘉禾一函以獻淮南子曰后稷辟上墾草以為百姓力農然而不能使禾冬生又曰洛水輕利而宜禾又曰夫子見禾之三變夫子孔子也三變始於粟生於苖成於穂也滔滔然曰狐鄉丘而死我其首禾乎禾穂垂而向根君子不忘本也吕氏春秋曰飯之美也𤣥山之禾山海經曰崑崙墟上有禾禾長五㝷郭璞注曰禾榖穎也白虎通曰徳至於地則嘉禾生嘉禾者大禾也説文曰禾嘉榖也二月始生八月而熟得時之中故謂之禾木也木王而生金王而死稹旱種也穎禾末也榖禾皮也稈禾莖也槀桿也㑹稽典録曰沈勲身自耕耘以供衣食人有盗穫其禾勲見而避之明日更収拾送致其家盗者愧懼齎還不受六韜曰人主好田獵則歳多大風禾榖不實鄭𤣥别傳曰𤣥年十六號曰神童民有獻嘉禾者欲表府文辭鄙畧𤣥為改作又著頌一篇侯相髙其才為修冠禮杜實大業拾遺録曰七年九月太原郡有獻禾一本三穂長八尺穂長三尺五寸大尺圍芒穂皆紫色鮮明可愛自禾已上二尺餘亦紫色有老人年八十餘以素木匣盛之賜物三十叚勑授嘉禾縣令續捜神記曰盧陵巴丘人文晁者世以田作為業秋収已過穫刈都畢明旦至田禾悉復滿湛然如初即更穫所穫盈倉而巨富廣五行記曰東魏孝静帝天保初四月禾夜生於帝銅硯中及明晨長數寸其年帝為髙洋所幽遇鴆而崩古今註曰和帝元年嘉禾生濟隂城陽一莖九穂安帝延光三年嘉禾生九真百五十六本一百六十八穂汜勝之書曰種禾無期因地為時三月榆莢時雨髙地强土可種禾薄田不能糞者以原蠶矢雜禾種之則禾不蟲崔寔四民月令曰三月二日可種稹禾夢書曰禾稼為財用之所出夢見禾吉財氣生廣志曰渠禾蔓生寔如葵子米粉白如麵為饘粥牛食之肥六月種九月熟感禾扶䟽生寔似大麥楊禾實似雚粒細也折右炊停即牙生此中國巴禾木稷也大禾髙一丈餘子如小豆出粟特國稻周禮夏官職方氏曰揚州宜稻青州宜麥禮記曲禮下曰祭宗廟之禮稻曰嘉蔬又月令曰季秋之月天子乃以犬嘗稻先薦寢廟又内則曰飲重醴清糟稲醴清糟黍醴清糟又内則曰取稲米舉糔息酒切溲所九切之小切狼臅昌録切膏以與稲米為酏之然切左傳昭五曰鄅人藉稲履行之也春秋説題辭曰稲之為言藉也稲冬含水盛其徳也故稲太隂精含水漸洳乃能化也江旁多稲固其宜也宋均注曰稲包裹也稲非水不生故曰隂精也孝􅀴援神契曰汚泉宜稲爾雅曰稌稲也今沛國呼稌也廣雅曰粢稲其穂謂之禾東觀漢記曰劉敞拜盧江都尉歳餘遭旱行縣人持稲皆枯吏强責之租敞應曰太守事也載枯稲至太守所酒數行以語太守太守曰無有敞以枯稲示之太守曰都尉事也敞怒叱太守曰䑕何敢爾也漢書曰鄧晨為汝南太守興鴻郄陂數千頃田鴻郄陂名今在豫州汝南縣東成帝時河東水波溢為害翟方進為丞相奏罷之江表傳曰孫亮五鳯元年交趾稗草化為稲呉志曰鍾離牧字子幹會稽山隂人少居永興自墾田種稲二十餘畆臨熟而縣民認之牧曰本以田荒故墾之耳遂以稲與縣民縣長召民繫獄欲䋲以法牧請之長曰君自行義事僕為民主當以法率下牧曰此是郡界緣君意顧來暫住今以少稲殺此民何心復留又曰黄龍三年由卷縣野稲自生改為禾興縣晉中興書曰孫畧字文度吳人少田於野時年飢榖貴人有盗刈其榖畧見而避之晉書曰杜預修邵信臣遺跡激用􅓳淯諸水以浸稲田萬餘頃分疆刋石使有定分公私同利衆庶頼之號曰杜父舊水道又曰恵帝征成都王狼狽左脚三指折匍匐入稲苖中頼侍中嵇紹以身捍之又曰郭飜字長翔武昌隠士也不交世事唯以漁釣射獵為娱貧無業欲墾荒田先立表題經年無主然後乃作稲將熟有認之者悉與之縣令聞而詰之以稲還飜飜遂不受又曰袁甫嘗詣何朂自言能為劇縣朂曰唯欲宰縣不為臺閣軄何也甫曰人各有能有不能辟繒中之好莫過錦錦不可以為縚音慆榖中之美莫過稲稻不可以為糜是以聖王使人必先以噐苟非周材何能悉長昔黄霸馳名於州郡而息譽扵京邑廷尉之才不為三公自昔然也朂善之除松滋令宋書曰顧觀好學年六七歳家貧父使田中驅雀觀作黄雀賦而歸雀食稲過半父怒欲撻之見賦乃止齊書曰范雲常從文恵太子幸東田觀穫稲文恵顧謂雲曰刈此甚快雲曰三時之務亦甚勤勞願殿下知稼穡之艱難無徇一朝之宴逸也文恵改容謝之南史曰孔琇之有吏能仕齊為吳令有小兒年十歳偷刈隣家稲榖一束琇之付獄案罪或諫之琇之曰十歳便為盗長大何所不為縣中皆震肅梁書曰鄧元起嘗至其西沮田舍有沙門造之乞元起有稲幾二千斛悉以施之時人稱其有大度又曰陳伯之濟隂睢陵人也年十三四好着獺皮冠帶刺刀候隣里稲熟収刈之嘗為田主所見呵之曰楚子莫動伯之曰君稲幸熟取一擔何傷若田主將執之因㧞刀而進曰楚子定何如田主皆反走徐擔稲而歸隋書曰梁陳五壇祭法以三牲首餘以骨體薦粢盛為六飯粳以敦音堆稲以牟黄粱以簠白粱以簋黍以瑚粢以璉又曰齊孝昭皇建中平州刺史嵇􅁮建議開幽州督亢舊陂長城左右營屯歳収稲粟數十萬石北境得以周贍唐書曰開元十九年揚州奏穭生稲二百一十五頃再熟稲一千八百頃其粒與常稲無異又曰孟元陽為曲環軍中大將環使董作西華屯元陽盛夏芒履立稲田中須役者退而後就舎故其田歳無不稔軍中足食淮南子曰江水肥而宜稻又曰稻生於水而不能生於湍瀬之流又曰離稻先熟而農夫耨之稻米随而生者為離與稲相似耨之為其少實也戰國策曰東周欲為稻西周不下水東周患之蘇子往見西周之君曰君之謀過矣今不下水所以富東周也今其民皆種麥無他種矣今若欲害之不若一為下水以病其所種下水東周必為種稻而復奪之若是則東周之民可令一仰西周受命於君矣國語曰越敗吳王孫雄請和范蠡不聽雄曰子范子先人有言曰無助天為虐助天為虐不祥今吾稲蟹不遺種子將助天為虐乎呂氏春秋曰得時之稲大本而莖葆長秱疏穖穂如馬尾大粒無芒搏米而薄糠舂之易而食之香如此者不益益息也先時者大本而莖葉格對對等也短秱短穗多粃厚糠薄米多芒後時者􅊏莖而不滋厚糠多粃辟米不得恃定熱仰天而死又曰史起為鄴令民大得其利相與歌之曰鄴有聖令為史公决漳水兮灌鄴旁終古斥鹵兮生稲粱呉越春秋曰越王勾踐復興師伐吳吴王敗晝夜馳走三日飢顧見生稻而取食之抱朴子曰南海晉安九熟之稻會稽典録曰夏香有盗刈其稻者香助為収之盗者慙送以還香香不受風土記曰穰稻之紫莖稴嫌銜二音稻之有青穟米皆青白者也水經曰任延為九真太守教民耕蓻法與華同名白田種白榖七月大作十月登熟名赤田種赤榖十二月作四月登熟所謂両熟之稻也世説曰晋簡文見田中稻苖不識問人是何草左右答曰是稻簡文歸三日不出云寧有得其末不識其本郭義恭廣志曰有虎掌稻紫芒稻赤穬南方有蟬鳴稻七月熟稻有盖下白正月種五月穫訖其莖根復生九月復熟青􅇗稻六月熟累子稻白漠稻七月熟此三稻大且長一粒長一寸益州稻之長者米長半寸説文曰稻稌也䆏肥尾切稻紫莖不黏者也稴稴稲不黏者也耗稻熟也徐暢祭記曰舊稑稻熟常用九月九日薦稻汜勝之書曰種稻春凍解時耕反其土種稻區不欲大大則水深淺不遍冬至後百一十日可種稻地美者用種畆四㪷俞益期牋云交趾稲再熟而草深耕種収榖薄異物志曰交趾稲夏冬又熟農者一歳再種雲南記曰雅州榮經縣土田歳輸稲米随畆五㪷其榖精好每一㪷榖近得米一㪷炊之甚香滑微似糯味崔寔四民月令曰三月多種秔稲博物志曰海陵縣扶江接海多麋獸十千為羣掘食草根其處成泥名麋畯民人随此畯種稲不耕而穫其收百倍蔡邕月令曰十月穫稲九月熟者謂之半夏稲任昉述異記曰夏禹時天雨稲古詩云安得天雨稲飼我天下民物理論曰稻者溉種之總名養生要集曰秔稲屬也稻亦秔之總名也道家方藥有用稲米秔米此則是兩物也稻米粒白如霜味苦主温服之令人多痩無肌膚秔米甘主利臓長肌膚好顔色左思魏都賦曰清流清流近鄴之西出御稲又吳都賦曰國税再熟之稲鄉貢八蠶之綿盧毓冀州論曰河内好稲秔與粳通用説文曰秔稲屬也宋書曰陶潜為彭澤令公田悉令吏種秫妻子固請乃使五十畆種粳陳書曰徐孝克所生母患疾欲粳米為粥不能常辦母亾後孝克遂常啖麥有遺粳米者對而悲泣終身不復食焉後魏書曰安同遼東郡人也太宗使同與長孫嵩並理人訟世祖即位除清冀二州刺史同長子居典太倉事盗官粳米數石以養同大怒奏求戮居自劾不能訓子請罪太宗嘉而恕之詔長給同粳米神仙傳曰王烈字長休邯鄲人與稽叔夜入山遊􅃧烈後獨入太行山忽聞山東北如雷聲往視之見山破石中有孔徑尺中有青泥流出烈取摶之随手堅凝氣味如粳米飯烈自食數丸因提歸以與叔夜而皆成青石楊􅃷之洛陽伽藍記曰西方佛沙伏國有昔尸毘王倉庫為火所燒其火燋燃于今猶在若服一粒永無虐患彼國人民湏以為藥廣志曰粳有烏粳黑穬有幽青白夏之名張衡南都賦曰其厨膳則華鄉黑秬滍臯香秔左思蜀都賦曰黍稷油油秔稲漠漠魏文帝與朝臣書曰江表唯長沙有好米何得比新城粳稲耶上風炊之五里聞香秫説文曰秫稷之黏者爾雅曰衆秫也孫炎注曰秫稷粟也廣雅曰秫稷粳也禮記月令曰仲冬之月乃命大酋秫稲必齊酒熟曰酋大酋酒官之長齊熟成也又内則曰饘酏酒醴芼羮菽麥蕡稻黍粱秫惟所欲晉書曰陶潜字元亮為彭澤令在縣公田悉令種秫曰令吾常醉於酒足矣妻子固請種秔乃使二頃五十畆種秫五十畆種秔管子曰黄墳黍秫崔豹古今注曰稻之黏者為秫禾之黏者為黍廣志曰秫有赤者有白者胡秫早熟及麥養生要録曰秫米味酸太平御覽巻八百三十九
