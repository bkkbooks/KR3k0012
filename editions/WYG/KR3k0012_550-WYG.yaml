body:
  text: 太平御覽卷五百五十宋李昉等撰禮儀部二十九殮柩殯賵賻襚殮周禮春官小宗伯曰王崩及執事涖大斂小斂帥異族而佐執事大祝之屬也又周禮春官司服曰大喪共其斂衣服禮記檀弓上曰康子之母死陳䙝衣非上服也陳之將斂也敬姜曰婦人不飾不敢見舅姑將有四方之賔來䙝衣何為陳于斯命徹之又喪大記曰小斂于户内大斂于阼階君以簟席大夫以蒲席士以葦席小斂君錦衾大夫縞衾士緇衾皆一衣十有九稱大斂布紟二衾者君大夫士一也簟細華席也三者下各有元衣一十有九稱法天地之終數也衾者或覆之或薦之者也又曽子問曰下殤土周葬于園遂輿機而往途邇故也土周堲周也周人以夏后之堲周葬下殤于園中以其未成人遠不就墓也機舉屍之牀也繩絙其中央又以繩從旁鉤之禮以機舉屍輿之以就園而斂葬為途近故耳輿機或以為餘機者也今墓遠則其葬也如之何今人斂下殯于宫中而葬之于墓與成人同墓途乃遠其葬當用棺乎則載之乎故問禮之變者也孔子曰吾聞諸老􅔶曰昔史佚有子而死下殤也墓遠葢欲葬之墓如長殤有送葬卒殤從成人也則棺載之矣史佚武王時史賢猶有所不知召公謂之曰何以不棺斂於宫中欲其斂於宫中如成人也斂於宫中則葬當載之也史佚曰吾敢哉畏知禮也召公言於周公為史佚問周公曰豈不可言是豈於禮不可許也史佚行之佚於時以為許也遂用召公宫中之言也下殤用棺衣棺自史佚始也棺謂斂於棺也問喪曰或問曰死三日而後斂者何也怪其遲也曰孝子親死悲哀志懣故匍匐而哭之若將復生然安可得奪而斂之故曰三日而后斂者以候其生也三日而不生亦不生矣孝子之心亦益衰矣家室之計衣服之具亦可以成矣親戚之逺者亦可以至矣是故聖人為之斷决以三日為之禮制也左傳僖下曰許穆公卒於師葬之以侯禮也男而以侯禮加一等凡諸侯薨於朝㑹加一等死王事加二等於是以衮斂又襄公曰魯季文子卒大夫入斂公在位宰庀家器為葬備無衣帛之妾無食粟之馬無藏金玊無重器幣君子是以知季文子之忠於公室也相三君死而無私積可不謂忠乎又定上曰季平子行東野東野季氏邑還未至丙申卒於房陽虎將以璵璠斂璵璠美玉君所佩仲梁懐弗與懐亦季氏家臣曰改步改玊昭公之出季孫行君事佩璵璠祭宗廟今定公立復臣位改君步則亦當去璵璠陽虎欲逐之告公山不狃不狃曰彼為君也予何怨焉家語曰季平子卒將以君之璵璠斂孔子初為中都宰聞之厯級而救厯登階不聚足曰送死人而以寶玉猶曝屍於中原示民以奸利之弊後漢書戴封年十五詣太學時同學石敬平温病卒封養視殯殮以所齎糧市小棺送喪到家更斂見敬平生時書物皆在棺中乃異之吳志曰張昭卒遺令幅巾素棺斂以時服孫權素服臨弔又曰諸葛瑾年六十八卒遺令素棺斂以時服事從約省晉書曰安平王孚臨終遺令曰有魏貞士河内温縣司馬孚字叔達不伊不周不夷不惠立身行道終始若一當以素棺單椁斂以時服南史曰王奐為雍州刺史被誅舊人無敢至者汝南許明達先為奐㕘軍躬為殯殮經理甚厚時人髙其節南史曰王志天監初為丹陽尹為政清靜都下有寡婦無子姑亡舉債以斂葬既而無以還之志愍其義以俸償焉陳書曰周𢎞直卒遺疏氣絶之後使買市中素棺小形者斂以時服古人通制但見先人必須備禮可著單衣裙衫故履既應侍養宜備紛晩或逢善友又須香煙棺内唯安白布手巾麄香罏而已外無所用釋名曰衣屍棺曰斂藏不復也風俗通曰禮天子斂以梓器宫者存時所居縁生事亡因以為名凡人之棺亦為宫也宋韜遺教曰吾死斂以時服不得造新白祫單衣柩禮記曲禮下曰在棺曰柩柩之言究也又檀弓下曰君遇柩于路必使人弔之又曰襄公朝于荆康王卒在魯襄公二十八年康王楚子昭也荆人必請襲欲使襄公衣之魯人曰非禮也荆人强之巫先拂柩荆人悔之巫祝荆茢君臨臣䘮之禮記綂曰柩之言也具書其謐置棺旁萬世久藏也釋名曰柩究也送隨身之制皆究備也漢書曰薛宣守左馮翊多仁恕池陽令舉亷吏獄掾王立于府未及有聞立受囚家錢宣責讓縣縣按驗獄掾乃其妻受繫者錢萬六千受之而掾實不知掾慙恐自殺宣聞之移書池陽曰縣所舉亷吏獄掾王立家私受財而立不知殺身以自明立誠亷士甚可閔惜其以府决曹掾書立之柩以顯其魂東觀漢記曰亷范字叔度京兆人也父客死蜀范乃出負䘮歸至葭萌船觸石破没范持棺柩遂俱沉溺衆傷其義鈎求得之僅免于死晉書曰東海王越薨葬東海石勒追及于莒縣寗平城將軍錢端出兵拒勒戰死軍潰勒命焚越柩曰此人亂天下吾為天下報之故燒其骨以告天地蕭子顯齊書曰傳琰字季珪北地靈州人也美姿儀為尚書左郎遭䘮居南岸隣家失火燒屋抱柩不動殯禮記曲禮上曰里有殯不巷歌助哀也又檀弓上曰孔子少孤不知其墓孔子之父鄹邑叔梁紇與顔氏之女徴在野合生孔子為徵在耻而不告也殯于五父之衢欲有所就而問之孔子亦為隱焉殯于家則知者無由怪也欲發問端五父之衢衢名也葢曼父之隣者也人之見之者皆以為葬也見相行于路也其慎也蓋殯也慎當為引禮家讀然聲之誤也殯引飾棺以輴葬引飾棺以翣柳孔子是以殯引不以葬引時人見者謂不知禮又檀弓上曰天子之殯也攢塗龍輴以椁攢木以周龍輴猶如椁而塗之天子殯以輴車畫轅以龍加斧于椁上畢塗屋斧謂之黼白黒之也以刺繡于縿幕加椁以覆棺已乃屋其上盡塗之矣天子之禮也又檀弓下曰帷殯非古也自敬姜之哭穆伯始也穆伯大夫季悼子之子公甫靖叔敬姜穆伯妻文伯歇之母也禮朝多哭不帷又王制曰天子七日而殯七月而葬諸侯五日而殯五月而葬大夫士庶人三日而殯三月而葬尊者舒卑者速也春秋傳曰天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月而外姻至者也又䘮大記曰君殯用輴攢至于上畢塗屋大夫殯以幬攢置于西序塗不暨于棺士殯見祍塗上帷之攢猶叢也屋殯上覆如屋也幬覆也暨及也天子之殯居棺以龍輴攢木題凑象槨上四柱如屋以覆之諸侯輴不畫龍攢題湊象椁其他亦如大夫之殯廢輴置棺墉下就攢三而塗之不及棺者攢中狹小裁取容棺然則天子諸侯差寛大夫及士不攢掘地下棺耳帷之者鬼神幽闇士達乎天子皆然幬亦或作棺又坊記曰子云賔禮每進以襄䘮禮每加以逺浴于中霤飯于墉下小斂于户内大斂于阼階殯于客位祖于庭葬于墓所以示逺也遠之所以崇敬左傳僖公下曰晉文公卒庚辰將殯于曲沃殯窆棺也曲沃有舊宫焉出降柩有聲如牛如牛呴聲卜偃使大夫拜曰君命大事將有西師過軼我擊之必大捷焉聲自柩出故曰君命大事戎事也偃聞奏宻謀故因柩聲以正衆心論語鄉黨曰朋友死無所歸曰于我殯重朋友恩也無所殯無親後也續漢書曰和帝追封諡皇太后父梁竦為褒親愍侯殯賜東園棺三匣衣衾范曄後漢書曰蔡順䘮母停柩未殯東隣失火燒順屋柩不可移乃伏柩上火乃越燒他舍餘見孝部宋書曰竟陵王誕據廣陵為逆事蔡興宗奉㫖慰勞廣陵别駕范長興宗素善在城内同誅興宗至躬自收殯致䘮還豫章舊墓上聞謂曰卿何故敢爾觸網興宗抗言答曰陛下自殺賊臣自葬周親既犯嚴制正甘于鉞斧耳唐書曰嚴郢以舊怨與盧杞陷楊炎趙惠伯搆成其罪貶炎于崖州惠伯于費州郢既報怨過當人頗不直郢後得罪至費州道左有柩殯問其主名或曰趙惠伯之殯也郢黙然慙恧歲餘而卒穆天子傳曰天子乃殯盛姬于榖丘之廟先王之廟有此者漢氏亦所在有廟也白虎通曰天子舟車殯為水火也故棺在車上車舟臣子更執紼晝夜千二百人紼所以牽持棺者也釋名曰于西壁下塗之曰殯殯賔也賔遇之言稍逺子思子曰殯賔也􅈖禮記雜記曰上介賵執圭將命曰寡君使某賵相者入告反命曰孤某須矣陳乗黄大路于中庭北圭將命客使自下由路西子拜稽顙坐委于殯東南隅宰舉以東下謂為在路之下覲禮曰路禮四方之客介者入設乗黄于大路之西客入則致命矣左傳隱公曰天王使宰咺來歸惠公仲子之賵緩且子氏未薨故名惠公葬在春秋前曰緩也子氏仲子也葬薨在二年􅈖助䘮物贈死不及尸尸未葬之通稱弔生不及哀諸侯以上既葬則縗麻除無哭位諒闇終䘮豫凶事非禮也仲子在而賵故曰豫凶事榖梁傳隱公曰乗馬曰賵春秋説辭題曰知生則􅉠知死則􅈖賻之為言助也賵之為言覆也輿馬曰賵貨財曰賻玩好曰贈决其意也衣被曰襚養死具也贈稱也襚遺也賻周禮天官曰小宰凡邦之弔事掌其戒令與其幣器財用凡所共者弔事弔諸侯臣幣所用贈也器所致明器也凡喪始死弔而含襚葬而贈􅈖其間加恩厚則有賻焉禮記曲禮下曰弔䘮不能賻不問其所費又檀弓上曰孔子之衞遇舊館人之䘮入而哭之哀出使子貢脱驂以賻之子貢曰于門人之䘮未有所脱驂脱驂于舊館無乃已重乎言脱驂未重此于門人恩為偏頗也夫子曰予嚮者入而哭之遇于一哀而岀涕遇見也舊館人恩雖輕我哭見主人為我盡一哀是厚恩待我也我為之出涕恩重宜施惠之也予惡夫涕之無從也小子行之客行無他物可以易之者使遂其性也又檀弓曰子柳之母死既葬子碩欲以賻布之餘具祭器古者謂錢為泉布所以通布貨財子柳曰不可吾聞之也君子不家于䘮因死者以為利請班諸兄弟之貧者又少儀曰賵馬入廟門以其主于門􅉠馬與其幣太白兵車不入廟門以其主于生人也兵車革車也雖為死者來陳之于外戰伐田獵之服非盛者也周禮革路建太白以即戎也賻者既致命坐委之擯者舉之主無親受也公羊傳隱公曰貨財曰賻榖梁傳隱公曰錢財曰賻􅉠謂助也歸生者焉漢書曰原涉父哀帝時為南陽太守天下殷富大郡二千石官賦斂􅉠葬皆千萬妻子適共受之以定産業時又少行三年喪者及涉父死讓還南陽􅉠送行䘮家墓三年由是顯名京師又曰何竝字子亷潁川太守疾病召丞掾作先令書曰告子恢吾生素餐日久死雖得官賻勿受葬為小槨但下棺恢如其言後漢書曰魯恭字仲康父期為武陵太守卒恭年十二晝夜號踊聲郡中贈􅉠無所受乃歸服䘮禮過成人後漢書曰羊續為南陽太守徴為太常未及行㑹病卒遺言薄斂不受賵遺舊典二千石卒官賻賵百萬府丞焦斂遵續先意一無所受詔書褒美勑太山太守以府賻錢賜續家世説曰王戎父渾官至梁州刺史渾所厯州郡義故懐其德惠相率致􅉠數百萬戎悉不受南史曰張稷所生劉先假葬瑯琊黄山建武中改申葬禮􅉠助委積于時雖不拒絶事畢隨以還之又曰江斆卒遺令不受助詔􅉠錢三萬布百匹子蒨啟遵斆命不受詔嘉美之從其所請又曰張融有孝義父暢臨終謂諸子曰昔丞相事難吾以不同將見殺縁司馬竺超人得活爾等必報其子後超人孫微冬月遭母䘮居貧融弔之悉脱衣以為贈被牛皮而反襚儀禮士䘮禮曰士䘮君使人襚徹帷主人如初襚者左執領右執要入升致命襚之言遺也衣披曰襚致命曰君使某襚主人拜如初襚者入衣尸出主人拜送如初禮記檀弓下曰衞有太史曰柳莊寢疾公曰若疾亟雖當祭必告也亟急也公再拜稽首請于尸曰有臣柳莊也者非寡人之臣社稷之臣也聞之死急弔賢也不釋服而往襚以襚之脱君祭服以襚臣親賢也又雜記曰諸侯相襚以後路冕服先路與褒衣不以襚不以巳之正者施于人以彼不以為正也後路二車二車行在後也又少儀曰臣致襚于君則曰致衣廢于賈人敵者曰襚言廢衣不必其以斂也賈人知物善惡也親者兄弟不以襚進不執將命左傳文公曰秦人來歸僖公成風之襚禮也秦慕諸夏欲通敬于魯國有翟泉之盟故贈僖公并及成風非與魯不同盟無相赴弔之制故不譏其緩而以接好為禮諸侯相弔賀也雖不當事苟有禮焉書之可也以無忘舊好送死不及尸故曰不當事書者書之于䇿垂示子孫使無忘舊日之好又襄公曰魯公朝于楚康王卒楚人使公親襚襚諸侯有遣使􅈖襚禮今楚欲依遣使之禮矣公患之穆叔曰祓殯而襚則布幣也先使巫祓除殯之凶邪而行襚禮與朝而布幣無異乃使巫以桃茢先祓殯茢黍禳楚人弗禁既而悔之又襄公曰鄭伯有死于羊肆羊肆市列子産襚之枕之股而哭之斂而殯諸伯有之臣在市側者既而葬諸斗城斗城鄭地名春秋説題辭曰衣被曰襚襚之言遺也榖梁傳隱公曰衣衾曰襚説文曰襚衣死人也太平御覽卷五百五十
