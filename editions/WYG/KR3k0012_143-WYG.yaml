body:
  text: 太平御覽巻一百四十三宋李昉等撰皇親部九齊蕭道成母陳后蕭道成劉后蕭昭業母王后蕭昭業何妃梁蕭衍母張后蕭衍郄后丁貴嬪阮修容蕭經王后蕭繹徐妃陳陳霸先章后陳蒨沈后陳頊桞后陳叔寳沈后張貴妃北齊高歡婁后尒朱太妃高澄元后高洋李后高演元后高湛胡后高緯斛律后齊蕭道成母陳后蕭子顯齊書曰宣孝陳皇后諱道止臨淮東陽人后生太祖太祖年二嵗乳媪乏乳夢人以兩甌酥粥與之覺而乳大出異而悦之宣帝從任在外后嘗留家治事教子孫有相者謂后曰夫人有貴子而不見之后歎曰我三兒誰當應之呼太祖小字曰正應是汝太祖雖從宦而家業本貧為建康令時高宗等冬月猶無縑纊而奉膳甚厚后每撤去兼肉曰我扵此過足矣殂扵縣舍年七十三建元元年追尊孝皇后蕭道成劉后蕭子顯齊書曰高昭劉皇后諱智容廣陵人也父夀之員外郎后母桓氏夢吞玉勝生后時有紫光滿室后寢卧家人常見上有雲氣焉年十七適太祖嚴整有禮法家庭肅然宋泰豫元年殂葬宣帝墓側今泰安陵也門生王清與墓工始下鍤有白兎跳起尋之不得及墳成兎還棲其上建元元年尊諡昭皇后蕭昭業母王后蕭子顯齊書曰文安王皇后諱寳明琅琊臨沂人建元元年為南郡王妃四年為皇太子妃無寵太子為宫人製新麗衣裳及首飾而后牀帷陳設故舊釵鑷十餘枝永明十一年為皇太妃鬰林王即位尊為皇太后稱宣徳宫蕭昭業何妃蕭子顯齊書曰鬰林王何妃諱婧英廬江灊人撫軍將軍戢之女后將拜鏡在牀無故墮地其冬與太后同日謁太廟后禀性淫亂為妃時與人姦通左右楊珉之與寢處如伉儷又與帝相愛䙝故帝恣之迎后親戚入宫賞賜人數十萬以世祖耀靈殿處后家屬帝被廢后貶為王妃梁蕭衍母張后梁書曰太祖獻皇后張氏諱尚柔范陽方成人也祖次恵宋濮陽太守后母蕭氏即文帝從姑宋元嘉中嬪扵太祖生長沙宣武王懿永陽昭王敷次生髙祖初后嘗扵室内忽見庭前菖蒲生花光彩照灼非世中所有驚視謂侍者曰汝見不對曰不見后曰嘗聞見者當富貴因遂取吞之是月産髙祖將産之夜后見庭内若有衣冠陪列焉次生衡陽宣王暢義興昭公主令嬺宋泰始七年殂扵秣陵縣同夏里合葬武進縣東城里山天監元年五月甲辰追上尊號為皇后諡曰獻蕭衍郄后髙祖徳皇后郄氏諱徽髙平金鄉人也祖紹宋國子祭酒領東海王師父􅁮太子舍人早卒初后母尋陽公主方娠夢人云當生貴子及生后有赤光照扵室内器物盡明家人皆怪之巫言此女光髙將有所妨乃扵水濱祓除之后㓜而明慧善𨽻書讀史傳女工之事無不嫻習宋後廢帝將納為后齊初安陸王緬又欲結婚郄氏並辭以女疾乃止建元末髙祖始聘焉生永興公主玉姚永世公主玉婉永迎公主玉環建武五年髙祖為雍州刺史先之鎮後乃迎后至州未幾殂扵㐮陽官舍時年三十二明年歸葬南徐州武進縣二年齊朝進髙祖位相國封梁公詔贈后為梁公妃髙宗踐祚追崇為皇后丁貴嬪梁書曰髙祖丁貴嬪諱令光譙國人也世居襄陽貴嬪生扵樊城初産有神光之異紫烟滿室故以為名相者云此女當大貴髙祖臨州丁氏因人以聞嬪時年十四髙祖納焉初貴嬪生而有赤痣在左臂治之不滅至是無何忽失所在事徳皇后小心禮敬嘗扵供養經案之側髣髴若見神人心獨異之髙祖義師起昭明太子始誕育貴嬪與太子留在州城京邑平乃還京都天監元年五月有司奏為貴人未拜其年八月又為貴嬪位在三夫人上歸扵顯陽殿阮修容髙祖阮修容諱令嬴本姓石㑹稽餘姚人也齊始安王遥光納焉遥光敗後入東昏宫建康城平髙祖納為采女天監六年八月生世祖尋拜為修容常随世祖出藩大同六年六月薨扵江州内寢時年六十七歸葬江寧縣通望山諡曰宣世祖即位追崇為文宣太后蕭經王后梁書曰太宗簡皇后王氏諱靈賓琅琊臨沂人也祖儉太尉南昌文憲公后㓜而柔明淑徳叔父暕見之曰吾家女師也天監十一年拜晉安王妃生哀太子大器南郡王大連長山公主妙䂮大通三年十月拜皇太子妃太清三年三月薨扵永福省時年四十五其年太宗即位追崇為皇后諡曰簡太寳元年九月葬莊陵蕭繹徐妃梁書曰元帝徐妃諱昭佩東海郯人也祖孝嗣齊太尉枝江文忠公父緄侍中信武將軍妃以天監十六年十二月拜湘東王妃生世子方等益昌公主含貞妃無容質不見禮帝三二年一入房妃以帝𦕈一目每知帝將至必為半面粧以俟帝見則大怒而出妃性嗜酒多洪醉帝還房必吐衣既而貞恵世子方諸母王氏寵愛未幾而終元帝歸咎扵妃及方等死愈見疾太清三年遂逼令自殺妃知不免乃投井死帝以屍還徐氏謂之出妻葬江陵瓦官寺陳霸先章后陳書曰髙祖宣皇后章氏諱要兒吴興烏程人也本姓鈕父景明為章氏所養因改姓焉景明梁代官至散騎侍郎后母蘇氏嘗遇道士以小龜遺已光彩五色曰三年有徴及期后生而紫光照室因失龜所在后少而聰慧美容儀手爪長五寸色紅白每有朞功之服則一爪先折善書計能誦詩及楚辭髙祖自廣州南征交趾命后與衡陽王昌随世祖由海道歸於長城侯景之亂髙祖下至豫章后為侯景所囚景平髙祖為長城縣公后拜夫人及髙祖踐祚永定元年立為皇后髙祖崩后與中書舍人蔡景厯定計秘不發哀召世祖入纂世祖即位尊后為皇太后令黜廢帝為臨海王命髙祖嗣位大建元年册尊后為皇太后二年三月甲申崩扵紫極殿時年六十五陳蒨沈后陳書曰世祖沈皇后諱妙容吴興武康人也父法深梁安州録事后年十餘嵗以梁大同中歸扵世祖髙祖之討侯景世祖時在吴興景遣使収世祖及侯景平乃獲免髙祖踐祚永定元年后為臨川妃世祖即位立為皇后陳頊桞后陳書曰髙祖栁皇后諱敬言河東觧縣人也曾祖世隆侯景之亂與弟昐往江陵依梁元帝帝以長城公主故恩遇甚厚及髙祖赴江陵元帝以后配焉承聖二年后生後主於江陵明年江陵陷髙祖遷於關右后與後主留㐮城天嘉二年與後主還朝后為安城王妃髙祖即位立為皇后后美姿容身長七尺二寸手垂過膝初髙祖居鄉里先娶吴興錢氏女及即位拜為貴妃甚有寵幸后傾心下之每尚方供奉之物其上者皆推扵貴妃而已御其次焉髙祖崩始興王叔陵為亂後主頼后與吴媪救而獲免後主即位尊后為皇太后宫曰𢎞範當此之時新失淮南之地隋師臨江又國遭大喪後主病瘡不能聽政其誅叔陵供太行䘮事邉境防守及百司衆務雖假以後主之命實皆决之扵后後主瘡愈乃歸政焉陳亡入長安隋大業十一年薨扵東都時年八十三𦵏於洛陽之邙山陳叔寳沈后陳書曰後主沈皇后諱婺華儀同三司憲侯君理女也母髙祖女㑹穆公主主早亡時后尚㓜而毁瘠過甚服畢每至嵗時朔望恒獨坐涕泣哀慟左右内外咸敬異焉大建三年納為皇太子妃後主即位立為皇后后生性端静寡嗜慾聰敏強記渉獵經史工書翰初後主在東宫而后父君理卒后居憂處别殿哀毁逾禮後主遇既薄而張妃寵傾後宫後宫之政並歸之后澹然未嘗有所忌怨而居處儉約衣服無錦繡之飾左右近侍纔百許人唯尋閲圖史佛經為事陳亡與後主俱入長安及後主薨后自製哀辭文甚酸切隋煬帝每巡幸恒令從駕及煬帝為宇文化及所害后自廣陵過江還鄉里不知所終張貴妃陳書曰後主張貴妃名麗華兵家女也家貧父兄以織蓆為業後主為太子選入宫是時龔貴嬪為良娣貴妃年十嵗後主見而悦焉因得幸遂有娠生太子深後主即位拜為貴妃妃性聰慧甚被寵遇後主每引見貴妃與賓客逰宴貴妃薦諸宫女預焉後宫等咸德之競言貴妃之善由是愛傾後宫又好厭魅之術假鬼道以惑後主置淫祠扵宫中聚諸妖巫使之鼓舞因叅訪外人間有一言一事妃必知之以白後主由此益重妃内外宗族多被引用及隋軍䧟䑓城妃與後主俱入井隋軍出之晉王廣命斬妃扵青溪中橋北齊髙歡婁后北齊書曰武明皇后婁氏諱昭君贈司徒内干之女也少明悟強族多聘之並不肯行及見神武扵城上執役驚曰此真吾夫也乃使婢通意又數致財使以聘己父母不得已而許焉神武既有澄清之志傾産以結英豪宻謀秘䇿后恒叅預及拜渤海王妃閫闈之事悉决焉后髙明嚴斷雅遵儉約往來外舍從不過十人性寛厚不妬忌神武姬侍咸加㤙待神武嘗將西討出師后夜㝈生一男一女左右以危急請追告神武后弗聽曰王出統大兵何得以我故輕離軍幕死生命也來復何為神武聞之嗟嘆良久沙苑敗後侯景言請精騎二萬必能取之神武悦以告扵后后曰若如其言豈有還理得獺失景亦有何利乃止文㐮嗣位進為太妃文宣將受魏禪后固執不許帝所以中止天保初尊為皇太后宫曰宣訓濟南王即位尊為太皇太后尚書令楊愔等受遺詔輔政踈忌諸王太后宻與孝昭及諸大將定䇿誅之令廢立孝昭即位復為皇太后孝昭帝崩太后又下詔立武成帝大寧二年春太后寢疾衣忽自舉用巫媪言改姓氏四月辛丑崩扵北宫年六十二合葬義平陵尒朱太妃北齊書曰彭城太妃尒朱榮之女魏孝荘后也神武納為别室敬重踰扵婁妃見必束帶自稱下官神武迎蠕蠕公主還尒朱迎扵木井北與蠕蠕公主前後别行不相見公主引角弓仰射翔鴟應弦而落妃亦引弓仰射飛鳥亦一發而中神武喜曰此二婦並堪擊賊後為尼神武為起佛寺天保初為太妃及文宣狂酒將無禮扵太妃太妃不從遂遇禍髙澄元后北齊書曰文㐮敬皇后元氏魏孝静帝之妹也孝武帝時封馮翊公主而歸扵文㐮容德兼美曲盡和敬初生河間王孝琬時文㐮為世子三日而孝静幸世子第贈錦綵及布帛萬疋世子辭求通受諸貴禮遺扵是十屋皆滿次生兩公主文宣受禪尊為文㐮皇后高洋李后北齊書曰文宣皇后李氏諱祖娥趙郡李希宗女也容德甚美初為太原公夫人及帝建中宫高隆之高德正言漢婦人不可為天下母宜更擇美配楊愔固請依漢魏故事不改元妃而德正猶固請廢后而立段昭儀欲以結勲貴之援帝竟不從而立后焉帝好捶撻嬪御乃至有殺戮者唯后獨蒙禮敬天保十年改為可賀敦后孝昭即位䧏居昭信宫號昭信皇后高演元后北齊書曰孝昭皇后元氏開府元蠻女也初為常山王妃天保末賜姓歩六孤孝昭即位立為皇后帝崩梓宫之鄴始度汾橋武成聞后有竒藥追索之不得使閹人就車頓辱䧏居順成宫武成既殺樂陵王元被閟隔不得與家相知宫闈内忽有飛語帝令檢推得后父兄書信元蠻由是坐免官后以齊亡入周氏宫中隋文帝作相放還山東高湛胡后北齊書曰武成皇后胡氏安定胡延之女其母范陽盧道約女初懐孕有胡僧詣門曰此宅瓠蘆中有月既而生后天保初選為長廣王妃産後主日鴞鳴扵産帳上武成崩尊為皇太后高緯斛律后北齊書曰後主皇后斛律氏左丞相光之女也初為皇太子妃後主受禅立為皇后武平三年正月生女帝欲悦光詐稱生男為之大赦光誅后廢在别宫後令為尼太平御覽巻一百四十三
