  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_501-1a, image: WYG0897/WYG0897-0514c.png}
body:
  text: 太平御覽卷五百一宋李昉等撰逸民部一叙逸民一易曰上九不事王侯髙尚其事最處事上而不累於位不事王侯髙尚其事也象曰不事王侯志可則也蠱卦又曰六五賁于丘園束帛戔戔施飾丘園盛莫大焉故賁于束帛丘園乃落賁于丘園帛乃戔戔又曰天下有山遯君子以逺小人不惡而嚴九四好遯君子吉小人否馬融曰好遯君子吉言雖身在外乃心在王室此之謂也小人則不然身在外心必怨也九五嘉遯貞吉象曰嘉遯貞吉以正志也詩曰考槃刺莊公也不能修先公之業使賢者退而窮處也考槃在澗碩人之寛獨寐寤言永矢弗諼考成也槃樂也箋云有窮處成樂在此澗者又曰白駒大夫刺宣王也刺其不能留賢也皎皎白駒食我塲苗縶之維之以永今朝宣王之末不能用賢賢者乘白駒而去者乗白駒而來食我塲中苖我縶之維之也禮曰季春之月聘名士禮賢者又曰儒有上不臣天子下不事諸侯慎靜而尚寛强毅以與人博學以知服近文章砥礪亷隅雖分國如錙銖不臣不仕其規為有如此者論語曰子曰賢者避世其次避地其次避色其次避言子曰作者七人矣七人謂長沮桀溺丈人晨門荷蕢儀封人楚狂接輿又曰子路曰不仕無義長㓜之節不可廢也君臣之義如之何其廢之欲潔其身而亂大倫君子之仕也行其義也道之不行已知之矣逸民伯夷叔齊虞仲夷逸朱張栁下惠少連子曰不降其志不辱其身伯夷叔齊與謂栁下恵少連降志辱身矣言中倫行中慮其斯而已矣謂虞仲夷逸𨼆居放言身中清廢中權我則異於是無可無不可漢書曰薛方字子容王莽以安車迎方因使者辭謝曰堯舜在上下有巢許今明主方崇唐虞之徳亦猶小臣欲便箕山之節也使者以聞莽説方言不强致也後漢書曰或問汝南范滂曰郭林宗何如人滂曰絶不違親貞不絶俗天子不得臣諸侯不得友吾不知其他又曰隗囂素聞杜林志節深相敬待以為治書後因疾告去囂復欲令强起遂稱疾篤囂意雖相望且欲復容之乃出令曰杜伯山伯山林之字也天子所不能臣諸侯所不能友盖伯夷叔齊不食周粟今且從師友之位林雖拘於囂終不屈節又曰趙岐初名嘉年四十有重疾卧褥七年自慮奄忽乃遺令勅兄子曰大丈夫遁無箕山之操仕無伊吕之勲天不我與復何言哉可立一圓石於吾墓前刻之曰漢有遺人姓趙名嘉有志無時命也奈何又曰樊􅁮字子融有俊才好黄老不肯為吏又曰逄萌字子康北海都昌人也家貧給事縣為亭長尉時行過亭萌候迎拜謁既而擲楯歎曰大丈夫安能為人役哉遂去之長安學通春秋時王莽殺其子宇萌謂友人曰三綱絶矣不去禍將及人即解冠挂東都城門歸將家屬浮海客於遼東萌素明隂陽知莽將敗有頃乃首戴瓦盆哭於市曰新乎新乎因遂潜藏及光武即位乃之瑯琊勞山養志修道人皆化其徳北海太守素聞其髙遣使奉謁致禮萌不答後詔書徴萌託以老耄迷路東西語使者云朝廷所以徴我者以其有益於政尚不知方面所在安能濟時乎即便駕歸連徴不起以夀終又曰井丹字大春扶風郿人也少受業太學通五經善談論故京師為之語曰五經紛綸井大春性清髙未嘗修刺候人建武末沛王輔等五王居北宫皆好賔客更遣請丹不能致信陽侯隂就光烈皇后弟也以外戚貴盛乃詭説五王求錢千萬約能致丹而别使人要刼之丹不得已既至就故為設麥飯葱菜之食丹推去之曰以君侯能供甘㫖故來相過何其薄乎更置盛饌乃食及就左右進輦丹笑曰吾聞桀駕人車豈此耶衆皆失色就不得已而令去輦自是隠閉不闗人事以夀終又曰髙鳳字文通南陽葉人也少為書生家以農畆為業而博學精誦讀晝夜不息妻常曝麥於庭令鳳䕶雞時天暴雨鳳持竿誦經不覺潦水流麥妻還怪問鳳方悟之其後遂為名儒鄰里有争財者持其兵而鬭鳳徃解之不已乃脫巾叩頭固請曰仁義遜讓奈何棄之於是争者懐感投兵謝罪鳳年老執志不倦名聲著聞太守連召請恐不得免自言本巫家不應為吏又詐與寡嫂訟遂不仕將作大匠任隗舉鳳直言公車到託病逃歸又曰臺佟音同字孝威魏郡鄴人也隠於武安山鑿穴為居採藥自給建初中州辟不就刺史行部乃使從事致謁佟載病往謝刺史曰孝威居身如是甚苦如何佟曰佟幸得保終性命存神養和如明使君奉宣詔書夕􅅥庻事反不苦耶遂去隠逸不見又曰韓康字伯休京兆霸陵人常採藥名山賣於長安市口不二價三十餘年時有女子從康買藥守價不移女子怒曰公是韓伯休耶乃不二價乎康歎曰我本欲辟名今女子皆知有我遂遁入霸陵山中博士公車連徴不至桓帝乃備𤣥纁之禮以安車聘之使者賷詔造康不得已乃許諾辭安車自乗柴車冒晨先使者發至亭亭長以韓徵君當過方發人牛修道橋及見康柴車幅巾以為田叟也使奪其牛康即釋駕與之有頃使者至奪牛翁乃徴君也使者欲奏殺亭長康曰此自老子與之亭長何罪康因中道逃遁以夀終又曰矯慎字仲彦扶風茂陵人也少好黄老隠遁山谷因穴為屋仰慕松喬導引之術汝南吳蒼甚重之遺書以觀其志慎不答年七十餘竟不肯娶後忽歸家自言死日及期果卒又曰馬瑶矯慎同郡人也隱於汧山以􅇠罝為事所居俗化百姓恱之號為馬牧先生又曰陳留老父不知何許人也桓帝代黨錮事起守外黄令陳留張升去官歸鄉里道逢友人共班草而言升曰吾聞趙殺鳴犢仲尼臨河而返覆巢竭淵龍鳳逝而不至今宦豎日亂陷􅊣忠良賢人君子其去朝乎夫徳之不建人之無援將性命之不免奈何因相抱而泣老父趨而過之植杖太息而言曰吁二丈夫何泣之悲也龍不隱鱗鳳不藏羽􅃠羅髙懸去將安所雖泣何及乎二人欲與之語不顧而去莫知所終又曰龎公者南郡襄陽人也居峴山之南未嘗入城府夫妻相敬如賔荆州劉表數延請不能屈乃就候之謂曰夫保全一身孰若保全天下乎公笑曰鴻鵠巢於髙林之上暮而得所棲黿鼉穴於深淵之下夕而得所宿夫趨舍行止亦人之巢穴也且各得其栖宿而已天下非所保也因釋耕於壠上而妻子耘於前表指而問曰先生苦居􅅵畝而不肯官禄後代何以遺子孫乎公曰世人皆遺之以危今獨遺之以安雖所遺不同未為無所遺也表歎息而去後攜其妻子而登鹿門山因採藥不返又曰向長字子平髙士傳向字作尚河内朝歌人也隠居不仕性尚中和好誦易老貧無資食好事者更饋焉受之取足而反其餘王莽大司空王邑辟之連年乃至欲薦於莽固辭乃止遂求退讀易至於損益卦喟然嘆曰吾已知富不如貧貴不如賤未知死何如生耳建武中男女嫁娶既畢勅斷家事勿相闗當如我死也於是遂肆意與同好北海禽慶俱遊五嶽名山不知所在又曰王霸字孺仲太原人少有清節及王莽簒位棄冠帶絶交游建武中徴到尚書拜稱名不稱臣有司問其故霸曰天子有所不臣諸侯有所不友司徒侯霸讓位於霸閻陽毁之遂止以病歸隠居守志連徴不至又曰閔叔仲代稱節士雖周黨之潔清自以弗及也黨見其食菽飲水遺之以生蒜受而不食建武中應司徒侯霸之辟既而投劾而去霸徴博士不至客居安邑老病家貧不能得肉日買猪肝一斤屠者或不肯與安邑令聞之勅市使常給焉叔仲怪而問之知者乃歎曰閔叔仲豈以口腹累安邑乎遂去客沛以夀卒又曰野王二老不知何許人也初世祖貳於更始會闗中擾亂遣鄧禹西征送之道既反因於野王獵路見二老即禽世祖問曰禽何向舉手西指言此中多虎臣每即禽虎亦即臣請大王勿徃也世祖曰苟有其備虎亦何患二老曰何大王之謬耶昔湯即桀於鳴條而大都於亳武王即紂於牧野而大城於郟鄏彼二王者備非不深也是以即人者人亦即之雖有其備庸可忽乎世祖悟其㫖謂左右曰此隱者也將用之辭去莫知所在又曰嚴光字子陵會稽餘姚人少有髙名與世祖同遊學及世祖即位光乃變姓𨼆身不見帝思其賢乃令以物色訪之齊國上言有一男子披羊裘釣澤中乃備安車𤣥纁聘之而後至車駕即幸其館至光卧所撫光腹曰咄咄子陵何不出相助為治耶光曰昔唐虞著徳巢父洗耳士故有志何至相逼後引光入共偃卧以足加帝腹上明日太史奏客星犯御座帝笑曰朕故人嚴子陵耳除諫議不屈耕富春山後名其釣處為嚴子陵灘范曄後漢書逸民𫝊序曰易稱遯之時義大矣哉是以堯稱則天不屈潁陽之髙武盡美矣終全孤竹之潔自兹以降風流彌繁長徃之軌未殊而感致之數匪一或隠居以髙其志或曲避以全其道或静己以鎮其操或去危以圖其安或垢俗以動其槩或疵物以潔其清然觀其甘心􅅵畝之中憔悴江海之上豈必親魚鳥樂林草哉亦云性所至而已京房易飛候日曰何以知賢人隱親視四方常有火雲五色具而不雨其下賢人隱莊子曰古之所謂隠士者非伏其身而弗見也非閉其言而不出也非藏其智而不發也時命大謬也又曰刻意尚行離世異俗此山谷之士誹世之人也就藪澤處閒曠釣魚閒處無為而已矣此江海之士避世之人閒暇者之所好也皇甫士安髙士𫝊序曰孔子稱舉逸民天下之民歸心焉是以鴻崖先生創髙於上皇之世許由善卷不降於唐虞之朝自三代秦漢達乎魏興受命中賢之主未嘗不聘巖穴之隠追遯世之民是以易著束帛之義禮有𤣥纁之制詩人發白駒之歌春秋顯子臧之節明堂月令以季春之月聘名士禮賢者然則髙尚之士王政所先太平御覽卷五百一
