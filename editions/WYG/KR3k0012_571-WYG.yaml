body:
  text: 太平御覽卷五百七十一宋李昉等撰樂部九歌二家語曰孔子厄於匡謂子路曰汝歌予和汝子路彈琴而歌孔子和之曲終匡人解甲又曰孔子相魯齊人患其將霸欲敗其政乃選好女子八十人衣以文錦而舞容璣及文馬四十季桓子受女樂君臣荒淫三日不聴國政郊又不致膰祭肉名也爼於大夫孔子遂行作歌曰彼婦之口可以出走彼婦之請可以圮政優哉游哉聊以卒歳吕氏春秋曰管子得於魯魯束縳而檻之使役人載而送之齊皆謳歌而引管子恐魯之止而殺巳也欲速至齊因謂役人曰我為汝歌汝為我和其和適宜走役人不倦而取道甚遠管子可謂能因矣役人得其所欲已亦得其所欲以此術也足用萬乗之國其霸猶小也又曰周申喜亡其母聞乞人歌於門下而悲之動於顔色自見而問焉何故而乞與之語乃是其母也故父母之於子也子之於父母也一體而分得同血氣而異息若莽草之有華實樹木之有根心離處而通憂思相感也又曰禹年三十未娶有行塗山恐時日暮吾娶必有應也乃有白狐九尾而造禹禹曰白者吾服也九尾其政也塗山歌曰綏綏白狐九尾龎龎成家成室我都彼昌禹因娶塗山女呉越春秋曰採葛越之婦人傷越王用心乃作若何之歌辭曰嘗膽不苦味若飴我今採葛以作絲又曰越王入呉與諸大夫别於浙江遂登船徑去中流反顧越王夫人乃扳船而哭鳶啄江淮之蝦飛去者復來哭訖即承之以歌其辭曰兩飛鳥兮鳶烏何居食兮江湖水中蟲兮曰蝦去復反兮嗚呼始事君兮去家終我命兮君都中年過兮何辜離我國兮入呉妻為婢兮夫為奴歳迢迢兮難極寃痛悲兮心惻嗚呼哀兮不食越絶書曰呉伍子胥走至呉江上見漁者曰來渡我漁者知其非恒人也欲往渡之恐衆人知之即歌而往過之曰白日炤炤侵已施與子期乎蘆之漪子胥從復歌曰心中悲日巳施子可渡何不出為船到即載入船而伏戰國策曰齊人馮驩屬孟嘗君願寄食門下孟嘗君笑而受之有頃倚柱彈其劍鋏歌曰長鋏歸來食無魚左右以告孟嘗君曰食之比門下之客復彈其劍鋏歌曰長鋏歸來出無車又彈其劍鋏歌曰長鋏歸來兮無以為家魏氏春秋曰阮籍少時遊蘇門山有隱者籍對之長嘯蘇門生莞爾而笑籍既降蘇門生亦嘯若鸞鳳之音乃假蘇門生之論以寄所懷歌曰日沒不周西月出丹淵中陽精蔽不見隂光代為雄富貴俯仰間貧賤何必終又歌曰天地解兮六合開星辰霣兮日月頽我騰而上将何依帝王世紀曰舜恭已無為歌南風之詩詩曰南風之時兮可以阜吾民之財兮南風之薰兮可以解吾民之愠兮尚書大傳曰維五紀奏鍾石論人聲始欲改堯樂及乃鳥獸咸變於前百獸率舞之屬秋養耆老而春食孤子乃勃然韶樂興於大麓之野報事還歸二年熒然乃作大唐之歌熒猶灼也大唐之歌美堯之禪也歌者三年昭然乃知乎王世明有不世之義招為賔客而雍為主人招雍皆樂章名也賔人奏招主人入奏雍也始奏肆夏納以考成始謂客入時也納謂薦獻時也肆夏考成皆樂章名也舜為賔客而禹為主人舜既使禹攝天子之事於祭祀避之居賔客之位獻之侑酒則為亞嵗也矣樂正道贊曰尚考大室之義唐為虞賔尚考猶言右考謂往時也大室明堂之中央室義當為儀儀禮也謂祭大室禮先為舜賔之也至今衍於四海衍猶溢也言舜之禪天下至於今其徳儀溢滿四海也成禹之變垂於萬世之後帝乃唱之曰卿雲爛兮和氣之明者也糺縵縵兮教化廣逺日月光華旦復旦兮言明明相代八伯咸進稽首曰明明上天爛然星辰日月光華𢎞予一人帝乃再歌曰日月有常星辰有行四時從經萬姓允誠猗予論樂配天之靈遷於賢聖莫不咸聴鼚乎鼓之軒乎舞之精華已竭褰裳去之於時八風翔湧卿雲藂藂蟠龍僨信於其藏蛟魚躍踊於其淵龜魚出其穴遷虞而事夏也孔叢子曰叔孫氏之車鉏商樵於野而獲麟焉衆莫之識以為不祥棄之五父之衢冉有告曰麋而肉角豈天之妖乎夫子曰今何在吾将觀焉遂泣曰予之於人猶麟仁獸出而死吾道窮矣歌曰唐虞世兮麟鳳遊今非其時來何求麟兮麟兮我心憂又曰哀公使以幣如衛迎夫子而卒不能官故夫子作丘陵之歌曰登彼丘陵山施其阪仁道在邇求之若逺迷而不復自嬰屯蹇又曰楚王使奉金帛聘夫子宰予冉有曰夫子之道於是行矣遂請見問夫子曰太公勤身苦志七十而遇文王孰與許由之賢夫子曰許由獨善其身者也太公兼善天下者也然今世無文王之君雖有太公孰識之哉乃歌曰大道隱兮禮有基賢人竄兮将待時天下如一兮欲何之説苑曰曽子耘𤓰而誤斬其根曽晳怒援大杖擊之曽子仆地有頃乃蘇蹶然而起進曰曩者參得罪於大人大人得無疾乎退屏鼔琴而歌欲令曽晳聽其歌聲知其平也荘子曰孔子窮於陳蔡之間七日不火食藜羮不糝顔色甚憊歌於室不輟又曰子桑户孟子反琴張三人相與友有間而子桑户死相和而歌子貢曰臨尸而歌禮乎二子相視而笑曰是惡知禮意又曰荘子妻死惠子弔之箕踞鼓盆而歌惠子曰不哭亦足矣歌不亦甚乎荘子曰人且偃然寝乎巨室而我哭之是不通乎命故止之又曰曽子居衛捉衿而肘見納履而踵决曵履而歌商頌聲滿天地若出金石夏侯淵辨樂論曰昔伏羲氏因時興利教民田漁天下歸之時則有網罟之歌神農繼之教民食榖時則有豐年之詠黄帝備物始垂衣裳則有龍衮之頌古今樂録曰周文王時鳳凰銜書而至文王乃作歌又曰堯郊天地祭神如在座上有響誨堯曰水方至為害命子救之堯乃作歌又曰帝堯之世民樂無事擊壤之歡慶雲之瑞因以作歌又曰白日落西山歌者沈攸之發荆州未敗之前思歸京師所作歌也又曰莫愁樂者亦因石城樂而有此歌石城西有女子名莫愁善歌謠且石城樂和中有忘愁聲因作此歌又曰秦始皇祠水神有黒頭公從河中出呼始皇曰來受天寶乃與羣臣作歌又曰昔炎帝時有娀之女覆以玉筐少選視之燕遺二卵五色北飛逐之不及二女作歌始作北音夏孔甲田於東陽迷入民室主人方乳曰后來大吉或曰不勝之子必有殃孔甲取其子歸曰為余子誰敢殃之及成人幕動折橑斧破斬足孔甲為作破斧之歌始為東音周昭王征荆辛余靡長且多力為王右渉漢梁敗王及祭公殞於漢中辛余靡振王北濟又反振祭公周公封之于西翟實為長公殷慗甲從宅西河追思故處始作西音長公繼是音以處西山葢四方之歌也又曰許由者古之貞固之士也堯時為布衣徒歩不與逺方交通衣食財得自足夏則巢居冬則穴處無杯杅每以手捧水而飲之人有見其飲無杯以瓢遺之許由受以操飲畢輒掛於樹枝風吹樹瓢揺動厯厯有聲許由尚以為繁擾取而棄之以清節約聞於堯堯大其志乃遣使以符璽禪為天子於是許由喟然嘆曰匹夫結志固如盤石采山飲河所以養性非以求禄位也放髪以優游所以安已不懼非以貪天下也使者有愧還以状報堯堯知由不可動亦已矣於是許由以使者言為不善乃臨河洗耳樊堅見由方且洗耳問之耳有何垢乎由曰無垢聞惡語耳堅曰何等語者由曰堯聘吾為天子堅曰尊位何為惡之由曰吾志在青雲何乃劣劣當作九州伍長乎於是樊堅方且飲牛聞其言而去耻飲於下流於是許由名布四海堯既殂落乃作箕山之歌曰登彼箕山兮瞻望天下山川麗﨑萬物還普日月運照靡不記睹游放其間何所却慮嘆彼唐堯獨自愁苦勞心九州憂勤后土謂余欽明傳禪易祖我樂如何葢不盻顧河水流兮縁髙山甘𤓰施兮棄綿蠻髙林肅兮相錯連居此之處傲堯君其後許由死遂𦵏于箕山又曰周太伯者周太王古公之長子也古公有子三人長者太伯次者虞仲少者季厯季厯之子昌昌即文王也古公寝疾将死國當有傳心欲以傳季厯乃呼三子謂曰我不起此病繼體興者其在昌乎太伯見太王傳季厯於是太伯與虞仲俱去被髮文身以變形託為王採藥後聞古公卒乃還奔䘮哭於門外示夷狄之人不得入王庭於是季厯謂太伯長子也伯當立何不就太伯曰吾生不供養死不飯含哭不臨棺不孝之子焉得繼父乎㫁髪文身刑餘之人也戎狄之民也三者除焉何可為君矣季厯垂涕而留之終不肯止遂委而去到江海之涯吟咏優游仰覽俯觀求膏腴之處適于呉率以仁義化為道徳荆越之人移風易俗咸集韶夏取象中國乃太伯之化也是後季厯作哀慕之歌章曰先王既徂長賢異都哀喪腹心未寫中懷追念伯仲季我何如栝桐萋萋生於道周宫館徘徊臺閣既除何為逺去使此空虛支骨離别垂恩南隅瞻望荆越涕泗交流伯兮仲兮逝彼來遊自非二人誰訴此憂又曰拘羑里者謂紂拘文王於羑里也文王未得政時循修道徳百民親附文王有子其二子皆聖於是時崇侯虎與文王列為諸侯徳不及文王常疾之乃譖文王於紂曰西伯昌聖人也長子發仲子旦皆聖三聖合謀将不利於君君宜慮之紂曰冠雖敝宜加於上履雖新宜處於下文王雖聖安可尅我崇侯􅉲文王至十紂用其言乃徙文王於羑里欲殺之於是文王四臣太顛宏夭散宜生南宫适之屬往見文王文王為矉反目者紂之好色也拊桴其腹者言欲得竒寶也蹀􅉜其足者使疾迅也於是乃周流海内經厯風土得美女二人水中大寶白馬朱鬛以獻於紂陳其中庭紂見之仰天而嘆曰嘻哉此誰寶散宜生趨而進曰是西伯之寶以贖刑罪紂曰於寡人何其厚也立出西伯紂謂宜生􅉲岐侯者長鼻決耳也宜生還以状告文王乃知崇侯虎譖之文王在羑里時演八卦以為六十四作鬱尼之辭據於石困於蒺䔧乃憂憤作歌章曰殷道溷溷浸濁煩兮丹紫相合不分别兮迷亂聲色信諛言兮閻閻之虎使我蹇兮幽閑牢獄誰其言兮無辜桎梏誰所宣兮遘我四人皆憂勤兮得此珍玩且解大患兮倉皇迄命遺後昆兮作此象變兆在昌兮欽承祖命天下不喪兮遂臨下土在聖明兮討暴除亂誅逆王兮又曰荘周者齊人也明篤學術多所博逹進見方來却覩未發是時齊涽王好為兵事習用干戈荘周儒士不合於時自以不用行欲避亂自隱於山岳後有逹荘周於涽王遣使齎金百鎰以聘相位周不就使者曰金至寶相尊官何辭之為周曰君不見夫郊祀之牛衣之以朱綵食之以禾粟非不樂也及其用時鼎鑊在前刀爼列後當此之時雖欲還就孤犢寕可得乎周所以飢不求食渇不求飲者但欲全身逺害耳於是重謝使者不得已而去後引聲歌曰天地之道近在胸臆呼噏精神以養九徳渇不求飲飢不索食避世修道志潔如玉卿相之位難可宜當巖巖之石幽而清凉枕塊寝處樂在未央寒凉回固可以久長楊泉物理曰始皇起驪山之冡使蒙恬築長城死者相屬民歌曰生男慎勿舉生女哺用晡不見長城下尸屍相支柱世説曰晉武帝問孫皓聞呉人好作爾汝歌頗能否皓正飲酒因舉觴勸帝而言曰昔與汝為鄰今為汝作臣上汝一盃酒令汝夀萬春琴操曰王昭君齊國王襄女漢元帝時獻入後宫帝以妻單于昭君心念鄉土乃作怨曠之歌曰秋禾萋萋其葉萎黄有鳥爰止集于苞桑既得升雲游倚帷房志念幽沉不得頡頏我獨伊何改往變常翩翩之鷰逺集西羌髙山峩峩河水泱泱嗚呼哀哉憂心惻傷太平御覽卷五百七十一
