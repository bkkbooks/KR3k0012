body:
  text: 太平御覽卷七百七十二宋李昉等撰車部一叙車上釋名曰古者車聲如居言所以居人也今曰車車舍也行者所處若車舎也又曰皇帝造車故號軒轅氏説文曰車輿輪總名象形也軒曲藩車也軿輜車也輕輕車也軘兵車也䡴䧟陣車也一曰一輪車輿車輿也輅軨前横木也軧大車後也輦輓車也在車前引之轟羣車聲也易曰大車以載積中不敗也又曰賁其趾舎車而徒又曰上九暌孤見豕負塗載鬼一車書曰五載一廵狩羣后四朝敷奏以言明試以功車服以庸又曰武王革車三百兩虎賁三千人與受戰于牧野作牧誓至牧地以誓衆又曰酒誥妹土嗣爾股肱純其藝黍稷奔走事厥考厥長肇牽車牛逺服賈用孝養厥父母農功既畢始牽車牛載其所有易求所無逺行賈賣用其所得異珍孝養其父母又蔡仲之命曰惟周公位冡宰正百工百工百官羣叔流言乃致辟管叔于啇囚蔡叔于郭鄰以車七乗詩曰我送舅氏曰至渭陽何以贈之路車乗黄乗黄四馬皆黄秦康公作是詩送重耳歸晉又曰何彼穠矣棠棣之華曷不肅雍王姬之車又曰公車千乗朱英緑縢又曰戎車孔愽徒御無斁又曰君子之車既庻且多又曰子有車馬弗馳弗驅又曰役車其休又曰有棧之車行彼周道又曰命彼後車謂之載之又曰我任我輦我車我牛又曰擇有車馬以居徂向鄭箋云擇民之有車馬者徃居于向又曰其車既載乃棄爾輔又曰既出我車既挾我侯又曰脩爾車馬謹爾戎兵又曰閒關車之牽兮牽音轄又曰戎車既飭又曰戎車既安如輊如軒輊陟利切車前重軒後重也禮曰乃擇元辰天子親載耒耜置之車右率公卿諸侯大夫躬耕籍田又曰乃教田獵以習五戎班馬政命僕夫七騶咸駕載旌旐授車以級整設于屏外有司搢扑北靣以誓之又曰大夫七十而致仕若不得謝則必賜之几杖行役以婦人適四方乗安車自稱曰老夫又曰夫為人子者三賜不及車馬又曰獻車馬者執䇿綏武車綏旌德車結旌又曰前有車騎則載飛鴻又曰車驅而騶至于大門君撫僕之手而顧命車右就車門閭溝渠必歩又曰君車將駕則僕執䇿立于馬前君出就車則僕并轡授綏又曰客車不入大門又曰祥車曠左又曰乗君之乗車不敢曠左左必式又曰國君不乗竒車又曰車上不廣欬不妄指又曰問士之富以車數對問庻人之富數畜以對又曰君之適長殤車三乗公之庻長殤車一乗大夫之適長殤車一乗又曰五十無車者不越疆而弔人又曰有若曰晏子一狐裘三十年遣車一乗及墓而反國君七个遣車七乗大夫五个遣車五乗晏子焉知禮又曰赴車不載櫜韔兵不戢示當報以告䘮之辭言之謂還告於國櫜甲衣韔弓衣又曰大夫殺則止佐車佐車止百姓田獵佐車驅逆之車也又曰有發則命大司徒教士以車甲乗兵專衣甲之儀有發謂有軍師之發卒又曰有圭璧金璋不鬻於市命服命車不鬻於市宗廟之器不鬻於市犧牲不鬻於市戎器不鬻於市用器不中度不鬻於市兵車不中度不鬻於市鬻賣也又曰曾子問曰古者師行必以遷廟主行乎孔子曰天子廵狩以遷廟主行載于齊車言必有尊也今也取亡廟之主以行則失之矣齊車金路也又曰曾子問曰古者師行無遷主則何主孔子曰主命問曰何謂也孔子曰天子諸侯將出必以幣帛皮圭告于祖禰遂奉以出載于齊車以行毎舎奠焉而后就舎以脯醢禮神乃敢即安所告而不以出即埋之又曰苟有車必見其軾苟有衣必見其敝又曰其為賓則公舘復私舘不復其在野則升其乗車之左轂以其綏而復私館則卿大夫之家也又曰武王克殷反商未及下車而封黄帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於把投殷之後於宋封王子比干之墓釋箕子囚使之行商容而復其位庶民弛政庶士倍禄濟河而西馬散之華山之陽而弗復乗牛散之桃林之野而弗復服車甲衅音釁而藏之府庫而弗復用又曰大夫以布為輤音倩而行至於家而說輤載以輲車入自門至於阼階下說車舉自阼階升適所殯又曰主國待客出入三積餼客於舎五牢之具陳於内米三十車禾三十車周禮春官下曰巾車掌公車之政令又考工記曰輿人為車圜者中規方者中矩立者中縣衡者中水直者如生焉繼者如附焉治材也如生如木從地生附如木之附枝也輈人為輈輈車轅也國馬之輈深四尺七寸田馬之輈深四尺駑馬之􅀈輈深三尺有三寸軫方象地盖圓象天輪輻三十象日月盖弓二十有八以象星行澤欲短轂短轂則利行山欲長轂長轂則安又曰巾車云服車五乗孤乗夏篆以五綵畫轂約也卿乗夏縵五綵畫無篆也大夫乗墨車不畫者也士乗棧車不革鞔而漆之也庻人乗役車方箱可載任器物以供役自孤以下之妻亦各得乗其夫之車也又曰王后五輅一曰重翟錫面朱總二曰厭翟勒面繢總三曰安車彫面鷖總四曰翟車貝面組總有握五曰輦車組輓有翣羽盖王之䘮車五乗一曰木車始遭䘮乗也二曰素車卒哭所乗三曰薻車既練所乗四曰駹車大祥所乗五曰漆車既禪所乗其卿大夫士被喪三年者乗堊齊衰素車大功薻車小功䮾車緦麻漆車又曰王后有安車翟車五乗木車素車薻車駹車漆車五乗孤乗夏篆卿乗夏縵大夫乗墨車士乗棧車庻人乗役車散車其用無常又考工記曰一器而工聚者車為多傳曰太叔將襲鄭夫人將啓之公聞其期曰可矣命子封帥車二百乗以伐京又曰鄭伯之車僨于濟僨傅粉叶又曰北戎侵鄭鄭伯禦之患戎師曰彼徒我車懼其侵軼我也又曰公孫閼與穎考叔争車穎考叔挾輈以走子都㧞棘以逐之子都公孫閼也又曰秋大閱簡車馬也又曰鬭舟獲其戎車與其戎右少師又曰天王使家父來求車非禮也諸侯不貢車服天子不私求財諸侯自常職貢又曰使公子彭生乗公公薨于車公魯桓公也又曰公怒公齊襄公也曰彭生敢見射之豕人立而啼公懼墜于車傷足䘮屨反誅屨於徒人費又曰南宮長萬奔陳以乗車輦其母一日而至又曰衆車入自純門及逵市又曰齊侯使公子無虧帥車三百乗甲士三千人以戍曹又曰元年革車三十乗季年乃三百乗又曰車說其輹火焚其旗不利行師敗于宗丘說音脫又曰戒爾車乗敬爾君事又曰晉車七百乗韅靷鞅靽又曰及甲車四百六十乗俘二百五十人又曰兵車百乗文馬百駟又曰趙盾為旄車之族又曰鄭人卜行成不吉卜臨于大宫且巷出車吉又曰趙旃棄車而走林屈蕩摶之又曰晉人懼二子魏錡趙旃之怒楚師也使軘車逆之又曰遂疾進師車馳卒奔又曰登諸樓車使呼宋人而告之又曰禽之而乗其車既獲其人因釋巳車而載所獲者車又曰張侯曰師之耳目在吾旗鼔進退從之此車一人殿之可以集事又曰邴夏曰射其御者君子也公曰謂之君子而射之非禮也射其左越于車下射其右斃于車中又曰綦母張喪車從韓厥也請寓乗又曰丑父使公下如華泉取飲鄭周父御佐車宛茂為右載齊侯以免又曰苟有險余必下推車子豈識之子病矣又曰楚子登巢車以望晉軍巢車車上樓櫓又曰叔山冉謂養由基曰雖君有命為國故子必射乃射再發盡殪叔山冉摶人以投中車折軾晉師乃止又曰狄虒彌建大車之輪而䝉之以甲以為櫓狄虒彌魯人也䝉覆也櫓大楯又曰己酉師于牛首鄭地初子駟與尉止有争將禦諸侯之師黜其車禦牛首師也黜减損遂弗使獻不使獻所獲又曰子西聞盗不儆而出子西公孫夏子駟子尸而追盗先臨尸而追盗盗入於北宮乃歸授甲臣妾多逃器用多喪子産聞盗子國子爲門者置守門戒羣司閉府庫完守備成列而後出兵車十七乗尸而攻盗於北宮子蟜帥國人助之殺尉止子師僕盗衆盡死又曰鄭人賂晉侯以師悝師觸師蠲皆樂師名廣車軘車淳十五乗甲兵備廣車軘車皆兵車名淳耦也凡兵車百乗他兵車及廣軘共百乗又曰魯人莒人皆請以車千乗自其鄉人又曰齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而䟽陳之斥候也疏建旄旗以陳為陳氏衆也又曰使乗車者左實右偽以斾先輿曳柴而從之以揚塵齊侯見之畏其衆也乃脫歸又曰既食之使御廣車而行廣車兵車已皆乗乗車乗車安車又曰丁亥葬諸士孫之里士孫人姓因名其里四翣不蹕下車七乗不以兵車下車送葬之車舊依上公公禮九乗又有甲兵今皆降損又曰六月鄭子展子産帥車七百乗伐陳宵突陳城又曰賦車籍馬賦車兵車也兵甲士也又曰大夫逆於境者逆迎也迎衛侯執其手而與之言道逆者自車揖之逆於門者頷之而已貞揺其頭言術驕心易生又曰齊慶封來聘其車美孟孫謂叔孫曰慶季之車不亦美乎季慶封之字叔孫曰豹聞之服美不稱必以惡終美車何為又曰獻車於季武子美澤可以鑑展莊叔見之曰車甚澤人必瘁宜其亡也又曰王聞羣公子之死也王楚靈也自投于車下曰人之愛其子也亦如余乎侍者曰甚焉小人老而無子知擠于溝壑矣擠墜也又曰治兵于郝南甲車四千乗三十萬人又曰叔向曰寡君有甲車四千乗在雖以無道行之必可畏也况其牽道其可敵也公羊傳曰夏四月公㑹紀侯于郕秋八月壬午大閱大閱者何簡車徒也大簡閱兵車使可任用而習之又曰宋公與楚子期以乗車之㑹公子目夷諫曰楚夷國也彊而無義請君以兵車之㑹往宋公曰不可吾與之約以乗車㑹自我為之自我墮之曰不可終以乗車之㑹徃楚人果伏兵車執宋公以伐宋又曰晉郤缺帥師革車八百乗以納接菑于邾婁力沛若有餘沛有餘貌又曰秋蒐于紅蒐者何簡車徒也楚衆也穀梁傳曰兵車之㑹四未嘗有大戰也愛民也以兵車㑹而不用兵伐也論語曰升車必正立執綏車中不内顧不疾言不親指大戴禮曰王升車則聞和鑾之聲是以非僻之心無自入也在衡為鑾在軾為和馬行而鸞鳴鸞鳴而和應其聲曰和則敬此御之節也上車以和鸞為節下車以珮玊為度禮斗威儀曰山車垂勾福草生宗廟中松栢為常山車者自然勾之勾者曲也不揉治而自員曲故言垂孝經援神契曰德至山陵則山出根車根車應載養萬物也家語曰孔子適衛子僑僕靈公與夫人南子同車出令宦者雍渠􅆖乗使孔子為次連逰過市孔子恥之又曰孔子曰自南宮敬叔之乗我車也而道加行又曰三尺之限空車不能登峻故天子郊乗乗車貴其質也車則有左右車而無左右則亂於車矣史記曰孝文帝出趙同􅆖乗袁盎伏車前曰臣聞天子所與共六尺輿者皆天下英豪今漢雖乏人獨奈何與刀鋸人載於是上笑下同泣而下車又曰封禪為蒲輪車惡傷土石草木又曰秦王收穰侯之印使歸陶因使縣官給車牛以從千乗有餘到關閱其寳器珍怪多於王室漢書曰田千秋年老上優之朝見得乗小車入宮殿中故因號車丞相又曰王莽造四輪車駕六馬力士三百人黄衣赤幘軛音厄上人繫鼔輓音晚者呼登仙莽出令在前百官竊言此似輀車非仙物也後漢書曰袁閎二弟忠宏節操皆亞於閎忠字正甫與同郡范滂為友俱證黨事得釋初平中為沛相乗葦車到官以清亮稱及天下亂忠棄官客㑹稽上虞縣也又曰江革字次翁齊國臨淄人少失父獨與母居遭天下亂賊盗竝起革負母逃難備經險阻常採拾以為飬數遇賊或刼欲將去革輒涕泣求哀言有老母辭有足感動人者賊以是不忍犯之或乃指示避兵之方遂得俱全于難轉客下邳窮貧祼跣行傭以供母革以母老不欲揺動自在轅中輓車不用牛馬由是鄉里稱之曰江巨孝又曰井丹字大春建武末沛王輔等五王皆好延賔客請丹不能致信侯隂就光烈皇后弟也令左右進輦丹笑曰吾聞桀駕人輦豈非此耶帝王世紀曰桀以人駕車坐中皆失色就不得已而令去輦自是隐蔽不關人事以夀終又曰􅀶士張俠帝稱善曰欲置傅者以輔太子也今􅀶士不難正朕况太子乎即拜俠為太子傅而以桓榮為少保賜以輜車乗馬榮大㑹諸生陳其車馬印綬曰今日所蒙賜稽古之力也可不勉哉又曰馬援平南回封為新息侯援乃擊牛釃所綺切酒勞饗軍士從容謂官屬曰吾從弟少㳺常哀吾慷慨多大志曰士生一代但取衣食才足何必乗下澤車太平御覽卷七百七十二
