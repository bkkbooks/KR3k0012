  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_503-1a, image: WYG0897/WYG0897-0524c.png}
body:
  text: 太平御覽卷五百三宋李昉等撰逸民部三逸民三王隠晉書曰龔壯字子偉巴西人也潔己自守與鄉人譙秀齊名父叔為李特所􅊣壯積年不除喪力弱不能復讐及李夀戍漢中與李期有隙期特孫也時壯欲假夀以報乃説夀曰節下若能并有西土稱藩於晉人必樂從且捨小就大以危易安莫大之策也夀然之遂率衆討期果克之夀猶襲偽號欲官之壯誓不仕賂遺一無所受壯書説夀以歸順允天心應人望永為國藩福流子孫夀不納壯曰百行之本莫先忠孝既假夀殺期私仇已雪又欲使其歸朝以明臣節夀既不從壯遂稱耳聾又云手不制物終身不復至成都惟研考經典覃思文章至李勢時卒又曰韓績字興齊廣陵人也先避世居於吳之嘉興父建仕吳至大鴻臚績少好文學以􅇓退為操布衣蔬食不交當世由是當世並宗敬焉司徒王導聞其名辟以為掾不就咸康末會稽内使孔愉上疏荐之詔以安車束帛徴之稱老病卒於家又曰譙秀字元彦巴西人也少而靜黙不交於世知天下將亂預絶人事雖内外宗親不相見郡察孝亷州舉秀才皆不就及李雄據巴蜀慕秀名具束帛安車徴皆不應常冠皮弁弊衣躬耕山藪後避難岩渠鄉里宗族依憑之者以百數秀年出八十衆代之負擔秀曰各有老弱當先營䕶吾氣力猶足自堪豈以垂朽之年累諸君也年九十餘卒又曰辛謐字叔重隴西狄道人也少有志尚博學善屬文恬靜不妄交逰召拜太子舍人諸王文學累徴不赴永嘉末劉聦拜大中大夫固辭不受又厯石季龍之世並不應辟命雖處死亂之中頺然髙邁視榮利蔑如也及冉閔僣亂復備禮徴為太常謐遺閔書因不食而卒又曰索襲字偉祖燉煌人也虛静好學不應州郡之命舉孝亷賢良方正皆以病辭逰肆於隂陽之術天文地理十餘篇多所啓發不與當世交通或獨語獨笑長歎涕泣或請問不言燉煌太守隂澹竒而造焉竟日忘返而歎曰索先生碩徳名儒真可以諮大義澹欲行鄉射之禮請為三老會病卒時年七十九又曰楊軻天水人也少好易長而不娶學業精微養徒數百常食麄飯飲水衣短褐人不堪其憂而軻悠然自得疎賔異客音㫖未嘗交也雖受業門徒非入室弟子莫得親言欲所論授入室弟子令相與宣授劉曜僣號徴拜太常軻固辭不赴曜亦敬而不逼遂隠於龍山及曜為石勒所擒秦東徙軻留長安石季龍嗣立備𤣥纁束帛安車徴之軻以疾辭迫之乃發既見季龍不拜與語不言有司以軻倨傲請從大不敬論季龍弗從下詔任軻所尚常卧土床覆以布被裸寢其上下無茵褥潁川荀舖好竒之士也造而談經軻瞑目不答鋪發軻被露其形大笑之軻神體頺然無驚怒之狀于時咸以為焦先之徒未有能量其深淺也後上疏陳思郷求還季龍送以安車蒲輪自歸秦州仍教授不絶又曰公孫鳳字祖鸞上谷人也隠於昌黎之九城山冬衣單布寢土床彈琴吟咏陶然自得人咸異之莫能測也慕容暐以安車徴至鄴及見暐不言不拜在九城賔客造請鮮得與言數年病卒又曰公孫永字子陽襄平人也少而好學恬虛隠於平郭南山不娶妻妾非所墾植不衣不食吟咏巖間忻然自得年逾九十操尚不虧與公孫鳳俱被慕容暐徴至鄴王公以下造之不與言談雖隆寒盛暑端然自若一嵗餘詐狂暐送之於平郭後苻堅又將備禮徴之難其年耆路逺遣使致問未至卒堅深悼之又曰張忠字巨和中山人也永嘉之難隠於太山恬靜寡欲清虛服氣飱藥石之餌修道養之法冬無緼袍夏則帶索端拱尸居無琴書之適不修經典勸教但以至道虛無為宗其居依崇岩幽谷鑿地為窟居穴為宫六十為步五日一朝其教以形不以言弟子受業觀形而退立道壇于窟上每旦朝拜之食用瓦器鑿而為釡左右居人饋之衣食一無所受年在期頥而視聽無爽苻堅遣使徴之乃至長安堅賜以衣冠辭曰年朽髪落不堪衣冠請以野服入謁從之後堅以安車送之行達華山歎曰我東嶽士殁於西嶽命也奈何行五十里及闗而死堅諡安道先生又曰石垣字洪孫自云北海􅀈人居無定處不娶妻妾不營産業食不求美衣必麄弊或有遺其衣服受而施人人有喪葬輙杖策弔之路無逺近時有寒暑必在其中或同日共時咸皆見之姚萇之亂莫知所終又曰郭荷字承沐洛陽人也其世祖整漢安順之世公府八辟公車五徴皆不就自整及荷世以學終荷明究羣籍特善𨽻書不應州郡之命張祚遣使者以束帛安車徴為博士祭酒後主疏乞還祚以安車蒲輪送還張掖東山年八十卒諡曰𤣥徳先生又曰祁嘉字孔賔酒泉人也少清貧好學年二十餘夜聞空中有聲呼曰祁孔賔隱去來修飾人間甚苦不可諧所得未錙銖所喪如山崖旦而逃去至燉煌依學宫誦書貧無衣食為書生都養以自給遂博通經傳精究大義而教授門生百餘人張重華徴為儒林祭酒稱為先生而不名之以夀終又曰瞿硎先生者不得姓名亦不知何許人也泰和末常居宣城郡界山中有瞿硎因以名焉大司馬桓温常徃造既至見先生被鹿裘坐于石室神采五色温及僚佐數十人皆莫測之乃命伏滔為之銘賛竟卒於山中又曰宋纎字令艾燉煌人也少有逺操沉静不與世交隠於酒泉南山酒泉太守馬岌髙尚之士也具威儀鳴鐘鼓造纎纎髙樓重閣拒而不見岌歎曰名可聞而身不可見徳可仰而形不可觀吾乃今而後知先生人中之龍也題詩於石壁云丹崖百丈青壁萬尋竒木蓊鬱蔚若鄧林其人如玉維國之琛室邇人遐實勞我心纎注論語及為詩言數萬言年八十篤學不倦張祚復遣使者備禮徴為太子友逼喻甚切纎喟然嘆曰徳非干木何敢稽停明命遂至姑藏祚遣其太子太和以執友禮造纎稱疾不見贈遺一皆不受後卒諡曰𤣥虛先生又曰鄧粲長沙人也少以髙潔著名與南陽劉驎之南郡劉尚公同志友善並不應州郡辟命荆州刺史桓公卑辭厚禮請粲為别駕粲嘉其好賢乃起應召驎之尚公謂粲曰卿道廣學深衆所推懐忽然改節誠非所望粲答曰足下可謂有志於隠而未知隠夫隠之為道朝亦可隠市亦可隠隱初在我不在於人尚公等無以難之又曰汜騰字無忌燉煌人舉孝亷除郎中天下兵亂去官還家太守張閟造之閉門不見禮遺一無所受歎曰吾聞亂世貴而能貧乃可以免散家財五十萬以施宗族柴門灌園琴書自適刺史張軌徴之為府司騰曰門一杜其可開乎固辭病卒又曰王長字文徳都廣漢人少以好學知名放蕩不覊州郡辟為别駕乃微服竊出舉州莫知所之後於成都市中蹲踞而坐齧胡餅食之刺史知其不出乃禮遣之於是閉門自守不交人事著通𤣥經四卷文言卦象可用以為卜筮晉中興書曰虞喜字仲寧好學博古中宗初鎮江右上疏薦喜公車徴不至司空賀循一詣喜輙經信宿云不能測也康帝以為散騎常侍又不起永和初時禘大廟應有逓毁尚書郎徐禪詣喜講焉喜所著數十萬言又曰髙陽許詢字𤣥度丹陽許𤣥字逺逰並養髙不仕詢有才藻能清言𤣥山居服食志求仙道逰會稽臨海山誓不歸家乃與婦書令改適後入剡深山莫知所止或以為昇仙又曰翟湯字長淵潯陽人耕而後食凡有饋賄一無所受庾亮薦湯以國子博士徴不起湯子莊字祖休遵湯之操雅好弋釣及長不復獵人或問莊同是􅊣生之道而先生止去其一何也莊曰獵自我釣自物故先節其甚者且貪餌吞鈎豈我哉時人以為知言晩節亦不復釣端坐蓽門啜菽飲水徴辟皆不就莊子矯矯子法賜並徴不至世有隠行又曰郭翻字長翔不交世事家于臨川唯以魚獵為娛常以車獵道逢病人以車送之徒步而返庾亮薦公車徴不就乗小船歸武昌庾翼躬徃造之以翻船狹小欲引入大船翻曰使君不以民鄙賤而辱臨之此固野人之舟也遂不肯翼便俯屈入其船中終日而去又曰孫畧字文席吳人少佃於野人有刈其稻者畧避之既而刈一擔自送與之鄉人感愧終日屢空怡然自足辟命皆不就妻虞預女也少稟伯喜風共安儉約又曰何琦音竒字萬倫養志衡門不交人事豐約與隣鄉共之累徴不起桓温與琦登縣界山喟然歎曰此山南有人焉何某真正是也又曰陶淡字處静侃之孫雅好仙道年十五六便服食於山中立小草窟設小牀獨坐故舊入山候者輙移渡澗莫得近本州舉秀才淡聞遂逃羅縣山中終身不返莫知所終又曰范宣少尚隠遁博綜衆書徴辟並不應雖閑居屢空常研講為業諷誦之聲有若齊魯太平御覽卷五百三
