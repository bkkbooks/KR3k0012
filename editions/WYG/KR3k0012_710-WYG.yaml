body:
  text: 太平御覽卷七百十宋李昉等撰服用部十二几案杖几釋名曰几庋也所以􅍥物也書顧命曰王乃洮頮水相被冕服慿玉几王疾發大命臨羣臣必齊戒沐浴今病疾故但洮與頮面扶相被以冠冕慿玉几以出命易渙卦九二曰渙奔其几悔亡象曰渙奔其几得願也几承物也詩行葦曰戚戚兄弟莫逺具爾或肆之筵或授之几周禮春官曰司几筵掌五几大朝覲大饗射凡封國命諸侯王設左右玉几祀先王昨席亦如之諸侯祭把右彫几筵國賔于牖前亦如之左彫几國賔老臣也甸役則右漆几凡䘮事右素几吉事變几凶事仍几禮記曰謀於長者必操几杖以從之又曰獻几杖者拂之又曰大夫七十而致仕若不得謝謝云君貪其德而留之也則必賜之以几杖又曰乘車必以几又曰龜筴几杖不去公門又月令曰仲秋之月養衰老授几杖又内則曰父母舅姑坐御者舉几歛席又曰始死綴足用燕几國語曰諸侯之師乆於偪陽荀偃士匄請於荀罃曰水潦將降懼不能歸請班師班還也智伯怒智伯荀瑩投之以几又曰蒍啓疆曰聖王務行禮不求恥人几設而不倚爵盈而不飲禮之至也國語楚語曰左史倚相曰倚几有訓誦之諫訓誦工師所誦之諫書之於几漢書曰吳王稱疾不朝驗問不實及後使人為秋請律春曰朝秋曰請如古諸侯朝聘也上復責問吳使使者曰察見淵中魚不祥張宴曰喻人君不當見臣下之私也於是天子賜吳王几杖又曰朱博遷瑯琊太守齊部舒緩飬名博奮髯抵几曰觀齊兒欲以為俗耶皆斥罷諸病吏續漢書曰魏文帝賜楊彪几杖以彰舊徳東觀漢記曰黃香為尚書郎以香父尚在賜卧几靈壽杖又曰上初即位先訪求賢茂詔曰前宻令卓茂名冠天下嘗受天下重賞今以茂為太傅封裒徳侯賜几杖魏志曰太祖為司空丞相毛玠為東曹掾太祖平聊城頒所獲物特以素屏風素慿几以賜玠曰君有古人之風故賜古人之物又曰吕布遣陳登至太祖求徐州牧登因陳布勇而無謀宜早誅之太祖悦及登還布㧞㦸斫几責之晉書曰劉毅仲雄以太康六年卒帝撫几驚曰失吾名臣不得生作三公即贈儀同三司又曰魏舒以年老稱疾遜位詔賜几杖不朝及錢百萬牀帳簟褥又曰王羲之字逸少嘗徃門生家見棐几滑淨因書之真草相半後其父誤刮去之門生驚懊累日宋書曰沈麟士字雲禎隱居以篤學為務恒慿素几鼔素琴吳均齊春秋曰孔靈產為光禄大夫覽止足之分不肯仕太祖以白麾毛扇素几遺之曰以君有古人風故賜卿古人之物也陳書曰王冲為太子少傅武帝以冲前代舊臣特申長幼之敬文帝即位益加尊重嘗從幸司空徐度宅宴筵之上賜之以几後魏書曰咸陽王僖謀逆誅其宫人為之歌曰可憐咸陽王奈何作事誤金牀玉几不能眠夜蹋霜與露莊子曰南郭子綦隱几而坐仰天而噓嗒焉似䘮其偶孟子曰孟子去齊宿於晝有欲為王留行者坐而言不應隱几而卧客不悅曰弟子齋宿而後敢言夫子卧而不聽請勿復敢見矣晝齊邑也齊人欲為君留孟子行孟子不聽倚席而卧也山海經曰西王母梯几而戴勝梯謂慿也漢舊儀曰天子用玉几拾遺記曰瀛洲南有金巒之觀中藏寶几覆以雲紈之素漢武帝内傳曰帝受西王母五岳真形盛以黄金之几西京雜記曰漢制天子玉几冬則加綈錦其上謂之綈几公侯皆以木為几冬則以細􅄢為囊慿之不得加綈錦之餙於几案㑹稽典録曰葛仙公慿白桐几學數十年白日登仙几化為白虎三脚兩頭徃徃人見之魏武上雜物䟽曰御物三十種有上車漆畫重几大小各一枚語林曰任元褒為光禄勲孫翊徃詣之見門吏慿几視之入語任曰吏慿几對客為不禮任便推之吏答云得罰體痛以横木扶持非慿几也孫曰直木橫施值其兩足便為慿几何必孤鵠蟠膝曲木抱腰姚信士語曰馬援慿几而見梁竇子弟文舉坐榻而受徐文髙拜戴勝竹林七賢論曰魏封晉文王固讓公卿皆當喻㫖司空鄭冲等馳使從阮籍求其文立待之籍時在袁孝尼家宿扶醉而起書几板為文無所治定乃寫符信鄴中記曰石虎御坐几悉漆彫畫皆為五色花南岳記曰衡山有石室内有石床石几異􅁐曰厯陽石秀之歘有一人著平巾袴褶語秀云聞君巧侔班匠刻几尤妙太山府君相召秀之自陳云劉政能造數旬而殞石氏猶存劉作几有名遂以致斃幽明録曰海中有金臺水出百丈臺之内有金几彫文備制上有百味之食李尤几銘叙曰昔帝軒轅仁智恐事之有闕作輿几之法張華倚几銘曰倚几之設設而不倚作器於此成禮於彼案説文曰檈似縁切圓案也方言曰陳楚宋魏謂案為􅀈楚漢春秋曰項王使武渉説淮隂侯淮隂侯曰臣故事項王位不過中郎官不過執㦸及去項歸漢漢王賜臣玉案之食巨闕之劒臣背之内愧於心史記曰髙祖過趙趙王張敖自持案進食甚恭上箕踞罵之漢書曰萬石君石奮子孫有過不誚讓為便坐對案不食又曰賈禹奏曰見賜杯案文畫金銀餙非當所以食臣下也又曰朱博為廉儉自㣲賤至富貴不食重味案上不過三杯酒又曰許后五日一朝皇太后於長樂宫親奉案上食東觀漢記曰更始韓夫人嗜酒每侍飲見常侍奉事輙怒曰帝方對我飲正用此時持事來乎起扺破書案又曰魏覇延平元年仕為光禄大夫妻死長兄伯為娶妻送至官舍覇曰年老兒子備具何用空飬他家老嫗為即自入拜其妻手奉案前跪霸曰不敢相屈而妻慙求去又曰尹敏字幼季與班彪相友每相與談論輙屏案不食又曰梁鴻常賃舂每歸妻為具食舉案齊眉又曰蔡彤素清在遼東三十年衣無儲副賜錢百萬下至杯案食物大小重㳫南史曰江秉之為新安大守在郡作書案一枚去官留以付庫梁書曰郭祖清儉素木案食不過一肉漢舊儀曰丈二旋案以陳三十肉九榖飲食東宫舊事曰皇太子妃初拜有漆金度足奏案一枚魏武上雜物䟽曰御物有純銀參鏤帶漆畫案一枚江表傳曰曹公平荆州欲伐吳張昭等皆勸迎曹公唯周瑜魯肅陳距北之計孫權㧞刀斫前奏案曰諸將復有言迎北軍與此同也西京雜記曰武帝為七寶牀雜寶案於桂宫中漢武故事曰武帝時東郡獻短人長五寸上疑是山精常令案上行東方朔問曰巨靈汝何以叛阿母健否廣陵傳曰吳戒字季齊姓剛直同業生陳叔為賊戒見之叔為設食戒曰汝已為賊奈何為設食因舉案投江中令其撒饌神仙傳曰吳興人沈羲為仙人所迎上見老君玉女以金案玉案藥賜羲曰此神仙丹不死之藥鄴中記曰石虎以宫人為女官門下通事以玉案行文書燕丹子曰太子常與荆軻同案而食鹽鐵論曰文杯畫案婢妾衣紈履絲所謂以亂治亂也潛夫論曰前𦍑始叛器械未備虜或持銅鏡以䝉兵或負板案以類楯誠易戰耳異􅁐曰百丈山上有石房内有案置石書二卷夢書曰夢見杯案賔客到也多客大案少客小案陸雲與兄機書曰案行曹公器物有奏案五枚又作欹枕以卧視書張衡四愁詩曰美人贈我錦繡段何以報之青玉案李尤書案銘曰居則致樂承顔接賔承奉奏記通達詔刺尊上答下道合仁義梁簡文帝案銘曰刻香鏤采纎銀卷足漆花曜紫畫製舒緑性廣知平文雕非曲厠質錦帳承芳綺褥披古道今察姦紏俗杖説文曰杖持也大戴禮曰武王踐祚杖之銘曰惡乎失道於嗜欲相忘於富貴周禮秋官上曰伊耆氏掌國之大祭祀共其杖咸咸讀曰凾老臣雖杖於朝事鬼神尚敬共之有司以此凾藏之既事乃換之軍旅授有爵者杖吏卒且以杖尊者將軍杖鉞共王之齒杖王者所以賜耈老之杖禮記曰獻杖者執末又檀弓上曰孔子蚤作負手曵杖逍遥於門歌曰泰山其頽乎梁木其壊乎哲人其萎乎子貢聞之曰夫子殆將病也又曰子夏䘮其子而䘮其明曾子弔之子夏曰天乎余之無罪也曾子怒曰商汝何無罪也吾與汝事夫子於洙泗之間退而老於西河之上使西河之民疑汝於夫子爾罪一也䘮爾親使民未有聞焉爾罪二也䘮爾子而䘮爾明爾罪三也而曰汝何無罪與子夏投其杖而拜曰吾過矣又曰王制曰五十杖於家七十杖於國八十杖於朝傳曰邾莊公與夷射姑酒飲私出閽乞肉焉閽奪之杖而敲之論語曰鄉人飲酒杖者出斯出矣又曰子路從而後遇丈人以杖荷蓧子路問曰子見夫子乎丈人曰四體不勤五榖不分孰為夫子植其杖而耘史記曰張騫云臣前在大夏時見卭竹杖蜀布問曰安得此大夏國人曰賈人徃市之身毒在大夏之東南可數千里續漢禮儀曰三老五更杖玉杖又曰季秋之月按户比民年七十者授之以玉杖八十禮有加玉杖長九尺端為餙鳩鳩者不噎之鳥欲老人不噎華嶠後漢書曰嘉平中袁逢為三老賜玉杖魏志曰文帝引漢太尉楊彪待以客禮賜之几杖詔曰夫先王制几杖之錫所以賔禮黃耉褒崇元老也昔孔光卓茂並以淑徳髙年受兹嘉錫其賜公延年杖及慿几又曰周宣為郡吏太守楊沛夢人謂曰八月一日曹公當至必與君杖飲以藥酒宣占之曰夫杖起弱藥治人病八月一日黃巾賊必滅至時賊果滅吳書曰全綜年髙賜以御杖晉書曰魏帝嘗賜景帝春服帝以賜山濤又以其母年老并賜藜杖一杖又曰阮宣子出行常以百錢掛杖頭每至酒家輙醉而歸後魏書曰甄琛拜侍中以其衰老詔賜御府朝杖直杖以出入莊子曰子貢乘大馬軒車不容巷徃見原憲杖藜應門山海經曰夸父與日競走渇飲河渭不足北走大澤未至道死棄其杖化為鄧林廣志曰九真出靈壽杖吕氏春秋曰孔子弟子從逺方來者孔子荷杖而問曰子之父不有恙乎持杖而揖之問曰子之母不有恙乎置杖而問曰子之兄弟不有恙乎杖歩而倚之問子之妻子不有恙乎故孔子以六尺之杖論貴賤之等辨親疎之義陸賈新語曰夫居髙者自處不可以不安履危者任杖不可以不固自處不安則墜任杖不固則顛是聖人居髙處上則以仁義為巢乘危履傾則以聖賢為杖也新序曰昌邑王徴為天子到滎陽置積竹刺杖二枚龔遂諫曰積竹刺杖者驕蹇少年柱也大王奉大䘮當拄竹杖風俗通曰漢髙祖與項籍戰京索間遁叢薄中時有鳩鳴其上追者不疑遂得脫及即位異此鳥故作鳩杖賜老人拾遺記曰老子當周之末居山與世人絶迹唯有黃髮老叟五人手扶青笻之杖出入室中與老子談又曰縻竺用陶朱計術日益富有寶庫十間竺常賑生恤死家馬厩旁有古冡夜聞泣聲尋之見婦訴云漢末為赤眉所害剖棺見剥乞更深埋并乞弊衣自掩竺從其言後歴一年復見前婦云君財寶可支一世應遭火厄今以青廬杖一枚長九尺報君衣棺之恵竺挾杖而歸後隣家常見竺家有一清氣如龍蛇之形又有青衣童子數人來云縻竺家當有火頼君能恤歛枯骨天道不辜君德故來􅓙却此災使君財物不盡旬日火從庫起燒其珠玉十分遺一火盛之時見青衣童子數十來撲火又有氣如雲覆火上即滅又曰劉向於成帝之末校書天禄閣專精覃思夜有老人着黃衣植藜杖扣閣而進向閣中獨坐頌書老人乃吹杖端火出燃以照向且說開闢以來向因受五行洪範之文恐辭説繁廣向乃裂裳及紳以記其言至曙而去請問姓名答曰我是太乙之精天帝聞卯金之姓有愽學者下而觀焉乃出懐中竹牒有天文地圖之書余畧授子至向子歆從授術亦不語人焉漢武内傳曰帝先有玉箱杖是西王母所獻帝甚愛之崩後故以入槨其年人有於扶風郿市中買得者帝時左右侍人識之告有司詰問云於市中見一人賣之實不知賣杖主名也神仙傳曰費長房欲求道而顧家憂壺公乃斷一青竹杖與長房身等使懸之舍後家人見以為縊死大驚號遂殯葬之長房立其傍人無見者後長房歸家人不信是房房曰徃日所葬竹耳發冡視杖猶存又曰壺公遣長房歸以一竹杖與之騎比當至家以杖投葛陂中長房騎杖忽然如睡便到家以杖投葛陂中顧之乃青龍也又曰介象令人騎青竹杖自吴往蜀劉根别傳曰孝武皇帝登少室見一女子以九節杖仰指日閉左目開右目氣且絶乆乃蘇息武帝使問之所行何事女子不答東方朔曰婦人食日精者劉向别傳曰有麒麟角杖塔寺記曰謝尚夢其父告之曰西南有氣至衝人必死勿當其鋒建塔寺可禳未暇立寺杖頭刻作塔形見有氣來指之尚如其言置杖左右果有黒氣衝尚家尚以杖指之氣即回㪚闔門獲全氣所經處數里無復孑遺三石偽事曰佛澄死以澄生所服金杖銀鉢内置棺中經後再朞開棺視之不見體唯見杖鉢武當山記曰山有石室有板床銅杖長七尺三分交州記曰合浦圍州有石室其裏一石如鼓形見榴木杖倚着石壁採珠人常致祭焉魏文典論曰嘗與平虜將軍劉勲奮威鄧展共食飲宿聞展有手臂曉五兵余與論劔酒酣耳熱方食甘蔗便以為杖下殿交三中其臂談藪曰後魏河間邢巒字山賔遷殿中御史有疾䇿山桃杖帝問此何杖答曰巨源杖太武諱燾故言焉法顯記曰那端國有佛錫杖牛頭栴檀上長丈六七許以筒盛之百千人舉不能移又曰祗垣精舍西北四里有榛林名曰得眼木有五盲人佛為說法盡得眼開盲人喜刺杖着地頭靣作禮杖遂生長成榛鄧德明南康記曰南野縣有漢監匠陳憐其人通靈夜嘗乘龍還家其婦懐身憐母疑與外人通宻看乃知是憐乘龍至家輙化成青竹杖憐内致户前母不知因將杖去湏臾光彩滿堂俄爾飛去憐失杖乃御雙鵠還搜神記曰漢文帝微服嘗過魯少千少千拄金杖出應門列異傳曰陳留史均字威明嘗得病臨死謂其母曰我死埋我杖竪􅄟上若㧞出杖我得復生及死埋杖如其言七日徃觀杖果㧞即掘出之便平復如故神異記曰陳敏孫皓之世為江夏太守自建業赴職聞宫亭廟騐言靈騐過乞在任安穏當上銀杖一枚年限既滿作杖擬以還廟撫捶鐵以為幹以銀塗之尋徴為㪚騎常侍徃宫亭送杖於廟中訖即進路日晚降神巫宣教曰陳敏許我銀杖今以塗杖見與便投杖水中當送以還之欺蔑之罪不可容部衆取杖看之見鐵幹乃置之湖中杖浮江水上其疾如飛遙到敏舫前敏舟遂覆漢武帝與楊彪書曰今贈足下銀角杖一枚崔瑗杖銘云乘危履險非杖不行年老力竭非杖不強甘蔗雖美猶不可杖佞人悅已亦不可相太平御覽卷七百十
