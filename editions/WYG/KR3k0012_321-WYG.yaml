body:
  text: 太平御覽卷三百二十一宋李昉等撰兵部五十二火攻水攻火攻孫子曰火攻有五一曰火人與敵相持敵傍近草因風燒之戰之助也二曰火積燒其積蓄三曰火輜燒其輜重四曰火庫當使奸人入敵營燒其兵庫五曰火墜墜墮也以火墮敵營中也火墜之法以鐵籠火著箭頭頸强弩射敵營中一曰火道燒絶其糧道行火必有因因奸人也又因風燥焚之煙火必素具具燒具也先具燒燧之屬發火有時起火有日時者天之燥也日者月在箕壁翼軫也凡此四宿者風起之日也月在謂月之所次也箕水豹壁水㺄翼火蛇軫火蚓四宿乃風之使當推歩躔次月宿于此必有風起天官書曰月在箕壁翼軫四星不出三日必有大風火借風以張其勢凡火攻必因五火之變而應之火發於内即早應之於外以兵應之使奸人縱火於敵營内當速進以攻其外火發而兵靜者待而勿攻極其火力可從而從之不可從則止見利則進知難則止極盡火力可則進不可則止吾無使敵知吾為火可發於外無待於内以時發之火發於上風無攻於下風下風不便也燒之必退而迎攻之則必為所害者也晝風久夜風止風起於晝延起於夜易恬老子云飄風不終朝當因晝夜之候而知緩急之計凡兵必知五火之變以數守之既知起五火之變當復以數理消息其可否也故以火佐攻者明史記曰田單齊人也燕將樂毅攻齊單保即墨不下燕兵圍之單乃收城中牛千餘頭畫以五采束刃於角縛葦于尾鑿城數十穴以燒其尾端牛尾熱奔燕軍燕軍大亂所觸皆死大克燕軍漢書曰李陵征匃奴戰敗班師為單于所逐抵大澤葭葦中虜於上風縱火陵亦令軍中縱火以自救師古曰預自燒其旁草木令虜火不得延及也後漢書曰奉車都尉竇固出擊匈奴以班超為假司馬將兵别擊伊吾戰於蒲類海多斬首虜而還伊吾匈奴中地名今在伊州納職縣界前書音義曰蒲類匈奴中海名在燉煌北也固以為能遣與從事郭恂俱使西域超到鄯善鄯善本西域樓蘭國也昭帝元鳯四年改為鄯善去陽關一千六百里去長安六千一百里鄯善王廣奉超禮敬甚備後忽更疎略超謂其官屬曰覺廣禮意薄乎此必有北虜使來狐疑未知所從故也明者暏於未萌况已著耶乃召侍胡詐之匈奴使來數日今安在乎侍胡惶恐具服其狀超乃閉侍胡悉㑹其吏士三十六人與共飲酒酣因激怒之曰卿曹與我俱在絶域曹輩欲立大功以求富貴今賊使到裁數日而王廣禮敬即廢如今鄯善收吾屬送匃奴骸骨長為豺狼食矣為之奈何官屬皆曰今在危亡之地死生從司馬超曰不入虎穴不得虎子當今之計獨有因夜以火攻虜使彼不知我多少必大震怖可殄盡也滅北虜則鄯善破膽功成事立矣衆曰當與從事議之超怒曰吉凶决於今日從事又俗吏聞此必恐而謀洩死無所名非壯士也衆曰善初夜遂將吏士往奔賊營㑹天大風起令十人持鼓藏賊舍後約曰見火燃皆當鳴鼓大呼餘人悉持兵弩夾門而伏超乃順風縱火前後鼓噪賊衆驚亂超手格殺三人吏兵斬其使及從士三十餘級餘衆百許人悉燒死東觀記曰斬得匃奴節使屋頼帶副使比離支首及節也明日乃還告郭恂恂大驚既而色動超知其意舉手曰掾雖不行班超何心獨擅之乎恂乃説又曰楊璇字機平為零陵太守是時蒼梧桂陽猾賊相聚攻郡縣賊衆多而璇力弱吏民憂恐璇乃特制馬車數十乘以排囊盛石灰於車上排囊即今囊袋也繫布索於馬尾又為兵車專彀弓弩尅期㑹戰乃令馬車居前順風鼓灰賊不得視因以火燒布燃馬驚奔突賊陣因使後車弓弩亂發鉦鼔鳴震羣盗波駭破散追逐傷斬無數梟其渠帥郡境以清又曰皇甫嵩討黄巾賊張角嵩保長社賊來圍城嵩兵少軍中皆恐乃召軍吏謂曰兵有竒變不在衆寡今賊依草結營易為風火若因夜縱火必大驚亂吾出兵擊之其功可成其夕遂大風嵩乃約勒軍士皆束炬乘城使鋭士間出圍外縱火大呼城上舉燎應之嵩因鼓而奔其陣賊驚亂奔走嵩進兵討之與角弟梁戰於廣宗梁衆精勇嵩不能剋明日乃閉營休士以觀其變知賊意稍懈乃潛夜勒兵鷄鳴馳赴其陣至晡時大破之吳志劉表死曹公克荆州得劉琮水軍㳂流東下吳主孫權遣周瑜領兵逆曹公遇於赤壁初一交戰曹公軍敗退引次江北瑜等在南岸瑜部將黄蓋曰今㓂衆我寡難與持久然操軍方連船艦首尾相接可燒而走乃取蒙衝鬭艦數十艘實以薪草膏灌其中裹以帷幕上建牙旗先書報曹公欺以欲降又先備走舸各繫大船後因引次俱前曹公軍吏士皆延頸遥觀指言蓋降蓋放諸船同時發火時風盛猛悉延燒岸上營落頃之熛熖漲天熛音票火飛也人馬燒溺死者甚衆遂敗魏志諸葛誕傳曰太傅司馬宣王潛軍東伐以誕為鎮東將軍後毌丘儉反大為攻具晝夜五六日攻南圍欲决圍出圍上諸軍臨髙以發石車火箭逆燒破其攻具晉書王濬伐吳吳人於江磧險要害之處皆以鐵鎻横截之又作鐵錐長丈餘暗置江中以逆拒船先是羊祐獲吳間諜具知情狀濬乃作大筏數十方百有餘步縳草為人被甲持杖令善水者以筏先行筏遇鐵錐輙著筏去又作火炬長十餘丈大數十圍灌以麻油在船前遇鎻燃炬燒之湏􅁷融液斷絶於是船無所礙晉中興書曰殷浩北伐江逌為長史及丁零反叛浩軍震懼姚襄去軍十里結草為營方欲擊浩浩甚懐憂令逌伐之逌曰今兵非不精而衆少於羗且塹栅甚固難與校力乃取數百鷄以長繩連之脚皆繫火一時驅放以兵遏後羣鷄駭散一時飛過塹並集羗營皆燃因其驚亂縱兵擊之襄遂摧退宋書王𤣥謨圍滑臺城内多茅屋衆皆曰宜以火箭燒之又殷琰傳曰琰與劉勔相持勔用茅苞土擲以塞塹擲者如雲城内乃以火箭射之又宋良吏杜慧度傳曰慧度為交州刺史盧循襲破合浦徑向交州慧度自登髙艦合戰放火箭雉尾炬循衆懼一時潰散齊書宗室始安貞王遥光𫝊曰太子右衞率左興盛屯東府東籬門衆軍圍東城臺軍射火箭燒東北角樓至夜城潰南史曰武帝時江東梁將王琳率兵東下陳遣大將侯瑱等拒之瑱以琳軍威方盛乃引軍入蕪湖避之是時西南風至急琳謂得天時將取琳州侯瑱等徐出蕪湖以躡其後比及兵交西南風翻為瑱用琳兵放火燧以擲瑱船者返燒其船琳兵潰亂投水死者十二三其餘皆棄船上岸為陳軍所殺殆盡北史曰李詢仕周遷司衛上士武帝幸雲陽宫委以晉府事衛王直作亂焚肅章門詢於内益火故賊不得入武帝善之北齊書曰二月周師來冦遣叚韶與大尉蘭陵王長恭同徃扞禦至西境有栢谷城者乃絶險石城千仞諸將莫肯攻圍韶曰汾北河東勢為國家之有若不去栢谷事同痼疾計彼援兵㑹在南道今斷其要路救不能來且城勢雖髙其中甚狹火弩射之一朝可盡諸將稱善遂鳴鼓而攻之城潰獲儀同薛敬禮大斬獲首虜仍城華谷置戍而還隋書曰文帝時髙熲獻取陳之䇿曰江南土薄舍多竹茅所有儲積皆非地窖宻遣行人因風縱火待彼脩立復更燒之不出數年自可財力俱盡帝行其䇿由是陳人益弊通典曰火兵以驍騎夜啣枚縛馬口人負束薪麻煴懐火直抵敵營一時舉火營中驚亂急而乘之又曰火獸以艾煴火置瓢中瓢開四孔繫瓢於野猪麞鹿項下針其尾端向敵營而縱之奔入草中瓢敗火發又曰火禽以胡桃剖分空中實艾火開兩孔復合繫野鷄項下針其尾而縱之奔入草中噐敗火發又曰火盗遣人暗伏與敵營相近夜竊號令便懐火偷入營焚其積聚火發必亂而出又曰火弩者以强弩射及三百歩者以瓢盛火縛於矢端以數百張中夜齊射敵營中焚其積聚又曰以小瓢盛油冠矢端射城樓櫓版木上瓢敗油散因燒矢鏃内中射油散處火立燃復以油瓢續之則樓櫓盡焚謂之火箭又曰火杏磨杏子中空以艾實之繫雀足上加火薄暮羣放飛入城壘中棲宿積聚廬舎湏􅁷火發謂之火杏水攻孫子曰以水佐攻者強水以為衛故強也水可以絶而不可以奪水但以絶其敵道分敵軍不以奪敵畜積史記曰漢王遣韓信已定齊臨淄遂東追齊王田廣至髙宻項羽使龍且將二十萬救齊田廣龍且并軍與信戰未合人或説龍且曰漢兵逺鬭窮㓂力戰其鋒不可當齊楚自居其地戰兵易敗散不如深壁令齊王使信臣招所亡城亡城聞其王在楚來救必反漢漢兵二千里客居齊齊城皆反之其勢無所得食可無戰而降也龍且曰吾救齊不戰而降之吾何功今戰而勝之齊之半可得何為止遂戰與信夾濰水陣濰音淮韓信乃夜令人為萬餘囊盛沙壅水上流引軍半渡擊龍且佯不勝還走龍且果喜曰固知信怯也遂追信渡水信使人决壅囊水大至龍且軍大半不得渡即急擊之龍且水軍遂敗走後漢書曰董卓將兵三萬討先零羌為羌胡所圍糧食乏絶進退逼急乃于所度水中偽立􅋣以捕魚􅋣與堰同而潛從􅋣下過軍比賊追之决水深不得渡時衆敗退唯董卓全師而還也又曰曹操圍吕布於下邳引沂泗二水灌城克之又曰光武至邯鄲故趙繆王子林繆王景七代孫名元前書曰元坐殺人為大鴻臚所奏諡曰繆音謬又東觀漢記曰林作臨字說光武曰赤眉今在河東但决水灌之百萬之衆可使為魚南史曰齊髙帝新踐祚恐魏致討以送劉昶為辭以為軍衝必在夀春非垣崇祖莫可為捍徙為豫州刺史監豫司二州諸軍事封望蔡侯建元二年魏遣劉昶攻夀春崇祖乃於城西北立堰塞肥水起小城使數千人守之謂長史封延伯曰虜必悉力攻小城若破此堰放水一激急踰三峽自然沉溺豈非小勞而大制耶及魏軍由西道集堰南分軍東路内薄攻小城崇祖著白紗帽肩輿上城手自轉式日晡時决小堰水勢奔下魏攻城之衆溺死千數大衆退走梁書曰魏降人王足陳計求堰淮水以灌壽陽足引北方童謡曰荆山為上格浮山為下格潼沱為激溝併灌鉅野澤帝以為然使水工陳承伯材官將軍祖暅視地形咸謂淮内沙土漂輕不堅實其功不可就帝弗納發徐揚人率二十户取五丁以築之假康絢節督淮上諸軍事并䕶堰作人及戰士有衆二十萬於鍾離南起浮山北抵巉石依岸築土合脊於中流十四年四月堰將合淮水漂疾復决潰衆患之或謂江淮多有蛟能乘風雨决壊岸其性惡鐵因是引東西二冶鐡噐大則釡鬲小則鋘鋤數千萬沉於堰所猶不能合乃伐樹為井榦填以巨石加土其上縁淮百里内岡陵木石無巨細必盡負擔者肩穿夏日疾疫死者相枕蠅蟲晝夜聲相合武帝愍之遣尚書左僕射袁昂侍中謝舉假節慰勞並加蠲復是冬又寒甚淮泗盡凍士卒死者十有七八帝遣賜以衣袴十一月魏遣楊大眼揚聲决堰絢命諸軍撤營露次以待之遣其子悦挑戰斬魏咸陽王府司馬徐方興軍小却十五年四月堰成其長九里下濶一百四十丈上廣四十五丈髙二十丈深十九丈五尺夾之以堤并樹把栁軍人安堵列居其上其水清潔俯視居人墳墓了然皆在其下或謂絢曰四瀆天所以節宣其氣不可久塞若鑿湫東注則游波寛緩堰得不壊絢然之開湫東注又縱反間於魏曰梁所懼開湫魏人信之果鑿山深五丈開湫北注水日夜分流湫猶不減其月魏軍竟潰而歸水之所及夾淮方數百里地魏壽陽城戍稍徙頓八公山南北居人散就岡壟初堰起徐州界刺史張豹子謂已必尸其事既而絢以他官來監作豹子甚慚由是譖絢與魏交通帝雖不納猶以事畢徵絢尋除司州刺史領安陸太守絢還後豹子不脩堰至其秋淮水暴漲堤壊奔流於海殺數萬人聲若雷聞三百里水中怪物隨流而下或人頭魚身或龍形馬首殊類詭狀不可勝名陳書曰閩中守陳寳應舉兵反據建安晉安二郡界水陸為栅將軍章昭逹討之據其上流命軍士伐木帶枝葉為筏施拍於其上綴以大索相次列營帶夾兩岸寳應數挑戰昭逹按甲不動俄而暴雨江水大漲昭逹放筏衝突水栅盡破又出兵攻其歩軍寳應大潰克定閩中又曰歐陽紇據嶺南反遣將章昭逹督衆軍討之紇乃出頓于洭口多聚沙石盛以竹籠置於木栅之外用遏舟艦昭逹居其上流裝艦造舟以臨賊栅又令軍人銜刀潜行水中以斫竹籠籠篾皆解因縱大艦隨流突之賊衆大敗因擒紇三國典畧曰東魏慕容紹宗髙岳等堰洧水以灌潁川時有怪獸毎衝壊其堰岳等悉衆苦攻分休迭進王思政身當矢石與士卒同其勞苦屬時大雪岳衆多死岳等乃作鐵籠雜獸用厭水神後周書曰太祖遣大將軍趙貴帥軍至穰兼督諸州兵以援王思政髙岳起堰引洧水以灌城自潁川以北皆為陂澤救兵不得至唐書曰武徳中劉黑闥據河北反太宗率兵討之先遣人堰水上流令黑闥得渡及戰遽合决堰水至深丈餘賊徒既敗爭渡水溺死者數千人咸以為神黑闥與二百餘騎奔於突厥悉虜其兵衆河北復平又曰武徳中李靖隨河間王孝恭討蕭銑屬江水大汎漲諸將皆請停兵以待水退靖謂孝恭曰以速為神機者時不可失今若乗水漲之勢倐忽至其城下可謂疾雷不及掩耳兵家上䇿也孝恭從之進兵次夷陵銑將文士𢎞屯清江靖與之决戰大破賊軍仍率所部星馳進發營於荆州城下𢎞既敗銑衆莫不震讋靖又破其將楊君茂鄭秀等遂圍城數重其夜銑遣使請降靖即入據其城號令嚴肅軍無私焉淮南子曰始智伯率韓魏二國伐趙晉陽决水而灌之城中縁木而處懸釡而炊襄子謂張孟談曰城力已盡糧食匱武夫病為之柰何張孟談曰亡不能安無為貴智臣請自潛行見韓魏之君而約之乃見韓魏之君說曰聞之唇亡則齒寒今智伯率二君而伐趙趙將亡矣趙亡則二君為之次今不圖之禍將及二君二君曰智伯之為人麄中而少親我謀而泄事必敗為之奈何張孟談曰言出二君之口入臣之耳人孰知之者乎且同情相成同利相死君盍圖之二君乃與孟談謀隂與之盟張孟談乃報襄子至期夜殺守隄之吏决水灌智伯智伯軍救水而亂韓魏翼而擊之襄子卒犯其前大敗智伯殺其身而三分其國太白隂經水攻具篇曰以水佐攻者強水因地而成勢使源髙於城本大於末可以遏而止可以决而流故晉水可以灌安邑汾水可以浸平陽先設水平測其髙下可以漂城灌軍沉營殺將又曰水平槽長二尺四寸兩頭及中間鑿為三池池橫濶一寸八分長一尺深一寸二分分間相去一寸五分中間有通水渠濶二分深一寸三分池各置浮木木濶狹㣲小施池内厚二分上建立齒髙八分闊一寸七分厚一分槽下置轉關脚髙下與身等以水注之三池浮木齊起𦕈目視之齒齊平則為天下準式十歩一里乃至數十里目力所及置照版度竿上白繩計其尺寸則髙下丈尺分寸可知又曰照板形如方扇長四尺下二尺黑上二尺白濶三尺柄長二丈刻作二百寸二千分毎寸内小刻其分隨向逺近髙下立竿以照板映之𦕈目視三浮木齒及照板又以度竿上尺寸為髙下遞而徃尺寸相承則山崗溝澗水源髙下深淺可以分寸為度太平御覽卷三百二十一
