  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_051-1a, image: WYG0893/WYG0893-0436c.png}
body:
  text: 太平御覽卷五十一宋李昉等撰地部十六石上石上釋名曰山體曰石石硌也音落一作挌堅捍硌也山多大石曰礐口學切礐學也大石之形學學然山多小石曰磝石交切磝堯也每石堯堯獨處而出也礫小石也磊當罪切衆石也碭壯浪切丈石也琅玕石似珠也碔砆石似玉也易曰困於石據于蒺藜又說卦曰艮為小石書禹貢青州貢鉛松怪石孔安國曰怪異好石似玉又曰泗濵浮磬孔安國注云泗水濵崖也水中見石可以為磬也詩曰我心匪石不可轉也又曰漸漸之石維其髙矣又曰他山之石可以攻玉禮曰昔者夫子居於宋見桓司馬自為石槨三年而不成桓司馬宋向戌孫也名魋也夫子曰若是其靡也死不如速朽之愈也又曰今夫山一拳石之多及其廣大草木生之禽獸居之寳藏興焉周禮曰王行洗乘石乘石王所登上車之石又曰石有時而泐音勒也解散也又曰大司冦以嘉石平罷民有罪者坐諸嘉石以肺石達窮民凡煢獨老幼欲復於上而未達者立於肺石注曰嘉石丈石也肺石赤石也傳曰隕石于宋五隕星也注曰但直言星則嫌星使石隕故重言隕星又曰齊髙固入于晉師桀石以投人又曰昭八年石言於晉魏榆晉侯問於師曠曰石何故言對曰石不能言或憑焉不然民聽濫也抑臣又聞之曰作事不時怨讟動於民則有非言之物而言今宫室崇侈民力彫盡怨讟並作莫保其性石言不亦宜乎春秋説題辭曰周易艮為山為小石石隂中之陽陽中之陰陰精補陽故山合石石之為言託也託立法也史記曰始皇三十六年墜星於東郡至地為石或刻其石曰始皇帝死而地分始皇聞之盡誅石旁居人燔銷其石説苑云石隕東郡是也又曰王翦代李信擊荆荆兵數挑戰終不出久之翦使人問軍中戲乎對曰方投石超距翦曰士卒可用矣又曰張良見老人于圯上出一編書曰讀是則為王者師後十三年見我濟北榖城山下黄石即我也良後果見黄石寳而祠之及死并葬黄石伏臘祀之又曰李廣出獵見草中石以為虎而射之中石沒鏃視之石也因復射之終不能復入石矣後漢書曰梁鴻妻孟光有力能舉石臼趙岐曰吾死後置一圓石于墓前刻曰漢有逸人姓趙名岐有志無時命也奈何謝承後漢書曰吳郡馬皓父為南郡太守坐事繫獄皓懷小石至公卿門輙出石叩頭流血覆面父遂得免東觀漢記曰涿郡太守張豐舉兵反初豐好方術有道士言豐當為天子以五采囊盛石繫肘云石中有玉璽豐信之遂以反既當斬猶曰肘有玉璽椎破之豐乃知被詐仰天歎曰當死所無恨又曰吳郡陸續為鬱林太守歸過洞庭湖舟輕載黄石壓之謂之㢘石魏略曰梁州抑谷有石無故自崩石中有犬如馬之狀後司馬氏得天下之應又曰大秦國石為城郭山出九色玉石魏志曰魏明帝增崇宫殿雕飾觀閣鑿太行之石英採榖城之文石起景陽山於芳林園建昭陽殿於太極之北又曰辰韓在馬韓之東兒生便以石壓頭欲其匾今辰韓人頭皆匾又曰公孫度為遼東太守時坐大石長丈餘下有三小石為足魏武帝末年鄴中雨五色石王隱晉書曰永康元年襄陽郡上言得鳴石鐘聞七八里石勒傳曰初勒鄉里所居原上地中石生日長類鐵之象又曰陳總遷殿中侍御史詔遣詣終南山請雨總先除小石祠惟存大石一所而祈之上文曰峩峩大石佐岳通理含滋吐潤惠我四海又曰孫子荆謂王武子曰當枕流潄石曰石非可潄流非可枕孫荅曰枕流洗其耳潄石礪其齒晉陽秋曰董威輦遁去莫知所之於其寢所得一石及竹子并詩二首齊書曰虞愿為晉平太守海邊有越王石常隱雲霧相傳云清廉太守乃得見愿往觀視清澈無隱蔽南史曰到溉山池有竒礓石長一丈六尺梁武愛之輸焉即迎置華林園居殿前移石之日都下傾城縱觀所謂到公石趙書曰劉曜築建徳殿取土城西得圓石狀若水碓其銘曰律權石重四鈞同律度量衡有辛氏造議者未之詳或以為瑞叅軍續咸曰王莽時物後周書曰髙琳母嘗袚泗濵遇見一石光彩朗潤遂持以歸是夜夢見一人衣冠有若仙者謂其母曰夫人適所將來之石是浮磬之精能寳持必生令子其母驚寢便舉體流汗俄而姙及生子因名琳字季珉也隋書曰帝令江都郡丞王世充發淮南兵擊劉元進有大流星墜於江都未及地而南逝磨拂竹木皆有聲至吳郡而落于地元進惡之令掘地入二丈得一石徑丈餘後數日失石所在唐書曰車騎將軍劉山濤言髙祖龍潜時數往來洛郊之莊舍嘗踐石子靴迹見於石中至今猶在髙祖令鑿之深寸餘其迹逾明乃止又曰則天時有人於洛水中得白石數㸃赤詣闕輙進諸宰相詰之對曰此石赤心所以來進李昭德叱曰此石赤心洛水中餘石豈能盡反耶左右皆笑又曰薛元超道衡孫也為中書舍人省有盤石初道衡當日為侍郎時嘗踞而草制元超每見此石未嘗不泫然流涕又曰甘露事敗王璠舉家無少長皆死初璠在浙西繕城壕役人掘得方石有十二字云山有石石有玉玉有瑕瑕即休璠視莫知其㫖京口老人講之曰此石非尚書之吉兆也尚書祖名崟崟生礎是山有石也礎生尚書是石有玉也尚書之子名瑕休休絶也庸非吉徵果赤族老子曰硌硌如石列子曰昔者女媧煉五色之石以補天淮南子亦載又曰趙襄子卒徒十萬狩於山中藉芿燔林煽赫百里有一人從石壁中出隨烟燼上下衆謂鬼物察之人也孫卿子曰以桀詐桀猶有巧拙以桀詐堯若卵投石又曰負石而走赴河行之難為者也而申徒狄能之闞子曰宋之愚人得燕石於梧臺之東歸而藏之以為大寳周客聞而觀焉主人端冕𤣥服以發寳華匱十重緹巾十襲客見之盧胡而笑曰此燕石也與瓦甓不異主人大怒藏之愈固符子云水生石未有居山而溺者火生木未有抱樹而焦者呂氏春秋曰石可破也而不可奪其堅淮南子曰禹娶塗山化為石在嵩山下後方生啟曰歸我子石破北方而生啟畢萬術曰埋石四隅家無鬼取蒼石四枚及桃七枚以桃弧射之乃分置四隅無鬼殃抱朴子曰白石似玉姦佞似賢又曰磁石引針又曰浮磬息音未别於衆石又曰燒泥為瓦燔木為炭蜂窩為蠟水沫為浮石隨巢子曰禹産於崑石啟生為石王昭之云啟生而母化為石六韜曰武王伐殷得二大夫而問之曰殷國將亡亦有妖乎其一人對曰殷國常雨血雨灰雨石小者如鷄子大者如箕武王曰大哉妖也樂資春秋傳曰秦始皇使鄭客將入函關見華山上有素車白馬疑是鬼神熟視稍近問鄭客曰安之荅曰之咸陽素車人曰止吾華山使願託一牘書致鎬池君所子之咸陽道過鎬池見一大梓樹有文石以欵樹當有應者即以書與之鄭客如其言以石擊梓樹果有人來取書與之吳越春秋曰禹案黄帝中經見聖人所記曰在乎九疑山東南號曰宛委承以丈玉覆以盤石其書金簡玉字禹乃退齋三日發石取書荆楚嵗時記曰張騫尋河源得一石示東方朔朔曰此石是織女支機石何至於此神仙傳曰壺公内費長房於石室中頭上有大石方數丈以茅繩懸之諸蛇競齧且斷長房不移公撫之曰子可敎矣又曰介象字元則會稽人入山求神仙見谷有石子皆紫色大如鷄子象取二枚見一美女被服五采象叩頭乞長生女曰急送汝手中物還著故處象送石還女授以丹方一首列異傳曰汝寧女子戴氏久疾出見小石曰爾有神能差我疾者當事汝夜夢人告之吾將祐汝後漸差遂為立祠名石侯祠益都耆舊傳曰公孫述時蜀武擔山石折任文公曰西州智士死我將死矣後三月果卒韓詩外傳曰楚渠子夜行見寢石以為伏虎彎弓而射之沒金及羽下視之其石也因復射之矢摧無迹漢書載李廣亦如之文士傳曰魏文帝之在東宫也宴諸文學酒酣命甄后拜坐者坐者咸伏惟劉楨平仰觀之太祖以為不敬送徙𨽻簿後太祖乘步牽車乘城降閲簿作諸徒咸敬而楨坐磨石不動太祖曰此非劉楨耶石如何性楨曰石出荆山𤣥巖之下外炳五色之章内秉堅貞之志雕之不增文磨之不加瑩氣質貞正禀性自然太祖曰名豈虛哉神仙傳曰白石先生煮白石為糧就白石山居故號曰白石先生穆天子傳曰天子升於采石之山於是取采石鑄以成器于黑水之山三齊略記曰始皇作石塘欲過海看日出處時有神人驅石下海石去不速神輙鞭之皆流血至今石悉赤陽城山盡起立嶷嶷東傾狀如相隨行事具神部盛宏之荆州記曰興安縣水邊有平石其上有石櫛石履各一具俗云越王渡溪脫履墮櫛於此郭縁生迹異記曰秦梁圯名也或曰秦始皇東廵弗行舊道過此水率百官以下人提一石以填之俄而梁成今觀所累石乃無造作跡也捜神記曰常山張顥為梁州牧天雨後有鳥如山鵲飛翔入市而忽然墮地人爭取化為圓石顥命椎破得一金印文曰忠孝侯印太平御覽卷五十一
