body:
  text: 太平御覧卷八百八十四宋李昉等撰神鬼部四鬼下異苑曰廣州治下有廣文鬼出則為祟所着衣袷皆黃至人家張口而笑必得疫狀長短無定隨籬髙下自不出已十餘年土俗畏怖惶恐不絶又曰陸機初入洛次河南之偃師時久結隂望道左若有民居因往逗宿見一年少神姿端逹與機言𤣥門妙道機心伏其能無以詶抗乃提緯古今總驗名實此年少不甚欣解既曉便去機税驂逆旅逆旅嫗曰此東數十里無村落止有山陽王家墓耳機乃怪悵還睇昨路空野霾雲拱木蔽日知所遇者信王弼也又曰晉宣王誅王凌寢疾日見凌來賈逵亦為祟少日遂薨初凌被執經賈逵廟呼曰賈梁道王凌魏之忠臣唯爾有神知之故逵助焉又曰夏侯𤣥為司馬景王所誅宗人為之設祭見𤣥來靈座上脱頭於膝取食物酒胾之屬以内頸中畢還自安頭而言曰吾得請於帝矣子元無嗣也及永嘉之亂有巫見帝涕泗云國家傾覆是曹爽夏侯𤣥訴寃得伸故也又曰謝靈運以元嘉五年忽見謝晦手提其頭來坐别床血色淋漓不可忍視又所服豹皮裘血淹滿篋及為臨川郡飯中數有大虫謝遂被誅又曰世有紫姑神古來相𫝊云是人家妾為大婦所妬毎以穢事相役正月十五日感激而死故世人以其日作其形夜於厠間或猪欄邊迎之祝曰子胥不在曹姑亦歸曹即其大婦也小姑可出戯投者覺重便是神來奠設酒果亦覺貌輝輝有色即跳躁不已能占衆事卜未來蚕桑又善射鈎好則大舞惡即仰眠平昌孟氏恒不信躬試往投便自躍穿屋而去永失所在也世説曰㑹稽賀思令善弹琴嘗夜在月中坐臨風鳴彈忽有一人形器甚偉著械有􅆭色在中庭稱善便與共語自云是嵇中散謂賀云卿手下極快但於古法未備因授以廣陵散賀遂𫝊之于今不絶又曰阮脩字宣子論鬼神有無或以人死有鬼宣子獨以為無曰今見鬼者云着生時衣服若人死有鬼衣服亦有鬼耶論者服焉列異𫝊曰南陽宋定伯年少時夜行逢鬼問曰誰鬼曰鬼也鬼曰卿復誰定伯欺之言我亦鬼也欲至宛市鬼言我亦欲至宛市共行數里鬼言道逺歩行遲可迭相擔也定伯乃大喜鬼便先擔定伯數里鬼言卿大重定伯言我新死故重耳定伯因復擔鬼鬼畧無重如是再三定伯復言我新死不知鬼悉何所畏忌鬼答曰唯不喜人唾於是共行道遇水定伯命鬼先渡聽之了無聲定伯自渡漼漼有聲鬼復言何以作聲定伯曰新死不習渡水耳勿怪行欲至宛定伯便擔鬼至頭上急持之鬼大呼聲咋咋索下不復聽之徑至宛市中著地化為羊便賣之恐其便化乃唾之得錢千五百乃去于時名定伯賣鬼得錢千五百又曰任城公孫逹甘露中為陳郡卒官將歛兒及郡吏數十人臨䘮公逹止諸兒以次教戒兒悲哀不能自勝乃慰之曰四時之運猶有所終人物短脆豈能無窮如此數千語皆成文章兒乃問曰人死皆無知大人聰明殊特獨有神靈耶答曰存亡之事未易可言鬼神之事非人知也索紙作書辭義滿紙投地云封書與魏君宰暮有信來即以付之其暮君宰果有信來又曰北海營陵有道人能令人與死人相見同郡人婦死已數年聞而往見之曰願令我一見死亦不恨道人教其見之於是與相見言語悲喜恩情如生時良久乃聞鼓聲遂别而去捜神記曰漢九江何敞為交趾刺史行部到蒼梧暮宿鵠奔亭夜未半有一女子從樓下呼曰妾本居廣信縣脩里人早失父母無兄弟嫁與同縣施氏薄命夫死有雜繒百二十疋及婢致富一人妾孤窮羸弱不能自振欲之傍縣賣繒從同縣男子王伯賃牛車一乗載繒妾乗車致富執轡乃以前年四月到亭外時日暮行人㫁絶不敢復進因止致富暴得腹痛妾之亭長舍乞漿取火而亭長龔夀操刀㦸來至車傍問妾曰夫人從何所來車上所載何物丈夫何在何故獨行妾應曰何勞問之夀持妾臂曰少年愛有色冀可樂也妾懼怖不應壽即持刀刺脅下一瘡立死又刺致富亦死壽掘樓下合埋妾在下婢在上取財物而去殺牛燒車車釭及牛骨貯在亭井中妾既寃死痛感皇天無所告訴故來自歸於明使君敞曰今欲發出汝屍以何為驗女子曰妾上下着白衣青絲屨皆未朽也妾姓蘇名娥願訪鄉里以散骨歸死夫敞乃馳還令吏捕捉考問具服問廣信縣與娥語合壽父母兄弟捕繋獄敞表壽常律殺人不至族然壽為惡隐宻經年王法自所不免令鬼神訴者千載無一請皆斬之以明鬼神以助陰教又曰盧充范陽人家西三十里有崔少府墓充年二十先冬至一日出宅西獵戯見麞便射中之麞倒復起充逐之不覺逺忽見道北一里許髙門瓦屋四周不復見麞門中鈴下唱客前有一人投一襆新衣曰府君以此遺郎充便着訖進見少府謂充曰尊府君不以僕門鄙近得書為君索小女為婚故相迎耳便以書示充父亡時充雖小然已識父手跡便歔欷無復辭便𠡠内盧郎已來即可使女郎莊嚴至黃昏内白女郎嚴竟崔語充君可至東廊女下車立席頭共拜時為三日給食三日畢崔謂充曰君可歸去女若生男當以相還生女當留自養勅外嚴車送客充便辭出至家母見問其故充悉以狀對别後四年三月充臨水戯忽見傍有犢車乍沉乍浮既而上岸同坐皆見充往開其車後户見崔氏女與三嵗男共戯女抱兒以還充又與金盌忽然不見充後乗車入市賣盌冀有識者有一婢識此還白大家曰市中見一人乗車賣崔氏女郎棺中金盌大家即崔氏親姨母也遣兒視之果如婢言乃語充曰昔我姨嫁少府生女未出而亡家親痛之贈一金盌著棺中可説得盌本末充以事對此兒亦為悲咽賫還白母母即令詣充迎兒還諸親悉集兒有崔氏之狀又復似充之貎兒盌俱驗姨母曰我外甥也即字温休温休者葢幽婚也遂成令器歴郡守其後植子毓有名又曰臨川間諸山有妖物來常因大風雨有聲如嘯能射人其所著者有頃便腫大毒有雌雄雄急而雌緩急者不過半日間緩者經宿其旁人常有以救之救之少遲則死俗名曰刀勞鬼又曰永昌郡不韋縣有禁水水有毒氣唯十一月十二月可渡渉自正月至十月不可渡渡輙病殺人其氣有惡物不見其形作聲如有所投擊中木則折中人則害俗人名鬼弹文士𫝊曰左思初作蜀都賦曰鬼弹飛丸以䃒礰後又改易無此語又南中八部志曰永昌郡有禁水水有惡毒氣中物則有聲中樹木則折名鬼彈中人則奄然青爛又曰下邳周式嘗至東海道逄一吏持一卷書求式寄載行十餘里謂式曰吾蹔有所過留書寄船中慎勿發之去後式盗發視書皆諸死人録下條有式名須臾吏還式猶視書吏怒曰故以相告而勿視之式叩頭流血吏良久曰感卿逺相載此書不可除卿今日已去還家三年勿出門可度也勿道見吾書式還不出已二年餘家人皆怪之鄰人卒父怒使弔之式不得已適出門便見此吏吏曰吾令汝三年勿出今復奈何吾求汝不見連年為得鞭杖今已見汝無可奈何三日中當相取也式還涕泣具道如此父故不信母晝夜與相守涕泣至三日日中時即死續捜神記曰淮南胡茂回能見鬼雖不喜見而不可止後行至揚州還歴陽城東有神祠中正值民將巫祝祀之須臾羣鬼叱曰上官來各走出祠去回顧見二沙門來入祠中諸鬼兩兩三三相抱持在祠邊草中望沙門皆怖懼須臾沙門去鬼皆還祠中回於是遂奉佛又曰王伯陽家在京口家東有大冢𫝊是魯肅墓伯陽婦䘮乃平其墳以葬後數年伯陽白日在聽事見一貴人乗平肩輿將從數百人徑來坐謂伯陽曰吾是魯子敬安冢在此二百許年君何致毁壊吾冢因目左右何不舉手左右牽伯陽下牀以刀環擊之數百而去登時絶死良久乃蘇其斫處皆發疽潰尋死又曰㑹稽句章人東野還暮不及至家見路旁小屋燃火投宿止有一少女不欲與丈夫共宿呼隣人家女自伴夜共弹箜篌戯歌曰連綿葛上藤一綏復一絙汝欲知我姓姓陳名阿登明至東郭外有賣食母在市中此人寄坐因説昨夜所見母聞阿登驚曰是我女近塟於郭外又曰施續為尋陽督能言論有門生亦有理意嘗秉無鬼論忽有黑衣白袷客來言及鬼客詞屈曰僕便即鬼何以言無使來取君門生酸苦求之客問有似君者不門生云施續帳下都督與僕相似鬼許之俄而督亡鄧得名南康記曰山都形如崑崙通身生毛見人輒閉眼張口如笑好在深澗中翻石覔蟹噉之又曰木客頭面語聲亦不全異人但手脚爪如鈎利髙岩絶峰然居之能斫榜牽著樹上聚之昔有人欲就其買榜先置物木下隨量多少取之若合其意便將去亦不橫犯也但終不與人面對交語作市死皆知殯歛之不令人見其形也葬棺法每在髙岸樹杪或藏石窠中南康三營代船兵往説親覩葬所舞倡之節雖異於世聽於風林汎響類歌吹之和義熙中徐道覆南出遣人伐榜以裝舟艦木客乃獻其榜而不得見述異記曰南康有神名曰山都形如人長二尺餘黒色赤目髮黃被之於深山木下作窠窠形如堅鳥卵髙三尺許内甚澤五色鮮明二房間之中央相連土人云上者雄舍下者雌室傍悉開口如規體質虛輕頗作木筒中央以鳥毛為褥此神能化隐身罕覩其狀盖木客山㺑之類也贛縣西北十五里有古塘名全公塘上有大梓樹可二十圍樹老中空有山都焉晉元嘉元年縣治民哀道訓道虛兄弟二人伐倒此樹取窠還家山都見形謂二人曰我處荒野何預汝事巨木可用豈可勝數樹有我窠故伐倒之今當焚汝宇以報汝之無道至二更中内外屋上一時火起合宅蕩盡志怪曰㑹稽郡常有大鬼長數丈腰大數十圍髙冠𤣥衣郡將吉㐫跂于雷門示憂喜之色謝氏一族憂喜必告宏道未遭母難數月鬼晨夕來臨及後轉吏部尚書拊掌三節舞自大門至中庭尋而遷問至又曰夏侯宏忽行江陵逄一大鬼投弓㦸急走小鬼數百從之宏畏懼下路避之大鬼過後捉一小鬼問此是何物曰廣州大殺宏曰以此矛㦸何為曰以此殺人若中心腹者輙死中餘處不至於死宏曰治此病者有方不鬼曰殺烏鷄薄心即差宏曰今欲行何地鬼曰當荆揚二州爾時二州皆行心腹病略無不死者宏在荆州教人殺烏鷄薄之十得八九今中惡用烏鷄自宏之由也本草曰梟桃在樹不落者殺百鬼也張衡東京賦曰度朔作梗守以鬱壘神荼副焉對操索葦太平御覧卷八百八十四
