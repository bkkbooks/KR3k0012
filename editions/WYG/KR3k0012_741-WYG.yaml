body:
  text: 太平御覽卷七百四十一宋李昉等撰疾病部四頭痛心痛腹痛咽痛并噎煩懣勞悸眩暍頭痛毛詩伯兮曰願言思伯甘心首疾又小弁曰心之憂矣疢如疾首周官疾醫曰春時有痟首之疾史記曰西域有大小頭痛山赤土身熱之坂令人頭痛嘔吐風俗通曰田家老母市餅置道邉石人頭上既而忘之人以為神能治病轉以相語頭痛者磨石人頭腹痛者磨石人腹後餅母為說乃止心痛易說曰冬至氣當至不至則多心痛左傳昭上曰醫和謂晉侯曰明滛心疾北史曰裴訥之為平原公開府功曹掌書記從至并州其母在鄴忽得心痛訥之是日不勝思慕心亦驚痛乃請急而還當時以為孝感唐書曰劉敦儒母有心痛疾日須鞭箠數人乃安子弟僕使不堪其苦唯敦儒侍養不懈體常流血莊子曰西施病心而嚬其里醜人見而美之歸亦捧心而嚬其里之富人見之堅閉門而不出貧人見之挈妻子而走賈誼書曰楚惠王食寒葅中有水蛭雖欲發之恐宰夫得罪當死遂吞之因得心疾甚乃言所中令尹賀曰隂徳必須陽報是夜惠王欬而蛭出心腹之病皆除俗説曰阮光祿大兄喪哀過遂得失心病服除後經年病瘳續捜神記曰李子豫少善醫方當代稱其通靈許永為豫州刺史鎮歴陽其弟患心腹堅痛十餘年殆死忽自夜聞屏風後有鬼謂腹中鬼曰何不促殺之不然明日李子豫當從此過以赤丸打汝汝其死矣腹中鬼對曰吾不畏之於是許永使人候子豫果來未入門病者自聞腹中呻吟聲及子豫入視曰鬼病也遂於巾箱中出八毒赤丸子與服須㬰腹中雷鳴鼓轉大利數行遂差今八毒丸方是也幽明録曰顧長康在江陵愛一女子還家長康思之不已乃畫作女形簮著壁上簮處正刺心女行十里忽心痛如刺不能進腹痛左傳宣下曰楚子伐蕭蕭潰還無社與司馬夘言號申叔展還無社蕭大夫司馬邜申叔展皆楚大夫也無社欲叛以求免死無社素識叔展故因夘使呼之叔展曰有麥麴乎曰無有山鞠窮乎曰無麥麴鞠窮所以禦濕河魚腹疾柰何言無禦濕藥將病曰目於眢井而拯之無社意觧欲入井故使叔展視虛廢井而求拯左傳曰晉侯有疾秦醫云雨滛腹疾捜神記曰淮南書佐劉雅夢見青蜥蜴從屋落其腹内因苦腹痛病華佗别傳曰有人病腹中切痛十餘日鬚眉落佗令破腹視脾果半腐壞刮去惡以膏傅瘡飲之以藥百日平復咽痛并噎易曰大寒氣當至而不至則多咽痛漢書曰昌邑王被徴至長安左右令哭王曰吾嗌痛不肯哭魏志曰有人病咽塞嗜食而不下華佗令取餅家蒜虀大酢頓飲三升即吐一蛇便差事具醫門山海經曰單張之山有鳥曰雅食之已嗌戰國䇿曰噎而後穿井何及於急續漢書禮儀志曰三老五更仲秋之月賜以玉杖端以鳩為飾鳩者不噎之鳥欲老人不噎也晏子曰夫愚人多悔不肖者自賢猶臨難而遽鑄兵臨噎而遽掘井雖速無及淮南子曰有以噎死者而禁天下之食有以車為敗者而禁天下之乗不亦悖哉廣五行記曰永徽中絳州有一僧病噎都不下食如此數年臨終命其子弟云吾氣絶之後便可開吾胷喉視有何物欲知其根夲言終而卒子弟依其言開視胷中得一物形似魚而有兩頭遍體悉是肉鱗子弟致鉢中跳躍不止戯以諸味致鉢中雖不見食須㬰悉化成水又以諸毒藥内之皆隨銷化時夏中炎熱寺衆於水次作淀有一僧住因以少淀致鉢中此蟲怖懼遶鉢馳走須㬰化成水世傳以淀水療噎煩懣方言曰朝鮮洌水之間煩懣謂之漠漫魏志陳登得胷中煩懣華佗謂曰府君胃中有蟲數升欲成肉疽即為作湯治之吐三升許蟲赤頭而動半猶是鱠事具醫門勞悸漢書曰太師王舜自莽簒位後病喘悸浸劇遂死宋書曰文帝有虛勞疾意有所悸便覺心中痛裂沈約宋書曰何尚之患勞疾積年飲婦人乳乃瘥世說曰殷仲堪父病虛悸聞床下蟻動云是牛鬪孝武不知殷父問有一殷病如此不仲堪流涕而起又曰衛玠從豫章下都人先聞其姿容觀者如堵墻玠先有病不堪勞遂病發死時人謂之看殺衛玠張奐與孟季衛書曰素苦悸逆頃者益甚百病所歸月衰日損眩釋名曰眩懸也目視動亂如懸物揺揺然不定也東觀漢記曰光武避正殿讀圗䜟坐簾下淺露中風吐眩彌甚有曰大司馬亦病如此自强從公而便疾愈於是車駕行數里病差又曰建武五年上風眩發甚以隂興為侍中受詔雲臺廟室典畧曰陳琳作諸書及檄草成呈太祖太祖先苦風眩是日發讀琳所作翕然而起曰此愈我疾王隠晉書曰庾袤字叔褎入林慮山中塗而眩發倚巖而坐柱杖將起跌墜崖而死華佗别傳曰佗見嚴昕語之曰君有急風見於面勿多飲酒坐罷歸昕於道中卒得頭眩墜車輿著車上歸家一宿死佗使解衣倒懸令頭去地一二寸濡巾拭體令周匝候視諸脉盡出五色佗令弟子數人以鈹刀决脉五色盡是赤血出乃以膏摩之覆被汗出飲以亭歴大血散立愈異􅁐曰上虞孫溪奴多伎治人頭風流血滂沱噓之便斷暍京房易飛侯曰有雲大如車盖十餘此陽滲之氣必暑有暍死也淮南子曰文王塟死骸而九夷順武王䕃暍人於樹下而天下懷越王决獄不當㧞刀自割而戰士畢死感於恩也抱朴子曰指氷室不能起暍死之熱望炎冶不能止噤凍之寒太平御覽卷七百四十一
