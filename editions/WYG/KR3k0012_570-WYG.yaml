body:
  text: 太平御覽卷五百七十宋李昉等撰樂部八歌一釋名曰人聲曰歌歌柯也以聲吟詠有上下如草木有柯葉充言歌聲如柯也爾雅曰徒歌謂之謡尚書曰帝庸作歌曰勅天之命惟時惟㡬因庶尹允諧故作歌以戒之安不忘危也勅正也奉天命以臨人惟在順時惟在慎㣲也乃歌曰股肱喜哉元首起哉百工熙哉元首君也股肱之臣喜樂盡忠君之理功乃起百王之業乃賡載歌曰元首明哉股肱良哉庶事康哉賡續載成也帝歌歸矣股肱乃安以成其美又歌曰元首叢脞哉股肱惰哉萬事隳哉叢脞細碎無大畧曰君如此則臣懈萬事隳廢其功不成歌以申戒也脞音倉果反又曰九功惟序九序惟歌六府三事之功次序皆可歌樂乃徳政之致也勸之以九歌俾勿壞六府三事之功决壞在此三者而已又曰禹曰於帝念哉徳惟善政政在飬民水火金木土榖惟修政徳利用厚生唯和九功惟叙九叙惟歌又曰詩言志歌永言聲依永律和聲又五子之歌曰太康尸位以逸豫畋於有洛之表十旬不反厥弟五人御其母於洛之汭五子咸怨述大禹之戒以作歌其一曰怨豈在明不見是圖為人上者奈何不敬其二曰内作色荒外作禽荒甘酒嗜音峻宇雕墻有一於此未或弗亡其三曰惟彼陶唐有此冀方今失厥道亂其紀綱乃底滅亡其四曰明明我祖萬邦之君有典有則貽厥子孫荒墜厥緒覆宗絶祀其五曰嗚呼曷歸予懷之悲萬姓仇予予將疇依欎陶乎予心顔厚有忸怩弗慎厥徳雖悔可追毛詩曰情動於中而形於言言之不足故嗟歎之嗟歎之不足故詠歌之詠歌之不足故不知手之舞之足之蹈之也又葛屨園有桃曰心之憂矣我歌且謡又谷風四月曰君子作歌惟以告哀禮記曰子貢問師乙曰賜也聞聲歌各有宜也如賜者宜何歌也師乙曰乙賤工也何足以問其所宜請誦其所聞而吾子自執焉寛而静柔而正者宜歌頌廣大而静疏逹而信者宜歌大雅恭儉而好禮者宜歌小雅正直而静亷而謙者宜歌風肆直而慈愛者宜歌商温良而能㫁者宜歌齊夫歌者直已而陳徳也動已而天地應焉四時和焉星辰理焉萬物育焉故商者五帝之遺聲也商人識之故謂之商齊者三代之遺聲也齊人識之故謂之齊明乎商之音者臨事而屢㫁明乎齊之音者見利而能讓臨事而屢㫁勇也見利而能讓義也有勇有義非歌孰能保此故歌者上如抗下如隊曲如折止如槁木倨中矩句中鈎纍纍乎端如貫珠故歌之為言也長言之也説之故言之言之不足故長言之長言之不足故嗟歎之嗟歎之不足故不知手之舞之足之蹈之也又檀弓曰原壤之母死登木歌曰狸首之班然執女手之巻然又樂記曰昔者舜作五絃之琴以歌南風又檀弓上曰孔子蚤作負手曳杖逍遥於門歌曰泰山其頺乎梁木其壞乎哲人其萎乎又曰魯人有朝祥而暮歌者子路笑之又曰歌者在上匏竹在下貴人聲也又曰奠酬而工升歌發徳音也周禮春官曰太師大祭祀師瞽登歌小師掌教絃歌教調教瞽矇出音絃謂琴瑟歌依詠詩也左傳哀二十一年八月公及齊侯邾子盟于顧齊人責稽首因歌之曰魯人之皋數年不覺使我髙蹈言魯人皋綏數年不知荅齊稽首故使我髙蹈來為此㑹唯其儒書以為二國憂又曰昭公十二年南蒯將適費飲鄉人酒鄉人或歌之曰我有圃生之祀乎從我者子乎去我者鄙乎倍其隣者恥乎已乎已乎非吾黨之士乎又曰哀五年秋齊景公卒冬十月公子嘉公子駒公子黔奔衛公子鉏公子陽生來奔皆景公子在莱者莱人歌之景公死乎不與埋三軍之事乎不與謀師乎師乎何黨之乎又曰襄四年崔子稱疾不視事公問崔子遂從姜氏入於室公拊楹而歌歌以命姜氏論語曰子與人歌而善必使反之而後和之又曰楚狂接輿歌而過孔子曰鳳兮鳳兮何徳之衰往者不可諌来者猶可追已而已而今之從政者殆而又曰子於是日哭則不歌史記曰古詩三千餘篇孔子曰其重句施於禮上採契后稷中述殷周幽厲之缺始於袵席故曰闗雎以為風之始鹿鳴小雅始文王為大雅始清廟為頌始三百五篇皆絃歌以求合韶武雅頌之音禮樂自此可得而述又曰漢家常以正月上辛祠太一甘泉夜到明忽有流星至於祠壇上使童男女七十人俱歌有得神馬渥洼水中為太一歌曰太一貺兮天馬下沾亦汗兮沬流赭今安疋兮龍為友後伐大宛得千里馬蒲桃為歌曰天馬来兮從西極經萬里兮歸有徳承靈威兮降外國涉流沙兮四夷服又曰箕子朝周過故殷墟咸生黍箕子傷之欲哭則不可欲泣則近婦人乃作麥秀之詩以歌詠之曰麥秀漸漸兮禾黍油油彼狡童兮不我好仇所謂狡童者紂也民為流涕又曰淳于髠見梁惠王王屏左右見之終無言王讓之髠曰王志在音吾是以黙也王㑹有謳歌者未及言之也又曰趙武靈王夣見處女鼓琴而歌曰美人熒兮顔若苕之榮命乎命乎曽無我嬴旦日王飲酒樂數言所夢想見其狀吳廣聞之内其女娃嬴孟姚也甚有寵立為后又曰武王克殷伯夷叔齊恥之不食周粟隐首陽山作歌曰登彼西山兮言采其薇兮以亂易暴兮不知其非神農虞夏忽焉沒兮我適安歸兮又曰項羽軍壁垓下兵少食盡軍四面皆楚歌應劭曰椘歌者鷄鳴時歌也項王乃驚曰漢已皆得楚乎是何楚人之多也項王乃悲歌慷慨曰力㧞山兮氣盖世時不利兮騅不逝騅不逝兮可奈何虞兮虞兮奈若何漢書曰李延年善歌帝幸之時人語曰一雌復一雄雙飛入紫宫又曰孝惠帝所教歌兒百二十人有缺輙補又曰田横齊王建之親族也秦滅六國田氏悉為庶人髙祖遣韓信破齊後定天下田横乃與五百人深居海島髙祖即位遣使者徴之横與將士俱至尸鄉亭頓止横乃奮躍自刎而死從者不敢哭遂歌以寄之今之挽歌起於此矣又曰張釋之為中郎將從行至霸陵是時慎夫人從上指視慎夫人新豐道曰此走邯鄲道也使慎夫人鼓瑟上自倚瑟而歌又班固頌論功歌詩靈芝歌曰因露寢兮産靈芝象三徳兮瑞應圖延夀命兮光此都配上帝兮象太㣲叅日月兮揚光輝又曰武帝幸雍祠五畤獲白麟作白麟之歌又曰上幸行河東祠后土顧視帝京忻然中流歌曰秋風起兮白雲飛草木黄落兮雁南歸蘭有秀兮菊有芳懷佳人兮不能忘汎樓船兮濟汾河横中流兮揚素波簫鼓鳴兮發擢歌歡樂極兮哀情多少壯㡬時兮奈老何又曰孝武帝廵狩至於盛唐尋陽浮江親射蛟江中獲之舳艫千里薄樅陽而出作盛唐樅陽之歌又曰惠帝立皇太后廼令戚夫人髠鉗衣赭舂舂且歌曰子為王母為虜終日舂薄暮常與死為伍相離三千里當使誰告汝太后聞之大怒曰乃欲倚汝子耶遂鴆殺趙王㫁戚夫人手足去眼薫耳名曰人彘又曰漢以江都王女昭君妻烏孫悲愁自作歌曰吾家嫁我兮天一方逺托絶國兮烏孫王穹廬為室兮氊為牆以肉為食兮酪為漿居常悲思兮心内傷願為黄鵠兮歸故鄉又曰燕王旦謀反事敗王憂懣置酒方載宫㑹賓客羣臣妾坐飲王自歌曰歸空城兮狗不吠鷄不鳴横術何廣兮固知中國之無人華容夫人起舞歌曰髪紛紛兮寘渠骨藉藉兮亡居母求子兮妻求夫徘徊兩渠間兮君子獨安居又曰廣陵王胥祝詛事發覺有司按驗有實使者反及置酒顯陽殿召太子霸及子女董訾胡生等夜飲使所幸八子郭昭君家人子趙左君等王自歌曰乆生兮無終長不樂兮安窮奉天期兮不得湏臾千里馬兮駐待路黄泉下兮幽深人生要死兮何為苦心可用為樂兮心所喜出入無踪兮為樂極蒿里召兮郭門閱死不得取伐兮庸身自折又曰元帝自度曲被歌注云聲終更授其次曰度曲度曲未終雲起雪飛是也謝承後漢書曰祭遵為將取士皆用儒術對酒設樂必雅歌投壺東觀漢記曰朱酺明帝時為益州刺史移書屬郡喻以聖徳白狼王等百餘國重譯来庭歌詩三章酺獻之後魏書曰鄭道昭字僖伯兼中書侍郎從征河北髙祖饗侍臣懸匏於大竹堂道昭兄懿居侍坐樂作酒酣髙祖乃歌曰日月光天兮無不曜江左一隅兮獨未照彭城王勰續歌曰願從聖主兮登衡㑹萬國馳誠兮混日外鄭懿歌曰雲雷大振兮天地闢率土来賓兮一正厯邢巒歌曰舜舞干戈兮天下歸文徳逺被兮莫不思鄭道昭歌曰皇風一鼔兮九地匝載日依天兮清六合髙祖又歌曰遵彼汝墳兮昔化貞未若今日兮道風明宋弁歌曰文王政教兮暉江沼寜知大化兮光四表吴書曰留贊初為將臨敵必先披髪呌天因抗音而歌左右應之乃進戰晉書曰三月上巳日㑹稽夏統字仲御入洛市樂太尉賈充問曰卿能土地曲乎統曰百姓懷君恩作慕歌為孝女曹娥作河女之章為伍子胥作小海唱今欲歌之充曰善乃以足扣舷舡引聲轉喉清激慷慨大風應至含水激天雲雨響集充曰聼慕歌之聲便髣髴見大禹之容聞河女之音不覺涕泣交下即謂伯嫗髙行在目前聆小海之唱謂子胥屈平立吾之左右又曰袁山松善音樂舊歌有行路難曲詞頗踈質山松乃文其辭句婉其節制因酣歌之聞者流涕又曰應詹督南平天門武陵三郡事時政令不一諸蠻怨望並謀背叛詹召蠻酋破銅劵與盟由是懷詹數郡無虞其後天下大亂詹境獨全百姓歌之曰亂離既普始為灰朽僥倖之運頼兹應后嵗寒不彫孤境獨守拯我塗炭惠隆丘阜潤同江海恩猶父母又曰山簡慠誕好酒嘗止襄陽習公池日晚醉歸自歌曰山公時一醉遥造髙陽池日暮倒載歸酩酊無所知時復能騎馬倒着白接籬舉頭問葛强何如并州兒晉陽秋曰髙祖伐公孫淵過本縣賜牛酒榖帛郡守典農㑹墓次父老故舊讌飲髙祖作歌曰天地開闢日月重光今遭際㑹奉辭遐方將掃逋穢還過故鄉肅清萬里搃齊八荒告成歸老待罪舞陽鄧粲晉紀曰太子洗馬郭訥字敬言嘗入洛觀伎人歌言佳石崇問其曲訥不知崇笑卿不識曲那得言佳訥答譬如見西施何必識其姓名然後知美崇無以難崔鴻十六國春秋曰初苻堅二十五年滅燕慕容冲姊清河公主年十四有殊色堅納之寵冠後庭冲時年十二亦有龍陽之美堅又幸之姊弟專寵宫人莫進長安中歌之曰一雌與一雄雙飛入紫宫咸懼為亂王猛切諌乃出冲冲卒為堅賊又前燕録曰慕容廆父涉歸分戸以封長庻子吐谷渾分馬以給之及廆嗣位而二部馬闘廆怒遣使讓渾曰先公分建有别奈何不相逺離而令馬有闘傷渾曰馬飲食水草闘其常性何故怒及於人兄弟至親而闘起於馬當去汝萬里於是遂西移八千里廆後悔之遣乙那樓追渾謝之乃擁迴渾馬馬東行數百步輙悲鳴西奔衝突山谷如是者十餘曰此非人事遂附隂山面黄河晉永嘉之亂南遷隴右廆以孔懷之思作吐谷渾阿干歌嵗暮窮思常歌之及雋垂僣號以為輦後大曲孟嘉别傳桓温問嘉曰聽伎絲不如竹竹不如肉何謂也荅曰漸近自然一坐咨嗟晉書曰孝武太元中琅琊王軻之家有鬼歌子夜殷允為章郡僑人庾僧度家亦有鬼歌子夜殷允為章郡亦是太元乎則子夜此時以前人齊書曰蕭惠基解音律尤好魏三祖曲及相和歌每奏輙賞恱不能已也梁書曰羊侃有伎孫荆玉能反腰帖地銜得席上玉簮勅賚歌人王娥兒東宫亦賚歌者屈偶之並妙盡竒曲一時無對唐書曰劉禹錫泛朗州司馬蠻俗好巫每滛詞鼔舞必歌俚辭禹錫或從事於其間乃依騷人之作為新詞以教巫祝故武陵谿洞間夷歌率多禹錫之詞也又曰開元中歌工長孫元忠之祖受於侯將軍貴昌并州人也亦代習北歌貞觀中有詔令貴昌以其聲教樂府元忠之家代相傳習如此雖譯者亦不能通知其辭盖年嵗乆逺失其真矣絲桐唯琴曲有胡笳聲太平御覽卷五百七十
