body:
  text: 太平御覽卷七十九宋李昉等撰皇王部四黄帝軒轅氏少昊金天氏顓頊髙陽氏黄帝軒轅氏史記曰黄帝者少典之子姓公孫名軒轅諸侯有不順者從而征之未嘗寧居東至于海登丸山及岱宗西至崆峒登雞頭山南至江登熊湘北逐葷粥合符釜山而邑于涿鹿之阿遷徙無常處以師兵為營衞官名皆以雲置左右大監監于萬國獲寳鼎舉風后力牧常先大鴻以治民有土德之瑞故號曰黄帝有二十五子其得姓者十四人黄帝居軒轅之丘而娶於西陵氏之女是為嫘音縲祖為正妃生二子其後皆有天下其一曰𤣥囂是為青陽降居江水其二曰昌意降居弱水昌意娶蜀山氏女曰昌僕生髙陽髙陽有聖德焉黄帝崩葬橋山其孫昌意之子髙陽立是為帝顓頊又封禪書曰黄帝採首山銅鑄鼎於荆山下鼎既成有龍垂胡髯下迎黄帝黄帝上騎羣臣後宫從上者七十餘人餘小臣不得上乃悉持龍髯龍髯拔墮墮帝之弓百姓仰望帝既上乃抱其弓與龍髯而號故後世因名其處曰鼎湖其弓曰烏號又曰漢武帝北遂巡狩還祭黄帝冢上曰吾聞黄帝不死今有冢何也或對曰黄帝已僊上天羣臣葬其衣冠耳帝王世紀曰黄帝有熊氏少典之子姬姓也母曰附寶其先即炎帝母家有蟜氏之女世與少典氏婚故國語兼稱焉及神農氏之末少典氏又取附寶見大電光繞北斗樞星照郊野感附寶孕二十五月生黄帝於壽丘長於姬水龍顔有聖德受國於有熊居軒轅之丘故因以為名又以為號與神農氏戰于阪泉之野三戰而克之力牧常先大鴻神農皇鉅封直人鎮火山稽鬼臾區封胡孝甲等或以為師或以為將分掌四方各如已視故號曰黄帝四佐又使岐伯嘗味百草典醫療疾今經方本草之書咸出焉其史倉頡又取像鳥跡始作文字史官之作蓋自此始記其言行䇿而藏之名曰書契黄帝一號帝鴻氏或曰歸藏氏或曰帝軒氏姬姓有四妃生二十五子在位百年而崩年百一十嵗又曰神農氏衰黄帝修德化民諸侯歸之黄帝於是乃擾馴猛獸與神農氏戰于阪泉之野三戰而克之又徵諸侯使力牧神皇直討蚩尤氏擒之于涿鹿之野使應龍殺之于凶黎之丘凡五十五戰而天下大服或傳以為仙或言壽三百嵗葬于上郡陽周之喬山鬻子曰黄帝年十嵗知神農之非而改其政春秋内事曰軒轅氏以土德王天下始有堂室髙棟深宇以避風雨孝經鈎命訣曰附寶出降大靈生帝軒附寶帝軒母也電黄精軒轅氣也軒皇帝名附或作付也古史考曰有熊氏已姓或曰姓公孫山海經曰有人衣青名曰黄帝女妖青魅旱鬼也蚩尤作兵伐黄帝黄帝乃令應龍攻之冀州之野冀州中土應龍蓄水蚩尤請風伯雨師從大風雨黄帝乃下天女曰妖雨止遂殺蚩尤歸藏曰昔黄帝與炎神爭鬭涿鹿之野將戰筮於巫巫咸曰果哉而有咎易下繫曰黄帝垂衣裳而天下治蓋取諸乾坤河圖握樞曰黄帝名軒北斗黄帝之精母地祗之女附寶之郊野大電繞斗樞星耀感附寶生軒胷文曰黄帝子河圖挺佐輔曰黄帝修德立義天下大治乃召天老而問焉余夢見雨龍挺白圖即帝以授余於河之都覺昧素善不知其理敢問於子天老曰河出龍圖雒出龜書紀帝録列聖人之紀姓號興謀治平然後鳯凰處之今鳯凰已下三百六十日矣古之圖紀天其授帝圖乎黄帝乃祓齋七日衣黄衣冠黄冕駕黄龍之乗戴蛟龍之旗天老五聖皆從以遊河洛之間求所夢見者之處弗得至於翠媯之淵大鱸魚沂流而至乃問天老曰子見夫中河流者乎曰見之顧問五聖皆曰莫見乃辭左右獨與天老跪而迎之五色畢具天老以授黄帝黄帝舒視之名曰録圖龍魚河圖曰黄龍負圖鱗甲成字從河中出付黄帝令侍臣自冩以示天下又曰黄帝攝政時有蚩尤兄弟八十一人並獸身人語銅頭鐵額食沙石子造立兵仗刀㦸大弩威振天下誅殺無道不仁不慈萬民欲令黄帝行天子事黄帝仁義不能禁止蚩尤遂不敵仰天而歎天遣𤣥女下授黄帝兵信神符制伏蚩尤以制八方蚩尤歿後天下復擾亂不寧黄帝遂畫蚩尤形像以威天下天下咸謂蚩尤不死八方萬邦皆為弭伏尚書中候曰帝軒提像配永循機軒轅黄帝名永長也循順也黄帝軒轅觀攝提之像配而行之以長為順升機為政焉天地體通五行期化體美也天地美氣相通行應四時之期而變化河龍圖出龍銜圖而出也洛龜書成龜負書而出成則也赤文像字以授軒轅韓詩外傳曰黄帝召天老而問鳯像何如天老曰夫鳯像鴻前而麟後蛇頭而魚尾龍文而鷄身燕頷而鷄啄黄帝乃齋于中宫鳯蔽日而至黄帝降于東階西面再拜稽首皇天降祉敢不承命鳯乃止帝東園詩含神霧曰大電繞樞照郊野感附寶生黄帝大戴禮曰宰我問於孔子曰昔者予問諸榮君黄帝三百年請問黄帝人也抑非人耶何以至於三百年孔子曰黄帝少典之子也曰軒轅生而神靈弱而能言教熊羆貔貅豹虎以與赤帝大戰于阪泉之野三戰然後得行其志黄帝黼黻衣大帶斧裳乗龍駕雲勞懃心力耳目節用水火財物生而民得其利百年死而民得其神百年亡而民得其教百年故曰三百年傳曰黄帝以雲紀故為雲師而雲名春秋元命苞曰黄帝龍顔得天庭陽上法中宿取象文昌戴天履隂秉數制剛管子曰黄帝得蚩尤而明乎天道得太常而察乎地利得蒼龍而辨乎東方得祝融而辨乎南方得大封而辨乎西方得后土而辨乎北方黄帝得六相而天下治又曰黄帝鑚燧生火以熟葷臊民食之無腸胃之病列子曰黄帝即位十有五年竭聰明盡智力營百姓燋然肌色皯古旱切黣音妹昏然五情爽惑用聰明未足以致治祗足以亂神也黄帝乃喟然歎曰朕之過淫矣淫當作深養一已其患如此治萬物其患如此惟任而不養縱而不治則性命自全天下自安於是放萬機舎宫寢去直侍徹鍾懸减厨膳退而閒居大庭之館齋心服形三月不親政事晝寢而夢遊於華胥氏國華胥氏國在弇州之西台州之北不知斯齊國幾千萬里斯離也齊中也蓋非舟車足力之所及神遊而已其國無師長其民無嗜慾不知樂生不知惡死故無夭傷不知親己不知疎物故無憎愛不知背逆不知向順故無利害都無所愛憎都無所畏忌入水不溺入火不熱斫撻無傷痛至和者無物能傷溺熱痛癢寳由矜恤也乗空如履實寢虚若處牀雲霧不閡其視雷霆不亂其聽美惡不汩其心山谷不躓其步神行而已黄帝既悟怡然自得又二十有八年天下大治幾若華胥氏之國而帝登假假當為遐莊子曰北門成問於黄帝張咸池之樂於洞庭之野吾始聞之而懼復聞之而惑帝曰吾奏之以人徴之以天行之以義禮建之以太清又曰黄帝將見大隗于具茨之山方明為御昌寓驂乗張若隰朋前馬昆閽滑稽後車至於襄城之野七聖皆迷無所問途適遇牧馬童子問途焉曰若知具茨之山乎曰然若知大隗之所存乎曰然黄帝曰異哉小童非徒知具茨之山又知大隗之所存請問為天下小童辭黄帝又問小童曰夫為天下者亦奚以異乎牧馬者哉亦去其害馬者而已矣馬以過分為害黄帝再拜稽首稱天師而退又曰黄帝聞廣成子在於崆峒之上故往見之曰敢問至道之精廣成子曰自而治天下雲氣不待簇而雨草木不待黄而落日月之光益以荒矣又奚足以語至道黄帝退捐天下築特室席白茅閒居三月復往邀之廣成子南首而卧黄帝從下風膝行而進再拜稽首而問曰聞吾子達於至道敢問治身奈何而可以長久廣成子蹷然而起曰善哉問乎來吾語汝至道之精窈窈㝠㝠至道之極昏昏黙黙無視無聽抱神以静形將自正我修身千百嵗矣吾形未嘗衰黄帝再拜稽首曰廣成子之謂天矣尸子曰子貢曰古者黄帝四面信乎孔子曰黄帝取合已者四人使治四方不計而耕不約而成此之謂四面韓子曰師曠謂晉平公曰黄帝合鬼神於西太山之上駕象車交六龍畢方並館蚩尤居前風伯進掃雨師灑道乃作為清角之樂淮南子曰黄帝治天下力牧太山稽輔之力牧太山稽輔則黄帝之師也以理日月星辰之道治隂陽之氣節四時之度正律厯之數明上下等貴賤使强不得掩弱衆不得暴寡人民保命不夭能安性命不夭折也嵗時熟而不凶百官正而不私上下調而無尤法令明而不闇輔佐公而不阿卿士公正不阿意曲從田者不侵畔漁者不争隈隈曲深處魚所聚也道不拾遺市不預價城郭不閉邑無盜賊商旅之人相讓以財狗彘吐菽粟於道路而無忿爭之心於是日月精明星辰不失其道風雨時節五榖登熟虎豹不妄噬鷙鳥不妄搏鳯凰翔於庭麒麟遊於郊青龍進駕飛黄伏皂飛黄出西方其狀如狐頂上有角乗之壽千嵗皂􅇫也諸北儋耳之國莫不獻其貢職論衡曰諡法靖民則法曰皇德象天地曰帝皇帝者安民之諡非得道之稱也蔣子萬機論曰黄帝之初養性愛民不好戰伐而四帝各以方色稱號交共謀之邊城日驚介胄不釋黄帝歎曰夫君危于上民安于下主失於國其臣再嫁厥疾之由非養冦耶今處民萌之上而四盜亢衡遞震予師於是遂師營壘以滅四帝向令黄帝若不龍驤虎變而與俗同道則其民臣嫁于四帝矣抱朴子曰黄帝生而能言役使百靈可謂天授自然之體者猶復不敢端坐而得道故渉王屋而受丹經到鼎湖而飛流珠至崆峒而問廣成上具茨而事大隗適東岱而奉中黄入金谷而諮老子論道養則質𤣥素二女精推步則訪山稽力牧講占候則詢風后著述作則受雷岐審攻戰則納五音之䇿窮神姦則記四澤之亂相地理則書青鳥之說救傷殘則綴金冶之術故能畢記秘要窮盡道真又曰昔黄帝東到青丘過風山見紫府先受三皇内文以勑召萬神南到負隴䕃連木觀百靈之所登採若㦸之華飲丹巒之水西見中黄子受九品之方過崆峒從廣成子受自然之經北到洪隄上具茨見大隗君黄蓋童子授神芝圖還陟王屋得神丹注說到峨嵋山見皇人於玉堂又曰汲郡冢中竹書言黄帝既仙去其臣有左徹者削木為黄帝之像帥諸侯朝奉之故司空張茂先撰博物志亦云黄帝仙去其臣思戀罔極或刻木立像而朝之或取其衣冠而葬之或立廟而四時祠之孫綽子曰黄帝之遊天衢奏鈞天之鼔建日月之旗乗琱雲之輿駕六翼之龍彭祖前驅松喬俠轂光景流而不見長風逐而不及發軔紫宫不崇朝而匝六合也符子曰黄帝將適昆虞之丘中路逢容成子乗翠華之蓋建日月之旗驂紫虬御雙鳥黄帝命方明避路謂容成子曰吾將釣于一壑栖于一丘又曰黄帝謂其友無為子曰我勞天下矣疲於形役請息駕于𤣥圃子其代之無為子曰焉能棄我之逸而為君之勞哉乃攀龍而俱去晉牽秀黄帝頌曰邈矣軒轅應天載靈通幽逺覽觀象設形誕敷厥訓彞倫攸經德從風流化與雲征皇猷允塞地平天成爰登方岳封禪勒成紛然鳯舉龍騰太清違兹九土陟彼髙㝠民斯攸慕涕泗沾纓遐而不墜式頌德聲帝王世紀曰有巢氏以降至黄帝為三皇號中古少昊金天氏帝王世紀曰少昊帝名摯字青陽姬姓也母曰女節黄帝時有大星如虹下流華渚女節夢接意感生少昊是為𤣥囂降居江水有聖德邑于窮桑以登帝位都曲阜故或謂之窮桑帝以金承土帝圖䜟所謂白帝朱宣者也故稱少昊號金天氏在位百年而崩河圖曰大星如虹下流華渚女節氣感生白帝朱宣宋均注云朱宣少昊氏也古史考曰窮桑氏嬴姓也以金德王故號金天氏或曰宗師太昊之道故曰少昊遁甲開山圖曰帝少昊死葬雲陽山傳曰魯昭公十七年郯子來朝昭子問焉曰少皥氏鳥名官何故也郯子曰吾祖也我髙祖少昊摯之立也鳯鳥適至故紀於鳥為鳥師而鳥名鳯鳥氏厯正也𤣥鳥氏司分者也伯趙氏司至者也青鳥氏司啓者也丹鳥氏司閉者也祝鳩氏司徒也鴡鳩氏司馬也鳲鳩氏司空也爽鳩氏司寇也鶻鳩氏司事也五鳩鳩民者也五雉為五工正利噐用正度量夷民者也九扈為九農正扈民無淫者也魏曹植少昊賛曰祖自軒轅青陽之裔金德承土儀鳯帝世官鳥號名殊職别系農正扈民各有品制顓頊髙陽氏史記曰顓頊静淵以有謀䟽通而知事養材以任地載時以像天依鬼神以制義治氣以教化㓗誠以祭祀帝生子曰窮蟬顓頊崩而𤣥囂之孫髙辛立是為帝嚳古史考曰髙陽氏姬姓以水德王帝王世紀曰帝顓頊髙陽氏黄帝之孫昌意之子姬姓也母曰景僕蜀山氏女為昌意正妃謂之女樞金天氏之末女樞生顓頊於若水首戴干戈有聖德父昌意雖黄帝之嫡以德劣降居若水為諸侯及顓頊生十年而佐少昊十二年而冠二十二而登帝位平九黎之亂以水事紀官命南正重司天以屬神北正黎司地以屬民於是民神不雜萬物有序始都窮桑後徙商丘命飛龍効八風之音作樂五英以祭上帝納勝墳氏女娽生老童有才子八人號八愷顓頊在位七十八年年九十一嵗嵗在鶉火而崩葬東郡頓丘廣陽里河圖曰瑶光之星如蜺貫月正白感女樞幽房之宫生黑帝顓頊大戴禮曰宰我曰請問帝顓頊孔子曰顓頊黄帝之孫昌意之子乗龍而至四海北至幽陵南至交阯西濟於流沙東至於蟠木動静之物大小之神日月所照莫不抵厯春秋元命苞曰顓頊併幹上法月參集威成紀以理隂陽併猶重也水精主月參伐主斬刈成功兼此月職重助費以為表也山海經曰黄帝妻嫘祖生昌意降處若水生幹流取倬子曰河女生帝顓頊又曰顓頊死即復蘇淮南子曰顓頊之法婦人不避男子於路者祓之於四達之衢祓音拂除其不祥魏曹植帝顓賛曰昌意之子祖自軒轅始誅九黎水德統天以國為號風化神宣威鴻八極靡不祗虔太平御覽卷七十九
