body:
  text: 太平御覽卷七百十七宋李昉等撰服用部十九鏡鏡臺奩盒多羅嚴器鏡釋名曰鏡景也有光景也廣雅曰鑒謂之鏡𤣥中記曰尹夀作鏡大戴禮曰武王踐阼鏡之銘曰見爾前必慮爾後尚命帝命期曰桀失其玉鏡用之噬虎尚書考靈耀曰秦失金鏡魚目入珠詩邶栢舟曰我心匪鑒不可以茹漢書東方朔𫝊曰郭舎人曰銖籀文章背有組素兩人相見朔能知之為上客朔曰此玉之瑩石之精表如日月裏如衆星兩人相覩見相知情此為鏡魏畧曰夏侯惇從征吕布為流矢所中傷左目時夏侯淵俱為将軍中號惇惡目夏侯惇惡之每照鏡恚發輒撲鏡着地蜀志曰張裕曉相術每舉鏡視面自知刑死未嘗不撲之於地沈約宋書曰劉敬宣八嵗喪母四月八日敬宣見衆人灌佛乃披頭上金鏡以為母灌因悲泣不勝又曰殷仲文在東陽照鏡而不見其頭面旬日而戮又蕭方等三十國春秋曰甘卓将被誅引鏡不見其頭又曰慕容垂攻鄴苻丕遣其從弟龍請救乃遺謝𤣥青銅鏡黄金宛轉繩等以為之信齊書曰綦母􅈿之有一銅鏡背有三公字常語人云徵祥如此何患三公不至又曰陸慧曉遷太子洗馬廬江何㸃常稱慧曉心如照鏡遇形觸物無不朗然梁書曰王珎國武帝起兵東昏召􅈿國以衆還都使出屯朱雀門為王茂先所敗及入城宻遣㕁纂奉明鏡獻誠於梁帝帝斷金以報之後侍宴帝曰卿明鏡尚存黄金何在珎國曰黄金謹在臣肘不敢失墜又曰劉漑子鏡字圓照初在孕其母夢懐鏡及生因以名焉隋書曰文帝委任髙熲後衛右将軍龎晃及将軍盧賁等前後短熲於上上怒之皆被疎出因謂熲曰獨孤公猶鏡也每被磨瑩皎然益明唐書曰太宗謂羣臣曰夫以銅為鏡可以正衣冠以古為鏡可以知興替以人為鏡可以明得失朕常寳此三鏡以防己過今魏徵殂去一鏡矣莊子曰至人之用心也若鏡不将不迎應而不藏故勝物而無傷符子曰心能善知人者如明鏡善自知者如淵蚌鏡以曜明故鑒人蚌以含珠故内照韓子曰古之人目短於自見故以鏡觀面智短於自知故以道正己鏡無見疵之罪道無明過之惡面失鏡則無以正鬂眉身失道則無以知迷惑吕氏春秋曰人之阿甚矣而無所鏡其㓕亡無日矣孰當可鏡其惟士人乎鏡明己也細士明己也大淮南子曰明鏡之始矇然未見形容也及拭之以𤣥錫磨之以白氊則髪眉㣲毛可得而察又曰鏡便於照形承食不如竹簟又曰聖人若鏡不将不迎應而不藏故萬物無傷其得之乃失之也又曰高懸大鏡坐見四鄰又曰人莫鑒於沬雨而鑒於止水者以其静也莫窺形於生鏡而窺形於明鏡者以其易也抱朴子内篇曰或問知将來吉凶為有道乎荅曰用鏡九寸自照有所思存七日則見神仙知千里事也明鏡用一或二謂之日月或用四謂之四規鏡又曰萬物之巧者其精皆能假託人形以炫人惟鏡中不能逃其真形是以入山道士以明鏡徑九寸懸於背有老魅未敢近或後來者視鏡中疑是仙人及山中神者鏡中故知人形蜀王本記曰武都大夫化為女子蜀王娶以為夫人無㡬物故塟於武都以石化鏡一枚表其墓魏名臣高堂隆奏曰陽符一名陽燧取火於日陰符一名陰燧取水於月並入銅作鏡名曰水火之鏡東宫舊事曰皇太子納妃自着衣大鏡尺八寸銀花小鏡尺二寸漆匣盛盖銀華金簿鏡三枚銀龍頭受福蓮華鈎鏁四副魏武帝上雜物疏曰御物有尺二寸金錯鏡一枚皇太子雜純銀錯七寸鑯鏡四枚貴人至公主九寸鐵鏡四十枚鄴中記曰石虎三人臺及内宫中鏡有徑二三尺者純金蟠龍雕飾世說曰晉孝武将軍講孝經謝公兄弟與諸人私相講習車武子欲問謝謂袁羊曰不問則徳音有遺多問則重勞二謝袁曰何嘗見明鏡疲於屢照益部耆舊𫝊曰杜真孟宗周覽求師經歴齊魯資用将乏磨鏡自給南蠻獠人俗曰諸婚姻以奴婢一人為聘無奴婢以銅鏡當人婢吴興郡記曰臨安縣東石鏡山山東有石鏡一徑二尺四寸甚清亮山謙之潯陽記曰廬山東面有一石若鏡懸崖明净照見人形海内士品曰徐孺子嘗事江夏黄公公死往㑹塟家貧無以自致賫磨鏡具自隨賃磨取資然後得前既至祭而退荀悦申鑒曰君子三鑒鑒乎前鑒乎下鑒乎鏡前惟人訓人訓惟明商徳之衰不鑒於湯禹也周秦之弊不鑒於民下也側弁垢顔不鑒於明鏡也古今注曰平帝始元三年延陵西園神寢内御戸座前大鏡皆清液如汗水出牀西京雜記曰高祖入咸陽宫周行府庫有方鏡九寸表裏明澈人直來照之影則側見以手掩心而來即腸胃五臟厯然無礙人有病在内則掩心而照之即知病之所在女子有邪心則膽張目動秦始皇帝以照宫人膽張心動者則殺之又曰宣帝被収繫郡邸獄臂上猶帶史良娣合綵婉轉繩繫身毒寳鏡一枚如八銖錢舊傳此鏡照見妖魅佩之者為天神所福宣帝從危獲濟及紹大位每持此鏡感應如神帝崩鏡不知所在拾遺録曰周穆王時渠國貢火濟鏡廣三尺六寸闇中視物如晝人向鏡語鏡中則響應之也又曰周穆王時有如石之鏡此石色白如月照面如雪謂之月鏡又曰方丈山池泥百煉成金鏡色青可照魑魅洞冥記曰望蟾閣上有青金鏡廣四尺元光中波祇國献此鏡照見魑魅百鬼不能隠形列仙𫝊曰負局先生負石磨鏡局狥吳中街磨鏡得一錢因磨之神仙傳曰河東孫􅀶能引鏡為刀屈刀為鏡劉根别傳曰思形状可以長生以九寸明鏡照面熟視之令自識己身形長令不忘久則身神不散疾惡不入搜神記曰孫䇿既殺于吉每獨自髣髴見其左右引明鏡自照見在鏡中因倍大呌瘡皆裂須臾而死又吳厯曰䇿為許貢客所傷引鏡自照曰面如此尚可建功立事乎因推几大呌瘡裂而卒續捜神記曰文獻曽令郭璞筮已一年中吉凶璞曰當有小不吉利可取廣州二大甖盛水置床帳二角名曰鏡耗以厭之某時撤甖去水如此其災可消至日忘之尋失銅鏡不知所在後撤去水乃見所失鏡在於甖中甖口數寸鏡大尺餘王公後令筮鏡甖之意璞云甖違期故致此妖邪魅所為無他故也使燒車轄而鏡立出又曰林慮山下有一亭人過宿者或病或死常有十許男女各雜衣或白或黒輙來為害有郅伯夷者過宿於此獨坐誦經忽有十餘人來與伯夷並坐因共蒲博於是伯夷宻以鏡照之乃是一羣犬因執燭而起佯誤以燭燒其衣毛乃焦伯夷懐刀殺一人中之遂死成犬餘悉走去神異經曰昔有夫妻将别破鏡人執半以為信其妻與人通其鏡化鵲飛至夫前其夫乃知之後人因鑄鏡為鵲安背上自此始也幽明録曰宫亭湖邊傍山門有石數枚形圓若鏡明可以鑑人謂之石鏡後有行人過以火燎一枚至不復明其人眼乃失明地鏡圖曰欲知寳所在以大鏡夜照見影若光在鏡中者物在下也雲角要占曰厭盗賊法三月以小形銅鏡七枚埋於地秤七百斤土覆之坎深二尺五寸廣一尺五寸築令堅固孟逵與劉封書曰天地生如鏡陸機與弟雲書曰仁夀殿前有大方銅鏡髙五尺餘廣三尺二寸立著庭中向之便寫人形體了了亦怪也秦嘉與婦徐淑書曰頃得此鏡既明且好形觀文藻世所希有意甚愛之故以相與明鏡可以鑒形淑荅書曰今君征未旋鏡将何施有明鏡鑒形當待君至傅咸鏡賦曰從陰位於清商採秋金之剛精醮祝融以致度命歐冶而是營晞日月之光烈儀厥象乎曜靈鏡臺世説曰温嶠為劉越石長史北討劉聰得玉鏡臺嶠從姑劉氏有女美嶠有意自媒數日乃下玉鏡臺姑喜既㛰交禮女曰我固疑是老奴果如所卜也三國典略曰胡太后使沙門靈照造七寳鏡臺合有三十六户每户别有一婦人手各執鏁才下一闗三十六户一時自閉若抽此闗諸門皆啓婦人各出户前魏武雜物疏曰鏡臺出魏宫中有純銀㕘帶鏡臺一純銀七貴人公主鏡臺四晉東宫舊事曰皇太子納妃有玳瑁細鏤鏡臺一宋起居注曰元嘉中韋朗為廣州刺史作銅鏡臺一具御史中丞劉禎請以事追免朗官謝朓詩曰玲瓏類丹檻孤高似𤣥闕對鳯臨清水垂龍掛明月照粉拂紅粧挿花理雲髪玉顔徒自見畏見君情歇古詩曰珊瑚掛鏡爛生光奩後漢書曰陰太后崩明帝性孝愛追慕無已謁原陵帝從席前伏御床視太后鏡奩中物感動悲涕令易脂澤装具左右皆泣莫能仰視焉拾遺記曰陰貴人食𤓰美帝使求之時燉煌獻異𤓰云是空峒靈𤓰又恒山獻巨桃及后崩侍者見銅奩中有𤓰桃之核視之涕零也列仙𫝊曰珠崖令死當還法内珠於闗者死其繼母棄其繫臂珠其男年九嵗好之置鏡奩中皆不知也至海闗吏収得十枚乃母子争死吏遂棄而遺之語林曰范汪致能噉梅人至一斛奩噉須㬰盡也蔡邕表曰賜鏡奩等前後重疊父母於子無以加此魏武上雜物疏曰純銀藻豆奩純銀括鏤奩孫仲寄妹臨亡書曰鏡與粉盆與郎香奩與若欲令其行身如明鏡純如粉譽香盒宋元嘉起居注曰廣州刺史韋朗被彈事有金縷盒二枚銀縷盒二枚劉向别𫝊曰向有盒賦祖台之志怪曰吳中有士大夫行至曲阿囘唐上有一女子便留住宿解臂上金盒繫其肘下令暮便來遂不至更使尋求都無女人過猪欄邊見猪肘有盒多羅纂文曰多羅粉器扶南傳曰扶南國王以純金多羅遺毗騫王嚴器魏武内嚴器誡令曰孤不好鮮飾嚴具用新皮葦笥以黄葦縁中遇亂世無葦笥乃更作方竹嚴具以皂葦衣之麄布褁之此孤平常之用者也内中婦曽置嚴具於時為之推壊今方竹嚴具緑漆甚華好魏武上雜物疏曰油漆畫嚴器一純金㕘帶畫方嚴器一齊書曰宜都王鏗鎮姑熟於時人發桓温女冡得金巾箱織金篾為嚴器條以啓聞鬱林勑以賜之鏗曰今取往物後取今物如此循環爾豈可不熟念使長史蔡約自往脩後纎毫不犯北苑后妃𫝊曰舊儀司飾三人掌簮珥花嚴脩復山陵故事曰梓宫用嚴器五具馬齒嚴器五具汝南先賢𫝊曰戴良嫁女以笥為嚴器秦嘉婦與嘉書曰今奉嚴器中物㡬具陸雲與兄機書曰按行視曹公器物嚴方六七寸髙四寸太平御覽卷七百十七
