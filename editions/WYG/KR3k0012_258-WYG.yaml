body:
  text: 太平御覽卷二百五十八宋李昉等撰職官部五十六良刺史下酷刺史良刺史下唐書曰姜謨拜秦州刺史髙祖謂曰衣錦還鄉古人所尚今以本州相授用荅元功凉州之路近為荒梗宜𢎞方略有以靜之謨至州撫以恩信州人相謂曰吾軰復見太平官府矣盜賊悉來歸首士庶安之又曰顔遊秦遷㢘州刺史封臨沂縣男時劉黒闥初平人多以强暴寡禮風俗未安遊秦撫恤境内敬讓大行邑里歌之曰㢘州顔有道性行同莊老愛人如赤子不殺非時草髙祖璽書勞勉之又曰太宗詔朝集使刺史以上升殿親問上曰卿等在州何以撫教定州刺史薛獻對曰老者國家所養臣每存恤之少者國家所使臣每勸誡之田疇荒廢漸加墾闢禮義既行産業咸振此皆禀之聖化非臣之力太宗曰如公之所奏足稱循良清淨為政朕所望於公等也又曰賈敦頥曹州寃句人也貞觀中厯遷滄州刺史在職清潔每入朝盡室而行惟敝車一乗羸馬數疋覊有闕以繩為之見者不知其刺史也後轉瀛州刺史州界滹沲河及滱水每嵗泛溢漂流民人敦頥奏立堤堰自是無復水患又曰田仁會永徽初累遷郢州刺史以善政聞時屬亢旱仁會自曝祈禱竟獲甘澤其嵗大熟百姓歌之曰父母育我田使君精誠為人上天聞旱田致雨山出雲倉廩既實禮義申但願常在不患貧又曰許景先𫝊開元十三年𤣥宗令宰臣擇刺史之任必在得人景先首中其選自吏部侍郎出為虢州刺史後轉岐州又曰薛大鼎為滄州刺史州界有無棣河隋末填廢大鼎奏開之引魚鹽於海百姓歌之曰新河得通舟檝利直逹滄海魚鹽至昔日徒行今騁駟美哉薛公德滂被大鼎又以州界卑下遂决長蘆及漳衡等三河分洩夏潦境内無復水灾時與瀛州刺史賈敦頥冀州刺史鄭德本俱有美政河北號鐺脚刺史又曰敬暉除衞州刺史時河北新有突厥之冦方秋而修城不輟暉下車謂曰金湯非粟而不守豈有棄收穫而繕城郭哉悉令罷散由是人吏咸謌詠之又曰蕭定大厯中有司條天下牧守課績惟定與常州刺史蕭復濠州刺史張鎰為理行第一其勸農桑均賦税逋亡歸復户口增加定又冠焉又曰段秀實為涇州刺史兼御史大夫四鎮北庭行軍涇原鄭頴節度使三四年間吐蕃不敢犯塞清約率易逺近稱之非公㑹不聽樂飲酒私室無妓媵無贏財退公後端居靜慮而已德宗嗣位就加檢校禮部尚書又曰劉贊子𤣥之孫為浙西都團練判官建中初楊炎作相擢為歙州刺史以勤幹聞有老婦捃拾於叢林之間猛獸將啖㓜女號呼搏而救之母子俱免本道觀察使韓滉奏為異跡加金紫之服累嵗遷常州刺史又李惠登傳李希烈反授惠登兵二千鎮隋州貞元初舉州歸順授隋州刺史兼御史中丞州内遭李希烈等殱殘後野曠無人惠登朴質不知學居官無枝葉率心為政皆與理順利人者因行之病人者因去之二十年間田疇闢户口加諸州奏吏入其境無不謌謡其能又曰韓愈為潮州刺史既視事詢吏民疾苦皆曰郡惡溪有鱷魚卵而化其長數丈食民畜産將盡以是民貧居數日愈往視之令判官秦濟炮一豚一羊投之惡溪祝之曰前代德薄之君棄楚越之地則鱷魚涵淹於此可也今天子神聖四海之外撫而有之况揚州之境刺史縣令之所治出貢賦以供天地宗廟之祀鱷魚豈可與刺史雜處㘹也刺史受天子命守此土而鱷魚悍然不安溪潭食民畜熊豕鹿麞以肥其身以種其子孫與刺史爭為長雄刺史雖駑弱安肯為鱷魚低首下心耶今潮州大海在其南鯨鵬之大蝦蟹之細無不容鱷魚朝發而夕至今與鱷魚約三日乃至七日如頑而不徙為民物害則刺史選材伎吏民操强弓毒矢與鱷魚從事矣祝之夕有暴風雷起於湫中數日惡溪盡涸徙於舊湫西六十里自是潮人無鱷患又曰盧鈞開成元年為廣州刺史御史大夫嶺南節度使南海有蠻舶之利珎貨輻湊舊帥作法興利以致富其為南海者靡不稇載而還鈞姓仁恕為政㢘潔請監軍領市舶使已一不干預自貞元已來衣冠得罪流於嶺表者因而物故子孫貧悴雖遇赦不能自還凡在封内者鈞减俸錢為營槥櫝其家疾病死䘮則為醫藥殯歛孤兒稚女為之婚嫁凡數百家由是山越之俗服其德義不嚴而人化又曰朱敬則為御史冉祖雍所誣貶授廬州刺史經數月代到還鄉里無淮南一物惟有所乘馬一疋諸子姪徒步而歸又曰許圉師轉相州刺史政存寛惠人吏刋石以頌之嘗有官吏犯賍事露圉師不令推究但賜清白詩以激之犯者愧懼遂改節為㢘士其寛如此又曰齊瀚定州義豐人為汴州刺史河南為雄郡自江淮逹於河洛舟車輻湊人庻浩繁前後牧守多不稱職惟倪若水與瀚皆以清嚴為治吏民歌之又曰李勉為廣州刺史兼嶺南節度觀察使畨禺賊帥馮崇道桂州叛將朱濟時等阻洞為亂前後累嵗陷没十餘州勉至遣將李觀與容州刺史王翃併力招討悉斬之五嶺平前後西域舶泛海者嵗纔四五勉性㢘潔舶來都不檢閲故末年舶至者四十餘在官累年器用車服無增飾者耆老以為可繼前朝宋璟盧奐李朝隠之徒人吏詣闕請立碑代宗許之又曰陽城為道州刺史在州以家人法待吏人宜罰者罰之宜賞者賞之一不以簿書介意道州土地産民多矮每年常配鄉户貢其男號為矮奴城不平其以良為賤又憫其編畆嵗有離異之苦乃抗䟽論而免之自是乃停其貢民皆賴之無不感泣又曰尹思貞為青州刺史境内有蠶一年四熟者黜陟使衞州司馬路敬潛八月至州見蠒歎曰非善政孰能至於此乎特表薦之又曰馬璲改懐州刺史乘兵亂之後其夏大旱人吏失耕稼璲乃務修教化將吏有父母者璲輒造之施敬收瘞暴骨去其煩苛至秋界中生穭糓人頗賴之又曰牛僧孺為鄂州刺史武昌軍節度使江夏城風土散惡難立垣墉每年加版築賦菁茅以覆之吏縁為奸蠧弊綿嵗僧孺至計茅苫板築之費嵗十餘萬即賦之以塼以當苫築之價凡五年墉皆甃葺蠧弊永除又曰皇甫無逸為同州刺史閉門自守不通賔客左右不得出門凡所貨易皆往他州每按部樵採不犯於人嘗夜宿人家遇燈炷盡主人將續之無逸遽抽佩刀斷衣帶以為其炷其㢘介如此又曰吕元膺為蘄州刺史頗著恩信嘗嵗終閲郡獄囚囚有自告者曰某有父母在明日元正不得相見因泣下元膺憫焉盡脱其械縱之以為期守吏曰賊不可縱元膺曰吾以忠信待之及期無後到者由是羣盜感義相引而去又曰栁宗元為栁州刺史土俗以男女質錢過期則没入宗元革其鄉法其已没者仍出私錢贖之歸其父母又曰王仲舒為洪州刺史江南西道觀察使江西前例𣙜酒私醸法深仲舒至鎮奏罷之又出官錢二萬貫代貧户輸税又曰令狐楚子緒以廕授官厯隋壽汝三郡刺史在汝州日有能政郡人請立碑頌緒以弟綯在輔弼上言曰臣先父元和中特承恩顧弟綯官不因人出自宸衷臣伏睹詔令以臣刺壽州日粗立政勞吏民求立碑頌尋乞追罷臣任隋州日郡人乞留得上上考此名已聞於日下不必更立碑頌乞賜寢停宣宗嘉其意從之五代史梁書曰韓建為潼闗防禦使兼華州刺史河湟經大冦之後户口流散建披荆棘闢汚萊勸課農事樹植蔬果出入閭里親問疾苦不數年流亡畢復軍民充實又曰王檀字衆美為宻州刺史郡接淮戎舊無壁壘乃率丁夫修築羅城六旬而畢居民賴之又曰趙克裕河陽人也繼領亳鄭二州刺史時闗東藩鎮方為蔡冦所毒黎元流散不能相保克裕妙有農戰之備復善於綏懐民賴而獲安五代史晉史曰相里令自羽林都虞候為忻州刺史凡部曲私屬將吏不遣涖州邑之職皆優其給贍使分掌家事而已其後累典大都皆有聲績又曰澤州奏前刺史史延韜離州為軍民遮圍不放出城兼截下馬鐙共留延韜經三日後夜開城門赴闕又曰安元信厯數任皆名郡也親族謂曰公身俸二千石鬢有白髮家無肥美田園何以為子孫計元信曰吾本無文經武畧遭遇先帝風雲之會繼提郡印位在親民平生之望過矣每以衣食豐足為愧安有積貨治産欲為豚犬軰後圖不亦愚乎聞者美之英雄記曰幽州刺史劉虞食不重餚衣無文繡華陽國志曰趙琰為青州刺史有貴要屬託琰於聽事前置大水器發書悉投置水中無有所報益部耆舊𫝊曰嚴遵字正思為揚州刺史行部聞路旁女子哭聲不哀問所哭者誰對曰夫遭燒死遵勅吏輿尸到與語謂吏曰死人自道不燒死攝女令人守尸曰當有物往吏曰有蠅聚頭所遵令披視得鉄錐貫頂拷問以淫殺夫會稽典録曰謝夷吾字堯卿山隂人為荆州刺史遇孝章皇帝巡狩幸魯陽有詔勅夷吾入𫝊録見囚有亭長奸部民者縣言和奸上意以為吏刼民何得言和須臾夷吾呵之曰亭長朱幘之吏職在禁奸今為惡之端何得言和切讓長吏治亭長罪其所决正一縣三百餘事與上合帝歎曰使諸州刺史悉如此者朕不憂天下矣遷鉅鹿太守臨發陛見賜車馬劒帶勑之曰鉅鹿劇郡舊為難治以君有撥煩之才故特授任無毁前功祖逖别𫝊曰逖為豫州刺史克己矜施不畜資産䘮亂之餘白骨未收者為之殯葬其有骨肉恩薄不收歛者皆加貶責由是百姓感化復覩太平置酒大會坐中耆老相與流涕而歎曰吾等投老更得父母死將何恨又童謡曰幸哉遺民免豺虎三辰既朗遇慈父𤣥酒清醪甘瓠脯亦何報恩歌且舞陶氏家𫝊云基字叔先為交州刺史始夷人不識禮義男女互相奔隨生子乃不知父君乃敦以婚姻之道訓以父子之恩道之以禮齊之以刑設庠序立學校合境化之莫不悦之語林曰何公為揚州有葬親者乞數萬錢而帳下無有揚州常有糲米以賑孤寡乃有萬餘斛虞存為治中面見道帳下空素求粲此米付帳下何公曰何次道義不與孤寡爭粒酷刺史續漢書曰侯覽為益州刺史豐富者輒誣以大罪皆誅滅之没入財物謝承後漢書曰第五倫上䟽褒稱盛美曰前嵗誅刺史二千石貪殘者皆明聖所察非臣下所及晉書曰邢本為揚州刺史僚屬有過輒依臺閣峻制繩之逺近咸怨干寶晉紀曰苟晞為兖州刺史姨母寡有一子坐小事姨母向晞叩頭及中外皆乞活不聽死後往哭之甚悲曰殺弟者兖州刺史哭卿者苟道將也後魏書曰于洛侯代人也以勞舊為秦州刺史而貪酷安忍民王富熾奪民呂勝脛纒一具洛侯鞭富熾一百截其右腕夜常不卧執燭逹曉呼召賔客説人間細事戯謔無不為性不飲酒惟多置餚胾晝夜食噉而已自旦至中方始寢寐又曰齊以斛律武都為兖州刺史塗經衞地受絹千疋黎陽郡守石曜手持一縑而謂之曰此是老石機杼聊以奉贈自此已外並須出於吏人武都知曜清素純儒笑而不責北史曰齊漁陽王紹信文襄第六子厯特進青州刺史行過漁陽與鉅富人鍾長命同坐太守鄭道葢來謁長命欲起紹信不聽曰此何物小人主人公為起乃與長命結為義兄弟仍與長命妻為姊妹責其闔家長㓜皆有贈賄鍾氏遂貧又曰齊安德王延宗為定州刺史於樓上大便使人在下張口承之以猪糝和人糞以飼左右有難色者鞭之隋書曰厙狄士文拜貝州刺史性清苦不受公料家無餘財子嘗噉官厨餅士文枷之於獄累日杖之一百步送還京僮𨽻無敢出門所買鹽菜必於外境凡有出入皆封署其門親舊絶跡慶吊不通法令嚴肅吏人股戰道不拾遺有細過必深文陷害又曰厙狄士文為貝州刺史發摘奸隠長吏尺布斗粟之贓無所寛貸得千餘人而奏之上悉配防嶺南親戚相送哭泣之聲遍於州境至嶺南遇瘴癘死者十八九於是父母妻子惟哭士文士文聞之令人捕捉撾捶盈前而哭者彌甚又曰趙仲卿拜石州刺史法令嚴猛纎㣲之失無所容捨鞭笞長吏輒至二百官人戰慄無敢違犯盜賊屏息皆稱其能唐書曰楊德幹髙宗末厯澤齊汴相四州刺史治有威名郡人為之語曰寧食三斗蒜不逢楊德幹太平御覽卷二百五十八
