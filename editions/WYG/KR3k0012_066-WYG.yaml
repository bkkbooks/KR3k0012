body:
  text: 太平御覧卷六十六宋李昉等撰地部三十一湖潭湖廣雅曰湖池也說文曰湖大陂也史記曰三苗氏左洞庭右彭蠡徳義不脩舜滅之此在徳不在險晉書曰陳訓少學天文孫皓以為奉禁都尉知皓必敗時錢塘開湖或言天下當太平青蓋入洛皓以問訓對曰臣能望氣不逹湖開塞退告友曰青蓋入洛將以舁櫬䘖璧之事非吉祥也宋書曰㑹稽太守孟顗事佛精懇而為謝靈運所輕嘗謂顗曰得道應湏慧業文人卿昇天當在靈運前成佛必在靈運後顗深恨之㑹稽東郭有廻踵湖靈運求决以為田顗堅執不與又求始寧岯崲湖為田顗又固執靈運謂顗非存利民正慮决湖多害生命言論毁復與顗遂搆讐隙唐書曰禇無量字𢎞度杭州鹽官人也幼孤貧厲志好學家近臨平湖時湖中有龍鬬傾里閈就觀之無量時年十二讀書晏然不動風俗通曰吳都曰流瀆四面所隈都也周官揚州其浸五湖按張勃吳録五湖者太湖之别名以其周行五百餘里故以五湖為名虞翻亦云太湖有五道别謂之五湖或說以太湖射貴湖上湖洮湖洮湖一名長塘湖滆湖為五湖按國語吳越戰於五湖直在笠澤一湖中戰耳則知或說非也隋大業記曰五月夏至前三五日吳郡太湖中白魚向湖側淺水菰蒲之上産子民得採之隨時貢於洛揚州記曰太湖一名震澤一名笠澤一名洞庭史記三苗之國左洞庭右彭蠡裴駰注云今湖中苞山有名穴其深洞無知其極者名洞庭彭蠡則無因此穴之名通呼洞庭彭蠡即宫庭湖名也越絶書云太湖周一萬六千頃在吳興也荆州記曰宫庭即彭蠡澤也謂之彭澤湖一名匪孩賄切澤在豫章郡青草湖一名洞庭湖洞庭湖亦謂之太湖在巴陵郡雲夢澤一名巴丘湖凢此並昭昭尤著又廣大也干寳捜神記曰由拳縣秦時長水縣始皇時童謡曰城門有血城當陷沒為湖有嫗聞之朝往窺門將欲縛之嫗言其故後門將以犬血塗門嫗見血走去忽有大水欲沒縣主簿令幹入白令令曰何忽作魚幹曰明府亦作魚遂淪為湖鄭緝之永嘉記曰懐北縣有蔣公湖父老云先代有祭祀祈請者湖輙下大魚與之秦州記曰武都郡前有湖義熙初有白龍於湖升天盛宏之荆州記曰宫亭湖廟神甚有靈騐塗旅經過無不祈禱能使湖中分風而㠶南北又曰巴陵南有青草湖周廻數百里日月出沒其中湖南有青草山故因以為名劉澄之荆州記曰華容縣東南有雲夢澤一名巴丘湖荆州之藪也劉澄之豫州記曰陳縣地有芍陂湖魏將王陵與吳將張休交戰處也黄關五陵記曰有湖名為丹陂週圍數百頃青波澄映洲嶼相望武昌記曰武昌長湖通江夏有水冬則涸昔時靡所産植陶太尉立塘以遏水於此常自不竭因取瑯琊郡滆湖魚菱以著湖内菱甚甘美異於他處所産鮒魚乃長三尺劉道真錢塘記曰明聖湖在縣南去縣三里父老相傳有金牛時見神化莫測故以明聖垂名西京雜記曰顧翺少失父事母母好食雕胡飯常帥子女躬自採擷還家導水鑿川供養每有盈儲家近太湖湖中乃生雕胡無復雜草蟲鳥不敢至焉遂得以為飬郡縣表其閭舎江乗地記曰滆湖中有嘉魚美蓴劉欣期交州記曰有一湖去合浦四十里每陰雨日百姓見有銅船出水又有一牛在湖中以鷄酒為祭便大獲魚若此禮不設唯得牛糞而已述征記曰栢冲為江州刺史遣人周行廬山冀覩靈異既陟崇巘有一湖匝生桑樹有白鵠湖中有赤鱗魚使者渇極欲往飲有群白鱗魚張鬐向之使者不敢飲南康記曰廬山上有平湖湖中有艑音便底在湖心中動揺便風雨鄭緝之東陽記曰北山去郡三十餘里有赤松廟故老相傳曰其下有居民曰徐公者嘗登嶺至此處見湖水二人碁愽於湖間自稱赤松子安期先生有一壺酌酒以飲徐公公醉而寐其側比醒不復見劉澄之豫州記曰城父縣有巢湖湖週五里湖中有三山南有四鼎山戰國䇿曰秦與荆戰大破之取洞庭五湖吳地記曰吳王葬女取土成湖又郡國志云三女墳在郭西云闔閭食蒸魚㽜半賜三女三女怨自殺王痛之遂𦵏於郭西文石為槨金印玉牒銀尊珠盤凡諸珍異悉以送𦵏以水繞墳因謂之女墳湖又曰𦵏女之時有白鶴舞於吳市中因入羡門悉化為犬錢塘記曰去邑十里有詔息湖故老相傳昔秦始皇廵狩經塗暫憇因以詔息為名周景式廬山記曰山頂有一窮湖湖足赭鯉尾鬐皆傷剥而又有一故艑槽崇山峻逺非舟檝所逰豈深谷為陵而此物與丘壑同遷乎顧㣲廣州記曰廬山上有湖至甲戌日輙聞山有鼓角聲劉澄之揚州記曰新城縣東有俱山山上有湖湖中有白鵝一隻時時飛來不可常見劉楨東陽記曰龍目湖秦王東游觀地勢云此有天子氣使赭衣徒鑿湖中長岡使斷因改為丹徒今水北注江也梁典曰武帝望京峴山盤紆似龍掘其右為龍目二湖徐州先賢傳曰勾踐滅吳謂范蠡曰吾將與子分國而有之蠡曰君行令臣行志乃乘扁舟浮五湖而不返水經注曰武強縣耆宿云邑人有行於道見一小蛇疑其有靈持而飬之名曰擔生長而吞噬人里中患之遂捕繫獄擔生負而奔邑淪為湖縣長及吏咸為魚矣今縣東北半里許有淵謂之郎君淵耆宿又言縣淪之日其子東奔又䧟於此故淵得郎君之名矣神異經曰北方荒外有湖方千里平滿無髙下有魚長七八尺形狀如鯉而目赤晝在湖中夜化為人刺之不入煑之不死以烏梅二七煑之即熟食之可以愈邪病又曰北方荒中有石湖方千里無凸凹上直結反下於交反平滿無髙下岸深五尺餘恒氷唯夏至左右五六十日觧耳又曰東南海中烜洲上有温湖其中唯有鯽魚焉長八尺食之宜暑而避寒郡國志曰潤州遏陂有湖名龍目湖京口出好酒人習戰故桓温云京口土瘠人窶無可戀唯酒可飲兵可用耳會稽記曰漢順帝永和五年㑹稽太守馬臻創立鏡湖在㑹稽山陰两縣界案塘蓄水高丈餘田又髙海丈餘若水少則洩湖灌田如水多則開湖洩田中水入海所以無凶年堤塘周廻五百一十里漑田九千餘頃又㑹稽記云創湖之始多淹塚宅有千餘人怨訴於臺臻遂被刑於市及臺中遣使按鞫忽不見人騐籍皆是先死亡人之名又按輿地志云山陰南湖縈帶郊郭白水翠巖互相暎發有若圖畫南徐州記曰子英常於芙蓉湖捕魚得赤鯉持歸以榖飬一年遂生两翅魚云我來迎汝子英騎之即乘風雨騰而上天故列仙傳云毎經數載來歸見妻子魚復來迎如是數十廽而不返芙蓉湖即射貴湖也又名上湖吳地記曰臨平湖在臨平山南吳志曰歸命侯天璽元年吳郡言臨平湖自漢末草穢擁塞今更除平故老相傳云此湖塞天下亂此湖開天下平又湖邊得䂖函函中有小石青色長四寸廣二寸餘刻上作皇帝字於是改年大赦俄而晋平吳孫盛以為元皇中興之符歙縣圖經曰篁墩湖在縣西南其湖有蜃常與吕湖蜃鬬程靈銑好勇而善射夢蜃化為人告之曰吾為吕湖蜃所厄君能助吾必厚報束白練者吾也明日靈銑彎弧助之正中後蜃不知所之後人名其處為蜃灘時有一道人詣靈銑母求食訖曰勞母設食今當為求善墓地使母隨行上山以白䂖識其地曰葬此可以暴貴矣靈銑因移父葬其所侯景亂靈銑率郡鄉萬餘衆保新安因隨陳武帝有竒功及陳武受梁禪靈銑以佐命功臣與周文昱侯安都為三傑按靈銑宅在湖東二里徐愛釋問曰𤣥武湖本桑泊晉元帝太興元年創為北湖京都記云從北望鍾山似宫亭湖望盧岳齊武帝習水軍於此中號曰昆眀池故沈約登覆舟山詩云南瞻儲胥舘北望昆明池即此爾永嘉末有龍見於湖内故改為𤣥武湖豫章記曰擔䂖湖在州東北其湖水中有兩䂖山有孔如人穿擔䂖故老云壯士擔此兩䂖置湖中因以為名輿地志曰安城有宻湖中有蓴菜鯽魚為時所重並有石窟容百人坐其魚味甘如蜜因此為名在縣東二十里淮南子曰夫厯陽之都一夕化而為湖勇力聖智與不肖者同命無遺脫也荆南志曰髙沙湖在枚廻洲上翠澤平皛胡了切水陸彌曠芰荷殷生鱗羽滋阜湖南林野清曠可以栖託故徴士宗炳昔常家焉北有小水自湖通江謂之曽口是也渚宫舊事云江陵城西二十里高沙湖其中多湖魚又曰五葉湖昔湖側有主人張姓五葉同居因以為名九江記曰彭蠡湖在潯陽縣東南與都昌縣分界湖心有大孤山郡國志云彭蠡湖週廽四百五十里内有石高數十丈大禹刻其石以記功焉又有乞烏隨船行舟人擲飯接之高下不失一粒今此烏㳂江靈廟多有不獨在彭蠡湖矣又曰鶴門湖者陶侃㣲時䘮母忽有二客來弔化為雙白鶴飛去後因以為名丹陽記曰吳孫皓寳鼎元年丹陽縣宣騫之母年八十浴於後湖化為黿後湖又名練湖在縣北百二十歩輿地志曰曲阿出名酒皆云後湖水所釀故醇冽也今按湖水上承丹徒陳敏後湖上馬林溪水色白味甘又云練塘陳敏所立遏高陵水以後為後湖語林曰禇公逰曲阿後湖狂風忽起船傾禇公已醉乃曰此舫人皆無可以招天譴者唯有孫興公多塵滓正當以厭天欲耳便欲捉孫擲水中孫懼無計唯大呼曰季野卿念我禇公禇彦囬也季野彦囬子也伏㴞登故臺詩序曰夫差姑蘇臺東有丹湖萬頃内有金銀塘方輿記曰銅船湖馬援鑄銅船五隻一㽞此湖中四隻將過海征林邑潭幽明録曰碩縣下有眩潭以視之眩人眼因以為名傍有田陂昔有人船行過此陂見一死蛟在陂上不得下無何見一人長壯烏衣立於岸側語行人云吾昨下陂不過而死可為報眩潭行人曰眩潭無人云何可報烏衣人云但至潭便大言之行如其言湏㬰潭中有號泣聲又曰晉元熈中桂陽郡有一老翁常以釣為業後清晨出釣遇大魚食餌掣綸甚急船人奄然俱沒家人尋䘮於釣所見老翁及魚並死為釣綸所纒魚腹下有丹字文曰我聞曽潭樂故從檐潭來何來一老翁持釣數見欺好食赤鯉鱠今日得汝為荆州圖記曰武當縣西北六里江中名狠子潭潭中有右磧州長六十丈世傳狠子未曽從父命臨終欲葬山上故謬曰𦵏我水中狠子唯從此命習鑿齒記云狠子是漢時人家在山東五女徼鄧徳明南康記曰梓潭有梓樹洪直巨圍葉長尺餘垂柯數畆又曰贛潭在郡下昔有長者於此潭以釣為事恒作漁父歌其聲慷慨忽綸動湏㬰一物形似小水牛眼光如鏡或言水犀浮躍逐綸角帶金繅釣客因引得繅出水數十丈繅斷餘數丈盡是珍寳羅浮山記曰牛潭深洞無極北岸有䂖周圎三丈許漁人見牛自水而出盤於此䂖枹朴子曰昔䂖頭水有大黿常在潭中因名此為黿潭能作魅行病於人吳有道士戴昞者乃以越章封泥遍投潭水中良乆有大黿徑長丈餘浮出不敢動乃格殺之而病人並愈又有小黿出羅列死於水渚甚多南康記曰梓潭山在雩都縣之東南六十九里其山有大梓樹吳王令都尉蕭武伐為龍舟艚斫成而牽引不動占云湏童男女數十人為歌樂乃當得下依其言以童男女牽拽艚沒于潭中男女皆溺其後每天晴朗净髣髴若見人船焉夜宿潭邊或聞歌唱之聲因號梓潭焉鄱陽記曰懐蛟水一名孝經潭在縣南二百歩江中流石際有潭徃往有蛟浮出時傷人焉毎至五月五日鄉人於此江水以船競渡俗云為屈原攘災前郡守縣懸綵以賞之刺史張栖真以人之行莫大於孝懸孝經標竿之上而人知勸俗號為懐蛟水或曰孝經潭湘州記曰益陽有昭潭其下無底湘水最深處也或謂周昭王南征不復沒於此潭以為名太平御覽卷六十六
