body:
  text: 太平御覽卷一百七十三宋李昉等撰居處部一宮宫世本曰堯使禹作宫釋名曰宫穹也屋見垣上穹窿然也爾雅曰宫謂之室室謂之宫史記天官書曰𤣥武虚危主宫室大戴禮曰周時德澤和洽蒿茂大以為宫柱名為蒿宫毛詩曰定之方中作于楚宫揆之以日作于楚室又曰鼓鐘于宫聲聞于外易曰上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨左傳曰襄公作楚宫穆叔曰泰誓云民之所欲天必從之君欲楚也夫故作其宫若不復適楚必死是宫也六月公薨于楚宫又曰晉成虒祁之宫又晉銅鍉之宫數里論語曰禹卑宫室而盡力乎溝洫禹吾無閒然矣史記曰騶子之燕昭王擁彗先驅請列弟子而受業築碣石宫親往師之又曰秦始皇造阿房宫徵發天下工匠又曰秦始皇所居之宫有祈年宫長信宫梁山宫又曰戎王使由余於秦秦繆公示以宫室積聚余曰使鬼為之則勞神矣使人為之則苦民矣又曰項羽屠咸陽焚其宫室三月火不滅又曰盧生說始皇曰人主為微行以辟惡鬼惡鬼辟真人至人主所居而人臣知之則害於神願上所居宫無令人知然後不死之藥殆可得也乃命咸陽之旁三百里之内宫觀二百七十複道甬道相連帷帳美人充之所幸言其處者死始皇幸梁山宫從山上見丞相車騎衆弗善也中人以告丞相後損車騎始皇怒曰此中人泄吾語捕時在旁者斬之自是莫知行之所在決事悉於咸陽宫又曰始皇二十七年作長信宫於渭南通驪山作甘泉前殿築甬道自咸陽屬之築牆垣如街巷又曰漢武帝時河決天子自臨決河沈白馬玉璧作瓠子歌於是卒塞瓠子築宫其上名曰宣房宫又曰樗里子卒𦵏於渭南章臺之東曰後百嵗是當有天子之宫夾我墓樗里疾室在於昭王廟西渭南隂鄉樗里故俗謂之樗里子至漢興長樂宫在其東未央宫在其西武庫正值其墓秦人諺曰力則任鄙智則樗里漢書曰八年丞相蕭何作未央宫立東闕北闕蒼龍白虎二闕前殿武庫大倉上還見宫室壯麗甚怒曰天下匈匈何宫室過度也何曰非令壯麗無以威四夷且亡令後世有以加也又曰初江充召見犬臺宫晉灼曰黄圖上林有犬臺宫外有走狗觀也師古曰今書本犬臺有作太壹字者誤也漢無太壹宫也自請願以所常被服冠見上上許之充為人魁岸容貎甚壯帝望見而異之謂左右曰燕趙固多竒士既至問以當世政事上悅之又曰武帝六年冬行幸囘中春作首山宫又曰上幸不其祠神人于交門宫若有向坐拜者作交門之歌又曰幸河東之明年正月鳳凰集祋祤於所集處得玉寶起步壽宫又曰柏梁災越巫勇之迺曰粤俗有火災復起屋必以大用勝服之於是起建章宫為千門萬户又曰梁孝王吳楚破梁最親有功又為大國居天下膏腴地北界㤗山西至髙陽四十餘城多大縣孝王太后少子愛之賞賜不可勝道於是孝王築東苑方三百餘里廣睢陽城七十里大治宫室為複道自宫連屬於平臺四十餘里如淳曰平臺在大梁東北離宫所在晋灼曰或說在城中東北得賜天子旌旗從千乗萬騎出警入蹕擬於天子又曰孝武作建章宫為千門萬户有鳯凰闕髙二十餘丈中有蓬萊方丈瀛洲壺梁象海中神僊南有玉堂璧門大鳥之屬立明臺井幹樓度髙五十餘丈輦道相屬焉又曰秦起咸陽而西至雍離宫三百師古曰此言離宫者皆謂於别處置之非常所居也鐘鼔帷帳不移而具又為阿房之殿殿髙數十仞師古曰阿房者言殿之四阿皆為房也一説大陵曰阿言其殿髙若於阿上為房也房字或作旁說云始皇作此殿初未有名以其去咸陽近且號阿旁阿近也八尺曰仞東西五里南北千步從車羅騎四馬馳騖旌旗不橈師古曰橈屈也言庭之廣大殿之髙敞衆騎馳騖無所廹觸立旌旗不屈橈橈音女孝反為宫室之麗至於此使其後世曽不得聚廬而託處焉又曰鄒陽諫吳王曰臣聞秦倚曲臺之宫應劭曰始皇帝所治處也若漢家未央宫也懸衡天下服䖍曰闗西為衡應劭曰衡平也如淳曰衡猶秤也言其懸法度於上也師古曰此說秦自以為威力强固非論平法也下又言陳勝連從兵之據則是說從横之事耳服釋是也畫地而不犯兵加胡越師古曰畫地不犯者法制之行至其晚節末路張耳陳勝連從兵之據師古曰從音子容切以叩函谷咸陽遂危師吉曰叩擊也何則列郡不相親萬室不相救也又曰後元二年幸盩厔作五柞宫張晏曰有五柞樹因以名又曰甘露二年幸萯陽宫在鄠萯音倍後漢書曰永平三年夏旱而大起北宫鍾離意詣闕免冠上疏曰伏見陛下以天時小旱憂念元元降避正殿躬自克責而比日宻雲遂無大潤豈政有未得應天心者耶昔成湯遭旱以六事自責曰政不節邪使人疾邪宫室崇邪女謁盛邪包苴行邪讒夫昌邪竊見北宫大作人失農時此所謂宫室崇也自古非苦宫室小狹但患人不安寧宜且罷止以應天心臣意以匹夫之才無有行能久食重禄擢備近臣比受厚賜喜懼相半不勝愚戅征營罪當萬死征營不自安也帝䇿詔報曰湯引六事咎在一人其冠履勿謝比上天降旱宻雲數㑹朕戚然慚懼思服嘉應故分布禱請闚候風雲北祈明堂南設雩場明堂在洛陽城南言北祈者葢時修雩場在明堂之南也今又勅大匠止作諸宫減省不急庶消災譴詔因謝公卿百僚遂應時澍雨又曰東平王蒼薨元年三月廵狩幸東平宫追念蒼謂其諸子曰思其人至其鄉其處在其人亡因泣下沾襟魏志曰帝營作許昌宫楊阜諫曰堯尚茅茨而萬國安禹卑宫室而天下樂桀作璇室象廊紂為傾宫鹿臺皆喪社稷也吳志曰後主二年六月起新宫於大初之東制度尤廣二千石以下皆自入山督攝伐木又壞諸地大開苑囿起土山作樓觀加飾珠玉製以竒名右臨硎左彎碕又開城渠引後湖水激流入宫内巡遶堂殿窮極伎巧功費萬計又曰赤烏十年春二月適南宫三月改作大初宫詔移武昌材瓦有司奏武昌宫作已二十八年恐不堪用宜别更置帝曰大禹卑宫室為美今軍事未已所在多賦妨損農業且建業宫乃朕從京來所作府寺耳柱材率細年月久逺恐損壞今武昌宫材木自可用繕之晉書曰尚書僕射謝安石以宫室朽壞啓作新宫帝權出居㑹稽王第二月始興功内外日役六千人安與大匠毛安之決意修定皆仰模𤣥象體合辰極並新制置省閣堂宇名署時正搆太極殿欠一梁有梅木流至石頭石頭津主啓聞取用之因畫花於梁上以表瑞焉又起朱雀重樓皆繡栭藻井門開三道上重名朱雀觀觀下門上有銅雀懸楣上刻木為龍虎左右相對王隠晉書曰髙堂隆刻鄴宫屋材云後若干年當有天子居此宫惠帝止鄴宫屋土剥更屋始見刻字計年正合時載記曰石勒欲營鄴宫先是廷尉續咸諫止之及是霖雨中山西北暴水流漂巨木百餘萬根集于堂勒大悅謂公卿曰諸卿知否此非為災天意欲吾營都矣於是營之勒親授規模又曰劉曜命起酆明觀立西宫建凌霄樓於鎬池侍中喬豫和苞上疏曰臣聞人主之興作也上凖乾象下順人時是以衛文承亂亡之後宗廟流漂無所而猶上憲營室作為楚宫故能上興康叔武公之迹延九百之慶也今奉詔書將營酆明觀市道芻蕘咸非之曰一觀之費足以平涼州矣又奉勅㫖復欲擬阿房而建西宫模瓊樓而建凌霄以此功費亦可以吞吳蜀剪齊魏矣書奏大悅宋書曰少帝以石頭城為長樂宫東府城為未央宫齊書曰髙祖永明元年秋七月車駕幸青溪舊宫設金石樂在位者賦詩唐書曰東都平太宗入觀隋氏宫室嗟後主罄人力以逞奢侈薛收進曰峻宇雕墻殷辛以滅土階茅棟唐堯以昌秦帝増阿房之飾漢后罷露臺之費故漢祚延而秦禍速自古如土崩瓦解取譏後代良以奢所至太宗悅其對又曰髙宗嘗避暑於仁智宫又曰閻立德受詔造翠微玉華宫咸稱㫖賞賜甚厚又曰太宗將幸九成宫姚思廉諫曰離宫遊幸秦皇漢武之事固非堯舜禹湯之所為也言甚切至太宗納之西京雜記曰趙王如意年幼未能親就外傅戚姬使舊趙内傳趙媪傅之號其室為養德宫又曰五柞宫有五柞樹皆連抱上枝覆䕃數十畝其西有青桐觀觀有三梧桐樹樹下石麒麟二刋其脇為文字是秦始皇驪山墓上物也頭髙一丈三尺東邊者前左脚折處有赤如血父老謂其有神皆含血而屬筋焉帝王世紀曰紂作傾宫七年乃成大十里髙千丈又曰堯有貳宫撝宫漢武故事曰上起明光宫發燕趙美女二千人充之取年十五已上二十已下滿四十者出嫁掖庭令總其籍時有死出者隨補之凡諸宫美人可取七八千建章未央長樂三宫皆輦道相屬懸棟飛閣不由徑路六韜曰殷君喜治宫室七十三所大宫百里宫中九市列仙傳曰鉤弋夫人齊人病六年右手拳望氣者云東方有貴人氣推而得之召到姿色甚美偉帝披其手得一玉鉤而手尋展故名其宫為鉤弋宫十洲記曰方丈山有𤣥琉璃宫博物志曰夏桀之時有長宫於深谷之中男女雜處三旬不出聽政其後大風飄沙填此宫谷鄴中記曰自襄國至鄴二百里中四十里輒一宫有一夫人侍婢數十黄門宿衛石虎下輦即止凡虎所起内外大小殿臺行宫四十四所郡國志曰武帝遊五柞宫欲廣上林令譙隆諫曰堯舜至治廣德不務苑囿帝初不悅後拜為中郎墨子曰上古之人未知為宫室就陵而居處下潤傷民故聖人作為宫室宫室之制髙足以避潤濕中足以禦寒風上足以待霜雪牆髙足以别男女故以便生不以為樂也今之為宫室必厚斂百姓暴奪民財為曲成之室青黄刻鏤之飾故國貧而人難訴也管子曰黄帝有合宫以聽政穆天子傳曰天子升於崑崙之宫以觀黄帝之宫越絶書曰美女宫周五百九十步土城者勾踐所習教美人西施鄭旦宫室方言曰吳有館娃之宫列子曰周穆王時西域國有化人來王執化人之袪騰而上天暨化人之宫構以金銀絡以珠玉出雲雨之上實為清都紫微也孟子曰齊宣王見孟子於雪宫胡氏春秋曰武王勝殷清箕子之宫也神異經曰東方有宫青石為牆髙三仞左右闕髙百丈畫以五色門有銀牓以青石碧鏤題曰天帝長男之宫西方有宫白石為牆五色𤣥黄門有金牓而銀鏤題曰天帝少女之宫中央有宫以金為牆門有金牓以銀鏤題曰天皇之宫南方有宫以赤石為牆赤銅為門闕有銀牓曰天帝中男之宫北方有宫以黒石為牆題曰天地中男之宫東南有宫以黄石為牆黄牓碧鏤題曰天帝少男之宫西北有宫以黄銅為牆題曰地皇之宫十洲記曰青丘山上有紫宫天真仙女多遊於此又曰方丈山有琉璃宫紀年曰穆王所居鄭宫春宫說苑曰楚使使聘齊齊王享之梧宫使者曰大哉梧乎王曰江海之魚吞舟况大國之樹三輔故事曰桂宫周匝十里内有光明殿走狗臺土山複道横北度從宫中西上城至神明臺三輔黄圖曰長安有夜光宫望逺宫昭臺宫葡萄宫竹宫棠棃宫扶荔宫萯陽宫長平宫五柞宫漢宫閣名曰長安有長樂宫未央宫長門宫鼔簧宫承光宫宜春宫池陽宫長平宫黄山宫望仙宫長楊宫集靈宫延壽宫祈年宫通天宫駊婆宫沛宫林梵宫甘泉宫首山宫交門宫明光宫五柞宫萬嵗宫竹宫壽宫建章宫太乙宫思子宫見漢書長樂等宫或在京師或在外郡或帝王所居或祀祠所在或因事以置夜光宫棠梨宫扶荔宫見三輔黄圖桂宫見三輔故事鼎湖宫谷口宫魏畧曰大秦國城中有五宫相去各五十里宫室皆以水精為柱食器亦然郡國志曰金河府磨磷宫北二十里有石殿一飛橋岸畫以古賢哲士太常卿蔣少游製太和五年文明太后來幸得鯉魚一雙長三尺以黄金鏁穿腮放於池中後皆長五尺沈泛相從正光元年五月五日天清氣爽聞池内鏘鏘聲水驚沸須臾雷電海氣五道自池中屬於天乆之乃滅波止水定唯見一魚化為龍矣又曰秦川宫昔非子到秦於此築宫室又曰廬山有三宫上宫在懸崖之表人所不及次宫在山巖下兩邊有隂陽溝有石羊馬夾道相對下宫在彭蠡湖際隋圖經曰大業十六年自江都還洛陽勅於汾州北臨汾水起汾陽宫即管涔山汾河源所出之處當盛暑之時臨河盥潄即涼風凜然如八九月其地多雨經夏罕有晴日一日之中倐忽而雨倐忽而晴晴雨未曽經日雖髙嶺千仞嶺上居人掘地深二三尺即得清泉用之壽春圖經曰十宫在江都縣北五里長阜苑内依林傍澗因髙跨阜隨地形置焉隋煬帝所立也曰歸鴈宫回流宫九里宫松林宫楓林宫大雷宫小雷宫春草宫九華宫光汾宫是曰十宫兩京記曰道義坊唐髙祖龍潛舊宅武德元年以為通義宫六年髙祖臨幸大宴羣臣引見鄰里父老頒賜有差貞觀元年立為興聖尼寺焉又曰大明宫南接京城之北面西接京城之東北隅初髙宗嘗患風痺以宫内湫濕屋宇擁蔽乃於此置宫司農少卿梁孝仁充使製造北據髙崗南望爽塏終南如指掌坊市俯而可窺東京記曰上陽宫在皇城西南東苑苑東垂南臨洛水西拒糓水上元中韋機充使所造列岸脩廊連垣掘地得銅器似盆而淺中有隠起雙鯉之狀魚間有四篆字曰長宜子孫時人以為李氏再興之符髙宗末年常居此宫以聽政也兩京記曰上陽宫西有西上陽宫兩宫夾糓水虹橋架空以通往來楚辭曰魚鱗屋兮龍堂紫貝闕兮珠宫太平御覽卷一百七十三
