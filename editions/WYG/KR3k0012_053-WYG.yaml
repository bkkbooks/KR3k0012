body:
  text: 太平御覽卷五十三宋李昉等撰地部十八丘陵阪陘峽岡丘説文曰丘土之髙非人所為丘字從一一地也一曰四方髙中央下象形也詩曰送子涉淇至於頓丘又曰子之蕩兮宛丘之上兮又曰楊園之道猗于畝丘又曰綿蠻黄鳥止于丘隅又曰丘中有麻彼留子嗟禮曰太公封于營丘比及五世皆反葬於周君子曰樂樂其所自生禮不忘其本古之人有言曰狐死正丘首仁也又曰公叔文子升於瑕丘蘧伯玉從二子衞大夫文子曰樂哉斯丘也死則我欲葬馬蘧伯玉曰吾子欲之則瑗請前刺其欲害人良田也瑗伯玉名也又曰為髙必因丘陵為下必因川澤周禮曰丘陵其動物宜羽物其植物宜覈物其民專而長傳曰車脱其輹火焚其旗不利行師敗于崇丘春秋元命苞曰堯為天子季秋中旬夢白帝遺以烏喙子其母為扶始昇髙丘睹白帝上有雲虎之狀感已生臯陶春秋説題辭曰丘者墓也又曰丘谷輔氣元士扶化爾雅曰丘一成為敦丘成猶重周禮曰為塗三成今江東呼地之矩者為敦再成鋭上為融丘三成為崑崙丘崑崙山三重形如累三盂如乘者乘丘形如車乘如渚者渚丘水中小洲為渚水潦所止泥丘頂上洿下丘方胡丘形四方絶髙為之京人力所作非人為之曰丘地自然生水潦所還曰將丘將者謂丘邊有界將水繞環之上正章丘頂平澤中有丘都丘在水澤内當塗梧丘塗道塗出其右而還之畫丘言為道所規畫塗出其前載丘道出丘南塗出其後昌丘道出丘北水出其前消丘水出其後沮丘水出其右正丘水出其左營丘今齊之營丘淄水過其南及東如覆敦者敦丘邐迤沙丘左髙咸丘右髙臨丘前髙旄丘後髙陵丘偏髙阿丘丘背有丘為負丘中央隆峻狀如負一丘於背上右澤定丘右陵秦丘宋有秦丘見史記如畝畝丘丘有壟界如田如陵陵丘丘上有丘為宛丘陳有宛丘今在陳留郡淮晉有潜丘今在太原晉陽縣淮南有州黎丘今在壽春天下有名丘五其三在河南二在河北説者多以州黎宛營為河南者潜敦為河北者案北方稱天下之名丘恐此諸丘碌碌未足用當之殆别有魁梧桀大者五但未詳其名號所在耳廣雅曰小陵曰丘又曰丘上有木為秘丘家語曰丘陵為牡谿谷為牝方言曰冢大者謂之丘穆天子傳曰天子昇于崑崙之丘以觀黄帝之宫郭璞注曰黄帝巡狩四海登崑崙山起宫室於其上又曰為盛姬曰哀淑之丘天子名之為丘作名是曰淑人之丘乙丑天子東征舍乎五鹿叔㛗七和切且哭思盛姬也㛗穆王女也是曰女㛗之丘因以名五鹿也丁卯天子東征釣于漯水以祭淑人是曰祭丘東征山海曰崑崙之丘實惟帝之下都莊子曰衞靈公死卜葬於故墓不吉卜葬於沙丘而吉掘之數仞得石槨焉洗而視之有銘曰不憑其子靈公奪而埋之夫靈公之為靈久矣淮南子曰堯時有大風為民害乃繳大風於青丘之野許慎注曰大風大鷙鳥也文子曰川竭而谷虛丘夷而泉塞越絶書曰闔閭冡在吳縣閶門外名曰虎丘下廣平六十步水深五丈銅槨三重玉鳬之流扁諸之劍在焉率十萬人治之取土臨湖葬三日白虎居上故號曰虎丘東方朔十洲記曰長洲一名青丘在南辰巳地地五千里去岸二十五萬里上饒山川又多大樹樹有三千圍者一洲之上專是林木故一名青丘仙草靈藥甘液玉英靡所不有齊地記曰營丘在臨淄小城内古以為齊室也丘下周三百餘步髙九丈北廂下隆丈五造井水深七丈餘井與地平伏韜北征記曰博望城内有成湯伊尹箕子冢今皆為丘述異記曰南海中有軒轅丘鸞自歌鳯自舞古云天之樂也郡國記曰濮陽縣本顓頊之城今謂之帝丘夏后之代昆吾君之春秋衞遷于帝丘夢人登昆吾之墟是也又曰濮州初徙陶於乘故縣掘得漆杯二底内有朱文書曰乘丘既見風日靡然爛碎矣陶今定陶外國圖曰員丘之上有不死樹食之乃壽有赤泉飲之不老蕭丘多大風無人民羣犬居之青丘之民食榖衣野絲去瑯琊萬三千里神丘有火穴其光照千里去瑯琊三萬里陳留風俗傳曰雍丘縣有陵五之丘以故名縣酈道元注水經曰沮水西經楚昭王墓東對江陵城故王仲宣之賦登樓云西接昭丘是也又曰鞏縣北有山臨河謂之岑原丘下有穴謂之鞏穴言山潜通淮濟北達于河直穴有渚謂之鮪渚十道志云岑原丘在縣西北三十三里陵釋名曰陵隆也體隆髙也易曰天險不可升也地險山川丘陵也又曰升其髙陵三嵗不興詩曰鴥彼飛隼率彼中陵又曰髙岸為谷深谷為陵禮曰五月可以居髙明可以遠眺望可以升山陵左傳蹇叔送其子曰殽有二陵其南陵夏后臯之墓其北陵文王之所避風雨也春秋説題辭曰陵之為言稜也輔山成其廣稜層扶推益厥長也孝經援神契曰德至山川丘陵則景雲出宋均注曰景雲應周澤不偏也爾雅曰大阜曰陵又曰東陵汛所陳切南陵息慎西陵威夷中陵朱滕北陵西隃鴈門之地是也陵莫大於加陵梁莫大於溴梁墳莫大於河墳謂之八陵穆天子傳曰天子東遊次於崔梁曝蠧書于羽陵莊子曰盜跖死於丘陵之上又曰步仞之丘陵巨獸無所隱其軀而孽狐為之隆呂氏春秋曰凡葬必於髙陵之上以避狐狸之患水泉之濕此則善矣揚子法言曰百川學海而至於海丘陵學山而不至於山是故惡夫住者住者止也魏子曰堯入百仞之谿則不照三里非朦闇位卑勢下故也桀紂昇百丈之陵能見四海非照明位髙勢尊故也十洲記曰崑崙陵即崑崙山也西海之戌地北海之亥地去中國十萬里有弱水周匝繞山呉録曰張紘言於孫權曰秣陵楚武王所置名為金陵秦始皇時望氣故掘斷連岡改名秣陵物理論曰地者鎮之以五嶽積之以八陵阪詩曰阪有漆隰有栗爾雅曰坡者曰阪郭璞注曰阪地不平也史記曰漢文帝常從霸陵西馳下峻坂袁盎攬轡上曰將軍怯也盎曰臣聞千金之子坐不垂堂百金之子立不倚衡今聖主乘危馳不測之淵如馬驚車敗奈髙廟何上乃止漢書地理志曰河東蒲坂縣故曰蒲秦更名應劭曰秦始皇東廵見有長坂孟康曰本屬晉文公以賂秦秦人還蒲魏人喜曰蒲反矣漢書曰王陽為益州至卭僰蒲比切坂九折歎曰奈何以先人之遺體乘此險乎遂以病去及王遵為刺史至此坂問吏曰此非王陽所畏道耶叱其馭驅之曰王陽為孝子王遵為忠臣應劭注曰坂在嚴道縣界漢書西域傳曰西域有赤土身熱之坂上即令人身熱無色頭痛嘔吐續漢書地理志曰河東大陽縣有顛軨坂蜀志曰先主至當陽長坂為曹公所追敗王隱晉書曰孫登楊駿逼迎之與語不答賜布袍登借刀截斷棄門下大呼曰刺斫卒病死後人見在貴馬坂穆天子傳曰天子南還昇于長松之坂郭璞注曰坂有長松酈道元注水經曰洛水東經九曲其地千里有九坂之曲穆天子傳所謂天子西征升九阿是也又曰河水東經施門坂北今城臯西大坂是也昇涉此坂而東趣成臯城列女後傳曰呂榮者吳郡許昇之妻也昇為賊所害榮貞固自守黄巾賊陳寳欲干穢之榮執節不聽寳遂殺榮是日疾風暴雨雷電晦㝠寳恐懼叩頭謝葬之而去糜府君聞榮髙行遣主簿祭之又出錢助縣為冢於嘉興郭里墟北名曰義婦坂華陽國志曰有牛叩頭坂馬搏頰坂其險如此晉太康地記曰常山曲陽有恒山坂號飛狐口上壺關縣有羊腸坂地理志曰函谷東坂謂之八特坂述征記曰黄卷坂者傍絶澗以昇潼關長坂十餘里九坂皆迤邐長坂東京賦曰所謂西阻九阿者也戴延之西京賦曰黄坂去終南六十里少華山西任豫益州記曰汶江水源出玉輪坂下屬汶江郡在郡東北三十里古今地略曰宜軫坂在鹽池東吳城之北今之吳坂新序曰趙簡子上羊膓之坂羣臣皆推車宗會獨當㦸行歌簡子曰人臣而侮其主其罪若何會曰其罪死君亦聞人君而侮其臣乎則智者不為謀辯者不為鬬則其國危乎簡子曰善以宗會為上客郡國志曰雍州咸陽縣北十五里長平坂漢武帝幸甘泉馳道有蟲覆地赤如生肝問東方朔朔曰秦獄地寃氣也臣聞酒能消愁以酒澆之果銷矣陘爾雅曰山絶曰陘郭璞注曰連山中斷者也漢書曰趙王成安君陳餘聞漢且襲之聚兵井陘口號稱二十萬穆天子傳曰天子北征乃絶漳水至于鈃山之下郭璞注曰井鈃山今在常山石邑鄉述征記曰燕趙間凡厥山路名之曰陘井陘在常山峽水經注曰丹山在丹陽屬巴丹山西即巫山也有帝女居焉宋玉所謂我帝之季女名曰瑤姬未行而亡封于巫山之陽髙唐之岨旦為雲暮為雨朝朝暮暮陽臺之下朝暮視之果如其言故為立廟號朝雲焉其間首尾一百六十里謂之巫峽蓋因山為名也盛宏之荆州記曰舊云自二峽取蜀數千里中恒是一山此蓋好大之言也唯三峽七百里中兩岸連山略無闕處重巖疊嶂隱蔽天日自非亭午夜分不見日月至於夏水襄陵㳂泝沮絶或王命急宣有時可朝發白帝暮至江陵其間一千二百里雖乘奔御風不為疾也春夏之時則素湍渌潭廻清到影絶巘多生檜栢懸泉瀑布出其間清縈峻茂良多雅趣每晴初霜旦林寒澗肅常有髙猿長嘯屬引凄異空岫傳響哀轉久絶故漁者歌曰巴東三峽巫峽長猿鳴三聲淚沾裳又曰南崖有重嶺疊起最大髙崖間有石色如人負刀牽牛人黑牛黄成就分明此崖既大加以江湍縈紆廻塗經宿猶望見之行者歌曰朝發黄牛暮宿黄牛朝朝暮暮黄牛如故庾仲雍荆州記曰巴陵楚之世有三峽明月峽廣德峽東突峽即今之巫峽秭歸峽歸鄉峽袁山松宜都記曰自西陵沿江入峽口髙山重嶂非日中半夜不見日月猿鳴至清諸山谷傳其響泠泠不絶也王韶之始興記曰中宿縣有湞陽觀峽横巒交枕絶崖䕶水口有貞女峽峽西岸水際有石如人形髙可七尺狀似女子是曰貞女父老相傳秦世有女數人取螺於此遇風雨晝昏而一女化為此石鄧徳明南康記曰雩都峽其水常自激通奔如轉輪郡國志曰南鄉峽峽西八十里有巴鄉村善釀酒故俗稱巴鄉酒也村傍有溪溪中多靈夀木焉水經注曰湞陽觀峽下有廟世人以為河伯晉時縣人有便至洛者使訖將還忽有一人寄其書云吾家在觀前石間石間懸藤即其處也但扣藤自當有人取之使者依其言果有二人出外取書并延入水府衣不沾濡又曰續漢書云虞詡為武都太守下辯東三十餘里有峽峽中舊生大石鄣塞水流春夏輒濆溢敗壞城郭詡使人燒石以醋灌之石皆碎裂因鐫去焉遂無汎溺之患又曰涇水東南逕都廬山山路之中常有如彈箏之聲行者鼓舞樂而後去即絃歌之山也故謂此峽為彈箏峽隴西記曰襄武有錦鏡峽即黑水所經其峽四望花木明媚照影於其中因以稱之也峽程記曰瀘合遂蜀四郡皆峽之郡自蠻江梧栢沲導諸江至此二百八十江會于峽前次荆門都四百五十灘即有清水重峯胡灘漢灘忽雷閃電咤灘瀨灘狼尾使君主簿皆使君主簿沉舟之所遂為名其他不悉記之三峽者即明月峽仙山峽廣澤峽其有瞿塘灔澦燕子屏風之類皆不預三峽之數李膺益州記曰廣陽州東七里水南有遮要二堰石石東二里至明月峽峽前南岸壁髙四十丈其壁有圓孔形如滿月因以為名岡釋名曰岡亢也在上言之詩曰陟彼髙岡我馬𤣥黄又曰如山如阜如岡如陵又曰謂山蓋髙為岡為陵又曰陟彼岡兮瞻望兄兮尚書曰火炎崑岡玉石俱焚爾雅曰山脊曰岡山謙之丹陽記曰句容縣東三十五里有龍岡岡頂有沸潭周廻十三丈聞人聲水便沸動不聞不涌也王韶之始興記曰郡西南有芙蓉岡髙若玉山隣枕郊郭周廻連亘四十餘里又曰含淮縣白鹿城南有白鹿岡晉咸和中郡人張鮑作令著惠有白鹿遊岡因以為名雷次宗豫章記曰洪井西有鸞岡舊説洪崖先生乘鸞所憇處也顧微廣州記曰四㑹有金岡行人往往見金於岡側裴淵廣州記曰城西北五里連續大岡直上百尋名為粤王冡吳朝掘覓尉佗墓竟無所見於天井岡得六玉璽一小車城北有馬鞌岡秦時瞻氣者言南方有天子氣始皇發民鑿破此岡地中出血今鑿處猶在增城縣有雲母岡日出照之晃曜武昌記曰城北有岡髙數丈名曰鳯闕其處顯敞昇闕以望川澤多所逺瞻吳黄龍元年有鳯凰集此岡故謂之鳯闕鳯闕南十里有金牛岡故老相傳云有金牛出此岡岡今半崩坑深數丈金牛躍出踐岡邊遺跡猶存王孚安成記曰萍鄉西津南五里山名女岡天氣將雨水輙先湧出石門而有五色𤣥黄百姓謂之玉女披衣鄧徳明南康記曰陳蕃墓前青龍岡土人傳云昔見一物龍形而通身絶青數出岡頂及山邊以故名青龍也又曰贛縣馬脊岡在縣西形如馬脊故以為名也任端體江陵記曰州城北五十四里有楚平王冢枝江有斑竹岡又云平王冡周圍數百步未知孰是荆州記曰零陵郡東南有黄溪西有礬石岡衡山記曰衡山有曾青岡出曾青可合仙藥有靈壽岡有靈壽木周廻數十里芝草岡有神芝靈草郡國志曰久留岡者太守衞諷罷郡還京故老送别久留此岡又曰顯朝岡在鬱平縣陸績制渾儀處隋圖經曰厯陵縣西十里有石子岡寳山也而髙大有冢如硯子世謂之硯子冢是趙簡子冢也石虎令人發之初得炭深一丈得連木板厚髙八尺次得流泉水水色青泠非常以牛皮為囊作絞車以汲之一月而水無極乃止築城統之氣成樓闕酈道元水經註蓼水在襄國石井岡岡上有井大如輪隋區宇圖經志云此井光武營軍所鑿傍有叢荆棘生皆蟠縈如人手結云是光武繫馬處又石勒時天旱沙門佛圖澄於此岡掘得一死龍長丈餘濟以水良久乃蘇尋祭之龍騰空而上天雨即降因名龍岡鄱陽記曰大雷岡在縣東北後漢雷義字仲公所居又有小雷岡雷煥所居太平御覽卷五十三
