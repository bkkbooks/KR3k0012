body:
  text: 太平御覽卷二百五十七宋李昉等撰職官部五十五良刺史中良刺史中後魏書曰李崇為揚州刺史先是夀春縣人苟泰有二子三歳遇賊亡失數年不知所在後見在同縣人趙奉伯家泰以狀告各言己子並有隣證郡縣不能斷崇曰此易知耳二父與兒各在别處經禁數旬然後遣人告之曰君兒遇患向已暴死有教解禁可出奔哀也苟泰聞即號咷悲不自勝奉伯咨嗟而已殊無痛意崇知之乃以兒還泰詰奉伯奉伯乃欵引先亡一子故妄認之又曰李崇除兖州刺史兖土舊多刼盜崇乃村置一樓樓懸一鼓盜發之處雙槌亂擊四面諸村始聞者槌一通次復聞者以二為節次後聞者三為節各擊數千槌諸村聞鼓皆守要路是以盜賊發俄頃之間聲佈百里其中險要悉有伏人盜賊始發便爾擒送諸州置樓懸鼓自崇始也又曰韋崇除南潁川太守不好發摘細事常云何用小察以傷大道吏民感之郡中大治髙祖聞而嘉賞賜帛二百疋又曰崔亮為雍州刺史城北渭水淺不通船行人艱阻謂寮佐曰昔杜預乃造河梁况此有異長河且魏晉之日亦自有橋吾今决欲營之咸曰水淺不可為浮橋况消長無常又不可施柱恐難成立亮曰昔秦居咸陽横橋渡渭以像閣道此即以柱為橋今惟慮長柱不可得耳會天大雨山水暴至浮出長木數百根藉此為用橋遂成立百姓利之至今猶名崔公橋又曰任城王雲為冀州刺史雲留心政事甚得下情於是合州民各請輸絹五尺粟五升以報雲恩髙祖嘉之又曰城陽王長壽之子徽除并州刺史先是州界下霜人庶逃散徽輒開倉賑之文武咸共諫止徽曰昔汲長孺郡守耳尚輒開倉救人饑弊况我皇家親近授委大藩豈可拘法而不救人困也先給後表肅宗嘉之又曰李平字曇定為相州刺史勸課農桑修飾太學簡試通儒以充博士選五郡聰敏者以教之圖孔子及七十二弟子於講堂親為立贊前臺使頗好侵漁平畫履虎尾踐薄氷於客館注頌其下以示誡焉又曰韋彧為東豫州刺史彧以蠻俗荒梗不識禮儀乃表立太學選諸郡生徒於州總教又於城北置崇武館以習武焉境内清肅又曰韋珎遷郢州刺史在州有聲績朝廷嘉之遷龍驤將軍賜驊騮二疋帛五十疋榖三百斛珎乃召集州内孤貧者謂曰天子以我能綏撫卿等故賜以榖帛吾何敢獨當遂以所賜悉分與之又曰韓麒麟除齊州刺史假魏昌侯麒麟在官寡於刑罰從事劉普慶説麒麟曰明公仗節方夏而無所斬戮何以示威麒麟曰刑罰所以止惡葢不得已而用之今民不犯法何所戮乎若必須斬戮以立威名當以卿應之普慶慙懼而去又曰李崇沉深有將畧寛厚善御衆在揚州凡經十年養壯士數千人冦賊侵邉所向摧破號曰卧虎又曰陸俟長子馥多智有父風髙祖見而悦之謂朝臣曰吾常歎其父智過其軀是復踰於父矣少為内都下大夫出為相州刺史假長廣公為政清平抑强扶弱州中有舊德宿老名望素重者以友禮待之詢之政事如此者十人號曰十善於是發姦摘伏事無不驗百姓以為神明無敢冦盜徵為散騎常侍人乞留者千餘人又曰崔休為青州刺史青州九郡民單􅋆李伯徽劉通等一干人上書頌休德政靈太后善之休在幽青五六年皆清白愛民甚著聲績二州懐其德澤百姓追思之又曰任城王澄為揚州刺史下車封孫叔敖之墓毁蔣子文之廟表請復皇宗之學開四門之教詔從之又曰阮孚拜冀州刺史勸課農桑境内稱為慈父隣州號曰神君先是州人張孟都張洪建馬潘崔之璘張叔緒崔思哲等八人皆屯保林野不臣王命州郡號曰八王孚至皆請入城願致死効力北齊書曰趙郡王叡除北朔州刺史都督北燕北蔚北恒三州及庫堆以西黄河以東長城諸鎮諸軍事叡慰撫新遷量置烽戍内防外禦備有條法大為兵民所安有無水之處禱而掘井鍬搯裁下泉源湧出至今號曰趙郡王井又曰魏蘭根為岐州刺史從行臺蕭寶夤討破宛川俘其人為奴婢以美女十人賞蘭根蘭根曰此縣介於强虜故成背叛今當恤其饑寒柰何並充僕隸於是盡以歸其父兄部内麥多五穗隣州田䑕為灾犬牙不入岐土又曰韓軌遷秦州刺史甚得邉和神武巡秦州欲以軌還仍賜城人户别絹布兩疋州人田昭等七千户皆辭不受唯乞留軌神武嘉歎乃留焉北史曰齊任城王諧為并州刺史時有婦人臨汾川浣衣有乘馬人換其新靴馳而去者婦人持故靴詣州言之諧召居城諸嫗以靴示之紿曰有乘馬人於路被賊刼害遺此靴焉得無親屬乎一嫗撫膺哭曰兒昨著此靴向妻家如其語捕獲之時稱明察又曰齊平鑒遷懐州刺史鑒奏請於州西故軍道築城以防西軍從之尋而西魏來攻時新築城糧仗未集素乏水南門有大井隨汲即竭鑒具衣冠俯井而祝至旦而井泉湧溢有異於常又曰齊彭城王攸為滄州刺史有人從幽州來驢䭾鹿脯至滄州界脚痛行遲偶㑹一人為伴遂盜驢及脯去明旦告州乃令左右及府僚吏分市鹿脯不限其價其主見識之推獲盜者又曰竇熾為原州刺史熾挫抑豪右申理幽滯在州十載甚有政績州城北有泉水屢經遊踐嘗與僚吏宴於泉側因酌水自飲曰吾在此州惟當飲水而已又曰申㣲為襄州刺史時南方初附舊俗官人皆通餉遺㣲性㢘慎乃畫楊震像於寢室以自戒及代還人使送者數十里不絶㣲自以無德於人慨然懐愧因賦詩題於清水亭長㓜聞之皆競來讀遞相謂曰此是申使君手迹並冩誦之又曰赫連逹為雲州刺史性㢘儉邉境胡人或饋逹羊逹欲招異類報以繒帛主司請用官物逹曰羊入我厨物出官庫是欺上也命取私帛與之識者嘉其仁恕三國典畧曰賀祥為荆州刺史祥有惠政逺近欵附梁岳陽王詧欽其清素乃贈以竹屏風祥難違其意取付所司太祖聞之並以賜祥後周書曰獨孤信為秦州刺史先是守宰闇弱政令乖方民有寃訟厯年不能决信在州事無壅滯示以禮教勸以耕桑數年之中公私富實流民願附者數萬家太祖以其信著遐邇故賜名為信又曰逹奚武之在同州也時屬大旱髙祖勑武祀華嶽而嶽廟在舊山下當往祈禱武謂寮屬曰吾備位三公不能爕理隂陽遂使盛農之月乆絶甘雨天子勞心百姓惶懼忝寄既重憂責實深不可同於衆人在常祀之所必須登峰展誠尋其靈奥嶽既髙峻千仭壁立武年逾六十惟將數人攀藤援葛然後得上於是稽首祈請陳百姓懇誠晩不得雨即於嶽上藉草而宿夢見白衣人來執武手曰過辛苦甚相嘉尚武遂驚覺益用祗肅至旦雲霧四起俄而澍雨逺近沾浹髙祖聞之璽書慰勞又曰韋瑱字世珎魏恭帝二年賜姓宇文氏三年除𤓰州刺史通西域蕃夷往來前後刺史多受賂遺胡冦犯邊又莫能禦瑱雅性清儉兼有武畧蕃夷贈遺一無所受胡人畏威不敢為冦公私安靜夷夏懐之又曰長孫儉授荆州刺史東南道行臺僕射所部鄭縣令泉璨為民所訟推理獲實儉即大集僚屬而謂之曰此由刺史教誨不明信不被物是我之愆非泉璨之罪遂於聽事前肉袒自罰捨璨不問於是州城肅勵莫敢犯法魏文帝璽書勞之又曰王思政遷荆州刺史州境卑濕城塹多壊思政乃命都督藺小歡督工匠繕治之掘得黄金三十斤夜中宻送之至旦思政召佐吏以金示之曰人臣不宜有私悉封金送上太祖嘉之賜錢二十萬又曰泉仚為東雍州刺史性清約纎毫不擾於民在州五年每於鄉里運米以自給隋書曰令狐熙拜滄州刺史時山東承齊之弊户口簿籍類不以實熙曉喻之令自歸首至者一萬口在職數年風教大洽稱為良二千石開皇四年上幸洛陽熙來朝吏民恐其遷易悲泣於道及熙復還百姓出境迎謁歡呌盈路在州獲白烏白麞嘉禾甘露降於庭前栁樹又曰令狐熙時上祠泰山還次汴州惡其殷盛多有奸俠於是以熙為汴州刺史下車禁遊食抑工商民有向街開門者杜之船客停於郭外星居者勒為聚落僑人逐令歸本其有滯獄並决遣之令行禁止稱為良政上聞而嘉之顧謂侍臣曰鄴都天下難理處也勑相州刺史豆盧通令習熙之法其年來朝考績為天下之最賜帛三百疋頒告天下又曰楊逹字士逹為鄯鄭趙三州刺史俱有能名平陳之後四海大同上差品天下牧宰逹為第一賜雜綵五百段加以金帛又曰慕容三藏授廓州刺史州極西界與吐谷渾隣接奸宄犯法者皆遷配彼州流人多有逃逸及三藏至招納綏撫百姓愛悦襁負日至吏民歌頌之髙祖聞其能屢有勞問其年州内畜産繁孳獲醍醐奉獻賚物百段又曰衞𤣥出為資州刺史以鎮撫之𤣥既到官時獠攻圍大牢鎮𤣥單騎造其營謂羣獠曰我是刺史銜天子詔安養汝等勿驚懼也諸賊莫敢動於是説以利害渠帥感悦解兵而去前後歸附者十餘萬口髙祖大悦賜縑二千疋又曰郭衍為瀛州刺史遇秋霖大水其屬縣多漂没民皆上髙樹依大冡衍親備船栰并賫糧拯救之民多獲濟衍先開倉賑後始聞奏上大善之又曰辛彦之拜隋州刺史於時州牧多貢珎翫惟彦之所貢並供祭之物髙祖善之顧謂朝臣曰人安得無學彦之所貢稽古之力也又曰梁彦光為岐州刺史甚有惠政嘉禾連出於州境開皇二年上幸岐州悦其能乃下詔曰賞以勸善義兼訓物彦光操履平直識用凝逺布政岐下恩惠在人㢘慎之譽聞於天下三載之後自當遷陟恐其匱乏且宜旌善可賜粟五百斛物三百段御傘一枚庶使有感朕心日增其美四海之内凡百官人慕髙山而仰止聞清風而自勵又曰梁彦光為相州刺史有滏陽人焦通性酗酒事親禮闕為從弟所訟彦光弗之罪將至州學令觀於孔子廟於時廟中有韓伯瑜母杖不痛哀母力弱對母悲泣之像通遂感寤既悲且媿若無自容彦光訓諭而遣之後改過勵行卒為善士以德化人皆此類也又曰公孫景茂遷息州刺史法令清靜德化大行時屬平陳之後征人在路有疾病者景茂撤减俸禄為饘粥湯藥分賑濟之賴以全活者以千數上聞而嘉之詔宣告天下又曰薛胄為兖州刺史城東有沂泗二水合而南流汎濫大澤中胄遂積石堰之使决令西注陂澤盡為良田又通轉運利盡淮海百姓賴之號為薛公豐兖渠又曰梁毗出為西寧州刺史改封邯鄲縣侯在州十一年先是蠻夷酋長皆服金冠以金多者為豪儁由此遞相陵奪每尋干戈邊境畧無寧嵗毗患之後因諸酋長相率以金遺毗於是置金座側對之慟哭而謂之曰此物饑不可食寒不可衣汝等以此相滅不可勝數今將此來欲殺我耶一無所納悉以還之於是蠻夷感悟遂不相攻擊髙祖聞而善之又曰趙煚為冀州刺史甚有威德煚常有疾百姓奔馳爭為祈禱其得民情如此冀州俗薄市井多奸詐煚為銅斗鉄尺置之於肆百姓便之上聞而嘉焉頒告天下以為常法又曰蔡王智積為同州刺史儀衞資送甚盛頃之以修謹聞髙祖善之在州未嘗嬉戯遊獵聽政之暇端然讀書門無私謁有侍讀公孫尚儀山東儒士府佐楊君英蕭德言並有文學時延於座所設惟餅果酒纔三酌家有女妓惟年節嘉慶奏於太妃之前其簡靜如此又曰公孫景茂為道州刺史悉以秩俸買牛犢雞猪散惠孤弱不自存者好單騎巡人家至户入閱視百姓産業有循理者於都會時乃褒揚稱述如有過惡隨即訓導而不彰也由是人行義讓有無均通男子相助耕耘婦人相助紡績大村或數百户皆如一家之務其後請致仕優詔聽之仁壽中上明公楊紀出使河北見景茂神力不衰還以狀奏於是就拜淄州刺史賜以馬轝便道之官前後厯職皆有德政論者稱為良牧又曰梁彦光為相州刺史初齊亡後衣冠士人多遷闗内惟伎巧商販及樂户之家移實州郭由是人情險詖妄起風謡訴訟官人萬端千變彦光欲革其弊乃用秩俸之物招致山東大儒每鄉立學非聖哲之書不得教授常以季月召集之親臨策試有勤學異等聰令有聞者升堂設饌其餘並座廊下有爭訟惰業無成者坐之庭中設以草具及大成當舉行賔貢之禮又於郊外祖道并以財物資之於是人皆自勵風俗大改又韋世康傳尉遲迴之作亂也髙祖憂之謂世康曰汾絳舊是周齊分界因此亂堦恐生揺動今以委公善為吾守因授絳州刺史以雅望鎮之闔境清肅又曰豆盧勣為渭州刺史甚有惠政華夷悦服德澤流行多致祥瑞鳥䑕山俗呼為髙武隴其下渭水所出其山絶壁千尋由來乏水諸羗苦之勣馬足所踐忽飛泉湧出有白烏翔止㕔前乳子而後去又白狼見於襄武民為之謡曰我有丹陽山出玉漿濟我民夷神鳥來翔百姓因號其泉為玉漿泉太平御覽卷二百五十七
