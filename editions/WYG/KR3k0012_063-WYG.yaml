body:
  text: 太平御覧卷六十三宋李昉等撰地部二十八河南諸水孝水槖水涑水菊花水滍水澧水汝水潁水丹水白水灌水潧水洧水京水索水濮水隕石水呂梁水濠水汳水睢水泗水洙水沂水濰水汶水沭水淄水澠水孝水山海經曰平逢山西十里廆山其陽多㻯琈之玉俞隨之水出于其隈北流注于榖世謂之孝水也潘岳西征賦曰澡孝水以濯纓嘉美名之在兹槖水陜縣圖經曰槖水即魯水也西北入城百姓頼之呼為利人渠是也又按唐史云武徳元年陜東道行臺金部郎中長孫操自郡東又引水入城以代井汲百姓頼之與上渠俱利于民涑水十道志曰涑水亦名襄水荆楚之地水駕山而上者皆呼為襄上也今土人呼涑水上流亦為襄名既無定故陸澄地理志曰襄陽無襄水也又按襄沔記曰中廬有涑水注于沔此水中有物如三四嵗小兒膝頭如虎掌爪常沒水中出膝頭示人小兒不知者欲弄之輙欲啖人菊花水荆州記曰菊花源傍悉生芳菊被徑浸潭流其滋液水極芳馨谷中有三十餘家不穿井仰飲此水上夀二三百中夀百餘七八十者猶不為夀夫菊能輕身益氣令人久夀于此有徴矣又後漢胡廣字伯始為侍中久患風羸南歸飲此遂瘳焉滍水傳曰晋陽處父侵蔡楚子上救之與晋夾滍而軍張衡南都賦曰爾其川瀆則滍澧􅖐濜發源巖穴布濩汗漫漭沆洋溢總括趨欱箭馳風疾水經曰滍水出南陽魯陽縣西之堯山又曰滍水又東南經昆陽縣故城昔漢光武與王尋王邑戰昆陽敗走者相騰踐奔殪百餘里㑹大雨如澍滍川盛溢虎豹皆股戰士卒争赴溺死者以萬數水為不流王邑嚴尤陳茂輕騎皆乘尸而渡澧水說文曰澧水出南陽經衡山東入汝山海經曰葛山澧水出焉澧音禮東流于余澤其中多六足魚漢書地理志曰充縣厯山澧水出焉離騷云沅有芷兮澧有蘭又有澹水王仲宣贈孫文始詩云悠悠澹澧是也汝水說文曰汝水出𢎞農盧氏還歸山東入淮春秋説題辭曰汝出猛山汝之為言女也宋均注曰女取其生孕也毛詩汝墳道化行也文王之化行乎汝墳之國水經曰汝出河南梁縣勉鄉西天息山注曰地理志云出髙陵山即猛山亦言出魯陽縣之大猛山博物志云出燕泉山並異名也東觀漢記曰傅俊從上迎擊王莽之軍于陽關漢兵反走還到汝水上于水岸以手飲水澡頰塵垢謂俊曰今日罷倦甚諸卿寧憊耶潁水說文曰潁水出潁川陽城乾山東入淮豫州浸也水經注曰潁有三源右水出陽乾山之潁谷中水道源少室左水出少室南谿漢書曰灌夫潁川人宗族豪横潁人謡曰潁川清灌氏寕潁水濁灌氏族韓子曰鄭人有卜子妻市買鼈歸過潁川以鼈為渇飲之遂失鼈呂氏春秋曰湯讓天下於卞隨卞隨自投于潁水丹水漢書曰髙祖入關王陵起兵丹水以歸漢水經曰丹水出京兆上洛縣冡嶺山至丹水縣入于汋呂氏春秋曰堯有丹水之戰以服南蠻注曰水出丹魚先夏至十日夜伺之魚浮水側赤光上照如火網而取之割其血以塗足可以歩行水上長居淵中尚書逸篇曰堯子不肖舜使居丹淵為諸侯故號曰丹朱白水水經曰白水出朝陽縣西東流過淇縣南至新野縣東入于渭東觀漢記曰光武皇考封南陽之白水鄉莊子曰兩神女于白水之上禹過趨而問之曰治天下奈何女曰股無胈脛無毛手足胼胝何足以至司馬彪注云言憂天下太甚也灌水水經注曰灌水經蓼縣禇先生所謂神龜出于江灌之間是也潧氷說文曰潧水出鄭國水經注曰潧水出鄫城西北鷄絡塢下東南流入于洧潧字今作溱詩曰子惠思我褰裳渉溱子不我思豈無他人又曰溱與洧方渙渙兮士與女方秉蕳兮孟子子産聽鄭國之政以其乘輿濟人於溱洧洧水說文曰洧水出潁川陽城山東南入潁水經云出宻縣馬嶺山注云洧别源也詩曰子惠思我褰裳渉洧子不我思豈無他士傳曰鄭大水龍鬬于時門之外洧淵京水水經注曰京水發源京縣黄堆山東亦名祝東泉勢沸湧俗謂之京水也素水水經注曰索水出京縣西南崇渚與山關水同源分流即古旃然水也左傳謂楚伐鄭次旃然即此水也史記曰漢王敗于彭城韓信擊破水兵于京索間以故項羽不能西濮水說文曰濮水出東郡濮陽南入鉅海水經曰瓠子河東北過廩丘縣為濮水史記曰晋平公令師涓鼔琴未終師曠止之曰亡國之音也平公曰是何道出答曰此師延所作與紂為靡靡之樂武王伐紂師延東走自投濮水之中故聞此聲必于濮水之上凡聞此聲者國削問果于濮上得之莊子釣于濮水楚王使大夫二人先焉曰願以境内為累荘子持竿不顧也隕石水水經注曰睢陽有隕石水一名漆溝左傳云隕石于宋五隕星也故老云此水有時竭涸五石存焉故名隕石水墜處為澤吕梁水述征記曰彭城呂梁縣有呂梁水即莊子所稱丈夫水列子曰孔子觀呂梁懸水三十仭流沬三十里黿鼉魚鼈不能㳺之數百歩而出被髪行歌荘子亦載濠水水經注曰濠水出隂陵縣之陽亭北小屈石穴北注于淮莊子曰莊子與惠子遊于濠梁水上汳水疋萬切水經注曰汳水出隂溝至浚儀縣北入睢水注云隂溝即浪蕩渠也亦言汳受旃然水又云丹沁亂流于武徳絶河入南陽合汳故兼丹水之稱河湧水斷汳承旃然而東自玉賁灌大梁水出縣南而不繞其北夏水洪汎則是瀆津通故渠即隂溝也於大梁北又曰浚水矣故陳㽞風俗傳云浚水延其北者也睢水漢書曰項羽與漢王戰于靈壁東漢軍大敗睢水為之不流地理志曰睢水首受陳㽞縣浪蕩渠水經曰睢水首經睢陽縣又東過相縣南流曲折而後入淮又曰睢水又東經睢陽縣故城南積而為蓬洪澤也九州要記云睢陽水在宋城西又云漢水經新城南東合明溝水傳曰睢渙之間出文章天子郊廟御服出焉尚書所謂厥篚織文者也泗水說文曰泗水受濟水東入淮禮曰曽子謂子夏曰吾與爾事夫子于洙泗之間退而老于西河之上漢書地理志曰洙泗之水其民渉渡幼者扶老及魯道衰洙泗之間斷斷如也論衡曰儒書言孔子葬泗水泗水為之却流此虗也泗水無知天神使之却流孔子生時何不使之尊敬乎地理志曰泗水出濟隂乘氏縣又云出卞縣地經言北山皆為非矣水經注曰泗水出魯東北余昔因公事沿厯徐沇路經洙泗因令尋其源流水出卞縣故城東南桃墟西北按春秋昭公七年謝息納季孫之言以孟氏成邑與晋而遷于桃杜預曰魯國卞縣東南桃墟世謂之曰陶墟舜所陶處也井曰舜井皆為此也墟有漏澤方一十五里其西有阜俗謂之媯亭山蓋有陶墟舜井之言因復有媯亭之名矣阜則有二石穴廣圓三四尺穴有通否水有盈漏漏則數夕之中傾陂竭澤矣左右居民識其將漏豫以木障穴口魚鼈介鱗不可勝載矣自此連岡通阜西北四十里許岡之西際便得泗水之源也又張華博物志曰泗水陪尾蓋斯阜也石穴吐水五泉俱導泉穴各徑尺餘水源南側有一廟松栢成林時人謂之源泉祠非所䆒也又漢景帝三年有白頸烏與黒烏群鬬于呂縣白頸烏不勝墮泗水中死者數千洙水水經曰洙水出溱山蓋縣臨樂山西南至汴縣入于泗注云洙水出溱山而南流盗泉水注云泉出卞城東北卞山之隂論語考䜟曰水名盗泉仲尼不潄又注曰夫子教于洙泗之間今于城北二水之中即夫子設教之所也從征記曰洙泗二水交於魯城東北十七里闕里有洙泗墻南北一百二十歩東西六十歩四門各有石閘北門去洙水百餘歩沂水説文曰沂水出東海費縣入泗一曰出泰山青州浸也水經曰沂水出泰山蓋縣艾山注曰鄭康成云出沂山臨山水有二源南導源世謂之祚泉山北水所發俗所謂魚窮泉俱東南流合成一川論語曰莫春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸西京雜記曰魯人秋胡娶妻三日而逰宦三年休還其婦採桑于郊胡至不識而悦之乃遺以金妻曰妾夫逰宦未返于兹三年未有被辱如今日也不顧胡慙而退至家問妻何在母曰採桑于郊乃是向來挑者也夫妻俱慙遂赴沂水而死尸子曰韓雉見申羊于魯有龍飲于沂韓雉曰吾聞之出見虎摶之見龍射之今弗射是不行吾聞也遂射之郡國志曰沂水今號為長利圯上有橋即張良為黄石公取履所濰水水經注曰濰水導源濰山許慎云濰水出箕屋山淮南子曰濰水出覆舟山蓋廣異名也史記曰韓信與楚將龍且夾濰水而陳韓信乃夜令為萬餘囊盛沙以遏濰水引軍擊且偽退且追北信決水水大至且軍半不得渡遂斬龍且汶水說文曰汶水出琅琊泰山朱虚東入濰又云出泰山萊蕪西南入濟從征記曰汶水出萊蕪縣之西南又言自萊蕪谷夾路連山數百里水黒多行石澗中出草藥松柏林葱鬰䝉翳崖壁相望或傾岑岨徑或廽巗絶谷有風鳴條山壑俱響陵髙降深兼惴慄之懼危溪險徑有懸束之艱未出谷十餘里有别谷在狐山下谷有清泉泉上數丈有石穴二口容人平行入穴丈餘髙九尺餘廣四五丈言是昔人居山之處薪爨烟黝猶存谷中林木緻宻行人鮮有能至者又有少許山田引灌之蹤尚存出谷有平丘面山傍水土人悉以種麥云此丘不宜殖稷與黍而宜麥齊人相承以殖之詩曰汶水湯湯行人彭彭周禮考工記曰狢踰汶則死地氣然也論語曰季氏使閔子騫為費宰閔子騫曰善為我辭焉如有復我者則吾必在汶上矣傳曰齊人歸我汶陽之田沭水水經云沭水出琅琊東莞縣西北山東南經東海厚丘縣梁天監二年三月土人張高等五百餘人相率開鑿此溪引漑水田二百餘頃俗名為紅花水東流入泗州連水界淄水水經曰淄水出泰山萊蕪縣原山注云世謂之原泉淮南子曰淄澠之水合易牙嘗而知之淄澠濟二水也新序曰齊有田巴先生者行修于内智明于外齊君聞其賢聘而問政焉田巴對曰政在正身正身之本在于羣臣大王召臣臣改制前飾將造公門問於臣妾曰奚若妾愛臣曰美將出門問從者從者畏臣曰美及臨淄水而觀影然後自知醜惡也今齊之臣妾諛王者非特二人王如臨淄水見已之惡過而能改斯齊國治矣澠水水經注曰澠水出營丘城東世謂之漢溱水入于時水傳曰有酒如澠太平御覽卷六十三
