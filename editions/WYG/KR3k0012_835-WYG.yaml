body:
  text: 太平御覽卷八百三十五宋李昉等撰資産部十五錢上周禮天官下曰外府掌邦布之出入以共百物而待邦之用凡有法者布泉也布讀為宣布之布其蔵曰泉其行曰布取名於水泉其流行者無不徧泉盖一品周景王鑄大泉而有二品後數變易不復識本制至漢唯有五銖久行王莾改貨而易作泉布多至十品今存於民間多者有貨布大泉貨泉貨布長二寸五分廣寸首長八分有竒廣八分其圜好徑二分半足枝長八分其右文曰貨左文曰布重二十五銖直泉二十五大泉徑一寸二分重十二銖文曰大泉直十五貨泉徑一寸重五銖右文曰貨左文曰泉直一也國語曰周景王二十一年將鑄大錢景王周靈王之子錢者金幣之名所以質貨物通財用也古曰泉後轉曰錢大錢大於舊其價重也單穆公曰不可穆公王卿士單靖公曽孫古者天降灾戾於是乎量資幣權輕重以振救民量度資財也權稱振拯也民患輕則為之作重幣以行之民患幣輕而物貴則作重幣以行其輕也於是乎有母權子而行民皆得焉重曰母輕曰子以子貨物物輕則子獨行物重則以母權而行之也子母相通民皆得其欲也若不堪重則多作輕而行之亦不廢重於是乎有子權母而行小大利之堪任也不任者幣重物輕則妨其用也故雜而用之子權母者母不足則以子平而行之故民皆以為利今王廢輕而作重民失其資能無匱乎廢輕而作重則本竭而末寡故民失其資若匱王用將有所乏民財匱無所供上故王将用乏乏則將厚取於民民不給將有逺志是離民也給供也逺志逋逃也若民離而財匱灾至而備亡其若之何備亡無救灾之備也王其圖之王弗聽卒鑄大錢歸藏曰有人将来遺我錢財日夜望之周書曰武王克啇散鹿臺之錢發鉅橋之粟韓詩曰既阻我徳賈用不售一錢之物舉賣百何時當售也史記曰初蘇秦之燕貸百錢為資及得資以百金償之又曰漢髙祖以愛繇咸陽吏皆奉錢三李竒注或三百或五百蕭何獨以五後益封二千户又曰單父人吕公善沛令避仇従之沛中豪傑吏聞令有客皆往賀蕭何為主吏主進令諸大夫曰不滿千錢坐堂下髙祖為亭長素易諸吏乃紿為謁者曰賀錢萬貫不持一錢又曰上使善相者相鄧通曰當貧餓死文帝曰能富通者在我何謂貧於是賜通蜀嚴道銅山自鑄錢鄧氏錢布天下又曰安息在大月氐西以銀為錢錢如其王面王死轉更錢效王靣焉又曰今上即位武帝數歳漢興七十餘年之間國家無事京師之錢累百巨萬貫朽而不可校自孝文造四銖錢至是三十餘年従建元以来用少縣官往往多即銅山鑄錢民益盗鑄不可勝數錢益少而貴漢書曰秦兼天下幣為二等黄金以鎰為名孟子曰二十兩為鎰臣瓉按秦以一鎰為一金漢以一斤為一金上幣銅錢漢興以為秦錢重難用更令民鑄莢錢如淳曰莢如榆莢又曰凡貨金錢布帛之用夏殷以前其詳靡記太公為周立九府圜法李竒曰圜即錢也黄金方寸而重一斤錢圜函方輕重以銖布帛廣二尺二寸為幅長四丈為疋故貨寳於金利於刀流於泉布於布行於流泉布扵民間束於帛又曰孝恵帝時天下初定呉有豫章銅山即招致天下亡命者盗鑄錢又曰髙后二年秋七月行八銖錢又曰文帝五年除盗鑄錢令應劭曰聽放鑄更造四銖應劭曰文帝以五分錢太輕小更作四銖錢文亦曰半兩錢今民間半兩錢最輕小又曰建元元年春行三銖錢五年春罷三銖錢而行半兩錢又曰成帝時郡國鑄錢民多姦錢多輕而公卿請令京師鑄官赤仄又曰宣帝二年春出水衡錢應劭曰水衡與少府皆天子私錢耳縣當仰給司農今出水衡錢言宣皇即位為異政又曰自孝武元狩五年三官初鑄五銖錢至平帝元始中成二百八十億萬餘又曰韓信為楚王都下邳信至國召下鄉亭長賜錢百曰公小人為徳不竟又曰東方朔曰侏儒長三尺餘奉一嚢粟錢二百四十臣朔長九尺餘亦一嚢粟錢二百四十侏儒飽欲死臣朔飢欲死又曰張安世以父子封侯在位太盛廼避不受禄詔都内别藏張氏無名錢以百萬數文頴曰都内主藏官也張晏曰安世以還官官不簿又曰貢禹上書曰臣禹年老家資不滿萬錢又曰王嘉奏事云孝元皇帝奉承大業温恭少欲都内錢四十萬水衡錢二十五萬少府錢十八萬内錢後宫貴人従上林虎圏猛獸驚出馮貴人當之元帝喜其義賜錢五萬掖庭見親加賜親屬其人勿衆謝重失人心賞賜節約是時外戚貲千萬者少是故少府水衡錢多又曰王莾居攝欲防民盗鑄乃禁不得挾銅炭又曰􅄢賔國以銀為錢文為騎馬幕為人面楚漢春秋曰項梁隂養死士九十人叅木者所與計謀者也木佯疾於室中鑄大錢以具甲兵後漢書曰明帝時舘陶公主光武女為子求郎不許而賜錢千萬謂羣臣曰郎官上應列宿出宰百里史記曰太㣲宫後二十五星郎位也有非其人則民受其殃是以難之又曰樊儵卒帝遣小黄門張音問所遺言先是河南縣亡失官錢典負者典謂主典負謂欠負坐死及罪徙者甚衆遂委責於人以償其耗鄉部吏司因此為奸儵常疾之欲奏罷之疾病未及得上張音歸具奏以聞帝覽之而悲嘆勑郡並従之又曰京兆尹閻興召第五倫為主簿時長安鑄錢多奸巧乃署倫為督鑄錢掾領長安市東觀漢記曰時長安市未有秩又鑄錢官輕奸所集無能整齊理之者興署倫都督鑄錢掾領長安市其後小人争頌皆云第五掾所平亦無姦枉又曰初馬援在隴西上書言宜如舊鑄五銖錢事三府奏以為未可事遂寢及援還従公府求得前奏難十餘條乃隨牒觧釋東觀漢記曰十三難援一一觧之條奏其狀也更具表言帝従之天下頼其便又曰公孫述廢銅錢置鉄官錢置鉄以鑄錢百姓貨幣不行蜀中童謡言黄牛白腹五銖當復好事者竊言王莾稱黄述自號白五銖錢漢貨也言天下當并還劉氏又曰江革建武末年與母歸鄉里每至歳時縣當案比案驗以比之猶令貌閲也革以母老不欲揺動自在轅中輓車不用牛馬由是鄊里稱之曰江巨孝臨淄令楊音髙之設特席顯異巨孝於稠人廣衆中親奉錢以助供養又曰楊秉免歸雅素清儉家至貧窶并日而食任城故孝㢘景慮賫錢百餘萬以餉秉秉閉門拒絶不受又曰鍾離意薦劉平王望等書奏有詔徴平等特賜辦􅋔錢至皆拜議郎又曰崔寔従兄烈有重名於北州歴位郡守九卿靈帝時開鴻都門牓賣官爵公卿州郡以至黄綬各有差其富者則先入錢貧者到官而後倍輸時叚潁樊陵張温等雖有功勤名譽然皆先輸貨物而後登公位烈時因傅母入錢五百萬得為司徒及拜日天子臨軒百僚畢㑹帝顧謂親倖者曰悔不小靳可至千萬靳固惜之也程夫人於傍應曰崔公冀州名士豈買官頼我得是反不知姝耶姝美也言反不可斯事之美也姝或作妹根本也又曰董卓壊五銖錢更鑄小錢悉取洛陽及長安銅人鐘虡飛亷銅馬之屬以充鑄焉故貨賤物貴榖石數萬又錢無輪郭文章不便人用魏志曰卓鑄小錢大五分無文章肉好無輪郭不磨鑢也時人以為秦始皇見長人於臨洮乃鑄銅人卓臨洮人也而今毁之雖成毁不同㓙暴相類焉又曰車駕西廵乃厚賜韋彪錢珎羞食物使歸平陵上家焉又曰鄭𢎞為楊羡令都鄉部民有弟用兄錢者為嫂所賣叔未還嫂詣𢎞言之𢎞賣巾車為叔還錢兄慙自繫婦即去又王符論曰夫竊位之人天奪其鑒寧見朽千萬而不忍賜人一錢續漢書曰劉寵字祖榮遷㑹稽太守正身率下郡中大治徴入為將作大匠山隂民去治數千里有若邪水在山谷間五六老翁年七八十聞遷相率共送寵人賫百錢寵見勞来曰父老何乃自苦逺来皆對曰山人鄙老生未嘗到郡縣他時吏發求不已民間或夜行不絶狗吠竟夕人不得安自明府下車以来狗不夜吠吏希至人間年老遭值聖化聞當見棄去故戮力来送寵謝之為選受一大錢故寵在㑹稽􅃅為取一錢其清如是又曰扶風人士孫奮居富而慳恡梁冀因以馬乗遺之従賃錢二十萬奮以錢十萬與之冀大怒又曰靈帝中平二年二月己酉南宫靈臺災庚戌樂城殿門災延及北闕燒嘉徳和歡殿收天下田畆十錢以治宫加調刺史二千石遷除皆責治宫錢大郡至二千萬帝本侯家居貧即帝位曰桓帝不能作家曽無錢財故於西園造萬金堂以為私藏復寄小黄門常侍家私錢至數千萬東觀漢記曰光禄勲杜林與馬援鄉里親厚援南方還時林馬適死援遣子持一匹馬遺林曰朋友有車馬之饋可以備之居數日林遣子奉書曰將軍内施九族外有賔客望恩者多林父子食卿禄禄常有盈今奉錢五萬援謂兒曰當以此為法杜伯山所以勝我者也又曰趙勤字益卿劉賜姊子勤童幼有志操往来賜家國租適到時勤在旁賜指錢示勤曰拜乞汝三十萬勤曰拜而得錢非義所取終不肯拜又曰荀均字仲虞兄仲祥為縣吏受禮遺均數諫止不聽即脫身出作歳餘得錢數萬歸以與兄曰錢盡可復得為吏坐賍終身捐棄兄感其言遂亷潔稱清吏又曰王阜為益州大守大將軍竇憲貴盛嘗移書益州取六百萬阜疑有奸詐以狀上憲追奴騶帳下吏李文迎錢阜以詔書未報拒不與文積二十餘日詔書報給文以錢市馬獻帝春秋曰靈帝作錢猶五銖而有四道連於邉輪識者以為妖竊言錢有四道京師將破壞此錢四出散於四方乎還如其言范􅁮後漢書云四出錢應劭漢官曰王莾簒位以劉字金刀罷五銖更作小錢文曰貨泉其文反白水真人此則世祖中興之瑞也魏志曰劉虞在幽州清浄儉約以禮義化民靈帝時南宫災吏遷補州郡者皆責助治宫錢或一千萬或三千萬富者以私財辦或發民錢補之貧而清慎者無以充調或至自殺靈帝以虞清貧特不使出錢也又曰劉類為𢎞農太守使人掘地求錢所在市里皆有孔穴又曰文帝夢磨錢文欲令滅而更明周宣占之曰陛下家事時帝欲治弟植逼太后但加貶守呉書曰嘉禾五年春鑄大錢一當五百詔使吏民輸銅計銅畀直設盗鑄之科蜀志曰先主攻劉璋與士衆約若事定庫府百物孤無豫焉及㧞成都士衆捨干戈赴府藏競取寳物軍用不足先主甚憂之劉巴曰易耳但當鑄直百錢平諸物價令吏為官市先主從之數月之間府庫充矣晉陽秋曰朝士以牛酒勞齊王冏平原王幹獨賫百錢晉書曰阮宣子常杖頭挂百錢造市店酣飲而歸又曰王衍疾其妻郭氏之貪鄙故口未嘗言錢郭氏欲試之令婢以錢繞床使不得行衍晨起見錢謂婢曰舉阿堵物却其措意如此又曰王𨗳子悦少侍講東宫歴吴王友中書侍郎𨗳夢人以百萬錢買悦意甚惡之後掘地得錢一窖皆蔵閉而悦果以疾終又曰張軌為涼州叅軍索輔言於軌曰古者金貝皮幣為貨息榖帛量度之耗二漢制五銖錢通易不滯太始中河西荒廢遂不用錢裂疋以為叚數縑布既壞市易又難徒壊女工不任衣用弊之甚也今中州雖亂此方安全宜復五銖以濟通變之㑹軌納之立制准布用錢錢遂大行人頼其利南史曰宋文袁皇后家本貧薄后每就上求錢帛以贍之上性儉所得不過錢三五萬帛三五十疋後潘淑妃有寵愛傾後宫咸言所求無不得后聞知未知信否乃因潘求三十萬錢與家以觀上意宿夕便得因此恚恨成疾不復見上宋書曰劉秀之為南秦州刺史加都督漢川饑饉秀之躬自儉約先是漢川悉以絹為貨秀之限令用錢百姓利之又曰始興王濬常送錢三萬餉袁淑一宿復遣追取謂為使人謬誤欲以􅃧淑淑與濬書曰聞之前志七年之中一與一奪義士猶或非之况宻邇旬次何其裒益之亟也竊恐二三諸侯何以觀之又曰廢帝即位鑄二銖錢形式轉細官錢每出人間即模效之而大小厚薄皆不及也無郭不磨鑄如今之剪鑿者謂之莱子錢景和元年沈慶之啓通私鑄錢一千錢長不盈三寸大小稱此謂之鵝眼錢劣於此者謂之綖環錢貫之以縷入水不沉隨手破碎市井不復料數十萬錢盈一掬斗米一萬商賈不行明帝初唯禁鵝眼綖環其餘皆通用齊書曰張融觧褐為宋新安王子鸞叅軍王母殷淑儀薨後四月八日建齋并醮佛僚佐襯者多至一萬少者不減五千融獨注襯百錢帝不恱曰融貧當序以佳禄出為封溪令宋書曰郭世通嘗與人共於山隂市貨物誤得一千錢當時不覺分背方悟追還本主驚歎以半直與之世通委之而去又曰蔡廓罷豫章郡還起二宅先成東宅以與兄軌廓亡後軌後罷長沙郡還錢五千萬以禆宅直廓子興宗年十歲白母曰一家由来豐儉必共今日宅直不宜受也母恱而従焉軌之深有愧色謂其子談曰我年六十行事不及十歳小兒又曰劉凝之隱居荆州年饑衡陽王義季慮凝之餓斃餉十萬錢凝之大喜將錢至市門觀有饑色者悉分與之俄頃而盡又曰山隂人孔祐至行通神隱於四明山嘗見山谷中有數百斛錢視之如瓦石不異又曰戴法興父碩子法興二兄延夀延興並修立延夀善書延興好學山隂有陳載者家富有錢三千萬鄊人或言戴碩子二兒敵陳載三千萬錢齊書曰曹虎為古衛將軍晩節在雍州致見錢七十萬皆厚輪大郭又曰丘冠先使于蠕蠕執節不拜為所殺武帝以冠先不辱命賜其子雄錢一萬布三十疋雄不受又曰范述曽任永嘉郡太守勵志清白不受饋遺明帝下詔褒美徴為逰擊將軍郡故舊送錢三十餘萬述一無所受又曰趙僧巖栖遲山谷嘗以一壺自隨一旦謂弟子曰吾今夕當死壺中大錢一千以通九泉之路蠟燭一挺以照七尺之屍至夜而亡梁書曰顧協為舎人嘗有門生始来事協知其亷潔不敢厚餉止送錢二千協發怒杖二十因此事絶於饋遺又曰庾丹父景休位御史中丞丹少有才雋與伏挺何子明俱為周捨所狎初景休罷巴東郡頗有資産丹負錢數百萬責者塡門景休怒不為之償既而朝賢之丹不之景休景休恱乃悉為還之梁書曰宋季雅罷南康郡市宅居吕僧珍宅側僧珍問宅價曰一千一百萬怪其貴季雅曰百萬買宅千萬買隣及僧珍生子季雅往賀署函曰錢一千閽人少之不為通强之乃進僧珍疑其故親自發乃金錢又曰江禄為武寧郡頗有資産積錢於壁壁為之倒迮銅物皆鳴人􅃧之曰所謂銅山西傾洛鐘東應者也又曰何逺為武昌太守武昌俗皆汲江水盛夏逺患水温每以錢買人井寒水不受錢者則連水還之其他事率多如此南史曰蕭恵明子驂素梁天監中位丹陽丞初拜日武帝賜錢八萬驂素一朝散之親友又曰謝譓為東陽内史及還五官送錢一萬止留三百答書曰數多留少更以為愧又曰梁謝舉兄子僑素貴嘗一朝無食其子啓欲以班史質錢答曰寧餓死豈可以此充食乎太平御覽巻八百三十五
