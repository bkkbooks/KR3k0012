  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_907-1a, image: WYG0901/WYG0901-0092a.png}
body:
  text: 太平御覽卷九百七宋李昉等撰獸部十九麞麕兎麞春秋運斗樞曰星散為麞伏候古今註曰麞有牙而不能噬鹿有角而不能觸麞一名麕青州人謂麕為麞抱朴子曰麞入軍中當遷徙之又曰山中稱赤吏者麞也吕氏春秋曰使麞疾走馬弗及也而得之者時顧也瑞應圖曰宋元嘉華林園養麞生二百子文帝又獲青麞晉起居注曰咸寧中白麞見魏郡後諸州各送白麞異苑曰青州劉幡元嘉初射得一麞剖肚臓以草塞之蹶然起走幡従而㧞塞須臾復還倒如此三焉幡宻求此種類治傷痍多愈北史曰後魏廣平王嘗獵於河北馬塲間逐一麞入草命人圍繞將自射之田已經燒不見其出遂失麞之所在惟有磚塔存焉懷乃悵然動仁恕之心觧鷹放犬遂不復獵蕭廣濟孝子傳曰蕭國遭䘮有鵠遊于庭至暮而去麞入其門與犬馬侣至旦而去王述上白麞表曰所領阮藻之於江寧縣界得白麞一頭毛色鮮潔異於比類誠嘉祥也麕爾雅曰麕牡麌牝麜音栗其子􅂒音助其跡解絶有力豜音肩説文曰麕麞也毛詩曰野有死麕惡無禮也野有死麕白茅包之穆天子傳曰天子賜曹奴之人白銀之麕論衡曰都尉王子鳯時麕入府中其後遷為丹陽太守魏文帝詩曰巾車出鄴宫較獵東橋津灣弓忽髙馳一發連雙麕晉書曰中興所在獻白麕建武故事曰咸和六年計貢合集扵樂堂有野麕走至堂前左右逐之於池中而獲之沈約宋書曰宗室傳曰劉慶於廣陵有疾野麕入府心甚惡之因陳疾求還太祖許之薨扵京邑爾雅曰兎子㛯敷万切其跡迒絶有力欣迒音剛又明剛反廣志曰大者曰毚音讒春秋運斗樞曰玉衡星散而為孫氏瑞應圖曰赤者瑞獸王者盛徳則至典略曰者明月之精詩小雅巧言曰躍躍毚遇犬獲之又國風曰有爰爰雉離於羅爰爰緩急意又小雅瓠葉曰有斯首炮之燔之斯白也史記曰李斯出獄頋謂其子曰吾欲與爾復牽黄犬俱出上蔡東門逐狡其可得乎又曰范雎謂秦王曰夫以秦而治諸侯譬如縦韓盧而搏蹇也謝承後漢書曰儒叔林為東郡太守赤烏巢扵屋梁白産於床下又曰方儲字聖明丹陽歙人幼䘮父事母母死負土成墳種樹千株鸞鳥栖集其上白兎遊其下范􅁮後漢書曰南徼外蠻夷獻白雉又曰蔡邕性篤孝母嘗滯病三年邕自非寒暑莭變未嘗解衿帶不寢寐七旬母卒廬於塜側動靜循禮有馴擾其室傍漢獻帝春秋曰張楊大將陸固屯於謝犬巫戒之曰將軍本名曰兎兎見犬必驚不宜屯此固不從司空曰兎入犬城但當敗遂進軍擊平之張璠漢記曰梁冀起兎苑於河南移檄所在調發生兎刻其毛以為識民有犯之者罪至死西域嘗有賈人来不知禁誤殺一兎轉相吿坐死者十餘人也晉書載記曰石勒時荏叙之切平令師歡獲黑兎獻之扵勒或以為勒龍飛革命之祥於晉以水承金兎隂精之獸𤣥為水色此殿下宜速應天人之望也於是大赦改咸和三年曰太和王隱晉書曰慕容皝田於南鄙見父老曰此非獵所言卒不見皝明日又出見白兎馳射之墜馬扵石即死後魏書曰有兎入扵後宫撿問門官無従得入太祖怪之令崔浩推其咎徴浩以為當有鄰國貢嬪嬙者明年姚興果来獻女三國典略曰周命尉遲逈伐蜀帥甲士一萬二千騎萬匹自散闗由故道而入太祖送於城西見一走兎命弟中領軍綱射之綱誓曰若獲此兎必當破蜀俄而獲兎太祖喜曰事平之日賞汝佳口及克蜀乃賜侍婢二人隋書曰華秋汲郡臨河人也㓜䘮父事母以孝聞家貧傭賃為養其母卒秋髪盡禿落廬於墓側負土成墳有人欲助之者秋輙拜而止之建業初調狐皮郡縣大獵有一兎人逐之奔入秋廬中匿秋膝下獵人至廬所異而免之自是此兎常宿廬中馴其左右郡縣嘉其孝感具以状聞於朝詔褒之春秋考異書曰熒惑不明雉生兎焉春秋運斗樞曰行失揺光則兎出月春秋元命苞曰君失徳則地吐泉魚銜兎宋均注曰兎隂精魚是陽見制也詩推度災曰八月成光决鼻始明决鼻也皇帝占書曰月望而月兎不見者所見之國山崩大水䧟民崔豹古今註曰兎口有缺凥有孔括地圖曰天池之山有獸如兎名曰飛兎以背毛飛也莊子曰蹄者所以獲兎也得兎而忘蹄蹄者取兎網韓子曰宋人有耕者田中有株兎走觸折頭而死因釋耕守株冀復得兎為宋國笑慎子曰一兎走街百人追之積兎於市過而不視非不欲得定不爭也文子曰飛鳥返鄉兎走歸窟狐死首丘抱朴子曰兎壽千嵗五百歳其色白又曰山中夘日稱丈人者兎也又曰采女丹法以兎血和丹與蜜蒸之百日服之如梧子者二丸一百日有神女二人来侍之可役使淮南子曰以兎之走使大如馬則逐日追風及其為馬則不走矣又曰楚王佩玦逐兎馬速玦破乃取兩玦重而著之其破愈疾述異記曰殷紂之時大龜生毛兎生角兵甲中興之兆也春秋後語曰昔齊有良兎曰東郭俊本或作狡曰以其善走故俊一日走百里有良狗韓子獹黒犬也獹讀如盧也亦一日而走百里使人遥見而指屬指屬猶指縦也屬音之欲切則雖韓獹不及良兎躡跡而蹤之則雖東郭不能離也春秋後語曰淳于髠説齊威王曰韓子獹者天下之壯犬也東郭俊者海内之狡兎也韓子獹逐東郭俊環山者三騰山者五兎極於前而犬疲於後犬兎俱疲各死其處田父見而獲之無勞倦之苦而擅其功今齊魏相持頓兵敝衆臣恐强秦大楚乗其後而有田父之功威王懼而罷兵又曰莊辛對楚王曰臣聞鄙諺曰見兎而顧犬未為晚也亡羊而補牢未為遲也又曰馮鍰謂孟嘗君曰聞狡兎有三窟范子計然曰兎毛出𤣥莵樂浪竹書紀年曰昭王十九年天大曀雉兎皆震宣王三十年有兎舞鎬風俗通曰食兎髕音牝者令人面生䯣食得髕者賞以寒酒按秦法言好車裂抽脅黔首飲泣永歎故食兎髕以為嘉瑞全己之髕也所以有賞耳古今注曰成帝建平元年山陽得白兎目赤如朱京房妖占曰兎止城上邑必虛入宫生子空虛廣志曰漢諸郡獻兎毫書鴻都門題惟趙國毫中用論衡曰兎䑛雄毫而孕及其生子従口中出又博物志曰兎望月而孕兎吐子舊有此説余目所見也又曰儒者言月中兎夫月中水也兎在水中無不死者夫兎月氣也又曰姙娠者不食兎肉食之令兒口缺幽明録曰桓大司馬温時有恭軍夜坐忽見屋棟樑間有一伏兎張目切齒而向之甚可畏惡兎来轉近遂引刀而斫之正中於兎而實反傷其膝流血滂沱深怪此意合家中悉蔵刀刄不以自近後忽復見如前意廽惑復𦂳刀重斫因傷委頓幸刀不利故不至死再過而止傅𤣥歌辭曰兎擣藥月間安足道神烏􅃧雲間安足道楚辭天問曰夜光何徳死則又育夜光月也育生也古豔歌曰焭焭白兎東走西顧衣不如新人不如故樂府歌詩曰採取神藥山之端白兎搗成蝦蟇丸奉上殿下一玉柈音盤太平御覽卷九百七
