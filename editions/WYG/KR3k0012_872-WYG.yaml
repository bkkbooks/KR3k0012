body:
  text: 太平御覽卷八百七十二宋李昉等撰休徴部一叙休徴日月星風雨雲霧露雷氣光人神叙休徴書曰休徴曰肅時雨若曰乂時𤾉若曰哲時燠若曰謀時寒若曰聖時風若禮曰國家將興必有禎祥又曰用民必順故無水旱昆蟲之災民無㓙饑妖孽之疾又曰四靈以爲畜故飲食有由也何謂四靈麟鳯龜龍謂之四靈又曰天降膏露地出醴泉山出噐車河出馬圖鳯凰麒麟皆在郊棷棷聚草也龜龍在宫沼其餘鳥獸之卵胎可俯而闚也則是無故非有他事使之然也先王能修禮以達義體信以達順故此順之實也又曰升中于天而鳯凰降龜龍假又曰享帝于郊而風雨莭寒暑時黄帝太階六符經曰三階平則隂陽和風雨時社稷咸獲其宜天下大安是謂太平韓詩外𫝊曰成王之時有三苗貫桑而生爲一秀大幾滿車長幾充箱成王問周公曰此何物也周公曰三苖同爲一秀意者天下殆同一也比期三年果越裳氏重九譯而至獻白雉於周公曰道路悠逺山川幽深恐使人之未達也故重譯而來周公辭曰吾何以見賜也譯曰吾受命國之黄髪曰乆矣天之不迅風疾雨也海之不波溢也三年於兹矣意者中國殆有聖人盍徃朝之於是周公乃敬求其所以來故大雅云於萬斯年不遐有佐又曰祥者福之先見者也風角占曰福先見曰祥春秋繁露曰王者人之始也王正則元氣和順風雨時景星見黄龍下又曰五帝三王之治天下不敢有君民之心什一而税教以愛使以忠敬長老親親而尊尊不奪民時使民不過嵗三日民家給人足無怨望忿怒之患故天爲下甘露朱草生醴泉出風雨時嘉禾興鳯凰麒麟遊于郊日孫氏瑞應圖曰君賢得土地則日有黄抱又曰揚光者人君不假臣下之權則日揚光又曰王者動不失日揚光也符瑞圗曰日二黄人守者外國八方自來降也尸子曰少皥氏邑於窮桑日五色互照窮桑易説曰日者至陽之精象君徳𤣥黄照耀五色無主春秋潛潭巴曰君徳應陽君臣得道度則日含王字含王字者日中有王字也王者徳象日光所照無不及也春秋考異郵曰黄帝將興有黄雀赤頭立於日傍黄帝曰黄者土精赤者火榮爵者賞也余當立大功乎黄雀者桑也禮斗威儀曰君承土而王其政太平則日五色無主宋均曰五行之色不主於一也又曰君承木而王其政昇平則黄中而青暈乗火而王則黄中而赤暈乗金而王則黄中而白暈乗水而王則黄中而𤣥暈孝經援神契曰黄氣抱日輔臣納忠徳至於天曰抱戴在上曰戴在旁曰抱月漢書曰元后生成帝夢月入懐搜神記孫堅夫人夢月入懷而生䇿京房易飛候曰正月有偃月國必有喜禮斗威儀曰君乗土而王其政太平則月黄而多輝禮瑞應圗曰昔太清之治世也昭明于日月禮含文嘉曰人君政尊而制命則日月貞明春秋潛潭巴曰君臣和得道叶度則日月大光明天下和平上下俱昌延年益夀星孫氏瑞應圖曰景星者大星也狀如半月生於晦朔助月爲明王者不私於人則見又曰王者徳至幽㣲則景星出又曰景星者星之精也先後月出於西方王者不私人以官使賢者在位則見佐月爲明又曰王者孝行之溢則斗霄精北斗七星光明若將霄也又曰王者承天徳理則老人星臨國符瑞圖曰鎮星合房者年榖豐熟易坤靈圖曰至徳之萌五星若連珠尚書中候曰帝堯即政七十載景星出翼景大也翼朱鳥宿也禮稽命徴曰出號施令叶民心制禮作樂得天意則景星見又曰外内之制各得其宜四方之事無有流滯則天苑有徳星見禮斗威儀曰君承土而王者其政太平則鎮星黄而多暈又曰宫星黄大其餘六星輝光四起宫星北斗魁星也又曰君承木而王其政太平則辰揚光乗金而王則太白揚光禮含文嘉曰天子崇有徳彰有道顯有功褒有行則太㣲七星明少㣲處士有徳星應宋均云太㣲正教之宫也七星衣裳正禮今施教布化儀服應禮故星明今少㣲處士有徳星應則星皆所威儀矣春秋合誠圖曰天子精耀心憤務徳則景星見精猶盛也春秋感精符曰王者上感皇天則景星見春秋佐助期曰虞舜之時景星出房春秋孔演圖曰天子舉賢則景星放於天又曰王者徳正海内富昌則鎮星入闕春秋元命苞曰老人星者治平則見見則主夀帝以秋分候之南郊又曰帝位明即畢星光大也春秋文輝鈞曰老人星見則主安下不見則兵起又曰王者安靜則老人星見春秋運斗樞曰王政和平則老人星臨國萬民以歌孝經援神契曰徳至天則斗極明又曰天子刑于四海徳洞淪冥八方神化則斗霄精又曰神靈滋液百珍寳用有景星見又曰鎮星合房符明道興又曰太白合表四夷從服之象宋均曰合表從中道也太白進退主候共合從中道無進退也孝經内事曰天子行孝徳則景星見又曰王者動得天度止得地意從容中道隂陽合度則太㣲五帝座星明以光也又曰王者得禮之制不傷財不害民君臣和草木昆蟲各象正性則三台爲齊明不濶不狹如其度宋均云君臣制度宫室車旗多少各有科品則應也又曰王者敬諸父有差則火角光明以揚宋均云諸父伯仲叔季也斗爲帝車所乗也角堅剛而居帝前帝敬諸父感天應之也又曰王者逺嫌别㣲殊貴賤抑驕臣息亂子則屛星爲之明以潤帝座章而光又曰天子得雲臺之禮則五車均明河行不離其常宋均云天子考察天氣若梓慎見星之祲者也所以獲福禳灾五車主五榖君禳災得福民無飢寒之困五榖星明以應之河若離常則有决溢之憂則九榖失所植矣又曰昆弟有親親之恩則鈎鈐入房宋均云鈎鈐逺房則疏濶今昆弟相親故天相近明其友也又曰王者厚長㓜各得其正則房心有徳星之應宋均云房心爲天子明堂布政之宫長㓜厚則政著明房心應之而明也風史記曰黄帝行徳天爲之起風從西北東北以庚辛一秋中五至大赦三至小赦也唐書曰肅宗在平凉未知所適㑹朔方留後杜鴻漸奉牋迎上又河西行軍司馬裴冕勸治兵於靈武以圗進取上發平凉至豐寧南見黄河天塹之固欲整軍渡北以保豐寧忽大風飛沙跬歩之間不辯人物及回軍趍靈武風沙頓止天地廓清尚書大𫝊曰王者徳及皇天則祥風起又曰舜將禪禹于時八風修通禮斗威儀曰王者乗火而王其政昇平則祥風至宋均云闕景風其來長養萬物符瑞圖曰朔風者瑞風也一名景風春爲發生夏爲長􅄹秋爲收藏冬爲安寧春秋繁露曰王者恩及金石則凉風出孝經援神契曰王者徳被八方則祥風至王充論衡曰王者太平則五日一風風不鳴條風角曰風清明髙不及地二三尺此下有聖人或清明其來乆長而不動揺樹木枝葉此有龍德在其下晉陽春秋曰劉裕平慕容超將鎮下邳聞盧脩及何無忌敗乃還次山陽造揚子江問人曰朝廷如何對曰劉公尚未至劉公若還無所憂也裕將濟而風急衆咸難之裕曰吾有天命風當自息如天不助覆溺何足可怯即令登舟舟移而風止雨禮斗威儀曰君乗金而王其政平則嘉雨時至春秋説題辭曰大節二十四小節十二功徳分也故一嵗三十六雨鹽鐵論曰太平之世則雨不破塊旬日一雨雨必以夜符瑞圖曰周公時天下太平當此之時旬而一雨雨必以夜又曰靈雨者遇嵗亢旱責躬引咎理察寃枉退去貪殘側身修政則降以靈雨非誠感瑞應則非靈也又曰昔殷湯之世天下大旱以六條自責身為犧牲於是大雨淮南子曰神農之世甘雨以時五榖蕃殖尸子曰神農氏治天下欲雨則雨五日爲榖雨旬五日爲行雨萬物咸利故謂之神雲史記曰若烟非烟若雲非雲郁郁紛紛蕭索輪囷是謂卿雲喜氣也漢書曰武帝封禪夜有白雲封中出魏書曰文帝時有雲氣青色而圓如車蓋當其上終日望者以爲至貴之證宋書曰世祖在江州起義建牙軍門有紫雲三段落于牙上唐書曰𤣥宗嘗出畋有紫雲在其上從者望而得之又曰肅宗自奉天而北夕次承夀有白雲起西北長數丈如樓閣之狀識者以爲天子之氣尚書中候曰堯徳清平乃沉璧於河白雲起又曰周成王治平觀於河青雲浮春秋孔演圖曰黄帝將興黄雲升於堂孝經援神契曰王者徳至山陵則景雲出又曰天子孝則景雲見孫氏瑞應圖曰景雲見者太平之應也符瑞圖曰矞慶雲也内赤外黄一曰矞雲帝王世記曰黄帝有景雲之瑞以雲紀官又曰堯母慶都生而神異有黄雲覆上漢武故事曰帝幸梁殳祠地帝親拜其上有白雲如盖又曰宣帝祀甘泉有紫雲從西北來散於殿前歸藏曰大昊之世有白雲自蒼梧入於大梁徐爰宋書曰髙祖北征至洛陽常有紫雲見於軍上霧史記曰髙祖至平城匈奴圍上七日大霧漢人往來故不覺帝王世記曰黄帝五十年秋七月庚申天大霧三日三夜帝之洛水上見大魚負圖書露後漢書曰光武建武十二年甘露降南行唐又曰明帝永平十七年春正月甘露降於甘陵又曰明帝永平十七年甘露降泉陵洮陽二縣東觀漢記曰光武時甘露降四十五日宋書曰文帝元嘉中甘露頻降狀如細雪唐書曰武徳元年四月二十三日甘露降于中華殿之桐樹泫如氷雪以示羣臣又曰貞元十年正月西川奏當管甘露降松栢竹叢等二千四百四十二處尚書中候曰堯時甘露降孝經援神契曰王者徳至天則降甘露禮斗威儀曰君政治則軒轅之精散爲甘露又曰人君乗土而王其政太平則甘露降春秋運斗樞曰天樞得則甘露降孫氏瑞應圖曰耆老得敬則松栢受甘露尊賢養老不失細㣲則竹葦受甘露又曰甘露者味清而甘降則草木暢茂食之令人夀又曰王者徳至於天和氣感則甘露降松栢白虎通曰甘露者美露也降則物無不盛論衡曰甘露味如飴王者太平之應鶡冠子曰聖徳上及太清下及萬靈則膏露下晉中興徴祥記曰甘露仁澤也凝如脂甘如飴王者徳至於天則降吕氏春秋曰隂陽之和不長一類甘露時雨不私一物山海經曰沃國民鳯卵是食甘露是飲几其所欲其味盡存魏明帝與東河王詔曰昔先帝時甘露屢降仁壽殿前自吾建承露盤以來甘露復降芳林園雷史記曰髙祖母劉媪嘗遊大澤之陂夢與神遇時雷電晦冥見蛟龍於其上已而有姙遂産髙祖河圖曰黄帝以雷精起尚書中候曰秦穆公出狩天震大雷下有火化爲白雀銜丹書集公車曰秦伯覇也氣史記曰秦始皇曰東南有天子氣於是東遊以厭之又曰髙祖隠於芒碭山澤間吕后與人俱求常得之髙祖恠問后后曰季所居上有雲氣故從徃常得漢書曰宣帝繋獄望氣者言長安獄有天子氣詔繋者殺之内謁者令郭穰夜至郡邸獄邴吉拒使者不得入後漢書曰望氣者蘇伯河爲王莾使南陽遥見舂陵城郭唶曰氣佳哉鬰葱葱然東觀漢記曰和帝時十一月夜白氣長三丈起國東北指揮匝十日是月東西域象奇踈勒二國歸義魏書曰武宣卞皇后琅邪開陽人文帝母也以漢延嘉二年十二月己巳生齊郡白亭有黄氣滿室移日父敬侯恠之以問卜者王旦旦曰此吉祥也晉書曰天子氣森森然或如華蓋或如龍如馬宋書曰明帝大始二年六月日入後有黄白氣東西竟天光明潤澤也楚漢春秋曰項羽在鴻門亞父諫曰吾使人望沛公其氣衝天五色相繆或似人此非人臣之氣不若殺之應邵漢官儀曰世祖封禪夜有白氣一丈東南極望正直壇所有青氣上與天屬遥望不見此瑞命之符也光漢書郊祀志曰武帝祀汾隂汾傍有光如絳上遂立后土祠於汾隂又曰郊太一祠上有光又曰宣帝祀世宗神光興於殿旁神光又興於房中如燭狀東觀漢記曰李軼等聞䜟言劉氏當復起李氏爲輔遂市兵弩絳衣赤幘歸舊廬望見廬南有若火光以爲人持火呼之光遂盛瞳瞳上屬天有頃不見上異之後魏書曰大祖道武皇帝母曰獻明賀皇后夢日出室内寤而光自牖屬天歆然有感及生太祖於叅合陂北其夜復有光明又曰髙祖孝文皇帝母曰李夫人皇興元年八月生於平城紫宫神光照室天地氤氲和氣充塞尚書中候曰堯沉璧於河榮光出符瑞圖曰玉燭者瑞光也見則四時之色洞如燭也又曰景者光也亦曰象也光而可象應行而臻故茂徳内彰則瑞光外燭又曰昌光者瑞光也見於天漢髙受命昌光出輔又曰榮光者瑞光也其色五彩出於水上又曰五彩光者天見五色三光重輝於地也春秋合誠圖曰五光垂彩天下大嘉人尚書中候洛師謀曰吕尚出遊于戊午日赤人雄出授青簡丹書禮含文嘉曰禹卑宫室盡力乎溝洫百榖用成神龍至靈龜伏玉女降魏志曰咸熈三年晉太子襲位襄武縣言有大人見長三丈餘跡長三尺二寸白鬚著黄单衣黄巾拄杖呼民王始語云今當太平瑞應圖曰真人者黄帝時遊於池王者有茂徳不貪貨利則金人乗船遊於王後池神龍魚河圖曰黄帝攝政蚩尤兄弟十八人並獸身人語銅頭鐵額食沙石造兵仗威震天下誅殺無道不仁不慈黄帝行天下事仰天而歎天遣𤣥女下授黄帝兵信神符而令制伏蚩尤歸臣因畫其像以制八方尚書中候曰堯使禹治水禹辭天地重功帝欽擇人帝曰禹爾命圖乃天言天使汝治水非我禹臨河觀有白靣長人魚身出曰吾河精也表曰文命治滛水表命也言命汝治此滛水授禹河圖去入淵漢書曰武帝太始四年三月幸不其山祠神人於交門宫若有嚮坐拜者作交門之歌山海經曰有人首蛇身長如轅左右有首衣紫衣冠名曰延維人主得而食之伯天下瑞應圖曰黄帝時西王母使乗白鹿來獻白環一本云帝舜時西王母遣使獻玉環又曰二羙母者蓋神女也周穆王時持酒來酌之管子曰桓公北征􅋃竹未至卑耳溪十里援弓將射未能發見人物具焉冠右祛衣走馬前疾管仲曰臣聞登山之神有俞兒者長尺人物具焉霸王之君興登山神見走馬前疾道也祛衣示前有水右祛示從右渉至溪如所言公拜焉曰仲父之聖若此莊子曰齊桓公遊於澤管仲御公見鬼仲曰澤有委蛇其大如轂其長如轅紫衣朱冠見人則捧其首而立見之者殆乎覇公曰此寡人之所見也墨子曰鄭繆公盡日處廟有神入門而左烏身素服靣狀正方繆公乃懼神曰無奔帝享汝明徳使錫汝壽十年使君國昌公問神神曰子爲勾芒太平御覽卷八百七十二
