  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_670-1a, image: WYG0899/WYG0899-0038a.png}
body:
  text: 太平御覽卷六百七十宋李昉等撰道部十二服餌中真誥曰七月十五日夜清虛真人與許玉斧言曰五公石腴彼體所便急冝服之可以少顔术散除疾是爾所冝次服飢飰兼榖勿違又曰明大洞為仙卿服金丹為大夫服衆芝為御史若得太極隠芝服之便為左仙公又曰性㡬乎道用之真來紫陽真人云可令許玊斧數沐浴濯其水疾之氣消其積考之瑕此致真之階也學養生之道不可泣涕唾所損其多是以真人道士常吐納咽味以和六液又曰昔漢成帝獵於終南山中見一人無衣身生毛飛騰不可及乃圍得之問之乃秦宫人說秦王子嬰軹道之事因宫室燒燔驚走入山饑無所食垂當餓死有一老人令食松葉其獵者携歸時以榖食之歐吐累日乃安一年餘死向不為人獲即仙矣又曰龍述字伯髙京兆人也後漢從仙人刁道林受胎氣之法又受􅏇飰方託形醉亡隠處又武當山道士戴孟者本姓燕名濟字仲㣲漢明帝時人也少修道德不仕入華山餌芝术黄精雲母丹砂受法於清虛真人王君得長生之道又裴真人授以玉佩金璫經并石精金光符又曰食草木之藥不知行氣導引服藥無益也終不得道若志之感靈所存必至者亦不湏藥之益也若但知行氣不知神丹之法不仙也若得金液神丹不湏他術也若大洞真經不湏得金丹之道而仙也人生有籙必有篤志道使之然故不學而仙道自來也過此以下皆湏篤志又曰東海玊華妃青童君之妹降授張㣲子服霧之法又曰栢來納氣腸胃三腐三五順行經曰廣平真人頂負圓光執華幡於上帝前問修錬之法又曰羅江大霍山洞臺中有五色隠芝華陽山亦有五種夜光芝良常山有螢火芝其實似草其在地如螢狀大如豆如紫華夜視有光得食之者心明可夜書計得食四十七枚者壽又曰色山中有白芝又有隠泉其色紫華陽雷平山有田公泉是玉沙之流津以浣水佳又曰服九靈日月華者得降太極之家𤣥真之法也又曰郎宗字仲綏北海安邱人少去官後漢時人也為呉令學精道術占候風氣後一旦有暴風庭起占知洛陽大火燒長夏門遣人徃叅問果爾朝廷聞之以􅀶士徴宗宗耻以占術就徴夜觧印綬負笈遁去居華山下服胡麻得道今在洞中又曰傅禮和漢桓帝外孫傅建安也常服五星氣得道為含真臺主抱朴子曰余祖鴻臚少時嘗為臨沅令云此縣有民家皆壽考後徙去子孫傳多夭折他人居其故宅又累世眉壽疑其井水殊赤乃試掘井左右得古人丹砂數十斛况餌丹砂者乎又曰上黨趙瞿者病癩歴年衆治之不愈垂死其家輿載弃之賫糧送置山谷中瞿自怨不幸晝夜悲歎涕泣彌月有人行過穴口見而哀之具問訊瞿知異人乃叩頭自陳乞哀於是仙人以囊藥賜之教其服法瞿服病隨愈顔色豐恱肌膚玉澤仙人又過視瞿謝之乞異方仙人告曰此栢脂耳山中多汝錬之可以長生瞿乃歸家家甚駭問得愈狀瞿年百七十歳齒髮豪徤在人間二百餘年入抱犢山去又曰要於長生去留各從所好耳服還丹金液之後若且欲世間者但服其半若求仙去當盡服之昔安期先生龍眉寗公修羊公隂長生皆金丹半劑者也其止人間或近千年然後去耳又曰按玉鈴經中篇云立功為上除過次之為道者以救人危為上功也欲求仙者要當以忠孝和順仁信為本若徳不修而但務方術終不得長生也行惡事大者奪紀小過奪算積善未滿雖服仙藥亦無益也余覽養生之書莫不以遝金丹液為大要盖仙道之極也昔左慈字元放於天柱山中精思積久乃神人授以金丹仙經㑹漢末大亂不遑修鍊而避地來渡江東志欲投名山以修斯道從祖仙公又從元放受之凡授太清丹經三卷及九鼎丹經一卷金液經一卷予師鄭君者仙公之弟子也又於從祖受之而家貧無用買藥予親事之洒掃積久乃於馬迹山中立壇盟受之并具諸口訣之不書者江東先無此書出於左慈慈授從祖仙公仙公授鄭君鄭君授予故他道士了無知者此蓋假求於外物以自堅固復有太清神丹其法出於元君元君者老子師也太清觀天經有十篇云其上七篇不可以教授其下三篇世無足𫝊當沉之三泉也下三篇者正是丹經其經曰上士得道昇為天官中士得道栖集崑崙下士得道長生世間近後漢末新野隂君合此太清丹其人有才氣著詩及丹經讚序言初學道隨師本末列已所知識之得道者四十餘人甚分明也又有九光丹與九轉異法又有嵋山丹法道士張盍蹹精思於嵋山石室中得此方也至於諸丹法各别也金液者太一所服而仙者也又曰長生制醮大藥非祠禱所能就也秦漢二代大興祈禱所祭大一五帝陳寳八神之属動費億萬絶無所益况匹夫無徳欲以三牲妄祝以祈延年惑亦甚矣又曰合金丹之大藥錬八石之氣英者尤忌凡俗聞見則仙或不成或云上士得道於軍旅中士得道於都市下士得道於山林此謂仙藥已成志欲輕舉雖三軍兵刃不能傷都市㓙禍不能加下士未及於此故止山林耳古之道士修錬神藥必入名山又按入山經可以精思修餌其藥有太華􅁪霍嵩少太白終南女凡地肺王屋抱犢安邱衡􅏦青城峨嵋雲臺羅浮陽駕黄金大小天台蓋竹括蒼四望山皆是正神在其中其上皆生芝草可以避大兵大水不但中以合藥也若有道者登之則此山之神必􅂇之為福其藥必成若此諸山者海中大島㠘亦可合藥又曰余師鄭君年出八十其先鬢髮班白數年間復黒又顔色豐澤能引强弩日行數百里飲酒二斗不醉上山又體力輕便年少追之不及飲食與凡人無異又不見其絶榖余問先生相隨弟子黄章言鄭君常從豫章還於浦中連值大風過盗君推糧以給諸人已不復食五十日亦不饑又不見其所施為不知以何事也燈下細書過少年性觧音律閑夜皷琴侍坐數人口答咨問其言不輟響而耳益聰聽左右操弦者數譴長短無毫釐得逃余晚為鄭君門人請見方書告余曰要道不過尺素上足以度世又曰君所知者雖多而未精又意存於外學不能専一未可以經深渉逺耳自當以佳書相示也久許漸得見短書縑數所冩者積年之中舍積所見當出二百許卷經不可頓得了也又日語余曰新書卷卷有佳事但當校其精麄擇所施行若金丹一成此書等一切不用也亦或當有所教授冝得本末先從淺始以勸進學者無所希准階由也鄭君亦不肯悉令人冩其書皆當訣其意雖久借之然莫有敢盗冩一字者也鄭君本大儒晚而好道由以禮記尚書教授不絶其體望髙亮風格方整接見肅然每咨問􅁪待其温顔不敢輕脫也門人五十餘人惟余見授金丹之經及三皇内文枕中五行記其餘人不得一觀此書首題者集仙録曰夫茂實者翹春之明珠也巨勝者𤣥秋之沉靈也丹棗者盛陽之雲芝也茯苓者絳神之伏胎也五華含烟三氣陶精調安六氣養魄䕶神又曰太𤣥玊女者帝少昊時人也居蜀之長松山修長生之道遇山中人授以八天隠文使修佩謂曰修道之要以無為為本八天之書真無為也而道自然成然而琅玕曲晨之液八瓊九華之丹使錬而餌之即太極所秘可以入侍帝之宸下覽萬化授九華方於江上鍊丹江畔有金砂泉是其遺跡又曰髙辛時有仙人展上公常說昔在華陽下食白李異美憶之未久而忽已三千年矣又曰李脕居蜀金堂山龍橋峯下修道蜀人歴代見之約其來徃八百餘年因號曰李八百初以周穆王時來居廣漢栖𤣥山合九華丹成去逰五岳十二洞二百餘年後於海上遇紫陽君授水玉之道又來龍橋峯作金鼎錬九還成三於此山學道故世號此山為三學山亦號為栖賢山又曰南陽文氏說其先祖漢末大亂逃壺山中饑困殆絶有一人教食术遂不饑十年來歸鄉里顔色更少身輕欲飛履險不倦行氷雪内了不知寒术一名山薊一名山精又曰薛女真者不知何許人也晋室離亂人多栖寓林藪服餌避世因居衡山尋臺外出行常有黄鳥白猿白豹隨之不知所修何道又曰玉姜者毛女也居華山自言秦人始學食松葉不饑寒止巖中其行如飛今號其處為毛女峯又曰涓子齊人子餌术著三才經淮南王劉安得其文不觧其㫖又著琴書三篇甚有條理又曰張㣲子漢昭帝時将作大匠張慶女也㣲子好道常服霧氣自云霧是山澤水火之精金石之盈氣久服之則能散形入空與氣合體㣲子自言受此法於東海東華玉妃淳文期清童君妹也㣲子亦以此霧法教諸學者九真華妃曰日者霞之實霞者日之精人惟聞服日實之法未見其知霞之精也夫飡霞之精甚祕致霞之道甚易此謂體生玉光霞映上清之法也太平御覽卷六百七十
