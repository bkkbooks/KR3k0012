body:
  text: 太平御覽卷八百五宋李昉等撰珎寳部四玉下唐書曰太宗嘗謂魏徴曰玉雖有美質在扵石間不值良工琢磨與瓦礫不别若遇良工即為萬代之寳朕雖無美質為公所切磋勞公約朕以仁義𢎞朕以道徳使朕功業至此亦足為良匠耳又曰髙宗朝封禪太嶽造玉册三枚皆以金編每牒長一尺二寸廣一寸二分厚三分刻玉填金為字又為玊匱一以藏正坐玊册金匱二以藏配坐玊册各一尺三寸並玊檢方五寸當繩纒處刻為五道當璽處刻深二寸方一寸二分爲黃金繩以纒金玉匱各五周為金泥以泥之為玊璽一枚方一寸二分文同受命璽以封玊匱又天寳中詔曰禮神以玊者葢取其精潔表裏温潤合徳為器有象正辭乃信以逹馨香其在璧頃來禮神六器及宗廟奠玉自馮紹王奏後有司並皆用珉禮所謂君子貴玊而賤珉不可用也朕精禋郊壇嚴敬宗廟奉惟新之祚康太平之人則神力普存備物以享安可以珉代玉惜費事神况國家之富有萬方之助祭闕典必修無文咸秩豈扵天地宗廟奠玊有虧自今以後禮神六器宗廟奠玉並用真玊諸祀用珉如以玊難得大者寜小其制度以取其真又曰憲宗時隰州刺史呉暈獻玊杯一頗珍可竒云先使吐蕃所得又曰憲宗時庄宅使許逺振得玉類珽以進上悦命賜絹三百疋又曰貞元六年盧群入拜侍御史有人誣告故尚父子儀嬖人張氏宅中有寳玉者張氏兄弟又與尚父子孫相告訐促具獄辭上奏言張氏以子儀在時分財子弟不合爭奪然張氏宅與親仁宅皆子儀家事子儀有大勲伏望陛下赦而勿問使私自引逺上從之時人賞其識大體也又曰大和中文王命中使以白玉帯就幽州賜李載義亦殊恩也又曰開成中王起議今國家郊天報地祀神之玉常用守經據古禮神之玊則無臣等請詔下有司精取美玉創造蒼璧等九器祭訖具而藏之其餘燎玉請依常制管子曰夫玊之所以貴者九徳出焉温潤以澤仁也隣以理者智也堅而不蹙義也廉而不劌行也鮮而不垢潔也折而不撓勇也瑕瑜皆見情也茂華光澤並通而不相陵容也叩之其音清専徹逺純而不殺辭也是以人主貴之藏以為寳剖以為符瑞文子曰鄭人謂玉未理者璞周人謂䑕未腊者璞周人懷璞問鄭賈曰欲之乎出其璞視之乃䑕璞范子計然曰玊英出藍田列子曰穆王征西戎西戎獻昆吾之劒赤刀切玊如切泥又曰宋人為其君以玊為楮葉者三年而成絳鎩莖葉毫芒繁澤亂之楮葉中不可别也此人遂以巧食宋國尹文子曰魏田父有扵野得玊徑尺弗知其玉也以告隣人隣人詐之曰此恠石也畜之弗利田父雖疑猶録置扵廡下其夜玊明照一室其家大怖遽而棄之扵野隣人盗之以獻魏王魏王召玊工相之玉工望王再拜却立曰敢賀大王得天下之寳臣所未嘗見王問價玊工曰此無價以當之五城之都僅可一觀王立賜獻者千金長食上大夫禄也鬼谷子曰鄭人之取玊也載司南之車為其不惑也尸子曰水方折者有玊圓折者有珠又曰玊者色不如雪澤不如雨潤不如膏光不如燭鄒子曰夫珠生扵南海玊生扵湏彌無足而至者人好之也士有足而不至者以人不好也韓子曰楚人卞和得玊璞扵楚山獻厲王王使人相之曰石也王以和為慢刖右足及武王即位又獻之復相曰石也刖左足及文王即位和乃抱其璞而哭扵楚山三日三夜泣盡繼之以血王使玊人治之得寳玊焉名曰和氏之璧又曰周有玊版紂令膠鬲索之文王不予費仲來求因予之是膠鬲賢而費仲無道也周惡賢者之得志也故予費仲文王舉太公扵渭濵者貴之也而資仲玉版者愛之也故曰不貴其師不愛其資難知大迷又曰堂谿公見昭侯曰令有白玉之巵而無當有瓦巵而有當君渇將何以飲君曰以瓦巵堂谿公曰白玊之巵美而君不以飲者以其無當耶君曰然堂谿公曰爲人主而漏泄其群臣之語譬猶玉巵之無當也堂谿公每見而出昭侯必獨卧惟恐夢言泄扵妻妾淮南子曰琬琰之玊存汙泥之中雖廉者不釋也又曰崑崙山曾城九重有珠樹玊樹又曰鍾山之玉炊以爐灰三日三夜而色澤不變得天地之精又曰玉璞不厭厚又曰白玊不雕美珠不文質有餘也又曰兩堅不能相加兩强不能相伏故梧桐斷焉角截梨玉言柔勝剛又曰玊待礛諸而成器礛諸珍玉之名也言物有待賤而貴隨巢子曰幽厲之時奚禄山壞天賜玊玦扵羿遂以賤其身以此為福而禍抱朴子曰呉時發廣陵大冢兵人共舉死人似倚玉有以一玉長一尺形似東𤓰從人懷中頽出墮地玉可以為珠酒及地榆酒化之為水亦可燒以為粉服一年以上入水不沾入火不灼又曰玉脂生玉之山膏流出萬年以上則凝而成之鮮明如水精以無心草木和之湏臾成水服之一升得千嵗王服元真者其命不及𤣥真玉别名也服玉當得于闐白赤松子以元蟲而漬玊為水服之故得乘烟霞上下也又曰中山猿有稱人字者金玉也知其物則不為害也賈子曰徳有天理曰道性神明命之所生而能象徳者獨玉也符子曰荆山不貴玉鮫人不貴珠穆天子𫝊曰天子大朝黃之山披圖視典用觀天子之寳器玊果石以美玉謂果者璿珠璿玊類音旋又曰天子北征東還乃循黒水至扵群玉之山先王所謂策府天子扵是取玉板三乘玊器服物扵是載玊乃反也又曰赤鳥氏美人之地寳玉之所在也山海經曰珏二玉相合琉璃夷蠻係耳玉也稷契之山及鹿臺山其上多白玊榆次之山多嬰垣之玉㤗昌之山洛水出焉扵中多藻玉宻山之上丹水出焉其中多玉膏其源沸湯黄帝是食玊膏之所出五色乃清五味乃馨堅栗精宻澤而有光五色發作以和柔剛天地鬼神是食是饗君子服之以禦不祥龍首之山若水出焉其中多美玉於臯之山明水出焉其中多蒼玉平邱在三桑東爰有遺玉帝王世紀曰有鷰飛而遺卵簡翟與妹競取覆以玉筐又曰周武王代殷為天子登臺見玉王曰誰之玊或曰諸侯之玊王不取反歸之天下聞之曰王廉扵財矣又曰紂敗績登鹿臺䝉寳衣玉席投扵火而死漢武故事曰上起神屋前庭植玊樹以珊瑚為枝碧玉為華葉子青赤以珠玉為之空其中如小鈴鎗鎗有聲也漢武内𫝊曰西王母云昌城玊蘂夜山火玊又曰長州一名青邱仙草靈藥甘液玉英靡所不有漢舊儀曰祭天用玉几論衡曰玊變為石珠變為礫毁謗使然也採石者破石㧞玉選士者棄惡取善又曰璆琳瑯玕璆玊也琳珠也瑯玕珠之類也鹽鐡論曰南越以孔雀珥門户崑山之旁以玉抵鳥雀桓譚新論曰雒陽季㓜賔有小玉檢謁衛者文子伯素好玉器見而竒之使予報以三萬錢請貿焉㓜賔曰我與好事長者𫝊之已顧十萬非三萬錢玉也余驚駭云我若扵路見此千錢亦不市也故知之與不知相去甚逺王逸正部論曰或問玉符曰赤如雞冠黃如蒸粟白如脂昉黒如純漆玊之符也魏文帝與鍾繇書亦出也矯世論曰白玉之肖牙者惟離婁能察之白虎通曰玉者象君子之徳燥不輕濕不重是以人君寳之應邵漢官儀曰封禪壇有玉龜郭子橫洞冥記曰元鼎元年起招靈閣有一女神留一玉釵以與帝帝以賜趙媫妤至昭帝元鳳中宫人猶見此釵共謀欲碎之明視釵匣惟見白鷰直升天後宫人常作玉釵因名玉鷰釵言其吉祥西京雜記曰髙祖初入咸陽宫周行庫藏金玉寳珠不可勝言其尤驚異者有青玉五枝燈髙七尺五寸下作蟠螭以口含燈然則鱗甲皆動煥爛盈室焉又曰髙祖初入咸陽宫周行庫藏見玉笛長二尺二寸二十九孔吹之則見車馬山林嶾嶙相次吹息不得見銘曰昭華之管五經通義曰玊有五徳温潤而澤有似扵智鋭而不害有似扵仁抑而不撓有似扵義有瑕扵内必見扵外有似扵信垂之如墜有似扵禮瑞應圖曰玉甕者聖人應也不汲自盈王者飲食有節則出雒書曰王者不藏金玉則紫玉見之深山服飾不逾祭服則玉英出胡綜别𫝊曰呉時掘得銅印以琉璃蓋畫布雲母扵其上開之得白玉如意太子因問君君曰秦王以金陵有天子氣象處處埋寳物以當王土之氣此抑是也文士傳曰劉禎字公幹少有才辨常豫魏文帝座見甄后不伏武帝嘗怒配上方武帝輦至上方觀作署禎故匡坐正色磨石不仰武帝問曰石何如禎因得喻已自理跪乃曰石出自荆山元岩之巔外有五色之章内有含和之性磨之不加瑩雕之不增美禀氣堅貞受兹自然顧其理枉屈紆繞猶不得中武帝顧左右大笑即日還宫赦禎復署吏列仙傳曰赤松子者神農時雨師也服水玉教神農能入火不燒神仙𫝊曰沈羲為仙人所迎見老松公以金案玉盤賜羲搜神記曰孔子作春秋制孝經既成齋戒告天天降赤虹化為黄玊長二尺上有文又曰羊公雍伯雒陽人性篤孝父母終𦵏無終山遂居焉山八十里上無水公汲水作義漿於坂頭行者皆飲之三年有一人就飲以斗石子與之使至髙平好地有石處種石其中公未娶又語汝後當得好婦語畢不見後種其石數嵗時時往視玉子生人莫知有徐氏北平著姓女甚有名時人求多不許公乃試求徐氏徐氏以爲狂乃戲云以白璧一雙來當聽為婚公至所種石中得五雙白璧以贄徐氏徐氏大驚遂以女妻公天子異之拜爲大夫扵種玉處四角作大石柱各一丈中央一頃地曰玉田續搜神記曰樂安髙位其孫雅之在廐中云有神來降自稱白頭公柱杖光輝照人也白頭公白玉也搜神記曰呉王夫差女名玊童子韓重有道術女悦之結氣死𦵏扵昌門之外重至冢前哭祭女見形將重入冢臨去取崑崙玉盂以送重燉煌髙納之郡府紀年曰桀伐岷山岷山王女于桀二女曰琬曰琰桀愛二女無子刻其名扵苕華之玊苕是琬華是琰石虎鄴中記曰後宫别坊中有小形玊床又曰石虎以宫人為女官用玉案文書凉州記曰盗發張駿陵得玉樽玉笛玉簫廣志曰白玉美可照面出交州青玉出夫餘異苑曰晉東瀛王騰字元邁以永嘉元年鎮鄴天雪門前方數十步融液不積騰恠掘之得玉馬髙一尺許口齒缺騰以馬者國姓為吉祥或謂馬無齒則不復食又曰𢎞農楊子陽太元初聞土中聲掘得玉肫録異𫝊曰江巖常到呉採藥及富春縣清泉山南遥見一美女紫衣獨踞石而歌聲有碣石之音巖往未及數十歩輒去女惟見所踞石耳如此數日巖乃擊破石遂從石中得一紫玉廣長一尺後不復見女又曰邴浪者安樂人行到松滋縣九田山見一鳥形如雉而色正赤集山岩石上鳴聲如吹笙浪即射中之鳥仍入石宂中浪遂鑿石得一赤玉狀如鳥形十洲記曰周穆玉時西湖獻玊杯是白玉之精光明照夕以杯扵庭中比明旦而水汁滿扵杯中汁甘而香美斯靈器也又曰瀛州有玊膏如酒名曰玊酒飲之令人長生博物志曰得好鼓玊用梁四公記曰扶桑國使使貢觀日玊大鏡方圓尺餘明澈如琉璃映日以觀見日中宫殿皎然分明地境圖曰二月中草木光生下垂者下有美玉又曰玊石之精也其存石中若山中石潤而浸旁有水其居地氣青而浮其氣白如圓光轉其地中常潤白玉圓光之精名曰委狀如美女衣青衣見之以桃戈刺之而呼其名則可得也夜行見女子載燭行者潜從其所已則入石石中有玉世説曰長沙王從封常山至國穿井入地四尺得白玊方三四尺又曰温嶠取姑女下玉鏡臺一枝是後為劉越石長使征劉聰所得語林曰平子從荆州下王敦欲殺之平子恒𢃄一玉枕故不得殺敦後矯平子左右而闕持闕下床去遂殺平子本草經曰玊泉一名玊體臨死服呉氏本草曰白玊體如白頭公明皇雜録曰天后嘗召諸皇孫坐扵殿上觀其嬉戲因出西國所貢玉鐶釵盃盤列扵前後縱令争取以觀其志莫不争取竟厚有所獲獨上端坐略不爲動后大竒之撫其背曰此兒當爲太平天子因命取玉龍子以賜玉龍子太宗扵晉陽宫得之文徳皇后常置之衣箱中及太帝載誕之三日后以珠絡衣褓并玊龍子賜其後常藏之内府雖其廣不數寸而温潤精巧非人間所有及上即位每京師􅄽雨必􅐚誠祔禱將有霖􅍂逼而視之若奮鱗鬛開元中三輔大旱上御祈禱而渉旬無雨上宻投南内之龍池俄而雲物暴起風雨隨作上幸西蜀車駕次渭水將渡駐蹕於水濵左右侍御或有臨流濯㺯者扵沙中得之上聞驚喜視之泫然流涕曰此吾昔時所寳玉龍子自後每夜中光彩輝燭一室上既還京為黄門攘竊以遺李輔國常置於櫃中輔國將敗夜聞櫝中有聲開視亡其所太平御覽卷八百五
