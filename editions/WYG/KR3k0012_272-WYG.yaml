body:
  text: 太平御覽卷二百七十二宋李昉等撰兵部三將帥上將帥上春秋元命苞曰上天一星爲郎將左傳曰楚子及諸侯圍宋宋公孫固如晉吿急公孫固莊公孫也先軫曰報施救患取威定覇於是乎在矣先軫下軍之佐原軫也報宋贈馬之施也狐偃曰楚始得曹而新婚於衞若伐曹衞楚必救之則齊宋免矣前年楚使申叔戍榖以逼齊於是乎蒐於被廬晉常以蒐禮改政令敬其事也被廬地名作三軍閔元年晉獻公作三軍令復大國之禮謀元帥中軍帥趙衰曰郤縠可臣亟聞其言矣説禮樂而敦詩書詩書義之府也禮樂德之則也德義利之本也夏書曰敷納以言明試以功車服以庸夏書虞夏書也敷納以言觀其志也明試以功考其事也車服以庸報其勞也庸功也君其試之乃使郤縠將中軍郤溱佐之使狐偃將上軍讓於狐毛而佐之毛狐偃之兄命趙衰爲卿讓於欒枝先軫欒枝貞子也欒賔之孫使欒枝將下軍先軫佐之荀林父御戎魏犨爲右荀林父中行桓子公羊傳曰君將使射姑將陽處父諫曰射姑民衆不説不可使將於是廢將國語曰公使趙衰爲卿辭曰欒枝貞愼枝晉大夫欒共子之子也先軫有謀胥臣多聞皆可以爲輔臣弗若也乃使欒枝將下軍先軫佐之前取五鹿先軫之謀也五鹿衞地郤縠卒使先軫代之從下軍之佐超將中軍傳曰尚德也胥臣佐下軍代先軫又曰公使原季爲卿原季趙衰也文公二年爲原大夫卿次卿辭曰夫三德者偃之岀也偃狐偃三德謂勸文公納襄王以示民義伐原以示民信大蒐以示民禮是以三德紀民三德之紀語在下以德紀民其章大矣不可廢也章著使狐偃爲卿辭曰毛之智賢於臣其齒又長毛偃之兄毛也不在位不敢聞命乃使狐毛將上軍狐偃佐之尚齒也傳曰使狐偃將上軍讓於狐毛而佐之是也狐毛卒使趙衰代之虞翻云代將新軍昭謂之代將上軍辭曰城濮之役先且居之佐軍也善先且居先軫之子蒲城伯復受霍爲霍伯也軍伐有賞伐功也善君有賞能其官有賞且居有三賞不可廢也且臣之倫箕鄭胥嬰先都在倫疋三子晉大夫乃使先且居將上軍代狐毛也公曰趙衰三讓三使爲卿三讓之進欒枝等八人其所讓皆社稷之衞也廢讓是廢德也以趙衰之故蒐於清源作五軍清源晋地晋本三軍有中軍上下今有五益新軍使趙衰將新上軍箕鄭佐之胥嬰將新下軍先都佐之子犯卒蒲城伯請佐蒲城伯先且居公曰夫趙衰三讓不失義義宜也讓推賢也義廣德也德廣賢至有何患矣請使衰也從子從先且居乃使趙衰佐新上軍此有新字誤也趙衰從新上軍之將進佐上軍爲升一等新上軍之將位在上軍佐之下此章或在狐毛卒上非也當在下戰國䇿曰秦與趙兵相距長平趙孝成王使趙奢之子將藺相如曰王以名使括若膠柱而鼓瑟耳此子徒能讀其父奢書傳而不知合變也趙王不聽奢子括少時學兵法言兵事以天下莫能當嘗與其父言兵事奢不能難然不謂之善其母問其故奢曰兵死地也而乃易言之趙若以爲將破軍者必是兒及是其母上書具言不可曰始妾事其父時爲將大王及宗室所賞者盡以與軍吏士大夫受命之日不問家事今此兒爲將東向而朝軍吏無敢仰視之者王所賜金帛歸藏家而日視便利田宅買之王以爲何如其父父子異心願王母遣王曰吾已决矣其母因曰即有如不稱妾得無隨罪乎王許之諾遂與秦軍戰死軍敗數十萬降秦秦悉坑之史記孟嘗君傳曰文聞將門必有將相門必有相又項羽本紀曰項氏世世爲楚將封於項故姓項氏又曰章邯已破項梁軍則以爲楚兵不足憂乃渡河擊趙大破之當此之時趙歇爲王陳餘爲將張耳爲相又吳起傳曰魏文侯問曰吳起何如人李克曰起貪而好色然其用兵司馬穰苴弗能過也於是魏文侯以爲將擊秦㧞五城又王翦傳曰或曰王離秦之名將也今將强秦之兵攻新造之趙舉之必矣客曰不然夫將三世者必敗何也以其殺伐多矣其后受其不祥又淮隂侯傳曰韓信曰陛下非能將兵而善將將此信之所以爲陛下擒也漢書韓信傳曰漢王使酈生徃說魏王豹不聽乃以信爲左丞相擊魏信問酈生魏得毋用周叔爲大將乎曰栢直也信曰豎子耳遂進擊魏又陸賈傳曰賈謂陳平曰天下安注意相天下危注意將將相和則士豫附士豫附天下雖有變則權不分權不分爲社稷在兩君掌握耳又齊王傳曰祝午紿瑯琊王曰吕氏爲亂齊王發兵欲西誅之齊王自以兒子年少不習兵革之事願舉國委大王大王自高帝將也習戰事齊王不敢離兵使臣請大王幸之臨淄見齊王計事並將齊兵以平關中之亂後漢書虞詡傳詡說李脩曰喭曰關西出將關東出相觀其習兵壯勇實過餘州又曰大將曹公毎攻城破邑得靡麗之物則悉以賜有功者若勲勞宜賞則不恡萬金無功冀施分毫不與魏志曰太祖既破張繡東擒吕布定徐州遂與袁紹相距孔融謂荀彧曰紹地廣兵强田豐許攸智計之士爲之謀審配逢紀盡忠之臣也任其事顔良文醜勇冠三軍綂其兵殆難尅乎彧曰顔良文醜匹夫之勇可一戰而擒又曰太祖征荆南𤣥徳奔呉論者以爲權必殺之程昱料之曰孫權新立未爲海内所憚曹公無敵於天下初舉荆州不能獨當也𤣥徳有英明關張皆萬人敵權必資之禦我難解勢分其資已成又不可得而殺也權果多與𤣥徳兵以禦太祖晉書曰王導字茂𢎞光禄大夫覽之孫也父裁鎮軍司馬導少有風鑑識量清遠年十四陳留高士張公見而竒之謂其從兄敦曰此兒容貌志氣將相之器也又張華傳曰今之所要在軍帥然議者舉將多推宿舊又晉書載記曰昔韓信以禆將伐齊有征無戰耿弇以偏軍討張歩尅不移期後周書曰王勵性忠果有才幹年七十從太祖入關及太祖平秦隴定關中勵常侍從太祖謂之曰爲將坐見成敗者上也被堅執銳者次也勵曰意欲兼之太祖大笑隋書曰煬帝在東宫問賀若弼曰楊素韓擒虎史萬嵗三人俱稱良將其間優劣何如弼曰楊素是猛將非謀將韓擒虎是鬬將非領將史萬嵗是騎將非大將太子曰然則大將誰也弼拜曰唯殿下所擇弼意自許爲大將弼賀若弼也唐書曰太宗嘗論將帥謂左右曰當今名將唯李勣任城王道宗薛萬徹三人而已李勣道宗不能大勝亦不大敗萬徹非大勝即大敗又曰太宗與長孫無忌薛萬徹等宴於丹霄殿各賜膜皮而悞呼萬徹爲萬均因愴然曰萬均朕之勲舊不幸早亡今忽呼其名豈其魂靈欲朕之賜也因取膜皮呼萬均以同賜而焚之於前侍坐者莫不感泣潞公薛萬均萬徹兄也初立大功故太宗思之又曰賈言忠乾封中爲侍御史時朝廷有事遼東言忠奉使徃支軍糧及還高宗問以軍事言忠畫其山川地勢具陳可平之狀高宗大悅又問諸將優劣言忠曰李勣先朝舊臣聖鑒所悉龎同差雖非鬬將而持軍嚴整薛仁貴勇冠三軍名可震敵高偘儉素自處忠果有謀契苾何力沈毅持重有綂禦之才然頗有忌前之僻諸將夙夜小心忘身憂國莫逮於李勣者高宗深然之又曰裴度使蔡州行營宣諭諸軍既還帝問諸將之才度曰臣觀李光顔見義能男終有所成不數日光顔大破賊軍於時曲帝尤嘆度之知人又曰朱滔效順代宗臨軒勞問既而曰卿自謂才孰與泚多滔曰各有長短綂御士衆方畧明辨臣不及泚臣年二十八獲謁龍顔泚長臣五歳未朝鳳闕泚不及臣代宗愈喜古司馬兵法曰上貴不伐之士士之器也苟不伐則無求無求則不争國中之聽必得其情軍旅之聽必得其宜此貴不伐之士也不伐之士治國必得其實在軍必得其宜故先貴而用之從命爲士上賞犯命爲士上戮故其勇力不相犯既致教其民然後謹選而使之事極修則百官給矣教極省則人興良矣又曰凡戰與衆分善將雖有獨見之智戰勝不自取功常推與下分者也選良先無功者勇猛勁材戰不得功後戰必選為前當以激致其銳氣若使不勝使過在已戰有不勝當爲吏士引其過咎令無所慙愧使復可使又曰上同無獲將智與衆同等能自用而不能用人随衆取同故無功也上專多死將無明智耻求賢問智自專事爲衆所弊故戰多死上生多疑將無義必苟求全免害避難則士多疑貳者也上死不勝將無善畧苟以死當敵故不勝也凡民死愛死怒死威死義死利視下如子則民死愛志意激揚則民死怒使民以禮征伐以義則民死威賞罰分明則民死義爵賞厚重則民死利孫子曰將者智信仁勇嚴也故知兵之將人之司命國家安危之主也將者國輔輔周則國必强將周宻謀不泄也輔隙則國必弱形見外也又曰故君之所以患於軍者三三者何也曰不知軍之不可進而謂之進不知軍之不可退而謂之退是謂縻軍縻繫不知三軍之事而同三軍之政則軍士惑矣不知三軍之事而欲同三軍之任則軍士覆疑不得其人也三軍既惑且疑則諸侯之難至矣是謂亂軍而引勝引奪也故知勝有五知可以與戰不可與戰者勝識衆寡之用者勝上下同欲者勝以虞待不虞者勝將能而君不禦者勝司馬法曰進退唯時無曰寡人此五者知勝之道此上五事故曰知彼知己百戰不殆不知彼而知己一勝一負不知彼不知己每戰必敗又曰凡用兵之法將受命於君合軍聚衆圯地無舍無所依也衢地合交結諸侯也絶地無留無久止也圍地無謀發竒兵也死地則戰塗有所不由五難之地所不當從也軍有所不擊軍難可守以地險難不留之失前利若得之又利薄城有所不攻城堅固糧饒不可攻也地有所不争義與上同操所以置華費而深入徐州㧞十四縣君命有所不受苟便於事不拘於君命也故將通九變之利者則知用兵矣九事之變將不通於九變之利雖知地形不能得地之利也又曰治人不知五變雖知五利不能得人之用矣下五事也是故智者之慮必雜於利害在利思害在害思得雜於利而務可信計敵不能依五地爲我害信務爲可信也雜於害而患可解並計於害雖有患可解也害中雜利䧟之死地而後生也趣之以利令自來也故用兵之法無恃其不來恃吾有以待之安不忘危常備之也無恃其不攻吾也恃吾不可攻故將有五危必死可殺勇無疑也必生可虜見利不進有怯弱求生之意上下猶豫可急而取也忿疾可侮忿疾之人可忿怒而侮致也亷潔可辱亷潔之人可汗辱而使必來戰愛人可煩出所必趨愛人者必倍道兼行救之則煩勞也凡此五者將之過用兵之灾覆軍殺將必以五危不可不察也又曰以一擊十曰走卒强吏弱曰弛吏强卒弱曰䧟吏强卒弱欲進輙敗也大吏怒而不服遇敵懟而自戰將不知其能曰崩大吏小將也大將怒之不厭服忿而赴敵不量輕重則必崩壊也將弱而嚴教道不明吏卒無常陳兵縱横曰亂爲將若此亂之道也將不能料敵以少合衆以弱擊强兵無避鋒曰北兵勢若是必走也凡此六者勝敗之道將之至任也又曰明主慮之良將修之非利不起非徳不用非危不戰不得已而用兵主不可以怒而興軍將不可以愠而合戰合於利而用不合於利而止不得以喜怒而用兵怒不可復喜慍不可復恱亡國不可復存死者不可復生故曰明主慮之良將修之此安國之道也呉子曰人有三不和不和於國不可以出軍不和於軍不可以出陣不和於陣不可以出戰又曰將之所慎者五一曰理二曰備三曰果四曰戒五曰約理者治衆如治寡備者出門如見敵果者臨敵不懐生戒者雖克如始戰約者法令省而不煩孔叢子曰子思居衛言苟變於衛君曰其才可將五百乘君任軍旅率得此人則無敵於天下矣衛君曰吾知其才可將變也嘗爲吏賦於民而食人二雞子以故弗用也子思曰夫聖人官人猶大匠之用木也取長棄短故材連抱而有數尺朽者良工不棄以其所妨者細也卒成不訾之器今君處戰國之世選爪牙之士以二卵而棄干城之將此不可使聞於鄰國也衛君再拜曰謹受詔矣太平御覽卷二百七十二
