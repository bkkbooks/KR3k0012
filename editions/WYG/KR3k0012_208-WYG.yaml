body:
  text: 太平御覽卷二百八宋李昉等撰職官部六司徒下司空司徒下晉書曰王渾遷司徒渾以司徒文官吏不持兵令皆皂服又曰石苞為司徒奏州郡農桑未有賞罰之制宜遣掾屬循行皆當均其土宜舉其殿最然後黜陟焉詔曰農殖者為政之本有國之大務也雖欲安民興化不先富而教之其道無由而至今四海多事軍國用廣加乗征役之後屬有水旱之患倉庫不充百姓無積稼穡樹藝司徒掌之今雖登論道經國然立政唯時所急故陶唐之世稷官為重今司徒位當其任有毁家紓國蹇蹇匪躬之志其使司徒督察州郡播殖其增置掾屬十人聽取王官練事業者苞在位稱為忠勤帝每委任焉又曰何邵曽之子也永康初遷司徒趙王倫篡位及三王交争邵以軒冕而逰其間無怨之者又曰何曽字穎考以太保侍中領司徒何曾固讓詔曰司徒舊丞相之職自古及今揔論人物化治之本以君宏道故選於衆而復盤桓非所聞也又曰魏舒為司徒不持激厲不課人短陳留周震為諸府所辟書既下公輙亡僉號震曰殺公掾舒辟之果無患又曰王戎代王渾為司徒髙選長史西曹掾委任責成戎形状短陋而目明徹威儀不足常畜馬轝無日不出親類之亡無不吊也常以象牙笇晝夜笇計家財逺及田牧性又至儉不能善自奉飬財不出外天下之人謂之膏肓之病又曰魏舒字陽元為司徒年過致仕有遜讓意而無居宅乃漸以奉秩之餘為第一所舒素為人先行而後言故未曽語親踈言當遜位九年正月整法服入殿朝㑹罷逕還奉送章綬内外莫有知舒此情者曹家之晉記曰王戎再至司徒委事掾屬乗小馬從便門出見者不知是台司也晉諸公讃曰司徒博祗疾遜位不許板轝上殿晉中興書曰劉隗從兄疇字王喬有重名司徒蔡謨每歎曰若使劉王喬得南渡司徒之美選也又曰蔡謨字道眀遷司徒謨固讓曰若我作司徒将為後代嗤義不敢拜詔數十下謨章表十餘上陳以疾篤帝臨軒自朝至申而徴不至公卿以蔡公傲無人臣之禮奏送謨廷尉謨率子弟詣闕稽顙詔免為庶人齊職儀曰司徒品秩冠服同丞相郊廟服冕同太尉漢哀帝從朱博議始置三司改丞相為大司徒以孔光為之魏以華歆為之北齊書曰孔騰初北境亂騰亡一女及貴推訪不得疑其為人婢及為司徒婢訴良者皆免之願免千人兾得其女神武知之大怒遂解司徒隋書王誼為大司徒蘇威立議以為户口兹多民田不贍欲減功臣之地以給民誼奏曰百官者歴世勲賢方䝉爵土一旦削之未見其可如臣所慮正恐朝臣功徳不進何患民田有不足上然之竟寝威議唐書曰太和四年守司徒裴度上表辭冊命言臣此官已三度受冊有靦顔目從之九州春秋曰靈帝賣官廷尉崔烈入錢五百萬以買司徒烈子均亦有時名烈問曰吾作公天下人謂何如對曰大人少有髙名不謂不當為公今登其位海内嫌其銅臭烈舉杖撃之均走烈曰子受父撾而走可謂孝乎均曰舜之事父少杖則受大杖而走不陷父於不義烈曰爾以吾為瞽䏂耶華陽國志曰自建武之後羣儒修業開案圖緯漢之宰相當出坤鄉於是司徒李公屢登七政太𫝊于堅弈代論道矣荀氏家𫝊曰組字大章中宗為晉王時将徴為司徒問太常賀循循曰組舊望清重勤勞顯著遷順五品以統人倫實充人望詔以組為司徒江氏家𫝊曰江統字應元時太傅從事中郎庾子髙以風韻見重亦雅敬君徳每云當今可以居司徒充民望者江生其人也管子曰昔者黄帝得祝融辨南方故使為司徒符子曰魯侯欲以孔子為司徒将召三桓而議之乃謂左丘明曰寡人欲以孔丘為司徒而授以魯政焉寡人将欲詢諸三子左丘明曰孔丘聖人與夫聖人任政過在離位焉君雖欲謀其選弗合乎魯侯曰吾子奚以知之丘明曰周人有愛裘而好珎羞欲為千金之裘而與狐謀其皮欲具少牢之珎而與羊謀其羞言未卒狐相率逃於重丘之下羊相呼藏於深林之中故周人十年不制一裘五年不具一牢何者周人之謀失之矣今君欲以孔丘為司徒召三桓而議之亦與狐謀裘與羊謀羞哉於是魯侯遂不共三桓謀而召孔丘為司徒典畧曰契為司徒百姓和親䕫主賔客逺人畢至蔡邕申鼎銘序曰惟建寧四年春三月進公登士王前廷乃制詔曰其以司空橋𤣥為司徒公拜稽首三讓然後受命曹植輔臣論曰辯博通幽見𫝊異度徳實充塞于内知謀縱横於外解疑釋滯剖散盤結者主司徒荀朂荅詔曰咸寧四年司徒何曽遷太宰詔問朂司徒䖏當得人副逺近之望并治事見才誰可也朂表三公具瞻之望誠不可用非其人昔魏文帝用賈詡為公孫權笑之尚書令李允忠亮髙潔應䖏台輔宋謝荘為北中郎謝兼司徒章曰臣聞燮理隂陽寅亮天地弗惟其官無人則闕司徒掌敷五典職擾兆民豈悟乾靈罔遺光渥方闡不次之任殊絶蕃岳豈可權師三事假備六符慙震周廻顧歩交悸司空尚書曰舜曰咨四岳有能奮庸熈帝之載奮起也載事也僉曰伯禹作司空帝曰俞咨禹女平水土惟時懋哉帝曰然嗟禹女有平水災之功惟是勉之遂委以政也又曰司空掌邦土居四民時地利冬官卿主國土地以居士農工啇四民使順天時分地利也禮記王制曰司空執度度地司空冬官卿掌邦事者也度丈畫也量地逺近制邑井之䖏也興事任力事謂築邑宿市春秋昭四年爽鳩氏司空也續漢志曰司空為冬官掌邦事凢營城邑復溝洫修墳防之事則議其利建其功四方水土功課嵗盡則奏殿最而行賞罰凢國有大造大疑謀畫與大尉皆同春秋元命苞曰危東六星兩兩而北曰司空主水金木守之天下憂水韓詩外𫝊曰山陵崩陁川谷不通五糓不殖草木不茂則責之司空尚書大𫝊曰溝瀆擁過水為民害田廣不墾則責司空尚書刑徳收曰神禹長于地里水泉九州得括象圖故堯以為司空家語曰度量不審舉事失理都鄙不修財物失所曰貧貧則飭司空飭謂整攝又曰魯定公以孔子為司空乃别五土之性五土山林川澤丘陵墳衍原隰也而物其所生之宜咸得厥所漢書曰成帝綏和元年始更名御史大夫曰大司空初改為司空議者又以縣道官有獄司空故復加為大司空亦所以别大小之文又曰彭宣字子佩為大司空而王莽為大司馬宣上書曰三公鼎足承君一足不任則覆亂美質臣老病願上印綬又曰何武字君卿為司空事後母不篤詔以其舉措煩碎不合衆心孝聲不聞惡名流行其上大司空印綬遂冊免之東觀漢記曰杜林代張純為大司空務于無為第五倫為司空奉公不撓言事無所依違後漢書曰王梁初為野王令世祖議選大司空而赤伏符曰王梁主衞作𤣥武帝以野王衞之所徙史記曰衛文君自漢陽徙於野王𤣥武水神之名司空水土之官也于是擢拜梁為大司空又曰竇融拜兾州牧十餘日又遷大司空融自以非舊臣一旦入朝在功臣之右召㑹進見容貌辭氣卑恭已甚帝以此愈親厚之又曰陳寵為司空府故事以計吏至時自以下皆屬籍不通賔客以防交闗寵去籍通客以明無所不受論者大之又曰張奮字穉通父純臨終勅家丞曰司空無功於時猥䝉爵土身死之後勿議傳國奮兄根少被病光武詔奮嗣爵奮稱純遺勅固不肯受帝以奮違詔勅取下獄奮惶怖乃襲又曰第五倫章帝立徴拜司空奉公不撓言議果决後自陳老病以二千石禄俸終身續漢書曰張奮為司空時嵗災旱祈雨不應上表即時引見復口陳時政之宜帝詔太尉司徒幸洛陽獄録囚徒大雨三日華嶠後漢書曰第五倫雖峭直然常以中興以来二主好吏化俗尚苛刻政化之本宜先以寛和及為三公值章帝長者多恕屢有善政上䟽褒稱盛美因以勸成徳風也又曰伏恭為太僕帝臨辟雍於行禮中拜恭為司空儒者以為榮袁宏後漢記曰第五倫為司空有人與倫千里馬者倫雖不取每三公有所選舉倫心不忘也然亦終不用漢官解詁曰下理坤道上和乾光謂之司空魏志景初元年司徒司空並缺散騎侍郎孟康曰夫宰相者天下之所瞻效誠宜得秉忠履正本徳服義之士足為海内所師表者竊見司𨽻校尉崔林禀自然之正性體髙雅之宏量論其所長以比古之人忠直不偽則史魚之儔也清儉守約則季文之匹也遂為司空封安陽亭侯三公封列侯自林始也又曰徐邈拜司空歎曰三公論道之官無其人則缺豈可以老疾忝之哉固辭不受晉書曰裴秀為司空刪定國制損益多善當禪代之際緫納言之要其所裁當禮無違者又案禹貢山川地名古有今無者皆隨事注列作禹貢地域圖十八篇事成奏上蔵於秘府秀在位四年為當世名公又曰鄭袤字林叔為司空天子臨軒遣就第拜受袤謂使曰宜以徐景山為司空徐公曰三公上應天心苟非其人實傷和氣固辭見許晉起居注曰武帝太始七年詔光禄大夫鄭袤體行純正履道冲粹退有清和之風進有素絲之節宜齊三階之曜補衮職之闕明弼朕躬以匡不逮其以袤為司空晉中興書曰虞玩字士瑶王導郄鍳庾亮相繼薨遷玩為司空給羽林四十人玩比陳讓不聽既拜歎息謂賔客曰以我為三公是天下無人矣談者以玩為知言齊職儀曰司空品秩官服同太宰舜以禹為司空成王以毛公為司空以宋武公之諱改司空為莫敖秦置御史大夫省司空後魏書曰伊馥拜司空及為三公清約自守為政舉大綱而已不為苛碎後周書曰冬官謂之大司空卿掌邦事以五材九範之徒佐皇帝富邦國大祭祀行灑掃廟社四望則奉豕牲唐書曰天寳十三載冊楊國忠為司空其日雨土五代史唐書曰清泰二年制以前同州節度使馮道為守司空時議以自隋唐已来三公無職事自非親王不恒置於宰臣為加官無單置者道在相位時帯司空及罷鎮未命官議者不練故事率意行之及制出言議紛然或云便可綜中書門下事或云須冊開府及就列無故事乃不就朝堂序班臺官兩省官人就列方入宰臣退踵後先退及晋天福中以李鑄為司空周廣順初以竇貞固為司徒蘇禹珪為司空遂以為例議者不復有云華陽國志曰趙瑶字元珪拜扶風太守未之郡司空張温謂第五伯魚從蜀郡為司空今掃吾第以待足下荀氏家𫝊曰荀爽字慈明董卓徴公到府三日䇿拜司空爽起巖穴九十九日而為台司世號為白衣登三公又曰晉袁愷為司空文帝平蜀議復五等表魏朝使公定禮儀中䕶軍賈充正法律尚書僕射裴秀議官制公遂刪定舊文行正式為一代之典書成入藏於秘府其服色旗熾法駕之式禮樂犧牲柴燎之典祫禘遷毁配食之制及於明堂辟雍之儀皆所議定朝廷歸其美公既為台輔徳望清重加以㽞心禮教以年耆多疾不便朝見詔使侍中任愷諮問政化所宜行否又曰荀蕃字大堅為司空劉崑表於太子曰司空荀蕃朝廷之舊臣奕世忠勤乃心皇家具瞻之望唯蕃而已宜增位號授分陜之重永令臣等有所憑凖白虎通曰司空主土不言土而言空空尚主之况於實乎環濟要畧曰冬官司空掌邦事營城郭都邑立社稷宗廟造宫宅器械監百工典畧曰禹為司空陂九山通九澤决九川定九州使各以其職来貢傅子曰荀仲預稱禹十二為司空世論曰諸葛誕為鎮東将軍都督揚州司馬文王秉政徴誕為司空書至誕曰我當在文王書後今便為司空不貴使者出齎書使以兵付樂綝此必綝所為乃将左右數百人至揚州人欲閉門誕叱之曰卿非我故吏耶逕入綝逃上樓就斬之齊孔稚珪為王敬則讓司空表曰故李通豪贍以親寵登用王基才勇以聲華入選先帝擢臣以榮華陛下申臣以富貴得北帯五州東跨六郡内亞三鼎外齊四岳蟬佩之映則左右交暉龜組之華則縱横吐曜輕輪徐動則劒騎如雲飛盖暫停則歌鍾成列摐金龍吹􅊊其前鳴笳鳯管疊其後鄧禹若不遭漢光則南陽之掾吏㣲臣若不逢明聖則孤城之戍客豈可加以正台之席登以論道之寄啓黄扉而燮五緯躡青帷而調四序梁劉孝儀為臨州王解司空表曰臣以庸薄謬竊隆重職班三事任緫六條衣衮坐槐既闕論道駝𫝊憇棠尤慙為政而俯司土地仰燮隂陽折撓之機已彰愆伏之咎爰著今水蜧不擢旱魃為災山無薈蔚雲成煙火陛下曲私未垂䇿免臣職是當於何迯責降兹台歩恊此天人太平御覽卷二百八
