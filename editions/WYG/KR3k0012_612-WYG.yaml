body:
  text: 太平御覽卷六百十二宋李昉等撰學部六博學博物博學論語曰大哉孔子博學而無所成名禮記曰君子之學也博其服也鄉易大畜卦云君子以多識前言往行以畜其徳續漢書曰班固字孟堅九嵗能屬文誦詩賦及長遂博覽載籍九流百家之言無不窮究東觀漢記曰楊震字伯起受歐陽尚書於桓郁明經博覽無不窮究諸儒為之語曰關西孔子楊伯起謝承後漢書曰王充字伯任好學博覽常遊洛陽市閱所賣書一見輒能誦憶遂博通衆流百家之言又曰黄香知古今羣書無不涉獵帝以香先帝所異毎有疑帝時訪問又詔香詣東觀讀所未嘗見書又曰賈遴字景伯弱冠誦左氏語云問事不休賈長頭也王隱晉書曰皇甫謐羸病手不釋卷厯觀古今無不皆綜又曰張華博覽圖籍四海之内若指諸掌世祖問華漢宫室制度千門萬户畫地成圖晉書曰何劭恵帝即位初建東宫太子年幼欲令親萬幾以劭為太子太師劭博學善屬文陳説近代事若指諸掌三國典畧曰陳遣兼通直散騎常侍姚察聘於周沛國劉臻竊於公館訪漢書疑事十餘條並為剖析皆有經據臻謂所親曰名下定無虛士齊書曰賈希鏡宋孝武時青州人發古冡銘云青州世子東海女郎帝問學士鮑照徐爰蘇寳生並不能悉希鏡對曰此是司馬越女嫁苟晞兒檢訪果然由是見遇又崔慰祖傳曰國子祭酒沈約吏部郎謝朓嘗於吏部省中賔友俱集各問慰祖地理中所不悉十餘事慰祖口吃無華辭而酬據精悉一座稱服之朓嘆曰假使班馬復生無以過此蕭子顯齊書曰王儉自以博聞多識讀書過陸澄澄曰僕少小來無事唯以讀書為業且年已倍令君令君少便鞅掌王務雖復一覽便諳然其卷軸未必多僕儉集學士何憲等盛自商畧澄待儉語畢然後談所遺漏數百千條皆儉所未覩儉乃敬服儉在尚書省出巾箱几案新服飾令學士𨽻事多者與之各得一兩物澄後來更出諸人所不知事復各數條并奪物将去梁書韋叡子稜字威直性恬素以書史為業博物强記當代之士咸就質疑隋書曰王邵初在齊時祖孝徵魏收陽休之等嘗論故事有遺忘討閲不能得因呼邵問之邵具論所出取書騐之一無舛誤自是大為時人所許稱其博物唐書曰李守素尤工譜學妙譜人物自晉宋以降四海士流及周魏以來諸勲貴華戎閥閲莫不詳究時號為肉譜嘗與虞世南等六人同直學館其夜七夕内出珍饌有教賦詩因共談人物初言江左東南猶相酬對及言北地諸姓次第如流顯其厯葉皆有據證世南但撫掌而笑不復能答既而嘆曰肉譜定可畏許敬宗因謂世南曰李倉曹以善譜人物乃得此名雖為美事然非雅目今君既言成準的宜有以改之答曰卿言是也昔任彦昇善談經籍梁代稱為五經笥今目倉曹為人物志可乎杜如晦等咸以為佳又曰蔣乂幼好學徳宗嘗幸凌煙閣見左壁頽剥上有殘缺文記每行可辨三五字命録之以問宰臣宰臣卒然無以對遽召乂訪之對曰此聖厯中侍臣圖贊也暗誦諷不失一字宰臣上奏徳宗嘆曰虞世南暗寫列女傳無以加也國語曰晉文公使趙衰為卿辭云欒枝貞慎先軫有謀胥臣多聞皆可以為輔也孟子曰人皆知糞其田而莫知糞其心何謂糞心博學多聞也荘子曰惠施多方其書五車稱連環可解袁子正書曰學莫大於博行莫大於約聖人者天下之至智也博學以聚之兼聽而辨之抱朴子曰洪年十六始習孝經論語易但貪廣覽於衆書曾披渉五經諸史百家之言将近萬卷吕氏春秋曰有讀史者晉史三豕渉河子夏曰非也是己亥也夫己之與三相近豕之與亥相似至晉而問之則曰晉師己亥渉河也漢書藝文志曰成帝詔光禄大夫劉向校經傳諸子詩賦歩兵校尉任宏校兵書太史令尹咸校術數侍醫李柱國校方技每一書已師古曰已畢也向輙條其篇目撮其指意録奏之㑹向卒哀帝復使向子侍中奉車都尉歆卒父業歆於是總羣書而奏其七略故有輯略師古曰輯與集同謂諸書之總要有六藝畧師古曰六藝六經也有諸子略有詩賦略有兵書略有術數略有方技略抱朴子曰書三寫以魯為魚以虞為虎劉向七畧曰古文或記闕頴容春秋例曰漢興博物洽聞著述之士前有司馬遷揚雄劉歆後有鄭衆賈逵班固之徒馬融鄭𤣥之所著作違義正者遷尤多聞略舉一兩事以言之史記不識畢公文王之子而言與周同姓揚雄著法言不載六十四卦云所從來尚矣後漢書曰和熹鄧太后從曹大家受經書兼天文算數晝省王政夜則誦讀而患謬誤懼乖典章乃博選諸儒劉珍等及博士議郎四府掾史五十餘人詣東觀校傳記蜀志曰向朗字巨達年八嵗手自校書刋定謬誤也九真中經曰奔日月之道太上上清太極九重四洞真人之所寳秘𤣥元君之玉章也自非有金闕玉名及東華紫字皆不得聞見此鬱儀奔日結隣奔月二章之篇目三元布經曰南極上上寳秘玉檢之文自無𤣥名帝圗不得見其篇第也及金羽𤣥章經此文隱藏不傳於世自無蘭臺丹字不得見聞靈寳真一訣曰洞𤣥自然經本文出乎太上道也者弥綸無極微妙無形老子曰天下莫柔弱於氣氣莫柔弱於道道之所以柔弱者包乎天地萬物夫柔之生剛弱之生强而使天下莫能知其根本所以生者乎是故有以無為毋無以虛為毋虛以道為毋道者道之根本也人能以自然為道貞則道可得而通也太上經曰道實無形隱為化本經富文字顯為教端師有形言出處為法語黙隨時為存為最期至乎道由經與師師經及道號為三寳又云化本有三道經師也大道無形以經為階經文𤣥妙非凡所知聖降為師示人㫖訣老子云道者萬物之奥善人之寳賢者得之以為真寳愚者得之不敢失道道無常術徳無常方神無常體和無常容道無中主與靜為友又曰龍景九文紫鳳赤書經舊文藏在太上六合紫房之内天人侍衛其經博物左傳昭七年傳曰子産聘于晉晉侯有疾韓宣子逆客客私焉私語曰寡君寝疾於今三月矣並走羣望晉所望祀山川皆走往祈禱有加而無瘳夢黄熊入於寝門其何厲鬼也對曰以君之明子為大政其何厲之有昔堯殛鯀于羽山羽山在東海祝其縣西南其神化為黄熊以入于羽淵實為夏郊三代祀之鯀禹父夏家郊祭之厯殷周三代又通在羣神之數見祭祀晉為盟主其或者未之祀乎言周襄晉文為盟主得佐天子祀羣神韓子祀夏郊祀鯀晉侯有間間差也賜子産莒之二方鼎方鼎莒所貴漢書曰張安世字子孺給事尚書上幸河東亡書三篋詔問莫能知惟安世識之具作其事後求得書以相校無所遺失上竒其材擢尚書令晉書張華傳曰人有得鳥毛三丈以示華華見慘然曰此謂海鳬毛也出則天下亂矣陸機餉張華鮓時賔客滿座華發器便曰龍肉也衆未之信華曰試以苦酒濯之必有異既而五色光起機問鮓主果云園中茅積下得一白魚質状殊常以作鮓過美故以相獻武庫封閉甚密其中忽有雉雊華曰此必虵化為雉開視雉側果有虵蜕焉呉郡臨平岸崩出一石皷槌之無聲帝以問華華曰可取蜀中桐材刻魚形扣之則鳴矣於是如其言果聲聞數里初呉之未滅也斗牛之間常有紫氣道術者皆以呉方强盛未可圖也唯華以為不然及呉平之後紫氣愈明華聞豫章雷煥妙達象緯要之宿登樓仰觀煥曰寳劍之氣在豫章豐城因以煥為豐城令使求之煥到縣掘獄屋基得雙劍其夕斗牛間氣不復見焉煥以南昌西山北巖下土以拭劍光芒艶發遣使送一劍并土與華留一自佩華以南昌土不如華隂赤土因以華隂土一斤致煥煥更以拭劍倍益精明又魏時殿前鐘忽大鳴人共震駭華云此蜀山毁故鐘鳴尋蜀郡上其事黄銀禮書威儀曰君乗金而黄則黄銀見隋書曰辛公義為牟州刺史時山東霖雨自陳汝至於滄海皆苦水災境内犬牙獨無所損山出黄銀獲之以獻詔水部郎婁崱就公義禱乃聞空中有金石絲竹之響唐書曰太宗嘗賜房𤣥齡黄銀帶顧謂曰昔如晦與公同心輔朕今日所賜惟獨見公因泫然流涕又曰朕聞黄銀多為鬼神所畏命取黄金帶遣𤣥齡親送于靈所也水銀史記曰秦始皇葬以水銀為百用江河大海機轉相輪終而復始皇覽曰闗東賊發始皇墓中有水銀廣雅曰水銀謂之澒呉越春秋曰閶闔葬墓中澒地廣六丈神仙傳曰封君達隴西人服鍊水銀年百餘嵗常騎青牛鉛尚書禹貢曰海岱惟青州岱畎絲枲鉛松怪石宋記曰髙漸離秦始皇矐其目使擊筑漸離乃以鉛置筑中舉筑扑秦始皇帝南史曰何承天博覽古今為一時所重張永嘗開𤣥武湖遇古塜塜上得一銅斗有柄文帝以訪朝士承天曰此亡新威斗王莽三公亡皆賜之一在塜内一在塜外時三台居江左者惟甄邯為大司徒必邯之墓俄而又啟塜内更得一斗復有一石銘大司徒甄邯之墓蕭子顯齊書曰東海王摛亦史學博聞厯尚書左丞竟陵王子良校試諸學士惟摛問無不對永明中天忽黄色照地衆莫能解摛云是榮光世祖大悦梁書裴子野傳曰時西北逺邊有白題及滑國遣使由岷山道入貢此二國厯代弗賔莫知所出子野曰漢潁隂侯斬胡白題将一人服䖍注曰白題胡也又漢定逺侯擊虜八滑此其後乎時人服其博又曰樂藹為御史中丞時長沙宣武王將葬而車府忽於庫火油絡欲推主者藹曰昔晉武庫火張華以為積油萬石必燃今庫若有灰非吏罪也既而檢之果有積灰時稱其博物𢎞恕三國典畧曰齊徐之才見有人以五色斑爛骨為刀把者之才曰此人瘤也問所得處云於塜見髑髏骨長數寸試削之視有文理故用之又曰周平蜀還得樂器者皆莫之識太常少卿斛斯徵直陵切見之曰此錞于也人弗之信徵遂依干寳周禮注以芒筒捋之其聲極振衆乃嘆服徴取以合樂焉隋書曰崔賾大業四年從駕汾陽宫次河陽鎮藍田令王曇於藍田山得一玉人長四尺四寸著大領衣冠幘奏之詔問羣臣莫有識者賾答曰謹按漢文以前未有冠幘即是文帝以來所制作也臣見魏大司農盧元明撰嵩山廟記云有神人以玉為形像長四尺四寸或出或隱出則令世延長伏惟陛下應天順民定鼎嵩雒岳神自見臣敢稱慶因再拜百官畢賀天子大悦賜縑二百匹國語曰海鳥爰居止於魯東門之外三日臧文仲使國人祭之文仲不知以為神展禽曰越哉臧孫之為政也越迂也言其迂闊不知所要也夫祀國之大節而節政之所成也故慎制祀以為國典今無故而加典非政之宜也夫聖王之制祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之非是族也不在祀典今海鳥至已不知而祀之以為國典難以為仁且智矣夫仁者講功而智者處物無功而祀之非仁也不知而不問非智也今兹海其有災乎夫廣川之鳥獸恒知而避其災也是嵗也海多大風冬暖爰居所避文仲聞柳下季之言使書以為三筴筴簡書也三筴三卿卿一通也謂司馬司徒司空又曰季桓子穿井獲如玊缶其中有羊焉使問之仲尼曰吾穿井而獲狗何也獲羊言狗者以孔子博物也對曰以吾之所聞羊也丘聞之木石之怪曰䕫蝄蜽水之怪曰龍罔象土之怪曰墳羊家語曰楚昭王渡江江中有一物大如斗圓而赤直觸王舟舟人取之王怪之徧問羣臣莫能識之使使聘於魯問孔子孔子曰此萍實也唯霸者為能獲之使者返王食之大美久之使來以告魯大夫大夫因子游問曰何以知其然曰曰吾昔之鄭過陳之野聞童謡曰楚王得萍實大如斗赤如日剖而食之甜如蜜此是霸王之應也益都耆舊傳曰蜀郡張寛漢武帝時為侍中從祀甘泉至渭橋有女子浴於渭水乳長七尺上怪其異遣問之女曰帝後第七車知我所來時寛在第七車對曰天王主祭祀者齋戒不嚴則女星見郭璞註山海經曰漢宣帝使人上郡發磐石石室中得一人徒裸被髮反縛械一足以問羣臣莫能知劉子正對曰昔貳負之臣曰免與貳負殺㝣帝乃梏之於疎屬之山栝繫也桎其右足縛兩手繫之山上磐石之下宣帝大驚於是時人爭學山海經國朝傳記曰潤州得玉磬十二以獻張率更叩其一曰是晉某嵗所造又有人於古墓中得銅物似琵琶而身正圓元行冲云此阮咸所造事並具樂部太平御覽卷六百十二
