body:
  text: 太平御覽卷四百五十六宋李昉等撰人事部九十七諫諍六史記曰㣲子啓者紂之兄也紂不道數諌不聽度紂終不可諌欲死之及去未能决乃問太師箕子少師比干曰紂湎於酒婦人之言是用若渉水無津涯箕子曰今誠得治國國治身死不恨為死終不治不如去之紂始為象箸箕子曰必為玉杯則思逺方珍怪之物而御之矣為人臣諌者不聽是彰君之惡乃被髮佯狂比干曰君有過不以死爭則百姓何辜矣乃直言諌紂怒刳視其心㣲子曰父有過三諌不聽則號泣而隨之臣三諌不聽則其義可去矣後周武王滅紂封之于宋其地齊魏荆楚之分說苑許綰魏襄王欲為中天之臺誡曰敢諌者死綰乃負畚操牐而入曰臣聞大王將為中天之臺願加一力焉王曰何也對曰臣聞天地相去萬五千里今王因而半之當髙七千五百里基址當廣八千里盡王之地不足以為大王必欲為之先起兵以伐諸侯及四夷盡有地方足矣然以林木之積人徒之衆倉廪之輸當給其外乃可以作襄王黙然無以應之乃罷又曰叚規智伯請地於韓康子康子欲勿與規諌曰不可夫智伯之為人好利而鷙復来請地而勿與則必加兵於我矣若與之彼又請地於他國他國不聽必向之以兵然則可以免於患而待事之變康子曰善因使使者封萬家之縣以與智伯智伯大悅復請地於趙不與果隂約韓魏而伐之圍晉陽三年後韓魏應之遂滅智伯又曰田嬰齊宣王弟封靖郭君於薛嬰自威王已來任職有功故封之靖郭君嬰將城薛客多諌者嬰謂謁者有諌者勿通於是人有請見者曰臣請三言而已矣若過三言臣則請烹靖郭君見之客趨進曰海大魚因返走君不解曰更言之客對曰君不聞海有魚乎網不能止劍不能牽忽而失水則螻蟻得志焉今齊亦君之水也若長有齊奚以薛為君若一旦失齊雖隆薛之城到天猶無益也君曰善遂不城薛又曰不幸不聞其過福在受諌基在愛民固在親賢戰國策曰齊王有幸臣九人九人欲傷安平君田單曰田單之與王君臣無禮隂結諸侯之雄俊其意欲有為也貂勃從楚來王賜諸前酒酣王曰召相田單貂勃避席稽首曰王惡得此亡國之言乎人臣之功豈有厚於安平君乎王乃殺九子益封安平君又曰先生王斗造門而歌欲見於宣王宣王使謁者延入王斗曰斗趨見王為好勢王趨見斗為好士於王何如使者還報宣王因趨而迎之於門與入曰寡人聞先生直言正諌不諱王斗曰生於亂世事亂君焉敢直言正諌宣王忿然作色不說有間王斗曰昔先君桓公所好者五天子授籍立為方伯今王有四焉宣王說曰寡人愚陋焉能有四王斗曰先君好馬好狗好酒好色王亦好之先君好士王不好士宣王曰當今之世無士寡人何好斗謂王曰世無騏驥騄耳王駟已備世無東郭韓盧氏之犬王犬已備世無毛嬙西施之妓王宫已充王亦弗好士也何患無士蘇代為燕王謂趙惠王曰今者來過川蜯方出曝而鷸啄其肉蜯合而掩其喙鷸曰今日不雨明日不雨蜯將為脯蜯亦為鷸曰今日不出明日不出必見死鷸兩者不肯相捨漁父得而并擒之今趙且伐燕燕趙久相交以弊大衆臣恐強秦之為漁父也惠王曰善乃止之又曰趙太后新用事秦急征之趙氏求救於齊齊曰必以長安君質兵乃出太后不肯太臣強諌太后謂左右有復言令長安君為質者老婦必唾其面左師觸讋願見太后盛氣而揖之入而徐趨曰老臣賤息舒祺最少不肖而衰竊愛憐之願令得補黒衣之數以衛王宫太后敬諾問年㡬何矣對曰十五嵗矣太后曰丈夫亦愛憐少子乎對曰甚於婦人太后曰婦人異甚對曰唯唯臣竊以為媪之愛燕后賢於長安君曰君過矣左師曰媪之送燕后時祭祀則祝之曰必不使反豈非計長久為子孫相繼為王也今媪尊長安君之位而封之以膏腴之地與之重器而不及今令有功於國一旦山陵崩長安君何以自託於趙老臣以媪為長安君計短也故以為其愛不若燕后太后曰諾惟君所使之於是為長安君約車百乗質於齊齊兵乃出補逸禮傳曰衛靈公之時蘧伯玉賢而不用彌子瑕不肖而任事史鰌數言之未入史鰌病且死謂其子曰我死則治喪於北堂吾生不能進蘧伯玉而退彌子瑕是不能正君也生不能正君者死不當成禮而致尸於北堂於是足矣靈公往弔問其故其子以父言聞靈公靈公失容曰吾失矣立召蘧伯玉而進之召彌子瑕而退之徙喪於堂成禮而後去衛國以治史鰌之力也史鰌以尸諌可謂忠不衰矣孝經援神契曰三諫待放復三年眷眷所以然者臣為君諫若言有過而放矣所諫事遂以行者遂去不留猶待放者兾君用耳事以行災咎將至无為留之臣待放於郊君不絶其禄者亦不欲去道不合故去耳以其宗廟賜之環即還賜之玦則去國語曰周靈王二十二年穀雒鬭將毁王宫王欲壅之太子晉曰不可晉聞古之長人者不堕山不崇藪不放川不竇澤行成坤國語曰呉伐越越王令諸稽郢行成於呉曰君王不以鞭箠使之而辱軍士使㓂令焉若御㓂之號令勾踐請一介嫡女質箕箒一介嫡男奉盤匜以隨諸御匜沃噐也春秋貢獻不懈王府諺曰狐埋之而狐搰之是無成功也今大王既封植越國而又刈之刹斬是無成勞也呉王曰諾將許越成申胥諌曰申胥楚臣伍員不可許大夫種勇以善謀將還玩呉國於股掌之上以得其志故婉約其辭以縱王志為虺弗推為虵將若何虺短蛇長呉王不聽乃許盟立後王國語曰魯武公以括與戲見宣王武公敖也括武公長子伯御也王命立戲樊仲山父諌樊宣王卿士山父之所封也仲山父樊穆仲也曰不可立也不順必犯王命犯王命必誅故出命不可不慎也命之不行政之不立行而不順民將棄上夫下事上少事長所以為順也今天子立諸侯而違其少是教逆也天子其圖之又曰宣王既喪南國之師乃料民于太原仲山父諌曰民不可料也無故而料民天之惡也害於政而妨於後嗣王卒料之及幽王乃滅諷諌木國語曰晉平公射鷃不死使堅襄摶之失公怒拘將殺之叔向聞之曰君必殺之昔吾先君唐叔射兕於徒林殪以為大甲以封於晉今君嗣吾先君射鷃不死摶之不得是揚吾君之恥者也君必速殺之無令逺聞君忸怩顔乃令赦之說苑曰齊景公遊於海上而樂之六月不歸命左右曰敢有先言歸者至死不赦顔燭趨進諌曰君樂治海上而六月不歸彼儻有治國者君且安得樂此海也景公援㦸將斬之顔燭進撫衣待之曰君奚不斫也昔者桀殺關龍逢紂殺王子比干君之賢非此二主也臣之材亦非此二子也君奚不斫以臣叅此二人者不亦可乎景公說遂歸中道聞國人謀不内矣又曰呉王欲伐荆舍人少孺子欲諌不敢則懐丸操彈遊於後圃露沾其衣王曰何沾衣如此對曰榆上有蟬髙居而鳴不知螳螂在其後螳螂欲取蟬不知黄雀在傍黄雀欲啄螳螂而不知彈丸在其下臣欲彈雀不知露沾衣如此三者皆務欲得其利而不顧其後患也王曰善哉乃罷兵又曰晉平好樂多其賦歛不治城郭敢有諌者死國人憂之有咎犯者見門大夫曰臣聞主君好樂故以樂見門大夫入言晉人咎犯欲以樂見平公曰内之止坐殿上則出鐘磬竽瑟坐有頃平公曰客子為樂咎犯對曰臣不能為樂臣善隱平公詔隱士十二人咎犯曰隱臣竊願昩死以喻公曰諾咎犯申其左臂而詘五指平公問於隱官曰占之為何隱官皆曰不知平公歸之咎犯則申其指曰好樂一也便游􅀈畫而後城不門二也柱梁衣綉士民無褐三也侏儒有餘酒而死士不霑四也民有饑色而馬有粟秫五也近臣不敢諌逺臣不得逹平公曰善乃屛鐘皷除竽瑟遂與咎犯治國又曰枚乘上書諫呉王曰福生有基禍生有胎納其基絶其胎禍何從來哉太山之溜穿石單極之綆斷幹水非石之鑽繩非木之鋸漸摩使之然也夫銖銖而稱之至石必差寸寸而度之至丈必過石稱丈量徑而寡失十圍之木始生如蘖可搔而絶可擢而㧞據其未生先其未形磨礲砥礪不見其損有時而盡種樹畜長不見其益有時而大積徳循行不知其善有時而用棄義背禮不知其惡有時而亡臣乗願大王熟計而身行之此百王不易之道呉王不聽卒死丹徒又曰晉靈公造九層臺費用千億謂左右曰敢有諫者斬荀息聞之上書求見靈公張弩挾矢見之謂曰子欲諌耶息曰不敢諫也臣能累十二博碁加九鷄子上公曰子為寡人作之息卽正顔色定志意以碁子置下加九鷄子其上左右慴息靈公扶伏氣息不續曰危哉危哉息曰是不危也復有危於此者公曰願復見之息曰九層之臺三年不成男不得耕女不得織國有空虗隣國謀議將欲興兵社稷亡滅君欲何望靈公曰寡人之過乃至如此即壊九層之臺又曰秦始皇時侯生諌始皇望見侯生大怒侯生曰陛下之滛萬萬丹朱而千千桀紂臣恐陛下之千亡曾一不存始皇黙然久之曰汝何不早言侯生曰陛下之自賢自健上侮五常下陵三王棄素樸就末伎陛下徴見久矣臣等恐言之無益而自為取死也故逃而不敢言又曰楚莊王伐陽夏師久而不罷羣臣欲諌而不敢莊王獵於雲夢椒舉諌曰所以多得獸者馬也而廢王國亡王之馬豈可哉王曰善不糓知屈強國之可以長諸侯也知得地可以為福也亡其民之不用也明日飲諸大夫酒椒舉為上客罷陽夏之師晏子春秋曰景公為長庲音來舍也將欲美之有風雨作公與晏子入坐飲酒致堂上之樂酒酣晏子作歌曰種兮不得穫秋風兮草零落風雨之拂殺之靡弊之歌終顧而流涕張掖而儛公止之曰今日夫子有賜譏寡人之罪遂廢酒罷役又曰齊景公使人養所愛馬暴病死景公怒令人持刀欲殺養馬者是時晏子侍前左右執刀而進晏子止之而問曰古者尭舜支解人從何體始公懼然曰從寡人始遂止不支解公曰以屬獄晏子曰請數之使自知其罪然後屬之獄公曰可晏子數之曰爾有罪三公使汝養馬汝殺之當死罪一又殺公之所愛馬當死罪二使公以一馬之故而殺人百姓聞之必怨吾君諸侯聞之必輕吾國汝一殺公馬使公怨積於百姓兵弱於隣國汝當死罪三令以屬獄公喟然曰赦之又曰景公築路寢之臺三年未息而又為鄒之長塗晏子諌公斬板而去之又曰景公有愛槐令吏謹守之令犯槐者刑傷槐者死有不聞令過而犯之者將加罪焉晏子諌曰嬰聞窮人財力以從嗜欲謂之暴崇玩好威嚴謂之逆刑殺不稱謂之賊三者守國之大殃也君享國徳行未見於民而三辟著於國嬰恐其不可以蒞國人也公曰善出犯槐之囚又晏子春秋曰景公畋於署梁十有八日而不反晏子因自往見公比至衣冠不正不革衣冠望遊而馳公望見晏子曰何其遽國家得無故乎晏子對曰國人皆以君安於野不安於國好獸而惡民公曰寡人之有子猶心之有四支也心有四支故心得佚焉豈不可哉晏子對曰嬰聞之言與君異乃若心之有四支而心得佚焉則可令四支無心也十有八日矣不亦久乎公于是罷田歸又曰楚巫微道裔欵以見景公侍坐三日景公說之楚巫曰公明神之主帝王之君也公即位十有七年矣事未大濟者神明未至也請致五帝以明君徳景公再拜稽首楚巫曰請廵國郊以觀帝位至於牛山而不敢登曰五帝之位在於國南請齊具而後登之公命百官供齊具嚮裔欵視事晏子聞之而見於公曰古者不慢行而繁祭不輕身而恃巫今政亂而行辟而求五帝之明德也棄賢而用巫求帝王之在身也夫民不苟得福不苟降君之帝王不亦難乎又曰景公射鳥野人駭之公怒令吏誅之晏子曰野人不知也臣聞之賞無功謂之亂罪不知謂之虐兩者先王之禁也公曰善自爾以來未有禽獸之禁又曰景公自為巨冠長衣以聽朝日晏不罷晏子進曰日宴矣君脱服就宴公曰諾寡人受令退朝遂去衣冠不復服也蕭方等三十國春秋曰秦王苻堅懸珠簾于正殿以朝羣臣宫宇服御物極珍餙之竒尚書金部郎裴元略諫曰願陛下遵采椽之不斵鄙瓊室而不居堅笑曰非卿之忠朕何由聞過乎趙曄呉越春秋曰呉王既殺子胥問太宰曰子胥數以越諫遂以喪身從死以來若有所亡今欲祠之何日可也曰三月癸未可也及夫差出國祠子胥江水之濵乃言曰寡人昔日不聽相國之言至令相國逺投江海自亡司馬彪九州春秋曰曹公征孫權叅軍𫝊幹諫曰今未承王命者呉與蜀也唯明公思虞舜舞干戚之義全威養徳以道制勝公不從軍遂無功太平御覽卷四百五十六
