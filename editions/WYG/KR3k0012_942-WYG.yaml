  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_942-1a, image: WYG0901/WYG0901-0352a.png}
body:
  text: 太平御覽卷九百四十二宋李昉等撰鱗介部十四蛤蛺爕三􅀈車螯移角姑勞羊蹄蛤蜊蘆雉蚶烏頭下来􅒕越王蠣蜆蟹蛤易通卦騐曰立冬燕雀入水為蛤禮記月令曰季秋月雀入大水為蛤汲冡周書王㑹曰東越海蛤東越則海際給文蛤三國典略曰周天和元年夏齊冀州人於蚌蛤中得瑶環一隻又曰徐之才遷預章王綜國常侍隨綜入北有人患足腫痛諸醫咸莫能識之才視之曰蛤精疾也得疾時當由乗船入海垂脚入水中乎疾者曰實曽如此之才為剖之得蛤子二大如榆莢淮南子曰土龍致雨鷰鴈代飛鷰春南而鴈秋北也蛤䖴珠龜與月盛衰吕氏春秋曰月者群隂之本月望則蚌蛤實群隂盈月晦則蚌蛤虛群隂缺月形於天而群隂化於淵梁武帝内傳曰西王母云仙家之藥有白水靈蛤汝南先賢傳曰周爕字彦祖好潜脩養志唯典籍是樂有仙人草廬廬有陂魚蛤生焉以非身所耕則不食也南越志曰凢蛤之屬開口聞雷鳴不復閉雲南記曰新安婦人於耳上懸金環子聨貫瑟瑟帖於髻側又繞腰以螺蛤聮穿繋之謂為珂珮慱物志曰東海有蛤鳥常啖之其肉消盡殻起浮出更薄在沙中岸邉潮水往来碏薄白如雪入藥最勝採取自死者崔豹古今注曰島鴈常在河邉沙上食沙石悉皆消爛唯食蛤不消隨其糞出用以為藥倍勝常者本草經曰文蛤有文味醎無毒主除隂蝕惡創五痔大孔出血生東海左思賦曰蚌蛤珠胎與月虧全蛺爕附三蝬臨海水土物志曰蛺爕似蛤如蜆大又曰三蝬如蛤車螯沈約宋書曰廬陵王義真出為南豫州刺史劉湛為長史義真出時居髙祖憂使帳下偹膳湛禁之義真乃齋於内别立厨帳㑹湛入煖酒炙車螯湛正色曰公當今不宜有此設義真曰旦甚寒一杯酒亦何傷酒既至湛因起曰既不能以禮自處又不能以禮䖏人謝靈運答弟書曰前月十二日至永嘉郡蠣不如鄞縣車螯亦不如北海移角臨海水土物志曰移角似車螯角移不正名曰移角姑勞臨海水土物志曰姑勞如車螯而殻薄羊蹄臨海水土物志曰羊蹄似􅑕味似車螯羅江盧水有之蛤蜊宋書曰王融初為司徒法曹詣王僧祐因遇沈昭畧未相識昭畧屡顧盻謂主人曰是何年少融殊不平謂曰僕出於扶桑入於暘谷照曜天下誰云不知而卿此問何也昭畧云不知許事且食蛤蜊融曰物以群分方以類聚君長東隅居然應嗜此族淮南子曰若士方捲龜殻而食蛤蜊抱朴子曰若士所食此必草也又海中自有蛤蜊螺蚌之類未加煑凡人所不能噉况君子若是乎蘆雉臨海水土物志曰蘆雉似蛤蜊殻小薄耳蚶大甘切唐書曰元和中嶺南節度使崔詠卒宰臣奏擬皆不可上謂裴度曰嘗有諫進海蚶淡菜者詞甚忠正卿可求此人與之度出以訪人或有言孔戣諫者度即日以聞乃命之廣志曰巨延州以蚶與行估貨臨海水土物志曰蚶側徑四尺也盛宏之荆州記曰始安郡駭鹿山山上有石室鑿内得骨并獲蚶嶺表録異曰瓦屋子盖蚌蛤之類也南中舊呼為蚶音憨子因盧尚書鈞作鎮遂改為瓦屋子以其殻上有稜如瓦壠故名焉殻中有肉紫色而滿腹廣人尤重之多燒以薦酒俗呼為天臠炙喫多即壅氣背膞煩疼未測其本性也烏頭臨海水土物志曰烏頭似蚶下来􅒕許咸切似蛤出海中臨海水土物志曰下来􅒕雖似鳥頭各自有種又曰􅒕蛤有似烏頭越王臨海水土物志曰越王形似􅒕殻赤尾如有人爪形蠣梁書曰何子季侈於味食必方丈後稍欲去其甚者猶食白魚䱉市魚切脯糖蟹以為非見生物擬食車螯蚶蠣使門人議之學生鍾岏曰䱉之就脯驟於屈伸蟹之將糖躁􅅰彌甚仁人用意深懐慘怛至於車螯蚶蠣眉目内闕慙渾沌之竒獷殻外緘非人人之慎不悴不榮曽草木之不若無香無臭與瓦礫其何筭故宜長充庖厨永為口味竟陵王子良見岏議大怒汝南周顒與𦙍書勸令食菜茅君内傳曰欲合九轉先作釡取東海左顧牡蠣凢六物令分等各𢷬杵異物志曰古灰牡蠣殻臨海水土物志曰蠣長七尺南越志曰南土謂蠣為蠔甲為牡蠣合澗州圓蠣土人重之語曰得合澗一蠣雖不足豪亦可以髙也永嘉郡記曰樂成縣新溪口有蠣嶼方圓數十畝四面皆蠣其味偏好謝靈運逰名山志曰新溪蠣味偏甘有過紫溪者嶺表録異曰盧亭亭盧循昔㩀廣州既敗餘黨奔於海島野居唯食蠔蠣疊殻為墻壁又曰蠔即牡蠣也其初生海島邉如拳石四面漸長有高一二文者巉巖如山毎一房内蠔肉一片隨其所生前後大小不等毎潮來諸蠔皆開房有小蟲入即合之海夷盧亭亭者以斧揳取殻燒以烈火蠔即啓房挑取其肉貯以小竹筐趂虛市以易醉盧亭好酒以蠔肉換酒也肉大者􅀈為炙小者炒食肉中有滋味食之即能壅膓胃蜆户典切爾雅曰蜃小者曰蜆郭璞注曰新燕蛤也江東呼為蜆也蟹廣雅曰蟹蛫音尼也其雄曰􅀈䱺其雌曰博帶山海經曰大蟹在海中盖十里之蟹又女丑有大蟹廣十里汲冡周書王㑹曰成王時海陽獻蟹大戴禮曰蟹二螯八蛫非鱣之穴而無所寄托者心躁也孫卿子同禮記檀弓下曰成人有兄死而不為衰者聞子臯將為成宰遂為之衰成人曰蠶則績而􅈉有筐范則冠而蟬有緌兄則死而子臯為之衰孝經援神契曰蟹二螯両端傍行􅢗猶兵也小蟲而欲両端自衛故使傍行也晋書曰觧系坐免官以白衣還第闔門自守及張蕐裴頠之被誅也倫秀以宿憾收系兄弟梁王􅊮救系等倫怒曰我於水中􅈉且惡之况此人兄弟輕我耶此而可忍孰不可忍彤苦争之不得遂害之又曰劉聰左都水使者㐮陵王攄坐魚􅈉不供斬於東市三國典畧曰周永定元年夏四月齊主禁取蟹蛤之類唯許私家捕魚淮南子曰夫釋大道而任小数無以異於使􅈉捕䑕蟾蜍捕蚤不足以禁奸暴亂乃愈滋以艾灼蟹筐上納置穴中廼熱走窮穴適能擒一鼠又曰礠石引鐵蟹之敗漆置蟹漆中則漆敗也雖在明知弗能然也抱朴子曰若􅈉之化漆麻之壊酒此不可以理推者也又曰山中稱無膓公子者蠏也又曰兵地生􅈉者急宜移軍太乙在主帳之中不可攻也郭子曰畢茂公嘗云左手持蟹螯右手持酒杯拍浮酒池中足可了一生國語曰越王召范蠡而問焉曰與子謀吴子未可也今其稻蟹食不遺種其可乎范蠡對曰天應至矣謂稻蟹人事未也須勤厲志世說曰蔡司徒渡江見蟛蜞大喜曰蟹有八足加以二螯令烹之既食委頓江下方知非蟹後向謝仁祖說此事謝曰卿讀爾雅不熟幾為勤學死劉孝標云大戴禮勤學篇曰蟹八足二螯非蛇蛆之穴無所寄托永嘉郡記曰安國縣有山鬼形體如人而一脚裁長一尺許好噉鹽伐木人鹽輙偷將去不甚畏人人亦不敢犯犯之即不利也喜於山澗中取石蟹同伐木人眠息便十十五五出就火邉跂石炙噉之嘗有伐木人見其如此未眠之前痛燃石使熱羅置火畔便佯眠看之須臾魑出悉皆跂石石熱灼之跳梁呌呼罵詈而去此伐木人家後被燒委頓博物志曰南海有水虫名剻蛤類也其中有小蟹大如榆莢剻開甲食則蟹亦出食剻合甲蟹亦還入為剻取以歸始終死不相離又曰蟹漆相合成水神仙服食方云又曰秋蟹毒者無藥可療目相向者尤甚𤣥申記曰天下之大物北海之蟹舉一螯能加於山身故在水中淮南萬畢術曰燒蟹致䑕搜神記曰晋太康年中㑹稽郡蟛蜞及蟹皆化為䑕其衆覆野為灾食稻述異記曰出海口北行六十里謄嶼之南溪有淡水清澈照底有蟹焉筐大如笠脚長三尺宋元嘉中章安縣民屠虎取此蟹食之肥美過常其夜虎夢一少嫗語之曰汝噉我知汝尋被噉不屠氏明日出行為虎所食餘家人殯瘞之虎又發棺噉之肌體無遺此水今猶有大蟹莫敢復犯廣五行記曰元嘉中富陽人姓王於瀆中作蟹㫁旦往觀之見一材頭長二尺許在㫁中而裂開蟹出多盡乃治㫁出材岸上明旦往親視之見材復裂開如前王又治斷出材明晨往親視所見如初王疑此材妖異乃取籠中擔歸去家一二里聞籠中窣動聲王生顧見向材叚變成物人面猴身一手一足語王生曰我性嗜蟹比實入破君㫁食蟹以此相負望君恕我我是山神當相祐助王曰汝犯暴人罪自應死何以多言此物曰君何姓名頻問不已王終不答去家轉近曰既不放我又不告我姓名當復何許王至家以火焚之土俗謂之山􅀈知人姓名則能傷人耳又曰軍行地無故生蟹者宜急移吉蟹魚之類水失其性則有此兆嶺南異物志曰嘗有行海得州渚林木甚茂乃維舟登岸㸑於水傍半炊而林沒於是􅃍㫁其䌫乃得去詳視之大蟹也嶺表録異曰水蟹螯殻内皆鹹水自有味廣人取之淡煑吸其鹹汁下酒黃膏蟹殻内有膏如黃蘇加以五味和殻􅏼之食亦有味赤蟹殻内黃赤膏如鷄鴨子黃肉白和膏實其殻中淋以五味䝉以細麺為蟹䭞珍美可尚紅蟹殻殷紅色巨者可以裝為酒杯也虎蟹殻上有虎班可裝為酒器與紅蟹皆産瓊岸海邊本草經曰蟹味鹹治􅎍中邪氣熱結痛張敞集曰朱登為東海相遺敞蟹報書曰􅕋伯玉受孔氏之賜必及其鄉敞謹分斯貺於三老尊行者曷敢獨烹之太平御覽卷九百四十二
