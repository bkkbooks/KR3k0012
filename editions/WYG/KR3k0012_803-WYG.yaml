body:
  text: 太平御覽卷八百三宋李昉等撰珎寳部二珠下唐書曰髙祖朝曷婆郍可汗獻大珠上曰珠信為寳朕所寳者赤心耳何用珠為竟不受又曰貞觀中桂州都督李𢎞節以清慎聞身没之後其家賣珠上聞之乃宣言扵朝曰此人生時宰相言其清白今日既然所舉者豈得無罪必可理之不可捨也魏徴諫曰陛下言此人不清未見受財之所聞其賣珠將罪舉者臣不知所謂自聖朝以來為國盡忠清慎自守終始不渝者屈突通張道源而已通子三人來選共有一匹羸馬道源兒子不能存立未見一言及之今𢎞節為國立功前後大䝉賞賚居官終殁不見貪殘妻子賣珠未為有罪審其清者無所存問疑其濁者傍舉罪人雖疾惡情深實以好善不篤臣竊思度未見其可恐有識聞之必生橫議伏惟再思上撫掌曰造次不思遂有此語方知談不容易又曰婆利東有羅刹國其人極陋朱髪黒身獸牙鷹𤓰時與林邑人作市以夜而來自掩其面其國出火珠狀如水晶日午時以珠承影取艾依之即火出管子曰桓公問管仲曰昔者周人有天下而奪扵其下何數也管子對曰君分壤而貢入市朝同流黄金一篋也江陽之珠一箧也此謂以寡為多以狹為廣又曰珠者隂之陽也故勝火玉者陽之隂也故勝水其化如神故天子藏珠玊諸侯藏金石又曰以珠玉為幣又曰玉起扵禺山珠起扵赤野又曰丹青在山民知而取之美珠在淵民知而取之晏子春秋曰景公爲履黄金之綦飾以銀連以珠列子曰子華之門徒指河曲之隈謂商邱開曰彼中有寳珠泳可得也商邱開從如泳之既出果得珠孫卿子曰在物莫尚扵珠玊珠玊不覩王公則不為寳又曰昔衛靈公坐重華之臺侍御數百隋珠照目羅衣從風仲叔圉入諫靈公下席再拜曰寡人過矣莊子曰夫唾大者如珠小者如霧又曰黄帝逰扵赤水之北登扵崑崙之邱遺其𤣥珠使知索之而弗得使離珠索之而弗得使罔象索之乃得又曰河上有貧窮待織蕭而食者其子投淵得千金之珠謂其子曰取石來鍜之夫千金之珠必在九重之淵驪龍頷下子能得珠者遭其睡也使驪龍寤之尚奚有哉又曰修其道之謂備不以物挫志之謂完君子明扵此則韜乎其事沛乎其爲萬物逝也若然者藏金扵山藏珠扵川又曰儒以詩禮發䝉大儒曰東方作矣事之何若小儒曰未觧裙襦口中有珠詩固有之曰青青之麥生陵之陂生不布施死何用含珠為鄒子曰珠生扵南海玊出扵湏彌無足而至墨子曰和氏之璧夜光之珠三棘六異此諸侯所謂良寳尹子曰水圓折者有珠韓侯曰隨侯之珠不嬰以銀黄其質至美物不足以飾又曰楚人賣珠扵鄭者為木蘭之櫝薰以桂椒綴以玟瑰輯以翡翠鄭人買其櫝而還其珠此可謂善賣櫝矣未可謂善鬻珠也淮南子曰曾城九重有珠樹在其西又曰美玉不雕美珠不文質有餘也又曰明月之珠不能無纇又曰楚王亡其猨而林木為之殘楚莊王猨㨗躐衣木而處故殘林以求之也宋王亡珠而池中魚爲之殫又曰珠玉尊則天下爭禮樂飾則純朴散又曰禹填洪水以為山堙崑崙以為土中立曾城九重其髙萬一千里上有木禾珠樹玉樹不死樹沙棠琅玕絳樹並在曾城沙棠琅玕珠類也玉璜在西北隅任子曰丹淵之珠沉扵黄泥牟子曰珠玊少而貴凡屬多而賤聖人七經而已佛遂萬億言恐煩而無當也抱朴子曰識珍者必拾濁水之明珠賞氣者必採穢藪之芳蕙山海經曰開明山北有珠樹又曰三珠樹生赤水山其爲樹如栢華皆為珠一曰其狀若彗穆天子傳曰北征舎于珠澤珠澤之藪方四十里又曰同穴鳥䑕之山滋水出焉西注如漢水多如魚魮之魚是生珠玊亦母蚌類又曰數厯之山楚水出焉其中多白珠戰國策曰張丑質扵燕王欲殺之走出國境境吏得丑丑曰燕所謂將殺我者人有言我有寳珠也王欲得之我已失之矣如燕不信今子但欲致我我且言子之奪我珠而吞之燕王必且殺子刳子之腹矣吾要且死子之腹亦且寸絶境吏恐而放之又曰蘇秦説李兊不能聽送秦以明月之珠和氏之璧黒貂之裘又曰有人採隋侯之珠露野無弓弩之衛必危吕氏春秋曰宋桓司馬有寳珠桓罪出亡王使人問珠之所在曰投之池中扵是竭池而求之魚得禍焉又曰以隋侯之珠彈千仭之雀世必笑之是何也所用重所要輕又曰精氣之集也阜扵珠玊與爲朗陸賈新語曰聖人不用珠玊而寳其身漢武帝故事曰上起神屋以白珠為簾瑇瑁為柙東方朔記曰珠彈不如泥丸各有所用也東方朔神異經曰西北荒中有二金闕上有明月珠徑三丈光照千里鹽鐡論曰珠璣出桂林距漢千餘里説苑曰墨子謂滑釐曰今凶年有欲與子隋侯之珠者曰不得賣也以為飾又欲與子鍾粟者曰得珠不得粟不得珠得粟子將何擇滑釐曰粟可取也新序曰秦使使者往觀楚之寳器楚王召子西而問焉曰吾和氏之璧隨侯之珠可以示諸子西對不知召昭奚恤而問焉昭奚恤對曰吾國之寳器在賢臣珠玉玩好之物非寳之重者太𤣥經曰明珠彈扵飛鳥其得不復論衡曰天地之間物氣相類實非者多海外西南有珠樹焉察之是珠然非魚中之珠也夫十日之日猶珠樹也珠樹非真珠十日似日非實日也又曰隨侯以藥作珠精耀如真又曰今審知有富貴之命則幽居候之不須勞形求索也猶珠在山不求貴價扵人人自貴之命富之人筋力自輕命貴之人才智自髙白虎通曰徳至淵泉即江出大貝海出明珠釋名曰王后首飾曰副副覆也上有垂珠歩則揺也蔡邕勸學曰明珠不瑩焉發其光寳玊不琢不成珪璋古今注曰章帝元和元年明珠出舘陶大如李有明曜三年明月珠出豫章海員大如雞子圍四寸八分章和元年欝林大珠圍三寸和帝永元十五年欝林降民得大珠圍五寸徑七分郭子横冥記曰帝起甘泉望風臺臺上得一白珠花一枝帝以飾九華之蓋望之若照月王子年拾遺記曰黄帝之子名青陽是曰少昊一名摯有白雲之瑞號爲白帝有鳳啣明珠致扵庭少昊乃拾珠懷之使照服扵天下又曰燕昭王時有黒鳥白頭集王之所啣洞光之珠圓徑一尺此珠色黒如􅃮而懸室内百神不能隐其精靈又曰石季倫所愛婢數十人季倫嘗屑沉木香塵末布象床上使所愛者踐之無跡則賜真珠百琲若有跡者即節其飲食令體輕故閨中相戲曰爾非細骨輕軀那得百琲真珠琲貫之名也又曰舜𦵏蒼梧之野有鳥如雀自丹州而來吐五色之氣如雲名曰憑宵鳥時來蒼梧之野銜青沙珠積成壟阜名曰珠邱今蒼梧之外採藥時得青石潔如珠服之不死帶者身輕又曰瀛洲有鳥如鳳身紺翼丹名藏珠每鳴翔而吐雜珠累斛仙人常以其餘飾仙裳輕而曜扵日月也西京雜記曰髙祖斬白蛇劔上有七采珠九華玊爲飾雜厠五色琉璃為匣劔在室光影猶照扵水也又曰漢諸陵寢皆以竹爲簾簾皆為水文龜龍之像昭陽殿織珠為簾風至則鳴如珂珮之聲列仙𫝊曰朱仲者會稽市販珠人也髙后時募三寸珠乃詣闕上之珠好過度賜五百金魯元公主私以七百金從申朱仲獻四寸珠送闕下既去景帝時復獻三寸珠數十枚去不知所之列女𫝊曰珠崖令卒官妻息送喪歸漢法内珠入關者死妻棄其係臂珠男年九歳好而取之置其母鏡奩中母不知也至闗吏搜索得珠問誰當坐者前妻子初曰初當坐之繼母請吏曰幸無劾兒誠不知也妾當坐初又曰夫人哀初之孤欲以活初耳因號泣傍人莫不酸鼻隕涕關吏執筆不能就一字乃曰母子有義如此吾寜坐之不忍加文又且相讓安知孰是乃棄珠而遣之神仙𫝊曰麻姑欲見蔡經母及經弟婦弟婦新産十數日麻姑望見之曰噫且止勿前即求少許米便以擲地視米墮地皆成珠方平笑曰姑故年少吾老矣不喜復作此變化也列仙𫝊曰鄭交甫將往楚道之漢臯臺下見二女佩兩珠大如荆雞卵交甫與之言曰欲子之佩二女解與之既行返顧二女不見佩亦失矣呉越春秋曰越王允常聘歐冶子造五劍秦客薛燭善相劍示之曰燭雖傾城量珠玊猶未可與也又曰伍貟奔呉至昭關關吏欲執之伍員曰上所索我者以我有明珠也今執我將言爾取之闗吏因舎焉邴原别𫝊曰原逺逰學詣安邱孫崧崧辭曰君鄉里鄭君知之乎原答曰然崧曰鄭君學覽古今學者之師模君乃舎之似不知也而曰然何原曰故有登山而採玉者有入海而採珠者不知山之髙海之深哉博物志曰鮫人從水出寓人家積日賣絹將去從主人索一器泣而成珠滿盤以與主人又曰五月五日取青蛉頭土中埋皆成青珠王朗雜事曰焦生乞恩辭生未有婦從烏桓贖李娥為妻與耳中金璫一雙珠四枚璫二雙珠三十雙合中真珠一升盧綝四王起事曰張方刼帝西遷國家有寳物詔張將軍載之扵是放軍人八千餘人三日輦之尚不缺角真珠百餘斛又曰惠帝遷長安時洛陽御府有大珠璫百餘斛衛玠别𫝊曰驃騎王武子君之舅也常與君同逰語人曰昨日與吾外甥並坐冏若明珠之在我側朗然來映人搜神記曰呉王夫差女名玊童子韓重有道術玊悦之結氣死𦵏扵昌門之外重至冡前哭祭女見形將重入冡臨去取徑寸珠以送重又曰隨侯行見大蛇傷救而治之其後蛇啣珠以報之徑盈寸純白而夜光可燭堂故歴世稱隨珠焉又曰噲叅養母至孝曽有𤣥鶴為戍人所射窮而歸叅収養療治瘡愈放之後鶴夜到門外叅秉燭視之鶴雌雄雙至各啣明月珠報焉又曰南海之外有鮫人水居如魚不廢緝績其人能泣珠幽明録曰洛下有洞穴婦欲殺夫推下經多時至底仍得一穴行數十里見人皆長三丈披羽衣如此九處最晚所至告饑長人指中庭柏樹下有一羊令跪捋羊鬚捋得三珠後得始令其噉之即得療饑復尋穴行出交州還洛問張華云九處地仙名九館大夫羊為癡龍初一珠食之天地等夀次者延年後者充饑而已又曰漢武帝幸河渚聞絃歌之音而有老公及年少數人出皆長八九寸為帝奏樂飲酒樂老公顧命取洞穴之寳一人受命下没川底得一大珠徑數寸明耀絶世上問東方朔朔曰河底有穴沉數百丈中有赤蜯生此珠也又曰王敦召吳猛猛至江口入水中命船人進舡至大雷見猛行水中從東北還逆船弟子問其故猛云水神數興波浪賊害行旅暫約勒以真珠一握為信三秦記曰始皇冢中以夜光珠為日月殿懸明月珠晝夜光明三輔夾録曰昆明池中有神池通白鹿原人釣魚綸絶而去夣扵漢武帝求去鈎帝明日戲扵池見大魚啣索帝曰豈夢所見耶取而放之後三日池邊得明珠一雙帝曰豈魚之報耶沈懷逺南越志曰珠有九品大五分以上至一寸八分分爲八品有光彩一邊小平似覆釡者名璫珠璫珠之次為走珠走珠之次為滑珠滑珠之次為磥砢珠磥砢珠之次為官兩珠官兩珠之次為税珠税珠之次為􅀢符珠孫柔之瑞應圖曰晉平公鼔琴有𤣥鶴自天而下啣明珠舞扵庭一鶴失珠覔得而走師曠掩口而笑廣志曰莫難珠其色黄生東夷又有明珠稱光大徑寸或圍二寸以上出黄支有至圓珠置平地終日不得停今上方名以甲乙為次第石珠鑄石為珠廣志曰夫餘地美珠如酸􅀥又曰班魚頭中有白石如璣珠出北海梁四公記曰震澤中洞庭山南有洞穴深百餘尺旁行五十餘里至龍宫杰公謂是東海龍王第七女掌龍王珠藏小龍千户衛䕶此珠龍畏蠟愛美玊及空青而嗜燒鷰使通信可得寳珠帝聞大喜乃詔有能使者厚賞之扵是羅子春兄弟三人應募帝敕百工以于闐舒河中美玊造小函二以桐木灰發其光求宣州空青汰取其精者用海魚膠調之成二凾火堅之龍腦香尋以繼之杰公曰以蠟塗子春等身及衣佩石乃燒鷰五百枚入洞穴至龍宫守門小蛟聞蠟氣俯伏不敢動乃以燒鷰五百賂之令其通以其上上者獻龍女龍女食之大喜又上玊凾青缶具陳帝㫖洞中有龍五千餘嵗能變化出入人間善譯時俗之言龍女知帝禮之以大珠三小珠七雜珠一石以報帝命春等乘龍載珠還國食頃之間使至龍去而子春薦珎帝大喜得聘通靈異獲天人之寳以珠示杰公公曰三珠者其一是天地如意珠之下者其二是驪龍珠之中者七珠二是蟲珠五是海蚌珠人間之上雜珠是蚌蛤蛇鶴等之珠不如大珠之貴帝示百寮朝廷咸謂杰公虛誕莫不詰之杰公曰如意珠之上者夜光照四十餘里中者十里下者一里光之所及無風雨雷電水火刀兵諸毒厲驪珠九色夜光百歩中者十歩下者一室光之所及無蛇蚖蟲豸之毒蟲珠七色多赤六足二目目當其陷處有臼如鐵蟻臯蚌珠五色皆有夜光及數尺無瑕者為上有瑕者為下蚌珠生扵其腹與月盈虧蛇珠所致隨侯噲叅即其是也又問蛇鶴之辨對曰使其自識帝命杰公記蛇鶴二斗珠餘雜珠散扵殿前取大黃蛇𤣥鶴各十數處布珠中間扵是鶴啣其珠鳴舞徘徊蛇啣其珠盤曲宛轉群公觀者莫不歎服帝復出如意龍蛇等珠校光之逺近七九之數皆如杰公之言盛𢎞之荆州記曰石藴玉以潤其塸漢含珠而清其域闞駰十二州志曰僧彊疊國在天竺南佛寺三千餘所今地有神珠非石玉晝夜扵國中光明扵日珠徑一尺五寸其色正碧南方草木狀曰凡採珠一旁小平形似覆釡第一珠母肉正白人民以薑虀食之常璩華陽土志曰廣陽縣山出青珠永昌郡博南縣有光珠宂出光珠珠有黄珠白珠青珠碧珠徐哀南方物狀曰凡採珠常三月用五牲祈禱若祠祭有失則風攪海水或有大魚在蚌左右自蚌珠長二寸半在漲海中其一寸三分其光色一旁小平形似覆釡為第一璫珠凡三品其一寸三分雖有光色形不圓正為第三滑珠凡三品萬震南州異物志曰合浦有民善逰採珠兒年十餘便教入水求珠官禁民採珠巧盗者蹲水底剖蚌得好珠吞之而出裴氏廣州記曰鯨鯤目即明月珠故死不見有目精林邑記曰黄被州上户口殷富多明珠雜寳語林曰王長史記林道人曰真長可謂金石滿堂林公以語孫興公興公曰語不得耳選擇正可得少碎珠耳又曰中朝有人詣王太尉適王安豐大將軍丞相在坐因往别屋見李寅平子還謂人曰今之行舉目皆琳琅珠玊又曰王夷甫處衆中如珠玉之在瓦石宋玊風賦曰垂珠歩揺來排臣户太平御覽卷八百三
