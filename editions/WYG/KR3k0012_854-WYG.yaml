body:
  text: 太平御覽卷八百五十四宋李昉等撰飲食部十二糟糠糟説文曰糟酒滓也糠糓皮也春秋後語曰張儀説韓恵王曰韓地多險惡山居五榖所生非菽而麥民之食大校菽飯藿羮一歳不収民不厭糟糠又曰秦急圍邯鄲邯鄲且欲降𫝊舍吏子李同説平原君曰今邯鄲之民析骨而炊易子而食可謂急矣而君之後宫以百數婢妾被綺縠餘梁肉而民弊衣不完糟糠不厭君器物鐘鼓自若使秦破趙安得而有此哉後漢書曰明帝姉湖陽公主新寡帝與共論朝臣微觀其意主曰宋𢎞威容徳器羣臣莫及帝曰方且圖之後𢎞被引見帝令主坐屏風後因謂𢎞曰常言富易交貴易妻人情乎𢎞曰臣聞貧賤之交不可忘糟糠之妻不下堂帝顧謂主曰事不諧矣華嶠後漢書曰樂崧家貧為郎無被食糟自此詔給太官食魏志曰李通禽黄巾大師呉覇而降其屬遭歳大荒飢通傾家振能與士分糟糠皆爭為用由是盗不敢犯六韜太公曰古之亂君夏桀殷紂積糟為丘以酒為池飲者常三千人糠爾雅曰糠謂之蠱廣志曰糠謂之䅥通俗文曰碎糠曰䊳史記曰呉中大夫應髙説膠西王母曰䑛糠及米漢魏春秋曰甄后之誅由郭后之寵及殯令以糠塞口後明帝逼殺郭后使殯如甄后晉書曰王戎子萬有美名而太肥戎令食糠而肥愈甚又曰孫綽性通率好譏調嘗與習鑿齒同行綽在前顧謂鑿齒曰沙之汰之頑石在後鑿齒曰簸之颺之糠粃在前齊書曰頋歡所居鄉中有學舍歡貧無以受業於舍壁後倚聽無遺忘者夕則燃松節讀書或燃糠自照墨子曰備城皆收蔵灰糠馬矢又曰人衣短褐食糠糟韓子曰糟糠不厭者不待粱肉而飽裋褐不完者不須文繡而好􅅗夫論曰不命大將以討叛𦍑州郡興兵若排糠障風淘沙壅河抱朴子曰上世元水結而不寒肴糠絶而不飽劉欣期交州記曰合浦海口有糠頭山𫝊云越王舂米於此積糠而成太平御覽卷八百五十四
  hash: sha256:fcfcfe762b08e8529214cd7a78b76ff75949bab2fab7e30a545e9c44af782c55
