body:
  text: 太平御覽卷十六宋李昉等撰時序部一律厯律吕氏春秋曰黄帝命伶倫作為律伶倫自大夏之西乃之阮隃之隂山取竹於嶰谷以生空竅厚均者斷両節間長三寸九分而吹之以為十二筩聼鳳鳴以别十二律其雄鳴為六雌鳴亦六故曰黄鍾之宫律之本也鳯有雌雄故律有隂陽書曰肆覲東后恊時月正日同律度量衡又帝曰䕫命汝典樂教胄子直而温寛而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲聲謂五聲宫商角徴羽律謂六律六吕十二月之氣言當依聲八音克諧無相奪倫神人以和倫理也八音能諧理不錯奪則神人咸和命䕫使勉之又予欲聞六律五聲八音在治忽以出納五言汝聽孔氏曰言欲以六律和聲音察天下治理及忽怠者又以出納仁義禮智信五徳之言汝當聽審之也禮曰孟春之月律中太蔟蔟湊也言萬物始大而湊也周禮曰大司樂以六律六吕五聲八音六舞六代舞大合樂致鬼神又注曰律吕相生者上生者三分益一下生者三分減一黄鍾律長九寸下生林鍾六十律也左傳曰六律七音八風九歌以相成也清濁大小長短疾徐哀樂遲速髙下出入周流以相濟也君子聽之以平其心爾雅曰律謂之分郭璞注曰律管可以分氣者也易是類謀曰聖人興起不知姓名當吹律聽聲以别其姓律者六律也春秋元命苞曰律之為言率也所以率氣令達也率猶導也春秋孔演圗曰孔子曰丘援律吹命隂得羽之宫孝經援神契曰聖王吹律有姓漢書張蒼傳曰張蒼自秦時為柱下御史明習天下圗書計籍又善用算律厯故令蒼以列侯居相府領主郡國上計又張蒼代灌嬰為丞相漢興二十餘年天下定公卿皆軍吏蒼為計吏時正緒律厯故漢家言律厯者法張蒼蒼好書無所不通而尤䆳音律䆳深也又京房傳曰房字君明東郡頓丘人好鍾律知音聲房本姓李推律自定為京氏又律厯志曰五音生於隂陽分為十二律轉生六十律皆所以紀斗氣效物類也天效以景地效以響即律也隂陽和則景至以律氣應則灰除是故天子常以日冬夏至御前殿合八能之士陳八音聽樂均度晷影候鍾律權土炭校隂陽冬至陽氣應樂均清影長極黄鍾通土炭輕而衡仰夏至隂氣應樂均濁影短極蕤賔通土炭重而衡低進退於先後五日之中八能各以候狀聞太史令封上效則和否則占候氣之法為室三重户閉塗釁必周宻布緹縵室中以木為案每律各一内卑外髙從其方位加律其上以葭莩灰抑其内端案厯而候之氣至者灰去其為氣所動者灰散風所動者其灰聚殿中候用玉律十二唯二至乃候靈臺用竹律六十又凡律度量衡用銅銅為物之精不為燥濕寒暑變其節不為風雨曝露改其形介然常似於君子之形是以用銅也用竹為引者事之宜也又至治之世天地之氣合以生風天地之風氣定十二律王隱晋書曰荀朂以魏杜䕫所制律吕校定大樂總章鼓吹八音與律吕乖錯始知後漢至魏度漸長於古四分餘而䕫依為律吕故致不韻不和部著作郎劉恭依周禮制尺所謂古尺也依古尺作新律吕以調聲韻以律量黍以尺度古噐皆與本銘尺寸無差失故家得古玉律鍾聲亦與新律闇合遂班下太常使大樂緫章鼓吹清商施用朂遂典知樂事晋諸公讃曰世祖時以荀朂所造律頒示朝臣散騎侍郎阮咸倡議謂朂所造聲髙必由古今尺有長短所致然朂亦黙案經典笇下而制之又求古噐得周時玉律比校正同荀朂奏曰中所出御府銅竹律二十五具部太樂郎劉秀等校試其三具與杜䕫左延年法同其二十二具視其銘題尺寸是笛律也同恊律中郎將列和云昔魏明帝時令和丞受一笛聲以作此律欲使學者别居一坊歌詠講習依此律調至於都合樂時但識其尺寸之名則絲竹歌詠皆得均合歌聲濁者用長笛長律歌聲清者用短笛短律凡弦歌調張清濁之制不依笛尺寸名之則不可知也趙書曰劉曜築建徳殿取土城西南郭内得圎石狀若水碓其銘曰律權石重四鈞同律度量衡有莘氏造議者未之詳或以為瑞叅軍事續咸曰莽時物東方朔十洲記曰武帝時有西胡月氐國遣使曰臣國去此三十萬里國有常占若東風入律百旬不休青雲干吕連月不散者閻浮國將有好道之君矣孟子師曠之聰不以六律不能正五音淮南子曰䕫合六律調五音通八風又天文曰帝張四維帝天帝也運之以斗運提月徙一辰復反其所正月指寅十一月指子一嵗而匝終而復始寅則萬物螾螾也螾蟲也律受太蔟太蔟者湊而未出也太蔟正月律指邜邜則茂茂然律受夾鍾夾鍾者始夾也夾鍾二月律指辰辰則振振之也律受姑洗姑洗者陳去而新來也姑洗三月律指己巳則生巳定也律受中吕中吕者中充大也中吕四月律指午午者忤也律受􅅋賔􅅋賔者安而服也􅅋賔五月律指未未者味也律受林鍾林鍾者引而正之也林鍾六月律指申申者伸也律受夷則夷則者易其則也徳去矣夷則七月律也徳已去生氣盡也指酉酉者飽也律受南吕南吕者任苞大也南吕八月律指戌戌者滅也律受無射無射者入之無厭也無射九月律指亥亥者閡也律受應鍾應鍾者應其鍾也應鍾十月律指子子者兹也律受黄鍾黄鍾者已鍾也黄鍾十一月律指丑丑者紐也律受大吕大吕者旅旅而去也大吕十二月律又一律而生五音十二律而為六十音因而六之六六三十六故三百六十音以當一嵗之日故律厯之數天地之道國語曰王將鑄無射王景王也問律於伶州鳩律鍾律也對曰律所以立均出度也律謂六律六吕也均鐘木長七尺有弦繫之以均鐘者度鐘大小清濁也漢太予樂官有之也紀之以三三天地人也平之以六六六律也成于十二十二律吕也天之道也天之大數不過十二夫六中之色也故名之曰黄鍾六者天地之中天有六氣降生五味天有六母地有五子十一而天地畢矣而六為中故六律六吕而成天道也所以宣養六氣九徳也宣徧也六氣隂陽風雨晦明也九徳九功之徳水火金木土榖正徳利用厚生也由是第之由從也第次也次其月也二曰太蔟所以金奏賛陽出治也三曰姑洗所以修潔百物考神納賔也四曰蕤賔所以安靖神人獻酬交酢也五曰夷則所以詠歌九則平民無貳也六曰無射所以宣布哲人之令徳示民規儀也為之六間以揚沉伏而黜散越也六間六吕在陽律之間沉滯也黜出也越揚也吕隂律所以間陽律成其功發揚滯伏之氣而去越散者也元間大吕助宣物也二間夾鍾出四隙之細也四時之間氣微細者三間中吕宣中氣也四間林鍾和展百事俾莫不任肅純恪也五間南吕賛陽秀也六間應鍾均利器用俾應復也律吕不易無姦物也蔡邕月令曰律率也聲之管也中應也太蔟鍾名上古本隂陽别風聲清濁别風聲不可以文載口傳也故鑄金作鍾以正十二月之聲然後以效升䧏之氣而鍾不可用乃截竹為管曰律為清濁之率也以律長短為制正月律與太蔟相中也言皆出於黄鍾之律乃置深室葭莩為灰以實其端其月氣既至則灰飛管通古以鍾律齊其聲後人不能則數以正其度度正則音亦正仲春中夾鍾管長七寸四分夾孚甲也言孚甲類分也季春中姑洗管長七寸一分強姑故也洗鮮也言萬物去故就新莫不鮮明也孟夏中中吕管長六寸二分陽氣將極故復中難之也仲夏中蕤賔管長六寸三分小分二强蕤下也賔敬也陽氣上極隂氣始賔敬之季夏中林鍾管長六寸九分林衆也萬物成熟種類衆多孟秋中夷則管長五寸六分夷傷也則法也萬物始被刑法也中秋中南吕管長五寸三分小分三强南任也言陽氣尚有任也季秋中無射管長四寸八分小分三强射終也言萬物随陽終也孟冬中應鍾管長四寸八分鍾動也言萬物應陽而動下藏也中冬中黄鍾管長九寸鍾動也言陽氣于黄泉下動季冬中大吕管長八寸吕距也言陽氣欲出隂不許也京氏律術曰律難以度調故作准以代之准之狀如瑟長丈而十三弦隱間九尺中共一弦下畫分寸均中其弦使應黄鍾之聲苐按分寸以求諸律則皆如畫而應矣然自上古有鍾其次有律近古有准皆稍簡易之意其相生也黄鍾下生林鍾林鍾上生太蔟太蔟下生南吕南吕土生姑洗姑洗下生應鍾應鍾上生􅅋賔􅅋賔下生大吕大吕下生夷則夷則上生夾鍾夾鍾下生無射無射上生中吕中吕上生黄鍾上下相生終六十執始以下四十八律文多不載孟春之月則太蔟為宫姑洗為商􅅋賔為角南吕為徵應鍾為羽大吕為變宫夷則為變徵他月倣此也六韜曰武王問太公曰辨律之音聲何以知三軍之消息勝負之决乎公曰深哉王之問也夫律管十二其音以五宫商角徴羽此其正聲也萬代不易五行之神道之常也金木水火土可以其勝攻之其法以天清凈無隂雲風雨夜遣輕騎往至敵人之壘去九百步外徧持律管當耳大呼驚之有聲應管其來甚微角聲應管當以白虎徴聲應管當以𤣥武商聲應管當以朱雀羽聲應管當以勾陳五管聲皆不應者宫也當以青龍此五行之符佐勝之徴咸則之也白虎通曰十一月律謂之黄鍾何黄中和之色鍾者動也言陽于黄泉之下動養萬物也十二月律謂之大吕何大者太也吕者距也言陽氣欲出隂不許也正月律謂之太蔟何太者大也蔟者湊也言萬物始大湊地而出也二月律謂之夾鐘何夾孚甲也言萬物孚甲種類分三月律謂之姑洗何姑者故也洗者鮮也言萬物去故就新莫不鮮明也四月律謂之中吕何言陽氣將極故復中難之也五月律謂之􅅋賔何􅅋者下也賔者敬也言陽氣上極隂氣始起故賔敬之六月律謂之林鍾何林者衆也萬物成熟其類衆多也七月律謂之夷則何夷傷也則法也言萬物始傷被刑法也八月律謂之南吕何南任也言陽氣尚有任也九月律謂之無射何射終也言萬物隨陽而終也當復隨隂起無有終也十月律謂之應鍾何鍾者動也言萬物應陽而動下藏也蔡邕月令章句曰鍾以觔両尺寸中所容受升之數為法律亦以寸分大小長短為法故也黄鍾之管長九寸孔徑三分圍九分其餘皆稍短為大小圍數無增减以度量者可以文載口傳與衆共知然不如耳决之明也周官曰太師掌六律六吕文以五聲播以五敎以六詩六徳為之本以六律為之音也劉向别録曰鄒子在燕燕國有谷地美而寒不生五榖鄒子居之吹律而温氣至今名黍谷論衡曰孔子吹律自知殷之苗裔楊泉物理論曰聽清濁五音之和然後制為鍾律取𢎞農宜陽縣金門山竹為管夏侯𤣥辨樂論曰阮生云律吕協則隂陽和音聲適則萬物類天下無樂而欲隂陽和調灾害不生亦已難矣此言律吕音聲非徒化治人物乃可以調和隂陽蕩除災害也夫天地定位剛柔相摩盈虛有時堯遭九年之水憂民阻飢湯遭七年之旱欲遷其社豈律吕不和音聲不通哉此乃天然之數非人道所協也揚雄太𤣥經曰調律者度竹為管蘆莩為灰列之九則之中漠然無動寂然無聲㣲風不起纎塵不形冬至半夜黄鍾以應矣厯世本曰容成作厯容成黄帝之臣易曰君子以治厯明時書曰乃命羲和欽若昊天厯象日月星辰敬授人時又天之厯數在汝躬又協用五紀又五曰厯數易乾鑿度曰堯以甲子天元為推術注云甲子為蔀首起十一月朔又厯原名握先紀曰甲子握先為厯始之名始言無前者也七十六嵗為一紀而一蔀首易是類謀曰師曠觸耀而出厯推首算以知將來觸耀而出謂師曠得聖人之一體故觸耀而生其人能厯數樞機之事又能推五音知將來之事漢書律厯志曰厯數之起上矣傳述顓頊命南正重司天火正黎司地其後三苗亂徳二官咸廢而閏餘乖次孟陬殄滅攝提失方攝提星名随斗杓所指建十二月若厯悮春三月當指辰乃指已是為失方也堯復育重黎之後使纂其業後以授舜舜亦以命禹至周武王訪箕子言大法九章而五紀明厯法併嵗月日星辰為五紀也五覇之末史官䘮紀疇人子弟分散李竒曰同類之人俱明厯者也如淳曰家業世世相傳為疇或在夷狄故其所記有黄帝顓頊夏殷周及魯厯戰國擾攘秦兼天下未遑暇也亦頗推五勝五行相勝秦以周為火用水勝之也而自以為獲水徳乃以十月為正色尚黑漢興方紀綱大基庶事草創襲秦正朔以北平侯張蒼言用顓頊厯比於六厯踈濶中最為㣲近然正朔服色未睹其真而朔晦月見弦望滿虧多非是至武帝元封七年漢興百二嵗矣大中大夫公孫卿壺遂太史令司馬遷等言厯紀壊廢宜改正朔遂詔卿遂遷與侍郎尊大典星射姓等師古曰姓射名姓也議造漢厯廼定東西立晷儀下漏刻以追二十八宿相距于四方舉終以定朔晦分至躔離弦望應劭曰躔徑也離逺也瓚曰離厯也日月之所厯也姓等奏不能為算願募治厯者更造宻度各自增减以造漢太初厯乃選治厯鄧平及長樂司馬可酒泉候宜君侍郎尊與民間治厯者凡二十餘人方士唐都巴郡洛下閎與焉晋灼曰史記厯書云唐都分天部而巴郡洛下閎運算推厯也都分天部謂分二十八宿為躔度也而閎運算轉厯罷廢尤踈者淳于陵渠復覆太初厯晦朔弦望皆最宻日月如合璧五星如連珠謂太初上元甲子夜半朔立冬至時七曜皆㑹聚斗牽牛中如合璧連珠也陵渠奏狀遂用鄧平厯以平為太史丞後二十七年元鳯三年大史令張夀王上書言厯者天地之大紀上帝所為傳黄帝調律厯漢元年以來用之今隂陽不調宜更厯之過也詔下主厯使者鮮于妄人請與治厯大司農中丞麻光等二十餘人雜候月日晦朔弦望八莭二十四氣鈞校諸厯用狀奏可詔與丞相御史大將軍右將軍史各一人雜候上林清臺諸厯踈宻凡十一家以元鳯三年十一月朔旦冬至盡五年十二月各有第夀王課踈逺按漢元年不用黄帝調厯夀王非漢厯逆天道非所宜言大不敬有詔勿劾復候盡六年太初厯第一即墨徐萬且長安徐禹治太初厯亦第一夀王及待詔李信治黄帝調厯課皆踈濶壽王厯廼太史官殷厯也至孝成世劉向總六厯列是非作五紀論向子歆究其㣲𦕈作三統厯及譜又路温舒從祖父受厯數天文以為漢厄三七之間張字曰三七二百一十嵗也自漢初至哀帝元年二百一十年也至平帝崩二百一十一嵗也上封事以豫戒成帝時谷永亦言如此又王莽傳曰莽見盗賊多乃令太史推三萬六千嵗厯紀布天下書曰紫閣圗曰太一黄帝皆仙而上天張樂崑崙處山之上後世聖主得瑞者當張樂秦終南山上長安南山詩所謂終南以故秦地故言秦予之不敏奉行未明乃今諭矣又孝武紀曰夏五月正厯以正月為嵗首鄭𤣥曰先是以十月為嵗首色上黄數用五張晏曰漢據土徳土數五定官名恊音律又厯譜有序四時之位正分至之節以㑹日月五星之辰以考寒暑殺生之實故聖王必正厯以深知五星日月之㑹凶阨之患其術皆出焉此聖人知命之術也續漢律厯志曰自太初元年始用三統厯施行百餘年厯稍後天朔先于厯朔或在晦月或朔見建武八年中太僕朱浮大中大夫許叔等數上書言朔厯不正宜當改更時分度覺差尚㣲上以天下初定未遑考正至永平五年官厯署七月十六日月蝕待詔楊岑見時月蝕多先厯即縮用算因上言月當十五日蝕官厯不中詔書令岑普候與官厯課起七月盡十一月弦望凡五官厯皆失岑皆中庚寅詔書令岑署弦望月蝕官復令待詔張盛景防鮑業等六四分法與岑課嵗餘盛等所中多岑六事又曰黄帝造厯元起辛邜而顓頊用乙邜虞用戊午夏用丙寅殷用甲寅周用丁巳魯用庚子漢初用乙邜至武帝中元以丁丑王莽之際劉歆作三綂追太初前世一元得五星㑹庚戌之嵗以為上元太初厯到章帝元和旋復踈濶徵能術者課劾諸厯定朔稽元追漢四十五年庚辰之嵗退朔一日乃與天合以為四分厯又曰昔者聖人之作厯觀璿璣之運三光之行道之發歛影之長短斗綱所建青龍所纒參伍以變錯綜其數而制術焉日月相推日舒月速當其同所謂之和合舒速先後近一逺三謂之弦相與為衡分天下之中謂之望以逺及速光盡體伏謂之晦晦朔合離斗建移辰謂之朔魏畧曰太史上言漢厯不及天時因更推步弦望朔晦為太和厯帝以髙堂隆學問優深于天文又精乃詔使隆與尚書郎楊偉太史待詔駱禄參共推校更相劾嵗餘禄得日蝕而月晦不盡隆不得日蝕而晦盡詔從太史隆所推不得而逺近猶知其精㣲又曰景初元年山茌縣上言有黄龍見有司奏以為魏得地宜以建子月為正乃定厯年改大和厯為景初厯呉志曰孫權黄武二年改四分厯用乾象厯王隠晋書曰張載弟前烏程令元依蔡邕注明堂月令中台要綴諸説厯數而為厯讃秘書監茍菘見讃異之謂可該羅厯義唐書曰王勃聰警絶衆於推步厯笇尤精嘗作大唐千嵗厯言唐徳靈長千年合承周漢運厯不合承周隋短祚其論大㫖云以土王者五十代而一千年金王者四十九代而九百年水王者二十代而六百年木王者三十代而八百年火王者二十代而七百年此天地之長期符厯之大數也自黄帝至漢并是五運貞主五行之匝土運復歸唐徳承之宜矣魏晋至于周隋咸非正統五行之沴氣也故不可承之大率如此洪範五行傳曰聖人所以揆天行而紀萬國也孔子作春秋正春正秋所以重厯也五家之厯多踈闊惟顓頊厯為㣲近故張蒼用顓頊厯元封中立太初厯測弦望皆最宻益都耆舊傳曰巴郡洛下閎漢武帝時改顓頊厯更作太初厯曰後八百嵗此厯差一日當有聖人定之風土記曰自黄帝顓頊下逮三王治厯十有一家考課損益各有變衰非運之錯考察異意故也尸子曰造厯者羲和之子也楊泉物理論曰疇昔神農始治農功正節氣審寒温以為早晚之期故立厯日董巴議曰武王作周厯周公作魯厯蔡邕議曰邕以為厯數精㣲去聖人乆逺得失更迭術無常是漢承秦正厯用顓頊元用乙邜百有二嵗孝武皇帝始改正朔厯用太初元用乙丑行之百八十九嵗孝章皇帝用清河李梵之言改從四分元用庚辰今馮先陳晃各以庚申為非甲寅為是按厯法黄帝顓頊夏殷周魯凡六甲家各自有元先晃所據則殷厯元也他元雖不明圖䜟各自一家之術皆當有效於當時昔太初始用丁丑之後六家紛錯争議是非太史令張夀王挾甲寅元以非漢厯雜候清臺課在下第卒以踈濶連見劾奏太初效驗無所漏失是則非圖䜟之元而有效于前者也及用四分以來考之行度宻于太初是知新元有效于今者也延光元年中謁者亶誦亦非四分庚申上言當用命厯序甲寅元公卿百寮叅議正處竟不施行且三光之行遲速進退不必若一術家以笇追而求之取合于當時而已故有古今之異而今術不能上通于古猶古術不能下通于今也由此言之有文于䜟無驗于今未必為是有驗于今無文于䜟未必為非太平御覽卷十六
