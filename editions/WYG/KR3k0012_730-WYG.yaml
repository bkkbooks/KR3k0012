body:
  text: 太平御覽卷七百三十宋李昉等撰方術部十一相中宋書髙帝紀曰晉陵人韋叟善相術桓脩令相帝當得州不叟曰當得邊州刺史退而私於帝曰君相貴不可言帝笑曰若相中當用為司馬至是叟謂帝曰成王不負桐葉之信公亦應不忘司馬之言然不敢希鎮軍司馬願得領軍佐於是用焉又曰初桓𤣥篡位遷晉帝於潯陽桓修入朝髙祖從至建業𤣥見髙祖謂司徒王謐曰昨見劉裕其風骨不恒盖人傑也每遊集得贈甚厚𤣥妻劉氏尚書令躭之女也聰明有智鑒嘗見帝因謂𤣥曰劉裕龍行虎步瞻覽不凡恐不為人下宜早為之所𤣥曰我方平蕩中原非裕莫可待闗隴平定後議之又曰栁元景少時貧苦嘗至下都值大雨雷日暮寒甚頗有羈旅之歎岸側有一老父自稱善相謂元景曰方大富貴位至三公元景曰不貧幸甚豈望富貴老父曰後當相憶及貴求之不知所在又曰明帝大㑹新亭接㑹諸軍王樗蒲官賭李安人五擲皆盧帝大驚謂安人曰卿面方如田封侯相也安人少時貧有一人從門過相之曰君後當富貴與天子交手共戲至是安人尋此人不知所在孫嚴宋書曰沈攸之字仲達少孤貧與吳郡孫超之王景文共乘小船出京都三人共上引埭有一人止之而相曰君三人皆當至方伯攸之曰豈有三人俱貴相者曰骨法如此若不驗便是相書誤耳後攸之為荆郢二州超之廣州景文南豫州又曰徐羡之年少時嘗有一人來謂曰我是汝祖羡之拜此人曰汝有貴相而有大厄宜以錢二十八文埋宅四角可以免災過此可位極人臣後羡之隨親之縣内嘗暮出而賊自後破縣縣内人無免者鷄犬亦盡唯羡之在外獲全齊書曰太祖初為建康令有能名少府蕭惠閑雅有知人鑒謂人曰昔魏武為洛陽北陪人服其英今看蕭建康但當過之耳又曰張欣泰少時有人相當得三公而年纔三十後屋瓦墜傷額又問相者云無復公相年壽可更增亦可得方伯之任耳後為刺史年三十卒又曰曹武雖武士頗有知人之鑒性儉嗇無所餉遺獨餉梁武謂曰卿必大貴我當不及見今以弱子相託每密遺錢物并好馬時帝在戎多乏就武換借未嘗不得遂至十七萬又曰明帝體上有志赤常秘不言既而江祐勸帝出以示人晉壽陽太守王洪軌曰公日月在軀上曰皆謂此是日月相卿幸無泄軌曰公日月在軀如何可隱輒當言之公卿上大悅梁書曰梁武帝初為衛將軍王儉東閣祭酒儉一見深相器異請為户曹屬謂廬江何憲曰此蕭郎三十内當作侍中出此則貴不可言又曰梁武帝遷隋王鎮西諮議參軍行經牛渚逢風入泊龍瀆有一老人謂帝曰君龍行虎步相不可言今天下將亂安之者其在君乎問其名氏忽然不見又曰梁武帝初為司州刺史有沙門自稱僧禪謂帝曰君頂有伏龍非人臣也復求莫知所之又曰武帝起兵時吕僧珍一夜忽頭痛壯熱及明而顙骨益大其骨法盖有異焉又嘗語親舊曰吾昔在蒙縣熱病發黄時必謂不濟主上見曰卿有富貴相必當不死俄而果愈又僧珍童兒時從學有相工􅔦觀諸生指僧珍曰此有竒聲封侯相也後隨武帝起義平東昏封平固侯南兖州刺史後魏書曰李訢字元盛訢母賤為諸兄所輕父崇曰此子相者言貴吾每觀察或未可知遂使入都為中書學生世祖幸中書學見而異之謂從者曰此小兒終效用於朕之子孫矣日識盻之世祖舅陽平王杜超有女將許貴戚世祖聞之謂超曰李訢後必官達益人門户可以女妻之遂勸成婚南人李哲嘗言訢必顯貴杜超之死也世祖親哭三日訢以超婿得在喪位出入帝目而指之謂左右觀此人舉動豈不有異於衆必為朕家幹事之臣又曰冦讚字奉國上谷人嘗從相者唐文相曰君額上黒子入幘位當方伯封公及為上谷太守又以百姓禮拜謁文曰明公憶疇昔言乎爾日但知公當貴不知得為州人讚曰往時卿言杜瓊不得官人咸謂不然後瓊得􅉦厔令卿猶言相中不見而瓊未拜果暴終昔魏舒見主人兒死自知己必至三公吾恒以卿言瓊之驗亦復不息此望也又曰盧淵出鎮闗右詔兼侍中初淵年十四嘗詣長安將還餞送者五十餘人别於渭北有相者扶風人王伯達曰諸君不皆如此盧郎雖位不副實然得聲甚盛望踰公輔後二十餘年當制命闗右願不相忘此行也相者年過八十詣軍門請見言平生南史曰梁元帝初從劉景授相術因訊以年荅曰未至五十當有小厄攘之可免帝曰苟有期㑹禳之何益及四十七為魏所㓕崔鴻十六國春秋後趙録曰石勒東至平原賣與東平人師懽為奴有一老父謂勒曰君龍角髮際上四道已成當貴為人主甲戌之歲王彭祖可圖勒曰若如公言不敢背德忽然不見又曰張秀字伯文羌梁部人也頗曉相法常謂石虎曰明公之相非人臣之骨虎掩其口曰莫妄言族吾父子又南燕録曰慕容德年十八身長八尺二寸姿貌雄異額上有日月兩角足下有偃月重文太史公黄泓善相謂德曰殿下相法當先為人臣然後為人君但恐下官入地不見殿下昇天耳德拜范陽王建元年即帝位又前凉録曰汎瑗與同郡陳琠宗配遇相者於路相者曰三人皆二千石封然汎瑗腹有逆毛當兵死無後北齊書曰房豹遷侍御史王思敬入據穎州隨慕容紹宗出討乃為紹宗開府主簿兼行臺郎中紹宗自云有水厄遂於戰檻中浴并自投於水中兾以厭當之豹謂紹宗曰夫命也在天豈人理所能延公若實有災厄非禳避所免若其實無何禳之有今三軍之事在於明公唯應達命任理以保之言未幾而紹宗果溺死又曰暴顯㓜時見一沙門指之曰此郎有好相長大必為良將貴極人臣語終失僧莫知所在後累遷特進驃騎大將軍又曰尉瑾為聘梁使梁人陳昭善相謂瑾曰二十年後當為宰相瑾出昭謂人曰此公為宰相後不過三年當死昭後為陳後主兼散騎常侍至齊瑾時兼右僕射鳴騶鐃吹復謂人曰二年當死果如言焉又曰盧潛陷陳時李騊駼將逃歸并要潛潛曰我此頭面何可誑人吾少時相者云没在吳越死生已定弟其行也因寄書與弟士􅃉曰吾夢汝以某月得患某月某日漸損皆如其言既而歎曰壽陽陷吾以頸血湔城而死佛教不聽自殺故荏苒偷生今可死矣於是閉氣而絶其家購屍歸塟又曰遼西叚長太原龎蒼鷹俱有先知之識叚長為魏懷朔鎮將見髙祖甚異之謂髙祖云君有康世之才終不徒然也請以子孫為托興和中追贈司空擢子寧相府從事中郎天禄初兼南中郎將倉鷹交遊豪俠厚待賔旅居於州城髙祖客其舍初居處於蝸牛廬中蒼鷹數見廬上赤氣屬天蒼鷹亦知髙祖有霸王之相每私加敬割其宅半以奉髙祖由此遂蒙親識三國典畧曰髙澄嗣渤海王朝於鄴時有吳士目盲而妙於聲相王使試之聞劉桃枝之聲曰有所繫屬然當大富貴王侯將相多死於其手譬如鷹犬為人所使聞趙道德之聲曰亦繫屬人聞太原公之聲曰當為人主聞王之聲崔暹私搯之乃謬言亦國主也王曰我家羣奴猶當極貴况吾身也又曰齊文宣字子進神武第二子也婁太后初孕文宣每夜有赤光照室既生數月后乃與親姻相對共憂寒餒文宣忽應曰得活故名侯尼于鮮卑言有相子也及長黑色大頬兌下鱗身重踝瞻視審定不好戲弄深沉有大度晉陽有沙門乍愚乍智時人不測呼為阿秃師婁后見其諸子厯問禄位至文宣再三舉手指天而已口無所言見者異之又曰梁宣豐侯脩參軍陳冕善相人脩因法㑹將冕自隨令相簡文有天下否冕言簡文九州骨成必踐帝位而地部過苦非但王畿蹙侵兼恐不善終又曰東魏御史賈子儒善相太常卿崔暹私引子儒潛視齊王儒曰人有七尺之形不如一尺之面一尺之面不如一寸之眼大將軍臉薄顧速非帝王相也皇甫玉又竊觀王於道曰此不作物㑹是垂洟者垂洟者謂太原公洋又曰齊髙歸彦嘗令皇甫玊相貌玉曰公位極人臣但莫反歸彦曰我為何須反王曰公有反骨又曰周王軌以隨公楊堅相表殊異因入侍讌陽醉撥去堅㡌言曰是何物頭額帝圍之雖大而却無所主也皇甫后見堅舉手自拍其額帝謂堅曰皇后道公額也帝乃密使來和相堅和詭對曰堅相貎是守節忠臣宜作摠管大將作摠則能靜肅一方作大將則能全軍破敵陳書曰長沙王叔堅母本吳中酒家婢相者言當生貴子宣帝微時因飲通焉生叔堅及即位召拜淑儀又曰章昭達字伯通少時遇相者謂曰卿容貎甚善須少虧則當富貴梁大同中昭達為東宫直後因醉墮馬鬚髯稍損昭達喜之相者曰未也侯景之亂昭達率鄉人援臺城為流矢所中𦕈其目相者見曰卿相善矣不久當富貴後還鄉里與陳文帝遊因結君臣之分以功進位司空後周書曰太祖身長八尺方顙廣額美鬚髯長至委地垂手過膝目有黑子宛轉若龍盤之形面有紫光人望而敬畏之又曰孝閔帝覺太宗第三子九歲封略陽郡公時有善相者史元華見帝退謂所親曰此公子有至貴之相但恨其壽不足以稱之耳隋書曰髙祖生於馮翊般若寺紫氣充庭有尼來自河東謂皇妣曰此兒所從來甚異不可俗間處之尼將髙祖舍於别館躬自撫養皇妣嘗抱髙祖忽見頭上角出遍體鱗起皇妣大駭墜髙祖於地尼自外入見曰已驚我兒致令晚得天下為人龍顔額上有五柱入頂目光外射有文在手曰王長上短下沉深嚴重又曰髙祖在周明帝即位授右小宫伯進封大興郡公帝嘗遣善相者趙昭視之昭詭對曰不過作柱國耳既而陰謂髙祖曰公當為天下君必大誅殺而後定善記鄙言也又曰韋鼎仕梁為太府卿初鼎之聘周也嘗與髙祖相遇鼎謂髙祖曰觀公容貎故非常人而神監深逺亦非羣賢所逮也不久必大貴貴則天下一家嵗一周天老夫當委質願深自愛及陳平上馳召之授上儀同三司待遇甚厚又曰龎晃知髙祖非常人深自結納及髙祖去官歸京師晃迎見髙祖于襄邑髙祖甚歡晃因白髙祖曰公相貎非常名在圖籙九五之日希願不忘髙祖笑曰何妄言也頃之有一雄雉鳴庭髙祖命晃射之曰中則有賞至富貴之日持以為驗晃既射而中髙祖撫掌大笑曰此是天意公能感之而中也又曰來和好相術髙祖微時來詣和相和待人去私謂髙祖曰公當王有四海及為丞相拜儀同既受禪進爵為子開皇末和上表自陳曰臣早奉龍顔自周代天和三年以來數蒙陛下顧問當時具言至尊膺圖受命奄宅區宇此乃天授非由人事所及臣無勞効坐致五品二十餘年臣是何人敢不慚愧愚臣不任區區之至謹録龍潛之時臣有所言一得書之秘府死無所恨昔陛下在周嘗與永富公竇容定語臣曰我聞有行聲即知其人臣當時即言公眼如曙星無所不照當王有天下願忍誅殺建德四年五月周武帝在雲陽宫謂臣曰諸公皆汝所識隋公相禄何如臣報武帝曰隋公止是守節人可鎮一方若為將領鎮無不破臣即於宫東南奏聞陛下謂臣此語不忘明年烏丸軌言於武帝曰隋公非人臣帝尋以問臣臣知帝有疑臣詭說曰是節臣更無異相于時王誼梁彦光等知臣此語大象二年五月至尊從永巷東門入臣在永巷門東北面立問臣曰我得無灾障不臣奏陛下曰骨法氣色相應天命已有付屬未幾遂總百揆上覽之大悅進位開府賜物五百叚米三百石地十頃又曰煬帝在藩時好學善屬文沉深嚴重朝野屬望髙祖密令善相者來和遍視諸子和曰晉王眉上雙骨隆起貴不可言又曰宇文述年十一時有相者謂述曰公子善自愛後當位極人臣周武帝時以父軍功起家拜開府又曰李景遼東之役為馬軍摠管及還事漢王髙祖竒其壯武使􅃝而觀之曰卿相表當位極人臣又曰帝嘗謂趙綽曰朕於卿無所惜但卿骨相不當貴耳仁壽中卒又曰文帝時蘭陵公主寡上為之求夫選親衞柳述及蕭瑒等以示韋鼎鼎曰瑒當封侯而無貴妻之相述亦通顯而守位不終上曰位由我耳遂以主降述又曰來和善相術同郡韓則嘗詣和相謂之曰後四五當大官人初不知所謂則至開皇十五年五月而終人問其故和曰十五年為三五加以五月為四五大官槨也和言多此類著相經四十卷北史曰李賢㓜有志節不妄舉動常出遊逢一老人鬚眉皎白謂曰我年八十觀士多矣未有如卿卿必為台牧努力勉之九嵗從師受業畧觀大指而已或譏其不精荅曰賢豈能令師徒授業至如忠孝之道實銘於心問者慙服又曰牛𢎞初在繦褓有相者見之謂其父曰此兒貴當善愛養之及長鬚貎甚偉性寛裕好學愽文又曰隋齊王陳妃早卒遂與妃娣元氏婦通生一女外人皆不得知陰引喬令則於第内宴召相工遍視後庭相工指妃曰此産子當為皇后貴不可言太平御覽卷七百三十
