  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_623-1a, image: WYG0898/WYG0898-0597c.png}
body:
  text: 太平御覽卷六百二十三宋李昉等撰治道部四二史記曰魯公伯禽初受封之魯三年而後報政周公周公曰何遲伯禽曰變其俗革其禮喪三年然後除之故遲太公亦封於齊五月而報政周公曰何疾也曰吾簡其君臣禮從其俗為也及後聞伯禽報政遲乃歎曰嗚呼魯後世其北面事齊矣夫政不簡不易民不近平易近民民必歸之又曰齊威王召即墨大夫而語之曰自子之居即墨也毁言日至然吾使人視即墨田野辟民人給官無留事東方以寧是子不事吾左右以求譽也封之萬家召阿大夫語曰自子之守阿譽言日聞然使人視阿田野不辟民人貧苦昔趙氏攻甄子弗能救衛取薛陵而子不知是子以幣厚吾左右以求譽也是日烹阿大夫及左右嘗譽者於是齊國震懼人人不敢飾非務盡其誠齊國乃大治又曰公孫鞅西入秦因孝公寵臣景監以求見孝公孝公既見鞅語事良乆孝公時睡弗應罷而去孝公怒景監曰子之客妄人耳安足用耶景監以讓鞅鞅曰吾說公以帝道其志不開悟矣後五日復求見鞅鞅復見孝公益愈然而未中㫖罷而去孝公復讓監監亦讓鞅鞅曰吾說公以王道而未入也請復見鞅鞅復見孝公善之而未用也罷而去孝公謂景監曰汝客善可與語矣鞅曰吾今說公以伯道其意欲用之矣誠復見我我知之矣鞅復見孝公孝公與語不自知膝之前於席也語數日不厭景監曰子何以中吾君吾君之驩甚也鞅曰吾説君以帝王之道而君曰久逺且賢君者各及其身顯名天下吾不能待安能邑邑待數十百年以成帝王乎故吾以强國之術説君君悦之然亦難以比徳於殷周矣漢書曰曹參相齊召長老諸先生問以安集百姓齊故諸儒以百數言人人殊參未知所定聞膠西有蓋公善治黄老言使人厚幣請之既見蓋公為言治道貴清静而民自定推此類具言之參于是避正堂舍蓋公焉其治要用黄老術故相齊九年齊國安集大稱賢相及參去齊屬其後相曰以齊獄市為寄慎勿擾也後相曰治無大于此者乎參曰不然夫獄市者所以并容也今吾君擾之奸人安所容乎吾是以先之又曰陸賈時說詩書髙帝罵之曰乃公居馬上得之安事詩書賈曰馬上得之寜可以馬上治之乎且湯武逆取而順守文武並用長乆之術也昔者呉王夫差智伯極武而亡夫差呉王闔閭子也好用兵卒為越所滅智伯晉卿荀瑤也攻趙襄子與韓魏反而喪之秦任刑法不變卒滅趙氏秦之先封於趙鄉使秦已并天下行仁義法先聖陛下安得而有之唐書曰開元八年二月制曰頃者以庸調無慿好惡須準故遣作様以頒諸州令其好不得過精惡不得至濫任土作貢防源斯在諸州送物作巧生端苟欲富於斤兩遂即加其丈尺有至五丈為疋者理甚不然闊尺八長四丈同文共軌其事乆行立様之時須載此數若求兩而加尺甚暮四而朝三宣令所司簡閱有踰于比年常例尺丈過多者奏聞又曰開元二十五年定令諸課户一丁租調準武徳二年之制其調絹絁布並隨鄉土所出絹絁各二丈五尺輸絹絁者綿三兩輸布麻三斤其絹絁為疋布為端綿為屯麻為綟若當户不成疋端屯綟者皆隨近合成其調南毎年支料有餘折一斤輸粟一升與租同受管子曰桓公伐楚濟汝水踰方城望汶山使貢絲周室列子曰周穆王大征西戎西戎獻昆吾之劒切玊如泥漢書董仲舒對䇿曰夫人君莫不欲安存而惡危亡然而政亂國危者甚衆所任者非其人而所繇音由者非其道也是以政日以仆滅也夫周道衰於幽厲非道亡也幽厲不繇也至宣王明文武之功業周道燦然復興詩人美之上天佑之為生賢佐行善之所致也孔子曰人能𢎞道非道𢎞人故理亂興廢在於己非天降命也臣聞天之所大奉使之王者必有非人力所能致而自至者此受命之符也天下之人同心歸之若歸父母故天瑞應誠而至書曰白魚入王舟有火復于王屋流為烏皆積善累徳之効也及後世淫逸不能統理羣生廢徳教而任刑罰刑罰不中則生邪氣邪氣積於下怨惡蓄於上上下不和隂陽繆盭而妖孽生焉此災異所縁起也臣聞命者天之令也性者生之質也情者人之欲也或夭或壽或仁或鄙陶冶而成之不能粹美有治亂之所生故不齊也堯舜行徳則民仁壽桀紂行暴則民鄙夭夫上之化下下之從上猶泥之在鈞惟甄者之所為猶金之在鎔惟冶者之所鑄綏之斯來動之斯和也又曰董仲舒論時政曰為政不行甚者必變而更化之譬諸琴瑟不調必解而更張當更張而不更張雖有良工不能善調也當更化而不更化雖有大賢不能善治也又曰蕭望之上疏曰夫民函隂陽之氣函與含同有好義欲利之心在教化之所助雖堯在上不能去民欲利之心而能令其欲利不勝其好義也雖桀在上不能去民好義之心而能令其好義不勝其欲利也故堯桀之分在於義利而已故道民不可不慎也又曰匡衡上書言政治曰五帝不同禮三王各異教民俗殊務所遇之時異也比年大赦而奸邪不為衰止蓋保民者陳之以徳義示之以好惡觀其失而制其宜也朝廷者天下之楨榦也公卿大夫相與循禮恭讓則民不争好仁樂施則下不暴上義髙節則民興行寛柔和惠則衆相愛四者明王所以不嚴而成化也又曰元帝時京房問上曰幽厲之君何以危所任者何人也上曰君不明而所任者巧佞房曰知其巧佞而任之邪將以為賢也上曰賢之房曰然則今何以知其不賢也上曰以其時亂而君危知之房曰若是任賢必治任不肖必亂必然之道也幽厲何不覺悟而更求賢曷為卒任不肖以至於是上曰臨亂之君各賢其臣令自覺悟天下安得危亡之君房曰齊桓公秦二世亦嘗聞此二君而非笑之然則任豎刁趙髙政治日亂盜賊滿山何不以幽厲卜之而覺悟乎上曰唯有道者能以徃知來耳房因免冠謝曰春秋記二百四十二年災異以示萬世之君今陛下即位以來日月失明星辰錯行山崩泉湧地震石隕夏霜冬雷水旱螟蟲民人饑疫盜賊不禁刑人滿市春秋所記災異盡備陛下視今為治耶為亂耶上曰亦極亂耳尚何道房曰今所任者誰歟上曰然幸其瘉於彼又以為不在此人也瘉與愈同愈勝也言其勝于彼也房曰夫前世之君亦皆然矣臣恐後之視今猶今之視前也後漢書曰桓譚上疏曰國之廢興在于政事政事得失由乎輔佐有國之君俱欲興化建善然而治道未洽者所謂賢者異也且設法禁者非能盡塞天下之奸皆合衆人之所欲也大抵取便國利民多者則可矣夫張官置吏以理萬民懸賞設法以别善惡惡人誅傷則善人蒙福矣魏志曰袁渙字曜卿為梁相毎勅諸縣曰世治則禮備世亂則禮簡方今難以禮化在吾所以為之又曰太祖破袁氏領冀州牧辟崔琰為别駕從事謂琰曰昨案户籍可得三十萬衆故為大州也琰曰今天下分崩九州幅裂二袁兄弟親尋干戈冀方蒸庶暴骸原野未聞王師仁聲先路存問風俗救其塗炭而計較兵甲唯此為先斯豈鄙州士女所望於明公哉太祖改容謝之晉書武帝初受禪駙馬都尉傅𤣥上疏曰先王之治天下也明其大教長其義節道化行於上清議隆於下上下相奉人懐義心亡秦蕩滅先王之制以法術相御而義心亡矣近者魏武好法術而天下貴刑名魏文慕通達而天下賤守節其後綱維不攝而虛無放誕之論盈於朝野使天下無清議而亡秦之弊發焉崔洪春秋前涼録曰張天錫曰時小府長史紀瑞上疏論時政曰臣聞東野善馭而敗其駕秦氏富强而覆其國馬力已盡求之勿休人既勞竭役之無已故也造父之御不盡其馬虞舜之治不窮其人故造父無失御虞舜無失人唐書曰魏徴上疏曰君人者誠能見可欲則思知足以自誠將有作則思知止以安人念髙危則思謙沖而自牧懼滿溢則思江海下百川樂盤游則思三驅以為度恐懈怠則思慎始而敬終慮擁塞則思虛心以納下想讒邪則思正心以黜惡恩所加則思無縁喜以謬賞罰所及則思無因怒而濫刑然後簡能而任擇善而從之智者盡其謀勇者竭其力仁者播其惠信者効其忠文武争馳在君無事可以盡豫遊之樂可以養松喬之壽鳴琴垂拱不言而化何必勞神苦思代下司職役聰明之耳目虧無為之大道哉又曰陳子昻上書言政理曰元氣者天地之始萬物之母王政之大端也天之道莫大乎隂陽萬物之尊莫大乎黔首王政之貴莫大乎安人故人安則隂陽和隂陽和則天地平而元氣正矣是以古先帝王見人之通於天地天人相感隂陽相和災害之所不生嘉祥之所以作也遂取象于天效法于地輔相天地之宜以左右民于是養成羣生奉順天徳故人得安其俗樂其業甘其食美其服隂陽大和元氣已正天地降瑞風雨以時矣又曰景雲二年監察御史解琬陳時政曰臣聞國之安危在於為政若為政以法雖暫安而必危為政以徳雖不便而終治夫法者智也智所謂權宜道可以長乆陛下登位今已逾年上封事者多言明聖述太平或曰功巍巍徳赫赫非惟不裨於政教亦乃陛下之厭聞臣以為當今風俗未甚振理政令未息煩勞隂陽未調和庫藏未充牣流離者尚相望於道路犯禁者猶繼踵於桎牢耳未聞康哉之聲目未覩太平之事且貞觀永徽之天下亦今日之天下相去幾何而風俗淳季相反由理之失也夫伯者任智失徳於人故大偽緣生矣然巧智之士浮詭之徒知忠正為立身之階識仁義為百行之本託之以求進假之以取容口是而心非言同而意反明君哲后亦何盡能察哉趨競之吏巧知之人欲宻網以為至公不知網宻而犯者衆用苛細以為勤事不知事細而擾愈煩賞貪冒為强能鄙貞正為孤介隨波浮沈者題之曰智剛毅正直者目之曰愚嵗月漸漬日致澆浮朴散淳離流蕩忘反若不匡救其弊何由使風俗淳質生人以康哉太平御覽卷六百二十三
