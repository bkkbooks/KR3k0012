body:
  text: 太平御覽卷二百二十九宋李昉等撰職官部二十七太常少卿太常丞博士太祝協律郎太廟令陵令太樂令太醫令廩犧令光禄卿光禄少卿太官令太常少卿六典曰凡有事於宗廟少卿帥太祝齊郎入薦香燭整拂神幄岀入神主將享則與良醞令實鐏罍後魏書曰太和十五年置少卿官太常少卿一人第三品上至二十二年降為正四品又曰景明初班職令太常少卿第四品上第一清選明禮兼天文隂陽者為之又曰元順為太常少卿以父憂去職哭泣嘔血身自負土時年二十五便有白髪免䘮抽去不復更生世人以為孝思所致三國典略曰齊太常少卿袁聿修巡省河南諸州兖州刺史邢邵與聿修故舊常於省中呼聿修為清郎至是遣送以白紬為信聿修不受與邵書曰𤓰田李下古人所慎多言不畏譬之防川願長此心不貽厚責邵亦忻然報書曰一日之贈率爾不思老夫忽忽意不及此敬承來㫖吾無間然弟昔為清郎今即清卿矣唐書曰馮定為太常少卿文宗每聽樂鄙鄭衛聲詔奉常習開元中霓裳羽衣舞以雲韶樂和之舞曲成定總樂工閲於庭定立於其間文宗以其端凝若植問其姓氏翰林學士李珏對曰此馮定也文宗喜問曰豈非能為古章句者耶乃召升陛文宗自吟送客西江詩吟罷益喜因錫禁中瑞錦仍令大録所著古體詩以獻太常丞六典曰太常丞二人從五品上秦有奉常丞漢因之比千石魏晉宋皆置一人漢書曰韋𢎞為太常丞父賢以𢎞當嗣太常職掌陵廟煩劇多過勑令自免𢎞懷謙不去官及賢疾篤果坐廟事繫獄矣宋百官春秋曰太常丞視尚書郎銅印黄綬一梁冠品第七掌舉陵廟非法陶氏家傳曰覆之字孫宗為太常丞凡宗廟疑義多所决定一時人為之語定禮决疑問陶覆之陶氏職官要録曰晉宋九卿丞皆進賢一梁冠介幘皂衣銅印黄綬齊梁黒綬太常博士六典曰太常博士辨五禮之儀式本先王之法制適變隨時而損益焉凡大祭祀及有大禮則與卿導贊其儀凡王公以下擬諡皆跡其功德而為之褒貶通典曰博士魏官也魏文帝初置晉因之事掌引道乗輿王公以下應追諡者則博士議定之晉中興書曰博士之職端委佩玉朝之大典必于詢度當以正道克厭人望然後為可唐書曰王彦威太原人世儒家少孤貧苦學尤通三禮無由自達元和中游京師求為太常散吏部卿知其書生補為檢討官彦威於禮閣掇拾自隋已來朝廷沿革吉凶五禮以類區分成三十卷獻之號曰元和新禮繇是知名特授太常博士又曰陸亘為太常博士寺有禮生孟貞久於其事凡吉㓙大儀官不能達率訪於貞亦賴是須姑息元和七年册皇太子將撰儀注貞亦欲叅預亘笞之由是禮儀不專於胥吏郭子曰張慿舉孝亷詣劉真長還船須臾真長至遣覔張孝亷船同旅愕然同載俱詣撫軍劉前進謂撫軍曰今日為公得一士太常博士之選既前撫軍與之言咨嗟稱善乃曰張慿勃倅為理窟即用為太常博士太祝六典曰太祝掌出納神主於太廟之九室而奉享薦禘祫之儀周禮曰大祝掌六祝之辭以事鬼神示祈福祥求永貞一曰順祝二曰年祝三曰吉祝四曰化祝五曰瑞祝六曰筴祝鄭司農曰順祝順農年也年祝求永貞也吉祝祈福祥也化祝弭災兵也瑞祝逆時雨寜風旱也筴祝逺罪疾也漢書百官表曰太常屬官有太祝令丞景帝六年更名為祝祀武帝太初元年夏曰廟祝東觀漢記曰隂猛好學溫良稱於儒林以郎遷為大祝令續漢書曰太祝令秩六百石掌祠讃祝近臣神巫主祝小祀協律郎六典曰協律郎掌知六律六呂以辨四時之風氣八風五音之節漢書曰武帝時李延年尚新聲以為協律都尉魏志曰武帝平荆州得杜䕫知音識舊樂故以為協律郎太廟令漢書百官表曰太常屬官有諸廟令長丞續漢書曰髙廟令一人六百石主守宗廟掌按行掃除無丞世祖廟令一人宋書曰太廟令一人主守宗廟案行灑掃衆事領齋郎二十四齊職儀曰周有守祧之官掌先王廟令陵令六典曰陵令掌先帝山陵率户守衞之事丞為之貳凡朔望元正冬至寒食皆修饗於諸陵若橋陵則曰獻羞焉凡功臣密戚請陪陵葬者聽之以文武分為左右而列若父祖陵陪子孫從葬者亦如之周禮曰冡人下大夫二人中士四人掌公墓之地辨其兆域先王之葬居中以昭穆為左右漢書曰太常屬官有諸陵令元光元年分諸陵邑屬三輔又曰司馬相如為茂陵令續漢書曰太常職掌先帝陵每園令各一人秩六百石掌守園林按行掃除丞及校長各一人校長主戒賊盗齊職儀曰周有墓大夫冡人之職掌先王之墓又曰每陵令一人品第七秩四百石銅印墨綬進賢一梁冠絳朝服唐書官品志曰梁天監七年又詔以為陵監之名不出前詔且宗廟憲章既備典禮園寢職司理不容異諸正陵先立監者改為令於是陵置令矣胡廣陵令箴曰昔在廣葉葬野衣薪執禮極哀不樹不封瓦棺塈周虞夏攸崇壤不毁膚賄不害生是謂皇極百王此經故厚不可始皇薄不可楊王孫乃眷西顧爰短孝文陵臣司墓敢告守人太樂令六典曰太樂令掌教樂人詞合鍾律以供邦國之祭祀饗讌丞為之貳漢書百官表曰太常屬官有太樂令丞續漢書曰明帝永平十三年曹褒奏尚書璇璣鈐曰有帝漢德合作樂名天子下詔改大樂令丞以應圖䜟又曰大樂令秩六百石掌伎樂人凡國祭祀掌奏樂及大司樂掌其陳序晉起居注曰成帝咸和中詔大樂令載綏教官伎樂勤勞賜米百石布二十疋太醫令六典曰太醫令掌諸醫療之法丞為之貳其屬有四曰醫師針師按摩師呪禁師皆博士以教之考試登用如國子監之法漢書百官表曰少府屬官有太醫令丞無員多至數千人續漢書曰太醫一人秩六百石有藥丞主藥方丞魏略曰脂習字元升除太醫令與孔融親善融被誅習獨往哭之黄初中以習有欒布之節賜拜中散大夫應劭漢官儀曰太醫周官也兩冠秩千石典論曰中常侍張讓子奉為太醫令與人飲酒輒掣引衣裳發露形體亂其舄履使小大無不傾倒崔實太醫令箴曰動不肄勤静不宴逸有疾歸天醫無能恤晉平好内四時是一非鬼非食惑以自失雖有秦和焉所施術太上防疾其疾萌芽腠理不觸骨髓奈何廩犧令六典曰廩犧令掌駕犧牲及粢盛之事丞為之貳凡三祀之牲牢各有名數昊天上帝以蒼地皇祗以黄神州以黝五帝之牲各以方色韋昭辨釋名曰釋云廩犧犧戯也廩養之也辨充六牲取其毛者别養之以奉祭祀純色者少故名犧犧希也周禮曰牧人下士掌牧六牲以供祭祀漢書百官表曰内史屬官有廩犧令丞尉後屬司農齊職儀曰周牧人之職也掌六牲陽祀用騂隂祀用黝取純毛者光武中興屬河南秩六百石光禄卿六典曰光禄卿之職掌邦國醪醴膳羞之屬總大官珍羞良醖掌醢四署之官屬修其儲備謹其出納少卿為之貳凡大祭祀則省牲鑊視濯溉漢官解詁曰士之權貴不過尚書其次諸吏諸吏光禄勲是也應邵漢官儀曰光明也禄爵也勲功也言光六典郎謁諸虎賁羽林舉不妄得賞不失勞故曰光禄勲唐書官品志曰光禄卿位視太子中庶子掌官尉門户統守黄門華林園暴室等令漢書曰郎中令秦官武帝太初元年更名光禄勲掌中殿門户秩二千石又曰石建為郎中令奏事下建省讀驚曰書馬與尾而五今乃不足一獲譴死矣其謹慎如此又曰周仁景帝時為郎中令為人隂重不洩服䖍曰質重不泄人之隂謀也師古曰隂密也言為性密重不洩人言也以是得幸出入卧内於後宫秘戯仁常在傍終無所言又曰張安世字子孺為光禄勲郎有醉小便殿上主事白行法安世曰何以知其不覆水耶郎有淫官婢婢兄自言安世怒以奴淫汚衣冠告署撻奴其隐人過皆此類也東觀漢記曰孫堪字子雅為光禄勲以清亷稱與周澤相類澤字雅都京師號之為二雅又曰劉昆字桓公為光禄勲授皇太子及諸王小侯五十人經昆老退位以二千石禄終其身又曰邵訓字伯春鄉里號之曰德行恂恂邵伯春章和中為光禄勲後漢書曰杜林字伯山扶風人也林少沉審博學多聞世稱通儒為光禄勲内奉宿衛外總三署郎有好學者輙見引進朝夕滿堂又曰馬防字公平扶風人也防貴寵盛與九卿絶席拜光禄卿又曰張湛字子孝拜光禄勲光武臨朝或有惰容輙諫常乗白馬上後見湛輙曰白馬生且復諫矣又曰袁彭順帝初為光禄勲行至清為吏麄糲食續漢書曰荀爽字慈明為光禄勲視事三月策拜司空謝承後漢書曰楊賜字伯欽拜為光禄勲嘉德殿前有青赤氣詔特進遣中使問賜祥異禍福吉凶所在以賜博學碩儒故密諮問其極陳其意嘗上疏陳請案春秋䜟天投蜺海内亂今妾媵閹尹共專國政之所致也魏志曰鄭柔為光禄勲毌丘儉作亂帝自征之百官祖送柔疾不任㑹上謂王肅唯不見鄭光禄為恨柔聞自輿追上上笑曰知生必來遂與同載問以計謀帝甚重之又曰王肅字子雍為光禄勲時有魚長尺集武庫之屋有司以為吉祥肅辨之曰魚生於泉而見於屋鱗介之物失其所也邊將其殆有棄甲之變乎其後果有東闗之敗又曰袁渙字曜卿為郎中令時言蜀主死羣臣皆賀渙以嘗為其吏獨不賀卒官太祖為之流涕吳志曰石偉字公操南郡人少好學修節不怠為獨立有不可奪之志舉茂才賢良方正皆不就孫休即位特徵偉累遷至光禄勲及皓即位朝政昏亂偉乃辭老耄錮疾乞身又曰薛瑩字道言以時法政多謬舉措煩苛瑩每上便宜陳緩刑簡役以濟育百姓頗或施行遷光禄勲劉基餘人不得也晉中興書曰鄭黙字思元轉光禄勲寛冲博愛不以聲色矜人雖卒徒厮養待之以恩宋書曰王惠宋國初建當置郎中令髙祖難其人謂傅亮曰今用郎中令不可令减袁曜卿也既而曰吾得其人矣乃以惠居之孟宗别傳曰宗為光禄勲大會宗先少酒偶有强者飲之一杯便吐傳詔司察宗吐麥飯察者以聞上乃歎息曰至德清純如此光禄少卿後魏職令曰光禄少卿第四品上第三清用肅勤明敏兼識古典者唐書曰栁亨拜光禄少卿太宗每識之曰與卿舊親情素兼宿卿為人交遊過多今授此職宜存簡静亨性好射獵有饕湎之名此後頗自朂勵杜絶賓客約身節儉勤於職事太宗亦以此稱之也太官令六典曰太官令供膳食之事丞為之貳凡祭之日則白卿講厨省牲取明水於隂鑑取明火於陽燧帥軍人以鑾刀割牲取其毛血實之於豆遂烹牲焉又率進饌者實簠簋設於饌幕之内漢書百官表曰少府屬官有太官令一人丞一人應劭漢官儀曰太官令兩梁冠秩千石丞四人郡孝亷年五十清修聰明者光禄上名廼召拜皆秩四百石三嵗為令以供養勞苦遷左丞有湯官丞掌諸甘肥有菓丞掌菓𤓰菜茹薪炭漢書儀曰太官主飲酒皆令丞治太官湯奴婢各三千人置酒皆緹褠音溝蔽膝緑幘又曰太官上食釦音口金飾器器中官私上食用白銀釦器如神廟器云謝承後漢書曰魯國陳政字叔方為太官令黄門郎與政有隙因進御食以髪貫炙帝見髪勅斬政政曰臣有當死者三黒山出炭増治吐炎燋膚爛肉而髪不消臣罪一也陜出刀砥礪五石虧肌截骨曽不能斷髪臣罪二也臣朗月書章奏側光讀經旦臨食與丞及庖人六目齊視不及黄門一人臣罪三也詔赦之魏略曰時苗為夀春令遷為太官令後魏書曰毛循之能為南人食手自煎調多所適意也世祖親待之進太官尚書賜爵南郡公加冠軍將軍常在太官主進御膳揚雄太官令箴曰時惟膳夫實司王饔祁祁庶羞口實是供羣物百品八珍清觴以御賓客以膳於王王朗集曰朗為大理時上主簿趙郡張登昔為本縣主簿值黒山賊圍郡登與縣長王携帥吏兵七十二人俱往赴救與賊交戰吏兵散走擕殆見害登手格二賊以全擕命又守長夏逸為督郵所枉登身受拷掠理逸之罪義濟二君宜加顯異黄初詔曰登忠義彰著在職功勤名位雖卑直亮宜顯饔膳近任當得此吏今以豋為太官令太平御覽卷二百二十九
