body:
  text: 太平御覽巻八百二十一宋李昉等撰産資部一田釋名曰土已耕者曰田田填也五稼填滿其中心也尚書禹貢曰冀州厥田惟中中孔安國曰田之髙下肥瘠九州之中為第五兗州厥田惟中下第六青州厥田惟上下第三徐州厥田惟上中第二揚州厥田惟下下第九荆州厥田惟下中第八豫州厥田惟中上第四梁州厥田惟下上第七雍州厥田惟上上第一周禮春官下籥章曰凡國祈年於田祖龡豳雅擊土鼓以樂田畯祈年祈豐年也田祖始耕田者謂神農也田畯古先教田者爾雅曰畯農夫也又曰地官司徒之職也均土地以稽其人民而周知其數上地家七人可任者家三人中地家六人可任者二家五人下地家五人可任者家二人乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事而令貢賦凡稅歛之事又曰載師掌任土之法以物地事授地職而待其政令以㕓里任國中之地以場圃任園地以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地以公邑之田任甸地以家邑之田任稍地以小都之田任縣地以大都之田任畺地禮記月令季夏月是月也大雨時行乃燒薙行水利以殺草可以糞田疇可以美土疆又王制曰方一里者為田九百畆方十里者為方一里者百為田九萬畆方百里者為方十里者百為田九十億畆方千里者為方百里者百為田九萬億畆自恒山至於南河千里而近冀州域自南河至於江千里而近豫州域自江至於衡山千里而遥荆州域自東河至於東海千里而遥徐州域自東河至於西河千里而近亦冀州域自西河至於流沙千里而遥雍州域西不盡流沙南不盡衡山東不盡東海北不盡恒山凡四海之内斷長補短方三千里為田八十萬億一萬億畆方百里者為田九十億畆山陵林麓川澤溝瀆城郭宫室塗巷三分去一其餘六十億畆又曰古者公田籍而不稅左𫝊僖公三十一年曰取濟西田分曹地也二十八年晉文討曹分其地境界未定至是乃以賜諸侯使臧文仲徃宿於重館重館人告曰晉新得諸侯必親其共不速行将無及也從之分曹地自洮以南東傅於濟盡曹地也文仲不書請田而已非聘享會同也襄仲如晉拜曹田也又宣公下十五年曰初稅畆非禮也榖出不過藉周法民耕百畆公田十畆借民力而治之稅不過此以豐財也又襄公三十曰子産治鄭使田有封洫從政一年輿人誦曰取我衣冠而禇之取我田疇而伍之孰殺子産吾其與之及三年民又誦之曰我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之又哀公上曰季孫欲以田賦丘賦之法因其田財通出馬一匹牛三頭今欲别其田及家財各為一賦故言田賦使冉有訪諸仲尼仲尼曰丘不識也三發三發問卒曰卒終也子為國老待子而行若之何子之不言也仲尼不對不公答而私于冉有曰君子之行也行政事度于禮施取其厚事舉其中歛從其薄如是則以丘亦足矣丘十六井出戎馬一匹牛三頭是賦之常法若不度于禮而貪冒無厭則雖以田賦将又不足且子季孫若欲行而法則周公之典在若欲苟而行又何訪焉弗聴為明年用田賦𫝊又哀公上曰子胥曰得志于齊猶獲石田也無所用之石田不可耕榖梁𫝊宣公十五年初税畆宣公履畆擇而税之也古者田什一而藉言借民力十井為公耕一謂之什一而藉也初税非正也毛詩小雅白華曰滮池北流浸彼稲田滮流貌箋云池澤浸潤稲田之生殖又甫田曰倬彼甫田歳取十千倬明貌甫田謂大田也十千年多也又大雅嵩髙曰王命召伯徹申伯土田徹治也箋云治者正其井牧定其賦税爾雅曰田一歳曰菑今江東呼初耕地菑二歳曰新田詩曰于彼新田三歳曰畬易曰不菑畬史記曰魏文侯使李悝作盡田地力之教悝苦回反以為地方百里提封九萬畆理田勤謹則畆三斗不勤則損亦如之地方百里之増減輒為粟百八十萬石矣必雜五種以偹灾害力耕數耘收獲如寇盗之至謂促迫之甚恐為風雨損也又曰秦孝公任商鞅人以三晉地狭人貧三晉謂韓魏趙三鄉今河東道之地秦地廣人寡故草不盡墾地利不盡出於是日誘三晉之人利其田宅復三代無兵事而務本于内而使秦人應敵于外故廢井田制阡陌任其所耕不限多少數年之間國富兵彊天下無敵其後韓聞秦之好興事欲疲之乃使水工鄭國說秦令鑿涇水自仲出西抵瓠口為渠並北山東注洛三百餘里欲以溉田中作而覺秦欲殺國國曰始臣為間然渠成亦秦之利也秦以為然卒使就渠用注慎閼之水溉澤鹵之地四萬頃収皆畆一鍾於是関中為沃野無凶年命曰鄭國渠又曰王翦将行請善田宅園池甚衆始皇曰将行矣何憂貧乎戰國策曰魏公叔痤為將攻韓趙勝之魏王賞田百痤曰使士卒不崩直而不倚撓㨂不辟者此吴起餘教也鼓之不敢怠倦者臣也王特為臣右手之倦賞臣可也若以有功臣何力之有焉王曰善於是索吴起之後賞田二十萬以痤不掩士之迹又與田二十萬漢書鼂錯奏曰古者稅民不過什一至秦則不然用商鞅之法改帝王之制一歳屯卒萬計力役三十倍於古田租口賦鹽鐵之利二十倍於古如淳曰秦賣鹽鐡民受其困或耕豪民之田税十五故貧民常馬牛衣而食犬彘之食又董仲舒說上曰秦用商鞅之法改帝王之制除井田人得買賣富者田連阡陌貧無力錐之地漢興循而未改古井田法雖難猝行宜少近古限人名田以贍不足塞兼并之路然後可善治也上不能用又曰是時富豪皆争匿財唯式尤欲助費於是以式終長者乃召拜為郎中賜爵左庶長田十頃布告天下尊顯以風百姓又曰貢禹上書曰臣禹年老貧窮家資不滿萬錢妻子糠豆不贍短褐不完有田百三十畆陛下過意徴臣臣賣田十畆以供車馬又曰楊惲免官常不得志乃歌曰田彼南山蕪穢不治種一頃豆落而為箕人生行樂耳湏富貴何時又曰張禹為人謙愿内殖貨財家以田為業及富貴多買田至四百頃皆涇渭灌溉極膏腴上價又曰寗成曰仕不至二千石賈不至千萬安可比於人乎乃貰貸陂田千餘頃假貧民役使數千家致産數千萬為任俠持吏長短從數十騎其使民威重於郡守又溝洫志曰太始三年趙中大夫白公復奏穿渠引涇水首起谷口尾入櫟陽涇渭中溉四千五百餘頃田名曰白渠田民歌曰鄭國在前白渠起後舉鍤為雲决渠為雨涇水一石其泥數斗且溉且糞長我稷黍後漢書曰光武時天下墾田多不以實又户口年紀互有増减十五年詔下州郡檢覆其事而刺史太守多不均平或優饒豪右侵刻羸弱百姓嗟愁遮道號呼時諸郡各遣使奏事帝見陳畱吏牘上有書云頴川𢎞農可問河南南陽不可問帝詰吏由趣吏不肯服詆言長夀街上得之帝怒時顯宗為東海公年十二在幄後言曰吏受郡勅常欲以墾田相方耳帝曰既如此何故言河南南陽不可問對曰河南帝城多近臣南陽帝鄉多近親田宅踰制不可為准帝令虎賁将詰問吏吏乃實首服如顯宗對於是遣謁者考實具知奸状又曰樊重開廣田土三百餘頃其所起廬舍皆有重堂髙閣陂渠溉注貲至巨萬而賑贍宗族恩加鄉閭外孫何氏兄弟爭財重恥之以田二頃觧其忿訟縣中稱美推為三老又曰馬援辭兄况欲就邉郡田牧况曰汝大才當晩成良工不示人以朴且從所好後援辭隗囂歸洛陽居數月而無它職任援以三輔地曠土沃而所将賓客猥多乃上書求屯田上林苑中帝許之東觀漢記曰司𨽻校尉梁松奏特進防光廖廖子豫兄弟父子並受爵土榮顯冠世多買京師膏腴美田作大廬近帶城郭妨困小民又曰郭丹字少卿南陽人累世千石父稚為丹買田宅居業丹為司徒視事五年薨詔問丹家時宗正劉匡對曰郭丹為三公典牧州郡田畆不増張璠漢記曰鄭恭字公業少有才畧多謀家富於財有田四百頃而食常不足名聞東山華嶠後漢書曰范遷為司徒在公輔有宅數畆田不過一頃推與兄子又曰周燮専精禮易不讀非聖之書不修賀問之好有先人草廬結于崗畔下有陂田常肆力自勤以給非身所耕漁則不食魏志曰夫定國之術在於強兵足食秦人以給農兼天下孝武以屯田定西域此先世之良式也由是州郡例置官田所在積榖征伐四方無軍糧之患遂得以兼滅群兇克平天下又曰鄧艾遷尚書郎時欲廣田蓄榖為滅賊之資使艾行陳項已東至夀春艾以為田良水少不足以盡地利宜開河渠可以大積軍糧又通漕運之道乃著濟河論以喻其指又以為昔破黄巾因為屯田積榖許都以制四方今三隅已定事在淮南每大軍征舉運兵過半功費巨億以為大役陳蔡之間上下田糧可省許昌左右諸稲田幷水東下令淮北二萬人淮南三萬人十二分休常有四萬人且田且守歳豐常收三倍於西計除衆費歳完五百萬斛以為軍資六七年間可積三千萬斛於淮上此則三十萬之衆五年食也以此乘吴無不克矣宣王善之事皆施行正始三年乃開廣漕渠每東南有事大軍興舉汎舟而下達於江淮資食有儲而無水害艾所建也又曰司馬郎為丞相主簿以為宜復井田徃者以民各有累世之業難中奪之是以至今承大師之後民人分散土業無主皆為公田宜及此時復之又曰鄭渾遷陽平沛郡太守界下濕患水澇百姓飢乏渾於蕭相二縣界興陂堨開稲田郡人皆以為不便渾曰地勢洿下宜灌溉中有漁稲經久之利此豐民之本也遂躬率吏民興力工夫一冬間皆成比年大收頃畆歳増租入倍常民賴其利刻石頌之號曰鄭陂又曰劉靖都督河北諸軍事又修廣利渠陂大道水灌溉薊南北三百里使種稲邉民利之蜀志曰初諸葛亮自來成都有田十五頃子弟食自餘饒晉要事曰安帝義熙元年右丞相項元議琅琊及湖熟界有皇后脂澤田四十餘頃㕘詳悉以借食民南史曰宋王恵兄鑒頗好聚歛恵意不同謂曰何用田為鑒怒曰無田何由得食恵曰又何用食為齊書曰王騫厯黄門郎司徒右長史不事産業有舊田在鍾山八十頃與諸兒及故舊共佃之嘗謂人曰我不如鄭公業有田四百畆而食常不周以此為愧梁書曰夏侯䕫為豫州刺史率軍人於陵邱堨溉田千餘頃歳榖百餘萬石以充儲備兼贍貧人境内賴之也又曰鄧元起少時嘗至西沮田舍有沙門造之乞元起有稲幾二千石悉以施之時人稱其有大度後魏書曰髙允為著作郎太武引見因問允萬幾何者為先時多禁封良田又京師遊食者衆允因曰臣少也賤所知惟田請言農事古人云地方一里則為田三頃七十畆萬里則田三萬七千頃若勤之則畆益三升不勤則畆損亦如之損益之率為粟二十二萬二千斛况以天下之廣乎若公私有儲雖遇饑復何憂哉帝善之除田禁悉以授百姓又曰裴延雋遷幽州刺史范陽君有舊督亢渠經五十里賜燕郡有故戾陵諸堨廣袤三十里皆廢毁多時水旱不調延雋乃表求營造遂躬自履行相度形勢隨力分督未幾而就溉田百萬餘畆為利十倍百姓賴之北齊書曰帝賜穆題婆晉陽之田斛律光言於朝曰此田神武帝以來常種禾飼馬數千以擬冦難今賜題婆無乃闕軍務也自是題婆怨光唐書曰貞元十六年盧羣為義成節度鄭滑觀察營田使群先寄㝢鄭州典質得良田數頃及受節度各以本地契書分付所管令長令召還本主時人稱美又曰起居郎崔覲隐居城固山所有良田分給奴婢令逓日供飯食之費覲與妻家一不以問但木石自娱而已又曰温造為河陽節度觀察使復懷州古秦渠三縣棄地悉為良田後造左遷出為朗州刺史至則開後鄉渠九十七所溉田二千頃後人名其渠曰右史渠范子計然曰請問九田隨世盛衰有水旱貴賤願聞其㫖計然曰諸田各有名其從一官起始以終九官所以設諸田差髙下始進退也假令一直錢百金一直錢九百此畧可知從一畆至百畆直是大貴之極數也孟子曰百畆之田勿奪其時數口之家可以無飢矣又曰易其田疇薄其稅歛民可使富也傅子曰陸田者命懸於天也人力雖修水旱不時則一年功棄矣田制之由人人力苟修則地利可盡天時不如地利地利不如人事吕氏春秋曰魏襄王與群臣飲酒酣王為群臣祝令群臣皆得志史起對曰群臣不肖者得志則不可王曰如西門豹之為人臣也史起對曰魏時之田也漳水存其傍西門豹不知用是過也明日召起問漳水猶可以灌鄴田乎對曰臣為之民必大怨臣臣雖死願王使他人遂之王使之為鄴令史起因徃為之鄴民大怨欲籍史起史起不敢出避之乃使他人遂為之水已行民大得其利相與歌之曰鄴有聖令號為史公决漳水􅀆灌旁終古斥鹵生稲梁梁春秋後語曰趙列侯謂其相公仲建曰寡人所愛可以貴之乎曰富可也貴之則不列侯乃命以田萬畆賜善歌者二人公仲建許諾而不與居一月列侯之代還問曰與之乎曰未有可者家語曰虞芮二國爭田而訟連年不决乃相謂曰西伯仁人也盍徃質焉入其境則耕者讓畔行者讓路入其朝則士讓為大夫大夫讓為卿虞芮之君曰嘻吾儕小人不可以入君子之朝遂自相與成以其所爭田為閑田蕭廣濟孝子𫝊曰郭原平墓下有數十畆田不属原平每至農月農者常裸袒原平不欲使慢其墳墓乃貨家貲買此田三農之月輒束𢃄垂泣躬自耕墾之汜勝之奏曰昔湯有旱災伊尹為區田教民糞種負水澆稼收至畆百石勝之試為之收至畆四十石越絶書曰吴北野禺櫟東所舍大疁者吴王田也又曰富中大唐者勾踐治以為義田也肥饒謂之富中盛𢎞之荆州記曰桂陽郡界有温泉其下流有田恒資以浸灌常十二月種至明年三月新榖便登温液所周正可數畆過此水氣輒冷不復生苖豫章記曰郡江之西岸有磐石下多良田極髙腴者一畆二十斛稲米之精者如玊映澈於器中續捜神記曰陽人姓何忘其名隐遁養志常至田舍人收獲在場忽有一人長一丈黄踈單衣角巾來詣之翩翻舉其兩手並儛而来語何云君常見韶舞不足舞也便去何尋逐遥向一山山有穴裁容一人其人命入穴何亦隨之初甚急前輒開廣便失人見良田四十頃何遂墾作以為世業子孫至今賴之崔寔政論曰昔者聖王立井田之制分口耦地各相副􅃴使人饑飽不偏勞逸齊均富者不足僣差貧者無所企慕王朗上求賑貸民表曰昔在西京有鄠杜膏腴之饒池陽谷口之利涇渭二川之水鄭國白渠之溉每年成熟糞與灌並畆貨一金號為陸海應璩書曰是以忽此蘇子帶郭之業求彼孫叔寢邱之地故求逺田在闗之西南臨洛水北據芒山曺植表曰乞城内及城邉好田盡所賜百年力者臣雖生自至尊然心甘田野性樂稼穡又籍田論曰營疇萬畆厥田上上經以大陌帶以横阡竒栁夾路名菓被園宰農實掌是為公田唐明皇雜録曰上命宇文融為拓田使融方恣雎諸不己附者必加誣譖宻奏以為盧從願廣置田園有地數百頃上素器重欲倚為相者數矣而又族望官婚鼎盛於一時故上亦重言其罪但目從願為多田翁太平御覽巻八百二十一
