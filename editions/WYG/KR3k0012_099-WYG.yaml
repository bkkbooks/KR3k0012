body:
  text: 太平御覽卷九十九宋李昉等撰皇王部二十四東晉康皇帝穆皇帝哀皇帝廢帝海西公簡文皇帝孝武皇帝康皇帝晉書曰康皇帝諱岳字世同成帝母弟咸和元年封呉王二年徙封琅琊王九年拜散騎常侍加驃騎將軍咸和五年遷侍郎司徒八年六月庚寅成帝不豫詔以琅琊王為嗣癸巳成帝崩甲午即皇帝位大赦己亥封成帝子丕為琅琊王奕為東海王時帝諒陰不言委政於庾冰何充十二月壬子立皇后褚氏建元元年春正月改元賑恤鰥寡孤獨三月以中書監庾冰為車騎將軍二年九月丙申立皇子聃為皇太子戊戌帝崩於式乾殿在位三年時年二十三𦵏崇平陵初成帝有疾中書令庾冰自以舅氏當朝權傾人主恐異世之後戚屬將疎乃言國有强敵宜立長君遂以帝為嗣制度年號再興中朝因改元曰建元或謂冰曰郭璞䜟云立始之際丘山傾立者建也始者元也丘山諱也冰瞿然既而歎曰如有吉凶豈改易所能救乎至是果驗云世説曰何次道庾季堅二人並為元輔成帝初崩於時嗣君未定何欲立嗣子庾及朝議以外㓂方强嗣子沖幼乃立康帝康帝既登阼㑹羣臣謂何曰朕今所以承大統為誰之議何曰陛下龍飛臣冰之功使於時用微臣議今不覩聖明之世上有慙色穆皇帝晉書曰穆皇帝諱聃字彭祖康帝子也建元二年九月庚申立為皇太子戊戌康帝崩己亥即皇帝位時年二歲大赦尊皇后為皇太后壬寅皇太后臨朝攝政永和元年春正月甲戌朔皇太后設白紗帷于太極殿抱帝臨軒改元二年十一月辛未安西將軍桓溫帥虜將軍周撫輔國將軍譙王無忌建武將軍袁喬伐蜀拜表輒行十二月枉矢自東南流于西北其長半天三年春三月桓溫攻成都克之李勢降益州平十年二月己丑大赦征西將軍桓溫帥師伐關中廢揚州刺史殷浩為庶人六月苻堅將苻雄悉衆及桓溫戰於白鹿原王師敗績九月辛酉桓温以糧盡遂還升平元年春正月壬戌朔帝加元服告于太廟始親萬幾大赦改元增文武位一等皇太后居崇德宫五年五月丁巳帝崩顯陽殿在位十七年時年十九葬永平陵廟號孝宗哀皇帝晉書曰哀皇帝諱丕字千齡成帝長子也咸康八年封為琅琊王永和九年拜散騎常侍十二年加中軍將軍升平三年除驃騎將軍五月丁巳穆皇帝崩皇太后令曰帝奄不救疾嫡嗣未建琅琊王丕本中興正統明德懋親昔在咸康屬當儲貳以年在幼沖未堪國難故顯宗高讓今議望情地莫與為比其以王奉大統於是百官備法駕迎于琅琊第庚申即皇帝位大赦八月己夘夜天裂廣數丈有聲如雷九月戊申立皇后王氏穆帝皇后何氏稱永安宫興寧元年九月壬戌大司馬桓温帥衆北伐癸亥以皇子生大赦二年二月癸夘帝親耕籍田三月庚戌朔大閲人户嚴法禁辛亥不豫帝雅好黃老斷穀餌長生藥服食過多遂中毒不識萬幾崇德太后復臨朝攝政三年二月庚申帝崩于西堂在位四年時年二十五𦵏安平陵廢帝海西公晉書曰廢帝諱奕字延齡哀帝母弟也咸康八年封為東海王永和八年拜散騎常侍尋加鎭軍將軍升平四年拜車騎將軍五年改封琅琊王隆和初轉侍中驃騎大將軍開府儀同三司興寧三年二月庚申哀帝崩無嗣丁酉皇太后詔曰帝遂不救厥疾艱禍仍臻遺緒冺然哀慟切心琅琊王奕明德懋親屬當儲副宜奉祖宗纂承大統便速正大禮以寧人神于是百官奉迎于琅琊王第是日即皇帝位大赦太和四年夏四月庚戌大司馬桓温率衆伐慕容暐七月辛夘暐將慕容垂帥衆拒溫温敗之九月戊寅桓溫裨將鄧遐朱序遇暐將傅末波于林渚又大破之戊子桓温至枋頭丙申以粮運不繼焚舟而歸六年冬十一月癸夘桓溫自廣陵屯于白石丁未詣闕因圖廢立誣帝在藩夙有痿疾嬖人相龍計好朱靈寳等參侍内寢而二美人田氏孟氏生三男長欲封樹時人惑之溫因諷太后以伊霍之舉己酉集百官于朝堂宣崇德太后令曰王室艱難穆哀短祚國嗣不育儲宫靡立琅琊王奕親則母弟故以入纂大位不圖德之不建乃至于斯昏濁潰亂動違禮度有此三孽莫知誰子人倫道喪醜聲遐布既不可以奉守社稷敬承宗廟且昏孽並大便欲建樹儲藩誣罔祖宗傾移皇基是而可忍孰不可忍今廢奕為東海王以王還第供衞之儀皆如漢朝昌邑故事初桓溫有不臣之志欲先立功河朔以収時望及枋頭之敗威名頓挫遂潛謀廢立以長威權然憚帝守道恐招時議以宫闈重閟牀笫易誣乃言帝為閹遂行廢辱初帝平生毎以為慮嘗召術人扈謙筮之卦成答曰晉室有盤石之固陛下有出宫之象竟如其言咸安二年正月降封帝為海西縣公臧榮緒晉書曰太和元年桓溫表率方伯北伐秋九月溫以王師敗績于枋頭溫自廣陵屯于白石集百官于朝堂稱崇德太后詔廢帝為東海王妖賊盧悚遣弟子殿中監許龍晨到門稱太后宻詔奉迎興復帝曰我得罪到此幸蒙寛宥豈敢妄動且太后有詔便應官屬來迎何得如此必狂亂因叱左右縛之龍晨懼而走由是朝廷以帝安于屈辱無僥倖之望不得懐疑帝亦知天命不再而深慮人禍乃蔽聽塞明無思慮終日酣飲耽于内寵有子不養庶保天年呉民憐之為作歌謠帝崩于呉宫年四十五因葬呉地續晉陽秋曰帝少同閹人之疾而暱比左右初在東海琅琊因親近嬖人相龍計好朱靈寳等並侍卧内美人田氏遂生三男衆致疑惑然莫能審其虚實至是將建儲貳大司馬桓溫因之以定廢立之計遂率百僚並還朝堂本省溫平旦以衆入分兵屯宫門呈草于皇太后后曰今廢奕為東海王還第供衞之儀如漢朝昌邑故事丞相録尚書事㑹稽王昱體自中宗明德劭令民望依係為日已久宜應天人以統皇極主者明依舊典以時施行但未亡人不幸罹此百憂感念存殁心焉如割社稷大計義不獲已臨紙悲塞如何可言時太后在佛屋燒香内侍啓云外有急奏太后乃出堂倚户前視表數行乃曰我本自疑此至半便止求筆題奏後云未亡人罹此百憂感念存殁心焉如割溫奏未有此十五字遂即奏逥換内之簡文皇帝晉中興書曰太宗簡文帝諱昱字道成中宗少子也母曰鄭夫人永興二年封琅琊王咸和元年鄭夫人薨上時年七歲號慕泣血乞得服重朝議哀之故從封㑹稽王康獻皇后臨朝建位撫軍大將軍録尚書六條事二年驃騎將軍何充薨皇太后詔上内總萬幾海西公即位七月以琅琊王封絶復徙上為琅琊王封王子昌明為㑹稽王固讓不受太和元年十月詔以為丞相尚書入朝不趨讚拜不名劒履上殿給羽葆鼓吹班劒六十人固讓不受海西公廢於是大司馬溫率百官進太極前殿具乗輿法駕奉迎於朝堂變服著平巾幘單衣東向拜受璽流涕即位改太和六年為咸安元年乙夘廢太宰武陵王為庶人二年七月上不豫己未立㑹稽王昌明為皇太子封王子道子為琅琊王領㑹稽内史是日帝崩于東堂在位一年時年五十二續晉陽秋曰桓溫始以雄武入輔繼以廢立帝雖登祚内不自安初熒惑入太微尋廢海西公至是熒惑猶在太微帝惡之因謂郄超曰命之修短本欲不計故當無復徃日事耶超云大司馬臣溫方内固社稷外布經畧非常之事臣以百口保之超還東帝謂之曰致意尊公家國之事遂至於此由吾不能以道自衞思患預防愧歎之深言何能喻又誦庾闡詩云志士痛朝危忠臣哀主辱因泣下及不豫詔溫曰吾遂委頓足下便不冀得相見又詔曰不謂疾患遂至於此今者惙然勢不復久旦雖有詔豈復相及慨恨兼深如何可言天下艱難而昌明幼沖眇然非阿衡輔道之計當何以寧濟社稷國事家計一託之於公又曰帝以太興三年生弱而慧異中宗深器焉及長美丰姿好清言舉止端詳器服簡素與劉恢王蒙等為布衣之友由登庸厯位散騎常侍右將軍撫軍將軍以懿親民望任登宰輔値穆帝幼沖母后臨朝桓溫有平蜀洛之勲擅强西陵帝於家國之計具瞻所歸而自斷之弱無以抗之陳郡人殷浩素有盛名時論比之管葛又琅琊王洽丞相道子既是名公子少有聲望乃以浩為湘州刺史洽為長史徐州刺史葛美亦以清貴名藩同心憂國溫見此樹置知在抗已溫既以雄武專朝任兼將相悉衆北討以成樂推之勢及枋頭奔敗知民望之去乃屠豫州刺史袁眞于壽陽城既而郄超曰足下何以雪枋頭之恥乎超因説溫以廢立之事溫既宿有此謀深納超言既廢昏立明民人悦服然恭已南面政自溫出帝性韻深沈雅有局鎭嘗與太宰武陵王晞桓溫同乗至板橋溫宻勅令無因而鳴角鼔譟部伍並皆驚馳溫佯為駭異而晞大震驚急求下車帝舉止自若顔色不變溫毎以此稱其德量故論者服憚之深若假帝修年則溫簒逆之圖絶矣世説曰桓公既廢太宰武陵王晞父子仍上表云應割近情以存逺計欲除太宰父子可無後憂簡文手答表云所不忍言况過于言桓公得此答又重有表辭轉苦切為家國之計必應行事簡文復手答云若使晉室靈長明公便應奉詔書若大運去矣請避賢路桓公讀詔手戰汗流而止逺徙新安而已孝武皇帝晉書曰孝武皇帝諱曜字昌明簡文帝第三子也興寧二年七月甲申封㑹稽王咸安二年秋七月己未立為皇太子是日簡文帝崩太子即皇帝位詔曰朕以不造奄丁憫凶號天扣地靡知所訴藐然幼沖𦕈若綴旒深惟社稷之重大懼不克負荷仰慿祖宗之靈積德之祀先帝淳風𤣥德遺咏在民宰輔英賢勲隆德盛顧命之託實賴匡訓羣后率職百僚勤政冀孤弱之躬有寄皇極之基不墜先恩遺惠播於四海思𢎞餘潤以康黎庶其大赦天下與民更始九月甲寅追尊皇妣㑹稽王妃曰順皇后冬十一月甲午妖賊盧悚晨入殿庭遊擊將軍毛安之討擒之是歲三呉大旱人多餓死詔所在賑給寧康元年春正月乙丑改元二月大司馬桓溫來朝秋七月己亥使持節侍中都督中外諸軍事丞相録尚書大司馬揚州牧平北將軍徐兖二州刺史南郡公桓溫薨三年九月帝講孝經冬十月癸酉日有食之十二月甲申神獸門災癸未皇太后詔曰頃者日食告變水旱適遭雖克己思救未盡其方賜百姓窮者米各五斛癸巳帝釋奠于中室祀孔子以顔囘配泰元元年春正月帝加元服見于太廟皇太后歸政甲辰大赦改元庚午帝始臨朝六年春正月帝初奉佛法立精舍于殿内引諸沙門以居之八年八月苻堅率衆渡淮遣征討都督謝石冠軍將軍謝𤣥輔國將軍謝琰中郎將桓伊等拒之九月詔司徒琅琊王道子録尚書六條事冬十月苻堅弟苻雄陷壽春乙亥諸將及苻堅戰于淝水大破之俘斬數萬計獲堅輿輦及雲母車十二年六月癸夘束帛聘處士戴逵龔𤣥之秋八月辛巳立皇子德宗為皇太子大赦二十一年九月庚申帝崩于清暑殿在位二十四年時年三十五𦵏平陵帝幼稱聰悟簡文之崩也時年十歲至晡不臨左右進諫答曰哀至則哭何常之有謝安嘗嘆以為精理不減先帝既威權已出雅有人主之量既而溺於酒色殆為長夜之飲末年長星見帝心甚惡之夜於華林園舉酒祝之曰長星勸汝一杯酒自古何有萬歲天子耶太白連年晝見地震水旱為變者相屬醒日既少而傍無正人竟不能改焉時張貴人有寵年三十帝戱之曰汝以年當廢矣貴人潛怒向夕帝醉遂暴崩時道子昏惑元顯專權竟不推其罪人初簡文帝見䜟云晉祚盡昌明及帝之在孕也李太后夢神人謂之曰汝生男以昌明為字及産東方始明因以名焉簡文帝後悟乃流涕及為清暑殿識者以為清暑反為楚聲哀楚之徵也俄而帝崩晉祚自此傾矣續晉陽秋曰初帝耽於色末年殆為長夜之飲醒日既少多居内殿畱連于聲色之間時張貴人寵冠後宫威行閫内年幾三十帝妙列伎樂陪侍嬪少乃笑而戯之云汝年當廢矣吾已屬諸姝少矣貴人潛怒上不覺上稍醉卧貴人遂令其婢蒙之以被既絶云以魘崩至丑時方遷登太極前殿異苑曰晉孝武太元末帝毎聞手巾箱中有鼔吹鼙角之音于是請僧齋㑹夜見一臂長三丈許手長數尺來摸經案晉祚自此而衰太平御覽卷九十九
