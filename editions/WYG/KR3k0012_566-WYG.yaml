body:
  text: 太平御覽卷五百六十六宋李昉等撰樂部四厯代樂吕氏春秋曰昔葛天氏之樂三人操牛尾投足以歌八闋投猶蹀也一曰載民二曰𤣥鳥三曰遂草木四曰奮五榖五曰敬天常六曰逹帝功七曰依地徳八曰總禽獸之極又曰黄帝命伶倫與營援鑄十二鐘和五音以詔英韶以仲春之月乙卯之日日在奎始奏之命之曰咸池帝顓頊生自若水實處空桑空桑邑名乃登為帝惟天之合正風乃行徳與天合其音若熙熙凄凄鏘鏘帝顓頊好其音乃命飛龍作效八風之音命之曰承雲以祭上帝乃命鱓先為樂倡倡始也乃偃寢以其尾鼓其腹其音英英和盛之貌帝嚳命咸墨作為唐歌九招六列六英倕有作為擊鼓鐘磬吹笭展管篪鞀椎鍾帝嚳乃令人抃两手相擊曰抃或擊鼙擊鐘磬吹笭展箎因令鳯天翟舞之帝嚳大喜乃以康帝德康樂也安也帝堯立乃命質為樂質乃效山谿澗谷之音以歌質當為䕫乃以糜輅置缶而鼓之乃拊石擊石以象上帝玉磬之音以舞百獸瞽瞍乃拌拌分五弦之瑟作為十五弦之瑟命之曰大章以祭上帝舜立卯延乃拌瞽瞍之所為瑟益之八弦以為二十三弦之瑟帝舜乃命質修九招六列六英以明帝徳禹立勤勞天下日夜不懈通大川决壅塞鑿龍門䧏通漻水以導河䟽三江五湖注之東海以利黔首於是命臯陶作為夏籥九成以昭其功殷湯即位夏為無道暴害萬民侵削諸侯不用度軌天下患之湯於是率六師以伐桀之罪功名大成黔首寧乃命伊尹作為大濩歌晨露修九招六列六英以見其善周文王處岐諸侯去殷三滛而翼文王三滛割心斷脛刳孕散宜生曰殷可伐也文王弗許周公旦乃作詩曰文王在上於昭于天周雖舊邦其命維新以䋲文王之徳武王即位以六師伐殷六師未至以鋭兵克之於牧野乃獻俘馘於京大室乃令周公作為大武成王立殷民反王命周公伐之商服象為虐於東夷周公遂以師逐於江南乃為三象以嘉其徳故樂之所由来者尚矣生於度量本於太一太一出两儀两儀出隂陽隂陽變化一上一下合而成章渾渾純純離而復合合而復離是謂天常天地車輪終則復始極則復反莫不咸當日月星辰或疾或徐宿日月不同以盡其行四時代興或寒或暑或短或長或柔或剛萬物所出造本於太一化於隂陽萌芽始震震動也凝寒以形形體有䖏莫不有聲聲出於和和出於適先王定樂由此生天下太平萬民安寕皆化其上樂乃可成夫音亦有適太鉅則志蕩以蕩聽鉅則耳不容不容則横塞横塞則振動太小則志嫌以嫌聼小則耳不充不充則不詹不詹則窕太清則志危以危聼清則耳谿極谿虗極病谿極則不監不監則竭監察太濁則志下以下聼濁則耳不収不収則不摶不摶則怒不摶謂不專壹也故太鉅太清太小太濁皆非適也桀紂作為侈樂大皷鐘磬管簫之音以鉅為美以衆為觀俶詭殊瑰耳所未嘗聞目所未嘗見務以相過不用度量宋之衰也作為十秩鍾律之名齊之衰也作為大吕楚之衰也作為些音侈則侈矣自有道者觀之則失樂之情其樂不樂其民怨其生傷其生與樂也若氷之於炭反以自兵此生乎不知樂之情而以侈為務故也又曰帝顓頊好音乃令飛龍作八風之音命之曰承雲帝嚳命咸墨作唐歌九招六列禹䟽三江五湖命臯陶為夏籥九成湯率六師以誅桀之罪命伊尹為大濩歌晨露武王以六師伐殷乃命周公作為大武商人服象為虐於東夷周公以師逐之至於江南乃為三象以嘉其徳樂書曰謹按禮記䟽云伏羲樂曰立基言伏羲之代五運成立甲歴始基畫八卦以定隂陽造琴瑟以諧律吕繼徳之樂故曰立基也神農樂曰下謀言神農播種百榖濟育羣生造五絃之琴演六十四卦承基立化設降神謀故樂曰下謀以明功也黄帝樂曰雲門言黄帝之道成名百物明民共財徳如雲出其門民可有於族類故樂曰雲門帝系謀曰女媧命娥陵氏制都良管以一天下之音又命聖氏為班管合日月星辰名曰充樂樂既成天下幽㣲無不得理樂緯曰黄帝之樂曰咸池池者施也道施於民故曰咸池顓頊曰六莖道有根荃故曰六莖帝嚳曰五英道有英華故曰五英堯曰大章堯時仁義大行法度彰明故曰大章舜曰簫韶韶紹也舜紹堯之後修行其道故曰簫韶禹曰大夏禹承二帝之後道重太平故曰大夏殷曰大濩湯承衰而起䕶先王之道故曰大濩周曰勺又曰大武周承衰而起斟酌文武之道故曰勺春秋元命包曰王者不空作樂樂者和盈於内動發於外應其發時制禮作樂以成之是故作樂者必反天下之始樂於巳為本舜之時民樂其紹堯業故韶者紹也舜服繼堯之業禹之時民大樂其駢三聖相繼故夏者大也駢讀曰頻頻猶並也湯之時民大樂其救於患害故䕶者救也文王之時民樂其興師征伐故武者伐也四者天下所同樂一也其所同樂之端不可一也各樂其君所為故不可合四家以為一也樂苑曰文王樂名巨業武王樂名象武漢書曰樂家有制氏以雅樂聲律世世在大樂官但能記其鏗鏘鐘鼓而已不能言其義髙祖時叔孫通因秦樂人制髙廟樂太祝迎神於廟門奏嘉至李竒曰嘉善也善神之至猶古䧏神之樂也皇帝入廟奏永至以為行歩之節猶古采齊肆夏也乾豆上奏登歌不以管絃亂人聲欲在位者遍聞之猶清廟之歌也登歌再終下奏休承之樂服䖍曰叔孫通所奏樂也美神明既饗也皇帝就酒東廂坐定奏永安之樂美禮已成也又有房中祠樂髙祖唐山夫人所作也韋昭曰唐山姓也曰周有房中樂至奏名曰夀人孝惠二年使樂府令夏侯寛備其簫管更名曰安世樂髙祖奏武徳文始五行之儛孝文廟奏昭徳文始四時五行之儛武徳者髙祖四年作以象天下樂於巳行武以除亂也文始武儛者曰本韶儛也髙祖六年更名曰文始以示不相襲也五行儛者本周儛也秦始皇二十六年更名曰五行也四時儛者孝文所作以明宗天下之安和也盖樂已所自作明者制也樂先王之樂明有法也孝景采武徳儛以為昭徳以尊大宗廟至孝宣采昭徳儛以為盛徳以尊世宗廟諸帝廟皆常奏文始四時五行儛云髙祖六年又作昭容樂禮容樂昭容者猶古之韶夏主出武德儛禮容者主出文始五行儛儛入樂者將至至尊之前不敢以樂也出用樂者言武不失節能以禮樂終也皆因秦舊事焉初髙祖既定天下過沛與故父老相樂醉酒作風起之詩令沛中兒童百二十人習而歌之至武帝定郊祀之禮祠太一於甘泉就位也祭后土於汾隂澤中方丘也乃立樂府採詩依誦有趙代秦楚之謳以李延年為恊律都尉舉司馬相如等數十人告為詩賦畧論律吕以合八音之調作十九章之歌以正月上辛用祀甘泉圓丘使童男女七十人俱與昏祠至明夜常有神光如流星止集於祠天子自竹宫而望拜韋昭曰以竹為宫天子居之後漢書東平王蒼議以為漢制舊典宗廟各奏其樂皆不相襲以明功徳光武帝受命中興撥亂反正修建三雍肅祗禋祀徳化巍巍比隆前代歌所以詠徳舞所以象功世祖廟樂舞名宜曰大武之舞謹採百官頌可登歌者一章四句以為曲上從其議魏志曰明帝時有奏武皇帝撥亂反正為魏太祖樂用武始之舞文皇帝應天受命為魏髙祖樂用咸熙之舞明帝制作興治為魏列祖樂用章斌之舞沈約宋書曰周存六代之樂至秦惟餘韶武而已漢改周武舞曰五行改韶舞曰文始以示不相襲也髙祖又作昭容樂昭容生於武徳禮容生於文始五行也漢又有雲翹育命之舞雖莫知其所從来然因舊以祀天地也至明帝初東平憲王蒼總定公卿之議曰宗廟宜各奏樂不應相襲所以明功徳也採文始五行武徳真修為文武之舞又制舞歌一章薦之始祖之廟黃初二年改漢巴渝舞曰昭武舞改宗廟安和之樂曰正世樂嘉至樂曰迎靈樂武徳樂曰武頌樂昭容樂曰昭業樂雲翹舞曰鳳翔舞育命舞曰靈應舞武徳舞曰武頌舞文始舞曰大韶舞五行舞曰大武舞其衆歌詩多即前代之辭唯魏國初建使王粲改作登歌安世及巴渝詩而已又曰晉武帝太始二年改郊廟新歌其樂舞亦仍舊文改魏昭武羽籥舞曰宣文舞咸寕元年詔定祖宗之號而廟樂同用正徳大豫之舞至江左初立宗廟尚書下太常祭祀宜用樂名太常賀修荅云舊京荒廢今既散亡音韻曲折又無識者則於今者難以音言于時以無雅樂器及伶人省大樂并鼓吹令是後頗得登歌食舉之樂猶有未備故太寕末又訪防孚等増益之咸和中乃復置太樂宫鳩集遺逸又未有金石也初荀朂既以新律造二舞次更修正鐘磬朂薨事猶不竟元康三年詔其子黄門郎蕃修定金石以施郊廟尋值䘮亂莫有記者又曰魏公卿奏曰列祖未制樂舞非所以昭徳著功夫歌以詠徳舞以象事於文武為斌兼秉文武聖徳所以彰明也臣等謹制樂名曰章斌文武之舞又曰武帝永初元年有司奏皇朝肇建廟祀應設雅樂乃晉樂也太常鄭鮮之等各撰立新歌黄門侍郎王韶之撰歌七首並令施用十二月又奏依舊正朝設樂改大樂清歌詩王韶之撰二十二章又改正徳舞曰前舞文悦舞曰後舞文帝元嘉九年大樂令鍾宗之更調金石至十四年治書令史奚縱又改之二十二年南郊始設登歌詔顔延之造歌詩廟舞猶闕孝武建元元年有司奏前殿中曹郎荀萬秋議郊廟宜設備樂於是使内外博議竟陵王誕等並同萬秋議建平王宏議以凱容為韶舞宣烈為武舞祖宗廟樂總以徳為君章皇太后奏永樂永至等樂仍舊皇帝祠南郊及廟迎神送神並奏肆夏皇帝入廟門奏永至皇帝南郊初登壇及廟中詣東壁奏登歌其初獻奏凱容宣烈之舞終獻奏永安之樂郊廟同孝武又使謝莊造郊廟明堂諸樂歌辭二年有司又奏先郊廟舞樂皇帝親奉初登壇及入廟詣東壁並奏登歌不及三公行事左僕射建平王宏重議公卿行事亦宜奏登歌有司又奏元㑹及二廟齋祠歌伎舊並於殿庭設作廟祠依新儀注登歌人上殿絃管住下今元㑹登歌亦上殿絃管住下梁書武帝思復古樂天監元年下詔求學術通明者皆陳所見時對樂者七十八家咸言樂之宜改不言改樂之法帝素善音律遂自制四器名之為通以定雅樂莫不和韻初齊永明中舞人冠幘並簮筆皆身服朝衣而足綦讌履於是去筆乃定郊禋宗廟及三朝之樂以武舞為大壯舞取易云大者壯也正大而天地之情可見也以文舞為大觀舞取大觀在上觀天之神道而四時不忒也國樂以雅為稱取詩序云言天下之事形四方之風謂之雅雅者正也止乎十二月天數也乃去階歩之樂増撤食之雅皇帝出入宋孝建二年奏永至齊及梁初亦同至是改為皇雅取詩皇矣上帝臨下有赫也二郊太廟同用皇太子出入奏􅉙雅取詩君子萬年永錫爾𦙍王公出入奏寅雅取尚書周官貳公𢎞化寅亮天地也上夀酒奏介雅取詩君子萬年介爾景福也食舉奏需雅取易雲上於天需君子以飲食宴樂也徹饌奏雍雅取禮記大饗客以雍徹也並三朝用之犧牲出入宋廢帝元徽二年儀注奏引牲齊及梁初亦同至是改爲滌雅取禮記牛必在滌三月薦毛血元徽三年儀注奏嘉薦至是爲牷雅取左氏傳牷牲肥腯北郊明堂大廟並同降神及迎送宋元徽三年儀注奏昭夏齊及梁初亦同至是改為諴雅取尚書至諴感神皇帝飲福酒宋元徽三年儀注奏嘉胙至齊不改梁初更為永胙至是改為獻雅取禮記祭統尸飲五澆玉爵獻即今之福酒亦古之獻義也北郊明堂太廟同就燎位宋元徽三年儀注奏昭逺及齊不改就埋位齊永明六年儀注奏𨽻幽至是燎埋俱奏禋雅取周禮大宗伯以禋祀昊天上帝也衆官出入宋元徽三年儀注奏肅咸樂齊及梁初亦同至是改為俊雅取禮記司徒選士之秀者而升之於學曰俊士也二郊太廟明堂三朝同用焉其辭並沈約所製是時禮樂制度粲然有序鼓吹宋齊並用漢曲又充庭用十六曲武帝乃去其四留其十二合四時也更製新歌以述功徳天監七年將有事太廟詔曰禮云齋日不樂今親奉始出宫振作皷吹外可詳議八座丞郎􅄁議請輿駕始出鼓吹從而不作還宫如常儀帝從之遂為定制初武帝之在雍鎮有童謡云襄陽白銅鍉反縳揚州兒識者言白銅謂金蹄為馬也白金色及義師之興實以鐡騎揚州之士皆面縳果如謡言故即位之後更造新聲帝自為之詞三曲又令沈約為三曲以被管絃帝篤敬佛法又制善哉天樂大歡天道仙道神王龍王滅過惡除愛水斷苦輪等十篇名為正樂皆述佛法又有法樂童子伎童子倚歌􅆊唄設無遮大㑹則為之其後䑓城淪沒侯景以簡文女溧陽公主為妃請帝及主母范淑妃宴於西州奏梁所常用樂景儀同索超世亦在宴筵帝澘然屑涕景曰陛下何不樂也帝强笑曰丞相言索超世聞此以為何聲景曰臣且不知何獨超世自此樂府弗修風雅咸盡及破侯景諸樂在荆州經亂工器頗闕元帝詔有司補綴纔備荆州䧟沒周人初不知採用工人有知音者並入闗中隨例多沒為奴婢又曰陳武帝欲設樂有司議以武帝非時碩學名儒朝端在位者咸希上㫖唯祠部侍郎姚察乃轉引經籍獨違群議據梁樂為是當時驚駭莫不慙伏又曰周樂曰武曰勺武象武王能以武禁暴也勺象周公制禮斟酌文武之道也又有房中之歌后妃之徳周補六代之樂唯闕六莖與五英至秦餘韶武房中而已始皇改武曰五行房中曰夀人衣服用五行之色又曰漢髙帝改韶樂曰文始髙帝好夀人之聲恵帝使太樂令夏侯寛合之絃管改名曰安世魏復文始曰大韶五行曰大武改安世曰正世晉改大韶曰宣文正世曰房中晉亂後亡文舞秉羽籥皆宣文之遺法又曰漢樂曰武徳昭容巴渝四時昭徳盛德大武雲翹育命武徳昭容巴渝並髙祖所造也武徳舞人執干戚以象天下行武除亂也四時文帝所作以象天下太平昭徳景帝作之以享太宗廟盛徳宣帝作之以享世祖廟諸帝之廟常奏文始四時五行之舞武帝始加武徳而去四時酧祭髙祖歌海泰龜龍又有青陽朱眀西皓𤣥𠖇等歌以迎四氣春夏舞雲翹秋冬舞育命季夏則歌朱明而兼舞二舞光武平隴蜀尊郊祀髙祖配享南郊兼用五郊歌舞地祗時常亦用之魏武改武徳曰武頌昭容曰昭業巴渝曰昭武雲翹曰鳯翔育命曰靈應晉改昭武曰宣武遭晉亂惟巴渝存隋𨽻清樂部又曰宋樂曰凱容宣烈並文帝所造至梁亡梁樂曰大壯大觀並武帝所造至陳亡隋樂以夏為名舞曰大武文帝所造自東晉至隋易服變名為異其實不全殊也又曰晉樂曰正徳大豫並武帝所造武帝因漢魏舊禮定㑹儀正旦夜漏未盡七刻設庭燎漏盡皇帝出鍾磬作公卿奉贄幣訖太樂令跪請奏雅樂皇帝乃入謂之晨賀晝漏上水三刻皇帝又出百官上夀酒太樂令跪奏請進樂鼓吹合作鼓吹令又奏請進伎别置女樂三十人於黄帳外奏房中之歌江左始廢此禮宋改正徳為前舞大豫為後舞唐㑹要曰太宗七年正月七日製破陣樂舞左圎右方先偏後互魚麗鵝貫箕張翼舒交錯屈伸首尾廻牙以象戰陣之形起居郎吕才依圖教樂工一百二十人被甲執㦸而習之凡舞三變毎變為四陣有徃来疾徐擊刺之象以應歌節數日而就其後令魏徴虞世南褚亮李百藥改制歌詞更名七徳之舞十五日奏之於庭觀者覩其抑揚蹈厲莫不振腕踴躍悚然振慄武臣烈將咸上夀云此舞皆陛下百戰之形容於是咸稱萬嵗又曰貞觀元年正月三日殿宴羣臣奏秦王破陣樂之曲太宗謂侍臣曰朕昔在藩邸屢有征伐世間遂有此歌豈意今日登於雅樂然其發揚蹈厲雖異文容功業由之致有今日所以被於樂章示不忘本也尚書右僕射封徳彛進曰陛下以聖武戡難立極安人功成化定陳樂象徳實𢎞濟之盛烈為將来之觀文容習儀豈得為比太宗曰朕雖以武功定天下終當以文徳綏海内文武之道各隨其時公謂文容不如蹈厲斯為過矣又曰貞觀中太宗幸慶善宫宫在武功縣即髙祖舊宅也宴從臣於渭濱其宫即上降誕之所上乃賦詩十韻夀丘雖舊跡鄷邑乃前基粤余承累聖懸弧亦在兹弱齡逄運改提劍欝匡時指麾八荒定懐柔萬國夷梯山仍入欵駕海亦来思單于陪武帳日逐衛文貔端扆朝四岳無為任百司霜節明秋景輕氷結水湄芸黄遍原隰禾頴積成坻共樂還譙宴驩比大風詩賞賜閭里有同漢之宴沛焉於是起居郎吕才播於樂府被之管絃名曰功成慶善樂之曲令兒童八人冠進徳冠紫袴褶為九功之舞毎冬享讌及國有大慶與七徳之舞皆奏於庭先是神功破陣樂功成慶善樂二舞毎奏上皆立對髙宗時太常博士裴守貞奏議曰竊惟二舞屬肇謳吟贊九成之茂烈恊萬國之歡心義均韶夏用兼賓祭皆祖宗盛徳而子孫享之詳覽博記未有聖王立觀之禮並謂守貞之議是也又曰咸享中髙宗自製樂章十四首有上元二儀三才四時五行六律七政八風九官十洲得一慶雲之曲詔有司諸大祠享並奏之太平御覽卷五百六十六
