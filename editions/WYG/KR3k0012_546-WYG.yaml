body:
  text: 太平御覽卷五百四十六宋李昉等撰禮儀部二十五居喪奔喪訃告奪情居喪禮記曲禮曰居喪未葬讀喪禮既葬讀祭禮喪復常讀樂章為禮各于其時居喪不言樂又曰居喪之禮頭有瘡則沐身有瘍則浴有疾則飲酒食肉疾止復初不勝喪乃比於不慈不孝又檀弓上曰穆公之母卒使人問於曾子曰如之何對曰申也聞諸申之父曰哭泣之哀齊斬之情饘粥之食自天子逹又曰始死充充如有窮既殯瞿瞿如有求而弗得既葬皇皇如有望而弗至練而慨然祥而廓然又曰子路有姊之喪可以除之矣而弗除也孔子曰何弗除也子路曰吾寡兄弟而弗忍也孔子曰先王制禮行道之人皆弗忍也子路聞之遂除之又曰子思之哭嫂也爲位禮雖無服爲位而哭曾子曰小功不税則是逺兄弟終無服也而可乎追服爲税曾子曰喪有疾食肉飲酒必有草木之滋焉以爲薑桂之謂也曾子所云草木之滋者薑桂也又檀弓下曰子張問曰書云高宗三年不言言乃讙有諸時人君無行三年之喪禮者讙喜悦也言乃喜悦則臣民望其言久也仲尼曰胡爲其不然也古者天子崩王世子聽於冡宰三年又曰顔丁善居喪顔丁魯人始死皇皇焉如有求而弗得及殯望望焉如有從而弗及既𦵏慨焉如不及其反而息此三者子哀慕之情也又檀弓上曰孔子在衞有送𦵏者而夫子觀之曰善哉爲喪乎足以爲法矣小子識之子貢曰夫子何善爾也曰其往也如慕其反也如疑慕謂小兒隨父母啼呼疑然者哀親之在外如不欲返又曰孔子既祥五日彈琴而不成聲哀未㤀也十日而成笙歌踰月日異旬也祥者凶事用逺日五日彈琴十日笙歌除由外也彈琴以手笙歌以氣也又曰孔子與門人立拱而尚右二三子亦皆尚右傚孔子也孔子曰二三子之嗜學也我則有姊之喪故也二三子皆尚左又曰孟獻子禫縣而不樂比御而不入可以御婦人矣尚未復孟獻子魯大夫仲孫蔑也夫子曰獻子加於人一等矣加猶愈也又檀弓下曰樂正子春之母死五日而不食子春曾子弟子曰吾悔之自吾母而不得吾情吾惡乎用吾情惡乎猶言何也又王制曰三年之喪自天子達於庶人喪從死者祭從生者又曾子問曰父母之喪弗除可乎以其有終身之憂也孔子曰先王制禮過時弗舉禮也非弗能勿除也患其過於制也故君子過時不祭禮也又雜記曰凡喪服未畢有弔者則爲位而哭拜踊客始來主人不可以常禮待之大夫之哭大夫弁絰大夫與殯亦弁絰弁絰者大夫錫衰相弔之服也如爵弁而素如環絰曰弁絰大夫有私喪之葛則於其兄之輕喪亦弁絰又曰有父之喪如未没喪而母死其除父之喪也服其除服卒事反喪服没猶卒也除服謂祥祭之服也卒事既祭反喪服服後死者之服雖諸父昆弟之喪如當父母之喪其除諸父昆弟之喪也皆服其除喪之服卒事反喪服雖有親之大喪猶爲輕服者除骨肉之恩也惟君之喪不除私服言當者期大功之喪或終始皆在三年之中也小功緦麻則不除殤長中乃除也又曰子貢問喪子曰敬爲上哀次之瘠爲下顔色稱其情戚容稱其服問喪問居父母之喪也喪當哀言敬爲上者疾時尚不能敬也容威儀也孝經曰容止可觀請問兄弟之喪子曰兄弟之喪則存乎書䇿矣言疏者如禮行之未有加也非若父母之喪哀容體狀之不可名言而經不能備言也君子不奪人之喪重喪禮也亦不可奪喪也不可以輕之於己也又曰孔子曰少連大連善居喪三日不怠三月不懈期悲哀三年憂東夷之子也言其生于夷狄而知禮也怠惰也懈倦也又曰三年之喪言而不語對而不問廬堊室之中不與人坐焉在堊室之中非時見乎母也不入門言言己事也爲人説爲語在堊室之中以時事見乎母乃復入門則居廬時不入門也疏衰皆居堊室不廬廬嚴者也言廬哀敬之處非有其實則不居又曰縣子曰三年之喪如斬期之喪如剡言其痛之惻怛有淺深也期之喪十一月而練十三月而祥十五月而禫又曰曾申問於曾子曰哭父母有常聲乎曰中路嬰兒失其母焉何常聲之有又間傳曰斬衰何以服苴苴惡貌也所以首其内而見諸外也斬衰貌若苴齊衰貌若枲大功貌若止小功緦麻容貌可也此哀之發於容體者也人憂者面必黎黒止謂不動于喜樂之常也枲或作似斬衰之哭若往而不反齊衰之哭若往而反大功之喪三曲而偯小功緦麻哀容可也此哀之發於聲音者也三曲一舉聲而三折斬衰唯而不對齊衰對而不言大功言而不議小功緦麻議而不及樂此哀之發于言語者也謂陳説非時事也斬衰三日不食齊衰二日不食大功三不食小功緦麻再不食始死一不食始斂時一不食也故父母之喪既殯食粥朝一溢米莫一溢米齊衰之喪疏食水飲不食菜果大功之喪不食醯醬小功緦麻不飲醴酒此哀之發於飲食者也父母之喪既虞卒哭疏食水飲不食菜果期而小祥食菜果又期而大祥有醯醬中月而禫禫而飲醴酒始飲酒者先飲醴酒始食肉者先食乾肉父母之喪居倚廬寢苫枕塊不税絰帶齊衰之喪居堊室芐剪不納大功之喪寢有席小功緦麻牀可也此哀之發於居處者也又奔喪曰聞逺兄弟之喪既除喪而后聞喪免袒成踊拜賓則尚左手小功緦麻不税者也雖不服猶免袒尚左手吉拜也又問喪曰親始死雞斯徒跣扱上衽交手哭惻怛之心痛疾之意傷腎乾肝焦肺水漿不入口三日不舉火故鄰里爲之糜粥以飲食之親父母也雞斯當爲笄纚聲之誤也親始死去冠二日乃去笄纚括髪也今時始喪者邪巾貊頭笄纚之象也又喪服四制曰父母之喪衰冠繩纓菅屨三日而食粥三月而沐期十三月而練冠三年而祥比終兹三節者仁者可以觀其愛焉知者可以觀其理焉彊者可以觀其志焉又三年問曰三年之喪何也稱情而立文因以飾羣别親疎貴賤之節而弗可損益也故曰無易之道稱情而立文者利人情輕重而制其禮也創鉅者其日久痛甚者其愈遲三年者稱情而立文所以爲至痛極也斬衰苴杖居倚廬食粥寢苫枕塊所以爲至痛飾也三年之喪二十五月而畢哀痛未盡思慕未忘然而服以是斷之者豈不送死有已復生有節也哉凡生天地之間者有血氣之屬必有知有知之屬莫不知愛其類今是大鳥獸則失喪其羣匹越月踰時焉則必反巡過其故鄉翔迴焉鳴號焉躑躅焉蜘蹰焉然後乃能去之小者至于燕雀猶有啁噍之頃焉然後乃能去之故有血氣之屬者莫知于人故人于其親也至死不窮則三年之喪二十五月而畢若駟之過隙然而遂之則是無窮也故先王焉爲之立中制節壹使足以成文理則釋之矣立中制節謂服有年月之限也然則何以至朞也言三年之義如此則何以降至于朞者父在爲母服朞也曰至親以朞斷是何也曰天地則已易矣四時則已變矣其在天地之中者莫不更始焉以是象之也然則何以三年也曰加隆焉􅈛也焉使倍之故再朞也喪三年以爲隆緦麻小功以爲殺雖情不至制以此服所以立法朞九月以爲間間在三年之下緦麻小功之上也隨情輕重處之上取象于天下取法于地中取則于人人之所以羣居和壹之理盡矣取象于天地所謂法其變易也自三年以至緦麻皆歳之數左氏傳襄上曰晏桓子卒晏嬰粗縗斬斬不緝也粗三升布苴絰帶杖菅屨苴麻之有子者菅草屬食粥居倚廬寢苫枕塊此禮與士禮畧同此異唯枕草其老曰非大夫之禮時人所行及士縗服各有不同晏子時爲大夫行士禮其家臣不解故譏曰唯卿爲大夫家語曰子夏問曰居君之母與妻之喪如之何孔子曰居處言語飲食侃􅈛于喪所則稱其服而已敢問伯叔母如之何曰伯母叔母疏衰期踊不絶地姑姊妹之功踊絶于地若知此由文矣哉言知禮之意也南史曰王秀字伯奮幼時祖父敬𢎞愛其風采仕宋爲太子舍人父卒廬于墓側服闋復職梁書到溉遭母憂居喪盡禮所處廬開方四尺毁瘠過人服闋猶蔬食布衣者累載又曰孔奐爲儀曹侍郎遭母憂時天下喪亂皆不能終三年奐及吳國張種在冦亂中禮法有度並以孝聞奔喪禮記奔喪曰奔喪之禮始聞親喪以哭答使者盡哀問故又哭盡哀遂行日行百里不以夜行唯父母之喪見星而行見星而舍侵晨冒昏行者蓋欲從速若未得行則成服而後行過國至境哭盡哀而止哭避市朝望其國境哭至於家入門左升自西階殯東西面坐哭盡哀括髪袒降堂東即位西鄉哭成踊襲絰於序東絞帶反位拜賓成踊送賓反位有賓後至者則拜之成踊送賓皆如初奔母之喪西面哭盡哀括髮袒降堂東即位西鄉哭成踊襲免絰於序東拜賓送賓皆如奔父之禮婦人奔喪升自東階殯東西面坐哭盡哀東髽即位與主人拾踊拾更也主人與之更踊盡哀而哭者賓客待之也又曰奔喪者不及殯先之墓北面坐哭盡哀主人之待之也即位於墓左婦人墓右成踊盡哀括髪東即主人位絰絞帶哭成踊拜賓反位成踊又曰若所爲位家逺則成服而往齊衰望鄉而哭大功望門而哭小功至門而哭緦麻即位而哭奔喪哭親疎逺近之差也訃告禮記雜記上曰凡訃于其君曰君之臣某死訃或作赴赴吿也臣子使人至君所吿也父母妻長子曰君之臣某之某死此臣子其家喪所主者君訃于他國之君曰寡君不禄敢吿于執事夫人曰寡小君不禄太子之喪曰寡君之適子某死君夫人不稱薨告于國君謙也大夫訃于同國適者曰某不禄訃于士亦曰某不禄訃于他國之君曰君之外臣寡大夫某死訃于適者曰吾子之外私寡大夫某不禄使某實禄謂有爵者實當爲至也士訃于同國大夫曰某死訃于他國之君曰君之外臣某死訃于大夫曰吾子之外私某死訃于士亦曰吾子之外私某死白虎通曰天子崩訃告諸侯者何緣臣子哀痛憤懣無聊無能不告語人者也諸侯欲聞之當將土地所出以供喪事故禮曰天子崩遣使者訃吿諸侯又曰諸侯薨使臣歸瑞珪于天子者何諸侯以瑞珪爲信今死矣嗣子諒闇歸之者讓之義也天子聞諸侯薨哭之何􅃤怛發中哀痛之至也使大夫弔之追逺重終之義又曰臣死亦訃告君何此君哀痛于臣子也君欲問之當加賻􅈖之禮故春秋曰蔡侯考父卒卒訃而𦵏不告諸侯薨訃告鄰國緣何鄰國欲有禮也奪情禮記曾子問曰子夏問三年之喪卒哭金革之事無避也者禮與初有司與疑有司使之然孔子曰夏后氏三年之喪既殯而致事殷人既𦵏而致事致事還其職位於君記曰君子不奪人之親亦不可奪親也此之謂乎子夏曰金革之事無避也者非與孔子曰吾聞諸老聃曰昔者魯公伯禽有爲爲之也今以三年之喪從其利者吾弗知也東觀漢記曰桓焉爲太傅以母憂自乞聽以大夫行喪踰年詔賜牛酒奪服即拜光禄大夫遷太常後漢書曰耿恭征疎勒時母卒及還追行喪制有詔使五官中郎將齎牛酒釋服奪情不令追服又曰趙憙代虞延行太尉事遭母憂上疏乞身行喪禮顯宗不許遣使者爲釋服賞賜恩寵甚渥漢雜事曰翟方進爲丞相遭後母喪行服三十六日起視事曰不敢踰國家也吳志曰孫權詔曰夫三年之喪天下達制人情之極痛也賢者志哀以從禮不肖勉而致之也治道以泰上下無事君子不奪人情故三年盡孝子之情至于有故則殺禮以從宜要絰而事故聖人制法有禮無時不行喪不奔訃非古也而隨時之宜以義斷恩也前故設科長吏在官當須交代而故犯之雖隨糾坐猶以廢曠方事之殷國家多難凡在官司宜各盡節先公後私而不恭承甚非謂也中外羣僚其更平議務令得中節度丞相顧雍奏從大辟其後吳令孟宗喪母奔赴已而自拘于武昌以聽刑戮陸遜陳其素行固爲之請減宗等後不得以爲目此禮遂絶風俗通曰謹按禮臣有大喪三年不呼其門太平御覽卷五百四十六
