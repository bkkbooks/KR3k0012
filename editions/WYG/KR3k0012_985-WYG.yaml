  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_985-1a, image: WYG0901/WYG0901-0632a.png}
body:
  text: 太平御覽卷九百八十五宋李昉等撰兼藥部二丹芝上丹易叅同契曰丹砂木精得金乃升書曰荆及衡陽惟荆州杶幹栝栢礪砥砮丹砥細于礪皆磨石也砮石中矢鏃丹朱類汲冡周書王㑹曰成王時濮人獻丹沙濮人西南角之蠻丹沙所出孝經援神契曰德至山陵則陵出黑丹朱均注丹應五典備五色也春秋運斗樞曰揺光得陵出黑芝亦令人長生以金投中則名為金漿以玊投中則名為玊液服之皆長生又有取伏丹法云天下諸水有石丹者其水中皆有丹魚先夏至十日夜丹魚必浮于岸側赤光上照赫然如火網而取之雖多勿盡取之也割取血以塗足下則可歩行水上常居水中史記曰寡婦清其先得丹穴而擅其利清寡婦能守其業始皇為築女懐清臺梁書曰陶𢎞景既得神符秘訣以為神丹可成而苦無藥物帝乃給黄金朱砂曾青雄黄等後合飛丹色如霜雪服之體輕及帝服飛丹有驗益敬重其事唐書曰道士劉道合者宛丘人髙宗令合還丹丹成而上之咸亨中卒惟有空皮而背上開拆有似蟬蜕髙宗聞之曰劉師為我合丹自服仙去其所進者亦無異典略曰白丹者山陵之精也淮南子曰赤水宜丹黄水宜金清水宜龜抱朴子曰余考覽養生之書究集乆視之方曾所披渉篇以千計矣莫不以還丹金液為大要焉然則二事蓋仙道之極也服此而不仙則古無仙矣昔左元放于天柱山中精思神人授以丹經仙公從元放受之凡受太清丹經三卷及九昇丹經一卷金液經一卷予師鄭君者予從祖仙公之弟子乃于馬迹山丘墠盟受之并其諸口中訣之不書者又曰太清神丹其法出元君元君老子之師也太師觀天經有十四篇云其上七篇不可以教授其中四篇無足傳沉之三泉下篇者正是丹經上中下三卷其經曰上不得道長生世間又曰漢末新野隂君合此太清丹得仙其人本儒生有才思著書及丹經贊并序述初學道隨師本末引已所知識之得仙者四十餘人甚分明也又曰有九光丹與九轉異法大都相似耳作之法當先以諸藥合水火以轉五石五石者丹砂䧺黄礜石曾青磁石也一石轉五轉而各成五色五石合為二十五色各一兩而異噐盛之欲起死人未滿三日取青丹一刀圭和以水浴死人之身又以一刀圭發其口内死人立生欲至行厨取黑丹和以塗左手所求皆得此道可致天下萬物也欲隐形及先知末然方來之事及延年不老服黄丹一刀圭即便長生不復老坐見千里之外吉凶皆如在目前也人生相命盛衰壽夭貴賤貧富皆知之矣其法具在太清中卷又曰五帝云丹方一卷其法五也用丹砂雄黄石流黄石青礜石磁礬石戎鹽太一禹餘粮亦同太一泥及神室祭醮之三十六日成又曰以金液為威起巨勝之法取金液及水銀合煑之三十日出以黄土甌盛封以太一泥置之猛火上炊之卒時皆化為丹服如小荳便仙以此丹一刀圭粉和水銀一斤即成銀又取此丹一斤置猛火上扇之化為赤金而流名曰丹金以塗刀劍去萬里以此丹金為盤碗食其中令長生以成日月得神液如方諸之得水也飲之令人不死又曰九丹成為仙藥之上然合作之所用雜藥甚多若四方清通者市之可得取若九域分攝則其物或不可得也又曰葛稚川云其祖鴻臚少時曾為臨流令云此縣有廖氏家世壽考或出百嵗或八九十嵗後徙去子孫多夭折他人入居其故宅者復累長夀由此乃覺是宅所為而不知其何故疑其井水殊赤乃試掘井左右得古人埋丹砂數十斤山海經曰拒山英水出焉其中多丹粟又曰始州國有丹山論衡曰太公隂謀書武王伐紂令小兒以丹塗身純赤常大呌云殷王亡民見兒身赤以為天神説文曰丹巴越之赤石也雘善丹也神仙傳曰采女請問彭祖延年之法彭祖曰欲舉形登天上補仙官者當用金丹此九天太一所以白日昇天又曰馬明王從道人受太清神丹經三卷入山合藥服之不老昇天但服半劑為地仙展轉九州百餘年乃白日昇天也又曰淮南王安從仙公受金丹及三十六水方又曰李少君從安期先生受神丹爐火之方家貧不得藥乃以方干漢武帝云又曰葛𤣥字孝先從左元放受丸丹金液仙經又曰劉元鳳南陽人服芙蓉丹及雞子丹魯女生别傳曰李少君字雲翼齊國臨淄人也少好道入山採藥修全身之術道未成而病困于山林中遇安期先生經過見少君少君叩首求乞生活安期愍其有志乃以神樓散方與之服即起少君求隨安期奉給奴役廣志曰丹者朱砂之朴也大者如米生山中出牂牁與古倭國裴淵廣州記曰鄣平縣有朱砂塘水如絳又曰鄣平縣有石膏山望之若霜雪蓋嶺東為銀石南是鐡石西則丹砂北乃銅石本草曰丹砂味甘㣲寒生山谷養精神益氣明目鉛丹味㣲寒生平石治吐逆反胃乆服成仙生蜀都吳氏本草曰丹砂神農甘黄帝岐伯苦有毒扁鵲苦李氏大寒或生武陵採無時能化朱成水銀畏磁石惡鹹水武陵太守謝承表曰新宮成上丹砂五百斤上億萬嵗之夀芝上春秋運斗樞曰揺光得陵缺黒芝孝經援神契曰德至草木則芝草生出爾雅曰􅌲芝也漢書曰武帝時芝生殿内房中九莖上赦詔天下作芝房歌又曰宣帝神爵元年三月詔曰金芝草九莖產于涵德殿銅池東觀漢記曰明帝永平七年公卿以芝生前殿表賀奉觴上夀又曰桓帝建和元年芝生中黄藏府又曰光和四年郡國上芝草英續漢書曰建初五年零陵女子酆寜宅内生紫芝五株長者尺四寸短者七八寸太守沈博使功曹齎芝以聞帝吿示天下宋書曰順帝昇明二年臨城縣生紫蓋黄裏芝歴時質色不變唐書曰貞觀中皇太子寢室中產素芝十四莖並為龍興鳳翥之形又曰天寶中有玉芝產于大同殿之柱礎一本兩莖神光照于殿又曰上元中延英殿御座生玉芝一莖三花御製三靈芝詩淮南子曰巫山之上從風縱火紫芝與蕭艾俱死又曰稻生于水而不能生于湍瀬之間芝生于山而不能生于盤石之上抱朴子曰芝者有石芝有木芝有草芝有肉芝有􅌲芝名有百許種也石芝者石象生于海隅山石及島嶼之涯肉芝者狀如肉頭尾四足良似生物也附于大石蓋在髙岫嶮峻之地或却着仰着仰綴也赤者如珊瑚白者如截肪黑者如澤漆青者如翠羽黄者如紫金而光明洞徹皆如堅氷也晦夜去芝一二百歩便望見其光矣大光十餘升小者三四升非乆齎至精及佩老子入山靈寶五符亦不能得見此光凡見諸芝其先以開山却将符置其上則不得復隐蔽化去以徐徐擇王相之日設醮然後取之皆從日下禹歩閉氣而往也又得石象𢷬之三萬六千杵服方寸七日盡一斤則得千嵗十斤則萬嵗亦可分人服之玉脂芝生于有玉之山常居懸危之處玉膏流出萬年已上則凝而成之有如鳥獸之形也色無常采率多似山水蒼玉亦鮮明如水精得而采之以無心草汁和之須臾成水服一升得一千嵗也又曰七明九光芝皆石也生臨水之髙山石涯之間狀如盤椀不過徑尺以還有莖葉連綴之起三四寸有七孔者名九光皆如星百餘歩内夜可望見其光其光自别常以秋分伺而得之時服則翕然身熱五味甘美盡一斤則得千嵗令人身有光所居暗地如月可以夜視書也又曰石蜜芝生少室石戸中便有深谷不可得過以石投谷中半日猶聞其聲也去户外十餘丈有石柱柱上有偃蓋石度徑可一丈許芝生石上墮入偃蓋中良乆輙有一滴有似雨後屋之餘漏時時一落耳然蜜芝墮不息而偃蓋亦終不溢也户上刻石為科斗字曰得服石蜜芝一斗者萬嵗夀諸道士共思推其處不可得往唯當以椀噐著勁竹木端以承取之然竟未有得為之者按此户上則刻題如此前世必已有得之者矣又曰石桂芝生巖穴中似桂樹而實石也高尺許色明而味辛有枝條搗服之一斤得千嵗也石中黄子所在有之泌所山為尤多在其大石之中則其石常潤濕不燥打其石石有數十重乃得之在大石中赤黄溶溶如雞子在壳中也即當飲之不飲則漸堅凝成石不可服也法當未及堅時歠之既凝則不得服也破一石中多者有一升少者有數合不可頓食雖不得相繼服之共計前後服合成三斗則千嵗但欲多唯患難得耳又曰石脛芝生滑石中亦如石中服黄子狀但不皆有耳打破大滑石千許乃可得一升初破之其在石中五色光明而自動服一斗得一千嵗又曰木芝者松栢脂淪地千嵗化為茯苓萬嵗其上生小木狀如蓮花名曰木威喜芝夜視有光持之甚滑燒之不焦𢃄之辟兵以帶雞而雜他雞十二頭共籠之去十二歩射十二箭他雞皆傷帶威喜者終不傷也從生門上採之六甲隂中乾之百日末服方寸日三盡一枝則三千嵗也太平御覽卷九百八十五
