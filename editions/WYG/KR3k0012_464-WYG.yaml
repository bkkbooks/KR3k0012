body:
  text: 太平御覽卷四百六十四宋李昉等撰人事部辯下晉書曰王衍妙善𤣥理唯談莊老為事每捉玉柄麈尾與手同色義理有所不安隨即改更世號口中雌黄朝野翕然謂之一世龍門又曰謝安常賞袁宏機對辯速安為揚州刺史宏自吏部郎出為東陽郡及祖道於冶亭時賢皆集安欲以卒廹試之臨别執宏手顧左右取一扇而授之曰聊以贈行宏應聲荅曰輒當奉揚仁風慰彼黎庶又曰華譚或問曰諺云人之相去如九牛毛寧有此理乎譚對曰昔許由讓天子之貴市道小人争半錢之利此相去何啻九牛毛也聞者稱善又曰吕珩問袁甫曰卿名能辯豈知夀陽已東何以恒水甫曰夀陽已東皆是吳人夫亡國之音哀以思鼎足疆邦一朝失職憤歎甚積積憂成雨雨久成水故其地恒澇也又曰祖納謂梅陶及鍾雅曰君汝潁之士利如錐我幽兾之士鈍如椎持鈍椎捶君利錐皆當摧矣陶雅並稱有神錐不可得摧納曰假有神錐必有神椎陶雅無以對又曰武帝始登祚探策得一王者世數繫此多少武帝不怡羣臣失色莫能有言者侍中裴楷正容儀進曰臣聞天得一以清地得一以寧侯王得一以為天下貞帝意恱羣臣歎服又曰李宻字令伯犍為武陽人蜀朝舊臣數使扵吳應機當議吳人稱其才辯蜀平以太子洗馬召張華問曰安樂公何如宻曰可次齊桓華問其事宻曰齊得管仲而霸得竪刁而流亡安樂公得諸葛亮而抗魏後任黄皓而䘮國成敗一也又曰釋道安俊辯有髙才自北至荆州與習鑿齒初相見道安曰彌天釋道安鑿齒曰四海習鑿齒宋記曰孝武常賜謝莊寳劒莊以與豫州刺史魯爽後反叛孝武因宴集問劒所在荅曰昔與魯爽别竊為陛下杜郵之賜上甚恱當時以為知言蕭子顯齊書曰張融字思光吳郡人也𤣥義無師法而神王過人白黒談論鮮能抗拒又曰周顒字彦倫汝南人音辭雅麗出言不窮商較朱紫發口成句每賓友㑹同顒虛席晤言聲音如流聽者忘倦蕭方等三十國春秋曰劉裕為太尉中書監裕既拜朝賢畢至僕射謝混後來衣冠傾縱頗有傲慢之容裕甚不平乃謂之曰何為旁若無人混對曰明公將隆伊周之化方使四海解衿謝混何人而敢獨異乎乃以手板披撥其衿領悉皆解散裕大恱魏收魏書曰李諧字䖍和博學才辯天平中以諧兼散騎常侍為聘梁王衍遣主客郎范胥當接胥曰黄旗紫盖本出東南君臨萬邦故宜在此諧荅帝王符命豈得與中國比隆紫盖黄旗終扵入洛無乃自害耶陳書曰簡文在東宫召戚衮講論又嘗置宴集𤣥儒之士先命道學互相質難次令中庶子徐摛馳騁大義間以劇談摛辭辯縱横難以荅抗諸人懾氣皆失次序衮時騁義摛與往復衮精采自若對荅如流簡文深加欣賞隋書曰吳興沈重名為碩學髙祖嘗令辛彦之與重論議重不能抗扵是避席而謝之曰辛所謂金城湯池無可攻之勢髙祖太恱又曰蘇䕫字伯尼少聰敏有口辯煬帝嘗從容謂宇文述虞世基等曰四夷率服觀禮華夏鴻臚之職須歸令望寧有多才多藝美容儀可以接對賓客者為之乎咸以䕫對是日拜鴻臚少卿又曰栁䛒為東宫學士每召入卧内與之宴謔䛒尤俊辯多才侍從有所顧問應荅如響唐書曰薛收歸國秦府記室房𤣥齡薦之扵太宗即日召見問以經畧收辯對縱横皆合㫖要授秦王府主簿又曰文宗嘗扵誕節召白居易與僧性澄道士趙常盈對御講論扵麟徳殿居易論難鋒起辭辯泉注上疑宿構深嗟挹之列子曰子夏問扵孔子孔子對曰賜辯賢扵丘賜也能辯不能訥吾兼有之以事吾也莊子曰孔子舍扵沙丘見主人曰辯士也子路曰夫子何以識之曰其口窮􅀈其鼻空大其服博戯其睫流撝其舉足也髙其踐地也深鹿與而牛舍又曰公孫龍辯者之徒餙人之心易人之意能勝人之口不能服人之心辯者之囿也又曰古之王天下者智雖絡天地不自慮也辯雖彫萬物不自說也魯連子曰齊之辯士田巴辯扵徂丘議扵稷下毁五帝罪三王訾五伯離堅白合同異一日而服千人有徐刼者其弟子曰魯連謂刼曰臣願得當田子使之不敢復談可乎徐刼言之田巴曰刼弟子年十二耳然千里之駒也願得侍議扵前田巴曰可魯連曰臣聞堂上之糞不除郊草不芸白刃交前不救流矢何則急者不救則緩者非務楚軍南陽趙伐髙唐燕人十萬之衆在聊城而不去國亡在旦暮耳先生將柰何田巴曰無柰何魯連曰夫危不能為安亡不能為存則無為貴學士矣今臣將罷南陽之師還髙唐之兵却􅂓城之衆為所貴談談者其若此也先生之言有似梟鳴出聲而人惡之願先生之勿復談也田巴曰謹聞教明日見徐刼曰先生之駒乃飛兎騕褭也豈特千里哉扵是杜口易業終身不復談淮南子曰智絡天地明照日月辯解連環澤潤玉石抱朴子曰飛清機之英麗言約暢而判滯辯人也太公六韜曰辯言巧辭善毁譽者曰飛言之士皇甫謐髙士𫝊曰趙恵文王好劒士夾門而客三千人太子悝患之募有能止王者與千金左右曰莊子必能太子使人奉周周見王曰臣有三劒唯所用焉天子之劒賓諸侯正天下諸侯之劒如雷霆之威震四封之内無不賓服庶人之劒上絶頸領下脫肺肝此無異扵鬭雞而争一旦之命也今大王有天子之位而好庶人之業臣竊為大王薄之王不出宫三月劒客皆伏韓詩外𫝊曰鳥之美羽勾喙者鳥共畏之人之利口巧辯者人共畏之是以君子避三端文士筆端辯士舌端武士鋒端又曰子貢曰兩國搆難壯士列陳塵埃張天賜不持尺兵斗粮解兩國之難用賜者存不用賜者亡孔子曰辯哉語林曰諸葛靚字仲思在吳扵朝堂大㑹孫皓問曰卿字仲思為欲何思之曰在家思孝事君思忠朋友思信如斯而已王子年拾遺録曰張儀蘇秦二人逓剪髪以相活或傭力寫書行遇聖人之文無以題記則以墨書扵掌中及服裏夜還折竹寫之二人假食扵路剥樹皮為囊以盛天下良書每息大樹之下假息而寐有一先生問曰二子何勤苦若是而儀秦共與言論曰子是何人荅曰吾死生扵山谷世論謂余歸谷子也儀秦後逰學復逄歸谷子乃請其學術則教以干世俗之辯乃探胷中韋秩三卷書言輔時之事故儀秦學之以終身也古史考云儀秦受術鬼谷先生歸之聲與鬼相亂故也桓譚新論曰公孫龍六國時辯士也為堅白之論假物取譬謂白馬為非馬非馬者言白所以名色馬所以名形也色非形形非色世說曰郭象儀如懸河瀉水注而不竭劉向别録曰鄒奭者頗采鄒衍之術逺大而閎辯文俱難勝齊人美之頌曰談天鄒說苑曰林既衣韋而朝齊景公景公曰君子之服也小人之服也林既作色曰夫服何足以揣士行乎昔荆為長劒危冠令尹子西出焉齊短衣而管仲隰明出焉越文身剪髪而范蠡大夫種出焉如君言衣狗裘者當犬號衣羊裘者當羊名今君衣􅈢裘而朝得無為狐乎文士𫝊曰劉楨字公幹年八嵗能誦論及賦數萬言性辯甚文帝嘗請同好為主人使甄夫人出拜坐者皆伏而楨獨平視如故武帝使人觀之見楨大怒命收之主者案楨大不恭應死减一等輸作部使磨石武帝嘗輦至尚方觀作者見楨故環坐正色磨石不仰武帝問曰石何如楨因得喻巳有理跪對曰石出自荆山𤣥岩之下外有五色之章内含卞氏之珍磨之不加瑩彫之不増文稟氣堅貞受茲自然顧理枉屈紆繞獨不得申武帝顧左右大笑即日還宫赦楨復署吏又曰華譚字令思年十四舉秀才入洛㑹宣武塲座有辯者嘲南人諸君楚人亡國之餘有何秀異忽應斯舉衆無荅譚在下行遥曰當今六合齊􅁤異人並出吾聞大禹出扵東夷文王生扵西𦍑賢聖之在豈常之有昔武王伐紂遷商頑民扵洛邑得無吾子是其苖裔時咸改視辯者無以應也王瑱之童子𫝊曰孔林魯國人年十嵗詣臺魯相劉公客有獻鴈者歎曰天之扵人生五榖以為食有魚鳥以為之肴衆賓咸曰誠如公㫖林曰不然夫萬物所生各稟天氣事不必為人人徒以智得之故蚊蚋食人蚓虫噉土非天為蚊蚋生人為蚓生土公曰童子辯焉郭子曰梁國楊氏子年九嵗聰慧孔君平詣其父父不在乃呼兒出為設菓有楊梅孔指示兒此君家菓兒應聲荅曰未聞孔雀是夫子家禽王弼别𫝊曰弼年十餘嵗好老莊通辯能言列女𫝊曰袁次陽妻者扶風馬季長之女也下車禮畢次陽問曰為婦之道貞順而已何輜軿僮婢數十黼黻𤣥黄珠璣之飾耶夫人荅曰女有三從之義在家係扵父母情愛無已欲其豐麗故不敢逆命今君欲擬鮑子都之風不受婦家之送此乃清髙異行也妾亦欲察君志悉還所有以成君之髙不亦可乎次陽又問曰弟先兄舉猶以為鄙髙士不為也賢姊未嫁而新婦先行有何汲汲乎夫人荅曰家姊有宋伯姬之風梁髙之行節操槩扵青雲貞介皦扵白日家君庶堯之配舜孔子妻公冶長之義世乏此賢故其躊躇妾固陋不才遭人則可次陽嘿然悵恨外聽者曰使君努力何為新婦所困傅𤣥七札曰辯論鋒起探虎摩龍徐幹七喻曰戰國之際秦儀之徒智畧兼人辯利軼軌倜儻挾義觀釁相時圖爵位則佩六紱謀貨財則輸海内一怒而諸侯懼安居而天下息人主見弄扵股掌之上而莫之知惡也班固荅賓戯曰子雖馳辯如濤波摛藻如春華猶無益扵殿最劉劭趙都賦曰辯論之士則智凌徂丘材過東里分摘滯義割擗纎理論析堅白辯臧三耳張衡西京賦曰其都逰說辯論之士街談巷議彈射臧否剖析毫釐擘肌分理張華縱横篇曰蘇秦始與張儀同學鬼谷先生辯說剖毫釐變詐入無形巧言惑正理人主莫不傾聽王廣子貢畫讃曰端木英辯才清吐口敷華發音揚馨訥說文曰訥言難也易曰吉人之辭寡禮記曰趙文子其言呐呐如不出諸其口論語曰君子欲訥扵言而敏扵行又曰剛毅木訥近仁史記曰周勃為人木强少文然可屬大事又曰司馬相如口吃而善著書漢書曰曹參為相遵蕭何約採擇郡國長吏訥扵文辭謹厚長者即召除為丞相吏又曰李廣訥口少與人言居則畫地以為陣東觀漢記曰吳漢質厚少文造次不能以辭語自逹鄧禹及諸將多所薦舉又曰揚雄好著書而口吃不能劇談范􅁮後漢書曰吳漢自建武時常居上公之位終始親愛諒由質簡而强力也子曰剛毅木訥近仁斯豈漢之方乎又曰劉昆字恒公陳留人建武五年舉孝廉除江陵令時縣連災昆輙向火叩頭多能降雨止風遷𢎞農太守虎皆負子渡河徴為光禄勲詔問前在江陵何徳政而致是耶對曰偶然耳左右皆笑其質訥帝曰此長者之言顧命書諸䇿又曰髙彪字義方吳郡無錫人也家本單寒至彪為諸生逰太學有雄才而訥扵言續漢書曰何休任城人朴訥而精研六經世儒無及者魏畧曰嚴翰善春秋公羊司𨽻鍾繇不好公羊而好左氏謂左氏為太官而謂公羊為賣餅家故常數與翰辯短長繇為人機揵善持論而翰訥臨時屈無以應晉書曰郭林宗謂劉儒口訥心辯有珪璋之質張詮南燕書曰慕容納沉静深䆳外訥内敏北史牛恒訥扵言而敏扵行上嘗令其宣勅至陛下不能言退還拜謝云臣忘之上曰𫝊語小辯故非宰臣任也愈稱其質直隋書范陽祖君彦齊尚書僕射孝徴之子也容貌短小言訥澁有才學大業末官至東平郡書佐老子曰大辯若訥管子曰吾畏事不敢事畏言不為言行年六十如老吃耳張隲文士傳曰左思字太冲貌惡不揚口訥不能給談黙而心解又曰成公綏口訥不能談論嘿而内朗人有劇問以筆墨荅之裴啟語林曰鄧艾口吃常云艾艾宣王曰為云艾艾終是㡬艾荅曰譬如鳯兮鳯兮故作一鳯耳𤣥晏春秋曰予朴不好戯弄口又不能戱談崔琰述初賦序云琰性頑口訥年十八不能㑹問好撃劒尚武事紀隲表孫皓曰臣禀氣淺薄體不及衆形容短陋訥口弱顔太平御覽卷四百六十四
