  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_762-1a, image: WYG0899/WYG0899-0671c.png}
body:
  text: 太平御覽卷七百六十二宋李昉等撰器物部七瓢勺豐禁食架食厨酒臺槽杵臼碪碓磨碾瓢方言曰蠡蠡勺也音禮陳楚宋魏之間或謂之樹今江東呼勺為樹或謂之瓢通俗文曰瓠瓢為蠡禮曰合卺音謹而酳三禮圖曰卺取四升瓠中破夫婦各一論語曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂爾雅曰康瓠謂之甈戰國䇿曰應侯謂秦昭王曰百人輿瓢而趍不如一人持而走疾百人試與瓢瓢必裂今秦國華陽穣侯太后用之秦國必裂矣東宫舊事曰漆􅈟爵二銀鏁連長七尺莊子曰惠子謂莊子曰魏王貽我大瓠之種我樹之成而實五石剖以為瓢則瓠落無所容吾為其無用捨之楚辭九歎曰藏瓠蠡於筐簏東方朔荅客難曰以管闚天以蠡測海琴操曰許由無杯器常以手捧水人以一瓢遺之由操飲畢以瓢掛樹風吹樹飄動歴歴有聲由以為煩擾遂取捐之勺與杓字同說文曰斗勺也通俗文曰木瓢為斗詩曰惟北有斗不可以挹酒漿又曰酌以大斗以祈黄耉周禮曰大璋中璋九寸邉璋七寸射四寸厚寸黄金勺青金外朱中鼻寸衡四寸有繅天子以廵狩宗祝以前焉杜子春云勺謂酒樽中勺也鄭司農云鼻謂勺龍頭鼻也衡謂勺柄龍頭也鄭云龍勺鼻流凡流智為龍也三璋之勺形如玉瓉天子廵守有臺山川則用薦焉於大山川則用大璋中山川用中璋於小山川用邊璋也又曰勺夏后氏以龍勺殷以䟽勺周以蒲勺漢書曰霍顯之謀行於杯勺東宫舊事曰漆注八合鴨頭勺四論衡曰司南之勺投之於地其柄指南語林曰諸阮以大盆盛酒朱勺數枚束晢貧家賦曰舉短柄之掘勺豐三禮圖曰射為罰爵之豐作人形也豐國名也坐酒亡國戴孟戒酒說文曰豐爼豆貴豐厚也一曰鄉飲酒有豐侯者儀禮曰司射適堂西命弟子說豐將飲不勝說豐以承其爵豐形蓋似豆卑而大之又曰公尊瓦㤗兩有豐崔駰酒箴曰豐侯沉酒荷甖負缶自戮於世圖形戒後李尤豐侯銘曰豐侯荒繆醉亂迷逸乃象其形為禮戒式後世傳之固无止說禁一名棜乞去切三禮圖曰棜長四尺廣二尺四寸深寸無足漆赤中青雲畵陵苕華飾禁長四尺廣二尺四寸通局足髙三寸漆赤中青雲畵陵苕華飾刻鏤其足為褰帷之形儀禮曰尊於戸間兩甒有禁又曰尊兩壺于房戸間斯禮曰天子諸侯之尊廢禁大夫士棜禁此以下為貴也食架東宫舊事曰漆食架二食厨禮曰大夫七十而有閣閣以板為之度食物也天子之閣左逹五右逹五公侯伯房中五大夫於閣三士於坫一酒䑓周禮曰六彛皆有舟東宫舊事曰漆酒臺二金塗鐶鈿槽劉伶酒德頌曰先生方捧罌承槽銜杯𠻳醪杵臼易下繋辭曰斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過書曰血流漂杵禮曰隣有喪舂不相又曰暢臼以掬杵以桐穀梁傳曰大夫救日擊門士擊杵舂梁稻之具示有上下隂陽周易類謀曰閱可倚杵春秋繁露曰夏求雨暴杵臼於街十日漢書曰傅咸為南陽太守滑吏大姓犯令為地臼木杵舂不中程者輙加笞箠又曰江都易王非宫人有過者或髠鉗以鈆杵㫪不中程輙掠又曰楚王戊即位胥靡申公白衣赭衣使椎舂於市東觀漢記曰公沙穆遊大學无資糧乃變服客傭為呉祐賃㫪祐與語大驚遂共定交於杵臼之間後漢書曰梁鴻之妻孟光多力能舉石臼又曰馮衍娶任氏女為妻悍忌不得畜媵妾兒女常自操井臼王隱晉書曰賈后使小黄門孫慮徙愍懐太子於坊中不與食乃刼杏子黒丸其夜薨或𫝊太子不肯服藥伺至厠以藥杵撞害之呌聲聞於外燕書曰昭武帝營新殿昌黎大棘城縣河岸崩出鐡築杵頭一千一百七十枚永樂民郭陵見之詣闕言狀詔曰經始崇殿而築具出人神允恊之應賜陵爵闗外侯戰國䇿曰智伯攻趙襄子於晉陽沉竈生鼃又曰衞人迎新婦婦入室見臼曰徙之牖下妨徃来者主人羙之河圖曰千嵗之後天可倚杵孟子曰盡信書不如無書吾於武成取二三䇿而已矣仁者無敵於天下以至仁伐至不仁何其血之流杵也吕氏春秋曰伊尹母夢神告之臼出水而東走賈誼書曰黄帝行道炎帝不聽故戰涿鹿之野血流漂杵淮南子曰觧門以為薪塞井以為臼雖小用而所喪大矣桓譚新論曰伏羲制杵臼之利後世加巧因借身以踐碓而利十倍又曰復設機闗用驢羸牛馬及役水而舂其利百倍論衡曰舂者以杵擣臼杵臼鼓動地臨動地池水河水震蕩夫臼杵木也水與木土三者殊類而相應首相叩動其勢然也風俗通曰秦留燕太子丹天為雨粟厨中杵生肉是數然也世本曰雍父日作㫪杵臼宋志曰雍父黄帝臣也湘州記曰􅀥陽縣有蔡倫宅宅西有一石臼云是倫舂紙臼荆州記曰長沙醴泉縣有山石空空中有石床床頭有臼容五升父老相𫝊昔有仙人以此合金丹衡山記曰桂英巖上鑿石作臼有鐵杵倚置巖畔石臼邊有兩人脚跡名山記曰羅浮山有道士齎鐡臼杵欲合丹未成而仙化世説曰魏武讀曹娥碑曰外孫虀臼楊修曰虀臼受辛受辛辭字幽明録曰劉松在家忽見一鬼㧞劔斫之鬼走松起逐見鬼在髙山巖石上卧乃徃逼突群鬼争走遺置藥杵臼及所餘藥因將還家松為人合藥一經此臼者無不效魏武上獻帝表曰臣祖騰有順帝賜器今上藥杵臼一具碪與砧同爾雅曰碪謂之榩郭璞曰碪木質也榩音䖍廣雅曰枕質椹也東宫舊事曰太子妃有石砧一枚又擣衣砧杵十枚荆州記曰秭歸縣有屈原宅女嬃音湏廟擣衣石猶存漢水記曰有女郎擣衣砧也古樂府詩曰稿砧今何在山上復有山稿砧謂夫也碓廣雅曰􅀈碓也方言曰碓機陳魏宋楚自闗而東謂之梴磑或謂之䃀魏畧曰司農王思𢎞作水碓免歸田里晉書曰魏舒遲鈍質朴不為鄉親所重從叔父吏部郎衡有當世名猶不知之使守水碓王隱晉書曰石崇有水碓三十區又曰劉頌為河内太守有公王水碓三十餘區所在遏塞輙為侵害頌表上封之民始便焉又曰衞瓘為太子少傅詔賜園田水碓不受又曰鄧攸去石勒投李矩借水碓舂於城東晉諸公讃曰征南杜預作連機碓晉陽秋曰給陳留王碓一區幽明録曰𢎞農徐儉家有一逺来客寄宿有馬一匹中夜驚跳客不安騎馬而去一物長丈餘来逐馬後客射之聞如中水聲明日尋昨路見箭著一碓栅世說曰王戎旣貴且富區宅水碓洛下莫比孔融肉刑論曰賢者所制或踰聖人水碓之巧勝於斷木掘地王渾表曰洛陽百里内舊不得作水碓臣表上先帝聽臣立碓并􅍴得官地磨說文曰䃺石磑也釋名曰磑磨也廣雅曰礱磨也䃀也方言曰磑或謂之磨通俗文曰麤曰䃀取内切填音鎮䃺曰硐逢棟切磨牀曰摘魏畧曰諸葛亮為衝車圍郝昭於陳倉昭以繩繋石磨羂古犬切其衝車魏志曰管輅字公明平原人也徃同村郭思家碓上有鳩食相閗輅曰不祥明日射鳩悞中隣女蜀志曰許靖為從弟劭所排擯以馬磨自給晉書曰王戎為司徒好治産業周遍天下水碓四十所鄴中記曰解飛者石虎時工人作旃檀車左轂上置碓右轂上置磑每行十里磨麥壹石㫪米一斛世本曰公輸般作磑諸葛亮别傳曰孫權常饗蜀使費禕停食䴵索筆作人賦禕亦請筆作磨賦異苑曰上黨侯亮之於江都城下獲一石磨下有銅馬幽明録曰廣陵有相冡𫝊江漢都王建之墓也常有村人行過見地有數十具磨取一具持歸暮即叩門求磨甚急明旦送著故處抱朴子曰周髀家云天旁轉如推磨而左行日月右行隨天左轉譬之於蟻行磨上磨左旋而蟻遲故不得不隨磨以右廻焉嵇含八磨賦曰外兄劉景宣作為磨竒巧特異䇿一牛之任轉八磨之重因賦之曰方木矩跱圓質規旋下静以坤上轉以乾巨輪内建八部外連碾通俗文曰石碢轢殻曰碾後魏書曰崔亮在雍川讀杜預傳見其為八磨嘉其有濟時用遂教民為碾及為僕射奏於故方橋東堰穀水造水碾磨數十區其利十倍國便之太平御覽卷七百六十二
