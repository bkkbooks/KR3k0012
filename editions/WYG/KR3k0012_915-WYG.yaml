body:
  text: 太平御覽卷九百十五宋李昉等撰羽族部二鳳鸑鷟鵷鶵鵕䴊鳳春秋孔演圖曰鳳火精春秋元命苞曰火離鳥鳳禮運曰鳳以為畜故鳥不獝况必切又曰升中于天而鳳凰降龜龍假又曰四靈為畜何為四靈麟鳳龜龍謂之四靈又曰無水旱昆蟲之灾凶饑妖孽之疾故天不愛其道地不愛其寳人不愛其情則鳳凰在郊藪其餘鳥獸之卵胎皆可俯而窺也左傳曰陳大夫卜妻敬仲其妻占之曰吉鳳凰于飛和鳴鏘鏘有媯之後將育于姜又曰我髙祖少皥之立也鳳凰適至故紀於鳥為鳥師而鳥名鳳鳥氏司厯者也杜預注曰鳳知時故以名􅔦官詩曰鳳凰于飛翽翽其羽鳳凰鳴矣于彼髙崗梧桐生矣于彼朝陽又疏曰鳳凰一名鸑鷟非梧桐不栖非竹實不食書曰簫韶九成鳳凰來儀論語曰鳳鳥不至河不出圖吾已矣夫又曰鳳兮鳳兮何徳之衰爾雅曰鶠鳳其雌皇郭璞注瑞應鳥雞頭蛇頸燕頷龜背魚尾彩色髙六尺大戴經曰羽蟲三百六十而鳳凰為之長禮斗威儀曰君乗土而王其政太平則鳳集於林苑春秋感精符曰王者上感皇天則鸞鳳至春秋繁露曰恩及羽蟲則鳳凰翔春秋運斗樞曰天樞得則鳳凰翔春秋合成圖曰黄帝逰𤣥扈雒水上與大司馬容光等臨觀鳳凰銜圖置帝前帝再拜受圖又曰堯坐舟中與大尉舜臨觀鳳凰負圖授堯圖以赤玉為匣長三尺廣八寸厚三寸黄玉檢白玉繩封兩端其章曰天赤帝符璽五字吕氏春秋曰帝嚳有聖徳作樂六英乃令人奏之鳳凰鼓翼而舞又曰黄帝聽鳳凰之鳴以别十二律又曰燕雀為鴻鵠鳳凰慮而必弗得矣其所求者瓦扎之間巢屋之翳蔚爾韓詩外傳曰黄帝即位施聖恩承天明命一道修徳惟仁是行宇内和平未見鳳凰乃召天老而問之曰鳳象何如天老對曰夫鳳之象鴻前而麟後蛇頸而魚尾龍文而龜身燕頷而雞喙戴德負仁抱忠挾義小音金大音皷延頸奮翼五彩備明舉動八風氣應時雨食有質飲有儀往即文始來即嘉成㳺必擇所饑不妄下其鳴也雄曰節節雌曰足足昏鳴曰固常晨鳴曰發明晝鳴曰保章舉鳴曰上翔集鳴曰歸昌夫惟鳳能究萬物通天地象百物達五音成九徳覧九州觀八極則有福備文武人神皆服故得鳳象之一則鳳過之得鳳象之二則鳳翔之得鳳象之三則鳳集之得鳳象之四則鳳春秋下就之得鳳象之五則鳳沒身居之黄帝曰於戯允哉朕何敢與焉於是黄帝乃服黄衣垂黄紳戴黄冠致齊于宫鳳乃蔽日而至皇帝降于東階西面再拜稽首沒身不去尚書考靈曜曰通天文者明明於天道也審地理者昌昌猶盛也盛於萬物明者天之時也昌者地之財也明王治鳳下之尚書中候曰黄帝時天氣休通鳳凰巢於阿閣讙於樹又曰堯即政七十年鳳凰止於庭伯禹拜曰黄帝軒轅象鳳鳳巢阿閣又曰帝舜云朕惟不乂獸舞鳳晨百獸率舞鳳皇司晨鳴也尚書帝驗曰舜受終赤鳳來儀尚書大傳曰舜好生惡殺鳳凰巢其樹論語摘衰聖曰鳳有六象一曰頭象天二曰目象日三曰背象月四曰翼象風五曰足象地六曰尾像緯有九苞一曰口包命二曰眼合度三曰耳聰達四曰舌詘伸五曰彩色光六曰冠短周七曰距稅鈎八曰音激揚九曰腹文户行鳴曰歸嬉止鳴曰提扶夜鳴曰善哉晨鳴曰賀世飛鳴曰郎都知我者惟黄持竹實來故子欲居九夷從鳳嬉朱均注曰緯五緯也度天度數也周當作采采色好也户所由出入隂陽出入亦門户善哉應天下興平也賀世慶賀於時也黄黄中通理也鳳遇亂則潛居夷狄孝經援神契曰王者徳至鳥獸則鳳凰翔孝經鈎命决曰孝悌之至通於神明則鳳凰巢樂動聲儀曰鎮星不逆行則鳳凰至樂計圖曰五音克諧各得其倫則鳳凰至冠類雞頭燕喙蛇頸龍形麟翼魚尾五彩不啄生蟲帝王世紀曰黄帝服齊于中宫坐于𤣥扈洛上乃有大鳥雞頭燕喙蛇頸龍形麟翼魚尾狀如鶴體備五色三文成字首文曰順徳背文曰信義膺文曰仁智不食生蟲不履生草或止帝之東園或巢阿閣其飲食也必自歌舞音如簫笙又曰國安其主好文則鳳凰翔史記曰四海之内咸戴舜功興九韶之樂而鳳凰翔天下明徳自虞帝始漢書曰昭帝元和三年鳳凰集東海使祠處又曰宣帝幸河東之明年春鳳凰集栩於所集處得玉寳廼下詔赦天下又曰鳳凰集上林乃作鳳凰殿以答嘉瑞又曰幸甘泉郊泰畤改元曰五鳳論衡云宣帝時鳳凰至五又曰本始元年鳳凰集膠東十四年鳳集魯羣鳥從之詔曰威鳳為寳鳳凰有威儀也神爵四年鳳凰集神陵又曰帝祠后土鸞鳳翺翔又曰五鳳三年鸞鳳又集長樂宫東園上飛下至地文章五色留十餘日吏民並觀之東觀漢記曰光武起於濟陽先是鳳凰集濟陽故宫皆畫鳳凰聖瑞如此又曰建武十七年鳳凰集潁川郡羣鳥從之盖地數頃留十七日乃去章帝時鳳凰三十九見又曰安帝延光三年鳳凰集濟南臺上賜帛各有差魏略曰文帝欲受禪郡國奏鳳凰十三見明帝鑄銅鳳髙三丈餘置殿前呉厯曰大元元年有鳥集苑中似鷹髙足長尾毛羽五色咸以為鳳凰改元為鳳凰元年晉書云荀朂自中書監遷守尚書令最久在中書專管機事及失之甚罔罔悵悵或有賀之者朂曰奪我鳳凰池諸君何賀我也晉陽秋曰昇平四年鳳凰将九子見鄖鄉之豐城閣復見衆鳥從之宋書曰王曇首與兄弟子孫集㑹任其戲適僧道跳下地作彪子僧䖍累十二博棊既墜落亦不重作僧綽採蠟燭珠為鳳凰僧逹奪取於懐亦復不較父𢎞蹲其長首又曰王僧䖍子慈少與從弟儉共書謝鳳子超宗嘗候僧䖍仍往東齋詣慈正學書未即放筆超宗曰卿書何如䖍公答曰慈書比大人猶雞之比鳳又曰謝鳳子超宗有文辭盛徳名舉選補新安王子鸞國常侍王母殷淑儀卒超宗作誄奏之帝大嘆賞謂謝荘曰超宗殊有鳳毛時右衛将軍劉道隆在御坐出候超宗曰聞君有異物可見乎超宗曰懸罄之室復何異物也道隆武人無識正觸其父名曰旦侍宴至尊說君有鳳毛超宗徒跣還内道隆謂檢覔毛至闇待不得乃去又曰元嘉十四年春鳳凰二見于都下衆鳥隨之改其地曰鳳凰里又曰何承天為著作佐郎年已老諸佐郎並名家年少頴川荀伯子嘲之常呼為妳母承天曰卿當云鳳凰将九子妳母何言邪齊書曰江夏王鋒年五歳性方整好學書髙帝使學鳳凰詔一學即工髙帝大恱以玉麒麟賜之曰以麒麟賞鳳凰梁書曰武帝初平東昏入于閱武堂是日鳳凰見又曰天監初鳳凰見建康縣同夏里又集南蘭陵崔鴻十六國春秋前秦録曰永興三年九月鳳凰翔于東闕民因歌之曰鳳凰于飛其羽翼翼翊我聖后其齡萬億陸翽鄴中記曰石季龍與皇后在觀上有詔書五色紙著鳳口中鳳既銜詔侍人放數百丈緋繩轆轤徊轉鳳凰飛下鳳以木作之五色漆畫脚皆用金又曰鳳陽門五層樓去地三十丈安金鳳凰二頭石虎衰一頭飛入漳河㑹晴日見於水中一頭鐵釘釘足今存二石偽事曰鄴中有鳳凰將九雛在延明門外石林西道後魏書曰彭城王勰與帝昇金墉顧見堂後桐竹曰鳳凰非梧桐不栖非竹實不食今竹梧並茂詎能降鳳乎勰曰鳳凰應徳而來豈桐竹能降帝曰朕亦望降之唐書曰薛收從子元敬選部郎邁之子也亦有文學為收之亞初大業末薛徳音及收元敬俱有才名時人謂之河東三鳳又曰武徳九年海州言鳳見于城上羣鳥數百隨之東北飛向蒼梧山又曰太宗時莒州言鳳凰二見羣鳥隨之其聲若八音之奏又曰太宗常追思王業艱難佐命之臣乃作威鳳賦以賜長孫無忌其辭曰有一威鳳憇翮朝陽晨逰紫霞夕飲𤣥霜資長風以舉翰戾天衢而逺翔徐整正厯曰黄帝之時以鳳為雞荘子曰老子見孔子從弟子五人問曰前為誰對曰子路勇且多力其次子貢為智曽子為孝顔回為仁子張為式老子歎曰吾聞南方有鳥其名為鳳所居積石千里天為生食其樹名瓊枝髙百仞以璆琳琅玕為實天又為生離珠一人三頭􅉍起以飼琅玕鳳鳥文戴聖嬰仁右智左賢文子曰主有積道徳天與之地助之神鬼輔之則鳳凰翔其庭也孫卿子曰古之王者其政好生惡殺鳳在列樹又曰鳳鳥啾啾其翼若竽其聲若簫有凰有鳳樂帝之心此聖不蔽福也韓子曰昔者黄帝合鬼神於西大山鳳凰覆上作為瀆角淮南子曰鳳凰之翔至徳必也過崑崙之疏圃欽砥柱之涔瀬遭迴濛汜之渚當此之時鴻鵠蒼鶴莫不彈驚伏􅇡注啄江芥又况燕雀之類乎昔者二皇鳳至于庭二皇伏羲神農三代鳳至於門三代堯舜禹周室鳳至於澤徳彌麤所至彌逺徳彌精所至彌近抱朴子曰夫木行為仁為青鳳頭上青故曰戴仁也金行為義為白鳳頸白故曰纓義也火行為禮為赤鳳背赤故曰負禮也水行為智為黒鳳胷黒故曰向智也土行為信為黄鳳足下黄故曰蹈信也古者太平之世鳳凰常居其國而生乳焉又曰麟鳳以形為别夏后始食鳳卵而鳳去則鳳有種明矣又曰鸞鳳食粒於庭則受辱於雞鶩也鶡冠子曰鳳鶉火之禽陽之精也徳能致之其精畢至任子曰鳳為羽族之美麟為毛類之俊龜龍為介蟲之長楩楠為衆材之最是物之貴也山海經曰軒轅之丘燕鳥自飲鳳鳥自舞鳳卵民食之又曰丹穴之山有鳥焉其状如雞五采而文名曰鳳皇首文曰徳翼文曰義背文曰禮膺文曰仁腹文曰信是鳥也飲食自然自歌自舞見則天下安寧楚辭曰鳬雁皆唼夫梁藻兮鳳愈飄翔而高舉衆鳥皆有所登棲兮鳳獨惶惶而無所集願銜枝而無言兮嘗被君之渥洽驥不驟進而求服兮鳳亦不貪餧而妄食又曰為鳳凰作鶉籠雖斂翼而不容又曰鸞鳳高翔于大皇之野循四極而周迴覽盛德而後下又曰鳳皇上擊九千里絶雲霓負蒼天翺翔乎􅆼宴之中藩籬之鷃豈能與之料天地之高哉說文曰鳳神鳥也天老曰鳳像麟前鹿後蛇頸魚尾龍文龜背燕頷雞喙五色備舉出東方君子之國翺四海之外過崑崙砥柱濯羽弱水暮宿丹穴見則天下安寧鳳從凡鳥聲飛則羣鳥從之以萬數故古鳳作鵰字又曰鶠鳥也其雌皇一曰即鳳皇也鳳者羽蟲之長也漢武内傳曰西王母曰仙之上藥有九色鳳頸次藥有蒙山白鳳之肉白虎通曰鳳凰禽之長上有明王太平乃來西京雜記曰揚雄讀書有語之曰無為自苦苦𤣥故難倐忽不見雄看太𤣥經夣吐白鳳凰集其頂上而滅揚子法言曰鳳凰蹌蹌匪堯之庭或曰君子在位譬若鳳凰治則見亂則隠太𤣥經曰鸞鳳不迂於竹實騶虞不移於生物醜婦以明鏡為害無所逃其陋論衡瑞􅃌篇曰鳳凰麒麟為聖人來即是聖人之禽也按聖人逰於人間麟鳳亦應與衆鳥同何故逺去中國處於邉外崔贛易林曰神鳥五色鳳凰為主張集於王谷使君得所又曰鳳有千子同巢其母懽以相保又曰鳳生五雛長于南郭君子康寧恱樂身榮括地圖曰孟虧人首鳥身其先為虞氏馴百獸夏后之末世民始食卵孟虧去之鳳隨之止於丹山山多竹長千仞鳳凰食竹實孟虧食木實去九疑萬八千里十洲記曰鳳麟洲在西海之中四面有弱水遶之鴻毛不可越也其上多鳳麟數萬餘羣仙家煮鳳喙及麟角合煎作膠名之為集絃膠或名連金泥能連弓弩斷弦刀劍斷斫蔡邕琴操曰周成王時天下大治鳳凰來舞於庭成王乃援琴而歌曰鳳凰翔兮於紫庭予何徳兮以感靈列仙傳曰蕭史教弄玉作鳳鳴居数十年吹簫作鳳聲鳳凰來至其屋為作鳳臺夫妻止其上一日一夜皆隨鳳凰飛去王子年拾遺記曰周昭王以青鳳之毛為二裘一曰煩質二曰暄肌常以禦寒至厲王未知寳此物流于彘人得而珍之罪有陷大辟者以青鳳毛贖罪免死片毛則准千金異苑曰東莞劉穆之字道民素居京口晉隆安中鳳凰集其庭相人韋藪謂之曰子必協贊大猷李彤四部曰弔鳥山俗傳曰鳳死於上歳七月至九月羣鳥常來集其上鸑鷟國語曰周之興鸑鷟鳴於岐山說文曰鸑鷟鳳屬神鳥也三輔決録注曰太史令蔡衡云色多紫者為鸑鷟左思吳都賦曰鸑鷟食其實後漢書賈逵傳曰明帝永平中有神雀集宫殿官府冠羽有五采色帝異之以問臨邑侯劉復復不能對薦逵博物多識帝乃召見逵問之對曰昔武王終父之業鸑鷟在岐鸑鷟鳳之别族也周大夫内史過對周惠王曰周之興也鸑鷟鳴于岐山事見國語宣帝威懐戎狄神雀仍集此胡降之徵也唐書曰張鷟字文成聰警絶倫書無不覧為兒童時夣紫色大鳥五色成文降于家庭其祖謂之曰五色成文鳳也紫文鸑鷟也為王之佐兒當以文章瑞於明庭因以為名字鵷鶵山海經曰南隅之山其鳥鵷鶵莊子曰惠子相梁荘子往見之惠子恐代其相搜國中三日三夜荘子伏主人馬棧下往見之曰南方有鳥名鵷鶵南海而飛之北海非梧桐不栖非竹實不食非醴泉不飲於是鴟得腐鼠鵷鶵過仰而視之曰嚇子欲以梁國相嚇我耶鵕䴊倉頡觧詁曰鵕䴊神鳥飛竟天漢以為侍中冠説文曰鵕䴊鷩也一名錦雞史記曰孝惠郎中皆冠鵕䴊南越志曰増城縣多鵕䴊山雞也利距善鬪光采鮮明五色炫燿楚辭曰琖彗星之皓旴兮撫朱雀與鵕䴊朱雀鵕䴊神俊之鳥也動以神物自喻當差鵕䴊非能冲天司馬相如子虛賦曰掩翡翠射鵷䴊太平御覧卷九百十五
