front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_664-1a, image: WYG0899/WYG0899-0001a.png}
body:
  text: 太平御覽卷六百六十四宋李昉等撰道部六尸觧西城王真人傳曰解化之道尸不能俱神化者也寳劔上經曰尸解之法有死而便生者有死而從一旁生者有形存而無骨者又曰夫尸解者本真之練蛻也五屬之隠形也雖仙品之下第其禀受亦不輕也所云隠回三光白日陸沈者也若修下尸解者皆不得返望故鄉此謂下解之道也名配紫簡三宫不得復窺其間巢雖獲隠遯世志未厭之不得返歸故鄉遊栖不定也又曰以丸藥和水而飲之又并抱草而卧則傷死於空室中謂之兵解又曰上品惟八素列紀受而不行餘皆白日尸解得為飛仙登真隠訣曰尸解者當死之時或遇刀兵水火痛椘之功不累世人也既死之後其神方得遷逝形不能去爾又曰董仲居淮南人也少時服氣煉形年百餘歳不老常見誣繫獄尸解仙去又曰清平吉沛人也漢髙祖時卒及至光武時猶不老後尸解去真誥曰願歡字𤣥平吳興人齊永平中卒於剡山葬鹽官樂附里墓生連理木縣令江山圗表狀歡尸解而去又曰辛𤣥子之无期隴西定谷人好道行渡秦川長梁津致溺水觧而去之又曰張常祖者彭城人吳時北來行入方山洞室中託形墮車隠化幽舘而修守一之業又曰劉平河者無名字漢末為九江平河長行醫術有功徳救人疾患如已之病行遇仙人周正時授以隠存之道居於方山洞室常服日月神氣顔色如少後尸觧而去又曰受大戒者死滅度煉神上補天宫謂之尸觧又曰人死必視其形如生人視足不青皮不皺目光不毀者皆尸解也白日尸解自是仙也非尸解之例其用也藥得尸解非是用靈丸之解化者皆不得返故鄉三官執之也白日去謂之上尸解夜半去謂之下尸解向晩暮之際去者謂之地下主者也瓊文四紀篇曰得九真中經者謂之白日尸解或曰飛行羽經輕也又曰六紀篇曰靈書紫芝或五老寶經有之者尸觧神仙傳曰介象字元則㑹稽人也吳先主甚重之常謂曰介君象連求去先生不聼象言病先主使左右賜美梨一奩湏㬰象死觧去又曰紫清上宫九華安賜謂楊君曰可尋觧劔之道作吉終之術目盡出嘿之㑹隠顕之近又曰葛𤣥字孝先從左慈受九丹金液經常餌木語弟子張奉曰當尸解去八月十二日時當發至期𤣥衣冠而卧無氣而色不變尸觧而去又曰壼公謝元陽歴人也費長房師之及道士李意期将兩弟子去積年長房及兩弟子皆隠變觧化又曰鮑靚字太𤣥瑯瑘人晋明帝時人葛洪妻父隂君受其尸觧法一説靚上黨人漢司徒鮑宣之後修身飬性年過七十而解去有徐寕者師事靚寕夜聞靚室有琴聲而問焉答曰稽叔夜昔示迹之市而實尸解去晋中興書曰葛洪赴岣嶁令與刺史鄧岱書當逺行岱留不聴去洪乃止羅浮山煉丹積年忽與岱藥岱得書徑往别而洪已亡年八十餘顔色如平生入棺惟有空衣尸解而去道學傳曰吳云字云世有道術庾亮聞其神異厚禮遺之來武昌尋求歸辭以筭盡命具棺庾公閔然即日發遣未逹家五十里而終形狀如生存又曰若六行未通宿根常在則入中品以為尸觧遁變也降此以下是正服御功行淺劣則入下階階勝者則滅度更生更生之後修道隨功多少方始得道太上太霄琅書曰修學上法時入山林服餌靈藥因縁應過雖仗尸觧和光世禮與世大異者不棺槨拂山平之上掃深樹之下单衾覆於地太上太真料曰若祠祀先人應知掃否者有功徳升度得道子孫仁孝則化形來遊歆所設也亦尸解之類金闕聖君傳曰靈書紫文者或曰五老寳經有之者尸解行之者成道東海青童傳曰保洞觀經曰雲靈上𤣥品有之者白日尸解抱朴子曰道林子有五種尸解符太太𤣥隂生符及是一病解上者列仙傳曰寗封黄帝時為陶丘以火自燒而隨煙上下真誥云寗生服石腦而火則是作火解也又曰司馬季主漢文景時人受四靈子都劔解之道在委羽山洞天服明宫丹之華抱扶晨之暉貌如子女鬢長三尺有男名法霄一女名濟華同得道真誥云季主服靈散替升猶首足異此諳可以知劔兵解法兵解則不得在太極而其女尚讀洞經便是别修髙法也守𤣥曰陶隠居在茅山東守𤣥白能隠形亦教見身介琰者貞白公弟子也今在建安方山琰初為孫權所殺解化而去又曰萼緑華者女仙容顔齊整晉穆帝升平三年已來十一月十日降於羊權家自云南山人權好道學即晋簡文時黄門待即羊欣之祖也􅁠及欣皆潜修道要丹𤣥味真綠華云凢脩道之士視爵位如過客視金玉如瓦礫則得長生因受􅁠尸解法亦隠景化去又曰中侯王夫人於兄子晋䖏受飛解脱綱之道又曰蔡天生上谷人少賣香於野外性仁恕道河伯少如市香天山又曰韓崇字長季吳郡人漢明帝時人少好道林屋仙人王瑋𤣥曽授以琉珠丹一法崇奉而脩之大有騐後瑋𤣥授以隠解而去入霍太山度世為右理中監漢起居注曰李少君之将去也武帝夢共登髙山見使者稱太乙之命召請既覺語左右曰少君将去數日果病死解去靈寳赤書曰三元玉符干靈寳五篇真文同出太𤣥都玉京山紫微上宫此文記陽九百六刼㑹之數度學者之身𤣥都有此經佩之得為上聖朝太清功徳未徳即得尸觧又曰杜契字廣平京兆人建安初來江東依孫䇿後遇介琰先生授之以異人丹拜奉其香火少女乃教其朝天帝玉皇之法尸觧而去隠存方臺老君傳九真五石並曰暫入太隂権過三官者始得上觧之法又曰紫陽公傳西城劔觧之法脩佩神劍七年朱書符觧化去若以曲神飛精題之者立能變遁隠化太乙遣吉光寳衣來迎又曰王逺字方平見蔡經骨相當尸觧且告以要言方平冠逺遊冠朱衣處頭鞶囊五色綬帶劒黄色少髭長矩中人也乘羽車駕五龍異色綬帶前後麾即幡旗自天而下湏㬰引見經父兄因遣人召麻姑姑先報被詔按行􅅾萊使往願還來即去如此兩時聞麻姑來先聞人馬聲從官當半於逺姑至經舉家亦見之是好女子年才加笄於頂上作䯻餘髪散垂至腰衣有文彩又非錦繡衣光彩曜日不可名状皆世所無也入拜逺逺為之起立各進行厨所食皆是麟脯逺去經父母怪私問經經曰王君常在崑崙山往來羅浮等山山上有宫室至王君出唯乗一黄麟十數侍者毎行山海神皆奉迎拜謁也逺有書與陳尉真書廓落大而不正先是無人知方平名逺用此知之陳存録王君手書於小箱中也經後尸觧而去又曰張微子漢昭帝時作木匠張氏女也微子好道得尸觧又曰薊子訓者齊人也人莫知其有道在鄉里行信讓積年顔色不老人追隨之不見所常服餌好清談常閑居讀易為文皆有意義京師貴人聞之莫不虛心謁見不可致之子訓適出門諸貴人冠盖塞路諸生具言適去矣東陌上乗驢者是也各奔馬逐之不及子訓至陳公家言曰吾明日當去不復還也陳公以葛布单衣一送之至時子訓尸觧化仙去又曰隂長生新野人也後漢戚里專務道術聞馬明生得度世之道乃造焉明生旦日夕别與之髙談論語當世之事治田農之業如此十餘里長生不觧同事明生者十二人皆悉歸唯長生彌肅明生曰子真得道矣乃将入青城山以太清神丹經授之丹成仙去著書九篇云上古仙者多矣但漢興以來四十五人連余為六矣三十人尸觧餘並白日仙去隂君自序曰漢延光二年新野闕之子受仙君神丹要訣道將去世付之名山於是隂君裂黄素寫麻經一通凾以文石置嵩髙山一通黄櫨漆簡書之函以青玉置太華山一通黄金之簡刻而書之函以白銀置蜀經山一封縑書合為一篇付弟子使世世當有所傳付又著詩三篇以示將來也又曰成仙公名武丁桂陽人也後漢時為縣小吏少言大度兼通經學不從師授有自然之性以吏事至京還過長沙郡投郵舍不及遂宿於野忽聞樹上人語云向長沙市藥平旦視之乃二白鶴仙公異之遂往視市見二人張白蓋相從而行與仙公曰君當得地仙耳令還仙公病卒尸觧又曰龍伯髙者後漢伏波將軍馬援戒其兄亟稱此人之美可法者也伯髙後從仙人刁道休受服胎氣之法又受服青飢方醉亡隠䖏方臺師定籙君伯髙名述京兆人漢建武中為仙都長至零陵太守馬援戒兄子嚴書曰龍伯髙敦厚周慎口無擇言謙約節儉亷公有威吾愛之重之願汝曹効之又曰漢期門郎程偉妻得道者也能通變化偉逼求術妻不傳逼之不已妻蹷然而死尸觧而去南嶽魏夫人内傳曰清虛真人王子登與東華青童君來降受夫人曰隠遷曰醫神散一劑又與白石精金化形靈丸使頓服之稱疾弗行尅期有定俱㑹丹壠之南陽洛陽山中言畢二真人去即服藥因稱脚疾閉目寝息飲而不食夜半之後太一𤣥仙遣颷車來迎駕氣騁御經入帷中其時弟子侍疾衆親滿側莫之覺也洛陽山西夏禹廵狩名山刻石於此下有洞臺神仙學者萬餘人又曰王晉賢晉王夷甫女也為愍懐太子妃洛城亂劉曜畧晋欲妻之晋賢太罵曰我皇太子婦司徒公之女胡羗小醜敢欲干我乎言畢投河其侍婢名六出亦投河死時遇嵩髙山女真韓西華出逰遂俱獲内救外示其死體密濟賢將入嵩髙山今在華陽内洞中六出年二十餘體貌脩整後有郎姓田漁陽人魏故浚儀令田諷之孫諷有隂徳配以六出耳又曰董奉字君異侯官人也吳先主時有少年為奉本縣長奉年四十餘始知學道隨少年罷官去後五十餘年復見行經侯官諸故吏人皆往見之奉顔貌一如往日奉居山不種田為人治病亦不取錢愈使栽五株杏數年計十餘萬株令人将榖一噐自往取杏一器貨杏得榖賑救貧乏供給行旅不逮者歳二萬餘斛乃尸觧去裴君曰尸觧之仙不得䕃華盖乗飛龍登太極逰九宫也諸有单用曲晨飛精劔觧者得八素列紀惟奉寳秘不脩行皆白日尸觧其有作水火病兵及用大力竹杖觧去者先詣名山並為太清尸觧凢脩劔觧之道並紀名紫簡上𨽻髙仙諸有宿功善業隂徳之仙其神得詣朱火丹陵官受學仙道為九宫真人諸用太極尸觧之道夜半去者職為地真應尸觧者或學功淺深志髙頽廢或為祭酒精勤救治者並得為三十六洞天文觧地下主者一百四十年一轉武觧鬼師二百八十年一轉凢有二等乃得進補仙職九天生神章經曰夫人學道希慕神仙及得尸觧者終歸仙道神化雖同兩不相雜俱入道真明真科曰生世好道積功布徳名書上清者得尸觧下仙逰行五嶽後生人中更受經法為人宗師雌一五老經曰夫仙之去世也或絶跡藏住而内栖外或觧劍遺杖飄然雲霧神寄𤣥冥莫知其端緒也又曰若有此五老經雖不齋戒存思與俗混雜故不失隠存下神白日尸觧及命過太隂地下主者或遺骨胎變受化南宫是必宿有骨縁也上清經曰元始天地以上清變化七十四方觧形之道授南極元君太清真人内傳及名山記曰羅浮山洞周五百里在㑹稽南行三十里其山絶髙葛洪觧化䖏真誥謂之増城山集仙録曰張天師道陵隠龍虎山脩三元黙朝之道得黄帝龍虎中丹之術丹成服之能分形散影天師自鄱陽入嵩髙山得隠書治命之術又曰周爰友者汝南安城人也漢河南尹周暢女也暢平生多隂徳爰友小好道餌茯苓四十年後遇石先生教其遁化及隠景之道觧形之法又曰唐盧媚娘者生而靈秀性機巧南海太守進至闕順宗嘆其在宫内謂之神姑但食胡麻飯一三合至元和中憲宗嘉其聦慧因賜金鳯環以束其腕久之不願在宫掖得悟真契太平御覽卷六百六十四
