  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_913-1a, image: WYG0901/WYG0901-0128c.png}
body:
  text: 太平御覽卷九百十三宋李昉等撰獸部二十五雜獸驒騱騉蹄蒙頌贙魋蜼鼳豦驨㚟石豰猶􅭼竹㹠原天狗獜䝣􅼚鹿蜀類猼訑狸力土螻讙幽頞足訾那父天馬㔮胐朏文文開明窮竒猾褢彘羬羊囂長右谿邉􅙱犰狳渾沌檮杌㺊無損綢齧鐡飛骸獸破鏡猯狖􅚦麡狼兩頭獸獑猢黄要含利兹白露犬耳䑕壄羊猛氏飛遽射干蟃蜒蒲牢驒騱上音顛下音奚説文曰驒騱野馬屬史記曰匈奴畜則駃吉穴切騠下奚切驒騱騉蹄爾雅曰騉蹄趼善陞甗孫炎曰蹄似馬蹄平如研而善升山甗者郭璞曰秦時有騉蹄苑騉駼大胡切枝蹄趼善陞甗蒙頌爾雅曰䝉頌猱狀郭璞曰即䝉貴也似蜼而小紫黑色可畜捕䑕勝猫九真日南皆出之贙爾雅曰贙乎犬切有力郭璞曰西海大秦國有養者似狗多力獷惡魋爾雅曰魋如小熊竊毛而黄蜼勅余切爾雅曰蜼卬鼻而長尾郭璞曰似獮猴而大黄黑色尾數尺鼻露向上雨則自懸於樹以尾塞鼻或以兩指也鼳古没切爾雅曰鼳䑕身長須而賊秦人謂之小驢郭璞曰鼳似鼠而馬蹄一嵗千斤為物殘賊豦音據爾雅曰豦􅌺頭郭璞注曰今建平山中有豦如狗似獮猴多髯能舉石擊人驨爾雅曰驨音攜如馬一角不角者騏㚟刃畧切説文曰㚟獸似兎青色而大頭與兎同足與鹿同山海經曰縁光之山獸多㚟郭璞注曰㚟似兎而鹿脚青色也石豰説文曰豰呼木切類犬腰以上黄腰以下黑食獮猴或曰豰似䍧羊風土記曰石豰似狢而形短常捕取猴猨司馬相如上林賦曰獑胡豰蛫猶羊救切説文曰猶玃屬一曰隴西謂犬子為猶爾雅曰猶如麂善登木􅭼劉勰新論曰寒山有獸其名為􅭼其角當心俯而磨之潰心而死竹㹠徐褒南方記曰竹㹠野生長一丈三尺在土穴中常食竹根味如鴨肉原山海經曰翼望之山亦作土翠山有獸狀如狸一目三尾名曰原音奪衆聲言能作百種聲可以禦凶也天狗山海經曰隂山濁谷之水有獸出焉狀如狸或作狗白首名曰天狗可以禦凶獜音吝山海經曰依軲之山有獸焉狀如犬虎爪有甲名獜體有鱗甲黑色食之不畏風䝣􅼚上音渠下音叟山海經曰䝣􅼚獸名食猛獸鹿蜀山海經曰杻陽之山有獸狀如馬而白首文如虎而赤尾其音如謡如人歌其名曰鹿蜀佩之宜子孫山海經圖讃曰鹿蜀之獸馬質虎文驤首吟鳴矯矯騰羣佩其皮毛子孫如雲類山海經曰亶爰之山有獸狀如狸而有髦其名曰類自為牝牡食者不妬猼訑上音博下音他山海經曰基山有獸其狀如牛九尾四耳目在背名曰猼訑佩之不畏山海經圖讃曰猼訑似羊眼乃在背視之則竒推之無怪欲不恐懼厥皮可佩狸力山海經曰柜山有獸状如豚有距其音如狗吠其名曰狸力見則其縣多土功土螻山海經曰崑崙之丘有獸焉其狀如羊而四角名曰土螻讙山海經曰翼望之山或作土翠有獸如狸一目而三尾其名曰讙音歡或作原其音如奪百聲言其能作百種聲或曰奪百物名亦未詳可以禦凶服之已癉幽頞音遏山海經曰邉春之山有獸如禺而文身善笑見人則卧名曰幽頞或作妭其鳴自呼山海經圖讃曰幽頞似猴俾愚作智觸物則笑見人佯睡足訾山海經曰蔓聯之山有獸状如禺而有鬛牛尾文臂馬蹄見人則呼名曰足訾其鳴自呼那父山海經曰灌題之山有獸如牛而白尾其音如訆其名曰那父天馬山海經曰馬成之山有獸如白犬而黑頭見人則飛其名天馬其鳴自訆㔮音那或作能山海經曰甘棗之山有獸狀如􅀈䑕而文題􅀈䑕未詳名曰㔮食之已癭胐朏音普妹切山海經曰霍山有獸如狸白尾有鬛名胐朏養之已憂文文山海經曰放臯之山有獸狀如蜂枝尾而反舌善呼其名曰文文開明山海經曰開明獸身類虎而九首皆人靣東嚮立出崑崙窮竒山海經曰邽山有獸狀如牛而蝟毛名曰窮竒食人或云窮竒聞人闘乃􅂇不直者文王出獵所獲張揖注上林賦曰窮竒其音如狗嘷神異記曰北有獸狀如虎有翼名窮竒猾褢山海經曰堯光之山有獸如人而彘鬛冬蟄名猾褢音如斵山木如人斵木聲見則其縣有役彘山海經曰浮玉之山有獸如虎而牛尾音如犬名曰彘羬羊山海經曰華山之背曰錢来山有獸狀如羊而馬尾名曰羬羊其脂可以已腊治體腊也􅅝山海經曰羭次之一山有獸狀如禺而長臂其名曰􅀢長右山海經曰長右之一山有獸如禺而四耳名長右因其山名音如吟見則郡縣大水谿邉山海經曰天帝之山有獸狀如狗名谿邉哉作遺席其皮者不蠱􅙱山海經曰臯塗之山有獸狀如鹿白尾馬足人手前兩脚似人手而四角名曰􅙱犰狳上音求下音余山海經曰餘峩之山有獸狀如兎鳥喙鴟目蛇尾見人則眠言陽死也其名曰犰狳其鳴自呼見則蟲蝗為敗渾沌東方朔神異經曰崑崙西有獸狀如犬長毛有目而不見有耳而不聞有腹而無五臓有腸直而不旋食物徑過人有徳行而往則牴觸之有凶徳而往則依憑之天使其然名曰渾沌一名無耳一名無心空居無為常咋尾回轉向天而笑檮杌東方朔神異經曰西方荒中有獸焉狀如虎而身大虎尾毛長一尺張華注曰言此獸毛皆如豪猪毛也人靣虎足口有猪牙尾長一丈八尺名曰檮杌㺊音㺊東方朔神異經曰北方有獸焉其狀如獅子食人吹人則病口中吹人名曰㺊恒近人村里入人居室百姓患苦天帝徙之北方荒中也無損神異經曰南方有獸其狀如鹿豕頭有牙鹿尾善依人求五榖名曰無損其肉可作鮓使􅀈一作瀋肥美而咋肉不壊吞之不入􅀈盡更添復以作鮓如初愈美名曰不盡鮓一作鮮綢神異經曰西方深山有獸焉靣目手足毛色如猴體大如驢善縁髙木皆雌無雄名曰綢須人三合而有子要路強牽男人將上絶冡之上取菓并竊五榖食更合三畢而定十月乃生齧鐡神異經曰南方有獸角足大小狀如水牛皮毛黒如漆食鐵飲水其糞可為兵器其利如鋼名齧鐡飛骸獸洞冥記曰漢武帝時翕韓國獻飛骸獸狀如鹿青色以寒青之絲為繩繫之獸死帝愛而不埋掛之於苑門皮毛皆爛朽骨色猶青時人咸知其神更以䋲繫其足閉於重觀後數日徃觀見䋲之所繫處在頭餘皆飛去有野人於草間得其骨脊皆能飛起取還以獻帝乃以野人所獻骨脊及頭尾之骨舂為粉以蝙蝠和為丸以療百病其丸夜視之有光服之體有光明破鏡漢書郊祀志曰古者天子常以春解祠祠黄帝用破鏡孟康曰獸名食父黄帝欲絶其類使祠皆用之破鏡如􅓔而虎眼猯音湍淮南子曰猯知曲穴亦鳥獸之智狖説文曰狖䑕屬善旋吳録地理志曰建安陽縣多狖似猿而露鼻雨則以尾反塞鼻孔郡内及臨海皆有之􅚦力水切為二切異物志曰􅚦鼠屬捷勇於猨􅀈靣皮鼻微倒向上尾端分為兩條天雨便以挿鼻孔中水不入見人則顛倒投擲或墮地奔走無所㢠廻避觸樹衝石或至破頭折脛俗人罵恃力人云癡如􅚦又張揖注上林賦曰􅚦飛䑕也其狀如兎而䑕首以其髯飛郭璞曰鼯䑕也毛紫赤色飛且乳一名飛生麡狼上才兮切異物志曰麡狼狀似鹿而角前向入林掛角故恒在平淺草中肉肥香美逐入林則得之皮可作履襪角正四據南人因以作牀兩頭獸盛𢎞之荆州記曰武陵郡有雲陽山山有獸如鹿前後有頭常以一頭食一頭行山中時有見之者獑猢上音斬下音胡蜀地志曰獑猢獸似猴為獸竒捷常在樹上歘焉騰躍百歩五十歩若鳥黄要蜀地志曰黄要獸一名墠㣲一名䖍己鼬身狐首生子長大自活羣逐其母令不得飲將有所求而先見此獸則不得矣含利張衡西京賦曰含利颬颬化為仙車鄭氏姻禮謁文讃曰含利為獸獸而能謙禮義乃食口無譏􅀢兹白博物志曰兹白若白馬鋸牙食虎豹露犬博物志曰文馬赤鬛身若黄金名古黄之乗復薊之露犬也能飛食虎豹耳鼠山海經曰丹熏之山有獸焉狀如䑕名曰耳鼠以其尾飛壄羊上移者切張揖注上林賦曰壄羊麢羊也似羊而青猛氏孟康注上林賦曰瑕蛤猛氏皆獸名郭璞曰今蜀中有獸狀如熊而小毛淺有光澤名猛氏飛遽張揖注上林賦曰飛遽天上神獸鹿頭而龍身射干郭璞注子虛賦曰騰逺射干張揖注曰騰逺獸也射干似狐能縁木蟃蜒上音萬下丑延切又音延郭璞注子虛賦曰蟃蜒大獸似狸長百㝷蒲牢李善注東都賦曰海畔有獸名蒲牢性畏鯨每食於海畔鯨輕躍擊之蒲牢則鳴聲如鐘今人多鑄蒲牢之形於鐘上斵撞作鯨形以擊鐘天子出則擊之太平御覽卷九百十三
