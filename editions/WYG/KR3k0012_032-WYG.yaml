front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_032-1a, image: WYG0893/WYG0893-0276c.png}
body:
  text: 太平御覽卷三十二宋李昉等撰時序部十七七月十五日九月九日七月十五日荆楚嵗時記曰七月十五日僧尼道俗悉營盆供諸佛按盂蘭盆經云有七業功徳并幡花歌鼓果食送之蓋由此也又盂蘭盆經云目連見其亡母在餓鬼中即鉢盛飯徃餉其母食未入口化成火炭遂不得入目連大呌馳還白佛佛言母罪重非汝一人所能救湏十方衆僧威神之力至七月十五日當為七代父母危難中者具百味五果以著盆中供養十方大徳佛勅衆僧皆為施主祝願七代父母行禪定意然後受食是時目連白佛未來世佛弟子行孝順者亦應奉盂蘭盆供養佛言大善故後代人因此廣為華飾乃至刻木割竹飴蠟綵縷横花葉之形極工妙之巧道經曰七月十五日中元之節地官校閲捜選衆人分别善惡諸天聖衆普詣宫中簡定刼數人鬼簿録餓鬼囚徒一時俱集以其日作𤣥都大齋獻于玉京及採諸花果世間所有竒異之物玩弄服飾幡幢寳蓋莊嚴供養之具精膳飲食百味芬芳獻諸衆聖及與道士于其日夜講誦是經十方大聖髙詠靈篇囚徒餓鬼當時解脫并俱飽滿免于衆苦得還人身若非如斯難可㧞贖唐書曰代宗七月望日扵内道塲造盂蘭盆飾以金翠所費百萬又設髙祖以下七聖神座備幡節龍傘衣裳之制各書尊號於幡上以識之舁出内庭陳於寺觀是日排儀仗百僚序立於光順門以候之幡花鼓舞迎呼道路嵗以為常而識者嗤其不典唐楊盈川盂蘭盆賦曰渾元告秋羲和奏曉太隂望兮圓魄皎閶闔開兮凉風嫋四海澄兮百川皛隂陽肅兮天地悄掃離宫清重閣設皇邸張翠幕鸞飛鳳翔燄暘倐爍雲舒霧布翕赫䀜霍陳法供飾盂蘭壯神功之妙物何造化之多端青蓮吐而非夏頳果揺而不寒銅鐡鈆錫璆琳琅玕映以甘泉之玉樹冠以承露之金盤憲章三極儀刑萬類上寥廓兮法天下安貞兮象地殫怪力窮神異少君王子掣曵兮若來玉女瑶􅁎翩躚兮必至鳴鷫鸘與鸑鷟舞鶤雞與翡翠毒龍怒兮赫然狂象奔兮沉醉怖魍魎潛魑魅離婁明目不足見其精㣲匠石洗心不足徵其奥秘繽繽紛紛氤氤氲氲五色成文若榮光休氣發彩於重雲蒨蒨燦燦煥煥爛爛三光壯麗若合璧連珠曜於長漢夫其逺也天台嵥起繞之以赤霞夫其近也削城孤峙覆之以蓮華晃兮瑶臺之帝室赩兮金闕之仙家其髙也上諸天於大梵其廣也遍法界於恒沙上可以薦元符於七廟下可以納羣動於三車九月九日續齊諧記曰汝南桓景隨費長房遊學累年長房謂之曰九月九日汝家當有災厄宜急去令家人各作綘囊盛茱茰以繫臂登髙飲菊花酒此禍可消景如言舉家登山夕還見雞犬牛羊一時暴死長房聞之曰此可以代矣今世人每至九月九日登髙飲酒婦人帶茱茰囊因此也晉書曰孟嘉為㕘軍既和而正桓温重之九月九日温逰龍山僚属畢集風吹嘉㡌落不覺如厠孫盛時在坐温授紙筆命嘲之著嘉坐處嘉歸見之笑而請紙即答了不容思言速成也續晉陽秋曰陶潜九月九日無酒宅邊東籬下菊藂中擿盈把坐其側未幾望見白衣人至乃王𢎞送酒也即便就醉而後歸又曰寧康三年九月九日上嘗講孝經謝安侍坐陸約并卞躭執讀謝石袁宏並執經車𦙍王温摘句南齊書曰髙祖以九月九日登商飈館在孫陵寺岡世呼為九日臺在縣北八里一百步當孫陵岡曲街也又曰南齊以九月九日馬射或說秋金氣講習武事象漢立秋之禮又曰宋武帝為宋公在彭城九月九日出登項羽戲馬臺至今相承以為故事荆楚嵗時記曰九月九日四民並藉野飲讌杜公瞻云九月九日宴會未知起于何代然自漢至宋未改今北人亦重此節近代皆宴設于臺榭風土記曰九月九日律中無射而數九俗于此日以茱茰氣烈成熟當此日折茱茰房以挿頭言辟惡氣而禦初寒西京雜記曰漢武帝宫人皆佩蘭九月九日佩茱茰食蓬餌飲菊花酒云令人長夀蓋相傳自古莫知其由豫章記曰龍沙在郡北帶江沙甚潔白髙峻而陂有龍形俗為九日登髙處又曰郡北龍沙九月九日所逰宴處其俗皆然也按南陽酈縣有菊花水民居其側者夀並百二三十嵗漢時劉寛袁隗嘗臨此郡月致三斛以自供此其驗乎續捜神記曰有一書生居嘗自稱胡博士以經傳教授假借諸經書渉載忽不復見後九日人相與登山逰觀但聞講誦聲尋覔有一空塜入數步群狸羅坐見人迸走唯有一狸獨不能去是常假書者集異記曰明皇天寳十三載重陽日獵于沙苑雲間有孤鶴徊翔焉上親御弧矢一𤼵而中其鶴則帶箭徐墜將及地丈許歘然矯翰西南而逝萬衆極目良久乃滅益州城距郭十五里有明月觀焉依山臨水松桂深寂道流非修習精慇者莫得而居觀之東廊第一院尤為幽絶每有自稱青城道士徐佐卿者風局清古一嵗率三四至觀之耆舊因虛其院之正堂以俟其來而佐卿至則栖焉或三五日或旬朔言歸青城甚為道流之所傾仰一日忽自來至神爽不怡謂院中人曰吾行山中偶為飛矢所加尋已無恙矣然此箭非人間所有吾留之于壁上後年箭主到此即宜付之慎無墜失仍援毫記壁云留箭之時則十三載九月九日也𤣥宗避狄幸蜀暇日命駕行逰偶至斯觀樂其佳境因遍幸道室既入此堂忽覩掛箭即命侍臣取而翫之蓋御箭也上深異之因詢觀之道士皆以實對即是佐卿所題乃前嵗沙苑縱獵之日也佐卿蓋中箭之孤鶴耳豈即其沙苑翻飛日集于斯歟上大奇之因收其箭而寶焉自後蜀人亦無有逢佐卿者襄陽記曰望楚山有三名一名馬鞍山一名災山宋元嘉中武陵王駿為刺史屢登之鄙其舊名望郢山因改為望楚山後遂龍飛是孝武所望之處時人號為鳯嶺髙處有三磴即劉洪山簡九日宴賞之所也姑熟記曰縣南十里有九井山殷仲文九日從桓公九井賦詩即此山是也臨海記曰郡北四十里有湖山山形平正可容數百人坐民俗極重九日每菊酒之辰宴㑹于此山者常至三四百人登之見已屋悉委江海分明夀陽記曰州有義門舍有數百人每至九日於明義樓街作樂以受施以供令齊民月令曰重陽之日必以糕酒登髙眺逈為時序之逰賞以暢秋志酒必採茱茰甘露以泛之既醉而還太清諸草木芳曰九月九日採菊花與茯苓松栢脂丸服之令人不老盧公範曰九月重陽日上五色糕菊花枝茱茰樹飲菊花佩茱茰囊令人長夀也魏文帝九日與鍾繇書曰嵗月徃來忽復九月九日九為陽數而日月並應俗嘉其名以為宜於長久故以宴享髙會是月律中無射言群木庶草無有射而生者而芳菊紛然獨秀非夫含乾坤之純和體芬芳之淑氣孰能如此故屈平悲冉冉之將老思餐秋菊之落英輔體延年莫斯之貴謹奉一束以助彭祖之術宋謝瞻九日從宋公戲馬臺詩曰風至授寒服霜降休百工巢幙無留燕遵渚有歸鴻輕霞冠秋日迅商薄秋穹聖心眷嘉節鳴鑾戾行宫肆筵霑芳醴中堂起絲桐扶光迫西汜歡餘宴有窮又謝靈運九日從宋公戲馬臺送孔令詩曰季秋朔邊苦旅鴈違霜雪凄凄陽卉腓皎皎寒潭潔良辰感聖心雲旗興暮節鳴笳戾朱宫蘭巵獻時哲歸客逐海隅脫冠謝朝列河流有急瀾浮驂無緩轍梁庾肩吾九日侍宴詩曰轍迹光周頌巡逰盛夏功鉤陳萬騎轉閶闔九門通秋暉逐行漏朔氣繞相風獻夀重陽節迴鑾上苑中䟽山開輦道間樹出離宫玉醴吹巖菊銀牀落井桐飲羽山西射浮雲冀北驄塵飛金埒滿葉破栁條空又劉苞九日侍宴樂逰苑詠重陽曰上郡良家子幽并逰俠兒立乘争飲羽側騎競紛馳明珂飾華眊金鞍映玉羈膳羞殫海陸和氣齊民宜雲飛雅琴奏風起洞簫吹曲終髙宴罷景落樹隂移㣲薄承嘉會飲徳良不貲取効續無紀感恩心自知後周王褒九日從駕詩曰黄山獵地廣青門官路長律改三秋節氣應九鍾霜射馬垂雙帶豐貂佩兩璜苑寒梨樹紫山秋菊葉黄華露霏霏冷輕飈颯颯揚終慙屬車對空假侍中郎隋江總衡州九日詩曰秋日正萋萋茒茨復蕭瑟姬人薦秋醖幼子問殘疾園菊抱黄花庭榴剖朱實聊以著書情暫遣他鄉日又九日至㣲山亭詩曰心逐南雲逝形隨北鴈來故鄉籬下菊今日幾花開太平御覽卷三十二
