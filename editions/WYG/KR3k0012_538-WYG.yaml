body:
  text: 太平御覽卷五百三十八宋李昉等撰禮儀部十七朝聘尚書周官曰六年五服一朝五服侯甸男采衞六年一朝㑹京師又六年王乃時廵考制度于四嶽諸侯各朝于方嶽大明黜陟毛詩小雅曰采菽刺幽王也侮慢諸侯來朝不能錫命以禮數徵㑹之而無信義君子見微而思古焉幽王徵㑹諸侯為合義兵徵討有罪既往而無之是于義事不信也君子見其如此知其後必見攻伐將無救也采菽采菽筐之筥之君子來朝何錫予之雖無予之路車乗馬君子謂諸侯也箋云賜諸侯以車馬言雖無予之尚以為薄也周禮天官上宰夫曰宰夫之職掌朝覲㑹同賓客以牢禮之法掌其牢禮與其陳數又春官上宗伯曰春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰㑹殷見曰同此六禮者諸侯見王為文也六服之内四方一時分來或朝春或宗夏或覲秋或遇冬者殊禮異使逓而遍朝猶朝也欲其来之早也宗尊也欲其尊王也覲之言勤也欲其勤王之事也遇猶偶也欲其若不期而至也時見者無常期也諸侯有順服者王将一征討之士則計朝覲王為壇於士國外合諸侯而有命焉時聘曰問殷覜曰視又秋官下大行人曰大行人掌大賔之禮大客之儀以親諸侯大賔要服以内諸侯也大客謂孤卿也春朝諸侯而圖天下之事秋覲以比邦國之功夏宗以陳天下之謨冬遇以恊諸侯之慮時㑹以發四方之禁殷同以施天下之政此六者以王見諸侯為文時聘以結諸侯之好殷覜以除邦國之慝此二事者亦以王見諸侯之使来者時為文間問以諭諸侯之志歸脤以交諸侯之福賀慶以賛諸侯之喜致禬以補諸侯之烖凡大國之孤執皮帛以繼小國之君凡諸侯之卿其禮各下其君二等以下及其大夫士皆如之九州之外謂之蕃國世一見各以其所貴寳為贄凡諸侯之邦交嵗相問也殷相助也世相朝也儀禮覲禮曰諸侯覲天子為宫方三百步四門壇十有二尋深四尺上介皆奉其君之旂治於宫尚左公侯伯子男皆就其旂而立禮記曲禮曰天子當依而立諸侯北面而見天子曰覲天子當宁而立諸公東面諸侯西面曰朝諸侯未及期相見曰遇相見於郤地曰㑹諸侯使大夫問於諸侯曰聘又王制曰諸侯之於天子也比年一小聘三年一大聘五年一朝天子無事與諸侯相見曰朝又中庸曰繼絶世舉廢國治亂持危朝聘以時厚往而薄來所以懐諸侯也又經解曰聘覲之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之敗起矣又聘義曰聘禮上公七介侯伯五介子男三介所以明貴賤也此皆使卿出聘之介數也介紹而傳命君子於其所尊弗敢質敬之至也故天子制諸侯比年小聘三年大聘相厲以禮使者聘而誤主君弗親饗食也所以愧厲之也諸侯相厲以禮則外不相侵内不相陵此天子之所以養諸侯兵不用而諸侯自為正之具也左傳隠公十一年春滕侯薛侯来朝争長薛侯曰我先封滕侯曰我周之卜正薛庶姓也我不可以後之公使羽父請於薛侯曰周之宗盟異姓為後寡人若朝於薛不敢與諸任齒乃長滕侯又莊公虢公晉侯朝王王饗醴命之宥皆賜玉五㲄馬三匹非禮也雙玉為㲄王命諸侯名位不同禮數亦異不以禮假人又莊公曰夫禮所以整民也故㑹以訓上下之則制財用之節朝以正班爵之義帥長㓜之序又文上曰穆伯如齊始聘焉禮也凡君即位卿出並聘踐脩舊好要結外援好事隣國以衛社稷忠信卑讓之道也忠徳之正也信徳之固也卑讓徳之基也又宣公上曰晉靈公不君趙宣子驟諫公患之使鉏麑賊之晨徃寢門闢矣盛服將朝尚早坐而假寐麑退嘆曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死矣觸槐而死又宣公孟獻子曰臣聞小國之免於大國也聘獻方物於是乎有庭實旅百朝而獻功於是乎有容貌采章嘉淑而有加貨又襄公晉侯使韓宣子聘於周王使請事對曰晉士起将歸時事於旅無他事矣王聞之曰韓氏其昌阜於晉乎辭不失舊又襄公二十二年晉人徴朝于鄭鄭人使少正公孫僑對曰在晉先君悼公九年我寡君於是即位即位八月而我先大夫子駟從寡君以朝于執事執事不禮於寡君寡君懼因是行也我二年六月朝于楚晉是以有戯之役楚人猶競而申禮於敝邑敝邑欲從執事而懼為大尤曰晉其謂我不共有禮是以不敢攜貳於楚我四年三月先大夫子蟜又從寡君以觀釁於楚晉於是乎有蕭魚之役謂我敝邑邇在晉國譬諸草木吾臭味也而何敢差池以大國政令之無常國家罷病不虞荐至無日不惕豈敢忘職大國若安定之其朝夕在庭何辱命焉又昭公四年康有酆宫之朝又昭公十三年明王之制使諸侯嵗聘以志業間朝以講禮再朝而㑹以示威再㑹而盟以顯昭明志業於好講禮於等示威於衆昭明於神春秋說題辭曰朝者不占而到諸侯秉政尊卑有序各來朝講文徳明禮讓天下法制四方受度㑹者所以興徳明義考遺廢於天下史記曰子貢結駟連騎束帛之幣以聘享諸侯所至國君無不郊迎與抗禮者漢書武紀曰元年春正月朝諸侯王於甘泉宫又宣帝甘露二年呼韓邪單于欵五原塞願奉國珍報三年春呼韓邪單于朝天子于甘泉宫漢寵以殊禮位諸侯王上賛謁稱藩臣而不名賜以璽綬冠帶衣裳使有司導單于先行就邸長平上自甘泉宿池陽宫上登長平坡詔單于毋謁及諸夷蠻君長王迎候者數萬人夾陳道上登渭橋咸稱萬嵗後漢書曰竇融将朝㑹於髙平先遣從事問㑹見儀適是時軍旅代興諸将與三公交錯道中或背使者交私語帝聞融先問禮儀甚善之以宣告百僚乃治酒髙㑹引見融等待以殊禮孟子曰諸侯朝於天子曰述職一不朝則貶其爵再不朝則削其地三不朝則六師移之白虎通曰所以制朝聘之禮何以尊君父重孝之道也大臣之事君猶子之事父欲同臣子之恩一統尊君故必朝聘也謂之聘者問也謂之朝者見也因用朝時見故謂之朝又曰言諸侯時朝於天子朝用何月皆以夏之孟四月因留助祭朝禮奈何諸侯将至京師使人通㑹於天子天子遣大夫迎之百里之郊遣世子迎之五十里之郊矣又曰諸侯以月旦告朔於廟者縁生以事死故曰君月朔朝宗廟存神受政又曰諸侯來朝天子親與之合瑞信者正君臣重法度是也五經異議曰古春秋左氏說閏以正時時以作事事以厚生生民之本於是乎在不告閏朔棄時正也棄時正則不知其所行故閏月不以朝者諸侯嵗遣大臣之京師受十二月之正還藏於太廟月旦朝廟存神有司因告曰今月當行某正至於閏月藂殘餘分之月無正故不以朝經書閏月猶朝之者是也摯虞决疑要注曰漢制㑹於建始殿晉制大㑹於太極殿小㑹於東堂其㑹則五時朝服庭設金石虎賁旄頭文衣繡尾廣記曰尉陀所都處築髙臺以朝漢室員基千歩直峭有百丈螺道登進頂上朔朢為朝臺左思吳都賦曰昔夏后氏朝羣臣於兹土而執玉帛者萬國盖先王之髙㑹四方之軌則也太平御覽卷五百三十八
