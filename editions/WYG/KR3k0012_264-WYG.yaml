body:
  text: 太平御覽卷二百六十四宋李昉等撰職官部六十二功曹叅軍司倉叅軍司戸叅軍司兵叅軍司法叅軍五官掾功曹叅軍韋昭辯釋名曰曹羣也功曹吏所羣聚戸曹民所羣聚也其他皆然漢書曰蕭何為主吏孟康曰主吏功曹也又曰朱博為瑯琊郡守召見功曹閉閣數責與筆札使自記受取一錢已上無得有所匿欺謾半言斷頭矣功曹惶怖具自書奸臧大小不敢隱博知其對以實乃令就席受勅自改而已投刀使削所記遣出就職東觀漢記曰趙勤南陽人太守桓虞召為功曹委以郡事嘗有重客過欲託一士令為功曹吏虞曰我有賢功曹趙勤當與議之濳於内中聽虞乃問勤勤對曰恐未合衆客曰止止勿復道又曰楊正為京兆功曹光武崩京兆尹出西域賈胡共起帷帳設祭尹車過帳胡牽車令拜尹疑止車正在前導曰禮天子不食支庶況夷狄乎勅壞祭遂去又曰鮑永為郡功曹時有稱侍中止傳舍者太守趙興欲出謁永以不宜出當車拔佩刀截馬當胸興因還後數日詔書下捕之果矯稱使者由是知名又曰郭丹為郡功曹薦隂亶程胡魯歆自代太守杜詩曰古者卿士讓位今功曹稽古經可為至德編署黄堂以為後法又曰吳良字大儀齊國臨淄人初為郡吏嵗旦與掾史入賀門下掾王望舉觴上夀諂稱太守功德良於下席勃然進曰佞邪之人欺諂無狀願勿受其觴太守斂容而止讌罷轉良為功曹恥以言受進終不肯謁又曰汝南太守歐陽歙召郅惲為功曹汝南舊俗十月饗會百里内皆賫牛酒到府飲讌時臨饗禮畢歙教曰西部督郵繇延天資忠貞不嚴而治今與衆儒共論延功顯之于朝惲於下座愀然前曰案延資性貪邪外方内員朋黨搆奸罔上害民明府以惡為善以直從曲此既無君又復無臣惲敢奉觥歙色慚不知所為門下掾鄭敬進曰君明臣直功曹言切明府德也歙意少解曰實歙罪也又曰永平初新野功曹鄧寅以外戚小侯毎預朝㑹而容姿趍步有出於衆上目之顧左右曰朕之儀貎豈若此人特賜輿馬衣服虞延以寅無實行未嘗加禮上乃詔令自稱南陽功曹詣闕寅在職不服父喪帝聞乃歎曰知人則哲惟帝難之信哉斯言寅聞慙而退後漢書曰虞延去官還鄉里太守富宗聞延名召署功曹宗性奢靡車服器物多不中節延諫曰昔晏嬰輔齊鹿裘不完季文子相魯妾不衣帛以約失之者鮮矣宗不恱即辭退居有頃宗果以侈縱被誅臨當伏刑攬涕而歎曰恨不用功曹虞延之諫又曰周章初仕郡為功曹時大將軍竇憲免封冠軍侯就國章從太守行春到冠軍太守猶欲謁之章進諫曰今日公行春豈可越儀私交且憲椒房之親勢傾王室而退就蕃國禍福難量明府剖符大臣千里重任舉止進退其可輕乎太守不聽遂便升車章前拔佩刀絶馬鞅於是乃止及憲被誅公卿以下多以交關得罪太守幸免以此重章又曰徐穉豫章人時陳蕃為太守以禮請署功曹穉不肯就既謁而退蕃在郡不接賓客惟穉來特設一榻去則懸之又曰韓稜初為郡功曹太守葛興中風疾不能聽政稜隂代興視事出入二年令無違者又曰亷范永平初隴西太守鄧融備禮請范為功曹㑹融為州所舉案舉其罪案騐之范知事譴難解欲以權相濟乃託病求去融不達其意大恨之范於是東至洛陽變名姓求代廷尉獄卒居無幾融果徵下獄范遂得衛侍左右盡心勤勞融怪其貎類范而殊不意乃曰卿何似我故功曹耶范訶之曰君困戹瞀亂耶鄭𤣥注禮記曰瞀目不明之貎語遂絶融繫出困病范随而養視及死竟不言身自將車送喪至南陽葬畢乃去續漢書曰汝南太守宗資以事委任功曹范滂時人謠曰汝南太守范孟博南陽宗資主畫諾又曰李恂字叔英安定臨涇人太守李鴻請署功曹未及到而州辟為從事會鴻卒恂不應州命而送鴻喪還鄉里既葬畱起冡墳治喪三年又曰李充為太守魯平請署功曹不就平怒乃投充以捐溝中因謫署縣都亭長不得已起親職役謝承後漢書曰范滂字孟博汝南人太守宗資署功曹滂外甥西平李頌公族子孫頑嚚穢濁為鄉曲所棄常侍唐衡屬其事資勅曹召署文學吏滂不肯聽資怒召功曹書佐朱零問不召頌意狀零以告滂滂曰答教當言頌則滂之姊子豈不樂其升進但頌洿穢小人不宜染汙朝廷不敢以位私人是以不召零具答教如此零入聞資使五伯亂捶困杖言辭不懾仰疾言曰范滂清議猶利刃截腐肉願為明府所笞殺不為滂所廢問今日之死當受忠名為滂所廢永成惡人滂正直謇諤皆此類也又曰許劭仕郡為功曹抗忠舉義進善黜惡止機執衡允齊風俗所稱如龍之升所貶如墮于淵清論風行所吹草偃為衆所服又曰李壽聰明智逺有俊才太守黄讜髙其名德召署功曹毎進見常薦達郡中善人有異行者讜輒序用夀雖見優禮愈隆夀意益下其所致達未嘗伐其功美又曰羊定字世德為郡功曹病困被不覆軀衣不周身郡將賜大布被及襦袴皆不受執志而終又曰鍾皓字季明潁川長社人同郡陳寔年不及皓引與為友皓為郡功曹㑹辟司徒府臨辭太守問誰可代卿者皓曰明府必欲得其人西門亭長陳寔可寔聞之曰鍾君似不察人不知何由識我又曰彭修㑹稽人仕郡為功曹時西部都尉宰晁行太守事以㣲過收吳縣獄吏將殺之主簿鍾離意諍諫甚切晁怒使收縛意修排閤直入升于庭曰明府發雷霆于主簿請聞其過晁曰受教三日初不奉行廢命不忠豈非過耶修因拜曰昔任痤面折文侯朱雲攀毁欄檻自非賢君焉得忠臣遂原意罰貸獄吏袁山松後漢書曰岑晊字公孝髙才絶人五經六藝無不通貫太守成瑨請為功曹時謠曰南陽太守岑公孝𢎞農成瑨但坐嘯張璠漢記曰陳寵為廣漢太守風聲大行徵為大司農帝問何以為治寵曰臣任功曹王渙渙由是知名魏志曰臧洪廣陵郡人也為張超功曹超兄邈謂超曰聞弟為太守政教威惠不由己出動任臧洪洪者何人超曰洪才略智數甚優于超超甚愛之海内竒士也邈即引見洪與語大異之又曰臧洪字子原太守張超請洪為功曹董卓圖危社稷洪說超曰明府厯世受恩兄弟並據大郡今王室將危賊臣未梟此誠天下義烈報恩効命之秋也今郡境尚全吏民殷富若動桴皷可得二萬以此誅除國賊誠為天下倡先義之大者也超然其言又曰袁渙字曜卿當時諸公子多越法度而渙清静舉動必以禮郡命為功曹郡中姦吏皆去又曰陳矯字季弼廣陵人太守陳登請為功曹使矯詣許謂曰許下議論待吾不足者相為觀察還以見誨矯還曰聞逺近之論頗言明府驕而自矜使過泰山泰山太守薛悌異之結為親友戲矯曰以郡吏而交二千石鄰國君從陪臣遊不亦可乎又曰杜畿字伯侯京兆杜陵人年二十為郡功曹鄭縣内繫囚數百畿親臨獄裁其輕重盡決遣之郡中竒其年少而有大志也魏略曰京兆尹張時河東人也與杜畿有舊署為功曹常言此家疏誕不中功曹也畿竊云不中功曹中河東太守也蜀志曰龎統字士元郡命為功曹性好人倫勤於長養毎所稱述多過其才時人怪而問之統答曰當今天下大亂雅道陵遲善人少而惡人多方欲興風俗長道業不美其談即聲名不足慕企不足慕企而為善者少矣今拔十失五猶得其半而可以崇邁世教使有志者自勵不亦可乎吳志曰聶友字文悌豫章人也有脣吻少為縣吏虞翻徙交州縣令使友送之翻與語而竒焉為書與豫章太守謝斐令以為功曹郡時見有功曹斐見之問曰縣吏聶友可堪何職對曰縣間小吏耳猶可堪曹吏佐斐曰論者以為宜作功曹君其避之乃用為功曹又曰虞翻字仲翔為孫䇿功曹䇿好馳騁遊獵翻諫曰明府用烏集之衆驅散附之士皆得其死力雖漢帝不及也至於輕出㣲行從官不暇嚴吏常苦之夫君人者不重則不威故白龍魚服困於豫且子余反白虵自放劉季害之願少畱意䇿答曰君言是也然時有所思端坐悒悒有禆諶草創之計是以行耳又曰謝談為吾粲功曹以疾不詣粲教曰夫龍徳以利見為神鳯凰以嘉鳴為貴何必隠身於天外潛鱗於重淵者哉又曰潘濬字承明武威人也為人聰察對問有機理王粲見而貴異之由是知名為郡功曹吳錄曰孫劭字長緒北海人為孔融功曹融稱曰廊廟才也後為吳丞相王隱晉書曰劉毅字仲雄僑居陽平太守杜恕逼迫舉毅為功曹月餘日沙汰郡吏百餘人三魏稱焉為之語曰但聞劉功曹不聞杜府君又曰世號庾兖有異行元康之末潁川太守復以功曹命之兖服造士之衣杖棰荷斧不俟駕行曰請受下夫之役府君飾車而迎逡巡辭焉形雖益恭而神有不可動之色府君知其不屈乃歎曰非常士也吾無以臣之矣乃厚禮遣之晉中興書曰胡母輔之嘗過河南門下飲酒門下騶王子博箕坐其傍輔之叱之使取火博曰我卒也不乏吾事薦之河南尹樂廣召見甚恱之使為功曹又曰任旭字次龍臨海人操立清儉不染流俗郡將蔣琇請為功曹治官貪穢毎不奉法旭正色苦諫琇既不納旭乃謝去閉門講肄養志而已久之琇坐事被收旭於獄狼狽營救躬自扶送琇慨然歎曰任功曹直人吾違其讜言以至於此復何言哉九州春秋曰建安六年劉表攻西鄂西鄂長杜子緒帥縣男女嬰城而守時南陽功曹柏孝長亦在城中聞兵攻聲恐懼入室閉戸牽被覆頭相攻半日稍敢出面英雄記曰尚相先人尚子平有道術為縣功曹休歸自入山擔薪賣以飲食㑹稽典錄曰孫䇿功曹魏滕以忤意見遣將殺之吳太夫人乃倚大井而語䇿曰汝新造江南其事未集方當優賢禮士捨過錄功魏功曹在公盡規汝今日殺之則人明日叛汝吾不忍見禍及當先投此井中耳孫䇿大驚遽釋魏滕又曰魏朗字少英上虞人從太守行春寢於閣外感時志激中夜長歎府君朝問昨自歎者誰主簿曰書佐魏朗也府君由是知朗有凌雲之志轉功曹佐正旦與掾史上朝時功曹吏顔翕披裘以加朝服朗以裘非臣服斥翕不敬勅卒撤去翕恚而不聽以手歐卒朗右乎鳴皷左手撤裘以聞府君以朗當朝正色有不撓之節遂退翕以朗代之朗辭病不就又曰魏徽字孔章仕郡為功曹吏府君貴其名重徽毎拜謁常跪而待之華陽國志曰公孫述入蜀郡拒守述攻之功曹朱尊絆馬死戰光武帝嘉之又曰李業字巨遊廣漢梓潼人少執志清白太守劉咸慕其名召為功曹十命不詣又曰朱倉字云卿下仰人少受學於蜀郡張寧資豆屑飲水同業憐其貧資給米肉不受家貧常以步行為郡功曹鍾岏良吏傳曰桓虞字仲春馮翊萬年人也為南陽郡太守下車聞葉縣雍昱及新野令不遵法度選督郵不能正乃署趙勤為督郵到葉昱即解印後入新野令聞昱已去遣吏奉記陳罪亦即弃官虞乃曰善吏如良鷹下韝即中擢為功曹委以郡事豫章列士傳曰華茂為功曹病疫被不覆軀布衣不周身郡將與大布被袴皆不受汝南先賢傳曰袁閬字奉髙為功曹辟太尉掾太守唐珍曰今君當應宰府宜選功曹以自代因薦陳仲舉珍即請蕃為功曹又曰新蔡鄭敬字次都為郡功曹都尉髙懿㕔事前槐樹有露類甘露者懿問掾屬皆言是甘露敬獨曰明府政未能致甘露但樹汁耳懿不恱託疾而去又曰許愼為功曹奉上以篤義率下以恭寛荆州先德傳曰周瑜領南郡以龎士元名重州里所信乃逼為功曹任以大事瑜垂拱而已鍾離意别傳曰意字子阿㑹稽山隂人也太守竇翔召意署功曹意乃為府立條式威儀嚴肅莫不靖恭後日竇君與意相見曰功曹頃立嚴科太守觀察朝晡吏無大小莫不畏威陳寔别傳曰寔字仲弓潁川許人也為郡功曹時中常侍侯覽託太守髙倫用吏倫教署文學掾寔知非其人乃懷檄請見乞從外署倫從之於是鄉論怪其非舉倫後被徵為尚書郡中士大夫送至傳舍倫語衆人曰吾前為侯常侍用吏此各由故人畏憚強禦陳君可謂善則稱君惡則稱已者也聞者方歎息陸績别傳曰績字公紀吳郡人也太守王朗命為功曹風化肅穆郡内大治京兆舊事曰長安孫晨家貧為郡功曹十日一炊無被有藁一束暮卧其中旦則收之司倉叅軍後漢書曰戴就字景成仕郡為倉曹掾刺史劾其太守遣部從事案倉庫簿領五毒慘至郡事遂釋也三國典略曰張軌入關賀拔岳以為倉曹叅軍有請貸官粟者軌曰以私害公非吾宿志濟人之難詎得相違乃賣所服之衣糴粟以賑其乏司戸叅軍後漢書曰陸績李郃皆仕郡為戸曹史郃後官至司空唐書曰裴琰之絳州聞喜人也世為著姓永徽中為同州司戸叅軍時年少美容儀刺史李崇義初甚輕之先是州中有積年舊案數百道崇義促琰之使斷之琰之命書吏數人連紙進筆斯須剖斷並畢文翰俱美且盡予奪之理崇義大驚謝曰公何忍藏鋒以成鄙夫之過由是大知名號為霹􅋬手司兵叅軍唐書曰杜甫字子美本襄陽人後徙居鞏縣天寶初應進士不第天寶末獻三大禮賦𤣥宗竒之召試文章授京兆兵曹叅軍司法叅軍通典曰兩漢有決曹賊曹掾主刑法厯代皆有或謂之賊曹或為法曹或為墨曹後漢書曰周燕宣帝時為郡決曹掾太守欲枉殺囚燕數諫不聽遂殺囚囚家詣闕稱寃詔覆考燕謂太守曰願謹定文書皆署燕名府君但言時病而已使收燕燕遂死之燕有五子皆至刺史太守又曰郭𢎞為潁川郡決曹掾治獄至四十年用法平正郡内比之東海于公隋書曰陳孝義為㑹稽郡司法書佐太守蘇威欲殺一囚固諫不許解衣請先受死乃止後至侍御史汝州刺史五官掾後漢書曰王尊字子贛涿郡人為安定太守出教曰五官掾張輔懷虎狼之心貪汙不軌一郡之錢盡入輔家適足以葬矣遂將輔送獄直府史詣閣下從太守受其事輔繫獄數日而死東觀漢記曰黄香江夏安陸人也父況為郡五官舉孝亷貧無奴僕香躬勤左右苦暑乃扇牀枕冬以身温席又曰桓帝時白馬令李雲坐直諫繫獄𢎞農五官掾杜衆傷其忠直獲罪上書願與雲俱得死遂俱死於獄中後漢書曰諒輔字漢儒仕郡為五官掾夏大旱太守自祈禱無應輔乃自曝庭中祝曰輔為股肱不能進諫納忠薦賢退不肖調理隂陽順承天意乃積薪以自環搆火其旁曰若日中不雨將自焚日未中而澍雨也臧榮緒晉書曰范晷字彦長南陽順陽人少遊學清河遂徙家僑居郡命為五官掾太平御覽卷二百六十四
