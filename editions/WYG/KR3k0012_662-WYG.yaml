  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_662-1a, image: WYG0898/WYG0898-0856c.png}
body:
  text: 太平御覽卷六百六十二宋李昉等撰道部四天仙天仙品曰飛行雲中神化輕舉以為天仙亦云飛仙神仙衆真戒經曰大方諸山對㑹稽之東上有天仙宫室金玉雜為棟宇金根經曰天闕上有層樓玉臺主衆仙出入之所也玉清刻石隠銘曰佩玉帝隠文者得為上仙戒文經曰天西北有仙堂差次職署則度名著九宫五斗仙府中天上有東西南北及中央也皆有石城應其方位百官曹局皆紀列斗府中後聖列紀曰若斗中有𤣥玉籙籍者皆為上仙登真隠訣曰三清九宫並有僚屬例左勝於右其上惣穪曰道君次真人真公真卿其中有御史玉郎諸小號官位甚多也女真則穪元君夫人其名仙夫人之秩比仙公也夫人亦随仙之大小男女皆取所治䖏以為著號並有左右凢稱太上者皆一宫之所尊又有太清右仙公蓬萊左仙太極仙侯真伯先監先郎先賢皇民譜録曰自三象明曜已來至於累億刼㑹天地成敗非可勝載數極唐堯是為小刼丁亥之後甲申之年陽九百六二氣離合壬辰之始數有九周至庚子之年赤星見於東方白􅀈見於月窟唐堯之後四十六丁亥是三刼之周又五十五丁亥至壬辰癸巳是大刼之周也六合冝一二道盈虧時運周刼始轉一仙階金根下經曰有學仙品日進叙退降簿録侍仙玉晨之興祀集仙録曰後漢南陽公主降駙馬都尉王咸公主素尚至道属漢末亂離謂咸曰但當自保必可延生若碌碌随時與世進退恐不免世難之苦奔廹之患也咸俯仰世利未從其言公主遂入華隂山長徃咸入山追之無見忽於嶺上見朱履一雙前取之化為石謂其山為公主峯又曰張正禮漢末在㣲山學道服黄精受西城君虹景丹患藥之難得至廣州為道士遂得内外洞徹砂兼守一之法仙去貞誥曰章震南郡人少學經書周幽王時人也常歎曰人生世間日失一日去生轉逺乃著道書百餘篇精於五行演其㣲妙以飬性治病為主後入崆峒山仙去又曰王逺字方平東海人舉孝亷除郎中累遷至中散大夫愽學尤明天文圗䜟河洛之要逆知天下盛衰之期漢桓帝嗣位聞之連詔不出使郡國載上以至京師但低頭閉口不答詔乃題宫門板四百餘字皆説方來帝惡之歸鄉里同郡故太尉公陳躭為方平建道室旦夕事之方平在躭家四十餘年後語躭云吾去當明日日中及至明日果卒躭知仙去曰先生捨我矣又曰嚴青㑹稽人家貧常於山中作炭忽有一人與青語不知其異人也臨别以一卷書與青曰汝應長生故以相授當以潔器盛之置于髙䖏青授之後得其術入霍山仙去又曰張陵字輔漢沛國豐人也本習儒晩學長生之道得九鼎丹經聞蜀中多名山乃入鳴鶴山著道書二十餘篇仙去又曰趙廣信陽城人魏末來渡江入剡小白山中學道受三慈𤣥中之一并轍視法如此積年周行郡國或賣藥人莫知也多來都下市丹砂作九華丹仙去又曰鄭景世晋初學道於廬江灊山中受孟徳然口訣兼服胡麻𤣥丹仙去矣又曰趙伯威東郢人也少學於邯鄲張先生晚在中岳受玉佩金璫經道成仙去主仙籍并記學道又曰李方回晋武帝時人也學道在華山夢管城子蒸丹餌水法又受蘇門周夀陵丹霞之法五十年精心内視仙去又曰李修著書四十篇名曰道源其書曰弱能制強隂能蔽陽常持臨深履危御奔乗朽長生之道也年四百歲顔色不衰後仙去劉向列仙傳曰馬師皇者黄帝馬師後數有病龍出於水治之病愈一旦仙去又曰王子喬周靈王太子晋也好吹笙作鳯鳴浮丘公接上嵩山三十餘年仙去葛洪神仙傳曰蘇仙公名林字子𤣥周武王時人也家濮陽曲水林少孤以仁孝聞貧常自牧牛得道毋食思鮓仙公以錢着置器中携前去即以魚來毋曰縣便有魚去此百餘里汝欺我哉仙公跪曰不妄明日舅至云昨見令公在縣市鮓毋方駭其神異後仙去有白鶴來至郡城東北樓以爪畫樓板以膝書云城郭是人民非仙公故第猶丁令威又曰沈文㤗者九疑人得紅泉神丹法學玉符述年之道服之甚效欲之崑崙留息積年以傳李文淵曰土符不去服藥行道無益也文淵遂受其秘要後亦仙去令以竹根汁煑丹及神去三尸法又曰沈義吳郡人學道於蜀能治病救人甚有恩徳後遇羽衣侍兩人以白玉板及青玉丹書授義義不能讀須臾大霧霧解失其人義還後仙去又曰陳安世京兆人為灌叔本傭禀性慈仁叔本好道有二道士託為書生從叔本遊以觀試之叔本不知其異人也久而益怠書生乃問安世曰爾好道否曰無縁知之曰審好道明日早至道北大樹下安世承言早徃無所見曰書生詐我哉三期安世輙早至乃以藥性授安世後仙去又曰吳睦長安人少為縣吏堂局枉䧟人民訟之睦迯去入山林饑累日行至石室遇孫先生令學種黍及胡麻掃除驅使經四年先生遂授其道後復成仙去又曰董威輦不知何時人晋武帝末在洛陽白社中􅆍息土上衣服藍縷吞一石子經日不食或市乞傭作觀之亦不與言時或著詩莫知所終又曰蕭史秦繆公時人善吹簫能致孔雀白鵠公女字弄玉好之以妻焉遂教弄玉作鳯鳴居十數年鳯凰來止公為作鳯臺夫婦在其上數年仙去故秦人為作鳯女祠雍宫世有簫聲又曰河上公莫知姓名也漢孝景時結草菴於河上常讀老子經景帝好其言有所不解問公以聞公以素書二卷與帝曰讀此析疑勿示於非人公後仙去又曰董子陽少知長生之道隠博落山中九十餘年但食桃飲石泉後逢司馬季主季主以導引仙方與之遂度世得仙又曰王生陽城人居壺谷中不知時漢武登嵩山東方朔等從忽見一神人長丈餘帝禮而問之曰其九疑山人也聞中嶽有石菖蒲一寸九節食可長生故來採之忽失神人帝遂扶服之帝性熱煩惱不快從官皆服皆能遲久惟王生聞神人教服遂採食之仙去又曰劉根字君安京兆長安人少明五經漢武帝時人也入嵩山石室峻絶之䖏嘗曰上乗有九轉還丹太一金液次有雲母雄黄之屬亦可長生次乃草木之藥能治病益氣上可數百歳下即全其所禀而已必欲長生宜先清心志除嗜慾乃可授神方五色藥根後入雞頭山仙去又曰隂長生新野人後漢隂皇后之屬籍也少居富貴不好榮利知馬明生得度世之術乃求尋之遂相見執御者之禮事十餘年不懈明生曰子真得道矣遂入青城山授以太清神丹經告别後於平都山仙去風俗通曰漢明帝時尚書郎王喬為葉令月朔常詣朝堂明帝知其來而無車騎密令太史候望言其臨至時常有雙鳬從東南飛使因所見舉羅得一舄焉使尚方識之乃昔年所賜尚書官履也毎朝葉門下皷不擊而聲聞于京師後天上乃下一玉棺於㕔前喬曰天帝召我沐浴寢其中葢便覆塟於城東上自成墳百姓為立祠號葉君祠三洞珠嚢曰壼公謝元瀝陽人賣藥於市不二價治病輒愈語人曰服此藥必吐某物某日當愈言無不效日收錢數萬施市内貧乏飢凍者費長房為市今知其人後詣公公携長房去授以治病之術令還壼公後遂仙去戴公栢有大微黄書十餘卷即公之師也又曰樂干長齊人也少好道霍林山服巨勝赤松散方仙去又曰衛卿中山人服雲母子度世入山見父叔卿語曰君書齋室西北墉大柱下有玉函中有書取而合藥服之度世歸果如言餌五色雲母仙去又曰魏伯陽吳郡人也好道不仕封已養髙後入山餌神丹仙去撰參同契其説以周易爻象論作丹之意而世不知神丹之事多作隂陽注之殊失其實又曰尹軌宇公度太原人博極羣書晚乃學道常服黄精年百餘歳言天下盛衰安危吉㓙未嘗不效入太和山仙去又曰東郭延年者山陽人也服靈飛散在暗室中夜書又身生光逺照小物見其采色一旦數十人乗虎豹來迎之延年遂詣崑崙山仙去又曰王真上黨人也七十九乃學道行徐若飛有兼人之力郄元節事真十餘年真以蒸丹小餌法授之容常不衰鄊人計貞之年以四百餘歳後登女几山仙去又曰平中節河東人晋時羯胡亂華遁蒼梧山受宗隠君存心之道積四十五年精思不懈體有真氣後仙去又曰葛𤣥善於奕初拙於用身常在長山近入葢竹亦能乘虎使鬼但未得受職耳常與謝稚堅黄子陽郭聾子相隨也葛𤣥是抱朴子從師即鄭思逺之師也時人莫知其䖏傳言東海中仙人寄書呼為仙公又曰魯妙典者九疑山女道士也生而好道忽謂母曰人之上夀所傳得者稀喜樂悲哀日以相害况埋沒真性混于流俗乎有道士過其門授以大洞黄庭經謂曰所患人不能知知不能修修不能精精不能久不惟有𤣥科之責亦将苦報無窮也妙典奉其言入九疑山累有魔試介峙不撓山上一石盤中有泉用之不竭又有大鐡臼不知何䖏來今並在山中石壇上宛然有仙履跡及古鏡一廣二尺古鐘一形如偃月在無為觀中妙典後仙去又曰謝自然女道士也果州人詞氣髙異其家在大方山下頂有古像老君其形自然因拜禮不願下山母從之乃遷居山頂自此常誦道徳經黄庭内篇於開元觀受紫虛寳經於金泉山居之山有石壇煙籮脩竹一十三年晝夜不寐兩膝上忽有印似小於人間官印四壖若朱有古篆六字粲如白玉忽於金泉道塲有雲氣􅃒匝一川散漫彌久仙去其金泉碑畧曰天上有白玉壁其上列真仙之名如人間壁記時有朱書注其字下曰降世為某官職又自然於所居堂東壁上書數字皆道徳之意真跡存焉又曰王奉仙宣州當塗縣民家女也得其道嘗以忠孝正直之道清浄儉約之言修身宻行之要訓于人故逺近瞻仰金玉委前弃而不顧後入洞庭山無疾而化有雲鶴異香之瑞仙去太平御覽卷六百六十二
