body:
  text: 太平御覽卷六百七十七宋李昉等撰道部十九几案輿輦闕殿堂臺閣樓觀宫室房舎窓户門庭壇府几案十洲記曰瀛州金巒觀中有青離玉几覆以雲紈之素刻水碧為倒龍之狀玉光八景經曰衆真宴禮大帝屈節於几前太乙洞真𤣥經曰太微房中有一童子名于景精字元當帝君之前捧赤玉案上有所主命籍又曰太一公子曰元司命桃君五人皆著朱衣絳巾各捧白玉案上有所主簡玉清隠書曰太微天帝君進拜於帝皇之几又曰上皇帝君乃推几偃詠虛眺太空吟玉清之隠書歌元景之靈章揚音霞際清微玉振太洞經曰太微小童五符命籍捧持玉案帝君所臨玉通諸神變化經曰有金光立空之案又曰元始拊几髙詠嘯郎太空玉珮金璫上經曰九老仙都捧金精之案上請寳文以授衆真也洞仙經曰拂拭几案置經於前也像名經曰東皇上尊凭七寳鳳文之曲几敷說道要真經法輪經曰三真立空之案以七寳懸覆經上衆篇經曰元始上尊凝真遐想撫几髙抗命召五帝論定隂陽推數刼㑹移校河源檢籙天度洞神經曰有局脚案以置經符也太上黄素經曰凢修受大洞真經雌一竒文者恒置經於几格潔静之處九幽經曰帝尊在九清妙境三元宫中御三氣之華寳雲玉座總校圖籙抜濟諸苦二十四生圖曰披九光玉藴出金書紫字玉文丹三部八景二十四生圖盛以白玉立空之案九色之中飛文錦蓋懸覆經上龍飛尺素隱訣曰太微天帝君命羽仙侍郎捧金案以請飛行羽章也上清真文玉經朝文曰有流明太靈侍言玉案十二枚又始内傳曰諸天各奉蓮華座以寳蓋覆之神仙傳曰黄老遣仙官玉女持金案玉杯盛藥以賜沈羲又曰淮南王爲八公進金玉之几執門弟子之禮四極科曰凢寳經之具几案巾秩不可妄借於人太𤣥經曰老子傳授經戒籙儀注訣曰以局脚小案置經綵巾覆上洞真𤣥經曰太一洞真𤣥經者别爲嚢笈封以寳噐盛之几上無量經曰太上座髙三丈又於紫臺之宫布一髙座六尺金真玉光經曰九天之帝施玉几金牀山海經曰西母悌几戴勝悌凭也戴者戴其玉勝也他説西母頭類戴勝甚失之本際經曰元始上尊在長樂舎寳􅅚髙座雖有座形不障於物人所徃來亦無隔礙復有小琉璃座行列兩邊悉髙五尺茅君内傳曰白玉龜山連玉牀帳西母處之太上黄素方曰青精執在紫巫之山化玉之室内有玉案也洞真七聖𤣥記曰左仙上䟽九天帝王七聖几下飛行羽經曰脩三一道法坐金牀玉几金爐玉七太真人詩曰太㣲啓玉案列仙傳曰太室山中有地仙邛䟽卧几案真誥曰鹿迹山中有絶洞洞中自有石牀石榻曲夾輿輦太上飛行羽書曰玉清則上清之髙真上清則太清之髙神太清則飛仙之髙靈凢行玉清之道出則諸天侍衞建七色之節駕紫雲軒十二玉輪六師啓路飛龍翼轅行上清之道出則五帝侍衞建紫毛之節駕飛雲丹車位准上清左右仙卿行太清之道出則五帝侍衞建五色之節駕龍輿白虬啓道太極恭軒又曰王總真爲茅盈召朱冠使者二人乗流景之輿蒼蛇把緑節仗瓊竿羽旄横曰朱雲翳景使者並繡衣芙蓉冠持紫素之書各百字以付茅盈二弟固􅇆是以固有地真上仙定籙神君之號衷有司三官保命仙君之位各依紫素之命封莅所任神宫上府亦隨事而資給二君焉漢平帝元壽二年八月己酉南岳真人西域王君龜山王母方諸青童君並乗緑景之輿駕神虎之軿同造茅盈於句曲之山金壇之隂又曰飛仙秘道招五辰之晨常能行之十五年則南極老人丹陵上真迎以緑雲之輦西極老人素靈子期迎以黄飈之車北極老人𤣥上仙皇迎以𤣥景之龍東極老人扶陽公子迎以青軿之輦中元老人上𤣥子迎以曲晨之盖五老㑹合俱昇紫虛此五老盖五星之真人也非如裴君星中五帝之公又異乎雲牙五方之老上學之法順之者飛仙也又曰八道秘言者道有八條其言髙妙閑心静室寥朗虛真亦將得見丹景之氣三素飛雲八輿朱輦紫霞瓊輪上清静眄廻轡三光髙皇秉節靈童攀轅太素擁盖南極臨軒於是溟光外映象燭太虛子能見之不煩凝霜濯華𤣥腴金丹也一道秘言曰以八節日清朝北望清朝小早於清旦也有紫緑白雲者是爲三元君三素飛雲也其時三元君乘八輿上詣天帝玉清君也君子猴見當再拜自陳乞侍輪轂二道秘言曰以八節日夜半東北望有𤣥青黄雲者是爲太極天帝君乘八景之輿上詣髙上玉皇三道秘言曰以甲子上旬戊辰己巳之日清旦西北望有紫青黄雲者是爲太極真君三素雲也其時太極真君及上真人乗𤣥景緑輿上詣紫㣲宫四道秘言曰以甲戌上旬戊寅己卯之日清旦東宫南望有赤白青雲者是爲扶桑太帝君三素雲也其時扶桑太帝君乗光明八道之輦上詣紫㣲宫五道秘言曰以甲申上旬戊子己丑之日清旦正西望見白赤紫雲者是爲太素上真白帝君三素雲也其時太素上真人素帝君乗脩條玉輦上詣玉天𤣥皇髙真也六道秘言曰甲午上旬戊戌己亥之日清旦正南望有青赤黄雲者是爲南極上真赤帝君其時乘絳琳碧輦上詣閬風臺七道秘言曰以甲辰上旬戊申己酉之日清旦西南望見緑紫青雲者是爲上清真人時乘𤣥景八光丹輦上詣髙上天帝八道秘言曰以甲寅上旬戊午己未之日清旦正東望有朱碧黄雲者是太虛上真人其時乗徘徊玉輿上詣太帝君八節日見三素雲者紫雲在上緑雲次之白雲在下共相杳也子謹視之移度經曰真皇恭駕黄霞周行四方飛盖緑軿上造金闕靈寳赤書曰詣天真人乘碧霞玉輿太洞真經曰太上乗一景之輿受九暉太晨隱符上清隱書曰龍文經曰王母乗九盖華輿衆真侍衞紫文經曰方諸東𤣥東海青童大君齋戒於丹闕黄房之内三年乗碧雲輿太元真人傳曰有斑龍之輿金真玉光經曰有玉輦又上清三天列紀有紫輦太洞玉經曰青童君乗雕玉之軿司禁真伯乗日月之軿又曰太極元君乗陵羽之車太上經曰有白鸞之車茅君内傳曰東海青童君乗飈車葛𤣥傳曰鶴鳴山石室中設自然座有金華寳盖又曰五帝真人並乗八景玉輿二十四生圖經曰後聖李君逰西河歴觀八方值元始乗八景玉輿駕𤣥龍而來李君問天書玉字未䆒妙章元始俾極道真於是吐洞𤣥内觀玉符以授之變化經曰景輿丹軿紫軒九天帝王所乗也上清訣曰𤣥母乗三素之輿又曰元父所控赤羽飛車左御絳鸞右駕紫鳳尺素訣曰太微天帝君登白鸞之車駕黒羽之鳳逰碧水之境大洞玉經曰皇上帝乗明玉之輪轉宴於日中矣茅君内傳曰無上道君咸給八景瓊輿鳳璽金真曲晨飛盖又曰青華小童道君乗碧霞之輿又曰上真君赤帝乘絳琳碧輦又曰太清真君乗青龍紫羽盖又曰太元真人杖紫雲之節乗斑龍之輦白虎之軿曲晨寳盖又曰太素真君乗虎旗虎輦金盖玉輪杖九色之節出入太清金真上光經曰太上大道君乗瓊輿碧輦和大道乗白雲之車又云𤣥和道君驂駕𤣥龍太洞玉經曰八皇老君乗黄琅之車把紫鳳之節入太老之室萬華先生乗三素之景羽明之軿宴􅃦萬乗之室八素章曰四老廻錦軿萬山朝帝房茅君内傳曰朱官使者駕蒼虬把緑杖真誥曰紫元夫人乗羽寳雲車駕九龍女騎九千披錦服青羽裙自然經曰龍轡昻昻雲盖巍巍仙童玉女與我昇龍太上真經曰東方青帝九龍雲輿至空洞經曰元始天尊從諸天人並乗玉輦瓊輪元始五老赤書玉篇真文序曰太上道君十方至真乗五色玉輪九色龍妙行真人乗象雲玉輦上詣玉都中極真人常乗象輪車飛上真人常乗九色龍逰玉清雲中飛天之神乗碧霞之輦逰於玉隆之天黒帝乗四景之輿三元布經曰元始上尊乗紫輦茅君内傳曰玉君乗九盖之輦洞天經曰靈景道君乗赤雲車太上飛行羽經曰中和之真駕錦輿茅君内傳曰王母乗緑景輿玉光八景經曰東方始景道君乗青雲之車駕蒼龍又曰南方𤣥景道君乗五色雲車駕鳳凰又曰南方靈景道君乗赤雲車西南方元景道君乗紫雲車駕六龍西方明景道君乗白雲車駕白虎北方𤣥和道君乗珠玉之車金根經曰玉帝君乗碧霞九鳳飛行之輿玉清隱書曰太微君登八瓊之輦傾盖霞城又曰東北方道君葛獻乗八輿飛龜車下治人泥丸宫登真隱訣曰太元真人乗白虎輿有八色雲軿真誥曰仙人許玉斧乗一新青犢車又曰玉眉壽小妹中候夫人乗白牛車上清九真中經内訣曰南極老人丹陵上真迎以緑雲之輿蓋西極老人素靈於干期迎以黄飈車人元老人中央上𤣥迎以曲晨之盖五老一合俱丹紫靈王君傳曰王君乗虎輦金盖玉輪出入上清受事太素南岳魏夫人傳曰夫人乗虎輦玉輿隱輪之車真誥曰南岳夫人駕九盖之軿捜神記曰玉女成智瓊駕輜軿車從八婢闕五符經曰鍾山上有金臺七寳紫闕元氣之所舎天帝君所治處也殿太洞玉經曰大暉者玉清天中殿名也上皇玉真之所逰處也太平經曰大空瓊臺洞真之殿金華之内侍女衆真之所處靈書紫文上經曰有太空瓊臺丹玕之殿靈寳赤書曰妙行真人詣元始受赤書五篇真文於是元始命衆真入大定金臺玉寳之殿九華房紫書金根經曰有黄金殿𤣥妙内篇曰有七寳殿堂太洞玉經曰有羽景之堂在太無之庭玉容者太上之明堂也洞景金𤣥經曰玉帝命太微天帝君坐萬靈於房軒散華香於玉宇留連八瓊之室曲宴九琳之堂外國放品經曰有光碧之堂臺太洞玉經訣曰西田之瑶臺大帝所處有玉清臺也又有散花臺太上玉京經曰玉京有七寳宫宫有七寳𤣥臺即太上治所又有天寳臺上清經曰有紫碧𤣥臺太洞真經曰上清真人惣仙太司馬長生法師登太常滄浪山洞臺金巾雙玉冗酣飲紫明芝液真誥曰有玉華室有刻石真人五勝文曰駕飛龍於西華之臺謁拜帝真赤書玉訣經曰太𤣥上宫太素真人常以春分之日㑹諸仙官於崑崙瑶臺校定靈寳真經又曰陽臺真人常以立冬之日㑹諸仙官玉女於靈寳陽臺之上校定學道簿籙本行經曰有尋真玉臺衆篇經曰帝尊引衆真人集太空金臺内音玉宇經曰九層之臺處乎玉京之山煥乎𤣥都之上有太真玉印又曰馥朗天中玉京𤣥臺之别號西靈真人常誦無量洞章逰行其上太洞玉經曰九天之上有明真臺茅君内傳曰辰中真人帯延生符於滄浪之臺導引三光經曰定光真人在皇曽大絶觀臺中導引元氣又曰九變真人在玉完大誥陽無臺中又曰導仙真人在何童天華林䕃雲臺中又曰雲華真人在平育天𤣥唱寳蓋臺中又曰陽王真人在太真臺中又曰法氣真人在飛臺中又曰澤嬰真人在越衡天無極觀臺中真誥曰白玉龜臺九靈太真元君封此閣三皇經曰人皇所受皇文帝書赤玉爲簡黄玉爲文安之青宫閉之紫閣大洞真經曰凢天縱仙才名刋金閣金𤣥羽章曰紫閣之下受事於玉清九有玉閣黄閣青閣樓厯藏中經曰崑崙山有金城九重玉樓十二神仙所治也龜山元籙曰龜山上有十二玉樓峨峨曜景太清有金華樓諸真神玉籙皆在金樓之中觀靈書經曰有洞靈之觀金字題觀四面又有九靈之觀紫陽之觀又素微上宫有通陽之觀主得度人之功德輕重宫三元品戒經曰九氣始凝三光發明結青黄白之氣置上元三宫太洞玉經曰太初有華陽之宫㑹方之宫小有中天宫有萬華之宫玉君之治所玉晨宫中有玉映之宫又有元君六淵之宫黄老圓華之宫上青真陽之宫太極上宫主衆仙誦詠室太洞玉經曰太霞之中有白雲之室太虛元君所處三皇經曰蜀郡西峩嵋山石室舊有三皇文此文不與天下衆文同方萬人中未有一人得者龜山元籙曰有瓊瑶之室外國放品經云有瓊華之室洞景金𤣥經曰八瓊之室又三華寳曜内真上經曰玉室上清經有碧室房太洞玉經曰三華城者玉清之房名也在玉城之中陽安元君所處無上真人内傳曰有流雲九色之房仙宫内傳曰崑崙山上有積石瑞房太上紫書籙曰白王母入於龜山玉闕處於青玉宫中朱紫之房靈寳赤書曰有九光華房外國放品經曰紫翠丹房舎道典曰道之清净者吾舎也道因天清而清之因地静而静之因日月之光而明之因星辰之行而正之因萬物之性而消息之萬物中人爲貴能使形無事神無體以清净致無爲之意即道爲舎也忩諸天内音經曰天真皇人開寒靈之忩又曰南極𤣥忩主諸得道人受錬品目户諸天内音經曰九𤣥丈人封於玉京紫户之内洞景金𤣥經有玉户門大洞玉經曰太素在幽𤣥之上九宫列金門於太素之天瓊羽之門蘭室上清宫中門户名也太上有瓊羽之門四明門者上清玉帝之門南門也紫書金根經曰東華方諸青童宫有六門門内周廻三千里東有青華門西有玉洞門北有瓊門東有寒水門下東南有天闗門庭二道順行經曰洞陽之宫下有流水之庭大洞玉經曰廣寒宫中有寒庭太一之所處又有雲珠之庭太上真文曰上帝朝真金童揚烟流薰紫庭壇二十四生圖曰元始敷五色爲壇玉皇譜籙曰元始丈人登玉虛之壇受九天譜籙上皇寳經玉符秘章府龜山元籙曰元始丈人在上清瓊天府太清府開清府玉寳洞元府金融府丹明府重㝠府鳳生府太平御覽卷六百七十七
