  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_506-1a, image: WYG0897/WYG0897-0541a.png}
body:
  text: 太平御覽卷五百六宋李昉等撰逸民部六逸民六隋書隠逸𫝊曰李士謙字子約趙郡平棘人也髫齓喪父事母以孝聞母曽嘔吐疑為中毒因跪而嘗之伯父瑒深所嗟尚每稱此兒吾家之顔子也後丁母憂居喪骨立服闋舍宅為伽藍脫身而出詣學請業研精不倦遂博羣籍兼善天文術數隋有天下畢志不仕自以少孤未嘗飲酒食肉口無殺􅊣之言至於親賔來幸輒陳樽爼對之危坐終日不倦李氏宗黨豪盛每至春秋二社必髙會極歡無不沉醉諠亂嘗集士謙所盛饌盈前而先為設黍謂羣從曰孔子稱黍為五榖之長荀卿亦云食先黍稷古人所尚容可違乎少長肅然莫敢弛惰退而相謂曰既見君子方覺吾徒之不徳也士謙聞而自責曰何乃為人所疎頓至於此家富於財躬處節儉每以賑施為務開皇八年終於家又曰崔廓字士𤣥博陵安平人也少孤貧而母賤由是不為邦族所齒初為里佐屢逢屈辱於是感激逃入山中遂博覽書籍多所通涉山東學者皆宗之既還郷里不應辟命與趙郡李士謙為忘年之友每相徃來時稱李崔及士謙死廓哭之慟為之作𫝊輸之秘書府士謙妻盧氏寡居每有家事輒令人諮廓取定廓嘗著論言刑名之理其義甚精大業中終于家時年八十又曰徐則東海剡人也㓜沉靜寡嗜欲受業於周𢎞正善三𤣥精論議懐栖隱之操杖策入縉雲山後學數百人苦請教授則謝而遣不娶妻常服巾褐陳太建時應召來憩至於貞觀朞月又辭入天台山因絶粒養性所資啜松水而已雖隆冬沍寒不服綿絮初入縉雲山太極真人徐君降之曰汝年出八十當為王者師然後得道也晉王諱鎮知其名手書詔之遂詣揚州其後夕中命使者取香如平常朝禮之儀至五更而卒支體柔弱如生又曰張文詡河東人也父居開皇中為洹水令以清正聞有書千卷教訓子孫皆以明經自達文詡博覽文史特精三禮髙祖引致天下名儒碩學之士文詡時遊於太學學内翕然咸宗仰之其門生多詣文詡請質疑滯文詡輒博引證據辨說無窮唯其所擇右僕射蘇威聞其名而召之與語大悦勸令従官文詡意不在仕固辭仁夀學廢文詡策杖而歸灌園為州郡頻舉皆不應命事母以孝聞每以徳化鄉黨頗移風俗常有人夜中竊刈其麥者見而避之盜因感悟棄麥而謝文詡慰論之自誓不言固令持去經數年盜者向鄉人論之始為逺近所悉州縣以其貧素將家賑恤輒辭不受每閑居之際從容長歎曰老冉冉而將至恐修名之不立以如意撃几皆所有處時人方之閔子騫原憲終於家時年四十鄉人為立碑頌號曰張先生唐書隱逸𫝊曰王績字無功綘州龍門人也少與李播吕才為莫逆之交隋大業中應孝悌㢘潔舉揚州六合縣丞非其所好棄官還鄉里績河渚中先有田十數頃隣渚有隱士仲長子光服食養性績重其貞素願與相近乃結廬河渚以琴酒自樂常述北山賦以見志績又常躬耕於東臯故時人號東臯子或經過酒肆動經數日徃徃題壁作詩多為好事者詠諷貞觀十八年卒臨終自剋死日遺命薄塟兼預自為墓誌又曰田逰巖京兆三原人也初補太學生後罷歸遊於太白山每遇林泉會意輙留連不能去其母及妻子並有方外之志與遊巖同逰山水三十餘年後入箕山就許由廟東築室而居自稱許由東隣調露中髙宗幸嵩山遣中書侍郎薜元超就問其母逰巖山衣田冠出拜帝令左右扶止之謂曰先生養道山中比得佳否逰巖曰臣泉石膏肓烟霞痼疾既逢聖代幸得逍遥帝曰朕今得卿何異漢獲四皓乎因將逰巖就行宫授崇文學士令與太子少傅劉仁軌談論帝後將營奉天宫于嵩山逰巖舊宅先在宫側特令不毁仍親書題額懸其門曰隠士田逰巖宅又曰史徳義蘇州崑山人也咸亨初隱居武丘山以琴書自適或騎牛帶瓢出入郊郭東市號為逸人髙宗聞其名徴赴洛陽尋稱疾東歸公卿已下皆賦詩餞别徳義亦以詩留贈其文甚美天授初江南道宣勞使周興表薦則天徴赴都詔曰蘇州隠士史徳義尚志虛𤣥素履貞確謙沖彰於里閈孝友表於閨庭固辭徴辟長徃嚴陵之瀨多謝簮裾髙邁愚公之谷朕承天革命建極開階寤寐星雲物色林壑順禎期而損薜帶應休運以解荷裳粤自海隅來逰魏闕行藏之禮斯得就去之節無違風操可嘉啓沃攸佇特宜優奬委以諌曹授諫議大夫後放歸丘壑又曰王友貞懐州河内人也將弱冠母疾篤醫言唯啖人肉乃差友貞獨念無求理乃割股肉以飴親母疾尋差則天聞之令就其家驗問特加旌表友貞素好學讀九經皆百遍訓誨子弟如嚴君焉口不言人過尤好釋典屏絶羶味出言未曽負諾時論以為真君子中宗在春宫召為司議郎不就神龍初又拜太子中書舍人仍令所司以禮徴赴及至固以疾辭𤣥宗在東宫又表請禮徴之以年老竟辭疾不赴年九十餘開元四年卒特下制贈銀青光禄大夫又曰盧鴻一字浩然本范陽人也徙家洛陽少有學業頗善習楷𨽻隠於山開元初遣備禮再徴不至五年下詔徴之至東都謁見不拜宰相問其故奏言臣聞老君言禮者忠信之薄不可以由臣鴻敢以忠信奉見上别召昇内殿賜之酒食詔曰盧鴻一應辟而至訪之至道有會淳風爰舉逸人用勸天下特宜授諫議大夫放還山又曰王希夷徐州滕人也孤貧好道父母終時為人牧羊傭以供塟葬畢隠於嵩山師道士黄頥向四十年盡能𫝊其閉氣導養之術頤卒居兖州徂徠山中與道士劉𤣥博為棲遁之友好易及老子嘗餌松栢葉及雜花散景龍中年七十餘氣益壯刺史盧齊卿就謁致禮因訪以字人之術希夷曰孔子稱己所不欲勿施於人可以終身行之矣及𤣥宗東巡勅州縣以禮徴召至駕前年已九十六上令中書令張説訪以道義宦官扶入官中與語甚恱詔授朝散大夫守國子博士聽致仕還又曰衛大經者篤學善易口無二言則天降詔徴之辭疾不起與魏州人夏侯乾童有舊聞乾童母卒徒步徃弔之鄉人止之曰當夏盛暑豈可步涉千里致書可也大經曰尺書安能盡意遂徃至魏州會乾童出行大經造門設席行弔禮不訊其家人而還開元初畢構為刺史謂解令孔慎言曰衛生徳厚宜有旌異古人式干木之閭禮賢故也慎言造門就謁時大經已年老辭疾不見嘗預筮死日先鑿墓自為誌文如筮而終又曰李元凱者博學善天文律厯然性恭慎口未嘗言之鄉人宋璟年小時師事之及作相使人遺元凱束帛將薦舉之皆拒而不答景龍中元行沖為洛州刺史邀元凱至州問以經義因遺之衣服元凱辭曰微軀不宜服新麗但恐不能勝其義以逺咎也行沖乃以泥塗汚而與之不獲已而受及還乃以己之所蠶素絲五兩以酬行沖曰義不受無妄之財年八十餘終又曰徐仁紀者聖厯中徴拜左拾遺三上書論得失不納謂人曰三諫不聽可去矣遂移病歸鄉里神龍初宣慰使舉仁紀之行可以激俗又徴拜左補闕三上書又不省乃詣執政求出授靈昌令妻子不之官廨舍唯衣履及書疏而已餘無所蓄又曰孫處𤣥者長安中徴為左拾遺頗善屬文常恨天下無書以廣所聞神龍初桓彦範等用事處𤣥遺彦範書論時事得失彦範竟不用其言乃去官還鄉里以病卒又曰白履忠陳留浚儀人也博涉文史常隠居大梁城時號為梁丘子景雲中徴拜校書郎尋棄官而歸開元十年刑部尚書王志愔表薦履忠隠居讀書貞苦守操有古人之風堪代禇無量馬懐素入閣侍讀乃徴赴京師及至辭以老病不任職事詔授朝散大夫停留數日而歸履忠鄉人左庻子吳兢謂履忠曰吾子家室屢空竟不霑斗米疋帛雖得五品何益於實也履忠忻然尋以夀終又曰崔覲梁州城固人也為儒不樂仕進以耕稼為業老而無子乃以田宅家財分給奴婢令各為生業覲夫妻遂隠於城固南山家事一不問約奴婢逓過其舍至則供給酒食而已夫婦林泉相對以嘯詠自娛山南節度使鄭餘慶髙其行辟為節度叅謀累邀方至府第為吏無方畧若不達人事餘慶以長者優容之太和八年左補闕王直方薦觀有髙行詔以起居郎徴之覲辭疾不起卒於山皇甫士安髙士𫝊曰王倪者堯時賢人也師被衣齧缺又學於王倪問道焉齧缺曰子不知利害則至人固不知利乎王倪曰至人神矣大澤焚而不能熱河漢汗而不能寒疾雷破山暴風振海而不能驚若然者乗雲雨騎日月而逰天地之外死生無與于己而況利害之間乎又曰善卷者古之賢人也堯聞其為得道之士乃北面師之而問道焉舜受終之後又以天下讓卷卷曰昔唐氏之有天下不教而民從之不賞而民勸之天下均平百姓安靜民不知怒不知喜今子盛為衣裳之服以眩民目調五音之聲以亂民耳作皇詔之樂以愚民心耳目益榮天下之亂從此始矣吾雖為之其何益乎予立宇宙之中冬衣皮毛夏服絺葛春耕種形足以勞秋收歛身足以休日出而作日入而息逍遥於天地之間而心意自得何以天下為哉遂不受入深山莫知所終矣又曰齧缺堯時人許由師事齧缺堯又師由問曰齧缺可以配天乎既而齧遇由由曰子將何之曰將逃堯曰何謂也曰夫堯知賢人之利天下而不知其賊天下遂逃不見又曰巢父堯時隠人年老以樹為巢而寢其上故時人號曰巢父堯之讓許由也由以告巢父巢父曰汝何不隠汝形藏汝光若非吾友也撃其膺而下之悵然不自得乃過清冷之水洗其耳拭其目曰向者聞言負吾矣遂去終身不相見又曰許由字武仲隠于沛澤之中堯聞乃致天下而讓焉由退而耕于中嶽潁水之陽箕山之下史記又載又曰壤父者堯時人年五十而擊壤於道中觀者曰大哉帝之徳也壤父曰吾日出而作日入而息鑿井而飲耕田而食帝何徳於我哉又曰蒲衣者舜時賢人也年八嵗而舜師之遂讓以天下蒲衣不受而去莫知所終又曰老萊子者楚公室亂逃世耕於䝉山之陽蓬蒿為室支木為牀飲水食菽墾山播種人或言於楚王王於是駕至萊子之門萊子方織畚王曰守國之政孤願煩先生老萊子曰諾王去其妻樵還曰子許之乎老萊子曰然妻曰妾聞之可食以酒肉者可隨而鞭撻可與以官禄者可隨而鈇鉞妾不能為人所制者妻投其畚而去老萊子亦隨其妻至于河南以萊子為老萊子人莫知其所終也又曰顔囘字子淵貧而樂道退居陋巷曲肱而寢孔子曰爾家貧居卑何不仕回曰有郭外田六十畆足以供饘粥有郭内圃六十畆足以供絲麻鼔宫商之音足以自樂習所聞於夫子足以自娱回何仕焉又曰弦髙者鄭人也穆公時髙見鄭為秦晉所逼乃隠不仕為商人及晉文公之返國也與秦穆公伐鄭圍其都鄭人私與秦盟而晉師退秦又使大夫把子等三人戍鄭居三年晉文公卒襄公初立秦穆公方强使百里孟明西乞白乙率師襲鄭過周及滑鄭人不知髙時將市於周遇之謂其友曰師行數千里又數經諸侯之地其勢必襲鄭凡襲國者以無備也示以知其情必不敢進矣於是乃矯鄭伯之命以十二牛犒秦師且使人告鄭把子亡奔齊孟明等返至殽晉人要擊大破秦師鄭於是賴髙而存鄭穆公以存國之賞賞髙辭曰許而賞則鄭國信廢矣為國而無信是敗俗賞也一人而敗國俗知者不為也遂以其屬徙東夷終身不返太平御覽卷五百六
