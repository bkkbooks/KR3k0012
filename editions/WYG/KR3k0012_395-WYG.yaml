  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_395-1a, image: WYG0896/WYG0896-0490a.png}
body:
  text: 太平御覽卷三百九十五宋李昉等撰人事部三十六沐浴盥㳺沐說文曰沐濯髮也毛詩淇澳伯兮曰自伯之東首如飛蓬豈無膏沐誰適為容大戴禮夏小正曰五月蓄蘭為沐浴禮記曲禮上曰居䘮之禮頭有瘡則沐又檀弓下曰石駘仲卒駘仲衛大夫也無適子有庶子六人卜所以為後者曰沐浴佩玉則兆五人者皆沐浴佩玉石祁子曰孰有執親之䘮而沐浴佩玉者乎不沐浴佩玉石祁子兆衛人以龜為有知也又内則曰五日則燂湯浴三日具沐左傳僖中曰初晉侯之豎頭須守藏者也竊蔵以逃盡用以求納之及入求見公辭以沐謂僕人曰沐則心覆心覆則圖反宜吾不得見也居者為社稷之守行者為覊紲之僕國君而讐匹夫懼者甚衆矣僕人以告公遽見之又僖下曰衛叔武將沐聞君至喜捉髮走出前驅射而殺之公知其無罪枕之股而哭之又哀下曰齊子我夕夕視事陳逆殺人逢之陳逆子行陳氏宗也子我逢之遂執以入執逆至朝陳氏方睦使疾而遺之潘沐備酒肉焉潘米汁可以沐頭論語憲問恥曰陳成子弑簡公孔子沐浴而朝請討之家語曰凡䘮小功已上虞祔練祥之祭皆沐浴且祭日沐浴為齊潔也史記曰周公戒伯禽曰我文王之子武王之弟成王之叔於天下亦不賤矣然我一沐三握髮一飯三起以待士猶恐失天下之賢人漢書曰竇皇后弟廣國字少君四五嵗時家貧為人所畧上書自陳左右見問之曰姊去我西時與訣傳舍中丐沐沐我飯我乃去后持之而泣也又曰鄧通愿謹不好外交雖賜沐浴不欲出於是文帝賜通巨萬又曰吴王遺諸侯書曰楚元王子淮南三王或不沐洗十餘年怨入骨髓言心有所懐志不在洗沐也欲一有所出之久矣謂發兵也又曰張安世字子儒少以父任為郎用善書至給事尚書精力於職沐浴未嘗出又曰董賢毎賜沐浴不肯出嘗留中視醫藥上以賢難歸詔令賢妻得通引籍殿中止賢廬又曰張蒼徳安國侯王陵及貴父事陵陵死後蒼為丞相洗沐常先朝陵夫人上食然後敢歸家又曰孔光典樞機十餘年守法度修故事沐日歸休兄弟妻子燕語終不及朝省政事鄧粲晉記曰舂陵長易雄起兵討王敦欲活之使還邑洗沐衆人皆賀雄曰吾夢乗車挂肉其傍肉必有筋筋者斤吾死也敦果刑雄晏子春秋曰景公之嬖妾嬰子死公守之三日不食不去左右晏子入曰有術客與醫俱言曰能生死者聞嬰子疾請治之公喜起曰病猶可為乎哉晏子曰客之通也使君潔沐浴飲食彼亦将有鬼神之事焉公曰諾屏而沐浴晏子令棺人歛之而復曰醫不能治病也歛矣不敢不以聞公作色不恱曰吾為君紿而已矣荘子曰孔子見老耼耼新沐被髮似非人孔子曰先生體若槁木似遺物乎老子曰吾逰物之初孔子出告顔淵曰丘之道其猶醯雞與司馬彪註曰醯雞酒上蠛蠓也韓子曰古諺曰為政若沐也又曰僖侯将沐湯中有礫問之曰當有人欲代湯者吕氏春秋曰昔者禹一沐而三捉髮一食而三起以禮有道士淮南子曰湯沐具而蟣虱相吊大厦成而鷰雀相賀六韜曰文王聞殺崇侯虎歸至酆令具湯沐世語曰子日沐令人愛卯日沐令人白頭按人之愛憎頭之白黒在乎自然但使嫫母子日沐能令人愛耶使十五童子卯日沐能令髪白耶世本曰秦穆公作沐異苑曰北海任詡字彦期従軍十年乃歸臨還握粟出卜師云非屋莫宿非時莫沐詡結伴數十暮遇雷相庇於巖下竊憶非屋莫宿之戒遂負擔櫛沐巖崩壓停者悉死至家妻先與人通情謀共殺之請以濕髮為識婦宵則勸詡令沐復憶非時莫沐之忌收髮而止婦慚愧負怍乃自沐焉散髮同寝通者夜来不知婦人也斬首而去楚辭曰浴蘭湯兮沐芳華采衣兮若英又漁父曰吾聞新沐者必彈冠新浴者必振衣安能以身之察察受物之汶汶乎浴說文曰浴洒身也禮記内則曰五日則燂湯請沐外内不共湢浴湢浴室也又儒行曰儒有澡身而浴徳常自清潔於身沐浴於徳也左傳僖中曰晉公子重耳及曹曹共公聞其駢脅欲觀其裸浴薄而觀之又文下曰齊懿公之為公子也與邴歜之父争田不勝及即位乃掘而刖之而使歜僕納閻職之妻而使職參乗五月公逰于申池二人浴于池歜以朴柣職職怒歜曰人奪汝妻而不怒一柣汝庸何傷軄曰與刖其父而弗能病者何如乃謀弑懿公國語曰荘公将殺管仲齊使者請之而縳以與使者比至三釁三浴之釁香熏也論語先進曰子路曾皙冉有公西華侍坐子曰㸃爾何如鼓瑟希鏗爾舍瑟而作對曰暮春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸夫子喟然嘆曰吾與㸃也續漢書曰耿恭在疏勒得出至玉門惟餘十三人衣履穿决形容枯槁郎将鄭衆為恭以下沐浴易衣也又曰靈帝時江夏黄氏之母浴化為黿入于深淵其後時時出見初浴簮一銀釵見猶在其首山海經曰大荒之中有淵正方四隅皆通言淵四角皆旁通北屬黒水南屬大荒北旁名曰少和之淵南旁名曰縦淵舜之所浴也言常在中澡洗荘子曰仲尼問於太史㢭曰衛靈公為靈何也太史㢭曰是固靈也靈公妻有三人同浴男女同浴此無禮也又曰鵠不日浴而白韓子曰燕人李季好逺逰其妻私通他人季忽歸私通者在内其妻令被髮直出門季曰何人耶妻曰無人季曰吾見鬼也妻曰宜五牲屎浴季曰諾乃浴以狗屎說苑曰秦繆公見百里奚牛肥公曰牛何以肥對曰臣飲食之以時浴之不暴有嶮先後之以身是以牛肥公知其君子令有司具沐浴為衣冠坐與語公大恱外國圖曰方丘之上暑濕生男子三年而死有黄水婦人入浴出則乳矣去九嶷二萬四千里丘淵之征齊道里記曰朱靈城東有管寧舊宅前有水是寧嘗所澡浴處石虎鄴中記曰石虎金華殿後有虎皇后浴室三間徘徊反宇櫨檘隠起彤采刻鏤雕文粲麗四月八日九龍銜水浴太子之像又太武殿前溝水注浴時溝中先安銅籠疏其次用葛其次用紗相去六七歩斷水又安玉盤受十斛又安銅龜飲穢水出後却入諸公主第溝亦出建春門東又顯陽殿後皇后浴池上作石室引外溝水注之室中臨池上有石床世說曰桓車騎不好着新衣浴訖婦固送新衣桓冲也車騎大怒催使持去婦便持還傳語云衣不經新何由而故桓大笑而著之幽明録曰桓温内懐無君之心時比丘尼従逺来夏五月尼在别室浴温竊窺之見尼裸身先以刀自破腹出五臓次斷兩足及斬頭首有頃浴竟温問向窺見尼何得自殘毁如此尼云公作天子亦當如是温惆悵不恱盥說文曰盥洗靣也澡洒手也洗洒足也尚書頋命曰盥以異同秉璋以酢太保以盥手洗異同實酒禮記内則曰子事父母雞初鳴咸盥潄又曰進盥少者奉槃長者奉水請沃盥卒授巾左傳僖中曰懐嬴奉匜沃盥既而揮之懐嬴怒曰秦晉匹也何以卑我後漢書曰劉寛簡畧嗜酒不好盥浴手澡曰盥京師以為諺唐書曰虞世南受學扵吴郡顧野王經十餘年精思不倦或累旬不盥櫛荘子曰陽居遇老子老子中道仰天嘆曰始以汝為可敎也今不可也陽子居不答至舍進盥潄巾櫛脫屨户外膝行而前曰向者弟子欲請問夫子夫子行不間今間矣請問其故管子曰冬日不盥非愛水也夏日不煬非愛火也為不適扵身風俗通曰按里語厚哉鮑管探腸按腹不清然尚不盥何共財而生喜怒也㳺毛詩􅆁栢舟谷風曰就其深矣泳之㳺之左傳荘公曰楚武王遷權於郍處使閻敖尹之及文王即位巴人叛楚而伐郍處取之遂門于楚閻敖㳺涌而逸敖既不能守城又㳺涌水而走荘子曰顔淵問於仲尼曰吾嘗濟乎觴深之淵津人操舟若神吾問焉曰操舟可學耶曰可善㳺者數能若乃夫没人則未嘗見舟而便操之者也吾問焉而不吾告敢問何謂也仲尼曰善㳺者之數能㤀水也若乃夫没人之未嘗見舟而便操之也彼視淵若陵視舟之覆猶其車却也又曰孔子觀於吕梁懸水三十仞流沫三十里黿鼉魚鼈之所不能㳺也有一丈夫㳺之以為有苦而欲死者也使弟子並流而拯之數百歩而出被髮行歌而㳺扵塘下孔子従而問焉曰蹈水有道乎曰吾無道吾始乎故長乎性成乎命與齊俱入與汨偕出従水之道而不為私焉吾所以蹈水也吕氏春秋曰有道江上者見人方引嬰兒而投之江中嬰兒啼人問其故曰此其父善㳺使其父雖善㳺其子豈遽能㳺之哉淮南子曰食水者善㳺而耐寒萬震南州異物志曰合浦之人習水善㳺侻視層潭如猿仰株入如沉黿出如輕鳬蹲泥剖蚌潜竊明珠太平御覽卷三百九十五
