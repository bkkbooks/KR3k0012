front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_902-1a, image: WYG0901/WYG0901-0061a.png}
body:
  text: 太平御覽卷九百二宋李昉等撰獸部十四羊説文曰羊祥也象四足角尾之形孔子曰牛羊之字以形舉又曰羔羊子也羜五月生羊也􅧌亡具六月生羊也羍七月生羊也䍮直紹羊未卒嵗也䍧牝羊也羒音分牡羊也羠音夷乗羊也羳扶員腹黄也􅀈指間羊名也廣雅曰呉羊牝一嵗曰䍮三嵗曰羝牡一嵗曰牸三嵗曰䍧爾雅曰麢大羊似羊大角圓鋭好在山間羱如羊音元似呉羊羊牡羒音分牝牂夏羊黑羖䍽也牡羭黑羝也牝羖角不齊觤一短一長角三觠羷觠卷三匝羳羊黄腹未成羊羜絶有力奮郭義恭廣志曰大尾羊細毛薄皮尾上旁廣重十斤出康居又曰驢羊似驢字林曰䍲女奚切羺女溝切胡羊也羫口羊切羊􅀈也似羊四耳九尾目在背䍺音還似羊無口􅱤乙間切羣羊相積一曰羼初莧切羊相厠也羴羊臭也式延切𤣥中記曰千嵗之樹精為青羊崔豹古今注曰羊一名髯鬚主簿禮記曲禮下曰祭廟羊曰柔毛又曰大夫無故不殺羊又月令曰孟春天子食麥無羊又内則曰羊冷毛而毳羶詩小雅無羊曰誰謂爾無羊三百為羣又曰爾羊來思其角戢戢又曰羔羊鵲巢之致也召南之政在位皆節儉正直德如羔羊也羔羊之皮素絲五紽又曰䍧羊羵首三星在霤鄭𤣥注曰羊牝曰䍧羵大也易説卦曰兌為羊又大壯曰九三小人用壯君子用罔貞厲羝羊觸藩羸其角周禮夏官下曰羊人掌羊牲凡祭祀飾羔羔小羊詩曰四之日其早獻羔祭韭祭祀割羊牲登其首登昇也凡祈珥共其羊牲共猶給也賓客共其􅂒羊􅂒羊飡饔積膳之羊凡沈辜候穰釁積共其羊牲周禮天官食醫曰凡㑹膳食羊宜黍左傳宣上曰華元殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗又宣下曰楚子圍鄭伯肉袒牽羊論語曰子貢欲去吿朔之餼羊子曰賜也爾愛其羊我愛其禮又曰葉公語孔子曰吾黨有直躬者其父攘羊而子證之史記曰武王克殷微子持其祭器肉袒面縳見牽羊把茅膝行而前又曰卜式者河南人式入牧百餘羊十餘嵗羊致千餘上曰吾有羊在上林中欲令一牧之及拜式為郎布衣蹻而牧羊蹻音脚嵗餘羊悉肥上過其羊善之式曰非獨羊也治民亦如是也拜緱氏令又曰秦襄公始用羝羊祀西疇漢書蘇武使匈奴匈奴知武不可降使北海上無人處牧羊曰羝乳乃得歸武在海上廪食不致掘野䑕草荄而食之杖漢節牧羊卧起持節旄盡落又曰楚懐王孫心在人間為人牧羊項梁立為懐王東觀漢記曰甄宇北海人為州従事徴拜博士毎臘詔書賜博士一羊羊有大小肥瘦時博士祭酒議欲殺羊稱分其肉宇曰不可又欲投鈎復恥之云傷博士宇先自取其一瘦者猶是不復有爭訟後召㑹詔問瘦羊甄博士後漢書曰更始二年至長安尤嗜酒不理政事所佐皆賈豎膳夫庖人長安為之語曰竈下飬中郎將爛羊胃騎都尉爛羊頭關内侯又曰廣陵思王荆傳曰光武崩大行在殿荆哭不哀而作飛書令蒼頭詐稱東海王彊舅郭況書與彊構為大逆其辭曰當為秋霜無為檻羊秋霜肅殺於物檻羊受制於人墨子曰齊莊公之臣王國卑中里檄者訟三年而獄不斷恐失有罪使二人共一羊盟齊之社二子相従以羊血灑社讀王國卑之詞已盡中里檄之詞未半祭羊起而觸中里檄齊人以為有神騐列子傳曰楊朱見梁王言治天下如運諸掌王曰先生有一妻一妾而不能治三畆之園而不能芸言治天下何也曰君見夫牧羊者乎百羊而羣使五尺童子荷菙而隨之欲東而東欲西而西使堯牽一羊舜荷菙而隨之則不能前矣孫卿子曰仲尼為魯司冦沈猶氏不敢朝飲其羊尸子曰羊不任駕鹽車椽不可為楣棟龍魚河圖曰羊有一角食之殺人周書曰夏桀衰夷羊在牧飛蛤滿野史記又云飛鳥滿野韓詩外傳曰魯哀公使人穿井三月不得泉得一生羊焉公以為玉羊使祝鼓舞之欲上於天羊不能上孔子見曰水之精為玉土之精為羊願無怪之此羊肝土也公使殺之視肝即土矣國語曰季桓子穿井獲如玉缶其中有羊符子曰魏文侯見宋陵子三仕不碩文侯曰何貧陵子曰王見楚富者牧羊九十九而願百嘗訪邑里故人其鄰人貧有一羊富者拜之曰吾羊九十九今君之一盈我成百則牧數足矣鄰者與之従此觀之為富者非富貧者非貧也吕氏春秋曰百里奚未遇時亡虞飯牛於秦鬻以五羖羊之皮公孫枝得而獻諸繆公繆公用之謀無不當舉必有功淮南萬畢術曰阿羊九頭而更食國亂乃出楊雄法言曰敢問質曰羊質虎皮見草而悦見豺而戰忘其皮之虎也王充論衡曰獬豸者一角之羊也性知有罪臯陶治獄其罪疑令羊觸之山海經曰羬羊尾如馬尾出錢來之山瑞應圖曰鍾律和調則玉羊見白澤圖曰羊有一角當頂上龍也殺之震死博物志曰胡蕙蜀中本無羊洛中人有驅羊入蜀者胡蕙子著羊毛蜀人取種又曰隂夷山有淫羊一日百遍脯不可食但著床席間已自驚人又有作淫羊脯法取羖􅳶各一别繫令裁相近而不使相接食之以地黄竹葉飲以汁百餘日後解放之欲交未成便牽兩殺之膊以為脯男食􅗑女食􅳶則並如狂好色亦無所避其勢數日乃歇治之方煮茱萸菖蒲汁飲之以水銀宫脂塗隂男子即痿宫脂鹿脂也杜預奏事曰臣前在南聞魏興北山有野羊大者數百十斤試令曰求今者各得一牧并頭角蹄案其形不與土羊相似然是野獸世所希有新言曰初年懸羊頭磔雞頭以求富余以問河南服君服君曰是月草木胡羊能嚙草雞啄五糓故懸二物助陽氣今人殺羊雞自作不祥凉州異物志曰有小羊稱若斤頞黝峭如山壁上下如跌又曰有羊大尼車推乃行用累其身又曰封羊其背如駝宋永初山川記曰九真都龍縣有電廬羊大如􅀈牛春秋後語曰張儀謂楚王曰夫為従者無異驅羣羊而攻生虎虎之與羊不格亦明矣格鬭也今王不與虎而與羊臣竊以為大王之計過衞玠别傳曰玠少時乗白羊車於洛陽市共觀咸曰誰家璧人述異記曰蛟羊無角啖之毒又曰羊一名胡髯郎又名青鳥又曰周成王時東夷進六角羊周康王元年外國貢三角羊尹喜内傳曰老子與喜别曰尋吾於成都市青羊之肆喜後求而得之葛洪神仙傳曰皇初平年十五家使牧羊有道士見其良謹將至華山石壁中四十年不誤念其家其兄初起行索初平見道士引至山與弟語畢問平羊何在平曰近東初起視不見羊但見白石却謂平曰山東無羊平曰兄自無見耳與兄徃平乃叱之白石一時皆起成羊數萬頭初起曰弟得仙道已如此遂棄妻子服松柏茯苓五萬日遂得仙易姓為赤松子又曰曹公収左慈慈走入羣羊失慈之所在追者疑化為羊乃令人數羊羊本千口簡之長一口知化為羊乃謂曰若是左公者但出無苦也有一言羊跪言遽如許追者欲執之於是羣羊皆長跪曰遽如許追者乃去捜神記曰宣帝時隂子方者至孝有仁恩正當臘日晨炊而竈神形見子方再拜家有黄羊因以祀之又曰南陽宋定伯年少夜行忽逢一鬼問為誰定伯乃欺之曰我亦鬼也遂遞相擔負而行定伯曰我新鬼不知鬼何所惡曰惟不喜人唾欲至宛便擔鬼著肩上徑詣宛市化為羊恐其變亟唾之賣之得錢千五百買者繫之明視之繩在時人有言定伯賣鬼得錢千五列仙傳曰葛由者羗人周成王時好刻木作羊賣之一旦騎羊而入蜀中王侯貴人追之上綏山在峨嵋山西南髙無極隨之者不得還皆得仙道山上有桃故里諺曰得綏山一桃雖不得仙亦足以豪又曰昔有攘羊者以羊遺叔向母埋之不食後三年攘羊事發追捕向家撿羊骨肉都盡惟舌猶在國人異之遂以羊舌為族矣續捜神記曰顧霈者呉之豪士送客於昇平亭時有一沙門在座是流俗道人主人欲殺羊羊繩斷便走來入此道人膝中穿頭入袈娑下道人不能救即將去而殺之既行炙主人先割以啖道人道人食炙下喉炙便自走行道人皮中痛毒不可忍呼醫來針之以數針貫其炙炙猶動揺乃剖出之故是一臠肉耳道人於是得病作羊鳴吐沫還寺少時即死劉義慶幽明錄曰洛下有澗穴婦欲殺夫推下經多時至底乃得一穴宫舘金餙明踰三光人長三丈如此九處午後至告飢長人指樹下一羊令跪捋羊鬚初得一珠長人取之次亦取後令噉即療飢請問九處名求停不去答云去君不得停續異記呉興俞亮以永明八年補䕶軍長史於常眠者聞有羊聲疑為神怪竊於户窺之見其床下有一羊身髙二尺毛色若丹光耀滿室金樓子曰修羊公於華山隂以道干景帝禮遇之數嵗道不可得有詔問修羊公能何日發語未訖於床上化為白石羊題其脇曰修羊公謝天子後置石羊於通靈臺嶺表錄異曰嘗有人自青杜泛海歸閩為惡風所飄五日夜不知行幾千里也至一島忽見羣羊人向之亦不驚遊初疑人所牧放而絶無人迹乃知野生者船人方餒因取食之太平御覽卷九百二
