body:
  text: 太平御覽卷三十三宋李昉等撰時序部十八臘膢附臘許慎說文曰臘冬至後三戌臘祭百神也禮記月令曰孟冬是月也天子乃祈來年于天宗大割祠于公社及門閭臘先祖五祀此周禮所謂蜡祭也天宗日月星辰也割祠割牲以祭也臘謂以畋獵所得禽祭之五祀門户中霤井竈也或曰祈年或曰大祠或曰臘互文也勞農以休息之黨正屬民飲酒正齒位也天子乃命將帥講武習射御角力講武角力校武士材力所以備畋獵之禮又郊特牲曰天子大蜡八伊耆氏始為蜡伊耆氏古天子號也蜡也者索也謂求索也嵗十二月合聚萬物而索饗之也嵗十二月周之正月謂建亥之月饗者祭其神也萬物育功于民者神使為之也祭之以報焉又曰昔者仲尼與于蜡賓蜡者索也嵗十二月合聚萬物而索饗之亦祭宗廟孔子嘗仕魯在助祭之中事畢出逰于觀之上喟然而嘆觀闕也孔子見魯君于祭有不備于此又覩象魏舊章之處感而嘆之仲尼之嘆蓋嘆魯也又曰子貢觀于蜡蜡索也嵗十二月索群神之祀而臘也孔子曰賜也樂乎對曰一國之人皆若狂賜未知其為樂也孔子曰百日之勞一日之澤非爾所知也周禮曰國祭蜡則吹豳頌擊土鼓以息老物鄭𤣥曰十二月謂建亥之月也索萬物而祭之者萬物天成嵗事至此為其老而勞其禮以息之也豳風七月又有穫稲介夀稱觥萬夀無疆之事是詩歌其類矣謂之頌者以其言嵗事功成也周以今之十一月為正月以今十月為臘月也傳曰晉侯復假道于虞以伐虢宫之竒諌弗聴以其族行曰虞不臘矣臘祭名也日月㑹于龍尾百物備合國于是祭羣神也史記曰秦惠文王十二年初臘始皇三十一年十二月更名臘曰嘉平太原真人茅盈内紀曰始皇三十一年九月庚子盈曽祖父濛乃於華山之中乗雲駕龍白日昇天先是其邑謡曰神仙得者茅初成駕龍上升入太清時下𤣥洲戲赤城繼世而徃在我盈帝若學之臘嘉平始皇聞謡歌而問其故父老具對此仙人之謡勸帝求長生之術于是始皇欣然乃有尋仙之志因改臘月為嘉平也漢書曰髙祖十年春有司請令縣常以春二月及臘祠稷以羊彘又曰嚴延年為河南太守初延年母從東海來欲從延年臘到洛陽適見報囚報行决也母大驚便止都亭不肯入府延年出至都亭謁母母閉閣不見延年免冠頓首閣下良久母乃見之因數責延年曰幸得備郡守専治千里不聞仁愛多刑殺人欲以立威豈為民父母意哉延年服罪重頓首謝自為母御歸府舍母畢正臘謂延年曰天道神明人不可獨殺我不意當老見壯子被刑戮也行矣去汝東歸掃除墓地耳遂去歸郡後嵗餘延年果敗司馬彪續漢書曰季冬之月星迴嵗終隂陽已交勞農夫享臘以送故焉又舊儀曰臘者報諸鬼神古聖賢有功于民者皆享之又禮儀志先臘一日大儺謂之逐疫袁山松後漢書韓卓字子助陳留人臘日奴竊食祭其母卓儀其心即日免之免從良也謝承後漢書曰第五倫母老不能之官至臘日常悲戀垂淚又曰沛國陳咸為廷尉監王莽簒位還家杜門不出莽改易漢法令及臘日咸常言我先祖何知王氏之臘乎又東夷列傳曰三韓俗以臘日家家祭祀云臘鼓鳴春草生也東觀漢記曰甄宇字長文北海人建武中自青州從事徴拜博士每臘詔書賜博士羊人一頭羊有大小肥痩時博士祭酒議欲殺羊稱分其肉宇曰不可又欲投鉤宇復恥之因先自取其冣痩者髙堂隆魏臺訪議曰詔問何以用未祖丑臘臣隆對曰按月令孟冬十月臘先祖五祀謂薦田獵所得禽獸謂之臘左傳曰虞不臘矣唯見此二者而皆不書日聞先師說曰王者各以其行之盛祖以其終臘水始生於申盛於子終於辰故水行之君以子祖辰臘火始生於寅盛扵午終於戌故火行之君以午祖戌臘木始生於亥盛於夘終於未故木行之君以夘祖未臘金始生於巳盛扵酉終於丑故金行之君以酉祖丑臘土始生於未盛於戌終於辰故土行之君以戌祖辰臘今魏據土徳宜以戌祖辰臘又曰華歆常以臘日宴子弟王朗慕之蓋家由户漸矣杜公瞻云蜡者息民之祭故孔子曰百日之勞一日之澤其所祭八神者皆報其成功則於十月農隙是也後世臘有新故交接之義遂移於夏正月十二月晉博士張亮說蜡聚享臘者祭廟初云蜡則黄服蜡臘不同物必非也臘宜在新故交接二祭月同而名異祭俱而服殊今推諸經傳無正說蜡臘之文目今云蜡臘此則同日祭但殊名耳據田獵取獸之名為臘因索享百神號之曰蜡其日上祭先祖旁享百神下息萬民無别祭也即鄭𤣥云既蜡臘先祖五祀於夏是勞農者也近日蜡臘兼設蜡在十月臘在嵗終隋開皇四年始停建元之蜡直為建丑之臘依五行水衰於戌而用戌日故也晉書范喬字伯孫喬邑人臘夕盜斫其樹有告者喬佯不聞邑人愧而還喬曰節日取此欲與父母相歡娛耳何以愧乎遂與之又曰陳軫問方士戴洋曰江南有富人顧彦先周宣佩是否洋曰顧不及臘周不及明年八月其年十二月廿九日顧卒明日臘宣佩以明年七月晦亡又晋起居注曰安帝安隆四年十二月辛丑臘祠作樂又博士張亮議曰臘接也正宜在新故交接也俗謂之臘明日為初嵗秦漢以來有賀此古之遺語晉宋舊事曰魏帝遜位祖以酉月臘以丑月魏名臣奏曰大司農董遇議曰土行之君故宜以未祖以丑臘為得盛終之節不可以戌祖癸臘梁書曰何鳳為建安太守物不敢忤伏臘每放囚還家依期而返唐㑹要曰貞元九年十一月上曰比來京兆府每年及臘日府縣捕養狐兎以充進獻自今以後宜停又曰貞元十一年十二月臘日畋于苑中止多殺行三驅禮軍士無不知感鄭𤣥列傳曰𤣥方十二年隨母還家正臘讌㑹列十餘人皆美服盛飾語言閒道𤣥獨黙然如不及母私督數乃曰此非吾志不在所願列女傳曰魯之母師者魯九子之寡母也臘日休家作者召諸子謂曰婦人之義非有大故不出夫家然吾母家多㓜稚嵗時祀不理吾從汝謁謁告諸子欲往往監之慎房中之守吾夕而返于是天隂還太早至閭外而止待夕而入魯大夫從臺上見而恠之使問對曰妾朝出與諸婦孺子期夕而反妾恐其酺醵醉飽人情所有也妾反早故止閭外期盡而入大夫美之言於穆公公賜母尊號曰母師捜神記曰宣帝時隂子方者當臘日晨炊而竈神形見子方再拜受慶家有黄羊因以祀之自是以後暴至巨富故後常以臘日祠竈周處風土記曰歲前竭恭敬于明祀乃有藏彄臘日之後叟嫗各隨其儕為藏彄分二曹以校勝負荆楚嵗時記曰又為藏彄之戲辛氏以為鉤弋夫人所起周處成公緩並作彄字藝經庾闡則作鉤字其事同也俗云戲令人生離有禁忌之家廢不修也又曰孔子所為預以培賓一嵗之中盛于此節又曰俗又以此月為臘月按史記陳勝傳有臘日之言是謂此也諺云臘鼓鳴春草生村人並繫細腰鼓戴胡頭及作金剛力士以逐大疫華陽國志曰王長文字徳雋元康初守江源令縣收得盜馬賊及發塜賊長文引見誘慰時適臘晦皆遣歸家獄先有繫囚亦遣之謂曰教化不厚使汝等如此長吏之過也蜡節慶祚肆汝歸于家善相歡樂過節來還當為汝思他理郡吏惶怖争請不許尋有赦無不感恩三十國春秋曰江州刺史李徹自武昌移疾被徴為右將軍而王舒未至猶在湓口後將軍郭黙旋而過徹不禮之臘日遺黙酒五觔豚一頭黙大怒投之於江遂與故將張丑宋侯孟純等矯詔入城門莫有禦者徹獨與其妾寝黙至斬于牀下及其司馬張滿㕘軍荀楷李慕傲黙故也王肅曰禮云季冬大儺旁磔出土牛以送寒氣乃即今之臘除逐疫磔雞草絞桃梗之屬風俗通曰夏曰清祀殷曰嘉平周曰大蜡漢曰臘臘者獵也因獵取獸以祭先祖或曰臘接也新故交接故有臘祭以報功也漢火行衰于戌故以戌為臘也又曰莬髕俗說臘正旦祖食得莬髕者名之曰幸賞以寒酒幸善吉祥令人吉利也髕比恩切又曰上古之時有神荼與鬱壘昆弟二人性能伏鬼每于山桃樹下簡閲百鬼鬼無道理妄為人禍者神荼與鬱壘縛以葦索執以食虎于是縣官常以臘除文飾桃人垂葦茭畫虎於門皆追效前事冀以衛凶也會稽符録曰陳修字奉遷烏傷人家貧為吏常步擔上下恒食乾糒音備每至正臘僵卧不起同僚以飲食請不徃其志操如此世說曰王朗中年以識度推伏華歆歆蜡日常㑹集子姪宴飲王亦效之有人向張茂先稱此事張曰王之學華皆是形骸之好去之所以更逺玉燭寳典曰臘者祭先祖蜡者報百神同日異祭者也蔡邕獨斷曰臘者嵗終大祭縱吏民宴飲非迎氣故但送不迎也崔寔四民月令曰十月上辛命典饋清麴釀冬酒以供臘祀又曰臘明日為小嵗進酒尊長修刺賀君師禮曰天子大蜡八蔡邕王喬録曰漢永和元年十二月臘夜王喬墓有哭聲王伯聞而徃視之天大雪見大鳥跡并祭祀處採薪者尹秀見人衣冠曰我王喬也汝莫取吾墓樹忽不見徐爰家儀曰蜡本施祭故不賀其明日為小嵗賀稱初嵗福始慶無不宜正旦賀稱元旦首慶百物惟新小嵗之賀既非大慶禮止門内西域諸國志曰天竺國以十二月十六日為臘臘則麥熟盧公家範曰凡臘日上澡豆袋及頭膏面脂口脂淮南萬畢術曰嵗暮臘埋圓石于宅隅雜以桃核七枚則無鬼疫養生要術云臘夜持㪷卧井傍勿與人言投于井中除瘟疫盛翁子藏鉤賦叙曰以臘之後因祭祀餘胙要命中外以行鉤為戲嵇含蜡賦序曰大蜡之夕雖天下同有至攜金蘭以齊馨利得貴意以遺榮勢孰我尚哉裴秀大蜡詩曰有肉如丘有酒如淵有殽如林有貨如山膢說文曰膢楚俗十二月祭飲食之神也又曰祈榖食新曰離膢漢書曰武帝太初二年令天下酺五日膢五日祠門户比臘續漢書禮儀志曰立秋之日郊禮畢始揚威武斬牲于郊東門以薦陵廟其儀乘輿御戎輅白馬朱鬛躬執弩射牲薦廟太宰令謁者各一人載獲車馳駟送廟還宫使者齎束帛以賜武官肄兵習戰陣之儀斬牲之禮名曰貙劉風俗通曰謹按韓子書山居谷汲者膢臘而買水楚俗常以十二月祭飲食也又曰嘗新始殺也食新曰膒膢又曰謹按自郊貙膢春秋饗射天子射麑掩雉獻諸宗廟扶陽發滯養老致敬化之至也太平御覽卷三十三
