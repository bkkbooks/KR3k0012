  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_504-1a, image: WYG0897/WYG0897-0529c.png}
body:
  text: 太平御覽卷五百四宋李昉等撰逸民部四逸民四晉中興書曰孟陋字少孤少而清潔貞操絶倫口不言世事少時或漁弋雖家人亦不知所之太宗輔政以為叅軍不起桓温躬徃造焉或謂温宜引在府温歎曰會稽王不能屈非敢擬議也陋聞之曰億兆之人無官者十居其九豈能髙士哉我病疾不堪恭相王之命非敢為髙也又曰劉驎之字子驥一字道民好逰于山澤志在存道常採藥至名山深入忘返見有一澗水南有二石囷一囷開一囷閉或説囷中皆仙方秘藥驎之欲便尋索終不能之桓沖請為長史固辭居于陽岐人事徃來無不投止驎之自供給人人豐足凡人致贈一無所受又曰龔𤣥之字道𤣥潜處陋巷未嘗出入公門人有致餉一無所受武陵太守孫放薦𤣥之詔以為散騎常侍郡縣逼苦辭不行前後四徴一皆不就又曰戴逵字安道少博學能鼓琴總角時以鷄子汁溲瓦屑作鄭𤣥碑又為碑文文既綺藻器亦妙絶武陵王晞聞其善琴使人召之逵於使者前打破琴曰戴安道不能為王門伶人累徴散騎常侍郡縣逼乃逃去吳國内使王詢有别館在虎邱山乃潜住詢山中謝𤣥王詢並表逵忠烈備禮徴不至沈約宋書曰陶潜字淵明或云淵明字元亮曽祖侃晉大司馬潛少有髙趣常著五栁先生𫝊以自况曰先生不知何許人不詳姓字宅邉有五栁樹因以自號焉閑靜少言不慕榮利好讀書不求甚解性嗜酒而家貧不能恒得親舊知其如此或置酒招之造飲輒盡期在必醉常著文自娛頗示以志無懐葛天以此自終其自序如此時人謂之實録又曰孔淳字彦深魯郡人茅室蓬戸庭草無徑唯牀上有數帙書元嘉初徴散騎常侍乃逃于上虞縣界家人莫知所之又曰周續之字道祖鴈門廣武人也終身不娶妻布衣蔬食常以嵇康髙士傳得山林之美因為之注髙其志節居守迎續之館于安樂寺延入講禮月餘復還山又曰朱百年會稽山隂人以伐樵採箬為業每以樵箬置道頭輒為行人所取明旦已復如此人稍怪之積久方知是朱隱士所賣須㬰行者隨其所伐多少留錢取樵而去又曰王素字休業琅琊人也少有志行乃徃東陽隠居不仕屢被徴辟聲譽甚髙山中有蚿䖝聲清長而形醜素乃為蚿賦以自況又曰戴顒字仲若譙郡銍人也父逵兄勃並隱遁有髙名顒年六十遭父憂幾於滅毁因此長抱羸患又不仕復修其業父善琴書顒並得之凡諸音律皆能揮手會稽剡縣多名山故世居剡下顒及兄殻並受琴於父父没所𫝊之聲不忍復奏各造新弄桐廬縣又多名山兄弟復共遨之因留居止以桐廬僻逺難以養疾乃出吳下吳下士人共為築室乃述莊周大㫖著逍遥論太祖元嘉初徴散騎常侍並不就太祖每欲見之常謂黄門侍郎張敷曰吾東巡之日當讌戴公山也以其好音長給正聲伎一部卒年六十四後景陽山成上歎曰恨不使戴顒觀之又曰宗炳字少文南陽人也髙祖領荆州辟為主簿不起問其故答曰栖丘飲谷三十餘年豈可於黄門折腰為趍走吏乎髙祖善其對妙善琴書精於言理每逰山水徃輙忘歸西長史王𢎞每從之逰未嘗不弭日也乃下入廬山就釋恵逺考尋文義兄臧為南平太守逼與俱還乃於江陵三湖立宅閒居無事髙祖召為太尉叅軍不就二兄早卒孤累甚多家貧無以相贍頗營稼穡髙祖數致餼賚宋受禪徴為太子舍人元嘉初又數徴庻子並不應衡陽王在荆州親至炳室與之飲讌命為諡議不起好山水愛逺遊西陟荆巫南登衡岳因而結宇衡山欲得尚平之志有疾還江陵歎曰老疾俱至名山恐難逰遍唯當澄懐觀道卧遊以理皆圖之於室謂人曰撫琴動操欲令衆山皆響古人金石弄唯炳𫝊焉太祖遣樂師卧就炳受之元嘉二十年炳卒又曰王𢎞之字方平琅琊臨沂人家貧而性好山水桓𤣥輔晉桓謙以為衛軍叅軍時殷仲文還姑孰祖送傾朝謙要𢎞之同行答曰凡祖帷送别必在有情下官於殷風馬不接無縁扈從謙貴其言隨兄敬之居成都𢎞之解職同行家在會稽上虞敬之常解貂裘與之即著以採藥性好釣上虞江有一處名三石頭𢎞之常垂綸於此經過者不之識或問漁師得魚賣否𢎞之曰亦自不得亦不賣日夕載魚入至上虞郭經親故門各以一兩頭置門内而去始寧沈州有佳山水𢎞之又依巖築室謝靈運顔延之並相欽重又曰劉凝之字志安少名長年慕老萊嚴子陵為人推家財與弟及兄子立屋于野外非其力不食州里重其仁徳禮辟並不受妻涼州刺史郭鈴女也遣送豐麗凝之悉散之親族妻亦能棄榮華共安儉苦徴為秘書郎不就荆州年飢衡陽王慮凝之餒弊餉錢十萬凝之大喜將錢至市門觀有飢色者悉分與之性好山水一旦攜妻小泛江湖隠居衡山之陽登髙山絶人迹為小屋居之採藥服食妻子皆從其志又曰龔祈字道孟武陵漢夀人也父黎民及祈並不應徴辟其風姿端雅容止可觀中書郎范述見而歎曰此荆楚仙人也時或賦詩不言及世事又曰翟法賜潯陽柴桑人祖湯湯子莊莊子矯並髙尚不仕逃避徴辟矯法賜少守家業立屋於廬山頂居後便不復還家不食五穀以獸皮結草為衣辟著作郎不就後家人至石室尋求因復逺徙違避徴聘遁迹幽深後卒於巖石之間又曰沈道䖍吳興武康人少仁愛好老易縣北石山下為精廬與諸孤兄子共釡庾之資困不改節受琴於戴逵郡府凡十二命皆不就太祖聞之遣使存問賜錢累世事佛推父祖舊宅為寺至四月八日每請像請像之日輙舉家感動焉道䖍年老菓食恒無經日之資而琴書為樂孜孜不倦又曰雷次宗字仲倫南昌人也少入廬山事沙門釋惠逺篤志好學尤明三禮毛詩隠退不交世務以散騎仕郎徴並不就元嘉十五年徴至京師開館於鷄籠山聚徒教授諸生百餘人車駕數幸次宗學館資給甚厚又除給事中不就還廬山公卿已下並設祖道後徴詣京邑為築室於鍾山西巖下謂之招隠館使為皇太子諸王講喪服經次宗不入公門仍使自華林東門入延覽堂就業後卒於鍾山又曰闗康之字伯愉河東洛陽人世居京口寓居南昌少而篤學算妙盡其能元嘉初太祖聞康之有學義詔徴之不起棄人事守志閑居弟雙之病卒迎喪因得虛勞病寢頓二十餘年時有間日輙卧論文義昇平初卒後漢書曰馮亮字靈通南陽人博覽諸書好冩佛經世宗常召以為羽林監領中書舍人將仝侍講十地諸經固辭不拜又使衣幘入見亮求以幅巾就朝遂不强逼還山數年與僧徒禮誦為業有終焉之志既雅愛山水兼有巧思結架林岩甚得逺逰之適頗以此聞世宗給其功力令與沙門統僧暹河南尹甄琛等周視嵩山形勝之處制閑居寺亮卒詔賜帛二百疋以供凶事遺誡兄子綜殮以衣縚左手持板右手執孝經置屍盤石上積十餘日乃焚于山以灰燼處起佛塔初亮以冬月亡時連驟雪窮山荒澗鳥獸飢窘僵屍山野無所防䕶時有夀春道人恵需每旦徃看其屍拂去塵霰禽蟲之迹交横左右而初無侵毁衣服如本唯風摧折耳需又以大栗十放開亮手置把中經宿乃為蟲盜食皮殻在地亦不傷肌體焚燎之日有素霧蓊鬱迴繞其旁自地屬天彌朝不絶中山道俗營助者百餘人莫不異焉魏書曰李謐字永和趙郡人少而好學博通諸經周覽百氏初師事小學博士孔璠數年之後璠還就業謐同門生為之語曰青盛藍藍謝青師何常在明經謐飲酒好音律愛樂山水髙尚之情長而彌固十遇其賞悠爾忘歸乃作神士賦又曰睦夸一名昶趙郡髙邑人年二十遭父喪鬚髮至白每悲哭聞者為流涕髙尚不仕寄情丘壑少與崔浩為莫逆之交及浩為司徒奏徴夸為中郎辭疾不起州郡逼遣不得已及入都與浩相見經留數日惟飲酒叙平生不及世利害浩每欲論屈之意不能發言見敬憚如此浩後遂投詔書於夸曰桃簡卿已為司徒何足以此勞國士桃簡浩小名浩慮夸即還夸時乗一騾更無兼騎浩乃以騾内之廏中冀相維縶夸遂託郷人輸租者謬為御車乃得出闗浩知而歎恨曰睦夸獨行之士本不應以小職辱知又使杖䇿復路吾當何辭以謝也及浩誅後夸為之素服受鄉人弔喭乃嘆曰崔公既死誰能更容睦夸年七十五卒及塟之日赴㑹者如市續晉陽秋曰謝敷隱居會稽初月犯少微一名處士星時戴逵名重於時人憂之俄而敷死故會稽士人嘲曰吳中髙士求死不得死太平御覽卷五百四
