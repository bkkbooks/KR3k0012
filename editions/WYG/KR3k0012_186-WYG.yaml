body:
  text: 太平御覽卷一百八十六宋李昉等撰居處部十四厨竈竇厠厨説文曰厨庖室也易曰庖有魚義不及賓也毛詩大庖不盈禮記玉藻曰君子逺庖厨凡有血氣之類弗身踐也又曰獵之禮一為乾豆二為賓客三為充君之庖漢書賈誼曰其於禽獸見其生不食其死聞其聲不食其肉故逺庖厨所以長恩且明有仁也後漢書禰衡到許都人問荀文若趙稚長云何趙為盪寇将軍見魏志衡曰文若可使借面弔喪稚長可監厨請客典略曰衡見荀儀容但有貎耳故可弔喪趙有腹健啖肉故可監厨也七賢傳曰阮籍以兵厨中有美酒求為步兵校尉司馬相如上林賦曰庖厨不徙後宫不移古詩曰左顧賴中厨竈禮有五祀竈居一焉月令孟夏其祀竈祭先肺註陽氣熱盛祀之於竈從熱類也禮臧文仲燔柴於竈夫爨者老婦之祭也盛於盆尊於缾文仲焉知禮禮庶人立一祀或立户或立竈論語王孫賈曰與其媚於奥寧媚於竈史記孫臏救韓入魏為十萬竈明日為五萬竈又明日為三萬竈龎㳙經三日大喜曰吾固知齊人怯入吾地三日士卒亡者過半遂逐之又李斯曰由竈上騷除此萬世之一時也騷音掃漢書李少君言祀竈皆可致神物而丹砂可化為黄金黄金成以為器以食則益夀夀益則海中蓬萊仙者乃可見之封禪則不死黄帝是也天子親祀竈焉又曰初霍氏奢侈茂陵徐生曰霍氏必亡夫奢則不遜不遜必侮上侮上逆道也在人之右衆必害之也霍氏秉權日乆害之者多矣天下害之而又行以逆道不亡何待迺上疏言霍氏太盛陛下即愛厚之宜以時抑制無使至亡書三上輒報聞其後霍氏誅滅而告霍氏者皆封人為徐生上書曰臣聞客有過主人者見其竈直突傍有積薪客謂主人更為曲突逺徙其薪不者且有火患主人不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝鄰人灼爛者在於上行餘各以次不録言曲突者人謂主人曰鄉使聴客之言終無火患今論功而請賓曲突徙薪無恩澤燋頭爛額為上客主人乃悟而請之茂陵徐福數上書曰霍氏且變鄉使福説得行則國無裂土出爵之費臣無逆亂誅滅之敗往事既已而福不䝉其功唯陛下察之貴徙薪曲突之䇿使居焦髮爛額之右上迺賜福帛十疋後以為郎又曰息夫躬祀竈人見之告呪詛遂棄市又曰昭帝時燕王宫豕出圂胡困切壊都竈注都竈蒸炊之大竈也劉向以為豕禍後漢書李南女曉術為由拳縣妻晨詣竈室卒有㬥風婦上堂従姑求歸辭其二親姑不許乃跪而泣曰家世傳術疾風起先吹竈突及井此禍為婦女主爨者妾将應之因著其亡日乃聴還家如期病卒又更始傳李軼朱鮪擅命山東王匡張卬横㬥三輔其所官爵皆羣小賈豎或有膳夫庖人多著繡面衣錦袴襜褕諸于罵詈道中長安為之語曰竈下養中郎将爛羊頭闗内侯又曰虞詡為懐令西羌寇武都鄧太后以詡有将帥之略遷武都太守引見嘉徳殿厚加賞賜羌乃率衆數千遮詡於陳倉崤谷詡即停軍不進而宣言上書請兵須到當發羌聞之乃分鈔傍縣詡因其兵散日夜進道兼行百餘里令吏士各作兩竈日増倍之羌不敢迫或問曰孫臏減竈而君増之兵法日行不過三十里以戒不虞而今日且二百何也詡曰虜衆多我兵少徐行則為所及速過則彼所不測虜見吾竈日増必謂郡兵來迎衆多行速必憚追我孫臏見弱吾今示强勢有不同故也又曰向栩性不恒少似狂常於竈北坐板床上又曰張忠署孫賓為主簿遂祭竈請比鄰又曰陰識之子方臘日晨炊而竈神見因殺黄羊祀之三世繁昌遂常以臘日祭也戰國䇿曰智伯攻晉陽城城不没者三版沈竈生蛙懸釡而炊魯連子曰一井五缾洩可立待一竈五突烹餁十倍分烟者衆淮南子曰黄帝作竈死為竈神荘子曰仲尼讀春秋老耼踞竈觚而聴觚竈額也又曰陽子居南之沛老聃西逰於秦邀還於郊至於梁而遇老子老子中道仰天而嘆曰始以汝為可教今不可也陽子居不答至舎進盥漱巾櫛脱屨户外膝行而前曰向者弟子欲請夫子夫子行不間是以不敢問今間矣請問其過老子曰而睢睢盱盱而誰與居大白若辱盛徳若不足陽子居蹵然變容曰敬聞命矣其往也舍者迎將其家公執席妻執巾櫛舎者避席煬者避竈其反也舎者與之争席矣宜都縣記曰宜都山絶崖壁立數百丈有一火爐揷在崖間望可長數尺傳云堯洪水時人泊船此旁爨餘故曰揷竈崖萬畢述曰竈神晦日歸天白人罪夢書曰竈主食夢者得食李尤竈銘曰燧人造火竈能以興竇周禮考工記曰宫中之竇其崇三尺左傳曰蓽門圭竇之人皆凌其上又曰有過氏滅夏立相后緡方娠逃出自竇晉書光逸避亂依胡母輔之初至屬輔之與謝鯤阮籍畢卓羊曼桓􅉓阮孚散髮裸袒閉室酣飲已累日逸将排户入守者不聴逸便於户外脱衣露頭於狗竇中窺之而大呌輔之驚曰他人决不能爾必我孟祖也遽呼入遂與飲不舎晝夜時人謂之八達家語曰子羔為衛之士師刖人之足衛有蒯瞶之亂子羔逃至郭門刖者守焉謂子羔曰彼有缺子羔曰君子不踰又曰彼有竇子羔曰君子不隧又曰彼有室子羔入焉追者罷子羔乃去厠溷附廣雅曰圊溷屏厠也説文曰厠清也釋名曰厠言人雜厠在上非一也或曰溷濁也或曰至穢宜常修治使清潔儀禮曰𨽻人温厠温塞也為人復往䙝也左傳曰晉侯将食麥張如厠陷而卒史記曰朱虛侯入未央宫遂擊産産走天風大起從官亂莫敢鬭遂殺産之郎中府吏厠中又曰范雎事魏中大夫須賈賈為魏昭王使於齊睢從齊襄王聞睢辯有口才乃使人賜金十斤及牛酒須賈以睢持魏事告齊故睢獨得此饋心怒歸以告魏相魏齊齊使人笞擊睢折脅摺齒睢佯死即裏以簀置厠中賔客飲者醉更溺睢以懲後令無妄言者又曰李斯者楚之上蔡人也少時為鄉小吏見吏舎厠中鼠食不潔近人犬數驚恐之斯入倉觀倉中鼠食積粟居大廡下不見人犬之憂於是李斯乃嘆曰人之賢不肖譬如鼠矣在所自處耳乃從荀卿學帝王之術又曰萬石君長子建老白首萬石君尚無恙建為郎中令每五日洗沐歸謁親入子舎竊問侍者取親中裙厠牏身自浣滌徐廣曰牏築垣短版也音注厠牏謂溷垣牆建隠於其厠而浣滌也一謂牏為竇言建又自洗盪厠竇則竇瀉除穢汚之穴也吕静曰楲窬褻器音威豆復與侍者不敢令萬石君知以為常又曰趙襄子滅智伯其臣豫讓遁逃山中曰嗟乎士為知己者死女為説己者容今智伯知我我必為報讐而死以報智伯則吾魂魄不愧矣乃變姓名為刑人入宫塗厠中挾匕首欲以刺襄子襄子如厠心動執問塗厠之刑人豫讓内持刃兵曰欲為智伯報仇左右欲殺之襄子曰彼義人也吾謹避之耳且智伯亡無後而其臣欲為報仇此天下之賢人也卒釋去之又曰大将軍衛青侍中上據厠而視之注溷厠也漢書曰郅都侍上賈姬如厠有野彘入厠上目都擊之都不往上欲自行都伏諫曰一姬死復一姬進上雖自輕奈太后宗廟何太后聞之賜都金晉書王戎傳惠帝反宫以戎為尚書令既而河間王顒遣使説成都王穎将誅齊王冏檄書至冏謂戎曰孫秀作逆天子幽偪孤糾合義兵掃除元惡臣子之節信著神明二王聴讒造構大難當賴忠謀以和不協卿善為我籌之戎曰公首舉義衆定大業開闢以来未始有也然論功報賞不及有勞朝野失望人懐二志今二王帶甲百萬其鋒不可當若以王就第不失故爵委權崇讓此求安之計也冏謀臣葛旟怒曰漢魏以來王公就第寧有得保妻子乎議者可斬於是百官震悚戎偽藥發墮厠得不及禍又曰郭璞素與桓􅉓友善􅉓每造之或值璞在厠婦聞使入璞曰卿來他處自可徑前但不可厠上相尋耳若來必客主有殃􅉓後因醉詣璞正逢在厠掩而觀之見璞裸身被髮銜刀設醊璞見􅉓撫心大驚曰吾每屬卿勿來反更如是非但禍吾卿亦不免矣天實為之將以誰咎璞終罹王敦之禍􅉓亦死蘇峻之難魏氏春秋曰許允為鎮北將軍未發徙樂浪允善相印将拜印以不善更刻大如此者三允曰印雖好而已被辱問送印者果懐之而墜於厠幽明録曰建徳民虞敬上厠輒有一人授手内草與之不覩其形如此非一過後至厠乆無送者但聞户外鬭聲窺之正見死奴與死婢争先進草婢適在前奴便因後撾由此輒兩相擊食頃敬欲出婢奴陣勢方未已乃厲聲叱之奄如火滅自是遂息又曰阮徳如嘗於厠見一鬼長丈餘色黑眼大著皁單衣平上幘去之咫尺徳如心安氣定徐喚而語之曰人言鬼可憎果然桓譚新論曰博士弟子譚生居東寺連三夜有惡夢以問人教使晨起清中説之三旦而人告以為呪詛捕治數日杜蘭香傳杜蘭香戒張碩不宜露頂上厠夜行必燭周景式孝子傳曰管寧避地遼東經海遇風船人危懼皆叩頭思過寧思惟無諐念嘗如厠不冠即便悔首風尋止異苑陶侃曽如厠見數十人持杖有一人著朱衣介幘曰以君長者故來相報君後當為公侯襄沔記蜀先主之依劉表起至厠見髀裏生肉慨然流涕還坐表怪問之對曰平常身不離鞍髀肉皆消今不復騎髀裏肉生日月若馳老将至矣而功業不建是以悲耳表雖重先主因此欲害之先主覺偽如厠潜遁出所乗馬名的盧從襄陽城西檀溪水中而渡被溺不出備既急乃曰的盧今日危矣可不努力乎的盧乃一踴三丈遂得過溪而去神仙傳曰淮南王安謁仙伯坐起不恭主者奏安不敬讁守厠三年抱朴子内篇曰河東項曼都入山學仙十年而歸家問其故曼都曰在山中仙人乘龍迎我上天先過紫府金床玉几真貴處也仙人以流霞一杯飲我輒不死不飢渴事天帝有失行来還昔淮南王謫之守厠矣吾何人哉語林曰劉寔詣石崇如厠見有絳文帳裀褥甚麗兩婢持錦囊寔遽退笑謂崇曰向誤入卿室崇曰是厠耳寔更往向乃守厠婢所進錦囊寔籌良乆不得便行出謂崇曰貧士不得此厠乃如他厠又曰石崇厠常有十餘婢侍列皆佳麗藻飾置甲煎粉沉香汁無不畢備又與新衣客多不能著王敦為将軍少年既脱故衣著新衣氣色傲然羣婢謂曰此客必能作賊世説王大将軍敦初尚主如厠見漆箱中盛乾􅀥本以塞鼻王謂厠上亦下果食遂至盡既還婢擎金澡盤盛水琉璃碗盛澡豆因倒著水中而飲之謂是乾飯羣婢掩口而笑之太平御覽卷一百八十六
