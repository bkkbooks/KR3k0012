body:
  text: 太平御覽卷七百十一宋李昉等撰服用部十三箱巾箱笥笈火籠箱東宫舊事曰皇太子初拜有馬齒呈事箱四枚漢武帝内傳曰帝崩時遺詔以雜道書四十卷置棺中至延康二年河東功曹李及入上黨抱犢山採藥於巖室中得此書盛以金箱卷後題日月是武帝時河道太守張純以箱及書奏上之武帝時左右見之涕泣曰此是帝崩時殯殮物宣帝愴然以書付茂陵安合如故晉陸雲與兄機書一曰行曹公器物有書箱五枚想兄識彦髙書箱甚似之巾箱漢武内傳曰武帝見西王母巾箱中有一卷書王母曰此五岳真形圖昨青城諸仙就我求今當付之宋書曰元㐫劭弑逆南陽公主見女巫嚴道育云天神當賜符應時主夕卧見流光相隨状若螢火遂入巾箱化為雙珠圓青可愛因是巫蠱而敗齊書曰衡陽王鈞常手自細書寫五經部為一卷置於巾箱中以備遺忘侍讀賀玠問曰殿下家自有墳索復何須蠅頭細書别藏巾箱中荅曰巾箱中有五經於檢閲易且一更手寫則永不忘諸王聞而争效為巾箱五經自此始世說曰盛法濟者義興人其兒年二十得病經年有神來語言牀席不净神何處得坐曰有漆巾箱甚净神何不入中因内新果於箱中覺有聲以箱盖覆之於是便聞箱中動搖即以衣傳之可以五升米重而病愈異苑曰晉孝武太元末每聞手巾箱中有鼓吹鞞竽之音帝是嵗崩天下大亂笥説文曰簟笥飯及衣之器也尚書曰惟衣裳在笥東觀漢記曰上問第五倫卿為市椽人有遺卿母一笥餅卿從外來見之奪母笥探口中餅出之倫對曰實無此衆人以臣愚蔽故為生此語東觀漢記曰上聞王郎将軍至復驚去馮異進笥麥飯兎肩續漢書曰世祖㣲時繫南鳴市獄吏以一笥飯與之吳越春秋曰越以文笥七枚獻吳王西京雜記曰宣帝以琥珀笥盛身毒寳鏡風俗通曰孝靈帝建寧中京師長者皆以葦碎方笥為粧具時有識者竊言葦方笥郡國獻篋也今珍用天下皆當有罪讞於理官也後黨錮皆讞廷尉人名悉入方葦笥中斯為騐矣張衡綬笥銘曰南陽太守鮑徳有詔所賜先公綬笥傳世用之更治笥平子為徳主簿故為之銘也笈説文曰扱同笈驢上負也風俗記曰笈學士所以負箱如冠藉箱也謝承後漢書曰徐稚字孺子公車五徵皆不降志某有喪負笈赴弔行五里地又曰袁閎字夏甫汝南人也博覽群書負笈尋師變易姓名又曰髙𢎞字伯武河内山陽人為瑯琊相到官自負笈單歩入界聽採風俗又曰蘇章字士成北海人負笈追師不逺萬里又曰方諸字聖明負笈到三輔無術不覽又曰郎宗負笈賣卜給食諸公表上博士徵宗宗負笈遁去李固𫝊曰固父為三公而固歩行負笈千里從師拾遺録曰漢惠帝時有仙人韓稚東至沈離國遇其人同室負笈而問其年㡬何漢武内傳曰上元夫人語武帝曰阿母令以瓊笈妙藴發紫臺之文賜汝火籠方言曰南楚江沔之間籠謂之篣或謂之笯陳楚宋魏之間謂之庸君今薰籠是也齊書曰卞彬性飲酒火籠什物多諸詭異自稱卞田居又曰范述曽為永嘉太守有善政徵為游擊將軍郡故舊送錢二十餘萬一無所受唯得白銅皮火籠十餘枚而已梁書曰臨賀王正徳為吳郡太守正徳自謂應居儲嫡心常怏後奔魏初去之始為詩一絶内火籠曰楨幹屈曲畫蘭麝氛氲銷欲知懷炭日正是履氷朝脩復山林故事端梓宫中有象牙火籠東宫舊事曰太子納妃有漆畫手巾薫籠二條大被薫籠二三西京雜記曰漢制天子以象牙為籠上皆散花文後宫則五色綾文劉向别録曰淮南王有薫籠賦齊謝朓詠竹火籠詩曰庭雪亂如花井水粲成玉因炎入豹袖懷温奉芳蓐體宻用宜通文斜性非曲梁范静妻沈詠五彩竹火籠詩曰可憐潤霜質纎剖復毫分織作迴風苣製為縈綺文含芳出珠被耀綵接緗裙徒嗟今麗飾豈念昔凌雲太平御覽卷七百十一
