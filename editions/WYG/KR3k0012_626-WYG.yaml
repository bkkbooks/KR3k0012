body:
  text: 太平御覽卷六百二十六宋李昉等撰治道部七貢賦下漢書曰孝文時晁錯説上令人入粟得以拜爵邊食足支五歲可令入粟郡縣矣足支一歲已上可時赦勿収農人租如此徳澤加於萬人帝從之後天下充實乃下詔曰農天下之本務莫大焉今勤身從事而有租税之賦是謂本末者無以異也本農也末賈也言農與賈俱出租無異也於勸農之道未備其除田之租稅又曰董仲舒説上曰古者税民不過十一其求易供使人不過三日其力易足秦用商鞅之法加月為更卒已復為正卒一歲屯戍三歲力役三十倍於古更卒謂給郡縣一月而更者也正卒謂給中都官者也率計今人一歲之中役之事三十倍多于古也田租口賦鹽鐵之利二十倍於古秦賣鹽鐵貴故下民受其困也既収田租又出口賦而官更奪鹽鐵之利率計今人一歲之中失其資産二十倍多於古也或耕豪民之田見税十五故貧民常衣馬牛之衣而食犬彘之食又曰兒寛為左内史勸農業緩刑罰卑體下士務在於得民心收租税時裁濶狹與民相假貸為有貧弱及農要之時不即徴收也以故租多不入後有軍發左内史以負租課殿當免民皆恐失之大家牛車小家擔負輸租繦屬不絶課吏以最上上由是愈竒寛唐書曰開元八年二月制曰頃者以庸調無慿好􅁖湏準故遣作様以頒諸州令其好不得過精惡不得至濫任土作貢防源斯在諸州送物作巧生端苟欲富於斤兩遂即加其丈尺有至五丈為疋者理甚不然濶尺八長四丈同文共軌其事乆行立様之時湏載此數若求兩而加尺甚暮四而朝三宜令所司簡閲有踰于比年常例尺丈過多者奏聞又曰開元二十五年定令諸課戸一丁租調準武徳二年之制其調絹絁布並随鄉土所出絹絁各二丈五尺輸絹絁者綿三兩輸布麻三斤其絹絁為疋布為端綿為屯麻為綟若當户不成疋端屯綟者皆隨近合成其調南毎年支料有餘折一斤輸粟一升與租同受管子曰地之生財有時人之用力有倦人君之欲無窮以有時與有倦養無窮之君而度量不生於其間度量不生賦役無限也則上下相疾也又曰桓公伐楚濟汝水踰方城望汶山使貢絲周室列子曰周穆王大征西戎西戎獻昆吾之劍切玊如泥又曰穆王時西域國有化人來王為中天之䑓日日獻玉衣旦旦薦玊食王執化人之袂騰而上天文子曰楚人擔山雞路人問曰何為也欺之曰鳳凰也路人請十金弗與倍乃與之将獻楚王經宿鳥死路人不惜其金惟恨不得獻國人傳之咸以為真鳳遂聞楚王王感其貴買欲獻於己厚賜之過于買鳥之金十倍韓子曰齊威王夫人死有十孺子薛公欲知王所立為十玊珥而美其一獻于王王以賜十孺子明日坐視羙珥所在而勸以為夫人也孟獻子曰畜馬乗不察於雞豚伐冰之家不畜牛羊百乗之家不畜聚歛之臣與其有聚歛之臣寧有盗臣此謂國不以利為利以義為利也孟子曰夏后氏五十而貢殷人七十而助周人百畆而徹其實皆什一也徹者徹也助者藉也詩曰雨我公田遂及我私惟助為有公田由此觀之雖周亦助也又曰尊賢使能俊傑在位則天下之士皆悦而願立於其朝矣市廛而不征則天下之商皆悦而願藏於其市矣㕓市宅也古無征衰世征之王制云市㕓而無税周禮曰國宅無征法而不㕓者當以什一之法征其地耳不當征其廛宅也闗譏而不征則天下之旅皆悦而願出於其路矣言闗禁異服異言耳不征税也周禮曰闗市之法無闗門之征猶譏王制不征謂文王以前文王亦不征也耕者助而不税則天下之農皆悦而願耕於其野矣助者耕田什一助佐公家治公田不横税賦若履畆之類㕓無夫里之布則天下之人皆悦而願為之氓矣里居也布錢也夫一夫也周禮曰宅不毛者出里布田不耕者有屋粟凡人無職事者出夫家之征衰代遂兩征之故孟子言能寛夫征去里布則人皆樂為之氓白圭問孟子曰吾欲二十而取一何如孟子曰子之道貊道也萬室之國一人陶則可乎曰不可噐不足用也夫貊五榖不生惟黍生之無城郭宫室宗廟祭祀之禮無諸侯幣帛饔飱無百官有司故二十取一而足也今居中國去人倫無君子如之何其可也孫武曰夫帝王處四海之内居五千里之中焉能盡專其利是以分建諸侯以其利而利之使食其土之毛實役其人民之力故賦税無轉徙之勞徭役無怨曠之歎新序曰楚人有獻魚楚王者曰獲魚食之不盡賣之不售棄之可惜故來獻之左右曰鄙哉辭也楚王曰子不知魚人其以此諭寡人也于是遣使恤鰥寡而存獨孤出倉粟發幣帛賑不足罷去後宫不御者出以妻鰥夫楚民欣欣大悦隣國歸之荀悦論曰昔文帝十三年六月詔除人田租且古者什一而税以為天下之中正今漢人田或百一而税可謂鮮矣然豪富强人占田愈多其賦大半官收百一之税而人輸豪家大半之賦官家之惠優于三代豪强之暴酷於亡秦是以惠不下通而威福分於豪人也今不正其本而務除租税適足以資富强也魚豢魏畧曰漢陽嘉三年踈勒國王貢西海青石帯舟至皇甫謐帝王世紀曰西王母慕舜徳來獻白環及玦并貢益地圖西京雜記曰初修上林苑羣臣逺方各貢合枝李異物志曰橘為樹白花而赤實皮既馨香味又交趾有橘官十人秩三百石歲主貢御橘甘美雜望氣經曰黄白氣潤澤入翼四海有侯王來獻者天子賜四海之國入輔諸侯王者有獻車者出輔天子用車為幣賜諸侯王魏文帝與王朗書曰孫權重遣使稱臣奉貢明珠百筐黄金千鎰馴象二頭或牝或牡擾禽鸚鵡其他珍玩盈舟溢航千類萬品太平御覧卷六百二十六
