body:
  text: 太平御覽卷二百七十五宋李昉等撰兵部六良將上良將上論語曰孟之反不伐孔注曰不伐者不自伐其功也孝經左契曰將軍頥虎銜珠大夫正海出魚抱朴子曰良將剛則法天可望而不可干柔則象淵可觀而不可入去如收電可見而不可得留如山岳可瞻而不可量唐子西曰良將如泉如山不知其歡戚也史記曰呉起者衛人也好用兵事魯君齊人攻魯魯欲將起起娶齊女爲妻而疑之起遂殺妻明不爲齊也魯卒以爲將大破齊後之魏又曰陳勝之反秦使王離擊趙王及張耳鉅鹿城或曰王離秦之名將也又曰魏文侯問呉起何如人李克曰其用兵司馬穰苴勿能過也於是魏文侯以爲將擊秦㧞五城漢書杜業曰竊見朱博忠信勇猛材畧不世出誠國家雄俊之寶臣也宜徴博左右以鎭天下此人在朝則陛下可高卧矣又谷永傳曰平阿侯譚位特進領城門兵永聞與譚書曰君侯躬周召之德執管晏之操敬賢下士樂善不倦宜在上將久矣屬聞以特進領城門兵屬之欲反愚竊不爲君侯喜宜深辭職自陳淺薄不足以固城門守收大伯之讓保謙謙之路闔門高枕爲智者譚得書大感遂辭讓不受領城門職又曰霍去病爲驃騎將軍上嘗欲教之孫呉兵法對曰顧方畧何如耳不至學古兵法上爲治第令視之對曰匈奴未滅無以家爲也又曰李廣爲右北平匈奴號曰漢飛將軍廣厯七郡太守前後三十餘年得賞賜輙分其麾下飲食與士卒共之家無餘財不言生産事又曰李廣其先曰李信秦時爲將逐得燕太子丹者也廣以良家子從軍擊胡文帝曰惜廣不逢時令當高祖世萬户侯豈足道哉又曰劇孟洛陽人也以任俠顯呉楚反時條侯爲大尉乘傳東將至河南得劇孟喜曰呉楚舉大事而不求劇孟吾知其無能爲也天下騷動大將得之若一敵國又曰沛公入咸陽諸將皆爭赴金帛財物之府分之蕭何獨先收秦丞相御史律令圖書藏之沛公具知天下阨塞戸口多少强弱處民所疾苦者以得圖書故也後漢書景丹傳曰景將軍北州大將是其人也又馬武傳論曰中興二十八將前世以爲上應二十八宿未之詳也然咸能感㑹風雲奮其智勇稱爲佐命亦各智能之士也又漢賈復傳曰世祖大驚曰我所以不令賈復别將者爲其輕敵也果然失吾名將又曰馮異大破赤眉於崤璽書曰始雖垂翅回谿終能奮翼澠池可謂失之東隅收之桑榆者也又曰耿秉能說司馬兵法尤能將帥之畧又曰馮異字公孫爲人謙退不伐行與諸將相逢輙引車避道東觀漢記續漢書云異勅吏士非交戰受敵常行諸營之後相逢引車避之由是無爭道交鬪者也進止皆有表識言其進退有常處軍中號爲整齊每所止舍諸將並坐論功異常獨屏樹下軍中號曰大樹將軍光武破邯鄲乃更部分諸將各有配𨽻𨽻屬也袁山松書曰先時諸將同營吏卒多犯法軍士皆言願屬大樹將軍光武以此多之又鄧禹傳云赤眉遂入長安是時三輔連覆敗赤眉所過殘滅百姓不知所歸聞禹乘勝尅而師行有紀綱紀也言有條貫而不殘暴皆望風相㩦負以迎軍降者日以千數衆號百萬禹所止輙停車住節住或作拄以勞來之父老童稚垂髮戴白垂髪童㓜戴白父老滿其車下莫不感悅由是名震關西帝嘉之又曰竇融以兄弟並受爵位久專方面懼不自安數上書求代詔報曰吾與將軍如左右手耳韓信亡蕭何自追之人曰丞相何亡高祖聞之如失左右手見前書數執謙退何不曉人意勉循士人莫善離部曲又曰諸將每論功自伐賈復未嘗有言帝輙曰賈君之功我自知之又曰陳蕃楊秉處稱賢宰皇甫張段出號名將又曰馮緄字鴻卿巴郡宕渠人也長沙蠻宼益揚荆南皆没於是拜緄爲車騎將軍由長沙進擊武陵蠻溪荆州平定詔賜錢一億固讓不受振旅還師推功於從事中郎東觀漢記曰上自征隗囂至漆諸將多以王師之重不宜遠入險阻計未决㑹召援援因說隗囂將帥土崩之勢兵進必破之狀於上前聚米爲山指畫形勢又曰呉漢當出師朝受詔夕即引道初無辦嚴之日故能常任職以功名終又曰漢方整厲器械激揚士吏上時令人視呉公何為還言曰方修攻具上曰呉公隱若一敵國矣魏志曰諸葛亮軍出斜谷至武功司馬宣王禦之亮挑戰宣王不出亮遺之婦人巾幗宣王怒表請决戰天子不許遣辛毗仗節立於軍門以制之㑹亮病卒歸宣王不敢追之而退百姓爲之語曰死諸葛走生仲逹宣王曰吾能料生不能料死故也宣王案行亮營壘處曰天下竒才也又曰李典字曼成好學問貴儒不與諸將爭功敬賢士大夫若不及又任城王傳曰太祖問諸子所好使各言其志至彰曰好爲將又曰劉曄謂太祖曰諸葛亮明於治國而爲相關張諸人勇冠三軍而爲將蜀人既定據險守要則不可犯矣又曰賈逵字梁道河東人自爲兒童戱弄常設部伍祖父習異之曰汝大必爲將遂口授兵法數萬言蜀志曰鄧芝爲大將二十餘年賞罰明善恤卒伍身之衣食資仰於官然終不治私産妻子不免饑寒死之日家無餘財又曰關雲長亡命奔涿先主於郷里合徒衆而雲長與張飛爲之禦侮晉書曰應詹遷南平太守鎭南將軍山簡復假詹督五郡軍事蜀賊杜疇作亂金寳溢目詹一無所取惟收圖書莫不歎之又曰周訪威風既著遠近悅服智勇過人爲中興名將性謙虛未嘗論功伐或問訪曰人有小善鮮不自稱卿功勲如此初無一言何也訪曰朝廷威靈將士用命訪何功之有又曰蘇峻平論功顧衆推功於蔡謨謨以衆唱謀非己之力俱表相讓論者美之又曰苻堅衆號百萬次於淝水謝𤣥入問計謝安無懼色方與𤣥圍棋遊渉至夜乃還指授將帥各當其任𤣥等破堅驛書至謝安對客圍碁看書便擲放床上了無喜色客問徐荅小兒輩破賊既罷還内過戸限心喜甚不覺屐齒之折其矯情鎭物如此也又曰帝謂紀瞻曰卿雖疾病爲朕卧䕶六軍所益多矣又羊祜傳曰呉人宼弋陽江夏畧戸口詔遣侍臣移書詰祜不追討之意並欲移州復舊之宜祜曰江夏去襄陽八百里比知賊去亦已經日矣歩軍方徃安能救之哉勞師以免責恐非事宜也昔魏武帝署都督皆與州相近以兵勢好合惡離疆埸之間一彼一此偵守而已古之善教也若輙徙州賊出無常亦未知所宜據者使者不能詰又曰羊祜入朝武帝遣中書令張華問其籌䇿祜曰今主上有禪代之美而功德未著呉人虐政已甚可不戰而尅混一六合以興文教則主齊堯舜臣同稷契爲百代之盛若孫皓不幸而殘呉人更立令主雖百萬之衆長江未可越也將爲患乎華深讃成其計祜謂華曰成吾志者子也帝欲使祜卧䕶諸將祜曰取呉不必須臣自行但既平之後勞聖慮耳功名之際臣所不敢居事當有所付受願審擇其人疾漸篤乃舉杜預自代尋卒又曰毛穆之鎭廣陵遷右將軍宣城内史假節鎮姑熟穆之以爲戍在近畿無復軍警不宜加節上疏辭讓許之又曰朱伺字仲文安陸人少爲呉牙門將陶丹給使呉平徙江夏伺有武勇訥言不知書爲郡將督見郷里士大夫揖稱名而已及爲將遂以謙恭稱又曰鄧遐字應遠勇力絶人氣蓋當時人方擬之樊噲桓溫以爲叅軍數從溫征伐厯冠軍將軍數郡太守號爲名將襄陽城北池有蛟常爲人害遐㧞劔入水蛟繞其足遐揮劔截蛟數段而出又曰劉牢之靣紫赤色赤目驚人而沈毅多計畫干寳晉紀曰文淑字次騫小名鴦有武力籌䇿楊休胡烈爲虜所害武帝西憂遣淑出征所向摧靡秦凉遂平名震天下爲東夷校尉姿器膂力萬人之雄慕容盛載紀曰尚書左僕射領中軍熈從征句驪契丹皆勇冠諸將又曰皇甫眞字楚季弱冠以高才随慕容評攻鄴都珍貨充溢眞一無所取唯存恤人物收圖籍而已二石僞事曰郭權降石虎虎問權曰卿若得吾者當殺不權曰若登時得至尊必殺不疑也虎曰卿健將也因與共言事崔鴻前燕録曰張蛙夲姓弓上黨人也膂力過人能曵牛走堅甚寵之常侍左右終爲名將所在有殊功世稱鄧羗張蛙皆萬人敵也宋書曰姚屯軍長城下王鎭惡撫慰士卒乃以身先士衆騰躍爭先衆一時奔潰妻生歸高祖髙祖至軍鎭惡於㶚上奉迎高祖勞之曰成吾覇業者眞卿也鎭惡再拜謝曰此明公之威諸將之力鎭惡何功之有焉高祖笑曰卿欲學馮異耶又曰桓𤣥云劉毅勇冠三軍當今實為無敵又曰劉順幢主樊僧愛勇冠三軍軍中皆懼齊書曰曹景宗建武四年随太尉陳顯逹北圍馬圈以竒兵二千破魏援中山王英四萬人及克馬圈顯逹論功以景宗爲後景宗退無怨言又曰垣崇祖初見高帝便自比韓白唯上獨許之及破魏軍啟至上謂朝臣曰崇祖恒自擬韓白今其人也進爲都督梁書曰馮道根每征伐終不言功其部曲或怨非之道根喻曰明主自監功之多少吾將何事武帝嘗指道根示尚書令沈約美其口不論勲約曰此陛下之大樹將軍也梁後畧曰陸納分其衆輕舸掩襲巴陵晨至城下驃騎始命諸將㑹議乃出自壘門坐胡牀以望之賊乘水來攻矢下如雨人情騷擾莫不震懼而驃騎方食甘蔗曽無遽色又曰齊遣其將竇泰趨潼關太祖將襲秦衆咸難之太祖問䇿於宇文深深對曰竇氏歡之驍將也歡毎仗之以爲禦侮北齊書曰劉豐夲出河間樂城豐有雄姿壯氣果毅絶人有口辯好說兵事又曰辛術字懐哲隴西狄道人也清儉寡欲及平楚定淮南凡諸貨物一毫不犯唯收典籍多是晉宋齊梁時佳夲鳩集萬有餘卷太平御覽卷二百七十五
