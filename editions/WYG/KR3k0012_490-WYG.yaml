body:
  text: 太平御覽卷四百九十宋李昉等撰人事部一百三十一僭驕慢怠惰迷亡癡僭禮記雜記曰孔子曰管仲鏤簋而朱紘旅樹而反玷山節而藻梲賢大夫也而難為上也又郊特牲曰庭燎之有百也由齊桓公始也僭天子也大夫之奏肆夏也由趙文子始也諸侯之宫懸擊玉磬朱干設錫冕而舞大武乗大輅諸侯之僭禮也言此皆天子之禮也臺門振樹反玷繡黼丹朱中衣大夫之僭禮也言此皆諸侯之禮也論語曰孔子謂季氏八佾舞於庭是可忍也孰不可忍也漢書曰燕刺王旦招來郡國姦人賦斂銅鐡甲兵數閱其車騎材官卒建旌旗鼓車旄頭先驅郎中侍從著貂羽黄金附蟬皆號侍中又曰韓延夀在東郡試騎士治飾兵車畫龍虎朱爵延夀衣黄紈方領晉灼曰以黄色紈作直領駕四𫝊總建幢棨植羽葆持幢傍轂歌者先居射堂望見延夀車噭咷楚歌又取官銅物候月蝕鑄作刀劒鈎錍倣尚方治飾車甲三百萬已上於是望之劾奏延夀上僭不道棄市又曰初成都侯商嘗病欲避暑從上借明光宫又穿長安城引内渭水注第中大陂以行船立羽蓋上聞之大怒廼責問司𨽻校尉京兆尹知成都侯商擅穿帝城曲陽侯根驕奢僭上赤墀青瑣司𨽻京兆尹皆為以縦不舉奏正法二人頓首省户下梁冀别𫝊曰梁冀奢僭四方調發歲時貢獻皆先輸上等於冀乗輿乃其次焉又廣開園囿採土築山千里九坺以象二崤深林􅃉澗有若自然竒禽怪獸飛走其間妻共冀乗輦張羽蓋飾以金銀逰第内董卓别𫝊曰卓遂僭擬車服乗金華青蓋車􅀞兩輪時號竿摩車言其服飾近天子也驕慢左傳成下曰晉范文子反自鄢陵使其祝宗祈死祈請也曰君驕侈而克敵是天益其疾也難將作矣愛我者唯祝我使速死無及於難范氏之福也漢書曰淮南王長失母常附吕后孝帝初即位自以為最親驕蹇數不奉法上寛赦之三年入朝甚横上入苑獵與同輦常謂上為大兄文帝賜玉帛以賜吏卒勞苦者長不欲受慢曰無勞苦者又曰上官安遷車騎將軍日以驕淫受賜殿中出對賓客言與我婿飲大樂見其服飾使人歸自燒物子病死仰而罵天王隱晉書曰楊駿漸驕傲石奮語之曰卿恃女更豪邪與天家婚未有不滅門者駿曰卿女復不在天家邪奮曰我女與卿女作婢耳何能增損後魏書曰宜都王穆夀與崔浩等輔政人皆敬浩夀獨凌之又自恃任位以為人莫己及謂其子師曰但令吾兒及我亦足勝人不須苦之遇諸父兄弟有如僕𨽻夫妻並坐共食而令諸父餕餘其自矜無禮如此為時人所鄙笑蕭子顯齊書曰司徒禇淵送湘州刺史王僧䖍閣道壊墜水僕射王常牛驚跣下車謝超宗拊掌笑戯曰落水三公墜車僕射賈誼新書曰虢君驕恣伐之不守出走逃於山遂餓死為禽獸食語林曰晉王武子與武帝圍碁孫皓看王問孫歸命何以好剝人面皮皓曰見無禮於君者即剝其面皮乃舉碁局武子伸脚在局下怠惰禮記玉藻曰垂緌五寸惰逰之士也左傳僖上曰天王使召武公内史過賜晉侯命受玉惰過歸告王曰晉侯其無後乎王賜之命而惰於受瑞先自棄也已其何繼之有又成下曰晉侯使郤錡來乞師將事不敬孟獻子曰郤氏其亡乎禮身之幹也敬身之基也郤子無基且先君之嗣卿也受命以來師將社稷是衛而惰棄君命也不亡何為蜀志曰楊戯性簡惰省畧未嘗以言加人遇情撫物書符指事希有盈紙孟子曰世俗所謂不孝者五惰其四支不顧父母之養一不孝也蔡邕勸學曰瞻彼頑薄執性不固心逰目蕩意與手互嵇康與山濤書曰吾每讀尚子平臺孝威傳慨然慕之想其為人加少孤露母兄見驕性復疎懶筋駑肉緩頭面常一月十五日不洗非大悶痒不能梳也每當小便而忍不起令胞中畧轉乃起耳又縦逸來乆情志傲散簡與禮相背懶與慢相成而為儕類見寛不攻其過又讀老莊重增其放故使榮進之心日頽任實之情轉篤又人倫有禮朝廷有法自惟有不堪者七也迷忘說文迷惑也忘不識也易坤卦曰先迷後得君子攸行又復卦曰迷復之凶反君道也國語曰仲尼謂桓子曰丘聞之木石之怪夔魍魎魍魎好學人聲迷惑人也史記曰漢敗楚於垓下項王乃上馬麾下壯士騎從八百餘人夜潰圍南出馳平明漢軍乃覺之令將灌嬰以五千騎追項王渡淮騎能屬者百餘人耳項王至隂陵迷失道問一田父田父紿曰左乃䧟大澤中以故漢追及之漢書曰元帝為太子體不安忽忽善忘不樂詔使王褒等皆之太子宫娛侍太子朝夕誦讀竒文及所自造作疾復廼歸太子喜褒所為甘泉及洞簫頌令後宫貴人左右皆誦之又曰李廣隨大將軍擊匈奴語其麾下曰廣結髪與匈奴大小七十餘戰今幸従大將軍又迷失道豈非天哉遂自刎魏志曰夏侯覇聞曹爽被誅而征西將軍夏侯𤣥又徵以為禍必將轉相及心既内恐又覇先與雍州刺史郭淮不和而淮代𤣥為征西覇尤不安故遂奔蜀趨隂平而失道入窮谷中糧盡殺馬步行足破卧巖石下使人求道未知何之蜀聞之乃使人迎覇晉中興徵祥說曰海西公即位忘設豹尾夫豹尾儀服之主大人所以豹變也而海西公非可宜忘之天若曰海西凡庸不可以主社稷故忘其豹尾示不能終也山海經曰招揺之山有木焉其狀如榖而墨理榖楮也皮中作紙也其華四照名曰迷榖佩之不迷又曰厯小之山其山多櫑是木也方莖圓葉黄華而毛其實如棟亦木名子如指頭白而粘可濯衣浣練也服之不忘捜神記曰蜀中西南髙山之上有物與猴相類長七尺能作人行善走名猳一名馬化或曰玃伺行道人有後者輙盗取以去人不得知此物能别男女氣臭故取女而男不知也取去而共為家室其無子者終身不得還十年之後形皆類之意亦迷惑不復思歸産子者輙抱送還其家産子皆如人有不養者母輙死也廣州記曰廬山有山桃大如檳榔形亦似之色黑而味甘美人時登山採拾止得於上飽噉不得持下輙迷不得返述異記曰南康南野有東望山民三人上山頂有湖清深又有果林周四里許衆果畢植間無雜木行列整齊如人功也甘子正熟三人共食致飽訖懐三枚欲以示外人廻旋迷不能得路即聞空中語云速放雙甘乃聽汝去投所懐甘於地轉盻即見歸途新序曰晉文公出田逐獸入大澤迷不知所出有漁者文公謂曰我若君也出我且厚賜於是遂出漁者曰臣願有獻文公曰子之所欲教寡人者何等也漁者曰鴻鵠保河海之中厭而従之小澤必有丸矰之憂龜魚保於淵厭而出之淺渚必有羅網之憂今君逐獸至此何行之太逺也文公曰善哉鬻子曰文王問曰人有大忘乎對曰大忘知其身之惡而不改也以賊其身乃喪其軀有行如此之謂大忘列子曰禹治水土也迷而失墜謬之一國當國之中有山山名壺嶺有口名滋穴有水涌出名曰神瀵山頂之泉曰瀵臭過蘭椒味過醪醴其人性婉而従物不競不争柔心而弱骨不驕不妄長幼儕居不君不民男女雜逰不媒不聘緣水而居不耕不稼土氣温適不織不衣百年而死不夭不病又曰宋陽里華子中年病忘朝取而夕忘夕與而朝忘在途則忘行在室則忘坐又曰秦人逢有氏子少而慧及壯而有迷罔之疾聞歌以為哭視白以為黑嚮香以為臭嘗甘以為苦行非以為是楊氏告其父曰魯之君子多術藝汝奚不訪焉其父之魯遇老聃因告其子之證老聃曰汝庸知汝子之迷乎今天下之人皆惑莫有覺者且一日之迷不足傾一家一家之迷不足傾一鄉一鄉之迷不足傾一國一國之迷不足傾天下天下盡迷孰正之哉嚮使天下之人其心盡如汝子汝則反迷矣哀樂聲色臭味是非孰能正之且吾之此言未必非迷况魯之君子迷之尤者莊子曰顔淵曰囘益矣仲尼曰何謂也囘忘仁義矣曰可矣猶未也他日復見曰囘坐忘矣仲尼踧然曰何謂坐忘曰隳支體黜聰明離形去智同於大道此謂坐忘又曰黄帝將見大隗于具茨之山具茨山在滎陽縣今名大隗山方明為御昌寓驂乗張若謵朋前馬前馬言二人先道馬昆閽滑稽後車言二人従後車也至於襄城之野七聖皆迷無所問途適遇牧馬小童而問塗焉尸子曰魯哀公問孔子曰魯有大忘徙而忘其妻有諸孔子曰此忘之小者也昔商紂有臣曰王子須務為謟使其君樂須臾之樂而忘終身之憂家語同韓子曰管仲隰朋従桓公伐孤竹春徃而冬返迷失忘道管仲曰老馬之智可用也乃放老馬遂得道楚辭曰入溆浦予邅廻兮迷不知其所如劉諡之迷賦曰寵郎居山中稀行出朝市蹔來到豫章因便造人士東西二城門赫奕正相似向風徑東征直去不轉耳癡周書曰太公望忽然曰不癡不狂其名不彰不狂不癡大事不成左傳成下曰晉周子有兄而無慧不能辨菽麥杜預注曰蓋所謂白癡也魏志曰許楮字仲康長八尺餘大十圍勇力絶人楮後事太祖以楮力如虎而癡號曰虎癡又曰明悼毛皇后父嘉本典虞車工卒暴富貴帝令朝臣㑹其家飲宴其容止舉動甚蚩騃語輙自謂侯身時人以為笑後魏書曰太祖謂尚書崔𤣥伯曰蠕蠕而蚕切之民昔來號為頑嚚每來抄掠駕㹀牛奔遁驅犍牛隨之㹀牛不能前異部人教其以犍牛易之蠕蠕曰其母尚不能行而况其子終於不易遂為敵所虜北史曰齊皇甫亮所居宅洿下標牓賣之將買者或問其故亮每答云為宅中水淹不泄雨即流入牀下由是宅終不售其淳實如此隋書曰楊𤣥感司徒素之子也體貌雄偉美鬚髯少時晩成人多謂之癡其父每謂所親曰此兒不癡也及長好讀書便騎射以父軍功位至柱國唐書曰竇威家世勲貴諸昆弟並尚武藝而威躭翫文史介然自守諸兄哂之謂為書癡又曰雜端御史􅆟為雄劇食坐之南設一横榻謂之南牀殿中監察不得坐注云亦謂之癡牀言處其上者皆驕傲自得使人如癡故謂之癡牀也又曰李益與李賀齊名然少有癡病而多猜忌防閑妻妾過為苛酷而有散灰扃户之譚時謂妬癡風俗通曰夜糴俗說市買者當清旦而行日中交易所有夕時便罷今乃夜糴明其癡騃不足也郭子曰王長史求東陽王蒙字仲祖撫軍不肯用晉太宗簡文帝先為撫軍大將軍王後疾篤臨終撫軍哀歎曰吾將負仲祖於此乃命用之人言㑹稽王癡㑹稽王簡文先封也又曰王汝南少無婚處自求郝普女郝氏襄城人父匡字仲時一名普洛陽太守司空以為癡司􅆰昶也㑹無徃婚對其音樂便許之世說曰任育字長少甚有令名自過江便失志下飲問人云此為茶為茗覺有怪色乃自申明云問飲為熱為冷嘗行從棺邸下度流涕而悲王丞相聞之曰此是有情癡語林曰王藍田少有癡稱丞相以地辟之既見無他問問來時東米幾價藍田不答直張目視王公曰王掾不癡何以云癡應璩新詩曰漢末桓帝時郎有馬子侯自謂識音律請客鳴笙竽為作陌上桑反言鳳將雛左右偽稱善亦復自揺頭馬子侯為人頗癡自謂曉音律黄門樂人更徃嗤誚子侯不知名陌上桑反言鳳將雛輙揺頭欣喜多賜左右錢帛無復慙也虞翻書曰此中小兒年四歲矣似欲聰哲雖蝦不生鯉子此子似人欲為求婦不知所向君為訪之勿怪老癡譽此兒也太平御覽卷四百九十
