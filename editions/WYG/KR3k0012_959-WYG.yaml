body:
  text: 太平御覽卷九百五十九宋李昉等撰木部八楛靈夀樗荆棘君子長生萬年黄蘖支子無患栟櫚楛尚書禹貢曰荆州厥貢惟箘簵楛注曰楛中矢幹皆出雲夢之澤也毛詩旱麓曰瞻彼旱麓山足也榛楛濟濟陸機毛詩疏義曰楛形似荆而赤莖似蓍上黨人篾以為斗莒箱器又屈以為釵故上黨調問婦人欲買赭不曰竈中自有黄土買釵不曰木中自有楛又文賦曰彼榛楛之勿剪亦䝉榮於集翠靈夀漢書孔光傳曰賜太師靈夀杖孟康曰扶老杖服䖍曰靈夀木名也似竹有節長不過八九尺山海經曰廣都之野靈夀實華樗爾雅曰栲山樗栲山樗也小白生山中亦類漆樹毛詩我行其野曰我行其野蔽芾其樗惡木也陸機毛詩疏義曰蔽芾其樗樗樹及皮皆似漆青色其葉臭莊子逍遥逰曰吾有大樹人謂之樗其大本擁腫不中繩墨其小枝拳曲不中規矩立之途匠者不顧今子之言大而無用衆所同去莊子曰何不樹於無何有之郷廣莫之野逍遥乎寢卧其下風俗通曰嘉平中有兩樗其一長丈餘作人狀頭目宛然京洛記曰洛陽城北山謂之邙山其上無大樹大業都城之北嶺上有古樗樹不知其來早晚婆娑週圍四五畝其樹在伊闕正南時楊越公等將建都城之日據此樹以為南北定准嫌樗木名惡號曰婆娑羅樹荆春秋運斗樞曰玉衡星散為荆廣雅曰楚荆牡荆蔓荆也毛詩漢廣曰翹翹錯薪言刈其楚楚荆也又曰綢繆束楚三星在户廣志曰赤莖大實者名曰牡荆又有山荆左傳昭公曰伍舉入鄭聲子將入晋遇之於鄭郊班荆相與食而言復故班布也布荆坐地共議之史記曰廉頗肉袒負荆因賔客至藺相如門謝罪卒與為刎頸之交漢書曰淮南王安謀反伍被諫曰昔子胥諫呉王云臣今見麋鹿逰姑蘇之臺臣今亦將見宫中生荆棘也東觀漢記曰尹勤治韓詩身收豕事親至孝無有交逰門生荆棘後漢書曰鮑永為魯郡太守時董憲别師彭豐虞休皮常等各千餘人稱將軍不肯下頃之孔子闕里無故荆棘自除從講堂至于里門永異之謂府丞及魯令曰方今危急而闕里自開斯豈夫子欲令太守行禮助吾誅無道耶乃㑹人衆修鄉射之禮請豐等共㑹觀視欲因此擒之豐等亦欲圖永乃持牛酒勞饗而潛挾兵器永覺之手格殺豐等擒其黨與帝嘉其畧封為闗内侯晉書曰索靖拜酒泉太守惠帝即位賜爵闗内侯有識逺量知天下將亂指洛陽宫門銅駝嘆曰㑹見汝在荆棘中耳老子曰師之所處荆棘生焉周景式孝子傳曰古有兄弟忽欲分異出門見三荆同株接葉連隂歎曰木猶欣然聚况我而殊哉遂還為雍和一曰田真兄弟神仙傳曰呉有徐隨居丹徒左慈過隨門下有宿客車六七乘欺慈曰徐公不在慈去客皆見牛在楊樹杪車轂中皆生荆木長一二丈客俱入報隨隨曰此左公遣追之客逐慈叩首謝客還見牛在故地無荆木也顧微廣州記曰撫納縣出金荆禮弓矢圖曰楚焞土敦反以荆為之燃以灼正以荆者凡木心圓荆心方也地理志曰荆本楚木名因名地焉廣州記曰白荆堪為履紫荆堪為牀淮南萬畢術曰南山牡荆指病自愈節不相當有月暈時尅之杜實大業拾遺録曰五年南方置北景林邑海隂三郡北景在林邑南大海中與海隂接境其地東西一千餘里南北三百餘里海水四絶北去大岸三百餘里或云馬援銅柱尚存地暑熱多大林木高者數百㝷有金荆生於高山峻阜大者十圍盤屈瘤蹙文如美錦色艶於真金中夏時有於海際得之工人取用甚精妙貴於沉檀棘毛詩湛露曰湛湛露斯在彼把棘又黄鳥曰交交黄鳥止于棘又墓門曰暮門有棘斧以斯之周書曰太姒夢見商之庭生棘周禮秋官曰朝士掌建邦外朝之灋左九棘孤卿大夫位焉右九棘公侯伯子男位焉鄭𤣥曰樹棘以為位者取其赤心而外能刺禦也左傳昭公曰豎牛奔齊孟仲之子殺之投其首於寜風之棘上春秋元命苞曰樹棘聽訟其下者棘赤心有刺焉制人者原心不失其赤實也後漢書曰馮異朝京師引見帝謂公卿曰是我起兵時主簿也為吾披荆棘定闗中又曰仇覽字季智一名香陳留考城人也時考城令河内王渙政尚嚴猛聞覽以徳化人署為主簿後渙謝遣曰枳棘非鸞鳳所棲百里豈大賢之路今日太學曵長裾飛名譽皆主簿後可以一月俸為資勉卒學行晉書曰劉琨至并州荆棘成林豺狼滿道琨剪除荆棘收葬枯骸造府朝建市獄冦盜時來掩襲嘗以城門為戰場百姓負楯以耕属鞬而耨琨撫循勞來甚得物情又曰祖逖在河南公私豐贍士馬日滋方當摧鋒越河掃清冀朔㑹朝廷將遣戴若思為都督逖以若思是呉人雖有材望無𢎞致逺識且已剪荆棘收河南地而若思雍容一旦來統之意甚不樂又曰石季龍大饗羣臣於大武殿佛圖澄曰殿乎殿乎棘子成林將壊人衣龍殿右果有棘生冉閔小字棘奴時龍養為己子又曰崔洪清厲骨鯁為尚書左丞時人為之語曰叢生棘刺來自博陵在南為鷂在北為鷹又曰顧愷之畫鄰女像以棘針釘之又曰姚萇敗符登師於渥源盡俘其衆乃握符堅屍鞭撻薦之以棘坎土而埋之宋書曰袁淑上太祖書曰所謂棲鳥於烈火之上養魚於叢棘之中北齊書曰世祖為後主擇師傅趙彦深進馬敬徳入為侍講其妻夢猛獸將來向之敬徳走超叢棘妻伏地不敢動敬徳占之曰吾當得大官超棘過九卿也爾伏地夫人也隋書曰琉球國居海島之中土人所居曰波羅檀洞塹柵三重環以流水樹棘為藩韓子曰宋人為燕王以棘刺之端投毋猴者使王必三月齋而後觀之右御治工謂王曰臣聞人主無十日不燕今王不能久齋故以三月為期也荆棘至小安可削乎王必察之王因而問之果無乃殺之治工又謂王曰士有虛名多棘刺之謂也吕氏春秋曰棗棘之有也裘狐之有也食棘之棗衣狐之皮先王固用非其有而已有之湯武一日而盡有夏商之地秦子曰踰枳棘之籬則有維柱之思登椒桂之圃則有榮華之芳陳留耆舊傳曰魏尚被繫詔獄有雀集獄棘上占曰夫棘樹者心赤外有刺象我言有刺而赤心之至誠李嘗藥録曰棘刺實是􅀥刺世人用門冬苖代之非其真也廣五行記曰隋文帝開皇元年代州人姓王仕為驃騎將軍性好畋獵所殺無數有五男無女後有一女端正若畫見者皆竒之父母特加鍾愛鄉里争為作好衣而與之女年七嵗一旦失之初疑鄰里戲藏之㝷訪終不之見諸兄逺覔去家三十餘里於荆棘中見之欲就抱取驚走馬追不及兄弟以十餘騎圍之而口中唯作寃聲抱歸家不能言而身體盡刺所傷母為挑之得刺盈掬不食而死唐新語曰吕太一為户部員外郎户部與吏部鄰司吏部移牒令墻宇悉立棘以防令史交通太一牒報曰眷彼吏部銓綜之司當湏簡要清通何必堅籬挿棘省中賞其俊技楚辭曰甘棠枯於豐草兮藜棘樹於中庭君子晉宫閣名曰華林園君子樹三株廣志曰君子樹似桱松曹爽樹之於庭長生洛陽記曰明光殿前有長生木樹二株鄴中記曰金華殿後石虎皇后洛室種雙長生樹世謂之西王母長生樹萬年晉宫閣名曰華林園有萬年樹十四株謝𤣥暉詩曰風動萬年枝黄蘖説文曰蘖黄木也永嘉郡記曰青田出枯楊所經山路左側木則黄蘖為林草則黄連覆地土人往伐黄蘖者皆有酒食禱祀若有違失山神意二藥輙化為異物不可復得淮南萬畢術曰蘖令面説取蘖葉三寸土𤓰三枚大棗七枚和膏塗面不過四五日悦矣先以湯洗面乃傅藥抱朴子曰黄蘖芝草者千嵗黄蘖根下有如三斛器去本株三丈細根相連大如縷和服之盡一丈則地仙支子漢書貨殖傳曰梔茜千石亦比千乘之家地鏡圖曰望氣見人家黄氣者支子樹也晉令曰諸官有秩支子守䕶者置吏一人晉宫閣名曰華林園支子五株逰名山志曰樓石山多支子也本草經曰支子一名木丹葉兩頭尖如樗蒲剥其子如蠒而黄赤葛洪治霍亂轉筋方曰燒支子二枚末服之立愈無患纂文曰無患木名也一名曰楺女收反婁實可去垢崔豹古今注曰程雅問櫨木名曰無患何也答曰昔有神巫曰瑶眊音􅀈能以符劾百鬼得鬼則以此木為棒棒殺之世人相傳此木為衆鬼所畏懼取此木為器以壓却邪魅故號曰無患卞敬宗無患枕讃曰爰兹素朴名為吉始匠人斯製以獻君子栟櫚廣雅曰栟音并櫚㯶也呉志曰孫權討黄祖祖横兩䝉衝保守沔口以栟櫚大紲繫石為矴齊書曰高帝討晉安王時朝廷器用皆充南討帝軍容寡闕乃編㯶皮為馬具裝折竹為寄生夜舉火進軍賊望見恐懼未戰而走梁書曰張孝秀性通率不好浮華常冠糓皮巾躡蒲履手執栟櫚皮麈尾服寒食散盛冬卧於石上唐書曰訶陵國在南方海中洲上竪木為城作大屋重閣以㯶櫚皮覆之王坐其中山海經曰石脆之山其木多椶椶樹無枝高二丈許葉大而圓枝生杪頭尖實枝相披每皮一匝為一節可以為索廣志曰椶一名栟櫚葉似車輪乃在樹顛下有皮纒之附地起二旬一採轉復上生説文曰椶一名蒲葵呉録地理志曰武陵臨沅縣多栟櫚木生山中晉令曰其夷民守䕶椶皮者一身不輸太平御覽卷九百五十九
