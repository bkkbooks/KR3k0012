body:
  text: 太平御覽卷二百五十二宋李昉等撰職官部五十尹少尹留守尹春秋𫝊曰周公相王室以尹天下尹正也漢書曰内史周官秦因之掌治京師景帝二年分置左右内史武帝太初元年更名京兆尹張晏曰地髙曰京左𫝊曰莫之與京十億曰兆尹者正也秩二千石銀印青綬進賢兩梁冠綘朝服佩水蒼玉又曰趙廣漢字子都涿郡人也守京兆廣漢為人强力天性精於吏職見吏民或夜不寢至旦又善為鈎距以得事情蘇林曰鈎得其情更不得去鈎距者設如欲知馬價則先問狗次問羊又問牛然後及馬參伍其價以類相凖則知馬之貴賤不失實矣吏受銖兩之奸皆知之長安少年數人會窮里空舍謀共刼人坐語未訖廣漢使捕治具服亷明威制豪强百姓追思至今歌之又曰元始五年有一男子乘黄犢車建黄旐衣黄䄡䄖逕來詣北闕自謂衛太子京兆尹雋不疑後到叱從吏使収縳之曰昔蒯瞶違命出奔輒距而不納春秋是之衛太子得罪先帝亡不即死今來自詣此罪人也遂送詔獄由是名聲重於朝廷在位者皆自以不及也廷尉驗治何人竟得奸詐本夏陽人姓成名方遂貌甚似戾太子又曰張敞為京兆尹朝廷每有大議引古今處便宜公卿皆服敞無威儀時罷朝會過走馬章臺街或曰在長安中或在章臺下街使御吏驅自以便靣拊馬又為婦畵眉長安中𫝊張京兆眉憮憮大也孟康曰憮音詡北方人謂為妍有司以奏上問之對曰臣聞閨房之内夫婦之私有過於畵眉者上愛其能然不得大位為京兆尹九年與楊惲厚坐惲大逆誅之又曰張敞入為尹一日捕諸偷得數百人由是市無偷盗也又曰王尊王章王駿並為京兆尹有名京師稱曰前有趙張後有三王後漢書曰袁安為河南尹政號嚴明然未曽以賍罪鞠人常稱曰凡學仕者髙則望宰相下則希牧守錮人於聖世尹不忍為也聞之者感激自厲在職十年京師肅然名重於朝廷又曰張酺入為河南尹竇景之家人擊傷市卒吏捕得之景怒遣緹騎侯海等五百人毆傷市丞說文曰緹帛丹黄色也漢官儀曰執金吾有緹騎酺部吏楊章等窮究正海罪徙朔方景忿怨乃移書辟章等六人為執金吾吏欲思報之章等惶恐入白酺願引賍罪以辭景命酺即上言其狀竇太后詔報自今執金吾辟吏皆勿遣又曰楊彪遷侍中京兆尹光和中黄門令甫使門生於郡界辜𣙜官財物七十餘萬華嶠書曰甫使門生翹辜𣙜觧見靈帝紀彪發其姦言之司隸校尉陽球因此奏誅甫天下莫不愜心又曰延篤字叔堅及邊鳯皆為京兆尹並有能名語曰前有張趙後有邊延張趙即廣漢及張敞也又曰梁冀為河南尹居職暴恣多非法父商所親客洛陽令吕放頗與商言及冀之短商以讓冀冀即遣人於道刺殺放而恐商知之乃推疑放怨仇請以放弟禹為洛陽令安慰放家欲以滅口使捕之盡滅其宗親賔客百餘人㵼又曰王梁為河南尹穿渠引糓水注洛陽城下東寫鞏川及渠成而水不流七年有司劾奏之梁慙懼上書乞骸骨謝承後漢書曰周暢字伯時性仁慈為河南尹永初二年夏旱乆禱無應暢自収葬洛陽城旁客死骸骨凡萬餘人應時㴻雨嵗乃豐稔袁崧後漢書曰延篤字叔堅南陽人也為京兆尹正身率下民不忍欺應邵漢官儀曰河南尹所治周地也洛陽本成周周之衰㣲分為東西周秦兼天下置三川洛河伊也漢更名河南孝武皇帝増守曰太守世祖中興徙都洛陽改號為尹尹正也詩云赫赫師尹魏志曰鄭渾字文公為京兆尹渾以百姓新集為制移居之禁令法使兼複者與單輕者相伍温信者與孤老者為比勤稼穡明禁令以發姦者由是民安於農而盗息又曰𫝊嘏字蘭石為河南尹内掌帝都外統宗畿兼古六鄉六遂之士其民異方雜居多豪門大族商賈胡貊天下四會利之所聚而奸之所生也前尹司馬芝舉其綱而太簡次尹劉靜綜其目而太宻後尹李勝毁常法以収一時之聲嘏立司馬之綱統裁劉氏之綱目以經緯之李氏所毁以漸補之郡有七百吏半非舊也河南俗黨五官掾功曺典選職皆授其本國人無用異邦人者嘏各舉其良而用之分官曹之職以次考核之其治以徳教為本然持法有恒而不可犯見理知情獄訟不任夏楚而得其實不為小惠有所薦逹及益於民事皆隠其端迹若不由已出故當時無赫赫之名使民久而後安者也又曰司馬芝字子華為河南尹教羣下曰盖君設教不能使吏必不犯也吏能犯教而不能使君必不聞也夫設教而犯君之劣也犯教而聞吏之禍也君劣於上吏禍於下此政事所以不理也可不各勉之哉於是下吏莫不自厲又曰劉馥字子靖出為河南尹散騎常侍應璩以書與子靖曰入作納言出臨京任當民之術日引月長王隠晉書曰樂廣字彦輔為河南尹故郡中前多怪後人皆於廊下郵𫝊中治事無敢在㕔事者惟廣處之白日户自閉二子凱模等懾怖廣使掘墻孔得狸乃絶代者乃相承入止又曰庾純字謀甫太始六年詔曰河南大郡四方表則中書令庾純清粹中正才紹治化其以純為河南尹又曰劉隗補丹陽尹雖在外而萬幾秘宻皆預聞之晉書曰羊曼為丹陽尹時朝士過江初拜官相飾供饌曼拜丹陽尹客來早者得佳設晏者則漸罄不復及精隨客早晚而不問貴賤有羊固拜東海太守竟日皆美雖晩至者猶獲盛饌論者以固之豐腆乃不如曼之真率晉起居注曰武帝咸寧三年詔曰河南百郡之首其風教宜為遐邇所模以道齊之侍中奉車都尉王恂忠亮篤誠才兼外内明於治化其以恂為河南尹晉中興書云晉太興元年改丹陽内史為丹陽尹宋書曰劉秀之遷丹陽尹先是秀之從叔穆之為丹陽尹與子弟於㕔事上飲宴秀之亦與焉㕔事柱有一穿穆之謂子弟及秀之汝等試以栗遥擲此柱若能入穿後必得此郡穆之諸子並不能中惟秀之獨入焉唐書曰開元初改雍州長史為京兆尹總理衆務又曰鄭珣瑜出為河南尹珣瑜既入境官吏以逼降誕日珣瑜到即後於是乃送所獻馬賫印於路以例告珣瑜曰未上官不可遽有進獻及既上即過時遂不獻又曰郭英乂時嚴武卒元載薦英乂代之遂兼成都尹充劍南節度使英乂到成都肆行不軌無所忌憚𤣥宗舊宫置為道士觀内有𤣥宗鑄金真容及乘輿侍衛圖畵先是節度使每至皆先拜而後視事英乂以觀地有形勝乃入居之其真容及圖畵悉遭毁壊見者無不憤怒又曰英乂為成都尹頗恣狂蕩聚女人騎驢擊毬制鈿驢鞍及諸服用皆侈靡裝飾日費數萬以為笑樂未嘗問百姓間事人頗怨之又曰許孟容為京兆神筞軍吏李昱假貸長安富人錢八千貫滿三嵗不償孟容遣吏収捕械繫尅日命還之曰不及期當死自興元已後禁軍有功及中貴之尤有渥恩者方得䕶軍故軍士日益横府縣不能制孟容剛正不懼以法繩之一軍盡驚寃訢於上立命中使宣㫖令送本軍孟容繫之不遣中使再至乃執奏曰臣誠知不奉詔當誅然臣職司輦轂合為陛下彈抑豪强錢未盡輸昱不可得上以守正許之自此豪右歛跡威望大震又曰劉栖楚為京兆尹摧抑豪右不顧患難事無大小必設鈎距故時人重之或稱其機變徃往有類於西漢趙廣漢者又曰李傑為河南尹傑既勤於聽理每有訴列雖衢路當食無廢處斷由是官無留事人吏愛之先是河汴之間有梁公堰年久堰破江淮粮運不通傑奏發汴鄭丁夫以濬之省功速就公私深以為利刻石水濵以紀其績又曰栁仲郢為河南尹以寛惠為政言事者以為不類京兆之政仲郢曰輦轂之下彈壓為先郡邑之治惠飬為本何取類耶又曰蘇震為太常卿聖嵗東都耆老表乞行幸上重違其心選勤舊勲賢為之牧守遂以震為河南尹兼御史中丞仍充東都畿甸觀察使英雄記曰董卓廢少帝自公卿已下莫不卑下於卓惟京兆尹盖勲長揖爭禮見者皆為失色李爕别𫝊曰爕字徳公京兆人拜京兆尹吏民愛敬之乃作歌曰我府君道教舉恩如春威如虎愛如母訓如父李郃别𫝊曰鄧隲弟豹為將作大匠河南尹缺豹欲得之上及隲兄弟亦欲用難便召拜下詔令公卿舉隲以㫖遣人諷公卿悉舉豹李郃曰司隸河南尹當整頓京師檢御貴戚今反使親家為之必不可為後法公舉司隸羊浸不舉豹豹竟不得尹恨公卿不舉對士大夫曰李公能不舉我故我不得尹耳莊子曰孫叔敖能以爵禄為己害故三為令尹三去令尹而色不變語林曰蘇峻新平温庾諸公以朝廷初復京尹宜得望實惟孔君平可以處之孔固辭二公逼諭甚苦孔敖然曰先帝大漸卿軰身侍御床口行詔令孔坦爾時正璅臣耳何與國家事不可今日䘮亂而猥見逼廹吾爼豆上腐肉任人割截耶庾愧不能答說苑曰楚令尹子文之族干法者廷理釋之子文責之曰吾豈為私意耶何廷理之駮於法也不寘刑地吾將死廷理懼遂刑其人國人聞之曰若令尹之公也吾黨何憂乃相與作歌曰子文之族犯國法程廷理釋之子文不聽通典曰凡帝王所都皆曰尹南朝曰丹陽尹後魏初曰代尹東魏曰魏尹北齊曰清都尹楊雄河南尹箴曰茫茫天區畫冀為京商邑翼翼四方之經爰作卿士以尹茲州風化攸興萬國承流梁邵陵王為丹陽尹初表曰臣進非民譽退異宗英尸居戎號已紊彛典况京兆五守西漢難追河南二尹東京罕繼審已循涯自知莫可街談巷議尤見不勝梁庾肩吾為南康王讓丹陽尹表曰臣聞劒鏤七星非有司天之用縑圖五嶽寧識崇朝之雲是知䇿彼泥龍不能令其逐日乘斯流馬安可使其奔電方今振鷺盈庭白駒空谷惟帝念功惟明克允君子之國罕聞其讓石門之水獲免於貪少尹唐書曰李憕為東京少尹時蕭𦙍為尹依倚權貴蒞事多不法憕以公正直之人用繄賴又道士孫甑生以左道求進託以修功徳往來嵩山求請無度憕必挫之五代史後唐書曰李承勲累遷太原少尹劉守光之僣號也莊宗遣承勲往使伺其釁端承勲至幽州見守光如藩方交聘之禮謁者曰燕王為帝矣可行朝禮承勲曰吾大國使人太原亞尹是唐帝除授燕主自可臣其部人安可臣我哉守光聞之不悅拘留於獄數日而訊之曰臣我乎承勲曰燕君能臣我王則我臣之吾有死而已安敢辱命會王師討守光承勲竟没於燕中留守東觀漢記曰和帝南廵祠園廟張禹以太尉留守北宫大官朝夕送食後漢書曰車駕征張渉留伏湛居守時烝祭髙廟冬祭曰烝河南尹司隸校尉於廟中争論湛不舉奏免坐呉志曰孫權征新城使登居守總知留事時年榖不豐頗有賊盗乃表定科令所以防禦甚得止姦之要晉書曰張方刼恵帝幸長安僕射荀藩等與其遺官在洛陽為留臺承制行事號為東西臺又曰荀頽大駕行幸三州頽留守京師沙門法秀謀反頽率禁兵収掩畢獲内外晏如駕還飲至文明太后曰當爾之日卿若持疑不即収捕處分失所則事成不測矣今京畿不擾宗廟社稷安者實卿之功也隋書曰楊瓚平齊之役諸王咸從留瓚居守帝謂之曰六府事殷一以相付重朕將遂事東方無西顧之憂矣其見親信如此唐書曰儀鳯元年司農卿韋𢎞機為東都留守時有道士朱欽遂為中宫所使至都所為横恣𢎞機執而囚之因奏曰道士假稱中宫驅使依倚形勢臣恐虧損聖明為禍患之漸髙宗特發中使賜書慰諭仍云不湏漏洩又曰武后垂拱中文昌右相蘇良嗣為西京留守時尚方監裴匪躬檢校京苑將鬻苑中果菜以収其利良嗣駮之曰昔公儀休相魯猶能㧞葵去織未聞萬乘之主鬻其果菜以與下人爭利也又曰桞公綽為北都留守河東節度觀察等使是嵗北虜遣梅禄將軍李暢以馬萬疋來市且曰朝貢所經過守帥每假禮分嚴其兵備留館則戒卒於外懼有襲奪太原故事亦出兵送之暢至界上公綽獨使牙門將祖孝恭單馬勞焉待以修好之意暢感義出涕徐驅道中不妄馳獵及至闢牙門令譯引謁晏以常禮及市馬歸竟不敢有所犯太平御覽卷二百五十二
