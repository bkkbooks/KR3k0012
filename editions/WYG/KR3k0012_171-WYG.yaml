body:
  text: 太平御覽卷一百七十一宋李昉等撰州郡部十七江南道下越州歙州明州台州處州温州婺州衢州潭州岳州衡州永州道州郴州連州邵州黔州思州費州辰州錦州溪州叙州施州播州珍州夷州葉州溱州越州十道志曰㑹稽郡禹貢揚州之域春秋時越國春秋元命苞曰牽牛流為揚州分為越國史記曰越王勾踐其先禹之苗裔而夏后帝少康之庶子也封於㑹稽以奉守禹之祀文身斷髮披草萊而邑焉吳志曰㑹稽南面山萬重北帶滄海千里輿地志曰順帝時陽羡人周嘉上書請分浙江已西為吳郡東為㑹稽郡宋略曰㑹稽山隂編戸三萬號為天下繁劇王羲之云每行山隂道上如鏡中遊王獻之望鏡湖澄澈清流㵼注乃云山川之美使人應接不暇郡國志曰越城無北面以示伐吳後終滅吳漢志曰㑹稽郡秦置髙帝六年為荆國十二年更名吳景帝四年屬江都領曲阿縣三十六吳越春秋曰禹廵行天下歸還於越㑹計脩國之道以㑹稽名山漢志曰剡縣屬㑹稽南史曰張稷為剡令至嵊亭生子因名嵊字四山漢志曰諸暨縣屬㑹稽郡莽曰疏虜十道志曰縣有暨浦諸山因以為名㑹稽志曰龜山之下有東武里即琅琊東武縣山一夕移於此東武人皆徙此故立不動歙州十道志曰歙州新安郡禹貢揚州之域春秋時屬越秦屬丹陽郡漢志曰歙都尉治屬丹陽郡又曰黝縣屬丹陽郡漸江出焉成帝鴻嘉二年為廣徳國王莽曰愬虜師古曰黝音伊字與黟同晉書曰孔愉字敬康㑹稽人永嘉之亂避地入新安山谷中以稼穡讀書為業信著鄉里後奄忽而去人皆以為神梁書曰任昉為新安太守調楓香二石始入三兩便止不欲遺之後人及下任帷有桃花米二十石圖經曰績溪縣以界内乳溪與徽溪相去一里迴轉屈曲並流離而復合謂之績溪縣因名焉任昉為新安太守行春至此累日不返百姓因名溪為昉溪又曰新安貢柿心黒木黝之字縣職此之由又曰祁門縣本名閶門著於秦漢之代縣有巨石夾流水兩兩相對其狀似門故號閶門又曰婺源縣本晉休寧縣東陽記曰以上應婺女故名之明州十道志曰明州餘姚郡古舜為餘姚之墟漢志曰餘姚屬㑹稽郡本鄮縣之地輿地志曰邑人以其海中物産於山下鄮易因名鄮縣圖經曰鄮縣有甬東及句章故城台州十道志曰台州古越州㑹稽郡之地禹貢揚州之域春秋時列國秦屬閩中郡後越王無疆七代孫閩君揺率越人佐漢伐秦惠帝録其功封揺為東海王都於東甌山海經曰甌在海中郭璞注云今臨海永寧縣即東甌在岐海中也南海中鬱林郡為西甌吳地志曰漢書閩越圍東甌東甌告急於天子天子遣大中大夫嚴助發兵往救東江淮間後往往漸出乃以東甌地為回浦縣漢志曰回浦東部都尉理屬㑹稽郡揚雄解嘲曰東南一尉西圵一候十道志曰唐武徳四年討平李子通於臨海縣置海州五年改海州為台州處州圖經曰處州縉雲郡古縉雲之墟也秦為㑹稽郡地漢初為東甌地後以為回浦縣光武更名章安晉分為永嘉郡輿地志曰永嘉郡本㑹稽東部地晉明帝大寧元年分臨海等縣立永嘉郡圖經曰麗水縣有惡道惡道有突星瀨謝靈運與弟書曰聞惡道溪中九十九里有五十九灘永嘉記曰王右軍遊惡灘竒絶遂書突星瀨於石輿地志曰松陽縣本章安南鄉漢永建時立為縣吳地記曰縣東南臨大溪有松楊樹大八十一圍腹中空可容三十人坐故取此為名王右軍嘗往看之永嘉記曰青田縣有草葉似竹可染碧名為竹青此地可産故名青田温州十道志曰温州永嘉郡㑹稽之東境也漢永建四年置永寧縣郡國志曰永嘉為東甌鬱林為西越斯地蠶一年八熟圖經曰永嘉縣漢治縣之地後漢改為章安縣漢志曰治本閩越地屬㑹稽郡婺州十道志曰婺州東陽郡禹貢揚州之域春秋時為越之西界秦屬㑹稽郡漢初屬吳荆二國郡國志曰婺州正得東越之勝地漢時其地屬㑹稽為東揚州人俗輕躁少信行好淫祀鄭緝之東陽記曰此境於㑹稽西部嘗置都尉理於此吳寶鼎元年始分㑹稽置東陽郡隋平陳置婺州蓋取其地於天文為婺女之分野異苑曰東陽顔烏以淳孝著聞羣烏助銜土塊為墳烏口皆傷一境以為至孝所致因以縣名烏傷十道志曰唐武德七年改烏傷為義烏衢州十道志曰衢州信安郡土地所屬與婺州同唐武德四年平李子通於信安縣置西有三衢山因以為名輿地志曰後漢獻帝初平三年分太平縣立新安縣晉太康元年以𢎞農有新安改名為信安左傳曰越伐吳王孫彌庸觀越見姑蔑之旗杜註云今東陽大末縣是也輿地志曰姑蔑秦漢為太末縣今龍游及春秋東陽太末縣是也潭州十道志曰潭州長沙郡禹貢揚州之域春秋及戰國時為黔中地之南境晉懷帝永嘉元年分荆州為湘州隋平陳改湘州為潭州史記天官書曰翼軫為楚分傍一小星為長沙星漢書曰髙帝封番君吳芮為長沙王又曰長沙定王發景帝二年立以母微無寵故王卑濕貧國應劭注曰景帝後二年諸王來朝有詔更前稱壽歌舞定王但張袖小舉手左右笑其拙上怪問之對曰臣國小地狹不足迴旋帝乃以武陵零陵桂陽屬焉郡國志曰炎帝神農氏葬於長沙長沙之尾東至江夏謂之沙羡是其地十三州志曰西自湘江至東萊萬里故曰長沙湘州記曰始皇二十五年併天下分黔中以南之沙鄉為長沙郡以統湘川蓋取星以名焉遁甲經曰沙羡之地雲陽之墟可以長生可以避世湘中記曰其地舜之遺風人多淳朴今故老猶彈五弦琴好為漁父吟湖南風土記曰長沙下濕丈夫多夭折俗信鬼好淫祀茅蘆為室頗多越風岳州十道志曰岳州巴陵郡禹貢荆州之域古三苗國地春秋及戰國時屬楚秦屬長沙郡晉分長沙之巴陵置建昌郡在巴陵齊武封子倫為巴陵王梁封齊明帝子寶義為巴陵王奉齊後以備三恪隋平陳改為岳州尋江記曰羿屠巴虵於洞庭其骨若陵故曰巴陵淮南子曰斬蛇於洞庭十道志曰巴陵縣本漢下雋縣之巴丘地漢書地理志曰下雋縣屬長沙郡十道志曰華容縣本漢孱陵縣衡州十道志曰衡州衡陽郡春秋時屬楚秦屬長沙郡漢為酃縣地屬長沙國吳分長沙之東境立為湘東郡隋平陳罷郡為衡州因衡山以取名尚書禹貢曰荆及衡陽惟荆州甄烈湘州記曰宋大明中望氣者云湘東有天子氣遣使者巡視斬崗以厭之其後湘東王為天子即明帝也圖經曰茶陵縣者以其陵谷生茶茗永州十道志曰永州零陵郡禹貢荆州之地春秋及戰國時楚之南地秦屬長沙郡漢屬長沙國晉以零陵屬湘州隋平陳置永州因以永水為名梁書曰孫謙字長信為零陵太守有善績吏人安之先是郡多猛獸謙至絶迹去官之夜猛獸即害居人甄烈湘州記曰石鷰山石其形似鷰大小如一每山雨即頡頏飛翔羅含湘中記曰石鷰在泉陵縣雷風則羣飛然其土人稀有見者又十道志曰零陵縣本漢泉陵縣道州十道志曰道州江華郡禹貢荆州之域春秋及戰國時屬楚漢屬長沙國唐貞觀八年為道州圖經曰昔舜封象有庳國即其地郴州十道志曰郴州桂陵郡禹貢荆州之域春秋及戰國時屬楚秦屬長沙郡漢髙祖二年分長沙南境立桂陽郡屬荆州部居郴梁元帝為蘆縣郡屬衡州隋平陳改為郴州史記曰項羽徙義帝於長沙都郴連州十道志曰連州連山郡春秋時楚地秦為長沙郡之南境兩漢為桂陽郡之桂陽縣吳屬始興郡晉因之宋於此立宋安郡後齊如之梁為陽山郡唐武德四年改為連州以郡南黄連山嶺為名邵州十道志曰邵州邵陽郡禹貢荆州之域春秋時屬楚秦為長沙郡漢為邵陵縣吳分零陵北部為邵陵郡屬荆州即今州也晉武改邵陽為昭陽唐貞觀十年改為邵州又曰邵陽縣本漢邵陵縣地屬長沙國黔州十道志曰黔州黔川郡禹貢荆州之域戰國為楚黔中地秦昭王伐楚置黔中郡其地又屬焉漢武陵郡之酉陽縣武陵五溪蠻之西界也周武帝保定四年蠻帥思鶴以地内附置奉州建德三年改為黔州吳録曰黔陽屬武陵郡黔陵今辰州三亭縣西故城是也思州十道志曰思州寧夷郡禹貢荆州之域春秋楚地隋開皇十八年置務川縣屬巴東郡唐武徳四年以務川當䍧牱要路置務州貞觀八年改為思州因思卭水為名費州十道志曰費州涪川郡禹貢荆州之域春秋時屬秦漢武帝元鼎六年通䍧牱郡其地屬焉江山阻逺為黒獠所居多不臣附周宣改元獠王元殊多質等歸國遂立州取費水為名九州要記曰九丘之外有費州辰州十道志曰辰州盧溪郡禹貢荆州之域春秋時屬楚其地即古蠻夷之地秦昭王使白起伐楚略取蠻夷置黔中郡漢改黔中為武陵郡隋開皇平陳改為辰州沅陵記曰五溪十洞頗為邊患自馬伏波征南之後雖為郡縣其民叛擾代或有之蓋恃山險所致十道志曰壺頭山後漢馬援征武溪蠻取壺頭山賊乗髙守險水迅船不得進士卒多疫死援亦中病穿岸為室以避炎氣遂卒於此武陵記曰山邊有石窟即馬援所穿屋也室内有大蛇如舟云是援之餘靈十道志曰故老云楚文子滅巴巴子兄弟五人流入黔中漢有天下名曰酉辰巫武源等五溪為一溪之長故號五溪錦州十道志曰錦州盧陽郡厯代土地與辰州同唐武德初以辰州之地析置錦州溪州十道志曰溪州靈溪郡禹貢荆州之域厯代土地所屬與辰州同唐武德中立溪州蓋取五溪相㑹於此又曰大鄉縣本漢沅陵零陵二縣地屬武陵郡梁分立大鄉縣三亭縣本漢零陵酉陽縣地屬武陵郡唐分大鄉縣縣有小酉山黔山大酉山叙州十道志曰叙州潭陽郡古蠻夷之地戰國時為楚黔中地唐貞觀八年為巫州天授三年為巫山不在州界改為沅州以沅江水改為郡名開元十三年仍舊為巫州至大厯五年為叙州五溪記曰民多射生而鼻飲噉虵鼠捕蝦蠏朝營夕用故無宿給施州十道志曰施州清江郡禹貢荆州之域春秋時為巴國七國時為楚巫郡地秦昭王伐楚置黔中郡巫地屬焉周武建德二年酋長向邵兄弟四人相率内附立施州又曰清江郡本漢巫縣地屬南郡巫縣今䕫州巫山縣是也吳晉及周為沙渠之地隋於此置清江縣播州十道志曰播州播川郡秦夜郎縣之西南隅惠王十四年欲得楚黔中地以武闗之外易之今徑厯黔府即總謂黔中地漢武元鼎六年平西南夷置牂牱郡其地屬焉以且蘭有㧻船牂牱因此立郡以名焉貞觀九年於此界置郎州後省十三年又於其地置播州以其地有播川因名焉漢書曰唐蒙上書說武帝曰聞夜郎國有精兵可十餘萬浮舟牂牱出其不意以制越此一竒也珍州十道志曰珍州夜郎郡古山獠夜郎國之地晉永嘉五年分牂牱置夜郎郡兼置哀州唐貞觀十七年擴闢邊夷置播川鎮後因川中有降珍山因以鎮為珍州取山名郡也九州志曰夜郎自古非臣伏州郡之地漢武開拓南邊始置夜郎縣屬牂牱郡即牂牱都尉治之後漢書曰夜郎者臨牂牱江江廣百餘步足以行船十三州志曰牂牱者江中山名也夷州十道志曰夷州義泉縣古徼外蠻夷之地漢置牂牱郡厯代恃險不臣隋大業七年始招慰置綏陽縣屬明陽郡唐武徳四年置夷州葉州十道志曰葉州龍溪郡古蠻夷之地唐置葉州後為龍溪郡溱州十道志曰溱州溱溪郡古蠻夷之地唐貞觀八年開拓南蠻於榮懿縣立溱州地多貢象牙後或為溱溪郡太平御覽卷一百七十一
