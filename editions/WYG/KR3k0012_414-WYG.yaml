body:
  text: 太平御覽卷四百一十四宋李昉等撰人事部五十五孝下汝南先賢傳曰薛包字孟嘗西平人好學篤行喪母以孝聞父娶後妻而憎包分之出宅包日夜泣不能去被毆杖不得已廬於舍外旦入洒掃父怒又逐之乃廬於里門晨昏不廢積嵗餘父母慙而還之後行六年喪喪過于哀既而弟子求分異居包不能止乃中分其財奴婢引其老者曰與我共事久汝不能使也田廬取其荒者曰吾少時所治意所戀也器物取其朽敗者曰我素所服食身口所安弟子數破其産輙復賑給又曰李篤字君淵汝南上蔡人家貧夜賃冩書為母買肉一斤粱米一斗妻子茹菜有室無蕃又曰周盤字堅伯安成人江夏都尉遺腹子也居貧約而養母儉薄誦詩至汝墳末章慨然而歎又曰李鴻字太孫上蔡人閨門孝友弟仲為從父年報讎繋獄鴻便剖髮詣縣通記乞代弟即自殺仲得減死子先亦以孝稱父䘮甞於牀間得父亂髮投而狂走號呌躃踴先後坐事當刑詔以鴻先義孝一切減死又曰殷燀寺闕字子徵上蔡人生而有謹愿之性其在襁負母育之不勞少戯出得瓜果可食之物輙進與其母未甞先食郭林宗别傳曰茅容字季偉陳留人年四十餘耕於野時與等輩避雨樹下衆皆夷踞獨容危坐愈恭林宗見而竒異與共言因請寓宿旦日容殺雞為饌林宗謂為已設既而以供其母自以菜􅂼與客同飯林宗起拜之曰卿賢乎哉因勸令學卒以成徳師覺授孝子傳曰趙狥幼有至性年五六歳時得甘美之物未甞敢獨食必先以哺父出輙待還而後食過時不還則倚門啼以候父至數年父沒狥思慕羸悴不異成人哭泣哀號居於塜側鄉里嗟稱名聞流著漢安帝時官至侍中周裴汝南先賢傳曰蔡順字君仲有至孝之心少喪父奉養母甘口之物不敢先嘗母至婚家因飲酒變吐順恐中毒乃嘗其吐母生瘡出膿以口𠻳之海内先賢傳曰陳紀字元方寔之子也至徳絶俗才達過人烝烝色養不離左右豫州刺史嘉其至行表上尚書畫像百城以厲風俗焉孫盛逸人傳曰丁蘭者河内人也少喪考妣不及供養乃刻木為人髣髴親形事之若生朝夕定省後鄰人張叔妻從蘭妻借物看蘭妻跪拜木人木人不悦不以借之叔醉酣來罵木人以杖敲其頭蘭還見木人色不懌問其妻具以告之即奮劒殺張叔吏捕蘭蘭辭木人去木人見蘭為之􅂷淚郡縣嘉其至孝通於神明圖其形像於雲臺也孝子傳曰蔡邕性純孝母嘗滯病三年邕自非寒暑變節未甞解襟帶不寢寐者十旬又曰鮑得小子曰昂至孝過人初得疾經渉數年常俯伏左右衣不解帶又蕭廣濟孝子傳曰施延字君子少盡色養之道赤眉之際將母到吳郡海塩賃為半路亭卒每取月直以供養督郵馮敷知其賢與飲食論道餉錢並不受王烈之安成記曰縣有孝子符表以孝聞天下年十六其母姜氏有疾侍省晝夜數十日母一食表亦一食母不食表亦不食見母將絶至性感咽而至於殯俄頃父亦沒一日二䘮在殯塟於四望岡太守王府君樹雙土間以表其墓唐新語曰劉審禮儀鳯中為工部尚書時吐蕃入㓂命審禮率兵十八萬與吐蕃將論欽陵戰于青海王師敗績審禮沒焉諸子詣闕自拘請入蕃以購其父詔許乞次子岐州司兵易從往蕃中省父比至而審禮已卒易從晝夜泣血吐蕃哀其至性還其父屍易從跣足萬里䕶襯歸𦵏於彭城故塋朝廷嘉之贈兵部尚書謚曰僖審禮刑部尚書徳威之子也少䘮母為祖母所養祖母元氏有疾審禮親甞藥膳及事繼母亦以孝聞與再從兄弟同居家無異爨闔門二百餘口人無間言易從後為彭州長史為周興所陷將刑百姓荷其仁恩競觧衣投于地曰為長史祈福有司平准直十餘萬易從一門仁孝而横遇寃酷海内痛之子升年十餘歳配流嶺表後六道使誅流人升以言行忠信為首領所保持僅而獲免又曰長孫從直趙公無忌之𤣥孫年二十餘父元適為延州膚政令從直隨之官膚施近邉多蕃部落往往刼掠城邑前後不能制元適適至果遇蕃騎數十刼掠縣下適至從人吏二百人追之及於近郊賊皆歇鞍解甲元適攻之而所將人吏無甲胄反為所敗從者皆走還元適猶與戰遂為所執縳之於樹將加屠戮從直聞之遂跣至父所不懼鋒刃以身蔽父群集矢射之身如蝟毛又中數十刃體無完處從直死之而州兵大至王父乃免國史補曰杜羔有至性其父為河北一尉而卒母非嫡經亂不知所之羔常抱終身之戚㑹兄為澤潞判官常鞫獄於私第有老婦辯對見羔時出入竊謂人曰此少年狀類吾夫詰問之乃羔母也自此迎侍而歸又往求先人之墓邑中故老已盡不知所詢館於佛寺日夜悲泣忽視屋柱煙煤之下見字數行拂而視之乃其父遺跡言我子孫若求吾墓當於某村某家問之羔號泣而往果有老父八十餘指其邱壠因得歸𦵏羔官至工部尚書致仕朝野僉載曰蘇頲為中書舍人父右僕射􅅛卒頲哀毁過禮有勅起復頲表固辭不起上使黄門侍郎李日知就宅喻㫖終坐無言乃奏曰臣見瘠病羸痩殆不勝哀臣不忍言恐其損絶上惻然不之逼也故時人語曰蘇瓌有子李嶠無兒語録曰韋温文宗朝欲以為翰林學士韋以先父遺命懇辭上後謂次對官曰韋温朕每欲用之皆辭訴又安用韋温聲色俱厲戸部侍郎崔蠡進曰韋温稟其父遺命耳上曰温父不令其子在翰林是亂命也豈謂之理乎崔曰凡人子能遵理命已是至孝況能稟亂命而不改者此則尤可嘉之陛下不可恠也上曰然乃止又曰路隋年在齠齡䘮其父至十許歳其母問曰識爾父否隋嗚咽而言不識也母曰只是一面隋復殞絶以至成人終身不覽鏡加以至行純古士大夫推之朱崖慕其徳以愛女適隋之子李太尉家有路郎隋之子也官至常州守生資唯有琴十張史係曰盧昭美字子明范陽人五歳念孝經論語與童軰為師或乏禮至於父母字坐則起而言母劉因往兄之家飲酒歸夜連吐昭憂形于色取其吐甞之或詰其故昭美對曰母自外食寧不知其毒邪行超撫而歎曰盧氏之家有曾子矣時同里大稱河東裴安特異之比昭美於蔡順過之母卒父蚤亡家貧無以𦵏殯訖乃傭為無極酒家保得月資與女弟令備奠祭酒家怪其衣服藍縷得直不以時價古鬻字責之昭美具以情對言發涕泗從横酒嫗為之咄嗟輟食謂其四子曰我為乃家婦生不貧矣又幸不以若火鎡錤上音茲下音其鋤也方成衣食而日日意錢顧乃家財充若費乎我卒若必不如此月傭摧辱為母也四子俯伏母盡以縁身衣被釵釧與昭美令𦵏其母赦其傭免之昭美歸悉以營𦵏泰母祔焉又計其祥禫所貴市之餘金復齎還酒嫗其妻欲止之奚不留為給家財盡復為傭兒乎昭美怒欲出其妻其兄深勸止之然雖同室終不面焉妻亦悔過發憤而卒又曰孟元方字宏規東平鉅野人八歳聦悟過人父友南陽鄧恪来省㑹其父出遊鄰縣母命元方接對恪見群犬互噪戯元方曰郎子姓孟近犬必猛為余叱之元方曰尊客之前不叱狗恪曰小兒解書語元方曰鄧老樹村中来真田舍則不知書恪大慙後至父来謂之曰為孺子所辱賴無人見元方應曰子見父知其無人乎年十八明經擢第父母相次而卒元方五十日未甞有笑容唯以讀書為業頌詩至蓼莪篇必哀咽號咷情慕不已則必徑往塜所抱樹而哭或日暮則止栖栢庭亦無恐懼之色㑹昌末有盜發其塜而元方在河内夜夢告之往到鉅野修奉畢捕其盜手殺以祭而鄉里以為元方殺人鉅野令收捕之搒音彭又甫孟反掠無一辭盜塜家愈稱寃移獄及郡將按致其罪㑹賊家鬻物於市為他塜家所識又擒其弟焉太守然後知元方無罪赦之而責其令或問元方何不時自明元方曰手殺人何故自明後終于家又曰毛標字表元宣城溧水人少八歳頴悟異於衆子日誦五百言母鍾氏連年病疾標日夜祗奉諸兄悉寢唯標在母床側隨呻吟之聲至於枕前衣不解帶蓬頭垢面蟣虱盈身曾不搔視親戚大嗟異迎名醫嚴顒與母診脉才言不濟標號哭頓地顒佯言可救郎子善祗奉顒退而言曰嗟乎此子孝徳若是而親疾不可救天道奚處嗟歎良久翌日母終標伏母床號泣不食三日家人倉卒之際遺燭致焚舉家出辟火唯標抱其柩涕泣火為之飛去鄰舍柩得免莫不異之將𦵏標羸瘠杖不能起扶持方行猶蹈雪跣歩四十里太守命縣宰就視致粟帛給遺及標病革誡其子貞曰吾以家門修飾遂及於此吾生無益於人死固不害於人唯宜薄𦵏止於周身貞奉其教行之鄉里稱焉又曰夏侯佩字儀王譙郡人三歳而孤養於世母崔氏九歳孝謹過人同祖兄弟皆虧失於崔崔撫佩歎息而泣曰若三歳䘮母而我養汝若孝於我過於我生諸曹百嵗後若善為我殯焉佩涕泣不勝方知幼失父母因日夜涕泣問母封樹崔引至其城佩慟哭而絶崔遽救之抱而歸再慟猶謂在塜畔年十九歳崔亡若䘮其母崔氏數子皆不終䘮制飲酒食肉而佩最孤㓜羣兄咸惡之或夜相聚拘持佩釂以酒㗖以肉佩入而復吐數四羣兄笑以為樂佩涕泣不自勝皆曰僧兒强而復吐猶為悲佩曰誠感鞠育之恩得遂庶㡬終天之報所以不覺沾襟因大哭羣兄忍人也皆為之流涕每蒸甞之禮於世母神坐别致敬焉年二十有五卒于家里人謂其封為夏侯孝子之墓又曰盧操字安節河東人㓜勤學九歳通孝經論語隨義解釋黌音横中父老謂之聦明兒事繼母張氏以孝聞張有三子而操同産二人張氏厚於三子命操常執勤主炊為三子設席操弟多以疾辭卧舍不出而操服勤不以勞倦張誨其子讀書咸以驕志三子每出張令操随驢以催之操執鞭引繩如僮僕三子復謂曰随驢何如我讀書操曰不讀書所以逐驢後三子嗜酒佚蕩不敢抵忤於人或至及門詬詈詞及母氏而操為涕泣拜而觧之惡少年咸曰不謂三賊有令弟某無故及長者門羅拜操而去繼母終其二子已亡而操訓養踰於未亡日哀毁過禮廬於墓側每夕有狐貍羅列散於廬左右逥旋不去者三年時人以操在野禽獸為之衛侍非孝感通於神明其孰能逮於此服闋明經擢第歸上塚盡以報揚名之義里巷榮之調為臨渙縣尉毗佐以寛仁吏民至今稱焉操以官舍都屋尊老所處不敢寧居唯西廡而已都屋設几席神座祀之出必告反必面過其庭鞠躬如也入門恭謹其家居常若奉尊者若無大噱咄責之音同僚服之操毎旦具冠帶縉紳讀孝經一篇然後視事忌日則增其數讀至䘮親章號咽不勝哀感之心操子昭有文名於世次子雲恭謹有父風髙尚好賢又曰劉師貞字文通彭城人也蚤失其母及長不記容狀哀慕之心不拘月制至忌辰終日涕泣未甞寢食忽夢見其狀謂之曰我乃母也若孝通神明故我得見此處師貞夢中大哭既覺哀號逾甚乃作偶人象以事之朝夕起居反告如常每薦新然後食時人語曰孝於何通幽明漢有丁蘭唐有師貞父福年老患目師貞朝夕膳食非手則福不能食居處號為嚴潔或問其故師貞曰居處不時非孝也師貞偶疾卧其父福暮食不安師貞歘然起號曰是夜食之不精羞果餅生之所致明師貞驚起而愈兄有疾經旬不差師貞衣不觧結日一食為讀道釋經夢神人曰若兄苦風取胡王使者酒漬服愈師貞自求之藥肆皆不曉因夢見其母曰胡王使者羗活也覺而求之兄疾遂愈後考妣繼䘮六年有雙白雀栖飛戸間除筵之日與師貞啁頓翅狀若號咷躃踊久乃去續定命録曰賈直言父道冲徳宗朝漏洩禁中事帝怒賜鴆酒直言白中使請自執器以飲父因自飲之立死酒自左足洞出復生使具奏流其父并直言於南海遇赦還以勁直聞為鄆帥以縻郡職劉悟茆東平之强直言之謀也朝廷以功就徵拜諫議大夫悟上表乞留委以戎事太和初授絳郡太守每話所經之事自云始飲酖志在必死岑然覺毒㳂五内至支節其痛愈於鑚灼摩頂旋踵不可名狀天隂則又甚焉􅪊其陛及足脛色皆如墨有傍攻出六濃液紫瘀臭敗逆搶人鼻達數十歩外唯食啖無減始知何遜之好不誣矣自降除嘉春竟終天年七十有六禄養韓詩外傳曰曾子曰吾甞仕為吏禄不過鍾釜猶欣欣而喜者非為多也樂其養親也親沒之後吾甞南遊於楚得尊官焉堂髙九仞榱題三尺車轂百乗然猶北向而涕泣者非為賤也悲不見吾親也家語曰子路見孔子曰負重致逺不擇地而休家貧親老不擇禄而仕後漢書曰廬江毛義有孝行南陽張奉慕其名往候之坐定而府檄至義捧檄而入喜動顔色奉心賤之及義母死去官行服數徵不至奉歎曰賢者固不可測往者之喜乃為親屈也斯盖所謂家貧親老不擇禄而仕也謝承後漢書曰周盤字堅伯居貧養母儉薄不充誦詩至汝墳之卒章慨然而歎乃解韋帶就孝亷之舉黄恭廣記曰南吳甫舉茂才累年不遷甫有老母年九十有餘乃上書自乞減品為四百石長庶得其俸以養母詔聽除甫南陽新蔡長遂以甫為准率減交趾茂才皆為四品也晉書羅企生字宗伯多才藝初拜左著作郎以家貧親老求補臨汝令世說曰李宏度甞歎不遇殷揚州知其家貧問君能屈志為百里不李答曰北門之歎久已上聞窮猨豈暇擇木遂作剡縣太平御覽卷四百一十四
