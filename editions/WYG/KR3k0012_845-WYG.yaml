  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_845-1a, image: WYG0900/WYG0900-0461a.png}
body:
  text: 太平御覽卷八百四十五宋李昉等撰飲食部三酒下孟子曰禹惡㫖酒而好善言孔叢子曰平原君與子髙飲强子髙酒曰諺云尭舜千鍾孔子飲百􅒀子路嗑嗑尚飲十榼古之賢聖無不能飲子何辭焉子髙曰予聞聖賢以道德兼人未聞飲酒列子曰夫醉者之墜車也雖疾不死骨節與人同而犯害與人異其神全也乗亦不知也墜亦不知也死生驚懼不入乎其胷是故遻物而不慴彼得全於酒而猶若是况得全於天乎韓子曰晉平公與羣臣飲酒酣乃喟然而歎曰莫樂為人君惟其言而莫之違師曠侍坐於前援琴撞之公披袵而避琴傷於臂公曰大師誰撞師曠曰今者有小人言於側者故撞之公曰寡人也師曠曰嘻是非君人者之言也左右請除之公曰釋之以為寡人戒又曰齊桓公飲酒醉遺其冠恥之三日不朝管仲曰此非有國之恥也公胡不雪之以政公曰善因發倉賜貧窮論囹圄出薄罪處三日而民歌之曰公胡不復遺冠乎又曰宋人有少者欲效善見長者飲無餘亦自飲而盡之王孫子新書曰楚荘王攻宋厨有臭肉樽有敗酒将軍子重諫曰今君厨肉臭而不可食樽酒敗而不可飲而三軍之士皆有饑色欲以勝敵不亦難乎曰請有酒投之士有食饋之賢淮南子曰楚㑹諸侯魯趙皆獻酒於楚王主酒吏求酒於趙趙不與吏怒乃以趙厚酒易魯薄者奏之楚王以趙酒薄遂圍邯鄲抱朴子曰鄭君酒釀成因以附子甘草屑内酒中暴令乾如雞子大一丸投一斗水立成美酒又曰葛仙公每飲酒醉常入門前陂中竟日乃出㑹從呉主到荆州還天風仙公舡没吳主謂其已死須㬰從水上來衣履不濕而有酒色云昨為伍子胥召設酒不能便歸以淹留也吕氏春秋曰肥肉厚酒務以自强命曰爛腸之食韓詩外𫝊曰夫飲之禮不脱履而即序者謂之禮跣足上坐者謂之宴能飲者飲之不能飲者已謂之醧齊顔色均衆寡謂之沉閉門不出者謂之湎故君子可以宴可以醧不可以沉不可以湎黄石公記曰昔者良将用兵人有饋一簞醪者使投之於河令将士迎流而飲之夫一簞醪不能味一河水三軍思為之死非滋味及之也賈誼新書曰晉師伐虢虢公出奔至澤中曰吾饑渴甚其御者進清酒腵脯問御曰汝何故謟䛕曰恐君必亡所以儲也虢公作色怒御者曰臣言誤也君所以亡者天下皆不肖疾公賢也虢公喜據軾而笑饑勌乃枕御者膝而卧御以塊代其膝而去虢公因餓死神異經曰西北外海有人長二千里兩脚中間相去千里腹圍一千六百里但日飲天酒五斗不食五糓魚肉唯飲天酒忽有饑時向天仍飲好逰山海間不犯百姓不干萬物與天地同生又曰西北荒中有酒泉此酒美如肉清如鏡其上有五罇取一罇復一罇出與天地同休無乾時飲此酒人不死長生東方朔别傳曰武帝幸甘泉長平阪道中有虫赤如肝頭目口齒悉具先驅馳還以報上使視之莫知也時朔在屬車中令往視焉朔曰此謂恠氣是必秦獄處也上使案地圖果秦獄地上問朔何以知之朔曰夫積憂者得酒而解乃取虫置酒中立消賜朔帛百疋後屬車上盛酒為此故也説苑曰魏文侯與大夫飲使公乗不仁為觴政曰飲若不盡浮之大白文侯不盡公乗不仁舉白浮君也又曰吳王從民飲酒胥諫曰昔白龍下於清冷之淵化為魚漁者射中其目白龍上告天王捨萬乗從布衣恐有射目之患也論衡曰東風至酒湛溢按酒味酸從東方木也味酸故酒湛溢也又曰文王飲酒千鍾孔子百觚聖人胷腹小大與人均等若飲千鍾宜食百牛能飲百觚則能食十羊使文王身如防風孔子身如長狄文王孔子率禮之人垂譽後世豈千鍾百觚耶紂車行酒騎行炙二十日為一夜按紂以酒為池因謂車行酒以肉為林因為騎行炙耳或是覆酒滂沱於地因以為池釀酒積糟因以為丘懸肉似林因言肉林也西京雜記曰司馬相如還成都以所服鷫鸘裘就市易錢貰酒與卓文君為歡典論曰孝靈末百司湎酒酒千文一斗常侍張讓于奉為太醫令與人飲去衣露形為樂也世説洛陽令郭珎家有巨億每暑召客侍婢數十盛装飾羅糓被之􅃝祼其中使進酒又曰阮宣子嘗步行以百錢掛杖頭至店便獨醉酣暢雖當世貴盛不肯詣也又曰山季倫為荆州時出酣暢人為之歌曰山公時一醉遥造髙陽池日暮倒醉歸酩酊無所知時復乗駿馬倒着白接䍦舉手語葛强何如并州兒髙陽池在襄陽是其愛将并州人也襄陽記曰漢侍中習郁於峴山南依范蠡養魚法作魚池池邊有髙堤皆種竹及長楸芙蓉覆水是㳺宴名處山季倫逰此池未嘗不大醉而還恒曰此是我髙陽池也又曰鴻臚孔羣好飲酒王丞相語云卿恒飲酒不見酒家覆缾布日月乆則糜爛羣曰公不見糟中肉乃更堪乆羣常與親舊書云今年田得七百斛秫米不了麴蘖事又曰周顗字伯仁風徳雅重深逺危亂還江東積年恒大飲酒嘗經三日不醒人謂之三日僕射又曰諸阮能飲酒客至宗人間集不復用常杯酌以瓮盛酒賔主相向大酌更飲時有羣褚來飲酒不止便共飲之又曰桓公有主簿善别酒輙令先嘗好者謂青州從事惡者謂平原督郵青州有齊郡平原有革縣從事言至齊督郵言至革又曰王孝伯問王大阮籍何如司馬相如王大曰阮籍胷中壘隗故須澆之言同相如惟有酒異大忱小字王大歎曰三日不飲酒覺形神不復相親宋明帝文章志曰忱嗜酒一飲或連日不酌自號上頓也諺以大飲為上頓起於忱也王孝伯云名士不須竒才但使常得無事飲酒讀離騷便可稱名士也神仙傳曰孔元方者專脩道術元方為人惡衣踈食飲酒不過一斗年百七十餘嵗道成人或請元方同㑹人人作酒令次至元方作令元方無所説直以一杖拄地因把杖倒豎頭在下足在上以一手持酒倒飲之人莫能為也列仙傳曰酒客者梁市上酒家客也作酒常美日售萬錢有過逐之主人酒便酸敗異苑曰有虹食薛願釡中水盡願輦酒飲之虹吐金滿釡因致豐富也益都耆舊傳曰楊子拒妻劉臣公之女字奉漢有四男二女拒早亡教道閨門動有法則長子元珎嘗出飲酒輿而歸母不見十日因諸弟謝過乃見數責曰夫飲酒食有節不至流湎者禮也汝乃沉荒慢而無禮自為敗禮首以帥先諸弟博物志曰劉元石曽於中山酒家沽酒酒家與千日酒飲之至家大醉其家不知以為死葬之後酒家計向千日往視之云已塟於是開棺醉始醒俗云元石飲酒一醉千日又曰西域有蒲萄酒積年不敗彼俗傳云可至十年欲飲之醉彌日乃解古今注曰烏孫國有青田核得水則有酒味甚湛美如好酒飲盡即隨更注水隨成不可乆乆則苦不可飲名曰青田酒世説曰鍾毓鍾㑹少有令譽其父晝寝因共偷服散酒父時覺且記寐以觀之毓拜而後飲㑹獨不拜父問其故毓曰酒以成禮不敢不拜問㑹㑹曰偷酒乃非禮所以不拜又曰阮籍遭母憂在晉文王座進酒肉司𨽻何曽亦在坐曰明公方以孝理天下而阮籍以重衰顯於公座飲酒食肉宜流之海外以正風教文王曰嗣宗毁頓如此君不能共憂之且有疾而飲酒食肉固喪禮也籍飲噉不輟神色自若後聞步兵校尉厨中有酒數百斛乃求為步兵校尉或云籍與劉文飲步兵厨中酒未盡並醉而物故皆好事者為之籍景元中卒太始中靈猶存焉又曰劉伶縱酒放逹或脱衣倮形在室中人見譏之伶曰我以天地為棟宇室屋為褌衫諸君何以入我褌中又曰張季鷹縱任不拘時人號為江東步兵或謂之曰卿乃縱適一時獨不為身後名耶張答曰使我有身後名不如即時一杯酒嶺表録異曰南中醖酒即先用諸藥别淘漉粳米漉乾旋入和米搗熟即緑粉矣熱水溲而團之形如餢飳以指中心刺作一竅布於簟席上以枸把樹葉罨之其體候好弱一如造麯法既而以藤蔑貫之懸於烟火之上每醖一年用幾箇餅子固有恒凖矣南中地暖春冬七日熟秋夏五日熟既熟貯以瓦瓮用糞掃火燒之亦有不燒之沽為酒清也又曰大扺廣州人好酒晩市散男兒女人倒載者日有三二十輩生酒行即兩面羅列皆是女人拐呼鄙夫先令嘗酒盎上白瓷甌謂之􅀈刮一刮三文不持一錢來去嘗酒致醉者當壚嫗但笑弄而已盖酒賤之故也太平御覽卷八百四十五
