body:
  text: 太平御覽卷七百五十宋李昉等撰工藝部七數畫上數說文曰筭長六寸計厯數者也從弄竹言常弄乃不誤也易曰大衍之數五十統舉天地之數凡五十有五言十者舉成數也天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也周禮曰保氏養國子以道乃敎之六藝六曰九數鄭司農曰九數方田粟米差分少廣商功均輸方程嬴不足旁要今有重差夕桀句股也漢書律厯志曰數者一十百千萬也所以筭數事物慎性命之理也又曰武帝時桑𢎞羊以計筭幸年十三為侍中又曰宣帝時大司農丞耿壽昌以善筭為工得幸於上又曰計商善為筭著五行論筭述二十六卷又曰張蒼明習天下圖書計籍又善筭律厯故令蒼以列侯居相府領主郡國上計者吳志曰顧譚每省簿書未嘗下籌徒屈指心計盡發疑謬下吏以此服之又曰趙達河南人也治九宫一筭之術䆒其微㫖是以能應機立成對問若神使人取小豆數升播之席上立言其數驗覆果信嘗過其所知故知故為之具食食畢謂曰倉卒乏酒又無嘉肴無以叙意如何達因取盤中隻筯再三縱横之乃言卿東壁下有美酒一斛又有鹿肉三斤何以辭無主人笑曰以卿善筭欲以相試耳遂出酒酣飲又有書簡上作千萬數着空倉中封之令達筭之云但有名無實其精微若是達寳惜其術自闞澤殷禮皆名儒善士屈節就學秘而不告也太史丞公孫滕師事之累年賫酒拜跪而請達曰吾先人得此欲圖為帝王師至仕來三世不過太史郎誠不欲復傳之且此術微妙頭乗尾除一筭之法父子不相語初孫權行師征伐每令達有所推歩皆如其言問其法終不言由此見薄達常笑謂諸星氣風術者曰當廻筭帷幕不出户牖以知天道而反晝夜暴露以望氣祥不亦難乎無何引筭自校乃歎曰吾筭盡某年月日其終矣達妻數見達效聞而哭泣達欲弭妻意乃更筭言向者謬誤耳尚未也後如期死權聞達有書求之不得問其女乃發達棺一無所得法遂絶焉王隱晉書曰王戎為司徒好治生公嫗二人常以象牙籌晝夜筭計家財唐書曰僧一行姓張公謹之孫也初求訪師資以窮大衍至天台山國清寺見一院古松十數門有流水一行立於門屏間聞院僧於庭布筭聲而謂其徒曰今日當有弟子自遠求吾筭法也已合到門豈無人導達也即除一籌又謂曰門前水當却西流弟子亦至一行承其言而趨入稽首請法盡授其術焉而門前水果却西流西京雜記曰定安嵩真明筭術成帝時人也真常以筭自剋其壽七十三真曰綏和元年正月二十五日晡時死矣書壁以誌之至二十四日晡時死妻曰真筭時見長下一筭欲以告之慮脫故不告之今校差一日也又曰曹元理善筭術成帝時人也常從友人陳廣漢廣漢曰吾有二囷米忘其石數子為吾筭之元理以食筯十餘轉曰東囷七百四十九石二升七合西囷六百九十七石八升遂署囷門後出米西囷六百九十七石九升中有一鼠大可一升東囷無差元理後嵗復過廣漢以米數告之元理以手擊牀曰遂不知鼠之殊米不如剥面皮矣廣漢為之取酒脯數斤元理復筭曰千牛產二百犢萬雞將產五萬雛羊豕鵝鴨皆如其數菓蓏肴䔩悉知其所乃曰此資業之廣何供饋之偏耶廣漢慙曰有倉卒賔無倉卒主人元理曰爼上蒸㹠一頭厨中荔枝一盤皆可以為設廣漢再拜謝罪入取之盡日為歡其術後傳南季季傳項滔滔傳子陸皆得其分數而失其𤣥妙焉老子曰善計者不用籌䇿尹文子曰數十百萬億億萬千百十皆起於一推之億億無差矣山海經曰帝令竪亥歩自東極至於西極五億千選選萬也九千八百八十歩竪亥右手把筆左手指青丘曰五億十萬九千八百博物志曰南郡宜城王子山到泰山從鮑子真學筭異苑曰晉安平有越王餘筭菜長尺許白者似骨黑者似角云越王行海作筭有餘棄之於水生焉風俗通曰十十謂之百十百謂之千十千謂之萬十萬謂之億十億謂之兆十兆謂之經十經謂之垓十垓謂之捕十捕謂之選十選謂之載十載謂之極有物者有事者紀於此矣過此往者則其數可紀其名未之或聞也夫數一為特侯竒隻二為再兩偶三為叄四為乘賈誼書曰數度之道以六為法數度之始始於微細有形之物莫細於毫是故立一毫以為度十毫為髮十髮為釐十釐為分十分為寸十寸為尺備於六故先王以為天下用也周髀曰周公問於殷髙曰寡人聞子大夫善數語林曰鄭𤣥在馬融門下三年不得見令髙足弟子傳授而已融筭嘗渾天合召𤣥令筭一轉便决衆咸駭服謝察㣲筭經曰易稱太極是生兩儀蓋數之先也自𨽻首作術容成造厯顯筭斯興故也一位筭法曰萬萬穰為載數之極矣或問之曰何以數之為載按孫子筭經云古者積錢上至於天天不能容下至於地地不能載天不能蓋地不能載故名曰載又曰按司馬遷史記云自秦孝公時商鞅獻三術内一開道阡陌以五尺為歩二百四十為畆又曰案千乘之圖周之制度司馬法六尺為歩歩百爲畝是古之制也發象筭經曰問云度之起起於何答曰度之起起於忽忽是神蟲口中吐絲名也十忽為一絲十絲為一毫筭經曰量之起起於何答曰量之起起於粟粟從隂陽而生從六甲而出故六粟為一圭十圭為一抄筭經曰秤之起起於何答曰秤之起起於黍黍是三稜草子也十黍為一絫十絫為一銖畫釋名曰畫繪也以五色繪物上也周禮曰畫繢之事雜五采東方謂之青南方謂之赤西方謂之白北方謂之黑天謂之𤣥地謂之黄青與白相次也赤與黑相次也𤣥與黄相次也凡畫繢之事後素工論語曰繪事後素史記曰武帝衛太子廢後上居甘泉宫召畫周公負成王圖於是左右羣臣知上意欲立少子也又曰甘露三年單于始入朝宣帝思股肱之美圖畫其人於麒麟閣法其狀貌署官爵姓名又曰李夫人早卒帝圖畫其形於甘泉宫漢書曰金日磾母教誨兩子甚有法度武帝聞而嘉之病死詔圖於甘泉宫署曰休屠王閼氏日磾每見畫常拜向之涕泣東觀漢記曰馬援還誡兄子曰畫虎不成反類狗也又曰宋宏嘗讌見御座新施屏風圖畫列女世祖數顧視之宏曰未見好德如好色者帝撤之范􅁮後漢書曰光和元年置鴻都門學畫孔子及七十二弟子之像又曰明帝遣使天竺問佛道法遂於中國圖畫形像焉又曰顯宗圗畫建武中名臣列將於雲臺以椒房故謂馬后獨不及馬援東平王蒼觀圖言於帝曰何故不畫伏波像帝笑而不言又曰陳紀字元方遭父憂殆將滅性豫州刺史嘉其至行表上尚書圖象百城以厲風俗魏書曰曹休祖父嘗為吳郡太守休見壁上袓父畫下榻拜而涕泣魏氏春秋曰徐邈善畫作走水獺摽於水濵羣獺集焉晉書曰顧愷之尤善丹青謝安深重之謂有蒼生以來未之有也愷之每畫人成數年不㸃睛時人問其故答曰四體妍媸本無闗於妙處傳神寫照正在阿堵中嘗悅一隣女挑之弗從乃圖其形於壁以棘針釘其心女遂患心痛愷之因致其情女從之去針而愈毎重嵇康四言詩因為之圖常云手揮五絃易目送飛鴻難每寫人形妙絶於時嘗圖裴楷像頰上加三毛觀者覺神明殊勝又為謝鯤像在石巖裏云此子宜置丘壑中欲圖殷仲堪堪有目疾固辭愷之曰明府正為眼耳若明㸃瞳子飛白拂其上使如輕雲之蔽月豈不美乎顧愷之常以一厨畫糊題其前寄桓𤣥𤣥紿之云未開愷之見封題如初但失其畫直云妙畫通靈變化而去亦猶人之登仙了無怪色又曰王獻之桓溫常使書扇筆誤落因畫作為烏駮㹀牛甚妙劉毅傳曰毅平桓𤣥入建康初桓𤣥於南州起齋悉畫盤龍於其上號為盤龍齋毅小字盤龍至是遂居之晉書曰韓支字景先龍舒長鄧林婦病積年垂死醫巫皆息意支為筮之使畫作野猪着卧處屏風上一宿覺佳於是遂瘥齊書曰榮陽毛惠遠善畫馬彭城劉瑱善畫婦人當世稱為第一又曰齊王秀之字伯奮仕侍中時宗測優㳺秀之彌所欽慕乃令陸探㣲畫其形與已相對又曰王亮字叔奉臨沂人也齊竟陵王良開西邸延賢俊使工畫其像亮亦預焉梁書曰伏曼容素美風彩帝常以方稽叔夜使吳人陸探㣲畫叔夜像以賜之又曰昭明太子好士愛文劉孝綽與陳郡殷芸吳郡陸倕瑯琊王筠彭城劉洽等同見賔禮太子起堂乃使畫工先圖孝綽後魏書曰劉義業廟中皆畫祖父形入曾祖裕廟指像曰此渠大英雄生禽數天子次入祖義隆廟指像曰此渠不惡次入駿廟曰此渠大好色顧謂左右曰此渠大驢鼻即令畫工驢駿像鼻也北齊書曰廣陵王孝珩於㕔上畫蒼鷹見者以為真焉又曰魏収字伯起鉅鹿曲陽人也兼尚書僕射帝於華林園别起𤣥州苑備極山林樓觀之麗詔於閣上畫収容像其見重如此陳書曰顧野王傳曰宣城王為揚州刺史野王及瑯琊王褒並為賔客王甚愛其才野王又好丹青善圖寫王於東府起齋乃令野王畫古賢命王褒書賛時人稱為二絶唐書曰張昌宗嘗命畫工圖寫武三思及納言李嶠鳳閣侍郎蘇味道夏官侍郎李逈秀麟臺少監王紹宗等十八人形像號為髙士圖又曰薛稷善畫傅彩古跡睿宗在藩留意於小學稷於是特見招引又曰韓滉尤工書兼善丹青以繪事非急務自晦其能未嘗傳之又曰王維書畫特臻其妙筆蹤措思叅於造化而創意經圖即有所缺如山水平遠雲峰石色絶迹天機非繪者之所及也人有得奏樂圖者不知其名維視之曰霓裳第三疊第一拍也好事者集樂工按之一無差誤咸服其精思也又曰閻立本雖有應務之才而猶善於圖畫寫真秦府十八學士圖及貞觀中凌烟閣功臣圖並立本之跡也時人咸稱其妙太宗嘗與侍臣學士泛舟於春苑池中有異鳥隨波容與太宗擊賞數四召立本令寫之時閣外傳呼云畫師閻立本時已為主爵郎中奔走流汗俛伏池側手揮丹粉瞻望座賓不勝媿赧及退戒其子曰吾少好讀書幸免面牆縁情染翰頗及儕流唯以丹青見知躬厮役之務辱莫大焉汝深戒勿習此末技又曰李寳臣為成徳軍節度使寶臣謂朱滔使曰聞朱公貌如神得而知之願因繪事而觀可乎滔乃圖其形以示之寶臣懸於射堂命諸將熟視之曰朱公信神人也鍾岏良吏傳曰鄭純字長伯廣漢人也為永昌太守清廉獨絶及卒列畫東觀三齊畧記曰秦始皇求與海神相見神云我形醜約莫圗我形當與帝㑹始皇入海三十里與神相見左右有巧者潛以脚畫神形神怒帝負約乃令帝速去始皇即退馬前脚猶立後脚隨䧟僅得登岸畫者溺死續齊諧記曰魏明帝遊洛水水中有白獺靡淨可憐見人輒去帝顧玩終不可得侍臣景山曰臣聞獺嗜鯔魚乃不避死可以此候之乃自畫板作兩生鯔魚懸岸於是羣獺競赴遂一時執得帝嘉之謂曰不聞卿知畫何其妙也答曰臣亦未嘗執筆今之所作者自可庶幾耳帝曰是善用所長者也西京雜記曰元帝後宫既多不得常見乃使畫工圖其形按狀幸之諸宫人皆賂畫工多者十萬王昭君不肯遂不得見後匈奴求美女帝案圖以昭君行及召見貌為第一帝悔之而名籍已去乃按其事畫工棄市籍貲畫工有杜陵毛延壽寫人好醜老少必得其真安陵陳敞新豐劉白龔寛並工牛馬人形杜陽望亦善畫尤善布色樊育亦善布色同日棄市京師畫工於是差稀拾遺記曰周靈王時有韓房者自渠胥國來獻玉駞房長一丈垂髪至膝周人見之如神明矣以丹砂畫左右手為日月盈缺之勢不異真焉可照百餘歩又噴水為雲蔽虧其側靈王末年忽不知所在或云昇天又曰秦始皇二年騫霄國獻善畫者名裔口含丹青噴壁即成龍雲之像以指畫地若繩分矣轉手若規方寸之内四瀆五岳列國莫不悉備畫為鳳鸞皆軒軒若行也韓子曰客有為齊王畫者王問曰畫孰最難對曰狗馬最難孰為最易對曰鬼魅最易夫狗馬人之所知也旦暮覩於前不可類之故難也鬼魅無形無形者不可覩故易也淮南子曰畫西施之面者美而可悅覩孟賁之目者大而可畏又曰宋畫吳冶宋人工畫吳人工冶甚為㣲妙堯舜之聖不能及也抱朴子曰衛恊張黑有畫工之名華陽國志曰漢嘉郡以御雜夷宜炫耀之乃雕餙城牆華畫府寺及諸門作山神海靈窮竒鑿齒夷人出入恐騾馬或憚之趑趄說苑曰齊起九重之臺國中有能畫者則賜之錢狂卒敬君居常飢寒其妻端正敬君工畫貪賜畫錢去家日久思念其婦遂畫其像向之喜笑旁人見以白王王以錢百萬請妻敬君惶怖許聽世說曰戴安道為范宣畫南都賦圖范宣看而咨嗟焉俗說曰顧虎頭為人畫扇作阮籍稽康都不㸃眼睛送還扇主曰㸃眼睛便欲能語論衡曰人好觀圖畫夫所畫者古之列人也見列人之面孰與視其言行古昔之遺文竹帛之所載燦然豈徒牆壁之畫哉世本曰史皇作圖史皇黄帝臣也圖謂畫物像也新序曰葉公子髙好龍門亭軒牖皆畫龍形一旦真龍垂頭於窓掉尾於戸葉公驚走失措焉風俗通曰按百家書云公輸般之水上見蠡謂蠡曰開汝厘見汝形蠡遂出頭般以足畫圖之古今名畫錄曰晉有史道碩畫田家十月圖為世所珍孫鳩之述畫曰漢靈帝詔蔡邕圖赤泉侯楊喜五世將相形像於省中又詔邕為讚仍令自書之邕畫書于時獨擅可謂備三美矣又曰劉裒漢靈帝時作雲漢圖人見之自然覺熱更畫北風圖熱者還覺涼魏陳思王畫讚序曰蓋畫者鳥書之流也昔明德馬后美於色厚於德帝用喜之嘗從觀畫過虞舜之像見娥皇女英帝指之戯后曰恨不得如此人為妃又前見唐堯之像后指堯曰嗟乎羣臣百寮恨不得戴君如是帝顧而咨嗟焉晉傅咸畫像賦序曰先有畫卞和之像者以為臧文仲知柳下惠之賢而不與立卞和自刖以有證相去遠矣戯畫其像於卞子之旁特赤其面以示猶有慙色宋炳山畫叙曰豎畫三寸實當千仞之髙横墨數尺實體百里之迥晉王彪之自序曰余自求致仕詔累不聽因扇上有二䟽畫作詩一首以述其美太平御覽卷七百五十
