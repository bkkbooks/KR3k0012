front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_433-1a, image: WYG0897/WYG0897-0012c.png}
body:
  text: 太平御覧卷四百三十三宋李昉等撰人事部七十四勇一釋名曰勇踴也見敵踴躍欲擊之也說文曰勇氣也從力用聲尚書曰武王左杖黄鉞右秉白旄以麾曰逖矣西土之人稱爾戈比爾干立爾矛予其誓朂哉夫子尚桓桓孔安國曰桓桓武貌也如虎如􅆛如熊如羆于商郊又曰亦有熊羆之士弗二心之臣保乂王家言文武既聖則亦有勇猛如熊羆之士毛詩曰大叔于田刺荘公也叔多才而好勇不義而得衆大叔于田乘乘馬執轡如組兩􅆖如舞叔在藪火烈具舉袒裼暴虎獻于公所將叔無狃戒其傷女禮記曰魯荘公及宋人戰于乘丘縣賁父御卜國為右馬驚敗績公墜佐車授綏公曰未之卜也懸賁父曰他日不敗績而今敗績是無勇也遂死之又曰用人之智去其詐用人之勇去其怒用人之仁去其貪鄭𤣥曰用智者之謀勇者之斷仁者之施是以成治矣又曰商者五帝之遺聲也商人識之故謂之商齊者三代之遺聲也齊人識之故謂之齊明乎商之音者臨事而屢斷明乎齊之音者見利而讓臨事屢斷勇也見利而讓義也有勇有義非歌孰能保此左傳曰公及齊師戰于長勺公将鼓之曹劌曰未可齊人三鼓曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師既尅公問其故對曰戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之又曰晉襄公縛秦囚使莱駒以戈斬之囚呼莱駒失戈狼瞫取戈以斬囚禽之以從公乘遂以為右箕之役先軫黜之而立續簡伯狼瞫怒其友曰盍死乎瞫曰吾未獲死所其友曰吾與汝為難瞫曰周志有之勇則害上不登於明堂杜預曰周志書也明堂祖廟也所以策功序徳故不義之士不得升之死而不義非勇也共用之謂勇求右無勇而黜之亦其所也謂上不我知黜而宜乃知我矣子姑待之及彭衙既陳以其屬馳秦師死焉晉師從之大敗秦師君子謂狼瞫於是乎君子又曰晉郤克及齊侯戰於鞍齊髙固入晉師桀石以投人杜預曰桀擔也禽之而乘其車繫桑本焉以狥齊壘将至齊壘以桑樹繫車而走以自異也曰欲勇者賈予餘勇賈買也言已有餘勇欲賣之也又曰欒盈帥曲沃之甲以晝入絳初斐豹𨽻也著於丹書欒氏之力臣曰督戎國人懼之斐豹謂范宣子曰苟焚丹書我殺督戎宣子喜曰而殺之所不請於君焚丹書者有如日乃出豹而閉之督戎從之踰隐而待之督戎踰入豹自後擊而殺之又曰楚平王執伍奢無極曰奢之子材若在呉必憂楚國盍以免其父召之彼仁必来不然将為患王使召之曰来吾免而父棠君尚謂其弟員爾􅆘吴我将歸死吾知不逮我能死爾能報聞免父之命不可以莫之奔也親戚為戮不可以莫之報也奔死免父孝也度功而行仁也擇任而徃智也知死不避勇也父不可棄名不可廢爾其勉之相從為愈伍尚歸奢聞員不来曰楚君大夫其旰食乎楚人皆殺之又曰晉趙鞅圍衛報夷儀也初衛侯伐邯鄲午於寒氏城其西北隅而守之宵􅑒及晉圍衛午以徒七十人門於衞西門殺人於門中曰請報寒氏之役涉他曰夫子則勇矣然我徃必不敢啓門亦以徒七十人旦門焉步左右皆至如植日中不啓門乃退又曰楚白公勝將作難謂石乞曰王與二卿士皆以五百人當之則可矣乞曰不可得也市南有熊宜僚者若得之可當五百人矣乃從白公而見之與之言恱告之故辭承之以劒不動勝曰不為利諂不為威惕不泄人言以求媚者去之又曰楚白公奔山而縊其徒㣲之生拘石乞而問白公之死焉對曰予知其死所而長者使予勿言不言将烹乞曰此事也克則為卿不克則烹固其所也何害乃烹石乞又曰晉楚戰楚師薄於險叔山冉謂養由基曰雖君有命為國故子必射乃射再發盡殪叔山冉搏人以投中車折軾晉師乃止言二人皆有退人之能又曰齊荘公朝指殖綽郭最曰寡人之雄也州綽曰君以為雄誰敢不雄然臣不敏平隂之役先二子鳴十八年晉伐齊及平隂荘公為勇爵設爵位以命勇士殖綽郭最與焉州綽曰東閭之役臣左􅆖廹還於門中識其枚數識門枚數其可以與此乎周官曰司右掌羣右之政令凡國之勇力之士能用五兵者屬焉掌其政令河圖曰勇敢重瞳又曰烏一足名獨立見則主勇強家語曰仲由字子路少孔子九嵗子路性鄙好勇力志抗直冠雄鷄佩猳豚陵暴孔子孔子設禮稍誘之子路後儒服委質子路問君子尚勇乎孔子曰君子義以為上君子有勇而無義為亂小人有勇而無義為盗又曰孔子將之衞路出於蒲㑹公叔氏以蒲叛衞而止孔子弟子有公良儒者為人賢良有勇力挺劒而合衆将與之戰蒲人懼曰苟無􅆘衛吾則出子乃盟孔子出之又曰孔子北遊登乎農山子路子貢顔囘侍側孔子四望喟然而歎曰於斯致思無所不至矣二三子各言爾志吾將擇焉子路進曰由願得白羽若月赤羽若日鐘鼓之音上震於天旌旗繽紛下蟠於地由也當一隊而敵之必也攘地千里搴旗執馘唯由能之使二子者從我焉夫子曰勇哉史記曰毛遂隨平原君與楚合從言其利害日出而言之日中不决遂案劒厯階而上謂平原君曰從之利害兩言而决耳今日出而言從日中不决何也楚王謂平原君曰客何為者也平原君曰是勝之舍人也楚王叱胡不下吾乃與爾君言汝何為者也毛遂案劒而前曰今十步之内王不得恃楚國之衆也王之命懸於遂手叱者何且遂聞湯以七十里之地王天下文王以百里之壤而臣諸侯今楚地方五千里持㦸百萬此霸王之資也臼起小䜿子耳率數萬之衆興師以與楚戰一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人此百世之怨而趙之所羞而王不知惡合從者為楚非為趙也吾君在前叱者何也楚王曰先生之言是也遂定從而還又曰范睢說秦昭王夫以烏獲任鄙之力荆成孟賁許慎曰荆成古勇士孟賁衞人也慶忌夏育之勇焉而死死者人之所必不免也又曰亷頗者趙之良将也趙惠文王十六年亷頗為趙将伐齊大破之取晉陽拜為上卿以勇氣聞於諸侯又曰藺相如者趙人也為趙宦者令繆賢舍人趙惠文王時得楚和氏璧秦昭王願以十五城請易璧令曰臣賢舍人藺相如其人勇士有智謀宜可使乃使相如奉璧入秦秦王坐章臺得璧大喜傳璧以示美人及左右左右皆呼萬嵗相如視秦王無意償趙城乃前曰璧有瑕請指示王王授璧相如倚柱怒髪上衝冠謂秦王曰趙王齋戒五日使臣奉璧拜送書於廷何者嚴大國之威以脩敬也今臣至大王見臣列觀禮節甚倨得璧𫝊戯無償趙王城邑故臣復取璧大王必欲急臣臣頭今與璧俱碎於柱矣持璧睨柱欲以擊柱秦王恐其破璧乃辭謝固請召有司案圖十五城與趙相如見其詐乃謂曰趙王送璧時齋五日大王亦宜齋五日乃敢上璧秦王許相如就舍使其從者衣褐裹璧亡歸趙秦王齋竟引相如相如曰自秦繆公以来二十餘君未有堅盟約者臣恐見欺負趙故令人持璧歸間至趙矣王若割十五都與趙趙豈敢留璧得罪於大王臣知欺大王當誅請就湯鑊秦遂厚遇之既歸趙王以為賢大夫使不辱於諸侯拜為上大夫秦亦不以城與趙趙亦不與秦璧後秦王㑹澠池秦王飲酒酣曰寡人竊聞趙王好音請奏瑟趙王鼓瑟秦御史前書曰某年某月秦王與趙王㑹飲令趙王鼓瑟相如前曰趙王竊聞秦王善為秦聲請奏缶以相娱樂秦王怒不許於是相如前進缶因詭請之秦王不肯擊􅇲相如曰五步之内臣請以頸血濺大王矣左右欲刄相如相如張目叱之左右皆靡秦王不懌為一擊􅇲相如顧召趙御史書曰某年某月秦王為趙王擊􅇲秦之羣臣曰請以趙十五城為秦王壽相如亦曰請以秦之咸陽為趙王夀趙亦盛設兵待秦秦不敢動既罷歸國以相如功大拜為上卿位在亷頗右又曰曹沫者魯人也以勇力事魯荘公齊桓公與魯荘公㑹于柯而盟桓公與荘公既盟於壇上曹沫執匕首刼齊桓公桓公左右莫敢動問曰子将何欲曹沫曰齊強魯弱而大國侵魯亦已甚矣今城壊即壓境君其圖之公乃許盡還魯之侵地既已言曹沫投其匕首下壇北面就羣臣之位顔色不變辭令如故又曰樊於期奔燕丹計無所出鞠武曰燕有田光先生者其為人智深而勇沈可與謀太子因謁光光言荆卿太子曰願因先生得結交於荆卿可乎田光曰敬諾即起趨出太子送之至門戒曰丹所報先生言者國之大事也願先生勿洩也田光跪而笑曰諾見荆卿曰光與子相善燕國莫不知今太子聞光壮盛之時不知吾形已不逮也幸而教之曰燕秦不兩立願先生之留意光竊不自外言足下於太子願足下過太子於宫荆軻曰謹奉教田光曰吾聞之長者為行不使人疑之今太子告光曰所言國之大事也願先生勿洩也是太子疑光也夫為行而使人疑之非節侠也欲自殺以激荆卿曰願足下急過太子言光已死明不言也因遂自刎又曰秦将李信年少壮勇嘗以兵數千逐燕太子丹至於汙水卒得破丹太平御覽卷四百三十三
