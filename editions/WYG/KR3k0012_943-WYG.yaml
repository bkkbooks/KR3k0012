  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_943-1a, image: WYG0901/WYG0901-0358c.png}
body:
  text: 太平御覽卷九百四十三宋李昉等撰鱗介部十五擁劍鰌蝥彭螖竭朴沙狗招潮椅望石硱蜂江蘆虎石蕐􅀈􅨐鱟瑟􅲯海蟄鼂類越王笄石蚑陽遂足􅡷􅠦土肉蝦海月玉䖴陵龍石矩玳瑁蟕􅏲水母海鏡擁劍廣志曰擁劍似蟹色黃方二寸其一螯偏長如足大指長三寸餘有光其短細者如簮異物志云擁劍状如蟹但一螯偏大耳何遜詩云躍魚擁劍不分魚蟹也崔豹古今注曰蟚螖音骨小蟹也生海邉塗中食土一名長卿其有螯偏大者名擁劍一名執火其螯赤故謂之執火也俗謂之越王劍杜寳大業拾遺録曰吴都獻蜜蟹二千頭作如糖蟹法蜜擁劍四瓮擁劍似蟹而小一螯偏大吴都賦所謂烏賊擁劍是也鰌蝥祖台之志怪曰㑹稽山隂東郭氏女先與縣人私通此人估還於縣東靈慈橋女往入船就之因共寝接為設食鰌蝥食畢女將兩鰌蝥上岸去船還来至郭逢人語此女已死乃往省之尚未殯也發衾視之兩手各把一鰌螯嶺表録異曰鰌蛑乃蟹之巨者兩螯差大而有細毛如苔身上八足蝤蝥則足無毛後兩小足薄而濶俗謂之撥棹子與蟹有殊其大如升南人皆呼為蟹有大如小楪子者八月此物與人鬭往往夾殺人也彭螖爾雅曰螖蠌小者蟧螺属見捭蒼或曰即彭螖也似蟹而小滑澤二音晉書曰夏統字仲御㑹稽永興人也幼孤貧養親以孝聞睦於兄弟毎採捃求食星行夜歸或至海邉捉蟛􅒹以資養搜神記曰晉太康四年㑹稽彭螖化為䑕食稻為災崔豹古今注曰彭螖小蟹也一名長卿嶺表録異曰彭螖吳呼為越盖語訛也足上無毛堪食吴越間多以鹽藏而貨於市竭朴臨海異物記曰竭朴大於彭螖殻黒斑有文章螯正赤常以大螯障目以小螯取食嶺表録異曰竭朴乃大蟛蜞也殻有黒斑雙螯一大一小常以大螯捉食小螯分而食沙狗臨海異物志曰沙狗似彭螖壌沙為穴見人則走曲折易道不可得也招潮臨海異物志曰招潮小如彭螖殻白常背坎向外潮來舉螯不失常期俗言招潮水也嶺表録異曰招潮子亦蟛蜞之属殻𢃄白色海畔多潮潮欲来皆出坎舉螯如望故俗呼招潮也倚望臨海水土物志曰倚望居常顧晲西東其形如彭螖太行塗上四五進輙舉兩螯八足起望行常如此唯入穴中乃止石􅀈巨隕切臨海水土物志曰石􅀈大於蠏入足殻通赤狀如鵝卵蜂江臨海水土物志曰蜂江如小蟹兩螯足極小殻堅如石􅀈同不中食也蘆虎臨海水土物志曰蘆虎似彭蜞兩螯正赤不中食石蕐臨海水土物志曰石蕐附石肉淡㑹稽地理記曰鄮縣濱多石華􅀈􅨐上古候切下并亦切劉欣期交州記曰􅀈􅨐似瑇瑁龜頭鼈身蝦尾色班似錦文大如笠四足漫無指甲前有黒珠可以飾物臨海水土物志曰龜􅨐其狀龜形如笠味如黿可食卵大如鴨卵生噉味羙於諸鳥邜其甲黄㸃注云廣七八寸長二三尺有光色左思吴都賦曰􅔢鼊鯖鰐鱟胡遘切廣志曰鱟似便面負雌而行失雄則不能獨活出交阯南海中吴録地理志曰交阯龍編縣有鱟形如惠文冠青黒色十二足似蟹長五寸腹中有子如麻子取以作醤尤美裴淵廣州記曰鱟廣尺餘形如熨斗頭如􅎙蜋腹下有十二足南人重之以為鮓南越志曰張海口有鱟毎過海輙相積於背髙尺餘如㠶乗風而下逰嶺表録異曰鱟魚其殻瑩净滑如青瓷盌􅌯背眼在背上口在腹下青黒色腹兩傍為六脚有尾長尺餘三稜如梭莖常雌附雄而行捕者必雙得之若摘去雄者雌者即自止背附之方行腹中有子如菉荳南人噉之碎其肉脚和以為醤食之尾中有珠如粟色黃雌者小置之水中即雄者浮雌者沉瑟􅀈臨海水土物志曰瑟􅀈與鼂相似海䲀臨海水土物志曰海蟄如鼂狹後廣前其肉中食亦又多膏鼂類上音朝臨海水土物志曰鼂類似龜􅨐膓如羊胃可啖越王笄臨海水土物志曰越王笄如笄大正白長尺餘生海邊池中見即取之可必得中存來取即入土中石蚑去鼓切臨海水土物志曰石蚑生附石長三寸如小竹大有甲正黒中食陽遂足臨海水土物志曰陽遂足此物形狀背青黒腹下黄白有五足長短大小皆等不知頭尾所在生時體軟死即乾脆􅡷􅠦上音迷下音麻臨海水土物志曰􅡷􅠦􅔢鼊相似形大如䕠生渤海邊沙中肉極好噉一枚有三斛膏土肉臨海水土物志曰土肉正黒如小兒臂大者長五寸中有腹無口自有三十足如釵股大中食蝦爾雅曰鰝大蝦也蝦大者出海中長二三丈鬚長数尺今青州呼蝦魚為觴音鄔東觀漢記曰馬稜字伯威為廣陵太守奏罷鹽官振貧羸薄賦税蝗蟲飛入海化為魚蝦王隠晉書曰吴後置廣州以南陽滕脩為刺史或語脩蝦長一丈脩不信其人後故至東海取蝦鬚長四五尺封以示脩修乃服廣州記亦云金楼子曰舜攝天子有援耳貫胷之民來獻珠蝦世説曰虞嘯父為孝武帝侍中帝從容謂曰卿在閣下初不聞有獻替虞家富近海謂帝望其意對曰天時尚暖魚鼈蝦鮮未可致尋有所獻帝撫掌大笑異物志曰蝦種多􅀈最大中作脯南越志曰南海以蝦頭為盃中長数尺金銀􅍢之晉簡文以盛酒未及飲酒躍於外筮之曰三旬當後庭有告變者果有生子人面犬身博物志曰東海有物狀如凝血從廣数丈正方圓名曰鮓魚無頭目内無腹藏其所處衆蝦附之隨其東西越人煑食之嶺南異物志曰南海有蝦鬚四五十尺嶺表録異曰海蝦皮殻嫩紅色就中腦殻與前雙脚有鉗者其色如朱余嘗登海􅔓忽見窓版懸二巨蝦殻頭尾鉗足具全各七八尺首占其一分嘴尖如鋒刄嘴上有鬚如紅筯各長二三尺前雙脚有鉗云以此捉食鉗麄如人大指長三尺餘上有芒刺如薔􅅔枝赤而銛硬手不可觸腦殻烘透彎環尺餘何止於盃盂也北户録云滕修為廣州刺史有客語脩曰蝦鬚有一丈者堪為柱杖脩不之信故去東海取鬚長四丈以示脩方服其異寜蝦大者亦首尾尺餘閩越牽取其肉臠而為炙又渾以鹽藏自然紅色謂之紅蝦貢送白蝦肉薄而白瑩如水精廣人偏食之盖美而毒詢於閩川吴中悉無此類嶺表録異曰南人多買蝦之細者生切菜蘭香蓼等用濃醬醋先潑活蝦盖以生菜然後以熟飲覆其上就口封之亦有跳出醋楪者謂之蝦生鄙里重之以為異饌也王朗答魏文表曰夫張大網以漉蝤蝦熱九鼎以烹􅀢鼂應璩百一詩曰大龜既衰弊復欲宻其羅蚍蜉猶見得何云蝤與蝦葛龔與張季景書曰夜從劉伯宣舍西垂過龔家無飯噉􅀈蝦海月臨海水土物志曰海月大如鏡白色正圓常死海邉其指如搔頭大中食王䖴余招切臨海水土物志曰玉䖴如蜂長二寸廣五寸上大下小其殻中拄炙之味似酒陵龍臨海水土物志曰陵龍之體黄身四足形短尾長有鱗無角為南越嘉羞石矩嶺表録異曰石矩亦章舉之類身小而足長入鹽為乾燒食極美又有小者两足如帶曝乾後似射踏子故南中呼為射踏子也玳瑁嶺表録異曰玳瑁形狀如龜唯腹背甲有班㸃其大者悉似盤盖本草經曰玳瑁觧毒兼云辟邪余所居廣南日見盧亭海島夷人獲活玳瑁龜一枚以獻連帥嗣薛主王令生取甲小者三片帶於左臂上以辟毒龜被生揭其甲亦甚苦楚後養於使宅後北池伺其揭處漸生後遣盧亭送於海畔或云玳瑁若生帶之有蟲毒玳瑁甲即自揺動若死無此騐蟕􅏲上遵為切下音擕嶺表録異曰蟕􅏲俗謂之滋夷乃山龜之巨者人立其背可負而行産潮循山中鄉人採之取殻以貨金其殻須以木楔其肉龜吼如牛聲響山谷廣州有巧匠取其甲以為梳笓盃器之屬水母廣志曰水母如羊胃在海中常浮聞人聲沉水底可生切食沈懐逺南越志曰海岸間有水母東海謂之䖳音蜡張茂先博物志曰東海有物狀如凝血廣􅂾尺正方圎名曰水母無頭目所處則衆蝦附之隨其東西南北可煑食之異物志曰水母在海汎汎常浮其體正白常在水上浮也嶺表録異曰水母廣州謂之水母閩人謂之䖳癡駕切其形乃渾然一物有淡紫色大者如覆帽小者如盌腹下有物如懸絮俗謂之足而無口眼常有數十蝦寄腹下咂食其涎浮沉於水捕者或遇之即歘然而沒乃是蝦有所見耳越絶書云海鏡以蟹為腹水母以蝦為目也南中好食之海鏡嶺表録異曰海鏡廣人呼為膏葉盤兩片合以成形殻圎中甚瑩滑日照如雲母光内有少肉如蚌蛤腹中有小蟹子其小如豆黄而螯足俱備海鏡飢則蟹出拾食蟹飽歸腹海鏡亦飽余曽市得数箇騐之或廹之以火即蟹子走出離膓腹立斃或生剖之有蟹子活在腹中逡廵亦斃太平御覽卷九百四十三
