body:
  text: 太平御覽卷八百一十三宋李昉等撰珍寳部十二銅鐵金剛鍮石銅左傳僖中曰鄭伯朝楚楚子與之金既而悔之與之盟曰無以鑄兵故以鑄二鍾史記曰秦使徐福入海還偽辭曰臣見海中大神曰汝秦王之神薄得觀而不得取從臣往蓬萊見城宮闕有使者銅色而龍形光上照天又曰秦始皇收天下兵聚之咸陽為鐘鐻金人十二各千石置庭中又曰張孟談董安于之治晉陽也宮室之堂皆以練銅為柱又曰趙襄子使厨人以銅斗擊代王殺之而取其地又曰上使善相相鄧通當貧餓死文帝於是賜通蜀嚴道銅山得自鑄錢景帝立有告通盜出徼鑄錢盡没入一簮不得著身寄死人家又曰龍門碣石多銅鐵漢書曰武帝即位好鬼神之事李少君以却老方見上上有故銅器問少君少君曰此器齊桓公十年陳於栢寢已而案其刻果齊桓公器又曰黃帝采首山銅鑄鼎於荆山之下又曰王莽夢長樂宮銅人五枚並起立莽惡之使尚方䥴滅銅人應之又曰吳有豫童郡銅山招致天下人民亡命者盜鑄錢又曰凡律度量衡用銅者所以同天下齊風俗也銅為物至精不為燥濕寒暑變其節不為風雨暴露改其形介然有常似於士君子之行是以用銅也又曰王莽天鳯四年八月葬親之南郊鑄作威斗威斗者以五色銅為之又曰無雷國有銅華嶠後漢書曰靈帝時使掖庭令畢嵐鑄銅人四列於蒼龍𤣥武關外又曰修王堂殿鑄人四黃鐘四其音中黃鐘也于為黃鐘及天禄蝦蟆又鑄四出文錢天禄獸也范􅁮後漢書曰馬援善别名馬於交阯得駱越銅皷乃鑄為馬式又曰馬援征南海鑄銅柱於林邑國以極漢南界又曰崔烈納錢為司徒久之不自安從容問其子鈞曰吾居三公於議者何如鈞曰大人少𤣥英稱歴位卿守論者謂不當為三公而今登其位天下失望烈曰何為然也鈞曰論者嫌其銅臭烈怒舉杖擊之又曰薊子訓遁去不知所止後人復於長安東霸城見之與老翁共磨娑銅人相謂曰適見鑄此而已近五百歲矣魏畧曰明帝徙長安諸鐘簴駱駞銅人承露盤惟銅人不可致治霸城又鑄作銅人列坐於司馬門外吳志朱異口賦弩曰南岳之幹鐘山之銅應機命中獲隼髙墉晉書曰南陽王模督秦雍時關中饑荒百姓相噉加以疾癘盜賊公行模力不能制乃鑄銅人鐘鼎為釜器以易穀議者非之崔鴻十六國春秋後趙録曰石勒徙洛陽銅馬翁仲二於襄國列之永酆門九史曰後魏明帝初爾朱榮與從弟世隆密議廢立乃以銅鑄孝文及咸陽王禧等五王子像成當奉為主惟莊帝獨就唐書曰開元中許昌縣之唐祠掘地得古銅罇又隠起䨇鯉篆書文曰冝子又曰開元十三年宋州獻古銅鼎十九及鐘罄甑釜杓樽盤瓶各數四時宋城尉晉日休因版築獲而獻之又曰初天寳中天下州郡皆鑄爲𤣥宗擬其形容首冠環熖足成菡蓞與尊佛之像間列於殿堂號為貞容及山東熖率鎔毁而桓州獨存又曰文宗問宰臣曰弊輕錢重如何宰臣楊嗣復曰此事已久但且禁銅不可遽變其法法變即必擾人季珏曰今請加鑪鑄錢他法不可先有止令州府禁銅為器當今以銅為器而不知禁所病者制勅一下曾不經年而銅縣因循所以制令相次而視之為常今自淮而南至於江嶺皷鑄銅器列而為次州縣不禁市井之人逐圭刀之利以緡範為他器鬻之售利不啻數倍是則禁銅之令必在嚴切斯其要也又曰五臺山有金閣寺廣鑄為几塗金其上照曜山谷計錢巨億萬淮南子曰銅英青又曰銅不可以為弩抱朴子曰吳時發銅陵大冢中有銅為人十數頭皆長五尺又曰金簡記云以五月丙午日中時擣五石下其銅五石雄黃丹砂雌黃礬石曽青也皆擣粉之以金華池浴之内太一神鼎中下以桂薪燒之銅成以錬炭綱之取牡銅以為雄劍取牝銅為雌劍帶之以入河則蛟龍巨魚水神不敢進也欲知銅之牡牝當令童男童女俱以水灌銅以其在火中當赤時也則銅自分為兩段有凸起者則牡銅也凹陷者則牝銅也又曰山中夜見胡人銅之精也山海經曰昆吾之山其上亦多銅帝王世紀曰紂作銅柱令男女裸形縁之落則妲己笑國語管仲曰美金以鑄㦸劍試諸狗馬狗馬難為利者惡金以鑄鉏夷斤欘惡麄夷平也以削草平地也斤形似鉏而小欘所也廣雅曰白銅謂之鋈赤銅謂之錫漢武内傳曰上起神屋臺以銅為柱黃金塗之神異經曰入金山下四丈得丹陽銅張華曰此銅與金相似典術曰陶丹銅以為金賈誼書曰下不得鑄錢則民反耕田矣西京雜記曰髙祖初入咸陽宮周行庫藏見銅人十二枚坐皆髙三尺列在一筵上琴筑笙竽各有所執皆綴花彩儼然若生人筵下有銅管上口髙數尺出筵後其一管内空一管有繩大如指使一人吹管一人紐繩則琴筑笙竽皆作聲音與真樂不異虞喜志林曰建武中南郡男子獻銅皷皆有銘及吳時江水中鐘上有百餘字人莫有識者地中圖曰草莖黃秀下有銅器士幃曰銅出於石為鈴則小鑄鐘則大南中八郡志曰雲南舊有銀窟數千劉禪時歲常納貢亡破以來時往採取銀化為銅不復中用世語曰元康八年陵雲臺上生銅賈誼鵩鳥賦曰隂陽為炭萬物為銅張塋漢南記曰安帝見銅人以問侍中張陵對曰昔秦始皇時有大人十二身長五丈屨六尺皆夷狄之服見於臨洮此天將亡秦之證而始皇誤喜以為瑞乃鑄銅人以為像上曰何以知之對曰臣見傳載云其人胷上有銘林邑記曰林邑王范文鑄銅為牛銅屋行宮荆州記曰衡陽重安縣有岩塘故老相傳云此塘中有銅神今猶時聞銅聲水傳變緑魚為之死武當山記曰山有石室守有銅杖長三尺越絶書曰赤堇之山破而出錫若耶之谷涸而出銅歐冶因為純鈎之劍𤣥中記曰銅之精為童奴嶺表異録曰蠻夷之樂有銅皷焉形如腰皷而一頭有面皷面員一尺許面與身連全用銅鑄其身遍有蟲魚花草之狀通體均匀厚二分已來鑪鑄之妙脾為奇巧擊之響亮不下鳴鼉貞元中年驃國進樂有玉螺銅皷即知南蠻酋首之家皆有此皷也咸通中幽州張直方貶龔州刺史到任後修葺州城縁掘土得一銅皷載以歸京到襄漢以為無用之物遂捨於延慶禪院用代木魚鐵尚書曰華陽黑水惟梁州厥貢璆鐵尚書説命曰若金用汝作礪禮記月令曰季春之月命工師令百工審五庫之量金鐵皮革無或不良左傳昭二十九年曰晉趙鞅賦晉國一鼓鐵以鑄刑鼎著范宣子刑書各出功力共皷石為鐵一皷而足之春秋演圖曰八政不中則鐵飛春秋繁露曰蒸石取鐵非人意也禍福所從生亦非人意乎廣雅曰鐵朴謂之礦史記曰邯鄲郭縱以鐵冶成業與王者埓富也又曰卓氏宛以鐵冶致富漢書五行志曰武帝征和二年涿郡鐵官鑄鐵銷皆飛去時劉屈釐為太守後死象漢書曰髙祖又與功臣剖符作誓丹書鐵契藏之宗廟又曰張良以家財求客刺秦王得力士為鐵椎重一百二十觔秦始皇至慱浪沙中良與客俱擊秦皇帝又曰張敞弟武拜為梁相武曰當以柱後惠文冠彈治之耳柱後以鐵為柱本法官冠也又曰成帝河平二年沛郡鐵官冶鐵飛又曰李尋説王根曰政感隂陽猶鐵炭之低昻見效可信者天文志曰懸上炭也以鐵易土耳先冬夏至懸鐵炭於衡冬一端冬陽氣至炭仰而鐵低夏至炭低而鐵仰又曰㛨羌國有鐵自化作兵范􅁮後漢書曰赤眉降徐宣等曰自今日得降猶去虎口歸慈母世祖曰卿鐵中錚錚傭中佼佼耳又曰公孫瓚徙鎮易京慮有非常乃居於髙京以鐵為門魏畧曰弁辰國出鐵韓濊皆從市之諸市買皆用鐵而中國用錢也王隠晉書曰石苞自仲容初為縣吏買鐵鄴市市長沛國趙元儒見苞異之因與結交晉陽春秋曰肅慎土旡塩鐵晉書曰林邑國王范逸死奴文簒立文日南西卷縣夷帥范椎奴也常牧牛澗中獲二鯉魚化成鐵用以為刀刀成乃對大石鄣而呪之曰鯉魚變化冶成雙刀石鄣破者是有神靈進斫之石即瓦解文知其神乃懷之晉書載記曰赤連勃勃以鐵伐為氏曰使我宗族子孫剛鋭如鐵皆可伐人也齊書曰髙祖素儉約後宫物器欄檻以銅為飾者並改以鐵梁書曰康絢築浮山堰將合淮水漂疾復決潰衆患之或謂江淮多蛟能乘風雨決壞岸其性惡鐵因是引東西二冶鐵器大則釜鬵小則鋘鋤數千萬斤沉於堰所後漢書曰崔挺為光州刺史先是州内少鐵器用皆求之他境挺表復鐵官公私有賴莊子曰金鐵䝉以大緤載六驥之上則致千里淮南子曰上古之時未有鐵器磨蜃以䅶又曰鐵不可以為舟又曰豐水之深十仞不受塵埃投金鐵焉則形見於水山海經曰克光之山龍首之山其隂多鐵神異經曰南方有獸焉角足大小形狀如水牛皮毛黑如漆食鐵飲水其糞可為兵器其利如剛名曰嚙鐵俗云侔鐵𤣥黄經曰南方嚙鐵糞利為剛食鐵飲水腸中不傷也河邑曰赤帝有女譌鐵飛之異新序曰公孫敖曰夫玉石金鐵猶可琢磨以為器用而况於人論衡曰紂力能索鐵申鈎盧綝四王起事曰張方請帝遷都五千騎皆鐵纒稍魏武故事曰領長史王泌是吾披荆棘時吏忠而勤事心如鐵石語林曰許𤣥度出都為弟婿弟少愚恐人嘲㺯𤣥度為解而獲免其笑曰許𤣥度為弟張十重鐵步障異苑曰楚王與羣臣獵於雲夣縱良犬逐狡􅊵三日而獲之其腸似鐵良工曰可以為劍十洲記曰流沙在西海中上多山川積石名為昆吾治其石成鐵作劍光明洞照如水精狀割玉如切泥土廣洲記曰鄧平縣有鐵南方草物狀曰鐵出躭蘭州裸夷莊船載鐵至扶南賣之華陽國志曰公孫述廢銅錢鑄鐵錢百姓貨賣不行金剛晉起居注曰咸亨三年燉煌上送金剛王金中不淘不消可以切玉出天竺𤣥中記曰金剛出天竺大秦國一名削玉刀削玉如鐵刀削大者長尺許小者如稻米欲刻玉時當作大金鐶著手指間以割玉刀内鐶中以刻玉南州異物志曰金剛石也其狀如珠堅利無匹外國人好以餙玦環服之能辟惡毒南越志曰波羅基國出鋼珠朗照幽夜林邑記曰林邑王范明達獻金鋼指鐶抱朴子曰扶南有金剛可以刻玉體似紫石英外國人名為千延至於百文底著盤以鐵鎚打之不能傷以羖羊角扣之則漼然鍮石廣志曰鍮石似金亦有與金雜者洶之則分鍾㑹芻蕘論曰夫莠生似禾鍮石像金齊周捨謂沙門法雲曰孔子不飲盜泉之水法司何以捉鍮石皆爐荅曰檀越既得戴毒縣貧道何為不得執鍮唐書曰髙宗上元元年詔九品服淺碧並鍮石帶入􅀈王子年拾遺記曰石虎為四時洽臺皆用鍮石珷玦為徒岸太平御覽卷八百一十三
