body:
  text: 太平御覽卷七百六十四宋李昉等撰器物部九斤鏟鐁鑢鎌鍠斨鏵鋤錐鑚鉗泥饅橙籃篙籠籝斤釋名曰斤謹也板廣不可得制削又有節則用此釿之所以詳謹今平滅斧跡也崔鴻十六國春秋曰石虎馳獵無度晨出夜歸又多輕行躬行作所太子太保韋謏諌曰白龍魚服有豫且子居切之禍海若潛遊離葛陂之酷願陛下清宫蹕路思二神為先鑒不可忽天下之重輕行斤斧之間一旦有狂夫之變雖龍驤之勇不暇施也智士之計豈及設哉莊子曰郢人堊漫其鼻端若蠅翼使匠石斵之運斤成風盡堊而鼻不傷郢人立而不失容孫子曰何世之無才何才之無施良匠提斤斧造山林梁棟阿衡之材櫨柱楣椽之朴森然陳於目前大厦之器具矣夢書曰斤斧為選士取材夢得斤斧選士來鏟釋名曰鏟平削也博雅曰籖謂之鏟也鮑照蕪城賦曰鏟利銅山鐁音斯釋名曰鐁彌也有髙下迹以此鐁彌其上而平之鑢音慮說文曰鑢錯銅䥫也方言曰錯鑢名也韓詩曰如磨如錯䥥釋名曰鐮㢘也體亷薄其所刈稍稍取之似亷者也東觀漢記曰山陽郡人江伯欲嫁姊姊引鐮欲自割魏畧曰孟康字公休為𢎞農太守時出按行勅吏卒各持鐮自刈馬草說苑曰孔子聞哭聲甚悲進見之吾丘子也吾一曰虞䥥擁帶索而哭孔子問何哭之悲對曰吾有三失子曰願聞三失曰吾少好問學周遍天下還後吾親亡是一失也素尚髙節不事庸君臣節不遂二失也少擇交遊寡於親友老而無託是三失也請從此辭投水而死孔子曰弟子記之此足以為戒於是歸養親者十有二三風俗通曰鐮刀有葵積芻蕘之效鍠音横異苑曰長山郭悖元嘉十二年病亡後孫兒見悖著㡌布裙在靈床上呼孫與語云今得七日假假滿便去今有二小兒捉襆在門可就取也孫求襆即得又云汝叔從都還得鍠犁鐴音辟可試取㸔便以呈之仍以兩鐵拑加之鎗鎗作聲語孫曰我無復歸縁從此而絶斨毛詩豳七月曰取彼斧斨以伐逺揚又破斧曰旣破我斧又缺我斨鏵鍤附釋名曰鍤挿地起土也或曰削能有所穿削也或曰鏵刳也刳地為坎也晉書王談傳曰呉興王談父為隣人竇度所殺談年十嵗隂有復讐之志至年十八密索利鍤刃佯若耕耘經一橋下伺度船行還伏於草中談於橋上以鍤斫之歸罪有司太守孔嚴義其孝勇上請宥之又曰劉伶嘗乗鹿車携一壺酒使人荷鍤而随之謂曰死便埋我淮南子曰故伊尹之興土功也修脚者使之蹠鏵強脊者使之負土又曰禹身執畚鍤以為民先䟽河而導之九支鑿山而通九洛闢五湖而寧東海鋤說文曰鋤薅音蒿斫也钁大鋤也釋名曰鋤助也去穢助苗長齊人謂其柄為橿橿然正直也史記曰髙后立諸吕為王擅權用事朱虛侯年二十有氣力忿劉氏不得職常入侍髙后燕飲曰請為田歌太后笑曰若生為王子安知田乎章曰臣知之太后曰試為言田意章曰深耕穊種立苗欲䟽非其種者鋤而去之吕后黙然前漢書曰雖有鎡基不如逢時信矣樊噲夏侯灌嬰之徒方其鼔刀僕御販繒之時豈自知附驥尾勒功帝籍慶流子孫哉又曰倪寛受業孔安國貧無資賃作帶經而鋤作息輒誦讀又曰龔遂為渤海太守逐盜賊令曰持鋤鈎田器者為良民持仗器者為賊又曰嚴延年為河南太守京兆尹張敞聞延年用刑刻急以書諭之延年報曰河南天下咽喉二周餘弊莠盛穢稼何可不鋤也魏畧曰常林為諸生帶經耕鋤其妻餉之相敬如賔蜀志曰先主将誅張裕諸葛亮表請其罪曰芳蘭生門不得不鋤賈子曰商君專任刑法以刻薄為教秦人家富則出分家貧則出贅踑踞反目有若禽獸借父耰鋤慮有德色搜神記曰扶風楊道和於田中值雷奔止桑樹下霹靂擊之道和以鋤格之斷其右肱遂落地色如丹目如鏡伏候古今注曰曽子鋤𤓰有三足鳥集其冠世說曰管寧華歆共園中鋤菜忽見地有片黄金管釋鋤視與瓦石不異華捉而擲去應璩詩曰古有行道人陌上見三叟年各百餘歲相與鋤禾莠住車問三叟何以得此壽上叟前致辭内中嫗貎醜中叟前致辭量腹節所受下叟前致辭暮卧不覆首要哉三叟言所以能長久錐左傳曰錐刀之末將盡争之史記曰平原君曰夫賢士之處世譬若錐之處囊中其末立見戰國䇿曰蘇秦行而歸負書擔囊父母不與之言秦嘆曰皆秦之罪也乃夜發書陳箧數十得太公隂符伏而誦之讀書欲睡引錐自刺其股血流至踵王隱晉書曰梅陶及鍾雅數記餘事祖約輒困因謂之曰君汝潁之士利如錐我幽冀之士鈍如椎又曰王濬伐呉呉人於江險要害之處作鐵錐長丈餘暗置江中濬乃作大筏先行鐵錐輒著筏去又曰赫連勃勃性工巧然殘忍刻暴乃蒸土築城錐入一寸即殺作者錐若不入即殺行錐者并築之管子曰女有一錐然後成為女孫卿子曰無置錐之地而公侯不能與之争名仲尼是也莊子曰堯舜有天下子孫無置錐之地韓子曰堯舜無置錐之地於後世而德結吕氏春秋曰子産相鄭十八年刑三人殺三人錐刀之遺於道者莫之舉鑚尚書大傳曰古者中刑用鑚鑿物理論曰趙堯錐鑚之吏能探高祖深心致位丞相鉗漢書曰江充捕巫蠱燒鐵鉗灼强服之呉時外國傳曰扶南有訟官燒䥫令赤以鉗舉著手中行七歩無罪者手不燒有罪者手即焦泥鏝爾雅曰鏝謂之圬說文曰鏝䥫圬也左傳曰鄭子産相鄭伯如晉晉侯未見子産使盡壊其館之垣而納車馬焉曰文公之為盟主也崇大諸侯之館圬人以時塓館宫室論語曰宰予晝寢子曰朽木不可雕也糞土之墻不可圬也橙續晉陽秋曰何無忌母劉牢之姊也無忌與高祖謀夜於屏風裏制檄文母潛橙於屏風上窺之既知其謀大喜謂曰汝能如此吾讐恥雪矣世說曰謝中郎在壽陽敗臨奔走猶求玉帖橙也籃集異記曰丹陽張承先家有鬼長為其主取物㑹有客須蓴菜及鱧魚二十頭鬼將一小兒持籃至驃騎街十字路小兒睡覺㸔籃中已有蓴鱧䈪方言曰䈪所以注斛陳魏宋楚之間謂之䈪或謂之籮自闗而西謂之注箕續搜神記曰吳興人章苟者於田中耕乘小船以歸籮魚魽置船中著菰蘆中有物輙已食盡如此非一後日磨鍛於菰蘆中見一大虵偷食苟以鍛乂之中其蛇籠史記曰宋元王二年江使神龜使於河至泉陽漁者豫且舉􅃠而囚之置籠中見夢於王曰我為江使於河伯而􅃠當路豫且得我王有德義故來告愬又曰齊使淳于髠獻鵠於楚出邑門道飛其鵠掲空籠而獻之東觀漢記曰耿恭於疏勒城穿井十五丈不得水恭乃正衣冠向井再拜為吏士禱水身自率士負籠有飛泉涌出吏士驚喜皆稱萬歲晉中興徴祥說曰泰元中公王婦女髪緩􅁂傾髻以為盛飾用髪豐多不可恒戴乃先於籠上掖之名曰假髻或曰假頭至于貧民不能自辦自號無頭就人借髻亦服之妖也無幾時烈宗晏駕而天下騷動二十年中兵革不息孫恩之亂刑斬無數桓𤣥之後死者萬計凡被戮之家多亡頭首沈約宋書曰廢帝狂悖無道誅害羣臣公卿忌憚諸父並聚之殿内毆捶陵曵無復人理見安王休仁及太宗山陽王祐形體並肥壯帝以竹籠盛而秤之續述征記梁郭西有籠水發源長城而直北流於梁郭西注濟水或云齊之孝婦誠感神明湧泉發於内室潛以績籠蔽之人莫之知由是無谷汲之勞姑及家人疑而嫉之值出而搜其室既無所覩試發此籠而泉遂潰湧流漂居宇所以名曰籠水也莊子曰一雀過羿必得之或以天下為之籠則雀無逃矣是故湯以庖籠伊尹秦穆公以五羊之皮籠百里奚以其所好籠之也淮南子曰張天下以為之籠因江海以為之罟何亡魚失鳥之有乎又曰狐裘負籠甚可怪也世說曰宋處宗甚有𤣥理常得一長鳴雞愛而食之恒籠著忩間鷄遂作人語與處宗談論極有思理終日不輟處宗因此言巧大進楚辭曰鳯凰作鶉籠兮雖翕翅其不容傅咸班鳩賦叙云余楸蔚然成林閑居無為有時遊之顧見班鳩音聲可恱於是捕而畜之既以擾馴出之於籠無何失去後時時一來飛翔似如有戀聊為之賦成公綏鸚鵡賦曰小禽也以其能言觧意故為人所愛玩之以金籠升之以殿堂可謂珍之矣盖乃未得鳥之性也古詩曰羅敷好蠺桑採桑城南隅青絲為籠繩桂枝為籠鈎籝說文曰籝笭也漢書曰韋賢曰遺子黄金滿籝不如一經太平御覽卷七百六十四
