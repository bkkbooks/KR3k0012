body:
  text: 太平御覽卷八百四十六宋李昉等撰飲食部四嗜酒使酒嗜酒傳曰齊慶封好田而嗜酒與舍政舎封子慶封當國不自為政以付舍則以其内實遷于蘆蒲嫳氏易内而飲酒内室室物妻娶家數日國遷朝焉就於盧蒲氏朝見封傳曰鄭伯有嗜酒為窟室窟室地室而夜飲酒擊鍾焉朝至未已朝者曰公焉在家臣故謂伯有謂公其人曰吾公在壑谷壑谷窟也皆自朝布路而罷布路分散既而朝伯有朝鄭君則又将使子晳如楚歸而飲酒庚子子晳以駟氏之甲伐而焚之伯有奔雍梁雍梁鄭地醒而後知之遂奔許傳曰齊惠栾髙氏皆嗜酒栾髙二族皆出惠公信内多怨彊於陳鮑氏而惡之惡陳鮑夏有告陳桓子曰子旗子良將攻陳鮑氏亦告鮑氏桓子授甲而如鮑氏遭子良醉而騁欲及子良醉故驅告鮑文子遂見文子文子鮑國則亦授甲矣使視二子二子子旌子良也則皆將飲酒桓子曰彼雖不信聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐栾髙氏後漢書曰更始韓夫人尤嗜酒每侍飲見常侍奏事輙怒曰帝方對我飲正此時持事來乎起抵破書案又曰馬武為人嗜酒闊逹敢言時醉在御前面折同列言其短長無所避忌帝故縱之以為笑樂魏志曰徐邈字景山魏國初建為尚書郎時科禁酒而邈私飲至於沉醉校事趙達問曹事邈曰中聖人逹白太祖太祖甚怒渡遼将軍鮮于輔進曰平日醉客謂酒清者為聖人濁者為賢人邈性慎偶醉言耳坐刑後車駕幸許昌問邈曰頗復中聖人不邈對曰昔子反斃於榖陽御叔罰於飲酒臣嗜同二子不能自懲時復中之然宿瘤以醜見傳而臣以醉見識帝大笑顧左右曰名不虛立又曰時苗字德昌鉅鹿人也少清白為人疾惡建安中入丞相府出為夀春令令行風靡揚州治在其縣時􅃽濟為治中苗以初至欲往謁濟濟素嗜酒適㑹其醉不能見苖恚恨還刻木為人署曰酒徒蒋濟竪之於牆下旦夕射之州郡雖如其所為不恪然以其履行過人無若之何吳書曰鄭泉字文淵陳郡人博學有竒志而性嗜酒其閑居每曰願得美酒五百斛船以四時甘脆置兩頭反覆飲之備即住而啖肴膳酒㪷升减則隨益之不亦快乎晉書曰光逸字孟祖遇亂避難渡江依胡母輔之初至属輔之與謝鯤阮放畢卓羊曼桓彛阮孚散髪裸衣閉室酣飲以累日逸将排户入守者不聽逸便於户外脱衣露頭於狗竇中窺之而犬呌輔之驚曰他人决不能爾必我孟祖也遽呼入遂與飲不舎晝夜人謂之八逹又曰孟嘉為桓温叅軍嘉好酣飲愈多不亂温問嘉酒有何好而卿嗜之嘉曰未得酒中趣耳又曰孝武末年嗜酒好肉而㑹稽王道子昏醟尤甚唯狎昵謟邪於是國寳讒䛕之計稍行於主相之間宋書曰衡陽王義季素嗜酒自彭城王義康廢後遂為長夜飲畧少醒日文帝詰責曰此非陛下事業亦自損性皆汝所諳近長沙兄弟皆縁此致故将軍蘇徴躭酒成疾旦夕待盡一門無此酣法汝於何得之雖奉㫖酣縱不改成疾以至於終又曰范泰初為太學博士外弟荆州刺史王忱請為天門太守忱嗜酒醉輙累旬及醒則儼然端肅泰陳酒既傷生所宜深誡其言甚切忱嗟嘆乆之曰見規者衆未有若此者也又曰劉邕穆之子也河東王歆之與邕俱預元㑹並坐邕嗜酒謂歆之曰卿昔見臣今能見勸一盃酒不歆之因教孫皓歌答曰昔為汝作臣今與汝比肩既不勸汝酒亦不願汝年梁書曰王瞻為吏部尚書性嗜酒每飲或彌日而精神愈固不廢薄領武帝每稱瞻有三術射棋酒也南史曰陳暄文才俊逸尤嗜酒無節操遍歴王公室沉湎過差非度其兄子秀常憂之致書於暄友人何胥兾其諷諫暄聞之與秀書曰具見汝書與孝典陳吾飲酒過差吾有此好五十餘年昔吳國張公亦稱躭嗜吾見張公時伊已六十自言引滿大勝少年時吾今所進亦勝於往日老而彌篤唯吾與張季舒耳吾方與此子交歡扵地下汝欲笑吾此志耶昔阮咸阮籍同逰竹林宣子不聞斯言王湛能𤣥言巧騎父子呼為痴叔何陳留之風不嗣太原之氣巋然翻成可怪吾既寂寥當時朽病殘年産不異於顔原名未動於卿相若不日飲醇酒復欲安歸汝以飲酒為非吾以不飲為過昔周伯仁度江唯三日醒吾不以為少鄭康成一日三百盃吾不以為多然洪醉之後有得有失成厮養之志是其得也使次公之狂是其失也吾嘗譬酒猶水也可以濟舟亦可以覆舟故江咨議有言酒猶兵也兵可千日而不用而不可一日而不備酒可千日而不飲不可一日而不醉美哉江公可與同論酒矣汝驚吾墮車侍中之門䧟池武陵之第遍市朝野自言憔悴丘也幸苟有過人必知之吾平生所願身沒之後題吾墓云陳故酒徒陳君之神道若斯志意豈避南征之不復賈誼之慟哭者哉何水曹眼不識盃鐺吾口不離瓢杓汝寧與何同日醒與吾同日而醉乎政言其醒可及其醉不可及也速營糟丘吾将老焉後魏書曰夏侯道遷長子夬字元廷歴鎮逺将軍南兖大中正夬性好酒居喪不戚醇醪肥鮮不離口沽買飲噉多所費用父時田園貨賣畧盡人間債猶數千餘疋穀食至常不足弟妹不免饑寒於是昏酣而卒初夬與南人辛諶庾遵江文遥等終日逰聚酣飲之際仍相謂曰人生局促何殊朝露坐上相㸔先後間耳脱有先亡者於良辰美景靈前飲宴儻或有之庶共歆饗及夬亡後三月上巳諸人相率至夬靈前仍共酌飲時日晩天隂室中㣲闇咸見夬在坐衣服形容不異平昔時執盃酒似若獻酬但無語耳後魏書曰李元中徴拜侍中雖處要任初不以物務干懐唯以聲酒自娛大率常醉家事大小了不闗心園庭羅種菓藥親朋尋請必留連宴賞每挾携巨壺遨逰里閈每言寧無食不可使我無酒阮步兵吾師也孔少府豈欺我哉後自中書令復求為太常以其有音樂而多美酒故神武欲用為僕射文襄言其放逹當不可任以臺閣其子揆聞之請節酒元忠曰我言作僕射不勝飲酒樂爾愛僕射自宜勿飲酒北齊書曰黄門郎司馬消難左僕射子如之子是髙祖之壻勢盛當時因退食之暇尋髙季式與之酣飲留宿旦日重門並閉闗鑰不足消難固請云我是黄門郎天子侍臣豈有不叅朝之理且一宿不歸家君必當大恠今若又留我狂飲我得罪無辭恐君亦不免譴責季式曰君自稱黄門郎又言畏家君怪欲以地勢脅我邪髙季式自有處制初不畏此消難拜謝請出終不見許酒至不肯飲季式云我留君盡興君是何人不為我飲命左右賫車輪括消難頸又賫一輪自括頸命酒引滿相歡消難不得已欣笑而從之方乃俱脫車輪更留一宿是時失消難兩宿莫知所在内外驚異及消難出方具言之世宗在京輔政白魏帝賜消難美酒數石珍羞十轝并令朝士與季式親狎者就季式宅讌集其被優遇如此唐書曰王源中為户部侍郎翰林丞㫖學士性頗嗜酒嘗占對源中方沉醉不能起及醉醒同列告之源中但懐憂殊無悔恨他日又以醉不任赴召遂終不得大用以眼病求免所職列子曰子産之兄公孫朝聚酒千鍾積麴成封望門百步糟漿之氣逆於人鼻方其荒於酒也不知正道之安危人理之悔恡室内之有無九族之親踈雖水火兵刄交於前不知也王子年拾遺記曰晉有羗人姚馥字世芬充廐圉馬每醉中好言王者興亡之事常云九河之水不足以漬麴八藪之木不足以為蒸薪七澤之麋不足以充庖爼恒言渇於醇酒羣輩呼為渇羗武帝授以朝歌守馥辭願且為馬圉時賜美酒以樂餘年帝曰朝歌紂之舊都地有酒池故使老羌不復呼渴故辭遷酒泉太守地有清池其味若酒馥乗醉而拜受之世説曰劉伶病酒渴甚從婦求酒婦持器泣諫曰君飲酒太過非攝生之道必宜斷之伶曰甚善我不能自禁唯當祝鬼自誓斷之耳便可具酒肉婦從之伶跪而呪曰天生劉伶以酒為名一飲一醉五斗觧酲婦人之言慎不可聽便飲酒進肉隗然復醉又曰畢荗世云一手持蟹螯一手持酒盃拍浮酒池中便足了一生使酒史記曰季布為河東守孝文時人有言其賢者孝文召欲以為御史大夫復有言其勇使酒難近至留邸一月見罷布因進曰臣無功竊寵待罪河東陛下無故召臣此人必有以臣欺陛下者今臣至無所受事罷去此人必有毁臣者夫陛下以一人之譽而召臣以一人之毁而去臣此恐天下有識聞之有以窺陛下也上嘿然慙良乆曰河東吾股肱郡故特召君耳布辭之官又曰孝武建元元年灌夫入為太僕二年夫與長樂衞尉竇甫飲輕重不得夫醉摶甫甫竇太后昆弟也上恐太后誅夫徙為燕相數嵗坐法去官家居長安灌夫為人剛直使酒不好面䛕貴戚諸有勢在己之右不欲加禮必陵之諸士在己之左愈貧尤益敬灌夫家居雖富然失勢賔客益衰及魏其侯失勢亦欲倚夫引繩批根生平慕之後棄之者夫亦倚魏其而通列侯宗室為名髙兩人相為引重其游如父子然相得驩甚恨相知晩也夫有服過丞相丞相從容曰吾欲與仲孺過魏其侯㑹仲孺有服夫曰将軍乃肯幸臨况魏其侯夫安敢以服為辭請語魏其侯帳具将軍旦日早臨武安許諾夫具語魏其侯如所謂武安侯魏其侯與夫人益市牛酒夜洒掃早帳具至旦平明令門下候伺至日中丞相不來魏其謂夫曰丞相豈㤀之哉夫不懌曰夫以服請冝往乃駕自往迎丞相丞相特前戯許灌夫殊無意往及夫至門丞相尚卧於是夫入見曰将軍昨日幸許過魏其魏其夫妻治具自旦至今未敢嘗食武安鄂謝曰吾昨日醉忽忘與仲孺言乃駕往及飲酒酣夫起舞属丞相丞相不起夫從坐上語侵之魏其扶灌夫去謝丞相卒飲至夜極驩而去丞相嘗使籍福請魏其城南田不得由此怨灌夫魏其後丞相娶燕王女為夫人有太后詔召列侯宗室皆往賀魏其侯過灌夫與俱夫謝曰夫數以酒失得過丞相丞相今者又與夫有郄魏其曰事已解强與俱飲酒酣武安起為夀皆避席伏已魏其侯為夀獨故人避席其餘半膝席夫不悦起行酒至武安武安膝席曰不能滿觴夫怒因嘻笑曰将軍貴人也属之時武安不肯行酒次至臨汝侯臨汝侯方與程不識耳語又不避席夫無所發怒乃罵臨汝侯曰生平毀程不職不直一錢今日長者為夀乃效児女呫囁耳語武安謂灌夫曰程李俱東西宫衞尉今衆辱程将軍仲孺獨不為李将軍地乎灌夫曰今日斬頭䧟胸何知程李乎坐乃起更衣稍去續漢書曰時聖公聚客家有酒請游徼飲賔客醉歌言門烹兩都尉㳺徼後來用調羮味㳺徼大怒縳捶數百魏志曰吳質黄初五年朝京師詔大将軍及特進以下皆㑹質所太官給供具酒酣質欲盡歡時上将軍曹真性肥中領軍朱鑠性痩貭召優使説肥痩真負其貴恥見戯怒謂貭曰卿欲以部曲将遇我耶驃騎将軍曹洪輕車将軍王忠言将軍必欲使上将軍肥即自宜為痩真愈恚㧞刀瞋目言俳敢輕説吾斬爾遂罵坐質案劒曰曹子丹汝非屠機上肉吳質吞爾不嚙喉咀汝不嚙牙何敢恃勢驕耶鑠因起曰陛下使吾等來樂卿耳至此耶貭顧叱之曰朱鑠敢壊坐諸将軍皆還坐鑠愈恚還㧞劒斬地遂便罷也吳志曰權既為吳王歡宴之末自起行酒虞翻伏地佯醉不持權去翻起坐權於是大怒手㧞劒欲撃之侍坐者莫不惶遽唯大司農劉基起抱權諫曰大王以三爵後手殺善士雖翻有罪天下孰知之且大王能容賢畜衆故海内望風今一朝棄之可乎權曰曹孟德殺孔文舉孤於虞翻何有哉基曰孟德輕害士人天下非之大王躬行徳義欲與尭舜比隆曽何自喻於彼乎翻由是得免權因勑左右自今酒後言殺皆不得殺也又曰胡綜性愛酒後讙呼極意或推引杯觴搏擊左右權愛其才不備責也又曰凌統當擊賊圍先期統與督将陳勤㑹飲酒勤剛勇任氣因督酒陵鑠一坐舉罰不以其道統疾其侮慢面折不為具酒勤怒詈統及其父操統流涕不答衆因罷勤乗酒㓙悖又於道路辱統統不忍引刀斫勤數日死及當攻屯統曰非死無以謝罪乃率厲士卒身當矢石所攻一面應時破壊諸将乗勝大破之還自拘於軍正權壮其果毅許以功贖罪晉書曰庾純為河南尹以賈充姦佞與任愷共舉充西鎮闗中充由是不平充嘗宴朝士而純後至充謂曰尹行嘗居人前今何在後純曰且有小市不了是以來後世言純之先嘗有五百者充之先有市魁者故充純以此相譏焉充自以功隆望重意殊不平及純行酒充不時飲純曰長者為夀何敢爾乎充曰父老不歸供養将何言也純因發怒曰賈充天下匈匈由爾一人充曰輔佐二世蕩平巴蜀有何罪而天下為之匈匈純曰髙貴鄉公何罪衆坐因罷充左右欲執純中䕶軍羊琇侍中王濟佐之因得出充慙上表解職純懼上河南尹闗中侯印綬上表自劾晉裴楷傳曰石崇以功臣子有才氣與楷志趣各異不與之交長水校尉孫季舒嘗酣讌慢敖過度欲表免之楷聞之謂崇曰足下飲人狂藥責人正禮不亦乖乎乃止又曰裴遐嘗任平東将軍周馥坐與人圍碁馥司馬醉怒因曳遐墮地遐徐起還坐顔色不變復碁如故其性和如是宋書曰謝超宗為人恃才使酒多所陵忽在直省常醉上召見語及北方事超宗曰虜動來二十年矣佛去亦無如何以失儀出為南郡王中軍司馬梁書曰蕭穎達出為豫章内史意甚憤憤未發前預華林宴酒後於辭氣不悦沈約因勸酒欲以觀之穎逹大罵約曰我今日形容正是汝老䑕所為何忽復勸我酒舉坐驚愕帝謂之曰汝是我家阿五沈公宿望何意輕脱若此若以法䋲汝汝復何理達竟無一言惟大涕泣心愧之又曰謝善勛飲酒至數升醉後輙張眼大罵後雖貴賤親疎無所擇也時謂之謝方眼陳書曰柳芬為散騎常侍性愚戅使酒因醉乗馬入殿門為有司劾免於家風俗通曰陳國有趙祐者酒後自相署或稱亭長督郵祐復於外騎馬将絳幡云我使者也司徒鮑宣决獄云騎馬将幡起扵戯耳無他惡意又曰汝南張妙酒後相戲遂縳捶二十下又懸足指遂至死鮑昱决事云原其本意無賊心冝减死風俗通曰巴郡宋遷母名静往阿奴家飲酒遷母坐上失氣奴謂遷曰汝母在坐上無何㝠適遷曰腹痛再誤人各有氣豈止我遷罵奴乃持木枕擊遷遂死太平御覽卷八百四十六
