front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_941-1a, image: WYG0901/WYG0901-0346c.png}
body:
  text: 太平御覽卷九百四十一宋李昉等撰鱗介部十三貝螺蚌貝尚書禹貢曰淮海惟楊州島夷卉服厥篚織貝又顧命曰大貝鼖鼓在西房大貝如車渠商周𫝊寳之毛詩巷伯章曰萋兮菲兮成是貝錦貝如錦也又義疏曰有紫貝質白如玉紫㸃為文皆行列相當大者徑一尺二寸今九真交阯以為杯盤貢物也孝經援神契曰德至泉則江生大貝爾雅曰貝居陸贆方遥切在水者蜬水陸異名也貝中肉如科斗但有頭尾音含大者魧書大傳大貝如車渠車渠謂車􅀈即魧属魧如郎切小者鰿今細貝亦有紫色者出日南鰿音積元貝貽貝黑色貝也餘貾音池黃白文以黃為質白為文㸃餘泉白黃文以白為質黃為文㸃今之紫貝以紫為質黒為文㸃蚆音巴􅀶而頯頯者中夾廣兩頭鋭䪻逹䡄二音􅀈音困大而險險者汚薄􅜽小而橢即上小貝橢謂狭而長此皆説貝之形容橢他果切説文曰貝海介蟲也古者貨貝而寳龜也汲冡周書王㑹曰共家元貝共家吴越之蠻元貝昭貝也漢書曰文帝賜尉佗書佗因使者獻紫貝五百後周書曰歩落稽婦人多貫蜃貝以為飾隋書曰琉球國人用鳥羽為冠飾以珠貝唐書曰吐渾國婦人辮􅀈索後綴以珠貝又曰拂菻國有大貝車渠淮南子曰商拘文王於羑里於是散宜生乃以千金求天下之珍怪得大貝百朋五百為一朋也山海經曰號山之尾其上多玉魚水出焉其中多大貝又曰郭山濛水出焉其中多貝貝甲中肉如科斗但有頭尾又曰赤水之東有蒼梧之野爰有文貝紫貝也南州異物志曰交阯以南海中有大文貝質白文紫天姿自然不假雕琢磨瑩而光煥爛六韜曰商王拘周西伯昌於羑里太公與散宜生金千鎰求珍物以免君罪九江之浦有大貝百馮詩作朋也鹽鐡論曰教與俗改弊與世易夏后氏以𤣥貝周人以紫石相貝經曰珪延得大貝於昌陽弱泉為五帝瑶器也得拘􅈔何貝大如輪為文王夀穆王得大紫貝懸其殻於昭陽觀以消惡霧又曰頻水貝可以朗目南海貝如珠可以治水毒也浮貝投水則浮也醟貝使童子愚女子滛嶺表録異曰紫貝即砑螺也儋振夷黎海畔採以為貨南越志曰土産眀珠大貝即紫貝也螺易說卦曰離為蠃注曰剛在外也周官天官鼈人曰祭祀供蠯羸蚳以授醢人蠃䗂蝓也蠯畔也音啤國語曰大夫種謀吴曰今吳大荒其民必移就蒲蠡於東海之濱可伐廣志曰海文蠡数種其大者受一斗南人以為酒杯魏書曰荒亂卒乏粮榖袁術在江淮取給蒲蠃民相食州郡蕭條宋書曰元嘉末魏太武征彭城遣使求酒及柑橘張暢宣孝武帝命致螺杯雜粽土所珍北史曰隋劉臻性好噉螺淮南子曰羸􅫡愈蠋睨羸附螺也􅫡細長螺也蠋睨目中疾此皆治目之藥也人無故而求此物者必有蔽其眀也水經曰桂陽貞女峽西岸髙巖名貞女山山下際有石如人形髙七尺狀如女子故名貞女峡古来相傳有数女取螺於此遇風雨晝晦忽化為石山海經曰洵山洵水出焉南流注於閼澤其中芘蠃紫色螺也又曰邽山濛水出焉有螺魚身而鳥翼見則其邑大水搜神記曰謝端侯官人少孤為鄉人所養年十八恭謹自守後於邑下得一大螺如三升盆取置甕中每早至野還見有飲飯湯火處端疑之於籬外窺之見一少女從甕中出至􅍳下燃火便入問之女答曰我天漢中白螺素女天帝哀卿少孤使我權相為守舍炊煮待卿後得婦當還去今無故相伺不宜留此忽有風雨而去徐裒南方記曰馬軻羸大者圍九寸長四寸細者圍七寸長三寸南州異物志曰鸚螺狀如覆杯頭如鳥頭向其腹視如鸚鵡故以名肉離殻出食唯以筋自係於殻飽則入殻中若為魚所食殻乃浮出為人所得質白而文紫崔豹古今注曰蝸牛宛轉有草紡縳為結似螺髻中州異物志曰寄居山有蟲而長如蟸有脚似蜘蛛大無殻入蠡殻中又曰螺大者如筥一邉重可為酒噐又曰吒螺着海邊樹上見人吒如人聲可食又曰蒼螺江東人以為椀假猪螺日南有之厭為甲香鄧徳眀南越記曰平固水口下流數里有螺亭臨江昔一少女曽與伴俱乗小船江漢採螺既逼暮因停沙邉共宿忽聞騷騷如軍馬行湏臾乃見羣螺張口無數相與為灾遂共亂噉此女子同侣諸嫗當時惶怖不敢作聲悉走上岸至曉方還但見骨耳收歛䘮骨薄埋林際歸報其家經四五日間近所埋䖏飜見石冡穹窿髙十餘丈頭可受二十人坐也今四面有堦道髣髴人冡其頂上多螺殻新故相仍鄉𫝊謂之螺亭世語曰衛瓘大康永熈中家人炊飯堕地盡化為螺出足而行瓘終見誅廣五行記曰晋武帝時裴楷家吹黍在甑㦯變為螺其年楷卒又石崇家稻米化螺崇亦被誅嶺表録異曰鸚鵡螺旋尖處屈而朱如鸚鵡嘴故以此名殻上青綠斑文大者可受二升殻内光瑩如雲母装為酒杯竒而可翫又紅螺大小亦類鸚鵡螺殻薄而紅亦堪為酒器刳小螺為足綴以膠漆葛龔薦戴昱曰昱年六十二兄弟同居二十餘年及為宗老分舊業昱將妻子逃入虞澤結茅為室捃穫野豆拾掇羸蚌以自賑給蚌易通卦騐曰小雪雉入水為蜃爾雅曰蜃小者珧珧玉珧也即小蚌珧音遥説文曰􅪓步柄切蜯也鮚巨果切􅀈音蚌也漢書曰漢律㑹稽獻鮚醤二升蜯蜃之屬周書曰成王時具區獻蜃蜃大蛤也大戴禮曰十月雉入淮為蜃蜃者蒲蘆也春秋後語曰齊趙將伐燕蘇代為燕說趙王曰今者臣來過小水見小蜯方出暴而鷸啄其肉蜯合而挾其喙喙口也上啄其肉音張角切下喙音計穢切鷸曰今日不雨明日不雨必見蜯脯蜯謂鷸曰今日不出明日不出必見死鷸兩未相舍漁父得而併擒之今趙且伐燕燕趙乆相支以弊其衆臣恐強秦之為漁父也故願大王熟計之趙王於是乃止魏志曰孔融與韋康書云不意雙珠近出老蚌陳書曰武帝雅尚恭儉膳不過􅂾品私饗曲宴皆用瓦器蚌盤唐書曰太宗謂侍臣曰蜃性含水待月而水生木性懐火因燧而燄發人性含靈待學而成美墨子申屠狄謂周公曰賤人何可薄耶周之靈珪出於土石隋之明月出於蚌蜃少豪大豪出於汚澤天下諸侯皆以為寳狄今請退也淮南子曰季秋爵入大水為蛤又曰古者剡耜而耕摩蜃而耨剡利也耜挿属也蜃大蛤摩令利用之耨耨除苗穢又曰孟冬水始氷地始凍雉入大水為蜃雉陽鳥也三嵗而死極陽化隂故隨隂氣入水為蜃蜃大蛤也又曰眀月之珠出於蠬音蜃珠有夜光之明龍印月生於蠬中又曰毛羽者飛行之類也故屬於隂日者陽之主也是以春秋則群獸除日至而麋鹿觧觧角月者隂之宗也是以月虧而魚腦减月死而螺蚌瞧瞧减蹴也又曰古者民茹草飲水採樹木之實食蠃蠬之肉時多疹病毒傷之害又曰眀月之珠蜃蠬之病而我之利虎爪象牙禽獸之利而我之害我猶人也又曰蠬象之病人之寳也蠬大有蛤中有珠象牙還以自病故人得以為寳人之病將有誰寳之者乎人以利欲為病無人寳之故曰將有誰寳西京雜記曰長安始盛餙鞍馬競加雕鏤或一馬之餙直百金皆用白蜃為珂紫金為花以餙其上越地形記曰夏靖答車茂宏論鄮縣書曰其蜯蛤之屬目所希見耳所未聞徐裒南方記曰白珠蜯殻長三寸半漲海中深六七丈去岸四五十里永嘉郡記曰樂成縣木履山東帶採海門凢海採者皆由其門故以為名多香螺文蛤之屬博物志曰東南之人食水之産西北之人食陸畜産食水産者龜蛤螺蚌以為珍味不覺其腥臊也食陸畜産者狸兎䑕雀以為珍味不覺其羶燋也杜寳大業拾遺録曰南方林邑有大蚌盈車明珠至寸不以為貴國人不採交州異物志曰鳥許山居射翠取羽剖蜯探珠任昉述異記曰淮水中黃雀至秋化為蛤至春復為黄雀五百年化為蜃蛤嶺表録異曰珠池廉州邉海中有洲島島上有大池謂之珠池毎年脩貢珠户入池採珠皆採老蚌剖而取珠池在海上疑其底與海通珠如踠豆大常珠也如彈丸者亦時有得徑寸照室之珠卒不可遇也又取小蚌肉貫之以篾曝乾謂之珠母容桂人卒將脯燒之以薦酒又曰中有細珠如梁粟乃知珠池之蚌隨其大小悉腹中有珠矣延篤與髙義方書曰今兹以五經為鼎簠書傳為爼邉祖述堯舜憲章文武未暇蜯也宜勿以為念郭璞江賦曰紫蚢如渠洪蚶専車瓊蚌晞曜以瑩珠石􅎕應節而揚葩太平御覽卷九百四十一
