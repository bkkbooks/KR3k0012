body:
  text: 太平御覽卷一百五十六宋李昉等撰州郡部二叙京都叙京都下史記曰婁敬齊人因齊人虞將軍見上説曰陛下都雒陽豈欲與周室比隆哉上曰然敬曰陛下取天下與周室異周自后稷堯封之邰積德累善十有餘世成王即位而營雒邑以為此天下中也貢職道里均有德易以王無德易以亡凡居此者欲令務以德致人不欲依險阻令後世驕奢以虐人也今陛下與項籍戰滎陽爭成臯大戰七十小戰四十使天下之人肝腦塗地暴骨中野欲與成康比隆臣以為不侔矣夫秦被山帶河四塞之固夫與人鬬不搤其喉拊其背未能全勝上疑之及留侯言之上即日車駕西都賜敬姓劉氏拜郎中號奉春君漢書曰劉敬説上都闗中上疑之左右大臣皆山東人多勸上都雒陽曰雒陽東有成臯西有崤函背河向雒其固亦足恃張良曰雒陽雖有此固其中小不過數百里田地薄四面受敵此非用武之國夫闗中左崤函右隴蜀沃野千里南有巴蜀之饒北有胡苑之利阻三面而獨守以一靣東制諸侯安定河渭漕輓天下西給京師諸侯有變順流以下足以委輸此所謂金城千里天府之國劉敬説是也上即日車駕西都闗中又曰秦中形勢之國也地勢便利以下兵於諸侯譬如髙屋之建瓴水也又曰翼奉上書曰天道有常王道亡常亡常者所以應常也必有非常之主然後能立非常之功臣願陛下徙都於成周左據成臯右阻澠池前鄉崧髙後界大河師古曰鄉讀曰嚮介隔也碍也建滎陽扶河東南北千里以為闗而入敖倉地方里者八九足以自娛東厭諸侯之權西逺胡羌之難師古曰厭抑也音一葉反逺音于萬反陛下恭已亡為按成周之居兼盤庚之德萬歳之後長為髙崇後漢書建武元年冬十月癸丑車駕入洛陽幸南宫却非殿遂定都洛陽宫南有却非殿又曰時京師修起宫室濬繕城隍而闗中耆老猶望朝廷西顧班固感前代相如壽王東方之徒造構文辭終以諷勸相如作上林子虛賦吾丘壽王作士大夫論及驃騎將軍頌東方朔作客難及非有先生論其辭以諷喻為主也乃上兩都賦盛稱洛邑制度之美以折西賔淫佚之論又黄琬傳董卓秉政以琬名臣徴為司徒遷太尉卓議遷都長安琬與司徒楊彪同諫不從琬退而駮議之曰昔周公營洛邑以寧姬光武卜東都以隆漢天之所啟神之所安大業既定豈妄有遷動以虧四海之望也又曰杜篤以闗中表裏山河先帝舊京不宜改營洛邑乃上奏論都賦又曰王景建初七年遷徐州刺史先是杜篤上論都賦欲令車駕遷還長安耆老聞者皆動懷土之心莫不眷然佇立西望景以宫廟已立恐人情疑惑㑹時有神雀諸瑞章帝時有神雀鳳凰白鹿白鳥等瑞乃作金人論頌洛邑之美天人之符文有可採又曰陳紀遷侍中出為平原相謁董卓時欲徙都長安乃謂紀曰三輔平敞四靣險固土地肥美號為陸海今闗東兵起恐洛陽不可久居長安猶有宫室今欲遷何如紀曰天子有道守在四夷左傳之文宜修德政以懷不附遷移至尊誠計之末者愚以公宜事委公卿專精外任其有違命則威之以武今闗東兵起民不堪命若謙逺朝政率師討伐則塗炭之民庶幾可全若欲徙萬乘以自安將有累卵之危崢嶸之險也卓意甚恨而敬紀名行無所復言吳録曰張紘言於孫權曰秣陵楚武王所置名為金陵秦始皇時望氣者云金陵有王者氣故掘斷連岡改名秣陵有别小江可以貯船宜為都邑遂自京口遷都吳志先是有童謡云寧飲建業水不食武昌魚寜歸建業死不就武昌居於是吳主乃遷都建業按江表傳漢建安中蜀主曽宿於秣陵覩江山之秀勸帝居之初張紘常謂帝曰秣陵都楚威王所置名為金陵其地岡阜綿連嘗訪問故老云昔秦始皇東遊㑹稽曽改名此縣望氣者云金陵地形有王者都邑之氣故掘斷東岡改名秣陵今即所見其地有其氣象天之所㑹實宜為都邑帝深善之後聞蜀主語曰智者意同按吳録蜀主曽使諸葛亮至京口覩秣陵山阜歎日鍾山龍盤石頭虎踞帝王之宅晉書成都王頴以周馥為河南尹馥觀洛陽孤危乃建策迎天子都壽春曰不圖厄運戎狄交侵畿甸危逼僉以殷人有屢遷之事周王有岐山之徙方今河朔蕭條崤函阻泄宛都屢敗江漢多虞淮陽之地北阻險山南枕靈岳名州四帶有重險之固運漕四通無屢空之艱雖聖上神聰元輔明賢居儉守約用保宗廟未若相土遷宅以保永祚也載記曰劉元海之僣太史令宣于脩之言於元海曰陛下鳳翔龍興奄受大命然皇居仄陋非可久安平陽勢有紫氣兼陶唐舊都願陛下上迎乾象下協坤祥乃遷都平陽又石勒下令曰武都吾之豐沛萬歲之後䰟魄歸之初張賔謂勒曰今天下鼎沸戰爭方始夫得地者昌失地者亡邯鄲襄國趙之舊都依山憑險形勝之國可擇此二國而都之然後命將四岀授以竒略推亡固存兼弱攻昧王業成矣遂據襄國又苻堅自臨晉登龍門願謂羣臣曰美哉山河之固婁敬有言闗中四塞之國真不虛矣權翼對曰臣聞夏殷之都非不險也周秦之衆非不多也終於身殞南巢首懸白旗軀殘於犬戎國分於項籍何也德不脩故耳吳起有云在德不在險願陛下守之以德山河之固不足恃也江表傳曰孫皓欲徙都武昌百姓沿流供給殊以為患陸凱上疏曰臣聞有道之君以樂樂人無道之君以樂樂身樂人者其樂彌長樂身者不久而亡民者國之根也誠宜重其食愛其命民安則君樂矣又武昌土地危險磽确非王者建都安國養民之處船泊則沈漂陵居則峻危且童謡曰寧飲建業水不食武昌魚寧還建業死不就武昌居臣聞翼星為祥熒惑作妖童謡之言發自天心也後魏書孝文太和十八年遷都鄴登銅雀䑓魏御史大夫崔吉等曰鄴城平原千里運漕四通有西門吳起舊迹可致饒富在德不在險請都之孝文曰君知其一未知其二鄴城非常久之地石虎傾於前慕容滅於後國富主奢逞暴速敗且西有枉人山東有列人縣北有柏人城君子飲盗泉惡其名也遂止乃都洛陽三國典略梁元帝在江陵即位欲還都建鄴領軍將軍胡僧祐太府卿黄羅漢吏部尚書宗懔御史中丞劉㲄等曰建鄴氣已盡與虜止隔一江若有不虞悔無及也且渚宫洲數滿百當出天子陛下龍飛是其應也梁主令朝臣議之黄門侍郎周𢎞正尚書左僕射王褒曰帝王所都本無定處其如黔首萬姓未見輿駕入建入建鄴謂是列國諸王宜順百姓之心從四海之望時江陵人士咸云𢎞正東人志願東下恐非良計𢎞正折之曰若東人勸東謂為非計君等欲西豈成良䇿梁王笑之於後堂㑹文武五百人曰吾欲還建鄴諸卿以為何如衆皆愕然莫敢先對梁主曰勸吾者去左袒於是左袒者過半武昌太守朱買臣入勸梁主云建鄴舊都塋陵猶在荆鎮邊疆非王者宅願陛下弗疑致後悔也臣家在荆州豈不願陛下住但恐是臣富貴非陛下富貴耳乃召卜者杜景象決其去留遇兆不吉答云未吉景象退而言曰此兆為鬼賊也五經要義曰王者受命創始建國立都必居中土所以總天地之和據隂陽之正均統四方以制萬國者也王嬰古今通論曰崑崙東南方五千里謂之神州州中有和美鄉方三千里五岳之城帝王之宅聖人所生也鹽鐵論曰燕之涿薊趙之邯鄲魏之温軹韓之滎陽齊之臨淄楚之宛陳鄭之陽翟三川之二周富冠海内皆為天下之名都世説曰謝公時兵卒厮養逋亡多竄在南塘下諸船中或欲求一時搜索謝公不許云不容致此軰何以為京師譙周法訓曰王者居中國何也順天之和而同四方之統也管子曰凡立國都非大山之下必廣川之上髙無近旱而水用足下無近水而溝防省因天材就地利故城郭不必中規矩道路不必中準繩山海經曰青要之山實惟帝之宻都又曰帝之下都崑崙之墟又曰從極之都三百􅌇唯馮夷都焉馮夷河伯尸子曰舜一徙成邑二徙成都三徙成國堯聞賢之舉之草茅之中與之語禮樂不逆與之語政至簡而易行與之語道廣大而不窮於是妻之以皇媵之以英九子事之而託天下焉帝王世紀曰古公亶父是為大王以修德為百姓所附狄人攻之以皮幣事之不得免焉又事之以玉帛不得免焉又事之以犬馬不得免焉遂策杖而去止於岐山之陽邑於周地故始改國曰周豳人聞之曰仁人不可失也東循而奔從之者如歸市焉一年而成三千户之邑二年而都成三年五倍其初王於是改戎俗築城郭立宗廟設官司即詩所謂乃召司空乃召司徒俾立室家其繩則直是也周道之隆盖自此始兩京記曰隋文帝開皇二年以長安故城漢来舊邑彫殘日久今之宫室事近權宜不足建皇王之邑謀欲遷都僕射蘇威等議合帝㫖太史令庾季才奏當遷都帝曰吾乃今知天道開皇二年六月十八日移入新邑在漢故城之東南萬年縣界南直終南山子午谷北枕龍首原今朝堂即舊楊興村村門大樹今見在初周代有異僧名張公言詞多騐時村人於此樹下集張公忽来逐之曰此天子坐位何故坐左僕射髙熲總領其事太子右庶子宇文愷創製規模謂之大興城隋文初封大興公及登極縣門園池多取其名宫城東西五里南北二里四十步週迴十三里一百八十步髙三丈五尺又曰東都城隋大業元年自故都移於今所其地今周之王城自周敬王後漢並居於今故都至仁壽四年隋文帝營建於此初謂之東京有詣闕言事者稱一帝二京事非稽古乃改為東都為王世充所據世充改為洛州總管府尋又置陜東大行臺武德九年復為洛州都督府貞觀六年勅改東都舊宫為洛陽宫顯慶元年復為東都武太后號為神都神龍元年復舊又改為河南府洛水貫都有河漢之象初隋煬帝登北邙山觀伊闕顧曰此龍門耶自古何為不建都於此僕射蘇威對曰自古非不知以候陛下帝大悦盖其地北據山麓南望天闗水木滋茂川原形勝自古都邑莫有比也又曰太宗車駕始幸洛陽宫唯因舊宫無所改製終於貞觀永徽之間荒蕪虚耗置都後方漸修補龍朔中詔司農少卿韋機更繕造髙宗嘗謂韋機曰兩京朕東西二宅来去不恒卿宜善思修建始作上陽等宫至武太后遂定都於此日加營構而宫府備矣郡國志廬山在柴桑彭澤二縣之交疊障九成崇㘙萬仞山海經所謂天帝都揚雄蜀都賦曰蜀都之地古曰梁州張衡南都賦曰於顯樂都既麗且康陪京之南居漢之陽魯都賦曰彼齊諸儒散佩垂紳金聲玉色温故知新訪魯都之區城弔先王之遺貞左思蜀都賦曰盖兆基於上世開國於中古廟靈闗以為門包玉壘而為宇左思魏都賦曰魏地者畢昴之所應虞夏之餘人先王之桑梓列聖之遺塵考之四隈則八紘之中測之寒暑則霜露所均後漢杜篤論都賦非夫大漢之盛代藉雍土之饒得御外理内之術孰能致功若斯故創業於髙祖嗣傳於孝惠德隆於太宗財衍於孝景威盛於聖武政行於宣元侈極於成哀阼缺於孝平傳代十一厯載三百髙祖至平帝也十一代厯涉合二百一十四年此言三百者謂出二百年渉三百年德衰而復盈道微而復彰謂吕氏亂而文帝興昌邑廢而宣帝中興皆莫能遷於雍州而背於咸陽宫室寢廟山陵相望髙顯𢎞麗可思可榮羲農已来無兹著明夫雍州本帝皇所以育業周始祖后稷封邵公劉居豳太王居岐文王居酆武王居鎬並在闗中故曰育業也霸王所以衍功戰士角難之塲也衍廣也謂秦都闗中也太平御覽卷一百五十六
