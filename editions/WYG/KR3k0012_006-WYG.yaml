front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_006-1a, image: WYG0893/WYG0893-0080a.png}
body:
  text: 太平御覽卷六宋李昉等撰天部下星中星中天文録曰格擇星狀如炎火下大上鋭色黄白起地而上占曰格擇星見不種而獲不有土功必有大害又歸邪如星非星如雲非雲名曰歸邪司馬遷天官書曰歸邪見必有歸國者又六甲六星主分隂陽而紀節候故在帝傍所以布政教而授民則也又平星論語䜟曰平星主法合誠圖曰主建廷評主平天下之獄事若今廷尉之象又魚星主理隂陽事知雲雨之期也故讃曰漢中魚星知雲雨也占曰魚星明大河海水皆出又魚星明大則隂陽之氣和魚星忽不明而在則魚多魚星亡則少魚又郎位曰表郎烏府也注曰郎位周官之元士漢官之光禄中散諌議三署郎中是其職也或曰郎位今尚書郎也天象列星圖曰北極五星一名天極一名北極其第一星為太子第二星最明者為帝第三星為庶子餘二後宫屬也並在紫㣲宫中央故謂之中極其占明大則吉若變動則有憂今觀象之始始於中極者先尊以及卑自中以周外也其二人為首謂極第二星為首也又四輔四星在紫㣲宫中抱之紐星此為輔臣之位賛於萬幾其占以小而明則吉若㣲闇則官不理也又勾陳六星在紫㣲宫中華蓋之下天帝所居之宫亦䕶軍将軍之象占以明則吉又華蓋七星其柱九星合十六星如蓋状在紫㣲宫臨勾陳以䕃帝座占若正則吉若傾則凶也又女史一星在紫㣲宫内柱史北此婦人之官掌記宫中之事占以明則為記史直詞若不明則反是又柱下史一星在紫㣲宫内近尚書此左右掌記君之過其占以明則為史直詞若不明則詞不依過無真實也又尚書五星在紫㣲宫内東南之隅此八座大臣之象故讃曰尚書納言夙夜詔謀占以小而明則君臣和又北斗七星近紫㣲宫南在太㣲北是謂帝車以主號令運乎中央而臨制四方建四時均五行移節度定諸紀皆繫於圵斗其魁四星為璿其杓三星為玉衡故書云在璿璣玉衡以齊七政又其魁第一星為樞亦曰正是主陽徳天子之象二曰璿亦曰法星三隂則女主之位三曰璣亦曰合星主福四曰權亦曰伐星主天理伐無道五曰衡亦曰殺星主中央助四旁殺有罪六曰開陽七曰應星又一主天二主地三主火四主水五主土六主木七主金又一主秦二主楚三主梁四主吳五主隋六主燕七主齊又文昌六星在圵斗魁前如匡形故史遷曰斗魁戴匡其第六星名曰司禄此天之府計集所㑹也又宦者四星次帝座西南主侍者帝旁閹人也占以不明則吉若明則内臣專權又勢四星在太陽西南主刑餘人而用事者也占以不明為吉若明則閹宦用權又輔一星附圵斗杓第六星大臣之象也占欲其小而明則吉若大而明則臣奪君政若小而不明則臣不任職若明大與斗合者則國兵暴起又八榖八星在紫㣲藩之外五軍之北其八星一主稻二主黍三主大麥四主大豆五主小豆六主小麥七主粟八主麻子其占明則八榖成若暗則不成若一星不見則一榖不登若八星不見則國人有餬口之憂又房四星去氐十五度為明堂布政之宫占若移徙則國流逆均明則天下大同又傅説一星在尾後河中也蓋後宫女巫主祝祠神靈祈禱以求子嗣占若大而明則後宫多祈禱又杵三星在箕南主舂杵之用占若其縱則為豐若其横則為饑又農丈人一星在南斗南主農正官也占明則為豐稔若暗則為歉又南斗六星去牽牛二十六度四分之一為天廟丞相太宰之位主薦賢良授爵禄又主兵機魁南二星為天梁中央二星為天相北二星杓曰天厨庭亦為夀命之期將有天子之事其占斗星盛明則王道和平爵禄行若不然反是也又河鼓三星在牽牛北主軍鼓蓋天子三將軍也中央大將軍也其南左星左將軍也其圵右星右將軍也所以備關梁而拒難也昔傳牽牛織女七月七日相見者則主是也故爾雅云河鼔謂之牽牛又古歌曰東飛伯勞西飛燕黄姑織女時相見其黄姑者即河鼓也為吳音訛而然今之言者謂是列舍牽牛而㑹織女故為此分析令知斷其疑焉又曰四星在人星東南主舂臼占者覆則歲中人饑荒若仰則天下熟又内杵三星在人星旁主軍糧若占正月杵對臼口則吉若偏與臼不相當則軍糧絶又漸臺四星屬織女左足主晷刻律吕占若明正則隂陽調而律吕和不然則否也又弧九星在狼東南謂天方也主備盗賊常屬天向狼星又天錢十星在北落西北主財帛所聚占若明則府藏盈若不明則為虛耗又東璧二星去宫室十六度天子圖書之秘府也占若明則圖書集道術行小人退君子入若不然則天子好武臣賤文士稽古忠正之臣隱親黨邪曲之人用也又羽林四十五星二三而聚在壘壁南主天軍占若星聚明則國安寧若星稀而動揺則兵革出又進賢一星在太㣲宫東華門東平之道西主訪賢薦士也占若明則賢人進若不明則否也又太㣲宫垣十星在翼軫圵主天子之宫庭五帝之佐十二諸侯府也其外藩南二星間名曰端門東門一星為左執法廷尉之象又軒轅十七星在七星北如龍之體主雷雨之神後宫之象隂陽交感震為雷激為電和為雨怒為風亂為霧凝為霜散為露聚為雲氣立為虹蜺離為衒矞分為抱珥此十四變皆軒轅主之又天街二星在畢昴間主國界也街南為華夏之國街北為戎夷之國又玉井四星在參西主水泉石氏星經曰卷舌六星在昴圵主䜛佞言語之吏若移動多口舌兵起舌直天下無口舌星繁天下兵亂星少兵廢又天䜛星在卷舌中亦主誹謗又天廪四星在昴南主積聚黍稷供享祀及御膳稷星明豐暗儉又天苑十六星在昴畢如環状主天子苑囿五星守苑牛馬死又叅謀九星在參畢間一曰天弓星不欲明明則白衣㑹邊兵動又曰闕丘二星在南河主天子門闕諸侯之兩觀也又曰文昌六星如半月形斗魁前為天府主天下集計事第一星名上將第二名次將第三名貴相第四名司祿第五名司命第六名司法星光潤則天下安又曰大理星在斗中亦為貴人牢又為執法之宫又曰庫樓十五星在左角南噐府東一名天庫兵車之府星芒角兵起又曰招揺一星在梗河北主逺狄芒角則兵起又曰貫索九星在七公前為賤人牢牢旦星為門門欲開開即有赦星總見獄事繁豫章列士傳曰周騰字叔逹為御史桓帝欲南郊平明出叔達仰首曰王者象星今宫中宿策馬星不出動帝何出焉四更王子卒遂止關令内傳曰北斗一星面百里相去九千里置二十四氣四宿行四時五方立五星主五岳也黄石公記曰黄石鎮星之精也王子年拾遺記曰禹鑄九鼎擇雌金為隂鼎雄金為陽鼎太白星見九日不沒莊子曰夫道可傳而不可受可得而不可見傅説得之以相武丁奄有天下乘東維騎箕尾而比於列星列子曰星積氣之中有光耀者抱朴子曰辰星水精生𤣥武嵗星木精生青龍又人初受氣皆秉列星之精值聖宿則聖值賢宿則賢也尸子曰自井中視星所見不過數星自丘山以望則見始多也非明益也勢使然也私井中也公丘上也淮南子曰太㣲者太乙庭也紫宫者太乙之居也軒轅者帝妃之合也咸池者水魚之囿也天河者羣神之􅏱也天河者星名也􅏱猶門也又令雨師灑道使風伯清塵髙誘註曰雨師畢星也風伯箕星也又嵗星之所居五榖豐其對為衝嵗乃殃又四守者所司賞罰許慎注曰四守紫㣲軒轅咸池天河也家語曰巫馬期為單父令戴星出入以理人劉向説苑曰懸象著明莫大於日月察變之動莫著於五星也又秦胡亥立日月薄食山林淪亡枉矢光夜熒惑襲月河圗帝通紀曰彗星者天地之旂也國精符也地為山川山川之精上為星各應其州城分野為國作精神符驗也五姓占曰君薄徳義懦弱不勝任則太白失度經天作變易之象樂汁圖曰天宫紫㣲宫也勾陳後宫也大當正妃也大當鈎陳末大星也閣道圵斗輔天理貴人牢為貴人作牢獄也文昌宫天五官㑹府也𤣥戈招揺也皆備兵難之星梗河天矛也梗河一名天矛織女連營賤人牢連營貫索咸池五車五車咸池别名天關參旗伐也觜觹天廟也奎天豕也婁天矢也胃天倉也狼弧魚陵天船天苑卷舌天老人皆西方星名也栁主材木栁星主材木也鄭𤣥註曰日月遺其珠囊珠謂五星也遺其嚢者盈縮失度也黄石公隂謀秘訣法曰熒惑者火之精御史之象主禁令刑罰蔡邕月令章句曰天官五獸之於五事也左有蒼龍大辰之貌右有白虎大梁之文前有朱雀鶉火之體後有𤣥武龜蛇之質中有大角軒轅麒麟之信風俗通曰月與星並無光日照之乃光耳如以鏡光照日則影見壁月初見西方至望後光見東日所照也又東方朔太白星精黃帝時為風后堯時為務成子周時為老子越為范蠡齊為䲭夷言其變化無常也祖台之志怪曰吳未亡前常有紫赤氣見斗牛之間星官及諸善占者咸憂吳方興惟張茂先於天文尤精獨知為神劍之氣非江南之祥太平御覽卷六
