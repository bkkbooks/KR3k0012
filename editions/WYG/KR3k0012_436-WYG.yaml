  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_436-1a, image: WYG0897/WYG0897-0034c.png}
body:
  text: 太平御覽卷四百三十六宋李昉等撰人事部七十七勇四崔鴻十六國春秋前燕録曰将作大匠屯騎校尉朝郍侯青武邑人也機巧有算畧驍勇善騎射所在先登䧟陣慕容雋擬之張飛又曰成公都晉興元吳人也都騎猛有勇力陽勇之戰年十八横矛大呼賊不敢當獨歩當時擬之方叔論者咸曰當求於古造次無其比也後魏書曰來大干驍果善騎射遷中散至於朝賀之日大干常著御鎧盤馬殿庭莫不歎異嘗從太宗獵見虎在髙巖上大干持矟直前刺之應手而死太宗嘉其勇壮又為殿中給事又曰乙瓌代人也其先世統部落世祖時瓌父正知慕國威化遣瓌入貢世祖因留之瓌便弓馬善騎射手格猛獸膂力過人數從征伐甚見信侍尚上谷公主世祖之女也又曰庾葉為将有謀畧治軍清整常以少擊多士衆服其智勇名冠諸将又曰楊播字延慶自云𢎞農華隂人也除左将軍尋假前将軍隨車駕南討至鍾離師廽詔播領歩卒三千騎五百為衆軍殿時春水初長賊衆大至舟艦塞川播以諸軍渡淮未訖嚴練南岸身自居後諸軍賊衆遂集於是圍播數重播乃為圎陳以禦之身自摶擊斬殺甚多相拒再宿軍人食盡賊圍更急髙祖在北而望之既無舟船不得救援水勢稍减播領精騎三百立其船大呼曰今我欲渡能戰者出賊莫敢動遂擁衆而濟髙祖甚壮之賜爵華隂子又曰河間公齊烈帝之𤣥孫也少雄傑魁岸世祖愛其勇壮引侍左右從征赫連昌世祖馬蹶賊衆逼帝齊以身蔽捍决死擊賊賊乃退又曰賈思伯字仕休齊郡益都人也世祖即位加輔國将軍任城王之圍鍾離也以思伯持節為其軍司及失利思伯為後殿以思伯儒者謂之必死及至大喜曰仁者必勇常謂虛談今於軍司見之矣又曰于栗磾代人也少習武藝拜冠軍将軍道武畧于白登山見熊領數子道武顧謂栗磾曰能縳之乎栗磾曰能道武曰若摶之不勝豈不虛斃一壯士耶栗磾曰自可能致御前坐而制之尋而擒之晉将劉裕遺栗磾書曰黒矟将軍磾常好持黒矟故有其號又曰楊大眼武都氐王難當之孫也少驍勇趫捷走如飛電宣武南征尚書李冲典選統校征官大眼往求征焉冲不許大眼曰尚書不見知聽下官出一技便出長繩三丈繫之於髻而走繩直如矢馬馳不及冲大驚曰千載以來未有此人也遂用為軍主大眼顧謂同寮曰吾之今日所謂蛟龍得水之秋也自此一舉不復與諸君齊列矣所經戰皆武冠六軍大眼妻潘氏善射詣軍省大眼至攻戰遊獵之際潘氏以戎装齊鑣共轡乃至還營同坐幕對諸寮佐言笑自得大眼詣謂諸人曰此潘將軍也明帝拜光禄大夫淮泗之間童兒啼者恐之云楊大眼至無不立止王秉之初歸國也謂大眼曰吾在南時聞君之名以為眼如車輪及見君乃不異常人大眼曰皷旗相望瞋目奮發足使君目不能視何必大如車輪又曰文成帝名濬大武孫晃子也即位後冬大儺曜兵帝有勇力善騎射靈丘南有山髙四百餘丈詔羣官仰射山峰無能踰者帝彎弧發矢出山四十餘丈過山南二百歩遂詔刋石勒名紀功北齊書曰髙昻字傲曹膽力過人姿儀殊異其父次同為求嚴師加鞭撻昻不遵師訓專事馳騁每言男兒當横行天下自取富貴誰能耑讀書作老博士也其父曰此兒不滅吾族當大吾門以其昻藏傲物故以名字北史曰達奚震少驍勇走及奔馬周文嘗謂北校獵時有兔過周文前震與諸将競射之馬倒而墜震足不傾躓因歩射之矢中兔顧馬纔起遂囬身騰上周文喜曰非此父不生此子陳書曰蕭摩訶與齊戰有西域胡妙於弓矢絃無虛發衆皆憚之將戰吳明徹謂摩訶曰殪此胡則彼軍奪氣君有關張之名可斬顔良矣摩訶曰願識其形状當為公取之明徹召降人有識胡者云胡著絳衣樺皮弓兩端骨弭明徹遣人覘視知胡在陣仍自酌以飲摩訶摩訶飲訖馳馬衝齊軍胡挺身出陣前十餘歩彀弓未發摩訶遥擲銑鋧中其額應手而仆齊軍大力十餘人出戰摩訶又斬之又曰周鐵虎事梁河東王詧王僧辯擒欲烹之鐵虎曰侯景尚未滅柰何殺壯士耶僧辨奇之後降髙祖又曰任約引齊兵為冦髙祖遣侯安都拒齊軍於鍾山龍尾及北郊壇安都謂蕭摩訶曰卿有勇名千聞不如一見摩訶對曰今日令公見矣隋書曰宇文慶從武帝攻河隂先登攀堞與賊短兵接戰良乆中石廼墜絶而後蘇帝勞之曰卿之餘勇可以賈人也又曰楊𤣥感驍勇多力每戰親軍長矛身先士卒喑鳴叱咤所當者莫不震懾論者方之項羽又曰魚俱羅馮翊下邽人也身長八尺膂力絶人聲氣雄壯言聞數百歩又曰權武少果勁勇力絶人能重甲上馬嘗倒於井未及泉復躍而出其拳捷如此又曰長孫晟突厥之内大畏長孫摠管聞其弓聲謂為霹靂見其走馬稱為閃電王笑曰将軍震怒威行域外遂與雷霆為比一何壯哉唐書曰丘行恭從討王世充㑹戰於邙山之上太宗欲知其虛實強弱及與數十騎衝之直出其後衆皆披靡莫敢當其鋒所殺傷甚衆既而限以長堤與諸騎相失唯行恭獨從尋有勁騎數人追及太宗矢中御馬行恭乃廽騎射之發無不中餘賊不敢復前然後下馬抜箭以其所乘馬進太宗行恭於御馬前歩執長刀巨躍大呼斬數人突陣而出得入大陣貞觀中有詔刻石為人馬以象行恭抜箭之壯立於昭陵闕前又曰淮陽王道𤣥拜洛州總管及府廢改授洛州刺史五年劉黒闥引突厥冦河北復授山東道行軍總管師㳄下博與賊軍遇道𤣥帥騎先登命副将史萬寳督軍繼進萬寳與之不協及道𤣥深入而擁兵不進謂所親曰吾奉手詔言淮陽小兒雖名為将而軍之進止皆委吾今其輕鋭越濘交戰大軍道動必䧟泥溺莫如結陣以待之雖不利於王而利於國道𤣥遂為賊所擒全軍盡沒唯萬寳逃歸道𤣥遇害年十九太宗追悼乆之嘗從容謂侍臣曰道𤣥終始從朕見朕深入賊陣所向必剋意嘗企慕所以每陣先登盖學朕也惜其年少不遂逺圗因為之流涕又曰王君廓鎮幽州㑹突厥入冦君廓邀擊破之俘斬二千餘人獲馬五十疋髙祖大悦徴入朝賜以御馬令於殿庭乘之而出因謂侍臣曰吾聞藺相如叱秦皇目皆出血君廓往擊竇建徳将出戰李勣遏之君廓發憤大呼目及鼻耳一時流血此之壯氣何謝古人不可以常例賞之復賜錦袍金帯還鎮幽州又曰劉世讓為并州總管統兵屯於鴈門突厥處羅可汗與髙開道苑君璋合衆攻之甚急鴻臚卿鄭元璹先使在蕃可汗令元璹來説之世讓厲聲曰大夫柰何為夷狄作説客耶經月餘虜乃退及元璹還述世讓忠勇髙祖下制褒美之又曰李嗣業賊将李歸仁初以鋭師數來挑戰我師攅矢而逐之賊軍大至逼廹我騎突入我營我師􅅝亂嗣業謂郭子儀曰今日之事若不以身啖冦決戰於陣萬死而冀其一生不然則我軍無孑遺矣嗣業乃脱衣徒搏執長刀立於陣前大呼當嗣業刀者人馬俱碎殺十數人陣容方駐前軍之士盡執長刀而出如墻而進嗣業先登奮命所向摧靡又曰張濬拜諌議大夫其年冬宰相王鐸至滑臺兼充天下行營都統方徴兵諸侯奏用濬為都統判官時王敬武初破𢎞覇軍即大振累詔徴平虜兵敬武獨不赴援鐸遣濬往説之敬武已援偽命復怙強不迎詔使濬至謁見責之曰公為天子守藩王臣賫詔宣諭而侮慢詔使既未識君臣禮分復何顔以御軍民哉敬武愕然謝咎既宣詔軍士按兵黙然濬並召将佐集於鞠塲面諭之曰人生効忠仗義所冀粗分逆順懸知利害黄巢前日販鹽虜耳公等捨累葉天子而臣販鹽白丁何利害之可論耶今諸侯勤王天下響應公等獨據一州坐觀成敗賊平之後去就何安若能此際排難解紛陳師鞠旅共誅冦盜迎奉鑾輿則富貴功名指掌可取吾惜公輩捨安而即危也諸将改容引過謂敬武曰諌議之言是也即時出軍從濬入援京師晏子春秋曰昔夏之衰也有推移大戲殷之衰也有費仲惡來足走千里手裂兕虎任之以力淩轢天威專行勇力不顧乎義理是以桀紂以滅殷夏以衰又曰荘公奮乎勇力不顧於行尚勇力之士無忌於國貴戚不薦善福邇不引過故晏子見公公曰古者亦有徒以勇力立於世者乎晏子對曰嬰聞之輕死以行理謂之勇誅暴不避強謂之力故勇力之立也以行理義也今公自奮乎力勇不顧乎行暴尚勇力之士無忌於國身立威疆行流淫暴貴戚不薦善福邇不引過反聖王之徳而脩滅君之行用此存者嬰未嘗聞有也吳越春秋曰專諸豐邑人伍子胥初去楚如吳時遇之於塗專諸方與人闘其怒有萬人之氣甚不可當其妻一呼即還子胥怪而問其壯何夫子怒之盛聞一女子之聲而即折道寧有説乎專諸曰子視吾之儀寧類愚者耶何言之鄙也夫屈一人之下必申萬人之上子胥因相決之推顙深目虎口鷹背戾於從難知其勇士也又曰伍子胥見吳王僚望其顔色甚可畏長一丈大十六圍眉間一尺僚與語三日辭無復者賢人也子胥知王好之每入言語侃侃有勇壯之氣也韓詩外傳曰衛靈公晝寝而起志氣益衰使人馳召勇士孫㳙道遭行人卜商子夏曰何馳之疾也對曰君晝寝而起使我馳召勇士公孫㳙子夏曰徴㳙而勇若㳙者可乎御曰可子夏曰載我而反至君曰延先生上起召公孫㳙俄而㳙至入門抜劔疾呼曰商不我取若頭子夏顧叱之曰咄内劔吾将與君言勇於是君令㳙内劔而上子夏曰來吾嘗與子從君而北見趙簡子被髮杖矛而見我君從十三行之後趨而進曰諸侯相見不宜不朝服君不朝服行人卜商将以頭血濺君之衣矣使反朝服而見吾君者子耶我耶㳙曰子也子夏曰子之勇不若我一矣又與子從君而東至海曹齊君重鞇而坐從十三行之後趨進曰諸侯相見不宜相臨以其一鞇而去之者子耶我耶㳙曰子也子夏曰子之勇不若我二矣又與子從君於囿中於是兩猏逐我君與抜矛格而還之者子耶我耶㳙曰子也子夏曰子之勇不若我三矣所貴為士者上攝萬乘下不放乎匹夫外立節矜敵而不侵掠内禁殘害而君不危殆是士之所長而君子之所致貴也若夫以長掩短以衆暴寡淩轢無罪之民而威於閭巷之間者是士之甚毒而君子之所致惡也於是靈公避席曰嗟乎寡人雖不敏請從先生勇又曰孔子遊於景山之上子路子貢顔囬從焉孔子曰君子登髙必賦爾願言者何其丘将啓汝子路曰由願奮長㦸揚三軍乳虎在後仇敵在前披躩快志進救兩國之患孔子曰勇士哉又曰齊荘公出獵有螳螂舉足将搏其轉輪問其御曰此何蟲也對曰此螳螂者也其為蟲知進而不知退不量力而輕敵荘公曰以此為人必為天下勇士矣於是廽軍避之勇士歸之虞溥江表傳曰曹公出濡須號歩騎四十萬臨江飲馬孫權帥衆七萬應之使甘寧領二千人為前部督權宻勑寧使夜入魏軍寧乃選手下徤兒百餘人徑詣公營下便抜鹿角踰疊入營斬得數十級北軍驚駭鼓譟舉火如星寧已還入營作皷吹稱萬嵗因見權權曰聊以觀卿膽耳即賜絹十疋刀百口權曰孟徳有張遼孤有興霸足相敵也停住月餘北軍乃退孔演漢魏春秋曰許禇之為人長八尺餘大十圍容貌甚雄勇力絶人漢末賊起褚在汝南與少年相聚及宗族數千家共堅壁相保曹公脩兵汝南褚以其衆歸公公見而壯之曰此樊噲也即日拜都尉引入宿衛諸從禇俠客皆為虎士出入周旋不離左右軍中以禇力如虎癡勇號曰癡虎至今天下稱之皆謂其姓名也吳均齊春秋曰戴僧静㑹稽永興人臨湘侯副太祖在淮隂雅有人鑒見而賞之㑹匈奴卒至僧静應募出戰單刀直前虜騎奔退又斬三級時天盛寒乃脱衣口䘖三頭以刀挿背拍浮而還臨湘侯大賞之曰殺三人亦可反命矣進之於太祖石頭之役功冠諸将遂至貴顯蕭方等三十國春秋曰苻洛雄勇多力猛氣絶人坐制奔牛射洞犁耳苻堅深憚之故常為邉守又曰劉陽少驍猛甚有勇力手曵牛尾却行百歩又曰趙将麻秋令黒槊龍騰三千人馳擊謝艾軍艾左右擾動李偉勸艾乘馬艾不從乃下踞胡􅇃而麾衆趙人以為有伏懼而不進劉向列士傳曰秦召公子無忌無忌不行使朱亥奉璧一雙謝秦秦王大怒執朱亥着虎圈中瞋目視虎終不敢動殷氏世傳曰亮字子華少好學年十四舉孝亷到陽城遇兩虎争一羊馬不敢進於是亮乃按劔直至虎所斬羊腹虎乃各得其半去時人為之謡曰石里之勇殷子華暴虎見之合爪牙劉昭㓜童傳曰魏太祖㓜而智勇年十嵗嘗浴於譙水有蛟來逼自水奮擊蛟潜退於是浴畢而還弗之言也後有人見大蛇奔逐太祖笑之曰吾為蛟所擊而未懼斯畏蛇而恐耶衆問乃知咸驚異焉又曰秦舞陽者燕國人也年十二以勇氣聞人犯必殺之莫有敢近視者太平御覽卷四百三十六
