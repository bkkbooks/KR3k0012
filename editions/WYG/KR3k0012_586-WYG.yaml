body:
  text: 太平御覽卷五百八十六宋李昉等撰文部二詩文心雕龍曰詩者持也持人情性三百之蔽義歸無邪持之為訓有符焉爾人禀七情應物斯感感物吟志莫非自然堯有大唐之歌虞造南風之詩觀其二文詞逹而已及大禹成功九叙惟歌少康敗徳五子咸諷順美匡惡其來久矣自商暨周雅頌圓備四始彪炳六義環深子夏鑒絢素之章子貢悟琢磨之句故商賜二子可以言詩自王澤彌竭風人輟采春秋觀志諷誦舊章酬酢以為賓榮吐納而成身文逮楚國諷怨則離騷為刺秦王滅典亦造仙詩漢初四言韋孟首唱匡諌之義繼軌周人孝武愛文柏梁列韻嚴馬之徒屬詞無方至成帝品錄三百餘篇朝章國采亦云周備而詞人遺翰莫見五言所以李陵班婕妤見疑於後代按召南行露始肇半章孺子滄浪亦有全曲暇豫優歌逺見春秋邪徑童謡近在成世閱時取徴則五言久矣又古詩佳麗或稱枚叔其孤竹一篇則傅毅之詞比采而推固兩漢之作乎觀其結體散文直而不野宛轉附物惆悵切情實五言之冠冕也至於張衡怨篇清典可味仙詩緩歌雅有新聲暨建安之初五言騰踴文帝陳思縱轡以騁節王徐應劉望路而爭驅並隣風月狎池苑述恩榮序酣宴慷慨以任氣磊落以使才造懐指事不求纎宻之巧驅詞逐貌唯取昭晰之能此其所同也及正始明道詩雜鮮新何晏之徒率多浮淺唯嵇志清峻阮㫖遥深若乃應璩百一獨立不懼詞譎義貞魏之遺直也晉世羣才稍入輕綺張左潘陸比肩詩衢采縟於正始力柔於建安或析文以為妙或流靡以自妍此其大畧也江左篇製溺於𤣥風嗤笑徇務之志崇盛忘機之談袁孫以下雖各有雕采而詞趣一揆莫與爭雄所以景純仙篇挺抜而為雋也宋初文詠體有因革荘老告退而山水方滋儷采百字之偶爭價一句之竒情必極貌以冩物辭必窮力而追新此近代之所競也故鋪觀列代而情變之數可鑒撮舉同異而綱領之要可明矣若夫四言正體則雅潤為本五言流調則清麗居宗華實異用惟才所安故平子得其雅叔夜含其潤茂先凝其清景陽振其麗若兼善則子建仲宣偏美則太冲公幹然詩有恒裁思無定位隨性適分鮮能圓通若妙識所難其易也将至忽以為易其難也方來矣至三六言則出自篇什離合之發則萌於圖䜟迴文所興則道原為始聨句共韻則柏梁餘製巨細或殊情理同致總歸詩囿故不繁云列子曰堯微服遊於康衢聞兒童謡曰立我烝民莫匪爾極不識不知順帝之則堯問曰孰教爾為此言童兒曰我聞之大夫問大夫大夫曰古詩也文章流别論曰詩言志歌詠言古者采詩之官王者以知得失古詩之四言者振鷺于飛是也漢郊廟歌多用之五言者誰謂雀無角何以穿我屋是也樂府亦用之六言者我姑酌彼金罍是也樂府亦用之七言者交交黄鳥止于桑是也世於俳諧倡樂用之古詩之九言者泂酌彼行潦挹彼注兹是也不入歌謡之章故世希為之夫詩雖以情志為本而以聲成為節顔延之庭誥曰荀爽云詩者古之歌章然則雅頌之樂篇全矣以是後之詩者率以歌為名及春勒望岳漢祀郊宫辭著前史者文變之髙制也雖雅聲未至宏麗難追矣逮李陵衆作緫雜不類元是假托非盡陵制至其善冩有足悲者摰虞文論足稱優洽柏梁以來繼作非一纂所至七言而已九言不見者将由聲度闡誕不協金石至於五言流靡則劉楨張華四言側宻則張衡王粲若夫陳思王可謂兼之矣鍾嶸詩評曰古詩李陵班婕妤曹植劉楨王粲阮籍陸機潘岳張協左思謝靈運等十二人詩皆上品曹植詩其原出於國風其骨氣髙竒辭采華茂情兼怨雅體備文質粲溢今古卓爾不羣嗟乎陳思之於文章也譬人倫之有周孔鱗羽之有龍鳳音樂之有笙竽女工之有黼黻若孔門用詩則公幹升堂思王入室景陽潘陸自可坐於廊廡之間劉楨文源出古詩仗氣愛竒動多振絶真骨凌霜髙風跨俗但氣過其文雕潤恨少然自陳思已徃楨稱獨歩張協字景陽詩其原出於王粲文章華浄實少病累又巧搆形似之言雄於潘岳靡於太冲風流調逺實曠代之髙手其辭采葱蒨音韻鏗鏘使人味之亹亹不倦阮籍詩其原出於小雅雖無彫斵之巧而詠懐之作可以陶性靈發幽致言在耳目之内情寄八荒之表洋洋乎㑹於風雅者矣陶潜詩其原出於應璩又協左思風力文體省淨殆無長語篤意真古辭興婉媚至於歡言酌春酒日暮天無雲風華清靡豈直田家語邪古今隠逸詩之宗也漢書曰王襃字子淵蜀人也宣帝時脩武帝故事講論六藝劉向張子僑等待詔金馬聞襃有俊才使襃作中和樂職如淳曰言王政中和在官者樂其職宣布詩蓺林曰宣帝詩歌之名選好事者依鹿鳴之聲習而歌之魏書曰李康字蕭逺性介立不和俗為鄉里所嫉故官不進嘗作遊九疑詩明帝異其文問左右斯人安在吾欲擢之因起為隰陽長卒晉書載記曰李夀奢侈殺人以立威其臣龔壮作詩七篇託言應璩以諷夀夀報曰省詩知意若今人所作賢哲之話言也古人所作死鬼之常辭耳又桓𤣥既簒卻引用孟㫤問其人於劉邁邁曰臣在京口不聞㫤有異能但父子紛紛更相贈詩爾𤣥笑之而止宋書曰顔延之與陳郡謝靈運俱以詞彩齊名而遲速懸絶文帝嘗勅各擬樂府池上篇延之受詔便成靈運久之乃就延之嘗問鮑昭已與靈運優劣昭曰謝五言如初發芙蓉自然可愛君詩若鋪錦列繡彫繪滿眼鍾嶸詩評云靈運詩其原出於陳思雜有景陽之體嶸謂若人興多才博寓日輙書内無文思外無遺物其繁且富宜哉然名章秀句處處間起妙曲新聲絡繹奔㑹類青松㧞木白玉映沙未足以貶髙才也又謝恵連方明之子也十嵗能屬文族兄靈運嘉賞之云毎有篇章對恵連輙得佳語嘗於永嘉西堂思詩竟日不就忽夢恵連則得池塘生春草大以為工常云此語有神助非余語也趙録曰徐光字季武年十四五為将軍秣馬光但日書栁吾浪反杜為詩頌不親馬事梁書曰丘遲字希范辭采麗逸時有鍾嶸詩評云范雲婉轉清便如流風廻雪遲詩㸃綴映媚似落花依草雖淺於江淹而秀於任昉其見稱如此三國典畧曰周文州氐酋反制鄜州刺史髙琳討平之軍還帝宴羣公卿士命賦詩言志琳詩云寄言竇車騎為謝霍将軍何以報天子沙漠静妖氛帝大恱曰獯獫陸梁未時款塞卿言有騐國之福也又齊蕭慤字仁祖為太子洗馬嘗於秋夜賦詩其兩句云芙蓉露下落楊栁月中踈曰蕭仁祖之斯文可謂雕章間出昔潘陸齊軌不襲建安之風顔謝同聲遂革太初之氣自漢逮晉情賞猶自不諧河北江南意製本應相詭顔黄門云吾愛其蕭散宛然在目而盧思道之徒雅所不愜箕畢殊好理固宜然又王晞為常山王司馬晞澹泊寡慾不以世務為累時謂之物外司馬嘗遊晉祠賦詩曰日落應歸去魚鳥見留連時常山王遣使召晞晞不時至明日丞相西閣祭酒盧思道問晞昨被召以來頗得無以魚鳥致恠乎晞笑曰昨晚陶然頗以酒漿被責卿輩亦是留連之一物豈直魚鳥而已又辛徳源嘗於邢邵座賦詩其十字曰寒威漸離風春色方依樹衆咸稱善後王昕逢之謂曰今日可謂寒威離風春色依樹隋書曰楊素嘗以五言詩七百字贈潘州刺史薛道衡詞氣宏抜風韻秀出亦為一時之作未幾而卒道衡嘆曰人之将死其言也善豈若是乎唐書文苑傳曰元萬頃乾封中從英國公李勣征髙麗為􅈙東道管記時别帥馮本以水軍援裨将郭待封船破失期待封欲作書與勣恐髙麗知其救兵不至乗危迫之乃令萬頃作離合詩贈勣勣不達其意大怒曰軍機急切何用詩為必斬之萬頃解釋之乃止又錢起能五言詩初從鄉薦家寄江湖嘗於客舍月夜獨吟遽聞吟於庭曰曲終人不見江上數峯青起愕然攝衣視之無所見矣以為鬼怪而志之及起就試之年李暐所試湘靈鼓瑟詩題中有青字起即以鬼謡十字為落句暐深嘉之稱為絶倡是嵗登第又元稹聰警絶人年少有才名與太原白居易為友稹為詩善状詠當時風態物色當時言詩者稱元白焉自衣冠士子至閭閻下俚悉傳諷之號為元和體穆宗在東宫有妃嬪左右嘗念及稹篇詠者宫中呼為元才子至是極承恩遇嘗為長慶宫詞數十百篇閭里競為傅唱又劉禹錫晩年與少傅白居易友善居易詩筆文章時無在其右者嘗與錫倡和徃來因合其詩而序之曰彭城劉夢得詩豪者也其鋒森然少敢當者予不量力徃徃犯之夫合應者聲同交爭者力敵一徃一復欲罷不能一二年來日尋筆硯同和贈答不覺滋多太和春已前紙墨所存者凡一百三十八首其餘乗興扶醉率然作者不在此數嘗戯㣲之云僕與足下二十年來為文友詩敵幸也亦不幸也吟詠情性播揚名聲其適遺形其樂㤀老幸也然江南士女諸才子者多云元白以子之故使僕不得獨歩於呉越間此亦不幸也今垂老復遇夢得非重不幸耶夢得文之神妙莫先於詩若妙與神則吾豈敢如夢得雪裏髙山頭白早海中仙果子生遲沉舟側畔千㠶過病樹前頭萬木春之句之類真神妙矣在在處處應有靈物䕶持豈止兩家子弟秘藏而已世説曰夏侯湛作周詩成示潘岳曰此文非徒温雅乃見孝弟之性潘因此遂作家風詩又孫秀收石崇潘岳先送石棄市潘後至石謂潘曰安仁卿亦復爾耶潘曰可謂白首同所歸乃成其詩䜟又孫子荆除婦服作詩以示王武子曰未知文生於情情生於文覽之悽然増伉儷之重文士傳曰張秉自知短命乃作千年歌詩以自傷顔氏家訓曰王籍入若耶溪詩云蟬噪林逾静鳥鳴山更幽江南以為文章斷絶物無異議簡文吟咏不能㤀之金樓子云有何贈智者常於任昉座賦詩而其詩言不類任云卿詩可謂髙厚其人大怒曰遂以我詩為茍號國朝傳記曰薛道衡聘陳為人日詩云入春纔七日離家已二年南人􅅓之曰是底言語誰謂此虜解作詩及云人歸落鴈後思發在花前乃喜曰名下固無虛士國朝雅記曰沈佺期以工詩著名燕公張說嘗謂之曰沈三無詩直須還他第一國史補曰徳宗以二月一日為中和節宴百僚賦詩羣臣奉和詔冩本賜戴叔倫於容州天下榮之又杜祐在淮南進崔叔清詩百篇上曰此惡詩焉用進時人謂之勅准惡詩陸機文賦曰詩緣情而綺靡太平御覽巻五百八十六
