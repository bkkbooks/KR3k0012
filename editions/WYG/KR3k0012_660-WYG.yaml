  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_660-1a, image: WYG0898/WYG0898-0844c.png}
body:
  text: 太平御覽卷六百六十宋李昉等撰道部二真人上太上經曰太㣲天中有二十四氣混黄雜聚者有名無氣變化為真人道之積成托形立影與時翺翔有名無體謂之真人八素真經曰若精勤得道者皆當書以蕋簡刻以瓊文位為上清在真人上又曰龍衣鳯帔虎帶皆是羣真所獻於帝皇真誥曰中皇君者天帝君之弟子也生知長生之要天仙之法夙㑹𤣥感於是太上受以帝君九真之經八道秘言之章道成授書為太極真人又曰清虛真人於太素真人受三奔之道桐栢真人脩解劔之法有太上奔日之文得為下元真人又曰不知廻元隐遁道者不得刻名下真廻元者太上更新之日也常以其日思存古事又曰虛妄者徳之病華衒者身之灾執滯者失之由耻辱者行之玷遣此四者然後可以向道耳有淫衒之心不可行上真之道也昨見清虛宫正除落此軰人名又考付三官推之可不慎乎紫㣲真仙之才内明外知録名太極金書東州内累既息積之勿休又曰審道之本則為上清真人仙真妙方能盡梗槩之道者便為九宫真人若各備具其道則為太極真人又曰練形於太隂易貌於三官受學化神濯景易氣俯仰四運得為真人金根經曰天圗玉闗主監衆真逰宴之所也又曰天關上有六層玉臺太上真人集宴之䖏也又曰玉保青宫北殿上有金格格上有金章鳯璽闕丹青羽蓋昇仙法服以給成真之人大有經曰玉華青宫有寶經玉訣應有真人者授之又曰天上素靈洞𤣥經上化三真又大洞真經云道有三真不可去身紫霞變景三光映真大洞玉經曰大無山中有洞宫玊户在峨嵋之上諸得道真仙之名刋列此宫也又曰上清宫門中有兩闕左金闕右玉闕有真衣守大内有土芝流霞之泉刻金題衆書飛仙之號又曰玉清中有太暉殿玉真逰宴之所也又曰九真仙伯上帝司禁之君濯纓帝川之池也又曰有一上元君者萬仙之司主方嶽真氣太極真人歩五星之道以至降于室天洞真經曰赤城朱窓上清絶境乃帝一内宅三真寳堂也又曰上清真人緫仙大司馬長生法師登大帝滄浪山洞臺中雙玉穴酣飲紫明芝液又曰長生存神者好山水之人仁知動静所依也依仁者静而夀依知者動而樂投簡送名俾崇仁智朱書白簡移籍太清發鑪拜手用青紙青絲裹絡岩石上詣水泛舟中流讀簡以名係之必能降真也上清九真中經内訣曰有玉保公太素遣下迎九真之人也又曰欲行九真之法者齋戒浄室並為天帝君所見記録也太真科曰羽仙侍即上宫典格列其職位都統玉真太上真人在五嶽華房之内非有仙籍不得聞見丹簡校定名入南宫又曰虛皇金闕玉帝最貴最尊號曰自然莫能使之然莫能使之不然也和光於人似同而異故惟得道者乃能知之又曰上清禹餘天有三官真人主治過刑殺伐隂賊不軌嫉害賢哲心懐進退穢慢真人之罪者玉清隐書曰玉名金格當為上真三天真皇佩神虎之符在太極上位上真則飛龍翼轅中真則紫毛持節下真則太極叅軒又曰太㣲天帝君命太微上真勅使羣靈又曰上皇玉帝命𤣥羽真人出迎太微天帝又命太上真人開瓊珠之箧出玉真隐書𤣥羽之經以傳太微天帝之君内音玉字經曰真人散香於玉庭又云飛散百和之香流出五雲之華以觀飛天真人又曰四極真人主人命籍常乘䝉輪之車校人罪籙又曰九華真人治於南上宫中校人功過善惡三官列言又曰天皇真人曰諸天内音自然王字其大梵隐語上帝命天皇真人注解具正音足以開度天人登真隐訣曰崑崙瑶臺刋定真經之所也上品居上清凝皇帝之尊中品處中道皆公卿之位下品居三元之末並大夫之流三真品經各有條次又曰三昧真人乗風光雲車下衛齋戒之士太素真人羣始學者惡夢之法金華真人刻大洞上經於天帝紫微宫𤣥琳王殿東壁牖上太虛真人說鴻鳥之經太極真人誦王母之辭典禁真人察人之善惡妙行真人推刦㑹之數又曰太極真人常以立春日日中㑹諸真人於太極宫刻玉簡記仙名至春分之日日中崑崙瑶臺太素真人㑹諸仙人刋定真經也崑崙瑶臺是西王母之宫所謂西瑶上臺上真秘文盡在其中矣太素真人治白水沙洲之上定其真經也至立夏日日中上清五帝㑹諸仙於紫㣲宫見四真人論求道之功罪至夏至日日中天上三官㑹於司命河侯校定萬民罪福増减年筭至立秋日日中五嶽諸真人詣中央黄房定天下祀圗靈藥至立冬日日中陽臺真人㑹集列仙凡新得道人始入名仙録至冬至日日中諸仙詣萬諸宫東海青童君列其仙籙金書内字此學道之人常以夕半日中謝罪罪各自除剋身歸善以求長生神仙秋分之節氣䖏清虛太和正日中也衆真諸仙是月聼訟又刺奸吏及部内諸仙官並糺奏在䖏道士之功過及含生有罪應死生者故仙忌真記曰子欲昇天慎秋分罪無大小皆耳聞此朱火丹陵宫仲陽先生之要言也又云此辭出列紀是青童君迷古真人之言也以傳襲上言罪福纎介刻于丹城之籍也伏匿之善惡隂徳之細功無不縷陳也又曰上真之道有七第一太上鬱儀奔日章二大至結隣奔月章三太上八素奔辰章四太㣲飛天上經五髙上之洞真經六金闕靈書紫闕真闕經也上真之位為諸天帝行則三七已節旄萬真前導中真之道有六太丹隐書九真𤣥文太上金䇿方諸上經三皇内文紫書訣籙中真之位上清卿相之列也紫毛符節玉帝叅轅下真之道有八上清七變隐其八術𤣥黄玉書神州洞經紫庭中方降籙黄道素奏中章上元玉書下真之位上清大夫之流五色節旄飛行倒景又曰有得見聖列紀者𤣥籙書名奏之上清位為仙卿若能行金闕員事則拜為大夫此為列紀重於紫文也既見之飛真受佩而已謂知其中經目之輕重求道之梯級依此尋學故勝於紫文之單事也上皇玉籙曰二十四真人有佩玉録以行山川者則河海宿封奉迎啟道靈寳隐書曰中極真人主人命籍九華真人主九幽之上宿掌生死太元真人受天地之符度長夜之魂太極真人治赤城玉洞之府司校大山死生之籙三元真人主紫㣲行道赤書玉訣經曰凡月十四日上帝真皇勅太一使者下與北􅀈都伯使者同行天地司察人神功過深淺列言上宫又勅太一天神使者下與三官司察天人善惡列言也又遣九部刺姦周行五岳三宫水府條正鬼事司人功過列言上天白羽經曰太真丈人登白鸞之車駕黒鳯於九源自天已下莫不範徳又太極真人有仙相好真者要在慈心觸物以輔相好然後得仙矣不能忍性則仙相敗矣故脩道㑹真必以精思為本存神觀徳必以静念為先太刦經曰上景真人将天下力士元洪水毋决通萬川海寶經曰阿監者天人之隐名䖏玉樓之上列真之仙館又髙真者體有真氣玉眸詵詵南真傳曰昨與叔申詣清虛宫校定真仙得失之事已聞除落四十七人復上三人耳内明王真乃良材也九宫真人出入皆從黄闕絳臺中間為道故以道之左右置臺闕者以何非常之氣真人徃來也太上正法經曰九真者九天之真氣凝而成也上中下三真生於太清是元始之澄氣也各置宫室次第上清行衛之宫太上天道君萬真之主也居玉殿造上帝之章以為寶經於玉清宫中以度後學得真之士三元品戒經曰紫㣲宫有延生之儀格又云赤帝玉司君玉景度治南方朱陽之臺總統上真之界景林真人曰動感累世念真期臺皇鑒力用思太極注名玉禮於是細書紫虛之宫朱書東華之府刻名上清丹文錦籍空洞靈章曰真人彈雲嗷吹九鳯之簫神洲之笙其音逸嚮流􅈭千尋後聖列紀曰上清金闕後聖君父好道樂真紫㣲上真天帝玉清宫賜紫蕋剛丹鳯璽得在上清中遊太極下治諸天封掌兆民仙誌曰凡修行太一之事真人之道不得有所拜但心拜而已不形屈也思真行省通而無窮顯騐應期登真必速也黒籙上篇曰聖真仙者其行道徳俱宗太𤣥戒文經曰太上真人居仙府中世人得仙者皆先過此自然玉字經曰七寳林中有上真之逰圃真人之戱園太霄琅書曰元皇玉靈之胄位登太真理二儀於𤣥圃堂圗籙於萬仙緫地司於五嶽領上有於三闗上統無涯下攝洞源自大以下莫不咸𨽻又曰太素三元君禀靈和玉晨上氣故結生虛無含章秀景機洞妙無神齊廣暉道周九真呼吸未兆觸物内應太上之凝結也太上四明玉經曰真仙之道以耳目為主滛色則目闇廣愛則耳閉此二病從中來而外奔也非復有他今令其聦明益易且但不為之當洗心絶念放棄滛貪所謂嚴其始矣保利闕啟徹九門朝液泥丸别為上真視徹甚逺聼於絶嚮此真仙之髙道不在明耳目而已三洞珠嚢曰太上玉清有石刻銘曰鄷都山在北内有空洞洞中有六宫書此銘於宫北壁制檢羣㓙不使横暴生民學者得佩此刻石是則北都落名南宫度命為真人太平經曰後有得道各有品階至于指極聖真仙人定真玉籙經曰凢欲定心當受上皇民籍是真玉籙此至要為學之先也先能定心仙名乃定是三天正一先生所佩以定得仙之名太上經曰玉清者如玉堅不可磨净不可汚也堅淳無變偏累都盡一而無雜故名為真人太上丹簡曰凢學道居真人之位者名入南宫三五順行經曰合徳入道號曰真人太上遣四極真人來迎授三天寳籙之文於上清宫上清八景經曰精思百日真人降形也葛𤣥五千文序曰精思逺感而上則太上遣真人下授希微之㫖又云静思期真則衆感咸㑹内觀形影則神氣常存體洽道徳則百神震服大洞雌一篇曰金姿曜於東華玉影恱於帝門神映五老騰曜三元頂負寳曜浮逰九晨分形散影位為上真昇𤣥經曰惟鎮中直尋道求真改惡從善為真人三元玉檢經曰歳庚寅九月九日甲辰元始於上清宫告明授三元玉檢使付後學有𤣥名應為上清真人者乃度為女道士放歸南海賜號逍遥數年不食尸觧而化太平御覽卷六百六十
