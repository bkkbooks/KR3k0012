  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_643-1a, image: WYG0898/WYG0898-0734a.png}
body:
  text: 太平御覽卷六百四十三宋李昉等撰刑法部九獄釋名曰獄确也胡角切言确人情偽也又謂之牢言所在堅牢也又謂之圜土言築土表墻其形圜也又謂之囹圄囹領也圄禦也領録徒囚禁禦之也急就篇曰臯陶造獄說文曰獄謂之牢易曰澤上有風中孚君子以議獄緩死又曰山下有火賁君子以明庶政无敢折獄又曰山上有火旅君子以明慎用刑而不留獄詩小宛曰哀我填寡宜岸宜獄岸亦獄鄉亭之繋曰犴也詩含神霧曰杓為天獄主天殺也禮曰仲春之月命有司省囹圄具桎梏止獄訟孟秋之月命有司脩法制繕囹圄具桎梏鄭𤣥注曰囹圄所以禁守繋者若今别獄矣周禮秋官司寇曰以圜土聚教罷民春秋元命苞曰為獄圓者象斗運合宋均注曰作獄圓者象斗運國語曰温之㑹晉侯執衛成公歸之于周晉侯将殺之王曰不可夫政自上下也上作政而下行之不逆故上下無怨今叔父作政而不行無乃不可乎不行謂不順也夫君臣無獄獄訟也是非曲直獄訟之義也今元咺雖直不可聴也君臣皆獄父子将獄是無上下也而叔父聴之一逆矣又為臣弑其君安庸刑布行而不庸再逆矣一合諸侯而有再逆政余懼其無後也在魯僖十二年無後無以復合諸侯不然余何私於衛侯晉人乃歸衛侯史記曰趙髙案治李斯李斯拘執束縛居囹圄中仰天而嘆曰嗟乎悲夫不道之君何可為計哉又曰蕭何卒召曺参参去囑其後相曰以齊獄市為寄慎勿擾也又曰周勃為丞相十餘月乃免相就國嵗餘毎河東守尉行縣至絳絳侯勃自畏恐誅常披甲令家人持兵以見之其後有上書告勃反下廷尉勃恐不知置辭吏稍侵辱之勃以千金與獄吏吏乃書牘背示之曰以公主為證公主者孝文女也勃子勝之尚公主故獄吏教引為證薄太后亦以勃無反事文帝朝太后以冐絮提文帝曰絳侯綰皇帝璽将兵於北軍不以此時反今居一小縣顧反耶文帝使持節赦絳侯復爵邑絳侯既出曰吾嘗将百萬軍然安知獄吏之貴也又曰鈎弋夫人得幸武帝乃生昭帝帝立時年五嵗衛太子廢後上幸甘泉宫命畫工圖畫周公輔成王於是左右羣臣知帝欲立少子後數日帝譴責鈎弋夫人夫人脱簮珥叩頭帝曰引持去送掖庭獄夫人還顧帝曰趣行汝不得活夫人死雲陽宫時暴風揚塵百姓感傷使者持棺往𦵏之封識其處後帝閒居問左右曰人言何左右對曰人言且立其子何去其母乎帝曰然是非兒曹愚人所知也往古國家所以亂者由主少母壮也女主獨居驕蹇淫亂自恣莫能禁也汝不聞吕后耶故知為武帝生子者無男女其母無不譴死豈可謂非賢聖哉漢書曰韓安國坐法抵罪獄吏田甲辱安國安國曰死灰獨不復燃乎田曰燃即溺之居無㡬安國為梁内史田甲恐安國曰甲不就官我滅爾宗田甲肉袒謝安國歎曰公等足與治乎卒善遇之又曰孝宣帝初生號曰皇曽孫生數月遭巫蠱事收繋郡邸獄邴吉為廷尉監望氣者言長安獄中有天子氣上遣使者分條中都官詔獄繋者無輕重皆殺之内謁者令郭穰夜至郡邸獄吉閉門拒使者不得入皇曾孫賴得全又曰張湯杜陵人父為長安丞初湯為兒守舎䑕盗肉父怒湯湯掘燻得䑕及餘肉劾䑕掠治并取䑕與肉具獄磔堂下父見之視文辭如老獄吏大驚又曰夏侯勝為議不許宣帝尊武帝廟下獄及丞相長史黄霸坐不舉劾俱下獄霸欲從勝受經勝辭以罪死霸曰朝聞道夕死可矣勝賢其言遂授之繋再更冬講論不怠又曰有罪當械者皆頌繋應劭注曰頌者容也言見寛容但處曹吏不入狴牢又曰尹賞鉅鹿楊氏人長安中姦多閭里少年羣輩殺吏受財報仇相與探丸得赤丸斫武吏黒者斫文吏白者主治喪城中薄暮塵起剽刼行者死傷賞以三輔髙第選守長安令治獄穿地方深各數丈餘乃以大石覆其口名虎穴輕薄惡子鮮衣㓙服被鎧扞持刀兵者捕得數百人内虎穴中數日一發視皆枕藉死長安中遂無盗賊又曰天文志曰勾圜十五星屬杓曰賤人之牢星實則囚多虛則開出續漢書曰范滂字孟博坐繋黄門北寺獄獄吏曰凡坐繋皆祭臯陶滂曰臯陶賢者古之直臣知滂無罪将理之上帝如其有罪祭之何益衆人由此止也又曰武帝置中都獄官二十六所世祖皆省唯廷尉及洛陽有詔獄又曰虞詡字升卿陳畱縣人祖經為獄吏皆效于公之治囚及詡生經曰吾雖不及于公子孫至丞相冀得為九卿故字詡曰升卿至尚書令又曰李業字巨游廣漢人王莽居攝太守劉咸聞業有徳辟業業稱疾咸怒出教曰賢者不避害猶彀弩射市中命薄者先死令業詣獄養病客有説咸者乃出業謝承後漢書曰赤眉入長安時式侯恭以弟盆子為赤眉所尊故自繋赤眉至更始奔走式侯從獄中破械出街中逢京兆尹觧惲呼曰觧君載我我更始之忠臣也即帝敗我弟又為赤眉所立惲使後車載之前行見定陶王劉禮觧其械言帝在渭中船上遂相随見更始范􅓮後漢書曰許楊為都水掾使典復鴻郤陂初豪右大姓因縁陂役競欲辜較在所楊一無所聴乃共譛楊受取賄賂遂收之在獄而械輙自觧獄吏白鄧晨即夜出楊時天雨隂晦道中若有火光照之時人異焉又曰杜篤字季雅居美陽與美陽令逰數從請託不諧頗相恨令怒收篤送京師㑹大司馬吴漢薨光武詔諸儒誄之篤於獄中為誄辭最髙帝美之賜帛免之東觀漢記曰崔篆為建新大尹篆歎曰吾生值澆羿之君上有老母下有兄弟安得獨㓗已而危所生哉乃單車到官稱疾三年不視事行縣門下掾倪敞諌篆乃强起班春所至之縣獄犴填滿篆垂涕曰嗟乎刑罰不中乃陥民於穽此皆何罪至是乎遂平理所出二千餘人掾吏叩頭諌曰誠仁者之心然獨為君子将有悔乎篆曰邾文公不以一人易其身君子謂之知命如殺大尹贖二千人葢所願也遂稱疾去又曰鮑昱為泚陽長縣人趙堅殺人繋獄其父母詣昱自言年七十餘唯有一子適新娶今繋獄當死長無種類涕泣求哀昱憐其言令将妻入獄遂妊身有子蕭子顯齊書曰戴僧静㑹稽永興人也少有膽力便弓馬於都載錦出為歐陽式所得繋兖州獄太祖遣薛淵餉僧静酒食以刀子置魚腹中僧静與吏飲醉以刀刻械手自折鎻發屋而出歸太祖遂匿之齋内以其家貧年給粟千斛崔鴻後趙録曰石季龍幽中書令徐光于㐮陽國詔獄光在獄中注觧經史十餘萬言三國典畧曰周諒入齊為揚州刺史平鍳所獲繋之獄妻生男鍳因喜醉擅放免之既醒知非上唘自劾齊主特原其罪隋書曰裴政為㐮州搃管妻子不之官所受秩奉散給寮吏民有犯罪者隂悉知之或竟嵗不發至再三犯乃因都㑹時於衆中召出親案其罪五人處死徒流者甚衆合境惶懾令行禁止小民蘇息稱為神明爾後不修囹圄殆無争訟又曰薛胄為兖州刺史及到官繋囚數百胄剖斷旬日便了囹圄空虛又曰栁儉拜蓬州刺史獄訟者庭遣不為文書約束縦容而已獄無繋囚唐書曰太祖行次靈石縣指獄而謂皇太子曰此何謂皇太子對曰此所謂圜獄将繋罪人太宗因曰文王作罰刑兹無赦而漢文帝志在輕刑但以詳平為佳非謂有罪而釋也濫繋無辜則政道缺乆需有罪則怒氣生圜土之中仰視青天有同懸鏡而鏁械膚體鬰結其中夫循諸己者可以知物傳曰其恕乎由此言之不可不慎又曰陽城為道州刺史觀察使判官督其賦至州恠城不出逆以問州吏吏曰刺史聞判官来以為有罪自囚於獄不敢出判官大驚馳入謁城於獄曰使君何罪某奉令来候安否耳留一二日未出去城因不復歸館門外有故門扇横地城晝夜坐卧其上判官不自安辭去晏子春秋曰景公籍重而獄多拘者滿圄怨者滿朝晏子諌不聴淮南子曰君不入獄為傷恩也論衡曰獬豸者一角之羊也性知有罪臯陶治其罪疑者令羊觸之有罪則觸無罪則不斯盖天生一角聖獸助獄為騐故臯陶禮羊跪坐事之此則神竒瑞應之類風俗通曰易噬嗑為獄獄十月之卦從犬言聲二犬亦存以守也廷者陽也陽主生長獄者隂也隂主刑煞故讞獄在廷皆順其位又曰詩云宜犴宜獄犴司空也周禮凡萬民之有罪過未離於法者桎梏以上坐諸嘉石役諸司空令平易道路也又曰周禮三王始有獄夏曰夏䑓言不害人若逰觀之臺桀拘湯是也殷曰羑里言不害人若於閭里紂拘文王是也周曰囹圄囹圄舉也言人幽閉思愆改惡為善因原之也今縣官録囚皆舉也三輔黄圖曰長安有九市二十四獄扶南傳曰扶南俗理訟無牢獄鞭杖唯以探湯捧鎻没水為信先使沐浴齋戒乃令以手内湯或捧熱鎻或没水中無罪者不爛不燋不沈犯罪者即騐也㑹稽典録曰鍾離意為堂邑令縣民防廣為父報仇繋獄其母病死防廣痛之號泣於獄意為之悽惻出廣見之曰今欲出若歸家殯殮有義則還無義則已丞掾諌以為不可意曰不還之罪令自受之廣臨殯畢即自歸獄以状表上詔减死一等又曰盛吉字君達山隂人司徒虞延辟西曺掾時隴西太守鄧融以賍罪徴詣廷尉前後考騐歴嵗不服明帝下三府遣精能掾吏更就舜劾吉到詔獄但勅主者供湯沐飲食不去問事明日復往觧融桎梏徐問以情實君若無贓强見誣枉君其列辭當相伸理如審有罪不得誣㒺國家融感吉意即移辭首服又曰黄昌為蜀郡太守宻捕得盗帥一人悉使䟽諸縣强盗宻往捕録其諸小盗皆原其死讁作棧道以代民役由是道不拾遺獄至連年無有重囚又曰高豐字文林為鄼縣獄吏刺史虞孟行部到鄼縣僻界上勑鄼長将囚徒就所在録決豐被文書閉獄下鑰不肯送徒自請諌曰明使君乗法駕騑骖御命理寃當縣縣而至今乃遥召囚徒欲省更煩蓋普天之下莫非王土率土之濵莫非王臣鄼獄非漢地乎囚徒終不出縣特望朱軒廻輪向鄼孟遂到鄼㐮陽耆舊記曰諸葛亮出闗中使馬謖統大衆在前為魏将張郃所破坐下獄死時年三十九嵗臨終與亮書曰明公視謖猶子謖視明公猶父願惟殛鯀興禹之義使平生之交不虧謖雖死無恨於黄泉博物志曰夏曰念室殷曰動止周曰稽留三代之異名也又狴犴者亦獄别名也韓陽天文集要曰貫索貴人之牢中星實則囚多虛則開出捜神記曰漢武帝東逰未出函谷闗有物當道其身數丈其状像牛青眼而曜精四足入土動而不死百官驚懼東方朔乃請酒以灌之灌之十觔而物消帝問其故答曰此名為患憂氣之所生此必秦之獄地不然則罪人徒作者之所聚夫酒忘憂故能消之也帝曰吁博物之士至於此乎東方朔别傳曰孝武皇帝時行甘泉至長平坂上馳道中央有虫覆而赤如生肝状頭目口齒鼻耳盡具先驅旄頭馳還以聞曰道不可御於是上止車遣侍中馳徃視之還盡莫知也時東方朔從在後屬車上召朔使馳往視之還對曰恠哉上曰何謂也朔對曰秦始皇時拘繫無罪幽殺無辜衆庶怨恨無所告訴仰天而嘆曰恠哉感動皇天此憤氣之所生也故名之曰恠哉是地必秦之獄處也上有詔使丞相公孫𢎞案地圗果秦之獄處也上曰善當以去之朔曰夫積憂者得酒而去之以酒注虫立消靡上大笑曰東方生真可謂聖矣何以異先知聖人哉乃賜帛百疋異苑曰建康陵欣景平中死於揚州作部尅晨當𦵏作部督夢欣云今為獄公姥祖夕有期莫由自反勞君觧謝令得放還督不信夜後又夢言辭轉切因歌一曲云生時世上人死作獄中鬼不得還墳墓灰没有餘罪督覺為謝神從此便絶劉義慶幽明録曰晉廬陵太守龎企字子及上祖坐事繫獄而非其罪見螻蛄行其左右相謂曰使爾有神䏻活我死我當祠爾因投飯與螻蛄食盡去有頃復来形體稍大意異之復與食數日其大如猪及當行刑螻蛄掘壁根為大孔破得從此出亡後遇赦得活矣齊諧記曰吳當陽縣董昭之乗船過錢塘江江中見一蟻著一短蘆惶遽畏死使以繩繫蘆著船船至岸蟻得出中夜夢見一人烏衣来謝云僕是蟻中王君有急難當先見語歴十餘年時江左多盜縣令横録昭之為刼主繫餘杭獄昭之曰惟蟻王夢云緩急當告今何處告之獄囚言但取兩三蟻著掌中祝之昭之如其言暮果夢昔烏衣人言云可急去入餘杭山天下即赦今不乆也於是便覺蟻齧械已盡因得出獄過江投餘杭山遇赦遂得免桓子新論曰近哀平間道士臨淮董仲君坐繫獄病死數日目陥生䖝吏捐棄之便更活云太平御覧卷六百四十三
