body:
  text: 太平御覽卷七百三十五宋李昉等撰方術部十六巫下厭蠱巫下唐書曰薛舉㓂豳岐之地太宗惡之劉文静殷開山與舉戰齊髙墌城西臣為舉衛尉郝􅀈􅂆舉乘勝直指長安舉然之臨發而遇疾召巫視之巫言唐兵為祟舉惡之未幾而死又曰劉文静性嗜酒與其弟文起酣飲出怨言拔刀斫柱曰㑹當斬裴寂頭耳家中妖恠數見文起憂之遂召巫者於星月之下被髮銜刀為厭勝之法其愛妾失寵以告其兄妾兄上變髙祖以之屬吏又曰武后將如洛陽至閿鄉縣界騎忽不進召巫者問之巫言晉龍􅋮將軍王濬云臣墓在道南每為採樵者所害聞聖駕今至故來哀告后勅去墓五里不得採樵又曰肅宗重隂陽鬼神之事或命巫媪乘駟行郡縣為厭勝之術有祓人王璵遂以左道為相代宗亦篤信之凡所修築動牽禁忌而奸人黎幹得以左道尹京又内集衆工編刺珠綉為御衣既成而焚之為穰除法且無虛月又曰永太中廻紇首領羅達干等率其衆詣涇陽請降郭子儀許之因去甲胄與之相見既而子儀先執杯合胡禄都督請呪子儀呪曰大唐天子萬萬嵗廻紇可汗亦萬嵗兩國將相亦萬萬嵗若起負心違背盟約者身死陣前家口屠戮合胡禄都督等失色及杯至即譯曰如令公盟約皆喜曰初發本部來日將巫師兩人來云此行大安穏然不與唐家兵馬閗見一大人即歸今日領兵見令公令公不為疑脱去衣甲單騎相見誰有此心膽是不戰闘見一大人巫師有徵矣歡躍久之子儀撫其背首領等分纒頭彩以賞巫師又曰朔方先鋒兵馬使南陽郡王白元光與廻紇合兵於涇州靈臺縣西共破吐蕃等十萬餘衆初白元光等到靈臺縣西探知賊勢為月明思少隂晦廻紇使巫師便致風雪及遲明戰吐蕃盡寒凍弓矢皆廢披氊徐進元光與廻紇随而殺之又曰大厯九年七月久旱是日㴻雨豐霈初京兆尹黎幹以旱故祈雨於朱雀街造玉龍悉召城中巫覡更舞觀者駭笑又曰房儒復故太尉琯之孽子年二十淮南陳少由辟為從事多招隂陽巫覡令揚言已身過三十必為宰相又曰貞元中昭義節度使李抱真以久病為巫祝所惑請降官爵以禳之章奏凡七上詞甚切至上難違之故自司空而授僕射又曰田仁㑹為右金吾將軍所得禄俸佑外有餘輙以納官時人譏其邀名仁㑹強力病惡晝夜廵警絲毫越法無不立發躬自閲罰略無寛者京城貴賤咸畏憚之出有女巫蔡娘子以鬼道惑衆自云能令死者復生市里以為神明仁㑹騐其假妄奏請徙邊上曰若死者不活便是妖妾若死者得生更是罪過不可容也竟依仁㑹所奏又曰李德裕為浙西觀察使徳裕壯年得位銳於報政凡舊俗之害民者悉革其弊江嶺之間信巫祝惑鬼怪有父母兄弟厲疾者舉室棄之而去德裕欲變其風擇鄉人之有識者諭之以言繩之以法數月之間弊風頓革屬郡祠廟按方志前代名臣賢后則祠之四郡之内除滛祠一二千所又罷私邑山房一千四百六十以清冦盗人樂其政優詔嘉之又曰劉禹錫貶朗州司馬比居西南夷土風僻陋舉目殊俗無與言者禹錫在朗十年惟以文章吟詠陶冶情性蠻俗好巫每滛祠舞鼓必歌俚辭禹錫或從事於其間乃依騷人之作為新辭以教巫祝故武陵溪洞間夷歌率多禹錫之辭也莊子曰鄭有神巫曰季咸知人生死鄭人見之皆棄列子見之而心醉歸又曰小巫見大巫拔第而棄此其所以終身弗如也淮南子曰鄭之神巫相胡子林見其徵告列子列子行泣報壺子壺子持以天壤名實不入機發於踵壺子視之死生亦齊尸子曰齊有田果者命狗曰富命子為樂將欲祭也狗入室果呼之曰富出巫曰不祥也家果大禍長子死哭曰樂乎而不似悲也吕氏春秋曰管仲病桓公問焉仲願君遠易牙􅆆刁常之巫公子啓方公曰常之巫能審於死生子疴猶疑耶仲曰死生命也病是天也君不守其本而侍晉彼將以此無不為也及公病常之巫曰公以某日薨易牙等作亂公嘆曰死若有知何面目以見仲父䝉面而死山海經曰火龍中有靈山巫咸巫即巫眠巫彭巫姑巫真巫禮巫搥巫謝巫羅十人從此升降百樂爰在國語曰古者民神之不能雜擇民之精爽不携貳者而以能齊肅忠正其智能上下皆義其巫能光遠宣朗其明能光照其聰達之如是則神明降之在女曰巫在男曰覡又曰厲王虐國人謗王厲王恭王之曽孫夷王之子邵公告王曰民不堪命矣王怒得衛巫使監謗者以告則殺之巫言謗王王則殺之國人莫敢言道路以目王喜告邵公曰吾能弭謗矣乃不敢言離騷曰欲從靈芬之吉占兮心猶豫而狐疑巫咸將夕降兮懐椒糈而要之東方朔𫝊曰武帝時有神雀下丞相御史中丞二千石諫議臣博士皆言壽東方朔獨不賀帝曰羣臣皆賀而獨不賀何也對曰恐後有巫為國害者朔因謝疾去其後卒有巫蠱之事不知朔之所終也桓子新論曰昔楚靈王驕逸輕下信巫祝之道躬儛壇前吳人來攻其國告急而靈王鼓舞自若異苑曰曹娥父能弦歌為巫五月五日於西江泝濤迎婆娑神溺死不得屍娥年十四縁江號哭七日遂投江求之而死幽明録曰董卓信巫軍中常有巫都言禱求福利言從卓求布倉卒無布有手布言曰可用耳取便書中上如作兩口一口大一口小相累以舉謂卓曰慎此也卓後為吕布所殺後人乃知呪吕布也又曰大元年中臨海有巫李不知所由來能卜相作水符治病多愈亦禮佛讀經語人云明年天下當大疫此境尤劇又二紀之後此邦之西北大郡疆尸横路時汝南周叔道罷臨海令􅁠停家直云周令今去宜南行必當暴死便指北山曰後二十日此應有異異者事彰也後十餘日大石夜頺落百丈碎磕若雷庾楷為臨海太守過詣周設饌作伎至夜庾還舫中天曉庾自披屏風呼叔道何癡不起左右撫看氣絶久矣到明年縣内病死者數千餘又曰巴丘縣有巫師舒禮晉永昌元年病死土地神將送詣太山俗人謂巫師為道路人也過禮舎門前土地神問吏此是何等舎門吏曰道人舎土地神曰是人亦是道人便以相付禮入門見數千戸皆懸竹簾自然􅇃塌男女異處有誦經者唱偈者然飲食快樂不可言禮文書名已至太山門而又身不到推入土地神云道見數千間瓦屋即問吏言道人即以付之於是遣神即録取禮觀未遍見有一人八手四眼捉金杵遂欲撞之便怖走還出門神已在門迎捉送太山太山府君問禮卿在世間皆何所為禮曰事三萬六千神為人觧除祠祀或殺牛犢猪羊雞鴨府君曰汝罪應上熱熬便牽著熬所見一物牛頭人身捉鐡叉禮著熬上宛轉身體燋爛求死不死一宿二日府君問主者禮壽命應盡為頓奪其命校録籍餘筭八年乃命將録求牛頭復以鐡叉叉著熬邉府君曰今遣卿歸終其餘筭勿復殺生滛祠禮乃還活不復為巫師江氏家𫝊曰江統為太子洗馬諫愍懷太子曰臣聞土者民之主用播殖築室營都建邑皆有明制著在經典而無禁忌犯害之文惟末俗小巫乃有言巫書乃禁入地三尺有四時方面不皆禁也竊見禁土令不得繕治壇垣動移屋瓦臣等以為此違典義不可為永制兩京記曰宣政門内曰宣政殿初成每見數十騎馳突出髙宗使巫祝為門奴問其所鬼云我漢楚王戊太子死葬於此門奴曰案漢書戊與七國反誅死無後焉得葬此鬼曰我當時入朝以路遠不随坐病死天子於此葬我漢書自遺誤耳門奴因宣詔欲為改葬鬼曰出入誠不安改葬幸甚天子歛我玉魚一雙幸勿奪之及發掘玉魚宛然棺柩略盡又曰尚書省左司郎㕔事後有古冢髙宗武后間郎中屢有暴死者聖厯中有巫者見尚書郎鄭黙冢發之得銘誌符騐棺柩尚在并有凡木雜器鄭氏子孫相率改葬厭蠱史記曰江充見上年老恐晏駕後為太子所誅因奏上言曰疾祟在巫蠱以充為使者治巫蠱充將胡巫掘地求木偶至遂掘得蠱於太子宫得桐木太子懼不能自明収充自臨斬之宋書曰文帝時使宫内皆蠶欲以諷勵天下有女巫嚴道育夫為刼坐没入煖宫元凶劭姉東陽公主應閤婢王鸚鵡白公主嚴道育通靈主乃白上託云善蠶求召入道育云所奉天降當賜符應時主夕卧見流光相随狀如熒火遂入巾箱化為雙石圎青可愛於是主及劭並信惑之始興王濬素佞事劭並多過失慮上知使道育祈請欲令過不上聞歌舞呪詛􅐍捨晝夜道育輙云自上天陳請必不泄露劭等敬事號曰天師後遂巫蠱刻玉為上形象埋於含章殿前初東陽公主有奴陳天興鸚鵡養以為子而與之滛通鸚鵡天興及寧州所獻黄門慶國並預巫蠱事劭以天興補隊主東陽主薨鸚鵡嫁吳興沈懐遠為妾鸚鵡既適懐遠慮與天興私通事泄請劭殺之劭宻使人害天興既而慶國謂徃來惟有二人天興既死慮將見及乃以白上上驚惋即収鸚鵡家得劭濬手書皆呪詛巫蠱之言得所埋上形像於宫内道育叛亡捕之不得上詰責劭濬劭濬惟陳謝而已道育變服為尼逃匿東宫濬徃京口又以自随或出止親人張旿家後濬當鎮江陵復載道育還東宫欲將西上有告上云京口張旿家有一尼服食出入征北内似嚴道育上使掩得二婢云道育随征北還都上惆悵驚惋劭殺逆後孝武平亂不見𫝊國璽問劭云在嚴道育處就取得之道育鸚鵡並都街鞭殺於石頭四望山焚其尸揚灰于江梁書曰蕭紀舉岷蜀之衆由外水而下湘東王命方士伯人於長州苑板上畫紀形像親下鐡符釘于支體以厭之陳書曰後主隂令人告長沙王叔堅厭魅刻木偶人衣以道士衣施機關能拜跪畫夜於星月下醮之呪詛於上又令上書告其事案騐令實後主召叔堅内於西省後赦之免所居官北齊書曰初立太子恒母𢎞德夫人穆氏為后大赦國内初斛律后之廢也陸令萱欲以穆氏代之祖班請立胡昭儀為后胡太后亦卑辭厚禮以求令萱以胡氏寵幸方睦不得已而白齊主立之然意在穆氏每私謂齊主云豈有男為太子而身婢妾乃求左道行厭蠱之術旬朔之間胡后遂即精神恍惚言笑無恒齊主漸畏惡之於是立穆氏隋書曰獨孤陁性好左道其外祖母髙氏先事猫鬼已殺其男郭沙羅因入其家上㣲聞而不信㑹獻皇后及楊素妻鄭氏俱有疾召醫視之皆曰此猫鬼疾上以陁后之異母弟陁妻楊素之異母妹由是意陁所為隂令其兄穆以情喻之上又避左右諷陁陁言無有上不悅左遷出怨言上令髙碩蘇威大理正皇甫孝緒大理丞楊遠等推案陁婢徐阿尼言本從陁母家來常事猫鬼每以子日夜祀之言子者䑕也其猫鬼每殺人者所死家財物潜移於蓄猫鬼家陁常從家中索酒其妻曰無錢可酤陁因謂阿尼曰可令猫鬼向越公家使我足錢阿尼便呪之居數日猫鬼向素家後上初從并州還陁於園中謂阿尼曰可令猫鬼向皇后所使賜吾物阿尼復呪之遂入宫中楊逺乃於門下外省遣阿尼呼猫鬼阿尼於是夜中置香粥一盆以匙扣而呼曰猫女可來無住宫中久之阿尼色正青若被牽曳者云猫鬼已至上以事下公卿奇章公牛𢎞曰妖由人興殺其人可以絶矣令以犢車載陁夫妻將賜死於其家陁弟整詣闕求哀於是免陁死除名以其妻楊氏為尼先是人訟其母為人猫鬼所殺者上以為妖妄怒而遣之及此詔追行猫鬼家陁未幾而卒又曰滕王瓉子綸當文帝之世每不自安煬帝即位尤被猜忌綸憂懼呼術者王琛問之琛答曰王相禄不凡滕即騰也此字足為善應有沙門惠恩崛多等頗解占候綸每與交通嘗令此三人為厭勝法有人告綸怨望呪詛帝令黄門侍郎牛宏窮騐之又曰秦王俊好内妃崔氏性妬甚不平之遂於瓜中進毒由是遇疾疾篤含銀色變以為遇蠱未能遣使奉表陳謝帝責以失德薨帝哭之數聲而已曰晉王前送一鹿我令作脯擬賜秦王王亡可置之靈前心已許之不可虧信帝及后徃視見大蜘蛛大蛷螋從枕頭出求之不見窮之知妃所為也又曰蜀王秀漸奢侈違法度及太子勇廢秀甚不平皇太子恐終為後患隂令楊素求其罪狀而譛之又令楊素蘇威牛𢎞柳述趙綽推太子隂作偶人書帝及漢王姓字縛手釘心令人埋華山下楊素發之又作檄文故逆臣賊子專弄威柄陛下惟守虛器一無所知帝乃下詔數其罪曰漢王於汝親則弟也乃畫其形像題其姓名縛手釘心枷鏁杻械仍云請西岳華山慈父聖母收楊諒神魂在華山下勿令散蕩我之於汝親則父也仍云請西岳華山慈父聖母賜為開化楊堅夫妻回心歡喜又畫我形像縛手撮頭仍云西岳神兵收楊堅魂神如此形狀我今不知楊諒楊堅汝何親也㓕天理逆人倫皆為之不祥也欲免患禍長守富貴其可得乎搜神記曰鄱趙壽有犬蠱有陳岑詣壽忽有大黄犬六七羣出吠岑後余相伯歸與夀婦食吐血幾死乃屑桔梗以飲之乃愈兩京記曰楊素有羙妾姿色絶倫時有千牛桑和有蠱異術常云一見婦人便即能致煬帝嘗宻使人竊之素宅深􅃉和朝奉詔其夜便竊以匿煬帝竒其能便詔素賜之唐書曰髙駢傳云畢師鐸入城吕用之張守一出奔楊行宻詐言所居有金行宻入城掘其家地下得銅人長三尺餘身披桎梏釘其心刻髙駢二字於胷盖以魅道厭勝惑其心以至㓕族太平御覽卷七百三十五
