body:
  text: 太平御覽卷三百九十八宋李昉等撰人事部三十九吉夢下東觀漢記曰諸將皆勸光武即位乃召馮異上曰我昨夜夢乗赤龍上天覺悟心中動悸異因下席拜賀曰此天命發於精神也異遂與諸將定議上尊號又曰永平三年春有司奏請立長秋宫以率八妾上未有所言皇太后曰馬貴人徳冠後宫遂登至尊先是數日后夢有小虫飛無數随著身入皮膚中復飛出又曰和熹鄧皇后嘗夢捫天體蕩蕩正青滑如磄􅀈有若鍾乳若仰𠻳之以訊占夢言尭夢攀天而上湯及天䑛之皆聖王之夢范􅈌後漢書曰蔡茂夢坐太極殿上有三穂禾茂跳取之得其中穂輙復失之以問郭賀賀離席慶曰大殿者官府之形像也極而有禾人臣之禄也取其中穂是中台之位也於字禾失為秩也旬月而茂徴焉辟賀為掾謝承後漢書華松家夲孤㣲其母夜夢兩伍伯夾門言司𨽻在此松年十五師事丁子然舉春秋十九當冠出謂生曰此宰相之器也魏書曰程昱少時夢上太山兩手捧日昱私異之以訪荀彧及兖州平乃賴昱得完三城於是彧以昱夢白太祖曰卿當終為吾腹心昱本名立太祖乃加其上日更名昱張勃呉録曰武烈皇帝母有身夢膓出繞呉昌門孫堅妻呉氏夢月在其懷而生長沙桓王又夢月在懷而生大皇帝又曰丁固字子賤㑹稽山隂人寶鼎中拜司徒初為尚書夢松樹出其腹上謂人曰松字十八公也後十八年為公乎遂如夢焉蜀志曰蔣琬字公琰夜夢有一牛頭在門前流血滂沲問占夢趙直直曰夫見血者事分明也牛角及鼻公字之象君位卒當至公呉志曰孫休字子烈封琅琊王居㑹稽夢乘龍上天顧不見尾覺而異之孫皓廢休立七年薨孫皓悉誅其子又曰呉主孫權潘夫人㑹稽句章人得幸有身夢有似龍頭授已者已以蔽膝受之遂生孫亮王隱晉書曰陶侃字士行鄱陽人少漁於雷澤夢背上生八翅飛入天門見門非常欲入不敢而下侃後都督八州諸軍事又曰陶侃為廣州夢有司馬與侃鎧者長史陳恊以為司馬者國姓也鎧者扞禦之噐節下當進位泰興二年侃加平南將軍又曰鄧攸為淮南太守夢行水邉見一女子虎在後來盪斷鞶囊占者以為水邊有女汝字也斷鞶囊者新虎頭代故虎頭也不作汝隂當汝南也果遷汝隂續晉陽春秋曰李太后在㑹稽王宫夢兩龍枕膝日月入懷其後果以相之言見幸太宗凡生烈宗㑹稽王道子及鄱陽公主焉王韶之晉安帝紀曰劉敬宣在齊夢丸土吞之而於夢中占者答曰此服土吞也既覺喜曰丸者桓也桓為吞矣我當復本土旬日中間元敗遂得歸陸機晉書武紀曰王濬之在巴郡也夢懸四刀於其上甚惡之濬主簿李毅拜賀曰夫三刀為州而見四為益一也明府其臨益州乎後果為益州刺史晉書曰羅含字君章襄陽人少時夢五色鳥入懷遂取吞之含覺胷中如吞物意謂不吉乃告叔母朱氏朱氏曰此鳥有文章汝當善文章矣果如其言衆人謂之荆楚之松竹刺史桓温以為江左之清秀也晉書載紀曰劉聰之在孕也母張氏夢日入懷窹而以告元海元海曰此吉徵也慎勿言十五月而生聰焉南燕録曰慕容徳皝少子也每對諸夫人言婦人夢日入懷當生天子後孫夫人任身夢日入其臍中後晝寢而生徳宋書曰晉安王子勛於尋陽城南設壇即位子勛語左右曰昨夜夢乘龍上天俛視不見其頭衆咸失色莫有對者著作郎孫毅進曰易稱見羣龍無首吉祥也衆乃大悦又曰劉穆之嘗夢與宋武帝泛海遇大風驚俯視船下見二白龍挾船既而至一山山峯聳秀意甚悦及武帝克京城從何無忌求府主簿無忌進穆之帝曰吾亦識之即召焉又曰沈慶之嘗夢引鹵簿入厠中慶之甚惡入厠之鄙時有善占夢者為解之曰君必當大富貴然未在旦夕問其故荅曰鹵簿故是富貴容厠中所謂後帝也知君富貴不在今主後魏書曰宣武帝名恪孝文帝長子也母曰髙氏初夢為日所逐避於床下化為龍遶已數匝寤而驚悸遂娠而生帝也後周書曰栁霞幼而爽邁其世父慶逺特器異之謂霞曰吾昔逮事伯父太尉公嘗語吾云我作一夢夢汝登一樓甚峻麗吾以坐席與汝汝後名宦必達恨吾不及見耳吾向聊復晝寢又夢將昔坐席還以賜汝汝之官位當復及吾特宜勉勵以應嘉祥也又曰髙琳字琇琳其先髙麗人母嘗祓禊泗濵卧遇見一石光彩朗潤遂持歸是夜夢見一人衣冠若僊者謂曰夫人向所持来石是浮磬之精耳君受之必生令子母驚寤舉身流汗俄而有娠及生琳因以名字焉及長有大度智畧從文帝累有戰功位至開府儀同三司三國典畧曰髙歡嘗夢履衆星而行覺而内喜遂傾産以結客又曰宇文永貴昌黎大僰人也母初孕夢有老人抱一兒授之曰賜爾是子俾壽且貴及生形類所夢故以永貴字之又曰齊陽休之幼年將仕夢鄴城東南有大冡上有銅柱跗為蓮花休之從西北而登以手捉柱柱右轉夢中呪曰三匝而止柱如其言榮富之後所居之宅竟在其地又曰祖珽知齊太上有大志深自結納嘗啓曰昨夢大王乗龍上天願深自愛太上喜即位之後擢拜中書侍郎又曰梁孝元字世誠梁武第七子也小字符初梁武夢𦕈目僧執香罏稱託生王宫既而采女石氏侍始褰戸幔有風逥裙梁武帝意感幸之采女夢月墮懷中遂孕孝元載誕之夕舉室光明室中有非常香氣及紫胞之異梁書曰江淹少夢見人授之五色筆因而有文章後十餘年忽夢一丈夫自稱郭璞謂淹曰前借君筆可相還淹夢中探懷中筆自此後不復有文章時稱淹才盡又曰鄭灼少事皇侃灼性精勤尤明三禮少時常夢皇侃謂曰鄭郎開口侃因唾灼口中自是義理益進又曰何㸃少時嘗患渴經嵗不愈後在吳中石佛寺僧建講晝寢夢一道人形貌非常授丸一掬夢中服之而差陳書曰高祖㣲時嘗遊義興館於許氏夢天開數丈有四人朱衣捧日而至納之帝口及覺腹内猶熱南史曰徐陵字孝穆母臧氏嘗夢五色雲化為鳳集左肩上已而誕陵年數嵗家人擕以候沙門釋寳誌寳誌曰此天上石麒麟也唐書曰李嶠趙州贊皇人隋内史侍郎元操從曾孫也代為著姓父鎮惡襄城令嶠早孤事母以孝聞為兒童時夢有神人遺之雙筆自是漸有學業弱冠舉進士又曰尹知章絳州翼城人少勤學嘗夢神人以大鑿開其心以藥内之自是日益開朗盡通諸經義未幾而諸師反北靣受業焉又曰張廌字孝舉深州陵澤人祖鷟字文成聪警絶倫書無不覽為兒童時夢紫色大鳥五彩成文降於家庭其祖謂之曰五色赤文鳳也紫文鸑鷟也為鳳之佐吾兒當以文章瑞於朝廷因以為名字又曰天寳中安禄山自范陽入朝肅宗觀其凶恣有悖逆之状言之於太上皇太上皇易之不納上恐危社稷遂精誠祈夢其夜夢故内侍胡普寂䓁三人持案覆以黄帊自天而下至上前有素版丹書文章甚多既寤所記者唯四句曰厥不云乎其惟其時上天所保福禄不虧十四年二月甲子禄山果於范陽稱兵向闕又曰劉沔初為忠武小校從李光顔討淮西為捉生將前後遇賊立戰鋒刃所傷幾死者數四嘗傷重卧草中月黑不知歸路昬然而睡夢人授之雙燭曰子方大貴此行無患可持此而還既行炯然有雙光在前晏子春秋曰景公病水十數日夜夢與二日鬭不勝晏子朝公說之曰我其死乎對曰使人以迎占夢至晏子說公夢告之占夢者告謂反其書晏子曰無反書公所病者隂也日者陽也一隂不勝二陽故病將愈也以是對占夢者入以晏子言對居三日公病大愈公且賜占夢占夢者曰此非臣之功晏子教臣李蜀書曰武帝諱雄始祖第三子始祖后方娠夢雙虵自門升天一虵中斷及生后嘗言三子若成人必有先亡者有大貴者後果李蕩早卒李雄王蜀林邑記曰林邑俗謂上金為紫磨金夷俗謂上金為楊邁金初范楊邁母懷身夢人鋪楊邁金席與其生兒兒落席上金色光起照晰艷燿及其生也名曰楊邁後襲王位能得人情皇甫謐帝王世紀曰文王自程徙都酆季秋之月甲子赤雀衘丹書入酆止於文王之戸言天命歸周之意先是文王夢日月之光着身㑹稽先賢傳曰吳侍中闞澤字徳潤山隂人也在母胎八月而叱聲震外年十三夜夢名字炳然縣在月後遂昇進也異苑曰鄭康成師馬融三載無聞融鄙而遣還𤣥過樹隂假寐夢見一老父以刃開其心謂曰可以學矣於是遂返精洞典籍又曰太原郭登之字仲靖義熙初諸葛長民欲取為諮議登之不樂後為南康太守盧循之反長民以其無先過也將加大辟夢一神人以烏角如意與雖是寤中殊自指的既覺在其側可長尺餘形制甚陋郭遂得無他太平御覽卷三百九十八
