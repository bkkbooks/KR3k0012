front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_600-1a, image: WYG0898/WYG0898-0453c.png}
body:
  text: 太平御覧卷六百宋李昉等撰文部十六思疾思遲思疾漢書曰枚臯年十七上書自陳枚乘之子上得大喜武帝春秋二十九乃得皇太子臯與東方朔作皇太子生賦臯為文疾受詔輒成司馬相如善為文而遲故所作少又曰淮南王安作内篇新出上愛秘之使作離騷傳旦受詔食時即上魏志曰陳思王植年十餘歲讀誦詩書論及辭賦數萬言善屬文太祖嘗視其文謂植曰汝倩人耳植跪曰出言為論下筆成章願當面試奈何倩人時銅雀臺新成太祖悉將諸子登臺使各為賦植援筆立成太祖異之文帝嘗欲害植以其無罪令植七步為詩若不成如軍法植即應聲曰煮豆燃豆箕豆在釡中泣本是同根生相煎何太急文帝善之又曰王粲善屬文舉筆便成無所改定人嘗以為宿搆齊書曰蕭文琰蘭陵人丘令楷吳興人江珙音拱濟陽人竟陵王子良嘗夜集學士刻燭為詩四韻者刻一寸以此為率文琰曰燒一寸燭成四韻詩何難之有乃與丘令楷江珙等共擊銅鉢音韻響滅則詩成皆可觀覧又曰高祖目裴子野曰其形雖弱其文甚壯俄又勑為書喻魏相元義其夜受㫖子野謂可待旦方奏未之為也及五鼔勑促令速上子野徐起操筆昧爽便就既奏高祖深嘉焉自是凡文檄皆令具草南史曰朱异音怡又音異遷散騎常侍异容貌魁梧能舉止雖出自諸生甚閑軍國故實自周捨卒後异代掌機密其軍旅謀謨方鎮改換朝儀國典詔誥勑書並典掌之四方表疏當局簿領諮詳請斷填委於前异屬辭落紙覧事下議縱横敏贍不暫停筆頃刻之間諸事便了又曰蔡景厯陳武帝鎮朱方素聞其名以書要之景厯對使人答書筆不停綴文無改易帝得書甚加欽賞即日授征北府中記室㕘軍崔鴻十六國春秋南凉錄曰禿髪傉内沃切檀子歸年十三命為高昌殿賦援筆即成影不移漏傉檀覧而異之擬於曹子建北齊書曰魏收鉅鹿人以文章見知曽奉詔為封禪文收對曰封者帝之盛事昔司馬長卿尚絶筆於此以臣下材何敢輙擬臣雖愚淺敢不竭作乃於御前下筆便就不立藁草文將千言黄門侍郎賈思同侍立深奇之白帝曰雖七步之才無以過此自武定二年以後國家大事詔命軍國文詞皆收所作每有警急不停有同宿搆速敏之工邢温之所不逮梁書曰范雲少機警有識且善屬文便尺牘下筆輒成未嘗定藁時人疑其宿搆蕭介傳曰初武帝招延後進二十餘人置酒賦詩不成罰酒一斗臧盾飲盡顔色不變言笑自若介染翰便成文無加㸃帝兩美之曰臧盾之飲蕭介之文即席之美也三國典畧曰高澄嗣渤海王聞謝挺徐陵來聘遣中書侍郎陸昻於滑臺迎勞於席賦詩昻必先成雖未能盡工亦以敏速見美梁書曰庾肩吾少勤學能鼓琴善屬文宋子仙破㑹稽購得肩吾謂之曰吾昔聞汝能詩今可作若能當貰汝命肩吾便操筆立成詩曰髮與年俱暮愁將罪共深聊持轉風燭暫映廣陵琴子仙乃釋之又曰隂鏗字子堅梁右衛將軍子春之子也徐陵言之於陳主陳主召使賦新成安樂宫鏗援筆便就陳主甚嘆賞之北史曰隋韋元正舉秀才楊素志在試退乃手題使擬司馬相如上林賦王褒聖主得賢臣頌班固燕然山銘張載劍閣銘白鸚鵡賦謂曰我不能為君住宿可至未時令就𤣥正及時並了素讀數遍大驚隋書曰楊素周武帝以為車騎大將軍儀同三司漸見禮遇帝命素為詔書下筆立成詞義兼羙帝嘉之顧謂素曰善自勉之勿憂不富貴素應聲答曰臣但恐富貴來逼臣臣無心圗富貴唐書曰太宗征遼岑文本卒於行驛召許敬宗令草駐蹕山破賊詔書敬宗立于馬前俄頃而就詞甚典麗深見嘆賞又曰賀知章晩年尤喜縱誕無復規檢自號四明狂客遨逰里巷醉後屬詞動成卷軸文不加㸃咸有可觀乂曰王勮其御切長壽中累除太子典膳丞知鳯閣舍人事時壽王成器衡陽王成義五王初出閤同日受冊有司撰儀注不載冊文及百寮在列方知闕禮宰臣相顧失色勮立召小吏五人各執筆口授分寫一時俱畢詞理俱贍時人嘆服之尋除鳯閣舍人兼𢎞文館學士又曰韋承慶遷鳯閣舍人兼掌天官選事承慶属文敏捷雖軍國大事下筆輙成未嘗起草又曰孫逖㓜而英俊文思敏速始年十五謁雍州長史崔日用日用小之令為土火爐賦握翰即成辭理俱贍日用覧之駭然遂為㤀年之交以是聲譽益重又曰𤣥宗度曲欲造樂府新詞亟召李白白嗜酒已卧於肆矣召入以水灑面即令秉筆頃之遂成十餘章帝頗嘉之又曰韋温綬之子也以書判㧞萃調補祕書省校書郎時綬致仕田園聞温登科愕然曰判入高等在羣士之上得非結交權倖而致耶令設席於庭自出判目試兩節温命筆即成綬喜曰此無愧也又曰李端登進士第工詩大厯中與韓翃錢起盧綸等文詠唱和馳名都下號大厯中十才子時郭尚父少子曖尚代宗昇平公主賢明有才思尤喜詩人而端等十人多在曖之門下每晏集賦詩公主坐視簾中詩之羙者賞曖因拜官㑹十子曰詩先成者賞時端先獻警句云薫香荀令偏憐小傅粉何郎不解愁主即以百縑賞之錢起曰李校書誠有才此篇宿搆也願賦一韻正之請以起姓為韻端即襞牋而獻曰方塘似鏡草芊芊初月如鈎未上弦新開金埒教調馬舊賜銅山許鑄錢曖曰此愈工也又曰令狐楚為太原從事自掌書記至節度判官厯仗下侍御史楚才思俊麗德宗好文每太原奏至能辨楚之所為頗稱之鄭儋都含切在鎮暴卒不及處分後事軍中喧譁將有急變中夜忽十數騎持刄廹楚至軍門諸將環之令草遺表楚在白刄之中搦管即成讀示三軍無不感泣軍情乃安自是聲名益重又曰中書舍人盧扆文思敏速初無思慮揮翰如飛文理俱愜同舍服其能天子顧待特異嘗金鑾作賦命學士和扆先成帝覧而嗟悒之曰朕聞貞元時有陸贄呉通𤣥兄弟能作内廷文書後來絶不相繼今吾得卿斯文不墜矣又曰李巨川登進士第巨川乾符中應進士屬天下大亂流離奔播切於祿仕乃以刀筆從諸侯時王重榮鎮河中辟為掌書記時車駕在蜀賊據京師重榮匡合諸藩協力弭寇軍書奏請堆案盈几巨川文思敏速翰動如飛傳之隣藩無不聳動重榮收復之功巨川之助也及重榮為部下所殺議罪㕘佐貶為漢中掾時楊子亮駐師興元素知之聞巨川至喜謂客曰天以李書記遺我也即命管記室累遷幕職金樓子曰劉備叛走曹操使阮瑀為書與備馬上立成有以此為能者吾以為兒戲耳文士傳曰劉楨坐厨人進𤓰楨為賦立成又曰潘尼曽與同僚飲主人有琉璃盃使客賦之尼於坐立成國史傳記曰李德林為内史令與楊素共執朝政素功臣之後後房婦女錦衣玉食千人德林子百藥夜入其室則某寵妾所居也素拘執于庭將斬之百藥年未二十發氣俊秀素意惜之曰聞汝善為文所作詩自叙稱吾意者當免汝死解縛授以紙筆立就素覧之欣然以妾與之并資從數十萬楊德祖答臨淄侯牋曰又嘗親見執事握牘持筆有所造作若成誦在心借書於手曾不斯湏少留思慮仲尼日月無得而踰焉脩之仰望殆如此矣且以對鶡音曷而作暑賦弥日而不厭見西施之容歸憎其貌者也曹植曽作鶡鳥賦命修賦修雖造終日不敢作遂辭不為也又命作暑賦思遲西京雜記曰枚臯文章敏速長卿制作淹遲而盡延譽然長卿首尾温麗枚臯時有累句故知疾行無善迹矣揚子雲曰軍旅之際戎馬之間飛書走檄而用枚臯廟廊之上朝廷之中高文典冊而用相如後漢書曰張衡字平子少逰太學善屬文太始時天下自公侯以下莫不踰侈衡乃擬班固兩都遂作二京賦因以諷諫至十年始成魏志曰甘露二年帝幸辟雍㑹命羣臣賦詩侍中和逌音由尚書陳騫等制作稽留有司奏免官詔曰吾以闇昧愛好文雅廣延詩賦以知得失乃爾紛紜良用惻然乃共原逌等晉書曰左思字太冲齊郡臨淄人思少好學年四十未仕潜思為三都賦十年而成貴勢之家競相傳寫又案郭伯通衛瓘為思傳曰思為三都改易死乃止南史曰顔延之與陳郡謝靈運俱以詞采齊名而遲速懸絶文帝嘗各勑擬樂府北上篇延之受詔即成靈運久之乃就梁書曰武帝晏壽光殿令劉孺張率賦詩時率與孺並辭未及成帝取孺手板戲題之曰張率東南羙劉孺洛陽才攬筆便應就何事久遲廻隋書曰薛道衡授内史侍郎加上儀同三司道衡每至搆文必隠空齋蹋壁而卧聞户外有人便怒其沉思如此李詡天寳中寓居陽翟為文精宻用思苦澁常從陽翟令皇甫曽求音樂每思涸則奏樂神逸則著文唐李建字杓植德宗聞其名擢充翰林學士未幾罷為他官高郢為御史大夫表授殿中侍御四遷兵部尚書知詔誥自以草詔思遲不願當其任談藪曰盧思道與庾知禮作詩知禮詩成而思道未就知禮曰盧詩何太春日思道曰自許偏若疾如他織錦遲太平御覧卷六百
