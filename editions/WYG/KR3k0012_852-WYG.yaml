body:
  text: 太平御覽卷八百五十二宋李昉等撰飲食部十䴺􅺙甘脆安乾特餳䴺􅺙束晳餅賦曰䴺􅺙髓燭甘脆范汪祠制曰孟夏祭下甘脆乾安特束晳餅賦曰乾安粔籹之倫盧諶祭法曰四時祠皆用乾安特餳禮記内則曰棗栗飴蜜以餌之方言曰餳謂之餦餭飴謂之䬵餳謂之餹凡飴謂之餳自闗而東陳宋楚衛之間通語説文曰飴米糵煎也餳飴和饊也釋名曰餳洋也煮米消爛洋洋然也飴小弱於餳形怡怡然也哺餔也如餳而濁可餔也後漢書曰明徳馬皇后報章帝曰吾但當含飴弄孫不能復關政矣東觀漢記曰野王獻甘膠膏餳每作大發吏以為􅀈利弊閎知之臨夢奏焉四王起事曰恵帝到華隂河間王遣使上甘菓甘餔每二百幅幽明録曰王𦙍祖安國張顯等以太元中乗船見仙人賜糖飴餅大如比輪錢厚二分淮南子曰栁下恵見飴曰可以養生盗跖見飴曰可以粘牡見物同而用之異也鹽鐡論曰洗爵以盛水升降而進糖禮雖備焉非其貴也世説曰王君夫飴餔澳釡楚辭招魂曰粔籹蜜餌有張皇張衡七辨曰沙飴石蜜逺國貢儲崔寔四民月令曰十月洗氷凍作煮餳煮暴飴盧諶祭法曰冬祠用荆餳太平御覽卷八百五十二
