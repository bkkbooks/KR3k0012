body:
  text: 太平御覧卷九百六十三宋李昉等撰竹部二竹下桂竹箭竹桃枝竹篁竹筯竹鈎端竹笻竹籦籠竹雲母竹㰚竹􅓁竹狗竹篃竹由梧竹斑皮竹篔簹竹苦竹射同竹沙麻竹石麻竹苞竹鷄脛竹蘆竹䈄竹莾竹􅦖竹簢竹仲竹􅤈竹漢竹利竹箖箊竹晉竹沛竹棘竹䈏竹弓竹簜竹筍桂竹山海經曰靈源有桂竹甚毒傷人必死始興小桂縣出桂竹箭竹爾雅曰東南之美者有㑹稽之竹箭焉禮記曰禮之於人也如竹箭之有筠也説文曰箭矢竹也戴凱之竹譜曰箭竹髙者一丈節間三尺堅勁中為矢桃枝竹爾雅曰桃枝四寸有節竹譜曰桃枝竹皮滑而黃可以為席山海經曰嶓冡之山囂水之上多桃枝竹裴氏廣州記曰有桃竹魏志曰倭國有桃枝竹篁竹竹譜曰篁竹似桂而概節筋竹竹譜曰筋竹長二丈許圍數尺至堅利出日南九真南方以為矛其筍未成竹時堪為弩弦見徐裏南中奏劉淵林云夷人以史篻音瓢竹為矛即是筋竹一物而二名者也永嘉郡記曰揚嶼去安固江口六十五里有仙石山頂上有平石壁立十餘丈名為仙壇壇陬有一筋竹凡有風來動自成宫商周景式廬山記曰康王溪道士種松及筋竹竿竺法真登羅山䟽曰岸南道旡筋竹惟羅山有之其大尺圍細如黄金堅貞䟽節異苑曰東陽流道先元嘉四年筋竹林忽生連理野人旡知謂之禍祟斫殺之鈎端竹山海經曰嶓冡之山囂水之北多鈎端竹笻竹漢書曰張騫之大夏見笻杖問之云賈人市之身毒國山海經曰龜山多狹竹即笻竹也竹譜曰笻竹髙節實中狀若人剡俗謂之扶老竹廣志云出南廣卭都縣羅浮山記曰卭竹本出卭山張騫西至大夏所見也而此山左右之鄉老以為杖籦籠竹廣志曰籦籠竹任作笛吕氏春秋曰昔黃帝命伶倫為律伶倫自大夏西至沅渝之陰取竹于嶰谷兩節間長六寸九分而吹之以為黄鍾之宫律之本也雲母竹廣志曰雲母竹大竹也㰚竹廣志曰㰚竹細而多㓨􅓁竹廣志曰􅓁竹任作笛嶺表録異曰􅓁篣竹皮薄而空多大者徑不逾二寸皮上有麤澁可為錯子錯甲利勝於鉄若鈍以酸漿漬之還復快利石麻之竹勁而利削為刀割象皮如切竿狗竹竹譜曰狗竹節間有毛出臨海篃竹竹譜曰篃竹溪江間謂之箭竿一尺數節葉大如扇可以衣篷江漢之間謂之􅞴音蒯由梧竹南方草木狀曰由梧竹吏民家種之長三四丈圍一尺八九分作屋柱出交趾林邑記曰由梧堪為屋梁柱左思呉都賦曰由梧有篁斑皮竹愽物志曰洞庭虞帝之二女啼以涕揮竹竹盡斑今下雋有班皮竹篔簹竹顧㣲廣州記曰簟竹一名篔簹節長一丈呉録曰始興曲江縣有篔簹竹圍尺五寸節相去六尺夷人以為布葛異苑曰建安有篔簹竹節中有人長尺許頭足皆具竹譜曰篔簹竹大者中釜甑苦竹永嘉郡記曰樂成縣民張薦者隐居頤志不應辟命家有苦竹數十頃在竹中為屋恒居其中王右軍聞而造之薦逃避竹中不與相見一郡號為髙士射筒竹竹譜曰射筒竹薄肌而長中着箭以為名沙麻竹南越志曰沙麻竹人削以為弓弓似弩淮南所謂溪子弩也或曰蘇麻竹或曰麤麻竹嶺表録異曰沙摩竹廣桂皆植大如盆盌内厚而空小一人止擎一莖堪為茅屋之椽梁也其種者多釤其竿每截二尺許止釘入土不逾月而根生葉明年長芽笋不三載而為林盖土地所宜也南人淹以塩為笋笴石麻竹裴淵廣州記曰石麻竹勁利削為刀切象皮如截竿苞竹顧㣲廣州記曰平鄉縣有苞竹堪作布呉都賦曰苞筍抽節往往縈結鷄脛竹竹譜曰鷄脛竹篁之類纎細大者不過如指踈葉黃皮强脆無所堪施筍美青班色緑江東所饒也蘆竹竹譜曰此竹當是蘆出揚州東垂諸郡浙江以東可以為箎䈄竹竹譜曰䈄􅀢竹大如脚指虫食其笋皮類繡甚可愛莽竹爾雅曰莽數節節間促也􅦖竹爾雅曰􅦖堅中簢竹爾雅曰簢音閔筡音徒中其中空也仲竹爾雅曰仲無笐亦竹類未詳音杭􅤈竹禮斗威儀曰君乗水而王其政太平􅤈紫脫為常生王子年拾遺記曰岑華山在西海之西有􅤈竹為簫管吹之若群鳯之鳴漢竹廣志曰永昌有漢竹圍三尺餘利竹廣志曰西南出利竹箖箊竹竹譜曰箖箊竹薄而廣晉竹呉越春秋曰呉王聞越王盡心自守賜之以書贈之以封越王乃使大夫齎葛布十萬狐皮五雙晉竹十痩以答封禮沛竹東方朔神異經曰南方荒中有沛竹其長百丈圍二丈五六尺厚八九寸可以為船其子美食之可以已瘡癘張茂先曰子筍也棘竹竹譜曰棘竹生交州諸郡藂生初有數十莖大者二尺圍肉甚厚幾於實中夷人破以為弓枝節皆有刺彼人種以為城卒不可攻萬震異物志所謂種為藩落阻過層墉者也或卒倒根出大如十石物從橫相承狀如繰車一名笆竹見三倉筍味落人鬚髮沈懐逺南越志曰宋昌縣有棘竹長十尋大如甕其間短者輙六七丈也為竹藂薄葉下有鈎刺或有條末如如芒針南州異物志曰棘竹節有棘刺嶺表録異曰南土有刺竹其枝上有刺南人呼為刺勒自根橫生枝條展轉如織雖野火焚燒只燎細枝嫩葉春藂生轉復牢宻邕州舊以刺竹為墻蠻蛋來侵竟不得入䈏竹竹譜曰䈏與􅀢􅀢厥體俱洪圍或累尺䈏實􅀢空南越之居梁柱是供異物志曰有竹曰䈏其大數圍節間相去局促中實滿堅强可為屋材㫁截之以作棟梁不復加斤斧也弓竹竹譜曰弓竹出東垂諸山簜竹尚書禹貢曰篠簜既敷爾雅曰簜竹竹别名也儀禮曰簜竹在建鼓之間謂簫管之屬筍爾雅曰筍竹萌初生者毛詩韓奕曰其蔌維何維筍及蒲筍竹萌也東觀漢記曰馬援至荔浦見冬筍名苞筍上言禹貢厥苞橘柚疑謂是也其味美於春夏筍續晉安帝紀曰豫州刺史司馬尚之為桓元將馮該所攻倉儲稍竭或白戰士多飢悉未傅食是時蘆筍時也尚之指筍曰且噉此足觧三日將士離心遂敗吕氏春秋曰味之美者越駱之筃髙誘曰筍也華陽國志曰何隨字季業有竹園人盗其筍者隨行見之恐驚人挈􅄚而歸荆州圖曰筑陽薤山有孤竹三年而生一筍笋成代謝常一楚國先賢傳曰孟宗字恭武至孝母好食筍宗入林中哀號方冬為之出因以供養時人皆以為孝感所致南史曰沈道䖍有人㧞其屋後笋令人止之曰惜此笋欲令成林更有佳者相與乃令人買大笋送與盗者慚不取道䖍使置其門内而還笋譜曰笋者笋篛也竹之醜節種凡草木有白篛而與食者皆白白篛也同庶也厥性弱於木而强於草實草木中别類也陸龜蒙笋賦曰洪纎靡定方圓不均南方有方竹太平御覧卷九百六十三
