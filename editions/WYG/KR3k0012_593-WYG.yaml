body:
  text: 太平御覽卷五百九十三宋李昉等撰文部九詔䇿誥教誡詔釋名曰詔照也人闇不見事則有所犯以此照示使昭然知所由也蔡邕獨斷曰制誥制者王者之言必為法制也誥猶告也告教也三代無其文秦漢有也文心雕龍曰皇帝御㝢其言也神淵嘿負扆而響盈四表其唯詔䇿乎昔軒轅唐虞同稱為命命之為義制性之本也其在三代事兼誥誓誓以誡戎誥以敷政降及七國並稱曰令令者使也秦并天下改命曰制漢初定儀則有四品一曰䇿書二曰制書三曰詔書四曰戒勅勅戒州邦詔告百官制施赦命䇿封王侯䇿者簡也制者裁也詔者告也勅者正也觀文景以前詔體浮雜武帝崇儒選言宏奥䇿封三王文同訓典勸戒淵雅垂範後代及光武撥亂留意斯文而造次喜怒時或偏濫暨明帝崇學惟詔間出和安政弛禮閣鮮才每為詔勑假手外請建安之末文理代興潘朂九錫典雅逸羣衞覬禪詔符采炳燿不可加也自魏晉誥䇿職在中書劉放張華互管斯任施命發號洋洋盈耳魏文以下詞義多偉至於作威作福其萬慮之一弊乎晉氏中興唯明帝崇才以温嶠文清故引入中書自斯以後體憲風流矣夫王言崇秘大觀在上所以百辟其刑萬邦作孚故授官選賢則義炳重離之輝優文封䇿則氣含雲雨之潤勑誡恒誥則筆吐星漢之華啓戎燮伐則聲有洊雷之威𤯝灾肆赦則文有春露之茲明罰勑法則詞有秋霜之烈此詔䇿之大畧也漢制度曰帝之下書有四一曰䇿書二曰制書三曰詔書四曰誡勑䇿書者編簡也其制書二尺短者半之篆書起年月稱皇帝以命諸王三公以罪免亦賜䇿而以𨽻書用尺一木兩行惟此為異也制書者制度之命其文曰制詔三公皆璽封尚書令郎重封露布州郡者詔書也其文曰告某官云如故事誡勑者謂勑某官他皆類此漢書曰誡勅刺史太守及三邊營官被勑文曰有詔勑某官是為誡勅世皆名此為策書失之甚也又曰淮南王安傳曰武帝方好藝文以安屬於諸父辨博善為文辭甚尊重之為報書及賜師古曰書賜書也常召司馬相如等視草乃遣東觀漢記曰第五倫毎見光武詔書常歎曰此聖主也當何由一得見快矣等輩笑之曰汝三皇時人也説將尚不下安能動萬乘主耶倫曰不遇知己道不同故耳范曄後漢書曰隗囂賔客掾吏多文學士每所上事當世才士大夫皆諷誦之故帝有所答尤加意焉魏志曰明帝疾欲以燕王宇為大將軍帝引見劉放孫資入卧内問之放資對曰燕王實自知不堪大任帝曰曹爽可代字不放資因贊成之又深陳宜速召太尉司馬宣王以綱維皇室帝納其言即以黄紙授放作詔放資既出帝意復變詔止宣王又曰蔣濟上萬機論帝善之入為散騎常侍時有詔詔征南將軍夏侯尚曰卿腹心重將特當任使恩施足紀惠愛可思作威作福殺人活人尚以示濟濟既至帝問曰卿所聞見天下風教何如濟對曰未有他善但見亡國之語耳帝忿然作色而問其故濟具以答因曰作威作福書之明戒天子無戱古人所慎唯陛下察之於是帝意解追取前詔王隠晉書曰武帝泰始四年班五條詔書于郡國一曰正身二曰勤民三曰撫孤寡四曰敦本息華五曰去妨民事又曰楚王瑋既誅汝南王亮尋又詔云瑋矯詔行斬刑臨死出其懷中青紙以示監刑尚書劉頌流涕而言此詔書也受此而行謂為社稷今更為罪託體先帝受枉如此幸見申列又楊駿傳曰武帝疾病未有顧命佐命功臣皆已没矣朝臣惶惑計無所從而駿盡斥羣公親侍左右因輒改易公卿樹其心腹會帝小間見所用者乃正色謂駿曰何得便爾乃詔中書以汝南王亮與駿夾輔王室駿恐失權寵從中書借詔觀之得便藏匿中書監華廙恐懼自往索之終不肯與信宿之間上疾遂篤又曰齊王冏入宫稱詔廢賈后后曰詔當從我出此何詔也晉中興書曰初顯宗㓜冲見王導恒拜又帝與導手詔則曰敬白中書作詔則曰敬問於是以為永制又曰桓𤣥左右稱𤣥為桓詔桓𦙍諫曰詔者施於辭令不以為稱謂也漢魏之主皆無此言願陛下稽古帝則令萬世可法𤣥曰此事已行必其宜革可待事平也後周書曰冀雋善隸書特工模寫魏太昌初為賀拔岳墨曹參軍及岳被害太祖引為記室時侯莫陳悦阻兵隴右太宗志在平之乃令雋偽為魏帝勑書與費也頭令將兵助太祖討悦雋依舊勑模寫及代舍人主書等署與真無異太祖大説費也頭已曽得魏帝勑書及見此勑不以為疑遂遣步騎一千受太祖節度隋書曰侍中宣詔慰勞州郡國使詔牘長一尺三寸廣一尺雌黄塗飾上寫詔書三計㑹日侍中依儀勞郡國計吏問刺史太守安不及榖價麥苗善惡人間疾苦又班五條詔書於諸州郡國使人寫以詔牘一枚長二尺五寸廣一尺三寸亦以雌黄塗飾上寫詔書正會日依議宣示使人使人歸以告刺史二千石一曰政在正身在愛人去殘賊擇良吏正決獄平徭賦二曰人生在勤勤則不匱其勸率田桑無或煩擾三曰六極之人務加寛養必使生有以自救没有以自給四曰長吏浮華奉客以求小譽逐末捨本政之所疾宜謹察之五曰人事意氣干亂奉公内外溷淆綱維不設所宜糾劾又曰陳依梁制用官式吏部與參掌人共署奏勅或可或不可不用者更銓量奏請若勅可則隨才補用以黄紙録名八座通署奏可即出付典名而典以名帖鶴頭板整威儀送往得官之家其有特發詔授官者即宣付詔誥局作詔章草奏聞勅可黄紙冩出門下門下答詔請付外施行又曰周武平齊得李徳林嘗謂羣臣云我嘗日唯聞李德林名及其與齊朝作詔書移檄我正謂其是天上人豈意今日得其驅使復為我作文書極為大異神武公糺豆陵毅答曰臣聞明王聖主得麒麟鳳凰為瑞是聖德所感非力能致之瑞物雖來不堪使用如李德林來受驅䇿亦陛下聖德感致有大才用無所不堪勝於麒麟鳳凰逺矣武帝大笑曰誠如公言唐文苑傳曰徐安貞開元中為中書舍人集賢學士毎上屬文作手詔多令安貞視草風俗通曰光武中興以來五曹詔書題鄉亭壁嵗補正多有闕謬永建中兖州刺史過翔箋撰卷别改者板上一勞而久逸崔元始政論曰俚語曰州郡記如霹靂得詔書但掛壁永平中詔禁吏卒不得繫馬宫外樹為傷害其枝葉又詔令雒陽幘工作幘皆二尺五寸圍人頭各有大小不可同度此詔不可不從也蔡質漢儀曰延熹中京師遊俠有盜發順帝陵者賣御物於市市長追捕不得周景以尺一詔召司𨽻校尉佐雄偕詣臺與三日期擒賊曹植説灌均上事令曰孤前令寫灌均所上孤章三臺九府所奏事及詔書一通置之座隅孤欲朝夕諷詠以自警誡語林曰明帝凾封詔與庾公亮誤致於王公王公開詔末云勿使冶城公知導既視表荅曰伏讀明詔似不在臣臣開臣閉無有見者明帝甚愧數月不能見王公石虎鄴中記曰石虎詔書以五色紙著鳳雛口中䇿蔡邕獨斷曰䇿者簡也禮曰不備百文不書於簡其制長二尺短者半之其次一長一短兩編下篆書起年月以命諸侯三公薨及以罪免悉以䇿書隋書曰諸王三公儀同尚書令五等開國太妃公主拜冊軸長二尺以白練衣之用竹簡十二枚六枚與軸等六枚長尺二寸文出集書皆篆字哀冊贈冊亦同唐書曰劉迺字永夷為司門員外崔祐甫秉政素與迺友善㑹加郭子儀尚父以册禮久廢至是復行之祐甫令兩省官撰册文未稱㫖召迺至閣草之立就詞義典雅祐甫歎賞久之後唐書曰同光三年太常奏呉越王錢鏐冊禮按禮文用竹冊上優其禮敕以玉為之者以玉冊帝王愛命之重數不可假之非禮之宜也殷洪小説曰魏國初建潘朂字元茂為䇿命文自漢武以來未有此制朂乃依倣商周憲章唐虞辭義温雅與誥同風于時朝士皆莫能措一字朂亡後王仲宣擅名於當時時人見此䇿或疑是仲宣所為論者紛紛及晉王為太傅臘日大㑹賔客朂子蒲時亦在焉宣王謂之曰尊君作封魏君䇿髙妙信不可及吾曽聞仲宣亦以為不如朝廷之士乃知朂作也誥尚書商書曰湯既黜夏命復歸于亳作湯誥又周書曰武王崩三監及淮夷叛周公相成王將黜殷作大誥又曰成王既伐管叔蔡叔以殷餘民封康叔作康誥又曰康王既尸天子尸主也上天子作號遂誥諸侯作康王誥李充翰林論曰誡誥施於弼違後周書曰蘇綽字令綽晉之季文章競為浮華遂成風俗太祖欲革其弊因魏帝祭廟羣臣畢至乃命綽為大誥奏行之其詞曰中興十有一年仲夏庶邦百辟咸會於王庭柱國泰洎羣公列將罔不來朝時乃大稽百憲敷于庶邦用綏我王度詞不多載自是之後文筆皆依此體三國典略曰周太廟大饗羣臣史官柳虬執簡書告于廟曰廢帝文皇帝之嗣子年七嵗文皇帝託於安定公曰是子也才由公不才亦由公勉之公既受兹重寄居元輔之任又納女為皇后遂不能訓誨有成致令廢黜負文皇帝付囑之意此咎非安定公而誰太祖乃令太常作誥喻公卿曰嗚呼我羣后暨衆士維文皇帝以襁褓之嗣託於予訓之誨之庶厥有成而予罔能弗變厥心庸暨乎廢墜我文皇帝之意嗚呼兹咎予其焉避予實知之矧爾衆人心哉惟予之顔豈惟今厚將恐後世以予為口實唐書曰孫逖掌誥八年制敕所出為時流歎服議者以為自開元以來蘇頲齊澣蘇晉賈曽韓休許景先及逖為王言之最逖尤苦思文理精練晉史曰髙祖令制誥之辭不得虛飾冗長必須陳其實行以正王言教尚書舜典曰契汝作司徒敬敷五教在寛春秋元命苞曰天垂文象人行其事謂之教教傚也言上為而下傚也文心雕龍曰教者傚也言出而民傚也故王侯稱教昔鄭𢎞之守南陽條教為後所述乃事緖明也孔融之守北海文教麗而罕於理乃治體乖也若諸葛孔明之詳約庾稚恭之明斷並理得而詞中教之善也誡漢書曰京兆尹王尊出教令文心雕龍曰戒敕為文實詔之切者魏武稱作敕戒當指事而語勿得依違曉治要矣及晉武敕戒備告百官敕都督以兵要戒州牧以董司警郡守以恤隠勒牙門以禦衛有訓典焉戒者慎也禹稱戒之用休君父至尊在三㒺極漢髙之敕太子東方朔之戒子亦顧命之作也及馬援以下各貽家戒班姬女戒足稱母師矣太公金匱曰武王曰五帝之戒可得聞乎太公曰黄帝居民上揺揺恐夕不至朝故為金人三緘其口慎言語也東方朔傳曰朔戒其子以上容應劭曰容身避害也首陽為拙柱下為工飽食安步以仕易農依隠玩世詭時不逢後漢書曰馬援兄子嚴敦並喜譏議而通輕俠客援在交趾還書戒之曰聞人過失如聞父母之名耳可得聞口不可得言也好論人長短妄是非正法寧死不願子孫有此行也龍伯髙敦厚周慎謙約節儉吾愛之重之願汝曹效之杜李良豪傑好義憂人之憂樂人之樂父喪致客數郡畢至吾愛之重之不願汝曹效也效伯髙不得猶為謹飭之士所謂刻鵠不成尚類鶩者也效季良不得陷為天下輕薄子所謂畫虎不成反類狗者也裴松之以援此誡為切至之論不刋之訓也杜恕家事戒曰張子臺視之似鄙樸人然其心中不知天地間何者為惡毅然如與隂陽合德作人如此富貴不期而至禍患何由而生陶淵明遺戒曰夫天地賦命有生必有終自古聖智誰能獨免汝輩既稚小不同生當知四海皆為兄弟之義鮑叔管仲分財無猜歸生伍舉班荆道舊遂能以敗為成因喪立功他人尚爾况同父之人哉潁川韓元長漢末名士身處卿佐八十而終兄弟同居至於没齒濟北汜稚春晉時操行人也七世同居家人無怨色詩云髙山仰止景行行止汝慎哉顔延年庭誥曰喜怒者有性所不能無常起於褊量而止於𢎞識然喜過則不重怒過則不威能以恬淡為體寛愉為器美矣大喜蕩心微抑則定甚怒煩性稍忍即歇故動無墮容止無失度則為善也欲求子孝必先為慈將責弟悌務念為友雖孝不待慈而慈能植孝悌非期友而友亦立悌夫和之不備或應以不和猶信之不足必應以不信倘知恩意相生情理相出可使家有參柴人皆由損枚叔有言欲人勿聞莫若勿謂禦寒莫若重裘止謗莫若自脩論語云内省不疚何憂何懼太平御覽卷五百九十三
