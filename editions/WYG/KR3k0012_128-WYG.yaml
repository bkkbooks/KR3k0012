body:
  text: 太平御覽巻一百二十八宋李昉等撰偏覇部十二宋劉裕劉義符劉義隆劉劭劉駿劉子業劉彧劉昱劉準劉裕徐爰宋書曰髙祖武皇帝姓劉氏諱裕彭城緩輿里人夜生有神光之異是夕甘露降於墓樹常遊下邳遇一沙門于逆旅沙門言及中原故事因云江表尋當喪亂髙祖曰便遂至亂亡當有拯之者沙門曰拯之者其在君乎其意甚至初髙祖患手瘡積年未瘳沙門曰此瘡難治先有良藥當以相與因出懷中黄散裹留之沙門既去髙祖追而望之倐忽不見以黄散治瘡一傅而愈餘散寳藏之被金瘡輙用有驗晉陵人常叟少以占相為事其言多驗嘗相髙祖曰君當貴為方伯乆之又曰君相輙進貴不可言唯願富貴無相忘晉末妖賊孫恩作亂前将軍劉牢之東討牢之請髙祖叅軍事牢之命髙祖覘賊逺近将勇士數十人會遇賊至乃迎擊之賊衆數千髙祖所将人多死而戰意方酣奮長刀所殺傷甚衆牢之子敬宣疑髙祖淹乆恐為賊所殺乃輕騎赴之既而衆騎並至賊遂大崩髙祖為流矢所傷信宿而愈自後累被重傷皆弗以為患軍中益加敬憚恩北走海鹽髙祖追而翼之築城于海鹽故治恩知城弗可下乃進向滬瀆帝復棄城追之恩乘風浮海奄至丹徒師衆數萬鼔噪登于蒜山居民皆荷擔而走髙祖率所領奔擊大敗之投巘赴水死者甚衆恩顛沛僅得還船雖被摧破猶恃衆力遂徑向京師朝廷震懼以高祖為建武将軍下邳太守帥舟師討恩于郁洲復大破之桓𤣥從兄循以撫軍鎮丹徒以髙祖為中兵叅軍𤣥簒帝位循入朝𤣥髙祖從至京師𤣥既宿憚髙祖威名又悦髙祖之風儀姿貌語司徒王謐曰昨見劉裕卿不得獨擅其清或告𤣥曰劉裕龍行虎步瞻視不凡恐必不為人下冝早為之所𤣥曰我方欲平蕩中原使裕以萬人為前驅關隴不足定也事定之後當更議之耳高祖乃以弟道規沛國劉毅東海何無忌潜謀匡復桓循弟𢎞為征虜将軍鎮廣陵以道規為中兵叅軍劉毅先亦為𢎞吏佐遭母憂還京口至是往江北與道規共集義兵髙祖㑹無忌及任城魏詠之劉毅從弟蕃等共謀二十七人并願從者百餘人是時大風暴起丙辰詣朝門義衆馳入稱有詔齊聲大呼吏士驚散即獲桓循斬而徇之與主簿平昌孟昶等帥将士六十人斬𢎞於廣陵城因収衆濟江𤣥遣頓丘太守吳甫之右衛将軍皇甫敷北拒義軍或曰裕等衆力甚弱豈辦之有成陛下何慮之甚𤣥曰劉裕足為一世之雄劉毅家無儋石之儲樗蒱一擲百萬何無忌劉牢之甥酷似其舅共舉大事何謂無成衆推高祖為盟主移檄京邑遇吳甫之於江乘甫之𤣥驍将也其兵甚鋭髙祖躬執長刀入其陣衆皆披靡即斬甫之進至羅落橋高祖望賊旗鼓誓衆馳進挺劔指麾光耀如電将軍皆莫敢仰視但憑神武争為先登皆殊死戰無不一以當百呼聲動天地風火並起鉦鼓之音震駭京邑桓謙等諸軍一時土崩髙祖鎮石頭畱百官羣寮宿衛各率其職於是推髙祖為使持節都督揚徐兖豫青冀幽并八州諸軍事鎮軍将軍徐州刺史桓𤣥經潯陽江州刺史郭昶之備乘輿法服以資之收畧二千餘人挾天子奔于江陵冠軍将軍劉毅輔國将軍何無忌帥諸軍南討獲𤣥大将軍鄭鈐等于桑落洲𤣥棄衆復挾天子西走初益州刺史毛璩遣弟子修之誘𤣥以入蜀至於枚囘州益州都䕶馮遷斬𤣥首傳于京師天子反正詔進位侍中都督中外諸軍事髙祖固讓加録尚書封豫章公邑萬户絹三萬疋鮮卑慕容德僣號於青州德死從子超襲偽位公抗表北討屠廣固超踰城走獲之戮其王公以下約口萬餘馬二千疋夷其城隍獻超于京師斬于建康市盧循㓂南康廬陵豫章諸郡守皆委任奔走馳使徴公公至下邳留船運輜重自帥精鋭步歸孟昶諸葛長民懼冦之深入欲擁天子過江公弗聴昶窮窘無餘圖飲藥而卒羣賊大至公悉出輕利鬭艦躬提幡鼓命軍衆齊力擊之賊衆大敗追奔逮夜乃收兵而歸循等還潯陽公更簡練三軍将進攻討循聞大軍至欲遁還豫章乃悉力柵斷左里丙申大軍至左里将戰公提幡麾以進兵幡竿折遂沉于水衆皆失色公自忻笑曰徃年覆舟之戰亦幡竿折今復然賊必破矣衆乃大悦即攻柵並進循兵雖死戰猶弗能禁諸軍乘勝擊之循單舸走劉蕃孟懷玉斬徐道覆于始興傳首京師交州刺史杜慧度斬盧循父子函首送都劉毅為荆州刺史矜功驕恣公表請討之毅及黨與皆伏誅分遣諸軍伐蜀以朱齡石為益州刺史公授以謀畧遂平成都斬偽蜀王譙縱荆州刺史司馬休之潜結雍州刺史魯宗之宗之得書響應公帥衆軍西討休之不敢戰乃棄城走奔羌羌偽主姚興死子泓新立人情騷擾公乃抗表北伐諸軍入關及秦姚泓戰破之泓肉袒降公至長安長安豐稔帑藏盈積數千萬公先收彞器渾儀土圭之屬獻于京師其餘珍寳珠玉悉以班諸将執姚泓歸之有司斬于建康市公至洛陽常有紫雲見於軍上晉帝乃命有司禪位于王改元熈二年為永初元年三年正月崩于西殿年六十七沈約宋書曰髙祖諱裕字德輿漢楚元王交之後也小字寄奴初髙祖家貧嘗負刁逵社錢三萬經時無以還逵逵執録甚嚴王謐造逵見之乃密以錢代還由是得釋髙祖名微位薄盛流皆不與相知唯謐交焉桓𤣥将簒謐手解安帝璽綬為𤣥佐命功臣及義旗事建衆並謂謐冝誅唯高祖保持之上清簡寡欲嚴整有法度不事珠玉輿馬之飾後庭無絲竹之音寧州常獻虎魄枕光色甚麗時将北征以虎魄治金瘡上大悦命擣碎分付諸将卒關中得姚興從女有盛寵以之廢事謝晦諌即時遣出錢帛皆付外府内無私藏宋臺建有司奏東西堂施局脚牀銀塗釘上不許使用直脚牀釘用鉄孝武帝大明中環上所居陰室於其處起玉燭殿與羣臣觀之牀頭土鄣壁上掛葛燈籠麻繩紼侍中袁覬盛稱上儉素之德故能光有天下克成大業焉宋書髙祖遊京口竹林寺獨卧講堂前上有五色龍章衆僧見之驚以白帝帝獨喜曰上人無妄言也述異記曰宋高祖微時常逰㑹稽過孔靖宅正晝卧有神人衣服非常謂之曰起天子在門既而失之靖遽出適與帝遇延入結交贈遺臨别執帝手曰卿後必當大貴願以嗣身為託帝許之及定京邑靖自山隂令擢為會稽内史劉義符徐爰宋書曰少帝諱義符髙祖子也髙祖崩五月即皇帝位廬陵王義真明雋秀發朝野屬望而司空徐羡之尚書僕射傳亮領軍謝晦等貪弄朝權忌之乃共誣罔構成其釁収義真徙於新安郡夏五月徐羨之王𢎞傳亮謝晦檀道濟共謀廢帝露仗入殿時上在華林園寢舟中兵士競進殺侍御者二人遂扶上出東閤廢為滎陽王一依漢昌邑晉海西故事遂徙于吳郡六月徐羡之等使邢安太殺滎陽王於金昌亭年十九沈約宋書曰羡之等将謀廢立而廬陵王義真輕動多過不任主四海乃先廢義真然後廢帝侍中程道惠勸立第五皇弟義恭羨之不許遣使殺義真於新安殺帝於吳縣帝突走出昌門追者以門關擊之倒地然後加害劉義隆沈約宋書曰太祖文皇諱義隆小字車兒武帝第三子也授西中郎将荆州刺史長七尺五寸博涉經史善𨽻書少帝廢百官備法駕奉迎即皇帝位改元元嘉元年三年正月司徒録尚書事揚州刺史徐羨之尚書令䕶軍將軍𫝊亮有罪伏誅遣中領軍到彦之征北将軍檀道濟討荆州刺史謝晦上親帥六師擒晦於延頭送京師伏誅京師疾疫遣使存問給醫藥死者若無家屬賜以棺木十二年大水京邑乘舡二十四年貨貴制大錢一當兩三十年三月遇弑于含光殿年四十七劉劭沈約宋書曰劉劭字休逺文帝長子六歳拜為皇太子二十七年有女巫嚴道育自言通靈夫為劫坐没入奚官劭姊東陽公主應閤婢王鸚鵡白公主云道育有異術主乃白上召入道育自言服食主及劭皆惑之始興王濬與劭並多過失使道育祈請令不上達遂為巫蠱事泄道育叛亡變服為尼逃匿東宫濬往京口復載将去三十年二月濬自京口入朝復載還東宫有上告云京口有一尼服食出入征北内似嚴道育上使掩録得二婢云道育隨濬還都上乃使京口送道育二婢須至檢覈廢劭賜濬死濬母潘妃具以告濬濬馳報劭劭因是有異謀其月二十一日召前中庻子蕭斌告以逆事明旦與斌同載從萬春門入張超之手行弑逆又使人殺潘淑妃濬屯中堂劭即偽位改元嘉三年為太初元年世祖及南譙王義宣隨王誕並舉義兵劭以事委王羅漢魯秀以拒義軍三月十九日義軍至新林二十一日至新亭二十二日劭衆連敗相繼散降五月四日義軍薛安郡等並入殿臧質從廣莫門入同㑹大極殿前劭穿西垣入武庫即從井中牽出縳劭於馬上防送軍門斬于牙下濬劭及四子並梟首暴屍於市投劭濬屍于江張超之為亂軍剖腹刳心臠食其肉焚其骨道育鸚鵡並都街鞭殺於石頭四望山下焚屍揚灰于江後史云劭為元㐫劉駿沈約宋書曰世祖孝武皇帝諱駿字休龍小字道民文帝第三子遷南中郎将江州刺史元㓙弑逆以為征南将軍加散騎常侍上帥衆入討荆州刺史南譙王義宣雍州刺史臧質並舉義兵元嘉三十年四月上至于新亭即皇帝位五月尅京城孝建元年春親祀南郊改元大赦詔凡諸守蒞親民之官有申詳舊條勸盡地利力田善蓄者具以名聞更鑄四銖錢立子業為太子賜為父後者爵一級大明元年正月大赦改元四月京師疾疫遣使案行賜給醫藥死而無收歛者官為歛埋諸王及妃主庻姓位從公者喪事聴設㓙門餘悉斷司空南兖州刺史竟陵王誕有罪貶爵誕不受命據廣陵反上親御六師車駕出頓宣武堂三年七月尅廣陵斬誕初立馳道自閶闔門至朱雀門又自承明門至於𤣥武湖七年於博望梁山立雙闕八年閏五月帝崩於玉燭殿年三十五沈約宋書曰世祖逰幸無度太后六宫常乘副車在後沈懷文與王景文毎諌不冝數出嘗同從坐松樹下風雨甚驟景文曰卿可以言矣懷文曰獨言無益冝相與諌之江智淵卧草側亦謂言之為善俄而被召俱入雉塲懷文曰風雨如此非聖躬所冝冒景文又曰懷文所啓冝從智淵未及有言上方注弩作色曰卿欲効顔峻耶何以恒知人事又曰顔峻小子恨不得鞭其面劉子業沈約宋書曰前廢帝諱子業小字法師孝武帝長子也世祖入伐元㓙被囚於侍中下省将見害者數矣卒得無恙世祖崩其日太子即皇帝位罷南北二馳道孝建以來所改制度還依元嘉是歳郡大旱甚米一升數百錢京邑亦至百餘永光元年春改元大赦時帝㓙悖日甚誅殺相繼内外百司不保首領先訛言湘中出天子帝将南廵荆湘二州以厭之先欲誅除諸叔然後發太宗與左右阮佃夫王道隆李道兒宻結帝左右壽寂之姜産之等十一人謀共廢帝戊午夜帝於華林園竹林堂射鬼時巫云見此堂有鬼故帝自射之夀寂之懷刃入姜産之為副帝欲走寂之追而殞之時年十七帝幼而狷急在東宫每為世祖所責世祖西巡子業啓参承起居書跡不謹上讓之子業啓事陳謝上答曰書不長進此是一條耳聞汝素業都懈狷戾日甚何以頑固乃爾耶帝少好讀書頗識故事自造世祖誄及雜篇章往往有辭采沈約宋書曰前廢帝景和末召南平王鑠妃江氏入宫使左右於前逼迫之江氏不受命謂之曰若不從當殺汝三子江氏猶不肯於是遣使殺弟敬猷敬淵等鞭妃一百其夕廢帝亦殞劉彧沈約宋書曰太宗明皇帝彧字休炳小字榮期文帝第十一子也為雍州刺史景和末上入朝被留停都廢帝誅害宰輔殺戮大臣恒慮有圖之者疑畏諸父並拘之殿内收上付廷尉一宿被原将加禍害者前後非一既而害上意定明旦便應就禍上與腹心阮佃夫李道兒壽寂之等宻共合謀殞廢帝於後堂建安王休仁便稱臣引升西堂御坐召見大諸臣于時事出倉卒上失履跣至西堂猶著烏㡌坐定休仁呼主衣以白㡌代之以備羽儀雖未即位凡衆事悉稱令書施行上即皇帝位大赦天下改景和元年為泰始元年鎮軍江州刺史晉安王子勛舉兵反鎮軍長史鄧琬為其謀主雍州刺史袁顗帥衆赴之車駕親御六師出頓中興堂司徒建安王休仁帥衆軍大破賊斬偽尚書僕射袁顗進討江郢雍湘五州平之晉安王子勛並賜死同黨皆伏誅泰豫元年四月上大漸袁粲禇淵劉勔蔡興宗沈攸之同被顧命上崩于景福殿年三十四帝少而和令丰姿端雅早失所生養於路太后宫内大明世諸弟多被猜忌唯上見親常侍太后醫藥上好讀書愛文義在藩時撰江左以來文章志又續衞瓘所注論語二卷行世及即大位四方反叛以寛仁待物諸將帥有父兄子弟同逆者並授以禁兵委任不異故衆為之用莫不盡力平定天下逆黨多被全宥其才者並見授用有如舊臣才學之士多蒙引進參究典籍應對左右於華林園講周易常自臨聴末年好鬼神多忌諱近讒慝剪落皇枝宋氏之業自此衰矣沈約宋書曰王景文為揚州刺史上既有疾而諸弟並已見殺惟桂陽王休範人才本劣不見疑出為江州刺史慮一旦晏駕皇后臨朝景文自然成宰相門族强盛藉元舅之重歳暮不為純臣泰豫元年春上疾篤乃遣使送藥賜景文死手詔曰與卿周旋欲守卿門户故有此處分劉昱沈約宋書曰廢帝諱昱字德融小字慧震明帝長子也太宗諸子在孕皆以周易筮之即以得之卦為少字故帝字慧震立為太子太宗崩皇太子即位元徽元年正月改元二年太尉江州刺史桂陽王休範舉兵反賊奄至攻新亭壘齊王拒擊大破之越騎校尉張茍兒斬休範五年七月戊子夜帝殞於仁壽殿初帝在東宫年五六歳時始就學而惰業好嬉戲主師不能禁好緣漆帳竿去地丈餘如此者半食乆乃下年漸長喜怒無節左右有失㫖者輙手加撲打徒跣蹲踞以此為常主師以白太宗上輒敕昱所生嚴加捶訓及嗣位内畏太后外憚諸臣猶未得肆志自加元服變態轉興内外稍無以制三年秋冬間便好出遊行太妃毎乘青篾車随相檢攝漸自放恣太妃不復能禁單将左右棄部伍入市里或十里二十里或往營署旦出日暮乃歸四年春夏此行彌數京城尅定意志轉驕於是無日不出與左右人解僧智張五兒恒相馳逐夜出承明門夕去晨反旦去暮歸從者並執鋋矛行人男女及馬驢值無免者民間憂懼晝夜不敢開門道上行人殆絶常著小袴褶未嘗服衣冠有白棓數枚各有名號鉗鑿錐鋸之徒不離左右常以鐵錐錐人陰破左右人有歛眉者昱大怒令此人袒胛正立以矛刺胛洞骨於耀靈殿上養驢數十頭所自乘馬養於御床側先是民間訛言謂太宗不男昱是李道兒子昱毎出入去來常自稱劉統或自號李將軍與右衛翼輦營女子私通毎從之遊持數千錢供酒肉之費製露車一乘其上施蓬乘以出入從者不過數十人羽儀追之恒不及又各慮禍亦不敢追尋唯整部伍别在一處瞻望而已凡諸鄙事過目即能鍜金銀裁衣作㡌莫不精絶未嘗吹篪執管便韻天性好殺以此為歡一日無事慘慘不樂齊王潜圖廢立與直閣将軍王敬則謀之七月七日昱乘露車從二百許人無復鹵簿羽儀往青園尼寺曉至新安寺就曇度道人飲酒醉夕扶還仁壽殿東阿氊幄中卧時昱出遊無度省内諸閤皆夜不閉宿衞并逃避内外無禁攝王敬則先結昱左右楊萬年等二十五人謀共取昱其夕王敬則出外玉夫見昱醉熟無所知乃與萬年同入氊幄内以昱防身刀斬之提昱首依常行法稱敕開承明門出以首與敬則馳至領軍府以首付齊王王乃戎服率左右數十人稱行還開承明門入昱他夕開門門者震懼不敢視至是弗之疑齊王既入曉乃奉太后令奉迎安成王劉準沈約宋書曰順皇帝諱準字仲謀小字智觀明皇帝第三子也封安成王廢帝殞奉迎王入居朝堂壬辰即皇帝位昇明元年改元大赦齊王出鎮東城輔政作相三年加相國總百揆備九錫之禮四月禪位於齊王壬辰帝遜于東郊既而遷居丹陽宫封為汝隂王殂于丹陽諡曰順皇帝時年十三太平御覽卷一百二十八
