body:
  text: 太平御覽卷三百四十三宋李昉等撰兵部七十四劒中吳越春秋曰越王允常聘歐冶子作名劒五枚三大二小一曰純鉤二曰湛盧三曰豪曹或曰磐郢四曰魚膓五曰鉅闕秦客薛燭善相劒王取豪曹示之薛燭曰非寳劒也夫寳劒五色並見今豪曹五色黯然無華殞其光亡其神矣王復取鉅闕示之薛燭曰非寳劒也夫寳劒金錫和同氣如雲烟今其光已離矣王復取魚腸示之燭曰夫寳劒者金精從理至本不逆今魚腸倒本從末逆理之劒也服此者臣弑其君子弑其父王取純鉤示之薛燭矍然而望之曰光乎如屈陽之華沈沈如芙蓉始生扵湘池觀其文如列星之芒觀其光如水之溢塘觀其色渙如氷將釋見日之光此純鉤也耶王曰是也客有買此劒者市之鄉三十駿馬千疋千戸之都二其可與乎薛燭曰不可臣聞王之初造此劒赤堇之山破而出錫若耶之溪涸而出銅雨師灑道雷公發鼓蛟龍捧爐天帝装炭太一下觀於是歐冶子采天地之精悉其伎巧造為此劒吉者宜王凶者可以遺人凶者尚直萬金况純鉤者耶取湛盧示薛燭曰善哉銜金鐡之英吐銀錫之精竒氣託靈有逰出之神服此劒者可以折衝伐敵人君有逆謀則去之他國允常乃以湛盧獻吳吳公子光殺吳王僚湛盧去如楚昭王寤而得召風胡子問之曰此劒值幾何對曰赤堇之山已合若耶之溪深而不測羣神上天歐冶已死雖有傾城量金珠玉不可與况駿馬萬戸之都乎又曰越王問范蠡用兵行陣對曰越有處女出扵南林之中願君王問以手戰之道立可見也處女將見道逢老人自稱袁公袁公曰聞子善為劒願一觀之女曰妾不敢有隠袁公即跪拔林之竹處女即接其末公操其本而刺處女處女因舉杖擊之袁公即飛上樹變為白猨女别去見越王越王大悦乃命五校之隊長髙才習之以教軍人當此之時皆稱越女劒又曰干將者吳人與歐冶同師俱作劒前獻劒一枚闔閭得而寳之以故使干將造劍二枚一曰干將二曰莫耶莫耶者干將之妻名也干將作劍採五山之精合六合之英候天伺地隂陽同光百神臨觀天氣下䧏而金鐵之精未流莫耶曰子以善為劒聞於王王使子作劒三年不成者其有意乎干將曰吾不知其理莫耶曰夫神物之化湏人而成今夫子作劒得無當得人而後成干將曰昔吾師之作冶也金鐵之頴不消夫妻俱入冶爐之中莫耶曰先師親爍身以成物妾何難也於是干將夫妻乃斷髮揃音剪指投之爐中使僮女一作子三百鼓橐装炭金鐡乃濡遂以成劒陽曰干將而作龜文隂曰莫耶而作漫理干將匿其陽出其隂而獻之闔閭闔閭甚惜之又曰伍子胥過江解劒與漁父曰此劒中有七星北斗文其值千金越絶書曰楚王召風胡子而問之曰寡人聞吳有干將越有歐冶子此二人寡人願賫邦之重寳皆以奉子因吳王請此二人為鐡劒可乎風胡子曰善於是乃令風胡子之吳見歐冶子干將使之為鐵劒歐冶子干將鑿茨山洩其溪取其鐡英為劍三枚一曰龍淵二曰太阿三曰工市劍成風胡子奏之楚王楚王見之精神大悦見風胡子問之曰此三劒其名為何風胡子曰一曰龍淵二曰太阿三曰工市楚王曰何為龍淵太阿工市風胡子對曰欲知龍淵觀其狀如登髙山臨深淵欲知太阿觀其鍔巍巍翼翼如流水之波欲知工市觀其鍔從文間起至脊而止如珠而不可枉文若流而不絶晋魏聞此三劒而求之不得興師圍楚之城三年不解倉榖盡庫無兵革於是引太阿之劒登城而麾之三軍破敗士卒迷惑流血千里晋鄭之頭畢白楚王於是大悦曰此劒威耶寡人力也風胡子對曰劒之威也因大王之神楚王曰劒鐡耳固能有精神如此乎風胡子曰神農以石為兵黄帝以玉為兵禹以銅鐵為兵天下皆服此亦鐵之神也王之徳也又曰闔閭冡吳縣閶門外名曰白虎丘磐郢魚腸之劒在焉十萬人治之葬三日白虎居上號曰虎丘又曰伍子胥走吳至江上見漁者曰來渡我漁者知其非恒人因載入船子胥即解其劒以與漁者曰吾先人之劒值百金請以與子也漁者曰吾聞荆王有令曰能得伍子胥者購之千金吾欲得荆王之千金何以子百金之劒為漁者渡子胥之津曰亟餐而去無令遣追者及子也子胥行即覆船而死琴操曰聶政父為韓王冶劒過期不成王殺之時政未生壯問母知之乃上太山遇仙人學鼔琴漆身為厲吞炭變音七年琴成入韓逢其妻從置􅌨對妻而笑妻泣曰君何似政齒政曰天下人齒相似反入山援石擊落其齒以刀内琴中刺韓王列士傳曰干將莫耶為晋君作劒三年而成劒有雌雄天下名噐也乃以雌劒獻君留其雄者謂其妻曰吾藏劒在南山之隂北山之陽松生石上劒在其中矣君若覺殺我爾生男以告之及至君覺殺干將妻後生男名赤鼻具以告之赤鼻斫南山之松不得劒思於屋柱中得之晋君夢一人眉廣三寸辭欲報讎購求甚急乃逃朱興山中遇客欲為之報乃刎首將以奉晋君客令鑊煑之頭三日三日跳不爛君徃觀之客以雄劒倚擬君君頭墮鑊中客又自刎三頭悉爛不可分别分葬之名曰三王冢列異傳曰莫耶為楚王作劒藏其雄者搜神記亦曰為楚王作劒餘悉同也孝子傳曰眉間赤名赤鼻父干將母莫耶父為晋王作劒藏雄送雌母孕赤父曰男當告之曰出戸望南山松生石上劒在其巔及産果母以告赤赤破柱得劒欲報晉君客有為報者将赤首及劒見晉君君怒烹之首不爛王臨之客以劒擬王王首墜湯中客因自擬之三首盡廢不分乃為三冢曰三王冢也文士傳曰魏文帝愛楊脩才脩誅後追憶脩脩曾以寳劒與文帝帝後佩之告左右曰此楊脩劒也周斐先賢傳曰許嘉給縣功曹儀小吏當持劒侍及功曹月朔具朝并持炬火嘉於是忿然歎曰男兒為吏不免賤役投其炬於地以劒帶槐樹趨謁府門南記曰魏應字尹伯任城人明魯詩章帝重之數進見論難於前侍受賞賜劒玦衣服先賢行狀曰王烈字彦方通識達道時國中有盗牛者牛主得之盗者曰我邂逅迷惑從今以後將改過子既已赦宥幸無使王烈聞之人有以告烈者烈以布一端遺之或問此人既有盗畏君聞之反與布何也烈曰昔秦穆公人盗其駿馬食之已而賜之酒盗者不愛其死以救穆公之難今此盗人能悔其過懼吾聞之是恥惡則善心將生故與布勸為善也朞年之中行路老父擔重人代擔行數十里欲至家置而去問姓字不以告頃之老父復行失劒於塗有人行而遇之欲置而去懼後人得之劒主永失訴取而購募或至差錯遂守之至暮劒主還見之前者代擔人也老父攬其袂曰子前者代吾擔不得姓名今子復守吾劒于路未有若子之人子請告吾姓名將以告王烈乃語之而去老父以告烈烈曰世有仁人吾未見之使人見之乃昔時盗牛人也雷煥别傳曰煥字孔章鄱陽人善星歴卜占晉司空張華夜見異氣起牛斗華問煥見之乎煥曰此謂寳劒氣華曰時有相吾者云君當貴達身佩寳劒此言欲效矣乃以煥為豐城令煥至縣移獄掘入三十餘尺得青石函一枚中有䨇劒文采未甚明煥取南昌西山黄白土用拭劒光艶照曜乃送一劒并少黄土與華自留一劒華得劒并土曰此干將也莫耶何復不至然天生神物終當合耳乃更以華隂赤土一斤送與煥煥得磨劒鮮光愈亮及華誅劒亡玉匣莫知所在後煥亡煥子爽帶劒經延平津劒無故墮水令人沒水逐覺見二龍長數丈盤交須臾光采澄發曜日映川説苑曰經侯徃過魏太子左帶玉具劒右帶環珮左光照右右光照左又曰西閭過渡河而溺焉能説諸侯過曰干將莫耶拂鍾不錚以之攝履曾不如兩錢之錐錚楚庚切又曰齊遣淳于髠到楚髠為人頭小楚王甚薄之謂曰齊無人耶而使子來子何長也髠對曰臣無所長腰中七尺之劒欲斬無狀王王曰止吾但戲子耳即與髠共飲酒鹽鐡論曰所謂利兵者非謂吳楚之鋌干將之劒也以道徳為城以仁義為郭莫之敢攻莫之敢入文王是也以道徳為胄仁義為劒莫之敢當莫之敢禦湯武是也今不建不攻之城不可當之兵而任匹夫之役而行三尺之刃亦細矣魏文帝典論曰余好擊劒善以短乗長選兹良金命彼國工精而煉之至于百辟其始成也五色駭鑪巨橐自鼓又曰建安二十四年二月丙午魏太子丕造百辟寳劒長四尺二寸重一斤十有五兩淬以清漳厲以礛音監䃴音諸飭以文玉表以通犀光似星名曰飛景礛䃴青􅀈石也世説曰王子喬墓在京陵戰國時人有盗發之者覩無所見唯有一劒停在空中欲進取之劒作龍鳴虎吼遂不敢近俄而徑飛上天又曰鍾㑹是荀濟北從舅二人情好不協荀有好寳劒可值百萬常在母鍾太夫人所㑹善書學荀手跡作書與母取劒仍竊去不還荀深知是鍾無可得求思所以報之鍾㑹兄弟共以千萬起新宅始成甚精麗未得移住荀善畫於是潜徃畫鍾門堂並作太傅形像衣冠狀貌如平生二鍾來入門便大感慟於是宅遂空廢陶宏景刀劒録曰夏禹字髙密在位十年以庚戌八年鑄一劒長三尺九寸後藏之㑹稽秦望山腹上刻二十八宿文有背面面記星辰背記山水日月又曰啓子少康在位二十九年嵗次辛卯二年春鑄一銅劒上有八面長三尺一寸頭方又曰孔甲在位四十年以九年嵗次甲辰採牛頭山鐵鑄一劒銘之曰夾古文篆長四尺一寸又曰太甲在位三十二年以四年嵗次甲子鑄一劒長二尺九寸文曰定光古文篆書又曰武丁在位五十九年嵗次戊午鑄一劒長三尺銘曰照膽大篆書又曰周昭王瑕在位五十一年二年嵗次壬午鑄五劒各投五岳鎮方岳大篆書長五尺又曰簡王夷在位十四年嵗次癸酉鑄一劒銘曰日駿長三尺大篆書又曰秦昭王在位五年元年丙午鑄一劒長三尺銘曰誡大篆書又曰始皇在位三十七年三年丁巳採北祗銅鑄二劒銘曰定秦李斯小篆書李斯則一口埋在阿房闕下一口埋在目觀臺長六尺又曰前漢劉季在位十二年季以始皇三十四年於南山得一鐵劒長三尺小篆書銘曰赤霄及貴常服之此即斬白蛇之劒也又曰文帝恒在位二十三年以初元十九年庚午鑄三劒各長三尺三寸銘曰神龜形以應大横之兆帝崩命入𤣥宫又曰武帝徹在位五十四年以元光五年乙巳鑄八劒各長三尺六寸銘曰八服小篆書嵩翟衡華㤗山皆埋之又曰宣帝詢在位二十五年太始四年鑄兩劒各長三尺一曰毛二曰貴以應足下毛祥背小篆書又曰平帝衍在位五年元始元年辛酉掘得一劒上有帝名因服之大篆書又曰新室王莾在位十八年建國五年造威斗及神劒背練五石馬之名曰神勝萬國伏小篆書長三尺六寸又曰劉更始聖公在位二年自造一劒銘曰更國小篆書又曰後漢光武帝秀在位三十三年未貴時南陽鄂水中得一劒文曰秀覇小篆書服之又曰漢明帝莊在位十八年元平元年戊午鑄一劒上作龍形沈之于洛水又曰章帝炟在位十三年建初八年鑄一金劒投之伊水以厭膝人之恠𢎞景按水經伊水有一物如人膝頭有人浴輙引之投水又曰安帝祐在位十九年永初七年鑄一劒藏峨嵋山擬山王也又曰順帝保在位十九年永建元年鑄一劒長三尺四寸小篆書銘曰安漢後遂為年號又曰靈帝宏在位二十二年以建和三年鑄四劒曰中興一劒無故而失又曰魏武帝曹操以建安二十年於谷中得一劒三尺六寸上有金字銘曰孟徳正常服之又曰齊王芳正始六年造一劒常服之無故失其刃但有空匣又曰吳主孫權黄武五年採武昌山銅鐵作一口劒萬口刀各長三尺九寸刀頭方皆是南鋼越炭作之上有大吳篆字又曰吳孫權赤鳥中有人得淮隂侯韓信劒帝賜周瑜又曰孫亮建興二年鑄一劒銘曰流光小篆書又曰孫皓建初元年鑄一劒銘曰皇帝吳主小篆書又曰蜀後主劉禪延熈二年造大金劒長一丈二尺鎮劒口山徃徃人見輝光後人處處求覔不得又曰宋劉昱元徽二年於蔣山預造一劒銘曰永蜀小篆書又曰蜀昭烈帝章武元年辛丑採金牛山鐵鑄八劒各長三尺六寸一劒自佩一與太子一與梁王理一與魯王永一與諸葛亮二與雲長翼徳一與趙雲並是亮書作風角處所又曰晋懐帝名熾永嘉元年造一劒長五尺銘曰歩光篆字又曰東晋司馬衍咸和元年造劒十三口銘曰興國又曰東晋司馬昌明太元十年於金華山頂埋一劒銘曰神劒又曰後魏道武帝登國元年於阿理鑄二劒一銘曰鎮山一銘曰沈水並𨽻書又曰明元帝以太常元年造一劒長四尺銘背曰太常又曰太武帝至真君元年有道士繼天師自為帝造劒因改元為真君劒長三尺六寸𨽻書又曰梁武帝蕭衍天監元年即位至普通中嵗在庚申命𢎞景造神劒十三口用金銀銅鐵錫五色合為此劒長短各依劒洞術法一曰凝霜道家三洞九真劒上刻真人玉女名字二曰宫儀備齊六宫有劒神名旡刀刻宫宿星皇后服之三曰摛光備非常御斬刺長三尺六寸上刻風伯雨師形名四曰九天出軍行師君執授將長五尺金鏤作蚩尤神形五曰伐形刻符籙道家登真圖口訣六甲神長五尺六曰四目突宫闈茵被卧止小室帳帳中長三尺五寸七曰五威靈光長二尺許半身丑上刻星辰北斗天市天魁二十八宿服此除百邪魑魅去厭帥伏用之八曰風鳥有惡鳥鳴起鎮之上有黄帝咒法禹歩形勢用之九曰司命行刑煞罰者執之賜萬姓自裁者十曰禮劔生畜男子弧矢榖劔則用之十二曰永昌鎮國安社用之長七尺十三曰閏劔長六尺所以作十三口象閏月故也取上元甲子時加斗魁加嵗正月旦合合之取風雷雨震日止環偏長八寸文曰服之者永治四方小篆文太平御覽卷三百四十三
