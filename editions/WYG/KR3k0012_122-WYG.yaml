body:
  text: 太平御覽卷一百二十二宋李昉等撰偏覇部六前秦苻堅苻丕苻登苻堅崔鴻十六國春秋前秦錄曰苻堅字永固健弟雄之子趙建武中母茍氏祈子於西門豹祠歸而夜夢與神交遂孕十二月而生堅有神光之異自天燭庭背有赤文隱起成字曰艸音草付臣又土王咸陽堅秘而莫之傳也姿貎魁傑臂垂過膝目有紫光祖洪竒而愛之字曰堅頭因而謂健曰此兒頭大重鎮身長任大足短安下非常相也趙右光禄大夫司𨽻校尉髙平徐統有知人之鑒遇堅於路異之執其手曰苻即此官之御街小兒敢戲於此不畏司𨽻縛耶堅曰司𨽻縳罪人不縛小兒戲也統顧左右曰此兒有覇王之相後遇之統下車謂曰苻郎當大貴但僕不及見如何堅曰若如公言不敢忘徳八嵗請就師學洪曰尚小未可吾年十三方欲求師時人猶以為速成汝今乃求學耶欣而許之性至孝有器度博學多才藝年十一便有經畧大志健之入闗也次于曲沃夢天神遣使者朱衣赤冠命拜堅為龍驤將軍旦而為壇於曲沃以授之健泣謂堅曰先王昔受此號汝父次為之今若若汝也復為神明所命可不勉之堅既殺符生永興元年六月去皇帝之號僣稱大秦天王即位太極殿誅董榮等二十餘人改夀光三年為永興元年追尊父為文桓皇帝世子宏為皇太子兄清河王法為丞相東海公從祖永安公侯為太尉從兄晋公桞為尚書令諸王皆貶爵為公封弟融為陽平公雙為河南公子丕為長樂公暉為平原公熙為廣平公叡為鉅鹿公李威為左僕射梁平老為右僕射席寶為丞相長史王猛為中書侍郎權翼為黄門侍郎諸公卿為生所誅者悉復本官十月丞相東海公法以疑忌賜死茍太后之意也堅性友愛與法訣于東堂慟哭嘔血二年四月堅如雍祀五畤音止六月如河東祀后土八月自臨晉登龍門顧謂羣臣曰美哉山河之固權翼對曰吳起有言在德不在險深愿陛下追蹤唐虞懷逺以德山河之固不足恃也堅大悦至韓原觀晉魏顆鬼結草抗秦軍之處賦詩而歸甘露元年正月起明堂禪音善南北郊六月甘露降乃大赦改元八月堅下書曰咸陽内史猛言彰出納所在著績有卧龍之才冝入賛百揆絲綸王言可徵拜侍中中書令領京兆尹丞相鄧羌性鯁直與猛協規齊志于是百僚肅整豪右屏氣風化大行堅歎曰吾今始知天下之有法也以猛為吏部尚書遷太子詹事左僕射猛辭堅曰卿允屬明哲朝野所望豈容致辭所舉融等尋别銓授以苻融等為侍中中書監右僕射任羣為光禄大夫領太子家令朱彤為中書侍郎領太子庶子三年九月鳯皇集于東閣大赦境内初将為赦與左僕射猛右僕射融密議於露堂悉屏左右堅自為赦文猛融進紙筆有一大蒼蠅入自牖間鳴聲甚大集于筆端驅而復來堅惡之乆而乃去俄而長安街巷市里民相告曰官今大赦有司以聞堅驚謂融猛曰事何從而泄於是勑外推窮之咸言有一小人衣黒大呼於市曰官今大赦湏臾不見堅嘆曰其向蒼蠅乎聲状非常吾固惡之四年七月黄龍見於成紀梁山崩五年白虎見天水六年遣鴻臚拜張天錫為大将軍凉州牧西平公建元元年正月雍州秀才段鏗對策上第拜吏部郎中孝㢘通經者十餘人皆拜令長五年六月晉大司馬桓温伐燕次于枋音方頭燕師屢敗遣散騎侍郎樂嵩乞師于堅請割虎牢以西之地八月遣将軍茍池洛州刺史邵羌帥步騎救燕温敗歸是月京兆尹王攸上書獻十畧一曰君道宜明二曰臣尚忠敬三曰子貴孝養四曰民生在勤五曰敎無偏黨六曰養民在惠七曰延聘耆賢八曰懲惡顯善九曰伐叛討逆十曰易簡𢎞大堅納之以攸為諌議大夫十一月燕車騎吳王垂來奔桓溫既走慕容暐音葦悔割河洛之地以賂秦乃曰行人失辭分灾救患理之常也堅大怒六年令輔國王猛帥鎮南楊安虎牙将軍張蚝音次建節鄧羌等步騎六萬討平燕冀八月猛攻尅壺關暐遣太傅上庸王評等帥四十萬屯於潞川猛覘丑艷切覘候也知評賣水鬻薪不撫将士有可乘之會大笑謂楊安等曰慕容評真奴才雖億兆之衆尚不足為慮况數十萬乎今破之必矣甲子陳於渭原猛誓衆曰王景畧受國厚㤙任兼内外今與諸君深入賊地宜各勉進不可退也受爵明君之朝慶觴父母之室不亦美乎衆皆勇奮破釡棄粮大呼兢進猛望評師之衆惡之謂鄧羌曰今日之事非将軍莫可以捷也成敗之機在斯一舉将軍其勉之羌曰若以司隸見與者公無以為憂猛曰此非吾所及也必以安定太守萬戸侯相處羌不悦而退俄而兵交猛召羌寝而不應猛乃馳就許之於是大飲帳中與張蚝徐成等跨馬運矛馳入評軍出入數四傍若無人搴音愆又居輦切舉也旗斬将殺傷甚衆戰及日中燕敗績進圍鄴堅帥精銳向鄴七日至安陽過舊閭引諸耆老語及祖父舊事泫然流涕乃停信宿猛潜如安陽迎堅堅謂之曰昔亞夫不出軍迎漢文将軍何以臨敵而背衆乎猛曰臣毎覽亞夫之事常謂前却人主以此而為名将竊未多之臣奉陛下神算擊垂亡之虜若摧枯拉音獵朽何足憂也戊寅剋鄴慕容暐出奔将軍郭慶執暐於高陽送之辛巳堅入鄴宫大赦閱其圖籍凡郡百五十七縣一千五百七十九户二百四十五萬八千九百六十九口九百九十八萬七千九百三十五以王猛為使持節都督關東六州諸軍事車騎大将軍開府儀同三司冀州牧鎮鄴封清河郡侯以偽太宰恪太𫝊評之第盡賜之加美妾五人上女妓十人中妓人三十人猛辭堅曰昔魏絳和戎猶有金石絲竹之賞山甫翼周實受四牡之錫卿功超二子任過管葛安得辭也其敬受之無逆朕命以鄧羌為散騎常侍安定太守真定郡侯邑三千户賞潞川之功七年七月七日堅如洛陽下書曰士死知已猶來格謨故喬公一言魏祖追慟趙司𨽻高平徐統往在鄴都識朕於童稚每思其殷勤之言弗敢忘也可召其子孫詣行在所八年五月以高平徐攀為瑯琊太守攀統之少子以舊恩㧞之也六月冀州牧猛入為丞相中書監司𨽻校尉猛固辭丞相改授司徒又固辭不拜乃停司徒之授九年四月天鼓鳴彗出扵箕尾長十餘丈或名蚩尤旗經太㣲掃東井自夏及秋冬不滅太史令張猛言於堅曰尾燕之分野東井秦之分野今彗起箕尾而掃東井十年後燕滅秦之象二十年後燕當為代所滅慕容暐父子兄弟亡虜也而布列朝廷貴盛莫二宜除渠帥以寧皇秦若旦誅鮮卑不夕滅彗星者臣請就妖言之戮堅不納更以暐為尚書垂為京兆尹冲為平陽太守十年三月侍中太尉李威卒威字伯龍漢陽人茍太后姑子少與苻雄結刎頸之交苻生屢欲誅堅頼威以免堅深德之事威如父誅苻生及法皆威與太后潜決大謀遂有辟陽之寵雅重王猛勸堅以國事任之堅甞謂猛曰李公知卿猶鮑叔之於夷吾罕虎之於子産猛兄事之夏四月堅下書曰巴夷嶮逆冦亂益州招引吳軍為唇齒之勢特進鎮軍将軍䕶羌校尉鄧羌可帥甲士五萬星夜赴討五月蜀人張育楊光等起兵二萬以應巴獠音老晉威逺将軍桓石虔帥衆二萬入據墊音店江張育自號蜀王稱藩于晉八月鄧羌敗晉師于涪音浮西擊張育楊光等於綿竹皆斬之益州平羌勒銘于岷山而還十一月羌至自成都堅引見東堂謂之曰将軍之先仲華遇漢世祖於前将軍復逢朕於後何鄧氏之多幸𦍑曰臣常謂光武之遇仲華非獨仲華之遭光武堅笑曰将軍葢以自况匪直将軍之幸亦朕之遇賢也十一年正月以安車蒲輪徵隱士樂陵王勸為國子祭酒堅雅好文學英儒畢集純博之精莫如勸也終于太子少傅五月王猛寢疾堅親祈南北郊宗廟社稷分遣使臣禱河岳諸神無不周備以猛少瘳赦殊死七月堅臨省疾問以後事猛曰晉僻處吳越乃正朔相承臣殁之後願不以晉為圖鮮卑羌虜我之仇讐終為大患宜漸除之以便社稷言終而卒時年五十一堅哭之慟謂太子宏曰天不欲使吾平一六合何奪吾景畧之速也贈侍中丞相餘如故諡武侯朝野巷哭三日十二年正月癸巳高陵民穿井得龜大三尺六寸背有八卦文命太卜池養之食之以粟四月堅下書曰凉州刺史張天錫雖稱藩受位而臣道未純可使步兵校尉姚萇等自石城津伐天錫天錫率勁勇五萬來拒戰于赤岸凉師大潰天錫率騎數千奔還姑臧致牋請降于萇甲午大軍至姑臧天錫乘素車白馬面縳舁櫬降于軍門萇釋縛焚櫬送之長安諸郡縣悉降凉州平九月以梁熙為持節西中郎将凉州刺史鎮姑臧徙豪右七千餘户於關中封天錫重光縣之東寧鄉二百户號歸義侯拜北部尚書遷右僕射初萇等将征天錫堅為其立第於長安至是而居之十三年太史奏有星見於外國之分當有聖人入輔中國得之者昌堅聞西域有鳩摩羅什襄陽有釋道安並遣求之十七年正月不雨至于六月徹樂减膳出宫女以迎和氣八月堅收起居注及著作所録而觀之見茍太后李威之事慙怒乃焚其書著作郎董裴一作裴雖更書時事然十不留一十八年三月徙鄴銅駞銅馬飛廉翁仲于長安十月堅引羣臣於太極殿議曰東南一隅未賔王化今欲起天下兵討之計其精卒九十七萬吾将先啟行薄伐南裔此行也朕與陽平公之任非諸将之事左右僕射權翼沙門道安陽平公融尚書石越等上書面諌前後數十堅不納十九年晉車騎桓冲率衆十萬攻襄陽遣其前将軍劉波攻沔北堅大怒遣其子征南鉅鹿公叡冠軍慕容垂左衛毛當等将步卒五萬救襄陽堅下書曰吳人敢恃江山屢寇王境宜時進討以清宇内便可戒嚴速脩戎備發公私馬人十丁遣一丁門在灼然者為崇文義從朕将登會稽復禹績伐國存君義同三王其以司馬昌明為左僕射謝安為吏部尚書桓冲為侍郎勢還不逺可並為起第八月戊午遣征南大将軍陽平公融驃騎將軍張蚝撫軍大將軍髙陽公方衛軍梁成平南慕容暐冠軍慕容垂步騎二十五萬為前鋒甲子堅發長安戎長戎卒六十餘萬騎二十七萬前後千里九月堅至項城凉州之兵始達咸陽蜀漢之軍順流而下幽冀之衆至于彭城東西萬里水陸齊進融等攻壽春晉遣都督謝石徐州刺史謝𤣥豫州刺史桓伊水陸七萬敗堅于肥水堅為流矢所中單騎遁還于淮北顧謂夫人張氏曰朕若用朝臣之言豈見今日之事耶當何面目復臨天下乎澘然流涕堅諸軍悉潰惟慕容垂一軍獨全比至洛陽百官威儀軍容粗備未及關而垂有二志説堅請巡撫燕代并求敗墓堅許之權翼固諫以為不可堅不從至自淮南次于長安東之行宫入告罪於太廟丁零翟斌反于河南長樂公苻丕遣慕容垂及苻飛龍討之垂南結丁零殺飛龍盡坑其衆垂引丁零烏丸之衆二十餘萬為飛梯地道以攻鄴城慕容暐弟泓先為北地長史聞垂攻鄴亡命奔關東收諸馬牧鮮卑衆至數千還屯華陰暐乃潜使諸弟及宗人起兵于外堅遣将軍强永率騎擊之為泓所敗泓衆遂盛自稱大都督雍州牧濟北王推叔父垂為丞相大司馬冀州牧吳王堅謂權翼曰吾不從卿言使鮮卑至是關東之地吾不復與之爭將若泓何翼曰冦不可長慕容垂正可據山東為亂不暇近逼今暐及宗族種類盡在京師鮮卑之衆布於畿甸實社稷之憂宜遣重将討之堅乃以廣平公熈鎮蒲坂苻叡為都督配兵五萬姚萇為司馬討泓于華澤平陽太守慕容冲起兵河東有衆二萬進攻蒲阪堅命竇衝討之苻叡勇果輕敵戰敗于華澤被殺堅大怒萇懼誅遂叛竇衝擊慕容冲于河東大破之冲奔于泓泓衆至十萬遣使謂堅曰秦師傾敗将興復大燕吳王已定關東可速資偹大駕奉送家兄皇帝返鄴都與秦以虎牢為界分王天下堅大怒召暐責之暐叩頭流血陳謝堅乆之曰此自三豎之罪非卿之過復其位待之如初命暐以書招諭垂及泓冲使息兵還長安恕其反叛之罪而暐遣使謂泓曰今秦數已終當不復能乆立吾既籠中之人必無還理勉建大業以興復為務泓于是進向長安改年曰燕興堅率步騎二萬討姚萇于北地姚萇率衆七萬來攻堅為萇所敗聞慕容冲去長安二百餘里引師而歸使苻方戍驪山拜苻暉都督中外諸軍事配兵五萬拒冲暉師敗績堅又以尚書姜宇與苻琳率衆三萬撃冲于灞上為冲所敗宇死之琳中流矢冲遂據阿房城進逼長安堅登城觀之歎曰此虜何從出也吾不用王景畧陽平公之言使白虜敢至于此長樂公苻丕在鄴粮竭馬又無草削松木而食之㑹丁零叛慕容垂引師去鄴始具之西問長安危逼乃遣從弟求救于謝𤣥二十一年慕容冲僣稱尊號于阿房改年更始冲率衆登城堅身貫甲胄督戰拒之飛矢滿身流血破體時雖兵冦危逼馮翊諸堡壁猶有負粮冐難而至者多為賊所殺先是謠言堅入五將乆長得堅乃留太子宏守長安謂之曰脫如謠言天或導余留汝兼總戎政勿與賊爭利吾當出隴收兵運粮以給汝乃自將與張夫人中山公詵率騎數百出如五將山六月太子宏尋将母妻宗室男女數千騎出奔冲入據長安堅至五将山姚萇遣将軍吳忠圍之堅衆奔散獨侍御十數人而已神色自若坐而待之召宰人進食俄而忠至執堅以歸新平縣幽之别室萇求傳國璽于堅曰萇次膺符厯可以為惠堅瞋目叱之曰小羌乃敢于逼天子豈以傳國璽授汝𦍑乎五胡次序無汝羌名違天不祥其能乆乎璽已送晉不可得也萇又遣右僕射尹緯説堅求為堯舜禪代之事堅曰姚萇叛賊柰何擬之古人因問緯曰卿于朕朝作何官對曰尚書令史堅嘆曰卿宰相才王景畧之流而朕不知卿亡也不亦宜乎八月縊堅于新平佛寺中時年四十八張夫人中山公詵等皆自殺三軍莫不哀慟萇欲匿殺堅之名乃諡為荘烈天王長樂公稱號偽諡堅為世祖宣昭皇帝初太子之奔也假道歸晉厯位輔國将軍桓𤣥簒位以為梁州刺史晉書曰堅在位十七年苻丕崔鴻十六國春秋前秦録曰苻丕字永叙堅之長庶子少而聰慧好學堅與之言将畧嘉之才幹亞于苻融為将善收士卒情出鎮于鄴東夏安之堅敗歸長安丕為慕容垂所逼自鄴奔枋頭建元二十一年丕率衆二萬復入鄴城将收兵趙魏西赴長安會平州刺史苻冲帥幽并人衆擊慕容垂頻為垂将平視等所敗乃率衆三萬進屯壺關使招丕丕乃去鄴帥兵六萬如潞川驃騎将軍張蚝并州刺史王騰迎之入據晉陽始知長安不守堅為姚萇所殺乃舉哀于晉陽僣即皇帝位于晉陽南立堅行廟大赦改建元二十一年為太安元年九月置百官是月安西呂光自西域還師二年正月慕容垂僣稱尊號二月慕容冲左将軍韓延殺冲立叚隨為燕王改年昌平五月丕以吕光為車騎将軍梁州牧酒泉公是月姚萇僣稱尊號氐有啖青者謂諸将曰狄道長苻登雖王室屬踈而志畧雄明請共立之以赴大駕于是推登為持節使都督隴右雍河二州牧率衆五萬東下隴右據南安馳使請命八月丕以登為征南大将軍開府儀同南安王持節及州牧都督皆因其所稱而授之九月丕下書曰鮮卑慕容永我之騎将首亂京畿禍傾社稷其遣丞相王永帥禁衛虎旅夾而攻之十月與慕容永戰于襄陵王師大敗丕懼帥騎數千南奔東垣晉揚威将軍馮該自陜邀擊斬之送丕首于江東苻登稱尊號諡為哀平皇帝苻登崔鴻十六國春秋前秦録曰苻登字文高丕之族子父敞太尉司馬登少勇有壮氣建元元年拜殿中將軍遷羽林監長安令坐事黜為狄道長太平二年與姚萇戰于格奴坂大破之十一月丕子渤海王懿自杏城奔登登乃具丕死問于是為丕發䘮行服為壇于隴東僣即皇帝位改太平二年為太初元年十二月立堅神主于軍中引師而告堅神主曰今收合義族衆餘五萬星馳霓邁直造賊庭庶上報皇帝酷怨下雪人民大恥二年登次于瓦亭九月進據胡空堡戎夏歸之者十有餘萬姚萇掘堅屍鞭撻無數裸剥衣裳附之以棘坎土埋之三年登次朝鄉姚萇據武都相持累戰互有勝負萇以登戰勝謂堅神力所助亦於軍中立堅神主謂曰往年新平之禍非萇之罪陛下假臣龍驤曰朕以龍驤建業卿其勉之明詔昭然言猶在耳豈假手苻登而圖臣忘前征時言耶今為陛下立神像可歸休于此勿計臣過聴臣至誠四年正月登昇樓謂萇曰自古安有弑君反立神像大呼曰弑君賊姚萇出來與汝决之何為枉害無辜萇憚而不應萇自立堅神像戰未有利軍每夜驚乃斬像首送登六年三月登自雍攻長安七月登攻新安姚萇救之登引退八年十二月姚萇薨九年登聞萇死喜曰姚興小兒吾将折杖以笞之于是大赦盡衆而東四月登從六陌趣廢橋興将尹緯據橋以待之登與緯大戰為緯所敗登單馬奔雍初登之東也留太子崇守胡空堡崇聞登敗棄城出奔登至無歸乃奔平凉收集遺兵入馬毛山七月興攻登于馬毛登遣子崇質于隴西鮮卑乞伏乾歸結婚請援乾歸遣騎二萬救登登引軍出迎與興戰于山南為興所敗死之時年五十二子崇奔于湟中僣稱尊號改年延初諡登為高皇帝十月崇為乾歸所逐奔于楊定與崇帥衆二萬攻乾歸為乾歸所敗崇定皆死之自苻健皇始元年歲在辛亥晉永和七年是歲歲在甲午四十四年晉太元十九年也晉書曰登在位九年始健以穆帝永和七年僣立至登五世凡四十有四年以孝武帝太元十九年滅太平御覽卷一百二十二
