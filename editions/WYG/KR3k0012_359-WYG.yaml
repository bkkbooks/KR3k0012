body:
  text: 太平御覧卷三百五十九宋李昉等撰兵部九十覊珂韀障泥防汗當胷鞘尾鞭枊覊許慎說文曰覊馬絡頭也左傳曰晉公子重耳之及難也秦伯納之及河子犯以璧授公子曰臣負覊紲從君廵於天下杜預曰覊馬覊紲馬韁也臣之罪甚多矣請由此亡又曰初晉侯之竪頭須守藏者其出也竊藏以逃文公出時也盡用以求納之及入求見公辭以沐謂僕人曰居者為社稷之守行者為覊絏之僕其亦可也何必罪居者漢書曰今漢承衰周暴秦極弊之後流俗已薄於三代而行堯舜之刑是猶以鞿音幾覊而御駻馬如淳注曰以䋲繋馬領曰鞿駻突之馬也東觀漢記曰光武皇帝雖發師旁縣人馬席薦䩭靽皆有成賈而貴不侵民樂與官市康泰吴時外國傳曰加營國王好馬月支賈人常以舶載馬到加營國國王悉為售之若於路失覊靽但將頭皮示王王亦售其半價郭頒晉世語曰愍懐太子好卑鷄小馬小牛置田舍令左右騎斷羈勒令墜馬韓詩外傳曰昔衛獻公走反國及郊將班邑於從者而後入太史栁莊曰如皆守社稷則孰負羈靮而從如皆從則孰守社稷君反國而復為私也無乃不可乎釋智匠古今樂錄曰襄陽銅蹄歌曰龍馬紫金鞍翠毛白玉羈照曜雙厥下知是襄陽兒杜夷幽求曰覊蚊絆蚤禁其非法刳蟣屠虱求其肝膽非至精誰能知之又曰銜覊之馬伏􅇫之駒莫不思平原曠澤翹尾而馳陸也又曰琱覊鏤絆呼名翹陸不可化也夢書曰羈韁為相要制也夢得覊韁要約士也覊結語言韁往來也覊結疆竪結勑疆也弊絶不用難俛仰也摯虞逸驥詩曰逸驥無鑣轡騰陸從長川剪落就覊靮飛軒躡雲煙孫綽詩曰野馬閑於覊澤雉屈於樊神王自有所何為人事閒傅𤣥馳射馬賦曰百鳥齊興六驥孔閑金銜玉覊文防􅍢鞍明珂景朗華䩸采鮮傅𤣥良馬賦曰金覊在首發以明珂􅍢鞍采䩸織防含華䩸音茸傅𤣥難良馬賦曰餙以金覊申以玉纓結以輕軒節以和鈴曹植遊俠篇曰白馬餙金覊連翩西北馳借問誰家子幽并遊俠兒孫惠三馬哀辭序曰余於物特所留心而所服三馬壹時離覊感田子之愛遂作哀文云爾珂服䖍通俗文曰勒餙曰珂郭義恭廣志曰期調國出金銀白珠流璃水晶噐五色珠馬珂又曰剽刃國出桐華布珂珠具艾香雞舌香傅𤣥樂府豫章行曰輕裘綴孔翠明珂曜珊瑚張華輕薄篇曰文軒樹羽盖乘馬珮玉珂韀隋書曰宇文述素好着竒服炫燿時人云定興為製馬韉於後角上鉄方寸以露白色世輕薄者爭放學之謂為許公鉄勢又遇天寒定興曰宿衛必當耳冷述曰然乃製裌頭巾令深袹耳又學之名為許公袹勢述大悦曰云兄所作必能變俗我聞作事可法故不虛也障泥王隠晉書曰韓友字景先廬江舒人舒縣廷掾王睦卒病死已呼魂家人就友卜令以丹畫板作日月置尸頭前及卧虎皮馬障泥登時大愈蕭方等三十國春秋曰髙勾驪以千里馬生羆皮障泥獻於南燕燕王超大恱答以水牛能言鳥世説曰王武子善解馬性嘗乘一馬着連乾障泥前有水終不肯渡王云此必是惜障泥使人觧去便徑渡防汗東觀記曰和帝永元三年西謁園陵桓郁兼羽林中郎將從賜馬二疋并鞍勒防汗魏百官名曰黄地金鏤織成萬嵗彰汗一具又織成彰汗一具桓寛䀋鐡論曰古者庻人賤騎䋲控草鞮皮薦而已及其後革鞍攻成鐡鑣不餙令富者黄金琅勒􅄢繡弇汗司馬彪戰略曰孟逹將蜀兵數百降魏魏文帝以逹為新城太守太和元年諸葛亮從成都到漢中逹又欲應亮遺亮玉玦織成彰汗蘓合香亮使郭模詐降過魏興太守申儀與逹有隙模語儀亮言玉玦者已决織成者言謀已成蘇合香者言事已合當胷後漢書曰太守趙興署鮑永功曹時有矯稱侍中止傳舍者興欲謁之永疑其詐諫不聼出興遂駕徃永乃㧞佩刀截馬當胷乃止當胷以韋為之也後數日莾詔書果下捕矯稱者永由是知名鞘尾服䖍通俗文曰馬鞻尾曰鞘魏百官名曰赤茸鍮石鞘尾一具鞭禮記曰獻車馬者執筴綏又曰君車將駕則僕執策立於馬前已駕僕展軨鄭𤣥曰展軨具視効駕自己駕也奮衣由右上取貳綏奮振去塵也貳副也執莢分轡驅之五歩而立左傳曰晉公子重耳之及於難也及楚楚子享之曰公子若反晉國則何以報不榖對曰若以君之靈得反晉國晉楚治兵遇於中原其避君三舍若不獲命其左執鞭弭右屬櫜鞬以與君周旋又曰宋告急於晉伯宗曰不可雖鞭之長不及馬腹又曰楚靈王使圍徐以懼吴楚子次于乾谿以為之援雨雪王皮冠秦復陶翠被豹舄執鞭以出執鞭以教令右尹子革夕子革鄭丹也夕暮也王見之去冠被舍鞭與之語又曰晉荀瑶帥師伐鄭鄭駟𢎞請救於齊陳成子救鄭及濮雨不能渉成子衣製杖戈製雨衣也立於阪上馬不出者助之鞭之公羊傳曰陽虎將殺季孫于蒲圃使臨南御之至孟衢臨南投策使陽越下取策陸璣毛詩草木蟲魚疏曰椐枝葉似楨松爾雅曰椐櫃也去櫃切節以扶老即金靈壽是也今人以為馬鞭及杖孔藂子曰刑以齊民譬之於御則鞭策也漢書曰婁敬云太王以狄伐故去豳杖馬箠去居岐又曰石慶為太僕御士上問車中幾馬慶以策數馬畢舉手曰六馬又曰李廣擊匈奴匈奴兵多破廣軍生得廣廣時傷置絡間而卧行十餘里廣陽死睨其傍有一胡兒騎馬騰而上胡兒馬因鞭馬南馳數十里得其餘軍又曰大司空士夜過奉長亭亭長呵之告以官名亭長醉曰寜以符傳耶士以馬箠擊亭長漢獻帝起居注曰李傕性喜鬼怪左道之術又於朝廷省門為董卓設神坐數以羊祠之詞畢過省閣問帝起居求入見傕帶三刀手復與鞭合持一刀侍中侍郎見傕帶仗皆惶恐亦帶劔持刀先入在帝側張勃吴錄曰大皇帝大㑹飲宴下馬迎魯肅肅入拜起禮之謂言子敬孤持鞍下馬相迎足以顯未肅趨進曰未也衆咸􅕎然既坐徐舉鞭曰願麾下威徳加于四海然後以安車軟輪徵肅始當顯耳帝拊掌歡笑又曰大皇帝潛軍於皖口命陸遜為大都督假鉞大皇帝親執鞭以見之虞溥江表傳曰孫權攻合肥不能下徹軍將退兵以上道權與吕蒙蔣欽陵統等在後張幔飲食畢垂當發魏將張遼帥六七千人奄至圍遮數重權乘駿馬上津橋南已見徹丈餘無板谷利附在馬後使持戈緩鞚利於後著鞭以助馬勢遂得超度王隠晉書曰上黨鮑瑗家多䘮病貧苦淳于叔平曰君舍東北有乘樹徑至市入門數十歩當有一人持新馬鞭便就買還以懸北桑樹三年當暴得財也瑗遂承其言詣市果得馬鞭懸之正三年浚井得錢數十萬銅鐡雜噐復可二十餘萬於是家業用展病者亦愈于寳晉記曰晉永嘉初有神見衮州甄域民家免奴為主簿自號為樊道基有嫗號成夫人欲迎致使載車行當得此免奴主簿從行為譯以宣所宜汝南梅跡字仲真去鄴來經衮州聞其然因結羊世茂阮士公諸賔往觀之成夫人便遣主簿出當與貴客語主簿死不肯避成夫人因大嗔索士公馬鞭脫主簿鞭之何法盛晉中興書曰祖逖與劉琨中夜而坐相謂曰若四海鼎沸豪傑並起吾與足下相避於中原後琨與親舊書曰吾枕戈待旦志梟逆虜常恐祖生先人着鞭耳沈約宋書曰胡蕃字道序義旗起桓𤣥戰敗將出奔藩於南掖門捉𤣥馬鞍曰今羽林射手猶有八百皆是義故西人一旦捨此欲歸可復得乎𤣥直以馬鞭指天而已於是奔散蕭方等三十國春秋曰石勒遣石虎率精騎五千掩李矩營生執矩外甥郭謂之弟元教元作書與謂說云去年東平曹嶷西賔猗盧矩如牛角何不歸命勒與謂書餉麈尾歸勒說賔禮貴弟相同斷金往物為信矩所領將士並欲歸勒矩知衆之去已乃率衆來歸又曰城都王頴誅黄門孟玖於是東海王鉞髙宻王簡皆懼奔國瑯琊王睿又將出焉而徼禁甚宻頴又先下諸津禁其諸貴人王至河陽乃見拘焉宋典後至以鞭拂之曰舍長官禁貴人而爾見止耶因大笑之吏乃放遣因得奔國崔鴻前秦錄曰符堅起教武堂于渭城命太學生明隂陽兵法教為將士朱彤諌曰虎將之士受教學生强幹之術乃弱本之方夫養將之法譬之養馬秣以髙􅇫習以戰馭長鞭策後金勒制前析施規矩任知進退又曰符堅引群臣議代晉太子左率右越曰今歳鎮守斗福德在吴弗可犯且國有長江之嶮朝無昬政之臣願保境養民伺其虛隙堅曰武王伐紂逆嵗犯星夫差威陵上國為勾踐所滅雖有長江其能固乎吾之衆投鞭於江足斷其流吾當内斷其心矣又曰符堅時闗中謡曰長鞘馬鞭擊左股太歳南行當避虜秦呼鮮卑為白虜慕容垂起闗東嵗在癸未崔鴻後梁錄曰咸寜二年盗發張駿墓得珠簾琉璃珊瑚馬鞭樂資春秋後傳曰魯仲連曰齊閔王將之魯夷維子為執鞭而從之袁希之漢表傳曰費禕領漢節誘納降附越雋太守張嶷牋試禕曰昔岑彭率師來歙杖節咸皆見害刺客不鎮也今明公位尊權重宜覽前事後嵗首禕持節行酒郭循以馬鞭中小刀刺禕禕數日薨魏百官名曰駝馬鞭二枚異苑曰長山張舒以元嘉九年二月二十四日奄見一人着朱衣平上幘手捉青柄馬鞭云汝何可教便隨我去見素絲䋲繫長梯來下舒上梯仍造大城綺堂洞室地如黄金有一人長大不巾幘獨坐絳紗帳中語舒曰主者誤取汝賜汝秘術卜占勿貪錢賄舒亦不覺受之劉義慶幽明錄曰餘杭人沈縱家素貧與父同入山還未至家見一人左右導從四百許前車輜重馬鞭夾道鹵簿如二千石遥見縱父子便喚住就縱手中燃火縱因問是何貴人答曰是鬭山玉在餘杭南縱知是神叩頭云願見祐助後入山得一玉㹠從此如意又曰桓𤣥既肆無君之心使御史害太傅道子於安城𤣥在南州坐忽見一平上幘人持馬鞭通云蔣侯來𤣥驚􅕎然便見階下奴子御􅎻車見一士大夫自云是蔣子文君何以害太傅與為伯仲顧視之間便不復見又曰廣陵韓咎字興彦陳敏反時與敏弟恢戰於尋陽還營下馬覺鞭重見有緑錦囊中有短卷書着鞘皆不知所從來開視之故榖紙或神呪經謝氏鬼神列傳曰下邳陳超為鬼君弼所逐改名何䂓從餘杭歩道還求福絶不敢出入五年後意漸替解與親舊臨水戱酒酣共說往來超云不復畏此鬼也小俛首乃見鬼影在水中超驚怖時亦有乘馬者超借馬騎之下鞭奔驅此鬼去超逺近常如初微聞鬼云汝何規耶急急就死吴㑹分地記曰六山者勾踐於此山鑄銅銅不鑠則埋之上生馬箠勾踐遣使者移於南社種之餙治以為馬箠獻於吴劉欣期交州記曰兕出九徳有一角角長二尺餘形如馬鞭柄闞駰十三州志曰山桑縣人俗貪偽好持馬鞭行邑故語曰沛國龍冗至山桑詐託旅使若奔䘮道遇冦抄遂失資粮太公隂謀曰武王曰吾欲造起居之誠隨之以身箠書曰馬不可極民不可劇馬極則躓民劇則敗莊子曰莊子使楚見空髑髏髐然司馬彪曰髐白骨兒檄以馬箠而問之曰夫子貪生理而為此乎將有亡國之事斧鉞之誅乎語卒援髑髏而枕又曰馬蹄可以踐霜雪毛可以御風寒齕草飲水翹足而陸此馬之真性也及至伯樂曰我善治馬燒之剔之刻之雒之連之以羇馽編之以皂棧馬之死者十二三矣饑之渇之馳之驟之齊之前有橛失之患後有鞭策之威而馬之死者已過半矣淮南子曰昔者王良造父御也投足調均勞逸若一安勞樂進馳騖若成左右若鞭周旋若環世皆以為巧然末見其貴也若夫鉗且太丙之御也除轡舍衛去鞭棄策軍車莫動而自舉馬莫使而自走又曰大丈夫恬然無思澹然無慮以天為盖以地為輿四時為馬隂陽為騶電以為鞭策雷以為車輪䀋鐡論曰無鞭策雖造父不能以調四馬無勢位雖舜禹不能以治萬民又曰秦攝利衘以御宇内執修箠以笞八極杜夷幽求曰召渇者以臨河不待便策而自至說苑曰黙無過言慤無過事木馬不能行亦不費食騏驥日馳千里鞭箠不去其背楊偉時務論曰轡策靽縶之具設雖剛怒麄戾啼齧之馬若足抅靽縶口衘車勒箠策必至則躡䠱循軌世說曰王敦在姑熟晉帝出看敦營敦覺追帝帝以金馬鞭與客舍姥姥以水澆馬尿令追者問姥姥云去已乆已追者乃止也王澄字平子從荆州下過王敦敦謀欲害之而平子左右二十八人悉捉鐡馬鞭夢書曰鞭箠所使有勑走也夢得鞭箠欲有使也持以䇿馬使朋友也鞭使馬疾諾喜也曹植九詠曰乘逸嚮兮執電鞭忽而往兮怳而旋曹植陌上桑曰望雲際有真人安得輕舉繼清塵執電鞭騁飛鱗張華輕薄篇曰文軒樹羽盖乘馬珮玉珂横簮列瑁瑇長鞭施象牙揚雄河東賦曰􅁬電鞭驂雷輜鳴洪中建五旗魏文帝臨渦賦曰建安十八年中譙余兄弟從上拜墳墓遂乘馬遊觀經東園遵渦水相洋乎髙樹之下乃註馬書鞭為渦賦傳𤣥良馬賦曰鞭不得揺手不及動忽然增逝肉飛骨踴傳𤣥馳射馬賦曰佷如革戾如􅑟鞭裁向腹􅁬尾跳尻曹植表曰願得策馬執鞭首當塵路撮風后之竒接吴孫之要追慕卜商起予左右李尤馬箠銘曰御者箠策示有威怒東野之敗督責過度温嶠與陶公書曰奉惠赤角一具及鞉皷馬鞭皷角既周軍用馬鞭服以周旋珫之于乎與之偕老也偃武之日乃當藏之篋笥耳謝艾宻令與楊初曰今遣舍人孔章特口論要宻將軍可差腹心人㫖至珊瑚鞭勒香瓔一具遺王擢王擢狐疑于將軍父子事得施矣袁宏與范増書曰四海鼎沸天轡將移杖短策以晨征登重幙以吐竒指六合以倒戈望崑崙而舉麾枊魚豢魏畧曰獻帝露布益州曰馬擊枊而不暇解貫胄延頸以待白刃蜀志曰靈帝末先主從校尉鄒靖討賊有功除安喜尉督郵以公事到縣先主求謁不通乃直入府縳督郵杖二百解綬繫其頸著馬枊棄亡命常璩華陽國志曰建寜郡同瀨縣存馬縣雍闓反時結纍于縣山繫馬馬枊柱生成林今夷言無梁林無梁夷言馬也蕭子雲晉史草曰姚畧時有賀僧者不知何人自云遊厯五郡時人號為賀五郡齋戒奉道為百姓說吉㓙畧死泓立僧謂泓曰宜潔掃一馬廐開屋設大枊有異馬其大非常趙書曰徐光字秀武頓丘人父以牛醫為業光年十四五為將軍王陽秣馬光但書馬枊屋柱為詩頌不親馬事異苑曰丹陽甘卓字季思照鏡無頭乃見在馬枊荀氏靈鬼志曰㤗元中有道人從外國來多有術法自說所受術師曰衣非沙門也嘗行見一人擔上有小籠子可受斗餘語擔人云吾歩疲極欲􅀢寄居擔人甚怪之慮是狂人便語君欲何取自屠邪答云君若見許正欲入君此籠子中擔人愈怪其竒君能入籠中便是神人也即入籠中籠亦不更大擔亦不􅁴重至國中一家大富而性慳惜不行仁義語擔人吾試為君一破慳囊即至其家有一快馬甚惜之在枊下繫忽失去尋求不知處明日見馬在五斗􅑥中終不可破取不知何方得取之便往語言君作百人厨食周餉窮困者馬當得出耳主人即狼狽作之既畢馬還在柱淮南萬畢術曰馬枊生腐茅者取馬枊生茅可以為藥食太平御覽卷三百五十九
