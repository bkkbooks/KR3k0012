front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_874-1a, image: WYG0900/WYG0900-0623a.png}
body:
  text: 太平御覽卷八百七十四宋李昉等撰咎徴部一叙咎徴天天裂天開天光天崩天鳴四時叙咎徴易曰履霜堅氷至文言曰積善之家必有餘慶積不善之家必有餘殃又曰吉凶悔吝生乎動者也尚書洪範曰咎徴曰狂恒雨若僭恒暘若豫恒燠若急恒寒若䝉恒風若左傳曰初内虵與外蛇鬭於鄭南門中内虵死六年而厲公入公聞之問於申繻曰猶有妖乎對曰人之所忌其氣􅆋以取之妖由人興也人無釁焉妖不自作人棄常則妖興故有妖易筮謀類曰斗機絶綱玉衡撥攝提亡鄭𤣥注曰斗機羅斗者天中之星天失其平故斗機絶綱玉衡機也攝提者斗前之星爲斗施政教布之八野今斗失其正故攝提亦爲之不見五星合狼􅈢張晝視無日虹蜺煌煌夜視無月彗孛蔣蔣此皆屬乾乾多爲天失其正故著天者皆失其正也當藏者出當出者消危處易期當藏者出解晝視無日虹蜺煌煌也當出者消解夜視無月也是爲危處易期太山失金雞西岳亡玉羊太山失金雞者箕星亡也箕者爲風風動雞鳴今期候者亡故雞亦亡西岳亡玉羊者狼星亡狼在於未爲羊也天卑地髙雷讙公行天下雷同讙譁公行無所畏也星晝奔蜺夜闇無光上無氣下無常天昩昧履踐氷上無氣天氣不正故下無常天地昩昧不亡也晝無日夜無月何明之有乎履踐氷者峻急之法行被其刑也民衣霧主吸霜民衣候霧政行被其毒也主吸霜被隂毒將害躬也間可倚杵於何藏解上天卑地髙天地相去其間不可倚一杵耳或言枚其意同不知夏不知冬不見父不見兄所以然者以天卑地髙尊卑倒故卑以父兄尊爲子弟望之漠漠視之茫茫羣黨假威出坐玉牀小人羣假欺王者威權坐於玉牀者王者牀也尚書大𫝊曰田獵不宿飲食不享出入不節奪民農時及有姦謀則木不曲直棄法律逐功臣殺太子以妾爲妻則火不炎上好治宫室飾臺榭内淫亂犯親戚侮父兄則稼穯不成好攻戰輕百姓飾城郭侵邊境則金不從革簡宗廟不禱祠廢祭祀逆天時水不潤下又曰爰用五事建用皇極一曰貌貌之不恭是謂不肅厥咎枉厥罰常雨厥極惡時則有龜孽時則有雞禍次二曰言言之不從是謂不乂厥咎僭厥罰常𤾉厥極憂時則有詩妖時則有介蟲之孽時則有大禍三曰視視之不明是謂不哲厥咎豫厥罰常燠厥極疾時則有草妖時則有果蟲之孽次四曰聽聽之不聰是謂不謀厥咎急厥罰常寒厥極貧時則有鼓妖時則有豕禍次五曰思思之不睿是謂不聖厥咎霧厥罰常風厥咎凶短折時則有脂夜之妖時則有乖孽時則有牛禍王之不極是謂不建厥咎震厥罰常隂厥極弱時則有射妖時則有龍蛇之孽時則有馬禍時則有日月亂行星辰逆行洪範五行𫝊曰凡有所害謂之災無所害而異於常謂之異故害爲已至異爲方來家語孔子曰天災地妖所以儆人主也寤寐徴怪所以儆人臣也災妖不勝善政怪夢不勝善行六韜曰武王伐殷得二丈夫而問之曰殷國之將亡亦有妖災乎其一人對曰有殷國嘗有兩石大者如罋小者如箕嘗六月而雪深尺餘其一人對曰是非殷國之大妖也殷國之大妖四十七章殷君喜殺人喜以人飴虎喜割人心喜殺孕婦喜殺人之父孤人之子喜刑禍喜以信爲欺欺者爲忠忠諫者不賞以君子爲下小人爲上以便佞爲相政苛令暴萬民愁苦好田獵畢弋走狗喜為修飾池臺宫七十三所大宫百里喜爲酒池槽丘而牛飲者三千人喜聽䜛用譽無功者賞無尺丈無錙銖無秤衡無功賞無罪誅此殷國之妖也白虎通曰災異者何也災之爲言傷也隨事而誅異之言怪先感動之也何以言災有哭也説苑曰趙簡子問於翟封餘曰吾聞翟雨蝱榖三日馬生牛牛生馬信乎曰信簡子曰宋足亡國乎對曰雨蝱榖三日䖟風之所飄也雨血三日鷙鳥擊於上也馬生牛牛生馬雜收也此非翟之災也簡子曰然則翟之妖奚也對曰其君㓜弱其大臣比黨以求爵禄其百官肆斷而無常其政令不常而數改此其妖也京氏别對災異曰五榖無實何君無仁徳臣懐叛戾華飾虛舉薦賢名實不相副内爲蘇秦之行外以夷齊之行故致五榖多無實朝廷無賢害氣傷穡不收國大饑其救也選明經舉茂才改徃修來退去貪狼施恩行惠賞賜勞臣此災消矣天左𫝊宣下曰天反時爲灾又曰定公元年諸侯之大夫城成周三旬而畢乃歸諸侯之戍齊髙張後不從諸侯晉女叔寛曰周萇𢎞齊髙張皆將不免萇叔違天天既厭周徳萇叔欲遷都以延其祚故曰違天髙子違人天之所壊不可支也衆之所爲不可奸也為哀三年周人殺萇𢎞齊髙張來奔起天裂京氏易妖占曰天裂陽不足下害上之象天裂見人兵起國亡天開見光血流滂滂晉書曰惠帝元康中天西北裂時人主昏闇賈后專政又曰大安天裂爲二聲如雷是時長沙王奉帝出拒成都王頴河間王顒逞威專命僭亂之象又曰成帝咸和四年冬天裂西北時蘇峻之子以萬人入吳興天下有兵闗河轉亂明年石勒僭叛又曰穆帝昇平五年天裂廣數丈聲如雷又曰哀帝初即位天中裂黄三四丈聲如雷野雉皆雊時帝荒疾不識萬機太后臨朝桓温專政崔鴻十六國春秋曰前趙劉曜建元初天裂廣一丈長五十餘丈時四方交戰隋書曰梁武帝太清中天裂西北長十丈闊二丈光出如電聲如雷明年侯景䧟臺城天開漢志曰惠帝二年天開東北長二十餘丈廣十丈後有吕后廢二少帝諸吕作亂蕭子顯齊書曰齊東昏侯永元中夜天開黄色明照頃有物絳色如小甕漸大如倉廪聲如雷墜於湖野雉皆雊其年東昏見廢隋書曰陳後主至徳初天開西北至東南其内有黄雜色聲如雷後年章大寳舉兵陳竟國亡天光竹書紀年曰周昭王末年夜清五色光貫紫㣲其年王南廵不返漢書曰成帝元延元年四月無雲有雷聲光四下至昏乃止晉穆帝永和十年前凉張祚之元年正月夜天有光如車蓋明年祚被殺宋書曰文帝元嘉十八年七月天有黄色洞燭至二十二年太子詹事范􅁮反伏誅天崩崔鴻十六國春秋曰後凉麟嘉五年天崩有聲若雷乆之乃止又曰前劉趙聰麟嘉三年天崩聲若雷乆乃止是嵗聰死天鳴京氏易妖占曰天有懸車之聲人主憂又曰易𫝊曰萬民勞厥妖天鳴晉書曰武帝末天東有聲如雷又曰元帝大興元年天鳴東南有聲如風水相薄三年又鳴其後王敦入石頭王師敗績元帝屈辱制於强臣隋書曰梁武帝天監時有聲如雷二是嵗交州刺史李凱舉兵反後年又西北隱隱有聲如雷赤氣至地是嵗盗殺東莞琅琊太守中大通年西南有聲如雷其年北凉州刺史蘭欽反崔鴻十六國春秋曰前凉張駿時晉建興十七年八月天有大聲下震地孟池縣人夜怪室如晝曉起視西北間有光明照地至二十二年遜於重華又曰南照六年天鳴是年桓𤣥廢其主自立稱大楚又曰前秦苻堅建元十四年天鼔鳴至二十年堅爲姚萇所殺隋書曰北齊文宣天保年中天西南有聲如雷時帝不恤國政大興師旅又曰後主武平末年後主東遁至青州是日西方有聲如雷是月爲周師所擒又曰周宣帝建徳年天西北有聲如雷未幾吐谷渾大㓂邊又曰陳宣帝大建十二年天有聲如風水相擊三夜乃止又曰後主初即位八月有聲如風水相擊俄又如之九月夜天東北有聲如虫飛漸移西北至徳元年正月天東有聲如虫飛後降於隋隋書曰開皇三十年四月天有聲如瀉水自南至北六月秦王俊薨河圖稽命徴曰劉帝即位百七十年太隂在庚辰江充詭其變天鳴地坼四時禮記月令曰孟春行夏令則雨水不時草木早落國時有恐行秋令則其民大疫焱風暴雨總至藜莠􅅾蒿並興行冬令則水潦為敗雪霜大摯首種不入仲春行秋令則其國大水寒氣總至冦戎來征行冬令則陽氣不勝麥乃不熟民多相掠行夏令則國乃大旱煖氣早來䖝螟爲害季春行冬令則寒氣時發草木皆肅國有大恐行夏令則人多疾疫時雨不降山陵不收行秋令則天多沉隂淫雨早降兵革並起孟夏行秋令則苦雨數來五榖不滋四鄙入保行冬令則草木早枯後乃大水敗其城郭行春令則虫蝗爲災暴風來格秀草不實仲夏行冬令則雹凍傷榖道路不通暴兵來至行春令則五榖晩熟百螣時起其國乃饑行秋令則草木零落果實早成民殃於疫季夏行春令則榖實鮮落國多風欬民乃遷徙行秋令則丘隰水澇禾稼不熟乃多女災行冬令則風寒不時鷹隼早鷙四鄙入保孟秋行冬令則隂氣大勝介蟲敗榖戎兵乃來行春令則其國乃旱陽氣復還五榖無實行夏令則國多火災寒熱不節民多瘧疾仲秋行春令則秋雨不降草木生榮國乃有恐行夏令則其國乃旱蟄蟲不藏五榖復生行冬令則風災數起收雷先行草木早死季秋行夏令則其國大水冬藏殃敗民多􅍠嚏行冬令則國多㓂賊邊境不寧土地分裂行春令則煖風來至民氣懈惰師興不居孟冬行春令則凍閉不密地氣上洩民多流亡行夏令則國多暴風方冬不寒蟄蟲復出行秋令則霜雪不時小兵時起土地侵削仲冬行夏令則其國乃旱氛霧冥冥雷乃發聲行秋令則天時雨汁瓜瓠不成國有大兵行春令則蝗蟲爲敗水泉咸竭民多疥癘季冬行秋令則白露蚤降介虫爲妖四鄙入保行春令則胎夭多傷國多固疾命之曰逆行夏令則水潦敗國時雪不降氷凍消釋太平御覽卷八百七十四
