body:
  text: 太平御覽卷七百四十四宋李昉等撰工藝部一叙藝射上叙藝書曰以旦代某之身予仁若考能多材多藝禮曰是月也命將講武習射御角力執弓挾矢以獵又曰徳成而上藝成而下又曰尚伎而賤車則人興藝周禮曰保氏掌諌王惡而養國子以道馬融曰道六藝乃教國子六藝禮樂射御書數論語曰太宰問於子貢曰夫子聖者與何其多能也子貢曰固天縱之將聖又多能也又曰志於道據於徳依於仁遊於藝漢書曰元帝多伎藝華嶠後漢書曰鄧禹十三男各人習一藝梁書曰栁惲字文暢早有令名少工篇什彈琴為士流第一帝謂周捨曰吾聞君子不可求備至於桞惲可謂具美分其才藝足了十人又曰朱异字彦和通覽五經渉獵子史博奕書筭尤善沈約面試皆妙乃戯异曰君何不亷天下有藝君一時持去可謂不亷也後魏書曰祖珽字孝徴裴讓之字士禮俱崇文學邢劭省中為之語曰多伎多能祖孝徴能賦能詩裴讓之皆一時之美也後趙録曰張材伎烏譚部人也善棊博蹴踘鬭雞諸伎身長八尺飲酒石餘不亂射上中論藝記曰射以平志御以和心書以綴事數以理煩李顒㳺藝箴曰邈矣姬旦惟藝之淵易曰弦木為弧剡木為矢弧矢之利以威天下蓋取諸暌睽乖也物乖則爭弧矢之用所以威乖爭也又曰公用射隼於髙墉之上獲之无不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也括結也君子待時而動則無結閡之患也詩曰既張我弓又挾我矢又曰終日射侯不出正兮禮曰工尹商陽與陳棄疾追吴師及之陳棄疾謂工尹商陽曰王事也子手弓射諸射之斃一人韔止其御曰朝不坐燕不與殺三人亦足以反命矣孔子曰殺人之中又有禮焉善之又曰孔子云君使士射不能則辭以疾懸弧之義也又曰射有似乎君子失諸正鵠反求諸其身又曰孔子射於矍相之圃盖觀者如堵墻射至於司馬使子路執弓矢出延射曰賁軍之將亡國之大夫與人後者不入其餘皆入盖去者半又使公罔之裘序㸃揚觶而語曰㓜壯孝弟耆耋好禮不從流俗修身以俟死者不在此位也盖去者半處者半序㸃揚觶而語曰好學不倦好禮不變耄期稱道不亂者不在此位也盖僅有存者又曰射之為言繹也或曰舍也繹者各繹已之志也故心平體正持弓矢審固則射中矣故曰為人父者以為父鵠為人子者以為子鵠為人君者以為君鵠為人臣者以為臣鵠故射者各射已之鵠故天子之大射謂之射侯射侯者射為諸侯也射中則得為諸侯射不中不得為諸侯天子將祭必先習射於澤澤者所以擇士也已射於澤而後射於射宫射中者得與於祭不中者不得與於祭不得與於祭者有讓削以地得與祭者有慶益以地進爵絀地是也故男子生桑弧蓬矢六以射天地四方天地四方者男子之所有事也故必先有志於其所有事然後敢用榖也左傳曰晉楚將戰潘尫之黨與養由基蹲甲而射之徹七札焉以示王曰君有二臣如此何憂於戰王怒曰大辱國詰朝爾射死藝吕錡夢射月中之退入泥占之曰姬姓日也異姓月也射而中之退入於泥亦必死矣及戰射㳟王中目王召養由基與之二矢使射吕錡中項伏弢以一矢復命又曰衛獻公出奔初尹公他學射於庾公差庾公差學射於公孫丁二子追公公孫丁御公子魚曰射為背師不射為戮射而禮乎射兩軥而還尹公他曰子為師我則逺矣乃反之公孫丁授公轡而射之貫臂又曰吴子諸樊伐楚以報舟師之役門于巢巢牛臣曰吴王勇而輕若啟之親門我獲射之必殪是君也死疆其少安從之吴子門焉牛臣隠於短墻以射之卒又曰昔賈大夫惡貌醜也娶妻而美三年不言御以如臯射雉獲之其妻始笑而言周禮曰大司樂掌成均之法大射王出入令奏王夏及射令奏騶虞詔諸侯以弓矢舞又曰樂師掌國學之政以教國子小舞凡射王以騶虞為節諸侯以貍首為節大夫以采蘋為節士以采蘩為節又曰王以六耦射三侯三獲三容樂以騶虞九節五正諸侯以四耦射二侯二獲二容樂以貍首七節三正孤卿大夫以三耦射一侯一獲一容樂以采蘋五節二正士以三耦射一侯一獲一容樂以采蘩五節二正若王大射則以貍歩張三侯王射則令去侯立於後以矢行告卒令取矢又曰射鳥氏掌射鳥祭祀以弓矢毆鳥鳶凡賔客㑹同軍旅亦如之射則取矢矢在侯髙則以并夾取之又曰庭氏掌射國中之夭鳥若不見鳥獸則以救日之弓與救月之矢夜射之若神也則以太隂之弓與枉矢射之又曰王大射則共虎侯熊侯豹侯設其鵠諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠又曰保氏掌養國子以道教之五射論語曰君子無所爭必也射乎揖讓而升下而飲其爭也君子又曰射不主皮為力不同科古之道也韓詩外傳曰楚熊渠子夜行見寢石以為伏虎彎弓而射之沒金飲羽下視之其石也因復射之矢摧無跡也三禮射侯圗曰天子大射之時天子虎侯九十歩諸侯熊侯七十歩卿大夫豹侯五十歩畿内諸侯大射君熊侯九十歩卿大夫參侯七十歩士豻五旦切侯五十歩天子卿大夫射君臣共射一麋侯五十歩諸侯卿大夫亦如之天子及諸侯之士皆無大射參侯者以豹皮為鵠以麋皮為飾參之為言雜也豻侯者以胡大皮為鵠亦以為飾又曰天子賔射亦三侯天子射五正諸侯射三正侯卿大夫射二正侯諸侯賔射二侯君三正卿大夫賔射君臣共射一侯二正士與士賔射豻皮三正士卑不得􅀞雲氣故以豹皮飾其側也畿内諸侯與外國同其侯道亦如之又曰天子燕射熊侯諸侯卿大夫士虎豹侯諸侯燕射君亦熊侯卿大夫亦宜參侯士豕鹿卿大夫與其臣燕射君臣共射虎豹侯士燕射亦宜豹侯􅀞鹿豕焉畿内諸侯與外國同其侯道亦如賔射戰國䇿曰楚有養由基者善射去楊葉百歩而射之百發百中有一大夫過之曰善射可教矣由基曰試代我射之客曰我非能教子出左屈右也夫射者百發百中而不以善息少焉氣衰力倦弓撥矢拘一矢發而不中前功盡棄矣又曰更羸與魏佗處廡下有鴈從東方來更羸虛發而鴈下魏王曰射可至此乎更羸曰其飛徐其鳴悲飛徐者故瘡痛鳴悲者失羣也故痛未息驚心未去故聞弦音而下史記曰漢有善騎射者樓煩楚挑戰三合樓煩輙射殺之又曰李廣為右北平太守出獵見草中石以為虎射之中石沒鏃視之石也因復更射之終不復入廣所居郡聞有虎常自射之及居右北平射虎虎騰傷廣廣竟射殺之廣為人猨臂其善射亦天性也雖其子孫他人學者莫能及廣撃匃奴中貴人從匃奴三人射傷中貴人殺其騎且盡中貴人走廣廣曰是必射鵰者鵰鳥善射者射之也逐之果然廣為將其射見敵非十歩之内度不中不發發即應弦而倒用此其將兵數困辱漢書曰匃奴畏郅都之威刻木像都之狀交弓射之莫能一中又曰堂邑父胡人也善射與張騫俱使西域毎處困之時射鳥獸供食後漢書曰王寵善射十發十中皆同處焉又曰董卓膂力過人雙帶兩鞬左右馳射為羗胡所畏魏志曰挹婁國古肅慎氏之國也善射入人目又曰文帝獵為虎所逐顧射應聲而倒太祖壯其摰勇吏將武騎魏畧曰成公英從太祖出獵有三鹿走過太祖命英射之三發三鹿皆應弦而倒吴志曰太史慈字子義初北海相孔融以黄巾冦暴出屯都昌為賊管亥所圍慈乃帶鞬攝弓上馬將兩騎自隨各作一的持之開門直出外圍下左右人並驚駭兵馬互出慈引馬至城下塹内植所持的各一出射之射畢徑入門明晨復如此圍下人或起或卧慈復植的射之畢復入門明晨復出如此無復起者於是鞭馬直突圍中馳去比賊覺知慈行已過又射數人皆應弦而倒故無敢追者慈猿臂善射弦不虛發嘗從孫䇿討麻保賊賊於屯裏縁樓上行詈以手持樓棼慈引弓射之矢貫手著棼圍外萬餘人莫不稱善其妙如此晉書曰劉矅字永明身長九尺六寸垂手過膝雄武有膂力射鐵入一寸焉時號神射又曰庾翼時有衆四萬詔加都督征討諸軍事師次襄陽大㑹僚佐陳旌甲親授弧矢曰我之行也若此射矣遂三起三疊徒衆屬目其氣十倍又曰庾翼鎮武昌謝尚數詣翼諮謀軍事嘗與翼共射翼曰卿若破的當以鼓吹相賞尚應聲中之翼即以其副鼓吹給之又曰楊濟遷太子太傅濟有才藝嘗從帝校獵北邙山與侍中王濟俱著布袴褶騎馬執角弓在輦前猛獸突出帝令濟射之應弦而倒須臾復一出濟受詔又射殺之六軍大呌稱快又曰魏舒累遷後將軍鍾毓長史毎與参佐射舒常為畫籌而已後遇朋人不足以舒滿數毓初不知其善射舒容貌閑雅發無不中舉坐愕然莫有敵者毓歎而謝曰吾之不足以盡卿才有如此射矣又曰江州刺史庾恱隆安中為司徒長史曽至京口劉毅時甚窶先就府借東堂與故親出射而恱與僚佐徑来詣毅告之曰毅輩迍否之人合一射甚雖君於諸堂並可望以今日見讓恱不許射者皆散唯毅留射如故又曰王愷以帝舅奢家有牛名八百里駮常瑩其蹄角王濟請以錢千萬與牛對射而賭之愷亦自恃其能令濟先射一發破的因據胡床叱左右速探牛心來須臾而至一割便去齊春秋曰宜都王鏗字宣徹太祖第十六子善射常取甘蔗挿地百歩射之十發十中古之楊葉殆不能加陳書曰禇玠剛毅有膽快長騎射常從司空侯安都於徐州出獵遇猛獸玠射之再發中口入腹俄而獸斃燕書曰賈堅字世固彎弓三石餘烈祖以堅善射故親試之乃取一牛至百歩上召堅使射曰能中之乎堅曰少壯之時能令不中今已老年正可中之恪大笑射發一矢拂眷再一矢磨腹皆附膚落毛上下如一恪曰復能中乎堅曰所貴者以不中為竒中之何難一發中之堅時年六十餘矣觀者咸服其妙又曰慕容根善射嘗從行獵有一野羊立於懸崖太祖命左右射之莫有中者根自募求射之一發而中崔鴻十六國春秋燕録曰建武翰奔還本國有勁騎百餘追之翰遥謂之曰吾既思戀而歸必無返面吾之弧矢汝曹知否無為相逼自取死也吾處汝國久矣誓不殺汝可百歩竪刀吾射中者汝便宜返不中者可前也諸騎解刀竪之翰發而中鐶追騎乃散後燕録曰慕容盛行遇賊盛曰汝欲當鋒乎試竪汝手中箭百歩我善中之宜慎汝命如不中當束身相投盗乃竪箭盛一發中之盗曰相試耳資而遣之又前秦録曰苻琳字永瑶堅之第五子也有文武才藝引弓五百斤射洞犂耳至於山水文詠皆綺藻清麗又前凉録曰索孚字國明燉煌人善射十中八九或謂之曰射有法乎孚曰射之為法猶人主之治天下也射者弓有强弱矢有銖兩弓不合度矢不端直主雖逄䝉不能以中才不稱官萬務荒怠雖有堯舜之君亦無以治也又趙録曰劉曜親圍陳安於隴城安突圍而出近則刀矛俱發輙害六七逺則雙帶兩鞬左右馳射太平御覽卷七百四十四
