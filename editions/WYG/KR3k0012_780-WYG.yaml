body:
  text: 太平御覽卷七百八十宋李昉等撰四夷部一東夷一叙東夷朝鮮獩貊三韓辰韓弁韓附叙東夷尚書堯典曰分命羲仲宅嵎夷曰暘谷又大誥曰武王崩三監及淮夷叛周公相成王將黜殷命作大誥蔡仲之命曰成王東伐淮夷遂踐奄作成王政又費誓曰魯侯伯禽宅曲阜徐戎並興東郊不聞徂兹淮夷徐戎並興善糓乃甲胄敿乃干無敢不弔備乃弓矢鍜乃戈矛礪乃鋒刃無敢不善左傳僖下曰把桓公來朝用夷禮故曰子又成公上莒子曰莒辟陋在夷其孰以我為虞又襄公六曰把夏餘也而即東夷行夷禮乂定公下曰公㑹齊侯於祝其實夾谷孔邱相犂彌言於齊侯曰孔邱知禮而無勇若使萊人以兵刼魯侯必得志焉萊人齊所滅萊夷也齊侯從之孔邱以公退曰士兵之以兵擊萊人兩君合好而裔夷之俘以兵亂之裔逺也非齊君所以命諸侯也裔不謀夏夷不亂華齊侯聞之遽辟之辟去萊兵也毛詩云苕之華大夫閔時也幽王之時西戎東夷交侵中國師旅並起因之以饑饉君子閔周室之將亡傷已逢之故作是詩也又尹吉甫美宣王也能興衰撥亂命召公平淮夷江漢浮浮武夫滔滔匪安匪遊淮夷來求論語子罕曰子欲居九夷或曰陋如之何子曰君子居之何陋之有後漢書曰王制云東方曰夷夷者抵也言仁而好生萬物抵地而出故天性柔順易以道御至有君子不死之國焉又曰㑹稽海外有東鯷人鯷連夷切分為二十餘國又有夷州及澶州傳言秦始皇遣方士徐福將童男童女數千人入海求蓬萊神仙不得徐福畏誅不敢還遂止此州代代相承有數萬家人庻時至㑹稽市㑹稽東野縣人有入海行遭風流移至澶州者所在絶逺不可來徃竹書紀年曰后方即位三年九夷來御曰畎夷千夷方夷黄夷白夷赤夷𤣥夷風夷陽夷又曰后發即位元年諸夷賔于王門諸夷入舞又曰仲丁即位于藍夷白虎通曰夷者蹲也言無禮儀史系曰天監五年丹陽南山得瓦物髙五尺圍四尺上銳下平葢如合焉中得劔一資具十數時人莫識沈約云此東夷罨盂也葬則用之代棺此制度卑小則隨之時闕東夷死則坐塟之武帝服其博識臨海水土志曰夷州在臨海東南去郡二千里土地無雪霜華木不死四面是山衆山夷所居山頂有越王射的正白乃是石也此夷各號為王分畫土地人民各自别異人皆髠頭穿耳女人不穿耳作室居衆荆為蕃障土地饒沃既生五糓又多魚肉舅姑婦男女卧息共一大牀交㑹之時各不相避能作細布亦作班文布刻畫其内有文章以為飾好也其地亦出銅鐡唯用鹿觡矛以戰鬭耳磨礪青石以作矢鏃刀斧鐶貫珠璫飲食不潔取生魚肉雜貯大器中以滷之歴日月乃啖食之以為上餚呼民人為彌麟如有所召取大空材材十餘人以着中庭又以大杵旁舂之聞四五里如鼓民人聞之皆徃馳赴㑹飲食皆踞相對鑿木作器飾如槽狀以魚肉腥臊安中十十五五共食之以粟為酒木槽貯之用大竹筒長七寸許飲之歌似犬嘷以相娯樂得人頭斫去腦駮其面肉留置骨取犬毛染之以作鬚眉髻編其齒以作口自戰臨鬭時用之如假面狀此是夷王所服戰得頭着首還中庭建一大材髙十餘丈以所得頭差次挂之歴年不下彰示其功又甲家有女乙家有男仍委父母徃就之居與作夫妻同牢而食女以嫁皆缺去前上一齒又曰安家之民悉依深山架立屋舍於棧格上似樓狀居處飲食衣服被飾與夷州民相似父母死亡殺犬祭之作四方函以盛屍飲酒歌舞畢乃懸着髙山巖石之間不埋土中作塚墎也男女悉無履今安陽羅江縣是其子孫也皆好猴頭羮以菜和中以醒酒雜五肉臛不及之其俗言寧自負人千石之粟不願負人猴頭羮臛朝鮮尚書大傳曰武王勝殷繼公子禄父禄父紂子也釋箕子之囚箕子不忍周釋走之朝鮮武王聞之自以朝鮮封之箕子既受周之封不得無臣禮故於十二祀來朝史記曰朝鮮張晏注曰朝鮮有濕水列水汕水合為洌水凝樂浪朝鮮取名於此汕所晏切又曰朝鮮王滿燕人也自始燕時嘗畧屬真畨朝鮮為置吏築鄣塞秦滅燕屬遼東外徼漢興為逺難守修復遼東故塞至浿水為界屬燕王盧綰反入匈奴滿亡命聚黨千餘人魋結蠻夷服而東走出塞渡浿水居秦故空地上下鄣稍役屬真畨朝鮮蠻夷及故齊燕亡命者王之郡王險王險地名㑹孝惠髙后時天下初定遼東太守即約滿為外臣保塞外蠻夷毋使侵盜邊以聞上許之以故滿得以兵威財物侵降其旁小邑真畨臨屯皆來服屬方數千里傳子至孫右渠所誘漢亡人滋多又未嘗入見真畨旁衆國欲上書見天子又擁閼弗通元封二年漢使涉何譙諭右渠終不肯奉詔何去至界臨浿水使馭刺殺送何者朝鮮禆王長長禆王名也即渡水馳入塞遂歸報天子曰殺朝鮮將上為其名美即不詰拜何為遼東東部都尉朝鮮怨何發兵襲攻殺何天子募罪人擊朝鮮其秋遣樓船將軍楊僕自齊浮渤海兵五萬人左將軍荀彘出遼東討右渠右渠發兵距險天子為兩將軍未有利乃使衞山因兵威徃諭右渠右渠見使者頓首謝欲降恐兩將詐殺臣今見信節請降服遣太子入謝獻馬五千疋及餽軍粮人衆萬餘持兵渡浿水使者及左將軍疑其為變謂太子已服降宜令人毋持兵太子亦疑使者左將軍詐殺之遂不渡浿水復引歸左將軍破浿水上軍廼前去城下圍其西北樓船亦徃㑹居城南右渠遂堅守城數月未能下左將軍急擊之朝鮮大臣廼隂間使人約降樓船徃來言尚未肯决天子使濟南太守公孫遂徃征之有便宜得以從事遂至以節召樓船將軍入左將軍營計事即命左將軍麾下執縛樓船將軍并其軍以報天子天子誅遂左將軍已并兩軍即擊朝鮮朝鮮相路人韓陶尼谿相參將軍王唊師古曰相路一人也韓陶二人尼谿相參三人也軍王唊四人也唊音頰相與謀使人殺朝鮮王右渠來降王險城未下故右渠之大臣成已又反覆攻吏左將軍使右渠子長降相路人子最告諭其民誅成已遂定朝鮮為真番臨屯樂浪𤣥莬四郡漢書地理志曰𤣥莬樂浪武帝時初置皆朝鮮獩貊勾驪蠻夷殷道衰箕子去之朝鮮教其民以禮義田蠶織作樂浪朝鮮民犯禁八條如淳曰有其四其四不見相殺以當時償殺相傷者以糓償相盜者男没入其家為奴女子為婢欲自贖者人五十萬雖免為民俗猶羞之嫁取無所讎是以其民終不相盜無門户之閉婦人貞信不淫辟其田民飲食以籩豆都邑頗放效吏及内郡賈人徃徃以杯器食郡初取吏於遼東吏見民無閉藏及賈人徃者夜則為盜俗稍益薄令相犯禁寖多至六十餘條可貴哉仁賢之化也然東夷天性柔順異於三方之外故孔子悼道之不行乘桴浮於海欲居九夷有以也濊貊魏志曰濊貊國南與辰韓北與髙句麗沃沮接東窮大海今朝鮮之東皆其地也户二萬餘昔箕子既適朝鮮作八條之教門户不閉而民不為盜其後四十餘世朝鮮侯淮僭稱主陳勝等起天下叛秦燕齊趙民避地東入朝鮮數萬口燕人衞滿魋結夷服復來王之漢武帝伐滅朝鮮分其地為四郡自是之後胡漢稍别無大君長自漢以來其官有侯邑君三老統主下户其耆舊自謂與句麗同種其人性慤愿少嗜欲有亷恥不請句麗言語法俗大抵與句麗同衣服有異男女衣皆着曲領男子繫銀花廣數寸以為飾自單單大嶺以西屬樂浪以東七縣都尉主之皆以濊貊為民後省都尉封其渠帥為侯今不耐濊皆其種也其俗同姓不婚多忌諱每疾病死亡輒損棄舊宅更作新居有麻布蠶綿飲食亦有爼豆曉候星宿豫知年歳豐約嫁娶䘮葬之法有似句麗不以珠玉為寶常用十月節祭天晝夜飲酒歌舞名為舞天又祭虎以為神其邑落相侵犯輒相罰責生口馬牛名之為責禍殺人者償死少冦盜作矛長三丈至戰時數人共持之能步鬭樂浪檀弓出其地其海出班魚皮土饒文豹又出菓下馬漢時獻之正始六年樂浪太守鄧茂帶方太守弓遵以嶺東濊屬句麗興師伐之不耐侯等舉邑降八年詣闕朝貢詔更拜不耐濊王居處雜在人間四時詣郡朝謁二郡有軍征賦調供給役吏遇之如民風俗通曰貊者謹按春秋傳大貊小貊者路也薄也不知送徃勞來無宗廟粢盛賦役輕薄也三韓辰韓弁韓後漢書曰韓有三種一曰馬韓二曰辰韓三曰弁韓馬韓在西有五十四國其北與樂浪南倭接辰韓在東十有二國其北與獩貊接弁韓在辰韓之内亦有十二國其南亦與倭接凡七十九國大者萬餘户小者數千家各在山海間地合方四千餘里東西以海為限皆古之辰國也馬韓最大共立其種為辰王都月支國盡王三韓之地其諸國王先皆是馬韓種人焉馬韓人知田蠶作綿布出大栗如梨有長尾雞尾長五尺邑落雜居亦無城郭作土室形如冢開户在上不知跪拜無長㓜男女之别少綱紀國邑雖有主帥不能相制御其葬有棺無槨不知騎乘牛馬不貴金寶錦羅唯重纓珠以綴衣為飾及懸頸垂耳大率皆魁頭露紒魁頭猶科頭也謂以髪縈繞成科結也紒音計布袍草履其人壯勇少年有築室作力者輒以繩貫脊皮縋以大木懽呼為健善用弓矟矛櫓雖有鬭爭攻戰而貴相屈服俗信鬼神常以五月競祭鬼神晝夜酒食羣聚歌舞輒數十人相隨踏路為節十月農功畢亦如之諸國邑各以一人主祭天神號為天君又立蘇塗建大木以懸鈴鼔事鬼神其南界近倭亦有文身者魏志曰馬韓漢桓靈之末韓濊强盛郡縣不能制民多流入韓國建安中公孫康分屯右縣以南荒地為帶方郡遣公孫模張敞等收集遺人興兵伐韓濊舊人稍出是後倭韓遂屬帶方魏景初中明帝遣帶方太守劉昕樂浪太守鮮于嗣越海定二郡諸韓國臣智加賜邑君印綬其次與邑長其俗好衣幘下户詣郡朝謁皆假衣幘自服印綬部從事吳林以樂浪本統韓國分割辰韓八國與樂浪又曰有州胡在馬韓之西海中大島上其人差短小言語不與韓同皆髠頭如鮮卑但衣韋衣有上無下好養牛豕乘舟徃來市貨韓中辰韓後漢書曰辰韓耆老自言秦之亡人避苦役適韓國馬韓割東界地與之其名國為邦弓為弧賊為冦行酒為行觴相呼皆為徒有似秦語故或名之為秦韓有城栅水室諸小别邑各有渠帥大者名臣智次有儉側次有樊濊次有殺奚次有邑偕皆其官名土地肥美宜五榖知蠶桑作縑布乘駕牛馬嫁娶以禮行者讓路國出鐡獩倭馬韓並從市之凡諸貿易皆以鐡為貨俗喜歌舞飲酒鼔瑟兒生欲令頭扁皆押之以石扁音補典切魏志曰辰王常用馬韓人作之世世相繼辰王不得自立為王明其為流移之人故為馬韓所制也其俗男女有别以大鳥羽送死其意欲使死者飛揚其國作屋横累木為之有似牢獄弁韓後漢書曰弁辰與辰韓雜居城郭衣服皆同言語風俗有異其人形皆長大美髮衣服潔清而刑法嚴峻其國近倭故頗有文身者初朝鮮王凖為衞滿所破乃將其餘種數千人走入海攻馬韓破之自立為韓王王淮後滅絶馬韓人復自立為辰王建武二十年韓人亷斯人蘇馬諟等詣樂浪貢獻亷斯邑名諟音是帝封蘇馬諟為漢亷斯邑君使屬樂浪郡四時朝謁靈帝末韓獩並盛郡縣不能制百姓亂苦多流亡入韓者魏志曰弁辰與辰韓雜居亦有城郭衣服居處與辰韓同言語法俗相似祠祭鬼神有異施竈皆在户西太平御覽卷七百八十
