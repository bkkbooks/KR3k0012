body:
  text: 太平御覽卷七百二十八宋李昉等撰方術部九筮下晉書曰嚴卿㑹稽人也善卜筮鄉人魏序欲暫東行荒年多抄盜令卿筮之卿筮曰君慎不可東行必遭暴害之氣而非刼也序不信卿曰既必不停冝有以禳之可索西郭外獨母家白雄狗繫著船前求索止得駮狗無白卿曰駮者亦足然猶恨其色不純當餘小毒止及六畜輩耳無所復憂序行半路狗忽作聲甚急有如人打之者比視已死吐黑血斗餘未久序墅上白鵝數頭無故自死而序家無恙又曰郭璞既過江宣城太守殷祐引為參軍時有物大如水牛灰色卑脚類象胷前尾上皆白大力而遲鈍來到城下衆咸異焉祐使人伏而取之令璞作卦遇遯之蠱其繇曰艮體連乾其物壯巨山潛之畜匪兕匪虎身與鬼并精見二午法當為禽兩翼不許遂被一創還其本墅按卦定之是為驢鼠卜適了伏者以戰刺之深尺餘遂去不復見巫云廟神不悅曰此是䢼亭驢山君鼠使詣荆山暫來過我不須觸之其精妙如此又曰王導深重郭璞引參已軍事導令作卦璞言公有震厄可命駕西出數十里得一栢樹截斷如身長置常寢處災當可消矣導從其言數日果震栢樹粉碎時元帝初鎮建鄴導令璞巫之遇咸之井璞曰東北郡縣有武名者當出鐸以著受命之符西南郡縣有陽名者井當沸其後晉陵武進縣人於田中得銅鐸五枚厯陽縣井沸經日乃止及帝為晉王又使璞筮遇豫之暌璞曰㑹稽當出鍾以告成功上有勒銘應在人家井泥中得之繇辭所謂先王以作樂崇德殷薦之上帝者也及帝即位太興初㑹稽剡縣人果於井中得一鍾長七尺二分口徑四寸半上有古文竒書十八字云㑹稽嶽命餘字時人莫識之又曰王敦之謀逆也温嶠庾亮使郭璞筮之璞對不決嶠亮復令占已之吉凶璞曰元吉嶠等退相謂曰璞對不了是不敢言或天奪敦魄今吾等與國共舉大事而璞云元吉是為舉事必有成也於是勸帝討敦初璞每言殺我者山宗至是果有姓崇者搆璞於敦將舉兵又使璞筮璞曰無成敦因疑璞之勸嶠亮又聞卦凶乃問璞曰卿更筮吾夀幾何荅曰思向卦明公起事必禍不久若往武昌壽不可測敦大怒曰卿壽幾何曰命盡今日中敦怒收璞詣南崗而斬之璞臨出謂行刑者欲何之曰南崗頭璞曰必在雙栢樹下既至果然復云此樹應有大鵲巢衆索云不見璞更令尋覔果於枝間得一大巢密葉蔽之又曰庾翼㓜時嘗令璞筮公家及身卦成曰建元之末丘山傾長順之初子凋零及康帝即位將改元為建元或謂庾氷曰子忘郭生之言耶立始建元也丘山上名此號不宜用氷撫心歡恨帝崩何充改元為永和庾翼歎曰天道精㣲乃當如是長順者也永和也吾庸得免乎其年翼卒氷又令筮其後嗣卦成曰卿諸子並當貴盛然有白龍者凶徴至矣若墓碑生金庾氏之大忌也後氷子藴為廣州刺史妾房内忽有一新生白狗子莫知所由來其妾被愛之不令藴知狗轉長大藴入見狗眉眼分明又身至長而弱異於常狗藴甚怪之將出共視在衆人前忽失所在藴慨然曰殆白龍乎庾氏之禍至矣又墓碑生金俄而為桓温所滅璞之占騐皆如此類也璞撰前後筮騐六十餘事名為洞林又抄京費諸家要最更撰新林十篇卜韻一篇原闕三國典畧曰西魏孝武帝字孝則孝文皇帝之孫也性沈厚少言體有鱗文初封汝陽公夢人謂己曰汝當大貴得二十五年將即位使吳遵筮之遇明夷之賁曰初登於天後入於地帝曰何謂也遵曰初登於天當作天子也後入於地不得久也又曰清河王岳神武從父弟也初家于洛邑神武奉使入洛常止岳舍母山氏嘗夜起見神武室中有光窺而無火移於東屋其光復存以為恠也詣卜者筮之遇乾之大有占曰吉易稱飛龍在天大人造也飛龍九五大人之卦當大貴主人蒙其福神武起兵於信都山氏聞之大喜謂岳曰赤光之瑞今當驗矣可間從之共圖大計岳至信都神武以為散騎常侍封山氏為郡君授女侍中入侍皇后又曰齊趙輔和明易善筮後宫誕男女時日筮無不中有人父疾輔和筮之遇乾之晉告之以吉退而謂人曰乾為天夫變魂而昇於天能無死也果如其言又曰齊許遵髙陽新城人也明易善筮兼曉天文齊神武引為館客自言禄命不富貴終必横死是以任情疎誕多所犯忤時齊王無道許遵語人曰多折筭來吾筮此狂夫何時當死於是布筭滿床大言曰不出首冬我乃不見滿為陰賊鬼而帶賊非魔孰為致之酉為口舌當就言乎兌故知善言乎冝前為法事於是人人贊善莫不從風梁書曰鄧元起初為益州刺史及巴東聞蜀亂使蔣光濟筮之遇蹇喟然歎曰吾豈鄧艾而及此乎後果如筮又阮孝緒傳曰孝緒見善筮者張有道曰見子隱迹而心難明自非考之龜蓍無以驗也及布卦既揲五爻曰此將為咸應感之法非嘉遯之兆孝緒曰安知後爻不為上九果成遯卦有道歎曰此所謂肥遯無不利象實應德心迹并也孝緒曰雖獲遯卦而上九爻不發升遐之道便當髙謝又曰阮孝緒自筮卦曰吾壽與劉著作同年及劉著作卒孝緒曰劉侯逝矣吾其幾何其年十月卒後魏書曰任城王澄髙祖外示南討意在謀遷齊於明堂左个詔太常卿王諶親令龜卜易筮南伐之事其兆遇革髙祖曰此是湯武革命之卦也羣臣不敢言澄曰革者更也將欲應天順人革羣臣之命湯武得之為吉陛下帝有天下重光累葉今日卜征乃可伐叛不得云革命此非君人卦未可為吉也髙祖厲聲曰此象云大人虎變何云不吉也澄曰陛下龍興既久不冝方同虎變髙祖勃然作色曰社稷我社稷任城而欲沮衆也澄曰社稷誠陛下之社稷然臣是社稷之臣也務參顧問敢盡愚衷髙祖久之乃解曰各言其志亦復何傷車駕還宫便詔澄未及升階遥謂曰向者之革今便欲論之明堂之忿懼衆人競言沮我大計故厲色怖文武耳想解朕意也又曰鄧淵博覽經書長於易筮太祖定中原擢為吏部郎又曰許彦少孤貧好讀書後從沙門法叡受易世祖被徵以卜筮頻驗遂在左右參與謀議又後周書曰梁孝元凡諸伎術無所不該南平嗣王恪嘗以銅合盛金玉琥珀指還請孝元射覆卦遇姤之履卦曰上既為天其體則圓指還之象金玉在焉寅爻帶午寅則為虎琥珀生光在合中央合中之物凢有三種案卦而談或輕或重恪於是神服又以壬申日寅時筮南軍何時有信遇剥之艮孝元曰使還已在門外遣之往看果如所說賔客驚其妙而問之孝元曰艮為門時在寅與日辰并故知之耳凡所占決萬不失一及我軍之伐授蓍為卦取龜式驗之因抵於地曰吾若死此卜豈非命乎隋書曰楊伯醜馮翊武鄉人也好讀易隠于華山開皇初被徵入朝見公卿不為禮無貴賤皆汝之人不能測也髙祖召與語竟無所荅上賜之衣服至朝堂捨之而去於是被髮陽狂遊行市里形體垢穢未嘗櫛沐時有張永樂者賣卜京師伯醜每從之遊永樂為卦有不能決者伯醜輒為分析爻象尋幽入㣲永樂嗟服自以為非所及也伯醜亦開肆賣卜有人嘗失子就伯醜筮者卦成伯醜曰汝子在懷逺坊南門道東北壁上有青衣女子抱之可往取也如言果得或有金數兩夫妻共藏之於後失金其夫意妻有異志將逐之其妻稱寃以詣伯醜為筮之曰金在矣悉呼其家人指一人曰可取金來其人赧然應聲而取之道士韋知常詣伯醜問吉凶伯醜曰汝勿東北行必不得已當早還不然楊素斬汝頭未幾上令知常事漢王諒俄而上崩諒舉兵反知常逃歸京師知常先與楊素有隙及素平并州先訪知常將斬之賴此獲免有失馬來詣伯醜卜者時伯醜為太子所召在途遇之立為作卦卦成曰我不遑為卿占之卿且向西市東壁門南第三店為我買魚作膾當得馬矣其人如此言須臾有一人牽所失馬而至遂擒之崖州嘗獻徑寸珠其使者陰易之上疑焉召伯醜筮曰有物出自水中質圓而色光是大珠也今為人所𨼆具言𨼆者姓名容狀上如言簿責之果得本珠上竒之賜帛二十疋唐書曰太宗皇后長孫氏隋大業中歸寧於永興里后舅髙士亷有嫗張氏於后所宿舍側見一大馬二丈餘鞍勒悉具士亷筮之遇坤彖曰至哉坤元萬物資生乃順承天坤厚載物德合無彊象曰牝馬地類行地無彊地之泰彖曰内陽而外陰内健而外順則是天地交而萬物通也象曰后以輔相天地之宜以左右民卜人曰龍乾之象也馬坤之象也變而為泰天地交也繇陽於歸妹婦人兆也案王弼云婦人謂婦女處尊位履中居順也此女當大貴也其可盡言乎士亷志之而心獨喜親戚知咸敬異焉又曰衞大經篤學善易日無二言則天降詔徵之辭疾不起嘗預筮死日先鑿墓自為誌文如筮而終又曰𤣥宗之為潞州别駕將入朝有軍人韓凝禮自謂通卜宗以食箸試之既布卦一箸無故自起凢三偃起觀者以為大吉徵既而誅韋氏定天保因此行也凝禮起家五品家語曰孔子嘗自筮而卦得賁愀然有不樂之狀子張進曰師聞卜者得賁是吉卦也而夫子之色不平何也孔子曰以其雜也在周易山下有火謂之賁非正色之卦也夫質也白冝正白黑冝正黑今而以賁非吉兆也吾聞舟不漆又曰玉不雕何者質之有餘質有餘者不受飾故也說苑同古史考曰庖羲作卦始有筮衝波傳曰孔子使子貢往外而未來謂弟子占之遇鼎皆言無一足不來顔子掩口而笑曰無足者乗舟而來賜至矣清朝也子貢果朝至國語曰晉公子在秦筮之曰尚有晉國得貞屯悔豫皆八也内曰貞外曰悔震下坤上屯坤下震上豫得此兩卦震在屯為貞在豫為悔八謂震兩陰爻貞悔皆不動故曰皆八者爻無為也筮史占之皆曰不吉卦閉而不通爻無為也司空季子曰吉是在周易皆利建侯不有晉國以輔王室安能建侯筮告我曰吉利建侯得國之務也吉執大焉是二者得國之卦也又曰惠公卒秦伯納公子董因迎公於河公問焉曰吾其濟乎對曰歲在大梁集天行元年始受實沉之星也實沉之墟晉人是居所以興也今君當之無不濟矣君之行也歲在大火閼伯之星也是謂大辰臣筮之得泰之八乾下坤上泰遇泰無動爻筮為侯也泰三至五震謂陰爻不上數皆八故得泰之八與貞屯悔豫皆八義同曰是謂天地配亨小往大來今及之矣何不濟之有且以辰出而以參入皆晉祥也濟且秉成必伯諸侯秉執子孫賴之君無憂矣又曰晉孫談之子適周事襄公襄公有疾召頃公而告之曰吾聞晉之筮之也遇乾之否曰配而不終君三出焉一既往矣後之不知其次必此且吾聞之成公之生也其母夢神規其臀以黑曰使有晉國規畫臀尻三而畀驩之孫故名之曰黑臀於今再矣襄公曰驩此其孫也此周子者晉襄公之孫也而令德孝恭非此其誰且其夢曰必驩之孫實有晉國其卦曰必三取君於周其德又可以君國有襲焉襲合也三合德夢卦也吾聞之泰誓曰朕夢恊于朕卜襲于休祥戎商必剋以三襲也晉仍無道而鮮胄其將失之矣善晉子其當之也晉子周子頃公許諾及厲公之亂召周子而立之是謂悼公亂謂殺也智瓊傳曰弦超為神女所降論者以為神仙或以為鬼魅不可得正也著作郎于寳以周易筮之遇頥之益以示同寮即郭璞曰頥貞吉正以養身雷動山下氣性惟心變而之益延壽永年龍乘御風乃升于天此仙人之卦也搜神記曰橋𤣥字公祖梁國人也初為司徒長史五月未夜卧見東壁正白如門呼左右左右莫見因起自往手捫摸之壁如故還牀又見心大恐其友應劭往候之元吿劭曰鄉人有童彦興者許季山外孫也其探􅄨索隱窮神知化然天性褊狹羞於卜筮者元聞往請之公祖虛禮盛饌下席行觴彦行辭公祖讓再三爾乃應之曰府君恠見曰光如門明者然不為害也六月上旬鷄鳴時聞南家哭即吉到秋節遷北行郡以金為名位至將軍三公到六月九日太尉楊秉夢七月拜鉅鹿太守鉅邊有金焉復為度遼將軍遂登三事續搜神記曰郭璞每自為卦知其凶終嘗行建康柵塘逢一趨走少年便牽住脫絲布袍與之此人乃受及當死果此人行刑傍人皆為求屬璞曰我託之久矣此人為之歔欷哽咽又曰欷超年二十餘得重病盧江杜不愆始學易卜屢有驗超令試筮之卦成不愆曰案卦言之鄉所恙尋愈然冝於東北三十里上官姓家索其先養雄雉籠而絆之置東簷下却後九日辰加午必當有野䳄雉飛來與交合既畢雙飛去若如此不出二十日病都除又是休應年將八十位極人臣若但雌逝雄留者病一周方差年半八十名位亦失超依其言索雄果得至期日超卧南軒下觀之至日晏果有雌雄飛入籠與雄交而去雄雉不動超曰雖管郭之竒何以尚此超病逾年乃起至四十卒於中書郎録異傳曰隗炤者汝陰鴻壽亭人也善於易臨死書板授其妻曰吾亡後當大荒窮雖爾慎莫賣宅也却後五年春當有詔使來頓此亭姓龔此人負吾金卿以此板往責之勿違吾言言乞而卒後果大困乏欲賣宅憶夫言輒止期日有龔使者至亭妻遂賫板往使者執板惘然不知所以乃言曰我生不識此何縁耳炤妻曰夫臨亡手書板見命如此不敢違也使者沉吟良久而寤謂曰賢夫何善妻曰亡夫善於易而未曾為人卜也使者曰噫可知矣乃命取蓍筮之卦成撫掌而嘆曰妙哉隗生含明隱迹可謂鏡窮達而洞吉凶者也於是告炤妻曰吾未嘗相負金也賢夫自有金耳知亡後蹔窮故藏金以待泰平所以不告婦兒者恐金盡而困無已也知吾善易故書板以寄意耳金有百斤盛以青甖覆以銅鉢埋在堂屋東頭去壁一丈入地九尺妻還掘之皆如其言金樓子自述云初至荆州遇雨聊附見首末孟秋之月亢陽日久月旦雖雨俄爾便晴有人云諺曰兩月額千里赤盖旱之徵也吾乃端筴拂蓍遇動不動既而言曰庾子爻為世於金七月連申申子辰又三五合必在此月五日庚子果值甘雨余又以十七日筮何時雲卷金翹日輝合壁紅塵暗阻丹霞映峙謂亢陽之勢未霑膏澤筮遇坎之比於是輟蓍而嘆曰坎者水也子爻為世其在今夜三更平地上有水坎之為比其方有甘雨乎欣然有自得之志又曰桃文烈善龜卜謂余曰此二十一日將雨其在虞淵之時余乃筮之遇謙之小過既言曰坤艮二象俱在十宫非直無雨乃應開霽俄而星如玉李月上金波霧生猶縠河垂似帶余乃欣然異苑曰穎州庾嘉德善於蓍蔡之事有一失婢庾卦云君可出東陵口伺候有姓曹乘車者無問識否但就其載得與不得殆一理也旦出郭果有曹郎上墓逕便升車曹大叱呼牛驚奔入草刺一死屍下視乃其婢也博物志曰龜三千嵗遊於卷耳之上蓍千歲而三百莖同本以老故知吉凶又曰筮必沐浴齋潔燒香每朔望浴蓍必五浴之浴龜亦然太平御覽卷七百二十八
