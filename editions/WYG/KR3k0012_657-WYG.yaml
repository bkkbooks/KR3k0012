  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_657-1a, image: WYG0898/WYG0898-0825c.png}
body:
  text: 太平御覽卷六百五十七宋李昉等撰釋部五經像經晉書曰姚興如逍遥園引諸沙門于澄𤣥堂聴鳩摩羅什演說佛經羅什通辨夏言尋覽舊經多有乖謬不與胡本相應興與羅什及沙門僧略僧遷道樹道叡道坦僧肇曇順等八百餘人更出大品羅什持胡本興執舊經以相考較其新文異舊者皆㑹於理義續出諸經并諸論三百餘卷今之新經皆比羅什所譯興既托意於佛道公卿以下莫不欽附沙門自逺而至者五千餘人起浮圗於永貴里立波若臺於宫中沙門坐禪者恒有千數州郡化之事佛者十室而九矣齊書曰張緒為中書令善談𤣥駕幸莊嚴寺聴僧達道人講維摩坐逺不聞諸言上難移緒乃遷僧達梁書曰張稷岀為青兾二州刺史而不得志嘗閉閣讀佛經又曰劉􅎰字彦和早孤篤志好學家貧不婚娶依沙門僧祐居遂博通經論因區别部類錄而序之今定林寺經藏􅎰所定也􅎰為文長于佛理都下寺塔及名僧碑誌必請製文𠡠與惠震沙門于定林寺撰經證功畢求遂出家先燔髪鬚自誓勑許之乃變服改名慧地又曰任孝恭少從蕭寺雲法師讀經論明佛理至是蔬食齋戒信受甚篤而性頗自伐以才能尚人於流軰中多有忽略世以此少之又曰皇偘性至孝常日誦孝經二十遍以擬觀世音經周書曰梁蕭詧謂其度支尚書宗如周曰卿何為謗經如周踖踧自陳不謗詧又謂之如初如周懼岀遇蔡大寳大寶知其㫖笑謂之曰君當不謗餘經正應不信法華耳如周乃悟法華經云聞經随喜面不狭長如周面狭且長由是詧有此戯陳書曰王固清虛寡欲信佛法及丁母憂遂終身蔬食夜則坐禪書誦佛經嘗聘魏宴于昆明池魏人以南人嗜魚大設罟網固以佛法咒之遂一鱗不獲後魏書曰裴宣髙祖曽令集沙門講經因命宣講難甚有理詣高祖稱善唐書曰韋綬字子章京兆人少有至性喪父刺血冩佛經又曰貞元十四年南天竺國進華嚴經乃令僧般若三藏與保夀寺僧智柔圎照同於崇福寺翻譯成四十卷髙僧傳曰釋道安姓衛氏常山人初經出已乆而舊譯時謬致使深義隠沒未通每至講談難叙大意安躬覧經典鈎深致逺並尋文觧句為起盡之義經文克明自安始也洛陽伽藍記曰神龜四年十一月太后遣崇靈寺比丘慧生向西域取經凡得一百七十部皆是大乗妙典湼槃經曰是諸大乗經為滿字無欠少之義也小乗諸敎悉為半字義未圎故云半字像晋書曰恭帝深信浮圗道鑄貨千萬造丈六金像於瓦棺寺帝親迎之羣臣歩從滿十餘里又曰彭城王紘上言樂賢堂有先帝手畫佛像經歴冦難而此堂猶存宜勑作頌帝下其議蔡謨曰佛者夷狄之俗非經典之制先帝量同天地多才多藝聊因臨時而畫此像至於雅好佛道所未及聞也今欲發王命勅史官上稱先帝好佛之志下為夷狄作一像之頌於義有疑焉於是遂寢又曰秦将呂光伐龜兹将軍杜進梦金像飛越龜兹之城曰所謂佛神去之其亡必矣又曰咸和中丹陽尹高悝行張侯橋見溝中五色光長數尺不知何怪乃令人光處得金像無有光趺悝乃下車載像還至長干巷首牛不肯進悝乃令馭人任牛所之牛徑牽至寺經一嵗臨海漁人張係世於海口忽見銅花趺浮岀取送縣以送臺乃施像足宛然㑹合簡文咸安元年交州合浦人董宗之採珠沒水底得佛光艶交州送臺以施像又合焉自咸和中得像至咸安初歴三十餘年光趺始具初高悝得像後有西域僧五人来詣悝曰昔於天竺得阿育王造像来至鄴下逢時亂埋於河邉今尋覔失所五人常一夜夢見像曰已出江東為高悝所得悝乃送此五僧至寺見像歔欷涕泣像便放光照燭殿宇像趺先有外國書莫有識者後有三藏那䟦摩識之云是阿育王為第四女所造也宋書曰劉牢之子敬宣八嵗䘮母晝夜號泣四月八日見衆人灌佛乃下頭上金鏡為母灌像因悲泣不自勝又曰沈道䖍累世事佛推父母舊宅為寺四月八日每設像祀輙舉家慟焉又曰自漢世始有佛像形製未工戴逵特善其事顒亦叅焉宋世子鑄丈六銅像於瓦棺寺既成面恨瘦工人亦不能改乃迎戴顒顒曰非面瘦乃臂脾肥爾及減臂脾瘦患即除無不歎服梁書曰阮孝緒末年蔬食斷酒恒供飬石像先有損壊心欲補之罄心敬禮經一夜忽然完復衆並異之又曰大通四年又造一丈六尺旃壇像量之剰二尺成丈八形次衣文及手足更重量又剰一尺五分至大通五年寺僧洽重量又剰七寸即長二丈矣大同四年移入大殿𠡠主書呉文寵更量又剰五寸凡五度量即長二丈七寸豈非精誠所感也又曰武帝捨宅造寺未成於小莊嚴寺造無量夀像長一丈八尺及鑄而銅不足帝又給功徳銅三千斤臺内送銅未至像處已見銅車到鑪所於是就冶一灌便足矣後臺司銅至方知向来送銅靈感所致及開模像以成長丈九而相好不差又有大錢二枚見在衣縧竟不銷鑠其年欲移像遷寺未移前淮中佑客每夜輙聞大橋上如有人脩道路往視不見人俄而像度光彩輝煥觀者莫不歸心北齊書曰有沙門晏通於道傍造大漆像敎化乞財所得物咸入常住嘗以杖敲此像號曰出課烏奴又曰封述渤海蓨人一息娶隴西李士元女大輸財聘及将成禮猶競懸違述忽取所供飬像對士元打而作誓士元笑曰封公何處常得應急像洛陽伽藍記曰西域捍魔城南十五里有一大寺三百餘僧有像一軀舉髙丈六面常東立不肯西顧父老相傳云此像夲從南方騰空而来于寘國王親来敬禮請像載歸中路夜宿忽然不見遣人尋之還来夲處王即起塔封四百戸以供洒掃人有患者以金箔貼像所患處即得愈後人於此像邉造丈六像及諸像塔乃至數千懸彩幡葢亦有萬計魏國之幡過半幡上𨽻書多云太和景明延昌唯有一幡觀其前年號是姚興時幡西京記曰光福坊大興寺有阿育王金像歴宋齊梁陳數有竒異陳國亡忽面南向雖止之還爾隋文帝載入長安内中供飬後移置此寺寺衆以殿大像小不可當乃置之於北面明日乃自轉正陽衆咸驚異復北面明日復還轉南面衆乃懴謝不復更動又曰崇敬寺有石像一軀髙五尺製作麄惡甚有靈騐傳云是阿育王第四女所造其女貎醜常自慨恨多作佛像及成皆類如此千數乃至誠祈禱忽感佛見形更造諸像相好方具其父使工遍散諸像於天下此其一也高僧傳曰釋曇翼出家事安公為師後居長沙寺翼常歎寺立僧足而形像尚少阿育王所造多布在餘方常聞外國僧說有至誠祈請者亦為之䧏見乃專精懇惻請求誠應以晋太元中忽有一金像現於渚宫城北路上光明照灼百姓驚駭翼聞乃往祗禮謂衆人曰當是阿育王像䧏我長沙寺焉即令弟子三人捧接迎至長沙寺其後罽賔禪師從蜀下入寺禮拜見像光上有梵字便曰是阿育王像何時来此時人方知翼之不謬又曰漢明帝使蔡愔於西域得畫釋迦竒像是優填王旃檀像既至雒明帝即令圗畫至清凉臺中及顯節陵上増一阿含經曰優填王𠡠國内巧匠㑹以牛頭旃檀作佛像形供飬晨夕禮拜是時波斯匿王聞優瑱王作佛像供飬亦召巧匠語言如来形體煌若金光當以真金作佛像即以紫磨作如来相亦五尺餘時閻浮提中始有二像法顯記曰僧尼羅國王以金等身而鑄像髻裝寳珠有盗者以梯取之像漸髙而不及盗歎其不救衆生像俯首而與之後市人擒盗盗言其事視像尚俯王重贖其珠而復裝之像記曰梁武帝天監元年正月八日夢檀像入國因發詔往迎像按佛遊天竺記及優填王經云佛上忉利天一夏為母説法王臣思見優填國王遣三十二匠及賫旃檀請大目連神力運徃令圗佛相既如所願圗了還返坐高五尺在祗洹寺至今供飬帝欲迎請此像遣洪勝將軍郝騫等八十人應募徃達具狀祈請舎衛王曰中天正像不可適邉乃命三十二匠更刻紫檀人圗一相卯時運手至午便就相好具足而像頂放光䧏微細雨并有異香故優填王經云真身既隠次二相見普為衆生深作利益者是也騫等負第二像行數萬里渡大海冐渉風波随浪至山粮食又盡所將人衆及傳送者身多亡歿逢諸猛獸一心念佛乃聞像後有甲胄聲又聞鐘聲岩側有僧端坐樹下登負像下置其前僧起禮像騫等禮僧僧授澡罐令飲並得飽滿僧曰此像名三􅚄三佛陁金毗羅王自徙至彼大作佛事語頃失之爾僉夜梦見神曉共圗之至天鍳十年四月五日騫等達于揚都帝與百僚迎還太極殿至太清三年湘東王在江陵即位遣人從揚都迎上至荆都後梁大定八年城北靜陵造大明寺乃以像歸之今見在多有傳冩流被京國云太平御覧卷六百五十七
