  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_964-1a, image: WYG0901/WYG0901-0495c.png}
body:
  text: 太平御覧卷九百六十四宋李昉等撰果部一果栗果易解卦曰天地解而雷雨作雷雨作而百果草木皆甲坼爾雅曰果不熟曰荒周禮天官上甸師職曰甸師供野果之屬禮記曲禮上曰賜果於君前其有核者懐其核又玉藻曰果實未熟不鬻於市凡食果實者後君子火熟者先君子春秋元命苞曰織女星主果謝丞後漢書曰劉祐字伯祖中山安國人仕郡為主簿郡將小子常出錢付之市買果實祐悉以買筆墨書具與之華峻後漢書曰桓榮為博士㑹庭中詔賜竒果受賜者懐之榮獨舉手奉以拜光武笑指之曰此真儒生也陳書曰徐孝克侍宴無所食噉至食散當其前膳羞損減帝宻記以問中書舍人管斌斌由是伺之見孝克以􅈿果内紳帶中斌當時莫識其意後尋訪方知其以遺母斌以啟宣帝嗟嘆良久乃勅㫖令宴享孝克前饌並遣將還以餉其母時論美之北史曰後魏淮陽王欣好營産業多所樹藝京師名果皆出其園唐書曰李泳為河陽所至以貪殘為務犒宴所陳果實以木刻彩繢之色説文曰在木曰果在草曰蓏山海經曰不周之山爰有佳果其實如桃李其葉赤食之不飢符子曰趙之相者曰林氏有九子皆賢國人美而稱之號曰九徳之父十徳之門趙王疾之王乃使擇其果之繁者伐之其父曰果之茂者猶伐之况其人乎吾將以爾為累矣去之則免乃携老持子逃於白雲之巖終身不返趙人思之郭子曰王丞相儉帳下甘果盛溢涉春敗爛吕氏春秋曰昔古朱㐮氏治天下也炎帝别號多風陽氣畜積萬物散解果實不成故士逹作為五弦之琴以來陽氣以定群生士逹朱㐮氏臣杜蘭香傳曰神女姓杜名蘭香降張碩家食粟飯并有時果碩食之亦不甘然一食可七八日不飢鄴中記曰石虎有華林園種衆果民間有名果虎作蝦蟇車四摶掘根靣去一丈深一丈合土載之植之無不生闞駰十三州記曰舍衛國在月氏南萬里果大如三斗杓食經曰種名果法取好直枝内着芋塊中種之張衡東京賦曰竒樹珍果鉤盾所職左思魏都賦曰馳道周屈於果下漢廐舊有樂浪所獻果下馬髙三尺以駕輦車又蜀都賦曰百果甲坼異色同榮劉禎魯都賦曰芳果萬名攅羅廣庭霜滋靈潤時至則零石崇金谷詩序曰雜果庶乎萬株陸機與弟雲書曰天淵池南角有果各作一株無處不有縱横成行一果之間輙作一堂郭璞五果讃曰果蓏之品剖􅀈因宜雖曰微肴貴賤有差栗毛詩山有樞曰山有漆隰有栗韓詩曰東門之栗有靖家室栗木名靖善也言東門之外栗樹之下有善人可與成為室家也毛詩䟽義曰五方皆有栗周秦呉揚特饒唯漁陽范陽栗甜美長味倭韓國上栗大如雞子亦短味不美桂陽有栗藂生大如杼子儀禮士䘮禮曰設豆右俎南栗東脯大戴禮曰八月栗零零也者降也零而後取之故不言剥也周禮天官曰饋食之籩其實栗禮記内則曰栗曰撰之左傳曰女贄不過榛栗􅀥脩以告䖍也論語曰哀公問社於宰我宰我對曰夏后氏以松殷人以栢周人以栗曰使民戰栗爾雅曰栵栭樹如槲樕而庳小子如細栗可食今江東亦呼為栭栗漢書曰種千樹栗其人與千户侯等謝承後漢書曰豫章宗度拜定陵令縣人杜伯夷清髙不仕度與談論致􅀥栗而已魏略曰太子與鍾繇書曰竊見玉書稱美玉赤擬雞冠黃侔蒸栗魏志曰東夷魏國出大栗如棃宋書曰劉秀之為丹陽尹先是秀之從叔穆之為丹陽與子弟㕔事上宴㕔事柱有一穿穆之謂子弟及秀之曰汝等試以栗遥擲柱入穿者後必得此郡惟秀之獨入焉其言遂騐晉書曰王恭幼敏悟年數嵗時祖母戱諸孫散栗於床羣兒競之恭獨不取問其故對曰不取自當得賜由是中表異之梁書曰沈約常侍宴㑹豫州獻栗徑寸帝竒之問衆栗事多少與約各䟽所知約少帝三事約出謂人曰此公䕶前不譲即羞死帝以其言不遜欲抵其罪徐勉固諫乃止又曰蕭琛嘗預御筵醉伏上以棗投琛琛乃取栗擲上中靣御史中丞在席帝動色曰席中有人不得如此豈有説也琛曰陛下投臣以赤心臣敢報之以戰栗莊子曰宋有狙公者好養猴者恐衆狙之不馴於已也先誑之曰與若芧芧栗也朝三而暮四足乎衆狙皆超然而怒范子計然曰栗出三輔莊子曰莊周遊乎調陵之樊樊蕃睹一異鵲感周之顙而集于栗林感觸也又曰古者禽獸多而人民少於是皆巢居以避之晝拾橡栗暮栖木上故命曰有巢氏之民國語曰夫婦人贄不過棗栗以告䖍也􅀥取蚤起栗取欲栗惕已敬也曲禮婦人之贄脯修棗栗韓子曰秦饑應侯謂王曰五苑之果蔬橡􅀥栗以活民請發之王曰今發五苑以活民是使有功與無功争取也人生而亂不如死治説苑曰田饒曰果園梨栗後宫婦人摭以相擿而士不曾得一嘗且夫財者君之所輕也死者士之所重也吕氏春秋曰伊尹說曰果之美者江浦之橘箕山之栗盧毓冀州論曰中山好栗地産不為無珎盧諶祭法曰春秋冬祠皆用栗㑹稽先賢傳曰光武詔嚴遵詣行所遇蜀都獻橘栗上令公卿以下各以手取及遵獨不取上曰不敢取者誰遵對曰君賜臣以禮臣奉君以忠今賜無所主臣是以不取西京雜記曰上林苑有侯栗榛栗瑰栗嶧陽栗嶧陽太守曹九所獻大如拳三秦記曰漢武帝果園有大栗十五枚為一升水經注曰汝水灣中有地數頃上有栗園栗實殊不並固安之實也然嵗貢三百石以充天府水渚即栗洲也樹髙茂望若屯雲積氣矣林中有栗堂甚閑敞牧宰及英彦多所遊薄山海經曰南山其上多栗葛山其上多桐廣志曰栗有侯栗闗中大栗大如鷄子晉宫閣名曰華林園中栗一株侯栗六株華山記曰東北荒有栗樹髙三十丈栗徑三尺其殻赤肉黃白味甘食之令短氣而渇地理記曰諸暨如拳之栗案由㑹稽部也杜寔大業拾遺録曰洛陽儀鸞殿南有鳥􅀈林栗林有蒲桃架四行行長百餘歩華山記曰西山麓中有栗林藝植以來蕭森茂繁嶺表録異曰廣州無栗唯勒州山中有石栗一年方熟皮厚而肉少味似胡桃仁熟時或為群鸚鵡啄食略盡只此石栗亦甚稀少王彪之賦曰王檀侯栗王逸荔枝賦曰北鸞薦朔濵之巨栗蔡邕傷故栗賦曰人有折蔡氏祠前故栗者故作斯賦王褒僮約曰南安拾栗採橘南安縣名太平御覧卷九百六十四
