body:
  text: 太平御覽卷六百七十五宋李昉等撰道部十七冠幘帗褐褵袍裘衣珮綬板笏帬鈴杖節履舄帷帳席冠真誥曰有一老人著綉裳戴芙蓉冠倚赤九節杖而立芙蓉冠郎禮之爵弁粗欲相似但不知真人以何物作之耳自非已成真不得冠此又曰逺逰冠相栢真人戴此冠女貞已笄者亦戴冠惟曰王母百戴􅁟勝又女真未笄者則三環角結或飛雲編結餘髮垂兩眉至腰目中也龍冠金精巾虎巾青巾虎文巾金巾巾此真冠巾之名不詳其製又曰男真未冠貞並飛天交結道學傳曰王母二玉女侍王母上殿戴火眞晨纓之冠履𤣥瓊鳯文之舄又曰孟景翼字輔明義嘉構難景翼星夜徃赴經行失道時一人黄衣黄冠任其前引路既得道乃失所在海空經白眞仙道士並戴𤣥冠披翠帔太真科曰解褐披絳綃之衣釋巾著逺遊之冠又曰人皇著七寳珠冠上清經曰元始皇上丈人戴曜之冠佩九色自然之綬紫又曰髙靈九天建金華七曜之冠又曰玉真九天丈人建飛精百變之冠佩九元道眞之䇿又曰上三天玉童建三華寳曜洞天玉冠四明科曰凡修上清道經大洞真經入宣之日當身冠法服又曰凡女子學上清之法受寳玉訣修行大洞昔元君夫人之位入宣之日當冠元君之服萬貞束𢃄玉童玉女各二十八人其掌法無此服不得昇於上清洞神經曰受道之人皆𤣥冠草履傳授經曰老子去周左慈在魏葛巾單裾不著褐又曰陸先生云對上下接謂之俯仰之格披褐二服也又曰冠戴二儀衣披四象故謂之法服道學傳曰西母結大華之䯻戴太眞晨纓之冠履𤣥瓊鳯文之舄上清變化經云紫映玉霄貞玉建七天冠𢃄交金之鈎又曰上皇王靈君建七曜華冠佩丹文紫綬又曰皇上帝君建七色朱精華冠又曰太素髙虛上極紫皇建七寳冠𢃄神精交蛇之綬又曰虛明紫蘭中元崞君建三華之冠𢃄流金紫章又曰太紫真君建紫晨巾乗青龍紫羽蓋玉珮金鐺經曰元始天王披九色離羅之帔𢃄寳冠又曰太帝建七氣朱冠又曰太岳君建七寳九光夜冠又曰華山君建六元通神飛冠佩交靈之綬又曰嵩髙君建中元黄晨玉冠佩黄神中皇之中又曰王佩帝君建紫冠真誥曰上元夫人服赤霜袍披青毛錦裘頭作三角䯻散髮至於腰戴元晨夜月之冠𢃄六山大王之佩腰鳯文琳華大綬執流黄揮精之歛上清元化經曰太元真人巾芙蓉冠上清元籙曰九天元父戴寳天之冠太上五帝内真經曰青帝君建九元通天冠又曰赤帝君建三氣𤣥梁寳冠又曰白帝君建七氣明光寳冠又曰黒帝君建五氣𤣥晨之冠又曰黄帝君黄晨通天冠佩黄晨越元之策帶靈飛紫綬太上飛行羽經曰九晨君建飛精玉帶衣九色之鳯帔又曰元晨君建飛天玉冠衣九龍天衣又曰華蓋晨君建𤣥晨寶冠衣丹錦飛裳又曰上晨君建𤣥精玉冠衣𤣥羽飛裳又曰華晨君建員冠寶冠衣青羽飛裳太上飛行寶經曰靈飛妃元皇夫人建晨纓寶冠昇𤣥經曰仙入定子明著黄褐𤣥巾太洞玉訣曰皇初紫元天中真人採朱錦之服巾緑霞之冠山西經曰玉女建白冠洞神經曰天皇君戴九色冠地皇君戴二晨玉冠執元皇定籙策人皇君戴七色冠報上皇保命玉策又曰上清瓊宫南極玉真赤帝建進賢之冠又曰北極玉真黒帝君建𤣥寶之冠之冠西極玉真曰帝君達通天寶冠中極玉真黄帝君達通元五氣之冠玉清貞訣曰東方九靈真人戴九氣冠南極真人帶進賢冠衣絳章之衣西方素靈真人戴三寶𤣥冠北方𤣥靈真人戴𤣥冠中央總元曰靈真人戴黄晨玉冠玉光八景經曰東元景道君冠七色耀天玉冠躡九色之履金根經曰九天元父戴七星色朱玉之幘無極進賢之冠又曰九天𤣥母著青寶神光錦繡霜羅九色之綬戴子元黄寶冠大有經曰玉清之母戴七神朱玉之䯻巾無極進賢之冠著黄素靈之綬在太極朱宫又曰九天真女戴𤣥黄七稱進賢之冠又曰上清真女戴玉冠著五色之綬居大幽宫又曰太極帝妃冠無極進賢之冠衣五色鳯文之綬在太清極𤣥宫中又曰太上君戴三寶王冠著九色之綬在無極真宫中又曰啟明天君冠青精進晨玉冠太一洞真𤣥曰三素老服錦衣建龍虎冠又曰太一公子曰元司命桃君五人皆著朱衣絳巾典主符籍太㣲紫房宫中登真隠訣曰太𤣥上丹靈玉女戴紫巾又戴紫華芙蓉巾及金精巾飛巾虎文巾金巾龜山元籙曰元始皇上丈人冠九氣紫曜之冠衣九光錦袍佩九色無縫自然之綬𢃄六山大王在上清之上又𢃄九天鍊之劒衣九色斑文袍常乗十二飛麟帶金虎鳯文之綬金真玉光經曰元景道君曳黄𤣥之綬建七色毛冠又曰元景道君衣所錦之綬戴進賢玉冠乗𤣥景緑輿叅駕鳯皇又上太陽上府紫㣲宫中道君曵絳錦毋綬戴玉冠躡九色之履執制魔之章又元景太一君曵𤣥黄素綬戴七寳冠執命神之䇿束玉簞五綵蓋紫雲車叅駕大龍又曰桐栢山真人王子喬年其儀整頓非常建芙蓉冠著朱衣以白朱衣縫𢃄劒多論金庭山中事言於衆眞太上素靈經曰大山神仙戴飛晨寳冠又𢃄青精晨王冠遊雲寳冠玊精寳冠通天寳冠三𤣥冠上清仙公連共並建扶華沓霞大冠道君冠九德之冠太極左仙公起居注曰太上三天錫仙公芙蓉晨冠靈飛六甲經曰上清瓊宫東極玉真建九氣通精之冠玉京眞人戴通陽玉晨冠少陽真人戴通曜之冠太素三元君建寳琅扶晨冠羽紫元君建太眞晨纓之冠三角䯻餘散之於腰太極金書曰元始建洞天冠之上君建青精天玉之冠大直文人建三寳玊冠三天童建三華寳曜洞天玉冠天洞玉經曰紫元真人披朱錦之服巾録霞之冠五岳真形圖曰東岳太山戴倉碧七稱之冠南岳衡山戴九丹日精之冠中岳嵩山冠黄玉太𤣥之冠西岳華山建大初九流之冠北岳􅁪山建大真虛隂之冠青城丈人戴蓋天之冠昇𤣥經曰昔有仙人竇子明建黄褐𤣥巾幘紫書金根經曰九天元父戴七稱玉珠之幘敷齊經曰正一切曹冠朱陽之幘帔太極金書曰元始天帝被九色羅帔母絳之裙及珠綉霞帔太極左仙公起居注曰太上三天錫仙公丹錦繡帔靈書紫文經曰青童太君衣飛青翠羽龍帔雌一五老經曰太素三元君服紫氣浮雲錦陵天紫繡毛帔又鳯文錦帔無上真人内傳曰九色錦綉華文之帔太元名人茅君内傳曰繡羽紫帔九真中經云青玊錦帔絳玉素玉𤣥玉黄玉錦帔又雲青華丹蘂玊白琳四出龍帔𤣥玊九道雲錦帔黄雲山文錦帔褐仙翁請問經曰太極真人曰夫學道㓗净衣服備巾褐制法名曰道之法服靈寳真一自然經訣曰至其已得道人披九光七色法服靈飛六甲經曰南極六真著排羅法服上清紫宸經曰修七轉之道者上皇君以法服飛仙羽章授之仍戴以紫元飛霜七色之冠䄜上清經曰髙上玉皇衣玉文明光飛雲之䄜龜山元籙曰九天𤣥母衣霜羅九色之䄜又青羅之䄜五岳真形圖曰紫素元者服緋䄜三元布經曰紫素元君衣紫錦裌䄜白素元君衣白錦光明之䄜龜山元籙曰九色飛雲錦䄜九色自然之䄜玉文明光飛錦之䄜九色珠絳雲光錦䄜丹錦七色文光之䄜袍太極金書曰元始披霜珠之袍上清經曰三天玉童衣青黄錦袍龜山元籙曰有明光飛錦珠袍五色雲羅之袍七色鳯雲之袍九色班文羽袍茅君内傳曰有赤霜之袍五岳真形圖曰東岳君服朱光袍裘大洞玉曰司禁真伯乗日月之軿披虎文之裘八素經曰白素元君衣黄緑曜光雲表之裘五帝内真經曰有𤣥文明光之裘九色班裘龜山元籙曰有雲文丹錦之裘衣三道順行經曰玉景真人衣𤣥雲錦衣老子立藏中經曰東父者青陽之氣萬神之光衣五采衣龜山元經曰有明光錦九珠飛文法衣三法飛文錦衣五色斑文衣九色龍衣又有青黄色紫三羽衣又有九色鳯衣亦有九天鳯衣珮大戒經曰太極真人曰凡謹事法服則者冠冕玉珮三元布經曰六山大玉之珮綬八素經曰大素元君衣流光雲文綬始素元君衣紫光雲文素綬𤣥素元君衣飛雲九變綬紫素元君衣黄𤣥九色素羅之綬黄素元君衣飛素錦之綬三元布經云紫素元君交𢃄靈飛大綬白素元君佩文琳華之綬太上飛行羽經曰九鈴之綬飛靈紫綬六山飛晨之綬九光之綬金眞玉光經云紫青之綬丹錦之綬絳丹綬𤣥黄素綬白文素靈之綬𤣥虛五色之綬元始經曰九天𤣥母𢃄流蘇紫綬又曰九天光延紫綬靈飛紫綬交靈素綬九色自然之綬金虎鳯文之綬又曰太上九氣命令之帝𢃄羽交靈之綬板昇𤣥經曰太上十方奉經真官五帝真事符童傳言謁者皆冠𢃄垂纓齊執玉板羅列鹵簿對我前後左右笏昇𤣥經曰太上勑靈陽監受教稽首而起執笏户東面西而立帬太上飛行羽經曰上君衣鳯交班文虎帬太上素靈經曰太上神仙衣青錦單帬青綬帬靈錦絳章丹帬絳衣飛帬黄雲錦帬三元布經曰太素三元君服九色龍錦羽帬紫元帬衣飛霜羅帬太極左仙公起居注曰太上三天錫仙公緋羅帬龜山元籙曰有丹錦飛帬九色龍錦羽帬太上飛行羽經曰七色夜光雲錦帬九真中經曰蒼華飛羽帬丹華飛羽帬白羽飛華帬亦有黒羽黄羽飛華帬又曰翠龍華文飛羽帬朱華鳯帬素羽冩章帬黒羽龍文帬緑羽鳯華綉帬鈴移度曰南方真君垂靈霜鳯華龍鈴𢃄虎書建𤣥晨之冠𢃄青錦衣乗丹霞絳輿龜山元籙曰有玉鈴又有晨光明月之鈴列仙傳曰北原中𤣥道君李慶賔女為靈昭夫人著紫錦衣𢃄神虎符屋流金鈴有兩侍女侍女年可二十許夫人年可二十四聞呼一侍女名隠暉侍女皆青綾衣捧赤玊箱三柭青𢃄絡之題名白石檢曰太上章一檢曰太上文夫人席青玉色綬如世人𢃄章囊将狀隠華當長五丈許大三四尺又曰太極有四真人中黄君處其左佩神虎之符𢃄流金之鈴執紫毛之節頂金精之巾又曰仙道有紫繡毛帔丹青飛帬翠華衣金鈴青𢃄曲晨衣盖御之自衣杖龜山元籙曰冬三月三天玉童化為老人把九節金杖洞耀玊清之中聖紀經曰有老人握青竹杖與老子談天地之數赤書玉訣上經玊訣曰當取靈山向陽竹令長有七節作神杖使長上下通直甘竹乃佳印以元始之章動息坐起恒以自隨有五帝真符吏輔翼上真茅君傳曰朱官使者把緑節杖瓊干羽旄又曰大素真人把八景飛杖九色之節出入上清三天玊童頭連三角黄巾手把九節金杖節列仙傳曰太元真人杖紫毛節紫㣲王夫人與一神女俱降神女著雲錦䄜上丹下青文采相照腰有緑繡𢃄𢃄係十餘小鈴鈴青色黄色更相叅厠左𢃄玉珮珮如人間之珮但㡬小耳衣服倐倐有光照映色室内如日中視雲母也雲髮鬒鬂整頓絶倫髮在頂中垂餘髮至腰指金丸白珠約臂視之年可堪十三四左右兩侍女其一侍女著朱衣𢃄青章囊手中又持一錦囊囊長尺餘以盛書十餘卷以白玊檢上刻字云清神虎内真紫元丹章其一侍女著青衣捧一白箱以絳𢃄絡之箱以象牙箱形二侍女年可堪十七八整飾非常又曰裴真人從者持青毛之節一童𢃄繡嚢周君從者持黄毛之節無囊二君各有六童又曰東卿大臣見絳侍從七人一人執紫毛節一人執華幡一名十絶靈幡一人𢃄緑章囊三人捧牙箱一人握流金鈴侍者並朱衣東卿形甚少於二弟二弟著青錦繡帬紫毛帔巾芙蓉冠二弟並同來倚立東卿命坐言語良乆時乙丑歳晉興寧三年七月四日降於楊君之家也又曰先道有三十七種色之節以給仙人履九真中經曰凡學道者勿令人犯履履行道尤多集忌金眞玉光經曰有五色九色獅子之履玉光八景經曰東北始陽宫牛元景足躡五色履舄龜山元籙曰領仙王奉元始命使資晨纓玉冠鳯雲之舄給上真母仙又有神雲鳯舄列仙傳曰安期先生賣藥東海邊時人皆言千歳翁秦始皇東逰請見與語三日賜金璧數千萬出於阜鄉亭皆置去留書以赤玉舄一量為報曰後數年求我􅅫萊山下始皇即遣使者入海未至􅅫萊山輙逄風波而還三真元曰九天元父父曵神雲鳯舄帶素雲之綬帷帳神州經曰九河帝君坐玉床五色帷帳内名光明玊珮千垂席玉佩金璫經曰仙人鄭闕者坐玉華之席太平御覽卷六百七十五
