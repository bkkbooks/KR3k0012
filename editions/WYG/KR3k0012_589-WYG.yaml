  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_589-1a, image: WYG0898/WYG0898-0371a.png}
body:
  text: 太平御覽卷五百八十九宋李昉等撰文部五碑釋名曰碑被也此本葬時所設也施其鹿盧以繩被其上引以下棺追述君父之功美以書其上後人因為焉故建於道陌之頭名其文謂之碑也文心雕龍曰碑者埤也上古帝王紀號封禪樹石埤岳故曰碑也周穆紀迹于弇山之石亦古碑之意也又宗廟有碑樹之兩楹事止麗牲未勒勲績而庸器漸闕故後代用碑以石代金同乎不朽自廟徂墳猶封墓也自後漢以來碑碣雲起才鋒所斷者莫高蔡邕楊賜之碑骨鯁訓典陳郭二文句無擇言周乎衆碑莫非精允其叙事也核而要其綴采也雅而澤清辭轉而不窮巧義出而卓立察其為才自然至矣孔融所創有慕伯喈張陳兩文辨給足采亦其亞也及孫綽為文志在於碑温王郗庾詞多支離桓彛一篇最為辯才矣此碑之所致也屬碑之體資乎史才其序則傳其文則銘標序盛德必見清風之華昭紀鴻懿必見俊偉之烈此碑之制也夫碑實銘器銘實碑文因器立名事光於誄是以勒器讃勲者入銘之域樹碑述己者同誄之區焉禮記喪大記曰君葬用輴四紼二碑御棺用羽葆大夫葬用輴二紼二碑御棺用茅士葬用國車二紼無碑凢封用紼去碑負引又祭義曰祭之日君牽牲既入廟門麗于碑麗猶繫也東觀漢記曰竇章女順帝初入掖庭為貴人早卒帝追思之詔史官樹碑頌德帝自為之辭范􅁮後漢書曰郭林宗卒同志者乃共刻石立碑蔡邕為其文既而謂盧植曰吾為碑多矣皆有慚德惟郭有道碑無愧色耳又蔡邕傳曰邕以經籍去聖已乆文字多謬俗儒穿鑿疑誤後學乃與五官中郎將堂谿典光禄大夫楊賜諫議大夫馬日磾議郎張馴韓説太史令單颺等奏求正定六經文字靈帝許之邕乃自書册於碑使工鐫刻立於太學門外於是後儒晚學咸取正焉及碑始立其觀視及摹冩者車乗日千餘兩填塞街陌魏志曰王粲與人共行讀道邊碑人問曰卿能闇誦乎曰能因使背而誦之不失一字又曰鄧艾字士載年十二随母至潁川讀陳實碑文言文為世範行為士則艾遂更名範字士則後宗族有與同者故改焉晉書隠逸傳戴逵字安道譙國人也少博學好談論善屬文能鼓琴工書畫其餘巧藝靡不畢綜總角時以雞卵汁溲白瓦屑作鄭𤣥碑又為文而自鐫之詞麗器妙時人莫不驚歎又曰郭璞為庾氷筮曰墓碑生金庾氏大忌後氷子為廣州刺史碑生金為桓温所滅又曰杜預好為後世名常言髙岸為谷深谷為陵刻石為二碑記其勲績一沉萬山之下一立峴山之上曰焉知此後不為陵谷乎又曰孫綽少以文才稱於時文士綽為其冠温王郗庾諸公之薨必須綽為碑文然後刋石焉又曰扶風武王駿嘗都督雍梁病薨追贈大司馬加侍中假黄鉞西土聞其薨也泣者盈路百姓為之樹碑長老見碑無不下拜其遺愛如此又曰唐彬為幽州百姓追慕彬功德生為之立碑作頌彬初受學於東海閻德門徒甚多獨目彬有廊廟才及彬官成而德已卒乃為立碑王隠晉書曰石瑞記曰永嘉初陳國項縣賈逵石碑中生金人盜取盡復生此江東之瑞齊書曰竟陵王薨范雲是故吏上表請為立碑文云人蓄油素家懷鈆筆瞻彼景山徒然望慕油素絹也筆所以理書也三國典畧曰宗懔少聰明好讀書語輒引古事鄉人呼為小兒學士梁主使製龍川廟碑一夜便就詰朝呈上梁主美之又曰陸雲呉郡呉人曽製太伯廟碑呉興太守張纉罷郡經途讀其文嘆美之曰今之蔡伯喈也至都言於髙祖髙祖召兼尚書議郎頃之即真後魏書曰衞操桓帝以為輔相任以國事劉石之亂勸桓帝匡助晉氏東瀛公司馬騰聞而善之表加右軍封定㐮侯桓帝崩後立碑於大䢴城南以頌功德云魏軒轅之苗裔桓穆二帝馳名域外九譯宗焉有德無禄大命不延背棄華殿雲中名都逺近齊軌奔赴梓廬時晉光熈元年秋也皇興初雍州别駕鴈門段榮於大䢴掘得此碑又曰爾朱榮字天寶美容貌幼而明決長好射獵葛榮之叛也榮列圍為大獵有雙兎起於馬前榮乃彎弓而誓曰中之則擒葛榮應弦而殪三軍咸悦破賊之後即命立碑於其所號曰雙兎碑唐書曰賈敦實寃句人也貞觀中為饒陽令時制除大功已止不得聯職敦實兄敦頥先為洛州刺史甚有惠政百姓共樹碑於大市通衢及敦實去職復刻石頌其政德立於兄之碑側故時人呼為常棣之碑焉又曰貞觀中議封禪又議立碑勒石紀號垂裕後昆美盛德之形容闡後王之休烈其義逺矣又曰髙祖御製慈恩寺碑文及自書鐫刻既畢甲戌上御安福門樓觀僧𤣥裝等迎碑向寺皆造幢蓋飾諸寺以金寶窮極瓌麗太常及京城音樂車數百輛僧尼執幡兩行導從士女觀者填塞街衢自魏晉已來崇事釋教未有如此之盛者也又曰文苑傳曰李邕尤長碑頌雖貶職在外中朝衣冠及天下寺觀多齎持金帛往求其文前後所製凡數百首受納饋遺亦至鉅萬時議以為自古鬻文獲財未有如邕者有文集七十卷其韓公行狀洪州放生池碑批韋巨源諡議文士推重之後恩例贈秘書監又曰長平中源寂使新羅國見其國人傳寫諷念馮定所為黑水碑畫鶴記韋休符之使西蕃也見其國人定商山記以代屏障其文名馳於戎夷如此又曰裴度平淮西詔韓愈撰平淮西碑其辭多序裴度時先入蔡州擒呉元濟李愬功第一愬不平之愬妻出入禁中因訴碑辭不實詔令磨愈文憲宗命翰林學士段文昌重撰文勒石又曰蕭俛在相位時穆宗詔撰故成德軍節度使王士真神道碑對曰臣器褊狹王承宗先朝阻命事無可觀如臣秉筆不能溢美又撰進之後例行餽遺臣若公然阻絶則違陛下撫納之宜僶勉受之則非微臣平生之志臣不願為之秉筆帝嘉而從之又曰李綘憲宗時中官吐突承璀自藩邸承恩寵既為神䇿軍護軍中尉嘗欲於安國佛寺建立聖德碑大興工作絳即上言陛下布維新之政剗積習之弊四海延頸日望德音今忽立聖德碑以示天下不廣大易稱大人者與天地合德與日月合明垂拱勵精求理執契豈可以文字而盡聖德又安可以碑表而贊皇猷若可叙述是有分限乃反虧損盛德豈謂敷揚至道哉故自堯舜禹湯文武並無建碑之事至秦始皇荒逸之君煩酷之政乃有梁嶧山之碑揚誅伐之功紀巡幸之跡適足為百世所笑萬代所譏至今稱為失道亡國之主豈可擬議於此陛下嗣髙祖太宗之業舉貞觀開元之政思理不遑食從諫如順流固可與堯舜禹湯文武方駕而行安追秦皇暴虐不經之事而自損聖德近者閻巨源請立記聖德碑陛下詳盡事宜皆不允許今忽令立此與前事頗乖況此碑既在安國寺即不得叙載遊觀崇飾之事述遊觀且乖治理叙崇飾又非政經固非哲王所宜行也上納之後唐史記曰魏帥楊師厚於黎陽山採巨石將紀德政制度甚大以銕為車方任負載驅牛四百不由道路所經之處或壞人廬舍或發人丘墓百姓瞻望曰碑來石才至而卒魏人以為應悲來之兆禰衡别傳曰黄祖之子射作章陵太守與衡有所之見蔡伯喈所作石碑正平一過視而歎其好後日各歸章陵自恨不令吏寫之正平曰吾雖一過皆識然其中央第四行中石書磨滅兩字不分明當是某字恐不諦耳因援筆書之初無所遺唯兩字不著耳章陵雖知其才明敏猶嫌有所脱失故遣往寫之還以校正平所書尺寸皆得初無脱誤所疑兩字如正平所遺字也於是章陵敬服世説曰魏武嘗過曹娥碑下楊修讀碑背上題黄絹幼婦外孫韲臼魏武謂修曰卿解不答云解魏武曰卿未可言也待我思之行三十里乃曰吾已得之問修所解修曰黄絹色絲也於字為絶幼婦少女也於字為妙外孫女子也於字為好齏臼受辛也於字為辭所謂絶妙好辭魏武亦與修同乃歎曰我才不如卿乃較三十里王肅奉詔為瑞表曰太和六年上將幸許昌過繁昌詔問受禪碑生黄金白玉應瑞否肅奏以始改之元年嘉瑞見于踐祚之壇宜矣晉令曰諸葬者皆不得立祠堂石碑石表石獸語林曰孫興公作永嘉郡郡人甚輕之桓公後遣傳教令作敬夫人碑郡人云定有才不爾桓公那得令作碑於此重之荆州圖記曰羊叔子與鄒潤甫嘗登峴山泣曰有宇宙便有此山由來賢逹登此望如我與卿者多矣皆湮滅無聞念此使人悲傷潤甫曰公德冠四海道嗣前哲令聞令望當與此山俱傳若潤甫輩乃當如公語耳後參佐為立碑故望處百姓每行望碑莫不悲感杜預名為墮淚碑盛𢎞之荆州記曰冠軍縣有張唐墓七世孝廉刻其碑背曰白楸之棺易朽之衣銅鐵不入瓦器不藏嗟夫後人幸勿見傷及胡石之亂舊墓皆夷毁而此墓儼然至元嘉六年民饑始發説者云初開金銀銅錫之器朱裝雕刻之飾爛然畢備齊道記曰瑯琊城始皇東遊至此立碑銘紀秦功德云是李斯刻西征記曰國子堂前有列碑南北行三十五枚刻之表裏春秋經尚書二部大篆隸科斗三種字碑長八尺今有十八枚存餘皆崩太學堂前石碑四十枚亦表裏𨽻書尚書周易公羊傳禮記四部本石塶相連多崩敗又太學讃碑一所漢建武中立時草創未備永建六年詔下三府繕治有魏文典論立碑今四存二敗述征記曰下相城西北漢太尉陳球墓有三碑近墓一碑記弟子盧植鄭𤣥管寧華歆等六十人其一碑陳登碑文正蔡邕所作酈善長水經注曰昔大禹導河積石䟽决梁山所謂龍門矣孟津河口廣十八步巖際鐫勒遺功尚存㟁上並有廟祠祠前有石碑三所碑字磨滅不可識也一碑是太和中立述征記曰崆峒山有堯碑禹碣皆籀文焉伏滔述帝功德銘曰堯碑禹碣厯古不昧也虞喜志林曰贑榆有始皇碑潮水至則加其上三丈去則見三尺行有十三字異苑曰呉郡岑淵碑在江東湖西太元中村人見龜載從田中出還其元處藻萍猶着腹下金樓子曰銘頌所稱興公而已夫披文相質博約温潤吾聞斯語未見其人班固碩學尚云贊頌相似陸機鈎深猶傳碑賦如一國朝傳記曰魏文貞之薨也太宗親製碑文并為書石後為人所間詔令踣之及征高麗不如意深悔是行乃歎曰若魏徴在不使我有此舉也既渡遼水令馳驛祀以少牢復立碑焉又曰率更令歐陽詢行見古碑索靖所書駐馬觀之良久而去數百步復還下馬停立疲則布毯坐觀因宿其傍三日而去李綽尚書故實曰東晉謝太傅墓碑樹貞石初無文字蓋重難製述之意國史補曰韋貫之為尚書右丞長安中求為碑誌若市賈然大官卒造其門如市至有喧競搆致不由喪家是時裴均之子圖不朽投貫之縑帛萬疋貫之舉手曰寧餓不茍取太平御覽卷五百八十九
