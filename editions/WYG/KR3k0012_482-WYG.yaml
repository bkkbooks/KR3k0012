body:
  text: 太平御覽卷四百八十二宋李昉等撰人事部一百二十三仇讐下太公六韜云武王伐殷乘舟濟河兵車出壊船於河中太公曰太子為父報仇今死無生所過津梁皆悉燒之列子曰魏黒卯以暱嫌殺丘邴章其子來丹謀復讎丹氣甚猛形甚露計粒而食之順風而趨雖怨不能稱兵耻假力於人誓手劒以屠黒卯黒卯悍志絶衆力抗百夫筯骨皮肉非人類也延頸承刃披胷受矢鋩鍔摧屈而體無㾗負財力視來丹猶鶵􅑹也來丹之友申抱曰子怨黒卯至矣黒卯之易子過矣將奚謀焉丹垂涕曰願為我謀申抱曰吾聞衛孔周其祖得殷帝之寳劒童子服之却三軍之衆奚不請焉下已具劒部淮南子曰魯人有為其父報讎於齊者刳其腹而見其心坐而拭冠起而更衣徐出門上車而歩顔色不變其御欲驅撫而止之曰為父報讎以出死非為生也今事已成矣有何去之追者曰此有節行之士不可殺也解圍而去之琴操曰樗里牧恭為父報怨而亡林岳之下有馬夜降圍其室而鳴於是覺而聞走馬聲以為吏追之乃奔而亡明視天馬迹也乃曰吾以義殺人而天馬來降以驚動吾處不安以告吾耶乃感懼入沂澤之中作走馬引後果讎家候之不得也又曰聶政父為韓王治劒過期不成王殺之時政未生及壯問母知之乃入山遇仙人學皷琴漆身吞炭七年琴成入韓逢妻從買櫛對而笑妻泣曰君似政齒政曰天下人齒盡相似耳乃入山援石擊落其齒以刀内琴中刺韓王國語曰吳敗越於㑹稽勾踐說國人曰寡人不知其力之不足也與大國執仇以暴露百姓之骨於中原此則寡人之罪也親為夫差前馬而歸乃致其衆而誓之寡人聞古之賢君不患其衆之不足也而患其志行之少耻今夫差衣水犀之甲者億有三千人不患其志行之少耻而患其衆之不足也韓詩外傳曰魏文侯問觧狐曰寡人將定西河之守誰可用對曰荆伯栁賢人殆可文侯曰是非子之讎也對曰君問可非問讎也於是將以伯栁為西河守伯栁見觧狐而謝之觧狐曰言子者公也怨子者私也虞薄江表傳曰孫䇿殺許貢貢客為貢報讎射䇿中頰陸𦙍廣州先賢傳曰尹牙字猛徳太守南陽滿寵下車牙以徳進幹任喉舌寵雖當國厚禄而懐愧戚見於顔色牙常用恠焉曰伏見明府四節悲歎有􅆭瘁之思何也寵謂牙曰父為豪周張所害重仇未報並與戴天非孝子雖官尊禄重而耻未報是以長愧而無止也於是馬牙與校圉交通遂充騶馬之職乃先醉張近侍以夜觧縱諸馬令之亂駭知張必將驚起伏側階下張果出問其故牙因手刃張首而還孝子傳曰魏湯少失其母獨與父居色養蒸蒸盡於孝道父有所服刀㦸市南少年欲得之湯曰此老父所愛不敢相許於是少年毆擿湯父湯叩頭拜謝之不止行路書生牽止之僅而得免後父夀終湯乃殺少年㫁其頭以謝父墓焉師覺授孝子傳曰仲子崔者仲由之子也初子路仕衛赴蒯瞶之亂衛人狐黶時守門殺子路子崔既長告孔子欲報父讎夫子曰行矣子崔即行黶知之於城西决戰其日黶持蒲弓木㦸而與子崔戰而死皇甫謐列女後傳曰衛義姬者其夫有先人之讎讎家來報婿避之仇家得義姬問婿所在乃積薪燎之遂不言而燒死又曰郃陽友娣者郃陽邑任延夀之妻也字季兒有三子季兒兄弟季宗與延夀争葬父之事延夀與其友隂殺季宗季兒曰殺夫不義事兄之讎亦不義何面目以生而戴天履地乎遂以繩自縊死馮翊王讓聞之大其義令縣復其三子而表其墓也又曰京師節女者長安大昌里人之妻也其夫有仇仇家欲報夫而無道聞其妻孝義乃刼其妻父使要其女為中閒父呼其女而告之計念不聴則殺父不孝聴之則殺夫不義不孝不義雖生不可以行於代欲以身當之且曰諾夜在樓上新沐頭東首卧則是矣妾請開户而待夜半仇家果至斷頭持去明視之乃其妻之頭也仇家病其為義遂釋不殺其父越絶書曰伍子胥入呉居三年闔廬將為之報讎子胥曰不可臣聞諸侯不為匹夫興師於是止其後荆將伐蔡子胥言之闔廬使子胥救蔡而伐荆十五戰十五勝荆平王已死子胥捶笞平王之墓而數之曰昔者吾先人無罪而子殺之今以此報子也趙曄吳越春秋曰越王念吳欲復怨非一旦也冬寒則抱氷夏熱則握火愁心苦思懸膽於户出入嘗之不絶於口乃中夜抱柱而哭訖復承之以嘯於是羣臣聞之咸曰夫復讎謀敵非君王之憂自臣下之急務也二十一年興師㓕吳擅道鸞續晉陽春秋曰王談年十許歲父為隣人竇度所殺談隂有復讎之志年十八密買市利鍤刃陽若耕耘者度常乘船出入經一橋下談伺度行還於橋上以鍤斬之應手而死既而歸罪有司太守孔巖義其孝勇列上宥之捜神記曰丁蘭河内野王人年十五喪母乃刻木作母事之供養如生隣人有所借木母顔和則與不和不與後隣人忿蘭盗斫木母應刀血出蘭乃殯殮報讎漢宣帝嘉之拜中大夫幽明録曰項縣民姚牛年十餘父為鄉人所殺牛常賣衣物市刀㦸圖欲報讎後在縣署前手刃之於衆中吏捕得官長深矜孝節為推遷其事㑹赦得免後令出獵逐鹿入草草枯有深穽數䖏馬將趨之忽見一公舉杖擊馬馬驚避不得及鹿令怒引弓將射之曰此中有穽恐君墮耳令曰汝為何人公為跪曰民姚牛父也感君活牛故來謝恩因㓕不見令身感𠖇事在官數年多惠於民㑹稽典録曰魏朗字少英上虞人少為縣吏兄為鄉人所殺朗白日操刀報讎於縣中遂亡命到陳國從博士郄仲信學春秋圖緯又詣太學受五經京師長者李膺之徒争從之解系傳曰張華裴碩之被誅也趙王倫孫秀以宿讎収系兄弟將殺之梁王肜救之倫等怒曰我見水中蟹尚欲殺之况此人兄弟輕我也遂并戮其妻子崔鴻前燕録曰吐谷渾子吐延年少有大志身長七尺八寸雄姿魁桀羗虜憚之號曰項羽性俶儻不羣慷慨謂羣下曰丈夫生不在中國當髙皇光武之代與韓彭吳鄧並驅中原定天下决雌雄使名垂竹帛而潛竄窮山隔閉殊俗不聞禮教於上京不得䇿名於天府生與麋鹿同羣死作氊裘之鬼雖偷觀日月獨不愧於心乎負其智勇猜忍不恤下為帛城羗酋姜聦所刺長子葉延年十歲常縛草人號曰姜聦哭而射之號天而泣不中瞋目大呼要中乃止其母謂之曰姜聦諸將已屠膾之矣汝何如此業泣曰誠知射草人旡益於先讐所以申罔極之心耳陳留志曰韓卓父嘗為人所辱卓執兵伏道欲候殺之而長子暴病將死卓乃歎曰道家有言報讎不欲過今長子病豈為是乎於是乃投刃援杖復耻而止常􅟛華陽國志曰陳綱字仲鄉少與同羣張宗受學南陽以母喪歸宗為安衆至元所殺網終喪往復之自拘有司㑹赦免應劭風俗通曰汝南陳公思為五官掾五子祐為兵曹行㑹食下亭子祐曽以縣官事考殺公思叔父斌斌無子公思欲為報仇不能得卒見子祐不勝憤怒便格殺之還府歸死時太守太傅胡廣以為陳公思追念叔父仁勇憤發手刃仇敵自歸司敗便原遣之梁祚魏國統曰崔州平者漢太尉烈之孫也兄曰元平為議郎以忠直稱董卓之亂烈為卓所害元平常思有報復之心㑹病卒魏文帝雜詔曰喪亂以來兵革從横天下之人多相殺害昔賈復冦恂私相怨憾至懐手劒之忿光武召而相之卒共同輿而載崔鴻後燕録曰秦㓕燕慕容桓阻兵遼東為秦所殺子鳯泣血不言年十一告其母曰昔張良養士以擊秦王復君之仇也先王之事豈可一日忘之虞預㑹稽典録曰朱朗字恭明父為道士滛祀不法遊在諸縣為烏傷長陳頵所殺朗隂圗報怨而未有便㑹頵以病亡朗乃刺殺頵子事發亡命奔魏魏聞其孝勇擢以為將又曰董黯字孝治家貧採薪供養母甚肥恱鄰人家富有子不孝母甚痩不孝子疾黯母肥嘗苦之黯不報及母終負土成墳竟殺不孝子置冢前以祭詣獄自繫㑹赦免廣徳神異録曰賈氏女不知何許人年十五父為宗人所害其弟強仁年幼賈氏撫育之及強仁長乃共殺讎者自列其罪髙祖嘉之又曰王君操父大業中為鄉人李君則毆死貞觀初君則以運代遷革不懼憲􅃠又以君操孤微謂無復讎之志遂仕州府君操密袖白刄刺殺之其心肝咀食立盡詣州自陳刺史以其擅殺問之曰殺人當死律有明文何方自理以求生路君操對曰亡父被殺二十餘載聞諸典禮父讎不可同天早願圖之久而未遂常懼㓕亡不展寃情今大耻既雪甘刑憲太宗特原之又曰張琇蒲州解縣人父審素為雋州郡督在邊累載有糾其軍中贓罪勅監察御史楊汪馳傳就軍按之汪在路為審素黨與所刼對汪殺告事者脅汪令白審素無罪俄而州人翻殺審素之黨汪始得還至益州奏稱審素謀反因深按審素構成其罪斬之籍没其家琇與兄瑝以年㓜坐徙嶺外尋各迯歸累年隠匿汪後累遷殿中侍御史改名萬頃是年瑝琇候萬頃於東都城挺刀殺之瑝雖年長其發意及手刃皆琇為之既殺萬頃繫表於斧刃自言報讎之狀便迯奔就江外殺萬頃同謀搆父罪者行至汜水為捕者所獲時都城士女皆矜琇等㓜稚義烈能復父讎多言其合矜恕者中書令張九齡又欲活之裴耀卿李林甫固言國犯不可縱讎上以為然因謂九齡等曰復讎雖禮法所許殺人亦格律具存孝子之情義不顧命國家設法焉得容私殺之成復讎之志赦之虧律格之條然道路諠議故須告示乃下勅曰張琇等兄弟同殺推問擬承律有正條須合至死近聞士庶頗有諠詞矜其為父報讎或言本罪寃濫但國家設法事存經久蓋以濟人期於止殺各申為子之志誰非徇孝之夫展轉相讎殺傷何限咎陶作士法在必行曾參殺人亦不可恕不能加以刑戮肆諸市朝宜付河南府决殺瑝琇既死士庶咸傷憫之為作哀誄牓於衢路中市人歛錢於死所造義井并葬瑝琇於北邙又恐萬傾家人發之并作疑冢數所其為時人所傷如此唐新語曰杜并父審言善五言尤攻書翰恃才蹇傲深為時輩所嫉自洛陽丞貶吉州司户又與羣寮不叶司馬周季重與司户郭若訥共搆之審言繫獄將因事殺之并年十三伺季重等酣讌密刃刺季重而死并亦見害季重臨死歎曰吾不料審言有此孝子郭若訥誤我至此審言由是免官歸東都自為祭文以祭并士友咸哀并孝烈蘇頲為墓誌劉光濟為祭文則天召見審言甚嘉歎之又曰衢州人余長安父與叔共二人為同郡伊金所殺長安八歲自誓十七乃復仇大理斷死刺史元錫奏言臣見余氏一家遭横死者實二平人䝉顯戮者乃一孝子引公羊傳父不受誅子復讎之義請下百寮集議時裴垍當國李􅅠為司事竟不行老儒薛伯臯錫書曰大司冦是俗吏執人柄者是小生余氏子宜其死矣太平御覽卷四百八十二
