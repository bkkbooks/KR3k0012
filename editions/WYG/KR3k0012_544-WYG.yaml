body:
  text: 太平御覽卷五百四十四宋李昉等撰禮儀部二十三喪紀上周禮天官宰夫曰大喪小喪掌小官之戒令帥執事而治之大喪王后世子也小喪夫人以下也小官士也三公六卿之喪與執喪帥官有司而治之凡諸大夫之喪使其旅帥有司而治之旅冡宰下士也又天官宫正曰大喪則授廬舍辨其親疎貴賤之居廬倚廬也舍堊室也親者貴者居倚廬疎者賤者居堊室也又天官􅈄人曰凡喪紀共其魚之鱻薧又天官腊人曰凡喪紀共其脯腊凡乾肉之事又天官凌人曰大喪共夷盤冰夷之言尸也實氷于夷槃中置之尸牀之下所以寒尸又天官籩人曰喪事及賓客之事共其薦籩羞籩喪事之籩謂殷奠時又天官醢人曰凡喪紀共其薦羞之豆實又天官掌次曰凡喪紀王則張帟三重諸侯再重孤卿大夫不重張帟柩上承塵又天官司裘曰大喪廞裘飾皮車皮車遣車之革路也故書廞為淫鄭司農云淫裘陳裘也𤣥謂廞興也若詩之興謂象似而作之又天官内小臣曰若喪紀則擯詔后之禮事又天官閽人曰喪紀之事設門燎蹕宫門廟門燎地燭也蹕止行者廟在中門之外又天官寺人曰喪紀之事則帥女宫而致于有司有司謂宫卿世婦也又天官世婦曰掌喪紀之事帥女宫而濯摡為齍盛摡拭也為猶差擇也又天官女御曰大喪掌沐浴王及后之喪也后之喪持翣從世婦而弔于卿大夫之喪從之數蓋如使者之介云又天官典絲曰喪紀共其絲纊組文之物以給線縷著旰口綦握之屬也青與赤謂之文又天官内司服曰后之喪共其衣服凡内具之物内具紛帨線纊鞶袠之屬又地官大司徒曰大喪帥六鄉之衆庶屬其六引而治其政令衆庶所致役也鄭司農云六引謂引喪車索也六鄉主六引六遂主六紼若國有大故則致萬民于王門令無節者不行天下大故謂王崩及冦兵也節六節也有節乃得行防姦私也又地官鄉師曰大喪用役則帥其民而至遂治之治謂監督其事及𦵏執纛以與匠師御匶而治役及窆執斧以莅匠師執斧以莅之使戒其事又地官閭胥曰凡喪紀之數聚衆庶既比則讀灋書其敬敏任䘏者又地官遂師曰大喪使帥其屬以幄帟先道野役及窆抱磨共丘籠及蜃車之役使以幄帟先者大宰也其餘司徒也幄帟先所以為𦵏窆之間先張神坐也道野役帥以至墓也丘籠之役竁復土也其器曰籠蜃車柩路也柩路載栁四輪迫地而行有似於蜃因取名焉行至壙乃説更復載以龍輴又地官委人曰喪紀共其薪蒸木材又地官土均曰禮俗喪紀祭祀皆以地媺惡為輕重之灋而行之掌其禁令君子行禮不求變俗隨其土地厚薄為之制也又地官囿人曰喪紀賓客共其生獸死獸之物又地官舍人曰喪紀共飯米熬穀飯所以實口不忍虛也君用粱大夫用稷士用黍皆四升實者唯盈熬穀者錯于棺旁所以惑蚍蜉又春官大宗伯曰以㓙禮哀邦國之憂朝覲㑹同則為上相大喪亦如之又春官小宗伯曰王崩大肆以秬鬯渳鄭司農云大肆大浴也以秬鬯浴尸也又春官肆師曰大喪大渳以鬯則築䰞築香草煮以為鬯以浴尸香草鬱也又春官鬱人曰大喪之渳共其肆器肆器陳尸之器及𦵏共其祼器遂貍之遣奠之彜瓚也貍于宗廟階間又春官鬯人曰大喪之大渳設斗共其釁鬯斗所以沃尸也釁尸以鬯酒使之香美也又春官司几筵曰凡喪事設葦席右素几其栢席用雈黼純諸侯則紛純每敦一几喪事謂凡奠也萑如葦而細者鄭司農云柏席迫地之席葦居其上或曰柏席載黍稷之席𤣥謂柏椁字磨滅之餘椁席藏中神坐之席也敦讀曰燾燾覆也棺在殯則椁燾既窆則加見皆謂覆之周禮雖合𦵏及同時在殯皆異几體實不同祭于廟同几精氣合凡吉事變几凶事仍几故書仍為乃鄭司農云變几變更其質謂有飾也乃讀為仍仍因也因其質謂無飾也又春官天府曰凡國之玉鎮大寳器藏焉若有大喪大祭則出而陳之既事藏之玉鎮大寳器玉瑞玉器之美者也禘祫及大喪陳之以華國也凡吉凶之事祖廟之中沃盥執燭又春官執喪曰掌諸侯之喪及卿大夫士凡有爵者之喪以國之喪禮涖其禁序其事國之喪禮喪服士喪既夕士虞今存者也其餘則亡事謂小斂大斂𦵏也凡國有司以王命有事焉則詔贊主人有事謂含襚贈賵之屬鄭司農云凡國謂諸侯國有司謂王有司也以王命有事職喪主詔賛主人凡公有司之所共職喪令之趣其事令令其當共物者給事之期也有司或言公或言國言國者由其君所来居其官曰公又春官司巫曰凡喪事掌巫降之禮又春官太史曰大喪執灋以涖勸防鄭司農云勸防引大紼遣之日讀誄遣謂祖廟之庭大奠將行時也人之道終于此累其行而讀之又帥瞽廞之而作蓋瞽史知天道使共其事言王之誄諡成于天道凡喪事攷焉又春官巾車曰掌王之喪車五乗木車蒲蔽犬䄙尾櫜疏飾小服皆疏木車不漆者也鄭司農云蒲蔽謂臝蘭車以蒲為蔽也天子喪服之車也漢儀亦然犬䄙以犬皮為覆笭故書疏為揟杜子春讀揟為沙𤣥謂蔽車旁禦風塵者也犬白犬皮也既以皮為覆笭又以其尾為戈㦸之弢麤布飾二物之側為之緣若攝服云服讀為箙小箙刀劒短兵之衣此始遭喪所乗也為君之道尚㣲備姦臣也書曰以虎賁百人迎子釗亦為備焉素車棼蔽犬䄙素飾小服皆素素車以白土堊車也棼讀為薠薠麻以為蔽其䄙服以素繒為緣此卒哭所乗也為君之道益著在車可以去戈㦸也薻車薻蔽鹿淺䄙革飾駹車雚蔽然䄙髤飾漆車藩蔽豻䄙雀飾漆車黒車也藩今時小車藩也漆席以為之蔽豻胡犬也雀黒多赤少之色韋也此禫所乗之車也大喪飾遣車遂廞之行之謂陳駕之及𦵏執葢從車持旌及墓嘑啓闗陳車小喪共匶路與其飾匶路載柩車也飾棺飾也又春官司常曰大喪共銘旌建廞車之旌又夏官大司馬曰大喪平士大夫喪祭奉詔馬牲王喪之以馬祭者蓋遣奠也又夏官射人曰大喪與僕人遷尸作卿大夫掌事比其廬不敬者呵罰之僕人大僕也大僕與射人俱掌王之朝位也又夏官司士曰大喪作士掌事作六軍之士執披又夏官諸子曰大喪正羣子之服位又夏官虎賁氏曰國有大故則守王門大喪亦如之又夏官太僕曰喪紀正王之服位詔灋儀贊王牲事大喪始崩戒鼓傳達于四方窆亦如之又夏官司兵曰大喪廞五兵又秋官大司冦曰凡朝覲㑹同前王大喪亦如之大喪所前或嗣王位也又秋官士師曰諸侯為賓則帥其屬而蹕于王宫大喪亦如之又秋官鄉士曰大喪紀帥其屬夹道而蹕又秋官司隸曰賓客喪紀之事則役其煩蓐之事煩猶劇也士喪禮下篇曰隸人涅厠又秋官大行人曰若有大喪則詔相諸侯之禮禮記檀弓曰子上之母死而不喪門人問諸子思曰昔者子之先君子喪出母乎曰然子之不使白也喪之何也子思曰昔者吾先君子無所失道道隆則從而隆道汙則從而汙伋則安能為伋也妻者是為白也母不為伋也妻者是不為白也母故孔氏之不喪出母自子思始也又檀弓上曰公叔木有同母異父之昆弟死問于子游子游曰其大功乎又檀弓上曰狄儀有同母異父之昆弟死問于子夏子夏曰我未之前聞也魯人則為之齊衰狄儀行齊衰今之齊衰狄儀之問也又檀弓上曰子思之母死于衛子思伯魚子伯魚死其妻嫁于衛栁若謂子思曰子聖人之後也四方於子乎觀禮子盍慎諸栁若衛人也子思曰吾何慎哉吾聞之有其禮無其財君子弗行也有其禮有其財無其時君子弗行也時止則止時行則行吾何慎哉太平御覽卷五百四十四
