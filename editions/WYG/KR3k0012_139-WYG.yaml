body:
  text: 太平御覽卷一百三十九宋李昉等撰皇親部五後魏叙后事魏神元竇皇后文封皇后桓祁皇后平文王皇后昭成慕容皇后獻明賀皇后道武慕容皇后道武劉皇后眀元姚皇后明元杜皇后太武赫連皇后太武賀皇后景穆閭皇后文成馮皇后文成李皇后獻文李皇后孝文林皇后孝文高皇后孝文馮皇后孝文廢皇后馮氏叙后事後魏書魏故事将立皇后必令手鑄金人以成者為吉不成則不得立也又世祖高宗縁保母劬勞之恩極尊崇之意雖事乖典禮而觀過知仁魏神元竇皇后後魏書曰神元竇皇后沒鹿回部大人賔之女賔臨終誡其二子速侯回題令其善事帝及賔卒速侯等欲因帝會喪為變語頗漏泄帝聞之知其終不順奉乃先圗之於是使勇士於中宫晨起以佩刀殺后馳使告速侯等言曰后暴崩速侯等驚走赴因執而殺之文封皇后後魏書曰文帝皇后封氏生桓穆二帝後早崩和帝立乃葬焉髙宗初穿天淵池獲一石銘稱桓帝葬母封氏逺近赴會二十餘萬人有司以聞命藏之太廟次妃蘭氏生二子長子曰藍早卒次子思帝也桓祁皇后後魏書曰桓帝后祁氏生三子長曰普根次惠帝次煬帝平文崩后攝國事時人謂之曰女國后性猛忌平文之崩后所為也平文王皇后後魏書曰平文皇后王氏廣寗人年十三因事入宫得幸於平文生昭成平文崩昭成在襁褓時國有内難將害諸皇子后匿帝於袴中懼人知祝曰若天祚未終者汝便無聲遂良乆不啼得免於難烈帝之崩國祚殆危興復大業后之力也十八年崩塟雲中金陵太祖即位配饗太廟昭成慕容皇后後魏書曰昭成皇后慕容氏慕容皝之女也有寵生獻眀帝秦明皇后性聰敏多智沉厚善决㫁專理内事每事多從建國二十三年崩太祖即位配饗太廟獻明賀皇后後魏書曰獻明皇后賀氏父野干東部大人后少以容儀選入東宫生太祖苻洛之内侮也后與太祖及故臣民避難北徙俄而高車奄來抄掠后乗車與太祖避賊而南中路失轄后懼仰天告曰國家𦙍胄豈至爾絶滅也惟神靈扶助遂馳輪正不傾而免難其後劉顯使人将害太祖帝姑為顯弟亢埿妻知之宻以告后后乃令太祖去之后夜飲顯使醉之向晨故驚廐中羣馬顯使起視馬后泣而謂曰吾諸子始皆在此今盡亡失汝等誰殺之也故顯不使急追太祖太祖得至賀蘭部顯怒將害后后夜奔亢埿家匿神車中及三日亢埿舉室請救乃得免會劉顯部亂始得亡去皇始元年崩時年四十六祔塟于盛樂金陵加尊諡配饗焉道武慕容皇后後魏書曰道武皇后慕容氏寳之季女也中山平後入充掖庭得幸左丞相衛王儀等奏請立后帝從羣臣后鑄金人成乃立之告於廟封后母孟為溧陽君後崩道武劉皇后後魏書曰道武宣穆皇后劉眷女也登國初納為夫人生華隂公主後生明元后專理内事寵待有加鑄金人不成故不得登后位魏故事後宫産子将為儲貳其母皆賜死道武末年后以舊法薨明元即位追尊諡號配饗太廟此後宫人為帝母皆正位配饗焉明元姚皇后後魏書曰明元昭哀皇后姚興女也興封西平長公主太宗以禮納之後為夫人后以鑄金人不成未昇尊位然帝寵幸之出入居處如后焉是後猶欲正位而后謙譲不當五年薨帝追恨之贈皇后璽綬而後加諡葬雲中金陵明元杜皇后後魏書曰明元宻皇后杜氏魏郡鄴人陽平王超之妹也初以良家子選入太子宫有寵生世祖太宗即位拜為貴嬪泰常五年薨諡宻貴嬪塟雲中金陵世祖即位追尊號諡配饗太廟又立后廟于鄴刺史四時薦祀後甘露降於后廟庭高祖時相州刺史高閎表修后廟詔婦人外成理無獨祀隂必配陽以成天地未聞有莘之國立太姒之饗便可罷祀先是世祖保母竇氏初以夫家坐事誅與二女俱入宫操行純備進退以禮太宗命為世祖保母性仁慈勤撫導世祖感其恩訓奉飬不異所生及即位尊為保太后後尊為皇太后真君元年崩時六十三諡曰惠塟崞郭山從后意也初后常謂左右曰吾於先朝本無位次不可違禮以從園林北山之上可以終託故塟焉別立后寝廟於崞山建碑頌徳太武赫連皇后後魏書曰太武皇后赫連氏屈丐女也世祖平統万納后及二妹俱為貴人後立為皇后高宗初崩祔塟金陵太武賀皇后後魏書曰太武敬皇后賀氏代人也初為夫人生恭宗神䴥音加元年薨追贈貴嬪塟雲中金陵後追加號諡配饗太廟景穆閭皇后後魏書曰景穆恭皇后郁久閭氏河東王毗妹也少以選入東宫有寵真君元年生高宗世祖末年薨高宗即位追尊號諡塟雲中金陵配饗太廟高宗乳母常氏本遼西人太延中以事入宫世祖選乳高宗慈和履順有劬勞保護之功高宗即位為保太后尋尊為皇太后謁於郊廟和平元年崩諡曰昭塟於廣寗磨笄山俗謂之鳴雞山太后遺志也文成馮皇后後魏書曰文成文明皇后馮氏父朗秦雍二州刺史西城郡公母樂浪王氏生后於長安有神光之異朗坐事誅后遂入宫世祖昭儀后之姑也雅有母徳撫飬教訓年十四高宗踐極以選為貴人後立為皇后高宗崩故事國有大喪三日之後御服器物一以燒焚百官及中宫號泣而臨之后悲呌自投火中左右救之良乆乃蘇顯祖即位尊后為皇太后丞相乙渾謀逆顯祖年十三居于諒闇太后宻定大策誅渾遂臨朝聽政及高祖生太后躬親撫養是後罷令不聽政事太后行不正内寵李奕顯祖因事誅之太后不得意顯祖暴崩時言太后為之也承眀元年尊號曰太皇太后復臨朝聽政事太后性聰逹自入宫掖粗學書計及登尊極省决萬機高祖詔曰朕以虛寡㓜纂寳厯仰恃慈明緝寕四海欲報之德正覺是憑諸鷙鳥傷生之類宜放山林其以此地為太皇太后經始靈塔於是罷鷹師曹以其地為報徳佛寺太后與高祖㳺於方山顧瞻川阜有終焉之志謂羣臣曰舜塟蒼梧二妃不從豈必逺祔山陵然後為貴哉吾百年之後神其安此高祖乃詔有司營建壽陵於方山又起永固石室将終為清廟焉刋石立碑頌太后功徳太后以高祖富於春秋乃作勸戒歌三百餘章又作皇誥十八篇太后又制内屬五廟孫外戚六親緦麻皆受復除性儉素不好華飾御縵繒而已太后多智畧猜忌能行大事是以威福兼作震動内外故王遇張祐符承祖等拔自微閹嵗終而至王公王叡出入卧内數年之間便為宰輔賞賚財帛以千萬億計金書鐡劵許以不死之誓李冲雖以器能受任亦由見寵帷幄宻加賞賚不可勝數太后與髙祖幸靈泉池燕羣臣及藩國使臣諸方渠師各令為其方舞高祖率羣臣上壽太后忻然作歌高祖亦和歌遂命羣臣各言其志於是和歌者九十人太后外禮民望元丕㳺眀根等頒賜金帛輿馬毎至褒美叡等皆引丕等而叅之以示無私也十四年崩於太和殿年四十九其日有雄雉集於太華殿高祖酌飲不入口五日毁慕過禮諡曰文眀太皇太后葬於永固陵高祖毁瘠絶酒肉不御内者三年初高祖孝於太后乃於永固陵東北里餘營壽宫有終焉瞻望之志及遷洛陽乃自表瀍西以為山園之所而方山虗宫石室至今猶存號曰千年堂文成李皇后後魏書曰文成皇后李氏梁國蒙縣人母頓丘王峻之妹也后之生也有異於常父方叔恒云此女當大貴及長姿質美麗世祖征永昌王仁出壽春軍至后宅因得后及仁鎮長安遇事誅后與其家人送平成宫高祖登白樓望見之謂左右曰此婦人佳乎左右咸曰然乃下臺后得幸於齋庫中遂有娠常太后後問后后云為帝所幸仍有娠時守庫者亦私書壁記之别加騐問皆相符同生顯祖拜貴人薨後諡曰元皇后葬金陵配饗太廟獻文李皇后後魏書曰獻文思皇后李氏中山安喜人南郡王惠之女也姿徳婉淑年十八選入東宫顯祖即位為夫人生高祖皇興三年薨上下莫不悼惜葬金陵承明元年追崇號諡配饗太廟孝文林皇后後魏書曰孝文貞皇后林氏平凉人叔父金閭起自閹宦有寵於常太后位至尚書封平凉公金閭兄勝為平凉太守金閭顯祖初為定州刺史未幾為乙渾所誅兄弟皆死勝無子有二女入掖庭后容色美麗得幸於高祖生皇子恂音荀将為儲貳太和七年后依舊制薨諡曰貞皇后葬金陵及恂以罪賜死有司奏廢后為庻人孝文廢馮皇后後魏書曰孝文廢皇后馮氏太師熈之女太和十七年立為后高祖遵經典禮后及夫人嬪妃以下妾御皆以次進車駕南伐后留京師高祖又南伐后率六宫遷洛陽及后父熈兄誕薨高祖為書慰以叙哀情及車駕還洛恩遇甚厚高祖後重引后姊昭儀至洛稍有寵后禮愛漸衰昭儀自以年長且前入宫掖素見待念輕后而不率妾禮后雖性不妬忌時有愧恨之色昭儀規為内主譛搆百端尋詔廢后為庻人后貞謹有徳操遂為練行尼後終於瑶光佛寺孝文馮皇后後魏書曰孝文幽皇后亦馮熈女也母曰常氏本㣲賤得幸於熈熈元妃公主薨後遂主家事生后與北平公夙文明太皇太后欲家世貴寵乃簡熈二女俱入掖庭時年十四其一早卒后有姿媚偏見愛幸未幾疾病文明太后下詔遣還家為尼髙祖獨留念焉嵗餘而文明太后崩髙祖服終後頗存訪之聞后素疾痊除遣璽書勞問遂迎赴洛陽及至寵愛過初専寢當夕宫人希復進見拜為左昭儀後立為皇后後髙祖頻嵗南征后遂與閹宦髙菩薩私亂及髙祖在汝南不豫后便公然醜恣中常侍雙蒙等為其心腹中常侍劇鵬諫而不從憤懼致死是時彭城公主宋王劉㫤子婦也年少嫠居北平公馮夙后之同母弟后求婚於髙祖髙祖許之而公主志不願后欲强之婚有日矣公主宻與侍奴及家僮十餘人乘輕車冐霖雨赴懸瓠奉謁髙祖自陳本意因言后與菩薩亂状髙祖聞之因駭愕未之全信而秘匿之惟彭城王侍疾於左右具知其事後后漸憂懼與母常氏求託女巫禱厭無所不至願髙祖疾不起一旦得如文明太后輔少主稱令者賞報不貲乃取三牲宫中妖祠假言祈福専為左道髙祖自豫州北幸鄴后慮還見治檢彌懐危怖驟令閹人託參起居皆賜之衣服慇懃寄託勿使泄漏亦令雙蒙參行皆其信者也惟小黄門蘇興夀宻陳委曲髙祖問其本末勑以勿泄至洛執問菩薩雙􅂪等六人迭相証舉具得情状髙祖以疾卧含温室夜引后并列菩薩等於戸外臨入令捜衣中稍有寸刄便斬后頓首泣謝乃賜坐東楹去御筵二丈餘髙祖令菩薩等陳状又讓后曰汝母有妖術可具言之后乞屏左右有所宻啓髙祖勑中常侍悉出唯令長秋卿白整在側后猶不言髙祖乃令以綿堅塞整耳小語呼整再三無所應乃命后言隱事人莫知之髙祖乃呼彭城北海二王令入坐言昔是汝嫂今乃他人但入勿避二王固辭不獲命及入髙祖云此老嫗乃欲白刃挿我肋上汝可窮問本末勿有所難髙祖深自引過致愧二王又曰馮家女不得復相廢逐且使在宫中空坐有心乃能自死汝等勿謂吾猶有情也髙祖素至孝猶以文明太后故未便行廢良乆二王乃出賜后自决再拜稽首泣涕欷歔令宿東房髙祖疾甚謂彭城王勰曰後宫乆乖隂政自絶于天若不早為之所恐成漢末故事吾死之後可賜自盡別宫葬以后禮庻掩馮門之大過髙祖崩北海王祥奉宣遺㫖長秋卿白整等入授后藥后走呼不肯引决整等執持强之乃含椒而盡殯以后禮諡曰幽后葬長陵塋内孝文髙皇后後魏書曰孝文文昭皇后髙氏司徒公肇妹也父颺母蓋氏凡四男三女皆生於東裔髙祖初乃舉室西歸達龍城鎮鎮表后德色婉艶任充宫掖及至文明太后親幸北部曹見后姿貎竒之遂入掖庭年十三初后之㓜也曽夢在堂内立而日光自窻中照之灼灼而熱后東西避之光猶斜照不已如是數夕后自怪之以白其父颺颺以問遼東人閔宗宗曰此竒徴也貴不可言颺曰何以知之宗曰夫日者君之徳帝王之象也光照女身将被帝命誕育人君之象遂生世宗後生廣平王懐次長樂公主及馮昭儀寵盛宻有母養世宗之意后自代如洛陽暴薨於汲郡之共縣或云昭儀遣人賊后也世祖之為皇太子三日一朝幽后后拊念慈愛有加親視櫛沐母道隆備其後有司奏請加諡曰文昭貴人髙祖從之世宗踐祚追尊配享肅宗詔曰文昭皇后徳恊坤儀美符文姒作合髙祖實誕英聖而夙世淪暉孤塋弗祔先帝孝感自衷遷奉未遂永言哀恨義結幽明廢吕尊薄禮申漢代又下詔曰文昭皇太后尊配髙祖祔廟定號促令遷奉自終及始太后當主可更上尊號稱太皇太后初開終寧陵數丈於梓宫上獲大蛇長丈餘黒色頭有王字蟄而不動靈櫬既遷置蛇舊處太平御覽巻一百三十九
