body:
  text: 太平御覽巻五百五十六宋李昉等撰禮儀部三十五葬送四吴越春秋曰昇平門外麋湖西城者麋王城也與越王遥戰越王殺麋王麋王無頭騎馬還武里乃死因留塟武里城中以午日死至今武里午日不舉火又曰吴王闔閭有子女怨王乃自殺闔閭痛之甚葬于閶門外鑿地為池積土為山文石為椁金鼎銀罇珠玉之寳皆以送女乃舞白鵠于吴市中令萬民隨觀還使男女與鵠俱入門塞之又曰吴謀伐齊齊景公使女子為質于吴吴王因為太子聘齊女齊女少思齊日夜哭泣發病闔閭乃起北門名曰齊門令女往游其上女猶思不止病日益甚至且死女曰令死有知必塟海虞山之巔以望齊國闔閭傷之甚用其言塟于虞山之巔以瞻齊國是時太子亦病而死說苑曰葢聞相梁并衞有罪而走齊管仲迎而問曰吾子相梁并衞之時門下使者幾何人曰門下使者三千餘人管仲曰今與幾何人來曰臣與三人俱曰是何對曰其一人父死無以塟我為塟一人母死無以塟亦為塟之一人兄有獄我為出之是以得三人來桓子新論曰揚子雲為郎居長安素貧比歲亡其兩男哀痛之皆持歸塟于蜀以此困乏雄察逹聖道明于死生宜不下季札然而慕戀死子不能以義割恩自令多費而致困貧論衡儒書言孔子當泗水而塟為之却流此言孔子徳使水却不湍其墓是故儒者講論皆言孔子之後當封泗水以却流為證殆虛言也王符潜夫論曰文帝塟于芷陽明帝塟于洛南皆不藏珠寳不起山􅁜今京師貴戚郡縣豪家生不極養死乃崇喪迨起大塜廣樹松栢廬舎祠堂務崇侈僣此無益于終無益于孝徒作煩擾傷害吏民今案畢鎬之郊無文武之陵南城之東無曽晳之墓周公非不忠曽子非不孝也崔寔政論曰送終之家亦大無度至念親將終無以奉遣乃約其供養衣服豫修已没之制竭家盡業甘之不恨窮阨既迫起為盗賊拘執䧟罪為世大戮痛乎此俗之愚民也録異傳曰袁安葬其母逢三書生語其塟處遂至四世五公其後公路年十八驕豪故常食宻飯諸女以綘為地道遊行其上此塟地所致也謝綽宋拾遺記曰桓温塟姑熟之青山平墳不為封域于墓傍開􅎬立碑故謬其處令後代不知所在襄陽耆舊傳曰峴山南有習家魚池者習郁之所作也郁將亡勑其兒煥曰我塟必近魚池煥為起塜于池之北近池四十歩山謙之丹陽記曰晉車騎將軍王舒令其子曰甚愛溧陽縣死則我欲塟焉故王死之後徙縣治今處而以昔縣為墓續捜神記曰干寳字令升新蔡人其父有嬖妾母至妬寳父塟時因推着藏中終十年而母喪開墓見棺妾伏棺上衣服如生就猶煖漸漸有氣息輿歸經日乃蘇云父常與之寢接恩情如生在家中范晏隂徳傳曰陳翼字春卿廬江舒人也行到縣郭見道上馬傍有卧人疾呼翼與語曰吾是長安魏公卿聞廬江樂土來不逹病困不能復前儻可相救翼答曰家有弊廬可俱歸乎公卿曰幸甚即扶輿俱到家養視積日既公卿謂翼曰馬上有金十餘餅素二十疋可賣殮餘以相謝言絶而亡翼賣素買衣衾殯殮之塟埋髙敞之地以金置棺下不使人知乗馬去公卿兄長公見翼乘馬謂必殺公卿隂吿官收翼翼具以狀對長公迎喪發棺下得金如數叩頭謝以金投其門中翼送長安還之汝南先賢傳曰袁宏字夏甫延熹中黨事將作宏遂散髮自築土室四周於公庭潜身十八年終于土室之中臨卒勑其子曰勿設殯棺衣衾之備也但着褌衣衫踈布單衣幅巾襯尸於板床上五百􅜘為藏會稽典録曰趙􅁮字長君山隂人也少為縣吏奉檄迎督郵甚恥之由是委吏到犍為詣博士杜撫受韓詩撫嘉其精力盡以其道授之積二十年不還家人為之發喪制服至撫卒􅁮經營葬之然後歸又曰張諛字彦承上虞人也與同鄉丁孝正相親葬送過制諛書難之曰吾聞班固善陽孫之省葬惡始皇之飭終夫倮以矯世君子弗為若乃據周公之定品依延州而成事取中庸以建基獲美稱於當世不亦優哉又曰謝夷吾轉下邳令預自尅死日如期果卒勑其子曰漢末當亂冇發塜露體之禍使懸棺下塟墓不起墳楚國先賢傳曰韓暨將終遺言曰夫俗奢示之以儉儉則節之以禮歴見前世送終過制失之甚也若曹敬聴吾言殮以時服葬以土藏穿畢便葬送之以瓦器慎勿有増益襄陽耆舊記曰襄陽城南邊大道有諸葛女郎墓者是諸葛仲茂女墓也年十三四亡茂婦憐之不能自逺故近城葬之日日徃哭又曰秦頡者字初起頡之南陽過宜城中一家東向大道住車視之曰此居處可作塜後䘮還至此住處將車不肯前故吏為市此宅塟之今宜城城中大塜前有二碑是也又曰有狼子者家貲萬金而自少小不從父語父臨亡意欲塟山上恐兒不從到言葬我着瀦下石磧上狼子曰我由來不奉教從今當從此語遂盡散家財作塜積土繞之成一洲長數百步元康中始為水所壊狼子前漢人也譙周三巴記曰巴國有亂巴國將畢曼子請師於楚楚人與師曼子已平巴國既而楚遣使請城曼子曰吾城許子之君矣持頭往謝楚王城不可得乃自刎以頭與楚使楚子歎曰吾得臣若巴曼子何以城為乃以上卿禮葬曼子頭巴國葬其身亦然華陽國志曰徳陽縣有青石祠山源沃美有澤原之利士女多貞孝車騎將軍鄧芝方之鄧林有終焉之志没遂塟其山博物志曰澹臺子羽渡水而子溺死人將葬之滅明曰此命也吾豈與螻蟻為侣魚鼈為讎於是遂以水塟之又曰漢滕公夏侯嬰死公卿送塟至東郭門外四馬不行掊地悲鳴即掘馬蹄下得石椁其銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室乃塟其地故謂之馬塜又曰河内淇園張公老而無子貲財累億求没入官塟園中于今供祀犧牲永昌郡傳曰建寧郡塟夷置之積薪之上以火燔之烟氣正上則大殺牛羊共相勞賀作樂若遇風烟氣旁邪爾乃悲哭也豫章記曰許子將墓在郡四里昔子將以中國大亂逺來渡江隨劉繇而卒藏于閶門裏于時漢興平二年也吴天紀中太守吴興沈季白日于㕔事上坐忽然如夢見一人着黄單衣黄巾稱汝南平輿許子將求改塟因忽不見即求其喪不知處所遂招魂塟之命文學施遐為招魂文越地傳曰禹井井者法也以為禹塟以度不煩人衆樂資九州志曰度之鹽官有奉禪山者始皇過此而美之死因塟焉有廟在平地于今民祠之述征記曰荀氏塟在彭城東岸有一丘民俗謂之荀氏塟或云斯則徐偃塟后倉者也古徐國宫人娠而生卵棄之水濵有犬名后倉銜而歸伏而成人遂為徐之嗣君純筋無骨號曰偃王偃王躬行仁義衆國附之得朱弓之瑞周穆王命楚滅之后倉將死生角九尾實黄龍也又曰魚山臨清河舊屬東阿東阿王曹植每升此山有終焉之志植之所游也臺沼溝渠悉存既塟于山西有二石柱猶存也今割并榖城鄧徳明南康記曰陽道士塟巖石室元嘉中道士過世臨終語弟子等可送吾置彼石室巾褐香罏此外無所湏也及其亡日謹奉遺命塟經數年尸猶儼然葛巾覆之如初弗朽後忽不復見今舟行者過其山渚尚聞香氣咸異焉解道䖏齊記曰魏黄初三年文帝弟燮封濮陽王臨終顧命塟近蘧瑗之墓吾常想其為人願託賢哲之靈扶南傳曰頓懸國人死或烏塟或火塟烏塟者病困便歌舞送郭外有烏如鵝緑色飛來萬計啄食都盡歛骨焚之沉之於海此上行必生天鳥若不食自悲傷乃就火塟取骨埋之是次行也鄴中記曰石勒􅁜在襄國城西南三十里名髙􅁜不築墻不種樹立堂屋五間安榜讃圖勒大臣像又於堂屋東立重樓虎􅁜在鄴西北角既塟鄴中便亂其封域故未有名或云尋被掘凡此二􅁜皆偽塟石勒虎自别塟於深山風俗通曰王喬為葉令天下一玉棺于㕔事前令臣吏試入不動揺喬曰天帝獨欲召我沐浴服飾寢其中葢便立覆之宿塟於城東土自成墳其夕縣中牛皆流汗吐舌人無知之者皇覽曰舊漢家之塟方中百歩穿築方域其中開道凡施六馬發三河三輔近郡卒徒十萬數復土姚信士緯曰葢葬於寛平則恐後世都邑居之塟於陵野則恐民人耕稼及之厚椁大棺人所為用下土寡材木民人率多發掘以善其居千墳萬壙無不毁者其唯瓦棺薄塟殮以時服依于高丘徹于深穽庶乎可以不辱耳語林曰王太保有二兒䘮一兒欲還舊塋一兒欲留太保乃垂涕曰不忘故鄉仁也不戀本土逹也唯仁與逹吾二子有焉又曰王武子塟夕孫子荆哭之甚悲賔客莫不為垂涕哭畢向靈曰卿常好驢鳴今為卿作之既作體似聲真賔客莫不大笑孫聞笑顧謂曰諸君不死令王武子死賔客莫不皆怒湏㬰之間或悲或笑或怒世說曰阮籍母死蒸一肥豚飲酒二斗然後臨訣直言窮矣却得一號因吐血良乆又鄧祭晉記曰籍母將死與人圍棊如故局者求止籍不肯留决既而殮舉酒三升舉聲一號吐血數升也又曰庾文康亡何楊州臨葬云埋玉樹著土中使人情何能已又曰晉明帝亦解塜宅聞郭璞為人塟微服後往㸔因問君何以葬龍角此法當滅族主人答曰郭景純云此是葬龍耳不出三年當致天子帝復問云為是出天子耶答曰非能出招致天子耳相冡書曰凡葬龍耳當富貴出五侯葬龍頭暴得富貴人不能見葬龍口賊子孫塟龍齒三年暴死葬龍咽死滅門塟龍腮必卒死天子葬高山諸侯葬連崗庶人葬平地應璩新詩曰野田何紛紛城郭何落落埋塜嫁娶家皆是商旅客喪側食不飽酒肉紛狼籍晉武帝賜劉廙葬錢詔曰故侍中劉廙以清識明鑒有聲前代昔宣皇帝接以師友之恩廙墓為盗賊所發甚用惻然其子阜素甚清貧今當殯葬其給轜車銘旌賜錢給作藏人功至時遣使者祭之晉賜王沉葬錢并地詔曰故驃騎將軍王沉忠允篤誠執徳𢎞毅外清方夏内熈衮職歴位著稱厥功茂焉不幸薨殞志業未䆒今當葬期賜錢三十萬葬田一頃晉賜傅嘏夫人鮑葬錢詔曰故太常傅嘏者以令徳賢才為先帝所接登龍之際有翼贊盡忠之勲早代殞没不終功業每念其遺績常存於心今嘏夫人鮑當葬賜錢十萬給作葬蔵人功嘏墓開祭以少牢太平御覽巻五百五十六
