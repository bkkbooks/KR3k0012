body:
  text: 太平御覽卷九百十九宋李昉等撰羽族部六鵝鴨鶩鳬鵝禮記内則曰舒鴈翠鄭𤣥注曰翠尾舒鴈鵞也謂不利人爾雅曰鵱鷜鵝郭璞曰今之野鵝舒鴈鵝郭璞曰形如舒雁今江東呼駕音加廣雅曰駕鵝野鵝也呉志曰景帝有疾使巫視鬼欲試之乃殺一鵝埋之於苑中架屋施牀几以婦人服物着上乃使巫視之若能說此冢中婦形狀者加賞此巫視日竟晝夜無所道帝催問之急乃曰實不見有鬼但見一頭白鵝在墓上所以不即白疑是鬼神變化而作定無復改易不知何故景帝乃厚賜之晉書曰永嘉中洛陽東北步廣里地陷有二鵝出焉一白一蒼白者不能飛蒼者飛去董養字仲道歎曰昔有周時盟㑹狄泉即此地也蒼胡白國象其可盡言乎又曰劉毅家在京口酷貧嘗與鄉曲士大夫往東堂共射時庾恱為司徒右長史要府州僚佐出東堂毅已先至遣與恱相聞曰身並貧躓營一逰甚難君如意人無處不可為適豈能以此堂見讓耶恱性素豪徑前不荅時衆人並避唯毅留射如故恱厨饌甚盛不以及毅毅既不去恱甚不懽毅又相問曰身今年未得子鵝豈能以殘炙見惠恱又不荅及毅貴奏解恱都督將軍官深相挫辱恱不得志疽發背少日而卒宋書曰胡蕃為髙祖從事征廣固累月未拔忽有鳥如鵝蒼黑色飛入髙祖帳裏衆皆駭蕃起賀曰蒼黑􅕎色者戎也戎既歸我大吉之祥也明旦攻城陷之又曰孔静居山隂宋武㣲時往候之静時寢夢人語曰天子在門覺寤即遣人出看而帝適至静虚已接待乃留帝宿夜設粥無鮭新伏鵞卵令煮以為食賊平以静為奮威将軍南史曰劉暄初為江夏王寳𤣥郢州行事執事過刻王妃索煮肫帳下諮暄暄曰旦已煮鵝不煩復此寳𤣥恚曰舅殊無渭陽之情齊書曰卞彬禽獸決録目云鵝性頑而傲盖比潘敞也又曰桂陽之役朝廷周章詔檄久之未就髙帝引江淹入中書内省先賜酒食淹素能飯啖食鵝炙垂盡進酒數升文誥亦辦南史曰何逺為武康令人甚稱之太守王彬廵屬縣諸縣皆盛供帳以待焉至武康逺獨設糗水而已彬去逺送至境進斗酒隻鵝而别彬戲曰卿禮有過陸納將不為古人所笑乎三國典畧曰庾信自建康遁歸江陵湘東王因賜妾徐氏妾與信弟倓私通倓欲求之無敢言者信庭前有一蒼鵝乃繫書于鵝頸信視之乃倓啟遂題紙尾曰畜生乞汝唐書曰元和十二年李愬襲蔡州兵至懸瓠城夜半雪甚城旁有鵝鴨池愬令驚擊之以雜其聲列子曰黄帝與炎帝戰以鵰鶡鷹雁鵝為旗幟魯連子曰君鵝鴨有餘食士不足半菽孟子曰仲子以兄之禄為不義避兄離母處於陵他日歸則有饋其兄生鵝者嚬顣曰惡用是鶂鶂者為其母殺是鵝與之食其兄自外至曰是鶂鶂之肉也出而哇之戰國策曰管燕得罪於齊王謂左右曰子孰能與我赴諸侯乎左右莫對管燕漣然流涕曰悲夫士何其易得而難用也田需對曰士三食不得厭而君鵝鶩有餘食下宫曵綺縠而士不得以為縁且財者君之所輕死者士之所重若不肯以所輕與士而責之以所重事非士易得而難用也異苑曰𫝊承為江夏守有一隻鵝失之三年忽引導得三十餘頭來向承家秦記曰苻朗食鵝炙知黑白之處人不信既而試之果然世說曰㑹稽有孤居老姥養一鵞鳴喚清長王逸少為太守既求市之未得逸少乃㩦親故命駕共往觀之姥聞二千石當來即烹以待之逸少既至殊喪生意歎息彌日俗記曰京下劉光禄養好鵝劉後軍從京還鎮潯陽以一隻鵝為後軍别純蒼色頸長四尺許頭似龍此一隻鵝可堪五萬自後不復見有此類張鴻傳曰鴻為慕容晃黄門初刑鴻不熟頤下生黄鬚三根長寸餘乃遣出宫㸔鵝鴨沈充鵝賦序曰先大夫俞潁川者殊精意於養鵝求得竒鵝時有縁眼黄喙折翼赤頭皆經潁川之好者焦叔明以為太康中得大蒼鵝從喙至足四尺有九寸體色鮮麗鳴聲驚人三年而為暴犬所害惜其不終故為之賦云崔豹古今注曰夫鵝似鵠而大頸長八尺善鬭好啖蛇列異傳曰廬山之右常有野鵝數千為羣長老傳言嘗有一狸食鵝明日狸喚於沙州之上如見繫縛南越志曰化䝉縣祠山上有湖湖中有泉鵝如今野鵝弄吭山泉故號為泉鵝兩京記曰浄影寺沙門慧逺講經初在鄉養一鵝常隨逺聽經及還入京留在寺晝夜鳴呼不止僧徒送入京至此寺大門放之自然知逺房便入馴狎每聞講經即入堂伏聽若聞泛說他事鳴翔而出如是六年忽哀呌庭宇不肯入堂二旬而逺卒寺内有逺碑亦述其事嶺南異物志曰邕州之蠻人多選鵝之細毛夾以布帛絮而為被復縱横之其温柔不下於挾纊也俗云鵝毛柔輭而性冷偏宜覆小兒而辟驚癎也雲南記曰韋齊休使雲南屯城驛西牆外有大池斗門垂栁夾隂池中鵞鴨甚盛幽明録曰晉義熈中𦍑主姚畧壞洛陽隂溝取磚得一隻雄鵞並金色交頸長鳴聲聞九臯臨海記曰邵東南有白山髙三百餘丈望之如雪山上有湖古老相傳云金鵝之所集八桂之所植下有溪金光煥然又曰邵東有晏室山古老云越王時山上起望海館山下有湖中有金鵞飛魚唐書曰貞觀二十年吐蕃遣其大臣禄東輦賛奉表曰聖天子定四方日所照之國並為臣妾而高麗恃逺闕於臣禮天子自領百萬渡遼致討隳城陷陣指日凱旋奴甫聞陛下發駕少選之間已聞歸國鴈飛迅速不及陛下速疾如忝預子壻喜百常夷夫鵞猶鴈也故作金鵞奉獻其鵞黄金鑄成髙七尺中可實酒三斛淮南子曰魯般墨子以木為鵞而飛三日集而不可使為工也唐書曰髙祖義兵至河東隋将堯君素城守時圍甚急君素乃為木鵞置表於頸具論事勢浮之黄河下河陽守者得之達東都越王侗見而歎息鴨爾雅曰舒鳬鶩也郭璞曰鴨也廣雅曰舒鶩鴨也魏氏春秋曰司馬文王鎮許昌徵還擊羌至京師見帝於平樂觀帝與左右小臣謀因其辭劍誅之已書詔文王入帝方食粟優人雲午等唱曰青頭雞青頭雞者鴨也帝懼不敢發司馬由是謀廢帝江表傳曰魏文帝遣使求鬬鴨羣臣奏宜勿與權曰彼在諒闇之中所求若此豈可與言禮哉具以與使者呉志曰建昌侯孫慮於堂前作鬬鴨欄頗施小巧陸遜正色曰君侯宜勤覧經典用此何為慮即毁之陳書曰齊人渡江至𤣥武湖西北莫府山南我軍自覆舟東移頓郊壇北與齊人對是時乏食調市人餽軍皆是交屑為飯以荷葉裹而分給兵士皆困㑹文帝遣送米三千石鴨千頭帝即炊米煮鴨誓申一戰将士及防身計粮數臠人人裹飯嫓以鴨肉帝命衆軍蓐食攻之齊軍大潰三國典畧曰髙徳衆正相齊未誅之前家有赤鴨羣行於庭犬來逐遂成碎血北史曰元善以髙熲有宰相之具常言於上曰楊素麄疎蘇威怯愞元冐元昊正似鴨耳可以付社稷者唯獨髙熲上初然之唐書曰齊王祐太宗第五子好養鴨未反前忽有野狸入籠中咬四十餘鴨皆斷其頭及敗同惡而誅者四十四人抱朴子曰有白虎七變法取三月三十日殺鴨血等合和之忽生草似胡麻一生取其實合之可以移形易貌兩京雜記曰髙祖既作新豐并移舊社放犬羊雞鴨於通途亦競識其家傅子曰鴨足何以眅雞足何以􅀈眅􅀈吾不知也何况問天地乎金樓子曰海鴨大如常鴨斑白文赤謂之交鳥洞㝠記曰武帝昇望月臺南端有三青鴨飛俄而下帝恱之至夕鴨宿於臺端化為三小童皆著青綺文􅃭各執鯨文大錢五枚置帝几前風俗通曰雞伏鴨卵雛成入水雞母隨岸呼之雛出而隨母鴨雞異類能相隨也博物志曰中諸藥毒已死者取生鴨斷頭以鴨項内病者口中得血三兩滴入咽喉中即蘇語林曰傅信貧母羸病恒驚悸信乃取雞鴨滅毛放承塵上行落地轉恐怖石崇金谷詩序曰吾有廬在河南金谷中去城十里有金田十頃羊二百隻雞猪鵝鴨之類莫不畢備潯陽記曰周昉與商人共入宫亭廟宿明起如厠見一白頭翁昉逐之化為雄鴨還船欲煮之商人争著遂飛去廣志曰野鴨雄者赤頭有距蔡氏化清經曰水戰之鴨何必白纓􅄹俎之雞何必長鳴新言曰譬猛虎浮水不如鳬鴨騏驎登木不如猿猴太𤣥經曰素纓之鴨翰音之雞望視之兔白蹄之豕短啄之狗修頸之馬君子之貌何獨異耶呉地記曰鴨城者呉王築地以養鴨周數百里竺法真登羅山疏曰山上有神湖湖中有白鴨嶺南異物志曰廣州浛淮縣金池黄家養鴨有鴨池嘗於鴨糞中見有麩金遂多收淘之日得一兩縁此致富其子孫皆為使府劇職三世後池即無金黄氏力殚矣鶩說文曰鶩野鳬春秋左傳曰公膳日䨇雞饔人竊更之以鶩子尾怒春秋繁露曰張湯問仲舒曰祠宗廟或以鶩當鳬可乎對曰鶩非鳬鳬非鶩愚以為不可漢書王莽多事諸鬼用三牲鳥獸三千餘種後不能備乃以雞當鴈鶩東觀漢記曰馬援與兄子嚴敦書云學龍伯髙不就猶為謹敕之士所謂刻鵠不成尚類鶩者說苑曰鶩無他心故庶人以為贄崔實正論曰今下僣其上尊卑無别如使雞鶩蛇頸龜身五色紛麗亦可貴於鳳乎唐子曰吾嘗㑹賔設樂天忽雲興繼以大雨有羣鶩成列飛翔而過此偶爾何異𤣥鶴二八也廣志曰鶩生百卵一日再生有露華鶩以秋冬生卵並出蜀晨鳬肥而耐寒宜為臛越地傳曰越人為競渡有輕薄少年各尚其勇為鶩沒之戲有至水底然後魚躍而出鳬毛詩曰将翺将翔弋鳬與雁又曰鳬鷖在涇公尸來燕來寧爾酒既清爾肴既馨公尸燕飲福禄來成鳬鷖在沙公尸來燕來宜爾酒既多爾肴既嘉公尸燕飲福禄來為韓詩外傳曰趙倉唐病魏文侯太子擊使於外問太子曰侯何好曰嗜晨鳬好北犬於是遣唐緤北犬奉晨鳬獻之侯曰擊愛我知我所嗜好燕子曰鳬脛雖短續之則憂風俗通曰王喬者河東人為葉令喬有神術每月朔望常自縣詣臺朝帝怪其來數而不見車騎宻令太史伺望之言其臨至輒有䨇鳬從東南飛來於是候鳬至舉羅張之但得一䨇履乃詔尚方視之則四年中所賜尚書官屬履楚辭曰寧與騏驥抗軛乎将與雞鶩争食乎寧昂昻若千里之駒泛泛若水中之鳬乎焦贑易林曰鳬舞鼓翼嘉樂克徳李陵贈蘇武詩曰二鳬俱北飛一鳬獨南翔我當留斯館子當歸故鄉蘇武與李陵書曰乗雲附景不足以譬速晨鳬失羣不足以喻疾豈可曰歸鴈以運粮託景風以餉軍哉晉書張華傳人有得鳬鳥毛長三丈以示張華華見不悦曰此謂海鳬毛也出則天下亂後周書曰初賀勝至闗中自以年位素重見太祖不幸尋而自悔太祖亦有望焉後從太祖宴于昆明池時有䨇鳬逰於池上太祖乃授弓矢於勝曰不見公射久矣請以為觀勝射之一發俱中因拜太祖曰使勝得奉神武以討不庭皆如此也太祖大恱自是恩禮日重勝亦盡誠推心周書曰太祖車駕幸城南逺臨水亭見䨇鳬争藻戲於池面引弓射之一發而皆貫從官懽呼拜賀上乃命翰林繪工寫之縑素南越志曰化䝉縣祠山上有池池中有松鳬如今野鳬栖息松間故俗謂松鳬呉録地理記曰石首魚至秋化為冠鳬鳬頭中猶有石也冡墓記曰闔閭家中有玉鳬廣州先賢傳曰頓琦至孝母喪感慕哀聲不絶致飛鳬白鳩栖廬側見人輒去見琦而畱又曰丁宻遭父艱致飛鳬一䨇㳺廬旁小池見人則馴附如家所畜後遭母哀宻歸至所居䨇鳬復㳺戲池中崔豹古今注曰鳬鴈常住海邉沙上食沙石皆消爛唯食海蛤不消隨其糞出以為藥倍勝餘者蔡叔鬪鳬賦曰冠緑葩以耀首綴素毛以㸃纓太平御覽卷九百十九
