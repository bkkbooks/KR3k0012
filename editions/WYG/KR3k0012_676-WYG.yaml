  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_676-1a, image: WYG0899/WYG0899-0080a.png}
body:
  text: 太平御覽卷六百七十六宋李昉等撰道部十八簡章玉帝七聖𤣥記曰七聖定簡五帝記名登真隠訣曰小有天王太素清虛真人登白空山詣紫虛太真三元君受流金火鈴豁落七元八景飛晨筞玉璽又曰太一有玉璽金丹虎符玉清隠書曰有太上飛行九晨玉經金簡内文又曰玉璽鳳函金真玉光紫文單章在其内九函經曰帝尊在三元宫中總校圗籙又曰善功注名黄籙金格玉簡陳列三清四極明科經曰若有𤣥名帝圗紫簡緑字千年得傳也又曰五老寶經清緑為字以書其章又八素真經太上之隠書也八色采筆金闕帝君自書之為致貞之法以付太虛真人南岳赤松子使下授學道宿有貞金玉字刻在金閣當爲真人者不得越傳地仙又伍符經一道通書以南和丹繒封以金英之函印以𤣥都之章付震水洞室之君又靈寳真一自然經衆真佩此經者以黄錦爲地丹金書之求谷道貞享之無期也元始説經中所言並是諸天上帝内名隱韻之音非世之常辭也又曰雌一玉檢五寳經秘在九天之上大有之宮太𤣥靈寳臺玉房之中紫金爲素以撰其文青緑爲字以書其章又曰有妙經刻玉爲簡傳於天帝君太上八素真經曰司命著籍玉簡丹書編以金縷纒以青絲千億年無所復疑又曰太上吉日印以三元之章又印以太𤣥之章又印以髙皇之章又印以中黄之章又曰西華宫有琅簡蘂書也又曰太上以白玉爲簡丹玉書亦用青碧𤣥玉黄金爲之八素經曰八素真經𤣥文生於太空之内見於西龜之山𤣥圃之上積石之隂髙𤣥羽章衆真晏禮稱慶上清上清經曰三天玉童帯朱精禁天之章髙玉皇佩丹皇玉章又曰紫映九霄真玉佩金鳳璽又曰大素三元君有雲瓊之板九變虎書又曰髙虛九帝帯元光紫綬流精飛瓊之章又曰三天玉童帯九天之章又曰髙上虛皇君佩丹皇玉章又曰玉真九天丈人佩九元通真之䇿又曰紫虛皇上元皇佩封靈召真玉策帯流光鳳章又曰上皇玉虛君佩丹文紫綬又曰三元大明上皇君帯神虎紫章又曰皇上萬始先生佩金虎鳳文帯丹皇紫章又曰皇上君帯神虎玉章又曰上極紫皇君佩六山玉帯神精交蛇之章綬太霄琅書曰太微天帝君以紫簡結紫度經編目也又曰有帝章之印又曰瓊文帝章當刻書􅀥心之木受於絶巖之中又曰太霄琅書乃九天飛霄之典瓊文帝章乃工文也並以元始生於自然空洞之中中虛皇玉帝受於九𤣥鑄金爲簡刻玉結篇金縷玉字以明寳文秘於九天之上洞神經曰有三都印三皇印九天印鉅天下又曰有三皇玉劵一名金契又曰受三皇法湏玉簡長一尺二寸廣一寸厚二分無者槿桐准也又曰通謁三皇之簡以青玉作之赤金爲字金根經曰金簡玉札出自太上靈都之宫書以朱文編以朱繩又曰有神華玉門真人授金簡之處又曰領仙玉即賫金簡紫籍來於東華青宫校定玉名又曰玉皇刻降丹精玉芝金璽鳳章也玉寳青宫之内有金章鳳璽又曰青宫北殿有金章鳳璽真人得之又曰青宫之内北殿上有仙格金架也格上有學仙簿籙及𤣥名年月深淺金簡玉札有十萬篇領仙玉郎之典也又曰青宫無金簡之籙玉格無𤣥編之名神經亦不可得披大洞玉經曰讀𤣥一洞經者神臺刋名於福連之簡太上金簡玉札名爲福連之書也又曰真陽者上清之宫名福連之簡刋其内伍符經曰真一食伍牙天文西毋刻以黄金之札封以丹芝光草印以太上中章茅君内傳曰茅盈在桓山内夢太𤣥玉女把玉札携之又曰天上道君有玉與鳳璽又曰太元真人有一人帯籙章囊又一人帯繡章囊一人帯錦嚢書金真玉光經曰有紹靈之章保生玉章又曰此經髙妙衆經之尊總御萬真匡御群仙𤣥符流映洞明紫晨秘於九天之宫鑄金爲簡以撰靈文刻玉丹書曰八明其篇也又靈寳自然經曰太上諸仙真以黄金爲簡丹玉書之又太真科以玉牒金書七寳爲玉簡七聖𤣥記曰刻以白銀之簡結爲飛青之文又曰廣靈之堂廻天九霄白皇青籙刻其内太真科曰丹簡者以朱漆簡明火立陽也墨籙者以墨書文明水主隂人學長生故名丹墨籙秘不安傳又曰天皇執飛仙玉䇿人皇執上皇保命玉䇿地皇執元皇籙定之䇿三華寳曜内真上經曰太帝靈都宫中有二十四萬上真仙人皆鑄金爲簡白銀結編紫華書文誦詠此篇三天正法曰三天九微𤣥都太真靈籙者秘在太上靈都之宫刻以紫玉爲簡黄金爲文付五老上真仙都左公封以紫蘂玉笈盛以雲錦之嚢南岳夫人内傳曰白簡素籙以白玉爲簡以青玉爲字故謂之白簡青籙皆記得道之人名姓道學傳曰金簡有王元規之筆迹太上素經曰凢受太上皇素經者傳盟用玉札一杖長一尺五分廣一寸四分又云有三元秀簡真誥曰清虛真人詣三元君受玉璽金章龜山元籙曰丹文紫章神虎七元交光之章流金紫章太上命神之章夜光寳章九色離羅之章靈書紫文經曰靈書紫文上經刻以紫玉爲簡青金爲文黄籙簡文經曰投金龍一枚丹書玉札青絲纒之以關靈山五帝昇度之信封於絶巖之中一依舊法又曰丹書玉札一枚金龍一以青絲繫石沉三河以闗水帝昇度之信一依玉訣舊文太洞玉經曰太上經簡玉札名爲福連之書又曰太上書以彤玉之札則玉映之堂可見四明之門可入也後聖道君列紀曰刻以紫玉爲簡青金爲文龜母按筆真童拂筵玉童結編名之曰靈書龍飛尺素隱訣曰太㣲天帝君命羽仙侍郎奉金按以請飛行羽章太一洞真𤣥經曰白元司命五人朱衣絳巾各捧一白玉案上有所主簡紫度炎光經曰龜人捧筆太一拂筵天妃侍香王筆結綸以白玉爲簡金書保仙上符仙都也左公封以玉笈雲錦之嚢變化經曰金光立空之案雲錦之嚢封九赤班符于𤣥元之中南極長生司命君得之玉佩金璫上經曰九老仙都捧金精立空之案上請寳文以授衆真空洞靈章經曰白簡度品青籙定仙太元上上經曰非有瓊籙玉名刻簡三清者不得金虎内符靈書經曰東方九氣天中靈寳度命品章出自元始東華青童君封之清玉寳函之中印以元始九氣之章神仙中經曰老子度闗時爲尹喜著五千言觧五十五章是手所書也能行此道知元氣父母天地之先不知此者徒自苦耳太微天帝君以紫簡注紫度炎光經篇目金簡書其止文𤣥章在焉玉皇譜籙曰髙上衆真結自然之章金𤣥羽章經曰玉清八景隱書金𤣥内文生於元始之先即天之書也以威百神諸天内音經曰天有飛𤣥自然之氣合和五音以成天中無量洞章赤書玉訣上經曰無始靈寳告水帝削除罪簡上間九天金龍驛傳在朱書銀木簡以投三河之淵初用金鈕九雙連簡沉之於清泠之泉理本命之岳三官九府書人功過其理甚明隱元内文經曰青童君延萬帝於曲宇講寳訣之妙章洞真經曰六層玉臺在九天圖之上臺上有金簡玉札及紫鳳丹章十萬篇太上真文玉郎典之玉光八景經曰玉寳臺太空之章封其内飛行羽經曰上皇九轉之道絳簡紫書秘於紫天元臺二十四生圖曰披九光玉藴出金書紫字玉文丹章三部八景二十四生圖置白玉案上靈寳隱書曰玉誕者曇誓天十都名也上有大洞之章紫書玉字煥乎上清玉京山齋曰諸髙仙真人大㑹太上𤣥都披空洞歌章靈書經曰東方九氣天中靈書度命品章出自天元始東華青宫青童君封之青玉寳函之中印以元始九氣之章又南方三氣丹天靈書度命玉章出自元始朱陵上宫南極上元君封之赤玉寳函之中印以太丹三氣之章又西方七氣天中靈書度命玉章出自元始西華宫中金母封之白玉寳函之中印以太素七氣之章又云北方五氣天靈書度命玉章出自元始北上宫中玉晨君封之𤣥玉變之中印以太𤣥五氣之章二元布經曰髙上三元經者乃三清真書也上真玉檢飛空之篇上元檢天人籙中元檢仙真書下元檢地仙文如是寳篇髙上皆刻金丹書盛以自然雲錦嚢封以三元寳神之章藏於九天之上大有之宫金臺玉室九曲丹房靈寳赤書曰元始命太真按筆玉妃拂筵鑄金爲簡刻書玉篇五老賞籙秘於九天靈都之宫廻天九霄經曰於是太一拂筵天妃侍香玉華執巾丹書紫字刻於白金隱起靈顔結於玉篇題以青籙得道之名龍景九文紫鳳赤書經曰太上命太極真人授以玉簡金書寳洞飛霄絶𤣥之章玉帝𤣥記曰中皇元年九月七日七聖齋靈清長宫記其得道之篇刻以白銀之簡藏於雲錦之嚢封以啓命之章付以五老仙都左宫掌籙瓊宫又曰古空洞之中有㢠廻天文四司所保五帝所銓七聖又定簡舉形合先大有經曰太上玉章刻玉爲簡總御萬真真經曰東方嵗星青帝勾芒佩通明之印南方熒惑赤帝太昊佩太陽之印西方太白白帝少昊佩通隂之印北方辰星黒帝顓項佩通神之印中央鎮星大帝文昌佩方神之印本際經曰有十二法印紫書金根經曰有青精玉璽金房上經曰大帝靈神都宫中有金房度命延年之訣鑄金爲簡刻白銀之編紫筆書文消魔經曰發九天之朱匱望上清之瓊劄𤣥書既刻於玉章絳名始列於靈闕大洞真經曰八景玉籙藏於太素瑶臺𤣥雲羽室封以欝森之笈玉清三元之章簡劄品曰青童君曰無金簡者銀木亦可當也無玉札者桐木亦可當但令精好也真理無有闇節當取劄於雲錦之嚢此上真之號玉帝之靈篇也上清九真中經内訣有𤣥靈元君寳秘奔日月之玉章神州七變經曰太隂玉晨九天真妃紫晨君受流精飛景寳章太清中經曰有天一八極璽龜山元籙曰有流金鳳璽又曰天皇太帝遣繡衣使者全廣子期授茅盈以神璽玉章金闕聖君命太極真人使正一上𤣥玉郎王忠鮑兵等與茅盈卿經太上飛行羽經曰太真丈人衣九色飛雲曜光羽章靈飛六甲經曰玉真青君帯流金鳳章太上九赤班符五帝内經曰封靈制魔之章黄神中皇之章三皇經曰三皇自然之文皆以金玉爲用天皇所授𤣥玉爲簡青玉爲文地皇所授黄玉爲簡白玉爲文綴以金鈎聮以金鏁置以金案覆以珠巾寳蓋珍床安之青宫閑之紫閣芬以五香侍以十華色神州七轉七變經曰流金鳳璽紫晨上皇先生所佩三皇序目曰九天印文以召九天校事也上清變化經曰髙上虛皇君佩丹黄玉章又云三元太明上皇君帯神虎紫章又有皇上帝君佩金虎鳳文帯神虎玉章又曰九霄真玉佩金鳳璽歴藏經曰天王侯帯紫綬金印五岳真圖曰太山君佩通陽大明之印衡山君佩夜光天真之印嵩山君佩神宗陽和之印華山君佩開天通真之印恒山君佩長津悟真之印青神丈人佩三庭之印後聖列紀曰紫㣲上真天帝玉清君遣八景瓊輿來迎聖君以登上清宫賜蘂剛丹玉鳳璽後聖九𤣥道君列紀曰太隂法有死生有黒籙白簿真清丹編簡受生先後之相次也後聖道君列紀曰玉清君賜道君玉鳳璽飛行三界經曰下有太一紫綬金印威喜天帝信璽脩靈寳飛行三界之道真人所佩五稱符上經曰五皇通靈之印印五星靈符道學傳曰吳王闔閭得真文不觧封以黄金之檢印以玉皇之章以問魯大夫孔子又曰禹封五符以金英之函檢以𤣥都之印神仙傳曰衞叔卿語其子度世云可於室西北柱下取我仙方按而服之令人長生度世掘得玉函封以飛仙之印取按之服五色雲母仙去北帝經曰鄷都秘印救世間攝制鬼神集仙籙曰杜蘭香女仙也於洞庭包山降張碩家碩蓋脩道者也授以飛化之道留玉簡玉唾盂又賫黄麟羽帔此上仙之所服非洞天之所有也太平御覽卷六百七十六
