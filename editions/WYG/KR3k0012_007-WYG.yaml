  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_007-1a, image: WYG0893/WYG0893-0086a.png}
body:
  text: 太平御覽卷七宋李昉等撰天部七星下瑞星妖星附星下河圖曰以徳布精上為衆星龍魚河圖曰太白之精下為風伯之神主司刑星辰之精下為靈星之神主得土河圖帝徵篇曰帝滛佚政不平則奎有角異苑曰陳仲弓從諸子姪造荀季和父子于時徳星聚太史奏五百里内有賢人聚雜兵書曰春斗為天關軫為地梁夏角為天關參為地梁又四帚星四向守之君有徳天下豐熟古辛異曰仰觀天形如車蓋衆星纍纍如連貝張衡靈憲曰星者體生於地精成於天列居錯峙各有攸屬中外之宫常明者百有二十可名者三百二十為星二千五百㣲星之數盖一萬一千五百二十庶類蠢蠢咸得係命不然何以總而理徐整長厯曰大星徑百里中星五十小星三十北斗七星間相去九千里皆在日月下天文要集曰七公天之相也三公廷尉之象也上星上公也次星中公也星明則七輔强天官星占曰嵗星其國齊其位東方蒼帝之子人主之象也其色明而内實暗天下安寧夫嵗星所居國人主有福不可加以兵嵗星一曰攝提一曰重華一曰應星一曰經星一曰脩人嵗星動人主怒無光仁道失嵗星順行仁徳加也嵗星農官也主五榖春不勸農則嵗星盈縮所在之國不可以罰小則民多病大則喜又曰熒惑主憂位在南赤帝之子方伯之象也為天候主嵗成敗司察妖孽所徃有兵為亂為賊為疾為䘮為饑為兵蓋天下不理也東西南北無有常出則有兵入則散周旋止息乃為死䘮又曰鎮星主徳女主之象也所居國有德不可以軍加也又曰辰星北之位黒帝之子宰相之祥也一名安調一名熊星一名鈞星一名伺晨主徳常行四仲當出不出天下旱色黄五榖熟色白中謀泄色青大臣憂又曰太白位在西方白帝之子天將之象也一名天相一名大正一名大臣一名大皓一名明星又曰紫㣲者天之帝座也一名天營一名長垣又曰圵辰者一名天關一名北極極者紫宫太一座也太㣲者天闔也南端門間十星分為左右掖太㣲之宫天子之庭五帝之座也北斗為帝車運於中央臨制四方圵斗魁第一星少㣲一名處士星明大而黄澤即賢士舉忠臣用招揺者當陽也一名矛盾胡星也荆州星占曰五星天府一名天法主察奸謀又軒轅主雷雨之神旁側郎位主宿衛又河鼔一名三武一名天鼓又市天子旗幟也大明則糴賤又五車一名天庫凡十四星五車中有三柱三星若不見兵盡起又心為天王其中三星一名天司空又箕宿四星第二星一名風后又箕舌一星動則大風至不出三日又太白出東北為觀星出東南為明星出西方為太白楊泉物理論曰星者元氣之英水之精也又日月之精為星辰星辰生於地又星元氣之英日精也二十八宿度數有常故謂恒星鹽鐵論曰常星猶公卿也衆星猶萬民也列星正則衆星齊常星亂則衆星墜矣崔豹古今注曰漢明帝為太子時令樂人作歌詩曰星重輝云太子七徳故云重輝庾闡詩曰𤣥景如映璧繁星如散錦瑞星易坤靈圗曰至徳之萌五星若貫珠尚書中候曰帝堯即位景星出翼尚書考靈曜曰天地開闢甲子冬至日月五星俱起牽牛初日月若懸璧仰觀天形如車蓋衆星纍纍如連貝史記曰黄帝時景星見形如半月可以夜作又南極老人星見則天下安漢書曰髙祖初入關五星聚於東井秦分野司馬遷天官書曰景星其状無常常出有道之國朱宣帝王世紀曰神農氏之末少昊氏娶附寳見大電光繞北斗樞星照郊外附寳孕二十月生黄帝於夀丘魏志曰桓帝時有黄星見楚宋之分殷馗言後五十嵗當有真人起梁沛間其鋒不可當其後五十年曹公破袁紹天下莫敵矣晉中興書曰元帝渡江嵗鎮辰太白等四星聚於牛女間禹時鈞命决曰星累累若貫珠炳炳如連璧帝命驗曰有人雄起戴玉英履赤矛鄭𤣥注曰赤矛瑞星名河圖曰大星如虹下流華渚女節意感生白帝也孫氏瑞應圖曰景星者大星也狀如半月生於晦朔助月為明王者不私人則見又王者承天則老人星臨其國天文録星占甘氏曰五星同色天下偃兵百姓安寧歌舞以行不見疾疹五榖大昌文子曰精誠内形氣動於天則景星見列子曰流星貫昴脩紀感而生禹妖星劉向洪範傳曰彗者去穢布新者也此天所以去無道而建有徳也鄭𤣥曰彗星主掃除又彗星者君臣失政濁亂三光五星逆錯變氣之所生也左傳曰昭公五年冬有星孛于大辰西及漢申須曰彗所以除舊布新也又昭二十六年齊有彗星齊侯使禳之晏子曰無益也祗取誣焉天道不謟不貳其命若之何禳之且天有彗也以除穢也君無穢徳又何禳焉詩曰惟此文王小心翼翼昭事上帝聿懐多福厥徳不回以受方國君無違徳方國将至何患于彗爾雅曰彗星為欃槍春秋考異郵曰鯨魚死而彗星出淮南子亦云尚書帝命驗曰天鼔動王弩發天下驚史記曰蚩尤旗類彗而後曲象旗見為王者征伐四方之兆又齊景公三十二年彗出公坐柏寢歎曰堂乎堂乎誰有此乎羣臣皆泣晏子笑公怒晏子曰臣笑羣臣諛甚景公曰彗星出東北齊分野寡人以憂晏子曰君髙臺深池賦歛如弗得刑罰恐弗勝茀星将出彗星何懼乎公曰可禳乎晏子曰使神可祝而来亦可禳去也百姓苦怨以萬數而君今一人禳之安能勝衆口乎又天官書曰天狗状如奔星有聲其下止地類狗望之如火光炎炎衝天其下圓如數頃田處上鋭則黄色千里破軍殺將又長庚如一疋布著天見則兵起漢書曰獻帝初平四年有流星八九丈西北行有聲如雷望如火照地是曰天狗金門之山有赤犬其聲下者有兵也又哀帝建平二年彗出牽牛日月五星所從起厯數之元三正之始彗而出之改更之象也其後王莽簒國又枉矢類大流星蛇行而蒼黒望如有毛又鄒陽上書曰衛先生為秦畫長平之事太白食昴昭王疑之漢書天文志曰凡月蝕五星其國皆亡嵗以饑熒惑以亂鎮以殺太白強國以戰辰以女亂又始皇之時十五年間彗星四見久者八十日長或竟天後秦併六國外攘四夷死者如亂麻後漢書曰安帝永初三年正月太白晝見占云為強臣是時鄧氏方盛此其應也續漢書曰靈帝光和中國星見東南如炬十餘日其後黃巾張角起袁紹董卓亂西漢詞圃曰項籍之敗孛大角吳志曰孫權時有長星從東南出群星從之又司馬宣王圍公孫淵夜有大流星長數十丈墜襄平東及淵走當流星處斬之晉書曰張華為司空中台星坼少子韙勸華遜位華云天道𤣥逺須修徳以應之孫氏晉陽秋曰有星赤而芒角自東北往西南沒于諸葛亮營俄而亮卒又㑹稽謝敷字慶緒隱若耶山初月犯少㣲星少㣲一名處士星時戴逵名著於敷時人憂之俄而敷死故㑹稽人士嘲曰吳中髙士求死不得死宋書曰吳孫休永安元年有諸子群嬉中有異眼光芒爚爚外射諸兒問之曰我熒惑也将示爾三公歸于司馬言畢乃聳身而躍仰視之若曵一疋練有頃而沒後四年蜀亡六年魏廢二十一年吳平是歸司馬也又沈懐文傳曰時熒惑守南斗上乃廢西州舊館使西陽王子尚移居東城以厭之懐文曰天道示變宜應之以徳今雖空西州恐無益也唐書曰有星孛于虚危厯于氐百餘日乃滅太宗謂羣臣曰天見彗星是何妖也虞世南曰昔齊景公時有彗星見公問晏嬰對曰公穿池沼畏不深起臺榭畏不髙刑罰畏不重是以天見彗星為公誡耳景公懼而修徳後十六日而星沒臣聞天時不如地利地利不如人和若徳義不脩雖獲麟鳳終是無補但政事無闕雖有灾何損於時然願陛下勿以功髙古人而自矜伐勿以太平漸久而自驕怠慎終如始彗星雖見未足為灾又元和八年太白犯上相厯執法占者言今之三相皆不利始輕末重月餘李絳以足疾免明年十月李吉甫以暴疾卒九年六月武元衡為盗所害又李晟初屯渭橋時熒惑守嵗久之方退賔介或勸曰今熒惑已退皇家之利也可速用兵晟曰天子外次人臣但當死節垂象𤣥逺吾安知天道耶至是謂叅佐曰前者士大夫勸晟出兵非敢拒也且軍可用之不可使知之常聞五緯盈縮無准晟懼復來守嵗則我軍不戰而自潰矣叅佐歎服皆曰非所及也又傅奕相州鄴人也尤曉天文厯數隋開皇中以儀曹事漢王諒諒反問奕曰今兹熒惑入井是何祥也奕對曰天上黄道所經其中正是熒惑行路所渉不為怪異若熒惑入地上井是為灾也郭子横洞㝠記曰武帝嘗見彗星方朔折星指之木以授帝帝以指彗彗遂沒星出之夜野獸皆鳴或訛為獸鳴星吕氏春秋曰宋景公時熒惑在心公召子韋問焉子韋曰固當君可移於相公曰相所與理國家也曰可移於百姓曰百姓死寡人將誰為君曰可移於嵗公曰嵗饑人餓必死焉為人君而殺其人誰以我為君子韋曰君有至徳之言三天必三賞君熒惑必徙三舎後果三徙晏子春秋曰景公時熒惑守虛朞年不去晏子曰虛齊之分野當强為善公乃去寃聚之獄振孤敬老行之三日而熒惑遷尉繚子曰昔楚將軍子正與齊戰未合初夜彗星出柄在齊所在勝不可擊子正曰彗何知明與齊戰大破之天文録曰積尸大陵之尸也石氏曰積尸明有大䘮死人如立丘山也又孛星者彗星之屬也偏指曰彗芒氣四出曰孛孛謂孛孛然也又五星反羽其下之國不可久處反羽者光芒上大下小状如反羽也又昴者天之耳也主西方故爾雅曰西陸昴也星讃曰昴主獄事典治囚也又胡星也一曰旄頭旄頭者天執罦畢前驅者之所罰也河圖稽耀鈎曰辰為枉矢流射所誅又熒惑散為蚩尤旗主惑亂又太白散為天狗主兵又嵗星流為國皇主内難太平御覽卷七
