body:
  text: 太平御覽卷八百四十九宋李昉等撰飲食部七食下鬻子曰禹嘗據一饋而七起日中不暇飽食曰吾不畏士留道路吾恐其留吾門庭四海民不至也晏子曰晏子相景公食脱粟之食炙三弋五卵菜耳公曰噫夫子家如此甚貧乎而寡人之罪對曰脱粟之食飽士之一足也炙三弋士之二足也菜五卵士之三足也嬰無倍人之行而有三士之食君之賜厚矣嬰之家不貧再拜而辭又曰晏子相齊三年政平民悦中食而肉不足景公曰封晏子以都晏子辭不受又曰寡婦樹蘭生而不芳繼子得食肥而不澤墨子曰聖王制飲食足以充虛繼氣强股肱使耳目聰明不極五味之調芬芳之和不致逺國珍怪異物也又曰不可衣短褐不可食糟糠飲食不美面目顔色不足視也衣服不美身體従容不足觀也是以食必粱肉衣必文繡莊子曰巧者勞而智者憂無能而無所求飽食而遨逰汎若不係之舟又曰秋禽之肥易牙和之非不美也彭祖以為傷夀故不食之又曰亷者不食不義之食不噉不義之水又曰孔子病子路出卜孔子曰汝待也吾坐席不敢先居處若齊食飲若祭吾卜之久矣慎子曰小人食於力君子食於道燕丹子曰太子常與荆軻同案而食同牀而寢公孫尼子曰食甘者益於肉而骨不利也又曰太古之人飲露食草木實聖人為火食號燧人飲食以通血氣關子曰義渠之人烹龜鼈不熟臊穢腥臭中國之民雖飢餓三日不啓口至死弗食也吳章莊吉受而和之病人食之為之輕體萬乗飲之為之解怒故龜鼈至腥臊不可加然而病人為之輕體萬乗為之觧怒何也呉章莊吉之調存也韓子曰堯之王天下糲粢之食藜藿之羮雖監門之養不厭於此矣又曰吳起出遇故人而止之食故人有他故期反而食至暮不来起不食而待之明日故人来乃得與之食又曰孫叔敖相楚糲飯菜羮枯魚之膳又曰管仲束縛自魯之齊路飢而泣過綸邑乞食封人跪而食之因竊謂仲曰若用齊將何報我曰如子之言我且賢之用能之使勞之綸我何以報子封人怨之又曰季孫相魯子路為郈令魯以五月起衆為長溝當此時季路以其私秩粟為漿飲要溝者於五衢而飡之孔子聞之使子貢往覆其飲擊毁其器曰魯君有民子奚為乃飡之子路怒攘肱而入請曰夫子疾由之為仁義乎所學於夫子者仁義也仁義者與天下共而同其利者也今以由之秩粟而飡民其不可何也孔子曰由之野也吾以女知之女徒未及也女故如是之不知禮也女之飡之為愛之也夫禮天子愛天下諸侯愛境内大夫愛官職士愛其家過其所愛曰侵今魯君有民而子擅愛之是子侵也不亦誣乎言未畢而季孫使者至讓曰肥也起民而使之先生令弟子止徒役而飡之將奪肥民耶孔子駕而去魯又曰凡人上不屬天下不著地以腸胃為根本不食則不能活是以不免於欲利之心欲利之心不除其身之憂也故聖人衣可犯寒食足以充虛則不憂矣又曰嬰兒共戲以塵為飯以塗為黍以木為胾薄暮必資餉食者塵不可食也又曰餓歳之春從弟不讓穰歳九秋踈客必食非踈骨月多少之心異也孟子曰飢者甘食渴者甘飲是未得飲食之正也飢渴害之也豈惟口腹有飢渴之害人心亦皆有害孫子曰鑠金洪爐盗隸不探鴆肉在爼餓徒不食淮南子曰煎熬烹炙調齊和之適以窮荆吳甘酸之變符子曰顔子有疾三日不食問之曰吾師也食非丹不飡茹非芝不食故七百歳子何不吮瑶以延生咀蘂以養齡也禮含文嘉曰燧人始鑚火炮生為熟使人無腹疾山海經曰有叅青鳥為西王母取食呂氏春秋曰有娥氏有三佚女為之九成之䑓飲食必以皷又曰湯得伊尹設朝見之説湯以至味湯曰可得為之乎對曰君之國小不足以具之為天子然後可具三部之蟲水居者腥肉攫者臊草食者羶臭惡猶美皆有所以凡味之本水最為始五味三材九沸九變火為之紀時有疾徐滅腥去臊鼎中之變精妙微纎口不能言志不能喻若射御之微隂陽之化四時之數故久而不弊又曰趙襄子攻翟勝左人中人使者来謁之襄子方食摶飯有憂色左右曰一朝而下兩城此人之所喜今君有憂色何也襄子曰河之大也不過三日焱風暴雨日中不須臾今趙氏之徳行無所積一朝而下兩城亡其及我乎白虎通曰王者四食何明有四方之物食四時之功也四方不平四時不順有徹膳法焉所以明至尊著法戒也惟王者居中央制御四方平旦食少陽之始食時太陽之始晡食少隂之始食時太隂之始説文曰饔熟食也餱乾食也篒具食也􅴱中食也餔日加申時食也饛盛器滿也餬寄食也飫􅀈食也餞送去食也飪火熟也釋名曰食殖也所以自生殖也鹽鐡論曰古者燔黍而食捭豚相享賔㛰相召豆羮白飯今則燔炙滿案臑豚炰鼈膾鯉説苑曰晏子所與同衣食者百人皆天下之至士也又曰晏子侍景公曰朝寒請子進煖食於寡人對曰臣非厨養之臣社稷之臣也又曰子思居於衛緼袍無裏三旬九食又曰魯有儉者煮甂中之食甂必眠切小盆食而美以遺孔子孔子受之如受犬馬之遺弟子曰先生何為受之喜如此曰非以煮甂之薄也食之美故念吾親也楊子法言曰或曰食如蟻衣如華金珠煌煌無已泰乎曰由其徳舜禹受天下不為泰不由其徳亦泰矣李執注曰蟻言精細或曰北夷被我純繢𢃄我金犀珎膳曼餬不亦厚乎曰社稷靈也不可不厚也論衡曰王子喬不食榖夀百歳按之生禀飲食之性故形上有口齒下有孔竅以注㵼口齒以進食王子喬形體與人同何以獨能度世耶夫衣以温膚食以充腸衣温食飽則神明精盛人之生也以食為氣草木以土為氣閉口不食㧞草離土必不夀矣桓譚新論曰太原郡隆冬不火食五日雖病不敢觸犯王者宜應改易􅅗夫論曰何知國之将亂也以其不嗜賢也故病家之厨非無饌也乃其人弗之能食故遂至於死也亂國之官非無賢人其君弗能存故遂亡矣又曰欲知人且疾不嗜食欲知國將亡不嗜賢風俗通曰俗説􅗬馬啖賔客宴食已􅇅主意未盡欲復飲酒餘無他更出脯鮓椒薑鹽豉言其速疾如􅗬音顛馬之𫝊命又曰俗説臨日月薄食而飲令人蝕口謹案日大陽之精君之象也日有蝕之天子不舉樂里語不救蝕者出行遇雨恐有安坐飲食重慎也又曰堪輿書云上朔會客必鬪争按劉君陽為南陽牧嘗正朔設盛饌了無鬪者蔡邕月令論曰問者曰春食麥羊夏食菽鷄魚之屬但以為時味之宜不合之於五行月令服飾所食器械之制皆従五行者説所食獨不以五行已畧乎曰亦嘗思之矣凡十二辰之㑹丑時所食者必家人所畜丑牛未羊戌犬酉鷄亥豕而已其餘虎以下非食也汝南先賢傳曰周舉字宣光為并州刺史太原舊俗以介之推燒死至其亡時民為絶火食老少多死舉作書置于推廟中説民不宜寒食因勒使炊食如故益部耆舊𫝊曰何祗字尹肅為人寛厚通濟體甚壯大侈飲食好聲色不治節檢時人少貴之者曹毘杜蘭香𫝊曰蘭香戒張碩不露頭食永昌郡𫝊曰獠民口嚼食并以鼻飲水異苑曰新野蘇卷與婦佃於野舍每至飲時輙有一物来其形似蛇長七尺五寸有光采卷異而飴之遂經數載産業加焉婦後宻打殺即得能食病日進三斛飯猶不飽少時而死幽明録曰海中有金䑓出水百丈餘結搆巧麗窮盡神工䑓内有金機彫文偹制上有百味之食四方力神常立守䕶有一五通仙人来欲甘膳四神排擊之而退又曰河南趙良與其鄉人諸生到長安界遇霖雨糧乏相謂曰飢正爾當那得食耶應時美飯備在前兩人驚愕不敢食有人聲曰但食無嫌也明日早兩人復曰那復得美食即復在前遂至長安無他禍福祖台之志怪曰建康小吏曹曽見盧山夫人夫人為設酒噉餘鳥啄􅑥其中鏤刻竒飾異形非人所名下七子合盤盤中亦無俗中餚秦記曰苻朗甚别味㑹稽王道子為朗設盛饌問曰闗中之食孰若此答曰皆好唯鹽味少遜嵩髙山記曰山下巖中有一石屋亦有自然經書自然飲食博物志曰魏明帝時京邑有一人食噉兼十人遂肥不能動其父嘗為逺方長吏送彼往縣令傳食之一二年間一鄉為儉齊諧記曰江夏郡安陸縣隆安之初有一姓郭名坦兄弟三人其大兄忽得時行病病後遂大能食一日食斛餘米其家供給五年乃至罄貧語曰汝當自覔食後至一家前門已得飯復至後門乞其人斥之答曰實不知君有兩門腹大飢不可忍後門有三畦韮一畦大蒜因噉兩畦便大悶極卧地須臾大吐吐出一物似鱉出地漸漸大少頃主人持飯出腹不能食遂撮飯向所吐出物上即消成水此人於此病遂得差袁淮正書曰方丈之食不過一飽綈袍之繡不過一煖裴𤣥新言曰管仲奪伯氏駢邑三百使之飯蔬食没齒無怨言若管氏取以營私則一邑不可奪也又曰孝子欲親之食云我已食欲親之衣云我不寒此漫孝也神仙𫝊曰焦先者字孝然河東太陽人鄉里累世云百七十歳常煮白石以與人熟如大芋者日日入山伐薪以布施先従村頭一家起周而復始担薪以置人門外人見之時即鋪席與坐為設食先便就坐食亦不與人語若人不見其擔薪往時乃置薪於人門間便去連年如此結草庵於河渚或數日一食欲食則為人賃作人以衣衣之乃使限切為值足得一食輙去人欲多與終不肯取有數日不食時束晳發䝉記曰亷頗既老日噉肉百斤曹植與呉季重書曰食若填巨壑飲若灌漏巵其樂固難量豈非丈夫之樂哉世説曰陳太丘詣荀朗陵貧儉無僕従廼使元方將車季方持杖従長文尚小載着車中既至荀使叔慈應門慈明行酒餘六龍下食又曰桓公坐有叅軍椅蒸薤不得觧共食者又有不助而椅終不放者桓公笑曰同盤尚不相助况復危難勅令免官又曰劉真長王仲祖共行日旰未食有相識小人飴其飡者餚饌甚盛真長辭焉言曰小人都不可作緣又曰羊曼拜丹陽尹客早至並得佳殽日晏則漸罄不復及精随客早晚不問貴賤羊固拜臨海令飲食皆美雖晚至者猶獲其盛饌時論以固之豐腆乃不如曼之真率也又曰王東亭嘗之呉郡就汰公道人宿别浦許府家往凡官寺設幔屋竟一寺東亭將夕至夜後汰公設豆藿糜汰公自噉一大甌東亭有難色汰公强進半甌須臾東亭行帳設茗飲食果炙畢偹汰公都無所噉俗説曰桓城性噉㗱犬大司馬每過城時使従兄索食黄帝八十一問曰人不食七日而死者何也曰人胃中常有留糓三㪷五升水三升故平人一日再至清一行二升半日中五升七日七五三㪷五升而水糓盡矣故平人不食飲七日而死者水糓津液俱盡故也𢎞君舉食檄曰取灄􅀈獨穴之鯉灄音攝赤山後陂之蓴伺漉冷䜴及熱應分食畢作躁酒炙冝膊酒便清香肉則豆闕㹀麞肶若波潘急火中炙脂不得薰聞香者躑躅干咽者塞門羅奠椀子五十有餘牛膝𢷬炙鴨臐魚熊白麞脯糖蟹濡䑓車螯生甜滋味逺来日醉之後談悶不除應有蔗薑木𤓰元李楊梅五味橄欖石橊𤣥枸葵羮脫煮茗下一杯明皇雜録曰天寳中諸公主相效進食上命中官袁思藝為檢校進食使水陸珍羞數千盤之費盡中人十家之産中書舍人竇華嘗因退朝遇公主進食方列於通衢乃𫝊呼按轡行於其間宫苑小兒數百人奮挺而前華僅以身免嶺表録異曰康州悦城縣北百餘里山中有樵石穴每歳鄊人琢為燒食器但燒令熱輙以物儭閣置之盤中旋下生魚肉及葱韮韲葅􅀈之類頃刻即熟終席煎沸南中有親朋聚會多再頻食亦極饔熱疑石中有火毒太平御覽卷八百四十九
