body:
  text: 太平御覽卷九百二十六宋李昉等撰羽族部十三鷹鶻鸇隼鷂鵰鷲鶚白鷢鷹春秋運斗樞曰瑶光星散為鷹禮記月令曰驚蟄之日鷹化為鳩又曰七月鳩化為鷹然後設蔚羅左傳文公十八年季文子使太史克對宣公曰先大夫臧文公敎行父事君之禮行父奉以周旋弗敢失墜曰見無禮於其君者誅之如鷹鸇之逐鳥雀也又昭公四郯子曰少皡鳥師而鳥名爽鳩氏司寇者也杜預曰爽鳩鷹鸇鳥也故為司冦主盗賊也又襄公四曰子産始知然明問為政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀毛詩曰唯師尚父時唯鷹揚如鷹之飛揚也箋云鷹鷙鳥也爾雅曰鷹鶆鳩郭璞注曰鶆當為鷞字之誤也左傳作鷞鳩是也善擊官于代郡捕之又曰鷹隼醜其飛也翬鼔翅翬翬然疾春秋考異郵曰金伐木故鷹擊雉易通卦驗曰鷹者鷙殺之鳥周書曰驚蟄之日鷹變為鳩小暑之日鷹乃學習處暑之日鷹乃祭鳥大戴禮曰正月鷹則為鳩鷹也者其殺之時也鳩也者非其殺之時也善變而之仁故具言之也鳩為鷹而之不仁故不盡其辭史記曰李斯臨刑思牽黄犬臂蒼鷹出上蔡東門不可得矣漢書曰鷹隼未擊矰弋不得施於蹊隧又酷吏傳曰郅都為濟陽太守時人號為蒼鷹又曰孫寶為京兆尹請故吏侯文為掾立秋日文謂寳曰今鷹隼始擊當順天氣成嚴霜之誅後漢書曰崔駰與竇憲牋曰今日漢陽太守率吏卒數十人皆臂鷹牽狗云欲上幕府夫鷹犬所獲不過雉兎斯乃細人之事東觀漢記曰和熹皇后臨朝上林鷹犬悉斥放之又曰趙卿字孟卿太守桓虞署都郵新野令日責還印綬去虞歎曰善吏如使良鷹下韝即中馬融與謝伯世書曰憤憤愁思猶不解懐思在竹間放狗逐麋晩秋渉冬大蒼出籠黄棘下菟芼以乾葵以送餘日兹樂而已魏志曰吕布因陳登求徐州牧不得布怒登喻之曰登見曹公言待将軍譬如養虎當飽其肉否則噬人公曰譬如養鷹饑則為用飽則揚出布乃解晉書曰虞潭字思奥㑹沈充等逼京師潭起義軍至上虞有野鷹飛集屋梁衆懼潭曰起大義而剛鷙之鳥來破賊必矣後如其言又曰崔洪清厲骨鯁為尚書左丞時人為之語曰叢生荆棘來自博陵在南為鷂在北為鷹又戴記曰慕容垂請至鄴拜墓符堅許之權翼諫曰垂猶鷹也飢則附人飽便颺去遇風塵之㑹必有凌霄之志唯宜急其羈絆不可任其所欲堅不從南史曰王僧達性好鷹犬何尚之致仕復膺朝命於宅設八闗齋大集朝士自行香次至僧達曰願郎且放鷹犬勿復遊獵又曰齊鬱林王即位未踰旬多聚飛鷹犬以粱肉擁之陳書曰侯安都率水軍於中流斷齊軍糧運又襲秦郡破徐嗣徽柵收其家口得嗣徽所弹琵琶及所養鷹遣信餉之曰昨至弟住處得此今以相還嗣徽等大懼北史曰後魏華山郡王澄弟嵩孝父時位步兵校尉大司馬安定王休薨未及卒哭嵩便遊田帝聞大怒曰嵩大司馬薨殂一月爾便以鷹鷂自娱猶父之痛子之情損心棄禮何其太速便可免官又曰北齊廣陵王孝珩有技藝嘗於㕔事壁自畫一蒼鷹見者皆以為真三國典略曰元坦為冀州刺史不卹人事專為聚斂性好畋漁無日不出秋冬獵禽獸春夏捕水族鷹犬常數百頭器網十餘車自云寧三日不食不能一日不獵唐書曰太宗初傳位舊苑中有籠鷹悉斷聮任去良犬並解絏放之又曰太宗謂世臣曰李大亮可謂忠直矣朕遣使至其所見有佳鷹諷令獻朕大亮因宻表責朕云陛下久絶畋獵而使者求鷹若是陛下之意深乖昔㫖如其自便是任使非人朕覽表殊嘉歎不能自己有臣若是朕復何憂於是賜之金壺以章忠讜又曰乾源曜為京兆尹仍京師留守乾曜政存寛簡不嚴而理嘗有仗内白鷹因縱逸遂失所在上令京兆切捕之俄于野外獲之其鷹掛于叢棘而死官吏懼得罪相顧失色乾曜徐曰事有邂逅死亦常理主上仁明當不以此寘罪必其獲戾吾自當之不須懼也遂入自請失㫖之罪不問又曰憲宗時每嵗冬以鷹犬出近畿習狩謂之外按宣徽院供奉官為其使領徒數百恃恩恣横郡邑懼擾皆厚禮迎犒之恣其所便止舍私邸百姓畏之如冦賊戰國策曰唐睢謂秦王曰要離刺慶忌蒼鷹擊於殿上廣志曰有雉鷹有菟鷹一嵗為黄二嵗為撫三嵗為青故鷹獲麞出廬江幽明錄曰楚文王少時好獵有一人獻一鷹文王見之爪短神爽殊絶常鷹故為獵於雲夢置網雲佈烟燒張大毛羣羽族争噬兢搏此鷹軒頸瞪目逺視雲際無搏噬之志王曰吾鷹所獲以百數汝鷹曽無奮意将欺余耶獻者曰若効於雉兎臣豈敢獻俄而雲際有一物旋翔鮮白不辨其形鷹便竦翮而升矗若飛電須臾羽墮如雪血下如雨有大鳥墮地度其兩翅數十里衆莫能識時有博物君子曰此大鵬雛也文王乃厚賞之西京雜記曰茂陵少年李亨好馳駿狗逐獸或以鷹鷂逐兎皆以為佳名狗則有修毫釐徤白望青曹之名鷹則有青翅黄眸青暝金距之屬鷂則有從風鷂孤飛鷂論衡曰孔子畏陽虎却行流汗陽虎未必色白孔子未必面青鷹擊雀鶚啄鴈未必鷹鶚南方雀鴈西方自以筋力勇壮相勝服也秦子曰虎能雄猛不可以託麋鷹能飄擊不可以寄雛物理論曰使武士宰民如使狼牧羊使鷹養雛也焦贑易林曰鷹棲茂樹候雀往來益部耆舊傳曰馮顥為使者逐單于至雲中大将軍梁冀遣人求鷹止晉陽舍人不避顥顥收之使人擊鷹而亡也顥追捕急冀辭乃止古樂府曰豹則虎之弟鷹則鷂之兄魏文帝答擊劍書曰商風振條秦鷹秋吟斯可謂聲協鍾石氣應風律孫楚鷹賦曰郭延考與余遊後從者韝二鷹以侍側郭邉人也好弋獵顧盻心欲自娱樂請余為賦曰其為相也踈尾闊臆高鬐頽顱深目蛾眉状似愁胡曲嘴短頸足若雙枯麾則應机招則易呼背碣石以西遊經馬嶺而南徂隋魏彦深鷹賦曰惟兹禽之化育實鍾山之所生資金方之猛氣擅火德之炎精何虞人之多端運横羅以羇束加青􅁝於雙臉結長皮於兩足飛不遂於本情食不充於所欲逸翰由其暫斂雄心為之自局若乃貌非一體相乃多途指重十字尾貴合盧立如植木望似愁胡嘴同劒利脚等荆枯亦有白如散花赤如㸃血大文若錦細班似纈眼類明珠毛猶霜雪身重若金爪鋼如鐵或復頂平似削頭圎如卵臆濶頸長筋麤脛短翅厚羽勁髀寛肉緩求之事用俱為絶伴或似鶉頭或似鵄首赤睛黄足細骨小肘懶而易驚姦而難誘住不可呼飛不及走若斯之軰不如勿有若夫疾食速消此則有命兎頸猴立是為無病厠門忌大結肚惡軟絛不欲絶背不宜喘生於窟者則好伏巢於木者則常立雙骹長者則起遲六翮短者則飛急毛衣屢改厥色無常寅生酉就總號為黄二周作鴇千日成蒼雖曰排虛性殊衆鳥雌則體大雄則形小遇犬則驚猜得人則馴擾養雛則少病野羅則多巧察之為易調之實難格必高逈屋必華寛薑以取熱酒以排寒韝須温煖肉不陳乾近之令狎静之使安晝不離手夜便火宿㣲加其毛少减其肉肌羸腸痩心和性熟念絶雲霄志在馳逐鶻北齊書曰上洛王思宗弟思好少以騎射事文襄及文宣受命為左衛将軍改名思孝天保五年討賊文宣恱其驍勇謂曰爾擊賊如鶻入鵶羣宜思孝事故改名焉隋書曰劉昶字居士為太子千牛備身聚徒任俠不遵法度公卿子弟有力雄徤者轍将至家以車輪括其頸而奉之殆死能不屈者稱為壮士釋而與交黨與三百人其趫㨗者號為餓鶻隊唐書曰元和四年藹徳曷里祿沒弭施合宻理加可汗遣使請改廽鶻義􅂑廻旋輕徤如鶻又曰元和八年淄青節度使李師道進鶻十二命還之唐杜甫義鶻行曰隂崖有蒼鷹養子黒柏顛白虵登其巢吞噬恣朝餐雄飛逺求食雌者鳴辛酸力强不可制黄口無半存其父從西來翻身入長烟斯須領徤鶻痛憤寄所宣斗上捩孤影噭哮來九天修鱗脫逺枝巨顙折老拳高空得蹭蹬短草辭蜿蜒折尾能一折飽腸皆已穿生雖滅衆雛死亦垂千年物情有報復快意貴目前兹實鷙鳥最急難心炯然功成失所往用舍何其賢近經潏水湄此事樵夫傳飄蕭覺素髮凜欲衝儒冠人生許與分只在顧盻間聊為義鶻行永激壮士肝鸇爾雅曰晨風鸇也郭樸注曰鷂屬孟子曰為叢敺爵者鸇也為湯武敺民者桀與紂也隼毛詩曰織文鳥章白斾央央箋云鳥章隼之文章将帥之服又曰鴥彼飛隼其飛戾天亦集爰止隼急疾之鳥詩義疏曰鷂也齊人謂之擊征或謂之題肩或曰雀鷹春化為布榖此属數種皆為隼周易曰公用射隼于高墉之上春秋考異郵曰隂陽氣貪故題肩擊國語曰仲尼在陳有隼集於陳侯之庭而死楛矢貫之石弩其長尺有咫陳惠公使以隼如仲尼之舘仲尼曰隼其來也逺矣此肅慎氏之矢也昔武王克商通道于九夷八蠻使各以其方賄來貢使無妄職業於是肅慎氏貢楛矢石弩其長尺有咫先王欲昭其令徳之致逺也故名其括曰肅慎氏之貢矢以分太妃配虞公思而封諸陳古者分同姓以寳玉展親也分異姓以逺方之職貢使無忘服也故分陳以肅慎氏貢矢若使有司求諸故府其可得也求得之金櫝鷂說文曰鷂鷙也爾雅曰鷣負雀郭璞注曰鷣鷂也江東呼為􅀈善捉雀因名云廣雅曰顙肩鷸子籠脱鷂也廣志曰鷸子大如胡燕色似燕鷂食雀籠脱擊鳩鵲晉書曰王育京兆人也太守杜宣命為主簿俄而宣左遷萬人令杜令王攸詣宣宣不迎之攸怒曰卿往為二千石吾所敬也今吾儕耳何故不迎欲以雀遇我使畏死鷂乎唐書曰武徳初萬年縣法曹孫伏上表以三事諌其一曰陛下貴為天子富有四海凡曰蒐狩須順四時陛下二十日龍飛二十一日有獻鷂雛者此乃前朝之夙弊少年之事務何忽今日行之又曰太子承乾與漢王元昌相附託承乾賜以琵琶名馬元昌報以鷂子山雞又曰太宗得鷂絶􅖡異私自臂之望見鄭公魏徴乃藏於懐公知之遂前白事因語帝王逸豫㣲以諷諌語久帝惜鷂且死而素嚴敬徴欲盡其言徴語不時盡鷂死懐中又曰楊徳幹高宗朝為萬年令有宦官恃貴寵放鷂不避人禾稼徳幹擒而杖之二十悉捩其鷂頭宦者涕泣袒背以示于帝帝曰爾情知此漢獰何須犯他百姓竟不加問又曰貞元十四年九月中書門下奏賀嵯峨山獲白鷂荘子曰鷂為鸇鸇為布榖布榖復為鷂此物變也列女傳曰魏公子無忌方食有鳩飛入案下公子使人顧望見一鷂在屋上飛去公子乃縱鳩令出鷂逐而殺之公子暮為不食曰鳩避患歸無忌竟為鷂所得吾負之為吾捕得此鷂者無忌無所愛于是左右宣公子慈聲旁國左右捕得鷂三百餘頭以奉公子欲盡殺恐無辜乃自按劍至其籠上曰誰獲罪無忌者邪一鷂獨低頭不敢仰視乃取殺之盡放其餘名聲布流天下歸焉論衡曰儒書稱魏公子方欲賔客飲有鸇擊鳩鳩迯公子案下鸇追殺之於公子之前公子使人設網捕鸇得數千責殺鳩之罪擊鳩之鸇俯頭不敢仰視公子乃殺之此虛言也鸇有千數擊鳩飛去安可復得或是捕鸇者折其頸也夢書曰鷹鷂為攻剽殘心夢鷹鷂憂賊人也魏陳王曹植鷂雀賦曰鷂欲取雀雀自言雀微賤身體些小肌肉􅇤痩所得盖少君欲相噉實不足飽鷂得雀言初不敢語頃來轗軻資糧乏旅三日不食略思死鼠今日相得寧復舍汝雀得鷂言意甚怔營性命至重雀鼠貪生君得一食我命是傾皇天降鑒賢者是聴鷂得雀言意甚怛惋當死敝雀頭如果蒜不早首服捩頸大喚行人聞之莫不往觀雀得鷂言意甚不移目如擘椒跳蕭二翅我當死矣略無可避鷂乃置雀良久方去二雀相逢似是公嫗相将入草共上一樹仍敘本末苦辛相語向者兒出為鷂所捕賴我翻㨗體素便附說我便語千條萬句欺恐舍長令兒大怖我之得免復勝于自今徙意莫復相妬鵰毛詩國風四月曰匪鶉匪鳶翰飛戾天毛詩曰鶉鵰也鵰鳶貪殘之鳥也說文曰鷲黄頭赤目五色皆備一曰鵰漢書曰李廣為上郡守匃奴入上郡武帝使中貴人從廣匈奴射中貴人廣曰是必射鵰者也廣射殺二人生得一人果射鵰者也穆天子傳曰春山爰有青鵰執犬羊食豕鹿列子曰周宣王之牧正有役人梁鴦者能養野禽獸委食于園庭之内雖虎狼鵰鶚之類無不柔者雌雄在前孳尾成羣異類雜居不相搏噬後魏書曰秦王幹機養壮勇善弓馬太宗出逰白登之東北幹以騎從有雙鵰飛于上太宗命左右射之莫能中鵰旋飛少高幹自請射之以二箭而下雙鵰太宗嘉之賜御弓矢金𢃄以旌其能軍中於是號幹為落鵰都尉北齊書曰斛律光嘗從世宗於洹橋校獵見一太鳥雲表飛颺光引弓射之正中其頸此鳥形如車輪旋轉而下至地乃大鵰也世宗取而觀之深驚異焉丞相属邢子高見而歎曰此射鵰手也當時傳號落鵰都督隋書曰長孫晟周宣帝時突厥攝圗請婚於周以趙王招女妻之然周與攝圗各相誇競每選驍勇以充使者因遣副汝南公家各人慶送千金公主於其牙前後數十軰攝圗多不禮見晟而獨愛焉每共遊獵留之竟嵗嘗有二鵰飛而争肉因以兩箭與晟曰請射取之晟乃彎弓馳往遇鵰相攫遂一發而雙貫焉攝圖喜令諸子弟貴人皆親昵之以學彈射鷲漢書曰匈奴有謀入漢地直張掖郡直當也生竒材箭竿鷲羽師古曰大鵰也黄頭赤目其羽可用為箭西域諸國記曰耆崛山在王舍城北四里山有兩崖鷲鳥常居其巔土人號為靈鷲山也佛國記曰山頭有雙鷲上有王使鑿石攻之如兩翼兩翮脚今見存林邑國記曰西南逺界有靈鷲能知吉凶覘人将死食屍肉盡乃去家人取骨燒為灰投之漲海鶚毛詩曰闗雎后妃之徳風之始也所以風化天下而正夫婦焉闗闗雎鳩在河之洲一名黄雎一名鵰鷞江東呼為鶚似鷙而有别倉頡解詁曰鶚金啄鳥也見則天下兵能擊殺麞鹿漢書曰鄒陽諌漢王曰臣聞鷙鳥累百不如一鶚孟康曰鶚大鵬白鷢爾雅曰揚白鷢郭璞注曰似鷹尾上白也廣雅曰白鷢鷹也說文曰白鷢玉鵰也崔豹古今註曰揚白鷢似鷹而尾上白赤號為印尾鷹風土記曰說詩義者或曰雎鳩為白鷢白鷢鸇属於義無取盖蒼鷃如白鷢而色蒼其鳴悠揚和順又遊於水而息於洲常隻不雙太平御覽卷九百二十六
