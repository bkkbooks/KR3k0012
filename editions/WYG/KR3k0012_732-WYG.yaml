  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_732-1a, image: WYG0899/WYG0899-0457a.png}
body:
  text: 太平御覽卷七百三十二宋李昉等撰方術部十三占候周禮春官宗伯下曰眡䘲掌十煇之法以觀妖祥辯吉凶一曰祲二曰象三曰鐫四曰監五曰闇六曰瞢七曰彌八曰叙九曰隮十曰想祲陰陽氣相侵也象者如赤鳥也鐫謂日旁氣四面反鄉如煇狀也監雲氣臨日也闇日月食也瞢日月瞢瞢無光也彌者白虹彌天也叙者雲有次序如山在日上也隮升氣也想煇光也𤣥謂鐫讀如童子佩鐫之鐫謂日旁氣刺日也監冠珥也彌氣貫日也隮虹也詩曰朝隮于西想雜氣有似可形想也掌安宅叙降正嵗則行事嵗終則弊其事左傳曰僖公五年正月辛亥朔日南至公既視朔遂登觀臺以望而書禮也凡分至啟閉必書雲物為備故也書察妖祥逆為之備又襄二十八年曰春無氷梓慎曰今茲宋鄭其飢乎嵗在星紀而滛於𤣥枵以有時菑陰不堪陽蛇乘龍龍宋鄭之星也宋鄭必飢𤣥枵虛中也枵耗名也土虛而民耗不飢何為禆竈曰今茲周王及楚子皆將死嵗棄其次而旅於明年之次以害鳥帑周楚惡之又曰子蟜之卒也將葬公孫揮與禆竈晨㑹事焉過伯有氏其門上生莠子羽曰其莠猶在乎於是嵗在降婁降婁中而旦嵗不及此次也已及其亡也嵗在娵訾之口其明年乃及降婁又曰昭七年夏四月甲辰朔日有食之晉侯問於士文伯曰誰將當日食對曰魯衞惡之衞大魯小公曰何故對曰去衞地如魯地於是有灾魯實受之其大咎其衛君乎魯將上卿又曰有星出於􅄔女鄭禆竈言於子産曰七月戊子晉君將死今茲嵗在顓頊之虛姜氏任氏實守其地居其維首而有妖星焉告邑姜也邑姜晉之妣也天以七紀戊子逢公以登星斯於是乎出吾是以譏之又曰有星孛于大辰西及漢申須曰彗所以除舊布新也天事恒象今除於火火出必布焉諸侯其火灾乎梓慎曰往年吾見之是其徵也火出而見今茲火出而章必火入而伏其居火也久矣其與必然乎火出於夏為三月於商為四月於周為五月夏數得天若火作其四國當之在宋衛陳鄭乎宋大辰之虛也陳大皞之虛也陳祝融之虛也皆火房也星孛及漢漢水祥也衛顓頊之虛也故為帝邱其星為大水水火之牡也其以丙子若壬午作乎水火所以合也若火入而伏必以壬午不過其見之月鄭禆竈言於子産曰宋衞陳鄭將同日火若我用瓘斝玉瓚鄭必不火子産弗從十八年夏五月火始昏見丙子風梓慎曰是為融風火之始也七日其火作乎戊寅風甚壬午火甚宋衛陳鄭皆火梓慎登大庭氏之庫以望之曰宋衞陳鄭也數日皆來告火禆竈曰不用吾言鄭又將火鄭人請用之子産不可子太叔曰寳以保民也若有火國几亡可以救亡子何愛焉子産曰天道逺人道邇非所及也何以知之竈焉知天道是亦多言矣豈不或信遂不與亦不復火又曰昭公二十年二月己丑日南至梓慎望氣曰今茲宋有亂國幾亡三年而後弭蔡有大喪叔孫昭子曰然則戴桓也汰侈無禮已甚亂所在也後漢書曰謝夷吾字堯卿㑹稽山陰人也少為郡吏學風角占候太守第五倫擢為督郵時烏程長有贓釁倫使收案其罪夷吾到縣無所驗但望閣伏哭而還一縣驚恠不知所為及還白倫曰竊以占候知長當死近三十日逺不過六十日遊魂假息非刑所加故不収之倫聽其言至月餘日果有驛馬齎長印綬上言暴卒倫以此益禮信之又曰楊由字辰侯蜀郡成都人少習易并七政元氣風雲占侯為郡文學掾時有大雀夜集於庫樓太守亷范以問由對曰此占郡内當有小兵然不為害後二十餘日廣柔縣蠻夷反殺傷長吏部發庫兵擊之由嘗從人飲勅御者曰酒若三行便宜嚴駕既而趍去後主人舍有鬭相殺者人請問何以知之由曰向社中木上有鳩鬭此兵賊之象也又曰公沙穆遷𢎞農令永壽元年霖雨大水三輔以東莫不湮没穆明曉占候乃豫告令百姓徙居髙地故𢎞農人獨得免害又曰叚翳字元章廣漢新都人習易經明風角時有就其學者雖未至必豫知姓名嘗告守津吏曰當有諸生二人荷擔問翳舍處者幸為告之後如其言又有一生來學積年自謂畧究要術辭歸鄉里翳為合膏藥并以簡書封於筒中告生曰有急發視之生到葭萌與吏爭津吏檛破從者頭生開筒得書言到葭萌與吏鬭頭破者以此膏裹之生用其言創者即愈生嘆服乃還卒業翳遂隱居竄跡終于家晉書曰戴洋善方術司馬颺為烏程令將赴職洋曰君深慎下吏颺後果坐吏免官洋又謂曰卿免官十一月當作郡加將軍至期為太守振武將軍颺賣宅將行洋止之曰君不得至當還不可無宅颺果為徐龕所逼不得之郡元帝增颺衆二千使助祖逖洋勸不行乃稱病收付廷尉俄而因赦得出康帝將登祚使洋擇日洋以為宜用三月二十四日丙午太史令陳卓奏用二十二日言昔越王用三月甲辰反國范蠡稱在陽之前當生盡出上下盡空德將出遊刑入中宫今與此同洋曰越王為吳所囚雖當時遜媚實懷怨蠡故用甲辰乘德而歸留刑吳宫大王内無含咎外無怨情當承天洪命納祚無窮何為追越王去國留殃故事耶乃從之咸和元年祖約南行路遇大雷雨西南來洋曰甲子西南天雷其下必失大將至夏汝南人反執約兄子濟送於石勒約府内地忽赤如丹洋曰按河圖徵云地赤如丹血丸丸當有下反上者恐十月二十七日胡馬當來飲淮水至時石勒騎大至攻城大戰其日西風兵火俱發約大懼㑹風􅂞賊退時傳言勒遣騎向壽陽約欲送其家還江東洋曰必無此事尋而傳言果妄征西將軍庾亮鎮武昌咸康三年洋言於亮曰武昌土地有山無林正可圖始不可居終山作八字數不及九昔吳用壬寅來止創立宫城至己酉還下秣陵陶公亦涉八年二月二十五日土地盛衰有數人心去就有期不可移也公宜更擇吉處武昌不可久住隋書曰庾季才初仕梁元帝頗明星厯因共仰觀從容謂季才曰朕猶慮禍起蕭墻何方可息季才曰頃天象告變秦將入郢陛下宜留重臣作鎮荆陜整斾旋都以避其患帝初然之後與宗懔等議乃止俄而江陵陷滅髙祖為丞相嘗夜召季才而問曰吾以庸虛受茲顧命天時人事卿以為何如季才曰天道精微難可意察竊以人事卜之符兆已定季才縱言不可公豈復得為箕穎之士乎髙祖黙然久之因舉首曰吾今譬如騎獸誠不得下矣因賜雜彩五十疋絹二百叚曰愧公此意宜善為思之大定元年正月季才言曰今月戊戌平旦清氣如樓闕見於國城之上俄而變紫逆風西行氣經云天不能無雲而雨皇王不能無氣而立於今王氣已見須即應之二月日出卯入酉居天之正位謂之二八之門日者人君之象人君正位宜用二月其月十三日甲子甲為六甲之始子為十二辰之初甲數九子數又九九為天數其日即是驚蟄陽氣壯發之時昔周武王以二月甲子日定天下享年八百漢髙祖以二月甲午即帝位享年四百故甲子甲午為得天數今二月甲子宜應天受命上從之開皇初授通直散騎常侍髙祖將還都夜與髙熲蘇威二人定議季才旦而奏曰臣仰觀𤣥象俯察圖記龜兆允襲必有遷都且堯都平陽舜都兾土是知帝王居止世代不同且漢營此城經今八百嵗水皆鹹不甚宜人願陛下恊天人之心為遷徙之計髙祖愕然謂熲等曰是何神也遂發詔施行賜絹三百叚馬兩疋進爵為公謂季才曰朕自今已後信有天道矣又曰盧太翼善厯數其後目盲乃以手摸書而知其字仁壽末髙祖將避暑仁壽宫太翼固諫不納至再三太翼曰臣愚豈敢飾詞但恐是行鑾輿不及反髙祖大怒繫之長安獄期還而斬之髙祖至宫寢疾臨崩謂皇太子曰太翼非常人也前後言事未嘗不中吾來日道當不反今果至此爾宜釋之唐書曰桑道茂者大歴中遊京師善太一遁甲五行災異之說言事無不中代宗召之禁中待詔翰林建中初神䇿軍脩奉天城道茂請髙其垣閭大為制度德宗不之省及朱泚之亂帝倉卒出幸至奉天方思道茂之言時道茂已卒命祭之太平御覽卷七百三十二
