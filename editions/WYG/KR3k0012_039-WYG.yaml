body:
  text: 太平御覽卷三十九宋李昉等撰地部四嵩山華山泰山恒山衡山霍山嵩山釋名曰嵩字或為崧山大而髙曰嵩詩曰崧髙維嶽峻極于天維嶽降神生甫及申國語曰夏之興也祝融䧏于崇山韋昭注曰崇嵩字古通用夏都陽城嵩山在焉白虎通曰中央之嵩獨加嵩髙字者何中央居四方之中而髙故曰嵩髙山續漢書曰武帝禮祭中嶽聞有呼萬嵗聲三於是以三百户封奉祠命曰嵩髙為嵩呼也孫嚴宋書曰髙祖表曰沙門釋法義于嵩髙廟所食壇下得玉璧三十二枚黄金一餅符彩潤潔河南太守毛修之以靈岳䧏瑞送諸神府列仙傳王子喬周靈王太子晋也好吹笙作鳯鳴遊伊洛之間浮丘公接以上嵩髙山三十餘年後于山上見桓良曰告我家七月七日待我緱氏山頭至日果乗白鶴駐山巔望之不得到舉手謝時人數日而去漢武内傳曰漢武帝夜夢與少君俱上嵩髙山半道有繡衣使者乗龍持節從雲中下言太一請少君覺告廷臣曰如朕夢少君將捨朕去矣劉義慶世説曰嵩髙山北有大穴晋時有人誤墜穴中見二人圍棋下有一杯白飲與墜者飲氣力十倍棋者曰汝欲停此否墜者曰不願停棋者曰從此西行有天井其中蛟龍但投身入井自當去若餓取井中物食之墜者可半年乃出蜀中因入洛問張華華曰此仙舘也所飲者玉漿所食者龍肉石髓耳崔鴻十六國春秋前秦録曰王猛至深山見一老父據胡牀鬚鬢皓然猛進拜老父曰王公何因拜也遣人送猛出出顧視乃嵩髙山也山海經曰大室之山即中嵩山今在陽城縣西也其上有木焉其狀如梨赤理服者不妬有草焉其狀如禾服者不昧上多美石次玉者也嵩髙山記曰漢有道士從外國將貝多子來于嵩岳西脚下種之并立浮圗今有四樹與衆木有異一年三花花白色其香如桂嵩山最是栖神靈藪也東出一里有自然五榖神芝仙藥東脚下有衆果樹云是漢果園後有小山名牛山多香樹昔有婦女姙身三十月生子五嵗便入嵩髙學道通神明為母立祠號開母祠又有三臺山漢武東廵過此山見三學仙女遂以為名又一石室有自然經書飲食至前石柱似承露盤有水暗滴下食之一合與天地相畢中頂南下二百步亦有岳廟畵為神像有玉人髙五寸玉色光潤相傳曰明公山人或失之經句乃見山海經曰少室之山有木焉名曰帝休葉狀如楊枝五衢黄花黑實服者不怒其上多玉其下多鐡其中多䱱魚得其食者無蠱疾可以禦惡服之不怒郭氏注云陽城西谷名季室亦曰少室山巔有白玉膏服之可為仙又戴延之西征記曰少室山中多神藥漢武帝築登仙臺在其峯郡國志云少室山一名黍室山負黍城在南故因山以名城也又少室有金陵人往視則有白霧起迷人雜道書曰少室之陽髙於平地八百六十丈方十里可避兵水之灾華山禮記曰及其廣厚載華嶽而不重范蔚宗後漢書張楷字公超隠居𢎞農山學者隨之所居成市能為五里霧後華山南遂有公超霧市唐書曰李適之代牛仙客為右相累封清河縣公與李林甫争權不恊適之性䟱為其隂中林甫常謂適之曰華山有金鑛採之可以富國上未知適之心善其言他日從容奏之𤣥宗大悦顧問林甫對曰臣知之乆矣然華山陛下本命王氣所在不可穿鑿臣不敢上言帝以為愛己薄適之言疎之白虎通曰西方為華山者何少隂用事萬物生華故曰華山武帝内傳曰魯女長樂人初餌麻及水絶榖八十餘年日更少壯色如桃花一旦與故人别云入華山去後五十年先相識者逄女華山廟前乗白鹿從玉女三十人并謝其鄉里親戚故人崔鴻十六國春秋前燕録曰石虎使人探䇿于華山得玉板山海經曰華山塜也塜者神鬼之所合也其祀之以太牢又曰泰華之山削成而四方其髙千仞其廣千里郭璞注曰山上明星玉女主持玉漿得服之即神仙之道僉無不通也其有虵曰肥遺六足四翼見則天下旱列仙傳曰馬明生從安期先生受金液神丹方乃入華隂山中合金神丹昇天也又曰修羊公者蜀人也華隂山石室中有懸石榻卧其上石盡穿䧟又曰毛女者在華隂山中獵師世世見之體生毛自言秦始皇宫人也又曰呼子先者漢中關下卜師也夀百餘嵗臨去呼酒家嫗曰急裝當與嫗共應中陵王召夜有仙人持二茅狗来先持一與酒家嫗得俱騎乃龍上華隂山也周禮曰豫州其鎮山曰華山華山記曰山頂有池生千葉蓮花服之羽化因曰華山又曰山有三峯謂蓮花毛女松檜也辛氏三秦記曰華山在長安東三百里不知㡬千仭如半天之雲晏子春秋曰君子若華山松栢既多望之自識薛綜注西京賦曰華山對河東首陽山黄河流于二山之間古語云本一山當河河水過之而曲行河神巨靈以手擘開其上以足蹈離其下中分為兩以通河流今覩手迹於華嶽上足迹在首陽山下俱存焉韓子曰秦昭王使工人施鈎梯上華山以松栢之心為博箭長八尺棊長八寸勒之曰昭王嘗與天神博于此周易是謀類曰西岳亡玉羊鄭𤣥注曰玉羊華山之精山海經曰小華即少華也其木多荆杞鳥多赤鷩可以禦火泰山詩曰泰山巖巖魯邦所瞻傳曰鄭伯請釋泰山之祀而祀周公以泰山之祊易許田公羊傳曰山川有能潤千百里者天子秩而祭之觸石而出膚寸而合不崇朝而雨遍乎天下者唯泰山雲爾語曰季氏旅于泰山子謂冉有曰女弗能救與對曰不能子曰嗚呼曽謂泰山不如林放乎白虎通曰王者功成封禪必于泰山者何萬物之始交代之處也史記曰漢武帝封泰山白雲起封中漢書曰武帝封泰山禪石閭應劭注曰石閭在泰山下南方土人言仙人閭應劭漢官儀曰泰山東南名日觀者雞一鳴時見日始欲出長三丈所觀者望見長安其髙如視浮雲其峻如無道徑望人如盂升或以為小白石或以為氷雪視巖石松鬰鬰蒼蒼如雲中晋書曰張忠隠于泰山教授弟子敎以形不以言符堅徴之及至堅賜以衣冠辭曰年朽髮落不堪衣冠請以野服入覲從之後乞還堅以安車送之行達華山嘆曰我東岳道士歿于西岳命也及關而死道書福地記曰泰山多芝草玉石下有洞天周迴三千里鬼神之府袁山松後漢書曰光武封泰山雲氣成宫闕風俗通曰古封泰山禪梁甫舊説岱宗上有金篋玉䇿能知人年夀修短漢武帝探策得十八因倒讀曰八十其後果夀長八十愽物志曰泰山一曰天孫言為天帝孫也主召人魂魄東方萬物始成故知人生命之長短五經通義云一曰岱宗言王者受命易姓報功告成必于岱宗也東方萬物始交代之處宗長也言為羣嶽之長白虎通曰王者受命必封禪封者廣厚也禪除也為壇字本為墠以其祭神故從示皆刻石紀號著己之功績以自効也天以髙為尊地以厚為徳故增泰山之髙以報天禪梁甫之阯以報地也史記曰無懐氏封泰山禪云云伏羲封泰山禪云云神農封泰山禪云云炎帝封泰山禪云云黄帝封泰山禪亭亭顓頊封泰山禪云云帝嚳封泰山禪云云堯封泰山禪云云禹封泰山禪㑹稽湯封泰山禪云云周成王封泰山禪社首後漢書曰光武封泰山禪梁甫凡云云亭亭肅然嵩里社首梁甫皆泰山下小山也石閭在西巖下漢官儀及泰山記曰泰山盤道屈曲而上凡五十餘盤經小天門大天門仰視天門如從穴中視天牕矣自下至古封禪處凡四十里山頂西巖為仙人石閭東巖為介丘東南巖名日觀日觀者雞一鳴時見日始欲出長三丈許又東南名秦觀秦觀者望見長安吳觀者望見㑹稽周觀者望見齊黄河去泰山二百餘里於祠所瞻黄河如帶若在山阯山南有廟悉種栢千株大者十五六圍相傳云漢武所種小天門秦時五大夫松見在茅君内傳云仙家凡有三十六洞天岱宗之洞週迴三千里名曰三宫空㓊之天列仙傳曰稷丘君者泰山道士也武帝時以道術受賜後上東廵泰山稷丘君乃冠章甫衣黄衣擁琴來拜武帝曰陛下勿上也必傷足上必欲上及上數里左右足指果折乃止列仙真人傳曰馬明者齊國臨淄人也本姓何字君賢為縣吏捕賊為所傷當時殆死良乆忽於道間見一女以肘後管中一丸藥大如小豆與明服之于是即愈血絶瘡合隨神女還岱宗石室中上下懸絶重巖深隱去地千餘丈其中金牀玉枕乃人跡所不能至神仙傳曰劉馮者沛人學道于穆王子服石桂英及中岳石硫黄年三百餘嵗而有少容後入泰山中又泰山下老父者失其姓名漢孝武皇帝廵狩見老父鋤于道間頭上白光髙數丈因問之父對曰臣年八十五時衰老垂死頭白齒落有道者教臣絶榖但飲水并作神枕枕中有三十二物其二十四物以當二十四氣其八物當八風臣行之轉少日行三百里今年九十矣帝受其方賜縑帛去父入岱宗山十年五年時還鄉里三百餘年乃不復還也上黨記曰太子坂東頭即泰山也避世者區種而食或射熊于巖間泰山記曰泰山廟在山南悉種栢樹千株大者十五六圍父老傳云漢武所種廟及東西房三十餘間并髙樓三處春秋饗祀泰山君嘗在此壇周易是謀類曰泰山失金雞鄭𤣥注曰金雞泰山之精丘淵之齊記曰泰山東岳也嬴博二縣共界漢武封禪割此縣以供祀泰山伍輯之從征記曰泰山于所經諸山為最髙見岑崿軒舉凌跨衆阜霞雲草木靄然靈異苑囿神竒故無螫蟲猛獸孟子曰孔子登東山而小魯登泰山而小天下尸子曰泰山之中有神房阿閣帝王籙淮南子曰清之為明杯水而見眸子濁之為暗河水不見泰山孟子曰挾泰山以超北海恒山亦名常山史記曰趙簡子謂諸子曰吾藏寳符于常山往得者立焉諸子競往無所得無恤曰常山臨代代可取也簡子曰是知符矣遂立之白虎通曰北方為常山者何隂終陽始其道常乆故曰常山後魏書曰道武立廟於上置侍祀九十九人嵗時祈禱水旱至成帝東廵親祀其神焉春秋元命苞曰昴畢散為冀州分為趙國立為常山崔鴻前燕録曰慕容雋夀光三年常山寺大樹根下得璧七十二圭七十光色精竒有異常玉孫子兵法曰常山之蛇名曰率然一身而兩頭擊其一頭則一頭至擊其中則首尾俱至神農本草曰常山有名草神農置之門上每夜叱人常山圖經曰北岳恒山在縣西北一百四十里尚書禹貢曰太行恒山至于碣石有恒水出焉其下有祠又恒山記曰髙三千九百丈上方三十里週迴三千里上有太𤣥之泉神草十九種道者服之成仙又太史公云北岳者有五名一名蘭台府二名列女宫三名華陽臺四名紫㣲宫五名太乙宫或云太茂山山北四百餘里號飛狐之口有率然蛇孫吳喻兵勢管子曰其山北臨代南俯趙東接河海之間早生而晩殺五糓之所蕃熟四種五穫焉陽固北都賦曰茂丘茂山也蓋恒岳之别名泒水從西來甚大至茂山之西沉伏于地過山而復出其大如初世言避恒岳之靈衡山周官曰荆州其山鎮曰衡山徐靈期南岳記曰衡山者五岳之南岳也其來尚矣至於軒轅乃以灊音潜霍之山為副焉故爾雅云霍山為南嶽蓋因其副焉或云衡山一名霍山至漢武南廵又以衡山遼逺道隔江漢於是乃徙南岳之祭于廬灊江山亦承軒轅副義也晋書曰劉驎之嘗採藥至衡山深入忘返見有一澗水末有二石囷一開一閉水深廣不得過欲還失道遇伐木人問道僅得還家或説囷中皆仙方靈藥驎之欲更尋終不復知其處羅含湘中記曰衡山九嶷皆有舜廟太守至常遣户曹致祀則如絃歌之聲也呉越春秋曰禹傷父功不成登衡山血白馬以祭之忽然卧夢赤繡文男子稱𤣥夷蒼水使者謂禹曰欲得我山神書者齋于黄帝之宫禹乃退齋三日登宛委發石得金簡玉字之書得治水之要也盛𢎞之荆州記曰衡山有三峯其一名紫蓋每見有雙白鶴囬翔其上一峯名石菌下有石室㝷山徑聞室中有諷誦聲一曰芙蓉上有泉水飛流如舒一幅白練山海經曰衡山一名岣嶁山其上多青雘鳥多鸚鵒岣音矩嶁音縷湘中記曰衡山九嶷皆有舜廟遥望衡山如陣雲沿湘千里九向九背乃不復見有玉牒劉敬叔異苑曰湘東姚祖太元中為郡吏經衡山望巖下數少年並執筆作書祖謂行旅休息乃過之未至百步少年相與飛颺遺一紙書其字皆鳥跡郡國志云衡山南岳也南岳記云當翼軫度璣衡謂之衡山山有錦石斐然成文霍山白虎通曰南方為霍山者何太陽用事護養萬物故為霍山爾雅曰大山宫小山曰霍郭璞注曰宫謂圍繞也禮記曰君為廬宫是也漢書曰武帝以衡山􅗥逺䜟記皆以霍山為南岳故祭其神於此宋書曰霍山數年來常有鐘聲潜發重壤山崩間有六鐘自出制度合古式聲中律呂山海經曰霍山有獸焉其狀如狸白尾方鬛名曰朏朏可以忘憂黄庭内景經曰霍山下有洞臺方二百里司命君之府也白虎通曰小山繞大山為霍太平御覽卷三十九
