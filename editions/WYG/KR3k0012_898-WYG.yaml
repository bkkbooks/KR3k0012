  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_898-1a, image: WYG0901/WYG0901-0036a.png}
body:
  text: 太平御覽卷八百九十八宋李昉等撰獸部十牛上説文曰牡畜父也従牛土上聲犅古郎切特牛父也牝畜母也從牛七上聲犢牛子也牬普外切二嵗牛也犙山耽切三嵗牛也牭思貳切四嵗牛也犗介又音加騬牛也牻莫江切白黑雜毛也㹁力强切牻牛也犡力制切牛白脊也􅀈達胡切黄牛虎文也犖駿牛也㸹力掘切牛白脊也􅀈匹耕切牛文駮如星也犥普表切牛黄白色也犉而純切黄牛黑唇也㹊音岳白牛也㹔居羊切牛脊也􅀈音叨牛徐行也犨牛息聲也一曰牛名牷音全牛純色也􅀈音遶牛柔謹也廣志曰有犘馬象切牛出巴中重千斤犦蒲南切牛一曰犎牛亦音豹如橐駝水牛毛青腹大狀似猪有牧牛項上肉大如斗似橐駝行三百里犤音皮牛猶庳小今謂之稷牛又呼果下牛出廣州高凉郡犩吾威切牛如牛而大肉數千斤出蜀中犪牛重千斤晋時此牛出上庸郡犣力渉切牛旄牛也髀膝間有長毛花蹄牛髙六尺尾環繞角端有肉蹄如蓮花􅀈牛色黑或黄日南有之潜牛形狀似水牛一名􅀈音沈牛􅀈牛似鹿又似羊肉美牥音方牛如槖駝能行又有犛牛莊子曰其大若垂天之雲易大畜卦曰六四童牛之牿元吉又无妄卦曰六三无妄之災或繫之牛行人之得邑人之灾象曰行人得牛邑人災也又遯卦曰六二執之用黄牛之革莫之勝説象曰執用黄牛固志也又離卦曰離利貞亨畜牝牛吉又既濟曰九五東鄰殺牛不如西鄰之禴祭又説卦曰坤為牛周書王㑹曰十盧紈牛紈牛者牛之大者大夏兹白牛數楚毎牛毎牛者牛之小者也詩無羊曰誰謂爾無牛九十其犉黄牛黑唇曰犉又曰爾牛來思其耳濕濕尚書曰武王尅紂放牛於桃林之野左傳成公七年鼷䑕食郊牛角改卜牛鼷䑕又食其角乃免牛又宣公三年經曰王正月郊牛之口傷改卜牛牛死乃不郊又僖上曰齊侯伐楚楚子使與師言曰君處北海寡人處南海唯是風馬牛不相及也不虞君之渉吾地也何故又僖下曰介葛盧來朝聞牛鳴曰是生三犧皆用之矣其音云問之而信又曰秦師入滑鄭商人弦髙將市於周遇之以乘韋先牛十二犒師曰寡君聞吾子將步師出於敝邑敢犒従者又宣上曰宋城華元為植廵功植主城行廵也城者謳曰于思于思棄甲復來使驂乘謂之曰牛則有皮犀兕尚多棄甲則那又宣上曰楚子為陳夏氏亂故伐陳殺夏徴舒因縣陳申叔時使於齊反命而退王使讓之曰夏徴舒為不道弑其君寡人以諸侯討而殺之汝獨不慶寡人何也對曰夏徴舒弑其君其罪大矣討而戮之君之義也抑人有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣諸侯之従君討有罪也今縣陳貪其富也無乃不可乎王曰善又成下曰韓厥曰古人有殺老牛莫之敢尸而况於君乎二三子不能事君焉用厥也尸主也又昭十三年傳曰邾人莒人愬于晉曰魯朝夕伐我幾亡矣我之不共魯故之以不共晉貢以魯故也晉侯使叔向來辭曰寡君不得事君矣請君無勤子服惠伯對曰君信蠻夷之訴以絶兄弟之國寡君聞命矣叔向曰寡君有甲車四千乘在雖以無道行之必可畏也况其率道何敵之有牛雖瘠僨於豚上其畏不死禮記曲禮上曰國君不齊牛又王制曰諸侯無故不殺牛又月令曰季春犧牲駒犢舉書其數又曰季冬命有司出土牛以示農耕之早晩又曲禮下曰天子祭天地諸侯祭山川大夫祭五祀士祭其先天子以犧牛諸侯以肥牛大夫以索牛又郊特牲曰郊所以眀天道也帝牛不吉以為稷牛帝牛必在滌三月稷牛惟其所以别事天神與人鬼也又曰郊牲用騂尚赤也周犢貴誠也又禮器曰有以少為貴者天子祭天特牲天子適諸侯膳以犢又内則曰牛夜鳴則庮庮臭惡也又王制曰祭天地之牛角繭栗宗廟之牛角握賓客之牛角尺周禮地官封人曰凡祭祀餙其牛牲設其楅衡置其絼供其水藁楅在鼻衡在角言不得觸絼繫牛鼻繩絼本作紖持刄反又冬官考工記曰穉牛之角直而澤老牛之角紾而昔角長二尺有五寸三色不失理謂之牛戴牛昔讀為交錯之錯謂角文理錯也三色本白中青末豐也牛戴牛角直一牛也又地官上曰牛人掌養國之公牛以待國之政令公猶官也凡祭祀共其享牛永牛以授職人而芻之永牛禱於鬼神之牛謂所以祭者也永終也終事之牛謂所以繹者也宗廟有繹者孝子求神非一處職讀為樴樴謂之棧可繫牛樴人謂牧人凡賓客之事共其牢禮積膳之牛饗食賓射共其膳羞之牛軍事共其犒牛䘮事共其奠牛凡㑹同軍旅行役共其兵車之牛與其牽傍以載公任器牽傍在轅外輓牛也人御之居其前曰牽居其後曰旁任猶用也凡祭祀共其牛牲之互與其盆簝以待事鄭司農云謂楅衡之屬盆簝皆器名盆所以盛血簝受肉籠也互若今屠家縣肉格又秋官上曰罪𨽻掌役百官府與凡有守者掌使令之小事役給其小役凡封國若家牛助為牽徬鄭司農云凡封國若家逮諸侯立大夫家也牛助為牽徬此官主為送致之也𤣥謂以牛助轉徙也罪𨽻牽傍之史記曰騎刼攻即墨田單用牛千頭衣五綵縳刄其角結火其尾穿城而出牛壯士五十衘枚隨其後牛出火眀所觸皆死壯士擊之城上士大譟燕師大敗騎刼死乘勝逐北三戰三克遂収齊城也又曰馬蹄噭千牛千足此亦比千乘之家又甯戚飯牛車下扣角而歌曰南山矸白石爛短布單衣纔至骭生不逢堯與舜禪長夜漫漫何時旦桓公用之又蘇秦説韓王曰鄙語云寧為鷄口無為牛後今西面事秦何異牛後乎漢書曰丙吉嘗出遊逢羣鬭者死傷横道吉過之不問前行逢人逐牛牛喘吐舌吉使騎吏問牛行幾里或譏吉吉曰民鬭殺長安令京兆尹職所當禁備逐捕丞相課其殿最不親小事也方春少陽用事未可以熱恐牛近行因暑故喘此時氣失節恐有所傷害者三公典調和隂陽職所當憂也又曰龔遂為渤海太守民有帶持刀劔者使賣劔買牛賣刀買犢曰何帶牛佩犢乎又宣宗地節三年求得外祖母王嫗男先故弟皆隨使者詣闕時乘黄牛車故百姓謂之黄牛嫗後漢書曰朱暉為臨淮太守時牛大疫而臨淮獨無疫者鄰郡牽牛入界避灾耳范􅁮後漢書曰漢光武初起騎牛殺新野尉乃得馬又曰劉盆子初與兄茂屬右校卒吏劉俠卿主芻牧牛號曰牛吏及立為帝恐畏欲啼乃復還依俠卿又曰更始即位舞隂大姓李氏擁城不下更始遣天柱將軍降之不肯云聞宛之趙氏有孤孫熹信義著名願得降之更始乃徴熹熹年未二十既引見更始笑曰繭栗犢豈能負重致逺乎犢角如繭栗言小也禮曰祭天地之牛角繭栗即除為郎中行偏將軍事使詣舞隂而李氏遂降又曰劉寛嘗行有人失牛者乃就寛車中認之寛無所言下駕步歸有頃認者得牛而送還叩頭謝曰慚負長者隨所刑罪寛曰物有相類事容脱誤幸勞見歸何為謝之州里服其不校又曰魯恭為中牟令亭長有従民借牛不還者牛主自言恭召亭長教令還牛亭長不還如是者三猶不還恭涕泣曰教化不行也欲解印綬去掾吏亭長同爭亭長即還牛詣獄受罪恭貰出不問於是吏人敬信皆不忍欺謝承後漢書曰朱暉為郡吏太守阮况嘗欲市暉牛暉不従及况卒暉乃厚贈送其家人或以譏焉暉曰前阮府君有求於我所以不敢聞命誠恐以財貨汙君今而相送明吾非有愛也魏略曰鉅鹿時苗字稷為夀春令始之官乘牸牛嵗餘生一犢及代留其犢而去晉書曰羊篇祜之姪也為鉅平侯奉祜嗣篇歴官清慎有私牛於官舍産犢及還而留之張勃呉地理志曰合浦徐聞縣多牛其項上有特骨大如覆斗日行三百里蜀志曰蔣琰曽夣門前有一牛頭角及口而血流問於趙直直曰牛角及口公字也血者事明也夣吉矣晉朝雜事曰泰康九年三月幽州上言塞北有死牛頭語干寶晉記曰南安朱冲其鄰人失犢與冲犢相類來取之冲不與争後得之於堅冰之下慚謝冲冲不受王隱晉書曰朱冲字巨融少有德行鄰人牛犯冲苗冲乃擔芻送之牛主大慙不敢復暴又曰潘岳出為河陽令以任次宜為郎不得意時山濤領選岳内非之密作謡曰閣道東有大牛王濟鞅裴楷鞦和嶠刺促不得休又曰郭洗牛生犢兩頭八足晉陽秋曰武帝時有司奏御牛青絲紖斷詔可以青麻代之晉書曰郭舒嘗有鄉人盜食舒牛事覺來謝舒曰卿飢所以食牛耳餘肉可共啖之世以此服公𢎞量又曰夫餘國若有軍事殺牛祭天以其蹄占吉凶蹄解者為凶合者為吉也又曰石崇與貴戚王愷奢靡相尚嘗與愷出遊争入洛城崇牛迅若飛禽愷絶不能及乃密貸其帳下問其所以對曰牛奔不迅良由御者逐之不及而反制之可聼蹁轅則駃矣因従之遂争長崇後知之殺所告者又曰王濟被斥外於是乃移第北山下性豪侈麗服玉食時王愷以帝舅奢豪有牛名八百里駮嘗瑩其蹄角濟請以錢千萬與牛對射而賭之愷亦自恃其能令濟先射一發破的因據胡牀叱左右速探牛心來須臾而至一割便去又曰何曾性奢豪都官従事劉亨嘗奏以銅鉤黻紖車瑩牛蹄角後曾辟亨為掾勸勿應亨謂至公之體不以私憾遂應又曰桓温北伐過淮泗踐北境與諸寮屬登千乘樓矚中原慨然曰遂使神州陸沈百年丘墟王夷甫諸人不得不任其責袁宏曰運有廢興豈必諸人之過温作色謂四座曰頗聞劉景升有千斤大牛噉芻豆十倍於常牛負重致逺曽不若一羸牸魏武入荆州以享軍士意以况宏坐中皆失色又曰王延家中生一犢他人認之延牽與之初無憾色其人後知其妄認送犢還叩頭謝罪延以與之不取也又曰肅慎國武帝時及元帝中興皆來貢獻成帝時又通貢於石季龍四年方達季龍問之答曰毎候牛馬向西南眠者三年矣是知大國所在故來南史四夷傳曰扶桑國有牛角甚長以角載物至勝二十斛宋書曰褚湛之有一牛至所愛無故墮㕔事前井湛之率左右躬自營救郡中喧攘彥回下簾不視又曰江湛為吏部尚書性亷儉牛餓御人求草湛良久曰可與飲又曰顧憲之元徽中為建康令時有盜牛者與本主争牛各稱己物二家辭証等前後令莫能决憲之至覆狀乃令解牛任其所去牛徑還本宅盜者伏其罪時人號曰神明三國典畧曰陳桃根於所部得青牛獻之又上織成羅文錦被表二陳主命於雲龍門外焚之其牛遣還於人又曰梁出師拒侯景邵陵王綸次鍾離初綸將發營于樂遊苑臨賀王正德詣於綸所始入牙門有飃風觸旗竿而折至是將殺牛勞士一牛走入馬廐殺綸所乘駿馬又以兩角貫一馬復載之而行衝突營幕軍中驚亂蕭子顯齊書曰豫章文獻王嶷為揚州刺史拜陵還過延陵季子廟親沸井有水牛突部伍直兵執牛推問王不許取絹一疋横繫牛角放歸其家為治務存寛厚故得朝野忻後魏書曰邢昕以本官副李象使於梁昕好忤物人謂之牛是行也談者謂之牛象鬭於江南北史曰後魏元仲景性嚴峭孝荘時兼御史中尉京師肅然毎向臺恒駕赤牛時人號赤牛中尉又曰魏婁提雄傑有識度僮僕千數牛馬谷量好周給士多歸附之又曰道武時窟咄冦南鄙莫題時二於帝遺箭於窟咄謂曰三嵗犢豈勝重載言窟咄長而帝少也又曰孟信為趙郡太守及去官家貧無食唯有一老牛其兄子賣之擬供薪米作契已訖市法應知牛主住所在信適従外來見買牛人方知其賣也因告之曰此牛先來有病小用便發君不須買也杖其兄子二十買牛人嗟異良久呼信曰孟公但見與牛未須與力也苦請不得乃罷買牛者周文帝帳下人周文深嘆異焉隋書曰盧昌衡為徐州總管嘗行至淺儀所乘馬為他牛所觸因致死牛主陳謝求還價值昌衡謂之曰六畜相觸自關常理此豈人情耶君何謝也拒而不受性寛厚不求皆此類也又曰牛宏有弟曰弼好酒而􅒬嘗因醉射殺宏車牛宏來還宅其妻迎謂之曰叔射殺牛矣牛宏聞之無所怪問直答曰作脯又曰叔忽射殺牛大是異事宏曰已知之矣顔色自若讀書不輟其寛和如此又曰于仲文遷安固太守有任杜兩客各失牛後得牛兩家俱認州郡久不能决益州長史韓伯雋曰于安固少聰察可令决之仲文曰此易解耳於是令二家各驅牛羣至乃放所認者遂向任氏羣中又隂使人微傷其牛任氏嗟惋杜家自若仲文於是訶杜氏杜氏服罪而去又曰盧愷従周武帝在雲陽宫勅諸屯簡老牛欲以享士愷進諌曰昔田子方贖老馬君子以為美談向奉明勅欲以老牛享士有虧仁政帝美其言轉禮部大夫唐書曰李密嘗欲尋包愷乘一黄牛被以蒲韀仍將漢書一帙掛於角上一手捉牛靷一手飜書讀之尚書令越公楊素見於道従後按轡躡之既及問之曰何處書生躭學若此密識越公乃下牛再拜自言姓名又問所讀何書答曰項羽傳越公竒之太平御覽卷八百九十八
