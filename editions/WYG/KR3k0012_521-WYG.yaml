  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_521-1a, image: WYG0897/WYG0897-0640c.png}
body:
  text: 太平御覽卷五百二十一宋李昉等撰宗親部十一慈母保母乳母妾出婦舅舅母外甥姨慈母保母禮記内則曰子生異為孺子室於宫特掃一室以處之擇於諸母與可者必求其寛裕慈惠温良恭敬慎而寡言者使為子師其次為慈母其次為保母皆居子室此人君養子之禮也諸母衆妾也可者傅御之屬也子師教以善道者慈母知其嗜慾者保母安其居室者士妻食乳之而已又曽子問子游問曰喪慈母如母禮與如母謂父卒三年也孔子曰非禮也古者男子外有傅内有慈母君命所使教子也何服之有言無服也昔者魯昭公少喪其母有慈母良及其死也公弗忍也欲喪之有司以聞曰古之禮慈母無服今也君為之服是逆古之禮而亂國法也若終行之則有司將書之以遺後世無乃不可乎公曰古者天子練冠以燕居公弗忍也遂練冠以喪慈母喪慈母自魯昭公始也左傳襄九曰宋大災宋伯姬卒待姆也姆女師也乳母史記曰武帝時有所幸倡郭舎人者發言陳辭雖不合道然令人主和恱武帝少時東武侯母常養帝帝壯時號曰大乳母率一月再朝朝奏入有詔使幸臣馬遊卿以帛五十疋賜乳母有詔得令乳母乗車行馳道中當此之時公卿大臣皆敬重乳母乳母家子孫奴從者横暴長安中當道掣頓人車馬奪人衣服聞於中不忍致之法有司請徙乳母家室處之於邉奏可乳母當入至前面見辭乳母先見郭舎人為下泣舎人曰即入見辭去疾步數還顧乳母如其言謝去郭舎人疾言罵之曰咄老女子何不疾行陛下已壯矣寧尚須汝乳而活耶於是武帝憐之乃下詔止無徙乳母後漢書曰安帝時鄧太后臨朝帝不親政事小黄門李閏與帝乳母王聖讃太后兄執金吾鄧悝等嘗言欲廢帝立平原王徳帝每忿懼及太后崩遂誅鄧氏而王聖女伯榮扇動内外競為侈虐明年帝崩立北鄉侯為天子王聖及黨與皆見徙王隠晉書曰賈充子黎民三嵗乳母抱向閤充入黎民喜踊充就而拊之充夫人郭槐遥望疑充即鞭殺乳母兒思母病死槐又生男向嵗乳母抱中庭充過拈兒頰郭又疑之復鞭殺乳母兒又死充遂無嗣譚藪曰宋何承天為著作郎時新著作多貴逰少年或戯承天謂為妳母承天曰鳯凰將九子妳母何言耶妾禮記曲禮曰買妾不知其姓則卜之又内則曰聘則為妻奔則為妾妾之言接也聞彼有禮而往焉以得接見於君子又曰妾雖年老未滿五十必與五日之御雖婢妾衣服飲食不後長者妻不在妾御莫敢當夕辟女君之御日也妾將生子及月辰夫使人日一問之左傳成上曰魯聲伯之母不聘不聘無媒禮穆姜曰吾不以妾為姒兄弟之妻相謂為姒生聲伯而出之又昭二十年晏子對齊景公曰内寵之妾肆奪於市外寵之臣僣令於鄙又哀下曰魯公子荆之母嬖荆哀庶子將以為夫人使宗人釁夏獻其禮宗人禮官對曰無之公怒曰女為宗司立夫人國之大禮也何故無之對曰周公及武公娶於薛孝恵娶於商自桓以下娶於齊此禮也則有若以妾為夫人則固無其禮也出妻禮記檀弓曰子上之母死而不䘮子上孔子曽孫子思伋之子名白其母出門人問諸子思昔者子之先君子䘮出母乎曰然禮為出母期父卒為父後者不服耳子之不使白也喪之何也子思曰昔者吾先君子無所失道道隆則從而隆道汚則從而汚汚猶殺也有隆有殺進退如此伋則安能自予不能及為伋也妻者是為白也母不為伋也妻者是不為白也母故孔氏之不䘮出母自子思始也又内則曰子甚宜其妻父母不說出宜猶善也漢書曰王吉少時學問長安其東家有大􅀥樹垂庭中吉婦取􅀥以啖吉吉後知之乃去婦東家聞而伐其樹隣里共止之因固請吉令還歸里中為之語曰東家有樹王陽去婦東家􅀥完去婦復還又曰王禁先元后母魏郡李氏女也後以妬去更嫁為河内荀賔妻後漢書曰馮衍娶北地女任氏為妻悍忌不得畜媵妾兒女常自操井臼衍竟逐之又曰黄允濟隂人也以雋才知名郭林宗見而謂曰卿有絶人之才足成偉器然恐守道不篤將失之矣後司徒袁隗欲為從女求婚見允而歎曰得婿如是足矣允聞而黜遣其妻夏侯氏婦請姑曰今當見棄方與黄氏長辭乞一㑹宗屬以展離决之情於是大集賔客二百餘人婦坐中攘袂數允隐慝穢惡事十五事言畢登車而去允以此廢於時又曰李充字大遜家貧兄弟六人同衣逓食妻竊謂充曰今貧居如此難以久安願思分異充偽許之曰當醖酒具㑹請呼鄉里内外充坐中前跪母曰此婦無狀而教充離間母兄罪合遣斥便呵叱其婦遂令出門婦銜涕而去齊書曰劉瓛母孔氏瓛娶王氏椓壁挂履土落孔氏床上孔氏不恱瓛即出其妻梁書曰孔謙從兄靈慶嘗病寄於謙謙出行還問起居靈慶曰向飲冷熱不調即時猶渴謙退遣其妻家語曰婦有七出三不去者不順父母無子滛僻嫉妬惡疾多口舌竊盗不順父母者為其惡徳也無子者為其絶世也滛僻者為其亂族也嫉妬者為其亂家也惡疾者為其不可供粢盛也多口舌為其離親也竊盗者為其反義也三不去者謂有所取無所歸也與其經三年之䘮也先貧賤後富貴也凡此皆聖人所以慎男女之際重婚姻之始也又曰曽子妻以蒸藜不熟出之古樂府詩曰上山採䕷蕪下山逢故夫囘首問故夫新人復如何舅舅母釋名曰舅久也爾雅曰母之昆弟為舅毛詩秦風曰渭陽康公念母也康公之母晉獻公之女文公遭驪姬之難未乆而秦姬卒穆公納文公康公時為太子贈送文公於渭之陽念母之不見也我見舅氏如母存焉及其即位思之而作是詩也我送舅氏曰至渭陽何以贈之路車乗黄我送舅氏悠悠我思何以贈之瓊瑰玉佩也儀禮曰舅母之昆弟𫝊曰何以服緦從服也言從母服也禮記檀弓曰從母之夫舅之妻二夫人相為服君子未之言也左傳僖公曰秦伯納晉公子重耳及河子犯以璧授公子臣負覊紲以從君巡於天下臣之過多矣臣猶知之而况君乎請由此亡公子曰所不與舅氏同心者有如白水投其璧於河晉書曰庾懌嘗以毒酒餉江州刺史王充之充之覺其有毒飲犬犬斃乃宻奏之帝曰大舅以亂天下小舅復欲爾懌聞飲酖而卒又曰劉璵字慶遜與弟琨字越石並為尚書郎郭奕之甥也名著當時京師謂之語曰洛中奕奕慶遜越石又曰荀朂潁川人少孤貧依於舅氏㓜而岐疑朂十嵗能屬文鍾繇曰此兒當及曽祖爽耳又曰殷浩坐徙東陽信安縣外甥韓康伯浩素賞愛之隨至徙所經嵗還都浩送至渚側詠曹顔逺詩曰富貴他人合貧賤親戚離因而下泣又曰衛玠字叔寶驃騎將軍王濟玠之舅也雋爽風姿每見玠輙歎曰珠玉在傍覺我形穢又曰郄愔字方囘與姊夫王羲之有邁世之風獻之兄弟愔子超未亡時嘗躡履脩甥舅之禮及超死見愔怠慢履而候之命席便坐愔慨然曰嘉賔不死䑕子敢爾又曰武帝楊后諱艶字瓊芝𢎞農人母天水趙氏早卒依於舅家舅母仁愛親乳之使人乳己子世說曰衛展字道舒為江州有舅投之都不祗待唯餉王不留行一斤此人便命駕李𢎞範聞之曰家舅刻薄反役使卉木也又曰魏明帝為外祖築舘既成謂左右曰當何名之侍中繆襲曰陛下聖恩齊於哲王罔極過於曽閔此舘之興情鍾舅氏宜以渭陽名焉上從之妬記曰謝太傅劉夫人不令太傅有别房寵公既深好聲色不能令節遂頗欲立妓妾兄子及外甥等微逹其㫖乃共諫劉夫人方便稱關雎螽斯有不妬忌之徳夫人知諷己乃問誰撰詩答曰周公夫人曰周公是男子乃相為耳若使周姥𫝊應無此語也蔡邕進表曰平丘程末年十四父歿時末抱尸號泣悲哀舅哀其羸劣嚼􅀥肉以哺之末見食歔欷不能咽外甥釋名曰姊妹之子曰甥出配他男而生也爾雅曰男子謂姊妹之子出謂我舅者吾謂之甥也儀禮子夏𫝊曰甥何以緦報之也左傳荘公曰楚武王伐申過鄧鄧祁侯曰吾甥也止而享之騅甥聃甥養甥請殺楚子鄧侯不許三甥曰亡鄧國者必此人也若不早圗後君噬臍其及圗之乎史記曰汲黯字長孺濮陽人司馬安是其姊長子與黯同為太子洗馬漢書曰霍去病衛青姊少兒子也又曰顔安樂字公孫魯人眭孟姊子也東觀漢記曰黄香字文強年十二家業虛貧衣食不贍舅龍卿侯為作衣被不受晉書曰魏舒少為舅寗氏所養寗氏營宅相者云當出貴甥舒時尚㓜自言曰當為外氏成此宅相又曰石崇字季倫其甥歐陽建與趙王倫有隙倫為詔收崇及建建作臨終詩又曰謝重字景重子約字宣映曽於公座戯嘲無禮於其舅袁湛湛謂曰汝父昔已輕舅今汝復來加我可謂兩世無渭陽之情約父重即王敬之外甥與舅有不恊之論湛故有此云又曰范汪少孤年六嵗過江依外家庾氏荆州刺史王澄見之曰興范氏者必此子也十三䘮母居䘮盡禮及長好學博識多通善談明理又曰韓康伯清和有思舅殷浩曰康伯能自操置居然是出羣器也又曰何無忌東海郯人少有大志鎮北將軍劉牢之即其舅也時鎮京口每有大事皆叅議之桓𤣥之簒與劉裕劉毅共興義兵桓𤣥聞之甚懼其黨曰烏合之衆勢必無成𤣥曰劉裕勇冠三軍劉毅家無擔石之儲樗蒲一擲百萬何無忌劉牢之甥酷似其舅共舉大事何為無成又曰姚興太師令髙魯遣其甥王䝉暉劉藻送玉璽并圗䜟袐文於慕容徳呉均齊春秋曰劉獻字珪沛人五嵗聞舅孔昭先讀管寧𫝊欣然請更讀因聼受曰可及此耳三輔决録曰吉閎㓜有美名九嵗明尚書舅何邈死家貧子㓜閎自造坟塋殯𦵏之衛玠别𫝊曰玠王武子甥也武子常與乗白羊車入市舉市曰誰家璧人曰武子甥也武子常與同逰語曰昨與外甥玠并出烱若明珠在側朗然來照人姨爾雅曰母之姊妹為從母儀禮子夏傳曰從母夫婦人報從母母之姊妹𫝊曰何以小功也以名加也外親之服皆緦之晉書曰何充字次道廬江人王導妻姊之子故少與王導善早為顯官嘗詣舎導以麈尾指床呼充共座曰此是君座也宋書初髙祖産而皇妣殂考皇貧薄議欲不能養髙祖從母生懐敬未朞乃斷乳而養髙祖以舊之故懐敬累至㑹稽太守三輔次録曰周季貞班固姊之子也善屬文䘮婦作問神其姨曹大家難之太平御覽卷五百二十一
