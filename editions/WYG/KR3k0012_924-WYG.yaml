body:
  text: 太平御覽卷九百二十四宋李昉等撰羽族部十一鸚鷁白鸚鵡五色鸚鵡赤鸚鵡孔雀翡翠鷓鴣白鷴鷗䳺鶉萬春鳥舍利鳥兵曹鳥巣衣鳥鸚鵡禮記曰鸚鵡能言不離飛鳥漢書曰獻帝興平元年益州蠻夷獻鸚鵡三詔曰往者益州獻鸚鵡三枚夜食麻子三升今穀價騰貴此鳥无益有損可付西征將軍楊定國令歸本土江表傳曰孫權曾大會有白頭鳥集殿前權曰此何鳥諸葛恪對曰白頭公張昭自以坐中最老疑恪以鳥名戱之因曰恪欺陛下未聞鳥有白頭公者試使恪復索白頭母恪曰鳥名鸚䳇未必有對試使輔呉復求鸚父昭不能荅山海經曰黄山有鳥焉其狀如鴞青羽赤喙人舌能言名曰鸚鵡又曰鸚鵡慧鳥棲林啄蘂四指中分行則啄地淮南子曰鸚鵡能言而不可使長言是得其言不得其所以言說文曰鸚鵡能言鳥也文士傳曰黄祖世子射賔客大㑹有獻鸚鵡鳥者舉巵酒於禰衡曰願先生為之賦事具賦門成公綬鸚鵡賦曰小鳥以其能言解意故育以金籠昇之堂殿然未得鳥之性張華鷦鷯賦白鸚鵡慧而入籠傅咸荅李斌書曰吾作左丞未幾而以吾為京兆雖心知此為不合然是家鄉親里自願便從俗耳時足下問吾當去否吾荅鸚鵡子言阿安樂今到阿安樂何為不去冥驗記曰有鸚鵡飛集山中禽獸輙相愛重鸚鵡不可久也便去後月山中大火鸚鵡遥見便入水沾羽飛而洒之天神言汝雖有志何足云也鸚鵡曰固知不能然是山禽獸行善皆為弟兄不忍見耳天神嘉感遂滅火南方異物志曰鸚鵡有三種一種青大如烏臼一種白大如鴟鴞一種五色大於青者交州以南盡有之五色者出杜薄州凡鳥四指三向後此鳥兩指向前兩指向後異於凡鳥也行則以口啄地然後足從之又曰廣管雷羅等州俱多鸚鵡翠毛丹嘴可效人言但稍小不及隴山者每羣飛皆數百隻山果熟時遇之立盡南中云飬之切忌以手捫摸其背犯者即不飲不啄病而卒余寓番禺曽遊新㑹縣遇安南歡好使麴將軍見飬一鸚鵡背尾有深淺翠毛臆前淡紫嫩紅間出兩䏶别垂黄毛翅尾甚可愛雲南行記曰瞿笇館路﨑危又過重髙山上下各十四五里山頂平西望無人烟多鸚鵡又曰新安城路多縵出盡是松林其上多鸚鵡飛鳴周宣夢書曰鸚鵡為亡人居宅也夢見鸚鵡憂亡人也其在堂上憂賢豪也白鸚鵡羅浮山記曰山中有純白鸚鵡異苑曰張華字茂先有一白鸚鵡華每行還鳥輙說僮僕善惡后寂無言華問其故鳥云見藏瓮中何由得知公後在外令喚鸚鵡鸚鵡曰昨夜夢惡不出户公猶强之至庭為鸇所搏教其啄鸇脚僅而獲免南史曰婆皇國宋大明三年獻鸚鵡又曰婆利國梁普通三年其王頻伽遣使智獻白鸚鵡隋書曰杜正𤣥㓜聰敏博涉多通開皇末舉秀才㑹林邑獻白鸚鵡僕射楊素促召正𤣥使作賦正𤣥倉卒之際援筆立成素見文不加㸃始異之又曰獨孤師受畨客鸚鵡帝察之遂論斬決唐書曰貞觀中陁洹國王察失利多􅀢末郍遣使獻白鸚鵡毛羽皓素頭上有紅毛數十與翅齊並五色鸚鵡各一明皇襍録曰開元中嶺南獻白鸚鵡飬之宫中嵗久頗聰慧洞曉言詞上及貴妃皆呼為雪衣女性最馴擾雖常飲啄飛鳴然亦不離屏帷間上令以近代詞臣詩篇授之數遍便可諷誦上每與貴妃及諸王博戲上稍不勝左右呼雪衣娘必飛入局中鼔舞以亂其行列或啄嬪御及諸王手使不能争道忽一日飛上貴妃鏡臺語曰雪衣娘昨夜夢為鷙鳥所搏將盡於此乎上使貴妃授以多心經記誦頗精熟日夜不息若懼禍難有所禳者上與貴妃出於别殿貴妃致雪衣娘於步輦竿上與之同去既至上命從官校獵於殿内鸚鵡方戲於殿檻瞥有鷹搏之而斃上與貴妃歎息久之遂命瘞於苑中立􅊘呼為鸚鵡􅊘赤鸚鵡宋書曰謝荘為太子庶子時南平王鑠上赤鸚鵡普召羣臣為賦太子左衛率袁淑之文冠當時作賦畢齎以示荘荘賦亦竟淑見而歎曰江東無我卿當獨秀我若無卿亦一時傑也遂隠其賦南史曰西南夷詞羅地國宋元嘉七年遣使貢金指環赤鸚鵡五色鸚鵡外國傳曰扶南東漲海中有洲出五色鸚鵡㑹見其白者如母雞唐書曰𤣥宗有五色鸚鵡能言育於宫中上命左右試牽御衣鳥輒瞋目叱咤岐王文學熊延京因獻鸚鵡篇以賛其事上以鳥及延京詩示百僚尚書左丞相張說上表賀曰伏見天恩以靈異鸚鵡及熊延京所述篇出示朝班列臣按南海異物志有樂鳥鳴皆太平天下有道則見臣騐其圖丹首紅臆珠冠緑翼與此鸚鵡無異而心聰性辨護主報恩固非常品凡禽實瑞經所謂時樂鳥也延京雖叙其事未正其名望編國史以彰聖瑞又曰元和十年訶陵國遣使獻五色鸚鵡嶺表録異曰容管廉邕諸州産秦吉了大約似鸚鵡嘴脚背脛兩股後夾腦有黄玉冠善效人言音頗雄大分明於鸚鵡以熟雞子和如棗子飼之或云容州有純白色者俱未之見也孔雀春秋元命苞曰火離為孔雀周書曰成王時方獻孔雀方亦戎别名漢書曰􅄢賔國出孔雀又曰尉佗獻孔雀二雙續漢書曰西南夷滇池出孔雀又曰西城條支國出孔雀張璠漢記曰條支國臨西海出孔雀江表傳曰魏文帝遣使於吳求孔雀羣臣以為非禮欲不與孫權勅付使魏文帝與朝臣詔曰前于闐王所上孔雀尾萬枝文采五色以為金根車盖遥望耀人眼呉志曰孫休永安五年使察獸到交趾調孔雀大猪又薛綜上䟽曰日南逺致孔雀充備寶玩不抑其賦以益中國地理志曰交趾西子縣多孔雀在山草中郡内朱崖有之晉書公卿贊曰世祖時西域獻孔雀解人語彈指應聲起儛公孫皓時交趾太守孫諝貪墨為百姓所患㑹察獸鄧荀至檀調孔雀三千頭遣送秣陵既苦逺役咸思為亂郡吏吕興殺諝及荀以郡内附齊書曰武帝年十三夢人以筆畫身左右為兩翅又著孔雀羽衣裳空中飛舉又曰文慧太子長懋制珍玩之物織孔雀毛為裘光采金翠過於雉頭逺矣後魏書曰龜茲國地多孔雀羣飛山谷人取飬而食之字乳如雞鶩唐書曰髙祖穆皇后少時父母私相謂曰我女貌非常不可妄以許人當為之求賢夫矣乃於門屏畫二孔雀相對公子有求婚者輙與兩箭令射之父母潜相謂曰若中孔雀之目者即以妻之前後射者數千人莫能中髙祖後至發各中目肅公大恱因即與婚山海經曰南方多孔雀列僊傳曰蕭史吹簫致孔雀西京雜記曰魯恭王好閗鴨鴈養孔雀鵁鵲奉榖一年二千石鹽鐵論曰南越以孔雀珥門戸今貴其所饒非所以厚中國也太𤣥經曰孔鴈之儀可法則也虞翻注曰鴈飛成列亦成行故可以為法則也郭子曰梁國楊氏子年甫九歲甚聰慧孔君平詣其父不在乃呼兒出為之設果有楊梅孔指以示兒此實君家果應聲答曰未聞孔雀是夫子家禽也南越志曰義寧縣杜山多孔雀為鳥不必匹合止以音影相接便有孕楚辭曰孔雀盖兮翠旌以孔雀之羽為車盖登九天兮撫彗星華陽國志曰雲南郡出孔雀常以二月來翔月餘而去異物志曰孔雀其大如鴈而足髙毛皆有斑文采捕得蓄之拍手則舞又曰孔雀形體既大細頸隆背似鳳凰自背及尾皆作圎文五色相繞如帶千錢文長二三尺頭戴三色長毛以為冠足有距棲遊岡陵迎晨則鳴相和傅巽奢儉論曰豐狐以赤色禍身翡翠孔雀亦灾斯文異物志曰孔雀人指其尾則舞交州記曰孔雀色青尾長六七尺能舒舞足為節異物志曰交趾郡人多養孔雀或遺人以充口腹或殺之以為脯腊人又養其雛以為媒傍施捕網罟野孔雀伺其飛下則牽網横掩之採其金翠毛裝為扇拂或全株生截其尾為方物云生取則金翠之色不減耳翡翠爾雅曰翠鷸也似燕紺色出鬱林神契曰神靈滋液則翠羽耀周書曰成王時蒼梧獻翡翠漢書曰尉佗獻文帝翠鳥千又曰燕刺王旦郎中侍從貂羽黄金附蟬徐廣車服注曰天子輅金根車翠羽盖皇后首飾歩摇八雀九華加翡翠吳録曰薛綜上疏曰日南逺致翡翠充備寶玩晉令曰翡鳥不得西度隴倉頡解詁曰鷸翠别名也說文曰翡翠青赤雀也異物志曰翠鳥似燕翡赤而翠青其羽可以為飾又南州異物志曰翠唯六翮毛長寸餘青茸翡大於燕小於烏又曰翠鳥先髙作巣及生子愛之恐墜稍下作巣子生羽毛復益愛之又更下巣也又異物志曰翠大如燕腹背純赤民捕食之不知貴其毛羽也廣志曰翡色赤翠色紺皆出交趾與古縣交州志曰翡翠出九真頭黒腹下赤青縹色似鷓鴣太𤣥經曰翡翠狐鼦好作咎也離騷曰翾飛兮翠層楚辭曰翡帷翠幬宋玊登徒子賦曰眉如翠羽司馬相如子虛賦曰錯翡翠之威吳都賦曰山雞歸飛而來棲翡翠列巣以重行劉羣七筆曰剪雋陵之縹翠函葱嶺之碧雞秦書曰苻堅時西域獻翠鳥四頭雄雌各二籠盛之月餘並死左傳曰鄭子臧好聚鷸冠戰國䇿曰趙且伐燕蘇秦謂燕惠王曰今者臣來過水蚌方出曝而鷸啄其肉蚌合而拑其喙鷸曰今日不雨明日不雨即見蚌脯蚌亦謂鷸曰今日不出明日不出必有死鷸蚌鷸兩不肯解漁者并擒之今趙且伐燕燕趙久相支以弊衆臣恐强秦之為漁父也范子曰計管者蔡丘漢上人晉三公子姓辛氏字文子博學無所不通范蠡知其賢人卑身事之請受道藏於石室乃刑白鷸而盟焉鷓鴣崔鴻蜀録曰蜀連有灾大雨血地仍震地生毛鷓鴣集於城下異物志曰鷓鴣其形似雌雞其志懐南不思北其名自呼但南不北其肉肥美宜炙可以飲酒為諸膳也録異曰鷓鴣臆前有白圎㸃背上間紫赤毛其大如小野雞多對啼南越志曰鷓鴣雖東西廻翔然開翅之始先南翥其鳴自呼出杜薄州本草云自呼鉤輈格磔李羣玉山行聞鷓鴣詩云方穿詰曲﨑嶇路又聽鉤輈格磔聲白鷴西京雜記曰南越王獻髙帝白鷴黒鷴各一隻西都賦曰招白鷴下雙鵠投文竿出比目王彪之閩中賦曰林繡白鷴謝惠連雪賦曰白鷴失素雲南記曰齊休使至雲南其國饋白鷴皆生致之鶡說文曰鶡似雉出上黨列子曰黄帝與炎帝戰以鵰鶡為旗幟漢書曰京兆尹張敞舍鶡雀飛集丞相府丞相黄覇以為神雀欲以上聞敞劾奏之覇大慙續漢書輿服志曰虎賁武騎皆鶡冠以其閗死乃止故趙武靈王以表武士焉晉八王故事曰張方將移惠帝於長安入殿奉迎自頒五千騎皆捉鐵􆂫槊二節髪眊繫兜鍪皆用凉州白鶡毛天子見之大驚山海經曰煇諸之山其鳥名鶡蘇子曰帶方寸之印施丈尺之組戴鶡雀之毛建千丈之城此世俗之富貴也䳺爾雅曰鴽鴾母郭璞注曰䳺也青州呼鴾母說文曰䳺鶉屬也一曰牟母一曰鴽月令曰季春之月桐始華田鼠化為鴽梧桐以是月華故曰桐始華田鼠化為鴽幽州之䳺鶉詩曰鶉之奔奔刺衞宣姜也鶉之奔奔鵲之疆疆人之無良我以為兄又曰不狩不獵胡瞻爾庭有懸鶉兮爾雅曰鷯鶉其雄鶛牝庳其子鵁運斗樞曰機星散為鶉得義少殘百家則鶉生大戴禮夏小正曰三月田鼠化為鴽鴽鶉也化而之善故盡其辭也鴽為鼠化而不之善故不盡其辭廣志曰宛鶉大於北鶉以供御孔元舒在窮記曰趙大龍以鶉二十枚奉上老母草木状曰短頭細黄魚以九月中因秋風而變成鶉上圃吏民捕取鹽炙食滋味肥美生交趾合浦郡别傳曰占人被召見人以妄求鶉飛入網知必有罪入罔罪自取也莊子曰田鼠化為鶉萬畢術曰蝦蟇得𤓰平時為鶉注云取𤓰去穰置生蝦蟇填中祭鶉以血塗𤓰堅塞之埋東垣北角深三尺其平日發出之化為鶉賈誼新書曰宋康王時有雀生鶉占之曰小生巨必覇天下康王大悦射天笞地斬社焚之為齊所滅中論曰俗士之牽達人猶鶉鳥之欺孺子鶉之性善近人飛不逺行不速似將可獲故孺子逐之不已俗士似將可悟而卒難移達人所以乾脣竭聲而不捨也周書時訓曰清明之日田鼠化為鴽鼠不化鴽國多貪殘兵書曰兩敵相當鶉集壁上軍士五日敗晉記曰趙王倫篡位有鶉入太極殿有雉集於東堂楚辭曰鸇鷂兮軒軒鶉䳺兮甄甄哀我兮寡獨非有兮疋倫秘苑曰安定原上築城時奠祭以觚爵忽有一鶉飛於觚上因名鶉觚城后魏文帝天統中立為鶉觚縣夢書曰鶉鷃為闘相見怒也夢見鶉鷃憂闘也交州記曰武寧縣秋九月黄魚上化為鶉鳥萬春鳥典畧曰北齊高緯時有萬春鳥見齊仙都苑上大為造萬春堂以應嘉瑞舍利鳥隋書曰婆利國有鳥名舍利解人語大業十年遣使入貢後遂絶兵曹鳥唐書曰崔希喬為并州兵曹所前叢葦有小鳥如鷦鷯來巣孕卵五色大如雞子數日􅑹毁雛見已踰母日餘五色成文大如雞馴擾閑暇頃之飛翔時歸舊所人因號為兵曹鳥巢衣鳥洞㝠記曰漢武帝時忽有細鳥集於幃屏或集人衣襟因名巣衣鳥宫内嬪皆好之有鳥集其衣者輒䝉愛幸至武帝末稍自死人有愛其皮者多為丈夫取媚王莽末猶有一兩箇去來莽羅得之太平御覽卷九百二十四
