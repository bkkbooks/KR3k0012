front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_005-1a, image: WYG0893/WYG0893-0073a.png}
body:
  text: 太平御覽卷五宋李昉等撰天部五星上星上釋名曰星散也列位布散也宿宿也星各止宿其所也說文曰萬物之精上為列星三五厯記曰星者元氣之英水之精也易曰日中見斗幽不明也又在天成象在地成形書曰乃命羲和欽若昊天厯象日月星辰敬授人時又日中星鳥以殷仲春書曰庶民惟星星有好風星有好雨星民象故庶民惟星箕星好風畢星好雨月之從星則以風雨月經於箕則風離於畢則雨政教失常以從民欲所以亂也詩曰晥彼牽牛不以服箱注晥星明貎河鼓謂之牽牛也又維南有箕不可以簸揚維北有斗不可以挹酒漿又東有啓明西有長庚又嘒彼小星三五在東又子興視夜明星有爛又三星在戸又定之方中作于楚宫又維南有箕載翕其舌維北有斗西柄之掲又昏以為期明星煌煌禮曰八月中氣是月也命有司享夀星於南郊又十二月是月也日窮于次月窮于紀星回于天又幽宗祭星也又天秉陽垂日星又宿離不忒無失經紀注二十八宿為經七曜為緯周禮曰保章氏掌天星以志星辰日月之變動以觀天下之遷辨其吉凶以星土辨九州之地所封封域皆有分星以觀妖祥左傳曰魯莊公七年夏四月辛卯夜恒星不見夜中星隕如雨又魯僖公五年晉侯復假道於虞以伐虢問於卜偃曰吾其濟乎對曰克之童謡云丙之晨龍尾伏辰杜預曰龍尾尾星也又十六年春隕石于宋五隕星也又魯襄公二十八年春無氷梓慎曰今兹宋鄭其饑乎歲在星紀星紀在丑而滛於𤣥枵𤣥枵在虚危之次星紀斗牛之次以有時災隂不堪陽蛇乗龍龍歳星木也木為青龍蛇為𤣥武龍失次也龍宋鄭之星也宋鄭必饑𤣥枵虛中也枵耗名也土虛而民耗不饑何為又昔髙辛氏有二子長曰閼伯季曰實沉居於曠林不相能也日尋干戈以相征討后帝不臧后帝堯臧善也遷閼伯于商丘主辰商丘東地也主祀辰星辰也大火也商人是因故辰為商星商人湯先祖封商丘因閼伯故國祀辰星遷實沉于大夏主參大夏今晉陽縣也唐人是因故晉為參星又火中寒暑乃退心以季夏昏中而暑退季冬旦中而寒退又昭三十二年呉伐越史墨曰不及四十年越其有吳乎越得嵗而吳伐之必受其凶榖梁傳曰列星曰恒星亦曰經星恒經皆常也爾雅曰星紀斗牽牛也𤣥枵虛也又祭星曰布布散食於四方又西陸昴也郭璞曰昴西方之宿别名旄頭論語曰為政以徳譬如北辰居其所而衆星共之易是類謀曰五星合狼弧張晝視無日光虹霓煌煌太山失金鷄西岳亡玉羊太山失金鷄者箕星亡也箕者風也風動鷄鳴今箕候亡故鷄亦亡也西岳亡玉羊者星在未為羊鷄失羊亡羣臣縱恣人愁不祥京房對灾異曰人君不行仁恩破胎傷孕春殺無辜則歳星失度尚書考靈曜曰歳星木精熒惑火精鎮星土精太白金精辰星水精也又歳星得度五榖孳熒惑順行甘雨時鎮星得度地無灾太白出入當五榖成熟人民昌又心大星天王也其前星太子後星庻子也詩紀厯樞曰箕為天口主出氣尾為逃臣賢者叛十二諸侯列於庭元命苞曰五諸侯此云十二則兼他星為數也禮稽命圖曰作樂制禮得天心則景星見也禮斗威儀曰鎮星黄時則祥風至春秋説題辭曰星之為言精也熒也陽之精也陽精為日日為星故其字日生為星春秋元命苞曰直狼北有一大星為老人星見則治平主夀亡則君危主亡常以秋分候之又商紂之時五星聚於房房者蒼龍之精周據而興又玉衡北兩星為玉繩玉之為言溝刻也瑕而不掩折而不傷宋均注曰繩能直物故名玉繩溝謂作噐又心三星五度有天子明堂布政之宫又尾九星箕四星為後宫之塲列為南宫其庭太㣲又蟾蜍隂精流生織女立地候宋均注曰地候鎮星别名也又三台星色齊君臣和不齊大乖春秋合誠圖曰天文地理各有所主北斗有七星天子有七政也又軒轅主雷雨之神旁有一星𤣥戈名曰貴人旁側郎位主宿衛尚書春秋運斗樞曰北斗七星第一天樞第二璇第三璣第四權第五玉衡第六開陽第七揺光廣雅又云樞為雍州璇為冀州機為青兖州權為徐揚州衡為荆州開陽為梁州揺光為豫州第一至第四為魁第五至第七為杓合為斗居隂布陽故稱北斗又五帝所行同道異位皆循斗樞璣衡之分遵七政之紀九星之法又天樞得則景星見衡星得則麒麟生萬人夀春秋後傳曰魏人唐睢對秦王曰専諸之刺王僚彗星籠月色春秋文耀鈎曰老人星見則主安不見則兵起論語䜟曰仲尼曰吾聞堯率舜等遊首山觀河渚有五老遊河渚一老曰河圖將來告帝期二老曰河圖將來告帝謀三老曰河圖將來告帝書四老曰河圖將來告帝圖五老曰河圖將來告帝符龍銜玉苞金泥玉檢封盛書五老飛為流星上入昴孝經援神契曰歲星守心則年榖豐廣雅曰太白謂之長庚或謂之太囂又熒惑謂之罰星或謂之執法又天宫謂之紫宫參伐謂之大辰太㣲謂之明堂史記天官書曰星者金之散氣又漢中四星曰天駟旁一星王良王良䇿馬車騎滿野又星墮至地則石也河濟之間時有墜星又畢為罕車為邊兵主弋獵其大星傍小星為附耳附耳動有䜛臣在側又四鎮星所出四隅若月始出也又咸池曰天潢五帝車舎又中端門門左右掖門門六星諸侯其内五星五帝坐又漢武帝以正月上辛祠太一甘泉夜祠到明忽有星至於祠壇上使童男女七十人俱歌十九章之歌又魁下六星兩兩相比者曰三能蘇林曰能音台又東宫蒼龍房心心為明堂為天府又國皇星大而赤狀類南極徐廣注曰南極老人星也又五星皆大其事亦大皆小其事亦小早出為盈盈者為客晩出為縮縮者為主同舎為合相陵為鬭漢書曰皇甫嵩為太尉以流星免官又武帝時中星盡揺占曰民勞也後征伐四夷又北斗七星所謂璇璣玉衡以齊七政杓攜龍角孟康曰杓斗柄也龍角東方宿也􅂝連也殷衡南斗魁枕參首晉灼曰衡斗之中央殷中也又營室為清廟亦曰離宫又河鼔大星上將其北織女織女天女孫又髙帝七年月暈圍參畢七重占曰畢昴間天街街北胡也街南中國也後有平城之圍又太微十二星東相西將又斗魁戴匡六星曰文昌宫一曰上將二曰次將三曰貴相四曰司命五曰司禄六曰司灾又危東六星兩兩相比曰司㓂又古人有言曰天下太平五星循度又革命創制三章是紀應天順人五星同軌又郊祀志曰漢祖詔御史令天下立靈星祠常嵗時祠以牛又天文志曰金木水火土五星天之五佐為經緯伏見有時嵗星東方春於人五常仁也五事貎也仁虧貎失逆春令傷木氣罰見嵗星熒惑南方夏禮也視也禮視失逆夏令傷火氣罰見熒惑太白西方秋義也言也義虧言失逆秋令傷金氣罰見太白太白經天孟康注曰謂出東入西出西入東也太白隂星出東當㐲東出西當伏西過午為經天晉灼曰星晝見午上為經天天下革民更主是謂亂紀人民流亡晝見與日爭明强國弱小國强女主昌辰星北方冬智也聽也智虧聽失逆冬令傷水氣罰見辰星填星中央土主季夏信也仁義禮智以信為主貎視聽以心為正四星皆失填星乃為之動又凡五星色皆圜白為䘮為旱赤中不平為兵青為憂為水黒為疾為多死黄吉五星同色天下偃兵百姓安寧歌舞以行不見災疾五榖蕃昌又天星皆有州國分野角亢氐房心豫州之分尾箕幽州之分牽牛婺女揚州之分虛危青州之分營室東壁并州之分胃徐州之分畢昴冀州之分觜參益州之分東井輿鬼雍州之分栁七星張三河之分翼軫荆州之分析木之津燕之分大火宋之分夀星鄭之分鶉尾楚之分鶉首秦之分鶉火周之分實沉魏之分大梁趙之分降婁魯之分訾即移反娵于于反衛之分𤣥枵齊之分星紀吳越之分太史掌之以觀妖祥又秦地於天官東井輿鬼之分野周地柳七星張之分野韓地角亢氐之分野趙地昴畢之分野燕地箕之分野齊地虛危之分野魯地奎之分野宋地房心之分野衛地營室東壁之分野楚地翼軫之分野呉地斗牛之分野漢武故書曰西王母使者至東方朔死上問使者對曰朔是木帝精為嵗星下遊人中以觀天下非陛下臣也漢書音義曰瑞星曰景星亦曰徳星妖星曰孛星偏指曰彗光芒四出曰孛長星亦曰欃槍絶跡而去曰飛星光跡相連曰流星亦曰奔星星光曰芒後漢書曰嚴光字子陵與光武為友後光武登祚忘之光怨帝是時太史云天上有客星恨帝帝曰豈非朕故人嚴子陵乎遽命徴之夜與子陵共卧光以脚加帝腹太史奏客星侵御座子陵縮脚客星尋退竟不仕又李固對詔陛下有尚書猶天之有北斗北斗天之喉舌尚書陛下之喉舌斟酌元氣運於四時出納王命所謂制氣之臣也又和帝分遣使者二人各至州郡觀採風謡二人當到益州投候館吏李郃舎郃問曰二君發京師時知朝廷遣二使耶問何以知之郃指星云前有二星向益州分野謝承後漢書曰吳郡周敞師事京房房為石顯所譖繫獄謂敞曰吾死後四十日客星必入天市即吾無辜之驗也房死後果如房言東觀漢記曰光武破聖公與伯叔書曰交􅄡之日辰星晝見太白清明蜀志曰漢安二十五年劉豹舉上言於先主曰乃年太白熒惑鎮從嵗漢初興五星聚嵗星主義漢位在西義之上方故漢法常以嵗星候人主當有聖主起於此以致中興頃者熒惑復追嵗見在胃昴為天維經曰帝星處之衆邪消亡於是先主即位續晉陽秋曰桓𤣥生母馬氏本袁真之妓也與同列薛氏郭氏夏夜同出月下有銅甕水在其側見一流星墮甕中驚喜共視見星如二寸火珠於水底冏然明淨乃相謂曰此吉祥也誰當應之於是薛郭更以瓢接取並不得馬最後取星正入瓢中便飲之既而若有感焉俄而懐𤣥𤣥雖簒位不終而數年之中榮貴極矣太平御覽卷五
