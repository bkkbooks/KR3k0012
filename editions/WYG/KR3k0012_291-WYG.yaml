body:
  text: 太平御覽卷二百九十一宋李昉等撰兵部二十二料敵下料敵下宋書曰晉義熈五年二月偽燕王慕容超大掠淮北三月帝抗表北伐以丹陽尹孟昶監中軍留府事乃浮淮入泗五月至下邳留船步軍進瑯琊所過築城留守超大將軍公孫五樓請斷大峴堅壁清野以待超不從初謀是役議者以為賊若嚴守大峴軍無所資何能自返帝曰不然鮮卑性貪畧不及逺既幸其勝且愛其國必將引我且亦輕戰師一入峴吾何患焉及入峴帝舉手指天曰事濟矣衆問其故帝曰師既過險士有必死之志餘粮栖畝軍無匱乏之憂勝可必矣通典曰陳將吳明徹進逼夀陽北齊將王琳拒守又遣大將皮景和率兵數十萬來援去夀春三十里頓軍不進諸將咸曰堅城未拔大援在近不審公計將安出明徹曰兵貴在速而彼結營不進自挫其鋒吾知其不敢戰明矣於是躬擐甲胄疾攻一鼓而尅壽陽又曰西魏遣將于謹討梁元帝於江陵長孫儉問謹曰為蕭繹之計將欲如何謹曰耀兵漢沔席卷度江直據丹陽是其上䇿移郭内居民退保子城峻其陴堞以待援至是其中䇿若難於移動據守羅郭是其下䇿儉曰揣繹定出何䇿謹曰必用其下䇿儉曰彼棄上而用下何也對曰蕭氏保據江南綿厯數紀屬中原多故未遑外畧又以我有齊氏之患必謂力不能分且繹懦而無謀多疑少斷人難慮始皆戀邑居既惡遷移當保羅郭所以用下䇿也謹令中山公䕶及楊忠等圍之梁王率其太子以下出降殺之又曰後魏末原州民豆盧狼害都督大野樹兒等據州城反州人李賢乃招集豪傑謀曰賊起倉卒便誅二將其勢雖盛其志已驕然其政令莫施惟以殘剝為業夫以霸據之賊而馭烏合之衆勢自離解今若從中擊之賊必喪膽如吾計者指日取之衆皆從賢乃率敢死士三百人分為兩道乗夜鼓譟而出羣賊大驚一戰而敗狼遁走追斬之後魏書曰李順使涼州還世祖問蒙遜政教得失順曰蒙遜專威河右三十許年雖不能貽厥將來猶足以終其一世但前歳表許十月送曇元䜟及臣往迎便乖本意不忠不信於是殆甚以臣觀之不復周矣世祖曰若如卿言則效在無逺其子必復襲世襲世之後早晩當滅順曰臣畧見其子並非俊才能保一隅敦煌太守牧犍噐性粗立若繼蒙遜者必此人也然比之於父僉謂不逮殆天所用資聖明也已而蒙遜死問至世祖謂順曰卿言蒙遜死今則騐矣又言牧犍立何其妙哉想朕克凉州亦當不逺於是賜絹千疋廐馬一疋進號安西將軍寵待彌厚唐書曰武德初劉武周據太原使其將宋金剛屯於河東太宗征之謂諸將曰金剛懸軍千里深入吾地精兵驍將非其所統但統一枝遊騎耳吾逆知其不能濟事也吾何慮焉當使之自退諸將苐觀之且兵法曰彼客我主彼利速戰我惟持久待之彼不戰自走矣金剛率衆挑戰不得鋭氣既挫士卒無鬭志俱有離心金剛謂其衆曰我軍深入利在速戰今進不能戰退恐敵兵躡其後柰何太宗謂諸將曰武周自據太原專倚金剛以為捍蔽金剛雖衆内實空虛虜掠為資意在速戰我堅營蓄鋭以挫其鋒分兵汾隰衝其心腹彼粮盡計窮自當遁走當待此幾未宜速戰於是遣劉𢎞等絶其粮道其衆遂亂金剛果遁又曰武德中李靖隨河間王孝公討蕭銑師至於清江尅銑荆門遣其將乗勝入北江銑悉兵以拒之孝公將戰李靖止之曰楚之輕鋭難與争鋒今新失荆門盡兵出戰此救敗之師也非其本圖勢不能久一日不戰賊必兩分留輕兵以抗我退羸師以自守此即勢虧力弱擊之必捷孝公不從遣靖安營自以鋭師水戰孝公果敗於南岸又曰隋末王世充殺其主越王侗自僭偽號太宗率師討之世充求援於河北竇建德將全軍赴之諸將計曰王世充據有東都患者在於乏食建德親總軍旅來拒我師亦當盡彼驍雄期於奮决若縱其至此兩寇相連轉河北之粮以相資給則伊洛之間戰鬭不已今宜分兵守營深其溝防即世充欲戰慎勿出兵大王親選猛鋭先據城皋之險偃兵坐甲以待其至彼以疲弊之師當我堂堂之勢一戰必克建德既破則世充自下不過兩旬夏鄭二主可面縛於麾下矣若退兵自守計之下也秦王喜曰合吾意是日出師據虎牢卒擒建德又曰隋煬帝為突厥所圍郡縣皆發赴援時太宗年未弱冠召募從軍𨽻屯衛將軍雲定興師將發太宗勸之多賫旗鼓設疑兵以威突厥定興初不納太宗謂之曰始畢掃其境内敢圍天子本疑國家倉卒無援忽見旗鼓之盛必謂救兵雲集今者師進可前後相次令數十里間連亘不絶晝則旗旛相續夜則鉦鼓相應以張形勢賊見必懼望塵而退此計之上也不然則為所輕悉軍來戰公必不支矣定興悦而從焉將次崞縣突厥候騎馳告始畢曰兵大至遂解圍而退果如所籌又曰太宗遣李靖經畧突厥以張公謹副公謹因言突厥可取之狀曰頡利縱慾肆情窮凶極暴誅害良善悦近小人此即主昏於上其可取一也又其别部同羅僕骨迴紇延佗之類並自立君長將圖反噬此則衆反於下其可取二也突利被疑輕騎自免招設出討匹馬不歸欲谷喪師立足無地則兵挫將敗其可取三也塞北寒霜早餱粮乏絶天降之災因以饑饉其可取四也頡利踈其突厥委諸胡人胡人翻覆是其常性大軍一臨内必生變其可取五也華人入北其類實多比聞自相嘯聚保據阻險師出塞垣自然有應其可取六也太宗深納之及破定襄敗頡利頗預謀畧進爵為國公又曰元和十年王師討淮西鎮州節度使王承宗淄青節度使李師道謀撓王師遣刺客於京城殺宰相武元衡憲宗怒命御史中丞裴度為宰相專主兵機以誅三盜時淮西鎮冀兩道用軍度支儲運供餉不暇復又諸軍玩冦隂與賊通冀朝廷力竭即行赦雪議者患之宰相韋貫之奏曰陛下豈不知建中之事乎天下兵始於蔡急魏應齊趙同惡德宗率天下兵令馬燧李抱真急擊之物力既屈朱泚乗間為亂朱滔南向指闕致使梁漢為府奉天有行皆陛下出所聞見非他也不能忍待次第速於滅賊故也陛下獨不能寛歲月之計俟援蔡而圍鎮耶上深然之而已下詔矣後擒元濟而承宗服果如貫之所籌漢晉春秋曰亮圍祁山招鮮卑軻比能等至故北地石城以應亮於是魏大司馬曹真有疾司馬宣王自荆州入朝魏明帝曰西方事重非君莫可付者乃使西屯長安都督張郃費曜戴陵郭淮等宣王使曜陵留精兵四千上邽餘悉衆出西救祁山郃欲分駐雍宣王曰料前軍獨能當之者將軍言是也不能當分為前後此楚之三軍所以為黥布擒也遂進亮分兵留攻自逆宣王於上邽淮與曜邀亮亮破之因芟其麥宣王遇於上邽之東歛兵依嶮軍不得交亮引兵而還宣王尋亮至於鹵城張郃曰彼逺來逆我請戰不得謂我利在不戰欲以長計制之也且祁山大軍以近人情自固可上屯於此分為竒兵亦出其後不宜進前而不敢逼坐失民望也今亮懸軍食少亦行去矣宣王不從固尋亮既至又登山掘營不肯戰賈詡魏平數請戰且曰公畏蜀如畏虎柰天下笑何宣王病之諸將咸請戰五月辛巳乃使張郃攻無當監何平於南國自案中道向亮亮使魏延高翔吳班赴拒大破之獲甲首三千級鎧五千宣王退還保營袁希之漢表傳曰丞相亮出軍圍祁連山始以木牛運粮魏司馬宣王張郃救祁連山夏六月亮粮盡軍還至於青封木門郃追之亮駐軍削大樹皮題曰張郃死此樹下豫令兵夾道以數千强弩備之郃果自見千弩俱發射郃而死韓子曰趙主父使李疵視中山可攻不報曰可攻也主父曰何故可攻對曰某見巖穴窮閻隘巷之士以十數亢禮下布衣之士以百數矣君曰是賢君也安可攻疵曰然矣好顯巖穴之士而朝之則戰士怠於行陣上尊者下居士而朝之則農夫惰於力田戰士怠於陣者兵弱也農夫惰於田者國貧也衛公兵法曰凡與敵相逢持軍相守欲知彼算將揣其謀則如之何對曰士馬驍雄示我以羸弱陣伍齊肅示我以不戰見小利佯為不敢爭伏竒兵故誘以奔北内實嚴警外為弛慢恣行間諜託以忠告或使使以相忿或厚賂以相悦移師則減竈舍營則偃旗智足以及謀勇足以及怒非得地而不舍非全軍而不侵以多擊少必取於晨朝以寡擊衆必候於日暮如此則兵多詭狀將有深圖理雖曲為防慎不可入其規畫故傳曰見可而進知難而退軍之善政也但敵故無小蜂蠆有毒且鳥窮則喙獸窮猶觸者皆自衛其生命而求免於禍難也若困而不鬭乃知不逮於鳥獸其能將乎必須料敵制勝誡於小利然後可立大功矣或又問曰所謂料敵者何對曰凡料敵者料其彼我之形定乎得失之計始可出兵而决於勝負矣當料彼將吏孰與己和客主孰與己逸排甲孰與己堅噐械孰與己利教練孰與己明地形孰與己險城池孰與己固騎畜孰與己多粮儲孰與己廣工巧孰與己能秣飼孰與己豐資貨孰與己富以此揣而料之焉有不保其勝哉夫軍無小聽聽必審也戰無小利利必大也審聽之道詐亦受之實亦受之工亦受之拙亦受之其詐而似實亦受之實而似詐亦受之但當明聽其實叅㑹衆情徐思其騐鍜鍊而使不得逆詐自聰挫折愚人之詞又不得聽庸人之説稱敵寡弱輕侮衆心而不料其虛實又不得受敵人以小利餌我勇士輙掠騎畜獲其首級將闇不斷而重賞之忽敵無備必為所敗揣敵之術亦易知矣若辭怒而不戰者待其援也杖而立汲而先飲者倍程迫速渇之甚也夫欲行無窮之勢圖不測之利其事煩多略陳而已矣若遇小冦而有不可擊者為其將智而謀深士勇而軍整鋒甲堅鋭而地險騎畜肥逸而令行如此則士畜必死之心將懐擒敵之計此當固而待之未得輕而犯也時逢大敵而不可鬭也彼將愚昧而政令不行士馬雖多而衆心不一鋒甲雖廣而兵刄不堅居地無固而粮運不繼卒無决戰之志傍無軍馬之援此可襲而取之抑又聞之統戎行師攻城野戰當須料敵然后縱兵夫為將能識此之機變知彼之物情亦何慮功不建鬭不勝哉又曰敵有十五形可擊新集始至行陣未定未食雖已結陣須饋食不順逆風向月建後至敵后來不得山川地勢利奔走行陣无次用力不齊陣布不均不戒我示弱誘之戰不設備勤勞倍道兼行人馬未息衣甲馳路維乗不整將離大將已去獨任小將素不威服長路趨戰争利晝暮不息候濟半渡疾擊不暇貪利求勝不暇畫陣險路泥濘阻夾車馬單行左右難救擾亂行列失序進退不齊縱不相載横不相對或坐或立驚怖卒然相逢都无備預鼓譟掩甲三軍震攝不定陣數移動人馬數顧師有十過勇而輕死可暴貪而好利可遣仁而不忍可勞知而不怯可窘信而喜信可誑亷而愛人可侮慢而心緩可襲剛而自用可誘懦志多疑可惑孫子曰軍傍有險阻蔣潢井生葭葦小林翳薈者必謹覆索之此伏奸之所藏處也險者一髙一下之地阻者草蔣水草之藂生潢者池也井者下也葭葦者衆木所居也翳薈者可以屏籠蔽處也此以上相地形此以下察敵情也翳薈草木之相蒙蔽可以藏兵處反覆索之也敵近而静者恃其險也敵逺而挑人者欲人之進也其所處者居易利也所居利也言敵去我近足遣輕佻使前就之其所處者多平利也衆樹動者來也斬拔樹木除道進來故動衆草多障者疑也結草為陣欲使我度稠草中多障蔽者敵必逃去恐追及多作障蔽使人疑有伏也鳥起者伏也下有伏兵住藏觸鳥而驚起獸駭者覆也敵廣張陣兾來覆我故獸驚駭也塵高而鋭者車來也車馬行疾速塵上衝故高也卑而廣者徒來也散而條達者薪採來也塵散衍而條達各行所來也少往來者營軍者也少塵少也辭卑而益備者進也其人來使辭卑使必進來間視之敵増備也辭强而進驅者退也詭詐也來驅馳无所畏是欲退輕車先出居其側者陣也陣兵欲戰也輕車馳車在陣側無約而請和者謀也未有要約而使來請和者有間謀也奔走而陳兵者期也自與偏將期也半進半退者誘也倚仗而立者饑也倚仗予戰而立者饑之意汲設飲者渇也向人見利而不進者勞也士疲勞也敵人來見我利而不能擊進者疲勞鳥集者虛也敵大作營壘示我衆而鳥集其上其中虛者也夜呼者恐也軍士夜喧争將不勇相驚而無備者恐懼也軍擾者將不重也无威重旗動者亂也旌旗謬動東西傾倚者亂也吏怒者倦也軍吏悉怒將者疾倦粟馬食肉軍無懸箠不及其舍者窮冦也􅂖馬食肉不復畜積无懸簞之食欲死戰此窮冦也箠即簞之類也諄諄翕翕徐言入入者失衆也諄諄者語貌又足貌也翕翕者不直貌上失卒之心少氣之意徐言入入者與之言安徐之貌此將失其衆也諄章倫切翕許及切數賞者窘也軍不索敵數行賞欲士卒之力戰者此恐窘者也數罰者困也數行刑罰者教令施廢是困者也先暴而後畏其衆者不情之至也先行悍暴於士卒而后欲畏己者此將不情之極也來委謝者欲休息也戰未相伏而下其意氣相委謝者欲休息也兵怒而相迎久而不合又不相去謹而察之備其伏也此必有間諜也又曰凡敵有不卜而與戰有不占而避之疾風大寒早興㝠遷剖冰濟渡盛夏炎熱興役無間行饑驅渇務取於逺師久無粮士衆怨怒妖祥疑惑上不能止軍資既竭時多霖注欲掠無所師衆不多地土不利人馬疾疫道逺日暮士卒勞倦饑未及食解甲而息將薄吏輕士卒不固三軍數驚師徒無助陳而未定舍而未畢行坂渉險半隠半出諸如此類擊而勿疑若土地廣大人衆富盛上愛其下惠施流布賞信行察發正得時行陣居列任賢使能師徒習教甲兵精鋭四隣有助大國有援凡如此類憚而避之故曰見可而進知難而退也太平御覽卷二百九十一
