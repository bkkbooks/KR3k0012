body:
  text: 太平御覽卷四百二十二宋李昉等撰人事部六十三義下義婦義下戰國策曰孟嘗君出記問門下諸客誰能為文收債於薛者馮諼曰能于是載劵契而行辭曰收債畢何市而反孟嘗曰視吾家所寡有者乃為之至薛召諸民當償債者悉來合劵遍合乃矯命以債賜諸民燒其劵民稱萬歲長驅到齊晨而求見孟嘗怪其疾正衣冠而見之曰債畢收乎來何疾也何市而反諼曰君云視吾家所寡有者臣竊計君宫中珍寳滿内府狗馬實外廐美人充後宫君家所寡有者義耳竊以為君市義曰市義奈何曰今君有區區之薛不能撫愛其民因而賈利之臣竊矯君命以債賜諸民因燒其劵民稱萬歲乃臣所以為君市義也孟嘗君不悅曰諾先生休矣後期年孟嘗就國于薛未至百里民扶老攜幼迎君道中顧謂諼曰先生所謂為文市義者乃今日見之又曰秦縮高鄢陵人也其子仕秦秦以為管守魏信陵君攻之不下乃使人謂鄢陵君曰遣縮高來吾將仕之使為持國尉鄢陵君曰小國不能必其民使者自徃請使吏導使者至縮高曰君之命高也將使攻管也父攻子守人之大笑也見臣而下是背主也父殺子背亦非君善敢再拜辭使者以報信陵君大怒遣使謂鄢陵君曰鄢陵之地亦猶魏也今吾攻管而不下則秦兵不返社稷必危矣願君生束縮高而致之若君弗致吾將十萬之師以造君城下鄢陵君曰吾先君成侯受詔襄王以守此地受太府之憲曰子殺父臣殺君有常不赦國雖大赦降城亡子不得預焉今縮高不受大利以全父子之義而君曰生致之是使我負襄王之詔而廢太府之憲雖死終不敢行也縮高聞之曰信陵君為人悍而自用此辭反必為國禍吾已全已為人臣之義矣豈可使吾君有魏患乎乃之使者舍自刎頸而死信陵君聞之大驚縞素出舍使使者謝鄢陵君曰無忌小人也困于思慮敢再拜釋罪英雄記曰袁紹以臧洪為東郡太守時曹操圍張超於雍丘洪始聞超被圍乃徒跣號泣並勒所領將赴其難從紹請兵而紹竟不聴之超城遂陷張氏族滅洪由是怨紹絶不與通紹增兵急攻洪城中粮盡厨米三升使為薄糜遍班士衆又殺其愛妾以食兵將咸流涕無能仰視男女七八千相枕而死莫有離叛城陷生執洪紹謂曰臧洪何相負若是今日服未洪據地瞋目曰諸袁事漢四世五公可謂受恩今王室衰弱無輔翼之意而欲因際㑹觖望非冀惜洪力劣不能推刃為天下報仇何為服乎紹乃命殺之洪邑人陳容在坐見洪當死起謂紹曰將軍今舉大事欲為天下除暴而先誅忠義豈合天意紹慚遣人牽出謂曰汝非臧洪儔歟空復爾為容顧曰夫仁義豈有常所蹈之則君子背之則小人今日寧與臧洪同日死不與將軍同日生遂復見殺在紹坐者無不歎息又曰袁譚既死弟熈尚為其將焦觸張南所攻奔遼西烏桓觸自號幽州刺史陳兵數萬殺白馬盟曰違命者斬各以次㰱至别駕代郡韓珩曰吾受袁公子厚恩今其破亡智不能救勇不能死北面曹氏所不能為也一坐為珩失色觸曰舉大事當立大義事之濟否不待一人可卒珩志以厲事君曹操聞珩莭甚高之屢辟不至又曰公孫瓚字伯珪為上計吏郡太守劉基為事被徵伯珪御重到洛陽身執徒養基將徙日南伯珪具豚米於北邙上祭先人觴醊祝曰昔為人子今為人臣當詣日南多瘴氣恐或不還與先人辭于此再拜慷慨而起觀者莫不歔欷在道得赦俱還魏畧曰郭憲字幼簡西平人以仁篤為一郡所歸韓約失衆從羌中還依憲衆人多欲取約以邀功而憲責之言人窮來歸我云何欲危之遂擁䕶厚遇之其後約病死而田樂楊逵等就斬約頭當送之逵等欲條疏著憲名憲不肯在名中言我常不忍生圖之豈忍取死人以要功乎逵等乃止時太祖方攻漢中在武都而逵等送約首到太祖宿聞憲名及視條疏怪不在中以問逵逵等具以情對太祖歎其至義乃表例與逵等並賜爵關内侯列士傳曰羊角哀左伯桃二人相與為死友欲仕於楚道遙山阻遇雨雪不得行饑寒無計自度不俱生也伯桃謂角哀曰天不與我深山窮困併在一人可得生官俱死之後骸骨莫收内手捫心知不如子生恐無益而弃子之器能我樂在樹中角哀聴伯桃入樹中而死得衣糧前至楚楚平王愛角哀之賢嘉其義以上卿禮塟之竟角夜夢見伯桃曰蒙子之恩而獲厚塟然正苦荆將軍家相比欲役使吾吾不能聴也與連戰不勝今月十五日當大戰以決勝負得子則勝否則負矣角哀至期日陳兵馬詣其冡上作三桐人自殺下而從之君子曰執義可為世規唐新語曰陸南金博涉經史言行修謹開元初太常少卿盧崇道犯罪自嶺南逃歸匿于南金家俄為讐人所發詔侍御史王旭按之崇道辭引南金旭處以極法南金弟趙壁請代兄死南金執稱弟實自誣身請當罪兄弟争死旭問其故趙壁曰兄且是嫡又能幹家亡母未塟小妹未嫁自惟幼劣生無所益身自請死旭列上其狀𤣥宗嘉而宥之張說陸象先等咸相欽重累遷庫部貟外郎南金祖士季為隋王侗記室兼侍讀侗稱制授著作郎時王世充將行簒奪侗謂士季曰隋有天下三十餘載朝廷文武豈無忠烈者乎士季對曰見危授命臣之宿心今請因其啟事便加手刃後事洩世充遂停士季侍讀貞觀初為太學博士而卒又曰畢構性至孝丁繼母憂有兩妹皆在襁褓構乳養嫁遣之及其亡也二妹初聞哀慟氣絶者久之言曰雖兄弟無三年之禮吾荷鞠養豈同常人遂行三年服朝野聞之莫不稱歎構弟栩任太府主簿留司東都聞構疾星馳赴京侍醫藥者累月既而哀毁骨立變服視事踰年未嘗言笑深為朝野所重構嘗為益州長史兼按察使多所舉正風俗一變𤣥宗降璽書慰之曰卿孤潔獨行有古人之風自臨蜀川弊化頓易覽卿前後執奏何異破柱求姦諸使之中在卿為最終戸部尚書又曰李遜為貝州刺史甘露徧於庭樹邑人曰美政所致請以聞遜謙退寢其事厯官十七政俸祿先兄弟嫂姪謂其子曰吾厚汝曹以衣食不如厚之以仁義勿辭弊也天下莫不嗟尚之又曰姚崇少不慕學年踰弱冠嘗過所親見修文殿御覽閱之甚喜遂躭文史以文華著名厯牧常揚吏人並建碑紀德再秉衡軸天下欽其公直外甥任奕任异少孤長於崇家乃與之立家産謂之曰汝與吾無間然矣惜殊宗而代踈命與其子連名冀無以别也時人美之又曰孟景休事親以孝聞丁母憂毁瘠踰禮殆至滅性弟景禕年在襁褓景休親乳之祭為之豐及塟時属祁寒跣履雪霜脚指墮而復生如初景休進士擢第厯監察御史鴻臚丞為來俊臣所搆遇害時人傷焉義婦南史孝義傳呉興乘公濟妻姚氏生二男而公濟及兄願公乾伯並卒各有一子姚養育之賣田宅為取婦自與二男寄止隣家明帝詔為其二子婚表閭復徭役又㑹稽永興呉翼之母丁氏少喪夫性仁愛遭年荒分衣食以飴里中飢餓者隣里求借未嘗違同里陳攘父母死孤單無親戚丁收養之及長為營婚娶同里王禮妻徐荒年客死丁隂為買棺器自徃斂塟元徽末大雪商旅斷行村里比室飢餓丁自出鹽米計口分賦同里在僑家露四喪無以塟丁為辦冡椁有三調不登者代為遂丁長子婦王氏守寡執志不再醮州郡上言詔表門閭復租稅崔鴻十六國春秋前趙錄曰冠軍喬晞攻介休尅之其令賈潭􅎨節不降晞怒殺之其妻宗氏年二十餘有姿色晞欲納之宗罵曰屠各奴何有害人之夫而欲加無禮于其婦乎何不速殺我遂仰天大哭亦殺之唐書獨孤武都謀叛王世充歸于我其子師仁方三歲世充以其幼不殺乳母王英蘭髠鉗求入保養世充許之英蘭扶乞所得與師仁唯自啖土飲水而竟為採拾竊師仁至京師高祖嘉之封永壽鄉君又曰陽三安妻李氏雍州涇陽人也事舅姑以孝聞及舅姑亡沒三安亦死二子孩童家至貧窶李晝則力田夜便紡績數年間塟舅姑及夫并夫之叔姪兄弟七喪深為逺近所嗟尚太宗聞而異之賜帛二百段遣州縣存恤之又曰鄭義宗妻盧氏幽州范陽人盧彦衡之女也畧涉書史事舅姑甚得婦道嘗夜有强盜數十人持杖鼓譟踰垣而入家人悉迸竄唯有姑獨在堂盧冐白刃徃至姑側為賊捶擊之㡬至于死賊去後家人問曰羣凶擾横人盡奔逃何獨不懼荅曰人所以異于禽獸者以其有仁義也昔宋伯姬守義赴火流稱至今吾雖不敏安敢忘義且比隣有急尚相赴救况在姑而可棄委若萬一危禍豈宜獨生其姑每云古人稱歲寒然後知松柏之後凋吾今乃見盧新婦之心矣貞觀中卒又曰冀州鹿城女子王阿足者早孤無兄弟唯姊一人阿足初適同縣李氏未有子而夫亡時年尚少人多聘之為姊年老孤寡不能捨去遂誓不嫁以養其姊每晝營田業夜便紡績衣食所須無非阿足出者如此二十餘年及姊亡塟送以禮鄉人莫不稱其義行競令妻女求與相識後數歲竟終于家又曰楚王靈龜妃上官氏上邽人也父懷仁右金吾將軍上官氏年十八歸于靈龜繼楚哀王後本生具存朝夕侍奉恭謹彌甚凡有新味非舅姑噉訖未曾先嘗經數載靈龜死將塟其前妃閻氏嫁不踰年而卒又無近族衆議欲不舉之上官氏曰必神而有靈寧可使孤魂無託于是備禮同塟聞者莫不嘉歎服終諸兄弟姊謂曰妃年尚少又無所生改醮異門禮義恒範妃思之掩泣對曰丈夫以義烈摽名婦人以守節為行未能即先犬馬殉溝壑寧可復飾粧袨服有他志乎遽將截鼻割耳以自誓諸兄姊知其志不奪歎息而止尋卒說苑曰齊遣兵攻魯見一婦人将兩小兒走抱小而挈大顧見大軍且至抱大而挈小使者甚怪問之婦人曰大者妾夫兄之子小者妾之子夫兄子者公義也妾之子者私義也寧濟公而廢私耶使者悵然賢其辭即罷軍還對齊王說之曰魯未可攻也匹婦之義尚如此何况朝廷之臣乎列女傳曰衛宗二順者衛宗室靈王之夫人及傳妾也秦滅衛君角封靈王世家使奉其祀靈王死夫人無子而守寡𫝊妾有子傳妾事夫人八年不衰供養愈謹夫人謂𫝊妾曰孺子養我甚謹子奉祭祀而妾事我我不聊願出居外傅妾泣曰夫人豈欲使靈氏受三不祥耶公不幸蚤終是一不祥夫人無子而妾有子是二不祥今夫人將出居外妾居内是三不祥欲自殺其子止之不聴夫人懼遂終身供養不替又曰魯孝義保者魯孝公稱之保母初孝公父武公與長子括中子戯朝周宣王宣王立戯為魯太子武公薨戯立是為懿公孝公於時號公子稱括之子伯御與魯人作亂攻殺懿公而自立求稱于宫中將殺之義保聞伯御欲殺稱乃衣其子以稱之衣卧於稱之卧處伯御殺之義保遂抱稱以逃周天子殺伯御立稱為孝公魯人高義保之義故謂之義保又曰河南貞義者樂羊子之妻羊子出學將友人歸貞義截髮供其費後羊子得遺金一餅以與貞義貞義曰妾聞君子不以利汙行羊子慙而棄之又曰把梁名殖齊人也為大夫莊公襲莒約車五乘載士殖不與歸而不食母曰汝生有義死有名五乘盡汝下也殖遂至莒獲甲首公止之曰共同齊國殖曰不與五乘少吾勇也臨敵止吾以利汙吾行也遂進至莒城下殺二十七人而死莒人築尸城為京觀妻徃迎喪向之哭土為之崩得喪於是公使弔塟之塟畢曰婦人有三從之義今吾外無夫以立節内無子以見志吾何歸乎乃赴水而死又曰梁節姑姊者梁之婦人其室失火兄子與其子在火中欲取兄子輒得其子獨不得兄子火盛不得復入婦人將自赴火其夫止之婦人曰梁國豈可戸告人曉也被不義之名何面目以見兄弟國人哉吾欲復投吾子為失母之恩吾勢不可以生遂赴火而死又曰㑹稽右師安妻者同都吕氏之女也名軍少寡無子守義不遷其兄遂犯法軍匿之知不能免乃泣曰少遭家不造兄弟單少門宗唯兄為主而復罹此禍我有一計猶足免難將詣縣陳之兄曰其計若何軍曰臨時從宜不可先言也乃請智者為辭乞代兄遂之命因自剄縣門官嘉其義乃捨遂罪又曰齊義繼母者齊二子之母也當宣王時有人鬭死於道者吏訊之被一創二子立其傍吏問之兄曰我殺之弟曰非兄也我殺之朞年不決吏言之于相相不能決言於王王曰皆赦之是縱有罪皆殺之是誅無辜也其母必知其子之善惡試問其母聴所欲殺活相召而問之其母泣而對曰殺少子相曰少子人之所愛今欲殺之何也對曰少者妾之子也長者前妻之子也雖痛子獨謂義何泣下沾襟相言之於王王美其義皆赦二子號曰義母又曰天水姜敘母者同郡楊阜之姑也阜為刺史馬超殺刺史太守敘屯厯城阜徃見之歔欷悲甚敘曰何為乃爾阜曰守城不能完君亡不能死何以視息于天下乎君擁兵專制無討賊之心此趙盾所以書弑也敘母慨然勅敘從阜計遂起兵于厯城超聞之襲厯城得敘母母罵之曰若背父之逆子弑君之桀賊天地豈久容若何不早死敢以面目視人超即殺之杜預女記曰王氏之母者漢丞相安國侯王陵之母漢王擊項羽陵以兵屬漢王項羽得陵母置軍中漢使至則東向坐陵母欲以招陵陵母私送使者為之泣曰為老妾語陵善事漢王漢王長者也無以老母故懷二心言妾已死乃伏劒而死以固勉陵定命錄曰賈直言妻莫知姓氏貞元中其舅道得罪賜酖直言欲代父死奪酖飲之不死流于嶺徼直言妻一志事姑髽髻絶膏沐自三二年蟣虱蔽其肉厥後如枯蓬之植燥土無復蟣虱迨十五載直言遇赦歸妻始一沐其髻自斷絶墮于泔盆終為秃婦直言後厯諫議大夫出刺兩郡傳記李如璋為夏陽令素輕其妻鄭氏如璋因醉誤殺人母其子入縣將復仇如璋與鄭以床拒門仇者推窻而入鄭急以身蔽如璋舉手乘刃右臂既落復舉其左臂仇復斷之猶乞以身代夫死時方懷姙仇者以刃櫟其腹胎出而殞乃害如璋及其二子州司以聞坐死者數十人太平御覽卷四百二十二
