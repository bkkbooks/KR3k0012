body:
  text: 太平御覽卷二百八十三宋李昉等撰兵部十四機略二機略二史記曰韓信伐趙引兵未至井陘口三十里選輕騎二千人人持一赤幟從間道萆山而望趙軍誡曰趙見我走必空壁逐我若疾入趙壁㧞趙幟立漢幟乃使萬人先行背水陣趙軍望見大笑平旦信建大將旗鼓鼓行出井陘趙開壁擊之大戰良乆於是信張耳棄旗鼓走水上軍水上軍開入之復疾戰趙果空壁争漢旗鼓逐韓信張耳韓信張耳已入水上軍軍皆殊死戰信所出竒兵二千騎候趙空壁逐利則馳入趙壁㧞趙旗立漢赤幟二千趙軍不能得信等欲歸還壁壁皆漢赤幟而大驚以為漢皆已得趙王將矣兵遂亂遁走於是漢兵夾擊大破虜趙軍斬成安君泜水上擒趙王歇諸將問信曰兵法右背山陵前左水澤今者將軍令臣等反背水陣臣等不服然竟以勝此何術也信曰兵法不曰䧟之死地而後生置之亡地而後存所謂驅市人而戰其勢非置之死地使人人自為戰今予之生地則皆走寧尚可得而用之乎諸將皆服曰善非所及也又曰越與吴戰敗范蠡獻吴粟十萬斛而蒸之吴言粟好盡付民種之不生明年大飢越遂伐吴滅之又曰天下兵起沛公西入武関欲以二萬人擊秦嶢関下軍張良曰秦兵尚强未可輕也臣聞其將屠者子賈䜿易動以利願且留壁使人先行為五萬人具食益張旗幟諸山之上為疑兵令酈食其持重寳㗖秦將貪而忽名可貨以賂秦將果畔欲連和俱西襲咸陽沛公欲許之良曰此獨其将欲叛恐士卒不從不如因其懈怠擊之沛公乃引兵擊之秦兵大敗又曰項籍圍漢王於滎陽漢将紀信詐降以故漢王得走入関收其兵欲復東袁生說漢王曰漢與楚相距滎陽数嵗漢常受困願君王出武関項羽必引兵南走王深壁令滎陽城臯間且得休息而韓信等平河北趙地連燕齊君王乃復走滎陽未晚如是則楚所備者多力分漢得休息復與之戰破楚必矣漢王從其計出軍宛葉間與黥布行收兵項羽聞漢王在宛果引兵南漢深壁不與戰又曰漢王至南鄭諸將及士卒皆歌思歸韓信說漢王曰項羽王諸将之有功者而王獨居南鄭是遷也軍吏士卒皆山東之人日夜跂而思歸及其鋒而用之可以成大功天下已定人皆自寜不可復用不如决䇿東向争權天下漢王從之終滅項籍又曰漢楚相持項羽自擊漢将彭越于梁其将大司馬曹咎守成臯漢数挑戰楚軍不出使人辱之咎怒渡汜水士卒半渡漢擊之大破楚軍又曰漢王與韓信彭越㑹擊楚軍至固陵信越不至楚擊漢軍大破之漢王謂張良曰諸侯不從約奈何對曰楚兵且破信越未有分地其不至固宜君王能與分天下令可立至不即事未可知君王能自陳以東𫝊海與韓信睢陽以至榖城與彭越使各自為戰則楚易破也乃發使者告韓信彭越皆報請令進兵並至垓下遂破項羽軍又曰漢王與諸侯兵共擊項羽决勝垓下韓信將三十萬自當之孔將軍居左費將軍居右漢王在後絳侯柴将軍在漢王後項羽之卒可十萬韓信先合不利却孔將軍費將軍縱楚兵退信復乗之大敗垓下又曰破項羽於垓下羽兵尚衆漢兵圍之皆為楚歌楚人乆苦征戰因敗思歸遂潰又曰漢王遣將韓信擊魏魏王盛兵蒲坂塞臨晉信乃益為疑兵陳船欲度臨晉而伏兵從夏陽以木􅎆缻度軍以木為噐如􅎆缻以度軍無船且尚宻也缻缶同襲安邑虜魏王豹又曰吴王濞反濞疋備反漢将周亞夫率師禦之壁於下邑吴師奔壁東南亞夫備西北吴師果以其兵奔西北不得入乃引去亞夫追擊大敗之漢書曰先零音憐䍐幵音􅊈二種羗皆解仇合黨為冦漢将趙充國討之守便宜上書曰先零羗虜欲背叛故與䍐幵解仇然其私心恐漢兵至而䍐幵背之也臣愚以為其計請擊先零若先擊䍐羗零必助之今虜馬肥粮饒擊之恐不能勝適使先零於罕羗益堅其約合其黨虜交堅黨合誅之用力数倍臣恐國家憂累猶十數年不一二嵗而已先誅先零則罕幵之屬不煩兵而服矣宣帝從之果如其䇿後漢書曰光武起義兵據昆陽城時唯有八九千人莽遣將王邑嚴尤討之軍到城下者十萬光武留王鳯等守城與李軼等十餘騎夜出既至郾定陵悉發諸營兵嚴尤說王邑曰昆陽城小而堅今假號者在宛亟進大兵彼必奔走宛敗昆陽自服也邑曰吾昔以虎牙軍圍翟義坐不生得以見責今将百萬之衆遇城而不能下何謂耶遂圍之数十重列營百雲車十餘丈瞰臨城中旗幟蔽野埃塵連天鉦鼓之聲聞数百里或為地道衝輣橦城輣蒲萌切積弩亂發矢下如雨城中負楯而汲王鳯等乞降不許光武遂與諸營部俱進自將部騎千餘人前去大軍四五里而陣尋邑亦遣千餘人合戰光武奔之斬首数千級諸部喜曰劉将軍平生見小敵怯今見大敵勇甚可怪也旦復居前請助將軍光武復進尋邑兵却諸部兵乗之斬首数百千級連勝邑遂因而大敗又曰王郎起河北郎鉅鹿郡太守王饒據城光武圍数十日連攻不尅耿純說曰太守王饒士衆疲弊不如及大兵精銳進攻邯鄲若王郎已誅王饒不戰自服矣從之乃留兵守鉅鹿而進軍邯鄲屯其郭北郎数出戰無利城守急攻之二十餘日郎少傅李立為反間開門納漢兵郎黨悉平又曰曹操圍袁尚鑿池環城初令淺示若可越城中望見笑而不出操令一夜濬之廣深二丈决漳水以灌之自五月至八月城中餓死者過半又曰朱穆舉度尚自右校令擢荆州刺史擊桂陽蒼梧盜賊尚躬率部曲與同勞逸廣募雜種諸蠻夷明設購賞進擊大破之降者數萬人桂陽宿賊渠帥卜陽潘鴻等畏尚威烈徙入山谷尚窮追數百里遂入南海破其三屯多獲珍寳而陽鴻等黨衆猶盛尚欲擊之而士卒驕富莫有鬭志尚計緩之則不戰逼之則逃亡乃宣言卜陽潘鴻作賊十年習於攻守今兵寡少未易可進當湏諸部所發悉至乃可并力攻之申令軍中恣聴射獵兵士喜恱大小皆相與從禽尚乃密使所親客潛焚其營積皆盡獵者來還莫不涕泣尚人人慰勞深自咎責因曰卜陽等財實富足数代諸卿但不并力耳所亡少少何足介意衆聞咸奮踴尚勅令秣馬蓐食眀旦徑赴賊屯陽鴻等自以深固不復設備吏士乗銳遂大破平之尚出兵三年羣冦悉定又曰㢘范為雲中太守㑹匈奴大入塞􅇏火日通故事敵入過五千人移書傍郡吏欲𫝊檄求救范不聴自率士卒拒之敵衆盛而范兵不敵㑹日暮令軍士各交縳兩炬三頭􅅡火營中星列用兩炬交縳如十字􅅡其頭使敵人望之疑兵士之多敵遥望火多謂漢兵救至大驚待旦將退范乃令軍中蓐食晨徃赴之蓐食早起食於寝蓐中也斬首數百級敵自相轔籍死者千餘人轔轢也籍相蹈籍也由此不敢復向雲中又曰耿恭與匈奴戰恭以毒藥傅矢傳語匈奴曰漢家箭神其中瘡者必有異因發强弩射之敵中矢者視瘡皆沸遂大驚㑹天暴風雨随而擊之殺傷甚衆匈奴震怖相謂曰漢兵神真可畏也遂解去又曰耿弇敕諸校㑹㑹猶集㑹也五日攻西安張蘭聞之晨夜儆守至期夜半弇敕諸將皆蓐食㑹明至臨淄城䕶軍荀梁等争之以為宜速攻西安弇曰不然西安聞吾欲攻之日夜為備然臨淄出不意而至必驚擾吾攻之一日必㧞臨淄破即西安孤張蘭勢已隔絶必復亾去所謂擊一而得兩也先攻西安不能卒下兵老城堅死傷必多縱能㧞之張蘭引軍還奔臨淄并兵合勢觀人虛實吾深入敵地後無轉輸旬月之間不戰而困諸軍之言未見其宜遂攻臨淄半日㧞之入據其城又曰髙峻據髙平猶不下帝議遣使降之乃謂冦恂曰為吾行也若峻不降引耿弇等擊之恂奉璽書與峻峻遣軍帥皇甫文出謁辭禮不屈恂怒將誅文諸將諫曰髙峻精兵萬人率多强弩西遮隴道連年不下今欲降之而反戮其使無乃不可乎恂不聽遂斬之遣其副歸告峻曰軍帥無禮已戮之矣欲降急降不欲降湏固守峻惶恐即日開城門降諸將皆賀因曰敢問殺其使而降其城何也恂曰皇甫文峻之腹心其所取計者也今來辭意不屈必無降心全之則文得其計殺之則峻亡其膽是以降耳諸將皆曰非所及也又曰吴漢在河北時鬲縣五姓共逐守長據城而反鬲縣名属平原郡故城在今徳州西北五姓盖當時强宗豪室也鬲音革諸將争欲攻之漢不聴曰使鬲反者守長罪也敢輕冐進兵者斬乃移檄告郡使收守長而使人謝城中五姓大喜即相率歸降諸將乃服曰不戰而下城非衆所及也太平御覽卷二百八十三
