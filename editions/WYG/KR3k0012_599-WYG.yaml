body:
  text: 太平御覧卷五百九十九宋李昉等撰文部十五品量文章嘆賞改易詆訶品量文章後周書薛寘傳曰前中書監盧柔學業優深文藻華贍而寘與之方駕故世號曰盧薛焉梁書曰何遜文章與劉孝綽並重時人謂之何劉梁元帝著論云詩多而能者沈約文少而能者謝眺何遜三國典畧曰劉逖字子長少好弋獵騎射後發憤讀書頗工詩詠行臺尚書席毗常嘲之曰君輩詞藻譬若春榮湏臾之翫非宏材也豈比吾徒千丈松柏常有風霜不可凋悴逖報之曰既有寒木又發春榮何如也毗笑曰可矣唐書曰富嘉謨雍州武功人也舉進士長安中累轉晉陽尉與新安吳少微友善同官先是文士撰碑頌皆以徐庾為宗氣調漸劣嘉謨與少微屬詞皆以經典為本時人欽慕之史體一變稱為吳富體嘉謨作雙龍泉頌千蠋谷頌少微撰崇福寺鍾銘詞最髙雅作者推重又曰張鷟字文成凡八登甲科員外郎貟半千謂人曰張子之文如青銅錢萬選萬中未聞退時時流重之目為青錢學士又曰楊炯華州華隂人少與綘州王勃范陽盧照隣東陽駱賓王皆以文詞知名海内稱為王楊盧駱亦號為四傑炯聞之謂人曰吾愧在盧前恥居王後當時議者亦以王勃文章宏逸有絶人之跡固非常流所及炯與照隣可以企之盈川之言信矣張說謂人曰楊盈川之文如懸河注水酌之不竭既優於盧亦不減王恥居王後則信然愧在盧前謙也又曰李華善屬文與蘭陵蕭頴士友善華舉進士時著含元殿賦萬餘言頴士見而賞之曰景福之上靈光之下華文體温麗少宏傑之氣頴士詞鋒俊發華自以所業過之疑其誣詞乃為祭古戰塲文燻汚之如故置於佛書之閣華與頴士因閱佛書得之華謂之曰此文何如頴士曰可矣華曰當代秉筆者誰及于此頴士曰君稍精思便可及此華愕然而服又曰元和詞人元稹論杜子美詩盖所謂上薄風騷下該沈宋言奪蘇李氣吞曹劉掩顔謝之孤高雜徐庾之流麗盡得古今之體勢而兼昔人之所獨專矣則詩人以來未有如子羙者是時山東人李白亦以文奇取稱時人謂之李杜予觀其壯浪縱恣擺去拘束模寫物象及樂府歌詩誠亦差肩於子美矣至若鋪陳終始排比聲韻大或千言次猶數百詞氣豪邁而風調清深属對律切而脫棄凡近則李尚不能厯其藩榦况堂奥乎魏文帝典論曰文人相輕自古而然傅毅之於班固伯仲之間耳而固小之與弟超書曰武仲以能屬文為蘭臺令史下筆不能自休夫人闇於自見而文非一體鮮能備善是以各以所長相輕所短俚語曰家有弊帚享之千金斯不自見之患也今之文人魯國孔融文舉廣陵陳琳孔璋山陽王粲仲宣北海徐幹偉長陳留阮瑀元瑜汝南應瑒德璉東平劉楨公幹斯七子者於學無所遺於辭無所假咸自以騁騄驥於千里仰齊足而並馳以此相服亦良難矣盖君子審己以度人故能免於斯累而作論文王粲長於辭賦徐幹時有齊氣然粲之匹也如粲之初征登樓槐賦幹之𤣥猿漏巵圎扇橘賦雖張蔡不過也然於他文未能稱是琳瑀之章表書記今之俊也應瑒和而不壯劉楨壯而不密孔融體氣高妙有過人者然不能持論理不勝辭至於雜以嘲戲及其時有所善楊班之儔也常人貴逺賤近向聲背實又患闇於自見謂己為賢夫文本同而末異盖奏議宜雅書論宜理銘誄尚實詩賦欲麗此四科不同故能之者偏也惟通才能備其體文以氣為主氣之清濁有體不可力强而致譬諸音樂曲度雖均節奏同檢至於引氣不齊巧拙有素雖在父兄不能以移子弟盖文章經國之大業不朽之盛事年壽有時而盡榮樂止乎其身二者必至之常期未若文章之無竆是以古之作者寄身於翰墨見意於篇籍不假良史之辭不託飛馳之勢而聲名自傳於後故西伯幽而演易周旦顯而制禮不以隱約而不務不以康樂而加思夫然則古人賤尺璧而重寸隂懼乎時之過矣而人多不强力貧賤則懾於饑寒富貴則流於逸樂遂營目前之務而遺千載之功日月逝於上體貌衰於下忽然與萬物遷化斯亦志士之大痛也融等已逝惟幹著論成一家之言傅子曰或問劉歆劉向孰賢傳子曰向才學俗而志忠歆才學通而行邪詩之雅頌書之典謨文質足以相副玩之若近尋之益逺陳之若肆研之若隠浩浩乎其文章之淵府也李充翰林論曰潘安仁之為文也猶翔禽之羽毛衣被之綃縠抱朴子曰世謂王充一代英偉所著文時有小疵猶鄧林枯枝蒼海流芥未易貶者又曰歐陽生曰張茂先潘正叔潘安仁文逺過二陸或曰張潘與二陸為比不徒步驟之間也歐陽曰二陸文詞源流不出俗檢又曰秦時不覺無鼻之醜陽翟憎無癭之人陸君深疾文士放蕩流遁遂往不為虗誕之言非不能也陸君之文猶𤣥圃之積玉無非夜光也吾生之不別陸文猶侏儒測海非所長也嘆賞晉書曰張載為濛汜池賦司𨽻校尉傳𤣥見而嗟嘆以車迎之言譚盡日為之延譽遂知名又曰張華字茂先阮籍見華鷦鷯賦許以王佐之才中書郎成公綏亦推華文義勝己又曰陸機弟雲嘗與機書云君苖見兄文輙欲燒其筆硯後葛洪著書稱機文猶𤣥圃之積玉無非夜光焉五河之吐流泉源如一焉其靡麗英銳漂逸亦一代之絶乎南史曰王筠字元禮善屬文沈約每見其文嘗咨嗟謂曰昔蔡伯喈見王仲宣曰吾家書籍悉當相與僕雖不敏請附斯言筠嘗以詩呈約報書嘆詠以為後進擅羙約又嘗謂筠叔志曰賢弟子文章之羙可謂後來獨秀又曰謝朓好奬人才㑹稽孔闓粗有文筆才未為時人所知孔稚圭嘗令草讓表以示朓朓嗟嘆良久手自折簡寫之謂稚珪曰是子聲名未立應共奬成無惜齒牙餘論其奬善如此吳均齊春秋曰丘靈鞠善屬文宋孝武殷貴妃亡靈鞠上挽歌詩云雲横廣階闇霜深高殿寒帝摘句咨嗟賞之即轉為新安王北中郎叅軍唐書曰封敖為翰林學士拜中書舍人敖搆思敏速語近而理勝不務竒澁武宗深重之嘗草賜陣傷邉將詔警句云傷居爾體痛在朕躬帝覧而善之賜之宫錦李德裕在相位定策破廻鶻誅劉稹議兵之際同列或有不可之言惟德裕籌計指畫竟立奇功武宗賞之封衛國公守太尉其制語有遏横議於風波定奇謀於掌握逆稹盗兵壼闗晝鏁造膝嘉話開懐静思意皆我同言不他惑制出敖往慶之德裕口誦此數句撫敖曰陸生有言所恨文不逮意如卿此語秉筆者不易措言坐中解其所賜玉𢃄以遺敖深禮重之又曰馮定為太常少卿文宗每臨樂鄙鄭衛詔奉常習開元中霓裳羽衣舞以雲韶樂和之定統樂立於廷文宗以其端凝若植問其姓氏翰林學士李珏奏定之名文宗喜問曰豈非能為古章句者耶遂召昇階文宗自吟送客西江詩吟罷益喜因錫以禁中瑞錦仍令大錄所著古體詩以獻世說曰孫興公作天台賦成以示范榮期曰卿試擲置地要作金石之聲范曰恐子之金石非宫商中聲然每至佳句輒云應是我軰語又曰左思字太冲作三都賦時人互有譏訾思意不甚愜後示張華華曰此二京可三然君文未重於世以示高名之士思乃請序於皇甫謐謐見之嗟嘆遂為作序於是先相訾者莫不歛祍讃􅄒焉又曰庾仲初作楊都賦成呈庾亮亮以親族之懐大為其名賈云可三二京四三都於是人人競寫都下紙遂為之貴顔氏家訓曰劉孝綽當時既有重名無所與讓唯服謝朓常以謝詩置几案動靜輙諷味改易論語曰為命禆諶草創之世叔討論之行人子羽修飾之東里子産潤色之漢書曰兒寛善屬文張湯為廷尉廷尉府盡用文史法律之吏而寛以儒生在其間見謂不習事不署曹除為從史之北地視畜數年還至府上畜簿㑹廷尉時有疑奏已再却矣掾史莫知所為寛言其意掾史因使寛為奏奏成讀之皆服以白廷尉張湯大驚召寛與語乃奇其材以為掾上寛所作奏即時得可異日湯見上問曰前奏非俗吏所及誰為之者湯言兒寛上曰吾固聞之久矣湯由是嚮學以寛為奏讞掾晉書曰袁宏從桓溫北伐又作北征賦皆其文之高者嘗與王珣伏滔同在温坐温令滔讀其北征賦至聞所傳於相傳云獲麟於此野誕靈物以瑞德奚授體於虞者䆒尼父之洞泣似實慟而非假豈一性之足傷乃致傷於天下至此便改韻珣云此賦必傳千載無容率爾今於天下之後便移韻徙事然於寫送之致似為未盡桓温曰卿思益之宏應聲曰感不絶於予心愬流風而獨寫珣諷味久之謂滔曰當今文章之羙當共推此生宋書曰王誕字茂世有才藻晉孝武帝崩從叔尚書令珣為哀策出本示誕曰猶少叙節物一句誕使攬筆益之接其秋冬代變云霜繁廣除風囬髙殿珣嘆美因而用之齊書曰張融作海賦文詞詭激獨與衆異後以示鎮軍將軍徐覬之覬之曰卿此賦實超元虗但恨不道鹽耳融即求筆注曰漉沙搆白熬波出素積雪中春飛霜暑路齊書劉繪傳曰魚復侯子響誅豫章王嶷欲求葬之召繪為表湏臾便成嶷嘆曰禰衡何以過此惟足八字云提携鞠養俯見成人後魏書曰高祖晏侍臣於清徽堂遂令黄門郎崔光讀暮春羣臣應詔詩至彭城王勰詩高祖為改一字曰昔祁奚舉子天下謂之至公今見勰詩始知中令之舉非私也勰曰臣露此拙方見聖朝之私頼蒙神筆賜刋得有令譽高祖曰雖雕琢一字猶是玉之本體勰曰臣聞詩三百一言可蔽今陛下刋以一字足以價等連城唐書文苑傳曰李商隠能為古文不喜偶對從令狐楚學楚能章奏遂以其道授商隠自是始為今體章奏三國典畧曰齊王在東山飲酒投杯怒赫召魏收於前立為書曰朕厯數在躬志清四海蕞爾秦隴久阻風化混一之事期在今日必當訓旅誓衆天動雲臨朕已下木汾流成船晉地便當躬先將士迅入玉璧徑掩長安梟彼凶首朕與梁國舊敦好睦聞其奸計乃欲規謀冝令上黨王渙緫勒熊羆星流風卷王者之言明如日月宜宣内外咸使聞知書成齊王覧之於凶首下足二言曰雖藏山沒水終不足赦於是遣渙南侵曹植與楊修書曰世人之著述不能無病僕常好人譏彈其文有不善者應時改定昔丁敬禮常作小文使僕潤飾之僕自以才不過若人辭不為也敬禮謂僕卿何所疑難文之佳麗吾自得之後世誰知定吾文者即嘗嘆此達言以為美譚世說曰司馬景王令中書虞松作表再呈輙不可意令松更定松思竭不能改心存之形於顔色鍾㑹察其憂問松松以實答㑹取為定五字松恱服以呈景王景王曰不當爾耶誰所定也曰鍾㑹向亦欲啟之㑹公見問不敢饕其能王曰如此可大用可令來㑹平旦入見王獨撫手嘆息曰真王佐才也詆訶曹植與楊脩書曰劉季緒才不能逮於作者而好詆訶文章掎摭利病晋書曰左思字太冲齊國臨淄人也作三都賦搆思十年門庭藩溷皆置筆硯遇得一句即便䟽之賦成思恐時人未之見重先以示皇甫謐謐稱善為其賦序陸機入洛欲為此賦聞思作之撫掌而笑與弟書曰此間有傖助庚反父欲作三都賦須其成當以覆酒甕耳及思賦出機絶嘆服以為不能加也遂輟筆焉三國典畧曰齊有大儒劉晝不學属文方復緝綴作賦一首名為六合自謂絶倫魏收謂人曰賦名六合其愚已甚及見其賦又愚於名又曰邢邵嘗云江南任昉文體本踈魏收非直模擬亦大偷竊收聞之乃言曰邵嘗於沈休文集裏作賊何意道我偷任語任沈俱有重名邢魏各有所好顔之推嘗以二公之意問於祖珽珽曰見邢魏之臧否即任沈之優劣又曰魏收言及沈休文集毁短之徐之才怒曰卿讀沈文半不能觧何事論其得失又謂收曰未屑與卿談收去避之隋書曰高搆以老病解職河東薛道衡才高當世每稱搆有清鍳所有文筆必先以草呈搆而後出之搆有所詆訶道衡未嘗不嗟伏又曰庾自直少好學屬文於五言詩尤善性恭慎不妄交逰特為帝所愛帝有篇章必先示自直令其詆訶自直所難帝輙改之至於再三俟其稱善然後方出其見親禮如此唐書文苑傳曰天寳末詩人杜甫與李白齊名而白自負文格放達譏甫齷齪而有飯顆山頭之誚國朝傳記曰梁常侍徐陵聘於齊時魏收文學北朝之秀錄其文集以遺陵令傳之江左陵濟江而沉之從者以問陵曰吾為魏公藏拙太平御覧卷五百九十九
