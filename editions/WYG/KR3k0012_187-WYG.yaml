  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_187-1a, image: WYG0894/WYG0894-0660a.png}
body:
  text: 太平御覽卷一百八十七宋李昉等撰居處部十五牆壁柱梁棟牆壁説文曰垣蔽曰牆又曰壁垣也爾雅曰牆謂之墉廣雅曰墉垣牆也釋名曰墉容也所以蔽隠形容也壁辟也所以辟斷風寒也牆障也所以自障蔽也垣援也人所阻以為援衛也易曰公用射隼于髙墉之上獲之无不利書曰既勤垣墉惟其塗塈茨尚書大傳曰天子賁庸諸侯疏杼注曰賁大也廧謂之庸大廧正直之廧疏猶衰也杼亦廧也衰殺其上不得正直詩曰百堵皆作又曰築室百堵又曰誰謂鼠無牙何以穿我墉又曰乗彼垝垣以望復闗又曰牆有茨不可掃也箋牆所以防非常也牆有茨篇名衛人刺公子頑私通于君母而不可道也又曰君子無易由言耳屬于垣由用也人將聽之又曰將仲子兮無踰我牆又曰兄弟䦧于牆外禦其侮又曰徹我牆屋田卒汙萊毁牆屋不得農也書序秦始皇滅先代典籍坑儒天下學士逃難解散我先人用藏其家書于屋壁至魯恭王時好治宫室壊孔子舊宅以廣其居于壁中得先人所藏古文虞夏商周之書及傳論語孝經皆蝌蚪文字書曰峻宇雕牆月令曰孟秋坏垣牆五日蟋蟀居壁周禮曰牆厚三尺崇之注云髙卑為率足以相為勝也左傳叔孫曰人之有牆以蔽惡也牆之隙壊誰之咎也注咎在牆也又曰巢牛隠於短垣以射吳子諸樊又曰寺人披伐蒲重耳踰垣而走披斬其袪又曰晉靈公不君厚斂以雕牆論語曰叔孫武叔謂子貢曰仲尼豈賢於子乎對曰譬之宫牆賜之牆也及肩窺見室家之好夫子之牆數仞不得其門而入不見宗廟之美百官之富又曰糞土之牆不可杇也又曰其猶正牆面而立也與史記曰孝景帝即位晁錯為内史貴幸用事錯為内史門東出不便更穿一門南出南出者太上皇廟堧垣申屠嘉聞之奏請誅錯景帝曰錯所穿非真廟垣乃外堧垣且又我使為之錯無罪嘉曰吾悔不先斬錯又曰司馬相如家成都貧徒四壁立漢書曰貫髙等欲害髙祖置人於複壁中後漢書曰逢萌與同郡徐房平原李子雲王君公相友善並曉達陰陽懐徳積行房與子雲養徒各千人君公遭亂獨不去儈平自隠儈平謂㑹兩家買賣之事時人語曰避世牆東王君公又曰史叔賓者陳留人也少有盛名郭林宗見而告人曰牆髙基下雖得必失後果以論議阿枉毁名云又曰崔晏仕宦厯位邊郡而愈貧薄家徒四壁卒無以殯殮光禄勲楊賜太僕袁逢少府段熲為備棺槨葬具大将軍袁隗樹碑頌之又曰杜安字伯夷少有志節年十三入太學號竒童京師貴戚慕其名或遺之書安不發悉壁藏之及後捕案貴戚賓客安開壁出書印封如故竟不罹患時人貴之位至巴郡太守吳志曰吕䝉病孫權時在江安迎置内廏治䕶萬方欲數見顔色又恐勞勤常穿壁窺之見其飲食喜不能則咄唶也晉書外國傳大秦國以琉璃為牆壁齊書曰劉璡字子璥方軌正直兄瓛夜隔壁呼璡出不答方下床著衣立行及簾外然後應瓛問其故璡曰向束帶未竟又曰徐孝嗣初在率府晝卧齋北壁下夢兩童子遽云移公床孝嗣驚起行數歩而壁崩左傳曰正考父一命而傴再命而僂三命而俯循牆而走亦莫敢予侮言人不敢以不軌之事侮之家語曰孔子觀乎明堂覩四門之墉有堯舜桀紂之象各有善惡之狀興廢之誡焉衡山記曰甘泉東有石壁禹所刻文在焉洞㝠記曰元狩三年帝復起凌霞觀去地九十丈累白玉為壁以八分篆寫羲皇以来迄周成王封禪之事所謂登壁文葢帝王之本績也孟子知命者不立乎巖牆之下淮南子曰舜作宫築牆茨屋漢官儀曰省中皆胡粉塗壁畫古烈士新序曰諸侯垣牆有黝堊無丹青之色神仙記白和事王君王君語曰我暫往瀛洲汝止此石室熟視北壁當見文字讀之得道矣三年方見壁上有古人所刻太清經讀之得仙魏畧曰趙岐避難青州市孫嵩知岐避事置岐於複壁中西京雜記云匡衡鑿鄰家壁偷光讀書宋玉賦云東家之子登牆窺臣三年臣至今未許也焦贑易林曰千仞之牆禍不入門孟奥北征記曰鄴城避雷室西南石溝北有華林牆牆髙九丈方圓一里柱廣雅曰楹謂之柱釋名曰柱住也楹亭也亭亭然孤立也周書文王在鎬召太子發曰吾栝柱而茅茨為民愛費也左傳曰叔孫豹指楹曰雖惡是其可去乎又曰垣牆宫楹穀梁傳曰丹桓公楹禮天子丹諸侯黝大夫蒼士黈大戴禮曰周時徳澤和洽蒿茂以為宫柱名曰蒿宫漢書郊祀志曰武帝鑄栢梁銅柱又曰成帝立趙皇后劉輔諫曰朽木不可為柱卑人不可為主范􅁮後漢書曰李膺拜司𨽻校尉時張讓弟為野王令貪殘無道至乃殺孕婦聞膺厲政威嚴懼辠逃還京師因匿兄讓第舎柱中膺知其狀遣將吏破柱付洛陽獄受辭畢即殺之魏畧曰大秦國以水精為室柱吳志曰孫堅為董卓所攻堅與數十騎馳圍而出堅常著赤罽幘令親近將祖茂著之卓騎争逐茂忽見一柱在草中因脱幘著柱上卓騎望見繞數重近覺是柱乃去晉書曰石季龍掘秦始皇冢取其銅柱鑄以為器又曰太始二年秋營太廟致荆山之材採華山之石鑄銅柱十二塗以黄金鏤以百物綴以明珠曹嘉之晉紀曰諸葛誕以氣厲稱常倚柱讀書雷震其柱誕讀書自若陳書曰初梁侯景焚太極殿及景平至陳武帝議欲營之獨闕一柱至是有樟木大十八圍長四丈五尺流泊後渚因得用之漢武内傳曰上起神屋鑄銅為柱塗金大五圍帝王世紀曰桀作金柱三千列女傳曰紂作銅柱以炭火燃之有罪者令抱其柱輒墜炭中妲己觀以為笑漢官典職曰徳陽殿柱皆金刻鏤宫掖之好竒禽萬巧飾以丹青翡翠竟柱構以水精一柱三帶韜以赤緹應劭漢官儀曰開陽門始成未有名夜一柱飛来樓上琅邪開陽縣上言南一柱飛去光武使視因刻記其年月以名門焉神異經曰崑崙山有銅柱其髙入天所謂天柱也圍三千里圓􅂞如削下有仙人府與天地同休息男女名曰玉人男即玉男女即玉女無為配疋而仙道成也三輔决録曰長陵田鳳字季宗為尚書郎儀貌端正入奏事靈帝目送之因題殿柱曰堂堂乎張京兆田郎伏滔北征記曰廣陵吳王濞所都大城得柏柱三皆柏心盖吳濞門柱也華延雋洛陽記曰太極殿有四銅柱焦贑易林旅之咸曰金梁鐵柱又曰家人之升髙樓無柱顛僵不乆紂失主人身死牧豎盛宏之荆州記曰巴東城西有一柏柱孤植大可數圍髙三丈餘相傳是公孫述時樓柱乃云斫之血出枯而不朽厯代彌固將恐有物憑焉江陵記曰沔城内有赤湖客舎襄陽大道經城中過元嘉十年連雨城南門沮壊得土中故柟柱長一丈七尺臨川康王取以為大齋西北柱初時色黑一年後不復黑計此千年列子曰共工觸不周山天柱折晏子春秋曰晏子將死鑿楹納書焉謂妻曰楹記日也子壯而示之燕丹子曰荆軻以匕首擿決秦王入銅柱火出淮南子曰柱不可以刺齒蓬不可以持屋世説陸玩初拜司空有人往索酒得便自起瀉著梁柱間地祝曰當今乏才以爾為柱石之用莫傾人棟梁玩笑曰戢卿良箴楚辭天問曰八柱何當東南何虧傅元京都賦曰錦牆雕柱劉良七舉曰緑柱朱榱青璅碧璫李尤楹銘曰幹强體正雖重不移上下相安髙而不危世説夏侯𤣥讚曰𤣥嘗倚柱作書雷破其柱神色不變作書如故俞益期箋曰馬文淵昔立兩銅柱於林邑岸北有遺兵十餘家不反遂居其地岸南樹對銅柱悉姓為馬自為婚姻有二百户交州以流寓號曰馬流言語飲食尚與華夏同山川移易銅柱今沒在海中正賴此民以識故處梁爾雅曰杗廇謂之梁郭璞注曰屋大梁吳越春秋曰夏禹廟以楊梅木為梁焦贑易林旅之咸曰金梁鐵柱完全不腐漢官典職曰徳陽宫晝屋朱梁曹子建七啟曰彤軒紫柱文榱畫梁古歌曰本自南山松今為宫殿梁西京賦曰絙雄虹之長梁司馬相如長門賦曰飾文杏以為梁班固西都賦曰因瑰材而究竒抗龍首之虹梁楚詞云𤣥玉之梁曹植詩文榱華梁棟爾雅曰棟謂之桴郭璞注曰屋檼也廣雅曰檼棟也釋名曰檼穩也似桷也或謂之望髙可望也或謂之棟棟中也屋脊曰甍甍䝉也在上覆䝉屋易大過卦曰棟橈本末弱也王弼注曰初為本上為末左傳襄五年盧蒲癸刺慶舎王何觧其肩猶援廟桷動於甍杜注曰屋梁又曰子産謂子皮子於鄭國棟也棟折榱崩僑將壓焉漢武帝故事上起神屋甍附作金鳳漸翥若飛口啣流蘇長十餘丈神仙傳曰左慈與曹公飲飲畢以杯擲屋棟懸著棟動揺似飛鳥淮南子曰郢人買屋而與之車轂跪而度之大雖可而長不足也桓子新論曰王公大人則嘉得良師明輔品庶凡民則樂畜仁賢哲士皆國之柱棟而人之羽翼楚辭九歌曰桂棟兮蘭橑新夷楣兮葯房郭璞遊仙詩曰雲生棟梁間傅元棟銘曰國有維輔屋有棟梁室之傾尚可柱也心之傾不可輔也大平御覽卷一百八十七
