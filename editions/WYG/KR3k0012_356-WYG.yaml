body:
  text: 太平御覽巻三百五十六宋李昉等撰兵部八十七甲下兠鍪楯上甲下吳越春秋曰勾踐使大夫種於吳曰竊聞大王興大義誅彊救弱越使賤臣種以先人藏噐及甲二十領以賀君又曰公子光伏甲士於私室具酒而請王僚王乃被棠夷之甲三重使兵衛至光家之門夾陛帶甲左右皆王僚之親戚也專諸置魚膓劒炙魚腹中而進之刺王僚貫達背王僚立死獻帝春秋曰越騎校尉伍孚以董卓無道欲身自殺之内貫小鎧㧞佩刀詣卓卓送出閣執手告别孚引刀刺卓卓多力却不中即殺孚夷其族董卓傳曰卓孫年七歳愛以為己子為作小鎧胄使騎駃音决騠馬與玉甲一具俱出入以為麟駒鳳鶵至殺人之子如蚤虱耳晉建武故事曰王敦死秘不發䘮賊於水南北渡攻宫壘皆重鎧浴鐵都督應詹等出精銳距之宋元嘉起居注曰御史中丞劉損奏前廣州刺史韋郎於廣州所部作犀皮鎧六領請免郎官也鄴中記曰石季龍左右置直衛萬人皆五色細鎧光曜奪目古今注曰章帝建初三年丹陽宛陵民掘地得甲一述異記曰乾羅者慕容廆之十一世祖也著金銀襦鎧乗白馬金銀鞍勒自天而墜鮮卑神之推為君長家語曰孔子言於定公曰家不藏甲古之制也今三家過制請皆損之管子曰葛盧之山發而出黃金蚩尤受之制以為劒鎧言其始也孟子曰矢人豈不仁於函人哉矢人惟恐不傷人函人惟恐傷人巫匠亦然故術不可不慎也趙歧章句曰矢箭也函鎧也孫卿子曰楚人鮫革犀兕以為甲堅如金石慎子曰藏甲之國必有兵道鹽鐵論曰強楚勁鄭有犀兕之甲吕氏春秋曰田賛衣而見荆王曰先生之衣何其惡也賛曰衣又有惡於此者王曰可得聞乎對曰甲惡於此王曰何謂也對曰甲冬日則寒夏日則暑衣無惡乎甲者賛也貧貧故衣惡今大王萬乗之主富厚無敵而好衣民以甲臣弗得也意者為其義也甲之事兵之事也劉人之頸刳人之腹墮人之城郭刑人之父子其名又甚不榮也吕氏春秋曰邾之故為甲裳衣帛以帛綴甲公息忌謂邾君曰不若以組凡甲之所以為固者以滿竅也今竅滿矣而任力者半組則不然竅滿則盡任力矣邾君以為然曰將何所得組公息忌對曰上用之則民為之矣邾君曰善下令令官為甲必以組公息忌知說之行也因令其家皆為組人有傷之者曰公息忌知所以欲用組者其家多為組也邾君不說於是乎止官無以組以用邾君有所尤也為甲以組而便公息忌雖多為組何損以組不便公息忌雖無為組亦何益為組與不為組不足以累公息忌之說用組之心不可不察又曰趙攻中山中山有多力者曰丘鳩衣鐵甲操杖擊無不碎衝無不䧟以車投車以人投人說苑曰孔子之匡簡子殺陽虎孔子似之甲士以圍孔子之舍子路怒奮㦸將下鬬孔子止之曰何仁義之不免俗也夫詩書之不習禮樂之不修是吾之過也若非陽虎而以為陽虎則非丘之罪也夫由歌方和汝子路歌孔子和之三終而甲罷崔寔政論曰貪饕之吏競納財用狡猾之工復盗竊之至以麻枲被弓弩鐵焠醯中令脆易治鎧孔又褊小不足容入凡漢所以能制胡者徒襦鎧弩之利也今鎧則不堅弩則不勁永失所恃矣抱朴子曰屠犀為甲給乎專政之服裂翠為華集乎后妃之首雖出於幽谷遷於喬木然為二物之計未若棲竄於林薄攝生乎榡藪文選曰介胄被霑汗又曰金練照海浦注練甲也又曰𤣥甲曜日陳林武庫賦曰鎧則東胡闕鞏百鍊精剛函師震椎韋人製縫𤣥羽縹甲灼爚流光孔融寘刑論曰古聖作犀兕革鎧今盆領鐵鎧絶聖甚逺魏武軍策令曰袁本初鎧萬領吾大鎧二十領本初馬鎧三百具吾不能有十具見其少遂不施也吾遂出竒破之是時士卒練不與今時等也曹植表曰先帝賜臣鎧黒光明光各一具兩當鎧一領炎鍊鎧一領馬鎧一領今世以昇平兵革無事乞悉以付鎧曹殷仲堪相王牋曰奉所賜馬鎧既足以奬厲懦心又以光華逺任庾翼與燕王書曰今致襦鎧一領兠鍪副又曰鄧百川昔送此犀皮兩當鎧一領雖不能精好復是異物故復致之李尤鎧銘曰甲鎧之施扞禦鋒矢尚其堅剛或用犀兕内以存身外不傷害有似仁人厥道廣大好德者寧好戰者危專智恃力君子不為兠鍪廣雅曰兠鍪謂之胄錏鍜謂之鏂鍭說文曰胄兠鍪首鎧也易曰離為甲胄詩曰公徒三萬具胄朱綅毛萇曰具胄具餙也朱綅以朱綅綴之綬子林功禮記曰獻甲者執胄獻杖者執末又曰臨䘮則必有哀色執紼不笑臨樂不歎甲胄則必有不可犯之色貌與事冝相配也又曰車則挽綏執以將命甲若有以前之則執以將命無以前之則袒櫜奉胄左傳曰公及邾師戰於井陘我師敗績邾人獲公胄懸諸魚門又曰秦師襲鄭過周北門左右免胄而下又曰晉侯敗績于箕先軫曰匹夫逞志於君而無討敢不自討乎免胄入狄師死焉狄人歸其元面如生又曰晉楚戰於鄢陵郄至見楚子必下免胄而趨風疾如風也楚子使工尹襄問之以弓問遺也郄至見客免胄承命曰君之外臣從寡君之戎事以君之靈間蒙甲胄不敢拜命介者不拜三肅使者而退又曰楚白公亂葉公亦至及北門或遇之曰君胡不胄國人望君如望慈父母焉盗賊之矢若傷君是絶民望也若之何不胄乃胄而進又遇人曰君胡胄國人望君如望歳焉日月以幾若見君面是得艾也艾安也而又掩面以絶民望不亦甚乎乃免胄而進言葉公得民心也榖梁傳曰古者被甲嬰胄非以興國也則以征無道豈曰以報其恥哉漢書曰王莽傳云元始五年䇿王莽加九命之錫於是稽首拜受甲冑一具後漢書曰劉虞每心忿公孫瓉不已自率兵十萬攻瓉將出從事代郡程緖免胄而前曰公孫瓉雖有過惡而明罪未正不若告使改行如不聽以武臨之瓉必悔禍謝罪所謂不戰而服人也虞以緒臨事沮議斬之以狥戒軍士曰無傷餘人殺一伯珪而已虞遂大敗斬虞于薊市東觀漢記曰祭遵薨喪至河南博士范升上疏曰遵為將軍雖在軍中心存王室不忘爼豆可謂守死善道者也乃贈將軍給侯印綬遣校尉發騎士四百人被𤣥甲兠鍪兵車軍陣送葬又曰建武六年馬武與衆將上隴擊隗囂身被甲兠鍪持㦸犇擊殺數十人囂追至兵盡還武中矢傷又曰上不親征彭寵朱浮上疏切諫曰連年距守吏士皆被勞甲胄生蟣虱弓弩不得弛上與下率焦心大兵冀蒙救䕶生活之獻帝春秋曰孫䇿獲太史慈謂曰昔與卿神亭之役若為卿先如何慈對曰不敢面欺若兠鍪帶不斷未可量也吳志曰太史慈與孫䇿戰于神亭䇿得慈兠鍪吳厯曰諸葛修作東興隄魏軍拒之時寒雪恪使丁奉等皆解鎧但著兠鍪持兵縁遏時北軍見祼身縁遏皆大笑不即嚴兵便亂斫遂破北軍晉書天文志曰魏文帝黄初六年十月有星孛于少微厯軒轅占曰兵喪除舊布新之象時帝軍廣陵辛丑帝親御甲胄觀兵沈約宋書曰元嘉二十七年北討至陜虜多縱突騎衆軍患之薛安都怒甚乃脱兠鍪解所帶鎧唯著絳納兩當械馬亦去具裝馳奔以入賊陣猛氣咆􅣋所向無前當其鋒者應刃而倒賊忿之夾射不能中如是者數四每一入衆無不披靡王琰宋書曰晉康太守劉思道攻廣州殺刺史羊希龍驤將軍陳伯紹討之思道迎擊之殺傷甚衆會紹髻解兠鍪墜地退走見禽車頻秦書曰苻豋堅族曾孫堅死豋自立皆刻兠鍪作死休字示士以必死為度故戰所向無前崔鴻前秦錄曰苻堅末慕容冲率衆登城堅身貫甲胄飛矢滿身後周書曰突屈之先臣於茹茹居金山之陽茹茹鐵工金山形似兠鍪其後謂兠鍪為突厥因以為號春秋繁露服制象曰夫執介胄而後能距敵者固非人之所貴也孝經援神契曰欲去惡鬼須具五刑五人皆持大斧着鐡兠鍪將之常使去四五十步不可令近人也戰國䇿曰蘇秦說韓王曰韓之劒當敵則斬甲楯鞮鍪國語曰靡笄之役郗獻子陽曰余病矣張御曰受命於廟受脤於社甲胄而效死戎之政也又晉語曰郗至甲胄而見客免胄而聽命樂資春秋後傳曰吳越令魏武侯厲衆五年秦人興師而臨西河魏士聞之介胄不待令而奮擊殺秦人者萬數英雄記曰袁紹為公孫瓚所圍别駕田豐扶紹入空垣紹脫兠鍪抵地云丈夫當前鬭死而返逃入墻間豈可得活一云入匿墻間盧綝晉書四王起事曰建武元年天子還洛陽右將軍張方啓陛下自鄴來還冝詢宗廟天子出因便刦啓移都其夜方悉引兵從西明廣陽諸城門入自領五千騎皆捉鐵纒弰擊兠鍪燋苷皆用凉州白鶡毛望之若茶周遷輿服雜事曰刺校者校人之執刺兵者也首戴虎皮胄傳曰􅂪􅆏比以犯陳蔡因是有虎皮胄焉蜀隊戴貝胄被犀角此古制也詩云貝胄朱綅謂以貝齒餙胄朱縷綴之也胄挿以翟尾垂以紅絮朱綅之象也晉令曰軍列營步騎士以下皆着兠鍪郭義恭廣志曰獠在䍧柯興古鬱林交趾蒼梧皆以朱漆皮為兠鍪家語曰孔子對魯哀公曰介胄執戈者無退懦之氣非體純猛服使之然孔叢子曰陳王曰將居軍之禮勝敗之變如之何太師曰介胄在身執銳在列雖君父不拜又曰子髙曰夫儒者居德行道則衮冕之服統師旅則有介胄之服韓子曰天下無道攻戰不已甲胄生蟣虱燕雀處帷幄虞喜志林曰宋祭酒云可以行禦者為械謂鎧甲兠鍪也抱朴子曰夫德敎者黼黻祭服也刑罰者捍刃之甲胄也若以德敎治狡暴猶以黼黻禦剡鋒也以刑罰施平世是以甲胄升廟堂也又曰忍痛苦之藥石者所以除伐命之疾嬰甲胄之重冷者所以扞鋒鏑之集又曰盤旋揖讓非禦殺之容貫甲纓胄非廟堂之飾曹植表曰兩當鎧二十領兠鍪百副陶侃荅温嶠書曰奉所送帳下得蘇峻兠鍪兠鍪作之巧劼用功殊多戰噐不事須此也意謂不如三甲者逆賊身所服此是凶噐古人惡其名得此兠鍪者猶以有功令賞其細葛一端魏武帝上事曰臣前上言逆賊袁尚還即厲精銳討之今尚人徒震蕩部曲䘮守引兵遁亡陳車被堅執銳朱旗震燿虎士雷譟望旗昡精聞聲䘮氣投戈解甲翕然沮壞尚單騎送走捐弃偽節鈇鉞大將軍邟卿侯印各一枚兠鍪萬九千六百二十枚其矛楯弓㦸不可勝數于寶百志詩曰壯士稟桀姿氣烈有自然俯仰辟雍中胡能救世艱闕鞏代縫掖兠鍪易進賢楊雄長楊賦曰髙祖奉命順斗極運天關橫距海漂崑崙提劒而叱之所過靡城摲邑下將降旗一日之戰不可殫記當此之勤鞮牟生蟣虱介胄被霑汗文選曰朝食不免胄夕息常負戈又曰貝胄星離以貝飾之楯上釋名曰楯遯也跪其下避刃以隠遁也大而平者曰吳魁本出於吳為魁師之所持也隆者曰滇盾本出於蜀蜀滇所持也或曰羗盾言出於羗也約而鄒者曰䧟虜言可䧟破虜敵今謂之曰露是也狹而長者曰步楯步兵所持與刀相配也狹而短者曰狹子盾車上所持者也子小稱也以䩼編板者謂之木絡盾世以犀皮作之曰犀楯以木作之曰木盾皆因所用為名也許慎說文曰楯獻音伐也所以捍身蔽目象形聲也櫓大盾也揚雄方言曰盾自關而東或謂之瞂或謂之干干者桿也關西謂之盾張楫埤蒼曰㦸盾也廣雅曰果科干瞂櫓㦸盾也龍魚河圗曰盾名自障禮記曰仲夏之日命樂師修鞀鞮鼓均琴瑟管簫執干戚戈羽又曰春夏學干戈秋冬學羽籥皆於東序又曰季夏以禘禮祀周公於太廟朱干玉戚冕而舞大武鄭𤣥曰朱干亦大楯也周禮曰旅賁氏掌執戈盾夾王車而趨䘮紀則衰葛執戈盾又曰方相氏掌􅂪熊皮黃金四目𤣥衣朱裳執戈揚盾帥百𨽻而時儺又曰司兵掌五兵五盾各辯其物與之等以待重事鄭𤣥註曰五楯干櫓之屬其名未盡聞也又曰司戈楯掌戈楯之物而頒之又曰魯及齊戰於炊鼻杜預曰炊鼻魯地齊子泉㨗從泄聲子聲子魯大夫也射之中楯瓦繇軥汰輈七入者三寸又曰宋樂祁獻趙簡子楊楯六十太平御覽卷三百五十六
