body:
  text: 太平御覽卷八百七十三宋李昉等撰休徴部二地地山湖河海洛水醴泉井池土社石草萐莆華苹朱草蓂莢嘉榖秬鬯福草福幷葳㽔屈軼延嘉紫達芝蘭茅蒿木賔連濶達平露地禮曰地不愛其寳符瑞圖曰地得其性不震揺也祥瑞圖曰王者益土地則社稷及市中地長山管仲曰覇王之主興則昇山之神見休子曰少皥生於稚華之渚渚一旦化爲山澤欝欝葱葱焉湖吳志曰孫皓天璽中吳郡言臨平湖自漢來草木壅塞今更開通長老𫝊言此湖塞天下大亂此湖開天下寧河北齊書曰武帝大寧二年濟州黄河清改清河元年隋書曰煬帝大業三年武陽言河水清唐書曰貞觀十四年陜州奏界内二百餘里正月元旦河水變清四日乃止又曰髙宗永徽五年六月濟州黄河清十六里又曰肅宗乾元二年嵐州言黄河三十里清如井水十月李光弼破史思明衆五萬易乾鑿度曰聖人受命瑞應先見於河河水清又曰孔子云天之將降嘉應河水清變爲白白變爲赤赤變爲黒黒變爲黄各三日鄭𤣥曰聖主爲政理之所致禮斗威儀曰君乗土而王其政太平則河濓濓不决不溢也符瑞圖曰河濓者河水清也孫氏瑞應圖曰王者順天命而行天道四通則河出龍圖東觀漢記曰光武從邯郸避王郎兵南至下曲陽滹沲河道吏還言河水流澌無船不可渡左右皆畏爲王郎所及上命王覇前徃視之實然覇念還言驚衆雖不可渡且臨水止尚阻即白氷堅可渡士衆大喜上大笑曰果妄言也比至河流澌水合行履馬欲僵以嚢盛沙布氷上既渡未數里氷䧟也海孫氏瑞應圖曰王者徳及於水而王道通移則海不揚鴻波禮斗威儀曰君乗水而王其政和平則江海著其神象神不與俱者象而已青黄赤白𤣥水具冇此色焉春秋運斗樞曰揺光則海出明珠洛謝承後漢書曰沛國陳宣字子建光武十年洛水出造􅀈城門或欲築塞之宣諫曰昔王尊正身金隄水退况聖主耶言未絶而水去尚書中候曰堯沉璧於洛赤色起又曰武王沉璧青雲浮洛易乾鑿度曰帝徳之盛應於洛水先温九日乃寒五日變爲五色𤣥黄水陳書曰髙祖至南康破蔡路養李遷仕贛石舊有二十四灘多巨石行旅者以爲難髙祖之發也水暴起數丈三百里間巨石皆沒唐書曰武徳元年七月新豐鸚鵡谷水清世𫝊此水清天下平禮斗威儀曰君乗土而王其政太平則䝉水出於山宋均曰蒙小水也岀可滋灌無不生植也異苑曰臨淄牛山下有女水齊人曰世治則女水流世亂則女水竭慕容超時乾涸彌載及天兵薄伐乃激洪波醴泉禮曰地出醴泉東觀漢記曰光武中元元年祠長陵還醴泉出京師飲之者痼疾皆差也唐書曰貞觀二十三年肅州醴泉出有文石五彩蓋泉尚書中候曰醴甘也取名醴酒又曰堯徳匪懈醴泉出又曰文命盛徳俊乂在官醴泉出山禮斗威儀曰醴泉味甘王政和可貴故水甘也禮稽命徴曰王者刑殺當罪賞賜當功得禮之儀則醴泉出又曰王者得禮之制則澤谷之中白泉出飲之使壽長禮含文嘉曰神農修徳作耒耨地應以醴泉春秋潛潭巴曰君徳應陽則醴泉出焉春秋潛潭樞曰旅星得則醴泉出春秋感精符曰徳淪於地則醴泉出焉孝經援神契曰王者徳至淵泉則醴泉出孫氏瑞應圖曰醴泉者水之精也味甘如醴泉出流所及草木皆茂飲之令人壽也又曰理訟得所醴泉出於京師有仙人以爵酌之白虎通曰徳至淵泉則湧醴泉湧醴泉者羙泉也狀如醴酒可以養老也鶡冠子曰聖人徳上及太寧中及萬靈則醴泉出徐整正厯曰黄帝上時以醴泉爲漿井孫氏瑞應圖曰王者清净則浪井出有仙人主之典畧曰浪井者不鑿自成之井池唐書曰大厯八年解州安邑兩池生乳鹽後賜號寳應靈慶池土左傳曰晉文公過衛文公不禮出於五鹿乞食於野野人人與之塊公子欲鞭之子犯曰天賜也稽首受而載之史記曰黄帝時有土瑞故以土徳王庾温瑞應圖曰王者徳温逺方則物化爲土蜀王本紀曰蜀王獵於褒谷秦王以金一笥遺蜀報以禮物盡化土秦王大怒臣下拜賀曰土者地也今秦當有蜀矣社漢書曰昌邑王門社有枯樹復生枝葉後宣帝立晉書曰武帝時洛陽太社中有青氣占者以爲東莞後當有天子東莞王改封琅琊王江東之應也春秋潛潭巴曰里社鳴此里有聖人其呴百姓歸之闕湯放桀時有此祥呴呼后切石漢書曰昭帝時太山莱蕪山南匈匈有數千人聲民視之有大石自立髙一丈五尺大四十八圍入地深八尺三石為足石立處有白烏數千集其旁宣帝中興之瑞也唐書曰貞觀十九年陜州有石理成文曰李君王三字甚明又曰永徽二年藍田縣令田仁獻瑞石文理成字曰天安永得立祥瑞圖曰張掖之柳谷有石始見於建安成形於黄初文備於太和建安黄初太和皆年號其石狀象龜嶷然盤峙廣一丈六尺長一丈七尺周圍五丈餘蒼質麟鳯龍馬炳煥成形文字燦然斯蓋大晉受終聖徳兼該之應也魏氏春秋曰明帝時青龍三年張掖刪丹縣金山𤣥川溢湧寳石負圖狀象靈龜立於川西有石馬七其一仙人騎之其一羇絆其五有形而不善成有玉匣闗葢於前上有玉字玉玦二璜一又有麒麟在東鳯凰在南白虎在西有犧牛在北馬自中布列南方有字曰大討曹金但取之此司馬氏革運之徴瑞應圖曰碧石玉者玩弄之物不用則出禮稽命徴曰王者得禮之制則澤谷之中乃生白石又曰王者君臣父子夫妻尊卑有别則石生於澤也禮含文嘉曰内外之制各得其宜則山澤出龜寳石草萐莆孫氏瑞應圖曰萐莆王者不徴滋味庖厨不踰深盛則生於厨一名倚扇一名實閭一名倚萐生如蓮枝多葉少根如絲轉而風生主於飲食清凉驅殺蟲蠅舜時生於厨又堯時冬死夏生又舜時生於厨及階左春秋潛潭巴曰君臣和德道度叶中則萐莆生於庖厨孝經援神契曰王者徳至山陵則澤阜出萐莆華苹祥瑞圖曰䨇蓮為苹又曰華苹者其枝正平王者德剛則仰弱則低又曰王者政令均則華苹生孝經援神契曰王者徳至於地則華苹感而生朱草孫氏瑞應圖曰朱草之精也聖人之徳無所不至則生又曰朱草者草之精也王者徳無所不通四方有歌詠之聲則生大戴禮曰朱草日生一葉至十六日落一葉周而復始尚書大𫝊曰王者徳下究地之厚則朱草生又曰帝命周公踐祚朱草暢生尚書中候曰文命咸得俊乂在官則朱草生郊又曰堯徳清平比隆伏羲故朱草生郊禮斗威儀曰君乗火而王其政頌平則地生朱草春秋感精符曰王者徳洽於地則朱草生食之令人不老春秋運斗樞曰樞星見則朱草生春秋繁露曰君勸農事無奪民時使之嵗不過三日行什一之税進經術之士開闗閭通障塞恩及草木則朱草生孝經援神契曰王者徳至草木則朱草生後漢書曰光武時朱草生於水涯晉書曰武帝時朱草生白虎通曰朱草赤色也可以染絳别成黼黻之服列爲尊卑之差淮南子曰太清之世四時不失其序日月揚光五星循軌則朱草生抱朴子曰朱草狀似小桑裁長三四尺枝葉皆赤莖如珊瑚生名山嶺石之下刻之汁流如血以玉及八石金銀投其中立可丸爲泥以金投中名曰金漿以玉投之名曰玉釀服之皆長生也鶡冠子曰聖人至徳上及太清下及太寧中及萬靈則朱草生魏畧曰文帝欲受禪朱草生於文昌殿側蓂莢孫氏瑞應圖曰蓂莢者葉圓而五色一名厯莢十五葉日生一葉從朔至望畢從十六日毁一葉至晦而盡月小則一葉卷而不落聖明之瑞也人君徳合乾坤則生祥瑞圖曰蓂莢堯時生尚書大𫝊曰周公輔㓜主不矜功則蓂莢生春秋運斗樞曰老人星臨國則蓂莢生尚書中候曰周公作樂而治蓂莢生又曰箕星得則蓂莢生孝經援神契曰王者徳至於地則蓂莢生風俗通曰按孝經説古太平蓂莢生階其味酸王者取以調味後以醯醢代之徐整正厯曰黄帝之時以蓂莢者瑞草也蓋神靈之嘉應也白虎通曰王者考厯得其分度則蓂莢生於階間蓂莢者樹名也嘉榖孫氏瑞應圖曰嘉禾五榖之長盛徳之精也文者則二本而同秀質者則同本而異秀此夏殷時嘉禾也又曰周時嘉禾三本同穗貫桑而生其穗􅄹箱生於唐叔之國以獻周公曰此嘉禾也大和氣之所生焉此文王之徳乃獻文王之廟書曰唐叔得禾異畆同頴各一隴合爲一穗獻之天子王命周公作嘉禾篇尚書中候曰嘉禾莖長五尺三十五穗禮含文嘉曰神農作耒耨天應以嘉禾又曰綏五車明五禮則五禾應以大豐禮斗威儀曰人君乗土而王其政昇平則嘉榖並生詩含神霧曰堯時嘉禾七莖連三十五穗春秋運斗樞曰旋星得嘉禾掖孝經援神契曰王者徳至於地則嘉禾生周書曰神農時天雨粟神農耕而種之然後五榖興以助果實漢書曰宣帝時嘉禾降於郡國後漢書曰安帝時九真嘉禾生五百六十本七百六十八穗東觀漢記曰光武以建平元年生於濟陽縣舍時有嘉禾一莖九穗縣境大熟又曰文帝時嘉禾嘉麥日月不絶魏志曰文帝欲受禪郡國三嘉禾生王隠晉書曰元帝初藉稿草悉成禾沈約宋書曰文帝時醴湖生嘉粟一莖九穗又曰宋文帝元嘉二十五年嘉禾生華林園十株七百穗又曰孝武帝大明元年嘉禾生清暑殿鴟尾中一株六穗齊書曰武帝時固始縣嘉禾一莖五穗新蔡又獲一莖九穗一莖七穗梁起居注曰大同六年九月始平獻嘉禾一莖十七穗白虎通曰嘉禾者大禾也晉徴祥説曰王者盛徳則嘉禾生嘉禾者仁卉也其大􅄹箱一稃二米國政質則同本而異頴國政文則同頴而異本唐書曰開元十九年楊州奏穭生稻二百一十五頃再熟稻一千八百頃其粒與常稻無異又曰大中二年福建進粟十五莖莖有五六穗又曰大中六年淮南節度使杜悰奏海陵高郵兩縣百姓於官河中漉得異米煑食呼爲聖米秬鬯孫氏瑞應圗曰秬鬯者三隅之黍一稃三米王者宗廟修則生又曰昭穆序祭祀宰人咸有敬謹禮容之節威儀之美則秬鬯生又曰王者節敬依禮度親疎有别則秬鬯生又曰黄帝時南夷乗白鹿來獻秬鬯孝經援神契曰王者徳至於地則秬鬯生福草孫氏瑞應圗曰王者宗廟致敬則福草生於廟一名禮草禮斗威儀曰君乗木而王其政昇平則福草生廟中宋均曰廟中生草蓋福草即朱草之别名可以染祭服故君人孝而生廟中福并孫氏瑞應圗曰福并草王者有徳則福并生葳㽔孫氏瑞應圗曰王者禮備則威綏生一曰葳㽔又曰王者愛人倫則葳㽔生於殿前屈軼孫氏瑞應圖曰屈軼者太平之代生於庭前有佞人則草指之延嘉孫氏瑞應圖曰延嘉王者有徳則見又曰王者孝道行則延嘉生孝經援神契曰天子至徳屬於四海則延嘉生紫達孫氏瑞應圖曰紫達者王者仁義行則常見禮斗威儀曰君乗土而王其政太平則紫脱常生芝孫氏瑞應圖曰王者慈仁則芝草生食之令人延年春秋運斗樞曰揺光得則陵出𤣥芝孝經援神契曰王者徳至於草木則芝草生漢書曰武帝元封六年甘泉宫内産芝草九莖異産連葉又曰王者寵近􅂄老養有道則芝莢生宣帝神爵元年金芝九莖産於函徳殿銅池中銅池水宫也以銅作池後漢書曰明帝時郡國上芝英又曰章帝建初三年零陵獻芝草東觀漢記曰桓帝時芝草生中黄藏府宋書曰順帝時臨城縣生紫芝齊書曰武帝時襄陽獲紫芝隋書曰開皇十九年朱雀等十六門生芝草唐書曰貞觀十七年安禮門御榻産靈芝五莖又皇太子寢室中産素芝十四莖悉爲龍鳯之狀又曰貞觀十七年滁州言所部川源徧生芝草百僚及雍州父老上表固請封禪唐春秋曰貞觀十九年雍州李樹生芝英赤蓋紫光色鮮麗司徒長孫無忌與方岳官上表請封禪不許又曰天寳七載三月大同殿柱礎産玉芝兩莖又曰肅宗上元二年甲辰延英殿御座梁上玉芝生一莖三花御製靈芝詩以示羣下又曰上元二年九月壬午朔皇后奏含暉院生金芝大同起居注曰九年金芝二十八莖生平水署少府卿蕭介以聞古今注曰漢武時甘泉殿房内産芝九莖連葉作芝房之歌白虎通曰帝者徳至於山則芝實茂孫整長厯曰黄帝以五芝爲房名瑞令記曰食芝延年不終與真人同論衡曰建初三年零陵泉陵縣女子博寧宅内生芝草五本莖葉紫色太守沈鄷遣門下椽奉獻皇帝悦懌又曰芝草一莖三葉食之令人眉壽慶生蓋仙人之所食又曰紫芝者其栽如豆繆襲神芝讚曰青龍元年神芝産於長平之晉陽許昌典農中郎蔣充奉表以聞其色丹紫其質光輝上别爲三幹分爲九枝散爲三十六莖委綏連屬似珊瑚之狀考圖按譜蓋美乎前代矣蘭禮斗威儀曰君乘金而王其政象平則蘭常生宋均曰蘭常生泰和之謂也茅史記曰齊桓公欲封禪管仲曰古之封禅鄗上之黍北里之禾所以為盛江淮之間一茅三脊所以為藉周書曰成王時竒肱獻茅其頭若雄雉佩之不昩宋書曰孝武時三脊茅生石頭西岸江夏王義恭表勸封禪唐書曰麟徳元年亳州奏老君廟側生三脊茅蒿大戴禮曰周時徳澤洽和蒿大可以爲宫柱曰蒿宫此天子之路寢也木禮稽命徴曰王者得禮之制則澤谷之中生赤木又曰王者得禮之宜則宗廟生祥木地鏡圖曰國治益地則木生於水上又曰國理君喜則樹木忽自大又京房易𫝊曰君有徳生聖子則木生屋上及朝廷又曰君徳强且髙昌則木生城脅一圍已上長數丈此謂城强孫氏瑞應圖曰王者徳化洽八方合爲一家則木連理又曰王者不失民心則木連理漢書曰武帝幸雍得竒木支旁出復合上異之終軍曰衆枝内附示無外也殆將有削左祍而䝉化者後漢書曰明帝永安十七年甘露仍降樹枝内附西南夷哀牢儋耳僬僥槃木白狼動黏諸種前後慕義貢獻西域諸國遣子入侍宋書曰文帝元嘉中有榖櫟二樹連理隋書曰盭厔縣獻連理樹植之宫庭唐書曰貞觀十八年山南獻木連理交錯玲瓏有同一丈之幹并枝者二十餘所又曰二十一年玉華宫李樹連理隔澗合枝白虎通曰王者徳至草木則木連理也晉中興徴祥説曰王者徳澤純洽八方同一則木連理連理者或枝還合或兩樹合共曹植魏徳論曰皇樹嘉徳風靡雲披有木連理别幹同枝將承大同應天之規唐書曰興元元年八月亳州真源縣大空寺李樹植來十四年長一丈八尺今秋忽上聳髙六尺周廻似蓋九十餘尺賔連闊達孫氏瑞應圖曰王者嫡庶有序男女有别則賔連閱生於房一名賔連達一名賔連闊生於房室象御妃有節也白虎通曰賔連闊達者樹名也其狀連累相承平露孫氏瑞應圖曰平露者如蓋生於庭似四方之政王者不私人以官則四方之政平若東方政不平則西低北方政不平則南低西方政不平則東低南方政不平則北低四方政不出其根若絲一曰平兩又曰平兩者如蓋以知四方王者政平則生白虎通曰王者使賢不肖位不踰則平露生庭平露者樹名也太平御覽卷八百七十三
