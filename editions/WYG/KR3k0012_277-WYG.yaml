body:
  text: 太平御覽卷二百七十七宋李昉等撰兵部八儒將儒將左傳曰晉謀元帥趙衰曰卻縠説禮樂而敦詩書使將中軍漢書曰馮奉世以良家子選為將年四十餘乃學春秋渉大義讀史書後漢書曰馬援嫺於進退尤善述前世行事每言及三輔長者下至閭里少年皆可觀聴自皇太子諸王侍聞者莫不属耳㤀倦又善兵䇿帝常言伏波論兵與我意合每有所謀未嘗不用又曰祭遵為將軍取士皆用儒術對酒設樂必雅歌投壺雖在軍旅不㤀爼豆又曰賈復少好學習尚書事舞隂李生李生竒之謂門人曰賈君之容貌志氣如此而勤於學將相之噐也又曰賈復知帝欲偃干戈修文徳不欲功臣擁衆京師乃與髙宻侯鄧禹並剽甲兵敦儒術廣雅曰剽削也謂除甲兵東觀漢記曰賈復闔門養威重受易經知大義帝深然之遂罷左右將軍復以侯就第加位特進吴書曰魯肅為人方嚴寡于縁飾内外節儉不務俗好治軍整頓禁令必行雖在軍中手不釋書又善談論能屬文辭思𢎞逺有過人之明周瑜之後肅為之冠也晉書曰杜預身不跨馬手不穿札而每在大事輒居將帥之列又曰劉毅征盧循敗歸帝大宴于西池有詔賦詩毅詩云六國多雄士正始出風流毅自以武功不競故示文雅有餘也又載記曰石勒雅好文學雖軍旅中常令儒生讀史書而聴之每以其意論古帝王善惡朝賢儒士聴者莫不美焉嘗使人讀漢史書聞酈食其勸立六國後大驚曰此法當失何得遂成天下至留侯諌乃曰頼有此耳宋書曰沈慶之嘗對上為詩令僕射顔師伯執筆慶之口占曰㣲生值多幸得逢時運昌老朽筋力盡徒歩還南岡辭榮此聖代何愧張子房並歎其辭意之美梁書曰曹景宗大破魏軍振旅凱入帝于華光宴飲因令左僕射沈約賦韻景宗不得韻意色不平啟求賦詩帝曰卿技能甚多人才英㧞何必止在一時景宗已醉求作不已詔令約賦韻已盡唯餘競病二字景宗便操筆斯須而成其辭曰去時兒女悲歸來笳鼓競借問行路人何如霍去病帝忻然不已約及朝賢驚嗟竟日詔令上史北史曰周文帝宴羣公卿士仍賦詩言髙琳詩末章云寄言竇車騎為謝霍將軍何以報天子沙漠静妖氛帝大恱曰獫狁陸梁未時欵塞卿言有騐國之福也後魏書曰􅅊彧為東豫州刺史以蠻俗荒梗不識禮儀乃表立大學選諸郡生徒於州檢校又于城北置崇武館以習武焉境内清肅還遷大將軍又曰征虜將軍劉藻渉獵羣籍美談笑善與人交飲酒至一石不亂後周書曰宇文顯和性矜嚴頗渉經史膂力絶人彎弓數百斤能左右馳射又曰賀㧞勝長於䘮亂之中尤工武藝走馬射飛鳥十中其五六太祖每云諸將對敵神色皆動唯賀㧞公臨陣如平常真大勇也自居任始愛墳籍乃招引文儒討論義理性又通率重義輕財身死之日唯随兵仗及書千餘卷隋書曰髙祖有平南之志訪可任者髙熲曰朝臣之内文武才幹無出賀若弼者髙祖曰得之矣於是拜弼為吴郡總管委以平陳之事弼欣然以為己任與夀州總管源雄並為重鎮弼雄詩曰交河驃騎幕合浦伏波營勿使麒麟上無我二人名獻取陳十䇿上稱善賜以寳刀周羅㬋初仕陳為太子左衞率信任逾重時叅宴席陳主曰周左率武將詩每前成文士何為後也都官尚書孔範對曰周羅㬋執筆製詩還如上馬入陣不在人後自是益見親禮又曰于仲文討髙䴡大破之至鴨緑水髙䴡將乙支文德詐降來入其營仲文先奉宻㫖若遇髙元及文德者必擒之至是文德來仲文將執之時尚書左丞劉士龍為慰撫使固止之仲文遂捨文德尋悔遣人紿文德曰更有言議可復來也文德不從遂濟仲文選騎渡水追之每戰破敵文德遺仲文詩曰神策究天文妙算窮地理戰勝功既髙知足願云止仲文答書辭之文德燒柵而遯唐書曰調露元年突厥阿史德溫𫝊叛單于管内之二十四府皆叛應之單于都䕶蕭嗣業率兵討之突厥分兵掠其糧車兵多餓死由是大敗朝廷憂之遣禮部尚書裴行儉為定襄道行軍大總管率諸軍三十萬進討行儉至朔州知賊掠嗣業糧運得勝乃詐為糧車三百乘每車伏壯士五人持陌刀勁弩又以羸兵數百援之兼伏精兵以待之敵見糧車果大至羸兵纔鬭棄車而走賊驅車就泉水解鞍牧馬方擬取糧車車中壯士齊發敵衆大驚奔潰伏兵俱發敵騎擒戮殆盡自是續遣糧車敵望之不敢近既而諸道進兵屡㨗行儉終擒温傅再平突厥又曰婁師德弱冠進士擢第累補監察御史於時吐蕃方犯塞有詔募勇士以討之師徳抗表應募請為猛士擊賊髙宗大恱特假朝散大夫從軍西討頻立戰功天授初遷金吾将軍豐州都督則天勞書勞之曰卿受委北陲總司軍任徃還靈夏校檢屯田收率既多京坻遽積不煩和糴之費無復轉輸之勞兩軍鎮兵咸得支給覽以嘉尚欣恱良深召為夏官侍郎俄拜鳯閣侍郎同平章事又曰婁師德頗有學術噐量寛厚喜怒不形於色自專綜邊任三十餘年恭勤接下孜孜不怠當危亂之際族滅者相繼師徳出将入相能以功名始終識者多之又曰永徽中薛仁貴平百濟髙宗令别將攝帶方州刺史劉仁軌留兵鎮守詔仁貴班師還髙宗勞問之曰卿在海東前後奏請皆合事宜而雅有文理卿本武将何得然也對曰非臣所能皆劉仁軌之所為也帝深加歎賞超仁軌六階正授帶方州刺史仁貴初平百濟合境凋殘疆屍相属仁軌始令收斂骸骨瘞埋弔祭之校計户口署置官長開通道路整理村落補葺堤堰脩復陂塘勸民耕種賑貸貧乏存問孤老頒宗廟忌諱立皇家社稷百濟餘衆復安生業仁軌位至中書令又曰御史大夫唐休璟有文武才幹貞觀元年為隴右使大破吐蕃大將麴莽支於凉州洪源谷凢六戰六㨗破敵築京觀而還後吐蕃使來朝嘗因侍宴蕃使屢覘休璟則天問其故對曰徃嵗洪源戰時此將軍雄猛無比殺臣將士甚衆今願識之則天大加歎異休璟尤練邉事自碣石西踰四鎮綿亘萬里山川要害皆能記之長安中西突厥與諸蕃不和舉兵相持安西道阻表疏相繼則天召休璟與宰相商度事勢俄頃間草奏便施行後十餘日安西諸州請兵應接一如休璟所畫則天謂之曰恨用卿晚乃遷夏官尚書同中書門下三品仍謂魏元忠曰休璟諳練邊事卿等十不當一也又曰宰相張說出為并州大都督府長史兼天平軍大使開元九年邊敵康大賔據長泉鎮叛與党項連結攻䧟蘭池等六胡州詔說與朔方軍大使王晙合勢進討賊攻銀城連谷以據倉糧說統馬歩萬人出合河関掩擊大破之追至駱駝堰敵及党項自相疑貳乃散說招集党項復其居業副使史憲請盡誅党項說曰先王之道推亡固存如盡誅之是逆天道因奏置麟川安置党項餘衆其年說自兵部尚書進同平章事十年又勅說為朔方軍節度大使徃廵五城䖏置兵馬時降敵康願子自立為可汗舉兵掠監牧馬西河渉出塞說勒兵討而擒之以獻徙其家属於七盤山其黨悉平獲男女三千人於是移河曲六胡州敵兵五萬餘口配之於許汝唐鄧仙豫等州始空河南朔方地先是緣邊鎮兵常六十萬說以邊冦漸平奏罷二十餘萬勒還農畝𤣥宗頗以為疑說奏曰臣乆在疆場具悉邊事禦敵制勝不在多驅閒冗陛下若以為疑臣請闔門百口保之以陛下之明遠方畏服必不慮減兵而招冦也𤣥宗從之時當蕃衞士浸以貧弱逃亡畧盡說建䇿請一切罷之別召募强壯令其宿衞不簡色役優為條例逋逃者必爭來應募上從之旬日得精兵十三萬人分擊諸衞彍騎是也又曰吴元濟據蔡州叛王師討伐詔柳公綽以鄂兵五千𨽻安州刺史李聴率所赴行營公綽曰朝廷以吾儒生不知兵耶即日上奏願自征行許之公綽自鄂濟溳江直抵安州李聴以㢘使之禮事之公綽謂之曰公所以屬鞬負弩豈非為兵事耶若去戎容被公服兩郡守耳何所統攝乎以公名家曉兵若吾不足以指麾則當赴闕不然吾且署職名以兵法從事矣聴曰惟公所命即署聴為鄂岳都知兵馬使中軍先鋒行營馬歩都虞候三牒授之乃選卒六千属聴戒其部校曰行營之事一决都將聴感恩畏威如出麾下其出權制變為當時所稱入為刑部尚書出授太原尹河東節度使代北有沙陁部落自九姓六州皆畏憚之公綽至鎮召其酋朱耶執宜安置於雲朔塞下治廢栅十一募兵三千令沙陀屯守由是邊患以息又曰元和十二年憲宗召宰臣議兵曰王師伐蔡首尾三年雖㨗奏頻來窠巢未殄度支供饋其何以濟李逢吉崔羣王涯各有奏對多言罷兵為便唯裴度不言利害議曰臣請自徃行營督戰明日延英殿復對宰臣俱退上獨止度謂之曰卿必能為朕行乎度稽首流涕而奏曰臣誓不與此賊俱全上亦為之感動度奏曰賊已力困但諸將心不一故未降耳上深嘉之遂欲加度招討使度奏曰韓𢎞已為都統臣不欲受招討之名但奉使即得乃下詔以度為彰義軍節度蔡申光觀察等使仍淮西行營宣慰處置使其年八月一日度發京師仍賜禁軍三百為衞兵憲宗御通化門餞軍度銜涕辭天以郾城為蔡州應度得慰勞之㫖躬督戰陣卒以立功即時論賞諸将奮勵無敢退留至十月十一日㧞蔡州擒吴元濟仗節而還又曰元和中以裴度征淮西詔曰輔弼之臣軍國是賴興化致理秉鈞以居取威定功則分閫而出所以同君臣之體一中外之任焉属者問罪汝南致誅淮右葢欲刷其汙俗弔彼頑人雖挈地求生者實繁有徒而嬰城執迷者未剪其類何獸困而猶鬬豈鳥窮之無歸歟由是遥聼鼓鼙更張琴瑟煩我台席董兹戎旃朝議大夫中章侍郎同平章事飛騎尉賜金魚袋裴度為時降生恊朕夢卜精辨宣力堅明納忠當軸而才謀老成運籌而智畧有定司其樞務備知四方之事付以兵要必得萬人之心是用禱於上𤣥揀此吉日帶丞相之印綬所以尊其名賜諸侯之斧鉞所以重其命爾其宣布清問恢壯皇猷感勵連營蕩平多壘招懐孤疾字撫夷傷况淮西一軍素効忠莭過海赴難史冊書勲建中初攻破襄陽擒滅崇義比者脅於凶逆歸命無由每念前勞常思安撫所以内輟輔臣俾為師率實欲保全慰諭各使得宜汝往欽哉無越我丕訓可門下侍郎同中書門下平章事蔡州刺史充彰義軍節度申光蔡觀察等使仍充淮西宣慰招討處置使詔出度以韓𢎞為淮西行營都統不欲更為招討請秪稱宣慰處置使又以此行既兼招撫請改翦其類為革其志又以𢎞已為都統請改更張琴瑟為近輟樞衡請改煩我台席為授以成算皆從之唐書曰太尉李光弼御軍嚴峻而有禮士卒愛而憚之之貞元中郭子儀㑹丸節度之師不利於相州以光弼代郭子儀為河北副元帥子儀寛恕朔方將士多不奉法時僕固懐㤙引回紇内助累立戰功將帥多假借之朝議加賞進懐恩為右廂都知兵馬使光弼出闗㑹諸將進戰因左廂都知兵馬使張用濟後至斬於纛下懐恩届期先至莫不惕息光弼在河陽令懐恩攻安太清於懐州官軍頻不利光弼怒將斬之懐恩出竒為地道偷得賊號詐傳號令賊衆大亂遂㧞懐州擒太清而還光弼捨之太清妻有美色城破被俘太清向光弼求之即命還太清議者稱自艱難以來唯光弼行軍理戎沉毅有籌畧將帥中第一又曰鳯翔將野詩良輔涇原將郝玭各以名雄邉上吐蕃嘗謂漢使曰唐國既與吐蕃和好何妄語也問曰何謂曰若不妄語何因遣野詩良輔作隴州刺史其畏憚如此太平御覽卷二百七十七
