body:
  text: 太平御覽卷三十八宋李昉等撰地部三叙山崑崙山鍾山玉山蓬萊山方丈山瀛洲山終南山叙山釋名曰山頂曰冡亦曰巔亦曰椒山脊曰岡山大而髙曰嵩嵩稱髙也今中岳嵩山蓋依此亦作崧小而髙曰岑鋭而髙曰嶠卑而大曰扈小而聚曰巋上大下小曰巘山有草木曰岵音户無草木曰垓古來切石戴土曰岨土戴石曰崔嵬此因形而名之山東曰朝陽山西曰夕陽隨日照而名之山足曰麓山穴曰岫山邊曰崖崖之髙曰巖上秀曰峯陬隅髙者曰岊山坡曰坂山三襲曰陟山再成曰莫一成曰坯山中絶曰陘未及上曰翠㣲一説山氣青縹色曰翠微山屬曰嶧言絡繹相連今魯國有嶧山絶石相積搆連屬成山盖謂此也山狹而髙曰巒小曰嶞它果反謂山形長狹者荆州人謂之蠻詩云墮山喬岳土山曰阜阜髙也言其髙厚曲阜曰阿大阜曰陵小陵曰丘山精曰䕫亦曰跂亦曰雲陽祭山曰庪懸庪角毁反自山頂曰冡以下並説文釋名爾雅也易曰兼山艮又曰地中有山謙又説卦曰山澤通氣又曰艮為山詩云如南山之夀不騫不崩又曰節彼南山楊乂易卦序論云險而止山也險而動泉也動静皆蒙險故曰山書禹貢曰導岍及岐至于荆山踰于河孔安國注曰此謂梁山龍門也壼口雷首至於太岳底柱析城至于王屋諸山在冀州南阿之地也大行恒山至于碣石入于海此二山者連延東北接碣石而入滄海百川經此衆山禹皆治之也不可勝名故以滄海山川言之也西傾朱圉鳥鼠西傾朱圉在積石以東為鳥鼠謂所出在隴西三者雍州之南至于太華相首尾而東也熊耳外方桐栢至于陪尾四山相東南在豫州絡經熊耳經外方淮南桐栢經陪尾凡此皆先舉所施功之山於上而後條列所治水于下以相備也導嶓冡至于荆山嶓冡山在梁州荆山在荆州也内方至于大别内方大别二山名在荆州漢所經岷山之陽至于衡山岷山江所出在梁州衡山江所出在荆州春秋傳曰山有木工則度之禮記曰今夫山一拳石之多及其廣大草木生之禽獸居之寳藏興焉又曰天子祭名山大川五岳視三公視其牲噐之數又曰天不愛其道地不愛其寳人不愛其情故山出噐車又曰居山不以魚鼈為禮爾雅曰土髙有石曰山釋名云山産也言産萬物説文曰山宣也氣散生萬物有石而髙春秋元命苞曰山者氣之苞所以含精藏雲故觸石而出春秋説題辭曰山之為言宣也含澤布氣韓詩外傳曰夫山萬人之所觀仰材用生焉寳藏植焉飛禽萃焉走獸伏焉育物羣而不倦有似乎仁人志士是仁者所以樂山也尚書大傳曰孔子曰夫山者嵬嵬然草木生焉禽獸蕃焉材用植焉四方皆無私焉出雲雨以通乎天地之間隂陽和合雨露之澤萬物以成百姓以饗此仁者之樂于山也國語曰禹封九山山者土之聚也河圖曰嶓冡山上為狼星武關山為地門上為天髙星主囹圄荆山為地雌上為軒轅星大别為地理天以合地以通三危山在鳥鼠之西南上為天苑星政山在崑崙東南為地乳上為天糜星汶山之地為井絡帝以㑹昌神以建福上為天井星桐栢為地穴鳥鼠同穴山之幹也上為掩畢星熊耳山地門也精上為畢莊子曰函車之獸分而離山不免網罟之患又曰山積卑而成髙管子曰凡天下名山五千三百七十出鐵之山三千六百有九上有丹砂者下有黄金上有磁石者下有銅金上有緑石者下有鉛錫上有赭下有鐡淮南子曰牛蹄之涔無徑尺之鯉塊阜之山無尋丈之材營宇狹小而不能容巨大也孫卿子曰不登髙山不知天之髙不臨深谿不知地之厚不聞先王之道不知學問之大吕氏春秋曰何謂九山㑹計泰山㑹計即㑹稽也泰山在陽山郡是為東岳王屋首山泰華岐山太行羊腸孟門岐山在扶風美陽縣西北周家所邑也太行在河内野王縣北羊腸其山盤紆如羊賜狀在太行晋陽北孟門太行是也說苑曰土積成山則豫章生焉又曰五嶽者何謂也泰山東嶽也霍山南嶽也華山西嶽也恒山北嶽也嵩髙山中嶽也五嶽何以視三公能大布雲雨焉能大歛雲雨焉觸石而出膚寸而合不崇朝而雨天下施徳博大故視三公也白虎通曰東岱山岱者言萬物相代於東方南衡山者上承景宿銓徳均物故曰衡曰西華山華者獲也萬物熟成乃有獲也北恒山恒常也言萬物伏藏於北方有常度也中嵩山嵩者髙也言峻大處中以領四方地鏡圖曰入名山必齋五十日牽白犬抱白雞以白鹽一升山神大喜芝草異藥寳玉為出未到山百步呼曰林兵此山之主者名知之却百邪關令尹喜内傳曰五百嵗天下名山一開開時金玉之精涌出晏子春秋曰齊大旱景公召羣臣問曰天乆不雨矣民且有饑色吾卜祟在髙山廣澤寡人欲祠靈山可乎晏子曰夫靈山以石為身以草木為毛髮天不雨髮將焦身將熱獨不欲雨乎祠之何益山海經曰周穆王周厯四荒名山大川靡不登躋東昇王公之堂西宴王母之廬列子傳曰共工與顓頊爭天下怒而觸不周山魏志曰明帝起景陽山於芳林園晋書曰顧愷之好遊㑹稽人問山川之美對曰千巖競秀萬壑争流宋書曰謝靈運好登山常著木屐上山則去前齒下山則去後齒漢書曰李廣利刺山而泉涌楚詞曰山中兮不可以乆留古詩曰上山採蘼蕪下山逢故夫崑崙山爾雅曰西北之美者有崑崙之璆琳瑯玕焉史記夏禹本紀曰河出崑崙其上有澧泉華池漢書曰張安世房中歌詩云天馬來兮開逺門竦余身兮遊崑崙博物志曰崑喬從廣一千里神山也出五色雲氣五色流水其白泉水東南流入中國名為河也河圖括地象曰崑崙之山為地首上為握契滿為四瀆横為地軸上為天鎮立為八柱河圖括地象曰崑崙之墟有五城十二樓河水出焉四維多玉龍魚河圗曰崑崙山天中柱也紀年曰周穆王十七年西征至崑崙丘見西王母穆天子傳曰天子昇於崑崙之丘以觀黄帝之宫増封於崑崙山上又曰天子遂宿於崑崙之阿赤水之陽山海經曰周穆王至崑崙之丘逰軒轅之宫眺鍾山之嶺勒石西王母之山紀迹𤣥圃之上又曰槐江之山實惟帝之平圃南望崑崙其光熊熊有木焉其狀如棠而黄華赤實其味如李而無核名曰沙棠食之令人不溺草木之美者沙棠也又曰崑崙之墟方八百里髙萬仞上有木木長五尋大五圍旁有井以玉為楹檻欄楹有五門門有開明獸守之百神所在又曰崑崙之丘有神人面虎身文尾其下有弱水泉徐整長厯曰北斗當崑崙上真人關尹内傳曰萬億萬嵗有一大水崑崙飛浮是時飛仙迎取天王及善民安之山上也葛仙公傳曰崑崙山一曰𤣥圃臺一曰積石瑶房一曰閬風臺一曰華蓋一曰天柱皆仙人所居列仙傳曰赤松子者神農時雨師也服水石以教神農能入火不燒至崑崙山上常止西王母石室中隨風雨上下炎帝少女追之亦得仙俱去至髙辛時復為雨師今之雨師是又曰王母者神人也人面蓬頭髪虎牙豹尾善嘯穴居名西王母在崑崙山下神仙傳曰東郭延者山陽人服雲母散能夜書有數十人乘虎豹來迎比鄰盡見之與親友辭别而去云詣崑崙山神異經曰崑崙有銅柱焉其髙入天所謂天柱也圍三千里周圓如削銅柱下有屋壁方百丈搜神記曰崑崙之山是惟帝之下都環以炎火山十洲記曰崑崙號曰崑陵山也上有金臺玉闕元氣之所合天帝君治處𤣥元記曰崑崙西南山周環三萬里巨蛇繞之得三周蛇長九萬里尸子曰赤縣神州實為崑崙之墟玉紅之草生焉食其一實而醉卧三百嵗而後寤吕氏春秋曰菜之美者有崑崙之蘋也淮南子曰崑崙山上有層城九重上有木禾其條五尋珠樹玉埞樹不死樹在其西沙棠琅玕在其東絳樹在其南瑶樹在其北又曰崑崙之玉瑱而塵垢不能汚也抱朴子曰蔡譴者自云被謫至崑崙初譴還人問云崑崙似何答曰天不問其髙㡬里要於仰視之去天過十數里也崔鴻十六國春秋前趙録曰東平王劉約癸亥卒一指猶暖遂不殯殮至於甲戌乃蘇言見劉淵於不周山經五日遂復從至崑崙山三日而復返於不周見諸王公卿將死者悉在焉又曰酒泉太守馬岌上言酒泉南山即崑崙之體也昔周穆王見西王母樂而忘歸即在此山山有石室王母堂珠璣鏤飾煥若神宫鍾山穆天子傳曰自宻山以至鍾山四百六十里其間盡澤多怪獸竒魚又曰天子北昇於舂山之上望四野郭璞注曰舂音鍾也曰是惟天下之髙山山海經曰黄帝取峚之玉榮投之鍾山之隂以為玉種又曰鍾山其子曰鼓此亦神名名之為鍾山之子耳其類皆見歸藏啟筮也其狀人面龍身帝乃戮之鍾山之東也又曰鍾山之神名曰燭隂燭龍也是燭九隂也視為晝瞑為夜吹為冬呼為夏魯女生列傳曰鍾山之棗其大如缾十洲記曰北海外有鍾山自生千芝及神草此洲受太𤣥生符録仙家數十萬耕田種芝草課計頃田種稻𤣥中記曰北方有鍾山焉山有石首如人首左目為日右目為月開左目為晝開右目為夜開口為春夏閉口為秋冬淮南子曰鍾山之玉灼之以爐炭三日三夜其色不變論衡曰鍾山之上以玉抵鵲彭蠡之濵以魚食犬玉山穆天子傳曰天子西征東還乃循黑水至於羣玉之山天子於是取玉板玉器服物載玉萬候雙玉為玨半璧為候見左傳山海經曰玉山是西王母所居此山多玉石因以為名帝王世紀曰崑崙之北玉山之神人身虎首豹尾蓬頭外國圖曰西王母國前弱水中有玉山白兎闞駰十三洲記曰赤水西有白玉山山有西王母堂室蓬萊山漢書王莽傳曰有竒士大十圍自言巨無霸出於蓬萊山軺車不能載三馬不能勝焉武帝紀曰太初元年十二月祀后土臨渤海望祀蓬萊十洲記曰蓬萊山外别有海謂之溟海無風而洪波百丈有九氣丈人九天真君宫𤣥中記曰東海之大者有巨鼇焉以背負蓬莱山列子曰渤海之東有大海其中有山一曰岱輿二曰貟嶠三曰方壺四曰瀛洲五曰蓬莱山上臺觀皆金玉禽獸皆純縞珠玕之樹皆聚生實皆有滋味食之不老不死人皆仙聖一日一夕飛翔來往山海經曰蓬萊山海中之神山非有道者不至列仙傳曰安期生瑯琊阜鄉人時人皆言千嵗秦始皇與語賜金璧數千萬出阜鄉亭皆置去留以赤玉舄一量為報曰後千嵗求我蓬萊山下又曰負局先生語似燕岱間人吴市中磨鏡一錢因磨之輙問主人得有無疾苦輙出紫赤藥與之莫不立愈後上吳山懸藥下與萬姓欲去時曰吾欲還蓬萊山神仙傳麻姑謂王方平曰自接侍以來三見海中變為桑田蓬萊之清淺也方丈山漢書曰太液池有方丈瀛洲象海中神山焉列仙傳服閭者不知何人常止莒往瀛海邊諸祠中有三仙人於祠中博賭瓜使服閭擔黄白𤓰數十頭教令瞑目及覺乃在方丈山瀛洲山史記封禪書曰齊宣王燕昭王使人求蓬萊方丈瀛洲此三神山傳在海中去人不逺望之如雲中及至則三山反在水中欲至風引船而去莫能至者仙人不死藥皆在焉黄金白玉為宫闕終南山書曰終南惇物至于鳥鼠謂終南惇物二山西出至于鳥鼠山詩曰終南何有有條有枚漢書曰太一山又為終南山五經要義太一山在扶風武功縣則終南太一不得為一山明矣葢終南南山之總名太一山之别號唐書曰盧藏用初隠終南山後出仕道士司馬子㣲歸天台山羣公祖道藏用指終南山曰此山甚有佳處何必天台山子㣲曰以吾觀之此乃仕宦之㨗徑爾藏用有慙色又曰文宗開成二年詔曰每聞經書舊説以為終南山興雲祈必有雨若晴霽雖宻雲至地竟不霑濡况兹山北面闕庭自當以時修其望祀寵數宜及今聞都無祀宇終南山未備禮秩命有司即時建立關中記曰終南山一名中南言在天中居都之南也又曰終南太一左右三十里内名福地皇甫謐髙士傳曰四皓共入商洛隠地肺山以待天下定漢髙祖徵之不至乃深自匿終南山辛氏三秦記曰太一在驪山西去長安二百里山之秀者也中有石室靈芝常有一道士不食五穀自言太一之精齋潔乃得見之其狀似仙人山一名地肺可避洪水俗云上有神人乗船行追之不可及方輿記曰東方朔謂天之大阻其終南多金銀鐵玉石樟檀異類之物皆百工取給萬姓所仰足也風土記曰王莽以皇后有子通子午道從杜陵直抵終南太平御覽卷三十八
