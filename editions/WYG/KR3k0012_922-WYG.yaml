body:
  text: 太平御覽卷九百二十二宋李昉等撰羽族部九鷰白鷰赤鷰雀舞雀神雀赤雀黄雀青雀大雀鷰春秋運斗樞曰揺光星散為燕禮記曰仲春之月𤣥鳥至至之日以太牢祀於高禖天子親往左傳曰郯子云少皥時鳥師而鳥名𤣥鳥氏司分者也𤣥鳥鷰也春分來秋分去又曰吴公子札自衛如晉将宿於戚戚孫文子邑也聞鐘聲曰異哉夫子之在此也猶鷰之巢於幕上也詩曰燕燕衛莊姜送歸妾也鷰鷰于飛差池其羽之子于歸逺送于野鷰鷰于飛下上其音又曰天命𤣥鳥降而生商宅殷土芒芒𤣥鳥鳦也春分鳥降陽之升也昔有娀氏女簡狄配髙辛與之祈于郊禖而生契今故以𤣥鳥至而祠焉芒芒大貎也爾雅曰鷰鷰乙也史記曰帝嚳少妃有娀音嵩氏曰簡狄以春分𤣥鳥至之日祠于髙禖有𤣥鳥遺卵簡狄吞之生契又曰陳勝輟耕嘆曰燕雀安知鴻鵠之志哉又曰臨江閔王榮坐侵廟壖為宮上徵榮詣中尉府郅都責訊王王恐自殺葬藍田燕數萬衘土置冡上百姓憐之漢書名臣奏曰丞相薛宣奏曰茂陵寢上食日𤣥鳥來集吐所含大豆紫黑色翺翔殿上此陛下永與天無極天下幸甚又曰成帝和平二年大水有燕生雀又曰王莽開哀帝母丁姬冡有燕数千銜土投其窟中魏志曰余陶令諸葛原遷新興太守管輅祖餞之賔客並㑹自起取燕卵蜂窠蜘蛛著噐中使輅覆射卦成輅曰含氣須變依于室堂雄雌以分翅未舒張此燕卵也晉中興書曰中原䘮亂鄉人遂共推郗鍳為主與千餘家俱避難於魯國嶧山山有重險百姓飢饉野無生草時或掘野鼠蟄燕而食之晉書載記曰慕容儁時燕窠于雋正陽殿之西椒生雛三頭上有豎毛凡城獻異鳥五色成章儁謂羣僚曰是何祥也咸稱燕者燕鳥也首有毛冠者言大燕龍興冠通天章甫之象也巢正陽西椒者言至尊臨軒朝萬國之徵也三子者數應三統之騐也神鳥五色言聖朝将繼五行之籙以御四海者也儁覽之大恱南史曰㐮陽覇城王整之姊嫁為衛敬瑜妻年十六而敬瑜亡父母姑舅咸欲嫁之誓而不許乃截耳置槃中為誓乃止所住有燕巢常雙飛來去後忽孤飛女感其偏栖乃以縷繫脚為誌後歲此燕果復來猶帶前縷女復為詩曰昔年無偶去今春猶獨歸故人恩既重不忍復䨇飛雍州刺史西昌侯藻嘉其羙節乃起樓於門題曰貞義衛媍之閭又表於臺崔江北凉録曰昔魯人有浮海而失津者至於亶州見仲尼及七十子遊於海中與魯人一木杖令閉目乗之使歸告魯侯築城以備寇魯人出海投杖水中乃龍也具以狀告魯侯魯侯不信俄而羣燕數百銜土培城魯侯乃大城曲阜訖而齊寇至攻魯不克而還韓子曰天下無道攻擊不已甲生蟣虱燕雀處帷幄淮南子曰故先王之政四海之雲至而修封疆春分之後四海出雲蝦蟇鳴鷰雀降而逹路除道又曰大厦成而燕雀相賀呂氏春秋曰有娀氏有二佚女為九成之臺飲必皷帝令燕往視之鳴若隘隘二女為愛而爭摶之覆之玉筐少選發而視之少選者須臾之頃也燕遺二卵北飛遂不返二女作歌曰燕往飛寔始為北音北國之音冥驗記曰程徳度武昌人昔在潯陽夜見屋裏自明先有燕窠忽有小児長尺餘潔白從窠中出至床前曰却後三年當得長生之道尋闇而㓕甚祕宻之又曰沛國周氏子有瘖疾不能言有人來乞飲聞其児聲問之具以實告客曰君可還内思過周氏異其言知非常人良久云都不憶有罪過客曰試更思㓜時事入内食頃出曰記小時當床有燕窠中有三子母還哺之輙出取食屋下舉手得及指向巢中燕子亦出口承受乃取三蒺䔧各與之吞即死母還不見子悲鳴而去懼自悔責客變為道人之容曰君既自知悔罪今除矣便聞其児言語道人即不見廣雅曰􅜈𤣥鳥也說文曰燕𤣥鳥也布翅岐尾象形也齊魯之風作巢避戊己論衡曰燕鳥形也非氣也安得生人且燕之長不過五寸安能成七尺之形時或契母適欲懐脤遭吞燕卵好竒者因以為異耳揚子法言曰朱鳥䴉䴉歸其肆矣博物志曰人食燕肉不可入水為蛟龍所吞又曰燕避戊己不銜泥塗巢此非才智自然得之吳地記曰春申君都吳宫因加巧飾春申死吏照燕窟失火遂焚越絶書曰吳路西宫在長秋周一里二百二十六歩秦皇十二年守宫人照燕失火燒之蘇州􅊘墓記曰宋青州刺史郁泰𤣥字義貞好黄老性仁恕徳感禽獸初葬之日羣燕數千銜土於􅊘上􅊘髙與他有異村鄉嵗時迄今祭祀述異記曰五百歲燕生胡髯茅君内傳曰句曲山有神芝五種第三曰燕胎芝其色紫形如葵葉上有燕象如欲飛状光明洞澈食一株拜為太清仙君正一郎中崔豹古今注曰燕一名天女一名鷙鳥廣州志曰燕有三種於巖崖者為上燕湘中記曰零陵有石燕形相得雷風則飛頡頏如真燕談藪曰宋宣簡王景素鎮朱方常與劉璡同在小齋有燕集承塵飛鳴相追景素曰萬物各有性靈而獨賦於鱗羽乎若斯鳥也㳺則參於雲烟之上止則隠於林木之下飢則啄渇則飲形體無累乎物得失不闗於心一何樂乎九章筭術曰五雀六燕飛集於衡衡適平一雀一燕飛而易則雀重而燕輕白鷰宋元嘉起居注曰元年七月有白燕集於齊郡逰翔庭宇至九月乃去衆燕翼隨恒有數千陳書曰髙士馬樞目常黄能視闇中物有白燕一隻巢其庭樹馴狎欄廡時上几案春來秋去幾三十年抱朴子曰千歳燕戸向北其色白而尾屈陰乾之末服一頭得五百歳此肉芝也京房易卦曰山見白燕其君且得貴女今俗名燕為天女也續異記曰孫氏妻黄氏見一童子當前以釵擲之躍入雲去夜聞户外歌曰昔填夏家塜輦泥頭欲禿今寄黄氏居非意傷我目尋覔巢中得一白燕左目傷宦城記曰侍中紀昌睦初生有白燕一䨇出巢既表素質亦通宦途凉州記曰吕光太安三年白燕㳺酒泉郡黑燕列從王威列傳曰時有白燕來翔被令為賦赤鷰田俅子曰少昊氏之時有赤燕一雙飛集少昊氏之户遺其丹書雀春秋運斗樞紀曰揺光星散為雀禮記月令曰季秋鴻鴈來賓雀入大水化為蛤又内則曰雀晏蜩范鄭𤣥注范蜂也又三年問曰凡生天地之間血氣之屬莫不知愛其類今失䘮其匹至於燕雀猶有啁噍之頃焉然後乃能去之詩曰誰謂雀無角何以穿我屋春秋外傳曰簡子曰雀入淮而為蛤韓詩外傳曰夫鳳凰之初起也翾翾十歩之崔喔咿而笑之及其升於高一詘一信輾轉雲間藩離之雀超然自知不及逺矣易通卦騐曰立夏雀子飛史記曰趙武靈王自號主父廢長子章而傳國於公子何主父遊沙丘公子章作亂與何戰敗章走趨主父主父開受之何遂圍主父主父飢探雀􅑹而食之月餘遂餓死沙丘范􅁮後漢書曰楊由字襄侯蜀都人少習易經為文學掾時有大雀夜集庫樓上太守亷范以問由對曰此占郡内當有兵然不為害後二十餘日廣柔縣蠻反殺傷長吏宋書曰蕭思話在青州常所用銅斗覆在藥厨下忽於斗下得二死雀思話嘆曰斗覆而雙雀殞其祥乎俄而被繫北史曰後魏河南王曜五歳嘗射雀於道武前中之帝驚嘆焉又曰潘樂字相貴初生有一雀止其母左肩占者咸言富貴之徵因名相貴後以為字唐書曰開元二十二年秋八月甲申幽州長史張守珪榆闗界内虸蚄蟲食田稼蔓延入平州俄傾有羣雀來食此蟲一日食盡平州稼穯無有傷者莊子曰一雀過羿羿必得之或曰以天下為籠則雀無所逃是故殷湯以庖人籠伊尹秦穆以五羊之皮籠百里奚抱朴子曰千羊不能捍獨虎萬雀不能抵一鷹戰國策曰荘辛謂楚王曰夫雀俯啄白粒仰栖茂樹皷翅奮翼自以為無患與人無争也不知夫公子王孫左挾彈右攝丸以加其頸書栖乎茂樹夕調乎酸鹹晏子曰齊景公探雀􅑹􅑹弱故反之晏子再拜賀曰吾君有聖人之道矣君探􅑹􅑹弱故反之是長幼也禽獸若此而况人乎此聖人之道也家語曰孔子見羅者所得雀皆黄口也孔子曰黄口盡得大雀獨不得何也羅者對曰黄口從大雀者則不得大雀從黄口者可得孔子顧語弟子曰君子慎所從孔叢子曰邯鄲民以正月旦獻雀於趙王而綴以五采王大悦申叔以告子順曰王何以為也對曰正旦放之晏子曰燕雀爭處於一屋之下子母相哺呴呴焉相樂以為安矣突決上焚棟宇燕雀顔色不變是何也不知禍之相及也人君能免燕雀之智者寡矣耆舊傳曰圉人魏尚髙帝時為太史有罪繫詔獄有萬頭雀集獄棘樹上拊􅛺而鳴尚占曰雀者爵命之祥其鳴即復也我其復故官也有頃詔還故官說文曰雀依人小鳥也太𤣥經曰明珠彈雀費不當也風俗通曰中平中懐陵上有雀萬餘亂閗殺頭懸著樹上郭璞洞林曰丞相府有將雛鷄雀集其背上驅之去復來如此再三令璞占之曰此晉王即阼之漸也崔豹古今注曰雀一名佳賓言栖宿人家如賓客也王子年拾遺記曰舜𦵏蒼梧之野有鳥如丹雀自州來吐五色氣氤氲如雲名曰凴霄雀能羣飛銜土成墳異苑曰上虞孫家奚奴多諸方術向空長笑則羣雀來萃夜咒蚊蝱悉死於側又曰任城魏肇之初生有雀飛入其手占者以為封爵之祥也益部耆舊傳曰楊宣為西河太守行縣有羣雀鳴桑樹上宣謂吏曰前有覆車粟此雀相隨欲往食之行數里視之果如其言張顯析言曰萬雀不及一鳳凰衆星不如一明月沙洲記曰寒嶺去大陽川三十里有雀鼠同穴雀亦如家雀色小白鼠亦如家鼠色如黄虺無尾舞雀述異記曰周成王元年貝多國人獻舞雀成王命反之神雀漢武内傳曰西王母仙藥有昆丘神雀漢書曰宣帝元康三年詔曰前年夏有神雀集雍今春五色鳥以萬數飛屬縣翺翔而舞欲集未下其令三輔毋得以春夏摘巢探卵彈射飛鳥著為令東觀漢記曰永安十七年公卿以神雀五色翔集京師奉觴上夀令賈逵作神雀頌崔豹古今注曰孝哀帝太初三年泰畤殿有雀五色頭冠長尺餘始到時鳥環其旁隋書曰開皇十六年有神雀降於含章闥髙祖召百官賜醼酧吿以此瑞許善心於座請紙筆製神雀頌奏之髙祖甚悅曰我見神雀共皇后觀之今且召公弟入適述此善心於座始知即能成頌文不加㸃筆不停毫嘗聞此言今見其事因賜物二百疋赤雀春秋孔演圖曰鳥化為書孔子奉以吿天赤雀集書上化為黄玉刻曰孔提命作應法為制赤雀集將受命制尚書中候曰赤雀含丹書止於昌前謝承恩漢書曰琅邪董仲為不其令赤雀乳㕔事前桑上民為作歌頌呉録曰景帝永安六年赤雀見於豫章北齊書曰天保元年京師獲赤雀獻於南郊唐書曰武徳中赤雀巢於殿門宴五品以上頌者十餘人極歡而罷抱朴子曰靈寳經仙術也呉王伐石治宫室而石之中得紫文金簡之書不能讀之使使者以聞仲尼曰呉王閒居有赤雀銜書以置殿前不知其義故逺諮焉仲尼視之曰此乃靈寳方長生之法禹所服也禹将仙化封之名山石函之中今乃赤雀銜之殆天授也孫氏瑞應圖曰赤雀者王者動作應天時則銜書來遁甲曰赤雀不見則國無賢白雀不降則無後嗣赤雀言銜書陽精也白雀言銜鐵券陰精也不至則國無後嗣也尚書中候曰維天降紀太伯出狩至於咸陽天振大雷有火下化為白雀銜籙集於公車孝經援神契曰王者奉已約儉䑓榭不侈尊事耆老則白雀見典畧曰太祖出獵於咸陽大雷有火流下化為白雀衘丹書集於公車曰太伯覇世魏畧曰文帝欲授禪白雀十九見呉志曰萃覈上孫皎表曰明珠既覿白雀繼見燕書曰愍帝時有異雀素質緑頭集於端門東樹栖翔二旬而去夏四月以異雀故赦名東園為白雀凉州記曰吕光太安三年白雀巢陽川令郭敏室燉煌實録曰侯瑾字子瑜觧鳥語嘗出門見白雀與衆雀同行慨然嘆曰今天下大亂君子小人相與焉北齊書曰臨漳縣令裴鑑蒞官清苦致白雀之瑞樊遜上清徳頌十首唐書曰初髙帝於大原斬王威有白雀飛入髙祖之懷又曰武徳九年江州都督太子衛副率侯君集於納義門獻白雀一又曰開元十三年兖州奏白雀見景戌上謂宰臣曰往者吏官唯記災異将令王者懼而循徳故春秋不書祥瑞唯記有年聖人之意明矣天下諸州府不得更奏祥瑞南越志曰増城縣多白雀大如鳩素質凝映先賢傳曰周不疑曹公欲以為議郎不就時有白雀瑞不疑已作頌授紙筆立令復作操竒異之羅含傳曰含在家中時有白雀集堂宇此德行幽感所致豫章舊志曰太守孔竺臨郡三月白雀出南昌太守夏侯嵩臨郡六年白雀見黄雀禮稽命徵曰祭五岳四瀆得其宜則黄雀見春秋考異郵曰黄帝将起有黄雀赤頭立日旁帝占曰黄者土精赤者火熒雀者賞萌余當立古詩曰佳樹花不實黄雀巢其顛說苑曰呉王欲伐荆有諫者死舍人少孺子欲諫不敢懐丸操彈於後園露沾其衣如是三旦王曰子來何沾衣如此對曰園中有榆其端有蟬蟬髙居悲鳴飲露不知螳螂在其後螳螂委身曲跗欲取之而不知黄雀在其旁黄雀延頸欲啄螳螂不知臣操弓在其下臣操彈欲取黄雀不知露沾衣如此皆務貪得於前不顧於後呉王乃罷漢武故事曰拜孫卿為郎持節候神自太室東來云見一人長五丈自稱巨公牽黄犬持黄雀欲謁天子因忽不見齊諧記曰𢎞農楊寳字文淵年九歳時至華陰北見一黄雀為鴟梟所搏墜於樹下為螻螘所困寳見之愍然命左右取之歸置巾箱中養之唯食黄花百日毛羽成朝去暮還後忽與羣雀俱來哀鳴遶屋數日乃去爾夕三更寳讀書未卧有黄衣童子向寳拜曰我王母使臣昔使蓬萊不慎為鴟梟所搏君仁愛拯救實成得濟今使南海不得奉侍極以悲傷以白環四枚與寳曰令君子孫潔白且位登三事當如此環矣於此遂絶寳生震震生秉秉生賜賜生彪四世名公為東京盛族後漢書曰陳弇字仲明陳留人學尚書躬自耕種常有白雀飛來隨弇翺翔風俗記曰六月東南風俗名黄雀風時海魚化為黄雀因以為名異苑曰永康王曠家井上有一浣衣石時時見有赤氣後有異人寄居忽求買石未及受價曠子婦孫氏覩二黄雀鬭於石上疾往取之變成黄金蕭廣澤孝子傳曰王祥後母病欲得黄雀炙而思念卒難致須臾忽有數十黄雀飛入其幕臨海異物志曰黄鯊魚常以八月化為黄雀到十月入海為魚廣志曰黄雀體肥絶江夏竟陵常給獻大官青雀禮記曲禮曰前有水則載青旌鄭𤣥注載舉於旌首以驚衆青雀水鳥也劉慎詩曰翩翩野青雀栖鳳茨棘蕃朝食平田粒夕飲曲池泉猥出蔚萊中乃至丹丘巔司馬彪與山巨源詩曰翩翩野青雀受性孤且㣲昔生三河側鼔翼帝王畿糜元詩曰青雀西飛别鵠東翔大雀廣志曰安息大雀鴈身蹄似槖駞色蒼舉頭髙八九尺翅丈餘食大麥卵如瓮東觀漢記曰永嘉元年字息王獻條枝大雀曹大家集兄超為西域都護獻大雀詔大家作頌太平御覽卷九百二十二
