  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_572-1a, image: WYG0898/WYG0898-0263a.png}
body:
  text: 太平御覽巻五百七十二宋李昉等撰樂部十歌三山海經曰夏后開上三嬪于天得九辨九歌以下焉開始歌九招於天穆之野上美人於天帝得天樂下也帝俊八子是始為歌太元真經茅盈内記曰秦始皇三十年九月庫子盈曽祖於華山之中乗雲駕龍白日昇天是時其邑謠歌曰神仙得者茅初成駕龍昇天入太清時下神州戲赤城繼世而往在我盈帝若學之臘嘉平始皇聞謡歌乃有尋仙之志因改臘曰嘉平楚詞曰九歌者屈原之所作也楚南郢之邑沅湘之間其俗敬鬼神好夜鼔舞以樂諸神屈原放逐竄伏其域見俗人祭祀之禮其辭鄙陋為作九歌之曲風俗通曰張仲春武帝時人也善雅歌與李延年並時每奏新歌莫不稱善然不知休息終至于敗亡以論人之進退當有節奏又曰百里為秦相堂上作樂所賃澣婦自言知音呼之援琴撫絃而歌曰百里奚初娶我時五羊皮臨當别行烹牝鷄今適富貴忘我為因尋問之乃其妻世説曰王曇首年十四五便能歌諸妓向謝公稱歎公甚欲聞之而王既名家年少無由得聞諸妓又具向王説謝公意謝後出東府土山上作伎王時作兩丸髻著袴褶騎馬住土山下庾家墓林中作一曲歌之于時秋月正皎王因舉頭看北林卒曲便去妓白謝公曰此是王郎歌説苑曰襄城君始封之日衣翠衣帶玉􅇾劍履蹻舄立乎流水上楚大夫荘辛過而説之曰臣願把君之手其可乎襄城君忿然作色而不言荘辛遷延而稱曰君獨不聞夫鄂君方乗青翰之舟張翠羽之葢㑹鐘鼔之音越人擁檝而歌曰今夕何夕兮搴舟中流今日何日兮得與王子同舟山有木兮木有技心説君兮君不知於是鄂君乃舉綉被而覆之三輔決録曰梁鴻東出關過京師作五噫歌曰遵彼北邙兮噫顧瞻帝京兮噫宫闕崔嵬兮噫民之劬勞兮噫遼遼未央兮噫肅宗聞而悲之求鴻不得劉向别録曰漢興已來善歌者魯人虞公發聲清哀葢動梁塵受學者莫能及也石崇楚妃歌辭序曰楚妃歎莫知所由楚之賢妃能立徳著勲垂名於後者唯楚姬焉故為辭襄陽耆舊傳曰宋玉識音而善文襄王好樂而愛賦既美其才而憎其似屈原也乃謂之曰子盍從楚之俗使楚人貴子之徳乎對曰昔楚有善歌者王其聞歟始而曰下里巴人唱而和之者數萬人中而曰陽阿採菱國中唱而和之者數百人既而曰陽春白雪朝日魚離含商吐角絶節赴曲國中唱而和之者不過數人葢其曲彌髙而其和者彌寡穆天子傳曰宴西王母于瑶池之上西王母為天子歌曰白雲在天山陵自出道里悠遠山川間之将子無死尚能復來天子答曰予歸東土和洽諸夏萬民平均吾願見汝比及三年将復其野又曰天子東遊於黄澤宿於曲洛洛水之曲也使宫樂謡曰黄之池其馬歕沙音普閟反黄之澤其馬歕玉漢武内傳曰西王母降命侍女安法嬰歌𤣥雲曲曰大象雖云寥我把天地户披雲汎靈輿鯈忽適下土太真雲中唱始知風塵苦頥神三日中約精六關下上元夫人自彈雲林之璈鴻𤣥駭洞清音寥朗乃奏歩𤣥曲其辭曰黄帝陟眞道騰歩登天霞負笈造天闕借問太上家忽遇紫微圃真人列如麻流星清颷起雲葢映朱葩蘭房闢林闕碧室起瓊沙丹臺結空構曄曄生露華誰言終有終扶桑不為查王母命侍女田四非答歌其辭曰晨登太霞宫浥此玉蘭水夕入𤣥圃國採蘂移琅玕濯足匏𤓰河織女並津盤又曰吐納抱景雲味之當一飡朝發汗漫府暮宿勾陳垣莫與世人説行尸言此難列女傳曰趙簡子南擊楚津吏醉臥不能渡召欲殺之津吏女娟持檝而前曰昔父聞君東渡不測之水恐風波之起故禱江淮之神不勝巫祝杯酒飲沉醉至於此矣妾願躬易父之死簡子将渡用檝少一人娟願備員遂與渡中流奏阿激之歌歌曰昇彼阿兮西觀清水揚波兮杳㝠禱求福兮醉不醒誅将加兮妾心驚蛟龍助兮主将歸呼來棹兮行勿疑簡子大悦立為夫人文士傳曰太祖雅聞阮瑀辟之不應連見逼乃逃入山中使人焚山得瑀送至召入太祖時征長安大延賔怒瑀不與言使就伎人入列瑀善解音能鼓琴撫絃而歌曰弈奕天門開大魏應期運清葢廵九州征東西人怨士為知已死女為悦者玩恩義苟潛暢他人焉能亂為曲既㨗音聲殊妙太祖大悦淮南子曰歌採菱發陽阿鄙人聴之不若延露陵陽非歌拙也聴各異也又曰寗戚欲干齊桓公困窮無以自逹為商旅将任車任載也以商於齊暮宿於郭門之外桓公郊迎客夜開門寗戚飯牛車下望見桓公而悲擊牛角而疾商歌歌曰南山粲白石爛短褐單裳長止骭生不逢堯與舜禪終日飼牛至夜半長夜漫漫何時旦桓公聞之撫其僕之手曰異哉歌者非常人也命後車載之又曰易道良馬使人欲馳飲酒而樂使人欲歌燕丹子曰荆軻入秦不擇日而發太子與知謀者皆素衣冠送之於易水之上荆軻起為夀歌曰風蕭蕭兮易水寒壮士一去兮不復還高漸離擊筑宋意和之孟子曰有孺子歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濁我足孔子曰小子聴之哉韓子曰宋王築武宫謳癸唱行者止觀築者不倦王召賜之對曰臣師射稽之謳賢於臣召使之謳行者不止築者甚倦王推問對曰臣試度其功癸四板射􅋇八板擿其堅癸五寸射􅋇二寸列子曰林類年且百嵗拾遺穗於故畦且歌且進孔子適衛望之於野顧謂弟子曰彼叟可與言者試往訊之子貢請行逆之隴端面之而歎曰先生曽不悔乎而行歌拾穗林類行不留歌不輟逸士傳曰堯時有八九十老人擊壤而歌曰日出而作日入而息鑿井而飲耕田而食帝力何有於我哉列女傳曰魯寡陶嬰者少寡養幼孤無强昆弟紡績為産魯人聞其義将求之嬰聞作歌曰黄鵠之早寡兮七年不雙宛頸獨宿兮不與衆同夜半悲鳴兮想其故雄天命早寡兮獨宿何傷寡婦念此兮泣下數行嗚呼悲哉兮死者不可忘飛鳥尚然兮况於貞良雖有賢匹兮終不重行韋昭洞厯記曰紂無道比干知極諫必死作秣馬金闕之歌西京雜記曰髙帝令戚夫人歌出塞望歸之曲侍婢數百皆為之後宫齊唱聲入雲霄又曰賈佩蘭説在宫中時常以絃管歌舞相娯競為妖服以趨良時十月十五共入靈女廟吹笛擊筑歌上雲之曲而相連臂踏地為節歌赤鳳來也洞𡨕記曰漢武帝使董謁乗浪霞之輦以昇壇候王母王母至與宴歌奏春歸之樂謁乃聞王母歌聲而不見其形歌聲遶梁三匝乃壇上草木枝葉皆動歌之感也張華博物志曰薛譚學謳於秦青未窮青之技而辭歸青餞於郊乃撫節悲歌聲振林木響遏行雲譚乃謝求返辛氏三秦記曰隴右西關其阪紆廻不知髙幾里欲上者七日越髙處可容百餘家下處數十萬上有清水四注流下俗歌曰隴頭流水鳴聲幽噎遥望秦川心肝斷絶黄開武陵記曰有緑羅山側巖垂水懸蘿百里許得明月池碧潭鏡澈百尺見底素巖若雪松如揷翠流風叩阿有絲桐之韻土人為之歌曰仰茲山兮迢迢層石構兮嵳峩朝日麗兮陽巖落景燦兮隂阿彰壑兮生音吟籟兮相和敷芳兮縁林恬淡兮潤波樂茲潭兮安流緩爾擢兮咏歌宜都山川記曰峽中猨鳴清山谷傳其響泠泠不絶行者歌之巴東三峽猨鳴悲猨鳴三聲淚沾衣鄭湑之東陽記曰歌山在呉寕縣故老相傳云昔有乗車從下過見一女子汲乃登此山負水行歌甚善而莫知所由故名歌山劉欣期交州記曰俗好鼓琴牧竪於野澤乗牛唱遼遼歌歌曲説牛力强耕具輕重也僮僕於月下撫掌發烈謡魏大山秦州記曰隴西郡隴山其上懸吐溜於中嶺泉亭因名萬石泉泉溢漫散而下溝澮皆注有人昇此而歌紀義宣城記曰臨城縣南三十里有葢山登百歩許有舒姑泉俗傳云有舒氏女未適人與其父採薪於此女坐泉處牽挽不動遽告家比還唯見清泉湛然母云女好音樂乃作絃歌泉湧廻流雙鯉赴節盛𢎞之荆州記曰臨賀馮乗縣有歌父山傳云有老人不娶室而善歌聞者莫不灑淚年八十餘而聲逾妙及病将困命鄉里六七人與上山穴中隣人辭歸老人歌而送之聲振林木響遏行雲餘音傳林數日不絶太平御覽卷五百七十二
