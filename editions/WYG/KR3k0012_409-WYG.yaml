  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_409-1a, image: WYG0896/WYG0896-0590c.png}
body:
  text: 太平御覧卷四百九宋李昉等撰人事部五十交友四莊子曰子祀子與子梨子來四人相與語曰孰能知死生存亡之體吾與之友矣四人相視而笑莫逆於心遂相與為友又曰孔子與桞下季為友又曰桑扈孟子琴張三人相與為友又曰舜尚見帝帝館甥於貳室亦饗舜迭為賓主是天子而友匹夫也史記曰管夷吾鮑叔牙二人相友管仲曰吾始困時嘗與鮑叔賈分財利多自與鮑叔不以我為貪知我貧也吾嘗為鮑叔謀事而更窮困鮑叔不以我為愚知時有利不利也吾嘗三仕三見逐於君鮑叔不以我為不肖知我不遭時也吾嘗為君三戰三北鮑叔不以我為怯知我有老母也生我者父母知我者鮑叔也傅子曰杜畿至許昌見耿紀共語終夜尚書令荀彧家與紀屋相比夜聞畿言異之詰旦遣謂紀曰不有國士何以居位既見畿如舊相識遂進畿於朝郭子曰兾州刺史楊准二子喬字國彦髦字士彦清平有識方總角為成器准與裴頠樂廣善遣見之頠謂准喬及卿髦小减也廣謂准曰喬自及卿髦尤精出准笑曰我二兒之優劣乃裴樂優劣論者許之魯連子曰舜耕於厯山而交益陶於河濵而交禹孔叢子曰子髙遊趙平原君客之有鄒文節與子髙相友善及将還魯諸故人訣既畢文節送行三宿臨别文節流涕交頥子髙徒抗手而已分背就路其徒問之曰先生與彼之子善彼有戀戀之心悽愴流涕而先生厲聲髙楫無乃非親親之謂乎子髙曰始吾謂之子丈夫乃今知其婦人也人生則有四方之志豈鹿豕也哉而常羣聚乎又曰秦荘子死孟武伯問孔子曰古者同寮有服乎答曰聞諸老耼昔虢叔閎天太顛散宜生南宫括五者同寮比徳以賛文武及虢叔死四人為服古之達禮者行之韓詩外傳曰宋玉因其友事襄王王待玉亦無異江表傳曰吳有程普者頗以年長數凌侮周瑜瑜折節下之終不與之校普後自敬服而親重之乃告人曰與周公瑾交若飲醇醪不覺自醉袁宏山濤别傳曰陳留阮籍譙國嵇康並髙才逺識少有悟其契者濤初不識一與相遇便為神交列士傳曰六國時羊酒角哀與左伯桃為友聞楚王賢俱徃仕至梁山逢雪糧盡度不兩全遂併糧與角哀哀至楚楚用為上卿後来収葬伯桃伯桃墓逼近荆将軍陵而伯桃告云我日夜被荆将軍伐之哀乃加兵未知勝否云我向地下㸔之遂自刎死道學傳曰杜京産建武初徵之産曰莊周特釣豈為白璧所回辭不就㑹稽孔道徵亦守志産與友善又曰薛彪之間陶隠居委􅀈架石室與蒋負蒭鄰居接宇彪歡曰彼二人者可為道友何為乆滯東川於是命棹来歸便相就共住日夕講習又曰潘洪字文盛山隂人㓜辭家入山修禀上法陶貞白見而悦之遂與投分共遊諸處尋求真書又曰許邁字逺遊少與髙陽許詢並治髙節同志齊名詢能清言兼有詞藻邁愽學亦善屬文廣州先賢傳曰董正字伯和番禺人也隠士南陽車遂字徳陽聞正令名不逺萬里徑来投正正道同志合恩如仲伯數年中遂得病正為傾家救恤病篤命絶停屍於堂殯歛之禮如同生身自送䘮於南陽殷士世傳曰殷褒字元祚渤海府君之子河南鄭亷始出寒賤又未知名見而友之亷父常居肆乃就拜其父於中衆皆驚亷由是顯名位至司徒荀氏家傳曰荀羡與沛國劉真長太原王仲祖陳郡商洪源並著情契太宗時居阿衡之任虛中誘納賔友賢哲與羡等數人為布衣之好又曰荀粲簡貴不能與常人交接所交者皆一時雋傑粲卒至葬夕赴者千餘人皆同年名士也哭之盛慟路人悲之嵇康髙士傳曰逢萌條房李雲王尊同時相友世號之四子海内先賢傳曰潁川鍾皓字季明為郡功曹時陳寔為西門亭長皓深禮之與同分義皓辭公府太守問誰可代君皓曰明府必得其人西門亭長可也張隱文士傳曰襧衡與孔融作爾汝之交時衡未滿二十融已五十重衡才秀忘年也向秀别傳曰秀字子期少為同郡山濤所知又與譙國嵇康東平呂安友善其趍舎進止無不畢同造事營生業亦不異常與康偶鍜於落邑與呂安灌園於山陽収其餘利以供酒食之費或率爾相携觀原野極遊浪之勢亦不計逺近或經日乃歸復修常業郭林宗别傳曰郭泰字林宗入潁川則友李元禮至陳留則結符偉明之外黄則親韓子助過蒲亭則師仇季智也英雄記曰袁紹不妄通賓客好遊俠與張孟卓何伯求吳子卿許子逺伍德瑜等皆奔走之友不應辟命荆州記曰陸凱與范􅁮為友江南寄梅花一枝來請長安與曄并贈詩曰折梅逢驛使寄與隴頭人江南無所有聊贈一枝春虞預㑹稽典録曰盛憲字孝章初為臺即常出遊逢一童子容貌非常憲怪而問之是魯國孔融年十餘嵗憲下車執融手載以歸舎與融談實結為兄弟升堂拜母曰可賀憲毋昔有憲憲今有弟又曰卓恕字公行上虞人也與人期約雖遭暴風疾雨無不至者嘗從建業辭太傳諸葛恪恪問何當復來恕答曰某日當復親覲至是日恪亭食候恕至時賓客㑹者皆以為稽建業相去千餘里道隔江南豈得如期須臾恕至一坐盡驚又曰賀邵字興伯山隂人也為人美姿容動靜有常與人交久而敬之又曰虞倫字孝緒餘姚人也與駱瑗為彈冠之友吳録曰歩隲與衛於同年相善俱以種𤓰自給晝勤四體夜誦經傳三輔決録曰游殷為殷軫所害同郡吉伯房郭公休與殷同嵗相善為緦麻三月趙岐三輔决録曰蔣詡字元卿舎中三徑唯羊仲求仲從之遊二仲皆推㢘逃名之士華陽國志曰洛陽慶鴻慷慨好義㢘范與為刎頸之交時人稱曰前有管鮑後有慶㢘陳留志曰韋庾字宣明襄邑人也常居園中故世謂之園公與河内軹人甪里先生綺里季夏黄公為友皆修道絜已非義不踐當秦末避代入商洛山隱居自娛竹林七賢論曰嵇康字叔夜與東平呂安少相知友毎一相思輙千里命駕又曰山濤與阮籍嵇康皆一面契若金蘭濤妻韓氏嘗問濤曰吾問年可為交者唯二人而已崔豹古今注曰鄭𢎞行宦京洛未至夜宿一壖而縁而宣二切河邊也於是逢舊友四人四顧荒郊村落絶逺酤酒無處情抱不申仍各以錢投水中依水共飲盡夕酣暢皆得大醉因名沉醉釀川劉向説苑曰伯牙子鼓琴其友種子期聽之方鼓琴而志在於太山鍾子期曰善哉鼓琴巍巍乎若太山少選之間而志在流水鍾子期聽之曰善哉鼓琴湯湯乎若流水鍾子期死伯牙屏琴絶絃終身不鼓以為時無足為鼓琴者説苑曰魏文侯謂田子方曰自友子方也君臣益親百姓益附吾是以知交士之功焉世説曰山公與嵇阮契若金蘭山公妻韓氏覺二人異於常欲窺之他日二人來妻竊窺之公曰二人何如妻曰君殊不如正當以識度相勝耳公曰伊輩亦常以我度為勝又曰華歆與管寧邴原相友曾共鋤園得金寧以鋤揮之與瓦礫無異歆拾而擲之又曰荀臣伯逺㸔友人疾值胡賊攻郡臣伯不忍去賊既至謂臣伯曰大軍至一郡並空汝何男子輕大軍而敢獨止臣伯曰有友人疾不忍委之寧以我身代友人之命賊知其賢自相謂言我輩無義之人而入有義之國疾促軍而還一郡並全又曰陸機赴假還洛輜重甚盛戴淵與年少掠之淵在岸上據胡牀指揮左右皆得其宜淵既有風標鋒頴雖處鄙事神氣獨異於衆機於舩屋上遥謂之曰卿才如此亦復作刼淵便流涕投劒歸機辭屬非常機彌重之便與定交咋筆薦焉又曰夏侯稱字義權年十六與文帝為布衣之交每讌氣凌一座辯士不能答代之髙者多從之遊又曰支道林喪法慶之後精神殞喪風味轉墜常謂人曰昔匠石廢釿於野人牙生輟絃於鍾子推已外求良不虛也㝠契既逝發言莫賞中心藴結余其亡矣却後一年支遂亦隕又曰王爽與司馬太𫝊飲酒太𫝊醉呼王為小子王曰亡祖長史與簡文帝為布衣之交亡姉伉儼二宫何小子之有楊松玠談藪曰太原孫伯醫放情物外棲志丘壑與王令君髙范將軍雲為莫逆之交琴操曰三士窮者其斯革子之所作也其思革子户文子叔術子三人相與為友聞楚成王賢好士三人俱徃見之於豪嶔岩之間卒逢飄風暴雨俱伏於空栁之下衣寒粮乏度不俱活三人相親歎曰與其飢寒俱死豈若并衣粮於一哉二子以革子為賢推衣與之革子曰生者同樂死則兵之固辭二子曰吾相與猶左右手也左傷則右救右傷則左勞子不我受俱死無名何庸乎於是革子受之二子遂凍餓而死其思革子揭衣粮而去徃見楚王王知其賢用百酒嘉殽設鼓樂之革子有憂悲之色楚王乃推樽罷樂升琴而進之其思革子援琴而鼓作相與别散之志孫楚牽招碑曰初君與𤣥德少長河朔英雄河契為刎􅖪之交友有横波截流柎翼横飛之志俄而委質於太祖劉遂鼎足於蜀漢所交非常為時所忌每自酌損乎季夏之間蔡邕真定直父辟曰其接友也審辦真偽明于知人度終始而後交情不踈而貌親夏侯湛鮑叔象賛曰鮑子愔愔式昭德音綢繆陳仲二人同心厥芳猶蘭其堅如金遥遥景迹君子攸欽是祗執友箴曰人亦有言貴則易交利重泰山道輕鴻毛久而益敬見之晏平霜雪既至勁栢冬青太平御覽卷四百九
