body:
  text: 太平御覽卷七百八十六宋李昉等撰四夷部七南蠻二哀牢烏滸林邑扶南真臘參半國白頭國哀牢後漢書曰哀牢夷者其先有婦人名沙壹居牢山嘗捕魚水中觸沉木若有感因懐姙十月産子男十人後沉木化為龍出水上沙壹忽聞龍語曰若為我生子今悉何在九子見龍驚走獨小子不能去背龍而坐龍因䑛之其母鳥語謂背為九謂坐為隆因名其子曰九隆沙壹將九隆居龍山下後九隆長大諸兄以九隆能為父所䑛而黠遂共推以為王後牢山下有一夫一婦復生十女子九隆兄弟皆娶以為妻後漸相滋長種人皆刻畫其身象龍文衣皆著尾九隆死世世相繼乃分置小王往往邑居散在谿谷絶域荒外山川阻深生人以来未嘗交通中國建武二十三年其王賢栗遣兵乗箄船箄音浦佳切南下江漢撃附塞夷鹿茤音多鹿茤人溺為所擒獲於是震雷疾雨南風飄起水為逆流翻涌二百餘里箄船沉沒哀牢之衆溺水者數千人賢栗復遣六王將萬人以攻鹿茤鹿茤王與戰殺其王哀牢耆老共埋六王夜虎復出其尸而食之餘衆驚怖立引去賢栗惶恐謂其耆老曰我曹入邊塞自古有之今攻鹿茤輙被天誅中國其聖帝乎天祐助之何其明也二十七年賢栗等遂率衆人詣越嶲太守鄭鴻降求内屬光武封賢栗等為君長自是嵗来朝貢又曰永平十二年哀牢王栁貎遣子率種人内屬顯宗以其地置哀牢慱南二縣割益州郡西部都尉所領六縣合為永昌郡始通慱南山渡蘭倉水行者苦之歌曰漢德廣開不賓度􅀶南越蘭津渡蘭倉為他人又曰西部都尉廣漢鄭純為政清潔化行夷貊天子嘉之即以為永昌太守純與哀牢夷人約邑豪嵗輸布貫頭衣二領鹽一斛以為常賦夷俗安之九州記曰哀牢人皆儋耳穿鼻其渠帥自謂王者耳皆下肩三寸庶人則至肩而已土地沃美宜五糓􅅙桑知染綵文繡有蘭干細布獠言紵也織成文章如綾錦有梧桐木葉績以為布幅廣五尺潔白不受垢汚先以覆亡人然後服之有濮竹節相去二尺地出銅鐡鉛錫金銀光珠琥珀水精琉璃軻蟲蚌珠孔雀翡翠犀象猩猩貊獸唐書曰麟德元年五月於昆明之梇棟川置姚州都督府每年差兵募五百人鎮守武太后神功二年蜀州刺史張柬之上表曰姚州者古哀牢之舊國也本不與中國交通前後唐䝉開夜郎滇筰而哀牢不附至光武季年始請内屬漢置永昌郡以統理之稅其鹽布氊􅄢以利中土其國西通大秦東通交趾竒珍進貢嵗時不闕及諸葛亮五月渡瀘水收其金銀鹽布以益軍儲使張伯岐選其勁卒以増武備前代置郡其利頗深今鹽布之稅不供珍竒之貢不入而空竭府庫驅率平人受役蠻夷肝腦塗地漢得利旣多更置慱南哀牢二縣蜀人愁行者作歌今於國家無絲髮之利在百姓受終嵗之酷伏乞省罷姚州使𨽻嶲府嵗時朝覲同之畨國烏滸後漢書曰交阯西有噉人國生首子輙解而食之宜弟味㫖則以遺其君君喜而賞其婦取妻美則讓其兄今烏滸人是也南州異物志曰交廣之界民曰烏滸烏滸地名東界在廣州之南交州之北恒出道間伺候二州行旅有單迴軰者輙出撃之利得人食之不貪其財貨也地有棘厚十餘寸破以作弓長四尺餘名孤弩削竹為矢以銅為鏃長八寸以射急疾不凡用也地有毒藥以傅矢金入則撻皮視未見瘡顧盻之間肌肉便皆壊爛須􅁷而死尋問此藥云取蟲諸毒有螫者合着管中爆之既爛因取其汁百煎之如射肉在其内地則裂外則不復裂也烏滸人便以肉為殽爼又取其髑髏破之以飲酒也其伺候行人小有失軰出射之若人無救者便止以火燔燎食之若人有伴相救不容得食力不能盡儋去者便斷取手足以去尤以人手足掌蹠為珍異以飴長老出得人歸家合聚隣里懸死人中堂四面向坐撃銅鼔歌舞飲酒稍就割食之春月方田尤好出索人貪得之以祭田神也異物志曰烏滸取翠羽採珠為産又能織班布可以為帷幔族類同姓有為人所殺則居處伺殺主不問是與非遇人便殺以為肉食也裴淵廣州記曰晉興有烏滸人以鼻飲水口中進噉如故林邑國南史曰林邑國大漢日南郡象林縣古越裳界也伏波將軍馬援開南境北縣其地從廣可六百里餘城去海百二十里去日南界四百餘里北接九德郡其南界水步道二百餘里有西國夷亦稱王馬援所植二銅柱表漢界處也其國有金山石皆赤色其中生金夜則出飛狀如螢火又出瑇􅈘貝齒古貝沉木香貝者樹名其花成時如鵞毳抽其緒紡之以作布布與紵布不殊亦染成五色織為班布沉木香者土人斫斷積以嵗年朽爛而心節獨在置水中則沉故名曰沉香次浮者棧香漢末大亂功曹區連殺縣令自立為王數世其後王無嗣外甥范熊代立死子逸嗣晉成帝咸康三年逸死奴文簒立文本日南西棬縣夷帥范稚家奴常牧牛於山澗鯉魚二化而為鐡因以鑄刀成文向石呪曰若斫石破者文當王此國因斫石如斷蒭藁文心異之范稚嘗使之商賈至林邑因教林邑王作兵車器械王寵任之後乃讒言諸子各奔餘國及王死無嗣文於隣國迓王子置毒於漿中殺之遂脅國人自立又曰林邑王文敵為扶南王子當根純所殺大臣范諸農平亂自立為王諸農死子陽邁立陽邁初在孕其母夢生兒有人以席藉之其色光麗夷人謂金之精者為陽邁若中國云紫磨者因以為名宋永初二年遣使貢獻以陽邁為林邑王陽邁死子咄立慕其父復曰陽邁其國俗居處為閤名曰干闌門户皆北向書樹葉為紙男子皆以横幅古貝繞腰以下謂之干漫亦曰都漫穿耳貫小環貴者着革屣賤者跣行自林邑扶南諸國皆然也其王着法服加纓絡如佛像之飾出則乗象吹螺撃鼔罩古貝繖以古貝為幡旗國不設刑法有罪者使象蹋殺之其大姓號婆羅門嫁娶必用八月女先求男俗賤男而貴女同姓還相婚姻使婆羅門引婿見婦握手相付咒曰吉利吉利為成禮死者焚之中野謂之大塟其寡婦孤居散髮至老國王事竺乾道鑄金銀人像大十圍元嘉中陽邁侵暴日南九德諸郡交州刺史杜𢎞文建牙欲討之聞有代乃止又曰宋帝元嘉二十一年使交州刺史檀和之振武將軍宗慤伐林邑和之遣司蕭景憲為前鋒陽邁聞之懼欲輸金一萬斤銀十萬斤銅三十萬斤還所畧日南户其大臣䓯音毒僧逹諫止之乃遣大帥范扶龍戍其北累區票城攻城剋之乗勝即剋林邑陽邁父子並挺身逃奔獲其珍異皆是未名之寶又銷其金人得黄金數萬斤又曰齊永明中林邑至光范文賛遣其使貢獻梁天監中賛子天凱奉表獻白猴自此貢獻不絶北史曰林邑國延袤數千里土多香木金寶物産大抵與交趾同以磚為城蜃炭塗之皆開北户以向日或東西無定尊官有二其一曰西那婆帝其二曰蕯婆地歌其屬官三等其一曰倫多姓次歌倫致帝次乙帝伽蘭外官分為二百餘部其長曰弗羅次曰可倫如牧宰之差也王戴金花冠形如章甫衣朝霞布珠璣瓔珞足躡革履時服錦袍良家子侍衞者二百餘人皆執金裝兵有弓箭刀槊以竹為弩傅毒於矢樂有琴笛琵琶五絃頗與中國同每撃鼔以驚衆吹蠡以節戎其人深目髙鼻髮拳色黒俗皆徒跣以幅布纒身冬月衣袍婦人椎髻書樹葉紙施栁葉為席王死七日而葬有官者三日庶人一日以函盛屍鼔舞導從輿至水次積薪焚之收其餘骨王則内金甖中沉之於海有官者以銅甖沉之海口庶人以瓦送之於江男女皆截髮哭至水次盡哀而止歸則不哭每七日燃香散花復哭盡哀而止百日三年皆如之人皆奉佛文字同於天竺隋書曰林邑之先因漢末交趾女子徴側之亂内縣功曹子區連殺縣令自號為王無子其甥范熊代立死子逸立日南人奴文因亂為逸僕𨽻遂教之築宫室造器械逸甚信任使文將兵極得衆心文因間其子弟或奔或徙及逸死國無嗣文自立為王其後范佛為晉陽威將軍戴植所破宋交州刺史檀和之將兵撃之深入其境至梁陳亦通使往来其國延袤數千里髙祖既平陳乃遣使獻方物其後朝貢遂絶時天下無事羣臣言林邑多竒寶者仁壽末上遣大將劉方為驩道州行軍緫管率欽州刺史寗長真驩州刺史李暈開府秦雒步騎萬餘及犯罪者數千人擊之其王梵志率其徒乗巨象而戰方軍不利方迺多掘小坑草覆其上因以兵挑之梵志悉衆而陳方與戰偽北梵志逐之至坑所其衆多䧟轉相驚駭軍遂亂方縱兵擊之大破之頻戰􅂺敗遂棄城而走方入其都獲其廟主十八枚皆鑄金為之葢其有國十八葉矣方班師梵志復其故地遣使謝罪於是朝貢不絶唐書曰貞觀中林邑王范頭黎死率國人共立頭黎女為王諸葛地頭黎之姑子女王獨任中國不寧大臣可倫翁定乃立地為王妻之以女主其國乃定諸葛地自立後遣使可倫因地盤獻火珠狀如水精日午時正以珠承影取艾衣之火見云得之於羅刹國今之環王國主即梵志之後在日南郡西陸行一十餘日方至扶南國蕭子顯齊書曰扶南國男子截錦為横幅女為貫頭貧者以布自蔽鍜金鐶鏆銀食器伐木起屋國王居重閤以木柵為城海邊生大若葉長八尺編其葉以覆屋國王行乗象婦女亦能乗象無牢獄有訟者則以金指環若鷄子沸湯中令探又燒鎻令赤着手上捧行七步有罪者手皆燋爛無罪者不傷又令沒水直者入即沉不直者不沉又曰扶南在日南之南海西大島中廣袤三千餘里有大江水西流入海其先有女人為王名栁葉又有激國名混填夢神賜弓一張故乗舩入海填晨起於神廟樹下有兵即乗舩向扶南栁葉見船率衆欲禦之混填舉弓遥射貫舶一面通中人栁葉怖遂降混填娶以為妻惡其躶露形體乃穿疊布貫其首遂治其國子孫相𫝊南史曰扶南王混盤死國人共舉范蔓為王蔓勇徤有權畧復以兵威攻伐旁國咸服屬之自號扶南大王乃作大船窮漲海開國十餘闢地五六千里蔓死後大將范尋殺其子長而代立更繕國内起觀閣遊戯之朝旦中晡三四見客百姓以蕉蔗龜鳥為禮國無牢獄於城溝中養鰐魚門外圈猛獸有罪者輙以餧猛獸及鰐魚魚獸不食為無罪三日乃放之鰐魚大者長三丈餘狀如鼉有四足喙長六七尺兩邊有齒利如刀劒常食魚遇得麞鹿及人亦噉之蒼梧以南及外國皆有之又曰扶南王憍陳如本天竺婆羅門也有神語曰應王扶南憍陳如心恱南至盤盤扶南人聞之舉國欣迎戴而立焉復改制度用天竺法憍陳如死後王持棃陀䟦摩宋文帝元嘉中三奉表獻方物齊永明中王憍陳如闍邪䟦摩遣使送珊瑚佛象并獻方物詔授安南將軍扶南王其國人皆醜黒拳髪所居不穿井數十家共一池引汲之俗事天神以銅為像二面者四手四面者八手手各有所持或小兒或鳥獸或日月其王出入乗象嬪侍亦然王坐則偏踞翹膝垂左膝至地以白疊敷前設金盆香爐於其上國俗居喪則剃髪除鬚死者有四葬水葬則投之江流火葬則焚為灰燼土葬則瘞埋之鳥葬則棄之中野人性貪恡無禮義男女恣其奔隨隋書曰扶南國王遣使貢獻其王姓古龍諸國多姓古龍訊耆老言崑崙無姓氏乃崐崙之訛抱朴子曰扶南國出金剛可以刻玉狀似紫石英其所生在百丈水底盤石上如鍾乳人沒水取之竟日乃出以鐡搥之不傷鐡反自損以羖羊角扣之㴶然氷泮外國𫝊曰扶南人若戸中亡器物者即以米一升詣神廟乞神見盗者以米着神足下明日取米呼戸中奴婢分令囓之盜者口中血出米完不碎不盗者入口即敗從日南至徼外悉爾又曰扶南之東漲海中有大火洲洲中有樹得春雨時皮正黒得火燃樹皮正白紡績以作手巾或作燈炷用之不盡又曰扶南國人最大居舍雕文刻鏤好布施多禽獸王好獵皆乗象一去月餘日南州異物志曰扶南國在林邑西三千餘里立為王諸屬皆有官長及王之左右大臣皆號為崐崙真臘隋書曰真臘國在林邑西南本扶南之屬國也去日南郡舟行六十日而至南接車渠國西有朱江國其王姓刹利氏名質多斯􅄼自其祖漸已强盛至質多斯􅄼遂兼扶南而有之死子伊奢􅄼先代立伊奢􅄼城郭下二萬餘家城中有一大堂是王聽政之所其王三日一朝坐五香七寶牀上施寶帳以文木為竿象牙金鈿為壁狀如小屋懸金光熖有同於赤土前有金香爐二人侍側王着朝霞古貝瞞絡腰服下垂至脛頭戴金寶花冠披真珠瓔珞足履革屣耳懸金璫常服白疊以象牙為屩有五大臣一曰孤落支二曰髙相憑三曰婆何多陵四曰舍摩陵五曰髯多婁及諸小臣朝於王者輙於階下三稽首王喚上階則跪以兩手抱􅈩遶王環坐議政事訖跪伏而去其國與參半朱江二國和親數與陀桓林邑二國戰爭其人行止皆持兵仗若有征伐因而用之其俗非王正妻子不得為嗣王初立之日所有兄弟並刑殘之或去一指或劓其鼻别處供給不得仕進人形小而色黒婦人亦有白者悉拳髮垂耳性氣捷勁居處器物頗類赤土以右手為凈左手為穢每旦澡洗以楊枝凈齒讀誦經咒又澡洗乃食食罷還用楊枝凈齒飲食多蘇酪沙糖粇粟米餅欲食之時先取雜肉􅅅與餅相和手擩而食男婚禮畢即與父母分財别居父母死小兒未婚者以餘財與之若婚畢財物入官其喪葬男女皆七日不食剔髪而哭僧尼道士親友皆来聚㑹音樂送之以五香木燒之取灰以金銀瓶盛送於大水内貧者或用瓦而以彩色畫之亦有不焚送屍山中任野獸食之其國北多山阜南有水澤地氣尤熱無霜雪饒瘴癘毒蠚土冝粱稻與日南九真相類異者有娑那婆樹無花葉似柿實似冬瓜菴羅樹花葉似􅀥實似李毗野樹花似木瓜葉似杏實似楮婆田羅樹花葉實並似􅀥而小異歌畢佗樹花似李葉似榆而厚大實似李其大如升九真海中有魚名建同四足無鱗其鼻如象吸水上噴髙五六十尺有浮胡魚其形如䱇觜如鸚鵡有八足多大魚半身出水望之如山每五六月中毒熱氣流行即以白猪白羊於城西門外祠之不然五糓不登六畜多死近都有陵伽鉢婆山上有神祠每以二千人守衞城東有神名婆多利祭用人肉每年殺人以夜祀禱大業十三年遣使貢獻帝厚禮之其後亦絶唐書曰真臘國貞觀二年與林邑國俱來朝獻太宗嘉其厯逺疲勞賜賚甚厚南方人謂真臘國為吉蔑國自神龍以後真臘分為二半以南近海多陂澤處謂之水真臘半以北多山阜處謂之陸真臘亦謂之文單國髙宗則天𤣥宗朝並遣使朝貢水真臘國其境東西南北約皆八百里東至奔陀浪洲西至墮羅鉢底國南至小海北即陸真臘其王所居城號婆羅提㧞國之東界有小城皆謂之國其國多象元和八年遣李摩郍等来朝參半國唐書曰武德中參半國遣使朝貢其國在真臘西南千餘里城臨大海土地下濕風俗物産並與林邑國同白頭國唐書曰貞觀中扶南来獻白頭國二人於洛陽云其國在扶南之西參半之西南男女皆至素首身又凝白居山洞之中四面巖險故人莫至與參半國相接太平御覽卷七百八十六
