body:
  text: 太平御覽卷八百十一宋李昉等撰珎寳部十金下國語曰范蠡乘輕舟以浮於五湖莫知其所終王令工以良金冩范蠡之狀而朝禮之穆天子𫝊曰觀天子寳黄金之膏金膏亦猶玉膏皆其精液也春秋後語曰尉􅀈來說王曰以秦之強諸侯譬如郡縣其君臣俱怨若或合從酬而出不意醮謂祭盟誓之義也皆智伯夫差湣王所以亡也願大王無愛財物賂其豪臣以亂其謀秦不過亡三十萬金則諸侯可盡王大喜之又曰邯鄲既存平原君欲封魯仲連辭謝者三不肯受平原君乃置酒酒酣起前以金為仲連夀仲連笑曰所貴於天下之士者為人排患釋難觧紛而無取也則有取者乃商賈之人仲連不忍為也遂辭平原君而去終身不復見又曰邯鄲之北有蘇人侯蘇秦往説之蘇人侯送以黄金百鎰其家丞見曰君侯之與客無故舊而送之百金其說可得聞耶蘇人侯曰客天下辯士立談之間每奪我地而復歸之吾地雖小豈其百金韓詩外𫝊曰田子為相三年歸休以金百鎰奉其母母曰不義之物不入於舘為人臣不忠是為人子不孝子其去田子慚愧走出自歸於王還金請退就獄王赦田子罪以金賜其母又曰楚襄王遣使者持金千斤白璧百䨇聘莊子欲以為相莊子固辭又曰延陵季子遊於齊見遺金於路呼牧者取之牧者曰何子居之髙而視之下也類郡子而言野也有君不臣有友不友當暑不衣裳吾豈取金者乎延陵季子知其賢者請問姓字牧者曰子乃皮相之士也何足語姓字哉遂去周易叅同契曰黄土金之父流水珠之母英雄記曰董卓塢有金二三萬斤漢武故事曰帝年數嵗長公主遍指侍者與作婦好否皆不用後指陳后帝曰若得阿嬌作婦當以金屋貯之漢武内𫝊曰帝受西王母眞行經盛以黄金之几又曰西王母有九丹金液金漿漢東園秘記曰亡人以黄金塞九竅則尸終不朽陸賈新語曰舜藏金於嶃岩之山捐珠玉於五湖之淵杜媱邪絶覬媚之精也東方朔神異經曰北方中有二金闕髙百丈金銀盤圍五千丈又曰西方白官之外有金山上有人長五丈餘名曰金犀守之蜀王本記曰秦王以金一笥遺蜀王蜀以禮物荅而盡化為土秦王怒群臣拜賀曰土者地也秦當得蜀矣說苑曰申鳴者以孝聞於是王授之相辭不受其父曰使汝有禄於國立義於庭吾無憂也申鳴從父命為楚相及白公亂申鳴曰今不得為孝子矣遂援鼓殺白公其父亦死王賜金百斤申鳴曰何靣目見天下遂自殺新序曰齊桓公見麥丘邑人問之曰年幾何對曰八十矣曰以子之夀祝寡人乎曰使主君甚夀金玉是賤以人為寳又曰公孫敖問伯象先生曰今先生收天下之術博觀四方之日乆矣未能禆世上之治明君臣之義是則未有異於府庫之藏金玉筐篋之囊簡書也又曰郭隗語燕王曰古之人君有以千金求千里馬馬已死買骨五百金不能朞年千里馬至者三論衡曰盧江民小男曰陳爵陳挺相與浴於湖崖有酒樽色正黄沒水中爵以為銅渉水取之重不能舉挺往助之樽更為沉盤動入深淵中挺爵留顧見如錢等正黄數百千枚即共掇􅀈各得滿手歸于其家乃黄金也論衡曰衆口鑠金者五行二曰火五事二曰言言與火宜故云鑠金風俗通曰衆口鑠金俗說有美金于此衆人咸共詆訿言其不純賣金者欲其售因取鍜燒以見真此為衆口鑠金又曰漢書說王陽好車馬衣服及遷徙所載不過囊衣俗代王陽能作黄金語曰金不可作世不可度王陽居食雖為絜白車馬衣服亦能幾何何足推之乃𫝊俗語白虎通曰金在西方西方者隂始起萬物禁金之為言禁也西京雜記曰韓嫣好彈常以金為丸一日所失者十餘長安為之語曰若饑寒逐金丸京師兒童每聞嫣出輙隨之藥說稽熠嘉曰君臣之義生於金葛洪神仙𫝊曰容成公服三黄得仙所謂雄黄雌黄黄金搜神記曰魏郡張臣賣宅與陳應應舉家疾賣何文文獨特大刀暮入北堂梁上一更中有人丈餘髙冠赤幘呼曰細腰應諾何以有人氣答曰無文問曰髙冠者誰答曰金也在西屋壁下文掘得金三百斤又曰漢文㣲行懐金過魯少年少年柱金杖出應門王子年拾遺記曰少昊將金鳴於山張涌於地或如龜蛇之類乍似人鬼之形又曰方丈有池泥色金而味辛以泥為噐可作丹矣百煉可為金矣金色青照鬼魅猶如照面不得藏形也異苑曰汝南殷陶市同縣張南宅掘地得錢百萬金一斤即以還南南曰君至徳感寳為君出終不肯受陶送付縣又曰新野黄舒義熈中耕田得一船金卜者云三年勿用長守富也舒不能從遂成土壤又曰永康王曠井上有一洗浣石時見赤氣後有胡人寄宿忽求買之曠恠所以未及度錢子婦孫氏覩二黄鳥鬬於浣石上疾往拖取變成黄金胡人不知索市逾急既得撞破石内止有二鳥處又曰即墨有古塜發之有金牛塞埏門不動犯之則大禍述異記曰南康雩都縣沿江出去縣三里名夢口穴狀如石室舊𫝊常有神雞色如好金出此穴中􅁬翼回翔長鳴響徹見人輙飛入穴因號此石為雞石昔有人耕此山則望見雞出遊戲有一長人操彈彈之雞遥見便飛入穴彈丸正着穴上丸徑六尺許下垂蔽穴猶有門隙不復容人又有人乘船從下流還縣未至此崖數里一人遍身黄衣擔兩籠黄紙求寄載因載之黄衣人乞食船主與之食訖船適至崖下船中乞𤓰此人不與仍唾盤上徑下崖直入石中船主初甚忿之見其入石始知神異取食器視之見盤上唾悉是黄金又曰先儒說禹時天下雨金三日古詩曰安得天雨金使金賤如土周王時咸陽雨金今咸陽有雨金原秦二世元年官中雨金既而化為石漢惠帝二年官中雨黄金里錫又翁仲儒家貧力作居渭川一旦天雨金十斛於其家由是與王侯爭富今秦中有兩翁世世富焉録異𫝊曰隗炤者汝南隂鴻夀亭民善於易臨終書板授其妻曰吾死當大荒窮雖爾慎莫賣宅到後五年春當有詔使頓來此亭姓龔此人負吾金卿以此板往責之亡後果大困欲賣宅者數矣憶夫言輙止到後期日有龔使者果至妻遂齎板往責使者使者執板不知所言曰我生平不踐此處何縁爾也沈吟良久謂曰賢夫何能妻曰夫善易而未曾為人卜使者曰可矣乃顧命侍者取蓍而筮之卦成謂炤妻曰吾不相負金賢夫自有金乃知亡後暫窮故藏金以待太平所以不告婦兒者恐金盡而困無已也知吾善易故書板以寄意耳金有五百斤盛以青缾覆以銅柈埋在堂屋東頭去壁一丈入地九尺妻還掘之皆如卜之言異物志曰狼䐠民與漢人交關嘗夜市以鼻齅金知其好惡幽明録曰淮牛渚津水深無可筭津人見一金牛形甚瑰壯以金繅絆也又曰巴丘縣百金崗以上二十里名黄金潭上有瀬亦名黄金瀬古有人釣於此潭獲一金鏁引之遂滿一船而有金牛出聲貌莾壯釣人被駭牛因奮躍還潭又云晉南頓王平新營一宅始移夣見一人云平與令黄欲以一器金賂暴勝之為暴所戮埋金在吾土見鎮迮甚若君復築室無復出入涯平明且即鑿壁下入五尺果得金又曰譙縣城東因城為臺方二十丈髙八尺一曰古之冢也魏武帝即築以為臺東面墻崩金玉流出取者多死因築復之又曰海中有金臺臺内有金丸𤣥中紀金之精為牛又曰長安有張氏者晝獨處室有鳩自入止于牀張惡之披懐祝曰鳩爾來為我禍耶止承塵為福耶入我懐鳩翻飛入懐以手探之不知所在而得一金帶鈎焉遂寳之自是之後子孫昌盛世說曰劉􅖙譛陳矯明帝以金五餅授矯曰君明朕心顧君妻子未知也又曰管寕華歆共園中鋤菜見地一金管揮鋤與瓦石不異華捉而擲去曹操别𫝊曰操引兵入峴發梁孝王塜破棺收金寳數萬斤天子聞之立泣益都耆舊𫝊曰王忳字少林詣京師於客舍見諸生病甚因謂忳曰腰下有金十斤願以相與乞收藏骸骨未問姓名而絶忳賣金一斤以給絮棺九斤置生腰下魯國先賢志曰叔孫通草創朝儀拜通為奉常賜金五百斤通悉以金賜諸生諸生乃喜曰叔孫生聖人也知當世務廬江七賢𫝊曰陳翼字子初到覧鄉見馬旁有一人病呼曰我長安魏少公聞卿廬江樂來遊今病不能前翼迎歸養之有金十餅素二十疋既死翼賣素買棺衣衾以金置棺下騎馬出入後其兄長公見馬詰之吏捕翼翼共言棺下得金長公叩頭謝以金十餅投其門翼送長安還之邴原别𫝊曰邴原字根矩以䘮亂方熾遂徃遼東時同郡劉舉亦在遼啚奪太守公孫度度掩捕其家而舉得免窘逼歸原東萊太守太史子義素有義原以舉付之舉臨去其手所仗劔金三餅與原原受金辭劔還謂度曰將軍平日與舉無讎而欲殺之者但恐其為蜂蠆耳今舉已去若更拘閑其家毒螫必滋甚矣度即出舉家原以金還之茅君内𫝊曰漢帝及王莾獻金鍾之属金埋在小茅山上又曰取鉛十斤着鐡器猛火燒之三沸投九轉之華一銖於中攪之須臾立成黄金九斤吳時外國𫝊曰斯調國作金牀扶南𫝊曰昆騫國食器皆以金為之金如此問之石路中山邊無有限量吳越春秋曰伍子胥伐楚還溧陽瀬水上欲報自殺婦人百金不知其家投金瀬水中而去須臾有一姥哭而來自言是女母取金而去蜀李書武帝諸將進金銀或以得官者楊褒諫曰陛下為天下主何得以官賣金耶帝謝之列女𫝊曰樂羊子出學其妻貞義截髪供其費後羊子得遺金一餅以與妻貞義曰君子不以利汚行羊子慚而去之又曰廣漢女婦者汝敦妻也敦以所受田地奴婢三百餘萬悉譲與兄裁留菜園地數十畆起舍耕作土中得金一窔敦以示妻妻曰本言譲先祖所有此獨非其有耶敦曰固吾意也俱擔金送與兄嫂郡國誌曰蘇秦宅在洛陽利仁里後魏髙顯業每夜見赤光於光處掘得金百斤銘曰蘇家金業為之造寺秦州記曰金城郡應邵云初築城得金故曰金城臨海記曰白石山去縣邑三十里望之如雪上有湖相傳云金鵝之所集鄭緝之東陳記曰金鈍山之康縣南三里故老𫝊云有人得金鈍於此故名山劉欣期交州記曰趙嫗者九貞人乳長數尺入山聚盗遂攻郡常着金摛提屐又曰金有華出珠崖謂金華采者也雪山在新昌南人曾於山中得金塊如升迷失道還置本處乃得出錢唐記曰縣東南有峴山長老相𫝊採金於此羅浮山記曰州南十里有牛潭漁人見金牛自水出義熈中縣民張安躡得金鏁大如指遂數十尋尋之不已俄有物從出引之掘不能竟以刀斷得數尺安遂致富其後義興周雲甫掩出牛掣斷其鏁得二丈遂以財雄林邑記曰從林邑往金山三十日至逺望金山嵯峨而赤城照燿似天澗壑谷中亦有生金形如蟲豸細者似蒼蝇大者若蜂蟬夜行燿光如螢火地鏡圖曰黄金之氣赤黄千萬斤以上光如大鏡盤白澤圖曰黄金之精名石􅀈狀如豚居人家使人不宜妻白䑕以昏時見於邱陵之間視所出入中有金關令内𫝊曰老子與尹喜登崑崙上金臺玉樓七寳宫殿晝夜光明乃天帝四王之所遊處有珠玉七寳之狀宋躬孝子𫝊曰郭巨河内温人也妻生男謀曰養子則不得營業妨供養當殺而埋焉鍤入地有黄金一釡上有鐡劵曰黄金一釡賜孝子郭巨揚雄集曰單于上書願朝哀帝以問公卿公卿以虛費府帑可且勿許單于使辭去未發雄上書諫天子召還匈奴使者更報單于書而許之賜雄黄金十斤孔融聖人優劣論曰金之優者名曰紫磨猶人之有聖也陳思王辯道論曰甘陵始其語余曰本師姓韓字世雅始常與思南流作金前後數四投數萬斤金於海嶺表異録曰五嶺内富州濵州澄州江溪間皆産金側近居人以陶金為業自旦及暮有不獲一星者鄭玘傷陶者詩云披沙辛苦見傷懐往往分毛望亦乖力盡半年深水裏難全為一鳯凰釵就中澄州者最為良金余頃年使于上國親友不欲書其姓字附澄州金二十兩與宫灼權臣余訝其單鮮有人曰金雖少貴其夜明有異於常金耳遂留宿驗之信然也太平御覽卷八百十一
