body:
  text: 太平御覽卷二百二宋李昉等撰封建部五婦人封夫人郡君縣君鄉君錫命附婦人封左𫝊成公上曰晉敗齊師齊侯遂自徐關入見保者曰勉之齊師敗矣避女子使避君也齊侯單還婦人不知避也女子曰君免乎曰免矣曰鋭司徒免乎曰免矣曰苟君與吾父免矣可若何乃奔齊侯以為有禮既而問之壁司徒之妻也壁司徒主壘壁予之石窌石窌邑名濟北盧縣東有地名石窌音溜陳留風俗𫝊曰高祖與項氏戰厄於延鄉有翟母者免其難故以延鄉為封邱縣以封翟母焉夫人後漢書曰崔母師氏通五經學百家之言王莽寵以殊禮賜號義成夫人金印紫綬文軒丹轂於新代唐書曰魏衡妻王氏梓州郪人也武徳初薛仁杲舊将房企地侵掠梁部因獲王氏逼而妻之後企地漸强盛衡謀以城應賊企地領衆将趨梁州未至數十里飲酒醉臥王氏取其佩刀斬之攜其首入城賊衆乃散高祖大悦封為崇義夫人又曰咸亨中燕山道總管右領軍大将軍李謹行大破高麗叛徒於葫蘆河之西俘獲數千人自是平壤餘衆走投新羅時謹行妻劉氏留在代奴城高麗引䍪羯攻之劉氏擐甲率衆守城乆之賊乃退上嘉其功特封為燕郡夫人又曰鄒保英妻奚氏不知何許人也萬嵗通天年中契丹賊李盡来寇平州保英時任刺史領兵討擊既而城孤援寡勢将欲陷奚氏乃率家僮及城内女丁相助固守賊退所司以聞優制封為誠節夫人又曰王君㲋上常於廣達樓引君㲋及妻夏氏設宴賜以帛夏氏亦有戰功故特賞之封為武威郡夫人五代史晉史曰鎮州節度使安重榮妻彭城郡夫人劉氏封魯國夫人南陽郡夫人韓氏封陳國夫人重榮立二嫡妻非禮也朝廷並命之亦非制也郡君漢書曰武帝尊王太后母臧兒為平原君後漢書曰𢎞農人韋宣素性佞邪欲取婿於梁兾乃上言大将軍有周公之功今既封諸子則其妻宜為邑君詔遂封兾妻孫夀為襄城君兼食陽翟租嵗入五千萬加賜赤紱比長公主長公主儀服同藩王又曰安思閻皇后追尊后母宗為滎陽君晉中興書曰肅祖太妃豫章恭惠君荀氏初以微入宫生肅祖中宗以母賤命虞妃母養肅祖而出嫁荀為馬氏妻太寧元年馬氏無疾而卒肅祖迎母還宫養之稱建安君追贈豫章君諡曰恭惠後漢書曰景明初世追舅氏封外祖母盖氏為清河郡主又曰靈太后臨朝以元义妹封义妻新平郡封後遷馮翊君縣君漢書曰王太后微時所謂金王孫生女俗在民間盖諱之也武帝始立韓嫣白之帝曰何為不蚤言乃車駕自往迎之其家在長陵小市直至其門使左右入求之家人驚恐女逃匿牀下扶持出拜帝下車泣曰大姊何藏之深也載之長樂宫與俱謁太后太后垂涕女亦悲泣帝捧酒前為夀錢千萬奴婢三百人公田百頃甲第以賜姊太后謝曰為帝費因賜湯沐邑號修成君又曰宣帝賜外祖母號為博平君以博平蠡吾兩縣户萬一千為湯沐邑范曄後漢書曰靈思何皇后追封父真為車騎将軍舞陽宣徳侯封后母為舞陽君魏志曰文徳郭皇后安平廣宗人也母董為郡君改封父永為灌津敬侯世婦董為常陽君又曰青龍二年春追謚后兄儼曰安城郭穆侯封儼世婦劉為東鄉君又追封逸世婦張為安嘉君又曰明元郭皇后西平人也齊王即位尊皇后封太后母杜氏為郃陽君又曰明悼毛皇后河内人黃初中以選入東宫明帝時為平原王進御有寵出入與同輿輦追封后母夏氏為野王君又曰太始三年詔曰漢武追崇靈文之號武宣有平原博平之封咸所以奉尊尊之敬廣親親之恩宜追封故衞将軍景侯夫人羊氏為平陽君也臧榮緒晉書曰武悼楊皇后廢在金墉城與母高都君龎氏共止高都君臨刑后把持號叫不食而崩晉中興書曰穆皇后庾氏字文君左将軍琛第三女贈琛為車騎将軍母丘氏為安陽縣君從荀氏永宣縣君又曰簡文順皇后王氏字蘭始驃騎将軍述之再從妹追贈前夫人成氏東豐縣君後夫人成氏東興君沈約宋書曰孝穆趙皇后諱安崇下邳僮人也父裔永初二年有司奏裔命婦孫可建昌縣君又曰孝穆蕭皇后名文夀蘭陵人父卓初與裔俱贈金紫光禄大夫妻下邳趙氏封吴郡夀昌縣君唐書曰古元應妻高氏固守飛狐縣城卒免為突厥所陥下詔曰頃属黙啜攻城咸憂陷没丈夫固守猶不䏻堅婦人懐忠不憚流矢由兹感激危城重安如不褒昇何以奨勸古元應妻可封為徇忠縣君又曰衛方厚妻程氏方厚太和中任邕州都督府録事㕘軍為招討使董昌齡誣枉殺之方厚妻程氏力不能免乃抑其哀如非寃者昌齡雅不疑慮聽其歸喪程氏故得以徒行詣闕截耳於右銀臺門告夫被殺之寃御史臺鞫之得實諫官亦有章䟽故昌齡再受讁逐程氏開成元年降勅曰乃者吏為不道虐殺爾夫詣闕申寃徒行萬里﨑嶇偪畏濵於危亡血誠既昭幽憤果雪雖古之烈婦何以加焉如聞孤孀無依晝哭待盡俾榮禄養仍錫疏封可武昌縣君英雄記曰董卓孫女名白時尚未笄封為渭陽君於郿城起壇從廣二丈餘高五六尺使白乘金華青盖車都尉中郎将刺史二千石在郿者各令乘軒簮筆為白導從之壇上使兄子橫為使者授印綬也潘岳宜城宣君誄曰行成于巳名生於人考終定諡實曰宣君祝宗蒞事卿相奉引輕車整駕介士列陣鸞輅依容輼車升櫬鄉君魏志曰卞隆以后父封睢陽鄉侯隆妻王氏為顯陽君追封隆前妻劉氏為仁慎鄉君后親母故也又曰甄儼孫女為齊王皇后后父已沒封后母為廣陽鄉君晉書曰立皇后楊氏母太原龎氏為安昌鄉君追外曽祖母故司徒王郎夫人夏氏為滎陽鄉君晉中興書曰哀靖皇后王氏字穆之司徒左長史濛之女也初為瑯琊王妃哀帝即位拜為皇后追贈父濛金紫光禄大夫封晉安縣侯母愛氏為安國鄉君也又曰元敬皇后虞氏字孟母濟陽外黃人也祖夀撫軍大将軍掾父豫太傅叅軍中宗之為瑯琊王納后為妃豫妻王氏為邢陽縣君從母散騎常侍新野王罕妻為平陽鄉君又曰康獻皇后褚氏太傅褒之女封母謝氏為潯陽縣君又曰成帝皇后杜氏陵陽京兆人也母裴氏為廣徳君安鄉君賜錢百萬布二百疋又曰穆章皇后何氏字法倪司空充之女追贈父充光禄大夫封晉興侯母孔氏長樂鄉君又曰王藴以后父徴拜金紫光禄大夫封建昌侯母劉氏平樂君沈約宋書曰武敬臧皇后諱受親東莞人也父雋追贈金紫光禄大夫妻高密叔孫氏贈永平鄉君唐書曰獨孤武都謀叛王世克歸國事覺誅死武都子師仁年始三嵗世􅂶以其年幼不殺使禁長之乳母王氏號蘭英請髠鉗求入保養世􅂶許之蘭英撫育提攜偹盡筋力時喪亂年飢人多餓死蘭英扶路乞丐捃拾遇有所得便歸與師仁蘭英唯啖土飲水而已後許採拾乃竊師仁歸於京師高祖嘉其義下詔曰師仁乳母王氏慈惠有聞撫鞠無倦提攜遺幼背逆歸朝宜有隆褒以賜其號可封永夀鄉君錫命書序曰平王錫晉文侯秬鬯圭瓉作文侯之命也左傳曰王命尹氏䇿命晉文公為侯伯賜之大路之服戎路之服彤弓一彤矢百玈弓矢千秬鬯一卣虎賁三百人左𫝊曰文元年天王使榮叔来錫公命杜預注曰諸侯即位天子錫以命珪合瑞為信若僖二十八年王賜晉侯命亦其比也又曰襄十四年王使劉定公賜齊靈公命曰昔伯舅太公右我先王股肱周室師保萬民世胙太師以表東海王室之不壊繄伯舅是頼余今命汝環環齊靈公名也兹帥舅氏之典纂乃祖考無忝乃舊勲敬之哉無廢朕命纂述也因婚而加褒顯𫝊言王室不能命有功國語曰襄王使召伯過及内史過賜晉惠公命吕甥郤芮相晉侯不敬晉侯執玉卑拜不稽首内史過歸以告王曰晉不亡其君必無後且吕郤将不免王曰何故對曰夏書有之衆非元后何戴后非衆無以守邑邑國在湯誓曰余一人有罪無以爾萬方萬方有罪在予一人在予一人乃我教道之過在盤庚曰國之臧則維汝衆今商書盤庚是也臧善國俗之善則維汝衆歸功於下也國之不臧則惟余一人有逸罰逸過罰罪也國俗之不善則惟一人是我有過其罪當在我也如是則長衆使人不可不慎也人之所急在於大事大事戎祀也先王知大事必以衆濟故祓除其心以和惠人被拂也考中度衷以蒞之蒞臨考中省已之中心以度人人之心恕以臨之也昭明物則以訓之制義庶孚以行之義宜庶衆孚信當制立事宜為衆所信也祓除其心精也精潔考中度衷忠也忠恕也昭明物則禮也制義庶孚信也然則長衆使人之道非精不和非忠不立非禮不順非信不行今晉侯即位而背内外之賂背外不與秦也背内不與里丕田也虐其處者棄其信虐其處者殺里丕之黨不敬王命棄其禮施其所惡棄其忠已所不欲勿施於人所惡於下無以事上今晉侯皆施之於人故曰棄其忠也以惡實心棄其精實滿四者皆棄則逺不至而近不和矣四者精忠禮信将何以守國古者先王既有天下又崇立上帝明神而敬事之於是乎有朝日月以敬人事君禮天子以春分朝日以秋分夕月諸侯春秋受職于王以臨其人大夫士日恪位著以儆其官中庭之左右曰位門屏之間曰著也庶人工商各守其業以共其上猶恐有墜失也故為車服旗章以旌之為班爵貴賤以别之為令聞嘉譽以聲之猶有散遷懈慢而著在刑辟流在裔土於是乎有蠻夷之國有斧鉞刀墨之人而況可以􅁋縱其身乎晉侯非嗣也而得其位嗣適嗣也亹亹怵惕保位戒懼猶曰未也若将廣其心而逺其隣陵其人而卑其上将何以固守夫執玉卑替其摯拜不稽首誣其王摯替無鎮誣王無人夫天事恒象任重享大者必速及故晉侯誣王人亦将誣之欲替其鎮人亦将替之大臣享其禄不諫而阿之亦必及焉襄王三年而立晉侯八年而隕於韓十六年而晉人殺懐公無胄秦人殺子金子公子金吕甥子公郤芮之子又曰襄王使太宰文公及内史興錫晉文公命上卿逆於境晉侯郊勞舘諸宗廟饋九牢設庭燎及期命於武宫設桑主布几筵太宰蒞之晉侯端委以入太宰以王命冕服内史賛之三命而後即冕服既畢賔饗贈餞如公命侯伯之禮而加之以宴好内史興歸以告王曰晉不可不善也其君必霸逆王命敬奉禮義成敬王命順之道成禮義徳之則以徳以道諸侯必歸之且禮所以觀忠信仁義忠所以分也仁所以行也信所以守也義所以節也忠分則均仁行則報信守則固義節則度分均無怨行報無匱守固不踰節度不攜若人不怨而財不匱令不踰而動不攜其何事不濟中䏻應外忠也施正服義仁也守法不淫信也行禮不疚義也臣入晉境四者不失臣故曰晉侯其能禮矣王其善之樹於有禮艾人必豐王從之使於晉者道相逮及惠后之難王出在鄭惠后惠王之后襄王繼母陳媯有寵生子帶将立子帶未及而卒子帶奔齊王復之又通於襄王之后隗氏王廢隗氏周大夫頽叔桃子奉子帶以翟師伐周王出適鄭居于汜事在魯僖二十四年晉侯納之襄王十六年立晉文公二十一年以諸侯朝於衡雍且獻楚捷遂為踐土之盟於是乎始霸范曄後漢書曰董昭等欲共進曹操爵國公加九錫偹物宻以訪荀彧彧曰曹公本興義兵以匡振漢朝雖勲庸崇著猶稟忠貞之節君子愛人以徳不宜如此事遂寝操心不能平㑹南征孫權彧勞軍于譙表留彧晉中興書曰烈宗冲幼桓溫威振内外人情蹲沓半生同異謝安與王坦之盡忠匡翼溫諷朝廷欲為九錫使驍騎将軍袁宏具草時溫已病篤宏以呈安安視輙云不好更改之使彌厯旬日至于溫薨錫命遂寝太平御覽卷二百二
