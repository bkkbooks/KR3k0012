body:
  text: 太平御覽卷一百二十三宋李昉等撰偏霸部七後秦姚弋仲姚襄姚萇姚興姚泓蜀李特李流李雄李期李壽李勢後秦姚弋仲崔鴻十六國春秋後秦録曰姚弋仲南安赤亭羌人也其先有虞氏之苗裔昔夏禹封舜少子于西戎世為羌長其後燒當雄于洮罕之間當七世孫填虞虞九世孫遷郍率種人内附漢朝嘉之假冠軍将軍西羌校尉歸順王處之于赤亭郍𤣥孫柯廻為魏鎮西将軍綏戎校尉西羌都督廻生弋仲少而聰猛英果雄毅永嘉之亂戎夏襁負隨之者數萬自稱雍州刺史䕶羌校尉扶風公劉曜以弋仲為平西将軍石虎廢石𢎞自立弋仲稱疾不賀虎累召之乃赴太寧元年拜侍中征西大将軍石祗稱尊號於襄國以弋仲為右丞相石祗為劉顯所殺弋仲乃與燕連和有子四十二人常誡諸子曰我死之後汝歸晉家竭盡臣節乃使使降晉晉永和七年拜弋仲使持節六夷大都督督江淮諸軍事儀同三司大單于封高陵郡公八年薨時年七十三後弋仲柩為苻生所得生以王禮葬之于天水萇稱尊號追諡景元皇帝廟號始祖陵曰高陵姚襄崔鴻十六國春秋後秦録曰姚襄字景國弋仲第五子雄武多才藝能明察善撫納士民愛敬之咸請為嗣仲以襄非長不許石祗僣號以襄為使持節驃騎将軍䕶烏丸校尉晉遣使拜襄持節平北将軍并州刺史即丘縣公弋仲薨率户六萬南至滎陽晉處襄于譙城遣五弟為任單騎渡淮見豫州刺史謝尚一靣交欵便若平生揚州刺史殷浩憚其威名遣謝萬討襄襄逆擊破之鼓行濟淮屯于盱眙上音吁眙音怡朝廷大震襄方軌引北自稱大将軍大單于據許昌自許遂攻洛陽踰月不尅晉征西大将軍桓温自江陵伐襄襄與温戰於伊水北為温所敗襄奔還洛陽率數千騎奔於北山百姓隨襄者四千餘户襄尋徙北屈将圖關中進屯杏城遣輔國将軍姚蘭略地鄜城苻生遣苻飛拒戰襄率衆西引與苻堅戰于三原為堅所殺時年二十七萇僣尊號追諡魏武王姚萇崔鴻十六國春秋後秦録曰姚萇字景茂弋仲之第二十四子少聰哲多權略不脩行業兄襄為苻堅所殺萇率諸弟降于苻生苻堅以萇為揚武将軍步兵校尉潞川之戰累有殊功遷左衛将軍累授幽州刺史苻堅伐晉以萇為龍驤将軍督益梁二州諸軍事謂萇曰朕本以龍驤建業龍驤之號未曾假人今特以相授山南之事一以委卿堅左将軍竇衝進曰王者無戯言此将不祥之徵也堅黙然白雀元年慕容泓起兵叛堅堅遣子叡討之以萇為司馬既而為泓所敗叡死之萇遣叅軍姜協謝罪堅怒殺之萇懼奔于渭北歸者五萬餘家咸推萇為盟主自稱大将軍大單于萬年秦王大赦改元稱制行事二年六月慕容冲入長安司𨽻崔翼尚書趙遷等數百人來奔萇聞苻堅在五将山遣驍騎吳忠率騎圍之萇自故縣如新平吳忠執堅送之萇将求禪代堅不許慕容冲遣率騎大将軍尚書令高葢來伐戰於新平大破之蓋率麾下數千人來降建初元年僣即皇帝位于長安大赦改年國號大秦改長安為常安追尊考弋仲為景元皇帝立妻虵氏為皇后子興為皇太子秋七月萇如安定二年徙秦州三萬户于安定八月以太子興鎮長安四年十月立社稷于長安六年大敗苻登于安定七年三月萇寝疾遣鎮東姚碩德守長安召太子興詣行在所八年十月萇如長安至于新支堡疾篤輿疾而進十二月至長安召太尉姚旻僕射尹緯等受遺詔輔政萇曰吾氣力轉㣲将不能復臨天下卿等善相吾子謂興曰有毁此諸人者慎勿受之撫骨肉以仁接大臣以禮待物以信遇民以恩四者既備吾無恨矣庚子薨于永安宫年六十四諡武昭皇帝葬原陵廟號太祖姚興崔鴻十六國春秋後秦録曰姚興字子畧萇之太子萇薨祕不發喪皇初元年乃發䘮行服即位于槐里大赦改元七月如涇陽與苻登戰斬登徙隂宻三萬户於長安二年以叔父緒為晉王征西将軍碩德為隴西王弟崇為齊公顯為常山公三年以緒為并冀二州牧鎮蒲坂四年二月遣齊公崇伐洛陽𢎞始元年正月大赦改元冬十月尅洛陽以東平公紹為都督山東諸軍事豫州牧鎮洛陽四年五月遣大将軍隴西王碩德率步騎六萬伐吕隆于凉州先是秃孤傉内没切檀據西平沮渠蒙遜據張掖李暠據燉音屯煌各制方域共相侵伐碩德從金城濟河直趣廣武逕蒼松至隆城下隆遣弟輔國超龍驤邈等率衆來拒碩德大破之生擒邈傉檀遜暠蒙等各修表奉獻九月隆奉表請降興答報嘉美以隆為鎮西将軍凉州刺史建康公十一月鳩摩羅什至長安七年正月興如逍遥園引諸沙門聴什說佛經九年以太子泓録尚書事燕王慕容超遣使稱藩十年與魏通和貢馬千匹十一年蜀譙縱遣使稱藩十六年五月興疾于内寝太子泓以兵屯東華門侍疾于諮議堂尚書令廣平公弼姚弼也潜謀為亂招集數千人持兵於第興疾損升前殿百官咸會征虜劉羌泣曰陛下寝疾數旬柰何忽有斯事興曰朕過庭無訓諸子交惡含恥靦顔愧于四海興以弼文武兼才未忍致法免其尚書令以公就第十七年十一月興疾重廣平公弼告病不朝集兵於第興怒乃收弼囚之十二月興疾甚遣收廣平公弼第甲仗還武庫於是弼黨率甲仗攻端門殿中上将軍斂曼髙一作嵬勒兵拒戰不得入遂燒端門興力疾臨前殿賜弼死丁未薨於前殿年五十一諡文桓皇帝廟號高祖墓曰偶陵姚泓崔鴻十六國春秋後秦録曰姚泓字元子興之太子興薨即位大赦改元為永和元年廬于􅖴議堂既葬乃親庻政晉相劉裕來伐遣冠軍檀道濟龍驤王鎮惡入自淮肥二年七月劉裕次于陜城泓次于灞上裕至潼關泓自灞上還軍次于石橋裕進據鄭城泓遣姚裕屯兵宫中将軍姚丕守渭橋泓軍于逍遥園丕為晉所敗因丕之敗泓自赴之遂相踐而退泓與河間公裕等數百騎出奔于石橋大将軍東平公讃聞泓之敗率諸軍赴難㑹泓于石橋晉人已圍青門一云諸門軍不得入衆皆驚散泓計無所出謀欲降于裕其子佛念年十二謂泓曰陛下今雖降晉劉裕待人無禮終必不全願自我決憮音武又音姥失意也然不答念遂登宫墻自投而死平原公璞并州刺史尹昭以蒲坂降晉東平讃率宗室子弟百餘人亦降于裕裕盡殺之九月裕至長安送泓于建康市而戮之時年三十建康百里之内草木焦死自姚萇白雀元年歳在甲申至于是歳在丙辰三十有三歳蜀李特崔鴻十六國春秋蜀録曰李特字𤣥休巴西宕渠人其先廩君之苗裔秦併天下以為黔中郡薄賦歛之口歲出錢四十巴人謂賦為賨藏宗切因謂之賨人焉及髙祖為漢王始募賨人平定三秦既而不願出關求還鄉里高祖以其功復同豐沛更名其地為巴郡土有鹽鐵丹漆之利民用殷阜俗性剽勇又善歌舞高祖愛其舞詔樂府習之今巴渝舞是也其後繁昌分為數十姓及魏武尅漢中特祖父虎将五百家歸魏魏武嘉之遷略一云洛陽陽拜虎等為将軍内徙者亦萬餘家散居隴右諸郡及三輔𢎞農所在號為巴氐虎子慕為東羌獵将慕凡有五子輔特庠流驤特身長八尺雄武善騎射沉毅有大度元康中氐齊萬年反關西擾亂天水略陽扶風始平諸郡皆被兵寇民頻歳大饑流移就穀相與入漢川者數萬家特至劔閣顧盼嶮阻曰劉禪有如此之地而面縛于人豈非庸才耶同移者閻彧音郁等咸歎異之初流民既至漢中上書求寄食巴蜀朝廷從之由是散在梁益不可禁止元康元年詔徵益州刺史趙廞音歆為大長秋以成都内史耿滕代廞廞遂謀叛潜有劉氏割據之志滕率衆入州廞遣衆迎之戰于西門滕敗走廞獲殺之廞自稱大将軍益州牧特弟李庠與兄弟及妹夫李含任回等以四千騎歸廞廞以庠為威寇将軍使斷北道庠素東羌之良将晩兵法部陣肅然廞惡其齊整殺之復以特為督将特兄弟既怨廞引兵歸緜竹廞恐朝廷討已遣長史費逺犍音䖍為太守李苾斷北道次綿竹之石亭特密合得七千餘人夜襲逺軍逺軍大潰因放火燒之死者十八九進攻成都廞聞兵至驚懼不知所為李苾等夜斬關走文武盡散廞獨與妻子乘小船走至廣都為其下人朱竺所殺先是梁州刺史羅尚聞廞叛上表稱廞非雄才又蜀人不願為亂事終無成願往征之惠帝遣尚為平西将軍益州刺史率七千餘人入蜀特等聞尚來甚懼使其弟驤于道奉迎并貢寳物尚甚悦冬十月六郡流人推特行鎮北将軍承制封拜其弟流行鎮東将軍弟驤驍騎将軍少子雄為前将軍以相統領進兵攻尚於成都尚頻為特所敗乃阻長圍縁水作營自都安至犍為七百里與特相拒大安元年特乃自稱為大将軍大赦改元為建初元年益州從事任明說尚曰特既兇逆侵暴百姓今又分散人衆在諸村堡驕怠無備是天亡之時也可告諸村密刻期日内外擊之破之必矣尚從之遣大衆奄襲特營尚出逆戰到官桑特軍敗績死之雄稱成都王追諡景王及稱尊號追尊曰景皇帝廟號始祖李流崔鴻十六國春秋蜀録曰李流字𤣥通特第四子也少好學便弓馬東羌校尉何攀稱流有賁音奔育之勇舉為東羌校尉平趙廞于成都晉朝論功拜奮威将軍封武陽侯建初元年特旣見殺流自稱大将軍益州牧九月流疾篤謂諸将曰驍騎李驤也髙明仁愛識量多竒固足以濟大事然前軍李雄也英武殆天所相可共受事於前軍以為成都王也遂薨年五十六諸将共立雄為主雄稱尊追諡流秦文王子龍嗣李雄崔鴻十六國春秋蜀録曰李雄字仲雋特第三子母羅氏夢雙虹自門升天一虹中斷既而生蕩後羅氏汲水忽然如寐夢大蛇繞其身遂有孕十四月而生雄常言二子若有先亡在者必大貴蕩於李流時卒雄長八尺三寸美容貌相工相之曰此君将貴其相有四目如重雲鼻如龜龍口方如器耳如相望法為大貴位過三公不疑雄少以氣烈聞識者皆器重之特稱益州牧以雄鎮梓潼又拜前将軍流薨雄稱大将軍益州牧治郫音皮城以西山范長生巖居穴處求遵養之志雄欲迎立為君而臣之長生固辭曰推步大元五行大會甲子祚鍾于李非吾有也建興元年十月雄即成都王位於南郊大赦改元約法七章以叔父驤為太傅兄虎威為太保晏平元年三月范長生乘素輿詣成都雄迎于大門執版延坐長生請雄對坐即拜丞相尊曰范賢長生勸雄稱尊號夏六月僣即帝位大赦改年國號大武追尊父特為景帝母羅氏為太皇后十月加丞相范長生為天地太師之號封西山侯玉衡五年正月立妻任氏為皇后八年四月范長生卒以其子侍中賁為丞相長生善天文有術數民奉之如神十四年立兄子班為太子二十四年五月雄寝疾六月丁卯薨年六十一諡武皇帝廟號太宗十月塟安都陵太子班襲位李期崔鴻十六國春秋蜀録曰李期字世運雄第四子聦慧好學弱冠能屬文雄甍班即位雄子車騎将軍越自江陽奔喪以期與班非雄所生而嗣位心不平十月因夜哭臨越殺班於殯宫班字世文雄兄蕩第四子雄妻任氏無子養班為子越既殺班矯太后令陳班罪狀諡戾太子立期為主甲子期僣即皇帝位王恒元年正月大赦改年立妻閻氏為后四月大将軍漢王壽率歩騎一萬自涪音浮向成都期不虞其至不設僃至即尅城屯兵宫門殺相國建寧王越尚書令景騫尚書田衮等廢期為卭都縣公幽之别宫期自殺年二十五諡曰幽公李壽崔鴻十六國春秋蜀録曰李壽字武考特季弟驤之少子少尚禮容敏而好學雄竒其才畧以為足荷重任封為建寧王既而期立改封漢王領梁州刺史治涪城壽見期兄弟十餘人并有强兵懼不自全隂謀據成都稱藩於晉乃誓文武得數千人襲成都尅之縱兵擄掠數日乃定僣即皇帝位於南郊大赦改咸康四年為漢興元年追尊父驤為獻皇帝三年六月壽下書曰吳會遺燼乆逋天誅今将大興百萬躬行明罰九月大閱軍士七萬餘人舟師泝江而上過成都鼓譟盈江壽登城觀之羣臣以國小衆寡吳會險逺圖之未易叩頭泣諌乃止兵人咸稱萬歲十月醼禮于太學舉明經者封好學侯四年以太子勢領大将軍録尚書事六年分寧州興古永昌雲南朱提越嶲音髓河陽六郡為漢州四月壽寝疾常見李期為祟八月薨年四十諡昭文皇帝廟號中宗葬安昌陵李勢崔鴻十六國春秋蜀録曰李勢字子仁壽之長子身長七尺九寸腰帶十四圍善于俯仰時人異之壽旣薨僣即帝位大赦改元太和元年正月尊母閻氏為皇太后妻季氏為皇后嘉寧二年晉遣西将軍荆州刺史桓温來伐勢大發軍禦之鎮東李位都逆往降温達成都之十里陌勢衆自潰三月温至城下縱火燒其諸城門勢衆惶懼無復固志勢乃夜開東門走九百里至晉壽然後送降文于温勢尋輿櫬面縳軍門温解縛焚櫬送勢及叔父福戴記云及弟福等十餘人于建康晉封為歸義侯升平五年卒常璩字道将蜀成都人少好學著華陽國志十篇序開闢以來迄于李勢皆有條理云宕渠古賨國今有賨城秦始皇時有長人長五丈見宕渠秦史胡母敬曰五百年外地必有異人為大人者及雄之稱尊號祖先出自宕渠有識者皆以為應之譙周云我死後三十年當有異人入蜀又著讖云廣漢城北有大賊曰流曰特攻難得歲在𤣥宫自相尅又惠帝之世蜀童謡曰江橋頭闕下市成都北門十八字至是而應焉李特以晉永和元年歲在辛酉起兵至勢嘉寧二年為晉永和三年歲在壬戌而降晉合四十七年太平御覽卷一百二十三
