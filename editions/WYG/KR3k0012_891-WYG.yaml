  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_891-1a, image: WYG0900/WYG0900-0748a.png}
body:
  text: 太平御覽卷八百九十一宋李昉等撰獸部三虎上説文曰虎山獸之君也春秋運斗樞曰樞星散為虎易履卦履虎尾不咥人亨頤卦虎視耽耽其欲逐逐易革卦九五象曰大人虎變其文炳也易通卦騐曰立秋虎始嘯月令曰仲冬虎始交禮記曰孔子過太山側有婦人哭於墓者而哀夫子式而聽之使子貢問之曰子之哭也一似重有憂者而曰然昔吾舅死扵虎吾夫又死焉今吾子又死焉夫子曰何為不去曰無苛政子曰小子識之苛政猛扵虎也左傳宣四年曰若敖娶扵䢵生鬭伯比若敖卒従其母畜扵䢵淫扵䢵子之女生子文焉䢵夫人使棄諸夢中虎乳之䢵子田見之懼而歸夫人以吿遂使收之楚人謂乳榖謂虎為於莬故命之曰鬭糓於莬春秋考異郵曰三九二十七七者陽氣成故虎七月而生陽立扵七故虎首尾長七尺般般文者隂陽雜也春秋演孔圖曰天命蕩白虎戯朝其終白虎在野爾雅曰甝白虎虪黑虎漢書曰猛虎之猶與不如蜂蠆之致螫又曰武帝元狩中南郡獲白虎以為寳又曰李廣北平郡出獵見草中石以為虎而射之中石没羽視之石也明日射之終不能入矣又司馬遷書猛虎處深山百獸震恐及在穽檻之中揺尾而求食積威約之漸也又曰李敢子禹有寵扵太子禹有勇上召禹使刺虎懸下圏中未至地有詔引出之禹以劍斫絶纍欲刺虎上壯之赦焉後漢書曰劉昆字桓公光武時為𢎞農太守先是崤黽驛道多虎災行旅不通昆為政三年仁孝大行虎皆負子渡河帝聞而異之後徴為光禄勲詔問昆曰前在江陵返風滅火後守𢎞農虎北渡河行何德政而致是事昆對曰偶然耳左右皆笑其質訥帝歎曰此乃長者之言也又曰宋均遷九江太守郡多虎異數為人患常募設檻穽而猶多傷害均到下記屬縣曰夫虎豹在山黿鼉在水各有所托且江淮之有猛獸猶北土之有雞豚也今為人害咎在殘吏而勞勤張捕非憂恤之本也其務退奸貪思進忠善可一去檻穽除削課制其後傳言虎相與東游渡江又曰法雄為南郡太守郡濱帶江沔又有雲夢藪澤其中多虎狼之暴前太守賞募張捕反為所害者甚衆雄乃移書屬縣曰凡虎狼之在山林猶人之居城市古者至化之代猛獸不擾皆由恩信寛澤仁及飛走太守雖不德敢忘其義既到毁壊檻穽不得妄捕山林是後虎害稍息人以獲安在郡數嵗歳常豐稔又曰童恢字漢宗為不其令戸民嘗為虎所害乃設檻捕之生獲二虎恢咒虎曰天生萬物惟人為貴虎狼當食六畜而殘暴扵人王法殺人者死傷人則論法若是殺人者當垂頭服罪自知非者當號呼稱寃一虎低頭閉目狀若震懼即時殺之一乃踴躍自奮遂放之謝承後漢書曰豫章劉陵字孟高為長沙安成長先時多虎百姓患之徙他縣陵之官修徳政踰月虎悉出陵界去民皆還漢皇德傳曰世祖遣鄧禹西征送之扵道既返因扵野田獵路見二老翁即禽世祖問曰禽何向並舉首西指言此中多虎臣毎即禽虎亦即臣大王勿徃也方言曰虎陳魏宋楚之間或謂之李父江淮南楚間謂之李耳虎食物值耳即止以觸其諱故或謂之於䖘今江南山夷呼虎為䖘自闗東西或謂之伯都風俗通曰呼虎為李耳俗説虎本南郡中廬李翁所化謂之伯都也為呼李耳即喜呼班便怒龍魚河圗曰懸虎鼻門上宜官子孫帶印綬懸虎鼻門中周一年取燒作屑與婦飲之二月中便有兒生貴子勿令人知之泄則不騐也亦勿令婦見之山海經曰孟山鳥䑕同穴之山其上多白虎也又曰狄山有熊羆文虎幽都之山黑水上有𤣥虎尸子曰虎豹之駒未成文而有食牛之氣又曰中黄伯曰余左執太行之猱而右摶雕虎韓子曰龐共與太子質扵邯鄲謂魏王曰今一人言市有虎王信乎王曰不二人言王信乎王曰不三人言王信乎曰寡人信之龎曰夫市無虎明矣然而三人言成市虎今邯鄲去魏逺扵市議臣者過三人願王察之龎共従邯鄲還境不得入又曰夫虎之所以能伏狗者爪牙也使虎釋其爪牙而使狗用之則虎反服扵狗矣人主者以刑徳制臣今君失其刑德而使臣用之則君反制扵臣矣管子曰桀之時女樂三萬人放虎扵市觀其驚駭列子曰梁鴦曰養虎之法凡順之則喜逆之則怒此血氣之性也夫食虎者不敢以生物與之為其殺之恐怒也不敢以全物與之為其使之恐怒也孟子曰晉人有馮婦者善搏虎有衆逐虎望見馮婦趨而迎之孫卿子曰見寢木以為伏虎吕氏春秋曰衣人在寒食人在飢陳思稱投虎千金不如一豚肩淮南子曰中行繆伯手搏虎而不能生也又曰蛇不可使有足虎不可使緣木淮南萬畢術曰燒角入山則虎豹自逺惡其臭也又曰昔者牛哀病七日化為虎其兄啓戸而入視虎搏而殺之方其為虎不知其嘗為人也方其為人不知其將為虎也又曰虎嘯則谷風生説苑曰孔翠愛羽虎豹愛爪所以輔其身也抱朴子曰虎及老兔皆千嵗滿五百歲者其首白又曰或問為道者多在山林山林虎狼之室何以避之抱朴子曰古之入山者佩黄神越章其廣四寸其字百二十以封泥著所住之四方各百歩則虎狼不敢進其内也又曰山中寅日稱虞吏者虎也又曰蔡誕入山還家云被謫到崑崙山下白虎委蛇長百餘里其口中牙皆如三百斛虹大風俗通曰虎者陽物百獸之長也能噬食鬼魅今人卒得病燒皮飲之繫其衣服亦辟惡此甚騐又曰桃梗葦茭畫虎謹按黄帝書上古之時有神荼與欝壘兄弟二人性能執鬼度朔山上桃樹下簡閲百鬼鬼無道理妄為人禍神荼與欝壘縛以葦索執以食虎於是縣官常以臘除夕飾桃人垂葦茭畫虎於門皆追効前事冀以禦凶也又曰宋均為九江太守虎負子渡河按虎毛婆娑豈犯陽侯波里語云狐欲渡河無奈尾何舟人尚有懼况虎耶若德被四海虎亦不能至鬼方也蔣濟萬機論語曰猛虎不處卑勢鷙鳥不立垂枝也西京雜記曰李廣與兄弟獵扵㝠山之北見卧虎焉射一矢斃㫁其髑髅以為枕示服猛也鑄銅象其形為溲器示厭辱之也又曰余所知有鞠道龍善為幻術嘗向余説云東海人黄公少時為幻秦末有白虎見東海詔遣黄公以赤刀徃厭之術既不行遂為虎所殺三輔人俗用以為戲漢朝亦取之為角抵戲焉太平御覽卷八百九十一
