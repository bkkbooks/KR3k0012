body:
  text: 太平御覽巻二百八十六宋李昉等撰兵部十七機畧五機畧五王隠晉書曰馬隆子咸為成都王前鋒統陸機攻長沙王乂於石橋將士器仗嚴利長沙王所統官軍司馬王瑚率衆討咸咸堅不動瑚乃使數十騎下馬縛㦸於馬鞍頭放令伺咸又使數十騎各刺所放馬馬驚奔咸軍軍即壞瑚因馳逐猛戰臨陣斬咸晉書毛寶𫝊曰時蘇峻送米萬斛饋祖約約遣司馬桓撫等迎之寶告其衆曰兵法軍令有所不從豈可不上岸邪乃設變力戰悉獲其米又曰馬隆平泰原加赤幢曲葢鼓吹隆竒謀間發夾道累磁石賊負鐵鎧行不得前隆卒先被犀甲無所留礙賊咸以為神也又曰衞瓘既囚鄧艾諸將圖欲結艾整仗趨瓘營輕出迎之偽作表章將申明艾事諸將信之而止又曰劉琨少負壮氣有縱横之才善交勝已而頗浮誇與范陽祖逖為友聞逖被用與親故書曰吾枕戈待用志梟逆虜常恐祖生先吾着鞭其意相期如此在晉陽嘗為敵兵所圍數重城中窘迫無計琨乃乗月登樓清嘯敵兵聞之悽然長嘆中夜奏胡笳敵皆又流涕歔欷有懐土之切曉復吹之敵棄圍而走又曰盧循自廣州南下戎卒十萬舩艫千艘討敗將軍劉毅于桑落逕至江寧循妺夫徐道覆有膽决知裕已還欲乾没一戰請於新亭至白石焚舟而上数道攻之循多謀少决欲以萬全為計固不聴道覆曰我終為盧公所誤事必不成使我得為英雄主驅馳天下不足定也循後戰敗又曰王敦反敦既死以兄子應為嗣沈充自吴率衆萬餘人至與王含等合充司馬顧颺説充曰今日舉大事而天子已扼其喉情離衆沮鋒摧勢挫持疑猶豫必致禍敗今若决破柵塘因湖水灌京邑肆舟艦之勢極水軍之用此所謂不戰而屈人之兵上䇿也藉初至之銳并東南衆軍之力十道俱進衆寡過倍理必摧䧟中䇿也轉禍為福因敗為成召錢鳯計事因斬之以降下䇿也充不能用颺逃歸於吴含復率衆渡淮蘇峻等逆擊大破之充亦燒營而退既而周光斬錢鳯吴儒斬充並𫝊首京師又載記曰符登攻姚萇萇退還安定登就食新平留大軍于胡空堡率騎萬餘圍萇營四面大哭哀聲動人萇惡之命三軍哭以應登登乃引退又曰河間王顒在關中遣将張方討長沙王乂方率衆自函谷入屯河南乂遣左将軍皇甫商拒之而敗張方率兵入洛陽乂奉惠帝討方于城内方軍遥見乗輿於是引退方止之不得衆遂大敗方退壁于十二里橋人情挫衂無復固志或勸方夜遁方曰兵之利鈍是常貴因敗以為成耳我更前作壘出其不意此用兵之竒也乃使潜進逼洛城七里乂既新㨗不以為意忽聞方壘成乂師乃戰遂大敗又曰石勒據襄國晉將王浚遣督䕶王昌及鮮卑段就六眷末柸等部衆五萬餘以討勒時城隍未修乃築隔城重柵以待之就六眷屯于渚陽勒分遣諸將連出挑戰頻為六眷所敗又聞其大造攻具顧謂其將佐曰今冦來轉逼彼衆我寡恐攻圍不解外救不至内粮罄絶必敗不能固也吾將簡練將士大陣於野以决之何如諸將曰宜固守以疲冦彼師老自退追而擊之必尅張賔曰聞就六眷尅來月上旬送死北城必以我勢寡弱謂不敢出戰意必懈怠今段氏種衆之悍末柸尤最其卒之精勇悉在末柸可勿復出戰示之以弱速鑿北壘為突門二十餘道候賊列守未定出其不意直衝末柸帳敵必震惶計不及設所謂迅雷不及掩耳末柸之衆既奔餘自摧散擒末柸之後王浚指揮而定勒納之即以孔萇為攻戰都督造突門于北地鮮卑入屯北壘勒候其陣未定躬率將士鼓譟于城上㑹孔萇督諸突門伏兵俱出擊之生擒末柸就六眷等衆遂奔散萇乗勝追擊枕屍三十餘里獲鎧馬五十疋就六眷收其遺衆屯于渚陽遣使求和送鎧馬金銀并以末柸三弟為質而請末柸諸将並勸殺末柸以挫之勒曰遼西鮮卑與我素無怨讐為王浚所使耳今殺一人結怨一國非計也放之必悦不復為浚用矣於是納其質盟于渚陽就六眷等引還又曰杜預以太康元年正月陳兵于江陵遣參軍樊顯尹林鄧圭襄陽太守周竒等率衆循江西上授以節度旬日之間累尅城邑皆如預䇿焉又遣牙門管定周㫖伍巢等率竒兵八百汎舟夜渡以襲樂鄉多張旗幟起火巴山出於要害之地以奪賊心吴都督孫歆震恐與伍延書曰北來諸軍乃飛渡江也吴之男女降者萬餘口㫖巢等伏兵樂鄉城外歆遣軍出拒王濬大敗而還㫖等發伏兵随歆軍而入歆不覺直至帳下虜歆而還故軍為之謡曰以計伐戰一當萬又曰劉牢之等討妖賊孫恩恩敗走虜男女二十餘萬口一時入海懼官軍之躡乃緣道多棄寳物子女時東土殷實粲麗盈目牢之等遽收歛故恩復得逃入海通典曰孫恩用此術獲免也又曰李矩守滎陽後趙石勒親率兵襲矩矩遣老弱入山令所在散牛馬因設伏以待之賊争取牛馬伏發齊呼聲動山谷遂大敗之斬獲甚衆乃退又曰劉琨守太原遣将姬澹率十餘萬討石勒勒将拒之或諫曰澹兵馬精盛其鋒不可當宜深溝髙壘以挫其銳攻守勢異必獲萬全勒曰澹大衆逺來體疲力竭犬羊烏合號令不齊可一戰擒之何强之有冦已垂至胡可捨去大軍一動豈易中還若澹乗我之退顧無暇焉得深溝髙壘乎此不戰而自滅亡之道立斬諫者以孔萇為前鋒都督令三軍後出者斬設疑兵於山上分為二伏勒輕騎與澹戰偽收衆而北澹縱兵追之勒前後伏兵夹擊澹軍大敗又載記曰前慕容廆封畧漸廣廆胡罪切據棘城晉平州刺史東夷校尉崔毖隂結髙句麗毖音祕及宇文段囬等謀滅廆以分其地遂同伐廆廆曰彼信崔毖虛說邀一時之利烏合而來耳既無統一莫相歸伏吾今破之必矣然彼軍初合其鋒甚銳幸吾速戰若逆擊之落其計矣靖以待之必懐疑貳迭相猜防一則疑吾與毖譎而覆之二則自疑三國之中與吾有韓魏之謀者待其人情沮惑然後取之必矣於是三國攻棘城廆閉門不戰遣使送牛酒以犒宇文大言於衆曰崔毖昨有使至於是二國果疑宇文同於廆也引兵而歸宇文悉獨官曰二國既歸吾當獨兼其國盡衆逼城建營三十里廆簡銳士配子皝推鋒於前皝音晃子翰領精騎為竒兵從傍出直衝其營廆方陣而進悉獨官自恃其衆不設備見廆軍之至方率兵拒之前鋒始交翰已入其營縱火焚之衆遂大敗又曰蘇峻反攻尅石頭城據之帝以陶侃温嶠率兵討之諸將請於查浦築壘監軍李根曰查浦地下又在水南唯白石峻極險固可容数千人賊來攻之不便破賊之術也侃從之夜修曉訖賊見壘大驚賊攻大業侃将救之長史殷羡曰若大業歩戰不利則大事去矣但當急攻石頭峻必救之而大業自解侃又從羡言峻果棄大業救石頭諸軍與峻戰陵東侃又督竟陵太守李陽部將彭世斬峻於陣賊衆遂潰又曰妖賊孫恩北出海鹽劉裕為將築城于海鹽賊日來攻城内兵力甚弱裕深獨慮之一夜偃旗匿衆若已遁者明旦開門使羸疾數人登城賊遥問裕所在曰夜已走矣信之乃率衆大上裕乗其懈怠奮擊大破之崔鴻十六國春秋曰北凉沮渠蒙遜率兵伐南凉秃髪傉檀傉奴沃切入其境徙数千戸而還傉檀追及䝉遜于窮泉䝉遜將擊之諸將皆曰賊已安營不可犯也䝉遜曰傉檀謂吾逺來疲弊必輕而無備及其壘壁未成可一鼓而滅進擊敗之乗勝至于姑臧夷夏降者乃数千戸傉檀懼請和之而歸又曰前燕将慕容垂討丁零翟釗于滑臺次于黎陽津釗于南岸拒守垂徙營就西津為牛皮船百餘艘載疑兵列仗泝流而上釗先以大衆備黎陽見垂向西津乃棄營西拒垂潜遣其桂林王慕容鎮率驍騎於黎陽津夜濟壁于河南釗聞而奔士衆疲渴走歸滑臺釗攜妻子率数百騎北趣日鹿垂遣追擊盡擒其衆又曰後燕慕容盛據遼東其遼西太守李朗隂引後魏軍上表請發兵以拒冦盛曰此必詐也召其使而詰之果驗盡滅其族遣將李悍率騎討之師次建安召悍旋師朗聞其家被誅也擁二千餘户以自固及聞悍中路而還謂有内變不復為備留其養子守令支迎魏師于北平悍候知之襲尅令支遣禆将追朗及于無終斬之盛謂羣臣曰前以追悍還者朗新為叛逆必忌官威一則鳩合同類刼害良善二則亡竄山澤未可卒平故非意而還以盈怠其志卒然掩之必尅之理也羣臣皆曰非所及也又曰前秦符堅䧟襄陽晉將桓冲攻之堅將慕容垂等率歩騎五萬救襄陽以石越為前鋒次于沔水垂越夜命三軍人持火炬於樹枝光照数里冲懼退還又曰後趙石勒將石季龍大掠陳蔡間而去晉將姚豹守譙城住西臺東晉將祖逖遣將韓潜等鎮東䑓同一大城賊從南門出入放牧逖軍開東門相守四旬逖以布囊盛土如米狀使千餘人運上臺又令数人擔米偽為疲極而息於道賊果逐之皆棄擔而走賊既獲米謂逖士衆豐飽而北兵饑乆益懼無復膽氣又曰後凉吕光遣將吕延伐西秦乞伏乾歸遂大敗之乾歸因大泣嘆曰死中求生正在今日也乃縱反間稱乾歸東奔成紀吕延信之引師輕進延司馬耿雅諌曰乾歸雄勇過人權畧難測破王廣尅楊定皆羸師以誘之雖蕞爾小國蕞左外切亦不可輕也困獸猶鬬况乾歸而可覩風自散乎今宜部陣而前歩騎相接徐候諸軍大集可一舉滅之延不從戰敗死之又曰北凉沮渠䝉遜伐西凉李士業於酒泉先攻浩舋浩音閣舋音門蛇盤於帳前䝉遜笑曰前一為騰蛇今盤在吾帳天意欲吾廽師燒攻具而還次于川岩聞李士業徴兵欲攻張掖䝉遜曰入吾計矣但恐聞吾廽軍不敢前也兵事尚權乃露布西境稱得浩舋將布進軍黄谷士業聞而大恱進入都瀆間䝉遜潜兵逆之敗士業于懐城遂進尅酒泉又曰南凉禿髪傉檀守姑臧伐秦姚興遣将姚弼等至於城下傉檀驅牛羊於野弱衆採掠傉檀分擊大破之又曰前燕慕容雋已尅幽薊至于冀州冉閔率師拒之與雋将慕容恪相遇於魏昌閔將董潤言于閔曰鮮卑乗勝勁不可當也請避之以溢其氣然後濟師以擊之可以㨗也閔怒曰吾成師以出將平幽州斬慕容雋今遇恪而避之人将侮我矣閔威名素振燕衆咸憚之恪謂諸将曰閔勇而無謀一夫之敵耳雖有甲兵不足擊也吾今分軍為三部犄角以待之閔性輕銳又以吾軍勢非敵必出萬死衝吾軍中吾今貫甲厚陣以俟其至諸軍但勵卒從傍湏其戰合夾而擊之必尅閔與恪遇十戰皆敗之恪乃以鐵鎻連馬簡善射鮮卑勇而無剛者五千方陣而前閔乗駿馬左仗雙刀右執鉤㦸順風擊之斬鮮卑三百餘級俄而燕騎大至圍之太平御覽卷二百八十六
