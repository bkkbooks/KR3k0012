body:
  text: 太平御覽卷一百八十八宋李昉等撰居處部十六牕檻椽檐棁楶枅鋪首藻井鴟尾質礎奥屋漏宧穾塼瓦牕説文曰牕穿壁以木為交牕所以見日也向北出牖也在牆曰牖在屋曰牕又曰櫺楯間子也櫳房室之疏也釋名曰牕聰也於内視外謂之聰明大戴禮曰隨武子牖之銘曰隨天之時以地則之敬祀皇天敬以先時禮記郊特牲曰薄社北牖使隂明也又儒行曰蓽門圭竇蓬户甕牖論語曰伯牛有疾子問之自牖執其手曰亡之命矣夫五經典義曰虞主埋之廟北牖下北方無事虞主亦無事也東觀漢記曰明徳馬后不喜出入遊觀希嘗臨御忩望老子曰鑿户牖以為室又曰不窺牖見天道漢官封禪儀曰泰山有天忩三輔黄圖曰明堂有七十二牖孝經注曰明堂之制八窗四闥東宫舊事曰閣内有曲鄣鄣上雀目忩又曰宫有四面忩八所綾綺連錢及青匡郭飛板郭子曰滿奮畏風在武帝坐北窗作琉璃屏實宻似疎奮有寒色帝問之對曰臣若吳牛見月而喘西京雜記曰昭陽殿窗户扇多是緑琉璃皆通照毛髮不得藏焉漢武故事曰西王母降東方朔於朱鳥牖中窺母母謂帝曰此兒無賴乆被斥囘原心無恙尋當得還又曰帝起屋有雲母牕珊瑚牕聖賢冢墓記曰東平思王奢靡及死生塟所幸奴婢著銅忩内令守冢太公金匱牖之書曰闚望審視且念所得可思所忘李尤牖銘曰天設牕牖開光照陰施於明堂以象八風陸機詩曰安寢北堂上明月入我牖照之有餘輝攬之不盈手文選詩曰窗中列逺岫蜀都賦曰列綺窗以瞰江古詩曰盈盈樓上女皎皎當牕牖又曰文疏結綺牕阿閣三重階檻漢書曰朱雲忠諫攀檻檻折及治上曰勿易因而輯之以旌直臣文選曰伏櫺檻而俯聴聞雷霆之相激魯靈光殿賦曰軒檻蔓延楚辭曰坐堂伏檻臨曲池又曰照檻兮扶桑椽説文曰椽榱也橑榱也周謂之榱秦謂之椽齊魯謂之桷通俗文曰屋加椽曰橑來早切漢書解語曰椽桷也諸侯丹桷以丹色也詩曰松桷有梴穀梁傳曰刻桓宫桷禮天子之桷斵之磨礱之加宻石焉諸侯之桷斵之礱之大夫斵之士斵本刻桷非正也左傳曰宋人伐鄭以大宫之椽為盧門之椽續漢書曰蔡邕避難在吳告人曰吾昔經會稽髙遷亭見屋椽竹従東間數第十六可以為籥取用果有異聲張璿漢記曰梁冀起臺殿梁柱椽桷鏤為青龍白虎畫以丹青雲氣戰國䇿曰或謂孟嘗君曰廊廟之椽非一木之枝先王之法非一士之智漢武故事曰上起神屋以金為椽刻玳瑁為龍虎禽獸以飾其上狀若隠起椽首皆作龍首銜鈴流蘇懸之西京雜記曰昭陽殿椽桷皆刻作蛇龍縈繞其間鱗甲分明見者莫不驚慄韓子曰堯舜采椽不刮茅茨不翦檐説文曰檐㮰也又曰楣秦名屋櫋聨也齊謂之檐楚謂之梠釋名曰檐接也接屋前後也梠旅也連旅或謂之槾槾綿也連綿榱頭使平也上入曰雀頭形似雀也禮記明堂位曰復廟重檐天子之廟飾也榖梁傳文公曰壊廟之道易檐可也爾雅曰檐謂之樀郭璞注曰屋梠也棁爾雅曰梁上楹謂之棁漢官解詁曰棁梁上柱也諸侯藻棁為藻文也華延雋洛陽記曰堂皇宫殿皆石玉璫龍桷藻棁禮記禮器曰管仲鏤簋朱紘山節藻棁君子以為濫矣楶爾雅曰栭謂之楶郭璞注曰即櫨也三輔故事曰王莽起九廟為銅欂櫨揚子法言曰吾未見斧藻其徳若藻其楶者也枅爾雅曰枅謂之櫨郭璞注曰柱上薄也亦名枅犍為舎人曰侏儒下小方木廣雅曰薄謂之肩亦謂之欒説文曰枅屋强也王延夀靈光殿賦曰曲枅夭矯而還勾韋仲将景福殿賦曰於是周覽升降流目詳觀叢楹負極飛櫨承欒枅梧綺錯棁楶鮮攅鋪首通俗文曰門扇飾謂之鋪首説文曰門環謂之鋪首風俗通曰門户鋪首百家書云公輸班見水上蠡謂之曰開汝頭見汝形蠡適出頭般以足畫圖之蠡引閉其户終不可開設之門户欲使閉藏當如此固宻也揚雄甘泉宫賦曰排玉户而揚金鋪兮發蘭蕙與芎藭李尤平樂觀賦曰過洞房之轉闥厯金環之華鋪藻井風俗通曰殿堂象東井形刻作荷菱水物所以壓火也西都賦曰蔕倒茄於藻井披紅葩之狎獵魏都賦曰綺井列疏以懸蔕注疏布也以板為井形飾以丹青如綺也王延夀魯靈光殿賦曰圓淵方井反植荷渠緑房紫的咄咤垂珠左思魏都賦曰綺井列疏以懸蔕華蓮垂葩以倒披曹植七啟曰綺井含葩金壁玉箱顔延之七繹曰木寫雲氣土祕椒芳既挺天而到井又斵圓而鏤方鴟尾晉中興書曰泰元十年鸛巢太極殿東鴟尾晉安帝紀曰義熈三年六月雷震太廟鴟尾徹壁柱若有文字象宋武大明元年五月戊午嘉禾一株五莖生清暑殿鴟吻中陳書曰髙祖二年戊辰重雲殿東鴟吻忽有紫烟出屬天唐會要曰漢柏梁殿災越巫言海中有魚虬尾似鴟激浪即降雨遂作其象於屋以厭火祥時人或謂鴟吻非也質礎尚書大傳曰大夫有石材庶人有石承注曰石材柱下質也石承當柱下而已不外出為飾説文曰礩柱下石也古以木今以石廣志曰舄石有五色者光澤以為柱礩出苑蓬山戰國䇿曰智伯攻趙襄子之晉陽謂張孟談曰吾城郭完倉􅅒實少銅奈何孟談曰吾聞董安于之治晉陽公之堂皆以黄銅為柱礩請發而用之則有餘銅矣古史考曰秦始皇使刑徒七萬人作驪山北石為舄南州異物志曰大秦國以水精為舄淮南子曰山雲蒸柱礎潤張衡西京賦曰雕楹玉舄何平叔景福殿賦曰金楹齊列玉舄成趺奥論語八佾曰與其媚於奥寧媚於竈爾雅曰西南隅謂之奥郭璞注曰室中隠奥處通俗文曰奥内曰房韓子曰衛將軍文子見曽子曽子不起而延之於坐席正身見於奥文子謂其御曰曽子愚人哉以我為君子也君子安可不敬以我為愚人安可侮也吕氏春秋曰苑春諌衛公云君因隅奥有竈不知寒矣屋漏毛詩蕩抑曰相在爾室尚不愧于屋漏爾雅曰西北隅謂之屋漏郭璞注曰屋漏義未詳也犍為舎人曰古者徹屋西北隈以炊浴浴者訖而覆之故謂之屋漏也宧爾雅曰東北隅謂之宧郭璞注曰義未詳犍為舎人曰東北隅陽氣始起萬物所養故謂之宧也説文曰宧養也室東北隅食所居也穾爾雅曰東南隅謂之穾郭璞注曰穾闇也犍為舎人曰東北萬物生蟄蟲必出無不由户穾釋名曰穾幽也亦取宜也塼詩曰乃生女子載弄之瓦瓦紡塼也又曰中堂有甓注一名瓴甋晉書曰陶侃字士行在廣州無事朝運百甓於外暮運於内人問其故答曰吾方致力中原過爾優逸恐不堪事宋書范曄母如厠而産額為塼所傷故以塼為小字瓦説文曰瓦土器已燒之總名禮記曰有虞氏瓦棺又曰毁方而瓦合史記曰秦軍武安西鼓譟勒兵武安屋瓦盡震漢書曰霍光巷行人見有人在屋上撒瓦投地就視不見而霍氏誅又曰平帝元始四年東風吹長安城東門屋瓦盡飛魏志曰魏文帝謂周宣曰朕夢殿上雙瓦落地化為鴛鴦何也宣曰後宫當有暴死者須臾後宫相害死吳録曰景帝時戍將於廣陵掘諸冢取板塼以城所壊甚多晉書曰張孟陽貌醜嘗從潘岳遊洛陽市岳羙貌羣女爭以果擲岳滿車箱孟陽被投之瓦石古史考曰昆吾氏作瓦博物志曰桀作瓦老子曰挺埴以為器夢書曰夢見瓦而為甲鎧禦禍患春秋潛巴潭曰宫瓦自墜至死不祥漢武故事云上起神屋以銅為瓦莊子曰雖有忮心不怨飄瓦又曰以瓦注者巧注射賭物也所賭物輕則意巧又曰陶者曰我善治埴大秦記曰大秦以水精為瓦抱朴子曰班狄不能削瓦石為芒鍼燕丹子曰荆軻之東宫臨池捨瓦投竈太子進金瓦太平御覽卷一百八十八
