body:
  text: 太平御覽卷七百二十五宋李昉等撰方術部六卜上說文曰灼龜也象兆之縱横也周禮天官太宰職曰祀五帝則掌百官之誓戒與其具修前期十日帥執事而卜日遂戒前期前所諏之期也卜日事宗廟散齊七日致齊三日執事太宰之屬也既戒百官以始齊也又春官嘗之日涖卜來嵗之芟卜者問後嵗宜芟否獮之日涖卜來嵗之戒秋田謂獮卜者問後嵗兵冦社之日涖卜來嵗之稼卜問後嵗稼所宜又曰太卜掌三兆之法一曰玊兆二曰瓦兆三日原兆兆灼者灼龜發於火其形可占者其象玉瓦原之璺罅是用名之焉其經兆之體皆百有二十其頌皆千有二百又卜師職曰卜師掌開龜之四兆一曰方兆二曰功兆三曰義兆四曰弓兆開開出其占書也經兆百二十體言此四兆者分之為四部若易之二篇書金縢開籥見書是也又曰龜人掌六龜之屬各有名物天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰雷屬南龜曰獵屬北龜曰若屬各以其方之色與其體辨之上春釁龜祭祀先卜釁者殺牲以血之神之也鄭司農云祭祀先卜者卜其日與其牲又曰占人掌占龜以八筮占八頌以八卦占筮之八故以眡吉㐫凡卜筮君占體大夫占色史占墨卜人占坼禮記曰正月命有司釁龜䇿占兆審卦吉㓙周禮龜人上春釁龜謂建寅之月曲禮曰凡筮日旬之外曰逺某日旬之内曰近某日䘮事先逺日􅁻事先近日曰為日假爾泰龜有常假爾泰筮有常命龜筮辭龜筮於吉㓙有常大事卜小事筮卜筮不過三卜筮不相襲龜為卜筴為筮卜筮者先聖王所以使民信時日敬鬼神畏法令也所以使民决嫌疑定猶與也又檀弓下曰石駘仲卒駘仲衛大夫石碏之後無適子有庶子六人卜所以為後者曰沭浴佩玊則兆言齋㓗則得吉兆也五人皆沐浴佩玊石祁子曰孰有執親之䘮而沐浴佩玊者乎不沐浴佩玊石祁子兆衛人以龜為有知也又禮運龜為前列先知也龜知事情者陳於建有前又郊特牲曰卜郊受命於祖廟作龜於禰宫尊祖親考之義也受命謂告之退而卜卜之日王立於澤親聽誓命受教諫之義也又曰國君世子生三日卜士負之又玊藻曰卜人定龜史定墨視兆折君定體視兆所得也又少儀問卜筮曰義與志與義則問志則否夫卜問也上筮者義正事也志私意也又曰雜記曰大夫之䘮大宗人相小宗人命龜卜人作龜又祭義曰昔者聖人建隂陽天地之情立以為易易抱龜南面天子卷冕北面雖有知眀之心必進斷其志焉示不敢專以尊天也善則稱人過則稱已教不伐以尊賢也又曰表記曰南人有言曰人而无恒不可以為卜筮古之遺言與龜筮猶不能知也而况於人乎又曰子言之昔三代明王皆事天下之神明无非卜筮之用不敢以其私褻事上帝言動任卜筮也神明謂羣神也是故不犯日月不違卜筮日月謂冬夏至四時也所不違者日與牲尸也卜筮不相襲也襲取也小事則筮大事則卜也大事有時日大事有事於大神有常時常日也小事无時日有筮外事用剛日内事用柔日不違龜筮左傳曰楚伐鄖莫敖曰盍請濟師於王闘亷曰師克在和不在衆商周之不敵君之所聞也成軍以出又何濟焉莫敖曰卜之對曰卜以决疑不疑何卜至敗隕師於蒲騷又曰初懿氏卜妻敬仲其妻占之大吉事具筮門又僖公曰初晉獻公欲以驪姬為夫人卜之不吉筮之吉公曰從筮卜人曰筮短龜長不如從長又僖公曰狐偃言於晉侯曰求諸侯莫如勤王諸侯信之且大義也繼文之業而信宣於諸侯今為可矣使卜偃卜之曰吉遇黄帝戰於阪泉之兆又曰晉惠公之在梁也梁伯妻之梁嬴孕過期卜招父與其子卜之杜預注曰卜招梁大卜也其子曰將生一男一女招曰然男為人臣女為人妾故名男曰圉女曰妾及子圉西質妾為官女焉又曰夏四月卜郊不從乃免牲非禮也諸侯不得郊天魯以周公故得牲用天子禮樂故郊為魯常祀猶三望亦非禮也禮不卜常祀而卜其牲日牛卜日曰牲牲成而卜郊上怠慢也望郊之細也不郊亦無望可也又曰衛遷于帝丘卜曰三百年又文公曰邾文公遷卜于繹史曰利於民而不利於君邾子曰苟利於民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之長短時也民苟利矣遷也吉莫如之遂遷于繹五月邾文公卒君子曰知命又曰春齊侯戒師期而有疾醫曰不及秋將死公聞之卜曰尚无及期惠伯令龜卜楚丘占之曰齊侯不及期非疾也君亦不聞令龜有咎二月丁丑公薨又宣上曰郊牛之口傷改卜牛牛死乃不郊又宣下曰楚子圍鄭旬有七日鄭人卜行成不吉卜臨于大宫且巷出車吉國人大臨守陴者皆哭楚子退師又成上曰鼷䑕食郊牛角改卜牛又襄元曰夏四月三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啟蟄而郊郊而後耕今既耕而後卜郊宜其不從也又襄二日鄭皇耳帥師侵衞楚令也亦兼受楚之勅命也皇耳皇戎子孫文子卜追之獻兆於定姜氏問繇曰兆如山陵有夫出征而䘮其雄姜氏曰征者䘮雄禦㓂之利也大夫圖之衞人追之孫蒯獲鄭皇耳于大丘又曰晉侯還及著雍疾卜桑林見事具樂部又曰鄭石􅎢言於子囊曰先王卜征五年而嵗習其祥祥習則行不習則増修德而改卜又襄五曰盧蒲癸王何卜攻慶氏示子之兆曰或卜攻讎敢獻其兆子之曰克見血慶封田于萊陳無宇從文子使召之請曰無宇之母疾病請歸慶季卜之示之兆曰死奉龜而泣乃使歸又昭五曰越大夫常夀過帥師㑹楚子於瑣聞吳出師薳啟疆帥師從之從吳師也遽不設備吳人敗諸鵲岸楚子以馹至於羅汭吳子使其弟蹷由犒師楚人執之將以釁鼓王使問焉曰汝卜來吉乎對曰吉寡君聞君將治兵於敝邑卜之以守龜曰余亟使人犒師請行以觀王怒之疾徐而為之備尚克知之龜兆告吉曰克可知也君若驩焉好逆使臣滋敝邑休怠而忘其死亡無日矣今君奮焉震電憑怒憑盛也虐執使臣將以釁鼓則吳知所備矣敝邑雖羸若早修完其可以息師難易有備可謂吉矣且吳社稷是卜豈為一人使臣獲釁軍鼓而敝邑知備以禦不虞其為吉孰大焉國之守龜其何事不卜一臧一否其誰能常之城濮之兆其報在邲今此行也其庸有報志乃弗殺又昭公曰公卜使王黑以靈姑鉟率吉請斷三尺焉而用之靈姑鉟分旗也斷三尺不敢與君同又昭公曰楚召觀從曰惟爾所欲曰臣之先佐開卜乃為卜尹左卜人開龜兆又曰初靈王卜曰余尚得天下不吉投龜詬天而呼曰是區區者而不余畀余必自取之民患王之無厭也故從亂如歸又曰吳伐楚陽匄為令尹卜戰不吉司馬子魚曰我得上流何故不吉且楚故司馬令龜我請改卜令曰魴也以其屬死之楚師繼之尚大克之吉戰于長岸子魚先死楚師繼之大敗吳師又昭六曰初臧昭伯如晉臧㑹竊其寶龜僂句僂句龜所出地名以卜為信與僣吉又定曰晉車千乘在中牟衞侯將如五氏卜過之龜焦衞侯曰可也衞車當其半寡人當其半敵矣乃過中牟又哀上曰楚子在城父將救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死弃盟逃讎亦不如死死一也其死讎乎命公子申為王不可則命公子結亦不可則命公子啟五辭而後許將戰王有疾庚寅昭王攻大㝠卒于城父又曰楚昭王有疾卜曰河為祟王弗祭事見江部又曰晉趙鞅卜救鄭遇水適火水火之兆占諸史趙史墨史龜皆晉史也史龜曰是謂沉陽火陽得水故沉可以興兵兵陽類也故可以興兵利以伐姜不利子商姜齊姓也子商謂宋伐齊則可敵宋不吉史墨曰盈水名也子水位也名位敵不可干也炎帝為火師姜姓其後也水勝火伐姜則可史趙曰是謂如川之滿不可游也鄭方有罪不可救也救鄭則不吉不知其他陽虎以周易筮之遇泰之需曰宋方吉不可與也㣲子啟帝乙之元子也宋鄭甥舅也祉禄也若帝乙之元子歸妹而有吉禄我安得吉焉乃止毛詩曰升彼虛矣以望楚矣望楚與堂景山與京降觀于桑卜云其吉終焉允臧又曰爾卜爾筮體無咎言又曰君曰卜爾萬夀無疆又曰卜筮偕止㑹言近止征夫邇止又曰我龜既厭不我告猷又曰爰始爰謀爰契我龜又曰考卜維王宅是鎬京惟龜正之武王成之又曰哀我顛寡宜岸宜獄握粟出卜自何能穀尚書大禹謨曰枚卜功臣惟吉之從帝曰禹官占惟先蔽志昆命于元龜朕志先定詢謀僉同鬼神其依龜筮協從卜不習吉又洪範曰七稽疑擇建立卜筮人龜曰卜蓍曰筮乃命卜筮曰雨曰霽曰䝉曰驛曰克曰貞曰悔凡七卜五占用二衍忒立時人作卜筮三人占則從二人之言汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮汝則從龜從筮從卿士從庶民從是之謂大同身其康彊子孫其逢吉汝則從龜從筮從卿士逆庶民逆吉卿士從龜從筮從汝則逆庶民逆吉庶民從龜從筮從汝則逆卿士逆吉汝則從龜從筮逆卿士逆庶民逆作内吉作外㐫龜筮共違於人用靜吉用作㓙又金縢曰既克商二年王有疾弗豫伐紂明年王有疾不悅豫二公曰我其為王穆卜周公曰未可以戚我先生穆敬也戚近也召公太公言王疾當卜吉㐫也周公言不可以死近我先王相順之辭公乃為三壇同墠乃卜三龜一習吉習因也以三王卜相因而吉之兆也又大誥曰寕王遺我大寶龜紹天明即命曰我有大事休朕卜并吉天休于寧王興我小邦周寧王惟卜用克綏受兹命又洛誥曰予惟乙夘朝至于洛師我卜河朔黎水我乃卜澗水東􅈆水西惟洛食我又卜􅈆水東亦惟洛食伻來以圖及獻卜史記曰宋元王二年江使神龜使於河至泉陽漁者豫且舉網得而囚之置籠中夜而見夢於元王曰我為江使於河豫且得我我不能去身在患中莫可告語王有德義故來告愬元王召博士衞平問之平乃授式而起仰天視月之光觀斗所指定日之鄉䂓矩為輔副以權衡四維以定八卦相望視其吉㓙介蟲先見乃對曰今昔壬子宿在牽牛河水大㑹鬼神相謀漢正南北江河固期南風新至江使先來白雲擁漢萬物盡留斗柄指日使者當囚𤣥服而乗輜車其名為龜使人問泉陽令取龜獻使者載行出於泉陽之門正晝無見風雨晦暝雲葢其上五色青黄雷雨並起將入端門見於東箱身如流水潤澤有光望見王延頸而前三步而止縮頸而却復其故處元王見而怪之問衛平平對曰龜在患中而終夕囚王有德義使人活之今延頸而前以當謝也縮頸而郤欲亟去也元王曰善哉趣駕送龜毋令失期平對曰龜者是天下之寶先得此龜者為天子且十言十當十戰十勝生於深淵長於黄土知天之道明於上古遊三千嵗不出其域安平靜正動不用力夀比天地莫知其極與物變化四時變色居而自匿伏而不食春蒼夏黄秋白冬黑明於陰陽審於刑徳先知利害察於禍福以言而當以戰而勝王能寳之諸侯盡服王勿遣也王大悅於是向日而謝再拜而受擇日齋戒甲乙最良乃刑白雉以血灌龜於壇中央以刀刳之身全不傷脯酒禮之横其腹腸荆支卜之必制其創以達其理文相錯迎使工占之所言盡當又曰沛父老率子弟共殺沛令開城門迎劉季欲以為沛令父老皆曰平生所聞劉季竒怪當貴且卜筮莫如劉季於是乃立為沛公又陳平等遣人迎代王欲立為帝代王卜之龜卦兆得大横占曰大横庚庚余為天王夏啟以光曰寡人固已為王矣又何王卜人曰所謂天王乃天子也又曰帝以月旦祓龜先以清水澡之以卵祓之乃持龜而遂之若已卜不中皆祓之以􅆑東鄉立居處生荆枝堅木堅木枝燒之斬取熱處以灼龜所卜處灼以荆卵指之者三持龜以卵周環之祝曰今日吉謹以梁卵祓玉靈之不祥玉靈必信以誠知萬事之情辯兆皆可占不信不誠則燒玊靈揚其灰以徴後龜又曰竇皇后弟廣國字少君年四五嵗時家貧為人所賣至宜陽為其主人作炭寒卧崖崖崩獨得脫不死自卜數當為侯又曰司馬季主楚人也卜於長安東市宋忠為中大夫賈誼為博士俱出洗沐相從論議講習先王聖人之道術究徧人情相視而嘆賈誼曰吾聞古之賢人不居朝廷必在卜醫之中今吾已見三公九卿朝士大夫皆可知矣試之卜數中以觀采二人即同輿而之市游於卜肆中天新雨道少人司馬季主閒坐弟子三四人方辯天地之道日月之運陰陽吉㓙之本二大夫再拜謁司馬季主觀其狀貌類有道者即禮之使弟子延之坐坐定司馬季主復理前語分别天地之始終日月星辰之紀差次仁義之際别吉㐫之符語數千言莫不順理宋忠賈誼瞿然而喜獵纓正襟危坐曰吾望先生之狀聽先生之辭小子竊觀於世未嘗見也今何居之卑何行之汙也司馬季主捧腹大笑曰觀大夫之貌類有術者今何言之陋也何辭之野也今夫子所賢者誰也所髙者何也今何以卑汙長者乎二君曰尊官厚禄世之所髙也賢才處之今所處非其地故謂之卑言不信行不驗取不當故謂之汙卜筮者世之所賤簡也世皆言曰夫卜者多言誇嚴以得人情虛髙人禄命以說人志擅言禍災以傷人心矯言鬼神以盡人財厚求拜謝以私於已此吾之所恥故謂之卑汙也司馬季主曰公且安坐公見夫被髮童子乎日月照之則行不照則止然問日月疵瑕吉㐫則弗能理也今夫卜者必法天地分四時順於仁義分策定卦按式正棊然後别天地之利害明乎事之成敗昔先王之定國家必先龜策日月而後乃敢代也正時日乃後入家産子必先占吉㐫後乃有之自伏羲作八卦周文王演三百八十四爻而天下治越王勾踐倣周文王分卦以破敵國覇天下由是觀之卜筮有何負哉且夫卜者掃除設坐正其冠帶然後乃言事此有禮也言鬼神或以饗忠臣以事其上孝子以養其親慈父以畜其子此有德者也而以義置數十百錢病者以愈死或以生患或以免事或以成嫁子娶婦或以養生此之謂徳豈直數十百錢哉此老子所謂上德不德是以有德今夫卜筮者利大謝少老子之言豈異於是乎莊子曰君子内無飢寒之患外無刼奪之憂居上而敬居下而不為害君子之道也今夫卜筮者之為業也積之無聚委藏之不用府庫徙之不用車輜負裝不重止而用之無盡索之時持不盡之物游於無窮之世雖莊氏之行未能增也子何故而云不可卜哉天不足西北星辰西北移地不足東南以海為池日中必移月滿必􅉛先王之道乍存乍亡公責卜者言必信不亦惑乎公見夫談士辨人乎慮事定計必是人也然不能以一言説人主意故言必稱先王語必道上古慮事定計飾先王之成功語其敗害以恐喜人主之志以求其欲多言誇嚴莫大於此矣然欲强國成功盡忠於上非此不立今夫卜者導惑教愚也夫愚惑之人豈能以一言知之哉言不厭多故麒􅂹不能與罷驢為駟鳳凰不與燕雀為羣而賢者亦不與不肖者同列故君子處卑隠以避衆自匿以避倫微見德順以除羣害以明天性助上養下多其功利不求尊譽公等喁喁者也何知長者之道乎漢書曰谷口有鄭子貞蜀有嚴君平皆修身自保非其服弗服非其食弗食成帝時元舅大將軍王鳳以禮聘子貞遂不出而終君平卜筮於成都市以為卜筮賤業以惠衆人有邪惡非正之問則依筮龜為言利害與人子言依於孝與人臣言依於忠各因其勢導之以善又曰張禹字子文父徙家蓮勺禹為兒數隨衆至市喜觀於卜相者前久頗曉其别蓍布卦意時從旁言卜者愛之又竒其面貌謂禹父是兒多知可令學經及禹入長安從沛郡施讎受易謝承後漢書曰姜肱桓帝時再以𤣥纁聘不就即拜太史大夫詔書至門肱使家人對云久病就醫遂羸服間行竄伏青州界中賣卜給衣召命得斷家亦不知其處厯年乃還又曰田戎擁衆夷陵聞秦豐被圍懼大兵方至欲降而妻兄辛臣諫戎曰今四方豪傑各據郡國洛陽地如掌耳不如按甲以觀其變戎不從乃留辛臣守夷陵自將兵松江泝汚止黎丘刻日當降而辛臣於後盗戎珍寶從間道先降於岑彭而以書招戎戎疑必賣已灼龜卜降兆不吉中折遂止不降又曰范丹字史雲朝議欲以為侍御史因遁身逃命於梁沛之間徒行敝服賣卜於市魏志管公明𫝊曰洛中有一小人失婢輅為卦教明日東明城門中倒擔豚人牽與共鬬某如其言豚逸走即追之豚入人舎突破主人甕婢從甕中出輅在田舎時常候逺隣主人患失火輅卜教使明日於陌上伺有一角巾書生駕黑牛敝車必引畱宿此能除之即從輅語得書生遂畱宿意甚不安主人罷入生乃抱刀出門倚積薪假寐有一物直來如獸手中持火以口炊之生舉刀斫斷腰視之狐也自此無復火災太平御覽卷七百二十五
