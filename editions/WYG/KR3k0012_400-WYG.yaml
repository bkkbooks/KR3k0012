body:
  text: 太平御覽卷四百宋李昉等撰人事部四十一凶夢禮記檀弓曰夫子蚤作負手曳杖逍遙於門歌曰泰山其頽乎梁木其壞乎哲人其萎乎既歌而入當戸而坐子貢聞之曰泰山其頽則吾將安仰梁木其壞哲人其萎則吾將安放夫子殆將病也遂趨而入夫子曰賜爾來何遲也夏后氏殯於東階之上則猶在阼也殷人殯於两楹之間則與賔主夾之也周人殯於西階之上則猶賔之也而丘也殷人也予疇昔之夜夢坐奠於两楹之間夫明王不興天下其孰能宗予予殆將死也葢寢疾七日而沒左傳成公上曰晉侯夢大厲被髪及地搏膺而踊呼曰殺余孫不義厲鬼趙氏之先祖也余得請於帝矣壞大門及寢門而入公懼入於室又壞戸公覺召桑田巫巫言如夢巫言鬼怒如公所夢公曰何如曰不食新矣六月丙午公欲麥使甸人獻麥将食張如厠陷而卒小臣有晨夢負公以登天及日中負晉侯出諸厠遂以為狥又成公下曰晉楚将戰吕錡夢射月中之退入扵泥占之曰姬姓日也異姓月也必楚王也射而中之退入於泥亦必死矣及戰射共王中目王召飬由基與之两矢使射吕錡中項伏􅌢以一矢復命言一發而中之又成下曰初聲伯夢渉洹洹水出汲郡林慮縣東地至魏郡長樂縣入青水也或與已瓊瑰瓊玉瑰珠也食之泣而為瓊瑰盈其懷淚下化為珠玉滿懐從而歌曰濟洹之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懷乎懼不敢占也還自鄭至於貍脤而占之曰余恐死故不敢占也今衆繁而從余三年矣而无傷也言之至暮而卒繁多也傳戒數占夢又襄三曰齊侯伐我北鄙中行獻子將伐齊夢與厲公訟弗勝厲公獻子所弑者公以戈擊之首墜於前跪而戴之奉之以走見梗陽之巫臯梗陽晋邑也在太原臯巫名也夢并見之他日見諸道與之言同巫亦夢見獻子與厲公訟巫曰今兹主必死若有事於東方則可以逞獻子許諾又昭二曰初穆子去叔孫氏及庚宗成十六年避僑如之難奔齊庚宗魯地遇婦人使私為食而宿焉適齊夢天壓已弗勝穆子夢也顧而見人黑而上僂深目而猳喙號之曰牛助余乃勝之及反魯所宿庚宗之婦人獻以雉獻穆子問其姓問有子不對曰余子長矣能奉雉而從我矣召而見之則所夢也未問其名號之曰牛曰唯皆召其徒使視之遂使為豎豎宫也傳言從夢未必吉又哀上曰初曹人或夢衆君子立於社宫而謀亡曹曹叔振鐸請待公孫疆許之振鐸曹始祖也旦而求之曹无之戒其子曰我死爾聞公孫疆為政必去之及曹伯陽即位好田弋曹鄙人公孫疆好弋獲白雁獻之且言田弋之說因訪政事大悅之有寵使為司城以聴政夢者之子乃行疆言霸說於曹伯從之乃背晉而攻宋宋人伐曹晉人不救而曹亡又哀下曰衛侯夢於北宫見人登昆吾之觀衛有觀在古昆吾氏之墟被髪北靣而譟曰登此昆吾之虛綿綿生之𤓰綿綿𤓰初生也余為渾良夫呌天無辜公親筮之胥彌赦占之赦衛筮史曰不害與之邑寘之而逃奔宋國語曰晉獻公伐虢虢公夢在廟有神人靣目白毛虎爪執鉞立於西阿之下公懼而走神曰无走帝命使晉襲於爾門公拜稽首覺召史嚚占之對曰如君之言則蓐收也天之刑神也公使囚之且使國人賀夢舟之僑吿其族曰衆謂虢亡不久矣吾今乃知之外内無親其誰救之吾不忍俟將其族適于晋六年虢乃亡史記曰始皇夢與海神戰如人状乃令人入海賫捕鉅魚具而自以連弩候大魚出射之遂並海西至平原津而病又曰秦二世夢白虎齧其左􅆖馬殺之問占夢人曰涇水為祟二世乃齋望夷宫閻樂殺之更立子嬰為王又曰初趙盾在夢見叔𢃄持要而哭甚悲已而笑拊手而歌盾卜之兆絶而後好趙史援占曰此甚惡非君之身乃君之子然亦君之咎至趙朔被殺下宫及趙武還故位漢書曰昌邑王夢見青蠅之矢積殿東西階王乃問龔遂對曰詩云營營青蠅止於樊愷悌君子無信讒言陛下察之王終不改續漢書曰鄭𤣥夢孔子造曰起今年嵗在辰明年嵗在已既悟以䜟占之知命當終有頃寢疾而卒又曰周盤字伯堅朝㑹集諸生講論終日因令其二子曰吾日者夢見先師東里先生與我講於隂堂之奥既而長嘆豈吾齒之盡乎其月朢日無病忽終東觀漢記曰公孫述夢人語之曰八厶子系十二為期覺語其妻對曰朝聞道夕死尚可况十二乎魏志曰鄧艾字士載初艾當伐蜀夢山上而有流水以問殄虜䕶軍爰邵邵曰案易卦山上有水曰蹇蹇爻利西南不利東北孔子曰蹇利西南往有功也不利東北其道窮也往必克蜀殆不還乎艾憮然不樂又曰文帝問周宣曰吾夢殿屋两瓦墮地化為鴛鴦此何謂耶宣對曰后宫當有暴死者帝曰吾詐卿耳宣對曰夫夢者意耳苟形言便占吉凶言未卒而黄門令奏宫人相殺蜀志曰魏延字文長義陽人延夢頭上生角以問占夢趙直直詐延曰夫騏驎有角而不用此不戰而賊自破之象也退而告人曰角之為字刀下用也頭上用刀其凶甚矣延后果誅又曰闗雲長軍圍樊夢猪齧其足語子平曰今年衰矣尋果被害晉書曰郭瑀燉煌人也苻氏之末畧陽王穆起兵酒泉以應張預遣使召瑀與同郡索蝦應之穆后信讒欲誅蝦瑀諫不從旦夕祈死夜夢乗青龍上至屋而止寤而嘆曰龍飛在天今止於屋屋之為字尸下至也龍飛至尸吾其死也古之君子不卒内寢况吾正士乎遂還酒泉南山赤崖關飲氣而卒又曰惠帝時陸機為長沙王乂征河間王顒夜夢黑幕三重繞車機擘出不得明旦被殺其日大風㧞木時人以為陸氏之寃又曰張華方晝卧忽夢見屋壞覺而惡之是夜難作稱詔召華遂與裴頠俱被收又曰偽趙石虎晝寢永宫夢羣羊從東北負魚而來鄴東北土高丈餘木斗滿其上寤乃問佛圗澄曰不祥也國其敗乎又曰温嶠為驃騎鎮武昌至牛渚磯水深不可測云其下多怪嶠遂燒犀角而照之湏臾見水族萬品其夜夢人謂嶠曰與君幽明道隔何意相照嶠惡之忽中風至鎮旬日而卒又曰楊雄為春陽令舉兵拒王敦城䧟為敦所擒初雄被執之日其夜夢乗車挂肉其傍占曰夫肉必有筋斤也車傍於斤吾其戮乎尋為王敦害之續晉陽秋曰苻堅之遣慕容垂侍中權翼諫不聽於是翼乃夜私遣壯士要路而擊之垂是夜夢行路路窮顧見孔子墓傍墓有八覺而心惡之召占夢者占之曰行路窮道盡也不可行孔子名丘八以配丘此兵字路必有伏兵深宜慎之于是垂遂别路而進翼伏兵遂不擒之前凉録曰張駿十二年五月駿有疾夢出遊不識其處見一元龜向之張口而言更九日當有加問遂經九日而卒前趙録曰劉曜末年夢三人金靣丹脣東向逡廵不言而退曜拜履其跡太史令任義曰三者厯運之極東為震王者之始次也金為兊物衰落也脣丹不言事之畢也逡廵揖讓舍之道也為之拜者屈伏於人履跡而行慎不出疆兵必大起逺在三年曜為石勒所擒前燕録曰慕容雋夜夢石虎齧其臂覺遂痛惡之曰死胡安敢夢生天子伐掘之數其罪鞭其尸投之障水俄寢疾而死沈約宋書曰少帝凶暴日甚沈慶之猶盡言諫諍遣􅂟之從子攸之齎藥賜慶之於時年八十初慶之夢有人以両疋絹與之謂曰此絹足度慶之語人曰老子今年不免两疋八十尺也度無盈餘矣後魏書曰元熙于任城王澄薨前夢有人告之曰任城當死死後二百日外君亦不免若其不信試看任城家熙夢中顧瞻任城第舍四靣墻崩無遺堵焉熙惡之覺而吿所親及熙之死果如所夢又曰崔浩搆害李順基萌已成夜夢秉火􅅡順寢室火作而順死浩與室家羣立而觀之俄而順弟息號哭而出曰此輩吾賊也以戈擊之􅊖投於河寤而惡之以告館客馮景仁景仁曰此真不善也非復虛事人以火􅅡人暴之極也且兆始惡者終殃積不善者無餘慶厲階成矣公其圖之浩曰吾方思之而不能悛至後而族三國典畧曰齊李鉉字寳鼎渤海南皮人也春夏務農秋冬入學經疏之多發自於鉉嬰疾在體夜夢孔子忿其廣為疏例繫而捶之既寤之後焚其疏例尋而病愈齊書曰武帝初登位夢金翅鳥下殿食小龍子無數乃飛上天及明帝即位誅高武子孫並盡明帝名鸞故也又曰武帝時雍州刺史張敬兒未貴夢所居村社樹歘髙數千丈為雍州又夢社樹直上至天俄反伏誅梁書曰武帝初沈約齊末建議廢齊和帝後夢和帝以刃斷其舌約大懼召巫言與夢同竟憂卒唐書曰太宗時徐慶為征遼判官有一典不得姓名慶在軍忽夢已化為羊為典所殺覺懼流汗至曉典判案慶問曰汝夜有夢否典云夢公為羊某屠之由是慶不食羊則天時慶至司農少卿雍州司馬時典已任大理獄丞後慶被誣與内史令裴炎通謀應接英公徐敬業揚州反被執送大理忽見丞押獄慶流涕謂曰征遼之夢今當應之及被戮竟是丞引之又曰杜牧知命年得病自為墓志祭文又嘗夢告曰爾改名畢踰月奴自家來吿曰炊將熟而甑裂牧曰皆不祥也俄又夢書片紙曰皎皎白駒在彼空谷寤而嘆曰此過隙也吾生於角昴畢於角為第八宫吾之甚厄也予自湖守遷舍人木還於角足矣其年以疾終又曰韋温為宣歙觀察使明年瘍生於首謂愛聓張復魯曰予任書郎時夢二黄衣人齎符來􅇷及滻將渡一人續至曰彼墳至大功湏萬日遂不涉而寤計今萬日矣與公訣矣明日卒又曰崔湜與尚書右丞盧藏用同配流俱行湜謂蔵用曰家弟承恩或冀寛宥因遲畱不速進行至荆州夢於講堂照鏡曰鏡者明象吾當為人主所明也以告占夢人張由由退曰講堂者受法之所鏡者於文為立見金此非吉徴其日􅇷使至縊於驛中唐新語曰毌􅀢俱永切直集賢無何以熱疾暴終初􅀢夢着衣冠上北邙山親友相送及至山頂迴不見一人意甚惡之及卒僚友送葬北邙山咸如所夢吕氏春秋曰齊莊公之時有士曰賓卑聚夢有壯士從而叱之唾其面惕然而寤終夜坐不自快明日召其友而告之曰吾年六十而無所挫辱吾將索之得之則可不得將死之每朝立乎衢三日不得退而自殺桓譚新論曰愽士弟子韓生連三夜有惡夢以問人人教晨起厠中祝之三旦人告以為祝詛捕治數日死元晏春秋曰十二月乙丑夕夢至京師自廟出見車騎甚衆以物呈廟云誅大將軍曹爽寤以吿梁析析曰君欲作曹人之夢乎朝無公孫疆予曰爽無叔振鐸之請苟失天機敗矣何待於疆益都耆舊記曰何袛嘗夢井中生桑以問占夢趙直直曰桑非井中之物然桑字四十下有八君夀恐不過此後果如直言管輅别傳曰輅見何尚書何曰頃連夢青蠅數十來在鼻上驅之不肯去何也輅曰夫鼻者艮也天中之山而蠅集之位峻者危輕豪者亡后遂被誅搜神記曰吳時嘉興徐伯始病使道士吕石安神座石有弟子戴本王思二人居住海鹽伯始迎之以助石晝卧夢上天北斗門下見外鞍馬三疋云明日當以一迎石一迎本一迎思石夢覺語本思如此死期至可急還與家别不卒事而去伯始怪而畱之曰懼不見家也間一日三人同日死搜神記曰㑹稽謝奉與永嘉太守郭伯猷善謝忽夢郭與人於浙江上爭摴蒱錢為水神所責墮水死已營理郭凶事既覺便往郭許共圍棋良乆謝云卿知吾來意不因說所夢郭聞之悵然云信與人爭如卿所夢何期大的的也湏臾如厠便倒氣絶謝營理之如所夢異苑曰苻堅將欲南師也夢葵生城内明以問婦婦曰若征軍逺行出難為將也堅又夢地東南傾復以問云江左不可平也君無南行必敗之應也堅不從卒敗又曰陳郡殷靈均義熙中為桂陽太守夢人縛將去形神乖散復有一人云且置在作衡陽當取之殷驚寤惆悵永初三年除衡陽郡知𠖇理難避辭不免尋寢疾而亡述異記曰陶繼之為秣陵令殺刼其中一人是大樂伎不為刼而陶逼殺之將死曰我實不作刼遂見枉殺若見鬼必自訴理少時陶夢見此妓來云訴天得雪今來見取遂跳入陶口中仍落腹而倒俄而陶遂病死又曰姚萇既殺苻堅與苻登相拒於隴東萇夜夢堅將天帝使者勒兵馳入萇營以矛刺萇正中其隂萇驚覺隂腫痛明日遂死幽明録曰魏武帝猜忌晉宣帝子非曹氏純臣又嘗夢三疋馬在槽中共食意尤憎之因召文明二帝告以所見並云防理自多無為横慮帝然之後果害族移器􅊖如夢焉又曰王丞相茂宏夢人欲以百萬錢買大兒長豫丞相甚惡之潛為祈禱者備炭作屋得一窖錢料之百萬億大懼一皆藏閉俄而長豫亡又曰隴西秦嘉字士㑹雋秀之士婦曰徐淑亦以才美流譽桓帝時嘉為曹掾赴洛淑歸寧於家晝卧流涕覆面嫂怪而問之云適見嘉自說住津鄊亭病亡二客俱畱一客守䘮一客齎書還日中當至舉家大驚書至事如夢集異記曰陽平宋謹善解夢有孫氏求官睡得夢雙鳳集其兩拳以問謹謹曰鳳凰非梧桐不棲非竹實不食卿當大凶非苴杖即削杖也後孫氏果遭母䘮又曰張天錫在凉州夢一緑色狗形甚長從城東南欲齚張張牀上避匝乃墮地後苻堅遣苟萇往破張着緑地錦袍從東南門入皆如夢焉太平御覽卷四百
