body:
  text: 太平御覽巻三百五十八宋李昉等撰兵部八十九鞍轡鞚勒鑣鞍説文曰鞍馬靸具也漢書曰孝宣許皇后元帝母也父廣漢昌邑王侍郎從武帝上甘泉誤取他郎鞍以被其馬發覺吏劾從行而盜當死者詔下蠶室後為宦者丞司馬彪漢書曰光武徴趙喜引見賜鞍馬待詔公車東觀漢記曰景丹將兵詣上上勞勉丹出至城外兵所下馬坐鞍旃毾登上又曰王莽誅諸謀者季次元聞事發覺被馬欲亡馬駕在轅中惶遽著鞍上馬出門顧車乃自覺止又曰章帝曰明德后時廣平鉅鹿樂城王在邸入問起居朕從上望見車騎鞍勒皆純黑無金銀采飾馬不踰六尺於是以白太后即賜錢各五百萬英雄記曰呂布刺殺董卓與李傕戰敗乃將數百騎以卓頭擊馬鞍走出武關魏志曰許禇從討韓遂馬超於潼關太祖將北渡臨河濟先渡兵獨與禇及虎士百餘人留南岸斷後超將步騎萬餘人來奔太祖軍矢下如雨褚乃扶太祖上船賊戰急軍爭濟船重欲没禇斬攀船者左手舉馬鞍蔽太祖船工為流矢所中死禇右手並棹船僅乃得渡是日微禇幾厄又曰太祖馬鞍在庫為䑕所齧庫吏懼死鄧哀王冲以刀穿單衣如䑕齧者謬有愁色太祖問之冲曰俗以䑕齧衣者其主不吉太祖曰此妄言耳俄而庫吏以齧鞍問太祖笑曰兒衣在側而齧况懸柱乎魏略曰五官將知王忠昔常噉人時因從駕出行令取冡間髑髏著忠擊馬鞍以為嬉笑呉志曰曹公破走魯肅先還權大請諸將肅將入閣拜權起禮之謂曰子敬孤持鞍下馬相迎足以顯卿未肅趨進曰未也衆人聞之無不愕然就坐徐舉鞭曰願至尊威加乎四海總括九州克成帝業更以安車蒲輪徴肅始當顯耳權拊掌欣笑又曰孫權每田獵乘馬射虎常突前攀持馬鞍張昭變色而前曰將軍何有當爾夫為人君者謂能駕禦英雄驅使羣臣豈謂馳逐於原野校勇於猛獸者乎如有一旦之患奈天下笑何後魏書曰傅永有氣幹拳勇過人能手執鞍橋倒立馳騁江表傳曰孫策討祖郎生獲之策謂郎曰爾昔斫孤馬鞍今創軍立事除棄宿恨汝莫怨怖郎叩頭謝罪即破械賜衣署門下賊曹魏百官名曰紫苷題頭髙橋鞍一具三輔决録曰平陵士孫奮富聞京師梁冀知奮儉恡以鏤衢鞍遺奮從貨五千萬西京雜記曰武帝時身毒國獻白光琉璃鞍在暗室光照十丈又曰武帝得貳師天馬造玫瑰䂖為鞍異苑曰昔有人乗馬山行遥望岫裏有二老公相對摴蒱遂下騎造焉以䇿拄地而觀之自謂俄頃視其馬鞭漼然已爛顧瞻其馬鞍體骸枯朽既還至家無復親屬一慟而絶六韜曰車騎之將軍馬不具鞍勒不備者誅陸景曲記曰周世以膏腴之沃壤豐鎬之寳地大啓封境以封秦釋鞍授鞚假驥他人欲無陵已其可得乎傅𤣥馬射賦曰百馬齊興六驥孔閑金銜玉羈文防鏤鞍明珂景服華叢采鮮古樂府左延年從軍詩曰從軍何等樂鞍一驅乗雙駮馬照人目龍驤自動作謝惠連詩曰挂鞍長林側飲馬修川湄劉琨扶風歌曰撃馬長松下發鞍髙岳頭魏曹植上銀鞍表曰於先武皇帝代勅賜銀鞍一具初不敢乗謹奉上宋劉義恭謝金梁鞍啓曰賜臣供御金梁橋鞍制作精巧冝副龍駟聖慈下逮猥垂光賜後漢李尤鞍銘曰驅騖馳逐騰躍覆跩雖其㨗習亦有顛沛井羸其瓶罔不斯敗轡釋名曰轡紼也言牽引紼綟以制馬也詩曰我馬維駒六轡如濡又曰我馬維駱六轡沃若又曰駟驖孔阜六轡在手周禮曰挈壺氏挈轡以令舍又曰大馭掌馭王路以祀及犯軷王自左馭馭下祝登受轡犯軷遂驅之家語曰古者天子以内史為左右手以德法為銜勒以百官為轡善御馬者正衘勒齊轡䇿均馬力和馬心故口無聲而馬應轡䇿不舉而極千里善御人者一其德法正其百官均齊人力和安人心故令不再人順從刑不用而天下理矣又曰善御馬者正身以總轡又曰閔子騫為費宰問政於孔子孔子對曰君者人也吏者轡也刑者䇿也人君之政執其轡䇿而已矣又曰孔子適衛衛將軍文子問曰今齊之以刑而猶弗勝何禮之齊也孔子云禮譬之於御則轡也漢春秋曰大駕公卿奉引大僕執轡大將軍陪乗光武東京郊祀法駕則河南尹奉引奉車都尉執轡侍中叅乗孔叢子曰夫子云夫政令者人君之銜轡所以制下也管子曰凡赦者小利而大害也故乆而不勝其禍故赦者馬之委轡也無赦者痤疽之礦石也列子曰凡御者得之於衘應之轡得之手應於心淮南子曰權衡者人主之輿爵祿者人臣之衘轡矣又曰王良造父御也上車攝轡馬為齊整班固東廵頌曰乗輿動色羣后屏氣萬騎齊鑣千乗弭轡魏明帝善哉行曰百馬齊轡御由造父後漢李尤轡銘曰轡衘在手急緩必時賞罰在心中和是思馬知良御進取道里人知善政令行禁止鞚張揖埤蒼曰靮音的馬韁也鞚馬勒也􅀈音面䩭音覊勒靻也靻音祖柔皮也服䖍通俗文曰所以制馬口曰鞚環濟吳紀曰大皇帝征合肥未下因徹軍還兵吕䝉等共留津北魏將張遼奄至圍數重􅂪等死戰既破圍上馬出升浮橋南已絶丈餘無板谷利時為親近監白曰至尊牢攝鞍緩鞚利常着鞭以增馬勢於是得渡晉書曰温嶠字太真王敦舉兵内向六軍敗績太子將自出戰嶠執鞚諫太子乃止晉起居注曰冠軍將軍王浹表臣已發許昌城内北人諸將孫凱等謀欲逼臣留身驅遣南人臣初出城門乃相纒繞牽臣馬鞚臣手刃斬截僅乃得出應瑒馳射賦曰放鞚長騁神足奔越終節三驅矢不虛發陳琳武庫賦曰馬則飛雲絶景直鬐騧騮走駿驚飊步象雲浮受銜斯遊歛鞚則止傅𤣥銀馬賦曰奮舋沛艾虎據麟跱望雲睇景乘虛四起縱銜則任攬鞚則止成公綏射兔賦曰收輔車之雙轡舎良馬之長鞚禽迅羽之輕焱截逸足之狡弄盈得獲於後乘充庖㕑之所貢夏侯湛征邁辭曰上伊闕兮臨川柎駿馬兮授鞍中衢兮載歎歛鞚兮盤桓閔鴻與劉子雅書曰若能控奔驥以接駑乘則力追者萬羣傾循趐以顧短翮則歸飛者如雲勒劉芳毛詩箋音義証曰轡是御者所執者也不得以轡為勒且舊語云馬勒不云轡以勒為轡者蓋是北人避石勒名也今南人皆云馬勒而以鞚為轡反覆推之此為明証又詩稱執轡如組又曰六轡在手以所執為轡審矣今俗儒咸以轡為勒而曽無悟者家語曰閔子問政於孔子孔子曰不能御民者棄其德法專用刑辟譬猶御馬棄其衘勒而專用箠䇿馬必傷車必敗無德法而用刑民必流國必亡漢書曰呼韓耶單于甘露三年正月朝天子於甘泉宫賜以冠帶衣裳玉具劒安革勒一具馬十五疋王隠晉書曰愍懷太子好卑車小馬小牛令左右騎斷羈勒使墮地蕭方等三十國春秋曰凉州胡安據盗發張駿墓得珊瑚馬鞭馬腦鍾黄金勒鄴中記曰虎韓勒呼馬勒曰轡羅勒曰香菜永昌記曰哀牢王出入射獵騎馬金銀鞍勒如翠毛之飾淮南子曰鴈門之北狄不糓食賤長貴壯各上氣力人不弛弓馬不解勒便之也説苑曰田子方度西河造翟黄翟黄乘軒車載華蓋黄金之勒約鎮簟席如此者具駟十八乘子方望以為人君翟黄至而子方曰子人臣也將何以至此對曰此皆君之賜也臣進五大夫禄爵倍以故至如此韓陽天文要集曰造父五星在傳舎南造父洗馬轡勒銜鑣棗據詩曰騏驥伏吳坂不與伯樂俱駑馬同銜勒豈得獨卓殊魏文帝馬腦勒賦曰馬腦玉屬也出自西域文理交錯有似馬腦故其方人因以名之或以繫頸或以飾勒余有斯勒美而賦之命陳琳王粲並作詞曰夫珍物寄中山之崇崗稟金德之靈施含白虎之華章扇朔方之𤣥氣喜南離之焱陽歙中區之黄彩曜東夏之純蒼苞五色之明麗配皎日之流光内炤浮景外鮮文繁竒章異彩的爍其間爾乃藉彼朱􅄢華勒用成駢居列跱煥若羅星應瑒馳射賦曰群駿籠茸於衡首咸皆腰䮍與飛兔隴修勒而容與並軒翥而厲怒陳琳馬腦勒賦曰五官將得馬腦以為寳勒美其英綵之光艶也使琳賦之爾乃他山為錯荆和為理制為寶勒以御君子王粲馬腦勒賦曰因姿象形匪彫匪刻厥容應規厥性順御世嗣之駿服兮表騄驥之儀王沉馬腦勒賦曰厥象伊何如規之盈鮫鱗紆鬰白黒殊形如氷之㓗如玉之貞固乾坤之所育兮匪雕鏤而自成爾乃施飾龍首加服鸞鑣和鈴鏘鏘廻景逍遥鑣釋名曰鑣包也所以在傍苞鈒其口也說文曰鑣馬銜也銜馬勒口中也爾雅曰鑣謂之钀詩曰游於北園四馬既閑輶車鸞鑣載獫歇驕毛萇曰輶軒也獫歇驕田犬也鄭𤣥曰軒車驅逆之車也置月於鹿者異於乗車也釋智匠古今樂録曰明帝休成之樂歌曰玉鑣息節金輅懷音文士傳曰山巨源為吏部郎欲舉嵇康自代康聞與之書曰譬猶禽鹿少見馴育則服敎從制長而見羈雖飾以金鑣饗以嘉肴愈思長林而志在豐草魯國先賢志曰黄伯仁龍馬頌曰揚鑣鸞兮揮紅沫之播飄鹽鐡論曰古者庻人賤騎繩控草提皮薦而已及其後革鞍攻成鐡鑣不飾又曰古者樵車無輪棧車無􅦫其後木鈴不衣長轂敗幅今富者銀黄華左搔以結緌錯鑣塗朱珥靳飛軨楚辭曰絶鑣銜以馳騖兮暮着次而敢止路蕩蕩其無人兮逺不御兮千里棗據詩曰貞偽各有分駑驥不齊鑣陶琬之詩曰我服既暉我駟既閑揚鑣警路哀籥清綿桓𤣥集載琬之為江州主簿宋文帝登景陽樓詩曰士女炫街里軒冕曜都城萬軫揚金鑣千舳樹蘭旌袁淑游新亭曲水詩序曰離榭修幕陵􅎬彌阜鑣容斾綵裛野麗雲鮑昭詩曰飛鑣出荆路騖服入秦州王沉踐行賦曰六龍齊鑣鸞聲振振景動波廻天行星陳張恊𤣥武館賦曰天子翺翔郊甸順時廵省龍駟騰鑣羽騎遊騁顧流光以鞍轡廻鸞旗而時幸李充穆天子賦曰其馬則赤驥盗驪驊騮騄耳揚和齊鑣一􅕿萬里董子曉乗輿駮馬賦曰軀觀若斯氣勢雲披銜金鑣着玉羈顏延之七繹曰梓工飾雕簟之輿涓人進龍圖之馬􅀈駕則眩奪鳳蓋振鑣則圏促凾夏故動軔馳光舉䇿流赭張委九愍曰映金箱之羽蓋鳴玉衡之鸞鑣望天路以振䇿指萬里於崇朝殷琰宣貴妃誄曰嚴位服於旗容尚徽謚於銘策節哀路於蕭鐘齊行鑣於輬翟應璩與劉文達書曰僕頃倦遊談之事欲修無為之術不能與足下齊鑣騁轡爭千里之表也桓温與慕容􅀈書曰自滄流以北幽朔以東將軍皆以羈落而緫率之矣首尾脣齒左右力用鳴鏑揚鑣動數十萬太平御覽卷三百五十八
