body:
  text: 太平御覽卷九百十一宋李昉等撰獸部二十三易説卦曰艮為䑕春秋運斗樞曰王衡星散而為䑕説文曰䑕穴蟲之總名也䶅䑕出北地䶉竹䑕也似䑕而大鼨音終豹文䑕也鼷小䑕也鼩精鼩其俱切北地風䑕也鼢䑕地行伯勞之所化也䶄䑕䶄令䑕也䶄音平爾雅曰鼢䑕地中行者鼸䑕以頰中蔵食鼷䑕有螫毒鼶音斯䑕夏小正日鼶鼬則穴鼬䑕似鼦赤黄色大尾啖䑕江東呼為鼪鼪音生鼩䑕音劬小鼱鼩也鼫䑕形大如䑕頭似尾有毛青黄色好在田中食粟豆關西呼為鼩䑕鼤䑕鼨䑕豹文鼮䑕音庭文彩如豹􅂒䑕音狐覔切似䑕而大蒼黑色在樹上又鼯䑕夷由狀如小狐似蝙蝠者亦謂之蝙蝠肉翅飛且乳亦名飛生音如人呼食火煙廣志曰白猿長尾白腹善縁登若家䑕小異者鼢䑕深目而短尾苖䑕者野䑕也小而短尾天䑕以皮為裘今常名其裘為天鹿裘黄䑕在田野間為羣害穀麥善走凡狗不得唯䑕狼能得之左傳曰齊侯將為臧紇田與之邑紇聞之見齊侯與之言伐晉對曰多則多矣抑君似䑕夫䑕晝伏夜動不穴於寢廟畏人故也今君聞晉之亂而復作焉寧將事之非䑕而何乃弗與田詩曰誰謂䑕無牙何以穿我墉誰謂汝無家何以速我訟又曰碩䑕刺重歛也碩䑕碩䑕無食我黍又曰相䑕刺無禮也相䑕有皮人而無儀人而無儀不死何為大戴禮曰正月田䑕出田䑕者鼸䑕也啇義䟽曰爾雅鼫䑕許慎云五伎䑕也今之河東有碩䑕大能人立交前兩脚於頭上跳舞善鳴食人禾苗逐則走入樹空中亦有五使或謂雀䑕其形大故序云石䑕也詩言其方物宜謂此䑕非今大鼠也又不食禾苗本草又謂螻蛄為碩䑕亦有五伎古今方士名蟲鳥物異名同故記也史記曰李斯少時為郡小吏見吏舍厠中䑕食不潔遇人犬數驚恐之入倉見倉中䑕食積粟居大廡絶無人犬之憂乃歎曰人賢不肖譬如䑕在所自處耳又曰張湯杜陵人也其父為長安丞出外湯為兒守舍而䑕盗肉其父還怒乃笞湯湯掘得盗䑕及肉掠治訊鞫論報并取䑕與肉具獄磔堂下其父見之視其文辭如老獄吏大驚遂使書獄漢書曰右馮翊韓延夀有罪下獄楊惲上書訟延夀郎中丘常謂惲曰聞君侯訟韓馮翊當得活惲曰事何容易我不能自保眞人所謂䑕不能容穴銜寠藪故也又曰蘇武使匈奴徙武北海上掘野䑕草實而食之又曰廣陵王胥将作亂䑕舞王后庭又曰燕刺王旦將作亂䑕舞殿端門魚豢魏畧曰大秦國有辟毒䑕魏志曰臧洪為袁紹所圍糧乏乃掘䑕而食之又曰太祖時用刑嚴重太祖馬鞍在庫為䑕所嚙庫吏懼罪必死議欲面縳首罪猶慮不免其咎鄧哀王冲謂曰待三日中然後自歸冲於是以刀穿單衣如䑕嚙者謬為失意貎有愁色太祖問之冲對曰世俗以為䑕嚙衣者其主不吉今單衣見嚙是以憂蹙太祖曰此妄言耳無所苦也俄而庫吏以嚙鞍聞太祖笑曰衣在側尚囓况馬鞍懸柱乎一無所問晉陽秋曰大興衡陽區純作䑕市四方丈餘開四門有一木人縦四五䑕於中欲出門木人輙以木椎椎之北史曰盧昶為散騎尚書時洛陽縣獲白䑕昶奏以為瑞典外鎮刺史二千石令長不祗上命刻暴百姓怨嗟則白䑕至自陳時政多所勸誡詔書褒美其意三國典略曰齊将誅斛律光有三䑕逰於光寢光每投食與之一朝俱死床下唐書曰吐蕃有草石速古芒葉長二寸狀如針蒿每莖不過三四葉其莖蔓其花其根連珠如麥門冬有䑕長於常䑕每二三十同一穴至秋䑕皆收此草為藏多者至數石俗亦掘草根食之而留給䑕糧其國禁殺䑕殺者輒加罪俗亦愛之不殺也洞林曰鄉里人栁休祖婦病䑕瘻積年不差及困垂命令兒來従吾乞卦占得頥之履按卦應得人師姓石者而治之當以䑕出而愈者也休祖既歸有一賤家奴姓石自言由来能治此病且灸其三處而止婦尋差有一老䑕色正蒼黄逕就其前􅀈􅀈伏而不動呼狗囓殺之䑕頭上有灸處病便差𤣥中記曰百歲䑕化為神京房易飛候曰䑕舞於門厥咎亡䑕舞於庭厥咎誅死風角要占曰長吏厭盜賊法七月以生䑕九枚置籠中埋申子地稱九百斤土覆坎深各二尺五寸築之令堅固地鏡圖曰青玉之偽為女人黄金之見為火及白䑕百怪書曰䑕咬人衣領有福莊子曰且鳥髙飛以避矰弋之害鼷䑕深穴乎神丘之下以避重鑿之患又曰恵子相梁莊子往見之或謂恵子曰莊子来欲代子相於是恵子恐捜於國中三日三夜莊子見之曰南方有鳥其名鵷鶵子知之乎鵷鶵發於南海而飛渡北海非梧桐不止非竹實不食非醴泉不飲於是鴟得腐䑕鵷鶵過之仰而視之曰嚇今子欲以梁國相嚇我耶又曰鼷䑕飲河不過滿腹文子曰腐䑕在阼燒香於堂尹文子曰鄭人謂玉未琢者為璞周人謂䑕未腊者為璞周人乃懐璞謂鄭賈曰欲買璞否賈曰欲因出其璞視之乃䑕也因謝不取淮南子曰栁下恵見􅄳曰可以養老盗跖見􅄳曰可以粘䑕又曰孟賁探䑕穴必噬其指失其勢也孟賁勇士為探䑕於穴故曰失其勢又曰季春之月田䑕化為鴽淮南萬畢術曰狐目貍腦鼠去其穴以塗䑕穴即去被髮向北呪殺巫䑕夜有巫被髮北向禹歩呪曰老䑕不祥過者受其殃又曰投䑕者機動釣魚者浮機動發也發則得䑕浮釣浮也機動也動則得魚也又曰虞氏者梁富人也登髙樓臨大路設樂陳酒蒱博其上遊俠相隨行於樓下愽者射朋張中反兩而笑適有飛鳶墮腐䑕而中遊俠俠相與語曰虞氏富人也常有輕人之志乃辱我以腐䑕請滅其家夜乃攻於虞氏大滅其家此謂類而非也抱朴子曰南海有白䑕大者重數斤毛長三寸居空木中其毛可為布又曰陳世安年十三初為管叔本客得道叔本年七十猶拜安曰得道者當師吾不羞弟子之禮矣死王樂生䑕雖為帝王死不及生䑕又曰玉策記稱䑕壽三百滿者則色白善馮人而卜名曰仲能知一年中吉㐫及千里外之事也典語曰俊盧之狗吠扵朝門社稷之䑕嚙於堂側春秋後語曰趙恵文王二十九年秦韓相攻軍於閼與上黨有閼與聚閼烏連反與音預成音余王召亷頗問曰可救否對曰道逺險狹難救也又問樂乗對曰如亷公言又問趙奢趙奢對曰道逺險狹譬兩䑕闘扵穴中將勇者勝王乃令奢救之晏子春秋曰景公問晏子治國何患對曰社䑕者不可灌之君左右出賣寒熱入則比周此國之社䑕也山海經曰丹熏之山有獸焉其状如䑕而兎首麋耳以其尾飛名曰耳䑕可禦百毒郭璞山海經圖飛䑕讃曰或以尾翔或以髯凌飛䑕鼓翰倐然皆騰固無常所唯神所憑本草曰鼷䑕一名隱䑕形如䑕大而無尾黑色長鼻賈誼書曰鄙談云欲投䑕而忌器此善喻也䑕近於器用憚不投况貴大之臣近於帝王乎郭璞注爾雅曰漢文帝宫中得一䑕豹文彩色熒熒問羣臣皆不答孝亷郎竇攸答曰鼨䑕文帝賜縑東方朔神異經曰北方有層氷萬里厚百丈有鼷䑕在氷下出焉其形如䑕食草木肉重千斤可以作脯食之已熱除熱病也其毛長有八尺可為縟卧之可以却寒治風病也其皮可以䝉鼓其聲聞千里有美尾可來䑕此尾所在䑕輒入此聚説苑曰梁上䑕飽聞長者論幽明録曰吳北寺終祚道人卧齋中䑕從坎出言終祚後數日必當死終祚呼奴令買犬䑕云亦不畏此也但令犬入此户必死須臾犬至果然終祚乃下聲語其奴曰到市顧十擔水來䑕已逆知之云止欲水澆取我我穴周流無所不至竟日澆了無所獲宻令奴更倩三十餘人䑕云吾上屋居奈我何時處在屋上奴名周䑕云阿周盜二十萬錢將叛試開庫實如所言也奴亦叛去終祚當為商賈閉其户而謂䑕曰汝欲冨我耳今逺行勤守吾房中勿令有所零失也時桓靈寳在南州禁殺牛甚急終祚載數萬錢竊買牛皮還東貨之得二十萬還室猶閉一無所失怪亦絶遂大富列異傳曰中山王周南正始中為襄邑長有䑕衣冠出㕔事語曰爾某日當死周南不應至期復出冠幘絳衣語曰爾日中當死復不應入復更出日適中䑕曰周南汝不應死我復何道遂顛蹶而死即失衣冠視如常䑕也述異記曰宋車騎大將軍南譙王劉義宣鎮荆州府吏蔡鐵者其人善卜公嘗在内齋見一白鼠縁屋梁上乃命左右射之内置函中召鐵既至使卜函中何物卜兆成笑曰已具知矣公曰狀之鐵為之狀曰兊色之䑕被明公彎弧射之絶其左股䑕孕五子三雄而兩雌若不見信剖腹而立知公乃使剖䑕腹皆如鐵言也賜錢一萬劉敬叔異苑曰景平東陽大水永康蔡喜夫避住南壟夜有大鼠浮水而來伏喜夫奴牀角奴恐而不犯毎以飯與之水勢既退喜夫既得返故居䑕以前脚捧青紙裹三斤許珠著奴牀前啾啾如欲語也又曰南陽趙度少好異術度有白米為䑕所盜乃披頭把刀畫地作獄四面開門向東長嘯羣䑕俱到呪之曰凡非噉者過唯止者十餘乃剖腹㸔臟有米在焉許邁别傳曰邁小名映有鼠齧映衣乃作符召䑕莫不畢至於中庭映曰齧衣者留不齧衣者去羣䑕並去唯一䑕獨住伏於中庭而不敢動梁州記曰仙人唐公房祠有碑一所廟北有大坑碑文云是其舊宅處公房舉宅登仙故為坑焉山有易腸鼠一月吐易其腸束廣微所謂唐䑕者也博物志曰唐房升仙雞犬並去唯以鼠惡不將去鼠自悔一月三吐腸也劉欣期交州記曰竹風鼠如小狗子食竹根出封溪縣秦州記曰乞服虜乾歸未移抱罕金城見䑕有數萬頭將諸小鼠各銜馬屎羣移而渡洮麗二水悉上抱罕自是二年而乾歸徙焉晉太康地記曰鳥䑕之山在隴西首陽縣穴入三四尺鼠在内亦有在外鄧德明南康記曰南康山石室號金堂堂内金色有金䑕時見也金樓子曰齊鬱林王夜中與宦者共刺䑕至曉每夜輒得十籃又曰晉寧縣界内出大鼠䑕狀如牛土人謂之偃天時將水䑕則從山出遊田間散落其毛悉成小鼠苗稼盡耗後魏盧元明劇䑕賦曰嗟乎在物最為可賤毛骨莫充於賞玩脂肉不登于俎膳其為狀也􅉃惔咀吁雎離睒土濫切睗音釋鬚似麥穟半垂眼如豆角中劈耳類槐葉初生尾若杯酒餘瀝乃有羸髖寛中二音疥瘠偏多姦計衆中無敵託社忌器妙解自惜深藏厚閉巧能推覔或尋繩而下或自地高躑登機縁匱盪扉動帟切切終朝轟轟竟夕是以詩人為辭實云其碩盜干湯之珍俎傾留髠之香澤傷繡領之斜製毁羅衣之重襲曹舒由是獻規張湯為之被謫亦有閒居之士倦遊之客絶慶弔以養真素屏左右而尋詩易庭院肅清房攏虛寂爾乃羣䑕乗間東西攛擲或牀上捋髭或户間出額貎甚舒暇情無畏惕又領其黨與欣欣奕奕欹覆箱奩騰踐茵席共相悔慢特無宜適訝天壤之含𢎞産此物其何益太平御覽卷九百十一
