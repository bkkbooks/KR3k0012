  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_392-1a, image: WYG0896/WYG0896-0471a.png}
body:
  text: 太平御覽卷三百九十二宋李昉等撰人事部三十三吟嘯嚬吟釋名曰吟嚴也其聲本出于憂故愁聲嚴肅使聽之悽歎也說文曰吟歎也毛詩闗雎序曰吟咏情性以諷其上東觀漢記曰梁鴻常閉户吟咏書記遂潜思著書十餘萹魏志曰管輅随軍而行過母丘儉墓下倚樹哀吟精神不樂人問其故輅曰林木雖茂無形可久碑誄雖美無復可守𤣥武蔵頭蒼龍無足白虎銜尸朱雀悲哭四危以備法當㓕族不過二載應至矣卒如其言蜀志曰諸葛亮字孔明早孤躬耕隴畆好為梁甫吟每自比于管樂唐書曰蔡允恭荆州江陵人有風彩觧綴文雅善吟咏煬帝所屬詞賦多令諷誦之荘子曰北門成問黄帝曰帝張咸池之樂扵洞庭之野吾聞之藹藹黙黙乃不自得帝曰吾奏以隂陽之和燭以日月之明其聲能長慮之不知望之不見矘然立扵四墟之通倚槁梧而吟又曰荘子謂恵子曰今子外乎子之神勞乎子之精依樹而吟處槁梧而瞑文士傳曰李康清廉有志節不能和俗為鄉里豪右之所共害故官塗不進作逰山九吟辭曰盖人生天地之間若流電之過户牖輕塵之棲弱草矣湘中記曰渉湘千里但聞漁父吟中流相和其聲綿邈也盛𢎞之荆州記曰新城郡瀙音初勤切水别有一溪其傍有白馬塞孟達登之嘆曰金城千里遂為上瀙吟彼方人猶傳此聲韻悽激其哀思之音乎西京雜記曰相如将聘茂陵人為妾文君作白頭吟鹽鐵論曰曽子倚山而吟山鳥下翔世說曰韓夀美姿容賈公辟為掾充每聚會其女扵青璅中看見夀心甚恱之乃問其婢識此人不婢說是其先主女内懐存想發於吟咏婢後徃夀家具說如此并言女色麗夀聞之心動乃因婢通意婢以白女女大喜乃期徃宿夀趫健絶人乃踰墻而入家中莫知自是賈公覺女恱暢有異扵常陳武别傳曰陳武字國本休屠胡人常騎驢牧羊諸家牧䜿十數人或有知歌謡者武遂學太山梁父幽州馬客吟及行路難之屬阮籍樂論曰漢順帝上恭陵過樊濯聞鳥鳴而悲泣下横流曰善哉鳥鳴使左右吟之使聲若是豈不佳乎此謂以悲為樂也王粲登樓賦曰鍾儀幽而楚奏莊舄顯而越吟嘯說文曰嘯吟也雜字觧詁曰嘯吹聲也毛詩江有汜曰之子歸不我過不我過其嘯也歌歌人哨口而出聲也又白華曰嘯歌傷懐念彼碩人後漢書曰南陽太守成瑨委功曹岑晊郡中謡曰南陽太守岑公孝𢎞農成瑨但坐嘯漢晉春秋曰桓帝幸樊城百姓莫不觀有一老父獨耕不輟議郎張温使問焉父嘯而不答魏略曰諸葛亮在荆州逰學毎晨夜常抱膝長嘯魏氏春秋曰阮籍少時嘗逰蘇門山山有隠者莫知其姓名有竹實數斛臼杵而已籍從之與談太古無為之道論五帝三王之義翛然曽不盼之籍乃嘐然長嘯音韻響亮蘇門生逌爾而笑籍既降蘇門生嘯若鸞鳯之音晉陽春秋曰嵇康見孫登對之長嘯逾時不言康辭還曰先生竟無言乎登曰君才則髙矣保身之道不足晉中興書曰桓石秀風韻秀徹叔父冲嘗與石秀共獵獵徒甚盛觀者傾坐石秀未嘗瞻盼嘯咏而已晉書曰石勒年十四随邑人行販洛陽倚嘯上東門王衍見而異之謂左右曰向石勒吾觀其聲視有竒志将恐為天下之患馳遣收之㑹勒已去又曰謝奕桓温辟為安西司馬猶推布衣之好在温座岸幘嘯詠無異常日温曰我方外司馬又曰王徽之在吴中一士大夫家有好竹欲徃觀之乃徑造竹下諷嘯良久主人洒掃施設徽之不頋將去主人閉門不聼出乃盡歡而去又曰謝鯤隣家髙氏有女常徃挑之女方織以梭投折鯤齒既歸傲然長嘯曰猶不廢我嘯也趙書曰石勒屯葛陂值天雨不息勒長史刀應勸勒降晉勒愀然而嘯張賔勸勒還北勒攘臂曰賔計是也應宜斬吴越春秋曰越王念吴欲復之乃中夜抱拄而哭哭訖承之以嘯扵是羣臣咸曰君王何愁心之甚也夫復讐誅敵非君王之憂自是臣下之急務又曰吴王闔閭將欲伐楚登臺南向而嘯有頃而嘆羣臣莫有曉王意者子胥乃薦孫子孫子者吴人名武善為兵法僻隠幽居世人莫知其能英雄記曰向栩為性卓越不凡好讀老子状如學道又復似狂居嘗北坐被髮喜長嘯人客従就輙伏不視人有扵栩前獨拜栩不答山海經曰玉山者是西王母所居也西王母其状如人豹尾虎齒而善嘯蓬髮戴勝蓬髮亂髮勝玉勝也荘子曰童子夜嘯鬼數若齒孫登别傳曰孫登字公和汲郡共縣人清静無為其情志悄如也好讀易彈琴頽然自得觀其風神若逰六合之外當魏末共處北山中以石室為宇編草自覆阮嗣宗聞登而徃焉適見公和苫盖被髮端坐岩下鼓琴嗣宗自下趨進既坐莫得與言嗣宗乃嘹嘈長嘯與琴音諧㑹雍雍然登乃逌爾而笑因嘯和之妙響動林壑風清太𤣥竹林七賢論曰阮籍字嗣宗性樂酒善嘯聲聞百歩箕踞嘯歌酣放自若時蘇門山中忽有真人在焉籍親徃尋其人扵巖巔遂登嶺従之箕坐相對籍乃商略終古以問之屹然不應籍因對之長嘯有頃彼乃斷然嘆曰可更作籍又嘯意盡退還半嶺巔􅀈然有聲若數部鼓吹顧瞻乃真人之嘯也王廙别傳曰王導與庾亮逰于石頭㑹遇廙至是日迅風飛帆廙倚樓而嘯神氣甚逸王子年拾遺記曰太始二年南方有因霄之國人皆善嘯聲大丈夫嘯聞五里婦人嘯聞五十里如笙竽之音秋冬則聲清髙春夏則聲沉下人舌尖處倒向喉内亦云有兩舌重沓以爪徐剖之則嘯聲愈逺故吕氏春秋云反舌殊鄉之國即此之謂也烈女傳曰魯漆室之女者過時未適人當穆公之時君老太子幼女倚柱而嘯鄰人婦従謂曰何嘯之悲也子欲嫁乎女曰吾憂魯君老而太子少也西京雜記曰東方生善嘯每一曼聲長嘯輙塵落瓦飛郭子曰劉道真少時劉寳字道真髙平人安北将軍漁釣而憊扵草澤善歌嘯聞之者無不留連有一老嫗識其非常人甚樂歌嘯乃殺豚進真食豚盡了不謝世說曰晉文王徳盛功大座席嚴敬擬扵王者惟阮籍在坐箕踞嘯歌酣飲自若又曰劉越石為胡騎所圍數日窘廹無計劉依夕乗月登樓清嘯胡賊聞之皆悽悲長歎又曰謝太傅盤桓東山時與孫興諸人泛海風起浪湧諸人色動並喝使還太傅神情方雅王逸少吟嘯不言又曰王子猷嘗寄人空宅便令種竹嘯詠良久直指竹曰何可一日無此君又曰謝萬北征嘗以嘯詠自髙未嘗撫慰衆士謝公謂曰汝為元帥宜數喚諸將慰勞之萬都無其說直以如意指四座曰諸公皆是勁卒諸将甚怨之搜神記曰趙炳嘗臨水従船人乞渡船人不許炳乃張盖坐其中長嘯呼風亂流而濟潯陽記曰桓宣穆使人尋廬山見一人謂之曰君過前嶺必逢二年少相随長嘯試要問之若不語言者可速去此人過嶺果見二年少以袂掩鼻長嘯状如惡獸呼不與言神境記曰營道郡西靈源山有石髓紫芝昔有採藥此山聞林谷間有長嘯者今樵人徃徃猶聞焉異苑曰潯陽姑石在江之坻初桓𤣥西下令人登之中嶺便聞長嘯聲甚清徹至峰頂見一人蹊踞石上嘯㫖曰其氣激扵喉中而濁謂之言激扵舌端而清謂之嘯言之濁可以通人事達情性嘯之清可以感鬼神致不死出其言善千里應之出其嘯清萬靈授職故古之學道者重矣又曰太上道君授扵西王母西王母授扵南極真人南極真人授扵廣成子廣成子授扵嘯父嘯父授扵務光務光授扵舜演之為琴以授禹自後而廢續晉太行山仙君孫公得之乃得道而無所授焉阮嗣宗所得少分其後酒嘯不復聞矣又曰嘯有一十五章一曰權輿嘯之始也二曰流雲乃古之善嘯者聴韓俄之聲而冩之三曰深溪虎古之善嘯者聴溪中虎聲而冩之四曰髙栁蟬古之善嘯者聴而冩之五曰空林夜鬼古之善嘯者夜過空林聞而冩之六曰巫峽猿古之善嘯者聞而冩之七曰下鴻鵠出扵師曠演清角之音善嘯者冩之八曰古木鳶九曰龍吟善嘯者聞而冩之十曰動地出於孫公其音亦師曠清徴也十一曰蘇門孫公隠蘇門山之作也十二曰劉公命鬼仙人劉根之所為也十三曰阮氏逸韻阮籍所作也十四曰正章深逺極大非常聲也十五曰畢者五音之極而大道畢矣晉成公綏嘯賦曰逸羣公子體竒好異傲世忘榮絶棄人事扵是延友生集同好精性命之至機研道徳之𤣥奥邈跨俗而遺身乃慷慨而長嘯發妙聲扵丹脣激哀音於嗒齒響抑揚而潜轉氣衝欝而熛起恊黄宫扵清角雜商羽扵流徴飄逰雲於泰清集長風乎萬里諒自然之至音非絲竹之所擬桓𤣥與袁宜都書論嘯曰讀卿歌賦序詠音聲皆有清味然以嘯為髣髴有限不足以致幽者將未至耶夫契神之音既不俟多瞻而通其致苟一音足以究中和之極阮公之言不動蘇門之聽而㣲嘯一鼔𤣥黙為之觧顔若人之興逸響惟深也哉袁山松答書曰嘯有清浮之美而無控引之深歌窮淵根之致用之彌覺其逺至乎吐辭送意曲究其奥豈脣吻之切發一徃之清吟而已若夫阮公之嘯蘇門之和盖感其一竒何為徴此一至大疑嘯歌所拘耶嚬韓子曰韓昭侯使人蔵敝袴或曰君亦不仁矣敝袴不以賜左右而蔵之昭侯曰吾聞明君愛一嚬一笑袴之與嚬笑相去逺矣吾必待有功故蔵之未有與也莊子曰西施病心而嚬其里之醜人見而美之歸亦捧心而嚬其里之富人見之堅閉門而不出貧人見之挈妻子而去之走彼知美嚬而不知嚬之所以美嵇康髙士傳曰於陵仲子齊人常歸省母人饋其兄鵝仲子嚬蹙曰惡用是鵝者哉太平御覽卷三百九十二
