front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_072-1a, image: WYG0893/WYG0893-0578a.png}
body:
  text: 太平御覽卷七十二宋李昉等撰地部三十七藪澤陂藪說文曰藪大澤也周禮曰揚州之澤藪曰具區荆州之澤藪曰雲夢豫州之澤藪曰圃田青州之澤藪曰望諸兖州之澤藪曰大野雍州之澤藪曰弦蒲幽州之澤藪曰貕飬冀州之澤藪曰揚紆并州之澤藪曰昭餘祁國語曰榖洛鬬將毁王宫王欲壅之太子晉諫曰古之長民者不隳山不崇藪不防川不竇澤夫山土之聚也藪物之歸也又曰其後伯禹念前之非度度法釐改制量象物天地比類百則儀之於民而度之於羣生共之從孫四岳佐之髙髙下下䟽川導滯鍾水豐物豐殖九藪滌越九原宅居九隩隩内也九州之内皆可宅居也合通四海故天無伏隂地無散陽水無沉氣火無災燀神無間行民無淫心時無逆數物無害生師象禹之功度之于軌儀莫不嘉績克厭帝心皇天祐之祚以天下爾雅曰魯有大野今髙平鉅野縣東北大澤晉有大陸今鉅鹿北廣河澤秦有楊陓音謳今在扶風汧縣西也宋有望諸今在梁國睢陽縣東北也楚有雲夢今南郡華容縣東南巴丘湖是也吴越之間有具區今吳縣南太湖即震澤也鄭有圃田今滎陽中牟縣西圃田澤周有焦穫音互今扶風池縣陽瓠中是也燕有昭餘祁今太原鄔陵縣九澤是也齊有海隅海濵廣斥漢書曰司馬相如諭巴蜀父老文云鵰鵬已翔於寥廓之宇而羅者猶視於藪澤風俗通曰藪厚也草木魚鼈所以厚養人君與百姓者也吕氏春秋曰昭餘祁一名太昭又曰漚澤周禮并州藪俗名鄢城泊是按藪自太原祁縣連延西接至此關中記曰弦蒲藪按職方氏雍州其藪曰弦蒲晉太康地志云汧縣有蒲谷鄉弦中谷乃雍州之弦蒲也按漢書地志取蒲藪即弦蒲藪是焉水經注曰汧水源出汧山蒲谷鄉雍中谷决為弦蒲藪澤釋名曰下有水曰澤言潤澤也又曰水浹出而為澤曰掌言水渟處如掌中也今兖州人謂澤曰掌說文曰㘭澤在崑崙墟下荷澤在山陽胡陸南易曰麗澤兌君子以朋友講習又曰澤中有雷隨君子以嚮晦入宴息又曰上天下澤履君子以辨上下定民志又曰澤上有地臨君子以敎思无窮容保民无疆又曰山上有澤咸君子以虚受人又曰上火下澤暌君子以同而異又曰澤上有雷歸妹君子以永終知敝又曰山下有澤損君子以懲忿窒慾又曰澤上于地萃君子以除戎器戒不虞又曰澤上有水節君子以制數度議德行又曰澤中有火革君子以治厯明時又曰澤上有風中孚君子以議獄緩死又曰澤㓕木大過君子以獨立不懼遁世无悶又曰澤无水困君子以致命遂志又曰澤上于天夬君子以施禄及下居德則忌河圖曰大迹出雷澤華胥履之生伏犧書曰雷夏既澤灉沮㑹同孔安國注曰雷夏澤名書大傳曰舜漁于雷澤鄭𤣥注曰雷澤今屬濟寕詩曰彼澤之陂有蒲與荷周禮曰川澤其動物宜鱗物其植物宜膏物其民黑而津又曰澤虞掌國澤之政令為之厲禁使其地之人守其財物以時入之于王府頒其餘于萬民禮曰獺祭魚然後虞人入澤梁禮記稽命徵曰王者德禮之制著澤谷中有朱鳥白玉赤蛇赤龍出焉傳曰宣十五年晉侯救宋伯宗曰不可古人有言曰雖鞭之長不及馬腹天方授楚未可與争雖晉之強能違天乎諺曰髙下在心度時制宜川澤納汚受汚濁也山藪藏疾又曰衛侯奔齊孫氏追之敗公徒于柯澤濟北東阿縣西南有大澤是也又曰叔向母曰深山大澤實生龍蛇廣雅曰方澤祭地也太公金匱曰夏桀之時有苓山之水桀常以十月發民鑿山穿陵通於河民諫曰孟冬鑿山穿陵泄天氣發地藏天子失子道後必有敗桀殺之朞年苓山一旦崩為大澤戰國䇿曰淳于髠一日見七人於齊宣王王曰千里而一士是比肩而立百世而一聖若隨踵而至淳于髠曰令求桔梗於沮澤則累世不得一矣桔梗山中之草史記曰陳餘與張耳相失意解印綬付耳亡入澤中捕魚史記封禪書云上郊雍通回中道春至鳴澤漢書曰髙祖以亭長送徒驪山徒道亡到豐西澤中停飲夜皆解縱曰公等皆去吾亦從此逝矣又曰秦始皇帝常謂東南有天子氣於是東逰以厭之髙祖即自疑亡匿隱巖石之間吕后與人往求常得之髙祖怪而問之吕后曰季所居上常有雲氣故從往常得季髙祖心喜沛子弟或聞之多欲附者西域傳曰康居國西北二千里有奄蔡國控弦十萬臨大澤而居又曰河有兩源合注昌蒲海昌蒲海一名鹽澤者也去玉門陽關三百里廣袤三百里其水冬夏不增减皆以為潜行地中續漢書吳祐嘗牧豕於長垣澤中晉中興書曰劉牢之至五橋澤中敗績兵士殆盡牢之馬超五丈澗得免晉書曰陶侃少時漁於雷澤嘗網得一織梭以掛于壁有頃雷雨至遂為龍而去穆天子傳曰天子北征舎于珠澤山海經曰稷澤后稷神所憑因以為名也帝王世紀曰雀山之地一夕為大澤而深九尺戴延之西征記曰巨澤魯之西界孔子獲麟處管子見北澤燒火照臺下因曰千乘之國不可無薪而炊今北澤燒農夫得賣其薪蕘一束十倍又曰涸澤數百歳水不絶者生慶忌其狀若人長四寸黄衣黄冠戴黄蓋乗水鳥好疾馳以其名呼之可使千里外一日反報此涸澤之精也文子曰髙莫髙於天下莫下於澤天髙澤下聖人法之韓宣子曰魯燒稷澤天北風火南移恐燒國哀公懼自率衆趨救之新序曰晉君逐獸于碭入大澤迷不知所出問漁者送出澤因以諫之公令記其名漁者曰公亟反國臣亦反漁所又曰楚威王問於宋玉曰先生其有遺行與何士民衆庶不譽之甚也宋玉對曰鯨魚朝發崑崙之墟暮宿於孟瀦夫尺澤之鯢豈能與之量江海之大哉世俗之民又安知臣之所為哉風俗通曰水草交曰澤言潤萬物以阜民用水經注曰路温舒鉅鹿縣之東里人里監門使温舒牧羊澤中取蒲葉用寫書即此澤也又曰泑澤河水之所潛也其源渾渾泡泡者也東去玉門陽關一千三百里廣輪四百里其水澄渟冬夏不增减其中洄湍雷轉為隱淪之脉當其圜流之上飛禽翔于霄中者無不墜於淵波即河水之所潛而出於積石也又曰徐州豐西澤即髙祖斬白蛇之所又曰中牟縣圃田澤北與陽武分水澤多麻黄草故述征記曰踐縣境便覩斯卉焉則知踰界今雖不能然諒亦非謬詩所謂東有甫草也又左傳曰鄭之有原圃猶秦之有具囿澤在中牟縣西限長城東極官渡北佩渠水東西四十許里南北二十許里中有沙岡上下二十四浦津流遥通淵潭相接各有名焉有大漸小漸有大灰義魯練秋大白楊小白楊散嚇禺中羊圏大鵠小鵠龍澤蜜羅大哀小哀大長小長大縮小縮伯丘大葢牛眼等浦水盛則北注渠溢則南播故竹書紀年云梁惠成王十五年入河于甫田又為大溝而引甫水者也圖經曰晉有大陸吕氏春秋云晉之大陸猶趙之鉅鹿也按隋圖經云大陸大鹿大河即一澤而異名也又按漢書云路温舒取蒲用寫書即此也尚書云納於大􅅢是此也河南圖經曰廣成澤在梁縣西四十里後漢書云安帝永初元年以廣成游獵地假與貧人于時馬融作廣成頌云大漢之初基也揆厥靈囿營于南郊右曫莫板切三途左槩嵩岳面據衡隂箕背王屋浸以波溠演以滎洛金山石林殷起乎其中神泉側出丹水湟池怪石浮磬焜燿于其陂是此澤也隋大業中置馬牧焉亦名廣陂其漑灌之利至今百姓頼之輿地志曰梓澤在王城西北三十里與金谷相近又郡國志云梓澤即金谷也有金水出焉故謂之金谷晉石季倫别墅在焉陂說文曰陂池也書曰九川滌源九澤既陂詩曰彼澤之陂有蒲與荷陂澤也史記曰髙祖母云劉媪嘗息大澤之陂夢與神遇時雷電晦㝠見交龍於其上巳而有娠遂產髙祖又曰甯成抵罪得脫乃詐刻傳出關歸家稱曰仕不至二千石賈不至千萬安可比人乎乃貰貸買陂田千餘頃假貧民役數千家漢書曰汝南舊有鴻隙大陂郡以為饒成帝時關東數水陂溢為害翟方進為相以為决去陂水其地肥美省隄防之費遂奏罷之及翟氏滅鄉里歸惡於方進言方進請陂下良田不得而奏罷陂云王莽時郡枯旱因追怨方進童謡云壊陂誰翟子威飯我豆食羮芋魁反乎覆陂當復誰言者兩黄鵠謝承後漢書曰汝南許陽曉地脉太守鄧晨署為永平水掾使治鴻隙陂陂成人譖陽言取錢晨繫陽於獄後乃釋之出時暮陂上有火光引前清徳之感也又曰建武中太守鄧晨使許陽典復鴻隙以陽為都水掾陽曰昔成帝夢上天天帝怒曰何故壊我濯龍淵於是乃因髙下形勢起塘四百餘里數年乃立後漢書郭林宗游汝南先過袁閎不宿而退往從黄憲累日方還曰叔度汪汪若千頃陂澄之不清淆之不濁魏畧曰明帝出次摩陂有龍見於井中帝出觀龍因改摩陂為龍陂異苑曰東鄉太湖吳庚申嵗於此有一軍士五百人將破堰先以酒肉祈神約令水涸夜夢人云塘水速竭若見巨鱗慎勿殺也又有銅釜竝不可發明往决水翕然而盡得白魚形狀非常小人貪利剖而治之見昨所祭餘食充溢腸内須㬰復得釜又取發水便暴出五百人一時沒溺唯督監得存具說事狀于今猶名此湖為五百陂汝南先賢傳曰鄭敬去吏隱居于蟻陂之陽以漁釣自娛彈琴詠詩常方坐於陂側隨把栁之䕃鋪茅蘼為席淮南子曰譬若同陂而溉田其受水均也孫綽子曰海人曰横海有魚一吸萬頃之陂抱朴子曰葛仙公每酒醉常入家門前陂水中卧竟日乃出方輿記曰新蔡縣葛陂費長房化竹之所後漢於此立葛陂縣河南圖經曰洛水自苑内上陽宫南瀰浸東注當宇文愷版築之時因築斜堤今東北流水衡作堰九所形如偃月謂之月陂夀春圖經曰芍陂在安豐縣淮南子曰楚相作期思之陂灌雩婁之野又輿地志崔寔月令云孫叔敖作期思陂即此是也故漢王景為廬江太守重修起之境内豐給又按芍陂上承渒水南自霍山縣北界騶虞石入號曰濠水是北流注陂中凡經百里灌四萬頃芍魏志音鵲太平御覽卷七十二
