body:
  text: 太平御覽卷六百四十五宋李昉等撰刑法部十一象刑誅轘烹象􅆿尚書大傳曰唐虞象刑而民不敢犯苗民用刑而民興胥漸唐虞之象刑上刑赭衣不純不純者時人尚徳義犯刑者但易衣服自為大恥中則雜屨屨履也下刑墨幪幪中也使其不得冠飾幪音䝉以居州里而民恥之漢書刑法志曰孫卿之論刑也曰世俗之為説者以為治古無肉刑治古謂上古至治之時也有象刑墨黥之屬菲履赭衣而不純菲草也屨履也純縁也衣不加縁示有恥也是不然矣以為治古則人莫觸罪邪獨無肉刑哉亦不待象刑矣人不犯法即象刑無所施也或觸罪矣而直輕其刑是殺人者不死而傷人者不刑也罪至重而刑至輕民無所畏亂莫大焉故象刑非生於治古方起於亂今也如淳曰古無象刑也所以有象刑之言者近起於今人惡刑之重故遂推言古之聖君但以象刑天下自治白虎通曰聖人治天下必有刑罰何所以助治順天之度也故懸爵賞者示有勸也設刑罰者明有所懼也傳曰三王肉刑應世以立刑者五常之鞭策刑所以五何法五行也五刑蓋其制象五行也誅書曰昏迷于天象以干先王之誅又曰商罪貫盈天命誅之予不順天厥罪惟均禮曰振書端書於君前有誅倒筴側龜於君前有誅臣不豫事不敬也振去塵也端正也倒顛倒也側反側也皆謂甫省視之也又曰以足慼路馬芻有誅齒馬有誅皆廣敬也路馬君之馬誅罰也周禮秋官布憲掌憲邦之刑禁禁殺戮傷人見血而不以告者攘獄者遏訟者以告而誅之察此四者告於司冦罪之也攘獄者拒當獄者也遏訟者遏止獄訟者也公羊傳曰君親無将将而必誅傳曰見無禮於君者誅之如鷹鸇之逐鳥雀也家語曰孔子為魯司冦七日而誅亂政大夫少正夘戮之于兩觀之下子貢曰少正夘魯之聞人也今夫子為政而始誅之或者為失乎孔子曰天下有大惡者五而竊盜不與焉一曰心逆而險二曰行僻而堅三曰言偽而辯四曰記醜而博五曰順非而澤此五者有一於此則不免君子之誅而少正夘皆兼有之居處足以撮徒成黨談説足以飾褒榮衆强禦足以反是獨立此乃人之姦雄不可不除夫湯誅尹諧文王誅潘正周公誅管蔡太公誅華士管仲誅付乙子産誅尹何此七子皆異世而同誅者與七子異世而同惡故不可赦也吾始誅之不亦可乎史記曰二世遵用趙髙之法乃隂與謀曰大臣不服官吏尚强及諸公子必與我爭奈何髙曰臣固願言而未敢也宜因此時案郡縣守尉有罪者誅之以除去上生平所不可者願陛下遂從事毋疑漢書陸續獄急母不得見餉之食續泣吏詰之續曰母截肉未嘗不方斷蔥以寸為度是以知之魏志曰太祖征劉備先遣賈逵至斜谷視形勢道逢水衡載囚數十里逵以運急輒寛重者一人皆放其餘太祖善之晉書曰曹攄為臨淄令獄有死囚歲夕攄行獄愍之曰卿等不幸致此非所如何新歲人情所重豈欲暫見家耶衆囚皆泣曰若得暫歸死无恨也攄悉開獄出之尅日令還掾吏固争咸謂不可攄曰此雖小人義不可負自謂諸君仕之至日相率而還並无違者一縣歎服號為聖君北史曰後魏元麗拜雍州刺史為政嚴酷吏人患之其妻崔氏誕一男麗遂出州獄囚死及徒流案未申臺者一時放免宋書曰王者累遷宣城内史清謹有恩惠郡人張􅀈吳慶争囚經年不决志到官父老相謂曰王府君有徳政吾鄉里乃有如此争􅀈慶因相攜請罪所訟地遂成閑田後為東陽太守郡獄有罪重囚十餘人至日悉遣還家過節皆反惟一人失期志曰此自太守事王者勿憂明日果至以婦孕吏人入益歎服之崔鴻前凉録姑臧人以女為妾妻為婢為女給使張駿驚曰古未聞也將為怪乎就姑臧市轘殺之是月沉隂昏霧四塞又曰前秦録曰池陽民惑其婦言而欲殺母遂車載母辭詣親家入南山母曰汝詣親家何至是也兒曰老婢何言遂下母於溪谷之間脱衣將殺之初婦謂其夫曰不可不得中衣來也兒不欲手脱背坐厲聲令母自脱母泣曰我生養汝得至於今日汝信婦言枉殺我可不乞我此衣兒怒曰老婢復何言母呼曰天神山神當見此否言未卒聲見所持刀忽貫其項而殺投於山穴母乗車却歸昏而反家婦謂其夫還逆問曰得中衣來否母馳告鄰里收其婦送官郡縣以聞堅驚曰宇宙之内乃有此事将非怪乎於是轘而殺之崔鴻南燕録曰慕容超即位太后告超曰左僕射封嵩數殷丹下車訪問嘗具陳奴不當死誅姑女改𦵏孝婦丹如其言天應雨注襄陽耆舊記曰李衡聞羊衜音道有人物往之鑒干之衜曰多事之世尚書劇曹郎才也後數年校事郎吕壹操弄權柄人臣逼畏莫敢言或問衜衜曰非李衡無能困之者遂共薦衡為郎權引見衡口陳壹姦短數千言權有愧色劉助復告壹壹即伏誅世説曰桓宣武之誅袁真也未當其罪世以為寃焉袁真在夀春嘗與宣武一妾妊焉生𤣥及簒亦覆桓族識者以為天理之所至又曰吕后為太后乃令永巷囚戚夫人又曰天文志曰有勾圜十五星屬杓曰賤人之牢牢中星實則囚多虛則開出又曰王章下廷尉獄妻子皆繫小女年十二起號哭曰平生獄上呼囚數常至九今八而止我君素剛先死者必君果死又曰蕭育當繫乃欲棄官按佩刀曰蕭育杜陵男子何詣曹也東觀漢記曰和熹鄧后京師旱自三月至五月幸洛陽寺省庶獄舉寃囚徒杜洽不殺人自誣榜掠羸困便輿見長吏不敢白吏将去舉頭若有言太后察視覺之即呼進問狀遂得申列即時収令下獄抵罪尹左遷行未還宮澍雨大降又曰和帝永元六年七月京師旱幸洛陽寺録囚舉寃獄未還宫而澍雨又曰馬援為郡督郵送囚至府囚有重罪援哀而縱之亡命遇赦而留後漢書曰陸續字智初會稽吳人也太守尹興辟為郡門下掾是時楚王英謀反隂疏天下善士及楚事覺顯宗得其録有尹興名興詣廷尉續與主簿梁宏及掾吏五百餘人詣洛陽詔獄續母逺至京師覘候消息時獄事急旡縁與續相聞母但作饋食付門卒以進之續悲泣不能自勝列子曰鄧析操兩可之説設無窮之辭當子産執政作竹刑鄭國用之數難子産之治子産俄而誅之慎子曰有周之誅以幪中當墨以草纓當劓以屝履當刖以艾鞞當宫布衣無領當大辟此有虞之誅也斬人肢體鑿其肌膚謂之刑畫衣冠異章服謂之戮上世用戮而民不犯也當世用刑而民不從也韓子曰堯欲傳天下於舜鮌諫曰不詳哉孰以天下傳之匹夫堯不聴舉兵誅之於郊共工又諫流於幽都天下莫敢言又曰太公東封齊齊東海上有居士曰狂矞華士昆弟二人立議曰上不臣天子下不事諸侯耕作而食掘井而飲無所求於上太公至營丘使執而殺之周公聞發急傳問之太公荅曰今有馬如驥之狀天下至良也驅之不前引之不至左之不左右之不右賢士而不為王用驥之不可以左右是以誅之會稽典録曰孟嘗仕郡户曹史上虞有寡婦雙養姑至孝姑卒病亡其女言縣以雙殺其母縣不斷理結竟言郡郡報治罪嘗諫以為此婦素名孝謹此必見誣固諫不聴遂抱具獄文書殺之府門後郡遭大旱三年上虞尤甚又曰秦豐西戎連兵黎丘距漢上遣朱祐守豐議者以為豐戰連年勢必困上自往豐必降上往招豐出惡言後數月豐降祐檻車傳及母妻子送洛陽大司馬吳漢劾奏祐知豐狡猾圍守連年上親至城下而豐悖逆天下所聞當伏夷滅之誅不時斬截而聴受降失将帥任大不敬上乃誅豐召祐王隠晉書曰解結與孫秀不協秀誅張華陷殺結并欲誅結弟系梁王肜救之秀曰我見水中蟹尚惡之况其兄弟耶晉書曰孟玖譛陸機於成都王穎言其有異心將軍王闡郝昌公師蕃等皆玖所用與牽秀等共證之穎大怒使秀密収機其夕機夢黒幰繞車手决不開天明而秀兵至機釋戎服著白袷與秀相見神色自若謂秀曰自吳朝傾覆吾兄弟宗族蒙國重恩入侍幃幄出剖符竹成都命吾以重任辭不獲已今日受誅豈非命也因與穎牋詞甚悽惻既而歎曰華亭鶴唳豈可復聞乎遂遇害於軍中又載記曰昌黎尹孫伯仁䕶弟叱支支弟乙拔等俱有才力以驍勇聞馮跋之立也並冀開府而跋未之許由是有怨言每於朝享之際常拔劍擊柱曰興建大業有功力焉而滯於散将豈是漢祖河山之義乎跋怒誅之趙書曰臨元俟崖約字道恭與太子詹事羯怒珍會朝珍患目痛問約用何方治為佳約戲言唯溺取愈珍曰目何可溺約曰卿目腕腕正可溺中珍入奏天子怒約父子伏而已至賀屈釐壊為馬廏車痺室矣唯慶以惇謹終丞相位其餘盡伏誅漢書曰上遣公孫敖將兵深入匈奴迎李陵敖軍無功還言陵教單于為兵以備漢軍故臣無所得上聞於是族陵家母弟妻子皆伏誅後漢書曰梁冀誅李固而露尸於衢令有敢臨者加其罪又曰梁冀専權其同己者榮顯違迕者誅死同僚側目臺閣機事先以聞冀乃得奏御内外恐懼上下鉗口天子恭己而己不有所親任上既不平之矣冀私憾専殺議郎邴尊上愈益忿八月癸酉上問小黄門唐衡曰左右誰與梁氏不相得者衡荅曰單超左悺音管上呼超悺入室上曰梁将軍兄弟専朝迫脅内外公卿已下從其風㫖今欲誅之於常侍意如何皆對曰誠國姦賊當誅日久臣等弱劣未知聖意如何上曰審然者常侍密圖之對曰圖之易耳但恐陛下腹中狐疑上曰姦臣脅國當伏其罪復何狐疑於是更召璜瑗璜瑗等曰陛下今計已决勿得數言恐為人疑丁丑冀心疑超等使中黄門張惲入省宿以防其變瑗勅吏收惲自外謀圖不軌於是帝御殿召公卿勒兵使者收冀大将軍印綬徙封比景部鄉侯黄門令瑗将虎賁劍㦸士千人與司隸共捕冀宗親送雒陽獄無少長皆誅之冀自殺坐冀所連及公卿列侯校尉刺史二千石死者數十人冀故吏賔客免絀者二百餘人朝廷為之一空又曰鍾離意為瑕丘令吏有檀建者盜竊縣内意屛人問狀建叩頭伏罪不忍加刑遣令長休建父聞之為建設酒謂曰吾聞旡道之君以刃殘人有道之君以義行誅子罪命也遂令建進藥死又前秦録曰有司奏人有盜其母之錢而逃者請投之四裔太后聞而怒曰三千之罪莫大於不孝當棄之市朝奈何投之方外乎方外豈有无父母之鄉乎於是轘而殺之淮南子曰萇𢎞周王之執政者也天地之氣日月之行風雨之變律厯之數无所不通也然不自知車裂而死劉向説苑曰秦始皇太后不謹幸郎嫪毐封長信侯專國事驕奢與侍中左右内臣俱博飲酒醉争言而鬭與鬬者走白皇帝大怒毐因作亂咸陽宫始皇取毐四支車裂之取太后遷之長信宫桓寛鹽鐵論曰李斯相秦藉天下之勢志小萬乗及其囚於囹圄車裂咸陽之市願牽黄犬出上蔡東門逐狡兎不可得也烹釋名曰煮之於鑊曰烹若烹禽獸之肉也傳曰寒浞伯明氏之讒子弟也伯明后寒棄之夷羿收之夷氏也信而使之以為己相浞行媚於内内宫人而施賂于外愚弄其民欺罔也而虞羿于田樂之以游田樹之詐慝以取其國家樹立也外内咸服信浞詐羿猶不悛悛改也将歸自田羿獵還家衆殺而烹之以食其子食羿子其子不忍食諸死于窮門殺之於國門又曰楚客聘於晉過宋太子知之請野享之公使往伊戾請從之公曰夫不惡汝乎對曰小人之事君也惡之不敢逺好之不敢近敬以待命敢有二心乎縱有供其外莫供其内臣請往也遣之至則欿用牲加書徵之詐作盟處為太子反徵驗也而騁告公曰太子将為亂既與楚客盟矣囚太子太子乃縊而死公徐聞其無罪也乃烹伊戾又曰楚白公為亂既死其徒徴之生拘石乞而問白公之死焉乞曰此事也克則為卿不克則烹固其所也乃烹石乞史記曰齊威王召阿大夫語曰自子之守阿譽言日聞然使使視阿田野不辟民貧苦昔者趙攻甄子弗能救衛取薛陵子弗知是子以弊厚吾左右以求譽也是日烹阿大夫及左右嘗譽者并烹之又曰主父偃曰丈夫生不五鼎養死則五鼎烹漢書曰漢信聞酈食其憑軾下齊七十餘城乃夜渡兵平原襲齊齊王田廣聞漢兵至以為食其賣己言其與韓信同謀迺烹食其又曰韓信以罪廢為淮隂侯謀反誅臨死歎曰悔不用蒯通之言髙帝曰是齊辯士蒯通迺詔蒯通通至上欲烹之曰若教韓信反何也通曰狗各吠非其主當彼時臣獨知齊王韓信非知陛下也且秦失其鹿天下共逐之髙材者先得天下匈匃争欲為陛下所為顧力不能可殫誅邪上乃赦之晉中興書曰劉寅於厭次縣築壘拒石勒勒後虜執寅以鑊湯煮之韓子曰樂羊為魏将攻中山其子在中山中山之君烹其子而遺之樂羊於幕下而饗之吕氏春秋曰齊王疾痛使人迎文摯至視王疾謂太子曰非怒王則疾不可活王怒則摯必死太子頓首强請曰苟己王疾臣與母以死争之願先生勿患也摯曰諾與太子期而至将往不當者三齊王固已怒矣摯至不解履登牀問疾王益怒與言摯因出固辭以重怒王吐而赴疾乃遂已王大怒不悦将烹摯太子與王左右争急之不得果以鼎烹摯爨之三日三夜顔色不變摯曰誠欲殺我則胡不覆之以絶隂陽之氣王使覆之乃死新序曰田單處中牟佛肸以中牟叛置鼎於庭致士大夫曰與我者受邑不吾與者烹大夫從之至於田單曰義士死不避斧鉞之罪窮不受軒冕之服无義而生不仁而富不若死褰衣将入鼎佛肸説乃止趙氏攻取之聞田單不肯與也求而賞之單曰不可也一人舉而萬夫俛首智者不為賞一人而慙萬夫義者不取我受賞使中牟之士皆恥不義吾去耳遂之南楚英雄記曰董卓攻得李昊張安畢主范中生烹之四人臨入鼎相謂曰不同日生我同日烹我太平御覽卷六百四十五
