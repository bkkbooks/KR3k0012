  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_548-1a, image: WYG0898/WYG0898-0099a.png}
body:
  text: 太平御覽卷五百四十八宋李昉等撰禮儀部二十七杖履幗髽廬重凶門附死杖履儀禮喪服曰苴杖竹也削杖桐也各齊其心皆下本杖者何爵也非爵而杖者何擔主也非主而杖者何輔病也童子何以不杖不能病也婦人何以不杖不能病也又曰斬衰裳菅履者菅屝也公卿士大夫之衆臣為其君繩履者繩屝也疏衰裳齊疏履者簏蒯之屝也禮記喪服小記曰虞杖不入於室祔杖不升於堂鄭注衰益屝敬多也又曰婦人不為主而杖者姑在為夫杖姑不厭婦母為長子削杖嫌為男子當杖竹也母為長子服不可以重于子為己也女子子在室為父母其主喪者不杖則子一人杖女子在室亦童子也無男昆弟使同姓為攝主不杖則子一人杖也謂長女也許嫁二十而笄笄為成人成人正杖也又曰庶子不以杖即位不遍子也位朝夕哭位也父不主庶子之喪則孫以杖即位可也祖不厭孫孫得伸也父在庶子為妻以杖即位可也舅不主妾之喪子得伸也又雜記下曰古者貴賤皆杖叔孫武叔朝見輪人以其杖闗轂而輠輪者于是有爵而後杖也又喪大記曰君之喪三日子夫人杖五日既殯授大夫世婦杖子大夫寢門之外杖寢門之内輯之夫人世婦在其次則杖即位則使人執之子有王命則去杖國君之命則輯杖聴卜有事於尸則去杖大夫於君所則輯杖於大夫所則杖大夫之喪三日之朝既殯主人主婦室老皆杖大夫有君命則去杖大夫之命則輯杖内子為夫人之命去杖為世婦之命授人杖大夫有君命去杖此指大夫之子也而云大夫者通實大夫有父母之喪也授人杖以使人執之冊也士之喪二日而殯三日之朝主人杖婦人皆杖於君命夫人之命如大夫於大夫世婦之命如大夫士二日而殯者下大夫也士之禮死與往日生與来日此二日於死者亦得三日也婦人皆杖謂主婦容妾為君女子子在室者子皆杖不以即位子謂凡庶子也不以即位與去杖同也大夫士哭殯則杖哭柩則輯杖哭殯謂既𦵏也哭柩謂啓後也大夫士之子於父母也遵近哭殯可以杖子哭諸侯之子于父母也遵逺杖不入于廟門也棄杖者斷而棄之於隠者杖以喪至遵為人得而褒之又問喪曰或問曰杖者何也怪其義各異曰竹桐一也故為父苴杖苴杖竹也為母削杖削杖桐也言所以杖者義一也顧所用異耳或曰杖者以何為也怪所為施曰孝子喪親哭泣無數服勤三年身病體羸以杖扶病也言扶杖乃能起也則父在不敢杖矣尊者在故也堂上不杖辟尊者之處也堂上不趨示不遽也此孝子之志也人情之實也禮義之經也非從天降也非從地出也人情而已矣父在不杖謂為母也尊者不杖辟尊者之處不杖有事不趨皆為不感動使之憂慼也又喪服四制曰杖者何也爵也三日授子杖五日授大夫杖七日授士杖或曰擔主或曰輔病婦人童子不杖不能病也白虎通曰所以杖竹桐何取其名也竹戚也桐痛也父以竹母以桐竹陽也桐陰也竹斷而用之質故為陰也韓子曰儒執喪三大毁扶杖世主以為孝而禮之幗髽儀禮喪服曰女子子在室為父布總箭笄髽衰三年總束髻也謂總者既束其本又總其末箭笄篠也髽露紒也猶男子之括髪以麻則上用麻也用麻者自頭交額上却繞紒如著幓頭小記曰男子冠而婦人笄男子免而婦人髽但言衰不言裳者婦人不顯裳也又曰女之適人者為其父母婦人為舅姑惡笄有首以髽卒哭子折笄首以笄布總傳曰笄有首者惡笄之有首也惡笄者櫛笄也折笄首者折吉笄之首也吉笄者象笄也禮記檀弓上曰南宫縚之妻之姑之喪夫子誨之髽曰爾無從從爾爾無扈扈爾誨教也爾汝也從從謂太髙扈扈謂太廣爾助語又曰魯婦人之髽而弔也自敗於臺鮐始也時家家有喪髽而相弔去纚而紒曰髽也禮記外傳曰髽者婦人有喪者髽古人垂髽男子髽時皆有總以縚其髽然後加笄加冠也去纚而髽曰魯婦人遭升陘之戰也露髽相弔以代喪冠也有布髽齊衰已下以布束髪也有麻髽女子在室有父母之喪用麻合髽以對兄弟括髪時也髽者開散之名也既去有縱髽邢葩髽左傳襄公曰臧紇救鄫侵邾敗于狐駘國人逆喪者皆髽魯于是乎始髽髽麻髪合結也遭喪者多故不能備㓙服髽而已廣雅曰幗謂之祺音忌魏氏春秋曰諸葛亮挑司馬宣王戰致巾幗婦人之飾以怒宣王廬周禮天官宫正曰掌王宫之戒令大喪則授廬舍辨其親疎貴賤之名鄭𤣥注曰廬舍堊室也親者貴者居倚廬踈者賤者居堊室儀禮喪服傳曰喪服斬衰居倚廬寢苫枕塊馬融曰倚木以為廬于東牆下西向闗端也禮記雜記曰大夫居廬士居堊室又喪大記曰父母之喪居倚廬不塗寢苫枕凷非喪事不言君為廬宫之宫謂圍障大夫士䄠之既𦵏柱楣塗廬不於顯者君大夫士皆宫之又問喪曰成壙而歸不敢入處室居于倚廬哀親之在外也白虎通曰父母之喪倚廬于中門外東牆下戸北又曰婦人不居倚廬天子七日諸侯五日卿大夫三日而成服居門外東壁為廬王肅喪服要記曰魯哀公𦵏父孔子問曰寧設菰廬乎哀公曰菰廬起大伯大伯出奔聞古公崩還赴喪故作菰廬以彰其尸吾父無大伯之罪何用此為孝子傳曰王琳汝南上蔡人十嵗失父母弟季年七嵗兄弟二人哭泣哀聲不絶在塚側作廬不妄出入重凶門附儀禮士喪禮曰重木刋鑿之甸人置重于中庭三分庭一在南夏祝取鬻餘飯盛用二鬲于西牆下冪用疏布久之及用䩣懸于重冪用葦席北面袵帶用䩣賀之結于後祝置于庭中近南名為重今之凶門是其象也禮既虞而作主今未有主故以重當主本為喪設非以表其門恐不應以尊卑厭降也禮命士以上父子異宫今卑私之喪皆别開門亦不知今人如此者皆有凶門否范堅答凶門問曰薄帳似不出禮文何由行此答曰凶門非禮禮有縣重于庭以席覆之其形似凶門後出之于門外表喪由此俗遂行之耳禮論曰問改𦵏立凶門否蔡謨答云改𦵏若停喪謂應有凶門死周禮春官大宗伯曰以喪禮哀死亡禮記曲禮下曰天子死曰崩諸侯曰薨大夫曰卒士曰不禄庶人曰死死冦曰兵異于人者也壽考曰卒短折曰不禄凡人常稱也又檀弓下曰孔子過太山側有婦人哭于墓者而哀使子路問之曰子之哭也一似重有憂者而曰然昔者吾舅死于虎吾夫又死焉今吾子又死焉夫子曰何為不去也曰無苛政夫子曰小子識之苛政猛于虎也又喪大記曰男子不死於婦人之手婦人不死於男子之手君夫人卒于路寢大夫世婦卒于適寢内子未命則死于下室遷尸于寢士之妻皆死于寢左傳定下曰齊侯伐晉敝無存之父將室之辭以與其弟曰此役也不死反必娶于髙國先登求自門出死于霤下又哀上曰簡子巡列曰畢萬匹夫也七戰皆獲有馬百乗死于牖下畢萬晉獻公卿也死于牖下言得夀終羣子勉之死不在冦言有命也又哀下曰太子聞之懼下石乞孟黶敵子路以戈擊之斷纓子路曰君子死冠不免結纓而死孔子聞衛亂曰柴也其来由也其死矣又哀下曰晉荀瑶帥師圍鄭鄭人俘酅魁壘賂之以知政閉其口而死穀梁傳隠公曰髙厚曰崩尊曰崩天子之崩以尊之也其崩之何也以在民上故崩之也春秋説題辭曰天子曰崩崩之為言殯也諸侯稱薨薨之為言奄然而亡大夫曰卒精輝終卒卒之為言絶絶於邦也士曰不禄失其忠也不禄之言削名章也庶人曰死魂魄去心死之為言精爽窮也爾雅曰崩薨無禄卒殂落殪死也論語里仁曰子曰朝聞道夕死可矣又子罕曰子疾病子路使門人為臣病間曰久矣哉由之行詐也且予與其死於臣之手也無寧死於二三子之手乎且予縱不得大𦵏予死於道路乎又先進曰顔淵死子曰噫天喪予天喪予子哭之慟從者曰子慟矣曰有慟乎非夫人之為慟而誰為文子老子曰聖人同死生愚人亦同死生聖人之同死生知于分理也愚人同死生不知利害所在莊子曰人之生也氣聚則為生氣散則為死又曰夫大塊載我以形勞我以生佚我以老息我以死故善吾生者乃所以善吾死也又曰莊子之楚見空髑髏髐然有形檄以馬棰因而問之曰夫子貪生失理而為此乎將子有亡國之事鈇鉞之誅而為此乎于是語卒援髑髏枕而卧夜半髑髏見夢曰子之談者似辨士諸子所言皆人生之累也死則無此矣子欲聞死之説乎莊子曰然髑髏曰死無君于上無臣于下亦無四時之事從然以天地為春秋雖南面之樂不能過也説苑曰齊景公出而見殣謂晏子曰此何死對曰餒而死公曰噫寡人之無徳也亦甚矣晏子曰君之徳著而不彰何為無徳景公曰何謂也對曰君之徳及後宫與臺榭之玩君之鴈食以菽粟君之宫内自樂延及後宫之族何為其無徳也顧臣有請于君由君之意自樂之心推與百姓同之則何殣之有又曰子貢問孔子人死有知將無知也孔子曰吾欲言死人有知也恐孝子妨生以送死也吾欲言死人無知也恐不孝子孫棄親不𦵏也賜欲知人死有知將無知也死徐自知之猶未晚也又曰魯哀公問孔子曰有知者夀乎對曰然人有三死而非命也人自取之也夫寢處不安飲食不給勞逸過度者疾共殺之居下位而上干其君嗜酒欲物而求不止者刑共殺之少以犯衆弱以侮強忿怒不量力者兵共殺之此三死者非命也又曰民有五死聖人能去三不能除其二飢渴死者可去也凍寒死者可去也雖五兵共死者可去也夀命死者不可去也癰疽死者不可去也三者可去二不可去論衡曰人之死者不可去也三者二者食齊輪者猶未死者知感也又曰王莽之時省五經章句皆為二千石博士弟子郭略夜定舊説死燭下精思不任脈絶氣滅也楊泉物理論曰人含氣而生精盡而死猶澌滅也譬如火焉薪盡而火滅則光無矣人死之後無遺魂也太平御覽卷五百四十八
