  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_977-1a, image: WYG0901/WYG0901-0579c.png}
body:
  text: 太平御覽卷九百七十七宋李昉等撰菜茄部二葱薤䔉茄薑蘇葱禮曰凡進食之禮葱㳿處末又膾春用葱又脂用葱又為君子擇葱薤必絶其本爾雅曰茖古百切山葱茖葱細莖大葉漢書曰龔遂為渤海太守令人一口種五十本葱又曰郡信臣為少府先是官園種冬葱韭覆以屋晝夜㸐音燃火待温氣乃生奏罷之東觀漢記曰孔奮字君魚為姑臧長時天下亂河西獨安前長居官數月輙置貲產奮在姑臧四嵗財物不增惟老母極膳妻子但食葱菜或嘲奮曰置脂膏中不能自潤義熈起居注曰十年有司奏太常謝瞻遣四人還家種葱菜免官晉書曰居洛陽城十里内有園菜欲以當課聼引其長流灌紫葱晉書曰石勒時石聰將叛佛圖澄戒勒曰今年葱中有䖝害人百姓無食葱俄而聰走後秦書曰姚興種葱皆化為韭其後兵戈日盛後周書曰宣帝大象年左衛園中葱變作韭梁書曰呂僧珍拜南兖州刺史從父兄子先以販葱為業僧珍至乃棄業求州官僧珍曰吾荷國恩重無以報効汝等自有常分豈可妄求叨越當速反葱肆耳金樓子曰名山之下生葱葱薤者是古人食石種也故語曰寜得一把五茄不用金玉一車寜得一片地榆不用明月寶珠五茄一名金鹽地榆一名玉豉唯此二物可煑石又曰用紫芝煑石石美如脂食之可更調五味下橘皮葱豉漢武内傳曰西王母曰仙人上藥有𤣥都綺葱列仙傳曰黄阮丘者雎山上道士也衣裘髪覆耳耳長六七寸口中無齒日行四百里於山上種葱薤百餘年人不知也春秋元命包曰天門山有葱所種畦壠悉成行人㧞取者悉絶若請神而求能不㧞自出竒異辛香繆襲祭儀曰秋祀和羮芼以葱西河舊事曰葱嶺在燉煌西八千里其山髙大故曰葱嶺也河源濳發其嶺分為二水一水西經休循國國在葱嶺也郭儀恭廣志曰休循國居葱嶺其山多大葱華陽國志曰曹公既與先主語先主方食失七箸㑹天震雷先主曰聖人言迅雷風烈必變良有以也曹公亦悔失言使人覘之見其方㧞葱公曰大耳公未之覺也其夜先主急去廣志曰有胡葱木葱巴南山川記曰有石䔉石葱續捜神記曰新野趙貞家園中種葱未經抽拔忽一日盡縮入地後經嵗餘貞之兄弟相次分散揚雄蜀都賦曰蔓茗熒郁翠藻青黄若離錦布繡望之無疆潘岳閒居賦曰菜則有葱韭䔉芋青笋紫薑堇薺甘旨蓼荽芬芳薤爾雅曰􅀈山薤今山中多有此菜皆如人家所種又曰薤鴻薈也漢書曰龔遂為渤海太守令民一口種百本薤後漢書曰龎參為南陽太守郡人任棠者有竒節隐居教授叅到先候之棠不與言但以薤一本水一盂置户屏前抱孫兒伏户下主簿白以為倨恭思其㣲意良乆曰棠是欲曉太守也水者欲吾清也㧞大本薤欲吾擊强宗也抱兒當户欲吾開門恤孤也于是歎息而還叅在職果能抑强􅂇弱以惠政待人魏畧曰李孚字子憲為諸生常種薤欲以成計有求索不與一莖亦不自食時人謂之能行意世説曰桓公座有叅軍猗蒸薤不時解其食者又不􅂇而猗終不放舉座皆笑又曰蘇峻亂庾公南奔見陶侃雅相重及食庾噉薤因畱白陶問用此何為庾云故可種於是尤相稱歎列仙傳曰務光服蒲薤根荆州圖傳曰筑陽縣有薤山山多野薤因以為名古詞曰薤上朝露亦何稀潘岳閒居賦曰白薤負霜䔉爾雅曰蒿山䔉今山中多有此菜皆如人家所種説文曰䔉菜之美者雲夢之葷菜東觀漢記曰李恂為兖州刺史前刺史所種園中麥胡䔉悉付從事無所留謝承後漢書曰江夏費遂字子竒為揚州刺史悉出前刺史所種小麥胡䔉付從事又曰太原閔仲叔者代稱節士雖同黨之潔清自以弗及也同黨見其含菽飲水遺以生䔉受而不食王隐晉書曰郄詵母病苦車及亡不欲車載乃養雞種䔉得馬八匹輿棺至冡齊書曰豫章王大㑹賔僚張融食炙始畢人便去融欲求鹽䔉口終不言方揺食指半日乃息南史曰邵陵王使賊殺何智通既擒賊智通子敞之割炙食之即載出新亭四面火炙之燋熟敞車載錢設鹽䔉顧百姓食之撤一臠賞錢一千徒黨并母肉遂盡正部曰張騫使胡還得大䔉苜蓿抱朴子曰謂夏必長而䔉麥枯謂冬必凋而竹栢茂三輔决録曰平陵范氏南陽舊語曰前隊大夫有范仲公鹽豉䔉果共一筩言其廉儉也袁子正書曰袁子曰吾嘗與陳子息于鄴東門之外見一老父方坐而食其子授之䔉食必有餘欲棄則惜欲持去則暑遂盡食于是火辛螫其腸胃兩目盡赤陳子笑之吾謂之曰子之家中牛羊數千而不敢食天暑有喝死者而後食之病子之軀亦猶是也晉四王起事曰成都王穎奉恵帝還洛陽道中於客舍作食宮人持粳米飯以供至尊大䔉鹽豉到獲嘉市麄米飯瓦盂盛之天子噉兩盂燥䔉數株鹽豉而已顏氏家訓曰三輔决録云前隊大夫范仲公鹽豉䔉果共一筩果當音魏顆之顆北土通呼物一段為一顆䔉果是俗間常語耳故陳王鷂雀賦曰頭如䔉果目似花椒崔豹古今注曰䔉卵䔉也俗語謂之小䔉胡國有䔉十子共為一株籜幕裹之名為胡䔉尤辛于小䔉俗人謂之大䔉寃報記曰梁廬陵王蕭績在荆州時常遣從事量括民田南陽樂孟卿亦充一使公府舍人韋破虜遣試勅失主本意及孟卿以數誤得罪破虜惶懼不敢引􅄽但誑孟卿公自為當為公分雪無勞訴也數日之間遂斬於市孟卿號呌無由自陳惟語人以紙筆隨殮死後少日破虜在槽上㸔牛忽見孟卿挈頭而入持一椀䔉韲與之破虜驚呼奔走不獲已而服之因爾病未幾乃卒唐五行記曰唐咸亨四年洛州司尸唐望之冬集計至五品進止未出間有僧來覓初不相識延之共坐少頃問曰貧道出家人得飲食亦少以公名故闇相記能設一頓鱠否司戸欣然即虛公置魚此僧云㸔有䔉否司戸家人云䔉盡僧云䔉盡去也乃起留之云䔉盡遣得買僧云䔉既盡不可更住苦留不可司户果無疾暴亡延薦與李文德書曰五折張騫大宛之䔉潘尼釣賦曰西戎之䔉南夷之薑茄梁書曰蔡撙為吳興太守不飲郡井水齋前自種白莧紫茄以為常餌詔褒其清加信武将軍杜寶大業拾遺録曰大業四年中命改茄子為崑崙紫苽嶺南異物志曰南土無霜雪生物不復凋枯種茄子十年不死攀縁摘之樹高至二丈嶺表録異曰南中草菜經冬不衰故蔬園之中栽種茄子宿根有二三年漸長枝幹乃為大樹毎夏秋熟則梯樹摘之三年後樹漸老子稀即伐去别栽嫩者薑春秋運斗樞曰旋星散為薑失德逆時即薑有翼辛而不臭也援神契曰薑禦温菜也禮記檀弓上曰䘮有疾食肉飲酒必有草木之滋焉以為薑桂之謂也論語鄉黨曰不撤薑食韓詩外傳曰宋玉因其友見楚相楚相待之無以異讓其友其友曰夫薑桂因地而生不因地而辛女因媒而嫁不因媒而親子之於王未也何怨于我也史記曰萬家之城千畦薑韭與千户侯等魏志曰倭國有薑不知其滋味齊書曰孔琇之為臨川太守在任清約罷郡還獻乾薑二斤武帝嫌其少知琇之清乃歎息梁書曰周捨應對辨㨗嘗居直語及嗜好裴子野言從來未嘗食薑捨應聲曰孔稱不撤裴乃不嘗一坐皆笑呂氏春秋曰和之美者楊樸之薑招揺之桂楊樸地名在蜀郡招揺山名在桂陽越駱之箘神仙傳曰吳孫權曰權使介象作變化種菜瓜百果皆立生可食先主論膾魚何者絶美象曰鯔魚先主曰先生論近道魚耳此出海中安可得乎象曰可得耳乃令人于殿庭中作方塪汲水滿之并求鈎餌之垂綸于塪中不過頃得鯔魚先主驚喜問象曰可食否象曰故為陛下取安敢取不可食之物使厨下切之先主曰聞蜀薑作韲至佳此間薑永不及也恨爾時無此薑爾象曰蜀薑豈不易得願差可使行者并付以直象自書一符以青竹杖使行人閉目騎杖杖止便買薑閉目此人承其言騎杖須臾止已到成都不知是何處問人人言是蜀市乃買薑于時吳使張温見之於市問曰與帝買薑于是甚驚作書寄家此人買薑畢捉書負薑騎杖閉目須臾已還到吳厨切膾亦適了也李先生傳曰郎中喬飜於羊渚遇神人意欲啖薑而市無之神人以絹數疋并書一牒付信入市門南下任意所如須臾得薑數斗還以問神人神人曰問李先生當知我博物志曰伏波将軍唐蜀人煞薑法先洒掃别麄細為三軰盛着籠中作沸湯没籠着湯中須臾取一塊横截㫁視其熟否既熟訖便内着甖中細𢷬米末以覆上令薑不見訖以向湯令復沸便相掩消息令甖中當自沸沸便隂乾之又曰姙娠者不可啖生薑令兒多指嶺表録異曰山薑花莖葉即薑也根不堪食而于葉間吐花穗如麥粒嫩紅色南人選未拆開者以鹽淹藏入甜糟中經冬如琥珀香辛可重用為膾無加也又曰以鹽藏曝乾煎湯服之極能治冷氣蘇爾雅曰蘇桂荏也方言曰周鄭之間謂之公蕡湘沅之間謂之􅀢沙洲記曰乞佛虜不識五穀惟食蘇采本草經曰芥蒩一名水蘇吳氏曰假蘇一名䑕實一名薑芥也太平御覽卷九百七十七
