front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_364-1a, image: WYG0896/WYG0896-0244a.png}
body:
  text: 太平御覽卷三百六十四宋李昉等撰人事部五頭下頂額頭下吳志曰孫權太子和被幽閉驃騎将軍朱據尚書僕射屈晃率諸将吏泥頭自縛連日詣闕請和又曰諸葛恪被誅臨淮臧均表乞収葬恪曰臣聞雷震奮激不崇一朝大風衝發希有極日今恪父子三首懸示積日觀者數萬詈聲成風國之大刑無所不震又曰闗羽既敗走權使虞翻筮之得兑下坎上節五爻變而之臨翻曰不出二日必當断頭果如翻言權曰卿不及伏羲可與東方朔為比矣晋書曰嵇康謂趙至曰君頭小而鋭有白起風童子白黒分明又曰桓温卒子𤣥為嗣襲爵年七嵗温服終府州文武辭其叔父冲冲撫𤣥頭曰此汝家故吏也𤣥因涕淚被面衆並異之王隠晋書曰蒼梧太守呉臣據郡邑不恭王命孫權遣歩隲為交州喻臣臣照鏡不見其頭隲因入斬之又曰王珣與謝元俱被辟桓温曰謝掾必擁麾杖節王掾當作黒頭公未易才也晋中興書曰庾亮與蘇俊戰於建陽門王師敗績亮於陣携其三弟懌條翼南奔温嶠顯宗幸嶠船亮泥首謝罪崔鴻前秦録曰東海王符雄字元才洪之季子以功拜龍驤将軍征伐皆有殊績雄醜形貌頭大足短軍中稱之為大頭龍驤秦記曰符堅祖洪見堅状貌欲令頭堅腹軟字之曰堅頭隋書曰髙祖文皇帝生馮翊波若寺皇妣抱帝忽見頭上出角遍身起鱗大駭墜帝於地春秋後語平原君曰澠沲之㑹臣察武安君之為人小頭而鋭瞳子白黒分明視瞻不轉小頭而鋭断敢行也瞳子白黒見事明也視瞻不轉執志强也可以持乆難與爭鋒㢘頗足以當之吳越春秋曰眉間尺逃楚入山道逄一客客問曰子眉間尺乎答曰是也吾能為子報讎尺曰父無分寸之罪枉被荼毒君今恵念何所用耶客曰湏子之頭并子之劒尺乃與頭客與王王大賞之即以鑊煑其頭七日七夜不爛客曰此頭不爛者王親臨之王即視之客於後以劒斬王頭入鑊中二頭相齧客恐尺不勝自以劒擬頭入鑊中三頭相咬七日後一時俱爛乃分葬汝南宜春縣并三冢山海經曰三首國一身三首羽民國為人長頭又曰共工之臣曰相仰氏共工覇九州者也九首以食于九山晏子春秋曰景公遊於梧丘夜夢五大夫稱寃公問晏子晏子曰昔靈公田有大夫駭獸断其頭埋之命曰五大夫丘公令掘之果如其言又曰湯長頭而寡髮荘子曰雲将東過扶揺之枝雲将雲之主師也扶揺木名生海東而適遭鴻䝉鴻䝉自然元氣雲将曰天氣不和地氣欝結六氣不調四時不節今我願合六氣之精以育羣生為之柰何鴻蒙拊髀爵躍掉頭曰吾弗知吾弗知又曰亡羊而得牛断指而得頭又曰晋惠帝元康三年武庫火燒夫子履漢斬白蛇劒漆王莾頭等録異傳曰漢武帝時蒼梧賈雍為豫章太守有神術出界討賊為賊所殺失頭雍上馬還營營中咸走來視雍雍胷中語曰戰不利為賊所傷諸君視有頭為佳無頭佳乎吏泣曰有頭佳雍曰不然無頭亦佳言畢遂死幽明録曰河東賈弼小名翳兒具諳究世譜義熙中為琅邪府叅軍夜夢有一人面齄􅀈甚多大鼻瞷目請之曰愛君之貌欲易頭可乎乃於夢中許易明朝起自不覺而人悉驚走琅邪王大驚遣傳教呼視弼到琅邪遥見起還内弼取鏡自㸔方知怪異因還家家悉驚入内婦女走藏弼坐自陳説良乆并遣人至府檢問方信後能半面啼半面笑兩手各捉一筆俱書辭意皆羙此為異也餘並如先列女傳曰京師節女長安大昌里人夫有仇仇家執父使要其子為中間女念不聼則殺父殺父不孝聼則殺夫殺夫不義乃許之曰夜在樓上新沐頭東首卧者是還譎其夫使卧他處自沭卧樓上仇家断其頭而去仇悲義之遂不殺其父益部耆舊傳曰叚翳字元章善天文風角有一諸生來學積年諸生畧究要術歸辭鄉里翳為作一脂筒中盛簡書曰有變乃發視之生至葭萌與吏爭津吏檛從人頭破開筒得書言到葭萌與吏闘破頭者以此脂裹之生喟然而嘆乃還卒其業愽物志曰人以冷氷漬至膝啖𤓰數十漬至頭可啖百餘水皆作𤓰氣括地圖曰民白首身被髮吕氏春秋曰今有人於此断頭以易冠殺身以易衣世必惑也是何也冠所以飾頭衣所以飾身今殺所飾而要所以飾則不知所為矣世之趨利似此亦不知所為也帝系譜曰神農牛首伏羲人頭蛇身黄帝素問曰頭者精明之主也董卓别傳曰卓知所為不得逺近意欲以力服之遣兵於雒陽城時遇二月社民在社下飲食悉就㫁頭駕其車馬載其婦女財物以㫁頭繫車轅軸還雒云攻敗大獲稱萬嵗入闗雒陽城門焚燒其頭神仙傳曰曹公捕左慈數日得之便㫁頭以白曹公公大喜曰果慈頭定視是一束茅耳捜神記曰南方有落頭民吳時将軍朱桓得一婢毎夜卧後頭輙飛去或從狗竇或從天窓中出入以耳為翼将曉復還數數如此旁人怪之夜照視惟有身無頭其體㣲泠氣息裁属乃蒙之以被至時頭還礙被不得安再三墮地噫咤甚愁而躰氣急急疾若将死者乃去被頭復起轉頸得安復如常人時南征大将亦往往得之又嘗有覆以銅盤者頭不得進遂死愽物志同又曰渤海太守史良好一女子許而不果良㫁其頭而歸投於竈下曰當令火葬頭語曰使君我相從何圖當耳吳苑曰管寧避難遼東還汎海遭風船垂傾没寕思􅄽曰吾嘗一朝科頭三晨晏起今天怒猥集過恐在此三巴記曰巴有将軍曼子請於楚以平巴亂楚使請城曼子曰城不可得乃自刎其頭與楚楚義之以上卿禮葬其頭巴以上卿禮葬其身長沙耆舊傳曰劉夀少時遇相師曰君腦有玉枕必至公也後至太尉李郃别傳曰公耳有竒表腦枕如鼎形易洞林曰郭璞為左尉周恭卜云君墮馬傷頭尉後乗馬行黄昏坂下有犢車觸馬馬驚頭打石上流血殆死語林曰魏郡太守陳異嘗詣郡民尹方方被頭以水洗盤抱小兒出更無餘言異曰被頭者欲吾治民如理髮洗盤者欲使吾清如水抱小兒者欲使吾愛民如赤子也世説曰祖廣字淵度行恒縮頭詣桓南郡下車桓曰天甚明朗祖叅軍如從屋漏中來又曰諸葛道明初過江左名亞王庾之下先為臨沂令丞相謂曰明府當為黒頭公楚辭曰魂兮來歸若無上天些一夫九首㧞木九千些頂説文曰頂巔也易大過卦曰過渉㓕頂凶無咎韋曜毛詩問曰旱鬼眼在頂上列女傳曰齊鍾離春齊無塩邑之女鍾離姓春名也其為人極醜無雙曰頭深目頂上少髪折要出胷荘子曰支離疏頥隠於臍肩髙於頂應璩新詩曰醉酒巾幘落頂秃赤如狐額釋名曰額鄂也有垠鄂也故幽州人謂之鄂易説卦曰㢲為廣顙上大下小故為廣顙河圖曰黄帝廣顙龍額又曰天之東西南北極各有銅頭鉄額兵長三千萬丈三千億萬人毛詩鄘栢舟君子偕老曰子之清揚揚且之顔也清視明也揚廣黒而顔豊滿也展如之人兮邦之媛也詩含神霧曰代漢者龍顔珠額春秋元命苞曰在天為文昌在人為顔顙太一之謂也顔之言氣畔也陽立於五故顔愽五寸論語摘輔象曰樊遲山額有若月衡反宇䧟額是謂和喜方言曰䭭音稽額也顔顙也江湘謂之䭭中夏謂之額東齊謂之顙河濟淮泗之間謂之顔漢書曰成帝幸宫人嚴宫生男帝為趙昭儀召殺之宫曰果欲娣弟擅天下我兒男也額上有壮髪類孝元帝令兒安在危殺之矣柰何令長信得聞之東觀漢記曰和熹皇后年五嵗夫人為剪髮夫人年老目瞑并中后額雖痛忍不言又曰姚期從擊王郎将兒宏劉奉於鉅鹿下期先登䧟陣手殺五十餘人瘡中額攝情復戰逐大破之又曰馬廖上疏曰夫改政移風必有其本長安語曰城中好廣眉四方過半額魏志曰龎意親與闗羽交戰射羽巾額王隠晋書曰元帝白毫生額上有光明崔鴻後趙録曰石勒征見無劉曜守軍大悦舉手指天又指額曰天也北齊書曰文宣帝洋為王時夣人以筆㸃記額明日告舍人王雲哲曰吾其誅乎雲哲賀曰王上加㸃為主乎後果然隋書曰劉孝焯字士龍信都人犀額龜背望髙視逺聪敏深沉弱不好弄又曰煬帝令陳稜討杜伏威自出陣前挑戰稜部将射中其額伏威怒指之曰不殺汝我終不㧞箭遂馳之獲所射者使其㧞箭然後斬之塩鉄論曰古者君子思徳小人思利今人堅額健舌或以致業抱朴子曰老君額有三理上下徹語林曰賈充問孫皓何以好剥人面皮皓曰憎其顔之厚呉都賦曰雕題之士注曰鏤額也嶺南並鏤額額題也相書占氣雜要曰黄氣如帶當額横卿之相也有卒喜皆發於色額上面中年上是其候也黄色最佳又曰額臨者男早得官女子早成太平御覽卷三百六十四
