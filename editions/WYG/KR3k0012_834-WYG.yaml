body:
  text: 太平御覽巻八百三十四宋李昉等撰資産部十四釣筌罛網罟罶罺罩涔罾笱欚梁軥罠罨箄􅩬銛釣毛詩曰何彼穠矣曰其釣維何維絲伊緡伊維緡綸也箋云釣者以此有求於何彼以為之乎以絲為之綸則是善釣也又國風竹竿曰籊籊竹竿以釣于淇又小雅采緑曰之子于釣言綸之繩綸釣繳也其釣維何維魴及鱮維魴及鱮薄言觀者論語述而曰子釣而不綱綱謂為大索横流屬網尚書大傳曰周文王至磻溪見吕望釣文王拜之尚父望釣得玉璜刻曰周受命吕佐昌徳合于今昌来提戰國䇿曰魏王與龍陽君共船而釣龍陽君得十餘魚而涕下王曰何謂也對曰臣之始得魚也臣甚喜後得益大今欲棄臣前之所得矣今臣與王拂枕席爵至人君走人於庭避人於塗四海之内其美人多矣聞臣之得幸王也必裂裳而趨王臣亦猶曩之所得魚也亦將棄矣臣安能無涕乎魏王曰有是心也何不相告於是布令扵四境之内有敢言美人者族謝承後漢書曰鄭敬隠於蟻陂釣魚大澤折芰為坐以荷薦肉瓠瓢盈酒琴書自娱後漢書曰郭玊者廣溪人初有老父不知所出常漁釣於涪水自號涪翁乞養民間見有病者下針石有效玉従受術焉又曰嚴光字子陵㑹稽餘姚人少有髙名與光武同逰及光武即位乃變姓名隠身不見帝思其賢令以物色訪之後齊國上言有一男子披羊裘釣澤中帝疑其光也備安車𤣥纁聘之三返而後至拜為諫議大夫不屈乃耕於富春山後人名其釣處為嚴陵灘晉書曰翟莊湯之子也少以弋釣為事及長不復獵或問魚獵同是害生之事而先生止去一何哉莊曰獵自我釣自物未能頓去故先節其甚者夫吞餌吞釣豈我哉時人以為知言宋書曰王𢎞之性好釣上虞江有一處名石頭宏之常垂綸於此經過者不識之或問漁師得魚賣不𢎞之曰亦自不得得亦不賣日夕載魚入上虞郭經親故門各以一兩頭置門内而去又曰文帝嘗與羣臣臨天井池帝垂綸良久不獲王景文越席曰臣以為垂綸者清故不獲貪餌衆皆稱善又曰漁父者不知姓名亦不知何許人也太康孫緬為潯陽太守落日逍遥渚際見一輕舟凌波隠現俄而漁父至神韻瀟洒垂綸長嘯緬甚異之乃問有魚賣乎漁父笑而答曰其釣非釣寧賣魚者耶緬益怪焉遂褰裳渉水謂曰竊觀先生有道者也終朝鼓枻良足勞耳吾聞黄金白璧重利也駟馬髙盖榮勢也方今王道文明守在海外隠鱗之士靡然髙尚風塵胡不賛緝熙之美何用晦其若是也漁父曰僕山海狂人不逹世務未辨賤貧無論榮貴乃歌曰竹竿籊籊河水悠悠相忘為樂貪餌吞鈎非夷非恵聊以忘憂扵是悠然鼓棹而去孔叢子曰子思居衞有人釣得鰥魚焉其大如車子思問之鰥魚魚之難得者也子如何得之對曰吾下釣垂一魴之餌鰥過而弗視也更以豚之半體則吞之子思喟然歎曰鱞雖難得貪以死餌士雖懐道貪以死禄文子曰魚不可以無餌釣獸不可以空器召列子曰詹何以獨繭絲為綸芒針為鈎荆條為竿剖粒為餌引盈車之魚於千仞之川汨流之中綸不絶鈎不申竿不撓因水勢而施舎也又曰渤海之東有壑焉實惟無底之谷其中有五山常隨朝波上下往還不得暫峙使巨鼇十五舉首而戴之五山始峙而不動而龍伯國有大民泊五山之所而連六鼇合負而趍歸其國灼其谷以數焉荀卿子曰自上莅下猶夫釣者焉隐於手而應扵釣則不可以得魚鬼谷子曰古之善摩者如操釣而臨深淵投之而必得魚矣關子曰魯人有好釣者以桂為餌黄金之鈎錯以銀碧垂翡翠之綸其持竿處位則是然其得魚不㡬矣故曰釣之務不在芳飾事之急不在辨言莊子曰莊子釣於漢水之上楚王使大夫二人往見焉曰願以境内累夫子莊子持竿不顧又曰任公子好釣巨魚為大綸巨鈎以犗牛為餌蹲㑹稽投東海期年不得魚已而大魚食之牽巨鈎驚掦波而奮鬐白波若山海水振蕩任公子得若魚離而腊之浙河以東蒼梧以北莫不厭若魚者淮南子曰詹公之釣千歳之鯉又曰聖人以道德為竿綸以仁義為鈎餌投之天地間萬物孰非其有哉又曰無餌之釣不可以得魚遇士無禮不可以得賢又曰釣者静之罛者舟之罩者抑之罾者舉之為之異得魚一也孫綽子曰海人與山客辯其方物海人曰横海有魚額若華山之頂一吸萬頃之波山客曰鄧林有木圍三萬㝷直上千里傍䕃數國有人曰東極有大人斬木為䇿短不可支釣魚為鮮不足充飢抱朴子曰金鈎玉餌雖珍而不能制九淵之沉鱗顯寵豐禄雖貴而不能制無欲之幽人符子方外曰太公釣隠溪五十有六年矣而未嘗得一魚魯連聞之往行觀其釣太公跪石隠崕且不餌而釣仰詠俯唫及暮而釋竿傅子曰劉􅁮責楊暨曰夫釣者中大魚則縦而隨之須可制而後牽之則無不得也人主之威豈徒大魚而已子誠直臣然計不足不可不精思也穆天子傳曰天子北征舎於珠澤此澤出珠因名之云今越淮平澤出青珠以釣于流水又曰辛未天子北還釣于漸澤食魚于桑野又曰天子乃釣於河以觀姑繇之木姑繇大木也山海經曰尋木長千里生河邉謂此木之類六韜曰吕尚坐茅以漁文王勞而問焉吕尚曰魚求於餌乃牽其緡人食其禄乃服於君故以餌取魚魚可殺以禄取人人可竭以小釣釣川而擒其魚中釣釣國而擒其萬國諸侯吕氏春秋曰善釣者出魚于千仞之下餌香也又曰太公釣於滋泉遭紂之世文王得之而王文王千乗也紂天子也天子失之而千乗得之知與不知也又曰若釣者魚有大小餌有宜適羽有動靜羽釣浮也説苑曰宓子賤為單父宰過於陽晝曰子亦有以送僕乎陽晝曰吾少也賤不知治民之術有釣道二焉請以送子子賤曰釣道奈何陽晝曰夫投綸餌迎而吸之者陽橋也其為魚也薄而不美若存若亡若食不食者魴也其為魚也薄而味厚宓子賤曰善於是未至單父冠盖迎之者交接於道子賤曰車驅之夫陽晝之所謂陽橋者至矣焦贑易林曰曵綸江海釣挂魴鯉王孫利得以饗仲友列仙傳曰吕尚冀州人避紂亂釣于磻溪三年不獲魚比閭皆曰自可止矣公曰非爾所知矣果獲大鯉得兵鈐於魚腹中後塟無尸惟玉鈐六薦於棺中又曰㳙子者齊人釣于澤得符鯉中又曰陵陽子明銍鄊人釣旋溪得白龍子明解鈎而放之後數十年得白魚腹中有書教子明服食遂上黄山採五石脂沸水服之三年白龍来迎去神仙傳曰左慈字元放廬江人少有神通嘗在曹公坐公従容曰今日髙會珍羞略備所少吳松江鱸魚耳放下坐應曰此可得也因求銅盤貯水以竹竿餌釣於盤須臾引大鱸魚出公大笑會者咸驚徐幹中論曰獨思則滯而不通獨為則困而不就善釣不易抵而得魚君子不降席而追道又曰文王遇姜公於渭濵皤然皓首秉竿而釣文王得之灼若袪雲而見日霍若開霧而觀山桓範世論曰水則有波釣則有磨我欲更之無如之何言物動而釁已彰形行而迹已著又曰釣巨魚不使嬰兒輕預非不親力不堪也王子年拾遺記曰漢帝元鳯中季秋之月汎衝瀾靈鷁之舟窮晷繼釣於臺下以香金為鈎霜絲為綸丹鯉為餌得白蛟長三丈大若虵無鱗甲又曰吳主與潘夫人遊釣得大魚吳主喜夫人曰昔聞泣魚今乃為喜有喜必憂以為深誡至末年漸相譛毁稍見離退時人謂夫人知幾釣臺今猶存焉世説曰劉道真少時常漁釣草澤善歌嘯聞者莫不留連有一老嫗識異常人甚樂歌笑乃殺豚進之道真食豚盡了不謝嫗見不飽又進一豚食半還之後為吏部郎嫗兒為小令史道真超用之兒不知由復白母母吿之於是齎牛酒詣道真道真曰去去無可復相報楚辭曰以直鍼為釣又何魚之能得宋玊釣賦曰宋玉與登徒子皆受釣於𤣥淵退而見於楚襄王登徒子曰夫𤣥淵之釣也以三㝷之竿八絲之綸餌以蛆蟟鈎以細鍼以出三尺之魚於數仞之水中盧植與張然明書曰臨江而釣終日不獲一魚魚之不食其餌也是以君子慎其舉謝𤣥與兄書曰居家大都無所為正以垂綸為事足以永日北固下大鱸一出釣得四十七枚又與書曰昨日疏成後釣出手所獲魚以為二坩鮓今奉送筌莊子曰筌者所以在魚得魚而忘筌廣雅曰篝筌謂之笓王朝之與庾安牋曰此間萬頃江湖撓之不濁澄之不清而百姓投一綸下一筌者皆奪其魚器不輸十疋則不得放不知漆園吏何以持竿不顧漁父鼓枻而歌滄浪也罛説文曰罛罟也爾雅曰魚罟内謂之罛郭璞注曰最大網罟也今江東云罟毛詩碩人曰河水洋洋北流活活施罛濊濊鱣鮪發發莊子曰函車之獸介而離山不免乎網罟淮南子曰張天地以為籠因江海以為罟又何忘魚失鳥之有乎網罟廣雅曰罻􅊻魚網謂之罟説文曰網庖犧所結以田以漁也周禮天官上曰獸人掌罟田獸辨其名物罟網也以網搏所當田之獸冬獻狼夏獻麋春秋獻獸物狼膏聚麋膏散聚則温散則涼以救時之苦也獸物凡獸皆可獻也時田則守罟備獸觸攫禮記中庸曰子曰人皆曰予知驅而納諸罟獲䧟穽之中而莫之知辟也毛詩國風曰九罭之魚鱒魴興也九罭􅚶罟小魚之網也鱒魴大魚也周易曰庖犧氏結繩而為網罟爾雅曰􅚶罟謂之九罭魚網也今之百嚢罟是亦謂之􅧡今江東呼為􅚶韓詩曰九罭之魚鱒魴九罭取鰕芘也史記曰泉陽漁人豫且舉網獲江使神龜漢書曰􅉘未祭罝網不布於埜澤焉魏志曰邴原在􅈙東十餘年後乃潛遁還南行已數日而公孫度甫覺度知原之不可復追因曰邴君所謂雲中白鶴非鶉雉之網可能制始吾自遣之勿復求也宋書曰孫法宗常居墓所山禽野獸皆悉馴附每逄鹿觸網必觧放之備以錢物陳書曰張昭字徳明吳郡人也幼有孝性父熯常患消渴嗜鮮魚昭乃身自結網捕魚以供朝夕南史曰陳王固嘗聘魏晏昆明池魏人以南人嗜魚大設罟網固以佛法呪之遂一鱗不獲文子曰臨河欲魚不如退而織網老子曰天網恢恢踈而不漏莊子曰魚不畏網而畏鵜鶘網者公平無私鵜鶘有欲得之心故魚畏又曰豐狐文豹不免於網羅之患者文也韓子曰善張網者引其綱不一一攝萬目而後得一一攝萬目而後得則是勞而難引其綱而魚已慕矣故吏者民之本綱也故聖人治吏不治民又曰靖郭君將城薛客曰君聞夫魚乎網不能止繳不能絓也蕩而失水螻蟻得意焉孟子曰數罟不入洿池魚鱉不可勝食也抱朴子曰太昊師蜘蟵而結網國語曰魯宣公夏濫於泗淵濫漬也漬罟於泗水之淵以取魚泗在魯城北里革斷其罟而棄之罟網也曰古者大寒降土蟄發降下也寒氣初下謂季冬建丑之月大寒之後也土蟄發謂孟春建寅之月蟄䖝始震魚上氷獺祭魚水虞於是乎講罛罶取名魚登川禽而嘗之寢廟行諸國人助宣氣也今魚鱉方孕不教魚長又行網罟貪無藝也公聞之曰吾過而里革匡我不亦善乎是良罟也為我得法良善也使有司蔵之使吾無忘諗言蔵此罟則不忘里革言諗告也師存侍曰蔵罟不如寘里革於側之不忘也寘置同又曰聖人貴讓且諺曰獸惡其網民惡其上獸惡其網為害己民惡其上為病已古文考曰庖犧作卦觀像而作網世本曰芒作網宋襄注曰芒庖犧之臣吕氏春秋曰湯見設網者四面張而祝之曰自天下者自地出者自四方来者皆罹吾網湯曰嘻盡之矣非桀其孰如此又曰舜之未遇時也其従屬掘地財取水利編蒲葦結罟網應璩報東海相梁季然書曰足下頓彌天之網收萬仭之魚罣之以谿谷數之以陔兆何其壯乎觀夫任公子之所釣此為鰌音秋鰕未足為吾子道之罶毛詩鹿鳴曰魚麗于罶鱨鯋又小雅苕之華曰䍧羊羵首三星在罶䍧羊牝羊也罶曲梁寡婦之笱也爾雅曰􅄔婦之笱謂之罶郭璞注曰謂以薄為魚笱説文曰罶曲梁寡婦笱魚罶也罺爾雅曰罺謂之汕郭璞注曰今之撩罟也捷為舍人曰以薄罩魚曰罺是也纂文曰以魚乗水為汕罩爾雅曰籗謂之罩郭璞注曰捕魚籠也毛詩小雅曰南有嘉魚蒸然罩罩纂文曰以鐡施棹因取魚符子曰天羅廓矣野人猶有罩翳之勤涔爾雅曰糝謂之涔郭璞注曰今作糝者聚柴於水中魚得寒入其裏蔵隠因以薄圍捕取之㨗為舍人曰以米投水中養魚為涔也􅊻説文曰􅊻魚網也史記曰陳勝詐為書置人所􅊻魚腹中風土記曰􅊻樹四植而張羅網於水車輓上下之形如蜘之網方而不圓楚辭曰鳥何萃兮蘋中􅊻何為兮木上喻失其所應璩新詩曰洛水禁􅊻罟魚鱉不為殖􅊻罟網名空令自相啖吏民不得食笱毛詩雞鳴敝笱曰敝笱在梁其魚唯唯又小雅小弁曰無逝我梁無發我笱説文曰笱曲竹捕魚笱也從竹勾聲也欚音禮廣雅曰其􅇢謂之欚梁毛詩國風曰維鵜在梁不濡其翼鵜洿澤也梁水之梁鵜在梁可謂不濡其翼彼其之子不稱其服箋云不稱者言徳薄其服尊維鵜在梁不濡其咮咮喙也彼其之子不遂其媾又小雅曰鴛鴦在梁戢其左翼言休息也箋云梁石絶水之梁戢歛也鴛鴦休息在梁上也又曰彼何人斯其心孔艱胡逝我梁不入我門魏志曰文帝東征郭后留譙宫時后表留宿衛欲遏水取魚后曰水當通運漕又少材木奴客不在目前當復私取官竹木作梁遏水今奉車所不足者豈魚乎齊地記曰髙宻郡有古斷水處因造魚梁歳収億數故號曰萬疋梁軥廣雅曰軥謂之輗罠説文曰罠釣也罨廣雅曰罨鮆網也風土記曰罨如􆃁而小歛從水上掩而取者也箄纂文曰箄流水中張魚器也􅩬纂文曰取蠏者􅩬銛纂文曰鐡有鉅施竹頭以擲魚為銛太平御覽巻八百三十四
