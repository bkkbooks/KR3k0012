body:
  text: 太平御覽卷八百六十四宋李昉等撰飲食部二十二脂膏脂膏周禮庖人曰凡用禽獸春行羔豚膳膏香夏行腒鱐音搜膳膏臊秋行犢麛膳膏腥冬行鱻羽膳膏羶用禽獸謂煎和之以獻王也又冬官梓人曰天下之獸五脂者膏者臝者羽者鱗者脂牛羊之屬膏豚之屬也宗廟之事脂者膏者以為牲致美味也禮曰脂用葱膏用薤煎諸膏必㓕之肝膋取狗肝一幪之以其膋小切狼臅膏以與稻米為酏爾雅曰氷脂也説文曰膫牛腸脂通俗文曰脂在脊曰肪在骨曰􅀈獸脂聚曰䐃史記曰販脂辱處也而翁伯千金後漢書曰孔奮為姑臧長力行清潔為衆人所笑以為身處膏脂不能自潤徒益苦辛耳淮南子曰無角者膏而無前有角者脂而無後油魏志曰孫權至合肥新城滿寵馳往赴募壮士數十人折松為炬灌以麻油從上風以火燒賊攻具又曰黄初三年車駕幸宛使夏侯尚率諸軍與曹真共圍江陵權將諸葛瑾與尚軍對江瑾渡入江中渚而分水軍於江中尚夜多持油船將歩騎萬餘人於下流潜渡攻瑾諸軍夾江燒其舟船水陸並攻破之王隱晉書曰元康三年武庫火檢校是工匠盗庫中物恐罪乃投燭着麻膏中火燃又曰齊王冏起義孫秀多歛葦炬益儲麻油扵殿省為縱火具東宫舊事曰月給油六升宋書曰朱修之為荆州刺史去鎮之日秋毫無犯計在州已来燃油及私牛馬食官榖草以私錢六十萬償之梁書曰沈約年十三而遭家難潜竄㑹赦乃免既而流寓孤貧篤志好學晝夜不釋卷母恐其以勞生疾常遣減油滅火又曰張纉為湘州刺史州境大寧晩好積聚多寫書數萬卷有油二百斛米二千石他物稱是又曰侯景攻臺城為尖項木驢攻城矢石不能制羊侃作雉尾炬施鐵鏃以油灌之擲驢上焚之俄盡又曰初侯景既南奔魏相髙澄命先剥景妻子面皮悉以油煎熬之後周書曰衛刺王直作亂率其黨襲肅章門不得入乃縱火燒之尉遲運懼火盡直黨得進乃取油灌木以益火火勢轉盛直不得進乃退博物志曰煎麻油水氣盡無烟不復沸則還冷可内手攪之得水則熖起散卒不滅釋名曰柰油搗柰實和之以塗繒上燥而發之形似油杏油亦如之大平御覽卷八百六十四
