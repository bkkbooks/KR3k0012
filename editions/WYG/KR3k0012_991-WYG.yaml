front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_991-1a, image: WYG0901/WYG0901-0673a.png}
body:
  text: 太平御覧卷九百九十一宋李昉等撰藥部八人參丹參𤣥參沙參紫參苦參茱茰山茱茰占斯杜仲黄耆黄連防己王不􅇔行徐長卿菴閭䕡茹漏蘆委萎蘺南白藿莵旋蕧爵麻小華女苑丹草鬼督郵白鮮薇蓹翹根藎蘆精屈草陸英縠菜木香杜衡䗍實華䑕李人参説文曰人薓音参出上黨春秋運斗樞曰揺光星散為人參禮斗威儀曰君乘木而王有人參生廣雅曰薓地精人參也梁書曰阮孝緒母王氏忽有疾合藥須得生人薓舊𫝊鍾山所出孝緒躬厯幽險累日不逄忽見一鹿前行孝緒感而隨後至一所遂滅就視果獲此草母得服之疾遂愈異苑曰人參一名土精生上黨者佳人形皆具能作兒啼昔有人掘之始下數鏵音華便聞土中有呻聲㝷音而取果得一頭長二尺鏵許四體畢備而髪有損􅆙處將是掘傷所以呻也石勒别傳曰初勒家園中生人參葩茂甚盛于時父老相者皆云此人體竒貌異有大志量其終不可知勸邑人厚遇之潜夫論曰夫理世不得眞賢譬由疾不得真藥也疾當得真人參反得蘿菔已不識真而飲之病浸以劇不知為人所欺也傳子曰先王之制九州異賦天不生地不飬君子不以為禮若河内諸縣去北山絶逺而各調出御上黨真人參上者十斤下者五十斤所調非所生民以為患范子計然曰人參出上黨狀類人者善廣五行記曰隋文帝時上黨有人宅後每夜有人呼聲求之不得去宅一里但一人參枝苗掘之入地五尺得人參一如人體狀去之後呼聲遂絶本草曰人參味甘微寒生山谷主補五臟安定精神魂魄除邪止驚明目開心益智乆服輕身延年生上黨廬山記曰山中藥多人參吳氏本草曰人參一名土精一名神草一名黄參一名血參一名人銜一名土精神農甘小寒桐君雷公苦岐伯黄帝甘旡毒扁鵲有毒或生邯鄲三月生葉小兊核黒莖有毛三月九月採根根有頭足手面目如人慕容晃與顧和書曰今致人參十斤丹參吳氏本草曰丹參一名赤參一名木羊乳一名郗蟬草神農桐君黄帝雷公扁鵲苦无毒李氏大寒岐伯鹹生桐栢或生太山山陵隂莖華小方如荏毛根赤四月華紫三月五月採根隂乾治心痛𤣥參廣雅曰鹿腸𤣥參也建康記曰建康出𤣥參范子計然曰𤣥參出三輔青色者佳本草經曰𤣥參一名重䑓味苦寒生川谷治腹中寒熱女子産乳補腎氣令人目明生河間吳氏本草曰𤣥參一名鬼藏一名正馬一名重臺一名鹿腹一名端一名𤣥臺神農桐君黄帝雷公扁鵲苦无毒岐伯鹹李氏寒或生宛句山陽二月生葉如梅花四四相值似芍藥黒莖方髙四五尺葉亦生枝間四月實黒沙參廣雅曰苦心沙參也建康記曰建康出沙參范子計然曰白沙參出雒陽白者善本草經曰沙參一名知母味苦微寒生川谷治血積驚氣隂寒熱補中益肺氣生河内吳氏本草曰白沙參一名苦心一名識羙一名虎鬚一名白參一名志取一名文希神農黄帝扁鵲无毒岐伯鹹季氏大寒生河内川谷或般陽續山三月生如葵葉青實白如芥根大如蕪菁三月採紫參本草經曰紫參一名杜䝉苦寒旡毒治心腹積聚寒熱邪氣利大便通九竅生河西及宛句治牛病生林陽建康記曰建康縣出紫參范子計然曰紫參出三輔赤青色者善苦參本草經曰苦參一名水槐茱茰西京雜記曰漢武帝宮人賈佩蘭云在宮時九月九日佩茱茰飲菊花酒令人長夀地理志曰九月九日為絲茱茰嚢戴之風土記曰俗上九月九日謂為上九茱茰到此日氣烈色赤可折茱茰房以挿頭用辟惡氣禦冬續齊諧記曰汝南桓景隨費長房逰學累年房謂之曰九月九日汝家有災厄宜令急去家人各作絳嚢盛茱茰以繫臂上登髙飲菊花酒此禍可消景如言舉家登髙山夕還見鷄犬牛羊一時暴死房聞之曰此代矣今世人每至此日登高飲酒載茱茰嚢是也唐廣古今五行記曰晋懐帝時無錫縣有四株茱茰樹生狀若連理郭璞卜云延陵有鼴䑕後當有㧞樹儻有此東南數百里有作逆者及樹生而徐馥作亂本草經曰茱茰一名􅀢音􅀈味辛温生川谷開腠理根去三蟲乆服輕身生上谷晉宫闕名華林園茱茰三十六株范子計然曰茱茰出三輔山茱茰本草經曰山茱茰一名蜀酸棗平生山谷治心下邪氣寒熟温中逐寒温去三蟲乆服輕身生漢中建康記曰建康出茱茰范子計然曰山茱茰出三輔呉氏本草曰山茱茰一名鬾音伎實一名䑕矢一名鷄足神農黄帝雷公扁鵲酸无毒岐伯辛一經酸或生寃句琅琊或東海承縣葉如梅有刺毛二月華如杏四月實如酸􅀥赤五月採實占斯本草經曰占斯一名炭及味苦杜仲呉氏本草曰杜仲一名木綿一名思仲黄耆秦州記曰隴西㐮武縣出黄耆本草經曰黄耆味甘微温生山谷黄連廣雅曰王連黃連也范子計然曰黃連出蜀都黃肥堅者善神仙傳曰封君逹服黃連五十餘年入鳥䑕山服練水銀百餘嵗常騎青牛行民間有疾病者不問識與不識皆與藥即差又曰黒宂公服黃連得仙名山記曰扶容石草多黄連湘州記曰邵陵夫夷縣衡山出黃連永嘉記曰松陽縣草有黄連覆地土人取者必禱祠若失神意則化為異物本草經曰黃連一名王連味苦寒生川谷治熱氣目痛眥傷泣出明目生巫陽呉氏本草曰黃連神農岐伯黃帝雷公苦无毒李氏小寒或生蜀郡太山之陽防己范子計然曰防己出漢中潯陽本草經曰防己一名石解味辛平无毒治風寒温瘧熱氣通腠理利九竅生漢中呉氏本草經曰木防己一名解離一名解燕神農辛黃帝岐伯桐君苦无毒季氏大寒如葛莖蔓延如芄白根内黃似桔梗内黒文如車輻解者良二月八月採根陰乾王不留行本草經曰王不留行味苦平生山谷乆服輕身能老生太山崔實四民月令曰八月采王不􅇔行世說曰衛江州在尋陽劉孝標注云衛㐮為江州刺史有知舊人投之都不料理唯餉王不留行一斤此人得餉命駕呉氏本草經曰王不􅇔行一名王不流行神農苦平岐伯雷公甘三月八月採徐長卿本草經曰徐長卿一名鬼督郵味辛温生山谷治鬼物百精蠱毒疾疫邪氣温鬼乆服強悍輕身生太山呉氏本草曰徐長卿一名石下長卿神農雷公辛或生隴西三月採菴閭本草經曰菴閭味苦㣲寒生川谷治風寒濕痺身體諸痛乆服輕身不老生雍州呉氏本草經曰菴閭神農雷公桐君岐伯苦小温无毒李氏温或生上黨葉青厚兩兩相當七月花白九月實黒七月九月十月採驢馬食仙去䕡茹建康記曰建康出草䕡茹范子計然曰䕡茹出武都黃色者善本草經曰䕡茹味辛寒生川谷治蝕惡肉敗瘡死肌仍殺疥蟲除大風生代郡呉氏本草經曰䕡茹一名離婁一名掘据神農辛岐伯酸鹹有毒李氏大寒二月採葉員黃髙四五尺葉四四相當四月華黃五月實黒根黃有汁亦黄色三月五月採根黒頭者良漏蘆本草經曰漏蘆一名野蘭委萎爾雅曰熒委萎郭璞注曰藥草也葉似竹大者如箭竿有節葉狹而長表白裏青根大如指長一二尺可啖呉氏本草經曰委萎一名葳㽔一名馬薫一名地節一名蟲蟬一名烏萎一名熒一名玉竹神農苦一經丼桐君雷公扁鵲甘无毒黃帝辛生太山山谷葉青黃相值如薑二月七月採治中風暴熱乆服輕身離南爾雅曰離南活莌也草生江南髙丈許大葉莖中有瓤正白兊青脫山海經曰升山草多冦脫郭璞注曰草生南方髙丈許葉似荷葉白莬藿呉氏本草經曰白莬藿一名白葛旋蕧爾雅曰蕧盗庚旋復似菊本草經曰旋蕧一名金沸草爵麻本草經曰爵麻生漢中呉氏本草經曰爵麻一名爵卿小華呉氏本草曰小華一名結草女苑呉氏本草曰女苑一名白苑一名織女苑廣雅曰女腸女苑也丹草本草經曰石長生一名丹沙草味鹹微寒生山谷治寒熱惡瘡火熱辟惡氣不祥鬼毒生咸陽呉氏本草曰石長生神農苦雷公辛一經甘生咸陽同陽鬼督郵本草經曰鬼督郵一名赤箭一名離母味辛温生川谷殺鬼精物治蟲毒惡氣乆服輕身益力長隂肥徤生雍州建康記曰建康出鬼督郵呉氏本草曰鬼督郵一名神草一名閻狗或生太山或少室莖如箭赤旡葉根如芋子三月四月八月採根日乾治癰腫白鮮本草經曰白鮮治頭風薇蓹呉氏本草曰薇銜一名糜蓹一名无頭一名承膏一名鹿銜一名无心翹根本草經曰翹根味苦平生澤治下熱氣益隂精令人面恱好明目乆服輕身耐老呉氏本草曰翹根神農雷公甘有毒三月八月採以作蒸飲酒病人藎本草經曰藎草味苦盧精本草經曰盧精治蠱毒味辛平生益州屈草本草經曰屈草實根味苦微寒生川澤治胸脇下痛腹間寒隂痺乆服輕身補益耐老生漢中陸英本草經曰陸英生熊耳山縠菜本草經曰縠菜一名白英味甘寒生山谷治寒熱乆服輕身延年生益州木香本草經曰木香一名蜜香味辛温無毒治邪氣辟毒疫温鬼強志主氣不足乆服不夣寤魘寐輕身致神仙生永昌山谷陶隠居云此即青木香也永昌不復貢今皆從外國舶上來云大秦國以療毒腫消惡氣有驗今皆用之杜衡􅀶物志曰杜衡亂細辛蠡實華呉氏本草曰蠡實一名劇草一名三堅一名劇荔華䑕李呉氏本草曰䑕李一名牛李太平御覧卷九百九十一
