body:
  text: 太平御覽卷一百三十一宋李昉等撰偏霸部十五北齊髙殷高演高湛高緯高殷北齊書曰廢帝殷字正道文宣帝之長子也母曰李皇后天保元年立為皇太子時年六歳性敏慧初學反語於跡字下注云自反時侍者未達其故太子曰跡字足傍亦為跡豈非自反耶文宣每言太子得漢家性質不似我欲廢之立太原王初詔國子博士李寳鼎傅之鼎卒復詔國子博士邢峙侍講太子雖富於春秋而温裕開朗有人君之度貫綜經業省覽時政甚有美名七年冬文宣召朝臣文學者及禮官於東宫宴㑹令以經義相質親自臨聽太子手筆措問在坐莫不嘆美九年文宣在晉陽太子監國十年十月文宣崩癸夘太子即位於晉陽宣徳殿大赦庚戌尊皇太后為太皇太后皇后為皇太后乾明元年庚辰春正月癸丑朔改元己未詔寛徭賦癸亥高陽王湜薨車駕至自晉陽戊申以常山王演為大丞相都督中外諸軍録尚書事三月甲寅詔軍國事皆申晉陽禀大丞相常山王規笇秋八月太皇太后令廢帝為濟南王以大丞相常山王演入纂大統是日王居別宫皇建二年九月殂於晉陽時年十七諡閔悼王高演北齊書曰孝昭皇帝演字延安神武皇帝第六子文宣皇帝之母弟也幼而英特早有大成之量武明皇太后早所愛重魏元象元年封常山郡公天保初進爵為王五年除并省尚書令帝善斷割長於文理省内畏服七年從文宣還鄴以尚書奏事有異同令帝與朝臣先論定得失然後敷奏帝長於政術剖斷咸盡其理文宣嘆重之八年轉司空録尚書事九年除大司馬仍錄尚書文宣崩帝居禁中護喪事幼主即位乃即朝班除太傅錄尚書事朝政皆决於帝月餘乃居藩邸自是詔勅多不關帝客或言於帝曰鷙鳥捨巢必有探卵之患今日之地何宜屢出乾明元年從廢帝赴鄴居於領軍府時楊愔燕子獻可朱渾天和宋欽道鄭子黙等以帝威望既重内懼權逼請以帝為太師司州牧録尚書事長廣王湛為大司馬録并省尚書事解京畿大都督帝既以尊親而見猜斥乃與長廣王期獵謀之於野三月甲戌帝初上省旦發領軍府大風暴起壊所御車幔甚惡之及至省朝士咸集坐定酒數行於坐執尚書令楊愔右僕射燕子獻領軍可朱渾天和侍中宋欽道等於坐帝戎服與平原王段韶平秦王高歸彦領軍劉洪徽入自雲龍門於中書省前遇散騎常侍鄭子黙又執之同斬於御府之内帝至東閤門都督成休寧抽劒呵帝帝令高歸彦喻之休寧厲聲大呼不從歸彦既為領軍素為兵士所服悉皆弛仗休寧方歎息而罷帝入至洛陽殿幼主太皇太后皇太后並出臨御坐帝奏愔等罪求伏專擅之辜時庭中及兩廊下衞士二千餘人皆披甲待詔武衞娥永樂武力絶倫又被文宣重遇撫刃思効廢帝性吃訥兼倉卒不知所言太皇太后又為皇太后誓言帝無異志唯云逼而已高歸彦勅勞衞士解嚴永樂乃内刃而泣帝乃令歸彦引侍衞之士向華林園以京畿軍入守門閤斬娥永樂於園詔以帝為大丞相都督中外諸軍録尚書事相府佐史進位一等帝尋入晉陽有詔軍國大政咸諮決焉帝既當大位知無不為擇其令典考綜名實廢帝恭己以聽政太皇太后尋下令廢少主命帝統大業皇建元年八月壬午皇帝即位於晉陽宣徳殿大赦改乾明元年為皇建壬辰分遣大使巡省四方觀察風俗問人疾苦考求得失搜訪賢良二年十一月甲辰詔曰朕嬰此暴疾奄忽無逮今嗣子沖眇未嫻政術社稷業重理歸上徳右丞相長廣王湛硏機測化體道居宗人雄之望海内瞻仰同胞共氣家國所慿可遣尚書左僕射趙郡王叡喻旨徴王統兹大寳先是帝不豫而無闕聽覽是日崩於晉陽宫時年二十七大寧元年閏十二月癸夘梓宫還鄴上諡曰孝昭皇帝塟於文靖陵帝聰敏有識度深沈能斷不可窺測身長八尺腰帶十圍儀望風表逈然獨秀自居臺省留心政術嫻明簿領吏所不逮及正位宸居彌所尅勵輕徭薄賦勤恤人隱内無私寵外收人物雖后父位亦特進無別日是臨朝務知人之善惡毎訪問左右冀獲直言曾問舍人裴澤在外議論得失澤率爾對曰陛下聰明至公自可逺侔古昔而有識之士咸言傷細帝王之度頗為未𢎞帝笑曰誠如卿言朕初臨萬機慮不周悉故致爾耳此事安可久行恐後又嫌疎漏澤因被寵遇其樂聞過也如此趙郡王叡與厙狄顯安侍坐帝曰須拔我同堂弟顯安我親姑子今序家人禮除君臣之敬可言我之不逮顯安曰陛下多妄言曰若何對曰陛下昔見文宣以馬鞭撻人常以為非而今行之非妄言耶帝握其手謝之又使直言對曰陛下太細天子乃更似吏帝曰朕甚知之然無法來久將整之以至無為耳又問王晞晞答如顯安皆從容受納高湛北齊書曰世祖武成皇帝諱湛神武皇帝第九子孝昭皇帝之母弟儀表瓌傑神武尤所鍾愛神武方招懐荒逺乃為帝聘蠕蠕太子菴羅辰女號隣和公主帝時年八歳冠服端嚴神情閒逺華戎歎異元象中封長廣郡公天保初進爵為王拜尚書令尋兼司徒遷太尉乾明初楊愔等密相疎忌以帝為大司馬領并州刺史帝既與孝昭謀誅諸執政遷太傅録尚書事領京畿大都督皇建初進位右丞相孝昭幸晉陽帝以懿親居守鄴政事咸見委託二年孝昭崩遺詔徴帝入統大位及晉陽宫發喪於崇徳殿皇太后令所司宣遺詔左丞相斛律金率百寮敦勸三奏乃許之大寧元年冬十一月癸丑皇帝即位於南宫大赦改皇建二年為大寧庚申詔大使巡行天下求政善惡問人疾苦擢進賢良是歳周武帝保定元年也河清元年春正月乙亥車駕至自晉陽辛巳祀南郊壬午享太廟丙戌立妃胡氏為皇后子緯為皇太子大赦四月乙巳青州刺史上言今月庚寅河濟清以河濟清改大寧二年為河清二年癸未春正月乙未帝詔臨朝堂䇿試秀才以太子少傅魏收為兼尚書右僕射十二月大雨雪連月南北千餘里平地數尺霜晝下雨血於太原四年三月彗星見有物殞於殿庭如赤漆鼔帶小鈴殿上石自起兩兩相對又有神見於後園萬夀堂前山穴中其體壯大不辨其面兩齒絶白長出於脣帝直宿嬪御已下七百人咸見焉帝又夢之夏四月戊午大將軍東安王婁叡坐事免乙亥陳人來聘太史奏天文有變其占當有易主丙子乃使太宰段韶兼太尉持節奉皇帝璽綬傳位於皇太子大赦改元為天統元年百官進級降罪各有差又詔皇太子妃斛律氏為皇后於是羣公上尊號為太上皇帝軍國大事咸以奏聞始將傳政使内參乗子尚乗馹送詔書於鄴子尚出晉陽城見人騎馬隨後忽失之尚未至鄴而其言已布矣天統四年十二月辛未太上皇帝崩於鄴宫乾夀堂時年三十二諡曰武成皇帝廟號世祖塟永平陵高緯北齊書曰後主諱緯字仁綱武成皇帝之長子也母曰胡皇后夢於海上坐玉盆日入裙下遂有娠天保七年五月五日生帝於并州邸帝少美容儀武成特所愛寵拜王世子及武成入纂大業立為皇太子河清四年武成禪位於帝天統元年乙酉夏四月丙子皇帝即位於晉陽宫大赦改河清四年為天統三年二月壬寅朔帝加元服大赦四年秋周人來通和太上皇帝詔侍中斛斯文略報聘於周十二月辛未太上皇帝崩武平三年二月侍中祖珽為左僕射是月敕撰𤣥洲苑御覽後改名聖夀堂御覽三月辛酉詔文武官五品已上各舉一人秋七月戊辰誅左丞相咸陽王斛律光及其弟幽州行臺荆山公豐樂八月庚寅廢皇后斛律氏為庶人是月聖夀堂御覽成敕付史閣後改為修文殿御覽六年八月周師入洛川屯芒山攻逼洛城縱火船焚浮橋河橋絶閏月己丑遣右丞相高阿那肱自晉陽禦之師次河陽周師夜遁七年冬十月帝大狩於祁連池周師攻晉州癸亥帝還晉陽甲子出兵大集晉陽庚午帝發晉陽列陣而行上雞栖原與周齊王憲相對至夜不戰周師斂陣而退十一月周武帝退還長安留偏師守晉州高阿那肱等圍其城戊寅帝至圍所十二月戊申周武帝來救晉州庚戌戰於城南齊軍大敗帝棄軍先還癸丑入晉陽憂懼不知所之甲寅大赦帝謂朝臣曰周師甚盛若何羣臣咸曰天命未改一得一失自古皆然宜停百賦安朝野收遺兵背城死戰以存社稷帝意猶豫欲向北朔州乃留安徳王延宗廣寧王孝珩等守晉陽若晉陽不守即欲奔突厥羣臣皆曰不可帝不從其言開府儀同三司賀㧞伏恩封輔相慕容鍾葵等與宿衞近臣三十餘人西奔周師乙夘詔募兵遣安徳王延宗為左廣寧王孝珩為右延宗入見帝告欲向北朔州延宗泣諫不從帝密遣王康徳與中人齊紹等送皇太后皇太子於北朔州丙辰帝幸城南軍勞將士其夜欲遁諸將不從丁巳大赦改武平七年為隆化元年其日穆提婆降周詔除安徳王延宗為相國委以備禦延宗流涕受命帝乃夜斬五龍門而出欲走突厥從官多散領軍梅勝郎扣馬諫乃迴之鄴唯高阿那肱等十餘騎廣寧王孝珩襄城王彦道續至得數十人同行戊午延宗從衆議即皇帝位於晉陽改隆化為徳昌元年庚申帝入鄴辛酉延宗與周師戰於晉陽大敗為周師所虜帝遣募人重加官賞雖有此言而竟不出物廣寧王孝珩奏請出宫人及珍寳班賜將士帝不恱斛律孝卿居中受委帶甲以處分請帝親勞軍為帝撰辭且曰宜慷慨流涕感激人心帝既出臨衆將令之不復記所受言遂大笑左右亦羣咍將士莫不解體於是自大丞相已下太宰三師大司馬大將軍三公等官並增員而授或三或四不可勝數甲子皇太后從北道至引文武一品已上入朱華門賜酒食及紙筆問以禦周之方略羣臣各異議帝莫知所從又引高元海宋士素盧思道李徳林等欲議禪位皇太子先是望氣者言當有革易於是依天統故事傳位幼主帝自稱太上皇幼主名恒帝之長子也母曰穆皇后武平元年六月生於鄴其年十月立為皇太子隆化二年正月乙亥即皇帝位時年八歳改元為承光元年大赦於是黄門侍郎顔之推中書侍郎薛道衡侍中陳徳信等勸太上皇往河外募兵更為經略若不濟南投陳國從之丁丑太皇太后太上皇自鄴先趨濟州周師漸逼癸未幼主又自鄴東走己丑周師至紫陌橋癸巳燒城西門太上皇將百餘騎東走乙亥渡河入濟州其日幼主禪位於大丞相任城王湝令侍中斛律孝卿送禪文及璽綬於瀛州孝卿乃以之歸周又為任城王詔尊太上皇為無上皇幼主為守國天王留太后於濟州遣高阿那肱留守太上皇并皇后擕幼主走青州韓長鸞鄧顒等數十人從太上皇既至青州即為入陳之計而高阿那肱召周軍約生致齊主而屢使人告言賊軍在逺已令人燒斷橋路太上所以停緩周軍奄至青州太上窘急將遜於陳置金囊於鞍後與長鸞淑妃等數十騎至青州南鄧村為周將尉遲剛所獲送鄴周武帝與抗賔主禮并太后幼主諸王俱送長安封帝温國公在位凡一十三年帝素昏亂加之暴虐崔季舒斛律光等皆以直見殺帝好自彈琵琶而唱無愁曲每處深宫羞見朝士三日一臨小殿啟事者走如飄風頭著於胷不得平視凡諸犬馬皆有儀同郡君之號又於宫中立貧窮村舍帝自弊衣為乞兒每好不急之求一夜索蝎及曉得三升置之浴斛使人裸卧斛中觀其號呌宛轉而為笑樂又賣官爵各分州郡下至鄉官皆降中旨於是州縣官人多出富商大賈競為貪縱人不聊生以至於敗也初武成夢大蝟攻破鄴城乃悉索境内蝟膏以絶之議者以帝之名聲與蝟相協亡齊之徴也太平御覽巻一百三十一
