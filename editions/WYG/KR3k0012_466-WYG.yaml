body:
  text: 太平御覽卷四百六十六宋李昉等撰人事部嘲戯罵詈嘲戯説文曰嘲相調戯相弄也又曰戯弄也毛詩曰善戯謔兮不為虐兮又曰伊其相謔贈之以芍藥又曰謔浪笑傲中心是悼左傳曰宋萬歸宋宋公靳之曰向吾敬子今子魯囚也吾不敬子矣萬病之遂殺宋公戯而相狎曰靳論語曰子之武城聞絃歌之聲莞爾而笑曰割雞焉用牛刀子㳺對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也夫子曰偃之言是也前言戯之耳漢書曰上以東方朔為常侍伏日詔賜從官肉朔獨㧞劒割肉謂其同官曰伏日當早歸即懐肉去上問朔曰不待詔割肉而去何也先生自責朔曰不待詔何無禮也拔劒割肉一何壯也割又不多又何㢘也歸遺細君又何仁也上笑曰先生自責反自譽復賜酒一石肉一百斤使遺細君東觀漢記曰光武令王霸至薊市中募人將以擊王郎市中人皆大笑舉手揶揄之霸慚懅而還後漢書曰邊韶字孝先陳留浚儀人以文學教授數百人曾畫卧弟子嘲之曰邊孝先腹便便懶讀書但欲眠邊韶潜聞之應時對曰邊為姓先為字腹便便五經笥但欲眠思經事寐與周公通情夣與孔子同意師而可嘲出何典記嘲者大慚吳志曰諸葛瑾字子瑜面長似驢吳主使優人牽驢入題其上曰諸葛子瑜瑾子恪請筆益兩字曰之驢人伏其敏權即以驢賜恪蜀志曰先主與劉璋㑹涪時張裕為璋從事侍坐其人饒鬚先主嘲之曰昔吾居涿縣時多毛姓東西南北皆毛也裕即荅曰昔有士作上黨潞長遷為涿郡令者去官還家時人與書欲署潞則失涿欲署涿則失潞乃署曰潞涿君先主無鬚故裕以此及之晉書曰范寗嘗患目痛就中書侍郎張湛求方湛因嘲之曰古方宋陽里子少得其術以授魯東門伯東門伯以授左丘明遂世世相𫝊及漢杜子春鄭康成魏髙堂隆晉左太冲凡此諸賢並有目疾得此方云用損讀書一减思慮二専内視三簡外觀四旦晚起五夜早眠六凡六物熬以神火下以氣節藴於胷中七日然後納諸方寸修之一時近能數其目睫逺視尺棰之餘長服不已洞見墻壁之外非但明目乃亦延年又曰謝敷𫝊初月犯少微一名處士星古者以隠士當之譙國戴逵有美才時人憂之俄而敷死故㑹稽人士以嘲吳人云吳中髙士便是求死不得死又曰謝萬有才名為㑹稽王道子驃騎長史嘗因侍坐於時月夜明净道子歎以為佳萬率爾曰意謂不如微雲㸃綴道子因戯萬曰卿居心不净乃復彊欲滓穢太清耶又曰何充性好釋典崇修佛寺供給沙門縻費巨億而不吝親友貧乏無所施遺以此獲譏於世阮裕常戱之曰卿志大宇宙勇邁終古充問其故裕曰我圖數千户郡尚不能為卿圖作佛不亦大乎又曰陸雲與荀隠素未相識嘗㑹張華坐華曰今日相遇勿可為常談雲因抗手曰雲間陸士龍隠曰日下荀鳴鶴鳴鶴隠字也雲又曰既開青雲覩白雉何不張爾弓挾爾矢隠曰本謂是雲龍驋驋乃是山鹿野麋獸微弩彊是以發遲華撫手大笑又曰袁山松欲以女妻謝混王珣曰卿莫近禁臠初元帝始鎮建業公私窘罄毎得一㹠以為珍膳項下一臠尤美輙以薦帝郡下未嘗敢食于時呼為禁臠故珣以為戯混果尚主又曰郄詵遷雍州刺史東堂㑹送武帝問詵卿自以為何如詵對曰臣舉賢良對䇿為天下第一猶桂林一枝崐山片玉帝笑侍中奏免詵詔曰與戯耳不足罪又曰張憑字長宗祖鎮蒼梧太守憑年數嵗鎮謂其父曰我不如汝有佳兒憑曰阿翁詎宜以子戱父耶又曰郄超為桓温叅軍時王珣為温主簿亦為所重府中語曰髯叅軍短主簿能令公喜能令公怒超髯珣短故也又曰潘京為州所辟因謁見問䇿探得不孝字刺史戯京曰辟士為不孝耶京舉板荅曰今為忠臣不得復為孝子沈約宋書曰何承天除著作郎時年已老諸佐郎並名家少年珣伯子嘲之曰呼為嬭母承天曰卿當云鳯凰將九子嬭母何言耶又曰袁淑喜為誇誕每為時人所嘲始興王濬嘗送錢三萬餉淑一宿復遣追取謂使人謬誤欲以戲淑齊書曰陸澄當世稱為碩學讀易三年不解義欲草宋書終不就王儉戯之曰陸公書厨也又曰庾杲之清貧自業食唯有韭葅􅊪韭生韭雜菜或戱之曰誰謂庾郎貧食常有二十七種言三九也又曰謝超宗送湘州刺史王僧䖍閣道壊墜水僕射王儉駕牛驚跣下車超宗撫掌笑戯曰落水三公墮車僕射梁書曰朱异遍治五經渉獵文史博奕書筭皆其所長年二十詣尚書令沈約試之因戱异曰卿年少何乃不㢘异逡廵未逹約乃曰天下唯有文義棋書卿一時將去可謂不㢘也陳書曰徐陵使魏魏人授館宴賓是日甚熱其主客魏收嘲陵曰今日之熱當因徐常侍來陵即荅曰昔王肅至此為魏始制禮儀今我來聘使卿復知寒暑收大慙隋書曰何妥少機警八嵗逰國學助教顧良戯之曰汝姓何是荷葉之荷是河水之河妥應聲荅曰先生姓顧是眷顧之顧是新故之故衆咸異之隋書曰麥鐵杖考功郎竇從一嘲之曰麥是何姓鐵杖應聲對曰麥豆不殊那忽相恠竇赧然無以應之時人以為敏慧又曰鄭譯少為太祖所親恒令與諸子逰集年十餘嵗嘗詣相府司録李長宗於衆中戯之譯斂容謂長宗曰眀公位望不輕瞻仰斯屬輙相玩狎無乃䘮徳也長宗甚異之唐書曰蘇世長髙祖嘗嘲之曰名長意短口正心邪弃忠貞於鄭國忘信義於吾家世長對曰名長意短實如聖㫖口正心邪未敢奉詔昔竇融以河西降漢漢十世封侯臣以山南歸國唯䝉屯監即日擢拜諌議大夫晏子春秋曰晏子短小使楚楚人為小門於大門側而延晏子晏子不入曰使狗國者從狗門入今日臣使楚不當從狗門入王曰齊無人耶對曰齊之臨淄張袂成帷揮汗成雨何為齊無人使賢者使賢王不肖者使不肖王嬰不肖故使楚也莊子曰惠子始與莊子相見而問乎莊子曰今日自以為見鳯凰而徒遭燕雀耳坐者俱笑孔叢子曰平原君與子髙飲强子髙酒曰昔有遺諺堯舜千鍾孔子百􅒀子路溘溘尚飲百榼古之聖賢無不能飲也吾子何辭焉子髙曰以穿所聞聖賢以道徳燕人未聞以飲也平原君曰即如先生言則此言何生子髙曰生於嗜酒者盖其勸勵采戯之辭非實然也平原欣然曰吾弗戯子無所聞此雅言也吕氏春秋曰成王與唐叔虞燕居援梧葉以為珪授虞曰以此封汝虞喜以告周公公請曰天子封耶成王曰余一人與虞戱爾周公曰臣聞之天子無戱言天子言則史書之工誦之士稱之於是遂封虞于唐裴啟語林曰劉道真遭亂於河側自牽船見一老嫗操櫓劉謂之曰女子何不調機理杼而操櫓女荅曰丈夫何不跨馬揮鞭而牽船又曰祖士言與鍾雅相調鍾語祖曰我汝潁之士利如錐卿燕代之士鈍如槌祖曰以我鈍槌打爾利錐鍾曰自有神錐不可得打祖曰既有神錐亦有神槌鍾遂屈劉義慶世説曰謝太傅始有東山之志桓公見藥中有逺志公問謝此藥又曰小草何以一物二稱謝未即荅郝叅軍荅曰處則為逺志出則為小草謝公殊有愧色諸葛恪别𫝊曰孫權嘗宴見蜀使費禕逆勑羣臣使至伏勿起禕至權輟食而羣下不起禕嘲之曰鳯凰來翔麒麟吐哺驢騾無知伏食如故恪荅曰愛植梧桐以待鳯凰是何燕雀自稱來翔何不彈射使還故鄉劉昭㓜童𫝊曰張𤣥字祖希年八嵗虧齒先逹知其不常故戯之曰君口何為開狗竇𤣥荅曰正使君軰從中入釋名曰罵廹也以惡言被廹人也又曰詈厯也以惡言相彌厯左傳曰冉堅射陳武子中手失弓而罵戰國䇿曰宋康王時有雀生鸇於城之陬使史占之曰小而生巨必霸天下王大喜於是㓕滕伐薛取淮北之地愈自信欲霸之亟成故射天笞地斬社稷而焚㓕之曰威服天下鬼神罵國老誅諫臣為無顔之冠以示勇國人大駭齊聞而伐之史記曰陳狶將趙利守東垣髙祖攻之月餘不下卒衆罵髙祖髙祖怒城降令出罵者斬不罵者原之漢書曰項羽㧞滎陽城生得周苛羽謂苛為我將以公為上將軍苛罵曰若不趍降漢今為虜矣又曰陳狶反上自至邯鄲令周昌選趙壯士可令將者昌見四人上嫚罵曰豎子能為將乎四人慙伏地上以為將又曰張湯以更定律令為廷尉汲黯於上前憤發罵曰天下刀筆吏不可以為公卿果然又曰王莽即位使安陽侯王舜索𫝊國璽太后知為莽求怒罵之曰我漢家老寡婦旦暮且死欲與此璽俱𦵏終不可得又曰魏豹叛漢王謂酈生曰緩頰往説之豹曰人生一世間若白駒過隙今漢王嫚侮人罵詈諸侯羣臣如奴耳吾不忍復見又曰張敖為趙王髙祖從平城過趙王旦暮自上食髙祖箕踞罵詈甚慢之趙相貫髙等怒説敖曰今王事皇帝甚恭而皇帝無禮請為王殺之又曰韓信平齊使人請自立為假王漢王大怒詈曰吾困於此望若來佐我乃欲自立為王張良陳平附耳語之漢王寤因復詈曰大丈夫即為真王耳何以假為又曰田蚡取燕王女為夫人太后詔召列侯宗室皆往賀灌夫行酒次至臨汝侯灌賢方與程不識耳語又不避席夫乃罵賢平生毁程不直一錢今長者為夀乃效兒女曹呫囁耳語耶又曰黥布反上自征謂布何苦而反布曰欲為帝耳上怒罵之遂戰破布軍又曰吕后召趙王周昌令王稱疾不行吕后大罵昌曰爾不知我之怨戚氏乎而不遣趙王也又曰上擊黥布時為流矢所中行道疾甚吕后迎良醫入見問醫疾可治否醫曰可治上嫚罵之曰吾以布衣提三尺劒取天下此非天命乎命乃在天雖扁鵲何益又曰陸賈時時前説稱詩書髙帝罵曰乃翁居馬上得之安事詩書賈曰馬上得之寧可馬上治之乎范􅁮後漢書曰王允與吕布謀令騎都尉李肅并勇士千餘人於掖門内以待董卓卓将出馬驚不行肅以㦸刺之墜車顧大呼曰吕布何在布曰有詔討賊卓大罵曰庸狗敢如是耶又曰李傕等共追乘輿大戰恒農東澗射聲校尉祖㑺被創墮馬李傕謂左右曰尚可活不㑺罵之曰汝等凶逆逼廹天子亂臣賊子未有如汝者傕使殺之續漢書曰董卓為司空辟蔡邕稱疾不就卓大怒詈曰我力能族人邕不得已乃到署祭酒東觀漢記曰劉寛嘗坐客遣蒼頭市酒迂乆大醉而還詈曰畜生寛遣人視奴疑必自殺魏志曰諸葛恪圍合肥新城中遣士劉整出圍𫝊消息為賊所得拷問所𫝊語整罵曰死狗此何言也我當必死為魏國鬼不苟求活逐汝去又曰龎徳曹仁與闗雲長戰徳敗被執謂曰我欲以卿為将何不早降徳怒罵曰大丈夫何能降也遂被殺又曰劉𤣥徳嘗薦舉袁渙為茂才後為吕布所拘布欲使渙作書詈𤣥徳渙不可再三强之不許吕布大怒以兵脇渙曰為之則生不為則死渙面色不變笑而應之曰渙聞唯徳可以辱人不聞以罵且他日之事劉将軍猶今日之事将軍也一旦去此復罵將軍可乎布慙而止吳志曰孫峻誅諸葛恪臨淮臧均表乞收𦵏曰令恪父子三首懸示積日觀者數萬罵聲成風國之大刑無所不震又曰孫堅至南陽太守張咨不給軍粮又不見堅堅詐得急病欲以兵付咨咨心利其兵則将騎五六百入營省堅堅卧與相見無何卒然而起按劒罵咨遂執斬之王隠晉書曰叚疋磾弟文鴦與石勒戰所乗馬乏勒呼曰大兄久望共同天下違願今日相見何復戰請釋伏語鴦罵曰汝為虐久應死吾兄不能用吾計故令汝得至此吾寧死不忍為汝所擒遂下馬與戰山海經曰若山有獸焉名曰山膏其状如豚赤若丹火善罵好罵也賈誼新書曰紂自謂天王而桀自謂天父已㓕之後民以相罵禰衡别𫝊曰禰衡著寛布單衣練巾坐曹操大營門下以杖捶地數罵責操及先祖無所不至營令史入啟言外有狂生禰衡言語悖逆請案科治操聞之嘿然良久乃勅外具上廐馬三匹并騎二人挾将送置荆州黄祖遂令殺之吳質别傳曰魏文帝詔上将軍及特進以下皆㑹質所上将軍曹真肥領軍朱鑠痩質召優使説肥痩真扣刀瞋目曰言非敢説吾斬爾遂罵質案劒曰曹子丹吳質吞爾不揺喉何敢恃勢驕揚雄方言曰荆淮海岱雜齊之間罵奴曰臧罵婢曰獲又桓譚新論曰哀帝時有才人范蘭言年三百嵗初與人相見則喜而相應和再三則罵而逐人列女𫝊曰安定皇甫規妻年盛色美董卓聘以輜軿百乗乃輕服詣卓門跪自陳請卓使侍者悉杖刀圍之妻知不免乃立罵卓曰君𦍑胡之種毒害天下猶未足耶敢欲行非禮於爾君夫人乎卓乃以其頭懸車軛鞭撲交至遂死車下太平御覽卷四百六十六
