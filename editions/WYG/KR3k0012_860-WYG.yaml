body:
  text: 太平御覽卷八百六十宋李昉等撰飲食部十八餅糗糒餌粢粔籹寒具餅釋名曰餅并也溲麫使合并也胡餅作之大漫汗亦言以胡麻著上也蒸餅湯餅蝎餅之屬皆隨形而名之也漢書曰宣帝㣲時每買餅所從買家輙大售帝以自怪續漢書曰靈帝好胡餅京師皆食胡餅後董卓擁胡兵破京師之應東觀漢記曰光武問第五倫曰卿為市掾人有遺卿母百笥餅卿從外來見之奪母笥探口中餅出有之乎倫對曰實無此衆人以臣愚蔽故為出此言耳英雄記曰李叔節與弟進先共在乗氏城中吕布詣乗氏城下叔節從城中出詣布進先不肯出為叔節殺數頭肥牛提數十石酒作萬枚胡餅先持投客魏志曰漢末趙岐避難逃之河間不姓字又轉詣北海著絮巾袴常於市中販胡餅孫賔碩時年二十餘乗犢車將騎入市觀見岐疑其非常人也因問之自有餅耶岐曰販之賔碩曰買幾錢賣幾錢岐曰買三十賣亦三十賔碩曰視處士之望非賣餅者殆有故乃開車後户顧所将兩騎令下馬扶上之時岐以為是唐氏耳目也甚怖面失色賔碩閑後户下前檐謂之曰視處士􅃺貌既非販餅者如今面色變動即不有重怨則當亡命我北海孫賔碩闔門百口又有百歲老母在堂勢能相度者也終不相負必語我以實岐乃具告之碩遂載岐以騎歸又曰嚴翰字公仲學問特善春秋司𨽻鍾繇不好公羊而好左氏謂左氏為太官而謂公羊為賣餅家又曰盧毓為吏部尚書時舉中書郎詔曰得其人與不在盧生耳選舉莫取有名名如畫地作餅不可啖也魏畧曰丁裴封列侯坐免官後太祖調曰裴文侯印綬何在裴對曰以易餅太祖大笑晉書曰何曽性奢豪務在華侈幃帳車服窮極綺麗厨膳滋味過於王者每燕見不食太官食所設而不命取其食蒸餅上不圻作十字不食王隱晉書曰王長文州辟别駕陽狂不詣舉州追求乃於成都市見蹲地嚙胡餅又王羲之㓜有風操郄虞卿聞王氏諸子皆俊令使選壻諸子皆餙容以待客羲之獨坦腹東床食胡餅神色自若使具以告虞卿曰此真吾子壻也問為誰果是逸少乃妻之晉陽秋曰惠帝崩由食餅也又曰王歡躭學貧寠或人惠蒸餅一顆以充一日妻子常有菜色宋書曰王恱之為吏部隣省有會同者遺恱之餅一甌辭不受曰此費誠小然少來不願當之蕭子顯齊書曰永明九年正月詔太廟四時祭荐宣皇帝麵起餅又曰何戢為司徒左長史太祖為領軍與戢來復往置歡宴上好水引餅戢令婦女躬自執事以設上焉梁書曰武帝嘗設大臣餅蔡樽在坐帝頻呼其姓名樽竟不答食餅如故帝覺其負氣乃改喚蔡尚書樽始放筯執笏曰呼帝曰卿向聾今何聰對曰臣預為右武職在納言陛下不應以名垂喚帝有慚色趙録曰石勒諱胡胡物皆改名胡餅曰摶鑪石虎改曰麻餅又曰石虎好食蒸餅常以乾􅀥胡桃瓤為心蒸之使圻裂方食及為冉閔所簒幽廢思其不裂者不可得後魏書曰胡叟不治産業常苦飢貧能不以為恥飬子字螟蛉以自結常作布嚢容三四斛飯噉醉飽便盛肉餅以付螟蛉見車馬華榮者視之蔑如也北齊書曰庫狄伏連冬至日親表稱賀其妻設豆餅問曰此豆餅何處得来妻對曰於食中減連大怒後周書曰樊深以父遇害因避難墜崖傷足絶食再宿後遇得一簞餅欲食之然念繼母年老患痺或免虜掠乃弗食夜中匍匐尋覔毋得相見因以饋母還復遁去改易姓名逰學於汾晉之間唐書曰僧萬廻閿鄉人也恢諧似狂發言屢中其兄戍邊五載母思之萬廻年㓜請詣兄所䇿竹馬去經宿而返白母曰兄還矣請辦餅更往迎之數日持襆乃戍子衣也尋而子至母大驚范子曰餅出三輔墨子曰魯陽文君云有人於此牧羊芻豢不可勝食也見人作餅即還而竊之楚四境之田蕪廣不可勝闢見宋鄭之門邑則還而竊之與彼異乎抱朴子曰莽之世賣餅小人皆得等級斗筲之徒兼金累紫揚子云確然忠貞之節形矣三輔舊事曰太上皇不樂闗中髙祖徙豐沛屠兒沽酒賣餅商人立為新豐縣故一縣多小人李固别傳曰質帝暴得疾云食煮餅腹中悶遂崩蔡質漢官儀曰尚書郎直太官供餅餌五熱𤣥晏春秋曰衛倫過予而讌論及於味倫稱侍中劉子揚食餅知鹽生精味之至也予曰昔師曠識勞薪易牙别淄澠子揚之妙抑末乎倫曰晉曠齊牙古之精也魏之子揚今妙也子何間焉語林曰何平叔面絶白魏文帝疑其着粉正夏月喚來與熱湯餅大汗出隨以朱衣自拭色轉皎然幽明録曰姚泓叔父大将軍紹總司戎正召胡僧問以以休咎僧乃以麵為大胡餅形徑一丈僧坐在上先食正西次食正北次食正南所餘卷而吞之訖便起去了無所言是歲五月楊盛大破姚軍於清水九月晉師北討掃定潁洛明年遂席卷鄷鎬生禽泓焉葛洪神仙傳曰壺公者從逺方來賣藥常懸一壺於坐上每日入後跳入壺中市掾費長房於樓上見之知非常人也身為掃除并進餅公令長房共跳入壺但見樓觀五色重門閣道侍者數十人京兆舊事曰蕭彪為巴郡守父老歸供養父嗜餅從至市立車下自進之廷尉决事曰廷尉上士張柱私賣餅為蘭臺令史所見方言曰餅謂之飥或謂之餦或謂之餛說文曰餅麵餈也雜五行書曰十月亥日食餅令人無病食經有髓餅法以髓脂合和麵崔寔四民月令曰五月距立秋無食煮餅及水溲餅王郎上劉纂等樗蒲曰左中郎樂林得纂麵肉共啖湯餅繆襲祭儀曰夏祀以蒸餅盧諶祭法曰四時祀用㬅頭餅髓餅牢九夏祠别用乳餅冬祠用白環餅徐暢祭祀記曰舊五月麥熟薦新麥作起潄白餅明皇雜録曰武惠妃生日上與諸公主按舞於萬歲樓下上乗歩輦從複道窺見衛士食畢以餅餌棄水竇中上大怒命髙力士杖殺之上方震怒左右莫敢言者寧王從容謂上曰從複道窺見獲衛士之小過而殺之恐人臣不能自安又失大體陛下志在勤儉愛物惡棄於地柰何性命至重重於踐飱者乎上蹶然大悟遽命赦之荆楚歳時記曰六月伏日並作湯餅名為辟惡時鏡新書曰四月八日長沙市肆之人無子者供寺閣下羊肉薄餅結願以乞兒往往有驗束晳餅賦曰禮仲春之月天子食麥而朝事之籩煮麥為麵内則諸饌不說餅然則雖云食麥而未有餅餅之作也其來近矣若夫安乾粔籹之倫豚耳狗舌之屬劍帶案成餢飳髓燭或名生於里巷或法出乎殊俗三春之初陰陽交際寒氣既消温不至熱于時享宴則㬅頭宜設吴回司方純陽布暢服絺飲氷隨隂而凉此時為餅莫若薄壯商風既厲大火西移鳥獸氄毛樹木踈枝肴饌尚温則起溲可施𤣥冬猛寒清晨之㑹涕凍鼻中霜凝口外充虛解戰湯餅為最爾乃重羅之􅲑塵飛白雪膠黏䵑筯䐧溔柔澤肉則羊膀豕脅脂膚相半臠若蜿首珠連礫散薑枝葱本萃縷切判辛桂剉末椒蘭是畔和鹽漉䜴攬合樛亂于是火盛湯湧猛氣蒸作攘衣振服握搦拊搏麵彌離於指端手縈囬而交錯紛紛駁駁星分雹落籠無逆肉餅無流麵姝媮冽敕薄而不綻嶲如和䑋晶色外見柔如春綿白若秋練氣勃欝以揚布香飛散而逺遍行人失涎於下風童僕空噍而斜盻擎器者砥唇立侍者干咽爾乃換増濯以𤣥醢鈔以象著􅀈要虎丈叩膝遍據槃案財投而輙盡庖人叅潭而促遽手未及換増禮復至脣齒既調日習咽刮三籠之後轉更有次庾闡惡餅賦序曰范子常者造余宿曤鷄為餅遲御之情甚虛竒嘉之味不實􅂓佐惡餅賦以釋之𢎞君舉食檄曰催厨人作茶䴵熬油煎葱例茶以絹當用輕羽拂取飛麵剛軟中適然後水引細如委綖白如秋練羮杯半在財得一咽十杯之後顔解體潤梁吴均餅說曰宋公至長安得姚泓時故太官丞程季者了了人也公曰今日之食何者為先季曰仲秋御景離蟬欲静燮燮曉風凄凄夜冷臣當此時唯能說餅公曰善季乃稱曰安定噎鳩之麥雒陽董徳之磨河東長若之葱隴西䑛背之犢枹罕赤髓之羊張掖北門之豉燃以銀屑煎以銀銚洞庭負霜之橘仇池連蒂之椒調以濟北之鹽剉以新豐之雞細加華山玉屑白如梁甫銀埿既聞香而口悶亦見色而心迷公曰善糗糒書曰峙乃糗粻亡敢弗逮儀禮曰四籩􅀥糗栗脯左傳曰陳轅頗賦封田以嫁公女有餘以為己大器公逐之出奔鄭道暍其族轅咺進稻醴梁糗腵脯焉曰何其給也曰器成而具公羊曰公出奔齊國子執壺漿曰敢糗從者公稽首以衽受說文曰糒乾食也糗􅆈米也釋名曰糗齲也飯而磨散之使齲碎也餱候也候人飢者以食之也漢書曰李陵擊匈奴兵敗令軍士人持二升糒一半氷相待東觀漢記曰嚴尤擊江賊世祖奉糗一斛脯三十朐又曰隗囂且病餓出城飡糗糒腹張憤而死又曰張禹廵行守舍止大樹下食糗乾飯飯訖飲水而已後年貧人來歸者千餘户又曰賀𤣥字文𢎞為九江太守行縣賫持乾糒但就温湯而已謝承後漢書曰沈景為河間相但食乾糒後漢書曰趙孝兄禮為餓賊所得孝聞之即自縳詣賊曰禮久餓羸瘦不如孝肥飽賊大驚並放之謂曰可且歸更持米糒來孝求不能得復往報賊願就烹衆異之遂不害鄉黨服其義魏畧曰寒貧者本姓石後還長安車騎将軍郭淮以意氣呼之問其所欲亦不肯言淮因與脯糒及衣財取脯一朐糒一升而止唐書曰黄巢将逼三輔僖宗出幸途無供頓衞軍不得食張濬謂漢隂令李康曰公可為糗餌以供行在康乃鳩集騾乗分道進饔糗列女傳曰勾踐伐吴有獻一嚢糒者王以賜軍士甘不踰嗌而戰自十倍孟子曰舜之飯糗茹草也若將終身焉𤣥晏春秋曰衞倫過予而讌論及於味命僕取糗以進予予嘗之曰吾知之矣麥其主者也有李柰杏味三果不同予焉得兼之倫曰吾之将來家實多果杏時将發故糅之以杏汁李柰時發又糅之以李柰汁故有三果之味也物理論曰吕子義清賢之士也思之宜往存省懐乾糒而往主人盛為饌食乃出懐中糒求冷水二杯而食之楚辭九章曰播江離與滋菊兮願舂以為糗芳崔寔四民月令曰四月可以作􅀥糒餌粢周禮曰羞籩之實糗餌粉粢鄭注二物皆粉稻米黍米所為也合蒸曰餌餅之日餈糗者擣粉􅆈大豆為餌餈之粘者以粉之也餌言糗餈言粉互相明也方言曰餌謂之餻或謂之粢或謂之􅀈或謂之餣或謂之䬧說文曰餌粉餅也餈稻餅也釋名曰餌而也相黏而也衮豫曰溏浹就形之名也餈漬也蒸燥屑使相潤漬餅之也集韻曰餹餅餌也東觀漢記曰樊畢字仲華世祖嘗於新野坐文書見拘時畢為市吏餽餌一笥上徳之建武初拜河東都尉引見雲臺上調畢曰一笥餌得都尉何如風俗通曰汝陽彭氏墓近大道有一石人田家老母到市買數片餌以歸過䕃墓樹下以餌著石人忽去而忘之行道人見餌恠問之或人調云此石人有神能治病病愈者以餌來謝之轉以相語云頭痛者磨石人頭腹痛者磨石人腹遂千里來就號曰賢君如此數年前餌母聞之為人說之乃無復往者梁書曰朱異好飲食極滋味聲色之娱煮鵝炰鰌不輟於口雖朝謁從車中必齎飴餌粔籹通俗文曰干䋫者謂之粔籹雜字解詁曰粔籹膏環也異苑曰張驥永初中於都喪亡司馬茂往哭之見驥憑几而坐以箸刺粔籹食之楚辭招魂曰粔籹蜜餌寒具周禮曰朝事之籩其實䵄蕡熬麥曰䵄枲實曰蕡通俗文曰寒具謂之餲桓譚新論曰孔子匹夫耳而卓然名著至其冡墓髙者牛羊雞豚而祭之及酒脯寒具致敬而去張逸遺令曰閉口寒具不得入太平御覽卷八百六十
