  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_972-1a, image: WYG0901/WYG0901-0548a.png}
body:
  text: 太平御覽卷九百七十二宗李昉等撰果木部九蒲萄橄欖椰楊梅沙棠枸椽益智桷子檖蒲萄史記曰大宛以蒲萄為酒富人藏酒至萬餘石乆者數十歳不敗漢使取其實來於是離宫别觀傍盡種蒲萄漢書曰李廣利為貳師将軍破大宛得蒲萄歸漢續漢書曰扶風孟嘉以蒲萄酒一斛遺張讓即以為凉州刺史魏文帝詔羣臣曰中國珍果甚多且復為説蒲萄奇味自夏渉秋尚有餘暑醉酒㝛醒掩露而食丼而不䬼脆而不酸冷而不寒味長汁多除煩解饑又以為酒丼於麴蘗善醉而易醒道之固已流涎咽唾况親食之耶他方之果寜有匹之者崔鴻十六國春秋前凉録曰張斌字洪茂燉煌人也作蒲萄酒賦文致甚羙又後凉録曰建元二十年吕光入龜玆城俗尚奢侈富於生養家有蒲萄酒或至干斛經十年不敗北齊書曰李元忠曾貢世宗蒲萄一盤世宗報以百疋練縑遺其書曰儀同位亞台鉉識懷貞素出藩入侍備經要重而猶家無擔石室若懸罄豈惟輕財重義奉時愛己也乆相嘉尚嗟詠無極恒思標賞有意無由忽辱蒲萄良深佩戴聊用絹百疋以酬清徳唐書曰髙祖賜羣臣食於御前果有蒲萄侍中陳叔逹執而不食髙祖問其故對曰臣母患口乾求之不能得髙祖曰卿有母可遺乎遂流涕嗚咽乆之乃止因賜物百叚又曰蒲萄酒西域有之前代或有貢獻人皆不識及破髙昌收馬乳蒲萄實於苑中種之並得其酒法太宗自損益造酒為丸有八色芳辛苦烈味兼醍醐既頒賜羣臣京師始識其味又曰太宗時葉䕶獻馬乳蒲萄一房長二丈餘子亦稍大其色紫又曰李直方常第果實若貢士者以緑李為首芳棃為副櫻桃為三丼橘為四蒲萄為五或薦荔枝曰寄舉之首也又曰􅄢賔在蔥嶺南踰縣度經熱坂其地暑濕人皆乘馬土宜秔稻多丼蔗蒲萄草木凌寒不死金樓子曰大月氐國善為蒲萄花葉酒或以根及汁醖之其花似香而緑榮碧鬚夏春之時萬頃兢發如鸞翼八月中風至吹葉上傷裂有似綾紈故人呼風為蒲萄風亦名為裂葉風漢武帝内傳曰西王母常下帝獻蒲萄酒杜恕篤邊論曰漢征匈奴取其胡麻稗麥苜蓿蔔萄示廣地也廣志曰蒲萄有黄黑白三種雲南記曰雲南多乾蒲萄楊􅃷之洛陽伽藍記曰白馬寺浮圖前柰林蒲萄異於餘處枝葉繁衍子實甚大柰林實重七斤蒲萄實偉於棗味並殊羙冠於中京帝至熟時嘗詣取之或復賜官人得之轉餉親戚以為竒異得者不敢輙食乃歴數家京師語曰白馬甜榴一實直牛唐景隆文舘記曰四月上巳日上幸司農少卿王光輔庄駕返頓后中書侍郎南陽岑義設茗飲蒲萄漿與學士等討論經史又曰大學士李嶠入東都祔廟學士等祖送城東上令中官賜御饌及蒲萄酒􅀶物志曰西域有葡萄酒積年不敗彼俗云可至十年飲之醉彌月乃觧又曰張騫使西域返得蒲萄晉宫閣名曰華林園蒲萄百七十八株秦州記曰秦野多蒲萄本草經曰蒲萄生五原隴西燉煌益氣強志令人肥徤延年輕身王逸荔支賦曰西旅獻崑山之蒲桃鍾㑹葡桃賦曰余植蒲桃於堂前嘉而賦之命荀朂並作應禎蒲桃賦曰結繁子之礧落弓英蘢緫而彌房傅𤣥蒲桃賦曰踰龍堆之險越懸度之阻渉乎三光之阪歴乎身熱之野橄欖金樓子曰有樹名獨分為二株其東向一枝是木威樹南向一枝橄欖樹南越志曰􅀶羅縣有合成樹十圍去地二丈分為三衢東向一衢木葉似練子如橄欖而硬削去皮南人以為糁南向一株橄欖西向一衢橄欖裴淵廣州記曰橄欖澁酒廣志曰橄欖大如鷄子交趾以飲酒南州草木狀曰橄欖子大如􅀥二月華八九月熟生食味酸蜜藏乃甜羙交趾武平興古九真植之臨海異物志曰餘丼子梭形初入口舌澁酸飲水乃丼又如梅實核兩頭鋭呼為餘丼橄欖同一物異名耳嶺表録曰橄欖樹身聳枝皆髙數尺其子深秋方熟閩中尤重味雖苦澁咀之香口勝含鷄舌香能解酒毒有野生者子繁樹峻不可梯縁但刻其根下方寸許内鹽於其中一夕子皆自落樹枝節上生脂膏如桃膠南人採之和其皮葉煎之調如黑錫謂之橄欖糖用泥船損乾後堅於膠漆着水益乾耳左思呉都賦曰龍眼橄欖㭨隋書曰林邑國人深目髙鼻髪拳色黑俗皆徒跣以幅布纒身冬月衣袍婦人推髻施椰葉蓆唐書曰訶陵國俗以椰樹花為酒其樹生花長二尺餘實大如人脛割之取汁以成酒味丼飲之亦醉南夷志曰荔支㯽榔訶棃勒椰子等諸樹永昌麗水諸山皆有之雲南記曰南詔遣使致南國諸果有椰子狀如大牛心破一重麄皮刮盡又有一重硬殻有小孔以筋穿之内有漿二合餘味丼色白又曰雲南多椰子亦以蜜漬之為糝廣志曰椰樹髙六七丈無枝條有葉如束蒲乃在樹末實如大瓠𤓰懸在樹頭實外有皮中有核皮裏有汁升餘清如水羙如蜜可飲核中膚白如雪厚半寸味如胡桃而羙可食出交趾家種之南方草木狀曰椰二月花花仍連着實房房連相累房三十或二十七八子十一月十二月熟其樹黄俗名為丹㭨破之可作椀長如栝樓子交州記曰椰子有漿截花以竹筩承取汁作酒飲之亦羙神異經曰東南荒中有椰木樹髙二三丈或十餘丈圍丈餘或七八尺葉三百歳盡落而華華如丼𤓰華華盡落而生蕚下生子三歳而熟熟後不長不减形如寒𤓰長七八寸徑四五寸南州異物志曰椰樹大三四圍長六七丈通身無枝至百餘年有葉葉狀如蒲長四五尺直竦指天實生葉間皮包之如蓮狀皮肉硬過於核中肉白如鷄子着皮而腹内空含汁大者含升餘實形團團然或如苽樓横破之可為爵並堪噐用南人珍之異物志曰椰樹髙六七丈無枝條葉如束蒲在上其實如瓠繫之奠實外如皮葫蘆膚中汁升餘清如水味羙於蜜食其膚則不饑食其汁則増渇又有如兩眼處俗號椰子為越王頭嶺表録異曰椰子樹亦類海梭號椰子大如甌盂外有粗皮如火腹次有硬殻圓而且堅厚二三分有圓如卵者即截開一頭砂石摩之去其皴皮其爛班錦文以白金装之以為水罐子珍竒可愛殻中有液數合如乳亦可飲之冷而動氣左思呉都賦曰椰葉無䕃俞益期牋曰有清漿數斗懸於長木之端終不乾故為小異楊梅金樓子曰楊周年七歳甚聰慧孔君平詣其父父不在乃呼兒出為設果有楊梅孔公指以示兒曰此真君家果兒應聲答曰未聞孔雀是夫子家禽􅀶物志曰地有名章則生楊梅南越志曰熈安縣白蜀里多楊梅張公以為名章則多楊梅此偶以所聞而命書後好事改地就之耳求之白蜀去之逺矣裴淵廣州記曰盧山頂有湖楊梅繞其際人豋者止得於山飽食不得持下呉興記曰故章縣縣北有石槨山出楊梅常以貢御張華所謂地有名章必生楊梅葢此謂也食經曰藏楊梅法取完者一斛鹽漬之曝乾别取杭皮二斤煑汁鹽漬之不加梅色如初羙好可留數月臨海異物志曰楊梅其子如彈丸正赤五月中熟熟時似梅其味甜酸梁江淹楊梅頌曰懐蘂挺實橙黄橘丹鏡日繡粲照霞綺巒沙棠山海經曰崑崙之丘有木焉狀如棠棃黄華赤實味如李而無核名曰沙棠可以却水吕氏春秋曰伊尹説曰果之羙者沙棠之實南越志曰寜鄉果多沙棠竺法真豋羅浮山䟽曰羅浮有沙棠華黄赤實味丼如李枸椽裴淵廣州記曰枸椽如柚核細異物志曰枸椽實大如橘皮有香味不羙可以浣治葛紵若酸漿劉欣期交州記曰枸椽樹似橘如柚大而倍長味竒酸皮以蜜煑為糁嶺表録異曰枸椽子形如𤓰皮似橙而金色胡人重之愛其香氣京輦豪貴家釘盤筵憐其逺方異果肉甚厚白如蘿蔔南中女工競取其肉雕鏤花鳥浸之蜂蜜㸃以臙脂擅其妙巧亦不讓湘中人鏤木𤓰也益智十三國春秋曰安帝元年盧循為廣州刺史循遺劉裕益智粽裕乃答以續命湯顧徽廣州記曰益智葉如襄荷莖如竹箭子從心中出一枝有十子子肉白滑四破去之取外皮蜜煑如柰子味丼周景式廬山記曰山果有益智蒲萄廣志曰益智葉似襄荷長丈餘其根上有小枝髙八九寸無葉蕚其子藂生之如􅀥中辦黑皮白核小者曰益智含之攝涎濊出壽方亦生交趾南方草物狀曰益智如棗長七八分二月華五月六月熟味辛中芬香出交趾合浦陳祁暢異物志曰益智類意苡長寸許如枳實子味辛辣飲酒食之佳惠逺法師答盧循書曰損餉深抱情至益智乃是一方異味即於僧中行之桷子廣志曰桷子似木𤓰樹本南方草物狀曰桷子木如鷄卵三月花八月九月熟味酸或蜜藏滋甜羙出交趾劉欣期交州記曰如桃陳祁暢異物志曰􅮴子之樹枝葉四布名同種異味實甜酢果而無核裏面如素柝酒止醒更為遺賂檖毛詩秦車轔晨風曰隰有樹檖陸機毛詩䟽義曰樹檖一名赤蘿一名山棃今人謂之楊檖樹其實如棃但實丼小異耳一名鹿棃一名䑕棃齊郡廣縣堯山魯國河内共北中有今人亦種之極有羙者赤棃之脆羙者爾雅曰檖蘿也廣志曰楊檖子似棃大如杏可食晉宫閣名曰華林園楊檖二株太平御覽巻九百七十二
