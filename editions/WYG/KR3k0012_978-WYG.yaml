body:
  text: 太平御覽卷九百七十八宋李昉等撰菜茄部三𤓰易姤卦曰九五以杞包瓜含章有隕自天龍魚河圖曰𤓰有兩鼻者殺人詩序曰文王之興本由太王也綿綿𤓰瓞民之初生自土沮漆興也箋云𤓰之本實繼先嵗之𤓰必小狀似瓞故謂之綿綿然若將無長大時興者喻后稷乃帝嚳之胄封於邰其後公劉失職遷於豳居沮漆之地奕世亦綿綿然至太王而得其民心而生王業故本周之興云乎沮漆也耳大戴禮曰五月乃𤓰乃者急𤓰之辭也𤓰也者始食𤓰也八月剥𤓰畜𤓰時也禮曰為天子削𤓰者副之巾以絺副削也既削四析之乃横㫁而巾覆焉為國君華之巾以綌華中裂之不四折也為大夫累之累倮也不以巾覆也士㚄之不裂横截去㚄而已音帝庶人齕之又月令曰仲冬行秋令則天時雨汁𤓰瓠不成雨汁水雪雜下左傳曰齊侯使連稱管至父戍葵丘𤓰時而往曰及𤓰而代朞戍公問不至請代不許故謀作亂春秋運斗樞曰遠雅頌着倡優則李生𤓰論語曰子路曰佛肸以中牟叛子之往也如之何子曰然有是言也不曰堅乎磨而不磷不曰白乎湼而不緇吾豈匏𤓰也哉焉能繫而不食爾雅曰瓞瓝其紹瓞史記曰邵平者故秦東陵侯秦破為布衣貧種瓜長安城東𤓰美故世謂為東陵𤓰漢書地理志曰燉煌古𤓰州地生美𤓰續漢書曰牽牛星荆州謂之河鼓主關梁織女主𤓰果又曰安帝元初三年有𤓰異本同蔕共生一𤓰時以為𤓰者外也離本而實女子外屬之象也是時梁皇后與外親耿實共譖太子廢為濟隂王更外迎濟北王子犢立為太子袁山松後漢書曰建和二年河東𤓰兩體共蒂後漢書曰施建字君予沛縣人也家貧母老常鬻力供養種𤓰自給應邵漢官儀曰太官丞官别在外掌果𤓰菜茹吳志曰歩隲字子山臨淮淮隂人也避難江東單身窮困與廣陵衛旌同年相善俱以種𤓰自給晝勤四體夜誦經傳㑹稽焦征羗郡之豪族人客放縱隲與旌求食其地懼為所侵乃共修刺奉𤓰以獻吳録曰姚翁仲嘗種𤓰菜灌園以供衣食時人或餉一無所受晉書曰咸寜二年嘉𤓰同蒂生于成都又曰皇甫謐二十不學遊蕩無度或以為癡嘗得𤓰果輙進叔母任氏任氏曰孝經云三牲之養猶為不孝汝今年餘二十目不存教心不入道無以慰我又曰桑虞仁孝自矢年十四䘮父毁瘠過禮虞有園宅北數里𤓰果初熟有人踰垣盗之虞以園援多棘刺盗偷見人驚走而致傷損乃使奴為之開道及偷負𤓰将出見道通聞虞使除之乃送所盗𤓰叩頭請罪歡然盡以𤓰與之齊書曰建元初武帝即位到撝為司徒左長史先是武帝與撝同從宋明帝射雉郊野渴倦撝得青𤓰與上對剖食之又曰郭原平以種𤓰為業大明七年大旱𤓰瀆不復通船縣令劉僧秀愍其窮老下瀆水與之原平曰普天大旱百姓俱困豈可減溉田之水以通運𤓰之船乃歩從他道往錢塘貨賣沈約齊書曰韓靈敏早䘮父兄靈珍至孝母亡家貧無以葬與靈珍種𤓰靈敏朝採暮還復生未嘗减耗䘮由此舉梁書曰任昉卒武帝聞問方食西苑緑沈𤓰設之于盤悲不自勝因屈指曰昉少時常恐不滿五十今四十九可謂知命又曰郭祖深清儉常服故布衣素朴食不過一肉有姥餉一青𤓰祖深報以匹帛有富人効之以貨鞭而狥衆朝野憚之又曰鄭灼字茂昭勵志好學多苦心熱若𤓰時輙偃卧以𤓰鎮心起便讀誦其篤志如此北齊書曰蘭欽為廣州刺史前刺史映之薨南安侯恬權行廣州事冀得即眞及聞欽至嶺厚貨厨人塗刀以毒削𤓰進之欽及愛妾俱死帝聞大怒檻車收恬削土爵又曰楊愔典選多以言貌取人時謗詞曰尚書典選似貧人買𤓰唯取大者魏書曰郭祚以本官領太子少師祚嘗從世宗幸東宫肅宗㓜弱祚懐一黄㼐出奉肅宗時應詔左右趙桃弓深為世宗所信郭祚私事之時人謗祚者號為桃弓僕射黄㼐少師後周書曰王羆性儉嗇常有客與羆食𤓰客削𤓰侵膚稍厚羆意嫌之及𤓰皮落地乃引手就地取而食之客甚有愧色又曰趙王招知隋文欲遷周鼎密欲圖之藏兵刃於帷席之間後院亦伏壯士文帝從者多在閣外惟楊𢎞元胄坐于户側招以佩刀割𤓰啗隋文隋文未之疑元胄覺變扣刀而入招乃以大觴親飲胄酒北史曰宋瓊字普賢以孝稱母曾病季秋月思𤓰瓊夢想見之求而遂獲時人異之隋書曰文帝用法定制行署取一錢已上聞見不吿言者坐至死自此四人共盗一欀桶二人同竊一𤓰事發即時行决又曰秦孝王俊奢侈過甚頗好於内妃崔氏性妬甚不平之遂於𤓰中進毒俊由是遇疾徴還京師上以其奢縱免官以王就第唐書曰杜如晦薨後太宗食𤓰美愴然思之遂轍其半使置之於靈座又曰髙宗子八人武后所出者自為行第長曰孝敬皇帝監國仁明為后所忌而鴆之次曰雍王賢為太子次曰中宗次曰睿宗及孝敬遇害諸弟常不自安晨夕懐懼雖父母之前無由敢言乃作黄臺𤓰詞令樂人歌之欲㣲悟上意歌曰種𤓰黄臺下𤓰熟子離離一摘使𤓰好再摘令𤓰稀三摘尚猶可四摘抱蔓歸然太子竟亦流竄於黔州又曰德宗建中初誤以髙力士養女楊氏歸為沈太后是時沈氏已老故盡無識太后者上密使中人就洛陽視髙氏年狀頗同曩時太后嘗削𤓰哺上刃傷左拇指髙氏嘗剖𤓰亦傷左拇指中人皆閹官女子且非審識太后見上仁孝有殊喜莫敢沮者髙氏辭曰實非太后具陳族姓内外以自明又曰貞元四年夏右神䇿軍獻𤓰三蔓各為一蒂而成三𤓰莊子曰朽𤓰化為魚物之變也墨子曰今有人入塲園取人𤓰者得罸今之諸侯攻伐踰竊人𤓰者數千萬而謂義也秦子曰食𤓰者雖去其闕連其根孫卿子曰臯陶之色如削𤓰抱朴子曰五原蔡誕入山而還欺家人云至崑崙山有玉𤓰其形如世間𤓰但光明洞徹而堅須以玉井水洗之便軟而可食又曰曾參鋤𤓰三足烏集其冠孝故也家語曰曾子芸𤓰而誤㫁其根曾晳怒以大杖擊其背曾子仆地有頃乃蘇孔子聞之吿門弟子曰參來勿内曾子使人請孔子孔子曰舜之事瞽瞍小捶則受大杖則走參委身以待暴怒既身死陷父于不義不孝孰大焉古文竒字曰秦改古文為大篆及𨽻字周人多誹謗怨恨秦苦天下不從而諸生到者拜為郎凡七百人密種𤓰於驪山硎谷中温處𤓰實成使上書曰𤓰冬有實有詔曰博士諸生説之人人各異説則皆使往視之而為伏機諸生賢儒皆致焉方相難不决因發機從上塡之以土皆壓死古文𤨏語曰初刑史子臣謂宋景公從今已往五月五日臣死後五年五月丁亥吳亡又後五年八月辛巳君薨刑臣将至死日朝見景公夕死後吳亡景公懼思刑史子臣之言将至死日乃逃于𤓰圃遂死之求得已䖝矣賈誼新書曰昔梁大夫宋就為邉縣令與楚鄰界梁亭楚亭皆種𤓰梁亭劬而數灌其𤓰美楚人窳而稀灌其𤓰惡楚令以梁𤓰之美怒其爪之惡因往夜竊搔梁爪皆有焦者矣梁亭覺請其尉欲報搔楚𤓰宋就曰是搆怨分禍之道也令人竊為楚亭夜灌其𤓰令勿知也楚亭旦而往𤓰則已灌𤓰日以美楚亭往而察之則梁亭之為也楚令大悦因具聞楚王楚王聞之悦梁之隂讓也乃謝以重幣而交於梁王裴淵廣州記曰有𤓰冬熟號為金釵味乃甘美廣志曰𤓰之所出以遼東廬江燉煌之種為美有鳥𤓰貍頭𤓰密角𤓰女臂𤓰龍蹄𤓰羊髓𤓰又名魚𤓰𤓰大如斛出梁州陽城有青登𤓰大如三升魁有拄杖𤓰長二尺餘蜀地温食𤓰至冬熟有春日𤓰細小小瓣宜藏正月種三月成有秋泉𤓰秋種十月熟形如羊角色蒼黑列仙傳曰溪人者南郡鄘人居山間有仙人常止其家從之買𤓰教之鍊𤓰與附子桂實服之廿年能飛登山入水徃來海邉又曰服閭者不知何許人常徃來海邉諸祠中有三仙於祠中博賭𤓰顧閭使擔黄白𤓰數十頭令瞑目及覺乃在方丈山神仙傳曰葛𤣥冬為客設生𤓰漢武内傳曰西王母謂上元夫人曰共造朱炎山陵食靈𤓰其味甚好顧此未乆已七千嵗矣又曰仙之上藥有空同靈𤓰四刼一實也道學傳曰禇雅字𤣥通人與共居常取水灑掃或夏月種𤓰恣人來取伏侯古今注曰孝平帝元年武陵縣生𤓰花如葱紫色實如小麥墮地復生郭子横洞㝠記曰有龍肝𤓰長一尺花紅葉素生於氷谷所謂氷谷素葉之𤓰零陵先賢傳曰李融字元者承陽人固姑侯相使其為政得民心屢致祥瑞甘𤓰六子共莖璽書慰勞遷廣漢太守南岳夫人内傳曰夫人姓魏名華存性樂神仙季冬之月夜半清明有四眞人並降年二十餘天姿秀穎至静室因設酒肴陳紫撩絳實靈𤓰太山黄庭内景經注曰大霍山有洞臺司命君之府也中有神盤靈𤓰食之者至𤣥也荆楚嵗時記曰七月七日設𤓰果于庭中以乞巧有喜子布網于𤓰上得巧劉向别録曰尹都尉書有種𤓰篇鄭𤣥别傳曰民有獻嘉𤓰者異本同實縣欲表府文辭鄙畧君為改作又著頌一篇侯相高其才吳越春秋曰吳夫差為越所敗遁而去得自生之𤓰其實已熟掇而食之問左右曰是乃冬有𤓰近道而人不食何也左右曰盛夏之時人食生𤓰起居道傍𤓰子復生故人惡食夏侯曾先㑹稽記曰曹娥父溺死娥見𤓰浮其處即得父屍博物志曰人以冷水自漬至膝可頓啖數十枚𤓰漬至腰啖轉多至頸可啖百餘枚所漬水皆作𤓰氣𤓰味捜神記曰吳時有徐光常行幻術於市里從人乞𤓰其主弗與便從索瓣種之俄而𤓰蔓延生花成實乃取食之因賜觀者及視所賣皆亡耗矣幽明録曰安定人周敬種𤓰時亢旱鬼為輦水澆𤓰𤓰大滋繁問姓名不答還白父曰嘗有惠於人否父曰西郭樊營先作郡吏償官數百斛米我時以百斛助之其人已死又曰孫鍾富春人堅父也與母居至孝篤信種𤓰為業有三少年容服姸麗來向鍾乞𤓰鍾因為設食出𤓰禮敬殷勤臨去曰我等司命感卿見接之厚送出門三人曰山中可作冡復言欲連世封侯為數世天子鍾曰數世天子故當所樂言訖悉化成白鵠列異傳曰遼東丁伯昭自説曽有客字次節既死常為本家致竒異物試臘月中從索𤓰得美𤓰數枚來在前不見形也述異記曰豫章郡有盧松村羅根生于此村側墾荒種𤓰又於外立一神壇𤓰始引蔓清晨行之忽見壇上有新板墨書曰此是神所遊處不得停止種植可速去根生拜謝跪祝曰竊疑村人利此熟地生苗容或假託神旨見驅斥審是神教願更朱書賜報明早徃㸔向板猶存悉以朱代墨任昉述異記曰漢章帝元年上虞獻雙蒂𤓰一實五色又曰吳桓王時㑹稽生五色𤓰今吳有五色𤓰嵗充貢獻五行記曰梁吏部尚書何敬容夏患􅒻及寄在蒋山道士館忽見一人𤣥衣大㡌立在帳側自稱楊胡靈将𤓰四枚云與公少時言訖因不見後數月以罪免官本草經曰𤓰一名土芝吳氏本草曰𤓰子一名瓣七月七日採可作面脂劉禎𤓰賦曰禎在曹植座厨人進𤓰禎為立成辭曰含金精之流芳冠種𤓰以作珍投諸清流一浮一藏析以金刀四剖三離承之雕盤幕以纎絺甘侔蜜房冷甚氷圭稽含𤓰賦序曰世云三芝𤓰處一焉謂之土芝張載𤓰賦曰羊骹虎掌桂枝蜜䇶𤣥表丹裏呈素含紅豐膚外偉緑瓤内釀傅𤣥𤓰賦曰白者如素黑者如漆黄踰金箱青侔含翠舊有蜜筩及青括蔞嘉味溢口異類鮮儔一齧之傾至三揺頭細肌密理多瓤少瓣豐㫖絶異食之不䬼陸機𤓰賦曰夫其種族類數則括蔞定桃黄㼐白摶金釵蜜筩小青大班𤣥骭素腕狸首虎磻東陵出於秦谷桂髓起於巫山夏侯孝若賦曰入果園造𤓰田摘虎掌拾黄班落蔕離母漬於寒泉左思蜀都賦曰其園有𤓰疇芋區王廙洛都賦曰𤓰則桂枝括蔞緑瓤青肌消暑蕩熱解渴療飢樂府歌詩曰君子防未然不處嫌疑間𤓰田不納履李下不整冠古詩曰甘𤓰抱苦蔕美棗生荆棘愛利傍有刀貪人還自賊阮籍曰昔聞東陵𤓰近在青門外連畛距阡陌子母相鈎蔕張華眞人篇曰朱李生東苑甘瓜出西郊曹植求祭先王表曰乞請氷瓜五枚太平御覽卷九百七十八
