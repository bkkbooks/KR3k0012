body:
  text: 太平御覽卷四百五十四宋李昉等撰人事部九十五諫諍四崔鴻前趙録曰劉聰将起鳯儀殿於後庭廷尉陳元逵諫聰怒曰将營二宫豈問汝䑕子乎将斬之時在逍遥園元逵抱堂下樹呌曰臣所言者社稷之計也劉后在後堂宻手疏救之乃解改逍遥園為納賢園李中堂為愧賢堂又曰閹豎王沈等用事太宰易大将軍敷御史大夫元逵詣闕固請免沈等官聰以表示沈等沈等笑曰是兒等為元逵所引遂成痴也聰手壊其表又曰趙染次于新豐東晉将軍索綝東討染有輕敵之色染長史魯徽曰困獸猶鬪况于國乎染曰綝小豎豈能汚吾馬蹄刀劔也帥精騎逆戰于城西敗績悔曰吾不用魯徽之言以至于是乃斬徽徽臨刑謂染曰将軍違謀取敗誅忠良以逞過忿若死而有知當訴将軍于黄泉使将軍不得眠牀枕死趙染攻北地夢魯徽引箭射之且将攻城中弩卒又曰石虎馳獵無度晨出夜歸侍中韋諛諫曰臣聞千金之子坐不埀堂萬乘之主行不履危陛下雖天生神武雄據四海乾坤冥賛萬無所慮者也然白龍魚服有豫且之禍海若潜逰離葛陂之酷願陛下清宫蹕路思二神為先鑒不忘天下之重虎省善之賜以束帛又曰趙明字顯昭南陽人虎攝位拜為尚書及誅勒諸子明諫曰明帝功格皇天為趙之太祖安可以絶之虎曰吾之家事幸卿不須言也以直言忤㫖故十年不遷貞固之風時論擬之蘇則崔鴻前秦録曰苻堅如鄴狩扵西山親馳射獸逰獵旬餘昏而忘返伶人王洛叩馬諫曰若禍起須㬰變在不測者其如宗廟何其如太后何堅曰善哉昔文公悟愆扵虞人朕聞罪扵王洛崔鴻前凉録曰張天錫元日與嬖䙝飲既不受羣寮朝賀又不朝扵永訓宫従事郎中張慮輿櫬切諫不納又曰張駿讌羣臣于閒豫堂又欲嚴刑峻制衆咸以為宜叅軍黄斌進曰臣未見其可若尊親犯令不行矣駿性嚴猛乃棄几改容曰微黄生吾不聞過矣黄生可謂忠之至也後魏書曰髙允為中書武帝禁封良田人無田農多游者允上疏諫曰臣少也賤所知惟田請以農事言之夫地方十里為田三頃六十畆百里為田三萬六千頃若勤之則畆増减三斗百里之内損益之率為粟可知矣况天下之廣乎若户有私儲則國無隂陽之眚上従之三年而國霸又曰元昭業為諫議大夫荘帝将畋洛南昭業叩馬諫止帝避之而過後詔勞勉之又曰汝南王恱字先宣禮性不倫俶儻難測無故過杖京兆王愉子寳月恱因前郎中令北平陽固上疏諫曰伏聞殿下乃以小怒過行威罰誠嚴訓有餘而慈惠不足當今主上㓜冲宰輔用事履冰踐霜兢業猶恐不濟况肆意非彛任情行事欲保全福禄其可得乎昔龔遂去國猶獻直言韋孟離朝不忘本國况臣忝荷朝私猥充謬舉伏肄國僚聞道有嵗敢不盡言恱覽之大怒陳書曰章華字仲宗上疏諫後主曰陛下不思先帝之艱難不知天命之可畏溺扵嬖寵惑扵酒色祠宗廟而不出拜后妃而臨軒老臣宿将棄之草莾諂佞䜛邪升之朝廷今彊塲日蹙隋軍日至陛下改絃易張臣見麋鹿逰扵姑蘇矣後主大怒即日斬之隋書曰盧愷武帝在雲陽宫勅㫖屯簡老牛欲以享士愷進諫曰昔田子方贖老馬君子以為美談向奉明𠡠欲以老牛享士有虧仁政帝美其言而止又曰劉行本沛人累遷黄門侍郎髙祖嘗怒一郎扵殿前笞之行本進諫曰此人素直過又小上不顧行本又曰陛下不以臣不肖置在左右若是陛下安得不聴臣所言非當致之大理安得輕臣而不顧臣所言非私因置笏扵地而退上扵是歛容謝之又曰蘇威見宫中以銀為幔鈎因盛陳節儉之美以諭上上為之改容雕飾舊物悉命除毁上嘗怒一人将殺之威入閤進諫不納上怒甚将自出斬之威當上前不去避之而出威又遮止上拂衣而入良乆乃召威謝曰公能若是吾無憂矣扵是賜馬二疋錢十餘萬又曰趙綽為刑部侍郎治梁士彦等獄物三百段奴婢十口馬二十疋每有奏讞正色侃然上嘉之漸見親重上以盗賊不禁将重其法綽進諫曰陛下行尭舜之道多存寛宥况律者天下之大信其可失乎上忻然納之因謂綽曰若更有聞見宜数陳之也上禁行惡錢有二人在市以惡錢易好武侯執以聞上令悉斬之綽進諫曰此人坐當杖殺之非法上曰不關卿事綽曰陛下不以臣愚暗置在法司欲妄殺人豈得不關臣事上曰撼大木不動者當退對曰臣望感天心何為動木上復曰啜羮者熱則置之欲相挫耶綽拜而益前訶之不肯退上遂入治書侍御史柳彧復上奏切諫上乃止唐書曰虞世南雖容貌懦愞若不勝衣而志性抗烈論及古先帝王為政得失必存規諷多所補益太宗常謂侍臣曰朕因暇日與虞世南商略古今有一言之失未嘗不懇懇若此朕用嘉焉使羣臣皆若世南天下何憂不理又曰孔頴逹数進忠言益見親待太宗嘗問曰論語云以能問於不能以多問於寡有若無實若虛何謂也頴達對曰聖人設教欲以謙光已雖有能不自矜大仍就不能之人求訪能事已之才藝雖多猶以為少仍就寡少之人更求所益已之雖有其状若無已之雖實其容若虛非唯臣庶帝王之徳亦當如此夫帝王内藴神明外須緘黙深不可測度不可知易稱以蒙養正以明夷莅衆若其位居曹極炫燿聰明以才凌人飾非拒諫則上下情隔君臣道乖自古滅亡莫不由此也太宗深善其對又曰劉洎太宗嘗謂侍臣曰夫人臣之對帝王皆順㫖而不逆甘言以取容朕今發問欲聞已過卿等須言朕僣失長孫無忌李勣揚師道等咸云陛下聖人化致太平臣等不見其失洎對曰陛下化髙萬古誠如無忌等言然頃上書人不稱㫖或面加窮詰無不慙退非奨進言者之路太宗曰卿言是也當為卿改之又曰谷那律遷諫議大夫嘗從太宗出獵在途遇雨因問曰油衣若為得不漏那律曰能以瓦為之則不漏矣意欲太宗弗為獵太宗大恱賜帛二百段又曰栁範貞觀中為侍御史時吴王恪好畋獵損居人範奏彈之太宗因謂侍臣曰權萬紀事我兒不能匡正罪其合死範進曰房𤣥齡事陛下猶不能諫止畋獵豈可獨罪萬紀太宗大怒拂衣而入乆之獨引範謂曰何得避折我範曰臣聞主聖臣直陛下仁明臣敢不盡愚直太宗意乃解又曰薛收嘗上書諫獵太宗手詔曰覽卿所陳實娱心膽今日匡我卿之力也明珠兼乘豈比來言當以誡心書何能盡今賜卿黄金四十錠以酧雅意又曰髙季輔授太子右庶子又上疏切諫時政得失特賜鍾乳一劑曰卿進藥石之言故以藥石相報又曰太宗問禇遂良曰舜造漆器禹雕其俎當時諫舜禹者十餘人食器之間苦諫何也遂良對曰雕􅅣害農事組纂傷女工首創奢淫危亡之漸漆器不已必金為之金器不已必玉為之所以諍臣必諫其漸及其滿盈無所復諫太宗以為然又曰髙宗将廢皇后王氏立武昭儀為皇后禇遂良欲陳諫及入髙宗難扵發言再三顧曰莫大之罪絶嗣為甚王后無𦙍息昭儀有子今欲立皇后公等以為如何遂良曰皇后出自名家先朝所娶伏事先帝無替婦徳先帝不豫執陛下手以語臣曰我好兒好婦今将付卿陛下親承徳音言猶在耳皇后自此未愆過恐不可廢臣今不敢曲從上㫖違先帝之命特願再三思審愚臣上忤聖顔罪合萬死但願不負先朝厚恩何顧性命遂良致笏殿階曰還陛下笏乃觧巾叩頭流血帝大怒令引出因左遷遂良潭州都督後轉桂州未㡬貶愛州刺史又曰納言桓彦範嘗上表論中宗時政数條其大畧曰昔孔子論詩以關雎為始言后妃者人倫之本理亂之端也故皇英降而虞道興任姒歸而姬宗盛桀奔南巢禍階妹喜魯桓滅國惑以齊媛伏見陛下每臨朝聴政皇后必施幔坐于殿上預聞政事臣愚歴選列辟詳求往代帝王有與婦人謀及政者莫不破國亡身傾斬繼嗣且以隂乘陽違天也以婦凌夫違人也違天不祥違人不義由是古人譬以牝雞之晨惟家之索易曰无攸遂在中饋言婦人不得預扵國政也伏願陛下覽古人之言察古人之意上以社稷為重下以蒼生在念宜令皇后無往正殿干預外朝專在中宫聿修隂教則坤儀式固鼎命惟新疏奏不納又曰中書侍郎袁恕已以将作少匠楊務亷素以工巧見用中興初恕己恐其更啟遊娱侈靡之端言扵中宗曰務亷致位九卿積有嵗年忠言嘉謀無足可紀每宫室營搆必務其侈若不斥之何以廣昭聖徳由是左授陵州刺史又曰徳宗嘗泛舟魚藻宫張戯命皇太子升舟舟具皆飾以金碧丹青使婦人盛飾操篙檝行舟光彩映燭絲竹歌謡俱發徳宗顧謂上曰今日如何上對曰極盛退因以奢為諫徳宗不恱又曰杜希全積功至朔方軍節度使嘗獻體要八章多所規諫徳宗深納之乃著君臣箴以賜之又曰憲宗元和中有五坊使犯法上将宥之裴度懇論不已時方征鄆冀上曰五坊是小事今日與卿要商量用兵度奏曰山東叛逆不過亂数州五坊使横暴将亂天下上怒起入見諸中人曰使我羞見宰相遂殺五坊使京師肅然天下望風而理又曰鎮州王承宗之叛憲宗将治吐突承瓘為招討處置使吕元靖與給事中穆質兵部侍郎許孟容等八人抗論不可且曰承瓘雖貴寵然内臣也若為帥總兵恐不為諸将所伏指喻甚切憲宗納之為改使號然猶專戎柄又曰李絳嘗因治北廊奏對違忤上㫖指切時病及論中官縦恣方鎮進獻事宜上怒甚厲聲曰卿所論事何太過也絳前論不已曰臣所陳豈臣身之利是國家之利陛下不以臣愚使處腹心之地豈可見事虧聖徳致損清時而惜身不言仰屋竊歎是臣負陛下也若不顧禍患盡誠奏論旁忤倖臣上犯聖㫖以此獲罪是陛下負臣也且臣與内官素不相識又無嫌隙只是威福太盛上損聖明臣所以不敢不論耳使臣緘黙非社稷之福也上見其誠不廻即怒解猶慰喻曰卿盡節扵朕人所不言者卿悉言之使朕得聞所不聞真忠正誠節之臣也他日南面亦須如今日絳拜恩而退後教坊忽稱宻㫖取良家士女及衣冠别第妓人京師囂然絳謂同列曰此事大虧損聖徳須有論諫或曰此嗜慾間事從諫官陳疏絳曰居常相公嘗病諫官論事此難事即推與諫官可乎遂極疏論奏翌日延英上舉手謂絳曰昨見卿状所論採擇事非卿盡忠扵朕何以及此朕都不知向外事此是教坊罪過不知諭朕意以至扵此朕緣周王以下四人院内都無侍者朕令扵樂宫中及閭里有情願者厚其錢帛只取四人四人各與一人伊不會朕意便如此生事朕今已科罰其所取並放歸若非卿言朕寧知過矣又曰白居易為右拾遺上令神策中尉吐突承瓘為招討使諫官上章者十七人居易面論事情切至既而請罷河北用兵凡数千言皆今人之難言者上多聴納唯諫承瓘事稍過上頗不恱謂李絳曰白居易小子事朕㧞擢致名位而無禮扵朕此實難忍絳對曰居易所以不避死亡之誅事無巨細必言盖酬陛下特加㧞擢耳非輕言也陛下欲開諫諍之路不宜阻居易言上曰卿言是也繇是多聴納又曰栁公權字誠懸㓜嗜學十二能為詞賦元和初進士擢第釋褐秘書省校書郎李聴鎮夏州辟為掌書記穆宗即位入奏事帝召見謂公權曰我於佛寺見卿筆跡思之乆矣即日拜右拾遺翰林侍書學士遷左補闕司封員外郎穆宗政僻嘗問公權筆何盡善對曰用筆在心心正則筆正上改容知其筆諫也唐文宗便殿對六學士上語及漢文恭儉帝舉袂曰此澣濯者三矣學士皆賛詠帝之儉徳唯公權無言帝召而問之對曰人主當進賢良退不肖納諫諍明賞罰服澣濯之衣乃小節耳時周墀同對為之股慄公權詞氣不可奪帝徐謂之曰極知舍人不合作諫議以卿言事有諍臣風采却授卿諫議大夫翌日降制以諫議知制誥學士如故又曰鄭覃穆宗不恤政事喜遊宴即位之始吐蕃冦邉覃與同職崔郾等廷奏曰陛下即位以來宴樂過多畋逰無度今蕃冦在境緩急奏報不知乘輿所在臣等忝備諫官不勝憂惕伏願稍减逰從留心政道伏聞陛下晨夜昵狎倡優近習之徒賞賜太厚凡金銀貨帛皆出自生靈膏血不可使無功之人濫沾賜與縦内藏有餘亦乞用之有節如邊上警急即支用無闕免令有司重歛百姓實天下幸甚帝初不恱其言顧宰相蕭俛曰此軰何人俛對曰諫官也帝意稍解又曰劉栖楚敬宗即位畋遊稍多坐朝常晩栖楚出班以額叩龍墀出血苦諫曰臣歴觀前王嗣位之初莫不躬勤庶政坐以待旦陛下即位以來放惰嗜寝樂色忘憂安卧宫闈日晏方起西宫宻邇未過山陵鼓吹之聲日喧扵外伏以憲宗皇帝大行皇帝皆是長君恪勤庶政四方猶有叛亂陛下運當少主即位未㡬惡徳布聞臣恐福祚之不長也臣忝諫官致陛下有此請碎首以謝遂以額叩龍墀乆之不已宰相李逢吉出位宣曰劉栖楚休叩頭候進㫖栖楚捧首而起因便陳論磕頭見血上為之動容以袖連揮令出栖楚又云不可臣奏臣即碎首死中書侍郎牛僧孺從宣示而出敬宗為之動容無何遷起居郎又曰李程為相敬宗冲㓜好治宫室畋逰無度欲扵宫中營新殿程諫曰自古聖帝明王以慈儉化天下陛下在諒闇之中不宜興作願以瓦木迴奉園陵上忻然從之又曰文宗時魏謩為起居舍人紫宸中謝召誡之曰事有不當急須奏論謩曰臣頃為諫官合伸規諷今居史職職在記言不敢越職踰分帝曰凡兩省官並合論事勿拘此言尋以本官直𢎞文館四年拜諫議大夫仍兼起居舍人判𢎞文館事又曰魏謩儀容魁偉言論切直與同列上前言事他宰相必委曲規諷唯謩讜言無所畏避宣宗每曰魏謩綽有祖風名公子孫我心重之漢武帝故事曰上性嚴急法令峻刻汲黯諫曰陛下愛才樂士求之無倦比得一人勞心苦神未盡其用輙已殺之以有限之士資無已之誅臣恐天下賢才将盡陛下欲與誰為治乎上笑諭之黯曰願陛下自今已後改之無以臣愚不知理也田融趙書曰前石数出逰獵每亟馳騁主簿程琅諫前石馳逐自若草間有瓦木馳馬觸之馬即死前石亦危殆體小不穏還宫歎曰程琅忠臣也不用其言吾之不善追之何及段龜龍凉紀曰太常卿楊頴疏諫其主纂飲酒過度出入無恒纂曰不有直亮諸臣誰匡邪僻之君也纂雖有此諫終不能改又曰吕光龍飛二年太常黁反叛黁以箋書招誘楊軌推為盟主軌性直不慮黁之傾危西河太守程肇諫軌曰将軍之與吕主可謂臭味是同今欲釋同心託異類背龍頭尋蛇尾非将軍之高算也梁祚魏國統曰吴丞相顧雍諫孫權曰公孫淵未可信後必悔也權入禁中雍後隨之頓首曰此國之大事臣以死爭之權使左右扶出太平御覽卷四百五十四
