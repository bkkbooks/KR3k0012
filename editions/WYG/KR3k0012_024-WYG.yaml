  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_024-1a, image: WYG0893/WYG0893-0212c.png}
body:
  text: 太平御覧卷二十四宋李昉等撰時序部九秋上秋上釋名曰秋者緧音秋也緧迫萬物使時成也白虎通曰七月謂之夷則夷者傷也則者法也言萬物始傷被刑法也又八月謂之南吕何南者任也言陽氣尚有任生薺麥也説文曰天地反物為秋字從禾燋省聲易曰兌正秋也萬物之所說也王弼注曰秋萬物成所悅也書曰分命和仲宅西曰昧谷寅餞納日平秩西成宵中星虛以殷仲秋厥民夷鳥獸毛毨毨者謂落毛更生整理也詩曰秋日凄凄百卉具腓腓病也凉風用事而衆草皆病興也貪殘之政行而萬民困病又七月流火流下也火星中而寒暑退又彼采蕭兮一日不見如三秋兮禮曰七月之節日在翼昏建星中曉畢中斗建申位之初其日庚辛其帝少皥其神蓐收其蟲毛其音商律中夷則其數九其味辛其臭腥其性義其事言其祀門祭先肝立秋之日涼風至後五日白露降後五日寒蟬鳴天子居總章左个乘戎輅駕白駱載白旂衣白衣服白玉食稻與魚其噐亷以深太史先立秋三日謁於天子曰某日立秋盛德在金天子乃齊立秋之日天子親率諸侯大夫以迎秋於西郊還乃賞軍帥武人於朝乃命將帥選士厲兵簡練俊傑專任有功以正不義詰誅暴慢以明好惡順彼逺方又七月中氣日在張昏箕中曉昴中斗建申位之中處暑之日鷹乃祭鳥後五日天地始肅後五日禾乃登修宫室坯垣牆又八月之節日在角昏南斗中曉畢中斗建酉位之初律中南吕白露之日鴻鴈來後五日𤣥鳥歸後五日羣鳥養羞是月也養衰老授几杖行糜粥飲食天子乃儺以達秋氣命樂正習吹又八月中氣日在軫昏南斗中曉東井中斗建酉位之中秋分之日雷乃收聲後五日蟄蟲坯户後五日水始涸是月也祀夕月於西郊命有司享壽星於南郊日夜分則同度量平權衡祭馬社又九月之節日在角昏牽牛中曉東井中斗建戌位之初律中無射寒露之日鴻鴈來賔後五日雀入大水為蛤後五日菊有黄花是月也命有司伐蛟取鼉登龜取黿又九月中氣日在氐昏須女中曉柳中斗建戌位之中霜降之日豺乃祭獸後五日草木黄落後五日蟄蟲咸俯是月也霜降始則百功休天子嘗稻先薦寢廟藏帝籍於中倉祗敬必飭是月也乃伐薪為炭又秋斂冬藏義也又西方者秋秋之為言愁也愁之以時察守義者也周禮曰大司馬之職仲秋教理兵掌建邦之九法以佐王平邦國又司裘掌為大裘以供王祀天之服仲秋獻良裘季秋獻功裘又籥章氏掌仲秋擊土鼓吹豳詩以迎寒氣鄭𤣥注曰迎寒以夜來諸侯也又司矢仲秋獻矢箙弓弩成於秋矢箙成於夏箙盛矢噐也以獸皮為之箙音服又南吕酉之氣八月建焉而辰在壽星又秋見曰覲覲之為言勤也共勤王之事也大行人云秋覲以比天下功也又秋獻龜魚又司爟音貫掌行火之政令季秋内火九月黄昏心星伏在戌上使民内火傳曰歲云秋矣我落其實而取其材爾雅曰秋為白藏又秋曰收成又秋為旻天李廵曰萬物成熟皆有文章郭璞云旻愍也萬物凋可愍又秋獵曰獮獮殺也順秋氣漢書曰太白秋西方金義也言也義虧言失逆秋令傷金氣罰見太白又秋􅒫如淳曰音焦也物􅒫斂乃成熟漢書云八月賜大臣羊酒以助衰氣漢書曰范式字巨卿與汝南張伯元為友二人春别京師以暮秋為期伯元以九月十五日殺雞以待巨卿母曰相去千里汝何信之也言未卒而巨卿至相隨上堂再拜母極歡悅續漢書曰仲秋祀老人星于國南郊孟康漢書音義曰春曰朝秋曰請如古諸侯朝聘也師古曰請音才性反吳王濞不朝使人為秋請也晉書曰袁宏孤貧運租自業謝尚時鎮牛渚秋夜乘月泛江㑹宏在舫中諷詠遣問即其詠史之作尚迎升舟與談申旦不寐自此名譽日茂梁書曰朱异除中書郎時秋日始拜有飛蟬正集异武冠上時咸謂蟬珥之兆焦贑易林曰秋風生哀花落悲心易通統圖曰日行西方白道曰西陸尚書大傳曰萬物非秋不收又寅餞納日平秩西成傳曰天子以秋命三公將率選士厲兵以征不義決獄訟斷刑罰趣收斂以順天道以佐秋殺春秋感精符曰霜殺伐之表季秋霜始降鷹隼擊王者順天行誅以成肅殺之威穆天子傳曰仲秋甲戌天子東遊次雀梁一宿為舍再宿為信過宿為次蠧書于羽陵謂暴書蠧蟲因日蠧書也聖賢記曰馮夷𢎞農潼鄉隄首里人服八石得道為水仙河伯一又説華隂人八月上庚日渡河溺死天帝署為河伯荆楚歲時記曰八月十四日民並以朱水㸃兒頭名為天灸以厭疾也又以綿綵為眼明囊赤松子以八月囊承柏樹露為宜服後世以金箔為之遞相餉遺西京雜記曰賈佩蘭云在宫時八月四日出雕房北方竹林下圍碁勝者終年有福負者終年疾病又漢宗廟八月飲酎用九十日王子年拾遺記曰漢武帝以季秋之月泛靈鶂之舟於臨池之上窮夜逹晝以晝逹夜於桂臺之下以香金為鈎縮紉為綸以丹鯉為餌不踰旬釣一白蛟長三四丈若大蛇無鱗甲帝曰非龍也於是付太官為鮓而肉紫骨清香美無倫詔賜臣下時以上為神感所獲後更不得續齊諧記曰𢎞農鄧紹八月朝入華山見一童子以五色囊承取栢葉下露露皆如珠子亦云赤松先生取以明目今八月朝作眼囊象此也鄧明德南康記曰平固縣有湖中有石鴈浮在湖中每至秋石鴈飛鳴如候時也尚書大傳曰西方者何也鮮方也鮮訊也訊者始入之貎始入者何以謂之秋秋者愁也愁者萬物愁而入也故曰西方者秋也秋收斂貎尚書中候曰周文王為西伯季秋之月甲子赤雀銜丹書入豐都止於昌户乃拜稽首受取曰姬昌蒼帝子亡殺商紂也尚書考靈曜曰虛星為秋候昴星為冬期隂氣相位德乃弗邪子助母合子符虚星北方宿也昴星西方宿也隂氣在秋冬助子母令符之弗邪也又曰政失於秋太白出入不常毛詩傳曰壯士悲秋感隂氣也詩含神霧曰秦地處仲秋之位男懦弱女髙瞭瞭明也落消切白色音中商其言舌舉而仰聲清而揚三禮義宗曰九月大享帝於明堂之中孝經云宗祀文王於明堂是也又秋曰庚辛者庚更也辛新也言物皆改更而新也又周祫以秋者萬物新成可以奉薦宗廟故合先祖之神而祭之故祫宜在秋也又九月寒露為節者九月之時露氣轉寒故謂之寒露節霜降為中露變為霜故以為霜降節春秋繁露曰秋之為言猶湫湫者憂悲之狀又曰秋怒氣故殺春秋元命苞曰堯為天子季秋下旬夢白帝遺以鳥喙子其母曰扶始升高丘白帝上有雲如虎感已生臯陶索扶始問之如夢言又淮南子云臯陶鳥喙莊子曰舜以天下讓善卷善卷曰余立於宇宙之中冬日衣皮毛夏日衣葛絺春耕種足以勞秋收之足以休日出而作日入而息逍遥於天地之間何以天下為哉入深山莫知其處又荆之南有㝠靈者以五百歲為春五百歲為秋上古有大椿者八千歲為春以八千歲為秋管子曰東方曰歲星其時曰春其氣曰風風生木南方曰日其時曰夏其氣曰陽陽生火西方曰辰其時曰秋其氣曰隂隂生金北方曰月其時曰冬其氣曰寒寒生水又曰秋三月以庚辛之日發五政一政曰禁博塞二政曰無見五兵之刃三政曰慎旅農趣聚収四政曰補缺塞坼五政曰修垣牆周門閭五政狥時五榖皆入又曰歳有四秋春農事既畢農夫賦耜鐡此謂春之秋夏至蠶纊之所作此謂夏之秋秋成五榖之所㑹此謂秋之秋冬營室中女事紡績之所作此謂冬之秋文子曰日月欲明浮雲蓋之藂蘭欲茂秋風敗之又政失於秋太白出入無常文子曰因春而生因秋而殺所生不德所殺不怨即幾於道矣春秋無心生殺有時人主無為賞罰以當逺違其理近合其道又唯神化為貴精至為精神之所動若春風之生秋氣之殺其生也暄然如春物得其生死也肅然如秋物終於死故生祈其報死無所怨生之死之以其無心也幽求子曰南海之中秋風晨厲則慘然多悽抱朴子曰南海之中蕭丘之上有自生火火常以秋起而秋滅鄒子曰秋取柞楢之火淮南子曰春氣𤼵而百草生得秋而萬物成實又春女悲秋士哀知物化矣又至秋三月青女乃出降霜雪青女乃天神青霄玉女主雪霜又太隂治秋則欲脩備繕兵隂德斷割故修兵也又孟秋之月西宫御女白色衣白采撞白鐘其兵鉞其畜狗八月官尉其樹柘九月官候其樹槐又秋為矩者所以方物也又九月失政三月春風秋不濟濟止也又時則曰六合孟春與孟秋為合仲春與仲秋為合季春與季秋為合孟夏與孟冬為合仲夏與仲冬為合季夏與季冬為合孟春始盈孟秋始縮仲春始出仲秋始内出二月播植也内八月收斂也季春大出季秋大内孟夏始緩孟冬始急緩四月陽炎急十月寒肅仲夏至修仲冬至短夏至北極冬至南極季夏德畢季冬刑畢德畢陽施窮也刑畢隂殺盡也又西方金也其帝少昊其佐蓐收執矩而至秋其神為太白又西方之極自崑崙絶流沙沉羽西至三危之國流沙蓋在崑崙之西南也石城金室飲食之民不死之野少昊蓐收之所司者萬二千里其令曰審用法誅必辜備賊禁姦邪飭羣牧謹積聚修城郭補決竇塞蹊徑遏溝瀆止水壅谿谷守門閭陳兵甲選百官誅不法應金斷也鶡冠子曰斗柄西指天下皆秋尸子曰秋為禮西方為秋秋肅也萬物莫不肅敬禮之至也商子曰螟蛉春生秋死出而民失食今一民耕而百人食為螟蛉也大矣吕氏春秋曰秋早寒冬必暖春多雨夏必旱太𤣥經曰酉西方也秋也物皆成象而就也有形則復於無形故曰冥也謂物終藏太平御覽卷二十四
