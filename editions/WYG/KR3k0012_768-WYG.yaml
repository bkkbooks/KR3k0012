  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_768-1a, image: WYG0899/WYG0899-0715a.png}
body:
  text: 太平御覽卷七百六十八宋李昉等撰舟部一叙舟上釋名曰船循水而行又曰舟言周流也船上屋曰廬象舎也其上重室曰飛廬在上故曰飛也又在其上曰雀室於中候望若鳥雀之驚視也又曰舟名青翰千翼赤馬亦名鷁首說文曰船從舟鈆省聲艘船總名也艘音騷易曰刳木為舟剡木為楫舟楫之利以濟不通詩曰汎彼栢舟在彼中河舟在河中猶婦人在夫家是其常處又曰二子乘舟汎汎其景二子汲壽願言思子中心養養又曰汎汎楊舟載沉載浮楊木也舟之汎浮隨所載既見君子我心則休書曰予乘四載隨山刋木所載者四其一曰水乗舟又曰若乘舟汝弗濟臭厥載禮曰季春之月令舟牧覆舟五覆五反乃告舟備具于天子鄭𤣥曰舟官覆反舟者備傾漏也蔡邕章句曰備謂檝櫂紼纚維引之具左傳曰齊侯與蔡姬乘舟于囿蕩公公懼變色禁之不可公怒歸之未之絶也蔡人嫁之齊侯以諸侯之師侵蔡又曰冬晉薦饑使乞糴于秦秦輸粟于晉自雍及絳相繼命之曰汎舟之役汎謂水運入河汾也又曰秦伯伐晉孟明濟河焚舟示必死也取王官及郊王官郊晉地晉人不出遂自茅津濟封殽尸而還茅津在河東大陽縣西封埋藏之又曰楚敗呉師獲其舟餘皇餘皇舟名又曰晉楚将戰趙嬰齊使其徒先具舟于河欲敗而先濟也春秋潜潭巴曰澤浮舟天子以亡為憂宋故注曰潭無底之潭今浮舟言隂感之具論語曰南宫适問於孔子曰羿善射奡盪舟俱不得其死然爾雅曰舫舟也天子造舟諸侯維舟大夫方舟士特舟庶人乘柎廣雅曰艦大船也舫艕船也䝉衝艑䑦􅀈舸舼艇艦舟也家語曰舟非水不行水入舟則没君非民不治民犯上則君危戰國策曰或謂公叔曰乗舟舟漏而不塞則舟沈矣塞漏舟而輕陽侯之波則舟覆矣今公自以辯於薛公而輕秦是漏舟而輕陽侯之波也願公察之帝王世紀曰昭王濟漢漢江人惡之以膠船進王中流膠船觧王没于水史記曰項羽欲東渡烏江烏江亭長艤船待謂項王曰江東雖小地方千里衆數十萬人亦足王也願大王急渡今獨臣有船漢軍至無以渡項王笑曰天之亡我我何渡為且籍與江東子弟八千人渡江而西今無一人還縱江東父老憐而王我何面目見之縱彼不言籍獨不愧於心乎顧謂亭長曰吾知公長者吾騎此馬五歲所當無敵嘗日行千里吾不忍殺之以賜公又曰韓信擊魏魏王盛兵蒲坂塞臨晉信乃益為疑兵陳船欲渡臨晉而伏兵從夏陽以木罌缻與缶字同渡軍襲安邑虜魏王豹又曰陳平逃楚歸漢渡河船人疑有金隂欲害之平脫衣刺船遂免害漢書曰鄧通蜀郡南安人以櫂船為黄頭郎師古曰櫂船能持櫂行船也土勝水其色黄故刺船之郎皆着黄㡌因號曰黄頭郎也又曰景帝三年呉大船自覆呉地以船為家國将亡也又曰武帝渡汾歌曰汎樓船兮濟汾河横中流兮揚素波又曰武帝浮江射蛟舳艫千里李斐曰舳後持柂處艫船頭刺櫂處也又曰武帝時南越叛漢欲用船戰乃大修昆明池列館環之治樓船髙十餘丈加旗幟其上又曰伍被曰呉王伐江陵木以為船又曰薛廣德為御史大夫秋上酎祭宗廟出便門欲御樓船廣德當乗輿免冠頓首曰宜從橋詔曰大夫冠廣德曰陛下不聽臣臣自刎以血汚車輪陛下不得入廟矣上不恱先驅光禄大夫張猛進曰臣聞主聖臣直乗船危就橋安聖主不乘危御史大夫言可聽上曰曉人不當如是耶乃從橋又曰江都易王子建不道使宫女乘小船建以足踏覆宫女溺乍沉乍浮建觀而大笑後漢書曰馬援平南越将樓船大小三千餘艘士二萬餘人進擊九貞賊徴側餘黨都羊等自無功至居風無功居風二縣並屬九貞郡斬獲五千餘人嶠南悉平嶠嶺嶠也廣州記曰援到交趾立銅柱為漢之極界又曰第五倫為㑹稽太守永平五年坐法徴老小攀車叩馬啼呼相隨日裁行數里不得前倫乃偽止亭舎隂乘船去衆知復追之及詣廷尉吏民上書守闕者千餘人是時顯宗方按梁松事亦多為松訟者帝患之詔公車諸為梁氏及㑹稽太守上書者勿復受㑹帝幸廷尉録囚徒得免歸田里身自耕種不交通人物數年拜宕渠令又曰任文公巴郡人為從事天大旱白刺史曰五月一日當有大水其變已至不可防救宜令吏人預為其備刺史不聽文公獨儲大船百姓或聞頗有為防者到其日旱烈文公急命促載使白刺史刺史笑之日将中天北方雲起須㬰大雨至晡時湔水涌起十餘丈酈元水經注云湔水出綿道玉壘山在今益州湔音子延反突壊廬舎所害數千餘人文公遂以占術馳名又曰郭林宗逰洛陽始見河南尹李膺膺竒之遂相友善於是名震京師後歸鄉里衣冠諸儒送至河上車數千兩林宗唯與李膺同舟而濟衆賔望之以為神仙焉又曰趙炳嘗臨海求船人不和之和許也俗本作知者誤也炳乃張葢坐其中長嘯呼風亂流而濟於是百姓神服從者如歸魏志曰尚書僕射杜畿受詔作御樓船於陶河試船遇風沒文帝為之流涕詔曰昔㝠勤其官而水死稷勤百榖而山死杜畿忠之至也又曰徐宣遷司𨽻校尉從至廣陵六軍乘舟風浪暴起帝船洄倒宣疾在後陵波而前羣寮無至者帝壯之又曰郭嘉死太祖征荆州還於巴丘遇疾燒船歎曰郭奉孝若在不使孤至此奉孝嘉字又曰鄧哀王冲字倉舒五六歲智若成人孫權曽致巨象太祖欲知其輕重訪之羣下咸莫能出其理冲曰置象大船之上而刻其水㾗所至稱物以載之則校可知矣太祖大悦即施行焉魏畧曰孫權乘大船來觀軍公使弓弩亂發箭著其船船偏重将覆權因廻船復以一靣受箭箭均船平乃還呉志曰諸葛恪出住東興有虹見其船又曰呉人以舟檝為輿馬以巨海為夷庚也晉書曰陸機初詣張華華問雲何在機曰雲有笑疾未敢自見俄而雲至華為人多姿制好帛繩纒鬚雲見而大笑不能自已先是嘗著衰絰上船於水中顧見其影因大笑落水人救獲免又曰張憑字長宗祖鎮蒼梧太守慿年數歲鎮謂其父曰我不如汝有佳兒慿曰阿翁詎宜以子戯父耶及長有志氣為鄉閭所稱舉孝亷負其才自謂必參時彦初欲詣劉惔鄉里及同舉者共笑之比至惔處之下座神意不接慿欲自發而無端㑹王濛就惔清言有所不通慿於末坐判之言㫖深逺足暢彼我之懐一座皆驚惔延之上座清言彌日留宿至旦遣之慿既還船須㬰惔遣傳覔張孝亷船便與同載遂言之於簡文帝帝召與語歎曰張憑勃窣為理窟官至吏部郎御史中丞又曰王濬徴拜右衛将軍除大司農車騎將軍羊祜雅知濬有竒畧乃密表留濬於是重拜益州刺史武帝謀伐呉詔濬修船艦濬乃作大船連舫方百二十歩受二千餘人以木為城起樓櫓開四出門其上皆得馳馬来往又畫鷁首怪獸於船首以懼江神舟檝之盛自古未有太康元年正月濬自成都率巴東監軍廣武将軍唐彬攻呉丹陽尅之擒其丹陽監盛紀吳人於江險磧要害之處並以鐵鎖横截之又作鐵錐長丈餘暗置江中以逆拒船先是羊祐獲呉間諜具知情状濬乃作大筏數十亦方百餘歩縳草為人被甲持仗令善水者以筏先行筏遇鐵錐錐輙著筏去又作炬長十餘丈大數十圍灌以麻油在船前遇繅然炬燒之須㬰融液斷絶於是船無所礙王隱晉書曰陶侃擊蜀賊王眞真拘得侃青雀船侃欲投水都督王禳蘇品扶侃入小舟得脱晉中興書曰蘇峻作逆與祖渙許栁等将萬餘人出横江連船東渡時遇西風既濟舟江中忽更東風吹船還西㟁峻歎曰是天耶我固將亡也又曰郭翻武昌人安西将軍庾翼以帝舅之重躬往造翻欲强起之翻曰人性各有所短焉可强逼翼以翻船狹小欲引就大船翻曰使君不以民鄙賤而辱臨之此固野人之舟也翼俯屈入其船中太公六韜曰武王伐殷先出於河吕尚為将以四十七艘船濟於河又曰天船一名天横以濟大水又曰殷君為酒池可逰船莊子曰顔回問於仲尼曰回嘗濟於觴深之淵津人操船若神吾問焉操船可學耶曰善游者數音朔能若乃夫沒人未嘗見舟而便操之吾問焉不吾告敢問何謂仲尼曰善㳺者之數能忘水故也彼視衆泉若陵視舟之覆猶車之却退也視泉若陵故視舟之覆於淵猶車却退於陵也又曰藏舟於壑藏山於澤謂之固矣然而夜半有力者負之而走昧者不知也又曰水之積也不厚則其負大舟也無力覆桮水於㘭於交切堂之上而芥為之舟置杯焉則膠水淺而舟大也又曰孔子遊乎緇帷之林坐杏壇之上有漁父者下船而來孔子乃下求之至於津畔方将杖挐而引其船顧見孔子再拜而起乃刺船而去延縁葦間顔淵還車子不顧待水波定不聞挐音而後敢乗又曰方舟而濟河有虛舟來觸雖有褊心之人終不怒也忽有一人在其上則惡聲随之向不怒向虛而今實也又曰巧者勞而智者憂無能者無所求飽食而遨遊泛然若不繫之舟又曰散木以為舟則沈是不材之木鄧析子曰同舟渉海中流遇風救患若一所憂同故也孔叢子曰順謂韓王曰胡越之人同舟濟江中流遇風波其相救如左右手不慎所同之患是不如胡越之舟人也尸子曰六馬登糟丘方舟泛酒池劉祈書曰舟行於水車轉於陸此勢之自然者也文子曰舟浮江海不為莫乘而沉君子行道不為莫知而止孫卿子曰君者舟也庶人者水也水能載舟亦能覆舟墨子曰工錘作舟慎子曰燕鼎之重乎千鈞乗於吳舟則可以濟所託者浮道也又曰行海者坐而至越有舟也行陸者立而至秦有車也秦越逺塗也安坐而至者械也韓子曰千鈞得船則浮錙銖失舟則沈非千鈞輕而錙銖重也有勢之與無勢也又曰奔車之上無仲尼覆舟之下無伯夷號令者國之舟車安則知亷危則争越也太平御覽卷七百六十八
