body:
  text: 太平御覽卷七百六十宋李昉等撰器物部五盌盂蘇鉝安哉匕箸机畢飯箒灸函飯函淅䈿筐簇簞爵盌方言曰盌謂之盂或謂之銚銳或謂之櫂椀謂之䀁或謂之涓􅃑說文曰盌小盂也呉志曰曹公出濡須甘寧為前部督受勑斫敵前营孫權特賜米酒衆餚寧乃以銀椀酌酒自飲兩椀乃酌與其都督都督伏不肯持寧引白削置膝上呵謂之曰卿見知於至尊孰與甘寧寧不惜死卿何以獨惜死乎都督即起拜持酒通酌兵各一銀椀至二更時銜枚出斫敵敵驚動遂退寧益貴重晉陽秋曰王敦許周訪邢州又授梁州訪怒敦書喻之遺以盌訪投盌於地又曰武帝時魏府丞蕭譚承徐修儀䟽作漆畫銀帶粉盌詔殺之晉咸康起居注曰詔賜遼東叚遼等瑠璃盌義熈起居注曰詔林邑王范明逹獻金盌一副蓋百副東宫舊事曰漆盌子一百枚抱朴子曰外國作水精盌實是合百片以作之交廣間多有得其法而鑄作之者今以語俗人俗人殊不肯信乃云水精本是自然之物崔豹古今注曰魏帝以車渠石為酒盌文士傳曰潘尼音夷與同僚飲主人有瑠璃椀使客賦之尼於座立成尋陽記曰龍窟有深潭有人於此水邊洗銅盌忽浪起水長便失盌此人後見此盌置城裏井邊交州雜記曰太康四年刺史陶璜表送林邑王范熊所獻青白石盌一口白水精盌二口陶侃故事曰侃上成帝水精盌一枚世說曰王大將軍尚主如厠即還婢擎金盤盛水琉璃盛澡豆秦嘉婦與嘉書曰今奉金錯盌一枚可以盛書水瑠璃盌一枚可以服藥酒諸葛恢集詔荅恢曰今致瑠璃盌一枚表曰天恩賜廣州白盌劉滔毋與從祖虞光禄書曰賜琉璃盌盂說文曰盂飲器也方言曰宋楚趙魏之間或謂之榼河濟之間謂之䀂􅀢亦謂之銚銳漢書曰東方朔上嘗使數家射覆置守宫於盂下使射之盂若盇而大盇與鉢字同墨子曰若夫兼相愛交相利此自先聖六王者親行之何以知先聖六王之親行之吾以其所書於竹帛鏤於金石琢於盤盂傳遺後世子孫者知之晉四王啟事曰惠帝還洛陽黄門以瓦盂盛茶上至尊韓子曰為人君者猶盂也人猶水也盂圓水圓盂方水方凉州異物志曰琥珀作盂瓶東方朔荅客難曰安於覆盂蘓鉝音立吕靜云胡食器也林邑記曰林邑王范明逹獻瑠璃蘇鉝二口安哉李尤安哉銘曰安哉令名甘㫖是盛埏埴之巧甄陶所成食彼羙珍思此鹿鳴匕方言曰匕謂之匙說文曰􅀈音四匕也所以取飯易曰震驚百里不喪匕鬯詩曰有饛簋飱有捄棘匕周禮曰大喪共角􅀈角􅀈角匕也禮喪大記曰楔齒用角􅀈也儀禮曰主人執匕禮曰杜蕢謂晉平公曰蕢也宰夫也非刀匕是供又曰匕以桑長三尺或曰五尺刋其柄與末匕所以載牲體者此謂喪祭也吉祭匕用棘三禮圖曰匕以載牲體長二尺四寸愽三寸漆丹柄頭䟽匕形如飯操以棘心為之英雄記曰董常大㑹賔客誘降反者以鑊烹之㑹者戰慄亡失匕箸蜀志曰曹公謂先主曰天下英雄唯使君與操耳先主方食失匕箸王隱晉書曰石勒時有謠云一杯食有兩匙石勒死人不知沈約宋書曰太子妃上世祖金縷匕箸上以賜沈慶之抱朴子曰道士李根煎鉛錫以藥如大豆者投中以鐡匕攪之冷即成鉏又有古强者自云四千嵗稽使君以玉匕與强後忽語稽云昔安期先生以與之東宫舊事曰漆匕五十枚續齊諧記曰趙文詔為東宫扶侍廨在青溪中橋夜與神女讌寢脫金簮與扶侍亦贈以銀椀及琉璃匕箸方言曰箸筩盛匕箸者也筩音捅陳楚宋魏之間謂之筲或謂之籝音盈自闗而西謂之桶揔今俗亦通呼小籠桶揔桶音籠揔蘇孔切通俗文曰以箸取物曰歌音覊禮曰飯黍無以箸􅅅之有菜者用梜其無菜者不用梜梜猶箸也史記曰漢王與酈食其謀撓楚權張良從外来曰陛下事去矣臣請借前箸為大王籌之又曰景帝居禁中召條侯周亞夫賜食獨置大胾不置箸條侯心不平顧謂尚席取箸景帝視而笑曰此非不足君所乎條侯免冠謝謝承後漢書曰莾時有竒士巨毋覇卧則枕皷以鉄箸食呉志曰趙逹善治九宫一筭之術嘗遇知故知故曰倉卒之間無酒食以叙意逹以箸一隻冄三蹤横之乃言卿東壁下有酒一斗鹿肉三觔何以言無主人慙曰知卿善射欲相試耳典畧曰曹汝隨大軍破張魯命陳琳作書報太祖曰且夫墨子之守縈帶為垣髙不可登折箸為械堅不可入晉書曰何曽字頴考日食萬錢猶言無下箸之處東宫舊事曰漆箸一百䨇荀卿子曰從山望木者十仞之木如箸而求箸不止析髙蔽其長也韓子曰紂為象箸而箕子怖以為象箸必不加於􅁟鉶必將犀玉之杯象箸玉杯必不􅅅菽藿則必薦豹胎薦豹胎必不衣短褐而食於茅茨之下則必錦衣九重廣室髙臺吾畏其卒故怖其始故箕子見象箸以知天下之禍淮南子曰糟丘生乎象箸論衡曰以箸撞鐘以筭擊鼓鐘鼓不能鳴者用撞之者小也神仙傳曰葛𤣥嘗與客食𤣥以口中飯盡化為蜂數百集於客身客皆投匕箸驚懼𤣥乃張口其蜂悉入葛洪治噎方曰與對食之人當以手捉箸問噎人曰此何等物噎人當吞曰箸即復曰咽下去即愈語林曰王藍田食雞子以箸刺之不得便大怒王述也投於地相書曰人三指用箸自如四指用箸貴五指用箸大冨貴也机方言曰爼机也西南蜀漢之郊曰杫音賜史記曰項王為高爼置太公其上如淳曰髙爼机上也後漢書曰樂松者河内人天性朴忠家貧為郎嘗獨直臺上無被杫食糟糠帝每夜入臺輙見松問其故甚嘉之自此詔太官賜尚書以下朝夕食給帷被皂袍及侍史二人畢三禮圖曰畢似天畢以載牲醴又葉慱三寸長八寸柄長二尺四寸丹漆兩頭詩曰有捄天畢載施之行箋云畢所以助載鼎寳實儀禮曰宗人執畢畢狀如叉也禮曰畢用桑長三尺刋其柄末畢所以助主人者刊猶削也飯帚說文曰陳留以飯帚為䈰稍巢切亦盛箸籠又作筲也灸函東宫舊事曰漆貊灸大函一具飯函列異傳曰景初中城陽縣吏王臣嘗作倦枕機卧聞竈下呼曰文納何以在人頭下應曰我見枕不得動汝来就我至乃飯函也淅箕廣雅曰淅䉴音箱㔯音旋䉛音郁篡文曰䉛淅箕也一曰􅀢魯人謂之淅䉴方言曰箕陳魏宋楚間謂之籮炊䉛謂之縮漉米籔也或謂之㔯河東呼淅􅀢也筐方言曰箄必弭切篓音缕籅音䈱音叨筐􅀢也􅀢音筥江沔之間謂之籅趙岱之間謂之䈱淇衞之間謂之牛筐􅀢其通語也處小者南楚謂之簍闗而西秦晉之郊謂之箄今江東名小籠亦為箄說文曰筐飯筐也􅀢飯牛筐也方曰筐圓曰􅀢三禮圖曰大筐以竹受五斛大夫以盛米致饋於聘賔小筐以竹受五升以盛米又曰筐以盛熬熬榖四種八筐大夫三種六筐士二種四筐易曰女承筐無實書曰厥篚織文又曰厥篚檿絲厥篚𤣥纎縞厥篚織貝厥篚𤣥纁璣組厥篚纎纊又曰惟其士女篚厥𤣥黄紹我周王詩曰采采卷耳不盈頃筐又曰于以采蘋南澗之濵于以盛之維筐及筥方曰筐圓曰筥又曰摽有梅頃筐塈之又曰女執懿筐遵彼㣲行爰求柔桑禮曰蠶則績而蠏有筐左傳曰筐筥錡釡之器潢汙行潦之水可薦於鬼神可羞於王公又曰晉侯筮嫁伯􅁎於秦遇歸妹之暌其繇曰士刲羊亦無􅎺也女承筐亦無貺也西京雜記曰元后在家日䴏衘白石大如指墮績筐中后取之石自剖為二其中文曰母天下遂復還合後為皇后常致璽中莊子曰愛馬者以筐盛屎吕氏春秋曰有娀氏二女為九成之臺上帝令鷰徃遺二卵争搏之覆以玉筐北飛遂不反簡狄吞之生契􅞊音吕方言曰􅞊南楚謂之筲趙魏之郊謂之􅞊說文曰􅞊飯筥也受五升秦謂之􅀢廣雅曰􅯡音奚映􅞊音也纂文曰􅯡映大筥也趙代以筥為䈱論語曰斗筲之人何足筭也筲竹器受二升東宫舊事曰漆注綺織􅞊二十枚陶侃故事曰侃上成帝漆複􅞊五十枚簞說文曰簞飯器也禮曰凡以苞苴簞笥問人者操以授命儀禮曰小祝盤匜與簞巾于西階東左傳曰趙宣子田于首山見靈輙餓為之簞食與肉又曰越圍呉趙孟使楚隆徃呉王拜稽首曰寡人不佞不能事越與之一簞珠使問趙孟簞小笥也問遺也論語曰賢哉囘也一簞食一瓢飲在陋巷人不堪其憂孟子曰今燕虐其民王徃而征之民以為將拯己於水火之中也簞食壺漿以迎王師若殺其父兄係累其子弟如之何其可也又曰非其道則一簞食不可受於人如其道則舜受堯之天下不以為泰又曰商之君子實𤣥黄于篚以迎其君子其小人簞食壺漿以迎其小人黄石公三略曰良將用兵有饋一簞醪者使投之於河令士卒迎流而飲之爵觶散用斂說文曰爵禮器也象爵之形觶音枝受四升詩曰赫如渥赭公言錫爵周禮曰享先王賛玉爵宗廟献用玉爵大朝覲㑹同賛獻玉爵玉爵王禮諸侯之酢爵也又曰梓人為飲酒器爵一升觚三升獻以爵而酬以觚禮曰執玉爵者弗揮為其寶而脆也又曰知悼子卒未塟晉平公飲酒師曠李調侍鼔鐘杜蕢自外来聞鐘聲曰安在曰在寢杜蕢入寢歴階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐而飲之䧏趨而出平公呼而進之曰蕢曩者爾心或開子是以不與爾言爾飲曠何也曰子卯不樂紂以甲子死桀以乙卯亡王者謂之子卯日不舉樂為樂所以自戒惧也知悼子喪在堂未塟斯其為子卯也大矣曠也大師也不以詔是以飲之也爾飲調何也曰調也君之䙝臣也為一飲一食忘君之疾是以飲之也爾飲何也曰蕢宰夫也非刀匕是供又敢與知防是以飲之也平公曰寡人亦有過焉酌而飲寡人杜蕢洗而揚觶公謂侍者曰如我死則必無廢斯爵也至于今既畢獻斯揚觶謂之杜舉又曰宗廟之祭貴者獻以爵賤者獻以散尊者舉觶卑者舉角又曰魯祀周公於太廟爵用玉琖仍彫加以壁角又曰孔子射於矍相之圃蓋觀者如堵牆使公罔之裘序㸃揚觶而語公㒺之裘揚觶而語曰幼壯孝弟耆耋好禮不從流俗修身以俟死者不在此位也蓋去者半處者半序㸃又揚觶而語曰好學不倦好禮不變耄期稱道不亂者不在此位也蓋僅有存者三禮圖曰爵受一升尾長六寸愽二寸傅翼兊音銳下方足漆赤雲氣又曰散受五升左𫝊曰凡公行告于宗廟反行飲至舎爵䇿勲焉爵飲酒器也既飲置爵則書勲勞又曰虢公請器王賜之爵後趙書曰石虎子韜以琉璃爵螺杯勸客酒呉志曰諸葛恪行酒至張昭昭不肯飲曰此非養老之禮權曰卿其能令張公辭屈乃當飲之恪曰昔師尚父九十秉旄杖鉞猶未告老軍旅之事將軍在後酒食之事將軍在先何為不養老也昭為盡爵古今注曰章帝章和年銅酒爵出河内泌水典論曰劉表諸子好酒造三爵大曰伯雅中曰仲雅小曰季雅楚辭九歌曰授北斗兮酌桂漿斗為玉爵班媫好賦曰酌羽觴兮銷憂太平御覽卷七百六十
