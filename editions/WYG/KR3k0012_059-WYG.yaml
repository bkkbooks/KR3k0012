  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_059-1a, image: WYG0893/WYG0893-0489c.png}
body:
  text: 太平御覽巻五十九宋李昉等撰地部二十四水下水下晏子曰景公問廉政何如對曰其行水也美哉水乎其濁無不塗其清無不掃楊子法言曰或問進曰水或曰為其不舍晝夜與曰有是哉滿而後漸者其水乎李軌注曰水滿坎而後進博學而後仕瑞應圖曰共工氏受水瑞百官師長以水為號蒙水瑞水也君乗土而王其政太平則蒙水出於山焉韓詩外傳曰夫水者縁理而行不遺大小似有智者動而之下似有禮者踏深不疑似有勇者障防而清似知命者厯險致逺似有徳者天地以成羣物以生國家以寧萬事所平此智者所以樂於水也呉氏春秋曰伍子胥奔呉至溧陽漂陽女子擊縹瀨水之上子胥過跪而乞食女子簞食壺漿而飯之子胥食而去謂女子曰掩子壺漿勿令其露女子曰行矣子胥行五步還顧女子已自投瀨中後子胥伐楚師還過漂陽瀨上欲報以百金不知其家乃投金瀨水而去後有嫗行哭而來曰吾女年三十不嫁擊縹於此遇窮人飯之恐事泄投水而死乃取金歸物論曰所以立天地者水也夫水也者本也吐元氣發日月經星辰而興又曰九州之外皆水也余昔在㑹稽仰看南山見雲如瀑練方數十丈其聲硠礚湏臾山下居民驚駭洪水大至列仙傳曰負局先生上呉山語下人吾欲還􅅫萊山為汝曹下神水岸頭一旦有水白色從石間下飲之多愈疾楚詞曰滄浪之水清可以濯吾纓湌浪之水濁可以濯吾足𤣥中記曰天下之多者水焉浮天載地髙下無不至萬物無不潤山海經曰剡山有獸焉名曰合窳見則天下大水髙簡之山其上有水焉甚寒而清帝臺之漿水也郭璞注曰河東觪縣櫓道山有水潜出山上俗名曰鴦漿即此類也大荒之隅有山而不合名曰不周有寒暑之水又曰譙明之山譙水出焉而西流至于河其中多河羅之魚一首而十身又曰少陽山酸水出焉東而流至于汾水其中多美赭管子曰上有赭下有鐵水經注曰鬰水即夜郎豚水也漢武帝時有竹王興於豚水有一女子浣於水濵有三節大竹流入女子足間推之不去聞有聲持破之得一男兒遂雄夷濮氏竹為姓所捐破竹於野成林王祠竹林是也王嘗從人止大石上命作羮從者白無水王以劍擊石出水今竹王水是也又曰趙人有琴髙者以善鼓琴為康王舎人行龎涓之術遊浮碭郡門二百餘年後入碭取水龍子與弟子期曰皆潔齋待於水傍果乗赤鯉出入碭中有萬人觀之留月餘復入水也又曰姜水按世本炎帝姜姓帝王世紀曰炎帝神農氏其母曰似遊華陽感神而生炎帝長於姜水又曰昔沫水自蒙山至南安而溷崖水脚漂疾破害舟船歴代為患蜀郡太守李氷𤼵卒鑿平溷崖河神贔怒氷乃操刀入水與水神鬭遂平溷崖通水路開處即水所穿也又曰黄水出夏陽縣西北連巫山溪出雄黄頗有神異採之常以冬月祭祀鑿石深數丈方得雄黄故溪水取名焉又曰沁水南歴猗氏又南與驫驫水合水出東北巨駿山乗髙瀉浪觸石流響世人因聲以稱之又曰池郡魚復縣夷水即佷山清江也水色清照十丈蜀人見其澄清因名清江焉又曰溱水出浮石嶺北青衣山亦謂之青衣水也又曰廬山之北有石門水水出嶺有雙石髙竦其狀若門因有石門之名焉水導雙石之中懸流飛㴻近三百步許下散漫十步許上望之連天若曳飛練於霄中也又曰永昌郡有蘭蒼水出西南博南縣漢明帝永平十二年置博南山名也縣以山名之其水東北流出博南山漢武帝時通博南山道渡蘭蒼津土地絶逺行者苦之歌曰漢徳廣開不賔渡博南越蒼津一渡蘭蒼為他人山髙四十里蘭蒼水有金沙越人收以為黄金又有充珠穴穴出光珠又有琥珀珊瑚黄白青珠也荆州記曰夏首東二十里有涌口二水之間謂之夏洲首尾七百里華容監利二縣在其中楚詞曰過夏首而西浮郭仲産云此水冬斷夏通因名夏水述異記曰睢渙二水波文皆若五色其人多文章故名績水又曰漢沔㑹流處岸上有石銘云下至水有三十里皆傳李斯刻石於此龍魚河圖曰𤣥洲在北海中地方三十里去南岸十萬里上有芝草𤣥澗澗水如蜜味服之長生淮南子又載也萬震南州異物志曰天竺有恒水一號新陶水水特甘香下有真鹽也廣志曰臨川郡有粉水得其水汰粉益潔盛𢎞之荆州記曰陽縣西有粉水源出房陵縣取其水為粉鮮潔異於餘水故因粉為名也巴郡臨江縣有此水舊常獻之也韓詩外傳曰溱與洧三月桃花水下之時衆士女執蘭祓除鄭國之俗三月上巳之日此兩水上招魂祓除不祥也秦州記曰成紀縣有石臼中水深數尺水旱無增減故名其地為天水郡搜神記曰漢末零郡太守有女恱門下書佐使婢取書佐飲餘水飲之有娠而生子至能行太守抱兒使求其父兒直上書佐膝書佐推之兒仆地為水三齊畧記曰康浪水在齊城西南十五里康衢州甯戚扣牛角歌於此也述征記曰臨淄牛山下有女水齊人諺曰世治則女水流世亂則女水竭慕容超時乾涸彌載及宋武北征而激洪流蕩又曰梁鄒城西有籠水云齊孝婦誠感神明湧泉𤼵於室内潜以績籠覆之由是無瓮汲之勞家人疑之乃待其出而搜其室試𤼵此籠而泉遂湧流漂居宇故名曰籠水始興記曰林水源中有石室室前磬石上行羅千瓮中悉是餅銀採伐遇之不得取取必迷悶名山畧記曰僧權道人居晉安霍山晨出澗忽見白水異常飲之甘如醴水過甚迅疾取得少許以餉陶晉安不復中飲權夀百三十嵗不知其終盛𢎞之荆州記曰桂陽郡有國水一邊冷一邊暖冷處青且清暖處白且濁隴右記曰武都紫水有泥其色亦紫而粘貢之用封璽書故詔誥有紫泥之美方輿韶州記曰曲江縣修仁水西南注連水北有三楓亭五渡水齊范雲為始興太守至修仁水酌而飲之賦詩曰三楓何習習五渡何悠悠且飲修仁水不挹偕和流吳録地理志曰天門零陵縣有溪水山獸從數十里往飲廣志曰弱水不勝毛羽世無見者博物志曰水有濁有清河淮濁江漢清南陽有清泠之水丹水泉水汝南有黄水華山南有黒水天下之水皆類五色今載其名也泞水不流郡國志曰隆州析五縣置果州閬中有隂水其民銳氣而酣舞也又曰湓水昔有人此處洗銅盆水暴漲失盆乃投水取盆見一龍銜盆奪之而去故曰湓水又曰藍田灞水滴漏若以金銀銅鐵器盛之皆漏唯匏葉則不漏人掌中亦漏服之闕毛闕得仙論衡曰陽燧取火於日方諸取水於月天地之間巧厯所不能與其數乎然以掌搏之中引類於太極之上而水火可立至者陽隂固相動也異苑曰孫權赤烏八年遣校尉陳勲漕句容中道鑿破窰掘得一黒物無有首尾形如數百斛船長數十丈蠢蠢而動有頃悉融液成汁時人莫能識得此之後獲泉源咸謂是水脈每至大旱餘瀆皆竭唯此若巨海焉水災書曰上天降災下民昏墊又曰湯湯洪水方割湯湯流貌洪水割害也蕩蕩懐山襄陵浩浩滔天傳曰凡平原出水為大水史記曰秦武王三年渭水赤三日昭王三十四年渭水大赤三年洪範五行傳曰赤者火色也水盡赤者以火沴水也渭水秦大川也隂陽色亂秦用嚴刑敗亂之象見也漢書五行志曰髙后三年漢中南郡水出流六千餘家南陽沔水流萬餘家是時女主獨治諸呂相王續漢書五行志曰桓帝永興三年彭城兩水逆流永夀元年洛水溢至津城門漂流人物是時梁冀爭政嫉害忠直後遂誅滅獻帝建安二年漢水溢害人物是時天下大亂古今注曰安帝延平六年河東水化為血元初二年潁川襄城臨水化為血不流京房易曰君湎於酒淫於色賢人潜國家危厥異流水赤救水災史記曰堯命鯀治水九載功績不成謝承後漢書曰沛國陳宣字子輿建武十年雒水出造天津城門或欲築塞之宣諌曰昔王尊正身金隄水退况聖主耶言未絶而水去范曄後漢書曰公沙穆銳思河洛推步之術永夀元年雨大水三輔以東無不漂沒穆明曉占候乃預吿令百姓陟居髙地故𢎞農人獨得免災又曰任文公巴郡人也為治中從事時天大旱白刺史曰五月一日當有大水其變已至不可防救宜令民吏預為之備刺史不聽文公獨詣大船百姓或有信文公頗有防者到其日旱烈文公急命從載白刺史刺史不信至日中雲起須臾雨至晡時湔水湧起十餘丈突壊廬舍所害數千人淮南子曰古者水為民害禹鑿龍門辟伊闕平治水土使民得陸處百姓不親五品不遜契教以君臣之義父子之親夫婦之别長幼之序田野不修民食不足后稷乃教之辟地墾草糞土種穀令百姓家給人足故三后之後無不王者謂夏殷周有隂徳也周衰禮義廢孔子以三代之道教導於世其後繼嗣至今不絶者有隠行也又曰往古之時四極廢九州裂水浩漾而不息於是女媧積蘆灰以止淫太平御覽卷五十九
