body:
  text: 太平御覽卷八百五十一宋李昉等撰飲食部九糉䉽䭔糉晉書曰廣州刺史盧循遣使遺劉裕益智糉子裕答以續命湯宋書曰後魏太武至彭城求酒及甘橘張暢宣孝武帝㫖致螺盤雜糉南土所珎齊書曰范雲永明十年使魏魏人李彪宣命至雲所甚見稱美彪為設甘蔗黄糉隨盡復益彪謂曰范散騎少儉之一盡不可復得梁書曰張纉初往雍州資産悉留江陵性既貪婪南中貲賄盈積及死湘東王皆使收之書二萬卷並連環珎寳財貸悉付庫以糉宻之屬還其家風土記曰俗以菰葉褁黍米以淳濃灰汁煮之令爛熟於五月五日及夏至日啖之一名糉一名角黍盖取隂陽尚相褁未分散之時像也續齊諧記曰屈原以五月五日投汨羅而死楚人哀之每至此日取竹筒貯米投水以祭之漢書曰建武中長沙區廻白日忽見士人自稱三閭大夫謂迴曰君當見祭甚苦但常年所遺俱為蛟龍所竊今君恵可以練樹葉塞其上以綵絲纒縛之此二物蛟龍所憚也廻謹依㫖今世人五日作糉并帯練葉及五綵絲皆汨羅之遺風䉽宋書曰文帝崩郭原平號慟日食麥䉽一枚如此五日人曰誰非王臣何獨如此原平泣而答曰吾家見異先朝䝉褒賛之賞不能報恩私心感慟耳齊書曰衡陽王鈞年五歳所生樞貴人病便知慘悴左右依常以五色䬳飴之不肯食曰須待姨差又曰虞悰少以孝聞父病不欲見人雖子弟亦不得前時悰年十二三晝夜伏户外問内豎消息未知輙嗚咽流涕如此者百餘日及亡終䘮唯日食麥䉽二枚南史曰沈仲陳武帝時兼起部尚書監起太極殿恒卧布袍芒履以麻䋲為𢃄又嚢麥䉽以噉范汪祠制曰仲夏薦角黍䉽夏統别𫝊注曰蘝初生合米𢷬作䉽䭔埤蒼曰䭔膏䭔也笑林曰南方人至京師者人戒之曰汝得物唯食慎勿問主人入門内見馬屎便食之覺臭乃止後詣貴官為設䭔因視曰戒故昔且當勿食時鏡新書曰粔籹宻餌即糖䭔龍山食有糖䭔菊酒太平御覽卷八百五十一
  hash: sha256:90c1ba812f2ffbc4dd5f21516cab773a43d435842b10a687f8cd3b95c21aa2f8
