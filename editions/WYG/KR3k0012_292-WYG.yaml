body:
  text: 太平御覽卷二百九十二宋李昉等撰兵部二十三用間用間孫子曰興師十萬出師千里百姓之費公家之奉日費千金内外騷動不得操事者七十萬家相守數年以爭一日之勝是故明王聖主賢君勝將所以動而勝人成功出於衆者先知不可取於神鬼不可像於事類不可騐於事度不可以行事度也必取於人知敵之情也因人也故用間有五因間内間反間死間生間五間俱起莫知其道是謂神紀人君之寶也用時任五間也因間者因其鄉人而用之也因敵鄉人知敵表􅂻虛實之情故就而用之可使伺候内間者因其官人而用之者也因在官失職者若刑戮之子孫與受罰之家也因其有隙就而用之也反間者因其敵間而用之者也敵使間來視我我知之因厚賂重許反使為我間也蕭世淳曰言敵使人來候我佯不知而示以虛事前却期㑹使歸相語是故曰反間也死間者為誑事於外令吾間知之而待於敵間也作詐誑之事於外佯漏泄之使吾間知之吾間至敵中為敵所得必以誑事輸敵從而備之吾所行不然間則死矣又一云敵間來間以我誑事而持歸然皆非所圖也二間皆不能知幽隠深宻故曰死間也蕭世誠云所獲敵人及已叛軍有重罪繫者故貸免相􅃯勿泄佯為不宻令敵間竊聞之吾因縱之亡亡必歸敵必信焉往必死故曰死間也生間者反報者也擇已有賢才智謀能自開通於敵之親貴察其動静知其事訃彼所為已知其實還報是曰生間也故三軍之親莫親於間若不親撫重以祿賞則反為敵用泄吾情實也賞莫厚於間厚賞之賴其用事莫宻於間間事不宻則為己害非聖智不能用間非仁義不能使間不能得間人之用也非微宻者不能得間之實精微用意宻不泄漏微哉微哉無所不無間也間事不發而先聞其間者與所告者皆死凡軍之所欲擊所欲擊之軍城之所欲攻所欲攻之城人之所欲殺欲殺之人必先知其守將左右謁者門者舍人之姓名守有官職任者謁告也主告事者也門者守門者也舍人守舍之人也必先知之為親舊有急即呼之則不見訶止亦因以知敵之情令吾間必索知之敵間之來間我者因以利𨗳而舍之舍居止也令吾人遺以重利復導而舍止之可令詭其辭故反間可得而用也反能取敵之間為用因是而知之故因間内間可得而使也因反敵間而知敵情因間内間者皆可得使也因是而知之故死間為誑事可使告敵因是可得而攻也因誑事而知敵情生間往反可使知其敵之腹心所在因是而知之故生間可使如期五間之事主必知之人主當知五間之用厚其祿豐其財知之必在於反間故反間不可不厚也反間者五間之本事之要也故當尤厚待之殷之興也伊摯在夏伊尹周之興也吕牙在殷吕望故惟明主賢將能以上智為間者必成大功此兵之要三軍所恃而動者也已上注出通典左傳曰楚師伐宋九月不服將去宋楚大夫申叔時曰築室反耕者宋必聽命楚子從之築室於宋分兵於田示無去志王從其言宋人懼使華元夜入楚師登子反之牀起之曰寡君使元以病告兵法因其鄉人而用之必先知其故將左右謁者門者舍人之姓名因而利導之華元蓋用此術得以自通曰敝邑易子而食析骸而爨然城下之盟有以國敝不能從也寧以國敝不從城下盟去城三十里惟命是聽子反懼與之盟而告楚子退三十里宋及楚平華元若不因間若不用諜无由得入楚軍也又曰楚師伐鄭鄭人將奔楚師夜遁諜告曰楚幕有烏乃止禮記曰晉人之覘宋者反報於晉侯曰陽門之介夫死而子罕哭之哀而民説殆不可伐也從之戰國䇿曰鄭武公欲伐胡先以其子妻胡因問羣臣曰吾欲用兵誰可伐者大夫關其思曰胡可武公怒而戮之曰胡兄弟之國子言伐之何也胡君聞之以鄭為親已而不備鄭鄭襲胡取之此用死間之法又曰燕昭王以樂毅為將破齊七十餘城及惠王立與樂毅有隙齊將田單乃縱反間於燕宣言曰齊王已死城不拔者二耳樂毅畏誅而不敢歸以伐齊為名實欲連兵南面王齊若騎刼早為將則即墨殘矣燕王以為然使騎刼代毅燕人士卒離心單又縱反間曰吾懼燕人掘吾城外冢墓僇先人燕軍從之即墨人激怒請戰大敗燕師所亡七十餘城悉復之僇與戮同又曰秦師圍趙閼與音餘趙將趙奢救之去趙國都三十里不進秦間來奢進食遣之食音寺間以報秦將以為奢師怯弱而止不行奢乃隨而卷甲趨秦西擊破之斯則反用彼間又曰秦與趙兵相距長平趙孝成王使亷頗為將固壁不戰秦數挑戰亷頗不出秦之間言曰秦之所患獨畏馬服趙奢之子為將耳趙王信秦之間因以奢子為將終為秦將白起所敗史記曰楚漢相持未决勝負陳平言於漢王曰彼項王有骨鯁之臣似亞父范増鍾離昧龍且周殷之屬昧音秣且子閭切不過數人耳大王誠能出捐數萬斤金行反間間其君臣以疑其心項王為人意忌信䜛必内相誅漢因舉兵攻之破楚必矣漢王然之乃出黄金四萬斤與平恣所為不問出入平既多以金縱反間於楚軍宣言諸將鍾離昧等為項王將功多矣然終不得裂地而王欲與漢為一滅項氏分王其地項王果疑之使使至漢漢王為太牢具舉進見楚使舉鼎俎而來也即佯驚曰吾以為亞父使乃項王使也復持去更以惡草具進楚使去肉更草萊之具使歸具以報項王項王果大疑亞父亞父欲急擊下滎陽城項王不信不肯聽亞父聞項王疑之乃大怒曰天下事大定矣君王自為之願賜骸骨歸未至彭城疽發背而死疽癰病也音干余切漢遣紀信詐降而漢王宵遁終滅項羽羽不悟反間而亡也又曰漢使酈食其説齊王田廣廣捨兵與酈生縱酒漢將韓信因齊無備襲齊破之田廣烹食其此偶成韓信用死間之勢又曰漢高帝被匈奴單于冐頓圍於白登乃使間厚遺閼氏乃謂冐頓曰兩主不相困今得漢地而單于終非能居之也且漢王亦有神單于察之冐頓乃解圍之一角於是高帝令士皆持滿傅矢外鄉從解角直出境與大軍合而冐頓遂引兵而去又曰高祖紀曰上問豨將皆故賈人也上曰吾知所以與之乃以金㗖將豨將多降者陳豨也後漢書曰西域將兵長史班超發于闐諸國兵擊莎車龜兹國揚言兵少不敵罷散乃隂縱生口歸以告龜兹王喜而不虞超即潛勒兵馳莎車營大破降之斯亦同死間之勢晉書曰益州牧羅尚遣將隗伯攻蜀賊李雄於郫城未有勝負雄乃募武都人朴泰鞭之見血使譎羅尚欲為内應以火為期尚信之悉出精兵遣隗伯等率兵從泰擊雄雄將李驤於道設伏泰以長梯倚城而舉火伯軍見火起皆争緣梯泰又以繩汲上尚軍百餘人皆斬之雄因放兵内外擊之大破尚軍此用内間之勢又曰劉曜逼長安復圍北城太守麴昌遣使求救於麴充充率歩騎赴之去城數十里賊繞城放火烟塵蔽天反間麴充曰郡城已䧟焚燒向盡軍無及矣充信之衆懼而潰後數日麴昌突圍赴長安北城遂䧟崔鴻十六國春秋曰後梁吕光將吕延伐乞伏乾歸大敗之乾歸乃縱反間稱衆潰東奔成紀延信而追之延司馬耿稚曰告者視高而色動必有姦計不可從相遇戰敗死之魏書曰陸俟擊蓋吳於杏城大敗之獲吳二叔諸將請送京師俟獨不許曰吳一身藏竄非其親信誰能獲之若停十萬之衆以追一人非上䇿也不如私許吳叔免其妻子使自追吳擒之必也諸將咸曰今來討賊既破之獲其二叔惟吳一人何所復至俟曰吳之恃逆本自天性今若獲免必誑惑愚人稱王者不死妄相扇動為患必大遂遣吳二叔與之期吳叔不至諸將皆咎於俟俟曰此未得其便可必不背他日果斬吳以至皆如所言俟之明畧皆此類也通典曰東魏將段琛據宜陽遣將牛道恒扇誘邊人西魏將韋孝寛拒之遣諜人訪獲道恒手跡令善書者偽作道恒與孝寛書寓歸欵之意又為烙燼燒迹若火下書者還令諜人遺之於琛營琛得書果疑之道所經畧皆不見用孝寛知其離沮因出竒兵掩襲擒道恒及琛等崤澠遂潰又曰東魏將軍齊神武率兵趨沙苑西魏大將周文帝遣將達奚武覘之武從三騎皆衣敵人衣服至日暮去營數百歩下馬潛聽得其軍號因上馬厯營若警夜者有不如法者往往撻之具知敵之情狀以告周文又曰高齊斛律光字明月為當時名將後周將韋孝寛守玉壁今絳郡稷山縣忌光英勇孝寛叅軍曲嚴頗知卜筮謂孝寛曰來年齊朝必大相殺戮孝寛因令嚴作謡言令間諜漏其文於齊曰百升飛上天明月照長安又曰高山不推自崩槲樹不扶自竪祖珽因續之曰盲老公上下斧饒舌老母不得語令小兒歌之於路穆提婆聞之以告其母陸令萱令萱以饒舌斥已也陸令萱即後主乳母盲老公謂祖珽也遂相與協謀令以謡言啓後主誅光周武帝聞之遂大赦境内始有滅齊之志竟平其國唐書曰黄州總管周法明率兵擊輔公祏遇張善安阻兵夏口法明屯荆口鎮登戰艦與所親飲酒善安遣刺客數人詐為漁者乘輕舟而至見者不以為虞遂殺法明而去又曰衛國公李靖伐突厥頡利可汗以唐儉先在突厥結和親突厥遂不備靖因掩擊破之亦以唐儉為死間之勢衛公兵法曰夫戰之取勝此豈求之於天地在乎因人以成之厯觀古人之用間其妙非一也即有間其君者有間其親者有間其賢者有間其能者有間其助者有間其隣好者有間其左右者有間其縱横者故子貢史廖陳軫蘇秦張儀范雎等皆憑此術而成功也且間之道有五焉有因其邑人使潛自察而致詞焉有因其事故洩虛假令告示焉有因敵之使矯使其事而反之焉有審擇賢能覘彼向背虛實而歸説之焉有佯緩罪戾微漏我偽情浮計使死報之焉凡此五間皆須隠秘重之以賞始可行焉若敵有寵嬖任以腹心者我當使間遺其珍玩恣其所欲順而謗誘之敵有重臣失勢不滿其志者我則啗以厚利詭相親附採其情實而致之敵有親貴左右多詞誇誕好論利害者我則使間曲情遵奉厚遺珍寶揣其所間而反間之敵若使聘於我我則稽留其使令人與之共處矯致殷勤偽相親暱朝夕慰論倍供珍味觀其辭色而察之仍旦暮令使獨與己伴居我乃遣聰耳者潛於複壁中聽所間使既遲違恐彼怪責必是竊論心事我知事計遣而用之且夫用間以間人人亦用間以間巳巳以宻往人以宻來理須獨察於心叅㑹於事則不失矣若敵使人來欲探我虛實察我動靜覘我事計而行其間者我當佯為不覺舍而厚利善飯之微以我言誑事示以前却期㑹即我之所須為彼之失者因其有間而返間之彼若將我虛而以為實即我承其弊而得其志矣夫水所以濟舟舟亦因水而覆沒間所以能成功亦憑間而傾敗若束髪事主當朝正色忠以盡節信以竭誠不詭狀以自容不權宜以為利雖有善間其可用乎太平御覽卷二百九十二
