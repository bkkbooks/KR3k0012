body:
  text: 太平御覧巻八百二十八宋李昉等撰資産部八屠酟盧肆店附賣買駔儈屠周禮地官下曰凡屠歛其皮角䈥骨入于玉府以當税歛作噐也史記曰魏公子無忌請朱亥奪晋鄙軍亥笑曰臣乃市井鼔刀屠者公子親数存之所以不報謝者小禮無所用今乃臣效命之秋也又曰淮隂屠中少年有侮韓信者曰汝雖長大好𢃄刀中情怯耳又曰樊噲少以屠狗為事東觀漢記曰閔仲叔客居安邑老病家貧不能買肉日買一片猪肝屠者不肯為斷王隐晉書曰愍懐太子令人屠肉自己分手齊揣輕重斤兩不差公曰其母本屠家女南史曰王敬則少時屠狗商販遍於三吳後為吳興太守入烏程從市過見屠者析肉歎曰是我少時在此作也召故人飲酒叙平生不以屠也蕭子顯齊書曰帝於芳樂苑立市大官每旦進酒肉雜肴使宫人屠酤周書曰太祖嘗逰上黨有市屠壯徤衆多畏憚太祖氣凌之常醉命屠進几割肉小不如意叱之屠袒其胸謂太祖曰爾豪則刺我太祖即剚其腹市人駭觀報之屬吏李繼韜惜而逸之孔叢子曰子髙謂齊王曰昔臣嘗行臨淄市見屠商焉身修八尺髯如㦸市易之男女未有敬之者無徳故也莊子曰楚昭王謂司馬子綦曰屠羊説居處卑職陳義甚髙子為我延之以三旌之位説曰夫三旌之位吾知其貴於屠羊之肆萬鍾之禄吾知其富於屠羊之利然豈可貪爵禄使吾君有妄施之名願復反屠羊之肆遂不受也又曰朱泙漫學屠龍於支離益單千金之家技成而無所用尉繚子曰太公望行年七十屠牛朝歌尸子曰屠者割肉則知牛長少又曰宋人有公斂皮者適市反呼曰公斂皮屠者􅃍收其皮燕丹子曰荆軻與武陽入秦過陽翟軻買肉争輕重屠者辱軻武陽欲撃軻止之淮南子曰命屠而烹其肉或以酸或以甘劑和萬方其本一牛之體也又曰屠牛坦一朝觧九牛而刃可以剃毛庖丁為刃十九年刃如新砥硎庖丁又砥磨也何則逰乎衆虛之門賈誼書曰屠牛坦一朝觧十二牛而芒刃不頓剥割皆中理鹽鐵論曰騏􅂹輓車垂頭於太行之坂屠者脫之桓譚論曰関東鄙語曰人聞長安樂出門西向笑知肉味美則對屠門而大嚼三輔舊事曰太上皇不樂関中思慕鄉里髙祖徙豐沛屠兒賣餅商人立為新豐縣故多小人又曰更始遣将軍李松攻王莽屠兒賣餅者皆従之屠兒杜虞手殺莽凉州異物志曰大秦之國斷首去軀操両刀屠人杜夷幽求曰齊宣王見屠宰羊哀其旡罪以豕代之得咸集曰屠牛酤酒鑿錢作錫皆有損害酤毛詩鹿鳴伐木曰有酒湑我無酒酤我論語鄉黨曰沽酒市脯不食漢書曰武帝天漢三年初𣙜酒酤後漢書曰琅琊海曲吕母家素豐資産数百萬乃益醸醇酒買刀劒衣服少年来沽者皆賖與之視其乏困輒假衣裳不問多少又曰劉寛嘗坐遣蒼頭市酒迂久大醉而還客不堪之罵曰畜産寛須臾遣人視奴疑必自殺顧左右曰此人也罵言畜産辱孰甚焉故吾懼其死也又曰崔寔初父卒剽買田宅起冢塋立碑頌葬訖資産竭盡困窘因以酤醸販鬻為業時人多以譏之寔不之改亦取足而已不致盈餘吴志曰潘璋字文珪性博蕩嗜酒居貧好奢酤債家至門輙言後豪富相還宋書曰吏部尚書度仰文當令奴酤酒利其十百後魏書曰鄭羲為西兖州刺吏多所受納政以賄成性又嗇恡人有禮餉者不與杯酒臠肉西門受羊酒東酤賣之唐書曰建中三年初㩁酒天下悉令官醸斛収直三千米雖賤不得减二十委州縣綜領醨簿私醸罪有差以京師王者都特免其㩁又曰元和十四年湖州刺史李應奏先官酟酒代百姓納摧歳月既乆為弊滋深伏望許令百姓自酤取登舊額仍舊兩稅隨貫均出依舊倒折納輕貨送上都許㩁酒錢舊皆隨两税徴衆户自貞元以来近有進奉故上言百姓因弊納輕不允請置官坊酤以代之既得請則􅃊設酒法困之人舉手觸禁而官収厚利以濟其私為害之日乆矣及應詔奉罷議者謂宰臣能因一州之請推為天下之法則其弊革矣韓子曰宋有酤酒者升概甚平遇客甚美為酒甚美懸旗甚髙然而酒酸不售怪其故問所知問長者楊青楊青曰汝狗猛也狗猛也何故不售曰人長焉或令孺子懐錢契壺往酤而狗迎齕之酒所以酸而不售夫國亦有狗猛迎而齕之士懐其術而徃欲以明萬乘之主臣為狗猛迎而齕之如此則主所以蔽士所以不用也賈誼新書曰鄒穆公視民如子及死酤家不售酒童子不謳歌列仙𫝊曰酒客者梁市上酒家客也作酒常美日售萬錢有過主人逐之主人酒更酸敗遂至貧窮又曰女乆者陳留酟酒婦也作酒甚美遇仙人過飲以素書五巻為質乆開書乃飬性交接之術乆要與諸少年飲酒與宿止行文書法顔色更好二十時仙人後遇過之笑曰盜道無師有翅不飛遂追仙人去木植樂府歌曰市肉取肥酤酒取醇交觴接盃以致慇勤盧漢書曰司馬相如與卓文君馳居成都家徒四壁立文君乆之不樂謂長卿曰苐歸臨邛從昆弟假貸聊足以為生何至自苦如此相如與俱之臨邛盡賣車騎買酒舎乃令文君當盧盧酒也又曰霍光秉政廣漢事光及薨後廣漢為京兆尹心知微指發長安吏自將與俱至光子禹第直突入其門搜索私屠酤推破盧罌又曰魯匡曰今絶天下之酒則無以行禮相飬放而亡限費財傷民請法古令官作酒以千五百石為一率関一盧以賣如淳曰酒家関四得客設酒盧故以盧名肆臣瓉案盧酒瓮世説曰阮公見酒家婦有美色當盧酤酒阮與王安豐常從婦飲酒既醉便眠其婦側夫始殊疑之伺察終無他意又曰王濬冲為尚書令着公服乘軺車經黄公酒盧下過顧謂後車曰昔吾與􅄞叔夜阮嗣宗共酧飲於此竹林之逰亦預其末自􅄞生阮公亡以来便為時所羈紲今日視此雖近邈若山河南史曰謝幾卿性通脫㑹意便行不拘朝憲常預樂逰苑宴不得醉而還因詣道邉酒盧停車褰幔與車前三騶對飲時觀者如堵卿處之自若肆周禮天官内宰之職曰凡建國佐后立市設其次置其叙正其肆地官下曰肆長各掌其肆之政令陳其貨賄名相近者相逺也實相近者相邇也而平正之左傳襄三十年曰伯有死於羊肆羊肆市列子産禭之枕之股而哭之斂而殯諸伯有之臣在市側者既而葬諸斗城論語曰百工居肆以成其事君子學以致其道續漢書曰孝􅂕皇帝於後宫與人列肆販賣使偷盗争闘上視以為樂謝承後漢書曰郭泰㧞申屠子陵於漆工之中嘉許偉康於屠酤之肆袁山松後漢書曰世祖令盆子賞甚厚以為趙王郎中後以疾失明賜均輸官地以為列使食税於其身晋中興徴祥説曰孝宗世㑹稽王輔政於府内園中穿池築山山池之間䖏䖏有女婢沽酒賣肉于其中道子將見幸乗船至酒肆輙携入肆買肉状如㕓以為笑樂梁書曰吕僧珎為南兖州刺史從兄子先以販葱為業僧珍至乃棄業求州官僧珍曰吾荷國㤙重無以報效汝等固有常分豈可妄求叨越當速反葱肆耳皇甫謐髙士𫝊曰許劭名知人歴客舍則知虞求賢入酒肆則㧞楚子照晋令曰坐盧使者皆不得宿肆上殷氏世𫝊曰盖寛字元柞河南鄭㢘始出寒賤未知名寛見而竒之廉父嘗居肆乃就拜其父於市衆皆驚由是顕名位至司徒楚辭曰連蕙若以為佩過暴肆而失香張衡西京賦曰彼肆人之男女䴡靡奢于許史繁欽嘲應徳璉文曰應温徳云昔與季叔才俱到富波飲於酒肆日暮留宿主人有飬女年十五肥頭赤面形似鮮卑偶悦之夜與通姦便住足下荘子曰曽不如早索我於枯魚之肆揚子法言曰如書不能要諸仲尼肆也李軌註曰賣書市書不經非書也語林曰王仲祖少有三逹覽鏡自翫曰王開山那生此兒又酷貧帽敝自以形美乃入帽肆就帽嫗戱乃得新帽店世説曰阮修字宣子常步行一百錢挂杖頭至酒店便獨酌酣暢崔豹古今註曰店置也以置貨鬻之物賣買周禮地官下曰泉府掌以市之征布斂市之不售貨之滯於民用者以其賈之物揭而書之以待不時而買者買者各從其抵都鄙從其主國人郊人從其有司然後予之又曰司市掌市之治教以量度成賈而徵儥儥買也物有定價則買者来也以質劑結信而止訟質劑謂兩書札而别之也以賈民禁偽而除詐以賈民為之者知物之情偽與寔詐以刑罰禁虣而去盗以泉府同而歛賖凡㑹同師役市司帥賈師而從治其市政掌其賣儥之事儥買也㑹同師役必市者大衆所在来物以備之質人掌成市之貨賄人民牛馬兵器珍異凡賣儥者質劑焉大市以質小市以劑鄭𤣥曰質劑月平價凡質大賈劑小賈𤣥謂質劑者為之劵書藏之也又曰賈師凡國之賣儥各帥禮記曲禮曰君子雖貧不鬻祭器左𫝊昭公二年公在乾侯平子每嵗賈馬具從者之衣履而歸之乎乾侯公執歸馬者賣之乃不歸馬史記曰子貢既學於仲尼退而仕衛鬻財於齊魯之間戰國策曰燕王見郭隗曰齊因孤國之亂而襲破燕何如對曰古之人君有以千金求千里馬者三年不得涓人請求之曰得千里馬馬已死五百金買其骨反以報君大怒對曰死馬尚市况生馬乎期年千里馬至者三漢書曰漢興接秦之弊諸侯並起民失作業而大饑饉米石五千人相食死者過半髙祖令民無得賣子就食蜀漢天下既定民無盖藏蘇林曰無物可盖藏又曰衛青比年出撃胡賦税既不足以奉戰士有司請令民得買爵及贖禁錮免贓罪請置賞官名曰武功爵級七十萬又曰桑𢎞羊置平凖於京師受天下委輸工官治車諸器皆仰給大農大農諸官盡籠天下之貨物貴則賣之賤則買之而富啇大賈無所牟大利牟取又曰貢禹上書欲令近臣自諸曹侍中以上家無得私販賣者又曰中平元年初賣官自闗内侯以下至虎賁羽林入錢各有差公千萬卿五百萬東觀漢記曰光武常與朱祐皆買蜜合藥上追念之即賜祐白蜜二石問今憶與朕長安時共買蜜乎又曰郭丹從師長買繻入函谷闗乃慨然歎曰丹不乗使者車終不出闗又曰司空宋𢎞常受俸得鹽豉千斛遣諸生迎取上河令糶之鹽賤諸生不糶𢎞怒便遣及其賤悉糶賣不與民争利謝承後漢書曰靈帝數遊戱於西園令後宫綵女為客主身為商賈謝承後漢書曰張楷字公超治嚴氏春秋家貧無以為業嘗乗驢車至縣賣藥足給食輙還鄉王隐晉書曰劉宴字子真平原人少貧苦糠飯繩索作牛衣賣手䋲口誦齊書宋文濟字敬逹吳興人自賣以葬母太守謝瀹命為儒林不就又曰吳逹之義興人也嫂亡無以葬自賣為十夫客以營冡椁從祖弟敬夫妻荒年被畧賣江北逹之有田十畆賣以贖之南史曰會稽寒人陳氏有三女無男祖父母年八九十老無所知又篤隆病母不安其室遇歲饑三女相率於西湖採菱蓴更日至市貨賣未嘗戱怠鄉里稱為義門北史曰齊常景躭好經史愛翫文詞若遇新異之書慇懃求訪或復貨買不問價之貴賤必以得為期晏子春秋曰􅂕公婦人丈夫飾者國盡服之公使禁之曰女子以男飾者裂其衣斷其帯裂衣㫁𢃄相望不止公問晏子晏子曰公服之内而禁之於外猶縣牛首於門鬻馬肉於市公曰善使内勿服不還月而國人革服韓子曰楚人賣珠於鄭為木蘭之櫝薰以桂椒綴以珠玉飾以玫瑰緝以翡翠鄭人買其櫝還其珠可謂善賣櫝不可謂善鬻珠又曰宋之富貴有監止子者與人争買百金之璞因佯與而毁之負其百金而理其毁千鎰焉又曰諺所謂傭自賣哀而不售士自譽辯而不信者也又曰田修教其子田章曰主賣官爵臣賣知力故曰自恃無恃人淮南子曰郢人有鬻其母者後請於買者曰此母老矣幸善食之而無多苦也此行大不義而欲為小義也三輔决録曰五門子孫凡民之五門今有河南西四十里馮氏兄弟三人共居此作五門客舍因以為民主飬猪賣猪故民為之曰苑中三公鉅下二卿五門藿藿但聞豚聲三輔皇圖曰元始四年起明堂辟雍長安城南北為㑹市但列槐數百行而無墻屋諸生朔望㑹此市各持其郡所出貨物及經書𫝊笙磬器物相與賣買雍容揖讓或論議槐下董卓别𫝊曰吕布殺卓百姓相對欣喜抃舞皆賣家中珠瓌衣服床榻以買酒食自相慶賀長安酒肉為之踊貴漢武内𫝊曰帝先有玉杖一枝是西湖王所獻帝甚愛之崩後故以入槨其年有人於扶風郡市中買得者帝時左右侍人識之以告有司詰問云見市中一人扵巷賣之貴三十疋即催交直寔不識賣者姓名皇甫謐髙士傳曰毛公薛公皆趙人也遭戰國亂二人俱以䖏士隐於邯郸市毛公隐為博徒薛公隐為賣膠又曰韓康字伯休京兆㶚陵人常採藥名山賣於長安市口不二價三十餘年時女從賣藥康守價不與女子怒曰是韓伯休耶乃不二價康嘆曰我本避名今小女子皆知有我何用藥為乃遁㶚陵山中搜神記曰南陽宗定伯少年夜行逢鬼鬼問為誰定伯欺云我亦鬼遂為共侣赴宛行極困相擔問鬼曰畏何物曰唯不喜人唾欲至宛便担鬼着酒瓮上經詣市鬼化為羊恐其變並唾之賣得錢千五百晋後記曰成都王圍京邑城中魚肉無出營巷賣死驢馬肉雜死人肉賣之車頻秦書曰王猛攻鄴慕容評拒猛而恒賣水與軍人思為亂猛因得敗之周景式廬山記曰山有康皇廟廟有銅馬一枚道士丁𤣥真取擲之澗中經宿復還丁乃賣與逺村人買者盡病即送還悉愈列仙𫝊曰安期生琅琊阜鄉人賣藥海邉秦始皇請見與語三日三夜賜金璧數千萬風俗通曰夜糴俗記市買者當清旦而行日中交易所有夕時便罷無人也今乃夜糴糓明癡騃不足也凡斬不施惠者曰夜糴傅子曰􅂕帝牓門官崔烈入錢五百萬取司徒語林曰蘇峻新平帑藏空猶餘數千端麤練王公謂諸公曰國家凋敝貢御不至但恐賣練不售吾當與諸賢各製練服之數日間賣遂大售端至一金應􅇵新詩曰大官有餘厨大小無不賣豈徒脯與糗醯醢及鹽䜴劉超譲表曰臣家理應用一純牛連市素不如意外廐猥牛中有任用者臣請以正陌三萬錢五疋布乞以買此牛詔曰監此不足賣與宜便賜之然義與前後辭譲不忘受一賜令亦必復不受可聼如所啟駔儈説文曰駔馬儈也漢書曰子代金錢千貫節儈駔儈合㑹二家交易者駔者其首率也駔至即切儈貢外切後漢書曰吴漢字子顔貧給事縣為亭長王莽末以賔客犯法乃亡命至漁陽資用乏以販馬為業續漢書曰平原王君公以将道深曉隂陽懐徳滅行和光同塵不為皎皎之操王莽世退身儈牛自給有似蜀之嚴君平搜神記曰羊公字雍伯雒陽人本以儈賣為業性孝父母葬無終山遂家焉晋令曰儈駔者皆當著巾白帖額題所儈駔者及姓名一足着白履一足着黒履淮南子曰叚干木晋國之大駔駔市儈也而為文侯師太平御覧巻八百二十八
