body:
  text: 太平御覽卷三百八十二宋李昉等撰人事部二十三醜丈夫醜婦人醜丈夫釋名曰醜臭也如臭穢也說文音􅃖酉反可惡也又曰丈十尺也從手而持十尺也又曰夫從一大象人形也一象簮形冠而既簮人二十而冠成人也故成人曰丈夫尚書曰洪範六極五曰惡孔安國曰醜陋也毛詩曰不見子都乃見狂且注曰狂且狂醜之人左傳曰賈大夫貌惡娶妻而美三年不言不笑御以如皋射雉獲之其妻始笑又曰叔向適鄭鬷蔑惡惡醜貌也欲觀叔向從使之收器者而往立扵堂下一言而善叔向將飲酒聞之曰必􅞭明也下執其手而上曰昔賈大夫惡娶妻三年不言不笑如皋射雉獲之其妻始笑而言賈大夫曰才之不可以已我之不能射汝遂不言不笑夫今子少不颺言貌醜不發揚子若無言吾㡬失子又曰宋華元為植廵功植將主也城者曰睅其目皤其腹睅出目皤大腹廣雅曰仳倠媒婄儓􅤵䫪䫂噅睢頦顝䫏醜也仳鼻之切倠尖遺切婄音陪儓音臺􅤵浦比反䫪差丈反䫂丁可切噅許為切睢音皆頦古來切顝音骨䫏音欺家語曰髙柴字子羔長不滿六尺狀貌甚惡為人篤學知名孔氏之門仕為郕宰又曰耗土之人醜史記曰秦相蔡澤魋顔蹙頞頞鼻莖也又曰澹臺㓕明字子羽狀貌甚惡欲事孔子孔子以為材薄既而受業退而修行行不由徑非公事不見卿大夫南逰至江弟子三百人從之設取予去就名施乎諸侯孔子聞之曰吾以言取人失之宰予以貌取人失之子羽漢書曰田蚡孝景帝皇后同母弟也辯有口學盤盂諸書為人貌寢而貴又曰詔求能為韓詩者蔡羲召見恱之擢為光禄大夫代楊敞為相時年八十餘短小無鬚眉貌似老嫗行歩僂傴常使挾乃行范曄後漢書曰周舉字宣光汝南人也姿貌短陋而博學東觀漢記曰永平中徴承宫為博士遷左中郎數納忠諫論議切直名播匈奴時單于遣使求欲得見宫詔勑宫自整飭宫對曰夷狄炫名非實識也臣狀醜不可以示逺冝選長大威容者帝乃以大鴻臚魏應代之魏志曰管輅容貌醜無威儀言語不擇非類又曰王粲字仲宣山陽髙平人也年十七荆州依劉表表以粲貌寢而體通脫不甚重也晋書曰孫秀尚河東公主形陋短小奴僕之下者也又曰左思貌醜而口訥又曰張孟𤾉每出人惡之輒擲瓦礫盈車王隠晋書曰劉伶字伯倫長六尺貌甚醜悴常携一壺酒使人荷鍤自隨以為死便埋孫嚴宋書曰桓䕶之字彦宗少倜儻不拘小節形狀短陋而氣幹強果又曰少帝㓜而狷急輕佻險迅細形黄貌色長頸鳥啄嘶聲齊書曰張融形貌短醜精神清徹王敬則見融革帶寛謂曰革帶太急融曰既非歩吏急帶何為又曰蕭垣之肥黒無鬚語聲嘶時人號為蕭瘂剛狠専執羣小畏而憎之崔鴻十六國春秋前趙録曰郭汜字子逰上郡人也父士為縣卒隨巫而遇一女子扵路巫曰此女生貴子君亦有貴子可相納之當興君門士納之生汜長不滿七尺醜極當時朴訥無慧後為縣卒感憤逰學師事安平趙孔曜曜見而偉之曰此生有公骨其當貴逹又曰前秦録曰苻雄字元才趙建武帝拜龍驤將軍貌醜頭大而足短故軍稱為大頭龍驤又曰徐成純直亮素為王猛所知長不滿六尺醜極當時又車頻秦書曰苻堅六嵗戲扵路司𨽻徐統見而異焉問曰苻郎此官街小兒戯不畏縳耶答曰吏縳犯事者不縳小兒戱統語左右曰此兒有王覇相左右曰此兒狀貌甚醜而君以為相貴異何也統曰非爾等所及知也南史曰劉韞人才凡鄙為明帝所寵在湘州雍州使善畵者圖其形出行鹵簿羽儀常自披翫甞以圖示征西將軍蔡興宗戯之陽若不觧畵者指韞形問之曰此何人韞曰是我其庸劣類如此北史曰後魏廣陵侯衍弟欽中書監尚書右僕射儀同三司欽色尤黒故時人號為黒面僕射唐書曰李輔國本名靜忠形小貌陋頗知書計髙力士見之收在左右與諸奴為伍年四十餘矣為小宦掌廐中文帳後遷至封成國公也又曰蘇世長容貌醜陋頗有學識性滑稽言雜諧調隋大業中為都水使者煬帝甞謂之曰卿面何類駏驢世長再拜鳴呼以手據地蹙項敗面為駏驢之狀羣臣掩口而笑煬帝大恱賜帛百疋又曰貞觀十年文徳皇帝崩百官衰絰率更令歐陽詢狀貌醜異衆或指之許敬宗見而大笑為御史所劾左授洪州都督周史曰慕容彦超吐渾部人也父亮以彦超貴累贈至三公彦超即漢髙祖之同産弟也甞冐姓閻氏體黒面胡故謂之閻崑崙莊子曰厲人夜半生子其父取火視之恐其似已也厲醜人也又曰魯哀公問仲尼衛有惡人焉曰哀駘佗丈夫之與處者思不能去也婦人之請扵父母曰與為人妻寜為夫子妾者十數而未止也是必有以異乎人也寡人召而觀之果以惡駭天下又曰支離疏者頤隠扵臍肩髙扵頂㑹撮指天五官在上兩髀為脅也孫卿子曰衛靈公有臣曰公孫吕身長七尺面長三尺而廣三寸名動天下孔藂子曰子髙見齊王齊王問誰可為臨淄宰稱管穆焉王曰管穆容貌醜陋民不敬也答曰夫見敬在徳且臣所稱其能也君不聞晏子乎長不滿六尺面貌醜惡齊王上下莫不崇焉以穆體形方之猶賢之逺矣王乃以管穆為臨淄宰也尸子曰禹長頸烏喙面目顔色亦惡矣天下獨賢之吕氏春秋曰陳有惡人曰敦洽犨麋椎顙色如漆也又曰列精子髙徳行扵齊湣王所敬著布衣白縞冠㑹朝歩堂下謂侍者曰我好醜何如侍者曰公艷出而窺井歎曰惡丈夫也人之阿齊王實不良而言良亦其我之侍者也周裴汝南先賢傳曰周爕字彦祖斂頤折頞貌甚醜母欲不舉其父曰吾聞諸聖賢人狀皆有異扵人興我宗者必此兒遂育之梁兾别傳曰子嗣為河南尹嗣一名胡狗時年十六容貌甚陋不勝冠帶道路見者莫不􅅓笑焉司馬徽别傳曰劉琮欲候徽先使左右問其存亡徽鋤園左右問馬君所徽曰我是徽頭面醜陋問者罵之曰即欲求司馬公何等田奴而稱徽更刷頭餙服而出左右叩頭而謝之續搜神記曰桓大司馬從南州來拜簡文皇帝陵問左右商涓形貌有人答涓為肥短黒色形甚醜公云吾見之亦如此意惡之還州遂病無㡬而薨謝綽宋拾遺記曰何尚之顔延年少年好為嘲調二人並短小常謂顔公為猴顔亦以何為猴常共逰戯西池顔問路人云二人誰似猴路人指何曰彼似猴耳君乃真猴也束晳發䝉記曰醜男鬷蔑醜女離春世説曰王廣取諸葛誕女入室言語始交王語婦曰神色果下殊不似公休婦曰大丈夫令婦入比蹤英傑崔駰慱徒論曰慱徒見農夫戴笠持耨以芸蓼荼面色驪黒手足駢胝膚如桑朴足如熊蹄蒲伏壠畆汗出調泥乃謂曰子觸熱耕芸背上生鹽脛如燒椽皮如領革錐不能穿行歩狼䟦蹄戾脛酸謂子草木支體屈伸謂子禽獸形容似人何受命之薄禀性不純桓譚新論曰余甞與郎令喜出見一老翁糞上拾食頭面垢醜不可忍視喜曰安知此非神仙余曰道必形體如此無以道為風俗通曰齊有一女二家求之其家語其女曰汝欲東家則左袒欲西家則右袒其女兩袒父母問其故對曰願東家食而西家息以東家富而醜西家貧而美也新序曰齊有田巴先生行修扵外王聞其賢聘之將問政焉田巴先生改製新衣拂餙冠帶顧謂其妾妾曰姣將出門問其從者從者曰姣過臨淄水自照視醜惡甚焉遂見齊王齊王問政對曰今者大王召臣臣問妾妾愛臣諛臣曰姣問從者從者畏臣諛臣曰姣臣至臨淄水而觀然後知醜惡也今王察之齊國治矣㑹稽録曰任奕字安和句章人也為人貌寢無威儀劉謚之龎郎賦曰其頭也則中絡而上下銳額平而承枕四起繁欽三胡賦曰莎車之胡黄目深精員耳狹頤康居之胡焦頭折頞髙輔䧟鼻眼無黒眸頰無餘肉􅄢賔之胡面象炙蝟頂如持嚢隅目赤眥洞頞仰鼻朱彦時黒兒賦曰世有非常人實惟彼𤣥士禀茲至緇色内外皆相似卧如驪牛眠立如烏牛跱忿如鸜鵒鬭樂似鸕鷥喜醜婦人周易曰老婦士夫亦可醜也韓詩外傅曰齊王厚送女欲妻屠門肚肚辭以疾其友觀之曰子孫死腥臭之肆而已乎何以辭之肚應曰其女醜其友曰何謂也肚曰吾肉善如量而去若少耳吾肉不善雖以他附益之尚猶不售今厚送子子醜故耳其友下問女果醜目如劈杏齒如編􅈉東觀漢記曰梁鴻同郡孟氏其女名光狀貌醜而黒力能舉石臼擇而不嫁至年三十鴻聞而聘之王隠晋書曰武帝為太子納妃媒久不决上欲娶衛瓘女楊后欲娶賈充女上曰衛公女有五可賈公女有五不可衛家種賢而多子端正而長白賈家種妬而少子醜而短黒也唐書曰張萬福典泗州時遇徳宗幸奉天李希烈反陳少逰悉令管内刺史送妻子楊州以為質萬福獨不肯送謂使者曰為某白相公萬福妻老且醜不足煩相公意獨不送又曰中宗好與朝臣狎戯韋庶人㣲時有一乳母實蠻婢也既老且醜齒落髪秃制扵後宫列花燭嫁為御史大夫竇懐貞妻俗謂乳母之聓曰阿􅃒懐貞每進表狀列其官位必曰國遮欣然有自負之色莊子曰陽子之宋宿扵逆旅逆旅人有妾二人其一人美其一人惡惡者貴而美者賤陽子問其故逆旅小子對曰美者自美吾不知其美也陽子曰弟子記之行賢而去自賢之行安往而不愛哉郭子曰許允婦是阮徳如妹竒醜交禮竟許永無復入理桓範勸之曰阮家醜女與卿故當有意冝察之許便入見婦即出捉裙裾停之許謂婦曰婦有四徳卿有㡬答曰新婦所乏唯容士有百行君有其㡬許曰皆備婦曰君好色不好徳何謂皆備許有慙色遂雅相重劉向列女傳曰齊孤逐女者其狀甚醜三逐扵鄉五逐扵里過時無所容乃造㐮王之門而求見王輟食而起謹敬左右曰三逐扵鄉者不忠五逐扵里者少禮何足為遽王曰子不識也夫牛鳴而馬不應者異類故也其人必有異者遂見與之語而嘉之又曰齊宿瘤者東都採桑之女閔王之后也閔王宣王子也項有大瘤故號曰宿瘤初閔王逰至東郭百姓盡觀宿瘤女採桑如故王召問曰寡人出逰車騎甚衆百姓無長少弃事來觀汝不視何也對曰妾受父母教採桑不受教觀大王曰此女也惜其宿瘤女曰中心何靖宿瘤何傷王大恱曰此賢女也命後車載之女曰女不受父母之教而隨大王是奔女也王大慙曰寡人失之貞女一禮不備雖死不從及歸遣使奉禮加金百鎰聘迎之父母驚惶欲洗沐為衣裳女曰變容更服恐見不識扵是如故隨使者閔王歸見諸夫人告曰今日出逰得一聖女及至諸夫人見者大笑王曰未餙耳餙與不餙相去十百女曰餙與不餙相去千萬不足言何獨十百也王曰何以對曰昔者堯舜桀紂俱為天子堯舜安扵節儉茅茨不剪採椽不斵後宫衣不曵地食不重味至今數千嵗天下歸善桀紂不自餙仁義為髙臺榭深池澤後宫蹈綺縠弄珠玉身死國亡為天下笑至今千餘嵗天下歸惡由是觀之飾與不飾相去千萬閔王大感立以為后期月之間化行隣國諸侯朝之侵三晋懼秦楚立帝號及女死燕遂屠齊又曰齊鍾離春者齊無鹽邑之女鍾離姓春名也其為人極醜無雙臼頭深目長壯大節卭鼻結喉頂上少髪折腰出胸皮膚若漆行年三十無所容入行嫁不售流弃莫執扵是乃拂拭短褐自詣宣王願乞一見謁者曰妾齊之不售女也聞大王之聖願備後宫之掃除頓首司馬門外謁者以聞宣王方置酒扵漸臺左右聞之莫不掩口而笑王曰此天下強顔女子也乃召見之謂曰昔先王為寡人娶妃匹皆以備有列位者今夫人不容鄉里布衣而欲干萬乘之主有何異乎鍾離春曰竊慕大王之美義耳王曰然何善曰常善隱王曰試一行之言未卒忽不見王大驚立發隠書而讀之人不能觧明日復召之但揚目含齒舉手拊膝曰殆哉如此者四齊王曰願聞命對曰今大王之國西有横秦之患南有強楚之讟外有二國之難内聚奸臣衆人不附春秋四十年壯男不立故不務衆子而務衆婦尊所好而忽所持一旦山陵崩墜社稷不定此一殆也漸臺五層黄金白玉琅玕翠羽萬人疲極此二殆也賢者伏匿扵山林謟諛强行扵左右邪偽立扵本朝不得通入此三殆也酒漿流湎以夜繼晝女樂俳優縱横大笑外不修諸侯之禮内不康國家之理此四殆也王闇然無聲喟然而嘆曰痛乎無鹽君之言扵是立壊漸臺罷女樂退謟諛去彫琢選兵馬實府庫闢四門招進直言卜擇吉日立太子拜無鹽君以為王后齊國大安皆醜女之力也習鑿齒㐮陽記曰黄丞彦沔南名士也謂諸葛孔明曰君擇婦否有醜女黄頭黒色而才堪相配孔明許焉即載送之時人為笑樂鄉里為之嗟曰莫作孔明擇婦正得阿丞醜女束晢發䝉記曰醜男鬷蔑醜女鍾離春通俗文曰不媚曰㜅音畜可惡曰嬒烏㑹反大醜曰㚠呼交反醜稱曰娭鳥在反何承天纂文曰嫫母醜人也楚辭曰西施媞媞而不得見兮嫫母勃屑而日侍又曰圭璋雜扵甑室隴㢘與孟陬同宫舉世以為常俗固將愁苦而終窮劉思真醜婦賦曰才質陋且儉姿容劇嫫母鹿頭獼猴面椎額復出口折頞靨樓鼻兩眼䫜一交切如臼膚如老桑皮耳如側兩手宋玉登徒子好色賦曰登徒子妻蓬頭攣耳齞脣厯齒旁行傴僂又疥且痔太平御覽卷三百八十二
