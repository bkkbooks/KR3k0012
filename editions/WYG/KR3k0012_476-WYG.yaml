  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_476-1a, image: WYG0897/WYG0897-0331a.png}
body:
  text: 太平御覽卷四百七十六宋李昉等撰人事部一百十七施惠上周易曰見龍在田德施普也雲行雨施天下平也周禮曰小司徒以歲時廵國野而賙萬人之艱阨以王命施惠左傳曰冬晉荐饑使乞糴于秦秦伯謂子桑曰與諸乎對曰重施而不報其民必携携而討焉無衆必敗謂百里奚曰與諸乎對曰天災流行國家代有救災恤隣道也行道有福是以輸粟于晉自雍及絳相繼命之曰汎舟之役又曰晉侯逆秦師使韓簡視師復曰師少於我鬭士倍我公曰何故對曰出因其資入用其寵饑食其粟三施無報是以來也又曰宋公子鮑禮於國人宋饑竭其粟而貸之年七十以上無不饋詒也時加羞珍異無日不數於六鄉之門國之賢人無不事也親自桓以下無不恤也公子鮑美而艶襄夫人欲通之鮑嫡祖母而不可乃助之施又曰鄭子皮即位於是鄭饑而未及麥民病子皮以子展之命餼國人粟户一鍾是以得鄭國之民故罕氏常掌國政以為上卿又曰楚子伐蕭申公巫臣曰師人多寒王廵三軍拊而勉之三軍之士皆如挾纊又曰晉公子重耳及曹僖負覊之妻曰吾觀晉公子從者皆足以相公子必反其國若反其國必得志於諸侯而誅無禮曹其首也子盍早自貳焉乃饋盤飡置璧焉公子受飡反璧又曰子西曰昔闔廬有國天有災厲親廵孤寡而供其乏困在軍熟食者分而後敢食語曰子華使於齊冉子為其母請粟子曰與之釜請益曰與之庾冉子與之粟五秉子曰赤之適齊也乘肥馬衣輕裘吾聞之君子周急不繼富史記曰范蠡之陶修産積居十九年中三致千金再散分與貧交及昆弟此謂好行其德者也又曰田常以大斗出貸以小斗取齊人歌之曰嫗乎採芑歸乎田成子又曰蘇秦為從約長并相六國北報趙王乃行過雒陽周顯王使人郊勞於是蘇秦散千金以賜宗族貧乏漢書曰韓信釣於城下諸母漂漂水擊絮為漂有一母見信饑飯信竟漂數十日信謂漂母曰吾必重報母怒曰大丈夫不能自食吾哀王孫而進食蘇林曰猶言公子也豈望報乎又漢書呉楚反竇嬰為大將軍賜金千斤嬰言袁盎欒布諸名將賢士在家者進之所賜金陳廊廡下軍吏過輙令財取為用蘇林曰自令裁取為用金無入家者又曰李廣厯七郡太守前後四十年得賞賜輙分其麾下飲食與士卒共之家無餘財終不言生産事又漢曰樓䕶字君卿為諫議大夫使郡國䕶乃多持幣帛至齊上書求上先人冢因㑹宗族人親踈各與以束帛一日散百金之費使還奏事稱㫖擢天水太守又漢書韋𤣥成字少翁以父任為郎少好學脩父業尤謙遜下士出遇相識歩行輙下從者與載送以為常其接人貧賤者益敬由是名譽日廣以明經擢為諫議大夫遷大河都尉又漢書張臨安世曽孫亦謙儉每登閣殿常歎曰桑霍為我戒豈不厚且死分施宗族故舊薄葬不起墳又曰蘇武為右曹典屬國所得賞賜盡以施與昆弟故人又曰朱邑為人惇篤於故舊以愛和為行居處儉節禄賜以供九族鄉黨家無餘財後漢書曰趙典兄子温字子恭初為京兆郡丞歎曰丈夫當雄飛安能雌伏遂弃官去遭歳大饑散家糧以賑窮餓所活萬餘人後漢書劉詡字子相潁川人家世豐産常能周施而不有其惠嘗行於汝南界中有陳國張季禮逺赴師䘮遇寒水車毁頓滯道路詡見而下車與之不告姓名自策馬去季禮意其子相也後以故至潁川還所假乘詡閉門辭謝不與相見後黄巾賊起郡縣饑荒詡救給乏絶資糧者數百人又逢知故困餒於路不忍委去因殺所駕牛以救之衆人止之詡曰視没不救非志也遂俱餓死後漢書折豫字伯式廣漢雒人父國有資財二億家僮八百人豫㓜有仁心不殺昆蟲不折萌芽能通京氏易好黄老言及國卒感多藏厚亡之義乃􅄆金帛資産周施親踈自知亡日召賔客飲食辭訣忽然而終又曰廖扶逆知歳荒乃聚榖數千斛悉用以給宗族姻親又殮葬遭疫死亡不能自收者常居先人冡側未曽入城市人因號為北郭先生袁宏後漢書曰种暠字景伯父為定陶令有財三千萬父卒暠皆以賑鄉里貧賤者其進趨名利者皆不與交通東觀漢記曰劉宏收恤故舊無所失父所厚同郡郎中王臨年老貧乏宏常居業給足乞與衣裘與馬施之終竟後漢書馬援少年處邊郡田牧至有牛馬羊數千頭榖數萬斛既而嘆曰凡殖貨財産貴能施賑也否則守錢虜耳乃盡散以頒昆弟故舊又曰崔駰學於大學而糧盡鄧衛尉欲餼焉而未果李彦九嵗以其父命往見衛尉曰施不必豐期於救乏崔生臣父之執也不幸而貧公謂賑之有日矣嘉貺未至或欲豐之然後乃致之乎若曰家物少湏租入是猶古人欲决江海以救牛蹄之類也鄧公曰諾又曰鄧綝字叔孫西羗反破郡縣上乃拜綝謁者屯田三輔臨發之日啟千金之産分與兄弟甥舅親族各有差品又曰朱暉建初四年南陽大饑米石千錢初同縣張堪有名德每與相見常接以友道暉以堪宿望成名未敢安也堪至把暉臂欲以妻子託朱朱暉舉手不敢答後堪仕至蜀郡漁陽太守物故暉自為臨淮太守後遂絶不復相聞南陽饑時聞堪妻子貧窮暉乃自往候視困厄分所有以賑之又曰王丹字仲回京兆人王莾時連徴不至家累千金隱居養志周急施惠後漢書冦恂經明行脩名重朝廷所得秩俸盡施朋友故人及所從吏士常曰吾因士大夫以致此其獨享之乎時人歸其長者以為有宰相器又曰竇固乆厯大位甚見尊貴而性謙儉愛人好施士以此稱之又曰梁商年饑榖貴民餒輙遣蒼頭去幘著巾車載米鹽菜錢於四城門與貧乏不語主人知其施德布恩絶不望報匿名隱譽皆此類也司馬彪續漢書曰郭伋字細侯并州牧徴為太中大夫宅一區及帷帳錢榖伋輙散與宗親九族無遺餘又曰張純字奮少好學節儉行義每分捐租奉貽䘏宗親雖至匱而施與不怠又曰伏湛字惠公更始元年拜為平原太守遭倉卒兵起莫不驚擾而湛獨安然教授謂妻子曰一榖不升國君徹膳今人皆饑奈何獨飽且食麄糲盡分俸禄以賑活鄉里來客者百餘家司馬彪續漢書曰獻帝初百姓饑荒張儉資計差温乃傾竭財産與邑里共之頼其存者以百數又曰肅宗崩廉范奔訃敬陵時廬江郡掾嚴麟奉章俱㑹於路麟乘小車塗深馬死不能自進范見而愍然㑹從騎下馬與之不告而去麟事畢不知馬所歸乃沿路訪之或謂麟曰故蜀郡太守廉叔度好周人窮今奔國䘮獨是耳麟亦素聞范名以為然即牽馬造門謝而歸之世服其義魏志曰楊俊字秀才以兵亂方起而河内處四逹之衢必為戰塲乃扶老弱去詣京雒間同行者百餘家俊賑濟貧乏通共有無宗族知故為人所畧作奴僕者凡六家俊皆傾財贖之魚豢魏畧曰趙熹字伯陽為平原太守百官大㑹光武問熹在郡何如咸稱熹政有跡時親家諸夫人皆㑹㑹罷諸夫人言熹篤義多恩從長安還䕶妾等衣食生活使得蒙今日之富貴非獨能臨人也呉志曰魯肅字子敬大散財貨標賣田地以賑窮弊結士為務甚得鄉邑歡心周瑜為居巢長將數百人故過候肅并求資糧肅家有兩囷米各三千斛肅乃指一囷與瑜瑜益知其竒也遂相親結定僑札之分又曰朱據字子範呉郡人有姿貌膂力絶人又能論難黄武初拜徴五官中郎權遷建業㨿尚在拜左將軍封雲陽侯謙虛接士輕財好施呉志曰駱公緖時年八嵗與親客歸㑹稽事嫡母甚謹時饑荒多有困乏公緒為之飲食衰少其姊仁愛有行寡居無子見甚哀之數問其故公緒曰士大夫糟糠不足我亦何必獨飽姊曰誠如是何不告我而自苦若此乃自以私粟與公緒又以告母亦賢之遂使分施由是顯名晉書曰郗鍳時所在饑荒州中之士素有感其恩義者相與資贍鑒復分所得以恤宗族鄉曲孤老頼而全濟者甚多又曰紀瞻少與陸機兄弟親善及機被誅瞻恤其家周至及嫁女資送同於所生王隱晉書曰潘最字元茂值年荒部曲之家徤兒渠帥皆素服重名共相率送迎道路所在為儲以供行資最隨主人多少口率均分無有尊卑優劣若所賦已盡偶有不足則推己之分以周未遍父老有頌之曰且貴且富有南山之夀吾仍得與潘元茂又曰恩不可忘無如我潘郎晉中興書曰應詹以孝稱年十餘嵗祖父母亡家富於財而詹年稚弱乃請宗中單貧者與共為居弱冠知名大宰何邵見而稱之曰質文之士也晉紀曰祖逖梗概有大志年十五不知書輕財好施每見諸田舎輙稱兄意散帛以是嘉焉太平御覽卷四百七十六
