  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_635-1a, image: WYG0898/WYG0898-0677c.png}
body:
  text: 太平御覽卷六百三十五宋李昉等撰刑法部一叙刑上易䝉卦曰初六發䝉利用刑人象曰利用刑人以正法也刑人之道道所惡也以正法制故刑人也又豫卦曰順以動豫聖人以順動則刑罰清而民服又噬嗑卦曰噬嗑亨利用獄噬齧也嗑合也凡物之不親由有間也物之不齊由有過也有間與過齧而合之所以通也刑克以通獄之利也象曰雷電噬嗑先王以明罰勅法又豐卦象曰雷電皆至豐君子以折獄致刑文明以動不失情理也尚書舜典曰象以典刑象法也法用常刑用不越法流宥五刑宥寛也以流放之法寛五刑鞭作官刑以鞭為治官事之刑朴作教刑朴榎楚也不勤道業則撻之金作贖刑金黄金誤而入刑出金以贖罪𤯝災肆赦怙終賊刑𤯝過也災害也肆緩也賊殺也過而有害當緩赦之怙姧自終當刑殺之欽哉欽哉惟刑之恤哉舜陳典刑之義勅天下使敬之憂欲得中又舜典曰帝曰臯陶蠻夷猾夏冦賊姦宄猾亂也夏華夏羣行攻刼曰冦殺人曰賊在外曰姦在内曰宄言無教之致汝作士五刑有服士治獄官也五刑墨劓剕宫大辟服從也言刑得輕重中正之法也五服三就既從五刑謂服罪也行刑當就三處大罪於原野大夫于朝士于市五流有宅五宅三居謂不忍加刑則流放之若四㓙則有五刑之流各有所居五居之差有三等之居大罪四裔次九州之外次千里之外也惟明克允言臯陶能明信五刑施之逺近蠻夷猾夏使咸信服無敢犯之又大禹謨曰帝曰臯陶惟兹臣庶罔或干予正無有干我正言順耳汝作士明于五刑以弼五教期于予治弼輔也期當也歎其能以刑輔教當於治體刑期于無刑民協於中時乃功懋哉雖或行刑以殺止殺終無犯者刑期於無所刑民皆合於大中之道是汝之功勉之臯陶曰帝徳罔愆臨下以簡御衆以寛罰無及嗣賞延于世宥過無大刑故無小罪疑惟輕功疑惟重刑疑附輕賞疑從重忠厚之至與其殺不辜寧失不經好生之徳洽於民心兹用不犯于有司辜罪也經常也司主也臯陶因帝勉已遂稱帝之徳所以明民不犯上也寕失不常之罪不犯無辜仁愛之道又臯陶謨曰天討有罪五刑五用哉言天以五刑罰有罪用五刑宜必當又吕刑曰穆王訓夏贖刑吕侯以穆王命作書訓示夏禹贖刑之法更從輕以布告天下作吕刑甫刑後為甫侯故或稱甫刑惟吕命王享國百年耄荒言吕侯見命為卿時穆王以享國百年耄亂荒忽穆王即位過四十矣言百年大期雖老而能用賢以揚名度作刑以詰四方度時世所宜訓作贖刑以治天下四方之民尚書大傳曰子張曰堯舜之王一人刑而天下治何則教誠而愛深也今一夫而被此五刑子龍子曰未可謂能為書二人俱罪吕侯之説刑也被此五刑喻犯數罪也孔子曰不然也五刑有此教教然耳犯數罪猶以上一罪刑之又曰子夏曰昔者三王慤然欲錯刑遂罰錯處也遂行也平心而應之和然後行之然且曰吾意者以不平慮之乎吾意者以不和平之乎如此者三然後行之此之謂慎罰又曰孔子曰古之刑者省之今之刑者繁之其教古者有禮然後有刑是以刑省也今也反是無禮而齊之以刑是以繁也書曰伯夷降典折民惟刑謂有禮然後有刑也又曰兹殷罰有倫今也反是諸侯不同聴毎君異法聴議獄也聴無有倫是故法之難也又曰有過赦小罪勿增大罪勿纍延罪無辜曰纍老弱不受刑有過不受罰故老而受刑謂之悖弱者受之不克不赦有過謂之賊詩小雅曰菀栁刺幽王也暴虐無親而刑罰不中也詩含神霧曰􅂱􅂱震電不寜不令此應刑政之大暴故震電驚人使天下不安周禮地官上大司徒曰以鄉八刑糾萬民一曰不孝之刑二曰不睦之刑三曰不婣之刑四曰不悌之刑五曰不任之刑六曰不恤之刑七曰造言之刑八曰亂民之刑糾猶審察也不悌不敬兄師長也造言訛言惑衆亂民亂名改作執左道以亂政也任謂朋友相任也恤謂相愛又地官下司市掌市刑小刑憲罰中刑狥罰大刑朴罰其附於刑者歸于士狥舉以示其地之衆也朴撻也國君過市則刑人赦夫人過市罰一幕世子過市罰一帟命夫過市罰一蓋命婦過市罰一帷謂諸侯及夫人世子過其國之市大夫内子過其都之市也市者人所交利而行刑之處君子無故不逰觀焉若逰觀則施恵以為說又曰秋官上曰大司冦掌建邦之三典以佐王刑邦國詰四方典法也詰謹也書曰穆王耄荒度作詳刑以詰四方也一曰刑新國用輕典新國新辟地立君之國也用輕法者為其民之未習於教二曰刑平國用中典平國承平守成之國用中典常行之法三曰刑亂國用重典亂國簒殺叛逆之國用重典者以其化惡伐滅之也以五刑糾萬民一曰野刑上功糾力功農功力勤力也二曰軍刑上命糾守命將命也守不失部伍也三曰鄉刑上徳糾孝徳六徳也善事父母為孝也四曰官刑上能糾職能能其事也職職事修理也五曰國刑上愿糾暴愿慤慎也暴當為恭字之悮也禮曰刑不上大夫禮不下庶人又曰九十曰耄七年曰悼悼與耄雖有罪不加刑焉又曰刑者侀也刑者成也一成而不可變故君子盡心焉傳曰先君周公作誓命曰毁則為賊掩賊為藏竊藏為盗盗器為奸主藏之名頼奸之用為大㓙徳有常無赦在九刑不忘誓命以下皆九刑之書又曰晉侯之弟陽干亂行於曲梁行陳曲梁地名魏絳戮其僕僕御晉侯怒謂羊舌赤曰合諸侯以為榮陽干為戮何辱如之必殺魏絳對曰絳無二志事君不避難雖有罪不迯刑其將来辭何辱命焉言終魏絳至又曰聲子謂楚令尹子木曰善為國者賞不僣而刑不濫賞潜則懼及淫人刑濫則懼及善人若不幸而過寜僣無濫與其失善寜其利淫無善人則國從之從之亡也古之治民者勸賞而畏刑恤民而不倦賞以春夏刑以秋冬是以將賞為之加膳加膳則飫賜以此知其勸賞也將刑為之不舉不舉則徹樂以此知其畏刑也又曰初景公欲更晏子之宅曰子之宅近市湫隘囂塵湫下隘小囂聲塵土請更諸爽塏者爽明塏燥辭曰君之先臣容焉先臣晏子之先人臣不足以嗣之於臣侈矣公笑曰子近市識貴賤乎對曰既利之敢不識乎公曰何貴何賤於是景公繁於刑有鬻踊者故對曰踊貴屨賤景公為是省於刑君子曰仁人之言其利溥哉晏子一言而齊侯省刑又曰鄭人鑄刑書鑄刑書于鼎以為國之常法叔向使詒子産書曰昔先王議事以制不為刑辟懼民之有争心也夏有亂政而作禹刑商有亂政而作湯刑夏商之亂著禹湯之法言不能議事以制周有亂政而作九刑周之衰亦為刑書謂之九刑三辟之興皆叔世也言刑書不起于明盛之世今吾子相鄭國作封洫立謗政制參辟鑄刑書制參辟謂用三代之末法将以靖民不亦難乎又曰為刑罰威獄使民畏忌以類其震曜殺戮雷電震曜天之威也刑獄以象類之論語曰道之以政齊之以刑民免而無恥又曰禮樂不興則刑罰不中刑罰不中則民無所措手足孝經曰五刑之屬三千而罪莫大於不孝家語曰閔子騫問政於孔子子曰以徳以法夫徳法者御民之具猶御馬之有銜勒也君者人也吏者轡也刑者䇿也夫人君之政執其轡䇿而已子騫曰敢問古之為政孔子曰古者天子以内史為左右手以徳法為銜勒以百官為轡以刑罰為策以萬民為馬故御天下數百年而不失也又曰有父子訟者孔子同狴執之三月不别其父請止夫子赦焉曰上失其道獄犴不治不可刑也書曰義刑義殺勿庸以即汝心三尺之限空車不能登者何峻故也百仞之山重載陟焉則陵遲故也俗之陵遲久矣雖有刑法人能勿踰乎國語曰臧文仲曰大刑用甲兵次刑用斧鉞中刑用刀鋸薄刑用鞭朴以威民也孔叢子曰仲弓問古之刑教孔子曰古之刑教省今之刑教繁古者教有禮然後有刑是以刑省今無禮以教而齊之以刑是以刑繁史記曰胡亥立以趙髙為郎中令令便變律有罪者相坐收族又羣盗起胡亥責李斯斯懼上書請行督責刑者相半其後趙髙譛斯具五刑腰斬夷三族又曰申不􅊣韓非好刑名法術之學以為儒者以文亂法俠者以武犯禁漢書刑法志曰古人有言曰天生五材民並用之廢一不可鞭朴不可弛於家刑罰不可廢於國征伐不可偃於天下用之有本末行之有順逆耳又曰孝武即位徵發煩數百姓貧窮民被酷吏擊斷奸宄不勝於是招進張湯趙禹之屬修定法令又曰古之知法者能省刑本也今之知法者不失有罪末矣上下相驅以刻為明深者獲公名平者多後患諺曰鬻棺者欲嵗之疫非憎人欲殺之利在於人死又曰貢禹上言孝文皇帝時貴亷潔賤貪汚賈人贅壻及吏坐贓者皆禁錮不得為吏無贖罪之法令行禁止海内大化武帝始臨天下尊賢用士開地廣境自見功大遂縱嗜慾迺行一切之變使犯法者贖罪入穀者補吏是以官亂民貧盗賊並起又曰文帝制人有已論其父母妻子同坐之及收孥律令宜除之孥子也秦法一冇罪并收其家也罪疑者與人從輕斷之於是刑罰大省斷獄四百又曰秦始皇専任刑罰躬操文墨晝斷獄夜理書又曰于定國為廷尉季秋後請讞時上常幸宣室齋居決事刑獄號平反反音畨又曰董仲舒云陽為徳隂為刑陽常居大夏而以生育養長為事隂常居大冬而積於虛空不用之處以此見天心之任徳不任刑也又曰秦用商鞅之法毁帝王之道刑戮妄行人不聊生迯亡山野並為盗賊斷獄一嵗八十萬數又曰刑法志曰古人有言滿堂飲酒有一人向隅而泣則一堂不樂王者之於天下猶一堂之上也一人不得平為之悽愴今郡國被刑或寃死者多此和氣所以未洽者也原夫獄刑所以蕃者書曰伯夷降典折民惟刑言伯夷下禮法以道人人習知禮然後用刑也言制禮以止刑猶隄之防溢水也今隄防陵遲禮制未立死刑過制生刑易犯飢寒並至窮斯濫溢豪傑擅私為之囊槖言容隠姦邪若囊槖盛物姦邪所隠則狃而寖廣狃串習也寖漸狃音女九切後漢書曰光武留心庶獄然自王莽後舊章不存法網弛縱無以懲肅梁統上疏曰臣愚以為刑罰在衷無取於輕是以五帝有流殛放殺之誅三王有大辟刻肌之刑所以為除奸也髙帝定法傳之後代遭世康平因時施恩去肉刑相坐之法天下幾平武帝值中國全盛征伐逺方百姓罷敝豪傑犯禁姦吏弄法故重首匿之科著知從之律宣帝履要道以御海内臣下奉憲不失繩墨天下稱安孝元孝哀即位日淺丞相王嘉等猥以數年之間虧除先帝舊約成律數百餘事臣取其尤妨政者條奏伏惟擇其善而從之以定不易之典時廷尉議以為崇刑峻法非明王急務遂罷之又曰梁綂對尚書問議刑曰聖帝明王制立刑罰故雖堯舜之盛猶誅四㓙經曰天討有罪五刑五用哉又曰爰制百姓于刑之衷孔子曰刑罰不中則民無所措手足措置也衷之為言不輕不重之謂也春秋之誅不避親戚所以防患救亂全安衆庶豈無仁愛之恩貴絶殘賊之路也又曰郎顗上書言今立春之後火卦用事當温而寒違返時節由功賞不至而刑罰不加也宜湏立秋順氣行罰太平御覽卷六百三十五
