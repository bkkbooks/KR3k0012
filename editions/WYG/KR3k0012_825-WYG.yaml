body:
  text: 太平御覽巻八百二十五宋李昉等撰資産部五蠶繰繀車籰絡車柅機杼梭蠶周禮天官下内宰曰中春詔后帥外内命婦治蠶于北郊以為祭服夏官馬質曰馬質掌質馬禁原蠶禮記月令曰季春曰是月也命有司無伐桑柘乃修蠶器后妃齊戒享先蠶而躬桑以勸蠶事又孟夏曰是月也蠶事既登后妃獻繭乃收繭税以桑為均貴賤長幼如一以給郊廟之服檀弓曰成人有其兄死而不為衰者聞子臯将為成宰遂為衰成人曰蠶則績而蠏有匡范則冠而蝉有緌兄則死而子臯為之衰祭義曰古者天子諸侯必有公桑蠶室近川而為之築宫仞有三尺棘墻自外閉之及大昕之朝君皮弁素積卜三宫之夫人世婦之吉者使入蠶室奉種浴於川桑於公桑風戾以食之嵗既單矣世婦卒蠶奉繭以示于君遂獻繭于夫人祭統曰是故天子親耕于南郊以供齊盛王后蠶于北郊以供純服諸侯耕于東郊以供齊盛夫人蠶于北郊以供冕服天子諸侯非莫耕也王后夫人非莫蠶也春秋文耀鉤曰商絃絶蠶合絲春秋考異郵曰蠶陽者火火惡水故食不飲桑者土之液木生火故蠶以三月食葉類㑹精合相食爾雅曰蛾羅􅅙蛾螝蛹音龜􅅙蛹蟓桑繭讎由樗繭食樗葉棘繭食棘葉欒繭食欒葉蚢蕭繭食蕭葉史記天官書曰正月上甲風從東方來宜蠶續漢書曰光武建武二年野蠶成繭民收其絮輿服志曰貴人助蠶瑇瑁簮釵珥東觀漢記曰明徳馬皇后置織室蠶於濯龍宫中數往來觀内以為娛樂謝承後漢書曰南陽范克為吳桂陽太守教民植桑絺紵之屬飬蠶織履民得利益吳録曰南陽郡一嵗蠶八織後魏書曰世宗正始二年徐州蠶蛾吃人尫殘者一百一十餘人死者二十二人時髙肇專政聚歛不息隋書曰江湖之南一年蠶四五熟唐書曰武徳中梁州言野蠶成繭百姓採而用之又曰文徳太后率内外命婦有事於親蠶又曰開元中上命宫中食蠶親自臨視欲使嬪御已下知女工之事及蠶罷獲絲甚多因而以賜焉又曰天寶中益州獻三熟蠶白淨與常蠶不殊又曰大厯中太原府清源縣人韓景暉飬冬蠶成繭詔給復終身韓子曰鱓似虵蠶似蠋人見虵驚駭見蠋則毛起而漁者持鱓婦人拾蠶利之所在皆賁育也淮南子曰季春后妃齊戒東鄉親桑省婦使勸蠶事又曰蠶食而不飲三十日而化又曰食桑者有絲而蛾又曰蠶食而不飲又曰蠶餌絲而商弦絶淮南萬畢術曰白芳七結浴蠶又曰僵蠶使馬不食抱朴子曰始以藥粉桑長蠶蠶得十月不死金樓子曰楊泉賦序曰古人作賦者多矣而獨不賦蠶乃為蠶賦是何言與楚蘭陵荀况有蠶賦近不見之有文不如無述也東方朔别𫝊曰武帝求神仙朔言能上天取藥上知其謾欲極其言即遣方士與朔上天朔曰當有神來迎我後方士晝卧遽口呼若極真者五從天上還方士遂以聞上以為面欺下朔獄泣曰臣幾死者再天公問臣下方何衣朔曰衣蠶蠶若何曰啄呥類馬色班班類虎天公大怒以臣為謾繫臣司空使使下問還報有之乃出臣今陛下以臣為詐願使使上問之上曰齊人多詐欲以喻我止方士也罷方士東方朔占曰正月旦竟日不風清明冝蠶列仙𫝊曰園客濟陽人姿貌好而性良邑人多以女妻之客終不娶種五色香草積數十年服食其實一旦五色蛾止其香樹末客收而薦之以布生華蠶焉時有女夜至自稱客妻客與俱蠶得繭大如甕郭子横洞冥記曰寒青之國其國人皆以烏為衣其地多有蠶色青長一丈亦曰青蠶績其絲大如指一絲可以羈絆牛馬國人常以十丈繫黄門之廐以拘馬也巨象獅子常令以此一絲繫之古今註曰和帝永元四年東莱郡東牟山有野蠶為繭收得萬餘石民人以為絲絮司馬徽别傳曰人有臨蠶求徽簇者徽便以與之自棄其蠶中華古今注曰太古時有人逺征家惟有一女并馬一疋女思父戯馬曰爾能為我迎得父吾將嫁汝馬乃絶韁而去至父所父疑家中有故乗馬而還馬後見女輙怒而奮擊父怪之宻問女女具以答父乃射殺馬曝皮於庭女至皮所足蹙之曰爾馬而欲人為婦自取屠剥何如言未竟皮蹷然起巻女而行父還失女從大樹枝得女及皮乃盡化為蠶棲於樹上其繭厚大異於常蠶隣婦取飬之其收二倍今世或謂蠶為女兒古之遺語也拾遺記曰員嶠山一名環丘有氷蠶長七寸黒色有角有鱗以霜雪覆之然後作繭長一尺其色五彩織為文錦入水不濡投火則經宿不燎海人獻堯以為黼黻家訓曰北人見錦不信有蟲食樹吐絲所成者在江南不信有千人氈帳及來河北不信有萬石舟船皆實騐也齊諧記曰正月有神降陳氏宅云我是蠶神能見祭當令蠶百倍今人正月半作餻糜為此也皇后親蠶儀注曰皇后躬桑始捋一條執筐受桑捋三條女尚書跪白曰可止執筐者以桑授蠶母蠶母以桑適蠶室也先蠶儀注曰親蠶前二日太祝令質明以少牢祠所謂先蠶也古今輿服雜事曰蠶始生后食之三灑而止三輔故事曰始皇后葬用大蠶二十箔𤣥中記曰大月支有牛名為日及今日割取其肉三四斤明日瘡愈漢人入此國見牛不知以為珍異漢人曰吾國有蟲大如小指名為蠶食桑葉為人吐絲外國人不復信有蠶也又曰化民食葉三七年化能以自裹如蠶績九年生翼十年而死去琅琊四萬里林邑記曰九真郡蠶年八熟繭小輕薄絲弱綿細永嘉郡記曰永嘉有八輩蠶蚖珍蠶三月績柘蠶四月初績蚖蠶四月績愛珎五月績愛蠶六月末績寒珍七月末績四出蠶九月初績寒蠶十月績凡蠶再熟者前輩皆謂之珍少飬之愛蠶者故蚖蠶種也蚖繭三月既績出蛾取卵七日八日便剖蠶生多飬之是謂蚖蠶欲作愛者取蚖珎之卵藏内瓮器中隨器大小亦可十紙百紙盖覆器口安冷水使冷氣折其出勢僅得三七日然後剖生飬之謂為愛珎亦愛子績成繭蛾生卵卵七日又剖成蠶多飬之此則愛蠶也顧㣲廣州記曰吳黄武三年遣交州治中吕瑜發趙嬰齊冡得金蠶明珠各數斛廣志曰有原蠶有冬蠶有野蠶有柞葉可以柞綿焦贛易林兊之坎曰飢蠶作室緒多亂􅅶端不可得又震之兊曰秋蠶不成冬種不生魚龍河圖曰蠶沙宅亥地大富得蠶絲吉利仲長子昌言曰北方寒其人夀南方暑其人夭此寒暑之方騐於人也均之蠶也寒而餓之則引日多温而飽之則用日少此寒温餓飽之為修短騐於物者也物理論曰使民主飬民如蠶母之飬蠶則其用豈徒絲而已哉雜五行書曰南舍種􅀥九株辟縣官宜蠶桑又曰二月上壬取土泥屋四角宜蠶吉吕氏本草曰石蠶一名沙蜂神農雷公鹹無毒生漢中治五淋墮胎肉解結氣利水道除熱孫卿蠶賦曰食桑而吐絲前亂而後治夏生而惡暑疾濕而惡雨蛹以為母蛾以為父三俯而起事乃大已是謂蠶理閔鴻蠶賦曰體龍頸而􅂹啄邁皦素於羔羊左思吳都賦曰國稅再熟之稻鄉貢八蠶之綿古艶歌曰日出東南隅照我秦氏樓秦氏有好女自名為羅敷羅敷善蠶桑採桑城南隅陸機詩曰老蠶晩績縮老女晩見辱曽不如老䑕翻飛成蝙蝠蔡邕書曰家祖居常言客有三當死夜半蠶時至人室家也今者一行而犯其兩􅄞康飬生論曰火蠶十八日寒蠶三十餘日裴頠崇有論曰鳥旡胃肺蛤旡五臟蛭以空中而生蠶以旡胃而育也繰禮記祭義曰古之獻繭也其率用此與及良日夫人繅三盆手遂布于三宫夫人世婦之吉者使繅遂朱緑之𤣥黄之以為黼黻文章服既成君服以事先王先公敬之至也説文曰繰繹繭出絲也尸子曰夫繭合而弗治則腐蠧而棄使女工繰之以為美錦列仙𫝊曰園客蠶得繭大如甕繰一繭數十日繰訖俱去莫知所如濟陽今有華蠶祠繀車通俗文曰織纎謂之繀受緯曰孚方言曰繀車趙魏之間謂之厯鹿車東齊海岱之間謂之道軌孫得施繀車賦曰惟工藝之多門偉英麗乎創形擬老氏之轉轂兮應天運以迴行秉轉屈以成規兮不辭勞以自傾故其用同造物功叅天地軒轅垂衣因之以濟衮冕龍旂用康上帝勲存王室惠流皂𨽻觀夫微風興於輪端霧雨散於梭輻制以靈木絡以竒竹危朝日以投員兮准暈月以造象若洪輪之在雍兮似蜘蛛之結網爾乃才藝妻妾工巧是嘉或成綿組或匹綾羅舒皓腕於輕輪兮􅀈擬景乎鏡華絲成妙於指端兮號推幽而相和象蟋蟀之鳴户兮類寒蟬之吟家籰方言曰籰榬也兖豫河濟之間謂之榬説文曰籰取絲者也或作􅀈從角間聲絡車方言曰河濟之間絡謂之格柅易垢卦曰繫於金柅通俗文曰張絲曰柅也説文曰檷絡絲檷從木爾聲讀若柅機杼毛詩國風大東曰小東大東杼軸其空字林曰女渉切機下所履史記公儀休相魯見布好出家婦燔其機列女𫝊曰河南真義者樂羊子之妻也羊子出學後得遺金一餅以與真義曰妾聞君子不以利洿行反裘負薪古人之恥樂羊子慚而去之學一年復歸真義引刀趣機曰此織生於蠶桑治於絲繭加於機杼一絲而累以至丈疋今若斷之捐棄成功稽廢日月夫子積學當日知所旡中而廢歸何異斷機哉羊子大慚復出七年不歸列子曰紀昌者學射於飛衛曰爾先學不瞑而後可言射矣紀昌歸偃卧其妻之機下以自承牽挺牽挺機躡二年之後雖未到家而不瞑也淮南子曰伯余之初作衣也伯余黄帝臣也緂麻索縷手經指柱後世為之機杼勝復以便其用𫝊子曰舊機五十綜者五十躡六十綜者六十躡馬生者天下之名巧也患其遺日喪功乃皆易以十二躡其竒異又異變用感而作王逸機賦曰舟車棟宇麄工也杵臼碓磑真巧也匜盤杆縷小用也至於織機功用大矣上自大始下訖羲皇帝軒龍躍庶業是昌俯系聖恩仰攬三光悟彼織女終日七襄爰制布帛始垂衣裳於是取衡山之孤桐南岳之洪樟勝復迴轉刻象乾形大匡淡泊擬則川平光為日月盖取昭明三軸列布上法台星兩􅂹齊首儼若將征方圓綺錯㣲妙窮竒兎耳跧伏若安若危猛犬相守竄身匿蹄髙樓䨇峙以臨清池遊魚銜餌瀺灂其陂鹿盧並起纎繳俱垂宛若星極屈膝推移爾乃乗輕杼􅄃床帷動揺多容俯仰生姿古詩曰纎纎擢素手札札弄機杼又曰皎皎白素絲織為寒女衣寒女雖巧妙不得束機杼梭通俗文曰梭織具也所以行維之鄧粲晉書曰謝鯤隣家有美女鯤挑之女以梭投之折其兩齒異苑曰陶侃嘗捕魚得一梭還挿着壁有頃雷雨變成赤龍從壁而躍太平御覽巻八百二十五
