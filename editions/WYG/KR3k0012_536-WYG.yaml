body:
  text: 太平御覽卷五百三十六宋李昉等撰禮儀部十五封禪河圖真紀鈎曰王者封泰山禪梁父易姓奉度繼興崇功者七十二君尚書中候曰維歲二月候在東舘鄭𤣥注曰維辭也候齊桓公舘舍嘆曰於戯仲父寡人聞古霸王封泰山刻石紀號立顯象今寡人名為何君管子曰衛困於狄按兵須滅乃存之仁不純名為霸君昔古聖王功成道洽符出乃封泰山今比目之魚不至鳳凰不臻麒麟遯未可以封禮記禮器曰是故因天事天天髙因髙者以事也因地事地地下因下者以事也因名山升中于天名猶大也升上也中猶成也謂巡狩至于方嶽燔柴祭天告以諸侯之成功也孝經説曰封乎泰山考績燔柴禪乎梁父刻石紀號也升中於天而鳳凰降龜龍假功成而太平隂陽氣和而致象物禮記逸禮曰三皇禪云云盛意也五帝禪云云特立於身也三王禪梁父連延不絶父死子繼也春秋漢含孳曰天子受符以辛日立號帝宰奉圖宗人共觀九日悉見後世之過方來之害以告天受符謂應期之人當起者之符代行其錄運者也曰請封禪到岱宗晝期過數告諸命封封泰山禪禪梁父孝經鈎命訣曰封乎泰山考績燔燎禪乎梁父刻石紀號煥炳巍巍教化顯著五經通義曰易姓而王太平必封泰山禪梁父何天命已為王使理羣生也或曰封以黄金為泥以銀為繩經無明文以義説之所以止封岱泰山者五嶽之長羣神之主故獨封於泰山告太平于天報羣神之功也禪梁父者泰山之攴屬能配泰山之德也史記封禪書曰齊桓公既霸㑹諸侯於葵丘而欲封禪管仲曰古者封泰山禪梁父者七十二家而夷吾所記者十有二焉昔無懷氏封泰山禪云云虙羲封泰山禪云云神農封泰山禪云云炎帝封泰山禪云云黄帝封泰山禪亭亭顓頊封泰山禪云云帝嚳封泰山禪云云堯封泰山禪云云舜封泰山禪云云禹封泰山禪㑹稽湯封泰山禪云云周成王封泰山禪社首應劭曰山名在博縣晉灼曰在鉅平南十三里也皆受命然後得封禪桓公曰寡人北伐山戎過孤竹西伐大夏過流沙束馬懸車上卑耳之山南伐至邵陵登熊耳山以望江漢兵車之㑹三而乗車之㑹六九合諸侯一匡天下諸侯莫違我者三代受命亦何以異乎於是管仲睹桓公不可窮以辭因設之以事曰古之封禪鄗上之黍北里之禾應劭曰鄗上山也鄗音曤蘇林曰鄗上百里皆地名所以為盛江淮之間一茅三􅆃所以為藉也東海致比目之魚西域致比翼之鳥然後物有不召而自至者十有五焉今鳳凰麒麟不來嘉榖不生而􅅫蒿藜秀茂鴟鴞數至而欲封禪無乃不可乎桓公乃止又曰始皇既并天下即位三年東廵狩郡縣祠鄒嶧山頌秦功業於是徴齊魯之儒生博士七十人至於泰山下或議曰古者封禪為蒲車惡傷山之土石草木掃地而祭席用葅稭言其易遵也始皇聞此議各乖異難施用由此絀儒生而遂除車道上自泰山陽至巔立石頌秦始皇帝徳明其得封也從隂道下禪於梁父其禮頗採太祝之祀雍上帝所用而封藏皆秘之世不得而記也始皇之上太山中阪遇風雨暴至休於大樹下因封其樹五大夫又曰今天子即位尤敬鬼神之祀元年漢興已六十餘嵗矣天下乂安縉紳之属皆望天子封禪改正度也而上鄉儒術招賢良趙綰王臧等以文學為公卿欲議立古明堂城南以朝諸侯草廵狩封禪改立服色事未就㑹竇太后治黄老言不好儒術諸所興為皆廢是時李少君亦以祠竈榖道却老方見上上尊之少君言上曰祠竈則致物致物而丹砂可化為黄金黄金成以為飲食器則益夀益夀而海中􅅫莱仙者乃可見見之以封禪則不死黄帝是也上與公卿諸生議封禪封禪用希曠絶莫知其儀禮而羣儒采封禪尚書周官王制之望祀射牛事上於是乃令諸儒習射牛草封禪儀羣儒既不能辯明封禪事又牽拘於詩書古文而不能騁於是上盡罷諸儒遂東幸􅚆氏禮登中嶽太室從官在山下聞若有言萬嵗云於是以三百尸封太室奉祠遂東廵海上四月還至奉髙上令諸儒及方士言封禪人人殊不經難施行天子至梁父禮祠地主乙邜令侍郎中儒者皮弁縉紳射牛行事封太山下東方如郊祀太一之禮封廣丈二尺髙九尺其下則有玊牒書書秘禮畢天子獨與侍中奉車子侯上泰山亦有封其事皆禁明日下隂道丙辰禪泰山下趾東北肅然山如祭后土禮天子皆親拜見衣上黄而盡用樂焉江淮間一茅三􅆃為神藉五色土益雜封縱逺方竒獸蜚禽及白雉諸物頗以加禮兕牛犀象之属不用皆至泰山祭后土封禪祠其夜若有光晝有白雲起封中天子從禪還坐明堂羣臣更上夀漢書曰公孫𢎞議欲放古廵狩封禪之事諸臣對者五十餘人未能有所定先是司馬相如病死有遺書頌功徳符瑞足以封泰山上竒其書以問倪寛對曰陛下躬發聖徳綂攝群臣宗祀天地薦禮百神精誠所嚮徴兆必報天地并應符瑞帝王之盛莭也宜順承天慶垂萬世之基上然之乃自制儀采儒術以文焉又郊祀志曰初上欲治明堂奉髙帝未曉其制度濟南人公玊帶上黄帝時明堂圖於是上令奉髙作明堂汶上如帶圖及是嵗修封則祠太一五帝於明堂上坐令髙皇帝祠坐對之又曰黄帝時雖封泰山然風后封鮌岐伯令黄帝封東泰山韋昭曰别有小泰山在隂一名介山臣瓉按鄭志朱虛介中有小泰山是也汾隂子推所焚故名介山也不以介為大也禪凡山合符然後不死天子既令設祠其至東泰山泰山卑小不稱其聲乃令祠官禮之而不封焉其後令帶奉祠候神物復還泰山脩五帝之禮如前而加禪祠石閭石閭者在泰山下趾南方方士言仙人閭也故上親禪焉其後五年復泰山脩封過祭恒山自封泰山後十二嵗而周徧五嶽四瀆矣後五年復至泰山脩封武帝五脩封又曰太初元年十二月禪蒿里服䖍日山名在泰山下太初三年春正月東廵海上夏四月還脩封泰山禪石閭天漢三年受計還幸北地祠常山瘞𤣥玉鄧展曰瘞理也又曰太始四年春三月甲申脩封丙戌禪石閭夏四月幸不其如淳曰其音基不其山名因以為縣祠神人於交門宫應劭曰神人蓬莱仙人之属也晉灼曰瑯琊縣有交門宫武帝所造若有嚮坐拜者作交門之歌師古曰如有神人景象嚮祠坐而拜也又曰司馬相如既病危家居茂陵天子曰相如病甚可往從悉取其書若不然後之矣使所忠往而相如已死家無遺書問其妻對曰長卿未甞有書也時時著書人又取去長卿未死時為一卷書曰有使來求當奏之其遺書劄言封禪事所忠奏焉天子異之續漢書祭志曰建武中羣臣上言即位三十年宜封禪太山詔書曰即位三十年百姓怨氣滿腹吾誰欺欺天乎曾謂泰山不如林放何事泰山汚七十二代之編錄三月上幸魯過泰山泰山守以上過故承詔祭泰山及梁父時中郎将梁松議封禪事上許松等奏乃求元封時封禪故事議封禪所施用有司奏當用方石再累治壇中皆方五尺一枚厚一尺用玊牒書藏方石牒厚五寸長尺三寸廣五寸有玊牒十枚列於方石旁東西南北各三皆長三尺廣一尺厚七寸檢中刻三處深四寸方五寸有葢檢用金縷五周以水銀和金為泥刻玊璽一方寸一分一枚方五寸石四角有趾石皆再累一枚長一丈厚一尺廣二尺皆在壇上其下用距十八枚皆髙三尺厚一尺廣二尺如小碑環壇立之去三歩距石下皆有石附入地四尺又用石碑髙三丈廣三尺五寸厚尺二寸立壇内地去壇三尺以刻書上以用石功難又欲及二月封故詔松因故封石空檢更加封而已松上䟽争之以為登封之禮今吿于皇天垂後無窮以為萬民也丞之之敬章圖書之瑞尤以顯著今因舊封竄寄故石下恐非重命之義受命中興似當特異以眀天意遂使泰山郡及魯趣石工直取完青石無五色時以印工不能刻玉牒欲用漆書之㑹求得刻玊者遂刻書書秘刻方石中令容玊牒二月上至奉髙遣御史與蘭䑓御史将工先上山刻石碑文二十二日辛邜辰燎祭天於泰山下南方羣臣皆從用樂皆如南郊諸王王者二公孔子後褒成君皆助祭在位畢将升封或曰泰山雖已從食于柴祭今親升告工宜有禮祭於是使謁者以一特牲於常祠泰山處吿祠泰山如親耕􅓔劉先農先處故食至時上御輦升山曰後山上即位於壇南北面羣臣以次陳後西上畢帝升壇尚書令奉玉牒檢皇帝以寸二分悉親封之訖太常命人發壇上石尚書令奉藏玊牒已復石復訖尚書令五寸印封石檢事畢皇帝拜羣臣稱萬嵗令人立所刻石碑乃復道下二十五日甲午禪祭地於梁隂以髙后配山川羣臣從如元始中北郊故事東觀漢記曰中元元年正月羣臣復奏言登封吿成為民報徳百里所同陛下輒距絶不許臣下不敢頌功述徳謹按河雒䜟書赤漢九世尚廵封泰山凡三十六事陛下遂以仲月令辰廵岱岳之正禮奉河雒之明文以祈靈瑞以為兆民於是許焉至泰山乃復議曰國家徳薄災異仍至圖䜟盖於此耶上東廵狩至泰山有司復奏河圖䜟記表章赤漢九世猶著明者後凡三十六事司馬彪續漢書曰河圖㑹昌符云漢大興之道在九代之王封乎泰山刻石著紀禪於梁父退省考功典畧曰建武三十年有司奏封禪詔曰災異連仍日月薄蝕百姓怨嘆而有事泰山汙七十二代編錄以羊皮雜貂裘何彊顔耶晉書禮志曰魏明帝黄初中護軍􅃽濟表曰夫帝王大禮廵狩為先昭揚祖禰封禪為首是以自古革命受符未有不蹈梁父登泰山刋無竟之名紀天人之祭者也宜下公卿廣選其禮卜年考時昭吿上帝以副天下之望帝曰聞􅃽濟斯言使吾汗流自開闢以来封禪者七十餘君耳故太史公曰雖有受命之君而功有不洽是以中間其逺者千有餘年近者數百載其儀不可得記吾何徳之脩敢庶幾乎茲豈謂世無管仲以吾有桓公登泰山之志乎吾不敢欺天也濟之所言華則華矣非助我者也公卿侍中尚書待省之而已勿有所議天子雖拒濟議而實使髙堂隆草封禪之儀以天下未一不欲便行大禮㑹隆卒不復行之魏志曰文帝聞隆没嘆曰天不欲吾成事堂生捨我亡也又曰武帝平呉混一區宇太康元年衛瓘等上表請封禪詔曰此盛徳之事所未議也又表曰唐虞三代濟世𢎞功之君莫不仰承天休俯恊人志祭員丘履梁父未有辭焉者葢不可譲也今陛下勲髙百王徳無與二茂績宏䂓巍巍之業固非臣等所能究論而聖㫖勞謙屢自抑損時至弗應推美不居闕皇代之上儀塞靈祗之疑望使大晉之典不同風於三五臣等誠不敢奉詔詔曰方當共思𢎞道以康庶績且候他年無所紛紜也沈約宋書禮志曰永平三年髙祖将掃戎狄渾一天宇㑹計洛陽秩禮名嶽羣臣且相謂曰須王振旅飲至隴朔無塵當議奏封禪脩升中之禮縉紳文者咸曰宜然自漢光武登封之後斯絶矣孫言宋書曰袁淑為吏部郎太祖元嘉二十六年大舉北討淑侍坐從容曰盛世令典廢壊已久今當鳴鑾中嶽席卷趙魏檢玊岱宗今其時也臣逄千載之㑹願上封禪書一篇使追七十二代帝曰盛徳之事何足以當之隋書志曰封禪者髙厚之位也天以髙為尊地以厚為徳增泰山之髙以報天厚梁父之基以報地也昭天之所命工成事就有益於天地若天地之更髙厚云漢光武中興聿尊其故晉宋梁齊及皆未遑其義後齊有廵狩之禮並登封之儀竟不之行也開皇十四年羣臣請封禪髙祖不納晉王又率百官抗表固請帝命有司草儀注於是牛𢎞辛彦之等創定其禮奏之帝逡廵其事曰此事體大朕何徳以堪之但當東狩因拜岱山耳十五年春幸兖州遂以岱山為壇如南郊唐書曰貞觀中房𤣥齡議曰漢建武中封禪用元封故事封太山於圜䑓上四面皆立石闕並髙五丈有方石再累藏牒書石檢十枚於四邊栝之東西各三南北各二外設石封髙九丈上加石盖周設石距十八枚如碑石状去壇三歩其下石跗入地數尺今按封禪者本以成工吿於上帝天道崇質義取醇素故藉用藁秸罇以瓦甒近代此法不在經誥又乖淳朴之道矣定議除之按梁甫湜謂梁隂近代設壇於山下乃乖處隂之義今定禪禮改壇立於山北又曰貞觀六年文武百官以初平突厥盛徳被於海内又年榖累登表封太山太宗謂侍臣曰朕每見衆議以封禪為盛事勸朕行之如朕本心但使天下太平家給人足雖闕封禪之禮亦可以比徳於堯舜昔始皇為合天心自稱皇帝登封岱宗奢侈自矜漢文竟不登封而躬行籍田刑措不用今皆稱始皇暴虐之主漢文為有徳之君以此言之無假封禪又曰髙宗麟徳二年十月司禮太常伯劉祥道䟽請封禪丁卯将封太山發自東都三拜正月戊辰朔車駕至泰山親祀昊天上帝於封祀壇以髙祖太宗配享帝升山行封禪之禮庚午禪於社首祭皇地祗以太穆太皇太后配享皇后為亞獻越國太妃燕氏為終獻辛未御降禪壇壬申御朝覲受朝賀改元乾封又曰麟徳三年登封泰山先是皇后抗表曰封禪舊儀登皇帝祗以太后昭配而皆以公卿行事詳求其理有紊徽章望以展禮之日縂率六宫内外命婦親奉奠獻從之至時遂以皇后為亞獻越國太妃燕氏為終獻帝行初獻之禮畢執事者趨下而宦者執帷皇后率六宫以升行禮祭歌帷外王公以下就位於山足帷皆用錦綉在位者瞻望或誚焉又曰永淳二年上以風眩轉加停封中岳上自東封之後皇后盛賛行中岳之禮每下詔輒年飢㓂至而罷於是嵩山之下營奉天宫以為有事之漸時有童謡曰嵩髙凡幾層不畏登不得但畏不得登及是禮物必備竟以疾加而還又曰開元登封祀昊天上帝于泰山以髙祖神堯皇帝配享上冕裘升壇奉圭璧奠獻命有司享五帝有神於山下壇禮畢上乃飲福酒中書令張説進稱天賜皇帝天乙神䇿周而復始永綏兆人帝拜稽首山上作貟䑓四階位之碱玉中金注碱祭以天下同文之印封然後焚柴燔發羣呼萬嵗傳呼從山頂至山下振動天地鑾輅還山下之齋宫有慶雲隨馬祥風遶輅中書令張説等賀上曰朕以薄徳恭膺大寳雲物休佑皆是卿輔弼之力君臣相保勉副天心長如今日不敢矜怠説等又曰聖心誠懇昨夜齋則息風收雨今朝封祀則清天日暖復有祥風助樂卿雲引燎靈跡盛事千古未聞辛卯祀皇地祗於社首之太折壇睿宗皇帝配享蔵玊册於石碱如封祀壇之儀初上登山至齋宫其夕隂雲惨烈勁風四散裂幕折柱寒氣切骨上露立祈請仰自誓曰某身有過請即降罰萬人無福亦請某為當罪應時風止天氣清晏及升壇休氣四塞登封飄然天外及禪社首五色雲見日重輪又曰開元十三年登封泰山上因問玊牒之文前代帝王何故秘之賀知章曰玉牒本是通於神明之意前代帝王祈求各異或禱年算或思神仙其事㣲宻故外人莫知之上曰朕今此行皆為蒼生祈福更無秘請宜将玊牒出示百僚其詞曰有唐天子臣某敢昭告於昊天上帝天啟李氏運興土徳髙祖太宗受命立極髙宗升中六合殷盛中宗紹復繼體不定上帝眷佑錫臣忠武底綏内難推戴聖父恭承大寳十有三年祗若天意四海晏然封祀岱岳謝成於天子孫百祿蒼生受福風俗通曰封禪必於岱宗者萬物之長如隂陽交代觸石而出膚寸而合不崇朝而遍雨天下惟泰山乎封禪之制石髙二丈刻之曰事天以禮立身以義事父以孝成民以仁四夷八蠻咸貢其職白虎通曰封禪王者易姓而起必升封泰山何教告之義也始受命之日改制應天天下太平功成封禪以吿太平也所以必於太山何萬物之所交代之處必於其上何因高告高順其類也故升封者增高也下禅梁父之山基廣厚也刻石記號者著已上之迹也天以髙為尊地以厚為徳故增太山之髙以放天附梁父之基以報地名天之所命功成事遂有益天地若髙者加髙厚者加厚矣或曰封者金泥銀繩或曰石泥金䋲封以印璽故孔子曰升太山觀易姓之王可得而數者七十餘君風俗通曰封太山禪梁父說岱宗上有金箧玊策能知人年夀脩短武帝探得十八倒讀曰八十其後果用考長桓譚新論曰太山之上有刻石凡千八百餘處而可識者知七十有二袁准正論曰封禪之言惟周官有王大封之文齊桓公欲封禪聞管仲之言止焚燎而祭天皆王者之事非諸侯所為也是以學者疑焉後秦一主漢二君脩封禪之事其制為封土方丈餘崇於太山之上皆不見於經秦漢之事未可專信管仲云禹禪㑹稽吿天則同祭地不得異也㑹稽而可禪四岳皆可封也夫洛陽者天地之所合嵩山者六合之中也今處天地之中而吿於嵩可也奚必於太山王嬰古今通論曰太山上為天門值户户為明堂聖帝受天官之宫也即位三十年功成治定則吿成於天登封太山刻石紀號張華封禪義曰臣聞肇自生民則有后辟載祀之后莫之能紀立徳濟世揚暉仁風以登封太山者七十有四家其謚號可知者十有四也晉太康地紀曰奉髙者以事東岳帝王禪代之處也故有明堂在縣西南四里漢武帝立太壇於東山以祭天示増髙也南史曰齊髙帝幸華林晏集使各効技藝褚彦回彈琵琶王僧䖍栁世隆彈瑟沈文季歌子夜張敬兒舞王儉曰臣無所解唯知誦書因跪上前誦相如封禪文上笑曰此盛徳之事吾何以堪之太平御覽卷五百三十六
