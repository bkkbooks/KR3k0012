  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_394-1a, image: WYG0896/WYG0896-0484c.png}
body:
  text: 太平御覽卷三百九十四宋李昉等撰人事部三十五行歩趨走跳蹲行易困卦曰臋無膚其行趦趄毛詩谷風曰行道遲遲中心有違遲遲舒行貌又黍離曰彼黍離離彼稷之苗行邁靡靡中心揺揺又載驅曰汶水湯湯行人彭彭又我行其野曰我行其野蔽芾其樗昏姻之故言就爾居又蟋蟀杕杜曰獨行踽踽禮記仲尼燕居曰行則有隨行而無隨則亂於塗也又玉藻曰君與尸行接武尊者尚徐蹈半迹大夫繼武迹相及也士中武迹間容迹端行頥霤如矢弁行剡剡起屨凡行容􅅥􅅥直疾貌也凡行謂道路也左傳襄五曰衛獻公使與寗喜言寗喜召蘧伯玉伯玉曰瑗不得聞君之出敢聞其入遂行従近闗出論語述而曰子曰三人行必有我師焉史記曰伍子胥曰為我謝申包胥吾日暮途逺吾故倒行而逆施之譬如人行前途尚逺日勢已暮改歩顛倒疾行何得責吾順行禮漢書曰袁盎使吴見守従史適在守盎校為司馬司馬曰君苐去臣亦且亡辟吾親君何患廼以刀决帳盎觧節旄屐歩行七十里着屐歩行而逃亡吴書曰孫䇿討山越斬其渠帥悉令左右分行逐賊獨騎與虞翻相行山中翻曰危事也令䇿下馬此草深卒有驚急馬不及人翻善用矛請在前行得平地勸䇿乘馬䇿曰卿無馬奈何答曰翻能歩行日可三百里明府試鞭馬翻能疏歩屬之東方朔别傳曰武帝問朔曰公孫丞相倪大夫等先生自規何與此哉朔曰臣觀其臿齒牙樹頬胲吐唇吻擢項頤結股肱連脽尻逶虵其迹行歩踽旅臣朔雖不肖尚兼此數子神仙傳曰黄盧子者姓葛名越年二百八十嵗行及走馬王真者上黨人也年七八十乃學道服食胎息之術行及走馬力兼數人河上公者莫知其姓名也又能行及走馬頭上常有五色氣髙丈餘孔安者魯人也行氣服鈆丹有陳和者樂安人也重之求事安遂受其方合藥服之二百餘年頭色轉黒氣力百倍行及走馬也列仙傳曰沈建者丹陽人也世為長史建獨好道為服食之術一日行五百里能舉千斤髙仙公别傳曰孫堅欲害仙公馳馬徃逐見仙公徐行逐之不及歩釋名曰徐行曰歩歩捕也知有所司捕務安詳也爾雅曰堂下謂之歩禮記王制曰古者以周尺八尺為歩今以周尺六尺四寸為歩又祭義曰故君子跬歩而弗敢㤀孝也漢書息夫躬曰匈奴飲馬於渭水邊境雷動四野風起京師雖有武將精兵未有能窺左右而先應者也又曰蔡義河内温人也以明經給事大將軍幕府家貧常歩行禮不逮衆門下好事者相合為義置犢車令乗之又曰盖寛饒為人剛直髙節家貧奉禄數千半以給吏人為耳目司𨽻常歩行續漢書曰李固少有雋才雅志好學為三公子常躬歩行驅驢負書従師范曄後漢書曰楊震轉涿郡太守子常蔬食歩行魏志曰崔林字徳儒清河東武城人也除鄢陵長家貧無單車匹馬歩行之官莊子曰夀陵餘子學歩於邯鄲未得其能失其故歩匍匐而歸白虎通曰人踐三尺法天地人也再舉足為歩備隂陽也郭子曰王丞相拜司空廷尉作兩角髻葛裙拄杖臨路邊窺之嘆曰人言阿龍超阿龍故自超不覺歩至臺門方言曰半歩為跬世說曰阮宣子常歩行以百錢挂杖頭至酒店上便獨酌酣暢趨說文曰趨低頭疾行也釋名曰疾行也趨趨赴也赴所期也毛詩魚藻曰綿蠻黄鳥止于丘隅豈敢憚行畏不能趨禮記曲禮曰遭先生於道趨而進正立拱手不與之言則趨而退又曰帷簿之外不趨堂上不趨執玉不趨論語鄉黨曰没階趨進翼如也爾雅曰門外謂之趨漢書曰上欲自擊陳豨周昌泣曰始皇攻破天下未曽自行今上行是無人可使者乎上以為愛我賜入殿廷不趨又曰萬石諸子入里門趨至家走釋名曰疾趨曰走走奏也促有所奏至禮記玉藻曰凡君召以三節二節以走一節以趨節所以明信也使使召臣急則持三緩則持一周禮曰鎮圭以檄守其餘未聞也如今漢使者持之節左傳僖下曰衛叔武将沐聞君至喜捉髮走出前驅射而殺之又昭七曰荀躒以晉侯之命唁公且曰寡君使躒以君命討扵意如意如不敢逃死君其入也公曰君恵頋先君之好施及亡人将使歸糞除宗祧以事君則不能見夫人已所能見夫人者有如河夫人謂季孫也荀躒掩耳而走公羊傳定公曰陽虎竊寳玉而走又哀公曰齊景公謂陳乞曰吾欲立舍何如陳乞曰君欲立臣請立之陳乞欲言不可恐景公殺陽生陽生曰吾聞子將不立我也陳乞曰吾不立子者所以生子也與之玉節而走節信也折玉與陽生為後當迎之信爾雅曰中庭謂之走史記曰周昌常入奏事髙帝方擁戚姬昌還走帝逐得騎昌項問曰我如何主也昌仰曰桀紂主也東觀漢記曰上降潁陽雖得入意不安門下有擊馬着鼓者馬驚硠磕鄧晨起走出視之乃馬也魏畧曰曹真字子丹沛郡人本姓秦養曹氏或云其伯父南宿與太祖善共平袁術部黨與太祖相攻刦太祖出為冦追走入秦氏伯南開門受之冦問所在答云我是冦遂害之由此太祖思其功遂變其姓江表傳曰陸遜破𤣥徳於夷陵𤣥徳乃歩走燒皮鎧以斷道使挽車走入白帝晉書曰陳安字虎侯驍壯果毅武幹過人多力善射持七尺刀貫甲奔及馳馬又曰康彬字儒宗魯國鄒人也少便弓馬好逰獵身長八尺走及奔鹿强力絶人後魏書曰伊馛代人也少而勇健走及奔馬善射多力曵牛却行趙書曰劉靈陽平人也年二十餘常厮役扵縣走及馳馬前秦録曰符堅大敗為流矢所中遁走甚饑民有進壺飡豚髀者堅食之大恱隋書曰麥鐵杖始興人也驍勇有膂力日行五百里走及奔馬每以漁獵為事不治産業吴越春秋曰慶忌僚子也勇為人所聞走及奔馬吴氏春秋曰今與驥俱走則人不勝驥矣居其車上則驥不勝人又曰有莘氏女子採藥得嬰兒於空桑之中獻之其君令養之察其所以然曰其母居伊水之上孕夢神告曰臼出水而東走千里邑盡為水身化為空桑故命之曰伊尹戰國䇿曰昔曾參處費魯人有與曾參同姓名者殺人人告其母曰曽參殺人曾參母投杼踰墻而走楚漢春秋曰淮隂武王反上自擊之張良居守上體不安卧輼車中行三四里留侯走東追上簮堕被髮及輼車排户曰陛下即棄天下欲以王𦵏乎以布衣𦵏乎上罵曰若翁天子也何故以王及布衣𦵏乎良曰淮南反扵東淮隂害於西恐陛下倚溝壑而終也荘子曰蔵舟於壑蔵山於澤謂之固矣然則夜半有力者負之走而昧者不知荀卿子曰伯禽将歸國周公謂之曰君子力如牛不與牛争力走如馬不與馬争走智如士不與士争智淮南子曰漁者走淵木者走山又曰躃者見虎不走非勇也又曰飛不以尾挫尾則飛不能逺走不以手縳手則走不能疾抱朴子曰柠木實之赤者餌之一年老者少昔道士梁須年七十服之年百三十嵗能夜書走及馬世說曰鍾會撰四本論始畢甚欲使嵇公一見置懐中既詣定畏其有難不敢相示於户外遥擲便逥急走俗說曰桓公豹奴善騎乗亦有極快馬時有一諸葛郎自云能走與馬等桓車騎以百匹布置埒頭令豹奴乗與諸葛競走先至者得布便俱走諸葛常與馬齊欲至埒頭去布三丈諸葛一透坐布上遂得之魯女生别傳曰魯女生長樂人也少好學道初服餌胡麻乃求絶榖八十餘年日更少壮面如桃花日行三百里走及獐鹿跳釋名曰跳條也如草木枝條務上行也左傳僖下曰魏犨束胷見使者曰以君之靈不有寧也距躍三百曲踊三百崔鴻十六國春秋前趙録曰劉翌驍幹過人能一手舉殿柱跳過平陽門出神仙傳曰壺公者不知何處人也従逺方来賣藥得錢與饑凍者常懸一壺扵坐上日入後跳入壺市掾費長房於樓上見之知非常人身為掃除并進餅餌公令房共跳入壺但見樓觀重門侍者數十人蹲王隠晉書曰王長文字徳叡州郡辟别駕不就追求之乃於成都賣熟市見長文蹲地齧胡餅州知不屈乃送還家山海經曰大荒之中有大人之堂有一人唆其上張其兩臂郭璞逰仙詩曰安見山林士擁膝對巖蹲王褒僮約曰奴入市不得夷蹲旁卧惡言醜罵太平御覽卷三百九十四
