body:
  text: 太平御覽卷六百五十二宋李昉等撰刑法部十八赦赦周易解卦象曰雷雨作解君子以赦過宥罪尚書舜典曰眚灾肆赦眚過灾害肆緩言大過害當緩赦之又吕刑曰五行之疑有赦五罰之疑有赦其審克之刑疑赦從罰罰疑赦從免其當審察能得其理周禮冬官司市曰國君過市則刑人赦又曰司刺掌三宥三赦之法一宥曰不識再宥曰過失三宥曰遺亡一赦曰㓜弱再赦曰老耄三赦曰蠢愚爾雅曰赦舎也舎放置也論語仲弓為季氏宰問政子曰先有司赦小過舉賢才史記曰陶朱公中子殺人囚於楚朱公曰殺人而死職也使少子往視之乃裝黄金千鎰以置褐器中載以一牛車遣其少子長男固請欲行公不許長男曰長子家督也今弟有罪大人不遣是吾不肖欲自殺其母為言不得已而遣長子為一封書及金令遺故所善莊生生乃見楚王曰某星犯某宿獨以德報可以除之王乃使使封三錢之府長男以王當赦弟固當出也重千金虛棄無所為也乃復見莊生曰弟今自赦故辭去生知其意曰自入室取金莊生恥為兒子所賣乃入見楚王曰臣出道路皆言陶之富人朱公子多持金賂王左右王非能恤楚而恩赦乃以陶朱公子也楚王大怒遂殺陶朱公子明日乃令赦長子持其弟䘮歸也漢書曰惠帝冠赦天下省法令妨吏民者除挾書律張晏曰秦律敢有挾書者族又曰惠帝崩太子立為皇帝年㓜太后臨朝稱制大赦天下又曰武帝元封二年四月臨決河塞隄作瓠子歌赦所過徒六月詔曰甘泉宫銅池中産芝九莖連葉赦天下乃作芝房歌五年冬行南廵還至㤗山増修封禪赦天下六年詔曰朕禮首山毘田出珍物化為黄金祭后土神光三燭其赦汾隂殊死以下賜天下貧民布帛人一疋益州昆明反赦京師亡命令從軍擊之後元年二月詔曰朕郊見上帝廵于北邊見羣鶴留止以不羅網靡所獲獻薦于㤗畤光景並見其赦天下又曰宣帝地節二年四月鳳凰集魯郡羣鳥從之戊申立皇太子赦天下神爵四年春二月詔曰嘉瑞並見修興太乙五帝后土之祠為百姓蒙福鸞鳳萬舉集止于傍齋戒之暮神光顯著薦獻之夕神光交錯或降於天或登于地或從四方來集于壇上帝嘉饗海内承福其赦天下又曰成帝建始元年二月詔曰廼者火灾降于祖廟有星孛于東井其大赦天下咸與自新永始元年丙寅立皇后趙氏大赦天下四年正月行幸甘泉郊㤗峙神光降集紫殿大赦天下又曰哀帝建平二年四月詔曰漢家之制推親親以顯尊尊定陶恭皇之號不宜復稱定陶尊恭皇太后曰帝太太后稱永信宫恭皇后曰帝太后稱中安宫立恭皇廟于京師赦天下東觀漢記曰吳漢疾篤上乃親自臨問所欲言對曰臣愚無所知識唯願無赦而已又曰郭躬家世掌法務在寛平章和元年赦天下繫囚在四月丙子以前減死罪一等勿笞詣金城而文不及亡命躬上封事曰伏惟天恩莫不蕩宥死罪以下並蒙更生而亡命捕得獨不沾澤臣以為赦前犯死罪而繫在赦後者可皆勿笞詣金城以全人命有益於邊上善之即下詔赦焉謝承後漢書曰學士中諸生與李膺等更相褒重莫不畏其貶議時河内張成善説風角推占當赦遂教子殺人李膺為河南尹督促收捕既而逢宥獲免膺愈懷憤疾竟案殺之又曰度尚為荆州刺史尚見胡蘭餘黨南走蒼梧懼為己負乃偽上言蒼梧賊入荆州界於是徵交趾刺史張磐下廷尉辭狀未正㑹赦見原磐不肯出獄方更牢持械節獄吏謂磐曰天恩曠然而君不出何也磐因自列曰前長沙賊胡蘭作難荆州餘黨散入交趾磐身嬰甲胄涉危履險討擊凶惡斬殄渠帥餘燼鳥竄冒遁還奔荆州刺史度尚懼磐先言怖畏罪戾伏奏見誣磐備位方伯為國爪牙而為尚所枉受罪牢獄夫事有虛實法有是非磐實不辜赦無所除如忍以苟免永受侵辱之恥生為惡吏死為弊鬼乞傳尚詣廷尉對面曲直廷尉以其狀上詔書徵尚到廷尉辭窮受罪以先有功得原又曰董卓死陜中諸將共相要遣使詣長安相聞求乞大赦尚書令王允等以為殺卓時已赦今復求乞一歲不可再赦傕等曰京師不赦我我當以死決之若攻長安克之則可得天下矣不克則盡鈔取三輔婦女財物西上隴歸鄉里作賊延命尚可數年於是帥兵西向長安魏志曰文帝延康元年受禪即位改延康為黄初大赦天下又曰陳留王奐即位咸熙二年二月加相國晉王冕十二旒建天子旌旗出警入蹕乘金根車等癸未大赦八月辛卯晉王薨壬辰晉太子炎紹封襲位襄武縣言有大人見長三丈餘跡長三尺二寸白髮著黄單衣黄巾拄杖呼人王始語云今當太平九月乙未大赦吳志曰吕蒙病發孫權迎置内殿夜不能寢病中有瘳為下赦令又曰孫皓天璽元年吳都言臨平湖自漢末草穢壅塞令更開通長老相傳此湖邊石凾中有小石青白色長四寸廣二寸刻上作皇帝字於是改年大赦蜀志曰孟光字孝裕河南人延熙九年秋大赦光責大將軍費禕曰大赦者偏枯之物非明世所宜有也衰弊窮極必不得已然後乃可權而行之耳今主上仁賢百僚稱職有何旦夕之危倒懸之急而數施非常之恩以惠姦宄之惡乎又鷹隼始撃而更原宥有罪上犯天時下違人理老夫耄朽不達治體竊謂斯法難以經久豈具瞻之髙美所望於明德哉禕但顧謝踧踖而已干寶晉紀曰庻人楊氏幽于金墉城陳留董仲道遊於太學喟然而嘆曰建斯室也何為者乎每見國家赦書謀反大逆皆除其殺祖父母父母者不除以為道法所不容也何今日公卿處議文飾禮典以至于此乎夫人之理既滅大亂將作矣顧謂謝鯤阮千里等曰易稱知幾其神卿等各可深逃乃自荷擔妻子推鹿車以入於蜀山莫知所至王隱晉書曰武帝咸熙二年十二月丙寅上乃設壇受命於郊即洛陽宫幸太極殿大赦天下又曰愍帝建興元年夏四月壬申上即位于長安宫改元大赦天下與之更始前後不及者皆除之崔鴻十六國春秋前秦録曰王猛疾病未瘳符堅大赦殊死已下又曰永興元年符堅為赦與尚書左僕射王猛右僕射符融宻議於露堂屏左右為赦文有一大蒼蠅入自牖間鳴聲甚大集於筆端驅而復來久之乃去俄而長安市里相告曰官今大赦有司以聞堅驚謂猛融曰禁中何從泄也於是勅外推之咸言有一小人衣黒衣大呼於市曰官今大赦須㬰不見堅嘆曰其向者蒼蠅也後魏書曰崔𤣥伯太宗時郡國豪右大為民蠧乃優詔徵之民多戀本而長吏逼遣於是輕薄少年因相扇動所在聚結討之不能禁太宗乃引𤣥伯及元城侯元屈等議赦之屈曰民逃不罪而反赦之似若有求於下不如先誅首惡赦其黨類𤣥伯曰王者治天下以安民為本何能顧小曲直也譬琴瑟不調必改絃而更張大赦雖非正道而可以權行自秦漢以來莫不相踵屈言先誅後赦㑹於不能兩去孰與一行便定若其赦而不改者誅之不晩太宗從之後周書曰明帝武成元年夏詔曰比屢有糺發官司赦前事此雖意在疾惡但先王制肆眚之道令天下自新若又推問自新何由哉如此之徒有司勿為推究惟庫廐倉廩與海内所共漢帝有云朕為天下守財耳若有侵盜公家財畜錢粟者魏朝之事年月既逺一不須問自周有天下以來雖經赦宥而事跡顯知者有司宜即推窮得實之日但免其罪徵備如法北齊書曰宋世良字元友為清河太守甚有善政天禄初大赦獄内穭生桃樹蓬蒿亦滿無囚可赦唯率羣吏拜詔而已又曰後主將大赦時臨漳令李世業為臺所劾贓多至死世業即穆提婆對門陸令宣言於齊主所以大赦後由是頻赦遂以為常平息縣功曹賀肫小人奸貪數犯刑憲但入狴牢無不遇赦故世人以肫為赦之候又曰赦日武庫令設金鷄及鼓於閶闔門外之右勒集囚徒於闕前撾鼔千聲脱枷鎻遣之隋書曰張煚為天官司㑹與宗伯斛斯徵素不協徵出為齊州刺史坐事下獄自知罪重遂踰獄而走帝大怒購之急煚上宻奏曰徵自以負罪深重懼死遁逃若不北竄匈奴則南投吳越徵雖愚陋久厯清顯奔波敵國無益聖朝今者炎旱為灾可因兹大赦帝從之徵賴以獲免煚卒不言唐書曰太宗以法吏舞文尤留意於刑政每親録囚徒貞觀初時方發生乃悉放京城死罪撃囚徒歸家期以秋分還繫所囚勅天下皆放之是歲天下死罪囚如期而還者凡二百九十人太宗愍其奉法悉赦之自是犯法者鮮貞觀二年上謂侍臣曰凡赦宥之恩唯及不軌之輩古語曰小人之幸君子之不幸一歲再赦善人喑啞凡養稂莠者傷禾稼惠奸宄者賊良人昔文王作罰刑兹無赦夫小仁者大仁之賊故朕有天下以來不甚放赦今四海安寧禮義興行非常之恩施不可數將恐愚人冀僥倖唯欲犯法不能改過當須慎赦尚書大傳曰有過必赦小罪勿增大罪勿赦老弱不受刑有過不受罰故老而受刑謂之悖弱而受刑謂之克不赦有過謂之賊故與其殺不辜寧失不經與其増以有罪寧失過與其有罪殺寧以有過赦家語曰孔子為司冦有父子訟者夫子同狴犴獄也而執之三月而不判也其父請夫子赦焉季孫聞之不悦曰司冦欺余曩吿余曰為國家者先以孝余今戮不孝以教民孝不亦可乎又赦之何哉冉有以其言吿孔子喟然嘆曰上失其道而殺其下非理也不教以孝而聽以獄是殺不辜三軍大敗不可斬也狴犴不理不可刑也何者上教之不行罪不在民故也管子曰凡赦者小利而大害也故久而不勝其禍無赦者小害而大利也故久而不勝其福故赦者奔馬之委轡也無赦者痤疽之砭石也又曰赦者先易後難法者先難後易故惡者民之仇讐也法者民之父母也莊子曰聞在宥不聞治天下郭象注曰宥使之自新則治法治之則亂刑也者恐天下之淫其性也宥也者恐天下之遷其德也天下不淫其性不遷其徳有治天下者哉無治乃不遷德耳淮南子曰或曰知夫將赦也而殺人或曰知夫且赦而治人其望赦同其所殺害異也故或吹火而燈或吹火而滅以吹者異也李爕别傳曰爕常逃亡匿臨淄界為酒家傭靈帝即位時月經隂道暈五車史官曰有流星昇漢而北陽芒迫卯熒惑入大角犯帝座其占當有大臣被誅者故太尉李固西土人占在固今月經隂道圍五車宜有赦令以除此異上感此變大赦天下求公子孫酒家具車乘厚送之漢舊儀曰踐祚改元立皇后太子赦天下每赦自殊死以下及謀反大逆不道諸不當得赦者皆赦除之令下丞相御史復奏可分遣丞相御史乘傳駕行郡國解囚徒布詔書郡國各分遣吏傳廐車馬行屬縣解囚徒汝南先賢傳曰王允字子師誅董卓卓將郭汜李傕等聞卓死引兵還圍長安燔掠宫省死者萬數大赦天下允忠節三朝更赦書云卓黨不赦郭汜李傕等不從是日遂及於難華陽國志曰丞相諸葛亮時有言公惜赦亮答曰治世以大德不以小惠故匡衡吳漢不願為赦先帝亦言吾周旋陳元方鄭康成間每見言理亂之道悉矣曾不語赦也若劉景升父子歲歲赦宥何益於治也王符潜夫論曰凡治疾者必先知脉之虛實氣之所結然後為之方故疾可愈也為國者必先知斯人之所苦禍之所起然後為之禁故姦可塞也夫賊良人之甚者莫大於數赦赦數則惡人昌狂而善人傷矣養稂莠者傷禾稼惠奸宄者賊良人書曰文王作罰刑兹無赦孝明帝時荆州舉茂才初過謝恩賜食事訖問何異聞曰坐失劇賊九人刺史數以牙郡訖不能得帝曰汝非部南郡從事耶對曰是帝乃震怒曰賊發部中不能擒殺才何以為茂乃捶數百便免官而切讓州郡十日之間賊即伏誅由此觀之擒盜賊在於明法不在數赦崔寔政論曰孝文皇帝即位二十三年乃赦示不廢舊章而已近永平建初之際亦六七年乃赦亡命之子皆老於草野窮困懲艾皆之老死頃間以來歲且赦百姓輕為姦非前年一春之中大小四散諺曰一歲再赦奴兒喑啞況不軌之民孰不肆意遂以赦為常俗赦以趣赦轉相驅踧而不得息雖日赦其亂彌繁也郭子曰孫秀降晉武帝厚存寵之妻以姨妹蒯氏室家甚睦妻嘗怒秀罵為貉子秀大不平遂出不復入蒯氏自悔責遂請救於帝時大赦羣臣咸見既出帝獨留秀從容言天下曠蕩蒯夫人可得從其例否秀免冠謝遂為夫婦如初傅子曰若親貴犯罪大者必議小者必赦是縱封豕於境内放長蛇於左右也荀恱漢紀論曰夫赦權時之宜非常典也漢興承兵革之後大過之代比屋可刑故設三章之法申以大赦之令蕩滌穢流與人更始時勢然也後代承業習而不革失時宜矣風角書曰春甲寅日風髙去地三四丈鳴條從申上來為大赦期六十日應也又曰候赦法冬至後盡丁巳之日南風從已上來滿三日以上必有大赦望氣經曰黄氣四出注期五十日赦古樂府歌詩曰始出上西門遥望秦氏樓秦氏有好女自名為女休女休年十五為宗行報讎左執白楊刃右援宛景矛上山四五里問吏得女休女休前致辭平生為燕王婦於今為詔獄囚刀矛本及下隴撞撃鼓赦書下太平御覽卷六百五十二
