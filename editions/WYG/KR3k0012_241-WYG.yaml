  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_241-1a, image: WYG0895/WYG0895-0206a.png}
body:
  text: 太平御覽卷二百四十一宋李昉等撰職官部三十九中郎將五官中郎將左右中郎将虎賁中郎將四中郎将雜中郎將凡五都尉奉車都尉騎都尉中郎將漢書曰武帝拜張騫為中郎將使西域又曰宣帝即位詔曰朕微眇時故掖庭張賀輔導朕躬賀有孤孫霸七嵗拜為中郎將又曰宣帝時楊惲為中郎將郎官故事郎出錢市財用給文書乃得出名曰山郎山郎以資財為郎也山之所出財用故取名焉惲罷山郎皆以法令從事有罪過輒奏免郎官化之莫不自勵又曰司馬相如為中郎將持節過蜀縣令負弩前導蜀人以為榮又曰衞綰為中郎將醇謹無他孝景幸上林詔中郎將叅乘還問曰君知所以得叅乘乎綰曰臣代戲車士得功次遷待罪中郎將不知也又曰張安世長子千秋與霍光子禹俱為中郎將將兵隨度遼將軍范明友擊烏桓還謁大將軍光問千秋戰鬬方略山川形勢千秋口對兵事畫地成圖無所忘失問禹禹不能記曰皆有文書光由是賢千秋以禹為不才歎曰霍氏世衰張氏興矣後霍禹誅滅安世子相繼為侍中常侍列校十餘人又曰卜式為中郎初式不願為郎上曰吾有羊在上林欲令子牧之式既為郎而牧羊嵗餘肥息上善之式曰非獨羊也治民亦由是矣以時起居惡者去之無令敗羣上竒其言東觀漢記曰更始入長安多用羣小時人為之語曰竈下養中郎將後漢書曰董卓以吕布為騎都尉誓為父子甚愛信之遷至中郎將卓自知凶恣每懷猜畏行止嘗以布自衞小失卓意拔手㦸擲之布拳捷得免而改容顧謝卓意亦觧布由是隂怨於卓蜀志曰霍峻字仲邈南郡支江人也允篤於鄉里合部曲數百人篤卒荆州牧劉表令峻攝其衆表卒峻率衆歸先主先主以峻為中郎將又曰劉焉字君郎江夏竟陵人少仕州郡以宗室拜中郎後以師祝公䘮去官又曰張飛字翼徳涿州人也少與關雲長事先主雲長長數嵗兄事之先主從曹公破吕布還許昌曹公乃俱拜為中郎將五官中郎將續漢書曰五官中郎將一人比二千石主五官郎也五官中郎比六百石無員五官侍郎比三百石無員凡官皆主更直執㦸宿衞諸殿門東觀漢記曰江革字次翁拜五官中郎將每朝㑹天子使虎賁扶持帝自禮之有疾不㑹輒遣太官送飡醪恩寵莫比續漢書曰張純字伯仁遷五官中郎將純在朝歴世明習故事建武初舊章多闕每有疑議輒以訪純自郊廟婚冠喪紀禮儀多所正定帝甚重之一日或數四引見謝沈漢書曰樊英字季齊順帝備禮徴拜五官中郎將數月以病遜位歸應劭漢官儀曰五官中郎將秦官也秩比二千石三署郎屬焉魏氏令曰告子文汝等悉為侯而子桓獨不封而為五官中郎將此是太子可知矣魏志建安十五年為五官中郎將副丞相者也左中郎將天文録曰郎將星若今之左右郎將也故星讚曰郎將一星主閲具為武備漢書曰辛慶忌字子貢從光禄大夫遷左曹中郎將後漢書曰左宫為左中郎將擊武陵賊降凡將兵二十餘年以性謹質朴故常見用續漢書曰承宫遷左中郎將數進忠諫論議守正不希世遇朝臣憚其節名稱聞於匈奴單于遣使來貢求見宫詔勑宫自整頓宫曰夷狄眩名非識實也聞臣虛稱故欲見臣臣醜陋形寢見必輕賤不如選長大有威容者時以大鴻臚魏應示之又曰楊秉字叔節以尚書侍講蔡邕字伯喈以侍中並為左中郎將又曰皇甫嵩為左中郎將擊匈奴漢舊儀曰左中郎將秩比二千石主謁者右中郎將漢書曰段㑹宗字子松為右中郎將續漢書曰朱雋為右中郎將持節擊潁川長社賊漢舊儀曰右中郎將秩比二千石主常侍侍郎蜀志曰宗預為右中郎將將命使吳虎賁中郎將應劭漢官儀曰虎賁中郎將古官也書稱武王伐紂戎車三百兩虎賁三千人擒紂於牧之野言其猛怒如虎之奔赴平帝元始元年更名虎賁郎古有勇者孟賁改奔為賁中郎將冠兩鶡尾鶡鷙鳥中之異勁者也每所攫撮應爪摧碎鶡尾上黨所貢周禮夏官下曰虎賁氏掌先後王而趨以卒伍軍旅㑹同亦如之舍則守王閑尚書牧誓曰戎車三百兩虎賁三千人與紂戰于牧野作牧誓周書曰古有虎賁士千人以牛投牛以馬投馬以車捧車漢書百官表曰期門僕射秩比千石平帝元始元年更名虎賁郎置中郎將秩比二千石東觀漢記曰馬援從隴西太守遷虎賁中郎將又曰馬后不以私家干朝廷兄為虎賁中郎將訖永平世不轉又曰明太后姊子夏夀等私呼虎賁張鳴與敖戲争鬭上特詔曰爾虎賁將軍蒙國厚恩位在中臣宿衞禁門當進人不避仇讐舉罰不避親戚今者反於殿中交通輕薄虎賁蘭内所使至命欲相殺於殿下避門内畏懦恣縱故不逐捕此皆生於不學之門所致也又曰馬廖任傀皆從羽林監遷虎賁中郎將續漢書曰魯國孔融為北軍中候三日遷虎賁中郎將又曰虎賁中郎將比二千石主虎賁宿衞也左右僕射左右陛長各一人僕射主虎賁郎將陛長主直虎賁朝㑹在殿之下又曰虎賁武騎皆鶡冠虎文單衣襄邑歲獻織成虎文雲鶡者勇雉也其鬭死乃止又曰虎賁中郎將秩比二千石虎賁中郎比六百石虎賁侍郎比四百石虎賁郎中比三百石節從虎賁比二百石皆無員數掌宿衞侍從虎賁武騎皆鶡冠虎文單衣謝承後漢書曰建武十八年夏旱公卿皆暴露請雨洛陽令着車葢出門候何湯將衞士鈎令車收案有詔免令官拜湯虎賁中郎將上常歎曰赳赳武夫公侯干城何湯之謂也漢官典職曰虎賁中郎將主虎賁千五百人郎多至千人漢名臣奏曰丞相薛宣奏漢興以來深考古義推萬變之備於是制宣室出入之義正輕重之罰故司馬殿省闕至五六里周衞擊刁斗禁門自近臣侍側尚不得著劔入防未然也陛下聖徳純備海内晏然此國家之明制必前後備虎賁漢舊儀曰期門騎者隴西工射獵人及能用五兵仗刀三百人王莾以為虎賁郎劉謙之晉紀曰桓公欲復虎賁中郎將疑應直與不訪之僚佐咸莫能定叅軍劉蘭之對曰昔潘岳為秋興賦序云兼虎賁中郎將寓直於散騎之省以此言之是直官也後魏書曰韓茂膂力絶人尤善騎射太祖曽親征丁零翟猛茂為中軍執幢時大風諸軍旌旗皆偃仆茂于馬上持幢初不傾倒太祖異而問之徴茂所屬具以狀對太宗謂左右曰記之尋徴詣行在所試以騎射太宗深竒之以茂為虎賁中郎將九州春秋曰袁術為虎賁中郎將張讓殺何進術斫閣起火環濟要略曰漢武帝好微行因置期門郎與之期於殿門平帝改為虎賁中郎張純别傳曰純字伯仁郊廟冠婚喪祭禮儀多所正定上甚重之以純兼虎賁中郎將一日數見東中郎將魏志曰蔣濟字子通文帝即位為東中郎將濟請留詔曰髙祖歌曰安得猛士守四方天下未寧要須良臣以鎮邉境如其無事乃還鳴玊未為後也後曺仁薨復以濟為東中郎將代領其兵詔曰卿兼資文武志節忼愾常有超越江湖吞呉㑹之志故復授將帥之任西中郎將沈約宋書曰西中郎將與南北東中郎將後漢號也南中郎將魏志曰鄢陵侯彰為南中郎將又曰臨淄侯植為南中郎將晉諸公讃曰石崇為南中郎將北中郎將續漢書曰盧植為北中郎將征黄巾魏志曰代郡烏丸反以曹彰為北中郎將臨發太祖誡之曰居家為父子受事為君臣王隱晉書曰山濤為北中郎將守鄴晉起居注曰武帝太始二年詔鄴城守事宜速有人又當得親親有文武器任者髙陽王珪今來之國雖當出為藩輔以才幹事亦古之制也其以珪為督鄴城守事北中郎將晉中興書曰荀羨為北中郎將將徐州刺史年二十八郭泰别傳曰王叔優問才之所宜泰曰當以武官顯叔優后至北中郎將匈奴中郎將續漢書曰張奐字然明與段紀明皇甫威明俱顯京師號為凉州三明並為匈奴中郎將司金中郎將魏略曰河北始開冶遂以王修為司金中郎將修奏記曰修聞枳棘之材無柱梁之質㳙流之才無洪波之勢是以在職七年忠謹不昭於時功業不見於事力少任重不堪薦擢典農中郎將魏志曰任峻字伯逺為典農中郎將數年所在積粟倉廪皆盈又曰毌丘儉字仲恭河東聞喜人為洛陽典農時取農民以治宫室儉上疏曰臣愚以為天下所急除者二賊所急務者衣食誠使二賊不滅士民飢凍雖崇美宫室猶無益也魏畧曰上以農殖大事將選典農以徐邈為頴川典農中郎將所在著稱武衞中郎將魏志曰許禇字仲康太祖與遂超等單馬㑹語左右皆不得從唯將禇超負其力隂欲突太祖素聞禇勇疑從騎是禇乃問太祖曰公有虎侯者安在太祖顧指禇禇瞋目眄之超不動乃各罷後數日㑹戰大破超等禇身斬首級遷武衞中郎將武衞之始自此始也建義中郎將後漢書曰袁紹傳魏郡兵反賊有陶升者自號平漢將軍英雄記曰升故為内黄小吏􅍦反諸賊將衆踰西城入閉府門具車重重輜重也載紹家及諸衣冠在州内者身自扞衞送到斥丘斥丘縣屬鉅鹿郡故城今相州成安縣東南十三州志云地斥鹵故云斥丘也紹還因屯斥丘以陶為建義中郎將都尉史記曰寗成家居上欲以為郡守御史大夫公孫𢎞曰臣居山東為小吏時寗成為濟南都尉其治如狼牧羊誠不可令治民上乃拜成為關中都尉又曰汲黯字長孺為東海太守歲餘大治上聞召為主爵都尉治務在無為而已𢎞大體不拘文法漢書曰主爵中尉秦官掌列侯景帝中元六年更名都尉武帝大初元年更名右扶風治内史右地與左馮翊京兆是為三輔皆有兩丞又曰韓信數以䇿干項羽羽弗用亡楚歸漢未得知名為連敖楚官坐法當斬信乃仰視滕公曰上不欲就天下乎而斬壯士滕公竒壯之與語大説言於漢王以為治粟都尉東觀漢記曰樊曄與世祖有舊世祖嘗於新野坐文書事被拘時曄為市吏餽餌一笥上徳之后拜河東尉臨發之官引見雲臺賜御食衣被上啁曄曰一笥餌得都尉何如曄頓首曰小臣蒙恩特見拔擢陛下不忘往舊臣得竭死自効又曰任延字長孫南陽宛人更始拜為西部都尉年十九迎吏見其少皆驚及到淡泊無為下車遣吏以中牢具祠延陵季子時天下新定道路不通諸避世江南者皆未還㑹稽多士延到皆禮之聘請髙行俊乂董子儀嚴子陵等待以師友之禮行縣所到輒使勞孝子崇禮養善如此建武之初上書言臣贊拜不由王庭願收骸骨詔書徴延民攀持轂涕泣漢書觧詁云都尉將兵副佐太守備盗賊也魏略曰積弩都尉秩比二千石后更為典弩都尉又有典鎧都尉秩與弩同皆屬積弩又曰撫軍都尉秩比二千石本校事官始太祖欲廣耳目使虞洪趙達二人主刺舉洪達多所陷入故于時軍中為之語曰不畏曹公但畏虞洪虞洪尚可趙達殺我後達竟亦為人之所迫死魏志曰韓暨為監治謁者在職七年器用充實詔書褒歎就加司金都尉班亞九卿吳志曰孫桓字叔武儀容端正器懷聰朗博學强記能議論應對權常稱為宗室顔淵擢為武衞都尉從討關羽於華容誘羽餘黨得五千人牛馬器械甚衆臨海記曰漢元鼎五年立都尉府於候官以鎮撫二越所謂東南一尉者也黃帝占軍氣决曰都尉氣如合抱之榆周紹新論曰散騎侍郎武衞都尉孫竒字仲容年十七以秀才入侍帷幄余作詩一篇美而風之恂恂周公美妙無已誕姿既豐世胄有紀平南之孫奮威之子湖廣邉都尉箴曰巍巍上聖光被八埏矧惟内外罔不來賔季末陵遲王澤壅隔戎狄作難鬼方騷逖桓桓猛將是攘是闢殷宗周宣用顯其績大漢龍興念存治平蕩蕩率土來同門屏守撫其民出典其戎五才並用文武程功奉車都尉韋昭辯釋名曰奉車都尉奉天子乘輿辯云奉車都尉主乘輿乘車尊不敢言主故言奉漢書曰奉車都尉掌御乘輿車馬騎都尉魏略曰李豐字安國年十七在鄴下名為清白識别人物明帝時得吳降人問江東聞中國名士為誰降人云聞有李安國者是時豐為黄門郎上曰豐名播於吳越耶後轉拜騎都尉又曰畢軌字昭先明帝在東宫時軌在文學中及即位入為黃門郎拜騎都尉魏志曰徐晃字公明河内東陽人也為郡吏從車騎將軍楊奉討賊有功拜騎都尉吳志曰駱統字公緒㑹稽烏程人時飢荒多有困乏統為飲食衰少其姊仁愛寡婦無子見統甚哀之數問其故統曰士大夫糟糠不足我何心獨飽姊曰誠如是何不告我而自苦若此乃自以私粟與統又以告母母亦賢之遂使分施由是顯名孫權以將軍領㑹稽太守統年二十試為烏程相民户過萬咸歎其惠理權嘉之召為功曹行騎都尉又曰孫權遣騎都尉趙咨使魏魏帝問曰吳王何等主也咨對曰聰明仁智雄畧之主也帝問其狀咨曰納魯肅於凡器是其聰也㧞吕蒙於行陣是其明也獲于禁而不害是其仁也取荆州而不血刃是其智也㨿三州而虎視天下是其雄也屈身於陛下是其畧也又曰顧承字子直嘉禾中與舅陸瑁俱以禮徴權賜丞相雍書曰貴孫子直令問休休至與相見過於所聞為君嘉之拜騎都尉吳志曰諸葛恪字元遜瑾長子也少知名弱冠拜為騎都尉太平御覽卷二百四十一
