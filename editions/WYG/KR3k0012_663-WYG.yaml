body:
  text: 太平御覽卷六百六十三宋李昉等撰道部五地仙史記曰􅅾萊方丈瀛州在渤海中去人不逺葢常有至者諸仙及靈藥在焉其物禽獸盡白未至望之如雲秘要經曰立三百善功可得存為地仙居五嶽洞府之中抱朴子曰彭祖言天上多尊官大神新仙者位卑所奉事者非一但更益勞苦耳故不急於升騰而止乎人間者八百八年述異記曰廬山上有三石梁長數十丈廣不盈尺俯眄而杳不見底晋成康中江州刺史庾亮迎吳猛将弟子登山遊覽因過此梁見一翁坐桂樹下以玉盃承丼露與猛猛分賜弟子又進至一䖏見崇臺廣厦金玉房宇噐物不可識與猛言若故舊設玉膏終日裴君傳曰西𤣥三山洞周千里與西山相連各一宫金城九重潜通洞道距𤣥州崑崙非人跡所及裴君周君分䖏其内五嶽圗曰青城山洞周二千里蜀郡界黄帝拜為五嶽丈人又名山記曰北接嶓􅜗南接峨嵋東至成都山形似九重山有赤壁張天師所治䖏今遺跡猶存魏夫人傳曰赤城丹山洞周三百里有日月伏根三辰之光照洞中五嶽圗云此山在㑹稽羅江其西北有赤城按茅君傳云霍林司命治赤城丹山玉洞之府齊永明之忽有大羣鵠從西北來下集霍門溪溪谷填塞彌漫數里多所蹹藉狀如為物所驚一夕還飛向西北計是赤城上都泉胡中物也羅浮山山洞周五百里真誥呼為層城葛洪至交州遂停此煉丹茅君傳曰句曲山洞周一百五十里秦時名為句全之壇漢時三茅君得道來治此山五符曰林屋山洞周四百里一名包山在太湖中下有洞潜通五岳號天后别宫夏禹治水平後藏五符於此吳王闔閭使龍感文人入山所得是也真誥曰包山下有石室銀房方圎百里又有白芝隠泉泉水紫色又曰城玉山洞周三千里周司命先在恒山中太𤣥玉女語令徃西城師王君於是往焉即此山也又曰厚載之中有洞天三十八所有在海中諸山亦有洞宫或方千里五百里非十六洞天之例也五岳名山皆有洞宫或三十里並三十里舍神仙又非小有之數也名山記曰嶽洞方百里在終南太一間或名桂陽宫多諸靈異又曰王屋山洞周廻萬里名曰小有清虛天按王君内傳云在河内沁水縣界濟水所出之源也北有太行東南有北邙嵩山内洞天曰日月星辰雲宫草木萬類無異矣宫闕相映金玉鏤餙者地仙所䖏即清虛王君所居也真誥云此諸天所謂陽臺也諸得道者皆詣焉委羽山在海中司馬季主所䖏也又曰括蒼山洞周三百里東岳佐命也在㑹稽東南羣帝之所遊山多神異又有嘗雲堂孤峯直聳巖嶺秀傑特冠羣山山中茅𤣥嶺獨髙䖏有司命埋丹砂六十觔深二丈盤石填其上左右小泉皆赤色人飲之夀茅山天市壇石正當洞天中之央𤣥牎之上也昔東海青童君乘風颷飛輪車按行洞天曽來於此劉向列仙傳曰赤松子神農時雨師服水玉散至崑崙山上常止西王母石室隨風雨上下又曰偓佺槐山採藥野父也好食松實體生毛目方瞳能飛行又曰廣成子古仙也居崆峒山石室中黄帝聞而造焉問其道要廣成子曰帝治天下雲不待族而飛草木不待黄而落何足語至道黄帝退居三日順風再拜廣成子曰至道之精窈窈𠖇𠖇無視無聼抱神以静形将自正必靖必清吾将去無窮之門遊無極之野又曰白石先生者中黄道人弟子也常煑白石為粮因就白石山居亦食脯飲酒食榖日行三四百里容貌不衰又曰黄山君者修彭祖之術百餘嵗有少容彭祖去乃追論其言為經又曰上清六甲經曰宋𤣥徳周宣時人也服六甲靈飛符得真靈之道上嵩高山又曰李意期蜀人也世常見之行道術於人於蜀城角穴上居之當劉備欲東伐吳報關羽之怨使迎意期到甚重之問其伐吳不答而取紙􅀞兵馬器仗萬數乃一一裂壊之人􅀞一尊官掘地埋之乃徑去備不悦後果為吳所破大敗十餘萬衆讒數百人還軍器甲仗畧盡備痛恨病終於永安宫意期少言人有所問都不對蜀人有憂患徃問之曰吉㓙自有常候但占其顔色惨恱耳後入瑯瑘山不復出又曰封君逹隴西人服黄連五十年餘入鳥䑕山中服練百餘歳徃來故里常騎青牛施藥愈病人惟呼青牛道士居人間積年後入虎丘山仙去又曰王仲都西漢人也少修道徳孝環以積寒之日令仲都单衣載四馬於上林昆明孝水而馳御者厚衣狐裘而寒慓垂死仲都色曽不變體和氣溢如熖及盛暑圍以烈火體亦不汗後不知所之又曰有稷丘公者㤗山下道士也漢武帝東廵狩至㤗山稷丘公乃冠章甫衣黄擁琴來迎上曰陛下勿上也恐傷足帝必欲上及數里果如言但諱之故既祠而還為稷丘公立祀復百尸使奉承之也又曰戴孟本姓燕名濟字仲㣲漢明帝時人也入華山入武當山受裴君玉佩金璫經又受石精金光符復有大微黄書能周旅名山又曰左慈字元放廬江人也明五經通星象見漢祚衰微乃學道精思於天柱山得石室中丸丹金液經是太清中經法也師李仲甫又葛𤣥師於慈曹操聞而召之問學道之由慈不荅操怒欲規殺之乃為置酒俄失慈建安末渡江尋山入洞在小括山顔色甚好又曰王遥字伯遼鄱陽人也頗行治病皆愈遥有篋長數尺一弟子姓錢隨遥十數年未嘗見開之一夕天雨晦𠖇遥使錢以九節杖負此箧錢將出行取道非所㑹經度行十里登一小山入石室中先有二人遥見既至取箧發之中有數寸截竹簧三枚三人各吹一簧良久復内箧中辭石室中人乃還家著舊葛单衣及日中負竹箧而去遂不復還後三年弟子見遥在馬蹄山下頗更少蓋地仙也又曰陳子皇濟隂人也得餌术方服之絶榖初年七十餘已衰及服餌反少在民間積年入霍山去又曰葛洪字稚川琅琊人不好榮爵閉門却掃好神仙道術嘗求交遊於餘杭山見何多道郭文舉目擊而已各無所言後從吳𤣥時學道得成以其練丹術受弟子鄭隠字思逺洪就隠學悉得其法學道傳曰鮑靚字太𤣥以太興元年八月二十日歩道上京行逹龍山見前一少年姿容整茂徒行甚徐而近之殊疾靚乘名馬宻逐數里終不能及意甚異之及問曰視似有道者少年荅曰我中山隂長生也又曰介像字元則㑹稽人也學通五經能属文後學道聞有九丹經周旋天下求之不得其師乃入山精思遇一人授以還丹術告曰得此便仙勿復他為也乃辭歸像嘗往弟子銘延雅舍帷下平林中有著正論左氏義不平像因間為辨正諸生知非常人宻表薦于吳王像欲去吳主詔至武昌甚尊異之稱為介君為賜第供帳黄金千觔像後告病湏㬰便死詔葬之為立廟大帝時躬祭常有白鶴集座止徘徊而去又曰李根字子則許昌人也昔徃夀春吳太文家弟子知根有道術竊窮視其器見素書一卷自記學道服藥時日又太文説根目瞳子方整乃地仙耳又曰伯山甫者雍州人也入華山中二百年不到人家即言人先世以來善惡功過有如臨見又知方來吉㓙又曰劉政沛人也髙才愽物尋考異勝有所聞雖𨽻奴必師事之求飬生之術餌丹年四百餘歳又曰王烈字長休邯鄲人也常服黄精及鈆二百餘歳行歩若飛博極羣書稽康甚重之數數就學共入太行山見山裂有青石髓流出烈取髓丸之成石氣如米飯嚼之亦然烈因携少歸欲遺康康取而觀之已成石手擊之錚錚康即與徃視㫁山山已如故烈入河東􅀈犢山見一石室中有石架架上有素書二卷莫識其字暗記數十字以示康康盡識之烈喜乃與康共徃讀之至其所失其石室烈私語弟子曰叔夜未合得道故也按神仙經云五百年山輙一開其中石髓得而服之夀考烈後莫知所之又曰歩正者字𤣥真巴東人也説秦始皇時事了如目前漢末将數十弟子入吳授以服氣及石髓方小丹法年四百歳又曰焦光字孝然河東人也常食白石煑如芋毎入山伐薪負之與人魏受禪與人别去不知所適又曰孫登不知何許人常止山間穴地而坐弹琴讀易冬单衣天大寒人視之被髪丈餘自覆身歴世見之顔色如故常經月不食時楊駿為太傅使迎問之不答駿遺布􅂁登出門借刀斷袍上下異處置駿門下人知駿當服誅時㑹稽稽康曽詣登登不與語康乃扣難之登弹琴自若久之康退登曰康才髙識寡劣於保身又曰帛和字仲理遼東人也入地肺山事董奉奉以行氣服术法授之告和曰吾道盡此不能得神丹金砂周遊天下無山不往汝今少壯廣求索之和乃到西城山事王君君語和大道訣曰此山石室中當熟視北壁若見壁有文字則得道矣視壁三年方見文字乃古人之所刻刻太清中經神丹方及三皇天文大字五嶽真形圗皆著石壁和諷誦萬言義有所不解玉君乃授之訣遂作地仙在林慮山又曰宫嵩琅邪人也能文著道書二百卷服雲母為地仙又曰李常在蜀都人也少洽道術世常見之王虎夀山陶潜桃源記曰晉太康中武陵人捕魚從溪而行忘路逺近忽逢桃花林夾岸芳華鮮美落英繽林紛盡得山山下有一小口初極狹行四五歩豁然開朗屋宇連接鷄犬相聞男女衣服悉如外人見漁父驚為設酒食云先世避秦難率妻子來此遂與外隔問今是何代不知有漢魏晋既出白太守遣人隨徃尋之迷不復得真誥曰劉慿沛人也學道於稷丘子常服石英年三百餘歳有少容嘗到長安諸貴人問慿有道術往拜見之又有賊隨人入慿語賊曰汝軰作人何豺狼此心相教新道危人利己此是伏尸都市肉饗鳥鳶之法賊忽頓伏駭矣慿後入太白山數十年歸鄉里顔色更少又曰尹思字少龍安定人晋元康五年正月十五日夜坐屋中遣児視月中有異物否曰目今當有大水月中有人披蘘帶劔思自視之曰月中人乃帶扶仗子當大亂三十年復當小靖思後不知所之又曰皇初平者丹谿人年十五家使牧羊有道士見其良謹便将至金華石室山中四十餘年不復念家其兄初起尋索歴年後見市中一道士言其䖏初起即隨去得見語畢問羊何在曰近在東耳初起徃視之但見白石初平叱之石皆化羊數萬頭初起知得仙道便棄家共服松脂茯苓至五百歳初平改字為赤松子初起改字為赤魯班又曰吕恭字文敬於太行山採藥忽逢人授以仙方得道因遣恭去曰可視鄊里及孫吕習者作道士民多奉視之恭傳言到習家扣門問訊奴出問公從何來恭曰吾來家習聞驚喜出迎恭乃以神方授習而去時已年八十服之還少至二百歳乃入山中子孫世不復見又曰沈建丹陽人世為長吏建好道不仕不學服餌之術能治病飛行或去還如此三百餘年乃絶跡不知所之又曰許逺遊第三男名翽字道翔小名玉斧糠粃世務居雷平山下修業精勤常願早遊洞室不欲久停人世遂詣北洞以梁太和六年於茅山舊宅年三十而告終即居方遇山洞方園館中常去來四平方臺後為上清仙去又曰馬明生臨淄人為縣吏逐賊被傷遇太真以靈丸得差後帥安期生受服太清丹在世五百年漢靈帝元和中去世集仙録曰陽平不知名姓在陽平山居多變化之術或問之乃曰我陽平洞中仙人耳稱毎歳三元大即諸天各有上真人下逰洞天以觀其善惡人世死生興廢水旱風雨預開報洞中其龍神祠廟血食之司皆為洞府所統洞中仙曹如人間郡縣聚落耳不可一一詳記也言訖而去太平御覽卷六百六十三
