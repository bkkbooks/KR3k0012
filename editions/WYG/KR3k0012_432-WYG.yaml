body:
  text: 太平御覽卷四百三十二宋李昉等撰人事部七十三慈愛恭敬智聰明強記慈愛説文曰慈愛也釋名曰慈字也韓詩外𫝊曰夫為人父者必懐慈仁之愛以畜飬之禮記大學篇曰慈者所以使衆也左傳昭五年曰子産卒仲尼聞之出涕曰古之遺愛也孝經援神契曰母之於子也鞠飬殷勤推燥居濕絶少分甘宋均曰少則自絶甘則分家語曰孔子曰明君必寛裕以容其民慈愛以優柔之漢書曰翟方進少為郡小吏號遲鈍因病歸欲遊學後母憫其志而憐其㓜隨之長安織履以給之謝丞後漢書曰楊彪子修為曹操所殺後見彪曰公何瘦之甚對曰愧無日磾先見之明猶懐老牛䑛犢之愛操為之改容列女傳曰魏孟陽之女芒卯之後妻也有三子前妻之子有五人皆不愛慈母前妻中子犯魏王令罪當死慈母憂感悲哀帶因減尺人有謂慈母曰人不愛母何為憂懼如此母曰其父為其孤也而使妾為之繼母如為人母而不能愛其子何謂慈乎魏王聞之髙其義赦其子而復其家自此之後五子事慈母盡孝老子曰吾有三寶一曰慈韓子曰愛子者慈於子重生者慈於生䝿功者於事仁淮南子曰堯立孝慈使民如子弟說苑曰魏文侯封太子撃於中山二年使不徃来舎人趙倉唐曰為人子三年不聞父問不可謂孝為人父三年不聞子問不可謂慈臣願奉使侯何所好太子曰侯嗜晨鴈好北犬倉唐緤北犬奉晨鴈文侯賜太子衣一襲令以鷄鳴時致之太子發筐視衣盡顛倒太子曰趣具駕君侯召我也唐来不受太子曰詩曰東方未明顛倒衣裳顛之倒之自公召之遂西至文侯大喜倉唐一使文侯為慈父擊為孝子潘岳西征賦曰夭赤子於西安坎路側而瘞之亭有千秋之號子無七旬之期雖逸厲於延吴實潜慟於余慈蔡邕書曰邕薄祜早䘮二親年踰三十鬢髪二色叔父親之猶若㓜童陸則對座食則比豆恭敬說文曰恭肅也釋名曰恭供也自持也亦言供給事人恭警也易小過卦曰山下有雷小過君子以行過乎恭取過於禮而不為害易繫辭曰君子致恭以存其位易文言曰敬以直内義以方外敬義立而徳不孤尚書五子歌曰為民上者奈何弗敬毛詩小弁曰維桑與梓必恭敬止又曰敬之敬之天惟顯思大戴禮曰昔禹見耕者五偶而式過十室之邑則下為秉徳之士存焉又曰昔武王踐祚入於户未嘗越履徃来過之不履影禮記曲禮曰君子恭敬撙節退讓以明禮又檀弓上曰晉獻公将殺其世子申生公子重耳謂之曰子盍言子之志於公乎世子曰不可君安驪姬是我傷公之心也曰然則盍行乎世子曰不可君謂我欲弑君也天下豈有無父之國哉吾何行如之使人辭於狐突曰君老子少國家多難伯氏不出而圖吾君圖謀伯氏苟出而圗吾君申生受賜而死再拜稽首乃卒是以為恭世子也又少儀曰賔客主恭祭祀主敬又樂記曰中正無邪禮之質也荘敬恭順禮之制也又哀公問曰敢問何謂敬身孔子對曰君子過言則民作辭過動則民作則君子言不過辭動不過則百姓不令而恭敬如是則能敬其身能敬其身則能成其親矣又經觧曰恭儉荘敬禮教也左傳宣上曰晉靈公不君趙宣子驟諫公患之使鉏麑賊之晨徃寝門闢矣盛服将朝尚早坐而假寐麑退而嘆曰不忘恭敬民之主也賊民之主不忠觸槐而死又襄四曰季氏以公鉏為馬正賈逵曰馬正家司馬愠而不出閔子馬見之閔子馬魯大夫閔馬父也曰為人子者患不孝不患無所恭敬父命何常之有公鉏然之敬恭朝夕恪居官次又昭三曰正考父佐戴武宣三人皆宋君也三命兹益恭三命上卿故其鼎銘曰一命而僂再命而傴三命而俯俯恭於傴傴恭於僂循墻而走言不敢安行也論語曰恭近於禮逺恥辱也又曰司馬牛憂曰人皆有兄弟我獨亡子夏曰商聞之矣死生有命富貴在天君子敬而無失與人恭而有禮四海之内皆兄弟也又曰樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可棄也又曰陳子禽謂子貢曰子為恭也仲尼豈賢於子乎家語曰孔子曰恭則近禮堯舜篤恭以王天下又曰顔淵将西遊宋問孔子曰何以為身子曰恭敬而已矣恭則近於禮忠敬則人愛史記曰子路為蒲大夫辭孔子孔子曰蒲多壮士又難治然吾語汝恭以敬可以執勇漢書曰萬石君石奮其父趙亡徙温髙祖東擊項籍過河内時奮年十五為小吏髙祖與語愛其恭敬奮積功勞孝文時太中大夫恭勤過宫闕門必下車趍見路馬必式子孫為小吏来歸謁萬石君必朝服見之魏畧曰常林單貧𢃄經耕鋤其妻自擔餉餽之林雖在田野其相敬過於賔客吴書曰顧悌字子通待妻妾有禮常夜入晨出希見其面常疾篤妻出看之悌命左右自扶起冠幘王隐晉書曰庾衮執事有恪與子弟治藩跪而授條其人曰今在隐屏先生胡不踞衮乃揖而延之正席而坐告之曰柰何以幽顯易其操乎樊英别𫝊曰英常病卧便室中英妻遣婢拜問英答拜或問之英曰妻齊也說苑曰魯有恭士名曰机泥行年七十其恭甚益冬日行隂夏日行陽一食之間三起見衣裘褐之士則為之禮魯君問曰机子年甚長矣不可釋恭乎泥對曰君子好恭以成其名小人學恭以除其刑斧鑕加於泥者何釋恭為又曰趙簡子乘弊車瘦馬衣設羊裘其宰諌曰車新則安馬肥則徃来疾狐貉之裘温且輕簡子曰吾非不知吾聞君子服美則益恭小人服美則益倨我以自備恐有小人之心也智易繫辭曰智周乎萬物而道濟天下禮記中庸曰舜其大智也與舜好問而好察邇言論語公冶長曰寗武子邦有道則智邦無道則愚其智可及也其愚不可及也寗武子衛大夫寗俞又雍也曰智者樂水又曰智者動爾雅曰岠齊州以南戴日為丹穴丹穴之人智史記秦使王稽於魏知范睢賢載入秦至湖穰侯至勞稽曰君得無與諸遊子俱来稽曰不敢既别去睢曰吾聞穰侯智士也其見事遲向者疑車中有人忘索之於是下車走行十餘里果走騎還索車中無人乃止又曰樗里子名疾秦惠王弟也滑稽多智秦人號曰智囊又曰晁錯以辯得幸太子太子家號曰智囊又曰項王謂漢王曰天下匈匈數嵗者徒以吾两人耳願與漢王挑戰决雄雌漢王笑謂曰吾寜闘智不闘力漢書曰陳嬰者東陽令史也少年殺其令相聚邑中從之者得二萬人欲立嬰為王嬰母謂曰吾為乃家婦聞先故未曾貴今暴得大名不詳不如有屬成猶得封侯事敗易以亡亡為世所指名也嬰乃不敢為王范曄後漢書曰魯恭祖父匡王恭時羲和有權數號曰智囊干寶晉記曰桓範出赴曹爽宣王謂将卒曰智囊徃矣晉中興書曰王允之字淵猷年在總角從伯敦深智之嘗夜飲允之辭醉先眠時敦将謀作逆因允之醉别牀卧夜中與錢鳯計議允之已醒悉聞其語恐或疑便於眠處大吐衣面並汚鳯既出敦果照視見其眠吐中以為大醉不復疑之華陽國志曰任文孫字文公閬中人初武擔山石折文公曰噫西方智士死吾其應之遂卒益部為之諺曰任文公智無䨇文子曰神者智之淵也神清則智明智者心之府也智公則心平荘子曰巧者勞智者憂尹子曰兩智不能相救兩貴不能相臨兩辯不能相屈力均勢敵故也商君書曰智者見於未萌申子曰智均不相使力均不相勝吕氏春秋曰目之見也籍於照心之智也籍於重淮南子曰智之以智權者人英也又曰禆諶出而智公成子産之事新序曰魏文侯曰智士者國之器也國有智士則無諸侯之憂桓譚新論曰揚子雲何人耶答曰才智開通能入聖道漢興以来未有此也論衡曰其智如傾其徳如山智能之人須三寸之舌一尺之筆乃能自通又曰劉子駿漢朝智囊筆墨淵海袁子正書曰楊子曰荘周何人哉袁子曰太而不檢重而畏禍人智也孫卿智賦曰血氣之釋也志意之榮也百姓待之是謂君子之智聰敏論語公冶長曰子謂子貢曰汝與囘也孰愈對曰賜也何敢望囘囘也聞一以知十賜也聞一以知二子曰弗如也吾與女弗如也漢書曰桑宏羊雒陽賈人善㑹計謝承後漢書曰應奉讀書五行並下九州春秋曰夏侯淵為劉備所殺於陽平曹公自長安出斜谷至陽平備拒險守峡王欲還出令曰鷄肋官屬不知所謂楊脩便曰夫鷄肋棄之可惜食之無所得以比漢中王欲還也引還吴志曰顧譚毎省簿書未嘗下籌徒屈指心計盡發疑謬後魏書曰祖瑩字元􅈿十二為中書學士愽士張天龍講尚書選為都講生徒悉集瑩夜讀書勞倦不覺天曉催講既切遂誤持曲禮卷上座博士嚴毅不敢復還仍置禮於前誦尚書二篇不遺一字沈約宋書曰劉穆之内總朝政外供軍旅决斷如流事無壅滯目覽詞訟手答牋書耳行聴受口並酬應不相参涉益部耆舊傳曰何祗補成都令使人投筭祗聴其讀而心計不差升合其精如此費禕别傳曰于時戰國多事衆務煩猥禕識窹過人毎讀書記粗舉目蹔視已充其數接納賔客飲食嬉戯加之博奕毎盡人之歡事不廢也董允代禕為尚書令欲則禕之所行旬日之中事多紆滯允為嘆曰才力相懸若此之逺說苑曰昔鄒忌為齊相稷下先生淳于髠之屬七十二人皆輕鄒忌為設妙辭淳于三稱鄒忌三知之如應嚮淳于等辭詘而去故所以尚干将莫邪者貴于立斷也所以尚騏􅂹為立至也是以聰明敏㨗欲人之入也世說曰魏武常過曹娥碑下楊脩從碑背上題曰黄絹㓜婦外孫韲臼魏武謂脩卿解不答曰解魏武帝曰卿未可言待我思之行三十里乃曰已得令脩别記所知脩曰黄絹色絲也於字為絶㓜婦少女也於字為妙外孫女子也於字為好虀臼受辛也於字為辭所謂絶妙好辭帝亦記之與脩同乃歎曰不如卿三十里世說曰人餉食魏武帝一杯酩魏武噉少許盖頭題上為合字以示衆莫之解次至楊脩便噉曰公教人一口又何疑強記禮記曲禮曰博聞強識而讓敦善行而不怠謂之君子漢書曰上行幸河東嘗亡書一箧張安世憶記之後得書以相校無所遺失安世長子千秋為中郎将将兵隨渡遼将軍范明友擊烏桓還謁大将軍光光問千秋戰闘方略山川形勢千秋口對兵事畫地成圗無所忘失東觀漢記曰虞延字君大為都督郵光武東廵路由小黄髙帝母昭靈后園陵在焉詔呼延引見問園陵之事延占對可觀其陵株梓皆識其數爼豆犧牲頗曉其禮謝承後漢書曰應奉嘗從彭城相袁賀時出行閉治車師門内出半面視奉奉即委去别後數十年於道路見車師識而呼之又曰吴郡陸績初仕郡户曹史飢荒太守君興使績於都亭賦民饘粥績悉􅂤閲其人訊以名氏事畢興問所賦幾何因說六百餘人皆分别姓字無有誤謬又曰王充字仲任上虞人家貧無書常逰洛陽肆閲所賣書輙能誦憶袁山松後漢書曰荀淑與陳寔神交及其棄朗陵而歸也數命駕詰之淑御慈明從叔慈抱孫文若而行寔亦令元方侍側季方作食抱孫長文而坐相對怡然嘗一朝求食季方尚少跪曰髙聞大人荀君言甚善竊聴之甑壊飯成麋寔曰汝聴談解乎諶曰唯因令與二慈說之不失一辭二公大恱典略曰延篤字叔堅南陽犨人初從堂磎季度受春秋左傳借夲便諷魏志曰初王粲與人共行讀道邉碑人問卿能誦否曰能即暗誦之不差一字觀人棊局壊粲為復之棊者不信以帊蓋局使更以他局為之用相比校不誤一道其強記嘿識如此吴志曰朱桓強識與人一面數十年不忘部曲妻子悉識之晉中興書曰陶侃明識過人武昌道上種楊樹人有竊之殖于其家侃見而識之問何以盗官所植乎時以為神益部耆舊傳曰張松識逹精異劉璋遣曹公楊脩以公所撰兵書示松飲讌之間一省即便闇誦禰衡别𫝊曰衡字正平黄射作章陵太守衡俱有所之見蔡伯喈所為碑正平一過視之歎之言好後各歸章陵自恨不令使寫之正平曰吾雖一過皆識其所言唯苐四行中石盡磨滅兩字不分明因援筆書之初無遺失唯兩字不着蔡琰别傳曰琰字文姬邕之女年六嵗邕鼓琴絃絶琰曰第一絃邕故斷其一絃問之琰曰第二絃邕故斷一絃琰曰第四絃世說曰夏侯䇿魏文示其爵里刺一見之悉憶俗說曰桓宣城䘮後家至貧孔夫人疾患湏羊解神不能得桓温以弟買得質牛羊主家富謂桓言僕乃不須買得郎為質但郎家貧幸可為郎養買得郎耳車騎冲也後江州出射堂射羊主東邉看射車騎猶識之呼来問公識我否答云不識桓公曰我是昔日買得郎也太平御覽卷四百三十二
