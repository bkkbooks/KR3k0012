body:
  text: 太平御覽卷六百三十九宋李昉等撰刑法部五聴訟易訟卦曰天與水違行訟君子以作事謀始又豐卦曰雷電皆至豐君子以折獄致刑詩曰蔽芾甘棠勿剪勿伐召伯所茇傳云茇草舎也召伯聴男女之訟不重煩勞百姓止舎甘棠之下而聴㫁焉又曰行露召伯聴訟也周禮曰以兩造禁民訟入束矢於朝然後聴之訟謂以財貨相告者造至也使訟者兩至使入束矢乃治之也不至不入束矢則是自服不直者也必入矢取其直也詩曰其直如矢束矢其百箇與以兩劑禁民獄入鈞金三日乃致於朝然後聴之獄謂相告以罪名者劑今券書也使獄者各齎券書既兩券書及使入鈞金又三日乃治之重刑也不齎券不入金則是自服不直者也必入金者取其堅也以嘉石平罷民嘉石文石也樹之外朝門左平成也成使善也以肺石逹窮民肺石赤石也窮民民之窮而無告也凡逺近惸獨老㓜之欲有復於上而其長弗達者立於肺石三日士聴其辭以告於王而罪其長又曰凡諸侯之獄訟以邦典定之邦典六典也凡卿大夫之獄訟以邦法斷之邦法八法也凡庶民之獄訟以邦成弊之邦成八成也又曰以五刑聴萬民之獄訟附于刑用情訊之至於旬乃弊之讀書則用法附猶着也訊言也用情理言之冀有可以出之者十日乃㫁之以五聲聴獄訟求民情一曰辭聴觀其出言不直則煩二曰色聴觀其顔色不直則赧然三曰氣聴觀其氣息不直則喘四曰耳聴觀其聴聆不直則惑五曰目聴觀其眸子不直則眊然又曰方士掌都家聴其訟獄之辭辯其死刑之罪而要之三月而上獄訟於國司冦聴其成於朝羣士司刑皆在各麗其法以議獄訟成平也獄訟成士師受中書其刑殺之成與其聴獄訟者又曰掌三刺三宥三赦之法以賛司冦聴獄訟一刺曰訊羣臣再刺曰訊羣吏三刺曰訊萬民訊言也一宥曰不識再宥曰過失三宥曰遺忘不識謂愚民無所識則宥之過失若今時律過失殺人不坐死康成謂識審也若今仇讎當報甲見乙誠以為甲而殺之者過失若舉刃欲斫伐而軼中人者遺忘若間帷薄忘有在焉而以兵矢投射也禮曰分争辯訟非禮不決又曰司冦正刑明辟以聴獄訟司冦秋官卿掌刑者辟罪也必三刺以求民情㫁明其獄訟之中一曰訊羣臣二曰訊羣吏三曰訊萬民有㫖無簡不聴簡誠也有其意無其誠不論以為罪附從輕附施刑也求出之使從􅁿赦從重雖是罪可重猶赦之凡聴五刑之訟必原父子之親立君臣之義以權之權平也意論輕重之序慎測淺深之量以别之意思念也淺深謂俱有罪本心有善惡悉其聰明致其忠愛以盡之盡其情也傳曰王叔陳生與伯輿争政二子王卿士王右伯輿右助也王叔陳生怒而出奔晉侯使士匄平王室王叔與伯輿訟焉争曲直王叔之宰與伯輿之大夫瑕禽坐獄於王庭士匄聴之范宣子曰天子所右寡君亦右之所左亦左之使王叔氏與伯輿合要王叔氏不能舉其契王叔奔晉論語曰子曰聴訟吾猶人也必也使無訟乎子曰片言可以折獄者其由也與片讀為卑片言為單辭折㫁也子路果敢所言必直故可令獄折辨又曰孟氏使陽膚為士師士師典獄之官問於曽子曽子曰上失其道民散久矣如得其情則哀矜而勿喜漢書曰于定國飲酒至數石不亂冬月治獄請讞飲酒益精明後漢書曰陳寵辟司徒鮑昱府是時三府掾屬専尚交㳺以不肯視事為髙寵常非之獨勤心物務數為昱陳當代便宜昱髙其能轉為辭曹掌天下獄訟續漢志曰三公掾属二十四人有辭曹主訟事也其所平決無不厭服衆心時司徒辭訟久者數十年事類溷錯易為輕重不良吏得生因縁因縁謂依附以生輕重也寵為昱撰辭訟比七卷決事科條皆以事類相從昱奏上之其後公府奉以為法又曰王渙為洛陽令以平正居身得寛猛之宜其寃嫌久訟歴政所不斷法理所難平者莫不曲盡情詐壓塞羣疑又能以譎數發摘姦伏譎詐數術也京師稱歎以為渙有神筭又曰法雄為青州刺史界内肅清雄每行部録囚徒察顔知情偽長吏不奉法即解印去之魏書曰廷尉髙柔時䕶軍營士竇禮近出不還營以為亡表言逐捕没其妻盈及男女為官奴婢盈連至州府稱寃自訟莫有省者乃辭詣廷尉柔問曰汝何以知夫不亡盈垂泣對曰夫少單特養一老嫗為母事甚恭謹又哀兒女撫視不離非是輕狡不顧室家者也柔重問曰汝夫不與人有怨讎乎對曰無柔曰與人交錢財乎對曰嘗出錢與同營士焦子文求不得時子文適坐小事繫獄柔乃見子文問所坐言次曰頗曽舉人錢否乎子文曰自以單貧初不敢舉人物也柔察子文色動遂曰汝昔舉竇禮錢何言不耶子文恠知事露應對不次柔問曰汝已殺禮便宜早服子文於是叩頭具首殺禮本末埋葬處所柔便遣吏卒承子文辭徃掘得其屍詔書復盈母子為平人晉書曰陸雲為浚儀令雲到官肅然下不能欺市無二價人有見殺者主名不立雲録其妻而無所問十許日遣出宻令人隨後謂曰不出十里當有男子候之與語便縛来既而果然問之具服云與此妻通共殺其夫聞妻得出欲與語憚近縣故逺相邀候於是一縣稱為神明又曰鄧攸嘗詣鎮軍将軍賈混混以人訟事示攸使決之攸不視曰孔子稱聴訟吾猶人也必也使無訟乎混竒之以女妻之又曰苻融仕苻堅為司𨽻校尉京兆人董豐逰學三年而返宿妻家妻為賊所殺妻兄疑豐殺之送豐有司豐不堪楚掠自誣引殺妻融察而疑之問豐曰汝行徃還頗有恠異及卜筮否豐曰初将發夜嘗夢乗馬南渡水返而北渡復自北而南馬停水中鞭䇿不去俯而視之見兩日在於水下馬左白而濕右黒而燥寤之心悸竊以為不祥問筮者筮者曰憂獄訟逺三枕避三沐既而妻為具沐夜授豐枕豐記筮者之言皆不從之妻乃自沐枕而寝融曰吾知之矣馬左白而濕濕水也左水右馬馮字兩日昌字也其馮昌殺之乃獲昌詰之昌到首服曰本與其妻謀殺董豐期以新沐枕為騐乃誤中婦人也宋書曰傅琰為山隂令有賣針賣糖嫗争絲各言己者詣琰琰掛而輕鞭之有鐵屑乃罰賣糖者又有二老争雞問何食一云食粟一云食豆剖之見粟罰言豆者人畏如神明也後魏書曰辛祥為并州平北府司馬㑹刺史喪朝廷以其公清遂越長史勅行州事祥初在司馬失白璧南兵樂道顯被誣為賊官屬推處咸以為然祥曰道顯面有悲色察獄以色其此之謂乎苦執申之月餘别獲真賊又曰李崇為揚州刺史先是夀春縣人荀泰有子三嵗遇賊亡失數年不知所在後見在同縣人趙奉伯家泰以状告各言己子並有隣証郡縣不能斷崇曰此易知耳二父與兒各在别處經禁數旬然後遣人告之曰君兒偶患向已暴死有教觧禁可出奔哀也荀泰聞即號咷悲不自勝奉伯咨嗟而已殊無痛意察知之乃以兒還泰詰奉伯詐状奉伯乃欵引云先亡一子故妄認之又曰裴安祖弱冠州辟主簿民有兄弟争財詣州相訟安祖召其兄弟以禮義責譲之此人兄弟明日相率謝罪州内欽服又曰唐和為内都大官評斷獄訟不加捶楚獲實者甚多世以是稱之又曰司馬悦字慶宗歴任豫州刺史時有汝南上蔡董毛奴者賫錢五千死於道路郡縣疑民張堤為刼又於堤家得錢五千堤懼笞掠自誣言殺獄至州悅觀色疑其不實引見毛奴兄靈之謂曰殺人取錢當時狼狽應有所遺此賊竟遺何物靈之曰唯得一刀鞘悦取視之曰此非里巷所為也召居州内刀匠視之屬有郭門者前曰此刀鞘門手所作去嵗賣與郭民董及祖悅収及祖詰之及祖欵引靈之又於及祖身上得毛奴所著皂襦及祖伏法悦察獄多此類也後周書曰建徳二年冬帝聴訟於正武殿自旦及夜繼之以燭又曰栁慶為雍州别駕冇賈人持金二十斤詣京師交易寄人停止每欲出行常自執管鑰無何緘閉不異而失之謂是主人所竊郡縣訊問主人遂自誣服慶聞而歎之乃召問賈人曰卿鑰恒置何處對曰恒自帶之慶曰頗與人同宿乎曰否與人同飲乎曰日者曽與一沙門酣晏醉而晝寝慶曰主人以痛自誣非盗也彼沙門乃真盗耳即遣吏逮捕沙門乃懐金迯匿後捕得盡獲所失之金又曰栁慶有胡家被刼郡縣按察莫知賊所隣近被囚繫者甚多慶以賊徒既衆似是烏合既非舊交必相疑阻可以詐求之作匿名書多榜官門曰我等共刼胡家徒侣混雜終恐泄露今欲首懼不免誅聴先首免罪便欲来告慶乃復施免罪之牓居二日廣陽王欣家奴面縛自告牓下因此推窮盡獲黨與慶守正明察毎歎曰昔于公斷獄無私闢髙門可以待封儻斯言有騐吾庶幾乎又曰蘇綽為六條詔書奏施行之其一先治心其二敦教化其三盡地利其四擢賢良其五恤刑獄其六均賦役文帝甚重之常置之座右隋書曰韋鼎為光州刺史有人客逰通主人家之妾及其還去妾盗物於夜迯亡尋於草中為人所殺主家知與妾通因告客殺之縣司鞫問具得姦状因斷客辜獄成上於鼎覽之曰此客實姦而非殺也乃某寺僧誘妾盗物令奴殺之贓在某處即放此客遣捕僧并獲贓物自是部内肅然咸稱其神又曰辛公義為牟州刺史下馬先至獄中因露坐牢側親自騐問十數日間決斷咸盡方還大㕔受領新訟皆不立文案遣當直佐寮二人側坐詰問事若不盡應須禁者公義即宿㕔事終不還閤人或諫之曰此事有程使君何自苦也荅曰刺史無徳可以道人尚令百姓係於囹圄豈有禁人在獄而心自安乎罪人聞之咸自欵服後有欲争訟者其鄉閭父老遽相曉曰此蓋小事何忍勤勞使君訟者多兩譲而止尚書大傳曰聴訟之術大畧有三治必寛寛之術歸於察察之術歸於義察猶審也是故聴而不寛是亂也寛而不察是慢也古之聴訟者言不越情情不越義是故聴民之術怒必畏畏思兼小罪勿兼怒責也責因之罪必思兼謂思其辭思其主思義重大罪可求以出之罪也又曰孔子如衞人謂曰公甫不能聴訟公甫魯大夫子曰不知公甫之不能聴獄也答而反之公甫之聴獄也有罪者懼無罪者恥民近禮矣春秋元命苞曰樹棘槐聴訟於下棘赤心有刺言治人者原其心不失其實所以刺人情令各歸實槐之言歸也情見歸實也山海經曰夏后啓之臣曰孟涂是司神于巴人聴其訟獄為之神主訟于孟涂之所令㫁之也其衣有血者乃執之㑹稽典録曰郡署鍾離意北部督郵烏程男子孫常常弟烈分居各得田半頃烈死嵗飢常稍以米粟給烈妻子輒追計直作券没取其田烈兒長大訟掾史議皆曰烈男孤兒遭飢頼常升合長大成人而更爭訟非順孫也意獨曰常身為伯父當撫孤弱是人道正義稍以升合券取其田懐姦挾私貪利忘義烈妻子雖以田與常困迫之至非私義也請常田俾烈妻子於是衆議無以奪意之理又曰謝夷吾字堯卿山隂人也為荆州刺史行部到南陽縣遇孝章皇帝巡狩駕幸魯陽上未嘗見刺史班秩有詔勅夷吾入傳録見囚徒誡長吏勿廢舊儀上臨西廂南面夷吾處東分帷隔其中夷吾省録囚徒有亭長姦部民者縣言和姦上意以為吏姦民何得言和觀刺史決當云何頃夷吾訶之曰亭長詔書朱幘之吏職在禁姦今為惡之端何得言和切譲三老孝弟兄長罪其所決正一縣三百餘事與上合章帝嘆曰使諸州刺史盡如此者朕不憂天下特遷鉅鹿太守臨發陛見賜車馬劒帶勅之曰鉅鹿劇郡舊為難治以君有撥煩之才故特授任無毁前勞張裴律序曰情者心也心戚則情動於中而形於言暢於四支發於事業是故姦人則必心愧而面赤内悼而色奪賈誼新書曰梁嘗有疑獄羣臣半以為不當罪半以為當罪雖梁王亦疑梁王曰陶朱公賢以布衣而富侔國必有竒知乃召而問曰梁有疑獄吏半以為不當半以為當奈何朱公曰臣鄙民也不知家有二璧其澤相如也其徑相如也然有其價一者千金一者五百金王曰徑與澤相如也一者千金一者五百金何也朱曰側而翫之一者厚倍是以千金梁王曰善故獄疑則從去賞疑則從與梁國大恱新序同也淮南子曰越王決獄不當援刀自割而戰士畢死感於恩也又曰秦始皇晝決獄夜理書説苑曰召公述職當蠶桑時不欲變民事故不入邑中舍乎甘棠之下而聽斷焉風俗通曰沛郡有富家公資二千餘萬小婦子年纔數嵗頃失其母又無親近其女不賢公因痛思念恐争其財兒必不全因呼族人為遺令書悉以財屬女但遺一劒云兒年十五以還付之其後又不肯與兒詣郡自言求劒時太守大司空何武也得其辭因録女及聓省其手書顧謂掾吏曰女性强梁聓復貪鄙畏賊害其兒又計小兒得此則不能全護故且俾與女内實寄之耳不嘗以劒與之乎夫劒者亦所以決斷限年十五者智力足以自居度此女聓必不復還其劒當問縣官縣官或能證察得以見伸展此凡庸何能用慮强逺如是哉悉奪取財以與子曰弊女惡聓温飽十嵗亦以幸矣於是論者乃服又曰臨淮有一人持疋縑到市賣之道遇雨被載後人求共庇䕃雨霽當别因共争鬭各云我縑詣府自言太守薛宣劾實兩人莫肯首服宣曰縑直數百錢有何足紛紛自致縣官呼騎吏斷縑各與半使追聴之後人曰受恩前縑主稱怨宣曰然固知當爾也因詰責之具服悉俾還本主又曰潁川有富室兄弟同屋兩婦俱懐孕大婦數月胎傷因閉匿不産期至到乳舍弟婦生男夜因盗取争訟三年州縣不能決丞相黄霸出殿前使卒抱兒去兩婦各十餘步叱婦自往取長婦抱持甚急兒大呌啼弟婦恐傷害之因乃放與而心甚自悽愴霸曰此弟婦子也責問大婦乃伏太平御覽卷六百三十九
