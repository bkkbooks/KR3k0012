body:
  text: 太平御覽卷二百九十四宋李昉等撰兵部二十五示弱示强示弱孫子曰兵者詭道也無常形以詭詐為道若息侯誘蔡楚子謀宋也故能而示之不能用而示之不用言已實能用師外示之怯也若孫臏示弱而制龎涓近而示之逺逺而示之近欲進而理去道也言多疑設其近誑曜敵軍示之以逺本從其近若韓信之襲安邑陳丹臨晉而渡夏陽又曰古人善用兵者能使敵人前後不相及衆寡不相持貴賤不相求上下不相扶卒離而不集兵合而不齊多設詐變出東見西攻南引北亂之使彼張惶離而不能聚也合於利而動不合於利而止左傳曰蔡聲子謂楚令尹屈建曰若敖之亂伯賁之子苗賁皇奔晉以為謀主及鄢陵之役楚晨壓晉軍而陣苗賁皇曰楚師之良在中軍王族而已若塞井夷竈成陣以當之欒范易行以誘之欒書時將中軍范士􅝂佐之易行謂簡兵備欲令楚貪已而不復顧二穆之兵易以䜴反行胡郎反中行二郤必尅二穆郤錡時將上軍中行偃佐之郤至佐新軍令此三人分二以攻二穆之兵楚子重子辛皆出穆王故曰二穆吾乃四萃於王族必大敗之四萃四面集攻之也晉人從之楚師大敗王夷師􅑒夷傷也吳楚之間謂火滅為􅑒子亷切子反死之鄭叛吳興則苗賁皇之為也戰國䇿曰趙將李牧常居代雁門備匈奴以便宜置吏市租皆輸入于幕府為士卒費日擊數牛饗士習騎射謹烽火多間諜厚遇戰士為約曰匈奴即入盗急入牧保有敢捕處者斬匈奴毎入烽火謹輒入牧保不敢戰如是數嵗亦不亡失然匈奴謂牧為怯趙王讓牧牧如故王怒使人代之嵗餘匈奴毎來出戰數不利復遣牧牧至如故約匈奴數來無所得終以為怯邊將日得賞賜而不用皆願一戰於是乃具戰車得千三百乗選騎得萬三千疋千金之士五萬人彀弓弩者十萬人悉勤習戰大縱畜牧人衆滿野匈奴小入佯北不勝以數千人委之單于聞之大喜率衆來入牧多為竒陣張左右翼擊大破之殺匈奴十餘萬騎單于奔走十餘嵗不敢近邊也又曰韓魏相攻齊將田忌率兵伐魏魏將龎涓聞之去韓而歸魏孫臏謂田忌曰彼三晉之兵素悍勇而輕齊齊為張怯善戰者因其勢而利導之兵法百里而趨利者蹶上將蹶猶挫也五十里走者軍半至使舉軍入魏地為十萬竈明日為五萬竈又明日為二萬竈龎涓行三日大喜曰我故知齊軍怯入吾地三日士卒亡者過半矣乃棄其歩兵與其輕銳倍日并行逐之并畢正切孫子度其行暮當至馬陵馬陵道狹而旁多阻險可伏兵乃斫大樹白而書之曰龎涓死此樹下於是令萬弩夾道而伏期日暮見舉火而俱發龎涓夜至斫木下見白書乃舉火燭之讀書未畢齊軍萬弩俱發軍大亂龎涓乃自刎曰遂成豎子之名漢書曰韓王信反帝往擊至晉陽聞信與匈奴欲擊漢上大怒使人使匈奴匈奴匿其壯士肥牛馬徒見其老弱及羸䇿使者十軰來皆言匈奴易擊帝使劉敬復徃使匈奴還報曰二國相撃此宜誇矜見所長今臣徃徒見羸胔老弱胔音漬一說讀曰瘠瘠瘦也此欲見短伏竒兵以争利愚以為匈奴不可擊也是時漢兵已逾句注三十萬餘衆兵已前行帝怒罵敬以為妄言阻軍械繫敬遂徃至平城匈奴果出竒兵圍高帝白登七日然後得解先賢行狀曰孫策攻陳登於匡琦城賊初到旌甲覆水咸勸登引避之登乃閉門自守示弱不戰將士歛聲寂若無人登乗城觀形勢知其可擊乃申命士衆宿整兵噐昧爽開門引軍至賊營緩歩抄其後賊周章方布陣不得還船登縱兵乗之賊遂大敗晉書曰李矩守滎陽城前趙劉聰將劉暢歩騎三萬討矩屯於韓王故壘相去七里遣使招矩時暢卒至矩未暇為備遣使奉牛酒詐降於暢潛匿精勇見其老弱暢不以為虞大饗渠帥人皆醉飽矩謀夜襲之暢僅以身免又曰慕容寳載記曰魏伐并州驃騎李農逆賊敗績寳引羣臣於東堂議之尚書封懿曰今魏師十萬天下之勁敵也示之以弱阻關拒戰計之上也陳書曰武帝東討杜龕侯安都居守北齊軍入據石頭遊騎至於闕下安都閉門偃旗幟示之以弱且令城中曰有登陴看賊者斬及夕賊收軍還石頭安都夜令士卒宻營禦敵之具明辰賊又至安都率甲士三百人開東西掖門與戰大敗之賊乃退還石頭不敢復逼臺城後周書曰隋文帝作相之初尉遲迥拒命遣將于仲文率兵定關東軍次蓼隄迥將檀讓擁衆數萬仲文以羸師戰讓悉衆來拒文仲偽北讓軍頗驕於是遣精兵左右翼撃之大敗讓軍進攻梁郡迥守將劉子寛棄城遁走隋書曰煬帝大業中彭城賊張大彪宋世模等衆至數萬人保懸薄山冦掠徐兖隋將董純討之純初閉營不與戰賊累挑之不出賊以純為怯不設備縱兵大掠純選精銳擊賊合戰於昌黎大破之斬首萬餘級築為京觀又曰隋末山賊孟讓衆號十萬屯盱眙煬帝遣王充保都梁山以拒之乆不與戰乃宣言士卒亡叛使賊中聞之讓果大笑曰王充文法吏何能為將吾當生縛之於是進攻其柵充與戰佯不勝讓益輕之乃分兵虜掠充知其可擊令軍中移竈撤幕設方陣乗四面而出戰大破之擄男女十萬餘口讓僅以身免六韜曰武王問太公曰敵人先已據便地形勢又强則如之何對曰當示以怯設伏兵佯走自投死地敵見之必疾而赴擾亂失次必離故所然後我伏兵齊起急擊前後衝其旁而走示强左傳曰楚將子元以車六百乗伐鄭入于桔柣之門桔柣鄭逺郊之門也衆車入自純門及逵市純門鄭外郭門也逵市郭内道上市也懸門不發楚言而出子元曰鄭有人焉懸門施於内城門鄭示楚以閒城門兵出而數楚言故子元畏不敢進也諸侯救鄭楚師夜遁鄭人將奔桐丘謀言曰楚幕有烏乃止幕帳也又曰楚大饑戎伐其西南戎山夷也庸人帥羣蠻以叛楚庸屬楚之小國麋人率百濮將伐楚百濮夷也於是申息之北門不啓庸中國也楚人謀徙於阪髙楚險地也蒍賈曰不可我能徃冦亦能徃不如伐庸夫麋與百濮謂我饑不能師故伐我我若出師必懼而歸百濮離居將各走其邑誰暇謀人乃出師旬有五日百濮乃罷自廬以徃振廩同食徃振伐庸也振發也廩食也同食上下無異饌也又曰晉文公率諸侯伐楚楚將子玉從晉師晉退三舍楚師不止又次於城濮楚師背􅈶而舎􅈶丘陵險阻名也􅈶音擕文公患之聽輿人之誦曰原田每每舎其舊而新是謀髙平曰原喻晉軍美盛若原田草每每然可以謀立新功不足念舊惠也晉大夫狐偃曰戰也戰而捷必得諸侯若其不捷表裏山河必無害也晉國外河而内山也晉軍七百乗韅靷鞅靽五萬二千五百人也在背曰韅在胷曰靷在腹曰鞅在後曰絆言駕乗修備韅許見切靷與進切晉侯登有莘之墟以觀師曰少長有禮其可用也有莘故國名也遂伐其木以益其兵伐木以益攻戰之具蓋亦示强也終敗楚師又曰晉侯伐齊齊侯登巫山以觀晉人使司馬斥山澤之險雖師不至必斾而䟽陣之斥候也疏建旌旗以為陣示衆也使乗車之衆左實右偽以斾先偽以衣服為之形也建旗以先驅輿曳柴而從之以揚塵齊侯見之畏其衆也乃脫歸脫不張旌幟也又曰蔡聲子聘楚謂令尹屈建曰子儀之亂析公奔晉以為謀主繞角之役析公曰楚師輕佻易震蕩也若多鼓鈞聲以夜軍之鈞同其聲楚師必遁晉人從之楚師宵潰晉遂侵蔡襲沈獲其君敗申息之師于桑隧獲申麗而還鄭於是不敢南面楚失華夏則析公之為也漢書曰景帝時匈奴大入上郡天子使中貴人從李廣中官之幸貴也勒習兵擊匈奴貴人將數十騎出獵見匈奴三人與戰被射傷中貴人殺其騎且盡中貴人走廣廣曰是必射鵰者也文穎曰鵰鳥也故使善射者射之師古曰雕大鷙鳥廣乃從百騎往馳三人令騎左右翼而廣身射彼三者殺其二人生得一人果射鵰者也已縛之匈奴數千騎見廣以為誘騎驚上山陣廣之百騎皆大恐還馳走廣曰吾去大軍數十里今若走匈奴追射我立盡今我留匈奴必以我為大軍誘之必不敢擊我令諸騎曰前未到匈奴陣二里所止令曰皆下馬解鞍騎曰虜多如是解鞍即急奈何廣曰彼以我為走今皆解鞍以示不走用堅其意胡騎遂不敢擊有白馬將出䕶其兵於是廣上馬與十餘騎奔射殺之而復還至其騎中解鞍令士皆縱馬卧是時㑹暮兵終怪之卒不敢擊向半夜時胡兵以為漢有伏軍於旁欲夜取之皆引兵去詰朝廣乃歸其軍後漢書曰亷范為雲中太守㑹匈奴大入塞范自率士卒拒之虜衆盛不敢敵㑹日暮令軍士各交縳兩炬三頭燃火虜遥見火多謂漢兵救至待朝將退范乃令軍中蓐食晨徃擊之斬首數百級虜自此不敢復向雲中又曰虞詡為武郡太守以討叛羗羗乃率衆數千遮詡於陳倉谷口詡即停車不進而宣言上書請兵湏到當發羗聞之乃分抄旁縣詡因其兵散日夜進道兼行百餘里令吏士各作兩竈或曰孫臏减竈而君増之兵法日行不過三十里以戒不虞而今日且二百里何也詡曰虜多衆吾兵少徐行則易為所及速進則彼所不測虜見吾竈日増必謂郡兵來迎衆多行速必憚追我孫臏見弱吾今示强勢有不同故也既到郡兵不滿三千而羗衆萬餘攻圍赤亭數十日詡乃令中使强弩勿發先用小弩羗以為矢力弱不能致敗并兵急攻詡於是使二十强弩共射一人發無不中羗大震退詡因出城奮擊多所傷殺明日悉陳其衆令從東郭門出北郭門入換易衣服廽轉數周羗不知其數更相恐動詡計賊當退乃潜遣五百餘人於淺水設伏候其走路虜果奔因掩擊大破之通典曰後漢末陳登為廣陵守孫䇿遣軍攻登於匡琦城登使人求救於曹公而宻去城十里治軍營處所令多取柴薪兩束一聚相去十歩縱横成行令俱起火火燃共聚城上稱慶若大軍到賊觀火驚潰登勒兵追之斬首萬級也又曰蜀大將軍諸葛亮屯於平陽引兵東下亮唯畱萬人守城魏將司馬宣王率二十萬衆拒亮六十里所偵候白宣王說亮在城中力弱將士失色亮是時意氣自若勅軍皆卧旗息鼔不得輒出卷幔開四門掃地却洒宣王疑是有伏兵於是引軍北趣山亮謂叅佐曰司馬懿謂吾有强兵復循山走矣候還白亮所言宣王後知深以為恨又曰西晉將杜元凱伐吳陳兵於江陵遣牙門管定周比伍巢等率竒兵八百汎舟夜渡以襲吳境多張旗幟起火巴山出于要害之地以奪賊心吳都督孫歆震恐與吳將伍延書曰北來諸軍乃飛渡江也皆破之又曰東晉末宋武帝為將討海賊孫恩恩在扈瀆海鹽令鮑陋遣子伺之以吳兵一千請為前驅宋武曰賊兵甚精吳人不習戰若前驅失利必敗我軍可在後為聲援不從是夜宋武多設伏兵兼置旗鼓然一處不過數人明日賊率衆乃萬餘迎戰前驅既交諸伏兵皆舉旗鳴鼓謂四面有軍乃引退伺之追奔為賊所迫及宋武且戰且退賊既盛所領死傷且盡宋武慮不免至向伏兵處乃止令左右脫取死人衣賊謂當走反停疑猶有伏宋武因呼更戰氣色甚猛賊以為然乃引軍去宋武徐歸然後散兵稍集又曰東晉末桓𤣥簒晉宋武帝起兵討𤣥使將桓謙何湛之屯覆舟山武帝使羸弱登蔣山多張旗幟𤣥不之測大懼武帝與劉毅等分為數隊進突謙陣皆殊死戰無不一當百東北風急軍中放火煙塵漲天鼓譟之音震駭京邑謙等諸軍一時奔散又曰蕭齊將馮道根守阜陵城戍初到阜陵理城隍逺斥堠如敵將至者衆頗笑之道根曰怯防勇戰此之謂也理城未畢㑹魏將黨法宗傅豎眼率衆二萬掩至城下道根塹壘未固城中衆少失色道根命開城門緩服登城選精鋭二百人出與魏軍戰敗之魏人見意閒且戰又不利因退走又曰後魏將宇文測行綏州事毎嵗河冰合後突厥即來冦先是常遣居人入城堡以避之測至皆令安堵如舊乃於要路數百處並多積柴仍逺遣斥候知其動静是年十二月突厥從連谷入冦去界數十里測命積柴之處一時縱火突厥謂有大軍至懼而遁走自相蹂踐委棄雜畜及輜重不可勝數測徐率所部收之分給百姓自是突厥不敢復至又曰梁雍州刺史岳陽王蕭詧雖稱藩附於西魏而尚有二心西魏將楊忠自樊城觀兵於漢濵易旗遞進實騎二千詧登樓觀之以為三萬也懼而伏焉崔鴻十六國春秋曰後趙石勒荆州監軍郭敬冦晉襄陽勒馳令敬退守樊城戒之使偃藏旗幟寂若無人彼若使人觀察則吿之曰自愛堅守後七八日大騎將至相禁不復得走矣敬使人浴馬於津周而復始晝夜不絶偵諜還告晉南中郎將周撫撫以為勒軍大至懼而奔於武昌敬遂入襄陽焉又曰前凉張重華以謝艾為軍師將軍率騎三萬進軍臨河後趙石勒將麻秋以三萬衆拒之艾乗軺車冠白㡊㡊苦洽切鳴鼓而行秋遥覩而怒曰艾年少書生冠服如此輕我也令黒矟龍騰三千人馳擊之艾左右大擾或勸乗馬艾不從乃下車踞胡牀指麾分處賊以為伏兵發也懼不敢進艾又遣將緣河截其後秋軍乃退艾乗擊大破之斬秋將杜勲及虜俘斬首三千級秋疋馬走還太平御覽卷二百九十四
