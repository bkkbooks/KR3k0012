body:
  text: 太平御覽卷三百八十九宋李昉等撰人事部三十嗜好容止嗜好禮記檀弓上曰孔子與門人立拱而尚右二三子亦皆尚右孔子曰二三子之嗜學也我則有姊之䘮故也二三子皆尚左䘮尚右隂也吉尚左陽也又祭義曰先王之孝也心志嗜欲不忘乎心又祭統曰不齋則於物無防也嗜欲無止也及其將齋也防其邪物訖其嗜欲耳不聽樂左傳閔公曰衛懿公好鶴鶴有乗軒者及有狄人之難國人皆曰鶴實有禄位余焉能戰遂敗又僖中曰齊侯好内多内寵内嬖如夫人者六人左傳襄公曰鄭伯有好田而嗜酒為窟室而夜飲酒擊鐘焉朝至未已朝者曰公焉在家臣故謂伯有為公其人曰吾公在壑谷壑谷窟室又昭公曰莒子庚輿虐而好劍苟鑄劍必試諸人又哀上曰曹伯陽即位好田弋曹鄙人公孫疆好弋獲白鴈獻之公羊傳僖公曰虞公貪而好寳及為晉所滅抱寳牽馬而出國語曰屈到嗜芰有疾召其宗老而屬之祭我必以芰子木曰夫子不以私欲奸國之典言不犯常法遂不用論語公冶長子曰十室之邑必有忠信如丘者焉不如丘之好學也雍也哀公問弟子孰為好學孔子對曰有顔囘者好學不遷怒不貳過不幸短命死矣衛靈公曰子曰吾未見好徳如好色者也家語曰子路見孔子曰汝何好對曰好長劍孔子曰加之以學豈可及乎子路曰南山有竹不操自直斬而用之射達於犀兕以此言之何用學焉子曰括而羽之所達深矣史記曰魏文侯問曰吳起何如人李克曰起貪而好色然其用兵司馬穰苴弗過也於是魏文侯以為將㧞秦五城汜増説項羽曰沛公居山東之時貪於財貨好美姬入闗財物無所取婦人無所幸此其志不在小漢書曰濟東王彭離昏暮私與其奴亡命少年數十人行剽殺人取財物以為好又曰漢家言律厯者本張蒼蒼好書無所不觀無所不通又曰朱買臣字翁子吳人也家貧好讀書不治産業又曰陳遵嗜酒毎大飲賔客滿座輙閉門取客車轄投井中雖有急不能出續漢書曰劉寛簡畧嗜酒不好盥浴東觀漢記曰耿弇字伯昭扶風人少好習學文業常郡試騎士建旗鼓四馳射由事好將帥之事又曰姜詩字士遊廣漢雒人也以傭作養母赤眉賊經其里落云不可驚孝子母好飲江水令児取溺死恐母知詐云行學嵗嵗作衣投於江中俄而涌泉出於舍側味如江水又曰更始韓夫人尤嗜酒毎侍飲常侍奏事輙怒曰帝方對我飲正酣何此時持事来乎起褫破書案謝承後漢書曰馬武字子張南陽人為人好酒豁達敢直言時在御前面折同列以為笑樂典畧曰荆州牧劉表跨有南土子弟驕貴並好酒設大針於杖端客有醉寢伏輙以針刺驗其醒醉晉書曰王濟好弓馬嘗乗一馬著連錢鄣泥前有水終不肯渡濟云此必是惜鄣泥使人解去便渡故杜預謂濟有馬癖晉中興書曰郭璞性輕易不持威儀嗜酒好色或過度其友人干寳常戒之曰此非適性爾璞曰吾所受有本限用之恒恐不盡乃憂酒為害乎後魏書曰辛少雍字季仲少有學行尤為祖父紹先所愛紹先愛食羊肝常呼少雍共食及紹先卒少雍終身不食羊肝宋書曰庾炳之性好潔士大夫造之者去未出户輒令人拭席洗床時陳郡殷冲亦好浄小史非净浴新衣不得近左右士大夫小不整潔每容接之炳之好潔反是冲每以此譏焉又曰謝靈運出為永嘉太守郡有名山水靈運素所愛好出守既不得志遂肆志遊遨遍厯諸縣動逾旬朔又曰劉邕所噉食毎異於人性嗜瘡痂以為味似蝮魚常詣孟靈休靈休先患瘡灸痂落床上邕因取食之靈休大驚邕荅云性之所嗜靈休瘡痂未落者悉禠取以貽邕邕既去靈休與何朂書曰邕向顧見噉遂舉體流血南康内史二百許人不問有罪無罪遞與鞭鞭痂常給邕膳齊書曰何脩之字士威廬江人也性好潔一日之中洗滌者十餘過猶恨不足時人稱為水滛于時又有遂安令劉為性彌净潔洒掃縣郭邑無横草漉水湔穢百姓不堪命遂免官又曰王思逺瑯琊臨沂人也好潔衣服垢穢方便不前形儀新楚乃與促膝然既去之後猶令二人交箒掃其坐處又曰眀帝好食逐夷以銀鉢盛蜜漬之一飡數鉢謂王景文曰此味卿頗足不景文曰臣夙好此味貧素致之甚難帝甚悦食逐夷積多胷腹不息氣將絶疾大困一食漬汁猶至三斗終以此卒管子曰吳王好劍而國士輕死墨子曰昔文公好士之惡服大夫䍧羊之裘韋以帶劍大帛之冠越王好士勇自焚其室曰越國之寳悉在此中王自皷蹈火而死者百餘人孟子曰曽晳嗜羊棗而曽子不忍食羊棗莊子曰子張見魯哀公哀公不理曰臣聞君好士不逺千里以見今見公之好士也有似葉公子髙之好龍葉公好龍室屋彫文以畫龍於是天龍聞而歸之見頭於牖拖尾於堂葉公見之棄而還走失其魂魄五神無主是葉公非好龍也好夫似龍而非龍也今君非好士也好夫似士而非士也尹文子曰昔齊桓公好紫闔境不鬻異綵又曰齊宣王好射所用弓不過三石以示左右左右引之皆曰此不下九石而宣王終身自以為用九石韓子曰齊桓公好服紫一國盡服紫當時十素不得一紫公患之管仲曰君欲止之何不試勿衣也謂左右曰甚惡紫臭公曰諾於是三日境内莫不知之又曰楚王與晉厲公戰於鄢陵楚師敗恭王傷目其戰之時司馬子反渇而求飲穀陽䜿操觴酒而進之子反曰此酒也䜿曰非也飲之子反謂之嗜酒弗能絶口又曰公儀休相魯而嗜魚一邦皆買魚而獻之公儀子不受又曰鄒君好服長纓左右皆服纓甚貴鄒君患之問左右對曰君服之百姓亦多服是故貴也鄒君因先自斷其纓而出國皆不服長纓賈誼曰文王使吕望傅太子發嗜鮑魚公不與曰鮑魚不登於俎豈有非禮而可養太子哉説苑曰魏文侯封太子擊於中山三年不往来趙倉唐曰君何不遣人使大國太子曰願之久矣未得可使者對曰臣願奉使於是遣倉唐緤北犬奉晨鳬獻之文侯曰擊愛我知我所嗜好風俗通曰趙王好大眉民間闊半額楚王好廣領國人没頸文士傳曰嵇康性絶巧好鍜家有盛栁樹乃汲水圜之夏天甚凉恒居其下自鍜有人就之康不受其直孝子傳曰隗通字君相犍為僰道人母好飲江脊水常乗船捷致漂浚辛苦忽然有横石特起直江脊後取水無復勞劇又曰陳遺為郡主簿母好食鐺底焦飯常持一囊盛之懸腰下郭子曰陸士衡初入雒張公云宜詣劉道真於是二陸既往劉尚在哀制性嗜酒禮畢初無他言唯問東吳有長柄葫蘆卿得種不陸兄弟殊失望乃云悔往世説曰謝𤣥年少好著紫羅香囊太傅患之而不欲傷其意賭得而焚之又曰林公好鶴往剡東時有人遺其雙鶴少時翅長欲飛林公意甚惜之乃鎩其翮鶴騫翥不能復起乃舒翼反頸視之殊似懊惱意林公曰既有凌霄之姿何肯為人作耳目近翫令翮成遂飛去又曰王武子好驢鳴既葬文帝臨其䘮顧語同遊曰王子好驢鳴可各作聲以送赴客皆一時作驢鳴語林曰王武子死孫子荆哭之甚悲賔客莫不垂涕哭畢向靈座曰卿常好我作驢鳴今我為君作體似聲其賔客皆笑孫聞之曰諸君不死而令王武子死賔客皆怒焉又戴叔鸞母好驢鳴叔鸞毎為驢鳴以樂其母又曰祖約少好財阮遥集好屐並常自經營同是一累而未判其得失有詣祖見料視財物客至拼擋不盡兩小簏以置背後傾身障之意未能平或有詣阮正見自蠟屐因嘆曰未知一生當著㡬兩屐神甚閒暢於是勝負始分也又曰王子猷嘗暫寄人空宅住使令種竹或問暫住何煩爾嘯詠良久直指竹曰何可一日無此君語林曰張湛好於齋前種松柏袁山松出遊好令左右挽歌時人謂張屋下陳尸袁道上行殯曹植求祭先王表曰先王喜鰒魚臣前以表徐州臧覇遺鰒魚二百枚足以供事容止毛詩曰臣工振鷺二王之後来助祭也二王夏殷也其後把宋也振鷺于飛于彼西雍我客戾止亦有斯容箋云有鳥集於西雍之津言所集得其處也亦有斯容言威儀之若鷺然也禮記玊藻曰君子之容舒遲足容重舉欲遲也手容恭髙且正也目容端不睇視也口容止不妄動也聲容静不噦咳也頭容直不傾顧也氣容肅似不息也立容徳如有予也色容莊勃如戰也坐如尸尸居神位敬慎也燕居告温温告謂教使詩云温温恭人凡祭容貌顔色如見所祭䘮容纍纍嬴備貌也色容㒹㒹憂思貌也視容瞿瞿梅梅不審貌也言容繭繭聲氣㣲也戎容暨暨果毅貌也言容詻詻教令嚴也色容厲肅儀刑貌視容清眀察於事立容辨卑毋讇辨讀為貶自貶卑謂磬折也又表記曰容貌以文之衣服以移之是故君子服其服則文以君子之容有其容則文以君子之辭左傳定下曰邾隠公来朝子貢觀焉邾子執玉髙其容仰公受玊卑其容俯子貢曰以禮觀之二君皆有死亡焉論語子張篇曽子曰堂堂乎張也難與並為仁矣言子張容儀盛於仁道薄難勉進漢書曰薛宣好威儀容甚可觀又曰息夫躬河南南陽人也少受春秋通覽詩書容貌壯麗為衆所異又曰江充召見大臺宫自請以所常被服見上上許之充衣紗單衣冠步揺冠為人魁岸容貌甚壯帝望見而異之謂左右曰燕趙固多竒士又曰武帝即位徴天下賢良待以不次之位自􅃷鬻者以千數東方朔上書曰臣朔年二十二長九尺三寸目若懸珠齒若編貝又曰王商為丞相河平四年單于来朝引見丞相坐未央庭中單于前拜謁商商起離席與言單于仰視商貌大畏之遷延却退天子聞而嘆曰此真漢相矣又曰司馬相如字長卿蜀郡成都人也至臨邛富人卓王孫請之相如時從車騎雍容閑雅甚都都美也詩曰不見子都王孫有女文君新寡竊從户窺心説而好之遂夜奔相如又曰雋不疑字曼倩渤海人也暴勝之為直指使者至東海素聞不疑賢請與相見望見不疑容貌尊嚴衣冠甚偉勝之躧履起迎續漢書曰侯覇字君房河南人為人矜嚴有威容家累千金不事産業篤志詩書師事房元常為都講東觀漢記曰上過潁陽祭遵以縣吏數進見上愛其容儀署為門下吏又曰虞延字子太陳留人為督都郵世祖聞而竒之二十年東廵路過小黄髙帝母召陵后園陵在焉時延為都督郵詔呼引見問園陵之事延進止從容跪拜可觀其陵樹株柏皆諳其數爼豆犧牲頗曉其禮帝善之勅延從駕西盡郡界賜錢及劍帶珮刀還郡又曰杜詩薦伏湛䟽曰容貌堂堂國之光輝智畧謀慮朝之淵藪齠齕勵志白首不衰實足以先後王室名足以光示逺人柱石之臣宜居輔弼英䧺記曰袁紹生而孤㓜為郎容貌端正威儀進止動見倣効弱冠除服長有清能名吳書曰張純字元基少厲操行學博才秀切問捷對容止可觀拜郎中補廣徳令治有異績擢為太子輔義都尉吳録曰滕允年十二孤單㡬獨為人白晳威儀可觀毎正朔朝㑹脩覲在位大臣見者莫不歎賞魏志曰延康元年蜀將孟達率衆降達有容止可觀文帝甚器愛之使達為新城太守加散騎常侍蜀志曰魏文帝察黄權有局量試欲驚之遣左右請權未至之間累催相屬焉使奔馳交錯於道官屬莫不禠魄而權舉止顔色自若後領益州刺史大將軍司馬宣王深器之問權曰蜀中有卿軰㡬人權笑而不荅曰不圖眀公見顧之重蜀志曰彭永年廣漢人身長八尺容貌甚偉恣性驕傲多所輕忽惟敬同郡秦子勑吳志曰張昭容貌矜嚴有威風權嘗曰孤與張公言不敢忘也舉邦憚之王隠晉書曰王褒少立操尚非禮不動非法不言身長八尺四寸容貌絶異音聲清亮辭氣韶雅沈約宋書曰元㓙弑逆義宣發哀即日便舉兵張暢為元佐位居僚首哀容俯仰䕃映當時舉哀畢變服着黄韋袴褶出射堂簡人音姿容止莫不矚目見之者皆願為盡命焉又曰羊欣字敬先少静黙無兢於人美言笑善容止編覽經籍尤長隸書賈誼新書曰朝廷之容師師然翼翼然整以敬祭祀之容蓬蓬然粥粥然敬以婉軍旅之容幅然肅然固以猛䘮紀之容怮然懾然若不還顧譚𫝊曰譚字子嘿吳人常慕賈誼之為人身長七尺八寸少言笑容貌矜整有圭璋威重未嘗失色於物非其人或終日不言顔含别傳曰顔髦字居道含之子也少慕家業惇於孝行儀狀嚴整風貌端美桓公見而歎曰顔侍中廊廟之望也桓邵别傳曰邵字敬倫丞相之第五子清貴簡素風姿甚美而善治容儀雖家人近習莫見其怠惰之貌温稱之曰可謂鳯雛三輔决録曰竇叔髙名元為上郡計吏朝㑹數百人儀狀絶衆天子異之詔以公主妻之出同軰調笑焉叔髙時已自有妻不敢以聞方欲迎婦與訣未發而詔召叔髙就第成婚益部耆舊傳曰張肅有威儀容貌甚偉弟松為人短小不持節操然識達精果有材幹劉璋乃遣詣曹公曹公不甚禮楊脩深器之脩以所撰兵書示松飲讌之間一省即便闇誦脩以此異之㑹稽典録曰賀邵善姿容正其衣冠尊其瞻視動静有常與人交久益敬之至於官府左右莫見其跣坐常着韈希見其足荀氏家傳曰荀羡風器英秀識雅標貴眀鬚眉俊音氣俯仰顧盻容止可則世説曰太尉總角時嘗造山司徒王神情眀秀風姿詳雅山公嗟嘆者良久既去目之而言曰何物老嫗生爾寧馨児然恐誤天下生民者未必非此人又曰崔琰字季珪聲姿髙朗鬚長四尺盛有威重武帝見匈奴使自以形陋不足以䧺逺國使季珪代自捉刀立床頭既畢令間諜問曰魏王何如荅曰王䧺望非常然床頭捉刀人此乃英䧺也魏武追殺其使又曰裴令公有容儀脱冠冕粗服亂頭皆好時人以為玊人又曰時人見稽中散歎曰蕭蕭如長松下風髙而且深山公曰嵇叔夜巖巖若孤松之獨立及其醉也如玉山之將頽又曰王右軍見杜宏治歎曰面如凝脂眼若㸃漆此神仙中人也又時人謂右軍飄若遊雲矯若驚龍又曰海西時諸公每朝朝堂猶暗唯㑹稽王来軒軒若朝霞舉太平御覽卷三百八十九
