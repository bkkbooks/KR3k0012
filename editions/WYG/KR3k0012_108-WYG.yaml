body:
  text: 太平御覽卷一百八宋李昉等撰皇王部三十三唐髙祖神堯皇帝唐髙祖神堯皇帝唐書曰髙祖神堯皇帝姓李諱淵其先隴西狄道人凉武昭王暠七代孫也暠生歆歆生重耳仕魏為𢎞農郡太守重耳生熙為金門鎮將領豪旗鎮武川因家焉儀鳳中追尊宣皇帝熙生天賜仕魏為憧主儀鳳中追尊光皇帝生皇祖諱虎後魏左僕射封隴西郡公與周文帝及太保李弼大司馬獨孤信等以功㕘佐命當時稱為八柱國家乃賜姓大野氏周受禪追封唐國公至隋文帝作相還復本姓武徳初追尊景皇帝廟號太祖皇考諱昞音丙周安州總管柱國大將軍襲唐國公諡曰仁武徳初追尊元皇帝廟號世祖髙祖以周天和元年生於長安年七嵗襲唐國公及長倜儻豁達任性直率寛仁容衆無貴賤咸得其歡心隋受禪補千牛備身文帝獨孤皇后即髙祖之從母也由是時見親愛累轉譙隴岐三州刺史有史世良者善相人謂髙祖曰公骨非常必為人主願自愛勿忘鄙言髙祖頗以自負大業初為滎陽樓煩二郡太守徵為殿内少監九年遷衛尉少卿遼東之役督運於懐逺鎮及楊𤣥感反詔髙祖馳驛鎮𢎞化郡兼知闗右諸軍事髙祖厯試中外素樹恩徳及是招納豪傑衆多款附時煬帝多所猜忌人懐疑懼㑹有詔徵髙祖詣行在所遇疾未謁時甥王氏在後宫帝問曰汝舅何遲王氏以疾對曰可得死不髙祖聞之益懼因縱酒沉湎納賄以混其迹焉十一月煬帝幸汾陽宫命髙祖徃山西河東黜陟討捕師次龍門賊帥馬端兒帥數千薄於城下髙祖從十餘騎撃之所射七十發皆應弦而倒賊乃大潰十三年為太原留守郡丞王威武牙郎將髙君雅為副將羣賊蠭起江都阻絶太宗以晉陽令劉文静及門下客長孫順徳劉𢎞基各募兵旬日間衆具一萬宻遣使召世子建成及元吉於河東威與君雅見兵大集恐髙祖為變相與疑懼請髙祖祈雨於晉祠将為不利晉陽卿劉世龍知之以吿髙祖隂為之備五月甲子髙祖與威君雅視事太宗宻嚴兵於外以備非常遣開陽府司馬劉政㑹告威等謀反即斬之以徇遂起義兵遣劉文静為使於突厥始畢可汗令率兵相應六月甲申命太宗將兵向西河下之癸巳建大將軍府并置三軍分為左右開倉以賑窮乏逺近響應秋七月髙祖率兵西圖闗中以元吉為鎮北將軍太原留守癸丑發自太原有兵三萬餘丙辰師次靈石營於賈胡堡隋武牙郎將宋老生屯霍邑以拒義師㑹霖雨積旬餽運不給髙祖命旋師太宗切諌乃止有白衣老父詣軍門曰余為霍山神使謁唐皇帝曰八月雨止路出霍邑東南吾當濟師髙祖曰此神不欺趙無䘏豈負我哉八月辛巳髙祖引師趨霍邑斬宋老生平霍邑丙戌進下臨汾郡及絳郡癸巳至龍門突厥始畢可汗遣康稍利率兵與劉文静㑹于麾下隋驍衛大將軍屈突通鎮河東津梁斷絶闗中向義者頗以為阻於是水濵居人競進舟檝不謀而至者前後數百人九月壬寅馮翊賊帥孫華土門賊帥白𤣥度各率其衆送欵并具舟檝以待義師髙祖令華與統軍王長諧劉𢎞基引兵渡河屈突通遣其虎牙郎將桑顯和率兵數千夜襲長諧義師不利太宗以逰騎數百掩其後顯和潰散義師復振丙辰馮翊太守萬造以郡來降戊午髙祖親率衆圍河東屈突通自守不出乃命攻城不利而還文武將吏請髙祖領太尉加置僚佐從之華隂令李孝常以永豐倉來降庚申唐髙祖率軍濟河舎長春宫三秦士庶至者以千數髙祖禮之咸過所望人皆喜恱丙寅遣隴西公建成司馬劉文静屯兵永豐倉兼守潼闗以備他盗太宗率劉𢎞基長孫順徳等前後數萬人自渭北徇三輔所至皆下髙祖從父弟神通起兵鄠縣柴氏婦起兵於司竹至是並與太宗㑹乙亥命太宗自渭汭屯兵阿城隴西公建成自新豐趣覇上髙祖率大軍自下邽西所經煬帝行宫園苑悉罷之宫女放還親屬冬十月己巳至長樂宫有衆二十萬隋京師留守刑部尚書衛文昇右翊將軍隂世時京兆郡丞滑儀挾代王侑音宥以拒義師髙祖遣使至城下喻以匡復之義再三皆不報諸將固請圍城十一月丙辰攻㧞京城衛文昇先以病死隂世師滑儀等拒義兵並斬之癸亥率百僚備法駕立代王侑為天子遙尊煬帝為太上皇大赦改元為義寕甲子隋帝詔加髙祖假黄鉞使持節大都督内外諸軍事大丞相進封唐王總錄萬機以武徳殿為丞相府改教為令以隴西公建成為唐國世子太宗為京兆尹改封秦公臧公元吉為齊公十二月乙未丞相府置長史司錄以下官僚金城賊帥薛舉㓂扶風命太宗為元帥擊之遣趙郡公李恭招慰山南所至皆下癸巳太宗大破薛舉之衆於扶風屈突通自潼州奔東都劉文静等追擒於閿音聞鄉虜其衆數萬河南大守蕭瑀以郡降丙午遣雲陽令詹俊武沂縣正李仲充徇巴蜀下之二年春正月戊辰世子建成為撫安大將軍東討元帥太宗為副總兵七萬徇地東都三月丙辰右屯衛將軍宇文化及弑隋太上皇於江都宫立秦王浩為帝自稱大丞相徙封太宗為趙國公戊辰隋帝進髙祖位相國總百揆備九錫之禮唐國置丞相以下立皇髙祖以下四廟於長安通義里第夏四月戊戌世子建成及太宗自東都班師五月乙巳天子詔髙祖冕十二旒建天子旌旗出警入蹕王后與王子王女爵命之號一遵舊典戊午隋帝詔遣使持節兼太保刑部尚書光祿大夫梁郡公蕭造兼太尉司農少卿裴之隐奉皇帝璽綬于髙祖髙祖辭讓百僚上表勸進至於再三乃從之隋帝遜於舊邸改大興殿為太極殿甲子髙祖即皇帝位於太極殿命刑部尚書蕭造兼太尉告于南郊大赦天下改隋義寕二年為唐武徳元年官人百姓賜爵一級義師所行之處給復三年罷郡置州改太守為刺史丁夘宴百官於太極殿賜帛有差東都留守兵立隋越王侗為帝壬申命國相長史裴寂等修律令六月甲戌太宗為尚書令廢隋大業律令頒新格乙夘備法駕迎皇髙祖宣簡公已下神主入太廟追諡妃竇氏為穆皇后庚辰立世子建成為太子太宗為秦王齊國公元吉為齊王諸州總管加號使持節癸未封隋帝為酅國公薛舉㓂涇州命秦王為西討元帥征之改封永康王神通為淮安王壬辰加秦王為雍州牧餘官如故秋七月秦王與薛舉大戰於涇州我師敗績八月壬午薛舉死其子仁杲復僣稱帝命秦王為元帥討之涼州賊帥李軌以其地來降拜涼州總管封涼王九月乙巳親錄囚徒辛未追諡隋太上皇為煬帝宇文化及至魏州鴆殺秦王浩僣稱天子國號許冬十月李宻率衆來降十一月秦王大破薛仁杲於淺水原降之隴右平乙巳涼王李軌僣稱天子於涼州詔頒五十三條格以約法緩刑十二月壬申加秦王太尉陜東道大行臺庚子李宻叛於桃林行軍總管盛彦師追討斬之二年春二月丁酉竇建徳攻宇文化及於聊城斬之傳首突厥閏月辛丑劉武周侵我并州己酉李宻舊將徐世勣以黎陽之衆及河南十郡降授黎州總管封曹國公賜姓李氏庚戌上㣲行都邑以察北俗即日還宫甲寅賊帥朱粲殺我使㪚騎常侍段確奔洛陽夏四月乙巳王世充簒越王侗僣稱天子國號鄭辛亥李軌為其偽尚書安興貴所執以降河右平九月辛未賊帥李子通據江都僣稱天子國號呉沈法興據毘陵僣稱梁王丁丑和州賊帥杜伏威遣使來降授和州總管東南道行臺尚書令封楚王裴寂與劉武周將宋金剛戰於介州我師敗績右武衛大將軍姜寳誼死之并州捴管齊王元吉懼武周所逼奔於京師并州陷乙未京師地震甲子上親祠華山十一月丙子竇建徳陷黎陽盡有山東之地淮安王神通左武信大將軍李世勣皆沒於賊十二月丙申永安王李基工部尚書獨孤懐㤙總管于笻為劉武周宋金剛掩襲並殺焉甲辰狩於華山壬子大風抜木三年春正月辛巳幸蒲州命祀舜廟癸巳上至自蒲州甲午李世勣於竇建徳所自拔歸國建徳僣稱夏王四月甲寅加秦王益州道行臺尚書令秦王大破宋金剛於介州金剛與武周俱奔突厥遂平并州偽總管尉遲敬徳等以介州降六月壬辰徙封楚王杜伏威為吴王賜姓李氏加授東南道行臺尚書令丙午親錄囚徒七月壬戌命秦王率諸軍討王世充遣皇太子鎮蒲州以備突厥丙申突厥殺劉武周於白道冬十月庚子懐戎賊帥髙開道遣使來降授蔚州總管封北平郡王賜姓李氏四年五月乙未秦王大破竇建徳之衆於武牢擒建徳河北悉平丙寅王世充舉東郡降河南平秋七月甲子秦王凱旋獻㨗太廟丁夘大赦天下廢五銖錢行開元通寳斬竇建德於市流王世充於蜀甲戌建徳餘黨劉黒闥據漳南反置山東道行臺尚書省於洛州秋八月兖州捴管徐圓朗舉兵反以應劉黒闥僣稱魯王冬十月乙丑加秦王天䇿上將軍位在王公上領司徒陜東道大行臺尚書令齊王元吉為司空乙巳趙郡王李恭平荆州獲蕭銑五年春正月丙申劉黒闥據洺州僣稱漢東王三月丁未秦王破劉黒闥於洺水上盡復所陷州縣黑闥亡奔突厥蔚州總管北平王髙開道叛冦易州夏四月庚戌秦王還京師髙祖迎勞於長樂宫壬申代州總管定襄郡王大思為虜所敗戰死六月劉黑闥引突厥冦山東置諫議大夫官貟七月隋漢陽太守馮益以南越之地来降嶺表悉定八月辛亥以洛荆并幽交五州為大總管府改封恒山王承乾為中山王塟隋煬帝於揚州丙辰突厥頡利冦雁門乙未進㓂朔州遣皇太子及秦王討擊大敗之冬十月己酉遣齊王元吉撃劉黑闥於洺州時山東州縣多為黑闥所守所在殺良吏以應之行軍總管淮陽王道𤣥與黑闥戰於下博道𤣥敗沒十一月甲申命皇太子率兵討劉黑闥丙申幸冝州簡閱將士十二月庚辰校獵於華池庚申至自冝州皇太子破劉黑闥於魏州斬之山東平六年春二月辛夘校獵於驪山三月乙未幸昆明池宴百官夏四月己未幸舊宅改為通義宫曲赦京城繫囚於是置酒為㑹賜從官帛各有差癸酉以尚書右僕射魏國公裴寂為左僕射中書令宋國公蕭瑀為右僕射秋七月突厥頡利㓂朔州遣皇太子及秦王屯并州以備之八月東南道行臺左僕射輔公祏據丹陽反僣稱宋王遣趙郡王孝恭及嶺南道大使永康縣公李靖討之丙寅吐谷渾内附九月丙子突厥退皇太子班師七年二月丁巳幸國子學親臨釋奠改大總管府為大都督府三月戊寅廢尚書省六司侍郎增吏部郎中秩正四品掌選事戊戌趙郡王孝恭大破輔公祏擒之丹陽乃平四月庚子大赦天下頒行新律令以天下大定詔遭父母喪者許終制五月造仁智宫於冝州之冝君縣李世勣討徐圓朗平之六月辛丑幸仁智宫秋七月巂音髓州地震山崩江水咽流八月戊辰突厥㓂并州京師戒嚴壬午突厥退京師觧嚴八年夏六月甲子幸太和宫突厥㓂定州命皇太子往幽州秦王往并州以備突厥八月并州道總管張公謹與突厥戰於大谷王師敗績中書令温彦博沒於賊九月突厥退冬十月辛巳幸周氏陂校獵因幸龍躍宫九年春正月丙申命州縣修城隍備突厥尚書左僕射魏國裴寂為司空二月庚申加齊王元吉為司徒戊寅親祀社稷三月辛夘幸昆明池六月庚申秦王以皇太子建成與齊王元吉同謀害已率兵誅之詔立秦王為皇太子總統萬幾大赦天下八月癸亥詔傳位於皇太子尊帝為太上皇徙居𢎞義宫改名太安宫貞觀二年三月戊申髙祖讌西突厥使者於兩儀殿顧謂長孫無忌曰當今蠻夷率服古未嘗有無忌上萬嵗夀髙祖大恱以酒賜太宗太宗又奉觴上夀流涕而言曰百姓獲安四夷咸附皆尊奉聖旨豈臣之力於是太宗與文徳皇后立進御膳并上服御衣物一同家人常禮是嵗閱武於城西髙祖親自臨視勞將士而還置酒於未央宫三品已上咸侍髙祖命突厥頡利可汗起舞又遣南越部長馮智戴詠詩既而笑曰胡越一家自古未之有也太宗奉觴上夀曰臣早䝉慈訓教以文道爰從義旗平定京邑重以薛舉武周世充建徳等皆上禀筭籌幸而尅定三數年間混一區宇天慈崇寵遂蒙重任上天垂祐時和嵗阜被髪左衽並為臣妾此豈臣智力皆由上禀聖算髙祖大恱羣臣皆呼萬嵗九年五月庚子髙祖大漸下詔從漢制以日易月園陵制度務從儉約是日崩於太安宫之垂拱前殿年七十諡曰大武皇帝廟號髙祖葬獻陵上元元年敬上尊號曰神堯皇帝天寳十三年上尊號曰神堯大聖大光孝皇帝太平御覽卷一百八
