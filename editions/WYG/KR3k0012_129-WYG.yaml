body:
  text: 太平御覽巻一百二十九宋李昉等撰偏覇部十三南齊蕭道成蕭賾蕭昭業蕭昭文蕭鸞蕭寳巻蕭寳融蕭道成蕭子顯齊書曰太祖高皇帝諱道成字紹伯小字鬬将漢相何二十四世孫也何孫侍中彪免官居東海蘭陵郡於是為蘭陵人太祖以元嘉四年丁卯歳生龍顙鍾聲鱗文遍體儒士雷次宗立學鷄籠山年十三受業治禮記及左氏春秋襲爵晉興男除江夏王大司馬參軍員外郎直閣中書舍人右軍将軍尋陽王反加輔國将軍帥衆東討一日破十二壘轉冠軍将軍持節都督北討諸軍事鎮淮隂遷督徐兖二州軍事南兖州刺史明帝嫌太祖非人臣相民間流言云蕭道成當為天子帝愈以為疑遣鎮軍将軍吳喜以三千人北使令喜留軍破釡自将銀壺酒封賜太祖戎服出門迎即酌飲之喜還帝意乃悦七年徵還京師部下勸勿就徵太祖曰諸卿闇於見事主上誅諸弟太子稚弱作萬歲後計何關他族唯應速發事緩必見疑今骨肉相害自非靈長之運禍難将興方與卿等戮力及還京拜散騎常侍太子左衛帥時世祖以功當别封贛縣太祖以一門二封固辭不受詔許之加二百户明帝崩遺詔為右衛将軍領衛尉加兵五百人與尚書令袁粲護軍禇淵領軍劉勔共掌機事加侍中江州刺史桂陽王休範反出頓新亭以拒之加使持節平南将軍給鼓吹一部治新亭城壘未畢賊前軍已至太祖方解衣卧以安衆心索白虎幡登西垣使寧朔将軍高道慶羽林監陳顯達員外郎王敬則浮舸與賊水戰自新亭至赤岸大破之平明乃振旅凱旋百姓縁道聚觀曰全國家者此公也遷散騎常侍中領軍都督二兖徐青冀五州鎮軍将軍南兖州刺史進爵為公増邑二千户與袁粲禇淵劉秉更日入直號為四貴四年加尚書左僕射威名既重蒼梧王深相猜忌幾加大禍陳太妃罵之曰蕭道成有功於國今若害之後誰復為汝著力者乃止楊玉夫等殺蒼梧王迎立順帝太祖移鎮東府進侍中司空録尚書事竟陵郡公進太尉都督十六州諸軍事自大明太始以來相承奢侈百姓成俗太祖輔政罷御府尚方諸飾玩至是又上表禁人間華偽雜物不得以金銀為箔馬乗具不得金銀度不得織成繡裙道路不得著錦履不得用紅色為旙葢衣服不得翦綵帛為雜花不得以七寳飾樂器不得以金銀為花獸不得輙鑄金銅為像又進假黄鉞都督中外諸軍事太傅領揚州牧劒履上殿入朝不趨賛拜不名署左右長史司馬從事中郎掾屬各四人太尉録尚書事南徐州如故三月進相國緫百揆封十郡為齊公備九錫之禮加璽紱逺遊冠位在諸侯王上四月進爵為王又命冕十有二旒建天子旌旗出警入蹕樂舞八佾辛卯宋使兼太保淵兼太尉僧䖍奉璽綬禪位建元元年四月甲午即位於南郊柴燎告天昇壇受禪禮畢即建康宫大赦改昇明三年為建元元年封宋帝為汝隂王五月汝隂王薨追諡為宋順帝四年三月庚申召司徒禇淵左僕射王儉詔曰吾遘疾彌留至于大漸公等奉太子如事吾當令太子敦睦親戚委任賢才崇尚節儉𢎞宣簡惠則天下之理盡矣壬戌崩於臨光殿年五十六四月上諡曰太祖髙皇帝上少有大量博涉經史其後經綸夷險不廢素業後宫器物欄檻以銅為飾者改用鉄内殿施黄紗帳宫人著紫皮履欲以身率下移風變俗毎曰使我治國十年當使金土同價四月庚寅葬武進大陵蕭賾蕭子顯齊書曰世祖武皇帝諱賾字宣逺太祖長子也小諱龍兒生於建康清溪宅其夜陳孝后劉昭后同夢龍據屋上故以字上初為尋陽國侍郎辟西曹書佐出為贛令尚書庫部桂陽王休範反上遣軍襲尋陽事平除晉熈王諮議遷司徒右長史黄門郎散騎常侍江州刺史徵拜侍中領軍将軍給鼓吹一部又加持節都督京畿諸軍事僕射中軍大将軍開府儀同三司進爵為公給班劒二十人齊國建為世子加侍中南豫州刺史給油絡車羽葆鼓吹以石頭為世子宫置二率坊省服章一如東宫進為太子及太祖即位為皇太子太祖崩上即位乙丑稱先帝遺詔以司徒禇淵録尚書左僕射王儉為尚書令丙申立皇太子妃王氏永明元年正月辛亥南郊大赦改元四年正月辛亥藉田禮畢甲寅幸閱武堂勞酒小會十一年正月皇太子長懋薨甲午立太孫昭業為皇太孫七月上不豫徙居延昌殿登階而殿屋鳴咤甚惡之戊寅大漸詔曰始終大數聖賢不免行年六十亦復何恨但皇業艱難萬機事重不能無遺慮耳太孫進德日茂社稷有寄子良善相毗輔思𢎞治道百辟庻僚各奉爾職謹事太孫勿有懈怠知復何言又詔曰我識滅之後身著夏衣器服悉不得用寳勿以牲牢為祭祭唯設䴵茶飯酒脯而已喪禮每存省約不須煩民百官六時入臨又顯陽殿玉像諸佛及供養具如别牒可盡心禮拜供養自今公私皆不得出家為道及起立塔寺以宅為精舍并嚴斷之唯年六十必有道心者聽朝賢選序已有别詔是日崩年五十四九月丙寅葬景安陵帝剛毅有斷為治總大體以富國為先頗不喜逰宴彫綺之事言常恨之未能頓遣臨崩又詔諸凡遊費宜從休息自今逺近薦獻務存節儉珠玉玩好傷工尤重嚴加禁絶蕭昭業蕭子顯齊書曰鬰林王昭業字元尚小名法身文惠太子長子也世祖即位封南郡王文惠太子薨立為皇太孫即位追尊文惠太子為世宗文皇帝隆昌元年正月大赦改元加太傅竟陵王子良殊禮閠月丁卯以鎮軍大将軍西昌侯鸞即本號開府儀同三司七月癸巳太后令曰嗣主持鍾沴氣爰自弱齡入纂鴻業長惡滋甚居喪無一日之哀衰絰為歡宴之服昏酣長夜萬機斯壅社稷危殆有過綴旒鎮軍居正體道國家是頼伊霍之舉實寄淵謨便可依舊典以禮廢黜中軍新安王體自文皇叡哲天秀冝入嗣鴻業永寧四海外即以禮奉迎昭業少美容止好𨽻書世祖勅皇孫手書不得妄出以貴重之甚有令譽王侯五日一問訊世祖帝獨呼昭業至幄座别加撫問呼為法身甚重愛之時文惠太子禁其起居節其用度昭業謂豫章王妃庾氏曰阿婆佛法言有福德福生帝王家今日見作天子便是大罪左右主師動見拘執不如作市邉屠沽冨兒百倍矣及即位極意賞賜動百數十萬毎見錢曰昔時思汝一文不得今得用汝未朞年之間世祖齋庫儲錢數億垂盡開主衣庫與皇后寵姬觀之給閹人豎子各數人隨其所欲恣意輦取取寶器以相掊擊破碎之以為笑樂好鬭雞宻買雞至數千價世祖御物丼草杖宫人寸斷用之毁世祖招婉殿以材賜閹人徐龍駒龍駒尤親幸為後閹舍人日夜在六宫房内昭業與文帝幸妃霍氏淫通龍駒勸長留内聲言度霍氏為尼以餘人代之皇后亦淫亂齋閤通夜洞開内外淆雜無復分别壬辰蕭鸞等率兵自尚書入雲龍門戎服加朱衣于上帝在壽昌殿聞外有變使閉内殿諸閹人登興光樓望報云見一人戎服從數百人在西鍾下須臾蕭鸞領兵先入帝走向愛姬徐氏房拔劒自刺不中以帛纏出殺之餘黨亦見誅卒時年二十一葬以王禮蕭昭文蕭子顯齊書曰海陵恭王昭文字季尚文惠太子第二子也封林汝公鬰林王即位改封新安王及鬰林王廢尚書令西昌侯鸞奉帝纂統延興元年七月丁酉即位以尚書令鎮軍大将軍西昌侯鸞録尚書事揚州刺史封宣城郡公十月進為太傅揚州牧加殊禮進爵為王輔政帝起居皆諮而後行思食蒸魚菜太官以無録公命不與辛亥皇太后令曰嗣主幼冲庻政多昧早􅈾尫疾弗克負荷太傅宣城公冝入承寶命式寧宗社帝可降封海陵恭王十一月稱王有疾數遣御師覘視乃殞之時年十五諡曰恭王蕭鸞蕭子顯齊書曰髙宗明皇帝諱鸞字景棲始安真王道生子少孤太祖撫育恩過諸子在宋世為安吉令有嚴能之名遷寧朔将軍淮南宣城二郡太守太祖踐祚遷侍中封西昌侯建元二年持節冠軍将軍郢州刺史世祖即位轉度支尚書侍中領驍騎将軍王子侯舊乘纏帷車髙宗獨乘下帷儀從如素士遷中領軍左衛将軍豫州刺史尚書僕射領右衛将軍武帝遺詔為侍中尚書令加鎮軍中書監開府儀同三司海陵王即位為使持節都督揚南徐二州諸軍事揚州刺史鎮東府城給兵五千人録尚書假黄鉞中外都督加殊禮進爵為王太后令廢海陵王以上入纂大位羣臣三請乃受命建武元年十月癸亥即皇帝位大赦改元戊子立皇太子寶卷賜天下為父後者爵一級二年十月丁卯詔曰軌世去奢事因哲后訓物以儉理鏡前書朕思所以遷淳改俗反古移風可罷東田毁興光樓并敕水衡量省御乘永太元年四月甲寅改元大赦五月以太子中庶子梁王為雍州刺史己酉崩于正福殿年四十七帝明審有吏林持法無所借大存儉約罷世祖所起新林苑以地還百姓廢文帝所起太子東田賣之永明中輿輦舟乘剔去金銀還主衣庫太官進食有裹蒸帝曰可四片破之餘充晩食世祖掖庭中宫殿服御一無所改蕭寶卷蕭子顯齊書曰東昏侯諱寶卷字智臧髙宗第二子建武元年立為皇太子髙宗崩太子即位永元元年正月大赦改元辛卯祀南郊詔三品清資官以上應食禄者有二親或祖父母年登七十并給見錢二千貫二年八月甲申夜宫内失火十二月雍州刺史梁王起義兵于襄陽三年五月丙申合朔事畢以宫人於閱武堂元㑹皇后正位帝戎服臨視三月南康王寶融即皇帝位于江陵以太子左率李居士總督西討諸軍事屯新亭九月義軍至南州輔國将軍申胄軍二萬人于姑熟奔歸丙辰李居士與義軍戰于新亭敗績十月冀青二州刺史桓和入衛屯東宫乙卯以衆降光禄大夫張瓌先守石頭棄城奔還于是閉宫城自守李居士以新亭降義軍築長圍守宫城十二月王珍國侍中張稷等帥兵入殿廢帝帝在東宫便好弄不喜書學及即位性重澁少言不與朝士接唯親信閹人日夜于後堂戲馬五更方睡至晡乃起漸出遊走屛逐居民從萬春門遊東宫以東至于郊外數十百里皆空家静室巷陌懸幔為髙障置伎人防守謂之屏除夜出晨反火光照天拜愛姬潘氏為貴妃仍以金蓮帖地使妃行于其上曰此歩歩蓮花也毎出妃乘卧輿帝騎馬從後著織成袴褶金箔帽執七寶纏矟戎服急裝不變寒暑凌冐雨雪不避坑阱馳騁渴乏輒下馬解取腰邉蠡器酌水飲之復上馬馳去選無賴小兒善走者逐馬左右百人常以自隨置射雉塲二百九十二處翳中帷帳及步障皆縁以紅錦金銀鏤弩牙瑇瑁帖箭郊郭四民樵蘇路絶吉㓙失時轝疾棄屍不得殯葬後宫遭火之後更起仙華神仙玉壽諸殿刻畵彫彩麝香塗壁錦幔珠簾窮極綺麗又信鬼神迎神像及諸廟雜神皆入後宫禱祀祈福及聞兵入趣出户閹人黄泰平傷其膝仆地曰反耶直後張齊斬首送梁王稱宣德皇后令依漢海昏侯故事追封東昏侯唐秘書監虞世南公子先生論云公子曰宋齊二代廢王有五并驕滛狂暴前後如一或身被弑戮或傾墜宗社豈厥性頑㐫自貽非命將天之所棄用傒代業者乎先生曰夫木之性直匠者揉以為鑰金之性剛工人理以成器豈人事乎唯上智下愚特稟異氣中庸之材全由訓習自宋齊以來東宫師傅備員而已貴賤禮隔規獻無由且多以位來升罕由德進善乎哉賈生之言昔者成王幼或襁褓之中召公為太保周公為太傅太公為太師保則保其身體傅則傅其德義師則導之敎訓此三公之職也又置三少曰少保少傅少師是與太子晏者也故乃孩提有識三公三少因明孝仁義禮以道習之不使見惡行選天下之儒士孝悌博聞有道術以翼衛之使與太子居處故太子生乃見正事聞正言行正道左右前後皆正人也習與正人居猶生長齊地不能不齊言習與不正人居猶生長楚地不能不楚言也秦使趙髙傅胡亥敎之訟獄所習者非斬劓人則夷人之三族也故胡亥今日即位明日殺人有忠諌者謂之誹謗深計者謂之妖言視殺人如刈草菅然豈胡亥之性惡哉彼其導之者非其理也故選左右禆教之最急此五君者稟凡庸之性無周召之師逺益友之箴規狎不端之近習以斯下質生而楚言覆國亡身理故然也蕭寶融蕭子顯齊書曰和帝諱寶融字智昭髙宗第八子建武元年封隨郡王永元元年改封南康王出為荆州寧益梁南北秦七州諸軍事西中郎将荆州刺史蕭頴胄殺巴西郡太守劉山陽奉王舉兵以雍州刺史蕭衍為使持節都督諸軍事左将軍以蕭頴胄為右将軍督行諸軍事夏侯亶自京師至江陵稱宣德皇后令南康王冝纂成國祚光臨億兆方俟清宫未即大號可且封十郡為宣城公加相國荆州牧又加黄鉞蕭頴胄為左長史進號鎮軍蕭衍進號征東将軍己巳羣寮上尊號中興元年正月乙巳即皇帝位大赦改元以相國左長史蕭頴冑為尚書令領軍将軍蕭偉為雍州刺史十二月建康城平皇太后令以蕭偉為大司馬録尚書事驃騎大将軍揚州刺史封建安郡公依晉武陵王遵承制故事百僚致敬二年正月皇太后臨朝入居内殿以大司馬蕭衍都督中外諸軍事加殊禮進位相國總百揆揚州牧封十郡為梁公備九錫之禮位在諸王上二月進梁公爵為王増封十郡建天子旌旗出警入蹕三月丙辰遜位于梁丁卯梁奉帝為巴陵王徙姑熟戊辰薨年十五追為和帝葬恭安陵太平御覽卷一百二十九
