body:
  text: 太平御覽卷八百四十四宋李昉等撰飲食部二酒中魏畧曰太祖時禁酒而人竊飲之故難言酒以白酒為賢人清酒為聖人又曰王凌表滿寵年過躭酒不可居方任帝将召寵給事中郭謀曰寵為汝南太守豫州刺史二十餘年有勲方岳及鎮淮南呉人憚之若不如所表将為所闚可令還朝問以方事以察之帝從之寵既至進見飲酒至一石不亂帝慰勞遣還又曰華歆能劇飲至石餘不亂衆人㣲察常以其整衣冠為異又曰烏桓諸部俗能作白酒而不知作麴蘖常仰中國九州春秋曰曹公禁酒而孔融書嘲之曰夫天有酒旗之星地列酒泉之郡人有旨酒之德故堯不先千鍾無以成其聖且桀紂以色亡國今令不禁婚姻也太祖外雖寛容之内不平御史大夫郗慮知㫖以免融官吳志曰大帝於武昌臨釣臺飲酒大醉令人以水灑羣臣曰今日酣飲唯醉墮臺中乃當止耳張昭正色不言出外車中坐帝遣人呼招還謂曰為共作樂耳公亦何為怒乎昭對曰昔紂為糟丘酒池長夜之飲當時亦不以為惡也帝黙有慙色又曰帝常令中書郎詣顧雍有所諮訪若合雍意事可施行即與相反覆究而論之為設酒食如不合意雍即正色改容黙然不言無所施設郎退告帝曰顧公歡悦是事合宜也其不言者是事未平也孤當重思之其見敬信如此又曰大帝常命諸葛恪行酒至張昭前昭先有酒色不肯飲曰此非養老之禮也帝曰卿其能令張公辭屈乃當飲之耳恪難昭曰昔師尚父九十擁旌旗仗鉞猶未告老也今軍旅之事将軍在後酒食之事将軍在先何謂不養老也昭卒無辭遂為盡爵又曰曹公出濡須甘寧為前部督受勅斫敵前營帝特賜米酒衆肴寧乃持賜手下百餘人食食畢寧先以銀盌酌酒自飲兩盌乃酌與其都督督不肯持寧引刀置膝上呵謂之曰卿見知於至尊孰與甘寧寧尚不惜死卿何以獨惜死都督見寧色厲即起拜持酒以通酌兵各一銀盌至二更時啣枚出斫敵敵驚動遂退寧益貴重又曰孫皓每饗宴無不竟日坐席無能不率以七升為限雖不悉入口皆澆灌取盡􅅊曜素飲酒不過三升初見禮異時當裁减或密賜茶茗以當酒至於罷衰更見逼强輙以為罪又於酒後使侍臣難拆公卿以嘲弄侵尅發擿私短以為歡笑又曰笮融督廣陵運漕大起圖祠每浴佛多設酒飯布席於路經數十里民人來觀及就食且萬人費以巨億計蜀志曰簡雍拜昭德将軍時天旱禁酒釀者有刑吏於人家索得釀具論者欲令與作酒者同罰雍從先主逰觀見一男子行於道謂先主曰彼欲淫何以不縛先主曰卿何以知之對曰彼有其具與欲釀者同先主大笑而原欲釀者晉書曰王戎嘗如阮籍飲時兖州刺史劉昶字公榮在坐籍以酒少爵不及昶昶無恨色戎異之他日問籍曰彼何如人答曰勝公榮不可不與飲若减公榮則不敢不共飲惟公榮可不與飲晉書曰山濤飲酒至八斗方醉帝欲試之以酒八斗飲之密益其酒濤極本量而止又曰陸抗與羊祜推僑札之好抗嘗遺祜酒祜飲之不疑抗有疾祜饋之藥抗亦推心服之于時以為華元子反復見於今又曰阮孚為散騎常侍以金貂換酒為有司所彈又曰謝奕為桓温司馬謂之方外司馬因以酒逼温走入南康主門避之主曰君無狂司馬何由得相見弈遂引温一兵帥於㕔事共飲曰失一老兵得一老兵亦何所怪又曰陸納字祖言為吳興太守将之郡先至姑熟辭桓温因問温曰公致酒可飲幾升食肉多少温曰年大來飲三升便醉白肉不過十臠卿復云何曰素不能飲止可三升肉亦不足言後伺温閑曰外有㣲禮方守逺郡欲與公一醉以展下情温欣然納之時王坦之刁彞在座及受禮唯有酒一斗鹿肉一拌座客驚愕納徐曰明公近云飲酒三升納正可二升今有一升以備盃酌餘瀝温及賔客並嘆其率素温更勅中厨設精饌酣宴極歡而罷又曰何充字次道能飲酒雅為劉恢所貴恢每云見次道飲令人欲傾家釀言其能温克也又曰陶侃每飲酒有常限歡有餘而限已竭殷浩更勸少進侃悽然曰年少時嘗誡之乃已宋書曰王𢎞為江州刺史欲識陶潜不敢致也潜常往廬山𢎞令潜故人寵通之遺酒於半道栗里要之潜有脚疾使一人門生二兒舉藍輿及至欣然便共飲酌俄頃𢎞至亦無忤也先是顔延之為劉豫後車功曹在尋陽與潜情欵後為始安郡經過潜每往必酣飲致醉延之臨去留二萬錢與潜潜悉送酒家稍就取酒嘗九月九日無酒出宅邊菊叢中坐乆之逢𢎞送酒至即便就酌醉而後歸潜不解音聲而素畜琴一張每有酒適輙撫弄以寄其意貴賤造者有酒輙設潜若先醉便語客我醉欲卧卿可去其真率如此郡将候潜逢其酒熟取頭上葛巾漉酒畢還後着之又曰顧憲之為建康令清儉强力為政甚得人和共都下飲酒者醇㫖輙號為顧建康謂其清美焉又曰孔顗為江夏内史性使酒每醉輙彌日不醒居常貧罄無有豐約未嘗闗懐為府長史典籖諮事不呼前不敢前不令去不敢去雖醉日居多而曉明政事醒時判决未嘗有擁衆咸云孔公一月二十九日醉勝世人二十九日醒也又曰顔延之好騎馬遨逰里巷遇舊知輙據鞍索酒得必傾盡欣然自得又曰沈文秀出為吳興太守文秀飲酒五斗妻王氏飲酒亦至三斗常對飲竟日而視事不廢又曰袁粲為丹陽尹嘗步屧白楊郊野間道遇一士大夫便呼與酣飲明日此人謂被知顧到門求進粲曰昨飲酒無偶聊相要耳竟不與相見又曰蕭思話嘗從文帝登鍾山北嶺中道有磐石清泉上使於石上彈琴因賜以銀鍾酒謂曰相賞有松石間意又曰彭城王義康傳曰㑹稽長公主於兄弟為長文帝所親敬上嘗就主宴集甚歡主起再拜頓首悲不自勝上不曉其意起自扶之主曰車子嵗暮必不見容特乞其命因慟哭上亦流涕指蒋山曰必無此慮若違今誓便是負初寧陵即封所餘酒賜義康曰㑹稽姉飲憶弟所餘酒今封送車子義康小字也齊書曰髙帝幸東宫召諸王宴飲因遊𤣥圃長沙王晃捉華盖臨川王暎執雉尾扇聞喜公子良持酒鎗南郡王行酒武帝與豫章王嶷及王敬則自捧肴饌髙帝大飲賜武帝已下酒並大醉盡歡日暮乃去又曰謝胐為吳興與弟􅊪於征虜渚送别胐指􅊪口曰此中唯宜飲酒􅊪建武之朝專以長酣為事與劉塡沈昭畧交歡飲各至數斗朏既至郡致􅊪數斛酒遣曰力飲此物勿豫人事􅊪嘗與劉悛飲推辭乆之悛曰謝荘兒不可云不能飲􅊪曰苟得其人自可沉湎千日悛甚慙無言又曰王琨儉於財用酒不過兩爵輙云取酒難過遇之粱書曰初梁武帝招延後進二十餘人置酒賦詩臧盾以詩不成罰酒一斗飲盡顔色不變言笑自若蕭介染翰便成文無加㸃帝兩美之曰臧盾之飲蕭介之文席之美也又曰隂鏗嘗與賔友飲宴見行觴者因迴酒炙以授之衆坐者笑鏗曰吾儕終日酣飲而執爵者不知其味非人情也及侯景之亂鏗嘗為賊擒或救之獲免鏗問之乃前所行觴者又曰張纉為湘州刺史初呉規頗有才學邵陵王綸引為賔客深相禮遇及綸作牧郢藩規隨從江夏遇纉出之湘鎮路經郢服綸餞之南浦纉見規在坐意不能平忽舉盃曰吳規此酒慶汝得陪今宴規尋起還其子翁孺見父不悦問而知之翁孺因氣結爾夜便卒規恨纉悲慟而憤哭兼至信次之間又殞規妻深痛夫子翌日又亡時人為張纉一盃酒殺吳氏三人南史曰南海有頓遜國在海峙上有酒樹似安石榴採其花汁停瓮中數日而成酒後魏書曰太宗引崔浩論事語至中夜太宗大悦賜浩縹醪酒十斛水精戎塩一兩曰朕味卿言若塩酒故與卿同其味也又曰髙允被勅論集往世酒之敗德以為酒訓孝文覽而悦之又曰胡叟少孤每言及父母則涙下若孺子之號春秋常祭之前則先求㫖酒時燉煌汜潜家善釀酒每節送一壺與叟論者以潜為君子又曰李元忠拜南趙郡太守好酒無政績及荘帝崩棄官潜圖義舉㑹齊神武東出元忠便乗露車載濁酒奉迎神武聞其酒客未即見之元忠下車獨坐酌酒擘脯食之謂門者曰本言公招延豪傑今聞國士到門不能吐哺輟洗其人可知還吾刺勿復通也門者以告神武遽見之又曰齊神武自太原來朝見宋逰道曰此人是逰道邪常聞其名今日始見其面遷逰道别駕後神武之司州饗朝士舉觴屬逰道曰飲髙歡乎中酒者大丈夫卿之為人合飲此酒又曰魏帝宴華林園謂神武曰自頃所在百司多有貪暴朝廷中有心公平直言彈劾不避親戚者王可勸酒神武降階跪言與御史中尉崔暹一人謹奉明㫖敢以酒勸并臣所射賜物千段乞以迴賜帝又褒美之又曰劉藻字彦先光父宗之廬江太守涉獵羣籍美談笑善與人交飲酒一石不亂藻為東平别将辟於洛水之南文帝曰與卿石頭相見藻對曰臣雖不才非古人度亦不留賊虜而陛下輙當釃曲阿之酒以待百姓帝大笑曰今未至曲阿且以河東數石賜卿又曰裴粲傅元顥入洛以粲為西兖州刺史尋為漢陽太守崔巨倫所逐棄州入嵩髙山節閔帝初復為中書令後正月晦帝出臨洛濵粲起御前再拜上夀酒帝曰昔北海入朝慙竊神器爾日卿誡之以酒今欲我飲何異於往情粲曰北海志在沈湎故諫其所失陛下齊聖温克臣敢獻㣲誠帝曰甚愧來譽仍為令酌又曰齊郡王簡性好酒不能理公私之事妻常氏燕郡公喜女也文明太后以賜簡幹綜家事頗節簡酒乃至盜竊求乞婢侍卒不能禁又曰阮孚性機辨好酒貌短而秃周文帝偏所眷顧常於室内置酒十缾餘缾上皆加帽欲戯孚孚適入室見即驚喜曰吾兄弟輩甚無禮何為竊入王家匡坐相對宜早還宅也因持酒歸周文撫手大笑北齊書曰段韶尤嗇於財雖親戚故舊畧無施與其子深尚公主并省丞即在家佐事十餘日事畢辭還人唯賜一杯酒又曰髙季式豪華好酒又恃舉家勲功不拘檢節與光州刺史李元忠生平逰欵在濟州夜飲憶元忠開城門令左右乗驛馬持一壺酒往光州勸元忠朝廷知而容之又曰齊河南王孝瑜武成禮遇特隆帝在晉陽手勅之曰吾飲汾清二盃勸汝鄴酌兩盌其親愛若此也又曰齊皇甫亮性質朴純厚終無斥言矯飾屬有勅下司各列勤惰亮三日坐不上省文宣王親詰其故亮曰一日雨一日醉一日病酒文宣以其實優容之又曰周文帝聞􅅊瓊養髙不仕辟之不能屈明帝即位禮敬逾重乃為詩願時朝謁帝不悦勅有司日給河東酒一斗號之曰逍遥公唐書曰定州緫管李元通性剛烈無所屈撓初城䧟為劉黒闥所囚其故吏有以酒食餽之者元通謂之曰諸君哀吾困辱故以酒食來相寛慰耳吾當為諸君一醉可乎遂與樂飲因請劔起舞畢以劒潰腹而死又曰蒲萄酒西域有之前代或有貢獻及破髙昌收馬乳蒲萄實於苑中種之并得其酒法上自損益造酒酒成凡有八色芳春酷烈味兼醍盎既頒賜羣臣京師識其味又曰麟德元年九月壁州刺史鄧𢎞慶制酒令平索者精四字又曰張鎮周拜舒州都督舒州即其本邑鎮周乃多市酒肴就望江舊宅盡召故人親戚與之酣宴散髪箕踞敦疇昔之歡十日贈以錢帛既而垂泣謂親賔曰比者張鎮周與故人為歡今日以後舒州都督治百姓耳官民禮隔不得交逰因與之訣自是親戚有犯法一無所縱州境因兹肅然又曰李景伯景龍中為諫議大夫中宗嘗與宰臣貴戚内宴酒酣逓唱迴波樂甚喧雜失禮次至景伯歌曰迴波爾時酒巵㣲臣職在箴規禮飲只合三爵君臣雜混非宜席為之散時人稱之又曰李適之雅好賔友飲酒一斗不亂夜則宴賞晝决公務廷無留事管子曰桓公飲管仲酒仲棄其半公問之對曰臣聞酒入舌出舌出言失言失身棄臣棄身不如棄酒桓公笑焉晏子曰景公飲酒移於晏子之家晏子立于門曰國得無有故乎君今何為非時而夜辱公曰酒醴之味金石之聲願與夫子樂之晏子曰臣不敢與焉公乃移於司馬穰苴之家穰苴答如晏子公復移於梁丘據據左執琴右擁竽行歌而至公曰樂哉無彼二子何以持國無此一臣何以樂身孫卿子曰醉者越百步溝以為跬足也俯而出城門以為萬丈之門酒亂其神也太平御覽卷八百四十四
