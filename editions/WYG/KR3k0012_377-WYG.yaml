  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_377-1a, image: WYG0896/WYG0896-0356a.png}
body:
  text: 太平御覽卷三百七十七宋李昉等撰人事部十八長中國人長絶域人長中國人禮斗威儀曰君乗土而王其民長君乗金而王其民洪白長大春秋演孔圖曰孔子長十尺大九圍坐如蹲龍立如牽牛就之如昻望之如斗周書曰丘陵之人専而長史記曰晏子為齊相出其御之妻從門窺其夫為相御擁大盖䇿駟馬意氣揚揚甚自得也既而歸其妻請去夫問故妻曰晏子長不滿六尺身相齊國名顯諸侯今者妾觀其出志念深矣常有以自下者今子長八尺廼為人僕御然子之意自以為足妾是以求去也其後夫自抑損晏子怪而問之以實對薦以為大夫漢書曰東方朔上書曰臣朔少失父母長養兄嫂年十三學書三冬文史足用年二十二長九尺三寸又曰車千秋長八尺餘體貌甚麗武帝見而悦之又曰金日磾父以不降見殺母閼餘氏弟綸俱没入官輸黄門養馬日磾長八尺二寸容貌甚麗馬又肥好上異而問之以本狀對上即日賜湯沐衣冠拜為馬監又曰王商長八尺餘身體洪大容貌絶人單于来朝見商而拜又曰王莽夙夜連率韓博士言有竒士長一丈大十圍来至臣府曰欲奮擊胡虜自謂巨無覇出於蓬莱東南五城西北昭如海瀕軺車不能載三馬不能勝即日大車駟馬建虎旗載覇詣闕卧則枕鼓以鐵著食此皇天所以輔新室又曰朱雲字子游魯人少時通輕侠借客執仇長八尺餘貌甚壯以勇力聞年四十廼變節從博士白子反受易東觀漢記曰馮勤字衛伯魏郡人曽祖父陽宣帝時為𢎞農太守有八子皆為二千石趙魏間榮之號萬石焉兄弟形皆偉壯唯勤祖優知長不滿七尺常自謂短陋恐子孫似之乃為子汎娶長妻生勤長八尺三寸又曰賈逵長八尺二寸亰師為之語曰問事不休賈長頭華嶠後漢書曰趙一字元淑漢陽人體貌魁梧身長八尺美鬚眉望之甚偉范曄後漢書曰虞延字子大陳留人延生其上有物若一疋絹遂上升天占者以為吉及身長六尺六寸腰帶十圍力能扛鼎又曰大將軍袁紹總兵兾州遣使要鄭元大㑹賔客元最後至乃延升上坐身長八尺飲酒一斛秀眉眀目容儀温偉又曰郭林宗儀貌魁岸身八尺聲如鍾袁宏漢記曰長樂衛尉正騰其長八尺身體洪大面鼻䧺異而性賢厚人多敬之魏志曰許禇字仲康長八尺餘大十圍容貌䧺異勇力絶人晉書曰羊祜身長七尺三寸美鬚眉太原郭奕見之曰此今之顔子也晉書載記曰劉曜子允風骨俊茂爽朗卓然身長八尺三寸髪與身齊多力善射驍捷如風雲曜因以重之三十國春秋曰燕徴其東莱太守王鸞鸞身長九尺腰帶十圍貫甲跨馬不㨿鞍由鐙燕王徳見而竒其魁偉賜之食一進一斛餘徳驚曰所噉如此非耕而能飽但才貌不凡堪為貴人可以一縣試之繇是拜逢陵長甚有治績崔鴻前秦録曰鹿緼字處嘿西平人也身長八尺腰帶十圍清辯善論䧺武便弓馬孝友貞亮聲髙一時車頻秦書曰符堅時有申香長十尺以上為拂盖郎裴景仁秦書曰姚萇圍符堅遣僕射尹緯詣闕陳事堅見緯貌魁梧志氣秀傑腰帶十圍瑰偉異常驚而問曰卿於朕世何所作為偉荅曰尚書令史堅笑曰卿宰相才也宋書曰南郡王義宣為荆州刺史白晢美鬚眉身長七尺七寸腰帶十圍齊書曰王茂先身長八尺潔白美容儀齊武帝布衣時常見之嘆曰王茂先年少堂堂如此必為公輔又曰劉善眀平原人也長八尺九寸質素不好聲色北齊書曰肅宗孝昭皇帝諱演字延安聰敏有識度深沉能斷不可窺測身長八尺腰帶十圍儀表望風逈然獨秀周書曰庾信字子山㓜而俊邁聰敏絶倫博覽羣書尤喜春秋左氏傳身長八尺腰帶十圍容止頇然有過人者三國典畧曰寇雋歸老不復朝覲天王思與相見乃令入朝雋身長八尺鬚髪皓然容止端詳音韻清朗天王與之同席而坐因訪洛陽故事不覺屢為前膝唐書曰李義琰身長八尺博學多識髙宗毎有顧問言皆切直孟子曰曹文公弟曹交問曰聞文王十尺湯九尺今交九尺四寸食粟而已如何則可淮南子曰朱儒問天髙於修人曰吾不知曰子雖不知猶近之於我也故凡問事必於近之者吳越春秋曰伍子胥見吳王僚僚望其顔色甚可畏長一丈大十圍眉開一尺王僚與語三日辭無復者胥知王好之毎入言倍有勇壯之氣帝王世記曰季歴之妃生文王昌身長十尺又曰禹長九尺九寸殷湯長九尺凉州記曰吕光字世眀連結豪賢好施待士身長八尺四寸目重瞳子左肘生寅印性沉重質畧寛大有度量時人莫之識唯王猛布衣時異之曰此非凡人司馬彪序傳曰郎祖父髙字元興博學好古倜儻有大度長八尺三寸腰十圍儀狀魁岸行與衆有異鄉黨宗族咸影附焉祖冲之述異記曰符徤皇始四年有長人見身長五丈語人張靖曰今當太平新平令以聞徤以妖妄召靖繫之是月霖雨河渭泛溢蒲坂津監登於河中流得大屐一隻長九尺三寸足跡稱屐指長尺餘文深七寸璅語曰齊景公伐宋至曲陵夣見大君子甚長而大大下而小上其言甚怒好仰晏子曰若是則盤庚也夫盤庚之長九尺有餘大下小上白色而髯其言好仰而聲上公曰是也是怒君師不如違之遂不伐宋也世説曰滿寵寵子偉偉子奮皆長八尺長絶域人河圖玉板曰從崑崙以北九萬里得龍伯國人長三十丈生萬八千嵗而死從崑崙以東得大秦國人長十丈從此以東十萬里得佻吐凋國人長三丈五尺從北以東千里得中秦人長一丈龍魚河圖曰天之東西南北極各有銅頭鐵額兵長三千萬丈三千億萬人天之東西南北極各有金剛敢死力士長三千萬丈三千億萬人天中有太平之都有都甲食鬼鐵面兵長三千萬丈三千億萬人尚書洪範五行傳曰長狄之人長盖五丈餘也又曰秦始皇時有大人身長五丈足跡六尺衣厖服見於臨洮天戒秦曰勿大行暴虐之道將受其禍云左傳文下曰冬十月敗長狄于鹹獲長狄僑如富父終甥樁其喉以戈殺之埋其首於子駒之門以命宣伯得臣因名宣伯曰僑如以旌其功公羊傳文公曰長狄兄弟三人一者之齊王子城父殺之一者之魯叔孫得臣殺之則未知其之晉者也穀梁傳文公曰魯文公十一年叔孫得臣敗狄于鹹獲長狄也兄弟三人迭害中國得臣善射射中其目身横九畝斷其首而載之眉見於軾春秋考異郵曰長狄兄弟三人各長百尺狄者隂氣時周室衰隂盛之象也家語曰呉伐越隨㑹稽獲巨骨一節専車載焉吳子使来聘魯以問孔子孔子曰丘聞昔禹致羣臣於㑹稽之山防風氏後至禹戮之其骨節専車客曰防風何字也子曰枉罔之君守封嵎之山為漆姓在虞夏商為枉罔氏於周為長翟氏今曰大人客曰人之長極㡬何子曰長者不過十丈數之極也魏畧曰天竺國人皆長一丈八尺車隣國男女皆長一丈八尺魏志曰咸熈二年襄武縣言有大人見長三丈餘跡長三尺六寸白髮着黄單衣戴黄巾呼人王始語云今當太平列子曰渤海之東有大壑焉中有五山一曰岱輿二曰員嶠三曰方壺四曰瀛洲五曰蓬莱羣聖居之帝使巨鼇十五舉首而戴之迭為三番龍伯之國有大人一釣而連六鼇合負而歸於是岱輿員嶠一山沉於大海帝馮怒侵滅龍伯之國使小至伏羲神農時國人猶長數十丈淮南子曰東方之人長一丈孫綽子曰海人與山客辯其方物海人曰横海有魚額若華山之頂一吸萬頃之波山客曰鄧林有木圍三萬尋直上千里傍䕃數國東極有大人斬木為䇿短不可杖釣魚為鮮不足充餔山海經曰東海之外大荒之中有波谷山者有大人之國有大人之市名曰大人堂有一人蹲其上張其兩臂漢武故事曰公孫卿至東莱云見一人長五丈自稱巨公牽一黄犬把一黄雀欲謁天子因忽不見神異經曰東南有人焉周行天下其長七丈腹圍如長箕頭箕頭髮煩亂也不飲食朝吞惡鬼三千暮吞二百但吞不咋鋤格切此人以鬼為飲以霧露為漿一名天郭一名食耶吞食耶鬼一名黄父黄父鬼俗人依此名兩名之又曰西北海外有一人焉長二千里兩脚中間相去千里腹圍一千六百里但飲天酒五天酒甘露也不食五穀魚肉忽有饑時向天乃飽好山海間不犯百姓不干萬物與天地同生名無路之人言無路者髙大不可為路也一名仁禮曰仁也一名信與天地同生而不沒故曰信一名神又曰西南大荒中有人焉長一丈其腹圍九尺踐龜蛇戴朱鳥左手憑青龍右手憑白虎知河海斗斛識山石多少知天下鳥獸言語知百穀草木鹽苦名曰聖一名哲一名先通一名無不達凡人見拜者令人神智又曰東南隅大荒之中有朴父焉夫婦並髙千里腹圍百輔百輔圍千里也天初立時使夫妻導開百川嬾不用意讁其夫妻並立東南男露其勢女彰其殺勢殺隂陽氣息如人不畏寒暑不飲不食湏黄河清當復更使其夫妻導川蜀王本紀曰秦襄王時岩渠郡獻長人二十五丈六尺括地圖曰大人國孕三十六年而生生兒白首長丈外國圖曰大秦國人長一丈五尺猿臂長脇好騎駱駝辛氏三秦記曰燉煌西盡大秦隔海心無憂遇善風不經二十日得渡心憂數年不得渡皆曰心無憂患不經二旬若必憂患逺離三春士人賢直男女皆長一丈端正國主風雨不和則讓賢而治之郭子横洞冥記曰有支提國人長三丈二尺有三手一手當胷手足各三指太平御覽卷三百七十七
