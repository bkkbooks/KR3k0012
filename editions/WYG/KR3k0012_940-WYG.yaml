  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_940-1a, image: WYG0901/WYG0901-0339a.png}
body:
  text: 太平御覽卷九百四十宋李昉等撰鱗介部十二瓊魚橫公魚髪魚蒲魚印魚黃魚寄魚君魚琵琶魚疏齒魚班魚黃雀魚鷰魚鳶魚赤魚元魚邵魚鱬鰗魚井魚鏡魚含光魚􅬻魚􅰛魚吹沙魚伏念魚金石魚婢屣魚奴屩魚􅾓魚銅哾魚陶魚石斑魚戴星魚􅲭魚魿魚織杼魚䱦鯺魚土奴魚新婦魚海狶魚鯤鮑魚鈆刀魚蝦蟇魚黿魚鼠魚弓魚􅵧􅲮魚黍魚䱽魚饋尾魚土拌魚髙魚蘆䱐魚鼉風魚鯤魚海鯤魚鮞魚細赤魚鰥魚直魚鷄子魚竹魚乳穴魚􅸓魚瓊魚漢武内傳曰西王母曰仙人上藥有流淵瓊魚橫公魚神異經曰北方荒外有石湖其中有橫公魚長七八尺形狀如鱧而目赤晝則在湖中夜化為人刺之不入煮之不死以烏梅二七煮之乃熟食之可以止邪病元黃經曰橫公魚不可殺唯加烏梅其氣乃㓕髪魚魏武四時食制曰髪魚帶髪如婦人白肥無鱗出滇池蒲魚魏武四時食制曰蒲魚其鱗如粥出郫縣印魚臨海異物志曰印魚無鱗形如䱜音錯額上方如印有字諸大魚應死者印魚先封之郭延之述征記曰城陽縣南六里堯母慶都墓廟前一池魚頭間有印文名頰魚非告祠捕不可得左思吳都賦曰印龜鱕音藩䱜黃魚吳書曰薛綜上疏交州刺史朱符多以鄉人分作長史强賦民黃魚一枚稻一斛劉欣期交州記曰武寧縣秋九月黃魚上化作鶉鳥南方草木狀曰短細黃魚九月中因秋風而變成鶉鳥團吏捕取炙食滋味肥美南中八郡志曰江出黃魚魚形頗似鱣骨如葱可食郭義恭廣志曰揵為郡僰道縣出臑骨黃魚寄魚沈懐逺南越志曰寄魚長三寸似白魚常附海船以濟洪波一曰寄載魚臨海水土記曰寄度魚長三寸似白魚君魚沈懐逺南越志曰君魚長寸餘背上骨如筆管大者似刀逄諸細魚及黿腹皆斷之琵琶魚臨海異物志曰琵琶魚無鱗形如琵琶沈懐逺南越志曰琵琶魚無鱗長二尺形似琵琶故因以為名任昉述異記曰海魚千嵗為劔魚一名樂魚又名琵琶魚形似琵琶而喜鳴因以為名左思吳都賦曰鮫鯔琵琶曹毗楊都賦曰魚則琵琶烏賊疏齒魚魏武四時食制曰疏齒魚味如猪肉出東海潘岳滄海賦曰比目疏齒斑魚魏武四時食制曰斑魚頭中有石如珠出北海郭義恭廣志曰斑魚頭中有玉石如珠璣黃雀魚臨海異物志曰黃雀魚常以八月化為黃雀到十月入海為魚風土記曰六月東南風俗名為黃雀風時海魚化為黃雀因為名也鷰魚臨海異物志曰鷰魚長五寸隂雨起飛髙丈餘鳶魚臨海異物志曰鳶魚狀如鳶唯無尾足隂雨日亦飛髙數丈赤魚魚豢魏畧曰文帝欲受禪赤魚遊於露鑊元魚王子年拾遺録曰夏鮌理水無功沉於羽川化為元魚大千尺後遂死橫於河海之間後世聖人以元魚為神化之物故曰鮌邵魚臨海水土記曰邵魚狀如鳶魚鱬而朱切鰗魚臨海水土記曰鱬鰗魚狀如鳶魚形井魚臨海異物志曰井魚頭有兩角鏡魚臨海異物志曰鏡魚圓如鏡含光魚臨海異物志曰含光一名臈魚黃而羙故謂之臈有光照燭沈懐逺南越志曰含光謂蠟魚色黃而美故謂為蠟魚夜則有光嶺表録異曰黃蠟魚即江湖之橫魚頭嘴長而鱗背金色南人臠為炙雖美而毒或􅀶或乾夜即有光如燭􅬻魚臨海異物志曰􅬻魚如指長七八寸但有脊骨好作羮大者如竹竿曝作燭極有光明􅰛魚臨海水土記曰􅰛魚三月生溪中裁長一寸至十月終東還歸於海香氣聞於水上到時月輙復更生永嘉地記曰石堂水口多􅀈魚吹沙魚臨海異物志曰吹沙長三寸背上有刺犯則螫人伏念魚臨海水土記曰伏念魚似吹沙魚金石魚南越記曰金石魚形圓如七寸􅑕婢屣魚臨海異物志曰婢屣魚口近腹下形似婦人屣奴屩魚臨海水土記曰奴屩魚長一尺如屩形􅾓魚音太臨海水土記曰􅾓魚似蒲魚長三尺銅哾魚臨海異物志曰銅哾魚長五寸似鯈魚陶魚臨海水土記曰陶魚長三尺似鱦魚石斑魚臨海水土記曰斑魚媱蟲六蟲為一又曰石斑魚媱蟲蝘􅀈也􅀢魚長尺餘其􅀢如虎文俗言蝘􅀈於水邊呼之因走上岸合比其子不可食也戴星魚臨海水土記曰戴星魚狀如鳶魚背上有兩白璫如指大因名之云􅲭魚沈懐逺南越志曰􅲭魚似􅱈􅀈音畢尾上有刺如欓樹刺也魿魚臨海水土記曰魿魚似蚣魚異物志曰南方魚多不肥美唯魿魚為上大者長二尺作膾炙尤香而美嶺表録異曰魿魚如白魚而身稍短尾不偃江東亦有此魚蓋不産於海也廣人得之多為膾不腥而美諸魚無以過也織杼魚臨海水土記曰織杼魚狀如􅰛魚味美於諸魚沈懐逺南越志曰織杼魚如真魚背上正青䱦鯺魚臨海水土志曰䱦鯺形似鯺魚戱於重川靡有定所土奴魚臨海水土記曰土奴魚頭上如虎有刺螫人新婦魚臨海水土記曰新婦魚似䱦魚長一丈海狶魚臨海水土記曰海狶魚豕頭魚身郭璞江賦曰魚則江豚海狶曹毗楊都賦曰海狶鯨鱘鯤鮑魚臨海水土記曰鯤鮑魚似海印魚鈆刀魚臨海水土志曰鈆刀魚似􅀈蝦蟇魚臨海水土記曰蝦蟇魚色如鳶魚頭似蝦蟇尾又似鳶黿魚臨海水土記曰黿魚長五寸鼠魚沈懐逺南越志曰鼠魚頭如鼠臨海異物志曰鼠魚長七寸頭如鼠弓魚臨海水土記曰弓魚長三寸似鯢魚􅵧􅲮魚臨海水土記曰􅵧􅲮魚長一尺黍魚臨海水土記曰黍魚長三尺似􅀈􅛈䱽魚音倉臨海水土記曰䱽魚兩肋下有大肉如炙臠大嶺表録異曰䱽魚形似鯿魚而腦上突起連背而圓身肉甚厚肉白如凝脂只有一脊骨治之以薑葱􅀢音缶蒸也之粳米其骨自軟食者無所棄鄙俚謂之狗磕睡以其犬在盤下難伺其骨故云狗磕睡魚也饋尾魚南越記曰魚有毒一名鼈魚土拌魚臨海水土記曰土拌魚長七寸白黑班文髙魚異物志曰髙魚與鱒相似與􅔼蝪水上相合常以三二月中有雌而無雄食其胎殺人蘆䱐音孚魚異物志曰蘆䱐魚似鰌蝥而有細文多膏肥美形如大蘆管本出地中隨泉浮出俗名蘆䱐沈懐逺南越志曰蘆䱐魚生山曲水間穴地為泉泉踊則此魚出今廬陵以南至于南州有焉俗以為醬鼉風魚異物志曰冬天此魚數千萬頭共處大窟中藏上有白氣或在鼉穴中皮黑如漆能潛知數里中空木所在因風而入空木化為蝙蝠其肉甚美鯤魚毛詩鷄鳴什曰敝笱在梁其魚魴鯤爾雅曰鯤魚子凡魚之子總名鯤又曰鱦小魚音繩又朶金江東呼魚子未成者為鱦也海鯤魚王子年拾遺録曰黑河北極也其水濃黑不流上有黑雲生焉有黑鯤千丈狀如鯨常飛遊往于南海莊子曰北溟有魚其名為鯤其大不知㡬千里江逌詩曰巨鰲戴蓬萊大鯤運天池倐忽雲雨興俯仰三洲移孫放詠莊子詩曰巨細同一理物化無常歸脩鯤解長鱗鵬起扇雲飛撫翼摶積風仰凌垂天翬袁宏北征賦曰魚託水而成鯤木在山而有松鮞魚音而吕氏春秋曰魚之美者東海之鮞張衡西京賦曰巢鯤鮞鯤魚子也鮞魚類也細赤魚劉義慶幽明録曰始興雲水源有湯泉每至霜雪其上蒸氣髙數十丈泉中常有細赤魚出遊莫獲者鰥魚毛詩曰敝笱在梁其魚魴鰥鰥大魚也孔叢子曰衛人釣魚于河得鰥其大盈車曰吾下一魴之餌鰥過而不視又益以豚之半則吞矣子思曰鰥貪以餌死士貪以禄死真魚沈懐逺南越志曰真魚如織杼魚臨海水土記曰􅀈魚俗謂之猶魚鷄子魚嶺表録異曰鷄子魚口有嘴如鷄肉趐無鱗尾尖而長有風濤即乗風飛於海上稍類鮐鯣魚竹魚嶺表録異曰竹魚出溪間形如鱧魚大而少骨青黑色鱗下間以朱㸃鬛可翫或烹以為羮臛肥而美乳穴魚嶺表録異曰全義嶺之西南有盤龍山山有乳洞又有一溪號為靈水溪今桂州靈川縣也溪内有魚皆脩尾四足丹其腹游泳自若漁人不敢捕之爾雅云鯢似駘四足聲如小兒今商州山溪内皆有此魚謂之魶魚􅸓魚臨海水土記曰􅸓魚似鱦魚長二尺太平御覽卷九百四十
