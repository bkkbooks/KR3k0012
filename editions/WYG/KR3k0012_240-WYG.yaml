body:
  text: 太平御覽卷二百四十宋李昉等撰職官部三十八雜號將軍下建威將軍奮威將軍奮武將軍振威將軍揚威將軍建武將軍輕車將軍伏波將軍材官將軍折衝將軍虎威將軍偏將軍禆將軍虎牙將軍漢臣將軍討虜將軍破虜將軍建義將軍刺姦將軍輔威將軍揚化將軍安漢將軍輔漢將軍都䕶將軍立義將軍中堅將軍厲威將軍盪㓂將軍討逆將軍輔吴將軍盪魏將軍鷹揚將軍牙門將軍中將軍中領軍中護軍北軍中候朱衣直閣直寢直後直齋監軍建威將軍東觀漢記曰光武以耿弇為建威大將軍從征雒陽奮威將軍魏志曰吕布殺董卓王允以布為奮威大將軍儀同三司又曰沮授説袁紹即表為奮威將軍奮武將軍吳志曰賀齊傳豫章東部民彭才李玉王海等起為亂賊衆萬餘人齊討平之誅其首惡餘各降服揀其精健為兵次為縣戸遷奮武將軍振威將軍魏志曰太祖以程昱為振威大將軍破袁譚袁尚揚威將軍魏志曰臧霸字宣髙泰山人也從太祖討孫權於濡須口與張遼為前鋒行遇霖雨大軍先反水遂長賊舩稍近將士皆不安遼欲去霸止之曰公明於利鈍寧肯捐吾等耶明日果有令遼至以語太祖太祖喜之拜霸揚威將軍建武將軍魏志曰太祖以夏侯惇為建武將軍又曰文帝善孟達姿才容觀以為建武將軍輕車將軍漢書曰武帝元光七年以公孫賀為輕車將軍屯馬邑伏波將軍環濟要略曰伏波舩渉江海欲浪伏息也漢書曰武帝元鼎五年以路博徳為伏波將軍伐南越吕嘉東觀漢記曰光武以馬援為伏波將軍魏志曰夏侯惇為伏波將軍領河南尹使得以便宜從事不拘科制太祖常與同載特見親重出入卧内諸將莫得比也王隱晉書曰武帝以孫琇為伏波將軍材官將軍漢書曰武帝以李息為材官將軍軍馬邑折衝將軍魏書曰武帝以樂進為折衝將軍虎威將軍魏志曰于禁字文則泰山人將軍王朗異之薦禁才任大將太祖召見與語拜軍司馬後拜虎威將軍吳志曰朱然字義封從孫權討關羽别與潘璋到臨沮擒羽遷昭武將軍封西安鄉侯虎威將軍吕蒙病篤權問曰卿如不起誰可代者蒙對曰朱然膽守有餘愚以為可任蒙卒權假然節鎮江陵齊書曰桞世隆元景子也出為虎威將軍上庸太守帝謂元景曰卿以虎威之號為隋郡今復以授世隆使卿門世不絶公也偏將軍漢書曰吳漢字子顔南陽宛人家貧以販馬自業素聞世祖長者獨欲歸心及世祖於廣阿拜漢為偏將軍又曰臧宫字君翁潁川人也從世祖征戰諸將多稱勇世祖察宫勤力少言甚親納之及至河北以為偏將軍吳志曰陳武字子烈廬江人孫䇿在夀春武修謁時年十八長七尺七寸及權統事尤為權所愛拜為偏將軍又曰董襲字元代㑹稽人長八尺武力過人拜偏將軍裨將軍魏志曰李通字文達江夏平春人以遊俠聞於江汝之間屬連嵗大饑通傾家振施與士分糟糠建安初通舉衆詣太祖于許太祖討張繡通為先登大破繡軍拜裨將軍虎牙將軍漢書曰宣帝以雲中太守田順為虎牙將軍伐匈奴范曄後漢書曰葢延字巨卿漁陽人也身長八尺邉俗尚勇力而延以氣聞與吳漢同歸世祖從平河北世祖即位拜虎牙將軍漢臣將軍東觀漢記曰上於大㑹中指王常謂羣臣曰此家率下江諸將輔翼漢室心如金石真忠臣也是日以常為漢臣將軍與諸將絶席討虜將軍東觀漢記曰光武以王霸為討虜將軍擊董憲破虜將軍魏志曰李典字㬅成山陽鉅野人為破虜將軍典好學問貴儒雅不與諸將争功敬賢士大夫恂恂若不及軍中稱其長者建義將軍東觀漢書曰光武以朱祐為建義將軍攻朱鮪刺姦將軍東觀漢記曰光武以軍市令祭遵為刺姦將軍范曄後漢書曰岑彭字君然南陽棘陽人也後世祖拜為刺姦將軍使督察衆營授以常所持節輔威將軍東觀漢記曰光武以臧宫為輔威將軍揚化將軍東觀漢記曰光武以堅鐔為揚化將軍安漢將軍蜀志曰糜竺字子仲益州既定拜為安漢將軍班在軍師將軍之右竺雍容敦雅而翰翮非所長是以待之上賔之禮未曽有所統御然賞賜優寵無與為比又曰王平字子均諸葛亮卒於武功軍退還魏延作亂一戰而敗平之功也遷安漢將軍輔漢將軍東觀漢記曰光武以鄧奉為輔漢將軍都護將軍魏志曰曹洪累從征討為都護將軍立義將軍魏志曰龎徳以衆降太祖聞其驍勇拜為立義將軍中堅將軍魏志曰太祖以許褚為中堅將軍又以張遼為行中堅將軍厲威將軍魏志曰太祖征荆州還留滿寵行厲威將軍盪冦將軍蜀志曰張嶷字伯岐自越嶲徴詣成都民夷戀慕泣涕過旄牛邑邑君襁負來迎及追尋至蜀郡界其督率隨嶷朝貢百餘人嶷至拜盪冦將軍慷慨壯烈士人多貴之討逆將軍吳志曰曹公表孫䇿為討逆將軍輔吳將軍吳志曰孫權以張昭為輔吳將軍沈約宋書曰吳置輔吳將軍班亞三司盪魏將軍吳志曰吕據太元元年大風江水盛溢流漸淹城門權使視水獨見據使人取大船以備害權嘉之拜盪魏將軍鷹揚將軍晉書曰郭奕咸寧初遷雍州刺史鷹揚將軍尋假赤幢曲葢鼔吹牙門將軍蜀志曰魏延字文長義陽人也以部曲將隨先主入蜀數有戰功遷牙門將軍中將軍北齊書曰沙苑之敗崔仲文持馬尾而渡河波中乍没乍出髙祖望見之曰崔掾也遽遣船赴接既濟勞之曰卿為親為君不顧萬死在家之孝子即國之忠臣加中將軍中領軍魏略曰中領軍延康中置故漢北軍中候之官又曰太祖以史渙忠勇為中領軍將禁兵又曰太祖還長安以曹休為中領軍又曰文帝征孫權以尚書令陳羣為中領軍晉書曰吳隱之為中領軍清儉不華每月初得禄裁留身糧其餘悉分賑親族家人績紡以供朝夕時有困絶或併日而食恒布衣不完妻子不霑寸禄晉中興書曰羊祜字叔子遷中領軍悉統宿衛入直殿中執兵之要事兼内外齊書曰蕭景先武帝少時與景先共車行泥路車久故壞至領軍府西門車轅折俱狼狽景先謂帝曰兩人脱作領軍亦不得忘今日艱辛及武帝踐阼詔以景先為領軍拜日羽儀甚盛傾朝觀屬拜還未至府門中詔相問領軍今日故當無折轅事耶景先奉謝梁書曰臧盾遷中領軍領軍營天下兵要監局事多盾為人敏贍有風力長於撥繁職事甚理天監中吳平侯蕭景居此職著聲稱至是盾復繼之三國典畧曰齊左僕射祖珽附陸令萱求為領軍齊主許之侍中斛律孝卿謂上洛王元海侯吕芬等云珽是漢兒兩眼盲豈合作領軍也海遂入啟之珽言於齊主云元海與臣素有隟必是元海譛臣齊主曰然珽列元海共太府少卿李叔元平淮令張叔畧等結朋樹黨陸令萱又唱和之遂除元海為鄭州刺史叔元為襄城郡守叔略為南營州録事叅軍珽遂獨處機衡緫知兵事齊主亦令中要人扶持出入每同御榻論決朝政髙堂隆集曰己巳詔書中領軍游擊皆青玉佩中護軍史記曰漢髙帝以陳平為護軍中尉盡護諸將漢書曰護軍都尉秦官元狩四年屬大司馬元夀元年更名司冦元始元年更名護軍魏志曰韓浩字元嗣以忠勇顯為中護軍掌禁兵置長史司馬從太祖討張魯魯降議者以浩智略足以綏邉欲留使都督諸軍鎮漢中太祖曰吾安可以無護軍乃與俱其見親如此王隱晉書曰鄧攸遷吏部尚書牧馬於家庭妻子素食當時清浄内外肅然遷為中䕶軍晉起居注曰武帝太始七年詔曰中護軍職典武選宜得堪幹其事者左衛將軍羊琇有明贍才見乃心在公其以琇為中護軍晉中興書曰司徒王導將以趙永為中護軍孔愉謂導曰中興以來處此官者周伯仁應思逺今誠乏才豈可以趙永居之其秉政不撓皆此類也世語曰夏侯𤣥世名知人為中護軍㧞用武官無非俊傑多牧州典郡皇甫謐集云護軍武士之官晉王羲之臨護軍教曰今所在要在於公役均平其差大吏忠謹在公者覆行諸營家至人吿暢吾乃心其有老落篤癃不堪從役或有饑寒之色不能自存者區分處别自當叅詳其宜北軍中候漢書曰武帝置中壘校尉掌北軍壘門外内續漢書曰光武中興中省壘置中候五校尉營又曰孔文舉拜北軍中候王隱晉書曰苟晞字道將為北軍中候又曰太祖永昌元年以鍾雅為北軍中候五年省併領軍晉中興書曰陶回字恭之王導以回有器幹擢拜北軍中候回性不畏强禦朱衣直閣魏書曰元文景大司農卿康之次子除員外郎冠軍將軍朱衣直閣直寢後魏書曰于忠字思賢弱冠為御史文明太后臨朝刑政頗峻忠朴直少言終無過誤尋除左中郎將領直寢又曰楊津字羅漢𢎞農華隂人也本字延祚高祖賜名焉少端謹以器度見稱為直寢直後後魏書曰元天穆性和厚美形貌年二十起家員外郎領直後蕭子顯齊書曰臨海亡命田流自號東海王逃竄㑹稽鄮縣邉海山谷中立屯營官軍不能討明帝遣直後聞人襲説降之直齋後魏書曰太和九年十月初置直齋監軍史記曰穰苴將兵扞燕晉之師苴曰臣素賤君擢之閭伍之中加之大夫之上願得君之寵臣國之所尊以監軍景公使莊賈往苴與賈約曰日中㑹於軍門苴先馳至軍立表下漏賈素驕貴夕時乃至苴遂斬賈以徇三軍軍士皆震慄服之東觀漢記曰光武使來歙監諸將范曄後漢書曰宋均字叔庠為監軍時伏波將軍馬援征武溪南臨沅水軍士多病均懼衆軍疾疫矯詔迫降之諸將莫應均乃勒兵圍賊城詐為詔而降之為置長吏而歸自劾矯詔之罪帝善焉魏志曰司馬文王征夀春使監軍石苞統卒為遊軍晉武帝起居注曰豫州刺史胡威忠素質直思謀深奥其以威為監軍刺史如故沈約宋書曰監軍葢諸持節大將監領之太平御覽卷二百四十
