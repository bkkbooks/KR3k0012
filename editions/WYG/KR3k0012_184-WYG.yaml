  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_184-1a, image: WYG0894/WYG0894-0637c.png}
body:
  text: 太平御覽卷一百八十四宋李昉等撰居處部十二户樞關鑰闈閨閤閣簃闥户釋名曰户䕶也所以謹䕶門塞也説文曰半開曰户毛詩斯干曰築室百堵西南其戸易豐卦窺其户閴其無人夏小正曰七月漢案户漢天漢也按户者直户也言正南北也禮記曲禮上曰户外有二屨言聞則入不聞則不入將入户視必下入户奉扄瞻視毋回不干掩人之私户開亦開户闔亦闔有後入者闔而勿遂又禮運曰大道之行外户而不閉是謂大同又玉藻曰君子之居恒當户又月令曰孟春其祀户祭先脾注陽氣出祀之論語曰子曰誰能出不由户何莫由斯道也史記曰田嬰妾有子名文五月五日生嬰告其母勿令舉妾竊舉之及嬰見文怒曰五月之子長與户齊不利其父文頓首曰人生受命于天乎抑受命于户乎如受命于户則髙其户誰能至者嬰歎曰子休矣後漢書曰龎參為漢陽太守任棠者有竒節隠居敎授叅到先候之棠不與言但以薤一大本水一盂置户屏前自抱兒伏於户下主簿白以為倨叅思其㣲意良久曰棠是欲曉太守也水者欲吾清也㧞大薤本欲吾擊强宗也抱兒當户欲吾開門恤孤也於是歎息而還叅在職果能抑强扶弱以惠政得人又曰魏應字君伯任城人也少好學建武初詣博士受業習魯詩閉户誦習不交僚友京師稱之又曰魯恭及其弟丕居太學習魯詩魯申公詩閉户講誦絶人間事兄弟俱為諸儒所稱學士争歸之晉書羊祜傳襄陽百姓於峴山之右平生遊憇之所建碑立廟歲時享祭焉望其碑者莫不流涕杜預因名為墮淚碑荆州人為祜諱名屋室皆以門為稱改户曹為祠曹也老子曰不出户知天下莊子曰原憲居蓬户不完桑以為樞也慎子曰天有明不憂人之暗天雖不憂人暗闢户牖必已以明焉淮南子曰使鬼神𤣥化則不待户牖而行若循虛而出入則亦無履也夫户牖者風氣所從往來者而風氣者隂陽之户牖也離者必病故託鬼神以戒之又曰百星之明不若一月之光十牖之開不若一户之明揚子法言曰山徑之蹊不可勝由向牆之户不可勝入矣曰惡由入曰孔氏曰孔氏者户也子户乎曰我户哉無獨有不户者矣惡夫不由聖人之道者也三輔黄圖曰明堂有三十六户法極隂之變數束晳發蒙記曰治户傷孕婦楚國先賢傳曰孫敬入學閉户牖精力過人太學號曰閉户先生語林曰大將軍丞相諸人在此時閉户共為謀身之計王曠世宏來在户外諸人不容之曠乃剔壁闚之曰天下大亂諸君欲何所圖謀將欲告官遽而納之遂建江左之策焉神異經曰大荒東南有石井井傍有二石闕闕東靣上題曰地户列士傳曰吳王闔閭畏王僚之子慶忌作石室銅户以備之太公金匱户銘曰出畏之入懼之解道虎齊記曰巢父城北十五里石户聖人去轉欲閉今裁廣數寸窺窟裏方二尺論衡曰燕王生明光宫所卧處三户盡閉使二十人開不得越地傳曰勾踐宫有百户列僊傳曰方靣堯時隠人食雲母夏桀時為人所閉於宫中從求道因化得去即封其户時人曰得方靣一丸泥閉户不可開樞爾雅曰樞謂之椳郭璞注曰門户扉樞也孫炎曰門户扇樞開可依蔽為根也潛夫論曰貴戚懼家之不吉而聚為令名懼門之不堅而作鐵樞卒其所敗者非禁忌少門樞朽也若從貨財而驕僣失民心耳事具門部傅子曰漢武世王侯觀殿重階金樞紫墀李陵詩曰明月照户樞想見餘光輝文選詩曰秦地天下樞八方湊賢才尚書顧命曰四人綦弁執戈上刃夾兩階戺孔安國曰綦文鹿子皮弁亦冠也唐廉曰戺土所立也爾雅曰樞逹北方謂之落時謂之戺郭璞曰門特樞者或逹北檼以為固三秦記曰明光殿以金為戺關易復卦曰先王以至日閉關商旅不行后不省方焦貢易林曰大畜之乾金柱鐵關堅固衞災君子居之居當憂居左傳曰季孫攻臧紇斬鹿門之關以出奔邾杜預曰魯南城東門方言曰關東陳楚之間户籥老子曰善閉無關鍵史記曰侯嬴謂魏公子曰嬴乃夷門抱關者又漢書王仲翁謂蕭望之曰不肯錄錄反抱關為錄錄循常也魯連子曰魯連先生見孟嘗君於店堂之門孟嘗君曰吾聞先生有勢數可得聞乎連曰勢數者譬若門關舉之以便則可以一指持中而舉之非便則兩手不關非益加重兩手非加罷也彼所起者非舉勢也彼可舉然後舉之所謂勢數鑰周禮地官曰司門掌授管鍵以啓閉國門鄭司農云鍵為牡也方言曰關西謂之鑰何承天纂文曰牡出鑰者也人作鑰子鑰母非也東宫舊事曰守鑰四人對番上下東宫門鑰在中庶子坊太公金匱鑰之書曰昏慎守深察訛也風俗通曰鑰施懸魚翳伏淵源欲令揵閉如此闈爾雅曰宫中門謂之闈周禮考功記曰闈門容小扄蔡邕明堂月令記曰明堂之門北稱闈閨爾雅曰闈小者謂之閨說文曰閨特立之户上圓下方有似於圭文選曰閨中風煖閤說文曰閤門傍户也爾雅曰小閨謂之閤漢書曰公孫宏為丞相起客館開東閤以延賢人又曰田延年盜三千萬閉閤獨居偏袒持刃東西步數日使者召延年詣廷尉聞皷聲自刎死漢書曰左馮翊韓延夀行縣之髙陵有昆弟相與訟曰延夀耻不能明敎化因傳舍閉閤思過訟者自髠肉袒而謝之宋書曰孝武宴朝賢張暢何偃並在坐偃因醉曰張暢固是竒才同義宣作賊亦能無咎非才何以致此暢乃厲聲曰太初之時誰黄其閤帝曰何事相苦初元凶時偃父尚之為元凶司徒義師至新林門生偕尚之父子與婢妾洗黄閤故暢譏之晋宫閤名曰洛陽宫有金花閤清陽閤承休閤朱明閤安樂閤白藏閤顯仁閤崇仁閤章徳閤飛雲閤安世閤長安閤長安有東明閤西華閤紫闥閤傳元歌詩曰我家近宫掖易知復難忘黄金為閤門白玉為殿堂晉宫閤名曰洛陽有金光閤文成閤明度閤飛雲閤安世閤長安有東明閤西華閤紫闥閤宋志三公黄閤前史無其義按禮記士􅔖與天子同公侯大夫則異鄭注云賤與君同不嫌也夫朱門洞開當陽之正色也三公與天子禮秩相亞故黄其閤以示嫌不敢斥天子也具漢制云爾閣周書作雒曰凢五宫堂咸有深閣韓詩外傳曰黄帝時鳯凰集東園止於阿閣棲梧桐食竹實身不去禮記内則曰大夫七十而閣天子之閣左逹五右逹五鄭元注云閣以板為之藏食物也五者三牲肉及魚腊廣雅曰棧閣也漢書曰甘露中五經諸儒雜論於石渠閣又揚雄傳曰王莽時雄校書天祿閣上治獄使者來欲收雄雄恐不免乃從閣上自投幾死莽聞之曰雄素不與事何故在此間請問其故廼劉愔子棻嘗從雄學作竒字雄不知情有詔勿問然京師為語曰惟寂惟寞自投于閣後漢楊終上書言宣帝博徵羣儒論定五經於石渠閣方今天下少事學者得成其業而章句之徒破壊大體宜如石渠故事永為後世法廼詔諸儒於白虎觀論考同異焉陳書曰至徳二年後主於光昭殿前起臨春結綺望仙等閣長數丈並數十間其牕户牖皆以懸楯欄檻之類並以沉檀香木為之又飾以金玉間以珠翠外施珠簾内有寳帳其服玩之瑰寳珎異皆近古所未有每㣲風漸動香聞數里朝日初照光映後庭其下積石為山引水為池植以竒木雜以花藥後主自居臨春閣貴妃居結綺閣龔孔二貴嬪居望仙閣並複道相往來五代史朱梁傳曰宰相栁璨奏西京舊有凌煙閣圖畫國初功臣今遷幸東都比未崇建四鎮副元帥梁王勲業冠古請近新凌烟閣别創一閤畫梁王以旌徳業詔曰魏賞彭陽之功别創紀勲之觀齊旌泗水之績乃崇嘉徳之樓式示新規爰從舊典宜令所司於皇城擇善地别造凌煙閣圖寫賜名曰天佑旌功之閣戰國䇿曰田單棧道木閣以迎齊㐮王及后於城陽山反之國楚漢春秋曰項王為髙閣置太公於上告漢王曰今不急告下吾烹太公漢王曰吾與項王約為兄弟吾翁即若翁如烹若翁幸分我一杯羮三輔舊事曰秦二世起凌煙閣與南雲山齊漢宫殿䟽曰天祿閣麒麟閣蕭何造以藏秘書畫賢臣凌雲閣秦二世造洛陽宫殿簿曰髙平觀南行至清覽觀髙閣六十四間修齡觀南行至臨商觀髙閣五十五間太極殿前南行仰閣三百二十八間南上摠章觀閣十二間東上凌雲臺閣十一間永寧宫連閣二百八十六間十二間連閣上下數見親觀差閣九間洛陽地記曰雲臺髙閣十四間乗風觀髙閣十二間洛陽記曰漢魏宫殿觀多以複道相通故洛陽宫之閣七百餘間三輔故事曰天祿閣石渠閣在大殿北以藏秘書又畫賢臣像凢二十人霍光第一蘇武第十二尸子曰泰山之中有神房阿閣物理論曰故人之任孕者總其名籍上之天府天子立金匱玉閤命司錄以省監之西京記曰西京大明正中含元殿殿東西翔鸞棲鳯閤下肺石登聞皷左右龍尾道東京記曰紫微宫有臨渡閣閶闔閣班固西都賦曰周廬千列徼道綺錯輦路經運蘭除飛閣張衡西京賦曰鈎陳之外閣道穹隆属長樂與明光徑北通乎桂宫龔友遂初賦曰攷天文于蘭閣覽羣言於石渠古詩曰交疏結綺忩阿閣三重堦陸機樂府詩曰昌門何峨峨飛閣跨通波崔琦七蠲曰紫閣青室綺錯相連東京賦曰飛閣神行南都賦曰連閣煥其相輝上林賦曰重座曲閣陸機表云登三閣注三閣祕書郎掌内外三閣經書鮑昭詩觀霞登綵閣蜀都賦曰行陽城之延閣注延長也江淹表云府之延閣注延閣書府也天台賦曰朱閣玲瓏於雲間陸機詩曰飛閣纓虹螮張景陽七命翠觀岑青彫閣霞連謝元暉詩曰尋雲陟累榭隨山望茵閣楚辭曰蘭閣兮黄樓古詩曰層閣肅天居簃爾雅曰連閣謂之簃郭璞注曰堂樓閣連小屋今呼之簃厨連觀也通俗文連閣曰簃闥東觀漢記曰帝詔馬嚴留仁夀闥與校書杜撫班固定建武注記晉宫閣名曰洛陽宫有崇陽闥延明闥通明闥修雲闥通福闥承休闥𤣥明闥𤣥暉闥崇禮闥白藏闥太平御覽卷一百八十四
