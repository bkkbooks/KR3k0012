front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_023-1a, image: WYG0893/WYG0893-0206a.png}
body:
  text: 太平御覧卷二十三宋李昉等撰時序部八夏下立夏夏至夏下淮南子曰中央土其帝黄帝黄帝以土德王天下號曰軒轅氏死紀祀於中央之帝其佐后土執繩而制四方其神為鎮星其獸黄龍土色黄也其音宫其日戊己土音也戊己土日也又孟夏之月南宫御女赤色衣赤采吹竽笙火生南方故處南宫也竽笙空中象陽故吹之其兵㦸㦸有枝榦象陽布散也四月官田其樹桃四月勉農事故官田也桃説與杏同五月官相其樹榆是月養氣長養故官相佐也榆説文枋也季夏之月中宫御女黄色衣黄采其兵劍季夏中央也劍有兩刃喻無所不主也又貧人則夏被褐帶素含菽飲水止暑熱冬則羊裘不蔽體短褐不掩形而煬又曰鄒衍事燕惠王盡忠左右譛之王繫之仰天而哭夏五月天為之降霜又陽氣為火隂氣為水水勝故夏氣濕火勝故冬至燥八尺之表影脩尺有五寸影脩則隂氣勝短則陽氣勝隂氣勝則為水陽氣勝則為旱又南方之極自北户孫之外北户孫國名也日所在其處皆為北向之户者也貫顓項之國南至季火炎風之野又夏赤帝祝融之所司者萬二千里赤帝炎帝少典之子號為神農南方火徳之帝也祝融顓頊之孫一名黎為髙辛氏火正號為祝融死為火帝也其令曰爵有功賞有徳恵賢良救飢渴舉力農振貧窘恵孤寡憂罷音疲疾出水火起毁宗立無後建賢輔應陽施也又夏行春令則多風春象木氣多風又孟夏招揺指已盛德在火又六月失政十二月草木不脱不脱葉著樹不零落也又景風至則施爵位賞有功夏至隂氣在下陽勝於上象陽佈故賞有功封建諸侯又夏治以衡衡者所以平萬物也衡之為度也緩而不後平而不怨施而不德匝而不責常平民禄以繼不足㪍㪍揚揚惟德是行長養化育萬物蕃昌以成五穀以實封疆其政不失天地乃明明理也吕氏春秋曰杜厲叔事莒閔公以為不知去居海上夏食菱芡冬食橡栗續晉陽秋曰季夏之月令漁師伐蛟升龜漁師掌魚官有蛟能害人難得故言伐龜神可以決吉凶入宗廟尊之故言升蛟則害龜則神也傅𤣥述夏曰四月維夏運臻正陽和氣穆而扇物麥含露而飛芒鳳凰升而王萯秀王萯草名龍辰中而螢火翔魏文帝詩曰夏時饒温和避暑就清涼北坐髙閣下延賔作名倡嘉殽重疊來珍果在一傍棊局縱横陳博奕合雙楊功出更平聲勝負歡美樂人觴從朝至日夕安知夏節長立夏禮記月令曰四月之節日在昴立夏為四月昏翼中曉牽牛中斗建巳位之初其日丙丁立夏之日螻蟈鳴太史以先立夏三日謁於天子曰某日立夏盛德在火天子乃齊立夏之日天子親率三公九卿大夫迎夏於南郊還乃賞公卿諸侯大夫於朝慶賜遂行無不欣恱命相贊傑俊遂賢良舉長大贊猶揚也遂猶逹也傑俊謂才兼於人者行爵出禄必當其位無虛授也易說曰立夏清明風至而暑鶴鳴博穀飛電見龍升天龍心星明易通卦驗曰螻蟈鳴三禮義宗曰四月立夏為節夏大也至此之時物已長大故以為名小滿為中者物之生長小得並滿故以小滿為名也孝經緯曰穀雨後十五日斗指辰東南維為立夏後十五日斗指已為小滿後漢書禮儀志曰立夏之日夜漏未盡五刻京師百官皆衣赤至季夏衣黄淮南子曰春分加四十六日而立夏大風濟濟止也音中夾鍾夾鍾二月也萬物去隂夾陽氣而生也加十五日指已則小滿滿冐也音中太蔟太蔟正月律也蔟之言隂衰陽發萬物蔟而生也周書時訓曰立夏之日螻蟈不鳴水潦滛漫蚯蚓不出臣奪后命王瓜不生害於百姓小滿之日苦菜不秀仁人潛伏靡草未死國從盜賊若小暑不至是謂隂匿劉元之行軍月令曰立夏日得金五穀不成夏旱多風得木夏寒草生得火多妖言兵戈起得土逺臣朝國無政令得水上下相和順天下安寧登真隱訣曰立夏之日日中五帝㑹諸仙人於紫微宫見四真人論求道之功罪五方之帝亦主道者詣太極紫微宫見四真人論按其功罪之多少夏至周易復卦曰雷在地中復先王以至日閉關商旅不行后不省方冬至隂至復也夏至陽至復也左傳曰昭二十一年秋七月壬午朔日有食之公問於梓慎曰是何物也禍福何為物事也對曰二至二分二至冬至夏至二分春分秋分日有食之不為灾日月之行也分同道也至相過也二分日夜等故言同道二至長短極故相過其他月則為灾陽不克也故常為水隂侵陽是陽不勝隂傳曰少昊氏以鳥名官伯趙氏司至者也伯趙伯勞也以夏至鳴冬至止周禮地官曰夏至日影尺有五寸鄭氏云土圭之長也尺有五寸夏至立八尺表其影適與土圭等謂之地中今潁川陽城地為然又春官大司樂曰孤竹之管雲和之琴瑟冬至日於地上圓丘奏之絲竹之管空桑之琴瑟夏至日於澤中方丘奏之隂竹之管龍門之琴瑟於宗廟奏之雲和空桑龍門山名又曰宗伯以夏至致地祗物鬽音妹以禬國之凶荒民之札䘮禬除也又曰柞氏夏至令刋陽木而火之冬至剥隂木而水之薙氏掌殺草夏至日而夷之易通卦驗曰夏至景風生蟬始鳴螳螂生鹿角觧木槿榮又曰夏至小暑反舌無聲又曰鹿者獸之隂也貴臣之象鹿應隂觧角也夏至太陽始屈隂氣始昇隂陽相向君之象也今失節不改臣不承君之象故為貴臣作奸也又離南方也夏至日中赤氣出直離此正氣也氣出右萬物半死氣出左赤地千里易稽覧圖曰夏至後三十日極温夏至景風至蟬始鳴螳螂生京房易占曰夏至離王去聲景風用事人君當爵有德封有功春秋感精符曰冬至日成天文夏至日成地理春秋考異郵曰夏至井水躍五經通義曰夏至隂始動而未達故寢兵鼓不設政事所以助微氣之養也三禮義宗曰五月芒種為節者言時可以種有芒之穀故以芒種為名夏至為中者至有三義一以明陽氣之至極二以助隂氣之始至三以明日之北故謂之至又夏至之時祭崑崙之神於澤之中配於后孝經説曰夏至之日日在内衡又斗指午為夏至續漢書禮儀志曰夏至日浚井改水冬至鑽燧改火可去温病也宋書元嘉四年斷夏至日五絲縷之屬南史曰沈林子祖父穆夫為沈預所䧟死林子與兄田子還東報讐五月夏至節日至預家正大集㑹子弟盈堂林子兄弟挺身直入斬預首男女無論長㓜悉屠之以預首祭祖父墓荆楚歲時記曰夏至日取菊為灰以止小麥蠧按干寳變化論乃云稻成蟲麥為蛺蝶其驗乎輿地志曰郭宏常夏至於射的釣魚供母將餌聞笳角聲魚躍而出管子曰夏而麥熟天子祈天宗其盛以麥盛粢盛也麥者穀之始抱朴子曰魏武收左元放左慈字元放桎梏之而自觧蓋或用夏至日霹靂㰇音杉也又見潮來去或有早晩輙言有參差非也水從天邊來一月之中天再東再西故潮再大再小也夏至天髙故夏潮大也冬時天卑故潮水小也范子曰周髀云冬至三光微夏至三光盛淮南子曰夏至則斗南中繩陽氣極隂氣萌故曰夏至為刑刑始殺也又夏至則火從之故五月火正而水漏火正火王也故漏水一説水星正中地漏濕也陽氣為火隂氣為水水勝故夏至濕又夏至而流黄澤石精氣流黄土之黄也隂氣作於下故流澤而出也石精五色之精也蟬始鳴半夏生蚊虻不食駒犢鷙鳥不摶黄口五月㣲隂在下未成駒犢黄口肌血脆弱未成故鷙鳥應隂不食不摶也又毛羽者飛行之類也故屬於陽故曰夏至日鹿角觧又夏至加十五日指丁斗杓指丁則小暑音比大吕加十五日指未則大暑音比太簇加十五日指庚背陽之維則夏節盡風俗通曰夏至著五綵辟兵題曰㳺光厲鬼知其名者無温疾五綵辟五兵也按人取新斷織繫户亦此類也謹按織取始斷二三寸帛綴著衣衿以已織維吿成於諸姑也後世彌久易以五綵又永建中京師大疫云厲鬼字野重游光亦但流言無指見之者其後歲歲有病人情愁怖復増題之冀以脫禍今家人織新縑皆取著後縑絹二寸許繫户上此其驗也抱朴子曰予祖彬為汲令以夏至日請主簿杜宣賜酒比壁上有懸赤弩照於杯中形如蛇宣惡之及飲得疾後彬知之使於宣舊處設酒於杯中猶見有蛇因謂宣曰此弩影耳宣遂意觧古今厯衍曰夏至之日晝六十五刻夜三十五刻酈道元水經注曰丹水出丹魚先夏至前十夜伺之魚浮水赤色上照如火神異經曰北方荒中有石湖方千里無凸從吉切凹校交反平滿無髙下岸深五丈餘其氷維夏至左右五十六日觧耳厯䟽曰芒種謂穀芽始出故曰芒種夏至之日其日行天至於艮維東北角言日行極於北故曰夏至竺法真羅山䟽曰荔枝以冬青夏至日子始赤六七日可食雜記曰百舌鳥一名反舌春則囀夏至則止唯食蚯蚓正月以後凍開則來蚯蚓出故也十月以後則藏蚯蚓蟄故也物之相感不知所由酉陽雜俎曰猫目睛旦暮圓及午竪歛如線其鼻端常冷唯夏至一日暖蔡邕獨斷曰夏至隂氣始起鹿角觧故寢兵鼓身欲寧志欲静不聽事送迎五日又夏至隂氣始君道衰故不賀占氣曰夏至之日離卦用事日中時南方有赤雲如馬者離氣至也宜黍離氣不至日月無光五穀不成人民目疼冬中無冰應在十一月内夏至之日風從離來為順其年大熟夏至前六日夏至後十日十六日為窮日月令占候圖曰夏至朔日夏至并二日三日至六日夏至五穀熟二十二日二十四日夏至不熟二十五日三十日夏至時價平和晦日夏至五穀貴天文録曰大寒在冬至後二氣積寒而未温也大暑在夏至後二氣積暑而未歇也寒暑和乃在春秋分後二氣寒暑未即平也譬如火始入室未甚温弗事加薪久而愈熾既遷之猶有餘熱也冬至之日日出辰入申晝行地上百四十六度强夜行地下二百一十九度少弱故晝短夜長也夏至之日日出寅入戌晝行地上二百一十九度少弱夜行地下一百四十六度强故晝長夜短春秋之日日出卯入酉晝行地上夜行地下皆一百八十二度半强晝夜長短同也太平御覧卷二十三
