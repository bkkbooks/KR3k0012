body:
  text: 太平御覽卷三百五十五宋李昉等撰兵部八十六甲上釋名曰鎧猶塏塏堅重之言也或謂之甲似物孚甲以自禦也廣雅曰函甲介鎧也說文曰鎧甲也銲音翰臂鎧也錏音雅頸鎧也世本曰杼作甲宋衷曰少康之子也甲鎧也墨子同書曰惟口起羞惟甲胄起戎孔安國曰甲鎧也言不可輕教令易用兵又曰魯侯伯禽都曲阜徐戎並興公曰善􅙀乃甲胄敿乃干易說卦曰離為甲胄詩曰小戎美襄公也備其兵甲以討西戎西方戎疆也征伐不休國人則矜其甲婦人能問其君子焉又曰叔于田刺莊公也叔處于京繕甲治兵以出于田國人說而歸之又曰清人在彭駟介旁旁介胄也又曰豈曰無衣與子同裳王于興師脩我甲兵與子皆行禮記曰介胄則必有不可犯之色又曰介者不拜言失容也又曰獻甲者執胄又曰甲若有以前之則執以將命無以前之則櫜袒奉胄鄭𤣥曰甲鎧也有以前之謂他贄幣也櫜鎧衣也胄兠牟也袒其衣出墨鍪以致命也又曰國家靡弊則車不彫幾甲不組縢食器不刻鏤君子不履絲履馬不常秣又曰賔牟賈侍坐於孔子言及武樂孔子曰武王克殷濟河而西車甲衅許靳切而藏之府庫而弗復用然後天下知武王不復用兵也又曰君子耻服其服而無其容耻有其容而無其辭耻有其辭而無其德是故君子端冕則有敬色甲胄則有不可辱之色言色稱其服也又曰儒有忠信以為甲胄禮義以為干櫓戴仁而行抱義而處雖有暴政不更其所自立有如此者甲鎧也干櫓者大小楯也周禮曰司甲下大夫二人中士八人甲今時鎧也司其甲戈楯官也又曰燕之無函也非無函也夫人而能為函也鄭𤣥曰以言燕地之人皆能作是噐不湏國工也燕近強胡胡習作甲胄也又曰函人為甲犀甲七屬兕甲六屬合甲五屬屬讀如藿詿之謂上旅下旅扎續之數也革堅者扎長鄭司農云合甲胄革裏肉但取其表合以為甲也犀甲壽百年兕甲壽二百年合甲壽三百鄭𤣥曰革堅者支乆也凡為甲必先為容服者之形容鄭司農云容謂象武也然後制革裁扎之廣柔也權其上旅與其下旅重而若一鄭司農云上旅謂要以上也下旅謂要以下也以其長為之圍圍謂比要廣厚凡甲鍜不贄則不堅已敝則撓鄭司農云鍜鍜革也贄謂質也鍜革太熟則革敝旡強撓曲也左傳曰鄭武公娶于申曰武姜生莊公及共叔叚莊公即位使叚居京謂之京城太叔後太叔治甲兵具卒乘將襲鄭夫人將啟之公聞其期命子封帥車二百乘以伐京又曰狄伐衛衛懿公好鶴鶴有乘軒者將戰國人受甲者皆曰使鶴鶴實有祿位余焉能戰又曰楚成王欲黜太子商臣其師潘崇曰能行大事乎曰能以宫甲圍成王杜預曰太子宫甲也又曰晉秦師至河曲秦軍掩晉上軍趙穿追之不及返怒曰裹糧坐甲固敵是求敵至不擊將何俟焉乃以其屬出又曰宋華元獲于鄭逃歸後宋城華元為植廵功植將主也城者謳曰睅其目皤其腹棄甲而復睅大目皤大腹棄甲謂亡師也于思于思棄甲復來于思鬚多貎使其驂乘謂之曰牛則有皮犀兕尚多棄甲則那那猶何也役人曰縱有其皮丹漆若何又曰晉侯飲趙盾酒伏甲將攻之其右提彌明知之趨登曰臣侍宴過三爵非禮也遂扶以下公嗾夫獒焉明摶而殺之盾曰棄人用犬雖猛何為鬭且出提彌明死之又曰晉楚戰於邲楚王乗左廣以逐趙旃趙旃棄車而走林屈蕩搏之得其甲裳又曰齊晉陳於鞍齊頃公曰余姑剪㓕此而朝食姑且剪盡不介馬而馳之晉郄克傷於矢曰余病張侯曰擐甲執兵固即死也擐貫也即就也病未及死吾子勉之又曰使吕相絶秦曰文公躬擐甲胄䟦履山川征東之諸侯虞夏商周之𦙍而朝諸秦又曰晉楚戰於鄢陵潘尩之子黨與養由基蹲甲而射之徹七札蹲聚也一發達七札以示王曰王有二臣如此何憂於戰也又曰晉胥童夷羊五帥甲八百將攻郄氏長魚矯請無用衆既殺三郄胥童以甲刼欒書中行偃於朝矯曰不殺二子憂必及君公曰一朝而尸三卿余不忍也又曰楚子重伐吳為簡之師簡選練也克鳩兹至于衡山使鄧廖帥組甲三百被練三千馬融曰組甲組為甲裏公族所服被練為裏甲者所服杜預曰組甲成組文被練練袍也以侵吳吳人要而擊之獲鄧廖其能免者組甲八十被練三百而已又曰宋災樂喜為司城以為政使皇鄖命校正出馬工正出車備甲兵又曰諸侯會柤遂伐偪陽狄彌建大車之輪而䝉之以甲以為櫓杜預曰狄彌魯人也䝉覆也櫓大楯也左執之右㧞㦸成一隊百人為隊又曰鄭子孔之為政也專國人患之乃討西宫之難尉止等作難於西宫子孔知而不言子孔當罪以其甲及子革子良氏之甲守以自守子展子西率國人伐之殺子孔而分其室又曰欒盈帥曲沃之甲因魏獻子以晝入絳又曰崔杼稱疾不視事莊公問崔子問疾遂從姜氏侍人賈舉止衆從者而入閉門為崔子閉公也甲興公登臺而請弗許請自刄於廟弗許遂殺之又曰楚蒍掩為司馬子木使庀賦數甲兵閱也數賦車籍馬籍疏其毛色歳齒以備軍用賦車兵車兵甲士徒甲步卒甲楯之數使噐仗冇常數既成以授子木禮也又曰鄭伯有嗜酒為窟室而夜飲酒擊鐘焉子晳以駟氏之甲伐而焚之伯有奔雍梁雍梁鄭也聞子皮之甲不與攻已喜曰子皮與我矣晨自暮門之竇入駟帶率國人攻之伯有死於羊肆又曰諸侯將盟於宋西門之外楚人衷甲甲在衣中欲因會攻擊伯州犁固請釋甲子木曰晉楚無信久矣事利而已苟得志焉焉用有信太宰伯州犂也告人曰令尹將死矣又曰鄭徐吾犯之妺美公孫楚聘之楚子南也公孫黑又使強委禽焉子南戎服入左右射超乘而出女自房觀之曰子晳信美矣抑子南夫也適子南氏子晳怒既櫜甲以見子南欲殺之而取其妻子南擊之子晳傷而歸又曰楚靈王伏甲饗蔡靈侯醉而殺之刑其士七十人公子弃疾帥師圍蔡傳言楚无道也又曰齊子尾卒子旗欲治其室子旗季施也欲并治子尾之家政殺梁嬰梁嬰子尾家臣而主子良氏之宰子梁子尾之子高蠆也子旗為子良主宰其臣曰孺子長矣孺子謂子良也而相吾室欲無我也授甲將攻之桓子善於子尾亦授甲將助之或告於子旗子旗不信則數人告將徃又數人告於道遂如陳氏桓子將出走聞之而還還子根室遊服而逆之去戎備有宫遊戲之服請命問桓子所至也對曰聞彊氏授甲將攻子子聞諸乎曰弗聞曰子盍亦授甲無宇請從又曰齊惠欒高氏皆嗜酒欒高二族皆出惠公也信内多怨彊於陳鮑氏而惡之夏有告陳桓子曰子旗子良將攻陳鮑氏遭子良醉而騁欱及子良醉故馳告鮑文子也遂見文子文子國鮑也則亦授甲矣使視二子二子子旗子良則皆將飲酒桓子曰彼雖不信彼傳言也聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒髙氏欒施髙強來奔又曰晉荀躒如周籍談為介王曰闕鞏之甲武所以尅商也唐叔受之以處參墟匡有戎狄又曰魯昭公伐季平子叔孫氏之司馬鬷戾言於其衆曰凡有季氏與無於我孰利皆曰無季氏是無叔孫氏也鬷戾曰然則救諸帥徒以徃䧟西北隅以入䧟公闕也公徒釋甲執氷而踞言無戰心遂逐之逐公徒也公遜于齊又曰吳子光伏甲於窟室而享王僚掘地為室王使甲坐於道及其門坐道邊至光門門階戸席皆王親也專諸抽劍刺王鈹交於胸又曰郤宛直而和令尹子常賄而信讒費無極譛郤宛謂子常曰子惡欲飲子酒子惡郤宛又謂子惡令尹欲飲酒於子氏無極曰令尹好甲兵子出之吾擇焉擇取以進也取五甲五兵曰寘諸門令尹至必觀之而從以酬之曰無極辭及饗日帷諸門左張帷列兵甲其中無極謂令尹曰吾幾禍子子惡將為子不利甲在門矣子必無徃令尹使視郤氏則有甲焉不徃遂令攻郤氏之族黨又曰齊伐晉夷儀東郭書讓登犂彌從之書與王猛息將登而休息猛曰我先登書斂甲曰曩者之難今又難焉斂甲起欲擊之猛笑曰吾從子如驂之靳註靳車中馬也疏靳是當胷之皮也猛不敢與書爭故言已之從書若驂馬之隨靳也又曰齊伐魯孟孺子泄帥右師孺子孟懿子之子武伯也顔羽御邴洩為右三子孟氏臣冉求帥左師管周父御樊遲為右季氏之甲七千冉有以武城人三百為已徒卒老㓜守宫次于雩門之外南城門也五日右師從之及齊師戰于郊師獲甲首八十冉求所得齊人不能師又曰哀公會吳子伐齊甲戌戰于艾陵展如敗高子國子敗胥門巢王卒助之大敗齊師獲革車八百乗甲首三千以獻于公公以兵從故以勞公又曰吳王夫差敗越于夫椒遂入􅚼越子以甲楯五千保于會稽又曰孔文子將攻大叔氏訪于仲尼仲尼曰俎豆之事則嘗聞之矣甲兵之事未之聞也退命駕而行又曰侯犯以郈叛武叔懿子圍郈弗克駟赤謂侯犯日旦盍多舍甲於子之門以備不虞侯犯曰諾乃命舍甲焉侯犯請易於齊齊有司觀郈將至駟赤使周走而呼曰齊師至矣郈人大駭介侯犯之門甲以圍侯犯又曰晉周綽射殖綽齊大夫中肩兩矢夾脰曰止將為三軍獲不止將取其𠂻乃弛弓而縛郭最皆衿甲面縛公羊曰成元年始作丘甲何以書譏何譏爾譏始丘使也何休一解曰四井為邑四邑為丘甲鎧也幾始使丘民丘甲鎧也周書曰年不登甲則纓縢宫室不容戰國䇿曰陘山之事趙且與秦伐齊齊王懼蘇代為齊獻書穰侯曰臣聞徃來者之言曰秦且益起甲兵四萬人以伐齊臣竊必之弊邑之王曰秦王明而熟於計穰侯智而習於事必不益趙甲兵以伐齊也國語曰晉平公射鴳不死使堅衰持之逸公怒拘將殺之叔向聞之曰君必殺之昔吾先君唐叔射兕于徒林殪以為大甲今君射鴳不死搏之不得是揚吾君之耻也又曰勾踐云今夫差衣水犀之甲者億有三千水犀獸名不患其志行之少耻也而衆之不足也史記曰晉趙􅀈取晉陽之甲以逐荀寅與士吉射君側之惡人也漢書曰甲不堅密與袒裼同此將不省兵之禍也又曰周亞父曰介胄之士不拜以軍禮見天子為之動容又曰魏氏武卒衣三屬之甲手操二石之弩負矢五十後漢書曰朱浮被彭寵攻懷懼上䟽曰今秋稼已熟復為漁陽所掠百姓皇皇無所繫心三河冀州曷足傳後伏見張豐狂悖奸黨曰增連年拒守吏士疲勞甲胄生蟣虱弓弩不得弛又曰曹操攻袁尚袁尚曰我鎧甲不精故前為曹操所敗東觀漢記曰祭遵薨賜朱輪容車遣校尉教騎士四百人被𤣥甲又曰將軍劉尚擊武陵没議復遣將馬援年六十二自請曰臣尚能被鎧上馬光武試焉既上馬據鞍左右顧眄上曰矍鑠哉是翁也又曰劉盆子與丞相二十餘萬人詣宜陽降光武積兵甲於宜陽城西髙與熊耳山等魏志曰景元平肅慎國獻皮骨鐵雜鎧二十領又東夷傳曰漢時夫餘王葬用王甲常以付𤣥莬郡王死則迎取公孫淵誅得之𤣥莵庫晉書曰桓伊為江州刺史卒初伊有馬步鎧六百領預為表令死乃上之表曰臣過􅂪殊寵受任西藩淮南之㨗逆兵奔北人馬噐鎧隨處放散於時收拾破敗不足貫連比年營繕並已修整今六合雖一餘燼未㓕臣不以朽邁猶欲輸力効命仰報皇恩此志永絶衘恨泉壤謹奉輸馬具裝百具步鎧五百領並在尋陽請勒屬領受詔曰忠誠不遂益以傷懷乃受其所上之鎧又曰馬隆討凉州或夾道累磁石賊負鐵鎧行不得前隆卒悉被犀甲無所留礙賊咸以為神轉戰千里殺傷以千數又曰杜曾新野人少驍勇絶人能被甲游於水中凡有戰陣勇貫三軍魏末傳曰司馬文王秉政徵諸葛誕既被徵請諸牙門置洛飲宴謂衆人曰前作千人鎧仗始成欲以擊賊今當還洛不復得用欲蹔出將見人遊戲湏臾還耳諸君且止乃嚴鼓將七百人出遂殺樂綝吳歴曰魏文帝與吳王明光鎧王隠晉書曰馬隆為武威太守之郡惡虜窟局樹機能守斷道圍隆隆作八陣圗地廣則鹿角車營並進狹則才屈施輪並戰並前智謀從橫出其不意以磁石累夾道側賊鎧不得過隆兵着牛皮鎧得過賊以為神又曰陶侃夢見司馬與侃鎧者長史陳協以為司馬者國姓也鎧者捍國之噐也節下當進位俄轉都督湘州刺史崔鴻後燕録曰苻丕遣石越討慕容豐皆勸豐逆擊之豐曰我無兵伏彼有犀甲不如待暮一戰而定之三十六國春秋曰太康之初吳冦新殄未盈一紀干戈已尋蟣虱生乎甲胄鷰雀處於帷幄車頻秦書曰苻堅使熊邈造金銀細鏤甲金為線以縲之縲音纍宋書曰比年北州為虜所䧟沈文秀被圍三載外無援兵士卒為之用命無離叛者日夜戰鬭甲胄生蟣虱隋書曰長孫平為相州刺史甚有能名在州數年會正月十五日百姓大戲畫衣裳為鍪甲之象上怒而免之俄而念平鎮淮南時事進位大將軍又曰張奫於侖切累破賊有功徵入朝拜大將軍髙祖命升御座而宴之謂奫曰卿可為朕兒朕為卿父今日聚集示無外也其後賜綺羅千疋綠沉甲獸文具裝又曰權武少果勁勇力絶人能重甲上馬嘗倒投於井未及泉復躍而出其拳㨗如此唐書曰元和中以尚書左丞吕膺檢校工部尚書充東都留守舊例命留守必賜旂甲與方鎮畧同及元膺受任無所賜朝論以東有冦虞時用元膺尤不當削其儀制以沮威望諫官上䟽曰華汝壽三州例賜戎械居守之重固冝寵借上曰此數處並不當與其後遂皆停五代周史曰唐景思為偏將顯德初河東劉崇帥衆來冦世宗親摠六師以禦之及陣於高平景思於世宗馬前距踊數四且曰願賜臣堅甲一聯以堅臣之効用世宗由是知其名因以髙平陣所得降軍數千人署為効順指揮命景思董之使屯于淮上三年春世宗親征淮甸景思繼有戰功太平御覽卷三百五十五
