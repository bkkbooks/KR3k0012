front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_968-1a, image: WYG0901/WYG0901-0521a.png}
body:
  text: 太平御覽卷九百六十八宋李昉等撰果部五杏李杏典術曰杏木者東方嵗星之精師曠占曰杏多實不蟲者来年秋善竹書紀年曰昭王六年十二月桃杏花幽王十年九月桃杏實山海經曰靈山之下其木多杏盧諶祭法曰夏祠用杏崔實四民月令曰三月杏花盛可播白沙輕􅁟之田後周書曰張元芮城人性亷絜南隣有杏二樹杏熟多落元園中諸小兒競取食之元所得者悉以還主唐史曰馬燧之子暢以第中大杏饋竇文塲文塲以進徳宗徳宗未嘗見頗怪暢令中使就封杏樹暢懼進宅廢為奉誠園管子曰五沃之􅁟其木冝杏荘子曰孔子遊緇帷之林休坐杏壇之上弟子讀書孔子絃歌鼓琴𤣥晏春秋曰衞倫過予言及於味稱魏故侍中劉子陽食餅知塩生精味之至也予曰師曠識勞薪易牙别緇渑子楊令之妙也定之何難倫因命僕取粮糗以進予嘗之曰麥也有杏李㮏味三果之熟也不同子焉得兼之倫笑而不言退告人曰士安之識過劉氏吾家果食多故於杏時将發故揉以杏汁李時将發又揉以李汁㮏時将發又揉以㮏汁故兼三味汜勝之書曰杏始華趣耕輕土杏華落趣耕閒又曰杏花如何可耕白沙盧毓冀州論曰魏郡好杏地産不為無珎神仙傳曰董奉字君異居廬山為人治病重病得愈者令種杏五株輕病得愈者為栽一株數年之中杏有十數萬株鬰然成林杏子熟奉於林中所在作簞食一噐宣語買杏者不復須来報但有取之一噐榖便得一噐杏有人少榖徃而取杏多即有三四頭虎逐之奉悉以杏所得榖賑救貧家南嶽夫人傳曰仙人有三𤣥紫杏西京雜記曰上林有文杏材有文彩蓬萊杏東海都尉于吉獻一株花雜五色六出云是仙人所食者廣志曰荣陽有白杏鄴中有赤杏有㮏杏嵩髙山記曰嵩髙山東北有中山其山多杏至五月爛然黄熟自中國䘮亂百姓饑饉皆資此為命人人充飽而杏不盡洛陽宫殿簿曰眀光殿前杏一株顯陽殿前杏六株含章殿前杏五株晉宫閣名曰暉章殿前杏八株楊􅃷之洛陽伽藍記曰西方于闐王不信佛法有商胡将一比丘毗盧旃在城南杏樹下向王伏罪今輒将異國沙門來在城南杏樹下王聞忿怒即徃看毘盧旃語王曰如來遣我令王造覆盆浮圖一區使王祚永隆王言使我見佛我當從命毘盧旃鳴鐘告佛即遣羅㬋羅變為佛形從空而見真容王五體投地即於杏樹下置立寺舎焉任昉述異記曰杏園洲在南海中多杏海上人云仙人種杏䖏漢時有人舟行遇風泊此洲五六月日食杏故免死云洲中有冬杏又曰頼鄉老子祠有縹杏地里志曰范蠡宅在湖中有海杏大如拳王充果賦云冬熟之杏春熟之甘晉郭太機果賦云杏或冬而實司馬相如長門賦曰餙文杏以為梁王逸荔枝賦曰魏土送西山之杏王廙洛都賦曰豹祠赤杏胡安道黄丼賦曰越魏都之赤杏朱超石與兄書曰光武墳邊杏甚羙今送其核潘岳閒居賦曰梅杏郁棣之屬華實昭爛言所不能極也李爾雅曰休無實李一名趙李座接慮李今之麥李也駮赤李子赤也桃李醜核子中有核人棗李曰㚄之毛詩鵲巢曰何彼穠矣華如桃李平王之孫齊侯之子又淇澳木𤓰曰投我以木李報之以瓊玖韓詩外傳曰子質仕魏文侯獲罪北遊謂簡王曰從今已去不復樹徳於人矣簡王曰春樹桃李夏得隂其下秋得食其實春樹蒺蔾夏不採其葉秋得刺焉今子所樹非其人也春秋運斗樞曰玉衡星散為李又曰逺雅頌著倡優則李生𤓰史記曰桃李不言下自成蹊晉書曰王戎年七嵗嘗與諸小兒逰看道邊李樹有子多折枝諸小兒競取之惟戎不動人問之答曰樹在道邊而子多必苦李也取之信然又曰王安豊有好李當賣恐人得種恒鑚其核又曰和嶠性至儉家有好李常求之不過數十王武子因其上直率将少年能食之人将斧詣園飽啖畢伐之送與嶠問何如君李齊書曰王僧孺少時有餽其父李先以一與之不受曰大人未見不容先嘗三國典畧曰齊武成寵任東平王儼而儼噐服玩􅎖同於後主嘗於南宫見典御進新氷早李返而怒曰尊兄已有我何尚無唐書曰武徳中有獻李樹連理盤屈如龍又曰貞觀中玉華宫李樹連理隔澗合枝又曰神龍中陳州官舍有李樹花将盡忽更鮮茂而生花焉管子曰五沃之土其木宜李晏子曰景公病疽在背欲見不得公問國子國子曰熱如火色如日大小如未熟李公問晏子曰色如蒼玉大如壁也公曰不見君子不知野人拙也孟子匡章曰陳仲子豈不誠亷士哉居於陵三日不食耳無聞目無見井上有李螬食實者過半矣匍匐往將食之三咽然後耳有聞目有見吕氏春秋曰子産相鄭桃李之垂于街者莫之援也抱朴子曰五原蔡誕入山而返欺其家人云到崑崙山崑崙山有玉李光眀洞徹而堅湏以玉井水澆之便軟可食又曰南頓人張助耕於田田有一李栽在耕次助意惜之欲持歸乃掘取之未得即去以濕土封其根以置空桑中遂忘取后作逺職不在其里中人見桑中忽生李謂之神有病目痛者蔭息此桑下因祝之言李君能令我目愈者謝一豚其目偶愈便殺豚祭之傳者過差便言此樹能令盲者得視逺近翕然皆来請福山海經曰邊春之山多李里人常採之漢武内傳曰李少君謂武帝曰溟海之􅀥大如𤓰鍾山之李大如瓶臣以食之遂生竒光又曰仙之上藥有圓丘紅李晉宫閣名曰暉章殿前有嘉李鄴中記曰華林園有春李冬華春熟周䖏風土記曰南郡細李四月先熟列仙傳曰師門者嘯父弟子也食桃李葩又曰老子之母適到李樹下而生老子生而能語指李樹曰此以為姓真人王褒内傳曰五雲丹山上有𤣥雲之李食之得仙稽康髙士傳曰長靈安丘生病篤弟子公沙都来省之與安共至於庭樹下聞李香開目見䨇赤李著枯枝自堕掌中安丘食之所苦盡愈笑林曰趙公伯醉眠數嵗孫兒縁其腹戱因以李子内其肶音毗臍中累七八枚既醒了不覺數日後乃知痛李汁爛出以為臍穴懼死乃命妻子䖏分家事李核出尋問乃知是孫兒所為梦書曰李為獄官梦見李者憂獄官西京雜記曰上林苑有紫李青綺李黄李青房李緑李顔淵李出魯志金枝李五株羗李朱李車下李燕李猴李蠻李廣志曰䑕李朱李可以染又曰車下李車上李又曰麥李細小有溝道李有黄建李青李馬肝李赤李房林李有䭞李肌粘茹似䭞有㮏李離核李李似㮏有劈李熟必先劈裂有孝經李一名老子李其樹數年則枯有杏李味小酢似杏有黄扁李有夏李有冬李十一月熟此三李種鄴園有春李秋華冬熟郭子横洞𡨕記曰琳國去長安九千里多生玉葉李色如碧玉五千嵗一實酸苦韓終常食之亦名韓終李也唐新語曰安金藏喪母廬於墓側有湧泉自出又有李樹盛冬開花犬鹿相押採訪使盧慎以聞詔旌其門閭列異傳曰袁本初時有神出河東號度索君居民共立廟兖州蘇氏母病徃禱見一人著白素單衣髙冠似魚頭語度索君曰昔盧山共食白李未乆已三千年日月易得使人悵然度索君曰南海君也任昉述異記曰魏文帝安陽殿前天降朱李八枚啖其一數日不食今種有安陽李大而甘者即其種也又曰杜陵有金李李之大者謂之夏李尤小者呼為䑕李又曰房陵定山有朱仲李園三十六所潘岳閒居賦曰閒陵朱仲之李李尤果賦云三十六園之朱李又仙李縹而神李紅張士衡果賦云中山之縹李又曰武陵原在呉山中無他木盡生桃李俗呼為桃李源源上有石洞洞中有乳水世傳秦亂呉人于此避難者食桃李實皆仙去呉氏本草曰李核治仆僵花令人好顔色東方朔占曰朔與弟子俱行朔渇命弟子叩道邊人家門不知室主姓名関門呼不應朔復徃之門住湏臾􅀶勞飛集所呼門中李樹上朔見之語弟子曰此室人當姓李名􅀶汝呼言李􅀶􅀶自當應汝室中人果有姓李名􅀶出門應與朔相見入取飲與朔塩鐡論曰桃李實多者来嵗謂之穰左思齊都賦曰露桃霜李王逸荔枝賦曰房陵縹李王廙洛都賦曰銅馬朱櫻房陵緗李庾𤣥黙水井賦曰接朱李於𤣥泉来丼𤓰於清濤傳𤣥李賦曰河沂黄建房陵縹青一樹三色異味殊名張載𤓰賦曰朱李零於桂圃蒲萄潰於椒林古歌詩曰桃生露井上李生桃樹傍曹植詩曰南園有佳人容華若桃李阮籍詩曰嘉樹下成蹊東園桃與李古樂府歌曰君子防未然不䖏嫌疑間𤓰田不納履李下不整冠魏文帝與呉質書曰浮丼𤓰於清泉沉朱李於寒水太平御覽卷九百六十八
