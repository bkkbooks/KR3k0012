body:
  text: 太平御覽卷九百三十七宋李昉等撰鱗介部九魴魚鱮魚鯈魚魦魚鱨魚鮒魚鮎魚鱯魚鱒魚鱧魚鯽魚嘉魚鰽魚鮆魚鱸魚鯔魚鱓魚魴魚爾雅曰魴􅀈郭璞注曰江東呼魴為􅀈一名􅀈音鯉山海經曰大鯾居海中鯾即魴也音鯾毛詩宛邱衡門曰豈其食魚必河之魴又關雎汝墳曰魴魚頳尾王室如燬又毛詩九罭曰九罭之魚鱒魴陸機毛詩䟽義曰魴鰥今伊洛濟潁魴魚也廣而薄脆而多肉細鱗魚之美者也又遼東梁水魴特肥而厚尤美於他魴故其鄉語曰居就梁水魴說苑曰陽晝謂宓子賤曰吾少也賤不知理民之術有釣道二焉夫投綸餌迎而吸之者陽鱎也其為魚也薄而不美若有若亡若食不食者魴也其為魚也薄而厚味宓子賤曰善宋玉釣賦曰左挾魚罶右執橋竿精不離乎魚啄思不􅁯乎魝鯿鱮魚毛詩曰其釣維何維魴及鱮毛詩義疏曰鱮似魴而大頭魚之不美者故里語曰買魚得鱮不如啖茹徐州謂之鰱音連或謂之水經曰沔水北流注於漢漢水又左得渡口水出陽平北水山有二原一曰清檢出佳鱮二曰濁檢出好鮒常以二月取之美珎常味鯈魚音稠爾雅曰鮂里鰦郭璞注曰即白鯈也江東呼為鮂兹二音荘子曰荘與惠子逰於濠梁之上荘子曰鯈魚出㳺從容是魚樂也惠子曰子非魚安知魚之樂耶荘子曰子非我安知我不知魚之樂耶惠子曰我非子故不知子矣子固非魚也子之不知魚全矣山海經曰帶山芘葫之水其中多鯈魚其状如雞而赤毛三尾六足四首其音如鵲食之已憂又圖經讚曰汨和損平莫慘於憂詩詠萱草山經則鯈儔條二音何敬祖詩曰属耳聴鳴鶯流目玩鯈魚魦魚爾雅曰魦鮀郭璞曰今吹沙小魚也體圓而有㸃文也沙沱二音毛詩魚麗曰魚麗于罶鱨魦魦鮀也廣志曰吹沙魚大如指沙中行鱨魚毛詩曰魚麗于罶鱨魦鱨楊也音常毛詩義疏曰鱨一名楊今黄頬魚是身形厚而長大額骨正黄鮒魚周易井卦曰井谷射鮒王肅註曰鮒小魚也廣雅曰鯖鮒也莊子曰荘周家貧往貸粟於監河侯侯曰我将得邑今貸子三百金可乎荘周忿然曰周昨来有中道而呼者周視之車轍中有鮒魚焉曰我東海之波臣也君豈有升斗之水而活我哉周曰喏我且南逰呉越之濵吸西江之水而迎之可乎鮒魚忿然作色曰吾得升斗之水可活耳君乃言此不如早索我於枯魚之肆又曰夫揭竿累趣灌竇守鮒其於得大魚難矣石氏春秋曰魚之美者有洞庭之鮒說苑曰魏楚㑹扵晉陽將以伐齊齊王患之使人召淳于髠曰魏楚欲伐齊願先生與寡人憂之髠曰臣見隣人之祠田也以一箧飯與一鮒魚具祝曰下田夸邪得榖百車因笑其所祠者少所求者多王曰善立為上卿神異經曰東南海中有恒洲有溫湖鮒魚生焉長八尺食之宜暑而辟風寒盛𢎞之荆州記曰荆州有美鮒踰於洞庭温湖古樂府罩辭曰罩初何得端求得鮒小者如手大者如履孝子持歸遺我公婦安得此魚適與罩迕從今以後但當求鮒劉邵七華曰洞庭之鮒出於江岷弦膄青顱朱尾赤鱗鮎魚爾雅曰鮎别名鮧江東通呼鮎為鮧鮧音提廣雅曰鮷音鯷鯷音逓鮎也魏武四時食制曰蒸鮎永嘉郡記曰漈湖溪中多大鮎昔有得一死鮎者鬐大五六圍廣五行記曰則天如意時著作郎路敬淳常在濟源有水碾一柱壊以他柱易之家人取故者為樵中得一鮎魚長尺餘尚活至後敬淳坐綦連輝被殺鱯魚廣志曰鱯音畫魚似鮎大口鱒魚爾雅曰鮅音必鱒才員切似鯶子赤眼鯶音見毛詩九罭曰九罭之魚鱒魴鱒魴大魚也毛詩疏義曰鱒魴鱒似鯢魚鱗細於鯢也赤眼多細文唐詩曰吐畨國有臧河去邏些三百里東南流衆水湊焉南入崑崙國其中有魚似鱒而無鱗張衡七辨曰鞏洛之鱒割以為􅀈分芒折縷細亂䖟足鱧魚爾雅曰鱧郭璞注曰鮧鮦也目赤依鱧也毛詩魚麗曰魚麗于罶魴鱧鱧鮙魚也陸機毛詩疏義曰魴鱧爾雅曰鱧鮦音同也許以為鯉魚機以為鯉狭而厚梁書曰林邑王逸死奴文本簒文本日南西捲縣夷帥范幼家奴常牧牛扵山澗得鱧魚二而化為鐡因以鑄刀刀成文本向石咒曰若斫石入者文當王此國用斫石如斷芻藁文心異之范㓜常使之商賈至林邑為王作宫室及兵車器械王寵任之後乃讒搆諸子各奔餘國及王死無嗣文偽於隣國迓王子置子於甕中殺之遂脇國人自立林邑國記曰范文得鱧魚變為鐵斫石如斬蘆世傳魚刀鯽魚水經曰青林湖有鯽魚食之肥美辟寒南夷志曰䝉舍地有鯽魚大者重五斤西沮河及昆池南接滇池冬月多鯽魚楊衒之洛陽伽藍記曰王肅初入國不食羊肉及酪等常飯鯽魚羮嘉魚水經曰丙穴出嘉魚常以三月出十月入穴口廣五六尺去地七八尺水泉懸注魚自穴下透入水穴口向丙故曰丙穴任象益州記曰嘉魚細鱗魚蜀中謂之拙魚蜀郡山處處有之年年從石孔出大者五六尺雲南記曰雅州丙穴出嘉魚所謂嘉魚生於丙穴大抵雅州諸水多有嘉魚似鯉而鱗細成文黄河中魚味與此類也愽物志曰江陽縣北有魚穴二所常以二月八月出魚魚曰丙穴嶺表録異曰嘉魚形如鱧出梧州戎城縣江水味甚肥美衆魚莫可與比最宜為鯅地頂切每炙以芭蕉葉隔火葢慮脂滴火滅耳漁陽有鮇魚亦此類左思蜀都賦曰嘉魚出於丙穴丙地名有魚穴三以鰽魚字由切異物志曰鰽魚仲夏始從海中泝流而上腹下如刀長尺餘有細骨如鳥毛在肉中又有鳥腎在腹立夏有白鳥似鷖羣飛謂之鰽鳥至仲夏鳥藏魚出變化所生也鮆魚音膂爾雅曰鮤蠛刀今之鮆魚也亦呼為釣魚列蔑二名山海經曰浮玉之山北望具區苔泉出于其陰其中多鮆魚郭璞注曰鮆魚秋薄而長鬚一名刀魚大湖中饒異苑曰蝴蝶變作鮆鱸魚後漢書曰左慈字元放曽在曹操座操曰恨少呉松江鱸魚耳慈因求銅盤貯水以竹竿釣扵盤中須臾引一鱸出操曰一魚不周乃更沈釣後引出皆長三尺餘操使就前膾之世說曰張季膺為齊王掾在洛因秋風起思呉中菰菜羮鱸魚膾遂命駕便歸俄而齊王敗時人以為見機杜寳大業拾遺録曰六年呉郡獻松江鱸魚乾膾鱸魚肉白如雪不腥所謂金玉膾東南之佳味也鯔魚神仙傳曰介象與呉王共論鯔魚為上乃於殿前作方坎汲水滿之并求餌釣起之須臾得鯔魚王驚起乃使膾之異物志曰鯔魚長者六七尺嶺表録異曰跳鯅乃海中之小魚鯅也以鹽藏鯔魚兒一斤不啻千箇生擘㸃醋下酒甚有美味今遂問跳魚之名義曰捕魚者仲春扵髙處卓望魚魚来如陣雲濶二三百步厚亦相似者既見報漁師遂槳船争前而迎之船衝魚陣不施罟網但魚見自驚跳入船逡巡而滿以此為鯅故名之跳又云船去之時不可當魚陣之中恐魚多船沈故也即可以知其多矣鱓魚與軌同音善山海經曰大樂之野夏后啟扵此舞九伐焉女滅在其北居雨水間滅操魚䱉䱉魚属也祭操俎肉􅀈也汲冡周書王㑹曰甌人食鱓虵鱓虵順食之美東越甌人也比殳州地特以為上味謝承後漢書曰楊震常客扵湖不答州郡禮命數十年衆人謂之晩暮而震志愈篤後有鸛雀銜三鱓魚飛集講堂前都講取魚進曰虵鱓者卿大夫服之象也數三者法三台也先生自此升矣時年過五十乃始仕州郡梁書曰邵陵王綸攝南徐州事遨逰市里雜於厮𨽻嘗問賣䱉者曰刺史何如䱉者言燥暴綸怒令吞䱉以死百姓惶駭道路以目淮南子曰今鱓之與虵蠶之與蠋状相類而愛憎異抱朴子曰田地既有自然之鮮而有荇莖芩根土龍之属化為鱓韓子曰䱉似虵而漁者取䱉不畏虵利之所在皆為賁育顔氏家訓曰江陵劉氏以賣鱓羮為業後生一兒頭具是鱓自頸已下方為人身又曰後漢書云鸛雀銜三鱓魚音善多假借為鱣鮪之鱣俗之學士因謂為鱣魚按魏武帝四時食制鱣魚大如五升奩長一丈郭璞注云鱣長二三尺安有鸛銜能勝者况三頭乎鱓又純灰色無大者此鱓魚長者不過三寸大者不過三指黄色黑文故都講云虵鱣卿大夫服之象也漢書及捜神記亦說此事皆作鱣字孫卿云魚鱉鱣鰌及韓非說苑皆曰鱣似虵蠶似蠋主作鱣字假鱣為鱓其来久乎周處風土記曰陽羨谷五月以薤薺䱉焉食凡䱉魚夏出冬蟄亦以氣將陽和實時節也徐表南方草木状曰白鱓生溪邉土穴中長五寸所在三十里民刺取細槿二寸苦酒煑食之滋味如黄鱓味交趾九真有之劉敬叔異苑曰盧循以義熈五年自廣州下泊船江西衆多溺死事平之後人往蔡州見死人髪變而為鱓今上鎮西叅軍與府司馬張逝瞻潮際有一棺棺頭有鰽衆試令撥撥看即是髮亦有未都化者一說云生以􅀈瀋沐死則髪為䱉又昔有人食不能無䱉死後改棺䱉滿中又曰㑹稽石亭埭大有空中楓樹毎雨水輒滿溢有商旅載生䱉聊放一頭著孔中以為􅀈徻後村民咸謂是神乃依樹起屋宰牲祭祀未嘗輟因遂名䱉父廟人有祈請及䙝慢禍福立至估客復返見其如此即取作臛於是遂絶太平御覽卷九百三十七
