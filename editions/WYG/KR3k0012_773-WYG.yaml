body:
  text: 太平御覽卷七百七十三宋李昉等撰車部二叙車下司馬彪續漢書輿服志曰奚仲為車正具物以時六材皆良又曰輕車古之戰車也不巾不盖孫吳兵法云車有巾有盖謂之武剛車武剛者為先驅又為屬車輕車為後殿焉又曰大使車立乗駕駟赤帷持節者重道從賊曹背兩大車五百璅弩十二人辟車四人從車四人從車乗元單導減半小使車不立乗有騑赤屏泥油重絳帷導無斧車近小使車蘭輿赤轂白葢赤帷從騶騎四十人此謂追補考案有所𠡠取者之所乗也其送葬車葢已下駟馬而後還公卿中二千石郊廟明堂祠陵法出皆大車立乗駕駟他出乗安車太行載車其飾如金根加施組組連璧交結四角金龍首啣璧垂五彩析羽流蘇前後雲氣畫衣靈文畫曲轓長輿車等太僕御駕六希者淳白駱馬施也以黒藥灼其身為虎文又曰諸車之文乗輿倚龍伏虎靈文畫輈龍首鸞衡班輪升龍飛軨皇太子諸侯王倚虎伏鹿靈文畫輈陟周切轓吉陽筩朱班輪鹿文飛軨旂旗九斿音畱降龍公列侯倚鹿伏熊黒輪朱班轓鹿文飛軨九斿降龍卿朱兩轓五斿降龍二千石以下各從科品諸輻車以上軛皆有吉陽筩漢獻帝傳曰董卓作乗輿青盖金范𤓰畫兩輻者乗之時人皆號曰軨磨車言近天子也後地動卓問蔡邕邕曰地動隂盛大臣踰制之所致也公乗青盖逺近以為非宜太師之乗白盖車畫輻東觀漢記曰郭丹字少卿從師於長安買符入函谷關既入封符訖乃慨然歎曰不乗使者車終不出關又曰梁兾作平上軿車侍御史張綱獨埋輪於洛陽都亭曰豺狼當路安問狐狸遂奏兾應劭漢官儀曰天子有五色安車皆駕四馬毛詩四者示有四方之志也是為五時副車孝景帝六年令二千石朱兩音緉千石六百石朱幡較車耳及出為藩屏也又曰天子出祭陵常乗金根車春二月青安車在前秋八月白虎車在前又曰天子法駕所乗曰金根車駕六龍有五色立車各一皆駕四馬又曰甘泉鹵簿有道車五乗游車九乗在輿前漢雜事曰古諸侯二車九乗秦滅九國兼其車服故大駕屬車八十一乗尚書御史乘之最後一車縣豹尾漢官解詁曰馬有廐車有府皮軒以虎皮為軒後魏書曰公安車紫盖朱裏侯車與公同子車皁盖青裏晉書曰謝𤣥敗苻堅於淝水獲堅所乗雲母車儀服等又曰和嶠為給事黄門侍郎遷中書令帝深器遇之舊監令共車入朝時荀朂為監嶠鄙朂為人以意氣加之毎同乗高抗專車而坐乃使監令異車自嶠始也晉公卿禮秩曰安平王孚齊王攸梁王肜給青盖車連九旒駕四馬太常何曾太傅楊駿梁王肜乗車入殿依漢田千秋故事光禄魏舘軺車施黒孚薨𦵏給徘徊黒耳車一乗諸王及縣王皆給青徘徊車花𤓰盖孤李降給雲母陽遂車一乗犢車二十乗鹿車五十乗沈約宋書曰漢制乗輿金根安車立車輪皆朱斑重轂兩轄飛軨以金薄繆龍為倚較􅏹文畫轓文獸伏軾龍首銜軛鸞雀立衡􅏹文畫轅翠羽盖黄裏所謂黄屋也金華拖轑末建旂旗十二斿音畱也畫日月升龍駕六黒馬又加氂音釐牛尾大如斗置左騑馬軛上所謂左纛也其五色立車五色安車亦皆如之太后皇后法駕乗重翟羽盖金根車駕青交路青帷裳􅏹畫轅黄金塗五末皇太子皆安車朱斑輪倚獸伏鹿軾旂旗九斿畫降龍矣又曰沈慶之前廢帝立加几杖給三望車慶之毎朝賀常乗猪鼻無幰虛偃切車左右從之不過三五騎履行園田毎農桑劇月無人從行過者不知三公也及加三望車謂人曰我毎遊履田園有人時與馬成三無人則與馬成二今乗此車安所之及賜几杖並皆固讓孝經援神契曰上徳至山陵則山出木根車應載萬物金車王者至行仁德則出虞舜徳盛於山陵故山車出山車自然之物也山藏之精與象車相似舜德盛山車有垂綏古史考曰黄帝作車少皥時略加牛禹時奚仲駕馬仲文造車更廣其制度也神僊傳曰葛𤣥行過神廟乗車不下湏㬰有大㢠風逐𤣥埃塵漲天𤣥怒曰小雅敢爾舉手指風風即止穆天子傳曰王欲肆其心周行天下皆有車轍馬迹焉韓詩外傳曰田子方魏太子從車百乗而送於郊太子再謁田子方不下車太子不悅曰敢問如何則可以驕人乎田子方曰吾聞以天下驕人而亡者有矣由此觀之則貧賤可以驕人矣夫志不得則授履而適秦楚耳安徃而不得吾貧賤乎於是太子再拜而後退子方遂不下車漢武内傳曰内外謐寂以候仙官到夜二更之後忽見西南如白雲起蓊欝直來遥趨宫庭須㬰王母或駕龍虎或乗白麟或乗白鶴或乗軿車或乗天馬羣仙數千光輝庭宇關令内傳曰尹喜常登樓望見東極有紫氣西邁喜曰應有聖人過京邑果見老君乗青牛車來過神仙傳曰沈義學道於蜀中與妻同載路逢白鹿車一乗王子年拾遺記曰周成王六年然邱之國獻比翅鳥雌雄各一隻以玉為樊其國使者拳頭尖鼻衣雲霞之布經百有餘國方到京師越鐡峴泛沸海有蛇洲蜂岑鐡峴峭巁車輪皆剛金為輞比至京師輞脫幾盡沸海湧起如煎魚鼈皮骨堅强如石可以為鎧汎沸海之時以銅薄舟底虵龍蛟不得近經虵洲度則以豹皮為屋於屋中推車經蜂岑然胡蘇之木此木煙能殺百蟲經塗十五餘年乃至洛邑老子曰三十輹共一轂當其無有車之用莊子曰秦王有疾召醫破癕㿉疽者得車一乗䑛痔者得車五乗管子曰奚仲之為車也方圜曲直皆中䂓矩鈎繩故機旋相得成器堅固主猶奚仲也言辭動作皆中術數故衆理相當上下相親巧者奚仲之所以為器也孔藂子曰孔子使宰予于楚昭王以安車象飾遺孔子宰予曰夫子無以為也王曰何對曰臣自侍衛夫子也已來竊見其言不離道動不遺仁貴義尚清素好儉妻不服絲妾不衣帛車器不雕馬不食粟若夫觀物之麗靡窈妙之浮音夫子過之弗聼也故臣知夫子之不用車也孟子曰子産聴鄭國之政以其乗輿濟人於溱洧韓子曰啇太宰使庻子行市還云西市門多車太宰謂庻子曰汝勿言及市吏至問曰市何多牛屎耶吏怪太宰神智又曰昔彌子瑕有寵於君衛國之法竊駕君車罪刖彌子之母有疾告彌子矯駕君車君曰孝哉為母之故犯刖罪及彌子色衰愛弛得罪於君君曰是嘗矯駕吾車也又曰孫叔敖為令尹棧車牝馬糖飰菜􅃵枯魚為膳面有飢色淮南子曰夫車之所以能轉千里者以其要在三寸轄又曰見飛蓬轉而知為車以類取之也晏子曰齊人好擊轂相犯以為樂禁之不止晏子為新車良馬出與其人相犯曰犯轂者不祥下車而去之也然後國人不為又曰晏子衣緇布之衣而頳裏棧軫之車而牝馬以朝子思曰終年為車無一尺之軨則不可以馳尸子曰文軒六駃題無四寸之鍵則車不行小亡則大者不成也又曰甯戚為桓公祝曰使公無忘在莒管子無忘在魯甯戚無忘車下又曰車輕道近則鞭䇿不用孫卿子曰三尺之岸虛車不能登百仭之山負車登焉陵遲故也蘇子曰房麗者趙之賢人立東門之外有行商車轄亡麗告之悟復更告商人怒曰吾轄自亡何湏汝吿惠加於己而反怒之吾欲比之草木草木有心矣沈約輿服志曰車服以庸著在唐典夏建旌旂辨其尊卑至於殷瑞山車者金車也故殷人制為大輅金根之色也周人則有玊金象革木五路之制其物致巧備於考工輦車周禮王后五路之車也后居宮中從容所乗非王車也漢制乗輿御之或使人輓或駕車果下馬案女史圖班婕妤辭輦則乗之又復殷之末制後代遂行之耳陸景典語曰吳朝貴戚或犯道背理彫車麗服横陵市路車服雖侈人不為榮宮室雖美士不過門又曰顯臣以車服天下莫不瞻其榮又曰飛車䇿馬横騰超邁來如霧合去若雲散得志則進失意則退異語曰仕官不止車生耳長六尺法六律六隂數也今其上作簟文所以缺後者月滿則虧也風俗通曰車一兩謂兩兩相與為體也厚其所以言兩者箱裝及輪兩兩如耦故稱兩耳通俗文曰車轢曰軋後後重曰軒前重曰輊陟利切載喪車謂之轆音六轊音衛車聲曰轞胡减切顧車載曰僦蔡邕獨㫁曰永安七年見金根諸御車皆一轅或四馬或六馬金箱四輪皆以金鑄正黄兩辟前後尅金作龍虎龜鳥又曰緑車名皇孫車天子有孫乗以從蔡邕車服志曰俗人失其名故名冕為平天冠五時副車曰五帝鑾旗曰雞翹金根曰三盖其制非一儀制令曰諸車一品青油纁道􅎻許偃切朱裏朱絲絡􅃠三品以上青道􅎻朱裏五品以上青油幰碧裏六品以下皆不得用􅎻括地圖曰竒肱民能為飛車從風逺行湯時西風乆竒肱車至於豫州湯破其車不以示民十年西風至乃復使作車遣歸其國去玉門四萬里董巴輿服志曰乗輿金根車五乗輪皆朱班重牙二轂司馬法曰夏曰予車殷曰胡奴車周曰輜車三代之輦語林曰潘安貌美毎行老嫗以果擲之常滿車中張孟陽至醜毎行兒以瓦礫擲之亦滿車𫝊暢故事曰尚書令軺車黒耳後户僕射但後户無耳中書監令如僕射譙周法訓曰鸞闕璜珮求中道心石崇奴劵曰作車當取大良白槐之輻茱茰之輞說苑曰齊景公伐宋至於政隄之上登高以望大息而嘆曰昔我先君桓公長轂八百乗以覇諸侯今我長轂三千乗而不敢乆處於此者無管仲與弦章對曰臣聞之水廣則魚大君明則臣忠昔有桓公乃有管仲今桓公在此則車下之臣盡管仲也又曰趙簡子乗弊車癯音衢馬衣羖羊之裘其宰進諫曰車新則安馬肥則徃來疾狐白之裘温且輕簡子曰吾非不知吾聞君子服美則益恭小人服美則益倨今我以自偹恐有小人之心又曰晉平公為馳逐之車掛之以犀錯之以羽車成立於殿下羣臣得觀焉田差三過而不觀平公作色大怒差對曰臣聞桀以奢亡紂以侈敗是以不敢觀也平公曰善令左右去車世說曰王武子乗車着連乾障泥有水馬不肯渡武子曰此馬惜障泥使解之馬乃渡白虎通曰制車以歩故立乗天子大路路大也正君至尊制度大所以行道徳正車也諸侯大車路大夫棧才産切車士飾車山海經曰畨禺生奚仲奚仲生吉光吉光是始以木為車郭璞云世本曰奚仲作車此言吉光明其父子共創作意是以互稱之袁子正書曰申屠剛諫光武以頭軔輪馬不得前子云光武近出未有得失而頭軔輪此之頭也又曰輻車輻車即輦魏晉公卿小出嘗乗馬亦多乗輿車漢諸侯貧者乃乗之其後轉見貴漢賤軺車而貴輜軿魏晉賤駢車而貴軺車又有追鋒如軺車而駕馬又以雲母飾犢車謂之雲母車臣不得乗之時以賜王公晉氏又有四望車今制亦存又漢制惟賈人不得乗馬車餘皆乗之矣除吏赤盖杠餘皆青盖杠云其法駕則紫罽軿車案字林駢車有衣蔽無後轅其後轅者謂之輜賈誼新書曰古之為路輿也葢圜以象天二十八撩音老以象列星軫方以象地三十輻以象月故仰則觀天文俯則察地理前視則睹鸞和之響四時之運此輿教之道也後漢崔駟車左銘曰虞夏作車取象機衡君子建左法天之陽正位授綏車不内顧塵不出軌鸞以節歩彼言不疾彼指不躬𤣥覽於道永思厥中又車右銘曰擇御卜右採徳用良詢納耆老于我是匡惟賢是師惟道是式箴闕旅賁内願自𠡠匪望其度匪愆其則越戒敦儉禮以華國又車後銘曰敬其在路體貌思恭望衡顧轂允慎茲容無或好失匪盤於遊顧省厥遺虎尾斯求昭徳塞違抑盈以無雖有三晉咸然若虛後漢李尤小車銘曰盆盖象天方輿則地輪法隂陽動不相離合之嗛若琰切嘘疏達開通兩輜鄣邪尊卑是從輗軏之用信義所同梁載暠車馬篇曰朝集類蒸煙晚至如吹雪子雲亦何事門巷無車轍太平御覽巻七百七十三
