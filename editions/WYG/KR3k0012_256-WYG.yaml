  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_256-1a, image: WYG0895/WYG0895-0310a.png}
body:
  text: 太平御覽卷二百五十六宋李昉等撰職官部五十四良刺史上良刺史上漢書曰黄霸為揚州刺史治有績宣帝特賜車以彰之又曰朱博遷冀州刺史博本武吏不更文法及為刺史行部吏民數百人遮道自言博駐車决遣四五百人皆罷去如神吏驚不意博臨事乃至於此又曰何武為揚州刺史行部必先即學宫見諸生試其誦論得失然後入𫝊舎問墾田頃畆五榖美惡東觀漢記曰郭伋字細侯河南人也在并州素結恩徳行部到西河美稷有童兒數百各騎竹馬迎拜伋問曰兒曹何自逺來對曰聞使君到喜故迎諸兒童復送到郭外問使君何日當還伋曰别駕從事計日告之行部還入美稷界先期一日伋念負諸童兒遂止於野亭須期乃入又曰李珣為兖州刺史所種小麥胡蒜悉付從事一無所留清約率下常席羊皮布被後漢書曰郭賀為荆州刺史顯宗巡狩到南陽特見嗟歎賜以三公之服黼黻冕旒勅行部去襜帷使百姓見其容服以章有徳每所經過吏人指以相示莫不榮之又曰賈琮為冀州刺史舊典𫝊車驂駕垂赤帷裳迎於州界及琮之部升車言曰刺史當逺視廣聽紏察美惡何有反垂帷裳以自掩塞乎乃命御者褰之百城聞風自然竦震其諸贓過者望風解印綬而去又曰王望為青州刺史甚有威名是時州郡灾旱百姓窮荒望行部道見饑者裸行草食五百餘人愍然哀之因以便宜出所在布粟給其廩糧為作褐衣又曰中平元年交阯屯兵反執刺史及合浦太守自稱柱天將軍靈帝特勑三府精選能吏有司舉賈琮為交阯刺史琮到部訊其反狀咸言賦斂過重百姓莫不空單京師遥逺告寃無所民不聊生故聚為盜賊琮即移書告示使安其資業招撫荒散蠲復徭役誅斬渠帥為大害者簡選良吏試守諸縣嵗間蕩定百姓以安巷路為之歌曰賈父来晩使我先反今見清平吏不敢犯在事三年為十三州最又曰郭伋為并州牧入界所到縣邑老㓜相擕逢迎道路所過問民疾苦聘求耆徳雅俊設几杖之禮朝夕與叅又曰蘇章為冀州刺史故人為清河太守章行部按其奸贓乃請太守為設酒肴陳平生之好甚歡太守喜曰人皆有一天我獨有二天曰今夕蘇孺文與故人飲者私恩也明日冀州刺史按事者公法也遂舉正其罪州境知章無私望風畏肅又曰張禹拜揚州刺史當過江行部中土人皆以江有子胥之神難於濟涉禹將渡吏固請不聽禹厲言曰子胥如有靈知吾志在理察枉訟豈危我哉遂鼓檝而過厯行郡邑深幽之處莫不畢到親録囚徒多所明舉吏人希見使者人懐喜悦又曰楊秉遷任城相自為刺史二千石計日受俸餘禄不入私門故吏齎錢百餘萬遺之閉門不受以㢘潔稱又曰謝夷吾為荆州刺史第五倫薦之曰爰牧荆州威行郡國奉法作政有周邵之風居儉履約紹公儀之後尋功簡能為外臺之表聽聲察實為方伯之冠也續漢書曰种暠為益州刺史在軄三年宣恩逺夷開曉殊俗岷山雜落皆懐服漢徳其白狼槃木諸國自前刺史卒後遂絶暠至乃復向化時永昌太守鑄黄金為文蛇以獻梁冀暠紏發追捕馳𫝊上言冀由是銜怒又曰周舉為并州刺史太原舊俗以介子推焚骸有龍忌之禁輒一月寒食莫敢煙㸑老少不堪嵗嵗多死者舉既到州乃作弔書以置子推之廟言盛冬去火殘損人命非賢者之意以宣示愚民使還温食謝承後漢書曰陳留百里嵩字景山為徐州刺史境遭旱嵩行部𫝊車所經甘雨輒霔東海金鄉祝其兩縣僻在山間嵩傳駟不往二縣不得雨父老干請嵩曲路到二縣入界即雨又曰巴祗字敬祖為揚州刺史在官不迎妻子俸禄不使有餘幘毁壊不復改易以水澡傅墨用之夜與士對坐暗中不燃官燭又曰第五種遷兖州刺史中常侍單超兄子匡為濟隂太守負勢貪放種欲收舉未知所使會聞從事衞羽素抗直乃召羽具告之曰聞公不畏强禦今欲相委以重事若之何對曰願庶幾於一割羽出遂馳到定陶閉門收匡賔客親吏四十餘人六七日中紏發其贓五六十萬種即奏匡幷以劾超魏志曰劉馥字元頴沛國相人也太祖方有袁紹之難謂馥可任以東南之事遂表為揚州刺史馥既受命單馬造合肥空城建立州治南懐緒等皆安集之貢獻相繼數年恩化大行百姓樂其政流民越江山而歸者以萬數於是聚諸生立學校廣屯田興治芍陂及茄陂七門吳塘以溉稻田官私有蓄陂塘之利至今為用又曰徐邈為凉州刺史進善黜惡風化大行百姓歸心焉西域通流荒戎入貢皆邈勲也又曰田豫䕶匈奴中郎將領并州刺史聞其威名者相率來獻州界寧肅百姓懐之又曰陳泰為并州刺史懐柔民夷甚有威惠京邑貴人多寄寶貨因泰市奴婢泰皆挂之於壁不發其封及徵為尚書悉以還之又曰梁習字子虞為并州刺史政治常為天下最太和二年徵拜大司農習在州二十餘年而居處貧窮無方面珍物明帝異之禮賜甚厚又曰王昶字文舒太原晉陽人也遷兖州刺史明帝即位加揚烈將軍賜爵闗内侯昶雖在外任心存朝廷以為魏承秦漢之弊法制苛碎不大釐改國典以准先王之風而望治化復興不可得也乃著治論畧依古制而合於時務者二十餘篇又曰司馬朗字伯逹河内温人也遷兖州刺史政化大行百姓稱之雖在軍旅常惡衣惡食以儉率下魏畧云裴潛為兖州時常作一胡牀及去留以挂柱吳志曰吕岱為交州刺史厯年不餉家妻子饑乏孫權聞之歎息以讓羣臣曰吕岱出身萬里為國勤事家内困而孤不早知股肱耳目其責安在於是加賜錢米絹布嵗有常限晉書曰杜元凱為荆州人號為杜父舊水道唯㳂漢逹江陵千數百里凱乃開陽口起夏水導洪洞逹巴陵徑近千里南土美而謡曰後世無叛由杜翁孰識知名與勇功又曰吳隠之為廣州州界有貪泉父老云飲此水使㢘士變貪隠之先至水所酌而飲之賦詩曰古人云此水一飲重千金若使夷齊飲終當不易心王隠晉書曰華軼為江州刺史得江表之歡心流亡之士赴之如歸時天子孤危四方瓦解軼有匡天下之志每遣貢獻入洛不失臣節謂使者曰若洛都道斷可輸之琅琊王以明吾之為司馬氏也又曰山濤為冀州刺史冀州舊名陋俗畧無人士自濤居州搜求賢才旌命所知三十餘人皆顯名當世冀州之士於是為盛晉陽秋曰劉𢎞字和季與晉世祖同年居同里舊恩屢登顯位𢎞為荆州刺史值王室多難得専命一方盡其器能推誠御下厲以公義每有手書發郡國丁寧欵宻故莫不感悦顛倒奔赴咸曰得公一紙書賢於十部從事也曹嘉之晉紀云羊暨為青州刺史暨牛産犢及遷以官舎所生遺之而去晉中興書曰褚裒字季野河南人也弱冠譙國桓彛見而目之曰褚季野有皮裏陽秋裒女即獻后也徵拜侍中遷尚書裒以后父苦求外出除江州刺史莅政貞素每崇清約常使私僮樵採又曰桓伊字叔夏譙國人湛隠有武幹又善音律為中興第一遷都督江州荆州十郡豫州四郡軍事江州刺史伊到鎮以邉境無虞宜以寛恤為務乃上䟽江州虛耗加連嵗不登宜併合小縣除諸郡逋米州治宜還豫章詔答移州潯陽其餘皆聽伊隨宜拯撫甚得南土清和宋書曰陸㣲為益州刺史䘏隠有方威惠兼著冦盜靜息民物殷阜蜀土安悦至今稱之齊書曰臨川王映為雍州刺史嘗置錢還都買物有獻計者於江陵買貨至都迴換可得㣲有所增映笑曰我是賈客耶乃復求利又曰王崐為廣州刺史南土沃實在任者常致巨富世謂廣州刺史但經城門一過便得三千萬也崐無所取納表獻禄俸之半州鎮舊有鼓吹又啟輸還及罷任孝武知其清問還資多少崐曰臣買宅百三十萬餘物稱之帝悦其對梁書曰安成康王秀都督雍梁南北秦四州諸軍事雍州刺史有疾百姓商賈咸為請命既薨四州裂為白㡌哀哭送之又曰夏侯亶字世龍弟䕫字季龍並任豫州人歌曰我之有州頻仍夏侯前兄後弟布政優優又曰王神念為青冀二州刺史神念性剛正所更州郡必禁止淫祠時青冀二州東北有石鹿山臨海先有神廟妖巫欺惑百姓逺近祈禱縻費極多及神念至使令毁撤風俗遂改太平御覽卷二百五十六
