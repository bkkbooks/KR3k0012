body:
  text: 太平御覽卷三百十四宋李昉等撰兵部四十五突圍追奔乗勢突圍漢書曰趙充國武帝時以假司馬從貳師將軍擊匈奴大為虜所圍漢軍乏食數日充國乃與壯士百餘人潰圍陷陣貳師引軍隨之遂得觧身被二十餘創又曰灌夫父張孟常為頴隂侯灌嬰舍人蒙灌氏姓為灌蒙肙也孟孟年老頴隂侯強請之鬰鬰不得意故戰嘗陷堅遂死吳軍中夫奮曰願得吳王若將軍頭以報父仇於是披甲持㦸募壯士數十人及出壁門莫敢前獨兩人及從奴十餘騎馳吳軍至戲下師古曰戲大將之旗音與麾同殺傷數十人不得前復還走漢壁亡其奴獨與一騎歸又曰賈復從征伐未嘗喪敗數與諸軍潰圍解急身被十二創帝以復敢深入希令逺征而壯其勇節嘗自從之魏志曰張遼為雜號將軍守合肥為孫權所圍獨出麾下從者千餘人潰圍刺之已出復入復出權衆破走由是威震江東又曰曹仁字子孝太祖從弟也行征南將軍留屯江陵拒吳將周瑜瑜未渡前鋒數千人始至仁募得三百人遣部曲將軍牛金逆與挑戰遂為所圍長史陳矯在城上望見金等垂没左右皆失氣仁氣奮怒遂披甲上馬將其麾下壯士數十騎出城徑前衝入陣金等乃解餘衆未盡出仁復直還突之㧞出金兵賊衆乃退矯等初見仁出皆懼及見仁還乃歎曰將軍真天人也三軍服其勇太祖益壯之又曰袁尚征袁譚於平原使其將審配守鄴曹公攻鄴城尚聞鄴急還救鄴欲令城中知外動止李孚請行尚曰當何所需李曰今鄴圍甚急多人則不可孚乃自選温信者三人不示其謀各給駿馬令釋戎噐著平上冠持問事杖投暮直抵鄴下自稱曹公都督廵厯圍壘所過呵責失候者輒捶之自東厯西徑出曹公營當城門復怒守圍者收縳之因開圍馳入城下配以縋引之孚得入城中鼓譟皆呼萬嵗守圍者以狀聞公笑曰此非徒入方且復出孚計事訖欲還而外圍急謂配曰城中糓少無用老弱為不如驅出之省糓乃夜簡得一千人皆令持白幡及脂燭從三門而出請降孚所將來騎隨衆人而出時守圍吏聞城中悉降火光照耀但共觀火不復視圍孚出北門突圍而歸尚明日曹公聞孚已得去曰果如吾言又曰公孫瓉除遼東屬國長史嘗從數十騎出行塞外遥見鮮卑數百騎瓉乃退入空亭約其從者曰今不衝之則死盡矣乃自持矛兩頭施刃馳出殺傷數十人瓚亦亡其從騎半遂得免晉書曰李矩將張支與劉燦戰於盟津矩進救之以壯士三千汎舟迎支賊臨河列陣作長鈎以鈎船連戰數日不得渡夜遣部將格増濟入支壘與支選精騎千餘而殺所獲牛馬焚燒噐械夜突圍而出奔武牢宋書曰劉康祖世居京口便弓馬膂力絶人以浮蕩蒱酒為事每犯法為郡縣所録輒越屋踰墻莫能擒之夜入人家為有司所圍突圍去並莫能追因夜還京口半夕便至明旦守門詣府州要職俄而建康移書録之府州執事者並證康祖其夕在京口遂得無恙追奔孫子曰歸師勿遏若窮㓂退還依險而行人人懐歸敢于死戰徐觀其變勿逺截也魏志曰三月公圍張繡于穰劉表遣兵救繡以絶軍後公將引還繡兵來公軍不得進連營稍前到安衆繡與表兵合守險公軍前後受敵公乃夜鑿險為地道悉過輜重設竒兵㑹戰賊謂公遁也悉軍來追公縱竒兵步騎夾攻大破之公謂荀彧曰虜遏吾歸師而與吾死地吾是以知勝矣又曰曹公征張繡於穰一朝引軍退繡自追之賈詡謂繡曰不可追必敗繡不從大敗而還詡謂繡曰更追之必勝繡曰不用公言以至於此今已敗奈何復追詡曰兵勢有變亟徃必利繡信之遂收散卒赴追戰果勝以問詡曰繡以精兵追退軍而公曰必敗乃以敗卒擊勝兵而公曰必勝悉如公言何其皆驗詡曰此易知耳將軍雖善用兵非曹公敵也軍新退曹公必自斷後追兵雖精將既不敵彼士亦銳故知必敗曹公攻將軍無失䇿力未盡而退必國内有故追兵已破必輕車速進留諸將斷後諸將雖勇亦非將軍敵也故雖用敗兵而戰必勝也繡大服後漢書曰睢陽復反迎劉永蓋延率諸將圍之百餘日收其野榖永乏食突走延追擊盡得輜重永為其將所殺永弟防以城降又曰光武拜馬援為伏波將軍以扶樂侯劉隆為副督樓船將軍段志等南擊交趾軍至合浦而志病卒詔援并將其兵遂縁海而進隨山刋道千餘里十八年春軍至浪泊上與賊戰破之斬首數千級降者萬餘人援追徵側等至禁溪數敗之賊遂散走明年正月徵側徵貳傳首洛陽又曰陳俊與五校戰于安次俊下馬手接短兵所向必破追奔二十餘里斬其渠帥而還光武望而歎曰戰將盡如是豈有憂哉又曰鮮卑萬餘騎㓂遼東祭彤率千人數迎擊之披甲陷陣虜大奔投水死過半遂窮追出塞虜急皆棄兵裸身散走斬首三千餘級獲馬數千匹又曰鄧禹進圍安邑更始遣將王匡成丹劉均等合軍十餘萬合攻禹禹軍不利樊崇戰死㑹日暮戰罷軍帥韓歆及諸將見兵勢已摧皆勸禹走禹不聽明日癸亥匡等以六甲窮日不出禹因得更理兵勒衆明旦匡悉軍出攻禹禹令軍中無妄動既至營下因傳發諸將鼔而並進大破之匡等皆棄軍亡走禹率輕騎急追獲劉均及河東太守楊寳持節中郎將彌疆皆斬之收得節六印綬五百兵噐不可勝數遂定河東又曰竇固與耿忠引兵出酒泉塞至天山即祁連山也西州交河縣東北今名祁縣羅漫山擊呼衍王斬首千餘級呼衍王走追至蒲類海蒲類海今名婆悉海在今定州蒲昌縣東南留吏士屯伊吾盧城又曰馬防拜車騎將軍擊羗軍到冀而羗豪布矯等圍南部都尉於臨洮防欲救之臨洮道險車騎不得方駕防乃别使兩司馬將數百騎分為前後軍去臨洮十餘里為大營多樹幡幟揚言大兵且當進羗候見之馳還言漢兵盛不可當明旦遂鼓噪而前羗虜驚走因走擊破之斬首四千餘人遂觧臨洮圍晉書曰王遜為寧州刺史越嶲李驤㓂寧州遜使將軍姚崇爨琛拒之戰于堂狠大破驤等崇追至瀘水投水死者千餘人崇以道逺不敢渡水遜以崇不窮追怒囚羣帥執崇鞭之怒甚髪上衝冠冠為之裂夜中卒又載記曰慕容寳與魏戰謀還中山乃引歸魏軍追擊之寳棄大軍率騎二萬奔還時大風雪凍死者相枕於道寳恐為魏軍所及命去桴杖戎噐寸刃無返崔鴻十六國春秋曰前秦苻堅自征晉於夀春敗還長安慕容泓起兵于華澤堅將苻叡竇衝姚萇討之苻叡勇果輕敵不恤士衆泓聞其至也懼率衆將奔關東叡馳兵邀之姚諫曰鮮卑有思歸之心宜馳兵出關不可遏也叡弗從戰于華澤叡敗績被殺又曰夏赫連勃勃伐南凉秃髪傉檀大敗之驅掠二萬七千口牛馬羊數十萬而還傉檀率衆追之其將焦朗曰勃勃天姿雄警大軍齊肅未可輕也今因抄掠之資率思歸之士人自為戰難與爭鋒不如從温圍北渡趣萬斛堆阻水結營制其咽喉百戰百勝之術也傉檀不從勃勃聞而大喜乃于陽武下陜鑿凌埋車以塞路勃勃乃勒衆逆擊大敗之又曰後凉呂𢎞攻段業於張掖不勝將東走業議欲擊之其將沮渠蒙遜諫曰歸師勿遏窮㓂勿追此兵家之戒也不如縱之以為後圗業曰一日縱敵悔將無及遂率衆追之為𢎞所敗業歎曰不能用子房之言以至於此後周書曰晉公䕶東伐高齊遣將尉遲逈圍洛陽為敵所敗周將逹奚武與齊王憲於邙山禦之至夜收軍憲欲待明更戰武欲還固爭未决武曰洛陽軍散人情駭動若不因夜速還明日欲歸不得武在軍旅久矣備見形勢大王少年未經軍事豈可將數營士衆盡棄之乎憲從之遂全軍而返隋書曰張金初見敗將數百人遁逃後歸漳南召集餘黨楊善㑹追捕斬之傳首行在所帝賜以尚方甲矟弓劒進拜清河通守唐書曰武徳初劉武周入㓂僕射裴寂拒戰于度索原寂軍敗武周進逼河東太宗出兵拒之江夏王道宗年十七從征太宗登玉壁城望賊謂道宗曰賊恃其衆來邀我與戰何如對曰賊乗勢而來其鋒不可當易以計屈難與力競但深溝高壘以挫其鋒烏合之徒安得持乆糧餉既竭自當離潰可不戰而擒也太宗曰汝意暗與我合武周食盡夜遁追及㑹州一戰滅之又曰徳操領延州道行軍總管鎮北境梁師都與突厥之衆數千騎來㓂延安營於野豬嶺徳操以衆寡不敵按甲以挫其銳後伺賊稍怠遣副總管梁禮率衆擊之徳操以輕騎出其不意賊與禮酣戰乆之徳操多張旗幟掩至其後賊大潰逐北二百餘里尅其魏州虜男女二千餘口經數月師都又以步騎五千來㓂徳操擊之俘斬畧盡師都與餘騎遁以功拜上柱國封平原郡公邑一千户賜以貂裘金帶布帛千疋衛公兵法曰諸戰鋒等隊打賊敗其駐隊隊别量抽驍健二十人逐北其輜重隊遥呌作聲不得輙動跳盪隊竒兵隊趂賊退不得過百步如審知賊徒敗散仍湏取機追逐乗勢左傳曰晉侯圍曹門焉多死攻曹城門曹人尸諸城上桀晉死人於城上也晉侯患之聽輿人之誦稱舎於墓輿衆也舍墓為將發冡也師遷焉曹人兇懼遷至曹人墓也兇兇恐懼聲也音于勇切為其所得者棺而出因其兇也而攻之遂入曹史記曰漢王遣將韓信破陳餘後信購得廣武君李左車師事之韓信曰僕欲北伐燕東伐齊若何而有功對曰今將軍涉西河虜魏王擒夏說閼與一舉而下井陘不終朝破趙二十萬衆誅成安君名聞海内威振天下此將軍之所長也然而衆勞卒罷其實難用今將軍欲舉倦弊之兵頓之燕堅城之下欲戰恐力不能㧞情見勢屈曠日糧竭燕不服齊必距境以自強也燕齊相持而不下劉項之權未有所分也若此者將軍之所短也故善用兵者不以短擊長而以長擊短為將軍計莫如按甲休兵鎮趙撫其孤弱百里之内牛酒日至以饗士大夫醳兵魏都賦曰肴醳順時劉逵曰醳酒也北首燕路而後遣辯士奉咫尺之書暴其所長於燕燕必不敢不聽從燕已從使諠言者東告齊齊必從風而服雖有智者亦不知為齊計矣如是則天下事可圗也兵固有先聲而後實者此之謂也韓信並從之燕齊從風而靡後漢書曰王莽兵攻昆陽光武自將步騎千餘前去大軍四五里而陣尋邑亦遣人數千合戰光武奔之斬首十級秦法斬首一賜一級故昔人謂斬首為級諸部喜曰劉將軍平生見小敵怯今見大敵勇甚可怪也且復居前請助將軍光武復進尋邑兵却諸部共乗之斬首數千級連勝遂前時伯升㧞宛已三日而光武尚未知乃偽使持書報城中云宛下兵到而陽墮其書尋邑得之不憙憙音許記反諸將既經累㨗膽氣益壯無不一當百光武乃與敢死者三千人從城西水上衝其中堅敢死謂果敢而死者凡軍事中軍將最尊居中以堅鋭自輔故曰中堅也尋邑陣亂乗鋭崩之遂殺王尋城中亦鼓譟而出中外合勢震動天地莽兵大敗走者相騰踐奔殪百餘里間殪仆也㑹大雷風屋瓦皆飛雨如注滍川盛溢水經曰滍水出南陽魯陽縣西堯山切東南經昆陽城北東入汝滍音直理虎豹皆股戰士卒爭赴溺死者以萬數水不流數過於萬故以萬為數王邑嚴尤陳茂輕騎乗死人渡水逃去盡獲其輜重車甲珍寳不可勝算魏志曰曹公征張魯定漢中劉曄進說曰明公以步卒五千西誅董卓北破袁紹南征劉表九州百郡十并其八威震天下勢傾内外今舉漢中蜀人觀風破膽失守推此而前蜀可傳檄而定也𤣥德人傑也有智度而遲新得蜀人猶未附今破漢中蜀人震恐其勢自傾以公之神明因其傾而壓之無不尅也若少緩之諸葛亮明於治理而為相關張諸人勇冠三軍而為將蜀人既定據險守要則不可犯也今不取必為後憂曹公不從居數月蜀降者說蜀中一日數十驚備斬之而不能禁也曹公悔之問曄曄曰今已小定未可擊也晉書曰何無忌南追桓𤣥與劉道規俱受劉毅節度𤣥留其龍驤將軍何澹之前將軍郭銓江州刺史郭昶之守湓口無忌等次桑落洲澹之等率軍來戰澹之常所乗舫旌旗甚盛無忌曰賊帥必不居中此欲詐我耳宜亟攻之衆咸曰澹之不在其中徒為無益無忌謂道規曰今衆寡不敵戰無全勝澹之雖不居此舫取則易獲因從兵勝之可以一鼓而敗之也道規從之遂獲賊舫因傳呼曰已得何澹之矣賊中驚擾無忌之衆亦為喟然道規乗勝逕進無忌又鼓噪赴之澹之遂潰又曰鎮南將軍都督荆州杜元凱襲吾樂鄉在今江陵口松滋縣東六十里虜都督孫歆沆湖以南至於交廣覩風送欵時衆議或曰百年之㓂未可盡剋今將暑熱水潦方降疾疫將起宜候冬大舉凱曰昔燕樂毅藉濟西一戰以并強齊今王師兵威已震譬如破竹數節之後皆迎刃而觧遂指授羣帥直指秣陵所過城邑莫不束手遂平吳國先議者慙而謝焉又曰朱齡石伐蜀賊譙縱縱將譙道福重兵守涪齡石師次平模去成都二里縱遣將侯暉譙悅屯平模店岸連城立柵齡石謂裨將劉鍾曰天方暑熱賊今固守攻之難㧞祗困我師吾欲蓄銳息兵伺隙而進卿以為何如鍾曰不然前揚聲言大衆由内水故譙道福不敢捨涪今重軍過之出其不意侯暉之徒已破膽矣因其兇懼而攻之勢當必剋剋平模店之後自可鼔行而前成都必不能守若緩兵相持虛實相見涪軍復來難為敵也進不得戰退無所資二萬餘人悉為蜀子虜耳從之翼日進攻皆尅斬侯暉等縱城守相次瓦觧又曰盧循率衆數萬方艦而下劉裕率兵拒之出輕利鬭艦躬提幡鼔命衆軍齊力擊之又上步騎於西岸右軍叅軍庾樂生乗艦不進斬而狥之於是衆軍並騰踊爭先軍中多萬鈞神弩所至莫不摧陷裕自于中流蹙之因風縱火焚艦岸上軍先備賊不得上岸乃投火焚烟焰翳天賊衆大敗追奔至夜乃歸循等還尋陽初分遣步兵莫不疑怪及燒賊艦乃悅服又曰周訪討賊杜曽曽大潰殺千餘人訪夜追之諸將請待明訪曰曽驍勇能戰今之敗也彼勞我逸是以尅之宜及其衰乗之可滅鼓行而進遂定漢沔崔鴻十六國春秋曰蜀李特攻晉將張徽敗徽軍特議欲釋徽還涪音浮諸將進曰徽軍連戰士卒傷滅知勇俱竭宜因其弊遂擒之若舍而寛之徽飬病收亡餘衆更合圗之未易也特從之復進攻徽潰圍而走特遣將水陸追之遂害徽生擒徽子存以徽䘮還之唐書曰太宗進逼西河宋金剛果遁走太宗追之身先士卒奮擊大破之乗勝逐北一日一夜行二百餘里轉戰數十合士卒疲弊至高壁嶺總管劉𢎞基叩馬而諫曰大王功效於是足矣亦宜思自安之計方今草創敵可盡乎且餱糧已竭士卒疲頓更欲何之願且停營待兵糧咸集而後决戰太宗曰功者難成易敗機者難得易失金剛走到汾州衆心已沮我及其未定乗勢擊之此破竹之易也如更遲留必為賊禽此失機之道吾國家之事當竭忠盡力豈顧身之安危乎遂䇿馬去諸軍乃進莫敢以饑乏為辭夜宿於雀䑕谷之西原太宗不食二日不觧甲三日矣軍中苦饑此夕惟有一羊太宗撫將士與之同食三軍感激皆奮而思鬬明日趨汾州金剛列陣南北七里以抗官軍太宗遣總管李勣程齩金秦叔寳當其北翟長生秦武通當其南親禦中軍以臨之諸軍小却為賊所乗太宗率精騎三千直趣金剛賊衆大潰斬首三千餘級追奔數十里至張南堡有涪州行軍總管樊伯通張徳政先據北堡望見太宗輕騎而來初未識之太宗免胄曰我也堡人讙譟既而涕泣曰不圗今日生謁大王死無所恨左右以太宗不食告之乃奉濁酒脫粟飯太宗曰今日饑渴並觧雖公孫豆粥何以加之又曰武徳初太宗征薛仁杲大破之乗勝遂逼析樜城竇抗等苦諫曰賊獨據堅城城雖破其將宗羅睺未可即逼請按兵以候其變太宗曰算之久矣破竹之勢不可失也賊大軍敗餘衆何足為虞兇魁之計盡於此矣遂率衆而進至夜半軍臨賊城守埤者皆亂爭自投而下仁杲窮蹙開門請降太平御覽卷三百十四
