front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_528-1a, image: WYG0897/WYG0897-0685a.png}
body:
  text: 太平御覽卷五百二十八宋李昉等撰禮儀部七迎氣禘祫六宗迎氣禮記月令曰孟春立春之月天子親帥三公九卿大夫迎春于東郊蔡邕章句曰迎春者禮昊天勾芒之神也于東郊就其位也邑外為郊去邑八里内因木數也周禮建國之神位兆五帝於四郊以蒼珪禮東方以赤璋禮南方以白琥禮西方以𤣥璜禮北方皆有牲幣各放其方之色樂奏太簇歌青陽冕執干歲舞雲翹育命所以遵飬時和也孟夏迎夏于南郊章句曰迎夏者禮炎帝祝融神也于南郊七里因火數也玉用赤牲幣各放其色樂奏中吕歌朱明其他皆如孟春也孟秋迎秋于西郊章句曰迎秋者禮少昊蓐收之神于西郊九里因金數也玉用白虎牲幣各倣其色樂奏夷則歌白藏其他如孟夏之禮孟冬迎冬于北郊章句曰迎冬者禮顓頊𤣥㝠之神也于北郊六里因水數也玉用𤣥牲幣冬倣其色樂奏應鍾歌𤣥英其他如孟秋之禮續漢書禮儀志曰立春之日百官皆衣青迎氣青郊郡縣皆青服幘立幡施土牛耕人于門外以示兆民立夏之日百官皆衣赤迎氣赤郊立秋之日百官皆衣白迎氣白郊立冬之日百官皆衣皂迎氣黑郊又郊祀志曰縣邑以立春之日皆青幡青幘迎春于郊外令一童男㡌青巾衣先在郭外迎春者至自野中出迎者拜之而還皇覽禮云天子迎四節日天子迎春夏秋冬之樂又順天道是故距冬至日四十六日則天子迎春于東堂距邦八里堂髙八尺堂階八等青稅八乗旂旐尚青田車載矛號曰助天生倡之以角舞之以羽此迎春之樂也自春分四十六日則天子迎夏于南堂距邦七里堂髙七尺堂階七等赤稅七乗旂旐尚赤田車載弓號曰助天養倡之以徵舞之鼔鞉此迎夏之樂也夏至四十六日則天子迎秋于西堂距邦九里堂髙九尺堂階九等白稅九乗旂旐尚白田車載㦸號曰助天收倡之以商舞之以干此迎秋之樂也自秋分數至四十六日則天子迎冬于北堂距邦六里堂髙六尺堂階六等黑稅六乗旂旐尚黑田車載甲號曰助天誅倡之以羽舞之以籥此迎冬之樂也所以迎四時樂飬九志于西堂冬飬九勝于北堂飬後三日而止天子行殺必順天道宋書禮志曰漢明帝據月令有五郊迎氣服色之禮因採元始中故事兆五郊于洛陽祭其帝與神車服各順方色魏晉依之江左以來未遑修建禘祫毛詩清廟雍曰雍禘太祖也禘大祭有來雝雝至止肅肅相維辟公天子穆穆又商頌曰長發大禘也濬哲維商長發其祥洪水茫茫禹敷下土方外大國是疆幅員既長禮記曾子問曰當七廟五廟無虛主虛主惟天子崩諸侯薨與去其國與祫祭于太祖為無主耳禮記大傳曰禮不王不禘王者禘其祖之所自出以其祖配之周禮宗伯職曰以四獻祼享先王以饋食享先王以祀春享先王以禴夏享先王以甞秋享先王以烝冬享先王宗廟之祭有此六享肆獻祼饋食在四時之上禮稽命曜曰三年一祫五年一禘以衣服想見其容色三日齋思親志意相見所好意喜然後入廟左傳昭四曰十五年春將禘于武公戒百官梓慎曰禘之日其有咎乎吾見赤黒之祲非祭祥也喪氛也祲妖氛也其在蒞事乎公羊傳上曰祫者何也合祭也其合祭奈何合毁廟之主陳乎太祖未毁廟之主皆升合食于太祖耳爾雅曰禘大祭也白虎通曰祭宗廟所以明人倫事人君貴功徳廣孝道位尊徳盛所及彌逺五經異義曰今春秋公羊說祠宗廟筮而不卜傳曰禘祫不卜又曰謹案叔孫通宗廟有月祭之禮知古而然也三嵗一祫此周禮也五嵗一禘疑先王之禮也又曰古春秋左氏說古者先王日祭于祖考月薦于曾髙將享及二祧嵗禱于壇禘及郊宗石室五經通義曰王者諸侯所以三年一祫五年一禘何三年一閏天道小備故三年一祫祫皆取未遷廟主合食太祖廟中五嵗再閏天道大備故五嵗一禘禘者諦也取已遷廟主合食太祖廟中禮記外傳曰禘祫謂之殷祭祫大而禘小春秋之經有禘而無祫毁廟無時祭但五年有二殷祭耳神主入廟先為一禘明年春禘而又祫經云有事于其廟即是禘也國之大事自此為常漢書曰元始五年春正月祫祭明堂諸侯王公二十八人列侯百二十人宗室子孫九百餘人助祭禮畢皆益戸賜爵及金帛增秩補吏各有差又劉歆曰春秋傳曰日祭月祀時享嵗貢終王祖禰則日祭曾髙則月祀二祧則時享壇墠則嵗貢大禘則終王彌逺彌尊故禘為重矣續漢書祭祀志曰建武二十六年詔問張純禘祫之禮奏三年一祫五年一禘禘之言諦諦昭穆尊卑之義以夏四月陽氣在上隂氣在下故正尊卑之義祫以冬十月五榖成熟故骨月合聚飲食漢雜事曰元帝時匡衡貢禹以經義毁先帝親盡之廟髙帝為太祖孝文為太宗孝武為世宗孝宣為中宗祖宗廟皆世世奉祀其餘惠景以下皆毁五年而再殷祭猶古之禘祫王隠晉書曰太康中太廟成遷神主于新廟帝帥百官奉迎于道左遂親禘祫後魏書曰世宗景明二年夏六月秘書丞孫思蔚上言古之祭法時祫並行天子先祫後時諸侯先時後祫此施當世在今則煩且禮有升降事有節文適時之制聖人弗違當祫之月減時祭以從要省制可十一月壬寅改築圜丘于伊水之陽己夘乃有事焉宋書禮志曰凡禘祫大祭則神主出廟堂為昭穆以安坐不復停室也又志曰博士徐道娱上議曰太廟烝甞儀注皇帝行事畢出便坐三公以上獻太祖送神于門然後至尊還拜百官賛拜乃退尋清廟之道所以肅敬安神也又曰廟者貌也神靈所憑也事亡如存若恒在也即不應有送神之文自陳豆薦俎車駕至止並弗奉迎夫不迎而送送而後辭齟齬之情實用未達又博士江䆳議曰在始不迎明在廟也卒事送神節孝思也若不送而辭是舍親也辭而後送是速神也故孝子不忍違其親又不忍違神是以祝史送神以成烝甞之義又禮志曰禘祫之禮三年一五年再公羊所謂五年再殷祭也在四時之上周禮所謂肆獻祼饋食在四時之上是也蓋厯嵗節月無定天子諸侯先後弗同禮天子祫甞諸侯烝祫有田則祭無田則薦鄭注天子先祫後時祭諸侯先時祭後祫有田也即祭又薦新祭以首時祭以仲月然則大祭四祀其月各畢天子以孟月殷仲月烝諸侯孟月嘗仲月祫也齊書禮志曰右僕射王儉議按禮記王制天子先祫後時祭諸侯先時祭後祫春秋魯僖公二年祫明年春禘自此以五年再殷孔緯稽命徵曰三年一祫五年一禘經紀所論禘祫與時其言鮮矣唐書曰元和中太常上言按禮祭不欲數太廟禘祫祭禮重于時享與禘同月即其月但行禘祫祭不行時享盖不欲煩是禮先重者今時享重于朔望薦食稽求禮情參酌輕重請每時至及蜡但行享禮其月朔望薦食請停知告廟日與朔望薦食日同請先行告禮然後薦食六宗尚書舜典曰禋于六宗六宗謂星辰司中司命風伯雨師也尚書大傳曰萬物非天不生非地不載非春不動非夏不長非秋不收非冬不藏故書禋于六宗此之謂也五經異義曰今尚書歐陽生說云六宗者上不及天下不及地旁不及四方居中恍惚無有神助隂陽變化有益于人郊天并祭之又曰古尚書説六宗者天地屬神之尊者謂天宗三地宗三天宗日月北辰也地宗岱山河海也日月為隂陽宗北辰為星宗岱山為山宗河海為水宗祀天則天文從祀地則地理從也續漢書祭祀志曰安帝以尚書歐陽家説云六宗者在天四方之中為上下四方之宗以元始故書謂六宗亦六子之氣日月雷風山澤者為非三月更立六宗祠于洛陽城西北地理北太社東觀漢記曰光武即帝位燔柴告天禋于六宗李郃别傳曰郃侍祠南郊不見六宗祠奏曰按尚書肆類于上帝禋于六宗漢興于甘泉汾陽祭天地亦禋六宗至孝成時匡衡奏立北郊復祠六宗至建武都洛陽制郊祀不道祭六宗由是廢不血食今宜復舊上從公議由是遂祭六宗張純六宗表曰臣竊以十一家凡有六統而所據各異考之經禮大義不通臣謂禋于六宗祀祖考所尊者六宗則三昭三穆也魏書曰明帝問王肅六宗凡幾對曰坎為水離為火震為雷巽為風艮為山兌為澤此乾坤六甲子也太平御覽卷五百二十八
