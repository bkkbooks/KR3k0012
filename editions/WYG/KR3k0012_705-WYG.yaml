  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_705-1a, image: WYG0899/WYG0899-0291a.png}
body:
  text: 太平御覽卷七百五宋李昉等撰服用部七簏篋簏說文曰簏竹髙篋也字或作通俗文曰簏謂之匱笥魏晉世語曰武帝欲以臨淄侯植為嗣世子患之以車載簏内詣朝歌長吳質與謀楊修以白太祖不推世子懼質曰明後簏受絹車内以惑之修必復白推之無人修受罪矣世子從之修果白推而無人太祖怒由是疑焉王隠晉書曰洛陽有尉部小吏忽有好物尉疑詰問云先行逢一老媼說有病師卜當得城南年少暫相煩相報乃上車内着漆簏中行十餘里過六七門開簏忽見樓閣好屋問此何處云是天上見一婦人三十五六短青黒色眉後有疵時賈后疎尉聞其狀知是后慙而去晉書曰陸納性恡每自筭料財物有客入見之羞忸以身映簏晉中興書曰王敦害周顗籍其家止見素簏中有故絮修復山林故事曰武悼皇后𤣥宫貯蝦蟇簏二東宫舊事曰皇太子初拜有漆馬齒書簏金裝彩花簏古詩曰交工象牙簏婉轉青絲繩篋左傳昭四曰叔鮒求貨於衛淫芻蕘者衛人使屠伯饋叔向羮與一篋錦春秋後語曰魏文侯命樂羊將攻中山三年而拔之樂羊反而論功文侯示之謗書一篋漢書曰張安世字子儒以父任用為郎善事給事尚書精力于職上行幸河東嘗亡書三篋詔問莫能知者惟安世識之且作其事後購求得書以相校無遺失魏志曰胡質為荆州刺史薨無餘財惟有賜書衣篋而已晉書曰張華身死之日家無遺財有文史溢於几篋太平御覽卷七百五
  hash: sha256:eab10822da3c02accce950f2e43e01cc5373897279b9755051cd8074d4f97849
