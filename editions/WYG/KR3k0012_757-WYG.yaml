body:
  text: 太平御覽卷七百五十七宋李昉等撰器物部二鑊釡鬲鐺鎢銚鑪甑箄甑帶鑊周禮云烹人掌供鼎鑊儀禮曰雍人陳三鼎在羊鑊之西二鼎在豕鑊之西史記曰藺相如謂秦王曰今以秦之强而先割十五郡與趙豈敢留璧而得罪於大王乎臣知欺大王當誅臣請就湯鑊唯大王羣臣熟計之晉書曰張平自稱豫州刺史樊雅自號譙郡太守元常皆為四品將軍豫州刺史祖逖出屯廬州遣參軍殷義詣平雅義意輕平視其室云當作馬廐見大鑊云欲鑄作鐵器平曰此是帝王大鑊天下定後方當用之奈何打破義曰卿不能保頭足而惜大鑊耶平大怒於坐斬義阻兵固守嵗餘逖攻平殺之而雅據譙城文子曰養魚於沸鑊之中棲烏於炎鑪之上雖其或生養理失矣陸機洛陽記曰宫牆外有大鐵鑊盛水以救火受百斛百步一置搜神記曰武帝從南岳至廬江濳霍山之上無水廟有四鑊可受四十斛至祭時水輒自滿用之足了事畢即空塵土樹葉草之汙也積五十歳歳作四祭後但作三祭鑊日敗朱崕𫝊曰朱崖大家大銅鑊多者三五百積以為貨南越志曰龍川縣營崗北有巨鑊恒有懸泉注之終嵗不滿甞有採薪者欲推動之忽然震電迷失路十許日乃至家湘州記曰伍子胥廟中有大銅器元嘉中沙門釋亮唘乞此廟器鑄丈六金像始廟所有大銅鑊可容三百斛許即陷入地中僧亮夢神語云今捨此器相與發願免此神刑殷斌武當山記曰魏興反照山上有三公鐵鑊常有水數十斛雖大旱而不減長老云有子上女欲来此山忿思而死三公衛送故於此烹之羅浮山記曰有石鑊容千餘斛溢為瀑布墨子守死篇曰二十五步一竈竈有鐵鑊容二石以上為湯釡說文曰鍑如釡而大口釡也一曰鼎大上下若甑曰鬵三足釡也方言曰釡自闗而西或謂之釡或謂之鍑廣雅曰錪鬲鍑鏕鏝鍪􅀢錡釡也埤蒼曰錫䥈小釡也易說卦曰坤為釡詩曰于以湘之維錡及釡又曰誰能烹魚溉之釡鬵左𫝊曰筐筥錡釡之器潢汙行潦之水三禮圖曰釡制度云三斛或曰二斛春秋繁露曰夏求雨曝釡於衍十日史記曰項籍救鉅鹿沈船破釡甑以示必死古史考曰黄帝始造釡甑戰國䇿曰蔡澤入韓魏遇奪釡鬲於途東觀漢記曰梁鴻少孤詣太學受業同房先炊已呼鴻及熱釡炊鴻曰童子不因人熱者也減竈更燃火又曰鄧遵破匈奴得釡鑊二三千枚謝承後漢書曰范丹為莱蕪長遭黨錮有特操閭里歌曰釡中生魚范莱蕪又曰胡郡為淮南太守使羣下閣外炊曝作乾飯閣中不設釡竈又曰頴川尹暹為徐州刺史以小銅釡甑十日一炊後漢書曰王莽納言將軍嚴尤欲據宛伯升乃陳兵誓衆焚積聚破釡甑鼔行而前魏略曰鍾繇為相國作五熟釡鼎範因太子鑄之釡成太子與繇書曰昔有黄三鼎周之九寳咸一體調一味豈若斯釡五味時芳盖鼎之烹餁饗帝養賢今之嘉釡有踰茲美晉諸公讃曰尚書杜預欲為平厎釡謂欲薪火為省黄門郎賈尋於世祖前面折預曰釡之尖下以備沃洗今若平底無以去水預亦不能折也前秦録曰處士張忠隠於山中鑿石為釡容六斗四升河圖曰漢髙祖觀汶水見一黄釡驚却反化為一翁責言劉季何不受河圖莊子曰曾子再仕而心再化曰吾及親仕三釜而心樂後仕三千鍾不洎親吾心悲韓子曰智伯圍襄子於晉陽决晉水以灌之城中巢處懸釡吕氏春秋曰晉文公反國介子推不肯受賞或遇之山中負釡淮南子曰鉛不可以為刀木不可以為釡又曰太王亶父處邠狄人攻之杖策而去百姓釡甑踰梁山而國乎岐淮南萬畢術曰膽鳴取牛膽以圖熱釡扣則鳴矣風俗通曰俗說齊人有空車行魯人有負釡者便持置車中二三百里臨别取釡不相問為誰亦不謝後車家擊獄當死釡主徑往募人取之穿壁未達車者怒不肯出釡主慙欲俱死明日主者以事白齊君義而原之魏子曰鼎以為希出而世貴之釡鬲常用而世輕之兵書曰初出軍行三炊釡不得覆覆釡軍敗物理論曰堯世洪水民登木而栖懸釡而爨茅君内𫝊曰欲合九轉先作神釡婁承先别𫝊曰西山越民反所過殘毁至婁氏之家往中庭顧見釡甑尚著於竈曰恐他方寇取之仍為取洗沈於井中而去婁家後還皆盡得之裴淵廣州記曰東官郡煮鹽織竹為釡以牡蠣屑泥之燒用七夕一易異苑曰長山朱郭夫妻採藻澗濱見二銅釡沿流而下取之而歸有圓盖滿中銅器光輝曜目自然作聲郭懼運著北山埋之而後賣釡與人方載出為貨船無故自覆失釡所在又曰薛願家有虹飲釡中水盡以酒灌之便吐金滿釡而願因之豐富離騷曰黄鍾毁棄瓦釡雷鳴鬲爾雅曰鼎空足者謂之鬲方言鑊或謂之鏤吴楊之間謂之鬲周禮曰鬲實五觳厚半寸脣一寸漢書曰空足之鬲家語曰魯有儉者瓦鬲煮食祀之自謂其美盛之土鉶之器以進孔子孔子受之忻然有悅如受太牢子路曰瓦甑陋器也夫子何善如此乎孔子曰夫食美者念其親以食其美者而念於我故也盛宏之荆州記曰湘東隂山縣西有鬲口溪昔有大鬲容百斛出於此水故因為名鐺通俗文曰鬴有足曰鐺齊書曰明帝每存儉約元日大官上夀帝欲壞銀酒鐺尚書令王晏等咸稱盛徳蕭頴曺曰朝廷盛禮莫過三元此一銀器既是舊物不足為侈帝不悅預曲宴銀器滿席頴曺曰陛下前欲壊酒鐺恐宜移在此器也帝甚慚唐書曰薛大鼎為滄州太守政化大行百姓利之賈敦頤為瀛州刺史鄭徳本為冀州刺史俱有異政時人號曰鎗脚刺史東宫舊事曰皇太子初拜給銅龍頭鎗孝子𫝊曰陳遵母好食鐺底焦飯孔氏志曰昔有人苦心腹病死後剖視之得銅鐺一枚容數合許述異記曰諸葛景亡後宅上常聞語當酤酒還而無鎗鬼云卿無温鎗那得飲酒見一銅鎗從空中来續齊諧記曰王敬伯夜見女子命婢取酒須臾持一銀酒鎗笑林曰太原人夜失火欲出銅鎗誤持熨斗便大驚怪曰異事火未至已被燒失脚梁吳筠以服散鎗贈殷鈞别詩曰玉鉉布交文金丹煥仙說九沸翻成緩七轉良為切執以代疎麻長貽故人别鎢錥廣雅曰鎢錥之銼􅟋說文曰銼􅟋鍑也纂文曰秦人以鈷䥈為銼􅟋魏畧曰徐晃性嚴驅使將士不得閒息於時軍中為之語曰不得餉屬徐晃晃聞此語笑曰我槌破汝鎢錥耶杜預奏事曰藥杵臼澡槃熨斗釡瓮銚槃鎢錥皆亦民間之急用者也江道表曰昔康皇帝𤣥宫内金烏肓銚廣雅曰鋗謂之銚說文曰銚温器也嵩髙山記曰壑左右有古人住處銅銚器物猶存衡山記曰有人採藥暮宿石室石室中見一銅銚是煑藥處蠻人聞之取銚還用舉村盡病送返乃已夢書曰夢見得新銚當取好婦也魏武上獻帝表曰臣祖騰有順帝賜器今上四石銅鋗四枚五石銅鋗一枚御物有鈍銀粉銚一枚束晢貧家賦曰執偏隳之漏鋗鑪說文曰鑪方鑪也鏇圜鑪也周禮曰宫人掌王之六寢凡寢之事掃除執燭共鑪炭凡勞事左𫝊曰邪子在門臺臨廷閽以鉼水沃庭邪子望見之怒閽曰夷射姑旋焉命執之弗得兹怒自投於牀廢於爐炭爛遂卒魏略曰孫權上書稱臣稱說天命太祖以權書示外曰是兒欲踞吾著爐火上耶崔豹古今注曰漢成帝顧成廟有二真金鑪拾遺録曰周靈王出於宣昭之臺望東方雲氣蓊鬱俄而有二人乗飛遊之輦上帝酣醉其一人能為霜雪坐者皆噤乃命青金洪鑪青金洪者出青零淵石色皆如紺中有金鑄為大鑪異苑曰龎猗義熙中為宜都太守御人牧馬於野見一銅鍼上焰帶鏁而行持歸以呈猗遂檻盛送下荆州至都北界忽風雨有呌聲光火燭天徑来趨船失鑪所在鹽鐵論曰歐冶能因國君之銅鍼以為金鑪大種而自不能為壺鼎盤盂無其用也桓譚新論曰元帝求方士漢中道人王仲都大暑日使暴坐又環以十鑪不言熱論衡曰當風鼓絃向日燃鑪而天中不為冬夏易氣又曰推無益之能納無補之說似以夏進鑪以冬奏扇賈誼鵩鳥賦曰且夫天地為鑪兮造化為工隂陽為炭兮萬物為銅甑說文曰窐甑空也古史考曰黄帝始作甑方言曰甑自闗而東謂之甗或謂之鬵或謂之酢􅿰爾雅曰䰝謂之鬵鬵鉹也周禮曰陶人為甗實二鬴厚半寸甑實二鬴厚半寸脣寸七穿左𫝊晉師從齊師入自丘輿擊馬陘齊侯使人賂以紀甗漢書曰項羽引兵渡河皆沈船破釡甑燒廬舍示士卒必勝不勝死無迴心後漢書曰范史雲為莱蕪長時人歌曰甑中生塵范史雲袁山松後漢書曰荀淑與陳寔相善常命駕相就令元方侍側季方作食甞一朝食荀季方跪曰向聞大人與荀君言善竊聴之甑壊飯縻寔曰汝聽談解乎荅曰解令說之不誤一言公說淮南子曰粟得濕而熯甑得火而液白虎通曰王者徳至山林丹甑見京房易逆刺曰天雨釡甑嵗一熟益部耆舊𫝊曰任文公有莽之變悉賣竒物維存銅甑蓑笠郭林宗别𫝊曰鉅鹿孟敏客居太原墮甑不顧林宗見而問之對曰甑已破矣視之無益林宗勸使學果為美士郭文𫝊曰文以竹為甑録異𫝊曰隆安中呉縣張君林忽有鬼来其家取林甑使破無何鬼乃撞盆厎穿以充甑錢塘記曰石姥山有甑大數十圍有三十六足一人揺之輙動縱使千百人引之與一人不異離騷曰珪璋雜於甑窐箄說文曰箄蔽也所以蔽甑底也淮南子曰明鏡可鑒形蒸食不為竹箄夢書曰夢見新箄婦女憙孔融同歲論曰弊箄徑尺不足以救鹽池之鹹甑帶淮南子曰琬琰之玉汙泥土之中雖亷者弗釋弊箄甑瓾在袇茵之上雖貪者不搏美之所在雖汙辱世不能賤惡之所在雖髙隆世不能貴夢書曰夢見甑欲娶妻夢見甑帶媒妁来太平御覽卷七百五十七
