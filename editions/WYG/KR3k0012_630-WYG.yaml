body:
  text: 太平御覽卷六百三十宋李昉等撰治道部十一薦舉上禮記檀弓下曰趙文子知人所舉於晉國管庫之士七十有餘家管庫之士府吏以下官長所置也舉之於君以為大夫士也管鍵也庫物所蔵禮記雜記曰管仲遇盜取二人焉上以為公臣曰其所與遊僻也可人也言此人可用也但居惡人之中使之犯法又儒行曰儒有内稱不避親外舉不避怨程功積事推賢而進之不望其報苟利國家不求富貴其舉賢援能有如此者左傳莊公曰鮑叔帥師來言曰子糾親也請君討之鮑叔乗勝而進軍志在生得管仲故托不忍之辭管仲讎也請受而甘心焉管仲射桓公故曰讎甘心言欲快意殺戮之乃殺子糾於生竇召忽死之管仲請囚及堂阜而脱之堂阜齊地或曰鮑叔解夷吾縛於此因以為名歸而以告曰管夷吾治於高傒高傒齊卿高敬仲也言管仲治理政事之才多於敬仲使相可也公從之又僖中曰晉侯問原守於寺人勃鞮對曰昔趙衰以壺飡從徑餒而弗食言其亷且仁不忘君也徑猶行也故使處原從披言也衰雖有大功猶間小善以進之示不貴勞又僖下曰楚子将圍宋使子文治兵於暌終朝而畢不戮一人暌楚邑自旦及食時為終朝復使子玉治兵於蒍終日而畢鞭七人貫三人耳蒍邑名自旦及夕為終日國老皆賀子文子文飲之酒蒍賈尚幼後至不賀子文問之對曰不知所賀子之傳政於子玉曰以靖國也靖諸内而敗諸外所獲幾何子玉之敗子之舉也舉以敗國将何賀焉又曰初臼季使過冀見冀缺耨其妻饁之敬相待如賔與之歸言諸文公曰敬徳之聚也能敬必有徳徳以治民請君祗用之公曰其父有罪可乎對曰舜之罪也殛鯀其舉也興禹管仲桓公之賊也實相之以濟康誥曰父不慈子不孝兄不友弟不恭不相及也詩曰採葑採菲無以下體君取節焉可也文公以為下軍大夫又曰晉蒐於被廬作三軍謀元帥趙衰曰郤穀可臣亟聞其言矣説禮樂而敦詩書詩書義之府也禮樂徳之則也徳義禮之本也夏書曰敷納以言明試以功車服以庸君其試之乃使郤穀将中軍又曰秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還遂霸西戎用孟明也君子是以知秦穆之為君也舉人之周也周普徧也不以一敗棄其善與人之一也一無二心孟明之臣也其不解也能懼思也子桑之忠也其知人也能舉善也子桑公孫枝舉孟明者詩曰于以采蘩于沼於沚于以用之公侯之事秦穆有焉夙夜匪懈以事一人孟明有焉貽厥孫謀以燕翼子子桑有焉言子桑有舉善之謀又曰晉蒐於夷舍二軍使狐射姑将中軍趙盾佐之陽處父至自温改蒐於董易中軍陽子成季之屬也故黨於趙氏且謂趙盾能曰使能國之利也是以上之宣子於是乎始為國政又文公下曰昔髙陽氏有才子八人髙陽帝顓頊之號八人其苗裔蒼舒隤敳檮戭大臨尨降庭堅仲容叔逹此即垂益禹臯陶之倫庭堅即臯陶字齊聖廣淵明允篤誠天下之民謂之八愷髙辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍髙辛帝嚳之號八人即稷契朱虎熊罷之倫忠肅恭懿宣慈恵和天下之民謂之八元此十六族也世濟其美不隕其名以至於堯堯不能舉舜臣堯舉八愷使主后土以揆百事莫不時序地平天成舉八元使布五教於四方父義母慈兄友弟恭子孝内平外成是以堯崩而天下如一同心戴舜以為天子以其舉十六相去四凶也又襄公曰祁奚請老老致仕晉侯問嗣焉嗣續其職者稱解狐其讎也将立之而卒解狐卒又問焉對曰午也可午祁奚子於是羊舌職死矣晉侯曰孰可以代之對曰赤也可赤職之子伯華於是使祁午為中軍尉羊舌職佐之各代其父君子謂祁奚於是能舉善矣稱其讎不為謟立其子不為比舉其偏不為黨商書曰無偏無黨王道蕩蕩其祁奚之謂矣解狐得舉未得位故曰得舉祁午得位伯華得官建一官而三物成一官軍尉物事也能舉善也夫惟善故能舉其善詩曰惟其有之是以似之祁奚有焉又襄公曰鄭子皮授子産政辭曰國小而偪偪近大國族大寵多不可為也子皮曰虎率以聴誰敢犯子子善相之國無小言在治政小能事大國乃寛為大所恤故也論語子夏曰富哉言乎舜有天下選於衆舉臯陶不仁者逺矣湯有天下選於衆舉伊尹不仁者逺矣又曰仲弓為季氏宰問政子曰先有司赦小過舉賢才曰焉知賢才而舉之曰舉爾所知爾所不知人其舍諸孔子曰女所不知者人将自舉之各舉其所知則賢才無遺又曰公叔文子之臣大夫僎與文子同升諸公孔曰大夫僎本文子家臣薦之使與已並為大夫同升諸公朝子聞之曰可以為文矣孔曰言行如是可諡為文史記曰秦繆公以五羖羊皮贖百里奚釋其囚與語國事百里奚讓曰臣不及臣友蹇叔蹇叔賢而世莫知臣嘗遊困於齊而乞食銍人蹇叔収臣臣因而欲事齊君無知蹇叔止臣臣得脱齊難遂之周周王子頺好牛臣以養牛干之及頺欲用臣蹇叔止臣臣去得不誅事虞君蹇叔止臣臣知虞君不用臣臣誠私利禄爵且留再用其言得脱一不用及虞君之難是以知其賢於是繆公使人厚幣迎蹇叔以為上大夫又曰秦孝公下令曰賔客羣臣有能出竒計强秦者吾且尊官與之分土衛鞅聞是令下西入秦因景監求見孝公説孝公變法修刑内務耕稼外勸戰士明行賞罰孝公善之卒用鞅法百姓便之乃拜鞅為左庶長又曰王稽使於魏問鄭安平魏有賢人可與俱西乎安平曰臣里中有張禄先生欲見君言天下事稽知其范雎乃載以入秦又曰趙烈侯好音謂相國公仲連曰寡人有愛可以貴之乎公仲曰富之則可貴之則否烈侯曰然夫鄭歌者搶石二人吾賜之田人萬畆公仲曰諾不與居一月烈侯問歌者公仲曰求未有可者有頃復問公仲終不與乃稱疾不朝番吾君謂公仲曰君實好善而未知所持今公仲相趙四年亦有進士乎曰未也番吾君曰牛畜荀欣徐越皆賢可公仲乃進三人牛畜侍烈侯以仁義約以王道明日荀欣侍以選練舉賢任官使能明日徐越侍以節財儉用察度功徳所與無不充君悦乃使謂相國曰歌者之田且止官牛畜為師荀欣為中尉徐越為内史賜相國衣二襲又曰藺相如者趙人也為趙宦者令繆賢舎人趙惠文王時得楚和氏璧秦昭王聞之使人遺趙王書願以十五城請易璧趙王與諸大臣謀欲與秦秦城恐不可得徒見欺欲勿與即患秦兵之來計未定求人可使報秦者未得宦者令繆賢曰臣舎人藺相如可使王問何以知之對曰臣嘗有罪竊計欲亡走燕舎人藺相如止臣曰君何以知燕王臣語曰臣嘗從大王與燕王㑹境上燕王私握臣手曰願結交以此知之故欲徃相如謂臣曰夫趙强而燕弱而君幸於君王故燕王欲結交於君今君乃亡趙走燕燕畏趙其勢必不敢留君而束君歸趙矣君不如肉袒伏斧鑕請罪則幸得脱矣臣從其計大王亦幸赦臣臣竊以為其人勇士有智謀宜可使於是王召問藺相如以為賢遂使奉璧入秦又曰趙奢者趙之田部吏也收租税而平原君家不肯出趙奢以法治之殺用事者九人平原君怒将殺奢奢因説曰君於趙為貴公子今縱君家而不奉公則法削法削則國弱國弱則諸侯加兵是無趙也君安得有此富乎當以君之貴奉公如法則上下平上下平則國强國强趙固而君為貴戚豈輕於天下耶平原君以為賢言之於王王用之治國賦大平民富而府庫實卒為名将又曰陳平亡楚歸漢因魏無知求見漢王與語而悦之乃拜為都尉使為叅乗典䕶軍諸将盡讙後絳侯灌嬰等咸讒平曰臣聞平居家時盜其嫂事魏不容亡歸楚歸楚不忠又亡歸漢今日大王尊官之令䕶軍臣聞平受諸將金多者得善處金少者得惡處平反覆亂臣也願王察之漢王疑召讓無知無知曰臣所言者能也陛下所問者行也今有尾生孝已之行而無益於勝負之數陛下何暇用之楚漢相距臣進竒謀之士顧其計誠足以為國家利耳且盜嫂受金亦何足疑乎王乃厚賜平拜為䕶軍都尉盡䕶諸將後高祖定天下與平剖符世世勿絶為户牖侯平辭曰此非臣之功也上曰吾用先生謀計戰勝尅敵非功而何乎曰非魏無知臣安得進上曰若子可謂不背本矣乃復賞魏無知漢書曰韓信度蕭何等已數言上不用即亡何聞信去不及以聞自追之人有言上曰丞相何亡上怒如失左右手一二日何來上且怒且喜罵何曰昔亡者何也曰臣非敢亡追亡者耳上問為誰曰韓信上曰諸將亡以十數公無所追追信詐也何曰信國士無雙王必欲長王漢中無所事信張晏曰旡事用信也必欲争天下非信無可與計事者又曰孫叔通降漢從弟子百餘人然無所進専言諸故羣盜壯士進之弟子皆曰事先生數年幸而得從降漢今不進臣等専言大滑何通乃言曰漢王方䝉矢石争天下諸生寜能鬬乎故先言斬将搴旗之士諸生且待我我不忘之又曰張釋之字季南陽人與兄中同居以貲為騎郎事孝文帝十二年不得調亡所知名釋之曰久官減仲之産不遂欲免歸中郎将袁盎知其賢惜其去乃請徙釋之補謁者又曰賈誼年十八以能誦詩書屬文詞稱郡中河南守呉公聞其秀才召置門下甚愛幸文帝初立聞河南守呉公治平為天下第一故與李斯同邑而嘗學事焉徴以為廷尉廷尉乃言誼年少頗通諸家之書文帝召以為博士又曰武帝初即位是時丞相田蚡毎入奏事移日所言皆聴薦人或起家至二千石權移主上上廼曰君除吏盡未吾亦欲除吏也又曰韓安國為人多大畧知當世取捨而出於忠厚貪嗜財貨然所推舉士皆賢於己者又曰張安世嘗有所薦人来謝弗復為通有郎功髙不調自言安世應曰君之功髙明主所知人臣執事何長短而自言乎絶不許已而郎果遷幕府長史辭去之官安世問以過失長史曰将軍明主股肱而士無進論者以為譏安世曰夫明主在上賢不肖較然臣下自修而已何知士而薦之其欲匿名迹逺權勢如此又曰朱買臣随上計吏為卒将重車至長安詣闕上書久不報待詔公車糧用乏上計吏卒更乞與之㑹邑子嚴助貴幸薦臣召見説春秋言楚辭帝甚悦之拜買臣為大夫與嚴助俱侍中又曰前将軍韓増舉馮奉世以衛侯使持節送大宛諸國客至伊修城都尉宋將言莎車與旁國攻殺漢使奉世與其副嚴昌計遂以節諭諸國王發其兵進擊莎車攻㧞其城莎車王自殺傳其首詣長安諸國悉降威振西域奉世乃罷兵以聞宣帝召見韓増曰賀将軍所舉得人又曰王章奏王鳯不忠天子感寤謂章曰㣲京兆言吾不聞社稷計且唯賢知賢君誠求可以自輔者於是章奏封事薦中山孝王舅瑯琊太守馮野王上欲以代鳯章於是為鳯所忌又曰何武為人仁厚好進士奨稱人之善為楚内使厚兩龔在沛郡厚兩唐及為公卿薦之朝廷此人顯於世者何侯之功也世以此多焉又曰大将軍王鳯用事上遂謙讓無所専左右嘗薦光禄大夫劉向少子歆通逹有異材上召見誦讀詩賦甚悦之欲以為中常侍召取衣冠臨拜皆曰未曉大将軍又曰王鳯病天子數自臨問親執其手垂涕曰将軍病如有不諱平阿侯譚次將軍矣鳯頓首泣曰譚等雖與臣至親行奢僭無以率導百姓不如御史大夫音臣敢死保之初譚等倨不尊事鳯而音敬鳯卑恭如子故薦之又曰哀帝有詔舉太常王莽入收大司馬董賢印綬詔有司舉可代司馬者莽故大司馬辭位辟丁傅衆庶稱以為賢又太后近親自大司徒孔光以下武獨謀以為往事孝惠孝昭少主之世外戚吕霍上官持權幾危社稷今孝成孝哀比世無嗣方當選立親近輔㓜主不宜令異姓大臣持權親踈相錯為國計便於是何武舉公孫禄可大司馬而禄亦舉武太后竟自用莽為大司馬莽諷有司劾奏武公孫禄互相稱舉皆免又曰王嘉薦儒者公孫光滿昌及能吏蕭成薛修皆故二千石有名天子納而用之續漢書曰虞詡以左䧺有忠公節上疏薦之曰伏見議郎左䧺數言封事至引陛下身遭危難以為警戒實有王臣蹇蹇之節周公謨成王之風宜擢在喉舌之官必有匡弼之益由是拜䧺尚書又曰陳蕃胡廣等上疏薦徐穉等曰臣聞善人天地之紀治之所由也伏見處士豫章徐穉陽城姜肱汝南袁閎京兆韋著潁川李曇徳行純備著於民聴若使擢登三事協亮天工必能翼宣盛美増光日月矣桓帝乃以安車𤣥纁徴之又曰橋𤣥遷司空轉司徒素與南陽太守陳球有隙及得三公位而薦球為廷尉又曰皇甫規字威明安定人拜度遼将軍上書薦中郎将張奐自代及朋黨事起天下名賢多見染逮規雖為名将素譽不髙自以西州豪傑恥不得與乃先自上言臣前薦故大司農張奐是附黨朝廷知而不問也太平御覽卷六百三十
