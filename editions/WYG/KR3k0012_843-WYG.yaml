  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_843-1a, image: WYG0900/WYG0900-0448c.png}
body:
  text: 太平御覽卷八百四十三宋李昉等撰飲食部一酒上世本曰儀狄作酒醪變五味少康作秫酒戰國䇿曰帝女命儀狄作酒而進於禹春秋緯曰凡黍為酒陽據隂乃能動故以麴醸黍為酒釋名曰酒酉也醸之米麴酉懌久而味美也亦言踧也能否皆强相踧持也又入口咽之皆踧其面也説文曰酒就也所以就人性之善惡也一言造也吉㓙所起造也又曰酴音途酒母也醴酒一宿熟也醪汁滓酒也酎三重之酒也醨薄酒也醑酋酒也酒經曰空桑穢飯醖以稷黍以成醇醪酒之始也烏梅女䴷胡板切甜醹音乳九投澄清百品酒之終也周禮天官下曰酒正掌酒之政令以式法授酒材辨五齊之名一曰泛齊二曰醴齊三曰盎齊四曰醍齊五曰沉齊辨三酒之物一曰事酒二曰昔酒三曰清酒事酒如今之醳酒也昔酒久酒今之舊醳也清酒今之冬醸夏成者也禮記月令孟冬曰是月也乃命大酋秫稻必齊麴蘖必時湛熾必潔水泉必香陶器必良火齊必得兼用六物大酋監之毋有差貸大酋謂酒官之長六物者一曰秫稻二曰麴糵三曰湛熾四曰水泉五曰陶器六曰火齊命酒官監之毋有差貸謂不中法式又曲禮曰侍酒於長者酒進則起拜受於尊所長者辭少者反席而飲長者舉未釂少者不敢飲又檀弓曰知悼子卒未塟悼子晋大夫荀瑩平公飲酒師曠李調侍鼓鐘杜蕢自外来聞鐘聲曰安在曰在寢燕於寢杜蕢入寢歴階而升酌而曰曠飲斯又酌曰調飲斯又酌堂上北靣坐飲之降趨而出三酌皆罰平公呼而進之曰蕢曩者爾心或開予是以不與爾言謂始来入時開謂諫爭有所發爾飲曠何也曰子卯不樂紂以甲子死桀以乙夘日亡王者謂之疾日不以舉樂為吉事所以自戒懼知悼子在堂其為子夘也大矣曠也太師也不以詔是以飲之也爾飲調何也曰調也君之䙝臣也為一飲一食忘君之疾是以飲之也言調飲酒食䙝嬖也近臣亦當䂓君疾憂爾飲何也曰蕢宰夫也非刀匕是供又敢與知防是以飲之也又玉藻曰君子之飲酒也受一爵而色洒如也洒如肅敬貎二爵而言言斯言言和敬也禮已三爵而油油油油説敬也以退禮飲過三爵則敬殺可以去矣又樂記曰夫豢豕為酒非以為禍也而獄訟益繁則酒之流生禍也是故先生因為酒禮一獻之禮賔主百拜終日飲酒而不得醉焉此先王所以備酒禍也又坊記曰子云觴酒豆肉讓而受惡民猶犯齒左𫝊莊公二十二年曰陳公子完奔齊桓公使為正卿辭使為工正飲桓公酒樂公曰以火繼之辭曰臣卜其晝未卜其夜不敢君子曰酒以成禮不繼以淫義也夜飲為滛樂也以君成禮弗納於滛仁也左𫝊宣公曰晉侯飲趙盾酒伏甲將攻之其右提彌明知之右君右登曰臣侍君宴過三爵非禮也遂扶以下又成公下曰鄢陵之戰楚王召子反謀榖陽豎獻飲於子反子反醉而不能見榖陽子反内豎王曰天敗楚也夫余不可以待乃宵遁又襄公二十三年曰季武子無適子公彌長而愛悼子欲立之訪於臧紇曰飲我酒吾為子立之季氏飲大夫酒臧紇為客為上賔既獻已獻酒臧孫命北面重席新樽潔之召悼子降逆之大夫皆起臧紇下迎悼子及旅而召公鉏使與之齒季孫失色又昭公十二年曰晉侯以齊侯宴中行穆子相穆子荀吳投壺晉侯先穆子曰有酒如淮有肉如坻淮水名坻山名寡君中此為諸侯師中之齊侯舉矢曰有酒如渑有肉如陵寡人中此與君代興代更也亦中之又哀公下曰齊子我夕夕視事陳逆殺人逢之遂執以入陳氏方睦使疾而遺之潘沐備酒肉焉使詐病内潘沐并得内酒肉潘米汁可以沐頭饗守囚者醉而殺之而逃又曰衛侯占夢嬖人以能占夢見愛求酒於大叔僖子僖子太叔遺不得與卜人比而告曰君有大臣在西南隅弗去懼害記占卜夢而言乃逐太叔遺遺奔晋毛詩國風曰十月穫稻為此春酒以介眉壽又小雅魚藻曰王在在鎬豈樂飲酒又小雅曰伐木許許釃酒有藇又曰有酒湑我無酒酤我尚書酒誥曰乃穆考文王肇國在西土厥誥毖庶邦庶士越少正御事朝夕曰祀兹酒惟天降命肇我民惟元祀天降威我民用大亂䘮徳亦罔非酒惟行越小大邦用䘮亦罔非酒惟辜文王誥教小子有正有事無彛酒越庶國飲惟祀徳將無罪自成湯咸至于帝乙成王畏相惟御事厥棐有恭不敢自暇自逸矧曰其敢崇飲厥或誥曰羣飲汝勿佚盡執拘以歸于周予其殺論語曰惟酒無量不及亂沽酒市脯不食禮記外𫝊曰五齊三酒皆供祭祀之用五齊尊而三酒卑所以明齊者酒人和合之分劑之名也一曰泛齊二曰醴齊三曰盎齊一名醆酒四曰醍齊五曰陳齊一名澄齊三酒者列於堂下臣下相酌酬酢之用一曰事酒一名醳酒新成者酌飲有事二日昔酒三曰清酒史記曰秦穆公亡善馬岐下野人共得而食之者三百餘人逐得欲法之公曰君子不以畜害人吾聞食善肉不飲酒傷人乃皆賜酒而赦之又曰髙帝除秦苛法為簡易羣臣飲酒爭功帝患之叔孫通知上益厭也説上願與諸弟子共起朝儀漢七年長樂宫成羣臣皆朝十月復置法酒諸將侍坐殿上皆叙以尊卑次坐起上壽觴九行謁者言罷酒御史執法舉不如儀者輙引去竟朝置酒無敢失禮者髙帝乃曰吾今日知為皇帝之貴也又曰沛公先入闗屯㶚上項羽至沛公左司馬曹無傷使人言於項羽曰沛公欲王闗中羽大怒欲擊之沛公因項伯見羽羽留沛公飲項王項伯東向坐亞父南向坐亞父者范増也沛公北向坐張良西向侍増數目項王舉所佩玉玦示之三項王黙然項莊入以劔舞欲因擊沛公張良至軍門見樊噲曰甚急今項莊㧞劔噲擁盾入軍門交㦸之衛士欲止不内噲側其盾以撞衛士仆地噲遂披帷西向而立瞋目視項王按劍而跽曰客何為者良曰沛公􅆖乗樊噲也王曰壯士賜之巵酒與斗巵酒樊噲飲之王曰賜之彘肩則有一生彘肩噲覆盾於地㧞劔切而㗖之王曰壯士復能飲乎曰臣死且不避巵酒焉足辭又曰曹參代蕭何為相惟遵何約束日夜飲醇酒卿大夫及賔客見參不事事皆欲言至者參輙飲醉之終莫得言丞相舎後園近吏舎吏舎日飲歌呼従吏惡之無如之何乃請參逰園中聞吏醉歌呼従吏請按之參乃取酒張坐飲亦歌呼又曰髙祖過沛置酒自擊筑為歌使沛子弟佐酒又曰髙后與諸吕劉氏大臣宴飲令朱虚侯為酒吏章曰臣將種也請以軍法行酒后可之酒酣諸吕有一人醉亡酒章追斬之后與左右皆大驚也漢書曰酒者天之美禄帝王所以頤養天下享祀祈福扶衰養疾百福之會又曰百末㫖酒百華之末酒也布蘭生芬芳布列若蘭之生也又曰于定國飲酒至石不亂益精明又曰陳遵字孟公每大飲賔客閉門取脂轄投井雖有急終不得去三輔決録曰張讓專權孟佗以蒲陶酒一斗遺之拜佗為涼州刺史後漢書曰光武詔馮異歸家上冡使大中大夫齎牛酒令二百里内太守都尉已下及宗族㑹焉又曰㓂恂數與鄧禹謀議禹竒之因以酒交歡又曰呂恭兄弟俱為諸儒所稱學士争歸之太尉趙僖慕其志每歳時遣子問以酒糧皆辭不受問遺也又曰汝南太守歐陽歙請郅惲為功曹汝南舊俗十月饗㑹百里内縣皆賫牛酒到府讌飲時臨享禮訖歙教曰西部督郵繇延天資忠真稟性公方摧破奸凶不嚴而理今與衆儒共論延公顯之於朝太守敬嘉厥休牛酒養徳主簿讀書教户曹引延受賜惲於坐下愀然前曰司正舉觥以君之罪告謝於天按延朋黨搆姦罔上害人所在荒亂怨慝並作明府以惡為善股肱以直從曲此既無君又復無臣惲敢再拜奉觥歙色慙動不知所言門下掾鄭敬進曰君明臣直功曹言切明府徳也可無受觥哉歙意少觧曰實歙罪也敬奉觥又曰張酺雖在公位而父常居田里酺每有遷職輙一詣京師嘗来候酺適會歳節公卿朝罷俱詣府奉酒上壽極歡飲衆人皆慶美之及父卒既塟詔遣使賫牛酒為釋服又曰大將軍袁紹總兵冀州遣使要鄭𤣥大會賔客𤣥最後至乃延升上坐身長八尺飲酒一斛秀眉明目容儀温偉魏志曰徐晃破蜀師振旅還摩陂太祖迎晃七里置酒大會太祖舉巵酒奉晃且勞之曰全樊襄陽將軍之功也又曰呂布騎將侯成遣客牧馬十五疋客悉驅馬去向沛城欲歸先主成自將兵逐之悉得馬還諸將合禮賀成成釀五六斛酒獵得十餘猪未飲食先將半猪五斗酒自入詣布前跪言䝉將軍恩逐得所失馬將来相賀自醸少酒獵得猪未敢飲食先奉上微意又曰邴原初辭家求學原舊性能飲酒自行之後八九年間酒不向口單歩負笈苦身持力至陳留則師韓子助潁川則宗陳仲弓汝南則交范孟博涿郡則親盧士幹臨别師友以原不飲酒會米肉送原原曰本能飲酒但以荒思廢業故斷之耳今當遠别因見貺餞可以讌飲於是坐飲終日不醉太平御覽巻八百四十三
