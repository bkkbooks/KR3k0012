body:
  text: 太平御覽卷七百八十八宋李昉等撰四夷部九南蠻四頓遜國毗騫國丹丹國東謝西趙蠻南平蠻羅刹國投和國附國邊斗四國殊柰國甘堂國金利毗逝國堕和羅國陁洹國堕婆登國多蔑國多摩國哥羅舍分國杜薄國鳥篤國薄剌國頓遜國南史曰頓遜國在海﨑山上地方千里城去海十里有五王並覊屬扶南頓遜之東界通交州諸賈人其西界接天竺安息徼外諸國徃還交易其市東西交㑹日有萬餘人珍物寶貨無所不有唐書曰頓遜國出霍香挿枝便生葉如都梁以製衣國有區機等花十餘種冬夏不衰日載十車貨之其花燥更芬馥赤米為粉以傅身焉南州異物志曰頓遜去扶南三千餘里本為别國扶南先王范蔓有勇略討服之今屬扶南竺芝扶南記曰頓遜國屬扶南國主名崑崙國有天竺胡五百家兩佛圖天竺婆羅門千餘人頓遜敬奉其道嫁女與之故多不去唯讀天神經以香花自洗精進不捨晝夜疾困便發願鳥塟歌舞送之邑外有鳥啄食餘骨作灰甖盛沉海鳥若不食乃籃盛火塟者投火餘灰函盛埋之祭祠無年限有酒樹有似安石榴取花與汁停甕中數日乃成酒美而醉人毗騫國南史曰毗騫國俗有室屋衣服噉粳米其人言語小異扶南國内不受估客有往者殺而噉之是以商旅不敢至王常樓居不血食不事鬼神其子孫生死如常人唯王不死扶南王數使與書相報答常遺扶南王純金五十人食器形如圓盤又如瓦塸名為多羅受五升又如碗者受一升南史記曰毗騫國去扶南八千里在海中國王身長三丈頸長三尺自古以来不死王神聖知未然之事亦有子孫子孫生死如常人唯此王不死耳號曰長頸王食器皆純金金如此間之石無缺限也不聽妄取有偷者知則殺食之長頸王亦能作天竺書自道宿命所經與佛語相似作書可三千言皆道是事如國有犯罪者共在王前食之平常不噉人也丹丹國梁書曰丹丹國中大通二年其王遣使奉表送象牙及畫塔二軀并獻火齊珠古貝雜香藥大同元年復遣使獻金銀琉璃雜寶香藥等物隋書曰丹丹國在多羅摩羅國西北振州東南振州今延德郡朱崖同島山上王姓刹利名尸陵伽理所可二萬餘家亦置州縣以相統領王每晨夕二時臨朝其大臣八人號曰八座並以婆羅門為之王身衣朝霞足履皮屨近則乗輿逺則馭象其攻伐則吹蠡撃鼔兼有幡旗刑盗賊無多少皆殺之土出金銀白檀蘇方檳榔其糓唯稻畜有沙牛羖羊猪鷄鵞鴨麞鹿鳥有越鳥孔雀果蓏力果切有蒲桃石榴􅆶瓠菱蓮菜有葱蒜蔓菁東謝唐書曰東謝蠻其地在黔州之西數百里内南接守宫獠西連夷子北至蠻土宜五榖不以牛耕但為畬田每嵗一易俗無文字刻木為契散在山洞間依樹為層巢而居汲飲皆自營生業無賦稅之事謁見貴人皆執鞭而拜有功勞者以牛馬銅鼔賞之有犯罪者小事杖罰大事殺之盗物倍還其􅂍婚姻之禮以牛酒為聘女歸夫家皆母自送之女夫慙逃避經旬乃出讌聚則撃銅鼔吹大角歌舞以為樂好帶刀劒未嘗捨離丈夫衣服有衫襖大口袴以綿紬及布為之右肩上斜束皮帶裝以螺殻虎豹猿狖及犬羊之皮以為外飾坐皆蹲踞男女椎髻以緋向後垂下其首領謝元深既世為酋長其部落皆尊畏之謝氏一族法不育女自云姓髙不可下嫁故也貞觀三年元深入朝冠烏熊皮冠若今之旄頭以金銀絡額身披毛帔韋皮行縢而着履中書侍郎顔師古奏言昔周武時天下太平逺國歸欵周史乃集其事為王㑹篇令萬國来朝至今如此軰章服實可圖冩今請撰為王㑹圖從之以其地為應州仍拜元深為刺史領黔州都督府又曰南謝首領謝强與西隣謝元深俱来朝見為南夀州刺史後改為莊州貞元十三年正月西南畨大酋長蠻州刺史資陽郡開國公宋鼎卭州刺史謝汕音訕蠻州巴江縣令宋乃𫝊牂州録事參軍謝文經黔中經略招討觀察王礎奏前􅟢刺史三年一度朝今年懇訴稱州接牂牁同被聲教獨此排擯竊自慚耻謹遣隨牂牁刺史授官其牂牁兩州户口殷盛人力强大隣側諸蕃悉皆敬憚請比兩州每年一度朝賀仍依牂牁輪環差定并以才幹位望為衆推者充𠡠從之西趙蠻唐書曰西趙蠻在東謝之南其界東至夷子西至昆明南至西洱河洱音珥山洞阻深莫知道里南北十八日行東西二十三日行其風俗物産與東謝同首領趙氏世為酋長有户萬餘貞觀三年遣使入朝二十一年以其地置明州即以首領趙磨為刺史南平蠻唐書曰南平蠻北與涪州接部落四千餘户男子左袵露髪徒跣婦人横布兩幅穿中而貫其首名為通裙其人美髪為髻髾垂於後以竹筒如筆長三四寸斜貫其耳貴者亦有珠璫土多女少男為婚之法女氏必先貨求男族貧人無嫁資又多賣與富人為婢俗皆婦人執役其王姓朱氏號為劒荔王貞觀中遣使内附以其地𨽻渝州羅刹國隋書曰羅刹國在婆利之東其人極陋朱髪黑身獸牙鷹爪時與林邑人作市輒以夜晝日則掩其面煬帝大業三年使常駿等使赤土國至羅刹焉投和國隋書曰投和國在南海大洲真臈之南自廣州西南水行百日至其國王姓投和羅名脯邪乞遥理數城覆屋以瓦並為閤而居屋壁皆以綵畫之城内皆王室城外人居可萬餘家王宿衛之士百餘人每臨朝則衣朝霞冠金冠耳挂金環頸挂金涎衣涎叙連切足履寶装皮履官屬有朝請將軍緫知國政又有參軍功曹主簿城局金威將軍賛理賛府等官分理文武又有州及郡縣州有參軍郡有金威將軍縣有城局焉其長官初至各選官僚助理政事刑法盗賊重者死輕者穿耳及頰私鑄銀錢者截腕國無賦稅俱隨意貢奉無多少之限多以農商為業國人乗象及馬一國之中馬不過千匹又無鞍轡唯以䋲穿頰為之節制音樂則吹蠡撃鼔死喪則祠祀哭泣又焚屍以甖盛之沉於水中若父母之喪則截髪為孝其國市六所貿易皆用銀錢小如榆莢有佛道有學校文字與中夏不同訊其耆老云王無姓名齊杖摩王所坐塔圓似佛塔以金飾之門皆東向坐亦東向唐書曰貞觀中投和國遣使奉表以金函盛之又獻金榼若盍及金鎻寶帶犀象海物等數十品附國隋書曰附國者蜀郡西北二千餘里即漢之西南夷也有嘉良夷即其東部所居種姓自相率領土俗與附國同言語少殊不相統一其人無姓氏附國王字宜繒其國南北八百里西千五百里無城柵近川谷傍山險俗好復讎故疊石而居以避其患髙至十餘丈下至五六丈每級丈餘以木隔之基方三四步其上方二三步狀似浮圖於下級開小門從内上通夜必闗閉以防賊盗國有二萬家號令自王出嘉良夷政令繋之酋帥重罪者死輕罪者罰牛人皆輕捷撃劒漆皮為牟甲弓長六尺以竹為弦妻其羣母及其嫂兒弟死父兄亦納其妻好歌舞鼓簧吹長笛有死者無服制置屍髙牀之上沐浴衣服被以牟甲覆以獸皮子孫不哭帶甲舞劒而呼云我父為鬼所取我欲報寃殺鬼自餘親戚三聲而止婦人哭必以兩手掩面死家殺牛親屬以猪酒相遺共飲噉而瘞之死後十日而大塟必集親賓殺馬動至十數匹立其祖父神而事之其俗以皮為㡌形圓如鉢或戴羃䍦衣多毛毼皮裘剥牛脚皮為靴項繫鐵鎻手貫鐵釧王與酋帥金首飾胸前懸一金花徑三寸其土髙氣候凉多風少雨土宜小麥青􅀈山出銀多白雉水有嘉魚長四尺而鱗細大業四年其王遣使素福等八人入朝明年又遣其弟子宜林率嘉良夷六十人朝貢欲獻良馬以路險不通請開山道脩職貢煬帝以勞人不許嘉良有水濶六七十丈附國有水濶百餘丈並南流用皮為舟而濟邊斗四國隋書曰邊斗國一云班斗都昆國一作都推拘利國一作九稚比嵩國並扶南度金陵大灣南行三千里有此四國其農作與金陵同其人多白色都昆出好棧香藿香及琉黄其藿香樹生千嵗根本甚大伐之四五年木皆朽敗唯中節堅真芬香獨存取為香殊柰國唐書曰貞觀二年殊柰國遣使貢方物殊柰者崐崙人也在林邑南去交阯海行三月餘日俗習文字與婆羅門同路絶逺古未嘗朝中國至是始通甘堂國唐書曰甘堂國在大海之南崑崙人也貞觀十年與未俱婆國同日朝貢太宗謂侍臣曰南夷西域自逺而至其故何也房𤣥齡對曰當中國乂安帝德逺被也太宗曰誠如公言向使中國不安何縁而至朕何德以堪之金毗利逝國唐書曰金毗利逝國在京西南四萬餘里東去致物國二千里西去赤土國一千五百里南去波利國三千里栁衢國三千里其國有城邑庭舍衣朝霞白疊每食先泥上鋪席而後座國王名本多揚牙前有隊仗甲鍪具多樹皮其風俗物産與真臘同墮和羅國唐書曰墮和羅國南與盤盤國北與迦邏舍佛東與真臘接西隣大海去髙州五月日行貞觀十三年其王遣使貢方物二十三年又遣使獻象牙火珠請賜好馬詔許之陁洹國唐書曰陁洹國在林邑西南大海中東南與墮和羅接去交阯三月餘行賓服於墮和羅其王姓察失利字婆郍土無蠶桑以白疊朝霞布為衣俗皆樓居謂為䦨干貞觀十八年遣使来朝二十一年又遣使獻白鸚鵡毛羽皓素頭上有紅毛數十莖與翅齊及婆律膏仍請馬及銅鍾詔並給之墮婆登國唐書曰墮婆登國在林邑南海行二月東與訶陵西與迷黎車接北界大海風俗與訶陵同種稻每月一熟有文字書於貝多葉其死者口實以金又以金釧貫於四肢然後加以婆律膏及檀沉龍腦等香積薪以焚之貞觀中遣使獻金花等物王之所居堅木為城造大屋重閣覆以㯶櫚皮所坐床悉以象牙為之亦以象牙為席食以手檈之音古患切又以椰樹花為酒飲之亦醉有山穴海湧而出鹽國人收食其國人有毒與常人同止宿即令身生瘡與之交㑹便死若涎液霑著草木即枯其人死身不臭不爛多蔑國唐書曰多蔑國貞觀時通焉在南海外界週廻可一月行南阻大海西但逰國北波利日國東貞陁桓國户口極多置三十州不役屬他國有城郭宫殿樓櫓並用瓦木以十二月為嵗首其物産有金銀鐡象牙犀角朝霞朝雲等布其俗交易用金銀朝霞等為賈百姓二十而稅一五榖菜蔬與中國不殊多摩國唐書曰多摩國長居國長居於海島東與婆鳳西與多隆南與半犮䟦華言五山也北與訶陵等國接其國界東西可一月行南北可二十五日行其王之先龍子也名骨利骨利得大鳥卵剖之得一女子容色殊妙即以為妻其王尸羅劬傭伊說即其後也顯慶中遣使貢獻其俗無姓王居以栅為城以板為屋坐師子座東向衣物與林邑同勝兵三萬人無馬有弓刀甲矟婚姻無同姓之别其食器有銅鐡金銀所食尚酥乳駱沙糖石蜜其家畜有羖水牛野獸有麞鹿等死亡無喪紀之制以火焚其屍其音樂略同天竺有波郍婆宅䕶遮奄磨石榴等菓多甘蔗從其國經薩盧都思訶盧君那盧林邑等國達於交州哥羅舍分國唐書曰哥羅舍分國在南海之南接墮和羅勝兵二萬人其王蒲越伽摩顯慶五年遣使朝貢杜薄國唐書曰杜薄國在扶南東漲海中直渡海數十日至其人色白晢皆有衣服國有稻田女子作白疊華布出金銀鐡以金為錢出鷄舌香可含以香不入服鷄舌其為木也氣辛而性厲禽獸不能至故未有識其樹者華熟自零隨水而出方得之杜薄洲有十餘國城皆稱王烏篤國唐書曰烏篤國在中天竺南一名烏伏邦地方五千餘里百姓殷實人性懦弱頗詭詐尤工禁術篤信佛法文字禮儀畧同天竺自古不通中國貞觀中其王逹摩因陀訶斯遣使獻龍腦香薄刺洲唐書曰薄刺洲隋時聞焉在拘利南海蠻中其人色黑而齒白眼正赤男女並無衣服一名㪍焚洲抱朴子云㪍焚洲在南海中薰緑水膠所出膠如楓脂所以不可多得者止患狤􅠝音吉屈獸啖人此獸大者重十斤狀如水獺其身頭及他處了無毛唯從鼻上以竟脊至尾上有毛廣一寸許青毛長三四分許其無毛處則如􅅊囊人張捕得之斬刺不傷積薪烈火縳以投火中薪盡而此獸不焦須以大竹杖打之皮不傷而骨碎都盡而死太平御覽卷七百八十八
