  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_551-1a, image: WYG0898/WYG0898-0117a.png}
body:
  text: 太平御覽卷五百五十一宋李昉等撰禮儀部三十棺周易繫辭曰古之葬者厚衣之以薪葬之中野不封不樹䘮期無數後世聖人易之以棺槨葢取諸大過也周禮春官䘮記曰及祖飾棺乃載遂御凡卿大夫之䘮掌事而斂飾棺禮記檀弓上曰有虞氏瓦棺始不用薪者虞氏上陶夏后氏堲周火熟曰堲燒土治冶以周于棺殷人棺槨槨大也以木為之言椁大于棺殷人上質周人牆置翣牆柳木也凡此言後王之制文也周人以殷人之棺椁葬長殤以夏后氏之堲周葬中殤下殤以虞氏之瓦棺葬無服之殤畧未成人禮記檀弓上曰有子曰夫子制於中都四寸之棺五寸之槨以斯知子不欲速朽也中都魯邑名孔子嘗為之宰為民作此制禮記檀弓上曰天子之棺四重尚深􅃉也諸公三重諸侯再重大夫一重士不重水兕革棺被之其厚三寸以水牛兕牛之革為棺被革各厚三寸合六寸也此為一重也杝棺一所謂椑棺也爾雅曰椵杝梓棺二所謂屬與大棺四者皆周周匝也棺束縮二衡三袵每束一衡亦當為衡袵令小要也栢槨以端長六尺以端題湊也其方葢一尺也禮記檀弓下曰天子崩虞人致百祀之木可以為棺槨者斬之掌山澤之官百祀畿内百縣之祀以為棺槨所成也禮記檀弓上后木曰䘮吾聞諸縣子曰夫䘮不可不深長思也后木者魯孝公子惠伯鞏之後買棺外内易我死則亦然禮記檀弓下曰陳乾昔寢疾屬其兄弟而命其子遵已曰如我死則必大為我棺使吾二婢子夾我婢子妾也陳乾昔死其子曰以殉葬非禮也况又同棺乎弗果殺善尊巳不陷父于不義也禮記䘮大記曰君大棺八寸屬六寸禆四寸上大夫大棺八寸屬六寸下大夫大棺六寸屬四寸士六寸大棺棺之在表君裏棺用朱緑用雜金鐕大夫裏棺用𤣥綠用牛骨鐕士不緑鐕所以琢著裏也君葢用漆三袵三束用漆者合牡牝中也袵小異君大夫鬊爪實于緑中士埋之緑當為角聲之誤角即謂棺之内也禮記外傳曰凡棺之重數從内數向外如席之重也兕革棺一棺三寸内一重有水牛皮次兕皮三者各為一重都厚六寸一名椑棺又名櫬椑者堅如壁櫬者親于身也杝棺二厚八寸杝曰椵木在椑棺之外屬棺三其厚四寸屬者施杝外棺大棺四厚六寸屬棺外也之屬棺大棺皆用梓也上公用水牛皮兕皮外有三重也侯伯已下去水兕杝棺外三重卿大夫唯屬棺與大棺一重士不言重唯棺而已左傳宣上曰鄭人討幽公之亂斵子家之棺以四年殺君故也斵薄其棺不使從卿禮左傳成上曰宋文公葬槨有四阿棺有翰檜杜預注曰翰旁飾檜上飾王禮左傳襄上曰齊姜薨初穆姜使擇美檟檟梓之屬以自為櫬與頌琴櫬棺也頌琴琴名猶言雅琴也皆欲以進納季文子取以葬君子曰非禮也禮無所逆婦養姑者也虧姑以成婦逆莫大焉穆姜成公母齊姜成公婦也左傳襄上曰定姒薨不殯于廟無櫬不虞櫬親身棺也季孫以定姒本賤既無備器議其䘮制欲殯不過廟又不及哭也匠慶謂季文子曰子為上卿而小君之䘮不成不終君也慢其母事不終事君之孝也君長誰受其咎初季孫為己樹六檟于蒲圃東門之外蒲圃塲圃名也匠慶請木季孫曰略匠慶用蒲圃之檟季孫不禦禦止也左傳哀上曰趙簡子與鄭戰簡子誓曰志父無辜君實圖之若其有辜絞縊以戮桐棺三寸不設屬辟屬辟棺之重數王棺四重君再重大夫一重素車樸馬以載駕無入于兆兆葬域下卿之罰也公羊傳定公曰國君薨正棺于兩楹之間然後即位論語先進曰顔淵死顔路請子之車以為之椁欲得賣之以為顔淵作椁也顔路顔淵之父子曰才不才亦各言其子也鯉也死有棺而無椁吾不徒行以為之椁以吾從大夫之後不可徒行也鯉孔子之子伯魚也家語曰孔子之徒公西赤掌殯葬焉桐棺四寸栢椁五寸家語曰墨子葬法棺三寸足以朽骨衣三領足以朽肉掘地之深下無漏氣發洩于上襲之以明其所止也説文曰棺闗也可以掩屍櫬附身棺也櫃匱也槥櫝也史記曰飛亷生惡來俱以材力事紂武王伐紂并殺惡來時飛亷為紂使北方還無所報為壇霍泰山而得石棺銘曰天令處父與亂賜汝石棺死遂葬霍泰山古史考曰堯作瓦棺湯作木棺漢書曰髙祖下令士卒從軍死者為槥服䖍曰槥音惠應劭曰小棺也今謂之櫝歸其縣縣給衣衾棺椁葬具致其尸于家縣官吏給衣衾斂祠以少牢吏親葬漢書張湯自殺昆弟欲厚葬湯母曰為大臣被惡言死何厚葬為載以牛車有棺無椁上聞曰非此母不生此子漢書曰哀帝崩有司奏賢乃自殺死後其父恭等不悔過乃復以畫棺作五采之色左蒼龍右白虎著金銀日月玉衣珠璧至尊無以加漢書曰王莽奏貶下傅太后號改葬發取璽綬太后以為既往之事不須發莽固爭之太后詔曰因改棺為致椁作塜葬既開傅太后棺聲聞數里續漢書禮儀志曰王公主貴人皆樟棺朱漆畫雲氣公特進樟棺黒漆續漢書曰楊震數切諌為樊豐等所譖遣歸本郡震行至城西夕陽亭謂諸子門人曰身死之日以雜木為棺單衣被裁足葢形無歸塜次設祭祀因飲酖以卒續漢書曰曹褒在射聲營舍有停棺椁不葬者百餘所褒親自履行愴然為買空地悉葬其無主者續漢書曰周盤字伯堅年七十三歲朝集諸生講論終日因令其子曰吾日者夢見先師東里先生與我講于陰堂之奥而長歎豈吾齒之盡乎命終之日桐棺足以周身外椁足以周棺斂形懸封濯衣幅巾編四寸簡寫堯典一篇并刀筆各以置棺前示不忘聖道其月望無病忽終學者以為知命東觀漢記曰郭鳳字君張善説灾異吉凶應病先自知死日豫令弟子市棺斂具至其日如言卒東觀漢記曰耿秉薨賜朱棺玉衣東觀漢記曰梁商薨賜東園朱壽器銀縷玉匣東觀漢記曰長沙有義士古初遭父䘮未葬隣人火起至初舍棺不可移初冐火伏棺上㑹火滅東觀漢記曰大司徒歐陽歙坐在汝南贓罪死獄中歙掾陳元上書追訟之言甚切至帝乃賜棺木贈印賻三千匹謝承漢書曰徐翊為長沙郡將死遺令不受贈賻一匹私馬賣以為棺謝承後漢書曰和帝追封太后父梁松為褒親愍侯改殯賜東園畫棺玉匣衣衾魏志曰李霍等葬董卓于郿并收所焚之屍之灰合斂于棺而葬之是日大風暴雨霆震卓墓水入藏漂其棺木魏志曰宣王討王陵赦罪陵自知罪重試索棺釘以觀太傅意竟給之遂自殺曹操别傳曰操破梁孝王棺收金寶天子聞哀泣晉書曰夏侯湛將殁遺命小棺薄歛不脩封樹論者謂湛雖生不砥礪名節死則儉約令終是深達存亡之理也後魏書曰崔光韶謂子孫曰吾兄弟自幼及老衣服飲食未嘗一日不同弟頃横禍權作松棺亦可為我作松棺使我見之搜神記曰不其縣有孤竹城孤竹君之國也靈帝光和元年遼水中有浮棺人破斫之棺中人語曰我伯夷之弟孤竹君也海水壊我棺椁是以漂流汝斫我何為乃不敢破因為立祠民有欲發視者無病而死搜神記曰北海有道人能令人與死人相見其同郡人婦死已數年聞而往見之曰願令一見死婦死不恨矣道人曰可然聞鼓聲疾出俄而得見之與婦言語悲喜恩情如生良久聞鼓音恨不能得住壻當走岀户時忽掩其衣裾户間掣絶而去後數歳餘此人死家葬之開塜見婦棺葢下裾恨力尚反異苑曰海陵如臯縣東城村邊海岸崩壊一古墓有方頭漆棺以朱題上云百七年墮水元嘉二十載三月墜于懸巘巴蜀志曰獠夷死即立埋棺不卧設盛𢎞之荆州記曰冠軍縣東一里有張詹墓魏太和時人也刻碑背曰白楸之棺易朽之裳銅錢不入瓦器不藏嗟爾後人幸勿我傷自胡石之亂墳墓莫不夷毁此墓元嘉初猶儼然六年大水民飢始被發初開金銀銅錫之器爛然畢備有三朱漆棺椁棺椁前薄簾金釘釘之永嘉郡既曰樂城縣石堂水口先時有一漆棺逆水唐書曰𤣥宗開元二十年自東都幸太原至太行坂路隘逢椑車問左右曰車中何物左右奏曰禮天子出則載椑車以從先王之制也上曰焉用此命焚之無椑自此始也莊子曰古之䘮禮貴賤有儀上下有等天子棺椁七重諸侯五重大夫三重士再重墨子獨生不歌死不服桐棺三寸而無椁以為法式慎子曰匠人成棺椁而無憎於人利在人死也吕氏春秋曰善棺椁所以備螻蟻也今世俗大亂人生踰侈非為死者慮亦所以相矜淮南子曰吾生有七尺之形死有一棺之土淮南子曰鬻棺者欲民之疾疫也蓄粟者欲歲之荒饑也鹽鐵論曰古者瓦棺堲周足以收形骸髪齒而已及其後桐棺依不桑棺不留今富者䋠􅀈墻凑中者梓棺楩椁貧者繒囊緹囊風俗通曰葉令王喬天下一玉棺於㕔事前令臣吏試入終不揺喬曰天帝獨欲召我沐浴服飾寢其中葢便立覆宿葬於城東縣牛皆流汗風土記曰陽羡縣令袁起生有神靈無疾暴亡殯歛已竟風雷㝠晦夫起䘮柩上下居民夜聞山下有數十人晨往山上見起棺柩俄而潛藏唯有石塜石壇今在神仙傳曰介象為吳主所徴至武昌連求去不許象言病帝使左右以美梨一奩賜象須臾象死帝殯而埋之以日中時死日晡時到建業以所賜梨付守苑吏後吏以狀聞即發象棺棺中無所有有奏符太平御覽卷五百五十一
