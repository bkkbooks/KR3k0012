body:
  text: 太平御覽巻一百三十三宋李昉等撰偏霸部十七梁蕭方智後梁蕭詧蕭巋蕭琮陳陳霸先梁肅方智梁書曰敬帝諱方智字慧相小字法真世祖第九子也太清三年封興梁侯承聖元年封晉安郡王二年出為平南將軍江州刺史三年十一月江陵陷太尉揚州刺史王僧辯司空南徐州刺史陳霸先定議以帝為太宰承制奉迎還京師四年二月至自尋陽入居朝堂以太尉王僧辯為中書監録尚書驃騎將軍都督中外諸軍事加司空陳霸先班劒二十人三月齊遣其上黨王高渙送貞陽侯蕭淵明來至東關帝遣吳興太守裴之横與戰敗績之横死王僧辯率衆出屯姑熟七月王僧辯納貞陽侯蕭淵明自采石濟江入於京師以帝為皇太子九月司空陳霸先舉義兵襲殺王僧辯黜蕭淵明丙午帝即皇帝位十月詔改承聖四年為紹泰元年大赦以貞陽侯淵明為司徒封建安郡公以司空陳霸先為尚書令尊母夏貴妃為皇太后立妃王氏為皇后太平元年正月大赦四月齊軍水步入丹陽縣至秣陵故治六月齊潛軍至蔣山北至𤣥武湖司空陳霸先授衆軍節度大破之七月陳霸先進位司徒九月改元大赦除司徒陳霸先為丞相録尚書事二年四月齊遣使請和八月加丞相黄鉞領太傅劒履上殿九月為相國總百揆封十郡為陳公備九錫之禮十月禪位於陳奉帝為江隂王薨於外邸時年十六追諡敬皇帝史臣曰梁季横潰喪亂屢臻當此之時天厯去矣敬皇高讓將同釋負焉後梁蕭詧梁書曰後梁宣帝諱詧昭明太子第三子也封岳陽王授雍州刺史孝元被西魏所害詧遂為魏附庸稱大定元年以蔡大寳為相時人比昭烈遇孔明詧性不好酒尤惡見婦人酷信佛法謂尚書宋如周曰卿何謗經如周踧踖自陳懼而出以告大寳寳曰卿當不謗餘經不信法華耳如周乃悟經云隨喜面不狹長如周面狹且長故戲之耳詧居處殘毁干戈日用在位八年憤惋而殂年四十子巋立蕭巋梁書曰明帝諱巋宣帝第三子也聰明有器識大定元年為太子宣帝崩太子即位號天保元年十五年周武帝平北齊得傳國璽巋入周賀武帝大㑹羣臣及諸藩客周武自彈琵琶令故齊主高緯起舞達摩及故安徳王延宗悲不自勝緯舞訖勸巋巋乃起舞周武曰梁主乃能為朕舞乎巋曰陛下既自彈五絃臣何敢不同百獸周武大恱周武指齊氏故臣北列長艾謂巋曰是登陴罵朕者巋曰長艾未能抱樂翻敢吠堯周武大笑初雖禮接巋未深知之至是巋承間乃陳父荷太祖拯救之恩并敘二國艱虞唇齒犄角之事辭理辯暢因涕泗交流周武亦為歔欷自是禮遇日深賜雜繒百段馬五匹并賜齊宫伎女遣歸國執巋手曰待破突厥必送梁王歸江東巋途經古跡莫不駐馬賦詩以敘其懐至於江陵凡三十首女為秦晉王廣妃在位十四年而殂蕭琮梁書曰琮明帝太子也既立赦其封内改元寛運琮性廣仁有大度博學有文義兼善弓馬明年隋文徴琮入朝琮率其臣二百餘人朝於長安羣臣辭於送客堂琮下馬執別莫不殞涕既至隋文帝留之使崔𢎞度將兵攻江陵江陵不守於是國廢陳陳霸先陳書曰高祖武皇帝諱霸先字興國小字法生吳興長城下若里人漢太丘長陳寔之後也世居潁川寔𤣥孫準晉太尉準生匡匡生達永嘉南遷為丞相掾厯太子洗馬出為長城令恱其山水遂家焉嘗謂所親曰此地山川秀麗當有王者興二百年後我子孫必鍾斯運高祖以梁天監二年癸未歳生少倜儻有大志不治生産既長讀兵書多武藝明達果斷為當時所推服嘗遊義興館於許氏夜夢天開數丈有四人朱衣捧日而至令高祖開口納焉及覺腹中猶熱高祖心獨負之大同初新喻侯蕭暎為吳興太守甚重高祖謂僚佐曰此人方將逺大及暎為廣州刺史高祖為中兵參軍隨之鎮暎令高祖招集士馬衆至千人仍命高祖監宋隆郡所部安化二縣軍反高祖討平之尋監西江督䕶高安郡守先是武林侯蕭諮為交州刺史以苛刻失衆心土人李賁連結數州豪傑同時反臺遣高州刺史孫冏新州刺史盧子雄將兵擊之冏等不時而進皆於廣州伏誅子雄弟子略與冏子致及其主帥杜天合杜僧明共舉兵執江南督護沈顗進寇廣州晝夜苦攻州中震恐高祖率精兵三千巻甲兼行以救之頻戰屢㨗天合中流矢死賊衆大潰僧明遂降梁武帝深歎異焉授直閣將軍封新安子邑三百户仍遣畫工圖其像高祖送喪還都至大庾嶺㑹有詔高祖為交州司馬領武平太守與刺史楊㬓南討十一年六月軍至交州賁衆數萬於蘇厯江口立城柵以拒官軍㬓推高祖為前鋒所向摧陷賁走典徹湖於屈獠界立砦大造船艦充塞湖中衆軍憚之頓湖口不敢進夜江水暴起七丈注湖中奔流迅激高祖勒所部兵乗流先進衆軍鼓噪俱前賊衆大潰賁竄入屈獠洞中屈獠斬賁傳首京師是歳太清元年也除振逺將軍江西督護高安太守督七郡諸軍事二年冬侯景寇京師高祖將率兵赴援廣州刺史元景仲隂有異志將圖高祖高祖知其計與成州刺史王懐明行臺選郎殷外臣等密議戒嚴三年七月集義兵於南海馳檄以討景仲景仲窮蹙縊於閣下高祖迎蕭勃鎮廣州十一月高祖遣杜僧明胡穎將二千人頓於嶺上并厚結始興豪傑同謀義舉侯安都張偲等率千餘人來附蕭勃聞之遣鍾休恱說高祖曰侯景驍勇天下無敵前者授軍十萬士馬精强然而莫敢當鋒遂令羯賊得志以君疎外詎可暗投未若且住始興遥張聲勢保此泰山自求多福高祖泣謂休恱曰僕本庸虚蒙國成造往聞侯景渡江即欲赴援今京都覆沒主上蒙塵君辱臣死誰敢愛命君侯體則皇枝任崇方岳不能摧鋒萬里雪此寃痛見遣一軍猶賢乎已乃降後旨使人慨然僕行計決矣慿為披述乃遣使間道往江陵禀承軍期節度湘東王承制授高祖員外散騎常侍持節明威將軍交州刺史改封南野縣伯六月高祖修嶂頭古城徙居焉高州刺史李廷仕據大臯遣主帥杜平虜率千人入贛石魚梁高祖命周文育將兵擊走之廷仕奔寧都承制授高祖通直散騎常侍使持節信威將軍豫州刺史領豫章内史改封長城縣侯尋授散騎常侍使持節都督六郡諸軍事師將軍南江州刺史餘如故時寧都人劉藹等資廷仕舟艦兵仗將襲南康高祖遣杜僧明等率二萬人據白口築城以禦之廷仕亦立城以相對二年二月僧明等攻拔其城生擒廷仕送南康高祖斬之承制命高祖進兵定江州仍授江州刺史餘如故六月高祖發自南康觀者數萬人是時承制遣征東將軍王僧辯督衆軍討侯景八月僧辯軍次湓城高祖率杜僧明等衆軍及南川豪帥合三萬人將㑹焉時西軍乏食高祖先貯軍糧五十萬石至是分三十萬以資之仍頓巴丘㑹侯景廢簡文帝立豫章嗣王棟高祖遣兼長史沈衮奉表於江陵勸進十一月承制授高祖使持節都督㑹稽東陽新安臨海永嘉五郡諸軍事平東將軍揚州刺史領㑹稽太守豫章内史餘並如故三年正月高祖率甲士三萬人强弩五千張舟艦二千乗發自豫章二月次桑落洲遣中記室參軍江元禮以事表江陵承制加高祖鼔吹一部是時僧辯已發湓城㑹高祖於白茅灣乃登岸結壇刑牲盟約進軍次蕪湖侯景棄城走三月高祖與諸軍進尅姑熟仍次蔡州侯景登石頭城觀望形勢意甚不恱謂左右曰此軍上有紫氣不易可當乃以船艘貯石沈塞淮口緣淮作城自石頭迄青溪十餘里中樓雉相接諸將未有所決僧辯遣杜崱問計於高祖高祖曰前栁仲禮數十萬兵隔水而坐韋粲之在青溪竟不渡岸賊乃登高望之表裏俱盡肆其凶虐覆我王師今圍石頭須渡北岸諸將若不能當鋒請先往立柵高祖即於石頭西横隴築柵衆軍次連八城直出東北賊恐西州路斷亦於東北果林作五城以遏大路景率衆萬餘人鐵騎八百餘匹結陣而進乃命諸將分處置兵賊直衝王僧志僧志小縮高祖遣徐度領弩手二千横截其後賊乃却高祖與王琳杜龕等以鐵騎悉力乗之賊退據其柵景儀同盧輝略開石頭北門來降戴晃曹宣等攻破果林一城衆軍又尅其四城賊復還殊死戰又盡奪所得城柵高祖大怒親率攻之士卒騰柵而入賊復散走景與百餘騎棄矟執刀左右衝陣陣不動景衆大潰遂北至西明門景至闕下不敢入臺遣腹心取其二子而遁高祖率衆出廣陵應接㑹景將郭元建奔齊高祖納其部曲三千人而還僧辯啓高祖鎮京口五月齊遣辛術圍嚴超達於秦郡高祖命徐度領兵助其固守齊衆七萬填塹起土山穿地道攻之甚急高祖乃自率萬人解其圍縱兵四面擊齊軍弓弩亂發齊平秦王中流矢死斬首數百級齊人收兵退高祖振旅南歸遣記室參軍劉本仁獻㨗於江陵承制授高祖使持節散騎常侍都督南徐州諸軍事征北大將軍開府儀同三司南徐州刺史餘並如故及王僧辯率衆征陸納於湘州承制命高祖代鎮揚州十一月湘東王即位於江陵改承聖元年明年湘州平高祖旋鎮京口三年三月進高祖司空餘如故十一月西魏攻陷江陵高祖與王僧辯等進啟江州請晉安王以太宰承制又遣長史謝哲奉牋勸進十二月晉安王至自尋陽入居朝堂給高祖班劒二十人四年五月齊送貞陽侯淵明還主社稷王僧辯納之即位改元曰天成以晉安王為皇太子初齊之請納貞陽侯也高祖以為不可遣使詣僧辯苦爭之往返數四僧辯竟不從高祖居常憤恨密謂所親曰武帝雖磐石之宗逺播四海至於尅雪讎恥寧濟艱難唯孝元而已功業懋盛前代未聞我與王公俱受重寄語未絶音聲猶在耳豈期一旦便有異圖嗣主高祖之孫元皇之子海内屬目天下宅心竟有何辜坐致廢黜逺求夷狄假立非次觀其此情亦可知矣乃密具袍數千領及錦綵金銀以為賞賜之具九月壬寅高祖召徐度侯安都周文育等謀之仍部列將士分賞金帛水路俱進是夜發南徐州討王僧辯甲辰高祖步軍至石頭前進遣勇士自城北踰入時僧辯方視事外白有兵俄而兵自内出僧辯遽走與其第三子頠相遇俱出閣左右尚數十人苦戰高祖大兵尋至僧辯衆寡不敵走登城南門樓高祖因風縱火僧辯窮迫乃就擒是夜縊僧辯及子頠庚午貞陽侯遜位百僚奉晉安王上表勸進十月己酉晉安王即位改承聖四年為紹泰元年壬子詔授高祖侍中大都督中外諸軍事車騎將軍揚南徐二州刺史持節司空班劒鼓吹並如故仍詔高祖甲仗百人出入殿省震州刺史杜龕據吳興與義興太守韋載同舉兵反高祖命周文育率衆攻載於義興龕遣其從弟北叟將兵拒戰北叟敗歸義興二年正月癸未誅杜龕於吳興龕從弟北叟司馬沈孝敦並賜死二月庚申高祖遣侯安都周鐵武率舸艦備江州仍頓梁山起柵三月戊戌齊遣水軍儀同蕭軌厙狄伏連堯難宗東方老侍中裴英起東廣州刺史獨孤辟惡洛州刺史李希光并任約徐嗣徽等率衆十萬出柵口向梁山帳内盪主黄叢逆擊敗之燒其前軍船艦齊頓軍保蕪湖高祖遣定州刺史沈泰吳郡太守裴忌就侯安都共據梁山以禦之四月丁巳高祖詣梁山軍巡撫五月甲申齊兵發自蕪湖庚申至秣陵故治高祖遣周文育屯方山徐度頓馬牧杜稜頓大航南己亥高祖率宗室王侯及朝臣將帥於大司馬門外白虎闕下刑牲告天以齊人背約發言慷慨涕泗交流同盟皆莫能仰視士卒觀者益奮辛丑齊軍於秣陵故縣跨淮立橋柵引渡兵馬其夜至方山侯安都周文育徐度等各引兵還京師癸夘齊兵自方山進及兒塘游騎至臺周文育侯安都頓白土崗旗鼓相望都邑震駭高祖潛撤精兵三千配沈泰渡江襲齊行臺趙彦琛於瓜步獲舟艦百餘艘陳粟萬斛六月甲辰齊兵潛至鍾山龍尾丁未進至幕府山高祖命衆軍秣馬蓐食遲明攻之乙夘高祖率帳内麾下出幕府山南吳明徹沈泰等衆軍首尾齊舉縱兵大戰侯安都自白土崗引兵横出其後齊師大潰斬獲數千人相蹂藉而死者不可勝計生執徐嗣宗斬之以狥追奔至於臨沂其江乗攝山鍾山等諸軍相次克㨗七月庚子詔授高祖中書監司徒揚州刺史進爵為公增邑并前五千户并給油幢皂輪車是月侯瑱以江州入附遣侯安都鎮上流定南中諸郡八月癸夘太府卿何敳新州刺史華念各上玉璽一高祖表以送臺詔歸之高祖是日詔高祖食安吉武康二縣合五千戸九月進高祖位丞相録尚書事鎮衞大將軍改刺史為牧進封義興郡公丁未中散大夫王彭牋稱今月五日平旦於御路見龍迹自大社至象闕亘三四里庚申詔追贈高祖考侍中光禄大夫加金章紫綬封義興郡公諡曰恭十月甲戌敕丞相自今入問訊可施別榻以近扆坐二年正月壬寅天子朝萬國於太極東堂詔加高祖班劒十人八月甲午進高祖位太傅加黄鉞劒履上殿入朝不趨贊拜不名并給羽葆鼔吹一部丙申加高祖前後部羽葆鼔吹是時湘州刺史王琳擁兵不應命高祖遣周文育侯安都率衆討之九月詔進位相國總百揆封十郡為陳公備九錫之禮十月進高祖爵為王又命冕十有二旒建天子旌旗辛未梁帝禪位永定元年冬十月乙亥高祖即皇帝位於南郊柴燎告天大赦天下改梁太平二年為永定元年封梁帝為江隂王賜民爵二級文武位二等鰥寡孤獨不能自存者人榖五斛丙午輿駕幸鍾山祀蔣帝廟戊寅輿駕幸華林園親覽詞訟臨赦囚徒己夘分遣大使宣勞四方辛巳追尊皇考曰景皇帝廟號太祖皇妣董太夫人曰安皇后追諡前夫人錢氏號為昭皇后立夫人章氏為皇后癸未尊景帝陵曰瑞陵昭皇后陵曰嘉陵依梁初園陵故事立刪定郎治定律令戊子遷景皇帝神主祔於太廟夏四月輿駕親祀太廟乙丑江隂王薨詔遣太宰弔祭司空監護喪事凶禮所須隨由備辦以梁武林侯蕭諮息李卿嗣為江隂王初侯景之平也火焚太極殿承聖中議欲營之獨闕一柱至是有樟木大十二圍長四丈五尺流泊陶家後渚監軍鄒子度以聞詔中書令沈衆兼起部尚書少府卿蔡儔兼將作大匠起太極殿甲寅太極殿成匠各給復十二月甲申侍中安東將軍臨川王蒨率百僚朝前殿拜上牛酒甲子輿駕幸大莊嚴寺設無量大㑹捨乗輿法物羣臣備法駕奉迎即日輿駕還宫庚寅高祖於太極殿東堂宴羣臣設金石之樂以路寢告成也三年春正月己丑青龍見於東方丁酉夜大雪及明太極殿前有龍迹見甲午廣州刺史歐陽頠表稱白龍見於州江南岸長數十丈仙人見於羅浮山寺小石樓長三丈通身潔白衣服楚麗北江州刺史熊曇朗殺都督周文育於軍舉兵反王琳遣其將常衆愛曹慶率兵援佘視遮切孝勱六月戊子儀同侯安都敗衆愛等於左里獲琳從弟襲主帥羊暕音簡等三十餘人衆愛遁走庚寅廬山民斬之傳首京師甲午衆師凱歸丁酉高祖不豫遣兼太宰尚書左僕射王通以疾告太廟兼太宰中書令謝哲告大社南北郊辛丑高祖疾小瘳故司空周文育之柩至自建昌壬寅高祖素服哭於東堂哀甚癸夘高祖臨訊獄訟是夜熒惑在天高祖疾又甚庚午崩於璿璣殿時年五十七遺詔遣臨川王蒨入纂大業遷殯於太極殿西階諡曰武皇帝廟號高祖葬萬安陵太平御覽巻一百三十三
