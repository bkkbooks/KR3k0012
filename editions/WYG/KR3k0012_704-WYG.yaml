  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_704-1a, image: WYG0899/WYG0899-0286a.png}
body:
  text: 太平御覽卷七百四宋李昉等撰服用部六囊帊幞囊說文曰囊謂槖也槖車上大囊也方言曰自關而西食囊謂之䄋囊周易坤卦六四曰括囊无咎象曰括囊无咎慎不害也焦贛易林歸妹之損曰爭鷄失羊亡其金囊利得不長毛詩公劉曰迺裹餱粮于槖于囊公羊傳哀公曰齊景公死舎立陳乞迎陽生使力士舉巨囊至而開之則公子陽生也乞曰此君也諸大夫皆再拜稽首自是徃殺舎史記曰韓信已定臨淄楚使龍雎救齊夾雎水陣韓信乃夜令人為萬餘囊滿沙壅水上流引軍半渡擊龍雎佯不勝遂走龍雎追信信渡水使人決壅水大至急擊殺龍雎戰國策曰荆軻逐秦王時侍醫夏無且以藥囊提軻漢書曰陸賈使尉陀陀賜賈囊中裝直千金又曰東方朔曰侏儒長三尺奉一囊粟錢二百四十朔長九尺餘亦一囊粟錢二百四十侏儒飽欲死臣朔饑欲死又曰楊王孫病且終先令其子曰吾欲臝葬以反吾真死則為布囊盛入地七尺既下從足脫其囊以身親土又東方朔傳曰文帝集上書囊以為殿帷又曰張安世持囊簪筆事孝武數十年見謂忠謹又曰邴吉馭吏嘗知邊塞吏出適見驛持赤白囊邊郡發犇命書馳來至虜入雲中代郡遽歸府見吉白狀又曰成帝許美人乳詔使婢嚴持乳醫及藥篋至美人所後詔使嚴持緑囊書與許美人告嚴曰美人當有以予女受來置飾室中美人葦篋一盒盛所生兒死緘封及緑囊報書予嚴又曰王陽好車馬衣服鮮明而遷徙轉移所載不過囊槖時人怪其奢服其儉故俗傳王陽能作黄金東觀漢記曰岑彭與吳漢圍隗囂壅谷水以縑囊盛土為堤灌西城後漢張湛傳曰光武嘗召見諸郡計吏問前後守令能否蜀郡計掾樊顯曰漁陽太守張湛昔在蜀仁以惠下威能討奸前公孫述破時珍寶山積捲握之物足富十世而湛去職之日乗折轅車布被囊而已范􅁮後漢書曰楊璇為零陵太守以緋囊盛石灰於車上繫布索于馬尾㑹戰從風鼓灰賊不得視因以火燒布布燒馬驚奔賊陣又曰和熹鄧后臨朝杜根以安帝長宜親政事乃上書直諫太后怒收根盛以縑囊撲殺之執法者以根知名私語行事人使不加力而載出城外根得蘇典畧曰馬超為司𨽻督軍從事討郭援為飛矢所中乃以囊裹其足而戰斬援首詔拜徐州刺史魏畧曰大秦國王有五宫相去各十里王一旦至一宫聽事止宿明旦復至一宫遍而還出行常以一韋囊自随有上言者收辭囊中還宫乃省之吳録曰步隲表言北降王潛等說北箱部伍圖以東向多作布囊欲以盛沙塞江孫權見呂範諸葛恪云每讀隲表輙獨失笑此江與開闢俱生寧有可囊塞理乎王隠晉書曰棗嵩用事于王浚時謡曰十囊五囊入棗郎晉中興書曰孫恩敗以囊簏盛嬰兒投之于外而告之曰賀汝先登仙堂我尋而后就汝晉書曰郭公居河東精卜筮郭璞從而受業公以青囊中書九卷與之璞由是洞曉其術宋書曰吳郡人陳遺少為郡吏母好食鐺底飯遺在役恒帶一囊每煮食輙録其焦以貽母陳書曰後主怠于政事每啓奏後主倚隠囊置張貴妃于膝上共決之隋書曰張䖍威嘗在塗見一遺囊恐其主求失因令左右負之而行後數日物主求認悉以付之莊子曰人而不學命之曰視皮學而不行命之曰輒囊又曰將為胠篋探囊發櫃之盜而為守備則必攝緘縢固扄鑰此世俗所謂智也然巨盜至則負櫃揭篋擔囊而趨唯恐緘縢之不固也淮南萬畢術曰鴻毛囊之可以渡江東宫舊事曰太子納妃有絳石綺絹褁被囊一丹羅長命綺絹褁椀囊一紫綦文綺絳絹褁椀囊二晉中經簿曰盛書皂縹囊書函中皆有香囊二世說曰謝𤣥年少時好佩紫羅香囊叔殳太傅患之而不欲傷其意乃譎與戲賭得即燒之語林曰劉承𦙍少有淹雅之度王庾温公皆素與周旋聞其至共載㸔之劉倚被囊了不與王公言神味亦不相酬俄頃賓退王庾甚怪此意未能解溫曰承𦙍好賄新來必有珍寳當有市井事令人視之果見香囊皆珍玩正與胡父論賈又曰石崇厠内兩婢錦囊貯籌也俗說曰何承天顔延年俱為郎何問顔曰藿囊是何物顔答曰此當復何解耶藿囊將是卿西京雜記曰惠帝與趙王同寢處后殺之不得後帝早獵后命力士於被中搤殺之乃死呂后不信以緑囊盛之載以小軿車入見厚賜之力士東都門外宫奴帝後知腰斬之拾遺記曰蘇秦張儀二人假食于路剥樹皮為囊以盛天下良書又曰燕昭王夢西方羽人從雲中來曰大王積智未開求恒生久視之觀不可得也以指畫王心應手而裂王乃驚悟血濕于襟王復見所夢人曰本欲易王之心乃出方寸緑囊囊中有續脉石名丸補血精散摩王之臆俄而即愈又曰石虎為浴臺皆用鍮石珷玞為隄岸或以琥珀車渠為瓶杓夏則引渠水以内池池中皆紗縠為囊盛百襍香漬于水裏王肅喪服要記曰昔魯哀公祖載其父孔子問曰寧設五榖乎哀公曰五榖囊者起伯夷叔齊讓國不食周粟而餓首陽之山恐鬼之饑故作五榖囊吾父食味含哺而死何此為國語曰吳王殺申胥盛以鴟夷而投之于江春秋後語曰趙王使平原君入楚求其從約其客有文武者二十人偕得十九人未有可以備二十者毛遂請行平原君曰賢士處世譬如錐之處囊其鋒立見今先生處勝門下三年無所聞是先生無所能也遂曰臣乃今日請處囊中耳若早處囊中乃穎脫而出非特末見也平原乃許與偕江表傳曰魏太祖與馬超單馬㑹語超負其多力嘗置六斛米囊東西走馬輙製米囊以量太祖輕重太祖尋知之曰幾為狡虜所欺漢武内傳曰帝見王母有一卷書盛以紫錦之囊母曰此五岳真形圖也曹瞞傳曰操佻易自佩小鞶囊盛手巾細物益部耆舊傳曰閆憲字孟度為緜竹令男子杜盛行于路得遺裝囊開視有錦帛二十五疋明送詣吏汝南先賢傳曰范滂被詰受幾贓贓賕滂曰曽為北部督郵汝陽有記囊表裏六尺若以此為贓贓直六十耳郭文舉别傳曰郭文舉河内人也懐帝未濟江至餘杭市賣箭箬易鹽米以樹皮作囊得米鹽以納囊中裴淵廣州記曰州㕔事梁上畫五羊象又作五榖囊随象懸之云昔髙固為楚相五羊銜榖萃于楚庭因是圖其象荆楚嵗時記八月民俗以錦綵為眼明囊記曰赤松子此日以囊承柏樹下露以為相貽或以金箔為之􅉍相餉遺幽明録曰習鑿齒為荆州主簿從桓宣武出獵見黄物射之即死是老雄狐臂帶絳綾香囊又曰廣陵韓略將下馬覺鞭重見有緑錦囊中有短卷書著鞭鞘皆不知所從來開視之放榖紙祝經故世之常聞也異苑曰信安鄭微年少時見人遺一囊云中有物欲碎便為凶兆微宻開看乃是一挺炭意甚秘之年八十病篤語子弟云吾齒老矣可試啓此囊見炭悉碎折於是遂死趙壹客秦詩曰文籍雖滿腹不如一囊錢宋劉義恭啓曰垂賜金虎魄茱茰囊七寶樹裝玉眼明囊帊幞通俗文曰帛三幅曰帊帊衣曰幞職官曰尚書郎入直中宮供青縑白綾幞晉中興書曰陸納為吳興太守徵拜左右民尚書臨發止留被幞餘悉還宫梁書曰張譏幼喪母有錯綵絲經帕即母之遺製及有所識家人俱以告之每嵗時輙對帕哽咽不能自勝南史曰闗康之寓居南平里特進顔延之等當時名士十許人入山候之見康之覆布帊枕石而卧了不相盻延之等咨嗟而退不敢干也北史曰後魏元文旣專政於禁中自作别庫掌握之寶充牣其中又曽卧婦人於食輿以帊覆之令人輿入禁内出亦如之直衛雖知無敢言及東宫舊事曰皇太子納妃有絳綾褁幞帊五具絹裏帊五太平御覽卷七百四
