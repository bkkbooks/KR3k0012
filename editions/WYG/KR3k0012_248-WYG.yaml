body:
  text: 太平御覽卷二百四十八宋李昉等撰職官部四十六王師王傅王友王侍讀王文學郡國相國郎中令國中尉國常侍國侍郎府長史府司馬王師漢書曰王式字翁思東平人為昌邑王師昭帝崩昌邑王嗣立以行淫亂廢昌邑羣臣皆下獄治事使者責問曰師何以無諫書式對曰臣以詩三百五篇朝夕授王至於忠臣孝子之篇未嘗不為王反覆誦之臣以三百五篇進諫是以無諫書使者以聞亦得减死論王傅後漢書曰皇太子彊求乞自退封東海王故重選官屬以杜林為王傅從駕南巡狩時諸王傅數被引命或多交㳺不得應詔惟林守貞有召必至餘人雖不見譴而林特授賞賜又辭不敢受帝益重之呉志曰是儀字子羽北海營陵人也南魯二宫初立儀以本職領魯王傅儀嫌二宫相近切乃上䟽曰臣竊以魯王天挺懿徳兼資文武當今之宜宜鎮四方為國藩輔宣揚徳美廣耀威靈乃國家之良規海内所瞻望但臣言辭鄙野不能究盡其意愚以二宫宜有降殺正上下之序明教化之本書三四上為傅盡忠動輙規諌事上勤與人恭不治産業不受施恵為屋舍纔足自容隣家有起大宅者權出望見問起大宅者誰左右對曰似是儀家也權曰儀儉必非問果他家其見知信如此唐書曰丘悦河南陸渾人也亦有學業景龍中為相王府掾與文學韋利器典籖裴耀卿俱為王府直學士睿宗在藩甚重之官至岐王傅開元初卒撰三國典略三十卷行於時王友晉中興書曰謝尚字仁祖司徒左西屬為㑹稽王友北史曰蕭大圜除滕王逌友逌嘗問大圜曰吾聞湘東王作梁史有之乎餘𫝊乃可抑揚帝紀奚若隠則非實證則攘羊對曰言之者妄耳如使有之亦不足怪昔漢明帝為世祖紀章帝為顯宗紀殷鑒不逺足為成例且君子過如日月之蝕彰於四海安得而隠之如有不彰亦安得不隠葢子為父隠直在其中諱國之惡抑又禮也逌乃大笑殷浩别𫝊曰㑹稽王少著名譽友學之奉必極有徳以浩為友山公啓事曰近啓修武令劉訥補南陽王友詔曰友誠宜得有益者然以長吏治民不宜屢易為疑令散人無依仰又啟今者職散中誠自有人然劉訥才志内外非稱臣以為宜蒙此者是以啟及不審固可用不詔可爾所啟王侍讀隋書曰楊汪字元度勤學専精左氏傳通三禮解補周冀王侍讀王甚重之每曰王侍讀徳業優深孤之穆生也唐書曰姚思亷初為代王侍讀屬義師入京城時府僚駭散唯思亷侍不離其側義師入殿門思亷謂之曰唐公舉兵本匡王室卿等不宜無禮于王衆服其言于是布列階下須臾太宗至聞而義之許其扶王至順陽閣下泣拜而去觀者咸歎曰忠烈之士也仁者有勇此之謂也太宗居藩引為文學及親征徐圎朗思亷時在洛陽太宗嘗從容言及隋亡之事慨然歎曰姚思亷不懼兵刃以明大節求諸古人亦何以加也因寄物百段遺其書曰想卿節義之風故有斯贈王文學魏志曰中山恭王褒每讀書文學左右常恐以精力為病數諫止之不能廢也文學防輔相與言曰受詔察王舉措有過當奏及有善亦宜以聞遂共表陳褒美褒聞之大驚責譲文學曰修身自守常人之行耳而諸君以上聞適増其負累也晉書曰鄭褒魏武初封諸子為侯精選賔友褒與徐幹俱為臨淄文學晉諸公讃曰扶風王年八嵗聰明善詩賦中表竒之魏烈祖以為齊王芳文學長沙耆舊𫝊曰太尉李公時為荆州刺史不辟書記夫採名珠求之於蚌欲得名士求之文學或割百蚌不得一珠不可捨蚌求之於魚或百文學不出竒士不可捨文學求之於斗筲也由是言之蚌乃珠之所藏文學亦士之塲矣郡國相東觀漢記曰吳祐字季英陳留人遷膠東相政唯仁簡以身率物民有相爭訴者輒閉閣自責然後科其所訟以道譬之或身到閭里重相和解自是之後爭訟省息吏民不欺又曰魯平字叔陵拜趙相為政尚寛恵禮譲雖有官不廢教授門人常有數百闗東號曰五經復興魯叔陵後漢書曰張禹遷下邳相徐縣北界有蒲陽坡東觀記曰坡水廣二十里經亘百里在道西其東有田可萬頃坡與陂同傍多良田而湮廢莫修禹為開水門通引灌溉遂成熟田數百頃勸率吏人假與種粮親自勉勞之遂大收穀實鄰郡貧者歸之千餘户室廬相屬其下成市後嵗至墾千餘頃人用温給又曰趙咨應召復拜東海相之官道經滎陽令燉煌曹翯咨之故孝亷也咨為燉煌太守時翯薦舉為孝亷迎路謁候咨不為留翯送至亭水次望塵不及謂主簿曰趙君名重今過界不見必為天下笑即棄印綬追至東海謁咨畢辭歸家其為時人所貴如此謝承後漢書曰東郡趙咨為東海相人遺其雙枯魚噉之二嵗不盡以儉化俗魏志曰初曹公為兖州以東平畢諶為别駕張邈之叛也邈刼諶父母妻子公謝遣之卿老母在彼可去諶頓首無二心公嘉之為之流涕既出遂亡歸及邈敗生得諶衆為諶懼公曰夫人孝於其親者豈不忠於君乎吾所求也以為魯相又曰太祖光和末黄巾起拜騎都尉討潁川賊還為濟南相國有十餘長吏多附阿貴戚賍汚狼籍於是奏免其人禁斷淫祀奸宄迯竄郡界肅然蜀志曰劉備領平原相郡民劉平素輕先主耻為之下使客刺之客不忍刺語之而去其得人心如此晉書曰文帝輔政阮籍常從容言於帝曰平生曽逰東平縣樂其風土帝大悦即拜東平相籍乘驢到郡壊府舍屏障使内外相望法令清簡旬日而還又曰阮神遷平原相時㐮邑衛京自南陽太守遷於河内與神俱拜帝望而歎曰二千石皆若此朕何憂乎九州春秋曰孔融為北海相一朝殺部督郵㑹稽典録曰駱俊字孝逺烏陽人孝靈皇帝擢拜陳相汝南葛陂盗賊並起陳與接境四面受敵俊厲吏民為保障之計出倉見穀以贍貧民鄰郡士庶咸往歸之身捐俸禄給其衣食民有産子常勅主者厚致米肉生男女者輒以駱為名國郎中令漢書曰龔遂字少卿山陽人以明經為官至昌邑郎中令事王賀賀動作多不正遂為人忠厚剛毅有大節内諫諍王外責傅相引經義陳禍福至於涕泣蹇蹇無已面刺王過王至掩耳起走曰郎中令善媿人及國中皆畏憚之王又與騶奴宰人逰戲飲食賞賜無度遂入見王涕泣膝行左右侍衛皆出涕王曰郎中令何為哭遂曰臣痛社稷之危也又曰周勃等共誅諸吕迎代王郎中令張武等議皆曰不可信願稱疾無往以觀其變中尉宋昌進曰群臣之議皆非願大王勿疑也代王遣太后弟薄昭見勃等俱言所以迎主王者昭還報信矣王笑謂宋昌曰果如公言乃令宋昌驂乘張武等乘𫝊詣長安羣臣奉法駕代邸皇帝即日夕入未央宫夜拜宋昌為衛将軍領南北軍張武為郎中令行殿中續漢書曰皇子封王其郡為國每國置郎中令一人秩千石掌王夫人郎中宿衛官也魏志曰袁渙為魏國郎中令及卒太祖為之流涕賜穀二千斛一教以太倉穀千斛賜郎中令家一教以垣下穀千斛與卿家外人不解其意教曰以太倉榖者官法也以垣下穀者親舊也晉中興書曰顧榮時在洛者陸機陸雲及榮唯三人而已機雲雖有才藻不及榮也以南土秀望補呉王郎中令沈約宋書曰宋國初建當置郎中令髙祖難其人謂傅亮曰今用郎中令不可減袁耀卿也既而曰吾得其人矣乃以王惠居之續捜神記曰㑹稽朱弼為國郎中令營立第舍未成而卒同郡謝子木代其事以弼死亡乃定簿書多張功費長百餘萬以其賍誣弼而實入子木夜寝忽聞有人道弼姓字者俄而到子木堂前謂之曰卿以枯骨腐專可得誣當以某日夜更相書言終忽然不見陸機詣呉王表曰臣本吳人靖居海隅朝廷欲抽引逺人綏慰遐外故太傅所辟殿下東到淮南發詔以臣為郎中令國中尉史記曰魯申公弟子為博士十餘人孔安國至臨淮太守徐偃為膠西中尉其治官皆有亷節稱其好學漢書曰鄭當時字荘陳人也稍遷為魯中尉又曰梁孝王招延四方豪傑齊人公孫詭多竒計初見日王賜千金官至中尉號曰公孫将軍續漢書曰清河王小心恭孝特見親愛後諸王就國鄧太后詔特清河國置中尉内史賜乘上御物馬漢舊儀曰帝子為王王國置太傅相公尉各一人秩二千石以輔王三輔決録曰淮陽憲王宣帝愛子器異其才欲以為嗣王恃寵自驕天子乃用韋𤣥成為中尉以輔導受詔與蕭望之等論五經同異於石渠閣邵氏家傳曰邵𢎞字徳裕時景帝為瑯琊王詔書髙選官屬請君為中尉為人體素方嚴儀容甚偉雖私門接對僮僕儼然不厲而威王甚憚焉王嘗侯君晝息身隨使者潜至君舍令使者進曰王有令君徐理鬢冠履俯伏盡禮然後讀之王與使者羣立瞻聽為之歎息曰古人稱不愧于屋漏其邵中尉乎吾反逆詐以試長者豈不陋哉王虗心受納忻宴言語晝夜無休君乃上書見王王讀三四瞿然失色後謂左右曰思邵中尉之言使人于今毛竪國常侍漢書曰龔舍字君倩少好學明經楚王入朝聞舍髙名聘為常侍不得已隨王歸國晉書曰甘卓字季思舉孝亷為吳王宴常侍國侍郎王隠晉書曰孫秀瑯琊國書佐為趙王倫國常侍桓譚新論曰宣帝元康神爵之間丞相奏能鼓雅瑟者渤海趙定梁國龍徳召見温室拜為侍郎府長史諸府附漢書曰張湯為御史大夫為三長史朱買臣等所譛帝遣杜周詰湯湯欲對周曰君為大臣今被責詰何用對為於是自殺臨死上書曰譛臣者三長史也帝追惜湯誅三長史又曰趙充國從貳師将軍擊匈奴身被二十餘創武帝視而嗟歎遷車騎長史晉書曰劉輿為魏郡太守東海王越将召之或曰輿猶膩也近則汚人及至越疑而御之輿宻視天下兵簿及倉庫牛馬器械水陸之形皆黙識之是時軍國多事毎㑹議自播弼以下莫知所對輿既見越應機辯越頓睐酬接即以為左長史又曰劉輿為東海王越左長史越既秉政時賔客滿筵文案盈几逺近書記日有數千終日不倦或以夜繼之皆人人懽暢莫不悦附命議如流酬對欵備時人服其能比之陳遵時越府有三才潘滔大才劉輿長才裴邈清才又曰薛亷字令長與同郡紀瞻等初入洛張華歎曰皆南金也屢遷至丞相右長史亷恪勤王事以佐禄秩優泰每約損辭譲以周旋而已晉中興書曰王獻之少有清譽亦善𨽻書後将軍謝安請為長史甚欽愛之宋書曰阮萬齡陳留尉氏人萬齡少知名自通直郎為孟昶建威府長史時袁豹江夷相繼為昶司馬時人謂昶府有三素齊書曰庾果之出為王儉衛軍長史時人呼儉府為入芙蓉池又曰陸慧曉為晉熈王冠軍長史慧曉歴輔五政治身清肅僚佐以下造請起送之或謂慧曉曰長吏貴重不宜妄自謙屈答曰我性惡人無禮不容不以禮處人又曰陸慧曉遷右長史時陳郡謝胐為長史府公竟陵王子良謂王融曰我府二上佐求之前世誰可為比融曰兩賢同時便是未有前例崔鴻十六國春秋後趙録曰張曜字世淵清河東武城人也學敏才達雅善清談石勒偉其儀辨拜世子衛軍長史勑世子曰張長史人之表範汝其師之後魏書曰張衮字洪龍上谷沮陽人也好學有文才太祖為代王遷為左長史决䇿帷幄太祖器之禮遇優厚南史曰孔覬除安陸王子綏後軍長史性使酒仗氣每醉輒彌日不醒僚類間多所凌忽尤不能曲意權幸莫不畏而嫉之居常貧罄無有豐約未嘗開懐為府長史典籖諮事不呼前不敢前不令去不敢去雖醉日居多而曉明政事酉時判决未嘗有壅衆咸云孔公一月二十九日醉勝他人二十九日醒也孝武每遇引見遣人覘其醉醒隋書曰衛𤣥初仕周武帝親總萬幾拜益州總管府長史賜以萬釘寳帶唐書曰和元祐為千牛衛長史先是元祐獻詩十首其詞雖猥陋皆寓言嬖幸而意及兵戈韋氏命拘於大理而将戮月餘而韋氏就誅其詩言若同符䜟故上聞而拜之魏武故事載令曰府長史王必是吾披荆棘時吏也忠能勤事心如鐵石國之長吏也蹉跌久不辟之捨騏驥而不乗焉惶惶而更求哉今故教辟之陶氏家𫝊曰猷字公毅王導以君江東雋望請為右軍長史君恪勤王事每當朝日恒夙興就路及到府門輒先衆僚為人美容止善談論亦以此見稱當世焉府司馬諸府附左傳曰季氏以公鉏為馬政馬正家司馬也愠而不出閔子馬見之曰閔子馬閔馬父也子無然禍福無門惟人所召為人子者患不孝不患無所所謂處也恭敬父命何常之有言廢置在父無常位公鉏然之恭敬朝夕恪居官次家語曰鄉射曰孔子觀於鄉射於是退而與門人習射於矍相之圃葢觀者如堵墻焉射至於司馬使子路執弓矢出延射者子路為司馬故射至於子路使出延射魏畧曰諸葛誕伐呉戰於東闗上欲速進軍司馬王儀諫曰吳賊必有伏宜持重不可進上不聽果為吳人所覆儀曰今日之敗誰當其咎上曰司馬欲委罪於孤耶遂殺儀晉書曰石苞為景帝中䕶軍司馬宣帝聞苞好色薄行以譲帝帝答曰苞雖細行不足而有經國才猷夫亷貞之士必能經濟世務是以齊桓公忘管仲之奢僣而録其匡合之大謀漢髙舍陳平之汚行而取其六竒之妙算苞雖未可以上儔二子亦今日之選也帝乃止晉陽秋曰晉陵人韋夐桓修令於坐相劉公仕宦當至州不夐云劉粗是有相人當不失邊州刺史既出私於裕曰卿大有貴相向不敢極言耳裕惡其言未畧答曰卿狂言騐當相為司馬義旗後數年夐見裕訴曰周成不負桐葉之信公不應忘司馬之言今不希鎮軍府䕶軍司馬缺願賜卒恩裕美而用之晉中興書曰中宗為安東将軍鎮下邳請王導為司馬軍國之事無不諮訪中宗遷鎮建康以導為謀主推心親任於時朝野傾心號曰仲父導忠於事上達於從政以百六之弊寄寓江右為治之本務在清静沈約宋書曰羊徽被遇於髙祖髙祖謂諮議參軍鄭鮮之曰羊徽一時美器世論猶在兄後恨不識之㧞補右将軍劉藩司馬後魏書曰辛祥為并州平北府司馬有白璧還兵藥道顯被誣為賊官屬推據咸以為然祥曰道顯面有悲色察獄以色其此之謂乎苦執申之月餘别獲真賊世説曰謝奕為桓宣武荆州司馬奕既上猶推布衣之交在温坐㟁幘嘯咏無異常日宣武毎曰我方外司馬也奕醉温於主許避之主每曰君若無狂司馬我何由得相見太平御覽卷二百四十八
