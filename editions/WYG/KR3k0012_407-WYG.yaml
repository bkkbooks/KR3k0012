body:
  text: 太平御覧卷四百七宋李昉等撰人事部四十八交友二范􅁮後漢書曰孔融宙之子也十嵗隨父詣京師時河南尹李膺簡重勅外云自非當世才藝英賢通家子孫輒不得進融故造其門云我與公積代通家子孫膺乃召見曰祖父嘗與僕有恩舊乎曰然先君孔子與君先人李老君同徳比義而相師友融與君豈非積代通家乎衆竒之又曰第五倫始以營長詣京尹鮮于褒見而異之署爲吏後褒坐事左轉髙堂令臨去握臂訣曰恨相知晩又曰肅宗始脩古禮廵狩方岳崔駰上西廵頌帝歎之謂侍中竇憲曰知崔駰乎對曰班固數爲臣説之然未見帝曰公愛班固而忽崔駰葉公之好龍也可試見駰候憲憲倒屣迎笑謂駰曰吾受詔交公何得薄我哉遂揖入也又曰鍾皓字季明潁川長社人皓少以篤行稱同郡陳實年不及皓皓引與為友又曰張叔升字彦真陳留尉氏人也有大志歎曰人生於世白駒過隙耳安能曲道媚世俗哉守外黄令遇黨錮去官道逢友人班荆而語曰今闕下閹宦專權因相向而泣有老父過之曰嗟乎二大夫何泣之悲龍不隱鱗鳯不藏翼一世網羅泣將何及二人欲與之言不顧而退叔升竟以黨錮下獄死又曰任末字叔本遊京師敎授友人董奉徳於洛陽病亡末躬推車載奉徳致於墓所由是知名又曰梁鴻友人髙恢字伯達少好老子隱華隂山及鴻東遊思恢作詩遠不復相見恢亦髙抗終身不仕又曰陳蕃李膺之敗何顒與蕃舊善遂為宦者所陷乃改名姓亡匿汝南間所至皆親其豪傑有聲荆豫之域袁紹慕之私與徃來結爲奔走之交又曰孔奮字君魚扶風茂陵人也守姑臧長治貴仁平太守梁統深相敬待不以官屬禮之常迎於大門引入見母又曰李燮字徳公所交皆捨短取長好成人之美時潁川荀爽賈彪雖俱知名而不相能燮並交二子情無適莫世稱其正又曰王允字子師同郡郭林宗一見竒之曰王生一日千里王佐才也遂定交謝承後漢書曰范式為荆州刺史友人南陽孔嵩貧居親老乃變名姓傭於新野縣縣吏遣嵩為式𨗳騶式見而識之呼嵩把臂謂曰子非孔仲山耶對之歎息式勅縣代嵩嵩以傭未竟不肯去又曰陳蕃既被害友人陳留朱震時為銍令聞而棄官哭而收葬又曰許敬字鴻卿汝南人與同郡周伯靈為交友伯靈早亡鴻卿育飬其子又曰馬實字伯騫勒結英雄所欲友接負笈荷擔不逺萬里山陽王暢未仕時實慕髙名徃存之屇暢門投刺欲不肯見使從者拒之云行歴未旋實留連日日徃伺之謂從者曰夫孝子事親行不踰日而至今不歸非孝子也欲待與相見如㓙於路徃而不反哭之以爲死交暢聞其言嘆息壮志因執其手揖引與入美談畢請入見毋飲實定好而别實臨退報暢手訣曰大上立徳其次立功幸俱生盛明之世免磚瓦之姿託爲丈夫當建名後載不可爲空生徒死之物穢天壤之間又曰雷義字仲公豫章人舉茂才讓友人陳重字景公刺史不聽義遂陽狂披髪走不應命鄉里爲之語曰膠漆自謂堅不如雷與陳又曰范式字巨卿山陽金郷人少遊太學與汝南張劭為友劭字元伯二人並告歸鄉里式謂元伯曰後二年當還将過拜尊親見孺子焉乃共尅期至日巨卿果到升堂拜母飲盡懽而别後元伯寢疾篤同郡郅君章商子㣲晨夜省視元伯臨盡曰恨不見死友尋卒式夢元伯𤣥冕垂纓而呼曰吾死當以某日葬子豈能相及覺而悲赴之便服朋友之服投其葬日未屇而䘮已發引至壙将􅉎而柩不肯進其母撫之曰元伯豈有望也停柩移時見有素車白馬哭而来母曰必巨卿也既至叩䘮言曰行矣元伯死生異路永從此辭㑹葬者千人皆揮涕式執紼引柩乃前進式留止塜攻修墳樹而退又曰范式嘗至京師受業太學時諸生長沙陳平子同在學與式未相見而平子被病曰山陽范式烈士也可託死吾殁但以尸埋巨卿户前乃裂素為書遺巨卿既終妻從其言行式適還有書見瘞愴然感之向墳揖哭為死友乃營護妻兒身自送䘮於臨湘未至四五里乃委素書於柩上哭别而去袁山松後漢書曰吳祐放猪長垣澤中誦經而行北海公沙穆遊太學資乏變服為傭與祐貨舂遂為交於杵臼之間華嶠後漢書曰洛陽慶鴻慷慨好義亷范與爲刎頸之交時人稱曰前有管鮑後為慶亷司馬彪續漢書曰李膺性簡亢無所交接唯以同郡荀淑陳實為師友東觀漢記曰楊政嘗過馬武稱疾見政對几據牀欲令政拜牀下入户前排武徑上牀坐武恨言語不懌政因把武臂責之曰卿蒙恩稱蕃臣不思求賢報國而驕天下英俊會信陽侯至責數武合爲朋友也又曰尹敏字㓜季與班彪相厚每相談常對案不食晝即至暝夜即徹旦又曰朱暉同縣張堪有名徳每與相見常接以友道暉以堪宿望盛名未敢安之堪至把暉臂曰欲以妻子託朱生暉舉手不敢荅堪後仕為漁陽太守暉自為臨淮太守絶相聞見時南陽饑堪妻子貧窮暉乃自徃候視其困分所有以賑給之又曰郅暉友人董子張者父先為郷人所害及子張病将終暉徃候之子張流涕視暉不能言暉曰吾知子不悲天命而痛讎不復也子張目繫而已暉即起将客遮仇人取其頭以示子張見而氣絶又曰趙喜為赤眉兵所圍迫急乃亡走與友人韓仲伯等數十人携小弱越山出武關仲伯以婦色美慮有强暴者而已受其害欲棄之於道喜怒不聴以泥塗仲婦面載以鹿車身推之毎逢賊欲逼奪喜輒言病以此得免又曰閔仲叔恬靜養神弗役於物與周黨相友黨每過仲叔共含菽飲水又曰應順字仲華汝南人少與同郡許敬善敬家貧親老無子為敬去妻更娶魏志曰荀攸彧從弟也太祖曰孤與荀公達周旋二十餘年初無毫毛可非者又曰公達賢人也所謂温良恭儉譲以得之孔子稱晏平仲善與人交乆而敬之公達即其人也又曰曹真字子丹太祖族子也真少與宗人曹遵鄉朱讃並事太祖遵讃早亡真愍之乞分所食邑封遵讃子詔曰太司馬有叔向撫孤之仁篤晏嬰乆要之分君子成人之美聽分真邑賜遵讃子爵闗内侯各五百户又曰崔琰字季珪清河東武成人也少樸訥好擊劒尚武事琰友人公方早卒琰撫其孤恩若己子又曰陳矯字季弼為郡功曹過太山太山守薛悌異之結為親友戱矯曰以郡吏交二千石不亦可乎悌後為魏郡及尚書令皆代矯魏畧曰趙岐字臺卿藏匿避難買餅市中孫嵩見岐非常人呼而問之遂與俱歸嵩先入白毋曰出行乃得死友迎上堂享之極欣藏岐複壁中又曰華歆字子魚平原人靈帝時與北海邴原管寜俱遊學三人相善故時人號三人為龍謂原為龍腹寜為龍尾歆為龍頭魏氏春秋曰嵇康寓居河内與之遊者未嘗見其喜愠之色與陳留阮籍河内山濤向秀藉兄子咸瑯琊王戎沛人劉伶相與友善遊於竹林號曰七賢吳志曰孫策創業命張昭為長史撫軍中郎将升堂拜母如比肩之舊文武之事一以委昭又曰吳範字文則與親故接有終始素與魏勝同邑相善為交勝嘗有罪吳主權責怒甚敢有諫者處死範謂勝曰與汝偕死勝曰死而無益何死範曰安能慮此坐觀汝耶乃髠頭自縳詣門下使鈴下以聞鈴下不敢曰必死不可範曰汝有子耶曰有曰使汝為範死子以屬我鈴下者乃排閣入言未卒權大怒欲投以㦸逡廵出走範因突入叩頭流血言與涕并良乆權意釋免勝又曰周瑜長壮有姿貎孫堅議興兵討董卓徙家於舒堅子策與同年獨相友善瑜推道南宅以舍策升堂拜母有無通共又曰魯肅字子恭臨淮東城人周瑜知其竒也遂相親結定僑札之分又曰魯肅代周瑜當之陸口過吕蒙屯丁肅意尚輕䝉或説肅曰吕将軍功日顯不可以故意待也君宜順之肅遂徃詣蒙酒酣蒙問肅曰君受重任與雲長為隣将何計畧以備不虞因為書五䇿肅於是越席就之拊其背曰吕子明吾不知卿才畧所及乃至如此遂拜蒙母結友而别吳録曰張温字惠怒英才瓌偉遂以禮躬延見召對詞雅淹潤帝攻容前席拜中郎聘蜀與諸葛金結金蘭之好焉蜀志曰馬謖音縮字㓜常才氣過人好論軍計謖臨終與諸葛亮書曰明公視謖猶子謖視明公猶父願深殛鯀興禹之義使平生之交不虧此謖雖死無恨于黄泉也于時十萬之衆為之流涕亮自臨祭待其孤遺若平生又曰張裔字君嗣蜀郡成都人也少與犍為楊恭友善恭早死孤遺未數嵗裔分居事恭母如恭息長大為之娶妻買宅産業使立門户又曰楊戲字文然為人篤於舊故與巴西韓儼黎韜童㓜晉書曰王龔字孝伯清操過人才地自負恒有宰相之望與王沈齊名友善又曰桓温字元子宣城太守彛之子也與庾翼友善恒相期以寜濟之事翼薦温於明帝曰桓温少有雄畧願勿以常人遇之又曰陸機吳人也晉冠吳至太康本與弟雲造太常張華華素重其名如舊相識曰伐吳之役利獲二俊又曰周馥字祖宣馥少與友人成公簡齊名俱起家為諸王友學又曰紀瞻慎行好施老而彌篤少與陸機兄弟相親善及機被誅瞻仰䘏其家及嫁女資送同于所生又曰鄭㐮字叔林滎陽開封人也少孤隨叔父渾避難江東時華歆為豫章太守渾徃依之歆素與衮父㤗友善撫飬衮如子已晉中興書曰郗超所交皆一時秀羙雖寒門後進亦㧞而友之死之日貴賤操筆為誄者四十餘人其為物所宗貴如此又曰胡母輔之字彦國少有髙名有王尼者出寒㣲輔之庾顗王澄等共為羙談尼以門役送䕶軍府輔之等乃齎羊酒詣門吏以聞䕶軍曰諸名士以羊酒来當有以既入先過尼尼已給府養馬輔之等坐厩下與尼炙羊飲酒而去竟不見䕶軍大驚乃與尼長假又曰東甌沃壌名士多樂居之太傅謝安未仕時亦居東土共王羲之孫綽李充許詢道林皆文義冠世共相友眤又曰魯公賈謐叅管朝政京洛人士無不傾心渤海石崇之徒年皆長謐並以文才降節事謐共相朋眤號曰二十四友又曰羊曼字祖延頽縱宏狂飲酒誕節與温嶠庾亮阮桓彛同志善友並中興名臣時州里稱陳留阮放為宏伯髙平郗鑒為方伯太山胡母輔之為達伯濟隂下壺為裁伯陳留蔡謨為朗伯陳留阮孚為誕伯髙平劉綬為秀伯而曼為㸃伯凡八伯盖擬古之八雋又曰薛兼與同郡組瞻廣楊閔鴻吳郡顧榮㑹稽賀循同志友善初入洛司空張華見而歎息曰南金也又曰華譚所友人袁甫者字公胄歴陽人少能言議與譚齊名友善太安中人洛譚與甫書曰誠以枯澤非應龍之淵棘林非鸞鳯之窟昔食其自匿監門非髙祖不長揖孔明躬稼南陽非劉氏不馳驅望雲霄而偶翮見鴻漸之輕羽瞻長塗而髙鳴知騏驥之迅足又曰王濛少而不覊不為鄉閭所齒晩節尅修遂有風流美譽與沛國劉恢齊名友善時人以濛比袁耀卿恢比荀奉倩晉中興書曰庾翼字雉恭時京兆杜人陳郡商浩並才名冠世而翼弗之重每語人曰此軰宜束之髙閣候天下平然後議其所任耳唯與桓冲友善在總角之中便相期終始又曰肅祖之在東宫與温嶠庾亮並布衣之好晉陽秋曰陸抗羊祜魏邉将推僑札之好抗嘗遺祜酒祜亦饋抗藥各推心服之太平御覧卷四百七
