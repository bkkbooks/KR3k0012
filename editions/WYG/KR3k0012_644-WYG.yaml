  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_644-1a, image: WYG0898/WYG0898-0741c.png}
body:
  text: 太平御覧卷六百四十四宋李昉等撰刑法部十械拲鎻鉗械易蒙卦曰利用刑人用說桎梏又噬嗑曰初九屨校滅趾旡咎校者以木校也即械也校者取其通名也傳曰郤犨與長魚矯争田執而梏之梏械也與其父母妻子同一轅又曰宋華弱樂轡少相狎長相優又相謗也優調戲也子蕩怒以弓梏華弱于朝子蕩樂轡也張弓以貫其頸若械之在手故曰梏平公見之曰司武而梏於朝難以勝矣說文曰梏手械所以告天桎足械所以質地也史記曰桓公乃詳為召管仲欲甘心實欲用之鮑叔牙迎受管仲及堂阜而脫桎梏漢書曰有罪當盗械者皆頌繫應劭曰智畧令名有當盗械但頌繫者言見寛容但處曺舎不入監牢盗械者恐其亡故著械不謂盗竊乃械也謝承後漢書曰赤眉入長安時式侯恭以弟盆子為赤眉所尊故自繫赤眉至更始奔走式侯從獄中破械出街中見獄門中魏畧曰賈逵為丞相主簿王欲征吴逵諌之王怒付獄獄吏以逵主簿不即著械逵曰促械我王且疑我在近職求緩于卿今将遣人来察我逵著械適訖而太祖果遣家中人就獄視逵既而教曰逵無惡意原復其職三國典略曰東魏中尉宋逰道限外受選人状嗣渤海王怒而禁之獄掾欲為之脫械逰道不肯曰此王命所著不可輕脱王聞而宥之北齊書曰庫狄干封武章郡王其子士文為貝州刺史性孤直其子啗官厨餅械於獄累日杖二百步送還京蕭子顯齊書曰戴僧静㑹稽永興人也少有膽力便弓馬於都載錦出為歐陽式所得繋兖州獄太祖遣薛淵餉僧静酒食以刀子置魚腹中僧静與吏飲醉以刀刻械手自折鎻發屋而出歸太祖後周書曰栁慶為雍州别駕廣陵王元欣魏之懿親其甥孟氏屢為凶横或有告其盗牛慶捕推得實趣令就禁孟氏殊無懼容乃謂慶曰今若加以桎梏後復何以脫之欣亦遣使辨其無罪孟氏由此益驕慶於是大集僚吏盛言孟氏依倚權戚侵虐之状言畢便令笞殺之此後貴戚歛手不敢侵暴唐書曰酷吏来俊臣所作大枷凡有十號一曰定百脉二曰喘不得三曰突地吼四曰著即承五曰失魂膽六曰實同反七曰反是實八曰死猪愁九曰求即死十曰求破家又令寝處糞穢備諸苦毒自非身死終不得出山海􅀴曰貳負臣曰危與貳負煞窫窳帝乃梏之䟽屬之山桎其右足桎械也反縛兩手與髮繫之山上郭璞注曰漢宣帝使人作上郡發盤石石室得一人蹝裸被髪反縛械一足以問羣臣莫之能知劉子政案此對之帝大驚於是時人争學山海經也又曰大荒之中有宋山者有木生山上名楓木蚩尤所棄桎梏蚩尤為黄帝所得械之後擲棄其械化而為樹也魏苑曰新野庾紹之少字道遐與南陽宋協中表之親桓𤣥時庾為湘東太守病亡協以義熈中晨起服茱萸酒一小兒通云庾湘東須㬰便至两脚著械脫之而坐孟子曰盡其道而死者正命也桎梏死者非正命也吕氏春秋曰齊有善相狗者其隣畜之數年不取䑕以告相者相者曰此良狗也志在麞豕鹿不在䑕也欲其取鼠則桎之其隣桎其後足則狗取䑕矣賈誼書曰紂作梏數千睨諸侯之不附己者而桎梏之文王桎梏囚于羑里七年而後得免及武王克殷既定令殷之民連梏而流之於河民輸梏者以手撒之弗敢敗之跪入之水不敢投也昔者文王擁此故思愛文王猶敬其梏况其法教乎風俗通曰延熹中京師長者皆著木屐婦人始嫁至作漆畫五采為系謹案黨事始發傳詣黄門北寺臨時惶恐不能信天任命多有逃亡不就拷者九族拘繋及所過厯長少婦女皆被桎梏應木屐像矣又曰械戒也所以警戒使為善也桎實也言其下垂至地然後吐情首實語林曰嵇中散夜彈琴忽有一鬼着械来歎其手快曰君一絃不調中散與琴調之聲更清婉問其名不對疑是蔡伯喈伯喈将亡亦被桎梏拲音拱周禮秋官上曰掌囚掌守盗賊凡囚者上罪梏拲而桎王之同族拲有爵者桎以待弊罪拲者兩手共入一木王同姓及命士已上雖有上罪或拲或桎而已弊猶㫁也晉令曰死罪二械加拲手趙書曰後石率精騎五千襲邵續一戰生擒續於青丘鉗頸拲手於㐮國青陽城鎻説文曰鋃鐺鏁也漢書食貨志曰王莽為貨有非詛者郡國檻車鐵鏁傳送長安鍾官又王莽傳曰民犯鑄錢伍人相坐入官為奴婢其男子檻車児女子步以鐵鏁鋃鐺其頸傳至鍾官奴以千萬數華嶠後漢書曰崔鈞為西河太守與袁紹起兵董卓收鈞父烈下之郿獄鋃鐺卓誅烈得歸長安也王隐晉書曰石勒鏁苟晞頸以為司馬而反殺之南史曰丹徒縣令沈㠝之以清亷抵罪㠝之吴興武康人性踈直在縣自以清㢘不事左右浸潤日至遂鏁繋尚方歎曰一見天子足矣王召問曰復欲何陳荅曰臣坐清所以獲罪上曰清復何以獲罪曰無以承奉要人上曰要人為誰㠝之以手扶四面指曰此赤衣諸賢皆是若臣得更鳴必令清譽日至㠝之雖危言上亦不責後知其無罪重除丹徒令又曰褚玠除山隂令縣人張次的王休達等與諸猾吏賄賂通姦全丁大戸類多隠没玠鏁次的等具状啟臺宣帝手勅慰勞并遣使助玠捜括所出軍人八百餘户三國典畧曰梁湘東王以鮑泉圍湘州乆不陷使平南将軍王僧辨代為都督數泉十罪舎人羅重歡領齊仗三百人與僧辨往先令通泉曰羅舍人被令送王竟陵来泉愕然顧左右曰得王竟陵助我賊不足平俄而重懽先入僧辯繼之泉方拂席而坐僧辯曰鮑郎卿有罪令㫖使我鏁卿勿以故意見期羅重歡宣令即鏁之於牀側泉舉止自若謂重歡曰稽緩王師甘受其罪但恐後人更思鮑泉之憒憒耳僧辯意甚不平泉乃為啟自申拜謝淹遲之罪湘東怒觧遂釋之宋躬孝子傳曰繆斐字文雅東海蘭陵人父忽得患醫藥不給斐晝夜叩頭不寝不食氣息将盡至三更中忽有二神引鏁而至求哀曰尊府君昔經見侵故有怒報君至孝所感昨為天曺所攝鏁鋃鐺斐驚視父已差云吾病恒見二人見持向来忽不見斐乃具説父曰吾曾過伍子胥廟引二神像置地當此是也劉欣期交州記曰居風山去郡四里夷人從太守裴庠求市此山云出金既不許尋有一嫗行田見金牛出食斫得鼻鏁長丈餘後人往往見牛夜出其色光耀數十里鉗說文曰鉗鐵有所刼束也􅎂脛鉗也􅎂音逓史記曰衛青平陽人其父為吏給事平陽侯家與妾通生青為侯家人少時歸其父使牧羊先母之子皆奴畜之不以為兄弟青嘗至甘泉居室有一鉗徒相青曰貴人也官至封侯青歎曰人奴之生得無笞罵即足矣安得封侯晉律曰鉗重二斤翹長一尺五寸太平御覽卷六百四十四
