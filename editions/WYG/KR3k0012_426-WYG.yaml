  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_426-1a, image: WYG0896/WYG0896-0715a.png}
body:
  text: 太平御覽卷四百二十六宋李昉等撰人事部六十七清亷下蕭子顯齊書曰王秀之字伯奮瑯琊臨人也為晉平太守至郡期年謂人曰此郡豐穰禄俸常盈吾生資已足豈可乆留而妨賢路上表請代時人謂王晉平恐富求歸齊春秋曰何敬叔為東海令在縣清亷不受饋夏節忽牓門受饋數日中得米二千餘斛他物稱是悉以代貧民輸租梁書曰范岫毎所居官恒以亷潔著稱長城令時有梓材巾箱至數十年經貴遂不改易在晉陵唯作牙管一雙猶以為費又曰沈顗字處黙吴興武康人也顗不治家産值齊末兵荒家人并日而食或饋其粱肉者閉門不受陳書曰姚察字伯審吴興武康人察自居顯要甚勵清節嘗有其門生送南布一端花練一疋察謂之曰吾所衣着止於麻布蒲練幸不煩此此人遜請猶兾受納察厲色驅出自此伏事者莫敢干也隋書曰狄士文嘗入朝遇上賜公卿入左藏任取多少他人爭多士文口銜絹一疋兩手各持一疋上問其故士文曰臣口手俱滿餘無所須上異之别賞物勞遣之唐書曰屈突通從太宗平薛舉時珍物山積諸將皆争取之通獨無所犯髙祖聞而謂曰公清正奉國著自終始名下定不虛也又曰賈敦頥曹州寃句人也貞觀中厯遷滄州刺史在職清潔毎入朝盡室而行唯弊車一乗羸馬數疋銜勒有闕以繩為之見者不知其刺史也又曰袁承序陳尚書僕射憲之子也武徳中厯轉建昌令在任清潔士吏懷之髙宗在藩太宗選學行之士為其僚屬謂岑文本曰梁陳名臣有誰可稱復有子弟堪招引否文本言隋師入陳伯司奔散唯袁憲獨在其主之傍王世充將受隋禪羣僚勸進憲子給事中承家託疾不署名此之父子足稱忠烈承家弟承序清貞雅操寔繼先風由是召為晉王友又曰蘇頲性廉儉所得俸禄盡推與諸弟或散之親族家無餘資又曰盧懷慎清儉不營産業器玩服飾無金玉文綺之麗所得俸禄皆隨時分散而家無餘蓄妻子匱乏又曰馮履謙補河北尉有部人張懷道任江陽尉與謙疇舊餉鏡一面謙集僚屬遍示之曰此張公所致也吾與之有舊吾効官以俸禄自守豈私受遺哉昌言曰清水見底明鏡照心余之効官必至於此復書於使者乃歸之又曰李懷逺久居榮位而常厲清廉宅舍都無所增改嘗乗欵叚馬豆盧欽望謂之曰榮貴如此何不買駿馬乗之答曰此馬幸免驚蹶無假别求聞者莫不嘆伏又曰裴玢鄜州刺史三年改授山南西道節度使玢厯二鎮頗以公清苦節為政不交權倖不務貢獻蔬食弊衣居處纔避風雨而廩庫饒實百姓安業又曰杜暹在家孝友撫異母弟昱甚厚常以公清勤儉為己任弱冠便自誓不受親友贈遺以終其身初為婺州叅軍秩滿將歸州吏以紙萬餘張贈之暹唯受一百餘悉還之時州寮别者見而嘆曰昔清吏受一大錢復何異也家語曰曾子弊衣而耕於野魯君聞之而致邑焉曾子固辭曰吾聞受人者常畏人與人者常驕人縱君不我驕也吾能勿畏乎孔子聞之曰參之言足以全其節說苑同又曰子路問於孔子曰仁人廉士窮則改節乎子曰改節則何以稱仁廉哉孔叢子曰子思居貧其友饋之粟者受三車焉或獻罇酒束脩子思弗當也或曰子取人粟而辭吾酒是辭少而取多也義則無名介則不全子思曰然伋不幸而貧於財至乃困乏將絶先人之祀夫所以受粟為賙之酒脯則所飲讌也方乏於食而乃飲讌非義也吾豈以為介哉或擔其酒脯以歸韓詩外傳曰鮑焦衣弊膚見挈畚採蔬遇子貢於道子貢曰吾子何以至於此乎鮑焦曰天下之道德教者衆矣吾何以不至於此吾聞之世不巳知而行之不巳者是爽行也上不巳用而干之不止者是毁廉也行爽廉毁然且弗舎惑於利者也子貢曰吾聞之非其世者不生其利汙其君者不食其土非其世而採其蔬詩曰普天之下莫非王土此誰之有哉鮑焦曰於戯吾聞賢者重進而輕退廉者易愧而輕死則棄其蔬而立槁於洛水之上列子曰東方有人焉曰爰旌目將有適也而餓於道孤父之盜曰邱見而下一飱以餔之旌目三餔而後能視曰子何為者也曰我孤父盜人爰旌目曰譆汝非盗耶吾義不食也兩手據地而嘔之不出喀喉焉而死孟子萬章曰陳仲子豈不誠廉士哉居於陵三日不食耳無聞目無見井上有李螬食實者過半矣匍匐徃將食之三咽然後耳有聞目有見也李食有蟲食之過半避兄離母處於於陵孟子曰伯夷聖之清者也又曰故聞伯夷之風者頑夫廉懦夫有立志晏子春秋曰景公以五十乘魚賜弦章章歸魚車塞塗撫其御之手曰昔者晏子辭賞以正君故過失不掩之今諸臣諂諛以干利吾若受魚是反晏之義而順諂諛之欲故辭魚不受君子曰弦章之亷晏子之遺行也又曰有工女託於晏子之家者曰婢子東郭之野人願得入身比數於下陳焉晏子曰乃今而後自知吾不肖也古之為政者士農工商異居男女有别而士無邪行女無􅁋事今吾專國而民有市心必行無清也遂不見韓子曰晉文公出亡箕鄭挈一壺飱而從迷而失道與文公相失餓而不敢食及文公反國伐原以為原令吕氏春秋曰古之人非無寶也所寶者異孫叔敖將死屬其子曰我死王必封汝汝毋受利地荆楚之間有寢邱其利少而甚惡可長有也其子受之至今不失淮南子曰曾子立亷不飲盗泉所謂飬志者也又曰君子不入市為其挫亷説苑曰孔子見景公景公致廩丘以為餼孔子辭不受出謂弟子曰吾聞君子當公以受禄今說景公未之行而賜我廩丘其不知丘亦甚矣遂辭而行又曰子思居於衛緼袍無裏二旬九食田子方使人遺白裘恐其不受因謂之曰吾假人遂忘之吾予人也如棄之子思辭曰伋聞忘予不如遺棄物於溝壑伋雖貧不忍以身為溝壑揚子法言曰楚兩龔之潔其清矣兩龔龔勝龔舍三輔决録曰安陵清者有項仲山飲馬渭水必與三錢以償之風俗通曰潁川黄子亷者毎飲馬投錢於水中又曰鮑焦耕田而食穿井而飲非妻所織不衣餓於山中食棗或問之此棗子所種也遂強嘔立枯而死又曰郝子亷飢不可得食寒不可得衣一分不取諸人曾過姊家飲留十五錢置席而去列子傳曰河南樂羊子妻不知何氏羊子嘗行路拾遺金一餅還以與妻妻曰妾聞志士不飲盗泉之水亷者不受嗟来之食况拾遺求利以汙其行乎羊子大慙捐金於里逺尋師學又曰凡為名者必亷亷斯貧為名者必讓讓斯賤長沙耆舊𫝊曰徐偉奴善叛知識欲為偉售之偉曰不可奴徃當復迯亡豈可虛受其價亷平義正若此廣州先賢傳曰䟽源字元流南海人出給郡役為戸曹佐源性㢘潔家貧餉晏不至同第人餉先到呼之共食源未嘗聽又曰丁宻字靖公蒼梧人少以清介為節非家織布物不衣非己種耕菜菓不食毫釐之餽不受於人汝南先賢傳曰周爕字彦祖好潛静飬志唯典籍是樂有先人草廬廬於東坑其下有陵田魚蛤生焉非身所耕漁則不食又曰胡定字元頴潁川人至行絶人在喪雉兎遊其庭雪覆其室縣令遣户曹排雪問定定已絶糓妻子皆卧在床令遣掾以糒就遺之定乃受半録異傳曰漢時大雪積地丈餘洛陽令身出案行至袁安門無行路謂安已死除雪入見安僵卧問何以不出安曰大雪人皆餓不宜干人令以安為賢舉為孝㢘郭縁生武昌先賢傳曰郭翻字長翔為人非己耕不食非妻自織不衣漢皇徳傳曰盖晉燉煌人天性皎潔自小未嘗過人飯貧為官書得錢足供而已不取其餘任嘏别傳曰嘏字紹先幼以至性見稱遇荒亂家貧賣魚官發魚價貴數倍嘏即取直如常陳留耆舊傳曰洛陽令董宣死詔使視之闌輿一乗白馬一疋帝曰董宣之清死乃知之益部耆舊傳曰朱倉字雲卿之蜀從處士張寧受春秋糴小荳十斛屑為之糧閉戸精誦寧矜之斂得米二十斛倉不受一粒鍾離意别傳曰意為尚書交趾太守張悝居官貪亂贓踰千金珠璣玩寶乃有石數収贓簿入司農詔悉以珠賜諸尚書尚書皆拜受意獨委珠璣於地不拜受明帝問委珠何也對曰愚聞孔子忍渴不飲盗泉之水曾子還車不入勝母之閭惡其名也今陛下以贓珠賜忠臣以故臣不敢受耳羊祜别傳曰昔有攘羊遺叔向母母埋之後事發檢羊肉盡唯舌存遂以羊舌為氏族祜其後也華陽國志曰何隨字季業除安漢令蜀亡去官時巴土飢荒所在無榖送吏行乏輒取道側民羊隨以綿繫其處使足所取直民視羊見綿相語曰聞何安漢清亷行過從者無糧必能爾耳持綿追還之終不受人為語曰漢安吏取糧令為之償范亭燕書曰皇甫真字楚季安定朝郍人也從輔國恪討擒冉閔即南圍拔業石氏舊都城内玩寶貨充溢真無所取唯存恤人物収斂圖籍真上䟽曰臣輒以家奴婢五十口馬七疋牛四十頭以助軍資物理論曰有吕子義當世清賢士也有舊人往存省嫌其設酒食懷乾糒而往主人榮其降乃為陳饌義出懷中乾糒求一杯冷水而食之語林曰何公為揚州其親有葬者乞數萬錢而帳下無有揚州常有㮧胡恩切米以賑孤寡乃有千餘萬斛虞存為治中面見道帳下空索求糶此米付帳下何公曰何道義不與孤寡争粒世説曰范宣潔行亷約韓豫章遺百疋絹不受請稍减遂至一疋既終不肯受韓後與范同載就車中手裂二丈與范云人寧可使婦無禈耶范笑而受之郭子曰庾公為䕶軍屬桓廷尉為索一椽吏桓後遇見徐寧而知之寧字安期東海人致與庾而稱云是海内清士顔延之廷語曰清者人之正路劉𢎞教曰録事巫衛忠清厲節衣食不充賜單複衣各一襲令官厨給食賜其家糓三百斛諸吏宜見賢思齊太平御覽卷四百二十六
