  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_510-1a, image: WYG0897/WYG0897-0564a.png}
body:
  text: 太平御覽卷五百十宋李昉等撰逸民部十逸民十嵇康髙士𫝊曰周豐魯人也潜居自貴哀公執贄請見之豐辭使人問曰有虞氏未施信於民而民信夏后氏未施敬於民而民敬何施而得此於民也對曰墟墓之間未施哀於民而民哀宗廟社稷中未施敬於民而民敬殷人作誓而民始叛周人作㑹而民始疑苟無禮義忠信誠慤之心以蒞之雖固結之民其不可解乎又曰顔歜者齊人也宣王見之王曰歜前歜曰王前王不恱歜曰夫歜前為慕勢王前為趨士王作色曰士貴乎歜曰昔秦攻齊令曰敢近栁下惠壟樵者罪死不赦有能得齊王頭者封萬户由是觀之生王之頭不如死士之壟齊王曰願先生與寡人遊食太牢乗安車歜曰願得蔬食以當肉安歩以當輿無罪以當貴清淨以自娯遂辭而去又曰魯連者齊人好竒偉俶儻嘗遊趙秦圍邯鄲連却秦軍平原君欲封連連不受平原君又置酒以千金為夀連笑曰所貴天下之人有為排患釋難而無取也即有取是商販之事不忍為也遂隐居海上莫知所在又曰河上公不知何許人也謂之丈人隐徳無言無得而稱焉安丘先生等從之脩其黄老業又曰鄭仲虞不知何許人也漢章帝自往終不肯起曰願陛下何惜不為太上君令臣得為偃息之民天子以尚書禄終其身世號之白衣尚書又曰司馬季主者楚人也卜於長安漢文帝時宋忠賈誼為大中大夫誼曰吾聞聖人不居朝廷必在巫醫試觀卜肆中見季主閒坐弟子侍而論隂陽之紀二人曰觀先生之状聴先生之辭世未嘗見也尊官髙位賢者所處何業之卑何行之汚季主笑曰觀大夫類有道術何言之陋夫相引以勢相導以利所謂賢者乃可為羞耳夫内無饑寒之累外無刼奪之憂處上而有敬居下而無害君子道也卜之為業所謂上徳也鳯凰不與燕雀為羣公等喁喁何知長者二人忽忽不覺自失後不知季主所在史記又載又曰班嗣樓煩人也世在京師家有賜書内足於財好老荘之道不屑榮官恒居山從禇莊子教曰若莊子者絶聖棄智脩性保身清虛淡泊歸之自然釣魚於一壑則萬物不干其志棲遲於一丘則天下不易其樂今吾子伏孔氏之軌迹馳顔閔之極藝既繫率於世教矣何用大道為自炫燿也昔有學步邯鄲者失其故步匍匐而歸恐以此類故不進也其行已持論如此遂終於家又曰蔣詡字元卿杜陵人為兖州刺史王莽為宰衡詡奏事到霸上稱病不進歸杜陵荆棘塞門舎中三徑終身不出時人諺曰楚國二龔不如杜陵蔣翁又曰逢貞字叔平杜陵人李邵公上郡人貞世二千石王莽辟不至嘗為杜陵門下掾終身不窺長安門但閉門讀書未嘗問政不過農田之事邵公王莽時辟地河西建武中竇融欲薦之面辭乃止家累百金優游自樂又曰薛方齊人養徳不仕王莽安車迎方因謝曰堯舜在上下有巢許今明王方欲隆唐虞之徳亦猶小臣欲守箕山之志莽說其言遂終於家又曰龔勝楚人王莽時遣使徴聘義不事二姓遂不食而死有父老來弔甚哀既而曰嗟乎薰以香自燒膏以明自消龔先生竟夭天年非吾徒也趍而出終莫知其誰也張顯逸民傳曰曹子臧者曹宣公之子也宣公卒負芻殺太子留而自立是為曹成公其後晉執成公將見子臧於周立之子臧辭曰前志有之聖逹節次守節次不失節為君非吾節也遂亡命奔宋晉侯請子臧反國而歸成公子臧以國致成公為君見左傳又曰周黨字伯况整身清約非法不行建武中徴為義郎以病辭詔曰昔夷齊不食周粟太原周黨不食朕禄後終隐居娯志不營於世虞般佑髙士傳曰皇甫士安少執冲素以耕稼為業專心好學每改服以行兼日而食得風痺或多勸脩名士安答曰居􅅵畆之中亦可以為樂堯舜之道何必崇利勢而後名乎詔以太子中庶子著作郎並不應也又曰朱冲字臣容南安人少有徳行閑靜寡欲好學而貧隣牛犯種擔蒭送牛牛主人大慙乃不復暴晉咸寧二年詔曰處士朱冲履行髙㓗經學修明徴為博士及太子中庶子冲每聞徴書至輙逃入深山以免居近夷俗羗戎奉事若君也又曰劉兆字延世公府五辟三徴皆不就安貧樂道潜志述作數十年不出門凡事述十餘萬言又曰伍朝字世明好學該博顯命屢加不就鎮南將軍劉𢎞上請補零陵太守主者以非選竟不聽尚書郎胡濟言朝守靜衡門志道日新誠江南之良才丘園之逸老也且白衣為郡前漢有舊賁于家食近代所崇事可行也朝竟不就後卒于家王隠晉書亦同也又曰郭文舉河内軹縣人年十三有懐隠志每行山林旬日忘歸父母喪終辭家不娶入陸渾嵩山少室乃隠華隂之崖以觀石室之石函步擔入吳興餘杭山中窮谷之地倚木於樹苫覆其上亦無壁障時多暴虎而文獨宿積十餘年恒著鹿皮裘葛巾司徒王公迎置西園中衆人問文曰饑而思食壯而思室自然之性先生獨無情乎文曰情由意生意息則無情又問先生獨處窮山若疾病遭命終則為烏鳥所食顧不酷乎文曰藏埋者亦為螻蟻所食復何異哉又曰虎狼害人先生獨不畏乎文曰人無害獸之心獸亦不害人耳居園七年逃歸餘杭袁淑真隠𫝊曰蘇門先生嘗見採薪於阜者先生嘆曰汝將以是終乎哀哉薪者曰以是終者我也不以是終者我也且聖人無懐何其為哀聖人以道徳為心不以富貴為志因歌二章莫知所終又曰鬼谷先生不知何許人也隐居鬼谷山因以為稱蘓秦張儀師之遂立功名先生遺書勉之曰二君豈不見河邉之樹乎僕御折其枝風浪盪其根此木豈與天地有仇怨所居然也子見嵩岱之松栢乎上枝干於青雲下根通於三泉千秋萬嵗不逢斧斤之患此木豈與天地有骨肉所居然也又曰鄭長者隐徳無名著書一篇言道家事韓非稱之世𫝊是長者之辭因以為名又曰南公為楚人埋名藏用世莫能識居國南鄙因以為號著書言隂陽事又曰野老六國時人遊秦楚間年老隐居掌勸為務著書言農家事因以為號又曰鶡冠子或曰楚人隐居幽山衣弊履穿以鶡為冠莫測其名因服成號著書言道家事馬援常師事之援後顯於趙鶡冠子懼其薦已也乃與援絶又曰楚人有獻魚于楚王曰今日漁獲食之不盡賣之不售棄之又可惜是故來獻左右曰鄙哉辭也楚王曰漁者仁人將以誨我也乃恤鰥寡而存孤獨出倉粟發幣帛去後宫楚國大治又曰河上丈人家貧編蕭自給其子沒泉得千金之珠丈人曰取石來鍛之夫千金之珠必在九重之泉驪龍頷下子能得其珠者遇其睡也使龍而寤子其虀粉矣又曰孫叔敖遇狐丘先生曰僕聞人有三利必有三患子知之乎夫爵髙者人妬之官大者主惡之禄厚者人怨之叔敖曰不然吾爵髙而志益下官大而志益小禄厚而施益廣丈人曰善哉言乎堯舜其猶病諸又曰客有候孔子者顔淵問曰客何人也孔子曰窅兮泛兮吾不測也夫良玉徑尺雖有十􅌇之土不能掩其光明珠度寸雖有函丈之石不能戢其耀苟藴美自厚容止可知矣說苑曰衛有丈夫負缶入井灌韭終一日一區鄧析下車教之為機後重前輕命曰槁終日灌韭百區不倦衛丈夫曰吾師言有機智之心我非不知不欲為也雜記事曰徐稚忽榮禄陳蕃欽其髙行以禮詔請署為功曹及師友祭酒又特為設東面之坐重席佩巾几以候稚辭疾不到王僧􅐚呉地記曰處士陸著字伯文漢桓靈之間州府交辟並不就唯事棲遁臨卒誡諸子弟云吾少嘗官勿苟仕濁世子弟遵訓遂終身不仕並有盛名又曰桐廬縣東有大漢溪九里注廬口溪南通新安東出富陽青山緑波連霄亘壑昔徴士散騎常侍戴勃逰此自言山水之致極也勃字長雲譙國銍人父散騎侍戴逵字安道弟子常侍國子祭酒顒並髙蹈俗外三世肥遁為海内所稱梁典曰戴顒字仲若與逵並隐遁有髙名顒以父不仕復循其業辟皆不就梁蕭繹孝徳傳曰繆裴字文雅東海蘭陵人世亂將家避地海濱不以遯世為悶不以窮居為傷浣衣濯冠以候導氣道學傳曰樂鉅公者宋人獨好黄老恬靜不慕榮進號曰安丘丈人又曰孔惣㑹稽山隂人逸操不辟唯有一奴自隨奴善吹笛惣為洛生詠與之相對而已世說曰郗超每聞欲髙尚隐退者輙為辦百萬資并為造立居室在剡為戴公起宅甚精戴始往居與所親書曰近至郯如入官舎又曰支道林譙國人就深公買印山深公曰未聞巢由買山而隐陸機招隐詩曰明發心不怡投袂聊躑躅躑躅欲安之幽人在深谷朝探南澗藻夕宿西山足輕條象雲構宻葉成翠幄左思招隐詩曰杖䇿招隐士荒途横古今巖穴無結構丘中有鳴琴陸雲逸民賦曰古之逸民輕天下輕萬物而欲專一丘之忻擅一壑之羙天下不易其樂萬物不干其志然後可以妙有生之極因無疆之休乃為賦曰相荒土以為居度山阿以考室層幽翳薈穹谷重深巖木振頴葛藟垂隂潜魚潦沚嚶鳥來吟鶴既囿於兹薄即蘭堂於芳林靡飛飄以赴節揮天籟以興音抱廻流之别沼食秋華於髙岑濛玉泉以濯流浚金谷以投簮遵渚龍見在林鳯戢遁緑野而宅心望巖穴而凱入太平御覽卷五百十
