body:
  text: 太平御覽卷八百一十五宋李昉等撰布帛部二錦繡錦說文曰錦襄邑織文也釋文曰錦金也作之用功重其價如金故制字帛與金也禮記王制曰錦文珠玉成器不鬻於市不示民以奢與貪成猶善也禮記玉藻曰童子之節也緇布衣錦縁錦紳并紐錦束髪皆朱錦童子未冠之稱冠禮曰將冠者采衣紒也又玉藻曰君衣狐白裘錦衣以裼之錦衣狐裘諸侯之服也又曰居士錦帶又中庸曰詩云衣錦尚絅惡其文之著也故君子之道闇然而日章小人之道的然而日亡左傳閔公曰衛廬于曹齊桓公歸夫人魚軒重錦三十兩襄十九曰晉侯先歸公享晉六卿于蒲圃賄荀偃束錦加璧又襄二十六曰左師見夫人之歩馬者歩馬習馬問之對曰君夫人氏也左師曰誰為君夫人余胡弗知圉人歸以告夫人使饋之錦與馬先之以玉又襄三十一曰子皮欲使尹何為邑子産曰少未知可否子皮曰吾愛之使往而學焉亦愈知治子產曰人之愛人求利之也今吾子愛人以政猶未能操刀而使割也其傷實多子之愛人傷之而已子有美錦不使人學製焉大官大邑身之所庇而使學者製焉其為美錦不亦多乎言官邑之重多於美錦也又昭十三曰晉舍諸侯次于衛地叔鮒求貨於衛滛芻蕘者滛放也欲使衛患之而致貨也衛人使屠伯饋叔向􅅅與一篋錦屠伯衛大夫也曰諸侯事晉未敢携貳况衛在君之宇下屋宇之下喻近而敢有異志芻蕘者異於他日敢請之請止之也叔向受􅅅反錦受􅅅示不逆其意且非貨也又昭十三曰平丘之會公不與盟晉人執季孫意如以幕䝉之使狄人守之司鐸射魯大夫也懷錦奉壺飲氷以匍匐焉守者御之乃與之錦而入匍匐竊往飲季孫也氷箭筩盖可以取飲者也又昭二十六曰齊侯將納公命無受魯貨申豐從女賈豐賈二人皆季氏家臣也以幣錦二兩二丈為一端二端為一兩所謂匹也二兩二匹縛一如瑱瑱充耳縛卷也急卷使如充耳易懷藏適齊師謂子猶之人髙齮齮子猶家臣子猶梁丘據能貨子猶為髙氏後粟五千庾言若能為我行貨於子猶當為請使得為髙氏後又當致粟五千庾庾十六斗凡八千斛髙齮以錦示子猶子猶欲之齮曰魯人買之百兩一布以道之不通先入幣財言魯人買此甚多布陳之以百兩為數子猶受之又哀上曰吳人藩衛侯之舎子服景伯謂子貢曰夫諸侯之㑹事既畢矣侯伯致禮地主歸餼侯伯致禮以禮賔也地主所謂主人也餼生物以相辭也各以禮辭讓今吴不行禮於衛而藩其君舎以難之子盍見大宰乃請束錦以行以賂吳毛詩淇澳碩人曰碩人其頎衣錦褧衣齊侯之子衛侯之妻又蟋蟀曰角枕粲兮錦衾爛兮又巷伯曰巷伯刺幽王也寺人傷於讒而作是詩也萋兮斐兮成是貝錦萋斐文相錯也彼譛人者亦以太甚論語曰宰我問三年之喪期已久矣君子三年不為禮禮必壞三年不為樂樂必崩舊榖既没新榖既升鑽燧改火期可已矣子曰食夫稻衣夫錦於女安乎曰安女安則為之爾雅曰素錦雕杠尚書大傳曰古之帝王者必有命民能敬長憐孤取舎好讓舉事力者命於其君然後得乘飾車軿馬衣文錦漢書曰項羽在闗中懷思東歸曰富貴不歸故鄉如衣錦夜行又曰景帝二年下詔曰雕文刻鏤傷農事錦綉纂組害女工宜禁之又曰賈人毋得衣錦謝承後漢書曰朱寵仲威為太尉家貧食脱粟卧布被朝廷賜錦被梁肉皆不敢當漢官儀曰虎賁中郎將古宮衣紗縠軍衣虎文錦袴餘郎亦然漢官典職曰尚書郎直中官供錦被魏志曰景初中賜侯女王絳地交龍錦五疋紺地勾文錦三疋倭獻暴文雜錦二十疋魏文帝詔曰前後每得蜀錦殊不相比適可訝而鮮卑尚復不愛也自吾所織如意虎頭連璧錦亦有金簿蜀簿來至洛邑皆下惡是為下工之物皆有虛名典畧曰孔子反衛夫人南子使人謂之四方君子之來者必見小寡君子不得已見之夫人在錦帷中孔子北面稽首吳志曰蔣欽為右䕶軍孫權常入内其母練帳縹被權歎其在貴守約勅御府為其母作錦改易帷帳又曰甘寧往止常以繒錦維舟去輙割弃以示奢又曰諸葛融父兄質素雖在軍旅身無采飾而融錦􅄢文繡獨為奢侈環氏吳紀山蜀遣使献重錦千端江表傳曰陸遜攻劉備於夷陵備舎船步走燒皮鎧以斷道使兵以錦挽車走入白帝蜀志曰先主入益州賜諸葛亮法正張飛闗羽錦及千端王隠晉書曰袁甫字公曹稱所知於領軍何朂朂曰君稱其好人則多所宜何以唯欲使宰民不可為臺閣職乎甫曰人各有能此人雖好好莫過錦錦不可以為􅀈王隠晉書曰竇滔妻蘇氏善属文符堅時滔為秦州刺史被徙流沙蘇氏思之織錦為文因詩以寄滔循環宛轉讀之詞甚悽切晉書曰石季龍僣立遷都于鄴傾心事佛圖澄有重於勒下書依澄以綾錦乘雕輦南史曰宋元凶劭將作難賜袁淑等袴褶又就主人取錦裁三尺為一段又中裂之分蕭斌與淑及左右使以縳袴褶齊書曰江淹為宣城太守時罷歸始泊禪靈寺渚夜夢一人自稱張景陽謂曰前以一疋錦相寄今可見還淹探懷中得數尺與之此人大恚曰那得割截都盡顧見邱遲謂餘尺既無用以遺君自爾淹文章躓矣趙書曰前石死謂大臣子弟六十人為挽郎引錦一疋後魏書曰甄琛為定州刺史既至鄉衣錦晝遊政體嚴細甚無聲譽又曰孝武至彭城宋江夏王義恭獻蠟燭十挺武陵王駿獻錦一疋北史曰齊畢義雲家有十餘機織錦并造金銀器物後周書曰太祖曾在同州與羣公宴集出錦􅄢及雜綾絹數段命諸將樗蒱取之唐書曰王方慶天后初為廣州都督境内清肅手制褒之曰朕以卿歴職有稱故授此官既美化逺聞實副朝寄今賜卿雜綵六十段并端錦二物以彰善政也又曰大厯初代宗詔許宰臣元載王縉及左僕射裴冕户部侍郎判度支第五奇京兆尹黎幹各出錢三十萬宴郭子儀私第内侍魚朝恩叅其㑹馬朝恩出錦三十疋羅五十疋綾一百疋為子儀纒頭之費極懽而罷舊俗賞歌舞人以錦綵置之頭上為之纒頭宴享加惠借以為詞又曰大厯中代宗勑曰王制命市納賈以觀人好惡布帛精麄不中度廣狹不中量不鬻於市漢詔亦云纂組文繡害女工也朕思以恭儉克巳淳樸化人每尚素𤣥之服庶齊金土之價而風俗不一踰侈相髙浸弊於時其來自久耗縑贈之本資錦綺之奢異彩奇文恣其誇耀今師旅未戢黎元不康豈使滛巧之功更虧恒制在外所織造大張錦軟錦瑞錦透背及大􅰃錦竭鑿六硬已上錦獨窠文紗四尺幅及獨窠吳綾獨窠司馬綾等並宜禁斷其長行髙䴡白錦雜色錦及常行文字綾錦花文所織盤龍對鳯麒麟獅子天馬辟邪孔雀仙鶴芝草方字雙勝及諸織差様文字等亦宜禁斷又曰張萬福為和州刺史賊許果至楚州大掠節度使􅅊元甫命萬福追討未至淮隂果為其將康自勸所逐勸擁兵繼掠循淮南東萬福倍道追而殺之代宗發詔以勞之賜衣一襲宮錦十雙又曰太和中賜修指南車記里鼓人故金忠義男公亮緋衣牙笏錦三十疋范子計然曰錦大丈出陳留列子曰范氏之藏火子華曰若能入火取得錦者從所多少商丘聞入火往還而身不燒尸子曰夫絲捨而弗治則腐而棄使女繰之以為美錦人君朝而服之子思子曰管仲繢錦也雖惡而登朝子產練絲也雖美而不尊淮南子曰管仲文錦也雖醜登廟子產練帛也美而不等抱朴子曰藉儒董鄧猶錦紈之裹塵埃又曰寸錦足以知巧制暑足以知勇又曰寸裂之錦黻未若堅完之常布又曰小文雖巧猶寸錦細碎之珍太公六韜曰夏桀殷紂之時婦人錦繡文綺之坐席衣以綾紈三百人穆天子傳曰吉日甲子天子乃執白圭𤣥璧以見西王母好獻錦組百純郭璞注曰純疋錦名也組綾屬青祖也西王母再拜受之又曰盛姬之喪天子使嬖人贈用文錦漢武内傳曰帝見西王母巾器中有一卷小黃書盛以紫錦之囊帝問此書是仙方耶不審其目可得瞻眄不王母出以示之曰此五岳之真形啚也文秘禁豈汝穢質所宜佩王母命女宋靈賔更取一啚以與武帝賔探懷中得一卷盛以雲錦之囊王母起立手以付帝説苑曰魏文侯與田子方語有兩童子衣錦而侍於君側田子方曰此君之寵子乎文侯曰非也此其父死於戰此㓜孤也寡人收之潜夫論曰夫攻玉以石治金以鹽濯錦以魚浣布以灰物故有以醜治好者矣郭子橫洞冥記曰鼎元年起招仙靈閣於甘泉宫之西編翠羽麟毫為簾有走龍錦翻鴻錦西京雜記曰武帝時得貳師天馬以玟㻁石為鞍轡鏤以金銀以緑地五色錦為蔽泥王子年拾遺記曰員嶠之山名環丘東有雲石廣五百里有蠶長七寸黑色有角鱗以霜雪覆之然後作繭長一尺其色五綵織為文錦入水不濡其質輕復柔滑又曰周成王時因祇國致工女一人善織以五色絲内口中手引而結之便成文錦其國人來獻有雲崑錦文如雲霞有樓堞有雜珠錦文似貫珠佩也有篆𨽻錦文似羅燈燭也幅皆廣三尺又曰周靈王起昆昭之臺以享羣臣張鸞章錦文如鸞翔又曰吳趙逹之妹善書畫巧妙無雙能於指間以綵絲為雲龍虬鳯之錦大則盈尺小則方寸神仙傳曰淮南王為八公張錦綺之帳燔百和之香又曰左慈字元放廬江人少有神道嘗在魏武帝坐帝曰恨無蜀中生姜耳放曰亦可得也因曰吾前遣人到蜀買錦可過勑使者增市二端須臾得姜還并獲使報華陽國志曰閻憲字孟度成都人名知人為綿竹令以禮讓化民莫敢犯者有民杜戍夜行得遺賄一囊中有錦二十疋求其主還之曰縣有明君何敢負也陳留風俗傳曰襄邑縣南有渙水北有睢水傳曰睢渙之問文章故有黼黻藻錦日月華蟲以奉天子宗廟御服焉異物志曰錦鳥文章如丹地錦而藻繢交俗人見其似錦因謂之錦焉鄴中記曰石虎冬月施熟錦流蘇斗帳四角安純金寵頭衡五色流蘇或用黃地慱山文錦或有紫綈及小明光錦又曰織錦署在中向方大登髙小登髙大明光小明光大慱山小􅀶山大茱萸小茱萸大交龍小交龍蒲桃文錦班文錦鳯凰錦朱雀錦韜文錦桃核文錦丹陽記曰厨場錦署平關右遷其百工也江東歴代尚未有錦而成都獨稱妙故三國時魏則資於蜀而吳亦資西道語林曰陳元方遭父䘮骨立其母愍之以錦被䝉其上郭林宗往吊見而責之賔客絶百許日世説曰石崇錦步障四十里左思蜀都賦曰貝錦匪成滛色江波古詩曰錦衾遺洛浦同袍與我違夏侯孝若集羊太常辛夫人傳曰夫人字憲英衞尉肅侯毗之女不好華麗繡上夫人􅂒子陂緑以錦不肯服從外孫胡母楊上夫人錦被夫人反卧之諸葛亮集曰今民貧國虛決敵之資唯仰錦耳張溫表曰劉禪送臣溫熟錦五端魏武與楊彪書曰今贈足下錦裘二領繡尚書益稷曰予欲觀古人之象藻火粉米黼黻絺繡尚書大傳曰未命為士得衣繡毛詩終南曰君子至止黼衣繡裳又楊之水曰素衣朱繡從子於鵠又九罭曰九罭美周公也我覯之子衮衣繡裳周禮秋官下小行人曰合六幣琮以錦琥以繡又冬官上畫繢曰五綵備謂之繡禮記月令曰仲秋之月命具文繡有恒必循其故左傳閔公曰狄伐衛公與石祁子玦寗莊子矢曰以此賛國擇利而為之與夫人繡衣曰聽於二子春秋潜潭巴曰天子文繡布地必動絶無嗣釋名曰繡修也文修然也史記曰范睢説昭王曰秦韓之地形相錯如繡又曰文帝所幸慎夫人令衣不得曳地惟不得文繡以示淳樸又曰楚莊王有愛馬衣以文繡漢書曰廣川王去後昭信譛姬榮愛視瞻意態不善疑有私時愛為王刺方領繡去取燒之又曰齊織作繡宣帝時呼韓耶單于來賜帛繡綺八千疋又曰武帝祠大一祝宰衣紫及繡又曰江克使匃奴拜直指繡衣御史使督三輔又曰暴勝之為直指使者衣繡持斧遂捕盜賊威震州郡又曰􅄢賔刺文繡又曰刺繡文不如倚市門此言未業貧者之資也又曰霍光薨贈絮繡被百領又百官表曰侍御史有繡衣直指武帝所制東觀漢記曰更始遂共謀誅伯升乃大㑹諸將以成其計更始取伯升寳劔視之繡衣御史申屠達隨献玉玦更始竟不能發又曰李忠獨不掠利物上曰我欲賜之諸君無望乎取大驪馬及繡被以賜忠魏志曰張既為尚書出為雍州刺史太祖謂既曰還君本州可謂衣繡晝行魏畧曰大秦國有金縷繡色絹其國利得中國絲素解以為胡陵晉中興書曰中宗所幸鄭夫人衣無文繡後魏書曰王憲為并州刺史還京師以憲年老時賜錦繡布帛珍羞禮膳管子曰梁女樂三萬人無不服文繡衣裳也墨子曰古之人未知為衣服皮帶茭今則厚斂百姓以錦繡文綵靡曼衣范子計然曰能繡細文出齊上價疋二萬中萬下五千也孫卿子曰天子尊重無上矣衣被則五綵雜間色重文繡莊子曰楚聘莊子莊子曰子不見夫犧牛乎衣以文繡入於太廟雖欲為孤犢其可得乎淮南子曰繡為被則宜為冠則譏國語齊桓公曰昔吾先君襄公陳妾數百食必梁肉衣必文繡帝王世紀曰紂不服短褐處於茅屋之下必將衣繡遊於九重之臺賈誼曰繡是古天子服今富人大賈嘉㑹召客以被牆屋説苑曰晉平公使叔向聘其吳人餙舟以送之左百人右百人有繡衣而豹裘者有錦衣而狐裘者歸以告平公平公曰吳其亡乎又曰鄂君乘青輸之舟張翠盖越人擁擑而歌曰心悦君兮君不知於是鄂君舉繡被而覆之楊子法言曰今之學者非獨為華藻又從而繡其鞶帨鹽鐡論曰古庻人老耄而後衣絲其餘則麻枲而已故命曰布衣今富者縟繡羅紈中者素綈錦氷論衡曰齊郡能刺繡恒女無不能者襄邑能織綿恒婦無不巧者目見而手狎也又曰刺繡之師能縫帷裳納縷之工不能織錦儒生能為文吏文吏不能為儒生也文吏一旦在位則鮮冠利劔一歲與職則田宅併集又曰繡之未刺錦之未織綿帛何以異哉及其加五采之功施計縷之飾則文章煥煥學士有文章其猶綿帛布色之功桓譚新論曰陽城子姓張名衡蜀郡人王翁與吾俱為講學祭酒及寢疾預買棺槨多下錦繡立被發塚崔贛易離之大過曰被繡夜行不見文章安坐玉堂洞冥記曰甘泉有霞光繡藻龍繡連煙綉王子年拾遺記曰孔子生之夕有麟吐玉書於闕里人家乃以繡紱繫麟角而去又曰吳主孫權常歎魏蜀未夷軍旅之隙思得善畫者使圖作山川地形軍陣之像趙夫人曰丹青之色易歇滅不可為乆寶妾能刺繡作列國圖於帛上冩五岳河海城邑行陣之形進於吳主時人謂之針絶吳越春秋曰吳王死辭曰不忍見伍子胥吾死必結壁連組以冪吾目恐其不蔽即復重羅繡三以為掩明生不昭我身死不見我形吾何言哉物理論曰世傳有夫死而婦許以不嫁者誓以繡衣襚以衣尺納諸棺焉後三年婦出適迎有日矣有行道人夜求人家宿向晨主人語之婦約之辭寄所誓之衣曰子到若千里當逢之還此衣焉或者出門到所言處果見迎車具以事告還其繡衣婦遂自經而死又曰夫論事比類不得其體雖餙以華辭文以美言無異錦繡衣掘株管弦樂土梗非其趨也世説曰曹植妻衣繡太祖登臺見之以違制命還家賜死戒經六禽變曰寅鳥衣裳丈繡夢書曰錦繡為憂事有文章夢得繡憂縣官也班固詩曰長安何紛紛詔葬霍將軍刺繡被百領縣官給衣衾張衡四愁詩曰美人贈我錦繡段何以報之青玉案班固與竇將軍牋曰固於張掖縣受賜虎頭繡鞶囊一雙慕容晁與顧和書曰今致繡鞾一量太平御覽卷八百一十五
