  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_442-1a, image: WYG0897/WYG0897-0075a.png}
body:
  text: 太平御覽卷四百四十二宋李昉等撰人事部八十三知人上尚書臯陶曰都在知人在安民禹曰吁咸若時惟帝其難之言堯亦以知人安民為難故曰吁知人則哲能官人安民則惠黎民懐之禮記曰趙文子與叔譽觀乎九原文子曰死者如可作也吾誰與歸叔譽曰其陽處父乎處父字文公之傅也文子曰行并植音持於晉國不沒其身其智不足稱也并專也謂剛而專為狐射姑所殺其舅犯乎文子曰見利不顧其君其仁不足稱也我則随武子乎利其君不忘其身謀其身不遺其友晉人謂文子知人文子其中退然如不勝衣其言呐呐然如不出諸其口所舉於晉國管庫之士七十有餘家生不交利死不属其子焉春秋僖七年曰鄭殺申侯初申侯申出也姊妹之子曰出有寵於楚文王文王将死與之璧使行曰唯我知女女專利而不厭予取予求不女疵瑕從我取從我求以不為女為罪後之人将求多於女謂嗣君也求多以禮義大望責之女必不免我死女必速行無適小國将不女容焉政狹法峻既葬出奔鄭又有寵於厲公子文聞其死也曰古人有言曰知臣莫若君弗可改也已又曰晉文公及曹曹共公聞其駢脅欲觀其裸浴薄而觀之薄廹也駢脅合幹僖負羈之妻曰吾觀晉公子之從者皆足以相國若以相若遂以為𫝊相夫子必反其國反其國必得志於諸侯而誅無禮曹其首也子盍蚤自貳焉自貳自别異於曹乃饋盤飱寘璧焉臣無境外之交故用盤藏寘飱中不欲令人見也公子受飱反璧又曰秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還遂霸西戎用孟眀也君子是以知秦穆之為君也舉人之周也與人之壹也壹無二心孟明之臣也其不解也能懼思也子桑之忠也其知人也能舉善也子桑公孫枝舉孟明者詩曰于以采蘩于沼于沚于以用之公侯之事秦穆有焉詩國風言沼沚之蘩至薄有采以共公侯以喻秦穆不遺小善夙夜匪懈以事一人孟明有焉詩大雅善仲山甫也一人天子也詒厥孫謀以燕翼子子桑有焉詒遺也燕安也翼成也詩大雅美武王能遺其子孫善謀以安成子孫言子桑有舉善之謀又曰晋陽處父聘于衞反過寗寗嬴從之及温而還其妻問之嬴曰以剛商書曰沈潜剛克髙明柔克夫子壹之其不没乎陽子性純剛天為剛徳猶不干時寒暑相順况在人乎且華而不實怨之所聚也言過其有犯而聚怨不可以定身剛則犯人余恐不獲其利而離其難是以去之為六年晉殺處父又曰晋侯觀于軍府見鍾儀問之曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使稅之税觧也召而弔之再拜稽首問其族對曰伶人也伶人樂官公曰能樂乎對曰先父之職官也敢有二事使與之琴操南音南音楚聲公曰君王何如對曰非小人之所得知也固問之對曰其為太子也師保奉之以朝於嬰齊而夕於側也嬰齊令尹子重側司馬子反言其尊卿敬老不知其他公語范文子文子曰楚囚君子也言稱先職不背本也樂操土風不忘舊也稱太子抑無私也舍其近事而逺稱少子以示性所自然明至誠名其二卿尊君也尊晋君也不背本仁也不忘舊信也無私忠也尊君敬也仁以接事信以守之忠以成之敬以行之事雖大必濟言有此四徳必能成大事君盍歸之使合晋楚之成公從之重為之禮使歸求成又曰子産始知然明問為政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀也子産喜以語子太叔且曰他日吾見蔑之面而已蔑然明名今吾見其心矣又曰韓宣子如齊納幣見子雅召子雅召子旗子旗子雅之子使見宣子曰非保家之主也不臣志氣亢見子尾子尾見強強子尾之子宣子謂之如子旗亦不臣大夫多笑之唯晏子信之曰夫子君子也夫子韓起君子有信其有以知之矣為十年齊欒施疆髙彊來奔漢書曰薛宣為丞相而翟方進為司直宣知方進大儒有宰相器深結厚焉後方進竟代為丞相又曰薛宣字貢君初宣察孝亷瑯琊太守趙貢見宣異之令妻子與相見戒曰貢君至丞相我兩子亦中丞相史宣為相除趙貢兩子為史東觀漢記曰上既破邯鄲誅王郎召鄧禹􅀫夜語曰欲北發幽州突騎諸将誰可使者禹曰吳漢可其人勇鷙有智謀諸将鮮能及者上於是以漢為大将軍漢遂斬幽州牧苖曽上以禹為知人更始時大司馬朱鮪在洛陽上欲南定河内問禹曰諸将誰可使守河内者禹曰冦恂文武備足有牧民之才河内富貴南廹雒陽非冦恂莫可使也上拜冦恂為河内太守又曰朱勃字叔陽年十二能誦詩書候馬援兄勃衣方令能矩步辭言閑雅援纔知書見之自失兄知其意乃自酌酒慰援曰朱勃小器速成智盡此耳卒當從汝禀學及援為将軍封侯而勃位不過縣令又曰虞延字子大陳留人孝明帝時有新野功曹鄧寅以外戚小侯每豫朝㑹而容姿起步出於衆􅂋宗目之顧左右曰朕之儀貎豈若此人特賜輿馬之服延以寅雖有容儀而無實行未嘗加禮拜郎中遷𤣥武司馬寅在職不服父䘮帝聞乃歎曰知人則哲唯帝難之信哉斯言以延為明謝承後漢書曰許邵字子将汝南平興人清諭風行髙唱草偃多所賞識㧞樊子昭於未聞天下咸稱許邵袁山松後漢書曰李膺子中位至東平相初曹操㣲時瓚異其才将没謂子宣等曰世将亂矣天下英雄無過曹操張孟卓與吾善袁本初汝外親雖爾勿依必歸曹氏諸子從之並免亂世又曰南陽何顒初見曹操嘆曰漢将亡安天下者必此人也操以是嘉之魏志曰武帝機警有權數時人莫知者橋𤣥見而異焉謂曰今天下将亂安生民者其在君乎太祖常感其知已後經過𤣥墓輒悵然致祭又曰王粲字仲宣蔡邕見而竒之時邕才學􅂋著常車騎填巷賔客迎座聞粲在門倒屣迎之粲年既㓜弱容状短小一座皆驚邕曰此王公孫也有異才愧吾不如也吾家書籍文章盡皆與之又曰陳羣為童兒時祖常異之曰此兒必興吾門羣為司空西曹属時薦樂安王模下邳周逵者太祖辟之還教以為模逵穢徳終必敗太祖不聽後模逵皆坐奸宄誅太祖以諭群薦廣陵陳􅔬丹陽戴乾太祖皆用之後吳人叛乾忠義死難喬為名臣又曰楊駿字季才司馬宣王年十六與駿相遇駿曰此非常人也同郡王象少孤特為人僕𨽻年十七八使牧羊而私讀書駿見其羙入質即贖著家中聘妻立屋然後與别駿自少及長以人倫自任魏畧曰趙岐逃難匿姓名賣餅北海市時安邱孫嵩字賔石遊市見岐察非常人呼與共載岐懼失色嵩乃令騎屏行人從容問曰視子非賣餅者不有不直重怨即忘命乎北海孫賔石闔門百口視能相濟岐素聞嵩名即以實告之遂與俱歸藏岐複壁中孫盛魏氏春秋曰嘉平元年右将軍夏侯覇夲蜀人問太傅之徳覇對曰彼自為家非人臣也問京師雋士對曰有鍾㑹者若􅃹朝政吳蜀之憂也蜀志曰先主年十五母使學與同宗劉徳然遼西公孫瓉俱事同郡盧植徳然父元起嘗資給先主與徳然等起妻曰各自一家何能常爾耶起曰吾宗有此非常人也又曰諸葛亮字孔明瑯琊人耕壠畆好為梁父吟自比於管仲樂毅時人莫之許也唯博陵崔州平潁川徐庶與亮友善謂為信然先主屯新野庶見先主器之庶謂先主曰諸葛孔明卧龍也将軍豈願見之先主曰君與俱來庶曰此人可就見不可屈致也将軍宜枉駕過之由是先主詣亮又曰龎統字士元襄陽人少時樸鈍未有識者潁川司馬徽清雅有知人鑒統弱冠往見徽徽採桑樹上坐統桑下共語自晝逹夜徽甚異之稱當為南州士人冠冕由是漸􅂋吳志曰顧邵字孝則雍長子也年三十七起家為豫章太守小吏姿質佳者奨令就學擇其先進擢置左右職舉善以教風化大行初錢塘丁謂出於役伍陽羡張康生乎民庻烏程吳粲雲陽殷禮起乎㣲賤邵皆㧞而友之謂至典軍中郎康至丹陽禮至零陵令粲至太子少𫝊又曰張温字惠恕少修操容貎瓌瑋權聞之以問公卿曰温當今與誰為比大司農劉基曰無可與為軰顧雍曰温當今無軰權曰如是張允不死也徴到延見文辭占對觀者傾悚權改容加禮又曰張昭字子布為人矜嚴忠謹能識人諸葛恪字元遜年少之時衆人竒其英才昭言終敗葛氏者元遜也吳書曰陶謙字􅚿祖年十四獨帛幡乘竹馬而戯邑中兒童皆随之蒼梧太守同縣甘公出遇之於塗見其容貎異住車與語甚恱之因許妻以女甘夫人怒曰聞陶家兒遨戯無度如何以女許之甘公曰彼有竒志必大成遂與之後為徐州刺史王隠晋書曰石苞少子崇字季倫苞臨終預分諸子財物獨不及崇其母以為言苞曰此兒雖小大自能得財也又曰魏舒字陽尤任城人容貎朴實少號遲鈍人莫知之唯叔父衡知其竒每有賔客已常勸使過舒言吾兄子非常人也虞預晋書曰魏舒少名遲鈍唯太原王又曰卿終當為台輔然亦不能令妻子免饑寒吾當助卿營之常借給舒受而不辭又曰武陔字元夏沛國竹邑人父同有顯名陔及二弟昭茂皆總角見稱時同郡劉公榮名知人嘗詣同過陔兄弟與觀其舉動便出語同曰君三子皆國士也元夏良最優出輔佐之風仕官可為亞公叔夏季夏不减常伯納言陔後果開府余廣晋書曰鄭齊純和有識初荀攸見齊曰鄭公業為不亡矣時相國掾魏諷有盛名同郡任覧謂齊曰諷姦雄必以禍終子冝絶之後諷果敗司空王朗掾委以求才齊舉髙陽許允扶風魯芝東莱王基並為名臣又曰魏謁者郭𤣥信出使從𢎞農求御人遣石苞及鄧艾為御行十餘里𤣥信謂二人曰子並當至将相既而苞為縣吏到鄴賣鐵於市長趙元儒異之曰公輔才也遂與交稍遷至𢎞農司馬欲求縣吏部郎許允謂苞曰君我軰人也當相引置朝廷何欲小縣乎苞還嘆不意允之知巳晋書陶侃傳曰樂廣欲㑹荆掦士人武庫令黄慶進侃於廣人或非之黄慶曰此子終當逺到復何疑也又曰王導少有風鑒識量清逺年十四陳留髙士張公見而竒之謂其從兄敦曰此兒容貎志氣将相之器也又石苞傳曰趙元儒有知人鑒見苞異之因與結交歎苞逺量當至公輔又曰陸雲㓜時呉尚書廣陵閔鴻見而竒之曰此兒若非龍駒當是鳯雛又曰劉裕為布衣衆未之識也唯王謐獨竒貴之嘗謂裕曰卿當為一代英雄晋書曰庾翼字稚恭風儀俊偉少有經綸大畧京兆杜乂陳郡殷浩並才名冠世而翼弗之重也毎語人曰此輩冝束之髙閣俟天下太平然後議所任耳見桓温總角之中便竒之以逺略因言於成帝曰桓温有英雄之才願陛下勿以常輩畜之冝委以方召之任必有𢎞濟艱難之勲又曰謝安常疑劉牢之不可獨任又知王味之不冝專城牢之既以亂終而味之亦以貪敗由是識者服其知人又陶侃傳曰劉𢎞為荆州刺史将之官辟侃為蠻長史遣先向襄陽討賊張昌破之𢎞既至謂侃曰吾昔為羊公參軍語吾其後當居此今相觀察必繼老夫矣又曰時豫章郎中令楊晫陶侃州里也為鄉論所歸侃詣之晫曰易稱貞固足以幹事陶士行是也與同乘見中書郎顧榮榮甚竒之吏部郎温雅謂晫曰奈何與小人共載晫曰此人非凡器也太平御覧卷四百四十二
