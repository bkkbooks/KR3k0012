body:
  text: 太平御覽卷九百八十七宋李昉等撰藥部四石藥上紫石英白石英青石英赤石英黄石英黒石英石硫黄石硫青石硫赤石膽石肺石脾青石脂赤石脂黄石脂白石脂黒石脂凝水石陽起石石鍾乳孔公孽礜石紫石英山海經曰單孤之山蓬水出焉中多紫石英魏氏春秋曰黄初元年明帝愈崇宮殿雕飾觀閣取白石英及紫石英五色文石於太行谷成之山宋書曰謝瞻字宣逺六嵗能屬文為紫石英讃為當時才士嘆異隋書曰梁彦光少岐嶷有至性七嵗時父遇篤疾醫云餌五石可愈時求紫石英五色文石於太行不得彦光憂瘁不知所為於園中見一物彦光所不識怪而持歸即紫石英也親屬咸異之抱朴子内篇曰或問不寒之道荅曰以立冬之日或服六丙六壬符或服太陽酒或服紫石英東莞縣西北二十五里有爆山出紫石英舊以貢獻永嘉記曰固陶村有小山出紫石英人嘗於山下得一紫石英王府君聞之遣人縁山掘得數升芒光甚好色少薄孫府君亦掘得數升也從征記曰自天峴至太山皆有紫石英太山所出時復瓌殊吳興記曰烏程縣北壟山有紫石英甚光明但少黒博物志曰平氏陽山縣紫石英特好其他者色淺紫石英舊出胡陽縣嶺表錄異曰隴州山中多紫石英其色淡紫其質瑩徹隨其大小皆五稜兩頭如箭鏃煮水飲之暖而無毒比北中白石英其力倍矣本草經曰紫石英味甘温生太山谷中治腹嘔逆邪氣補不足女子風寒在子宮絶孕十年無子者久服温中輕身延年吳氏本草曰紫石英神農扁鵲甘氣平李氏大寒雷公大温岐伯甘無毒生太山或會稽採無時欲令如削紫色逹頭如樗頭者白石英本草經曰白石英味甘㣲温生山谷主治消渇隂痿不足嘔逆隂濕胸鬲間久寒益氣其人久服者身輕健長年生華隂永嘉記曰安固老山出白石英吳氏本草曰白石英神農甘岐伯黄帝雷公扁鵲無毒生太山形如紫石英白澤長者二三寸採無時久服通日月光青石英本草經曰青石英形如白石英青端赤後者是赤石英本草經曰赤石英形如白石英赤端白後者是赤澤有光味苦補心氣黄石英本草經曰黄石英形如白石英黄色如金赤端者是黒石英本草經曰黒石英形如白石英黑澤有光石硫黄後魏書曰悅般國有火山山旁皆石燋鎔流數千里迺凝堅人取以為藥即石硫黄也淮南子曰夏至硫黄澤抱朴子曰石硫黄五岳皆有而箕山為多其方言許由就此服之長生故不復以富貴累意神仙傳曰劉慿餌石硫黄老而更少范子計然曰石硫黄出漢中博物志曰西域使至王暢説石硫黄出須彌山去高昌八百里有石硫黄高數十丈縦廣五六畆有石硫黄孔穴晝視其孔中狀如青烟常高數尺夜視皆如燃燈光明高尺餘暢所親見也須彌人言是時氣不和皆往保此山毒氣自滅本草經曰石硫黄味酸生谷中治婦人隂蝕疽痔能化金銀物生東海吳氏本草經曰硫黄一名石流黄神農黄帝雷公鹹有毒醫和扁鵲無毒或生易陽或生河西或五色黄是潘水石液也燒令有紫炎者八月九月採治婦人絶隂能化金銀銅鐵石流青本草經曰石流青白色主益肝氣明目石流赤神仙傳曰許由巢父服箕山石硫芝抱朴子曰石流赤山之赤精葢石流黄之類也皆浸溢於涯岸之間其濡濕者可丸服其已堅者可散服五岳皆有而箕山為多本草經曰石流赤生羌道山谷石膽王丹曰虎珀又名為石膽十洲記曰滄浪海島上有石膽服之成神仙仇池記曰膽川平地出石膽博物志曰皇初三年武都西部都尉王褒獻石膽二十斤范子計然曰石膽出隴西羌道本草經曰石膽一名畢石一名君石出秦州羌道山谷大石間或出句青山其為石也青色多白文易破狀如空青能化鐵為銅合成金銀煉餌食之不老吳氏本草經曰石膽一名黒石一名銅勒神農酸小寒李氏大寒桐君辛有毒扁鵲苦無毒生羌道或句青山二月庚子辛丑採石肺本草經曰石肺一名石肝黒澤有赤文如服置水中即乾濡主益氣明目生水中石脾本草經曰石脾一名胃石一名腎石赤文治胃中寒熱青石脂本草經曰青石脂味酸平無毒主養肝膽氣赤石脂越絶書曰由鍾窮隆山赤松子所取赤石脂也永嘉記曰赤石脂出永寜赤石山荆州記曰義陽有赤石脂山本草經曰赤石脂味酸無毒養心氣范子計然曰赤石脂出河東色赤者善黄石脂本草經曰黄石脂味平無毒主養脾氣白石脂本草經曰白石脂味甘無毒主養肺氣黒石脂本草經曰黒石脂味甘無毒主養腎氣强壯隂陽蝕腸泄利吳氏本草曰五石脂一名青赤黄白黒符神農甘雷公酸無毒桐君辛無毒李氏小寒生南山或海涯採無時赤符神農雷公甘黄帝扁鵲無毒李氏小寒或生少室或生太山色絳滑如脂黄符李氏小寒雷公苦或生嵩山色如㹠腦雁雛採無時白符一名隨岐伯雷公酸桐君甘無毒扁鵲辛或生少室天蔞山或太山黒符一名石泥桐君甘無毒生洛西山空地凝水石本草經曰凝水石味辛寒生山谷治身熱腹中積聚邪氣煩滿飲之不飢生常山范子計然曰凝水石出河東色澤者善吳氏本草曰凝水石一名白水石一名寒水石神農辛岐伯醫和甘無毒扁鵲甘無毒李氏大寒或生邯鄲採無時如雲母也陽起石本草經曰陽起石一名白石味酸㣲温生山谷治崩中漏下破子臟中血結氣寒熱膓痛漏下無子隂陽不合生齊地吳氏本草經曰陽起石或作羊出神農扁鵲酸無毒桐君雷公岐伯無毒李氏小寒生太山或陽起山採無時石鍾乳吳錄地理志曰始安始陽有洞山山有穴如洞庭其中生石鍾乳唐書曰高季輔為太子右庶子上疏切陳得失特賜鍾乳一劑曰卿進藥石之言故以藥石相報列仙傳曰卭疏煮石髓而服之謂之石鍾乳水經曰大紅山巖嶂皆數百許仞入石門得穴穴上素崖壁立非人迹所及穴中多鍾乳凝膏下垂望若氷雪㣲津細液滴瀝不斷幽穴潜逺行者不極又曰易水東經孔山山下有鍾乳穴穴出佳乳採者掲水尋沙入穴里許太山記曰山有鍾乳但不好耳湘川記曰湘東隂山有黄坑山出鍾乳長沙湘鄉縣出鍾乳季秋入穴六七里乃得盛宏之荆州記曰天門郡出石鍾乳永嘉記曰北山涯有洞穴有人嘗於此穴採鍾乳入十餘日粮盡而穴不窮周道真錢塘記曰盧隠山北有穴旁入行數步有清流水丈餘昔有人採鍾乳水際見異迹云是龍迹聞穴裏隆隆有聲便出不測所採近逺范子計然曰石鍾乳出武都黄白者善本草經曰石鍾乳一名留公乳味甘温生山谷明目益精治欬逆上氣安五臓通百節利九竅下乳汁生少室吳氏本草經曰鍾乳神農辛李氏大寒或生太山山谷隂處岸下聚溜汁所成如乳汁黄白色空中相通二月三月採隂乾孔公蘖本草經曰孔公蘖一名通石味辛温生山谷治食化氣利九竅下乳汁治惡瘡瘻疽生梁山吳氏本草經曰孔公蘖神農辛岐伯鹹扁鵲無毒色青黄礜石音預説文曰礜毒石也山海經曰臯塗之山有白石焉名曰礜可以毒鼠今礜石殺䑕蠶食之而肥范子計然曰礜石出漢中色白者善湘州記曰湘東山多礜石博物志曰鸛伏卵時取礜石週遶卵以助暖氣方術家取鸛巢中礜石為真荆州記曰湖縣鹿山舍旁多礜石毎至嚴冬其上不得停霜雪盛𢎞之荆州記曰魚復縣岸崩將出礜石吳興記曰長成縣有白石山出白礜石極精好本草經曰礜石一名青介石一名立制石一名固羊石味辛生山谷治寒熱鼠瘻瘡蝕除熱殺百獸生漢中吳氏本草曰白礜石一名䑕鄉一名太白一名澤乳一名食鹽神農岐伯辛有毒桐君有毒黄帝甘有毒李氏大寒主温熱生漢中或生魏興或生少室十二月採太平御覽卷九百八十七
