body:
  text: 太平御覽卷三百十八宋李昉等撰兵部四十九攻圍攻圍下王隠晉書曰祖約為豫州刺史胡騎至攻城其日西風兵火俱攻賊以繩繫鐵鈎摘挽城樓樓柱㧞壞又作鐵鈎􅠁城登梯得上所挽樓城墻三十歩壞約始大怖使戴洋呼孫叔敖伍子胥卿若使胡奴得城當持白酒寸脯著卿前急令轉風却賊當上肥牛中後風轉下晡賊退晉書曰趙王倫孫秀為義師所討日蹙乃與秀謀或欲收餘卒出戰或欲焚燒宫室誅殺不附己者或欲乗船東走入海計未决王輿率營兵七百餘人自南掖門入勅宫中兵各守衞諸門三部司馬為應于内自往攻秀秀閉中書南門輿放兵登墻燒屋秀及左右遽走出左衞將軍趙泉斬秀等以狥宋書曰髙祖率兵伐後秦姚泓後魏遣鵝青等歩騎十萬屯河北有數千騎緣河隨晉軍進止時軍人緣河南岸牽百丈河流迅急有漂渡北岸者輒為魏人所殺掠遣軍纔過岸即退軍還復來髙祖乃遣白直隊王丁旿率七百人及車百乗于河北岸上去水百餘步為却月陣兩頭抱河車置七仗士事畢使竪一白毦魏人見數百人步牽車上不解其意並未動髙祖先命朱超石馳往赴之並齎大弩百張一車益二十人設彭排轅上魏人見營陣既立乃進圍營超石先以軟弓小箭射敵敵以衆少兵弱四面俱至遂内薄攻營於是百弩俱發又遣善射者叢箭射之魏衆既多不能制超石初行别齎大鎚并千餘張矟乃斷矟長三四尺以鎚鎚之一矟輒洞貫三四人魏衆不能當一時奔潰退還平城又曰晉義熙五年六月偽燕主慕容超留羸老守廣固使其廣甯王賀賴盧及公孫五樓悉力據臨胊去城四十里有巨蔑水超告五樓急據之比至為龍符所保五樓乃退有車四千兩分為二翼方􅁤徐行車張幔御者執矟又以輕騎為遊軍軍令嚴肅比及臨胊賊騎交至帝命兖州刺史劉藩荆州刺史劉道隣等陷其陣日向昃戰猶酣帝用叅軍胡藩策襲剋臨胊賊乃大奔超遁還廣固獲其玉璽豹尾輦等送于都丙子剋廣固大城超保其小城乃築長圍以守之館榖於齊土停江淮轉輸又曰朱修之隨到彦之北伐彦之自河南廻留修之戍滑臺為魏將安頡所圍至絶糧將士熏鼠食之循被圍既久母常悲憂忽一旦乳汁驚出母號慟告家人曰我年老非復有乳汁時今如此兒必沒矣魏果以其日剋滑臺囚之又曰宗越為長水校尉竟陵王誕據廣陵反越領馬軍𨽻沈慶之攻誕及城䧟孝武使悉殺城内男丁越受㫖行誅躬臨其事莫不先加棰楚或有鞭其面者欣欣然若有所得所殺凡數千人改封始安縣子三國典略曰侯景收其餘衆步騎八百南過小城城人登陴詬之曰跛脚奴景怒攻城㧞之殺詬者而去又曰周王思政固守頴川髙岳久圍不解陳元康言于齊王澄曰公自匡輔朝政未有殊功雖敗侯景本非外賊頴城将陷願公因而乗之足以取威定業王從之于是親至頴川益發其衆號曰决命夫更起土山王坐於堰上趙道徳言於王曰箭頭有鐵不避大王引王帶而下箭集於王坐之所梁書曰武帝自襄陽率兵東下至鄂州攻未㧞蕭頴胄在江陵遣衞尉席闡文勞軍因謂梁武曰今頓兵兩岸不併軍圍郢定西陽武昌取江州此機已失莫若請救于魏與北連和猶為上策梁武謂闡文曰漢口路通荆雍控引秦梁糧運資儲聽此氣息若分兵前進魯山必阻沔路所謂搤喉若粮運不通自然離散何謂持久劉元起近欲以三千兵往定㝷陽彼若懽然悟機一酈生亦足脱拒王師故非三千能下西陽武昌取便得耳便應鎮守兩城不減萬人糧儲稱是卒無所出脱賊軍有上者萬人攻一城兩城勢不相救若我分軍應援首尾俱弱如其不遣孤城必陷一城既沒諸城相次土崩天下大事于是去矣若郢州既拔席卷沿流西陽武昌自然風靡何遽分兵散衆自貽其憂且丈夫舉動言静天步况擁七州之兵以誅羣竪懸河注火奚有不滅豈容北面請救以自示弱彼未必能信徒貽我醜聲此之下計何謂上策及㧞郢城向下城戍無不風靡遂剋建業崔鴻十六國春秋曰前燕將慕容恪率兵討段龕於廣固恪圍之諸將勸恪宜急攻之恪曰軍勢有宜緩以剋敵有宜急而取之若彼我勢均且恐外援受腹背之患者湏急攻之以速大利如其我强彼弱外無救援力足制之者當羈縻守之以待其弊兵法十圍五攻此之謂也龕恩結賊黨衆未離心今憑固天險上下同心攻守勢倍軍之常法若其促攻不過數旬剋之必矣但恐傷吾士衆當持久以取耳乃築室返耕嚴固圍壘終剋廣固又曰燕將吕護據野王隂通晉事覺燕將慕容恪等率衆討之將軍傅顔言于恪曰護窮冦假合王師既臨則上下喪氣必士卒攝魂敗亡之騐也殿下前以廣固天險守易攻難故為長久之策今賊形便不與往同宜急攻之以省千金之費恪曰護老賊經變多矣觀其為備之道未易卒圖今圍之窮城樵採路絶内無蓄積外無强援不過十旬其斃必矣何必遽殘士卒之命而趨一時之利哉吾嚴濬圍壘休養將卒以重官美貨間而離之事淹勢窮其釁易動我則未勞而冦已弊此謂兵不血刃坐以制勝也遂長圍守之凡經六月而野王潰護南奔于晉悉降其衆後魏書曰齊神武起義兵於河北被爾朱兆天光度律仲逺等四將同㑹鄴南精强士馬號二十萬圍於鄴南韓陵山時神武馬二千步不滿三萬衆寡不敵乃為圓陣連牛馬以塞歸路於是將士死戰四面奮擊大破兆等又曰燕鳯字子章代人也好學博綜經史明習隂陽䜟緯昭成以禮迎致之鳯不應聘命諸軍圍代城令曰燕鳯不來吾將屠汝代人懼送鳯昭成與語大悦待以賔禮北史曰西魏將王思政守潁川郡城東魏師十萬攻之備盡攻擊之術以潁水灌城陷之思政知事不濟率左右據山上謂之曰吾受國任遂辱王命力屈道窮計無所出唯當効死以謝朝恩仰天大哭左右皆號慟思政向西再拜便欲自剄先是齊文襄告城中人曰有生致王大將軍者封侯重賞若大將軍身有損親近左右皆從大戮都督駱訓謂思政曰公常語訓等但將我頭降非但得富貴亦足活一城人今敵人既有此語公豈不哀城中士卒也因共止之不得引决齊文襄遣其散騎常侍趙彦深就土山執手申意引見文襄辭氣慷慨涕泗交流無屈撓之容文襄以其忠於所事禮遇甚厚思政初入潁川士卒八千人及城陷之日存者纔三千人遂無叛者後周書曰武帝建徳五年東伐齊六軍攻晉州城屯於汾曲齊王憲攻洪同永安二城並㧞之是夜虹見於晉城上首向南尾入紫宫長十餘丈帝每日自汾曲赴城下督戰城中惶窘庚午齊行臺左丞侯子欽出降壬午齊晉州刺史崔景嵩守城北面夜宻遣送欵上開府王軌率衆應之未明登城鼓譟齊衆潰遂剋晉州擒其城主俘甲士八千人送關中隋書曰大業中煬帝徴天下驍果之士以伐遼左沈光預焉同類數萬人皆出其下光將詣行在所賔客送至灞上者百餘騎光酧酒而誓曰是行也若不能建功立名當死於髙麗不復與諸君相見矣及從帝攻遼東以衝梯擊城竿長十五丈光升其端臨城與賊戰短兵接殺數人賊競擊之而墜未及於地適遇竿尚有垂絙光接而復上帝望見壯異之馳召與語大悦即日拜朝請大夫賜寳刀良馬恒致左右親顧漸宻又曰陳稜大業三年拜武賁郎將後三嵗與朝請大夫張鎮周發東陽兵萬餘人自義安汎海擊琉球國月餘而至琉球人初見船艦以為商旅往往詣軍中貨易稜率衆登岸遣鎮周為先鋒其主歡斯渇刺兠遣兵拒戰鎮周頻擊破之稜至低沒檀洞其小王歡斯老模率兵拒戰稜擊敗之斬老模其日霧雨晦瞑將士皆懼稜刑白馬以祭海神既而開霽分為五軍趨其都邑渇刺兠率衆數千逆拒稜遣鎮周先鋒擊走之稜乗勝逐北至其柵渇刺兠背柵而陣稜盡鋭擊之從晨至未苦鬭不息渇刺兠自以兵疲引入柵稜遂填塹攻破其柵斬渇刺兠獲其子島槌虜男女數千而歸帝大悦進稜位右光禄大夫武賁如故唐書曰武徳初宇文化及據聊城淮安王神通進兵躡之祕書丞徴謂神通曰化及今據聊城莘人為其固守若至莘即宜攻取但㧞莘縣聊城益懼因而逼之易同俯拾湏以攻具自隨一足威敵二不乏用不然兵至莘城見無攻具不下如不能剋莘而逺追化及恐亦無功則化及非旬月可獲莘人阻我糧運化及為之外援恐非計之善者神通不從軍次莘果不下而退敗又曰武徳中李靖隨河間王孝恭討輔公祏賊遣將率舟師三萬頓于當塗柵斷江口傍江築城又遣陸軍二萬據當塗南路亦造栅自固並蓄力養鋭以抗大軍諸將皆云二軍並是强兵為不戰之計城柵既固率不可攻請直指丹陽掩其巢穴若丹陽既破二軍可不戰而破靖曰公祏精鋭雖在水陸二軍然其自統之兵亦是勁勇二軍城柵尚不可攻公祏既保石頭豈應易㧞若我帥師至丹陽留停旬日進則石頭未平退則歸路已絶此便背腹受敵恐非萬全之計然此二軍皆是百戰餘賊必不憚於野戰今若攻其城栅乃是出其不意滅賊之機唯在此舉靖乃率諸將水陸俱進大破之二軍悉潰走靖遂率輕兵先至丹陽公祏餘衆雖多不敢戰擁兵東走並相次擒獲又曰髙祖率衆攻屈突通於河東士卒登城南面者已千餘人髙祖在東原望之而不見㑹暴雨至鳴角止軍由是不剋或勸遂攻之髙祖曰屈突通習兵而無勇若决戰非其所長嬰城難以必勝此自守虜耳不足為虞遂収軍營于河渚又曰薛萬均圍梁師都突厥率衆來援諸將見賊城險固皆有憚色萬均謂之曰城中無氣鼓聲不徹此見敗亡之候平在旦夕諸君勿以為憂俄而師都見殺城降又曰天寳末禄山反尚衡起義兵討禄山以王栖曜為牙旗將下兖鄆諸縣軍威稍振兼衙前總管復下曹州初逆將邢起然乗城號令栖曜曰彼可取也一箭殞之城中氣懾遂下又曰馬燧自京還太原初田悦新代承嗣統兵恐人不附已詐効誠欵燧上疏明其必反宜先備之其年悦果與淄青恒冀通謀自將兵三萬圍邢州次臨洛築重城絶其内外以拒救兵邢州將李洪臨洺將張伾皆堅守不㧞昭義軍數告急乃詔燧將救臨洺燧軍出􅛒口兵未過險乃遣人持書喻説且示之好悦謂燧畏之十一月師次邯鄲悦遣使至斬之以徇遣兵擊破其支軍射殺其將成炫之悦自攻臨洺遣大將楊朝光將兵萬餘於臨洺南雙崗下東西列二柵以禦燧燧乃率李抱貞李晟進軍營於二柵之中其夜東栅走歸悦明日燧進軍取其棄柵以置輜重悦謂將吏曰朝光守堅柵不下萬人假令燧等盡鋭攻之比數日計不能下殺傷必甚吾此必破臨洺賞勞軍士而與之戰必勝之術也悦乃分恒州李惟岳救兵五千以助朝光燧率軍攻朝光田悦將萬餘人救之燧乃令大將李自良李奉國將兵合神策軍據雙崗禦之令曰令悦得過當斬爾遂令推火車以焚其柵自晨至暮急擊大破之㧞其柵斬朝光及大將盧子昌斬首五千餘級生虜八百餘人居五日悦復力戰燧自將鋭兵扼其衝口凡百餘合士皆决死悦兵大敗斬首萬餘級生虜九百餘人得榖三十萬斛噐甲稱是悦收兵夜走邢州五代周史曰慕容彦超漢祖即位授澶州節度使檢校太尉杜重威叛於鄴下以鄆州節度使髙行周為行營都部署彦超為副兵至城下二帥不協杜重威之子婦即行周之息女也行周用兵持重彦超舉措輕躁彦超欲速於攻城行周以為未可彦超乃揚言稱行周以愛女之故惜賊而不攻行周忿之漢祖聞其事懼有他變以是親征比及車駕至鄴彦超數因事陵迫行周行周不勝其憾嘗一日於行宫幕次泣告於執政又自掬糞茹於口中聲氣甚厲聞於御坐漢祖深知彦超之曲遣近臣和解行周亦召彦超於帳中責之兼令首過於行周行周稍解時彦超獨排羣議累請攻城漢祖信之乃親督諸軍四面齊進損傷者萬餘人死者千餘人衆議無不歸罪於彦超自是不復敢言攻城矣説苑曰田單為齊上將興師十萬餘將以攻翟往見魯仲連連曰將軍攻翟不能下也田單曰單以五里之城十里之郭復齊之國何謂攻翟不能下也及攻翟三月不下齊之童兒謡曰大冠如箕長劍拄頥故翟不能下累於吾兵於是田單恐駭往見仲連子曰先生何以知單攻翟不能下也仲連子曰夫將軍即墨之時坐則織簣立則杖鍾為士卒倡曰恐宗廟亡矣故將軍有死之心士卒無生之氣今將軍東有掖邑之封西有淄上之富黄金横帶馳乎淄澠之間是以樂生而惡死也田單明日結髪􅃝于矢石之間乃引桴而鼓之翟人下之淮南子曰趙簡子死未葬中牟入齊中牟自入臣於齊也已葬五日襄子起兵攻之圍未合而城自壊者十丈襄子擊金而退之軍法鼔以進衆金以退之軍吏諫曰君誅中牟之罪而城自壊是天助我何故去之襄子曰吾聞之叔向曰君子不乗人於利不迫人於險使之治城城成而後攻之中牟聞其義乃請降古司馬兵法曰衆以合寡則逺裹而闕之若分而迭擊寡以待衆若衆疑之則自用之擅利則釋旗迎而反之敵若衆則相衆而受裹敵若寡若畏則避之開之韓子曰世有三亡以亂攻治者亡以邪攻正者亡以逆攻順者亡清濟濁河足以為限長城巨防足以為塞管子曰善攻者料衆以攻衆料食以攻食料備以攻備以衆攻衆衆存不攻以食攻食食存不攻以備攻備備存不攻太平御覽卷三百十八
