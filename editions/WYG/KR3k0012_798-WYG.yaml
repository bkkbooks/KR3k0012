body:
  text: 太平御覽卷七百九十八宋李昉等撰四夷部十九西戎七吐蕃大羊同悉立章求㧞且末烏耗西夜吐蕃唐書曰吐蕃在長安之西八千里本漢西羌之地其種落莫知所出或云南凉秃髪利鹿孤之後也利鹿孤有子曰樊尼及利鹿孤卒樊尼尚㓜弟傉檀嗣位以樊尼爲安西將軍後魏神瑞元年傉檀為西秦乞伏熾盤所滅樊尼招集餘衆以投沮渠蒙遜而蒙遜以為臨松太守及䝉遜滅樊尼乃率衆西奔濟黃河踰積石於羌中建國開地千里樊尼威惠夙著為群羗所懷皆撫以恩信歸之如市遂改姓為窣勃野以秃髪爲國號語訛謂之吐蕃其後子孫蕃昌又侵伐不息土宇漸廣歴周及隋猶隔諸羌未通於中國其國人號其王為贊普相為大論小論以統理國事無文字刻木結繩為約雖有官不常厥職臨時統領徴兵用金箭㓂至舉􅇏燧百里一亭用刑嚴峻小罪剜眼劓刖或皮鞭鞭之但隨喜怒而無常科囚人扵地牢深數丈二三年方出之宴異國賔客必驅犂牛令客自射牲以供饌與其臣下一年一小盟刑羊狗獼猴先折其足而殺之繼裂其腸而屠之令巫者告扵天地山川日月星辰之神云若心遷志變懷奸反覆神明鑒之同扵羊狗三年一大盟夜扵壇墠之中陳設肴饌殺犬牛馬驢以為牲呪曰爾等咸須同心戮力共保我家惟天神地祗共知爾志有負此盟使爾身體屠裂同扵此牲其地氣候大寒不生稷稻有䴹麥䝁豆小麥喬麥畜多犂牛猪犬羊馬又有天䑕狀如雀䑕其大如猫皮可為裘又多金銀銅錫其人或隨畜牧而不常厥居然頗有城郭其國都城號為邏㱔城屋皆平頭髙者至數十尺貴人處扵大氊帳名為拂廬寝處汙穢絶不櫛沐接手飲酒以氊爲盤捻麨為椀實以羮酪并而食之多事羱羝之神人信巫覡不知節候麥熟為嵗首圍碁六博吹蠡鳴皷為戱弓劒不離身重壯賤老母拜扵子子倨扵父出入皆少者前老者後軍令嚴肅每戰前隊皆死後隊方進重兵死惡病終累代戰没以為甲門臨陣敗走者懸狐尾扵其首表其似狐之怯稠人廣衆必以狗馬其俗耻之以為次死拜必兩手據地作狗吠之聲以身再揖而止居父母䘮截髪青黛塗面衣皆服黒既𦵏即吉其賛普死以人殉𦵏衣服珎翫及常所乘馬弓劒之類悉埋之又曰貞觀八年其賛普弃宗㺯讃始遣使朝貢㺯讃弱冠嗣位性驍武多英略其隣國羊同及諸羌並賔伏之太宗遣行人馮徳遐往撫慰之見徳遐大恱聞突厥及吐谷渾皆尚公主乃遣使隨徳遐入朝多賫金寳奉表求婚太宗未之許又曰弄讃常率衆二十餘萬頓扵松州西境遣使貢金帛云來迎公主太宗遣吏部尚書侯君集等擊破之弄讃大懼遣使謝罪因復求婚太宗許之弄讃乃遣其相禄東贊致禮獻金五千兩自餘寳玩數百事貞觀十五年太宗以文成公主妻之令禮部尚書江夏郡王道宗主婚持節送公主扵吐蕃弄讃率其部兵浮海親迎於河源見王人如子婿之禮甚恭既而歎大國服餙禮儀之美俯仰有愧沮之色及與公主歸國謂所親曰我祖父未有通婚上國者今我得尚大唐公主爲幸實多當為公主築一城以誇示後代遂築城邑立棟宇以居處焉公主惡其人赭面㺯讃令國中權且罷之身亦釋氊裘襲紈綺好慕華風仍遣酋豪子弟請入國學以習詩書又請中國識文之人典其表䟽又曰太宗伐遼東還弄讃遣禄東贊來賀奉表曰聖天子平定四方日月所照之國並為臣妾而髙麗恃逺闕扵臣禮天子自領百萬渡遼致討摧城䧟陣指日凱旋夷狄纔聞陛下發駕少進之間已聞歸國鷹飛迅越不及陛下速疾奴沗預子壻喜倍常夷夫鵝猶雁也故作金鵞奉獻其鵞黃金鑄成髙七尺中可實酒三斛又曰髙宗嗣位授弄讃為駙馬都尉封西海郡王賜物二千段弄讃因致書司徒長孫無忌等云天子初即位若臣下有不忠之心者當勒兵以赴國并獻金銀珠寳十五種髙宗嘉之進封為王賜雜彩三千段因請蠶種及造酒碾磑紙墨之匠並許焉又曰髙宗聞劉審禮等敗召侍臣問以綏禦之策中書舎人郭正一曰吐蕃作梗年嵗已深命將興師相繼不絶空勞士馬虛費糧儲近討則徒損兵威深入則難窮巢穴臣望少發兵募且遣備邊明立􅇏堠勿令侵抄使國用豐足人心叶同寛之數年可一舉而滅給事中劉齊賢皇甫文亮等皆言嚴守之便又曰長夀元年武威軍總管王孝傑大破吐蕃之衆克復龜兹于闐疎勒碎葉等四鎮乃扵龜兹置安西都䕶府發兵以鎮守之又曰聖厯二年吐蕃將賛婆率所部千餘人及其兄弟莾布支等來降則天遣羽林飛騎郊外迎之敕賛婆輔國大将軍行右衛大將軍封歸徳郡王優賜甚厚又曰神龍元年賛普之祖母遣其大臣悉薫然來獻方物為其孫請婚中宗以所養雍王宗禮女為金城公主許嫁與之自是頻嵗貢獻景龍三年十一月又遣其大臣尚賛吐等來逆女中宗宴之扵苑内毬塲命駙馬都尉楊慎交與吐蕃使打毬中宗率侍臣以觀之四年正月制曰聖人布化用百姓為心王者垂仁以八荒無外故能光宅遐邇裁成品物由是隆周理厯恢柔逺之圖強漢乘時建和親之義斯盖禦夷長策經邦逺謨朕受命上靈克纂洪業庶幾前烈永致和平睠彼吐蕃僻在西服皇運之始早申朝貢太宗文武聖皇帝徳侔覆載情深億兆思偃兵甲遂通姻好數十年間一方清靜自文成公主化徃其國因多變革我之邊隅亟興師旅彼之蕃落頗聞彫弊頃者賛普及祖母可敦酋長等屢披誠欵積有嵗時思託舊親請崇新好金城公主朕之少女豈不鍾念但為人父母志恤黎元若允乃誠祈更敦和好則邊土寧晏兵役休息遂為國大計築兹外館聿膺嘉禮降彼吐蕃賛普即以今月進發朕親自送扵郊外命大將軍楊矩使焉其月帝幸始平縣以送公主設帳殿扵百頃泊側引王公宰臣賦詩餞别改始平縣為金城縣改其地爲鳳池鄉又曰開元二年秋吐蕃大將軍蚠逹延乞力徐等率衆十餘萬㓂臨洮軍又進冦蘭渭等州掠監牧羊馬而去𤣥宗令攝左羽林將軍薛納及太僕少卿王朘率兵邀擊之仍下詔將大舉親征召募將士克期進發俄而朘等與賊相遇扵渭源之武階驛前軍王海濵力戰死之朘等乘之而進大破吐蕃之衆殺數萬人盡収得所掠羊馬賊餘黨奔北相枕藉而死洮水爲之不流上遂停親征命紫㣲舎人倪若水徃按軍實仍弔祭王海濵而還又曰開元十七年𤣥宗遣皇甫惟明等使吐蕃惟明等既見賛普及公主具宣上意賛普等欣然請和盡出貞觀已來前後勅書以示惟明等令其重臣名悉獵隨惟明入朝上表曰外甥是先皇帝宿親又䝉降金城公主遂同和為一家天下百姓普皆安樂中間爲張𤣥表李知古等東西兩處先動兵馬侵抄吐蕃邊將所以兩相征討迄至今日遂成舋隙外甥以先代文成公主今金城公主之故深識尊卑豈敢失禮又縁年小枉被邊將萬足丞前䜛搆鬬亂令舅致恠伏乞垂察追留使將萬足丞前數度使人入朝皆被邊將不許所以不敢自奏去冬公主遣使人婁衆失若將狀專往䝉降使㸔公主來外甥不勝喜荷謹遣諭名悉頼及副使押衛將軍浪㱔紇夜悉獵入朝奏表進曰兩國事意悉獵所具外甥蕃中已處分邊將不許抄掠若有漢人來投便令却送伏望皇帝舅逺察赤心許從舊好長令百姓快樂如䝉聖㤙千年萬嵗外甥終不敢先違明誓謹奉進金胡瓶一金盤一椀一馬腦杯一零羊衫段一謹充㣲忱之禮金城公主又别進金鴨盤盞雜器物等十八年十月名悉獵等至京師上御宣政殿列羽林仗以見之悉獵頗曉書記先曽迎金城公主至長安當時朝廷皆稱其才辨及是上引入内宴與語甚禮之賜紫􅂁金𢃄及魚袋并時服繒綵銀盤胡瓶等仍扵别舘供擬甚厚悉獵受􅂁𢃄器物而却進魚袋辭曰本國無此章服不敢當殊異之賞上喜而許之詔御史大夫崔琳充使報聘仍扵赤嶺各竪分界之碑約以更不相侵時吐蕃使奏云公主請毛詩禮記左𫝊文選各一部制令祕書省寫與之正字于休烈上䟽諫曰臣聞夷狄國之冦也經籍國之典也戎之生心不可以無備典有恒制不可以假人傳曰裔不謀夏夷不亂華所以革其非心在乎有備無患昔者東平王入朝求史記諸子漢帝不與盖以史記多兵謀諸子雜詭術夫以東平漢之懿親尚不欲示征戰之書今西戎國之冦讎豈可貽以經典之事且臣聞吐蕃之性慓悍果决敏精特鋭善學不㢠廻若逹於書必能知戰深扵詩則知武夫有師干之試深扵禮則知月令有廢興之兵深扵𫝊則知用師多詭詐之智深扵史則知往來有書檄之制何異備㓂兵而資盗糧也臣聞魯秉周禮齊不加兵呉獲乘車楚屢奔命一以守典存國一以喪法危邦可取鑒也且公主出嫁從人逺適異國合慕夷禮返求良書愚臣料之恐非公主本意也慮有奔北之類勸教扵中若陛下慮失蕃情以備國信必不得已請去春秋當周徳既衰諸侯强盛禮樂自出戰伐交興情僞扵是乎生變詐扵是乎起則以臣召君之事取威定覇之名若與此書國之患也𫝊曰于奚請曲縣鞶纓仲尼云惜也不如多與之邑惟名與器不可假人狄固貪婪貴貨易土止可錫之錦綺厚以玊帛何必率從其求以資其智臣忝叨列位職刋祕籍實痛經典棄在戎夷昧死上聞惟陛下深察又曰開元二十二年遣將軍李佺扵赤嶺與吐蕃分界立碑二十四年正月吐蕃遣使貢方物金銀器玩數百事皆形制甚異上令列扵提象門外以示百寮又曰開元二十八年春章求兼瓊宻與安戎城中吐蕃翟都局及維州别駕董承宴等通謀都局等遂翻然歸欵因引官軍入城盡殺吐蕃將士使監察御史許逺率兵鎮守上聞之甚恱中書令李林甫等上表曰伏以吐蕃此城正當衝要憑險自固恃以窺邊積年以來蟻聚為患縱有百萬之衆難以施功陛下親紆秘策不興師旅頃令中使李思敬曉喻羗族莫不懷㤙飜然改圖自相謀䧟神筭運扵不測睿略通扵未然累載逋誅一朝蕩滅又臣等今日奏事陛下從容示臣等曰卿等但㸔四夷不乆當漸淪喪徳音纔降遽聞戎捷則知聖與天合應響至速前古已來所未有也請宣示百寮編諸史策手制答曰此城儀鳳年中羗引吐蕃遂被固守嵗月既久攻伐亦多其地險隘非力所制朝廷群議不勸取之朕以小蕃無知事湏處置授以竒計所以行之獲彼戎心歸我城守有足為慰大羊同通典曰大羊同東接吐蕃西小羊同北至于闐東西千餘里勝兵八九萬其人辮髮氊裘畜牧為業地多風雪氷厚丈餘所出物産頗同吐蕃俗無文字但刻木結繩而已刑法嚴峻其酋豪死抉去其腦實以珠玊剖其五臟易以黄金假造金鼻銀齒以人為殉卜以吉辰藏諸岩宂地人莫知其所多殺㹀牛白馬以充祭祀𦵏畢服除其王姓姜葛有四大臣分掌國事自古未通悉立通典曰悉立在吐蕃西南户五萬餘有城邑村落依溪澗丈夫以繒綵纒頭衣氊褐婦人辮髮着短裙以蒸報為俗畜多水牛羖羊雞豕榖宜稷稻麥豆饒甘蔗諸果死𦵏扵中野不為封樹喪制以黒為衣一年就吉刑有刖劓覊事吐蕃章求㧞通典曰章求㧞或云章掲拔本西羗種也在悉立西南居四山之内近代移出山西接東天竺遂改衣服變西羗之俗其地延袤八九百里勝兵二千餘人居無城郭好為㓂掠商旅患之聞悉立入朝亦遣使朝貢且末漢書曰且末國王治且末城去長安六千八百二十里有蒲萄諸果西通精絶二千里北史曰且末西北有流沙數百里夏日有熱風爲行旅之患風之至唯老駞預知之即嗔而聚立埋其口鼻扵沙中人每以為候亦即將氊壅蔽鼻口其風迅駛斯須過盡若不防者必至危斃後魏大統八年其兄鄯善米率衆内附鳥秅漢書曰烏秅王治烏秅城去長安九千九百五十里田石間有白草累石為室民接手飲師古曰自髙山下溪中飲水連接其手也出小歩馬師古曰小細歩也所謂百歩干跡也西夜漢書曰西夜國王號子合王治呼犍谷去長安萬二百五十里與氐異其種類羌氏行國師古曰言不土着也隨畜逐水草往來而地出玉石後漢書曰西夜國去洛陽萬四千四百里地生白草有毒國人煎以為藥付箭鏃所中輙死太平御覽卷七百九十八
