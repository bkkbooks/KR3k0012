body:
  text: 太平御覽卷四百五十三宋李昉等撰人事部九十四諫諍三東觀漢記曰上将自擊彭寵伏惠公諫曰臣聞文王享國五十伐崇七年而三分天下有二至武王四海乃賔陛下承大亂之極出入四年中國未化逺者不服而逺征邊郡四方聞之莫不怪疑願思之又曰郅惲為上城東門侯上嘗夜出還拒關詔門欲入惲不納上令從門問識面惲遂不開明日惲上書曰昔文王不敢盤于逰田以萬民為憂而陛下逺獵山林以夜繼晝其如社稷宗廟何誠小臣所竊憂也由是上特重之又曰第五倫為司空奉公不撓言事無所依違諸子諫止輙叱之每上封自作草不復示掾吏或有奏記言便宜便上封又曰明帝時决獄多近扵重尚書陳寵上疏諫曰先王之政賞不僣刑不濫與其不得已寧僣毋濫故古聖君賢相重刑之至也又曰帝時伐匈奴魯恭上疏諫曰竊見竇憲耿秉銜使奉命暴師扵外陛下親勞憂在軍役誠欲以安定邊陲為民除害臣思之未見其便数年以來民食不足國無蓄積盛春興發擾動天下妨廢農時以事夷狄非所以垂意扵中國憫念民命也又曰日蝕司徒丁鴻上疏曰臣聞春秋日蝕三十六而弑君三十六變不空生夫帝王不宜以重器假人觀古及漢傾危之禍靡不由世位擅寵之家伏見大将軍刺史二千石初除謁辭求通待報雖奉璽書受臺勅不敢去至数十日背公室向私門此乃上威損下權盛外附之臣依託權門諂諛以求容媚並宜誅之又曰竇憲為車騎将軍辟崔駰為掾憲府貴重掾属三十人皆故刺史二千石唯駰以處士年少擢在其間憲擅權驕恣駰数諫之及出征匈奴道路愈多不法駰為主簿前後奏記数十指切長短憲不能容稍疎之因察駰髙第出為長岑長駰自以逺去不得意遂不之官而歸卒于家又曰楊賜字伯獻代劉郃為司徒帝欲造畢圭靈昆苑賜上疏諫曰竊聞使者並規度城南民田欲以為苑昔先王造囿載物以修三驅之禮薪采蒭牧皆悉往焉先帝之制左開鴻池右作上林不奢不約以合禮中今猥規郊城之地以為苑圃廣壊田園廢居民畜禽獸殆非所謂保赤子之義又曰光和中有虹蜺晝降嘉徳殿上引楊賜等入金商門問以祥異對曰按春秋䜟曰天投蜺恐海内亂加四百之期象見吉凶聖人則之今妾媵嬖人閹尹之徒共專國朝欺罔日月而令縉紳之徒委伏畎畆口誦尭舜之言身蹈絶俗之行亡捐溝壑不見逮及冠履倒易陵谷代處又曰白馬令李雲桓帝誅大将軍梁冀而中常侍單超等五人皆以諫冀功並封列侯又立掖庭民女亳氏為皇后数月間后家封百人賞賜巨萬時地数震裂衆灾頻降雲剛直憂國乃露布上書移三府曰孔子曰帝者諦也今官位錯亂小人諂進財貨公行政令日損是帝欲不諦乎帝得奏震怒下有司送雲黄門北寺獄死魏志曰辛毗字佐治潁川人帝踐祚為侍中帝欲徙冀州士家十萬民實河南時連蝗民飢羣司以為不可而帝意甚盛毗與朝臣俱求見帝知其欲諫作色以見之皆莫敢言毗曰陛下徙士家其計安出帝曰卿謂我徙之非耶毗曰誠以為非也帝曰吾不與卿共議也毗曰陛下以臣不肖置之左右厠之謀議之官安得不與臣議耶臣所云非私也乃社稷之慮也帝不答起入内毗隨而引其裾帝遂奮衣而還良乆乃出曰佐治卿持我何太急耶毘曰今徙既失民心又無以食也帝遂徙其半嘗從帝射雉帝曰射雉樂哉毗曰扵陛下甚樂而扵羣下甚苦帝黙然為之希出又曰太祖討張魯東還時有将軍許逰擁部曲不附太祖而有慢言太祖怒先欲討之群臣多諫太祖横刀扵膝作色不聴繆襲入欲諫太祖逆謂之曰吾計已定卿勿復言襲曰若殿下計是耶方助殿下成之若殿下計非耶雖成宜敗之殿下逆臣令勿言何待下之不閎乎太祖曰許逰慢吾何言可赦乎襲曰臣聞千石之弩不為鼷䑕發機萬鈞之鐘不以挺撞起音今區區之許遊何足以勞神哉太祖曰善遂厚撫遊遊即歸服又曰賈詡字文和文帝時為五官将而臨淄侯植才名方盛有奪宗之議文帝使人問詡自固之術詡曰願将軍恢崇徳度躬素士之業朝夕孜孜不違子道如此而已文帝從之深自砥礪太祖又嘗屏除問詡詡嘿然不對太祖曰與卿言而不荅何也詡曰思袁本初劉景升父子也太祖大笑扵是太子遂定又曰文帝頻出遊獵或昏夜還宫王朗上疏曰夫帝王将行則設兵而後登輿清道而後奉引所以顯至尊務戒慎也近日車駕及昏而反非萬乘之至慎也又曰文帝踐祚以髙柔為治書侍御史時人間數有誹謗妖言帝疾之有妖言輙殺而賞告者柔上疏曰宜除妖謗賞告之法帝下詔敢以誹謗相告者以所告罪罪之扵是遂絶又曰太祖置校事盧洪趙逹等使察羣下髙柔諫曰今置校事既非君上信下之㫖又逹等数以憎愛擅作威福宜檢治之後姦利發太祖殺之以謝扵柔又曰太祖征并州留崔琰傅文帝扵鄴太子仍出田獵變服易乘志存驅逐琰書諫曰今邦國殄瘁恵康未洽唯太子燔翳損褐以塞衆望不令老臣獲罪扵天又曰髙堂隆寝疾口占上疏曰臣寝疾病有増無損常懼忠欵不昭時王莫不思紹尭舜而蹈桀紂之跡願陛下少垂省覽又曰明帝即位辛毗為廷尉帝欲平北邙令登臺觀則見孟津毗諫曰天地之性髙髙下下今而反之既非其禮若九河湓溢洪水為害而邱陵皆移将何以禦之帝乃止又曰明帝時百姓凋匱而役務方殷衛凱上疏曰順㫖者愛所由來逆意者惡所從至故人臣皆争順㫖而避逆意非破家為國殺身成君者誰能犯顔色觸忌諱建一言開一說哉又曰荀彧傳曰時曹公欲滅陶謙乘勝欲取徐州而後定吕布彧諫曰昔髙祖保關中光武據河内深根固本以制天下進可以勝敵退可以自守雖師北身遁者数矣而終復振成大業也今将軍本以兖州首事故能平定山東此實天下之要地而将軍之關河也若不先定根本将何以寄諸跡乎宜且急收熟麥以實軍資吕布不足慮也今捨此而東未見其便多留兵則不可勝敵少留兵則不可固守且吕布乘虛冦暴震動人心縦保数城非已所有操乃從其言遂破吕布西平兖州魏略曰蘇則為侍中文帝時人多飢困而軍数出又兼治宫室則数面諫由此上頗不恱其後出以為河東相又曰時太祖欲征吴而大雨霖三軍多不願行太祖知其然恐外諫者教曰今孤戒嚴未知所之有諫者死賈逵受教謂其同寮三主簿曰今實不可出而教如此不可諫也乃建諫草以示三人三人不獲已皆署名疏入太祖怒收逵等當送獄教取造意者逵即言我造意遂走詣獄獄吏以逵主簿也不即著械逵謂獄吏曰促械我尊者且疑我在近職求緩扵卿既而復職又曰明帝徙長安鐘簴起土山等司徒軍議掾河東董尋上書曰臣聞古之貞士盡言扵國不避死亡故周昌比髙祖扵桀紂劉輔譬趙后扵人婢天生忠直雖白刄沸湯往而不顧者誠為時主愛惜天下也建安已來野戰死亡或門單户盡雖有在者遺孤老弱若今宫室狹小當大之猶隨時不妨農務况乃作無益之物黄龍鳯皇九龍承露盤玉山淵池也此皆聖明之所興其功叅倍扵殿舍三公九卿侍中尚書天下至徳皆知非道而不敢言者以陛下春秋方剛心畏雷霆臣今知言出必死而臣自比扵牛一毛生既無益死亦何損發筆流涕心與世辭臣有八子臣死之後累陛下矣将奏沐浴既通帝曰董尋不畏死耶主者奏收尋有詔勿問吴志曰張昭少子休字叔嗣従中庶子轉為右弼都尉孫權常逰獵逮暮乃歸休上疏諫戒權大善之以示扵昭又曰孫權欲廢太子和立亮尚書僕射屈晃固諫不止權大怒牽晃入殿杖一百又曰孫權任信校事吕壹壹性苛􅆭用法深刻太子登数諫權不納後壹姦罪發露權引咎責躬又曰孫權既為吴王歡宴之末自起行酒虞翻伏地佯醉不持權去翻起坐權扵是大怒手劔欲擊之侍坐者莫不惶遽唯大司農劉基起抱權諫曰大王以三爵後殺善士雖翻有罪天下孰知之權曰曹孟徳尚殺孔文舉孤扵虞翻何有哉基曰孟徳輕害士人天下非之今大王躬行徳義欲與尭舜比隆何自喻扵彼乎翻得免權因勅左右自今酒後言殺皆不得殺又曰張紘字子綱廣陵人避難江東委質扵孫策遣奉章詣許昌曹公聞策薨欲伐吴紘諫曰以為乘人之喪既非古義若有不克棄好成讎不如厚禮曹公從之紘歸吳後為長史權率輕騎将赴敵紘諫曰兵者凶器戰者危事麾下多强暴之勇三軍之衆莫不寒心權納而止又曰吕蒙時為護軍權将欲北取徐州以廣其地蒙諫曰不可今曹操逺在河北新破二袁撫集幽冀未暇東顧今徐州守將惡足言也往必克之然地勢陸通四面受敵今日得之明日還失舉全吳之衆未足守也不如取荆州西據荆州則利盡長江此上流之勢扵國之便十徐州也倚重西門國之固也權甚然之興師遂平荆州又曰華覈字永先吴人上疏諫皓曰臣聞之主所求扵民者二民之所望扵主者三二謂求其為勞己也求其為己死也三謂飢者能食之勞者能息之功者能賞之今民以致其三事而主失其三求己備民之望未報今百工作無用之器婦人為綺靡之飾且美貌者不華彩以崇好艷姿者不待文綺以致愛若極粉黛窮盛服未必無醜婦廢華彩文繡未必無美貌也皓終不納後以微譴免数年而卒又曰韋曜字𢎞嗣吴人本名昭避晉武諱改之孫皓立曜以直諫非一漸見責怒皓每饗宴以七升為限小户雖不入口並澆灌取盡曜遂見逼皓輙以韋曜與華覈薛瑩撰吴書皓欲以父和作帝紀曜以和不登帝位宜作傳曜遂被誅又曰賀邵字興伯孫皓時為中書令領太子太傅皓凶暴驕矜邵上疏諫曰陛下媟近寵媚之臣日聞順意之辭海内悼心朝臣失圖書奏皓深恨之竟見殺蜀志曰天旱禁酒醸者有刑吏扵人家索得醸具欲令與作酒者同罰簡雍從先主逰見一男子行道謂先主彼人欲淫何以不縛先主曰卿何以知之雍對曰彼有淫具與欲醸者同先主大笑而原欲釀者雍之滑稽凡此類又曰黄權字公衡州牧劉璋召為主簿時别駕張松建議宜迎先主伐張魯權諫曰左将軍有驍名今欲以部曲遇之則不滿其心欲以賔禮待則一國不容二君客若有泰山之安則主有累卵之危耳但閒境以待河清璋不聴又曰張松說劉璋交通先主璋從之遣法正請先主璋從事廣漢王累自懸于州門以諫璋一無所納勅所在供奉先主入境如歸晉書曰何尚之𫝊時造𤣥武湖上欲扵湖中立方丈蓬萊瀛洲三神山尚之固諫乃止時又造華林園並盛暑欲興工尚之又諫宜加休息又曰續咸偽趙石勒将遷都扵鄴咸固諫勒怒曰不斬此老臣朕宫不得遷也勅御史收之中書令徐光轅極諫勒乃悟停作賜咸絹百疋又曰孫嵩為王彌長史彌與石勒常惡之乃請計于右侯張賔賔曰英雄不並立宜早圖之勒于是開宴請彌将行嵩諫曰石公卑甚言甘不可信也願公勿往自守保固恐有專諸孫峻之禍及耳彌曰石勒一豎子耳奚能為也不聴遂入酒酣遇害又曰裴元畧仕偽秦苻堅為金部郎中堅常以珠璣竒異珍飾不可勝計以示朝臣元畧諫曰周卑宫室慶埀八百始皇窮極嗣不及孫此萬古所以傳載也願陛下去之以延洪祚慶流萬代堅曰非卿忠何以聞寡人之過悉命去之又曰游子逺仕劉曜西羗羯叛亂舉兵四十餘萬三輔大震曜患之欲大興師伐之子逺諫曰足下納臣愚計不勞大軍可一月而定矣且羗夷之叛也非有大度窺竊神器也但廹足下嚴刑峻網今死者不可追生者猶可安莫若大赦釋諸逆人若失官者悉還之遽相撫育聴其復業與人更始彼生路既開人情豈有樂禍好亂者耶且小人聚居必有他心今無刑辟之懼以恩信懐之不降何待諸酋長負罪而不下者請假臣弱兵五千人為足下梟之不勞大軍此可定矣今賊黨既盛彌川被谷若臨之以兵恐非嵗月可殄也此言其術也曜大恱行其計西方遂平王隠晉書曰愍懐太子頗好逰宴洗馬江統等諫曰宜諮詢保傅引見賔客悉得自盡有増博見甚益多聞晉中興書曰江逌為侍中時孝宗欲扵前園修立池苑逌諫以強賊未滅宜務軍􅍯當存儉約以率群下上即納之徐廣晉記曰成帝有乳母經營艱苦欲假其名號顧和諫曰保母奉祐聖躬不遺其勲第舍供給巳為隆厚若假以名號非令典也書而不法後嗣何觀帝乃止臧榮緒晉書曰衛瓘字伯玉每議及經國屡形扵言色晉祖恐大臣有諫嘗因宴飲瓘醉手撫御床曰此坐可惜宋書曰世祖逰幸無度太后六宫常乘副車在後沈懐文與王景文每諫不宜亟出後同從坐松樹下風雨甚驟景文曰卿可以言矣懐文曰獨言無從理相與陳之江智淵卧草側亦謂之為善俄而入召俱入雉塲懐文曰風雨如此非聖躬所宜景文又曰懐文所啓宜従智淵未及言上方注怒作色曰卿欲效顔竣耶何以恒知人事又曰顔竣小子恨不得鞭其面又曰何尚之遷尚書左僕射加散騎常侍時上行幸還多侵夜尚之表諫曰萬乘宜重尊不可輕此聖心所鑒豈假臣啓輿駕比還多冒夜伏願少採愚誠上優詔納之太平御覽卷四百五十三
