body:
  text: 太平御覽卷三百二十二宋李昉等撰兵部五十三勝勝孫子曰夫未戰而廟算勝者得算多也未戰而廟算不勝者得算少也多算勝少算不勝况無算乎于此觀之勝負見矣又曰昔之善戰者先為不可勝以待敵之可勝不可勝在已守備之固可勝在敵自循理以俟敵之懈怠故戰者能為不可勝不能使敵必可勝也又曰見勝不過衆人之所知非善之善也戰勝而天下曰善非善之善者也勝爭勝也太公曰爭勝於白刃之中非良將也故舉秋毫不為多力見日月不為明目聞雷霆不為聰耳尋常所能古之所謂善戰者勝于易勝者也謀于未形攻其可勝不攻不可勝也故善戰者之勝也無智名無勇功又曰故善戰者立於不敗之地而不失敵之敗者也故勝兵先勝而後求戰敗兵先戰而後求勝善用兵者脩道而保法故能為勝敗之攻善勝兵者先自脩理不可勝之道保法度不失以俟敵之敗亂也又曰勝可知而不可為也敵雖衆可使無鬭故策之而知得失之計候之而知動靜之理形之而知死生之地角之而知有餘不足之處角量之也故兵形之極至於無形則深淵不能窺也而智者不能謀也因形而作勝於衆衆不能知也因地形而立勝人皆知我所以勝之形而莫知吾所以制勝之形也人皆知吾所以勝莫知吾因敵形制此勝也故兵戰勝不復不量重復而應形無窮動而應也又曰故知勝有五知可以與戰不可以與戰者勝能料知敵情審其虛實者勝知衆寡之用者勝言兵之形有衆而不可擊寡或可以弱制强而能變之者勝也春秋傳曰師一弱制下在和不在衆上下同欲者勝言君臣和同勇而欲戰者勝也故孟子曰天時不如地利地利不如人和以虞待不虞者勝虞度也以我有法度之師擊彼無法度之兵故春秋傳曰不備不虞不可以出師也將能而君不御者勝司馬法曰進退唯時無曰寡人將既精能曉練兵勢君能專任事不從中御也此五者知勝之道故曰知彼知己百戰不殆審知彼強弱之勢雖不至百戰百勝然已無殆不知彼而知己一勝一負雖不知敵之形勢恃己能克之者勝負各半也不知己不知彼每戰必敗外不料敵内不知己用戰必危也知地知天勝乃可全知地形之便知天時孤虛向背晦甚風雲之譎詭也左傳曰楚屈瑕將盟貳軫貳軫二國名也鄖人軍於蒲騷楚莫敖曰莫敖官名盍請濟師盍何不也濟益也對曰師克在和不在衆也商周之不敵君之所聞也武王有亂臣十人紂有億兆之衆莫敖曰卜之對曰卜以决疑不疑何卜遂敗鄖師于蒲騷又曰秦伯以璧祈戰于河注禱河求勝也戰國策曰魏武侯問吳起曰兵以何勝曰以理為勝曰不在衆乎起曰法令不明賞罰不信聞鼔不止聞金不進雖有百萬之師何益於用所謂理者居則有禮動則有威進不可當退不可追前却如節左右應麾雖絶成陣雖敗成行投之無所往天下莫敢當又曰韓魏之君不朝於齊鄒忌為齊相田忌為將使田忌伐魏三戰三勝又曰或説齊閔王曰臣之所聞戰攻之道於師者雖有百萬之軍北之堂上雖孫吳之將擒之户内千丈之城拔之罇爼之間百尺之衝折之袵席之上史記曰張儀東說齊閔王曰臣聞之齊與魯三戰而魯三勝國以危亡隨其後雖有勝之名而有危之實是何也齊大魯小也又曰魏以太子申為上將軍伐齊過外黄徐子謂太子曰太子自將攻齊大勝并莒則富不過有魏貴不益為王若戰不勝齊則萬世無魏矣此臣之百戰百勝之術也漢書曰廣武君謂韓信曰成安君有百戰百勝之計一日而失之軍敗鄗下身死泜水上又曰髙祖置酒雒陽南宫上曰吾所以有天下者何項氏之所失天下者何王陵對曰陛下嫚而侮人項羽仁而敬人然陛下使人攻城畧地所降下者因以與之與天下同利也項羽妒賢疾能有功者害之賢者疑之戰勝而不與人功得地而不與人利此則所以失天下也上曰公知其一未知其二夫運籌於帷幄之中决勝於千里之外吾不如子房鎮國家撫百姓給饋餉不絶糧道吾不如蕭何連百萬之軍戰必勝攻必取吾不如韓信三者皆人傑吾能用之此吾所以取天下也後漢書曰河南尹朱雋為董卓陳軍事卓折雋曰我百戰百勝决於心卿勿妄説致汚我刀雋曰昔武王之明猶求箴諫况如卿者而欲杜人之口乎卓曰戲之耳雋曰不聞怒言可以為戲卓謝雋又曰吳漢與公孫術戰於廣都成都之間八戰八克遂軍其郭中又光武詔曰將軍鄧禹與朕謀謨帷幄决勝千里魏志曰鍾㑹為鎮西將軍假節都督關中諸軍事詔曰㑹所向摧弊前無強敵緘制衆城網羅迸逸蜀之豪帥面縳歸命謀無遺䇿舉無廢功凢所降誅動以萬計全勝獨克有征無戰拓平西夏方隅清晏以㑹為司徒進封縣侯又曰魏國初建荀攸為尚書令攸深宻有智防自從太祖征伐常謀謨帷幄時人及子弟莫知其所言吳志曰魏大司馬曹仁將步騎數萬向濡須偽欲東攻羨溪朱桓分兵赴羨溪仁進軍拒濡須桓聞遣使追還羨溪兵兵未到而仁兵奄至諸將各懼桓喻之曰凡兩軍相對勝負在將不在衆寡桓與諸軍共據髙城南臨大江北背山陵以逸待勞為主制客此百戰百勝之勢桓因偃旗鼓外示虛弱以誘仁仁果分遣將軍王雙等乘油船襲中洲桓身自距軍生獲雙等送武昌晉書曰王濬為平東將軍假節督梁益諸軍事率兵伐吳濬兵不血刃攻無堅城夏口武昌無相支抗蔡謨傳曰將軍庾亮以石勒新死欲移鎮石城為滅賊之漸事下公卿蔡謨議曰自石勒初起則季龍為爪牙百戰百勝遂定中國又曰嵇紹字延祖初為侍中從駕至湯隂紹之行也侍中秦準謂曰今日向難卿有佳馬否嵇正容曰大駕親以正伐逆理必有征無戰若皇輿失守臣節有在駿馬何為聞者莫不歎息漢晉春秋曰諸葛亮至南中所在戰㨗聞孟獲者為胡漢所服募生致之既得使觀于營陣之間問曰此軍何如獲曰不知虛實故敗知定易勝耳亮使更戰七縱七擒傅選别傳曰衛臻領舉傅選為驥州刺史文帝曰選吾腹心臣也不妨與其籌算帷幄之中决勝千里之外不可授以逺任蕭方等三十國春秋曰西京從軍中郎將張顗言于涼王曰太祖以天挺神姿應桓文之運流漂萬里為西夏所推平索虜兵不血刃取酒泉有易俯拾為殿下開創崇規貽厥孫謀者也又曰秦王堅下書曰吳人敢恃江山僭稱大號輕率犬羊屢窺王境朕將廵狩省方登㑹稽而朝諸侯復禹績而定九州今王師所臨必有征無戰伐國存君義同一體又曰夏王勃勃又改元曰真興刻石都南頌其功曰我皇誕命世之期應天縱之德仰協時來俯從民望屬姦豪鼎峙之際羣㐫岳立之秋故運籌命將舉無遺䇿親御六戎即有征無戰五稔之間道風宏著春秋齊後語曰鄒忌與田忌不相善公孫閲謂鄒忌曰何不令人操十金卜于市曰我田忌之人也三戰三勝聲威天下欲為大事亦吉乎卜者出因令人捕之驗其辭於王之所鄒忌從之田忌懼無以自白遂以其徒襲攻臨淄欲殺鄒忌不勝而奔梁後畧曰當夫普通之末邊疆告驚㓂虜烽煽擊柝相聞上皇乃運籌帷中邁曹王之逺略决勝千里超光武之懸謀故能師不疲勞獻㨗相係老子曰善勝敵者不爭又曰戰勝則以䘮禮處之管子曰天時地利其數多少其要必出於計數故凡攻伐之為道也計必先定於内然後兵出乎境計未定内而出兵是則戰之自毁也故不明敵人之攻不能加也未可加兵不明敵人之積不能約也不能約勢不明敵人之士不先陣也是故以衆係寡以理係亂以富係貧以能係不能以教卒練士係罷衆散徒故百戰百勝也孫卿子曰舜伐有苖禹伐共工湯伐有夏文王伐崇武王伐紂逺方慕義兵不血刃墨子曰墨子為守使公輸般服而不肯以兵知墨子雖善為兵而不肯以知兵而聞也善持勝者以強為弱故老子曰道冲而用之有弗盈也鄧析子曰百戰百勝黄帝之師也韓詩外傳曰孔英平仲云身不出罇爼之間而折衝千里之外註云衝衝車也謂敵人設此以臨城大臣謀干廟堂遥以折之古司馬兵法曰大㨗不賞上下皆不伐善捷勝也上不自矜下不以自伐也上苟不伐善則不驕矣下苟不伐善必無等矣上下不伐善此讓之至也大敗不誅上下皆以不善在已也敗者負也一軍奔北厥罪維均故不誅也上苟以不善在已必悔其過下苟以不善在已必逺其罪上下分惡若此讓之至也又曰凡戰以力久以氣勝有力者任重則可久可久即可勝以固久以危勝營壘次舍噐械具備行陣堅守可以持久也乗危乃致死易生戰攻之心本心固新氣勝無疑心本堅固養而不勞故能制勝以甲固以兵勝甲以衞刀矢兵以斬獲敵甲堅則固兵利則勝也凡車以密固徒以坐固車卒衆則密陣步卒衆則坐陣甲以重固兵以輕勝吕氏春秋曰凡兵也者貴其因也因也者因敵之險以為己固因敵之謀以為己事能審因而加勝則不可窮矣勝不可窮之謂神神則能而不可勝矣夫兵不貴勝而貴不可勝不可勝在已可勝在彼聖人必在已者不在彼故執不可勝之術以遇不可勝之敵若此者則兵無失矣又曰趙襄子攻翟勝左人中人使者使謁之下左人中人城今盧奴西山中有二城也襄子方食搏飯有憂色左右曰一朝而下兩城此人之所喜今君有憂何也襄子曰河之大也大長也不過三日焱風暴雨日中不湏臾今趙氏之德行所積又一朝而二城下我其亡乎孔子聞之曰趙氏其昌乎夫憂所以為昌也喜所以為亡也勝非其難者也持之其難昔賢主以此持勝故其福及後世齊荆吳越皆嘗勝矣而卒取亡不逹乎持勝也惟有道之主能持勝淮南子曰文王知而好問故勝武王勇而好問故勝夫乘衆人之智則無不勝也用衆人之力則無不勝也三輔故事云婁敬為隴西太守過洛陽見劉􅁮曰臣之䇿能不血刃坐羈匃奴頭着陛下前衛公兵法曰夫决勝之䇿者在乎察將之才能審敵之強弱料地之形勢觀時之宜利先勝而後戰守地不失是謂必勝之道也若上驕下怨可離而間營乆卒疲可掩而襲昩去迷就士衆猜嫌可振而走重進輕退遇逢險阻可邀而取若敵人旌旗屢動士馬數顧其卒或縱或横其吏或行或止追北恐不利見利恐不獲渉長途而未息入險地而不疑勁風劇寒剖氷濟水烈景炎熱倍道兼行陣而未定舎而未畢若此之勢乘而擊之此所謂天贊我也豈有不勝乎張協詩曰疇昔懐㣲志帷幕竊所經何必操干戈堂上有竒兵陸士衡辨正論曰攻無堅城之將戰無交鋒之虜又曰由是二邦之將䘮氣挫鋒勢衂財匱而吳宛然坐乘其弊太平御覽卷三百二十二
