body:
  text: 太平御覽卷七百九十九宋李昉等撰四夷部二十北狄一總叙北狄上禮曰五狄之國白虎通曰狄者易也風俗通曰胡者謹按漢書山戎之别族也又曰貊者略也書曰南靣而征北狄怨詩毛𫝊曰狄逺也詩曰采薇遣戍役也文王之時西有昆夷之患北有玁狁之難以天子之命命將帥遣戍役以守衛中國故歌采薇以遣之出車以勞還枤杜以勤歸也采薇采薇薇亦作止曰歸曰歸歳亦暮止靡室靡家玁狁之故不遑唘居玁狁之故又曰我戎未定靡使歸聘又曰戎車既駕四牡業業豈敢定居一月三㨗又曰豈不日戒玁狁孔棘又曰王命南仲往城于方出車彭彭旂旐央央天子命我城彼朔方赫赫南仲玁狁于襄又曰昔我徃矣黍稷方華今我來思雨雪載塗王事多難不遑啓居又曰執訊獲醜薄言還歸赫赫南仲玁狁于夷又曰六月宣王北伐也六月棲棲戎車既飭四牡騤騤載是常服玁狁孔熾我是用急又曰玁狁匪茹整居焦穫侵鎬及方至于涇陽又曰薄伐玁狁至于太原又曰文武吉甫萬邦為憲吉甫燕喜既多受祉又曰顯允方叔征伐玁狁又曰車攻宣王復古也宣王能内脩政事外攘夷狄復文武之境土又曰漸漸之石下國刺幽王也戎狄叛之又曰何草不黄下國刺幽王也四夷交侵中國背叛用兵不息視民如禽獸禮曰北方曰狄衣羽毛宂居有不粒食者周禮曰職方氏掌天下之圖以掌天下之地辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人民與其財用九糓六畜之數要周知其利害又曰司𨽻掌五𨽻之法辨其物而掌其政令夷𨽻掌養牛馬與鳥言𫝊曰北戎侵鄭鄭伯禦之公子突曰戎輕而不整貪而無親勝不相讓敗不相救又曰晉里克帥梁由靡御以敗狄于采桑梁由靡曰狄無耻從之必大克里克曰懼之而已無速衆狄又曰晉侯敗狄于箕郤缺獲白狄子又曰鄋瞞侵齊遂伐魯使叔孫得臣敗于鹹獲長狄僑如富父終甥摏其喉以戈殺之埋其首扵子駒之門又曰赤狄侵齊又侵晉取向陰之禾晉滅赤狄潞氏以潞子嬰兒歸又曰潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目晉侯將伐之諸大夫皆曰不可酆舒有三俊才伯宗曰狄有五罪不祀一也嗜酒二也棄仲章而奪黎氏地三也虐我伯姬四也傷其君目五也天反時為灾地反物為妖民反徳為亂亂則妖灾生故文反正為乏盡在狄矣晉侯從之晉荀林父敗赤狄於曲梁晉侯賞桓子狄臣千室又曰無終子嘉父使孟樂如晉無終山戎國名孟樂其使臣因魏莊子納虎豹之皮以請和諸戎晉侯曰戎狄無親而貪不如伐之魏絳曰勞師扵戎諸華必叛戎禽獸也獲戎失華無乃不可乎公曰然則莫如和戎乎對曰和戎有五利焉戎狄荐居貴貨易土土可賈焉一也邊鄙不聳民狎其野穡人成功二也戎狄事晉四鄰振動諸侯威懷三也以徳綏戎師徒不勤甲兵不頓四也鑒扵后羿而用徳度逺至邇安五也又曰鄭人賂晉侯歌鍾二肆肆列也懸鍾十六為一肆及其鎛磬女樂二八晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之辭曰夫和戎狄國之福也臣何力之有焉公曰㣲子無以待戎夫賞國之典也子其受之魏絳扵是乎始有金石之樂禮也又曰魯襄公十八年白狄始來又曰晉荀呉帥師敗狄于大鹵又曰晉中行穆子敗狄無終及羣狄于太原将戰魏舒曰彼徒我車所遇又阨以什共車必克乃毁車以為行為五陣以相離兩扵前伍扵後専為右角參為左角偏為前拒以誘之狄人笑之未陣而薄之大敗之又曰晉梁丙率隂戎伐頴王使詹桓伯辭于晉曰我在伯父猶衣服之有冠冕水火之有本原民人之有謀主也伯父若裂冠毁冕㧞本塞源専棄謀主雖戎狄其何有余一人又曰晉荀呉為會齊師假道于鮮虞遂入昔陽滅肥以肥子縣臯歸又曰晉荀呉帥師伐鮮虞圍皷三月皷人告食竭力盡而後取之克皷而反不戮一人以皷子䳒鞮歸又曰晉荀躒如周𦵏穆后籍談為介王求彛器籍談曰晉居深山戎狄之與隣而逺扵王室王靈不及拜戎不暇其何以獻器王曰叔父唐叔成王之母弟也宻湏之皷與其大路文所以大蒐也闕鞏之甲武所以克商也唐叔受之處叅虛撫有戎狄又曰晉侯訓兵于稷以略狄土榖梁𫝊曰中夷狄曰大鹵爾雅曰北至于祝栗又曰觚竹地户西王母日下謂之四荒又曰九夷八狄七戎八蠻謂之四海又曰北載斗極為空桐空桐之人武論語曰管仲相桓公覇諸侯一匡天下民到扵今受其賜㣲管仲吾其被髮左祍矣又曰夷狄之有君不如諸夏之亡也國語曰鄭人伐滑王使㳺孫伯請滑鄭人執之王怒將以狄伐鄭富辰諫曰不可夫狄無列扵王室豺狼之徳也王不忍忿而棄鄭又登叔隗以階狄狄封豕豺狼不可厭也王弗聽十八年王黜狄后狄人來誅殺譚伯初惠后欲立王子𢃄故以其黨啓狄人狄人遂入周王乃出居于鄭又曰晉侯使隨會聘扵周王饗之餚蒸原公相禮范子私扵原公曰吾聞王室之禮無毁折今此何禮也原公以告王召士季曰親戚宴饗則有餚蒸惟戎狄則有體薦夫戎狄冐没輕儳貪不讓其血氣不治若禽獸焉其適來班貢不俟馨香嘉味故坐諸門外而始舌人體委與之汝今我王室之一二兄弟以時相見扵是乎有折爼加豆以示客合好胡有効戎狄也又曰驪姬曰以臯落之狄朝夕苛我邊鄙君盍使申生伐狄若不勝狄雖無濟其罪也可且夫勝狄諸侯驚懼吾邊鄙不警公說使申生伐東山至稷桑狄人出逆申生欲戰狐突諫曰不可果戰敗扵稷桑又曰公令閹楚刺重耳逃扵狄又曰襄王昭叔𢃄之難居扵鄭地杞子犯曰君盍納王公乃行賂于草中之戎驪土之狄以啓東道尚書大𫝊曰狄人將攻太王亶父亶父召耆老而問曰狄入何欲耆老對曰欲得菽粟財貨太王曰與之每與而攻不免太王問曰狄人又何欲耆老曰欲君之土地太王曰樂與之耆老曰君不為社稷乎太王曰社稷所以為民也不可以所為民者害民也耆老曰君縱不為社稷不為宗廟乎太王曰宗廟者私也不可以吾私害民也遂杖策而去過梁山止乎岐山問民之束脩奔而從之者三千乘詩含神霧曰四方蠻貊制作器物多與中國反書則横行食則合和伏則交脚皷則細腰如此類甚衆中國之所効者貂蟬胡床胡飯春秋考異記曰北狄之氣主生幽都太平御覽卷七百九十九
