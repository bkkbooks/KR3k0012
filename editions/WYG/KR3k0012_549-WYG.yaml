front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_549-1a, image: WYG0898/WYG0898-0104c.png}
body:
  text: 太平御覽卷五百四十九宋李昉等撰禮儀部二十八屍復魂唅絞紟衾冒屍禮記曲禮下曰在牀曰屍左傳哀下曰陳候使公孫貞子聘吳未至而卒將以屍入吳人使太宰嚭勞且辭上介芊尹蓋對曰寡君聞楚為不道翦伐吳國滅厥民人寡君使蓋備使弔君之下吏無禄使人逢天之慼大命殞墜今君命逆使人曰無以屍造於門是我寡君之命委於草莽也且臣聞之事死如生禮也於是乎有朝聘而終以屍將事之禮又有朝聘而遭喪之禮若不以屍將命是遭喪而還也無乃不可乎以禮防民猶或踰之今大夫曰死而棄之是棄禮也苟我寡君之命逹於君所雖隕于深淵則天命也吳人内之禮統曰屍之言矢也陳也家語曰史魚將卒命其子曰吾在朝不能進蘧伯玉退彌子瑕是吾為臣不能正君生而不能正君死不可以成禮我死汝其陳屍牖下靈公弔焉怪而問之其子以父言告公公曰寡人之過也命殯于客位進蘧伯玉退彌子瑕孔子曰史魚死而屍諌可謂直乎史記曰崔杼弑莊公晏嬰立崔杼門外曰君為社稷死則死之為社稷亾則亡之若為己死己亡非其私䁥誰敢任之門開而入枕公屍而哭三踊而出人謂崔杼必殺之崔杼曰民之望也舍之得民白虎通曰屍者何謂也屍之為言陳也失氣亾神形體獨陳釋名曰死曰屍屍舒也骨節解舒不能復自勝歛搜神記曰初鈎弋夫人有罪以譴死殯屍不臰而香及昭帝即位改𦵏之棺空無屍獨絲履存焉異苑曰河内荀儒字君林乗水省舅氏䧟河死兄儉求屍積日不得設祭水側又箋與河伯投箋一宿岸側冰開屍手執箋出倫又箋謝又曰潯陽周虓字孟威寧康中鎮于巴西為苻堅所摧守節不屈堅使使者道虓躬治逵陌謂使者云煩君語賊苻堅何至耳煩國士如此又潛圗襲堅堅聞之曰小人正欲覓死殺之適足成名耳乃苦考楚不食而卒歛已經旬堅怒猶未歇剖棺臨視虓屍歘迴眸鬢髭張裂精瞳明亮迴盼矚堅堅覩而稱善乃厚加贈賻又曰元嘉中豫章胡家奴開昌邑王冢青州人開齊襄公冢並得金鈎而屍骸露在巖中儼然兹亦未必有憑而然也京房屍至義熈中猶完具僵死人肉堪為藥軍士分割之列女傳曰齊人杞梁襲莒戰而死其妻無所歸乃就夫屍於城下而哭之七日而城崩妻遂投於淄水而死博物志曰靈帝光和元年遼西太守黄翻言海邊有流屍靈符絳衣屍體完全感夢曰我伯夷弟孤竹君子也海水壊吾棺求見掩藏吳㑹稽分地曰種山者大夫種所𦵏也在西鄉郭外後潮水穴山漂去其屍俗云伍子胥乗潮水取以去今山脇有缺處臨邑國記有靈鷲能知人吉凶覘人將死食屍肉盡乃去晏子春秋曰景公操玉加於晏子屍上涕下沾衿盡哀而去又曰景公伏晏子屍而號曰今天降禍不加寡人而加夫子社稷危矣論衡曰孟賁之屍人不忍者氣絶也死炭百斛人不沃者光滅也又曰淮陽都尉尹齊為吏酷虐及死怨家欲取其屍屍亡歸復魂周禮天官夏采曰掌大喪以冕服復於太祖以乗車建綏復於四郊復招魂也建綏者去其旒又春官司服曰大喪共其復衣服禮記檀弓曰復盡愛之道也有禱祠之心焉復謂招魂分禱五祀庶幾其精氣之反望反諸幽求諸鬼神之道也鬼神處幽闇望其從鬼神所来北面求諸幽之義也鄉其所從来也禮復者升屋北面又曰邾婁復之以矢蓋自戰於升陘始也時師雖勝死傷亦甚無衣可以招魂又曾子問曰為君使而卒於舎禮曰公館復私館不復凡所使之國有司所授舎則公館已何謂私館孔子曰善乎問也自卿大夫士之家曰私館公館與公所為曰公館公館復此之謂也又禮運曰及其死也升屋而號吿曰臯某復招之於天又雜記上曰復諸侯以襃衣冕服爵弁服復招魂復魄也冕服者上公五侯伯四子男三襃衣亦始命為諸侯及朝覲見加賜之衣也襃猶進也夫人税衣揄狄狄税素沙言其招魂用税衣上至揄狄也狄税素沙言皆以白紗縠為襃復西上北面則西在左左為陽兾其復生故尚左也復者多少各如其命之數又曰諸侯行而死於館則其復如於其國如於道則升其乗車之左轂以其綏復綏主所致舎館旌旗又曰大夫士死於道則升其乗車之左轂以其綏復如於館死則其復如於家又喪大記曰復有林麓則虞人設階無林麓則狄人設階復招魂復魄也階所乗以升屋者虞人主林麓之官也狄人樂吏之賤者階梯也簨簴之類小臣復復者朝服君以卷夫人以屈狄大夫以𤣥頳世婦以䄠衣士以爵弁士妻以税衣皆升自東榮中屋履危北面三號捲衣投於前司服受之降自西北榮其為賓則公館復私館不復其在野則升其乗車之左轂而復私館卿大夫之家也不於之復為主人之惡也復衣不以衣尸不以斂不以衣尸謂不襲也復者庶其生也若以其衣襲斂是則生施死之義相反喪禮云以衣衣尸浴而去之婦人復不以袡袡嫁時盛服非事鬼神之衣凡復男子稱名婦人稱字婦人不以名行唯哭先復復而後行死事氣絶則哭哭而復復而不蘇可以為死事又喪服小記曰復與書銘自天子達於士其辭一也男子稱名婦人書姓與伯仲如不知姓則書氏此謂殷禮也殷質不重名復則臣得名君周之禮天子崩則復曰臯天子復諸侯薨則復曰臯某甫復其餘及書銘同禮記外傳曰人之精氣曰魂魂陽也云云而動形體謂之魄魄陰也漠然不動合陰陽二氣而生也精氣聚而為一物形勞則神逝謂死而魂逝散死則難復生也孝子之心不能忍也故升屋而招其魂神也神智無涯也魄者復於土也人皆食土之物養成形體也氣絶而収其魂使反復於體也齊書曰張融建武四年病卒遺令白旐無旒不設祭令人捉麈尾登屋復魂曰吾生平所善自當陵雲一笑三千貫棺無製新衾左手執孝經老子右手執小品法華經妾二人事哀畢各遣還家唅周禮天官冢宰曰太宰之職大喪賛贈玉唅玉助王為之也贈玉既窆所以送先王唅玉死者口實也天子以玉雜記曰唅者執璧将命曰寡君使某唅則諸侯唅以璧也小宰喪荒受其唅襚幣玊之事春秋傳曰口實曰唅衣服曰襚凶荒有幣玉者賓客所賙委之禮又天官玉府曰大喪共唅玉又春官典瑞曰大喪共飯玉含玊贈玊飯玊碎玊以雜米也禮記檀弓下曰邾婁考公之喪考公益之曾孫也考公或為定公徐君使容居来弔含弔且含非之也曰寡君使容居坐含進侯玉其使容居以含欲親唅非禮也唅不使賤者君行則親唅耳言侯玉者徐僣稱王自比天子有司曰諸侯之来辱敝邑者易則易于則于易于雜者未之有也易謂臣禮于謂君禮也容居以臣欲行君禮于徐自比天子使大夫敵諸侯有司固拒之是也容居對曰容居聞之事君不敢㤀其君亦不敢遺其祖昔我先君駒王西討濟於河無所不用斯言也容居魯人也不敢㤀其祖言我祖與今君於諸侯使初如是不聞義則服也駒王徐先君謂僣號者容居其孫也濟渡也言西討渡於河廣大其國也魯鈍也言魯鈍者欲自明不妄又曰飯用米貝弗忍虛也不以食道用美焉爾尊之也食道䙝米貝美也又雜記上曰含者執璧将命曰寡君使某舎相者入吿出曰孤某須矣唅玉為璧其制之分寸大小未聞含者入升堂致命子拜稽顙含者坐委於殯東南又曰天子飯九貝諸侯七大夫五士三此蓋夏時也周禮天子飯唅用玉左傳襄上曰叔孫豹㑹晉士匄于柯盟于督陽荀偃癉疽生瘍於頭癉疽惡瘡二月卒而視不可含目開口禁宣子盥而撫之曰事吳敢不如事主猶視欒懐子曰其為未卒事於齊故也懐子欒盈乃復撫之曰主苟終所不嗣事于齊者有如河乃瞑受含又哀上曰公㑹吳子伐齊將戰公孫夏命其徒歌虞殯虞殯送終歌示必死也陳子行命其徒具含玉亦示必死春秋説題辭曰口實曰唅緣生象食孝子不忍虛其欲不忍虛政欲其口食天子以珠諸侯以玉大夫以璧士以貝唅之為言實具口含也生常食故死用含説文曰唅送終口中玊也釋名曰唅以米貝含其口中也莊子曰青青之麥生於陵陂生不布施死何唅珠為吕氏春秋曰含珠鱗施今𦵏皆用之注云含珠口實鱗施施玊匣於死者之體如魚鱗絞紟衾冒儀禮士喪禮曰死於適室幠用斂衾幠覆也斂衾大斂聴用之衾也衾被也奉屍於室幠用夷衾夷衾覆屍柩之衾也又曰冒緇質長與手齊頳殺掩足冒韜尸者也制如直囊上曰質下曰殺殺韜足而上質韜首而下齊手上衣左下赤象地也又曰厥明陳衣于房南頭西上綪紟横三縮一横終幅拆其末綪屈也紟所以束衣服為堅急以布絞之縮從横者三幅從者終幅拆其末令可結之也禮記雜記曰唯絞紟衾冒死而後製又喪大記曰君錦冒黼殺綴旁七大夫𤣥冒黼殺綴旁五士緇冒頳殺綴旁三又曰小斂布絞縮者一横者三大斂布絞縮者三横者五布紟二衾君大夫士一也禮記外傳曰絞紟衾冒死而後製絞者交束之名也紟者堅急之稱也衾者單被也冒者小斂衣故設冒以揜形也小斂用一衾大斂用二衾一以覆之一者將斂之時先鋪衾於紟之下用以舉尸入棺者也釋名曰絞交也交結之也紟禁也禁繫之也太平御覽卷五百四十九
