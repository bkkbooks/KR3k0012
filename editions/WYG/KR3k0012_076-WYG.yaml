body:
  text: 太平御覽卷七十六宋李昉等撰皇王部一敘皇王上叙皇王上尚書緯曰帝者天號王者人稱天有五帝以立名人有三王以正度天子爵稱也皇者煌煌也洛書曰皇道􅆙故帝者興易坤靈圖曰在政不私公位稱之曰帝易緯曰帝者天號也德配天地不私公位稱之曰帝天子者繼天治物改正一統各得其宜父天母地以養生人至尊之號也大君者君人之盛也易坤鑿度曰帝王興亡必察八部觀卦之符物之應動又曰興於仁立於禮畢於義定於信成於智五者道德之分天下之際聖王之所以通天意而明至道也又曰王者天下所歸天子者繼天理物改一統政大君者人君之盛德大化行於萬人宜處王者施大化為大君也周書曰三王之統若循連環周則復始窮則反本尚書大傳曰三王之治如環之無端如水之勝火又曰古者天子有四隣前曰疑後曰丞左曰輔右曰弼有問無以對責之疑可志而不志責之丞可正而不正責之輔可揚而不揚責之弼韓詩外傳曰明王有三懼一曰處尊位而恐不聞其過二曰得志而恐驕三曰聞天下之至道而恐不能行又曰君者羣也羣天下萬民除其害者謂之君王者往也天下往之善養生人者也故人尊之善辯治人者也故人安之善顯設人者也故人親之善粉飾人者也故人悅之四德具而天下往之四德無一而天下去之往之之謂王去之之謂亡故曰道存則國存道亡則國亡大戴禮曰古者天子常以季冬考德以觀治亂得失又曰昔堯取人以狀舜取人以言湯取人以聲文王取人以度禮曰君天下曰天子又曰天子以德為車以樂為御又曰昔先王尚有德尊有道任有能舉賢而置之聚衆以誓之是故因天事天因地事地又曰帝嚳能序星辰以著衆堯能賞均刑法以義終舜勤衆事而野死鯀障洪水而殛死禹能修鯀之功黄帝正名百物以明民共財顓頊能修之湯以寛治民而除其虐文王以文治武王以武功去人之災此皆有功烈於人者也又曰王天下有三重焉其寡過矣乎又曰孔子曰大道之行也與三代之英丘未之逮也而有志焉大道謂五帝時也大道之行也天下為公選賢與能講信修睦故人不獨親其親不獨子其子使老有所終壯有所用幼有所長是故謀閉而不興盜竊亂賊而不作故外户而不閉是謂大同又曰故聖人作則必以天地為本以隂陽為端以四時為柄以日星為紀月以為量鬼神以為徒五行以為質禮義以為器人情以為田四靈以為畜又曰故聖人修義之柄禮之序以治人情故人情者聖人之田也禮斗威儀曰帝者得其英華王者得其根核霸者得其附枝故帝道不行不能王王道不行不能霸霸道不行不能守其身禮含文嘉曰山澤者三皇五帝之感應春秋演孔圖曰正氣為帝間氣為臣宫商為姓秀氣為人又曰天子皆五帝精寳各有題序次運相據起必有神靈符紀諸神扶助使開階立遂遂當作隧道也又曰王者常置圖籙坐旁以自立春秋元命苞曰皇者煌煌也道爛然顯明帝者諦也春秋文耀鈎曰王者往也神所向往人所歸樂春秋運斗樞曰伏犧女媧神農是謂三皇也皇者合元履中開隂布綱指天畫地神化潜通春秋合誠圖曰大帝之精起三河之州中土之腴又曰大帝冠五彩衣青衣黒下裳抱日月日在上月在下黄色正方居曰間名曰五光正黄而名之曰五光者蓋以黄為質而衆彩就飾之故曰五色此大帝人象旁文也春秋保乾圖曰天子至尊也神精與天地通血氣含五帝精人受天地氣而生故神精與天地通天愛之子之也春秋佐助期曰天子法斗諸侯應宿春秋潜潭邑曰天子有三寶謂璇璣玉衡律度也春秋繁露曰德似天地者稱皇帝天祐而子之號稱天子孝經援神契曰王德珍文備象連表萬精曲飾題類設術修經窮仁尚義祖禮行信握權任智順道行仁俱在至德孝經鈎命訣曰三皇步五帝驟三王馳五霸鶩或稱帝王接上稱天子明以爵事天接下稱帝王明以號令臣下論語摘寨聖承進曰帝不先義尚道德王不先力尚仁義霸不先正尚武力論語撰考䜟曰考靈差德知堯步舜驟禹馳湯騖德有優劣故曰行轉疾也家語曰孔子觀乎明堂覩四門之墉有堯舜桀紂之象又有周公相成王之圖孔子謂從者曰夫明鏡所以察形往古所以知今又曰季康子問於孔子曰舊聞五帝之名而不知其實請問何謂孔子曰昔丘也聞諸老聃天有五行金木水火土分時化育以成萬物其神謂之五帝古之五帝古之王者取法五行五行更王始終相生亦象其義也故其生為王者而死配五行白虎通曰帝王者號也號者功表也所以表功明德號令臣下德合天者稱帝仁義合者稱王别優劣也又曰皇君也美也大也天人之總美大之稱也時質故總稱之漢書曰堯舜禹稷與之為善則行驩兠欲與為惡則誅可與為善不可與為惡是謂上智桀紂龍逄比干欲與為善則誅子華崇侯與之為惡則行不可與為善可與為惡是為下愚應劭漢官儀曰皇者大也言其煌煌盛美帝者德象天地言其能行天道舉措審諦父天母地為天下主漢雜事曰漢有天下號曰皇帝自稱朕人臣稱之曰陛下其命令制誥衣冠車馬器械百物曰乘輿所在曰行在所至曰幸所居曰某禁中所進曰御天子至尊不敢褻凟之故託於乘輿天子以天下為家不以京師宫室為常處則當乘輿以行天下猶調之車駕今雖在京師京師言行在所巡狩天下所奏事處皆為宫在長安則曰長安宫在泰山則曰奉商宫唯當時所至帝王世紀曰天子至尊之定名也應神受命為天所子故謂之天子孔子曰天子之德感天地動八方是以功合神者稱皇德合天地稱帝義名曰稱王韋曜洞紀曰自天地剖判君世宰人可得而言者惟庖犧畫卦神農作稼黄帝輿服最為昭顯其餘非書記所述難可紀焉六韜曰王者之道如龍之首髙居而逺望深視而審聽神其形而散其精若天髙而不可極若淵深而不可測故可怒而不怒臣乃為虎可殺而不殺大賊乃發又曰昔栢皇氏栗陸氏驪連氏軒轅氏赫胥氏尊盧氏祝融氏此古之王者也未使民民化未賞民民勸此皆古之善為政者也至於伏羲氏神農氏教化而不誅黄帝堯舜誅而不怒古之不變者有苗有之堯化而取之堯德衰舜化而受之舜德衰禹化而取之太公伏符隂謀曰武王曰三皇之時無禮義而民利之何也太公曰三皇之時近之則利去之則病所謂上聖神德而治其次教而化之近聖賞罰之管子曰黄帝有明臺之議上觀於賢也堯有衢室之問下聽於民也舜有告善之旌而主不蔽也禹立諫鼓於朝而備訊謡也湯有總街之庭觀民誹也武王有靈臺之宫賢者進也此古聖帝明王所以有而勿失得而勿亡也又曰明道者皇察道者帝通德者王謀得兵勝者霸又曰桓公問曰三王者既殺其君矣今言仁義則必以三王為法度不識其故何也對曰昔者禹平治天下及桀而亂之湯放桀以定禹功也湯平治天下及紂而亂之武王伐紂以定湯功也善之伐不善自古至今未有改之君何疑焉又曰言室滿室言堂滿堂是謂聖王又曰昔者七十九代之君法制不一號令不同然俱王天下者何也必國富而粟多也夫富國多粟生於農故先王貴之晏子曰古者有紩衣攣領而王天下者有處橧巢窟穴而王天下者老子曰聖人處無為之事行不言之教萬物作而不辭生而不有為而不恃功成而不居夫惟不居是以不去又曰不尚賢使民不争不貴難得之貨使民不為盜不見可欲使心不亂是以聖人之治虛其心實其腹弱其志强其骨常使民無知無欲無知者不敢為也無為則無不治也又曰道大天大地大王亦大域中有四大而王居其一又曰聖人無常心以百姓心為心善者吾善之不善者吾亦善之得善矣信者吾信之不信者吾亦信之得信矣聖人在天下翕然為天下渾其心百姓皆注其耳目聖人皆孩之又曰聖人之言云我無為而民自化我無事而民自富我好静而民自正我無欲而民自樸又曰聖人執左契而不責於人故有德司契無德司轍聖人之心與百姓心猶左右契耳契合則和故上下相親怨誹不作後世不能執左契以應物而守常轍以軌民此求合必有餘怨矣又曰江海所以能為百谷王者以其善下之也是以聖人欲上人也必以其言下之欲先人也必以其身後之故處上弗害是以天下樂推而不厭也董子曰為天子不可不承天意必順其道然後為安又曰古之造文字者三畫而謂之王三者天地人也連其中者通其道也孟子曰人皆有不忍人之心言人人皆有不忍加惡於人之心也先王有不忍人之心斯有不忍人之政矣以不忍人之心行不忍人之政治天下可運之掌上又曰五霸者三王之罪人也趙臺卿章句曰五霸大國康政以率諸侯也齊桓晉文秦穆宋襄楚莊是也三王夏禹商湯周文武也今之諸侯五霸之罪人也天子討而不伐諸侯伐而不討荀卿子曰人君者降禮尊賢而王重法愛人而霸好利多詐而危欲近四旁莫如中央故王者必居天下之中也又曰粹而王駮而霸無一焉而亡又曰國者天下之利用也人主者天下之利勢也得道以持之則大安也大榮也積善之源也不得道以持之則大危也大累也義立而王信立而霸權謀立而亡行一不義殺一無罪而得天下仁者不為也莊子盜跖篇曰古之禽獸多而人民少於是人皆巢居以避之晝拾橡栗暮栖木上故命之曰有巢氏古者人不知衣服夏則多積薪冬則煬之故命之曰生知之民神農之代卧則居居起則于于知其母不知其父與麋鹿同處耕而食織而衣無有相害之心此至德之隆也又曰夫帝王之德以天地為宗以道德為主以無為為常無為也則為天下用而不足又曰天道運而無所積故萬物成帝道運而無所積故天下歸聖道運而無所積故海内服此三者恣物之性而無所牽滯於天通於聖六通四辟於帝王之德者其自為也夫虚静恬淡寂寞無為者萬物之本也以此處上帝王天子之德也又曰廣成子曰得吾道者上為皇而下為王郭璞曰皇王之稱隨世之上下耳其於得通變之道以應無窮一也失吾道者上見光而下為土失無窮之道則自信於一變而不能均同上下矣故俯仰異心也又曰赫胥氏之時民居不知所為行不知所之含哺而熙鼔腹而遊又曰昔容成氏大庭氏柏皇氏中央氏栗陸氏驪連氏軒轅氏赫胥氏尊盧氏祝融氏伏羲神農氏當是時也結繩而用之郭象曰足以紀要而已也甘其食美其服適故常甘當故常美若思侈靡則無時慊矣樂其俗安其居隣國相望雞狗之音相聞民至老死不相往來無求之至也若此者則至治也又曰古之王天下者知雖落天下不自慮也辯雖彫萬物不自說也能雖窮海内不自為也天不產而萬物化地不長而萬物育帝王無為而天下功故曰莫神於天莫富於地莫大於帝王故曰帝王之德配天地乘天地馳萬物而用人君之道也又曰至德之世不尚賢不使能民如野鹿正而不知以為義相愛而不知以為仁實而不知以為忠當而不知以為信又曰聖人之静也非曰静也善故静也萬物無足以撓心者故静也郭象曰撓亂也夫虛静恬淡寂寞無為者天地之平而道德之至故帝王聖人休焉唐子曰君人者乘南面之位操殺生之柄威如秋霜恩如春養何求而不得何化而不從人君也當以江海為腹山林為面當使其觀者不知江海何藏山林何有蘇子曰天子坐九重之内樹塞其門旒以翳明衡以隱聽鸞以抑馳陸子曰三皇垂䇿而五帝繁手唐虞按轡禹湯馳轅雖使周公御衡仲尼促節固不已也孫綽子曰道一者帝德充者王依仁仗義者霸無為而治者道也為能不恃者德也存三亡國仁也責貢不入義也慎子曰昔者天子手能依而宰夫設服足能行而相者導進口能言而行人稱辭故無失言失禮也又曰古者立天子貴之者非以利一人曰天下無一貴則禮無由通通理為天下也故立天子為天下也非立天下為天子也立國君以為國也非立國以為君也太平御覽卷七十六
