front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_954-1a, image: WYG0901/WYG0901-0431a.png}
body:
  text: 太平御覽卷九百五十四宋李昉等撰木部三栢槐栢書曰荆州厥貢杶幹栝栢詩曰􅆁栢舟言仁人而不遇也衛頃公之時仁人不遇小人在側汎彼栢舟亦汎其流栢木所宜為舟也又曰􅅠栢舟共姜自誓也衛世子共伯早死其妻守義父母欲奪而嫁之誓而不許故作是詩也汎彼栢舟在彼中河又曰徂來之松新甫之栢新甫山名周禮曰冀州其利松栢禮記曰禮之於人也如松栢之有心也五經通義曰諸侯冡樹栢爾雅曰栢掬也漢書曰武帝造栢梁殿與羣臣宴其下又云作栢梁臺又曰昭帝時長安諸地栢樹枯倒者悉起生葉虫食作字公孫病已立後昭帝崩昌邑王即位二十七日被廢迎立宣帝帝名病已厥兆應焉東觀漢記曰李徇遭父母䘮六年躬自負土樹栢常住冡下謝承後漢書曰陳留虞延為郡都部光武廵狩至外黄問延園陵栢樹數延悉曉之由是見知也王隠晉書曰王裒字偉元痛父不以命終絶世不仕立屋墓側旦夕常至墓前朝拜輒悲號㫁絶墓前一栢樹裒常攀援涕泣所着樹色與他樹不侔蕭方等十六國春秋曰王敦令郭璞筮卦曰明公起事禍必不乆敦怒曰卿壽幾何曰命盡日中引出斬之璞曰塋何之曰南山之首曰我知之矣必在䨇栢之間乎時有鵲巢而甚茂宋書魯郡孔子舊廟有栢樹二十株經歴漢晉其大連抱士人崇敬之莫犯也江夏王義恭悉遣人取之父老皆歎息齊書曰王儉字仲寳司徒袁粲見之歎曰宰相之門也栝栢豫章雖小已有棟梁之噐江夏王鋒以明帝移權常忽忽不樂著修樹賦以見其志曰既珠羣而抗立亦含眞而挺正豈春日之自芳亦霜下而為盛衝風不能摧其枝積雪不能改其性雖坎􅇄於當年庻後彫之可詠時鼎業潜移鋒獨慨然有匡復之意又曰王晏之為員外郎也父普曜齋前栢樹忽成梧桐論者以為梧桐雖有棲鳳之美而失後彫之節梁書侯景既陷臺城都下王侯庻姓廟樹咸見殘毁唯文宣太后廟四周栢樹獨欝茂及景簒南郊都官尚書李景略令伐此樹以立三橋斫南面十餘株再宿悉萌生便長數尺時既冬月翠茂如春賊乃大驚惡之使悉斫之識者以為昔僵柳起于上林乃表漢宣之應廟樹重青必彰異瑞北齊書曰魏蘭根丁母憂居䘮有稱将葬常山郡境先有董卓祠祠有栢樹蘭根盡取之了無疑懼又曰樊衛性至孝䘮父負土成墳植栢方數十畆朝夕號慕又曰文宣王曾晉陽夜宿松門嶺有數株松皆已千年枝葉踈茂似有神物所托文宣時已被酒向嶺瞋罵射中一株未幾枯死後周書曰武帝伐齊永昌公椿屯雞栖原齊王憲密謂椿曰兵者詭道去留不定見機而作不得遵常法今為營不須張幕可伐栢為庵示有形勢令兵去之後賊猶生疑也齊王領軍萬人向千里徑㑹被勅追還率兵夜反齊人果疑栢菴為帳幕不遣軍追翌日始悟隋書曰蔡景王整文帝弟也周明帝時以元武軍功賜爵從武帝平齊力戰而死文帝初居武元之憂率諸弟負土為墳人植一栢四根欝茂西北一根整栽者獨黄後因大風雨并根失之果不終吉唐書曰長壽二年冬十月萬象宮側有古松樹皆變為栢又曰狄仁傑補大理丞時将軍權善才坐斫昭陵栢樹仁傑奏其罪免職髙宗怒令誅之仁傑進曰若人假盗長陵一坏土陛下何以加之今陛下以昭陵一株栢殺一将軍千載之後謂陛下何臣不敢奉制帝意稍解孫卿子曰栢經冬而不凋蒙霜而不變可謂得其眞矣國語曰髙山峻原不生草木松栢之地其草不肥山海經曰三珠樹生赤水上其為樹如栢葉實皆為珠又曰白於之山其上多松栢穆天子傳曰甲申天子升於大北之隥而降休於兩栢之下有兩樹也東方朔傳曰武皇帝時閑居無事燕坐未央前殿天新雨朔執㦸在殿階獨語上呼問之答曰殿後栢樹上有鵲立枯枝上向東鳴問何以知立枯枝上朔曰新雨生枝滑枯枝澁是以知立枯枝上上大笑風俗通曰墓上樹栢路頭石虎周禮方相氏入􅇕敺魍像魍像好食亡人畏虎與栢列子傳曰延陵季子解𢃄劍掛徐君墓栢樹洞㝠記曰磅山之北有穴穴上有栢昔李少翁於閬隂移來此穴種此栢已見扶桑三枯海水涸竭帝覺遣人往穴掘不見其根唯見赤鷰飛入雲移栢植於通靈臺水經曰陘山有鄭祭仲冡廟舊有一枯栢樹望之青秀可喜從征記曰太山廟中栢皆三十餘圍夾兩階赤眉嘗斫一樹見血而止今斧創猶在地理志曰華山生文栢范子計然曰栢脂岀三輔上價七十中三十下十漢官儀曰正旦飲栢葉酒上壽漢武故事曰栢梁臺髙二十丈悉以栢香聞數十里列仙傳曰赤松子好食栢實齒落更生仙經曰服栢子人長年三輔黄圖曰漢文帝覇陵不起山陵稠種栢樹三輔舊事曰漢諸陵皆屬太常又有盗栢者棄市太山記曰山南有太山廟種栢樹千枝大者十五六圍長老傳云漢武所植三齊記曰堯山祠旁有栢樹枯而復生不知幾世陳留耆舊傳曰李充䘮父父冡側有盗夜斫栢樹者充手刄之述征記曰栢谷谷名也漢武帝微行所至處長傲賔於栢谷者也谷中無廻車地夾以高原栢林䕃藹窮日幽暗殆弗睹陽景也晉宮闕名曰華林園栢二株崔實四民月令曰七月收栢實列異記曰陳倉人有得異物者其形不類狗亦不似羊衆莫能名二童子曰此為媪常在地下食死人腦若欲殺之使栢葉挿其頭幽明録曰王丞相見郭景純請為一卦卦成郭意甚惡云有震厄公能命駕西出數里得一栢樹截如公長置常寝處災可消也王從之數日果震栢木粉碎任昉述異記曰盧氏縣有靈君古冡冡旁古栢二株條䕃二百餘歩樹文隐起皆龜甲堅如鐡石嵇康養生論曰麝食栢而香楚詞曰山中人兮芳杜若飲石泉兮飯松栢古歌曰平陵東松栢桐不知何人却義公劉越石扶風歌曰南山石嵬嵬松栢何摧摧上枝拂青雲中心十數圍洛陽發中梁松栢竊自空誰能刻鏤此公輸與魯班被之用丹漆薰用蘇合香本是南山栢今為宮殿梁槐周禮曰朝士掌三槐三公位焉又曰司烜氏掌火冬取槐檀之火左傳曰趙宣子驟諫公患之使鉏麑賊之晨往寢門闢矣盛服將朝尚蚤坐而假寐麑退歎而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死春秋元命苞曰樹槐聽訟其下槐之言歸也精見歸實也春秋説曰槐木者靈星之精爾雅曰櫰槐大葉而黒槐樹葉大色黑者謂之櫰守宫槐葉晝聶宵炕郭璞曰守宫槐晝日聶合而夜布晉儒林祭酒杜行者説在明陵縣南有一樹似槐葉盡聚合相着夜則舒布即守宫江東樹與相反俗因合昏曉晝夜異其種類炕音帆聶合也炕張也合晝夜合也五經通義曰士冢樹槐國語曰董叔將娶於范氏叔向曰盍已乎曰欲援繫焉他日董祁愬之范獻子曰不吾敬也獻子執而紡之於庭槐叔向過之曰子盍為我請乎叔向曰欲而得之何請焉紡懸也漢書曰昭帝元始四年山陽社中大槐樹吏人伐斷之其夜復自立如故晉書曰苻堅僭號自長安至于諸州夾路皆種槐栁百姓歌曰長安大街夾路楊槐下走朱輪上有棲鸞又曰大司馬府有老槐樹殷仲文對而歎曰此樹婆娑生意盡矣崔鴻前凉録曰初河西不生楸槐栢張駿之世取於太原而植之終於皆死而酒泉宮之北隅有槐樹生焉李𤣥盛著槐樹賦沈約宋書曰孔子夜夢三槐之間豐沛之郊有赤烟氣驅車對楚西北觀之見芻兒敵麟傷其左足薪而覆之梁書曰庾肩吾常服槐實年七十餘目㸔細字鬚鬢皆黑離亂之際奔于江陵隋書曰髙熲字昭𤣥領新都大監毎坐槐樹下以聼事其樹不依行列有司欲伐之上令勿去以示後人唐書曰永崇二年太平公主降駙馬薛紹以萬年縣為禮會之所公主輅車自興安門出南至宣揚門之西夜設燎炬烈熖相屬夾路槐樹多有死者又曰貞元中度支欲取兩京道中槐樹為薪更栽小樹先下牒符渭南縣縣尉張造牒曰召伯所憇尚勿剪除先皇舊遊豈宜斬伐乃止又曰長慶中虢州刺史蕭佑奏湖城縣永房鄉百姓閻酆五代同居家内槐一本再生枝葉管子曰五沃之土其木宜槐晏子春秋曰齊景公有所愛槐使人守之令曰犯者刑傷者死有醉而傷槐且加刑焉其女懼而告晏子曰妾恐隣國聞之謂君愛槐而殘人可乎晏子入言之公出傷槐之囚罷其禁淮南子曰槐之生也入季春五日而兎目十日而䑕耳更旬而始規二旬成葉規葉始開也又曰九月官候其樹槐是月繕修守備故官候樹槐槐懐也取懐近遠也又曰槐老生火又曰槐市學也樹以青槐燧人秋取槐檀之火天之所覆地之所載六合所包隂陽所煦雨露所扶此皆生於父母而閲一和也父母天地故槐榆與橘柚合為兄弟有苖與三危通為一家抱朴子曰槐子新瓷合泥封之二十餘日其表皮皆爛乃涴之如大豆日服之此物最補腦早服之令人髮不白而長生太公金匱曰武王問太公曰天下神來甚衆恐有試者何以待之太公曰請樹槐于王門内有益者入無益者距之也三輔黄圖曰元始四年起明堂辟雍為博士舍三十區為㑹市但列槐樹數百行諸生朔望㑹此市各持其郡所出物及經書相與買賣雍雍揖讓論議槐下侃侃誾誾如也事具禮部學校篇焦贛易林家人之乾曰千嵗槐身多斧斤汝南先賢傳曰新蔡鄭敬字子都為郡功曹都尉高懿㕔事前有槐樹有露類甘露者懿問掾屬皆言是甘露敬曰明府政未能致甘露但樹汁耳懿不悦託疾而去楊􅃷之洛陽伽藍記曰李昌年廣陵王元淵初除儀同三司總衆北討葛榮夜夢着衮衣倚槐樹立以為吉徴問于楊元愼元愼曰三公之祥淵甚悦之元愼退還吿人曰廣陵死矣槐字木傍鬼死後當得三公廣陵果為葛榮所殺追贈司徒公終如其言太平御覽卷九百五十四
