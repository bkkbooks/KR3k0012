  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_767-1a, image: WYG0899/WYG0899-0709a.png}
body:
  text: 太平御覽卷七百六十七宋李昉等撰雜物部二板瓦甎塹蒭茭堊竿鈎釘鐷􅀈板葛洪神仙傳曰王逺字方平東海人也博學六經尤明天文圖䜟河洛之要逆知天人盛衰之期九州吉凶漢桓帝聞之連徴不出使郡國逼載以詣京師低頭閉目不肯荅乃題宫門扇板四百餘字皆說方來帝甚怒之使人削之外字去内字復見墨皆徹入板裏續搜神記曰聶支豫新淦古暗切人少時貧常夜照見一白鹿射中之明尋蹤血旣盡不知所在且已飢極便卧一梓樹下仰見箭着樹枝視之乃是昨射箭怪其如此於是還家賫糧命子姪持斧以伐之樹㣲有血遂裁截為板二板牽著坡塘中板常沈地然時復浮出輙家有吉慶每欲致賔客輙使此板於中流欲没客大懼聶君呵之還復浮出仕宦大如意位至丹陽太守在郡經時外司白云濤入石頭夜聞神語曰聶君板來來日視之果然聶君以板來必有意即解職歸家下船便閉戸二板夾兩邊一日至豫章自爾之後板出便反有凶禍家大轗軻幽明録曰義熈中江乘聶湖忽有一板廣數尺長二丈餘恒停在此川溪採菱及捕魚者資以自濟後有數人共乘板入湖試以刀斫即有血出板仍没數人溺死瓦古史考曰夏世昆吾氏作屋瓦禮曰慕賢而容衆毁方而瓦合史記曰秦攻韓軍於武安西秦軍鼓噪勒兵武安屋瓦盡震漢書曰霍禹第巷端人見禹居堂屋上撒瓦投地就視亡有大怪之舉家憂愁未幾被誅續漢書曰董卓作亂燒南北宫雒陽城無隻瓦尺木呉時外國傳曰大秦國以水精為瓦晉起居注曰成都王討長沙王使陸機都督三十七萬衆圍洛陽四匝夜鼔噪京師屋瓦皆裂晉中興書曰㤗寧元年五月大廻風吹劉曜太廟瓦垣外數十歩其欒梁拱梧無離者瓦亦不毁曜素服五月繕治之淮南子曰以磁石之能運鐵也而求其引瓦則難矣漢武故事曰武帝起神明殿砌以文石用布為瓦而淳漆其外四門並如之說林曰晉張載字孟陽甚醜每出為小兒擲瓦盈車葛洪神僊傳曰孫博者河東人也有藏人亡奴在軍中者因以求之不得博語奴主曰吾為卿燒其營舎奴出走卿但諦伺取之於是博以一赤瓦擲之湏㬰火起張天果出走而得之博乃以青瓦擲之火即滅屋舎百物向已燋然者悉復如故靈鬼志曰人姓鄒坐齊中忽有一人通刺詣之題刺云舒甄仲既去疑其非人尋其刺曰吾知之矣是予舎西土瓦中人耳便往令人将鍤掘之果於瓦器中得桐人長尺餘管子曰棟橈不勝任則屋覆而人不怨者其理然也弱子慈母之所愛也不以其理而下瓦則慈母笞之故以理動者雖覆屋不為怨不以其理動者下瓦必笞莊子曰師曠為晉平公作清角一奏有雲從西北起再奏大雨大風隨之裂帷幕破爼豆堕廊瓦平公懼伏於室内抱朴子曰土蚌瓦胾不可救飢甎爾雅曰瓴謂之甓蒲歴切即甎也古史考曰鳥曹氏作甎魏畧曰扈累獨居道側以㼾甎為障施一厨牀食宿其中晉書曰呉興呉逵經疫癘合門死者十三唯逵夫妻家貧冬無衣被晝傭賃夜還燒甎伐木朞年中成七墓葬十三棺宋書曰范􅁮字蔚宗母如厠産之額為甎所傷故以甎為小字鄭緝之東陽記曰獨公冢在縣東八十里有冢臨溪其甎文曰筮言吉龜言凶三百年墮水中義熈中冢猶半在自後稍已崩盡續搜神記曰順陽范啓母喪當葬前母墓在順陽往迎之既至而墳壟雜沓難可識别不知何許袁彦仁時為豫州往看之因云聞有一人見鬼范即如言令物色覔之比墓中一人衣服顔状如之即開墓棺物皆爛塚中灰壤深尺餘意甚疑試令人以足撥灰中土兾得舊物果得一甎銘云順陽范堅之妻然後信之述異記曰豫章胡兹在蜀郡治宋㤗始四年空中忽有故冢墓甎青苔石灰擲其母前勢甚數舉家驚懼然終不中人旬日乃止語林曰陶太尉既作廣州優游無事常朝自運甓甎也於齋外暮運於齋内人問之陶曰吾方致力中原恐為爾優游不復堪事塹東觀漢記曰周紆字文通為渤海太守坐事免家貧身築塹以自給食蒭茭書曰峙乃蒭茭亡敢弗多詩曰生蒭一束其人如玉禮曰以足􅕚路馬蒭有誅聲類曰茭乾蒭也老子曰天地不仁以萬物為蒭狗聖人不仁以百姓為蒭狗趙壹娯邪賦曰勢家多所宜欬唾自成珠披褐懐金玉蘭􅈍化為蒭堊音惡禮曰在堊室之中不與坐焉山海經曰慈聾之山其中有大谷是多白墨青堊謂有雜色之堊太公六韜曰昔帝堯王天下上世謂賢君其治垣宫室屋不堊也莊子曰郢人堊漫其鼻端若蠅翼使匠石斵之運斤成風盡堊而鼻不傷郢人立而不失容竿詩曰籊籊竹竿以釣于淇說文曰竿竹挺也漢書曰斬木為兵掲竿為旗續漢書曰髙􅃫字文通南陽人妻将之田曝麥於庭令鳯䕶鷄然天暴風大雨鳯持竿誦經不覺潦水流麥妻還怪問鳯方悟博物志曰詹何以獨蠒之絲為綸芒針為鈎荆篠為竿剖粒為餌引盈車之魚於百仞之淵莊子曰楚王聘莊周於濮水之上莊子持竿不顧鈎史記曰桀有力能伸鈎索鐵搜神記曰京兆長安有張氏晝獨處室有鳩自外入止前牀張氏惡之披懐而祝曰鳩爾來為我禍耶飛上承塵為我福耶来入我懐鳩翻入懐以手探之則不知鳩之所在而得一金鈎焉遂寳之自是之後子孫昌盛資財萬倍蜀賈客至長安中聞之乃厚賂内婢婢竊鈎以與客張氏既失鈎漸貧死喪而蜀客亦數罹窮厄不為己利或告之天命也不可以力求於是賫鈎以還張氏張氏復昌故闗西稱張氏鈎風俗通曰順帝時京師謡曰直如絃死道邉曲如鈎乃封侯張衡賦曰仰飛纎􅌳俯釣長流觸矢而斃貪餌吞鈎釘魏畧曰晉宣王討王陵陵自知罪重試索棺釘以觀太傅意太傅給之陵夜呼掾屬與訣曰行年八十身名並㓕遂自殺盛𢎞之荆州記曰冠軍縣東有魏征南司馬張詹墓元嘉初尚儼然六年民飢始被發金銀朱漆之器爛然有二朱漆棺棺前垂竹簿簾以金釘之楊龍驤洛陽記曰石牛一頭在城西北九十里耆舊傳說往者石虎當襄國石牛夜喚聲聞三十里事奏虎虎遣人打落牛两耳及尾以鐵釘釘四腳今現存抱朴子曰呉有趙柄以大釘釘柱入尺許以氣吹之釘即躍出如弩箭之發鏶廣雅曰鏶謂之􅀈戈渉切說文曰鏶􅀈也礪詩曰周道如砥書曰揚州厥貢礪砥又曰若金用汝作礪史記曰封爵之誓曰黄河如帶泰山如礪蔡邕觀學曰木以繩直金以淬剛必湏砥礪就其鋒鋩魏志曰殺幽州牧劉虞有童謡曰燕南垂趙北際中央不合平如礪唯有此中可避世公孫瓉以易當之乃築京固守積穀三百萬斛廣志曰礪石出首陽山有紫白彩色出南昌者最善今武庫有數枚治御刀山海經曰髙梁之山多砥礪尸子曰鐵使平越之工鑄之以為劒而弗加砥礪則以刺不入擊不斷磨之以礱礪加之以黄砥則刺也無前擊也無下自是觀之礪之與弗礪其相去逺矣今人皆礪其劒而弗知礪其身夫學身之砥礪也太平御覽卷七百六十七
