  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_020-1a, image: WYG0893/WYG0893-0189a.png}
body:
  text: 太平御覽卷二十宋李昉等撰時序部五春下立春春分春下説苑曰管仲曰吾不能以春風風人夏雨雨人吾道窮矣白虎通曰嫁娶以春何春者天地交通萬物始生隂陽交接之時也京房占曰春當退貪吏進柔良恤孤幼賑不足求隱士萬物應節而生隨氣而長是為春令司馬法曰春不東征秋不西伐月食班師所以省戰謂春生成秋不伐熟夫兵隂象也月食則隂毁故息戰也顏氏家訓曰夫學者猶種樹也春翫其華秋取其實講説文章春之華也修身利行秋之實也徐子中論曰夫名之繫于時也猶物之繫于時也生物者春也吐華者夏也布葉者秋也收成者冬也斯無為而自成者若强為之則傷其性矣風俗通曰赤春俗説赤春從人假貸家皆自乏之時謹按詩曰春日載陽有鳴鶬鶊月令衣青衣服蒼玉又爾雅春曰青陽凡三春時不得服赤也今俚語曰相斥角牛原其所以言不當角牛春從人求索也斥與赤同周生烈曰仁如春風惠如冬日汜勝書曰榆莢雨髙地强土可種木投荒録曰南方春時晴霽即如夏隂雨即如冬不復有韶光麗景若通四時言之夏多而微有冬春與秋不復辨矣陸機要覽曰九花樹生南岳雖經雪凝寒花必開便落時人謂之應春花真誥曰正月庚申上帝殺害日不可請乞百事無益登真隱訣曰正月午天地凶門日不可建造穿鑿又曰正月亥地破日不可開山動土虞世南史略曰北齊盧士深妻崔林義之女有才學春日以桃花靧兒面靧荒内切洗面也呪曰取紅花取白雪與兒洗面作光悦取白雪取紅花與兒洗面作光華取雪白取花紅與兒洗面作華容楚辭曰獻歲發春兮汩吾南征又曰目極千里兮傷春心又曰開春發歲兮承陽施惠養百姓兮又曰王孫逰兮不歸春草生兮萋萋又曰青春受謝白日昭崔駰臨洛觀春賦曰迎夏之首末春之垂桃之夭夭楊柳依依張衡歸田賦曰仲春令月景和氣清原隰鬰茂百草滋榮王睢鼓翼鶬鶊哀鳴交頸頡頏關關嚶嚶於焉逍遥聊以娛情湛方生惜春賦曰夫凋榮之興感由色象之在鏡事隨化而遷廻心無主而虛映盼秋林而情悲逰春澤而心令孰云知其所以乘天感而叩性古樂府詩曰青青園中葵朝露待日晞陽春布德澤萬物生光輝張衡歌曰浩浩陽春發楊柳何依依百鳥自南歸翺翔萃我枝李充春逰賦曰蓋適性莫暢乎逰而時和莫踰乎春陸機樂府詩曰逰春芳草林春芳傷客心和風飛清響鮮雲垂薄隂蕙草饒淑氣時鳥多好音翩翩拂鳴鳩喈喈鶬鶊吟王廙春可樂曰春可樂兮樂孟春之初陽野芳赫而暉緑山翠蒨以發蒼立春禮記月令曰孟春之月是月也以立春先立春三日太史請于天子曰某日立春盛德在木天子乃齋立春之日親率公卿諸侯大夫以迎春于東郊還乃賞公卿大夫于朝命布德和令行慶施惠下及兆民傳曰凡分至啓閉必書雲物為備故也立春為啓立冬為閉又曰郯子對孔子曰少皥摯為鳥師而鳥名青鳥氏司啓者也青鳥鶬鶊也以立春鳴立夏止開元禮曰立春祀青帝于東郊立春後五日祀風師于國城東北易通卦驗曰立春條風至宋均注曰條風者條達萬物之風也孝經鈎命訣曰先立春七日勅獄吏決詞訟有罪當入無罪當出立春初勅門闌無關鑰以迎春之精下弓載楯鼓示時聲動昆蟲也孝經緯曰周天七衡六間曰立春後十五日斗指寅為雨水後十五日斗指甲為驚蟄後十五日斗指乙為清明後十五日斗指辰為榖雨後漢書禮儀志曰立春之日夜漏未盡五刻京都百官皆衣青郡國縣官下至令史皆服青幘立春青幡施土牛耕人於門外以示兆民又曰孔子作春秋書正月者敬歲之始也王者則天之象因時之序宜開發德號爵賢命士流寛大之澤垂仁厚之德順助元氣涵養庶類如此則天文昭爛星辰顯列五緯循軌四時和睦五緯五星也否則太陽不光天地溷濁時氣錯違霾霧蔽日自立春以來累經旬朔未見仁德有施但聞罪罰掠拷之聲夫天之應人捷于影響而自入歲常有蒙氣月不舒光日不宣曜日者太陽以象人君政變于下日應于天清濁之占隨政抑揚天之見異事無虛作或者陛下倦于萬幾帷幄之政有所闕歟晉書禮志曰太史每歲上年厯先立春讀五時令服名隨方色帝御座尚書以下就席訖賜酒一巵唐書曰景龍中中宗孝和帝以立春日宴别殿内出剪綵花令學士賦之又曰景龍四年正月八日立春上命侍臣自芳林門經苑東展仗入至望春宫迎春内出綵花樹人賜一枝荆楚歲時記曰立春日悉剪綵為燕以戴之帖宜春二字傅咸燕賦有其言矣傅咸燕賦云四時代至敬逆其始彼應運于東方乃設燕以迎至翬輕翼之岐岐若將飛而未起何夫人之工巧式儀型之有似御青書以贊時著宜春之嘉祉周書時訓解曰立春之日東風不觧凍號令不行蟄蟲不振隂氣姦陽魚不上氷甲胄私藏雨水之日獺不祭魚國多㓂賊鴻鴈不來逺人不服草木不萌動果蔬不熟春分齊民月令曰春分不殺生不弔疾君子齋戒衣祫衣導引不食生冷白虎通曰明庶風春分至王者修封疆理田疇太平御覽卷二十
