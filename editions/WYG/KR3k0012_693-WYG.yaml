  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_693-1a, image: WYG0899/WYG0899-0210c.png}
body:
  text: 太平御覧卷六百九十三宋李昉等撰服章部十袍褐衫襜褕袍説文曰以絮曰襺以緼曰袍禮記玉藻曰纊為繭緼為袍緼舊絮纊綿也釋名曰袍丈夫着下至跗者袍苞也内衣也論語曰衣敝緼袍與衣狐貉者立而不耻者其由也與詩曰豈曰無衣與子同袍史記曰秦相范睢與魏人須賈有隙及賈使秦睢自稱張禄先生見賈寒取一綈袍以賜之及數其罪曰爾得無死者将以綈袍有戀故人之意漢書曰文帝遺單于繡袷長襦褘袷袍各一續漢書曰袁安為光禄勲至清鹿袍糲食又曰三老五更皆服都禄大袍輿服志曰公主貴人妃以上嫁娶得錦綉羅縠十二色緑袍東觀漢記曰明德馬后袍極麄疎諸王朝望見反以為竒焉後漢書曰藥崧者家貧為郎無被糟食自此詔給帷被皂袍袁山松後漢書曰靈帝欲以羊續為太尉時拜三公者皆輸東園禮錢千萬中使督之續乃舉緼袍以示之曰臣之所資惟斯而已故不登公位古今善言曰續出黄紙補袍以示使人時人謡曰天下清苦羊續祖又曰桓鸞字始春鄢弟也少立志行緼袍糟食不求盈餘以濁世耻不肯仕魏略曰薛夏字宣聲黄初中為秘書丞帝與夏推論書傳未嘗不終日也帝見其衣薄觧所御袍賜之蜀志曰彭羕字永年姿性驕傲多所輕忽惟敬同郡秦宓薦之於太守許靖曰竊見處士綿竹秦宓應山甫之德履隽生之直枕石潄流吟詠緼袍也王隠晋書曰江東賜凉州刺史張駿眞金印大袍又曰鄭冲以儒雅為德蒞職無幹局之譽簞食緼袍不營資産世以此重之又曰惠帝自鄴還洛陽賜中書監慮志鶴綾袍一領又曰武帝賜桓伊錢百萬袍裏千端又曰慕容冲進逼符堅送一領錦袍遺冲曰古者交兵使在其間今送一袍以明本懐齊書曰卞彬蚤虱賦序曰余居貧布衣十年不製一袍之緼有所生託資其寒暑無與易之為之多病起居甚踈庸寢敗絮不能自釋梁書曰侯景將為亂時謡曰青袍白馬夀陽來後景軍衆悉着青袍景長乘白馬又曰臨賀王正德侯景之亂正德為平北將軍屯朱雀殿景至正德乃北向望闕三拜歔欷流涕引賊入宣陽門與景交揖馬上退㨿左衛府先是其軍皆著絳袍袍裏皆碧至是悉反之賊以正德為天子唐書曰武后出緋紫單羅銘襟背袍以賜文武臣其袍文各有炯戒諸王則飾以盤石及鹿宰相飾以鳳池尚書飾以對雁左右衛將軍飾以麒麟左右武衛飾以對虎左右鷹揚飾以鷹左右千牛飾以牛左右豹韜飾以獅子左右金吾飾以象又銘其襟背作八字廻文焉又曰肅宗為皇太子受册當被絳袍太子以為與皇帝同稱辭不敢當下百官議帝手勅改為朱明服又曰薛平能守法度理身儉薄一緑袍十年不易㤙加朱紱然後始解去莊子曰曾子居衛緼袍無表十年不製衣墨子曰楚莊王鮮冠緼紐纓綘衣博袍以理其國政也説􅁐曰子思居衛緼袍無裏田子方遺狐白之裘恐其不受之謂之曰吾假人遂忘之子思竟不受鹽鐡論曰原憲之緼袍賢於季孫之狐貉又曰倪寛練袍衣若僕妾食若庸夫東宫舊事曰太子納妃有絳綾袍一領漢武内傳曰上元夫人降武帝服赤霜之袍雲彩亂色非錦非繡不可得名神仙傳曰太傅楊駿使人迎孫登共語不荅復以布袍賜之受之出門從人借刀斷袍上下異處於駿門下又大讙斫當時人謂為狂後乃知駿當誅斬其人王褒内傳曰其人將褒見太上丈人著流霞羽袍芙蓉冠捜神記曰有談生者年四十無婦夜有女年十五六姿顔無雙來為生妻經三年遂乃生一兒曰慎勿以火照我後三年可照耳生不能忍照之腰上肉如人腰下但枯骨婦求去将生入華堂曲奥室以珠袍與之生至市賣袍睢陽王識是女袍収拷談生生具對呼児似王女又曰郭璞每自為卦知其㐫終嘗逢一趣走少年便脱新絲袍與之此人不觧其意璞曰身命卒當在君手故逆相属耳及當死果此人行刑旁人皆為属求利璞曰我託之乆矣此人為之歔欷哽咽行刑既畢乃説如此鄴中記曰石虎臨軒大㑹著丹紗袍鍾岏良史傳曰袁彭字伯楚為南陽太守政以清潔糲食緼袍不易其操古樂府白紵歌白紵寳如月輕如雲色似銀袍以光驅巾拂塵製以為袍餘作巾古詩曰青袍似青草長條隨風舒魏武帝與楊虎書曰今遺足下貴堂錯彩羅縠錦袍一領劉𢎞毅曰将士寒窮者給一韋袍複㡌劉義恭啟事曰詔㫖以赦日所制綾紋錦布􅂁放生古具袍垂重賜劉謐之與天公牋曰體戰身禁脫衣凍坐頼詹公借袍南越送火褐説文曰褐短衣也詩曰無衣無褐何以卒嵗左傳曰吳申叔儀乞糧於公孫有山氏曰佩玉蘂兮余無繫之㫖酒一盛兮余與褐之父睨之對曰粱則無矣麄則有之若登首山以呼庚癸則諾軍中不得出糧故為私隠庚西方主榖癸北方主水傳言吳子不與士共飢渇所以亡史記曰五羖大夫鄙人也聞秦繆公之賢自鬻秦客被褐食牛暮年舉之牛口之下加之百姓之上又曰趙惠文王得楚和璧秦昭王遺趙王書願以十城易璧趙遣藺相如奉璧秦王無償城邑相如使從者衣褐懐璧便道亡歸又曰婁敬隴西人過洛陽衣羊裘因齊人虞将軍求見上虞将軍欲為易其衣不肯曰臣衣帛衣帛見衣褐衣褐見遂見上説上西行漢書曰貢禹上書云年老貧窮家貲不滿萬錢妻子糠豆不贍短褐不完後漢書曰張𤣥字處微有才畧以世亂不仕司空張温數以理辟不能致後温以車騎将軍出征凉州将行𤣥自廬被褐帶索要説温不能用晋書曰皇甫謐字士安上疏曰咎繇之振褐不仁者逺矣陶潜五桞先生傳曰短褐穿結簞瓢屢空晏如也老子曰聖人被褐而懐玉墨子曰人不可衣短褐衣服不美身體從容不足觀也新序曰齊有婦人極醜無雙號無鹽女行年四十無所容入衒嫁不售乃拂短褐自詣宣王曰願當君王盛顔符子曰有澤父有冠葭蘆之笠納鹿皮履莎裳褐衣裴淵記曰蠻夷取榖樹皮熟搥之以為褐趙壹疾邪賦曰勢家多所宜欬唾自成珠被褐懐金玉蘭蕙化為芻古詩曰短褐中無絮帶斷續以繩衫釋名曰衫芟也衫乘無袖端也襦襠者當胷一當背也揚雄方言曰陳魏宋楚之間謂之襜或謂之單襦沈約宋書曰徐湛之母㑹稽公主髙祖㣲時有納布衫襖等衣皆是武敬皇后手自作髙祖既貴以此衣付公主曰後代若驕奢不莭者可以此示之又曰到溉為建安太守任昉以詩贈之求二衫云鐵錢兩當一百代易名實為惠當及時無待凉秋日溉荅云余衣本百結閩中徒八蠶假令金如粟詎使亷夫貪宋書曰薛安都與魏戰魏多縱突騎衆軍患之安都怒甚乃脫兠鍪觧所帶鎧唯着絳納兩襠衫馬亦去具装馳入賊陣猛氣咆􅣋所向無當其鋒者又曰渇盆陀國士人翦髪着氈㡌小袖衣為衫則開頸縫前齊書曰陽休之除散騎常侍監修起居注頃之坐事左遷驍騎将軍衣兩襠文宣郊天百僚咸從休之為驍騎将軍衣兩襠用手持白棓時魏収為中書令嘲之曰義眞服未休之曰我昔為常伯首戴蟬冕今處驍游身被衫甲允文允武何必减卿談笑晏然議者服其夷曠唐書曰德宗在梁州地熱未給将士春衣上亦御夾服以視朝左右請御衫上曰從我者冬服未易我豈可獨衣衫乎将士聞之莫不流涕魏文帝别傳曰吳選曹令史長沙劉卓字德然病荒夣見一人以白越單衫與之言曰汝着衫汙火燒便潔也卓覺果有衫在側汙輙火浣之晉惠帝起居注曰愍懐以體上白絹单衣一領因士寄與妃宋起居注曰太起二年御史丞羊希奏山隂令謝沉親憂未除常着青絳納兩襠請免沉前所居官也晉東宫舊事曰太子納妃有白縠白紗白絹衫並紫結纓祖台之志怪曰建康小吏曹着為蘆山使君所迎配以女婉着形意不安屢求諌退婉澘然流涕賦詩序别拜贈織褌衫也劉敬叔異􅁐曰毋丘儉征沃沮使王傾窮其東界父老云曾有破船從漢海流得布衫身如中國人但兩袖俱長三寸襜褕方言曰襜褕江淮之間謂之􅥗褣自關而西謂之襜褕以無縁謂之藍縷漢書曰元始五年有一男子乘黄犢車建黄旗衣黄襜褕着黄㡌詣北闕自謂衛太子又曰何並為長陵令侍中王林卿通輕狹傾京師至寺㧞刀刺其建鼓並追之卿廹窘乃令奴冠被其襜褕自代乘變服馳去東觀漢記曰耿純率宗族賔客二千人皆􅀈襜褕絺巾迎上又曰更始在長安自恣三輔苦之又所官爵多群小或繡面衣錦袴襜褕罵詈道路又曰王阜為益州太守大将軍竇憲貴盛以絳罽襜褕與阜不受又曰叚頴滅羗詔賜頴錢十萬綘襜褕一領又曰延岑上元還被襜褕宿下邑亭亭長白言睢陽賊衣綘􅄢襜褕今宿客疑是乃發卒來岑卧不動吏謝去邉譲别傳曰譲字文禮孔融薦譲於武帝曰邉讓為九州衣被則不足為單衣襜褕則有餘桓譚新論曰余自長安歸道病蒙絮被罽襜褕宿下邑亭也太平御覧卷六百九十三
