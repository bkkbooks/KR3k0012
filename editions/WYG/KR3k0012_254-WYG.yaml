  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_254-1a, image: WYG0895/WYG0895-0297c.png}
body:
  text: 太平御覽卷二百五十四宋李昉等撰職官部五十二刺史上刺史上漢書曰監察御史秦官掌監郡漢省丞相遣史分刺州不常置武帝初置部刺史掌奉詔條察州又曰刺史以六條問事非條所問不省一條强宗豪右田宅踰制以强凌弱以衆暴寡二條二千石不奉詔書遵承典制背公向私旁詔牟利浸漁百姓聚歛為姦三條二千石不䘏疑獄風厲殺人怒則任刑喜則任賞煩擾刻暴剥截黎元為百姓所疾山崩石裂妖祥訛言四條二千石選署不平苟阿所愛蔽賢寵頑五條二千石子弟恃怙榮勢請託所監六條二千石違公下比阿附豪强通行貨賂割剥民人又曰王遵遷益州刺史先是瑯琊王陽為益州刺史行部至九折阪歎曰奉先人遺體柰何數乘此險後以病去及遵為刺史至其坂問吏曰此王陽所畏道耶吏對曰是遵叱其馭曰駈之王陽為孝子王遵為忠臣又曰朱博奏曰漢家立置郡縣部刺史奉供典州督察郡國吏人安寧故事居部九嵗舉為守相其有異材功著者輒登擢秩卑而賞厚咸勸功樂進今增秩為牧以髙第補九卿其中材則苟自守而已恐功効陵夷姦宄不禁臣請罷牧置刺史如故奏可東觀漢記曰州牧刺史漢舊官建元元年復置牧十八年改為刺史督二千石又曰段熲起於徒中為并州刺史有功徵還京師熲乘輕車介士鼔吹曲葢朱旗騎馬殷天蔽日連騎相繼數十里後漢書曰馬嚴上書云臣伏見方今刺史太守専州典郡不務奉事盡心為國而司察偏阿取與自已同則舉為尤異異則中以刑法不即垂頭塞耳採求財賂又曰郭伋為并州牧過京師謝恩帝即引見并召皇太子諸王宴語終日賞賜車馬衣服什物伋因言選補衆職當簡天下賢儁不宜専用南陽人帝納之謝承後漢書曰王宏遷冀州刺史宏性刻不發私書不容豪族賔客號曰王獨坐又曰李壽為青州刺史發璽書於本縣傳舍乘法駕騑乗朱軒就路奏免四郡相百城怖懼悉豫棄官魏志曰賈逵字梁道為豫州刺史是時天下初復州郡多不攝逵曰州本以御史出監諸郡以六條詔書察長吏二千石以下故其狀皆言嚴毅鷹揚有督察之才不言安靜寛仁有愷悌之德也今長史慢法盜賊公行州知而不紏天下復何取正乎兵曹從事受前刺史假逵到官數月乃還逵考竟其二千石以下阿縱不如法者皆舉奏免之帝曰逵真刺史矣布告天下當以豫州為法又曰張既字德容出為雍州刺史太祖謂既曰君還本州可謂衣繡晝行矣又曰吕䖍字子恪任城人也遷徐州刺史加破虜將軍請瑯琊王祥為别駕民事一以委之世多其能任賢晉書曰向雄太始中累遷秦州刺史假赤幢曲葢鼓吹又曰劉卞東平須昌人也後為岳州刺史昔同時為須昌小吏者百餘人祖餞之其一人輕卞卞遣扶出之人以此少之又曰王機入廣州刺史郭納握節而避機遂入城就納曰昔蘇武不失其節前史以為美談此節天朝所假義不相與自可遣兵取之機慙而止又曰石苞為徐州刺史帝之敗於東闗也苞獨全軍而退帝指所持節謂苞曰恨不以此付卿續晉陽秋云胡質為荆州刺史子威自洛陽至荆州定省家貧自驅驢單行見父停十餘日臨歸質賜絹一疋為道糧威跪拜曰大人清髙不審安得此質曰吾俸禄之餘故以為汝糧耳叉曰晉武嘗問威曰卿清孰與卿父清威曰臣不如也帝曰何以為不如威曰臣父清畏人知之臣清畏人不知陸機晉武紀曰王濬之在巴郡也夢懸四刀於其上甚惡之濬主簿李毅拜賀曰三刀為州而復益一明府其臨益州乎濬果為益州刺史晉中興書曰荀羨字令則為徐州刺史時年二十中興方伯未有如羨少者梁書曰夏侯詳遷湘州刺史詳善吏事在州四載為百姓所稱州城南臨水有峻峰舊𫝊云刺史登此山輒代因是厯政莫敢至詳於其地起臺榭延僚屬以表損挹之志三國典畧曰魏太祖制以南汾州刺史韋孝寛為雍州刺史先是路側一里置一土堠經雨頽毁每須修補孝寛臨州乃勒部内當土堆之處植樹以代之既免修復之勞行旅又得庇䕃太祖後見之怪而問焉人以狀對太祖嘉之豈得一州獨爾當令下同之於是令諸州夾道一里種一樹十里種二樹百里五樹焉又曰梁蕭恪字敬則南平元襄王偉之子也初恪為雍州刺史賔客有江仲舉蔡逺王臺卿庾仲容四人俱被接並有蓄積故樊鄧謌之云江千萬蔡五百王新車庾大宅梁武聞而接之曰主人憒憒不如客及恪還梁武問之恪甚慙恧後魏書曰髙陽王雍為湘州刺史帝誡曰為牧之道亦易亦難其身正不令而行故曰是易其身不正雖令不從故曰是難又曰髙允為懐州刺史允秋巡境問民疾苦至郡縣見邵公廟廢毁不立乃曰邵公之德闕而不禮為善者何望乃表修葺之又曰李崇為并州刺史多劫盜崇乃村置一樓樓懸一鼓盜發則擊之俄頃之間聲布百里遂多擒獲諸州鼓樓自崇始也又曰南安王楨出為相州刺史髙祖餞之於林都亭詔曰今者之集雖曰分岐實為曲宴並可賦詩申意射者可以觀德不能賦詩者可聽射也當使武士彎弓文士下筆又曰汝隂王子修義字壽安涉獵書𫝊髙才為髙祖所知除右將軍齊州刺史修義以齊州頻喪刺史累表固辭詔曰修短有命吉㓙由人何過致憂憚以乖維城之寄違㓙就吉時亦有之可聽更立廨宇修義於是移治東城又曰畢終敬父子相代為本州當世榮之時終敬以老還鄉常呼其子元賔為使君每於元賔聽政之時輿出元賔所先遣左右勑不聽起觀其斷决忻忻然喜見顔色又曰邢蠻征梁漢諸郡之民相繼而至遂平漢中詔曰蠻至彼有以懐和附衆髙下品第可依義陽都督之格也拜蠻西案梁秦州刺史北齊書曰張亮武定初拜太中大夫薛琡嘗夢亮於山上挂絲以告亮占之曰山上絲幽字也君其為幽州乎數日亮出為幽州刺史北史曰齊平鑒為揚州刺史其妻生男鑒因喜飲醉擅免境内誤免闗中細作二人醒而知之上表自劾文宣原其罪賜牛羊酒令作樂又曰慕容三藏為郭州刺史州界連雲山響稱萬年者三詔頒郡國仍遣使山所其日景雲浮於上雉兎馴壇側使還以聞上大悦後周書曰蘇亮出為岐州刺史朝廷以其牧本州特給路車鼔吹先還其宅并給騎士三千列羽儀遊鄉黨經過故人歡飲旬日然後入州世以為榮又曰獨孤信為秦州刺史嘗因臘日暮馳入城其㡌㣲側詰旦而吏人有戴㡌者咸慕信而側焉其為隣境及士庻所重如此又曰劉雄字猛雀髙祖嘗從容謂雄曰古人云富貴不歸故鄉猶衣錦夜遊今以卿為本州何如雄稽首拜謝於是詔以雄為河州刺史雄先已為本縣今復有此授鄉里榮之又曰史寧為凉州刺史遣使詣太祖請事太祖即以所服冠履衣被及弓箭甲矟等賜寧謂其使人曰為我謝凉州孤解衣以衣公推心以委公公其善始令終無損公名也又曰長孫儉為荆州刺史時梁岳陽王蕭詧内附初遣使入朝至荆州儉於㕔事列軍儀具戎服與使人以賔主禮相見儉容貌魁偉聲音如鐘大為鮮卑語遣人𫝊譯以問客惶恐不敢仰視日晩儉乃着裙襦紗㡌引客宴於别齋因序梁國䘮亂朝廷招擕之意發言可觀使人大悦出曰吾所不能測也三國典畧曰周陸逞字季明嘗為宜州刺史故事刺史奉辭例備鹵簿逞以時屬農要表請停之制曰逞雖未臨人已存優䘏宜遂所請彰其雅操又曰周帝制於玉壁置勲州以孝寛為刺史為其立勲於此因以名之又曰賀拔岳引軍西次平凉岳以夏州隣接冦賊欲求良牧以鎮之衆咸曰宇文左丞即其人也岳曰宇文左丞吾之左右手不可廢也沉吟累日乃從衆議表太祖為夏州刺史陳書曰侯景平元帝遍問朝宰曰今天下始定亟須良才請卿各舉所知羣臣未有對者帝曰吾已得一人矣侍中王褒進曰未審為誰帝曰歐陽頠公正有匡濟之才恐蕭廣州不肯致之乃授武州刺史太平御覽卷二百五十四
