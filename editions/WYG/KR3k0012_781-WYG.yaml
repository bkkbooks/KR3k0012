body:
  text: 太平御覽卷七百八十一宋李昉等撰四夷部二東夷二百濟夫餘新羅百濟北史記曰百濟之國者其先葢馬韓之屬也出自夫餘王東明之後有仇台篤於仁信始立國於帶方故地漢遼東太守公孫度以女妻之遂為東夷强國初以百家濟因號百濟其國東極新羅北接髙句麗西南俱限大海東西四百五十里南北九百里其都曰居拔城亦曰固麻城其外更有五方中方曰古沙城東方曰得安城南方曰乆知下城西方曰刀先城北方曰熊津城又曰百濟國王姓夫餘氏號於羅暇百姓呼為鞬吉支夏言並王也王妻號於陸口夏言妃也官有十六品左平五人一品達率三十人二品恩率三品德率四品杆率五品奈率六品已上冠飾銀華將德七品紫帶施德八品皁帶固德九品赤帶季德十品青帶對德十一品文督十二品皆黄帶武督十三品佐軍十四品振武十五品剋虞十六品皆白帶自恩率以下官無常員各有部分其人飲食衣服與髙麗畧同若朝拜祭祀其冠兩箱加翅戎事則不拜拜謁之禮兩手據地為禮婦人不加粉黛女辮髮垂後已出嫁則分為兩道盤於頭上衣似袍而袖微大兵有弓箭刀矟俗重騎射兼愛墳史有鼓角箜篌箏竽箎笛之樂投壺摴蒱弄珠握塑等戲尤尚奕棋行宋元嘉厯以建寅月為歲首賦稅以布絹絲麻及米等量歳豐儉差等輸之其刑反叛退軍及殺人者斬盗者流其贓兩倍徴之婦犯姦没入夫家為奴婢婚姻之禮畧同華俗父母及夫死者三年居服餘親則葬訖除之土田下濕氣候温煖人皆山居有巨栗其五穀雜菓莱蔬及酒醴肴饌之物多同内地唯無駝騾羊鵞鴨等又曰百濟國中大姓有八族沙氏燕氏劦音協氏真氏解氏國氏木氏苗氏其俗每以四仲月祭天及五帝之神立其始祖仇台之廟於國城歳四祠之又曰隋開皇初百濟王餘昌遣使貢方物拜上開府帶方郡公百濟王平陳之歳戰船漂至海東躭牟羅國其船得還經于百濟昌資送甚厚並遣使奉表賀平陳文帝善之八年復使長史王辯那來獻方物屬興遼東之役奉表請為軍導髙麗頗知其事兵侵其境大業七年帝親征髙麗其王餘璋使國智牟來請軍期帝遣使尚書起部郎席律詣彼與相知明年六軍度遼東餘璋亦嚴兵於境聲言助軍實持兩端尋與新羅有隟每相戰爭十年復遣使朝貢後天下亂使命遂絶南史曰晉義熙十三年以百濟王餘暎為使持節都督百濟諸軍事鎮東將軍百濟王宋元嘉三年詔兼謁者閭丘恩子兼副謁者丁敬子徃宣㫖慰勞其後每歳遣使奉表獻方物二十七年上表求易林雜占腰弩文帝並與之梁天監中進號征東將軍尋為髙麗所破衰弱累年遷居南韓地普通二年王餘隆上表稱累破髙麗今始與通好百濟更為强國五年隆死詔以其子明為百濟王所都城曰固麻謂邑曰檐魯如中國之言郡縣其國有二十二檐魯皆以子弟宗族分據之其人形長衣服潔凈其國近倭頗有文身者言語服章畧與髙麗同呼㡌曰冠襦曰複衫袴曰褌其言參諸夏亦韓之遺俗云中大通七年累遣使獻方物並請湼槃等經義毛詩博士並工匠畫師等並給之太清三年遣使貢獻方物及至見城闕荒毁並號慟涕泣侯景怒囚執之景平乃得還國唐書曰百濟國王所居有東西兩城所置内官曰内臣佐平掌宣納事内頭佐平掌庫藏事内法佐平掌禮儀事衞士佐平掌宿衞兵事朝廷佐平掌刑獄事兵官佐平掌在外兵馬事其用法叛逆者死籍没其家殺人者以奴婢三人贖罪官人受財及盗者三倍追贓仍終身禁錮凡諸賦稅及風土所産多與髙麗同其王服大袖紫袍青錦袴烏羅冠金花為飾素皮帶烏革履官人盡緋為衣銀花飾冠庶人不得衣緋紫歲時伏臘同於中國其書籍有五經子史又表疏並依中華之法其國西南海中有三島其上出黄漆樹似小榎而樹大六月取其汁漆器物色如黄金其光自奪目又曰武德四年百濟王扶餘璋遣使來獻菓下馬七年又遣大臣奉表朝貢髙祖嘉其誠欵遣使就册為帶方郡王百濟王自此歲遣朝貢髙祖勞撫甚厚因訟髙麗閉其道路不許來通中國詔遣朱子奢徃和之又與新羅世為讎敵數相侵伐貞觀元年太宗賜其玉璽書令即停兵革璋因遣使奉表陳謝雖外稱順命内實相仇如故十一年遣使來朝獻鐵甲雕斧太宗優勞之賜綵帛錦袍等又曰貞觀十六年百濟王義慈興兵伐新羅四十餘城又與髙麗和親通好謀欲取党項城以絶新羅入朝之路新羅遣使告急請兵太宗遣司農丞相里𤣥奬賫書勅告諭兩蕃示以福禍及太宗親征髙麗百濟懐貳乘間襲破新羅七城二十二年又破其十餘城數年之中朝貢遂絶髙宗嗣位始遣使朝貢六年新羅王金春秋上表稱百濟與髙麗靺鞨侵其北界已没三十餘城顯慶五年命左衛大將軍蘇定方統兵討之大破其國虜義慈及太子隆小王孝演偽將五十八人等送於京師上責而宥之其國舊分為五部統郡三十七城二百户七十六萬至是乃以其地分置熊津馬韓東明等五都督府各統州縣立其酋渠為都督刺史及縣令命左衞郎將王文度為熊津都督總兵以鎮之乂曰百濟王義慈事親以孝行聞友于兄弟時人號海東曽閔及至京數日疾卒贈金紫光禄大夫衞尉卿特許其舊臣赴哭送於孫皓陳叔寶墓側葬之夫餘後漢書曰夫餘國在𤣥莬北千里南與髙句麗東與挹樓西與鮮卑接北有弱水地方二千里本濊地也初北夷槖離國王出行其侍兒於後妊身王遂欲殺之侍兒曰前見天上有氣如大鷄子來降我因以有身王囚之後遂生男王令置於豕牢豕以口氣噓之不死復徙於馬欄馬亦如之王以為神乃聽母收養名曰東明東明長而善射王忌其猛欲殺之東明奔走南至掩㴲音斯水以弓擊水魚鼈皆浮水上東明乘之得度因至夫餘而王之焉於東夷之地最為平敞土宜五穀出名馬赤玉貂豽大珠如酸棗以員栅為城有宫室倉庫牢獄其人麤大勇强而謹厚不為冦鈔以弓矛為兵以六畜名官有馬加牛加狗加其邑落皆主屬諸加飲食用爼豆㑹同拜爵洗爵揖讓升降以臘月祭天大㑹連日飲食歌舞名曰迎鼓是時斷刑獄解囚徒有軍事亦祭天殺牛以蹏占其吉凶行人無晝夜好歌吟音聲不絶其俗用刑嚴急被誅者皆没其家人為奴婢盗一責十二男女淫皆殺之尤惡妬婦既殺復尸於山上兄死妻嫂死則有槨無棺殺人殉葬多者以百數其王葬用玉匣漢帝預以玉匣付𤣥莵郡王死則迎取以葬焉建武二十五年夫餘王遣使奉貢光武厚答之於是使命歲通至安帝永初五年夫餘王始將步騎七八千人冦鈔樂浪殺傷吏人後復歸附永寧元年乃遣嗣子尉仇台詣闕貢獻天子賜尉仇台印綬金綵順帝永和元年其王來朝京師帝作黄門鼓吹角抵戲送遣之桓帝時亦朝貢獻帝時其王求屬遼東云魏志曰夫餘本屬𤣥莵其俗有敵諸加自戰下户俱擔粮飲食之其死夏月皆用氷有槨無棺停喪五月以乆為榮其居喪男女皆純白婦人著布衣而去環珮大體與中國相類漢末公孫度雄張海東威服外夷夫餘王尉仇台更屬遼東時句麗鮮卑强度以夫餘在二虜之間妻以宗女正始中幽州刺史毌丘儉討句麗遣𤣥莵太守王頎詣夫餘王位居遣大加郊迎供軍粮舊夫餘俗水旱不調五榖不熟輒歸咎於王或言當易或言當殺其印文言濊王之印國有故城名濊城葢本濊貊之地而夫餘王其中自謂亡人抑有以也晉書曰夫餘國至太康六年為慕容廆所襲破其王依慮自殺子弟走保沃沮武帝以何龕為䕶東夷校尉明年夫餘後王依羅遣使詣龕求率見人還復舊國遣督䕶賈沈以送之爾後每為廆掠其種人賣於中國帝又以官物贖還禁市夫餘之口自後無聞新羅秦書曰苻堅建元十八年新羅國王樓寒遣使衞頭獻美女國在百濟東其人多美髪髮長丈餘又曰符堅時新羅國王樓寒遣使衞頭朝貢堅曰卿言東海之事與古不同何也答曰亦猶中國時代變革名號改易南史曰新羅魏時曰新盧宋時曰新羅或曰斯羅其國小不能自通使聘梁普通二年王姓募名泰始使隨百濟獻方物其俗呼城曰健牟羅其邑在内曰啄評在外曰邑勒亦中國之言郡縣也國有六啄評五十二邑勒土地肥美植五穀多麻桑縑布服牛乘馬男女有别其官名有子賁旱支壹旱支齊旱支謁旱支壹吉支竒貝旱支其冠曰遺子禮襦曰尉解袴曰柯半靴曰洗其拜及行與髙麗相類無文字刻木為信語言待百濟而後通焉北史新羅者其先本辰韓種也辰韓始有六國後稍分為十二新羅則其一也或稱魏將毋丘儉封髙麗破之奔沃沮其後復歸故國有留者遂為新羅亦曰斯盧其人雜有華夏髙麗百濟之屬兼有沃沮不耐韓濊之地其王本百濟人自海逃入新羅遂王其國初附庸百濟百濟征髙麗不堪戎役後相率歸之遂至强盛因襲百濟附庸於迦羅國焉又曰新羅王真平以隋開皇十四年遣使貢方物文帝拜真平上開府樂浪郡公新羅王其官有十七等一曰伊罰干貴如相國次伊尺干次迎干破彌干次大阿尺干次阿尺干次乙吉干次沙咄干次及伏干次大奈摩干次奈摩次大舍次小舍次吉士次大烏次小烏次造位外有郡縣其文字甲兵同於中國選壯健者悉入軍烽戍邏俱有屯管部伍風俗刑政衣服畧與髙麗百濟同每月旦相賀王設宴㑹班賚羣官其日拜日月神主八月十五日設樂令官人射賞以馬布其有大事則聚羣官詳議定之服色尚畫素婦人辮髮繞頭以雜綵及珠為飾婚嫁禮唯酒食而已輕重隨貧富死有棺歛葬送起墳陵王及父母妻子喪居服一年田甚良沃水陸兼種其五榖菓菜鳥獸物産畧與華同大業以來歲遣朝貢唐書曰新羅王所居曰金城周七百里衞兵三千人設獅子隊文武官凡有十七等武德四年其王金真平遣使朝貢髙祖遣使賜以璽書及畫屏風錦綵自此朝貢不絶其食器用栁桮亦以銅及瓦國多金朴兩姓異姓不為婚又曰貞觀五年新羅遣使獻女樂二人皆鬒髮美色太宗謂侍臣曰朕聞聲色之娛不如好德且山川險逺懷土可知近日林邑獻白鸚鵡尚解思鄉訴請還國鳥猶如此况人情乎但愍其逺來思戀親戚宜付使者聽其還家又曰新羅王真平卒無子立其女善德為王貞觀九年遣使册命善德為樂浪郡王新羅王十七年遣使上言髙麗百濟累相攻襲亡失數十城兩國連兵意在滅臣社稷謹遣陪臣歸命大國乞偏師救助後太宗將親征髙麗詔新羅纂集士馬應接大軍新羅遣大臣領兵五萬入髙麗南界攻水口城降之又曰新羅王善德卒立其妹真德為王貞觀二十二年真德遣其弟國相伊贊子金春秋及其子文正來朝春秋請詣國學觀釋奠及講論太宗因賜以所制温湯及普祠碑並新撰晉書將歸國又曰永徽元年新羅王真德大破百濟之衆遣其弟子法敏以聞真德乃織錦作五言太平頌以獻其詞曰大唐開洪業巍巍皇猷昌止戈成大定修文繼百王統天崇雨施理物體含章深仁諧日月撫運邁時康幡旗既赫赫鉦鼔何鍠鍠外夷違命者剪覆被天殃淳風凝幽顯遐邇競呈祥四時和玉燭七燿巡萬方維岳降宰輔帝任忠與良五三成一德昭我家大唐帝嘉之拜法敏為大府卿又曰永徽六年百濟與髙麗靺鞨興兵侵新羅北界其王春秋遣使上表求救顯慶五年命左武衞將軍蘇定方為熊津道大總管統水陸十萬仍令春秋為嵎夷道行軍總管與定方討平百濟俘其王扶餘義慈來獻自是新羅漸有髙麗百濟之地其界益大西至于海又曰龍朔三年詔以新羅國為雞林都督府授其王金法敏為雞林都督法敏卒其子政明嗣位垂拱二年遣使來朝因請唐禮一部並雜文章則天令寫吉凶要禮並於文館詞林採其詞涉規誡者勒成五十卷以賜之又曰開元二十五年新羅王興光卒𤣥宗遣左贊善大夫刑璹往弔祭並册其子承慶為新羅王璹將發上製詩序太子以下及百僚咸賦詩以送之謂璹曰新羅號君子之國頗知書記有類中華以卿學涉善於講論故選充此使到彼宜闡揚經典使知大國儒教之盛又聞其人多善奕棋亦令善棋人率府兵曹楊季鷹為之副璹等至彼大為蕃人所敬其國髙弈皆出季膺下於是厚賂璹等金寶及藥物又曰大歴七年新羅王金乾運遣使金標石來賀正八年又遣使獻金銀牛黄魚牙納朝霞紬等又曰元和三年新羅王金重興遣使金力竒來朝力竒上言真元十六年奉詔册臣故主金俊邕為新羅王母申氏為太妃妻叔氏為王妃册使韋丹至中路知俊邕薨其册却回在中書省今臣還國伏請授臣以歸勑金俊邕等册宜令鴻臚寺於中書省受領至寺宣授與金力竒令奉歸國仍賜其叔彦昇門㦸令本國准例給與太平御覽卷七百八十一
