body:
  text: 太平御覧卷四百四十五宋李昉等撰人事部八十六品藻上論語子曰􅃹仲之器小哉又子貢問曰賜也何如子曰女器也言汝器用之人也曰何器也曰瑚璉也瑚璉黍稷之器夏曰瑚商曰璉周曰盙簋宗廟之貴器又曰由也千乗之國可使治其賦也求也千室之邑百乘之家可使爲之宰也赤也束帶立於朝可使與賔客言也又曰子謂子産有君子之道四焉其行已也恭其事上也敬其養民也惠其使民也義又曰子張問令尹子文三仕爲令尹無喜色三巳之無慍色舊令尹之政必以告新令尹何如子曰忠矣曰仁矣乎曰未知焉得仁崔子弑齊君陳文子有馬十乗棄而違之至于他邦則曰猶吾大夫崔子也違之何如子曰清矣曰仁矣乎曰未知焉得仁又曰子曰雍也可使南靣仲弓問子桑伯子子曰可也簡仲弓曰居敬而行簡以臨其民不亦可乎居簡而行簡無乃太簡乎又曰季康子問仲由可使從政也與子曰由也果於從政乎何有曰賜也可使從政也與曰賜也逹於從政乎何有曰求也可使從政也與曰求也藝於從政乎何有家語曰子貢曰陳靈公君臣宣淫於朝洩冶諫而殺之是與比干同也可謂仁乎子曰比干於紂親則叔父官則少師忠欵之心在於宗廟而已固必死争之冀身死之後紂悔悟其本志情在乎仁者也洩冶位下大夫無骨肉之親懷寵不去以區區之一身欲正一國之淫昏死而無益可謂懷矣詩曰民之多僻無自立僻其洩冶之謂也又曰孔子北遊農山顔回侍曰願得明王聖主而輔相之敷其五教道之以禮樂使城郭不修溝渠不越鑄劒㦸爲農器放牛馬於原藪室家無怨曠之思千嵗無鬭戰之患子曰美德也不傷財不害民不繁辭則顔氏之子有矣又曰顔回問於孔子曰臧文仲武仲孰賢孔子曰武仲賢哉回曰武仲世稱聖人而身不免於罪是智不足稱好言兵計而挫銳於邾是勇不足名也夫文仲其身雖没而言不朽惡有未賢孔子曰身没言立所以爲文猶有不仁者三不知者三是則不及武仲也回曰可得聞乎孔子曰下展禽置六關六關關名置之以税行者妾織席三不仁也設虛器縱逆祀祀海鳥三不智也武仲在齊齊將有禍不受更其國以避其難是智難之也又曰澹䑓子羽有君子之容而行不勝其貌宰我有文雅之辭而智不充其辯孔子曰以容取人則失之子羽以言取人則失之宰予又曰子夏三年之喪畢見於孔子孔子與之琴使之弦侃侃而樂子曰君子也閔子三年喪畢見孔子孔子與之琴使之弦切切而悲子曰君子也子貢曰閔子哀未盡矣子曰君子也子夏哀已盡矣子曰君子也二者殊情而俱君子賜也惑之敢問孔子曰閔子哀未盡能遊之以禮子夏哀已盡能引之及禮均之君子不亦可乎又曰孔子曰不遷怒不深怨不録舊罪冉雍之行也不畏強禦不侮鰥寡才任治戎仲由之行也文勝其質好學愽藝省物而動是冉求之行也齋荘而能肅志通而好禮篤雅而有節是公西華之行也滿而不盈實而不虛其徳敢言於人無所不信是曾參之行也送迎必敬上交下接是卜商之行也先成其慮及事而用故動則非妄是言偃之行也三復白珪之玷是南容之行也執親之喪未嘗見齒是髙柴之行也不念舊惡蓋伯夷叔齊之行也畏天而敬人蓋趙文子之行也臨其難不愛其死謀其身不遺其友君若用則進蓋隨武子之行也國家有道其言足以治無道其黙足以生蓋伯華之行也外寛而内方直已而不直人以善自終蓋蘧伯玉之行也孝恭慈仁充徳圖義終貧去怨輕賤不道蓋柳下惠之行也君有道從命無道衡命蓋平仲之行也漢書曰髙帝置酒洛陽南宫上曰吾所以有天下者何項氏之所以失天下者何王陵對曰陛下嫚而侮人項羽仁而敬人然陛下使人攻城略地所降者因以與之天下同利也項羽疾能妬賢有功者害之賢者疑之戰勝而不與大功得地而不與人利此所以失天下也上曰公知其一不知其二夫運籌䇿於帷幄之中决勝於千里之外吾不如張子房鎮國家撫百姓吾不如蕭何連百萬之衆戰必勝攻必取吾不如韓信三者人傑也吾能用之此吾所以取天下也項羽有一范增而不能用之此其所以爲我擒也羣臣皆恱服又曰公孫𢎞𫝊賛云儒雅則公孫𢎞董仲舒倪寛篤行則石建石慶質直則汲黯卜式推賢則韓安國鄭當時律令則趙禹張湯文章則司馬遷相如滑稽則東方朔枚臯應對則嚴助朱買臣厯數則唐都洛下閎恊律則李延年運籌則桑𢎞羊奉使則張騫蘇武將帥則衛青霍去病受遺則霍光金日磾其餘不可勝記是以興造功業制度遺文後世莫及孝宣承統纂循洪業招選茂異而蕭望之梁丘賀夏侯勝韋𤣥成嚴彭祖尹更始以儒術進劉向王褒以文章顯將相則張安世趙充國魏相邴吉于定國杜延年治民則黄霸王成龔遂鄭𢎞召信臣韓延壽尹翁歸趙廣漢嚴延年張敞之屬皆有功迹見述於世參之名臣亦其次也謝承後漢書曰桓帝徴徐穉等不至因問陳蕃曰徐穉袁閎韋著誰爲先後蕃對曰閎生公族聞道漸訓長於三輔仁義之俗所謂不扶自直不鏤自雕至於穉者爰自江南卑薄之域而角立傑出宜當爲先袁山松後漢書曰王允字子師太原人世仕州郡郭林宗嘗見允而竒之曰王生一日千里王佐才也遂與友善允至司徒范􅁮後漢書曰許劭嘗到潁川多長者之遊唯不詣陳蕃蕃䘮妻還葬鄉人畢至而劭獨不往或問其故邵曰太丘道廣廣則難周仲舉性峻峻則少通故不造其多所裁量若此曹操㣲時常卑辭厚禮求爲己助邵鄙其爲人而不肯對操乃伺隙脅邵不得已曰君清平之奸賊亂世之英雄操大恱而邵與從兄靖俱有髙名好共覈論鄉黨人物每月更其品題故汝南俗有月旦評焉魏志曰虞欽著書稱徐􅊬曰徐公志髙行㓗才綽氣猛聖人以清爲難而徐公之所易也或問欽徐公當武帝之時爲通自在凉州及還京都人以爲介何也欽荅曰往者毛孝先崔季珪用事貴清素之士徐公不改其常故以爲通比來天下奢靡轉相放效而徐公雅尚自若不與俗同故前日之通乃今日之介也又曰司馬文王與陳泰親友武陔亦與泰善文王問陔曰𤣥伯何如其父陔曰通雅博暢能以天下聲教爲己任者不如也明統簡至立事過之又曰文帝問賈詡曰吾欲伐不從命以一天下吳蜀何先對曰攻取者先兵權建本者向德化但用兵之道先勝後戰量敵論將故舉無遺策臣竊料羣臣無吳蜀之對也雖以天威臨之未見萬全之勢今宜先文後武文帝不納後興江陵之役士卒多死典略曰禰衡自荆州北遊許都書一刺懷之字㓕無所適或問之曰何不從陳長文司馬仲逹乎衡曰卿欲我從屠酤兒軰耶又問曰當今復誰可衡曰大兒孔文舉小兒楊德祖又問荀令君趙蕩冦皆蓋世乎衡見荀有儀容趙有大腹因荅曰文若可借面弔䘮稚長可監㕑請客其意以爲荀但有貌趙但啖肉也又曰趙戬遭三輔亂客於荆州劉表以爲賔客是時禰衡來遊京師詆訿朝士及南見戬歎之曰劍則干將莫耶木則椅桐梓漆人則顔冉仲弓也建安中丞相南取荆州執戬手曰何相見之晩魏氏春秋曰髙貴鄉公即位神明爽雋德音宣朗罷朝景王私曰上何如主也鍾㑹對曰才同陳思武類太祖景王曰若如卿言社稷之福也又曰髙貴鄉公嘗晏羣臣於太極東堂與侍中荀顗崔贊袁亮鍾毓虞松等講述帝因問顗等曰有夏既衰后相殄㓕少康收集夏衆復禹之績髙祖㧞起壠畆驅帥豪雋芟夷秦項包舉宇内斯二主可謂之才略命世大賢者也考其功徳誰宜爲先顗等對曰造之與因難易不同少康功德雖美至如髙祖臣等以爲優帝曰未必創業者皆優紹繼者咸劣少康中宗中興之美論德覈實方諸漢祖吾見其優未聞其劣少康生於㓕亡之後降爲諸侯能布其徳而兆其謀卒㓕過戈復禹之績非至德豈能濟斯漢祖因土崩之勢專任智力爲人子則數危其親爲人君則囚繫賢相爲人父則不能衛其子身没之後社稷幾傾若與少康易時而處或未能復大禹之績推此言之宜髙夏康而下漢祖矣帝又曰夫太上立德其次立功漢祖功髙未若少康武烈之威豈必降於漢祖但夏書淪亡舊文殘缺故勲美闕而罔載向令墳典俱存行事詳備亦豈有異同之論哉於是羣臣咸悦服又曰胡綜論吳朝俊士英才卓越超踰倫疋則諸葛恪清識𤣥幾逹究幽㣲則顧譚淑辯宏逹言能釋結則謝景究學甄㣲游夏同科則范慎羊衟恪才而踈譚精而懼景辯而校後恪譚果以強吳人論綜言而有徴蜀志曰大鴻臚張徴作黙記諸葛亮與司馬宣王書曰漢朝傾覆天下分崩豪傑之士競希神器魏氏跨中土劉氏據益州並稱兵海内爲世霸王諸葛司馬二相遭值際㑹託身盟主或收功于蜀漢或聞名於伊洛兩主既没後嗣即統各受保阿之任輔翼㓜主亦一國之守臣霸王之賢佐也歴前世以觀近事二相優劣可得而詳也孔明起巴蜀之地踏一州之土方之大國其戰士之民蓋有九分之一也提歩卒數萬長驅祁山慨然有飲馬河雒之志逹據天下十倍之地杖兼并之衆據牢城擁精銳無擒敵之意務自保而已使彼孔明若此而不亡則凉雍不觧甲中國不觧鞍勝負之䇿亦决矣方之司馬不亦優乎吳志曰孫權與陸遜論周瑜魯肅及吕蒙曰公瑾雄烈膽畧兼人遂破孟德開拓荆州邈焉難繼君今繼之子敬東來孤與宴語便及大畧帝王之䇿一快也後孟德率數十萬衆水陸俱下孤請諸將問其所宜子布文表俱言遣迎而子敬駁言不可勸孤呼公瑾付兵衆逆而擊之此二快也勸吳借𤣥德地是其一短不足以損二長也孤忘其短而不遺其長子明少果敢有膽而長大學問籌畧可以次公瑾但言議不及耳又曰周昭著書稱歩隲及嚴畯等曰古今賢士大夫所以失名䘮身者其由非一也大歸四者而已急論議一也争名勢二也重朋黨三也務欲速四也争論議則傷人争名勢則敗友重朋黨則蔽主務欲速則失德此四者不除未有能全者也當世君子能不然者亦比有之豈獨古人乎然論其絶異未若顧豫章諸葛使君歩丞相嚴衛尉張奮威之爲美也論語言夫子循循然善誘人又曰成人之美不成人之惡豫章有之矣望之儼然即之也温聽其言也厲使君體之矣威而不猛丞相嚴履之矣學不求禄心無苟得衛尉奮威蹈之矣此諸君雖徳實有差輕重不同至於趨舍大檢不犯四者俱一揆也昔丁諝出於孤家吳粲由於牧竪豫章揚其美以並陸全之列是以人無幽滯而風俗厚焉使君丞相衛尉三君昔以布衣俱相友善論者因各叙其優劣初先衛尉次丞相而後使君也其後並事明主經營世務出處之才儀有不同先後之名須反其初此世常人所决勤薄至於三君分好卒無虧損豈非古哉又魯横江昔仗萬兵屯據陸口當世之美業也能與不能孰不願焉而横江既亡衛尉應其選自以才非將帥深辭固讓終於不就後徙九列遷典八座禄不足以自奉至於二君皆位爲上將窮富極貴衛尉既無求欲二君又不稱薦各守所志保其名好孔子曰君子矜而不争羣而不黨斯有風矣又奮威之名亦三君之次也當一方之戍受上將之任與使君丞相不異也然歴國事論功勞實有先後故爵位之榮殊焉而奮威將處此决能明其部分心無失道之欲事無充詘之求每升朝堂循禮而動辭氣謇謇罔不惟忠叔嗣雖親貴言憂其敗文至雖踈賤談稱其賢女配太子受禮若弔慷慨之趨唯篤人物成敗得失皆如所慮可謂守道見機好古之士也若乃經國家當軍旅於馳騖之際立霸王之功此五君者未爲過人至其純粹履道求不苟得升降當世保全名行邈然絶俗實有所師故粗論其事以示後之君子又曰薛塋王蕃器量綽異𢎞博多通樓𤣥清白節操文理條暢賀邵厲行貞㓗機理清要韋曜篤學好古博觀羣籍有記述之才胡冲以爲𤣥邵蕃一時清妙略無優劣必不得已𤣥宜在先邵當次之華覈詩賦之才有過於曜典誥不及也王隱晋書曰河南郭象著文稱嵇紹父死在非罪曾無耿介貪位死闇主義不足多曾以問郄公曰王褒之父亦非罪死褒猶辭徴詔不辭用誰爲多少郄公曰王勝於嵇或曰魏晋所殺子皆仕宦何以無非也荅曰殛鯀興禹禹不辭興者以鯀犯罪也若以時君所殺爲當耶則同於禹以不當耶則同於嵇又曰世皆以嵇見危授命荅曰紀信代漢髙之死可謂見危授命如嵇偏善其一可也以備體論之則未得也又曰顧榮謂中宗曰陸士元貞正清貴金相玉質甘季思忠欵誠盡加以膽幹朱快殷慶元質略有明規文武可用榮族兄公譲明亮守節困不易操㑹楊彦明謝行言皆服膺儒敎足爲民望賀生沉潜青雲之士陶公兄弟才力雖少實事極佳凡此諸人皆南金也中宗納之又曰衛玠妻父樂廣有海内重名議者以爲婦公氷清女壻玉潤又曰裴憲字景思陳郡謝鯤潁川庾􅀈皆雋朗士也見而竒之相謂曰裴憲鯁亮宏逹通機識命不知其何如父然至於深𢎞保素不以世物嬰心者其殆過之又曰裴楷嘗目夏侯𤣥云肅肅如入宗廟中但見禮樂器鍾㑹如觀武庫森迫見矛㦸在前傳嘏汪翔靡所不見山濤若登山臨下幽然深遠又曰杜預在内七年損益萬機不可勝數朝野稱美號曰杜武庫言其無所不有也又曰杜預傳云時王濟觧相馬又甚愛之而和嶠頗聚斂預常稱濟有馬癖嶠有錢癖武帝聞之謂預曰卿有何癖對曰臣有左傳癖又曰裴楷風神髙邁容儀俊爽博渉羣書特精理義時人謂之玉人又曰見裴叔則如近玉山暎照于人也又曰裴楷傳云吏部即缺文帝問其人於鍾㑹㑹曰裴楷清通王戎簡要其選也又曰阮裕除東陽太守尋徴侍中不就還剡山有肥遁之志有以問王羲之羲之曰此公近不驚寵辱雖古之沉􅁳何以過此時人云裕骨氣不如逸少簡秀不如真長韶潤不如仲祖思致不如殷浩而兼有諸人之美又曰謝安義在輔導雖㑹稽王道子亦賴弼諧之益時疆敵冦境邊書續至梁益不守樊鄧陷没安每鎮以和靖御以長算徳政既行文武用命不存小察𢎞以大綱威懷外著人皆比之王導而文雅過之太平御覽卷四百四十五
