front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_699-1a, image: WYG0899/WYG0899-0252a.png}
body:
  text: 太平御覧卷六百九十九宋李昉等撰服用部一帳幔幌幬牀幨青廬帳釋名曰帳張也張施於床上也外帳曰斗形如覆斗也爾雅曰幬謂之帳史記曰丞相公孫宏燕見上或時不冠至如汲黯不冠不見也上嘗坐武帳中黯前奏事上不冠望見黯避帳中使人可其奏其見敬禮如此漢書曰東方朔曰陛下誠能用臣朔之計推甲乙之帳燔之於四逹之衢東觀漢記曰馮魴永平中上行幸諸國勅魴車駕發後将緹騎宿𤣥武門複道上詔東宫複道多惡風寒老人居之且病痱音肥風病苦内者多取帷帳東西竟塞諸忩望令致宻漢官儀曰祭天有紺幄帳魏畧曰大秦國金織成五色帳又以明月夜光珠帳又吴時外國傳云斯條國王作白珠交結帳魏志曰呂布将辭袁紹還洛紹欲殺之明日當發紹遣甲兵三十人辭以送布布使於帳側偽使人於帳中鼓筝紹兵卧布無何出去而兵不覺夜半兵起亂斫布床被謂為已死明旦紹訊問知布尚在又曰太祖帷壊即補納又曰典􅅊拜都尉太祖引置左右将親兵數百人常繞帳晝立侍終日夜宿帳左右又曰曹爽從帝朝高平陵司馬宣王語弟孚曰陛下在外不可露宿促送帳幔詣行在所也呉志曰蒋欽字公希拜左護軍權嘗入其内母䟽帳縹被權歎其貴而守約勅御府為母作錦被叚易帷帳晉令曰錦帳為禁物晉後畧曰張方兵入洛御寳織成流蘇武帳皆割分為馬􅀈矣晉令曰元帝時有奏太極殿施絳帳帝詔曰漢文以上書皂嚢為帷冬可青布夏可青䟽又曰桓𤣥小㑹於西堂殿施絳綾帳􅍢黃金龍䘖五色羽葆流蘇群臣竊相語曰此頗似轜車亦王莾仙盖之流沈約宋書曰髙祖圍廣固夜忽有鳥大如鵝蒼黒色飛入髙祖帳中胡蕃起賀曰蒼黒胡虜之色胡虜歸我大吉之祥也明旦攻城陥之齊書曰髙祖儉素内殿施黃紗帳又曰土谷渾王河南其國多善馬有屋宇雜以百子帳即穹廬隋書曰煬帝北廵欲誇戎狄令宇文愷為大帳其下坐千人帝大恱賜物千叚又造觀風行殿上容侍衛者數百人離合為之下施輪軸推移倐忽有若神功戎狄見之無不驚駭唐書曰髙祖時吴王杜伏威獻竹帳上以勞人不受内史令蕭瑀進曰昔魏文帝幸許昌城門無故自壊帝惡之而返其年文帝崩始畢帳壊即其類也髙祖然之抱朴子曰蔡伯喈到江東得論衡中國諸儒覺其談論更逺疑得異書求其帳中隠處果得之傅子曰太祖武皇帝魏武帝愍嫁娶之僣上公主適人不過皁帳郭子曰許侍中顧司空俱作王丞相從事常夜在丞相飲酒二人歡極丞相便使入己帳中眠顧至曉猶展轉不得熟寐許上床便大鼾丞相語諸客曰此中亦是難眠耳東宫舊事曰皇太子納妃有熟絳綾帳綘絹幄又曰東齊夏施烏紗单帳四率坊洗馬坊烏練帳三輔舊事曰秦時奢侈縑帳綺帷木衣綈繡土被朱紫漢武故事曰上以琉璃珠玉明月夜光雜錯天下珍寳為甲帳其次為乙帳甲以居神乙以自居桓譚新論曰李少君置武帝李夫人神影於帳中令帝觀見之燕丹太子曰秦始皇置髙漸離於帳中擊筑吴時外國傳曰斯調王作白珠交結帳金牀上天竺佛精舎天竺王見珠圓好意欲㽞臣下諌乃止拾遺録曰蜀先生廿后坐於白絹帳中於外望之如月下聚雪益都耆舊傳曰翟輔上事云漢文帝連上事書嚢以為帳惡聞紈素之聲神仙傳曰茅君當受神靈之􅕄衆賔皆至忽然有素縑帳於屋下敷數重白􅀈金案玊杯人皆飽醉又曰茅君仙去民為立廟茅在帳中與人言鄴中記曰石虎御床辟方三丈冬月施熟錦流蘇斗帳四角安純金龍頭銜五色流蘇或用青綈光錦或用緋綈登髙文錦或用紫綈大小錦絲以房子綿百二十斤白縑裏名為裏􅃨帳帳四角安純金銀鑿金香爐以石燒黑集和名香帳頂上安金蓮花中懸金箔織成錦嚢春秋但錦帳表以五色緫為夹帳夏用紗羅或綦文丹羅或紫縠文為单帳鄧徳時南康記曰陽道士葬岩室經数年屍猶儼然葛帳覆之幽明録曰晉朱黄祖奉親至孝母病篤天漢開明有一老公将小兒持箱自通即以两丸藥賜母服之患頓消因停宿夜中􅆹事上有五色氣際天琴􅁔清好祖徃視之坐斗帳裏四角及頂上各有一大珠形如鵝子明彩炫耀馬融别傳曰融為通儒善鼓琴好吹笛逹生任性不拘儒者節居宇噐服多在侈飾常坐髙堂施綘紗帳前受生徒後列女樂弟子次相傳授鮮有入其室者風俗通曰靈帝好胡服武帳京師皆競為之後董卓擁胡兵掠宫掖語林曰劉植詣石崇如厠見有絳文帳大床菌褥甚麗不得行乃更如他厠俗說曰桓𤣥在南州妾當産畏風應湏帳桓曰不湏作帳可以夫人故帳與之世說曰郗超為桓温叅軍時謝安王垣之嘗詣温温令超帳中卧聴論事風動帳開安見超笑曰郗生可謂入幕之賔矣又曰卞範為丹陽尹羊孚於南州蹔還往卞許云卞疾動不堪作便開帳拂褥羊逕上卞大床就枕入被卞乃廻坐傾膝移辰逹暮羊去卞執手曰我以第一流期卿卿莫負我魏武遺令曰吾與妓女皆着銅雀臺上施六尺床練帳月朝十五輙向帳作樂古詩曰紅羅複斗帳四角垂香嚢柴子大七折曰錦衾内設羅幬繢帳也江淹别賦曰春宫閉此青苔色秋帳含兹明月光孔稚􅀈北山文曰蕙帳空兮夜鶴怨山人去兮曉猨驚離騷曰翡翠羽帳飾髙堂劉𤣥休詩曰羅帳延秋月幔說文曰幔幕也釋名曰幔漫也漫漫相連綴之言也廣雅曰幔掩也東觀漢記曰岑彭與呉漢圍隗囂擁谷水以縑幔盛土為堤灌城宋書晋安王子勛叛逆取所乘車除脚以為輦其夕有鴞集其幔梁書曰曹景宗為楊州刺史性躁動不能沉黙出行常欲褰車帷幔左右輙諌以位望隆重人所具瞻不宜然景宗謂所親曰我昔在鄉里平澤中逐麞數肋射之此樂使人忘死不知老之将至今来揚州作貴人動轉不得路行開車幔小人輙言不可閉置車中如三日新婦此悒悒使人無氣又曰栁惔甚重婦頗成畏惮性愛音樂女妓精䴡畧不敢視僕射張稷於惔狎宻而為惔妻所敬稷每詣惔必先相聞夫人惔每欲見妓但因稷請奏其妻隔幔坐妓然後出惔因得㽞目六韜曰将冬不服裘夏不操扇天雨不張帳盖名曰禮将不躬服禮無以知士卒寒暑也軍令曰戰時皆取舡上布幔布衣漬水中積聚之賊有炬火火箭以掩㓕之拾遺録曰周穆王時鸞章錦幔者摩連國獻焉錦文如鸞翔又曰呉主趙夫人巧妙無䨇權居昭陽宫倦暑乃褰紫絹之帷夫人曰此不足貴也權使夫人措其思焉荅曰妾欲窮慮盡思能使下絹帷而清風自入視外无有蔽礙列侍者飄然自凉若馭風而行權稱善夫人乃披髮以神膠續之神膠出欝夷國接弓之弦百絶百續乃織為羅縠累月而成裁之為幔内外視之飄飄如烟氣輕動而房内自凉時權尚軍旅常以此幔自隨以為征幕舒之則廣縱一丈卷之内大漆枕中謂之絲絶秦記曰苻堅以太常􅅊逞毋宋傳其父業得周官音義乃就家立講堂書生百人隔紗幔而授業焉陸機别傳曰機夢黒幔繞車手决不開至明見誅世說曰庾太尉亮有兒年数嵗温太真常隠幔怛怛驚也之此兒神色恬然乃徐跪曰君侯何以為論者乃謂不減亮王融詠幔詩曰幸得與珠綴羃䍥君之楹日映不辭卷風来輙自輕每聚金爐氣時駐玊琴聲但願置樽酒蘭缸當夜明幌說文曰􅀈帷屏風之属晉惠帝起居注曰有雲母幌鄴中記曰石虎太武殿西有崑華殿閣上輙開大忩皆絳紗幌華延雋曰洛陽城十八觀皆籠雲母幌幬說文曰幬单帳也謝承後漢書曰黄昌夏多蚊貧無幬傭債為作幬又曰羊續為廬江太守卧一幅布幬幬穿敗糊紙補之淮南子曰楚将子發求伎道之士楚有善為偷者願以伎自效子發禮之後齊伐楚偷乃夜觧齊将之幬獻之子發因後還之齊将懼而退楚辭曰翡幃翠幬餙髙堂紅壁紗版𤣥玉梁又曰翡翠珠被被衾爛齊光蒻阿拂壁羅幬張馬融廣成頌曰張雲㠶施蜺幬曹植九詠曰蕙幬兮荃牀牀幨通俗文曰障牀曰幨釋名曰牀前帷曰幨幨垂也東宫舊事曰皇太子納妃有石綺絹裏牀幨二青廬世説曰魏武帝少時常與袁紹好為遊侠觀人新婚因潜入主人園中夜呌呼云偷青廬中人皆出觀帝乃抽刀刼新婦與紹還出失道棘林中紹不能動帝復大呌偷人今在此紹惶迫自擲出遂俱免唐書曰建中中議公主出降之儀曰近代設毡帳擇地而置此乃北人穹廬之制不可以為佳宜于堂室中置帳以綾幔為之太平御覧卷六百九十九
