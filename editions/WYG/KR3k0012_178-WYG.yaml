body:
  text: 太平御覽卷一百七十八宋李昉等撰居處部六臺臺下王子年拾遺記曰秦始皇起雲明臺窮四方之珍木搜天下之巧工南得燕丘碧柱麗水然沙賁都朱泥雲岡素竹東得葱巒錦栢漂檖龍松寒河星柘屼雲文梓西得漏海浮金狼淵羽壁滌嶂霞桑沉塘員籌北得𠖇阜乾漆隂坂文杞褰流黑魄暗海香瓊珍異是集二人騰虛縁木揮斤斧于空中子時起工午時已畢秦人謂之子午䑓亦言於子午之地各起一䑓述征記曰燕昭王二年海人乘霞舟以雕壺盛數斗膏獻王王坐通雲堂亦曰通霞之臺以龍膏為燈光耀百里烟色丹紫國人望之咸言瑞光也遥拜之燈以火浣布為纒山西有照石去石十里見人物之影如鏡焉碎石片片皆能照人而質方一尺則重一兩昭王舂此石為泥泥於通霞之臺與西王母遊居此臺上常有鐘皷琴瑟之鳴神光照耀如日月之出臺左右種恒春之樹葉如蓮花芬芳似桂花隨四時之色拾遺記曰魏明帝五年起靈禽園逺方國所獻異鳥殊獸皆畜此園也時昆明國貢嗽金鳥國人云其地去燃洲九千里出此鳥形如雀色黄毛羽柔密常翺翔海上羅者得之以為至瑞聞大魏之德被於荒逺故越山航海來獻大國帝得此鳥畜於靈禽之園飴以珍珠飲以龜腦鳥常吐金屑如粟鑄之以為器服昔漢武帝時有獻神雀此之類也此鳥畏霜雪乃起小室以處之名曰避寒臺皆用水精為户牖使内外通光而風露恒隔宫人爭以鳥所吐之金用飾釵珮謂之避寒金宫人相嘲曰不服避寒金那得帝王心於是媚惑者亂爭此寳以為身飾及行卧皆懷挾以要寵也魏代喪滅珍寳池臺鞠為煨燼𠻳金之鳥從此亦自髙翔也又曰周靈王二十三年起昆明之臺一名宣昭之䑓聚天下異木神工得崿谷隱生之樹臺用足矣其木有龍蛇百獸之形篩水精為泥臺髙百丈升之以望雲色時有萇𢎞能招致神異王登臺忽見二人乘雲而至乘龍鳯之輦駕以青螭其衣皆縫緝毛羽王即迎之上席時天下大旱地裂木然一人先唱能為霜雪引氣一噴則雲起雪飛坐者皆口噤井池冰堅可琢又設狐腋素裘紫罷文褥是西域所獻施於臺上又一人以指彈席上而暄風入室裘褥皆棄臺下又曰魏文帝築臺基髙四十丈列燭置於臺名曰燭臺逺望如列星之墜地以處美人薛靈芸焉又曰魏明帝起凌雲臺躬自掘土羣臣皆負畚鍤時隂寒役者多死髙堂隆等諫之不聽累年而畢又曰魏文帝時黄星炳夜乃起畢昴臺以祀星又曰吳主潘夫人之父坐法夫人輸於織室夫人容態少儔為江東絶色同幽者百餘人有司聞於吳主使圖其容貌夫人憂戚不食减瘦改形工人寫其圖狀以進吳主吳主見圖而嘉之以琥珀如意撫按而嘆息曰此神女也愁貌尚能感之况在歡樂乃命雕輪就織室納於後宫果以姿色獲寵每與夫人登昭宣之臺恣意幸適既盡酣醉唾於玉壺中侍婢瀉於臺下得火齊指環即挂石榴枝上因其處起臺名曰環榴臺時有諫者云今吳蜀爭雄環榴之名特為妖乎權乃翻其名為榴環臺也又與夫人遊釣得大魚吳主大喜夫人曰昔聞泣魚今乃為喜有喜必憂以為深誡至末年漸相譖毁稍見離退時人謂夫人知幾其神矣釣臺今有基存漢武帝内傳曰鈎弋夫人謂帝曰妾相運正應為陛下生男男年七歳妾當死矣今年必不得歸願陛下自愛言終遂卒既殯屍香聞十餘里因塟之雲陵帝甚哀悼又疑其非常人乃發塚開視空棺無屍唯衣履存焉乃起通靈臺於甘泉宫常有一青鳥集臺上至宣帝止矣又曰漸臺髙三十丈南有辟門三層内殿階陛咸以玉為之鑄銅鳯凰髙五丈飾以黄金置樓屋上洞㝠記曰武帝起招仙之臺於明庭宫北明庭宫者甘泉宫之别名也於臺上撞碧玉之鐘掛懸黎之磬吹霜條之箎唱來雲依日之曲使臺下聽而不聞管絃之聲又曰太初二年起甘泉望風臺於臺上得珠望之如照月因名照月珠又曰建元二年帝起騰光臺以望四逺常有飛光如星集於臺上亦曰經星臺又曰帝初起神明臺掘地入三十丈得泉水色黄傍有人居無日月光明晝夜以火照中有人食土飲水服赭布之衣漢人問汝何時居此答曰商王無道使兆民入地千丈求青堅之土以作瓦起瑶宫金臺二人皆以繩縋入地裏負畚取土多有壓陷死者今猶二人在耳漢人問何得獨存答曰我以玉為衣珠金為環身有金玉故心氣不滅漢人問汝欲更出為人否答曰食土飲泉與螻蟻為伍寧望日月乎乃引出三日自死骨肉靡爛成灰唯心如彈丸大堅如石以物扣之則是乾血耳述異記曰郭景純注爾雅臺今在夷陵郡又曲阜縣南十里孔子春秋臺又曰吳王夫差築姑蘇臺三年乃成周環詰曲横亘五里崇飾土木殫耗人力宫妓數千人别立春霄宫為長夜飲造千石酒鍾又作大池池中造青龍舟舟陳妓樂與西施為水嬉又於宫中作靈館館娃閣銅溝玉檻宫之欄檻皆珠玉飾之吳既敗越王勾踐入㑹稽山上地方千里勾踐得范蠡之謀躬敎民以耕桑延四方之士作臺於外而館賢士㑹稽之山有越臺又曰晉永嘉之亂既過江諸公主不得隨去安陽公主與平城公主等奔入兩河界悉為民家妻常怏怏不悦故有思鄉之志村人感之共築一臺以居之謂之公主望鄉之館至今巋然王朗懷舊賦云將軍出塞之臺公主望鄉之館是也又曰漢武遣王濆戍邊及帝崩王莽簒逆濆與莽有隙遂留不敢歸因亡入胡中士卒相率築臺為望鄉之處又曰㑹稽山有虞舜巡狩臺臺下有望陵祠帝舜南巡葬於九疑山民思之故立祠中都郭門古宫存焉宫前有堯臺舜館銘記皆在又曰中山有韓夫人愁思臺望子陵也又曰燕昭王為郭隗築臺今在幽州燕王故城中土人呼為賢士臺亦謂之招賢臺又謂之黄金臺郡國志曰濮州碧玉臺穆天子為盛姬所造也今旁地猶多珉石又曰汝隂縣富陂城即詩之汝墳也俗謂之女郎臺又曰魏硯子臺云是張儀塜似硯也又曰曹州麟城南有望麟臺園客祠庭種香艸有五色神蛾得大蠒絲六十里始盡處又曰洛州温明臺後漢世祖晝卧此殿耿弇入造牀下勸帝即位處又曰滎陽縣有大武城髙祖與項氏各在一城東城有髙壇即項羽置太公於上處今名項羽堆亦呼為太公臺又曰金河府青臺方山北五里文明太后恒於六宫遊戯因歌曰青臺雀青臺雀縁山採花額頸著其曲並在大樂部又曰金河府自平城遥登臺出渴鉢口梁元帝横吹詩曰朝發青陂道暮宿白登臺即天女神生後魏始祖神元地也又曰衛州范城北十四里沙丘臺俗稱妲己臺去二里有一臺南臨淇水俗稱為上宫也又曰鄆州須昌縣有犀丘城青陵臺宋王令韓慿築者又曰南頓縣有光武臺應璩宅在其側又曰洛陽陽子臺在洛城東三十里陽子陵隱處洛水昔王子晉與浮丘公同遊受玉雞之瑞水亦宓妃之所在也又曰寃句縣昌都城呂后追尊父呂公為宣王都此有呂后臺西有辟陽侯臺閣道相連基趾見存又曰洛陽雞臺有劉曜試弩棚夕陽亭賈充出鎮長安百僚餞送於此又曰鄭州故魏任城王臺下池内有漢時鐵鐘長六尺入地三尺頭自正為晉氏重興之瑞今不知所在東南有箜篌城鄭衛之音也又曰酸棗縣韓徙都於此有冰井臺又曰衛州有鳯凰臺又曰荆州龍陂山有楚王臺又曰濮州羊角城陳思王愁臺基甚高又曰夏州朔方郡赫連勃勃僣號起珍珠樓冲天臺又曰兖州有娥皇女英臺又曰恒州野望臺趙武靈王以登高望野亦曰寒臺又曰荆州華容縣東十六里有章華臺楚靈王築臺東即荆臺縣也又曰汾州榆次縣鑿臺即韓殺智伯於鑿臺之中又曰木客山吳王遣木客入山求木不得工人憂思作木客吟一旦神木自生長二十丈作姑蘇臺又曰鄧州皇后城即迎隂后處城西張平子讀書臺又曰亳州城父縣老子祠瀨鄉曲仁里廟内有八公臺九柱樓畫東王公西王母又有靜念樓又曰蒲州蚩尤城鳴條野禹娶塗山女思戀本國築臺以望之謂之青臺上有禹祠下有青臺驛又曰汴城上有列仙吹臺西有牧澤甬道二百里漢梁孝王所造今謂之堤赤城東有繁臺本吹臺也云蒼頡師子野所造後有繁姓居側因名焉西有崇山即顔率云蟬臺之下沙海之上是也又曰許州有丹書臺魏文帝受禪有黄鳥銜丹書集此又曰衛州鹿臺在豫城内紂自投火處紀年曰武王擒紂於單南之臺蓋鹿臺之異名也糟丘酒池去城南一里基跡猶存水經注曰固安縣金臺陂東西六十里南北五十步陂側西北有釣臺高十丈方可四十步陂北十餘步有金臺金臺上高東西八十步南北加減高十餘丈昔慕容垂之為范陽也戍之即斯臺也有小金臺臺北有簡馬並悉髙大秀峙相對翼臺左右水流經通長廡廣宇周旋陂浦棟柱咸淪柱礎尚存是基構可得而尋訪諸耆舊咸言昭王禮賢廣延方士至如郭隗樂毅之徒鄒衍劇辛之儔宦遊歴説之民自逺而留者多矣不欲令諸侯之客伺隙燕邦故修建下都館之南垂言燕昭創之于前子丹踵之於後故雕牆敗館尚傳俊列之名雖無經紀可慿察其古跡似符宿傳矣又曰鳯谿水側有鳯凰止焉故謂之鳯凰臺又曰河水南至華隂又東西玉湖水注之南出玉溪北流經皇天固三面壁立髙千仞許漢世祭天於其上因名之為皇天固上有漢武帝思子臺及泉鳩里加兵刃於太子者上憐太子無辜乃作思子宫為歸來望思之臺於湖城師古曰言已望而思之太子之魂其歸來也在今湖城縣之西閿鄉縣之東基跡猶存也天下聞而悲之又曰睢陽城故東宫即梁之舊池也齊周五六百步水列釣臺池東又有一臺世謂之清泠臺北城慿隅又結一池臺晉灼曰或説平臺在城中東北角亦或言兔園在平臺側如淳曰平臺離宫所在今城東二十里有臺寛廣而不甚極髙俗謂之平臺余按漢梁孝王傳稱王以功親為大國築東苑方三百里廣睢陽城七十里大治宫室為複道自宫東出陽州之門左陽門即睢陽東門也連屬於平臺則近矣屬之城隅則不能是知平臺不在城中也又曰景升臺劉表之所築也表性好鷹每登此臺歌野鷹來又曰睢陽城中有掠馬臺東有一臺謂之清泠臺又曰長平城在上黨郡秦壘在城西秦坑趙卒收頭顱築臺於此嵬峨桀起今乃號曰白起臺山海經曰沃民國有軒轅臺又曰帝嚳堯丹朱帝舜各二臺臺四方在崑崙東北列􅋖傳曰蕭史者秦繆公時人善吹簫能致孔雀白鷼繆公有女字弄玉好之因以妻焉遂敎弄玉作鳯鳴居數十年吹作鳯聲鳯皇來止其屋為作鳯臺夫婦止其上數年皆隨鳯飛去秦為作鳯女祠於雍宫時有簫聲成都記曰望鄉臺蜀王秀所築也又曰思妻臺在梓潼縣五丁於此山拔虵山崩殺五丁山為嶺併殺秦王女因名之三輔宫殿簿曰長樂宫有臨華臺神仙臺西征記曰揚州雷陂有臺髙三丈南兖州記即吳王濞之釣臺也地理志曰北地郡有之回䑓郡西北四百里嵩高山記曰山有玉女臺云漢武帝見三仙女因以名臺益州記曰鴈橋東有嚴君平卜處土臺高數丈南雍州記曰高齋之後有堂堂西有射堂伍間射堂南有大池上有臺名曰樂喜臺荆州記曰江陵縣東有天井臺飛軒孤映背邑面河實郊㕓遊憇之佳處也襄沔記曰襄縣南五里鳯林山側宋隋王劉誕鎭此有龍見此池中後雍州刺史韋叡於此立放生臺越絶書曰夫差起姑蘇之臺三年聚材五年乃成髙見三百里太史公登之以望五湖伏琛齊地記曰平壽城西北八十里有平望亭亦古縣也或謂秦始皇為望海臺述異記曰凌雲臺在明光殿西髙八丈累磚作道通至臺上又曰蠡臺梁孝王所築於兔園中廽道似蠡因名之究觀洛邑南望少室亦山丘之秀極也太平御覽卷一百七十八
