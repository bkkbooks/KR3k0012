  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_285-1a, image: WYG0895/WYG0895-0502a.png}
body:
  text: 太平御覽卷二百八十五宋李昉等撰兵部十六機略四機略四後漢書曰曹公西征馬超與超夾関為營公急持之而􅇓遣徐晃朱靈等夜渡蒲坂津據河西為營公由潼關北渡未濟超赴舡急戰因放馬牛以餌賊賊亂取牛馬公得渡循河為甬道而南賊退距渭口公乃多設疑兵潜以舟載兵入渭為浮橋夜分兵結營渭南賊夜攻營伏兵擊破之魏志曰曹公與袁紹相持官渡曹公循河而西紹於是渡河追公軍至延津南公勒兵駐營南坂下使登壘視之曰可五六百騎有頃復白騎稍多歩兵不勝数公曰勿復白乃令騎放馬解鞍是時車馬輜重就道諸將以為敵騎多不如還保營荀攸曰此所以餌敵也如何去之紹騎将文醜與𤣥徳將五六千騎前後至諸將復白可上馬公曰未也有頃騎至稍多或分輜重公曰可矣乃皆上馬時騎不滿六百遂縱兵擊之大破又曰曹公既尅鄴袁尚熈遂奔遼東衆百数十初遼東太守公孫康恃逺不服曹公破烏丸或說公遂征之尚熈可擒公曰吾乃使康斬送其首不煩兵矣公引兵還康果斬送尚熈𫝊其首諸將或問曰公還而康斬尚熈何也公曰彼素畏尚熈其急之則并力緩之則相圖其勢然也又曰曹公討烏丸出盧龍塞外道絶不通乃塹山堙谷五百餘里經白檀厯平岡渉鮮卑庭東指栁城未至二百里敵乃知之將数萬騎逆軍登白狼山卒與敵遇衆甚盛公登髙觀敵陣不整縱兵擊之使張遼為先鋒大敗之又曰黄巾賊起命將朱雋率兵討之賊帥韓忠據宛拒雋雋兵少不敵乃長圍結壘起土山以臨城内因鳴鼓攻其西南賊悉衆赴之雋自將精卒五千掩其東北乗城而入忠乃退保小城惶懼乞降又曰曹公與袁紹相持官渡紹遣將郭圖淳于瓊顔良等攻東郡太守劉延於白馬紹引兵至黎陽將渡河曹公北救延津荀攸說曰今兵少不敵分其勢乃可公到延津若將渡兵向其後紹必分兵西應之然後輕兵襲白馬掩其不備顔良可擒也公從之紹聞兵渡渡即分兵西應之乃引軍兼行趍白馬未至十餘里良大驚來逆戰使張遼諸人先登擊破斬良遂解白馬圍又曰曹公擊破馬超超走凉州関中平諸將問曹公曰初賊守潼関渭北道缺不從河東擊馮翊而反守潼関引日而後北渡河何也公曰賊守潼関若吾入河東賊必引兵分守諸津則西河未可渡也吾故盛兵向潼関使賊悉衆南守則西河之備虛故令徐晃等得渡取西河然後引軍北渡賊不能與吾争西河者以有二將之軍也連車樹柵為甬道而南既為不可勝且以示弱渡渭為堅壘虜至不出所以示驕之也故賊不為營壘而求割地吾因順言許之所以縱逸其意使自安而不為備因蓄士卒之力一朝擊之所謂疾雷不及掩耳兵之變化固非一道也又曰蜀關雲長圍曹公將曹仁於樊又圍將軍吕常於襄陽曹公遣將徐晃救仁以雲長難與争遂前至偃城晃詭道作都塹示欲截其後賊燒屯走晃得偃城兩靣連營稍前去賊圍三丈所未攻賊圍頭有屯又别屯四冢晃揚聲當攻圍頭屯而宻攻四冢雲長見四冢欲壊自將歩兵五千出戰晃擊之退走遂追陷與俱入圍破之或自投沔水死曹公令曰賊圍塹鹿角十重將軍致戰全勝遂陷敵圍多斬首虜吾用兵三十餘年及所聞古之善用兵未有長驅徑入敵圍者也又曰曹公征関中進軍渡渭馬超及韓遂請戰不許因請割地公用賈詡計偽許之韓遂請與公相見公與遂交馬語移時不及軍事但說京都故舊拊手歡笑既罷超等問遂公何言遂曰無所言也他日公又與遂書多所㸃竄如遂改定者超等愈疑遂公乃與尅日㑹戰先以輕兵挑之戰良乆乃縱驍騎夾擊大破之遂超走凉州魏志又曰司馬宣王征公孫文懿次于遼水文懿遣將軍卑衍楊柞等歩騎数萬阻遼隧以距之圍塹二十餘里宣王軍至令衍逆戰宣王遣將軍胡遵等擊破之宣王令軍穿圍引兵東南向而急東北即趨㐮平衍等恐㐮平無守夜走又曰郭淮討叛羗遮塞等屯河關白土故城據河拒軍淮見形上流宻于下渡兵據白土城擊大破之又曰李典與程昱等以舩運軍粮㑹袁尚遣將髙藩将兵屯河上絶水道典與諸將議曰藩軍少甲而恃水有懈怠之心擊之必尅宜亟攻之昱以為然遂北渡河攻藩破之水道復通又曰司馬宣王征公孫文懿沉舟潜濟遼水作長圍忽棄敵而向襄平諸將言曰不攻敵而作圍非所以示衆也宣王曰敵堅營髙壘欲以老吾兵也攻之正入其計此王邑所以耻過昆陽也古人云敵雖髙壘不得不與我戰者攻其所必救也敵大衆在此敵國虛矣我直指襄平必懐内懼懼而求戰破之必矣遂整陣而過敵見兵出其后果邀之宣王謂諸將曰所以不攻敵營正欲致此不可失也乃縱兵逆擊大敗破之三戰皆㨗又曰田豫字國讓率兵擊鮮卑軻比能單將銳卒深入敵庭敵人衆多鈔軍前後㫁截歸路國讓乃進軍去敵十餘里結屯營多聚牛馬糞然之從他道引去敵見煙火不絶以為尚在去行数十里乃知之又曰諸葛誕文欽反據夀春司馬景王總兵討之謂諸將曰彼當突圍决一朝之命或謂大軍不能乆省食減口冀有他變料敵之情不出此二者今當多方以防之偹其越逸此勝計也因命合圍分遣羸疾就榖淮北廪軍士大豆人三升欽聞之果喜景王愈羸形以示之多縱反間揚言吴救方至誕等益寛恣食俄而城中乏粮諸將並請攻之景王曰誕聚粮固守外結吴人自謂足據淮南必不便走今若急之損逰軍之力外冦卒至表裏受敵此危道也且堅守三靣若賊六道而來軍粮必少吾以遊兵輕騎絶其轉輸不戰而破欽等必為擒矣誕欽等出攻長圍諸軍逆擊走之初誕欽内不相恊乃至窮蹙轉相疑貳誕殺欽欽子鴦踰城降以為將軍封侯使廵城而呼景王見城上持弓者不發因令攻而㧞之又曰諸葛誕據夀春反遣將王基討之吴遣朱異來救誕於安城詔王基引諸軍轉據北山基謂諸將曰今圍壘轉固兵馬向集但當精修守備以待越逸而更移兵守險使得放縱雖有智者不能善其後矣遂守便宜上䟽曰今與賊交利對敵當不動如山若遷移依險人心搖蕩於勢大損諸軍並據深溝髙壘衆心皆定不可傾動此御兵之要也書奏報聽之夀春竟破司馬文王與基書曰初議者云云求移者甚衆時未臨履亦謂宜然將軍深筭利害獨秉國忠上違詔命下拒衆議終至制敵擒冦雖古人所述不是過也又曰郭淮在漢中時蜀先主欲渡漢水來攻諸將議衆寡不敵依水為陣以距之淮曰此示弱而不足挫敵非筭也不如逺水為陣引而致之半渡而後擊彼可破也既陣蜀主不敢渡通典曰蜀主悟之不敢渡又曰文帝初北國强盛侵擾邊塞乃使田豫持節䕶烏桓校尉時鮮卑数十部比能彌加素利等割地統御各有分界乃共要盟不得以馬與中國市豫以外境為一非中國之利乃先搆離之使自為讐敵互相攻伐素利違盟出馬千疋與官為比能所擊求救于豫豫深入北庭敵追豫到馬城圍之十重豫密使司馬建旌旗鳴鼓吹從南門出敵人皆徃赴之豫將精銳自北門中鼓譟而起兩頭俱發出敵不意敵衆亂棄馬歩走追討二十餘里僵屍蔽地北兵破膽威振沙漠又曰諸葛亮出斜谷司馬宣王屯北原亮盛兵西行諸將皆欲攻西圍郭淮獨以為此見形於西欲使吾重兵應之吴志曰曹公入荆州𤣥徳為曹公所破與魯肅遇于當陽遂共圖討遣諸葛亮詣孫權權遣周瑜程普與之并力逆曹公遇於赤壁瑜部將黄盖曰今冦衆我寡難與持乆觀曹操舩艦相接可燒而走也乃取艨艟数十實以薪柴上建牙旗盖先報書欺以欲降曹公軍延頸指言盖降盖収諸舡同時發火火烈風猛延燒岸上營落煙熖漲天人馬燒溺死者甚衆軍遂敗走又曰周瑜使甘寧據夷陵魏將曹仁圍寧吕蒙徃救之仍分遣三百人柴㫁嶮道賊走可得其馬軍到夷陵即日交戰所殺過半敵夜遁去行過柴道騎皆下馬歩走䝉兵追促獲馬三百疋又曰賀齊討黔歙賊帥陳㒒祖山等二萬户屯厯林山山四面壁立髙数十丈逕路危狹不容方楯賊臨髙下石不可得攻軍住經日將吏患之齊身出周行觀視形便隂募徑捷士為作鐵戈密於隂險賊所不備處以戈斬山為緣道道成夜令潜上乃多懸布以援下人得上百数十人四靣流布俱鳴鼓角齊勒兵待之賊夜聞鼓聲四合謂大軍悉以得上驚懼惑亂不知所為守路備險者皆走還依衆大軍因是得上其中有善禁術吴師刀劔不得㧞弓弩射矢俱還自向輒致不利齊曰吾聞之雄黄勝五六還丹能威敵夫金有刄蟲有毒者皆可禁以無刄之兵不毒之蟲彼必無能為也遂伐木為栅列陣四面羅布俱鳴皷角勒兵待曙賊惶遽無依禁術不效遂大破而降之蜀志曰諸葛孔明率衆平南夷擒夷帥孟獲七縱七擒獲曰公天威也南人不復反矣揚雄蜀王記云秦王石牛置金於後蜀人以為牛便金蜀王發卒開道令五丁拖牛至城都蜀道乃通太平御覽卷二百八十五
