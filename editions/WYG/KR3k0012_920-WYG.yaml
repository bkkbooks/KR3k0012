  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_920-1a, image: WYG0901/WYG0901-0188a.png}
body:
  text: 太平御覽卷九百二十宋李昉等撰羽族部七烏春秋運斗樞曰揺星散為烏左傳曰子元以車六百乘伐鄭諸侯救鄭楚師夜遁鄭人将奔桐丘諜告曰楚幕有烏乃止又曰晉侯伐齊齊師夜遁師矌告晉侯曰鳥烏之聲樂齊師其遁鳥烏得空營故樂也叔向告晉侯曰城上有烏齊師其遁毛詩曰莫赤匪狐莫黑匪烏又曰瞻烏爰止于誰之屋具曰予聖誰知烏之雌雄又曰弁彼鸒斯歸飛提提爾雅曰鸒斯鵯鶋楚烏也又曰雅烏小而多聲腹下白又曰烏鵲醜其掌縮飛則縮脚於腹下又曰燕白脰烏春秋運斗樞曰飛翔羽翮為陽陽氣仁故烏反哺春秋元命苞曰火流為烏烏孝鳥何知孝烏陽精陽天之意烏在日中從天以昭孝也尚書緯曰火者陽也烏有孝名武王卒大業故烏瑞臻漢書曰成帝時御史府有列栢樹常有野烏數千栖宿其上晨去暮來號曰朝夕烏又曰黄霸為潁川太守遣吏有所伺察吏出不敢舎郵亭食於道旁烏攫其肉民有欲詣府言事適見之霸與語道此後日吏還見覇迎勞之曰甚苦食於道旁乃為烏攫其肉吏大驚以霸具知其起居所問毫釐不敢有所隠後漢書馬援曰當居在浪泊西里間敵未滅時腹如湯火下潦上霧毒氣重蒸仰視烏鳶跕跕墮水中謝承後漢書曰廣漢儒字叔林為東郡太守烏巢於㕔事屋梁兎産於床下司馬彪續漢書曰桓帝時童謡曰城上烏尾畢逋一年生九雛公為吏子為徒吳厯曰吳王為神主來立廟蒼龍門時有烏巢朱雀門上晉書載記曰慕容冲之亂有羣烏數萬翔鳴於長安城上其聲甚悲占者以為鬭羽不終年有甲兵入城之象梁書曰髙國有烏旦旦集王殿前為行列不畏人日出然後散去陳書曰司馬申短毛喜於後主使其廢錮又與施文慶李脫児比周譖殺傅緯奪任忠部曲以配蔡徴申嘗晝寢於尚書省下有烏啄其口流血及地時論以為譖賢之報也北史曰西魏裴俠年七歲不能言後於洛城西見羣烏蔽天從西來舉手指之而言從此誠識聰慧甚異常童又曰齊蕭倣字希然居䘮以孝聞廬前有二慈烏來集各據一樹為巢自午以前馴庭前飲啄午後更不下樹每到倣臨哭時舒翅悲鳴全似哀泣又曰齊世辨性怯懦武平末為開府周師入鄴辨以千餘騎覘候出隘口登髙阜西望遥見羣烏飛起謂是西軍旗幟即馳還北至紫陌橋不敢返顧後周書曰宗懍遭母憂去職哭輒嘔血兩旬之内絶而復蘇者三每旦有羣烏數千集于廬舎候哭而來哭止而去又曰皇甫遐字永覽少䘮父事母以孝聞後母亡廬於墓側負土為墳乃有鴟烏各一徘徊悲鳴不離墓側若助遐者隋書曰煬帝起宮丹陽将遊江左有烏鵲來巢于帷幄驅不能去唐書曰武德中張志寛純孝丁母憂於墓側負土成墳有烏巢于墓前樹上志寛哭臨烏輙悲鳴髙祖聞之遣使吊賜帛三十叚表其門閭又曰李義府召見太宗試令詠烏其末云上林多少樹不借一枝棲帝曰吾将全樹借爾豈唯一枝又曰貞元四年夏鄭汴二州烏羣飛集入田緒李納境内銜木為城髙二三尺方十餘里緒納惡而命焚之信宿如故烏口皆流血又曰栁中郢為尚書左僕射東都留守盜發先人墓棄官歸華原除華州刺史不拜後以本官為天平軍節度受節鉞於華原别墅卒於鎮初仲郢自拜諫議後每遷官羣烏大集於昇平里第庭樹㦸架皆滿凡五日而散詔下不復集家人以為候唯除天平節度烏不復集又曰長慶中濮州雷澤縣百姓張憲莊榆樹有烏巢因風墜二雛有鵲巢於東南樹引所墜二雛於其巢哺之太公六韜曰武王登夏臺以臨殷民周公旦曰臣聞之愛其人者愛其屋上烏憎其人者憎其餘胥燕丹子曰燕太子丹質於秦王遇之無禮不得意欲歸秦王不聽謬言曰令烏白頭馬生角乃可丹仰天嘆烏即白頭馬為生角秦王不得已而遣之韓子曰夫馴烏者斷其下翎則必摶人而食焉得不馴乎夫明主之畜臣亦然全臣不得全利夫利君之禄不得無服上之名君焉得不復禄淮南子曰堯時十日並出堯命羿仰射十日中其九烏皆死墮其翼抱朴子曰石先生丹法取烏之未生毛羽者以真丹和牛肉使吞之至長其毛羽皆赤乃殺烏陰乾擣服百日得壽五百歲說苑曰孔子曰存亡禍福皆在已而已天災地妖亦不能殺也昔者殷王帝辛之時爵生烏於城之隅工人占之曰凡小以生巨國家必壯王名必倍帝辛喜爵之得不治國家凶暴無極外寇乃至遂亡殷國此逆天之時說福反為禍楚辭曰羿焉彃日烏焉解羽焦氏易林曰城上有烏自鳴破家風俗通曰案明帝起居注曰上東廵泰山到滎陽有烏飛鳴乘輿上虎賁王吉射之中而祝曰烏烏啞啞引弓射洞左腋陛下壽萬年臣為二千石帝賜錢二百萬令亭壁悉畫為烏又曰烏號弓者柘桑枝條暢茂烏登其上垂下着地烏適飛去從後撥殺取以為弓因名山烏號說文曰烏孝鳥也異苑曰楊顔以純孝著聞後有羣烏銜鼓集顔所居之村烏口皆傷一境以為顔至孝故慈烏來萃銜鼓之異欲令聾者逺聞即於鼔處立縣而名為烏傷王莽改為孝烏以章其行迹云崔豹古今注曰烏一名鷙鳥述征記曰相風烏在靈臺上有千里風則動成公綏烏賦序曰有孝烏集余之廬乃喟然嘆曰余無仁惠之德祥禽曷為而至哉夫烏為瑞久矣以其反哺識養故為吉烏是以周書神其流變詩人瞻其所集國有道則見無道則隠斯鳳鳥之德何以加焉鵩惡烏而賈生懼之烏善禽而吾嘉焉懼惡而作歌嘉善而賦之不亦可乎洞林曰寧逺參軍𢎞景則其姊適吾病四十餘年暫來歸在其家令吾卜之得明夷之小過其病每欲動時輙有烏來鳴即便發作案卦中當得一獨蹄猪畜之江東名之為獨足猪後婦人始欲眠而見一丈夫衣服盡黑在户前立遥呼婦人語其來前不肯言有所避遂泣而去病始小間吾與殷化共論此事曰烏日之禽猪月畜水火相忌自然之數故取畜隂之伏物用消太陽此飛精日中三脚故以獨足者當之南越記曰烏賊魚常自浮水上烏見以為死便啄之乃卷取烏故謂烏賊魚今匹烏化為之魚地理志孤山正在江中有烏飛入船人以飲與之烏且飛且啖譙子法訓曰夫孝行之本替本而求未有得之者也如或得之君子不貴矣烏者獨有反哺之心况人而无孝心者乎孝子傳曰李陶交趾人母終陶居于墓側躬自治墓不受鄰人助羣烏銜塊助成墳劉義慶世說曰徐干木年少時嘗夢烏從天而下銜長斗􅓫樹其庭前烏復上天銜繖下凡樹三繖竟烏大鳴作惡聲而去徐後果得疾遂以惡終春秋運斗樞曰維星得則日月光烏三足禮義修物類合春秋元命苞曰有三足烏者陽精其僂呼也僂呼濕潤生長之言東觀漢記曰章帝元和二年三足烏集沛國三年代郡髙栁烏生子三足大如雞色赤頭上有角長寸餘後周書曰明帝三年秋七月丙申順陽獻三足烏八月甲子羣臣上表稱慶詔曰夫天不愛寳地稱表瑞莫不威鳳巢閣圖龍躍治豈直日月珠連風雨玉燭是以鈞命決曰王者至孝則出元命苞曰人君至治所有虞舜烝烝來兹異趾周文翼翼翔此靈禽文考至德下覃遺仁爰被逺符千載降斯三足將使三方歸本九州翕定惟此大體景福在民予安敢譲宗廟之善弗宣大惠可大赦天下文武官普進三級隋書曰大業四年蜀郡獲三足烏張掖獲𤣥狐唐書曰天授元年有進三足烏者天后以為周室嘉應睿宗時為皇嗣言曰烏前足偽也天后不恱須臾一足墮地果如其言又曰寳應元年秋七月己夘京兆府萬年縣獲三足烏獻之淮南子曰日中有踆烏月有蟾蜍抱朴子曰青泠傳云熒惑火精生朱烏古今注所謂赤烏者朱鳥也其所居高逺日中三足烏之精降而生三足烏何以三足陽數奇也是以有虞至孝三足集其庭曾參鋤𤓰三足萃其冠司馬相如大人賦曰吾乃覩西王母皜然白首母戴勝而穴處有三足烏為之使論衡曰儒者言日中有三足烏日火也烏入火中燋爛安得立然烏日氣也張衡靈憲曰日陽精之宗積而成烏烏有三趾陽之數類竒括地圗曰崑崙之弱水中非乘龍不得至有三足神烏為西王母取食孫氏瑞應圗曰三足烏王者慈被萬姓則來晉諸公贊曰世祖時西域獻三足烏遂累有赤烏來集此昌陵縣按昌字重日烏者日中之烏有託體陽精應期曜質以顯至德者也尚書中侯曰周太子發渡孟津有火自天止于王屋流為赤烏又曰有火自上覆於王屋流為烏其色赤其聲魄瑞應圗曰赤烏武王時衘糓米至屋上兵不血刃而殷服一本曰王者不貪天下而重民命則至墨子曰赤烏銜珪降周之岐社曰命周文王伐殷河出籙圖地出乘黄天鍚武王黄烏之旗帝王世紀曰豐公家于沛之豐邑中陽里其妻夢赤烏若龍戱已而生執嘉是為太公即太上皇吳志曰赤烏元年八月詔曰間者赤烏集於殿前朕所親見若神靈以為嘉祥者改年宜以赤烏又曰孫休永安三年春三月西陵言赤烏見常璩華陽國志曰僰道縣孝子吳順養母至孝赤烏巢于其門孝子傳曰吳叔和犍為人性至孝母没負土成墳有赤烏巢門甘露降户薛綜作赤烏頌曰赫赫赤烏惟日之精朱羽丹質希代而生孝經援神契曰王者德至鳥獸則白烏下漢書曰孝昭元鳳三年有白烏數千下集于㤗山萊蕪山之南古今注曰成帝和平四年白烏下集孝文廟殿下黒烏從之和帝元興元年白烏一見廬江足皆赤王隠晉書曰虞溥為鄱陽内史勸勵學業為政嚴而不猛寛裕簡素白烏巢郡庭止于棗樹就執不動宋起居注曰元嘉十三年陽羡縣民談合送白烏皓質潔映有若輝璧爰稽圖瑞實惟嘉祥齊書曰髙帝時有獻白烏帝問此何瑞范雲位卑最後答曰臣聞王者敬宗廟則白烏至時謁廟始畢帝曰卿言是也感應之理一至此乎薛琮作白烏頌曰粲焉白烏皓體如素宗廟致敬乃胥來顧禮斗威儀曰江海不揚波東海輸之蒼烏又曰君乘木而王其政升平南海輸以蒼烏隋書曰髙祖受禪之年三月辛巳髙平獲赤雀太原獲蒼烏孫氏瑞應圖曰文王時見蒼烏王孝悌則至一本曰賢君王帝主修行孝慈被於萬姓不好殺生則來太平御覽卷九百二十
