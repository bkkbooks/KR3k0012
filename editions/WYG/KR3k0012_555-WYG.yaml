body:
  text: 太平御覽卷五百五十五宋李昉等撰禮儀部三十四葬送三晉中興書曰東海王越妃裴痛越棺柩被焚乃招魂葬越於丹徒中宗以為非禮下詔曰夫塜以藏形廟以安神今世招魂葬者是埋神也其禁之後魏書曰韓延字顯宗為虎牢鎮將初延曽往栢谷塢有魯宗之墓有終焉之志因謂子孫曰我不勞向北代葬此即可就子孫從其言崔鴻後燕録曰趙秩字宣武汲郡朝歌人也輕財好施隣人李𤣥度母死家貧無以葬秩謂其兄曰赴死救不足仁之本也家有二牛以一牛與之𤣥度得以葬他年秩夜行見一老母遺秩金一瓶曰子能葬我是以相報子五十已後當富貴不可言勿忘𤣥度也宋書曰謝方明父冲為孫恩所殺伯父邈守吳興又為孫恩黨害之方明體素羸弱而勇决過人結邈門生討其黨悉擒手刃之時亂後吉凶禮廢方明合門遇禍資産無遺而營舉之功盡力數月葬送並畢平世備禮無以加也南史曰王思遠少無仕心宋建平王景素辟南徐州主簿深見禮素景被誅左右離散思逺親視殯葬手種松栢與廬江何昌㝢上表理之宋書曰王徽少好學弟僧謙亦有才譽為太子舍人遇疾徽躬自處療而僧謙服藥失度遂卒徽深自咎恨發病不復自療哀痛僧謙不能已以書告靈僧謙卒後四旬而徽終遺令薄葬不設轜旐鼓輓之屬施五尺牀為靈二宿便毁又曰范泰卒初議贈開府殷景仁曰泰素望不重不可擬議台司竟不果及葬王𢎞撫棺哭曰君生平重殷鐵今以為報沈約宋書曰吳逵吳興烏程人經荒饉繼以疾病父母兄弟嫂及羣從小功之親男女死者十三人唯逵夫婦獲全家徒四壁立冬無被袴晝則傭賃夜則伐木燒磚妻亦同逵此誠期年中成七墓十三棺亦出中興書王詔孝子傳南史曰顧憲之仕齊為衡陽内史先是郡境連歲疾疫死者大半棺椁尤貴悉裹以葦席棄之路傍憲之下車分告屬縣求其親黨悉令殯葬其家人絶滅者憲之出公禄使綱紀營䕶之又土人有病輙云先亡為禍皆開塜剖椁水洗枯骨名為除祟憲之曉喻為開譬生死之别事不相由其俗遂改又曰王儉領中書監叅掌選事其年疾上親視薨年三十八詔衞軍文武及臺所給兵仗悉停待葬又詔追贈太尉加羽葆鼓吹増班劍為六十人葬禮依太宰文簡公褚彦回故事齊書曰初豫章王嶷葬金牛山文惠太子葬夾石竟陵王子良臨送望祖硎山悲歎曰北瞻吾叔前望吾兄死而有知請葬茲地及薨葬焉又曰何㸃哀樂過人嘗行逢葬者歎曰此哭者之懐豈可思耶於是悲慟不能禁梁書曰到溉臨終令子孫薄葬之曰氣絶便斂斂以法服斂竟便葬不須擇日凶事必存約儉子孫不得違言訖便屏家人請僧讀經囋唄及卒顔色如恒手二指即僧佛道所云得果也又曰顧憲之臨終為制勅其子曰夫出生入死理兼晝夜生即不知所從死亦安識所往延陵云精氣上歸于天骨肉下歸于地魂氣則無不之良有以也雖復茫昧難知要若非妄百年之期迅若駒隙吾今豫為終制瞑目之後念並遵行勿違吾志也莊周澹臺達生者也王孫士安矯俗者也吾進不及達退無所矯常謂中都之制允理愜情衣周於身示不違禮棺周於衣足以蔽臭入棺之物一無所須載以輴車覆以粗布為使人勿惡也崔鴻三十國春秋夏録曰赫連昌發二百里内民二萬五千人鑿嘉平陵七千人繕清廟於契吴初昌父勃北遊契吴昇髙而歎曰美哉斯阜臨廣澤而帶清流吾行地多矣未有若斯之美者昌以勃昔之意也故立廟葬勃焉又於城西十五里起行宫摸寫統萬宫殿飾以金銀珠璣葬訖焚之殺駿馬數十匹唐書曰貞觀十年葬文德皇后於昭陵因山為墳不封不樹大宗懲秦漢已來厚葬以致發掘因序平生之志刻於石以誡將來又曰髙宗以頻年饑儉召雍州長史李義琛謂曰庶人之徒商賈雜類競為厚葬違越禮度雍州列郡之首四方取則卿為嚴禁勿復使然也又曰初𤣥宗因拜橋陵至金粟山覩岡巒有龍盤鳳翥之勢謂左右曰吾千秋後宜葬此地羣臣乃追先㫖築陵此山曰泰陵又曰蘇頲葬上遊咸宜宫將出獵聞頲喪出愴然曰蘇頲今日葬吾寧忍娛游遂還宫又曰初涇原節度使劉昌之領涇州也平凉盟㑹所亡殁將士骸骨在焉乃令聚而坎瘞之因感夢於昌有媿謝之意遂以聞由是下詔深自剋責乃遣秘書少監孔述睿及中官以御厨饌物及内造衣服數百襲令劉昌收其骸骨以歸大將三十人將士一百人皆具棺攢斂以衣服葬於淺水原置二塜其大將曰旌義塜將士曰懐忠冡詔翰林學士撰二塜誌文及祭文其日劉昌盛陳兵於葬所具牢饌祖祭之禮昌及大將皆素服臨之焚其屍及紙錢千幅又立三堠題以塜名表於道傍師人觀之莫不感泣穆天子傳曰甲辰天子南葬盛姬於樂池之南即𤣥池也天子乃命盛姬之䘮視皇后之葬法河濟之間共事共給葬事七萃之士抗即車舉棺以就車御日月之旗七星之文今旒上畫日月及北斗星周禮日月為常旗亦通名也鼓鐘以葬山海經曰秋山帝堯葬于陽今堯塜在濟隂陽城縣也帝嚳葬于隂爰有熊文虎雕虎文王皆葬其所文王墓今在畢也案帝王塜墓有定處而山海經往往偏見之者葢以為聖人在於其位仁化廣及恩洽鳥獸至於殂亡四海若䘮考妣无思不哀故絶域殊類之人聞天子崩各自立廟祭起土為塜也又曰務隅之山帝顓頊葬于陽塜在頓丘城門外廣陽里中也九嬪葬于隂嬪婦又曰赤水之東蒼梧之野舜與叔均之所葬也叔均商均墓今在九疑山中也其中有九疑山舜所葬在長沙零陵界中九疑山九谿其山皆相似又曰形天與帝爭神帝斷其首葬之常羊山乃以乳為目以臍為口𤣥中記又載晏子曰景公成路寢之臺逢於何遭晏子再拜前曰於何之母死兆在路寢之臺牖下願請合骨晏子入白公公作色曰自古及今子亦嘗聞諸葬人主之宫者乎對曰古之人君不奪生人之居不殘死人之墓故未嘗聞請葬人主之宫也嬰聞之生者不安命之曰畜憂死者不葬命之曰畜哀畜憂者怨畜哀者危君不如許之公曰諾逢於何遂葬路寢之臺牖下墨子曰古者聖人之制為葬埋之法曰棺三寸足以朽體衣衾二領足以覆惡昔者堯北教八狄道死鞏山之隂衣衾二領滿坎無封已葬牛馬乗之舜西教犬戎道死南紀之市既葬而市人乗之禹東教於越葬於㑹稽之山桐棺三寸皆下不及泉上無通臰三王者豈財用不足哉以為葬埋之法也吕氏春秋曰滕文公卒葬有日矣天大雨雪甚至十日羣臣請弛期太子不許惠公諌曰昔王季葬滑山之尾欒水齧其墓見棺前和文王曰先君欲見羣臣百姓矣乃出張三日而後葬今太子亦曰先君以留而撫社稷故使雪弛其期更為曰此文王之義也太子曰善莊子曰莊子將死弟子欲厚葬之莊子曰吾以天地為棺椁日月為連璧星辰為珠璣萬物為齊送吾葬具不備耶何以加此弟子曰吾恐烏䳒之食夫子也莊子曰在上為烏䳒食在下為螻蟻食奪彼與此何偏耶又曰莊子送葬過惠子之墓顧謂從者曰郢人有墁以堊汚其鼻端若蠅翼使匠石斷之運斤成風堊盡而鼻不傷自夫子之死吾無質矣吾无與言之矣韓子曰墨者之葬也冬日冬服夏日夏服桐棺三寸執䘮二日世主以為儉而尤之儒者破家而葬債子而償執䘮三年毁而扶杖世主以為孝而禮之也又曰齊國好厚葬布帛盡於衣衾材木盡於棺椁桓公患之以告管仲曰布帛盡无以為幣材木盡則无以為守備而人厚葬之不休奈何管仲對曰凡人之有為也非名之則利之也乃下令曰棺椁過度者僇其尸罪夫當䘮者夫僇死无名罪當䘮者无利人何故為之尸子曰禹之䘮法死於陵者葬於陵死於澤者葬於澤桐棺三寸制䘮三日舜西教乎七戎道死葬於南巴之中衣衾三領欵木之棺葛以緘之吕氏春秋曰孝子之重其親也慈親之愛其子也痛於肌骨性也所重所愛死而棄之溝壑人之情不忍為故有葬死之義葬者藏也藏淺則狐貍迫之深則及於泉故凡葬必於髙陵之上以避狐貍之患水泉之濕此則善也又曰審知生聖之要審知死聖之極也知生者不以害生養生之謂也知死者不以害死二者聖人之所獨决也凡生於天地之間其必有死所不免也淮南子曰禹之時天下水禹身執畚挿當此之時死陵者葬陵死澤者葬澤節財薄葬焉又曰馬免人於難者死也葬之以帷􅞲為衾牛有德於人其葬之大車之箱牛馬有功猶不可忘又况人乎又曰禹有洪水之患陂塘之事陂蓄水塘池也故朝死而暮葬此皆聖人之所以應時設教見而施宜者也典畧曰秦始皇十年華陽君卒孝文王合葬壽陵襄王母夏太后别葬杜東臨死時曰東望我子西望我夫後百年旁當有萬家邑及漢有天下宣帝果起陵邑焉西京雜記曰曹敞在吳章門下往往好斥人過以為輕薄世人皆以為然章後見殺全無有敢收葬者敞乃稱吳章弟子收葬其屍方知亮直者不見容於凡軰矣平陵人文生立碑於吳章墓側在龍首山南幕嶺上又曰何武葬北邙薄龍陂去王嘉塜東北一里許又曰楊貴字王孫京兆人也生時厚自奉養死卒祼葬終南山下其孫掘土鑿石深七尺而反奢又曰安定嵩真𤣥莬曹元禮並明算術皆成帝時人真常以算自剋其壽七十三真曰綏和元年正月二十五日晡時死矣書其壁以誌之至二十四日晡時死妻曰真算時見長下一算欲以告之慮脱其㫖故不告今校下一日也又曰北芒青龍隴上孤檟之西四尺所鑿之七尺吾欲葬此地也真死依言往掘得古時空椁即以葬之又曰漢帝及諸侯王葬皆珠襦玉匣形如鎧甲連以金縷匣上皆縷為蛟龍鸞鳳龜麟之象時謂蛟龍玉匣又曰杜子夏葬長安北四里臨終作文曰魏郡杜鄴立身忠義犬馬未陳奄先草木骨肉歸於土魂氣則无所不之何必故丘然後即化封長安北郭此焉安息及死命刋石埋墓前陳留風俗傳曰小黄縣者宋地故陽武東黄鄉也因黄水以名縣沛公起兵野戰䘮皇妣於黄鄉天下平定使使者以梓宫招魂幽野於是有丹虵在水自灑濯入于梓宫其浴處有遺髪諡曰昭靈夫人盧植别傳曰植初平三年卒臨困勅其子儉葬於山足不用棺附體單帛而已鄭𤣥别傳曰𤣥卒遺令薄葬自郡守以下嘗受業者衰絰赴者千餘郭翻别傳曰翻字道翔武昌人遺令儉葬唯以兩卷老子示存道德杜祭酒别傳曰君年五十二當其終亡安厝先塋帛布轜車䘮儀儉約執引者皆三吳令望及北人賢流虞氏家記曰潭母太夫人薨宜都府君即世五十九載改殯脩構窀穸靈柩住而莫前羣從咸以䘮事有往無反不應遷移潭以昔文王之葬王季既定而洪水出截塜棺椁文王乃設張屋出柩三日羣臣臨之然後葬此則上聖之遺令載在篇籍遂奉遷神柩權停幕屋使子孫展哀晨夕宗族相臨允合張屋之儀也天子給太夫人徘徊車謁者送䘮禮儀光備合葬於舊壙衞玠别傳曰君卒丞相王公教曰衞洗馬明當改葬此君風流名士海内民望可脩三牲之祭以敦舊好太平御覽卷五百五十五
