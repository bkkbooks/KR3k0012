body:
  text: 太平御覽卷三百十九宋李昉等撰兵部五十拒守拒守上孫子曰昔之善戰者先為不可勝先諮之廟堂慮其危難然後髙壘深溝使兵士練習故敵不得勝以待敵之可勝以此守備之固待敵之闕則可勝也不可勝在己言守備之固制敵在外也可勝在敵守備之固自脩理以俟敵之虛懈已見敵人有闕漏之形然後可勝故善戰者能為不可勝不可使敵必不可勝若敵曉練兵事䇿與道合深為已備者亦不可強勝故曰勝可知見成形也而不可為也敵有備也已料見形者則勝負可知若敵宻而無形亦不可强使為欺故范蠡曰時不至不可強生事不究不可強成不可勝者守也形藏也若未見其形彼衆我寡則自守也可勝者攻也故善守者藏於九地之下善守備者務因其山川之阻丘陵之固使不知所故言其深宻藏於九地之下又曰城有所不攻固而重多易曰利用禦冦不利為冦左傳曰晉侯伐齊齊侯禦諸平隂塹防門而守之廣里夙沙衞曰不能戰莫如守險弗聽范宣子告齊大夫析文子曰吾知子敢匿情乎魯人莒人皆請以車千乗自其鄉入既許之矣若入君必失國子盍圖之子家以告公公恐晏嬰聞之曰君故無勇而又聞是弗能久矣齊師夜遁又曰倍則攻敵則戰少則守後漢書曰涼州賊王國圍陳倉左將軍皇甫嵩督前將軍董卓救之卓欲進赴陳倉嵩不聽卓曰知者不後時勇者不留决速救則城全不救則城滅全滅之勢在於此也嵩曰不然百戰百勝不如不戰而屈人之兵是以為不可勝以待敵之可勝不可勝在我可勝在彼彼守不足我攻有餘有餘者動於九天之上不足者陷於九地之下今陳倉雖小城守固備非九地之陷也王國雖强而攻我之所不救非九天之勢非九天攻者受害陷非九地守者不㧞國今已䧟害受之地而陳倉保不拔之地我可不煩兵動衆而取全勝之功將何救焉遂不聽王國圍陳倉自冬迄春八十餘日城堅守固竟不能㧞賊衆疲弊果自解去又曰來歙與征虜將軍祭遵襲畧陽遵道病還分遣精兵隨歙合二千餘人伐山開道從畨湏迴中畨湏迴中並地名也畨音盤武帝元封四年幸雍通回中道前書音義曰回中在今隴州􅊈源縣也徑至畧陽斬隗囂守將金梁因其保域囂大驚曰何其神也東觀漢記曰上聞得畧陽甚悦左右怪上數破大敵今得小城何足喜上曰畧陽囂所依阻心腹已壞則制其支體易也乃悉兵數萬人圍略陽斬山築堤激水灌城歙與將士固死堅守矢盡乃發屋斷木以為兵囂盡鋭攻之自春至秋其士卒疲弊帝乃大發關東兵自將上隴囂衆潰走圍解於是置酒髙㑹勞賜歙班坐絶席在諸將之右賜歙妻縑千疋召使留屯長安悉監䕶諸將又曰大司徒鄧禹西征定河東張宗詣禹自歸禹聞宗素多權謀表為偏將軍禹軍到栒邑赤眉大衆且至禹以栒邑不足守欲引師進就堅城而衆人多畏賊追憚為後拒禹乃書諸將名于竹簡署其前後亂著笥中令各探之笥以竹為之鄭𤣥注禮記云圎曰簟方曰笥宗獨不肯探曰死生有命張宗豈辭難就逸乎禹嘆息謂曰將軍有親弱在營奈何不顧宗曰愚聞一卒畢力百人不當萬夫致死可以横行宗今擁兵數千以承大威何遽其必敗乎遂留為後拒諸營既引兵宗方勒厲軍士堅壘壁以死當之禹到前縣議曰以張將軍之衆當百萬之師猶以小雪投沸湯雖欲戮力其勢不全也乃遣步騎二千人反還迎宗宗引兵始發而赤眉至宗與戰却之乃得歸營於是諸將服其勇又曰隗囂大將王捷别在戎丘登城呼漢軍曰為隗王城守者皆必死無二心願諸軍亟罷亟紀力切請自殺以明之遂自剄死又曰世祖即位遣宗正劉延攻天井關與田邑連戰十餘合延不得進邑留母弟妻子為延所獲東觀漢記曰鄧禹使積弩将軍馮愔將兵擊邑敗之得邑母弟妻子後邑聞更始敗乃遣使詣洛陽獻璧馬因拜為上黨太守晉書曰陶侃使桓宣李陽平襄陽侃使宣鎮之以其淮南部曲立義成郡宣招懐初附勸課農桑簡刑罰畧威儀或載鉏耒於軺軒或親芸獲於壠畝十餘年間石季龍再遣騎攻之宣能得衆心以寡弱拒守論者以為次於祖逖周訪又曰吳彦為吳建平太守時王濬將伐吳造船於蜀彦覺之請増兵為備皓不從彦乃輙為鐵鎖横斷江路及師臨境縁江諸城皆望風降附或見攻而㧞唯彦堅守大衆攻之不能剋退舎禮之梁書曰侯景反兵偪建業衆皆兇懼羊侃副宣城王督諸軍偽稱得外射書云邵陵王西昌侯已至近路衆乃少安賊為尖頂木驢攻城矢石所不能制侃作雉尾炬施鐵鏃以油灌之擲驢上燒之俄盡賊又東西兩面起土山以臨城城中震駭侃命為地道􅅗引其土山不能立賊又作登城樓車髙十餘丈欲臨射城内侃曰車髙塹虛彼來必倒可卧而觀之不勞設備及車動果倒衆皆服焉賊步攻不捷㑹侃病死城方陷南史曰蔡道恭為司州刺史魏圍司州時城中衆不滿五千人食裁半嵗魏軍攻之晝夜不息乃作大車載土四面俱前欲以填塹道恭塹内作艨艟鬬艦以待之魏人不得進又潛作伏道以决塹水道恭載土屯塞之相持百餘日前後斬獲不可勝計魏大造梯衝攻圍日急道恭用四石烏漆大弓射所中皆洞甲飲羽一發或貫兩人敵人望弓皆靡又於城内作土山多作大矟長二丈五尺施長刃使壯士執以刺魏軍甚憚之又曰陳宜黄侯慧紀鎮荆州隋師濟江慧紀率將士三萬人船艦千餘乗沿江而下欲趣臺城遣南康太守吕肅將兵據巫峽以五條鐵鎖横江肅竭其私財以充軍用隋將楊素奮兵擊之四十餘戰争馬鞍山及磨刀澗守險隋軍死者五千人陳人盡取其鼻以求功賞既而隋軍屢捷獲陳之士三縱之肅乃遁後周書曰李遷哲天和三年進位大將軍召遷哲率金上等諸州兵鎮襄陽五年陳將章昭逹攻逼江陵梁明帝告急於襄州衞公直令遷哲往救焉遷哲率其所部守江陵外城與陳將程文季交戰兵却遷哲乃親自陷陣手殺數人㑹江陵總管陸騰出兵助之陳人又因水汎長壊龍川寧朔堤引水灌城城中驚擾遷哲乃先塞水又募驍勇出擊之少有斬獲衆心始定俄而敵于郭内焚燒人家遷哲自率騎出南門又令步兵自北門出兩軍合勢首尾邀之陳人復敗多投水而死是夜陳人又竊於城西堞以梯登者已百數人遷哲又率驍勇捍之陳人復亂俄而大風暴起遷哲乗闇出兵擊其營陳人大亂殺傷甚衆陸騰復破之於西堤陳人乃遁又曰太祖以王羆為荆州刺史進號撫軍將軍梁復遣曹義宗衆數萬圍荆州堰水灌城不沒者數版時既内外多虞未遑救援乃遺羆鐵劵云城全當授本州刺史糧盡羆煮粥與將士均分而食之每出戰嘗不擐甲胄大呼曰荆州城孝文皇帝所置天若不祐國家使賊箭中我不爾須破賊屢經戰陣亦不被傷彌厯三年義宗方退進封霸城縣公尋遷車騎大將軍又曰王羆華州刺史沙苑之役齊神武士馬甚盛太祖以華州衝要遣使勞羆令加守備羆語使人曰老羆當道卧貆子安得過太祖聞而壯之及齊神武至城下謂羆曰何不早降羆乃大呼曰此城是王羆家生死在此欲死者來齊神武遂不敢攻又曰王思政守潁川兼河南諸軍事東魏太尉髙嶽行臺慕容紹宗儀同劉豐生等率騎十萬來攻潁川城内卧鼓偃旗若無人者嶽恃其衆謂一戰可屠乃四面鼔譟而上思政選城中驍勇開門出突嶽衆不能當引軍亂退思政登城遥見嶽陣不整乃遣步騎三千出邀擊之殺傷甚衆然後還城設守禦之備岳知不可卒攻乃多修營壘又隨地勢髙處築土山以臨城中飛梯大車晝夜盡攻擊之法思政亦作火􅗋因迅風便投之土山又以火箭射之燒其攻具仍募勇士縋而出戰嶽衆披靡其守土山人亦棄山而走思政即命據其兩土山置樓堞以助防守嶽等於是奪氣不敢復攻齊文襄更益岳堰洧水以灌城城中水泉湧溢不可防止懸釡而炊糧力俱竭慕容紹宗劉豐生及其將慕容永珍共乗樓船以望城内令善射者俯射城中俄而大風暴起船乃飄至城下城上入以長鈎牽船弓弩亂發紹宗窮急投水而死豐生浮向土山復中矢而斃生擒永珍思政謂之曰僕之破亡在於晷漏誠知殺卿無益然人臣之節守之以死乃流涕斬之并收紹宗等尸以禮埋瘞又曰賀若敦率步騎六千渡江取陳湘州陳將侯瑱禦之江路遂斷糧援既絶人懐危懼敦於是分兵抄掠以充資費恐瑱等知其糧少乃入營内聚土覆之以米集諸營軍士人各持囊遣官司部分若給糧者因召側近村民佯有所訪問令於營外遥見隨即遣之瑱等聞知良以為實乃據守要險欲曠日老師敦又増修營壘造廬舍示以持久敦軍數有叛人乗馬投瑱者遂納之敦又别取一馬趣船令船中逆以鞭鞭之如是者再三馬便畏船不上後伏兵於江岸遣人乗畏船馬以招瑱軍詐稱降附瑱遣兵迎接竟來牽馬馬既畏船不上敦發伏掩之盡殪又湘之人乗輕船載米粟及籠雞鴨以餉瑱軍敦患之乃為土人甲士出而擒之此後實有饋餉及亡命奔瑱者猶謂敦之設詐逆遣押擊並不敢受相持嵗餘瑱不能制北史曰西魏將韋孝寛守玉璧東魏大將齊神武命攻之連營數十里至於城下乃於城南起土山欲乗之以入當其山處城上先有兩髙樓孝寛更縳木接之令極峻多積戰具以禦之敵人以樓髙不得入遂於城南鑿地又於城北起土山且作且攻晝夜不息孝寛復掘長塹截其道仍置戰士屯於塹城上外城每穿至塹戰士即擒殺之又於塹外積柴貯火敵人有在地道内者便下柴火以皮排音牌吹之火氣一衝咸即灼爛城外又作攻車車之所及莫不摧毁雖有排楯莫之能抗孝寛乃縫布為幔隨其所向則張設之布既懸於空中其車竟不能壞城外又縛松麻於竿灌油加火炬以燒布并欲焚樓孝寛復作長鐵鈎利其鋒刃火竿一來以鉤遥割之松麻俱落城外又於城西面穿地作二十一道分為四路於其中各施梁柱放火燒之柱折城並崩壊孝寛又隨壊處竪木柵以扞之敵不得入城外盡其攻擊之術孝寛咸拒破之竟以全隋書曰梁士彦遷熊州刺史後從武帝㧞晉州進位柱國除使持節晉絳二州諸軍事晉州刺史及帝還後齊後主親總六軍而圍之獨守孤城外無聲援衆皆震懼士彦慷慨自若賊盡鋭攻之樓堞皆盡城雉所存尋仞而已或短兵相接或交馬出入士彦謂將士曰死在今日吾為爾先於是勇烈齊奮呼聲動地無不一當百齊師少却乃令妻率軍民子女晝夜修城三日而就帝率六軍亦至齊師解圍營于城東十餘里士彦見帝持帝鬚而泣曰臣㡬不見陛下帝亦為之流涕時帝以將士疲倦意欲班師士彦叩馬而諫曰今齊師遁衆心皆動因其懼而攻之其勢必舉帝從之大軍遂進帝執其手曰余之有晉州為平齊之基若不固守則事不諧矣朕無前慮惟恐後變善為我守之又曰郭榮宇文護擢中外府水曹叅軍時齊冦屢侵護令榮於汾州觀賊形勢時汾州與姚襄鎮相去懸逺榮以為二城孤逈勢不相救請於州鎮之間更築一城以相控攝護從之俄而齊將段孝先攻䧟姚襄汾州二城唯榮所立者獨能自守護作浮橋出兵渡河與孝先戰孝先于上流縱火筏以擊浮橋護令榮督便水者引取其筏以功授大都督護又曰劉宏字仲逺拜泉州刺史㑹髙智急作亂以兵攻州宏城中守百餘日救兵不至前後出戰死亡大半糧盡無所食與士卒數百人煑犀角腰帶及剥樹皮而食之一無離叛賊知其饑餓欲降之宏抗節彌厲賊悉衆來攻城陷為所害上聞而嘉歎者久之賜物二千段又曰李景檢校代州總管漢王諒作亂并州景發兵拒之諒遣劉嵩襲景戰于東城昇樓射之皆應弦而倒選壯士擊之斬獲略盡諒復遣嵐州刺史喬鍾葵率勁勇三萬攻之景戰士不過數千加以城池不固為賊衝擊崩毁相繼景且戰且築士卒皆殊死鬭屢挫賊鋒司馬馮孝慈司法叅軍吕玉並驍勇善戰儀同三司侯莫陳又多謀畫工拒守之術景知將士可用其後推誠于此三人無所關預唯在閣持重時出撫循而已月餘朔州總管楊義臣以兵來援合擊大破之太平御覽卷三百十九
