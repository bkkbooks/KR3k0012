  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_948-1a, image: WYG0901/WYG0901-0392a.png}
body:
  text: 太平御覽卷九百四十八宋李昉等撰蟲豸部五蜘蛛焦贛易林未濟之蠱曰蜘蛛作網以伺行旅青蠅嚵噉以求膏腴又井之遯曰蜘蛛南北廵行網罟杜季利兵傷我心旅毛詩豳七月東山曰蠨蛸在戸蠨蛸長踦也詩義疏曰一名長脚荆州河内謂之喜子云此蟲來着人當有親客至亦如蜘蛛為網羅居之詩義問曰蠨蛸長脚蜘蛛也劉芳毛詩義筌曰蠨蛸長踦踦音䗁􅀈之䗁小蜘蛛長脚者俗人呼為喜子爾雅曰次蟗音秋䵹鼄蝥音矛土䵹鼄在地中布網草䵹鼄絡幕草間蠨蛸長踦音䗁小蜘蛛脚長俗呼為喜子也廣雅曰鼄蝥罔蠾􅀈毒蜍也夢書曰夢蜘蛛者其日遂有喜事魏志曰舘陶令葛原遷新興太守管輅往祖餞之賔客並㑹原自起取燕卵蜂窠蜘蛛着器中使射覆卦成輅曰第三物觳觫長足吐絲成羅尋網欲食利在昏夜此蜘蛛也舉坐驚喜抱朴子曰大昊師蜘蛛而結網又曰或以赤斑蜘蛛及七種水馬以合馮夷水仙丸服之亦可以居水中又以塗蹠下則可以步行水上也符子曰晉公子重耳奔齊與五臣而遊乎大澤之中見蜘蛛布其網而執豸以食之公子重耳觀之顧謂其臣舅犯曰此䖝也智之薄者矣而猶役其智曵其網而執豸以食之况乎人之有智而不能廓垂天之網布絡地之繩以供方丈之御是曾不如蜘蛛之智可謂之人乎舅犯曰公子慎勿言也終行之則有邦有嗣矣金樓子曰楚國龔舍初隨楚王朝宿未央宫見蜘蛛焉有赤蜘蛛大如栗四面縈羅網有蟲觸之而死者退而不能出焉舍乃歎曰吾生亦如是耳仕宦者人之羅網也豈可淹嵗於是掛冠而退時人笑之謂舍為蜘蛛之隠揚雄方言曰䵹鼄郭璞曰知朱兩音朱蝥音矛自關而西秦晉之間謂之鼄蝥今江東呼蝃蝥音掇自關而東趙魏之間謂之鼅鼄或謂之蠋蝓蠋魚兩音囑蝓者朱儒語之轉也北燕朝鮮洌水之間謂之毒蜍齊人又呼為杜公亦言岡工音毒餘束晳發蒙記曰蠅生積灰蜂出蜘蛛腐木為螢火蠐螬出朽芻皇甫謐帝王世記曰湯出見羅者湯下車命觧其三面置其一面更放之祝曰昔蛛蝥作罔今人學結欲左者左欲右者右欲高者高欲下者下吾取其犯命者郭璞洞林曰流移道路諸人並欲令郭璞射覆人人自持五月五日蜘蛛諸物悉驗遂不復射淮南萬畢術曰蜘蛛塗布而雨自稀取蜘蛛置甕中食以膏百日殺以塗布不能濡也又曰取蜘蛛與水狗及猪肪置甕中宻以新縑仍懸室後百日視之蜘蛛肥殺之以塗足涉水不没矣又一法取蜘蛛二七枚内甕中合肪百日以塗足得行水上故曰蜘蛛塗足不用橋梁王充論衡曰觀夫蜘蛛之絲以罔飛蟲也人之用詐妄過之郭義恭廣志曰草蜘蛛在草上色青䵹鼄在地上春行草間索覆也西京雜記曰樊噲問陸賈自古帝王人君皆云受命於天必有瑞應豈然乎賈曰有之目瞤得酒食火花得錢財乾鵲噪行人至蜘蛛集百事喜小故猶徴大亦宜然故目瞤則呪之乾鵲噪則餧之蜘蛛集則放之况天下大寳人君重位非天命何以得之劉敬叔異苑曰陳郡殷家養子名琅與一婢結好經年婢死後猶往來不絶夕見大蜘蛛形如斗拌縁牀就琅便宴爾怡悅母取而殺之琅性理遂復劉義慶幽明録曰某郡張甲者與司徒蔡謨有親僑住謨家暫行數宿過期不反謨晝眠夢甲云暫得行忽暴病患心腹病痛腹滿不得吐下某時死主人殯殮謨悲涕相對又曰我病名乾霍亂自可治但人莫知其藥故今死耳謨曰何以治之甲曰取蜘蛛生斷去脚而吞之則愈謨覺使人往行所驗之果死問主人病時日皆與夢符後有乾霍亂者試用輒瘥廣五行記曰蜘蛛集於軍中及人家有喜事夢書曰䵹鼄為大腹其性然也夣見蜘蛛憂懷姙婦人也葛洪治瘧方曰取蜘蛛七枚着飯中吞即愈成公綏蜘蛛賦曰獨高懸以浮處遂設網於四隅南連大廡北接華堂左慿廣厦右依高廊吐絲屬緒布網引綱纎羅絡幕綺錯交張雲舉霧綴以待其方張望蜘蛛賦曰嘯詠蓬蘆敖步丘園覽蜘蛛之為䖝焉乘虛運巧構不假物欲足性命蕭然靖逸良可翫也伊蜘蛛之為蟲縱微性乎天壤禀妙造化如靈忽有擬而無相吐自然之纎緒先皇羲而結網馮輕羅以隠顯應大明之幽朗縊女爾雅蜆縊女也孫炎曰小黒䖝赤頭三輔謂之縊女此䖝多民多縊死郭璞註曰喜自縊死故曰縊女異苑曰縊女蟲也一名蜆長寸許頭赤身黒恒吐絲自懸昔齊東郭姜既亂崔杼之室慶封殺其二子姜亦自經俗傳此婦骸化而為蟲故以縊女為名馬蚿音賢爾雅曰蛝音閑馬䗃仕板切也郭璞曰蠲虳也俗呼馬蠋虳音的張揖廣雅曰蛆子魚切蟝音渠馬􅢡馬蚿也宋書曰王素聲譽甚高山中有蚿其聲清長聽之使人不厭而其形甚醜素乃為蚿賦以自况魯仲連子曰諺云百足之蟲三斷不蹶者持之者衆也文子曰善用人者若蚿之足衆不相害准南子同莊子曰夔憐蚿蚿憐蛇夔謂蚿曰吾以一足趻踔玉今切勅卓切而行子無如矣今子使萬足獨奈何曰不然子不見夫唾乎唾則大者如珠小者如霧今予動吾天機不知所以然司馬彪曰比若為且渠也淮南子曰季夏腐草化為妍草得隂而死極隂中生陽故化為蚈也蚈馬蚿一曰螢火音谿又曰良將之卒若虎之牙若兕之角若鳥之羽若蚈音牽之足蚈馬蠸也又曰蚈足走不及蛇物固有小不如大也明堂月令曰腐草為蠋揚雄方言曰北燕馬蚿謂之蛆􅀈張茂先博物志曰馬蚿一名百足中斷其頭尾各異行而去本草經曰馬六一名百足呉氏本草經曰一名馬軸蝔淮南子曰蝔知將雨高綉曰蝔蟲也大如筆管長三寸餘蝔音皆竹蟲淮南萬畢術曰竹蟲飲人自言其誠竹蟲三移竹黃十移治之欲得人情取藥如大豆撓酒中飲之不令醉以問其事必得其實也蓼蟲孔臧蓼蟲賦曰覩兹茂蓼紛葩吐榮爰有蠕而渠切蟲厥狀似螟羣聚其間食之以生悟物托事以况乎人㓜長斯蓼莫知其辛蠐螬毛詩碩人曰膚如凝脂領如蝤蠐蝤蠐蝎蟲也陸機毛詩疏義曰蠐螬生糞中爾雅曰蟦音紛蠐螬也郭璞注曰在糞土中者蝤蠐蝎在水中者也今雖通名之為蝎所在異也莊子曰烏足根為蠐螬司馬彪曰烏足草名生水邊曹齊曹蟲也淮南萬畢術曰委成蠐螬以秋冬襍黍置溝中即生蠐螬也王充論衡曰蠐螬化為復育轉為蟬揚雄方言曰蠀螬謂之􅀈蜚翠自關而東謂之蝤蠀酋資或謂之䖭屬書卷或謂之蝖􅕪亦呼堂齊或呼地蟲喧斛兩音梁益之間謂之蛒音格或謂之蝎或謂之蛭音質蛒秦晉之間謂之蠧或謂之天螻按爾雅云􅕪天螻螻蛄耳而方言以為蝎未詳其義也博物志曰蠐螬以背行者快於用足也祖台志怪曰呉中書郎盛冲至孝母王氏失明冲暫行勑婢食母婢乃蒸蠐螬進之王氏食美然非魚肉母謂冲曰汝試問之既而問婢服實是蠐螬冲抱母慟哭而目立開本草經曰蠐螬一名蟦齊主治血痺螻蛄述異志曰零陵施子然宿田畔夜中見一人著黄練單衣袷直造席捧手與子然語子然問其姓名即答云僕姓盧名鈎家在􅇄溪邊臨水後傭作人掘田塍西溝邊蟻蛭見大坎溝中螻蛄將近斗許而有數頭極壯一箇彌大子然至是始悟曰近曰客盧鈎反音則螻蛄也家在􅇄溪即西坎也悉灌以沸湯自是遂絶搜神記曰廬陵太守平原龎企字子及自說其乃祖非罪繫獄時有螻蛄行其左右謂曰爾有神當活我因投食與之食盡復來形稍大數月形如豚及當刑螻蛄夜掘壁為孔以出龎氏常祠螻蛄范注葛洪治箭鈎在咽㗋不出方曰用螻蛄腦屠之即出范注治不得小便方曰用螻蛄二枚斷取體下以一升水漬之去皮飲之須臾便通本草經曰一名䗜蛄一名天螻一名􅥿産難出刺在肉中潰腫下哽咽觧毒與惡瘡陶洪景本草經曰螻蛄味醎寒取自出者其自腰以前甚澁主止大小便尺蠖周易下繫辭曰尺蠖之屈以求伸也龍蛇之蟄以存身也爾雅曰蠖蚇蠖今蝍􅠸也晏子春秋曰弦章謂景公曰尺蠖食黃即身黃食蒼即身蒼說文曰尺蠖曲信蟲信音申方言曰蠀音資􅠸子六切謂之尺蠖郭璞曰步屈也曹子建長歌行曰尺蠖知屈伸體道識窮逹傅奕濳通賦曰尺蠖屈體以求伸潛龍階水而升雲鮑明逺尺蠖賦曰智哉尺蠖觀機而作伸非向厚詘非向薄當靜泉渟遇躁風驚起軒軀而曠跨伏累氣而併形氷炭弗觸鋒刃靡迕逢嶮慼蹐值夷舒步忌好退之見猜哀必進而為蠧每驤首以瞰途常佇景而翻露故身不豫托地無前期從方而應何慮何思是以軍算慕其權國容擬其變高賢圖之以隱淪智士以之而藏見笑靈蛇之久蟄羞龍德之方戰郭璞尺蠖贊曰貴有可賤賤有可珍嗟兹尺蠖體此屈伸論配龍蛇見歎聖人張恊七命曰蟭螟飛而風生尺蠖動而成響太平御覽卷九百四十八
