body:
  text: 太平御覽卷三百六十七宋李昉等撰人事部八頰鼻額口舌頰説文曰頰面旁也輔頰也釋名曰頰夾也面旁稱也亦取挾飲食物也傳曰宫之竒曰諺所謂輔車相依唇亡齒寒者其虞虢之謂乎又曰公侵齊門于陽州士皆坐列顔髙奪人弱弓籍邱子鉏擊之一人俱斃子鉏斧人偃且射子鉏中頰殪子鉏死易咸卦象曰咸其輔頰舌騰口説也又夬卦曰壮于頄有㓙頄求亀反靣權也又曰艮其輔言有序施止于輔以處於中故曰艮輔也史記曰漢王聞魏豹反方東憂楚未及擊謂酈生曰緩頰往説豹能下之吾以萬户封君又曰武帝元鼎六年定越地以為儋耳郡張晏曰儋耳其俗鏤其頰皮上連耳匡分為數支状若鷄腸又曰朱博入守左馮翊長陵大姓尚方禁少時嘗盗人妻見斫瘡著其頰博知以他事召見視其面果有瘢博辟左右問禁是何等瘡禁叩頭服状博笑曰大丈夫固時有是因親信以為耳目江表傳曰孫策殺呉郡守許貢貢奴客潜民間欲報讎策出獵卒遇三人即貢客也射策中頰後騎尋至皆刺殺之王隠晋書曰大駕北伐城都王頴統王師於湯陰敗績上傷頰失六璽左右奔走三國典畧曰梁謝荅仁聞侯景奔乃自東陽率衆候之至錢塘問趙伯超曰公得何消息而閉門見拒伯超曰汝頰邉頗有耳否侯王已死逺近悉平君将此兵欲向何處荅仁曰審如公言死無所恨淮南子曰厭􅀈音父在頰則好在顔則醜王子年拾遺録曰孫和月下舞水精如意悞傷鄧夫人頰血流死彌苦及差而滅左頰有赤㸃如誌廹而視之更益其妍也諸嬖欲寵者皆以丹脂㸃頰而後進幸唐子曰人多逺見百歩而不自知眉頰蒋齊萬機語曰許子将褒貶不平以㧞樊子昭而抑許文休劉􅁮曰子昭發自賈䜿年至耳順退能守静進能不苟濟荅曰子昭誠自長幼完潔然觀其揺牙樹頰自非文休敵也世説曰郄公遭永嘉䘮亂窮餒鄉人共餉之公嘗攜兄子外生周翼二小兒往食鄉人曰各自窮餒以君之賢共存君耳恐不能兼餉公於是獨往食輙含飯著兩頰還吐與二小兒後並得存過江公亡翼時為􅀈縣解職歸席苫于公靈床頭心䘮三年鼻釋名曰鼻嘒也出氣嘒嘒也公羊傳㒗公曰邾婁人執鄫子用之社盖即其鼻以血社也孝經援神契曰伏羲山凖禹虎鼻史記范睢傳曰蔡澤遊學干諸侯小大甚衆不遇而從唐舉相熟視而笑曰先生曷鼻巨肩魋顔蹙齃膝攣吾聞聖人不相殆先生乎戰國策曰蘇子南使齊謂齊王曰臣聞當世之主必誅暴正亂今宋王射天笞地鑄諸侯之象使侍屏匽展其臂彈其鼻此天下無道而王弗伐王名終不成矣魏志曰管輅舉秀才何晏請曰試為我作一卦知位當至三公否又連夣青蝇數十來集鼻上驅之不去輅曰鼻者天中之山髙而不危所以長守貴也今青蝇臭惡而集之位峻者亡願君侯上追文王六爻之㫖下思尼父彖象之義然後三公可决青蝇可驅晋書曰謝安石本能為洛下書生詠有鼻疾故其音濁名流愛其詠而不能及或掩鼻以斆之又曰王澄在荆州北左右捧士人宗廞别駕郭舒厲色謂左右曰使君過醉汝軰何敢妄動澄恚遣搯其鼻炙其眉崔鴻十六國春秋後趙録曰王謨字思賢甕鼻言不清暢尫短無威儀将拜曲陽令勒疑之問長史張賓賓曰請試可不勒從之由是政教嚴明百城尤最出為都部從事守宰去官者十五人唐書曰薛舉每破陣所獲士卒皆殺之殺人多㫁舌割鼻荘子曰野人堊墁於鼻端若蟬翼使㫁之匠運斤成風堊盡而鼻不傷列子曰夏禹蛇身人面牛首虎鼻而有大聖之徳孟子曰西子䝉不潔則人皆掩鼻而過之韓子曰魏王遺楚美女楚王悦之夫人鄭袖謂新人曰王甚愛子然惡子鼻見王常掩鼻則王長幸子於是新人從之王謂夫人曰新人見寡人常掩鼻何對曰言惡聞王口臭王怒甚因劓之淮南子曰東方人隆鼻山海經曰一臂國人一鼻孔論衡曰鼻不知臭為齆人不知是非為閉又曰蘇秦骨鼻為六國相大𤣥經曰割鼻飴口䘮其息主列士傳曰干将子赤鼻列女傳曰梁髙行者梁之寡婦榮於色敏於行早寡不嫁梁貴人爭欲取之不能得梁王聞使聘焉乃援鏡操刀以割鼻曰妾所以不死者不忍幼嗣之重孤也刑餘之人始可釋矣王髙其節敬其行號曰梁髙行又曰沛國孫去病妻同郡共載元世女夫死母欲嫁之操刀割鼻刀鈍不入趍于石上礪之鼻然後㫁郡表其閭又曰梁郡夏文珪妻沛國劉景賔女亦割鼻自誓不嫁列女傳曰吳孫竒妻者廣陵范慎女名姬十八配奇亡慎以姬少寡無子迎還家其姬不肯迎者以父命廹之姬遂操刀割其鼻三輔故事曰衛太子嶽鼻太子來省疾至甘泉宫江充告太子勿入陛下有詔惡太子鼻嶽尚以紙蔽其鼻充語武帝曰太子不欲聞陛下膿臭故蔽鼻武帝怒太子太子走還崔寔政論曰秦割國之君劓殺其民於是赭衣塞路有鼻者醜故百姓鳥驚獸駭不知所歸命王湛别傳曰王處冲身長八尺龍頰大鼻世説曰初謝安在東山居布衣時兄弟有富貴者劉夫人戱謂安曰大丈夫不當如此謝乃促鼻曰但恐不免耳又曰石崇家造厠令婢以盤擎棗與厠人塞鼻又曰康僧淵目深而鼻髙王丞每嘲之僧淵曰鼻者靣之山山不髙則不靈談藪曰宋廢帝常入武帝廟指其畫像曰此渠不好色不擇尊卑顧謂左右渠大鼻如何不齇即令畫工齇又曰齊世祖之征也潁川有皇甫王淵者善相人見其容止竊議曰此不作大物㑹是垂涕洟者謂太原公洋也崔元瀨鄉記曰老子鼻雙柱養生經曰鼻者心之門頞説文曰頞鼻莖也釋名曰頞鞍也偃折如鞍也史記曰唐舉謂蔡澤曰先生魋顔蹙齃殆不相乎後漢書曰周爕字伯彦初生顩頥折頞醜甚母欲棄之其父不聼曰吾聞賢聖多有異興我宗者乃此於是寶之吳書曰諸葛恪字元遜瑾長子少知名少鬚眉折頞廣顙荘子曰髑髏深頻蹙頞曰豈能捨南面王樂而為人生哉吕氏春秋曰文王好食昌葅孔子蹙頞而食之楊雄解嘲曰蔡澤山東匹夫也顩頥折頞涕唾流沫口説文曰口者人之所以言食釋名曰口空也禮曰曽子謂子思曰伋吾執親之䘮也水漿不入於口者七日又曰晋人謂趙文子知人文子其中退然如不勝衣中身也退和柔貌其言呐呐然如不出諸其口又玉藻曰口容止不妄動也又少儀曰燕侍食於君子數噍毋為口容口容弄口又祭義曰惡言不出於口又緇衣曰小人溺於水君子溺於口口費而煩易出難悔易以溺人言口多空言且煩數過言一出駟馬不能及不可得悔也口舌所覆亦如溺也傳曰鄭伯使許大夫百里奉許叔以居許東偏曰寡人有弟不能和恊而使餬其口於四方其况能乆有許乎又曰口不道忠信之言為嚚又曰子玉使伯棼請戰曰非敢必有功也願以間執讒慝之口又曰晏子曰君民者豈以陵民社稷是主臣君者豈為口實社稷是養言君不徒居民上臣不徒求禄皆為社稷又曰正考父佐戴武佐三命滋益恭故其鼎銘云一命而僂再命而傴三命而俯饘於是粥於是以餬余口又曰費無極言於楚子曰建與伍奢将以方城之外叛王執伍奢使城父司馬奮陽殺太子未至而使遣之知太子寃故遣令去太子建奔宋王召奮陽奮陽使城父人執己以至王曰言出於余口入於爾耳誰告建也詩正月曰好言自口莠言自口莠醜也又十月之交曰無罪無辜讒口囂囂書序曰濟南伏生年過九十失其本經口以傳授又曰大禹謨曰惟口出好興戎朕言不再好謂賞善戎謂伐惡言口榮辱之主又盤庚上曰相時憸民猶胥顧於箴言其發有逸口言憸利小人尚相顧於箴悔之言恐其言發動有逸口之患也又説命曰惟口起羞易説卦曰兑為口論語公冶長篇或曰雍也仁而不侫子曰禦人以口給屢憎於人又陽貨曰惡利口之覆邦家者公子翬謟于隠公謂隠公曰百姓安子諸侯説子盍終為君矣隠公曰否使脩菟裘吾将老焉公子翬恐若其言聞於桓於是謂桓公曰吾為子口隠矣孝經援神契曰舜大口又曰孔子海口言若含擇論語擇輔像曰子貢斗星繞口南容升又曰太公大夫鼻有伏藏史記曰周厲王得衛巫使監謗者以告則殺之其謗鮮矣王喜告召公吾能弭謗矣召公曰是障之也防民之口甚於防水水壅而潰傷人必多民亦如之民之有口也猶土之有山川也財用於是乎出猶其有原隰衍沃也衣食於是乎生口之宣言也善敗於是乎興行善而備敗所以産財用衣食者也夫民慮之於心宣之於口成而行之若壅其口其與能幾何王不聼於是國人莫敢出言又曰季桓子受齊女樂三日不聼政又不致膰俎於大夫孔子遂行而師已送曰夫則非罪孔子曰吾歌可矣歌曰彼婦之口可以出走彼婦之謁可以死敗言婦人之口請謁是以憂使人死敗故可以出走也又曰鄧公曰吳王為反數年矣發怒於削地以誅晁錯為名其意非在錯也且恐天下之士口禁不復敢言漢書曰漢王擊魏豹謂酈食其曰魏大将者其人為誰曰柏直也漢王曰是口尚乳臭又曰髙祖欲廢太子周昌諌曰臣口不能言心知不可又曰良藥苦口利于病又曰張蒼免相後口無齒食乳女子為乳母又曰條候周亞夫相曰從理入口法餓死又曰揚雄口吃不能劇談又曰王莽為人哆口東觀漢記曰光武為人日角大口美鬚眉又曰明徳馬后身長七尺三寸青白色方口美髪後漢書曰馬援在交趾還書戒兄子曰龍伯髙敦厚周慎口無擇言謙約節儉廉公有威吾愛之重之應劭漢官儀曰侍中刀存年老口臭帝賜以鷄舌香令含之江表傳曰孫堅為下邳丞時孫權生而方頥大口目有精光堅異之以為貴相燕書曰申弼烈祖常從容問諸侍臣曰夫口以下動乃能制物鐵鑚為用亦噬嗑之意而從上下何也弼荅曰口之下動上使下也鐵鑚之用上斬下也烈祖稱善南史曰謝朏出為吳興郡守與弟瀹於虜諸送别朏指瀹口曰此中唯宜飲酒唐書曰郝處俊孫象賢垂拱中坐事伏法臨刑言多不順自此法司每将殺人也必先以木瓦塞口又曰杜黄裳性雅澹寛恕心雖從長口不忤物老子曰五味令人口爽管子曰桓公與管仲謀伐莒未發已聞於國東郭郵至公問之曰子言伐莒乎東郭曰君子善謀小人善意臣視二君在堂上口開不合言莒也荘子曰公孫龍口嗑而不合舌舉不下鬼谷子曰口者機開也所以開閉情意也又曰口可以食不可以言周生烈子曰口者言之門河圖曰秦始皇虎口日角陸賈新語曰衆口所毁浮石沉木羣邪相抑以曲為直説苑曰口者開也舌者機也出言不審駟馬不能追也吳越春秋曰越王勾踐入于呉呉王病大便太宰嚭奉溲惡以出勾踐嘗之後病口臭范蠡合左右食苓草以亂其氣曹瞞别傳曰操遨逰無度其叔數語操後行逄叔於道陽敗面為口云中暴風叔告其父父呼見之操面如故從此叔言不復入信操益得縱恣為正也杜如體論曰束脩之業其口在于不言諺曰口如鼻至老不失傅子曰擬金人銘作口銘云神以感通心由口宣福生有兆禍來有端情莫多妄口莫多言蟻孔僨河溜沉傾山病從口入禍從口出存亡之機開闔之術口與心謀安危之源樞機之發榮辱存焉王子年拾遺録曰昔伯禹入冗乃至一室裏一人身如蛇鱗于石上口吐一玉簡以受禹簡長十二寸以量度天地也又曰始皇二年謇消國善畫工者名烈裔口含丹墨噴壁即成龍雲之隊又曰沭胥國人年九萬嵗以口噴水為雨紛漫數十里俄而口吹為風而雨皆止瀬鄉記李母碑曰老子方口養生經曰軍營之中有甘泉注云軍營口也甘泉唾也又曰口為華池相書曰大容手赤如丹貴夀又曰欲知人多舌當視其口如鳥喙言語皆聚此多舌人也談藪曰梁髙祖重陳郡謝元暉詩常曰不讀謝詩三日覺口臭舌釋名曰舌洩也舒洩所當言也詩雨無正曰哀哉不能言匪舌是出維躬是瘁又曰瞻卬曰婦有長舌維厲之階又抑曰莫捫朕舌言不可逝矣論語顔淵曰子貢曰惜乎夫子之説君子也駟不及舌春秋元命苞曰舌之為言逹也陽立于三故舌在口中者長三寸象斗玉衡陰合有四故口論舌溢内者長四寸朱均曰玉衡三星也魁四星也孝經鉤命决曰仲尼舌理七重陳機授度史記曰平原君既已定從而歸至于趙曰今毛生以三寸之舌强于百萬之師又曰留侯曰今以三寸之舌為帝者師卦萬户位列侯此布衣之極于良足也又曰張儀常從楚相飲已而失璧門下意儀盗璧共執掠笞數百不服釋之其妻曰嘻子無讀書遊説安此辱乎張儀謂其妻曰視吾舌尚在否妻曰君舌在也儀曰足矣又曰郭解任俠有儒生侍使者坐客譽郭解生曰郭解專以奸犯法公何謂賢觧客聞之殺此生㫁其舌漢書曰蒯通謂韓信曰酈生一士伏軾掉三寸舌下齊七十城又曰東海公賔就斬王莽傳詣更始懸于宛市百姓共提擊之或切食其舌後漢書曰馬援與隗囂将楊廣書曰豈有知其無成而知但萎腇咋舌义手從族乎張璠漢記曰董卓於衆坐生斬人手足又鑿目截舌口百姓嗷嗷道路以目英雄記曰曹操與𤣥德宻言𤣥德泄與袁紹紹知操有圖國之意操自咋其舌流血以失言誡後世魏末傳曰諸葛誕殺樂綝有典農都尉數讒誕于是収而斬之罵曰卿坐舌先人以行攙其舌然後殺之攙音讒又楚金反㓨之也晋中興書曰温嶠宻啓肅祖陳王敦聞曰果為小物所欺乃募有能生得嶠者吾當手㧞其舌晋書曰鳩摩羅什年七嵗出家日誦千偈後死姚興依外國法焚屍薪滅形碎唯舌不爛沈約宋書曰南都王義宣生而舌短言澁唐書曰波斯國俗法有罪者火燒鐵灼其舌瘡白者為理瘡黒者為有罪燕丹子曰荆軻見燕太子太子曰田先生今無恙乎軻曰光送軻之時言太子戒以國事耻以丈夫而不可向軻吞舌而死郭子曰殷仲堪云三日不讀道徳論便覺舌本間强山海經曰反舌國其人反舌一日交説苑曰桓公飲管仲酒棄其半公問其故對曰臣聞酒入者舌出者身棄臣謂棄身不如棄酒又曰韓子問叔向曰剛與柔孰堅叔向曰臣年八十齒再落而舌尚存是知剛不如柔也楊子法言曰五常者帝王之筆舌寕有書不由筆言不由舌也捜神記曰永嘉中有天竺胡人能㫁舌先吐舌示賔客然後乃截血流覆地仍取置器中傳以示人取舌還合有頃如故桂陽先賢傳曰宋陽陵字遂文果而好義郡長汲府郡為州所誣章陵被掠考叅加五毒陵乃截舌以着盤中献之廷尉羣公咸共義之事得清理又曰臨武程桓少有才藝為九江主記掾府君為人所誣章桓被徵詣臺徐郎中委即詣州乞就考于格上㧞刀截舌郡事清理談藪曰潁川王偉有才學為侯景左僕射景敗被擒送江陵湘東王欲活之左右妬其才乃曰為作檄文繹視之大怒釘偉舌於柱養性經曰舌者和之侯也相書曰舌如絳赤者賢人也相書雜安曰吐舌及鼻三公也太平御覽卷三百六十七
