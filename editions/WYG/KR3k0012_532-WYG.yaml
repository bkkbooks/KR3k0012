body:
  text: 太平御覽卷五百三十二宋李昉等撰禮儀部十一社稷先農靈星社稷尚書禹貢曰海岱及淮惟徐州厥貢惟土五色王者封五色土為社稷建諸侯則各割其方土與之立社又召詔曰翌日戊午乃社于新邑牛一羊一豕各一尚書逸篇曰太稷惟松東社惟栢南社惟梓西社惟栗北社惟槐天子社廣五丈諸侯半之尚書曰湯既勝夏欲遷其社不可作夏社周書諸侯受命曰于周建大社于國中其壝東青土南赤土西白土北黒土中霤以黄土将建諸侯取方一面之土苴以白茅以土封之故曰列土毛詩閔予載芟曰春耕籍田而祈社稷也載芟載柞其耕澤澤又閔予曰良耜秋冬報社稷也畟畟良耜俶載南畝周禮地官曰大司徒之職設其社稷之壝而樹之田主各以其野之所宜木遂以名社與其野又地官上曰小司徒掌凡建國立其社稷又地官上封人曰封人設王之社稷壝為畿封而樹之又春官上大宗伯曰以血祭社稷又春官上小宗伯曰宗伯建國之神位右社稷而左宗廟又春官下喪祝曰喪祝掌勝國邑社稷之祝號以祭祀禱祠焉馬融曰所討國所封邑由立社稷凡卿大夫之喪掌事而斂飾棺焉又冬官曰匠人營國左祖右社面朝後市王宫所居也祖宗廟面由鄉也王宫當經之涂也禮記月令仲春擇元日命民社為祀社稷也春王祈農祥近春分前後戊元吉仲秋擇元日命人社賽秋成也元日秋分前後戊日又曲禮曰問國君之年長曰能従宗廟社稷之事㓜曰未能從宗廟社稷之事又檀弓曰衞獻公出反于衞及郊將班邑于従者而後入柳莊曰如皆守社稷則孰執羈靮而從如皆従則孰守社稷又郊特牲曰社祭而主因氣也君南鄉于北牖下荅因之義也又曰用甲用曰之始也天子太社必受露霜風雨以達天地之氣也是故喪國之社屋之不受天陽也薄社北牖使因眀也社所以神地之道也地載萬物天垂象取財于地取法于天是以尊天而親地也故教民美報焉家主中霤而國主社示木也中霤赤土神也唯為社事单出里唯為社田國人畢作唯社丘乗共粢盛所以報本反始也又祭法曰王為羣姓立社曰太社王自立社曰王社諸侯為百姓立社曰國社諸侯自為立社曰侯社大夫以下成羣立社曰置羣衆也大夫以下至庶人也大夫不得立社與氏族居百家以上則共立一社今之里社是也又祭義曰建國之神位右社稷而左宗廟禮記外傳曰社者五土之神也稷者百榖之神也天子為天下之人立社為太社壇方五丈諸侯為境内之民立社曰國社有王社侯社有天子諸侯社立社則私有禱禾也地之勢有禮生物各隨所冝九州之人各居其土食有利者各報祭之是位神地之道者籍田之後則告五穀将耕也五穀既登又報功也國以民為大人以食為大故建國君民先命立社也地廣穀多不可徧祭故于國城之内立壇祭之貎之也日用甲尊之也惟天子祭天地諸侯社稷而已又曰社樹各以其土所宜之木河東宜松周地宜栗社主用石石土中豎者天子親征則載社主行有罪者誅之于車前左傳僖公曰宋公使邾文公用鄫子于次雎之社欲以属東夷此水有妖神象夷皆祠之司馬子魚曰古者六畜不相為用小祀不用大牲而況敢用人乎祭祀以為人也民神之主也用人而祭其誰享之哉又襄四曰君民者豈以陵民社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之又昭七曰魏獻子問于蔡墨曰社稷五祀誰氏之五官也對曰少皡有四叔曰重曰該曰修曰熈寔能金木水能順其成性使重為勾芒該為蓐收修及熈為𤣥冥此其三祀也顓頊氏有子曰黎為融共工氏有子曰勾龍為土此其二祀也后土為社稷田政也有烈山氏之子曰柱為稷炎帝之世烈山氏也自夏以上祀之周棄亦為稷自商以來祀之商因也稷之功至湯浸祀周棄為稷也又定上曰且夫祝社稷之常𨽻也賤臣社稷不動祝不出境官之制也公羊傳隠公曰宋宣公謂繆公曰以吾愛與夷則不若愛汝以為社稷宗廟主則與夷不若汝葢終為君矣又莊公曰日有蝕之鼓用牲于社求于國之道也以朱絲縈社或曰脅之或曰為闇恐犯故縈也又僖公曰邾婁人執鄫子用之社葢以叩其鼻以血社稷也又哀公曰亳社災亳社者亡國之社亳社者先世亡國在魯境也社者封也為封土祀社也其言災何亡國之社掩其上而柴其下故火得燒之春秋潛潭巴曰里社鳴此里有聖人生其呴百姓歸之宋均注曰鳴則教令行若湯放桀也呴嗚之怒者論語八佾曰哀公問社于宰我宰我對曰夏后氏以松殷人以栢周人以栗曰使民戰栗孝經説曰社土地之主也地廣不可盡敬故封土為社以報公稷五穀之長也穀衆不可遍祀故主稷神祭之五經通義曰王社藉田中為千畆報公也文家右社稷左宗廟何文家握地而王地道長久得事宗廟以有社稷故右之也質家左社稷右宗廟皆有壇者飾也有木者土也生萬物莫善于木五經異義曰今民位社神為公社為上公非地祗也漢書郊祀志曰髙祖時天下已定詔御史令于豐治枌榆社常春以羊彘祠之也又郊祀志曰稷者百穀之主所以奉宗廟供粢盛人所食以生活也王者莫不尊重親祭自為之主禮如宗廟詩曰乃立冢土又曰㠯御田祖㠯祈甘雨禮記曰唯祭宗廟社稷為越紼而行事至漢興禮稍定已有官社未立官稷遂于官社後立官稷以夏禹配食官社后稷配食官稷稷種榖樹又曰陳平既娶張氏女資用益饒游道日廣里中社平為宰分肉甚均里父老曰陳孺子能為宰平曰使平得宰天下亦如此肉也又曰欒布吴軍時以功封為鄃侯復為燕相齊燕之間皆為立社號曰欒公社續漢書曰每月朔旦太史上其事立有司侍郎尚書見讀其令奉行其正所前後各一口皆牽羊酒至于社下以祭曰變割羊以同社用收曰變執事冠長冠衣单衣降領袖緑中衣絳朱袴以行禮如故事又曰建武一年立太社稷于雒陽在宗廟之左社稷之石皆方壇無屋有牆門而已二月及臘一嵗三祠皆置社稷太守今長侍祠牲用羊豚唯州所治有社無稷古者師行有載社主不載稷也晉書禮志曰前漢但置官社而無官稷王莽置官稷故漢至魏但太社有稷故常二社一稷後魏書曰天平四年四月七日帝神主既遷于太廟太社石主將遷于社宫禮官云應用幣中書侍郎裴伯茂時為祝文伯茂據故事太和中遷社髙祖用特不用幣遂以奏聞于時議者或引大禮遷廟幣令遷社冝不殊伯茂據尚書詔誥應用牲詔從之宋書禮志曰晉元帝建武元年又依洛京立二社一稷其大社之祝曰地徳普施惠存无疆乃建太社保佑萬邦悠悠四海咸賴嘉祥其社之祝曰坤徳厚載王畿是保乃建帝社以神地道明祀惟晨景福來造禮左宗廟右社稷厯代尊之故洛京社稷在廟之右而江左亦然又曰祠大社祭大稷春秋二社日祠之唐書曰天寳中升社稷五星為大祀詔曰祭之為典以陳至敬名或不正是相奪倫況社稷孚祐百代䝉其福日月照臨五星叶其紀兆庶允殖下土式瞻既超言象之外須極尊崇之禮列為中祀頗紊大猷自今以後社稷及日月五星并升為大祀仍以四時致祭六典曰仲春上戊祭大社以后土氏配焉祭大稷以后稷氏配焉家語云孔子曰古之平水土及播植百榖者衆矣然惟勾龍食于社而契為稷易代奉之無敢益者明不可與等也荘子曰㟪􅕲之民相與言曰桑庚子之始來吾洒然異之今吾日計之而不足嵗計之而有餘庶幾其聖人乎子胡不尸而祝之社而稷之乎又曰匠石之齊至乎曲轅見櫟社樹其大蔽牛絜之絜者匝也百圍其髙山臨千􅌇而後有校其可以為舟者旁十數觀者如市淮南子曰夫窮鄉之社扣瓮拊缾相和而歌自以為樂也嘗試為之擊鼓撞巨鐘乃知夫瓮缾之足羞也又曰禹勞力天下死而為社勞于治水公死祀于后土之中周棄作穡死而為稷種曰穡死祀稷宫之神文中子曰子房之智陳平之均絳侯勃之果霍將軍之勇文之以禮樂則可謂社稷之臣矣太公金匱曰武王問太公曰天下精神甚衆恐後復有試余者也何以待之師尚父曰請樹槐于王門内王路之石起面社築垣牆祭以酒脯食以犧牲尊之曰社客有非常先與之語客有益者人無益者距嵗告以水旱與澤流悉行除民所苦捜神記曰中宗初有應嫗者生四子而寡見神先照社試探之得黄金自是諸子官學並有才名劉氏京口記曰虎社村中父老相傳云曽有虎于社中産因以名荆州記曰葉縣東百步有縣故城西南四里名五百村有白榆連理樹異幹合條髙四丈餘士民奉以為社世説曰阮宣子伐樹人有止之宣子曰若樹而為壯伐樹則社移社而為樹伐樹則社亡矣習鑿齒逸民髙士傳曰董威輦不知何許人忽見于洛陽白社中戴延之西征記曰洛陽建春門外道北有白社董威輦所住也去門二里有牛馬市嵇公臨刑處也博物志曰子路與子貢過社社樹有烏子路摶鳥社神牽子路子貢說之乃止又曰周之正月受社牲之首以出種子帝藉蚕又受社雍及祭以沐蚕種上辛乃射黒牲于帝郊以祈來年之豐二月司空開冰射桃弧棘矢五發而御其容述異記曰庾邈與女子郭凝通詣社約不二心俱不婚嫁經二年凝忽暴亡邈出見凝云前北村還遇强梁抽刀見逼懼死従之不能守節為社神所責心痛而絶人鬼異路因下淚涔涔也蔡邕陳留東昏庫上里社碑曰惟斯庫上里古陽武之户牖鄉也秦時有池子華為丞相漢興陳平由此社宰遂相髙祖尅定天下為右丞相孝平之世虞延為太尉延熹中平曽孫放為尚書令以宰相繼踵咸出斯里雖有積徳脩身之政亦斯社所相乃樹碑云魏公九錫文曰錫君𤣥土苴以白茅爰契爾龜用建冡社注言亦如天子社稷也曹植賛社文曰余前封鄄城侯轉雍丘皆故荒土宅宇初造以府庫尚豐志在善公先務完圃而已農桑一無所營經離十載塊然守空飢寒偹嘗聖朝愍之故封此縣田則一州之膏腴桑則天下之甲苐故封此桑以為田社乃作頌云應璩與隂夏書曰従田來見南野之中有徒歩之士推而問之乃知郎君頃有微痾告祀社神將以祈福聞之悵然以増歎息虛社髙樹能有靈應哉張華朽社賦曰髙栢喬南大道傍有古社槐樹葢數百年木也余少居近之後去行路過之則以朽林意有緬燕聊為之言衰盛之理殷仲堪合社文曰夫社之為祀逺哉故大夫以成羣斯禱里社之興由來尚矣自喪亂流遷舊俗隳廢今二三宗親思桑梓之遺風尊先聖之眀誥潔哉牲牢庶乎自古以來一日之澤然三人之行必有其師故優選中正立三老者惟公里以御衆稽舊章以作憲白虎通曰所有社稷何為天下求福報功人非土不立非榖不受土地廣博不可遍敬五祀衆多不可一一而祭故封立社而示五尊榖之立稷而祀之祭而得隂陽和氣而為用又多故為長嵗再祭之又曰祭社稷者有樂乎禮記曰金石之樂用之于宗廟社稷又曰王者諸侯必有戒社何示存亡也明為善者得之而惡者失之春秋公羊傳曰亡國之社掩其上柴其下郊特牲記曰喪國之社屋之示與天絶也蔡邕獨㫁云天子大社五色土為壇皇子封為王者受之大社之土所以封之方籍以白茅歸國以立社故謂之茅社也陳留風俗傳曰東昏縣者位地故陽武之户牖鄉也漢相陳平家焉少為社下宰令民祀其社邴原别傳曰原避地遼東以虎為患自原之洛獨無虎患嘗行而得遺錢拾以繋樹枝比錢不見取繫錢日愈多原問其故荅者謂之社樹原惡其由已而成望犯乃辯之于是里中遂歛其錢以為社供里老為之誦曰邴君行仁洛邑無虎邴君行廉路樹為社列異傳曰大司馬河南陵㽔字聖卿少時病瘧逃社中有人呼社郎聖卿應曰諾起至户中人曰取此書去得素書一卷譴劾百鬼所劾輒効卞敬宗樂社序讃曰余門前有一社樹盤根䟽柯以非近世所植抗秀路左流隂庭宇莊周游道于商丘之木匠石辨才于曲轅之櫟由斯道觀之固可悟以微矣王廙春社櫟頌曰吉辰兮上戊明靈兮惟社百室兮必集祈祭兮樹下濯卵兮葅韮齧䔉兮擗鮓縹醪兮浮蟻交觴兮並坐氣和兮體適心怡兮志可何承天社頌曰社實隂祗稷惟容元率有方類協賛乾坤先農禮記月令曰孟春乃擇元辰天子親載耒耜置之車右率公卿諸侯大夫躬耕籍田續漢書祭祀志曰光武即位于鄗為壇營于鄗之陽營神五星及中宫星霤公先農風伯雨師四海四瀆名山大川之属漢舊儀志曰春日東耕于籍田官祠先農先農即神農炎帝矣祠以一牢百官皆從大賜三輔二百里孝悌力田三老布帛漢名臣奏曰黄瓊上言先王制典籍田有曰司徒咸戒司空除壇先除有五曰有協風主即齋宫享燕載耒誠重之也先農之禮所宜躬親以迎春和以致時風沈約宋書祭祀志曰元嘉二十一年常親躬乃立無壇于籍田為四丈為田出陛廣五尺外加將方十丈車駕來到司空大司農率方禮及衆執事質眀以一大中祝祭祭器用社稷器祠畢頒餘胙于奉祀者舊典先農皆都列於郊祭靈星周書作雒曰設兆于南郊以祀上帝配以后稷農星先王皆與食毛詩閔子曰絲衣繹賓尸也髙子曰靈星之尸也繹又祭也天子諸侯繹以祭之眀曰卿大夫曰賔尸與祭同漢書郊祀志曰髙祖時或言周興而邰立后稷之祠至今血食天子於是制詔御史其令天下立靈星祠左角曰天用則農祥也星見而祭之常嵗時祀以牢三輔舊紀曰漢靈星祠在長安城東十里淮南子曰人君之道其猶靈星之尸言照嘿端而受福也嵩髙山記曰漢孝武游登五岳遵是靈臺遂移祠置岳南郊上築作殿壇周圍立瓦屋行種松樹前五百步臨大道立兩石闕極髙大太平御覽卷五百三十二
