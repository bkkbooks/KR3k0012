body:
  text: 太平御覧卷九宋李昉等撰天部九風相風風易曰撓萬物者莫疾乎風又風以動之又風行天上小畜君子以懿文徳又巽為風又雲從龍風從虎又風行地上曰觀尚書金縢曰周公居東二年則罪人斯得于後公乃為詩以遺王名之曰䲭鴞王亦未敢誚公秋大熟未穫天大雷電以風禾盡偃大木斯㧞邦人大恐王與大夫盡弁以啓金縢之書乃得周公所自以為功代武王之說王執書以泣曰其勿穆􅁲昔公勤勞王家惟予冲人弗及知今天動威以彰周公之徳惟朕小子其新迎我國家禮亦宜之王出郊天乃雨反風禾則盡起又舜典曰納于大麓烈風雷雨弗迷又洪範休徴曰聖時風若咎徴曰蒙恒風若孔安國曰君能通理則時風順之君行蒙闇則恒風順之詩曰終風且曀終日而風為終風又大風有隧貪人敗類又習習谷風以隂以雨又凱風自南吹彼棘心南風謂之凱風又冬日烈烈飄風𤼵𤼵禮記月令曰秋行春令則煖風來至又立春之日東風觧凍又孟春行秋令則其民大疫猋風暴雨總至又孟夏行秋令則蟲蝗為灾暴風來格曲禮曰前有塵埃則載鳴鳶注鳶鳴則風生禮運注䟽曰饗帝於郊而百神受職謂風雨節寒暑時而無咎徴五帝主五行五行之氣和而庶徴得其序也左傳曰襄公十年楚侵鄭甚雨及之楚師多凍役徒幾盡晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競注曰歌者吹律以詠八風南風者㣲故曰不競師曠驟歌南北風者聼晉楚之強弱也又僖公十年春六鷁退飛過宋都風也又昭公四年申豐曰夫氷以風壯而以風出其藏之也周其用之也徧則冬無愆陽夏無伏隂春無凄風秋無苦雨今藏川池之氷棄而不用則風不越而殺爾雅曰祭風曰磔今俗當道中磔狗以止風此其象也又南風謂之凱風詩曰凱風自南東風謂之谷風詩曰習習谷風北風謂之凉風詩曰北風其凉西風謂之大風詩曰大風有隧焚輪謂之頽暴風從上下也扶揺謂之焱暴風從下上也風與火為庉庉庉熾盛之貌廻風為飄旋風日出而風為暴詩曰終風且暴風而雨土為霾詩曰終風且霾隂而為曀詩曰終風且曀又四時和平通正道平暢也謂之景風所以致景風也論語云曽㸃曰暮春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸又君子之徳風小人之徳草草上之風必偃又迅雷風烈必變易稽覧圖曰太平時隂陽和風雨咸同海内不偏地有險易故風有遲疾雖太平之政猶有不能均同也唯平均乃不鳴條易通卦驗曰冬至廣莫風至誅有罪㫁大刑立春條風至赦小罪出稽留春分明庶風至正封疆修田疇立夏清明風至出幣帛禮諸侯夏至景風至辨大將封有功立秋涼風至報土功祀四鄉秋分閶闔風至觧懸垂琴瑟不張立冬不周風至修宫室完邊城八風以時則隂陽正治道成萬物得以育生王當順八風行八政當八卦也京房易候曰何以知聖人隱也風清明其來長久不動揺物此有龍徳在下也易緯曰八節之風謂之八風立春條風至東北方風春分明庶風至東方風立夏清明風至東南方風夏至景風至南方風立秋涼風至西南方風秋分閶闔風至西方風立冬不周風至西北方風冬至廣莫風至北方風又吕氏春秋説八風東北曰焱風髙誘注曰亦曰融風東方曰弱風東南曰薫風南方曰巨風西方曰颼風西圵曰厲風北方曰寒風尚書大傳曰舜將禪禹八風循通又王者徳及皇天則祥風起又成王時越裳重譯而來朝曰久矣天之無烈風澍雨意中國有聖人乎大戴禮曰正月時有浚風浚者大也大風南風也何大於南風也曰合氷必於北風觧氷必於南風故大之也禮稽命徴曰出號令合民心則祥風至禮説曰風萌也養物成功所以八風象八卦也禮斗威儀曰人君政頌平則祥風至宋均注曰即景風也春秋考異郵曰八風殺生以節翺翔距冬至四十五日條風至條者達生也距猶起也自冬至後四十五日而立春此風應其方而来生萬物四十五日明庶風至明庶迎惠春分之後言庶衆也陽以施惠之恩徳迎衆物而生之四十五日清明風至精芒挫収立夏之後也挫猶止也時薺麥之属秀出已偹故挫止其鋒芒収之使成實四十五日景風至景風强也強以成之夏至之候也強言萬物強盛也四十五日涼風至凉風者寒以閇也立秋之候也閇収也言隂寒収成萬物也四十五日閶闔風至閶闔者當寒天収也秋収之候也閶闔盛也時盛収物盖藏之閶或為當四十五日不周風至不周者不交也隂陽未合化也立冬候也未合化言消息純坤無陽也月令曰天地不通而閉塞成冬也四十五日廣莫風至廣莫者精大滿也冬至之候也言冬物無見者風精大滿美無偏風之為言萌也其立字虫動於几中者為風虫動於几中言陽氣無不周也明昆虫之屬得陽乃生遇隂則死故風為隂中之陽者也春秋元命苞曰隂陽怒為風春秋繁露曰恩及金石則涼風出王者與臣無禮身不肅敬則木不曲直而夏多暴風風者木之氣其音角故應孝經援神契曰徳至八方則祥風至史記曰項王圍漢王三匝於是風從西北起折木發屋揚沙石楚軍大亂而漢王乃得與數十騎遁去又曰蚩尤氏能徴風召雨與黃帝争強帝滅之于冀又庶女者齊之寡婦飬姑姑女利母財而殺母以告寡婦婦不能自觧以寃告天而大風襲於齊殿又荆軻入秦燕太子丹送别易水上歌曰風蕭蕭兮易水寒壯士一去兮不復還漢書曰燕王都薊大風㧞宫中樹七圍已上十六株壊城樓後王誅又髙祖過沛擊筑自歌曰大風起兮雲飛揚威加海内兮歸故鄉魏志管輅傳曰輅過清河傀太守時大旱輅言樹上已有少女㣲風樹間又有隂鳥和鳴其雨應至矣果如其言晉書曰永和元年大風㧞栁樹百餘株若風從八方來者時王敦害刁協周顗等故風從横㧞樹非一處也又賈謐家數有妖異飄風吹其朝服上數百尺大虵出被中後果及禍晉陽秋曰袁宏為東郡守謝安執宏手授扇宏曰謹當奉揚仁風慰彼黎庶宋書曰明帝猜慮肥體憎風夏月常著小皮衣拜左右二人為司風令史風起方面輙先啓聞又宗慤字元幹徴士炳兄子也少時問慤所志答曰願乗長風破萬里浪前秦録曰術士蓋欽符堅召至長安因讌㑹以其惑衆将誅之酒酣将執欽欽化為旋風飛去前涼録曰永嘉五年抱罕令嚴羗妾産一龍一鷲鷲尋飛去龍十五日雷雨迎之大風吹㧞張掖郡大樹經宿還立趙録曰石勒時忽有旋風下屬地隱隱雷聲良久視之見大石神仙傳曰老子將去周而出關以升崑崙關令尹喜占風逆知當有神人來過乃掃道見老子老子知喜命應得道乃停關下以長生之事授之又葛元行過神廟乗車不下湏臾有大廻風逐元埃塵漲天元大怒曰小邪敢爾即舉手指風風便止益都耆舊傳曰蜀揚由善風雲占候文學令豐持雞酒以奉由時有客不言客去豐起欲取雞酒由止之曰向風吹削柿當有持雞酒來者度是二人豐曰實在外湏客去乃取爾王子年拾遺記曰伏羲坐於方壇之上聽八風之氣乃畫八卦又崑山有四靣風又有祛塵之風若衣服塵汙風至吹衣則淨又瀛洲時有香風泠然而来張袖受之則厯紀不歇著肌膚必軟滑十洲記曰南海中有炎洲洲上有風生獸形似狗青色状如狸以鐡椎捶其頭數十下乃死張口向風湏臾即起風土記曰南中六月則有東南長風風六月止俗號黃雀長風時海魚變為黄雀因為名也庾仲雍湘州記曰零陵山有石鷰遇風雨則飛雨止還化為石交州記曰風山在九真郡風門在山頂上常有風又風母出九徳縣風母似猿見人若慙而屈頸若打殺之得風還活南越志曰熈安間多􅄓音貝風􅄓者具四方之風也一曰懼風言怖懼也常以六七月興未至時三日雞犬為之不鳴大者或至七日小者一二日外國以為黒風盛宏之荆州記曰宜都佷山縣山有風穴張口大數尺名曰風井夏則風出冬則風入風出之時吹拂左右常淨如掃暑月經之凛然有衣裘想宜都山記曰袁山松以六月至此穴便思衣裘又沮陽縣黃竹山常肅肅有風名曰風門西京雜記曰董仲舒曰太平之世風不揺條開甲破萌而已老子曰飄風不終朝莊子曰列子御風而行泠然善也旬有五日而後返司馬彪曰列子鄭人列禦㓂也御近也泠然凉貌又北溟有魚其名曰鯤化而為鳥其名曰鵬摶扶揺而上者九萬里司馬彪曰扶揺上行風也風之積也不厚則其負大翼也無力故九萬里則風斯在下矣又大塊噫依界反氣名曰風是唯無作作則萬竅怒號而獨不聞之翏翏乎又湯之問棘也是已窮髪之北有㝠海者天池也有魚焉其廣數千里其名為鯤有鳥焉其名為鵬背若太山翼若垂天之雲摶扶揺羊角而上者九萬里扶揺羊角風也今旋風上如羝羊角也列子曰列子師老商氏友伯髙子盡二子之道乘風而歸管子曰吾不能以春風風人夏雨雨人吾道窮矣又夫兩堯不能相王兩桀不能相亡木雖蠧無疾風不折墻雖隟無大雨不壊淮南子曰物類之相應𤣥妙深㣲論辯不能觧故東風至而酒泛溢東風大風也酒泛清酌酒也米物下沈木味酸酸風入酒故酢而沉者沸盖物類相感也又烏鵲識嵗之多風去喬木而巢扶枝扶傍又禹沐滛雨櫛扶風扶風奔風又騰蛇雄鳴上風雌鳴下風而化成形又虎嘯而谷風至髙誘注曰虎陽獸也與風同類又人之精通於天故誅暴則多飄風抱朴子曰用兵之要雄風為急扶揺獨鹿之風大起軍中軍中必有反者風髙者道逺風下者道近風不鳴葉者十里鳴條揺枝百里大枝五百里仆大木千里折大木五千里三日三夕天下盡風二日二夕天下半風一日一夕萬里風列子曰夫獵葉之風不應八節吕氏春秋曰何謂八風東北風曰焱風一曰融風東方曰滔風一曰度風東南曰薫風一曰清明淮南子作景風南方曰巨風一曰凱風西南曰凄風淮南子作涼風西方曰颼風一曰閶闔西北方曰厲風一曰不周風風俗通曰風或清明來久長不揺樹木枝葉離地三二丈者此有龍徳在其下風或清明不及二三尺者此君子之風也又猛風曰颲音列涼風曰瀏音劉㣲風曰飉音遼小風曰颼音捜小風從孔來曰䫼呼穴反汲冡周書曰小暑之日温風至立秋之日涼風至又小暑之日温風不至國無寛教淮南萬畢術曰欲致疾風焚雞羽帝王世紀曰堯時厨中自生肉脯薄如翣揺則風生使食物寒而不臭名曰翣脯又舜彈五絃琴歌南風曰南風之薫兮可以觧吾民之愠兮括地圖曰鍾山之神名曰燭龍視為晝暝為夜吹為冬吁為夏息為風又奇肱民能為飛車從風逺行湯時西風吹奇肱車至於豫州湯破其車不以示民十年西風至乃復作車遣賜之去玉門四萬里黃帝風經曰調暢祥和天之喜氣也折揚奔厲天之怒氣也山海經曰灋嶽之山有獸其名曰山􅏈音暉其行如風若見則天下大風又大荒之中有山曰鞠陵于天有人名曰折丹神人處東極以出入風又符愓之山多怪風又大極山東有温水湯不可過也河圖帝通紀曰風者天之使六韜曰人主好田獵射弋則嵗多大風禾榖不實紂時如此陸機要覧曰列子御風常以立春歸于八荒立秋逰乎風穴是風至草木皆生去則揺落謂之離合風潜夫論曰排翣陣風揲沙擁河無禦也又黄帝夢大風吹天下塵土得風后以為相漢武帝秋風辭曰秋風起兮白雲飛草木揺落兮雁南歸汎樓船兮濟汾河横中流兮揚素波龍魚河圖曰風者天之使也荆山圖曰佷山縣山下有石牀傍生野薤人徃乞者神許則風吹偃其界隨偃而剪不得過越廣雅曰風伯謂之飛亷法訓曰利誘人猶飄風之加庶草也惟有直慎者然後不回春秋潜潭巴曰疾風㧞木䜛臣恣忠臣辱崔豹古今注曰武王伐紂大風折蓋太公因折蓋之形而制曲蓋養性經曰治身之道春避青風夏避赤風秋避白風冬避黒風鹽鐡論曰太平之時風不鳴條雨不破塊又林中多疾風富貴多䛕言樂動聲儀曰風氣者禮樂之使萬物之首也物非風不能成熟也風順則嵗美風暴則嵗惡國語曰海鳥曰爰居止於魯國東門之外臧文仲使國人祭之展禽曰今兹海島有灾乎夫廣川鳥獸恒知避其灾也是嵗也海多大風又飄風之末不能舉鴻毛又火見而清風戒寒清風至而脩城郭宫室物理論曰風者隂陽亂氣激發而起者也猶人之内氣因喜怒哀樂激越而𤼵也故春氣温其風温以和喜風也夏氣盛其風熛以怒怒風也秋氣勁其風清以凄清風也冬氣石其風慘以烈固風也此四正之風也又有四維之風東北明庶庶物出幽入明也東南融風其道以長也西南清涼百物備成也西北不周方潜藏也此八風方土異氣徐疾不同和平則慎違逆則凶非有使之者也氣積自然怒則飛沙揚礫𤼵屋㧞樹喜則不揺枝動草順物布氣天地之性自然之體也楚宋玉風賦曰楚襄王逰於蘭臺之宫宋玉景差侍有風颯然而至王乃披襟而當之曰快哉此風寡人所與庶人共者耶宋玉對曰此獨大王之風耳庶人安得而共之夫風生於地起於青蘋之末侵滛谿谷盛怒於土囊之口緣於太山之阿舞於松栢之下故其清涼雄風則飄忽升降乘凌髙城入於深宫徘徊於桂椒之間翺翔於激水之上獵蕙草離秦衡槩新夷被荑楊徜徉中庭北上玉堂躋於羅帷經於洞房故其風也清清泠泠愈病析酲𤼵明耳目寧體便人此所謂大王之雄風也夫庻人之風塕然起於窮巷之間動沙塸吹死灰此所謂庶人之雌風也楚辭曰光風轉蕙泛崇蘭些又嫋嫋兮秋風洞庭波兮木葉下相風崔豹古今注曰司風鳥夏禹所作王子年拾遺記曰帝與娥皇汎於海上以桂枝為表結芳茅為斾刻玉為鳩置於表端言知四時之候今之相風此遺像也晉書曰廢帝初即位有野雉集於相風後為桓温所廢沈約宋書輿服志曰案周禮辨載法物莫不詳究然無相風罼旄頭之屬此非古制明矣愚謂戰國並争師旅數出縣鳥之設務察風祲疑是秦制矣梁書曰長沙王懿孫孝儼字希莊射䇿甲科除秘書郎太子舍人從幸華林園於坐獻相風鳥華光殿景陽山等頌其文甚美帝深賞之晉令曰車駕出入相風已前侍御史令史淮南子曰故終身𨽻於人譬若綄之走風也綄音緩候風者也世所謂五兩述征記曰長安宫南靈臺上有相風銅鳥或云此鳥遇千里風乃動鄭𤣥相風賦曰昔之造相風者其知自然之極乎其達變通之理乎上稽天道陽精之運表以靈鳥物象其類下憑地體安貞之徳鎮以金虎𤣥成其氣風雲之應龍虎是從觀妙之徴神明所通夫能立成噐以占志吉凶之先見者莫精乎此乃構相風因象設形宛盤虎以為趾建脩竿之亭亭體正直而無撓度勁挺而不傾棲神鳥於竿首候祥風之來征張華相風賦曰太史候部有相風在西城上而作者弗為豈以其託處幽閒違衆特立無羽毛之飾而丹漆不為之容乎傅咸相風賦曰相風之賦蓋已多矣然辭義大同唯中書張令以太史相風獨無文飾故特賦之太僕寺丞武君賔樹一竹於前庭其上頗有樞機挿以雞毛于以占事知來與彼無異斯乃簡易之至有殊太史相風張氏之賦非其至者也籊籊竹竿在武之庭厥用自然既修且貞挿羽其首丹漆弗營經之營之不日而成庾闡揚都賦曰雲虎之門雙竿内啓祥烏司飈丹犀竟陛太平御覧卷九
