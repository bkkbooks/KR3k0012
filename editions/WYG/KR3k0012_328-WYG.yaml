body:
  text: 太平御覧卷三百二十八宋李昉等撰兵部五十九從軍羽書占候從軍詩曰伯也執殳為王前驅自伯之東首如飛蓬豈無膏沐誰適為容又曰鴇羽刺君子乆從征役不得養父母也肅肅鴇羽集于苞栩王事靡盬不能蓺稷黍漢書張良傳曰良多病未嘗特將兵長為畫䇿臣時從行後漢書曰周嘉字惠文仕郡為主簿王莽末羣盗入汝陽嘉從太守何敞討賊為流矢所中賊圍十重白刃交集嘉以身捍之曰嘉請以死贖君命後太守冦恂舉為孝亷拜侍郎引見問遭難之事詔嘉尚公主嘉稱不敢當梁書曰曹景宗為竟陵太守及帝起兵景宗聚衆率五服内子弟三百人從軍後魏書曰張兗字洪龍上谷漁陽人也好學有文才太祖為代王選為左長史决䇿幃幄太祖噐之禮遇優厚又曰韓茂從討平凉當茂所衝莫不應弦而殪由是世祖壯之張衮從太祖破賀訥登勿居山聚石為峰以記功徳命衮為文又曰竇代田從討平凉擊破赫連定得奚斤等世祖以定妻賜之詔斤膝行授酒扵代田勅斤曰全爾命者代田功也進爵長廣公隋書曰郭榮遼東之役以功進位左光禄大夫明年帝復事遼東榮以為中國疲敝萬乗不宜屢動乃言扵帝曰賊狄失禮臣下之事臣聞千鈞之弩不為鼷䑕發機豈有親辱大駕以臨小冦帝不納從軍攻遼東城榮親蒙矢石晝夜不釋甲胄王粲從軍詩曰下船登髙防草露沾我衣廻身赴牀寢此愁當告誰身服干戈事豈得念所私又曰從軍有苦樂但問所從誰所從神且武焉得乆勞師鮑明逺東武吟曰始隨張校尉召募到河源後逐李輕車廹虜近塞垣曹子建詩曰從軍度函谷馳馬過西京􅄞叔夜贈彦才入軍詩曰良馬既閑麗服有輝風馳電逝躡景追飛凌厲中原顧盼生姿陸機從軍行曰朝食不免胄夕息常負戈苦哉逺征人撫心悲如何薛瑩答華永先詩曰桴鼔常在側筆硯永欲捐卷袠不復開干戈以為懽劉義恭擬古詩曰束甲辭京洛負戈事烏孫後軍濟大河築壘黎陽屯旦聞羽檄飛夕見邊驛奔羽書史記曰齊使魯連為書以箭射城中遺燕將曰吾聞之智者不背時而棄利勇士不怯死以滅名忠臣不先身而後君廢忠滅名後代無稱非智也且吾聞效小節者不能行大威惡小耻者不能立榮名管仲曹沫二公者非不能行小節死小耻也以為殺身絶代功名不立非智也故業與王覇争流名與天壤相弊公其圗之燕將自殺漢書髙祖紀曰武臣自立為趙王沛令欲以沛應之恐有變欲誅蕭曹蕭曹恐踰城保髙祖乃書帛射城中與沛父老父老乃殺沛令開門迎髙祖後漢書曰隗囂檄告州郡言王莽之罪越楚之竹不足以書其惡魏志曰雲長圍行征南將軍曹仁於樊趙儼以議郎叅仁軍事儼謂軍將曰今賊獨盛我徒卒單少而仁隔絶不得同力將軍潰圍遣諜通仁使知外救以厲將士然後表裏俱發破之必矣諸將皆喜便作地道箭射飛書與仁消息晉書曰初安南将軍甘卓與左將軍隋王承書勸使固守當以兵出沔口斷王郭歸路則湘圍自解承荅其書畧曰足下若能卷甲電赴猶或有濟若其狐疑求我於枯魚之肆矣梁後畧曰己酉上自長沙寺移住天居寺是日敵人射書城内今者行兵不貪城隍土地不貪子女玉帛志存救弊濟此生民廣訪民人擇善而立梁朝士庶尚未相領解蟻聚窮城寂無求問尋此異卜良用疑惑又曰諸蘿率其下五百人棄大艦於鹿頭後湖以備水戰北軍聚而觀蘿乃掉艦向岸北軍引去蘿亦迴歸上乃射書北軍大開賞募有能迎賊師者封五千户侯賜絹萬疋占候孫子曰天者陰陽寒暑節制也謂順天行誅因陰陽四時剛柔之制故司馬法曰冬夏不興師所以兼受愛吾人若細雨米軍臨機必冇㨗迴風相觸道還而無功雲類羊群必走之道氣如驚鹿必敗之勢黒雲出壘赤氣臨軍皆敗之北若風飛炯此慶雲也必勝若霧非霧是泣軍也必敗是謂風雲之占其來乆矣孫子占曰三軍將行其旌旗從容以向前是為天送必亟擊之得其大將三軍將行其旌旗墊音店然若雨是為天霑其師失三軍將行旌旗亂於上東西南北無所主方其軍不還三軍將陣雨甚是為浴師勿用陣戰三軍將戰有雲其上而赤勿用陣先陣戰者莫復其迹三軍方行大風飄起於軍前右周絶軍其將亡右周中其師得粮左傳曰晉侯圍上陽問於卜偃曰何時克之對曰童謡云丙子之辰龍尾伏辰均服振振取虢之旗鶉之賁賁天䇿焞焞火中成軍虢公其奔其九月十月之交乎韓詩外傳曰武王伐紂將行兵軛折為三天雨三日不休武王懼召太公而問之曰紂未可伐乎太公曰不然軛折為三者軍當分為三也天雨三日者欲洒吾兵也後漢書曰韓遂屯美陽董卓與戰輙不利十一月夜有流星如火光長十餘丈照遂營中驢馬盡鳴咸以為不祥欲歸金城卓聞之喜明日乃與右扶風鮑鴻等并兵俱攻大破之斬首數千級又曰王尋王邑攻南陽積弩亂發矢下如雨城中負户而汲王鳯等乞降不許尋邑自以為功在漏刻意氣甚逸夜有流星墜雲中晝有雲氣如壊山當營而隕不及尺而散吏士皆厭伏續漢書曰雲如壊山所謂營頭之星也占曰營頭之所墜其下覆軍沒將血流千里晉書載記曰劉曜咸和三年曜夢三人金面丹唇東向逡廵不言而退拜而履其跡旦召公卿以下議之朝臣咸賀以為吉祥唯太史令任義進曰三者歴運統之極也人為震位王者之始次也金為兊位物衰落也唇丹不言事之畢也逡廵退讓退舎之道也而拜者屈服於人履跡而行慎勿出疆也東井秦分也五車趙分也秦兵必暴起亡主衆師留敗趙地逺至三年近至七八日應不願陛下思而防之曜大懼又曰石季龍攻張重華謝艾拒之艾建牙旗盟將士有西北風吹旌東南指曰風為令今旗指之天所賛也破之必矣軍次神鳥王擢與前鋒戰敗遁還河南還討叛虜斯骨貞萬餘落破之又天文志曰水與金合為變謀為兵夏入火白中上出破軍殺將又曰元興二年八月庚子太白犯嵗星在上將又曰永興二年四月丙子太白犯狼星占曰大兵起九月嵗星守東井占曰有兵井又秦分野是年苟師破公師蕃張方破苑陽王虓關西諸將攻河間王顒奔走東海王迎殺之永和十四年十二月慕容雋遂據臨漳盡有幽并青冀之地縁河諸將奔散河津隔絶又曰戊子月犯牽牛大星占曰牽牛天將也又曰義熈十四年十月癸巳熒惑入太㣲犯西蕃上將乃順行至左振門又曰辰星當出不出是謂擊卒兵大起在於房心間地動又曰凡有蝕五星其國皆主嵗以飢熒惑以亂鎮以弑太白以疆國戰辰星以女亂又曰辰星不出太白為客其出太白為主出而與太白不相從乃各出一方為格野雖有軍不戰隋書曰長孫晟以邊功授上開府儀同三司復遣還大利安撫新附仁夀元年晟表奏曰臣夜登城樓望見磧北有赤氣長百餘里皆如雨足下垂被地謹騐兵書此名灑血其下之國必且破上欲滅匈奴宜在今日詔楊素為行軍元帥晟為受降使者北伐二年軍次北河值賊帥思力候斤等領兵拒戰與大將軍梁黙擊走之轉戰六十餘里賊衆多降唐書曰武徳中淮南道行臺僕射輔公祐據丹陽反遣趙郡王恭為行軍元帥討之將發與諸將宴集命取水忽變為血在坐中皆失色恭舉止自若諭之曰禍福無門惟人自召自顧無負于物諸君何憂懼之深公祐惡積禍盈今承廟算以致討盆中之血乃公祐授首之徴遂盡歡而罷時人服其識度而能安衆竟平公祐焉又曰李晟之恢復京師也時熒惑守嵗乆之方退賔介或勸晟曰今熒惑已退皇家之利也可速出兵晟以天子外次人臣當死節垂象𤣥逺吾安知天道至是謂叅佐曰前者公勸晟出兵非敢拒也且軍士可用之不可使知之嘗聞五緯盈縮無凖懼復來守嵗則我軍不戰而自潰矣叅佐嘆服皆曰非所及也尋拜晟為司徒兼中書令三國典畧曰十一月癸未梁主閱戎於津陽門外立二城南為吳城北為虜城西北風甚急溥天昏暗旙旗南靡乃移虜軍度南城吳軍度北城以順風也俄而驟雨暴降梁主輕輦還宫至城而旁觀者怪之又曰太原郡王髙洋督兵攻王思政䧟於頴州遂入東魏先是長社夜聲如車騎從西北向北向城居二日黒風起於乾地吹水入城城壊風羊角而上又曰侯瑱敗王琳于梁山琳及蕭莊並奔于齊初東關水舟艦得通琳引合肥之衆相次而下瑱與琳合戰琳軍少却退保西岸及夕東北風大起吹其舟艦沒于沙中夜有流星墜于琳營及旦風静琳入浦脩船以鹿角繞岸不敢復出六韜曰周武王伐紂師至泥水牛頭山風雨甚疾旗鼔毁折王之驂乗惶震而死太公曰用兵者順天道未必吉逆之未必凶若失人事三軍敗亡且天道鬼神視之不見聽之不聞智將不廢而愚將拘之若乃好賢而能用舉是而得此則不㸔時日而事利不假卜筮而事吉不禱祝而福從遂命驅之前進周公曰令時宜太嵗龜灼凶卜筮不吉星變為灾請還師太公怒曰今紂刳比干囚箕子以飛亷為政伐之有何不可枯草朽骨安可知乎乃焚龜折蓍援枹而鼓率衆先渉河武王從之遂滅紂又曰從孤擊虛髙人無徐一女子當百夫風鳴氣者賊存在十里鳴條百里揺枝四百里雨霑衣裳者謂潤兵不霑者謂泣兵金氣自鳴及焦氣者軍疲也又曰武王使散宜生卜伐殷鑚龜龜不兆下占於地數蓍蓍交而折祖行之日雨輜車至軫行至之日幟折為三宜生曰二四凶不祥不可舉事太公進曰退非子之所及也聖人生天地之間承衰亂而起龜者枯骨蓍者折草何足以辨吉凶祖行之日雨輜車至軫是先濯甲兵也行之日幟折為三是軍分為三如斬紂之首吉也抱朴子曰晋太康二年京邑始亂三國舉兵攻長沙王人小民張昌反於荆州奉劉尼為漢主乃遣石氷擊定揚州屯於建業宋道衡說氷求為丹陽太守到郡發兵以攻氷召余為貯兵都尉余年二十見軍旅不得已而就之宋侯不用吾計數敗吾令宋侯從月建住華蓋下遂収合餘燼從吾計破石氷焉又曰凡戰觀雲如走鹿形者敗軍之氣也兵法秘訣曰鎮星所在之宿其國不可伐又彗星見大明臣下縱横民流亡無所食父子生離夫婦不相得四維有流星前如甕後如火光竟天如雷聲名曰天狗其下飢荒民疾疫羣臣死流星東北行名天罔天海之口必有大水土功又四維有流星入以後有白氣如雲狀似車輪是謂齧食其下大兵中國多盗賊又有星如鬭見斗北名為旬始天下大亂諸侯争雄𤣥女兵法曰凡行兵之道天地大寳得者全勝失者必負北斗之中禽有旬始狀像雄雞制百兵之母能得其術何神不使九地九天各有表裏三竒六合主威軍士又曰黄帝攻蚩尤三年城不下募求術士乃得伍骨與之言曰今日余攻蚩尤三年城不下其咎安在伍骨曰此城中之將為人必白色商音帝始攻時得無以秋之東方行乎今黄帝為人蒼色角音此雄軍也以戰為之黄帝曰善為之若何伍骨曰臣請攻蚩尤三日城必下黄帝大喜其中黄直曰帝積三年攻蚩尤而城不下今子欲以三日下之何以為明伍骨曰不如臣言請以軍法論黄帝曰子欲以何時臣請朱雀之日日正中時立赤色徴音絳衣之軍于南方以輔角軍臣請以青龍之日平旦時立青色角音青衣之軍于東方以輔羽軍臣請以𤣥武之日人定時立黒色羽音黒衣之將于北方以輔商軍臣請以白虎之日日入時立白色商音白衣之將于西方以輔宫軍四將以立臣請為帝以黄龍之日日中建黄旗于中央以制四方五軍已具西面攻蚩尤三日其城果下黄帝即封骨世世不絶又曰戰鬭之法當從九天之上擊九地之下衆士黙黙人無見者九天者春在青龍夏在朱雀秋在白虎冬在𤣥武四神為九天其衝為九地星占曰太白出髙用兵深入敢戰者吉星出東方中國大利蠻夷大敗兵書曰氣聚如龍如鵠尾其下兵軍破敗也太平御覽卷三百二十八
