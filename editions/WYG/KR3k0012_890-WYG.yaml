body:
  text: 太平御覽卷八百九十宋李昉等撰獸部二獬豸騶虞犀兕象獬豸說文曰獬豸似牛一角古者决訟命觸不直黄帝時有遺帝獬豸者帝問何食何處曰食薦春夏處水澤秋冬處竹箭松筠神異經曰東北荒中有獸如牛一角毛青四足似熊見人鬭則觸不直聞人論則咋不正名曰獬豸一名任法獸張華曰今御史法冠曰獬豸論衡曰獬豸者一角之羊性識有罪臯繇治獄有罪者令羊觸之臯繇敬羊跪坐事之田捄子曰堯時獲獬豸緝其尾以為帝帳酉陽雜爼曰開元二十一年京兆富平縣産一角神羊肉角當頂白毛上捧識者以獬豸名之騶虞說文曰白虎黑文尾長扵身食自死之肉名曰騶虞有忠信之徳不食人詩國風騶虞曰騶虞鵲巢之應也鵲巢化行則人倫既正朝廷既治天下純被文王之化則庶類蕃殖蒐田以時仁如騶虞則王道成也彼茁者葭一發五豝于嗟乎騶虞草木蟲魚疏曰騶虞獸白虎黑文尾長扵身不食生物不履生草君王有徳則見也尚書大傳曰文王因囚羑里散宜生詣林氏國取怪獸尾倍其身名曰騶虞以獻紂林氏國有珍獸大若虎五采畢具尾長於身名曰騶吾乗之日行千里晉書曰隆安中新野騶虞見宋書曰元嘉二十六年琅邪有白騶虞見二赤虎従之犀爾雅曰犀似豕郭璞注曰形似牛猪頭大腹卑脚有三蹄黑色三角一在鼻上者即食角也小而不橢好食棘東觀漢記曰章帝元和元年日南獻白雉白犀晉書曰溫嶠還武昌至牛渚磯云其水多怪物遂燬犀角而照之見竒形異状或乗車馬著赤衣者嶠其夜夢人曰與君幽明道别何意相照竹書紀年曰夷王獵於社林獲犀牛一以歸韓詩外傳曰太師南宫适至義渠得駭雞犀以獻紂戰國策曰張儀為秦破従連横説楚王楚遣百乗獻駭雞之犀夜光之璧扵秦王離騷曰淹芳芷扵腐臭棄駭雞扵筐箓范子計然曰犀角出南郡上價八千中三千下一千淮南萬畢術曰犀駭狐抱朴子曰通天犀角有白理如綎音線者盛米置羣雞中雞啄米至輙驚却故南人名為駭雞也得真角一尺以上刻為魚而衘以入水水常為開方三尺可得息氣水中以其角為义導者得毒藥以此擾之皆生白沫無復毒物則無沫起通天犀所以能殺毒也犀為物食百草之毒及衆木棘角嵗一解藏扵山中人以木如其角代之犀不覺後年輙復解山海經曰琴古之山多白犀蜀王本紀江水為害蜀守李氷作石犀五枚二枚在府中一在市橋下二在水中厭水精因曰石犀里也林邑經紀曰犀行過叢林不通便開口露齒前向直指棘林自開南州異物志曰髙州平縣巨海有大犀其出入有光水為之開劉攸期曰交州有犀角通天向水輙開南州異物志曰犀有特神者角有光耀白日視之如角夜暗之中理皆焠然光由中出望如火炬欲以知此角神異置之草野飛鳥走獸過皆驚昔行野中見一死人鳶鳥欲往啄之毎至其頭輒驚飛去怪而視之其頭中有犀簪近此角也晉郭璞犀贊曰犀之為狀形兼牛豕力無不傾呴無不靡以賄嬰災困乎角掎𫝊咸犀鉤銘曰世稱駭雞之犀有以此鉤見遺者為之銘獸曰元犀處自林麓食惟棘刺體兼五肉或有神異表露以角含精吐英望如華燭置之荒野禽獸莫觸南州異物志曰犀出九徳縣其毛如豕蹄有三甲頭如馬有三角鼻上角長額上角短兕爾雅曰兕似牛說文曰兕如野牛而青其皮堅厚可為鎧嶓冡之上其獸多兕詩曰我姑酌彼兕觥維以不永傷又曰匪兕匪虎率彼曠野又曰既張我弓既挾我矢殪此大兕春秋傳曰犀兕尚多棄田則那論語曰虎兕出扵柙是誰之過與國語曰平公射鴳不死使豎襄摶之失鴳公怒将殺之叔向聞之夕至扵朝君告之叔向曰君必殺之昔吾先君唐叔射兕扵徒林以為大甲以封於晉今君嗣吾先君唐叔射鴳不死搏之不得是揚吾君之恥也君其必速殺之勿令逺聞君忸怩顔厚乃趣舎之戰國策曰楚王遊扵雲夢結駟千乗旌旗蔽日野火之起若電兕虎之聲若雷霆有猛兕王彎弓而射發而殪笑曰樂矣今日之遊千秋萬嵗之後誰與樂此楚辭曰君王親發兮憚青兕吕氏春秋曰荆莊哀王獵於雲夢射隨兕中之申公子培刼王奪而殺之王怒曰何其暴而不敬也欲誅之左右諫乃止不出三月子培病亡楚與晉戰扵兩棠之地大勝賞有功者子培之弟請曰人有功扵軍旅臣之兄有功扵車下臣兄常讀故記曰殺隨兕者不出三月故臣兄懼而爭之果有病死王乃檢故記果有之遂賞子培弟也淮南子曰小國不鬭扵大國之間兩虎不鬭扵伏兕之旁論衡曰尚父伐紂渡孟津杖鉞呼曰蒼兕蒼兕按蒼兕水獸也善覆舟因令急渡蒼兕害汝河中有此獸時浮出一身九首人見之必能覆舟也謂之蒼兕西都賦曰狂兕觸蹷江賦曰水兕雷咆乎陽侯曹洪與魏文帝書曰若奔兕之逐魯縞未足以喻其易晉郭璞山海經圖贊曰兕維壮獸似牛青黑力無不傾自焚以革皮充武備角助文徳象春秋運斗樞曰瑤光之星散而為象爾雅曰南方之美者有梁山之犀象焉説文曰象長鼻牙南越之大獸三嵗一乳左傳襄四曰象有齒以焚其身賄也又定四曰呉伐楚鍼尹固與王同舟王使執燧象以奔呉師燒火燧繫象尾漢書大宛曰身毒國其人乗象以戰又漢書曰武帝元始二年南越獻馴象能拜隨人意呉志外國傳曰扶南王盤况少而雄傑聞山林有大象輙生捕取之教習乗騎諸國聞而伏之又吳書曰賀齊為新都郡太守孫權出祖道作樂舞象權謂齊曰今定天下都中國使殊俗貢珍狡獸率舞非君而誰也三國典畧曰周軍逼江陵梁人率步騎開枇杷門出戰初嶺南獻二象扵梁至是梁王被之以甲束刃扵鼻令崑崙奴馭之以戰楊忠射之二象反走隋書曰劉方授驩州道行軍總管經畧林邑大業元年正月軍至海口林邑王梵志遣兵守險方擊金鼓懼而潰既渡江行三十里賊乗巨象四面而至以弩射象象中瘡却蹂其陣王師力戰賊奔於柵因攻破之俘馘萬計唐書曰自永徽以來文單國累獻馴象凡三十有二皆豢扵禁中頗有善舞者以備元㑹充庭之餙及徳宗即位曰王者不尚異物不貴難得之貨今官用費而物性不得非宜也放扵荆山之陽又曰高宗時周澄國遣使上表云訶伽國有白象首垂四牙身運五足象之所至其土必豐既有威靈又弭災患力兼十象强制百人以水洗牙飲之愈疾請發兵迎取以獻之上謂侍臣曰夫作法於儉其弊猶奢作法於奢誰能制止故聖人越席以昭儉茅茨以誡奢書云珍禽竒獸不畜扵國方知無益之源不可不遏朕安用象令其逺獻乃勞其使而遣之山海經曰巴蛇食象帝王世紀曰舜塟蒼梧下有羣象為之耕又云禹塟㑹稽祠下有象耕田萬嵗厯曰成帝咸康六年臨邑王獻象一知跪拜文子云見象之牙知大扵牛吕氏春秋曰肉之美者旄象之約高誘注曰旄肉之美者吳錄地理經曰九真郡龎縣多象象生山中郡内及日南饒之江表傳曰孫權遣使詣闕獻馴象二頭魏太祖欲知其斤重咸莫能出其理時鄧王沖尚幼乃曰置象大船刻其水痕所至稱物以載之可知也太祖大恱即施行焉又曰魏文帝遣使扵吳求象牙羣以為非禮欲不與孫權勅付使者論衡曰象耕鳥耘虛言也五帝三皇皆有功徳何獨為舜禹也蒼梧多象之地㑹稽衆鳥所居象自蹈土鳥自食草土蹶草盡狀若耕耘也又曰夫十圍之牛為牧豎所驅長仞之象為越童所鈎無便故也蔣濟萬機論曰荘周婦死而歌曰通性命者以卑及尊死生不悼周不可論也夫象見子皮無逺近必泣周何忍哉博物志曰南海四象各有雌雄其一雌死有百餘日其雄塗土著身獨不飲食空草長史問其所以輙流淚若有哀狀晉諸公讚曰晉時南越致馴象扵臯澤中養之為作車黄門鼓吹數十人令越人騎之每正朝大㑹皆入充庭帝行則以象車導引以試橋梁後象以鼻擊害人有司啓之而殺象象泣血流地不敢動自後朝議以象無益扵事悉送還越萬震南州日南傳曰扶南王善射獵毎乗象三百頭従者四五千人異物志曰俗傳象牙嵗脫猶愛惜之掘地而藏之人欲取當作假牙濳徃易之覺則不藏沈懐逺南越志曰象牙長一丈餘脱其牙則深藏之削木代之可得不爾窮其土得乃已也異苑曰㑹稽張茂字偉康嘗夢大象以問萬推推曰當為大郡守而不能善終大象者大獸取諸其音獸者守也象以齒焚其身後必為人所殺茂永昌中為吳興太守值王敦問鼎執政不移敦遣沈充滅之而取其郡萬震南州異物志曰象之為獸形體特詭身倍數牛目不逾狶鼻為口役望頭若尾馴良承教聴言則跪素牙玉潔載籍所美服重致逺行如邱徙王韶之始興記曰伊水口有長沙廣十里有羣象野牛法顯記曰藍莫國王得佛一分舎利起塔塔傍有池池中有龍常守䕶此塔有羣象以鼻取水雜花香而來供養後魏書曰乾陀國好征戰有鬭象七百頭十人乗一象皆執兵仗象鼻縛刀以戰嶺表錄異曰廣之屬郡潮循州多野象潮循人或捕得象争食其鼻云肥脆尤堪作炙或云象肉有十二種象膽不附肝隨月轉在諸肉楚越之間象皆青黒唯西方拂菻大食多白象又雲南豪族家多蓄象負重致逺若中國之牛馬漢使至其國舞象餙以金勒皆合節奏乾符中占城獻馴象亦能蹈舞太平御覽卷八百九十
