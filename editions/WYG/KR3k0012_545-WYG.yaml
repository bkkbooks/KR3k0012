  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_545-1a, image: WYG0898/WYG0898-0081c.png}
body:
  text: 太平御覽卷五百四十五宋李昉等撰禮儀部二十四喪紀下禮記曽子問曰君薨而世子生如之何孔子曰卿大夫士從攝主北面於西階南變于朝夕哭位也攝主卿代君聽政者大祝禆冕執束帛升自西階盡等不升堂命毋哭將有事宜清淨祝聲三告曰某之子生敢告升奠幣于殯東几上哭降曾子問曰如已葬而世子生則如之何孔子曰大宰大宗從大祝而告於禰告生三月乃名於禰以名徧告及社稷宗廟山川又曰將冠子冠者至揖讓而入聞齊衰大功之喪如之何冠者賓及賛也孔子曰内喪則廢外喪則冠而不醴徹饌而埽即位而哭如冠者未至則廢又曰昏禮既納幣有吉日女之父母死則如之何吉日有娶女之日也孔子曰壻使人弔如壻之父母死則女之家亦使人弔父喪稱父母喪稱母各以其正嫡自相弔問禮之宜父母不在則稱伯父世母弔禮不廢也壻已𦵏壻之伯父致命女氏曰某之子有父母之喪不得嗣為兄弟嗣繼也使某致命女氏許諾而弗敢嫁禮也壻免喪女之父母使人請壻弗取而後嫁之禮也又曰大夫士有私喪可以除之矣而有君服焉其除之也如之何孔子曰有君喪服于身不敢私服又何除焉於是乎有過時而弗除也君之喪服除而後殷祭禮也謂主人也支子則否又曰君薨既殯而臣有父母之喪則如之何孔子曰歸居于家有殷事則之君所朝夕否曰君既啓而臣有父母之喪則如之何孔子曰歸哭而反送君曰君未殯而臣有父母之喪則如之何孔子曰歸殯反于君所有殷事則歸朝夕否又曰君出疆以三年之戒以椑從君薨其入如之何孔子曰共殯服則子麻弁絰疏衰菲杖棺柩未安不忍成服于外也布弁如爵弁而用也杖者為已病入自闕升自西階闕謂毁宫也柩毁宫而入異于生也如小斂則子免而從柩入自門升自阼階君大夫士一節也又雜記曰恤由之喪哀公使孺悲之孔子學士喪禮士喪禮於是乎書又曰士之子為大夫則其父母弗能主也使其子主之無子則為之置後凡主兄弟之喪雖疏亦虞之喪事虞相乃畢又曰姑姊妹其夫死而夫黨無兄弟使夫之族人主喪妻之黨雖親不主此謂姑姊妹而無子寡死夫若無族矣則前後家東西家無有則里尹主之又曰或問於曾子曰夫既遣而包其餘猶既食而裹其餘與言奠既奠而又包之是與人之食已而裹其餘将去何異君子寧為是乎言傷亷也曾子曰吾子不見大饗乎夫大饗既饗卷三牲之俎歸于賓館父母而賓客之所以為哀也又喪服小記曰大夫不主士之喪士之喪雖無主不敢以大夫為主士不攝大夫士攝大夫唯宗子又喪大記曰疾病内外皆埽為賓客将来問疾也疾困曰病也君大夫徹縣士去琴瑟寢東首於北牖下謂君来視之時也病者居北牖下或謂北墉下廢牀徹䙝衣加新衣體一人人始生在地去床庶其生氣復反徹䙝衣則所加者朝服也男女改服屬纊以俟絶氣唯哭先復復而後行死事君設大槃造冰焉大夫設夷槃造冰焉士併瓦槃無冰設牀䄠第有枕含一牀襲一牀遷尸于堂又一牀皆有枕席君大夫士一也始死遷尸于牀憮用斂衾去死衣小臣楔齒用角柶綴足用燕几君大夫士一也管人汲授御者御者差沐于堂上君沐粱大夫沐稷士沐粱甸人為垼于西牆下陶人出重鬲管人受沐乃煮之甸人取所徹廟之西北厞薪用爨之管人授御者沐乃沐沐用瓦槃挋用巾如他日小臣爪手剪須濡濯棄于坎又三年問曰三年之喪何也曰稱情而立文因以飾羣别親疏貴賤之節而弗可損益也故曰無易之道也稱其情而立文稱人情之輕重而制其禮也羣謂親之黨也無易徹不易也創鉅者其日久痛甚者其愈遲三年者稱情而立文所以為至痛極也又曰然則何以至期也言三年之義如此則何以至於期有除也期者謂為人後者為父母也曰至親以期斷言服之正雖至親皆期而除也是何也問服斷於期之義也曰天地則已易矣四時則已變矣其在天地之中者莫不更始焉是以象之也法此變易所以期也然則何以三年也言法此變易可以期也何乃三年為曰加隆焉爾也焉使倍之故再期也言於父母加隆其恩使倍期也焉語辭猶云所以也由九月以下何也曰焉使弗及也焉使其恩不若父母故三年以為隆緦小功以為殺期九月以為間上取象於天下取法於地中取則於人人之所以羣居和壹之理盡矣取象於天地謂法其變易也自三年以至緦皆嵗時之數也言既象天地又足以盡人聚居純厚之恩也左傳哀下曰越圍吳趙孟降於喪食趙孟襄子無恤時有父簡子之喪楚隆曰三年之喪親䁥之極也主又降之無乃有故乎楚隆襄子家臣趙孟曰黄池之役先主與吳王有質曰好惡同之今越圍吳嗣子不廢舊業而敵之嗣子襄子自謂欲敵越救吳非晉之所能及也吾是以為降論語陽貨曰宰我問三年之喪期已久矣君子三年不為禮禮必壞三年不為樂樂必崩舊穀既没新穀既升鑚燧改火期可已矣子曰食夫稻衣夫錦於女安乎曰安女安則為之夫君子之居喪食㫖不甘聞樂不樂居處不安故不為也今女安則為之宰我出子曰予之不仁也子生三年然後免於父母之懷夫三年之喪天下之通喪也予也有三年之愛於其父母乎言子之於父母欲報之恩昊天罔極而予也有三年之愛乎孝經援神契曰喪不過三年以期増倍五五二十五月義斷仁期十二月也再期二十五月也言期増倍則可矣復云二十五月者容有閏故曰期而復云二十五月也春秋曰閏月𦵏齊景公者數閏也示民有中緣喪絶惰再期萬物再終喪者惰逺逺追慕故因殺以絶家語曰孔子在衛司徒敬子卒夫子弔焉主人不哀夫子哭不盡聲而退蘧伯玉謂孔子曰衛國鄙俗不習喪禮煩我子辱相焉孔子許之掘中霤而浴中霤室中毁竈以綴足籠屍於牀及𦵏毁宗蠟行明不復有事于此綴足欲令不辟戾也毁宗廟之門而出行神之位在廟門之外出于大門及墓男子西面婦人東面既封而歸殷道也孔子行之子游問曰君子行禮不求變俗夫子變之矣孔子曰非此之謂也喪事則從其質而已矣又曰孔子之喪公西赤掌𦵏焉含以蔬米三俱蔬米粳米也禮記曰嘉蔬襲衣十有一稱加朝服一冠章服之冠佩象環徑五寸而綦組綬綦雜同色也棺四寸栢椁五寸飾棺廧置翣設披周也設崇殷也綢練設旐夏也按柩行加夹司官者也崇牙旗上色也綢練旌旗之扛𦵏乗車所建也旌旗之疏終緇布廣充幅長尋曰疏也兼用三王之禮所以尊師且備古也後漢書禮儀志曰登遐皇后詔三公與喪事百官皆衣白單衣白幘不冠閉城門宫門近臣中黄門持兵虎賁羽林中郎署皆嚴宿衛百官哭臨殿下是日夜下竹使符吿郡國二千石諸侯王竹使符到皆伏哭盡哀小斂如禮東園匠考工令奏東園秘器表裏洞赤虡文畫日月鳥龜龍虎連璧偃月牙檜梓宫如故事大斂於兩楹之間干寳晉記曰大鴻臚鄭黙有母喪既喪有司依常使還攝職黙固陳執久乃許之於是定令聴大臣得終喪焉宋書禮志曰鄭𤣥喪制二十七月而終學者多云得禮晉初用王肅議祥禫共月遂以為制江左以来唯晉朝施用縉紳之士猶多遵𤣥議齊書曰皇太子妃薨左衛將軍沈文季經為宫僚未詳服不正僉議曰漢魏已来宫僚先備臣隸之節具體在三既盡王豈無服昔庾翼喪妻王允猶勝府吏宜有小君之服況臣節之重宜依舊君之妻齊衰三月而除後周書曰𦵏文宣后妃奴氏於永固陵帝􅃝跣至陵所詔曰齊斬之情經籍垂訓近代沿革遂亡斯禮伏奉遺令既𦵏使除攀慕几筵情實未忍三年之喪達於天子古今無易之道王者之所常行但時有未諧不得全制軍國務重庶目聴朝縗之節居廬之禮率遵前典以申罔極百寮以下宜依遺令公卿上表固請俯就權制過𦵏即吉帝不許引古禮答之羣臣乃止於是遂申三年之制五服之内亦令依禮衡波傳曰宰我謂二年之喪日月既周更衣裳既造百鳥既變萬物既易黍稷既生朽者枯於期可矣顔淵曰人知其一莫知其他但知暴虎不知馮河鹿生三年其角乃墮子生三年而免父母之懐子雖美辯豈能破堯舜之法改禹湯之典更聖人之道除周公之禮改三年之喪不亦難哉父母者天崩地壊不亦宜乎荀氏家傳曰荀爽對䇿曰臣聞火生於木數其徳孝漢之諡帝稱孝其義取此也故漢制天下皆誦孝經選吏則舉孝亷蓋以孝務也夫親自盡孝之終也今二千石不得行三年喪非所以崇孝道而稱火徳也頃者漢嗣數之枝葉不繁其咎未必不由此往者文帝勞謙自約行過乎儉故有遺詔以日易月此所謂夷惠激俗當身而已非貫萬世為後嗣法者也太平御覽卷五百四十五
