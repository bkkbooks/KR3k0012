body:
  text: 太平御覽卷五百六十九宋李昉等撰樂部七優倡滛樂優倡春秋元命苞曰翼星主南宫之羽儀文物聲明之所豐茂為樂庫為天倡先王以賓於四門而列天庭之衛主俳倡近太㣲而為尊家語曰魯定公與齊侯㑹於郏谷孔子攝相事齊奏宫中之樂優倡侏儒戱於前孔子趨進曰匹夫而熒侮諸侯有罪應誅於是斬侏儒手足異處齊侯懼有慙色史記曰優旃者秦侏儒也善為笑言然合於道秦始皇時置酒而天雨陛楯者沾寒優旃見而哀之謂之曰汝欲休乎陛楯者曰幸甚優旃曰吾即呼汝汝即應曰諾殿上上夀呼萬嵗旃大呼曰陛楯郎郎曰諾優旃曰汝雖長何益故雨中立我雖短也故休居於是乎使得半相代史記曰秦昭王臨朝歎息應侯進曰臣聞主憂臣辱主辱臣死今王中朝而憂臣敢請其罪王曰吾聞楚之鐡劍利而倡優拙夫鐵劍利則士勇倡優拙則思慮逺夫以逺思慮而御勇士恐楚國之圖秦也漢書曰枚皋善為賦不如相如又言為賦乃俳見視如倡自悔類倡者也又曰孝惠帝塟安陵徙闗東倡優樂人五千戶以為陵邑潘安仁闗中記曰善為啁戯故語稱安陵啁也又曰張禹成就弟子為人恭謹尤著者淮陽彭宣至大司空沛郡戴崇至少府宣為人恭儉有法度而崇愷悌多智二人異行禹嘗置酒設樂與弟子娯將崇入後堂飲食婦人相對作優管絃鏗鏘極樂昏夜乃罷而宣之来禹見之於便坐講論經義日晏賜食不過一肉巵酒相對宣未嘗得至後堂晉成帝咸康七年散騎常侍顧臻表曰宋代之樂設禮外之觀逆行連倒四海朝覲言觀帝庭而足以蹈天道以履地紀反天地之順傷彛倫之大乃命大常悉罷之其後復髙絙紫鹿又有天臺山伎齊武帝遣主事董仲民按孫興公賦造作莓苔石橋道士捫翠屏之狀尋省焉後魏書曰太武既平河西得西凉樂至魏周之際遂謂之國伎魏代至隋咸重之其曲湏琵琶監箜篌之徒並出自西域非華夏舊器楊澤新聲神白馬之類生於故歌非漢魏遺曲故其樂聲調悉與書史不同其歌曲有永代國語改焉樂解曲有萬代豐曲有千寘佛曲工人平上幘緋褶白舞一人方舞四人白舞令闕方舞四人假髻玉支釵紫絲布褶白大口袴五采接袖烏皮鞾後魏道武帝天興六年冬詔太樂總章鼔吹増修雜戯造五兵角抵麒麟鳳凰仙人長蛇白象武及諸畏獸魚龍辟邪鹿馬仙車髙絙百尺長趫幢跳丸以偹百戯大饗設之於殿前明元帝初又増修之撰合大曲更為鐘鼔之節北齊神武平中山有魚龍爛漫倡優侏儒山車巨象㧞井種𤓰殺馬剥驢等竒怪異端百有餘物名為百戯隋書曰文帝開皇初周齊百戯並放遣之煬帝大業二年突厥染干来朝帝欲誇之縂追四方散樂大集東都初於華林苑積翠池側帝帷宫女觀之有舎利繩柱等如漢故事又為夏育扛鼎取車輪石臼大盆器等各於掌上而跳㺯之并二人戴竿其上舞忽然騰透而換易千變萬化曠古莫儔染干大駭之自是皆於太常教習每嵗正月萬國来朝留至十五日於端門外建國門内綿亘八里列為戯塲百官起棚夹路從昏逹曙以縱觀之至晦而罷伎人皆衣錦綉繒綵其歌者多為婦人服鳴環珮飾以花髦者殆三萬人初課京兆河南製此服而西京繒錦為之中虛六年諸夷大獻方物突厥􅀈人以下皆國主親来朝乃賀於天津街盛陳百戯自海内凡有伎藝無不總萃崇侈器翫盛飾衣服皆用珠翠金銀錦羅絺繡其營費鉅萬闗西以安徳王雄總之東都以齊王􅌔總之金石匏革之聲聞數十里外彈弦擫管以上萬八千人大列炬火光燭天地百戯之盛振古無比自是每年以為常焉大抵散樂雜戯多幻術皆出西域始以善幻人至中國漢安帝時天竺獻伎能自㫁手足刳剔腸胃自是歴代有之趙書曰石勒叅軍周延為舘陶令㫁官絹數百疋下獄以八議宥之後每大㑹使俳優着介幘黄絹單衣優問汝為何官在我輩中曰我本為舘陶令抖擻單衣曰政坐取是故入汝輩中以為笑列女傳曰夏桀既棄禮義滛於婦人求四方美人積之後宫於俳優侏儒而為竒偉戯者取之於房造爛熳之樂漢宫典職曰正旦天子幸徳陽殿作九賔樂舍利從東来戯於庭畢入殿門激水化成比目魚跳躍潄水作霧障日畢化成黄龍髙丈八出水遊戯於庭炫燿日光以二丈絲繫兩柱中頭間相去數丈兩倡女對舞行於繩上又蹐局屈身藏形斗中鐘鼔並倡樂畢作魚龍曼延黄門鼓吹三通賈誼連語曰衛侯喜鶴鶴有飾以文綉而乗軒者賦歛繁多不顧其民貴優而輕大臣羣臣或諌則面叱之及翟伐衛㓂挟城堞矣衛君泣而拜其民曰冦廹矣士民其逸之士民曰亦使君之貴優將君之愛鶴以君守戰矣我儕棄人也安能戰乃潰門而出走翟入衛君奔死遂喪其國梁元帝纂要曰古艶曲有北里靡靡激楚結風陽阿之曲又有百戯起於秦漢有魚龍曼延假作獸以戯髙絙鳯凰安息五案並為李能所作見鄴中記都盧尋橦今之縁竿見西京賦九劍九一名鈴見西京賦戯車山車興雲動雷見李龍平樂觀賦跟挂腹旋並縁竿所作見傅𤣥西都賦吞刀見西京賦吐火見西京賦激水轉石潄霧扛鼎並見李龍長樂觀及傳𤣥西都賦象人見漢書韋昭曰今之假面怪獸舎利之戯並見西京賦列子曰宋有孫子者以妓干宋元君以雙枝長倍其身屬其踵並趨並馳㺯七劍迭而躍之五劍常在空中元帝大驚立賜金帛又有蘭子能鷰戯者復以干元君元君大怒曰昔以異伎干寡人伎無用遇寡人歡心彼必聞此而進乃拘而戮之鷰戯者若絶倒伎也石虎鄴中記曰虎正㑹殿前作樂高絙龍魚鳳凰安息五案之屬莫不畢偹有額上縁橦至上鳥飛左迴右轉又以橦着口齒上亦如之設馬車立木橦其車上長二丈橦頭安橦木兩伎兒各坐木一頭或鳥飛或倒掛又衣伎兒作獼猴之形走馬上或在脇或在馬頭或在馬尾馬走如故名為猨騎樂府雜録曰㺯叅軍始因後漢舘陶令石躭有贜穢和帝惜其才免罪每宴樂即令衣白夹衫命優伶戯㺯辱之經年乃放後為叅軍誤也開元中有李仙鶴善此戯明皇特授韶州同正叅軍以食其幹是以陸鴻漸撰詞云韶州盖由此大周正樂曰漢武帝通西域始以善幻人至中國安帝時天竺獻伎能自㫁手足刳腹胸自是歴世有之唐髙宗惡其驚俗勅西域闗津不令入中國唐書樂志曰睿宗時婆羅門樂人倒行而足舞乃仰植刀鋒於地低因就刄厯臉下復植于背吹觱篥立其腹上終曲而無傷又伏伸其手人躡之旋身遶手百轉無已漢世有橦木伎又有盤舞晉世加之以杯盤舞舞詩云妍細􅇒七盤言舞用盤七枚也梁謂之盤舞伎梁又有長蹻伎跳鈴伎擲倒跳劍伎吞劍伎今並存又有舞輪伎盖今之戯車輪者透三峡伎盖今之透飛梯之類高絙伎盖今之戯繩者是也梁有獼猴幢戯今有縁竿伎又獼猴縁竿未審何者為是今又有㺯椀珠伎㺯丹朱伎歌舞戯有大面撥頭蹋揺娘傀儡子等戯置教坊於禁中以處之又曰散樂非部伍之聲俳優歌舞雜奏漢天子臨軒設樂舎利獸從西方来戯於殿前激水成比目魚跳躍潄水作霧障日化成黄龍修丈八風出水遊戯煇熠日光繩繫兩柱相去數丈二倡女對舞繩上切肩而不傾如是雜變總名百戯江東猶有髙絙紫鹿跂行鱉食齊王卷衣笮䑕夏育扛鼎巨象行乳神龜抃足背負靈嶽桂樹白雪畫地成川之伎明皇雜録曰上御勤政樓大張聲樂羅列百伎時教坊有王大娘善戴百尺竿竿上施木山狀瀛洲方丈仍令小兒持絳節出入其間而舞不輟時劉晏為秘書省正字年方幼小形狀獰劣而惠悟過人上召於樓上簾下貴妃置於膝為施粉黛與之巾櫛上令詠王大娘戴竿晏應聲曰樓前百戯競争新惟有長竿妙入神誰謂綺羅翻有力猶是嫌輕更着人因命牙笏及黄紋袍以賜晏時有公孫大娘者善劍舞能為隣里曲及裴將軍士謂之春秋設大張伎樂雖小大優劣不同而極其華侈遐方僻郡歡縱亦然樂府雜録曰大曲出於北齊齊蘭陵王長恭才武而貎美嘗着假面以對敵常擊周師金墉下勇冠三軍齊人壯之為此聲以効其指撝擊刺之容俗為之蘭陵王入陣曲滛樂左傳曰煩手滛聲惂堙心耳乃忘和平謂之鄭聲許慎五經異義曰鄭國有溱洧之水男女聚㑹謳歌相感今詩二十一篇婦人者一十九故鄭聲滛也又云鄭重之音使人滛過也又曰惠王三年邉伯石遫蒍國出王立子頺王處於鄭三年子頺飲三大夫酒子國為客子國蒍國客上客樂及徧舞徧舞六代之樂一曰諸大夫徧舞鄭厲公見虢叔厲公鄭莊公之子厲公突也虢叔王卿士虢林父也曰吾聞之司冦行戮君為之不舉不舉樂也而况敢樂禍乎今吾聞子頺歌舞不思憂夫出王而代其位禍孰大焉臨禍忘憂是謂樂禍禍必及之盍納王乎虢叔許諾鄭伯將王自圉門入虢叔自北門入二門王城門殺子頺及大夫王乃入禮記曰姦聲亂色不留聰明滛樂慝禮不接心術又曰姦聲感人而逆氣應之逆氣成象而淫樂興焉又曰作竒伎滛巧以蕩上心者殺無赦又曰鄭音好濫滛志宋音燕女溺志衛音趨數煩志齊音傲僻驕志此四者滛於色而害於徳論語曰惡紫之奪朱也惡鄭聲之亂雅樂也包曰鄭聲滛聲之哀者漢書曰王莽初獻新樂於明堂太廟羣臣始冠麟韋之弁或聞其樂聲曰厲而哀非興國之聲也宋書曰廢帝元徽五年太樂雅鄭共千有餘人后堂雜伎不在其數裴子野宋畧曰先王作樂崇徳以格神人通天下之至和節羣生之流放於天子達於士庶未曽去其樂而無非僻之心及周道衰㣲日失其序亂俗先之以怨怒國亡從之以哀思擾雜子女蕩悦滛心充庭廣奏則以魚龍靡漫為環瑋㑹同享覲則以吴趨椘舞為妖妍纎羅霧縠侈其衣踈金縷玉砥其器在上班揚寵臣羣下亦從風而靡王侯將相歌妓填室鴻商富賈舞女成羣競相誇大致有争奪如恐不及莫為禁令傷風敗俗莫不在此隋書曰裴藴煬帝徴為太常少卿初髙祖不好聲妓遣牛𢎞定樂非正聲清商及七部四舞之色皆罷遣從臣至是揣知帝意奏括天下周齊梁陳樂家子弟皆為樂户其六品已下至於民庶有善音樂及倡優百戯者皆直太常是後異伎滛聲咸萃樂府皆置􅀶士弟子逓相教傳増益樂人至三萬餘國語曰平公既作新聲新聲師涓所聽者也師曠曰公室其將卑乎君之萌兆衰矣樂以開山川之風輝德於廣逺也風德以廣之風德者德各有風類也作樂各象其德韶夏濩武之謂也風山川以逺之所樂以通山川之風類以逺其德也風物以聽之修詩以詠之修禮以節之夫德廣逺而有節是以逺服而邇不遷説苑曰子路鼓瑟有北鄙之聲孔子聞之曰信矣由之不才也冉有侍孔子曰求来爾奚不謂由夫先王之制音也奏中聲為中節彼小人則不然執末以論本務剛以為基故其音湫厲而㣲末以象殺伐之氣夫殺者乃亂世之風也冉有以告子路子路曰由之罪也後果不得其死焉淮南子曰揚鄭衛之浩樂結激楚之遺風此齊人之所以滛泳流湎也吕氏春秋曰音樂之所由来逺故唯得道之人其可與言樂乎亡國戮民非無樂也其樂不樂溺水者非不笑也溺人必笑雖笑不樂罪人非不歌也當死强歌歌不樂也亂世之樂有似於此夫樂有適心亦有過人之情欲夀而惡夭欲安而惡危欲榮而惡辱欲逸而惡勞四欲得四惡除除則心適矣又曰楚之衰也作為巫音髙誘注曰男曰雞女曰巫桓譚新論曰夫不剪之茨不如阿房之宫不琢之椽不如磨礱之桷𤣥酒不如蒼梧之醇控掲不如流鄭之樂樂説曰聲放散則政荒崔氏云由君上驕逸則萬物荒散商聲歌散邪官不理政壞刑罰不法而威令不行角聲憂愁為政虐民民怨故也民不安業猶君失政徴聲哀苦事煩民勞君滛佚崔氏云由君邪民苦於役羽聲傾危則國不安崔氏賦徭重其民困財物匱梁元帝纂要云古艶曲有比里靡靡激楚流風陽阿之曲皆非正聲之樂也流風亦曰結風也唐㑹要曰調露元年太子使樂工於東宫新作寳慶之曲成命工者奏於太清觀始平縣令李嗣真謂道士劉槩輔儼曰此樂宫商不和君臣相阻之徴也角徴失位父子不恊之兆也殺聲既多哀聲又苦若國家無事太子受其咎矣數月太子廢又曰咸通中伶官李可乆善音律尤能轉喉為新聲音辭曲折聼者忘倦京師屠沽少年効之謂之拍彈時同昌公主除喪懿宗與郭淑妃悼念不已可乆為歎百年舞曲舞人皆盛飾珠翠仍畫魚龍地衣以列之曲終樂闋珠翠覆地詞語悽惻聞者流涕又常於國安寺作菩薩蠻舞上益憐之可乆常為子娶婦帝賜酒二銀罇啓之乃金翠也時宰相曹確中尉西門季𤣥屢論之懿宗不納至僖宗即位宰相崔彦昭奏遂死於嶺表開元傳信記曰唐開元末年涼州進新曲上命諸王於便殿觀之曲終諸王皆稱萬嵗獨寜王不賀𤣥宗徴其故寧曰此曲雖嘉臣有聞焉夫曲者始於宫散於商武於角徴羽莫不根柢嚢括在於宫商也臣見此曲宫離而少徴商亂而加暴夫宫者君也商者臣也宫不勝則君體卑商有餘則臣事僣臣恐異日臣有悖亂之事陛下有播越之禍莫不兆於斯曲也洎禄山南犯𤣥宗西幸方明寜王審音之妙也大業記曰安公子是隋煬帝將幸江都宫中所撰時樂工笛中吹此曲其父疾廢於卧内聞泫然流涕問其子何得此曲對曰宫中新翻也謂其子曰宫者君也此曲雖在羽調後有一宫聲往而不返大駕東廵必不回耳可託疾勿去其精如此太平御覽卷五百六十九
