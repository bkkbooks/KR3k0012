body:
  text: 太平御覽卷三百十三宋李昉等撰兵部四十四决戰下决戰下隋書曰文帝遣將賀若弼伐陳後主令大將軍魯廣逹陳兵白土岡居衆軍之南偏鎮東大將軍任忠次之䕶軍樊毅都官尚書孔範又次之侍中車騎大將軍蕭摩訶軍最居北衆軍南北亘二十里首尾進退各不相知賀若弼初謂來戰將輕騎登山觀視形勢及見衆因馳下置陣廣逹首率所部進薄弼軍屢却俄而復振更分突諸將孔範出戰於郊而走諸將支離陣猶未合騎卒潰散禁之弗止因而大敗又曰楊義臣拜朔州總管漢王諒作亂并州時代州總管李景為漢王將喬鍾葵所圍詔義臣救之義臣率馬步二萬夜出西徑遲明行數十里鍾葵覘見義臣兵少悉衆拒之鍾葵亞將王㧞驍勇善用矟射之者不能中將軍楊思恩請當之義臣見思恩氣貌雄勇顧之曰壯士也賜以巵酒思恩望見㧞立於陣後投觴於地䇿馬赴之徃不克義臣選騎士十餘人從之思恩遂突擊殺數人直至㧞麾下短兵方接所從騎士退思恩為㧞所殺㧞遂乗之義臣軍北十餘里又曰煬帝征高麗隋大將宇文述與九軍過鴨綠水又東注薩水去高麗平壤城三十里因山為營高麗國相乙支文徳遣使偽降請述曰遂旋師者奉其主高元朝行在所述見士卒疲弊不可復戰又平壤險固卒難致力遂因其詐而還半濟賊擊後軍於是大潰不可禁止九軍敗績一日一夜還至鴨綠水行四五十里初度遼九軍三十萬人還至遼東城惟二千七百人唐書曰太宗嘗謂羣臣曰朕自興兵每執金鼔必自指揮習觀其陣即知強弱常以吾弱對其強以吾強對其弱敵犯吾弱追奔不踰百數十步吾擊其弱必突過其陣自背而反擊之無不潰多用此而制勝思得其理深也又曰武徳中李靖隨河間王孝恭討蕭銑於江陵不從靖謀致敗賊委舟大掠人皆負重靖見其兵亂進兵擊之賊大敗又乗勝進入其郛郭攻其水城克之悉取其舟楫散於江中賊救兵見之謂城已䧟莫敢輕進銑内外阻絶城中擕貳由是懼而出降又曰光宅初武太后臨朝稱制徐敬業於揚州起兵以匡復皇家為辭月餘致精卒數萬太后遣將軍孝逸領兵討之敬業率軍拒於下阿溪方成列敬業謂其徒曰自知衣甲非厚者居後衆乃爭退孝逸之師因其動譟而奔擊乃大破焉又曰建中初田悅反以兵圍臨淄及邢州詔以李晟為神䇿先鋒都知兵馬使與河東節度使馬燧昭義軍節度使李抱真合兵救臨淄尋加兼御史中丞河東昭義軍攻楊朝光於臨淄南晟與河東騎將李自良奉詔擊悅於雙岡悅兵却遂斬朝光戰于臨淄諸軍皆却晟引軍渡淄水乗氷而濟横擊悅諸軍復振擊悅大破敗悅於洹水以功加檢校左散騎常侍實封百户又曰徳宗以李晟兼魏府左司馬居無何朱滔王武俊皆反聨兵救田悅悅深壁不戰以老王師時武俊遣兵圍康日知於趙州晟乃獻狀請觧趙州圍因合義武節度使張孝忠以軍圗范陽上大壯之乃加御史大夫俾禁兵將軍莫仁擢趙光銑杜季批皆𨽻焉晟乃自魏州直趨趙州賊觧圍而去晟留趙州三日與義武合軍而北畧恒州圍朱滔將鄭景濟於清苑決水灌之田悅朱滔王武俊皆遣兵來救戰於白樓賊犯義武義武軍却晟引步騎數百擊破之景濟所乗馬連中流矢踰月城中益急滔武俊大懼乃自魏縣悉兵來救復圍晟軍晟内圍景濟外與滔等拒戰日數合自正月至于五月㑹晟病甚不知人諸將相與合謀乃扶晟於馬引軍還定州賊不敢逼三國典畧曰後周軍圍晉陽齊人望之如黑雲四合高延宗勝兵四萬人嬰城布陣躬與齊王憲交兵自申至酉死者甚衆帝逐北入城當天門頓營焚佛寺光燭天地延宗率衆排軍向前我軍遂却人相蹂死者頗衆齊人欲閉門以閫下積屍扉不得闔帝從數騎﨑嶇危險僅得出門侍臣殱焉唯左侍上士庫狄嶔侍從時四更也延宗以帝多鬚使於積尸之下求之不得士卒既勝乃入坊飲延宗不復能整頓之帝出城飢甚將謀遁免開府宇文忻進曰陛下乗勝至此今者破竹之勢已成奈何棄之而去㑹延宗使開府段暢以千人擊帝暢以衆降盛言城内空虛更無繼援帝乃駐馬召兵旗鼔復振攻三門尅之延宗率衆苦戰尸骸塞路辰時力屈率騎走出城北於人家擒之延宗見帝自投於地帝欲執其手固辭曰死人手也恐逼至尊帝強執之曰兩國天子有何怨惡直為百姓而來耳勿怖終不殺又曰齊師伐梁遂至于鍾山龍尾周文育請戰陳覇先曰兵不逆風文育曰事急矣當决之何用古法抽槊上馬殺傷數百人齊軍乃移營于幕府山又曰侯景次于渦陽有車數千兩馬數千匹甲士四萬人慕容紹宗戎卒十萬旗甲耀日方軌長驅鳴鼓並進景使謂之曰公等為欲送客為欲定雌雄紹宗對曰當與公决勝負遂順風以陣景閉其壘風止乃出紹宗曰侯景多詐好掩人背咸宜備之景果令入陣者皆短兵但斫人脛及馬足東魏軍大敗紹宗墜馬又曰陳覇先衆軍自覆舟東移頓郊壇北齊人相對侯安都謂蕭摩訶曰卿驍勇有名千聞不如一見摩訶對曰今日令公見矣命衆軍秣馬蓐食遲明攻之侯安都墮馬被圍摩訶獨騎大呼直衝齊軍披靡安都乃免覇先乃自率其麾下出幕府山南吳明徹沈㤗等衆軍首尾擊之齊軍大潰自相蹂藉壅川塞谷莊子曰惠子見戴晉人曰有所謂蝸者君知之乎曰然有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏時相與爭地而戰伏尸數萬逐北旬有五日而後返誠知所爭者若此之細則天下無爭矣尸子曰廟戰者帝神化者王廟戰者法天道也神化者明四時也列子曰黄帝與炎帝戰于版泉之野率熊羆狼貙虎豹前驅鵰鶡鷹鳶為旗幟此以力使禽戰也孟子曰爭地以戰殺人盈野爭城以戰殺人盈城此所謂率土地而食人肉罪不容於死六韜曰以少擊衆必以日之暮以衆擊衆必以日之早穰苴兵法曰以戰出戰雖戰可也戰春不東秋不西月食還師所以止戰也古司馬兵法曰凡軍使法在巳曰專無不畏法曰法軍無小聽戰無小利小聽謂輕聽敵人稱其虛弱危敗易勝以喜士衆沮備預也小利謂輕敵人誘於利數為戰也又曰凡五兵長以衛短短以救長更戰則乆皆戰則強更迭也孫子曰兵以詐立以利動以分合變者也兵之分合以敵為變兵法詭詐以利動敵心令離為變化之術也故其疾如風言進退機變其徐如林不見利不前也如林森然不亂之謂侵掠如火喻其猛烈之勢不可止遏也不動如山如山喻鎮静之形不可揺撼也難知如隂難知如天之隂雲不知列宿之象動如雷霆盛猛疾撃不知所避故太公曰疾雷不及掩耳疾雷不及瞑目也指嚮分衆因敵而制勝也旌旗之所指向則分吾師衆也先知迂直之計者勝此軍争之法也又曰形人而我無形則我專而敵分我形一敵形十也我專為一敵分為十是以十攻其一也我見敵形審其虛實故所備者少專為一屯以我之專撃彼之散卒為十撃其一也則我衆而敵寡我專為一故衆敵分為十故寡能以衆敵寡者則吾之所與戰者約矣言約少而易勝吾所與戰之地不可知言舉動㣲宻不可使彼知吾所舉知吾所集也不可知則敵所備者多敵所備者多則吾所與戰者寡矣形藏故不測則分用其衆以備我少則易撃故也故備前則後寡備後則前寡備左則右寡備右則左寡無不備者無不寡言敵之所備者多則士卒無不分散而少寡者備人者也敵分散而少皆先備人者也衆者使人備己者也敵以多備己者由我分其衆散故也故知戰之地知戰之日則可千里而㑹戰以度量而知也先知戰地之形又知戰之日則可千里期㑹先往以待之若敵已先至不可以勞師夫善戰必知戰之日知戰之地度道設計分軍禦敵近者先進逺者後發千里之㑹同時而合若㑹都市其㑹地之日無令知之則所備處多備寡則專備多則分分則力散専則力并也不知戰地不知戰日則左不能救右右不能救左前不能救後後不能救前而况逺者數十里近者數里乎敵已先據形勢之地已方趨利欲戰則左右前後感疑進退不能相救况數十里之間也又曰善用兵者譬如率然率然者常山之蛇也撃其首則尾至撃其尾則首至撃其中則首尾俱至又曰夜戰多火鼔晝戰多旌旗所以變人之耳目也三軍可奪氣將軍可奪心是故朝氣鋭晝氣惰暮氣歸善用兵者避其銳氣擊其惰歸也又曰勝者之兵先勝而後求戰敗者之兵先戰而後求勝又曰圍地則謀死地則戰疾戰則存不疾戰則亡者為死地吳子曰用兵之道先明四輕二重使地輕馬使馬輕車使車輕人使人輕戰鋒鋭甲堅則人輕戰呂氏春秋曰趙氏攻中山中山之多力者五丘鳩衣鐵甲操鐵杖以戰所擊無不碎所衝無不陷以車投車以人投人又曰趙簡子攻衛自將兵及戰且逺立又居於犀櫓之下鼔之而士不起簡子投桴而嘆曰嗚呼士之弊一若此乎行人燭過免冑横戈而進曰君不能耳士何弊之有簡子艴然作色曰寡人之無使而身自將是衆也子親謂寡人無能有說則可無說則死對曰昔吾先君獻公即位五年兼國十九用此士也惠公即位二年淫色暴嫚身好玉女秦人襲我以至于敗用此士也文公即位二年底之以勇三年而士盡果敢城濮之戰五敗荆人圍衛取曹㧞石社定天子之位成尊名於天下用此士也君不能耳士何弊之有簡子乃去犀蔽屏櫓而立矢石之所一鼔而士畢乗之簡子曰與吾得革車千乗也不如聞行人燭過之一言行人燭過可謂能諫其君矣又曰昔楚共王與晉厲公戰於鄢陵楚師敗共王傷臨戰司馬子反渴而求飲竪陽榖操參酒而進之子反曰訾退酒也竪陽榖曰非酒子反曰訾退却竪陽榖又曰非酒也子反受而飲之子反性嗜酒甘而不能絶於口醉戰既罷共王欲復戰而謀使召子反子反辭以心疾共王駕而徃視之入幄中聞酒臭而還曰今日之戰不榖親侍所恃者司馬也而司馬又若此是忘荆國之社稷而不恤吾衆不榖無與商戰矣於是罷師去之斬司馬子反以為狥故竪陽榖之進酒也非以醉子反也其心以忠也而適足殺之故曰小忠大忠之敗也又曰齊與晉戰平阿之餘子亡㦸得矛退而去不自快謂路之人曰亡㦸得矛可以歸乎路之人曰㦸兵也矛亦兵也何為不可以歸餘子猶不自快也遇高堂之孤叔無孫叔姓無孫名平阿餘子當其馬前曰今者戰亡㦸得矛可以歸乎叔孫曰矛非㦸也㦸非矛也亡㦸得矛豈無責也哉平阿餘子曰嘻還反戰趨尚及之遂戰而死又曰吳起謂商文曰馬與人敵在前援桴一鼔三軍之士樂死若生子與我孰賢商文曰吾不如子淮南子曰昔晉文公將與楚戰城濮問於舅犯曰為之柰何舅犯曰仁義之軍不厭忠信戰陣之戎不厭詐偽君其詐之而已問雍季雍季對曰焚林而獵獸雖多獸必無獸以詐偽愚人雖厚利必無利其正之而已矣於是不聴雍季之計而用舅犯之謀與楚人戰大破之還賞有功者先雍季或問之文公言曰舅犯之言一時之權也雍季之言萬世之利也吾豈可以一時之權而先萬世之利哉又曰敵潰而走後必可移敵廹而不動名之曰奄遲擊之如雷霆斬之若草木燿之若火電欲疾以速人不及步車不及轉轂兵如植木弩如羊角人雖衆多勢莫敢格春秋感精符曰強傑並侵兵雷合龍門溺驂宋均曰龍門魯門也時與宋齊戰敗血溺驂馬也賈誼新書曰黄帝行道炎帝不聽故戰於涿鹿之野血流漂杵三輔􅃇事曰武帝發兵攻衛太子連鬬五日白虎門前溝中血流没足列女傳曰湯受命而伐桀戰于鳴條桀師敗湯遂放桀桀與妹喜嬖妾同舟浮海死於南巢之山諸葛亮兵法曰山陵之戰不仰其高水上之戰不逆其流草上之戰不渉其深平地之戰不逆其虛此兵之利也故戰鬭之利唯氣形也衛公兵法曰凢事有形同而勢異者亦有勢同而形異者若順其可則一舉而功濟如從未可則蹔動而必敗故孫臏曰計者因其勢而利道之兵法曰百里趨利則蹶上將五十里而趨利者軍半至善動敵者形之而敵從之與之而敵取之以行動之以本待之此戰勢之要術也若我士卒以齊法令以行竒正以設置陣以定誓衆已畢上下已怒天時已應地利已據鼔角以振風勢以順敵人雖衆其奈我何哉譬虎之有牙犀之有角身不蔽捍手無寸刃而欲搏之勢不可觸其亦明矣故兵有三勢一曰氣勢二曰地勢三曰因勢若將勇輕敵士卒樂戰三軍之衆志厲青雲氣等天風聲如雷霆此謂氣勢也若關山狹路大阜深澗龍蛇蟠隂羊腸狗門一夫守險千人不過此謂地勢也若因敵怠慢勞役饑渴號令不一將吏縱横前營未舍後軍半濟此謂因勢也若遇此勢當潜我形出其不意用竒設伏乗勢取勝是以良將用兵審其機勢而用之仍須鼔而怒之感而勇之賞而勸之激而揚之若鷙之攫獸之搏必脩其牙距仗力而下逺則氣衰而不及近則形見而不得故良將之戰必正其三軍礪其鋒甲設其竒伏量其形勢逺則力疲而不及近則敵知而不應若不通此機乃智不及于鳥獸亦何能取勝于勍㓂乎仍須怒士鼔衆使之奮勇故能無強陣于前無堅城于外以弱勝強必然勢也揚子雲長楊賦曰高祖奉命順斗極運天關横巨海漂崑崙提劍而叱之潘安仁西征賦曰追皇駕而驟戰望玉輅而縱鏑潘安仁射雉賦曰若夫多疑少决膽劣心捐内無固守出不交戰謝𤣥睴詩曰炎靈劍遺王當塗駭龍戰李少卿荅蘇武書曰疲兵再戰以一當千陸士衡辨亡論曰我陸公挫之西陵覆師敗績因而後濟絶命永安續以濡須之㓂臨川摧鋭蓬籠之戰隻輪不返太平御覽卷三百十三
