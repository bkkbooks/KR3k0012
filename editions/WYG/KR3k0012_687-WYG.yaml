  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_687-1a, image: WYG0899/WYG0899-0164a.png}
body:
  text: 太平御覽卷六百八十七宋李昉等撰服章部四幘㡌巾接離障日幘釋名曰幘賾也下齊眉賾然也楊雄方言曰覆髻謂之幘巾或謂之承露或謂之覆􅀢皆趙魏之間通語也應劭漢官儀曰幘古卑賤執事不冠者之所服也徐廣輿服雜注曰天子郊廟則黒介幘漢書曰武帝從館陶公主飲董偃緑㡌傅韝仗殿下乃贊曰館陶公主庖人臣偃昧死再拜謁後漢書曰劉盆子探得符後棄之復還依俠卿為制絳單衣半頭赤幘幘巾所以覆髻也續漢書曰童子幘無屋示未成人也半頭幘即空頂幘也其上無屋故以為名董仲舒繁露曰以赤統者幘尚赤盆子承漢統故用赤也東宫故事曰太子有空頂幘一枚即半頭幘之制也東觀漢記曰光武初興與諸季市弓弩絳衣赤幘又曰詔賜叚熲赤幘大冠一具又曰馬援外􅁼儻蕩簡易而内重禮事寡嫂雖在閨内必幘然後見又曰馬援初見帝令中黄門引入上在宣徳殿南廡下袒幘坐援曰陛下何知臣非刺客姦臣而簡易若是謝承後漢書曰巴祗字敬祖為揚州刺史黒幘毁壊不復改易以水澡墨傅而用之許慎說文曰澡洗也續漢書曰許劭字子将劭知人入幘肆拔樊子昭袁曄漢獻帝春秋曰孫堅屯七梁東為董卓所攻衆少而不敵與其驍騎潰圍得出常着赤罽幘卓騎追堅堅脱罽幘令親近将祖茂着之堅從間道得去吳書曰顧悌字子通疾篤妻出省之悌命左右自扶起冠幘加襲令妻還真潔不黷如此晉書曰庾顗字子嵩性儉家富劉輿說東海王越令就換錢千萬兾其有吝因此可乗越於衆坐中問顗顗頽然已醉幘堕几上以頭就穿取徐荅云下官家故有兩千萬隨公所取矣輿於是乃服越甚喜又曰易雄字興長長沙人也少為縣吏自念卑賤無由自逹乃脱幘掛縣門而去宋書曰檀道濟數拒魏有功及誅憤怒氣盛目光如炬俄爾間引飲一斛乃脫幘投地曰乃壊汝萬里長城齊書曰卞彬字士蔚濟隂宛朐人也祖嗣之中領軍父延之弱冠為上虞令有氣節㑹稽太守孟凱以令長裁之積不能容脫幘投地曰我所以屈卿者政為此幘耳今已投之卿以一世勲門而傲天下國士拂衣而去梁書曰謝舉臨川始興諸王常所遊踐劭陵王綸於婁湖立園廣讌酒後好聚衆賔冠手自裂破投之唾壺皆莫敢言舉嘗預宴王欲取舉幘舉正色曰裂冠毁冕下官弗敢聞命拂衣而退王屢召不反甚有慙色北齊書曰平秦王歸彦額骨三道着幘不安文宣見之怒使以馬鞭擊其額血披面目爾反時嘗以此骨嚇漢歸彦竟反云漢官儀曰謁者着緗幘大冠司馬彪續漢書曰梁兾改易輿服之制作平上軿車庳幘狹冠周遷輿服雜事曰漢桓帝延熈中梁兾誅後京師作幘顔短耳長短上長下以為服妖董巴漢輿服志曰古者有冠無幘秦加其武將首飾為絳袙以表貴賤後稍作顔題漢興續其顔却摞之施巾連題却覆之今䘮幘是也至孝文乃髙顔題續之耳崇其巾為屋貴賤皆服之蔡邕獨斷曰漢元帝額有壯髮不欲使人見始進幘服之羣臣皆隨焉尚無巾王莾頭秃因施巾故里語曰王莾禿幘施屋傳暢晋公卿禮秩曰中書監令着介幘晉書要事曰哀帝隆和元年太學愽士曹𢎞之等議立秋應讀令不應着緗幘改為素英雄記曰公孫瓉字伯珪為上計吏太守劉基以事公車徴伯珪褠衣平幘御車洛陽身執徒養晉東宫舊事曰太子衣冠有空頂幘摯虞决疑曰凡救日蝕者皆着赤幘以助陽也侍臣皆赤幘帶劔干寳捜神記曰昔魏武軍中無故作白幍此䘮徴也初横縫其前名之曰顔晉永嘉初乃去其縫名無顔幘其後二年四海分崩下人悲歎無顔以生也廣志曰交阯蒼梧俗以翡翠為幘董仲舒止雨書曰執事者赤幘由是言之知不着冠之所服也裴啓語林曰晉明帝年少不倫常微行詔喚人以衣幘迎之渉水過衣幘悉濕元帝已不重明帝忽復有此以為無不廢理既入幘不正元帝自為正之明帝大喜劉楨答魏文帝書曰南服之金登窈窕之首貂蟬之尾綴侍臣之幘魏武遺令曰吾有頭病自先着幘幘乃大服如存時勿遺陸雲與兄書曰一日案行視曹公器物有一介幘如吳幘㡌釋名曰㡌冐也魏志曰揚阜字義山拜城門校尉嘗見明帝着㡌披縹綾半袖阜問帝曰此於禮何法服也帝黙不答自是不法服不以見阜又曰管寧在家恒着皂㡌布裙随時單複魚豢魏略曰夫余國以金銀飾㡌􅅊昭吳書曰朱然破魏將李典等軍斬首五百級得鼓車三乗拜然左大司馬加賜御織成㡌又曰陸遜破曹休於石亭還上脫翠㡌以遺遜晉書曰王濛字仲祖美姿容居貧㡌敗自入肆買之嫗恱其貎争遺新㡌蕭方等三十國春秋曰石季龍將獵輙冠金鏤之㡌又陸翽鄴中記云季龍獵着金鏤織成合歡㡌宋書曰沈慶之隨宗慤等伐沔北諸山蠻大破之威震諸山羣蠻皆稽顙慶之患頭風好着狐皮㡌羣蠻􅁖之號曰蒼頭公又曰元㓙劭始生三日帝往視之簮㡌甚堅無風而墜于劭側上不恱又曰何尚之大明二年以左光禄開府儀同三司侍中如故尚之在家常着鹿皮㡌及拜開府天子臨軒百僚陪位沈慶之於殿庭戯之曰尚之何不着鹿皮冠蕭子顯齊書曰東昏侯自造遊宴之服綴以花采錦繡羣小又造四種㡌㡌因勢為名一曰山鵲歸林者詩曰鵲巢夫人之徳東昏寵嬖滛亂故鵲及藪二曰兎度坑天意言天下將有逐兔之事也三曰反縛黄離嘍黄口小鳥也反縛面縛之應也四曰鳳凰度三橋鳳凰者嘉瑞三橋梁王宅處也又曰永明中蕭諶開愽風㡌後裙之製王為破後㡌世祖崩後逮謀廢立誅滅諸王又曰茹法亮吴興武康人為前將軍延昌殿為世祖隂室藏諸御服髙宗即位開隂室出世祖白紗㡌防身刀法亮歔欷流涕又曰徐龍駒常住含章殿着黄綸㡌被貂裘南面向案代帝書勅又曰豫章王嶷妃庾氏嘗有疾瘳上幸嶷邸後堂設金石樂宫人畢至登桐臺使嶷着烏紗㡌因極宴盡歡梁書曰到溉嘗夢武帝遍見諸子至湘東而脫㡌與之於是宻敬事焉又曰初賀革之江陵也甚不恱過别御史中丞江革以情告之答曰吾嘗夢主上遍見諸子唯至湘東王手脫㡌以與之此人後必當璧卿其行乎又曰沙門寳誌忽重着三布㡌亦不知於何得之俄而武帝崩文恵太子預章文獻王相繼薨又曰鄧至國其俗呼㡌曰災何又曰倭國男女皆露髻富貴者以錦繡雜采為㡌似中國胡公頭又曰庾𢎞逺字上操清實有士譽仕齊為江州長史刺史陳顯逹舉兵敗斬於宋雀航將刑索㡌着之曰子路結纓吾不可以不冠而死又曰垣崇祖為豫州刺史魏攻夀春崇祖着白紗㡌肩輿上城决水破之後魏書曰辛紹先有至性丁父憂三年口不甘味頭不櫛沐髪遂落盡故嘗垂裙皂㡌又曰髙昂轉司徒公好着小㡌因稱司徒㡌北齊書曰齊制宫内唯天子紗㡌臣下皆戎㡌特賜平秦王歸彦紗㡌以寵之後周書曰獨孤信在秦州嘗因獵日暮馳馬入城其㡌微側詰旦而吏人有戴㡌者咸慕信而側㡌焉隋書曰後周之時着突騎㡌其製如今垂裙覆帶盖索髪之遺象也又文帝項有瘤疾不欲人見每常着焉相魏之時著而謁帝故後周一代將為雅服小朝公宴咸許戴之唐書曰代宗時禁民皂衫壓耳㡌以異官健西京雜記曰趙飛燕為皇后弟在昭陽殿遺飛燕書曰令月嘉辰貴姊懋膺大册上遺金花紫綸㡌以陳踴躍孟嘉别傳曰嘉為桓温叅軍九月九日温遊龍山叅僚悉集時佐吏並戎服有風吹嘉㡌墮初不覺良乆如厠温命還之授孫盛紙筆啁之置嘉坐䖏嘉還見之請筆即荅四坐嗟歎幽明録曰安開者安成之俗師也善於幻術時王凝之為江州向王當行陽為王刷頭簮荷葉以為㡌與王着當時亦不覺㡌之有異到座之後荷葉乃見舉坐驚駭魏文帝與劉􅁮書曰劉生帽裁製微不長有似里父之服孟達與諸葛亮書曰貢白綸帽一顔以示微意劉謐賦曰頭戴鹿心帽足著狗皮靴面𫝊黄灰澤髻挿無著花男女四五人皆如燒蝦蟆東晳近遊賦曰㡌引四角之縫裙有三條之殺又曰老公戴合歡之㡌少年着叢角之巾巾釋名曰巾謹也二十成人士冠庻人巾當自謹修四教也方言曰覆結謂之幘巾或謂之承露巾或謂覆髮巾也續漢書曰鉅鹿張角自稱天師弟子數十萬人始起兵皆着黄巾以相識别故世謂黄巾賊後漢書曰光武徴鮑永永疑不至及更始亡乃發封上將軍列侯印綬悉罷兵但幅巾與諸將詣河内幅巾謂不着冠但幅巾束首也又曰何進袁隗欲特表陳寔以不次之位寔謝曰乆絶人事飾巾待終而已又曰曹操既猜嫌忌孔融令丞相軍謀祭酒路粹枉狀奏融云位為九列不遵朝儀禿巾微行唐突宫掖魏志曰諸葛亮出斜谷司馬宣王拒之堅璧不與戰亮致巾􅀈婦人之飾以怒宣王又曰華歆為豫章太守孫䇿畧地江東歆知䇿善用兵乃幅巾迎䇿蜀書曰諸葛武侯與宣王在渭濵將戰宣王戎服涖事遣人視武侯武侯乗素輿葛巾毛扇指揮三軍皆隨其進止宣王聞而嘆曰可謂名士矣鄧粲晉書曰王敦欲伐甘卓遣使送大力巾又曰謝萬字萬石簡文辟為從事中郎着白綸巾鶴氅裘版而前帝與談移日沈約宋書曰陶潜在家郡將候潜值其酒熟取頭上葛巾漉酒還復著之梁書曰武帝賜陶𢎞景以鹿皮巾後屢加禮聘並不出又曰賀徳基少遊學都門積年不歸衣資罄乏又耻服故弊盛冬只衣裌襦袴嘗於白馬寺前逢一婦人容服甚盛呼徳基入寺門脫白綸巾以贈之仍謂曰君方為重器不乆貧寒故以此相遺耳問姓名不答而去又曰武帝與何㸃有舊及踐祚手詔論舊賜以鹿皮巾等召之㸃以巾褐引入華林園又曰王僧孺遷尚書左丞俄兼御史中丞僧孺㓜貧其母鬻紗巾以自業後周書曰宣政元年初服常冠以皂紗為之加簮而不施纓其制若今之折角巾也唐書曰張易之兄昌宗嘗請王公大臣宴於司禮寺因謂御史大夫楊再思曰公面似髙麗請作高麗舞再思忻然剪紙自帖其巾反紫袍遂作之陸翽鄴中記曰皇后出女騎一千為鹵簿冬月皆着紫衣巾熟錦袴褶郭林宗别傳曰林宗嘗行陳梁間遇雨故其巾一角霑而折二國學士着巾莫不折其角云作林宗巾其見儀則如此傳子曰漢末王公多以幅巾為雅是以袁紹之徒雖為将師皆着縑巾張華愽物志曰魏文帝彈棋能用手巾角時有一書生又能低頭以所冠葛巾角撇棋羊祜與從弟䕶書曰年已朽老既定邊事當角巾東路還歸鄉接離郭璞注爾雅曰白鷺翅上有長翰毛江東取為接離世說曰山簡為荆州時出酣暢人為之歌曰山公時一醉逕造髙陽池日暮倒載歸酩酊無所知時復乗駿馬倒着白接離舉首謝葛强何如并州兒髙陽池在襄陽强是其愛將并州人也鄣日晉八王故事曰初趙王倫將篡位洛下童謡曰屠蘇鄣日覆兩耳當有瞎兒作天子于時商農通着大裁彰日倫實眇目也孫楚謝牋曰日承恩賜鄣日其器雖小而禮遇甚𢎞昔衛綰錫六劔珍而不用楚雖不敏且受而藏之太平御覽卷六百八十七
