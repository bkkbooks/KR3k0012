body:
  text: 太平御覽卷三十宋李昉等撰時序部十五人日正月十五日晦日中和節社寒食三月三日人日荆楚歲時記曰正月七日爲人日董勛曰俗以正月一日為雞二日為狗三日為猪四日為羊五日為牛六日為馬七日為人以七種莱為羮剪綵為人或鏤金箔為人以貼屏風亦戴之頭鬢董勛曰像人入新年形容改舊從新又造花勝相遺起於晉代見賈充李夫人典戒云像瑞圗金勝之形又取像西王母戴勝也舊以正月七日為人故名為人日今北人此日亦有諱食菜者與楚食正反剪綵鏤金箔為人皆符人日之意與正旦鏤金雞於戸同北人亦有至人日諱食故歲菜唯食新嵗菜者又餘日不刻牛羊猪狗馬之像而二日獨施人雞此則未喻郭縁生東征記云夀張安仁山魏東平王鑿山頂為㑹望䖏刻銘於壁文字猶在所載銘詞即此處老子云衆人熙熙如登春臺如享太牢楚辭云目極千里傷春心則春日登臨自古為適但不知七日竟起何代晋代桓温叅軍張望亦有正月七日登髙詩近代以來南北同耳北人此日食煎餅於庭中作之未知所出也雜五行書曰正月七日男吞赤豆七顆女吞二七顆竟年無病又宋武帝女夀陽公主人日卧於含章殿簷下梅花落公主額上成五出花拂之不去皇后留之看得幾時經三日洗之乃落宫女竒其異競效之今梅花粧是也談藪曰北齊髙祖七日升髙宴羣臣問曰何故名人日魏収對以董勛正月一日為雞七日為人桉一說云天地初開以一日作雞七日作人也劉臻妻陳氏進見儀曰正月七日上人勝於人魏東平王是日登夀張安仁山銘曰正月七日厥日惟人䇿我良駟陟彼安仁隋陽休之正月七日登髙侍宴詩曰廣殿麗年輝上林起春色風生拂雕輦雲廻浮綺翼隋薛道衡人日思歸詩曰入春纔七日離家已二年人歸落鴈後思發在花前晉李充正月七日登剡西寺詩曰命駕升西山寓目眺原疇正月十五日史記樂書曰漢家祀太乙以昬時祀到明今人正月望日夜遊觀燈是其遺事荆楚歲時記曰正月十五日作豆糜加油膋其上以祀門戸按齊諧記曰正月十五日有神降陳氏之宅云是蠶室若能見祭當令蠶桑百倍疑非其事祭門備之七祀今州里風俗望日祀門其法先以楊枝挿門隨楊枝所指仍以酒脯飲食及豆粥挿箸而祭之齊諧記曰吴縣張成見一婦人立宅東南角謂成曰此地是君蠶室我即地神矣正月半日可作白粥泛膏于上以祭之當令君家蠶桑百倍言訖而去絶失所在或謂作膏粥已後年大得蠶世人正月半作粥禱之加以肉覆其上登屋食之祝云登膏糜挾鼠腦欲來不來待我三蠶老則似為蠶攘鼠與齊諧記相符又覆肉亦是覆膋之理石虎鄴中記正月十五日有登髙之㑹則登髙又非今世而然者也其夕則迎紫姑以卜劉敬叔異苑云紫姑本人家妾為大婦所妒正月十五日感激而死故世人作其形迎之云子胥不在云是其壻曹夫人已行云是其姑小姑可出言紫姑可以出也異苑又云於厠間或猪闌邉迎之捉之覺手重是神來也平昌孟氏嘗以此日迎之遂穿室而肖其象著以敗衣蓋為此也洞覽云帝嚳女將死云生平好樂至正月可以見迎又其事也俗云溷厠之間必須静然後能致紫姑異苑云世人以十五日迎紫姑捉者覺重便是神來奠設酒果亦覺面輝輝有色即跳躁不住能占衆事卜將來蠶桑又善射鈎好即大舞惡則仰眠平昌孟氏恒不信躬試往捉便自躍穿頂永失所在也唐西京記云正月十五日夜勅金吾弛禁前後各一日以覩燈花若晝日世説正月十五日禰衡嘗被魏武謫為鼓吏於此日試鼓漁陽桴作漁陽三撾淵淵有金石聲後漢書註云文士傳曰衡擊鼓為漁陽三撾蹋地來前躡鼓脚容態不常鼔節甚悲易衣畢復擊鼓三撾而去至今有漁陽撾自衡始也青瑣集曰徐徳言之妻陳叔寳之妹封樂昌公主才色冠絶時陳政方亂德言知不相保謂其妻曰以君之容國亡必入權豪之家倘情縁未斷猶兾相見宜有以信之乃破一鏡人執其半約曰他日必以正月望日賣於都市我當在即以是日訪之及陳亡其妻果如楊素之家德言遂以正月望日訪於都市有蒼頭賣半鏡者大髙其價人皆笑之德言直引至其居出半鏡以合之仍題詩曰鏡與人俱去鏡歸人不歸無復姮娥影空餘明月輝陳氏得詩涕泣不食素知之還其妻仍厚遺之與德言歸江南竟以終老玉燭寳典曰正月十五日作膏粥以祀門戸西域記曰摩竭陀國正月十五日僧徒俗衆雲集觀佛舎利放光雨花唐蘇味道正月十五日夜詩曰火樹銀花合星橋鐵鏁開暗塵隨馬去明月逐人來遊騎皆穠李行歌盡落梅金吾不禁夜玉漏莫相催又崔液正月望夜遊詩曰玉漏銅壺且莫催鐵關金鏁徹明開誰家見月能閒坐何處聞燈不看來又神燈佛火百輪張刻像圖形七寳裝影􅂻如開金口說空中似散玉毫光又金勒銀鞍控紫騮玉輪朱幰駕青牛驂驔始散東城曲倐忽還逢南陌頭晦日荆楚歲時記曰元日至于月晦並為酺聚飲食每月皆有弦望晦朔以正月初年時俗重以為節士女汎舟或臨水宴樂玉燭寳典曰元日至月晦人並為酺食渡水士女悉湔裳酹酒於水湄以為度厄今世人唯晦日臨河解除婦人或湔裙後魏盧元明晦日汎舟應詔詩曰輕灰吹上管落蓂飄下蔕遲遲春日華晼晼年光麗北齊魏收晦日汎舟應詔詩曰裊裊春枝弱關關新鳥呼棹唱忽逶迤菱歌時顧慕睿賞方月色宴言忘日暮逰豫慰人心照臨康國步唐太宗月晦詩晦魄移中律凝暄起麗城罩雲朝蓋上穿露曉珠呈笑樹花分色啼枝鳥合聲披襟勤眺望極目暢春情中和節唐書云貞元五年正月十一日詔曰四序嘉辰厯代増置漢宗上巳晉紀重陽或説禳除雖因舊俗與衆宴樂誠合當時朕以春方發生候維仲月勾萌畢逹天地同和俾共昭蘇宜均暢茂自今已後以二月一日為中和節内外官司並休假一日先勅百寮以三令節集㑹今宜以中和節代晦日中和之節自兹始也又曰其月二月八日中書侍郎李秘奏伏以仲春初吉制嘉節以徴之更晦日於徃月之終揆明辰於來月之始請令文武百辟是日進農書司農獻穜稑之種三公戚里上春服士庶以刀尺相遺村舍作中和酒祭勾芒神聚㑹宴樂名為享勾芒祈年穀仍望各下州府所在頒行從之又云貞元六年上以中和節宴百寮於曲江上賦詩以賜之百官皆和焉是歳戴叔倫為容州刺史素有詩名上乃令録其詩以賜之社孝經緯曰社土地之主也土地濶不可盡祭故封土為社以報功也禮記月令曰二月之節是月也擇元日命人社為祀社稷也春事興故祭之以祈農祥元日為近春分前後戊日元吉也又曰王為羣姓立社曰太社王自立社曰皇社諸侯為百姓立社曰國社自立社曰侯社大夫以下立社曰置社尚書曰用命賞于祖不用命戮于社社主隂隂主殺也論語曰魯哀公問社於宰我宰我對曰夏后氏以松殷人以栢周人以栗曰使民戰栗史記曰共工氏之子為后土能平水土故祀以為社故天子曰大社必受霜露風雨以逹天地之氣也社所以親地也地載萬物天垂萬象取法於天所以尊天而親地也社共粢盛所以報本反始也漢書曰陳平為里中社宰分肉甚均父老善之平曰使平得宰天下亦如此肉矣又髙祖定天下詔御史令治獄社春用羊彘祀之魏志曰王修年七歲喪母母以社日亡來年隣里社修感母悲哀其隣里聞之為罷社晉書曰阮脩字宣子伐社樹或止之脩曰若社而為樹伐樹則社亡若樹而為社伐樹則社移矣荆楚歲時記曰社日四隣並結綜㑹社牲醪為屋於樹下先祭神然後饗其胙王氏云百家共一社今百家所社綜即共立之社也寒食荆楚歲時記曰去冬節一百五日即有疾風甚雨謂之寒食據厯合在清明前二日亦有去冬至一百六日陸翽鄴中記曰寒食三日作醴酪又煑粳米及麥為酪搗杏仁煑作粥案玉燭寳典今日悉為大麥粥研杏仁為酪引餳沃之又孫楚祭子推文云醴酪二盂是其事也又并州俗冬至一百五日為介子推斷火冷食三日作乾粥是今之糗也范蔚宗後漢書曰周舉遷并州刺史太原一郡舊俗以介子推焚骸有龍忌之禁至其月咸言神靈不樂舉火舉移書於子推廟云春中食寒一月老小不堪今則三日而已魏武帝刑罰令曰聞太原上黨西河鴈門冬至後皆沍寒之地老少羸弱將有不堪之患令人不得食寒若犯者家長半歲刑主吏百日刑令長罰一月俸周裴汝南先賢傳曰太原舊俗以介子推焚骸一月寒食莫敢烟爨劉向别錄曰寒食蹋蹴黄帝所作本兵勢也或云起於戰國與鞠毬同古人蹋蹴以為戲古今藝術圖云寒食鞦韆本北方山戎之戲以習輕趫者也又按周舉移書及魏武刑罰令陸翽鄴中記並云寒食斷火起於子推琴操所云子綏綏即推也又五月五日與今有異皆因流俗所傳據左傳及史記並無介子推被焚之事按周禮司烜氏仲春以木鐸脩火禁於國中註云為季春將出火也今寒食准節氣是仲春之末清明是三月之節然則禁火葢周之舊制玉燭寳典曰寒食此節城市尤多鬭雞之戲左傳有季郈鬭雞其來逺矣周書時訓曰清明之日桐不華歲有大寒田鼠不化國多貪殘虹不見婦人亂色戴勝不降桑政教不平唐李崇嗣寒食詩曰普天皆滅熖匝地盡藏烟不知何處火來就客心然又宋之問途中寒食詩曰馬上逢寒食途中屬暮春可憐江浦望不見洛橋人又沈佺期嶺表逢寒食詩曰嶺外逢寒食春來不見餳洛陽新甲子何日是清明三月三日詩曰溱與洧方渙渙兮渙渙盛貌也謂三月内桃花水下之時水為至盛也士與女方秉蕳兮秉執也藺蘭也當此盛流之時士與女衆方執蘭拂除邪惡鄭國之俗三月上巳之辰於此水之上招魂續魄除拂不祥故時人願與所悦者俱住觀之漢書曰武帝即位數年無子平陽公主求良家女十餘人飾置於家帝祓霸上還過平陽公主見所偫美人帝不悦既飲謳者進帝獨悦衛子夫孟康云祓除也今三月上巳祓禊是也又漢書禮儀志曰三月上巳日宮人並禊飲於東流水又太后春幸蠶館率皇后列侯夫人桑遵㶚水而祓除又三月上巳官民皆潔於東流水上洗濯祓除去宿垢爲大潔潔者言陽氣布暢萬物既出始潔之也續漢書曰上巳大㑹賔從於薄落津後漢書梁商上巳日㑹賔客於洛水酒酣繼以薤露坐者聞皆掩泣周舉曰此所謂哀樂失時非其所也殃將及乎商至秋果薨魏志曰袁紹三月上巳大㑹賔從於薄落津聞魏郡兵及黑山賊于毒等數萬人共覆鄴城殺守坐中客家在鄴者皆憂怖失色或起而泣紹容貌自若不改常度又晉中興書曰王導謂從兄敦曰王仁德未著而名位猶輕兄名已振宜有以共相匡舉㑹三月三日中宗出禊乗肩輦敦導並騎從紀瞻使人覘之既聞敦導騎從乃大驚自出拜於道左右中宗從容謂導曰卿吾之蕭何也宋書曰武帝三月三日登八公山劉安故臺望城郭如疋帛之繞藂花也崔鴻十六國春秋曰李暠三月三日讌於曲水命羣僚賦詩暠為之序荆楚歲時記曰三月三日士人並出江渚池沼間為流盃曲水宴續齊諧記曰晉武帝問尚書郎摯虞曰三日曲水其義何指答曰漢章帝時平原徐肇以三月初生三女至三日而俱亡一村以為怪乃相擕之水濵盥洗因水以泛觴曲水之義起於此也帝曰若如所談便非好事尚書郎束晳曰摯虞小生不足以知之臣請説其始昔周公城洛邑因流水以泛酒故逸詩云羽觴隨波又秦昭王三日置酒河曲見有金人出捧水心劍曰令君制有西夏及秦霸諸侯乃因此處立為曲水二漢相縁皆為盛集帝曰善賜金五十斤左遷摯虞為陽城令夏仲御别傳曰夏仲御詣洛到三月三日洛中王公以下莫不方軌連軫並南浮橋邊祓禊男則朱服耀路女則錦綺燦爛仲御時在船中曝所市藥雖見此軰穩坐下帷賈充望見深竒其節顧相與語此人有心膽有似冀缺走往問船中安坐者爲誰仲御不應重問徐乃答曰㑹稽北海閒民夏仲御夏統字仲御風土記曰漢末有郭虞者有三女以三月上辰上巳三日而三女産乳並亡迄今時俗以為大忌故到是月是日婦女忌諱不復止家皆適東流水上就逺地禊祓自潔濯也丘淵之征齊道里記曰城北十五里有柳泉符郎常以為解禊處鄴中記曰石虎三月三日臨水㑹公主妃主名家婦女無不畢出臨水施帳幔車服燦爛走馬步射飲宴終日陸翽鄴中記曰華林園中千金堤上作兩銅龍相向吐水以注天泉池通御溝中三月三日石季龍及皇后百官宴賞續捜神記曰盧充獵見獐便射之隨逐不覺逺忽見一黒門如府舍問鈴下鈴下對曰崔少府宅也進見少府語充云尊府君爲索小女婚故相迎耳成婚三日畢送充至家母問之具以狀對與崔别後四年充三月三日臨水戲遥見傍水有犢車充往開車戸見崔女與生男共載情意如初抱兒還充又與金椀乃别戴延之西征記曰天泉之南有東西溝承御溝水水之北有積石壇云三月三日御坐流杯之處雜五行書曰欲知蠶善惡當三月三日天隂而無日不雨蠶大善風俗通曰謹按周禮女巫掌歲時以祓除疾病禊者潔也故於水上盥潔之也已者祉也邪疾已去祈介祉也竹林七賢論曰王濟常解禊洛水明日或問王曰昨日遊有何語議答曰張華善説史漢裴逸民序前言往行滚滚可聴晉王羲之三月三日作蘭亭記修禊事也宋顔延之三日曲水詩序曰日纒胃維月軌青陸皇祗發生之始后王布和之辰思對上靈之心以答庶萌之願有詔掌故爰命司厯獻洛飲之禮具上巳之儀南除輦道北清禁林略亭皋跨芝瀍宛太液懷層山松石峻垝葱翠隂烟於是離宮衛設别殿周徼然後升秘駕引緹騎搖玉鸞發流吹天動神移淵渟雲委以降于行所禮也梁沈約三日率爾成篇曰麗日屬元已年芳具在斯開花已匝樹流鶯復滿枝洛陽繁華子長安輕薄兒東出千金堰西臨鴈鶩陂遊絲映空轉髙栁拂地垂絲幘文照曜紫燕光陸離清晨戲伊水薄暮宿蘭池象筵鳴寳瑟金瓶泛羽巵寧憶春蠶起日暮桑欲萎梁簡文帝三月曲水詩序曰竊以周城洛邑自流水以禊除晉集華林同文軌而髙宴莫不禮具義舉㳫舉重規昭動神明雍熈鍾石是節也上巳屬辰餘萌達壤倉庚應律女夷司候爾乃分階樹羽䟽泉泛爵羽觴沿泝蕙肴㳫來賔儀式序盛徳有容舞艷七盤歌浮六變遊雲駐彩仙鶴來儀都人野老雲集霧㑹結軫方衢飛軒照日晉張華三月三日後園㑹詩曰暮春元日陽氣清明祁祁甘雨膏澤流盈習習祥風啓滯導生禽鳥逸豫桑麻滋榮纎條被緑翠苹含英於我皇后欽若昊乾順時省物言觀中園讌及羣辟乃命初筵合樂華池祓濯清川泛彼龍舟泝游洪原又張華上巳篇曰仁風道和氣勾芒御昊春姑洗應時月元巳啓良辰朋從自逺至童冠八九人伶人理新樂膳工獻時珍春醴踰九醖冬青過十旬晉閭丘沖三月三日應詔詩曰暮春之月春服既成升陽潤土水渙川盈餘萌壤逹嘉木敷榮皇后宣遊既讌且寧光光華輦侁侁從臣上䕃丹渥下藉文茵臨池挹盥濯故潔新俯鏡清流仰睇天津藹藹華林岩岩景陽嶪嶪峻宇奕奕飛梁垂䕃倒影若翺若翔浩浩白水汎汎龍舟皇在靈沼百辟周游激濯清歌鼓枻行謳聞樂咸和具醉斯柔在昔帝虞德被遐荒干戚在庭苗人來王今我哲后古聖齊芳惠化中國以綏四方元首既明股肱惟良樂只君子今日惟康又潘尼上巳日帝㑹天淵池詩曰青春暮月六氣和理律應姑洗日惟元巳谷風散凝㣲陽戒始春服既成明靈降祉又陸機櫂歌行曰遲遲暮春日天氣柔且嘉元吉逢初巳濯穢遊黄河龍舟浮鷁首鸞旗垂藻葩乗風宣飛景逍遥戲中波隋盧思道上巳禊飲詩曰山泉好風日城市厭囂塵聊持一尊酒共尋千里春餘光下幽桂夕吹舞青蘋何時出關後重有入林人唐沈佺期三月三日梨園亭侍宴詩曰九門馳道出三已禊堂開畫鷁中川動青龍上苑來野花飄御坐河柳拂金杯日晩迎祥處笙鏞下帝臺後漢張衡南都賦曰於是暮春之禊元巳之辰方軌齊軫祓于陽瀕朱帷連網曜野映雲男女姣服絡繹繽紛晉成公綏洛禊賦曰考吉日簡良辰祓除解禊同㑹洛濵妖童媛女嬉遊河曲或盥纎手或濯素足臨清流坐沙塲列罍尊飛羽觴又張協禊賦曰夫何三春之令月嘉天氣之氤氲流水清泠以汪濊原隰葱翠以龍鱗於是縉紳先生嘯儔命友擕朋接黨童冠八九主希孔墨賔慕顔栁若夫權戚之家豪侈之族采騎齊鑣華輪芳轂青蓋雲浮參差相屬集於長洲之浦曜乎洛川之曲遂乃停輿蕙渚息駕蘭田朱幔虹舒翠幙蜺連浮素舟以蔽水洒𤣥醪於中河水禽為之駭踊陽侯為之動波又阮瞻上巳㑹賦曰臨清川而嘉讌聊暇日以遊娛䕃朝雲而為蓋托茂樹以為廬又王廙洛都賦曰若乃暮春嘉禊三巳之辰貴賤同遊方驥齊輪麗服靚妝祓乎洛濵流芳塞路炫日映雲又禇爽禊賦曰伊暮春之令月將解禊於通川川廽瀾以澄暎嶺峭崿以霏烟輕霞舒於翠崖白雲暎於青天風透林而輕清氣扶嶺而載鮮太平御覽卷三十
