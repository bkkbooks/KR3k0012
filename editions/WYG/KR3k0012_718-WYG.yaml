  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_718-1a, image: WYG0899/WYG0899-0352a.png}
body:
  text: 太平御覽卷七百十八宋李昉等撰服用部二十笄釵鑷釵類璫珥釧跳脱附指環笄釋名曰笄係也所以係冠使不墜也三禮圖曰笄簮也士以骨大夫以象詩曰君子偕老副笄六珈副后夫人之首飾編髪為之珈笄飾之最盛者白虎通曰男子㓜娶必冠女子㓜嫁必笄禮曰女子許嫁笄而字國語曰司馬期欲以妾為子内于卿之嫡妻訪於左史倚相舊吾有妾而願欲笄之倚相止之又曰范文子暮退於朝武子曰何暮也對曰有秦客廋辭於朝廋隠也大夫莫之能對也吾知三焉解其三事武子怒曰大夫非不能也讓父兄也爾童子而三掩人於朝吾不在晉國忘無日矣擊之以杖折之委笄春秋後語曰趙襄子之姉為代王夫人襄子併代殺王平其地其姉聞之泣而呼天磨笄自殺代人憐之名其地為磨笄山齊淳于髠十酒説曰羅􅃭排門翠笄窺牖釵釋名曰釵枝也因形名之也爵釵者釵頭施爵也曹植美女篇曰頭挿金爵釵續漢書曰靈帝時江夏黄氏母浴而化為黿入於深淵其後人時見出浴簮一銀釵猶在其首又輿服志曰貴人助蠶戴瑇瑁釵江漢𫝊曰魏文帝遣使於吴求玳瑁三㸃釵群臣以為非禮咸欲不與勑付使者晉記云王逹妻承氏太安中為鮮卑所掠路由章武堂留書并釵釧訪其家晉令曰六品下得服金釵以蔽髻又曰女奴不得服銀釵晉山陵故事曰后服有瑇瑁釵三十隻沈約宋書曰秦王三年以皇后已下六宫金釵千枚班賜北征将士列女𫝊曰梁鴻妻孟光荆釵布裙洞冥記曰元鼎元年起昭靈閣有神女留一玉釵與帝帝以賜趙偼伃至昭帝元鳯中宫人猶見此釵共謀欲碎之明旦視之恍然見白鷰直升天去故宫人作玉釵因改名玉燕釵言其吉祥拾遺記曰漢獻帝為李傕所敗帝傷指伏后以繡紱拭血刮玉釵以覆於創應手創愈又曰魏文帝納美女薛靈芸有獻火珠龍鸞釵帝曰珠翠尚不能勝况龍鸞之重乎又曰魏明帝時昆明國貢嗽金鳥鳥常吐金屑如粟用飾釵佩謂之辟寒金宫人相嘲曰不服辟寒金那得帝王心又曰石季倫愛婢翔風刻玉為倒龍之佩瑩金為鳯冠之釵言刻玉如倒龍之勢鑄金象鳯凰之状結袖繞楹舞於晝夜使聲聲相接謂之恒舞欲有所召者不呼姓名悉聽佩聲視釵色玉聲輕者居前金色艶者居後以為行次而進也華陽國志曰涪陽大龜其甲可卜其縁可作釵世號靈釵裴淵廣記曰豪富女子以金銀為大釵執以叩銅鼓故號為銅鼓釵崔豹古今注曰蟠龍釵梁兾婦所制異苑曰吴有徐君廟東陽長山縣吏李瑫義熈中遭事在都婦過廟乞恩㧞銀釵為願未至富陽有白魚跳婦前剖腹得所願釵事尋解幽明録曰潯陽㕘軍夢一婦人前跪自稱先𦵏近水渰没誠能見救雖不能富貴可令君薄免禍㕘軍答曰何以為誌婦人曰君見渚邉上有魚釵即我也㕘軍明旦覔果見一毁墳其上有釵移置高燥處却十餘日㕘軍行至東橋牛奔直趣水垂堕忽轉正得無恙也録異傳曰吴人費季客賈去家與諸賈人語曰吾臨行就婦求金釵婦與之吾乃置户楣上忘向婦説妻夢見季死前金釵在户上妻取得發哀一年季却還神仙占曰頭上着釵夜卧墮靴履中着婦人與外夫殺之司馬相如美人賦曰玉釵掛臣冠羅袖拂臣衣黄香九宫賦曰剥駭雞以為釵古歌辭曰頭上金釵十二行足下絲履五文章陳司馬美玉篇曰頭帶金雀釵腰佩翠琅玕崔瑗三子釵銘曰元正上日百福孔靈髻髪如雲乃象衆星三珠横釵鑷髪鑚瑩魏陳思王美女篇曰頭戴合歡釵梁湯濟渫井得金釵詩曰昔日倡嫁女摘華露井邊摘華還自挿照井還自憐窺窺終不已笑笑自成妍寳釵於此落從來非一年翠羽成泥去金色尚如先此人今不在此物今空𫝊秦嘉與婦淑書曰今製寳釵一雙價直千金可以耀首淑答曰未奉光儀則寳釵不設靈怪曰吴興妖童贈謝府君詩曰玊釵空中墜金鈿色已歇獨泣謝春風良夜辜明月鑷釵類齊書曰文安皇后為皇太子妃無寵太子為宫人製新麗衣裳及首飾而后牀惟陳故古舊釵鑷數枚又曰周盤龍為右将軍建元元年魏攻夀春以盤龍為軍主假節助豫州刺史桓崇祖拒魏大破之上聞之喜下詔探美金釵鑷二十枚與其愛妾杜氏王仲宣七釋曰戴明中之羽雀雜華鑷之威㽔孔煒七引曰長袖隨腕而遺曜紫鑷承鬂而聘輝璫珥説文曰珥瑱也瑱以玉充耳也釋名曰珥瑱也懸璫耳旁不欲使人妄聽自鎮重也此本出於蠻夷蠻夷婦女輕浮好酒以此鐺錘之也今中國倣之也風俗通曰耳珠曰璫周書曰武王馳紂商師大崩帝辛登廪臺取天知玉珥及鹿玉衣身以自焚鹿玉則銷天知珥在火中不銷詩曰玉之瑱也象之揥也又曰有匪君子充耳琇瑩𫝊曰夏齊侯将納公魯昭公也命無受魯貨申豐從女買以幣錦貳兩縳之如瑱瑱充耳也縛卷也急卷使如充耳易懐藏史記曰淳于髠謂齊威王曰前有垂耳後有遺簮此可飲八斗又曰武帝譴責鈎弋夫人夫人脱簮珥叩頭魏書曰卞太后性約儉不尚華麗無文繡珠玉器皆黒漆太祖嘗得名璫數具命后自選一具后取其中者太祖問其故對曰取其上者為貪取其下者為詐故取其中者耳吴録曰袁博出遊其女塋得壤墟齊璫珥百枚於是封上之詔以賜博也晉令士卒百工不得服瑱璫又諸葛恪别傳曰范慎不穿馬珥璫恪荅曰母之於女天下至親穿珥附珠何傷於仁戰國䇿曰齊王夫人有七美珥韓子曰齊威王夫人死有十孺子所窺者凡十人薛公欲知所立人為十玉珥而美其一獻於王以付十孺子明日視美珥所在乃立之西京雜記曰趙飛鷰為皇后其女弟上遺合浦圓珠珥夢書曰珠珥為人子之所貴夢得珠珥得子也魏陳思王洛神賦曰珥江南之明璫劉楨魯都賦曰含丹吮素巧笑妍祥挿曜日之笄珥明月之璫繁欽宣情詩曰何以致區區耳中雙明珠王粲七釋曰執照夜之明璫煥煜爚以垂暉傅𤣥七謀曰佩崑山之美玉珥南海之明璫釧跳脱附通文俗曰環臂謂之釧東宫舊事曰皇太子納妃有金釧二雙祖台之志怪曰建安中河間太守劉照夫人卒於府後太守至夢見一好婦人就於室家持一雙金鏆古喚切後與太守不能名婦人乃曰此錗竹志切鏆錗鏆者其状如紐珠大如指屈伸在人太守得置枕中前太守迎喪言有錗鏆開棺見夫人臂果無復有錗鏆焉甄異記曰樂安章沉病死将殯而蘇云被録到天曹主者是其外兄㫁理得免見一女同時被録乃脱金釧二雙託沉以與主者亦得還遂共讌接女云家在吴姓徐名秋英沉後尋問遂得之女父母因以女妻沉髙文惠與婦書曰令製金鏆一雙交州記曰波期玉以金釧聘斯調玉女也唐書曰交河王麹崇裕兄昭少好學嘗有鬻異事書於市者其母将為買之捜索家財不足其價惟篋中有金釧數枚既而歎曰何愛此物令吾子不有異聞乎促令貨易此書昭後厯位司膳卿頗以詩詠流譽繁欽定情詩曰何以致契濶繞臂金跳脱指環春秋繁露曰紂刑鬼侯之女取其環五經要義曰古者后妃羣妾御於君所以銀環進之女史書曰授其環以進退之有娠則以金環退之當御者以銀環進之進者著以左手陽也當以就男故著左手右手隂也既御而復故此女史之職漢書儀曰宫人御幸賜銀環後漢書曰孫程等十九人立順帝有功各賜金指釧環晉書曰羊祜年五嵗令乳母取所弄玉環乳母曰汝先無此物祜乃於隣人李氏東牆桑樹中探得之李氏見驚曰余亡兒所失物也乳母具言前事李氏悲惋時人異之李氏之子即羊祜前身也又曰傅暢年五嵗父友見而戯解暢衣取其金環與左右暢不惜以此賞之後選入侍講東宫宋書曰南夷元嘉七年遣使獻金剛指環梁書曰武丁貴嬪嬪帝鎮樊城甞登樓以望見漢濵五彩如十龍有女子臂跳脱則貴嬪也帝贈以金環納之時年十四後魏書曰咸陽王禧弟樹字秀和位宗正卿後奔梁武帝尤器之後復歸魏初辭梁其愛妹玉兒以金指環與别樹常著之寄以還梁表必還之意朝廷知之俄而賜死拾遺記曰吴主潘夫人以火齊指環挂石榴枝上因其處起臺名曰環榴臺時有諫者云今吴蜀争雄環榴之名将為妖乎權乃翻其名為榴環臺也西京雜記曰戚姬以百錬金彄照見指上骨惡之以賜侍兒益部耆舊傳曰劉寵喪母時亂墳墓發傷寵乃矯母令為家貧無財惟有手上金環賣造墓供送免發掘西戎𫝊曰大宛國人深目多鬂娶人以金同心指環為聘外國雜俗曰諸問婦許婚用同心金指環保同志不林道記曰林邑王獻金指環於吴主風俗𫝊曰始結婚姻相然許便下金同心指環扶南𫝊曰扶南有訟者煮水令沸以金指環投湯中然後以手探湯其直者手不爛有罪者入湯即焦茅君𫝊曰勾曲山上有神芝五種求之法當以三月豋山賫金環二雙啓以奉誓如此者三以為盟也必得芝草投環於石間毋顧念集靈記曰王諿琅邪人也仕梁為南康王記室亡後數年妻子困於衣食嵗暮諿見形謂婦曰卿困乏衣食妻因與之酒别而去諿曰我若得財物當以相寄後月小女探得金指環一雙甄異𫝊曰沛郡秦拊義熈中至曲阿村日暮失路逺見火光投之屋有少女因寄宿曉臨别女以指環與之拊去迴顧乃是冢焉太平御覽卷七百十八
