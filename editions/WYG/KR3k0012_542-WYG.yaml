body:
  text: 太平御覽卷五百四十二宋李昉等撰禮儀部二十一拜説文曰拜首至地也尚書舜典曰帝曰俞咨垂汝作共工垂拜稽首讓於殳斨帝曰俞咨益汝作朕虞益拜稽首讓於朱虎熊羆帝曰俞咨伯汝作秩宗伯拜稽首讓於夔龍又大禹謨曰帝曰禹官占惟先蔽志昆命於元龜朕志先定詢謀僉同鬼神其依龜筮協從卜不習吉禹拜稽首固辭又大禹謨曰益賛於禹曰惟徳動天無逺弗届滿招損謙受益時廼天道禹拜昌言曰俞班師振旅又益稷曰臯陶拜手稽首颺言曰念哉周禮春官太祝曰太祝辨九拜一曰稽首二曰頓首三曰空首四曰振動五曰吉拜六曰凶拜七曰竒拜八曰褒拜九曰肅拜以享右祭祀稽首拜頭至地也頓首頭叩地空首拜頭至手所謂拜手也吉拜拜而後稽顙謂齊衰不杖以下者言吉凶者比殷之凶拜周以其與頓首相近故謂之吉拜云拜稽顙而後拜謂三年服者也杜子春云竒讀為竒偶之竒謂先屈一膝推拜是也或云竒讀曰倚倚拜謂持節持㦸拜身倚之以拜也鄭大夫云動讀為董書亦或為振董董以兩手相係也竒拜謂一拜也褒讀為報報拜再拜是也鄭司農云褒拜今時持節拜是也肅拜但俯身下手今時揖是也介者不拜故曰為事敢肅使者或為振動戰慄變動之拜也書曰王動色變一拜以答臣下也再拜禮神與尸享獻也謂朝獻饋獻也右讀為侑侑勸尸食而拜禮記曲禮曰侍食於長者主人親饋則拜而食主人不親饋則不拜而食以其禮於己不隆也又曲禮曰君言至則主人出拜君言之辱使者歸則必拜送於門外又曲禮曰介者不拜為其拜而蓌拜蓌則失容節蓌猶詐也又曲禮下曰士有獻於國君問之曰安取彼再拜稽首而後對又檀弓上曰孔子曰拜而後稽顙頽乎其順也稽顙而後拜頎乎其至也頽順懇至也此俱䘮拜時人行之異禮又内則曰凡拜男尚右手女拜尚左手鄭𤣥注曰左陽右隂左傳僖公曰王使宰孔賜齊侯胙胙祭肉尊之此三王後曰天子有事於文武使孔賜伯舅胙天子謂異姓諸侯曰伯舅齊侯將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜九十曰耄級等也對曰天威不違顔咫尺言天監察不違威嚴常在顔靣之前八尺曰咫小白余敢貪天子之命無下拜小白齊侯名余身也恐隕越於下隕越顛墜也以天子居上故恐顛墜以遺天子羞敢不下拜下拜登受又僖中曰公子賦河水公賦六月趙衰曰重耳拜賜公子降拜稽首公降一級而辭焉衰曰君稱所以佐天子者命重耳重耳敢不拜又文上曰公如晉及晉侯盟晉侯饗公賦菁菁者莪菁菁者莪詩小雅取其旣見君子樂且有儀矣荘叔以公降拜曰小國受命於大國敢不慎儀君貺之以大禮何樂如之抑小國之樂大國之惠也晉侯降辭登成拜公賦嘉樂嘉樂詩大雅取其顯顯令徳宜民宜人受禄于天又成公九年曰季文子如宋致女復命公享之賦韓奕之五章韓奕詩大雅篇名其五章言厥父嫁女於韓為女相所居莫如韓樂文子喻魯侯厥父之嫁宋公如韓使宋土如韓樂穆姜出於房再拜曰大夫勤辱不㤀先君以及嗣君施及未亡人穆姜伯姬母聞文子言宋樂喜而出謝其行勞婦人夫死自稱未亡人先君猶有望也言先君亦望文子之若此敢拜大夫之重勤又賦緑衣之卒章而入又襄四年曰穆叔如晉報知武子之聘也晉侯享之金奏肆夏之三不拜肆夏樂曲名工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子員問之對曰三夏天子所以享元侯也使臣弗敢與聞文王兩君相見之樂也臣不敢及鹿鳴君所以嘉寡君也敢不拜嘉以穆叔為嘉賔故歌鹿鳴之詩取其我有嘉賔也穆叔奉君命來嘉穆叔乃所以嘉魯君四牡君所以勞使臣也敢不重拜皇皇者華君教使臣曰必諮於周臣聞之訪問於善為咨咨親為詢咨禮為度咨事為諏咨難為謀臣獲五善敢不重拜也又襄十四年曰公使厚成叔弔於衛曰寡君使瘠聞君不撫社稷而越在他竟若之何不弔衛人使大叔儀對曰羣臣不佞得罪於寡君寡君不以即刑而悼棄之君不㤀先君之好辱弔羣臣敢拜君命之辱重拜大貺又昭十三年曰初楚共王無冡適有寵子五人無適立焉乃大有事於羣望而祈曰請神擇於五人者使主社稷乃徧以璧見於羣望曰當璧而拜者神所立也誰敢違之既乃與巴姬宻埋璧於大室之庭巴姬共王妾大室祖廟使五人齊而長入拜康王跨之靈王肘加焉子干子晳皆逺之王平弱抱而入再拜皆厭紐孝經右契曰制作孝經道備使七十二弟子向北辰星而罄折孔子絳單衣向星而拜論語子罕曰拜下禮也今拜乎上泰也雖違衆吾從下人臣於君酬酢授爵當拜於堂下時臣驕泰故拜於堂上又鄉黨曰康子饋藥拜而受之曰丘未達不敢嘗饋進也拜受敬之也家語曰子貢曰孔子為大司冦廐焚有為火來者則拜士一大夫再曰其来者亦相弔之道吾為有司故拜之爾雅曰啟跪也方言曰東齊青岱北燕之郊跪為長騖釋名曰跪危也兩膝引地體危倪也跽忌也見所敬者不敢自安也拜於丈夫為跌跌然屈折下就地也於婦人為扶自相扶而上下也漢書曰武帝幸不其其音基不基山名因為縣祠神人於交門宫若有嚮坐拜者作交門之歌又曰劉章已殺吕産帝令謁者持莭勞章章欲奪莭謁者不肯章乃從與載因莭信馳斬長樂衛尉吕更始還入比軍復報太尉勃起拜賀又曰大將軍衛青旣益尊姊為皇后然汲黯與亢禮或説黯曰自天子欲令羣臣下大將軍大將軍尊貴重君不可以不拜黯曰夫以大將軍有揖客反不重耶又曰何武從京兆大尹二嵗坐舉方正所舉者召見槃辟雅拜有司以為詭衆虗偽武坐左遷楚内又曰朱博為瑯琊太守門下掾貢遂耆老大儒教授數百人拜起舒遲博出敎告主簿貢遂書生不習吏禮主簿且敎拜起閑習乃止又曰張禹疾車駕自臨問之上親拜禹床下禹小子未有官上臨候禹禹數視其小子上即拜禹之小子為黄門郎給事中東觀漢記曰耿恭於䟽勒城穿井十五丈不得水恭乃正衣服向井再拜為吏士禱水身自率士輓籠有飛泉湧出大得水吏士驚喜皆稱萬嵗又曰陳遵為大司馬護軍使匈奴過辭於王丹臨决丹謂遵曰俱遭世反覆唯我二人為天地所貴今當子之絶域無以相贈贈子以不拜遂揖而别遵甚恱之又曰司徒侯霸欲與王丹定交丹被徵霸遣子昱往昱道遇丹拜於車下丹荅之昱曰家尊欲與君殺分何以拜子孫耶丹曰君房有是言王丹未許之又曰魏霸為光禄大夫覇妻死長兄為覇娶妻送至官舎覇笑曰児子備具何空飬他家姥為即自入拜其妻手奉案前因跪曰夫人視老夫復何中直而空失計義不敢相屈即拜而出妻慚求去遂送還之後漢書曰北匈奴遣使求和親顯宗遣鄭衆持節使匈奴衆至北庭虜欲令拜衆不屈單于大怒圍守閉之不與水火欲脇服衆衆㧞刀自誓單于恐而止乃更發使隨衆還京師華嶠後漢書曰鄭衆使匈奴欲令衆拜不為屈相議復欲遣衆衆曰今徃匈奴恐取勝於臣臣不忍持大漢節對氊裘跪拜明帝收繫廷尉獄獻帝春秋曰董卓自號太師御史中丞以下皆拜初皇甫嵩與卓争雄後嵩為中丞見卓拜車下卓曰可以服乎嵩曰安知明公乃至於是卓曰鴻鵠固有逺志但燕雀不知耳嵩曰昔與明公俱鴻鵠獨明公今為鳯凰卓笑曰卿早服可不拜也漢雜事曰韋𤣥成讓侯詔書不聴引拜之也又曰馬援與梁綂友善綂子虎賁中郎將松徃候援援小疾病松拜牀下援於床上坐視不為禮左右曰松貴不當禮耶曰我乃松父友雖貴奈何典畧曰太子嘗請文學酒酣坐歡命夫人甄氏出拜坐上客皆伏而劉楨獨平視太祖聞之收楨减死輸作部胡冲吳厯曰孫䇿擊豫章先遣虞翻說華歆歆葛巾迎䇿䇿謂歆曰府君徳望逺近所歸䇿年幼稚宜脩子弟之禮便向歆拜魏志曰魯國孔融髙才倨傲年在紀羣之間先與紀友後與羣交更為紀拜由是顯名魏志曰常林年七嵗有父黨造門問林曰伯先在不汝何不拜對曰對子字父何拜之有又曰晉宣王以常林鄉邑耆徳每為拜或謂林曰司馬公貴重君宜上之林曰司馬公自欲敦長㓜之序為後生法貴非吾之所畏也拜非吾之所制也言者踧踖而退蜀志曰先主為漢中王許靖為太傅丞相諸葛亮皆為之拜又曰伊籍隨先主入益州東使吳孫權聞其才辯欲逆折以辭籍適入拜權曰勞事無道之君籍即對曰一拜一起未足為勞吳志曰朱治領吳郡舉孫權為孝亷後權歴位上將及為吳王治毎見權常親迎執板交拜又曰人誣樓𤣥謗訕政事華覈上䟽乞𤣥自新孫皓疾𤣥名聲復徙𤣥及子男據付交趾将張奕使以戰自効隂别敕奕令殺之據到交趾病死𤣥身隨奕討賊持刀見奕輙拜奕不忍殺㑹奕暴疾卒𤣥殯歛奕於器中見敕書還便自殺耳王隠晉書曰何曽司徒與髙鄭二公將見文帝曽在中央獨先拜漢晉春秋曰晉公旣爵為王太尉王祥司徒何曽司空荀顗並請詣謁顗謂祥曰相王尊重何侯旣已書敬今日便當相率而拜無所疑也祥曰相國勢位誠為貴尊然要是魏之宰相吾等魏之三公公王相去一階而已班例大同安有天子三司可輒拜人者損魏朝之望虧晉王之徳君子愛人以禮吾不為也及入顗遂拜而祥獨長揖王曰今日方知君見顧之重矣晉書曰潘岳性輕躁趨世利與石崇謟事賈謐毎候其出與崇輒望塵而拜晉中興書曰王猛少貧賤鬻畚為事嘗至洛陽貨畚有一人於市買其畚云家近在此也隨我去取直猛隨去忽至深山中此人語且住樹下當先啓道須臾猛進見一老公踞胡牀髪悉白侍從十許人有一人引猛云司馬公猛因拜老公公曰王公縁何拜即十倍酬畚直遣人送猛出山旣出嶺視乃嵩山晉中興書曰顯宗嘗使太常丞張放歸胙於王導詔無下拜導不敢當辭以疾初顯宗㓜冲見導恒拜晉諸公讃曰司馬駿鎮西戎旣薨每見其碑讀者無不拜之後魏書曰沈文秀為慕容白曜所攻長圍數匝自夏至秋始剋文秀取所持旌節衣冠儼然坐齋内亂兵入文秀厲聲數四身見執而裸送于白曜曜左右令拜文秀曰合二國大臣無相拜之禮曹瞞别傳曰沛國桓邵素輕太祖邵避難交州得出首拜謝于庭中太祖曰跪可解死耶遂殺之郭泰别傳曰鄉人見泰皆拜于床下鄭𤣥别傳曰建安元年自徐州還髙宻道遇黄巾賊數萬人見𤣥皆拜樊英别傳曰英嘗病卧便室中英妻遣婢拜問疾英下床答拜陳寔問英何荅婢拜英曰妻齊也共奉祭祀禮無徃而不荅荀氏家傳曰魏文帝在東宫武帝謂曰荀公為人之師表汝當盡禮敬之荀病世子問疾拜床下三輔决録曰孟他字伯郎靈帝時中常侍張讓專朝讓監奴典任家計他殫家財賂監奴共結親厚積年衆奴心慚問他所欲他曰欲得汝曹拜奴等皆許諾時賔客求見讓者門車常數百乗或累日不得過他最後衆奴以其至皆迎而拜之將他車騎入衆人大驚謂他與讓善争以珎物遺他他得盡以賂讓讓大喜後以葡萄酒遺讓即拜梁州刺史燕書曰皇甫真字楚孝鄴城失守秦王初入臨前殿燕羣臣數百人皆入東掖門見侍中王猛来真等望馬首拜之明日更見真乃卿猛猛曰昨拜朝卿何恭慢之相違真荅曰卿昨為賊朝是國士吾宜拜賊而卿國士亦何所恠也猛嘉之韓子曰禮者所以厚貌飾情也中心懷而不諭故疾趨單拜以明之燕丹子曰先主見太子側階而迎迎而再拜賈誼書曰受計之禮主所親拜者二聞生民之數則拜之聞登榖則拜之郭子曰陶公自上流水陶侃字士行也赴蘇峻之難含怒於庾公庾公謂必戮已進退無計温公乃勸詣陶公卿但徑拜必無他我為卿保之庾殊未了而不得不徃乃從温言詣陶至便拜庾風資雅順陶見拜不覺自起止之曰庾元規何縁拜陶士行江統祚謁拜議曰以為諸郡吏都無太守伯叔兄敬者近臣君服斯服然則朝幹佐以下左右者可從君而拜君所拜統士古者見賔主皆拜今日非君臣上下則不拜君之新親者唯幹佐小吏則可君拜斯拜矣君之諸父無道謂之事甲辰議臣見諸王直恭敬而已無鞭板拜揖雖於皇帝為諸祖諸父其義皆同又河南河内諸郡吏前後亦為太守伯叔兄謁拜者其比甚衆矣尚書逸令曰卞壼等奏三代以来記籍經典無拜臣之制唯漢成帝拜張禹庸主凡臣不足為軌先帝拜司徒導以元皇興自蕃國布衣之交拜在人臣之故師而不改以君拜臣大教有違事應改正太后又詔曰帝㓜小一遵先帝壼等又固争云云臣期期不奉詔又反覆乃從外奏成帝拜王公時議曹疑於儀注博士杜瑗及陳舒議禮無以君拜臣若也小㑹崇謙非臣下所知無在儀注之制張闈受侯不拜國太妃表云昔為晉陵内史在東海國封内時世孫㓜小太妃秉政前内史遷授除拜日及當之官皆上疏拜閤執純臣之禮闈自以爵雖有五等然執珪受瑞俱為列國無相臣之體又晉制拜列侯為相内史於天朝不曰陪於蕃國不稱臣臣以從古則懼有行簡之譏隨俗又恐失君臣之訓經國垂範且有定准乞敕臣表下八座参詳荅報唐書曰田承嗣方跋扈倨傲無禮郭子儀嘗遣使至魏州承嗣輒望拜之指其膝謂使者曰兹膝不屈於人今為公拜太平御覽卷五百四十二
