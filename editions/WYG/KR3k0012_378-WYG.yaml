body:
  text: 太平御覽卷三百七十八宋李昉等撰人事部十九短中國人短絶域人肥瘦短中國人左傳襄上曰臧紇救鄫侵邾敗扵狐駘臧紇武仲也鄫屬魯故救之狐駘邾也國人誦之曰我君小子侏儒是使朱儒朱儒使我敗扵邾襄公㓜弱故曰小子臧紇短小故曰侏儒家語曰髙柴齊人字子羔長不過六尺狀貌甚惡為人篤孝居魯見知史記曰秦倡侏儒優旃始皇時置酒天雨陛楯者沾寒優旃哀之乃大呼曰陛楯即汝雖長何益幸雨立我雖短也幸休居始皇乃使得相代漢書曰嚴延年為人短小精幹敏㨗扵事雖子貢冉有通扵政事能繼也又曰樓護為人短小精辯論議常依名節與谷永俱為五侯上客又曰東方朔待詔公車奉禄薄侏儒得省見久之朔紿音迨騶侏儒師古曰侏儒短人也騶廐之御騶也曰上以若曹無益於縣官耕田力作固不及人臨衆處官不能治民從軍擊虜不任事無益扵國用徒索衣食今欲盡殺若曹侏儒大恐啼泣朔教曰上即過叩頭請罪居有頃聞上過侏儒皆號泣頓首上問何為對曰東方朔言上欲盡誅臣等上知朔多端召問何恐侏儒為對曰臣朔生亦言死亦言侏儒長三尺餘奉一嚢粟錢二百四十侏儒飽欲死臣朔饑欲死上大笑因待詔金馬門又曰郭觧為人短小恭儉諸公以此重之又曰蔡義為丞相時年八十餘短小常兩吏挾乃能行又曰張蒼不滿五尺蒼父八尺餘蒼子復長八尺及孫毅長六尺餘又曰宣帝時渤海盗賊起上以龔遂為太守召見遂形貌短小帝見心内輕焉及對賜黄金乘傳去謝承後漢書曰汝南周滂字次彦世祖到常山問可治兵者誰滂舅以滂對世祖見滂短小以為不能將帥滂對有詞理拜潁川府丞東觀漢記曰張重日南計吏形容短小明帝問云何郡小吏答曰臣日南計吏非小吏也袁宏漢記曰隂后短小舉止時有失儀左右掩口而笑魏志曰樂進字文謙容貌短小胆烈從髙祖為帳下吏魏氏春秋曰魏武王姿貌短小神明英徹呉録曰張蕃字仲輔為人短小顧譚以短戯之曰侏儒侏儒有何徳令我思君罔極臧恭緒晋書曰山濤子淳元尫疾不仕世祖聞其短小而聰敏欲見之濤面答淳元自謂形容冝絶人事不肯受詔論者竒之沈約宋書曰王敬𢎞形狀短小而坐起端方劉璠梁典曰徐摛起家太學博士周捨舉曰臣外弟徐擒形質陋小若不勝衣不堪此選乃為晋安王侍讀崔鴻前凉録曰宗醜字仲業慷慨有大志清素敦樸不好華競形狀短小體有鱗甲仕至西平太守三國典畧曰齊孟業有盛名初司州牧清河王岳聞業名召為法曹見其容貌短小笑而不言及尋斷决之處乃謂業曰卿决斷之明可謂有過軀之用晏子春秋曰晏子短小使楚楚人為小門迎晏子晏子曰使狗國者從狗門入今臣使楚不當狗門入王曰今齊無人耶使子為使晏子曰齊之臨淄張袂成帷揮汗成雨何謂無人使賢者使扵賢國不肖者使扵不肖之國以嬰為不肖故使王耳孫卿子非相曰帝舜短周公小楚棄公子髙㣲小短􅇤行若不勝衣而定楚國說苑曰齊遣淳于髠到楚為人短小楚王甚薄之謂曰齊無人而使子來何長也對曰臣無所長臣腰中七尺之劒欲斬無狀王王曰止吾但戯子耳即與髠共飲酒博物志曰齊桓公獵得一鳴鵠宰之嗉中得一人長三寸三分著白圭之􅂁帶劒持刀罵詈瞋目又得一折齒方圓三尺問羣臣曰天下有此及小兒否陳章答曰昔秦胡充一舉渡海與齊魯交戰傷折版齒昔李子敖扵鳴鵠嗉中㳺長三寸三分纂文曰漢光武時頴川張仲師長二尺二寸亦出王充論衡古文璅語曰齊景公伐宋至曲陵夢見有短丈夫賔扵前晏子曰君所夢何如哉公曰其賔者甚短大上小下其言甚怒好俛晏子曰則如是伊尹也伊尹甚大而短大上小下赤色而髯其言好俛而下聲公曰是矣晏子曰是怒君師不如違之遂不果伐宋方言曰鮆矲蒱揩反短也江湘之㑹謂之鮆昨啓反又曰癠桂林之中謂短矲東揚之間謂之俯今俗呼小為癠矲短也俯言俯視因名云汝南先賢傳曰周舉字宣光姿貌短陋有晏子之風陸允廣州先賢傳曰徐徴字君外為人短小果敢劉彦明燉煌實録曰汎㳺字世震博學善屬文為人短小弱冠屢陳損益續搜神記曰司徒蔡謨其親有王䝉者單獨常為蔡公所收養䝉長纔及三尺似為無骨登牀輒令人抱上桓譚新論曰諺云侏儒見一節而長短可知短絶域人詩含神霧曰東北極有人長九寸家語曰孔子曰焦僥氏長三尺短之至也國語同魏畧西域傳曰短人國在康居西男女皆長三尺衆甚多康居長老傳曰常有商行迷惑失道而到此國國中甚多珠夜光明商度此國去康居可萬餘里魏志曰倭南有侏儒國人其長三四尺去女王國四千餘里列子曰從中州以東三千餘里得焦僥國人長一尺六寸東北極有人名竫音靖人長九寸山海經曰周饒國為人短小著冠帶一曰僥焦國郭璞曰其人三尺漢武故事曰東郡送一短人長七寸衣冠具足疑其山精常令在案上行召東方朔問朔至呼短人曰巨靈汝何忽叛來阿母還未短人不對因指朔謂上曰王母種桃三千年一作子此兒不良已三過偷之矣遂失王母意故被讁來此上大驚始知朔非世中人短人謂上曰王母使臣來告陛下求道之法唯有清凈不冝躁擾復五年與帝㑹言終不見神異經曰西地荒中有小人焉長一尺圍如長朱衣𤣥冠乘軺車導引有威儀人遇其乘車並食之其味辛楚終不為虫豸所咋並識萬物名字殺腹中三蟲又曰西海之中有鵠國男女皆長七寸自然有禮好經論跪拜夀三百嵗人行如飛日千里百物不敢犯之唯畏鵠鵠遇吞之上夀三百嵗在鵠腹不死而鵠一舉千里張華注曰此陳章對齊桓公云西海之外鵠國男女皆七寸也廣南志曰東方有人長三尺君長出行導衛威儀有若中國人又有小人如螻蟻手撮之滿手得二十枚外國圖曰焦僥國人長一尺六寸迎風則偃背風則伏眉目俱足但野宿一曰焦僥長三尺其國草木夏死而冬生去九疑三萬里王子年拾遺記曰員嶠山有陁移國人長三尺夀萬嵗廣延之國人長二尺郭璞山海經圖賛曰焦堯極麽門可反靖人唯小四體俱足眉才了肥說文曰肥多肉也腴腹下肥也禮記禮運曰安之以樂而不逹扵順猶食而弗肥也四體既正膚革充盈人之肥也左傳哀下曰魯哀公至自越郭重僕孟武伯惡重曰何肥也公曰是食言多矣能無肥乎公與大夫始有惡公羊傳宣公曰楚莊王圍宋子反乘堞而窺宋城見華元曰何如華元曰易子而食析骸而炊子反曰吾聞圍國者鉗馬而秣之使肥者應客是何子之情也華元曰吾聞君子見人之惡則矜之小人見人之惡則幸之吾見子之君子也是以情也家語曰弱土之人肥漢書曰陳平少時家貧好讀書有田三十畆獨與兄伯常耕縱平逰學平為人長美色人或謂平貧何食而肥若是其嫂疾平不視家産曰亦食糠覈耳音紇京師人謂粗屑為紇頭也有叔如此不如無叔伯聞逐其婦又曰張蒼當斬觧衣伏質長大肥白如瓠王陵見而怪其美士乃言于沛公赦勿斬東觀漢記曰梁鴻妻同郡孟氏女狀醜而肥力舉石臼擇對不嫁愿得如鴻者因後為鴻妻謝承後漢書曰梁國車成字子威兄恩都為赤眉賊所得欲臠之成叩頭曰兄瘦我肥欲得代之賊感其義俱放之後漢書曰虞延字子大陳留東昏人也腰帶十圍力能扛鼎又曰東平王蒼腰帶八圍顯宗甚重之詔曰日者問東平王處家何等最樂言為善最樂其言甚大副是腰腹矣又曰尸董卓扵市天時暑熱卓素充肥脂流扵地守尸吏燃火置卓臍中光明逹曙後漢典畧曰馬騰字夀成扶風茂陵人馬援後也長八尺餘身體洪大面鼻雄異而性賢厚人多敬之魏志曰司馬懿奏免曹爽桓範踰城出為爽畫二策爽不能用範怒爽曰肥奴曹子丹好人生卿五六頭肉今桓範隨卿滅門也晋書曰王戎子萬有美名少而大肥戎令食糠而肥愈甚年十九卒晋中興書曰兖州既有八伯之號其後更置四伯大鴻臚陳留江淵以能食為榖伯豫章太守陳留史疇以大肥為太伯散騎侍郎髙二套嶷以佼妄為猾伯廬陵太守羊曼以狠戾為璅伯葢擬古之四凶晋書曰孝武即位桓温入朝拜髙平陵問左右殷清形狀答者言肥短温云向亦見在帝側後趙書曰王洛生石勒欲挫其權豪洛生在獄自刺腹深五寸洛生肥盛不䧟中重以刀潰其腹出胃而死宋書曰前廢帝狂悖無道誅害羣公忌憚諸父並聚之殿内毆捶凌曳無復人理始興王休仁及太宗山陽王休祐形體並肥壯帝乃以竹籠盛而稱之以太宗尤肥號為猪王又曰沈昭畧性狂雋不事公卿甞至婁湖苑逢王景文子約張目視之曰汝是王約也何乃肥而癡約曰汝沈昭畧耶何乃瘦而狂昭畧撫掌大笑曰瘦以勝肥狂又勝癡又曰范曄長不滿七尺肥黒禿眉鬢善彈琵琶能為新聲梁書曰安陵王大春字仁經􅀶渉書傳性孝謹體貌瓌偉腰帶十圍隋書曰王世續字闡熙容貌魁岸腰帶十圍風神爽㧞有俊傑之表尸子曰閔子騫肥子貢曰何肥也子騫曰吾出見其美車馬則欲之入聞先王之言則又思欲之兩心相與戰今先王之言勝故肥韓子曰子夏見曽子曰何肥也對曰戰勝故肥曽子曰何謂也子夏曰吾入見先王之義則榮之出見富貴又榮之二者戰扵胸臆今先王之義勝故肥淮南子曰繼子得食肥而不澤情不相往來也適子懐扵燕慈母喻扵荆情相往來也呉質别傳曰詔特進而下㑹質間曹真肥朱鑠臞質召俳優使說肥臞真曰卿欲陪典將過我耶遂爭而罷諸葛恪别傳曰孫權常問恪何以自娯而更肥澤恪對曰臣聞富潤屋徳潤身臣非敢自娱脩巳而已異苑曰晋司𨽻校尉髙平滿奮字武秋豐肥膚内潰裂每至暑夏輙膏汗流溢其有愛妾夜取以燃照炎灼發于屋表奮大惡之悉盛而埋之暨永嘉之亂為胡賊所燒皎若燭光㑹稽典畧録曰董孝治勾章人家貧採薪供養得甘果奔走以獻母母甚肥隣人家富有子不孝母甚瘦不孝子疾孝治母肥常苦辱之孝治不報及母終負土成墳鳥獸助其悲號䘮竟殺不孝子置冢前以祭詣獄自繫㑹赦得免方言曰益梁之間凡諱其肥盛謂之䑋如掌切肥貎也博物志曰京邑有一人失名姓食噉兼十許人遂肥不能動其父㑹作逺方長吏彼縣令故義共傳食之一二年中一鄉為儉張顯誓曰古諺文堯舜至聖身如脯腊桀紂無道肥膚三尺語林曰孟業為幽州其人甚肥或以為千觔武帝為稱之難其大臣乃作一大秤掛壁業入見武帝曰朕欲自秤有㡬觔業答曰陛下欲秤臣耳無煩復勞聖躬扵是秤業果得千觔世說曰太祖父嵩在太山太祖令太山太守應超送家詣衮州陶謨宻遣數十騎掩指嵩家俱穿後垣先出其妾肥不出逃扵厠與妾俱被害又曰庾公造伯仁曰君何所欣悦而忽肥庾曰君復何所憂慘而忽瘦伯仁曰吾無所憂直是清虛日來滓穢日去物理論曰榖氣勝元氣其人肥而不夀瘦釋名曰省瘦也臞省約少之言也説文曰羸委也瘠瘦也周禮地官司徒曰墳衍之人哲而瘠左傳㐮三年曰楚子使薳子馮為令尹訪扵申叔豫豫曰國多寵王弱不可為也遂以疾辭方暑闕地下氷大夫孝疾受氷而牀焉重蠒衣裘禮記玉藻曰纊為蠒緼為袍也鮮食􅃦楚子使醫視之復曰瘠則甚矣血氣未動乃使子南為令尹漢書曰張湯子安世女孫敬為霍氏外屬婦霍氏反當相坐安世瘦臞形扵顔色帝宣赦敬以慰其意東觀漢記曰和熹鄧后自遭大憂及新野君仍䘮諸兄甞悲傷思慕羸瘦骨立不能自勝又曰龎萌字明兄為赤眉所得欲啖之萌詣賊叩頭言兄年老羸瘠不如萌肥健願代兄賊義而不啖謝承後漢書曰楊彪見漢祚將移遂稱脚攣不復行積十餘年後子脩為曹操所殺曹見彪問曰公何瘦甚對曰愧無日磾先見之明猶懐老牛䑛犢之愛操為之改容獻帝春秋曰司空攻吕布扵下邳吕布登西北白樓上城䧟士擒以詣司空布曰明公何瘦司空曰所以瘦不早相得故耳司空曹操也三輔决録注曰張氏得鈎何氏得算故三輔舊語曰何氏算張氏鈎何氏肥張氏瘦言何氏有肥人輙貴瘦人輙賤張氏瘦者輙貴肥者輙賤故二族以鈎算知凶吉以肥瘦知貴賤文子曰神農形顇堯瘦將欲利萬人也韓子曰宓子賤治單父有子見之曰何瘁也曰官事急憂之故臞有子曰昔舜皷五絃之琴歌南風之詩而天下治今單父細治之而憂治天下將奈何故無術御之雖瘁臞未有益也世説曰鄧竟陵免官後赴山陵過見大司馬桓公問曰卿何以更瘦徐廣晋記曰鄧遐勇力絶人氣葢當世人方樊噲為桓温叅軍数從征伐為冠軍將軍竟陵太守枋頭之役温既懐耻忽見忌憚遐因免官遐曰有愧扵叔逹不能不恨扵破甑述異記曰甄法崇永初中為江陵令在任嚴明于時南平僇士為江安令䘮官至其年末崇在㕔事上忽見一人從門入云僇江安通法崇法崇知士已亡因問卿貌何故瘦答曰我生時所行善不補惡今繫苦役窮劇理盡魏明帝詔曹植曰王顔色瘦弱何意耶腹中調和不今者食㡬許米又啖肉多少見王瘦吾甚驚冝當節水加飡答詔表曰近得賜御食拜表謝恩尋奉手詔愍臣瘦弱奉詔之日涕泣横流雖文武二帝所以愍憐扵臣不復過扵明詔太平御覽巻三百七十八
