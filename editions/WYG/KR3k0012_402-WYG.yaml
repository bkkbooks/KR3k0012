body:
  text: 太平御覽卷四百二宋李昉等撰人事部四十三叙賢周禮地官曰以賢制爵則民慎徳又大學曰君子賢其賢而親其親詩黍離曰丘中有麻思賢也莊王不明賢人放逐國人思之而作是詩也丘中有麻彼留子嗟留大夫氏子嗟字也邱中麻麥子嗟所治箋云子嗟放逐於朝去治卑賤之職又曰白駒大夫刺宣王也刺其不能留賢者也皎皎白駒食我場苗縶之維之以永今朝宣王之末不能用賢者有乗白駒而去箋云願去者乗其白駒來者食我場中之苗縶維之欲留也書大禹謨曰野無遺賢萬邦咸寧又曰任賢勿貳去邪勿疑又說命曰爵罔及惡徳惟其賢又曰惟后非賢不乂惟賢非后不食又武成曰建官惟賢位事惟能又旅獒曰所寶惟賢則邇人安易曰坤地卦天地變化草木蕃天地閉賢人隠又大畜曰不家食吉飬賢也又頥曰天地養萬物聖人養賢以及萬民又繫辭曰可久則賢人之徳可大則賢人之業論語里仁曰君子見賢思齊焉見不賢而内自省也齊等也省察也察已得無然也又雍也曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂賢哉回也簞笥也貧者人之所憂而顔志道有所樂故深賢之又述而曰冉有曰伯夷叔齊何人也子曰古之賢人也又衛靈公曰臧文仲其竊位者歟知栁下惠之賢而不與立栁下惠魯士師展禽也其邑名栁下諡曰惠也又子張曰叔孫武叔毁仲尼子貢曰仲尼不可毁也他人之賢者邱陵也猶可踰也仲尼日月也無得而踰焉春秋繁露曰氣之清者為神人之精者為賢治身以練神為寶治國以積賢為道大戴禮曰帝入西學上賢而貴徳樂動聲儀曰召公賢者也明不能與聖人分識常戰慄恐懼故舍於樹下聽斷焉勞身者苦體然後乃與聖人齊是周南無美而召南之有韓詩外傳曰魏文侯問狐卷子曰父賢足恃乎對曰不足子賢足恃乎對曰不足兄賢足恃乎對曰不足弟賢足恃乎對曰不足臣賢足恃乎對曰不足文侯勃然作而怒曰寡人問此五者於子子一以為不足者何也對曰父賢不過堯而丹朱放子賢不過舜而瞽䏂拘弟賢不過周公而管叔誅臣賢不過湯武而桀紂伐君欲治從身始人何恃國語曰智宣子將以瑶為後宣子荀寅瑶宣子之子智伯也智果曰不如霄也智果荀氏之族也霄宣子庻子也宣子曰霄也很很矣不從人也對曰霄之很在靣瑶之很在心心很敗國面很不害瑶之賢於人者有五其不逮者一美鬢長大則賢鬢髪鬢也射御足力則賢伎藝必畢給則賢巧文辯惠則賢強毅果敢則賢若是而甚不仁夫以其五賢陵人而以不仁行之其誰能待之若果立瑶也智宗必㓕弗聽智果别族于太史為輔氏太史掌氏姓也及智氏之亡也唯輔果在又曰臼季使舎於冀野臼季胥臣冀野晉地見冀缺耨其妻饁之相敬如賓耨耘田也野鐼曰饁字音時從而問之冀芮之子也與之歸既復命進之曰臣得賢敢以告文公曰子何以知其賢對曰臣見其賢不忘敬也公使為下軍大夫史記曰燕昭王於破燕之後即位卑身厚幣以招賢者謂郭隗曰齊因孤之國亂而襲破燕孤極知燕少不足以報然得賢士與共國以雪先王之恥孤之願也先生視可者得身事之郭隗曰王必欲致士必從隗始况賢於隗者豈逺千里哉於是昭王為隗改築宫而師事之又曰伯禽就封於魯周公戒伯禽曰我文王之子武王之弟成王之叔父我於天下亦不賤矣然我一沐三握髪一飯三起以待士猶恐失天下之賢人子之魯慎無以國驕人又曰楚昭王聘夫子夫子往焉路出陳蔡大夫謀曰夫人賢者所刺譏皆中諸侯之病若用於楚則陳蔡危矣遂使兵拒之孔子不得行家語曰孔子謂宓子賤曰子治單父衆恱信如何得之對曰此地民有賢於不齊者不齊事之事而禀度焉皆教不齊以治道孔子歎曰昔堯舜聽天下務求賢以自輔夫賢人百福之宗神明之主也惜乎不齊之所治小也又曰子夏問於孔子曰顔囘之為人奚若子曰囘之信賢於我曰子貢之為人奚若子曰賜之敏賢於我曰子路之為人奚若子曰由之勇賢於我曰子張之為人奚若子曰師之莊賢於我子夏避席而問曰然則四子者何為事先生子曰居吾語汝夫囘能信而不能反反謂反信也君子言不必信唯義所在也賜能敏而不能詘言人唯辨敏亦宜有折屈時也由能勇而不能怯師能莊而不能同言人雖務莊亦當有和同時也兼四子者之有以易吾吾弗與也此其所以事吾而不一也又曰孔子讀史至楚復陳夏徴舒弑其君楚莊王討之取陳而有之申叔時諫莊王王從之乃復陳國也喟然曰賢哉楚莊王輕千乗之國而重一言之信非申叔時之忠弗能達其義非莊王之賢弗能受其訓又曰所謂賢者徳不踰閑閑法行中規繩又曰哀公問於孔子曰當今之君孰者最賢孔子對曰丘未之見抑有衛靈公乎公曰吾聞其閨門之内無别而子次之賢何也孔子對曰臣論其朝廷行事不論其私家之際也公曰其事何也孔子曰靈公之介弟曰公子渠牟其智足以治千乗其信足以守之靈公愛而任之又有士曰王林者見賢必進之而退與分其禄是以衛國無遊放之才靈公知而尊之又有士子慶足者國有大事則必成而治之國前事則退客賢信其所以退欲以客賢於朝靈公恱而敬之又有大夫史鰌以道去衛靈公郊舎三日琴瑟不御必待史鰌之入而後敢入臣以此取之雖次之賢不亦可乎孔叢子曰魯人有公儀􅇓者厲節行道恬於榮利不事諸侯子思與之友穆公因子思欲以為相謂子思曰公儀子必輔寡人三分魯之一子思對曰如君之言則公儀子愈所以不至也若飢渇待賢納用其言雖蔬食飲水亦願在下風今徒以髙官厚禄釣餌君子無信人之意公儀子則終身不躡乎君之庭矣且臣不為君操竿下釣以傷守節之士也又曰子思自齊反衛君館而問曰先生魯國之士不以衛褊小猶步玉趾而慰存之願有賜於寡人子思曰羇旅於此而辱君之威尊亟臨蓽門其榮多矣欲報君以財幣則君府藏已盈而伋又貧欲報君以美善恐未合君心而徒言不聽也願有報君者唯達賢耳君曰固寡人所願也任子曰夫賢人者至徳以為巳心行道以為己任處則不求私名仕則不求私寵不為其身不阿其君積禮義於朝播仁風於民使天下之人翼翼焉向戴其君之尊欣欣焉歌舞其君之徳文子曰山有猛獸林木為之不斬野有螫蟲葵藿為之不採國有賢臣折衝千里列子曰牛缺者上地之大儒也至邯鄲遇盗於耦沙之中盡取其衣裝車牛步而去視之欣然無憂苦之色盗追而問其故曰君子不以所養害其所養盗曰嘻賢矣既而相謂曰彼之賢往見趙君使以我為事必困我乃相與追而殺之孫卿子曰古之賢人賤為布衣貧為匹夫然而非禮不進非義不受莊子曰以財分人謂之賢尹文子曰尹文子見齊宣王王歎國寡賢尹文子曰使國悉賢孰處王下王曰國悉不肖可乎尹文子曰國悉不肖孰理王朝王曰賢與不肖皆無可乎尹文子曰不然有不肖故王尊於上臣卑於下進賢退不肖所以有上也王孫子曰趙簡子獵於晉山之陽撫轡而歎董安于曰敢問歎子曰吾食榖之馬數千多力之士數百以獵獸也恐鄰國養賢以獵吾也文子曰虎豹之駒未成而有食牛之氣鴻鵠之翼未合而有四海之志賢亦然也又曰國之所以不治者三不知用賢此其一也或求賢不能得此其二也雖得弗能盡此其三也申子曰千里有賢者是比肩而立韓子曰晉平公問叔向曰吾羣臣孰賢對曰武賢武之立如不勝衣言如不出口然其所舉士者數十人皆令得其意而公家甚賴之况武子之生也不利其家死不託其孤臣敢以為賢孟子曰國君進賢如不得已將使卑踰尊疎踰戚可不慎歟左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之吕氏春秋曰伊尹出空桑之中長而賢湯聞伊尹使人請之有侁氏有侁氏不可伊尹亦欲歸湯湯於是請取妻於有侁氏有侁氏喜使伊尹為媵送女故賢主之求有道之士無不以也有道之士求賢主無不行也相得然後樂不謀而親不約而信之相為殫智竭力犯危行苦志懽樂之此功名所以大成也又曰伯里奚之未遇時亡虢而虜飯牛於秦鬻以五羊之皮公孫枝得而悦之獻諸繆公三日請屬事焉繆公曰買之五羊之皮而屬事無乃為天下笑乎枝曰信賢而任之君之明也讓賢而下之臣之忠也君為明君臣為忠臣彼為信賢境内將服敵國且畏夫誰暇笑哉遂用之謀無不當舉必有功號曰五羖大夫又曰史台謂申向曰吾所患者不知賢申向曰人之患不在乎不言用賢而在乎不誠用賢夫言用賢者口也却賢者行也言行相反而欲賢者用不肖者廢不亦難乎人主誠用賢則境内賢者出矣天下賢者至矣又曰得十良馬不如得一伯樂得寸良劍不如得一歐冶得地千里不如得一賢人又曰魏文侯過段干木之閭而軾其僕曰君胡為軾曰此非段干木之閭歟干木盖賢者也吾安敢不軾又曰趙簡子將襲衛使史墨行瞶之瞶視也音貴期以一月六月而反趙簡子曰何其久也對曰謀利而得害猶弗察也今蘧伯玉為相史鰌佐焉孔子為客子貢使令於君前甚聽君聽其言易曰渙其羣元吉渙者賢也羣者衆也元者吉之始也渙其羣元吉其佐多賢簡子案兵不動周書隂符曰凡治國有三常一曰君以舉賢為常二曰官以任賢為常三曰士以敬賢為常夫然雖百代可知也京房易飛候曰何以知賢人隠師曰視四方有大雲五色具而不雨下賢人隠也易叅同契曰天道無適莫常傳與賢者黄石公三曰瑢曰傷賢者殃及三世蔽賢身當其害達賢者福流子孫嫉賢者其名不令陸賈新語曰聖人居髙處上則以仁義為巢秉危屨傾則以聖賢為杖説苑曰周公卜居曲阜命龜曰作邑于山之陽賢則茂昌不賢則速之又曰夫朝無賢人猶鴻鵠之無羽翼是故絶江海者託於船致遠道者託於乗欲霸王者託於賢又曰明君在上慎於擇士務於求賢設四佐以自輔有英俊以治官又曰伯禽與康叔朝成王見周公三見而三笞康叔有駭色謂伯禽曰有商子者賢人也與子往見之康叔與伯禽見商子曰吾二子者朝乎成王見周公三見而三笞其説何也商子曰二子盍相與觀南山之陽有木焉名曰橋二子者往觀乎南山之陽見橋竦然實髙而仰反以告商子商子曰仰者父道也商子曰二子盍相與觀乎南山之隂有木焉名曰梓二子者往觀乎南山之隂見梓勃焉實而俯反以告商子商子曰俯者子道也二子者明日見乎周公入門而趨登堂而跪周公拂其首勞而食之曰安見君子二子對曰見商子周公曰君子哉商子也又曰孔子之郯遭程子於塗傾盖而語終日有間顧謂子路曰取束帛以贈先生子路不對有間又顧謂曰取束帛以贈先生子路率然對曰由聞之也士不中間而見女無媒而嫁非君子之行也孔子曰詩不云乎野有蔓草零露團兮有美一人清揚婉兮邂逅相遇適我願兮今程子天下之賢士於是不贈終身弗見也中間謂紹介也六韜曰文王舉賢若何太公曰案察實選才任能名實俱得也物理論曰在金石曰堅在草木曰𦂳在人曰賢千里一賢謂之比肩故語曰黄金累千不如一賢杜氏幽求子曰封千里而以八州之地禄賢抱朴子曰桓文漢髙鼔羣賢以為六翮託豪傑以為舟檝傳子曰或問近世大賢君子若荀令君之仁荀軍師之智斯可謂近世大賢人士君子矣荀令君仁以立徳明以舉賢行無謟瀆謀能應機孟軻稱五百年而有王者其間必有命世者荀令君乎桓譚新論曰以賢代賢謂之順以不肖伐不肖謂之亂論衡曰賢聖之君察知佞臣若視之俎上之脯指掌中之文風俗通曰聖堅也堅中亷外也白虎通曰王者即位先封賢者憂民之急也故列土為壇非為諸侯張官設府非為卿大夫皆為民也越絶書曰子胥正而信范蠡智而明皆賢人也􅇓夫論曰南面之大務莫急於知賢異苑曰汝南陳仲弓與諸息姪就潁川荀季和父子于時徳星為之聚太史奏曰五百里内有賢人集列女傳曰衛靈公與夫人夜坐聞車聲轔轔至闕而止過闕復有聲公問曰知此為誰夫人曰此必蘧伯玉也問何以知之曰妾聞禮下公門式路馬所以廣敬也夫忠臣不為昭昭信節不為冥冥墮行今伯玉衛國賢大夫也仁而有智敬於事上此其人必不以闇昧廢禮是以知之公使視之果伯玉也反戲之曰非也夫人進觴再拜賀之公曰子何以賀之曰始妾謂獨有伯玉今衛復有與之齊者是君有二賢臣也國多賢臣則國之福也西京雜記曰漢文帝為太子立思賢苑以招賓客周裴汝南先賢傳曰黄憲潔浄通理齊聖廣淵不矜名以詭特不抗行以矯俗論者咸曰顔子復生乎漢之代矣論林曰賢者國之紀人之望自古帝王皆以之安危故書曰惟后非賢不乂惟賢非后不食昔者周公體大聖之徳而勤於吐握由是天下之士争歸之向使周公驕而且吝士亦當髙翔逺去所至寡矣王褒聖主得賢臣頌曰夫賢者國家之器用也君人者勤於求賢而逸於得人故聖主必待賢臣而𢎞功業俊士亦候明主以顯其徳千載一會論說無疑翼乎如鴻毛之遇順風沛乎若巨魚之縱大壑其意如此則胡禁不止曷令不行鍾子芻蕘論曰賢者一處世猶金玉生於沙礫豫章産乎幽谷下不之進於上則無由而至矣太平御覽卷四百二
