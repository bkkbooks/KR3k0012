body:
  text: 太平御覽卷二百七十六宋李昉等撰兵部七良將下良將下後周書曰王思政初入潁州士卒八千人城既無外援亦無叛者思政常以勤王為務不營貲産嘗被賜園池思政出征後家人種桑果及還見而怒曰匈奴未滅去病辭家大賊未平何事産業命左右㧞而去之故身陷之後家無積蓄又曰元定有勇畧毎戰必䧟陣然未嘗自言其功太祖深重之諸將亦稱其長者又曰蔡祐少有大志與鄉人李穆齊名嘗相謂曰大丈夫當建立功名以取富貴安能乆䖏貧賤耶言訖各大笑又曰王羆為華州刺史時茹茹渡河南冦候騎已至幽州朝廷慮其深入乃徴兵發士馬屯守京城塹諸街巷以備侵軼右僕射周専達召羆議之羆不應命謂其使曰若茹茹在渭北者王羆率鄉里自破之不煩國家兵馬何為天子城中遂作如此驚動由周家小兒性怯致此羆輕侮權勢守正不阿皆此類也又曰劉亮本名道徳累遷左大都督從擒竇泰復𢎞農與沙苑之後並力戰有功遷車騎大將軍開府封長廣公亮以勇敢見知為當時名将兼屢陳謀䇿多合機宜太祖謂之曰卿文武兼資即孤之孔明也乃賜名亮賜姓侯莫陳氏出為東雍州刺史卒喪還京師太祖親臨之泣而謂人曰股肱喪矣腹心何寄又曰王傑本名文達太祖竒其才擢授揚烈将軍羽林監尋加都督太祖嘗謂諸将曰王文達萬人敵也但恐勇决太過耳復潼関破沙苑爭河橋戰邙山皆以勇敢聞親待日隆賞賜加於倫等於是賜姓宇文氏又曰于謹平江陵還太祖親至其第宴語極歡賞謹奴婢一千口及寳物并金石絲竹樂一部謹自以乆當權望隆位功名既定願保優閒乃上先所乗駿馬及所著鎧甲等太祖識其意乃曰今巨猾未平公豈得便爾獨善遂不受又曰蔡祐字承先有膂力便騎射從征伐常潰圍䧟陣為士卒先軍還之日諸將爭功祐終無所競太祖每嘆之嘗謂諸將曰承先口不言勲孤當代其論叙其見知如此三國典畧曰周髙琳每征戰勇冠諸軍太祖謂之曰公即我之韓白也又曰胡僧祐為梁名将常以鼓吹置於齋中恒坐對之以自娱玩或諫之曰公名望隆重朝野具瞻此是羽儀可自居外僧祐曰我性愛之恒須見耳又曰北齊斛律金字阿六敦朔州勅勒部人光禄大夫那瓌之子性敦直善騎射行兵用匈奴法望塵識馬歩多少嗅地知軍度逺近神武戒文襄曰有讒此人者勿信之文宣嘗與金宴射親持矟走馬以擬金胸者三金堅不動賜帛千疋因過其宅置酒作樂北史曰隋文帝嘗從容命髙熲與賀若弼言及平陳事熲曰賀若弼先獻十䇿後於蔣山苦戰破賊臣文吏耳聞焉敢與将論功帝大笑時論嘉其有讓又曰周将王思政乆經軍旅每戰唯着破衣弊甲敵人疑非将帥故得免又曰韓果從平竇泰於潼闗周文因其規畫軍以勝返賞真珠金帶一腰隋書曰李宻父寛驍勇善戰幹略過人自周及隋数經將領至柱國蒲山郡公號為名将又曰史萬嵗少英武善騎射驍捷若飛好讀兵書兼精占候又曰宇文忻每叅帷幄出入卧内禪代之際忻有力焉後拜右領軍大将軍恩賜彌重忻妙解兵法馭戎齊整當時六軍有一善事雖非忻所建在下輒相謂曰此必忻法也其見推服如此又曰薛世雄性㢘謹凡所行軍破敵之處秋毫無犯帝由是嘉之帝嘗從容謂羣臣曰我欲舉好人未知諸君識不羣臣咸曰臣等何能測聖心帝曰我欲舉者薛世雄羣臣皆稱善帝復曰世雄㢘正有古人之風於是超拜右翊衛将軍又曰楊𤣥感欲立名隂求将領謂兵部尚書段文振曰𤣥感世荷國㤙寵踰涯分自非立効邊裔何以塞責若方隅有風塵之警庶得執鞭行陣少展絲髪之功明公兵革是司敢布心腹文振因言於帝帝嘉之顧謂羣臣曰將門必有將相門必有相故不虛也於是賚物千段禮遇益隆又曰突厥入朝上賜之射突厥一發中的上曰非賀若弼無能當此於是命弼冄拜而咒曰若赤誠奉國者當一發破的如其不然發不中也既射一發而中上大恱顧謂突厥曰此人天賜我也唐書曰劉黒闥為竇建徳将竒兵東西揜襲多所尅獲每臨危難而色不變軍中號為神勇又曰屈突通平薛仁杲之際寳物山積諸將争取通一無所犯髙祖聞之曰通清正奉國著於終始名下定不虛也賜金銀六百兩雜綵千段又曰右武侯將軍張士貴破反獠而還太宗勞之曰聞公親䝉矢石為士卒先雖古名将無以加也朕嘗聞以身報國者不顧性命嘗聞其語未覩其實於公方見之矣又曰文徳皇后之葬也段志𤣥與宇文士及分統士馬出宿於章武門太宗夜使宫官至二将軍所宇文士及披戸内使志𤣥閉門不内曰軍門不可夜開使者曰此有手勅志𤣥曰夜中不辨真偽竟停使者至曉太宗聞而嘆曰此真将軍也周亞夫何以加焉又曰霍王元範髙祖第十四子也母曰張美人元範少善騎射初為吴王時嘗從太宗逰獵遇羣獸命射之矢不虛發獸無遺者太宗撫其背曰汝才藝過人恨今無所施耳當天下未定我得汝豈不安乎又曰王君廓統兵經略東都王世充将郭士行許羅漢前後入掠君廓輒擊退之拜右武衞將軍詔勞之曰卿以十三人破賊一萬自古以少擊衆未之前聞非惟驍勇絶人亦足以顯卿忠莭也又曰突厥入寇王君廓邀擊破之俘斬二千餘人獲馬十五疋髙祖聞而大恱徴之入朝賜與御馬令殿廷乘之而出又謂侍臣曰吾聞藺相如叱秦王目皆出血君廓徃擊建徳將出戰徐勣遏之君廓憤發大呼目及鼻耳一時流血此之壮氣何謝古人不可以常例賞之復賜錦袍金帶還領豳州又曰髙宗時吐蕃䧟安西四鎮長夀初蕃軍逼安西府則天令威武軍總管王孝傑将軍阿史那忠莭等率師拒之孝傑至安西合戰屢㨗大破蕃軍收復龜兹于闐䟽勒碎葉等城而還則天大恱謂侍臣曰昔貞觀年中俱統得此蕃城其後西陲不守並䧟吐蕃今既復舊邉境自然無事孝傑建兹功効盡忠欵誠遂能裹足徒行身與士卒齊力如此忠懇深足可嘉遷左衞大将軍又曰薛仁貴擊九姓突厥於天山軍将發髙宗出甲令仁貴射之射穿九重九姓衆十餘萬令驍健十人逆來挑戰仁貴發三箭中三人其餘下馬請降並坑之更就磧北安撫餘衆而還軍中歌曰将軍三箭定天山将士長歌入漢關又曰劉仁軌顯慶四年出為青州刺史五年大軍征遼令仁軌監統水軍以後期免特令以白衣随軍自效尋檢校帶方州刺史兼熊健道行軍長史乃别領水軍二萬襲破倭賊萬餘於白波敵獲船艦四百餘艘倭及躭羅等國皆遣使詣仁軌請降初仁軌將發帶方州謂人曰天将富貴此翁耳乃於州司請厯日一卷并七廟諱人􅏜其故答曰擬削平遼海頒示國家正朔使邊俗遵奉焉至是果以軍功顯正除帶方州刺史又曰郭元振為安西大都䕶時安西突厥首領烏質勒部落强盛欵塞通和元振就其牙帳計㑹軍事時天大雪元振立於帳前與烏質勒言議須臾雪深風冷元振未嘗移足烏質勒年老不勝寒苦㑹罷而死又曰李晟臨洮人也祖思恭父欽代居隴右嘗為禆将晟數嵗而孤事母以孝聞少雄烈有材力善騎射年十八從軍身長六尺勇敢絶倫時河西節度使王忠嗣擊吐蕃有驍将乗城拒鬭頗多殺士卒忠嗣募軍中能射者射之晟乃引弓一發而斃三軍大呼忠嗣厚賞之因撫其背曰此萬人之敵也又曰貞元五年九月馬燧與太尉晟召見於延英殿上喜其有大勲力皆圖形於凌煙閣列於元臣之次九年十月召見延英殿因拜手仆於地上親起之又曰王栖耀性謹厚善騎射始起兵渉冦境太深遇遊騎四合百歩内立表俾之環視發必破的敵相顧恐懼徐而解去嘗獵㑹稽山中有逸林白額獸卒起草中應弦而斃在蘇州嘗與文士遊虎丘寺平野霽日先一箭射空再發貫之江東文士自梁肅已下歌詠焉又曰李愬既執送吴元濟裴度建彰義軍節擁降卒萬餘人次入焉李愬具櫜鞬候度馬首度将避之愬曰此方不識上下等威之分乆矣請公因以示之度以宰相禮受愬謁衆聳觀焉明日愬以師還文城柵度乃視節度使觀察及刺史事蔡人大恱又曰李光顔為河東禆将討李懐光楊惠琳皆有功後随髙崇文平蜀搴旗斬将出入如神由是稍稍知名授兼御史大夫時兄光進官亦至兼御史大夫軍中號曰大大夫小大夫國語周語曰召公告單襄公曰吾有三伐勇而有禮反之以仁吾三逐楚君之卒勇也見其君必趨禮也能獲鄭伯而捨之仁也老子曰以道佐人主者不以兵强天下果而勿矜果而勿伐河上公注云當果敢推讓勿自伐取其美也六韜曰兵入殷郊見太公曰是吾新君也而商容曰非也其人虎據而鷹峙威怒自副見利欲發進不顧前后見武王曰是新君也見敵不怒獻帝春秋曰張遼問吴降人曰紫髯将軍長上短下誰也答曰是孫㑹稽㑹稽典録曰張立之為人剛毅志意慷慨太祖嘗抑之曰爾不念詩書慕聖道而好乘汗馬擊劒此一夫之用何足貴也謂左右曰丈夫當為衞霍将十萬馳沙漠驅遠方立功建號耳何能作博士耶荆州記曰鄧遐襄陽人也勇力絶人厯位冠軍将軍数郡太守號名将袁子世說曰吕布之破也太祖統衆官軍乗便取軍中物唯所欲衆人皆重載唯袁渙取書数百卷資糧而已衆人聞之大慙劉向新序曰孫武樂毅之徒皆前世之賢将也乆逺深奥其事難知至於吴漢近時人耳起於敗馬立為良将垂名竹帛天下歸徳此可慕也太平御覽卷二百七十六
