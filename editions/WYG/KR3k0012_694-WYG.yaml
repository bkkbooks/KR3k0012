  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_694-1a, image: WYG0899/WYG0899-0216c.png}
body:
  text: 太平御覧卷六百九十四宋李昉等撰服章部十一裘説文曰裘皮衣也禮曰十月之莭天子始裘又曰唯君黼裘以警省大裘非古也君衣狐白裘錦衣以裼之君之右虎裘厥左狼裘士不衣狐白君子狐青裘豹褎𤣥綃衣以裼之麛裘青豻褎紋衣以裼之豻胡犬也音岸紋蒼黄之色也羔裘豹飾緇衣以裼之狐裘黄衣以裼之錦衣狐裘諸侯之服也犬羊之裘不裼庻人無文飾裘之裼也見美也又曰童子不衣裘裳裘大温又曰有若曰晏子一狐裘三十年言其太儉偏下又曰良冶之子必學為裘補器者其金柔乃合有似於裘詩曰羔裘如濡洵直且侯羔裘豹飾孔武有力羔裘晏兮三英粲兮晏鮮盛貌三英三德剛克柔克正直也又曰君子至止錦衣狐裘顔如渥丹其君也哉又曰一之日于貉取彼狐狸為公子裘又曰羔裘逍遥狐裘以朝羔裘翺翔狐裘在堂羔裘如膏日出有曜又曰彼都人士狐裘黄黄左傳曰狐裘尨茸一國三公吾誰適從又曰齊人以郲寄衛侯右宰榖從而逃歸衛人将殺之辭曰余不悦初矣余狐裘而羔䄂乃赦之狐裘羔袖言一身盡善唯少有惡喻雖從出其罪不多又傳曰公賜公衍羔裘使獻龍輔於齊侯龍輔玉名遂入羔裘齊喜與之陽榖陽榖齊邑又傳曰齊侯伐晉夷議東郭書譲登犁彌從之齊侯嘗犁彌辭曰有先登者從之晳幘而衣狸製晳白也幘齒上下相值製裘也公使視東郭書曰乃夫子也論語曰緇衣羔裘素衣麑裘黄衣狐裘禮曰仲秋獻良裘季秋獻功裘良善也功謂人工麄也又曰宫角掌王宫之士庻子庻子宿衛之官月終則均秩嵗則均叙以時頒其衣裘史記曰秦昭王囚孟嘗君欲殺之孟嘗使人抵昭王幸姬求觧姬曰妾願得君􅈢白裘此時孟嘗君有一􅈢白裘直千金天下無雙入秦獻之昭王更無他裘孟嘗君患之客最下能為狗盗者曰臣能得􅈢白裘乃夜為狗盗以入秦宫藏中取所獻裘奉姬姬為言於王王釋孟嘗君漢書曰賈誼上書陳文帝曰天下咸知陛下之義卧赤子天下之上而安植遺腹朝委裘服䖍曰言天下安雖赤子遺腹在位猶不危也孟康曰委裘君客衣太子未坐朝事先帝裘衣也東觀漢記曰東平王蒼來朝帝以王觸寒渉道賜乘輿貂裘又曰蔡彤為遼東太守鮮卑奉馬一疋貂裘二領後漢書曰馬援嘆曰殖貨財産貴其能施賑也否則守錢虜耳乃盡散以班昆弟故舊身服羊裘皮袴又曰嚴光世祖時遊學及世祖即位乃變名隠身不見帝思其賢令以物色訪之後齊國上言曰有男子披羊裘釣澤中帝令齎𤣥纁聘之三聘而後至謝承後漢書曰劉虞為幽州刺史常着氊裘魏氏春秋曰高文惠為刺姦令史夙夜匪懈至擁膝抱文書而寤寢太祖嘗夜㣲出觀察諸吏見而哀之徐觧裘覆之而去吳志曰陸遜破曾休上為郡寮大㑹酒與遜對舞觧所着􅏈子裘賜遜晉書曰趙王倫字子彞初封瑯琊郡王坐使散騎劉緝買工所将盗御裘廷尉杜友正緝弃市倫當與緝同罪有司奏倫爵重属親不可坐諌議大夫劉毅駿曰王法賞罰不阿貴賤然後可以齊禮制而明典刑也倫知裘非常蔽不語吏與緝同罪又曰桓𤣥殺羅企生先是𤣥以羔裘遺企生所生母及企生遇害即日焚裘又曰王恭嘗披鶴氅裘歩雪行孟旭曰此神仙中人也王隠晉書曰步熊字束羆好學兼術數趙王倫辟熊熊言倫死不乆不足應有人告倫倫遣圍之熊使諸生着已裘南走圍者皆奔之熊宻從北道走得脫又曰王敦恭軍摯瞻見敦以故壊裘賜老外部都督曰此裘雖故不如與小吏敦曰何故瞻曰上服賜下貂蟬亦可賜下乎齊書曰文帝製孔雀毛裘又曰文惠太子性奢侈製珍玩之物織孔雀毛為裘光采金翠􅂈於雉頭逺矣北齊書曰唐邕字道之少明敏有治世才觧律金啓太后曰唐邕强幹一人當千顯祖乃觧所服青䑕皮裘賜之云意在與卿共敝趙書曰汲桑盛暑重裘重茵使人扇之恚不清凉斬扇者軍為之語曰仕為将軍何可羞六月重茵披􅈢裘不識寒暑斷人頭晉咸寕起居注曰大司馬程㨿上雉頭裘一領詔曰㨿此裘非常衣服消費功用其於殿前燒之勅内外有造異服詔罪之晉令曰山鹿白豹遊毛􅈢白貂領黄貂班白鼲子渠捜國裘皆禁服也瑞應圖曰王者奉五行教民種植以事則渠捜國來獻裘王者德茂不耻惡衣服則四夷乘白鹿來獻白裘黄帝出軍决曰黄帝伐蚩尤未克夣西王母遣道人披𤣥􅈢之裘以符授之管子曰武王為侈靡令曰豹䄡豹裘方得入廟故豹皮百金功臣之家糴千鍾未得一豹皮晏子曰景公時雨雪三日公披􅈢白之裘曰怪哉雨雪三日不寒晏子曰古之賢者居飽而知人飢温而知人寒今君不知也公乃命出裘以與寒發粟以與飢又曰晏子至晉有中年眸暗弊冠反裘負芻者晏子曰子何者對曰我越石父也不免凍餓為人僕三年晏子解左驂贖之又曰景公賜晏子􅈢白裘其貿千金晏子辭而不受三反曰君服之上而使嬰服之下不可以為教墨子曰江河之水非一源千鎰之裘非一狐又曰晉文公好士之惡衣故文公臣皆解裘列子曰林類年且百威書傳無聞盖古之義士也底春而裘於畦底當也秦青子曰有千金之裘而無千金之布田休子曰渠捜之人服夏禹德獻其珎裘毛出五彩光曜五色又曰少昊氏都於曲阜鞬鞮毛人獻其羽裘韓子曰齊有盗狗子與胡跪子相誇盗狗子曰吾父之裘獨有尾胡跪子曰吾父冬夏獨有一足袴又曰堯之王天下也冬則鹿裘夏則葛絺又曰孫叔敖相楚衣羖羊裘又曰孔藂子曰田子方遺孔子思􅈢白裘也符子曰為千金之裘而與􅈢謀之其皮不可得呂氏春秋曰天下無粹白之􅈢而有粹白之裘取之於衆白也又曰孔子始用於魯魯人謗之曰麛裘而􅔖受之無戾􅔖而麛裘授之無郵用三年男行乎途左女行乎途右物之遺者民莫之舉淮南子曰夫夏日之不披裘者非愛之也煖有餘於身也裘與蓑孰急見雨則裘不用上堂則蓑不御此代為貴者代更也白狐之裘天子之被也而在朝堂然為􅈢計者不若走於澤披羊裘而賃困其事也狐裘而負籠甚可怪也抱朴子曰􅈢白不可以當暑説􅁐曰晉平公使叔嚮聘吳吳人飾舟以逆左右各五百人有繡衣而貂裘者説􅁐曰林既衣韋衣而朝齊景公曰此君子服耶既作色曰服何足以端士行如君言衣狗裘當犬號羊裘當羊鳴乎今君衣狐意得無變乎又曰千金之裘非一􅈢之皮也説苑曰晉平公出朝有鳥環平公不去平公謂師曠曰吾聞之覇王之主鳳下之今者出朝有鳥環寡人終朝不去是其鳳鳥耶曠對曰東方有鳥名諌珂其為鳥也文身而赤足憎烏而愛狐今者君必衣􅈢裘以朝乎平公曰然又曰趙簡子弊車痩馬衣羖羊裘其宰曰車新則安馬肥則疾狐裘則温君宜改之簡子曰君子服善則益恭小人服善則益踞新序曰魏文侯出遊見反裘負芻者問之對曰愛毛也文侯曰爾不知皮盡而已無所附耶明年東陽上計其布十倍大夫賀之文侯曰民不増而税倍亦何異反裘負芻者厚取於下則上不安此自危之道也子何用賀乎新論曰振裘持領萬毛皆整潜夫論曰挾夫私計以論公政與狐議裘無時可得也西京雜記曰司馬相如初與卓文君至成都居貧愁憊以所服鷫鸘裘貰酒與文君為歡又曰度宴年十五為成帝侍郎善鼔琴后悦之曰正得出入御内絶見愛幸常着輕絲履招風紫綈裘與后同居又曰成帝好蹙鞠群臣以勞體非尊者所宜帝曰可擇似而不勞者奏之劉向作弹碁以獻帝大悦賜青羔裘紫絲履拾遺記曰周昭王綴青鳳毛為二裘一名燠質一名暄肌可以禦寒也至厲王流于彘彘人得而竒之分裂此裘遍于彘土罪入大辟者抽裘一毛以贖死直萬金也五經要義曰古者著裘於内而以繒衣覆之乃加以朝服朝會之時袒其朝服見裘覆衣謂之裼裼之言露可見之辭所以示美呈好而為飾加以朝衣謂之襲袒謂之裼大裘不覆反本以質也又曰諸侯黼裘以誓田雜羔裘為黼文也白虎通曰裘所以佐女工助温也古者緇衣羔裘黄衣狐裘禽獸衆多獨以狐羔取其輕煖因狐死首丘明君子不㤀本也羔取其跪乳遜順也黄帝世紀曰夏禹時渠捜國來獻褐裘也春秋後語曰淳于髠見鄒忌曰狐裘雖敝不可補以黄犬之皮忌曰諾謹受教請擇君子無雜小人其間戰國䇿曰蘇秦説李允允送秦黒貂裘黄金百鎰又曰蘇秦説秦王上書十上而説不行黒貂之裘敝黄金百鎰盡形容枯槁及歸妻不為下機嫂不為炊又曰或謂孟嘗君曰太廟之椽非一木之枝也千鎰之裘非一狐之皮也吳越春秋曰延陵季子適齊見路有遺金當夏五月有披裘而薪者季子呼取金薪者曰吾五月披裘而薪資以金者哉外國圖曰毛民國出名裘去朔方七千里十洲記曰漢武帝天漢三年西國獻吉光裘色黄盖神馬之類入水不沉入火而不灼管寕别傳曰寧字㓜安至孝每祭祀未嘗不伏地流涕恒着布裳貂裘㑹稽典畧曰魏朗字少英為郡功曹佐正旦掾吏顧龕被裘以加朝服朗以裘非臣服龕不敬勅卒撒去龕恚而不聼朗右手鳴鼓左手撒裘以聞府君喜朗遂退龕以朗代之朗辭病不就語林曰謝萬就安乞裘云畏寒答曰君妄語正欲以為豪具耳若畏寒無復勝綿者以三十斤綿與謝世説曰謝萬與安共詣簡文萬來無衣幘可前簡文曰但前不須衣幘即呼使入萬着白綸布鵠氅裘履䄂而前共談移日大器重之宋玉風賦曰主人之女被翠雲之裘崔寔四民月令曰嚢虫並興以灰藏氊裘魏武與楊彪書曰今贈足下錦裘二領魏文與孫權書曰今因趙咨致文馬一疋鼲子裘一領王昶家戒曰止寒莫若重裘止謗莫若自脩太平御覧卷六百九十四
