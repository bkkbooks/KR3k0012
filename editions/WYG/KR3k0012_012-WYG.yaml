body:
  text: 太平御覽卷十二宋李昉等撰天部十二雪霰露雪釋名曰雪綏也水下遇寒綏綏然下也詩曰北風其涼雨雪其雱又上天同雲雨雪雰雰雰雰雪貎也豐年之冬必有積雪又昔我往矣楊柳依依今我來思雨雪霏霏又蜉蝣掘閱麻衣如雪禮記孟春行冬令則水潦爲敗雪霜大摯傳曰隱公九年三月庚辰大雨雪凡平地尺爲大雪三月今正月也大雪失時也又楚子次于乾谿雨雪王皮冠秦復陶秦所遺羽衣也翠被豹舄執鞭以出易通卦驗曰乾得坎之蹇則當夏雨雪詩推度灾曰逆天地絶人倫當夏雨雪大戴禮曰天地積隂温則爲雨寒則爲雪春秋元命苞曰隂揚而爲雪史記曰東郭先生久待詔公車貧困饑寒衣弊履不完行雪中履有上無下足盡踐地道中人笑之漢書曰漢女者居東海養姑姑女䜛之於姑姑詣太守訴而殺之五月下雪又蘇武使於單于幽武置大窖中絶不與飲食天雨雪武卧齧雪與氊毛并咽之數日不死匃奴因以爲神又壺廣鞮單于自將領萬騎擊烏孫㑹天大雪一日深丈餘人民畜産凍死續漢書曰赤眉入安定北地逢大雪坑谷皆滿多凍死晉書曰王恭衣鶴氅雪中行時人謂之神仙中人又太傅謝安雪驟降公欣然曰白雪紛紛何所似兄子客兒曰撒鹽空中差可擬兄女道韞曰未若柳絮因風起又東瀛公騰公姓司馬名騰伐石勒於常山屯營時天大雪有一處方數丈融液怪而掘之得一玉馬髙尺許以為晉家之瑞晉朝雜事曰太康七年河隂雨赤雪二頃宋書曰大明中元日雪花降殿庭右將軍謝莊下殿雪暴衣白上以爲嘉瑞羣臣皆作雪花詩崔鴻北涼録曰先酒泉南有銅駝山言犯者大雨雪沮渠䝉遜遣工取之得銅萬觔宋齊語曰孫康家貧常映雪讀書唐書曰郭元振爲安西大都䕶時西突厥首領烏質勒部落强盛欵塞通和元振就其牙帳計㑹軍事時天大雪元振立於帳前與烏質勒言議須㬰雪深風凍元振未嘗移足烏質勒年老不勝寒苦㑹罷死焉録異傳曰漢時大雪積地丈餘洛陽令自出案行見民家皆除雪出有乞食者至袁安門無有行路謂安已死令人除雪入戸見安僵卧問何不出安曰大雪人皆餓不宜干人令以爲賢舉為孝亷韓詩外傳曰凡草木花多五出雪花獨六出雪花曰霙音英皇甫謐髙士傳曰世莫知焦光所出野火燒其廬光因露寢冬雪大至光袒卧不移人以爲死就視知生穆天子傳曰日中大寒北風雨雪有凍死人天子作黄竹詩三章以哀之曰我徂黄竹負閟寒閟閉也音秘又雨雪天子獵於鈃山之西河漢武内傳曰西王母曰仙之上藥有𤣥霜絳雪烈士傳曰左伯桃羊角哀相與爲死友聞楚王好士欲往仕之道遇雨雪計不俱全乃併衣糧與角哀入樹而死陸機别傳曰機誅日平地尺雪時人以爲寃曹攄别傳曰攄爲洛陽令于時大雪而宫門夜忽失行馬攄曰此非他竊理可保明必是門士以療寒驗之而具服王子年拾遺記曰穆王東至大㩬音竒之谷西王母來進嵰丘儼反州甜雪嵰州去玉門三十萬里地多寒雪霜露著木石之上皆融而甘可以為菜也又周靈王起昆昭之臺招致神異有二人乘游龍飛鳳之輦王迎之上席時天旱地裂其一人先倡能爲霜雪王乃請焉於是引氣一吸則雲起雪飛又廣延之國去燕七萬里在扶桑東其地寒盛夏之日冰厚至丈常雨青雪冰霜之色皆如紺碧沙洲記曰自龍涸至大浸川一千九百里夜肅肅常有風寒七月雨便是雪遥望四山皓然皆白西京雜記曰董仲舒曰太平之世雪不封條凌弭毒害而已莊子藐姑射之山有神人居焉容膚若冰雪綽約若處子曽子曰隂氣勝則凝雪孟子曰滕文公卒葬有日矣天大雨雪至牛目羣臣請弛期太子不許惠公諌曰昔王季葬渦山之尾灤水齧其墓見棺前和文王曰先君欲見羣臣百姓矣乃出爲帳三日而後葬今太子亦宜白先王欲少留而撫社稷故使雪甚弛期而更為日比文王義也太子曰善又齊宣王見孟子於雪宫王曰賢者亦有此樂乎孟子曰爲民上而不與民同樂者亦非也晏子春秋曰景公時雨雪三日公被狐白之裘見晏子公曰怪哉雨雪三日不寒晏子曰古之賢君飽而知人饑温而知人寒公曰善乃脫裘發粟以與饑寒者秦子曰今欲騁光日下顯白雪中不可得也孫子曰昔衛君重裘累茵而坐見路有負薪而哭之者問何故也對曰雪下衣薄是以哭之於是衛君懼見於顔色曰為君而不知民孰以我爲君於是散府金出倉粟以賑貧淮南子曰欲滅迹而走雪中金匱曰武王伐紂都洛邑隂寒雨雪十餘日深丈餘甲子平旦不知何五大夫乘馬車從兩騎止門外王使太師尚父謝五大夫賔幸臨之失不先聞方修法服太師尚父使人持一噐粥出進五車兩騎曰走生大夫在内方對天子寒故進熱粥却寒粥皆畢使者具以告尚父尚父問武王曰客可見矣五車兩騎四海之神與河伯雨師耳王曰不知其名尚父曰南海神曰祝融東海神曰勾芒北海曰𤣥㝠西海曰蓐收河伯雨師請使謁者於殿下門内以名召之神皆驚相視而歎語林曰王子猷居山隂大雪夜開室命酌四望皎然因詠招隱詩忽憶戴安道時在剡乗興棹舟訪之經宿方至既造門而返或問之對曰乘興而來興盡而返何必見戴安道氾勝之書曰取雪汁漬原蠶屎五六日待澤手挼之和穀種之能御旱故謂雪為五穀之精也山海經曰由首之山小咸之山空桑之山冬夏有雪論衡曰雲霧雨之徵也夏則為露冬則為霜温則為雨寒則為雪雨露凍凝者具由地發不從天降琴操曰曾子耕太山下雨雪不得歸思父母作梁山操廣志曰雲南郡四月猶積皓雪代郡至五月山隂猶宿雪八月末復雪宋玉對問曰客有歌於郢中始曰下里巴人國中屬而和者數千人及爲陽春白雪國中屬而和者不過數十人是故其曲彌髙其和彌寡宋謝惠連雪賦曰歲將暮時既昏寒風積愁雲繁梁王不恱遊於兎園乃置旨酒命賔友召鄒生延枚叟相如末至居客之右俄而微霰零密雪下王乃歌北風於衛詩詠南山於周雅相如於是避席而起逡巡而揖曰臣聞雪宫建於東國雪山峙於西域岐昌發詠於來思姬滿申歌於黄竹曹風以麻衣比色楚謡以幽蘭儷曲盈尺則呈瑞於豐年袤丈則表沴於隂德其為狀也散漫交錯氛氲蕭索藹藹浮浮瀌瀌奕奕聨翩飛灑徘徊委積始緣甍而冐棟終開簾而入隙既因方而爲珪亦遇圓而成璧眄隰則萬頃同縞瞻山則千巖俱白於是臺如重璧逵似連璐庭列瑶階林挺瓊樹皓鶴奪鮮白鷴失素楚辭九辯曰雪霰紛糅女救反又䰟兮來歸兮北方不可止些層冰峨峨飛雪千里些峨鮮苛反又霰雪紛其無垠些雲霏霏承宇些司馬相如美人賦曰時既西些元隂晦㝠涼風蕭然素雪飄零伏元之雪賦序曰結隂凝雪皎如帔素謝靈運詩曰明月照積雪朔風勁且哀樂府歌詩曰皚如山上雪皎如雲間月聞君有兩意故來相决絶庾肅之雪讚曰皎如天漢色踰玉粲李顒悲四時曰雲霮徒敢反䨴徒對反以時興雪聨翩而聚密枯林皦如瓊翰空岫即若玉室王昭之詠雪離合曰霰先集兮雪霏霏散空中兮被簷庭曲室寒兮朔風厲川陸涸兮百籟鳴霰釋名曰霰星也冰雪相摶補各反如星而散說文曰霰積雪也從雨散聲詩曰如彼雨雪先集維霰爾雅曰雨霰爲消雪郭璞注云霰冰雪雜下故謂消雪又雨雪相和爲霰尚書洪範五行傳曰盛隂雨雪凝滯而冰寒陽氣薄之不相入則散而爲霰故沸湯之在閉噐而湛於寒泉則爲氷及雪之消亦水解而散此其驗也韓詩薛君注曰霰霙也曽子曰隂之專氣爲霰露釋名曰露慮也覆慮物也許愼說文曰露潤澤也從雨路聲詩曰厭於接反浥行露豈不夙夜謂行多露又蒹葭蒼蒼白露爲霜又湛湛露斯匪陽不晞又野有蔓草零露漙徒官反兮又野有蔓草零露瀼瀼如章反禮曰立秋後十五日白露降又季冬行秋令則白露早降又天不愛其道故天降甘露又春雨露既濡君子履之必有怵惕之心焉如將見之感時念親又王所以爲順而弗悖也天降甘露易通卦騐曰立秋白露下尚書中候曰堯時甘露降詩含神霧曰陽氣終白露為霜宋均曰白露行露也陽終隂用事故曰白露凝爲霜也大戴禮曰露隂陽之氣也夫隂氣勝則凝為霜雪陽氣勝則散為雨露禮斗威儀曰君治政則軒轅之精散為甘露春秋繁露曰恩及於物順於人而甘露降春秋序曰桀無道露冬下春秋元命苞曰霜以殺木露以潤草又隂陽散為露五經通義曰和氣津液凝為露露從地出吳越春秋曰子胥諫吳王王怒暮歸舉衣出宫宫中羣臣皆曰天無霖雨宫中無泥相君舉衣行髙何為子胥曰吾以越諫王王心迷不聽吾言宫中生草棘霧露沾吾衣羣臣聞之莫不悲傷漢書曰宣帝元康元年甘露降未央宫大赦天下後漢書曰桓帝永康元年秋八月魏郡言嘉禾生甘露降謝承後漢書曰吳郡沈豐爲零陵太守至官一年甘露降膏潤草木范蔚宗後漢書曰明帝永平十七年夢見先帝光烈皇后夢覺悲不能寐明旦上陵其日甘露降於陵樹帝令百官採之帝伏御牀流涕也又成帝幸河東祠后土甘露降京師東觀漢記曰光武時甘露降四十五里魏志曰明帝鑄承露盤莖長一十二丈銅龍繞其根立於芳林園甘露乃降又明帝與東阿王詔曰昔先帝時甘露屢降於仁夀殿前靈芝生芳林園中自吾建承露盤已來甘露復降於芳林園仁夀殿前晉書曰皇甫謐㓜時有甘露降其柳樹謐母以食之謂蜜也晉中興書曰王者敬養耆老則甘露降於松栢尊賢容衆則芹葦受之甘露者仁澤也其凝如脂其美如飴宋書曰文帝元嘉中甘露頻降狀如細雪隋書曰李徳林趙郡柏人人也性至孝丁父憂單縗徒跣後甘露降其樹白鳩巢其廬豫章耆舊傳曰太守陳蕃臨郡二年甘露降汝南先賢傳曰新蔡鄭敬都尉髙懿㕔前槐樹有白露類甘露懿問掾屬皆言是甘露敬曰明府德政未致甘露但樹汁耳懿不悅因稱疾而去洞㝠記曰勒畢國人長三寸有翼善言語戲笑因名語國飲丹露為漿丹露者日初出有露如珠也又東方朔遊吉雲之地漢武帝問朔曰何名吉雲曰其國俗常以雲氣占吉凶若占樂之事則滿室雲起五色照著於草木皆成五色露露味甘帝曰吉雲五色雲可以得否朔乃東走至夕而還得元黄青露盛之琉璃噐以授帝帝遍賜羣臣得露嘗者老者少疾病皆愈又元封二年數過國獻能言龜一頭長一尺二寸東方朔曰唯承樹露以飲之王子年拾遺記曰崑崙山有甘露望之色如丹著木石赭然如朱雪灑焉以瑶器承之如飴周處風土記曰白鶴性警至八月露降流於草上滴滴有聲則鳴述仙記曰八月一日作五明囊盛取百草頭露以之洗眼眼明也老子曰天地相合以降甘露人莫之令而自均出書林事類莊子曰姑射之山有神人焉不食五穀吸風飲露鶡冠子曰聖徳上及太清下及太寧中及萬靈則膏露下蘇子曰夫子殆若露之託桐葉耳其與幾何吕氏春秋曰伊尹說湯曰水之美者有三危之露三危西極山名和之美者楬雩之露其色紫淮南子曰方諸取露於月髙誘曰方諸隂燧也東方朔神異經曰西北海有人長二千里兩脚中間相去千里腹圍一千六里但日飲天酒五斗張華云天酒甘露也又黄父以霧露為漿古史考曰太古之初民吮露精食草木實劉向說苑曰吳欲伐荆王令曰敢有諫者死舎人有少孺子者欲諫懐彈於後園露霑其衣如是三朝王曰子求何苦露霑衣如是對曰園中有樹其端有蟬蟬髙居悲鳴飲風噏露不知螗蜋在其後曲跗方無反欲取其蟬而螗蜋又不知黄雀居其後延頸欲啄之然黄雀又不知臣操彈丸在其下臣但捕其黄雀不覺露霑衣此者爲窺其利而不思其後患王聞之遂不伐荆又騰虵遊於霧露千里不止漢武帝故事曰帝作金莖擎玉杯以承雲表之露擬和玉屑服之以求仙又作銅承露槃上有仙人掌以承露也蔡邕月令章句曰露者隂液也釋爲露凝為霜白虎通曰甘露者美露也降則物無不盛又露者霜之始寒即變爲霜論衡曰甘露味如飴王者之應則降地鏡圖曰視山川多露無霜其下有美玉徐整長厯曰北斗當崑崙山氣運注天下春夏為露崔豹古今注曰薤露䘮歌言人命如薤上露易晞滅也其一章曰薤上露何易晞露晞明朝更復落人死何時歸瑞應圖曰露色濃甘者謂之甘露王者施德惠則甘露降其草木又甘露者美露也神靈之精仁瑞之澤其凝如脂其甘如飴一名膏露一名天酒又王者徳至於天和氣感則甘露降於松栢山海經曰軒丘降甘露人常飲之又諸沃之野揺山之民甘露是飲不夀者八百歲列星圖曰天乳一星在氐北主甘露占若明而潤則甘露降不然則否也楚辭曰朝飲木蘭之墜露夕餐秋菊之落英張衡奏事曰飛塵増山霧露増海曹植魏徳論曰𤣥德洞幽飛化上蒸甘露以降蜜淳水凝覩暘弗晞瓊爵是承獻之帝朝以明聖徵曹植承露盤銘叙曰夫形能見者莫如高物不朽者莫如金氣之清者莫如露盛之安者莫如盤乃詔有司鑄銅建承露盤于芳林園束晳集曰薄冰凝池非宗廟之寳零露垂林非綴冕之飾張載羽扇賦曰濯以雲精拂以芝露太平御覽卷十二
