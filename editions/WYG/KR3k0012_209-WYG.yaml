front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_209-1a, image: WYG0894/WYG0894-0815a.png}
body:
  text: 太平御覽卷二百九宋李昉等撰職官部七大司馬三公府掾屬大司馬韋昭辯釋名曰大司馬馬武也大總武事也大司馬掌軍古者兵車一車四馬故以馬名官周禮夏官曰太司馬之職掌建邦國之九法以佐王平邦國平成也制畿封國以正邦國封為立封立疆為界設儀辨位以等邦國儀謂諸侯之儀别尊卑之位進賢興功以作邦國作起也起其勸善樂業之心使不廢建牧立監以維邦國牧州牧也監監一國謂君也維聨結也制軍詰禁以均邦國詰猶窮治也均猶正也施貢分職以任邦國職謂賦税也任猶事以其力之所任也簡稽鄉民以同邦國簡謂比數之也稽猶訓也均守平則以安邦國均之者尊守大卑守小也則者法也比小事大以和邦國比猶親也使大國親小國小國事大國相和合也以九伐之法平邦國諸侯有違王命則出兵以征伐所以正之尚書曰司馬掌邦政統六師平邦國毛詩曰祈父祈父司馬也予王之爪牙春秋運斗樞曰黄帝與大司馬容光觀鳯凰銜圖置黄帝前尚書中候曰稷為大司馬舜為太尉尚書大𫝊曰蠻夷滑夏寇賊奸宄則責之司馬韓詩外𫝊曰故隂陽不和四時不節星辰失度灾變非常則責司馬河圖録運法曰黄帝坐立扈閣上與大司馬容光左右輔将周昌等百二十人觀鳯凰銜書家語曰賢能而失官爵功勞而失賞禄士卒疾怨兵弱不用曰不平不平則飭司馬史記曰楚大司馬景舍帥軍滅蔡蔡侯奉社稷而歸之楚發其賞舍辭曰發誠布令而敵退是王威也相攻而敵退是將威也戰而敵退是衆威也臣不宜以衆威受賞漢書曰元狩四年上命大將軍衞青驃騎將軍霍去病各将兵五萬騎數十萬出塞斬首捕虜有功廼置大司馬又曰董賢為大司馬時年二十二雖為三公常給事中領尚書百官因賢奏事單于来朝宴見羣臣上前單于怪賢年少以問上令報曰大司馬年少以大賢居位單于乃起拜賀漢得賢臣又曰孝元王皇后成帝母也家凡十侯五大司馬外戚莫盛焉又曰成帝綏和元年賜大司馬金印紫綬置官属禄比丞相東觀漢記曰更始欲以近親廵行河北大司徒賜言上弟秀可用更始以上為大司馬遣之河北又曰䜟云孫咸征狄命以平狄将軍孫咸行大司馬事後漢書曰世祖北擊羣賊吴漢将突騎五千為軍前鋒數先登陷陣及河北平漢與諸将奉圖書上尊號世祖即位拜漢為大司馬又曰帝疾瘳召見隂興欲以代吴漢為大司馬興叩頭流涕固讓曰臣不敢惜身誠恐虧損聖徳不可苟冒至誠發中感動左右帝遂聽之漢官序曰三司之職司馬主兵漢承秦曰太尉武帝改曰大司馬無印綬官兼加而已世祖改曰太尉吴志曰赤烏九年秋七月以車騎朱然為左大司馬衛将軍全琮為右大司馬晉書石苞太始之初為大司馬舊參軍於都督無敬故孫楚抗衡於苞苞以楚傲更相表禮故㕘軍有敬自楚始也又曰齊王冏之盛也有一婦人詣大司馬府求寄産吏詰之婦人曰我截臍便去耳識者聞而惡之又曰陳騫咸寧初轉大司馬騫因入朝言於帝曰胡列䑓宏皆勇而無謀强於自用非綏邉之材将為國耻願陛下詳之時宏為揚州刺史不承順騫命帝以為不恊相搆乃徴宏既至復以為凉州刺史騫竊嘆曰以為必敗二人後果失羌戎之和皆被寇喪役征討連嵗僅能得定帝乃悔之晉武帝太始官名曰大司馬石苞開通爽悟秉意不辟晉公卿禮秩曰司馬兵官也魏氏大司馬大将軍各自為官在三司上晉以石苞為大司馬次三司下晉諸公賛曰義陽王為大司馬時父孚為太宰父子居上公中代以来未之有也晉中興書曰王猛少貧賤常至洛陽貨畚有人於市買其畚云家近在此可隨我取直猛隨去忽至深山此人曰且住當先啟道君須㬰猛進見一公踞胡床頭白侍從十許人有一人引猛云大司馬公可進猛因拜老公曰王公何縁拜即十倍售畚直遣人送猛出回視乃嵩髙山也齊職儀曰大司馬品第一秩中二千石金章紫綬武冠絳服朝佩山𤣥玉其在少昊則雎鳩氏之任顓頊以司馬主火堯命羲叔為司馬夏官也唐虞二代以司夏官棄居其職周成王以畢公髙為司馬楚漢之際曹參周勃始居其職又曰大司馬府舊為闕王莽篡位故貶去焉後魏書曰安定王休領大司馬髙祖親行諸軍遇休以三盜人狥於六軍斬之有詔赦之休執曰陛下将逺親衝盧故親御六師䟦踄野次軍行始爾已有奸竊如其不斬何以息盜詔曰大司馬執憲誠如是但因縁㑹朕王者之體亦時有非常之澤雖為軍法可特原之休乃奉詔髙祖謂司徒誕曰大司馬嚴而秉法君不可不慎於是六軍肅然後周書曰夏官謂之大司馬管子曰昔黄帝得風后辨乎四方故使為司馬又曰凉風至白露下天子命左右司馬全組甲勵士衆傅子曰曹大司馬之勇賁育弗如也博物志曰太公望為灌壇令文王夢見婦人當道哭問其故曰吾太山之神嫁為西海婦灌壇令當吾道夢見召太公三日果疾風暴雨文王乃拜太公為大司馬班彪上事曰元狩六年罷太尉置司馬時議以北軍中候有千人司馬故加之大司馬所以别大小司馬之號也三公府掾属太尉長史應劭漢官儀曰太尉司徒司空長史秩比千石號為毗佐三台助和鼎味太尉掾汝南先賢傳曰鄧盛字伯真蒼梧人為太尉諸曹掾彭城相左尚以賍罪三府掾属拷騐踰科不竟更選盛覆拷盛到獄洗沐尚觧械賜席乃謂尚曰君受國重恩而所坐事理如此今遇君子不可以小人道相持尚感盛至意對曰今使君相於如此尚獨何心敢不以死相歸乎即引筆具對衛玠别傳曰玠字叔寳陳㽞阮千里有令聞當年太尉王君見而問曰老荘與聖教同異阮曰将無同太尉善其言而辟之為掾世號曰三語椽君見而嘲之曰一言可辟何假三阮曰苟是天下民望可無言而辟復何假於一言崔寔政論曰且三公天子之股肱掾属則三公之喉舌天子當恭已南面三公亦委䇿掾属以荅天子太子從事中郎後魏書曰郭景尚字思和渉厯書𫝊遷太尉從事中郎善事權寵世呼為郭尖干寳司徒議曰從事中郎之職各掌其所治之曹而紀綱其事體參輔謀議太尉主簿後魏書曰元慶智性貪鄙為太尉主簿事無大小得物然後判為十錢二十錢得便取之府中號曰十錢主簿廣州先賢𫝊曰鄧盛字伯直為秭歸令聞母病解印綬决去太尉司馬公嘉其所履服竟辟之初入府為主簿司徒長史東觀漢記曰吴梁為司徒長史以清白方正稱干寳晉記曰傅咸為司徒長史多所執正齊書劉撝為司徒左長史宋世與上數逰㑹撝同宋明帝射雉郊野渴倦撝得旱青瓜與上對剖食之上懐其舊徳意眄良厚至是一嵗三遷梁書曰褚球字仲寳為司徒左長史加貂自球始也干寳司徒儀曰左長史職掌檢其法憲明其分職司徒掾漢書曰武帝時司徒奏州郡農桑未有賞罰宜遣掾属循行詔遂使司徒督察州郡播植有所循者增掾属十人謝承後漢書曰虞延辟司徒侯覇府掾正旦百官賀朝上望見延在公府掾属中馳小黄門問曰故陳留督郵虞延非耶對曰是遂前召見漢襍事曰陳寵為司徒掾先是公府掾多不親事但以交接為務寵常獨親事魏書曰王粲字仲宣年十八司徒掾辟遷黄門不就晉書曰魏舒為司徒時陳留周震累為諸府所辟辟書既下公輙喪亡僉號震曰殺公掾莫有辟者舒固辟之而竟無患識者以此稱其達命又曰周馥遷司徒左曹掾司徒王渾奏曰馥理識清敏有才幹主定九品檢括精詳臣委任責成褒貶允當請補尚書郎許之干寳司徒儀曰掾属之職敦明教義肅勵清風非禮不言非法不行以訓群吏以貴朝望各掌其所治之曹鍾離意别𫝊曰司徒侯霸辟意署議曹掾以詔書送徒三百餘人到河北遭隆冬盛寒徒衣被单手足不能復行到𢎞農縣使令出見錢為徒作襦袴令曰不被詔意曰使者奉詔命寧私行耶出錢便上尚書使者意當上之光武皇帝得上状見覇曰所使掾何仁恕為國用心乎誠良吏也司徒属東觀漢記曰司徒侯覇辟閔仲叔到與相見勞問之不及政事仲叔曰始被眀公辟且喜且懼及奉見明公喜懼皆去所望明公問属何以為政美俗成化以仲叔為不足耶不當辟也如以為任用而不使陳之則為失人是以喜懼皆去便辭而出晉中興書曰殷融字宏逺司徒王導以為右西属融飲酒善舞終日笑詠未甞以事務自嬰導甚相親悦焉司徒從事中郎晉中興書曰潁川荀組字大章司徒王渾表曰左西属組文義貞素清識見稱宜轉中郎陶氏家𫝊曰廽字恭淵為大司徒王導從事中郎為人正直不撓導亦以此重焉每言曰中郎有輔佑之才真國器也司徒諮議參軍晉中興書曰廬江何充字次道為司徒王導諮議參軍後魏書曰李絲為主客郎齊文㐮王攝選以絲為司徒諮議參軍因謂之曰自郎署此所謂不次以卿人才故有此舉耳司徒主簿三國典畧曰齊許惇䕶之子也性識敏速達於從政嘗為司徒主簿以能判時人號為人鐵主簿司空掾魏志曰國淵字子尼太祖辟為司空掾属每於公朝議論常直言正色退無私焉又曰太祖為司空丞相毛玠甞為東曹掾與崔琰並為選舉其所舉用皆清正之士雖時有盛名而行不由本者皆莫得進務以儉率人由是天下之士莫不以亷節自勵雖貴寵之臣輿服不敢過度太祖嘆曰用人如此天下自治吾復何憂哉太平御覽卷二百九
