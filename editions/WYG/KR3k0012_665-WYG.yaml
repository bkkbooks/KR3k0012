  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_665-1a, image: WYG0899/WYG0899-0008c.png}
body:
  text: 太平御覽卷六百六十五宋李昉等撰道部七劎觧太極真人石精金光藏景録形神經曰制劔之法上宰惣真西城玉君昔授於紫陽公施行道成惣真昔用劍觧之道又授九轉丹方於里長先生此即周人也東鄉序云潄龍胎而死宜服瓊英先師王西城本是飲丹後用劍觧而不言服九轉者當是雖授而不遂合用後以付門弟子茅君亦是受而不用故云付耳茅君傳南嶽魏夫人夫人傳楊君故安妃云可尋劍解之道但不知遂用不耳許長史既服腴石或當不必為其事椽從鎮南夜觧則又非此法椽許長史子也若是太清觧及单用劍者應不得及望故鄉而椽遊䖏方臺還居本邦也神劍用之而觧化則能遊宴太極採五星之靈䡄煥七元之威光以範儀烈映真氣故軒轅喬山之𦵏劍舄在焉王子渤海之冢劍鳴空槨王喬景陵之墓劍飛冲霄斯實真騐九𤣥精應太靈神方靈致威劍之妙化也諸以尸觧者以劍代身五百年之後此劍皆自然還其䖏以劍觧者不必止是用丹書空劍亦可幽響無聞恍惚難尋不可得言矣不可得言之法見之者惟當應之於心耳神竒歘怳變動無方非復物理所期正當恩心任化即事從冝耳為之者亦不覺其所以見之者固莫測其所然軒轅採首山之銅以鑄鼎虎豹百禽為之視火恭鑪鼎而軒轅疾崩塟喬山五百年後山崩寳劍赤舄在焉一旦又失王子者曽詣鍾山獲九化十變經以隠遁日月逰行星辰後一旦疾終營冢渤海山夏襄時有發王子墓者一劍在北􅆍上自作龍鳴人無敢近後亦失所之王子喬墓在景陵戰國時復有發其墓者見一劍人適欲取視其劍忽然上飛去王子喬事舊説浮丘公携與乗鶴共登嵩山此事不同觧化時年正十五六耳故戴逺逰冠也昔葛洪云隂君授鮑靚尸觧之法後死埋石子崗有人發其棺見一大刀塚左右有人馬之聲遂不敢取此是觧劍法而不能飛去此是周靈寳太𤣥隂生符朱書刀矣太清之下故得主者而已按玉清靈傳説惣真帶劍楊君説同柏帶劍此並應是先觧劍化也真人用寳劍以尸觧蝉化之上品也夫尸觧之法多如蟬蜕今此劍非蛻也故云上品明變遁之髙道也營造劍之時先齋戒百日乃於幽隠䖏近清泉立西向屋作竈口亦西向善鍜人鍊好鉄生鋌合鍊成令得八觔為足也若欲窮其精理當用竹炭又以銅錫柔沃如此用歳月功夫殊多所以古人作劍三年然後成也薛燭云歐冶鑄劍赤水之上破而出錫若耶之洞溪常出銅今以此合燒則煉多而不燥剛利而銷其鍜人亦湏温良新衣沐浴造劍之日尤不得飲酒食肉及逰履淹穢七月庚申日八月辛酉日使長三尺九寸廣一寸四分厚三分半謂背脊上近柄間令厚三分半也至兩刅際可减一二厘耳又向刃邉先殺背二分乃自兩至抄亦以漸令薄也抄九寸為左右兩䖏當從鐶項定度整三尺刻背為刄亦廣三分八厘必使中脊餘六分也抄九分合殺兩邉令尖殺抄鋒令有兩稜如㦸抄殺鋒也其柄用長短適令鐶髙二寸四分身長二寸四分則餘一尺二寸六分以柄為鉄因當中央令廣九分厚二寸與鐶相連柄操梓材近籙圍四寸九分刃圍三寸九分皆以釦竟為正若作劍装則促扁於此也劍頭可安籙鐶謂發始鍊剛仍使鐶身相連勿别作模合作釘連之都使外形大小厚薄相似乃鑿除應空之内亦可先鑚作數孔鑿為易其伏基䖏鑿鏝之都畢令大環髙二寸四分横分廣䖏對中徑二寸八分内方員徑四分鐶形古今多法或正圓或狹長或如鼎耳乃有十許種今此經中所圗亦是􅂋其左右法耳非正定形也謹准製古今取其合度立圗如左又鐶之内不得正圓如竹亦不得正方如界盡當令内靣小方而外落稜角必令得刻已刃字不甚邪轉佳使長三尺九寸耳尺寸度數厚薄形制並備如别圗尋古今尺長短不同九章筭法皆積毫釐之度晋中書監荀朂善音律伎藝常恨八音不調後有人掘地得一玉尺銘題周世短晋尺四分半以改定音律聲韻合度今冝用此尺為准所以示者惣真桐柏並以周時作劍用周尺也籙鐶者鏤刻劍鐶止左右面刻之作刄字面有九字也鐶背上刻作九已字也深刻字皆從刀背而下順刄謂兩邉刀及字已皆對從刄背邉起俱下就刄故曰順刄也順鐶而刻之隨鐶曲轉故曰順鐶也諸刻䖏欲得以金銀間之益分眀佳也劍身刻象鐶中央復有竪起如小羊鐶者名之曰伏基之義謂為日月之基隠秋光景也内鐶左面為日字内鐶者即小鐶之中伏基也刻右面為月字先又圓刻日月之外為郭也五百年還出以揮五嶽入以藏無間謂潜靈遁迹隠影藏形也下以制九隂謂可攝召九隂之神也上以承𤣥冥星主隠變也衛足以逐邪魔威足以鑒七情謂控威乗勢鑒照七星也仰以映五色謂五行之氣常栖映也俯以代身化行矣欲知劍之左右内外以見正指南使劍背在上使劍刄在下也於是以東東面右西面為左也東為内面西為外面此劍尺度長短廣狹厚薄刻鏤文字乃太極四真人靈劍之模範也上清真人亦皆帶劍上清之劍並是太極所造耳故此經為太極之法乃四真人定範何必須昆吾之金剛玉之鋌也此葢明不必湏精鉄所存者模範而已王子喬劍乃凢下之鉄耳喬山尸觧之劍非昆吾之流金也此太極真人紫陽公告王君也軒轅駕龍𤣥圃是歩綱之詞以術以觧化後乃行前真多有此例此劍經前章也太極上化符以飛精書紙盛以紫嚢欲去時以係劔鐶右以曲晨飛精書劍左面令至劍抄也又太極藏景符飛精書紙盛以絳嚢欲去時以係劍鞘右以曲晨飛精書劍右面令至劍抄也又太極籙形符以飛精書紙臨去之日服之身生七色之雲自有電光右以曲晨飛精書劍背正當兩刄之際也又太極化符恒日或一符七年去朱書竹中帛秘要也是合曲晨丹成臨欲觧化時以題劍七年以後朱題劍亦能觧化陶隠居曰晋永嘉中劉㦎呼麥功多竒識亦云是異人作此劍乃依佛符字殊細設婁羅鐶製大乖而法鑯甚快利宋來便恒供衛衛名曰劉㦎鈸與千年刀同寶久已易去鐶摩刻䖏亦漸漸欲㓕又見有四五故鐶並相似如一不知其劍身何在東山顧居士亦造此諸人有同時共製者今猶存焉大抵違謬不可具説乃有銅鑄作環以釘鑄著故刀如此並可以類推今此儀式惟是陶隠居所造深心匠觧亦謂理極未知必同大極模範不耳凢試刄之利鈍取中形芸数枚急束以一髪懸其秒繫于杖頭令一人執之乃以劍一斫芒㫁而髪猶連計芸多少為優劣劉㦎鈸千年刀皆舊斫十三芒又有一百鍊剛刀斫十三芒國中惟穪此為絶而近造神劍斫十五芒觀其鐡色青激光彩有異葢薛燭所謂澳如氷之将釋者矣頃來有作者十餘人皆不及此作剛朴是上虞謝平鑿鏤装治平聲是石尚方師黄文慶並是中國絶手以齊建武元年甲戌歳八月十九日辛酉造於茅山至梁天監四年乙酉歳勅令造刀劍形供御用窮極精巧竒䴡絶世别有製法時公家自作百鍊黄文慶因此得免餘役為山舘道士也周禮制劍長三尺柄居五寸是六分之一也内刄廣二寸半重古秤一觔四兩今秤二觔十兩也今公家劍長四尺七寸柄居一尺五寸是三分之一小减也刀廣一寸六分輕重不定此寳劍長三尺九寸廣一寸四分而經有刀劍兩名晋武帝大始十年中書監荀朂及張華等校定鍾律八音不與古樂相諧由漢來用尺漸長乃更依周禮積黍法制尺以量鑄新器募求古物得周世正玉律比之毫厘無差因擊古鍾以律命之亦此響合兼以七鍾右物相課皆㑹又得汲冢竹簡亦長二尺四寸於是施用謂之古尺阮咸聼茍樂聲以為過髙非興國之音咸亡後有人掘地得銅尺長荀古尺之四分半時人以阮咸之觧音遂復施行謂之官尺令司農相承以制五尺并取積寸以作㪷斛也宋元嘉中大将軍彭城王義康制物毎欲廣大又加官尺寸半民間復有相與用之者今謂之尚方御府都水材官用尺乃復長民間一分諸如衆例則以古尺為勝鍾律宫商自然響㑹是合精神𠖇數且周世有玉尺製劍之時兼荀張窮極精巧時又有束晢雷煥之徒妙貫神鬼阮咸雖善音樂而性度縱誕不能清切故以单綬為好耳掘地銅尺應是後漢時尺也梁天監四年又更校尺以調正鍾律定用張荀古尺半分於事合𠂻今施用名曰法尺又曰若欲潜遁名山隨時觀化不願真官隠浪自足者當脩劍尸觧之道以曲晨飛精書劍左右面先逆自托疾然後當抱劍而卧也謂先偽稱疾􅆍卧數日乃密脱劍青嚢㧞出題書及繫符都畢於是抱之而視湏天馬迎至觧衣而遊勿令人知覺也又以飛精藥密拭劍鐶呼劍名字祝畢勿見太一以天馬來迎於寝卧之前於前上馬若女子則以輜軿來迎古來諸仙多有托以他物或用竹杖或巾履惟鮑靚見太清刀法此神變欻惚假類㑹形不可理趣相求真竒事矣天馬者吉光騰黄之獸也古畵圗有此獸形皆昔真人所顯相傳示也吉光似鹿騰黄類馬男則单騎女則駕軿也太極真人命太一使者賫馬執控并迎以寳衣欻忽而來不知所以然也太一主仙變也馬去之時雖衆醫侍疾子孫滿側我易服脱劍流景變跡而不覺我之云為也所謂化遁三辰巔徊月精呼吸萬變非復故形者也又曰極上化符以飛精書紙盛以紫囊欲去時以係劍鐶藏景符以飛精書紙盛以絳囊欲去之時以係劍鞘諸仙人多以竹杖不必盡得劍法或是太清術耳其變化不可一類求又曰夫脩下尸觧者皆不得返望故鄉上觧之道名配紫簡三官不得復窺其巢但畜神劍與之起居相隨十三年自能化形不必湏藥書之若不辨作藥七年之後但以丹書劍亦能潜化也单行此法似不可反故鄉矣自不及曲晨之精妙吉光騰黄之延控也雖單行此猶賢於太清雜法兼得改形練化遊宴太極其他丹藥得尸觧非是靈丸之化者皆不得反故鄉三官執之也太清尸觧之法那得比太極之化遁乎今太清尸觧法五符中有太𤣥隂生符又用牛脂煎錫藥丸兩事耳無復余方也佩用制劍之法具在符圗訣中其後用觧化之道又非常脩之事故並不載得而畧之太平御覽卷六百六十五
