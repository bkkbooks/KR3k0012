body:
  text: 太平御覽卷五百九十宋李昉等撰文部六銘銘誌附七辭連珠銘釋名曰銘者述其功美可稱名也禮記祭統曰銘者論撰其先祖之有德善功烈勲勞慶賞聲名烈于天下而酌之祭器自成其名焉以祀其先祖者也顯揚先祖所以崇孝也身比焉順也明示後世教也夫銘者一稱而上下皆得焉耳矣是故君子之觀於銘也既美其所稱又美其所為為之者明足以見之仁足以興之智足以利之可為賢矣賢而勿伐可謂恭矣故衞孔悝之鼎銘曰六月丁亥公假于太廟公曰叔舅乃祖莊叔左右成公成公乃命莊叔隨難于漢陽即宫于宗周奔走無射啓佑獻公乃命成叔纂乃祖服乃考文叔興舊嗜欲作率慶士躬恤衞國其勤公家夙夜不解民咸曰休哉公曰叔舅予汝銘若纂乃考服悝拜稽首曰對揚以辟之勤大命施于烝彛鼎此衞孔悝之鼎銘也古之君子論撰其先祖之美而明著之後世者也以比其身以重其國家如此子孫之守宗廟社稷者其先祖無美而稱之是誣也有善而弗知不明也知而弗傳不仁也此三者君子之所恥也周禮夏官上司勲職曰司勲掌六卿賞地之法以等其功賞地賞田也在逺郊之内屬六鄉焉等猶差也以功大小為差王功曰勲成王業若周公者也國功曰功保全國家若伊尹也民功曰庸施法於民若后稷也事功曰勞以勞定國若大禹也治功曰力制法成治若咎繇也戰功曰多克敵出竒若韓信陳平者也司馬法曰上多前虜也凡有功者銘於王之太常祭於大烝司勲詔之銘之言名也生則書於王旌以識其人與其功也死則於烝先王祭之詔謂告其神以辭也盤庚告其卿大夫曰茲予大享於先王爾祖其從與饗之是也周禮冬官考工記曰鬴銘曰時文思索允臻其極銘刻之也時是也允信也臻至也極中也言是文徳之君思求可以為民立法者而作此量信至於道之中嘉量既成以觀四國以觀示四方使放象之永啓厥後茲器維則永長也厥其也茲此也又長啓其子孫使法則此器長用之王隠晉書曰張載字孟陽隨父在蜀作劒閣銘刺史張敏表之命刻石於劒閣崔鴻十六國春秋後趙録曰勒徙洛陽晷影於襄國銘佐命功臣三十九人于上置于建德前殿劉璠梁典曰天監六年帝以舊國漏刻乖舛乃敕員外郎祖暅治之漏成命太子舍人陸倕為文其序曰乃詔臣為銘按倕集曰銘一字至尊所改也唐書太宗幸河北觀砥柱因勒銘於其上以陳盛徳穆天子傳曰天子觀舂山之上乃為銘迹於縣圃之上以詔後世謂勒石銘功德大戴禮曰武王踐祚三日召士大夫而問焉曰惡有藏之約行之萬世可以為子孫常者乎師尚父曰在丹書王欲聞之則齋矣三日王端冕師尚父亦端冕奉書而入則負屏而立王下堂南面而立尚父曰先王之道不北靣王行西折而南東靣而立師尚父西面道書之言曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶以仁得之以仁守之其量百世以不仁得之以仁守之其量十世以不仁得之以不仁守之必及其世王聞書惕若恐懼退而為誡書于席之四端為銘焉太公金匱曰武王曰吾受師尚父之言因書銘隨身自誡其冠銘曰寵以着首將身不正遺為徳咎書履曰行必慮正無懷僥倖書劍曰常以服兵而行道德行則病廢則覆書鏡曰以鏡自照則知吉凶書車曰自致者急載人者緩取欲無度自致而反皇覽記隂謀黄帝金人器銘曰武王問尚父曰五帝之誡可得聞乎尚父曰黄帝之誡曰吾之居民上也揺揺恐多故為金人三封其口曰古之慎言堯之居民上也振振如臨深淵舜之居民上也慄慄恐夕不旦武王曰吾并殷民居其上也翼翼懼不敢息尚父曰德盛者守之以謙守之以恭武王曰欲如尚父言吾因是為誡隨之身孔子家語曰孔子觀周遂入太祖后稷之廟廟當右階之前有金人焉三緘其口而銘其背曰古之慎言人也誡之哉無多言無多事多言多敗多事多害安樂必誡無行所悔勿謂何傷其禍將長勿謂何害其禍將大勿謂不聞神將伺人焰焰弗滅炎炎若何涓涓不壅終為江河綿綿不絶或成網羅綿綿微細若不絶則有成網羅者也豪末不札如豪之末言微也札拔也將尋斧柯誠能慎之福之根也曰是何傷禍之門也强梁者不得其死好勝者必遇其敵盜憎主人民怨其上君子知天下之不可上也故下之知衆人之不可先也故後之溫恭慎徳使人慕之也執雌持下人莫踰之人皆趨彼我獨守此人皆惑之我獨不處内藏乃智不示人技我雖尊高人弗我害唯能如此也江海雖左長於百川以其卑也天道無親當與善人誡之哉誡之哉孔子既讀斯文也顧謂弟子曰小子志之此言實而中情而信詩云戰戰兢兢戰戰恐也兢兢戒也如臨深淵恐墮如履薄氷恐陷行身如此豈曰過患哉孫卿子說苑文載也孔子家語曰孔子觀於魯桓公之廟有欹器焉欹傾也孔子問於守廟者曰此何器曰此為宥坐之器虛則欹中則正滿則覆明君以為至誡故常置於側也子路進曰敢問持滿有道乎子曰聰明睿智守之以愚功被天下守之以讓勇力振世守之以怯富有四海守之以謙後之君子感誡之至追而作銘左傳昭七年正考父佐戴武宣皆宋君也三命滋益恭三命上卿故其鼎銘曰一命而傴再命而僂三命而俯循墻而走亦莫余敢侮蔡邕銘論曰春秋之論銘也曰天子令德諸侯言時計功大夫稱伐昔肅慎納貢銘之楛矢所謂天子令德者也若黄帝有巾几之法孔甲有盤盂之誡殷湯有甘誓之勒毚鉏咸反鼎有丕顯之銘武王踐祚咨于太師作席几楹杖之銘十有八章周廟金人緘口以慎亦所以勸戒人主朂于令德者也吕尚作周太師封于齊其功銘于昆吾之野獲寶鼎于美陽仲山甫有補衮闕誡百辟之功周禮司勲凡有大功者銘之太常所謂諸侯言時計功者也有宋大夫正考父三命滋益恭而莫侮衞孔悝之祖莊叔隨難漢陽左右獻公衞國賴之皆銘乎鼎晉魏顆獲杜回于輔氏銘功于景鐘所謂大夫稱伐者也鐘鼎禮樂之器昭徳紀功以示子孫物不朽者莫不朽於金石故也近世以來咸銘之于碑揚子法言曰或問銘曰銘哉銘哉有意於慎也文心雕龍曰昔軒帝刻輿几以弼違大禹勒筍簴以招諫成湯盤盂著日新之規武王戸席題必誡之訓周公慎言於金人仲尼革容於欹器列聖鑒誡其來久矣故銘者名也觀器必也正名審用貴乎慎徳葢臧武仲之論銘也曰天子令德諸侯計功大夫稱伐夏鑄九牧之金周勒肅慎之楛令德之事也吕望銘功於昆吾仲山鏤績於庸器計功之義也魏顆紀勲於景鐘孔悝表勤於衞鼎稱伐之類也若乃飛廉有石槨之錫靈公有蒿里之諡銘發幽石噫可怪也趙靈勒跡於番吾秦昭刻博於華山誇誕示後吁可笑也詳觀衆例銘義見矣至於始皇勒岳政暴而文澤亦有䟽通之美焉若乃班固燕然之勒張昶華隂之碣序亦盛矣蔡邕銘思獨冠古今橋公之鉞則吐納典謨朱穆之鼎全成碑文溺所長也至如敬通雜器凖矱戒銘而事非其物繁畧違中崔駰品物讚多誡少李尤積篇義儉辭碎蓍龜神物而居愽奕之下衡斛嘉量而在杵臼之末曽名品之未暇何事理之能閑哉魏文九寶器利辭鈍惟張載劍閣其才清采迅足駸駸後發前至銘勒岷漢得其宜矣文章流别論曰夫古之銘至約今之銘至繁亦有由也質文時異則既論之矣且上古之銘銘於宗廟之碑蔡邕為楊公作碑其文典正末世之美者也後世以來器銘之嘉者有王莽鼎銘崔瑗機銘朱公叔鼎銘王粲研銘咸以表顯功德天子銘嘉量諸侯大夫銘太常勒鐘鼎之義所言雖殊而令徳一也李尤為銘自山河都邑至於刀筆笇契無不有銘而文多穢病討論潤色亦可采録三輔决録曰何敞字文高為汝南太守帝南巡過郡郡有刻鏤屏風帝命侍中黄香銘之曰古典務農彫鏤傷民忠在竭節義在修身事見黄香集銘志附西京雜記杜子夏葬長安北四里臨終作文曰魏郡杜鄴立志忠欵犬馬未陳奄先朝露骨肉歸於后土魂氣無所不之何必故丘然後即化封於長安北郭此焉晏息及死乃命刻銘埋於墓側墓前種松栢五株至今茂盛西京雜記滕公駕至東都門馬鳴跪不肯前以足跑地久之而滕公懼使卒掘其跑之地深二尺得石槨滕公以燭照之有銘乃以水洗之寫其文字古異左右莫能知問叔孫通通曰科斗書也以今文寫之曰佳城鬱鬱三千年見白日吁嗟滕公居此室滕公曰嗟乎天也吾死其葬此乎於是終葬此焉博物志曰魯閹里蔡伯公死求葬庭中有二人行頃還葬二人復出掘土得石槨有銘曰四體不勤孰為作生不遭遇長附記賴二人發吾宅閭里祠之又曰衞靈公葬得石槨銘云不逢箕子公奪我里七辭傅𤣥七謨序曰昔枚乘作七發而屬文之士若傅毅劉廣崔駰李尤桓麟崔琦劉梁桓彬之徒承其流而作之者紛焉七激七依七説七蠲七舉七興之篇於通儒大才馬季長張平子亦引其源而廣之馬作七厲張造七辨或以恢大道而導幽滯或以黜瑰奓而託諷詠揚暉播烈垂於後世者凡十有餘篇自大魏英賢迭作有陳王七啓王氏七釋楊氏七訓劉氏七華從父侍中七誨並陵前而邈後揚清風於儒林亦數篇焉世之賢明多稱七激為工余以為未盡善也七辨似也非張氏至思比之七激未為劣也七釋僉曰妙哉吾無間矣若七依之卓轢一致七辨之纒綿精巧七啓之奔逸壯麗七釋之精密閑理亦近代之所希也摯虞文章流别論曰七發造於枚乘借呉楚以為客主先言出輿入輦蹷痿之損深宫洞房寒暑之疾靡漫美色晏安之毒厚味暖服淫曜之害宜聴世之君子要言妙道以䟽神導引蠲淹滯之累既説此辭以顯明去就之路而後説以聲色逸遊之樂其説不入乃陳聖人辨士講論之娯而霍然疾瘳此因膏梁之常疾以為匡勸雖有甚泰之辭而不没其諷諭之義也其流遂廣其義遂變率有辭人淫麗之尤矣崔駰既作七依而假非有先生之言嗚呼揚雄有言童子雕蟲篆刻俄而曰壯夫不為也孔子疾小言破道斯文之族豈不謂義不足而辨有餘者乎賦者將以諷吾恐其不免於勸也傳子集古文七篇品之署曰七林文心雕龍曰枚乘摛艷首製七發腴辭雲構夸麗風駭葢七竅所發發乎嗜欲始邪末正所以戒膏梁之子也自七發以下作者繼踵觀枚氏首唱信獨拔而偉麗矣傅毅七激㑹清要之工崔駰七依入博雅之巧張衡七辨結彩綿靡崔瑗七厲植義純正陳思七啓取美于宏壯仲宣七釋致辨於事理觀其大抵所歸莫不高談宫館壯語田獵窮瓌竒之服饌極蠱媚之聲色甘意揺骨髓艷詞動魂識雖始之以淫侈終之以居正然諷一勸百勢不自反子雲所謂先騁鄭衞曲終而奏雅樂者也惟七厲叙賢歸以儒道雖文非拔羣而意實卓爾矣連珠傅𤣥叙連珠者興於漢章帝之世班固賈逵傅毅三才子受詔作之而蔡邕張華之徒又廣焉其文體辭麗而言約不指説事情必假喻以逹其指而賢者微悟合於古詩諷興之義欲使厯厯如貫珠易覩而可悦故謂之連珠也班固喻美辭壯文章𢎞麗最得其體蔡邕言質辭碎然其㫖篤矣賈逵儒而不艷傅毅文而不典文心雕龍曰揚雄肇為連珠其辭雖小而明潤矣此文章之支流暇豫之末造也自此以後擬者間出杜篤賈逵之曹劉珍潘朂之輩欲穿明珠多貫魚目可謂壽陵匍匐非復邯鄲之步里醜捧心不關西子之顰矣惟士衡運思理新文敏而裁章置句廣於舊章豈慕朱仲四寸之璫乎夫文小易周思閑可贍足使義明而辭淨事圓而音澤磊磊自轉可稱珠耳宋書劉祥著連珠十二首以寄其懷其譏議云希世之寶違時必賤偉俗之器無聖則淪是以明王黜於楚岫章甫窮於越人有以祥連珠啓上上令御史中丞任遐奏其過惡付之廷尉上别遣勅祥曰我當原卿性命令卿萬里􅄽卿若能改革當令卿得還乃徙廣州不意終日縱酒少時卒三國典畧曰梁簡文為侯景所幽作連珠曰吾聞言可覆也人能育物是以欲輕其禮有徳必昌兵踐於義無思不服又曰吾聞道行則五福俱湊運閉則六極所鍾是以麟出而悲豈唯孔子途窮則慟寧止嗣宗太平御覽卷五百九十
