body:
  text: 太平御覽卷九百八十宋李昉等撰菜茹部五蘆服芥蓴蘘荷紫菜苦買芹薺蕨堇荇邪蒿芸臺薑葇鹿角葫荽優殿雍菜冬風絡葵蔊荶波稜蘆服爾雅曰葖蘆萉萉宜為菔蘆菔蕪菁屬紫華大根俗為雹􅀢菔字或作蔔方言曰蕪菁紫者謂之蘆菔廣志曰蘆服别名雹葖後漢書曰劉盆子在長安時掖庭中宮女猶有數千百人自更始敗後幽閉殿内㧞庭中蘆服根捕池魚而食之東觀漢記同北史曰張威隋文受禪遷青州刺史在州頗事產業遣家奴於人間鬻蘆菔根其奴縁此侵擾百姓上深加責坐廢於家正論曰理世不得眞賢猶治病無眞藥當用人參反得蘆菔根唐新語曰開元中中書令蕭嵩以文選是先代舊業欲注釋之奏請左補闕王智明金吾衛佐李𤣥成進士陳居等注文選先是東宮衛佐馮光進入院校文選兼復注釋解䲭蹲云今之芋子即是著毛蘆菔院中學士向外説之蕭嵩聞之拊掌大笑雲南記曰嶲州界縁山野間有採大葉而麄莖其根若大蘆菔土人蒸煑其根葉而食之可以療飢名為諸葛菜云武侯南征用此菜子蒔於山中以濟軍食亦猶廣都縣山榗林謂之諸葛木也芥魏子曰蓼蟲在蓼則生在芥則死非蓼仁芥賊本不可失也劉向别録曰尹都尉書有種芥葵蓼韭葱諸篇嶺南異物志曰唐孟琯嘗於嶺表買芥菜置壁下忘食數日皆生四足有首尾能行歩大如螗螂但腰身細長又曰南土芥長五六尺子如雞卵廣人以巨芥為鹹葅埋地中有三十年者貴尚親賔以相餉遺嶺表録異曰廣州地熱種麥則苗而不實北人将蔓菁子就彼種者出土即變為芥吳氏本草曰芥葅一名水蘇一名祖勞蓴南越志曰石蓴似紫菜色青集異記曰丹陽張承先家有鬼常為取物㑹有客須蓴二斗鯉魚二十頭鬼将一小兒置驃騎令小兒睡及覺㸔籃中已有蓴鯉幽㝠録曰阿東常醜奴泛湖邉㧞蒲暮宿空舍時日暮見一女姿容極美乗舟載蓴至舍寄住變而為獺蘘荷説文曰蘘蘘荷也一名荷苴崔豹古今注曰蘘荷似葍苴而白葍苴色紫花生根中花未敗時可食乆置則削爛不為實矣葉似薑宜隂翳地常依蔭而生也搜神記曰余外婦姊夫蒋氏有傭客得疾下血醫以中蠱乃密以蘘荷根布席下不使知乃狂言曰蠱我者張小小也乃呼張小小已亡去今世攻蠱多用蘘荷根徃徃驗蘘荷成為嘉草葛洪方曰人得蠱取蘘荷葉着卧席下不使知立呼蠱姓名潘岳閒居賦曰蘘荷依隂時藿向陽紫菜集異記曰㑹稽照誕入海採紫菜於山上曝之夜忽見羣鬼張目切齒欲來繫誕誕奮刀砍之見鬼悉披靡乃就誕乞少許紫菜誕不為與吳郡縁海記曰郡海邉諸山悉生紫菜吳賦云綸組紫絳者也苦買晉書安帝記曰義熈二年有苦買菜生楊州營莖髙四尺六寸廣二尺二寸是後嵗多征伐人民積苦故苦買者買苦也芹爾雅曰芹楚葵詩曰觱沸檻泉言采其芹又曰思樂泮水薄采其芹列子曰宋國有人其妻吿之曰昔有人甘茙菽與芹子卿豪甞之蟄於其口慘於其膓衆哂之呂氏春秋曰菜之美者雲夢之芹也范汪祠制曰孟秋祭有芹葅宋林曰豐美菜生雲夢薺爾雅曰菥思厯切蓂大薺似薺細葉俗呼老薺又曰蒫木何切薺實廣雅曰菥蓂馬辛也説文曰薺草可食詩曰誰謂荼苦其甘如薺荼苦菜也而君子於已也苦又甚於荼北方之人則甘如薺禮曰孟夏之月靡草死薺葶藶之屬春秋繁露曰薺以冬美水氣也薺甘味也乗於水氣故美者甘勝寒也薺之言濟所以濟夫水也淮南子曰薺麥冬生而夏死抱朴子曰薺麥大蒜仲夏而枯物理論曰夫解小而引大了淺而伸深猶以牛刀割雞長殳刈薺吳氏本草曰菥蓂一名析目一名榮目一名馬駒雷公神農扁鵲辛李氏小温四月五月採暴乾生道傍細辛乾薑苦參薺實神農甘毒生野田五月五日採隂乾治腹脹蕨詩曰陟彼南山言採其蕨又曰山有蕨薇隰有把桋晉書曰齊王秉權張翰謂郡人顧榮曰天下紛紛未已吾本山林間人無望于時去矣采南山蕨飲三江水耳爾雅曰蕨鱉初生無葉可食江西人謂之鱉古詩曰山桃發紅蕚野蕨漸紫苞堇詩曰周原膴膴堇荼如飴堇荼皆苦菜也周之原地肥美所生菜雖有性苦者皆甘如飴也禮曰堇荁枌榆兔薧滫瀡以滑之謂用調和飲食以蓂堇也類冬用薑夏用蓂爾雅曰齧苦堇今堇葵也葉似栁子如米食之滑三十國春秋曰劉殷字長盛七嵗䘮其父哀毁踰禮曾祖母王氏盛冬思堇殷入澤中痛哭有堇生焉得斛餘廣語曰夏蓂秋堇滑如粉後漢書曰崔和為平昌太守性鄙恡埋錢百斛其母季春思堇惜錢不買荇爾雅曰莕接余其葉苻藂水中葉圓在莖短長隨流水深淺江東人食之亦呼莕詩曰參差荇菜左右流之窈窕淑女寤寐求之邪蒿北齊書曰邢峙字士峻以經授皇太子厨宰進太子食有菜曰邪蒿令去之曰此菜有不正之名非殿下所宜食顯宗聞而嘉之芸臺通俗文曰芸臺謂之胡菜韻集曰芸臺胡菜薑葇方言曰薑之小者謂之穰葇鹿角南越志曰猴葵色赤生石上南越謂之鹿角葫荽石崇奴劵曰奴常種蘿服葫荽不宻不踈優殿南方草物狀曰合浦有菜名優殿以豆醬汁茹食芳好可食胡麵雍菜廣州記曰雍菜生水以為菹冬風南州記曰冬風菜陸生宜肥肉作羮二者㣲味人甚重之落葵博物志曰人食落葵為狗齧則瘡不差或致死蔊字林曰蔊辛菜也荶字林曰荶菜似蒜生水中波稜唐書曰太宗時尼婆羅獻波稜菜葉似紅藍實如蒺藜火熟之能益食味太平御覽卷九百八十
