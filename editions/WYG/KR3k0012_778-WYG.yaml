body:
  text: 太平御覽卷七百七十八宋李昉等撰奉使部二奉使中後漢書曰伏湛子隆字伯文少有莭操立名當時張歩兄弟各擁强兵據有齊地拜隆為太中大夫持莭使青徐招降張步等六校皆降其冬拜隆為光禄大夫復使於歩皆招懐綏緝多來附降帝嘉隆之功比之酈生即拜歩為東萊太守劉永復遣使立歩為齊王歩貪受王爵猶豫未決隆曉譬曰髙祖與天下約非劉氏不王今可得為十萬户侯耳歩欲留隆與共守二州不聴求得反命歩不從乃執隆隆遣間使上書曰臣隆奉使無状言罪也受執凶逆雖在困厄授命不顧乂吏人知歩反叛心不附之願以時進兵無以臣隆為念也臣隆得生歸闕廷受誅於有司此其大願若令没身冦手以父母兄弟長累陛下陛下與皇后太子永享萬國與天無極帝得隆奏召其父湛流涕以示之曰隆可謂有蘇武之節恨不且許而遽求還也其後歩遂殺之時人莫不哀憐焉以其子援為郎中又曰奉車都尉竇固出擊匈奴班超假司馬将兵别擊伊吾戰於蒲類海多斬首虜而還伊吾匈奴中地名蒲類海匈奴中海名在燉煌北固以為能遣與從事郭恂俱使西域超到鄯善鄯善本西域樓蘭國也後改為鄯善去陽闗一千六百里去長安六千一百里鄯善王廣奉迎超禮敬甚備後忽更踈懈超謂其屬官曰寧覺廣禮意薄乎此必有北虜使來狐疑未知所從故也明者覩其未萌况已著耶乃召侍胡詐之曰匈奴使來數日今安在乎侍胡惶恐具服其状超乃閉侍胡悉召其吏士三十六人與共飲酒酣因激怒之曰卿曹與我俱在絶域欲立大功以求富貴今虜使到裁數日而王廣禮敬即廢如令鄯善収吾屬送匈奴骸骨長為豺狼食矣為之奈何官屬皆曰今在危亡之地生死從司馬超曰不入虎穴不得虎子今當計獨有因夜以火攻虜使彼不知我多少必大震怖可殄盡也滅此虜則鄯善破膽功成事立矣衆曰當與從事議之超怒曰吉凶決於今日從事文俗吏聞此必恐而謀泄死而無所名非壮士也衆曰善初夜遂将吏士往奔虜營㑹天大風超令十人持鼔藏虜舎後約曰見火燃者當鳴鼓大呼餘人悉持弓弩夾門而伏超乃順風縱火前後鼔譟虜衆驚亂超手格殺三人吏兵斬其使及從士三十餘級餘衆百許人悉燒死明日乃還告郭恂恂大驚既而色動超知其意舉手曰掾雖不行班超何心獨擅之乎恂乃悦超於是召鄯善王廣以虜使首示之一國震怖超曉告撫慰遂納子為質還奏於竇固固大善具上超功效并求更選使使西域帝壮超莭詔固曰吏如班超何故不遣而更選乎今以超為軍司馬令遂前功又曰鄭衆字伯師拜越騎校尉使匈奴至北庭虜欲令拜衆不屈單于大怒不與水火欲脇伏衆拔劒自誓單于乃止又曰張綱字文紀為侍御史漢安元年選八使循行風俗皆耆舊知名多歴顯位惟綱年少官資最㣲餘人受命之部而綱獨埋其車輪於洛陽都亭曰豺狼當路安問狐狸遂奏大將軍梁冀河南尹不疑皆蒙外戚之任居阿衡之職不能敷揚五教專務虵豕而已帝雖知綱言公直終不忍用也時廣陵賊張嬰殺太守據郡邑冀乃遷綱為廣陵太守綱至乃陳示禍福嬰等開門出降綱乃撫納離叛使各得安居部内肅清帝嘉之賜錢百萬續漢書曰大使車立乗駕駟赤帷持節者重導伍百瑣弩十二人小使車蘭輿赤轂赤帷從騶騎四十人又曰周舉字宣光順帝時詔八使廵行風俗皆選素有威名者拜舉侍中杜喬守光禄大夫周翊前貴州刺史馮羨尚書欒巴侍御史張綱兖州刺史郭遵太尉長史劉班皆守光禄大夫分行于天下其刺史二千石有賍罪顯明者驛馬上之墨綬以下便輙収舉其有忠清惠利為百姓所安宜表異者皆以状上於是八使同時俱拜天下號曰八俊舉于是劾奏貪猾表薦清公朝廷稱之又曰范滂字孟博汝南郡人厲清莭為州所服舉孝亷時冀州飢荒盗賊羣起乃使滂舉察按之滂登車攬轡慨然有澄清天下之志及至州境守令自知賍汚望風解印綬去其所舉奏莫不厭伏衆議東觀漢記曰來歙字君叔南陽人也光武五年持莭送馬援奏璽書於隗囂囂遣子恂隨入侍時山東略定帝謀西収囂兵與俱伐蜀囂将王元説囂故不决歙素剛直遂發憤責之曰國家以公知臧否曉廢興故以手書暢至意足下推忠誠眷委質是君臣父子也今乃欲從佞惑之言為族滅之計叛主負子違背忠信吉凶之決在於今日因欲前刺囂囂起入部勒兵将殺歙歙徐持莭就車而去又曰隗囂甚重馬援以為綏徳将軍時公孫述稱帝囂使往觀之援素與述同鄉里相善以為至當握手迎如平生而述方盛陳陛衛延援入交拜禮畢就館更為援製都布單衣交讓冠㑹百官於宗廟立舊交之位述鸞旗旄騎警蹕禮甚盛欲以援封侯食大将軍位賔客皆樂留援曉之因而辭歸謂囂曰子陽井底鼃耳不如專意東方囂乃使援奉書洛陽援至引見於宣徳殿上迎笑謂之曰卿遨逰二帝間今見卿使人慙援頓首謝曰當今之世非獨君擇臣臣亦擇君耳臣與公孫述少相善臣前至蜀述陛㦸而後進臣今逺來陛下安知非刺客而簡易如此於是上復笑曰卿非刺客顧說客耳援乃曰天下反復自盗名字者不可勝數今見陛下恢廓大度同符髙祖乃知帝王自有真也又曰郭丹從師於長安買符入函谷闗乃慨然歎曰丹不乗使者車終不出闗後三公舉丹賢能徴諫議大夫丹自去家十有二年果乗髙車出闗如其志也後魏書曰燕鳳字子章代人也拜代王左長史參決國事常使苻堅堅問鳳曰代王何如人也對曰寛和仁愛經畧髙逺一時雄主也常有并吞天下之志堅曰卿輩北人無剛甲利器敵弱則進敵强則退安能兼并也鳳曰北人壮悍上馬持三仗驅使若飛主上雄雋率服北土控弦百萬號令若一軍無輜重樵㸑之苦輕行速捷因敵取資南方所以疲弊北方所以常勝也堅曰彼國人馬多少鳳曰控弦之士數十萬馬百萬匹堅曰卿言人衆猶可何説馬太多鳳曰雲中川自東山至西河二百餘里北至南山百餘里毎嵗自孟秋馬常大集略為滿川以此推之使人言猶未盡鳳還堅厚加贈遺又曰朱長生岱人孝文時為散騎常侍使髙車其王阿伏至羅國乃不以禮待長生長生責至羅王既稱臣内附何得口云再拜而實不拜乃呼出帳令衆中拜至羅慙其臣下大怒乃以兵脇之曰不降則殺之長生厲聲曰我寜作魏鬼不為汝臣留三年放還孝文比之蘇武也又曰李彪使齊將還蕭頤親謂彪曰卿前使還日賦阮詩云但願長閒暇後嵗復來遊果如言今日卿此還也復有來理否彪答曰使臣請重賦阮詩曰晏衍清都中一去永矣哉頥惘然曰清都可爾一去何事觀卿此言似成長濶隋書曰許善心字務本髙陽北新城人也家有書萬卷皆悉遍涉禎明二年加通直散騎常侍聘隋遇文帝伐陳禮成而不獲反命留縶賔館陳亡衰服號泣於西階下藉草三日有詔就館拜通直散騎常侍善心哭盡哀北面立垂涕再拜受詔明日朝伏泣於殿下悲不能勝帝顧左右曰我平陳唯獲此人既懐其舊君則我誠臣也勑以本官直門下省賜物千叚唐書曰大歴初以綬歸崇敬倉部郎中兼御史中丞賜金紫充弔祭册立新羅王使至海中流波濤迅急舟漏衆咸驚駭舟人請以小艇載崇敬避禍崇敬曰舟人凡數百我何獨濟逡廵波濤稍息故事使新羅者至海東多有所求或携資帛而往貿易規利崇敬一皆絶之東夷重稱其徳又曰殷侑為童児力學不念家産長能通經以講習自娯五經登第歴代沿革擢為太常博士轉虞部員外郎為入囬紇副使囬紇驕倨見漢使盛陳兵甲與其相不拜欲受漢使禮侑堅立不動宣命既畢虜使責之云欲留使者行人皆惶怖獨侑謂虜曰今可汗是漢家子壻坐受漢使臣禮是可汗無禮非使臣無禮也虜憚其嚴正卒不敢逼荆州先徳傳曰費禕字文偉江夏人也呉與蜀和遣使張温字恵恕來修好温好辨論議鮮能抑之諸葛亮以禕有俊才宜遣報温使以禕為奉信校尉權時竊尊號意猶豫不決禕為陳興亡之故開國建家之䇿權甚恱時滑稽知名皆在㑹並使發異端之難禕據理荅坐席稱之由是愛敬焉太平御覽卷七百七十八
