body:
  text: 太平御覽卷一百六十二宋李昉等撰州郡部八河北道中魏州博州莫州深州易州幽州順州涿州薊州燕州檀州媯州平州營州徳州棣州滄州貝州魏州元和郡縣志曰魏州魏郡禹貢兖冀二州域在夏即有扈之國春秋時為晉地戰國時為衛魏二國地秦滅魏置東郡滅趙置邯鄲郡漢置魏郡後漢封曹操為魏王史記曰邯鄲亦漳河之間一都㑹也北通燕涿南有鄭衛俗與趙相類然近梁魯重義而矜節漢書曰邯鄲土廣俗雜大率精急髙氣勢輕為姦漢志曰魏郡王莽曰魏成領鄴館陶等十八縣後漢書曰曹操為魏公操分魏郡為東西部置都尉元和郡縣志曰元城縣有沙麓山即春秋經所書沙麓崩後為漢元后興之象也博州元和郡縣志曰博平郡禹貢兖州之域春秋時齊之西界聊攝地也戰國時為齊地秦漢為東郡也史記曰齊田單以聊城嵗餘士卒多死而聊城不下魯仲連為書約之矢以射城中燕將見書猶豫不决乃自殺史記曰齊威王伐晉至北陵徐廣注曰東郡之博平莫州十道志曰莫州文安郡其地厯代所屬與瀛州同唐景雲二年分瀛州置漢志曰鄚縣屬涿郡王莽曰言符郡國志曰鄚縣有易京城漢末公孫瓉築京以自固圍塹十重以鐡為門諸將家作樓以千計並髙五六丈為袁紹所攻城樓皆䧟沒圖經曰清苑縣本漢樂鄉縣也漢志曰樂鄉屬信都王莽曰樂丘史記曰漢髙祖過趙問樂毅有後世乎對曰有樂叔髙帝封之樂鄉後漢書曰獻帝初公孫瓉據幽州先是有童謡曰燕南垂趙北際中間不合大如礪惟有此中可避世瓉以易地當之乃築京以自固也深州元和郡縣圖曰深州饒陽郡禹貢冀州之域七國時為趙地秦為鉅鹿郡地漢為饒陽縣隋置深州以州西故深城為名也漢志曰饒陽屬涿郡在饒河之陽故名之又曰安平屬涿郡王莽曰廣望亭漢書髙帝六年封鄂千秋為安平侯後漢書曰王郎起光武自薊東南馳晨夜草舍舍止息也至饒陽之無蔞亭時天寒烈衆皆飢疲馮異上豆粥明旦光武謂諸將曰昨得公孫豆粥飢寒俱解公孫異字易州十道志曰易州上谷郡禹貢冀州之域有虞分冀州為并州之地春秋時燕趙之分秦併天下為上谷郡地漢置涿郡今州即涿郡之故安地也又曰易縣本漢故安縣也漢志曰故安屬涿郡漢書曰文帝封申屠嘉為故安侯九州記曰易縣西南三十里有送荆陘即荆軻入秦路河北記曰易縣前五公城王潭不從王莽其後潭生五子避隠於此世祖並封為侯十道志曰淶水縣本漢逎縣也又曰容城屬涿郡莽曰深澤漢志曰逎屬涿郡莽曰逎屛漢書年表曰景帝封匈奴降王隠强為逎侯十道志曰遂城戰國時遂縣漢之北新城史記曰趙悼㐮王二年李牧攻燕㧞武遂漢志曰北新城屬中山國莽曰朔平土地十三州志曰河南有新城故此加北幽州十道志曰幽州范陽郡禹貢冀州之域虞舜十二州為幽州夏殷省倂冀州復置幽州秦為漁陽上谷等五郡漢髙祖分上谷置涿郡武帝十三州為幽州釋名曰幽州北幽昧之地故曰幽州晉地道記曰幽州因幽都以為名山海經曰北海有幽都之山爾雅曰北方之美者幽都之筋角晉地道記曰舜以冀州南北廣大分燕地北地為幽州漢志曰漁陽郡屬幽州莽曰通路亭史記曰顓頊都於帝丘其地北至幽陵又曰周文王之滅紂封召公於北燕世本曰居北燕宋忠曰有南燕故曰北燕郡國志曰箕星散為幽州分為燕國其氣躁急通濟趙渤海之間一都會也史記曰燕秦千樹栗與封侯等士馬所生有魚鹽桑􅀥之利後漢書曰公孫瓉破劉虞盡有幽州之地三國典略曰東魏薛琡嘗夢山上掛絲以告所善張亮曰山上絲幽字也君必為幽州後果如之禮記曰武王克商封黄帝之後於薊史記曰鄒子之燕昭王擁篲前驅請為弟子受業築碣石宫以處鄒子親往師之又曰昭王謂郭隗曰願得賢士以身事之隗曰王必欲致士先從隗始况賢於隗者豈逺千里哉於是昭王為隗改築宫而師事之樂毅自魏往鄒衍自齊往劇辛自趙往士争歸燕漢志曰安次縣縣屬渤海郡又續漢志曰安次縣屬漁陽郡圖經曰武清縣本漢之雍奴縣也酈道元注水經曰雍奴藪澤之名四靣有水壅不流曰奴魏志張郃傳曰從撃袁譚於渤海别將軍圍雍奴大破之順州方輿志曰歸順州其地乃燕之北境燕太子丹使荆軻獻地圖即謂此也燕太子初以置歸化順義二郡同領懐柔二縣復又立歸順州以理焉涿州圖經曰涿州涿郡古涿鹿之地舜十二州為幽州地禹貢為冀州之域春秋戰國為燕國之涿邑漢髙帝置涿郡史記曰黄帝與蚩尤戰於涿鹿之野漢志曰涿郡髙帝置莽曰垣翰屬幽州領縣二十九薊州圖經曰薊州漁陽郡禹貢冀州之域春秋及戰國時屬燕秦時於此置漁陽郡二漢因之又曰漁陽縣本北無終子國也有無終山城春秋左氏傳曰莊三十年齊人伐戎杜預注曰山戎北狄無終三名其實一也漢志曰無終屬右北平故無終子國也燕州釋名曰燕苑也在涿鹿山南宛宛然以名之春秋説題辭曰箕尾為燕隂氣浸生故習俗貪利地宜栗史記蘇秦説燕文侯曰燕東有朝鮮遼東北有林胡樓煩西有雲中九原南有呼沲易水地方二千里帶甲數十萬南有碣石鴈門之饒北有棗栗之利民不佃作而足於􅀥栗矣此所謂天府也又貨殖傳曰燕秦千樹栗以比封侯檀州十道志曰檀州宻雲郡禹貢冀州之域春秋戰國時並為燕地秦為漁陽郡在漢領白檀等十二縣又曰本漢厗奚縣屬漁陽郡漢志曰厗奚屬漁陽莽曰敦徳厗音題又曰燕東有漁陽郡漢書曰漢李廣弭節白檀魏書曰曹公越北塞厯白檀破烏丸於桞城續漢書曰白檀縣即右北平媯州十道志曰媯州媯川郡禹貢冀州之域舜暨周為幽州之域春秋戰國並屬燕國秦倂天下為上谷郡為潘縣也漢志曰燕西有上谷郡又曰上谷郡秦置莽曰朔調屬幽州領縣十五又曰潘縣屬上谷郡莽曰樹武潘音普半反晉太康地理志曰潘縣更屬廣寗郡史記曰軒轅黄帝戰於阪泉之野十道志曰阪泉在懐戎縣周書曰黄帝殺蚩尤於中冀名曰絶轡之野亦其地史記蘇秦往説燕文侯曰燕東有朝鮮遼東北有林胡樓煩西有雲中九原南有呼沲易水地方二千里帶甲數十萬史記曰燕築長城自造陽至襄平造陽即媯州之地名也平州十道志曰平州北平郡禹貢冀州之域舜十二州為營州之境周為幽州之地春秋時為山戎孤竹白狄肥子二國地秦兼天下為遼西郡肥如縣地漢志曰肥如屬遼西郡肥子奔燕燕封於此史記曰齊桓公北征山戎至孤竹卑耳之溪見一人長八尺具衣冠右祛衣走馬前桓公問於管仲對曰山之神有俞兒霸王之君興則前導祛衣示前有水祛衣右右可渉至卑耳之溪從左方渉其深至膝自右以涉桓公拜曰仲父聖至於此魏志曰曹公北征烏丸田疇自盧龍道引軍出盧龍塞塹山堙谷五百餘里經白檀厯平剛登白狼望栁城道今在盧龍縣營州十道志曰營州栁城郡禹貢冀州之域其在十二州為營州地周為幽州春秋為山戎之地戰國時屬燕秦漢為遼西郡郡國志曰北當營室故曰營州漢志曰遼西郡秦置屬幽州領縣十四後漢書曰遼西郡即烏丸鮮卑蹋頓所居十六國春秋慕容皝傳曰栁城之北龍山之南所謂福徳之地也可營制規模築龍城構宫室改栁城為龍城縣遂都之改曰和龍宫後漢輿地記曰齊舜時營州之域燕西置營丘郡於其城内今栁城縣有營丘城徳州元和郡縣志曰徳州平原郡禹貢兖州之域春秋戰國時齊地秦兼天下為齊郡地漢分齊郡置平原郡漢志曰平原郡髙帝置王莽曰河平領縣十九十道志曰蓨縣本漢條縣也景帝封周亞夫為條侯後改為蓨漢志曰蓨縣屬信都莽曰脩治元和郡縣志曰安徳縣有鬲津枯河禹貢九河之一棣州元和郡縣志曰棣州樂安郡禹貢置青州之域又曰兖州之域春秋時為齊地秦併天下為齊郡漢為平原渤海千乗三郡地左氏傳曰賜我先君履東至於海西至於河南至於穆陵北至於無棣十道志曰厭次本漢富平縣漢志曰富平侯國屬平原郡王莽曰樂安亭後漢明帝改為厭次漢書東方朔傳曰朔平原厭次人也十道志曰滴河縣本漢朸朸音力漢志曰朸屬平原郡莽曰張鄉十道志曰蒲臺本漢濕沃縣也漢志曰濕沃屬千乗郡莽曰延亭三齊記曰蒲臺髙八十尺始皇所頓處在臺下縈蒲繫馬今蒲猶縈也滄州十道志曰滄州景城郡禹貢兖州之域虞舜及周為幽州之域春秋時屬齊魯七國時屬齊趙秦併天下以齊地置齊郡以趙地置鉅鹿郡漢髙帝分鉅鹿置渤海郡分齊郡置平原郡漢志曰渤海郡髙帝置莽曰迎河在渤海之濵因以為名圖經曰渤海濵滄州之地屬趙分居多漢志曰趙中山地薄人衆丈夫相聚遊戲悲歌忼慨起則椎剽掘冢作姦巧多弄物為倡優十三州志曰渤海風俗鷙戾多氣力輕姦宄十道志曰清池縣漢之浮陽縣也漢志曰浮陽屬渤海郡莽曰浮城十州志曰浮陽水所出東入海漢書曰宣帝時渤海飢盜賊起龔遂單車入境平之後勸叛者賣劍買牛民皆知勸漢志曰千童縣靈帝改曰饒安屬渤海郡又曰樂陵縣屬平原郡莽曰美陽貝州元和郡縣志曰貝州清河郡禹貢兖州之域春秋時屬魯七國時屬趙秦兼天下以為鉅鹿郡漢又分置清河郡十道志曰後周武帝建徳六年既平齊後於齊地置貝州左氏傳曰齊襄公田於貝丘漢志曰清河郡髙帝置王莽曰平河屬冀州領縣十四圖經曰清河縣秦為厝縣厝音趨亦反漢為信城縣漢志曰厝屬清河郡王莽曰厝治安帝以孝徳皇帝塟於厝改曰甘陵十道志曰武城趙邑東武城也史記曰趙平原君勝封東武城元和郡縣志曰夏津縣本漢鄃音戍縣也漢志曰鄃屬清河郡王莽曰善陸漢書曰髙后封吕他為鄃侯太平御覽卷一百六十二
