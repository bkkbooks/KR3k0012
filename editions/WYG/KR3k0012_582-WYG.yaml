body:
  text: 太平御覽巻五百八十二宋李昉等撰樂部十二皷柷敔筍簴皷風俗通曰皷不知誰所造皷者郭也春分之音萬物皆郭皮甲而出故謂之皷爾雅曰大皷謂之鼖小者謂之應大鼗謂之麻小者謂之料徒擊皷謂之咢郭璞注曰詩云或歌或咢徑長八尺應在皷列也周易通卦驗曰冬至皷用馬革圍徑八尺一寸夏至皷用牛皮圍徑五尺三寸尚書曰周成王崩鼖皷在西房長八尺尚書益稷曰下管鞉皷禮記曰廟堂之上罍樽在阼犧樽在西廟堂之下懸皷在西應皷在東又曰懸皷周皷也其小者曰𦙍先擊小皷為大皷導引故曰𦙍一名鞞又曰春官小師掌敎皷瞽矇掌播鼗眡瞭掌播鼗又曰王執路侯執鼖将軍執晉皷師帥執提旅帥執鼙又曰夏后足皷殷人置皷置植也亦作樹周人懸皷又曰籥章氏掌出土皷杜子春日以毛土為底以革為面可以擊者也又曰除水蟲以炮土之皷鼓之以焚石投之狐蜮之屬也又曰地官鼓人掌教六鼓四音之聲以節樂以聲和軍旅以正田役音五聲合和者也教為鼓而辨其聲用教為鼓擊鼓者大小之數又别其聲以用事以雷鼓鼓神祀雷鼔八面鼓神祀天神以靈鼓鼓社祭靈鼓六面鼓社祭及地祗以露鼓鼓鬼享露鼓四面鼓鬼享祀宗廟以鼖鼓鼓軍事大鼔謂之鼖長八尺鼖音扶云以鼛鼓鼓役事鼛鼔長丈二尺鼛音古刀切以晉鼓鼓金奏晉鼓長六尺六寸者是也金奏為樂作擊編鐘又冬官考工記韗人為皋陶鄭司農曰皋陶鼓木鄭𤣥謂􅕦者以皋陶名官陶從革耳韗音况萬切又音運􅕦音陶長六尺有六寸左右端廣六寸中尺厚三寸板中廣頭狹為穹崇鄭衆云皷木一判者其兩頭廣六寸中央之廣尺如此乃得有腹矣穹者三之一鄭衆云穹讀為志無穹也之穹為皷木腹穹崇者居皷面三之一又讀如穹蒼之穹穹崇者居皷面三之一則其皷四尺者板一尺三寸三分寸之一倍之為二尺六寸三分寸之二加皷四尺穹之徑六尺六寸三分一寸之二此皷合二十板上三正鄭衆云謂兩頭一半中央一半鄭𤣥讀三當為参正言直也参直者穹上一直兩頭又直各居二尺二寸不弧曲也此皷兩以六皷差之賈侍中云晉皷大而短近晉皷也以晉皷鼓金奏也皷長八尺面四尺中圍加三之一謂之鼖皷中圍加三之一者加於面之圍以三分一也面四尺其圍十二尺加以三分有四尺則中圍十六尺徑五尺三寸三分寸之一今皷一合二十板則板微穹六寸三分寸之二爾雅云大皷謂之鼖以鼖皷鼓軍事鄭衆云皷四尺謂革所䝉廣四尺也為皋皷長尋有四尺皷四尺倨勾磬折以皋皷鼓役事磬折中曲之不参正中圍與鼖皷同磬折以為異也凡冒皷必以啟蟄之日啟蟄孟春之月蟄䖝始聞雷聲而動皷所以取象冐䝉鼓以革也良皷瑕如積環革調急也皷大而短則其聲疾而短聞音問下同小而長則其聲舒而逺聞禮記曰明堂位曰土皷簣桴葦籥伊耆氏之樂也簣當為凶伊耆古天子號令有耆氏也左傳成上曰師之耳目在吾旗皷又僖中曰三軍以利用也金皷以聲氣也又昭三曰分唐叔以宻湏之皷注宻湏國名也毛詩曰􅆁風擊皷其鏜踊躍用兵又菜芑曰方叔率止鉦人伐皷陳師鞠旅顯允方叔伐皷淵淵振旅闐闐又靈䑓曰鼉皷蓬蓬矇瞍奏公又埶競曰鐘皷喤喤磬筦将将又山有樞曰子有鐘皷不擊不考宛其死矣他人是保又有瞽曰有瞽有瞽在周之廷設業設簴崇牙樹羽應田懸皷又那曰猗歟那歟置我鞉皷奏鼓簡簡衎我烈祖又甫田曰琴瑟擊皷以御田祖又有駜曰振振鷺鷺于飛皷咽咽醉言歸又宛丘曰坎其擊皷宛丘之下論語曰季氏富於周公而求也為之聚歛而附益之子曰非吾徒也小子鳴鼓而攻之可也漢書曰李陵擊匈奴夜擊皷皷不鳴陵曰吾士氣少衰而皷不起何耶軍中豈有女子乎捜軍中得卒妻皆斬之又曰元帝疾不親政事留好音樂或置鼙殿下天子自軒檻上隤銅丸以撾皷聲中嚴皷之莭後宫及左右習知音者莫能為之後漢書曰王喬為葉令毎當朝鄴門下皷不擊自鳴聞於京昭帝取置于都亭無復有聲又曰禰衡字正平孔融雅愛其才數稱賞於曹操操欲見之衡不肯往操懐忿而以其才不欲殺之聞衡善鼓召為鼓吏因㑹賓客閲其音莭諸吏過者皆令脫其故衣更著岑牟單絞之服次至衡方操撾蹀􅗿而前吏呵之曰鼓吏何不改服而輕進衡於是解袒衣次則釋餘服裸身而立徐取岑牟單絞而著之復操撾顔色不怍操笑曰本欲辱衡衡反辱孤衡對曰不敢以先王之法服為伶倫之衣沈約宋書曰蕭思話年十許嵗好竒屋棟打細腰皷也南史曰孫挹為延陵縣令國子助教髙爽詣之挹了無故人懐爽出從閤下過取筆書皷面云徒有此大腹了自無肝腸面皮如許厚被打未遽尖唐書曰張𤣥素太子承乾又甞於宫中擊皷聲聞於外𤣥素叩閤請見極言切諌承乾乃出宫内鼓對𤣥素毁之唐書曰鄭餘慶兼判太常卿事初徳宗自山南遷宫闕輒有懐光吐蕃之虞都下驚擾遂詔太常習樂去大皷至是餘慶始奏復用大皷世説曰王大将軍年少時舊有田舍之名語音亦楚武帝唤時賢共言伎藝之事人人皆有所能唯王都無所能意色殊惡自言解打鼓帝即令取鼓擊之於坐振袖而起揚搥奮擊音莭清徤旁若無人舉坐歎其雄爽春秋孔演圖曰有人金豐擊玉皷駕六龍鼔喻所行清嚴人服其威勢也古今注曰漢有黄門鼓吹一名樓車帝王世紀曰黄帝殺䕫以其皮為鼓聲聞五百里後秦記曰姚泓永和元年天水兾石皷鳴數百里野雉皆雊神異經曰分荒之流有石皷焉蒙之以皮其音如雷韓子曰楚厲王有驚皷與百姓為戒飲酒過之而擊百姓大驚使人止之曰君醉戯而擊之民皆罷居數月驚而擊皷民不起也穆天子傳曰天子讀書于梨丘奏廣樂遺其簴皷虞喜志林曰建武二十四年南郡男子獻銅皷有銘五經要義曰皷所以檢樂為羣音之長也異苑曰晉武帝時呉郡臨平岸崩出一石皷打之無聲張華曰可取蜀人桐木刻作魚形叩之則鳴矣於是如其言聲聞數十里劉道民詩云亦有逺而合蜀桐鳴呉石郭緣生述征記曰逢山在廣固南三十里有祠並石人石皷齊世将亂石人輒打皷聞數十里羅浮山記曰浮山東石樓下有兩石皷扣之清越所謂神鉦也耶盛𢎞之荆州記曰始興郡陽山縣有豫章木本徑可二丈名為聖木秦時伐此木為皷顙顙成忽自奔逸北至桂陽又王韶之始興記云息於臨武遂之洛陽因名聖皷城今在臨武臨海記曰郡西有白鵠山有石皷元嘉中居人致祭神山神乃推此皷數十里聞如金石之響相傳云此山有鵠飛入㑹稽郡雷門皷中打皷聲洛陽聞之后逆賊孫恩斫破此鼓見一白鵠飛出去通禮義纂曰建皷大皷也少昊氏作焉為衆樂之莭夏加四足謂之莭皷商人柱而貫之謂之楹皷周人懸而擊之謂之懸皷近代相承植而建之謂之建皷本出商制也唐禮設於四隅劉瓛定軍禮曰皷吹未知其始也漢以雄朔野而有之矣鳴笳以和簫聲非八音也騷人曰鳴箎笳竽皷吹樓車也昔簫史吹簫於秦秦人為之築鳳䑓皷吹故陸則樓車水則樓船其在庭也則以簴為樓或曰鷺皷精也昔呉夫差啟蛇門以厭越越人為雷門以禳之擊大皷於雷門之下而蛇門聞焉其后移皷逹康宫之端門有雙鷺呢皷而飛乎雲末或曰皆非也詩曰振振鷺鷺于飛皷咽咽醉言歸古之君子仕於伶官悲周道之榛榛傷頌之掇音故飾皷以鷺欲其流風好焉今有龍頭大執中皷蜀掲小皷隨品秩焉短簫鐃歌軍樂也帝岐伯所作以建武揚徳古今樂錄曰鎛師掌金奏之皷又卒長執鐃兩司馬執鐸公司馬執鐲以金鐃止皷以金鐸通皷以金鐲莭皷以鐘皷者前擊鐘後擊皷也大周樂正曰劉貺曰皷動也冬至之音萬物合陽氣而動雷皷八面以祀天靈皷六面以祀地路皷四面以祀鬼神夏后加以足謂之足皷殷人以柱貫之謂之建皷髙六尺六寸金奏則皷之旁有小傍皷謂之應皷以和大皷小皷有柄曰鞉揺以和皷大皷鼙也腰皷大者瓦小者木皆廣首而纎腹齊皷如漆桶大一頭設齊于皷面如麝齊故曰齊皷又曰馬上之皷曰提皷有木可提執施於朝則登聞之皷敢諌之皷是也施於府寺曰朝皷在村墅曰枹皷枹一作桴調擊皷物也在邊徼曰警皷又鼓鑄銅為之虛其一面覆而擊其上南蠻其南天竺類皆如此嶺南豪家有大者廣尺餘又曰莭皷如博局中開圎孔適容其皷擊之以莭樂也又曰毛員皷似都曇而稍大又曰有鼉皷莭皷不知誰所造又曰擔皷如小甕先冒以革而漆之又曰羯皷正如漆桶兩手俱擊以其出羯中故號羯皷亦謂兩杖皷又曰正皷和皷一以正而一以和皆腰皷也又曰都曇皷似腰肢而小以小搥擊之又曰荅臘皷制廣於羯皷而皷以指揩之其聲甚震俗謂之指皷又曰雞婁皷正而圓首尾可擊之處平可數寸又曰方皷大歴元年司馬滔進廣平樂兼此皷以應黄鍾聲一均樂書曰雷鞉者周禮瞽矇掌播鞉鞉如皷而小以木貫之作柄柄各四枚為八面也旁以結皮為耳揺之還自擊禮書云掌之人左手播鞉右手擊皷者是也柷敔釋名曰柷如物始見柷柷然也敔止也所以止樂尚書䕫曰戛擊鳴球下管鼗皷合止柷敔孔安國曰戛擊柷敔也下管掌下樂也上下合心樂各有柷敔也禮記徳音之音控掲天子賜諸侯樂則以柷将之樂記曰聖人作控掲壎箎則所起矣柷衆也立夏之音萬物衆形皆成也方面各二尺旁開員孔内手於孔擊之以舉衆樂也爾雅曰所以皷柷謂之止所以皷敔謂之甄郭璞注曰柷如漆桶方二尺四寸深尺八寸中有椎柄連底挏之令左右擊止者其椎名也敔如伏虎背上有二十七鉏鋙刻以木長尺甄者其名也樂記圖曰乾主立冬隂陽終始故聖人象天以制柷形法使死者不恨生者不怨爾雅曰敔謂之甄音真注云敔如虎伏背上二十七鉏鋙刻以木長尺甄其名也筍簴爾雅曰木謂之簴郭璞注曰懸磬之木曰簴方言凡其髙者謂之筍郭璞注曰筍簴也釋名曰所以懸鐘皷者横曰筍筍峻也在上髙峻也縱曰簴簴舉也在旁舉筍也毛詩曰設業設簴崇牙樹羽周禮冬官梓人為筍簴臝者羽者鱗者以為筍簴也外骨内骨却行仄行紆行連行以脰鳴以翼鳴以為雕琢厚唇弇口出目短耳大胸耀后者以為鐘簴銳喙决吻小體騫腹者以為磬簴小首而長摶身而鴻者以為筍注曰為鐘簴者有力而不能走宜於任重也為磬簴者其聲清揚宜逺聞也外骨龜内骨鼈却行螾仄行蟹紆行蛇連行魚脰鳴鼃黽翼鳴發皇也螾蚰蜒皆以刻畫彛器摶庶物貴野聲禮明堂位曰夏后氏之龍筍殷之崇牙周之壁翣注云龍上刻畫為重牙又畫繒為翣載之以壁重五羽於其下也賈誼員簴賦曰攖擊拳以蟉虬負大鐘而欲飛楚詞曰簫皷兮揺簴說苑曰秦始皇建千石之鐘立萬石之簴三輔舊事曰秦始皇斂天下銅鐵皆著咸陽鑄作銅簴髙廟簴二板魏明帝徙詣洛陽尚在太平御覽卷五百八十二
