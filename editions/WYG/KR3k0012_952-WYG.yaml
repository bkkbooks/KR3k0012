body:
  text: 太平御覽卷九百五十二宋李昉等撰木部一木上易曰巽為木坎其於木也為堅多心艮其於木也為堅多節離其於木也為科上槁多心為剛中也山木堅在内多節艮陽在外其堅多節科空也離中虛則木枯槁又升卦曰地中生木升君子以順德積小以髙大書曰兖州厥木惟喬又洪範五行三曰木木曰曲直曲直作酸又説命曰木從繩則正后從諫則聖詩曰黄鳥于飛集于灌木其鳴喈喈灌木叢木也又曰荏苒柔木君子樹之往來行言心焉數之荏苒柔貌柔嘉之木材中琴瑟樹植也又曰南有喬木不可休息漢有遊女不可求思興也以喬木方遊女以不可息興起不可求又曰南有樛木葛藟纍之木下曲曰樛言后妃能逮下而無嫉妬之心焉周禮曰仲冬斬隂木仲夏斬陽木陽木生南山隂木生北山禮記月令曰孟春之月盛德在木孟夏之月毋伐大樹樂記曰王者作樂制禮得天心則草木有益於人者将以養民也王者得禮之制則澤谷之中生赤木禮斗威儀曰君乗木而王者其政平則草木豐茂左傳曰山有木工則度之又曰鳥則能擇木木豈能擇鳥春秋元命苞曰木者陽精生於隂故水者木之母也木之為言觸也氣動躍也其字八推十為水八者隂合十者陽數春秋運斗樞曰黑精用事百木共一根百枝木共一根天下共主之徵也春秋繁露曰木有變春凋冬榮眞鋼精鋭無以治之北魏書曰崔亮為雍州刺史城北渭水淺不通船行人擁阻崔亮謂僚佐曰昔杜預乃造橋况此有異長河且魏晉之時亦有橋吾今更欲造之咸曰水淺不可為浮橋而長橋又不可施柱恐難成立亮曰昔秦居咸陽度渭以像閣道濟師以柱為橋今唯意慮長柱不可得其夕天大雨山水暴至浮長木數百根藉此為用橋遂成立百姓利之至今猶名崔公橋後周書曰沙苑之役齊神武夜遁追至河上復大克獲前後擄其衆七萬獻俘長安還軍渭南于是所徵諸州兵始至乃於戰所令所得當時兵士人種樹一株以旌武功又曰王羆以功授右将軍西河内史辭不拜時人謂之曰西河大拜俸禄殷厚何為致辭羆曰京洛材木盡出西河朝貴營地併第宅者有求假如其私辦即力所不堪若科發民間又違法憲以此辭也唐書曰貞觀中山木連理交錯玲瓏有同羅木一丈之幹并枝者二十餘所又曰代宗大厯十二年成都府人郭遠因樵㸑獲瑞木一莖有文曰天下太平獻之以示百官宰臣奏賀曰至德之化賁於草木太平之符遂形文字伏望藏於秘閣宣付史舘又曰貞觀初陳留生兩木皆大如指長寸餘毎木有孔通中所下其立如植管子曰桓公問民飢寒室屋不治墻垣壊不築為之奈何管子曰沐塗樹之枝公令左右沐塗樹枝其年民治室屋築墻垣桓公問之管子曰一樹而息百乘行者在其下終日不歸父老拊樹而論終日不歸今吾沐之日中無尺隂行者疾走父老歸而治室老子曰天下之至柔馳騁天下之至剛人之生也柔弱其死也堅强草木之生也柔脆其死也枯槁柔弱生之徒剛强死之徒合抱之樹生於毫末莊子曰南郭子綦遊乎商之丘見大木曰此何木也然必異材從而視其細枝則拳曲而不可以為棟俯而視其大根不可以為棺槨䑛其葉則舌爛臭之則使人狂酲子綦曰此果不材之木以至於此其大也又曰莊子行於山中見大木枝葉盛茂採木者止其旁而不取也問其故曰無所可用荘子曰此木以不材得終其天年矣孟子曰孟子謂齊宣王曰所謂故國者非謂有喬木之謂也有世臣之謂也孫卿子曰山下望十畆之木若著而求著者不上折也又曰林木茂斧斤至又曰玉在山而木閏孔叢子曰夫子墓方一里諸弟子各以四方竒木來植之尸子曰木之精氣為畢方愼子曰廊廟之材蓋非一木之枝呂氏春秋曰今夫爚蟬務在乎明其火振其樹而已火不明雖振其樹何益雖振其樹蟬飛去不能得故曰何益明不在乎火在於闇當今之時也闇甚矣人主有能明其德者天下之士歸之矣若蟬之赴火明也又曰子之於父母也一體而兩分同氣而異息若華之有實樹木之有根心也又曰樹木盛則飛鳥歸之芻草美則禽獸歸之人主賢則豪傑歸之韓子曰待自直之箭則百世無矢矣待自圓之木則千嵗無輪矣又曰君者壤地臣者草木商子曰蠧衆則木折隙大則墻壊文子曰葉落者風揺之水濁者物撓之也又曰甘泉必竭長木必伐符子曰木生蝎蝎盛而木枯石生金金曜而石流又曰水生於石未有居石而溺火生於木未有抱木而焦淮南子曰木洪者為夲而殺者為末禽獸之大者為首而小者為尾末大於夲則易折尾大於腰則不掉故食於口而百節肥壅其本而枝葉美又曰夫樹木灌以潦水疇以肥壤千人養之一人㧞之則必無餘蘖况以一國同伐之雖欲久豈可得哉又曰山生金反自尅木生蠧反自食人生事反自賊賊敗也又曰今夫徙樹者失其隂陽之性則莫不枯槁失猶易也故橘之江北則化而為枳鸜鵒不過濟貉渡汶而死又曰鳩生陽閼自鳩之先也陽閼生鱗鮐音台鱗鮐生鮐幹木幹木生庶木根枝木者生於庻木根枝木名也又曰髙山深水非為虎豹也大木茂枝非為飛鳥也又曰天有明不憂民之晦也百姓穿户鑿牖自取炤焉地有財不憂民之貧也百姓伐木艾草自取富焉又曰郢人有買屋棟者求三圍之大木而人予車轂跪而度之巨雖可而長不足雖大而長不足言其短也又曰食木者多力而惡熊犀之屬是也食草者善走不愚麋鹿之屬是也又曰良匠不能㫁金巧冶不能鑠木金之勢不可㫁而木之性不可鑠也又曰髙陽魋或曰髙陽楚時王魋宋大夫也将為室問匠人匠人對曰未可也木尚生加塗其上必将墝以生材任重塗今雖善後必敗髙陽應曰不然夫木枯則益重塗乾則益輕塗今雖惡後必善匠人窮於辭以對卒為屋其始成居然善也而後果敗此直於辭而不可用者也又曰捨茂木而集於枯不弋鵠而鳥難與有圖圖謀也言其愚也又曰質的張而弓矢集林木茂而斧斤入非或召之形勢所致也又曰冬氷可折夏木可結時難得而易失木方茂盛終日採而不知秋風下霜一夕而殫殫盡也又曰佐祭者得嘗救鬭者得傷䕃不祥之木為電所撲蔭植也撲擊也又曰金勝木者非以刀殘木也土勝水者非以墣音朴土塊也塞江也又曰剞劂銷音削鋸非良匠不能以制木鑪􅗜音朶坊設鑪􅗜皆冶坊之形也非巧冶不能以治金又曰羽翼美者傷骨骸枝葉美者害根莖能兩美者天下無之也又曰凡見葉落而知嵗故葉落而長年悲風俗通曰桂陽太守江夏張遼字叔髙田中有樹遣客伐之六七十下血出客驚怖歸以其事白叔髙叔髙大怒曰樹木血出此何言叔髙自嚴行復斫之血大流叔髙使先斫其枝葉有一空處白頭公可長四尺忽出往赴叔髙叔髙乃逆格之如此凡殺四頭左右皆怖伏地而叔髙恬如也徐熟視非人也遂伐其木其年召辟御史後為兖州刺史以二千石尊過鄉里白日衣繡榮美如此抱朴子曰山中大樹能語者樹語也其名曰靈陽山夜見火者皆古樹所致勿怪也山中人稱仙人者樹也孫綽子曰海人與山客辨其方物海人曰魚額出華山之頂一吸萬頃之波山客曰鄧林有木圍三萬尋直上千里旁䕃數國有人曰東極有大人斬木為䇿短不可支釣魚為鮮不足充飢金樓子曰利水産名材元嘉中大水有十餘叚木流出斧跡未㓕俗云漢将将攻越築城浮木於利水未運之前一夜中忽失數小叚時或見之今所見木豈非昔鬼匿之木乎山海經曰少室山上木名帝休黄花黑實服之不怒隂符經曰火生于木禍發必尅仙序曰王須少年入學最遠徃來常先流軰怪之常見提木三尺餘至則拄屋間流軰知之取㸔後不見正論曰師曠曰人骨法猶木有宜曲者為輪直者為輿檀宜作輻榆宜作轂𤣥中記曰千嵗樹枝中央下四邉髙百嵗之樹其汗赤如血又曰大樹之山西有采華之樹服之通萬國之言博物志曰圓丘山有不死樹食之夀十洲記曰聚窟洲中申未地上有大樹與楓木相似而華葉香聞數百里名為返魂樹於玊釡中煑其汁如墨粘名之為返生香香氣聞數百里死屍在地聞氣乃活太平御覽卷九百五十二
