body:
  text: 太平御覽卷二百三十六宋李昉等撰職官部三十四國子祭酒司業博士少府監将作監國子祭酒六典曰國子祭酒司業之職掌邦國儒學訓導政令有六焉一曰國子二曰太學三曰四門四曰律學五曰書學六曰算學韋昭辯釋名曰祭酒者謂祭六神以酒醊之也辯云凡會同饗讌必尊長先用先用必以酒祭先故曰祭酒漢時吳王年長以為劉氏祭酒是也徐廣釋祭酒云古主人具饌則賔中長者一人舉酒祭地是則長者為祭酒也漢書曰吳王賜號為劉氏祭酒應劭曰禮飲酒必祭示有先也故稱祭酒飲時唯尊長者以酒沃酹也又曰張安世薦蘇武明習故事奉使不辱命宣帝以武壯節老臣令朝朔朢號稱祭酒甚優寵之續漢書百官表曰建武初置五經博士太常差次有聰明威重者一人為祭酒總領綱紀漢書百官表注曰博士祭酒一人掌國子學早朝服進賢兩梁冠佩水蒼玉蜀志曰先主既定益州廣漢太守夏侯纂請秦宓為師友祭酒晉書曰袁瓌字山甫為國子祭酒時屬經喪亂禮教陵遲瓌上䟽求立學徒帝從之國學之興自瓌始也又曰裴頠為祭酒奏立太學講堂築門闕刻石寫五經晉中興書曰杜夷字行齊以儒學稱中宗以夷為丞相祭酒中興初皇太子凡三至夷舍執經問義沈約宋書曰博士秦官也掌通古今員多至數十人有僕射光武增為十五人並益一經有數家之學故也皆教弟子光武改僕射曰祭酒祭酒者一位之元長也齊書曰張緒竟陵王子良領國子祭酒武帝勑王晏曰吾欲令司徒辭祭酒以授張緒物議以為云何子良竟不拜以緒領國子祭酒齊職儀曰晉令博士祭酒掌國學而國子生師事祭酒執經葛巾單衣終身致敬梁書令曰王承字安期為國子祭酒承祖儉父暕並居此職三代為國師前代未有當時以為榮暕音簡崔鴻十六國春秋前秦錄曰建元七年髙平蘇通長樂劉祥並以碩學耆儒尤精二禮堅以通為禮記祭酒居于東庠祥為儀禮祭酒處于西亭堅毎月朔旦率百寮親臨講論後魏書曰韓子熙累遷國子祭酒子熈儉素安貧常好退静遷鄴之始百司並給兵刀時以祭酒閒豫止給二人或有令其陳謁者子熙曰朝廷不與祭酒兵何關韓子熙事論者稱之後周書曰盧誕本名恭祖拜給事黄門侍郎魏帝詔曰經師易求人師難得朕諸兒稍長欲命卿為師於是親幸晉王第勑晉王以下皆拜之於帝前因賜名曰誕又以誕儒宗學府為當世所推乃拜國子祭酒隋書曰楊汪字元度拜國子祭酒帝令百寮就學與汪講論天下通儒碩學多萃焉論難鋒起皆不能屈帝令御史書其問答奏之省而大恱賜良馬一匹又曰元善遷國子祭酒上嘗親臨釋奠命善講孝經於是敷陳義理兼之以諷諫上大恱曰聞江陽之說更起朕心賚絹百疋衣一襲唐書曰許後𦙍常侍太宗講後為睦州刺史因入朝乞骸骨太宗召問曰朕與卿刺史資以自養何謂即求致仕後𦙍對曰年老筋力不逮望得私地時見闕庭太宗曰卿氣力猶強欲何官也後𦙍陳謝不敢太宗曰朕昔從卿讀書卿今日從朕求官但言所欲不相違也時國子祭酒缺後𦙍奏言之因授國子祭酒風俗通曰孫卿有秀才善為詩禮易春秋至齊襄王時而孫卿最老師三為祭酒齊王融為王儉讓國子祭酒表曰竊以庠均義重振古所崇資師道尊有來攸尚匪曰蘭芷疇變入室之情不自朱藍何遷素絲之質司業唐書曰韋叔夏遷成均司業則天時特下制曰吉凶禮儀國家所重司禮博士未甚詳明成均司業韋叔夏太子率更令祝欽明等博涉禮經多所該練委以叅掌冀𢎞典式自今司禮所脩儀注並委叔夏等刊定訖然後進奏又曰歸崇敬上言司業者義在禮記曰樂正司業正長也言樂官之長司主此業爾雅云大板謂之業按詩周頌設業設虡崇牙樹羽則業是懸鐘磬之簨虡也今太學既不教樂於義則無所取請改司業一為右師一為左師位正四品上博士六典曰博士掌教文武官三品以上及國公子孫應劭漢官儀曰博士秦官也博者通博古今士者辯於然否孝武帝建元五年初置五經博士秩六百石太常差次有聰明威重者一人為祭酒總領綱紀漢舊儀曰武帝初置博士取學通行修愽識多藝曉古文爾雅能屬文章者為之朝賀位次中都官吏稱先生不得言君其弟子稱門人也漢書曰賈誼文帝召為博士時年二十許最為少毎詔命議下諸老生未能言誼盡為之對人人各如其意所出又曰韋賢字長孺為人質朴少欲篤志於學兼通禮尚書以詩教授時人號稱鄒魯大儒徵為博士又曰公孫𢎞對䇿時百餘人太常奏第居下天子擢𢎞對為第一召入見容貎甚麗拜為博士待詔金馬門也又曰元鼎中徐偃為博士使行風俗偃矯制使膠東魯國鼓鑄鹽鉄還奏事張湯劾偃矯制法死偃以為春秋之義大夫出疆有可以安社稷利萬人專之可也湯不能詘東觀漢記曰甄宇拜博士毎臈詔賜博士羊人一羊有大小肥瘦時議欲殺羊分肉又欲投鉤宇因取瘦者自是不復争後召會詔問瘦羊博士所在京師以為號又曰歐陽歙其先伯和從伏生受尚書至歙七世皆為博士敦於經學恭儉好禮後漢書曰光武毎朝會輙令桓榮於公卿前說經書帝稱善曰得生幾晩會博士缺帝欲用榮榮叩頭讓曰臣經術淺薄不如同門生郎中彭閎揚州從事臯𢎞帝曰俞往汝諧因拜榮為博士又曰董鈞永平初為博士時草創五郊祭祀及宗廟禮樂威儀章服輒令鈞叅議多見從用當世稱通儒華嶠後漢書曰初欲立左氏傳博士范升以為左氏淺末不宜立陳元聞之乃詣闕上疏争之更相辯對凡十餘上帝卒立左氏學也漢舊儀曰孝文皇帝時博士七十餘人朝服𤣥端章甫冠魏志曰樂祥字文載少好學黄初中徵拜博士于時太學初立博士十餘人學多偏僻不敢親教備員而已唯文載五業並授又曰文帝黄初五年大學置五經課試之法置春秋穀梁博士又曰明帝太和二年詔曰尊儒貴學王教之本也自頃儒官或非其人將何以宣明聖道其髙選博士才任侍中常侍者吳志詔曰古者建國教學為先所以道世治性為時養器也自建興已來時事多故吏民頗以目前趍務去本務末不循古道夫所尚不淳則傷化敗俗其案古置學官立五經博士核取應選加其寵祿科見吏之中及將吏子弟有志學者各令就業一嵗課試差其品第加以位賞使見之者樂其榮聞之者羡其譽以敦王化以隆風俗晉令曰博士皆取履行清淳通明典義若散騎常侍中書侍郎太子中庶子以上乃得召試諸生有法度者及白衣試在髙等拜郎中晉書載記曰姚泓受經于博士淳于岐岐病親詣省病拜于牀下自是公侯見師傅皆拜焉後魏書曰崔逸字景携好古博涉為國子博士毎因公事逸常被詔獨進博士特命自逸始之後周書曰盧辯字景宣為太學博士以大戴禮未有解詁辯乃注之其兄景裕為當時碩儒謂辯曰昔侍中注小戴今爾注大戴庶纂前修矣隋書曰馬光開皇初髙祖徵山東義學之士光與張仲讓孔籠竇士榮張黑奴劉祖仁等俱至並授太學博士時人號為六儒又曰馬光為太學博士嘗因釋奠髙祖親幸國子學王公以下畢集光升座講禮啟發章句已而諸儒生以次論難者十餘人皆當時碩學光剖析疑滯雖辭非俊辯而理義𢎞贍論者莫測其淺深咸共推服上嘉而勞焉又曰王頗授著作佐郎尋令於國子講授會髙祖親臨釋奠國子祭酒元善講孝經頗與相論難詞義鋒起善徃徃見屈髙祖大竒之超授國子博士又曰何妥授太學博士帝初欲立五后以問儒者辛彦之對曰后與天子匹體齊尊不宜有五妥駮曰帝嚳四妃舜又二妃亦何常數由是封襄城縣伯又曰房暉逺為國子博士會上令國子生通一經者並悉薦舉將擢用之既䇿問訖博士不能時定臧否祭酒元善恠問之暉逺曰江南河北義例不同博士不能遍涉學生皆持其所短稱已所長博士各各自疑所以乆而不决也祭酒因令暉逺考定之暉逺覽筆便下初無疑滯或有不服者暉逺問其所傳義疏輒為始末誦之然後出其所短自是無敢飾非者所試四百人數日便决諸儒莫不推其通博魯國先賢傳曰漢文帝時聞申公為詩最精以為博士申公為詩𫝊號曰魯詩李郃别傳曰郃上書太后數陳忠言其辭雖不盡施行輙有䇿詔褒贊焉博士著兩梁冠朝會宜随士大夫例時賤經學博士乃在市長下公奏以為非所以敬儒德明國體也上善公言正月大朝引博士公府長史前殷氏世傳曰殷亮建武中徵拜博士遷講學大夫諸儒論勝者賜席亮重席至八九帝嘉之曰學不當如是耶典略曰公儀休者魯博士也為魯相無所變更百官自正使食祿者不得與下民争利論衡曰王莽之時省五經章句博士弟子郭略夜定舊說死於燭下少府監六典曰少府監之職掌百工伎巧之政令總中尚左尚右尚職治掌治五署之官屬正其工徒謹其繕作少監為之貳漢官宰尹下曰少府言别為小藏故曰少府漢書曰少府秦官掌山海池澤之稅以給供養又曰歐陽地余字長賔為少府誡其子我死官屬送汝財物愼勿受汝九卿儒者子孫以亷潔著可以自成及卒少府官屬送數百萬其子不受天子聞而嘉焉賜錢百萬後漢書曰東平王蒼為驃騎正月朔朝蒼當入賀故事少府給璧時隂就為少府貴傲不奉法漏將盡求璧不得蒼掾朱暉遥見少府主簿持璧乃徃紿曰試請觀之既得而馳奉之就復以他璧朝張璠漢紀曰太常种拂與李儒戰而死子劭徵為少府鴻臚皆不受曰我父盡忠於朝而為時所妬父以身徇國為賊臣所害為臣子不能除賊何面目復覲明主三輔聞之為之感動應劭漢官儀曰少府掌山澤陂池之稅名曰禁錢以給私養自别為藏少者小也故稱少府魏志曰王觀徙少府大將軍曹爽使材官張達斫屋材及諸私用之物觀聞之皆錄奪以没官少府統三尚方御府藏珍玩之寶爽等奢放多有干求憚觀守法乃徙為太僕又曰楊阜字義山為少府卿侃然以天下為己任三國志吳主遣少府徐祥至魏魏太祖謂祥曰孤比者右越横江之津與孫將軍遊姑蘇之臺獵長洲之苑吾志足矣祥對曰大王欲奉至尊以合諸侯若越横江而遊姑蘇是踵亡秦而蹈夫差天下事去矣太祖曰徐生得無逆詐耶臧榮緒晉書曰陳眕字國鎮過江為少府卿時大旱經乆大興四年四月始雨有司奏應報賽宗廟山川中宗詔曰祈廟云報賽非奉尊上辭也吾意有疑眕以為舊山川有許報故雨應賽非大事不應告廟子無要君親之道讀祭稱賽於義有違從之唐書官品志曰少府卿位視尚書左丞置材官將軍左中尚方甄官平水中署南塘邸稅庫東西冶平准細作炭庫紙官染署等令丞將作監六典曰將作大匠之職掌供邦國修建土木工匠之政總四署三監百工之官屬以供其職事少匠貳焉漢書曰將作少府秦官掌治宫室范曄後漢書曰魏霸徵拜將作大匠明年和帝崩典作順陵時盛冬地凍中使督促數罰掾吏以厲霸霸撫循而已初不切責而反勞之曰今諸卿被辱大匠過也吏皆懷恩力作功倍續漢書曰曹襄字叔通遷將作大匠時有疾疫巡行病徒自省醫藥糜粥死者減少又百官志曰將作秩二千石掌作宗廟路寢宫室丞一人六百石左右校令左右工徒掌木土之功并樹桐梓之類列于道側又曰李固字子堅遷大匠常推賢士孔融以將作大匠遷少府也華嶠後漢書曰應順字仲華為將作大匠發摘衆姦皆極其刑豪猾之吏歛迹視事五年省費以億萬應劭漢官儀曰世祖中興以謁者領其官章帝建初元年乃置其位次河南尹永元七年大匠應愼上言百郡計吏觀國之光而舎逆旅﨑嶇私館貢篚之物朽濕曝露昔晉霸國之盟主耳舎諸侯於隸人鄭子産以為大譏況今四海之大而可無乎和帝嘉納之魏志曰楊阜字義山為將作大匠明帝時初治宫室發美女充後庭阜上疏欲省宫人諸不見幸者乃召御府吏問後宫人數吏守舊令對曰禁宻不得宣露阜怒杖吏一百數之曰國家不與九卿為宻反與小吏為宻乎帝聞之而愈敬憚晉書曰將作大匠陳勰掘地得古文尚書奏今文長於古文宜以古為正潘岳以為習用已乆不宜復改唐書官品志曰大匠卿位視太僕掌土木之功統左右校諸署汝南先賢傳曰應仲華遷大匠除藻飾之無用割有損之浮費凡所省息七億餘萬太平御覽卷二百三十六
