body:
  text: 太平御覽卷六十一宋李昉等撰地部二十六河祥瑞沈祭决塞附淮濟河釋名曰河下也隨地下處而通流也山海經曰崑崙山縱廣萬里髙萬一千里去蒿山五萬里有青河白河赤河黒河環其墟其白水出其東北陬屈向東南流為中國河河百里一小曲千里一大曲發源及中國大率常然東流潜行地下至規期山北流分為兩源一出葱嶺一出于闐其河復合東注蒲昌海復潜行地下南出積石山西南流又東迴入塞過燉煌酒泉漲掖郡南與洮河合過安定北地郡北流過朔方郡西又南流過五原郡南又東流過雲中西河郡東又南流過上都河東郡西而出龍門汾水從東于北入河東即龍門所在吕氏春秋曰龍門未開河出孟門東大溢是謂洪水禹鑿龍門始南流至華隂潼闗與渭水合又東迴砥柱砥柱山名河水分流包山而過山見水中若柱然今陕州東河北陕縣三縣界及洛陽孟津所在至鞏縣與洛陽水合成臯與濟水合濟水出河北至王屋山而南截河渡正對成臯又東北流過武徳與沁水合至黎陽信都信都今冀州絳水所在絳水亦曰潰水一曰漳水鉅鹿之北遂分九河鉅鹿今郢州大陸所在大陸澤名九河一曰徒駭二太史三馬頰四覆釡五湖蘇六簡七潔八鉤盤九鬲津又合為一河而入海齊桓公塞九河以廣田居故館陶貝丘廣川信都東光河間東城地九河舊迹猶存漢代河決金堤南北多罹其害議者常欲求九河故迹而穿之未知其所是以班固云自兹距漢已亡其八枝河之故瀆自沙丘堰南分河出焉故尚書稱導河積石至于龍門今絳州龍門縣界南至于華隂北至于砥柱東至于孟津在洛北都道所奏古今以為津東過洛汭至于大伾洛汭今鞏縣在河洛合流之所也大伾山今汜水縣即故成臯也山再成曰伾北過絳水至于大陸其絳水今冀州信都大陸澤名今邢州鉅鹿又北播為九河同為逆河入海是也同合出九河又合為一名為逆河逆行也言海口有潮汐以迎河水書曰九河既道孔安國注曰河水分為九道詩曰關關雎鳩在河之洲又曰新臺有泚河水瀰瀰又曰河水洋洋北流活活又曰誰謂河廣一葦航之誰謂宋逺跂予望之又曰不敢暴虎不敢馮河大戴禮曰聖人有國則河不滿溢禮斗威儀曰君乗土而王其政太平則河溓宋君注曰河不災溢也傳曰周詩有之曰俟河之清人夀㡬何詩逸詩也言人夀促而河清遲喻晉之不可待也又曰楚昭王有疾卜河為祟大夫請祭王曰江漢沮漳楚之望也河非所獲罪春秋考異郵曰河者水之氣四瀆之精所以流化故曰河潤千里孝經援神契曰河者水之伯上應天漢史記曰秦滅六國自以為獲水徳之瑞更名河曰徳水漢書曰河有兩源一出葱嶺山一出于闐于闐在南山下其北流與葱嶺河合東注蒲昌海一名鹽澤又曰長水校尉髙竝言河決率常于平原東郡左右其地形下而土疏惡也聞禹理河本在此地以為水隈近察秦漢河決曹衛之域不過百八十里可空此地勿以為官亭民室張璠漢紀曰郭伋為潁川太守光武詔曰賢能太守去帝城不逺河潤九里冀京城并蒙其福魏志曰袁紹渡河沮授臨舟嘆曰上盈其志下務其功悠悠黄河吾其濟乎說苑曰甘茂使齊渡河船人曰河水猶澗耳君不能渡何王之能說乎甘茂曰持楫隨流臣不若子說萬乗之君子不如我桓譚新語曰大司馬張仲議曰河水濁一石水六斗泥而民競決河溉田今河不通利至三月桃花水至則決以其噎不泄也可禁民勿復引河韓詩外傳曰申屠狄非其世將自投於河崔嘉聞而止之曰聖人民之父母也今為濡足之故不救溺人可乎申屠狄曰昔桀殺龍逢紂殺比干而亡天下吳殺子胥陳殺泄冶而滅其國非無聖知不用故也遂負石而沈于河河圖始開圖曰黄帝問風后曰余欲知河之始開風后曰河凡有五皆始開乎崑崙之墟慎子曰西河下龍門其流駛竹箭抱朴子曰撮壤不能填決河升水不能冷原火又寸膠不能理黄河之濁尺水不能却蕭丘之火淮南子曰武王伐紂至孟津陽侯之波逆流而擊疾風晦暝人馬不相見于是武王左操黄鉞右執白旄瞋目而麾曰余在天下誰敢害余者於是風濟波罷又河以委虵故能逺山以陵遲故能髙道以優㳺故能化又河九折注海而流不絶者有崑崙之輸也風俗通曰河播也播為九州也物理論曰河色黄衆川之流蓋濁之也百里一小曲千里一大曲一直一曲九曲以達於海山海經曰從極之淵深三百仞唯氷夷恒都焉氷夷馮夷也淮南子曰馮夷得道以潜大川馮夷人面乗兩龍乗雲車駕二龍水經注曰禹理洪水觀於河見白面長人魚身出曰吾河精也授禹河圖而還于淵又曰昔澹臺子羽齎千金之璧渡河陽侯波起兩蛟挾舟子羽曰吾可以義求不可以威刼操劒斬蛟蛟死波休乃投璧于河三投而輒躍出乃毁璧而去示無恡意又崑崙在北去嵩髙五萬里地之中也髙萬一千里河水出其東北蕭廣濟孝子傳曰三洲人者各一洲人皆孤單㷀獨三人閒㑹樹下息因相訪問老者曰寧可合為斷金之業邪二人曰諾即相約為父子因命二人于大澤中作舍且欲成父曰此不如河邊二人曰諾河邊舍幾成父曰又不如河中二人復填河二旬不立有一書生過之為縛兩土肫投河中㑹父往呼止之曰嘗見河填耶觀汝行耳相將而去明日俱至河邊望見河中土髙丈餘祥瑞河附禮記曰河出馬圖言龍馬負圖也河圖曰黄帝曰余夢見兩龍授圖乃齋往河洛而求有魚折流而止魚汎得圖跪而受之運斗樞曰舜與諸侯觀河洛有黄龍負圖出置帝前䠠入水而前去䠠之遊反又音帶䠠去也拾遺記曰黄河千年一清聖人之大瑞也易乾鑿度曰帝王將起河水先清清變白白變赤赤變黒黒變黄各三日中候曰榮光出河休氣四塞榮光即五色論語曰河不出圖吾已矣夫沈祭河附穆天子傳曰天子西狩獵獲白狐𤣥貉以祭于河禮記曰三王之祭川也皆先河後海此所以務本言海之本源自河也史記曰元光中河決于瓠子于是天子臨決河沈白馬玉璧于河令羣臣從官自將軍以下皆負薪填決河而取淇園之竹以為堰天子既臨決河悼功之不成乃作瓠子之歌决塞河附穀梁傳曰梁山崩壅河三日不流晉君召伯尊伯尊遇輦者問焉輦者曰君親素縞帥羣臣哭之既而祠焉伯尊至君問之伯尊如其言而河流矣左傳曰伯宗漢書曰成帝時河決潰金隄凡灌四郡河隄使者王延世塞以竹落長四丈大九圍盛以小石兩船夾載而下之三十六日河隄成改元為河平又賈讓奏言治河有上中下三策若徙其當水衝之人以避之放河使北入海汎濫期月自定不勞人力此功一立河定人安千載無患謂之上䇿若多穿漕渠使人得以溉田雖非聖人法然亦救敗術也今據堅地作石隄東西水門但用木與土耳旱則開東方水門以溉田水則開西方髙門以分河此誠富國安民興利除害謂之中策茍繕完故隄増卑培原勞費無已數逢此害謂之最下䇿也又武帝元光中河水決頓丘發卒十萬救決河起龍淵宫武廟也自作之故言官吕氏春秋曰故龍門未開吕梁未𤼵河水來孟門大溢逆流名曰洪水禹乃決江疏河為彭蠡之障所活者千八百國此禹之功文子曰江河之大溢不過三日水經注曰漢平帝之世河汴決壊未及得修汴渠東侵日月彌廣門閭故處皆水中也漢明帝永平十二年議治汴渠上乃引樂浪人王景問水形便景陳利害應對敏㨗帝甚善之乃賜山海河渠書禹貢圖及以錢帛𤼵卒數十萬詔景與將作謁者王吳治渠築隄防修堨起自滎陽東至千乗海口千有餘里景乃商度地勢鑿山開澗防遏衝要疏決壅積十里一門水更相迴注無復潰漏之患明年渠成帝親自巡行詔濵河郡國置河堤員吏如西京舊制由是顯名王吳及諸從事者皆増秩一等順帝陽嘉中又自汴河口以東縁河積石為堰通淮曰金堤靈帝建寧中有増修石門以遏渠口水盛則通注津耗則輟流淮春秋說題辭曰淮出桐栢淮者均也均其務釋名曰淮圍也圍繞揚州北界東至海廣雅同說文曰淮出南陽平氏桐栢大復山東南水經注及山海經云淮水出南陽平氏縣桐栢山其源初則涌出復潜流三十里然後長騖東北經大復山從義陽郡北東過江夏平春縣北又東過新息縣南期思縣北至原鹿縣南與汝水合又東過廬江安豐縣與決水合東北至九江夀春縣與潁水合夀春縣東北與淝水合又東至當塗縣北與渦水合東北至下邳淮隂縣與泗水合東至廣陵淮浦縣而入海也近海數百里通朝夕潮尚書稱導淮自桐柏東㑹于泗沂東入于海是也書曰淮沂其乂又曰泗濵浮磬淮夷蠙珠周禮曰橘踰淮而北為枳此地氣然也詩曰率彼淮浦省此徐土孟子曰禹排淮泗而注之江焦貢易林曰江河淮海天之奥府衆利所聚可以饒有劉向說苑曰莊周貧往貸于魏文侯文侯曰待吾邑粟之來而奉之周曰乃今者周之來見道牛蹄中有鮒魚焉太息謂周曰我尚可活也周曰須我為汝向南詣楚王決江淮以溉汝鮒魚曰今命在盆甕之中耳乃為我見楚王決江淮以溉我汝即索我于枯魚之肆矣晉陽秋曰秦始皇東遊望氣者云五百年後金陵有天子氣於是始皇改曰秣陵塹北山以絶其勢今建康即秣陵西北界所塹即建康南淮也今謂之秦淮淮南子曰夫醉者超江淮以為尋常之溝也濟釋名曰濟濟也言源出河北濟河而南也水經注及山海經云濟水出河東垣縣王屋山初名沇水風俗通云濟水出常山房子縣賛皇山北又别是一水耳應氏以為流入濟者非也東出溫縣西北始名濟水孔安國注尚書曰𤼵源為沇流去為濟在溫西北平地又東南流當鞏縣之北而南入河與河並流過大伾成臯成臯今汜水縣晉書地道志曰濟自大伾入河與河水鬬大伾成臯古成臯兼包鞏縣之界溢出為滎水東流過陽武及封丘縣又東過寃朐縣南至定陶縣南又東北流與菏水㑹東至乗氏縣西分為二其一東北流入鉅野澤過夀張西而與汶水合又北過穀城縣西又東北過盧縣北經濟郡東萊郡而入海也尚書稱導沇水東流為濟河水所經也又東北㑹于汶又北東入于海是也淮南子曰濟水通河宜麥風俗通曰濟水出常山房子賛皇山廟在東郡林邑縣濟者齊也齊其度量也戴延之西征記曰濟水自大伾入河與河水鬬而東流劉向說苑曰四瀆江河淮濟何以視諸侯能蕩滌垢濁焉能通百川于海焉能蕩出雲雨焉為徳甚美故視諸侯周禮冬官曰鸜鵒不踰濟地氣然也左傳曰鄭伯之車僨于濟韓子曰清濟濁河足以為限長城巨防足以為塞齊五戰之國也太平御覽卷六十一
