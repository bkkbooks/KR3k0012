  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_337-1a, image: WYG0896/WYG0896-0035c.png}
body:
  text: 太平御覽卷三百三十七宋李昉等撰兵部六十八攻具下旝鹿角箛槍弋攻具下通典衛公兵法攻城戰具篇曰作四輪車上以繩為卷主牛皮蒙下可藏十人填隍推直抵城下可以攻掘奔火木石所不能敗謂之橨榅車又曰以大木為牀下置六輪上立雙牙牙有檢梯節長丈二尺有四桄桄相去三尺勢微曲逓牙相檢飛於雲間以窺城中有上城梯首冠雙轆轤枕城而上謂之飛雲梯又曰大木為牀下安四獨輪牀上建雙陛間横括中立獨竿首如桔橰狀其竿髙下長短大小以城為凖竿首以窠盛石大小多少隨力所制人挽其端投之其推轉逐便而用之亦可埋脚著地而用其旋風四脚亦隨事而用之謂之抛車又曰作轉軸車車上定十二日弩以鐵鉤繩連轉車行軸轉引弩持滿弦推牙上弩為七衢中衢大箭一鏃刃長七寸廣五寸箭簳長三尺圍五寸以鐵鍱音常為羽左右各三箭次小於中箭其牙一發諸箭齊起及七百歩所攻城壘無不摧損樓櫓亦顛墜謂之車弩又曰以木為脊長一丈徑一尺五寸下安六脚下濶而上尖髙七尺内可容六人以濕牛皮蒙之人蔽其下畀直抵城下木石鐵火所不能敗用攻其城謂之尖頭木驢又曰於城下起土為山乗城而上古謂之土山合之壘道用生牛皮作小屋并四面蒙之屋中置運土人以防攻擊者土山則孫子所謂距閩鑿地為道行於城下用攻其城徃徃建柱積薪於柱間而燒之柱折城摧謂之地道又曰以八輪車上樹髙竿竿上安轆轤以繩挽板屋上竿首以窺城中版屋方四尺髙五尺有十二孔四面列布車可進退城而行於營中逺視亦謂之巢車如鳥之巢即今之版屋也以版為幔立桔橰於四輪車上懸幔逼城堞間使趫捷太白隂經曰使趫卒蔽之蟻附而上矢石所不能及謂之木幔又守城篇曰禽滑釐問墨翟守戍之具墨翟荅以五六十事皆煩冗不便於用其後韋孝寛守晋川羊侃臺城皆約封胡子伎巧之術法古不妙非今之用也今述所便於事者如後渭浚湟深城增城懸門懸門為重門也又曰突門於城中對敵營自鑿城内為闇門多少臨事令五六寸勿穿武於中夜或於敵初或營列未定精騎從突門躍出擊其無備襲其不意又曰塗扇以泥塗城門扇厚可三寸備火又曰鑿門為敵所過門先自鑿門扇為數十孔出强弩射之長矛刺之則敵不得近門又曰塗棧以泥塗門上木棧厚可五寸備火又曰轉關橋一梁為橋梁端着横栝去其橋轉人馬不得渡皆傾水秦用此橋而殺燕丹又曰積石備抛石大小随事又曰樓櫓却敵上建候樓以板為之跳出為櫓離戰隔於女墻上跳出㭬去墻三尺内着横括㭬端安轄以荆栁編為之長一丈闊五尺懸㭬端用遮矢石又曰布幔以複布為幔以弱竿懸挂於女墻外去墻外七八尺以折抛石之勢矢石不復及墻又曰木弩以黄連桑柘為弩弓長一丈二尺徑七寸兩弰二寸以絞車張之太矢一發聲如雷吼敗隊之卒又曰鷰尾炬縛葦草為炬尾分為兩岐如鷰尾狀以油臈灌之加火從城墜下便騎木驢而燒之又曰松明以木明燒之夜以鐵鏁縋下廵城照敵人乗城而上又曰脂油燭炬燃燈秉燭於城中四衢要路門戸晨夜不得絶明用備非常又曰行爐融鐵汁燼畀行於城心以灑敵人又曰逰火以鐵筐盛火加脂蠟鐵鎻懸縋下燒穴中孔城人又曰灰越糠粃因風於城上擲之以眯敵人目因以鐵汁灑之又曰連棒如打禾連枷狀用打女墻外上城敵人又曰扠竿如搶刃為兩岐用扠飛梯及人又曰鈎竿如搶刃兩旁有曲刃可以鈎搭又曰油囊盛水於城上擲安火車中囊敗火盛又曰天井敵人攻城為地道來乃自於城道上直下穿井以邀之積薪安井中以火薰之敵人自焦灼又曰地聼扵城内八方穿鑿井各深二丈令頭覆戴新瓮於井中坐聼則城外百歩之内有孔城地道者並聼聞瓮中而辨知方所近逺矣又曰鐵筴杖狀如鐵蒺藜要路水中置之以刺人馬又曰䧟馬坑坑長五尺濶一尺深三尺坑中埋鹿角槍竹籖其坑十字相交狀如鈎鏁以覆芻草葦木加之土種草實令生苖蒙覆其上軍城營壘要路皆設之衛公兵法曰坑如亞守相連以草及細塵覆其上又曰拒馬槍以木徑一尺長短隨事十字鑿孔從横安括一作檢長一丈鋭其端可以塞城門要路巷人馬不得奔馳又曰木柵為敵所逼不及築城壘或因山河險勢多石少土木柱版堞乃建立木柵方圓髙下隨事深埋木根重複彌縫其闕内重加短木為閣道柱外重長出四尺為女墻皆泥塗之内七尺又立閣道内柱上布板木為棧立欄竿行於柵上懸門擁墻壕塹拒馬方守一如城壘法太白隂經曰蜀钁鐵鏨蜀钁短柄钁也鐵鏨鑿井鏨也旝許慎説文曰旝建大木置石其上發為機以拒敵也從方㑹聲一云從衣㑹聲左傳曰周桓王伐鄭鄭為三拒命二拒曰旝動而鼓杜預注曰旝旗也執以為號令魏武本記曰上與袁紹軍於官渡賊射營中行者皆被甲衆皆恐上令傳言旝動而鼓説文旝發石車也乃造發石車擊紹櫓一日盡壊紹衆號之霹靂車沈懐文宋侍中趙倫之碑曰君戮力以致誠吐規以㑹機一鼔則冦騎雲徹旝動則敵車霧消鹿角袁漢獻帝春秋曰揚州刺史劉馥上言荆州牧劉表與㑹稽太守孫權謀襲京城遂壍許設鹿角砦王沈魏書曰李通拜汝南太守𤣥徳與周瑜圍曹仁於江陵通率衆擊之下馬拔鹿角入圍且戰且前勇冠諸將魚豢魏畧曰夏侯霸字仲權為偏將軍太和中在長安及子午之役霸召為前鋒蜀人望知其是霸也指下兵攻之霸手戰鹿角間賴救至然後解魏志曰徐晃討雲長於樊關自將歩騎五千出戰晃擊之退走遂追與俱入圍破之或自投沔水死魏太祖令曰賊為壍鹿角十重將軍致戰全勝遂陷賊圍將軍之功踰孫武穰苴虞溥江表傳曰曹公出濡湏甘寧拔曹公鹿角踰壘入斬數十人王隠晉書曰馬隆為武威太守之郡作八陣圖地廣則鹿角車營進攻則木屋抱輪並戰並前虜弗能逼干寳晋記曰曹爽留車駕宿伊水南伐木為鹿角砦發屯田兵數千人以為衛習鑿齒漢晋陽秋曰曹芳謁曹叡墓於大石山曹爽兄弟皆從於是司馬懿閉四城遂與太尉蔣濟俱屯於洛水南浮橋奏罷爽兄弟不知所為芳還宿伊水南發屯田數千人樹鹿角為營晉惠帝起居注曰王浚乗勝追石超軍扵斥丘超持重不與戰以鹿角為營晋起居注曰義熈六年築壘起城于祖浦石頭城施鹿角以禦盧循司馬彪戰畧曰遼東太守公孫淵反明帝召太尉司馬懿討之軍到襄平公圍之北面東面有圍不合連車置水中積石鎮其上以鹿角塞之魏武帝表曰臣前遣討河内獲嘉之屯獲生口辭云河内有一神人宋金生合諸屯皆云鹿角不湏守吾使狗為汝守不從其言者即夜聞有軍兵聲明日視屯下但見虎跡臣輙部武猛都尉吕納將兵掩捉得生輙行軍法諸葛亮教曰前到武都一日鹿角壊刀斧十餘枚頼賊已走若未走旡所復用晋宣帝教曰今日當將作四子人東為三軍作營塹壘又當將斧三百枚破樹木作鹿角塞諸郵漏處諸葛亮軍令曰敵以來進持鹿角兵悉却在連衝後敵已附鹿角裏兵但得進踞以矛㦸刺之不得此住起住妨弩魏武軍䇿令曰夏侯淵今月賊燒却鹿角鹿角去本營十五里淵將四百兵行鹿角因使士補之賊山上望見從谷中卒出淵使兵與鬬賊遂繞出其後兵退而淵未至甚可傷淵本非能用兵也軍中呼為白地將軍為督帥尚不當親戰况補鹿角乎王曠與楊州論討陳敏計曰賊今下屯固横江又云復據烏江皆塹壘彭排鹿角歩安嚴峻以襲歴陽諸軍辛昞洛戍時與桓郎牋曰桓振武今下官將千二百人掩襲營值天洪雨噐仗沾濕塹廣深丈餘鹿角五重樓櫓嚴設自四更三唱攻逼至小食時不剋箛槍張楫廣雅曰􅀢謂之箛槍服䖍通俗文曰剡葦傷盗謂之槍何承天纂文曰􅀢謂箛槍謝靈運自理表曰星言奔馳歸滑陛下及經山隂也方衛彰赫彭排馬捨斷截衢巷宋起居注曰㤗始三年有司奏賊帥劉胡等旋南城蘭道令馬歩萬餘人樹排槍陌山從東五道直來攻營杜預秦川軍事曰臣嘗聞邊人説虜專以騎為冦穿塹不如作馬塪馬塪法坑方三尺錯平穿之虜騎非下馬平治則終不得入又其外蹊要路亦可隨作摀施槍塪中訖薄覆其上如此則虜當築地而行不敢輙徃來也蔡謨與何驃騎書曰公失櫓上人吾亦具之矣在深草中立櫓無故以樐自標令賊見之而自不得見賊賊不病癡何故不來取耶今令數百歩内皆露見布竹箛如蝟毛賊不能飛何得卒至邪弋張揖埤蒼曰栱大弋也許慎説文曰樴弋也橜弋也太公六韜曰委環鐵弋鐵長三丈三尺左傳曰齊人戰獲臧堅使宿沙衛唁之曰無死堅曰使刑臣禮於士以杙抉其傷而死司馬彪戰畧曰遼東太守公孫淵反太尉司馬討之軍到襄平去城百步穿重塹豎連栅安諸營立樓櫓其近水沙地不得作圍塹用車輪以大弋椓穿中又豎輪障其前韋昭吳書曰賀齊討賊陳璞於林厯山山四面壁立不可攻齊乃隂作鐵弋於賊不備處以弋拓山為道夜潛上破賊太平御覧卷三百三十七
