  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_387-1a, image: WYG0896/WYG0896-0434a.png}
body:
  text: 太平御覽卷三百八十七宋李昉等撰人事部二十八黒子汗唾洟淚欠嚏黒子漢書曰髙祖左股有七十二黒子又賈宜𫝊曰今淮陽之北大諸侯僅如黒子之著面不足以有所禁禦范曄後漢書曰黄昌字聖真遷蜀郡太守昌初為州書佐其婦寧於家遇賊被獲遂流轉入蜀為民妻其子犯事乃詣昌訟昌疑母不類蜀人因問所由云本㑹稽黄昌妻也嘗為賊所掠至此昌驚曰何以識黄昌邪曰昌左足心有黒子常自言當至二千石昌乃出足示之因相持泣還為夫妻楚國先賢傳曰晉耒陽顧紹字伯蕃年十八為郡門下幹迎太守許荆視荆蹠下而笑荆怒問之紹曰見眀府蹠下有黒子紹足亦有之故欣然而笑汗説文曰汗身液也釋名曰汗􅗭也出其衣􅗭􅗭然易渙卦曰渙汗其大號史記曰蘇秦説齊王曰臨淄舉袂成帷揮汗成雨東觀漢記曰光武詔曰平陽丞李善稱故令范遷於張堪令人面熱汗出其賜堪家新繒百疋以表㢘吏獻帝傳曰舊儀三公領兵見令虎賁執刃扶之曹操顧左右汗流背自後不敢復朝請江表𫝊曰孫權即尊位請㑹百官歸功周瑜張昭舉笏欲褒贊功徳未及言權曰如張公計今已乞食矣昭大慙伏地汗出魏志曰初太和中中䕶軍蔣濟上䟽宜遵古封禪詔曰聞濟斯言使吾汗出流足王隠晉書曰華表字偉容平原髙唐人侍中石苞朝出表問國家如何苞曰武帝更生也表聞汗出沾背晉書曰大司馬桓温来朝頓兵新亭召侍中王坦之吏部尚書謝安石將害之坦之恐將欲出奔謝安止之曰晉祚存亡在此一行君何所逃既見坦之前大懼倉惶倒執手板汗流沾衣安石後至從容髙視良久坐定謂温曰安聞諸侯有道守在四方眀公何湏壁後置人温笑曰不能不爾遂却兵歡語移日而罷續晉陽秋曰桓元嘗詣㑹稽王道子道子已醉對元張眼屬四座云桓温作賊元見此辭勢難測伏席流汗長史謝重歛板正色曰故大司馬公廢昏立眀功全社稷風塵之論宜絶聖聽唐書曰張又新等搆李紳貶端州司馬朝臣表賀又至中書賀宰相及門門者止之曰請少留縁張補闕在齋内與相公談俄而又新揮汗而出旅揖羣臣曰端溪之事又新不敢多讓人皆辟易憚之淮南子曰今夫徭者掲钁鍤負籠土徭役也籠受土籠也鹽汗交流喘息薄喉白汗鹹如鹽故曰鹽風俗通曰𫝊曰后稷冬墾田流汗而種田不生者人力非不至天時不與世説曰鍾毓鍾㑹少有令譽年十三魏文帝聞之召見問毓曰卿何汗曰戰戰惶惶汗出如漿復問㑹卿何不汗對曰戰戰慄慄汗不敢出又曰桓公既廢太宰父子仍上表欲除之簡文手荅書云所不忍言况過於言桓又重表簡文復手荅云若使晉祚靈長眀公便應奉行此詔若大運去矣請避賢路桓公讀詔手戰汗流於此而止語林曰何晏美姿容眀帝見之謂其𫝊粉賜之湯餅晏食之汗出流面以巾拭之色轉皎然揚䧺長揚賦曰髙祖鞬鍪生蟣虱甲胄被汗沾左思齊都賦序曰連衽有雲覆之隂揮汗有雨洒之濡又吳都賦曰流汗霡霂則中逵泥濘司馬遷書曰每念斯恥汗未嘗不發背沾衣唾説文曰唾口液也左傳文下曰晉文公獲秦三帥文嬴請之先軫朝問秦囚公曰夫人請之吾舍之矣先軫怒曰武夫力而拘諸原婦人蹔而免諸國墮軍實而長寇讎亡無日矣不顧而唾史記曰孟嘗既廢而復用馮驩迎之未到孟嘗君太息曰文嘗好客遇客無所敢失文一日廢皆背文而莫顧文者如復見面文必唾面戰國䇿曰趙太后新用事秦急攻之求救於齊齊曰必以長安君為質兵乃出大臣强諫太后謂左右曰復言長安君為質者老婦必唾其面沈約宋書曰僕射謝景仁性矜嚴整潔居宇清麗毎唾左右人衣事畢即聽澣濯毎欲唾左右争来受之趙書曰石虎聘崔氏為夫人無寵所愛鄭夫人有百日女病謂崔與藥以告後石虎作威問之崔言外舍見小子以少唾共合作實非藥也石虎乃射之一箭通中而死秦記曰苻朗渡江嘗與朝士宴集時賢並机辱壺席朗欲誇之唾則令小兒跪而張口就唾而含出坐者謂不及逺矣吕氏春秋曰齊莊公之時有士曰賔畢聚夣有壯士白縞之冠練布之衣素屨黒劍從而叱之唾其面惕然而寤徒夣也終坐不决眀日召其友而告之曰吾少好勇無所挫辱今夜辱吾將索之得之則可不得將死每朝立于衢三日不得退而自刎又曰伍員出奔過鄭問許公許公東向唾員知所歸矣乃奔吳莊子曰蚿謂蛇曰子見夫唾者乎噴大者如珠小者如霧雜而下者不可勝數也風俗通曰彭祖夀八百嵗猶恨唾逺傷生列子曰人君其尊重矣音聲振於金玊咳唾甘於醴泉九州春秋曰公縣瓚曰始天下兵起吾謂其唾掌决樊英别傳曰樊英既見陳畢西南向唾天子問其故對曰成都今日失火後蜀太守上火災言時雲雨從東北来故火不為害列仙傳曰丁次卿欲還峨嵋山語主人丁民云當相為作漆以甖十枚盛水覆口從之百日乃發皆成漆神仙傳曰樊夫人者劉綱妻也俱行道術各自言勝綱唾盤中水即成鯉魚夫人唾盤中水成獺食魚與試術事事不如述異記曰有人乗船從下流還縣有一人通身黄衣擔兩籠黄𤓰求寄載之黄衣人乞食船主與之船適至岸下仍唾盤上徑上岸直入石船主取向食器視之盤上唾悉是黄金列異𫝊曰南陽宗定伯年少時夜行逢鬼問鬼所忌鬼荅曰唯不喜人唾伯便擔鬼着頭上急持行之徑至市中下着地化為羊急賣之恐其變化唾之得錢五緡幽眀録曰漢武帝在甘泉宫有玊女降嘗與武帝圍棋相娛女風姿端正帝宻悦乃欲逼之玉女唾帝面而去遂病瘡經年故漢書云避暑甘泉宫此其時也趙壹嫉邪賦曰勢家多所宣欬唾自成珠披褐懐金玉簡蕙化為蒭洟淚説文曰洟鼻液也周易離卦曰六五出涕沲若戚嗟若吉毛詩􅆁柏舟燕燕曰之子于歸遠送于野瞻望弗及泣涕如雨又谷風大東曰眷焉顧之澘焉出涕禮記檀弓上曰孔子合葬于防封之崇四尺孔子先反門人後雨甚至孔子問曰爾来何遲也曰防墓崩孔子泫然流涕曰吾聞之古不修墓又曰孔子至衛遇舊館人之䘮入而哭之哀出使子貢脱驂而賻之子貢曰脱驂於舊館無乃已重乎夫子曰予嚮者入而哭之遇於一哀而出涕予惡夫涕之無從也小子行之又曰將軍文子之䘮既除䘮而後越人来吊主人練冠侍于廟垂涕洟乂内則曰父母唾涕不見輙刷去之左傳襄四曰孟孫卒臧孫入哭甚哀多涕出其御曰孟孫之惡子也而哀如是季孫若死其若之何公羊傳哀公曰西狩獲麟孔子曰孰為来哉孰為来哉反袂拭面涕涙沾袍史記曰蘇秦説鬼谷先生下淚沾襟東觀漢記曰来歙盖延攻公孫述蜀人大懼使客刺歙未死馳告盖延延見歙悲哀不能仰視歙叱曰欲屬以軍事而乃効兒女之涕泣乎又曰更始害齊武王光武飲食笑語如平常獨居輙不御酒肉枕席有涕泣處蕭子顯齊書曰魚復侯子嚮字雲音世祖弟四子也死時年二十二上憐子嚮死後遊華林見猨對樹跳子鳴上留目久之因嗚咽流涕崔鴻後燕録曰秦官人光祚先入晉晉以祚為河北郡至是来歸慕容垂見祚流洟曰秦主知我深吾事之亦盡理淮南之敗吾効忠節毎思疇昔之顧未嘗不中宵忘寢祚亦歔欷又曰慕容熈苻后卒制百寮於宫内設位哭令沙門素服使有司按檢哭者有淚以為忠孝無則罪之於是羣臣振懼莫不含辛以為淚焉尸子曰曽子毎讀䘮禮下淚沾襟又曰費子陽謂子思曰吾念周室將滅涕泣不可禁也子思曰然今一人之身憂世之不治而涕泣不禁是憂河水濁而泣清也邴原𫝊曰原五六嵗過學舍而泣師曰何泣原曰孤者易感夫學者皆有父母也心願其得書故惻然涕零師哀原曰欲得何書不湏費也管寧别傳曰寧身長八尺龍顔秀目每祭未嘗不伏地流涕三齊畧曰鄭司農常居其城南山中教授黄巾亂乃遣生徒崔琰諸賢於此揮涕而散所居山下草如薤葉長尺餘許堅韌異常時人名為康成書帶草世説曰晉元帝過江飲酒王茂宏與帝有舊流涕諫之帝許之從是遂斷語林曰王太保作荆州有二兒亡一兒還葬舊塋一兒留葬太保垂涕曰不忘故鄉仁也不戀本土達也唯仁與達吾二子有焉素問曰肝液為淚欠釋名曰欠嶔也開張其口唇嶔嶔然説文曰欠張口出氣也禮記曲禮曰侍坐於君子君子欠伸撰杖屨視日之蚤暮侍坐者請出矣又内則曰在父母舅姑之所不敢欠伸跛倚睇視宋元嘉起居注曰尚書僕射孟顗於後堂勑見亢聲大欠有違儀禮被劾詔無所問嚏釋名曰嚏聲乍嚏而出也毛詩衛風曰寤言不寐願言則嚏禮記月令曰季秋行夏令則人多鼽嚏又内則曰在父母舅姑之所不敢噦噫嚏咳也太平御覽卷三百八十七
