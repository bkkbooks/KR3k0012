body:
  text: 太平御覽卷三十一宋李昉等撰時序部十六五月五日伏七月七日五月五日大戴禮曰五月五日畜蒲為沐浴謝承後漢書曰陳臨為蒼梧太守推誠而理導人以孝弟臨徴去後本郡以五月五日祠臨東城門上令小童潔服舞之又禮儀志曰五月五日朱索五色桃印為門户飾以止惡氣也沈約宋書曰元徽五年五月五日皇太后賜帝玉柄毛扇帝嫌其毛柄不華故此欲加酖害宋畧曰王鎮惡以五月五日生家人欲棄之其祖猛曰昔孟嘗君以此日生卒得相齊此兒必興吾宗以鎮惡為名唐書曰崔信明以五月五日正中時生有異雀數枚身形甚小五色皆備集于樹鼓翼齊鳴其聲清亮隋太史令史良至青州遇而占之曰五月為火火為離離為文彩日正中文之盛也又有雀五色奮翼而鳴此兒必文藻煥燭聲名播於天下雀形既小禄位殆不髙矣及長博聞強記下筆成章鄉人髙孝基有知人鑒謂人曰崔信明才學富贍雖名冠一時但恨其位不達耳孝子傳曰紀邁五月五日生其母棄之村人紀淳妻養之年六嵗本父母云汝是我兒邁涕泣傭所得輙上母續齊諧記曰屈原五月五日投汨羅而死楚人哀之每至此日竹筒貯米投水祭之漢建武中長沙歐回見人自稱三閭大夫謂回曰嘗見祭甚善但常患蛟龍所竊今若有惠可以楝樹葉塞其上以五彩絲約之此二物蛟龍所憚也回依言後乃復見感之今人五日作糭子𢃄五色絲及楝葉皆是汨羅之遺風也西京雜記曰王鳳以五月五日生其父欲不舉其叔曰昔田嬰勅其母勿舉田文文後為孟嘗君以故事推之非不祥遂舉之鄴中記曰并州俗以介子推五月五日燒死世人為其忌故不舉火食非也北方五月五日自作飲食祠神及作五色縷五色辛盤相問遺不為介子推也荆楚嵗時記曰五月五日西人並蹋百草今人又有鬪百草之戲又五月五日競渡俗為屈原投汨羅日傷其死所並命舟檝以拯之舟舸取其輕利謂之飛鳧一目以為水軍一目以為水馬州將及土人悉臨水而觀之又曰是月俗忌蓋屋及曝薦席風俗通云五月蓋屋令人頭秃又異苑云新野庾寔家嘗以五月暴席忽有一小兒死于席下俄失所在其後寔女子遂亡相傳彌以為忌此二條通五月之事今附於此又五月五日荆楚人並蹋百草将艾以為人懸門户上以禳毒氣故師曠占曰嵗多病則艾草先生也風土記曰仲夏端五端初也俗重此日與夏至同先節一日又以菰葉裹粘米栗棗以灰汁煑令熟節日又煑肥龜令極熟去骨加鹽䜴麻蓼名曰􅀢龜粘米一名糭一曰角黍盖取隂陽包裹之象也龜甲表肉裏陽外隂内之形所以賛時也抱朴子曰或問辟五兵之道答以五月五日作赤靈符著心前又蟾蜍萬嵗者頭上有角頷下丹書八字再重五月五日中時取之隂乾百日以其足畫地即為流水風俗通曰五月五日以五彩絲繫臂者辟兵及鬼令人不病瘟又亦因屈原一名長命縷一名續命縷一名辟兵繒一名五色絲一名朱索又有條達等織組雜物以相贈遺孝經援神契云仲夏繭始出婦人染練咸有作務玉燭寳典云此節備擬甚多其來尚矣又有日月星辰鳥獸之狀文繡金縷帖畫貢獻所尊古詩云繞臂雙條達是也又五月五日集五色繒辟兵余問服君服君曰青赤白黒以為四方黄為中央襞方綴於胷前以示婦人蠶功也織麥􅀈懸於門以示農工成轉聲以襞為辟兵耳養生要集曰术味苦小温生漢中南鄭山谷五月五日採之琴操曰介子綏國語曰介子推割腓股以啖重耳重耳復國子綏獨無所得綏甚怨恨乃作龍蛇之歌以感之遂遁入山文公驚悟迎之終不肯出文公令燔山求之遂抱木而燒死文公令民五月五日不得𤼵火玉燭寳典曰五月五日採艾懸於户上以禳毒氣按荆楚嵗時記云宗則字文度常以五月五日雞未鳴時採艾見似人處攬而取之用灸有驗是日競渡採雜藥夏小正曰此月畜藥以蠲除毒氣也異苑曰五月五日剪鴝鵒舌亦能學人語又田文母嬖五月五日生文父勅令勿舉之後母私舉文長成童以實告之文遂啓父曰不舉五日子何父云生及户損父文曰受命于天豈受命于户若受命于户何不髙其戸誰能至其户耶父說以為嗣齊封為孟嘗君㑹稽典録曰女子曹娥者會稽上虞人父能弦歌為巫漢安帝二年五月五日於縣江泝濤迎波流溺死不得屍娥年十四沿江號哭晝夜不絶遂投江而死抱父屍出習鑿齒與禇常侍書曰想徃日與足下及江州五月五日共澡浴戲處追尋宿眷髣髴玉儀心實悲矣國史補曰揚州舊貢江心鏡五月五日揚子江中所鑄也或言中有百鍊者六七十煉則已易破難成徃徃有自鳴者酈道元水經註曰深水有異魚按正光元年五月五日天氣清爽聞池中鏘鏘若鉦鼓聲池水驚而沸湏㬰雷電晦㝠有五色蛇自池上屬于天久乃滅波上水定惟見一魚在其一變為龍伏日厯忌釋曰伏者何也金氣伏藏之日也四時代謝皆以相生立春木代水水生木立夏火代木木生火立冬水代金金生水至於立秋以金代火金畏火故至庚日必伏庚者金也史記曰張子房始所見下邳圯上老父與太公書者後十三年從髙帝過濟北果見榖城山下黄石取而葆祠之留侯死并葬黄石冢每上冢伏臘祠黄石又秦穆公始為伏祠漢書曰東方朔為郎伏日詔賜諸從官肉朔獨拔劍割肉謂其同官曰伏日當早歸請受賜即懐肉而去上問朔曰賜肉不待詔而去何也令自責朔曰受賜不待詔何無禮也拔劍割肉一何壯也割之不多又何亷也歸遺細君又何仁也上笑曰令先生自責而反自譽復賜酒一巵肉百觔遺細君又楊惲報孫㑹宗書曰田家作苦嵗時伏臘烹羊炰羔斗酒自勞去聲漢官儀曰伏日厲鬼所行故伏漢魏有飲食之㑹故潘岳閒居賦有曰養羊治酪供伏臘之費魏典畧曰大駕都許使光禄大夫劉松北鎮袁紹軍與紹子弟日共宴飲常以三伏之際晝夜酣飲極醉至於無知云以避一時之暑故河朔有避暑飲荆楚嵗時記曰六月伏日並作湯餅名為辟惡宋王𤣥謨夀陽記曰明義井三伏之日炎暑赫曦男女行來其氣短急望見義井則喜不可言未至而憂既至而樂號為歡樂井世說曰郄嘉賔三伏之日詣謝公炎暑熏赫復當風交扇猶沾汗流離謝著故絹衣食熱白粥宴然無異郄謂謝公曰非君幾不堪此崔寔四民月令曰初伏薦麥瓜於祖禰也風俗通曰漢中巴蜀自擇伏日俗說漢中巴蜀廣漢土地温暑草木早生晩枯氣異中國夷狄畜之故令自擇伏日也謹按漢書髙帝分四部之衆用良平之䇿還定三秦席卷天下蓋君子所因者本也論功定封加以金帛重復寵異令自擇伏日不同於凡俗也書儀曰六月三日伏日昔賈誼在湘南六月三庚日有鵩鳥來時南方毒惡以助太陽銷鑠萬物故避之又晋稽含困熱賦序曰三伏之節始奏商秋之辰未期余下里貧生居室卑陋狹巷不來清風短廡不足増䕃歎彼夏屋之士體逸髙廊並天而寒暑殊同世而憂樂異矣程曉詩曰平生三伏時道路無行車閉門避炎暑出入不相過今世褦襶子觸熱到人家主人聞客來顰蹙柰此何揺扇臂中疼流汗正滂沱傳戒諸髙明熱行宜見呵晉潘岳懐縣詩曰南陸迎修景朱明送末垂初伏啟新節隆暑方赫曦七月七日漢武帝故事曰景帝嘗夢髙祖謂己曰王美人生子可名為彘以乙酉年七月七日旦生武帝于猗蘭殿謹按洞㝠記漢武帝未生之時景帝夢有赤彘從雲中直下崇芳閣帝覺而坐于閣果見赤氣從雲中直下如林木蔽戸牖望閣上有丹霞蓊􅉱既而乃改崇芳閣為猗蘭殿後王夫人生武帝也又七月七日上於承華殿齋其日忽有青鳥從西方來集殿前上問東方朔朔曰此西王母欲來也有頃王母至有二青鳥如鳯夾侍王母旁也又王母遣謂帝七月七日我當暫來帝至日掃宫内燃九華之燈又漢武帝内傳曰帝登尋真之臺齋至七月七日夜忽見天西南如白雲起鬱鬱直來趨宫有頃王母至乘紫雲之輦又七月七日乃掃除宫掖之内張雲錦之帷燃九微之燈夜二更後西王母駕九色之斑龍上殿又七月七日西王母降武帝戴太真晨纓之冠履𤣥瓊鳳文之舄宋卜子楊園苑疏曰太液池西有武帝曝衣閣常至七月七日宫女出登樓曬衣晉書曰魏武帝辟髙祖以漢祚將終不欲屈節于曹氏辭以風痺不能起居魏武遣親信令史㣲服於髙祖門下樹䕃下息時七月七日髙祖方曝書令史竊知還具以告乃重遣辟之勅行者曰若復不動便可收之髙祖懼而應命魏書曰太祖道武皇帝諱珪七月七日生于㕘合陂又任城王澄為雍州功縗在身故以七月七日集文武騎射張普惠字洪賑為録事㕘軍奏記請停列仙傳曰陶安公者六安鑄冶師也一朝火散冶上紫色衝天安公伏冶下求哀須㬰朱雀止冶上曰安公冶與天通七月七日迎女以赤龍至日龍來安公騎之東南而去邑中數萬人預共送之皆與辭訣又王子喬周靈王太子晉也好吹笙作鳳鳴逰伊洛之間浮丘公接以上嵩髙山二十餘年後于山中謂桓良曰告我家七月七日待我緱氏山頭是日果乘白鶴駐山嶺望之不得到舉手謝時人數日而去又吳蔡經去家時已老及還更少壯頭髪皆黒語家中言七月七日麻姑當來可取數百斛酒飲之至期王方平偕來乘羽車駕五龍聞金鼓簫管人馬之聲荆楚嵗時記曰七夕婦人結綵樓穿七孔針或以金銀鍮石為針宋孝武七夕詩曰迎風披綵縷向月貫𤣥針陳瓜果于中庭以乞巧有喜子網于瓜上以為符應周處風土記曰七月七日其夜灑掃中庭然則中庭乞願其舊俗乎又曰魏時人問董勛云七月七日為良日飲食不同於古何也勛云七月黍熟七日為陽數故以糜為珍今北人唯設湯餅無復有糜矣又曰陸雲與兄平原相書云機為平原相一日按視曹公器物有書刀五枚又琉璃筆一枝景初二年七月七日劉媫妤折之見此使人悵然按魏武帝於漢為相不得有媫妤又景初是魏明帝年號如此則文帝物也與曹公器玩同處故致舛雜耳日緯書曰牽牛星荆州呼為河鼓主關梁織女星主瓜果嘗見道書云牽牛娶織女天帝賜錢二萬備禮久而不還被驅在營室是也言雖不經有是為徴也西京雜記曰戚夫人侍兒賈佩蘭云在宫時見戚夫人侍髙祖至七月七日臨百子池作于滇樂畢以五色縷相羈謂㑹連愛又漢綵女常以七月七日穿針于開襟樓俱以習俗也輿地志曰齊武帝起層城觀七月七日宫人多登之穿針世謂之穿針樓淮南子曰七月七日午時取生瓜葉七枚直入北堂中向南立以拭面靨即當滅矣又萬畢術曰七月七日採守宫隂去聲乾之合以井華水和塗女身有文章即以丹塗之不去者不滛去者有奸周處風土記曰七月七日其夜灑掃于庭露施几筵設酒酺時果散香粉于筵上以祀河鼔爾雅曰河鼔謂之牽牛織女言此二星神當㑹守夜者咸懐私願咸云見天漢中有奕奕白氣有光耀五色有此為徴應者便拜而願乞富乞夀無子乞子唯得乞一不得兼求三年乃得言之頗有受其祚者梁吳均齊諧記曰桂陽城武丁有仙道忽謂其弟曰七月七日織女何事渡河答曰暫詣牽牛至今世人云織女嫁牽牛也韋氏月録曰龍魚河圖云七月七日取小赤豆男吞一七女吞二七令人畢嵗無病又七月七日曬曝革裘無蟲又合烏雞藥是七月七日取烏雞血和三月三日桃花末塗面及遍身三二日肌白如玉此太平公主法曽試有驗世說曰郝隆七月七日見鄰人皆曬曝衣服隆乃仰出腹卧云曬書崔寔四民月令曰七月七日作麵合藍丸及蜀漆丸暴經書及衣裳習俗然也又曰世傳竇后頭秃不為家人所齒遇七夕皆看織女獨不許后出乃有神光照室為后之瑞竹林七賢論曰阮咸字仲容籍兄子也諸阮俱世儒學善居室内足於財唯籍一巷尚道業好酒而貧舊俗七月七日法當曝衣諸阮庭中爛然莫非綈錦咸時總角乃竪長竿標大布犢鼻褌於庭中云未能免俗聊復爾耳雜異書曰時有女子尚幼七夕見家人出庭望候天門開獨在室中不出曰若合當見者雖暗室中赤應見之至夜深忽見天上門開雲氣赫奕因求富及長嫁而富既寡家累鉅萬有賈客貨其絹百疋去而船覆溺資皆沒其女子偶開後房見絹在其中但濕耳賈客歸而自首女子曰絹歸矣驗之而信亦出夷堅録乃是開元以後事國史補曰興元元年七月七日斬偽官喬林將臨刑書曰林以七月七日生亦以此日死豈非命也古詩曰迢迢牽牛星皎皎河漢女纎纎濯素手軋軋弄機杼終日不成章泣淚零如雨河漢清且淺相去復幾許盈盈一水間脉脉不得語晉潘尼七月七日侍皇太子宴𤣥圃園詩云商風初授辰火㣲流朱明送夏少昊迎秋芳草茂園嘉禾被疇于時我后以豫以㳺宋孝武七夕詩曰開庭鏡天路餘光不可臨迎風披綵縷向月貫𤣥針薄藝誠無取時務聊可尋宋謝惠連詠牛女詩曰落日隠簷楹升月照簾櫳團團滿葉露淅淅振條風蝶夢恒栩栩終年闕相從遐川阻眤愛修渚曠清容弄杼不成藻聳轡騖前蹤昔離秋已兩今聚夕無雙傾河易廻斡凝情難久悰沃若靈駕旋寂寞雲幄空留情顧華寝遥心逐奔龍宋謝莊七夕應詔詠牛女詩曰輟機起春暮停箱動秋襟琥車照漢右芝駕肅河隂珠殿釭未暗瑶庭露已深夜悄豈掩抑絃徽無久臨蘇彦七月七日詠織女詩曰火流涼風至少昊潔素藏織女思北征牽牛嘆南陽時來嘉慶集整駕巾玉箱璚珮垂藻蕤霧裙結雲裳金翠耀華輜軿軒散流芳釋轡紫㣲庭解襟碧琳堂忻燕未及究晨暉照扶桑仙童唱道情盤螭起騰驤悵悵一宵促遲遲别日長梁簡文帝七夕穿針詩曰憐從帳裏出想見夜牕開針欹疑月暗縷散恨風來梁劉孝威詠織女詩曰金鈿已照耀白日未蹉跎欲待黄昏至含嬌渡淺河梁庾肩吾七夕詩曰玉匣卷懸衣針樓開夜扉姮娥隨月落織女逐星移離前看促夜别後對空機寄語雕陵鵲填河未可飛隋王眘七夕詩曰天河横欲曉鳳駕儼應飛落月移粧鏡浮雲動别衣懽逐今宵盡愁隨還路歸猶將宿昔淚更上去年機張文恭七夕詩曰鳯律驚秋氣龍梭静夜機星橋百枝動雲輅七香飛暎月廻雕肩凌霜曵綺衣含情向華幄流態入重闈懽餘夕漏盡怨結曉驂歸誰念分河漢還惜兩心違太平御覽卷三十一
