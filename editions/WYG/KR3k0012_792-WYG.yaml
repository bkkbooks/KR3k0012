body:
  text: 太平御覽卷七百九十二宋李昉等撰四夷部十五西戎一總序西戎婼羗鄯善于闐大秦龜茲天竺揔序西戎易曰高宗伐鬼方三年克之書曰西戎即敘詩曰在其板屋亂我心曲又曰自彼氐羗莫敢不來王爾雅曰西至於邠國又曰西至日所入為大䝉即䝉汜也大䝉之人信禮曰西方曰戎被髪衣皮有不粒食者矣𫝊曰辛有過伊川見被髪而祭於野曰不及百年此其戎乎其禮先亡矣又曰秦晉遷陸渾之戎於伊川漢書曰西域以孝武時始通本三十六國其後稍分至五十餘皆在匈奴之西烏孫之南南北有大山中央有河東西六千餘里南北千餘里東則接漢阨以玉門陽關西則限以葱嶺又曰出陽關自近者始曰婼羗婼音而遮切婼羗王號去胡來王言去離胡戎來附漢也又曰武帝征和中貳師將軍李廣利以軍降匈奴帝既悔逺征伐而捜粟都尉桑𢎞羊與丞相御史奏言故輪臺以東㨗枝渠犁皆故國地輪臺渠犂地名今在交河北庭界廣饒水草有溉田五千頃以上處溫和田美可益通溝渠種五糓與中國同時熟田一嵗有積糓募人壯徤有累重敢徙者詣田所累重謂妻子家屬也就畜積為本業墾溉田稍築列亭連城而西以威西國陳既往之悔帝乃下詔曰前有司欲益民賦三十助邊用每口取錢三十是重困老弱孤獨也由是不復出軍而封丞相田千秋為富人侯以明休息思富養人也後漢書曰西羗之本出自三苖盖姜姓之别其國近南嶽及舜流四凶徙之三危河關之西南荒地是也濵於賜支至於河首綿地千里賜支者禹貢所謂析支者也南接蜀漢所居无常依隨水草地少五榖以産牧為業其俗人民氏族无定或以父名母姓為種號十二世後相與婚姻父沒則妻後母兄亡則納嫠嫂寡嫂曰嫠故國旡鰥寡種類繁熾不立君臣旡相長一強則分種為酋豪弱則為人附落更相抄暴以力為雄殺人償死无他禁令其兵長在山谷短於平地不能持久而果於觸突以戰死為吉利病終為不祥甚耐寒苦同之禽獸雖婦人産子亦不避風雪性堅固勇猛得西方金行之氣焉王政修則賔服徳教失則㓂亂又曰昔夏后氏太康失國四夷皆叛及后相即位乃征畎夷七年然後來賔又曰武乙暴虐犬戎㓂邊周古公踰梁山而逰於岐下及子季歴遂伐西落鬼戎又曰文王為西伯西有昆夷之患北有獫狁之難遂攘戎狄西戎之國莫不賔服又曰穆王時戎狄不貢王乃西征犬戎獲其五王又得四白鹿四白狼王遂遷戎于太原又曰平王末自隴山以東及乎伊洛徃徃有戎於是渭首有狄豲邽冀之戎涇北有義渠之戎落川有大荔之戎渭驪戎伊間有楊拒原臯之戎西有蠻氏之戎又曰晉文公欲修覇業乃賂戎狄通道以扶王室秦穆公得戎人由余遂覇西戎開地千里又曰陸渾之戎叛晉令荀吳滅之楚執蠻氏而盡囚其民又曰周貞王八年秦厲公滅大荔取其地趙亦滅代戎代戎即北戎也韓魏復攻稍并伊洛隂戎滅之其遺脫者皆逃奔西踰汧隴自是中國無戎冦後漢書曰武帝時西域内屬有三十六國漢為置使者校尉領護之宣帝改曰護元帝又置戊巳校尉屯田於車師漢官儀曰戊巳中史鎮覆四方也哀平間自相分割為五十五國又曰建武中西羗皆遣使求内屬願請護世祖以天下初定未遑外事訖不許之又曰明帝命將北征匈奴取俾吾盧地置宜禾都尉以屯田遂通西域于闐諸國皆遣子入侍又曰建初元年春酒泉太守叚彭大破車師於交河城章帝不欲疲弊中國以事夷狄乃迎還戊巳校尉不復遣䕶二年復罷屯田又曰和帝永元三年班超遂定西域因以超為都護治之復置戊巳校尉領兵五人治車師又曰六年班超復撃破焉耆於是五十餘國至乎海濵四萬里外重譯貢獻又曰九年班超掾甘英窮臨西海而還皆前世所不至山經所未詳莫不偹其風土𫝊其珎恠焉於是逺國蒙竒兠皆來歸服班固西戎論曰孝武之代圖制匃奴患其兼從西國結黨南冦從音于容反乃表河西列四郡開玉門通西域以斷匃奴右臂隔絶南羗月氐單于失援由是逺遁而幕南旡王庭因文景𤣥黙養人五代天下豐富財力有餘士馬強盛故能賭犀布瑇􅈘則建朱崖七郡惑蒟醬竹杖則開牂牁越嶲聞天馬蒲陶則通大宛安息自是之後萬里相奉師旅之費不可勝計至於用度不足乃榷酒酤筦塩鐵鑄白金造皮幣筭至車舡租及六畜力屈財竭因之以凶年羣盗並起是以末年遂棄輪臺之地而下哀痛之詔豈非仁聖之所悔哉且通西域近有龍堆逺則葱嶺身熱頭痛懸度之阨淮南杜欽楊雄之論皆以為此天地之所界别區域絶外内也書云西戎即序禹就而序之非上威服致其貢物也魏徵西戎論曰自古開逺夷通絶域必因宏放之主皆起好事之臣張騫鑿空於前班超投筆於後或結之重貨或攝之利劔投軀萬死之地以立一朝之功皆由主尚來逺之名臣徇輕生之節是知上之所好下必有甚焉者也煬帝規摹宏侈掩吞漢裴矩方進西域圗記以蕩其心故萬乗親出玉門闗置伊吾耳末郡而闗右暨於流沙騷然無聊生矣古哲王之制方五千里務安諸夏不事要荒豈威不能加徳不能被盖不以四夷勞中國不以無用害有用也是以秦成五嶺漢事三邊或道殣相繼或户口減半隋室恃其强盛亦狼狽於青海此皆一人失其道故億兆罹其毒也婼羌說文曰羌西婼羌戎牧羊人從人牧羊漢書曰出陽闗自近者始曰婼羌國王號去胡來王去陽闗千八百里去長安六千三百里西接且末隨畜逐水草不田作仰鄯善且末榖山有鉄自作兵有弓矛服刀劔劉徳曰服刀拍髀也師古曰拍音貃髀音俾鄯善漢書曰鄯善國本名樓蘭王治杅泥城輔國侯郤胡侯鄯善都尉擊車師都尉左右且渠擊車師君各一人譯長二人又曰鄯善地沙鹵少田寄田仰榖旁國國出玉多葭葦檉桞胡桐白草孟康曰白草草之白者胡桐似桑而多曲師古胡桐涙可以汗金銀今工匠皆用之民隨畜牧逐水草有驢馬多橐它又曰武帝遣從票侯趙破奴將屬國騎及郡兵數萬擊姑師虜樓蘭王破姑師於是漢列亭障至玉門矣又曰樓蘭最在東垂近漢當白龍堆乏水草常主發導負水儋粮送迎漢使又曰元鳳四年大將軍霍光白遣平樂監傅介子徃刺其王介子輕將勇敢士齎金幣揚言以賜外國為名既至樓蘭詐其王欲賜之王喜與介子飲醉將其王屏語壯士二人從後刺殺之貴人左右皆散走介子告諭以王負漢罪天子遣我誅王當更立王弟尉屠耆在漢者漢兵方至毋敢動自令滅國矣介子遂斬王嘗歸首嘗歸者其王名也馳𫝊詣闕懸首北闕下封介子為義侯乃立尉屠耆為王更名其國為鄯善為刻印章賜以宫女為夫人備車騎輜重丞相將軍百官送至横門外祖而遣之北史曰鄯善城方一里地多沙鹵少水草北即白龍堆路至太延初始和四年遣其弟素延者入侍于闐漢書曰于闐國王治西域去長安九千六百七十里于闐之西水皆西流注海其東流注鹽澤河源岀焉多玊後漢書曰于闐去洛陽萬一千七百里建武末年莎車王賢強盛攻并于闐徙其主俞林為驪歸王明帝永平中于闐將休莫覇及莎車自立為于闐王休莫覇死兄子廣徳立後遂滅莎車其國轉盛北史曰于闐國在葱嶺之北二百餘里所都城方八九里城東三十里有首㧞河中出玉石土宜五榖并桑麻山多美玉有好馬駝騾其刑法殺人者死也又曰于闐俗多佛法寺塔僧尼甚衆王尤信尚每設齋日必親自灑掃饋食焉城南五十里有賛摩寺即昔羅漢比丘盧輈為其王造覆瓮浮圖之所石上有辟支佛跣處䨇足跡猶存西有比摩寺云是老子化胡成佛之所又曰于闐城東二十里有大氷北流號樹枝水即黄河也又曰後魏獻文末蠕蠕冦于闐于闐患之遣使素目伽上表求救帝詔以遐阻不行又曰後周武帝建徳三年其王遣使獻名馬隋大業中頻遣朝貢其王姓王字早示門練錦金鼠冠妻戴金花其王髪不令人見俗言若見王髪其年必儉梁書曰武帝大監十二年王遣使獻㜑羅婆歩鄣十八年獻瑠璃甖唐書曰其國出美玉王姓尉遲名屋宻貞觀六年遣使獻玉帶太宗優詔荅之大秦後漢書曰大秦國一名黎鞬在海西地方數千里以石為城郭列置郵亭堊塈之又曰民俗力田蠶桑皆髠頭而衣文綉乘輜軿白蓋小車出入擊皷建旌旗幡幟又曰王宫室皆水精為柱食器亦然又曰其人民皆長大平正有類中國故謂之大秦國多金銀竒寳有夜光璧明月珠駭雞犀珊瑚琥珀琉璃瑯琊織成金縷􅄢雜色綾作黄金塗火浣布又曰㑹合諸香􅋩其汁以為蘇合以金銀為錢銀錢十當金錢一又曰桓帝延熹九年大秦王安敦遣使自日南徼外獻象牙犀角瑇􅈘始一通焉又曰其國無盗賊而道多猛獅子遮害行旅不百餘人齎兵器輙為所食又有飛橋數百里可度海魏畧曰其國中山九色次玉石一曰青二曰赤三曰黄四曰白五曰黒六曰緑七曰紫八曰紅九曰紺神龜朱鬛馬𤣥熊赤白黒黄青緑紺縹紅紫十種瑠璃通典曰其國西南漲海中可七八百里行到珊瑚洲水底有盤石珊瑚生其上大秦人常乗大舶載鐵網令水工沒先入視之可下網乃下初生白而漸漸似苗之坼甲歴嵗許出網目間變作黄色枝條交錯高極三四尺大者圍尺餘三年色乃赤好後没視之知可採便以鐵鈔發其根乃以索繫網使人於舶上絞車舉之岀還國理截恣意所作若失時不舉便蠧敗龜茲北史曰龜茲國在尉犁西北白山之南一百七十里王姓白即後凉吕光所立白震之後其王頭繫綵帶垂之於後坐金獅子床又曰出細氊饒銅鉄鉛麞皮氍毹沙塩緑雄黄胡粉安息香等又曰其國北大山中有如膏者流出成川行數里入地状如醍醐服之髪齒已落者能令更生癘人服之皆愈唐書曰龜茲有城郭男女皆剪髪垂與項齊唯王不剪髪以錦䝉頂著錦􅂁金寳帶坐獅子床有良馬封牛饒蒲萄酒又曰貞觀四年遣使來獻馬太宗賜以璽書撫慰甚厚自此朝貢不絶又曰貞觀二十年太宗遣左驍衛大將軍阿史郍杜爾安西都護郭孝恪率五將軍發䥫勒十三部兵以伐龜茲禽其王及大將羯獵顛等破其大城五所虜男女數萬口勒石紀功而旋俘其王訶黎布失畢及郍利羯獵顛等獻於社廟尋以訶黎布失畢為左武翊衛中郎將郍利以下授官各有差又曰先是太宗既破龜茲移置安西都護府於其國城以郭孝恪為都護兼統于闐踈勒碎葉謂之四鎮高宗嗣立不欲廣地勞人復命有司棄龜茲等四鎮移安西依舊西州又曰長夀元年武威軍揔管王孝傑阿史郍忠節大破吐蕃克復龜茲于闐等自此復於龜茲直安西都護府用漢兵三萬人以鎮之則天時有田楊名中宗時有郭元振開元初則張孝嵩杜暹等為安西都護皆有政績為夷人所伏天竺後漢書曰天竺國一名身毒在月底東南數千里卑濕暑熱其國臨大水乗象而戰修浮圖道不殺伐遂以成俗出象犀瑇瑁金銀諸香石蜜黒鹽等又曰明帝夢見金人長大頂有光以問羣臣或曰西方有神名佛其形長丈六尺而黄金色帝於是遣使之天竺問佛道法遂於中國圖畫形像焉南史曰梁天監初王來貢獻王有螺髻於頂餘剪之穿耳垂璫俗多徒跣衣重白色有文字或善天文筭厯之術其人皆學悉曇章書於貝多樹葉以記事北史曰天竺國去代三萬一千五百里有伏醜城周匝十里城中出摩尼珠珊瑚城東三百里有稽頼城城中出黄金白真檀赤檀石蜜唐書曰中天竺其都城周回七十餘里北臨禪連河云昔有婆羅門領徒千人肄業於樹下樹神降之遂為夫婦宫室自然而立僮僕甚盛於是使役百神築城以統之經日而就此後有阿育王頗行苛政置炮烙之刑謂之地獄今城中見有迹焉又曰武徳中其國大亂其嗣王尸羅逸多練兵聚衆所向無敵象不觧鞍人不釋甲居六載而四天竺之君皆北面以臣威勢逺振政刑甚肅貞觀十五年尸羅逸多自稱摩伽陁王遣使朝貢太宗降璽書慰問尸羅逸多大驚問諸國人自古有摩訶振旦使人至吾國乎皆曰未之有也乃朝拜而受詔書因遣使朝貢太宗以其地逺禮之甚厚復遣衛尉丞李義表報使尸羅逸多遣大臣郊迎傾都邑以縱觀焚香夾道逸多率其臣下東面拜受勑書復遣使獻大珠及欝金香菩提樹又曰貞觀十年沙門𤣥装將其國梵本經論六百餘部而歸先是遣右率府長史王𤣥䇿徃使天竺其四天竺王咸遣使朝貢㑹中天竺王尸羅逸多死國中大亂其弟阿羅郍順篡立乃盡發胡兵以拒𤣥䇿𤣥䇿戰不敵乃㧞身宵遁走至吐蕃發精銳一千二百人并至婆羅國七千餘騎以從𤣥䇿典副使將師仁率二國兵進至中天竺國城連戰三日大破之斬首三千餘級赴水溺死者具萬人阿羅郍順棄城而遁師仁進兵擒獲之虜男女萬二千人牛馬三萬餘頭疋於是天竺震懼俘阿羅郍順以歸二十二年至京師太宗大悅命有司告宗廟因謂羣臣曰夫人耳目玩於聲色口鼻躭於臭味此乃敗徳之源若婆羅門不刼掠我使人豈為俘虜邪昔中山以貪寳取弊蜀侯以金牛致滅莫不由之拜𤣥策朝散大夫是時就其國得方士郍羅邇㜑寐自言夀二百嵗云有長生之術太宗深加禮待舘之於金颷門内造延年之藥令兵部尚書崔敦禮監主之發使天下採諸竒藥藥成竟服不效後放還本國又曰開元八年南天竺國遣使獻五色能言鸚鵡異物志曰天竺大國也方三萬里佛道所由其國王治城郭宫殿皆刻文鏤鐘鼓音樂跳丸躍劔通典曰後魏宣武時南天竺國遣使獻駿馬云其國出獅子􅏈有火齊如雲母而色紫裂之則薄如蟬翼種之則如紗縠之重㳫有剛金似紫石英百錬不銷可以攻玊太平御覽卷七百九十二
