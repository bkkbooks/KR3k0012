body:
  text: 太平御覽卷八百六十五宋李昉等撰飲食部二十三鹽醤鹽書曰青州厥貢鹽絺周禮天官籩人曰朝事之籩其實形鹽又曰掌鹽之政令以共百事之鹽祭祀共其苦鹽散鹽賓客共其形鹽散鹽王之膳羞共飴鹽飴鹽鹽之怡者今戎鹽有焉凡齊事鬻鹽以待命曲禮祭宗廟之事鹽曰鹹醝又曰醯醢之美而煎鹽之尚貴天産也又曰桃諸梅諸卵鹽大鹽又曰功衰食菜果飲水漿無鹽酪不能食食鹽酪可也功衰齊斬之末也酪酢酨左傳曰王使周公閲來聘饗有昌歜白黑形鹽辭曰國君文足昭也武可畏也則有備物之享以象其徳薦五味羞嘉穀鹽虎形鹽五味之主故刻畫虎形以象其武也以獻其功吾何以堪之又曰晉人謀去故絳大夫皆曰必居郇瑕氏之地沃饒而近盬猗氏縣有鹽池是也又曰齊晏子曰山木如市弗加於山魚鹽蜃蛤弗加於海説文曰鹽鹹也鹽池河東鹽池袤五十里廣六里周一百十四里鹽生水中夕取朝復千車萬騎適意多少鹵西方鹽也東方謂之斥西方謂之鹵醝鹹也河内謂之鹹廣雅曰䴛音消􅀈七豆切􅀈音温􅴴歩典切鹽也史記曰募民自給費因官器作煮鹽官與牢盆牢廪食也盆煮鹽盆漢書王莾詔曰鹽食肴之将又曰呉煮海水為鹽國用饒足吴王煮鹽於海濱今海鹽縣是也續漢書曰虞詡為武都太守始到郡榖石千鹽石八千視事三歲榖石八十鹽石四百又曰天竺國出黑鹽東觀漢記曰賈復為縣掾迎鹽河東會盗賊起等輩欺没其鹽復獨完致縣中後漢書曰第五倫自以為久宦不達遂將家屬客河東變名姓自稱王伯齊載鹽往来扵太原上黨所過輙為糞除而去又王符論曰攻玉以石洗金以鹽魏志曰衛凱與荀彧書曰夫鹽國之大寳也自亂以来放散宜如舊置使者監賣以其直益市犁牛若有歸民以供給之又曰鄧艾平蜀後言扵司馬文王留隴右兵二萬人蜀兵二萬人煮鹽興冶為軍農要用魏略曰漢令哀牢民家出鹽一斛以為賦吴志曰朱桓卒家無餘財孫權賜鹽五千斛以周䘮事蜀志曰先主定益州置鹽府校尉主鹽鐵之利晉書曰肅慎國無鹽鐡燒木作灰取汁而食之又曰郭文字文舉隱居吴興餘杭大辟山中恒着鹿裘葛巾不飲酒食肉區種菽麥採草葉木實貿鹽以自供人或酬下價者亦即與之南齊書曰豫章王大㑹賓僚張融食灸始畢行灸人便去融欲求鹽蒜口終不言方揺食指半日乃息又曰張融作海賦文辭詭激獨與衆異後以示鎮軍將軍顧顗之曰卿此賦實超𤣥虛但恨不道鹽耳融即求筆注曰漉沙搆白熬波出素積雪中春飛霜暑路又曰崔慰祖父喪不食鹽母曰汝既無兄弟又未有子息毁不滅性故當不進肴羞耳至扵鹽不食吾今亦不食矣慰祖不得已從之梁書曰侯景䧟臺城宴集其黨又召僧通僧通取肉揾鹽以進景問曰好不景答所恨太鹹僧通曰不鹹則爛及景死王僧辨截其二手送齊文宣又𫝊首江陵果以鹽五斗置腹中送于建康暴之于市百姓争取屠膾羮食皆盡後魏書曰世祖南伐遣李孝伯賜劉義恭等鹽各九種并胡豉孝伯曰有後詔凡此諸鹽各有所宜白鹽食鹽主上自所食黑鹽治腹脹氣滿用每六銖以酒下胡鹽治目痛戎鹽治諸瘡赤鹽駮鹽臰鹽馬齒鹽四種並非食鹽又曰忽吉國水氣鹹凝鹽生樹上又曰沮渠蒙遜平酒泉於宋繇室得書數千卷鹽米數十斛而已蒙遜歎曰孤不喜尅李氏欣得宋繇耳北齊書曰房景伯母亡居喪不食鹽菜因此遂為水病積年不愈又曰崔暹奏請海沂煮鹽有利軍國文襄以問崔昂昂曰亦既官煑須斷人竈官力雖多不及人廣請準闗市薄為竈稅私館給彼此有宜朝廷從之唐書曰武徳中長安古城鹽渠水生鹽色紅白味甘状如方印又曰左右神䇿鹽州行營節度使胡堅昌表奏初城鹽州鹵中獲壤土又置烽堡水路廻逺即時有雨發鹽井悉生鹽事符聖徳可謂天讃請宣付史館制可又曰代宗時河中府鹽池生瑞鹽韓滉奏曰土徳之瑞又曰李晟薨後徳宗以初城鹽州復鹽池上賜宰相新鹽惻然思之命置鹽於靈座又曰流鬼國去京師萬五千里邉於北海多沮澤有魚鹽之利又曰初𣙜鹽起於第五琦及劉晏代其任法術精宻官無遺利初歲入錢六十萬貫季歲十倍而人無厭苦大厯末通計一歲征賦所入而鹽醝當天下大半之賦管子曰齊有渠之鹽燕有遼東之煮十口之家十人䑛鹽百口之家百人䑛鹽凡食鹽之數一月大夫五升少半婦人三升少半嬰兒二升少半鹽之重升加分耗而釡百升加什耗而釡千君伐沮薪煮浦水為鹽正而積之三萬鍾至陽春農事方作命民無得築垣墻毋得繕家墓大夫無得治宫室臺榭北海之衆無得聚庸而煮鹽然鹽之賈必四什倍君以四什之賈循河濟之流南輸趙宋衛濮陽惡食無鹽則腫守圉之本其用鹽獨重君伐菹薪煮浦水以藉扵天下然則天下不减矣又曰桓公成鹽三萬六千鍾令吏糶之得成金萬一千餘斤尸子曰南海之輦北海之鹽魯連子曰宿沙瞿子善煮鹽使煮潰沙雖十宿不能得也抱朴子曰作赤鹽法用寒鹽一斤雨泥一斤内鐵器中以水燒皆消而赤也金樓子曰白鹽小小有峰洞皦如水精及其映日光似虎珀胡人和之以供國厨名為君王鹽亦名玉華鹽又曰有清池鹽正四方廣半寸其形扶踈似有人耕池旁地取池水波種之去勿廻顧即生此鹽國語曰桓公通齊國之魚鹽于東莱山海經曰景山南望鹽敗之池北望少澤其草多藷藇蓁菽其隂多頳其陽多土郭景純云鹽敗澤即斛縣鹽池也吕氏春秋曰和之美者即大夏之鹽春秋後語曰張儀說趙王曰今日楚與秦為兄弟之國而韓魏稱為藩臣齊獻魚鹽之地斷趙之右臂淮南萬畢術曰鹽能累卵戎鹽塗卵取他卵置其上即累也鹽鐵論曰古者豪強大家得煮海為鹽民皆依為姦之業也世說曰秦穆公使賈人載鹽百里奚使将車風俗通曰醎如炭俗説鹹亦與熱正等炭火不可以入口人食得大醎亦吐之謹按東海昫人曉知鹽法者云欖鹽水多日毎燋黑如炭非謂竈中火炭也吴時外國傳曰漲海中有灣灣中常出自然白鹽嶧嶧如細石子天竺國有新陶水水甘美下有石鹽白如水精晉令曰凡民不得私煮鹽犯者四歲刑主吏二歲刑蜀王本紀曰宣帝地節中始穿鹽井數十所世本曰宿沙作煮鹽宋志曰宿沙衛齊靈公臣齊濵海故以為魚鹽之利晉太康地記曰梓潼縣出繖子鹽廣志曰鹽體因扵水故或水沮于土故或與土雜産于地多側于海濵但未必千里相比耳煮鹽與海同海東有印成鹽西方有石子鹽皆生于水北胡中有青鹽五原有紫鹽波斯國有白鹽如石子𤣥晏春秋曰故侍中劉子楊食餅知鹽生精味之至秦記曰會稽王道子為符朗設盛饌朗云鹽味小生博物志曰臨卭火井諸葛亮往視之後火轉盛以盆貯水煮之則鹽後人以火投井中火即滅至今不然梁四公子記曰髙昌國遣使貢鹽二顆顆如斗􅃺白似玉帝以其自萬里絶域而来獻數年方達命杰音竭公迓之謂使曰鹽一顆是南燒羊山月望収之者一是北燒羊山非月望収之者使者具陳鹽奉王急命故非時爾因問紫鹽磬碧珀云中路遭北凉所奪不敢言之帝問􅇐公羣物之異對曰南燒羊山鹽文理粗北燒羊山鹽文理宻月望収之者明徹如氷以氈槖煮之可驗交河之間平磧中掘深數尺有末鹽如紅如紫色鮮味甘食之止痛更深一丈下有碧珀黑逾純漆或大如車輪末而食之攻婦人小腹癥瘕諸疾彼國珍異必當致貢是以知之凉州異物志曰姜頼之墟今稱龍城恒溪無道以感天庭上帝赫怒溢海盪傾姜頼胡國名也恒溪其王字也矜貪無厭上帝化為沙門逰下觀其政遂闕無乞之以鹽與帝帝乃震怒使昌溢以盪覆也剛鹵千里蒺䔧之形其下有鹽累祺而生其地化為鹵而剛堅凝如蒺䔧撥發其底鹽方大如棊以次相累也坐以鹽乞天帝故使此地化生鹽也又曰鹽山二岳三色為質赤者如丹黑者如漆大小如意鏤之冩物赤與黑者皆小惟白大或如篋箱從人所為形也作獸辟惡佩之為吉戎鹽可以療疾凉州記曰有青鹽山出鹽正方半寸其形似石甚甜美益州記曰汶山越嶲煮鹽法各異汶山有醎石先以水漬既而煮之越嶲先燒炭以鹽井水沷炭刮取鹽荆州記曰鹽水自凝生傘子鹽方寸中央隆起形如張傘本草經曰鹵鹽一名寒石味苦戎鹽主明目大鹽一名胡鹽崔駰博徒論曰江陽六鹽笑林曰姚彪在武昌沈浙至武昌遇風于江渚守風糧用盡遣人從彪貸鹽百斛彪得書不答勅左右倒鹽百斛着江水中曰明吾不惜惜所與耳嶺表異録曰野煮鹽廣南煮海其無限商人納𣙜計價極㣲數内有恩州渚石橋場俯迎滄溟去府最逺商人於所司給一百石𣙜課支銷正貨三五千及往本場鹽並官給無官給遣者商人但将人力収聚鹹沙掘地為坑坑口稀布竹木鋪篷簟扵其上堆沙潮來投沙鹹鹵淋在坑内伺候潮退以火炬照之氣衝火滅則取鹵汁用竹盤煎之頃刻而就竹􅋥者以篾細織竹鑊表裏以牡礪灰泥之自収海水煎鹽謂之野言易得如此也醬禮記曰膾炙處外醯醤䖏内又曰獻熟食者操醬齊又曰濡鷄醢醬實蓼濡魚卵醤實蓼濡鼈醢醤實蓼魚膾芥醤麋腥醢醬論語曰不得其醬不食漢書曰劉歆謂楊雄云今學有禄利然尚不能明易又如𤣥何吾恐後人覆醤瓿也瓿音蔀小甖也風俗通曰醬成於鹽而醎於鹽夫物之變有時而重又曰雷不作醬俗說令人腹内雷聲按子路感雷精而生尚剛好勇死衛人醢之孔子覆醢每聞雷心惻怛耳桓譚新論曰鄙人得鯅音延醬而美與人共食少唾其中因棄之俱不得食論衡曰作豆醬惡聞雷此欲使人急作不能積久世說曰陸機入洛欲為三都賦聞左思作之撫掌而笑與弟雲書云此間有滄父欲作三都賦須其成當以覆醬瓮耳宋書曰孝武嘗為王𤣥謨作四時詩云匏醬調秋菜白醝解冬寒又曰阮孝緒外兄王宴貴顯屢至其門孝緒度其必至顛覆聞其笳管穿籬逃匿不與相見曾食醬美問之云是王家所得便吐餐覆醬及宴誅親戚咸為之懼孝緒曰親而不黨誰坐之後竟獲免梁劉孝儀謝晉安王賚蝦醬啓曰龍醬𫝊甘退誠可陋蚳醢稱貴追覺失言上客聞雷未之能覆嘉賓流歠羞以無辭太平御覽卷八百六十五
