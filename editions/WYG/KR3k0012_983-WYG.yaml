  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_983-1a, image: WYG0901/WYG0901-0617a.png}
body:
  text: 太平御覽卷九百八十三宋李昉等撰香部三槐香蘭香蘪蕪蕙草䔾車杜蘅白芷荃香薰香兠末香反生香驚精香白蛤狸􅢠本香神精香龜甲香槐香嵇含槐香賦序曰余以太簇之月登於歴山之陽仰眺崇巒俯視幽坂乃覩槐香生蒙楚之間曾見斯草植于廣夏之庭或披帝王之圖怪其遐棄遂遷樹於中堂華麗則殊彩阿那芳實則可以藏書又感其棄本髙崖委身階庭似傅説顯殷四叟歸漢故因實制名蒙蒙緑葉揺揺弱莖蘭香易曰同心之言其臭如蘭易卦通驗曰冬至廣莫風至蘭始生説文曰蘭香草也韓詩曰溱與洧説文云詩人言溱與洧方流洹洹然謂三月桃花水下之時士與女方盛流秉蘭兮秉執也蘭蘭也當此盛流之時衆士與衆女方執蘭而拂除鄭國之俗三月上巳之日此兩水之上拂䰟續魄袚除不祥大戴禮夏小正曰五月蓄蘭為沐浴禮曰婦或賜之􅊉蘭則受而獻之舅姑左傳曰鄭文公有賤妾曰燕姞夢天使與已蘭曰余為伯鯈余而祖也以是為而子以蘭有國香人服媚之既而文公見之與之蘭而御之辭曰妾不才幸而有子將不信敢徴蘭乎公曰諾生穆公名之曰蘭論撰考䜟曰漸於蘭則芳漸於鮑則臭史記曰冬至短極蘭根生蜀志曰先主殺張裕諸葛亮救之先主曰芳蘭當門不得不鋤晉書曰惠帝時温縣有人如狂造書曰兩火没地哀哉秋蘭歸形街郵終為人嘆及楊駿已死楊后被廢賈后絶其膳八日而崩葬街郵亭北百姓哀之兩火武帝諱蘭楊后字也宋書曰劉湛欲袁淑附已而淑不為改意由是大相乖失淑乃賦詩曰種蘭忌當門懐璧莫向楚楚少别玉人門非種蘭所晏子春秋曰曾子将行晏子送之曰嬰聞君子贈人以財不若以言吾請以言乎夫蘭本三年而成湛之苦酒則君子不近庻人不佩湛之麋醯而價匹馬矣非蘭本美也所湛然也願子之必求所湛蘇子曰蘭以芳自燒膏以肥自􅌊翠以羽殃身蚌以珠致破文子曰日月欲明浮雲蓋之藂蘭脩發秋風敗之又曰蘭芷不為莫服而不芳君子行道不為莫知而止范子計然曰大蘭出漢中澤蘭出河東𢎞農白者善孫卿子曰人之親我欣若父母其好我芬若椒蘭淮南子曰兩心不可以得一人一心可以得百人男子樹蘭美而不芳蘭芳草女之美男子樹之蓋不芳也繼子得食肥而不澤繼子假母也情不相與往來也又曰蘭生幽宮不為莫服而不芳抱朴子曰人鼻無不樂香故流黄欝金芝蘭蘇合𤣥膳索膠江籬掲車春蕙秋蘭價同瓊瑶而海上之女遂酷臭之家語孔子曰芝蘭生于深林不以無人而不芳君子修道立德不為困窮而改節為之者人也死生者命也語林曰謝太傅問諸子侄曰子弟何豫人事而故欲使其佳諸人莫有言者車騎答曰譬如芝蘭玊樹欲使其生于庭階耳世説曰毛伯成既負其才噐常稱寜為蘭摧玊折不作蕭芳艾榮羅含别傳曰含致位還家庭中忽自生蘭此德行幽感之應蔡質漢官儀曰尚書郎懐香袖蘭趨走丹墀盛𢎞之荆州記曰都梁縣有小山山上水極淺其中悉生蘭草緑葉紫莖芳滿藻谷俗謂蘭為都梁即以號縣云本草經曰草蘭一名水香乆服益氣輕身不老楚辭曰余既滋蘭之九畹兮滋蒔也二十畆為畹又曰扈江離與薜芷兮扈披也楚人名披曰扈薜芷皆香草名也紉秋蘭以為佩又曰沅有芷兮澧有蘭言沅湘中有盛茂之芷澧水中有芬芳之蘭喻夫人之美亦異于衆人也思公子兮未敢言又曰秋蘭兮蘼蕪羅生兮堂下緑葉兮素枝芳菲菲兮襲予秋蘭兮青青緑葉兮紫莖滿堂兮美人忽獨與余兮目成又曰光風轉蕙泛崇蘭趙壹疾邪賦曰勢家多所宜咳唾自成珠被褐懐金玉蘭蕙化為芻張衡怨詩曰秋蘭嘉美人也嘉而不獲用故作是詩也猗猗秋蘭植彼中阿有馥其芳有黄其葩雖曰幽深厥美彌嘉之子之遠我勞如何酈炎詩曰靈芝生河州動揺回洪波秋蘭榮何晩嚴霜悴其柯哀哉二芳草不植太山阿琴操曰猗蘭操者孔子所作也孔子聘諸侯諸侯莫能任自衛反魯過隠谷之中見薌蘭獨茂喟然嘆曰夫蘭當為王者香今乃獨茂與衆草為伍乃止車援琴鼓之自傷不逢時託辭于香蘭云晉傅𤣥詠秋蘭詩曰秋蘭䕃玉池池水清且芳雙魚自踊躍兩鳥時徊翔王羲之蘭亭記曰永和九年嵗在癸丑暮春之初㑹于㑹稽山隂之蘭亭修禊事也蘼蕪説文曰江蘺蘼蕪也楚謂之蘺晉謂之䖀齊謂之􅊉爾雅曰蘄草蘼蕪春秋運斗樞曰維星散為蘼蕪淮南子曰亂人者若虵床之與蘼蕪山海經曰洞庭之山其草多蘼蕪廣志曰蘼蕪香草魏武帝以藏衣中吳氏夲草曰蘼蕪一名芎藭古詩曰上山採蘼蕪下山逢故夫郭璞讚曰蘼蕪善草亂之虵床不損其貴自别以芳蕙草廣雅曰薰草蕙草也山海經曰天帝之山其下多蕙外山之下其草蕙廣志曰蕙草緑葉紫華魏武以為香燒之楚辭曰光風轉蕙泛崇蘭又曰既滋蘭之九畹兮又樹蕙之百畆司馬相如子虛賦曰於是乃相與撩於蕙圃盤姗勃窣而上乎金堤藒車爾雅曰藒車䒗輿也説文曰藒車䒗輿也以草䅥聲廣志曰藒車黄葉白華出徐州楚辭曰畦留夷與藒車兮雜杜蘅與芳芷杜蘅山海經曰天帝之山有草焉其状如葵臭如蘼蕪名杜蘅可以走馬爾雅曰杜土鹵註杜蘅也唐書曰貞觀中度支郎以咏謝朓詩曰芳洲多杜若乃下坊州令貢州判司報云坊州不出杜若應由謝朓詩誤太宗聞之大笑判司改雍州司法度支郎免官廣雅曰楚蘅杜蘅也范子計然曰杜若出南郡漢中大者善本草經曰杜若一名杜蘅白芷山海經曰崍山其草多葯廣雅曰白芷葉謂之葯淮南子曰今鼓舞者便媚擬神身若秋葯被風髮若結旌范子計然曰芷出齊郡以春取黄白澤者善也本草經曰白芷一名芳香味辛温生河東吳氏曰白芷一名䖀一名扶離一名澤芬一名莞楚辭曰獻嵗發春兮汨吾南征緑蘋葉齊兮白芷生又曰桂棟兮蘭橑辛夷楣兮葯房又曰擥木根以㓗芷兮擥持也貫薜荔之落蘂荃香楚辭曰荃不察余之中情兮荃香草以喻君被服芬香故以香草為喻反信讒而齌怒又曰荃橈兮蘭旌薰香左傳曰晉獻公以驪姬為夫人卜人曰一薰一蕕十年尚猶有臭山海經曰浮山有草焉麻葉而芳莖赤花而黑實臭如蘼蕪名曰薰草也廣雅曰菌薰也其葉謂之蕙魏畧曰大秦出薰草蘇子曰象以牙䘮身不能去其白薰以芳自燒不能去其香淮南子曰以潔白為汙辱譬猶沐浴而抒溷薰燧而負彘抱朴子曰常以熱日取天井土泥以和栢葉薰草以泥門户方一寸則盗賊不來西京雜記曰漢掖庭有緑熊席其席皆長一丈餘眠而擁毛自蔽望之不能見坐則没膝其中雜諸薰香一坐此席餘香百日不歇成公綏宣清賦曰哀薰草之見焚兠末香漢武故事曰西王母當降上燒兠末香兠末香兠渠國所獻如荳大塗門香聞百里關中常大疫死者因生反生香眞人關尹傳曰老子曰眞人遊時各坐蓮花之上花徑一丈有反生靈香逆風聞三十里驚精香十洲記曰聚窟洲在西海中上有天山形似鳥之狀因名為鳥山鳥山中多大樹與栢相似而秀芳華蘂香聞百里名返䰟樹叩其樹樹能作聲如牛吼聞者必震駭伐其木根玉釡中煑取汁更㣲㣲以火熱煎如黑飴令可永名曰驚精香或曰震靈丸亦曰返生香亦名却死香氣聞數百里死屍在地聞氣即活延和六年春西胡月氐國王遣使獻香四兩大如雀卵黑如桑椹帝以香國中所乏以付庫白蛤狸闕曰白蛤狸刳其外韋囊以酒灑而隂乾之氣如麋若雜眞麋中鮮有别者藳本香水經曰三城水有香陘山山上悉生藁本香世故名焉神精香郭子横洞㝠記曰元朔二年波祗國一名波弋國獻神精香草一名荃蘪一名春蕪一根五百條其枝間如竹節柔軟其皮如絲可以為布所謂春蕪布亦曰香荃布堅密如紈氷也握一片滿室皆香婦人𢃄之彌為香馥龜甲香任昉述異記曰龜甲香即桂香嘉者一名紫木香一名金桂香一名蘪草香出蒼梧桂林二郡界今吳中有蘪草似蘭而甚芳香太平御覽卷九百八十三
