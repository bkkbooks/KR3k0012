body:
  text: 太平御覽卷四百六十一宋李昉等撰人事部一百二游說中史記曰蘇秦説趙王王乃飾車百乗黄金十鎰白璧百雙錦繡千純以游諸侯又曰蘇秦說齊王曰齊三軍之良五家之兵戰如雷霆觧如風雨又蒯通對髙祖曰秦失其鹿天下共逐之又班彪王命論曰游說之士比天下於逐鹿也又曰漢王使隨何說淮王隨何曰臣請與大王提劍而歸漢王又曰蒯通為竒策感動韓信佯以相人說信又曰子貢之晉謂晉君曰臣聞慮不先定不可以應卒兵不先辨不可以勝敵今吳戰勝必以其兵臨晉晉君大恐又曰田常欲為亂於齊憚髙國鮑晏故移兵欲伐魯子貢說田常曰臣聞之憂在内者攻强憂在外者攻弱今君憂在内破魯以廣齊戰勝以驕主求以成大事難矣又曰子貢一出說存魯亂齊破吳彊晉而霸越也又曰范陽人蒯通說范陽令曰今諸侯叛秦矣武信君兵且至而君堅守范陽少年殺君下武信君君急遣臣見武信君可轉禍為福在今矣又曰田肯說髙祖曰秦形勝之國也得百二焉地勢便利彼其下兵於諸侯譬猶居髙屋之上建瓴水也又曰漢王數困滎陽成臯計欲捐成臯以東屯鞏洛以距楚酈生因曰臣聞知天之天者王事可成王者以民人為天而民人以食為天夫敖倉天下轉輸久矣臣願足下急復進收取滎陽據敖倉之粟塞成臯之險杜太行之道距蜚狐之口守白馬之津則天下知所歸矣又曰韓非知説之難為説難書曰凡説之難在知所説之心可以吾説當之又曰韓信既殺龍且項羽恐使武涉説信曰足下右顧則漢王勝左顧則項王勝項王今日亡則次取足下矣又曰蒯通説韓信曰酈生一士伏軾掉三寸之舌下齊七十餘城案漢書曰食其憑軾下齊又曰張儀聞蘇秦死乃説楚王曰今秦與楚境接壤大王誠能聴臣臣請使秦以秦女為大王箕箒之妾長為昆弟之國臣以為計無便於此者楚従其計又曰李斯説秦王曰自孝公以來周室卑微諸侯相兼闗東為六國秦之乗勝於諸侯盖六世矣今諸侯服秦譬若郡縣夫以秦之强大王之賢如老嫗竈上掃除足以滅諸侯成帝業今怠而弗急諸侯復强相聚約従雖有黄帝之資弗能并也秦王聴其計又曰李左車説成安君陳餘曰臣聞韓信涉西河虜魏王擒夏説新喋血閼與今乃輔以張耳議欲下趙以此乗勝而逺鬭其鋒不可當臣聞千里餽糧士有饑色今井陘之道車不得方軌騎不得成列其勢糧食必在其後願足下假臣竒兵三萬人従間道絶其輜重彼前不得鬭退不得還吾竒兵絶其後野無所掠不至十日兩将之頭可致麾下又曰酈食其説齊王曰知天下所歸乎齊王曰天下何歸曰歸漢何以言之曰漢王與項王戮力西面擊秦約先入咸陽者王之項王負約不與而王之漢中又還殺義帝漢王聞之起蜀漢之兵責義帝之罪降城即以侯其将得財即以分其士蜀漢之粟方船而下項王有倍約之名殺義帝之負於人之罪無所忘天下之士歸於漢王可坐而觀今已據敖倉之粟塞成皋之險守白馬之津杜太行之阪距飛狐之口天下後服者先亡王疾下漢王齊國社稷可得而保不下漢王危亡可立而待乃聴酈生又曰髙祖使陸生賜尉佗印為南越王陸生進説佗曰足下中國人親戚昆弟墳墓在真定今反天性棄冠帶欲以區區之越與天子抗衡禍且及身乃欲以新造未集之越屈强於此漢一偏将将十萬衆臨越則殺王降漢如反覆手耳漢書曰張耳陳餘北略地燕界趙王為燕軍所獲燕因留之欲與分地趙有厮養卒乃走燕壁問曰知臣何欲燕將曰若欲得王耳曰君知張耳陳餘何如人也燕將曰賢人也曰其志何欲燕將曰欲得其王耳趙卒笑曰君未知兩人所欲也夫武臣張耳陳餘杖馬箠下趙數十城亦各欲南面王夫臣之與主豈可同日道哉兩人亦欲分趙而王時未可耳今兩人名為求王實欲燕殺之此兩人分趙而王夫以一趙尚易燕况以兩賢王左提右挈而責殺王滅燕易矣燕以為然迺歸王養卒為御而歸又曰陸賈説尉他他賜賈橐中裝直千金張晏注曰珠玉之寳也裝裹也又曰魏豹叛漢王漢王謂酈生曰緩頰往説之又曰蒯通知天下權在於韓信欲説令背漢曰臣願披心腹肝膽效愚忠恐足下不能用也夫功者難成而易敗時者難值而易失時不再來願足下無疑臣之計信猶豫不忍背漢遂謝通通乃陽狂為巫又曰漢三年與項羽相距京索間上數使使勞苦丞相鮑生謂蕭何曰數勞苦君者有疑君心為君計遣君子孫昆弟能勝兵者悉詣軍所上益信君於是何従其計漢王大説又曰項羽擊陳留外黄不下數日降羽悉令男子年十五以上詣城東欲坑之外黄令舎人兒年十三往説羽曰彭越刼外黄外黄恐故降待大王大王至又皆阬之百姓豈有所歸心哉従此以東梁地十餘城皆恐莫肯下矣羽然其言迺赦外黄當坑者而東至睢陽聞之皆爭下又曰漢王至雒陽新城三老董公遮説漢王曰臣聞順徳者昌逆徳者亡兵出無名事故不成故曰明其為賊敵乃可服項王為無道放殺其主天下之賊也夫仁不以勇義不以力三軍之衆為之素服以告諸侯為此東伐四海之内莫不仰徳此三王之舉也漢王曰善非夫子無所聞於是漢王為義帝發喪哀臨三日發使告諸侯又曰婁敬齊人也漢五年戍隴西過雒陽帝在焉敬脫輓輅見齊人虞將軍曰臣願見上言便宜虞將軍入言上召見賜食敬説曰陛下都洛陽豈欲與周室比隆哉上曰然敬曰陛下取天下與周異周積徳累善十有餘世武王伐紂成王即位周公之屬𫝊相焉迺營成周都雒陽以為天下中諸侯四方納貢職道里均矣有徳則易以王無徳則易以亡今陛下與項籍戰滎陽大戰七十小戰四十使天下之民肝腦塗地哭泣之聲不絶傷痍者未起而欲比隆成康之時臣竊以為不侔矣且夫秦地被山帶河四塞以為固卒然有急百萬之衆可具夫與人鬭不搤其亢張晏曰亢喉嚨拊其背未能全勝今陛下入闗而都按秦之故此亦搤天下之肮而拊其背也高帝即日西都闗中又曰陳豨反上自將至邯鄲而韓信謀反闗中吕后用蕭何計誅信上已聞信誅便拜何相國益封五千户令卒五百人一都尉為相國衛諸君皆賀召平獨弔謂何曰禍自此始矣上暴露於外而君守内非被矢石之難而益君封置衛者以今者淮隂新反於中有疑君心夫置衛衛君非以寵君也讓封勿受悉以家私財佐軍何従其計上喜悦又曰齊悼惠王時曹參為相禮下賢人請蒯通為客初齊王田榮怨項羽謀舉兵叛之齊處士東郭先生梁石君在劫中强從及田榮敗二人醜之相與入深山隐居客謂通曰先生之於曹相國拾遺舉過顯賢進能齊國蔑若先生者先生知梁石君東郭先生世俗所不及何不進於相國乎通曰諾臣之里婦與里諸母相善也里婦夜亡肉姑以為盗怒而逐之婦晨去過所善諸母語以事而謝之里母曰汝安行我今令而家追汝矣即束縕請火於亡肉家曰昨暮夜犬得肉爭鬭相殺請火治之亡肉家遽追呼其婦故里母非談說之士也束緼請火非還婦之道也然物有相感事有適可臣請乞火於曹相國迺見相國曰婦人有夫死三日而嫁者有幽居守寡不出門者足下即求婦何取曰取不嫁者通曰然則求臣亦猶是也彼東郭先生梁石君齊之俊士隠居不嫁未嘗卑節下意以求仕也願足下使人禮之曹相國曰敬受命皆以為上賓又曰袁盎逢丞相申屠嘉下車拜謁丞相従車上謝盎還媿其吏迺之丞相舎上謁求見丞相曰且陛下従代來每朝郎官者上書疏未嘗不止輦受其言言不可用置之言可採未嘗不稱善何也欲以致天下賢士日聞所不聞以益聖今君自閉箝天下之口而日益愚以聖主責愚相君受禍不久矣丞相迺再拜曰嘉鄙人迺不知將軍幸教引與之坐為上客范煜後漢書曰更始尚書令謝躬留魏郡太守陳康守鄴自率諸將擊萊賊世祖因躬在外乃使吳漢襲其城漢先令辯士説陳康曰盖聞之上智不處危以僥倖中智能因危以為功下愚安於危以自亡危亡之至在人所由不可不察今京師敗亂四方雲擾公所聞也蕭王兵强士附河北歸命公所見也謝躬内背蕭王外失衆心公所知也公今據孤危之城待滅亡之禍義無所立節無所成不若開門内軍轉禍為福免下愚之敗收中智之功此計之至者也康然之於是開門内漢又曰袁紹奔冀州董卓購募求紹時侍中周秘城門校尉伍瓊等隂為紹説卓曰夫廢立大事非常人所及袁紹不識大體恐懼出奔非有他志今急購之勢必為變袁氏樹恩四世門生故吏遍於天下若收豪傑以聚徒衆英雄因之而起則山東非公之有也不如赦之拜一郡守紹喜於免罪必無患矣卓以為然乃遣授紹渤海太守又曰袁紹以書要公孫瓚以襲冀州牧韓馥紹乃使外甥陳留髙幹及潁川荀諶等説馥曰公孫瓚乗勝來南而諸郡應之袁車騎引軍東向意未可量也竊為將軍危之馥懼曰然則為之奈何諶曰君自料寛仁容衆為天下所附孰與袁氏馥曰不如也臨危吐决智勇邁於人又孰與袁氏馥曰不如也世布恩徳天下之人蒙其惠又孰與袁氏馥曰不如也諶曰今將軍資三不如之勢久處其上袁氏一時之傑必不為將軍下也且公孫提燕代之卒其鋒不可當夫冀州天下之重資若兩軍并力兵交城下危亡可立而待也夫袁氏將軍之舊且為同盟當今之計莫若舉冀州以讓袁氏袁氏厚徳將軍公孫瓚不能復與之争矣是將軍有讓賢之名而身安於太山也願勿有疑馥性怯因然其計又曰沮授説袁紹曰將軍累葉台輔世濟忠義今朝廷播越宗廟殘毁觀諸州郡雖外託義兵内實相圖未有憂存社稷恤民之意且今州城粗定兵强士附西迎大駕即宫鄴都挾天子而令諸侯畜士馬以討不庭誰能禦之又曰曹操與袁紹相持於官渡紹遣人求助劉表表許來而不至亦不援曹操且欲觀天下之變従事中郎南陽韓嵩别駕劉先説表曰今豪傑並争兩雄相持天下之重在於將軍將軍若欲有為起乗其弊可也如其不然固將擇所宜従豈可擁甲十萬坐觀成敗求援而不能助見賢而不肯歸此兩怨必集於將軍恐不得復中立矣又曰曹操軍至新野蒯越韓嵩傅巽等説劉琮曰逆順有大體强弱有定勢以人臣拒人主逆道也以新造之楚禦中國必危也以𤣥徳敵曹公不當也三者皆短欲以抗王師之鋒必亡之道也將軍自料何如𤣥徳琮曰不若也巽曰誠以𤣥徳不足禦曹公則雖保全楚不能以自存也誠以𤣥徳足禦曹公則彼不為將軍下也願將軍勿疑琮乃請降又曰閻忠説皇甫嵩曰將軍指揮足以展風雲叱咤足以興雷電東觀漢記曰隗囂將王元説囂曰昔更始四方響應天下喁喁謂之太平一旦壊敗今南有子陽北有文伯江湖海岱王公十數而欲牽儒生之説棄千乗之基計之不可者也今天水完富士馬最强北取西河東收三輔案秦舊迹表裏山河元請以一丸泥為大王東封函谷闗此萬世一時也若計不及此且畜養士馬據隘自守曠日持久以待四方之變圖王不成其弊猶足以霸囂然其計又曰更始大司馬朱鮪守洛陽吳漢諸將圍守數月不下世祖以岑彭嘗為鮪校尉令彭説鮪曰赤眉已得長安今公誰為守乎蕭王受命平定燕趙百姓安土豪俊歸心四面雲集今北方清浄大兵來攻洛保一城欲何望乎不如亟降鮪曰大司徒公被害時鮪與其謀又諫更始無遣上北伐自知罪深故不敢降耳彭還詣河陽白上上謂彭復徃曉之夫建大事者不忌小怨今降官爵可保况誅罰乎上指水曰河水在此吾不食言彭奉上㫖復至城下説鮪因曰彭往者得執鞭侍從蒙薦舉㧞擢深受厚恩思以執義不敢負公鮪従城上下索曰當如此来彭趨索欲上鮪見其不疑即曰旦蚤與我㑹上東門外彭如期往與鮪交馬語鮪輕騎詣彭降彭為殺羊具食鮪身為降虜未見吳公諸將不敢食彭即令鮪自縛與俱往吳公將詣行在所河津亭上即時解鮪縛復令彭夜送歸洛陽又曰更始使侍御史黄黨即封世祖為蕭王罷兵耿弇曰今使者來欲罷兵不可聴也兵一罷不可復㑹也上曰國家已都長安天下大定何用兵為弇曰青徐大賊銅馬赤眉之屬數十輩輩數十萬衆皆東至海所嚮無前聖公不能辦也敗必不久帝起坐曰卿失言我擊卿弇曰大王哀厚弇如父子故披赤心為大王陳事上曰我戲卿耳何以言之弇曰百姓患苦王莽苛刻日久聞劉氏復興莫不欣喜望風従化如去虎口就慈母倒㦸横矢不足以喻明公首事南破昆陽敗百萬師今復定河北以義征伐表善懲惡躬自克薄以待士民發號嚮應望風而至天下至重公可自取無令他姓得之上曰卿若東得無為人道之弇曰此重事不敢為人道也又曰馮異因間進説曰天下同苦王氏思漢久矣更始諸將縦横暴虐所至虜掠百姓失望今専命方面施行恩徳夫有桀紂之亂乃見湯武之功民人饑渇易為充飽宜急分遣官屬徇行郡縣理寃結布恵澤上納之又曰隗囂既立便聘平陵方望為軍師望至說囂曰足下欲承天順民輔漢而起今立者乃在南陽王莽尚據長安雖欲以漢為名其實無所受命將何以見信於衆宜急立髙廟稱臣奉祠所謂神道設教求助民神者也且禮有損益質文無常削地開兆茅茨土階陛下以致其肅敬雖未備物神明其舎諸囂従其言又曰蜀郡功曹李熊說公孫述曰方今四海波蕩匹夫横議將軍割據千里地方十城若奮發盛徳以投天隙霸王之業成矣宜改名號以鎮百姓述曰吾亦慮之公言起我意於是自立為蜀王熊復説述曰今山東饑饉人民相食兵所蔑滅城邑丘墟蜀地沃野千里土壤膏腴果實所生無穀而飽女工之業覆衣天下名材竹幹不可勝用又有魚鹽銀銅之利浮水轉漕之便北據漢中杜褒斜之塗東守巴郡拒扞闗之口地方數千餘里戰士不下百萬見利則出兵而略地無利則堅守而力農東下漢水以窺秦地南順江流以震荆揚所謂用天因地成功之資也君有為之聲聞於天下而名號未定志士狐疑宜即大位使逺人有所依歸述遂自立為天子又曰荆邯見東方漸平兵且西向說公孫述曰兵者帝王之大器古今所不能廢也昔秦失其守豪傑並起漢祖無有前人之迹立錐之地於戰陣之中躬自奮擊兵破身困數矣然軍敗復合創愈復戰何則死而功成愈於坐而滅亡臣之愚計以為宜及天下之望未絶豪傑尚可招誘急以此時發國内精兵令田戎據江南之㑹倚巫山之固築壘堅守𫝊檄吳楚長沙已南必隨風而靡今延岑出漢中定三輔天水隴西拱手自服如此海内震揺冀有大利又曰鄧禹聞上安集河北即杖策北渡追及於鄴上欣其至禹進說曰更始雖都闗西今山東未安赤眉青犢之屬動以萬數三輔假號往往羣聚更始既未有所挫而自聴㫁諸將皆庸人崛起志在財幣争用威力朝夕自快非有忠良明智深慮逺圖尊主安民者明公雖藩輔之功猶恐無所於今之計莫如延攬英雄務恱民心立髙祖之業救萬民之命以公而慮天下不足定也上大恱因令左右號禹曰鄧將軍嘗宿止於中與定計議又曰光武以冦恂為河内太守行大將軍事恂同門生董崇說恂上新即位四方未定而君以此時據大郡此讒人所側目怨禍之府也宜思功遂身退之計恂然其言因病不視事太平御覽卷四百六十一
