body:
  text: 太平御覽卷八百四十七宋李昉等撰飲食部五食上周禮天官膳夫曰膳夫掌王之食飲膳羞以養王及后世子羞有滋味凡王之饋食用六榖膳用六牲飲用六清羞用百二十品珎用八物醤用百有二十罋王日一舉鼎十有二物皆有俎以樂侑食膳夫授祭品嘗食王乃食又曰王齊則玉府供玉食玉陽之精御水氣也食玉犀也又天官食醫曰掌和王之六食六膳百羞百醤八珎八齊凡食齊眡春時飲宜温羮齊眡夏時美宜熱醤齊眡秋時醤宜凉飲齊眡冬時飲宜寒凡和春多酸夏多苦秋多辛冬多醎調以滑甘凡㑹膳食之宜牛宜稌羊宜黍豕宜稷犬宜梁㕍宜麥魚宜苽凡君子之食恒倣焉又曰内饔掌王及后世子膳羞之割烹煎和之事辨體名肉物辨百品味之物選百羞醤物珎物以俟饋選進其中御者共后及世子之膳羞又曰小宰凡朝覲㑹同賔客以牢禮之法掌其牢禮委積膳獻飲食賔賜之飱牽與其陳數太戴禮曰食穀者必智惠而巧禮記曲禮上曰侍食於長者主人親饋則拜而食主人不親饋則不拜而食共食不飽無流歠無咤食毋囓骨毋反魚肉毋投與狗骨毋固獲又曰凡進食之禮左殽右胾食居人之左羮居人之右膾炙處外醯醤處内葱㳿處末酒醤處右以脯脩置者左朐右末又曰齊大饑黔敖為食扵路以待餓者而食之有餓者䝉袂輯履貿貿然來黔敖左奉食右執飲曰嗟來食揚其目而視之曰予唯不食嗟來之食以至於斯也從而謝焉終不食而死又曰食扵有喪者之側未嘗飽也又曰庶人春薦韭夏薦麥秋薦黍冬薦稻韭以卵麥以魚黍以豚稻以鴈又曰文王之為世子朝於王季日三食上必在視寒煖之節食下問所膳命膳宰曰未有原應曰諾然後退又曰朝夕之食上世子必在視寒煖之節食不問所膳羞必知所進及命膳宰然后退若内豎言疾則世子親齊𤣥而養膳宰之饌必敬視之疾之藥必親嘗之嘗饌善則世子亦能食嘗饌寡世子亦不能飽又曰古者未有火化食草木之實鳥獸之肉飲其血茹其毛後聖有作然後脩火之利以炮以燔以烹以炙以為醴酪又曰夫禮之初始諸飲食其燔黍捭豚汗尊而抔飲蕢桴而土鼓猶若可以致其敬扵鬼神又曰天子一食諸侯再大夫士三食力無數又曰不食雛鼈狼去膓狗去腎貍去正脊兎去尻狐去首豚去腦魚去乙鼈去醜皆為不利人也又曰膳目諸膳也膷臐膮醢膷晉香切臐許云切膮許尭切牛炙醢牛胾醢牛膾羊炙羊胾醢豕炙醢豕胾芥醤魚膾雉兎鵓鷃此上大夫之禮玉藻曰侍食於先生異爵者后祭先飯客祭主人辭曰不足祭也客飱主人辭以疏又曰父命呼唯而不諾手執業則投之食在口則吐之又曰君賜之食而君客之則命之祭然後祭先飯辯嘗羞飲而俟若有嘗羞者則俟君之食然後食飯飲而俟君命之羞羞近者辟貪味也命之品嘗之然後唯所欲凡嘗逺食必順近食從近始也居未覆手不敢飱君既食又飯飱不敢先君飽飯飱者三飯也君既徹執飯與醤乃出授從者凡侑食不盡食食於人不飽又學記曰雖有嘉肴弗食不知其㫖也雖有至道弗學不知其善也又雜記曰孔子曰吾食於少施氏而飽少施氏食我以禮吾祭作而辭曰不足祭也吾飱作而辭曰䟽食也不敢以傷吾子又坊記曰故食禮主人親饋則客祭主人不親饋則客不祭故君子苟無禮雖美不食焉左傳曰晉公子重耳過衞衞文公不禮焉出於五鹿乞食於野人與之塊公子怒欲鞭之子犯曰天賜也稽首受而載之又曰楚伐庸出師旬有五日至濮乃罷自廬以往振廪同食又曰初宣子田於首山舎於翳桑見靈輙餓問其病曰不食三日矣食之舎其半問之曰宦三年矣未知母之存否今近焉請以遺之使盡之而遺之簞食與肉寘諸槖以與之既而與為公介倒㦸以禦公徒而免之問其故對曰翳桑之餓人也問其名居不告而退遂自亡也又曰諸侯之師次于鄭西我師次于督楊不敢過鄭子叔聲伯使叔孫豹請逆于晉師為食扵鄭郊師逆以至聲伯四日不食以待之食使者而後食又曰晉侯㑹諸侯楊干亂行魏絳戮其僕晉侯以絳為能以刑佐民矣反役與之禮食使佐新軍又曰衞獻公戒孫文子寗惠子食皆服而朝日旰不召而射鴻於囿二子從之不釋皮冠而與之言二子怒又曰魏獻子為政以魏戊為楩楊大夫楩楊人有獄魏戊不能斷以獄上其大宗賂以女樂魏子将受之戊謂閻没汝寛曰主不賄聞扵諸侯若受楩楊人賄莫甚焉吾子必諫皆許諾退朝待扵廷饋入召之北置三歎既食使坐魏子曰吾聞諸伯叔諺曰唯食㤀憂吾子置食之間三歎何也同辭而對曰或賜小人酒不夕食饋之始至恐其不足是以歎中置自咎曰豈将軍食之而有不足是以再歎及饋之畢願以小人之腹度君子之心屬厭而已獻子辭楩陽人又曰叔孫穆子食慶封慶封汜祭穆子不説使工為之誦茅鴟亦不如又曰晉悼夫人食輿人之城杞者絳縣人或年長矣無子而往與於食又曰華亥與其妻必盥而食所質公子者後食公與夫人每日必適華氏食公子而後歸又曰昔闔廬在國天有菑厲親廵孤寡而共其乏困在軍熟食者分而後敢食其所嘗者卒乗與焉又曰衞侯為虎幄於籍圃成求令名者而與之始食焉太子請使良夫以良夫應為令名良夫乗衷甸兩牡衷甸一轅卿車紫衣狐裘至袒裘不釋劒而食食而熟故偏袒亦不敬太子使牽以退數之三罪而殺之又曰左師每食擊鍾聞鍾聲公曰夫子将食詩曰民之失徳乾餱以諐又曰民之貭矣日用飲食又生民曰克岐克嶷以就口食韓詩外傳曰子夏過曽子食之子夏曰不為公費乎曽子曰有三費飲食不在其中少而學長而亡之一費舜典曰咨十有二牧曰食哉惟時又洪範曰八政一曰食又曰惟辟玉食周書曰甘食美衣使長貧尚書太傅曰八政何以先食食者萬物之始人之所本者也易曰雲上扵天需君子以飲食宴樂九五需于酒食貞吉又曰噬嗑食也頥中有物曰噬嗑又曰山下有雷頥君子慎言語節飲食論語曰一簞食一瓢飲人不堪其憂囘也不改其樂又曰齋必變食居必遷坐食不厭精膾不厭細肉雖多不使勝食氣食不語寝不言雖蔬食菜羮𤓰祭必齋如也史記曰張蒼常被刑王陵救免之蒼常德陵後為丞相洗沐常先朝陵夫人食然後敢歸家又曰韓信從下鄉南昌亭長寄食亭長患之乃晨炊蓐食時信往不為具食信亦知其意怒竟絶去釣於城下諸母漂有一母見信飢飯信竟漂數十日信喜謂漂母曰吾必有以重報母母怒曰丈夫不能自食吾哀王孫而進食豈望報乎後信為楚王至國召所從食漂母賜千金又曰景帝居禁中召條侯周亞夫賜食獨置大胾無切肉又不置􅀈條侯心不平顧謂尚席取􅀈景帝視而笑曰此非不足君所乎後漢郅元義父伯考為尚書僕射元義還鄉里妻留事姑甚謹姑憎之幽閉空室節其飲食日羸困妻終無怨言後伯考怪而問之時義子朗年數嵗言毋不病但苦饑耳又曰韓卓字子助臘日奴竊食祭其先卓義而免之又曰延熹末黨事将作袁閎遂散髮絶伐欲投迹深林以母老不宜逺遁乃築土室於四周於庭不為户自牖納飲食而已魏志曰典􅅊好酒食啖兼人每賜食於前大飲長歠左右相属人益乃供太祖壮之又曰漢末中常侍唐衡弟為京兆虎牙都尉入謁尹尹欲修主人禮勅外為市買功曹趙息啓云左悺子弟來為虎牙非德選不足為持酤買宜隨中舎菜食而已魏志曰文帝為太后弟康起第成太后至第請諸家外親設下厨無異膳太后左右菜食粟飯無魚肉其儉約如此也又曰扈累者嘉平中年八十九嵗若六七十歳者縣官以其老曰給廪五升五升不足食頗有傭作以裨之糧盡復出人與不取食不求美衣敝緼故後一二年病亡又曰諸葛亮出斜谷與司馬宣王對壘宣王見亮使唯問其寝食及其事之繁簡戎事使對曰諸葛公夙興夜寐罰二十以上皆親臨覽然所啖食不至數升宣王曰亮體斃矣其能乆乎又曰沐並字德信河間人也少孤苦袁紹父子時始為名吏有志介嘗過姊為殺雞炊黍而不留也正始中為三府長史時吳使朱然諸葛瑾攻圍樊城遣舡兵於峴山東斫材牂牁人兵作食有先熟者呼後熟者言共食來後熟者答言不也呼者曰欲作沐德信耶其名流布播於異域如此雖自華夏不知者以為前世人也江表傳曰南陽樊伷為武昌部從事誘導諸夷夷後屬蜀孫權召問潘濬曰以五千兵往可擒矣權曰卿何以輕之濬曰伷皆為州人設饌甘至日中食不可得而十餘自起此亦侏儒觀一節之騐權即遣将五千兵往果平武昌呉志曰步隲字子山世亂避難江東單身窮困與廣陵衞旌同年相善俱以種𤓰自給晝勤四體夜誦經傳㑹稽焦征羌郡之豪族人客放縱隲與旌寄食其地懼為所侵乃共修刺奉𤓰以奉征羌方内卧駐之移時旌欲去隲止之曰本所以來謂其强也今舎去欲以為髙祗結怨耳良乆征羌聞牖見之身隠几坐帳中設席致地坐步隲旌於牖外旌愈恥之隲辭色自若征羌身自享大案肴膳重㳫以小盤飯與隲旌唯菜茹而已旌不能食隲極飯致飽乃辭出旌怒隲曰能忍此乎隲曰吾等貧賤是以主人以貧賤遇之固其宜也當何所耻蜀志曰漢獻帝舅車騎将軍董承辭帝衣帶中密詔當誅曹公先主未發是時曹公從容謂先主曰天下英雄唯使君與操耳本初之徒不足數也先主食失匕箸又曰闗侯嘗為流矢所中貫其左臂後瘡雖愈每隂雨痛醫曰矢鏇有毒毒入于骨當破臂作瘡刮骨去毒然後此患乃除耳侯使伸臂令醫鑿之時侯適請将飲食相對臂血流離盈於盆器而侯割炙引酒言笑自若太平御覽卷八百四十七
