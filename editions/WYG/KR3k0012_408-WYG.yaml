  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_408-1a, image: WYG0896/WYG0896-0586a.png}
body:
  text: 太平御覧卷四百八宋李昉等撰人事部四十九交友三宋書曰晉安帝義熈初髙祖命瑯瑘王𢎞為徐州治中從事𢎞不就隠于㑹稽與魯國孔淳之為莫逆交王智深宋紀曰孔淳之隠居剡山嘗遇桑門法崇於三山披於領契自以為得意之交又曰何㸃字子晳廬江􅏦人也宋徴為庶子不就與陳郡論􅏦吳國張融㑹稽孔稚珪為莫逆之交齊春秋曰檀超字悦祖髙平金鄉人也少而負氣始為南徐州西曹書佐與别駕蕭惠開抗禮惠開自以地位居前稍相凌駕而超嘯慠不以地勢推尚謂惠開曰我與卿並有何等官閥俱國家㣲時外戚耳何以一爵髙人惠開忻然更為刎頸之交齊書曰劉悛字士操彭城安上里人也從駕登蒋山上數歡曰貧賤之交不可忘顧悛曰此况卿也今日與卿盡布衣之交􅃴悛拜謝又曰桞世隆字彦緒河東解人宋大尉元景弟也當時名士張緒王延之沈淡之徒雅相欽慕以為君子之交又曰劉善明素與崔思祖友善聞死慟哭仍得病卒又曰孔稚珪字徳璋㑹稽人也早立名譽當時名士陸惠曉謝􅀈張融何㸃沈相淵與為君子之交梁書曰何遜字仲言陳郡剡人也弱冠舉秀才南鄉范雲見其荅策大相稱賞因結㤀年交好自是一文一詠雲輙嗟賞又曰張􅃡弟纉遷尚書吏部河東裴子野曰張吏部有喉舌之任子性曠遠自云年出三十不復詣人初未與纉遇便相推重因為忘年交又曰蕭介性髙蕳少髙遊唯與族兄琛從兄􅀈音􅀈素子洽從弟俶等文酒賞㑹時人以比謝氏烏衣之遊又曰髙祖性不好聲色頗慕名與裴子野劉顯蕭子雲張纉及當時才秀為布衣之交何𤣥之梁典曰劉許字彦度與陳留阮籍李緒申金蘭之契築室鍾阜之傍共聽内義鑚尋奥典魏書曰夏侯尚字伯仁有籌畫智畧文帝器之為布衣之交後漢書曰眭夸一名昶趙郡髙邑人也少與崔浩為莫逆之交北齊書曰崔聸與趙郡李槩為莫逆之交槩将東還聸與之書曰仗氣使酒我之恆弊詆阿指切在卿尤甚足下告歸吾於何聞過也又曰袁聿修歴任清華郎署之日值趙彦梁為水部郎中同在一院因成交友彦深後被沙汰停私門生藜藿聿修猶以故情存問徃来又曰裴讞謙劉之字士平不妄交遊唯與隴西辛術趙郡李繪頓丘李搆清河崔聸為妄年之友後周書曰桞𢎞字光道河東解縣人少聰頴工草𨽻愽渉羣書詞私豐贍與𢎞農楊素為莫逆之交又曰張軌濟隂臨邑人也少好學志識開朗初在洛陽家貧與樂安孫仁為莫逆之交每易衣而出以此見稱又曰黎景希字季明河間鄚音莫人也好占𤣥象頗知術數而落魄音託不事生業與范陽盧道源為莫逆之交又曰韋夐躰政功字𢎞逺志尚夷蕑澹於荣利周𢎞正乃造夐談謔盡日恨相遇之晩也後請夐至賔舘夐未赴𢎞正乃贈詩曰徳星猶未動真車詎肯来當時所欽如此南史曰謝𢎞㣲性寛愽無喜愠末年嘗與友人棊友人西南棊有死勢復一客曰西風急或有覆舟者友人悟乃救之𢎞㣲大怒投扄於地識者知其暮年之事果以此嵗終北史曰盧懐仁有行檢善與人交與瑯琊王衍隴西李壽之情好相得嘗語衍云昔郭大道廣許邵知而不顧嵇生􅀈立鍾㑹遇而絶言吾處季孟之間去其太甚衍曰然三國春秋曰燉煌太守李暠古老切表於段業暠稱盡忠不貳横為李嗣所讒請業殺嗣暠自歸司敗業乃殺嗣遣使謝暠初嗣與暠結刎頸之交嗣常以宗族託暠曰我身猶子身勿為疑也及是暠反為嗣所構暠乃恨之又曰姚萇單騎度淮見豫州刺史謝尚于壽陽幅巾以待之一面如舊相識又曰王鎮惡随宋髙祖入闗中初鎮惡流寓崤澠崤澠人李方厚待之鎮惡曰待吾佇英雄主取萬户侯乃厚相報方笑曰本縣足矣鎮惡力不絶人不嫺弓馬畧通諸子兵書縱横有智計以此成名及是李方尚在鎮惡昇堂拜母板方澠池令陳書曰江總聰敏篤學有文范陽張纉瑯琊王筠南陽劉遴之並髙才碩學總時少有名纉等雅相推重為忘年友又曰陸景文字叔辯少有膽畧武勇與陳武帝有布衣之舊隋書曰李宻與楊𤣥感為刎頸之交尤好兵書常皆在口唐書曰武徳中元敬為秘書郎太宗召為天䇿府叅軍兼直記室薛收與元敬俱為文學舘學士時房杜等處心腹之寄深相友託元敬畏於權勢竟不之狎如晦常云小記室不可得而親不可得而踈又曰于休烈河南人也貞觀中任左僕射為十八學士心性貞慤機鍳敏悟自㓜好學善屬文與㑹稽賀朝萬齊融延陵包融為文詞之友齊名一時又曰王琚懐州河内人也少孤而聰敏有才畧好𤣥象合鍊之學神龍初嘗謁駙馬王同皎甚器之及謀刺武三思事琚義許之與同璟張仲之為忘年之友又曰蕭昕河南人也開元中首舉愽學宏詞授陽武簿後廷佐拾遺昕嘗與布衣張鎬友善表薦之曰如鎬者用之則為王者師不用之則幽谷一叟爾𤣥宗擢鎬拾遺後為将相又曰權臯徳輿之父大歴中卒于家元和中諡曰貞孝初臯卒韓泂王定為服朋友之䘮李華為其墓表以為分天下善惡一人而已又曰杜伏威齊州章丘人也少為盗與鄉人輔公祐為刎頸之交公祏姑家公牧羊為業公祐數􅓙羊以餵之又曰楊憑字虛受為左散騎少負氣節與母弟凝凌相愛皆有名重交遊與穆質許孟容李鄘王仲舒為友故時人稱楊穆許李之友又曰朱敬則毫州永城人也長夀中為右補闕家代孝義敬則倜儻早以詞學知名與左史江融尚書左僕射魏元忠相交友善又曰劉黒闥貝州漳南人也與竇建徳少相友善家貧無以自給建徳每資之黒闥所費至盡而不以為疑建徳亦弗之間也又曰劉孝孫者荆州人也祖禎周石臺太守孝孫弱冠知名為當時詞人虞世南蔡君和孔徳紹庾自直劉斌等登臨山水結為交㑹又曰陸象先弟監察御史景倩吏部侍郎景融大理正景獻河南令景裔皆有美譽僧一行少時與象先昆弟友善常謂人曰陸氏兄弟皆有才行古之荀陳無以加也又曰楊纂華州華隂縣人也父文偉隋温州刺史纂畧渉經史尤明時務少與瑯琊顔師古燉煌令􅈢徳棻音芬友善大業中舉進士終為考功郎中又曰張道源嘗與友人客遊友人病中宵而卒道源恐驚擾主人遂共屍卧達􅍼方哭親歩營送至其本鄉後仕隋為監察御史又曰孔紹安越州山隂人也陳吏部尚書奐子也少以文詞知名年十三入隋徙居京兆鄠縣閉門讀誦集數十萬言時有詞人孫萬夀與紹安篤忘年之好紹安大業末為監察御史又曰李宻長安人也父寛隋上柱國蒲山公宻開皇中襲父爵年始弱冠尚書令楊素見而竒之謂其子𤣥感曰李宻智計不窮爾所不及可與為友𤣥感遂傾心禮遇定為刎頸之交又曰劉裔之徐州彭城人也少有學業與隋信都丞孫萬壽宗正卿李百藥為忘年之交又曰桞宗元謂所親曰禹錫有母今為郡蠻方絶域萬里如何與母偕行吾於禹錫為執友胡忍見其若是即草奏請以桞州授禹錫自徃播州禹錫易連州又曰張九齡素與中書侍郎嚴挺之尚書左丞袁仁敬右庶子梁昇卿御史中丞盧怡結交友善挺之䓁皆有才幹而交道終始不渝甚為當時之所稱也太平御覧卷四百八
