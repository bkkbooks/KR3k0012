body:
  text: 太平御覽卷一百一宋李昉等撰皇王部二十六後魏諸帝太祖道武皇帝後魏諸帝後魏書序記曰黃帝有子二十五人或内列諸華或外分荒服昌意少子受封北國有大鮮卑山因以為號其後世為君長統幽都之北廣漠之野畜牧遷徙射獵為業淳樸為俗簡易為化不為文字刻木契而紀世事逺近人相傳授如史官之紀録焉黃帝以土德王北俗謂土為托謂后為跋故以為氏其裔始均入仕堯世逐女魃於弱水北民賴其勲帝堯嘉之命為田祖爰厯三代以及於秦薰鬻獫狁山戎匈奴之屬累代殘暴作害中州而始均之裔不交南夏是以載籍無聞焉積六十七世至成皇帝諱屯立聰武明智逺近所推統國三十六大姓九十威振北方莫不率服成帝崩節皇帝諱貸立節帝其後四世宣帝諱推寅立南遷大澤方千餘里厥土𡨕昏沮洳謀更南徙未行而崩其後六世獻皇帝諱鄰立時有神人言於國曰此土荒遐未足以建都邑宜復徙居帝年時衰老乃以位授子武帝諱詰汾命南移山谷高深九難八阻於是欲止有神獸其形似馬其聲類牛先行導引厯年乃出始居匈奴之故地其遷徙䇿畧多出宣獻二帝故時人並號曰推寅蓋俗云鑽研之義初聖武帝常率數萬騎田於山澤欻見輜軿自天而下既至見美婦人侍衞甚盛帝異而問之對曰我天女也受命相偶遂同宿旦請還曰明年周時復㑹此處言終而别去如風雨及期帝至先所田處果復相見天女以所生男授帝曰此君之子也善視之子孫相承當世為帝王語訖而去即始祖神元皇帝也故時人諺曰詰汾皇帝無婦家力微皇帝無舅家帝崩始祖神元皇帝諱力微立生而英叡元年歲在庚子先是西部内侵國民離散依於没鹿囘部大人竇賓始祖有雄傑之度時人莫測後與賓攻西部賓軍敗失馬步走始祖使人以所乘駿馬給之賓歸令其部内求與馬之人當加重賞始祖隱而不言賓後知大驚將分國之半以奉始祖始祖不受賓臨終戒其二子使謹奉始祖其子不從乃陰謀為逆始祖召殺之盡并其衆部大人悉皆款服控弦士馬二十餘萬三十九年遷於定襄之盛樂始祖乃告諸大人曰我厯觀前世匈奴蹋頓之徒茍貪財利抄掠邊民雖有所得而其死傷不足相補更招冦讎百姓塗炭非長計也於是與魏和親四十二年遣子文帝如魏且觀風土魏景元二年也文皇帝諱沙漠汗以國太子畱洛為魏賔之冠魏晉禪代和好仍密始祖春秋已邁帝以父老求歸晉武帝具禮護送四十八年帝至自晉五十六年帝復如晉其年冬還國晉遺帝錦􅄢繒綵綿絹諸物咸豐厚車牛百乘行達并州晉征北將軍衞瓘以帝為人雄異恐為後患乃密啓晉帝請畱不遣晉帝難為失信不許瓘復請以金帛賂國之大人令致間隙使相厄害晉帝從之於是國之執事及諸部大人皆受瓘貨五十八年方遣帝始祖聞帝歸大悦使諸部大人詣陰館迎之酒酣帝仰視飛鳥謂諸大人曰我為汝曹取之授彈飛丸應弦而落時國俗無彈衆咸大驚並先馳還始祖曰我子既厯他國進德何如皆對曰太子才藝非常引空弓而落飛鳥似得晉人異法術亂國害民之兆惟願察之自帝在晉之後諸子愛寵日進始祖年踰期頤頗有所惑聞諸大人語意乃有疑因曰不可容者便當除之於是諸大人乃馳詣塞南害帝後乃追諡焉始祖尋崩凡饗國五十八年一百四歲太祖即位尊為始祖章皇帝諱悉鹿立始祖之子也饗國九年而崩平皇諱綽立章之少弟也享國七年而崩思帝諱弗立文帝少子也即位一年崩昭皇帝諱禄官立始祖神元之子也九年分國為三部帝自以一部居東在上谷北濡源之西東接宇文部以文帝長子桓皇帝諱猗㐌統之一部居代郡之參合陂北以桓帝之弟穆皇帝諱猗盧統之一部居定襄之盛樂故城自始祖以來與晉和好百姓乂安財畜富實控弦騎士四十餘萬十年晉惠帝為成都王穎逼畱在鄴匈奴别種劉淵反於離石號漢王并州刺吏司馬騰來乞師帝與桓帝同時大舉以助之大破淵衆於西河上黨晉假桓帝大單于金印紫綬是歲桓帝崩帝英傑魁岸馬不能勝常乘安車駕大牛角容一石帝㑹中蠱嘔吐之地仍生榆木參合陂土無榆樹世人異之至今傳記十三年昭帝崩是歲羯胡石勒與晉馬牧帥汲桑反穆皇帝天資英特勇畧過人昭帝崩後遂總攝三部以為一統元年劉淵僭帝自稱大漢三年并州刺史劉琨遣使以子為質又遣使乞師救洛陽帝遣步騎二萬助之晉大傅東海王司馬越辭以洛中饑饉師還是年劉淵死子聰僭立五年劉琨遣使乞師以討劉聰石勒帝以琨忠義矜而許之㑹聰遣其子粲襲晉陽害琨父母而據其城琨來告難帝大怒遣長子六修桓帝子普根及衞雄范班姬澹等為前鋒帝統大衆二十四萬為後繼粲懼棄輜重突圍遁走縱騎追之斬其將劉儒劉豐伏尸數百里琨來拜謝帝以禮待之琨固請進軍帝曰吾不早來致卿父母見害誠以後時相愧今卿已復州境然吾逺來士馬疲弊且待後期賊豈可盡乎饋琨馬牛羊各千餘車金百鎰又畱勁鋭戍之而還六年城盛樂以為北都修故平城以為南都帝登平城西山望觀地勢乃更南百里於灅水之陽黃瓜堆築新平城晉人謂之小平城使長子六修鎭之統領南部九年帝召六修不至帝怒討之失利乃微服民間遂崩普根先守外境聞難來赴攻六修滅之普根立月餘而薨也平文皇帝諱鬱立惠帝之子也二年西兼烏孫故地東吞勿吉以西控弦上馬將有百萬劉聰死淵族子曜僭立帝聞晉愍帝為劉曜所害顧謂大臣曰今中原無主天其資我乎劉曜遣使請和帝不納是年司馬叡僭稱大位於江南五年桓帝后以帝得衆心恐不利於己子害帝遂崩大人死者數十人天興初尊曰太祖惠皇帝諱賀傉立桓帝之中子也未親政事太后臨朝遣使與石勒通和時人謂之女國使四年帝始臨朝五年出居於宇文部賀蘭及諸部大人共立烈皇帝烈皇帝諱翳槐立平文之長子也石勒遣使求和帝遣弟昭成皇帝如襄國二年石勒僭立自稱大趙王烈皇帝崩昭武皇帝諱什翼犍立平文之次子也生而竒偉寛仁大度喜怒不形於色身長八尺隆凖龍顔立髮委地卧則乳垂至席烈帝崩顧命曰必迎立什翼犍社稷可安烈帝崩帝弟孤乃自詣鄴奉迎與帝俱還建國元年帝即位於繁畤之北時年十九二年春始置百官分掌衆職八年張駿私置假涼王十三年魏郡人冉閔殺石鑒僭立十四年氐苻徤僭稱天王自號大秦十五年慕容雋滅冉閔僭尊號二十七年春車駕還雲中冬十一月討没歌部破之獲牛馬羊數百萬頭三十四年春長孫斤謀反伏誅斤之反也拔刃向御座太子獻明皇帝諱寔格之傷脇夏五月薨後追諡焉秋七月皇孫珪生大赦三十九年苻堅遣其大司馬苻洛率衆十二萬朱彤張蚝音蛓鄧羌等諸道來冦侵逼南境冬十一月白部獨孤部禦之敗績南部大人劉庫仁走雲中復遣庫仁率騎十萬逆戰於石子嶺王師不利帝時不豫十月至雲中旬有二日帝崩時年五十七太祖即位尊曰高祖帝雅性寛厚智勇仁恕時國中少繒帛代人許謙盜絹二疋守者以告帝匿之謂燕鳳曰吾不忍視謙之面卿勿泄言謙或慚而自殺為財辱士非也太祖道武皇帝後魏書曰大祖道武皇帝諱珪昭成皇帝之嫡孫獻明皇帝之子也母曰獻明賀皇后初因遷徙遊子雲澤既而寢息因夢日出室内寤而見光自牖屬天歘然有感以建國三十四年七月七日生太祖於參合陂北其夜復有光明昭成大悦羣臣稱慶大赦告於祖宗保者以帝體重倍於常兒竊獨竒怪明年有榆生於埋胞之坎后遂成林弱而能言目有光曜廣顙大耳衆咸異之年六歲昭成崩元年葬昭成皇帝於金陵營梓宫木材盡生成林帝雖幼沖而嶷然不羣劉庫仁常謂其子曰帝有高天下之志興復洪業光揚祖宗者必此王也登國元年春正月戊申帝即代王位郊天建元大㑹於牛川復以長孫嵩為南部大人以叔孫普洛為北部大人班爵叙勲各有差夏四月改稱魏王是歲慕容垂僭稱皇帝於中山自號大燕姚萇僭稱皇帝於長安自號大秦六年秋七月講武於牛川慕容永使其大鴻臚慕容鈞奉表勸進尊號冬十月北征蠕蠕追之及於大磧南山下大破之班賜從臣各有差十有二月出居于馬邑是歲起河南宫七年秋八月行幸漢南仍築巡臺八年春正月南巡二月幸羖羊原起白樓皇始元年春正月大蒐於定襄之虎山三月慕容垂來冦桑乾川陳畱公元虔先鎭平城時帝徵兵未集虔率麾下邀擊失利死之垂遂至平城西北踰山結營聞帝將至乃築城自守疾甚遂遁走死於上谷子寶迎喪而還至中山乃僭立秋七月左司馬許謙上書勸進尊號帝始建天子旌旗出入警蹕於是改元八月治兵於東郊大舉討慕容寶親勒六軍四十餘萬南出馬邑踰于句注旌旗駱驛二千餘里寶并州牧遼西王農棄城東遁并州平初建臺省百官封拜公侯將軍刺史太守尚書郎悉用文人帝初拓中原畱心慰納諸士大夫詣軍門者無少長皆引入賜見存問周悉人得自盡茍有微能咸蒙叙用冬十月車駕出井陘十一月進軍中山引騎圍之二年春正月饗羣臣於魯口慕容寶遣其左衞將軍慕容騰冦博陵殺中山太守及高陽諸縣令長抄掠租運是時信都未下帝乃進軍引騎圍之寶將軍張讓䕶軍徐超率將吏以下舉城降寶聞帝幸信都乃趣博陵之深澤屯滹沲水遣弟賀麟冦陽城三月車駕次于盧奴寶遣使求和請送元觚割常山以西奉國乞守中山以東帝許之已而寶背約辛亥車駕次中山命諸將圍之是夜寶弟賀麟將妻子出走西山寶見賀麟走恐先據和龍壬子夜遂將其妻子及兄弟親族數千騎北遁城内共立慕容普隣為主麟復入中山殺普隣自立九月賀麟飢窮率三萬餘人出冦新市甲子晦帝進軍討之太史令晁崇奏曰不吉帝曰其義云何對曰昔紂以甲子亡兵家忌之帝曰紂以甲子亡周武不以甲子勝乎崇無以對冬十一月帝進軍新市賀麟退阻𣲖水依漸洳澤以自固甲戌帝臨其營戰於義臺塢大破之斬首九千餘級賀麟單馬走西山遂奔鄴慕容德殺之甲申中山平丁亥遣三萬騎起衞王儀將以攻鄴天興元年春正月慕容德走保滑臺車駕幸鄴遂登臺遍觀宫城將有定都之意乃置行臺以龍驤將軍日南公和跋為尚書左丞賈􅉓率郎吏及兵五千鎭鄴車駕自鄴還中山所過存問百姓詔大軍所經州郡復貲租一年除山東民租之半車駕將北還發卒萬人治直道自望都鐵關鑿恒嶺至代五百餘里六月詔有司議定國號羣臣奏曰昔周秦以前世居所生之土有國有家及王天下即承為號自漢以來罷侯置守時無世繼其應運而起者皆不由尺土之資今國家萬世相承啓基雲代臣等以為若取長逺應以代為號詔曰昔朕逺祖總御幽都控制􅜯國雖踐王位未定九州迨于朕躬處百代之季天下分裂諸華之主民俗雖殊撫之在德故躬率六軍掃平土宇凶逆蕩除􅜯邇率服宜仍先號為魏焉秋七月遷都平城始營宫室建宗廟立社稷八月詔有司正封畿制郊甸端經術標道里平五權較五量定五度冬十月起天文殿十有一月詔尚書吏部郎中鄧淵典官制立爵品定律吕協音樂儀曹郎中董謐撰郊廟社稷朝覲宴饗之儀三公郎中王德定律令申科禁太史令晁宗造渾儀考天象吏部尚書崔𤣥伯總而裁之十有二月帝駕臨於天文殿太尉司徒進璽綬百官咸稱萬歲大赦改元追尊成帝已下及后號諡樂用皇始之舞詔有司議定行次尚書崔𤣥伯等奏從土德服色尚黃數用五未祖辰臘犧牲用白五郊立氣宣贊時令敬授民時行夏之正徙六州三十二郡守宰豪傑吏民二千家于代都二年春正月初祀上帝于南郊以始祖神元皇帝配降壇視燎成禮而反二月破高車以所獲之衆起鹿苑於南臺陰北距長城東包白登屬之西山廣輸數十里鑿渠引武川水注之苑中疏為三溝分流宫城内外穿鴻鴈池三月初令五經羣書各置博士増國子太學生員三千人秋七月起天華殿大閲于鹿苑饗賜各有差冬十月太廟成遷神元平文昭成獻明皇帝神主于太廟三年三月戊午立皇后慕容氏是月穿城渠通於城内作東西魚池夏四月姚興遣使朝貢五月車駕東巡幸涿鹿遣使者以太牢祀帝堯帝舜廟七月車駕還宫起大中殿及雲母堂金華堂四年三月帝親漁薦于寢廟五月起紫極殿𤣥武樓冬十二月集博士儒生比衆經文字義類相從凡四萬餘字號曰衆文經六年冬十月起西昭陽殿乙夘立皇子嗣為齊王加車騎大將軍位相國是年島夷桓𤣥廢其主司馬德宗而自立僭稱大楚天賜三年九月幸漢南鹽池至漢中觀天鹽池六年夏帝不豫初帝服寒食散自太醫令陰美死後藥數動發至此愈甚而災變屢見憂懣莫困切不安或數日不食或不寢達旦歸咎羣下喜怒乖常謂百寮左右曰人不可信慮如天文之占或有肘腋之虞追思既往成敗得失終日竟夜獨語不止若傍有鬼物對揚者朝臣至前追其舊惡便見殺害其餘或以顔色變動或以喘息不調或以行步乖節或以言辭失措帝皆以為懐惡在心變見於外乃手自毆擊死者皆陳天安殿前於是朝野人情各懐危懼有司懈怠莫相督攝百工偷劫盜賊公行巷里之間人為稀少帝亦聞之曰朕縱之使然待過災年當更清治之耳冬十月帝崩於天安殿在位十四年時年三十九歲先時國有䜟曰珪厄清河死萬人帝破滅清河郡手殺萬人以厭之夜恒變易寢處人莫得知唯愛妾萬人知處帝子清河王紹與萬人通懼罪同害帝帝歎曰清河萬人乃是汝耶元帝立誅紹及萬人永興二年九月上諡宣武皇帝葬於盛樂金陵廟號太祖泰常五年改諡曰道武太平御覽卷一百一
