body:
  text: 太平御覽卷六百十三宋李昉等撰學部七教學禮記王制曰天子命之教然後為學小學在公宫南之左大學在郊又禮記曰古之學者家有塾黨有庠術有序國有學術當為遂周禮五百家為黨二千五百家為遂也一年視離經辨志三年視敬業樂羣五年視博習親師七年視論學取友謂之小成九年知類通達强立而不返謂之大成又曰學然後知不足教然後知困知不足然後能自反也知困然後能自强也又曰君子知至學之難易而知其美惡然後能博喻能博喻然後能為師能為師然後能為長能為長然後能為君又曰大學之法禁於未發之謂豫當其可之謂時不陵節而施之謂遜相觀而善之謂摩此四者教之所由興也發然後禁則扞格而不能勝時過然後學則勤苦而難成雜施而不遜則壊亂而不修獨學而無友則孤陋而寡聞燕朋逆其師燕辟廢其學此六者教之所由廢也又曰學者有四失教者必知之人之學也或失則多或失則寡或失則易或失則止此四者心之莫同也知其心然後能救其失也又曰君子之教喻也道而弗牽強而弗抑開而弗達道而弗牽則和強而弗抑則易開而弗達則思和易以思可謂善喻矣又曰教也者長善而救其失者也善歌者使人繼其聲善教者使人繼其志其言也約而達微而臧罕譬而喻可謂繼志矣又曰大學始教皮弁祭菜示敬道也宵音小雅肄三官其始也入學鼔箧遜其業也夏楚二物收其威也未卜禘不視學游其志也時觀而不語存其心也㓜者聽而不問學不躐等也此七者教之大倫也尚書說命下曰惟學遜志務時敏厥脩乃來允懐于兹道積于厥躬惟斆學半念終始典于學厥徳脩罔覺周禮師氏以三徳教國子一曰至徳以為道本二曰敏徳以為行本三曰孝徳以知逆惡穀梁傳昭公曰子既生不免於水火母之罪也覊貫成童不就師傅父之罪也覊貫謂交午剪髪以為飾成童八嵗以上者也就師學問無方心志不通師之罪也漢書曰景帝末文翁為蜀郡脩起學官吏民大化蜀地學於京師者比齊魯焉至武帝時乃令天下郡國皆立學校官自文翁為之始又曰䟽廣字仲翁東海蘭陵人少好學明春秋家居教授學者自逺方至又曰韋賢子𤣥成以明經厯位至丞相鄒魯諺曰遺子黄金滿籯不如一經東觀漢記曰永平九年詔為四姓小侯置學又曰樊準見當世學者益少憫先王道術陵遲乃上疏曰光武受命中興之初羣雄擾於冀州旌旗亂於大澤然猶投戈講學息馬論道孝明皇帝尤垂意於經學即位刪定乖疑稽合圖䜟封師太常桓榮為闗内侯親自制作五行章句每享射禮畢正坐自講諸儒並聽四方欣欣是時學者尤盛冠帯縉紳逰辟雍觀化者以億萬計後漢書曰樊儵字長魚刪定公羊嚴氏春秋世號樊侯學教授門徒前後三千餘人又曰延篤字叔堅南陽犨人能著文章有名京師後以病免歸居家教授不倦又曰任安字定祖學圖䜟究極其術還家教授諸生自逺而至又曰張興字君上拜太子少傅顯宗數訪問經術聲稱著聞弟子自逺至者著録且萬人又曰樊英字季齊善風角占筭河洛七緯推歩灾異隠於壺山之陽受業者四方而至又曰鄭𤣥弟子河内趙商等自逺方至者數千人又曰孫期家貧事母至孝牧豕大澤中賣之以奉養焉逺人從其學者皆執經追於壟畔又曰歐陽歙為司徒坐在汝南贓下獄中濟隂曹曾字伯山從歙受尚書門徒三千人又曰丁恭字子然學義精明遷少府諸生自逺方至者著録數千人當世稱為大儒又曰杜撫字叔和少有高才定韓詩章句後歸鄉里教授沈静樂道弟子千餘人又曰劉昆王莽世教授弟子恒五百餘人每春秋饗射常備列典儀以素木瓠葉為俎豆桑弧蒿矢以射菟首又曰馬融常在髙堂施絳紗帳前授生徒後列女樂弟子相次傳授鮮有入其室者晉中興書曰范寗字武子解褐為餘杭令興學校養生徒潔己修禮志行之士莫不宗之自中興以來崇學敦教未有如寗者也崔鴻十六國春秋後秦録曰凉州胡辨者西河大儒也前秦建元末東徙洛陽隨講授弟子千有餘人闗中後進多赴之姚興勅闗尉曰諸生諮訪道義脩己厲身往來出入勿拘限於是學者咸勸儒業盛矣國語曰晉文公學讀書於臼季三日臼季晉臣曰吾不能行也咫咫咫尺聞則多矣對曰然而多聞以待能者不猶愈乎使能者行之猶愈於不學尚書大傳曰古之帝王者必立大學小學使公卿之太子元士之適子十有五年始入小學見小節焉踐小義焉年十五入大學見大節焉踐大義焉入小學知父子之道長幼之序入大學知君臣之義上下之位墨子曰墨子勸弟子學曰女若學吾當任女弟子學期年就墨子求休子曰女不聞魯人乎昆弟五人父死長子嗜酒不肯預葬其四人曰爾若送葬吾當為女沽酒葬訖就弟求酒四弟曰子葬子父豈獨吾父乎恐人笑子故欺子以酒耳今子不學人自笑子故勸子也孫卿子曰達師之教使弟子安焉樂焉游焉息焉修焉藏焉此六者得其學則邪僻之道塞矣鄒子曰博學者所以求為君子也求而不得鮮矣未有不求而得之者也夫觀書者譬猶登東嶽而知丘陵之嵔㠥也浮滄海而知江河之不廣也見日月而知衆星之照微也仰聖人而知衆說之少觀也尸子曰學不倦所以治己也教不厭所以治人也夫繭舍而不治則腐蠧使上女繰之為美錦大君朝而服之身者蠒也舍而不治則知行腐蠧使賢者教子以為世士則天下諸侯莫敢不敬任子曰學所以治已教所以治人不勤學則無以為智不勤教則無以為仁郭林宗別傳曰泰以有道君子徴同邑宋子俊勸使往泰遂辭以疾闔門敎授鍾會母傳曰夫人明於敎訓會雖童稚勤見規誨年四嵗受孝經十五入大學謂會曰學猥則倦倦則意怠吾懼汝之怠故以漸訓汝今可以獨學矣王粲儒吏論曰古者八嵗入小學學六甲五方書計之事十五入大學學君臣朝廷王事之紀則文法典蓺具存於此矣虞溥厲學曰文學諸生皆冠帶之流年盛志美如涉學庭講修典訓此成大業文徳之基也夫聖人之道淡而寡味故學者不好也及至期月所觀彌博所習彌多日聞所不聞日見所不知然後心開意朗敬業樂羣忽然不知大化之陶鎔至道之入神也夫學者不患才不及而患志不立也太平御覽卷六百十三
