  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_439-1a, image: WYG0897/WYG0897-0056a.png}
body:
  text: 太平御覽卷四百三十九宋李昉等撰人事部八十貞女上毛詩曰漢廣徳廣所及也文王之道被于南國美化行乎江漢之域無思犯禮求而不可得南有喬木不可休息漢有遊女不可求思漢之廣矣不可泳思江之永矣不可方思又曰行露召伯聴訟也衰亂之俗微貞信之教興强暴之男不能侵陵貞女也誰謂雀無角何以穿我屋誰謂女無家何以速我獄雖速我獄室家不足又曰栢舟共姜自誓也衛世子共伯蚤死其妻守義父母欲奪而嫁之誓而弗許故作是詩以絶之也汎彼栢舟在彼中河髧彼兩髦實唯我儀之死矢靡它母也天只不諒人只禮記曰文伯之喪敬姜據其􅇃而不哭曰昔者吾有斯子也吾以為将為賢人也吾未嘗以就公室今及其死也朋友諸臣未有出涕者而内人皆行哭失聲斯子也必多曠扵禮矣夫穀梁傳曰宋災伯姬卒傳曰取卒之日加之災上者見以災卒也其見以災卒奈何伯姬之舍失火左右曰夫人少避火乎伯姬曰婦人之義保母不在不下堂遂逮扵火而死婦人以貞為行者也伯姬之義婦道盡矣詳其事賢伯姬也戰國策曰韓取聶政尸暴扵市縣購之千金乆之莫知誰聶政姊聞之曰弟至賢愛妾之軀滅吾弟名非弟意也乃之韓視之曰勇哉今死而無名父母既没矣兄弟無有此為我故也夫愛身不成弟名吾不忍也乃抱尸而哭之曰此吾弟軹深井里聶政也自殺扵尸旁晉楚齊聞之曰非獨聶政之能其姊者烈女也史記曰寡婦清其先得丹穴而擅其利数世家亦不貲寡婦能守其業用財自衛不見犯秦皇帝以為貞婦矣而容之袁宏後漢記曰初𢎞農王唐姬故會稽太守唐瑁女也王薨父欲嫁之不從及關中破為李傕所掠不敢自說也傕欲妻之姬弗聴尚書賈詡聞之以為宜加爵號扵是迎置扵園拜為𢎞農王妃謝承後漢書曰曹節弟破石為越騎校尉越騎營五伯妻有美色破石從求之五伯不敢違妻執意不肯行遂自殺魚豢魏畧曰龎航外祖父為人所殺其二子弱不能執毓母載車出與仇家相逢扵府門外乃㧞刀下車手格殺之州郡義其女人能如此縦而不問及毓長大節行又如此故令酒泉畫其母子儀像于壁而銘賛之謝靈運晉書曰劉曜王彌入于京都焚燒宫廟六宫幽辱愍懐太子妃㧞刀距賊曰吾皇太子妃義不為逆胡所汚遂見害何法盛晉中興書曰張茂祖起義討賊陳武一部用全中宗初鎮召為掾属中興累遷至太子左衛率出為吳國内史為沈充所殺茂妻陸氏散家財合義軍助國討充詣闕上書理茂忠節詔書褒歎追贈太僕卿鄧橜紀曰前始興太守尹虞起兵扵巴陵曰號監軍以討杜弢連戰稍勝遂進長沙為弢所没初敗略虞二女皆國色也将妻之女不肯曰我父二千石終不為賊作婦有死而已及虞攻賊賊殺之又曰散騎常侍梁緯妻辛氏隴西人也劉曜欲妻之使人扶取因據地哭從者亦哭曜並殺之又曰廣平太守崔諒表政糓執長崔希子休妻石氏年十餘嵗為邦邑所宗既歸鄭氏為九族所重休前妻女少孤父希臨終庶子沉生是時漢末大亂希命棄之曰柰何使舊愛之至不存活乎寧割肌膚之恩以存顧援之命飬沉及前女力不兼舉九年之中三不舉子梁書曰王僧辯母貞敬太夫人夫人姓魏氏僧辯父神念以天監初董率徒衆據東關退保合肥漅湖西因娶以為室生僧辯性甚安和善于緩接家門内外莫不懐之初僧辯下獄夫人流淚徒行将謝罪世祖不與相見時貞惠世子有寵扵世祖軍國大事多問焉夫人往詣閤自陳無訓涕泗嗚咽衆並憐之及僧辯免出夫人深見責勵辭色俱嚴云人之事君唯湏忠烈非但保祐當世亦乃慶流子孫及僧辯克復舊京功盖天下夫人恒自謙損不以富貴驕物朝野咸共稱之謂為明哲夫人也崔鴻前秦録曰苻登妻毛氏毛與之女也善騎射營壘既䧟猶彎弓跨馬率壮士数百與姚萇交戰殺賊七百餘人衆寡不敵為萇所執毛有姿色萇将納之毛罵曰天子皇后安可為賊羗所辱萇殺之崔鴻前趙録曰陜有婦人十九婺居事叔姑甚謹其家欲奪而嫁之此婦毁靣自誓崔鴻後凉録曰建中将軍遼東太守吕憲妻苻氏年十五有姿色憲卒自殺後凉録曰初吕紹之死也美人敦煌張氏年十四為沙門清辨有姿色吕隆見而恱之遣中書郎裴敏說之張氏善言理敏為之屈隆親逼之張氏曰欽樂至法故投身道門且一辱扵人誓不毁節今逼如此豈非命也昇門樓自投扵地二脛俱折口誦佛經俄而卒又曰吕紹殺纂后楊氏及侍婢数人殯纂于城西紹問楊氏玉璽何在楊氏怒曰盡壊之矣楊氏國色也紹将妻之謂父桓曰后若自殺禍及卿宗桓以言告楊氏楊氏曰大人本賣女與氐以圖富貴一之已甚可復使女辱于二氏乎桓不能強乃自殺後魏書曰涇州貞女兕先氏許嫁彭老生為妻幣聘既畢未成禮率行貞淑居貧常自汲以養父母老生輙往逼之女曰與君禮命雖畢二門多故未及相見何由不禀父母擅見陵辱若苟行非禮正可身死耳遂不肯從老生怒而刺殺之取其衣服女尚能言臨死與老生曰此身何罪與君相遇我所以執節自固者寧更有所邀正欲奉給君耳今反為君所殺若魂靈有知自當知報言終而絶老生持女衣服珠瓔至其叔宅以告叔叔曰此是汝婦奈何殺之天不祐汝遂執送官太和七年有司劾以死罪詔曰老生不仁侵陵貞淑原其强暴便可誅戮而女守禮履節没身不移雖處草萊行合古跡宜賜美名以顯風操號曰貞女又曰勃海封卓妻彭城劉氏女也成婚一夕卓官扵京師後以事伏法劉氏在家忽然夢想知卓已死哀不輟諸嫂諭之不止經旬凶問果至遂憤而死時人比之秦嘉妻中書令髙允念其義髙而名不著為之詩又曰平原鄃縣女子孫男王夫為零縣民所殺追執仇人男王欲自殺之其弟止而不聴男王曰女人出適以夫為天當親自復仇何假人之手遂以杖敺殺有司處死以聞顯宗詔曰男王重莭輕身以義犯法緣情定罪理可原其特恕之隋書曰楊慶王世充以兄女妻之署榮州刺史及世充将敗慶欲将其妻同歸長安其妻乃告之曰國家以妾奉箕箒扵公者欲以申厚意給公今叔父窮廹家國将危而公不顧婚姻孤負付属為全家之計非妾所能貴公也妾若至長安則公家一婢耳何用妾為願得送還君之惠也慶不許其妻遂沐浴新粧飲藥而死慶遂歸大唐為宜州刺史又曰元務光母者范陽盧氏女也少好讀書造次以禮盛年寡居諸子㓜弱家貧不能就學盧氏每親自教授朂以義方世以此稱之仁夀末漢王諒舉兵反遣将綦良往山東略地良以務光為記室及良敗慈州刺史上官政簿務光之家見盧氏恱而逼之盧氏以死自誓政為人凶悍怒甚以燭燒其身盧氏執志彌固竟不屈節又曰孝女王舜者趙郡王子春之女也子春與從兄長忻不恊属齊滅之及長忻與妻子同謀殺子春舜時年七嵗有妹粲年五嵗璠年二嵗並孤苦寄食親戚舜撫育二妹恩義甚篤而舜隂有復讎之心長忻殊不為備姊妹俱長親戚欲嫁之輙拒不從乃宻謂其二妹曰我無兄弟致使父讎不復吾輩雖是女子何用生為我欲共汝報復汝意如何妺皆垂泣曰唯姊所命是夜姊妹各持刀踰墻而入手殺長忻夫妻以告親戚詣縣請罪姊妹争為謀首州縣不能决髙祖聞而嘉之免其罪又曰韓覬妻者洛陽于氏女也字茂徳父寔周太左輔于氏年十四適于覬雖生長膏腴家門鼎盛而動遵禮度躬自儉約宗黨敬之年十八覬從軍戰没于氏哀毁骨立慟感行路每至朝夕奠祭皆手自持及免䘮其父以其㓜少無子将嫁之誓無異志復令家人敦喻于氏晝夜涕泣截髪自誓其父喟然傷感遂不奪其志因養夫之弟子世隆為嗣身自撫育愛同已生訓導有方卒能成立自孀居已後唯時或歸寧至親族之家絶不來往有尊卑就省謁者送迎皆不出户庭蔬食布衣不聴聲樂以此終身又曰裴倫妻者河東栁氏女也少有風采大業末倫為渭源令屬薛舉之亂縣城為賊所䧟倫遇害栁時年四十有二女及兒婦三人皆有美色栁氏謂之曰我輩逢禍亂汝父已死我自念不能全汝我門風有素義不受辱扵群賊我将與汝等同死如何其女等皆垂泣曰唯母所命栁氏自投于井其女及婦相繼而下皆重死扵井中又曰趙元楷妻者清河崔氏之女也父儦以文學𫝊家有素範子女皆遵禮度元楷父為僕射家冨扵財重其門望厚禮以聘之元楷甚敬崔氏雖在宴私不妄言笑進容止服動合禮儀化及之反也元楷隨至河北将歸長安至塗口遇盗攻掠元楷僅以身免崔氏為賊所拘賊請以為妻崔氏謂賊曰我士大夫女為僕射子妻今日破亡自可即死遣為賊婦終不能羣賊毁裂其衣形體悉露縛扵簀床之上将凌辱詐之曰人力已屈當聴處分不敢相違請解賊遽釋之崔因着衣取賊佩刀倚樹而立曰欲殺我任加刀鋸若欲覔死任相來逼賊大怒亂射殺之元楷後得殺妻者支解之以祭崔氏之柩又曰鍾士雄母臨賀蒋氏女也士雄仕陳為伏波将軍陳主以士雄領南鄭帥慮其反覆每質蒋氏扵都下及晉王平江南以士雄在嶺表欲以恩義致之遣蒋氏歸臨賀既而同郡虞子茂鍾文華等作亂舉兵攻城遣人召士雄士雄将應之蒋氏謂士雄曰我前在楊都備嘗辛苦今逢聖化母子聚集没身不能上報烏得為逆哉汝若禽獸其心背徳忘義者我當自殺扵汝前士雄扵是遂止蒋氏復為書與子茂等諭以禍福子茂不從尋為官軍所敗上聞蒋氏甚異之封為安樂縣君太平御覽卷四百三十九
