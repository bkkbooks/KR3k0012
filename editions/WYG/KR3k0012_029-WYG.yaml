body:
  text: 太平御覽卷二十九宋李昉等撰時序部十四元日元日書曰正月上日受終于文祖上日朔日也終謂堯終帝位之事文祖者堯之祖廟又正月朔旦受命于神宗受舜終之事于神宗神宗堯廟也言神尊之也率百官若帝之初順帝初攝帝位故事奉而行之又月正元日舜格于文祖月正正月元日正旦也舜服堯喪三年畢將即政故復至文祖廟告漢書正月朔歲首立春四時之首又哀帝時正旦日蝕鮑宣上書曰陛下父事天母事地子養黎民即位以來父虧明母震動子訛言今日蝕於三始誠可畏懼小民正月朔日尚恐毁敗噐物况日虧乎正月一日為嵗之朝日之朝日之朝始猶朝也東觀漢記曰戴憑字次仲爲侍中正旦朝賀百僚畢㑹帝令羣臣能説經史更相難詰義有不通輒奪其席以益通者憑遂重坐五十餘席後漢書曰陳翔拜侍御史時正旦朝賀大將軍梁冀威儀不整翔奏冀恃貴不敬請收治罪時人竒之後漢書曰永平四年詔曰比來水旱饑饉加有軍旅正旦無陳朝賀之儀又曰每嵗首為大朝受賀其儀夜漏未盡七刻鐘鳴受賀及贄公侯璧中二千石二千石羔千石六百石鴈四百石已下雉百官賀正月二千石已上上殿稱萬嵗舉觴御座前司空奉羮大司農奉飯奏食舉之樂百官受賜宴饗大作樂魏畧曰建安中劉邵為計吏詣都太史言正旦當日蝕邵時在荀彧所坐者數十人或云當廢朝或云宜却㑹邵曰梓慎禆竈古之良史猶占水火錯失天時然則聖人垂制不為變豫廢朝禮者或灾消異伏或推術謬誤也彧善其言勅朝㑹如故日亦不蝕臧榮緒晉書曰熊逺議曰履端元日正始之初有識之士於是觀禮樂榮耳目之觀崇玩弄之好又曰晉元㑹設白獸樽於殿上樽蓋上施白獸若有能獻直言者則發此樽飲酒案禮曰白獸樽乃杜舉之遺式也為白獸監後代所為示不忌憚也白獸豸也晉載記曰南燕慕容超末年正旦㑹羣臣于便殿方奏樂超嘆曲終不已其年為宋髙祖所擒沈約宋書曰舊時歲朔常設葦茭桃梗磔雞于宫及百司之門以禳惡氣又孝武帝大明五年正月旦雪江夏王義恭以衣承雪作六出花以為瑞帝大悦又元嘉三十年正月旦上朝萬國平旦東南有青黒雲氣非常廣數丈過北覆映宮上北齊書神武既平并州爾朱兆北保秀營神武揚聲討兆既出而止者數四兆意怠神武揣其歲首當宴㑹遣竇泰以精騎襲之一日一夜行三百里神武繼至兆軍人因元日宴饗休息驚走遂破之兆自殺又張華原為兖州刺史獄有繫囚乃謂之曰三元之始念卿幽閉今給假五日足得展謁親族期盡當還也囚果應期而至梁書昭明太子傳曰天監十四年正月朔旦髙祖臨軒冠太子於太極殿舊制太子著逺㳺冠金蟬翠緌纓至是加金博山唐書曰貞元六年正月戊戌朔先是有司奏元日太陽虧遂罷朝㑹至時不食百僚稱賀又天后朝王方慶議告朔儀曰今每歲首元日通天宫受朝讀時令布政事京官九品以上諸州朝集使等咸列于廷此聽朔之禮畢而合於周禮玉藻之文矣又新羅俗以元日拜日月神易通卦驗曰正月五更人整衣冠于家庭中爆竹帖􅀞雞子或縷五色于戸上厭不祥也尚書大傳曰正月上日受終于文祖在璿璣玉衡以齊七政璿璣者何也傳曰璿者還也璣者幾也㣲也其變㣲㣲而所動者大謂之璿璣是故璿璣謂之北極受謂舜也上日元日也又夏以孟春為正殷以季冬為正周以仲冬為正夏以平旦為朔殷以雞鳴為朔周以夜半為朔不以二月為正者萬物不齊莫適所立故必以子丑寅三月為歲之三正三正之相承若連環也又周以至動殷以萌夏以芽謂三王之政也至動冬至日物動也物有三變故政色有三天有三死三生異時生者怕異時死是故周以日至為正殷以日至三十日為正夏以日至六十日為正天有三統王有三正三統者所以序生也三正者所以統天也是故三統三正正若循環周則又始窮則反本也夏以孟春為正者貴形也春秋感精符曰人統月建寅物生之端謂之人統夏以為正漢書云於律太蔟為人統也白虎通曰正朔有三何謂有三㣲之月三㣲者何言陽氣始施黄泉而未上也十一月陽氣始養黄泉之下萬物皆赤赤者盛陽之氣也故周為天正色尚赤十二月之時萬物時芽而白故殷為地正色尚白十三月時萬物始達孚甲而出皆黒人得加功故夏為人正色尚黒也其不以二月後為正者萬物不齊莫適所綂故必以三㣲之月也漢官儀曰正月旦天子御德陽殿臨軒公卿大夫百官各陪位朝賀蠻貊胡羌朝貢必見屬郡封吏皆陛覲又元日朝賀三公拜畢殿上獻夀觴义正月朝賀三公奉璧上殿嚮御座北面太常賛曰皇帝為三公興三公伏皇帝坐乃前進璧古語曰御坐則起此之謂也魏畧曰正始元年南風大起數十日發屋折樹動太極殿東閣正旦大㑹風尤甚傾几案曹爽將誅之徴也典畧曰魏明帝使博士馬均作司南車水轉百戲正月朝造巨獸魚龍曼衍弄馬倒騎備如漢西京故事晉起居注曰太始元年詔曰朕遭閔凶奉承洪業追慕罔極正旦雖當受朝其伎樂一切勿有所設又殿前及文武織成帷帳之屬皆不須施也又太始四年正月上臨軒朝羣臣于太極前殿詔安平王載輿車升殿上迎拜于阼階王坐上親奉觴上夀皆如家人之禮王拜上皆跪而受之又永和元年正月辛未朔雨不㑹甲戌皇太后登太極前殿施紗幃帳與上臨饗羣臣又咸康四年尚書倉部奏下揚州調胡米一升至五斗正旦進御詔停之又十二月庚子詔曰正㑹日百僚増賜緑醽酒人各二升又咸康七年十二月尚書樂謨奏八年正㑹儀注唯作鼓鐘其餘伎樂盡停不作詔曰若元日大饗萬國朝宗庭發鐘鼓之樂奏朕起居之莭朝無磬折之音賔無蹈履之度其於事儀不亦闕乎卿諸人當量輕重以制事中則情典並随國無滯儀矣魏曹植正㑹詩曰初嵗元祈告日惟良乃為嘉㑹讌此髙堂尊卑列叙典而有章衣裳解結黼黻𤣥黄清酤盈爵中坐騰光珍膳雜遝充溢圓方笙磬既設琴瑟俱張悲歌厲嚮咀嚼清商俯視文軒仰瞻華梁願保兹善千載為常歡笑盡娯樂哉未央室家榮貴夀若東王又永和中廷尉王彪之與揚州刺史殷浩書曰太史上元日告朔談者或有疑慮却㑹與否昔建元元年亦元日告朔庾車騎寫劉孔才所論唯不得禮茍今從之是勝人之一失何者禮云諸侯旅見天子入門不得終禮而廢者四太廟火日蝕后之喪雨沾服失容尋此四事之指自謂諸侯雖已入門而卒暴有之則不得終禮非為先有其事而僥倖史官推術錯謬故不豫廢朝禮也夫三辰有灾莫大日蝕史官告譴而無懼容不修豫防之禮而廢消救之術方大饗華夷君臣相慶此豈為敬虔天災罪己之謂且檢之事實告朔之儀至尊靜躬殿堂不聽政事冕服御坐門闥之制與元㑹禮異自不得兼行當權其事宜告朔之禮不輕於元㑹元㑹有可却之禮唯告朔無可廢之義謂應依建元故事却元㑹浩從之竟却㑹又咸和二年正月饗萬國有鷗鳥五集殿明年蘇峻反三齊畧曰滎陽有眢井漢沛公避項羽追逃于井中有雙鳩集其上人云沛公逃入井中羽曰井有人鳩不集其上遂下道沛公遂免難後漢世元日放鳩盖為此也列子曰邯鄲之民以正月之旦獻鳩於簡子簡子大悦厚賞之客問其故簡子曰正旦放生示有恩也客曰民知君欲放之故競而捕之死者衆矣君而欲生之不若禁民弗捕捕而放之恩不遍不相補矣簡子曰善孔叢子曰邯鄲民以正月旦獻雀于趙王而綴以五綵王大悦申叔告子順子順曰王何以為也對曰正旦放之求有生也子順曰此委巷之鄙事非先王之法且又不順夫放雀取其名則宜授之於上不宜取之於下一國之主受民雀將何悦焉淮南子曰以冬至日數至來歲正月朔日滿五十日者民食足不滿五十日者日减一升有餘日日益一升四時纂要曰此占最有據也世説曰元帝正㑹引王丞相登御牀王公固辭中宗引之彌苦文獻曰文獻王導諡太陽與萬物同輝臣下何以瞻仰乃止又陶公作荆州時敇船官使鋸木屑不限多少悉藏之時咸不解此意後正㑹値積雪㑹日始晴㕔事前除雪地甚濕於是悉用木屑覆之都無所妨桂陽列仙傳曰成武丁正旦大㑹以酒沃庭中有司問其故對曰臨武縣失火以酒救之遣驗果然又永寧元年西南夷獻樂及幻人能吐火自支解易馬牛頭時元㑹作之於庭安帝與羣臣觀大竒之惟陳禪獨離席曰帝王之庭不宜作夷狄伎荆楚歲時記曰元日庭前爆竹以辟山魈惡鬼也按神異經山魈在西方深山中長尺餘犯人則病畏爆竹聲又俗爆竹燃草起于庭燎又元日至於月晦並為醵酺飲食出錢為醵出食為酺士女泛舟或臨水宴樂又元日鏤懸葦茭桃棒門戸上却厲疫也乂元日服桃湯桃者五行之精厭伏邪氣制百鬼今人進屠蘇酒膠牙􅄳蓋其遺事也又正月一日三元之日也元始也雞鳴而起案周書緯通卦云雞陽鳥也以為人候四時使人得以翹首結帶正衣常也注云案禮内則云子事父母婦事舅姑雞初鳴咸盥潄櫛纚笄則惟其常非獨此日但元正之朝存亡慶弔官有朝賀私有祭享虔恭宜早特重于餘辰所以標而異焉先於庭前爆竹帖畫雞或斵縷五采及土雞于戸上莊周云有挂雞于戸懸葦茭于其上樹桃其旁而鬼畏之括地圖曰桃都山有大桃樹盤屋三千里上有金雞日照此則鳴下有二神一名曰鬱壘一名曰神荼又崔氏月令云過臘一日是謂小歲拜賀君親進椒酒從小起按成子安椒花銘曰肇惟歲首月正元日厥味惟辛蠲除百疾是知小歲用之周處風土記曰元日造五辛盤正元日五葷鍊形注曰五辛所以發五藏氣吞生雞子人一枚謂之鍊形莊子曰春月飲酒茹葱以通五臟又乃有雞子五葷練形正旦皆當生吞雞子一枚謂之鍊形又養食五辛菜以助發五藏氣又𤣥中記曰今人正朝作兩桃人立門旁以雄雞毛置索中蓋遺象也應劭風俗通曰有桃人葦茭畫虎鬱壘以此鬼食虎今或畫虎於門此并其事猛獸之聲有似爆竹神異經曰西方深山中有人焉其長尺餘性不畏人犯之令人寒熱名曰山魈以竹著火挂熚音必朴也而山魈驚憚𤣥黄經云謂此鬼是也俗人以爆竹起于庭燎不應濫於王者魏時人問議郎董勛云今正臘月門前作烟火桃人絞索松栢殺雞著門戸逐疫禮也勛答曰禮十二月索室逐疫釁門戸磔雞熯火行故作助行氣桃鬼所惡􅀞作人首可以有所牧縛不死之祥勛又曰正月一日為雞二日為狗三日為羊四日為猪五日為牛六日為馬七日為人正旦畵雞於門七日帖人于帳當為此日今一日不殺雞二日不殺狗三日不殺羊四日不殺猪五日不殺牛六日不殺馬七日不行刑亦此義但故乃磔雞以畏鬼今則不殺未知孰是又今人于此日向晨至門前呼牛馬雜畜令來乃置粟豆于灰散之宅内云以招牛馬未知所出也於是長幼悉正衣冠以次拜賀進椒酒飲桃湯及栢故以桃湯栢葉為酒董勛云俗以歲首用椒酒椒性芬香又堪為藥故飲之亦一時之禮故此日採椒花以貢尊者晉海西公嘗問董勛曰俗人正日飲酒先飲小者何也勛云俗人小者得歲先酒賀之老者失歳故後與酒然則從小起意在于斯乎其敷子散出葛洪練化篇方用栢子仁麻仁細辛乾薑附子等分為散井花水服之又方江夏劉次卿受弹鬼九方武都雄黄丹砂二兩五錢各搗淨五兩蠟和令調如弹子丸正方月旦令男左女右帶之又云敷子散出和合於是下五辛菜膠牙糖各進一雞子梁有天下不食葷荆自此不復食雞子以從常則周處風土記曰正旦當生吞雞子一枚謂之練形又共食五辛菜以助發五藏氣則行之矣又膠牙者盖以使其牢固不動今北人亦如之熬麻子大豆兼糖散之按練化篇云正月元旦吞雞子赤豆各七枚辟瘟氣又肘後方云旦及七日吞麻子小豆各二七枚消疾疫張仲景方云歲有惡氣中人不幸便死取大豆二七枚雞子白麻并酒吞之是麻豆之設當起於此今即仿之未知所據也又以錢貫繫牀脚廽以投糞掃上云令如願録異記云有商人區明者過彭澤湖有車馬自稱青洪君要明過厚禮之問何所須有人教之但乞如願及問以此言答之青洪君甚惜如願不得已許之乃其婢也既而送出自爾商人或有所求如願並為即得後至正旦如願起晚乃打如願如願走入糞中商人以杖打糞掃喚如願竟不還也此如願故事今北人正月十五日夜立于糞掃邉令人執杖打糞堆云云以答假如意者亦為如願故事爾鄧徳明南康記曰昔有盧耽仕州為治中少學仙術身能奮飛每歲輒凌虛歸家曉則還州嘗赴元㑹至曉不及預朝列化為白鶴至閣前廽翔欲下威儀以筆擲之得一隻履耽乃驚還就列内外左右莫不駭異時步隲為廣州刺史意甚惡之便狀聞遂至誅滅王子年拾遺記曰堯在位七年有鸞鳳來集麒麟遊於藪澤鴟梟逃於絶漠有祗支之國獻重明之鳥一名重精雙睛在目狀如雞鳴似鳯時解落毛羽以肉翮而飛能搏猛獸虎狼妖惡不能為害食以瓊膏或一歲數來或數歲不至國人莫不洒掃門戸以望重精之集其未至之時國人或刻鑄金寳為此鳥之狀置於戸牖之間則魑魅鬼類自然退伏今人每歲元日刻畵爲雞于戸牖之上者蓋重精之遺像也西京雜記曰漢制宗廟飲酎用九十大牢上祀諸帝以正月旦作酒八月成名曰酎一曰醖鄴中記曰石虎正㑹虎於正殿南面臨軒施流蘇帳皆竊擬禮制整法服冠通天佩玉璽𤣥衣纁裳畫日月山龍黼黻華蟲粉米尋改車服著逺遊冠前安金博山蟬翼丹紗裏服大昕行禮公執珪卿執羔大夫執鴈士執雉一如舊禮充庭車馬金銀玉輅革輅數十董勛答問曰歲首酌椒酒而飲之以椒性芬香又堪為藥又折松枝男七女二七亦同此義又雜修養書曰正月一日取五木香作湯以浴令人至老鬚髪黒案道家謂青木香為五木香亦云五木道家多以此浴是其義也雜五行書曰常以正月旦及正月半以麻子赤豆二七顆置井水中辟瘟病甚效萬歲厯曰漢成帝詔除正旦殺雞與雀可謂仁于用心謂非正旦則禁殺崔寔四民月令曰元日進椒栢酒椒是玉衡星精服之令人身輕能音奈老栢是仙藥又云進酒次第當從小起以年少者為先又正月之朔是謂正日躬率妻孥潔祀祖禰及祀日進酒降神畢乃室家尊卑無大無小以次列于先祖之前子婦曾孫各上椒酒於家長舉觴稱夀欣欣如也玉燭寳典曰正月為端春秋傳履端于始其一日為元日元者善之長也先王體元居正又元者原也始也一也首也亦云上日亦云三朝亦云三元歲之元月之元日之元亦云三朔尚書傳曰夏以平明為朔殷以雞鳴為朔周以夜半為朔又元日造桃板著門戸謂之仙木像鬱壘山桃樹百鬼畏之王羲之月儀書曰日往月來元正首祚太蔟告辰㣲陽始布罄無不宜和神養素李膺家録曰膺坐黨事與杜宻荀翊同繫新汲縣獄時歳旦翊引杯曰正朝從小起膺謂翊云死者人情所惡今子無恡色者何翊曰求仁得仁又誰恨也膺乃歎曰漢其亡矣漢其亡矣善人天地之紀而多害之何以存國裴𤣥新書曰正旦縣官殺羊懸其頭於門又磔雞以覆之俗説厭厲氣今以問河南伏君伏君曰是日也土氣上升草木萌動羊囓百草雞啄五蠧故殺之以助生氣古史考曰元日太史乃占氣候以知水旱吉凶隨分野書之王渾集曰詔問明年正旦㑹四方計吏入見臨朝當何所宜渾奏舊正㑹計吏前軒下侍中讀詔書計吏跪奏臣以詔當次對承陛下留心訪問之意可令中書恒詔問方土所宜士人賢才隱伏未逹風俗好尚禮教之宜勸農務本以盡墾殖之利刑獄清理無枉濫之失郡守長吏勤心治政為民興利除害訓化之績授以紙筆盡意陳聞以明聖㫖垂心四逺劉臻妻正旦獻椒花頌曰昊穹周廽三朝肇建青陽散暉澄景載渙美此靈花爰采爰獻聖容暎之永夀於萬後漢張衡東京賦曰於是孟春元日羣后旁戾百僚師師于斯胥洎孟春元日正日也旁四方也戾至也蕃國奉聘要荒來質音致時惟帝臣獻琛執贄當觀於殿下者蓋數萬有二爾乃九賔重謂公至侯卿二千石以上六百石以下及郎吏匈奴侍子凢九等臚人列鴻臚所主羌胡之人皆臚列也崇牙張鏞鼓設郎將司階虎㦸交鎩虎賁中郎將皆夾階而立虎賁或執㦸鎩相對立也晉傅𤣥元旦朝㑹賦曰前三朝之夜中庭燎晃以舒光華燈若乎火樹熾百枝之煌煌俯而察之如亢燭龍而照元方仰而觀焉若披丹霞而鑒九陽晉庾闡揚都賦曰歲惟元辰隂陽代紀履端歸除三朝告始皇帝廼坐露寢御組帷冠去聲華冕戴翠蕤襲日月佩玉緌懷六璽紉文龜太平御覽卷二十九
