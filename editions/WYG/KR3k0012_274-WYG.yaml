  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_274-1a, image: WYG0895/WYG0895-0436c.png}
body:
  text: 太平御覽卷二百七十四宋李昉等撰兵部五命將易將老將命將禮記曰諸侯賜弓矢然後專征賜斧鉞然後專殺史記留侯世家曰黥布反上欲使太子將兵擊之四人相謂曰凡來者將以存太子太子將兵事危矣迺說建成侯曰君何不急請吕后承間爲上泣言黥布天下猛將也善用兵今諸侯將皆陛下故等夷迺令太子將此屬無異使羊將狼又馮唐曰上古王者遣將也跪而推轂曰閫以内寡人制之閫以外將軍制之又淮隂侯傳王曰吾為公以為將何曰雖為將信必不留漢王曰以爲大將何曰幸甚漢書曰蕭何追韓信還漢王曰以爲大將何曰王素慢無禮今拜大將軍如召小兒此乃信所以去也王必欲拜之宜擇日齋戒設壇塲具禮乃可王許之諸將皆喜人人自以爲得大將及拜乃韓信也一軍皆驚後漢書陳龜傳曰臣聞三辰不軌擢士爲相蠻夷不恭㧞卒爲將摯虞新禮曰漢魏故事遣將出征符莭鈇鉞授於朝堂新禮遣將御臨軒尚書授莭鉞古兵書跪而推轂之義也崔豹古今注輿服注曰得賜黄鉞則斬持莭將淮南子曰凡國有難君自宫召將詔之曰社稷之命在將軍耳今國有難請子將而應之將軍受命乃命祝史太卜齋宿三日之太廟鑚靈龜卜吉日以受皷旗君入廟門西靣而立將入廟門北靣而立主親操鉞持頭授將軍柄曰從此上至天者將軍制之復操斧持頭授將軍柄曰從此下至淵者将軍制之將已受鈇鉞荅曰國不可從外治也軍不可從中御也二心不可以事君疑志不可以應敵臣既已受制於前矣皷旗斧鉞之威臣無還願君無亦垂一言之命於臣也君若不許臣不敢將君若許之辭而行乃爪翦爪送終之禮去其手足爪也設明衣明衣喪衣也在於闇冥故言明鑿凶門而出凶門北出門也將軍之出以喪禮示之以必死也乘將軍車載旌旗斧鉞其臨敵决戰不顧必死無有二心是故無天於上無地於下無敵於前無主於後進不求名退不避罪唯民是保利合於主上將之道也如此則智者爲之慮勇者爲之鬭氣厲青雲疾如馳騖是兵未交接而敵人恐懼若戰勝敵奔賞吏遷官顧反於國効旗以入乃縞素辟舍請罪於君君曰赦之大勝敵者三年反舍大勝敵者還三年反故舎中勝二年不勝期年兵之所加者必無道之國也故能戰勝而不保取地而不反民不疾疫將不夭死五榖豐風雨時莭戰勝於外福生於内是故名不成而後無餘害矣任彦昇奏彈曹景宗曰昔漢光武命將坐知千里魏武置法按以從事陳孔璋檄呉將校部曲文曰朝爲仇虜夕爲上將馮衍與田邑書曰今以一莭之任建三軍之威豈特寵其八尺之竹氂牛之尾也易將史記曰秦王伐趙王使亷頗禦之頗固壁不戰趙王惑秦之間以趙奢之子代頗趙師大敗後漢書曰光武遣馮異代鄧禹車駕送之河南賜以乘輿七尺具劍具謂以寳玉装飾之東觀記作玉具劍晉書曰石苞爲淮北監軍王琛所奏與呉人交通先時望氣者云東南有大兵起及琛表至帝甚疑之㑹荆州刺史胡烈表呉人欲大出爲宼苞亦聞呉師將入至乃築壘遏之以自固帝聞之謂羊祜曰呉人每來常東西相應豈石苞果有不順乎祜深明之而帝猶疑焉苞子喬爲尚書郎上召之經日不至帝謂爲必叛欲討而隱其事遂下詔以苞不料賊勢築壘遏水勞擾百姓䇿免其官遣太尉義陽王望率其大軍徴之以備非常又勅鎭東將軍琅邪王伷自下邳㑹壽春苞用掾孫鑠計放兵歩出住都亭待罪帝聞之意解及苞詣闕以公還第自耻受任無効而無怨色又曰鎭南將軍杜元凱都督荆州諸軍事襲呉西陵督張政西陵今夷陵郡大破之政呉之名將據要害之地耻無備取敗不以實聞於孫皓元凱欲間呉邊將乃請還其所獲之衆於皓皓果召政遣武昌監劉憲代之故晉軍將至使將帥移易成傾蕩之勢竟殄㓕焉北史曰後周末隋文帝作相尉遲逈據相州舉兵隋文遣鄖公韋孝寛鄖音云爲東道元帥師次沁水水漲兵未得渡吏李詢上宻啟云大將梁士房宇文欣崔宏度等並受尉遲逈餉金軍中騷騷人情大異文帝以爲憂欲代此三人李德林獨進計云公與諸將共是國家貴臣未相伏馭今以挾令之威得使之耳安知後所遣者能盡腹心前遣之人獨致乖異又取金事虛實難明即令换易彼將懼罪恐逃逸便須禁固然則鄖公以下必有驚疑之意且臨敵代將自古所難樂毅所以思燕趙奢之子以之敗趙如愚所見但遣公一腹心明於智畧爲諸將舊來所信伏者速至軍所觀其情僞縱有異意必不敢動文帝大悟即令高熲馳驛徃爲諸將莭度竟成大功戰國䇿曰昌國君樂毅爲燕王合五國之兵而攻齊下七十餘城盡郡縣之以屬燕唯莒即墨二城未下而昭王死惠王即位用齊人反間疑樂毅而使騎刼代之樂毅奔趙老將史記曰秦始皇問李信曰吾欲攻荆用幾何人而足信曰不過二十萬人始皇問王翦翦曰非六十萬人不可始皇曰王將軍老矣何怯也李將軍果㫁壮勇其言是也王翦謝罪歸老於潁陽李信攻鄢郢破之於是引兵而西與蒙恬㑹城父荆人因隨之三日三夜不得頓舍大破李信軍始皇聞之大怒自馳如潁陽謝翦曰不用將軍計李信果辱秦將軍獨忍棄寡人乎翦謝曰老臣罷病悖亂唯大王更擇賢將始皇謝曰已矣將軍勿復言王翦曰大王必不得已用臣非六十萬人不可始皇曰聴將軍計耳於是王翦將六十萬人始皇自送㶚上王翦行請美田宅園池甚衆始皇曰將軍行矣何憂貧乎翦曰爲大王將有功不得封侯故及大王之向臣臣亦及時以請園池爲子孫業耳始皇大笑或曰將軍乞貸亦已甚矣翦曰今空秦國甲士專委我我不多請田宅爲子孫業以自堅固令秦王坐而疑我耶翦更代信擊荆大破荆軍虜荆王負芻竟平荆地爲郡縣漢書曰西羗反時趙充國年七十餘上老之使御史大夫丙吉問誰可將者充國對曰無踰老臣耳上遣焉問曰將軍度羗虜何如當用幾人充國曰百聞不如一見兵難隃度隃遥也三輔言臣願馳至金城圖上方畧然羗戎小夷逆天背叛滅亡不久願陛下以屬臣勿以爲憂上笑曰諾充國日饗軍士皆欲爲用虜數挑戰充國堅守捕得生口言羗豪相責曰語汝無反今天子遣趙將軍來年八九十矣善爲兵今欲一闘而死可得耶又曰元狩四年大將軍大擊匈奴李廣數自請行上以老不許良久乃許之大將軍隂受上㫖以廣數竒不偶也無令當單于恐不得所欲徙廣廣或失道大將軍使長史持醇醪遺廣因問失道狀長史急責廣之幕府對簿廣曰諸校尉無罪乃我自失道謂其麾下曰廣結髮與匈奴大小七十餘戰今幸從大將軍出接單于兵而大將軍徙廣部行迴遠又迷失道豈非天哉終不能復對刀筆吏遂引刀自剄而百姓聞之知與不知皆爲垂泣東觀漢記曰馬援字文淵建武二十四年威武將軍劉尚擊武陵五溪蠻夷深入軍没援因復請行時年六十二帝愍其老未許之援自請曰臣尚能披甲上馬帝令試之援據鞍顧盻以示可用帝笑曰矍鑠哉是翁也遂用援宋書曰沈慶之討竟陵王誕慶之至城下誕登樓謂曰沈公君白首之年何爲來慶之曰朝廷以君狂愚不足勞少壮故使僕來耳梁書曰王神念少善騎射及老不衰嘗於武帝前手執二刀楯左右交度馳馬徃來冠絶羣伍後魏書曰中山王英之征義陽傅永爲寜朔將軍綂軍當長圍遏其南門蕭衍將馬仙琕連營稍進規解城圍永謂英曰凶豎馳突意在决戰雅山形要宜早據之英沈吟未决永曰機者如神難遇易失今日不去明日必爲賊有雖悔無及分英兵夜築城於山下遣綂軍張懐等列陣於山下以防之至晚仙琕果至懐等戰敗築城者悉皆奔退仙琕乘勝直趨長圍義陽城人復出挑戰永乃分兵付長史賈思祖令守營壘自將馬歩千人南逆仙琕擐甲揮戈單騎先入惟有軍主蔡三虎副之餘人無有及者突陣横過賊射永通其左股永㧞箭復入大破之斬仙琕子仙琕燒營席捲而遁英於陣謂永曰公傷矣且還營永曰昔漢祖捫足不欲人知下官雖㣲國家一帥奈何使虜有傷將之名遂與諸軍追之極夜而反時年七十有餘矣三軍莫不壯之又曰畢衆敬爵爲東平公善自奉養食膳豐華必致他方遠味年已七十鬢髮皓白而氣力未衰據鞍馳騁有若少壯篤於姻類深有國士之風太和中高祖賔禮舊老衆敬咸陽公高允引至方山雖文武奢儉好尚不同然與允甚相愛敬接膝談欵有若平生後以篤老乞還桑梓朝廷許之衆敬臨還獻珍珠璫四具銀装劔一口刺虎矛一枚後周書曰梁䑓不過識千餘字口占書啟詞意可觀年過六十猶能被甲跨馬足不躡鐙馳射弋獵矢不虛發隋書曰開皇初突厥宼邊燕薊多被其患總管六州五十鎮諸軍事周揺修障塞謹斥候邊民以安後六載徙爲壽州初自以年老乞骸骨上召之既至上勞之曰公積行累仁厯仕三代克終富貴保兹遐壽良足善也賜坐褥歸於第歳餘終於家又曰賀若誼爲涇州刺史時突厥屢爲邊患朝廷以誼素有威名拜靈州刺史進位柱國誼時年老而筋力不衰猶能重鎧上馬爲北夷所憚數載上表乞骸骨優詔許之誼家富於財郊外搆一别廬多植果木毎邀賔客列女樂遊集其間卒於家太平御覽卷二百七十四
