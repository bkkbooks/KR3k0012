body:
  text: 太平御覽卷二百四十九宋李昉等撰職官部四十七從事中郎府掾府屬諮議參軍公府舍人記室參軍府參軍從事中郎諸府附魏志曰韓嵩字德髙義陽人少好學貧不改操知世將亂不應三公之命與同好數人隠居於酈西山下黄巾起嵩避難南方劉表逼以為從事中郎呉志曰嚴畯字㬅才彭城人也少躭學善詩書三禮避亂江東與諸葛瑾歩隲齊名友善性質純厚其於人物忠告善導志存補益張昭進之於孫權權以為騎都尉從事中郎晉書曰祖納字士言最有操行能清言文義可觀性至孝少孤貧常自炊㸑以將母平北將軍王敦聞之遺其二婢辟為從事中郎有戲之曰奴價倍婢納曰百里奚何必輕於五羖皮耶又曰稽紹字延祖方直儒雅為衛軍從事中郎虞預晉書曰劉隗字大連彭城人學渉有具為秘書郎避亂南渡遂為中宗從事中郎甚見器遇何法盛晉中興書曰謝萬少而才器俊秀太宗聞其名取為鎭軍從事中郎抱朴子曰友人稽君道為廣州刺史其弟應靜為太傅從事中郎别於襄陽君道泣而應靜不泣抱朴子以為各得其宜府掾諸府附史記曰倪寛為廷尉史為人温良有亷智張湯以為長者數稱譽之及湯為御史大夫而寛為掾漢書曰陳遵為公府掾公府掾史率皆嬴車小馬不尚鮮明而遵獨極輿馬衣服之好門外車騎交錯東觀漢記曰呉良以清白方正稱東平王蒼辟為西曹掾數諌王蒼多善䇿蒼上表薦良續漢書曰府掾比古之元士皆三命也漢舊注曰漢初掾史辟皆上言故有秩皆比命士其所不言則為百石屬其後皆自辟故通為百石云魏志曰董㝷字文奥為人忠直為軍謀掾青龍中上大興宫室羣臣皆負土尋上書諫曰今臣自知言必死而臣自譬於牛之一毛生既無益其死何損且臣不欲生矣是以發筆流涕心與世辭臣有八子臣死之後以累陛下魏志曰令狐劭字孔叔在安邑毛城中會太祖攻破鄴圍毛城城破邵等軰十餘人皆當斬太祖閱見之疑其衣冠也問其祖考而識其父乃解放署軍謀掾蜀志云馬良字季常為左將軍掾後使呉良謂亮曰今銜國命恊穆二家幸為良介於孫將軍亮曰君試自為文良即草曰寡君遣掾良通好以紹昆吾豕韋之勲其人吉士荆楚之令鮮於造次之華而有克終之美願降心存納以慰將命權敬待之呉志曰張温父允以輕財重士名顯州郡為孫權東曹掾晉中興書曰荀闓字道明有清稱京師為之語曰洛中英英荀道明大司馬齊王冏辟以為掾又曰王珣弱冠與陳郡謝𤣥俱辟大司馬桓温語人曰謝掾年三十必擁旄仗節王掾當作黒頭公皆未易才也典畧曰趙戬除萬年令遂遭三輔亂客荆州劉表以為賔客是時白衣平原禰衡髙論冠世來遊京師詆訿朝士及南見戬歎之曰所謂鐵則干將莫邪木則猗桐梓漆人則顔冉仲弓後辟魏王相國掾殷氏家𫝊曰殷泰字子平為文皇帝車騎掾委以書記上歎曰非惟秋兎之毫乃是鷹鸇之爪郭子曰王仲祖謝仁祖同為王公掾在坐長史云謝掾能作異舞王命為之謝便起舞神意甚暇王公熟視顧謂諸客曰使人思安豐安豐王戎封也語林曰王藍田少有癡稱王丞相以門地辟之既見無所他問問來時米價藍田不答直張目視王公王公云王掾不癡何以云癡府屬諸府附漢書曰谷永字子雲為長安吏後博學經書有茂材除補御史大夫屬華嶠後漢書曰陳寵以時俗三府掾屬不肯親事但出入養虛故寵獨勤心於事又以法令繁不良吏得生因縁以致輕重及制撰科牒詞訟比例事類相從以塞奸源其後公府奉以為法魏志曰蔣濟字子通辟丞相主簿西曹屬令曰舜舉臯陶不仁者逺臧否得中望於賢屬又曰胡質字文徳少與蔣子通俱知名於江淮間任州郡濟為别駕使見太祖太祖問曰胡通逹長者寧有孫子不濟曰有子曰質規模大畧不及父至於精良綜事過之太祖辟為丞相屬臧榮緒晉書云劉沈字道真世為北州名族􅀶學好古辟衛瓘屬范亨燕書曰鮮於休有才器使幹辟為左光禄大夫曹屬諮議參軍齊書曰張岱厯為三府諮議典籖主率共事事舉而情得或謂岱曰主王既以報事多門而每能緝和公私云何致此岱曰古人言一心可以事百君我為政端平待物以禮悔􅈔之事無由而及明闇短長更是才用之多少耳南史曰桞叔夜年十六為新野太守甚有名績補遥光諮議參軍及事敗左右扶上馬欲與俱亡答曰吾已許始安以死豈可負之耶遂自殺公府舍人史記曰李斯上蔡人也為丞相吕不韋舍人漢書曰爰盎字子絲楚人也為將軍吕禄舍人又曰田叔字子仁以壯勇為衛將軍舎人衛青也後使刺三河奏事稱意為京輔都尉干寶晉紀云閻讚為人鯁直不畏强禦初仕為太傅楊畯舍人記室參軍魏志曰太祖以陳琳阮瑀管記室軍國書檄多琳所作鍾會以中郎在大將軍管記室事為心腹之任時人謂之子房呉志曰孫惠以書干東海王越詭其姓名自稱南岳逸民秦秘之勉之以勤王匡世之畧辭意甚美越省書榜題道衢招求其人惠乃出見越即以為記室參軍専掌文疏豫參謀議每造書檄越或驛馬催之應命立成皆有辭㫖何法盛晉中興書曰王丞少而冲淡弱冠知名太尉王衍雅重之以比南陽樂廣司空東海王越以為記室參軍雅相敬重勑子毗曰夫學之所益者淺體之所安者深嫻習禮度不如式瞻儀形諷味遺言不如親承音㫖王參軍人倫之表汝其師之又曰殷浩字淵源弱冠與京兆杜乂並有美譽善言𤣥理論難精微故風流清談皆歸之征西將軍庾亮引為記室參軍又曰孔寅字舒元中宗命為安東參軍專管記室時書命殷積寅每稱職沈約宋書曰孔顗署衡陽王義季記室奉牋固辭曰記室之局實為華要自非文行秀敏莫敢居之顗學不綜實性又踈惰何可以屬知秘記秉筆文闈假吹之由方斯非濫三國典畧曰顔晃字克明瑯琊臨沂人也少孤貧有詞彩解褐梁邵陵王綸兼記室參軍時東宫學士庾信常使於府使晃接對信輕其尚少曰此府兼記室幾人晃答曰猶少於宫中學士杜龕為呉興太守專好勇力梁元患之及使晃管其書翰仍謂龕曰顔晃文學之士使相毗佐造次之間必宜諮禀後周書曰桞慶領記室時北雍州獻白鹿羣臣欲草表賀尚書蘇綽謂慶曰近代以來文章華靡逮於江右彌復輕薄洛陽後進祖述不已相公柄民軌物君職典文房宜製此表以革前弊慶操筆立成辭兼文質綽讀而笑曰枳橘猶自可移况才子也隋書曰魏澹專精好學博渉經史善屬文詞采贍逸齊博陵王濟聞其名引為記室唐書曰李巨川字下已隴右人國初十八學士道𤣥之後故相逢吉之姪曽孫父循大中八年登進士第巨川乾符應進士屬天下大亂流離奔播切於禄仕乃以刀筆從諸侯府王重榮鎮河中辟為掌書記時車駕在蜀賊據京師重榮匡合諸藩叶力殄㓂軍書奏請堆案盈几巨川文思敏速斡動如飛傳之藩鄰無不聳動重榮収復之功巨川之助也典畧曰阮瑀字元瑜陳留人以才自䕶曹洪聞其有才欲使報荅書記瑀不肯榜笞瑀瑀終不屈洪以語曹公公知其無病使人呼瑀瑀乃惶怖詣門公見之謂曰卿不肯為洪且為我作之瑀曰諾遂為記室世說曰太原孫楚字子荆為大司馬石苞記室參軍又曰郗超王珣並以雋才為桓大司馬所眷珣為主簿超為記室參軍桓時為荆州超為人多鬚珣形狀短小於時西人為之歌曰髯參軍短主簿能令公喜能令公怒府參軍諸府附魏志曰張範參丞相軍事甚見敬重太祖征伐常謂文帝曰舉動必諮此人世子執弟子禮又曰董昭等謂太祖宜進爵國公備九錫以彰殊勲宻以諮荀彧彧以為太祖本興義兵以匡朝寧國秉忠貞之誠守退讓之實君子愛人以徳不宜如此太祖由是心不平會征孫權表請彧勞軍於譙因留彧以侍中光禄大夫持節參丞相事太祖軍至濡湏彧疾留壽春以憂薨時年五十又曰曹休字文烈蜀主遣將呉蘭屯下辯太祖遣曹洪征之以休參洪軍事太祖謂休曰汝雖參軍其實師也洪聞此令恒委事於休又曰于禁屯潁隂樂進屯陽翟張遼屯長社諸將任氣多共不恊使趙儼并參三軍每事誨諭遂相親睦又曰太祖征馬超文帝留守使程昱參軍田銀蘇伯等反河間遣將賈信討之賊有千餘人請降議者皆以為如舊法昱曰誅降不義臣以為不可誅也縱誅之宜先啟聞衆議曰軍事有專無請昱不答文帝趨入特引見昱昱曰凡專命者有臨時之急呼吸之間者耳今此賊制在賈信之手無朝夕之變故老臣不願將軍行之文帝答曰君慮之善即白太祖太祖果不誅太祖還聞之甚悦謂昱曰君非徒明於軍計也又善處人父子之間晉書曰魏舒字晹元為相國參軍府朝碎事未嘗少見是非至於興大事衆人莫能斷者舒徐為籌之多出衆議之表晉王曰魏舒堂堂人之領䄂也又曰孫楚字子荆為佐著作郎參石苞驃騎軍事楚既負其才器頗侮易苞初至揖曰天子命我參卿軍事初參軍不敬府主楚既輕苞遂制施敬自楚始也又曰李涓字宣伯容貌簡素頺然若不足者而智度沉􅃉言必有中髙祖為大將軍涓再參軍上信重之臧榮緒晉書曰庾敳字子嵩參太傅軍事從子亮少時見敳在太傅府僚佐多名士皆一世秀異敳處其中常自神王晉中興書曰郄超字景興少而卓犖不覊有曠世之度俶儻髙儁籠盖當時時人為之語曰揚州獨歩王文度盛徳絶倫郄景興交遊士林每在勝㧞又精於義理大司馬桓温取為參軍英氣盖世罕有所推與超相見常謂不能測也又曰薛兼為軍祭酒言於中宗曰臣邑人張闓才幹堪任當今之良器願垂引納以綜朝事中宗即召闓為安東參軍又曰中宗之為安東取周訪為參軍在散軰中未之識也府進鎭東訪隨例為參軍時府參軍譙國周訪有罪當死誤収訪訪自列無罪而吏不察訪窮蹙乃身自執仗奮擊収捕數十人皆被創披散訪得逸走歸府聞中宗大驚怒不問格鬭之罪又曰蘇峻反范汪逃遁西歸時庾亮温嶠治兵潯陽咸以衆少賊强未敢即路且信使阻絶不相知聞及汪經過嶠等訪焉汪曰賊政令不一貪暴縱横滅亡已兆雖强易弱朝廷倒懸宜時進討嶠等納之是日䕶軍平南二府交命始解褐參議軍事又曰阮孚字遥集咸子也避亂渡江中宗以為安東參軍蓬髪飲酒不以王務嬰心又曰鎮府將軍劉𢎞以陶侃為長史謂侃曰我昔為羊太傅參軍羊公見語云君後當居身處我今相察亦復然也沈約宋書曰宗越同桞元景北伐領馬幢主𨽻桞元恪有戰功在景後還補後軍參軍督䕶隨王誕戲之曰汝何人遂得我府四字越答曰征伐未死不憂不得諮議參軍誕大笑宋書曰王瞻字眀逺一字叔鸞負氣傲俗好貶裁人物仕宋為王府參軍嘗詣劉彦節直登榻曰君侯是公孫僕是公子引滿促膝惟余二人彦節外跡雖酬之意甚不恱梁史曰沈警字世明惇篤有行業學通左氏春秋家累千金後將軍謝安命為參軍甚相敬重警内足於財為東南豪士無進仕意謝病歸安固留不止乃謂沈參軍卿有獨善之志不亦髙乎警曰使君以道御物前所以懐德而志既無用于時故遂飲啄之願耳還家積載以墳索自娛後秦記云姚襄遣參軍薛瓚使桓温温以胡戱瓚瓚曰在北曰狐居南曰狢何所問也後周書曰梁昕以三輔望族上謁太祖見昕容貌瓌偉深賞異之即授右府長流參軍文章志云顧凱之字長康􅀶學有文章性遲鈍為桓温參軍甚被親昵温甞語人云凱之體中有癡黠各半合而論之只平平耳干寶司徒儀曰行參軍之職掌凡使命及督察覆行之事彈劾逋違獻納聞見以逹視聽世語曰王子猷作桓車騎參軍桓謂王曰卿在府乆此當相助王初不答直髙視以手版柱頰云西山朝來致有爽氣又曰郝隆為桓公南蠻參軍三月三日作詩不能者罰酒三升隆初以不能受罰既飲攬筆便作其一句云娵子瑜反隅躍清池桓問娵隅何語答云蠻名魚為娵隅桓公曰作詩何以為蠻語隆答曰千里投君始得為蠻府參軍那得不作蠻語魏武選令曰今詔書省司𨽻官鍾校尉材智決洞通敏先覺可上請參軍事以輔闇政世説曰陶夔為王孝伯參軍三日曲水集陶在前行坐有一參軍督䕶在後坐陶於坐作詩隨得三五句後坐參軍督䕶隨寫取詩成陶猶更思補綴後坐寫其詩者先呈陶詩經日方呈王大怪笑陶叅軍乃復冩人詩陶愧愕不知所以王後知陶非濫遂彈去寫詩者諸葛亮與參軍掾屬教曰任重才輕故多闕漏前參軍董幼宰每言輙盡數有諫云雖性鄙薄不能悉納幼宰參署七年事有不至至於十反未有忠於國如是者故亮得以少其過也孫綽為功曹參軍駮事牋曰綱紀居管轄之任以糾司外内駮議彈射誠無所拘然亦所以獻可替否舉直䋲違而已太平御覽卷二百四十九
