body:
  text: 太平御覽卷四百六十宋李昉等撰人事部一百一游說上釋名曰説者述也宣述人意也左傳曰晉人將尋盟齊人不可叔向告於齊曰明王之制使諸侯嵗聘以志業間朝以講禮再朝而㑹以示威再㑹而盟以顯昭明自古以來未之或失齊人懼又曰晉卻缺言于趙宣子曰日衛不睦故取其地今已睦矣可以歸之叛而不討何以示威服而不柔何以示懐非威非懐何以示徳趙宣子悦歸衛匡戚之田又曰吳人執衛侯子服景伯謂子貢曰子盍見太宰乃請束錦以行語及衛故子貢曰衛君之來也必謀於其衆或欲或否是以緩来其欲来者子之黨也其不欲來者子之讎也若執衛君是墮黨而崇讎也或者難以霸乎太宰嚭説乃舎衛侯又曰晉楚㑹于虢季武子伐莒取鄆莒人告于㑹楚告于晉曰請戮其使趙孟請諸楚曰魯雖有罪其執事不避難疆埸之邑一彼一此何常之有去煩宥善莫不競勸固請諸楚楚人許之乃免叔孫又曰楚伍舉奔鄭將遂奔晉聲子將如晉遇之於鄭郊聲子曰吾必復子還如楚令尹子木與之語聲子曰椒舉今在晉矣晉人將與之縣以比叔向彼若謀害楚國豈不為患子木懼言諸王益其禄爵而復之聲子使椒鳴逆之又曰晉侯秦伯圍鄭佚之狐言于鄭伯曰國危矣若使燭之武見秦君師必退燭之武夜縋而出見秦伯曰秦晉圍鄭鄭既知亡亡鄭而有益於君敢以煩執事越國以鄙逺君知其難也焉用亡鄭以陪隣夫晉何厭之有既東封鄭又欲肆其西封不闕音蹶下同秦焉取之闕秦以利晉唯君圖之秦伯悦又曰吳伐楚入郢申包胥如秦乞師曰吳為封豕長蛇荐食上國虐始於楚寡君失守社稷越在草莽使下臣告急曰夷徳無厭若隣於君疆埸之患也逮吳之未定君其取分焉若以君靈撫之世以事秦立依於庭牆而哭日夜不絶聲勺飲不入口七日秦師乃出又曰楚子饗魯昭公于新臺好以大屈既而悔之薳啓疆聞之見公公語之拜賀公曰何對曰秦與晉越欲此久矣寡君無適與也敢不賀乎公懼乃反之戰國策曰蘇秦死其弟蘇代欲繼之乃北見燕王噲曰臣東周之鄙人也至燕庭觀王之羣臣下吏大王天下明主也王曰何如曰臣聞之明主也務聞過不欲聞其善臣請謁王之過又曰濮陽人吕不韋賈於邯鄲見秦質子楚説之乃説秦王后弟陽泉君曰王后無子子楚賢才也棄在趙王后誠請而立之是有子也陽泉君入説王后王后為請而歸之為太子也又曰張儀為秦連横説韓王曰夫違禍而求福計莫如事秦今王西面事秦以攻楚秦王必喜又曰蘇秦説李兑抵掌而談兑送秦以明月之珠和氏之璧戰國策曰齊宣王因燕喪攻取十城蘇秦為燕説齊王再拜而賀因仰而弔齊王案戈曰何慶弔相隨之速也對曰人之饑所以不食烏喙者以為雖愈饑充腹而與死同患齊乃歸燕城又曰應侯使人召蔡澤蔡澤入曰夫四時之序成功者去君何不歸相印讓賢者授之必有伯夷之廉長為應侯而有喬松之夀孰與禍終此哉應侯曰善乃延入坐為上客又曰楚免淖齒於柱國游騰謂楚王曰秦有上羣午者重兵之戰請秦王曰必無與楚戰王曰何也對曰南方火也西方金也金之不勝火亦必矣秦王不聴其戰不勝今午又請秦王必與楚戰南方火西方金也楚正夏中年而免其柱國此所謂内自滅也楚懼復置淖齒又曰齊欲伐魏魏使人謂淳于髠曰齊欲伐魏能解患唯先生也淳于髠曰諾遂入説齊王曰楚齊之仇敵也魏齊之與國也夫伐與國使仇敵制其餘弊名醜而實危為王不取也齊王曰善乃不伐魏也又曰趙魏攻華陽韓謁急於秦冠蓋相望秦不救韓相國謂田苓曰事急願公雖病為一宿之行田苓見穰侯穰侯曰急乎田苓對曰未急也使韓急則將變矣穰侯請發兵救韓大敗趙魏於華陽之下又曰昭陽為楚伐魏覆軍殺將得八城移師而攻齊陳軫為齊王使見昭陽再拜賀戰勝起而請問楚之法覆軍殺將其官爵何也昭陽曰官為上柱國爵為上執珪陳軫曰異貴於此者何也曰唯令尹耳陳軫曰令尹貴矣主非置兩令尹也臣竊為公譬之可乎楚有祠者賜其舎人酒一巵舎人相謂曰數人飲之不足一人飲之有餘請畫蛇先成者飲酒一人蛇先成乃左手持巵右手畫蛇曰吾能為足為足未成一人蛇成奪其巵曰蛇故無足子安能為足遂飲其酒畫蛇足者終亡其酒公攻魏殺將得八城又移師攻齊齊畏公甚公以是名亦足矣冠之上非可重也戰無不勝而不知止者身且死爵且偃猶為蛇足也昭陽以為然解軍而歸又曰范雎謂秦王曰大王之國北有甘泉谷口南帶涇渭右隴蜀左闗坂戰車千乗奮擊百萬以秦卒之勇車騎之多以當諸侯譬若施韓盧而逐駑兎也霸王之業可致今反閉闗不敢窺兵於山東者是穰侯為秦謀不忠大王之計過也又曰秦王謂趙使者諒毅曰趙豹平原君數欺弄寡人趙能殺此二人則可若不能殺請率諸侯受命邯鄲城下諒毅曰趙豹平原君寡君之親母弟也猶大王之有華陽涇陽君也大王以孝治聞於天下衣服之便於體膳㗖之嗛於口未嘗不分於華陽涇陽君華陽涇陽君之車馬衣服無非大王之服御者今使臣受大王之令以還報敝邑之君畏懼不敢不行無乃傷華陽君涇陽君之心乎又曰趙且伐燕蘇代為燕謂趙惠王曰今者臣來過川水蚌方出曝而鷸啄其肉蚌掩鷸喙鷸曰今日不雨明日不雨即有死蚌蚌亦謂鷸曰今日不出明日不出必見死鷸兩者不相捨漁者得而併擒之今趙且伐燕燕趙久相持臣恐强秦之為漁父也故願王熟計之惠王曰善乃止又曰衛客事魏王三年不得見乃見梧丘先生許之以百金先生曰諾乃見魏王曰吾聞秦王出兵未知所之願王専事秦無他計王曰諾客趨出至郭門而返曰臣恐王事秦之晩也夫人於事己者過急於事人者過緩今王於事己緩安能急於事人衛客事王三年不得見臣以是知王緩也魏王趨見衛客蘇秦為楚合従説韓王曰以韓卒之勇被堅甲帶利劔一人當百不足言也夫以韓之勁與王之賢乃欲事秦為天下笑無過此者大王事秦秦必求宜陽成臯今兹効之明年又求之予之則無地以給不予則棄前功而受後禍大王之地有盡而秦之求無厭以有盡之地而應無已之求鄙語曰寜為雞口不為牛後今西面交臂而事秦何異牛後乎又曰秦王與中期爭論而不勝秦王大怒中期徐行去人為説秦王曰此悍人也中期適遇明君故也遇桀紂必殺之矣王因弗罪又曰秦令樗里疾以車百乗入周周君迎之甚敬楚王怒讓周以其重秦客也游騰為周君謂楚王曰秦者虎狼之國也有吞周之意周君懼焉楚王乃説也又曰司馬錯與張儀争論於秦惠王前錯欲伐蜀儀曰不如伐韓王問其説對曰親魏善楚下兵三川塞轘轅緱氏之口當屯留之道此王業也又曰惠施為韓魏交令太子鳴質於齊王故見之朱倉謂王曰何不稱病臣請説嬰子曰魏王之年長矣今有病公不如歸太子以徳之不然公子髙在楚將内而立之是齊把空質而行不義也王從之太子得還又曰范雎謂秦王曰秦韓之地形相錯如繡秦之有韓若木之蠧為秦害者莫大於韓王又曰張儀為秦連横説韓王曰諸侯不料兵之弱而聴從人之甘言不顧社稷長利而聴曲説之誤無過此矣又曰燕文公時秦惠王以其女為燕太子婦文公卒易王立齊宣王因燕喪攻取十城蘇秦為燕説齊王再拜而賀因仰而弔曰燕雖弱小强秦之壻王利其十城而深與秦為仇王能聴臣莫如歸燕城卑辭謝秦是王棄强仇而立厚交也齊王大悦乃歸燕城又曰齊楚約而欲攻魏魏有唐雎見秦王曰今齊楚之兵已在魏郊矣大王之救不至則割地而約齊楚王雖欲救之豈有及哉秦王遽發兵赴魏魏復存唐雎之説也又曰楚絶齊齊舉兵攻楚陳軫謂楚王曰不如以地東觧於齊而謀於秦矣又曰文信侯欲攻趙而廣河間使張唐相燕張唐辭之少庶子甘羅曰臣請行之甘羅見張唐曰今文信侯自請卿相燕而卿不肯行臣不知卿死所矣卿曰請聴孺子而行令庫具車廐具馬府具幣行有日矣又曰東周欲為稻西周不下水東周患之蘇子謂東周君曰臣請使西周下水可乎乃往見西周之君曰君之謀過矣今不下水所以富東周也今其人皆種麥君若欲東周之乏不若一下水以病其所種下水東周必復種稻種稻而復奪之若是則東周之人可令一仰西周而受命於君矣西周君曰善遂下水蘇子亦得兩國之金也又曰司馬錯與張儀争論於秦惠王前錯欲伐蜀儀曰不如伐韓王問其説錯曰臣聞欲富者務廣其地欲强者務富其人欲王者務崇其徳三資者備而王道興矣王曰善起兵伐蜀又曰司馬錯與張儀爭論於秦惠王前錯欲伐蜀儀曰不如伐韓王問其説對曰親魏善楚下兵三川誅周王之罪侵楚魏之地周自知不救九鼎寳器必出據九鼎按圖籍挾天子以令天下天下莫敢不聴此王業也又曰蘇秦發書陳箧為揣摩曰安有説人主不能出金玉錦繡取卿相之尊者乎又曰司馬錯與張儀爭論於秦惠王前錯欲伐蜀儀曰不如伐韓王問其説對曰臣聞爭名於朝爭利於市今三川周室天下之市朝也而不爭焉顧爭於戎狄又曰秦將急攻韓韓王安使公子韓非西入秦上書説秦王曰脣亡齒寒故曰兵者凶器陛下試聴臣之計則從者困而趙孤天下可蠶食也又曰以秦卒之勇車騎之多以赴諸侯譬若施韓盧而逐狡􅊵也又曰司馬錯與張儀爭論於秦惠王前錯欲伐蜀儀曰不如伐韓王問其説對曰案圖籍挾天子以令天下錯曰不然蜀戎翟之長也以秦攻之譬如使豺逐羣羊王曰善起兵伐蜀又曰蔡澤對應侯曰君之禄位貴盛而身不退竊為君危之物盛則衰天下之常數也又曰張登謂趙魏曰齊欲伐河東何以知之齊之羞與中山之為王甚矣今召中山與之遇而許之王是欲用其兵也豈若令大國先與之王以止其遇哉趙魏許之果與中山之王而親之中山東絶齊而從趙魏又曰蘇秦為燕説齊歸燕之十城人有毁蘇秦於燕王左右曰賣國反臣也將作亂蘇秦恐得罪歸而燕王不復官也蘇秦見燕王曰臣東周之鄙人也無尺寸功而王親之於廟朝而禮之於庭今臣為王却齊之兵而利得十城宜以益親而今者王不官臣人必有言臣不信傷臣於王者臣之不信王之福也史記曰初沛公引兵過陳留酈生上謁沛公㧞足曰延客入酈生入揖謂沛公曰今足下甚苦暴衣露冠将兵助楚討不義足下何不自喜也臣願以事見又曰李斯説秦王曰夫以秦之强大王之賢足以滅諸侯成帝業秦王乃拜斯為長史聴其計又曰田常欲為亂於齊移兵欲伐魯子貢見吳王説曰齊與吳争强竊為王危之王曰善雖然子待我伐越而聴子子貢曰王必惡越請東見越王令出兵以從吳王大説使子貢之越越王許諾又曰田常欲伐魯子貢之齊説田常曰君之伐魯過矣不如伐吳吳王果與齊人戰於艾陵大破齊師故子貢一出存魯亂齊戰國策曰鄒忌以鼔琴見威王王恱而舎之右室須臾王鼓琴鄒忌推户入曰善鼓琴夫大絃濁以春温者君也小絃廉折以清者相也攫之深而醳之愉者政令也鈞諧以鳴大小相益回邪而不相害者四時也故曰琴音調而天下正也又曰秦圍邯鄲急且降平原君甚患之邯鄲𫝊舎吏子李同説平原君曰誠能令家之所有盡散以饗士士方其危苦之時易得耳於是平原從之得敢死之士三千李同遂與三千人赴秦軍秦軍為之却三十里史記曰漢王數困滎陽城臯酈生曰今燕趙已定唯齊未下臣請得奉明詔説齊王使為漢稱東藩上曰善又曰范増説項梁曰君江東楚將皆争附君者以君代楚將為能復立楚之後也於是項梁然其言又曰范陽人蒯通説范陽令曰竊聞公之將死故弔然賀得通而生又曰韓非説難曰計利害以難其攻直指是非以飾其身以此相持説之是也戰國策曰蘇秦説六國合從秦為従長併相六國喟然歎曰使我有雒陽負郭田二頃豈能佩六國相印乎於是散千金以賜宗族又曰張儀説燕昭王曰今王事秦秦王必喜趙不敢妄動燕王曰今大客幸教之請西面而事秦王耳又曰張儀聞蘇秦死乃説楚王曰夫為従者無以異於驅羣羊而攻猛獸獸之與羊不格明矣今王不與獸而與羣羊臣竊以為大王之計過史記曰韓非知説之難為説難書曰所説實為厚利而顯為名髙者也而説之以名髙則陽收其身而實疏之説以厚利則隂用其言顯榮其身又曰漢王使隨何説九江王隨何曰項王伐齊大王宜悉九江之衆為楚軍前鋒今乃提空名以向楚臣竊為大王不取也九江隂許畔楚與漢又曰李斯詣秦㑹莊襄王卒乃求為秦相吕不韋舎人不韋賢之任以為郎李斯因以得説秦王王乃拜為長史聴其計太平御覽卷四百六十
