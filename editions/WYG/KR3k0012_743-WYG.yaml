body:
  text: 太平御覽卷七百四十三宋李昉等撰疾病部六霍亂疰瘧消渇蹷逆咳嗽嘔逆吐水疾腫疝瘕痺痔痢隂痿陽病霍亂易說曰榖雨氣當至不至則多霍亂春秋考異郵曰襄公朝于荆士卒度歲愁悲失時泥雨暑濕多霍亂之病漢書曰淮南王上書云南越多霍亂之病幽明録曰某郡張甲者與司徒蔡謨上有親僑住謨家蹔數宿行過期不反謨晝眠夢甲云暫行忽暴病患心腹脹滿不得吐痢某時死亡又云我病名乾霍亂自可治也但人莫知其藥故令身死謨曰何以治之甲曰取蜘蛛生斷去脚吞之即愈謨覺使人徃甲行所驗之果死問主人病與時日皆與夢符後有乾霍亂者謨試用輙差疰釋名曰疰人死一人復得氣相灌注也范汪方曰凡九十種寒尸疰此病隨月盛衰人有三百六十餘脉走入皮中或右或左如人所刺至於死死尸相注或至滅門瘧說文曰瘧熱寒並作也痁熱瘧也疾二日一發易說曰立春氣當至不至則多疾瘧白露當降不降民多温瘧周禮天官疾醫曰秋時有寒瘧疾禮記月令曰孟秋行夏令民多瘧疾左傳昭二十年傳曰齊侯疥遂痁痁瘧疾也期而不瘳諸侯之賔問疾者多在多在齊也梁丘據與裔欵言於公曰吾事鬼神豐於先君今君疾病為諸侯憂是祝史之罪也盍誅於祝固史嚚以辭賔欲殺嚚固以謝問疾之賔公恱告晏子晏子諫之乃止東觀漢記曰鄧訓遷護烏桓校尉吏士嘗人病瘧轉易至數十人訓身主湯藥咸得平愈又曰景丹從上至懷病瘧在上前瘧病上曰聞壯士不瘧漢大將軍反瘧病耶使小黄門扶起賜藥醫歸洛陽病遂加抱朴子曰獮猴之鬼令人病瘧山海經曰陽華山多若華實如苽味酸甘食之已瘧𤣥晏春秋曰夏四月予瘧于河南歸于新安不瘳世說曰中朝有小兒其父患瘧行乞藥人曰尊侯明徳君子何以病瘧答曰來病君子所以為瘧列異傳曰陽㽔字聖卿逃瘧神祠有人呼言杜卸杜卸聖卿應曰諾起至户口人曰取此書去得素書一卷皆譴劾百神法乃差録異傳曰嘉興令吴士季瘧經武昌廟遣人辭謝乞斷瘧鬼去廟二十里卧夣見塘上一人乗馬追呼行太急速至季船下馬與吏共入船後縛取一小兒去夢覺瘧即斷又曰𢎞公患瘧經年後獨至田舍瘧發有數小兒持公首脚公見因陽瞑忽起捉得一皃化成黄鷁餘者皆走仍縳以還家懸著窓上明當殺之比曉失鷁瘧遂斷于時有瘧者但呼𢎞公便斷甄異傳曰吾興張安病正發覺有物在被上病便更甚安自力舉被捉之物化成鳥如鵂鶹瘧登時愈盛𢎞之荆州記曰始興含淮縣有滃水下流有聖鼓横在川側上下船人刺篙有撞之者皆得瘧病消渇後漢書曰司馬相如有消渇病後漢書曰李通素有消渇疾消消中之疾也周禮云春有痟疾自為宰相謝病不視事帝令以公位歸第養病魏畧曰卞蘭得消渇疾時明帝信呪水使人持水賜蘭蘭曰治病當以方藥何信於此遂不肯飲以至於卒時人見蘭好直言謂帝面折之而蘭自殺其實非也晉書曰裴楷有渇利疾不樂處勢王渾為楷請當見將養不違其志不聼及疾詔遣黄門郎王衍省疾楷回眸矚之曰竟未見識衍深歎其神雋南史何㸃少時嘗患渇逾歲不愈後在吴中石佛寺建講所晝􅃦夢一道人形貌非常授丸一掬夢中服之而差唐書鄧𤣥挺綜銓選無藻鑒之明又患消渇人因號為鄧渇王子年拾遺記曰晉武為撫軍時羗人姚馥字世芬姚襄即其祖也好啜酒嚼濁糟言渇於醇酒羣輩常狎之呼為渇羗為朝歌邑長馥辭之帝曰朝歌紂之故鄉池有酒也故使老羗不復呼渇交州記曰浮石體虛而輕煑飲止渇淮南子曰嫁女於疾消渇者夫死後則難可復處以為女妨之後人不娶蹷逆韓詩外傳曰扁鵲過虢虢侯世子暴病死乃追宫門曰世子病所謂尸蹷者也吕氏春秋曰室大多隂則蹷咳嗽釋名曰咳刻也氣奔至出入不平調若剋物也嗽促也用力急促也易說曰立秋氣未當至而至則少陽脉盛人病咳周書曰立秋之日白露不降民多病咳禮記月令曰季夏行春令則國多風欬春秋繁露曰人君好戰貪城邑則民病咳嗽抱朴子曰龜鼈鼉之鬼令人病欬劉𢎞教曰吾昨四鼓中起聞西城上兵欬聲甚深即呼省之年過六十羸病無襦而督將差以持時持時􅊀不虞耳此既無所防捍又老病羸凍不隠恤必致死亡督將豈可乃爾耶嘔吐左傳哀下曰衞侯為靈臺于藉圃與諸大夫飲酒焉禇師聲子韤而登席古者見君解韤公怒辭曰臣有疾異於人足有瘡疾若見之君將殻之殻嘔吐也漢書曰西域有大小頭痛坂令人嘔吐謝承後漢書曰吴郡媯皓字元起其母至婚家醉嘔吐恐食得毒伏地嘗吐仰曰吐寒耳非毒也鄧粲晉記曰阮籍母死與人棊如故既而飲酒三升舉聲一號吐血數升晉中興書曰王允之年在總角為從伯敦所知嘗夜飲允之辭醉眠在别牀敦與錢鳯謀逆允之悉聞其語便於眠處大吐以為大醉不復疑沈約宋書曰蕭惠開除府家給事性素剛益不得志登病嘔血有物如肝肺者甚多孟宗别傳曰孟宗為光禄勲嘗大㑹公卿先少飲酒偶有强者飲一杯便吐時令峻急凡有醉吐者皆傳詔司察公吐麥飯察者以聞上乃歎息詔問食麥飯意宗答曰臣家足有米飯耳直愚性所安其徳行純素如此列子曰東方有人焉曰爰旌目將有適也而餓於道狐父之盗曰丘見而下壺飱而餔之爰旌目三餔而後能視曰子何為者也曰我狐父之人丘也爰旌目曰譆汝非盗耶胡為而食我吾義不食子食也兩手據地而嘔不出而死水疾東觀漢記曰東平王蒼到國後病水氣喘逆上遣太醫丞相視之小黄門侍疾置馬傳起居以千里為程晏子春秋曰景公水疾夢與二日鬭不勝召占夢問之晏子謂占夢曰公所病者隂也日陽也一隂不勝兩陽公病將已占夢以其言對三日公病大愈賜占夢占夢曰晏子教臣也公召晏子賜之晏子曰占夢以臣言對故有益也若使臣言則不信腫釋名曰腫鍾也寒熱氣所鍾聚也春秋潜潭巴曰枉矢黒軍士不勇疾流腫宋有注曰矢當揚光明今黒有見䘮之氣則腫死春秋繁露曰人君簡宗廟逆天時民病流腫尸子曰有醫竘者秦之良醫張子之背腫謂之曰背非吾背也任子制焉夫身與國亦猶此也必有委制然後治之齊諧記曰范光禄得病腹脚並腫不飲食忽有一人清朝不自通遥進入光禄齋中就光禄邉坐光禄云先不識君君那得来而不自通此人答曰佛使我来治君病發衣見之因捉其脚以甘刀針腫上倐忽之間頓針而脚及膀胱百餘下然不覺痛復欲針腹其兒黄門不聽語竟便去後針孔中黄膿汁當出二三升許至明曉脚都差針亦無孔范甚喜疝釋名曰心痛曰疝疝詵也氣詵詵然而上也後漢書太醫食循從獵上林還暮宿殿門下寒疝病發時鄧訓直事聞循聲起徃問曰冀得火以熨背訓至大官門為求火不得乃以口嘘其背遂愈瘕龍魚河圗曰犬狗魚鳥不熱食之成瘕易說曰白露氣當至不至太隂脉盛人多疝瘕宋書徐文伯傳宋明帝宫人患腰痛牽心毎至輙氣欲絶衆醫以肉為瘕文伯曰此髪瘕以油投之即吐得物如髪稍引之長三尺頭已成蛇能動懸柱上水滴盡一髪而已病都差山海經曰麗麂之水其中多有育沛佩之無瘕疾郭日肓沛未聞列仙傳曰𤣥俗者常餌巴豆雲母賣藥於都市河間王病瘕𤣥俗脈之下蛇十餘頭俗言王病六世餘殃非王所招也王嘗放鹿鹿是麟母仁心感天故遭俗耳續捜神記曰太尉郄公鎮丹徒嘗出獵時二月中蕨始生有一甲士折噬食之即覺心中淡淡欲吐因歸家仍成心腹疾半年許忽大吐吐一蛇長尺餘尚活動揺乃掛著屋簷前汁稍稍出蛇漸焦小經一宿視之成一莖蕨猶前所食也病遂除差又曰桓宣武帝時有一督將因時行病後虛熱更能飲復茗必一斛二升乃飽人苦勸復啜五升乃大吐向所飲都盡有一物隨吐後出如斗大試以一斛二升復茗洗之此物噏之都盡而正覺小復又増五升更悉混然後從口中涌出既吐此物病遂差或問之曰此何病答曰此病名斛二瘕又曰昔有一人與奴俱得心瘕病奴既死割剖腹視得一白鼈赤眼甚鮮明乃試以諸毒藥澆灌之并内藥於鼈口無損乃繫鼈於牀脚有客乗白馬來看之溺濺鼈惶遽疾走避溺既繫之不得去乃縮頸藏脚不敢動病者察之謂其子曰吾疾或可救乃試取白馬溺以灌鼈上消滅成數升水病者乃頓飲升餘白馬溺即豁然除異苑曰章安有人元嘉中噉鴨肉乃成瘕病胷滿面赤不得飲食醫令服秫米瀋須㬰煩悶吐一鴨雛身喙趐皆已成就惟左脚故綴昔所食肉病遂獲差志怪曰有人得瘕病腹晝夜切痛臨終勅其子云吾氣絶後可剖視之其子不忍違割之得一銅酒鎗容數合醫者聞其病而解之復出巾箱中藥以投鎗即消成酒痺春秋考異郵曰痺在喉闕㐫命漢書曰哀帝即位痿痺又曰馮野王弟立為東海太守下濕病痺天子聞之徙立為太原太守晉書皇甫謐字士安得風痺疾猶手不輟卷後魏書臨淮王譚孫孚好酒後遇風患手足不隨口不能言乃左手畫地作字乞解所任唐書曰處羅可汗欲分兵大掠中國羣下多曰我父失國賴隋得立恩不可忘時處羅久疾主者有五石餌之俄而處羅疽死痔釋名曰痔食也蟲食之也山海經曰天帝山有烏其狀黒文而赤翁郭璞注云翁郭下毛之物名曰櫟食之已痔又虎蛟可以為痔郭璞注為治也莊子曰秦王有病召乙破癰者將一軍痔者將軍匠乘所治愈下將乘愈多尸子曰有乙􅀈者秦之良必為㑹王治痔愈宋玉登徒子賦曰登徒子之妻既疥且痔痢釋名曰泄痢言出漏泄利也漢書曰韋𤣥成父䘮既葬當襲爵即陽為病狂卧便痢妄笑語欲讓避兄也北史齊司馬膺之好讀太𤣥經又注揚雄蜀都賦毎云我欲與揚子周旋患痢十七年竟不愈齊亡歲以痢終魏武令曰凡山水甚强寒飲之皆令人痢隂痿漢書曰膠西王端為人殘戾又隂痿一近婦人病數月又曰周仁為人隂重不泄張晏曰隂重不泄下濕故溺袴是以得比宦者入後宫魏志公孫康死子晃淵皆小衆以康弟恭嗣恭病隂消為閹人劣弱不能治國淵脅奪恭位晉書南陽王模世子保體質豐偉嘗自稱重八百斤喜睡痿疾不能御婦人宋書曰明帝素肥晩年痿疾不能御内陽病左傳襄三曰楚子使薳子馮為令尹訪於申叔豫申叔豫曰國多寵王弱國不可為也遂以疾辭方暑闕地下氷而牀焉重繭衣裘鮮食而寢楚子使醫視之復曰瘠則甚矣而血氣未動言無疾史記曰亷頗云我為趙將有攻城野戰之功而藺相如徒以口舌為而位居我上相如聞不肯與㑹毎朝時常稱病不欲與爭列續漢書曰楊彪見漢祚將終自以累世為公卿恥為魏臣遂稱足疾不復行范􅁮後漢書曰髙詡字季囘父容哀平間為光禄大夫詡以父任為郎世傳髙詡以信行清操知名王莽簒位父子稱疾逃不仕莽又曰封觀者以兄名位未顯恥先受之遂稱風疾瘖不能言火起燒屋徐出避之忍而不告謝承後漢書曰沛國陳禁性不好榮建武中拜議郎引見賜食禁陽眼目無所見以肉投之中出又橖柱乃歸魏末傳曰李騰為荆州刺史曹爽令别司馬懿懿使婢進粥持杯而飲粥皆流出謂爽曰太傅非復可濟令人愴然曹瞞傳云太祖少飛鷹走狗㳺蕩無度其叔父數言之於嵩太祖患之後逢叔父於路乃佯敗面喎口叔父怪問其故太祖曰卒中風叔父告嵩嵩驚呼太祖太祖貌如故嵩問曰叔父言汝中風已差乎太祖曰初不中風但失叔父愛故見罔爾嵩乃疑自後叔父所言嵩不復信晉書曹爽專權宣帝稱疾何曽亦謝疾爽誅曾乃起視事又曰鍾㑹將反於蜀使衛瓘慰勞諸軍瓘心欲去且堅其意曰卿三軍主宜自行㑹曰卿先行吾當後出瓘便下殿㑹悔遣之使呼瓘瓘辭眩疾動詐仆地比出閤數十信追之瓘至外廨服鹽湯大吐瓘素羸便似困篤㑹遣所親人及醫視之皆言不起㑹由是無所憚晉陽秋曰宣帝初不欲屈節曹氏辭以風疾不能起魏武使人徃㣲刺之以觀信否宣帝堅卧不動晉書曰王戎族弟敦有髙名戎惡之敦毎候戎輙托疾不見敦後果為逆亂其鑒賞先見如此又曰長樂馮恢父為𢎞農太守愛少子淑欲以爵傳之恢父終服闋乃歸鄉里結草為廬陽瘖不能言淑得襲爵恢始封為博士祭酒隋書曰郭衍為洪州總管晉王鎮淮海因召衍隂共計議又恐人疑無故來徃託以衍妻患癭王妃蕭氏有術能療之以狀奏髙祖髙祖聽衍共妻向江都徃來無度唐書曰安禄山䧟西亰王繼祥中風失音賊猶强授偽官後得原宥又曰王徽傅黄巢入潼闗僖宗出幸徽與同列崔沆豆盧家僕射于琮至眠方知遂相與奔馳赴行在徽夜落荆榛中隠於崖谷為賊所得迫還京師將授之偽命徽示以足折口瘖雖白刄環之初無懼色賊令輿歸第命醫工視之月餘守視者怠懈徽乃雜於負販竄之河中遣人間道奉絹表入蜀天子嘉之詔授光禄大夫守兵部尚書稽康髙士傳曰王莽徴孔休休飲血於使者前吐之為病篤遂不行益部耆舊傳曰公孫述僭號徵犍為任永君許以大位永君故托以清盲妻於面前滛若不見子入井忍情不問述伏誅永君澡浴引鏡照形曰世適平目即清妻乃自殺馮信季成亦不受公孫述聘託清盲十三年侍婢於面前滛而不問述誅取紙作書婢因自殺太平御覽卷七百四十三
