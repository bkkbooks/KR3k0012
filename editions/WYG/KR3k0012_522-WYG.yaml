  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_522-1a, image: WYG0897/WYG0897-0647a.png}
body:
  text: 太平御覽卷五百二十二宋李昉等撰禮儀部一敘禮上尚書舜典曰咨四嶽有能典朕三禮三禮天地神祗人鬼之禮也毛詩國風曰相䑕刺無禮也衛文公能正其羣臣而刺在位承先君之化無禮儀也相䑕有皮人而無儀相視無禮儀者雖居尊位猶為暗昧之行箋云儀威儀也視䑕有皮雖處髙顯之位偷食苟得不知亷恥亦與人無威儀者同人而無儀不死何為箋云人以有威儀為貴今反無之傷化敗俗不知其死無所害也相䑕有齒人而無止止所止息箋云止容止孝經云容止可觀人而無止不死何俟俟待也相䑕有體體支體也人而無禮人而無禮胡不遄死遄速也毛詩國風曰蒹葭刺襄公也未能行周禮將無以固其國焉秦處周之舊土其人被周之徳教日久矣今襄公親為諸侯未習周之禮法故國人未服焉蒹葭蒼蒼白露為霜興也蒹葭蘆也蒼蒼盛也白露疑戾為霜然後嵗事成國家待禮然後興箋云蒹葭在衆草之中也蒼然疆至白露凝戾為霜則成而黄興者喻衆民不服襄公政令得周禮以教之則服也所謂伊人在水一方周禮天官曰太宰之職掌建邦之六典三曰禮典以和邦國以統百官以諧萬民周禮地官司徒曰司徒之職掌施十有二教焉一曰以祀禮教敬則民不苟二曰以陽禮教讓則民不爭三曰以隂禮教親則民不怨四曰以樂禮教和則民不乖五曰以儀辯等則民不越六曰以俗教安則民不偷七曰以刑教中則民不虣八曰以誓教恤則民不怠九曰以度教節則民知足十曰以世事教能則民不失職十有一曰以賢制爵則民慎徳十有二曰以庸制禄則民興功周禮地官曰大司徒以五禮防萬民之偽而教之中禮所以節止民之侈偽其行得中鄭司農云五禮吉凶賔軍嘉周禮春官宗伯曰以嘉禮親萬民嘉善也所以因人心所善者而為之制嘉禮之别有六以飲食之禮親宗族兄弟親者使之相親人君有食宗族飲酒之禮所以親之也文王世子曰族食世降一等大傳曰繫之以姓而弗别綴之以食而弗殊百世而婚姻不通者周道然也以昏冠之禮親成男女親其思成其性以賓射之禮親故舊朋友射禮雖王亦立賓主也王者故舊友為世子時共在學者天子時有友諸侯之義武王誓曰我友邦冢君是也司寇職有議故之辟議賓之辟以燕饗之禮親四方之賓客賓客謂朝聘者以脤膰之禮親兄弟之國脤膰社稷宗廟之肉以錫同姓之國同福禄也兄弟有共先王者魯定公十四年天王使石尚來歸脤以賀慶之禮親異姓之國異姓王昏姻甥舅禮記曲禮曰夫禮所以定親疎決嫌疑别同異明是非也道德仁義非禮不成教訓正俗非禮不備分爭辨訟非禮不決君臣上下父子兄弟非禮不定宦學事師非禮不親班朝治軍莅官行法非禮威嚴不行禱祠祭祀供給鬼神非禮不誠不莊是以君子恭敬撙節退讓以明禮撙猶趨也曲禮曰人有禮則安無禮則危故曰禮者不可不學也夫禮者自卑而尊人雖負販者必有尊也而況富貴乎負販者尤輕恌志利宜若無禮然富貴而知好禮則不驕不淫貧賤而知好禮則志不懾懾猶怯也又曲禮下曰君子行禮不求變俗求猶務也又禮運曰孔子曰夫禮先王以承天之道以治人之情故失之者死得之者生詩曰相䑕有體人而無禮人而無禮胡不遄死相視也遄疾也言䑕之有身體如人而無禮者矣人之無禮可憎賤如䑕不如疾死之愈是故夫禮必本於天殽於地列於鬼神聖人則天之明因地之利取法度於鬼神以制禮下教令也既又祀之盡其敬也教民嚴上也鬼者精魂所歸神者引物而出謂祖廟山川五祀之屬也逹於䘮祭射御冠昏朝聘民知嚴上則此禮逹於下故聖人以禮示之故天下國家可得而正也又禮運曰禮者君之大柄也所以别嫌明㣲儐鬼神考制度别人義所以治政安君也疾今夫禮如此為言禮之大義也柄所操以治之又禮運曰是故夫禮必本於太一分而為天地轉而為隂陽變而為四時列而為鬼神又禮運曰故聖人之所以治人七情修十義講信修睦尚辭讓去爭奪舎禮何以治之唯禮可也飲食男女人之大欲存焉死亡貧苦人之大惡存焉故欲惡者心之大端也人藏其心不可測度也美惡皆在其心不見其色也欲一以窮之舎禮何以哉言人情之難明知禮之重又禮運曰故禮行於郊而百神受職焉禮行於社而百貨可極焉禮行於祖廟而孝慈服焉禮行於五祀而正法則焉言信得其禮則神物與人皆應之百神列宿也百貨金玉之屬又禮運曰故禮義也者人之大端也所以講信修睦而固人之肌膚之㑹筯骸之束也所以養生送死事鬼神之大端也所以逹天地順人情之大竇也竇孔穴也故唯聖人為知禮之不可以已也故壊國䘮家亡人必先去其禮言愚者之反聖人也故禮之於人也猶酒之有糵也君子以厚小人以薄皆得以為美味性善者醇耳又禮器曰禮器是故大備大備盛徳也禮器言禮使人成器如耒耜之為用也人情以為田修理以耕之此是也大備自耕至於食之而死禮釋囘増美質措則正施則行釋猶去也囘邪辟也質猶性也措置也其在人也如竹箭之有筠也如松栢之有心也二者居天下之大端矣故貫四時而不改柯易葉君子有禮則外諧而内無怨故物無不懐仁鬼神饗徳先王之立禮也有本有文忠信禮之本也義理禮之文也無本不立無文不行言必内外具也又禮器曰禮也者猶體也若人身體體不備君子謂之不成人設之不當猶不備也禮有大有小有顯有㣲大者不可損小者不可益顯者不可揜㣲者不可大也故經禮三百曲禮三千其致一也致之言至也一謂誠也經禮謂周禮也周禮六篇其官有三百六十曲猶事也事禮謂今禮篇多亡本數未聞其中事儀三千未有入室而不由户者三百三千皆由誠也又禮器曰君子曰甘受和白受采忠信之人可以學禮苟無忠信之人則禮不虛道是以得其人為貴也又樂記曰是故先王有大事必有禮以哀之有大福必有禮以樂之哀樂分皆以禮終又經觧曰禮之於正國也猶衡之於輕重也繩墨之於曲直也規矩之於方圎也故衡誠縣不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圎君子審禮不可誣以奸詐是故隆禮由禮謂之有方之士不隆禮不由禮謂之無方之民敬讓之道也又經觧曰故朝覲之禮所以明君臣之義也聘問之禮所以使諸侯相尊敬也䘮祭之禮所以明臣子之恩也鄉飲酒之禮所以明長㓜之序也婚姻之禮所以明男女之别也夫禮禁亂之所由生猶坊止水之所自来也故以舊坊為無所用而壊之者必有水敗以舊禮為無所用而去之者必有亂患故婚姻之禮廢則夫婦之道苦而滛辟之罪多矣鄉飲酒之禮廢則長㓜之序失而争闘之獄繁矣喪祭之禮廢則臣子之恩薄而倍死妄生者衆矣聘覲之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之敗起矣故禮之教化也㣲其止邪也於未形使人日徙善逺罪而不自知也是以先王隆之也又哀公問曰哀公問於孔子曰大禮何為君子之言禮何其尊也孔子曰丘也小人不足以知禮盖不答也君曰否吾子言之也孔子曰丘聞之民所由生禮為大非禮無以節事天地之神也非禮無以辨君臣上下長㓜之位也非禮無以别男女兄弟之親婚姻疏數之交也君子以此之為尊敬然又仲尼燕居子張子貢言游侍縱言至於禮言游子游也縱言泛說子曰居汝三人者吾語女禮使女以禮周流無不徧也子貢越席而對曰敢問何如對應也子曰敬而不中禮謂之野恭而不中禮謂之給勇而不中禮謂之逆又曰言游問禮也者領惡而全好者與子曰然然則何如子曰郊社之義所以仁鬼神也嘗禘之禮所以仁昭穆也饋奠之禮所以仁死䘮也射御之禮所以仁郷黨也食享之禮所以仁賔客也仁猶存也子曰明乎郊社之義嘗禘之禮治國其如指諸掌而已乎是故以之居處有禮故長㓜辨也以之閨門之内有禮故三族和也以之朝廷有禮故官爵序也以之田獵有禮故戎事閑也以之軍旅有禮故武功成也又仲尼燕居子曰禮者何也即事之始也君子有其事必有其治治國而無禮譬猶瞽之無相與倀倀乎其何之譬如終夜有求於幽室之中非燭何以見若無禮則手足無所措耳目無所加進退揖讓無所制又坊記曰子云夫禮者所以章疑别㣲以為民防者也故貴賤有等衣服有别朝廷有位則民有所讓又中庸曰子曰吾說夏禮杞不足徴也吾學殷禮有宋存焉吾學周禮今用之吾從周徴猶明也吾能說夏禮顧杞之君不足與明故也吾從周行今之道禮含文嘉曰禮者履也禮稽命徴曰得禮之制澤谷之中有赤烏白玊赤蛇赤龍赤木白泉生出飲酌之使夀長禮稽命徴曰禮之動揺也與天地同氣四時合信隂陽為符日月為明上下和合則物獸如其性命太平御覽卷五百二十二
