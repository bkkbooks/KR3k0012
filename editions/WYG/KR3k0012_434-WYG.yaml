body:
  text: 太平御覽卷四百三十四宋李昉等撰人事部七十五勇二漢書曰韓信數以策干項羽弗用漢王之入蜀信亡楚歸漢未得知名為連敖楚官也坐法當斬其疇十三人皆已斬至信信乃仰視滕公曰上不欲就天下乎柰何斬壯士滕公奇其言壯其貌釋弗斬與語大悦之漢王以為治粟都尉信謂漢王曰臣嘗事項王請言項王為人也項王喑啞叱咤千人皆廢然不能任屬賢將此特匹夫之勇也又曰齊哀王弟章髙后封為朱虛侯章年二十有氣力忿劉氏不得職入嘗侍燕飲髙后令章為酒吏章自請曰臣將種也請得以軍法行酒髙后曰可酒酣章進歌舞已而曰請為太后言耕田髙后兒子畜之笑曰顧乃父知田耳若生而王子安知田子章曰知之太后曰試為我言田意章曰深耕概種立苖欲疏非其種者鋤而去之太后黙然頃之諸吕有一人醉亡酒章追抜劔斬之而還報曰有亡酒一人臣謹行軍法斬之太后大驚已許其軍法毋以罪也因罷酒又曰江都易王非二年立為汝南王吳楚反時非年十五有才氣上書自請擊吳景帝賜非将軍印擊吳吳破徙王江都治故吳國以功賜天子旌旗又曰李廣為上谷太守數與匈奴戰典屬國公孫昆耶為上泣曰李廣才氣天下無䨇自負其能數與虜确恐亡之師古曰确音角上乃徙廣為上郡太守廣以郎中令将四千騎出右北平博望侯張騫将萬騎與廣俱異道行數百里匈奴将四萬騎圍廣軍士皆恐廣乃使其子敢往馳之敢往從數十騎直貫胡騎出其左右而還謂廣曰胡虜易與耳軍士乃安為圜陳外鄉胡急擊矢下如雨漢兵死者過半漢矢且盡廣乃令持蒲毋發而廣自以以大黄射其裨将服䖍曰黄肩弩殺數人胡虜益解㑹暮吏面無人色而廣意氣自若益治軍軍中服其勇也明日復力戰而博望侯軍亦至匈奴乃解去又曰王尊字子贛涿郡人為東平相時王素驕不奉法尊謂王曰天下皆言王勇但負貴安能勇如尊乃勇耳王變色欲格殺之遷東郡太守河水盛溢泛浸瓠子金堤老弱奔走恐水大決為害尊躬率吏民投沉白馬祀水神河伯尊親執圭璧使巫䇿祝請以身填金堤因止宿廬居堤上吏民數千萬人争叩頭救止尊終不肯去及水盛堤壊吏民皆走唯一主簿泣在尊旁尊立不動而流波稍却廽還吏民嘉壯尊之勇節白馬三老朱英等奏其狀詔秩尊中二千石賜黄金二十斤又曰朱雲字游魯人也徙平陵少時通輕俠借客報仇身長八尺餘容貌甚壯以勇力聞又曰趙充國字翁孫陜西人後徙金城令居以六郡良家子善騎射補羽林為人沉勇有大畧少好将帥之節學兵法通知四夷事武帝時以假司馬從貳師将軍擊匈奴為虜所獲漢軍乏食數日死傷者多充國乃與壯士百餘人潰圍䧟陣貳師引軍隨之遂得解身被二十餘創貳師奏狀詔徴充國詣行在所武帝親自視其創嗟嘆之拜為中郎又曰項羽下邳人身長八尺二寸力能扛鼎少學書劒不成季父梁怒羽羽曰書足以記名姓劔一人敵不足學也梁奇之教以兵法籍大喜遇秦始皇遊㑹稽渡浙江梁與籍俱觀籍曰彼可取而代也梁掩其口㑹七月陳勝起兵九月㑹稽守通謂梁曰江西皆反此正天亡秦時也先則制人後則為人所制吾欲發兵使公及桓楚将梁曰桓楚亡獨籍知其處請召籍受命籍遂擊殺數十百人衆皆讋伏梁遂舉郡中得八千人渡江而去至下邳凡六七萬人居鄛人范増説梁曰秦滅六國楚最無罪自懐王入秦不返楚人憐之至今若立楚後亡秦必也梁從之廼求楚懐王孫心為楚王是為義帝從民望也都盱眙梁自號武信君師次定陶有驕色宋義諫曰戰勝而将驕卒惰者敗今卒隋失秦兵日益臣為君危之梁不聽秦将章邯益兵擊楚大破之梁戰死義帝以宋義有先見徴為上将軍籍為次将范増為末将北救趙至安陽留不發籍謂義曰今秦軍圍鉅鹿疾引兵渡河楚擊其外趙應其内破秦軍必矣義曰不然夫搏牛之蝱不可以破蟣蝨今秦攻趙戰勝則兵疲我承其敝不勝則我引兵皷行而西必舉秦矣夫擊敵輕鋭我不如公坐運籌䇿公不如我因下令曰猛如虎狠如羊貪如狼強不可令者斬之乃飲酒髙㑹諸将軍六日不進是時天寒士卒飢凍籍曰且國家兵新破王坐不安席掃境内屬将軍國家安危在此一舉今不恤士卒而狥私非社稷之臣也籍乃斬宋義于帳中左右懾服莫敢支吾悉發兵渡河沉舟敗釜燒廬舎持三日粮示必死乃大破秦兵虜王離諸将入轅門膝行而前莫敢仰視師次鉅鹿㑹戰夜坑秦卒二十萬入關屠咸陽殺子嬰自立為西楚覇王與漢王相持五年及漢兵大㑹垓下食盡與漢兵戰不利圍之夜聞漢軍皆楚歌乃驚曰漢皆已得楚乎遂以從騎八百人夜潰圍南出漢令騎将灌嬰追至東城籍惟单騎自知智窮仰天呼躍自刎而死遂為五将各分體漢王以魯公禮𦵏羽穀城諸項賜姓劉又曰樊噲沛人也身長八尺家貧以屠為業後為髙祖驂乘髙祖與項羽㑹鴻門因飲范増起出謂項荘曰汝可以劔舞便因擊沛公殺之荘入為夀曰軍中無以為樂臣請以劔舞因抜劔起舞時項伯亦起舞常以身翼蔽漢王時帳下惟有張良噲居營門外聞事急乃持盾撞入立于帳下項羽目之問為誰張良曰漢王參乘樊噲也羽曰壯士賜之巵酒彘肩噲既飲酒㗖彘肩羽曰能復飲乎噲曰臣死且不憚巵酒安足辭且漢王入關定咸陽暴師于灞上以待大王大王今日至聽小人之言與漢王有隙臣恐天下解心疑大王也項羽黙然噲因目揮漢王佯如厠遂與噲輕騎歸營漢王即皇帝位封噲為舞陽侯后從上擊陳豨有功遷左丞相又從上破黥布后上病惡見人羣臣莫敢入噲排闥直入大臣等隨之噲曰陛下起沛何其壮也今天下已定又何憊也且陛下病甚不見臣等計㑹國事獨與一宦者處幽室中絶不見臣等陛下豈不思趙髙之事乎上笑而起又曰天漢二年貳師李廣利将三萬騎出酒泉擊右賢王於天山召李陵欲使為貳師将輜重陵召見武臺叩頭自請曰臣所将屯邉者皆荆楚勇士奇才劔客也願得一隊到蘭于山以分單于兵無令專嚮貳師上曰将惡相屬耶吾發軍多無騎予汝陵對無所事騎願以少擊衆兵五千渉單于庭上壮而許之又曰李敢男禹亦有勇常與侍中貴人飲侵陵之莫敢應後愬之于上上召禹使刺虎懸下圏中未至地有詔引出之禹從落中以劔斫絶纍欲刺虎上壯之遂救止焉又曰季布弟季心氣盖關中任俠方數千里士争為死中尉郅都不敢加少年時惜其名行是時心以勇聞布以諾聞關中范􅁮後漢書曰牛耶字孺卿狄道人有勇力才氣雄於邊陲又曰盖延字巨卿漁陽要陽人也身長八尺彎弓三百斤邊俗尚勇力延以氣聞又曰帝使王覇與馬武討周建蘇茂救建與武戰覇乃開營復出精騎襲其背茂建前後受敵驚亂敗走覇武各歸營賊后聚挑戰覇堅臥不出饗士作倡樂茂雨射營中中覇前酒樽覇安坐不動又曰中郎将張耽性勇鋭而善撫士卒軍中皆為用命遂繩索相懸上通天山破烏桓悉斬其渠帥還得漢民獲其畜生財物東觀漢記曰劉伯升都部将宗人劉稷數陷陳潰圍勇冠三軍聞更始立怒曰本起兵圗大事者伯升兄弟更始何為者以更始聞而心忌之以稷為抗威将軍稷不肯拜更始乃收稷将誅之伯升固争并執伯升即日害之又曰祭遵為征虜将軍将兵北入箕關與𢎞農厭新伯華蠻賊合戰中弩矢入口洞出舉衰掩口血流衰中衆見遵傷却退遵呵吏士吏士復戰皆一人擊十大破之又曰馬援曰方今匈奴烏桓尚擾北邊欲自請擊之男兒要當死于邊野以馬革裹尸還𦵏耳何能臥床上在兒女子手中耶又曰耿秉性勇壯而簡易於事軍行常自被甲在前休止不結營部然逺斥候明要誓有驚軍陳立成士卒皆為死又曰永平中竇固擊匈奴班超為假司馬将兵别擊夷吾戰於蒲類海多斬首虜固又遣與從事郭恂俱使西域鄯善王廣禮敬甚備后更踈懈超謂其官屬曰寧覺廣志意薄乎此必有北虜使來也召侍胡作之曰匈奴使來數日安在侍胡具服超悉㑹其吏士三十六人酒酣激怒曰不探虎穴不得虎子當今之計獨有因夜以火攻虜使彼不知我多少必大羣怖可殄盡善王破膽功成事立也衆曰善遂将吏士往奔虜營超手格殺三人斬其使明日乃還告郭恂恂大驚既而色動超知其意舉手曰掾雖不得班并何心獨擅之乎恂乃悦鄯善一國震怖竇固具上超功超求更選使西域帝壯超詔固曰吏若班超何故不遣而選乎今以超為軍司馬今進前功固欲益其兵超曰願得本所從三十餘人足以備有虞多益為重累又曰楊政字子行京兆人嘗過楊虛侯馬武武稱疾見政去對机邊休臥欲令進拜床下政入户前排武徑上床坐武恨語言不懌政把武手責之曰卿蒙國恩備位蕃臣不思求賢助國而驕天下英俊今日動者刀入脅左右大驚以為見刧操兵滿側政顔色自若㑹信陽侯至責數武令為朋友其果勇敢决皆此類也又曰賈復以偏将軍從上拔邯郸擊青犢大戰至日中賊陣堅不却傳召復曰吏士飢且朝飯復曰先破之且后食于是被甲先登所向皆靡諸将咸服其勇上以復敢深入希令逺徃而壯其勇節常自從之故復少方面之勲諸将每論功復未曽有言上輙曰賈君之功我自知之又曰張歩攻耿弇營合殺飛矢中弇股以佩刀截之左右無知者又曰祭􅊮遼東太守有勇力能貫三百斤弓虜每犯塞常為士卒先鋒數破之又曰温序為䕶羗校尉行部為魏囂将苟宇所拘刼序素有氣大怒叱宇等曰虜何敢廹脅漢将因以節撾殺數人衆争欲殺之宇止之曰此義士死節可賜以劔序受劔衘鬚於口顧左右曰無令鬚汚又曰朱暉字文季南陽人暉早孤有氣决年十三莽敗天下亂與外氏家屬從田間奔入苑城道遇羣賊賊操兵弩欲祼奪婦女衣服昆弟賓客皆惶廹伏地莫敢動暉抜劔前曰財物皆可取諸母衣不可得今日朱暉死日也賊見其小壯之笑曰童子内刀遂舎之謝承後漢書曰彭脩字子陽㑹稽人年十五時父為郡吏得休與脩歸道為盗所刼脩困廹乃抜佩刀而持盗曰父辱子死盗相謂曰此童子義勇士也不宜逼之遂辭謝而去魏志曰龎徳将所領與曹仁共拔宛與闗雲長相持時樊下諸與以徳兄在漢中頗疑之徳常曰我受國恩義在効死與雲長戰射雲長中額時徳常乘白馬蜀軍謂之白馬將軍又曰曹仁從平荆州以仁行征南将軍晉屯江陵拒吳周瑜士将數萬人來攻遣部曲将牛金逆與挑戰賊多金衆少遂為所圍仁望金等垂涙左右皆失色仁氣奮怒甚将壮士數十騎直前衝入賊圍金等乃得解餘衆未盡出仁復直還突出金兵賊乃退又曰荘覇字宣髙太山人父戎為縣獄掾據法不聽太守所欲殺太守怒收戎詣府送者百餘人覇年十八将客數人於南山中奪之送者莫敢動因與父俱亡命東海由是以勇壯聞又曰曹真字子丹太祖族子也少孤召飬與諸子同使與文帝共止嘗獵為虎所逐顧射之應聲而倒太祖壯其鷙勇使将虎騎討虛丘賊抜之封靈夀亭侯又曰劉􅁮字子揚淮南成徳人也鄭寳張多許乾之屬各擁部曲寳最驍果才力過人一方所憚􅁮時年二十餘㑹太祖遣使詣州有所案問寳從使百人齎牛酒來候􅁮命家童将其衆坐中門外為設酒飯與寳于内宴飲宻勒徤兒令因行觸而斫寳寳性不甘酒視候甚明觴者不敢發擊因自引取佩刀以斫殺寳斬其首以示其軍魏書曰吕布字奉先五原人也董卓為都尉誓為父子官至中郎将卓每以布自衛布嘗小失於卓卓拔㦸擲之布趫㨗得免布由是隂怨於卓布後應王允於門刺殺卓李傕等攻布布不能拒投袁術術不納又投袁紹紹遂與布擊張燕布嘗御良馬號赤兔能馳城飛塹屢突張燕軍陣一日或三四至皆斬首而出遂破燕軍布乃暴横紹患之布不自安求還洛陽後復從袁術攻劉備於沛破之曹公自将至下邳擊布降之見曹公曰今日已後天下定矣公曰何以言之布曰明公所患不過布耳今布将騎明公将歩天下不足定謂劉𤣥德曰𤣥徳卿為坐客我為降虜繩縳我急獨不一言乎曹公笑曰縳虎不得不急遂縊殺之又曰張遼字文逺為蕩冦将軍陳簡梅成叛太祖討之間入潜山中有天柱山遼遂進軍斬簡成首太祖論功曰登山履險遼之功也増封假節孫權率十萬衆圍合肥遼募其敢死者八百人登鋒陷陣大破之太祖遣遼屯合肥給遼母車輿軍馬送詣遼所勅遼母至所在令導從出迎觀者榮之江東小兒啼恐之曰遼來遼來無不止矣又曰許禇字仲康長八尺大十圍勇力絶人太祖初見曰此樊噲也即日拜都尉太祖征韓遂馬超等單馬㑹語褚從行馬超負其力欲前突素聞褚勇乃問太祖曰公有虎侯安在太祖指褚瞋目盻之超不敢動數日㑹戰大破超等軍遷武衛中郎将武衛之號自此始也又曰典韋形貌魁梧膂力過人好持大雙㦸與長刀軍中為之語曰帳下壯士有典君子提雙㦸八十斤太平御覽卷四百三十四
