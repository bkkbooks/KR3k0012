body:
  text: 太平御覽巻五百六十二宋李昉等撰禮儀部四十一諡諱忌日諡釋名曰古者諸侯薨時天子論行以賜諡惟王者無上故於南郊稱天以諡之當春秋時周室卑㣲臣諡其君故諸侯之諡多不以實也周禮曰太師凢大䘮帥其瞽而廞作柩諡鄭𤣥注曰廞興也興言王之行陳其生時迹為作諡又曰太史掌卿大夫之䘮賜諡讀誄其讀諡誄亦以太史賜諡禮曰己孤暴貴不為父作諡鄭𤣥注曰子事父母無貴賤等也又曰公叔文子卒其子戍請於其君曰日月有時將𦵏矣請所以易其名者諡者行之迹也君曰昔者衛國㓙饑夫子為粥與國之餓者是不亦惠乎君靈公也昔者衛國有難夫子以其死衛寡人不亦貞乎夫子聼衛國之政修其班制以與四鄰交衛國社禝不辱不亦文乎故謂夫子貞惠文子又曰㓜名冠字五十以伯仲死諡周道也又曰死而諡今也昔者生無爵死無諡昔謂殷以前也大夫以上乃謂之爵死有諡也又曰子曰先王諡以尊名節以壹惠恥名之浮於行也名為聲譽也先王論行為諡以尊名者使聲譽可得而也尊言也惠猶善也言聲譽雖衆節其行一大善者為諡左傳曰無駭卒無駭始為卿未賜族也羽父請諡與族公問於衆仲對曰天子建徳因生以賜姓祚之土而命之氏諸侯以字為諡因以為族官有世功則有官族又曰鄭人討幽公之亂斵子家之棺而逐其族改𦵏幽公諡之曰靈又曰楚恭王卒子囊謀諡大夫曰君有命矣子囊曰君命以為恭若之何毁之赫赫楚國而君臨之撫有蠻夷奄征南海以屬之夏而知其過可不得謂之恭乎請諡之恭大夫從之又曰衛侯賜北宫喜諡曰貞子賜析朱鉏諡曰成子論語曰子貢問曰孔文子何以謂之文也子曰敏而好學不恥下問是以謂之文也漢書曰景令諸侯薨列侯㓜封及之國大鴻臚奏誄䇿列侯薨及諸侯太傅初除之官大行諡奏誄䇿又曰賈山奏事曰聖王作諡三四十世耳雖堯舜禹湯文武累世廣徳以為子孫基業無過三四十世也秦始皇帝曰死而以諡法是父子名號有時相祖襲者以一至萬則世世不相復也故死而號曰始皇帝其次曰二世皇帝欲以一至萬也張蕃漢書曰范丹卒三府各遣令史奔弔累行論諡曰宜為貞節先生又曰蔡雍嘗至朱穆家寫書及穆卒雍及門人共諡穆曰忠文潘論曰夫諡上之所賜非下之所造顧周至徳不聞有諡蔡朱二子各以衰代臧否不立故私議也范􅁮後漢書曰夏侯恭善為文章諸儒共諡曰宣明子牙少習家業著賦頌讃凢四十篇舉孝亷早卒鄉入號曰文徳先生魏書曰有司議諡以為鍾繇昔為廷尉辨理刑獄决嫌明疑民無怨者猶于張之在漢也詔曰太𫝊功髙徳茂位為師傅論行賜謚當先體此亷叙廷尉于張之德耳乃諡曰成侯干寳晉紀曰何曾卒下禮官諡􅀶士秦秀議曰曾資性驕奢不修軌則奕世以来宰臣輔相未有受詬辱之聲被有司之劾父子塵累而蒙㤙貸若曽者也謹按諡法名與實爽曰繆怙威肆行曰醜曽宜諡為繆醜又曰太尉魯公賈充薨初充用韓謐為賈氏嗣上特許之及議謚博士秦秀曰充位冠羣俊惟民之望而悖禮溺情以亂大倫按諡法昏亂紀度曰荒充宜諡曰荒上弗從賜諡曰武晉書曰太康八年太常上諡故太常平陽男郭奕為景侯有司奏云晉受命以来祖宗號諡群下未有同者故郭奕與景皇同不可聴宜諡曰穆晉中興書曰中宗旣即尊號時賜諡多由封爵不考徳行王遵上䟽曰臣聞大行受大名小行受小名則實稱不誣而已近代以来惟爵得諡武官牙門有爵必諡鄉校常伯無爵悉不賜諡甚失制謚之本今中興肇建勲徳兼被宜深體前訓使行以諡彰豈可限以有爵中宗納焉自後公卿無爵而諡自遵始也沈約宋書曰江智淵出於北中郎長史初上寵姬宣貴妃殷氏卒使羣臣議謚智淵上諡曰懐上以不盡嘉號甚衘之後車駕至南山乘馬至殷氏墓群臣皆騎􅀙上以馬鞭指石柱謂智淵曰此柱上不容有懐字智淵益懼宋書曰劉康祖出軍至夀陽數十里㑹魏永昌王以長安之衆八萬騎與康祖相及於尉武康祖有八千人乃結車營而進魏軍四面来攻衆分為三且休且戰康祖率厲士將無不一當百魏軍死者大半流血沒踝矢中頭而死於是大敗舉營淪覆免者纔數十人魏人傳康祖首示彭城百姓贈益州刺史諡曰壯又曰蕭􅀈音􅎮素為諸暨令到縣十日掛衣冠於縣門而去獨居屏事非親戚不得至其籬門妻即齊太尉王儉女乆與别居遂無子卒親故迹其事行諡曰貞文先生又曰王曇首卒文帝臨慟嘆曰王詹事􅀁疾不救國之衰也中書舍人周赴侍側曰王家欲衰賢者先殞上曰直是我家衰耳以預誅羡之等謀追封預寕縣侯諡曰文又曰王晏為吏部尚書令王儉雖貴而䟽晏既令典選權行臺閣與儉頗不平儉卒禮官欲依王遵諡為文獻晏啓上曰遵乃得此諡但宋来不加素族出謂人曰平頭憲事已行矣後魏書曰孝文太和十六年改諡宣尼曰大聖尼父告諡孔廟齊書曰長沙威王晃武帝嘗幸鍾山晃從駕以馬矟刺道邊枯蘖上令左右數人引之銀纒皆卷聚而矟不出乃令晃復馳馬拔之應手便去毎逺州獻駿馬上輙令晃於華林中調試之髙帝嘗曰此我家任城也武帝縁此意故諡曰威任城即魏任城王彰也梁書曰蕭子顯卒請諡手勅曰恃才傲物宜諡曰驕又曰徐勉卒武帝聞而流涕即車駕臨殯皇太后亦舉哀朝堂有司奏謚居敬行簡曰簡執心决斷曰肅因諡簡肅公又曰蕭機字智通位相州刺史美姿容善吐納家既多書博學強記然而好㺯尚力逺士子近小人爲州專喜聚歛無政績頻被案劾將葬有司請謚詔曰王好内怠政宜諡曰煬又曰蕭曄爲晉陵太守曄初至郡屬旱躬自祈禱果獲甘潤郡多猛獸爲害曄在政此暴遂息卒於郡初曄寢疾厯年官曹擁滯有司按諡法言行相違曰僣乃諡曰僣侯陳書曰袁泌為司徒左長史卒于官臨終戒其子芳華曰吾於朝廷素無功績瞑目之後歛手足旋葬無得受賜諡其子述泌遺意朝廷不許賜諡曰質唐書曰開元中贈左丞相程行諶諡曰貞岐王府長史裴子闕白虎通曰諡者何也諡之為言引也引烈行之跡也所以進勸成徳使上務節也故禮特牲曰古者生無爵死無諡此言生有爵死當有諡也死乃諡之何言人行終始不能若一故據其終始從可知也士冠經曰死而諡之今也所以臨𦵏而諡之何因衆㑹欲顯揚之也諡或一言或两言何文者一言為諡質者两言為諡故湯死後稱成湯是明二言為諡也諡之十二品禮法諡曰翼善傳聖曰堯仁聖盛明曰舜慈惠愛民曰文剛徳理直曰武天子崩大臣至郊謚之者何以為臣子之義莫不欲褒稱其君掩惡揚善者故之郊明不得欺天也又曰卿大夫老歸死者有諡何諡者别尊卑彰有徳卿大夫歸無過猶有禄位故有諡也夫人無諡者何無爵故無諡或曰夫人有諡夫人一國之母修閨門之内羣下亦化之也故設諡以彰其善惡春秋傳曰𦵏宋恭姬傳曰其稱諡何賢也傳曰哀者何荘公大夫也卿大夫妻無諡者何賤也八妾所以無諡何婦卑賤無所能豫猶士卑小不得有諡太子夫人無諡何本婦随夫太子無諡其夫人不得有諡天子太子元士也士無諡知太子亦無謚也附庸所以無諡何卑小無爵也王制曰古者之制爵禄凢五等附庸不在其中明附庸無爵也號諡何法生稱火死稱炭也抱朴子曰上古無諡始於周家耳黄帝諡盖後人追為之諡取其法世時行迹而已非黄帝群臣之作也俗人通自不信仙寕肯追以仙諡黄帝乎穆天子傳曰為盛姬諡曰哀淑人荀氏家傳曰荀爽對策曰臣聞火生於木故其徳孝漢制使天下皆誦孝經選吏則舉孝亷以孝為務也列女傳曰魯黔婁先生死曾子與門人往弔焉曰何以為諡其妻曰以康為諡昔先王嘗賜之粟三十鍾先生辭而不受是其餘富也君嘗欲授之以國相先生辭而弗為是其餘貴也彼先生者甘天下之淡味安天下之卑位不戚戚於貧賤不急於富貴求仁而得仁求義而得義其諡為康不亦宜乎崔駰章帝議諡曰臣聞號者功之表諡者行之迹據徳録功各當其實孝經曰天地明察神明章矣唐書數堯之徳曰平章百姓言天之常徳也詩曰追琢其章金玉其相勉勉我王綱紀四方又曰倬彼雲漢為章於天喻文王聖徳有金玉之質猶雲漢之在天也舉表折義四方徳附矣易曰先天而天弗違後天而奉天時臣愚以宜上尊號曰章唐獨孤及諡吕諲曰肅嚴郢曰國家故事宰臣之諡有二字以彰善旌徳焉夫以吕公文能無害武能禁暴貞則幹事忠則利人盛徳宏規不可備舉傳叙八元之徳曰忠肅恭懿若以美諡疑於形容請曰忠肅及重議曰諡法在懲惡勸善不在字多必稱其大而畧其細故言文不言武言武不言文三代以下朴散禮壊乃有二字之諡非古也其源生於衰周漢興蕭何張良霍去病霍光俱以文武大畧佐漢致太平其事業不一謂一文不足以紀其善於是有文終文成景桓宣成之諡雖黷禮甚矣然猶褒不失人唐興㕘用周秦之制以魏徴為文貞蕭瑀為貞褊其杜如晦封徳彞陳叔達温彦博岑文本唐宋璟魏知古崔日用並當時赫赫以功名居宰相者諡不過一字不聞子孫佐吏有以字少稱屈由此言之二字不必為褒一字不必為貶若貶果在乎字數則是堯舜禹湯文武成康不如周威烈慎靚也齊桓晉文不如趙武靈魏安釐也杜如晦王珪以下或成或眀或懿或憲不如蕭瑀之貞褊也然肅者威徳充盛之名以諲之從政威能閑邪徳可濟衆故以肅易名而忠在其中矣亦猶隨㑹甯俞之不稱文豈必因而重之然後為美魏晉以来賈誼之籌筭賈逵之忠莊張記之政能程普之智勇顧雍之密重王渾之器量劉恢之察裁庾翼之志畧彼八君子者方之東平宜無慙徳死之日並諡曰肅當代不以爲貶何當懲一字二字以為之升降乎諱周禮曰小史掌邦國之志奠繫世辨昭穆若有事則詔王之忌諱志謂紀也先生死名忌名為諱禮曰禮不諱嫌名二名不偏諱逮事父母則諱王父母不逮事父母則不諱王父母逺不及也謂孤㓜不及識父母不至於祖名也孝子聞名心懼諱之由心也此謂妄人也適士也以廣事祖雖不見父母猶諱祖大夫之所有公諱避公諱也夫人之諱雖質公之前臣不諱也臣於夫人之家㤙逺也質猶對也婦諱不出門夫人與婦諱皆謂其家先世大功小功不諱入境而問禁入國而問俗入門而問諱又曰二名不偏諱夫子之母名徴在言在不稱徴言徴不稱在稱舉也又曰過而舉君之諱則起舉猶言也起立者失言而變自新與君之諱同則稱字謂人臣之名也又曰卒哭而諱自此而鬼神事之尊而諱其名王父母兄弟世父叔母姑姊妹子與父同諱父為其親諱則子不敢不從諱也諸王父母以不知親言是謂世也天子諸侯諱郡祖母之諱公中諱妻之諱不舉諸其例與従祖昆弟同名則諱之傳曰周人以諱事神名終將諱之君父之名固非臣子所斥然禮記卒哭而諱荀曰舎故而諱新謂舎親盡之祖而諱新死者故周人以本諱事神名終將諱之自父至髙禮皆不敢斥言蕭子顯齊書曰始安吴王道生字孝伯太祖次兄也子鳯字景慈卒於宋明帝贈始安靖王改革林鳯莊門為望賢門太極東堂畵鳯鳥題為神鳥而鸞為神雀南史曰王琨避諱過甚父懌母名恭心不得犯焉時咸謂矯枉過正又曰王亮王攸之子為晉陵太守在職清公有美政時有晉陵令沈瓉之性麄踈好犯亮諱亮不堪遂啓代之瓉之怏怏乃造坐云下官以犯諱亮被代未知明府諱若為猷字當作酋傍安犬猶字當爲犬旁安猶若有心悠無心攸乞告示亮不及履下牀跣而走瓉之拊掌大笑而去唐書曰賈増除中書舍人因辭以父忠同音識者以為中書是曹司名又與増父音同字異於禮無嫌増乃就職顔氏家訓曰近世謝舉甚有聲譽聞諱必哭為世所譏世説曰桓𤣥呼人温酒自道其父名既而曰英雄正自麄踈語林曰王藍田作㑹稽外請諱荅曰惟祖惟考四海所知過無復諱徐邈表不諱太子名義興太守禇爽上表稱皇太子名尚書下之禮官以議時其可否禮官議疑無適凖王聊率所見以論之曰禮記曰夫人之諱雖質君之前臣不諱也按夫人國之小君君之一體太子之母也而尚不諱則太子何嫌乎又禮君前臣名又周公告文王皆稱武王名可無諱也忌日禮曰君子有終身之䘮忌日之謂也忌日不用非不祥也言夫忌日志有所至而不敢盡私忌日親亡之日忌日者不日舉他事如有時日之禁也祥善也志有所至於親以此日其忌哀心如䘮時續漢書曰申徒與屠字同蟠字子龍父母卒蟠思慕不飲酒食肉十餘年忌日哀戚輙三日不食晉書曰穆帝納后欲用九月九日是忌月范汪問王彪之荅云禮無忌月不敢以所不見便謂無之博士曹耽荀納等並謂無忌月之文不應有妨王洽曰若有忌月當復有忌嵗唐書曰萬嵗通天中建安王攸宜平契丹凱旋欲詣闕獻俘内史王及善以為將軍將入城例有軍樂今屬孝明髙皇帝忌月請備而不奏鸞臺侍郎王方慶奏按禮經但有忌日而無忌月晉穆帝納后用九月九日是康帝忌月狐疑不定下太常禮官荀納議稱禮只有忌日無忌月語若有忌月即有忌時忌嵗軍樂是軍容與常不同請振作於事無嫌孔叢子曰季莭見於子順子順賜之酒辭問其故對曰今家之忌日也故子順曰飲也禮雖衰麻見于君先生君及先生與之梁肉無辭所以敬尊長而不敢遂其私也忌日方於有服輕矣蕭子廣孝子傳曰太平御覽卷五百六十二
