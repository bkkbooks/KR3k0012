front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_468-1a, image: WYG0897/WYG0897-0274a.png}
body:
  text: 太平御覽卷四百六十八宋李昉等撰人事部樂説文曰樂極也歡也易曰樂天知命故不憂毛詩曰王在在鎬豈樂飲酒禮記曰傲不可長欲不可從志不可滿樂不可極又曰樂者樂也君子樂得其道小人樂得其欲又曰子貢觀於蜡孔子曰賜也樂乎對曰一國之人皆若狂賜未知其樂也子曰百日之蜡一日之澤非爾所知也左傳曰公入而賦大隧之中其樂也融融姜出而賦大隧之外其樂也洩洩論語曰有朋自逺方來不亦樂乎又曰飯疏食飲水曲肱而枕之樂亦在其中矣又曰樂然後笑人不厭其笑又在陋巷人不堪其憂回也不改其樂又曰不仁者不可以長處樂戰國䇿曰魏文侯與虞人期獵是日飲酒樂天雨文侯出左右曰飲酒樂天又雨君將焉之文侯曰吾與虞人期獵雖樂豈可不一㑹期哉乃往身自罷之魏於是始强又曰梁王魏嬰觴諸侯於范臺酒酣請魯君舉觴魯君避席曰昔楚王登强臺而望崩山左江右湖以臨彷徨其樂忘死曰後代必有以髙臺陂池亡國者今君前夾林後蘭臺强臺之樂可無戒乎東觀漢記曰光武發薊還士衆喜樂師行鼓舞歌詠雷聲又曰東平王蒼曰為善最樂袁宏後漢記曰光武嘗聽朝至于日側講經至于夜半皇太子從容曰陛下有禹湯之明而失黄老養性之道今天下乂安願省思慮養精神優逰以自寛上荅曰吾以為樂也王沈魏書曰太祖告歸鄉里築室城外習讀書𫝊秋冬弋獵以自娱樂裴子野宋略曰廢帝於華林園為列肆親自酤賣又開瀆與左右引舡唱呼以為歡樂管子曰桀放虎入市樂人之驚晏子春秋曰景公飲酒數日去冠破裳自鼓盆問左右曰仁人者亦樂此乎晏子曰人所以貴於禽獸者以有禮也君無禮何以臨下景公請易衣冠又曰景公飲酒移於晏子前驅欵門曰君至晏子立於門曰國家得微有故乎君何為非時而夜辱公曰酒醴之味金石之聲願與夫子樂之晏子曰夫鋪薦席陳簠簋者有人臣不敢預焉又移於司馬穰苴介胄操㦸立門曰鋪薦席陳簠簋者有人臣不敢預焉又移於梁丘據據左援琴右挈竽行歌而至公曰樂哉今夕吾飲微二子何以治吾國微此一臣何以樂吾身也文子曰秦楚燕魏之歌異𫝊而皆樂也列子曰仲尼閒居子貢入侍而有憂色子貢不敢問出告顔回回援琴而歌孔子問曰若奚敢獨樂回曰吾昔聞諸夫子樂天知命故不憂回所以樂也又曰孔子逰泰山見榮啟期行乎郕之野鹿裘帶索鼓琴而歌孔子曰先生所為樂何也對曰吾樂甚多天生萬物人為貴吾既得為人一樂也男女之别男尊女卑吾既得為男二樂也人生有不見日月不免襁褓吾行年九十是三樂也貧者人之常死者命之終處常待終當何憂哉孔子曰自寛者也又曰林類年且百嵗辰春被裘拾遺穗於故畦並歌並進孔子適衛望之謂子貢曰彼叟可與言子貢逆之壠端面之歎曰先生曾不悔乎乃仰而應曰吾何悔耶吾所以為樂人皆有之而反以為憂少不勤行長不競時故能夀若此老無妻子死期将至故能樂若此莊子曰古之得道者窮亦樂通亦樂所樂非窮通也道得於此則窮通為寒暑風雨之序矣又曰與人和者謂之人樂與天和者謂之天樂又曰莊子與惠子逰濠梁水上莊子曰鯈魚出逰從容是魚樂也惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂又曰孔子謂顔回曰回來家貧居卑不仕乎對曰不願仕回有郭外之田五十畝足以給饘粥郭内之田十畝足以為絲麻孟子曰君子有三樂父母俱存兄弟無故一樂也仰不愧天俯不怍人二樂也得天下英才而教育之三樂也又曰樂人之樂人亦樂其樂憂人之憂人亦憂其憂從獸無厭謂之荒樂酒無厭謂之亡又曰梁惠王立沼上顧鴻鴈麋鹿曰賢者亦樂此乎孟子曰賢者而後樂此不賢者雖有此不樂也荀子曰子路問於孔子曰君子亦有憂乎孔子曰君子其未得也則樂其意既已得之又樂其治是以有終身之樂無一日之憂小人其未得則憂不得之既得之又恐失之是以有終身之憂又曰鳯鳴啾啾其翼若竽其聲若簫有凰有鳯淮南子曰令尹子佩請飲莊王莊王許諾子佩期之於京臺莊王不往明日子佩跣揖北面立於殿下曰昔君王許之今不果往意者臣有罪乎莊王曰吾聞子具於京臺京臺者南望獵山以臨方臯左江而右淮其樂忘歸若薄徳之人不可以當此樂也又曰吾所謂樂者人得其得者也夫得其得者不以奢為樂不以慊為悲與隂俱閉與陽俱開與子憂心戰而曜道勝而肥聖人不以身狥物不欲人為而自樂也顧子曰遇其樂也則欲荒滛流湎逮其喜也則欲歡笑鼓舞荒滛則傷義鼓舞則虧風又曰子謂子華曰爾有四樂頗知之乎子華曰未之知也子曰二親具存是爾一樂兄弟無故是爾二樂夫和妻柔是爾三樂披褐懐玉是爾四樂子華曰華乃有五遇千載之㑹而登夫子之堂則華之五樂也又曰或曰夫今三墳五典八索九丘盖聖人之陳迹耳子何好焉子曰上紀五帝之盛下述百王之義粲粲如列宿落落如連珠雖復退居窮處簞食瓢飲未始失其樂矣予可得無好乎賈誼書曰宓子治單父於是齊人攻魯道自單父始父老謂曰麥已熟矣今廹齊冦民不及刈穫請令民人自刈刈𫝊郭者歸可以益食不資冦三請宓子不聽俄而麥畢資乎齊冦季孫聞之怒使人讓宓子宓子曰今年失麥明年可樹令不耕者得穫是樂有冦也且一嵗之麥於魯不加强䘮之不加弱令民有自取之心必數年不息季孫聞之慙曰使穴可入乎吾豈忍見宓子哉揚雄連珠曰臣聞天下三樂焉隂陽和調四時不忒年豐物遂無有夭折灾害不生兵戎不作天下之樂也聖明在上禄不遺賢罰不偏罪君子小人各處其位衆人之樂也吏不苟暴役賦不重財力不傷安土樂業民之樂也劉向説苑曰楚昭王欲之荆臺逰司馬子綦進諫曰荆臺之逰左洞庭之陂右彭蠡之水南望獵山下臨方淮其樂使人遺老而忘死人君逰者盡以亡其國願大王勿往逰焉又曰齊景公逰海上樂之六月不歸令左右敢言歸者死顔燭諌曰君樂治海不樂治國彼至有治國者且安得樂此海也譙周法訓曰或曰君子處陋巷之中奚樂也曰樂得其親樂得其友樂聖人之道也劉向列女𫝊曰楚昭越姬者越王勾踐之女也昭王燕逰蔡姬在左右越姬驂乗駟以馳逐登附燕莊之臺以望雲夣之囿乃顧謂二姬曰樂乎吾願與子生死若此蔡姬曰故願生俱樂死同時顧謂史書之楚辭曰樂莫樂於新相知劉伶酒徳頌曰先生乃捧罌承糟銜盃潄醪無思無慮其樂陶陶曹子建箜篌引曰樂飲過三爵緩帶傾庶羞主稱千金夀賓奉萬年酬憂上説文曰憂愁也易曰作易者其有憂患乎又曰當其憂悔吝之時纎介不可慢也毛詩曰踧踧周道鞠為茂草我心憂傷惄焉如𢷬假寐永歎惟憂用老又曰知我者謂我心憂不知我者謂我何求又曰未見君子我心則憂左傳曰有喜而憂如有憂而喜乎又曰吳公子札來聘請觀周樂為之歌􅆁􅅠衛曰美哉淵乎憂而不困者也史記曰秦昭王臨朝歎息應侯進曰臣聞主憂臣辱主辱臣死今大王中朝而憂臣敢請其罪昭王曰吾聞楚之鐡劒利則戰士勇倡優拙則思慮遠矣以遠思慮而御勇士恐楚之圖秦也今武安君死鄭安平叛内無良將外多敵國吾是以憂又曰懐王使屈原造為憲令草稾未定上官大夫見而欲奪之不與因䜛之曰王使平為令衆莫不知每一令出平伐其功王怒而疎平平疾䜛諂之蔽明也邪曲之害公也方正之不容也故憂愁幽思而作離騷蜀志曰曹公征孫權權呼先主自救先主遣使告劉璋曰曹公征吳吳憂危急孫氏與孤本為脣齒又曰進在青泥與雲長相距今不往救進必尅轉侵州界其憂有甚於魯魯自守之賊不足慮沈約宋書曰武帝起桓𤣥聞之便憂懼無復計或曰劉裕等衆力甚弱豈能有成陛下何慮之𤣥曰劉裕足為一世之雄劉毅家無儋石之儲樗蒲一擲百萬何無忌劉牢之之甥酷似其舅共舉大事何謂無成吳越春秋曰越王欲復怨於吳冬寒則抱氷夏熱則握火憂苦其志懸膽於户出入嘗之不絶於口華陽國志曰蜀中𫝊相告曰井中有人學士靳普言客星入東井益州之分憂刺客入耳山海經曰牛首山有草名曰鬼目其葉如菜而莖赤其秀如禾服之不憂又曰霍山有獸如狸而白尾有鬛名曰朏朏可以忘憂又曰茈湖之水其中多鯈音修魚其狀如雞而赤毛白尾六足四首其音如鵲食之忘憂又曰顔淵東之齊孔子有憂色子貢下席問曰小子回東之齊夫子憂色何耶孔子曰善哉汝問昔管子有言丘甚善之曰䖏小者不可以懐大綆短者不可以汲深是為命有所成而形有所適不可損益也吾恐回與齊侯言堯舜黄帝之道而重以燧人神農之言彼將内求於巳而不得則惑也列子曰孔子謂顔回汝徒知樂天知命之無憂未知樂天知命之有憂之大也吾始知詩書禮樂無救於治亂而未知所以革之方此樂天知命者之所憂也孟子曰憂以天下太平御覽卷四百六十八
