body:
  text: 太平御覽卷三百八十三宋李昉等撰人事部二十四夀老說文曰老考也釋名曰六十曰耆耆指也不從力役指事使人也七十曰耄頭髪耄耄然也八十曰耋耋鐡也皮膚變異色如鐡也九十曰駘背背有駘文也或曰黄耈鬂髪變黄也耈垢也皮色驪悴恒如有垢也或曰胡耈皮如鷄胡也或曰凍梨皮有班㸃如凍梨色也或曰鬼齒大齒落盡更生細齒如小兒齒也百年曰期頤頤養也老惽不復知服味善惡孝子期扵盡養道也老朽也老不死曰仙仙遷也遷入山也周禮夏官司馬曰中春羅春鳥獻鳩以養國老是時鷹化為鳩鳩與春鳥變舊為新以冝養佐助生氣也禮記曲禮上曰六十曰耆指使七十曰老而傳八十曰耋九十曰耄百年曰期頤鄭元注曰耄昬忘也期要也頤養也不知衣服食味孝子養親期於盡道又曰大夫七十而致仕若不得謝則必賜之几杖行役以婦人適四方乘安車自稱曰老夫又檀弓上曰子夏哀其子而喪其明曽子弔之子夏哭曰天乎予之無罪曽子怒曰吾與汝事夫子扵洙泗之間退而老扵西河之上使西河之民疑汝扵夫子爾罪一也又曰王制曰養耆老以致孝又曰凡養老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人脩而兼用之五十養扵鄉六十養扵國七十養扵學逹扵諸侯天子諸侯養老同也五十異粻六十宿肉七十貳膳八十常珍九十飲食不離寢膳飲從扵逰可也五十始衰六十非肉不飽七十非帛不煖八十非人不煖九十雖得人不煖矣又曰五十杖扵家六十杖扵鄉七十杖扵國八十杖扵朝九十者天子若有問焉則就其室以珍從導養也七十不俟朝大夫士之老者揖君則退八十月告存每月致膳九十日有秩秩常也有常膳有虞氏養國老扵上庠養庶老扵下庠夏后養國老扵東序養庶老扵西序殷人養國老扵右學養庶老扵左學周人養國老扵東膠養庶老扵西膠又曰君子耆老不徒行庶人耆老不徒食又曰文王世子曰文王謂武王曰汝何夢矣武王對曰夢帝與我九齡帝天也文王曰古者謂年齡齒亦齡也我百爾九十吾與爾三焉文王九十七而終武王九十三而終又祭儀曰先王之所以治天下者五貴有徳貴貴貴老敬長慈㓜為其近扵親也又曰虞夏殷周天下之盛王也未有遺年者年之貴乎天下久矣次乎事親也又曰天子廵狩諸侯待于境天子先見百年者問其國君以百年者所在而往見之左傳隠公曰石碏使告于陳曰衛國􅄶小老夫耄矣無能為也又僖公上曰王使宰孔賜齊侯將下拜孔曰且有後命天子使孔曰以伯舅耄老加勞賜一級無下拜又僖公下曰秦晉圍鄭佚之狐言扵鄭伯曰國危矣若使燭之武見秦君師必退公從之辭曰臣之壯也猶不如人今老矣無能為也又㐮公六曰晋悼夫人食與人之城祀者絳縣人或年長矣無子而往與扵食有與疑年使之年使言其年曰臣小人也不知紀年臣生之嵗正月甲子朔四百有四十五甲子矣其季扵今三之一也吏走問諸朝師曠曰魯叔仲惠伯㑹郤成子扵承匡之嵗也七十三年矣又曰穆叔至自㑹見孟孝伯語之曰趙孟將死矣其語偷不似民主且年未盈五十而諄諄焉如八十九十者不能久矣又昭元曰天王使劉定公勞趙孟扵潁館扵洛汭劉子曰美哉禹功子盍亦逺續禹功而大庇民乎對曰老夫罪戾是懼焉能恤逺吾儕偷食朝不謀夕何其長也劉子歸以語王曰諺所謂老將至而耄及之者其趙孟之謂也又曰齊侯田扵莒蘆蒲嫳見泣且請曰余髪如此種種余奚能為種種短也自言衰老不能復為害又昭四曰楚靈王至乾溪聞羣公子之死也自投于車下曰人之愛其子也亦如予乎侍者曰甚焉小人老而無子知擠于溝壑矣尚書盤庚曰汝無侮老成人無弱孤有㓜又洪範曰五福一曰夀百二十年又無逸曰自時厥後立王生則逸生則逸不知稼穡之艱難不聞小人之勞惟躭樂之從自時厥後亦罔或克夀以耽樂之故從是其後亦無有能夀考又吕刑曰惟吕命王享國百年耄荒度作刑以詰起一切四方言吕侯見命為卿時穆王以享國百年耄荒亂忽雖老而能用賢以揚名論語里仁曰父母之年不可不知也一則以喜一則以懼孔子曰見其夀考則喜見其衰老則懼又微子曰齊景公待孔子曰若季氏則吾不能以季孟之間待之曰吾老矣不能用也孔子行爾雅曰耆老也尚書中候曰齊桓公欲封禪謂管仲曰寡人日暮仲父年艾韓詩外傳曰楚邱先生見孟甞君孟甞君曰先生老矣春秋髙矣多遺忘也何以教文先生曰使我投石斥距追車赴馬逐麋鹿摶虎豹吾則老矣使我探計謀設精神决嫌疑出正辭尚諸侯吾乃始壯耳何老之有孟甞君勃然汗出至踵曰文過耳又曰齊桓公見海邱人曰叟年㡬何對曰臣年八十三公曰美哉夀也論語䜟曰仲尼曰吾聞堯舜等逰首山觀河渚乃有五老逰河渚一老曰河圖將來告帝期二老曰河圖将来告帝謀三老曰河圖將來告帝書四老曰河圖將來告帝圖五老曰河圖將来告帝符龍銜玉苞金泥玉檢五老飛為流星上入􅄧宋均注曰龍浮扵水周書曰文王在鄗召太子發曰嗚呼吾身老矣吾語汝我所保與我所守汝勤之我傳之子孫吾厚徳其廣恵信忠而志愛不為驕役不為泰靡括柱而茅茨為民愛費也戰國策曰昔者秦魏為與國齊楚約攻魏魏使人求救扵秦冠葢相望秦救不出魏人有唐睢者年九十餘謂魏王曰老臣請西說秦令兵出可乎曰敬諾遂約車遣之見秦王秦遽發兵救之史記曰秦使百里奚子孟明視蹇叔子西乞術將兵行日百里奚蹇叔二人哭之繆公聞而怒二老曰臣非敢沮君軍軍行臣子與往臣老遲還恐不相見故哭耳又曰蔡澤從唐舉戯之乃曰富貴吾所自有吾所不知者夀也願聞之唐舉曰先生之夀從今以往者四十三嵗蔡澤笑而謝去謂其御曰吾持粱齧肥躍馬疾驅懐黄金之印結紫綬扵腰揖譲人主之前食肉冨貴四十三年足矣又曰王翦傳曰始皇問李信吾欲攻荆用㡬何人而足信曰不過用二十萬人始皇問王翦翦曰非六十萬人不可始皇曰王將軍老矣何怯也李將軍壯勇其言是也王翦因謝病歸老扵潁陽又曰王置酒太子侍四人從太子年皆八十有餘鬚眉皓白衣冠甚偉上怪之問曰彼何為者四人前對各言名姓曰東園公甪里先生綺里季夏黄公上乃大驚曰吾求公數嵗公避逃我今公何自從吾兒逰乎四人皆曰陛下輕士善罵臣等義不受辱故恐而亡匿竊聞太子為人仁孝恭敬愛士天下延頸欲為太子死者故臣來耳上曰煩公幸卒調護太子又曰伏生者㐲生名勝濟南人故秦博士也孝文欲求能治尚書者天下無有聞伏生能治召之是時伏生年九十餘老不能行乃詔太常掌故朝錯往受之又曰武帝使束帛加璧安車駟馬迎申公弟子二人乘軺傳從見天子天子問治亂之事申公時已八十餘對曰為治者不至多言顧力行何如耳又曰李少君以祠竈却老方見上自謂七十常從武安侯飲坐中有年九十餘老人少君乃言與其大父㳺射處老人為兒時從其大父行識其處一坐盡驚漢書曰文帝元年詔老者非帛不煖非肉不飽今嵗首不時使人存問長老又無布帛酒肉之賜將何以佐天下子孫孝養其親哉具為令有司請令縣道八十以上賜米人月一石肉二十觔酒五斗其九十以上又賜帛人二疋絮三斤賜勿及當廩鬻米者長吏閱視丞若尉致之又曰馮唐趙人也以孝著為中郎署長應劭曰此云孝子郎事文帝文帝輦過問唐曰父老何自為郎家安在具以實對又曰張蒼食乳女子為乳母妻妾百數曽孕子者不復幸由是百餘嵗乃卒又曰張安世宣帝下詔曰安世守職秉忠以安宗廟著節老臣令朝朔望號稱祭酒又曰石建為郎中令建老白首萬石君尚無恙每五日洗沐歸謁親入子舍竊問侍者取親中裙厠牏身自澣洒復予諸子孫咸孝然建特為甚又曰貢禹上書曰臣與犬馬之齒八十一血氣衰竭耳目不聰非能復有補益所謂素飡尸禄汚朝之臣也乞骸及身生歸鄉里死無恨矣續漢書曰仲秋之月縣皆案户比民年七十者授之玉杖長九尺端以鳩為餙鳩者不咽之鳥欲老人不咽所以授民也是月也祀老人扵國南東觀漢記曰馬援字文淵建武二十年武陵五溪蠻夷深入軍沒援因復請行年六十二帝愍其老未許之援自請曰臣尚能披甲上馬帝令試之援據鞍顧盼以示可用帝笑曰矍鑠哉是翁也遂遣援又曰閔仲叔客安邑老病家貧不能買肉日買一片猪肝屠或不肯為斷安邑令候之問諸子何飲食對曰但食猪肝屠者或不肯與令出勑市吏後買輙得叔怪問其子道狀乃歎曰閔仲叔豈以口腹累安邑耶遂去之又曰班超自以久在絶域年老思土上䟽曰臣常恐年衰奄忽僵仆不敢望到酒泉郡但願生入玉門闗魏志曰田豫為并州刺史徴為衛尉屢乞遜位太𫝊司馬宣王以豫剋壯書喻未聼豫書答曰年過七十而以居位譬猶鍾鳴漏盡而夜行不休是辠人也遂稱疾篤拜太中大夫食卿禄年八十二薨晋書曰華表太始中遷太常卿數嵗以老病乞骸骨詔以表清貞素履有老成之美而以疾固辭今聼如所上禄賜與卿同又曰劉寔字子真少貧賣牛衣好學厯吏部尚書封修陽子懐帝復授太尉辭以老九十一薨又曰祖逖進鎮雍邱畧定河外躬自勸督農桑克已施下百姓感悦置酒大㑹耆老坐中流涕曰某年老矣更得父母死復何恨又曰周訪少時遇善相時陳訓謂訪與陶侃曰二君皆位至方岳功名畧同但陶上夀周下夀優劣在年耳齊書曰虞玩之字茂瑶年老有疾請退表曰四十仕進七十懸車壯即馳驅老冝休息知足不辱臣知足矣後魏書曰畢衆敬篤老乞還桑梓朝廷許之臨還獻其珠當四具銀裝劒一口刺虎矛一枚仙人綾百疋文明太后與髙祖引見扵皇信堂賜酒饌車一乘馬三疋絹二百疋勞遣之又曰于結代人世祖初為散騎常侍遷侍中揔三十六曹事年一百七嵗精爽不衰世祖以其忠慤甚見信待詔聽歸老太寧賜東川以為居業并為築城即號曰羅侯城至今猶在又曰刁雍以耆年特見優禮賜以几杖杖履上殿因致珍羞焉甞經篤疾㡬死見神明救之言福門子當享長年後卒扵洛州刺史又曰尉元許致仕詣闕謝老引見扵庭命昇殿勞賜宴以𤣥冠素服又詔三老給上公之禄唐書曰太宗將伐遼召李靖入閣賜坐御前謂曰公南平呉㑹北清沙漠西定慕容惟東有髙䴡未服公意如何對曰臣往者憑藉天威薄展㣲効今殘年朽骨惟擬此行陛下若不棄老臣病其瘳矣帝愍其羸老不許又曰嚴綬才器不踰常品事兄嫂過謹為時所稱常以寛柔自持位躋上公年至大耋前後統臨三鎮皆號雄蕃所辟士親睹為將相者凡九人其貴夀如此周史曰蕭愿字惟恭梁宰相頃之子也初愿之曽祖倣唐僖宗朝入相接客之次愿為兒童効倣傳呼之聲倣謂客曰余豈敢以得位為喜所幸奕世夀考吾今又有曽孫在目前矣及愿長事父母以孝稱後為兵部郎卒之時年七十餘母猶在堂一門夀考人罕及者矣鬻子曰鬻子年九十見文王文王曰嘻老矣鬻子曰若使臣捕虎逐鹿則老矣使臣策國事則臣年尚少因立為師莊子曰盗跖曰人上夀百嵗中夀八十下夀六十孟子曰老吾老以及人之老又曰伯夷避紂居北海之濵太公避紂居東海之濵聞文王作興曰盍歸乎來吾聞西伯善養老者二老者天下之大老也而歸之是天下之父歸之天下之父歸之其子焉往抱朴子内篇曰余亡祖鴻臚少卿時常為臨沅令云此縣有廖氏家世夀老或出百年或八九十徙去生子孫轉多夭折人有居其故宅復累世夀由此覺是宅所為疑其井水殊赤乃試掘井左右得古人埋丹砂數十斛去井數尺此丹砂汁因泉水漸汚入井是以飲其水而得夀况乃持丹砂而服之乎六韜曰文王祖父夀百二十而沒王季百年而沒文王夀九十七而沒國語曰齊宣王出逰路見閭邱先生長老十三人謁齊王王賜之田衆老皆拜閭邱先生獨不拜又賜無役諸老復拜閭邱先生又不拜宣王疑而問之對曰來見大王所望者三愿賜臣夀賜臣富賜臣貴王曰天命有長短非寡人所制無以夀先生倉粟雖盈備灾畜無以富先生大官無闕小官卑賤無以貴先生先生曰所望愿王選良吏臣少得夀請使人以時役無煩苛此臣所以得富焉使少者敬長者長者敬老者此臣所以得其貴也王賜臣田田不租倉廪虛賜臣無役則官無所使非所望也王曰賜先生為相可乎先生曰臣得三愿足矣安用為相又曰子竒年十八齊君任為東阿既行而君悔焉使人追之囑使者曰未至追令還已至勿追未入東阿使者反之齊君問故使者曰臣見子竒同載者皆白首矣夫老者之智少者之决此必能治東阿矣王曰善哉又曰昔衛武公年九十五儆扵國曰苟在朝者無謂我老至而舍我也必恭恪扵朝夕以儆我聞一二之言志誦納之以訓導漢武故事曰上甞輦至郎署見一老髭鬚皓白衣服不完上問曰公何時為郎何其老矣對曰臣姓顔名駟江都人也文帝時為郎上問曰何不遇也駟曰文帝好文臣好武景帝好老臣又少陛下好少臣已老是以三世不遇上感其言拜為㑹稽都尉新序曰孔子見宋榮啓期年老白首衣弊服皷琴自樂孔子問曰先生老而窮何樂也啓期曰吾有三樂天生萬物以人為貴吾得為人一樂也人生以男為貴吾得為男二樂也人生命有傷天吾年九十嵗是三樂也貧者士之常死者人之終居常以守終何不樂乎說苑曰楚文王伐鄭使王子革子露居二子出逰老人戴畚從而乞食焉不與摶而奪之畚又曰晋平公問師曠曰吾年七十欲學恐晚如何對曰暮不炳燭耶臣聞少而學者如日出之陽壯而學者如日中之光老而學者如炳燭之明炳燭之明孰與昧行平公曰善哉善哉申鑒曰學夀不至夀可以盡命新論曰余前為王翁典樂大夫見樂家書記文帝時得魏文侯時樂人竇公百八十嵗兩目皆盲文帝竒之問何能服食而至此耶對曰年十三失明父母哀之教使鼓琴日講習以為常事臣不能道引無所服餌也譚以為少盲恒逸樂所以益性命也神仙傳曰淮南王安好道術八公乃詣門門者見其垂白不進公皆化成童子色如桃花門吏白王王迎之登思仙之臺張錦綺之帷設象牙之床燔百和之香進邊玉之几執弟子禮八公還成老人授之要道及郎中雷被譛安安與八公昇天所踐石皆䧟今人馬之跡在焉王子年拾遺録曰昔老􅅨當周之末居返景日室之山與世人絶跡惟有黄髪老叟五人或乘虎豹或乘鴻鵠衣毛羽之服眉覆扵目耳垂至肩兩眸子皆黒方面玉㓗手握青筠之杖出入于日室之中與老子談天文之數述異記曰尹雄年九十頭生角半寸世説曰顧恱與簡文同年而髪白簡文問曰卿何以先老答曰蒲桞之姿望秋而先零松栢之質逢霜而彌盛應璩詩曰昔有行道人陌上見三叟年各百餘嵗相與鋤禾莠住車問三叟何以得此夀上叟前置辭室内姬麄醜中叟前置辭量腹節所受下叟前置辭暮卧不覆首要哉三叟言所以能長久太平御覽卷三百八十三
