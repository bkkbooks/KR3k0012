body:
  text: 太平御覽卷六百二十九宋李昉等撰治道部十貢舉下制舉科附唐書曰貞觀中諸州所舉孝亷賜坐于御前上問以皇王政術及皇太子問以曾参説孝經並不能荅太宗謂曰昔楚莊王議事羣臣莫逮退而有憂色曰諸侯能自得師者王自謀而莫已若者亡今不榖之不徳羣臣莫吾逮吾國幾於亡乎朕發詔徴天下俊異纔以淺近問之咸不能答海内名哲將無一人耶朕甚憂之又曰貞觀中考功員外郎王師旦知舉時冀州進士張昌齡王公瑾並有俊才聲振京邑而師旦考其文策全下舉朝不知所以及奏等第太宗怪無昌齡等名因召師旦問之曰此輩誠有詞華然其體性輕薄文章浮艷必不成令器臣若擢之恐後生相效有變陛下風雅帝以為名言後並如其説又曰貞觀中文皇帝嘗私幸端門見進士綴行而出喜曰天下英雄入吾彀中矣又曰調露二年劉思立除考功員外郎先時進士但試策而已思立以其膚淺奏請帖經及試雜文自後因以為常又曰載初元年試貢舉人于洛城殿前數日方畢殿前試人自兹始也又曰景雲中制四方選集羣才輻輳操斧柯求之不逺其有能習二經通大義者綜一史知夲末者通三教宗㫖䆒精微者善六書文字辨聲象者傳雅曲度和六律五音者韜畧學孫呉識天時人事暢於詞氣聰於受領善敷奏吐納者咸令所司愽採明試朕親擇焉又曰長夀二年有左拾遺劉承慶上疏曰伏見比年以來天下諸州所貢物至元日皆陳在御前惟貢人獨於朝堂拜列則金帛羽毛昇于玊階之下賢良文學棄彼金門之外恐所謂貴財而賤義重物而輕人伏請貢士至元日列在方物之前以備充庭之禮制曰可又曰開元中詔謂州鄉貢進士見訖宜令領就國子監謁先師學官為之開讀質問疑義仍令所司優厚設食兩舘及監内得舉人亦準此其朝日官五品已上及朝集使並徃觀禮即為常式謁先師自此始也又曰開元中國子祭酒楊瑒上言曰伏聞承前之例毎年應舉常有千數及第兩監不過一二十人臣恐三千學徒虗費官廪兩監博士濫糜天禄臣竊見入仕諸色出身毎嵗尚二千餘人方於明經進士多十餘倍自然服勤道業之士不及胥吏以其效官豈識先王之禮義陛下設學斆務以勸進之有司課試十已退其八九考功及第十又不收一二若長以此為限恐儒風漸墜小道将興若以出身人多應湏諸色都减豈在獨抑明經進士上然之又曰開元中勅今之明經進士則古之孝亷秀才近日以來殊乖本意進士以聲韻為學多昧古今明經以帖誦為功罕窮㫖趣安得為敦本復古經明行修以此登科非選士取賢之道其明經自今以後每經宜帖十取通五以上免舊試一帖仍案問大義十條取六以上免試經策十條今若時務策三道取粗有文性者與及第其進士宜停小考與通及第其明經中有明五經已上試無不通進士中兼有精通一史能試策十條得六以上者委所司奏聼進止其應試進士唱第訖具所試雜文及策送中書門下詳覆其所問明經大義仍湏對同舉人考試度能否其知取舍無愧有功者逹可不勉歟又曰乾元初中書舍人李揆兼禮部侍郎揆嘗以主司取士多不考實徒峻其隄防索其書策殊未知藝不至者居文史之囿亦不能摛其詞藻深昧求賢之志也及其試進士文章日於庭中設五經諸史及切韻本于床而引貢士謂之曰大國選士但務得才經籍在此請恣尋檢由是數日之間美聲上聞又曰上元年劉嶢上疏曰國家以禮部為考秀之門考文章於甲乙故天下響應驅馳於才藝不務於徳行夫徳行者可以化人成俗才藝者可以約法立名故有朝登甲科而夕陥刑辟制法守度使之然也陛下焉得不改而張之至如日誦萬言何闗理體文成七歩未足化人昔子張學干禄仲尼曰言寡尤行寡悔禄在其中矣又曰行有餘力則以學文今舍其本而條其未况古之作文必諧風雅今之末學不近典謨勞心於卉木之間極筆於煙霞之際以此成俗斯大謬也昔者採詩以觀風俗詠卷耳則忠臣喜誦蓼莪而孝子悲温良敦厚詩教也豈主于滛文哉夫人之愛名如水之務下上有所好下必甚焉陛下若以徳行為先文藝為末必敦徳勵行以佇甲科鄷舒俊才沒而不齒陳寔長者㧞而用之則多士雷奔四方風動俗從于下聖理於上豈有不變者與又曰寶應初禮部侍郎楊綰奏請毎嵗舉人依鄉舉里選察秀才孝亷勅公卿以下集議中書舍人賈至議曰楊綰所奏實為正論然衣冠遷徙人多僑寓士居鄉里百無一二今依古制恐取士之道未盡今禮部每嵗擢甲乙之科祗足長浮薄之風啓僥倖之路矣其國子博士等望加員數十道大郡量署太學舘令愽士出外兼領郡官召致生徒依乎故事保桑梓者鄉里舉焉在流寓者庠序推焉如此則青青不復興刺擾擾由其歸本焉勅㫖毎州嵗察孝亷取在鄉閭有孝悌亷耻之行薦為秀才有司以禮待之試其所通之學五經之内精通一經兼能對策明逹于體理者並量行業授官又曰寶應初禮部侍郎楊綰奏貢舉條孝亷各令精通一經其取左氏傳公羊榖梁禮記周禮儀禮毛詩尚書周易任通一經每經問義十條皆取傍通諸義務窮根夲試策三道問古今理體及當時要務取堪行用者仍每日一道三道畢日經義及策全通為上第其上第者望付吏部便與官其問義毎十條通八策通二為中第與出身下者罷之又論語孝經皆聖人深㫖孟子亦儒門之逹者其學官望兼習此三者共為一經其試如上秀才舉望令精通五經問義十條對䇿日試一道全通者為上第送名中書門下請超與處分問義十條通八策通四為中第中第者送吏部與官下者罷之孝弟力田但能熟讀一經言音典切即令所司舉送試通便與出身今年舉人或舊業既習理難速改或逺州所送身已在途事湏收奨不可中廢其今秋舉人中有情願依舊舉業者亦聼今年之後一依新格勅㫖進士明經置來日乆今頓令改業恐難有其人諸色舉人宜與舊法並行又曰建中初中書舍人權知禮部貢舉趙賛奏應口問大義明經等舉人明經之目義理為先比來相承惟務習帖至于義理少有能通經術寝衰莫不由此今若頓取大義恐全少其人欲且因循又無方勸學請約舉司舊例稍示考義之難承前問義不拘文字落第之後喧競者多臣今請以所問録于紙上各令直書其義不假文言既與策有殊又事堪徴證慿此取舍庶歸至公如有義策全通五經舉人請準廣徳元年七月勅超與處分明經請减兩選伏請每嵗甄奨不過數人庶使經術漸興人知教本勅㫖明經義策全通者令所司具名聞奏續商量處分餘依議又曰建中初尚書左丞權知禮部貢舉顧少連奏伏以取士之科以明經為首教人之本則義理為先至于帖書及以對策皆形文字並易考尋試義之時獨令口對對答之失覆視無慿黜退之中流議遂起伏請準建中二年十二月勅以所問録於紙上各令直書其義不假文言仍請依經䟽對勅㫖宜依元和二年十二月禮部貢院奏五經舉人請罷試口義準舊試墨義十條五經通六便以入選詔從之又曰建中三年四月勅禮部應進士舉人等自今以後如試官并不合選諸色出身人有應舉者宜吿於舉司陳状準例考試如才堪及第者送名中書門下重加考覆如實才堪郎令所司追納吿身注毁官甲準例與及第至選日仍稍優與處分其正員官不在舉限又曰貞元中兵部侍郎陸贄權知貢舉時崔元翰梁肅文藝冠時贄輸心於肅與元翰遂置之首選升第之日雖衆望不惬然一嵗選士纔十四五數年之内居臺省者十餘人又曰元和初四月以起居舍人翰林學士王涯為都官員外郎吏郎員外郎韋貫之為果州刺史先是䇿賢良詔楊於陵鄭敬李益與貫之同考覆是時牛僧孺皇甫湜並李宗閔條對甚直無所畏避考官第其策皆居三等權幸或惡其詆己而不中第者乃註觧其策同為唱誹又言涯居翰林其甥皇甫湜中選考覈之際不先上言故同坐焉居數日貫之再黜巴州司馬涯虢州司馬楊於陵遂出為廣州節度裴垍時為翰林學士居中覆視無所同異及為貴倖泣訴請罪于上上不得已罷垍翰林學士除戸部侍郎又曰元和中權知禮部侍郎庾承宣奏臣有親屬應明經進士舉者請準舊例送考功考試從之又曰長慶元年勅今年錢徽下士鄭朗等一十四人宜令中書舍人王起主客郎中知制誥白居易等重試覆落十人三月丁未詔曰國家設文學之科夲求才實苟容僥倖則異至公訪問近日浮薄之徒扇為朋黨謂之闗節干擾主司毎嵗策名無不先定永言敗俗深用興懐鄭朗等昨令重試不求深僻題目貴觀學藝淺深孤竹管是祭天之樂出于周禮正經閲其程試之文都不知其夲事詞律鄙淺蕪累何多其孔温業等三人粗通可與及第其餘落第今後禮部舉人宜準開元二十五年勅及第人所試雜文并策先送中書門下詳覆又曰長慶中禮部侍郎王起奏曰伏以禮部放牓已是成名中書重覆尚未及第若重覆之中萬一不定則放牓之後逺近誤傳其於事理實為非便臣伏請毎年進士堪及第者夲司考試訖其詩賦先送中書門下詳覆後勅却下本司然後準舊例大字放榜從之又曰太和初以散騎常侍馮宿太常少卿賈餗庫部郎中龎嚴為考官䇿第二十二人而前進士劉蕡策最切直不居是選其間指陳時事不避貴近言詞激切士林感動雖晁董無以過也而考官有所畏忌不敢上聞随例擯斥識者之議喧然不平守道正人傳其文至有相對而泣者諌官等或将其䇿白于宰臣宰臣怯憚亦不敢為之明白登科人李郃者深有所愧抗奏請譲官于蕡事竟不行天復初李季述敗起居郎羅衮上疏請追贈蕡於是下詔贈左諌議大夫仍訪子孫叙用初蕡條對制策言宦官權盛後必為患及是果然也又曰太和中禮部侍郎李漢奏準太和七年八月初貢舉人不要試詩賦䇿目先帖大經小經共十帖次對正義十道次試論義各一首訖考覈放及第又曰太和八年中書門下奏進士放榜舊例禮部侍郎皆将及第人名先呈宰相然後放榜伏以委任有司固當精慎宰臣先知取舍事匪至公今年以後請便令放榜不用先呈人名其及第人所試文及鄉貫三代名諱並當日送中書門下便令定例又曰㑹昌三年勅禮部所放進士及第人數自今後但㨿才堪者即與不要限人數毎年止于十人五人摠得又曰㑹昌四年中書門下奏朝廷設文學之科以求髦俊䑓閣清選莫不由茲近縁覈實不在於鄉閭超名頗雜於非類致有䟦扈之地請計交通将澄化源在舉明憲臣等商量今日以後舉人於禮部納家状後望依前五人自相保其衣冠則以親戚故舊乆同逰處者其江湖之士則以封壌接近素所諸知者為保如有缺孝弟之行資朋黨之勢迹由邪徑言渉多端者並不在就試之限如容情故自相掩蔽有人紏舉其同保人並三年不得赴舉仍委禮部明為戒勵編入舉格勅㫖依奏又曰大中初禮部侍郎魏扶放及第二十三人續奏堪及第二人封彦卿崔瑑鄭延休等皆以文藝為衆所知其父皆在重任不敢選取其所試詩賦並封奉進止令翰林學士户部侍郎知制誥韋琮等考盡合程度其月二十三日奉進止並付所司放及第有司考試只合在公如渉狥私自有刑典從今已後但依常例取舍不得别有奏聞又曰大中初勅自今放進士牓後杏園任依舊宴所司不得禁制先是武宗好廵逰曲江亭禁人宴聚故也又曰大中九年吏部試宏辭舉人漏洩題目為御史所劾侍郎裴諗及國子祭酒郎中周敬罰兩月俸考官刑部郎中唐扶出為處州刺史監察御史馮顓罰俸一月其登科十人並落第又曰大中十年禮部侍郎鄭顥進諸家科目記十三卷勅付翰林自今放牓後填冩及第人姓名及所試詩賦題目進入内仍付所司逐年編次又曰大中十二年中書舍人李藩知舉放愽學宏辭科陳琬等三人及進詩賦論等召藩謂曰所試詩中重用字何如潘曰錢起湘􅂕鼓瑟詩有重用字乃是庶幾上曰此詩似不及起乃落第李肇國史補畧曰進士為時所尚乆矣是故俊乂由其中出者終身為聞人故争名常切其都㑹謂之舉塲通稱謂之秀才投刺謂之鄉貢得第謂之前進士互推敬謂之先軰俱捷謂之同年有司謂之座主京兆府考而升者謂之等第外府不試而貢者謂之㧞觧然㧞觧亦湏預託人為詞賦非謂白薦将試相保謂之合保羣居而試謂之私試造請權要謂之闗節激揚聲價謂之徃還既捷列名於慈恩寺謂之題名㑹大讌于曲江亭謂之曲江㑹曲江大㑹在闗試後亦謂之闗宴闗宴後同年各有所之亦謂之離㑹籍而入選謂之春闗不捷而醉飽謂之打毷氉匿名造牓謂之無名子退而肄業謂之夏課挾藏而入試謂之書策此其畧也其風俗繫于先逹其制置存于有司雖然賢士得其大者故位極人臣常有二三登顯列十有六七制舉科唐書顯慶三年二月志烈秋霜科韓思彦及第乾封元年幽素科蘓瓌解琬􅴓神容格輔彦徐昭劉納言崔谷神及第上元一年正月詞殫文律科崔融及第永隆元年岳牧舉垂拱四年十二月詞標文苑科房晋皇甫瓊王旦及第永昌元年五月蓄文藻之思科彭景直及第抱儒素之業科李文愿及第長夀三年四月臨難不顧徇節寕邦科薛稷㓂泚及第證聖元年長才廣度沉迹下僚科張漪及第通天元年文藝優長科韓璘琬及第神功元年九月絶倫科蘓頲崔𤣥童袁仁敬何鳳孟温禮洪子與盧從愿趙不欺及第大足元年理選使孟詵試㧞萃科崔翹鄭徽及第疾惡科馮萬石及第長安二年龔黄科馬克麾及第神龍三年才膺管樂科張大求魏啟心魏愔盧絢張文成禇璆咸慶業郭鄰趙不為及第才髙位下科馮萬石晁良正張敬及第三年才堪經邦科張九齡康元瓌及第賢良方正科蘇晉宋務光盧怡吕恂及第景龍三年抱噐懐能科夏侯銛及第茂才異等科王敬從盧重𤣥及第景雲二年文以經國科袁暉韓朝宗及第藏名負俗科李俊之及第先天元年文經邦國科韓休及第藻思清華科趙冬曦及第寄以宣風則能興化變俗科郭鄰之及第道侔伊吕科張九齡及第手筆俊㧞超越流輩科杜昱張于漸張秀明常無名趙居正賈登邢巨及第開元二年直言極諌科梁昇卿袁客及第哲人竒士逸淪屠釣科孫逖及第良材異等科邵閏之崔翹及第五年文史兼優科李昇期康子元達奚珣及第文儒異等科崔侃禇庭晦及第六年博學通議科鄭少微蕭誠及第七年文詞雅麗科邢巨苖晋卿禇思光趙良噐及第十二年将帥科裴敦復房自謙及第十五年武足安邊科鄭昉樊衡及第髙才沈淪草澤自舉科鄧景山及第十七年髙才未逹沉迹下僚科吴鞏及第十九年博學宏詞科鄭昉陶翰及第二十二年多才科李史魚及第二十三年王覇科劉璀杜綰及第智謀将帥科張重光崔圓李廣琛及第天寶元年文詞秀逸科崔明允顔真卿及第六年風雅古調科薛據及第十三年二月詞藻宏麗科楊綰及第大歴二年樂道安貧科楊膺及第六年諷諌主文科鄭珣瑜李益及第建中元年賢良方正能直言極諌科姜公輔元友直樊澤吕元膺及第文詞清麗科奚陟梁肅劉公亮鄭轅沈封呉通𤣥及第經學優深科孫玭黎逄白季随及第髙蹈丘園科張紳衡良儒蘓哲及第軍謀越衆科夏侯審平知和鄭儋凌正周渭丁俛及第孝悌力田聞于鄉閭科鄭黄中崔浩李牧及第貞元元年九月賢良方正能直言極諌科韋執誼鄭利用穆賢楊鄬裴復柳公綽歸登李直方崔邠鄭敬魏𢎞簡沈逥元佑徐衮及第博通墳典達于教化科熊執易劉簡甫及第識洞韜畧堪任将帥科許贄及第四年四月賢良方正能直言極諌科崔元翰裴次元季彛崔豐史牟陸震栁公綽趙參徐𢎞毅韋彭夀鄒儒立王迺杜倫元易王真及第清亷守節正直可稱堪任縣令科李巽及第孝弟力田聞于鄉閭科張浩及第十年十月賢良方正能直言極諌科裴垍王播裴度熊執易許堯佐徐𢎞毅崔羣皇甫鎛王仲舒許季同仲子陵鄭士材丘穎及第博通墳典逹于禮教科宋頴及第詳明政術可以理人科張平叔李景亮及第元和元年四月才識兼茂明于體用科元稹韋惇獨孤郁白居易曹景伯韋慶復崔綰羅譲薛存慶韋珩李蟠元修蕭俛沈傳師及第逹于吏理可使從政科陳岵及第二年四月賢良方正直言極諌科牛僧孺皇甫湜李宗閔李正封吉𢎞宗徐晦賈餗王起郭球姚衮庾威及第逹於吏理可使從政科蕭睦及第長慶元年十二月賢良方正能直言極諌科龎嚴任宛吕述姚中立韋曙李回崔嘏崔龜從韋正貫崔知白陳元錫及第詳明正術可以理人科崔郢及第軍謀宏達材任将相科吴思李商卿及第博通墳典逹於教化科李思𤣥及第寶歴元年四月賢良方正能直言極諌科唐中楊儉韋端符舒元褒蕭敞楊魯士來擇趙槐裴暉韋絲李昌寶嚴楚封李涯夷中馮球元晦及第詳明吏禮逹于教化科韋正貫及第軍謀宏逹材任邉将科裴儔侯雲章及第太和二年閏三月賢良方正能直言極諌科裴休裴素李郃南卓李申杜牧馬植鄭亞崔博崔璵王式羅邵京崔渠韓賔崔慎由苗愔韋昶崔煥崔讜及第詳明吏理達於教化科宋琨及第軍謀宏達堪任將帥科鄭冦李式及第太平御覽卷六百二十九
