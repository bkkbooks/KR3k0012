body:
  text: 太平御覽卷三百八十一宋李昉等撰人事部二十二美婦人下莊子曰西施毛嬙人之所美也魚見之深入鳥見之髙飛尹文子曰齊有黄公者好謙卑有二女皆國色甞謙辭毁之以為醜惡醜惡之名逺布年過而一國無敢聘者衛有鰥夫失時冒娶之果國色闞子曰西施自窺扵井不恃其美猶佐湯沐堯舜自窺扵世不恃其美猶湏才徳况中庸而拒諫嫫母自窺扵井以為媚扵西施桀紂自窺扵世以為賢扵堯舜韓子曰魏王遺楚王美女王甚悦之慎子曰毛嬙西施天下之至姱也衣以皮褐則見者皆走易以𤣥錫則行者皆止淮南子曰曼顔皓齒形姱骨佳不待脂粉芳澤而美者西施陽文也許慎註曰陽文楚好女也又曰蔡之㓜女衛之稚質纂組竒綵抑黒質陽赤文纂組織組也如今之綬也淺黒見赤其上也湯禹之智不能逮也言不能及二國女之行也神仙傳曰介象字元則㑹稽人入山求仙見谷上有石皆紫色如鷄子象取二枚見一美人被五綵象向之叩頭乞長生女曰汝急送手中物還著故處汝未應取此象乃送石還女授丹方一首穆天子傳曰赤烏之人獻二女于天子女聼女列赤烏氏美人之地也劉向列女傳曰蕭史者秦穆公時人善吹簫能致孔雀白鶴穆公女弄玉好之公以妻焉一朝隨鳳飛去續列女傳曰曹節弟破石為越騎校尉越騎營五伯妻有美色破石從求之五伯不敢違妻執意不肯行遂自殺襄陽耆舊紀曰楚襄王㳺雲夢望朝雲之餘上有雲氣宋玉曰昔先王逰髙唐怠而晝寢夢一婦人曖乎若雲皦乎若星將行未至如浮如傾對曰我帝季女名曰瑶姬未行而䘮封乎巫山之臺精魂為草實為靈芝西京雜記曰卓文君好眉色如望逺山臉際常若芙蓉肌膚柔如脂十七而寡為人放誕風流故悦長卿之才而越禮焉長卿作美人賦以自别王子年拾遺記曰魏文帝所愛美人姓薛名靈芸常山人也芸年十七容貌絶世時明帝選良家子入宫靈芸别父母歔欷累日淚下沾衣至升車就路之時玉唾壺承淚壺即如紅色及至京師壺中之淚凝如血矣又曰蜀先主甘后沛人生㣲賤里中相者云此女後貴位極宫掖及后長體貌特異年十八玉質柔肌態媚容冶先主置后白綃帳中户外望者如月下聚雪河南獻玉人髙三尺乃取玉人置后側常稱玉之所貴比徳君子况為人形而不可設乎后與玉人㓗白齊色觀者殆相亂惑嬖者非惟嫉扵后亦妬在玉人后欲毁之乃誡上曰昔子罕不以玉為寳春秋美之今呉魏未㓕安以妖玩經懷勿復進也上乃徹玉人衆嬖皆退當時以甘后為神智婦人又曰呉主潘夫人父坐法夫人輸入織室容態少儔江東絶色同幽者百餘人謂夫人曰神女敬而逺之有司陳扵呉主使圖其容夫人憂戚不食减瘦改形工人寫之以進呉主主見喜以琥珀如意撫案嗟曰此神女也愁貌尚能感人况在懽樂乃納于後宫又曰孫亮作緑瑠璃屏風每扵月下清夜舒之常愛寵四姬皆振古絶色一名朝姝二名儷姬三名㓗華四名洛寳又曰周成王時有因祗國去王都九萬里獻女士一人善扵工巧體貌輕㓗被纎羅雜繡之衣長袖脩􅅂風至則結其襟帶恐飄颻不能自止善織以五色絲引而結之則成文錦呉㑹分地記曰土城者勾踐時索美女欲以獻呉扵羅山得西施鄭旦作土城貯之使近道習見人令賢傅母教之三年段龜龍凉州記曰隠王美人張氏色豔出家為道乃自投門樓雙股頓折口誦經顔色自若俄而死鄴中記曰廣陵公陳逹妹才色甚美髪長七尺石虎以為夫人三國典畧曰崔孝芬取貧家子賈氏以為養女有姿色騰納之請以邑號又曰齊武成曽有疾自云初見空中有五色物稍近變成一美婦人去地數丈亭亭而立徐之才云此至靈所致即進湯服一劑便覺稍逺又服還變成五色物數劑疾平帝王世紀曰紂以鬼侯為三公鬼侯有女美而進之扵紂悦之妲己乃泣而譛之紂怒鬼侯女遂殺之而醢鬼侯何集續帝王世紀曰張天錫疾篤閻薛二姬並有國色天錫謂曰吾死之後汝二人豈可更為他妻皆曰尊若不諱請効死尊前誓無他志二人自殺天錫有瘳追悼二姬𦵏以夫人禮説苑曰齊王起九重之臺募國中有畫者賜之錢狂卒敬君居常饑寒妻端正敬君工畫貪賜畫臺去家日久思念其妻像向之憙笑旁人瞻見之以白王王即設酒與敬君相樂謂敬君曰國中獻女無好者以錢百萬謂妻可乎不者殺汝敬君傽惶聼許又曰太祖下鄴文帝先入袁尚府有婦女被髪垢面立紹妻後文帝問之答曰是熙妻顧攪髪以䄂拭面姿貌絶倫遂納之世説曰漢元帝宫人既多乃令畫工圖之欲有呼者輙披圖召焉其中皆行貨賂王昭君姿容甚麗志不可苟求工遂毁為甚醜終身不召後匈奴來和求美女扵帝以昭君充行既召見而嘆之又曰桓宣武平蜀以李勢妹為妾主始不知既聞與數十婢㧞白刃襲之温尚明帝女南康長公主正值梳頭髪籍地膚色玉曜不為動容徐曰國破家亡以至今日若能見殺乃其本懐主慙而退俗説曰宋禕是石崇妓緑珠弟子有色善吹笛後在晋明帝處帝􅐄患篤羣臣進諫請出宋禕帝曰卿諸人誰欲得之阮遥集時為吏部尚書對曰願以賜臣即與之典説曰司𨽻馮方女國色也避地揚州袁術登城見而遂納焉諸婦害其寵紿言將軍以貴人有志節但見時示憂色必長見敬重馮氏如其言術益哀之諸婦因絞懸之厠言自殺術誠以為不得志而死乃厚𦵏之方言曰娥㜲音盈好也秦曰娥言娥娥也宋謂之㜲言㜲㜲也秦晋之間凡好而輕者謂之娥自闗而東河淆之間謂之媌今闗西人亦呼好為媌吾交切或謂之姣言姣㓗也音皎趙魏燕岱之間曰姝音樞亦四方通語耳或曰妦言妦容也音蜂自闗而西秦晋之間故都曰忓秦舊都今扶風雍縣也晋舊都今太原晋陽縣也其俗通呼好為忓五于切又曰釥踖眇切嫽俗夭切好也青徐海岱之間曰釥或謂嫽今通呼小姣潔好者為嫽眇好凡通語也朦已紅切龎䲭鴻切豐也自闗而西秦晋之間凡大貌謂之朦或謂之龎豐其通語也娃烏佳反媠諸遇反窕途了反艷美也吳楚衡淮之間曰娃南楚之外曰媠言婑媠也宋衛晋鄭之間曰艷陳楚周之間曰窕自闗而西秦晋之間凡美色或謂之好或謂之窕故吳有舘娃之宫秦有㭍娥之臺㭍音七秦晋之間美貌謂之娥美狀為窕美色為艷美心為窈奕偞容也自闗而西凡美容謂之奕或謂之媟奕奕偞偞皆輕麗之貌也書記年曰梁武岷山獻女于桀二女曰琬曰琰桀受女刻其名于苕華之玉苕是琬華是琰楚辭曰姱容脩態絙洞房蛾眉曼睩目騰光又曰粉白黛黒施芳澤又曰美人既醉朱顔􅋳又曰室中之觀多珍怪蘭膏燭明華容備山海經曰丹山西郎巫山也帝女居焉宋玉所謂我帝之季女名曰瑶姬其間首尾一百六十里謂之巫峽葢因山名也崔豹古今注曰魏文帝宫人有穆瓊樹薛夜來陳尚夜陳巧笑瓊樹始製蟬鬢望之縹眇蟬翼故號曰蟬鬢桓譚新論曰或曰陳平為髙帝觧平城圍隠而不傳子能知乎曰陳平説閼氏言漢有美女其容貌天下無有今急馳使歸迎欲進單于單于見必愛之則閼氏言之單于而得免也六韜曰紂囚文王扵羑里散冝生受命而行宛懐條途之山有玉女三人冝生得之因費仲而獻之扵紂以免文王何承天纂文云孚瑜美色也服䖍通文云容麗曰媌莫豹切形美曰媠容美曰舘南楚以好為娃烏佳切肥骨柔弱曰婐烏果切􅀈奴果切頰妍美曰嫵七府切媚容茂曰㜰羊灼切越絶書曰越王勾踐得採薪二女西施鄭旦以獻呉王崔駰七依曰閭娵之孕既麗且閒紫脣素齒雪白玉暉廽眸百萬一咲千金孔子傾扵阿谷浮屠忘其桑門彭祖飛而溶集王喬忽而墮雲司馬相如上林賦曰若夫青琴宓妃之徒皆古神女名也絶殊離俗妖冶閒都靚粧刻餙又美人賦曰臣之東隣有一女𤣥髪豐艷蛾眉皓齒顔盛色茂景曜光起離宫閒舘寂寞重虛門閣晝掩曖若仙居芳香郁烈黼帳髙張有女獨處婉然在牀竒葩逸麗素質艷光辭不具載蔡邕恊初賦曰其在近也若神龍彩鱗翼將舉其既逺也若披雲掃漢見織女陳思王洛神賦曰其形也翩若驚鴻婉若㳺龍榮曜秋菊華茂春松髣髴兮若輕雲之蔽月飄飄兮若流風之廽雪逺而望之皎若太陽昇朝霞廹而察之灼若芙蕖出緑波濃纎得中脩短合度肩若削成腰如約素延頸秀項皓質呈露芳澤無加鈆華弗御丹脣外朗皓齒内鮮明眸善睞靨輔承權曹植扇賦曰情駘蕩而外得心悦豫而内安増吳民之姣好發西子之玉顔阮籍清思賦曰靨白玉以為靣披丹霞以為衣襲九英之曜精佩瑶光以發輝袁宏夜酣賦曰開金扇坐瓊筵衛姬進鄭女前形窈窕以纎弱艷妖冶而清妍似春蘭之齊秀象明月之雙懸宋玉神女賦曰楚襄王逰扵雲夢之浦使宋玉賦髙唐之事王夢神女其狀甚麗王異之明日以白玉玉曰其夢若何王曰見一婦人狀甚竒異撫心定氣復有所夢其始來也耀乎若白日初出照屋梁其少進也皎乎若明月舒其光穠不短纎不長歩裔裔兮耀殿堂忽兮改容婉若㳺龍乘雲翔王曰此盛矣試為寡人賦之玉曰夫何神人妖麗兮含隂陽之渥餙被華藻之可好兮若翡翠之奮翼其象無雙其極毛嬙又登徒子賦曰夫天下之佳人莫若楚國楚國之麗者莫若臣里臣里之美者莫若臣東家之子増之一分則太長减之一分則太短著粉則太白施朱則太赤眉如翠羽肌如白雪腰如束素齒如含貝又髙唐賦曰昔者先王常逰髙唐怠而晝寢夢一婦人曰妾巫山之女也為髙唐之客辭曰妾在巫山之陽髙唐之岨朝為行雲暮為行雨朝朝暮暮陽臺之下王曰朝雲始出狀若何玉對曰其始出也㬣兮若松榯其少進也晰兮若姣姬揚袂障日而望所思忽兮改容偈兮若駕駟馬建羽旗湫兮如風凄兮如雨風止雨霽雲無處所王粲神女賦曰髪似𤣥鑑鬢類刻成質素純皓粉黛不加朱顔照曜曄若春華口譬含丹目若瀾波美姿巧笑靨輔竒牙傳毅舞賦曰鄭女出進二八餙侍眉連媚以増繞目流涕而横波劉楨魯都賦曰衆媛侍側鱗附盈房娥眉青眸顔若濡霜含丹吮素巧笑妍詳掖耀日之珍笄珥明月之珠璫圭衣紛裶振佩鳴璜應瑒神女賦曰騰𤣥眸而俄青陽離朱唇而耀雙輔紅顔曄而和妍時調聲以笑語張衡舞賦曰裾若飛煙袖如廽雪窣若霆震閃若電滅扵是粉黛施兮玉質粲朱簮挺兮緇髪亂謝靈運江妃賦曰小腰㣲骨朱顔皓齒綿視騰采靡膚膩理含台二娥宫庭雙媛青袿晨接紫衣形見或飄翰凌烟或潛泳浮海萬里俄傾寸隂未改辭不具載魏文帝與繁欽書曰今之妙舞莫巧扵綘樹清歌莫激扵宋臘古詩曰青青河畔草鬱欎園中桞盈盈樓上女皎皎當牕牖娥娥紅粉粧纎纎出素手又曰燕趙多佳人美者顔如玉被服羅裳衣當户理清曲音響一何悲絃急知柱促願為雙飛燕銜泥巢君屋梁簡文帝晚景出行詩曰細樹含殘影春閨散晚香輕花鬢畔墮㣲汗粉中光梁徐悱妻詩曰東家挺竒麗南國擅容暉夜月方神女朝霞喻洛妃晋阮籍詩曰妖冶閒都子英曜何芬葩𤣥鬢發朱顔睇盼有光華又曰西方有佳人皎若白素光被服織羅衣左右佩雙璜又詩曰二妃逰江濵逍遥順風翔交甫懐玉佩婉孌有芬芳左思嬌女詩曰吾家有嬌女嬌女皎白晳小字為紈素口齒自清厯髻髪覆廣額雙耳似連璧明朝弄梳臺黛眉類掃跡傅元歌曰有女懐芬芳媞媞歩東廂蛾眉雙翠羽明眸發清光丹脣翳皓齒秀顔若圭璋巧笑露靨輔衆媚不可詳令儀希世出無乃古毛嬙手戴金歩揺耳繋明月璫李延年歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國寧不知傾城與傾國佳人難再得陸機艷歌行曰美目揚玉澤蛾眉象翠翰古樂府陌上桑行曰日出東南隅照我秦氏樓秦氏有好女自言名羅敷羅敷善蠶桑採桑城南隅青絲為籠繩桂枝為籠鈎頭上髪墮髻耳中明月珠鮑昭堂上行曰暉暉朱顔􅋳紛紛織女梭滿堂皆美女目我對湘娥筝笛更彈吹髙唱好相和曹植美女篇曰美女妖且閒採桑岐路間柔條芬苒苒落葉何翻翻攘袖見素手皓腕約金鐶頭上金雀釵腰佩翠琅玕太平御覽卷三百八十一
