body:
  text: 太平御覽卷五百六十七宋李昉等撰樂部五鼓吹樂四夷樂鼔吹樂樂志曰何承天云鼔吹盖短簫鐃歌軍器也黄帝使岐伯所作以揚徳建武漢曲有朱鷺思悲翁艾如張上之囘擁離戰城南至山上陵將進酒君馬黄芳樹有所思雉子班聖人出上耶臨髙臺逺如期石榴務成𤣥雲黄鶴釣竿魏改十二曲為之平戰滎陽獲吕布克官渡舊拜定功平南荆平門中應帝期邕熈太和晉武改為靈芝祥宣受命征遼東景龍飛平王衡因時運惟庸蜀天序金靈運夏苗畋秋獮田順天道至梁周随各述本朝功業随而改之以自揚其勲列又曰横吹有雙角即胡樂以從軍也張博望入西京傳其法於西京初得摩訶兠勒一曲李延年因胡曲更造新聲二十八解晉以来有黄鵠隴頭出塞入塞出闗入闗折楊桞落梅花黄潭子赤枝楊望行人十曲崔豹古今注曰漢樂有黄門鼔吹天子所以宴樂羣臣短簫鐃鼓吹之常亦以賜有功諸侯也唐㑹要曰太和中太常禮院奏謹按凱樂鼓吹之歌曲也周官大司樂主師大獻則奏凱樂注云獻功之樂也又司馬法曰得意則凱樂所以示喜也左氏傳載晉文公勝椘振旅凱以入魏晉已来鼓吹曲章多述當時戰功是則歴代獻㨗又有凱歌太宗平東都破宋金剛其後蘇定方執賀魯李勣平髙麗皆偹軍容凱歌入京都謹檢貞觀顯慶開元禮書並無儀注今㕘酌古今偹其陳設及奏歌曲之儀如後凡命將征討有大功獻俘馘首者其名曰偹神策兵衛於東門外如獻俘常儀其凱樂用鐃吹二部笛管簫笳鐃鼔每色二人歌工二十四人樂工等乘馬執樂器次第陳列如鹵簿之式鼓吹令丞前導分行於兵馬俘馘之前將入都門鼔吹振作迭奏破陣樂應聖期賀朝歡君臣同慶樂等四曲破陣樂詞曰受律辭元首相將討叛臣咸歌破敵樂共賞太平人應聖期詞曰聖徳期昌運雍熙方㝢清乾坤資化育海岳共休明開土欣耕稼銷戈遂􅅯兵殊方歌帝澤執贄賀昇平賀朝歡詞曰四美皇風被千年徳永清戎衣更不着今日告功成君臣同慶樂詞曰主聖開昌歴臣忠奉大猷君看隁草後便是太平秋候行至太社及太廟門二人下馬陳列於門外據周禮大司樂注云獻於祖大司馬云先凱樂於社謹詳禮儀明社廟之中似合奏樂㐲以尊嚴之地鐃吹讙譁既無明文或􅆾肅敬今請並於門外陳設不奏歌曲俟其獻禮畢復導引奏曲如儀至皇帝所御樓前兵㐲旌門外二十步樂工皆下馬徐行前進兵部尚書介胄執鉞於旌門内中路前導周禮師有功則大司馬左執律右秉鉞以先凱樂注曰律所以聼軍聲鉞所以示將威吹律聼聲其術乆廢請以秉鉞以存禮文次協律郎二人公服執麾亦於門外分導鼔吹令丞引樂工等至位立定太常卿於樂工之前跪具官臣某奏事諸奏凱樂恊律郎舉麾鼔吹大振作遍奏破陣樂等四曲樂闋協律郎偃麾太常卿又跪奏樂畢兵部尚書太常卿退樂工等並於門外立訖然後引俘馘入獻及稱賀如别儀晉書曰衛瓘領太子少傳加千兵百騎鼔吹之府又曰汝南王亮母伏太妃常有小疾祓於洛水亮兄弟三人侍從並持節鼔吹震耀洛濵武帝登凌雲臺望見曰伏妃可謂富貴矣又曰劉毅字仲雍轉司𨽻校尉皇太子朝鼓吹將入東掖門毅以為不敬止於門外奏劾保傅以下詔赦之然後得入又曰謝尚累位江夏義陽随三郡太守往諮事安西將軍庾翼於武昌翼呼共射曰君若破的當以鼓吹相賞尚應聲中之翼即以副鼓吹給之王隐晉書曰陶侃平蘇峻除侍中太尉加羽葆鼓吹晉中興書曰漢武時南平百越始置交阯九真日南合浦南海欎林蒼梧凡七郡立交阯刺史以州邉逺山越不賓宜加威重故刺史輒假節七郡皆加鼓吹齊書曰武帝時夀昌畫殿南閣置白鷺鼔吹二部乾光殿東西殿置鐘磬兩廂皆宴樂處也又曰王敬則臨淮射陽人也僑居晉陵南沙縣母為女巫常為人云敬則生時胞衣紫色後應得鳴鼔角人笑之曰汝子得為人吹角可矣又曰張敬兒將拜三司謂其妻嫂曰我拜後應開黄閣因口自為鼓吹聲初得鼓吹羞便奏之南史綦母珍之貴倖珍之母随弟欽之作暨陽令欽之罷縣還珍之迎母至湖孰輙將青􅌁百人自随鼓角横吹都下富人追從者百數又曰垣崇祖初於淮隂見髙帝便自比韓白唯上獨許之後為豫州刺史建元二年魏攻夀春崇祖破之啓至上謂朝臣曰崇祖恒自擬韓白今真其人也進為都督崇祖聞陳顯逹李安皆増給軍儀乃啓求鼔吹上勅曰韓白何可不與衆議給鼔吹一部又曰張興世致位給事中興世父嘗謂興世曰我雖田舎老翁樂鼔吹汝可送一部行田時欲吹之興世素恭謹畏法譬之曰此是天子鼓角非田舎翁所吹梁典曰髙祖衍生秣陵三樓橋宅生自有異光頂有五岳骨當還宅范雲聞鼓吹之聲雲䝉被出視乃髙祖也雲乃深自結託梁書侯景即位乃以廣桞車載鼓吹槖駞馬負犧牲輦上置筌蹄脚坐焉又曰胡僧祐字顯果為天水天門二郡太守性好葺級文詞又多鄙拙多被戱謔自矜尤甚後随伐侯景迴拜領軍將軍常以所加鼓部置齋中對之人或獻言此乃羽儀公望隆重不當如此答曰我愛之人莫不笑之陳書曰劉仲舉字徳言為長安令政號亷平陳文帝居鄉里嘗詣仲舉時天降雨仲舉獨坐齋内聞外有簫鼓聲俄而帝至仲舉異之乃深自結北史爾朱榮少時父新興曽與榮遊池上忽聞簫鼓音謂榮曰古老相傳聞此聲皆至公輔吾年老當為汝耳隋書曰鼔吹車上施層樓四角金龍衘流蘇羽葆凡鼓吹陸則樓車氷則樓船在殿廷則畫筍簴樓上有翔鷺棲鳥或為鵠形又曰蔡徴拜吏部尚書啓後主借鼔吹後主謂所司曰鼓吹軍樂有功乃授蔡徴不自揆量紊我朝章然其父景厯既有締搆之功自宜如啓唐書平陽公主塟特給鼓吹太常議婦人無鼓吹髙祖曰往者公主於司竹園舉兵應義親執金鼔有克定之功宜特加之又曰中宗時皇后上言自妃主及五品以上母妻請從婚塟之日特進鼓吹宫官亦准此左臺御史唐紹上䟽諌曰竊聞鼓之作本為軍容昔黄帝涿鹿有功以為警鼓征鼓有虛䕫孔雀鵰鶚争石墜崖壯士怒之類自昔功臣偹禮適得用之假如郊祀天地唯有宫懸而無案架故知軍樂之用尚不給於神祀豈容接於閨閫哉鄧徳明南康記曰雩都縣軍山絶峯髙崿逺望似舟船上有玉臺方廣數丈周迴盡皆白石柱上自然石覆如屋形風雨之後景氣明净頗聞山上鼓吹之聲吴質别傳曰質為北中郎將朝京師喜遲其到詔列鹵簿作鼔吹至闕而止江表傳曰孫策賜周瑜鼔吹為治舘舎策令曰周公瑾英俊異才與孤有總角之好骨肉之分前在丹陽發衆及船粮以濟大事論徳酬功此未足報也鄴中記曰石虎正㑹置三十步鼓吹三十步輙置一部十二人皆在平閣上去地丈餘又有女鼓吹摯虞新禮儀志曰漢魏故事將塟設吉凶鹵簿皆鼓吹新禮以吉事無駕凶事無樂宜除吉鹵簿凶服鼓吹虞按禮塟有客車郎吉駕之明文也徐廣車服注曰中朝公主有鼔吹幽明録曰晉臨川太守謝摛夜中聞鼔吹聲兄澡曰夜者隂間不及存將在身後及死贈長水校尉加鼔吹世説曰三都二京五經鼓吹俗説曰桓公作詩思不来輙作鼔吹既而得詩云鳴鵠響長阜歎曰鼓吹固自来人思語林曰陸士衡為河北都督日已被間搆内懷憂懣聞衆軍警角鼓吹曰我今聞此不如華亭鶴唳魏武帝令曰孤所以能常以少兵敵衆者常念増戰士忽餘事是以往者有鼓吹而使步行為戰士愛馬也不樂多署吏為戰士愛粮也王渾表曰吳國臨戰牙門將張秦黄辰騎督綦母倪勇㨗效武破賊制勝此三人之所致也秦辰巳亡今倪獨在昔伐蜀有小功戰牙門數人便加鼔吹至於滅一國而有未得鼔吹者臣愚昧謂聖詔賜倪鼓吹存録猛將以盡武人之力也陸機鼓吹賦曰原鼔吹之所始盖禀命於黄軒四夷樂毛詩谷風鼔鐘以雅以南以籥不僣為雅為南舞四夷之樂大徳徳廣所及也東夷之樂曰韎北夷之樂曰禁西夷之樂曰离南夷之樂曰任以為籥舞若是和而不僣矣周禮春官鞮鞻氏掌四夷之樂鄭𤣥注曰東方曰昧南方曰任西方曰朱离北方曰禁又曰旄人掌教舞散樂舞夷樂凡四方之以舞仕者屬焉散樂野人為樂之善者又曰春官韎師曰韎師掌教韎樂祭祀則帥其屬而舞之舞東夷之舞也禮記明堂位曰昧東夷之樂也任南蠻之樂也納蠻夷之樂於太廟言廣魯於天下也後漢書曰永寜初年西南夷禪國王獻樂及幻人明年元㑹作之於庭安帝與羣臣共大竒之又曰陳禪字繼山為諌議大夫西南禪國獻樂及幼人能吐火自支解易牛馬頭大㑹作之於庭禪離席舉手曰帝王之庭不宜作四裔之樂五經通義曰東裔之樂持矛舞助時之生南夷之樂持羽舞助時之養又曰舞四裔之樂明澤廣被四表也東夷之樂曰侏離南故太寜末又訪防夫等增益之咸和中乃復直太一官鳩習遺逸又未有金石也初荀朂既以新律造三舞次更脩正鐘磬朂一事猶不竟元康三年詔其子黄門郎蕃脩定又曰吴公卿奏曰烈祖未制樂武非所以昭徳著功夫歌以誄徳武以象事於文武為斌兼秉文武聖徳所以彰明也又曰武帝永初元年有司奏皇朝肇建廟祀應設雅樂乃晉樂也太常鄭鮮之等各撰立新歌黄門侍郎王韶之撰歌七首並令施用十二月又奏依舊正朝設樂改太樂諸歌詩王韶之撰二十二章又改正徳舞曰前舞文恱舞曰后武文帝元嘉九年大樂令鍾宗之更調金石至十四年治書令史奚縱又改之二十二年南郊始設登歌詔顔延尚書周官二公𢎞化寅亮天地也上夀酒奏介雅取詩君子萬年介爾景福也食舉奏需雅取易雲上於天需君子以飲食宴樂也徹饌奏雍雅取禮記大饗客以雍徹也並三朝用之犧牲出入宋廢帝元徽二年儀注奏引牲齊及梁初亦同至是改為滌雅取禮記帝牛必在滌三月薦毛血宋元徽三年儀注奏加薦至是為牷雅左氏傳牲牷肥腯北郊明堂太廟並同用降神及迎送宋元徽三年儀注奏昭夏齊及梁初亦同至是改為諴雅取尚書至諴感神皇帝飲福酒宋元徽三年儀注奏加胙至齊不改梁初為永胙至是改為獻雅取記祭統尸飲五澆玉爵獻即今之福酒亦古之獻義也北郊明堂太廟同就燎位宋元徽三年儀注奏昭逺及齊不改就理位齊永明六年儀注奏𨽻幽至是燎埋俱奏禋雅取周禮大宗伯以禋祀昊天上帝也衆官出入宋元徽三年儀注奏肅咸樂齊及梁初亦同至是改為俊雅取禮記司徒選士之秀者而升之於學曰俊士也二郊太廟明堂三朝同用焉其辭並沈約所製是時禮樂制度粲然有序鼔吹宋齊並用漢曲又充庭用十六曲武帝乃去其四留其十二合四時也更製新歌以述功徳天監七年時有事太廟詔曰禮云日齋不樂今親奉始出宫振作鼔吹外可詳議八座承郎叅議請輿駕始出鼓吹從而不作還宫如常儀帝從之遂為定制初武帝之在雍鎮有童謡云襄陽白銅蹄反縳揚州兒識者言白銅為金蹄為馬也白金色及義師之興實以鐡騎揚州之士皆靣縳果如謡言故即位之後更造新聲帝自為之詞三曲又令沈約為三曲以被管絃帝既篤敬佛法又制善哉天樂大歡天道仙道神王龍王滅過惡除愛水斷苦輪等十篇名為正樂皆述佛法又有法樂童子伎童子倚歌􅆊㖵設無遮大㑹則為之其後臺城淪沒侯景以簡文女溧陽公主為妃請帝及主母范淑妃宴於西州奏梁所常用樂景儀同索超世亦在宴筵帝􅏰然屑涕景曰陛下何不樂也帝强笑曰丞相言索超世聞此以為何聲景曰臣且不知何獨超世又曰南詔樂貞元十六年正月南詔異牟尋作奉聖樂舞因西川押雲南入國使韋􅆏以進時御麟徳殿中閲之又曰髙昌樂西魏與髙昌通始有此樂至隋開皇六年来獻聖明樂曲至太宗朝伐其國盡得其樂事見十部伎門又曰扶南天竺二國樂隋代全用天竺列於樂部不用扶南因煬帝平林邑國獲扶南工人及其匏琴朴不可用但以天竺樂轉冩其聲又曰龜兹樂自吕光破龜兹得其聲吕氏云其樂分散至後魏有中原後獲之至隋有西國龜兹之號凡三部開元中大盛於時曹婆羅門者累代相承傳其業至孫妙逹尤為北齊文宣愛之每彈常自擊和之及周武帝聘突厥女為后西域諸國皆来媵遂薦有龜兹踈勒康國安國之樂又曰髙麗樂百濟樂貞觀中滅二國盡得其樂至天后時髙麗樂猶二十五曲貞元末唯能習一曲衣服亦漸失其大風矣其百濟樂至中宗時工人死散開元中岐王範為太常卿復奏置焉又曰踈勒樂工人皂絲布頭巾絲布袍錦衿㬓白絲布袴舞二人白襖錦䄂赤皮靴赤皮𢃄樂用竪箜篌琵琶五絃琵琶横笛簫觱篥荅臘鼔腰鼔鷄樓鼔康國樂工人皂絲布頭巾緋布袍錦領舞二人緋襖錦袖緑綾褌襠褲赤皮鞾白褲帑舞急轉如風俗之胡旋乞寒者本西國外蕃之樂也神龍二年三月并州清源縣尉吕元泰上疏曰臣謹按洪範八政曰謀時寒若能謀事則時寒順之何必祼露形體澆灌衢路鼓舞跳躍而索寒也禮曰立秋之月行夏令寒暑不節隂陽不調政令之失也休咎之應君臣之感也理均影響可不戒哉至景雲二年左拾遺韓朝宗諌傳曰辛有適伊川見被髪於野祭者曰不及百年此其戎乎其禮先亡矣後秦晉遷陸渾之戎于伊川以其中國之人習戎狄之事一言以貫百代可知今之乞寒濫觴胡俗伏願三思等其所至先天二年十月中書令張説諌曰韓宣適魯見周禮而歎孔子㑹齊數倡優之罪列國如此况天朝乎今外國請和選使朝謁所望接以禮樂示以兵威雖曰戎狄不可輕易焉知無駒支之辯由余之賢哉且乞寒潑胡未聞典故祼體跳足盛徳何觀揮水投泥失容斯盛法殊魯禮襲此齊優恐非羽干柔逺之義罇爼折衝之道願擇芻言特罷此戯至開元元年十二月勅臘月乞寒外蕃所出漸浸成俗因循已乆自今以後無問蕃漢即宜禁㫁樂府雜録曰舞有骨鹿舞胡旋俱於一小圓毯子上舞縱横騰擲兩足終不離於毯上其妙皆若夷舞也太平御覽卷五百六十七
