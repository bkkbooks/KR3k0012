  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_698-1a, image: WYG0899/WYG0899-0245a.png}
body:
  text: 太平御覧卷六百九十八宋李昉等撰服章部十五屦屐屣鞾屩屧屦釋名曰屦拘也所以拘足也說文曰屦履也一曰鞮也詩曰葛屦五兩冠綏䨇止又葛屦曰紏紏葛屦可以履霜周禮曰屦人掌王及后之服屦為赤舄黒舄赤繶黄繶青句素屦葛屦􅃨下曰舄单下曰屦古人言屦以人言屦以通于单勾當為約赤繶通于􅃨下為下縁也黄繶以赤黄之絲辨外内命夫命婦之命屦功屦散屦功屦次命屦散屦去飾者大戴禮曰入於戸未嘗越屦是髙柴之行也禮曰侍坐於長者屦不上堂觧屦不敢當階就屦地而舉之屏于側向長者而履跪而遷屦俯而納屦又曰戸外有二屦言聞則入言不聞則不入毋踐屦毋踖席又曰國家靡君子不履絲屦左傳曰齊侯逰于姑棼遂田于貝丘貝丘齊地見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼墜於車傷足䘮屦反求屦於徒人費弗得鞭之見血又曰楚子使申舟聘于齊曰無假道于宋及宋華元曰過我而不假道鄙我也鄙我亡也亡一也乃殺之楚子聞之投􅃑而起屦及於窒皇劍及於寝門之外又曰齊晉戰于鞍郤克傷矢流血及屦未絶皷音又曰呉伐越越子禦之大敗之虛姑浮以戈擊闔廬傷将指取其一屨榖梁傳曰公弟叔盻其曰弟叔盻賢之也宣公殺赤而非之織􅋰而食終身不食宣公之食孟子曰許行自楚之􅅬其徒数十人皆衣褐捆􅋰織席以為食屐釋名曰屐搘以踐泥也為兩足搘以踐泥也帛屐作支如屩者也不曰帛屩而曰帛屐者屩不可以踐泥屐可以踐泥也故謂之屐漢書曰袁盎使呉吳王使圍守之乃力决帳直出屐行七十里東觀漢記曰范昇奏云伏見太原周黨東海王良山陽王戎使者三到乃肯就車脱衣觧屐昇于華轂晉書曰宣王初欲追諸葛於闗中多蒺藜乃使軍吏二千着軟材木屐前行然後進晉宣帝雜教云當預作太平木屐遇踐時有蒺藜悉着屐蒺藜着屐底又曰謝安遣弟石及從子𤣥征符堅所在皆克安方對客圍碁有驛書到碁畢還内過戸限心喜不覺屐齒折又曰王述性急嘗食鷄子以箸刺之不得便怒擲於地鷄子圎轉不止便下以屐齒踏之不得嗔甚掇口中嚼而吐之又曰祖約好財阮孚好着蠟屐同是累而未判其得失有詣約見正料財物客至屏當不盡餘两小簏着背後傾身障之意未能平或有詣阮見正蠟屐因歎曰未知一生當着幾量屐神色閑暢於是勝負始分又曰石勒擊劉曜使人着鉄屐施釘登城晉中興徴祥說曰舊為屐者齒皆逹名曰露卯泰元中忽不復徹名陰卯亦服妖也識者以為卯謀也必有陰謀烈宗末驃騎恭軍袁恱之始有陰謀之事及隆安遂致大􅅍宋書曰謝靈運好山水尋山陟嶺必造幽峻岩嶂数十里莫不備盡登躡常着木屐上山則去其前齒下則去其後齒又曰虞玩之髙帝鎮東府朝廷致敬玩之為少府猶躡屐造席髙帝取屐視之訛黒釘脱蒵斷以草接之問曰卿此屐已幾載玩之曰初釋褐拜征北行佐買之着已三十年貧士竟不易辦髙帝咨嗟因賜以新屐玩之不受問其故荅曰公之賜恩華俱重但舊簮弊席復不可遺所以不敢當帝善之又曰劉凝之有嘗認其著屐笑曰僕著已敗今家中覔新者償君此人後田中得所失送還不肯復取齊書曰沈麟士昔嘗行路隣人認其所著屐麟士曰是卿屐耶即跣而反隣人得屐送前者還之麟士曰非卿屐耶笑而受之蕭子顯齊書曰襄陽有盗發古塜者傳云是楚王冢獲玊屐玉屏風梁書曰范亷為呉興太守廣陵髙爽有險薄才客於亷委以文記爽嘗有求不遂乃為屐謎以喻亷曰刺鼻不知啑蹋面不知瞋齧齒作歩数持此得勝人譏其不計耻辱以此取名位論語隠義注曰孔子至蔡觧於客舎人夜有取孔子一隻屐去盗者置屐於受盗家孔子屐長一尺四寸與凢人屐異孔叢子曰孔穿振方屐見平原君宗元嘉起居注曰劉禎弹廣州刺史韋朗􅂍有白荆屐六七十量風俗通曰延加中京師長者皆着木屐婦女始嫁作漆􅀞屐五色綵為系後黨事起九族俱繫婦人桎盖木屐之像世說曰王子敬兄弟見郄公躡屐問訙甚修外生禮及嘉賔死着髙屐儀容輕慢毎命坐皆云有事不暇坐郄公慨然曰若使嘉賔不死䑕軰敢爾語林曰鄭𤣥在馬融門下業成辭歸融心忌之鄭𤣥亦疑有追乃坐橋下㨿屐融果轉式逐之告左右曰𤣥在土下水上而㨿木必死矣遂罷追竟以免華陽國志曰何随家養竹人盗其筍随行見恐盗者覺挈屐而歸皇甫謐髙士傳曰袁閎字夏甫汝南人也築室於庭首不著布身無单衣足著木屐汝南先賢傳曰戴良嫁女布裳木屐秦記曰苻健皇始四年新平縣有長人見語民張靖曰苻氏應天受命當太平健以為妖妄下靖獄是月河渭溢浦津監冦登於河中得隻屐長七尺三寸跡稱履五指長尺餘文深一寸登以獻健因赦靖劉欣期交州記曰趙嫗者九真軍安縣女子乳長数尺不嫁入山聚羣盗常着金擒踶屐庾仲雍荆州記云劉盛公枝江人桓司空臨州與上佐逰於靈溪盛公詣市還着皂盖布裙以杖荷屐詣桓司空神仙傳曰左慈見孫討逆孫著鞭驅馬慈著木屐䇿杖徐歩然終不能及乃止捜神記曰昔作屐婦人圓頭男子方頭盖作意欲别男女也太康婦人皆方頭屐與男無異集異記曰廣平游先期妄見一人着赤袴褶知是其魅乃以刀斫之乃死良久方變是所常着屐異􅁐曰介子推逃禄隠跡抱樹燒死文公拊木哀嗟伐而製屐毎懷割股之功俯視其屐曰悲乎足下足下之稱實起於此又曰丹陽縣有梅姑廟姑生時有道術能着屐行水上後負道法婿怒殺之投其屍於水上乃随波流漂至今廟處晦望之日時見水霧中暧然有屐夣書曰粗屐為使令卑賤􅁼也夣得麄屐得僮使之也王褒僮約曰持斧入山斷輮裁轅若有餘材當作爼几木屐屣說文曰屣鞮属也鞮革履也史記曰漢孝武帝云使朕誠得如黄帝視弃妻子如脫屣耳魏志曰王粲字仲宣蔡邕見而竒之賔客盈坐聞王至倒屣迎之後漢書曰皇甫規有當世重望鄉人有行賄為郡守謁規規卧不起聞王符至遂倒屣而迎春秋後語曰魏太子擊逢文侯之師田子方於朝歌朝歌紂之所都今衛州地引車避下謁之田子方不為禮太子擊因問曰富貴者驕人乎貧賤者驕人乎子方曰貧賤者驕人耳夫諸侯而驕則失國大夫而驕則失家富貴者安敢驕人貧賤驕人耳行不合言不從則去之楚越若脫屣然太子不懌而去淮南子曰尭之有天下也年衰志悶舉天下而傳之舜猶邦行而脫屣孟子曰舜視弃天下猶弃弊屣也世說曰何晏為吏部尚書王弼未弱冠徃見之晏倒屣迎之鞾釋名曰鞾本戎服也趙武靈王服之北齊書曰鄭太妃初與神武避葛榮同走并州負困燃馬屑自作靴又曰任城王諧為并州刺史有婦人臨汾水浣衣有乘馬人換其新靴而去婦人持故靴詣州言之諧召城外諸嫗以靴示之紿曰有乘馬人於路被賊刼害遺此靴焉得無親属乎一嫗撫膺哭曰兒昨服此靴向妻家如其語捕獲一時稱明察後魏書曰有人遺趙柔鞾數百枚柔與子善明鬻之於市有人從柔買柔索絹三十疋有商人知其賤與柔三十疋善明欲取之柔曰與人交易一言便定豈可以利動心也遂與之唐書曰建中初贈司徒沈易良之妻崔氏即太后之季父母也上見之方屣而鞾鄴中記曰石虎皇后出女騎千人皆着五綵織成靴列仙傳曰仙人文賔太丘人也賣靴為業魏武與楊彪書曰今遺足下織成靴二量慕容晃與顧和書曰今致綉靴一量傅咸表曰涼州民先辦靴從軍之物然後作衣屩音脚說文曰屩屐也釋名曰屩草􅋰也出行着之屩輕便因以為名也春秋後語曰趙相虞卿躡屩擔簦來說孝成王王說賜白璧一䨇黄金百鎰再見拜為上卿故號虞卿謝承後漢書曰江夏劉勤貧作屦供食常作一量縷㫁勤置不賣出行妻賣以糴米勤歸而炊熟怪問何所得米妻以實告勤責妻曰賣毁物欺取其直也因弃不食仕至司徒宋書曰劉敬宣嘗夜與僚佐宴空中有投一隻芒屩於坐墜敬宣食盤上長三尺一寸已經人著耳鼻間並欲壊頃之敬宣叅軍司馬道賜反敬宣為其所害又曰張暢在彭城為魏太武所圍太武遣李伯至城欲與暢語李伯君南土膏粱何為着屩君而着此使将士云何暢曰膏梁之言武誠為愧但以不武受命統軍戎陣之間不容綏服齊書曰沈瑀為餘姚令瑀初至富吏皆鮮衣美服自彰别瑀怒曰汝等下縣吏何得自擬貴人悉使着芒屩粗布侍立終日足有蹉趺輙加榜捶又曰禇彦回幼有清譽宋元嘉末魏軍逼𤓰歩百姓咸負擔而立時父湛之為丹陽尹使其子弟並着芒屩於齋前習行或譏之湛之曰安不忘危彦回時年十餘甚有慙色梁書曰侯景即位童謡曰脫青􅂁着芒屩荆州太子挺􅀿着又曰何㸃方尚書乘柴車躡草屩恣心所適致醉而歸陳書曰沈衆武帝時兼起部尚書監起太極殿恒卧布袍芒屩以麻䋲為帶朝士咸共誚其所為唐書曰孟元陽起於陳許軍中理戎整肅曲環主屯作西華陽芒屩立稻田中湏役者退而方去風土記曰美朱爽之輕屩爽藤也赤色縁木而長大如箭竿越人以為屩經以青芒行山便於用故越人重之捜神記曰元康之末太安之間江浦之域有敗屩自聚於道多或至四五千兩人散去之投林草中明日視之悉復聚矣或云貍銜而聚之世之所說屩者人之賤服而當勞辱下民之象也敗者疲敝之象也道者地理四方所以交通王命所由往來也今敗屩聚於道者象下民疲病将相聚為亂絶四方而壅王命臨海水土記曰屩魚長一尺如屩形俗說曰劉貞長少時居丹徒家至貧時方回数出南射堂射劉徃市賣屩路經射堂邉過人無不看射劉過初不廻顧方回異之遣問信荅曰老母朝來未得食至市貨屩不得展詣后過劉招之始來與共語覺其佳笑林曰南方人至京師者人戒之曰汝得物唯食慎勿問其名也後詣主人入門内見馬矢便食惡臭乃歩進見敗屩棄於路因復嚼殊不可咽顧伴曰且止人言不可皆信後詣貴官為設饌因相視曰故是首物且當勿食屧音爕宋書曰袁粲為丹陽尹歩屧白陽郊野間遇一士人便呼與飲明日此人謂被知到門求進粲曰昨飲酒無偶􅂓相要耳竟不與相見齊書曰江泌字士倩濟陽人也少貧好學晝則斫屧為業夜則随月光讀書光斜則握升室梁書曰臨川王宏奢侈過度後庭數百十人皆極天下之選所倖江無畏服玩侔於齊東昏潘妃其寳屧直千萬太平御覧卷六百九十八
