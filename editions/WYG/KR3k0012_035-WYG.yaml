body:
  text: 太平御覽卷三十五宋李昉等撰時序部二十豐稔凶荒旱豐稔詩序曰華黍時和嵗豐宜黍稷也又曰我黍與與我稷翼翼我倉既盈我庾維億露積為庾十萬曰億又曰彼有不穫穉此有不歛穧彼有遺秉此有滯穂伊寡婦之利秉把也言収成豐稔彼有不及穫之穉禾此有不及歛之穧束彼有遺棄之把此有滯漏之穗而寡婦取之以為利也又曰豐年秋冬報也報者謂嘗也烝也豐年多黍多稌亦有髙廩萬億及秭數萬至萬曰億數億至億曰秭箋云豐年大有年也萬億及秭言榖多也為酒為醴烝畀祖妣以洽百禮降福孔皆皆遍箋云烝進也畀與也榖梁傳曰宣公十六年冬大有年五榖大熟漢書曰宣帝即位用吏多賢百姓安土嵗數豐穰榖每石數錢漢記曰鮑徳修志節有名績累官為南陽太守嵗災惟南陽豐稔吏民愛恱號為神人又曰建武二年秋天下野榖旅生麻菽尤盛或生瓜菜果實野蠶成繭被山民收其絮採穫榖果以為畜積京房易妖占曰天雨榖嵗大熟尚書考靈曜曰春政不失五榖孳初夏政不失甘雨時季夏政不失地無菑菑謂土不稼穡秋政不失人民昌冬政不失少疾喪五政不失百榖稚熟日月光明晚熟曰稚詩曰植稚菽麥禮稽命徴曰天子祭天地宗廟六宗五岳得其宜則五榖豐雷雨時至四夷貢物禮斗威儀曰君乗木而王則草木豐茂嘉榖並生春秋元命苞曰咸池主五榖其星五者各以其職以精委為國也宋均曰榖有五故五星主之咸池之為言皆多也言榖生于子水含秀懐實至秋精垂故一名五車取載而歸之之義也孝經援神契曰嵗星守心年榖豐晏子春秋景公伐魯得東門無澤公問魯年榖對曰隂氷厥陽氷厚五寸公問晏子晏子曰君問年榖答以氷禮也隂氷厥陽氷厚五寸者寒温節寒温節則政平政平則上下和上下和則年榖熟臣恐疲兵而無成君盍盍何不也禮魯以息吾愁遂不伐魯汝南先賢傳曰袁安為楚相㑹楚王英事互相牽引拘繫者千餘安受命即叱馭而行既到决獄事應時理遣一旬之中延千人之命其時甘雨滂沛歲大豐稔南越志曰髙興縣有容雞其形如雞而五彩至則年穰臨海異物志曰獨舂鳥聲有似舂其鳴聲多者五榖傷鳴聲少者五榖熟袁子正書曰語曰嵗在辛酉乞漿得酒梅陶書曰古人就食于安里今三州米流出門無如今年豐也廣雅曰年稔秋榖熟也桓子新論曰世俗咸曰漢文帝躬儉約修道徳以先天下天下化之故致充實殷富澤加黎庶榖至石數十錢上下饒羨物理論曰正月朔四面黄氣其嵗大豐此黄帝用事土氣均和四方並熟鹽鐵論曰周公時天下太平丘陵髙下皆熟山海經曰離魚見天下大穰古歌詞曰長安城西雙員闕上有一雙銅雀宿一鳴五榖生再鳴五榖熟凶荒禮曰嵗凶年榖不登君膳不祭肺馬不食粟馳道不除祭事不懸大夫不食粱士飲酒不樂皆為自損憂民禮殺生以祭先有虞氏以首夏后氏以心殷人以肝周人以肺不祭肺則不殺生也天子食日少牢朔日太牢諸侯食日特牲朔日少牢除馳道為妨民取蔬食懸樂器也鐘磬之属也粱嘉食也不樂去琴瑟又曰凶年則乗駑馬祀以下牲自貶損亦取易供也駑馬馬種最下者下牲少牢若特豕特牲也傳曰五年春無氷梓慎曰今兹宋其饑乎嵗在星紀而滛於𤣥枵以有時災隂不堪陽時燠無氷也隂盛用事而温無氷是隂不勝陽地氣發泄也蛇乘龍蛇𤣥武之宿虚危之星龍嵗星嵗星木也為離龍星火次為蛇所乘龍宋鄭之星宋鄭必饑又曰晉薦饑麥米皆不熟也使乞糴于秦秦伯謂百里奚曰與之乎對曰天災流行國家代有救災恤鄰道也行道有福丕鄭之子豹在秦請伐晉秦伯曰其君實惡其民何罪秦於是乎輸粟於晉自雍及絳相繼命之曰泛舟之役後秦饑晉閉之糴又曰宋公子鮑禮於國人宋饑竭其粟以貸之年自七十以上無不饋遺也榖梁傳曰一榖不熟謂之歉歉食不足二榖不熟謂之饑三榖不熟謂之饉爾雅曰榖不熟為饑蔬不熟為饉果不熟為荒仍饑為薦漢書曰髙祖二年關中大饑米斛萬錢又曰漢興接秦之弊諸侯並起民失作業而大饑饉米石五千人相食死者過半髙祖乃命民得鬻子就食蜀漢又曰嵗饑民貧卒食半菽或曰半五升器名也臣璜案士卒食蔬菜以菽雜半之又曰元帝二年齊地饑米石二千餘又曰王莽時睢陽以東米石二千莽遣二公將運關東諸侯倉振貸窮乏又分遣大夫謁者救民煮木實為酪服虔曰酪粥之屬酪不可食重為煩擾流民入關者數千餘人置養贍官以廩之盜𤼵其廩民餓死者十七八東觀漢記曰王莽末南方枯旱民多飢餓民于野澤掘􅝀水草實也茨而食又曰赤眉還入長安鄧禹與敵敗走至髙陵戰士飢餓食藻菜帝乃徴禹還勅曰赤眉無榖自當來降吾折之吉反捶笞之非諸將憂也謝承後漢書曰趙典兄子温遭嵗大饑散家糧以賑窮餓所活萬餘人王隠晉書曰永嘉五年洛中大饑五月摯虞餓死又曰劉琨與丞相牋曰夏則桑椹冬則瑩音黄豆視此哀歎使人氣盡晉中興書曰中原亂中宗初鎮江左假郄鑒龍驤將軍兖州刺史鎮鄒山又徐龕石勒左右交侵百姓饑饉野無生草時或掘野鼠蟄燕而食之又曰大興元年詔曰亢旱榖貴百姓嗷嗷有資者貴糴貧羸之民益困漢世榖貴官賤糴使價不超越謂之平準今雖無此可出邸閣米萬斛使三分减一以平其價令貧困者悉得是以至秋也吳志曰駱公緒年八嵗與親客歸會稽事嫡母甚謹時饑荒鄉里多困乏公緒為之飲食衰少其姊仁愛有行寡居無子見公緒甚哀之問其故緒曰士大夫糟糠不足我亦何必獨飽姊聞之曰何不告我而自苦若此乃自以私粟與公緒又以告母母亦賢之遂使分施由是顯名周書曰天有四殃水旱饑荒其至無時非積畜何以備之夏歸藏曰士無兼年之食遇大饑妻子非其妻子也大夫無兼年之食遇大饑輿馬臣妾非其有也國無兼年之食遇大饑百姓非其有也戒之哉國語曰越大夫種謀曰今吳既罷罷音疲勞也而大荒薦饑市無赤米米之惡也而囷簏空虚圓者為囷方者為簏其民必移就食蒲蠃于東海之濵蒲蒲子蠃蚌蛤之屬也濵海涯又曰魯饑臧文仲以玉磬如齊告糴典畧曰從興平元年至建安二年其間四嵗中咸陽蕭條亂賊李傕等始將部曲入長安居卓故塢中㧞取酸􅀥梨藋藋從弔切以給食發塚取衣蓋形崔鴻十六國春秋曰諸州自建武元年十一月不雨雪至十二年八月榖價踴貴金斤值米二升民流死者十有五六百姓嗷然人無生賴又曰建元元年襄國大饑榖二升值銀一斤肉一斤值銀一兩朝子曰秦大饑應侯請發五苑果􅀥以活民王曰秦法賞有功誅有罪今𤼵五苑是有功無功俱賞也墨子曰百榖不收謂之旱二榖不收謂之凶四榖不收謂之餽音匱五榖不收謂之饑淮南子曰畜者欲嵗之荒饑謂将計厚利袁子正書問滑釐曰今當凶年有欲與子隋侯之珠者又有欲與子一鍾之粟者子將何擇釐曰吾取粟可以救窮河圖曰日月兩重暈者饑之象也魏名臣奏曰太尉司馬懿奏云秋澇傷五榖又無菜薺四方饑饉有食桑皮者英雄記曰李傕等相攻戰長安中盜賊不禁白日擄掠是時榖一斛五十萬豆麥二萬人相食啖白骨委積臭穢滿路又曰幽州每嵗不登人相食有蝗旱之災民人始知採秬以􅀥椹為糧榖一石十萬錢公孫伯圭開置屯田稍稍得自供給秬音吕又曰建安七年都中大饑米一斛二萬錢博物志曰凶年暫辟榖法但食蠟半斤輒支十日不飢漢應豫立讃序曰王莽居攝以病告歸後赤眉賊衆來其所居城糧盡以私榖數千萬斛賑城中于時粟斛錢數萬無不稱其仁晉王洽集曰洽臨吳郡上表曰編戸僵尸葬埋無主闔門餓殍烟火不舉旱春秋考異郵曰旱之言悍也陽驕蹇所致也詩曰旱既大甚滌滌山川又曰旱魃為虐如惔如焚我心癉暑癉疾也憂心如熏熏灼也又曰旱既大甚藴隆蟲蟲雷而非雨書說命曰若嵗大旱用汝作霖雨又曰僣恒暘若禮曰繆公召縣子問天久不雨吾欲暴尫而奚若曰天則不雨而暴人之疾子無乃不可與然則暴巫而奚若曰天則不雨而望之愚婦人於以求之無乃已踈與周禮曰司巫掌羣巫之政令若國之大旱則率巫而舞雩又曰女巫掌嵗時袚除釁浴旱暵則舞雩傳曰衛大旱寗莊子曰昔周饑克殷而年豐今邢方無道天其或者欲使衛討邢乎從之師興而雨又曰魯僖公三年自十月不雨至于五月不曰旱不為災也又曰衞大旱卜有事於山川不吉又曰僖公二十一年夏大旱公欲焚巫尫臧文仲曰非旱備也修城郭貶食省用務穡儉也勸分此其務也巫尫何為天欲殺之則如勿生若能為旱焚之滋甚公從之是嵗饑而不害又曰魯文公十年正月不雨至于七月周正月今之十一月周七月今之五月又曰魯宣公九年葬我小君敬嬴旱無麻始用葛茀茀所以引柩也又曰魯昭公十六年秋鄭大旱使屠擊有事于桑山事祭山也斬其木不雨子産曰有事于山蓻山林也而斬其木其罪大矣奪之官邑漢書曰百里嵩字景山為徐州刺史時旱嵩行部傳車所經即雨輒㴻東海祝其合鄉三縣在山間嵩未徃三縣獨不得雨父老請之入界即雨㴻又曰和帝永元六年秋旱時洛陽有寃囚帝録囚理寃未還宫雨㴻鄧太后事同續漢書曰郡國旱公卿行雩禮求雨閉諸陽門衣皂衣興土龍立土人舞童二佾七日一虔又曰郡國俾各掃除社稷公卿官長以次行雩禮求雨也魏志曰衞玠見黥面者其妻子役為官僮玠曰使天下不雨者蓋由此也晉書曰督運令史淳于伯刑于連康市百姓喧嘩咸曰寃于是大旱三年亰氏易曰人君無惠澤于下則小旱管子曰春不收枯骨朽胔伐枯木而去之則夏旱至矣尸子曰湯之救旱也乘素車白馬著布衣身嬰白茅為牲禱於桑林之野此時弦歌鼓舞者禁之孟子曰七八月之間旱則苖槁矣槁枯也晏子春秋曰齊景公時旱欲祀靈山及河伯晏子曰夫山以石為身以草木為毛髪今乆不雨毛髪将焦身且熱豈山不欲雨乎祀之何益君宜避殿暴露以索雨也公從之出野果大雨世說曰湯時大旱七年雒川竭煎沙爍石乃使持三鼎祀山川祝詞曰政不節邪民失職邪宫室崇邪女謁盛邪苞苴行邪讒夫昌邪何不雨之甚洪範五行傳曰魯宣十年秋大旱時公興師伐邾取繹夫伐國亢陽益師旅百姓所不欲也應是大旱益都耆舊傳曰趙瑶為漢中令大旱瑶請雨於靈星應時降雨捜神記曰周暢為河南尹元初二年大旱暢乃葬路旁露骸為立義塜應時注雨又曰諒輔字洪儒新都人為郡五官掾時大旱太守自暴中庭而雨不降輔自誓曰日中雨不降請以身塞無狀無状謂所祈雨不降乃積薪柴自焚至日中時大雨一都沾潤神農求雨書曰春夏雨日而不雨甲乙不雨命為青龍又為火龍東方小童舞之凡如此而不雨濳處闔南門置水其外開北門取人骨埋之如此而不雨命巫祝而暴之不雨禱山神積薪擊鼓而焚之瑞應圖曰遇旱責躬引咎理察寃枉退去貪殘側修惠政則降以靈雨如其有道術禱祀山川致龍轉石閉陽從隂之類誠非瑞應是以魯侯有暴尫之請齊景公以祠山見譏董仲舒曰春旱求雨令縣邑以水日令民禱社家人祀戸無伐名木無斬山林曝巫聚尫八日於邑東門外為四通之壇方八尺植蒼繒八其神共工祭以魚八夏求雨亦以水日家人祀竈無舉土功更浚水井曝釜甑杵臼七日為四通壇于邑南門外方七尺植赤繒七其神蚩尤祭以赤雄雞七凡求雨之大體丈夫欲藏匿女子欲和而樂師曠占旱曰嵗欲旱旱草先生旱草者蒺藜也山海經曰大華之山削成四方有蛇名肥遺六足四翼見則天下大旱湯時也東荒之北隅有山名土丘應龍處南極殺蚩尤與夸父不得復上故下數旱旱而作龍應之乃得大雨上無作雨者故也又曰奚昆之山有人衣青衣名曰黄帝女妖音魅蚩尤代黄帝請風伯雨師帝乃下天女曰妖雨止遂殺蚩尤妖不得復上所居不雨又曰鱄魚雞山黒水出焉彘尾出則天下大旱東荒之北隅有焉太平御覽卷三十五
