body:
  text: 太平御覽巻二百二十一宋李昉等撰職官部十九黄門侍郎給事中黄門侍郎六典曰黄門侍郎掌貳侍中之職凡政之弛張事之與奪皆叅議焉若大祭祀則從升壇以陪禮皇帝􅏕手則奉巾以進旣税則奠巾於篚奉匏爵以贊獻凡元正冬至天子視朝則以天下祥瑞奏聞漢官儀曰給事黄門侍郎次侍中侍從左右開通内外給事於中故曰給事中黄門侍郎漢書曰王音薦揚雄待詔歲餘爲給事黄門郎成哀平三代不徙又曰張禹爲太傅有疾成帝臨視拜於床下禹有少子在側數目之帝知其意於前拜黄門侍郎又曰劉向字子政宣帝時以中郎爲給事黄門侍郎又曰董賢字聖卿雲陽人爲太子舎人賢待漏在殿下爲人美麗自喜哀帝望見悦其儀貌識而問之曰是舎人董賢耶因引上與語拜爲黄門侍郎東觀漢記曰鄧閶字秀昭遷黄門侍郎於時國家每有災異水旱閶側身暴露憂懼顦顇形於顔色公卿以下咸高尚焉漢興以來爲外戚儀表後漢書曰馬防子鉅爲常從小侯正月當冠特拜爲黄門侍郎肅宗親御章臺下殿陳鼎俎自臨冠之續漢書曰荀悦字仲豫遷黄門侍郎獻帝頗好文學悦與從弟彧孔融並侍講禁中輿服志曰禁門曰黄闥以中人主之故號曰黄令然則黄門郎給事黄闥之内故曰黄門郎本旣無員於此各置六人也又百官志曰給事黄門侍郎六百石無員外從左右給事中使開通中外諸王朝見於殿上引王就位獻帝起居注曰自誅黄門後侍中侍郎岀入禁中機事頗露由是王允乃奏侍中黄門不得岀入不通賔客自此始也漢官曰尚書郎奏事於明光殿省中皆胡粉塗壁其邉以丹漆地故曰丹墀尚書郎含雞舌香伏其下奏事黄門侍郎對揖跪受漢舊儀曰黄門郎屬黄門令日暮入對青瑣門拜名曰夕郎魏志曰王粲字仲宣山陽人年十七司徒辟詔除黄門侍郎以西京擾亂皆不就又曰夏侯𤣥字太初少知名弱冠爲黄門侍郎嘗進見與皇后弟毛曾並坐𤣥耻之不悦形之於色明帝恨之左遷爲羽林監又曰杜恕字矜伯爲散騎黄門侍郎恕推誠以質不治飾在朝不結交每政有得失常引綱維以正言於是侍中辛毗等器重之又曰夏侯尚字伯仁淵從子也文帝與之親友有籌畫智略從太祖定兾州遷黄門侍郎又曰鍾毓字稚叔年十四爲散騎侍郎機㨗談笑有父風太和初蜀相諸葛亮圍祁山明帝欲親西征毓上疏曰夫䇿貴廟勝功尚帷幄不下殿堂之上而决勝千里之外車駕宜鎮守中土以威四方今者盛暑行師詩人所重實非至尊順動之時也遷黄門侍郎魏略曰董遇字季直獻帝時爲黄門侍郎旦夕侍講爲天子所愛信蜀志曰費褘字文偉爲黄門侍郎丞相亮南征還羣僚於數十里逢迎年位多在褘右而亮命褘同載由是衆莫不易觀吳志曰孫承字顯世好學有文章作螢火賦行於世爲黄門侍郎與顧榮俱爲侍臣歸命世内侍多得罪唯榮承獨獲免常使二人記事承荅顧問乃下詔曰自今已後用侍郎皆當令如宗室承顧榮儔也又曰孫皓每宴會群臣無不咸令沉醉置黄門郎十人特不與酒侍立終日爲司過之吏宴罷之後各奏其闕失迕視之咎謬言之愆罔有不舉大者即加威刑小者咸以爲罪晉書曰顧榮少有珪璋符采朗徹仕吳弱冠舉賢良爲黄門侍郎當時後進盡相推謝稱榮有天才令望又曰張華爲黄門侍郎博覽圖籍千門萬户畫地成圖又曰吳隱之孝武帝欲以爲黄門郎以隱之貌類簡文帝乃止又曰嵇紹爲給事黄門侍郎時侍中賈謐以外戚之寵年少居位潘岳杜斌等皆附託焉求交於紹紹拒而不荅謐誅紹時在省以不阿比㓙族封弋陽子晉書載記曰秦黄門郎古成詵風韻秀舉確然不羣每以天下是非爲己任時京兆􅅊髙慕阮籍之爲人居母䘮彈琴飲酒詵聞而泣曰吾當礪刄斬之以崇風教遂持劍求高高懼逃匿終身不敢見詵齊職儀曰給事黄門侍郎四人秩六百石武冠絳朝服漢有中黄門給事黄門位從諸大夫秦制也與侍中掌奏文案賛相威儀典署其事後魏書曰崔光爲黄門侍郎未嘗留心文案唯從容論議叅贊文政而已又曰陽平王之子匡爲黄門侍郎茹皓始有寵百寮微憚之世宗曾於山陵還詔匡陪乗又命皓登車褰裳將上匡諫止世宗推之命下皓恨匡失色當時壮其忠謇又曰任城王之子順除給事黄門侍郎時領軍元乂威刑尤盛凡有遷授莫不造門謝謁順拜表而已曾不詣乂乂謂順曰卿何得不見我順正色曰天子富於春秋委政宗輔叔父宜至公爲心舉士報國如何賣恩責人私謝豈所望也北史曰盧誕拜給事黄門侍郎魏帝詔曰經典易求人師難得朕諸兒稍長欲令􅀸爲師於是親幸晉王第勅晋王以下皆拜之於帝前隋書曰劉行本爲黄門侍郎文帝嘗怒一郎於殿前笞之行本進諫帝不顧行本乃正當上前又曰陛下不以臣不肖置臣左右豈得輕臣而不顧也乃置笏於地而退上謝之而原所笞者唐書曰温大雅爲黄門侍郎弟彦博爲中書侍郎對居近侍高祖謂曰我起義晉陽爲卿一門耳又曰高宗總章元年十月東天竺烏蔡國長年婆羅門盧伽逸多受詔合丹上將餌之東臺侍郎郝處俊諫曰修短有天命未聞萬乗之主輕服蕃夷之藥昔貞觀末年先帝令婆羅門僧那羅你娑婆寐依其本國仙方合長年神藥胡旣有異術徴求靈草秘石歴年而成先帝服之竟無異効大漸之際名醫莫知所爲欲歸罪於胡人將申大戮又恐取笑夷狄龜鏡若是惟陛下深察遂止又曰天寳元年改黄門侍郎爲門下侍郎五代史晉書曰天福七年詔門下侍郎班在常侍之下俸禄同常侍三輔决録曰卓茂字子康元帝時遊學長安以儒行爲給事黄門郎又曰杜恕字矜伯拜黄門侍郎每直省閣威儀矜嚴又曰馬后志在克已輔上不以私家干朝廷弟爲黄門郎訖永平世不遷英雄記曰曹純字子和年十六爲黄門郎王嘏别傳曰嘏字昭先魏文以嘏爲黄門侍郎每納忠言輙手壞本自在禁省歸書不封帝嘉其淑慎如此桓階别傳曰階爲尚書令文帝行幸見諸少子無褌上摶手曰長者子無褌是日拜三子爲黄門郎傅子曰王黎爲黄門郎軒軒然得志煦煦然自樂劉向七略曰孝宣皇帝重申不害君臣篇使黄門郎張子喬正其字劉向集書誡子歆曰今若年少得黄門侍郎顯處也新拜皆謝貴人叩頭謹戰戰慄慄乃可必免唐中宗授韋嗣立黄門侍郎制曰絳衣近侍秩亞貂蟬青瑣崇班職叅鴛鷺實神化之有寄信賢才之攸宜通議大夫韋嗣立忠規弈葉孝緒蟬聯家匡𤣥燕之朝人輔彤靈之代芝蘭並秀見謝石之階庭騏􅂹齊驅有劉山之昆季入光振鷺譽滿三臺岀據馮熊聲流十部近者命兹鸞渚已濯鴈行纔岀芸局奄歸蒿里永言荆樹生折連枝眷彼恒山空餘一鳥俾遷榮於皂蓋宜襲寵於黄樞給事中六典曰給事中凡百司奏抄侍中審定則先讀而署之以駮正違失凡制勅宣行大事則稱揚德澤褒美功業覆奏而請施行小事則署而頒之凡文武六品已下授職所司奏揚則校其任歴深淺功狀殿最訪其德行量其才藝若官非其人理失其事則白侍中而退量焉漢儀注曰諸給事中日上朝謁平尚書奏事分爲左右以有事殿中故曰給事中多名儒為之以備左右顧問漢書曰給事秦官也至漢因之皆爲加官所加或大夫博士議郎掌顧問應對位次中常侍又曰元帝詔蕭望之傅朕八年可賜爵關内侯給事中後漢書曰鄭衆字仲師以明經拜給事中魏志曰秦朗字元明明帝即位授以内官爲給事中每車駕岀入朗常隨從時明帝喜發舉數有以輕微而致大辟者朗終不能有所諫止又未嘗進一善人帝亦以是親愛每顧問之多呼其小字阿蘇晉書曰任熈字伯遠立德邈然徴拜給事中晉起居注曰武帝太康七年詔曰郎中張建忠篤履素爲江表士大夫所稱宜在中朝其以建爲給事中晉武帝詔曰燕王師陳邵清貞亷㓗博通六籍宜在左右以敦儒訓可給事中唐書曰盧粲幽州范陽人也景龍二年遷給事中時節愍太子初立􅅊庶人以非已所生深加忌嫉勸中宗下勅令太子却取衞府封物每年以供服用粲駮奏曰皇太子處繼明之重當主鬯之尊歲時服用自可百司供擬又據周官諸應用財器歲終則會唯王及太子應用物並不會此則儲蓄之費咸與王同今與列國諸侯齊衡入封豈所謂憲章在昔垂法將來者也必謂青宫初啟服用所資自當廣支庫物不可長存藩封詔從之又曰盧粲遷給事中時安樂公主婿武崇訓爲節愍太子所殺特追封爲魯王令司農少卿趙履温監䕶葬事履温諷公主奏請依永泰公主故事爲崇訓造陵詔從其請粲駮奏曰伏尋陵之稱謂本屬皇王及儲君等自皇家已來諸王及公主墓無稱陵者唯永泰公主承恩特葬事越常途不應假永泰公主爲名請比貞觀已來諸王舊例足得豐厚手勅荅曰安樂公主與永泰公主無異同穴之義古今不殊魯王縁此特爲陵制不煩固執粲又奏曰臣聞陵之稱謂施於尊極不屬王公已下且魯王若論親等第則不親於雍王守禮雍王之墓尚不稱陵魯王則不可因尚公主而加號且君之舉事則載於方冊或稽之往典或考自前朝臣歴檢貞觀已來駙馬墓無得稱陵者且君人之禮服絶於傍朞蓋爲不獨親其親不獨子其子陛下以膝下之恩愛施及其夫贈賵之儀哀樂足備豈得使上下無辨君臣一貫者哉帝竟依粲所奏又曰李藩爲給事中制勅有不可遂於黄勅後批之吏曰宜别連白紙藩曰别以白紙是文狀豈曰批勅耶裴垍言於帝以爲宰相器又曰憲宗以同州刺史吕元膺復爲給事中初元膺自給事中除同州及入謝上問以時政得失元膺論奏詞甚激切上嘉其剛正翌日謂宰臣曰吕元膺讜言直氣今欲畱在左右使言得失卿等以爲何如李藩裴垍進賀曰陛下納諫超冠前王乃宗社無疆之福臣等不能廣求直士又不能數進直言孤負聖心合當罪責今請以元膺復爲給事中以備顧問上悦而從之又曰李遜爲給事中嘗論時政以爲事君之義有犯無隱陳誠啓沃不必擇辰今君臣敷奏乃候隻日是畢歲臣下睹天顔獻可否能幾何憲宗嘉之又曰元和十四年以撫州司馬令狐通爲右衞將軍給事中崔植封還制書言通前刺史壽州用兵失律前罪未塞不宜遽加奬用上命宰臣諭植以通父彰有功不忍棄其子其制方行又曰常𢎞景爲給事中屢有封駮時有劉士經以駙馬交通邪倖自檢校官用爲太僕卿𢎞景執奏不可中人宣諭再三𢎞景不爲之逥穆宗怒乃令𢎞景使南安邕容宣慰時論翕然推重又曰郭承嘏爲給事中開成元年岀爲華州刺史詔方下兩省迭詣中書求承嘏岀麾之由給事中盧載封還詔書奏曰承嘏自居此官繼有封駮能奉其職宜在鎻闥牧守之才易爲推擇文宗謂宰臣曰承嘏乆在黄扉欲優其禄俸暫令亷問近關而諫列拜章惜其稱職甚美事也乃復爲給事中又曰于敖遷給事中昭愍初即位李逢吉用事與翰林學士李紳素不叶遂誣紳以不測之罪逐於嶺外紳同職駕部郎中知制誥龎嚴司封員外郎知制誥蔣防坐紳黨左遷信汀等州刺史黜詔下敖封還詔書時人以爲與嚴相善訴其非罪皆曰于給事犯宰執之怒伸龎蔣之屈不亦仁乎及駮奏岀乃是論龎嚴貶黜太輕中外無不大噱東方朔記曰東方朔爲中郎賜帛百疋給事中荀綽兖州記曰袁淮字孝尼有俊才太始中拜爲給事中胡廣集曰給事中掌侍從左右無員位次侍中常侍或名儒或國親束晳集曰員外侍郎及給事冗從皆是帝室茂親或貴遊子弟若悉從高品則非本意若精鄉議則必有降損太平御覽卷二百二十一
