body:
  text: 太平御覽卷九百六十九宗李昉等撰果部六梨楂櫻桃梨爾雅曰棃山樆即今梨樹梨曰攅之漢書曰淮北滎南河濟之間千樹梨其人皆與千戸侯等晉書曰符䨇據上邽符栁據蒲坂叛于堅符武據安定並應之将共戕長安堅遣使諭之各囓棃以為信皆不受堅命南史曰王𤣥謨征滑臺一疋布責民八百大棃又曰張敷小名楂父邵小名梨文帝嘗戯謂之曰楂何如棃荅曰梨萬果之宗楂何敢比也齊書曰扶桑國有赤梨經年不壊兼多蒲萄唐書曰貞觀中杭州言木連理二十四株有櫨梨二木合為一體又曰𤣥宗至馬嵬驛令髙力士縊貴妃於佛堂前之梨樹又曰崔逺文才清麗風神峻整人皆慕其為人當時目為釘坐梨言席上之珍韓子曰夫樹楂梨橘柚者食之則甘嗅之則香荘子曰楂梨橘柚其味雖别各適其口淮南子曰佳人不同體羙人不同面皆說於目梨橘棗栗不同味而皆調於口應劭漢官儀曰光武封太山上壇見酢梨酸棗主者云百官上者所置晉令曰諸官秩梨守䕶者置吏一人世說曰桓南郡毎見人不快輙嗔云君得哀家棃復蒸食否舊說秣陵有哀仲家梨甚大如升入口消汁言愚人不識得好棃蒸食之又曰安公講僧常數百習鑿齒嘗餉十梨正值講安公便於坐中手自剖分梨盡人遍都無偏頗山海經曰洞庭之中其木多梨盧毓冀州論曰常山好梨地産不為無珍關令尹喜内傳曰老子西遊省太真王母共食紫梨漢武内傳曰太上之藥有𤣥光梨曹瞞别傳曰王自漢中至洛陽起建始殿使工蘇越徙羙梨掘之根盡血出越以状聞王王躬自視之以為不祥還遂􅃦疾神仙傳曰介象言病帝使左右以羙梨一奩賜象象死帝殯而埋之以日中時死其日晡時到建業以所賜棃付苑吏種之後吏以状聞既發象棺棺中有一奏符文士傳曰孔融年四嵗與諸兄食棃輒取其小者人問其故答曰我小兒法當取小者由此宗族竒之西京雜記曰上林有紫棃棃實差小青棃大谷棃金柯棃出瑯瑘王野家太守王堂所献縹葉棃紫棃澣海棃出澣海耐寒不楛東王棃廣志曰洛陽北有張公夏棃海内惟有一樹常山真定棃山陽鉅野棃梁國睢陽棃齊都臨淄棃鉅鹿槀棃上黨楟棃小而甘新望箭谷棃関以西𢎞農京兆右扶風界谷中棃多供御廣都棃重六斤可數人分食之嵩髙山記曰東岳脚上有棃樹云是武帝果園山中諸生皆取食之辛氏三秦記曰漢武帝園一名樊川一名禦㝛有大棃如五升落地則破其主取者以布囊盛之名含消棃三晉山險記曰吕光時燉煌太守宋歆獻同心棃叚龜龍凉州記曰山陽縣北有谷通得驢馬石勒十八騎昔在此啖棃生樹今有棃園永嘉記曰青田村民家多種棃樹名曰官棃子大一圍五寸樹老今不復結子此中棃子佳丼羙恒以供獻名為御棃吏司守視土人有未知味者棃實落至地即融汁郭子横洞𡨕記曰塗山之北有棃大如斗色紫千年一花冬月乃實􅋩之有膏食者身輕亦曰紫輕棃慱物志曰棃類甚多楂杜樸皆是有大小酢甜之異耳神異經曰東方有樹焉髙百丈敷張自輔葉長一丈廣六七尺名曰棃其子徑三尺剖之白如素食之為地仙幽眀録曰成彪兄䘮晝夜哭泣兄提二升酒一棃就之乃引酌相勸廣五行記曰宋廢帝大始年江南盛傳種蕭棃先無此樹百姓爭欲植之識者曰當有姓蕭人王者後齊受禪楊􅃷之洛陽伽藍記曰勸學里報徳寺有園珍果出焉有含消棃重六斤禁苑所無也從樹投地盡散為水焉世人云報徳之棃承光之柰承光寺亦多果木柰味甚羙冠於京師李鄴侯傳曰唐肅宗嘗夜坐召潁王等三弟同坐於地爐􅄢毯上時李泌多絶粒上毎為自燒二棃以賜之潁王恃恩固求上與曰汝恒飽肉食先生絶粒何乃争之頴王曰臣等試大家心何乃偏耶不然三弟共乞一顆可乎上亦不許賜以他果潁王等又曰臣等以大家自燒故乞他果何用因曰陛下恩渥先生如此臣等請聨句以為他年故事潁王曰先生年㡬許顔色似童兒信王曰夜抱九仙骨朝披一品衣一王曰不食千鍾粟唯餐兩顆棃既而三王請上成之上曰天生此間氣助我化無為王讃棃頌曰太康十年棃樹四枝其條與中枝合生於𤣥圃園皇太子令侍臣作頌魏文帝詔曰真定御棃大若拳丼若蜜脆若氷可以觧煩釋渇傅巽曰㐮陽黄棃巫山朱橘何晏九州論曰安平好棗真定好棃左思蜀都賦曰紫棃津潤又齊都賦曰果則晌山之棃潘岳闞居賦曰張公大谷之棃孫楚秋賦曰朱橘丼羙紫棃甜脆膚不隠於斷牙融液易於含雪王廙洛都賦曰棃則大谷冬熟張公秋黄潘岳金谷園賦曰靈圃繁若榴茂林列芳棃宋武帝戯馬臺棃花讃曰嘉樹之生于彼山基開榮布綵不離塵緇王𢎞謝賜河上棃表曰奉賜河上棃一千逺方味丼毎垂降及仰佩恩榮俯増祗愧魏武帝為兖州牧上書曰山陽郡有羙梨謹上丼棃二箱楂爾雅曰楂棃曰鑚之禮記内則曰楂棃薑桂山海經曰箕山之東有甘樝又曰洞庭之上其木多樝張敷曰平丘有楊柳甘樝說文曰樝似棃神異經曰南方南荒有樹焉名曰柤三千嵗作華九千嵗作實其花紫色中髙百丈敷張自輔葉長七尺廣五尺實長九尺無核割之如凝宻述異記曰江淮南人至北見櫨勃香以為柤子盖實異耳傅𤣥瓜賦曰龍眼生於南極丼樝列於崑山櫻桃禮記月令曰仲夏之月天子羞以含桃先薦􅃦廟爾雅曰楔荆桃廣雅曰含桃櫻桃漢書曰惠帝出離宫叔孫通曰今櫻桃熟可獻陛下宜以櫻桃獻宗廟上許之諸果獻由此興唐書曰太宗将致櫻桃於酅公稱奉則是尊言賜又似卑問之虞監曰昔梁武帝遺齊巴陵王稱餉遂從之又曰𤣥宗紫宸殿櫻桃熟命百官口摘之又曰蕭頴士李林甫採其名欲收用之乃召見時頴士寓居母䘮即縗麻而詣京師徑謁林甫于政事省林甫素不識遽見縗麻大惡之即令斥去頴士大忿乃為伐櫻桃賦以刺林甫云擢無庸之𤨏質因本枝而自庇洎枝幹而非㩀専階廷之右地雖先􅃦而或薦豈和􅅅之正味其狂率不遜皆此類也又曰文宗始即位嘗因内園進新櫻桃将以賜三宫太后上曰送太后焉可以為賜因援筆易其文簿曰奉太后自是以為常拾遺録曰漢眀帝於月夜讌賜羣臣櫻桃盛以赤瑛盤羣臣視之月下以為空盤帝笑之吕氏春秋曰仲夏之月羞含桃髙誘注曰含桃櫻桃為鳥所含故曰含桃范汪祠志曰孟夏之祭用櫻桃洛陽宫殿簿曰顯陽殿前櫻桃六株眀光殿前櫻桃四株徽音殿前櫻桃九株廣志曰櫻桃大者如弹丸有長八分者白色多肌者凡二種虎丘山疏曰山下有櫻桃三株唐景隆文舘記曰四年夏四月上與侍臣於樹下摘櫻桃咨其食味始於葡萄園大陳宴席奏宫樂至瞑每人賜朱櫻桃兩籠又曰四年夏四月上幸兩儀殿命侍臣昇殿食櫻桃其櫻桃並盛以琉璃和以杏酪飲酴醿酒慱物志曰櫻桃或如手指春秋冬夏華實竟嵗吕氏本草經曰櫻桃味丼主調中益脾氣令人好顔色羙志氣一名朱桃一名麥英也傅咸粘蟬賦序曰櫻桃為樹則多隂為果則先熟故種之於㕔事前以盛暑逍遥其下左思蜀都賦曰朱櫻春就素柰夏成魏文帝與鍾繇書報曰臣繇言賜甘酪及櫻桃惠厚意綢非言所申夏侯孝若春可樂曰進櫻桃於玉盤太平御覽卷九百六十九
