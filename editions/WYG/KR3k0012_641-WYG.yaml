  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_641-1a, image: WYG0898/WYG0898-0717a.png}
body:
  text: 太平御覽卷六百四十一宋李昉等撰刑法部七贓貨罪贓貨書吕刑曰獄貨非寳惟府辜功報以庶尤貨非家寳惟以聚罪耳其報則以衆人見罪也尚書大傳曰獄貨非可寳也然彼寳之者未能行其法者也貪人之寳受人之財未有不枉法以矯其上者也親下以欺上者未有􅀎成其功者也又曰太公之羑里見文王散宜生遂之犬戎氏取美馬駮身朱鬛雞目之西海濵取白狐青翰之於氏取恠獸之有叅氏取美女之江淮之浦取大貝如車渠陳於紂廷紂曰非子罪也崇侯也遂遣西伯伐崇傳曰晉邢侯與雍子争鄐田久而無成士景伯如楚士景伯晉理官叔魚攝理韓宣子命斷舊獄罪在雍子雍子納女於叔魚叔魚蔽罪於邢侯蔽斷也已見决獄門左傳昭二十六年曰叔孫婼如晉晉人執之范獻子求貨於叔孫使請冠焉以求冠為辭取其冠法而與之兩冠曰盡矣既送作冠模法又進二冠以與之偽若不解其意也為叔孫故申豐以貨如晉欲行貨免叔孫也叔孫曰見我吾告汝所行貨見而不出留申豐不使得出不欲以貨免又昭二十八年曰梗陽人有獄魏戊不能斷以獄上上魏子其大宗賂以女樂訟者之大宗魏子将受之魏戊謂閻没女寛二人魏子之属大夫曰主以不賄聞於諸侯若受梗陽人賄莫甚焉吾子必諌皆許諾退朝待於庭饋入召之比置三嘆既食使坐魏子曰吾聞諸伯叔諺曰唯食忘憂吾子置食之間三嘆何也同辭而對曰或賜二小臣酒不夕食饋之始至恐其不足是以嘆中置自咎曰豈将軍食之而有不足是以再歎及饋之畢願以小人之腹為君子之心屬厭而已魏子辭梗陽人孔藂子曰子思言苟變於衛君曰其才可将五百乗公曰吾知其可将然變嘗為吏賦於民而食人二雞子故弗用也子思曰聖人官人如大匠之用木取其所長棄其所短君以二卵棄干城之将乎漢書曰薛宣為馮翊太守池陽令舉亷吏獄掾王立府未及召聞立受囚家錢宣責讓縣縣案騐獄掾乃其妻獨受繋者錢萬六千受之再宿立實不知慙恐自殺宣聞之移書池陽曰縣所舉亷吏獄掾王立家私受賕而立不知殺身以自明誠亷士甚可憫惜其以府决曹掾書立之柩以顯其魂又曰王温舒為右輔行中尉嵗餘㑹宛軍發發兵伐大宛也詔徴豪吏温舒匿其吏華成及人有變告温舒受員騎錢他姦利事罪至族自殺其時兩弟及兩婚家亦各自坐他罪而族光禄勲徐自為曰悲夫古者有三族而王温舒罪至同時而五族乎温舒與弟同三族而兩妻家各一故作五也温舒死家累千金謝承後漢書曰种暠為益州刺史時永昌太守鑄黄金為文蛇以獻梁冀暠糺發逮捕馳傳上言而三府畏懦不敢案之冀由是銜怒於暠華嶠後漢書曰曹暠靈帝時賂中官及輸西園錢一億萬故位至太尉袁山松後漢書曰皇甫嵩字義真定安朝那人善用兵飲食必先将士然後乃安兵曹有受賂者嵩曰公素亷必資乏也乃出錢賜之吏慙而自殺由是衆皆樂為致死范煜後漢書曰歐陽歙字正思樂安千乗人為大司徒坐在汝南贓罪千餘萬發覺下獄諸生守闕為歙求哀者千餘人至有自髠剔者平原禮震年十七聞獄當斷馳之京行到河内獲嘉縣自繋上書求代歙死書奏而歙已死獄中又曰李膺遷河南尹時宛陵大姓羊元羣罷北海郡贓罪狼籍郡舎溷軒有竒巧乃載之以歸膺表欲治其罪元羣行賄宦豎膺反坐輸作左校後魏書曰鄭義為兖州性貪恡政以賄成有餉羊西門受入東門賣之又曰崔光韶遷廷尉卿時秘書監祖榮以贓罪被劾光韶欲置之重法太尉城陽王徽吏部尚書李神雋皆為榮求寛光韶正色曰朝賢執事於舜之功未聞有一如何反為罪人言乎唐書曰山南東道節度使栁公綽自京赴鎮行部過鄧縣縣吏二人犯法在獄一吏納賄一吏舞文縣令以公綽持法犯贓者必不免及獄具公綽斷曰贓吏犯法法在姦吏壊法法亡遂殺舞文者未下車而㐮漢大治又曰李石用金部員外郎韓益判度支案益坐贓繋臺石奏曰臣以益曉錢榖録用之不謂貪猥如此帝曰宰相但知人則用有過則懲卿所用人且不掩其惡可謂至公三輔决録曰馬融為南郡太守二府以融在郡貪濁受主記掾岐肅錢四十萬融子强又受吏白向錢六十萬布三百疋以肅為孝亷向為主簿又坐失大将軍梁冀意髠徙朔方自刺不死得赦還拜議郎鍾離意别傳曰顯宗以意為尚書時交趾太守坐贓千金徴還伏法以資物簿入大司農詔班賜羣臣意得珠璣悉以委地不拜賜帝恠而問其故對曰臣聞孔子忍渇於盗泉之水曽参迴車於勝母之閭惡其名也此賍穢之寳誠不敢拜受帝嗟歎曰清乎尚書之言乃更以庫錢三十萬賜意罪湯誓曰有夏多罪天命殛之殛誅也又泰誓曰予克受非予武惟朕文考無罪受克予非朕文考有罪惟予小子無良韓詩外傳曰齊景公之時民有得罪於景公者景公大怒縛置之殿下召左右支觧之晏子左手持頭右手磨刀仰面而問曰古者明王每支解人不審從何始也景公曰縦之罪在寡人禮曰子夏䘮其子而䘮其明曽子弔之曰吾聞之朋友䘮明則哭之曾子哭子夏亦哭曰天乎予之無罪也曾子怒曰商汝何無罪也吾與汝事夫子於洙泗之間退而老於西河之上使西河之民疑汝於夫子爾罪一也䘮爾親使民未有聞焉爾罪二也䘮爾子䘮爾明爾罪三也汝何無罪與子夏投其杖而拜曰吾過矣吾過矣傳曰秦伯素服郊次向師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也又曰潞子嬰兒之夫人晉景公之姊也鄷舒為政而殺之又傷潞子之目晉侯将伐之大夫皆曰不可鄷舒有三雋才言其材藝勝人有三也伯宗曰必伐之狄有五罪不祀一也嗜酒二也棄仲章而奪黎氏地三也仲章狄賢人黎氏黎侯也虐我伯姬四也傷其君目五也怙其雋才而不以茂徳滋益罪也又曰衛獻公使祝宗告亡且告無罪告宗廟也定姜曰有罪若何吿無舎大臣而與小臣謀一罪也先君有冡卿以為師保而蔑之二罪也余以巾􅌨侍先君而暴妾使余三罪也告亡而已無告無罪又曰吴公子札自衛過晉将宿於戚聞鐘聲焉曰異哉吾聞之辯而不徳必加於戮夫子獲罪於君以在此懼猶不足而又何樂又曰鄭公孫黒将作亂子産使吏數之曰伯有之亂以大國之事而未爾討也爾有亂心無厭國不汝堪專伐伯有而罪一也昆弟争室而罪二也薫隧之盟汝矯君命而罪三也有死罪三何以堪之又曰陳侯之弟招殺太子偃師罪在招也楚人執陳行人于徴師殺之罪不在行人也論語曰子謂公冶長可妻也雖在縲絏之中非其罪也以其子妻之又曰朕躬有罪無以萬方萬方有罪罪在朕躬孝經曰五刑之屬三千而罪莫大於不孝家語曰孔子曰大罪有五而殺人為下逆天地者罪及五世誣文武者罪及四世逆人倫者罪及三世誣鬼神者罪及二世手殺人罪止一身又曰孔子曰大夫之罪有在五刑之域者聞有譴發譴譲也發始發露也則白冠㲠纓盤水加劒造于闕而自請罪君不使有司執縛牽掣而加之也其有大罪者聞命則北面再拜跪而自裁君不使人捽引而刑殺也曰子大夫自取之耳吾遇子有禮矣史記曰范雎盛帷帳侍者甚衆須賈頓首言死罪曰賈不意君能致於青雲之上惟君死生之范雎曰汝罪有㡬曰擢賈之髪以數賈之罪尚未足也漢書曰恵帝二年制曰今法有誹謗訞言之罪是使衆臣不敢盡情而上無由聞過失也将何以来逺方之賢良其除之又曰南越反上復欲使楊僕将為其伐前勞以書勅責之曰将軍非有斬将搴旗之實也焉足以驕人哉前破番禺捕降者以為虜掘死人以為獲是一過也建徳吕嘉建徳佗孫也吕嘉其相也逆罪不容於天将軍擁精兵不窮追超然以東越為援是二過也士卒暴露連嵗朕為朝㑹不置酒将軍不念其勤勞而造佞巧請乗傳行塞因用歸家懐銀黄垂三組夸鄉里三過也失期内顧以道惡為觧失尊尊之序是四過也後漢書曰荆州刺史趙凱誣奏楊璇實非身破賊而妄有其功遂檻車徴璇防禁嚴宻無由自訟乃噬臂出血書衣為章具陳破賊形勢及言凱所誣状潜令親属詣闕通之詔書原璇拜議郎凱反受誣人之罪宋書曰孔琳之為御史中丞明憲直法無所屈撓奏尚書令徐羡之虧違憲典時羡之領揚州刺史琳之弟璩之為治中羨之使璩之觧釋琳之使寝其事琳之不許曰我觸忤宰相正當罪止一身汝必不應従坐何須勤勤耶自是百僚震肅莫敢犯禁北史曰賀若弼有罪在禁所詠詩自若上數之曰人有性善行惡者公之為惡乃與性俱有三太猛嫉妒心太猛自是非人心太猛無上心太猛昔在周朝已教伊兒子反此心終不能改唐書曰高祖詔曰朕自起義晉陽遂登皇極經綸天下實仗羣才尚書令秦王尚書右僕射寂或契合元謀或同心運始並蹈義輕生捐家殉節艱辛備履金石不移論此忠勤禮宜優異官爵之榮抑惟舊典勲賢之義宜有別恩其罪非叛逆可聽恕一死說苑曰禹出見罪人下車問而泣左右曰王何為痛之至於此禹曰堯舜之民皆以堯舜之心為心今寡人為君百姓各以其心為心是以痛之也風俗通曰辠字為自辛令其辛苦憂之也秦皇以為字似皇故改為罪語林曰王子敬疾篤兄弟勸令首罪答曰無所應首唯遣郗家女以為恨雜五行書曰臯陶以壬辰日死不可劾罪人成罪也太平御覽卷六百四十一
