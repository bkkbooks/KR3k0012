body:
  text: 太平御覽卷七十一宋李昉等撰地部三十六瀵水瀑布温水潢津渚潏沚坻湄濆涘波瀵水爾雅曰瀵水出尾下瀵敷問切汾隂有水口如車輪名為瀵尾猶底也列子曰禹之治水而失塗謬之一國其名終北不知際畔無風雨霜露魚禽草木國中有山名壺嶺頂有穴狀若圎環名滋穴有水湧出曰神瀵山臭過蘭椒味過醪醴一源分為四埒人飲神瀵力志平和過則醉經旬廼醒也瀑布水水經注曰漯水又南入山瀑布飛梁懸河注壑崩湍十許丈謂之馬落山幽明録曰三峯最為竦桀自非清霽素朝不可望見峯下有泉飛流如舒一疋絹分映青林直注山下雖纎羅不動其上脩脩恒凄清風也臨海記曰郡西北有白鵠山山有池水懸注遥望見如倒掛白鵠因以名山上有深湖中又有魚如二百斛船大長二丈許羅浮山記曰羅嶺之南有瀑布掛泉四十餘丈周景式廬山記曰泉在黄龍南數里即瀑布水也土人謂之泉湖其水出山腹掛流三四百丈飛湍於林峯山表望之若懸索注水處石悉成井其深不測也何尚之清暑殿賦曰深波奔上瀑布懸下孫興公天台山賦曰赤城霞起以建標瀑布飛流而界道竺法真登羅山䟽曰增城縣有石溝深廣三丈有兩瀑布皆同注此溝相傳云是仙人流杯池水温泉華陽國志曰卭都縣南有温泉冬夏長熱其源可湯鷄豚下流澡洗治宿病餘多惡水水神自司不可穢汚及沉亂髪照面使人惡疾幽明録曰始興靈水源有湯泉每至霜雪見其上蒸氣髙數十丈生物投之湏㬰便熟吳録曰始興縣有始興山山出温泉可以瀹鷄山海經曰温水出空峒山山在臨汾南入河逕陽北也幽明録曰艾縣輔山有温冷二泉同出一山之庭兩泉發源相去數尺熱泉可以瀹鷄冷泉常有氷生博物志曰不周山六川之水温如湯也辛氏三秦記曰始皇生時作閣道至驪山八十里人行橋上車行橋下金石柱見存西有温水俗云始皇與神女戲不以禮女唾之則生瘡始皇怖謝神女為出温泉後人因洗浴焉江乗地記曰東南三十五里有湯泉半冷半温共同一壑盛𢎞之荆州記曰新都縣有温泉冬月未至數里遥見白氣如烟上下交映狀如綺䟽又有車輪雙轅形世人傳昔有玉女乗車自投此泉人時見女子姿儀光麗往來倐忽人造泉一有聲則沸從下出而不可止也又曰􅀥陽縣界有温泉其下有田資以浸灌一年三熟王孚安城記曰宜陽縣南鄉有温泉焉以生鷄卵投其中熟如煑也伏琛齊地記曰曲城東七十里有温水水如湯沸可療百病煑物無不熟也水經注曰温水出太乙山其水沸湧如湯杜彦回曰可治百病水清則病愈水濁則無驗潢說文曰潢積水池也晏子春秋曰景公與晏子立曲潢之上公望見齊國問晏子曰後世孰將踐有齊者晏子對曰非賤臣之所敢議津論語曰長沮桀溺耦而耕孔子過之使子路問津焉長沮曰夫執輿者為誰子路曰為孔丘曰是魯孔丘與曰是也曰是知津矣言數周流自知津處晉書曰雷煥卒子華為州從事持劍行經延平津忽於腰間躍出墮水使人投水取之不見劍但見兩龍各長數丈蟠縈有文章投者懼而返須㬰光彩照水波浪驚沸崔鴻十六國春秋曰石虎起河橋於靈昌津採石為中濟石無大小下輙隨流用功五百餘萬而終不成虎遣散騎侍郎崔收沉璧中流告誠已地震水流莫不傾壊壓死者百餘人虎甚怒乃斬工匠止作而還又曰慕容德正月渡黎陽津流澌氷合鄴令韓軌言於德曰光武渡滹沱澌氷自合大王濟河天橋自成靈命所扶徵兆已見德大恱改黎陽津為天橋津郡國志曰陜州平陸縣小平津張讓劫獻帝處南岸有勾陳壘武王伐紂八百諸侯㑹于孟津又曰杜預造河橋於富平即此也又曰曹州離狐縣有延津澹臺子羽投璧斷蛟處酈道元水經注曰舊東郡白馬縣神馬亭有神馬寺去白馬津可二十里許東南去白馬縣故城可五十里開山圖所謂白馬山也山上常有白馬羣行悲鳴則河决馳走則山崩又曰吕望東海人也老而無遇以釣干周吕望行年五十賣食棘津七十則屠牛朝歌行年九十身為帝師又曰𢎞農郡有竇津說者咸云漢武㣲行相谷遇辱感竇妻深識既反厚賚賞焉賜以河津令其鬻渡今竇津是也又曰雲中定襄之間有津曰君子津昔漢桓帝三十年西幸榆中東行代地洛陽大賈賫金貨隨帝後行夜迷失道往投津長津長送之渡河賈人卒死津長埋之其子尋求父䘮發塚舉尸資費一無所損其子悉以金與之津長不受事聞於帝帝曰君子也即名其津為君子津又曰河水東北為長壽津述征記曰凉城至河壽津六十里河之故瀆在焉異苑曰石勒元初十一年伐劉曜於洛陽從大河南濟時凍將合軍至而氷自泮舟檝無閡遂生擒曜謂是神靈之助改名靈昌津吳越春秋曰勾踐入吳吳王遣之越王伏不敢起吳王遂引上車范蠡為執御至三津之上仰天長歎淚下沾襟曰嗟乎孤危也不意復生渡此津渚釋名曰渚遮也能遮水從傍廽也詩曰鴻飛遵渚公歸無所於汝信處又曰魚潛在淵或在於渚又曰鳬鷖在渚公尸來燕來處廣雅曰渚處也晉書曰温嶠至牛渚磯水深不可測世云其下多怪物嶠遂燬犀角而照之湏㬰見水族覆水竒形異狀或乗車馬著赤衣者嶠其夜夢人謂已曰與君幽明異路何意相照也意甚惡之嶠先有齒疾至是㧞之中風至鎮未旬而卒又曰殷羡建元中為豫章太守去郡郡人多附書一百餘封行至江西石頭渚岸以書擲水中祝曰沉者自沉浮者自浮殷洪喬非是致書郵故時人號為投書渚吳興記曰烏程西風渚者防風氏國也幽明録曰淮南牛渚津水極深無可算計人見一金牛形甚醜因名焉文選詩曰雙鷰逰蘭渚潏釋名曰潏術也堰使水鬰術也魚梁水碓之謂也爾雅曰人所為曰潏沚釋名曰沚止也水可以息其止也詩曰遡洄從之宛在水中沚又曰菁菁者莪在彼中沚傳曰澗溪沼沚之毛潢汙行潦之水可薦於鬼神可羞於王公坻說文曰秦謂陵阜曰坻釋名曰坻遲也能小遏水使流遲也賈誼鵩鳥賦曰乗流爰逝兮得坻則止湄神仙傳曰河上公漢景帝時結草為庵於河之湄常讀老子書帝不解老子數事遣問公不答帝駕從之即躍身空中矣濆說文曰濆水涯也詩曰汝墳道化行也文王之化行乎汝墳之國也遵彼汝墳伐其條枚又曰彼汾沮洳言采其莫涘說文曰涘水涯也詩曰綿綿葛藟在河之涘又曰所謂伊人在水之涘波釋名曰風吹水成紋為瀾瀾連也波體轉流相及連也小波曰淪淪倫也水相次有倫理也詩曰有豕白蹢烝渉波矣魏志曰魏明帝至廣陵臨江觀兵見波濤汹湧歎曰此天所以限南北也遂歸又曰徐宣從文帝於廣陵六軍乗船風浪暴起帝船廽倒宣時病在後凌波獨前羣僚無至者帝壯之遷尚書益都耆舊傳曰張覇為㑹稽太守入海捕賊遭疾風晦㝠波水湧起士卒驚白覇覇曰無得恐太守奉法追賊風必不為害須㬰風靜波止莊子曰孔子逰乎緇帷之林休坐乎杏壇之上有漁父者孔子曰其聖人歟乃下求之漁父語訖刺船而去延縁葦間顔淵還車子路授綏孔子不顧待水波定不聞挐音而後敢乗挐船櫂也淮南子曰武王伐紂渡盟津陽侯之波逆如擊疾風晦𡨕人馬不相見於是武王左操黄鉞右執白旄瞋目而麾之曰余在天下誰敢害吾志者於是風霽波罷又曰楚國之人有乗船而遇大風者波至而恐自投水非不貪生而畏死或恐死而忘生也世說曰桓宣武在南州與㑹稽王㑹於溧洲于時漾舟江側謝公亦在狂風忽起波浪鼓湧非人力所制桓有懼色㑹稽王亦㣲異惟謝公怡然自若頃間風止桓問謝曰向那得不懼謝笑止徐答曰何有三才同盡理孔叢子曰子順謂韓王曰胡越之人同舟濟江中流遇風波其相救如左右手所患同也廣雅曰陽侯濤大波也戰國䇿曰或謂公叔曰乗舟漏而不塞則舟沉矣塞漏舟而輕陽侯之波則舟覆矣今公自以辯於薛公是塞漏舟而輕陽侯之波也太平御覽卷七十一
