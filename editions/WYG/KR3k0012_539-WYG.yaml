body:
  text: 太平御覽卷五百三十九宋李昉等撰禮儀部十八宴㑹上夀贄宴㑹毛詩曰鹿鳴宴群臣嘉賔也又曰常棣宴兄弟也又曰伐木宴朋友故舊也自天子至于庶人未有不須友以成者親親以睦友賢不棄不遺故舊則民徳歸厚矣又曰湛露天子宴諸侯也周禮春官大宗伯掌享宴之禮親四方之賔客禮記曰諸侯宴禮之義俎豆牲醴薦羞皆有等差所以明貴賤也左傳文公四年衛寗武子來聘公與之宴為賦湛露及彤弓不辭又不荅賦使行人私焉對曰臣以為肄業及之也昔諸侯朝正於王王宴樂之於是乎賦湛露則天子當陽諸侯用命也若諸侯敵王所愾而獻其功於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴今陪臣來繼舊好君辱貺之其敢干大禮以自取戾又宣公曰晉侯飲趙盾酒伏甲将攻之其右提彌明知之趨登曰臣侍君宴過三爵非禮也又成公曰衛侯饗苦成叔寗惠子相苦成叔傲寗子曰苦成家其亡乎古之為享食也以觀威儀省禍福也今夫子傲取禍之道也又昭公曰楚靈王享昭公於新臺好以大屈宴好好賜也大屈弓名也既而悔之又昭公曰穆有塗山之㑹漢書髙祖擊英布還過沛治酒悉召故人父老發沛中兒百二十人教之歌酒酣上自擊筑曰大風起兮雲飛揚威加海内兮歸故鄉安得猛士兮守四方自起舞慷慨傷懷泣下數行謂父老曰逰子歸故鄉吾雖都關中萬嵗後吾䰟􅅎猶樂思沛也與沛父老諸母樂飲道舊故為笑晉書禮志曰漢建安中將正㑹而太史上言正旦當日蝕朝士疑㑹否共咨尚書令荀彧時廣平計吏劉昭在彧坐曰梓慎禆竈古之良史猶占水火錯失天時諸侯旅見天子入門不得終禮者五日蝕在上然則聖人垂治不為變異豫廢朝禮或者灾消異伏或推術謬誤也彧及衆人咸善而從之遂朝㑹如舊亦不蝕魏書曰文帝為魏王南征次譙大享六軍及譙父老自娱樂伎列百戯魏志曰黄初元年郭淮奉使賀文帝踐祚而道路疾病計逺近為稽留及群臣在㑹帝正色責之曰昔禹㑹諸侯塗山防風後至便行大戮今溥天同慶而最遲留何也對曰臣聞五帝先教道民以徳夏后政衰始用刑辟今臣遭唐虞之世是以免於防風之誅帝恱之晉書禮志曰漢儀有正㑹禮正旦夜漏未盡七刻鐘鳴受賀公侯以下執贄来庭二千石以上升殿稱萬嵗然後作樂宴享魏武帝都鄴正㑹文昌殿用漢儀又設百華燈晉氏受命武帝更定元㑹儀咸寧注是也晉起居注曰太常張華上書按舊事拜公建始殿因以小㑹盖所以崇宰輔也宋書禮志曰正旦元㑹設白虎罇於殿庭罇盖上施白虎若有能獻直言則發此罇飲酒東宫舊事曰正㑹儀太子着逺逰冠絳紗袍登輿至承華門前設位拜二傅交拜禮畢不復登車太傅訓道少傅在後太子入崇賢門作樂太子登殿西向坐世說曰孝武在西堂㑹伏韜預坐還下車使呼其兒語之曰天子百人髙㑹臨坐未得他語先問伏韜何在在不此固未易為人作父如此何如摯虞决疑要注曰讌之與㑹威儀不同也㑹則隨五時朝服庭設金石懸虎賁着旄頭文衣鶡尾以列陛讌則服常服設絲竹之樂唯宿衛者列仗大㑹于太極殿小㑹於東堂世說曰過江諸人每至暇日相要出新亭藉卉飲宴周侯中坐而嘆曰風景不殊舉目有江河之異皆流淚唯丞相愀然作色曰當共戮力王室克復神州何至作楚囚相對傅𤣥元㑹賦曰考夏后之遺訓綜殷周之典藝採秦漢之舊儀定元正之加㑹潘岳閑居賦曰席長筵列孫子栁垂隂車結軌陸擿紫房水佳赬鯉或宴於林或禊於汜昆弟班白兒童稚齒稱萬夀以獻觴咸一懼而一喜夀觴舉慈顔和浮水樂飲絲竹駢羅頓足起舞抗音髙歌人生安樂孰知其他古詩曰今日良宴㑹懽樂難具陳彈箏奮逸響新聲妙入神古豔詩曰今日樂上樂相従天公出美酒河伯出鯉魚青龍前鋪席白虎持榼壺南斗工鼓琴北斗吹笙竽曹植侍太子坐詩曰白日耀青天微雨凈飛塵寒氷辟炎暑凉風飄我身清醴盈金觴肴饌縱横陳齊人進竒樂歌者出西秦翩翩我公子機巧忽若神曹植與丁廙詩曰嘉賔填城闕豐膳出中厨吾於二三子曲宴此城隅秦筝發西氣齊瑟揚東謳肴来不虗歸觴至反無餘陸機皇太子請宴詩序曰感聖恩之罔極退而賦此詩也上夀毛詩大雅江漢曰虎拜稽首天子萬年虎拜稽首對揚王休作召公考天子萬夀左傳哀公宴於梧丘武伯為祝祝上夀酒也漢書髙祖與項羽大㑹鴻門項荘入為夀進爵於尊者獻無疆之夀也史記曰武帝王太后在民間時所生一女父為金王孫王孫已死韓王孫名嫣乗間白言太后有女在長陵武帝曰何不早言武帝乃自徃迎取乗輿至金氏門外使騎圍其宅女亡匿内中床下扶持出詣車載之馳還入長樂宫太后曰帝從何来帝曰今日至長陵得臣姊與俱来帝奉酒前為夀賜錢千萬奴婢三百人公田百頃甲第以奉姊太后謝曰爲帝費漢書衛青傳曰時王夫人方幸於上寗乗說青曰今王夫人幸而宗族未富貴願將奉所賜千金為夫人親夀青以五百金為夀上間問青以實對上廼拜寗乗為東海郡都尉又曰倪寛為御史大夫從東封太山登明堂寛奉觴再拜上千萬嵗夀制曰敬舉君之觴又曰隆慮公主子昭平君尚帝女夷安公主隆慮公主病困以金千斤錢十萬為昭平君豫贖死罪上許之隆慮卒昭平君日驕醉殺主傅繋獄廷尉上請上良久曰法令者先帝所造也因弟故而誤先帝之法吾何面目入髙廟乎且又下負萬民乃可其奏哀不能自止左右盡悲東方朔前上夀曰臣聞聖王為政賞不避仇誅不擇骨肉書曰不偏不黨王道蕩蕩此二者五帝所重三王所難也陛下行之是以四海之内元元之民各得其所天下幸甚臣朔奉觴昩死再拜上萬嵗夀上乃起入省中久時召讓朔免冠頓首曰臣聞樂太甚則陽溢哀太甚則隂頓隂陽變則心氣動心氣動則精神散而邪氣入消憂者莫若酒臣朔以上夀者明陛下正而不阿思以止哀也後漢書班超傳曰超區區特䝉神靈竊冀未便仆僵目見西域平定陛下舉萬年之觴薦勲祖廟布大喜于天下東觀漢記曰吳良齊郡人為郡議曹掾吏正旦入賀太守門下掾王望前言曰齊郡敗亂遭罹盗賊人民飢餓不聞鷄鳴犬吠之音明府視事五年五榖豐登家給人足今日嵗首請上雅夀掾吏皆稱萬嵗良跪曰門下掾佞謟明府受其觴盗賊未盡人民困乏良曹掾尚無絝望曰議曹惰窳自無絝寧不為家給人足耶太守曰此生言是也遂不舉觴賜鰒魚百枚署功曹後漢書曰竇后定策立靈帝帝以太后有援立之功率羣臣朝於南朝親饋上壽也魏書曰文帝為魏王南征次譙大饗六軍及譙父老設伎樂百戯令曰先王云樂其所自生禮不忘其本譙霸王之邦真人本土其復譙租稅二年三老上夀日久而罷晉書禮志曰元正上夀謁者引王詣樽酌夀酒跪授侍中侍中跪置御坐前王還王自酌置位前謁者跪奏藩王臣某等奉觴再拜上千萬嵗四箱樂作百官再拜已飲又拜唐書曰元和十四年齊魯初平宴文武百僚裴度舉觴獻夀跪而言曰陛下徳配天地明並日月神武獨斷冦逆削平錫宴羣臣兹當令節臣偹位台司幸逄昌運願與四海九州之人同上千萬嵗夀上執酒為飲之管子曰桓公管仲鮑叔牙寗戚四人飲酣桓公謂鮑叔牙曰盍不起為寡人夀乎鮑叔牙奉杯而起曰使公毋忘出在莒時也使管子毋忘束縛在於魯也使寗戚毋忘其飯牛下車也桓公避席再拜曰寡人與二大夫能毋忘夫子之言則齊國之社稷不危也燕丹子曰太子置酒請荆軻酒酣太子起為夀贄尚書曰五玉三帛二生一死贄三帛諸侯也子執纁公之孤執𤣥附庸之君執黄二生卿執羔大夫執雁一死士執雉玉帛生死所以為贄而見者儀禮曰士相見之禮贄冬用雉夏用腒下大夫相見以雁飾之以布維之以索如執雉上大夫相見以羔飾之以布四維之結於面左頭如麛執之以士相見之禮周禮春官上大宗伯曰以玉作六瑞以等邦國王執鎮圭公執桓圭侯執信圭伯執躬圭子執榖璧男執蒲璧以禽作贄以等諸臣執之言至也所執一自致孤執皮帛卿執羔大夫執鴈士執雉庻人執鶩工商執鷄皮帛束帛也表以為皮為之虎豹皮也帛如璧色繒也羔小羊取其羣而不失其類也㕍取其候時而行之也雉取其守介而死不失其節也鶩取其不飛鷄取其守時而鳴禮記曲禮曰凡贄天子鬯諸侯圭卿羔大夫鴈士雉庶人之贄匹童子委贄而退野外軍中無贄以纓拾矢可也婦人之贄椇榛脯脩棗栗春秋荘公曰哀姜至使宗婦覿用幣非禮也御孫曰男贄大者玉帛小者禽鳥以章物也女贄不過榛栗棗脩以告䖍也又定公下曰公㑹晉師於瓦范獻子執羔趙簡子中行文子皆執雁魯於是乎始尚羔榖梁傳曰荘公曰大夫宗婦覿用幣覿見也禮大夫不見夫人不言及不正其行婦道故列數之也男子之贄羔雁雉腒婦人之贄棗栗鍛脩用幣非禮也用者不宜用者也大夫國體也而行婦道惡之故謹而日之公羊傳荘公曰戊寅大夫宗婦覿用幣宗婦者何大夫之妻也覿者見也用者何用者不宜用也見用幣非禮也然則曷用栗棗云腵脩云乎禮記外傳曰王者朝臣諸侯之朝臣非南靣之尊地不成國徳不比玉故不執玉孤執皮幣卿執羔大夫執雁士執雉雉性剛有死節夏執乾雉餘三時皆執死雉工商執鷄庻人執鶩諸侯太子非天子所命者有列㑹之事則執皮帛繼子男之下婦人初見舅姑執榛栗棗脩執贄幣非禮也白虎通曰臣見君有贄者何贄者質已之誠王者縁臣子心以為之制差有尊卑以副其意也公侯以玊為贄玊者取其燥不輕濕不重明公侯之徳全也卿以羔為贄羔者取其羣而不黨卿職在盡忠率下大夫以鴈為贄者取其飛成行列大夫職在奉命適四方動作當能自正以事君也士以雉為贄者取不可誘之以食脅之以威必死不可畜士行耿介守節也又曰公執玊取其暢逹也卿執羔取其跪乳有禮也書曰五玊三帛二生一死贄又曰至正月朔日乃執贄而朝賀正月何嵗竟氣改與新長相保重本正始也五經異義曰謹按周禮説五玊贄自孤卿以下執禽尊卑有差也禮不下庻人工商之無朝儀五經無朝儀五經無説庻人工商有贄穆天子傳曰天子賔於西王母乃執白圭元璧以見西王母獻錦組百純説苑曰鶩無他飛故庻人以為贄也太平御覽卷五百三十九
