body:
  text: 太平御覽卷三百四十二宋李昉等撰兵部七十三劒上劒上釋名曰劒撿也所以防撿非常也又斂也以其在身拱持斂在臂内也其旁鼻曰鐔音㝷鐔㝷也帶所以貫㝷也其末曰鋒末之言也方言曰鞘音肖謂之室説文曰韜謂之衣亦曰襓襓音遶字林曰彘直例反劒鼻也禮記曰武王克商後散軍而郊射左射貍首右射騶虞而貫革之射息也禆冕搢笏而武賁之士脱劒又曰進劒者左首尊也又曰受弓劒以袂敬也周禮曰周官桃氏為劒臘廣二寸有半寸臘謂刃臘音獵兩從半之劒脊兩靣殺趨鍔以其臘廣為之莖圍長倍之莖謂劒夾人所握鐔以上中其莖設其後謂從中以却稍大之身長五其莖長重九鋝音刷謂之上制上士服之身長四其莖長重七鋝謂之中制中士服之身長三其莖長重五鋝謂之下制下士服之今之匕首也各以形貌大小帶之士勇士也又曰鄭之刀宋之斤魯之削吳越之劒遷乎其地而弗能為良地氣然也左傳曰初虞叔有玉虞叔虞公之弟虞公求􅏧弗獻既而悔之曰周諺有之匹夫無罪懐璧其罪吾焉用此以賈害也乃獻之又求其寳劒叔曰是無厭也無厭將及我遂伐虞故虞公出奔共池共池地名又曰莒子庚輿虐而好劒苟鑄劒必試諸人國人患之又將叛齊烏存帥國人以逐之烏存莒大夫也又曰吳公子光伏甲扵窟室而享王掘地為室王使甲坐於道及其門門階戸席皆王親也夾之以鈹羞者獻體改服於門外進羞者獻體觧衣也執羞者坐行而入執鈹者夾承之承執羞者也光偽足疾入於窟室恐難作王黨殺已豫避之也専諸寘劍魚中以進遂殺王又曰吳將伐齊越子率其衆以朝吳人皆喜唯伍子胥懼曰是豢吳也吳王聞之使賜之屬鏤以死屬鏤劒也又曰楚太子建為鄭人殺之其子勝在鄭晋人伐鄭楚救之與之盟勝怒曰鄭人在此讎不逺矣勝自厲劒子平見之曰王孫何以自厲也曰將以殺汝父也又曰宋殺申舟楚子聞之劒及寢門之外怒也家語曰子路戎服見孔子拔劒舞之曰古之君子以劒自衛子曰古之君子忠以為質仁以為衛不出環堵之室而知千里之外有不善則以忠化之暴則以仁圍之何必持劒子路曰由乃得聞此言也請攝齊以受教又曰顔回曰願鑄劒㦸為農噐戰國䇿曰韓卒之劒皆出扵㝠山棠谿墨陽宛馮龍泉太阿皆陸斷馬牛水擊鴻鴈當敵於甲盾耳此天下名噐也國語曰齊桓公問曰齊國寡甲兵為之若何管子曰小罪讁以金美金以鑄劒㦸試諸狗馬惡金以鑄鉏夷試諸壊土乃甲兵大足也史記曰吳季札之初使北過徐君好季札劒口弗敢言季札知之為使上國未獻還至徐徐君已死乃解其寳劒繫徐塚樹而去從者曰徐君已死當誰予乎曰不然始吾心已許之豈以死背吾心哉又曰平原君及毛遂與楚合從言其利害日出而言日中不决遂按劒而上請平原君曰從者利害兩言而决耳今日出而言日中不决何也楚王謂平原君曰客何為者也平原君曰是勝之舍人也楚王叱之胡不下吾乃與君言汝何為者也毛遂按劒而前曰今十歩之内王不能恃楚國之衆也王之命懸於遂且遂聞湯以七十里之地而王天下文王以百里之壤而臣諸侯今楚地方五千里持㦸百萬此覇王之資也白起小竪子耳率數萬之衆興師以與楚戰一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人此百世之怨而趙之所羞而王弗知惡合從者為楚非為趙也吾君在前叱者何也諸侯乃定從又曰范睢傳云秦昭王臨朝歎息應侯進曰臣聞主憂臣辱主辱臣死今大王中朝而憂臣敢請其罪王曰吾聞楚之鐵劒利而倡優拙夫鐵劒利則士勇倡優拙則思慮逺大以逺思慮而御勇士恐楚之圖秦也又曰李斯上書云今陛下服太阿之劒乗纎離之馬此數寳者秦不生一焉又曰陳平間行杖劒亡渡河船人見其美丈夫獨行疑其亡將腰中當有金寳目之欲殺平平恐乃解衣裸而佐刺船船人知無有乃止又曰鄒陽上書梁王云臣聞明月之珠夜光之璧以闇投人于道路人無不按劒相眄者何則無因而至前也又曰髙祖送徒驪山夜徑澤中令一人行前行前者還報曰前有大蛇當徑願還髙祖曰壯士行何畏乃前拔劒斬蛇又曰髙祖置酒雒陽宮曰吾有三傑而能用之故吾以布衣提三尺劒取天下也項羽有一范增而不能用所以為吾擒也又曰髙祖擊英布時為流矢所中髙祖問醫曰病可治乎醫曰可治于是髙祖慢罵之曰吾以布衣提三尺劒取天下此非天命乎命乃在天雖扁鵲何益又曰伍員奔吳船人濟之員感其徳解寳劒賜之船人曰子達吳勿相忘劒則不敢以當又曰魏相為丞相好武皆令諸吏有奏事者帶劒而前奏或有不帶劒者入奏事乃借錯劒而方敢入又曰荆軻衛人之燕燕人謂之軻卿軻卿好讀書學擊劒以術説元君元君不用又曰司馬相如好讀書學擊劒故母名曰犬子漢書曰雋不疑字曼倩渤海人治春秋為郡文學進退必以禮名聞州郡武帝末暴勝之為直指使者衣繡衣素聞不疑賢至渤海遣吏請與相見不疑冠進賢冠帶攂具劒應劭曰攂具標首之攂磊落壯大之貌又曰時中國初定尉佗平南越因王之髙祖使中大夫陸賈賜佗印為南越王王賜賈槖中装千金賈有五男乃出所使槖中装賣千金分其子子二百金賈常乗安車駟馬從歌鼓瑟侍者十人寳劒值百金謂其子曰與汝約過汝給人馬酒食極歡十日而更約所死家得寳劒其逰漢庭名聲籍甚言狼籍甚盛也又曰朱愽奏王莾為庶人莾就國南陽太守以莾貴重選門下掾孔休守新都相休謁見莾莾盡禮自納休亦聞其名莾後病休候之莾縁恩意進其玉具劒欲以為好休不肯受莾因曰誠見君面有瘢羙玉可以滅瘢休復辭讓莾曰君嫌其價耶遂椎碎自裹以進休乃受之又曰朱雲曰臣願請上方斬馬劒斷佞臣一人首上問誰對曰安昌侯張禹上怒又曰龔遂為渤海太守務農勸人賣劒買牛曰何為佩牛乎又曰沛公從百餘騎見羽於鴻門羽因留沛公飲范增乃數目羽擊沛公羽不應范增起出謂項莊曰君王為人不忍汝入以劒舞因擊殺之莊入為夀畢曰軍中無以為樂請以劒舞因拔劒起舞項伯亦起舞常以身翼蔽沛公獲免又曰孝景帝賜衛綰曰先帝賜臣劒凡六不敢奉詔上曰劒人之所施易獨留至今乎綰曰具在上使取六劒劒常盛未嘗服也又曰質氏以治削而鼎食注治刀劒也又曰王莾使武賁以斬馬劒挫音剉董忠又曰梁冀帶劒入省尚書張凌呵叱令出冀跪謝凌不應因劾奏詔以一嵗俸贖罪楚漢春秋曰上過陳留酈生求見使者入通公方洗足問如何人曰狀類大儒上曰吾方以天下為事未暇見大儒也使者出告酈生瞋目按劒入言髙陽酒徒非儒者也後漢書曰韓稜為尚書令與僕射郅夀尚書陳寵同時俱以才能稱肅宗嘗賜諸尚書劒唯此三人特以寵劒自手署其名曰韓稜楚龍泉晋太康記曰汝南西平縣有龍泉可淬刀劒特堅利汝南即楚分野也郅夀蜀漢文陳寵濟南椎成椎音直追切漢官椎成作鏗成時論者為之説以稜深有謀故得龍泉夀明達有文章故得漢文寵敦敦朴善不見外故得椎成謝承後漢書曰延熹中詔應奉曰蠻夷叛逆作難積惡放恣鑊中之魚火熾湯盡當急燋爛以雪國耻朝廷以奉昔守南土威名播越故復式序重任奉之廢興期在扵今賜俸錢十萬駮犀方具劒金錯把刄劒革帶各一奉其勉之也又曰吳郡張業字文仲叔為郡門下掾送太守歸鄉里至河内遇賊業拔劒與賊交戰而死子武時幼不識父傷父喪不還每至節日持業所遺劒至河内到業死處醊酒悲哀感動路人東觀漢記曰世祖十三年外國有獻名馬寳劒直百金馬以駕鼓車劒以賜騎士又曰馮石襲母公主封獲嘉亦為侍中稍遷衛尉能取悦當世為安帝所寵帝嘗幸其府留飲十數日賜駮犀具劒紫艾綬玊玦各一又曰建武二年遣馮異西擊赤眉平關中上自河南賜異乗輿七尺玉具劒又曰光武有駭犀之劒以賜陳遵魏志曰文帝為太子時與鄧庶飲酣論及劒術不决時方食甘蔗因以習之下殿數交三中其臂魏畧曰嚴翰字公仲噐性重厚篤好擊劒魏氏春秋曰魏武過城臯故人吕伯奢伯奢不在家人為供具聞其食噐聲疑其圗已夜手劒殺八人既見食飲廼悽愴曰寧我負人無令人負我吳書曰太史慈臨亡歎息曰丈夫生世當帶七尺之劒以升天子之階今所志未從奈何而死乎權甚悼惜之晉書曰上公九命則劒履上殿又曰張軌遣主簿令狐亞聘南陽王模甚悦遺軌以帝所賜劒謂軌曰自隴已西征伐斷割悉以相委如此劒矣又曰武庫火厯代之寳孔子履漢髙斬白蛇劒王莾頭皆失所在張華見龍劒排戸而飛去又曰何攀除兖州刺史錫班劒赤舄又曰王如初聚衆作逆敗王敦弟稜愛驍武請敦配麾下稜甚加寵遇如數與敦將角射鬭争為過稜杖之如甚以為恥初敦有不軌之迹稜每諫之敦常怒異巳乃宻使人激怒如勸令殺稜因稜閒宴如請劒舞為勸稜許之如乃舞刀為戲漸來前稜惡而呵之不止遂直前斬稜敦聞而佯驚亦捕如誅之又張華𫝊曰吳之未滅也斗牛之間常有紫氣道術者皆以吳方强盛未可圗也唯司空張華以為不然及吳平之後紫氣愈明華聞豫章人雷煥妙達緯象乃要煥宿屏人曰可共尋天文知將來吉凶因登樓仰觀煥曰僕察之乆矣唯牛斗之間頗有異氣華曰是何祥也煥曰寳劒之精上徹扵天耳華曰君言得之吾少時有相者言吾年出六十位登三事當得寳劒佩之斯言效歟因問曰在何郡煥曰在豫章豐城華曰欲屈君為宰宻共尋之可乎煥許之華大喜即補煥豐城令煥到縣掘獄屋基入地四丈餘得一石函光氣非常中有雙劒並刻題一曰龍泉一曰太阿其夕牛斗間氣不復見焉煥以南昌西山北巖下土以拭劒光芒艶發大盆盛水置劍其上視之者精芒炫目遣使送一劒并土與華留一自佩或謂煥曰得兩送一張公豈可欺乎煥曰大朝將亂張公當受上禍此劒當繫徐君墓樹耳靈異之物終當化去不永為人服也華得劒寳愛之常置坐側華以南昌土不如華隂赤土報煥書曰詳觀劒文乃干將也莫邪何以不至雖然天生神物終當合耳因以華隂土一斤致煥煥更以拭劒倍益精明華誅失劒􅀁在煥子爽為州從事持劒行經延平津劒忽扵腰間躍出墮水使人沒水取之不見劒但見兩龍各長數丈蟠縈有文章沒者懼而返湏臾光彩照水波浪驚沸於是失劒爽歎曰先君化去之言張公終合之論此其驗乎華之愽物多此類晋書載記曰劉曜自以形質異衆恐不容於俗隠迹管涔山以琴書為事嘗夜閒居二童子入跪曰管涔王使小臣奉謁趙皇帝獻劒一口置前再拜而去以燭視之劒長二尺光澤非常赤玉為室背有銘云神劒服御除衆毒曜遂服之劒隨四時變為五色崔鴻後趙録曰張賔闊達有大節甞自謂昆弟曰吾自言智䇿鍳識不後張子房但不遇髙祖耳勒與諸將下山東賔曰吾厯覽諸將獨胡將軍可與共成事者乃提劒軍門大呼請見宋書曰初世祖嘗賜謝莊寳劒莊以與豫州刺史魯爽别後爽反叛世祖因宴集問劒所在答曰昔以與魯爽别竊為陛下杜郵之賜上甚悦當時以為知言梁書曰天監五年廬陵太守王希聃于髙昌縣獲銅瑞劒二口以聞曰薄伐凶醜而龍淵耀質匈奴將滅白旗表徵又曰七年㑹稽太守衡陽王元簡上言餘姚縣掘地得劒二口又於縣東江水中得劒一口文漫若雌雄又曰羊侃初為尚書郎以勇聞魏帝嘗謂曰郎官為卿為虎豈羊質虎皮乎試作虎狀侃因以手抉殿柱沒指魏帝壯之賜以珠劒三國典畧曰侯景簒位遷豫章王棟别官白虹貫日三重其夜月入太微掩帝坐景所帶劒水精標無故墜落景身自俯拾心極惡之五代周史曰鄭仁誨字日新晋陽人父覇累贈太子太師仁誨幼事唐驍將陳紹光紹光恃勇使酒嘗乗醉抽佩劒將剸扵仁誨左右無不奔避唯仁誨端立以俟畧無懼色紹光因擲劔於地謂仁誨曰汝有此噐度必當享人間富貴太平御覽卷三百四十二
