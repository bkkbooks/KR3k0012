body:
  text: 太平御覽卷八十四宋李昉等撰皇王部九周文王武王成王周文王史記曰周后稷名棄其母有邰氏女曰姜嫄姜嫄為帝嚳元妃姜嫄出野見巨人跡心忻然悅之遂踐之而孕居期而生子以為不祥棄之隘巷牛羊過者皆避不踐徙置林中適㑹山林多人遷之而棄渠中氷上飛鳥以其翼覆薦之姜嫄以為神遂收養之因名為棄棄為兒時遊戲好種樹麻菽麻菽溢美及成人好耕農相地之宜榖者稼穡焉堯聞之舉為農師天下得其利封之於邰號曰后稷别姓姬氏后稷之興在唐虞之際皆曰有令德后稷卒子不窋陟律反立不窋末年夏后氏政衰去稷不務不窋失其官而奔戎狄之間不窋卒子鞠立鞠卒子公劉立公劉雖在戎狄之閒復修后稷之業務耕種行地宜百姓懷之多從而保歸焉周道之興自此公劉卒子慶節立國於豳九世至古公亶父復修后稷公劉之業積德行義國人皆戴之獯音勲鬻音育戎狄攻之欲得地與民民皆怒欲戰古公曰有民立君将以利之今戎狄所為攻戰以吾地與民民之在我與在彼何異民欲以我故戰殺人父子而君之予不忍為乃與私屬去豳渡漆沮踰梁山止於岐山豳人舉國扶老擕弱盡歸於岐下及他旁國聞古公仁亦多歸之於是古公乃貶戎狄之俗營築城郭室屋而邑别居之民皆歌頌其德古公有長子曰泰伯次曰虞仲尚書帝命驗曰季秋之月甲子赤雀銜丹書入豐止昌户拜稽首稽首頭至地也至于磻谿之水吕尚釣涯吕氏尚名王下趣拜急見也曰公望七年曰公望我相望七年言乆也乃今見光景于斯尊之辭斯此也答曰望釣得玉璜半璧曰璜釣得魚中有璜刻曰姬受命吕佐旌受天命為天子吕佐旌理之也遂置車左王躬執驅下賢也車尊曰左王身執轡而驅焉號曰師尚父周書曰文王昌曰吾聞之無變古無易常無隂謀無擅制無更創為此則不祥太公曰夫天下非常一人之天下也天下之國非常一人之國也莫常有之惟有道者取之古之王者未使民民化未賞民民勸不知怒不知喜愉愉然其如赤子此古善為政也又曰文王在鎬召太子發曰嗚呼我身老矣吾語汝我所保與我所守傳之子孫吾厚徳而廣惠忠信而志愛吾不為驕侈不為泰靡不淫於美吾栝柱而茅茨吾為民愛費也太姜生少子季厯季厯娶太任皆賢婦人生昌有聖瑞古公云我世當有興者其在昌乎長子太伯虞仲知父欲立季厯古公卒季厯立是為王季王季修古公之道篤於行義諸侯頼之王季卒子昌立是為西伯西伯曰文王遵后稷公劉之業則古公王季之法篤仁敬老慈幼禮下賢者日中不暇食以待士伯夷叔齊太顛閎夭散宜生鬻子辛甲之徒皆歸之崇侯虎譛於紂曰西伯積善累德諸侯嚮之將不利於帝紂乃囚西伯於羑里閎夭之徒乃求有莘氏美女驪戎之文馬因殷嬖臣費仲獻之紂紂乃大悅赦西伯賜之弓矢斧鉞使專征伐謂西伯曰愬汝者崇侯虎也西伯乃獻洛西之地以請去炮烙之刑諸侯皆來决平虞芮之人有獄不能决乃如周入界耕者皆讓畔民俗皆讓長未見西伯而慙相謂曰吾所爭周所恥也遂還明年伐犬戎又明年伐宻須明年敗耆國明年伐郭明年伐崇侯虎而作豐邑自岐徙豐明年西伯崩太子發立帝王世紀曰文王昌龍顔虎肩身長十尺胷有四乳晏朝不食以延四方之士文王合六州之諸侯以朝紂紂以崇侯之䜛而怒諸侯請送文王棄于程十年正月文王自商至程太姒夢見商庭生棘太子發取周庭之梓樹之于闕閒梓化為松柏柞棫覺而驚以告文王文王不敢占召太子發命祝以幣告于宗廟羣神然後占之于明堂及發並拜吉夢遂作程寤始文王繼父為西伯都于雍州之地及受命復兼梁荆二州化被于江漢之域於是諸侯附之者六州而文王不失臣節先是文王夢日月之光著身又鸑鷟鳴於岐作武象之樂神農氏始作五絃之琴以具宫商角徵羽之音厯九代至文王復增其二絃曰少宫少商文王嗣位五十年即周書所謂文王受命享國五十年是也雒書靈准聽曰蒼帝姬昌日角烏鼻身長八尺二寸以成草木之長而順天時水澤不内舟楫以成魚鼈之長不麛不卵以成鳥獸之長畋獵惟時不殺童羊不夭胎童牛不服童馬不馳不騖澤不行害事不失其宜萬物不失其性天下不失其時又曰文王獨坐屏去左右深念逺慮召太公望曰帝王猛暴無文强梁好武侵凌諸侯苦勞天下百姓之怨心生矣其敎予奚行而得免於無道乎太公曰因其所為且興其化上知天道中知人事下知地理乃可以有國焉詩曰文王在上於昭于天周雖舊邦其命維新又曰維此文王小心翼翼昭事上帝聿懷多福又曰文王曰咨咨汝殷商匪上帝不時殷不用舊詩含神霧曰太任夢長人感己生文王春秋元命苞曰文王龍顔柔肩望羊柔肩言象龍膺曲起又曰伐殷者為姬昌姬昌之言基始也昌兩日重見言明象生於岐立於豐岐雍州之山最大者也精翼日為日精所羽翼故遂以為名也衣青色木神以其方色表衣遷造西十刻消遷造西蓋文王為西伯時東方造意東入討紂十刻之間即消滅之言聖人所向無前也又曰文王四乳是謂含良蓋法酒旗布恩舒惠酒者乳也能乳天下布恩之謂也春秋感精符曰孔子按録書含觀五常英人知姬昌為蒼帝精孟子曰昔者文王之治岐也耕者九一仕者世禄關市譏而不征澤梁無禁罪人不孥言往者文王為西伯時始行王政使岐民修井田八家耕八百畝其百畝以為公田及廬井故曰九一也紂時稅重文王復行古法也仕者世禄賢者子孫必有土地關以譏察非常不征稅也孥妻子也詩云樂爾妻孥罪人之子不孥惡惡止其身不及妻子也陂澤魚梁不設禁與民共也老而無妻曰鰥老而無夫曰寡老而無子曰獨幼而無父曰孤此四者天下之窮民而無告者文王發政施仁必先斯四者墨子曰赤雀衘珪降周之岐社命曰周文王伐殷韓子曰周有玉板紂令索之又曰昔文王侵盂克莒舉豐三事而紂惡之文王懼請入雒西地赤壤之國方千里以請解炮烙之刑天下皆悅仲尼曰仁哉文王輕千乘之國而請解炮烙之刑也文王疾羣臣請對曰興事動衆以増城王曰是重吾罪也不可也昌請改行重善以移之其可以免乎於是謹其禮秩皮革以交諸侯飾其辭令幣帛以禮俊士頒其爵列等級田疇以賞羣臣行無幾何疾乃止淮南子曰文王歸自商乃為玉門築靈臺相女童鐘鼓玉門以玉飾門為柱樞也相女童視之也以待紂之失也紂聞之曰周伯昌改道易行吾無憂矣乃為炮烙剖比干剔孕婦殺諫者文王乃遂其謀又曰文王之時紂為天子賦斂無度殺無止康梁流湎宫中成市康梁醉樂流湎酒也成市言集者多作為炮烙之刑刳諫者剔孕婦天下同心而苦之文王四世累善大王王季文王武王凡四世也修德行義處岐周之間地方不過百里天下二分歸之文王欲以卑弱制强暴以為天下去殘除賊而成王道蓋太公為謀主也大公為周陳隂符兵謀也賈誼書曰文王晝卧夢人登城而呼己曰我東北陬之腐骨也速以人君葬我文王曰諾覺召吏視之信有焉文王曰速以人君葬之吏曰此無主請以大夫文王曰吾夢中已許之矣奈何其背也士民聞之曰我君不以夢之故背腐骨况於生人乎桓子新論曰文王操者文王之時紂無道爛金為格溢酒為池宫中相殘骨肉成泥璇室瑶臺藹雲翳風鐘聲雷起疾動天地文王躬被法度隂行仁義援琴作操故其聲紛以擾駭角震商琴操曰受命者謂文王受天命文王以紂時為岐侯躬修道德執行仁義百姓附親是時紂為無道刳胎斮渉廢壞三仁人天統易運諸侯瓦解皆歸文王其後有鳯凰銜書於郊文王曰殷帝無道虐亂天下皇命已移不得復久乃作鳯凰歌曰翼翼翔翔翔鸞皇兮銜書來遊以命昌兮瞻天按圖殷將亡兮蒼蒼昊天始有萌兮五神連精合謀房兮又曰文王修德百姓親附是時崇侯虎與文王列為諸侯德不及文王常嫉妬之乃譛文王於紂曰西伯昌聖人也長子發中子旦皆聖人也三聖合謀君其慮之乃囚文王於羑里吕氏春秋曰周文王使人扣地得人之骸吏以聞文王文王令葬之吏曰此無主矣文王曰有天下者天下之主有一國者一國之主今我非其主耶遂令以衣棺葬之天下聞之曰澤及枯骨况於人乎或得寶以危其國文王得朽骨以喻其意故聖人之於物也無不材也又曰文王處岐事紂寃侮雅孫朝夕必時雅正孫順紂雖寃枉而侮慢之而文王猶正順諸侯之禮而不失其時也正貢必適祭祀必敬紂喜命文王稱西伯賜之千里之地文王再拜稽首而致辭曰願為民請去炮烙之刑紂見熨斗爛人手因作銅柱布火於下令人走其上墮火而死以之為樂方之􅞷炮故名為炮烙也文王非惡千里之地也以為民請去炮烙之刑必得民心得民心則賢於千里之地矣又曰周文王立八年嵗六月文王寢疾五日而地動東西南北不出周郊百吏皆請曰臣聞地之動也為人主也今王寢疾五日而地動四面不出周郊羣臣皆恐請移之文王曰若何其移囚於羑里紂將欲殺之於是文王四臣散宜生等周流海内經厯風土得美女二人水中文具白馬朱鬛以獻於紂陳於中庭紂立出西伯文王在羑里時演易八卦為六十四作鬱厄之辭困于石據于蒺藜乃申憤以作歌曰殷道溷溷浸濁煩兮朱紫相合不别分兮迷亂聲色信讒言兮閭閻之虐使我愆兮幽閉牢穽由其言兮遘我四人憂勤勤兮論衡曰文王飲酒千鍾聖人能以德將酒也帝王世紀曰文王晏朝不食以延四方之士是以太顛閎夭散宜生南宫适之屬咸至是為四臣文王雖在諸侯之位襲為西伯紂既囚文王以文王之聖不食其子羮文王得而食之紂曰誰謂西伯聖者其子羮尚不知也魏陳思王曹植文王賛曰於赫聖德實維文王三分有二猶服事商化加虞芮旁暨四方王業克昭武嗣遂光又文王赤雀賛曰西伯積德天命攸顧赤雀銜書爰集昌户瑞為天使和氣所致嗟爾後王昌期而至周庾信文王見吕尚賛曰言歸養老垂釣西川岸止磻石溪惟小船風雲未感意氣怡然有此相望于兹幾年武王書曰武王戎車三百乘兵車一乘步卒七十三人凡二萬一千全數也虎賁三百人虎賁善戰言其猛也與紂戰于牧野作牧誓尚書中候曰太子發以紂有三仁附三仁箕子比干微子也即位不稱王渡于孟津中流受文命待天謀白魚躍入王舟王俯取魚長三尺赤文有字題目下名授右右助也天告以伐紂之意是其助也有火自天出于王屋流為赤烏五至以糓俱來流行也五至猶五來赤烏成文雀書之福文王得赤雀丹書武王致赤烏俱應周尚赤故言成文也詩曰考卜維王宅是鎬京維龜正之武王成之武王烝哉禮曰武王纉太王王季文王之緒一戎衣而有天下身不失天下之顯名尊為天子富有四海之内宗廟饗之子孫保之又曰昔殷紂亂天下脯九侯以饗諸侯是以周公相武王以伐紂樂稽耀嘉曰武王承命興師誅商紂萬國咸喜軍渡孟津前歌後舞後乃太平家給人足酌酒鬱揺春秋元命苞曰武王駢齒是謂剛强承命誅害以順天心史記曰武王即位太公望為師周公旦為輔召公畢公之徒左右修文王業九年冬觀兵孟津為文王木主載以居中軍自稱太子發言奉文王以伐不敢自專乃告司馬司徒司空遂興師渡河時諸侯不期而㑹孟津者八百諸侯皆曰紂可伐矣武王曰朱可乃還師居二年聞紂昏亂滋甚剖比干囚箕子太師庇少師彊抱其樂器而奔周於是武王乃渡孟津以卒馳紂紂師皆倒兵戰紂軍潰叛走登鹿臺之上蒙衣其珠玉自燔于火而死王遂入至紂死所自射紂三發而後下車以黄鉞斷紂頭懸太白之旗紂嬖妾妲己二女皆自殺王又射三發斬以𤣥鉞懸其頭小白之旗出復于軍其明日遂除紂宫誓殷民即帝位帝王世紀曰武王自孟津還返于周見暍人王自左擁而右扇之四年起師至鮪水甲子至于商郊牧野王韈係解五人侍于前莫肯為王係韈皆曰臣所以事君王非為係韈也王乃釋旄而係之與紂戰紂師敗績擒費仲惡來紂赴于京自燔于宣室而死乃以大旗麾諸侯入殷都百姓咸行于郊王使告曰上天降休商人皆拜王亦答拜以兵人造紂及妲己王親射之三發然後下車以劒擊之周公為司徒使以黄鉞斬紂頭召公為司空又使以𤣥鉞斬妲己明日天雨王命除道修社入商宫朝成湯之廟登堂見美玉入室見美女王皆取而歸之諸侯天下聞之以亷于財色矣置旌于商容之閭釋箕子之囚散鹿臺之財發鉅橋之粟以賑貧民命南宫适伯達史佚遷九鼎于洛邑命閎夭封比干之墓殷民咸喜十年冬王崩于鎬殯于岐時年九十三嵗矣太子誦立為成王越書曰八百諸侯皆一旦會于孟津之上不言同辭不呼自來盡知武王忠信欲從伐紂墨子曰天錫武王黄鳥之旗淮南子曰武王伐紂渡于孟津陽侯之波逆流而擊疾風晦暝人馬不見於是武王左操黄鉞右執白旄瞋目而麾之曰余在天下誰敢害我意者於是風霽而波罷又曰武王克殷欲築宫於五行之山周公曰不可夫五行之山固塞險阻之地也使我德能覆之則天下納其貢職者迴也迴造難也使我有暴亂之行則天下之伐我難周公言我有暴亂之行則天下當來伐我無爲於五行之山使天下來伐我者難也言其依德不恃險也此所以三十六世而不奪也説苑曰武王伐紂過墜塹山過水折舟過谷發梁過山焚萊示民無返志成王史記曰成王少周公攝政管叔蔡叔羣弟疑周公與武庚作亂叛周周公奉成王命伐誅武庚殺管叔蔡叔以微子啓代殷後國於宋周公行政七年成王長周公反政成王北面就羣臣之位成王在酆使召公復營洛邑周公復下車視卒營築居九鼎焉曰此天下之中四方入貢道里均作周官興正禮樂制度於是改而民和睦頌聲興帝王世紀曰周公爲冢宰攝政成王年少未能治事故號曰孺子八年王始躬親王事以周公為太師封伯禽于魯父子並命周公拜于前魯公拜于後王以周公有勲勞於天下故加魯以四等之上兼二十四附庸地方七百里革車千乘王既營都洛邑復居酆鎬淮夷徐戎及商奄又叛王乃大蒐于岐陽東伐淮夷七年王崩年五十矣太子釗代立淮南子曰成王問政於尹逸曰吾何德之行尹逸史佚也而民親佚對曰使之時而敬順之王曰其度安至曰如臨深淵如履薄氷王曰懼哉王人乎尹逸曰天地之間四海之内善之則吾蓄也不善則吾讐也吕氏春秋曰旦所朝窮巷之中甕牖之士者七十人文王造之而未遂武王遂而未成周公旦抱少主而成之故曰成王賈誼書曰周成王問鬻子曰寡人聞聖王在上位使民富且壽夫富則可為也壽則不在天乎鬻子對曰聖王在上位則天下無軍兵之事故諸侯不相攻而民不私鬬不相殺也則民免於一死而得一生矣聖王在上君積於道而吏積於德民積於用故婦人為其所養民免二死而得二生矣聖王在上則君積於仁而吏積於愛而民積於順則刑罰廢無夭遏之誅則民免於三死得三生矣聖王在上則使民以時而用之有節則民無厲疾矣則民免於四死得四生矣琴操曰周金縢者周公作金縢書也武王薨太子誦襲武王之業年七嵗不能統理海内周公攝政是時周公因誅管蔡之後有謗公於王者言公專國人權詐䇿謀將危社稷不可置之成王聞之勃然大怒欲囚周公周公乃奔于魯而死成王聞公死且怒之且傷之以公禮葬之天乃大暴風疾雨禾稼皆偃木折傷成王懼發金縢之書見周公所為武王禱命以身贖之書成王執書而泣曰誰言周公欲危社稷者取所讒公者而誅之戮於國天乃反風霽雨禾稼復起成王作思慕之歌太平御覽卷八十四
