  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_195-1a, image: WYG0894/WYG0894-0715c.png}
body:
  text: 太平御覽卷一百九十五宋李昉等撰居處部二十三逆旅道路馳道塗阡陌街巷逆旅左傳僖公上曰荀息假道於虞曰今虢為不道保於逆旅以侵敝邑之南鄙史記曰師尚父東就國道宿行遲逆旅之人曰吾聞時難得而易失客寢處安殆非就封者也太公聞之夜衣而行至國萊侯來伐與之争營丘漢武帝故事曰上嘗至栢谷夜投亭宿亭長不内乃宿於逆旅逆旅翁謂上曰汝長大多力當勤種稼穡何忽𢃄劍羣聚夜行動衆此不欲為盜則淫耳上黙然不應因乞漿飲翁曰吾止有溺無漿也有頃還内上使人覘之見翁方要少年十餘人皆持弓矢刀劍令主人嫗出安過客嫗歸謂其翁曰吾觀此丈夫乃非常人也且亦有備不可圖也不如因禮之其夫曰此易與耳鳴鼓㑹衆討此羣盜何憂不克嫗曰安之令其眠乃可圖也翁從之時上從者十餘人既聞其謀皆懼勸上夜去上曰去必致禍不如且止以安之有頃嫗出謂上曰諸公子不聞主人翁言乎此翁好飲酒狂悖不足計也今日且令公子安眠無他嫗因還内時天寒嫗酌酒多與其夫諸少年皆醉嫗出謝客殺雞作食平明上去是日還宫乃召逆旅夫妻見之賜嫗金十觔其夫為羽林郎自是懲戒希復微行續漢書五行傳曰靈帝數逰戲於西園中令後宫綵女為客舎主身為商賈服行至舎綵女下酒食因共飲食以為戲樂東觀漢記曰第五倫自度仕宦牢落遂将家屬客河東變易姓名自稱王伯齊常與奴載鹽北至太原販賣每所至客舎去輙為糞除道上號曰道士開門請求不復責舎宿直范曄後漢書曰周防字偉公父楊少孤微常修逆旅以供過客而不受其報郭林宗别傳曰林宗每行宿逆旅輙躬灑掃及明去後人至見之曰此必郭有道昨宿處也晉書曰桑虞常行寄逆旅同宿客失脯疑虞為盜虞黙然無言便觧衣償之主人曰此舎數失魚肉雞鴨多是狐狸偷去君何以疑人乃将脯主至山冢間尋求果得遺脯以衣還虞虞投之不顧説苑曰鄭桓公㑹封於鄭暮舍於宋東之逆旅逆旅之叟從外來曰客将焉之曰㑹封於鄭逆旅之叟曰聞之時難得而易失也今客之寢安殆非就封者也鄭桓公聞之援轡自駕行十日十夜至即有與之争封者楚辭七諫曰路室女之方桑路室客舎孔子過之以自侍言孔子出逰過於客舍其女方採桑一心不視善其貞信故以自侍潘岳客舎議曰被下尚書勅客舎廢農奸淫亡命敗亂法度皆當除外十里安一宫舎使老少貧民守之又差吏掌主依官舎收錢數春農事興求須冬閒謹案客舎逆旅久矣其所由來矣行者頼其頓止居者薄收其直交易貿遷各得其所官無役賦而因民成利恵加百姓而公無所費語曰許由辭此帝堯之命而舎於逆旅自唐到今未有不得客舎之法道路爾雅曰廟中路謂之唐一達謂之道路二達謂之枝旁三達謂之劇旁今南陽冠章孫鄉數通交錯道路呼之五劇鄉四達謂之衢五達謂之康六達謂之荘七達謂之劇驂三道復一道岐出者北海極縣有此道也八達謂之崇期四道交出九達謂之逵四者交征出復有旁通者又曰大路謂之奔説文曰一逵謂之道路又曰馗九達道也似龜背故謂之馗易曰艮為徑路王廙注曰物始故為徑路又曰何天之衢道大行也又曰幢幢往來朋從爾思詩曰道之云逺曷云能來又曰行道遲遲中心有違又曰踧踧周道鞠為茂草又曰道阻且躋升也又曰周道逶遲厯逺貌又曰周道如砥均平也又曰有杕之杜生於道周又曰遵大路兮摻執子之袪兮又曰肅肅兎罝施于中逵周禮夏官曰合方氏掌天下道路又曰司險掌九州之圖以周知其山林川澤之阻而達其道路又夏官候人曰各掌其方之道禮記檀弓曰哀公使人弔蕢尚遇諸道於路畫宫而受弔焉哀公魯君也畫宫畫地為宫象曽子曰蕢尚不如杞梁之妻知禮也又月令曰三月開通道路又曰道路男子由左婦人由右車從中央左傳曰公孫閼與潁考叔争車潁考叔挾輈以走子都拔㦸以逐之及大逵弗及子都怒又曰盟諸五父之衢史記曰文帝行至㶚陵慎夫人從上示慎夫人新豐道曰此走邯鄲道也東觀漢記曰逢萌被徵道上迷不知東西云朝所徵我者為聰明睿智有益於政方面不知安能濟政即駕而歸國語曰夫辰角見而除道故夏令曰九月除道賈逵注曰辰角大辰倉龍之宿角星名也家語曰武王克商通道于九夷八蠻魏晉春秋曰阮籍有時率意獨行不由徑路車路所窮輙慟哭而走陸機洛陽記曰官門及城中大道皆分作三中央御道兩邉策土墻髙四尺餘外分之唯公卿尚書章服道從中道凡人皆行左右左入右出夾道種榆槐樹此三道四通五達也淮南子曰楊朱見岐路而哭曰可以南可以北又曰聖人之道如衢設罇過者斯酌之博物志曰文王以太公為灌壇令其年風不鳴條文王夣一婦人甚麗當道哭問其故曰我東山女嫁為西海婦行必以暴風雨今灌壇令當道有徳吾不敢以風雨過也十洲記曰天帝君之城仙員之人出道徑自有一路内到鍾山海阿門外天帝君揔九夫人之維貴無比焉崔豹古今輿服注曰警蹕所以戒徒行蹕路也謂行者警於途路列子曰堯治天下未知天下治歟不治歟微服逰於康衢聞兒童謡曰立我烝民莫匪爾極任豫益州記曰江油左擔道案圖在隂平縣北於成都為西其道至阻自北來者擔在左肩不得度擔也鄧艾束馬懸車處郡國志曰雍州軹道在道化門東北十里又曰朱超石與兄書曰洛下道路本好青槐䕃映可愛列子曰楊子之憐亡羊既率其黨又請楊子之豎追之楊子曰亡一羊何追者衆曰多岐路既反問獲羊乎曰亡之矣岐路之中又有岐焉吾不知所之而反楊子曰大道以多岐亡羊學者以多方䘮志韓子曰魯以五月起衆為長溝子路私為漿飲要作溝者於五甫之衢孔子譏其不知禮也楚辭曰心不怡之長久憂之以相接惟郢路之遼逺兮江與夏之不可渉古樂府詩曰相逢狹路間道隘不容車古詩曰驅車駕言邁悠悠渉長道馳道史記賈山曰秦為馳道東窮燕齊南極吳楚道廣五十歩三丈而樹厚築其外隐以金椎以鐵錐築之隐於靳反樹以青松十里一亭亭有長十亭一鄉鄉有三老有秩嗇夫㳺徼三老掌教化嗇夫職聽訟收賦稅㳺徼徼循盜賊秦制也漢書曰江充出逢舘陶長公主行馳道中充問之公主曰有太后詔充曰獨公主得行車騎皆不得盡劾没入官充從上甘泉逢太子家使乘車馬行馳道中充以屬吏太子聞知使人謝充曰非寡車馬誠不欲令上聞之以教勑亡素者唯江君寛之充不聽遂白奏上曰人臣當如是矣大見信用威震京師又曰恵帝為東廟長樂宫作複道方築髙帝廟南叔孫通曰陛下何築複道髙帝寝衣冠日出逰髙廟奈何令子孫宗廟道上行哉恵帝懼曰急壊之通曰人主無過舉今已作百姓皆知矣願陛下為原廟渭北衣冠月㳺之益廣宗廟大孝本也帝從之又曰元帝即位成帝為太子上嘗召太子出龍樓門不敢絶馳道至直城門得絶乃度上遲之問其故以状對上乃令太子被召得絶馳道又曰上居雒陽南宫從複道望見諸將往往數人偶語上曰此何語良曰陛下不知乎此謀反耳上曰天下安定此屬何故而反良曰陛下與此屬取天下今陛下已為天子而所為封皆蕭曹故人所誅者皆平生讐怨今軍吏計功天下不足以徧封又恐見疑過失及誅故相聚謀反耳上廼憂曰今將柰何良曰上平生所憎羣臣所共知誰最甚上曰雍齒與我有故數窘辱我良曰今急先封雍齒以示羣臣則人人自堅矣於是置酒封雍齒為什邡侯而急趣丞相御史定功行封羣臣皆喜曰雍齒且侯我屬無患矣塗易震卦曰為大塗王廙注曰火塗萬物所出論語陽貨曰道聽而塗説徳之弃也爾雅曰堂塗謂之陳路依塗吕氏春秋曰孔子用魯三年男行乎塗左女行乎塗右財物之遺者民莫之舉司馬相如上林賦曰長塗中宿阡陌史記曰商鞅相秦孝公壊井田開阡陌漢書㳺俠傳曰原渉廼大治冢舎周閣重門初武帝時京兆尹曹氏葬茂陵民謂其道為京兆阡渉慕之廼買地開道立署門曰南陽阡人不肯從謂之原氏阡趙書曰佛圖澄建武末卒葬鄴西紫陌先造生墓已數年矣三輔故事曰文王武王周公召公皆葬畢陌南北風俗通曰南北曰阡東西曰陌曹植詩曰東西經七陌南北越九阡陸機詩曰廻渠繞曲陌通波扶直阡街説文曰街四通道也漢書曰張敞無威儀罷朝㑹走馬章臺街瓉曰在長安建章臺下街也郡國志曰雍州司天臺西北有香室街又曰夕隂街在右扶風南東觀漢記曰建武時天下墾田皆不實詔下州郡檢覈時州郡各遣使奏事帝見陳留吏牘上有書視之云潁川𢎞農可問河南南陽不可問帝詰使言於長夀街得之漢官典職曰洛陽有二十四街街一亭華氏洛陽記曰兩銅駝在宫之南街東西相對髙九尺漢時所謂銅駝街是又曰洛陽街三輔故事曰太上皇在長安香街南髙廟在長安城門街東太常街南漢宫殿䟽曰長安有八街九市風俗通曰京師有長夀街萬嵗街士馬街若此非一街者雋也離也四出之路雋離而别巷毛詩曰子之丰兮俟我乎巷兮巷門外也又曰叔于田巷無居人叔于狩巷無飲酒叔適野巷無服馬又曰姜嫄始生后稷誕寘之隘巷牛羊腓字之論語孔子曰賢哉回也一簟食一瓢飲在陋巷人不堪其憂回也不改其樂爾雅曰宫中謂之壼漢書曰陳平家貧負郭窮巷以弊席為門門外多長者車轍晉書曰紀瞻性静黙少交逰好讀書或手自抄寫凡所著述詩賦牋表數十篇兼解音樂殆甚妙厚自奉養立宅於烏衣巷舘宇崇麗園池竹木有足賞翫焉丹陽記曰七戰巷者庾亮與蘇峻戰宣陽門外峻初小退尋復來攻交戰者七亮乃南奔故有此名南唐書曰窮巷多恠曲學多辨也尸子曰舜之方陶不能利其巷也及南面而君天下蠻夷皆被其福太平御覽卷一百九十五
