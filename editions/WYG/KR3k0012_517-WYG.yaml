body:
  text: 太平御覽卷五百一十七宋李昉等撰宗親部七姊妹舅姑嫂叔娣姒姊妹爾雅曰女子先生為姊後生為妹詩泉水曰問我諸姑遂及伯姊禮記檀弓曰孔子與門人立拱而尚右二三子亦皆尚右孔子曰二三子之嗜學也我則有姊之䘮故也二三子皆尚左左傳成公上曰潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目晉侯欲伐之諸大夫皆曰不可酆舒有三雋才伯宗曰必伐之狄有五罪雋才雖多其何補焉遂滅潞酆舒奔衛衞人歸諸晉晉人殺之又昭元曰鄭徐吾犯之妹美公孫楚聘之矣公孫黑又使强委禽焉犯懼告子産子産曰是國無政非子之患也惟所欲與犯請於二子使女擇焉子晢盛飾而入布幣而出晢公西黒子南戎服而入左右射超乗而出女自房觀之曰子晢信美矣抑子南夫也子南公孫楚字夫夫婦婦所謂順也適子南氏焉又定公上曰吳伐楚楚昭王取其妹以出涉濉水鍾建負之以從後復國王将嫁季芊季芊辭曰所以為女子逺丈夫也鍾建負我矣王遂使妻鍾建以為樂尹春秋感精符曰人主含天地據璣衡齊七政秉八極父天母地兄日姊月史記曰聶政為嚴仲子殺韓相俠累因自披面抉眼出腸以死韓取政屍暴於市購之曰有能言殺俠累者與千金政姊聞之乃伏屍哭曰是軹深井里聶政也妾奈何畏殁身之誅滅賢人之名乃大呼天者三遂死於政旁也又曰萬石君石奮漢髙祖問曰君有何人對曰有姊善鼓琴髙祖乃召為美人又曰張敬叔姊善鼓琴髙祖召為宫人徙其家就戚里在長安與親戚别居故曰戚里漢書曰李延年妹絶美延年侍上酒酣歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國不惜傾城國佳人難再得武帝聞之乃召入宫又曰秦彭字伯平為山陽太守民江伯欲嫁寡姊乃引鎌自割伯因前救觸鎌傷姊遂亡縣正論法彭曰救無惡志乃輕罪之謝承後漢書曰范丹姊病徃看之姊為設飰丹留錢一百文姊使人追還之丹竟不受又曰曹夀妻班超之妹也超字仲叔扶風人為都䕶在絶域年老思入闗妹乃上書曰妾兄超延命沙漠三十餘年骨肉生離不復相識書奏帝乃徴還又曰宋𢎞字仲子為司空光武姊胡陽公主新寡帝與論朝臣美惡以觀其意主曰宋𢎞容德莫及帝曰方圗之後引𢎞入令主坐屛風後因謂𢎞曰貴易交富易妻人情乎𢎞曰貧賤之交不可忘糟糠之妻不下堂帝謂主曰事不諧矣又曰汝南袁隗妻馬融之女少有才辨融家世豐豪装遣甚盛及初成禮隗謂之曰婦奉箕箒而已何乃過珍麗對曰慈親垂愛不敢逆命君欲鮑宣梁鴻之行者妾亦請從少君孟光之事又問曰弟先兄舉世以為笑今處姊未適人而君先行可乎對曰妾姊髙行殊邈未遇良匹不如鄙薄苟然而已又問南郡學窮道奥文為辭宗而所在之職輙以資財為損何耶對曰孔子大聖不免武叔之毁子路至賢猶有伯寮之愬家君固其宜也蜀志曰初孫權以妹妻蜀先主孫氏才性剛猛有諸兄之風侍婢百餘人皆執刀劒而侍立先主心常凛然也晉書曰郭奕字大業太原人遷雍州刺史有寡姊隨其之官姊下僮多有奸犯而為人所糾奕接省畢曰丈夫豈當以老姊求名遣而不問又曰桑虞字子深衛人年十四䘮父哀毁過禮以米百粒糝藜藿其姊喻之曰滅性非孝子對曰藜藿雜米足以勝哀又曰凉州刺史羊欣姊喪未經旬車騎長史韓預强聘其女為妻張酺為御史中丞請貶預以清風俗論者稱之又曰陳統字元方弟絃字偉方俱清秀知名姊妹四人並有美才姊適東莞徐氏生邈及二姊適同郡劉氏文章最盛又曰慕容垂妻叚氏字元妃光祿大夫叚儀女婉惠有志操常謂妹季妃曰我終不作凢人妻季妃曰我不作庸婦隣人聞笑之後燕王納元妃為室范陽王德聘季妃並如其言又曰王凝之妻謝氏名道藴安西将軍奕之女也聪明有才辨同郡張𤣥妹亦有才質適顧氏謝𤣥每以之敵道藴有濟尼者遊於二家或問之答曰謝夫人神情散朗故有林下之風顧家婦清心玊映自是閨房之秀宋書曰新野庾彦達為益州刺史攜姊之官資給中分禄秩西土稱之齊書曰永興中有王氏女年五嵗得毒病兩目皆盲性至孝年二十父亡盲女臨屍一呌眼皆血出小妹為䑛之左眼即開愈時人皆以為孝感所致也梁典曰長廣橋者宋武帝姊昔賣鈔糴米還橋小不敢過無船得渡日晚宋帝大饑久方見姊負米還乃謂姊曰若異日富貴當長廣此橋遂為名也唐書曰徐勣姊疾病為姊煮粥火燃其鬚姊曰僕妾多矣何自苦如此勣曰姊老矣弟亦老矣顧欲常煮粥豈可得哉非為無僕妾新子曰梁車新為鄴令其姊徃見之值暮郭門閉遂踰郭而入梁車新因刖其足趙成侯以為不慈遂奪璽免官應劭風俗通曰郝原太原人饑寒不受人衣食曾過姊家飰留五十文置席下而去世説曰郗嘉賓死婦弟欲迎其姊還姊終不肯歸曰生縱不得與郗郎同室死寕不同穴也又曰袁彦道有二姊一適殷源一適謝祖常語桓宣武曰切恨不更有一人配卿也王子年拾遺曰賈逵年六嵗其姊聞鄰家讀書日日抱逵就籬聽之逵年十嵗乃暗誦六經父曰吾未嘗教爾安得三墳五典誦之乎對曰姊嘗抱於籬邉聽鄰家讀書因記得而誦之蕭韶太清記曰劉教姊文彩艶質甚於神人也荆州圖南北岸曰屈原之郷里原既流放忽然歸鄉人喜恱因名南岸曰歸鄉岸原有姊聞原還亦來歸責其矯世鄉人又名其北岸曰姊歸岸舅姑釋名曰夫之父曰舅舅言久也父老之稱也夫之母曰姑姑言故也爾雅曰婦稱夫之父曰舅夫之母曰姑姑舅在則曰君舅君姑歿則曰先舅先姑禮記檀弓曰婦人不飾不敢見舅姑又内則曰婦事舅姑如事父母雞初鳴咸盥漱櫛縰笄總衣紳左佩紛帨刀礪小觽金燧右佩箴管線纊施槃袠大觽木燧衿䙬綦屨以適舅姑之所及所下氣怡聲問衣燠寒疾痛苛癢而敬抑搔之又曰婦将有事大小必請於舅姑不敢專行也儀禮婚禮曰舅饗送者以一獻禮酬以束錦姑饗婦人送酬亦如之左傳襄元年曰魯齊姜薨初穆姜使擇美檟以自為櫬與頌琴季文子取以葬君子曰非禮也禮無所逆婦養姑者也虧姑以成婦逆莫大焉穆姜成公母齊姜成公婦也列女傳曰鄒孟軻既娶將入室其婦袒而在内孟子不恱遂去不入婦辭孟母求去曰妾聞夫婦之道私室不與焉今妾竊惰在室而夫子見妾悖然不恱是客妾也婦人之義蓋不客宿請歸於父母姑召軻而謂之曰夫禮將上堂聲必揚所以戒人將入戸視必下恐見人之過今子不察於禮而責於妻不亦逺乎孟子遂留其婦謝之君子謂孟母知禮而明姑婦之道嫂叔釋名曰嫂叟也老稱也叟縮也人及物老皆小縮於舊也叔少也幼者稱也叔亦俶也見嫂俶然却退也爾雅曰女子謂兄之妻為嫂弟之妻為婦禮記曲禮曰嫂叔不通問又檀弓曰子思之哭嫂也為位婦人倡俑又曰嫂叔之無服也蓋推而逺之也又雜記曰嫂不撫叔叔不撫嫂史記曰蘇秦洛陽人從鬼谷歸大困窮兄嫂姊妹妻皆笑之不為下機秦乃閉室不出讀周書隂符後合六國從約并相六國比報趙過洛陽車騎輜重擬於王者乃歸昆弟嫂側目不敢仰視秦謂嫂曰何前踞而後恭嫂匍匐面伏地謝曰見季子位髙金多也漢書曰髙祖長兄伯妻髙祖微時當避事時與賔友過其丘嫂丘空也無婿曰丘乃寡婦也嫂厭叔引客來食佯為羮盡轑釡客去髙祖視釡尚有羮由是怨之及定天下而伯子獨不得封太上皇為言之髙祖曰非敢忘也但其母不長者耳後七年封姪為羮頡侯又曰陳平兄伯常耕田縱平遊學嫂疾平不親家事或問平食何物而肥對曰食糠籺耳嫂曰有叔如此不如無伯聞而遂去其妻晉書曰鄭休妻石氏為九族所重休前妻女既幼又休父布臨終生庶子沈休命棄之石氏曰奈何使舅之𦙍不存乎遂養沈及前妻女力不兼舉九年之間三不舉子又曰王渾妻鍾氏字琰生子濟渾嘗共琰坐濟趨庭而過渾欣然曰生子如此足慰人心琰曰若新婦得配叅軍為渾弟渝也生子固不啻如此又曰王澄字平子衍季弟也衍妻郭氏性貪鄙令婢於路擔糞澄年十四諫郭郭大怒謂澄曰昔先人臨終之日以小郎囑新婦不以新婦囑小郎因捉其衣裾欲杖之澄懼踰忩而走得脫又曰王凝之妻謝氏字道韞奕之女也聪識有才辨凝之弟獻之嘗與賔客談議詞理将屈道韞使婢白獻之曰新婦欲與小郎解圍乃以青綾步障自蔽申獻之前義客遂不能屈也又曰晉中書令王珉與嫂婢私通嫂撻甚苦婢素善歌而珉好執白團扇故製白團扇歌又曰顔含字𢎞都嫂老而失明含奉養如親束帶側侍嫂病困湏蚺蛇膽求之不獲憂歎盈懐方獨坐愁苦忽有一童子持一青囊授含含開之乃蚺蛇膽也童子出户化為青鳥飛去含得藥成嫂病遂愈齊書曰吳達之義興人嫂亡無以具葬乃自賣為十夫傭以營葬三十國春秋曰晉吏部郎魏衡謂姪舒曰汝後得為小縣長舒曰堪八百戸長將老嫂入官舍即斯願畢矣孟子曰淳于髠曰男女授受不親禮與孟子曰禮也曰嫂溺則援之以手乎曰嫂溺不援是豺狼也男女授受不親者禮也嫂溺援之以手者權也逸士傳曰髙鳯為太守所召恐不得免自言本巫家不應為吏又與寡嫂偽爭田遂免仕世說曰阮籍嫂嘗還家籍見嫂與之别或譏之籍曰禮豈為我輩設也華陽國志曰汝敦兄弟共居有父母時財物嫂心欲得之敦妻勸敦盡賣田宅奴婢與兄弟出别居敦後耕田得金器妻勸送與兄夫妻共徃嫂性嗇見金器踴躍欲留之兄感悟即去妻悉讓財物還弟弟又不受相讓積年鄴洛鼎峙記曰盧道虛後妻元氏升堂講老子道德經虛弟元明隔紗帷以聽之娣姒爾雅曰女子同出謂先生為姒後生為娣同出俱嫁各事一夫長婦謂稚婦為娣婦娣婦謂長婦為姒婦也今云妯娌左傳成公下曰魯聲伯之母不聘不聘無婦禮穆姜曰吾不以妾為姒昆弟之妻相謂為姒又昭公七年曰晉叔向欲娶於申公巫臣氏其母不許平公強使取之生伯石伯石始生子容之母走謁諸姑子容母叔向嫂伯華妻也姑視之及堂聞其聲而還曰是豺狼之聲也狼子野心非是莫䘮羊舌氏矣晉書曰王渾妻鍾氏名琰太尉之孫也渾弟湛妻郝氏有德行琰雖貴門不陵郝郝亦不下琰時稱鍾夫人之禮郝夫人之法太平御覽卷五百一十七
