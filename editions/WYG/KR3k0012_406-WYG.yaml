  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_406-1a, image: WYG0896/WYG0896-0572c.png}
body:
  text: 太平御覧卷四百六宋李昉等撰人事部四十七叙交友交友叙交友釋名曰友有也相保有也説文曰友愛也同志為友周易曰君子上交不謟下交不瀆又曰朋從爾思又曰君子以朋友講習又曰西南得朋東北䘮朋又曰二人同心其利斷金同心之言其臭如蘭又曰上下交而其志同由此觀之交乃人倫之本務王道之大義非特士友之私志也又曰出門同人又曰君子定其交而後求又曰朋來无咎毛詩曰伐木讌朋友故舊也自天子至於庶人未有不須友以成者也親親以睦友賢不棄則民徳歸厚矣伐木丁丁鳥鳴嚶嚶又曰嗟爾朋友又曰雖有兄弟不如友生又曰朋友攸攝攝以威儀攝助也又曰既見君子我心則喜又曰豈無他人唯子之好又曰言念君子温其如玉又曰未見君子憂心忡忡禮記曰君子不盡人之歡不竭人之忠以全交也又曰君子之交淡如水小人之交甘如醴君子淡以成小人甘以壊又曰儒有合志同方營道同術相下不厭乆不相見聞流言不信義同而進不同而退其交友有如此者同方同術志行也聞流言不信不信其友所行被毁而謗之又曰隨武子利其君則忘其身忘其身不遺其友又曰父母在不許友以死又曰寡婦之子非有見焉弗與為友又曰見父之執不謂之進不敢進又曰子夏曰吾􅄐羣而索居亦已乆矣又曰僚友稱其弟也執友稱其仁也交遊稱其信也周禮曰司諫糾萬民之徳而勸之朋友又曰孝友任恤任信於友道恤憂患也論語曰益者三友損者三友友直友諒友多聞益矣友便僻友便佞友善柔損矣便僻巧譬喻也善柔誇毗也便佞辨以為佞也又曰晏平仲善與人交乆而敬之又子貢問為仁子曰居是邦也事其大夫之賢者友其士之仁者又曰子貢問友子曰忠告而善道之不可則止無自辱焉忠言以告之不從則止之又曰君子以文㑹友以友輔仁又曰故舊無大故則不棄也又曰子夏之門人問交於子張子張曰子夏云何對曰可者與之其不可者拒之子張曰君子尊賢而容衆嘉善而矜不能我之大賢與於人何所不容我之不賢與人将拒我如之何其拒人也又曰與朋友交言而有信雖曰未學吾必謂之學矣又曰有朋自逺方来不亦樂乎又曰老者安之朋友信之又曰子路曰願車馬衣輕裘與朋友共敝之而無憾又曰事君數斯辱矣朋友數斯踈矣又曰無友不如己者又曰朋友切切偲偲又曰匿怨而友其人禮記曰獨學而無友則孤陋而寡聞孝經曰士有諍友則身不離於令名大戴禮曰上親賢則下擇友又曰與君子遊如入芝蘭之室乆而不聞其芳則與之俱化矣與小人遊如入鮑魚之肆乆而不聞其臭則與之俱化矣是故君子慎其去就家語曰孔子曰吾死之後商也日益謂與賢已者交賜也日損好恱不若己者交故君子慎所友又曰孔子曰自季氏賜我千鍾而友益親又曰孔子曰夫子産於民為惠主於學為愽物晏子於君為忠臣於行為恭敏故吾皆以兄事之而加愛敬焉又曰夫内行不修身之罪也行修而名不彰友之罪也故君子入則篤行出則友賢漢書曰下邳翟公為廷尉賔客填門及廢門外可設雀羅復為廷尉賔客又来翟公大署其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見魏志曰胡質云古人之交也取多知其不貪奔北知其不怯聞流言而不信故可終也荘子曰凡交近則必相靡以信逺則必忠之以言孟子曰萬章曰敢問友孟子曰不挾長不挾貴不挾兄弟而友友也者友其徳也不可以有挾也又曰舜尚見帝帝館甥于貳室亦饗舜迭為賔主是天子而友匹夫也譙子齊交曰譬之於物猶素之白也染之以藍則青逰居交友亦人之所染也韓起與田蘇處而成好仁之名甘茂事史舉用顯齊秦之功曹恭師盖公致清净之治竇長君兄弟出于賤𨽻謹恭師友皆為退譲君子語曰蓬生麻中不扶自直此言雖小可以喻大必得其人千里同好固於膠漆堅於金石窮達不阻其分毁譽不疑其實鄒子曰昔邢髙吕安飲於市仰天泣二子非有䘮之哀傷相知之晚耳君子所以勤於接賢汲汲於結善欲以立名者也吕氏春秋曰荆有善相人者無遺䇿聞於楚國荘王見而問焉曰臣非得相人能觀人之友也布衣其友皆孝悌純謹如此者家必日益此謂吉人也居守事君其友皆誠信有行好善如此者事君日益此謂吉臣也人主也朝臣多賢左右多忠主有失皆敢交争此謂吉主也臣非能相人能觀人之友王曰善於是取士不懈乃大霸晉陽春秋曰知幾其神乎古人以為難交疎而吐誠今人以為難風土記曰越俗性率朴意親好合既脱頭上手巾解要間五尺刀以與之為交拜親跪妻初定交有禮俗皆當於山間大樹下封土為壇祭以白犬一丹雞一雞子三名曰木下雞犬五其壇地人畏不敢犯也祝曰卿雖乘車我戴笠後日相逢下車揖我雖歩行卿乘馬後日相逢卿當下白虎通曰朋友之道有四焉近則正之逺則稱之樂則思之患則死之仲長子昌言曰幽言則攻己之短㑹同則述人之長負我者我加厚焉未有與人交若此而見憎者也要覧曰諸葛亮曰勢力之交難以經逺士之相知温不増華塞不改翹能貫四時而不衰歴夷險而益固劉欽新議曰夫交接者人道之本始紀綱之大要名由之成事由之立又曰交之於人也猶脣齒之相濟又曰才非交不用名非交不發身非交不立揚子法言曰朋而不心面朋也友而不心面友也周昭新撰曰交之為道起自羲皇造化之初君臣始立而有人倫上下之叙象天下交㤗以左右於民也唐虞三代莫不因之故交全情親則國安治强交敗情乖則國危治弱立交者欲其親也是故百姓不親禹作司徒踈者能睦亷頗相如忍忿以崇厚陳平周勃感陸生而相親所以安趙於强敵定漢於幾殆此交接之大義帝王之極務聞之於易曰交乃人倫之本務王道之大義也魏文帝集倫曰夫隂陽交萬物成君臣交邦國治士庶交徳行光同憂樂共富貴而交道備矣阮子政倫曰夫交逰者儔黨結於家威權傾其國或以利厚而比或以名髙相求同則譽廣異則毁深朝有兩端之議家有不恊之論至令父子不同好兄弟異交友破和穆之道長諍訟之源鍾㑹芻蕘論曰凡人之結交誠宜徳不亡衰達不弃窮不疑惑於讒搆不信受於流言經長歴逺乆而逾固而人多初隆而後薄始宻而終䟽斯何故也皆由交情不發於神氣道數乖而不同權以一時之術取倉卒之利有貪其財而交有慕其勢而交有愛其色而交三者既衰䟽薄由生東方朔與公孫𢎞書曰盖聞爵禄不相責以禮同􅁼之遊不以逺近為是故東門先生居蓬户空穴之中而魏公子一朝以百騎日寵之吕望未嘗與文王同席而坐一朝讓以天下半夫丈夫相知何必以撫塵而逰垂髪齊年偃伏以日數哉離騷曰交不忠信兮怨長晉潘岳陽肇誄曰余以頑蔽覆露重隂仰追先逹執友之心也古歌辭曰結曰在相知骨肉何必親甘言無忠實世薄多蘇秦又曰採葵莫傷根結交莫羞貧傷根葵不生羞貧交不成交友一左傳曰呉公子札聘于齊說晏平仲聘於鄭見子産如舊相識又曰鄭子皮卒子産哭且曰吾已無為為善矣唯夫子知我注云無人知己之善故曰吾已又曰伍員與申包胥友包胥楚大夫其亡也謂申包胥曰我必覆楚國復執也申包胥曰勉之子能覆之我必能興之及昭王在隨申包胥如秦乞師尚書大傳曰散冝生閎天南宫括三子者學乎太公太公見三子知為賢人遂酌酒切脯除為師學之禮約為朋友家語曰孔子遇程子傾盖而語終日甚相恱頋謂子路曰程子天下之賢士取束帛以贈之史記曰趙有處士毛公藏於􅀶徒薛公藏於賣漿家魏公子無忌從比二人結交逰也又曰蘇秦之先逹張儀候之數日乃見坐於堂下食以僕妾之餐告舍人曰儀才吾不及恐以小利忘求進故辱之儀怒入秦蘇君使舍人齎金帛車馬隂結助之卒相秦也又曰藺相如望見㢘頗引車避匿㢘頗聞之肉袒負荆至藺相如叩門謝罪曰鄙賤之人不知將軍寛之至此也卒相與歡為刎頸之交漢書曰漢王與韓信為金石之交又曰衛青姊子夫得入官幸上皇后大長公主女也無子妬之大長公主捕青囚欲殺之其友公孫武與壯士徃奪之故得不死上聞乃召青為建章監侍中賞賜數日累千金又曰盧綰豐人與髙祖同里綰親與太上皇相愛髙祖綰同日生里中持羊酒賀兩家親相愛生子同日壯又相愛又曰兩龔皆楚人勝字君賔舍字君倩二人相友著名節故時號之楚兩龔又曰王吉字子陽京兆人也少與貢禹為友及陽仕至益州刺史貢聞之拂冠以待之陽遂薦稱焉世稱王陽在位貴公彈冠言其取舍同也又曰張耳大梁人陳餘亦大梁人也好儒術餘年少父事耳相與為刎頸之交又曰鄭崇躬立與髙武侯得喜同門學相友善喜為大司焉薦崇哀帝擢為尚書僕射又曰陳遵少孤與張踈俱為京兆吏踈學通逹以廉儉自守而遵放縱不拘操行雖異然而相友善太平御覧卷四百六
