body:
  text: 太平御覽卷八百六十二宋李昉等撰飲食部二十膾脯鯖鮓八珍膾周禮天官籩人曰朝事之籩其實膴鮑禮内則曰牛膾羊炙魚膾芥醬又曰大夫燕會有膾無脯有脯無膾士不二羮胾庶人耆老不徒食尊卑差也膾春用葱秋用芥豚春用韮秋用蓼肉腥細者為膾大者為軒又少儀曰牛羊與魚之腥聶而切之為膾詩曰來歸自鎬我行永久飲御諸友包鼈膾鯉論語鄉黨曰膾不厭細春秋左助期曰八月雨夜苽菜生於洿下地中作羮臛甚美吳中以魚作膾苽菜為羮魚如白玉菜黄若金稱為金羮玉膾一時珎食説文曰膾細切肉也釋名曰膾㑹也細切肉散分其赤白異切之乃會和之也東觀漢記曰章帝與舅馬光詔曰朝廷鹿膾寧用飯也魏志曰陳登得胷中煩滿面赤不食華佗為脉曰府君胃中有虫數升欲成肉疽食腥物所為也即作湯二升先服一升斯須盡服之食頃吐出三升許虫赤頭皆動半身猶是生魚膾也沈約宋書曰張収為猘尖所傷人云宜食蝦蟇膾収難之兄暢含笑先嘗収乃食瘡即愈又曰沈攸之舉兵圍郢城獲范雲令送書入城餉桞世隆鱠魚二十頭梁書曰蕭頴胄素能飲酒噉白肉膾至三十斤葛洪神仙傳曰仙人介象字元則會稽人有諸方術呉主聞之徴象到武昌敬貴之稱為介君與呉主共論鱠魚何者最美象曰鯔魚為上吴主曰論近魚耳此海中出安可得耶象曰可得耳乃令人於庭殿中作方塪汲水滿之并求釣象起餌之垂綸於塪中不食頃果得鯔魚吴主驚喜問象曰可食否象曰故為陛下取以作生安敢取不可食之物乃使厨下切之吴主曰聞蜀使來有蜀薑作薑甚好恨時無此象曰蜀薑豈不易得願差所使者并付直吴主指左右一人以錢五十付之象書一符以着青竹杖中使行人閉目騎竹上止買薑訖復閉目此人承其言騎竹須臾止已至成都不知是何䖏問人人言蜀市乃買薑于時吴使張温先在蜀既於市中相識甚驚便作書寄其家此人買薑畢援書負薑騎杖閉目須臾已還到吴厨中切鱠亦適了搜神記曰左慈字元放在曹操坐操謂衆賔曰髙會所少吴浙江鱸魚耳放曰此可得也因求銅藻盤貯水以竿餌釣於盤中須臾引一鱸出操拊手笑曰可更得不放乃更引餌沈之須臾復引出皆長二尺餘生鮮可愛操令目前切膾老子傳曰曽參食生魚甚美因吐之人問其故參曰母在之日不知生魚味美今我吐之終身不食異物記曰鯔魚作膾味畧無輩列女傳曰姜詩妻事姑嗜魚膾又不能獨食妻與詩常力作供膾呼隣母共食其舎側忽有泉常出鯉魚一雙以共二母之膳吴越春秋曰伍子胥伐楚未還闔閭治魚作膾過時不至魚臭猶須子胥之至也及胥到闔閭膾而食不知其臭後王重作之其味如故人作魚須膾者闔閭之時造也博物志曰吴王江行食膾有餘棄之於中流化而為異魚今呼王餘魚長數寸大如筋猶有膾形齊諧記曰江南有麻治者為人好噉膾江北華本者得一大蛇喚麻為膾得食甚美治索魚名華本因醉喚取蛇及餘肉出麻治見之大吐嘔血死又曰周子有女噉膾不知足家為之貧後至長橋南見罛者挫魚作鮓以錢一千求一飽食五斛便大吐有蟾蜍從吐中出婢以魚置口中即成水女遂不復噉膾世說曰張季鷹辟齊王東曹掾在洛見秋風起因思呉中蓴羮鱸魚膾曰人生貴適志何覊官千里以要名爵遂命駕便歸俄而齊王敗時人謂為見幾又曰桓車騎冲在荆州張𤣥為侍中使至江陵路經陽岐俄見一人持小籠生魚逕來造舡云有魚欲寄作膾𤣥乃維舟而納之問其姓名云是劉遺民劉憐之字遺民張素聞其名大相欣待既坐張御命問謝安王文度並佳不張甚欲語言劉子無意既進膾便去云得此魚觀君舡上當有膾具是故來耳於是便去杜寳大業拾遺録曰六年吴郡獻海鮸音免乾膾四瓶瓶容一斗浸一斗可得徑尺面盤并奏作乾膾法帝以示羣臣云昔衞人介象於殿庭釣得海魚此幻化耳亦何足珍異今日之膾乃是海真所作來自數千里亦是一時竒味即出數盤以賜近臣作乾膾法當五六月盛熱之日於海取得鮸魚其魚大者長四五尺鱗細紫色無細骨不腥捕得之即去其皮骨取其精肉縷切隨成曬三四日須極乾以新白瓷瓶未經水者盛之宻封泥勿令風入經五六十日不異新者後時以新布裹於水中清三刻久取出洒却水則皦然矣明皇雜録曰邢州人和璞嘗謂房琯曰君殁之時必因食魚膾既殁之後當以梓木為棺然不得沒於君之私第不處公館不處𤣥壇佛寺不處親友之家其後譴於閬州寄居州之紫極宫卧疾數日刺史忽具鱠邀房於郡齊房亦欣然命駕既歸暴卒州主命攅櫝於宫中棺得梓木為之脯釋名曰脯摶也乾燥相摶着也脩縮也乾燥縮也説文曰脯乾肉也脩脯也膊補莫切薄脯膞之屋上也周禮曰腊人掌乾肉凡田獸腊膴胖之事大物解肆謂之乾肉薄切曰脯棰之而和薑桂曰腵脩腊小物而乾者祭祀共豆脯膴胖又曰膳夫凡王之稍事設荐脯醢儀禮曰鄉飲酒主人立于西堦東荐脯使出祖釋軷祭脯士冠賔東面薦脯禮曰以脯脩置者左朐右末又曰婦人之摯脯脩大夫燕禮有膾無脯又禮郊特牲曰大享尚暇脩而已矣穀梁傳曰束脩之肉不行境中有至尊者不貳公羊傳曰魯昭公出奔齊侯使髙子執簞食四脡脯獻公稽首以拜受易曰噬乾胏得金矢王肅注曰四體純隂卦骨之象骨在乾肉脯之象金所以獲野禽故食之反得金矢君子於味必思其毒於利必備其難論語曰子曰自行束脩以上吾未嘗無誨焉言人奉禮自行束脩以上則皆教誨之也又曰沽酒市脯不食尚書太傳曰散宜生閎夭南宫适三子者學乎太公見三子知三子之為賢人遂酌酒切脯約為朋友漢書曰濁氏以胃脯連騎東觀漢記曰光武初起兵叔公良搏手大呼曰我欲請納言嚴将軍叱上起去出閣令人視之還白方坐㗖脯晉書曰桑虞嘗行宿寄逆旅同舎客失脯疑虞為盗虞黙然無言便解衣償之主人曰此間數失魚肉鷄鴨多是狐貍偷君何以疑人乃將脯至山冡間尋求果得之客乃還衣虞投之不顧北齊書曰彭城王攸為滄州刺史有一人從幽州來驢䭾鹿脯至滄州界脚痛行遲偶㑹一人為伴遂盗驢及脯去明旦告州乃令左右及府僚吏分市鹿脯不限其至主見識之推獲盗者唐書曰太宗狩于濟源之陵山上曰古者王先驅以供宗廟令所獲鹿宜令所司造脯醢以充薦享國語曰楚成王聞子文之朝不及夕也成王楚文王之子成王顧於是乎毎朝設脯一束糗一筐以羞子文至于今令尹秩之吕氏春秋曰趙宣子将之絳見翳桑之下有餓人宣子與脯二朐拜受不敢食問其故曰臣有母持以遺之宣子更賜之二束遂去東方朔神異經曰北方有増氷萬里厚百丈有􅂒䑕在氷下土中食氷下草木肉重萬斤可以作脯又曰西北荒有遺酒追復脯焉其味如麞食一片復一片葛洪神仙傳曰王逺至蔡經家與麻姑共設肴膳擘脯而食云是麒麟脯又曰左慈詣劉表請犒軍有酒一器脯一盤乃賜兵人三杯酒一片脯萬人皆同而酒器如故脯亦不减世語曰初太祖乏食程昱掠其本縣供三旬糧頗襍以人脯由是失朝望故位不至公也續齊諧記曰劉晨阮肇入天台山有女仙人為設胡麻飯山羊脯因留連之楚詞曰折瓊枝以為羞盧諶祭法曰春祠用脯夏用疈社育菽賦曰脯則正膂通幹粗鹿肥麋梁劉孝威謝東官賚鹿脯等啓曰上林絶胡人之搏禁地無張京之犯而猶有班超之遊獵李廣之馳射逺歸於厨吏入貢於腊人形圖三事之車影入九仙之鏡鯖西京雜記曰五侯不相能賔客不得往來婁䕶傅會五侯間各得其意競致竒膳䕶乃合以為鯖世稱五侯鯖以為竒味焉齊書曰武帝就虞悰求諸飲食方悰秘不出上醉後體不快悰乃獻酢酒鯖鮓一方而已鮓釋名曰鮓葅也以鹽米釀之如葅熟而食之也呉志曰孟仁為監池司馬自能結網手捕魚作鮓寄母母曰汝為魚官而以鮓寄我非避嫌也宋書曰王瑩代謝超宗為義興太守與謝交惡超宗到都後瑩父懋往超宗處超宗設精白鮑美鮓獐巴懋問那得佳味超宗詭言瑩始見餉佯驚曰大人豈應不得耶懋大忿言於朝廷稱瑩供養不足坐失廢棄久之博物志曰仲秋月取折頭鯉去子破腹使膂割為漸米爛藻之以赤秫米飯鹽酒令糝之不苦重踰月乃熟是謂秋鯖王子年拾遺記曰漢元鳯二年於淋池之南起桂臺以望逺帝常以季秋之月泛蘅蘭雲蠲之舟窮晷係夜釣于臺下以香金為鈎霜絲為綸丹鯉為餌得白蛟長三丈若大虵無鱗甲帝曰非瑞也命太官為鮓肉紫骨青味絶香美班賜羣臣帝後思其美漁者不復得知為神異也列異傳曰費長房又能縮地脉坐客在家至市買鮓一日之間人見之千里之外者數處世說曰有人遺張華鮓華謂客曰此龍肉也以酒沃鮓中則有五色光試之果如言後問其主云於茅積下得白魚所作也又曰陶侃少時作魚梁吏嘗以一坩苦甘切鮓餉父封鮓反書責侃曰汝為吏以官物見餉非唯不能益吾乃以増吾憂也謝𤣥與婦書曰昨出釣獲魚作一坩鮓今奉送大業拾遺曰十二年六月呉郡獻太湖鯉魚腴䱹四十坩純以鯉膄為之計一坩䱹用鯉魚三百頭肥美之極冠於鱣鯖八珍周禮天官曰食醫掌王之八珍禮曰淳熬煎醢加于陸稻上沃之以膏曰淳􅆈淳母煎醢加于黍食之上沃之以膏曰淳母炮取豚若将刲之刳之實􅀥於其腹中編萑以苴之塗之以謹塗炮之塗皆乾擘之濯手以摩之去其皽音善為稻粉糔溲之以為酏以付豚煎諸膏膏必滅之鉅鑊湯以小鼎薌脯於其中使其湯毋㓕鼎三日三夜毋絶火而後調之以醯醢擣珍取牛羊麋鹿麕之肉必脄每物與牛若一捶反側之去其餌熟出之去其皽柔其肉漬取牛肉必新殺者薄切之必絶其理湛諸美酒期朝而食之以醢若醯醷為􅆈捶之去其皽編萑布牛肉焉屑桂與薑以洒諸上而鹽之乾而食之施羊亦如之施麋施鹿施麕皆如牛羊欲濡肉則釋而煎之以醢欲乾肉則捶而食之肝膋取狗肝一幪之以其膋濡炙之舉焦其膋不蓼太平御覽卷八百六十二
