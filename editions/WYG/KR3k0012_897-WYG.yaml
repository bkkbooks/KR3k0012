body:
  text: 太平御覽卷八百九十七宋李昉等撰獸部九馬五古今注曰秦始皇有七名馬一曰追風二曰白兔三曰躡景四曰犇電五曰飛翮六曰銅爵七曰神鳬又曰曹真有駃馬名為驚㠶言其馳驟如烈風之舉帆疾也風俗通曰馬一疋俗説馬比君子與人相疋或曰馬夜行目明照前四丈故曰一疋或説度馬従横適得一疋或説馬賣得一疋帛或云春秋左氏説諸侯相贈乘馬束帛束帛為疋與馬之相匹耳又曰疲馬不能度繩俗説馬之疲羸不能復度繩索言其極也或云不能度畦塍也謹按齊有澠水裁三四步馬疲不能度此水耳又曰殺君馬者路旁兒也言長吏養肥馬而希出路旁小兒觀之却驚致死按長吏馬肥觀者快之乗者喜其言驅馳不已至於死金樓子曰鳥與鳥遇則相躅獸與獸遇則相觸馬與馬遇則跌踶相傷天之生此物多其力而少其智也𫝊子曰九日養親一日餓之寧可言飽多飢少同為孝子九日糓馬一日餓之馬肥不損於義無傷非可同之夏侯子曰一舟之覆無一毫不濕一馬之走無一毫不動故大同萬物不一也又曰魯人有善相馬者與余俱遊夜方寐聞馬有行者魯人驚曰七百里也吾恐此暗中耳符子曰齊景公好馬命畫工圖而訪之弹百乘之價朞年而不得像過實也今使愛賢之君考古籍以求其人雖期年不可得也又曰吾與𤣥子觀東海釋駟而升乎􅵺山未中路而忘馬符子使人求之不獲使鬼索之而獲符子曰六合不可忘故知良馬在其中矣請以六合之觀觀之也鄒子曰董仲舒三年不窺園囿乘馬不知牝牡諸葛教曰昔孫叔敖乘馬三年不知牝牡稱其賢也常據華陽國志曰神馬四疋出滇音顛池河中三國典略曰神馬者河之精也代馬隂之精也西京雜記曰文帝自代還有良馬九疋皆天下之駿足也名曰浮雲赤電絶羣逸驃紫鷰騮緑螭驄龍子驎駒絶塵號為九逸又曰衞將軍生子或有獻騧馬者乃命其子為騧字叔馬東方朔傳曰驃騎難諸博士朔對曰騏驎緑耳蜚鴻驊騮天下良馬也將以捕䑕於深宫之中曾不如跛猫神異經曰西南大宛有馬其大三丈髯至膝尾委地蹄如斗踠可掘日行千里至日中而汗血乗者當以絮纒頭以避風病其國人不纒楊子法言曰或問治已曰治已仲尼問治已何用答以用孔子之道或曰治已以仲尼奚寡矣言學孔子道多而成者何少也曰率馬以驥不亦可乎又曰希驥之馬亦驥之乘也希顔之人亦顔之徒也桓譚新論曰顔淵所以命短慕孔子所以傷其年也若庸馬良馬相追至暮共列良馬宿所鳴食如故庸馬垂頭不復食何異顔淵與孔丘優劣又曰衞后園有送𦵏時乘輿馬十疋吏卒養視善飲不能乘而馬皆六十嵗乃死又曰薛翁者長安相馬者也於邊郡求得駿馬騎以入市去來人不見也後勞問之因請觀馬翁曰諸卿無目不足示也論衡曰儒書稱孔子與顔淵俱登魯東山望呉閶門謂曰爾何見曰一疋練前有生藍孔子曰噫此白馬盧芻使人視之果然王子年拾遺記曰周穆王即位廵行天下馭八龍之駿名曰絶地翻羽奔霄越影踰暉超先騰霧挾翼又曰曹洪與魏武帝所乘之馬名曰白鶴時人諺曰憑空虛躍曹家白鶴洞𡨕記曰脩彌國有馬如龍騰虛逐日兩足倚行或藏形於空中惟聞聲耳時得天馬汗血是其類也又曰畢勒國有小馬如駒日行千里毛垂至地東王公常騎此馬朝發湯泉夕飲虞淵一日一夕徃返七八度一言馬毛長於空中自放則吹之或東或西也又曰東方朔遊吉雲之地越扶桑之東得神馬一疋髙九尺股裏有旋毛如日月之状如月者夜光如日者晝光毛隨四時之變漢朝之馬見之即垂頭振毛一國衆獸見皆避之帝問東方朔是何獸也朔曰昔西王母乘靈光之輦以適東王公之舎税此馬於芝田及食芝草王公怒棄馬於清津天岸臣至王公之壇因騎而返繞日三匝此馬入漢闗闗猶未掩臣於馬上睡眠不覺遂至帝曰其為名云何朔曰因事為名曰步景抱朴子曰韓子治嘗以地黄甘草哺五十嵗老馬以生三駒又百三十嵗乃死又曰李南乘赤馬行道逢他人乘白馬者白馬先鳴於南赤馬鳴應之南謂従者曰彼馬言汝今當見一黄馬左目盲者是吾子可為使駃行相及従者不信行二里逢所乘黄馬而左目盲南之馬先鳴而盲馬應之問其子果向白馬子也論衡曰廣漢翁律能聴鳥獸之音乘蹇馬之野而田間有放馬者相去數里鳴聲相聞翁律謂其御曰彼放馬目眇其御曰何以知之曰罵此轅中馬蹇馬蹇馬亦罵之曰眇馬御者不信使徃視之目果眇鹽鐵論曰騏驥之輓鹽車垂頭於太行屠者持刀而睨之又曰古者諸侯不秣馬天子有命以車就牧庶人之乘馬者足以代勞而已故行則服軛止則就犁一馬服櫪當中家六口之食孔融論曰馬之駿者名曰騏驥犬之駿者名曰韓盧犬之有韓盧馬之有騏驥人之聖也名號等設騏驥與韓盧並走寧能頭尾相當八脚如一無有先後之覺哉英雄記曰公孫瓚毎聞邊警輙厲色作氣如赴仇嘗乘白馬又白馬數十疋選騎射之士號為白馬義従以為左右翼敵甚畏之相告曰當避白馬長史曹瞞傳曰吕布有駿馬名赤兔常騎乘之時人為之語曰人中有吕布馬中有赤兔袁淮正書曰牛馬之為人駕乘者非樂負千鈞之重行千里之險鞭策痛矣桓公世論曰朝鮮之馬被鬛踶齧能使其成騏驥者習之故也博物志曰穢貊國南與辰韓北與句麗沃沮接東窮大海海中出斑魚皮陸出文豹又出果下馬高三尺漢時獻之駕出輦車正始六年樂浪太守劉茂帶方太守龔遵領東穢屬句麗伐之舉邑降之博物志曰唐公有驌驦項羽有騅馬華陽國志曰天馬日行千里死於蜀今天馬冡是也縣有天馬祠馬牧山下或産駿駒天馬子也長沙耆舊傳曰虞芝州命部南陽従事太守張惠連姻王室罪名入重芝依法執按刺史畏勢召芝芝曰年徃志盡譬如八百錢馬死生同價且欲立效於明時遂投傳去三輔決録曰安陵有項仲山飲馬渭水先投三錢襄陽記曰中盧山西去襄陽一百三里有一地道漢時嘗有數疋白馬出其中遂名其地為白馬穴陸遜攻襄陽又值此穴中數十疋馬出戰還建業蜀使有五部兵家滇音顛池者識其馬色云是已亡父所乘對之流涕世語曰劉備屯樊城劉表禮焉憚其為人不甚信用曽請宴會荆越蔡瑁欲因㑹取備備覺之偽如廁潜道出行所乘馬名為的顱騎的顱走襄陽城西檀溪水溺不得出備急曰的顱今日厄不可不努力的顱乃一踴三丈遂得過異苑曰符堅為慕容冲所襲堅馳馬墮澗追兵將及計無由出馬即踟蹰臨澗垂鞚與堅堅不能及馬又跪而授焉堅攀之得登岸走廬江七賢傳曰陳衆辟州従事揚州部有賊擊之多死衆請取之因單車乘白馬徃賊束身歸降遂生為立祠號曰白馬従事竹林七賢論曰王戎簡脱不持儀形好乘巴􅀈馬雖為三司率爾私行廵省田園不従一人以手巾挿腰戎故吏多至大官相逢戎輙下道避之捜神記曰昔秦人築城於武州塞内以禦敵城將成而崩者數焉有馬馳走周旋反覆父老異之因依以築之為城乃定遂名為馬邑又曰呉先主殺武衞兵錢小小形見大街顧借賃人呉永使永送書與街南廟借木馬二疋以酒噀之皆成好馬鞍勒俱全志怪集曰孫宏常自云見鬼神與其言語委曲衆未之信鎮西將軍謝尚常所乘馬忽暴死㑹宏詣尚常愛惜至甚謂尚曰我為活馬何如尚常不信答曰卿若能令此馬更生卿真實通神矣宏於是便下床去良久還語尚曰廟神愛樂君馬故耳我詣神請之初殊不許後乃見聼馬即便活耳尚對死馬坐意甚不信怪其所言須臾其馬忽従門外走還衆咸見之莫不驚惋既至馬屍應時能動有頃奮跳呼鳴尚於是歎息述異記曰東平畢衆寶家在彭城有一駿馬甚快常乘出入至所愛惜宋大明六年衆寶夜夣見其亡兄衆慶曰吾有戎役方置艱危而無得快馬汝可以驄馬見與衆寶許之既覺呼同宿客説所夣始畢忽聞馬倒聲遣人視之裁息狀如中惡衆寶心知其故為試治療向晨馬死衆寶還卧如欲眠聞衆慶語云向聊求馬汝治䕶至將必惜之今以相還别更覔也至曉馬活食時復常續捜神記曰趙固常乘一疋赤馬以征戰甚所愛重常繫於齋前忽腹脹少時死郭璞従北過因徃詣之門吏云將軍好馬甚愛惜今死極其懊惋景純便語門吏云入通道吾能活此馬則必見我門吏聞之驚喜即啟固固踴躍令門吏走迎之始交寒溫便問卿能活我馬乎璞曰馬可活固忻喜即問須何方術璞云得卿同心健兒二三十人皆令持長竿於此東行三十里當有丘陵林樹状若社廟有此者便以竹竿攪擾打拍之當得一物便急持歸既得此物馬便活矣於是左右驍勇之士五十人使去果如璞言得大藂林有一物似猴而非走出人共逐得便抱持歸入門此物遥見死馬便跳梁欲徃璞令放之此物便自走徃馬頭間嘘吸其鼻良久馬即起噴鼻奮迅鳴喚便不復見此物固厚資給璞得過江左靈異志曰陳安為河間王顒給使甚壮健常樂一馬駿駃非常後馬死雙赤蛇出其鼻列異記曰故司𨽻校尉上黨鮑子都少時舉上計於道路遇一書生卒得心痛子都下車為按摩奄忽而卒不知姓字有素書一卷銀十餅即賣一餅以資殯殮其餘以枕之素書著腹上埋之謂曰子若魂靈有知當令子家知子在此未至京師有駿馬隨之唯子都得近子都歸行失道遇一關内侯家住宿侯曰君何以致此馬子都因説之侯乃驚愕曰此吾兒也侯迎開棺視銀書如言侯乃舉送詣闕上薦子都辟公府侍御史豫州牧司𨽻校尉至子永孫昱俱為司𨽻其在公皆復乘驄馬故京師歌之曰鮑氏驄三入司𨽻再入公馬雖疲行步工傅𤣥乘輿馬賦曰徃日劉備之初降也太祖賜之驄馬使自至廐選之歴名馬以百數莫可意者次至下廐有的顱馬委棄莫視痩悴骨立劉備撫而取之衆莫不笑之馬超破蘇氏塢塢中有駿馬百餘疋自超已下俱争取肥好者而將軍龎思獨取一騧馬形觀既醜衆亦笑之其後劉備奔於荆州馬超戰於渭南逸足電發追不可逮衆乃服焉傅𤣥馳射馬賦曰耳小易使鼻大勢怒徃來若鴈鷂超騰如逸虎劉琬馬賦曰吾有駿馬名曰騏雄龍頭鳥目麟腹虎胸尾如雲彗耳如挿筒太平御覽卷八百九十七
