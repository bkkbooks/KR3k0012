body:
  text: 太平御覽卷九百三十六宋李昉等撰鱗介部八鯉魚鰋魚鱣魚鮪魚䱎䲛魚魚下辛氏三秦記曰昆明池人釣魚綸絶而去夢於漢武求去其釣明日逰戱於池見大魚銜索帝曰昨所夢也取而去之帝後得明珠𤣥中記曰東方之東海有大魚焉行海者一日逢魚頭七日遇尾其產則三百里為血永嘉郡記曰青田溪冬天水熱如湯衆魚歸之名魚倉三齊記曰青城山始皇登此山築石城入海三十里射魚水四里變色如血于今猶爾盛𢎞之荆州記曰長沙湖鄉連水邉有石魚形若鯉相重杳如雲母炙之作魚脯林邑國記曰飛魚翼如蟬飛則凌雲沉泳海底王子年拾遺録曰嬴洲一名魂洲亦曰環洲洞洲廣千里中有魚身長千丈鱗色斕班鼻有角時鼓舞戱水中逺而望者見水間有五色雲就而視之乃此魚噴水為雲也又曰夏鯀治水無功沈於羽淵化為元魚大千丈後遂死横扵河海之間華夷志曰海中大魚口可容舟名曰摩竭崔豹古今注曰水君状如人乘馬衆魚𨗳從一名魚伯大水有之漢末有人扵河際見之人馬皆有鱗甲如大鯉魚但手足别耳目鼻與人不殊見人良久入水而沒博物志曰呉王江行食膾有餘棄扵江中流化而為魚今江中有名呉王餘膾魚者長四寸大者如箸猶作膾形嶺南異物志曰南方清晨望海中二山如黛海人云去㟁兩廂各六百里一旦暴風雷霧露皆腥雜以泥涎七日方已属有人從山来說云大魚因鳴吼吹沫其一鰓掛山巔七日山為之折不能去鳴聲為雷氣為風涎沫為霧又曰海中所生魚蜃置陰處有光初見之以為恠異土人嘗推其義盖醎水所生海水中遇陰晦波如燃火滿海以物擊之迸散如星嶺表録異曰新瀧等州山田揀荒平處以鋤鍬開為町畽伺春雨邱中貯水即先買鯇魚子散扵田内一二年後魚兒長大食草根並盡既為􅍄田又収魚利乃種稻且無稗草乃齊民之上術也異苑曰永嘉有人斷水捕魚宰牲祈祭了無所獲将棄罷之其夕夢見老公云諸君何不少停夜聞㹠聲驚起共看乃是大魚剉以為鮓頓得百薄故因以百薄為瀨水述異記曰桓沖為江州遣人周行廬山見一湖中有赤鯉魚使者欲飲水魚張鬐向之乃不敢飲又曰關中有魚神云是周平王二年十旬不雨遣祭天神俄而地湧泉魚躍出而降兩幽明録曰成彪兄喪哀悼結氣晝夜哭泣後釣於湖經所共飲處釋綸悲感有大魚跳入船中俯視諸小魚彪仰天號慟俛而見之悉放小魚大者便自出船去搜神記曰宫亭湖孤石有估客下都經其側見二女子云可為買兩量絲履自厚相報估客至都市好絲履并箱盛之自市一書刀亦在箱中既還以箱置廟中而去忘取書刀湖中正㠶忽有鯉魚跳入船破魚得書刀焉廣五行記曰唐儀鳯元年􅀶州僧正蒲行同凡俗市魚數頭於房作膾食之至夜四更忽聞忩外有暴風聲乃夢一佛二佛二金剛語蒲云爾是何物小鬼将穢汚伽藍金剛手執棒遣閉目因而兩目不開矣又曰曹宋二州西界大劑陂村人陳君少小為捕魚業於後得患恒被衆魚所食痛苦不能自持若以魚網葢之其痛即止後為村人盜其網去數日之間不勝痛苦而死樂府歌曰江南可採蓮蓮葉何田田魚戱蓮葉間魚戱蓮葉東魚戱蓮葉西宋玉對問曰夫鳥則有鳯魚則有鯨鯨魚朝發崑崙之墟暴鬚於碣石夕宿於孟諸夫尺澤之鯢豈能與量江海之大哉東方朔客難曰水至清則無魚人至察則無徒曹植答崔文始書曰臨江有釣不獲一鱗非江魚之不食其所餌之者非也是以君子慎舉擢鯉魚河圖曰黄帝逰於洛見鯉魚長二尺青身無鱗赤文成字毛詩衡門章曰豈其食魚必河之鯉又曰鰷􅀈鰋鯉鰷音條東觀漢記曰姜詩字士逰性至孝母常飲江水兒取水溺死恐母知詐云行學俄而涌泉出舍側井且出鯉一雙謝承後漢書曰羊續好食生魚為南陽太守丞侯儉貢鯉續受而懸之一歳儉復致一枚續乃以所懸枯魚以示儉終身不復食魚晉書曰王祥性至孝早喪親繼母朱氏不慈數譛之由是失愛於父母有疾衣不解帶湯藥必親嘗母欲生魚時天寒水凍祥解衣将剖冰求之冰忽自解雙鯉躍出持之而歸又曰劉聰時趙染為索綝所敗殺其長史魯徽劉曜聞之曰蹄涔不容尺鯉染之謂也齊書曰崔祖思自相國從事中郎遷齊國内史髙帝既為齊王置酒為樂美膾既至祖思曰此味故為南北所推侍中沈季文曰美膾呉食非祖思所解祖思曰鱉鯉似非勾呉之詩季文曰千里蓴羮豈關魯衞帝甚恱曰蓴羮故應還沈南史曰梁南郡太守劉之亨嘗夢二人姓李詣之乞命未之解也其明日仲夏有遺生鯉魚二頭之亨曰必夢中所感也乃放之其夜亦夢来謝恩云當令君延夀淮南子曰詹公之釣千歳之鯉古得道善釣者又曰牛蹄之涔無盈尺之鯉蹄中踐處符子曰務光自投盧川盧川之伯以赤鯉送之金樓子曰五尺之鯉一寸之鯉小大殊而鱗之數一家語云孔子娶於宋开官氏女一歲而生伯魚伯魚生三日魯昭公以鯉魚賜孔子孔子榮君之賜因名子曰鯉字伯魚曹植辯道論曰甘始言取鯉魚一雙令一者含藥俱投沸膏中有藥者奮尾逰行沈浮有若處淵其一者已􅍄而可噉余時問始可試否言是藥去此萬里非自行不能得也陶朱公飬魚經曰威王聘朱公問之曰公徙家不一輙累億金何術乎朱公曰夫治生之法有五水畜第一所謂水畜者魚也以六畆地為池池中為九州即求懷子鯉魚長三尺者二十頭牡鯉四頭以二月上旬庚日納池中水中無聲魚必生所以飬鯉者不相食易長又貴也魏武四時食制曰郫縣子魚黄鱗赤尾出稻田可以為醬列仙傳曰吕尚釣於磻溪三年不獲比周曰可止矣尚曰非所及果得大鯉有兵鈴在腹中又曰㳙子齊人也好餌芝术食其精者三百年乃見於齊著天地人經四十八篇後釣於河澤得鯉魚賜中符隱於岩山能致風雨又曰琴髙趙人也以鼔琴為永康王舍人行治鼔之術浮㳺冀州涿郡間二百餘年後辭入涿水中取龍子與諸弟子期之期曰皆潔齋候於水旁設祠屋果乘赤鯉来出祠中且有萬人觀之留一月復入水去又曰子英者舒鄉人善入水捕魚得赤鯉魚愛其色持著魚池中數以米榖食之一年長丈餘遂生角有翅翼子英恠畏拜謝之魚言我迎汝耳上我背與汝俱去即大暴雨子英上騰去歳歳来歸故舍英欲見妻子魚復来迎之如此七年故呉中門户作神魚子英祠續述征記曰梁孝王家中有數尺水有大鯉人謂有靈不敢犯宣城記曰臨城縣盖山有舒始泉相傳云昔舒氏女未嫁與其父採薪此女好音樂乃作絃歌而泉涌有朱鯉一雙躍出河洛記曰諺云伊洛魴鯉天下最美洛口黄魚天下不如崔豹古今注曰兖州人呼赤鯉為赤驥青鯉為青馬黒鯉為黒駒白鯉為白騏黄鯉為黄雄續搜神記曰謝允從武當山還在桓宣武座言及左元放為曹公致鱸魚允便云此可得耳求大瓮盛水朱書符授水中俄有二鯉鼔鬐在水中又曰㑹稽缺音􅀢縣有女子姓呉字望子為蘇侯神所受望子心有所欲輒空中得之望子嘗思膾一雙鮮鯉應心而至幽明録曰孫權時南方遣吏獻犀簮吏過宫亭湖失之詣神下敎求簮而盛簮器便在神前神云臨入石頭當相還去達石頭三尺鯉魚跳入船吏破魚得之又曰平都縣南陂上有冡行人於陂取得鯉道逢冢中人来云何敢取吾魚奪著車上而去杜寶大業拾遺録曰四年梁郡有清冷淵水面濶二里許西入通濟渠是時多雨溝渠皆滿忽有大魚似鯉而頭一角長丈餘鱗正赤從清冷水出頭長三尺許入横瀆迎流西北十餘里不沒入通濟渠于時夹南㟁隨看者數百人皆謂赤龍大鯉從淵而出此亦唐祚将興之兆楊􅃷之洛陽伽藍記曰京師語曰伊洛鯉魚貴於牛羊廣五行記曰隋焬帝大業初為詩令宫人唱之曰三月三日向江頭正見鯉魚江上㳺意欲垂釣往撩取意是蛟龍還復休鯉魚即唐之國姓俄而唐有天下古歌辭曰客從遠方来贈我雙鯉魚呼兒烹鯉魚中有尺素書古歌甯戚辭曰中有鯉魚長尺半弊布衣裳不復辭鰋爾雅曰鰋今鰋額白魚毛詩曰魚麗于罶鰋鯉鰋鮎也謝承後漢書曰陳蕃為郡法曹吏正月朝見其主龔客有貢魚於龔者龔曰汝南乃有此魚蕃曰魚大且明府之德晉書曰夏統字仲御母病詣洛市藥㑹三月上已洛中王公以下並至浮橋統並弗之顧太尉賈充恠而問之曰郎居海濱頗能水戱乎答曰可乃操柁正櫓折旋中流於是風波振駭俄而白魚跳入船中者有八九觀者皆悚懼酈善長水經注曰聖水出上谷東南流經大坊嶺下嶺之東首山下有石穴東北洞開穴中有水耆舊傳言者有沙門釋惠珎者常尋之旁水入三里有洞穴分為二一穴漸小西北出不知趣詣一穴西南出入經五六里方還不測淺深其水夏冷冬温春秋有白魚岀穴人有採食者美珎常味葢亦丙穴嘉魚之類列仙傳曰陵陽子明釣於溪得白龍子明解釣謝之後數十年得白魚腹腹中有書敎子明服食之法三年白龍来迎之鱣毛詩谷風四月曰匪鱣匪鮪潛逃于淵又詩義䟽曰鱣身似龍銳頭口在領下背上腹下皆有甲大者千餘斤後漢書曰楊震常客居湖城衆人謂之晩暮震志愈篤後有鸛雀銜三鱣魚飛集講堂前鸛音貫即鸛雀也都講取魚進曰虵鱣者卿大夫服之象也數三者法三台先生自此升矣淮南子曰牛蹄之涔不生鱣鮪抱朴子曰採鷰窠而求鳯卵搜井底而捕鮪魚雖加至勤非其所有也水經曰漢水又東為鱣湍洪波奔盪崩浪雲頺耆舊言有鱣魚奮渚遡流望江直上至此則暴鰓而去故因名湍矣又曰鱣鮪鯉也出鞏穴三月則上渡龍門得渡為龍矣否則㸃額而還張衡西京賦曰鱣鮪鱮鮦郭璞江賦曰魚則叔鮪王鱣孫綽望海賦曰文鯉鮪魚爾雅曰鮥音朱音洛魚叔鮪鮪鱣属也大者名王鱣小者名䱅鮪今江都鄱陽荆門以上江中通出也毛詩淇澳碩人曰施罟濊濊鱣鮪潑潑毛詩乂疏曰鮪魚出海三月從河上形似鯉而色青黑頭小而尖如鐡兠鍪口在頷下今東平遼東人謂之尉魚或謂仲明魚仲明者樂浪尉溺死海中化為此魚也禮記月令曰季春薦鮪於寝廟逢時美味淮南子曰夫牛蹄之涔不生鱣鮪又曰禹決江疏海鑿龍門辟伊闕鮪魚㳺其中抱朴子曰寸鮪汎濫蹄水之中則謂天下无四海之廣也芒蝪宛轉菓核之内則謂八極之界盡於兹也􅀶物志曰河陰岫穴出鮪魚焉䱎公贈反䲛武亘反魏武四時食制曰䲛一名黄魚大數百斤骨軟可食出江陽犍為淮南子曰季春天子始乘舟薦鮪於寝廟乃為麥祈實司馬相如上林賦曰䱎䲛漸離左思呉都賦曰筌䱎䲛太平御覽卷九百三十六
