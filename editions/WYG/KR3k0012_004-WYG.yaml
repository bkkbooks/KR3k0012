body:
  text: 太平御覽卷四宋李昉等撰天部四日下日蝕附晷附月月蝕附日下帝王世紀曰文王夢日月著身又漢文帝時日中有王字望氣經曰日有黄氣君喜下有黄氣君永福徐整長厯曰衆陽之精上合為日徑千里周圍三千里下於天七千里談藪曰魏文帝為王時夢日墜地分為三已得一分而内懐中鄧析子曰君者當如冬日之陽夏日之隂萬物歸之莫之使也王充論衡曰日不入地也譬如把火夜行平地去人十里火光藏矣非滅也又夫日月不圓視之如圓者去人逺也夫日火精也在地火不圓在天火何故獨圓日月在天猶五星五星猶列星不圓何以明之春秋之時星隕宋都視之石也不圓是知日月五星亦不圓也又儒書言魯陽公與韓戰戰酣日暮援戈而以麾之日為之反三舎此言虛也凡人能以精誠感動天者専心一意委務積神通天天為變動然尚未可謂然魯陽公志在於戰為日暮一麾安能令日反使聖人麾日日終不反魯陽公何人而使日返又儒言日中有三足烏日者火也烏入火中燋爛安得而立然烏日氣也又日中近出入逺日中小者光明故也出入時大者光闇故也夏桀無道兩日並照在東者將起在西者將滅費昌問馮夷曰何者為殷何者為夏馮夷曰西夏也東殷也於是費昌徙族歸殷殷果克隆又儒者論日出扶桑暮入細栁扶桑東方之地細栁西方之野又日晝行千里夜行千里騏􅂹晝行亦千里然則日行舒疾與騏驥歩相類崔豹古今注曰漢明帝為太子樂人作歌詩四章一曰日重光云天子之徳光明如日太子比徳焉故云重光周髀曰日光外照徑八十一萬里徐幹中論曰文王遇姜公于渭陽若披雲見白日物理論曰日者太陽之精也夏則陽勝隂衰故晝長夜短冬則隂盛陽衰故晝短夜長氣引之也行陽之道長故出入卯酉之北行隂之道短故出入卯酉之南春秋陽隂等故日行中平晝夜等也地説書曰日照四十五萬里皇甫謐年厯曰日者衆陽之宗陽精外𤼵故日以晝明名曰曜靈龍魚河圖曰陽精為日汲冡書曰徹甲居於河西天有妖孽十日並出又言本有十日迭次而遣運照無窮金匱曰三苖之時三月不見日黄帝占書曰日中三足烏見者其所居分野有白衣㑹楚辭曰十日並出流金鑠石戰國䇿曰聶政刺韓相荆軻刺秦王並白虹貫日史記曰漢景帝王夫人姙娠夢日入懐以生武帝又堯其仁如天其知如神就之如日望之如雲漢書曰李尋上疏曰夫日者衆陽之長暉光所燭萬里同晷人君之表也故日將旦清風𤼵羣隂伏又文帝時新垣平上言日再中臣以候知之居頃之際日却復中乃更十七年為後元年又鄒陽上書説梁孝王曰昔荆軻慕燕丹之義白虹貫日太子畏之後漢書曰張重字仲篤明帝時舉孝廉帝曰何郡小吏答曰臣日南吏帝曰日南郡人應向北看日答曰臣聞鴈門不見壘鴈為門金城郡不見積金為郡臣雖居日南未嘗向北看日雜兵書曰天月無度借日度為度天月無光借日光為光經星亦然故日者實也君主之象也凡天象以日為主應劭漢官儀曰太山東南名曰日觀日觀鷄鳴時見日魏志曰程立夢登太山捧日立以白太祖太祖遂加日於立上因改名昱晋書曰荀爽曰日下荀鳴鶴晋陽秋曰建武元年三日並出三齊略曰秦始皇作石橋於海上欲過海看日出處有神人驅石去不速神人鞭之皆流血今石橋猶赤色李尤九曲歌曰年嵗晩暮日已斜安得壯士翻日車日蝕書曰乃季秋月朔辰弗集于房瞽奏鼔嗇夫馳庻人走凡日食天子鼔于社責上公也嗇夫主幣之官馳取幣禮衆人走供敕日食之百役也禮記昏義曰男教不脩陽事不得謫見於天日為之蝕是故日蝕則天子素服而修六官之職蕩天下之陽事左傳曰魯昭公十七年日有蝕之祝史請用幣叔孫昭子曰日有蝕之天子不舉伐鼓於社諸侯用幣於社伐鼓於朝禮也又莊二十五年曰夏六月辛未朔日有蝕之鼓用牲于社非常也唯正月之朔慝未作日有蝕之於是乎用幣于社伐鼓於朝注曰日蝕厯之常也然食於正陽月則諸侯用幣於社請救於上公伐鼓於朝退而自責以明隂不宜侵陽臣不宜掩君公羊傳曰六月辛未朔日有蝕之以朱絲縈社或曰恊之或曰為暗恐犯之故縈之社者土地之主日者土地之精上敷於天而犯日故朱絲縈之助陽抑隂榖梁傳曰天子救日置五麾陳五兵五鼓諸侯置三麾三兵三鼓大夫撃橛凡有聲者皆陽事也所以厭隂氣也論語云日月之食人皆見之更也人皆仰之漢書曰黄琬祖父香為魏郡太守時日蝕而京師不見魏郡乃表日食之狀帝問日所食多少香乆而無對琬年七嵗在傍謂香曰何不言日食之餘如月之初遂用其言納詔漢書曰日者徳也故日蝕則修徳又劉寵鄭𢎞徐昉趙喜虞延並無事以日食免官淮南子曰麒麟鬭則日月蝕許慎注曰麒麟獨角之獸故與日相符晷釋名曰日晷規也如規畫也説文曰晷日影也周禮地官曰大司徒以土圭之法測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所㑹也隂陽之所和也土圭所以致四時日月之景測猶度也不知廣深故曰測鄭司農云測土深謂南北東西之深也日南謂立表處太南近日日北謂立表處太北逺日景夕謂日昳景乃中立表處太東近日景朝謂未中而景中立表處太西逺日鄭𤣥謂晝漏半而置土圭表隂陽審其南北焉景短於土圭謂之日南是地於日為近南景長於土圭謂之日北是地於日為近北東於土圭謂之日東是地於日為近東西於土圭謂之日西是地於日為近西如是則寒暑隂陽風雨偏而不和是未得其所求凡日景于地千里而差一寸易通卦驗曰冬至晷長丈三尺鄭𤣥注曰晷者所立入地表隂也丈三尺長之極春分晷長七尺二寸四分夏至晷長尺有四寸八分秋分晷長二寸四分又冬至日樹八尺之表日中視其晷晷如度者則嵗美人民和順晷不如度者則嵗惡人民為偽言政令不平晷進則水晷退則旱晉太康記曰河南陽城縣是為土中夏至之景尺有五寸所以為候南越志曰日南至月立表望之日在圵景居南山海經曰長留之山其神白帝少昊居之是神也主司反景日西入則景反東照言司察之也淮南子曰都廣南方山名衆帝所自上下日中無景盖天地之中日中時立表無晷故曰地中風土記曰鄭仲師以為夏至之日立八尺之表景尺有五寸謂之地中一云陽城一云洛陽鄭康成謂移一寸於千里景尺五寸於南戴日下萬五千里然則千里寸景已課不效交州大抵去洛九千餘里盖水陸曲非論景度徑意也推直考實其五千乎昔交州主簿李士孫悚云己常立表効景景在表南豈古郡以日南為名者其斯義乎此郡又有比景縣北比二字既相似音又相近加以蠻土舌軟聲淺事在可疑月月蝕附釋名曰月闕也言滿則復缺也又曰朔月之名也朔蘇也月死復蘇生也晦盡之名也晦灰也火死為灰月光盡似之也弦月半之名也其形一旁曲一旁直若張弓弦也望月滿之名也日月遥相望也説文曰朏月未成明也魄月始生魄然也承大月月生二日謂之魄承小月月生三日謂之朏朏音斐易曰坎為月書曰月之從星則以風雨又哉生明哉始也始生明月三日也又哉生魄魄生明死十六日之夜也詩曰月離于畢俾滂沱矣又如月之恒又日居月諸下土是冒禮曰大明生於東月生於西此隂陽之分夫婦之位也又天秉陽垂日星言天持陽氣施生照下土也地秉隂竅於山川播五行於四時和而後月生也是以三五而盈三五而闕竅孔也言地持隂氣出日於山川以舒五行於四時也此氣羲和乃后月生而上配日君臣功成進爵位一盈一闕此屈伸之義也必三五者播五行于四時一曰水二曰火三曰木四曰金五曰土合為十五之成數也又月者三日而成魄三月而成時是以有三讓建國必立三卿三賔者政教之本禮之大叅也言禮者隂也大數取法於月也又天子與后猶日之與月陽之與隂相須而後成又秋分之日祀夕月於西郊又祭日於壇祭月於坎以别幽明以制上下幽明者謂日照晝月照夜又太隂之精上為月月者天地之隂金之精也傳曰楚晉將戰吕錡夢射中月退入于泥占之曰姬姓日也異姓月也必楚王也及戰射恭王傷目吕錡死之京房易飛候曰正月有偃月必有嘉王尚書大傳曰晦而月見西方謂之朓朓佻也佻逹行疾貎朓則侯王其舒朔而月見東方謂之側匿側匿行遲貌側匿則侯王其肅肅急也日君象也月臣象也君政急則日行疾月行徐臣逡廵不進舒緩也君政緩則日行徐月行疾臣放恣詩推度災曰月三日成魄八日成光蟾蜍體就穴鼻時萌宋均注曰穴决也决鼻也禮斗威儀曰政太平則月多耀政頌平則赤明政和平則黑明政象平則白明政升平則青明又君乘土而王其政平則月圓而多暈春秋考異郵曰諸侯謀叛則月生爪牙后族専政則日月並照春秋感精符曰月者隂之精地之理又人主兄日姊月春秋演孔圖曰蟾蜍月精也春秋元命苞曰隂精為月日行十三度常朏任而受明受陽精也精在内故金水内景又月之為言闕也兩設以蟾蜍與兎者隂陽相居明陽之制隂隂之倚陽帝王世紀曰堯時有草夾階而生每月朔日生一莢至月半則生十五莢至十六日後日落一莢至月晦而盡若月小餘一莢王者以是占厯唯盛徳之君應和氣而生以為堯瑞名曰蓂莢一名厯莢一名瑞草㑹稽先賢傳曰闞澤年十三夢見名字炳然在月中搜神記曰孫堅妻懐權夢月入懐告堅曰妾昔懐䇿夢日入懐今又夢月堅曰子孫興矣文子曰百星之明不如一月之光又日月欲明浮雲蓋之叢蘭欲秀秋風敗之淮南子曰水氣之精為月又月者太隂之精又蛤蠏珠龜與月盛衰月晦則魚腦减又曰一名夜光月御曰望舒亦曰纎阿又曰月天之使也積隂之寒氣大者為水水氣之精者為月又畫蘆灰而月暈闕許慎注曰有軍事相圍守則月暈以蘆灰随暈環闕其一面則月暈亦闕於上又方諸見月則津而為水髙誘注曰方諸隂燧大蛤也手摩拭令熱以向月則水生許慎注曰諸珠也方石也以銅盤受之下水數升又日不知夜月不知晝日月為明而不能兼也又月之光可以逺望而不可細書抱朴子曰昔帝軒候鳯鳴調律唐堯觀蓂莢以知月數又王生云月不圓望之圓者月初生及既虧之後視之宜加三寸鏡稍稍轉大初如破環漸漸滿也又俗士多云今月不及古月之朗又月之精生水是以月盛而潮濤大又金華和丹其光上與日月相連丹金為盤椀以承月得神液如方諸又曰黄帝醫經有蝦蟆圖言月生始二日蝦蟇始生人亦不可針灸其處范子計然曰月水精内影又月行疾二十九日三十日間一與日合取日之度以為月節吕氏春秋曰月羣隂之本月望則蚌蛤實羣隂盈月缺則蚌蛤虛羣隂揫夫月形乎天而羣隂化于淵張衡靈憲曰羿請不死藥於西王母羿妻姮娥竊以奔月託身於月是為蟾蜍又月者隂精積而成獸象蟾兎焉其數偶荆州占曰月珥且戴不出百日主有大喜山海經曰大荒之中有方山日月所自出也風俗通曰吳牛望月則喘之苦於日見月亦怖而喘焉河圖令占篇曰地淪月散必有立主龍魚河圖曰帝滛佚則奎有角月有足又月有九行黒道二出黄道北赤道二出黄道南白道二出黄道西青道二出黄道東立春春分月從東青道立秋秋分從西白道立夏夏至從南赤道立冬冬至從北黒道天有四表月有三道聖人知之可以延年益夀白虎通曰月所以有缺何歸功於日也三日成魄八日成光十六日轉而歸功晦至朔旦受符復行也月有小大何天左旋日月右行日行遲月行疾月及日為一月至二十九日未及七度即三十日者過行七度日不可分故乍大乍小明有隂陽也月有閏餘何周天三百六十五度四分度之一嵗十二月日過十二度故三年一閏五年再閏明陽不足隂有餘閏者陽之餘也軍國占候曰若月三珥者大臣有喜若有冠而復暈者天下有喜廣雅曰夜光謂之月五經通義曰月中有兎與蟾蜍何月隂也蟾蜍陽也而與兎並明隂係於陽也孫氏瑞應圖曰君不假臣下之權則日月揚光又曰景星者大星也其狀如半月生於晦朔助月為明王者不私人則見虞喜安天論曰俗傳月中仙人桂樹今視其初生見仙人之足漸以成形桂樹後生焉京房易説云月與星至隂也有形無光日照之乃有光喻如鏡照日即有影見月初光見西方已後望光見東方皆日所照也皇甫謐年厯曰月者羣隂之宗月以宵曜名曰夜光遁甲開山圖榮氏觧曰女狄暮汲石紐山泉水中得月精如鷄子愛而含之不覺而吞遂有娠十四月生夏禹論衡曰月行一日一夜二萬六千里與鳬飛相類地說書曰月行四十五萬里徐整長厯曰月徑千里周圍三千里下於天七千里楚詞天問曰夜光何德死而又育厥利維何顧兎在腹言月中兎何所貪利而居月之腹顧望也運斗樞曰后族擅權月生足芒主勢奪於后族羣妃之黨横僭則月盈並出小月承大月羣姦在宫主若贅旒大承小近臣起䜛人横陪臣執命三公望風崔豹古今注曰漢明帝作太子樂人歌四章以賛太子之徳一曰日重光二曰月重輪三曰星重曜四曰海重潤漢書曰月穆穆以金波蓋光彩貎又元后母夢月入懐而生元后又髙帝七年月暈圍參畢七重占曰畢昴間天街也街北胡也街南中國也昴為匈奴參為趙畢為邊兵是嵗髙祖自將至平城為冒頓所圍七日迺解又李尋上書曰月者衆隂之長妃后大臣諸侯之象也晋書曰謝太傅庭中夜坐月色無玷歎以為佳謝景重率爾曰意謂不如㣲雲㸃綴太傅曰卿居心不凈乃欲滓穢太清耶又徐孺子年九嵗月下戲人或曰若月中令無物當極愈明徐曰不爾譬如眼中無瞳子何必不暗後魏書曰天興五年十月月暈左角太史令晁宗奏曰角蟲將死牛果大疫鹿亦多死揚雄長楊賦曰西壓月窟窟月所出入也東震日域傳𤣥擬天問曰月中何有玉兎𢷬藥傳咸詩曰團團三五月皎皎濯清輝陸機詩曰安寢北堂上明月入我牖照之有餘耀攬之不盈手宋謝靈運怨曉月賦曰卧洞房兮當何悦滅華燭兮弄曉月照三五兮既滿今二八兮將缺浮雲褰兮收泛濫明舒照兮殊皎㓗墀除兮鏡鑒房櫳兮澄澈宋謝莊月賦曰陳王初䘮應劉端憂多暇悄焉疚懐弗怡中夜于時斜漢左界北陸南躔白露曖空素月流天沉吟齊章殷勤陳篇抽毫進牘以命仲宣仲宣跪而稱曰臣聞日以陽徳月以隂靈擅扶光於東沼嗣若英於西溟引𤣥兎於帝臺集素娥於后庭若夫氣霽地表雲歛天末洞庭始波木葉㣲脱列宿掩縟長河韜映柔祗雪凝圓靈水鏡連觀霜縞周除氷凈歌曰美人邁兮音塵闕隔千里兮共明月宋鮑照玩月詩曰始見西南樓纎纎如玉鈎未映東北墀姢姢似蛾眉蛾眉蔽珠櫳玉鈎隔璅窻三五二八時千里與君同夜移衡漢落徘徊帷幌中梁沈約詠月詩曰月華臨静夜夜静滅氛埃方暉竟户入圓影隙中來髙樓切思婦西園遊上才網軒映珠綴應門照緑苔洞房殊未曉清光信悠哉周王褒關山月詩曰關山夜月明愁色照孤城半形同漢陣全影逐胡兵灰寒色轉白風多暈欲生寄言亭上吏遊客解鷄鳴月蝕易曰月盈則蝕詩曰彼月而食則維其常禮曰婦順不修隂事不得謫見於天月為之蝕故月蝕則后素服而修六宫之職蕩天下之隂事淮南子曰麒麟鬭則日月食又月望日奪其光十五日與日相望東西中絶則月蝕奪光也劉向説苑曰秦胡亥立日月薄蝕熒惑襲月荆州占曰月蝕后自提鼔階前把槌撃鼓者三中良人諸御者宫人皆撃橛救之月已蝕后乃入齋服縞素三日不從樂以應其祥此先王之所以免天地之誅而解四境之患也晉書曰永嘉元年月蝕赤如血二月王敬則反太平御覽卷四
