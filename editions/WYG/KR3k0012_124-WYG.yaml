body:
  text: 太平御覽卷一百二十四宋李昉等撰偏霸部八前凉張軌張寔張茂張駿張重華張祚張𤣥靚張天錫西凉李暠古老切李歆北凉沮渠蒙遜沮渠茂䖍前凉張軌崔鴻十六國春秋前凉録曰張軌字士彦安定烏氐人漢常山王耳十七世孫祖烈魏外黄令父温太官令母隴西辛氏軌少好學明經與同郡皇甫士安友善拜宫守舍人京兆杜預以其所註易遺之太康中為尚書郎太子洗馬中庶子遷散騎常侍征西将軍司馬軌以晉室多難隂圖保據河西追竇融故事筮之遇泰之觀軌喜曰霸者之兆乃求為凉州公卿亦舉軌拜凉州刺史課農桑㧞賢才置崇文祭酒徵九郡胄子五百人立學校以教之永興二年拜西安将軍封安樂鄉侯惠帝崩遣長史北宫純司馬纂别駕陰監奉表京師是歲大城姑臧其城本匈奴所築也南北七里東西三里地有龍形故名卧龍城永嘉四年十一月黄龍出于臨羌河發水昇天身長十餘丈五年帝遣使拜車騎大将軍開府儀同三司筞命未至而劉曜攻䧟長安遷晉帝于平陽建興元年晉愍帝即位于長安遣使者拜軌鎮西大将軍開府儀同三司加侍中封西平郡公固讓不受二年進拜太尉凉州牧以軌年老多疾拜子寔行撫軍副凉州刺史五月軌寝疾立子寔為世子己丑薨于正寝年六十葬建陵册贈侍中太尉諡武穆張祚僣號追尊武王廟號太祖張寔崔鴻十六國春秋前凉録曰張寔字安遜軌之世子也學尚明察敬賢愛士晉舉秀才除尚書郎永嘉元年固辭驍騎将軍請還凉州帝許之改授議郎西中郎将建興元年長史張璽等表寔嗣位十月帝遣使授西中郎将凉州刺史西平公二年十一月帝将降劉曜進寔侍中司空凉州牧三年始知劉曜逼遷天子平陽大臨三日五年南陽王寳聞愍帝崩自稱晉王年號建康置百官遣使拜寔征西大将軍開府儀同三司増邑三千户六年六月京兆人劉𢎞挾左道以眩惑百姓密與寔左右十餘人謀殺寔皆懷刀入内斬寔于外寝時年五十葬寧陵晉元帝冊贈寔大司馬凉州牧諡元公張祚僣號追尊曰明王廟號髙祖張茂崔鴻十六國春秋前凉録曰張茂字成遜寔之母弟虛靖好學不以勢利為心建興元年相國南陽王寶辟從事中郎又薦為給事黄門侍郎皆不就二年徵為侍中以父疾固辭四年拜秦州刺史加散騎常侍領雍州皆不受寔左司馬隂元等以寔旣被害子駿冲幼宜立長君乃推茂為大都督太尉凉州牧茂不從以平西将軍行都督凉州諸軍事䕶羌校尉凉州牧西平公大赦境内九月立寔子駿為世子三年劉曜遣鴻臚拜茂太師涼王四年茂寝疾執駿手泣曰吾先人以孝友見稱自漢以來世執忠順汝謹守忠節毋或失墮薨于正寝年四十八劉曜遣使贈太宰諡成烈王張祚僣號追尊曰成王廟號太宗張駿崔鴻十六國春秋前凉録曰張駿字公庭寔之世子永嘉元年生幼而竒偉十歲能屬文茂之四年拜使持節大都督大将軍凉州牧西平公大赦境内劉曜遣使拜大将軍凉州牧元年正月親耕籍田二月始承晉元帝崩問大臨三日四年十二月劉曜為賊所擒曜太子毗及劉𦙍等率衆奔上邽六年二月石勒稱天王乃遣使拜駿征西大将軍凉州牧加五錫之禮八年羣僚勸駿稱凉王置百官駿曰此非人臣所言敢有此言罪在不赦又請立世子乃立重蕐為世子十二月鄯善王元孟獻女妹好號曰美人立賔遐觀以處之十四年五月雨雪降霜駿避正殿素服命羣寮極言得失十五年以右長史任處領國子祭酒立辟雍明堂而行禮焉命西曹椽集閣内外事付索綏以著凉春秋十一月以世子重華行凉州事十九年田于建西踰右玉縣九月改右玉縣為金澤縣二十一年始置百官官號皆擬天朝車服旌旗一如王者酒泉太守馬岌上言酒泉南山既崑崙之體周穆王見西王母樂而忘歸即謂此山有石室王母堂珠璣鏤飾煥若神宫禹貢崑崙在臨江之西即此明矣所宜立西王母祠以裨朝廷無疆之福駿從之二十二年六月薨于正德前殿年四十晉遣䇿贈大司馬諡忠成公七月葬大陵張祚僣號追尊文王廟號世祖張重華崔鴻十六國春秋前凉録曰張重華字泰臨駿第二子寛和懿重沉毅少言駿薨右長史任處上華為使持節大都督太尉凉州牧䕶羌校尉西平公假凉王大赦境内三年九月晉遣使者拜侍中大都督隴右諸軍事大将軍凉州刺史領䕶羌校尉西平公重華以位號未稱怒不受詔羣寮上重華為丞相凉王雍秦凉三州牧五年重華讌羣寮于閑豫庭論講經義碩問索綏曰孔子婦誰家女老耼父字為何四皓既安太子住乎還山乎綏曰孔子婦姓亓官氏女耼父名乾字元泉胎則無耳一目不明孤單年七十二無妻與隣人益壽氏老女野合懷胎八十年乃生老子四皓還否臣尚未悉重華曰卿不知乎四皓死于長安有四皓冡為不還山也七年十月重華寝疾臨春坊遣左長史馬岌䇿拜子靈曜為世子大赦境内十一月薨于平章殿年二十七葬顯陵張祚僣號追諡桓王廟號世宗張祚崔鴻十六國春秋前凉録曰張祚字太伯駿之長庶子博學雄武有政治之才駿之二十一年拜延興太守封寧鄉侯重華薨子靈曜嗣七年十一月右長史趙長等矯稱遺令以祚為使持節都督中外諸軍事撫軍大将軍輔政十二月趙長等議以靈曜冲幼世難未夷宜立長君廢曜為寧凉侯立祚為大将軍䕶羌校尉涼州牧又從趙長等議僣即王位于謙光殿大赦改元為和平元年立妻辛氏為皇后子太和為太子封弟天錫為長寧侯重華少子𤣥靚為凉武侯置百官二月尊祖父郊祀天地二年有神降于𤣥武殿自稱𤣥㝠與人交語祚日夜祈之神言與福利祚甚信之征東張瓘遣兵傳檄廢祚還第復立靈曜八月祚收瓘弟琚及其子嵩等驍騎将軍宋混兄脩素與祚有隙祚疑之混西奔招合夷晉衆至萬餘人還向姑臧祚大懼遣陽秋胡将靈曜于苑拉音獵其腰而殺之埋于沙坑九月宋混次于武始大澤為靈曜發哀閠月混至姑臧祚登神雀觀張琚張嵩殺祚守卒死者四百餘人斬西門關納混領軍趙長開宫門以應琚長馳入殿中大呼稱萬歲祚以長敗賊下觀勞之長奮槊音朔刺祚中額奔入萬秋閣為厨士徐里所殺以庶人禮葬之天錫即位備禮改葬于愍陵追諡威王封子廷堅為金澤侯張𤣥靚崔鴻十六國春秋前凉録曰張𤣥靚字元安重華少子母郭夫人和平二年宋混張琚等上𤣥靚為大将軍凉州牧䕶羌校尉西平公時年七歲張瓘至姑臧推𤣥靚為大将軍凉王自為使持節都督中外諸軍事尚書令凉州牧張掖郡公四年五月東苑大冢上忽有池又大澤地燃廣袤數丈執法御史杜逸言于瓘曰此皆變之大者可移之他族瓘徵兵數萬集于姑臧謀討宋氏混與弟澄及左右壮士楊和等四十餘騎奔入南門申令諸營曰張瓘得罪被太后詔誅之俄而衆至二千餘瓘率衆出戰混擊敗之衆悉去瓘自殺混入見𤣥靚以混為使持節中外都督諸軍事驃騎大将軍酒泉郡侯輔政五年六月大旱令諸祈雨之官皆詠雲漢詩儒林祭酒索綏曰雲漢陳周宣之美非憫旱文昔神鼎之出漢虞丘不賀今辭與事違恐非致澤之意也綏字士艾燉煌人父戢晉司徒綏家貧好學舉孝廉為記室祭酒母喪去官又舉秀才著凉春秋五十卷又作六夷頒符命傳十餘篇以著述之功封平樂亭侯六年宋混卒天錫以使持節都督諸軍輔政八月右将軍齊南等議以欲靖多難須立長君勸天錫自立閏月天錫遣劉肅等夜害元靚時年十四葬平陵諡冲王張天錫崔鴻十六國春秋前凉録曰張天錫字純嘏駿之少子母曰劉美人天錫既僭即位乃謁于太廟尊母劉氏為太后元年四月秦遣其大鴻臚拜天錫大将軍凉州牧西平公三年姑臧北山楊樹生松葉西苑牝鹿生角東苑銅佛生毛延興地震䧟裂水出天錫避正殿引咎責躬晉遣使拜右關中諸軍大将軍凉州牧西平公八年郡國火燃于泥中三十所苻堅復有兼并之規天錫大懼遣從事中郎韓博奉表于晉又與桓温書尅以其年大舉都㑹上邽十年以世子懷為使持節鎮西将軍高昌郡公次子大豫為世子豫母焦氏為左夫人七月大水地震西平五十日中地十動土樓崩天錫疾美人閻姬薛姬皆自殺二姬國色並有殊寵天錫每謂之曰汝二人将何以報我我死之後豈可更為人妻皆曰尊若不諱妾請效死于前灑掃于地下無他志十月天錫疾瘳大赦境内追悼二姬塟以夫人禮十三年五月苻堅遣武衛将軍茍長等率衆來伐天錫遣中衛将軍史景等拒戰赤岸為秦所敗天錫納左長史馬芮之言面縛降秦東徙長安拜歸義侯北部尚書遷右僕射隨苻堅敗于淮南又降晉為員外散騎常侍復本封薨贈鎮西将軍諡悼公張軌以晉永寧九年辛巳歲牧凉州至天錫敗亡之歲歲在丙午八主七十六年西凉李暠古老切崔鴻十六國春秋西凉録曰李暠字𤣥盛隴西狄道人也漢前将軍廣十六世孫廣子侍中敢之後李氏世為西州右姓祖父弇音奄前凉武衛将軍天水郡太守安世亭侯父昶字中堅㓜有令名世子侍講年十八卒暠昶之遺腹子少而好學沉敏有器度後凉龍飛二年建康太守段業自稱凉州牧號神璽元年拜暠效榖令二年燉煌索仙等以暠温毅有惠政推暠為燉煌太守段業復署曰髙安西將軍領䕶西胡校尉庚子元年十一月晉昌太守唐瑤移檄六郡推暠為大将軍凉公領秦凉二州牧大赦改年追尊祖弇凉景公父昶凉簡公以瑤為征東将軍三年正月于南門起靖㳟堂以議朝政圖讃自古聖帝明王忠臣孝子烈士貞女親為序頌以作鑒戒五年正月又立泮宫増髙門學生五百人四月燉煌有葛縁木而生作黄鳥之形世子譚卒九月立第二子歆為世子正月大赦改年為建初元年三月讌于曲水命羣寮賦詩暠親為之叙文寫諸葛亮訓厲以戒諸子十三年正月寝疾顧命長史宋繇曰吾終之後嗣子猶卿子也善相輔導二月薨于㳟徳殿年六十九葬建世陵諡武昭王廟號太祖初暠為羣雄所推定千里之地謂張氏之業不足成河西十郡歳月而一既而傉檀入姑臧蒙遜基宇稍廣於是慨然著述志賦初河右不生楸槐張駿之世取於秦隴植之皆死至是酒泉宫西北有槐生焉乃作槐樹賦又作婦辛氏誄自餘詩賦數十萹李歆崔鴻十六國春秋西凉録曰李歆字士業暠第二子暠薨左長史宋瑤等上為大将軍凉公領凉州牧䕶𦍑校尉大赦改年為嘉興元年七月歆聞蒙遜南伐西秦中外戒嚴将攻張掖尹太后以為不可宋瑤亦諫歆怒不從遂率步騎三萬東伐次于都瀆澗蒙遜自浩亹來戰于懷城歆敗左右勸還歆曰吾違太后明誨逺取敗辱不殺此胡復何面目以見母也勒衆復戰敗于蓼泉為遜所殺歆弟驍騎将軍翻擊虜将軍豫等西奔燉煌蒙遜遂入酒泉翻及燉煌太守恂與諸子等棄燉煌奔于北山郡人宋承張𢎞等以恂在郡有惠密信招恂恂率千騎入于燉煌朱承張𢎞等推恂為凉州刺史蒙遜率十二萬攻恂宋承等開門出降恂自殺恂暠之第六子也遜獲翻子寶徙于姑臧歳餘北奔伊吾後二十餘年至魏太平三年寶至伊吾率流人及虜騎南襲燉煌據之遣使降魏魏以寶為使持節侍中都督西郵諸軍事鎮西大将軍開府儀同三司領䕶戎校尉沙州牧燉煌公承制玉門以西寶寛雅有度量甚著威恵于西土在燉煌三年徙幷州刺史薨諡宣公自暠元年歲在庚子至為蒙遜所滅二十四年北凉沮渠蒙遜崔鴻十六國春秋北凉録曰沮渠蒙遜臨松盧水胡人其先世為匈奴左沮渠遂以官為氏遜好學涉羣史雄烈有英畧後龍飛二年遜伯父羅仇麴粥從吕光征河南光前軍大敗皆為吕光所殺宗部會葬者萬餘人遜哭謂衆曰昔漢祚中㣲吾之乃祖翼奨竇融保寧河右吕王耄荒虐民無道豈可坐觀成敗不上繼先祖安民之志下使二父有恨黄泉衆咸稱萬歳遂立盟約一旬之間衆至萬餘與從兄男成推光建康太守段業為凉州牧康公改龍飛二年為神璽元年業以遜為張掖太守男成為鎮國大将軍委以軍國之任永安元年三月遜以為業所憚内不自安請為安西太守四月業收男成賜死遜聞男成死泣告衆曰男成忠于叚公枉見屠害諸軍能為報仇乎成素有恩信衆皆憤泣而從之北至氐地衆踰一萬業遣右将軍田昻武衛将軍梁中庸等攻侯塢遜自氐地救之昻率騎五百歸遜軍遂大潰中庸來奔五月遜至張掖田昻兄子承愛斬關納遜業左右散走遜大呼曰鎮西何在軍人曰在此業曰孤單瓢一己為貴門所推可見乞餘命投身嶺南庶得東遷與妻子相見遜遂斬之六月右長史梁中庸等推遜為大将軍凉州牧大赦改元永安四年秦遣鴻臚梁裴拜遜鎮西大将軍開府儀同三司沙州牧西海公九年二月兩月並出正始元年冬十月遷都姑臧十一月僣即河西王位于謙光殿大赦改元始置百官如吕光為三河王故事二年四月立子德政為世子三年二月與西秦通和遜西巡遂循海至鹽池祀王母等寺中有𤣥石圖命中書侍郎張穆為賦銘于寺前十四年起遊林堂于内苑圖列古聖賢之像九月堂成遂讌羣臣談論經傳顧謂郎中劉炳曰仲尼何如人也炳曰聖人也遜曰聖人者不凝滯于物而能與世推移畏于匡辱于陳伐樹削跡聖人固若是乎炳不能對遜曰卿知其外未知其内昔魯人有浮海而失津者至于亶州仲尼及七十二子遊于海中與魯人木杖令閉目乘之使歸告魯侯築城以偹冦魯人出海投杖水中乃龍也具以状告魯侯不信俄而有羣鷰數萬銜土培城魯侯信之大城曲阜訖而齊冦至攻魯不尅而還此其所以稱聖也義和元年十二月魏遣太常李慎拜遜太傅凉州牧凉王加九錫之禮三年夏四月遜寝疾立子茂虔為世子薨于路寝五月葬元陵諡武宣王廟號太祖沮渠茂虔崔鴻十六國春秋北凉録曰沮渠茂虔遜第三子聦頴好學和雅有度義和三年立為世子加中外都督大将軍録尚書事遜薨僣即河西王位大赦改年為永和元年立子封彊為世子加撫軍大将軍録尚書事三年五月西中郎将燉煌太守沮渠唐兒上言曰十五日有一老父見于郡城東門投書忽然不見其書一紙八字滿之文曰凉王三十年若七年虔訪于奉常張慎慎曰昔虢将亡神降于莘深願陛下克念脩政以副三十年之慶若盤于遊田荒于酒色臣恐七年将有大變虔不悦七年正月朝羣臣于謙光殿有狐在于東序門者不見其入左右以告命射之不獲二月端門崩初虔為酒泉太守起浮屠于中街有石象在焉是月象流血五月太廟基䧟六月當陽門崩魏常山王赤堅率衆至姑臧虔嬰城拒守九月面縛出降魏釋其縛徙虔及宫室士民十萬户于平城拜虔征西大将軍王如故八年賜死諡哀王自遜永安元年歳在辛丑至是歳庚寅三年十九載晉書曰蒙遜以安帝隆安元年自稱牧義熈八年僣立俊八年而宋氏受禪以元嘉十年死時年六十六在位三十二年子茂虔立六年為魏所滅太平御覽卷一百二十四
