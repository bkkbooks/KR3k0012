body:
  text: 太平御覽卷四百一十二宋李昉等撰人事部五十三孝上爾雅曰善父母為孝毛詩􅆁栢舟曰凱風美孝子也凱風南風衛之滛風流行雖有七子之母猶不安其室故美七子能盡其孝道以慰其母心又曰陟岵孝子行役思念父母也國廹而數侵削役于大國父母兄弟離散而作是詩也陟彼岵兮山有草木曰岵瞻望父兮又谷風蓼莪刺幽王也民人勞苦孝子不得終養爾蓼蓼者莪匪莪伊蒿蓼蓼長大貌也莪已蓼蓼長大我視之以為非莪反謂之蒿喻已憂思雖在役中心不精識其事哀哀父母生我劬勞尚書曰有鰥在下曰虞舜帝曰俞予聞如何岳曰瞽子父頑母嚚象傲克諧以孝烝烝乂不格姦大戴禮曰上敬老則下益孝禮記曲禮曰凡為人子者冬溫而夏凊昏定而晨省故州閭鄉黨稱其孝也孝子不服闇不登危懼辱親也服事也不於暗冥之中從事謂卒有非常失禮也又祭義曰曾子曰孝有三大孝尊親其次不辱其下能養公明儀問於曾子曰夫子可以為孝乎曾子曰是何言與是何言與君子之所謂孝者先意承志諭父母於道參直養者安能為孝曾子曰身也者父母之遺體敢不敬乎居處不莊非孝也事君不忠非孝也蒞官不敬非孝也朋友不信非孝也戰陳無勇非孝也五者不遂災及其親敢不敬乎烹熟羶薌嘗而薦之非孝也養也夫孝置之而塞乎天地溥之而横乎四海斷一樹殺一獸不以其時非孝也孝有三小孝用力中孝用勞大孝不匱思慈愛忘勞可謂用力矣尊仁安義可謂用勞矣博施備物可謂不匱矣父母愛之喜而勿忘父母惡之懼而無怨父母有過諫而不逆父母既没必求仁者之粟以祀之謂之禮終又曰先王之孝也色不忘乎目目常思父母之顔色聲不絶乎耳心志嗜欲不忘乎心君子生則敬養死則敬享思終身不辱也又曰子曰舜其大孝也歟徳為聖人尊為天子富有四海之内宗廟享之子孫保之故大徳必得其位必得其禄必得其名必得其夀又曰子夏既除喪而見與之琴和之而不和彈之不成聲夫樂之和猶未入心雖喪已除而哀未已作而曰哀未忘也先王制禮不敢過也又曰文王之為世子朝於王季日三雞初鳴而衣服至於寢門外問内豎之御者曰今日安否何如内豎曰安文王乃喜及日中又至亦如之及暮亦如之其有不安節則内豎以告文王文王色憂行不能正履王季復膳然後亦復初左傳曰鄭莊公即位姜氏愛共叔段請京使居之叔段襲鄭莊公伐京遂寘姜氏于城潁而誓之曰不及黄泉無相見也既而悔之潁考叔曰君何患焉若闕地及泉隧而相見闕穿也隧埏也其誰曰不然公從之君子曰潁考叔純孝也孝經曰愛敬盡於事親而徳教加於百姓刑于四海葢天子之孝也高而不危所以長守貴也滿而不溢所以長守富也葢諸侯之孝也言滿天下無口過行滿天下無怨惡葢卿大夫之孝也以孝事君則忠以敬事長則順葢士之孝也謹身節用以養父母此庶人之孝也孝經援神契曰天子行孝四夷和平又曰孝悌之至通於神明病則致其憂顦􅀈消形求醫翼全宋均注曰翼羽翼親者也孝經説曰孝畜也養也論語學而曰父在觀其志父沒觀其行三年無改於父之道可謂孝矣孝子父在無所自專庶幾於其善道而已又為政曰子夏問孝子曰色難言和顔悦色為難也家語曰子路見孔子曰負重渉遠不擇地而休家貧親老不擇禄而仕昔者由也事二親之時常食藜藿之實而為親負米百里之外親沒之後南遊之楚從車百乘積粟萬鍾累茵而坐茵褥列鼎而食願欲食藜藿為親負米不可復得也枯魚銜索幾何不蠧二親之夀忽如過隙孔子曰由也事親可謂生事盡力死事盡思者也又曰曾參者武城人字子輿志於孝道故孔子因之作孝經齊欲以為卿而不就曰吾父母老食人禄則憂人事吾不忍遠親而為人役也後母遇之無恩而供養不衰及其妻為棃烝不熟因出之人曰非七出也答曰棃烝小物耳吾欲使熟而不用吾命況大事乎遂遣之終身不娶其子請焉告子曰高宗以後妻殺孝己尹吉甫以後妻放伯竒吾上不及高宗下不比吉甫庸知其得免於非乎漢書曰梁孝王每聞太后病口不能食又曰金日磾母教誨兩子甚有法度上聞而嘉之母死詔圖畫於甘泉宫署曰休屠王閼氏日磾每見畫常拜向之涕泣東觀漢記曰汝郁字叔異陳國人年五嵗母病不能飲食郁亦不肯飲食母憐之强為飱飲欺言已愈郁察母顔色不平輒復不食宗親共竒異之因字曰異又曰蕭彪字伯文京兆杜陵人累官巴郡太守父老乞供養父有賔客輒立屏風後應受使命父嗜䴵音餅每自買進之又曰張覇字伯饒蜀郡成都人年數嵗有所噉必先讓父母鄉里號曰張曾子七嵗通春秋復欲進業父母語汝小何能多曰我饒為之遂以伯饒字焉又曰趙咨字文楚東郡燕人大司農陳狶舉咨至孝躬率子孫耕農為養盜常夜往刼之咨恐母驚懼乃先至門迎盜因請為設食謝曰老母八十疾貧湏養居貧朝夕無儲乞少置衣糧妻子餘物一無所請盜皆慙赧奔走又曰黄香字文彊父兄舉孝廉為郡五官貧無奴僕香躬執勤苦盡心供養冬無被袴而親極滋味暑即扇枕寒即以身温席又曰鮑永字君長上黨人少有志操事後母至孝妻常於母前叱狗永即去之又曰樊儵字長魚事母至孝母常病癰儵書夜匍伏不離左右至為吮癰又曰張表字公儀奉之子也遭父喪疾病曠年目無所見耳無所聞服闋醫藥救療歴嵗乃瘳每彈琴惻愴不能成聲見酒食未嘗不泣宗人親厚節㑹飲食宴為其不復設樂又曰廉范字叔度京兆人也父客死蜀漢范與客􅇍負喪歸至葮萌載船觸石破没范持棺柩遂俱沈溜衆傷其義釣求得之療救僅免於死又曰李充兄弟六人同食遞衣家貧親老充妻勸異居充使釀酒㑹親戚充啟其母曰此婦勸異居不可奉祭祀請去之遂叱出其婦呉志曰顧悌以孝悌廉直聞於鄉黨每得父書洒掃整衣服設几筵舒書其上拜跪讀書應諾畢復再拜父終水漿不入於口五日孫權為作布衣一襲强令悌釋服悌雖以公義自割猶以不見父喪常畫壁作棺柩設象神坐於下對之哭泣服不闋卒臧榮緒晉書長孫畧字文度以富春車道少動經涇水父難於風波每行乘藍車畧常歩從遠者百里每渡浦則親入水扶持藍車又曰嵇紹事母至孝和色柔聲常若不足謹身節儉朝夕孜孜親執刀爼非無使役以他人不如已之至誠也又曰晉齊獻王司馬攸字大猷晉文少子居文帝喪哀毁過禮杖而後起左右以稻米乾飯雜理中丸進之攸泣而不受太后自往勉諭曰若萬一加以他疾將復如何宜遠慮深計不可專守一志常遣人逼進飲食司馬嵇喜又諫躬自進飲食攸不得已為之彊飯又曰王延九嵗喪父母卜氏遇之無道延事之夏則扇枕席冬則以身溫之盛寒體無全衣而親極滋味王隠晉書曰李𦙍字宣伯遼東人祖父敏漢末河内太守為賊所廹逐不知所終𦙍父信追索歴年無所見比居與父同年者亡因行喪制服燕國徐邈與之同州里勸令聘婦既生𦙍遂絶房室常如居喪禮不堪其憂數年而卒𦙍既幼孤母又改行有識之後降食哀慼亦以喪禮自居又以祖不知存亡設木主以事之由是以孝聞又曰郄詵對策上第拜朝議郎母憂去職母病苦無車及亡不欲車載柩家貧無以市買乃於所住堂北壁外假葬開户朝夕拜哭養雞種蒜竭其方術過三年得馬八疋輿棺至家負土成墳晉中興書曰呉隠之字處黙濮陽人遭母憂哀毁過禮時與太常韓康伯鄰居隠之每哭康伯母謂康伯曰汝若居銓衡之職當用此輩人及康伯為吏部尚書因進用之遂歴清顯又曰范宣八嵗後園挑菜誤傷指大啼問痛邪答曰非為痛身體髮膚不敢毁傷是以啼也又曰後蜀李雄太子班雄寢疾班書夜省侍衣不解帶雄自少攻戰大被傷痍至是多膿潰班為吮膿殊無難色班即雄之兄子也宋書曰孫法宗一名宗之呉興人也父隨孫恩入海澨被害屍骸不收母兄並餓死法宗年少流迸至十六方得還單身勤苦霜行草宿營辦棺槨造立冢墓葬送母兄儉而有禮以父屍不測入海㝷求聞世間論至親以血瀝骨當悉凝没乃操刀㳂海見枯骸則刻肉灌血如此十餘年臂脛無完皮血脉枯竭終不能逢縗絰終身常居墓所山禽野獸皆悉馴附每麕鹿觸網必解放之又孝義傳曰崔懐順清河東武城人也父耶利魯郡太守宋元嘉中為魏所獲懐順與妻房氏篤愛聞父見虜即日遣妻布衣蔬食如喪禮嵗時北向流涕耶利後仕魏書戒懐順不許如此懐順得書更號泣懐順從叔模為滎陽太守亦入魏模子雖居處改節不廢婚宦宋大明中懐順宗人冀州刺史元孫北使魏魏人問之曰崔耶利模並力屈來歸二家子姪出處不同義將安在元孫曰王尊叱馭王陽回車欲令忠孝並𢎞臣子兩遂泰始初淮北入魏懐順因此歸北至代都而耶利已卒懐順絶而復蘇載喪還青州徒跣冰雪天氣寒酷而手足不凍時人以為孝感又曰華寶晉陵無錫人也父豪晉義熙末戍長安年八嵗臨别謂寶曰須我還當為汝上頭長安䧟寶年十七不婚冠或問之者輒號慟彌日不忍答也又曰散騎常侍袁瑜薦㑹稽郭道事繼母至孝家貧産子爰不能養謂其妻曰傷慈以終孝吾無恨也遂瘞之又曰師覺授字覺授南陽湼陽人也與外兄宗少文並有素業以琴書自娯於路忽見一人持書一函題曰至孝師君苫前俄而不見捨車奔歸聞家哭聲一呌而絶良久乃蘇又曰謝㬭字宣鏡㓜有殊行年數嵗所生母郭氏久嬰痼疾㬭晨昏溫凊嘗藥捧膳不闕一時勤容戚顔未嘗暫改恐僕役營疾懈倦躬自執勞母為病畏驚而微賤過甚一家尊卑感㬭至性皆納屨而行屏氣而語如此十年餘又曰蔡曇智鄉里號蔡曾子廬江何伯璵兄弟鄉里號為何展禽並為高士沈顗所稱常云聞蔡曇智之風怯夫勇鄙夫有立志聞何伯璵之風偽夫正薄夫厚伯璵與弟㓜璵俱厲節操養兄孤子及長為婚推家業盡與之安貧枯槁誨人不倦郡守下車無不脩謁又曰余齊人晉陵人也少有孝行為邑書吏大明二年父殖在家病亡信未至齊人謂人曰比者肉痛心煩有如割截居常皇皇體必有異故信㝷至以父病報之四百餘里一日而至至門方知父死號踊慟絶良久乃蘇父所遺言母曰汝父臨終恨不見汝齊人即曰相見何難於是號呌殯所須臾便絶州縣上言有司奏改其里為孝義里蠲租布賜其榖百斛又曰彭城劉悛司空勔音免之長子年十三身長七尺三寸以孝悌稱勔見害於朱雀街悛兄弟生平不行此路喪骨立杖而後起悛為黄門郎稍遷右衛尉明帝山陵不獲已從朱雀街過感慟而卒齊書曰王文殊字令章呉興故鄣人父没虜文殊思慕泣血蔬食山谷三十餘年太守謝瀹抜為功曹不就永明十一年太守孔琇之表曰文殊性挺五常心符三教以父没獯庭抱終身之痛專席恒居銜罔極之䘏服紵縞以經年餌蔬菽以俟命婚義滅於天情官序空於素抱儻降甄異之恩牓其閭里鬱林詔牓門改所居為孝行里蕭子顯齊書曰劉瓛胡琯切有至性祖母病疽經年瓛手持膏藥漬指爛母孔氏甚嚴明謂親戚曰阿稱便是今世曾子阿稱瓛小名也又曰宗頥字文徳南陽人也世居南陽父在家病亡頥忽思戀涕泣因假還中路果得父凶問頥便徒跣號咷出陶後渚遇商人附載西上水漿不入口數日常遇病與母隔壁忍病不言齧被至碎恐母哀已吏部庾杲之嘗往候之設食枯魚菜葅庾云我不能食此母聞之自出常膳魚羮數種杲之曰卿過於茅季偉我非郭林宗又曰傅琰字季珪北地靈州人也美姿儀除尚書左侍郎遷尚書右丞遂遭母喪居南岸隣家失火延燒琰屋抱柩不動隣人競來赴救乃得俱全琰股髀之間已被煙熖服闋除江夏王録事梁書曰沈崇傃字思整呉興武康人也父懐明宋兖州刺史崇傃六嵗丁父憂哭踊過禮及長事所生母至孝家貧常傭書以養天監二年太守柳惲辟為主簿崇傃從惲到郡還迎其母母卒崇傃以不及侍疾將欲致死水漿不入口畫夜號哭旬日殆將絶氣兄弟謂曰殯葬未申遽自毁滅非全孝之道也崇傃之瘞所不避雨雪倚墳哀痛每夜常有猛獸來望之有聲狀如歎息者家貧無以遷窆乃行乞經年始獲葬焉既而廬于墓側自以初行喪禮不備復以葬後更治服三年久食麥屑不噉鹽酢坐卧於單薦因虛腫不能起郡縣舉其至孝梁武帝聞即遣中書舍人慰勉之乃詔令釋服擢補太子洗馬旌其門閭敦兹風教崇傃奉詔釋服而涕泣如居喪固辭不受官苦自陳讓經年乃除永寜令自以禄不及養怛恨愈深哀思不自堪至縣卒又曰荀匠字文師潁隂人晉太保朂九世孫也祖瓊年十五復父仇於城都市以孝聞宋元嘉末渡淮赴武陵王義為元凶追兵所殺贈員外散騎侍郎父法超齊中興末為安復令卒於官匠號痛氣絶身體皆冷至夜乃蘇既而奔喪梁天監元年其兄斐為鬱林太守征俚賊為流矢所中死於陣喪還匠迎於豫章望舟投水傍舟赴救僅而得全及至家貧不能葬居父憂幷兄服歴四年不出廬户自括髪不復櫛沐髪皆秃落哭無時聲盡則繼之以泣目皆爛形體枯悴皮骨裁連雖家人不復識郡縣以言武帝詔遣中書舍人為其除服擢為豫章王國左常侍匠雖即官而毁悴逾甚外祖孫謙誡之曰主上以孝治天下汝過古人故擢汝為此職非惟君父之命難拒故亦揚名後世所顯豈獨汝一身匠乃拜竟以毁卒太平御覽卷四百一十二
