body:
  text: 太平御覧卷八百八十九宋李昉等撰獸部一叙獸猛獸獅子麒麟叙獸國語曰獸三為羣爾雅曰四足而毛謂之獸説文曰獸守備者也獸足謂之畨毳獸細毛也翰獸毫也荐獸所食草也周禮天官上曰獸人掌罟田獸辨其名物冬獻狼夏獻麋春秋獻獸物時田則守罟及弊田令禽注於虞中凡祭祀䘮紀賔客共其死獸生獸凡獸入于腊人皮毛筋角入于玉府凡田獸者掌其政令又天官下曰獸醫掌療獸病療獸瘍凡療獸病灌而行之以節之以動其氣觀其所發而養之凡療獸瘍灌而劀之以發其惡然後藥之養之食之獸之有病有瘍者使療之死則計其數以進退之又天官上曰内饔辨腥臊膻香之不可食者牛夜鳴則􅂒羊冷毛而毳羶犬赤股而躁臊鳥皫色而沙鳴狸豕盲眡而交􅊿腥馬黑脊而般臂螻又夏官上曰服不氏掌養猛獸而教擾之凡祭祀共猛獸又秋官下曰穴氏掌攻蟄獸各以其物火之以時獻其珍異皮革又囿人掌囿游之獸禁牧百獸祭祀䘮紀賔客共其生獸死獸之物又司馬職曰中軍以鼙令鼓鼓人皆三鼔司馬振鐸車徒皆作遂鼓行徒衘枚而進大獸公之小禽私之又曰東北曰幽州畜宜四擾西北曰并州畜宜五擾孟子曰當堯之時天下猶未平洪水橫流汎濫於天下草木暢茂禽獸繁殖五穀不登禽獸偪人獸蹄鳥跡之道交於中國列子曰東方有國人數解六畜語盖偏智之所得吕氏春秋曰堯以天下譲舜鯀為諸侯怒於堯曰得天之道者為帝得地之道者為三公我得地之道而不以我為三公乃使猛獸欲以為亂此獸之角能以為城舉其尾能以為旌召之不來彷徉於野以為患帝舜於是殛之於羽山又曰故享獸不足以盡獸嗜其脯則幾矣然則王者有嗜乎理義也又曰季秋之月菊有黃華豺祭獸戮禽淮南子曰猛獸不羣鷙鳥不攫又曰毛犢生應龍應龍生建馬建馬生麒麟麒麟生庶獸凡毛者生於庶獸食草者善走而愚食肉者勇敢而悍又曰鳥排虛而飛獸蹠實而走也抱朴子曰稱虞吏者虎也稱當路君者猪也稱令長者老狸稱丈人者兎稱東王父者麋也稱西王母者鹿也稱三公者馬也稱主人者羊也稱吏者麞也稱人君者猴也稱九卿者猿也稱將軍者老馬也稱姓字者犬也稱陽城公者狐也齊卞彬禽獸决録曰羊性淫而狠猪性卑而率狗性險而出皆指斥當時貴勢羊淫狠謂吕文顯猪卑率謂朱隆之狗險出謂吕文度也異苑曰永康舒壽夫與同里獵於逺山羣犬吠深茂處異而看之見樹下有一老公長可三尺頭鬚蒙然面縐齒落通身黃服裁能動揺因問為是何人而來在此直云我有三女姿容美兼多伎藝彈琴歌詩閑究五典夀夫等共縳束令出女公曰我女仍居深房洞庭之中非自往喚不可得也請解我䋲當呼女也獵人猶不置俄而變成一獸黃色四足其形似臯又復如狐頸長三尺頭生一角耳髙於頂面故類人夀夫等大懼狼狽放解倐忽失處又曰東陽西寺七佛寺屋太元中龕下有一物出頭如鹿有法獻道人廹而觀之於是吐沫噴洒氣若雲霧至元嘉十四年四月七日此頭復出尋覔其處亦無孔穴年年有聲殷若小雷猛獸十洲記曰漢武帝時月支國獻猛獸一頭形如犬子似狸而色黃帝怪其羸細秃悴問使者何謂猛獸使者對曰猛獸生崑崙食氣飲露帝使使令猛獸發聲忽呌如天雷霹靂之聲諸牛羊馬豕犬之屬皆驚駭以付上林苑徑上虎頭溺虎口去十許歩虎輒閉目明日失使者及猛獸所在博物志曰魏武伐冒頓經白狼山逢獅子使格之殺傷甚衆忽見一物從林中出如狸上帝車軛上獅子將至便跳上其頭獅子伏不敢起遂殺之得獅子一還來至洛陽三千里雞犬皆無鳴吠也後周書曰楊忠嘗從太祖狩於東門忠獨當一猛獸左挾其腰右㧞其舌太祖葬之北臺謂猛獸為掩于因以字之獅子説文曰虓獅子也爾雅曰狻猊如虦貓食虎豹穆天子傳曰狻猊日走五百里郭璞注曰獅子也食虎豹東觀漢記曰陽嘉中疏勒國獻獅子封牛獅子形似虎正黃有髯耏尾端茸毛大如斗司馬彪續漢書曰章和元年安息國遣使獻獅子符抜形似麟而無角魏略曰大秦國無盗賊但有獅子為害行道不羣則不得過也宋書曰宗慤討林邑王范陽邁傾國來拒以具装被象前後無際慤以為外國有獅子威服百獸乃製其形與象相禦象果驚奔衆因此潰亂遂尅林邑蕭子顯齊書曰王敬則晉陵南沙人也母為巫生則而胞衣紫色謂人曰此兒有鼓角相敬則年長兩腋下生乳各長數寸夢騎五色獅子後位至太尉尋陽公唐書曰隋大業中有波斯胡人牧駞於俱紛摩地那之山忽有獅子從地踴出人語謂之曰此山西今有三穴穴中大有兵器可取之穴中有刀及槊刄甚多石上有文教其反叛於是紏合亡命渡恒曷水劫商旅其衆漸盛遂割據波斯西境自立為王波斯拂菻各遣兵討之反為所敗其王姓大食名噉宻莫末膩自云有國已三十四年歴三王矣又曰中宗朝大石國使請獻獅子姚璹上疏諌曰獅子猛獸唯止食肉逺從碎葉以至神都肉既難得極為勞費陛下以百姓為心慮一物有失鷹犬不蓄漁獵摠停不殺以闡大慈好生以敷至徳凡在翔飛蠢動莫不感荷仁恩豈容自薄菲於身而厚資給於獸求之至理必不然矣疏奏遽停此使十洲記曰聚窟州在西海中申未地靣各方三千里北接崑崙山二十六里有獅子辟邪鑿齒天鹿長牙銅頭鐵額之獸宋炳獅子擊象圖序曰梁伯玉説沙門釋僧吉云嘗從天竺欲向大秦其間忽聞數十里外哮吼之聲驚天怖地頃之但見百獸率走蹌地至絶而四巨象俄焉而至以鼻卷泥自厚塗數尺數噴鼻偶立俄有獅子三頭見於山下直摶四象崩血若濫巨泉樹草偃仆法顯記曰阿育王精舍後立石柱作獅子柱内西邊有佛像内外映徹浄若琉璃有外道論獅子與沙門争此住處時沙門理屈於是共誓此處若是沙門住處者當有靈驗作是言已柱頭獅子乃大鳴吼見證外道懼怖心服而還國史補曰開元末西域獻獅子至安西道中繫於驛樹近井獅子哮吼若不自安俄頃風雷大至有龍出井而去虞世南獅子賦曰有絶域之神獸因重譯而來擾其為狀也筋骨糺纒殊姿異制闊臆修尾勁毫柔毳鈎爪踞牙藏鋒畜鋭弭耳宛足伺間借勢暨乎奮鬛䑛脣倐來忽往瞋目電曜發聲雷響拉虎吞貔裂犀分象碎隨兕於齦齶屈巴蛇於指掌踐藉則林麓摧殘吼呼則江河振蕩服猜心與猛氣遂感徳以依仁麒麟説文曰麒麟仁獸也麋身牛尾一角春秋運斗樞曰機星得則麟生春秋保乾圖曰嵗星散為麟爾雅曰麟麕身牛尾一角禮記禮運曰天不愛其道地不愛其寳人不愛其情故麟在郊藪詩國風麟之趾振振公子吁嗟麟兮左傳曰魯哀公十四年春西狩於大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之家語曰叔孫氏之車士曰子鉏商採薪於大野獲麟折前左足載以歸叔孫以為不祥棄之于郭外使人告孔子曰有麕而角者何也孔子往而觀之曰麟也孰為來哉孰為來哉反袂拭面涕泗沾衿叔孫聞之然後取之子貢問曰夫子何泣矣孔子曰麟之至也為明王也出非其時而見害是以傷焉孔叢子曰叔孫氏車子鉏商獲麟以為不祥棄之冉有告夫子夫子將觀之泣曰予之於人猶麟之於獸麟出而死其道窮矣乃歌曰唐虞世兮麟鳯遊今非其時來何求麟兮麟兮我心憂因此幽憤作春秋焉孝經右契曰孔子夜夣豐沛邦有赤煙氣起顔回子夏侣往觀之驅車到楚西北范氏之廟見芻兒捶麟傷其前左足束薪而覆之孔子曰兒汝來姓為誰兒曰吾姓為赤松子孔子曰汝豈有所見乎曰吾所見一獸如麏羊頭頭上有角其末有肉方以是西走孔子發薪下麟視孔子而蒙其耳吐三卷書孔子精而讀之春秋演孔圖曰蒼之滅也麟不榮也麟木精也麒麟闘日無光尚書中候曰黃帝時麒麟在囿毛詩義疏曰麟馬足黃色圓蹄角有肉音中黃鍾王者至仁則出大戴禮曰毛蟲三百六十而麟為之長禮記曰麟鳯龜龍謂之四靈麟以為畜則獸不狘漢書曰終軍從上幸雍獲白麟一角五蹄又有木枝旁出輙復合上異之終軍對曰野獸并角明同本也衆枝内附示無外也若此之應殆將有解編髮削左袵襲冠帶要衣裳而蒙化者焉晉書曰王濬平呉被謗上表曰夫猛獸當塗麒麟恐懼老臣脆弱敢不悚慄何法盛晉中興徵祥説曰麟麞身牛尾狼頭一角黃色馬足也晉書載記曰石虎時郡國前後送蒼麟十六白鹿七季龍命司虞張昌往調之以駕芝盖列乎充庭之乗東觀漢記曰章帝時麟五十一見又曰吕光入姑臧時麟見金澤縣百獸從之光以為己瑞以孝武太元十四年僣即三河王位三國典畧曰徐陵東海剡人梁太子右衞率摛之子母嘗夣五色雲化為鳯集左肩上已而誕陵年數嵗家人携之以候寳誌摩其頂曰天上石麒麟也春秋感精符曰麟一角明海内共一王也王者不刳胎不破卵則出郊又曰王者徳化旁流四表則麒麟游其囿蔡邕月令章句曰凡麟生於火遊於土故修其母致其子五行之精也視明禮修則麟臻孫卿子曰古之王者好生惡殺故麒麟遊其郊野平子曰昔人不識麟問人答曰麟如麟問者惡之㑹見者曰麟麕身牛尾鹿蹄馬背問者霍然而解何法盛徵祥記曰麒麟者毛蟲之長也仁獸也牡曰麒牝曰麟牡鳴曰遊聖牝鳴曰歸昌夏鳴曰扶幼秋鳴曰養綏説苑曰麒麟麕身牛尾圓頂一角含仁懐義音中律吕行歩中規折旋中矩擇土而後踐位平然後處不羣居不旅行紛兮其有質文也幽間則循循如也西京雜記曰五柞宫前有青梧觀觀前有三梧桐樹樹下有石麒麟二枚刋其脇為文詞是秦始皇驪山墓上物也頭髙一丈三尺東邊者前左脚折折處赤如血父老謂其有神皆含血屬觔焉抱朴子曰麒麟壽千嵗論衡曰蝗虫飛至萬里麒麟須獻乃逹闕而蝗為災麟為瑞四足不能自致人兩足安能自逹是以吕望白首而逹也又曰儒者説麟為聖王來此言妄也章帝之時麒麟五十一至章帝豈聖人也楚辭曰使麒麟可得覊而繫兮又何以異乎犬羊班固兩都賦曰乃有九真之麟大宛之馬西凉武昭王麒麟頌曰一角圓蹄行中規矩游必擇地翔而後處不入䧟阱不罹網罟無徳而至為之折股太平御覧卷八百八十九
