  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_559-1a, image: WYG0898/WYG0898-0168c.png}
body:
  text: 太平御覽卷五百五十九宋李昉等撰禮儀部三十八塜墓三三秦記曰昭帝母鉤弋夫人居甘泉宫三年不返遂死即葬之以千人營葬故有千人葬名曰思合墓徐廣晉記曰闗中發漢杜二陵薄太后棺面如生吴録曰范慎字敬在武昌自造冢名長作長室時與賓客作樂鼓吹入中宴飲漢趙記曰上洛男子張盧死二十七日人有盗發其冢盧得蘇起具聞盗人姓名郡縣以盗元意姦宄盧復由之而生不能决豫州牧呼延謨以聞詔曰以其意惡要功善論笞三百不齒終身王智深宋記曰齊宣帝墳塋在武進縣有雲氣氤氲入天元嘉中望氣者稱此地有天子三齊畧記曰田開疆公孫接古冶子三壯士冢在齊城東南三百步蕩隂陽里中王子年拾遺記曰南尋之國其死者葬之中野百鳥銜土為墳羣獸為之窟穴不封不樹西京雜記曰青龍觀前冇三梧樹上下石麒麟二枚始皇葬墓中物又曰廣川王去疾好聚無賴少年遊獵無度國内冢藏一切發掘其竒異者魏襄王冢以文石為椁高八尺許廣狹容四十人以手捫之滑液如新中有石屏風宛然周正不覺棺柩輿器蹤跡但床上玉唾盂一枚金銀雜具皆如新王自取服之哀王冢以鐵灌其上穿鑿三日乃開黄氣如霧觸人鼻目痺辛不可入以兵守之經日乃歇初至一户無扇籥石床方四尺床上有石几左右各三石人立侍皆武冠帶劒復入一户石扇有闗籥叩見棺椁黒光照人刀斫不入燒鋸截之乃漆雜兕革為棺厚數寸累積寸餘重刀不能開乃止復入一户亦石扇闗籥得床方七尺屏風銅帳鈎或在床上或在下似是帳糜朽而銅鈎墮落床上石枕一枚床上塵埃朏朏音斐甚高似是衣服床左右婦女二十悉皆立侍或有執巾櫛鏡鑷之象或有執盥捧食之形無餘異物但見鐵鏡數百所魏王子且渠冢甚淺狹無柩但有石床廣六尺長一丈石屏風下悉是雲母床上兩屍一男一女年皆廿許東首祼形卧無衣裳肌膚顔色髮齒如生畏懼不敢侵擁門如故袁盎冢以瓦為棺槨器物都無唯銅鏡一枚晉靈公冢甚瑰壯四角皆以石為玃犬奉燭石人男女四十餘皆立侍棺器無復形兆尸猶不壊穴竅中皆有金玉其餘器物皆朽爛不别唯玉蟾蜍一枚大如拳觸空容五合水光潤如新王収以盛水幽公冢甚高壯羡門既開皆是惡石撥除深丈餘乃得雲母深尺所乃得百餘尸縱横相枕皆不朽唯有一男子餘悉女子或卧亦有豎者衣服形色不異生人欒書冢棺柩明器物朽爛無餘有白狐見人驚走左右逐㦸之不能得傷其左脚是夕王夢一丈夫鬚鬂盡白來謂王曰何故傷吾左脚乃以杖叩王左脚王覺左脚腫痛生瘡不差述征記曰梁孝王冢漸山徒户以石為藏行一里到藏中有數尺水大鯉魚人皆潔而進不齋輙有獸噬其足獸似豹也幽明録曰漢末大亂潁川有人將避地他郡有女年七八歲不能涉逺勢不兩全道邊有古冢穿敗以繩繫女下之經年餘還于冢尋覔欲更殯葬忽見女尚生父大驚問女得活意女云冢有一物於晨暮餘輙伸頭翕氣為試效之果覺不復飢渴家人於冢尋索此物乃是大龜又曰孫鍾吴郡富春人堅之祖也與母居至孝篤信種𤓰為業忽有三年少詣之乞𤓰鍾為設食臨去曰我司命也感君見知何以相報此山下善可作冢復言欲連世封侯而數世天子耶鍾跪曰數代天子故當所樂便為定墓曰君可出百步後顧見我去處便是墳所也山下行百步便顧見悉化白鶴也述異記曰南康郡鄧徳明常在豫章就雷次宗學雷家在東郊之外去史豫章墓半里許元嘉十四年徳明與諸生步月逍遥忽聞音樂諷誦之聲至夜白雷出曰此間去人尚逺必鬼神也乃相與尋之遙至史墓但聞墳下有管絃女歌講誦吟咏之聲咸嘆異焉酈善長水經注曰智水東逕七女冢冢夾水羅布如七星高十餘丈周迴數畆元嘉六年大水破墳崩出銅不可稱記北有七女池池東有明月池狀如偃月皆相通注謂之張良渠葢良所開也又曰粉水有文將軍冢前有石虎石柱甚脩麗閭丘羨為南陽葬婦墓側將半平其域夕夢文諌止之而羨不從後羨乃為人所害又曰淄水出泰山萊蕪縣原山東過利縣東水西有桓公冢其東有女水或云桓公女冢在其上故以名水甚有神焉化隆則水生政薄則津竭又曰潜水縣有車騎將軍馮緄音髠桂陽太守季温冢二子之靈常以日還鄉潜水暴長郡縣吏莫不水上祭之搜神記曰宋大夫韓馮取妻而美康王奪之而馮怨王囚之論為城旦妻遺馮書謬其辭曰其雨淫淫河大水深日出當心王以問蘇賀對曰其雨淫淫言愁且思也河大水深不得往來也日出當心有死志也俄而馮自殺妻乃隂腐其衣王與之登臺遂自投臺下左右攬之衣不中手遺書于地曰願以尸骨賜馮而合葬王怒不聴使人埋之冢相望也王曰爾夫婦相愛不可合葬能使冢合則不禁也一宿有文梓木生于二冢之端旬日其大合抱屈體以相就根交于下又有鴛鴦雌雄各一恒栖樹上晨夕交頸悲鳴哀聲感人宋人哀之遂號其木曰相思樹又曰漢馮貴人死將百歲盗賊發冢貴人顔色如故但微冷羣盗共姦之妬忌争鬬然後事覺續捜神記曰王伯陽家東有一冢傳云魯肅墓伯陽婦喪平其墳以葬後數年伯陽白日在㕔事忽見一貴人乗平肩輿將從數百人馬皆浴鐵徑來坐謂伯陽曰吾是魯子敬安冢在此二百許年君何敢壊吾冢因顧左右牽伯陽下床以刀環築之數處而去登時絶良乆乃蘇築破處皆發疽潰尋便死又曰乗儉者東莞音管人病亡葬本縣界後十年忽與其縣令夢云故民承儉人今見刼明府急見救令便勅内外裝束作百人仗便令馳馬往冢上日已向出天忽大霧對面不相見但聞冢中㕳㕳破棺聲有二人墳上望霧冥不見人百人同聲大呌收得冢中三人墳上二人得逃走其夜令又夢云二人雖得走民已誌之一人面上有青誌如藿葉一人㫁其兩齒折明府但案此尋覔也追捕並擒獲異苑曰蒼梧王士燮漢末死於交趾遂葬南境而墓常蒙霧靈異不恒屢經離亂不復發掘晉興寧中太原温放之為刺史躬乗騎往開之還即墜馬而卒又曰潁川諸葛閭字道明墓在楊州莊將山之西毎至隂雨冢中輙有絃管之聲又曰魏武北征蹹頓升嶺眺矚見一崗不生百草王粲曰必是古塚此人在世服生礬石而死而石生熱蒸出外致卉木焦滅命即鑿之果得大墓有礬石滿塋志怪集曰陶偘微時遭大喪家貧親自營塼有班特牛専以載致忽然失去便自尋覔道中逢一老公便舉手指云向于崗上見一牛眠山洿中必是君牛眠處便好作墓安墳則致極貴小下當位極人臣世為方嶽又指一山云此好但不如前亦當世有刺史言訖便不復見太尉之葬如其言侃指别山與周訪家則并世刺史矣潘岳闗中記曰秦始皇陵上驪山之北高數十丈周迴六七里今在隂盤界此陵雖高大不足以銷六十萬人積年之功也其用功力或隠之不見隠而不見者驪山泉本北流者皆陂障使西流又此無大石運取渭北故其歌曰運石甘泉口渭水為不流千人一唱萬人相鈎又曰漢諸陵皆高十二丈方百十步唯茂陵高十四丈方百四十步徙民置二縣者凡七陵長陵茂陵各萬户其餘五陵皆各五千户縣屬太常不領郡也守衞掃除凡五千户陵令一人食官令一人寢廟令一人園長一人園門史令三十二人侯四人元帝時三輔七十萬户始不復徙民陪陵渭陵延陵義陵皆不立縣也雷次宗豫章記曰郡東南二十里有一大冢號丹陽郭長老云是郡人丹陽太守聶友冢也外形甚高大内一大冢居中兩邊各有四小冢横首大冢外作徼道周匝皆通冢裏高二丈餘小者半之徼道又半之此墓相通一埏似是殉葬者不聞聶友奢僣以人從死也且今新淦音紺縣南十里見聶友墓荆州圖記曰酈縣北三十里有一墓甚崇偉前有石樓一丈五尺作石鳯將九子相傳云是姚家墓不詳其人又曰江陵縣東南七十里有楚莊王墓高四丈餘王粲登樓賦所謂西接昭丘是也盛𢎞之荆州記曰霄城東南有單龍村村外有單龍冢甚高大舊傳單龍能仰觀俯察少公之儔也數稱劉氏當王聖公應其符聖公潜詣之因此起兵後稱號於宛而龍卒故厚其葬又曰鄭鄉即鄭城地也崗南有劉長沙墓益州牧焉之父其南又有漢魏郡太守黄香冢鄧徳明南康記曰白水有高巖臨水頂有柴侯墓遙望松栢卒歲不彫說者云墓處極峻及累石為冢又别有金錢藏不可得開若欲上山必遇雷晦之異夜時見光色如雷之爛音艶所謂金精也又曰平固水口下數里有螺亭一少女曽江畔乗小船探螺亭沙邊共宿夜聞騷騷如軍馬行須臾見羣螺張口無數突來破舎噉此女子同侣悉走上岸至曉方還但見骨耳收埋林際報其家經四日間所埋處但見古冢高十餘丈穹隆頂可受二十人坐旁多螺新故相傳謂之螺亭又曰南野山獻山大塘下流三十里有漢太傅陳蕃冢昔值軍亂聞墓有寳三軍争掘忽有蛇圍繞墳前雷雨晦𠖇當時竟不得發鄭緝之東陽記曰孝子許孜父母葬虎山十里在山麓曲隧三里鹿甞食其松栽孜心念之即日鹿自死於所犯栽之下孜埋死鹿有小墳至今猶存又曰獨公山有古墓臨其溪塼文曰筮言吉龜言凶公三百年墮水中義熈中冢猶半存自後稍以崩盡會稽郡十城地志曰上虞縣東南古冢二十餘墳永嘉之初潮水壊其大冢所壊一冢塼題文曰居在本土厥姓黄卜葬于此大富强易卦吉龜卦凶四百年後墮江中當墮不墮值王顒縣令皮熈祖取數磚置縣樓下池中録之悵然而已太平御覽巻五百五十九
