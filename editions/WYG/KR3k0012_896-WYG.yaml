body:
  text: 太平御覽卷八百九十六宋李昉等撰獸部八馬四戰國䇿曰汗明見春申君曰夫驥之齒至矣服鹽車而上太行漉汁洒地白汗交流外坂遷延負棘不能上伯樂遭之下車攀而哭之解紵衣以幕之驥於是俯而噴仰而鳴聲達於天彼見伯樂之知己也漢書音義曰騕褭者神馬也赤喙黑身穆天子傳曰天子命駕八駿之乘右服華騮而左綠耳右驂赤驥而左白􅀈天子主車造父為御次車之乘右服渠黄而左踰輪右驂盜驪而左山子伯夭主車參伯為御奔戎為右天子乃遂東南翔行馳驅千里至于巨蒐巨蒐之人用其牛馬之湩以洗天子之足又曰祝沈牛馬豕羊于河宗命乎皇天天子受命南面再拜既致河典乃乗渠黄之乗為天子先以極西土又曰天子北征舎于珠澤以釣于㳅水因獻食馬四百羊二千又曰辛丑天子渴于沙衍求飲未至七萃之士曰髙奔戎刺其左驂之頸取其青血以飲天子又曰天子東遊于黄澤宿于曲洛使宫樂謡曰黄之池其馬歕沙皇人威儀黄之澤其馬歕玉皇人壽榖郭璞注穆天子傳曰竹書北唐之君來見以一驪馬是生緑耳魏時西卑獻千里馬白色而兩耳黄名之為黄耳山海經曰滑水中多水馬而文臂牛尾其音如呼又曰天帝之山有草焉状如葵臭如蘼蕪名曰杜蘅可以走馬又曰犬戎之國有文馬縞身朱鬛目若黄金名曰吉良乘之夀千嵗又曰夸父山北有林名桃林廣員三百里其中多馬又曰大樂之野夏后啓於此舞九代馬荘子曰馬蹄可以踐霜雪毛可以禦風寒齕草飲水翹足而陸此馬之真性也雖義􅄗路寢無所用之及至伯樂曰我善治馬燒之剔之刻之雒之連之以羈馽編之以皁棧馬之死者十二三矣飢之渴之馳之驟之整之齊之前有橛飾之患後有鞭䇿之威而馬之死者已過半矣又徐無鬼曰吾相馬直者中繩曲者中鈎方者中矩圓者中規是國馬也而未若天下馬也天下馬有成材若失若喪其一若是者超軼絶塵不知其所老子曰天下有道却走馬以糞天下無道戎馬生郊列子曰秦穆公謂伯樂曰子之年長矣子姓有可使求馬乎伯樂對曰良馬可以形容筋骨相也天下之馬者若滅若沒若亡若失臣之子皆下材也臣有所與九方臯其於馬非臣之比也穆公見之使行求馬三月而反報曰已得之在沙丘又曰馬免人於難者其死也塟之以帷牛有德於人者其死也塟之以大車薦牛馬有功猶不可忘又况人乎淮南萬畢術曰馬毛犬尾親友自絶取馬毛犬尾置朋友若夫婦衣中其人自相憎也又曰北塞上之人其馬亡入他界人皆弔之其父曰此何詎知不為福居數月其馬將一駿馬而歸人皆賀之其父曰此何詎知不為禍家富馬良其子好騎墮而折髀人皆弔之其父曰此何詎知不為福居一年匈奴大出丁壯者皆控弦而戰塞上之人死者十九此子獨以跛故子父相保地鏡圖曰銅器之精見為馬孔叢子曰衞之公子交饋四乘馬於子思曰不以此求歡於先生久屈鄙土為賓主之餼耳又曰公孫龍以白馬為非馬或曰此辨而毁大道子髙適趙謂龍曰願受業久而不敢前者以白馬為非馬耳誠能去之則為弟子龍曰若使去之無以教矣凉州記曰吕光麟嘉五年疎勒王獻火浣布善舞馬春秋後語曰田忌數與齊公子馳逐重射孫臏見其馬足不甚相逺有上中下輩於是臏謂田忌曰君第重射我能令君勝田忌然之與王及諸公子逐射千金臨質孫臏曰取君之下駟與彼上駟取君之上駟與彼中駟取君之中駟與彼下駟既馳三輩畢而田忌一不勝而再勝忌得千金於是田忌進孫臏威王王問兵法而師之韓子曰昔紂為甲百萬左飲馬於湛右飲馬於洹洹水竭湛水不流武王甲卒三千破而王之又曰延陵卓子乘蒼龍挑文之乘鈎飾在前錯綴在後馬欲進則鈎飾禁之退則綴錯貫之造父見而泣曰此猶民中立而不知所由也或云乘翟文之乘又曰桓公伐孤竹春徃冬還迷惑失道管仲曰老馬之智可用乃放老馬而隨之遂得道又曰如耳説衞嗣君嗣君悦之左右曰公何為不相也公曰夫馬似鹿者而千金有千金之馬無千金之鹿者何也馬為人用而鹿不為人用今如子雖辯之者亦不為寡人用吾是以不相也又曰伯樂教其憎者相千里馬教其愛者相駑馬千里之馬時一其利緩駑馬日售其利急也孫卿子曰伯樂不可欺以馬君子不可欺以人又曰驊騮騏驥纎離綠耳古之良馬也又曰君子善其言而類焉者應矣故馬鳴而馬應之非知也其勢然也又曰驥一日而千里駑馬十駕則亦及之矣伯樂相馬經曰馬生下墮地無毛行千里尿一脚行五百里蘭筋豎者千里馬膝如團麯千里三軍莫逐但知所發不知所宿也又曰江淮津督徐成字子長兄弟蒙寵于府君治馬方以報千金不傳號淮津方尋陽丞陽朱君方最良豫州従事沛國蕭跣方最良也又曰馬相嵗上下齒二十四嵗黄三十三嵗齒白口中欲紅色如日月光者行千里汙溝欲􅀷脊欲如伏龜兩邊如迴毛曰滕蛇殺主口邊有迴毛曰衘禍妨主口中有黑者烏衘馬短夀又曰素下去飛䖟四寸行千里􅕁而不起骨勞起而不振皮勞振而不噴氣勞耳欲小而促也食有三芻飲有三時也白額入口名曰榆寫一名的盧奴乘客死主乘棄市迴毛在目下名曰承涙不利人也又曰馬頭為王欲得方目為丞相欲得明脊為將軍欲得强腹為城郭欲得張一曰脅為城郭四下為令欲得長一曰膝下為令眼欲得髙匡一曰欲其端正睛眼欲如懸鈴紫艷光眼下卧蚕懸鑿欲得成鼻孔欲得大鼻頭有王火字一曰鼻欲得攅筋鼻上如王火欲得明口中欲得赤膝骨圓而張耳欲相近而堅小而厚雍一寸三百里三寸千里伏龍骨欲得成頸欲得長雙扶欲得大而突蹄欲得厚腹下欲得平有八字馬頭欲得髙而成尾骨髙而埀也凡相馬之法先除三羸五駑乃相其餘大頭小頸一羸也弱脊大腹二羸也小脛大蹄三羸也其五駑者大頭緩耳一駑也長頸不折二駑也短上長下三駑也大胳短脇四駑也淺髖薄脾五駑也馬援銅馬相法曰水火欲分明水火在鼻兩孔間上唇欲急而方口中欲紅而有光此馬千里頷下欲深下唇欲緩牙欲去齒一寸則四百里牙劔鋒則千里目欲滿而澤腹欲充膁欲小肋欲長懸薄欲厚而緩懸薄股也腹下欲平滿汗溝欲深長而膝本欲起肘腋欲開膝欲方蹄欲厚三寸堅如石鬃欲戴中骨髙三寸鬃中骨也頰欲開而膺下欲廣一尺以上能久走鞅欲方頸前胷欲直而出脾骨前面鳬間欲開望視之如雙鳬楚辭曰却騏驥而不乘兮䇿駑駘而取路當世豈無騏驥兮誠莫之能善御見執轡者非其人兮故駒跳而逺去符瑞圖曰王者貴人而賤馬則白馬朱髦並集又云車馬有節則見騰黄者神馬也其色黄一名乘黄亦曰飛黄亦曰吉黄或曰翠黄一名紫黄其狀如狐背上有兩角出白民之國乘之夀三千嵗黄帝乘之孫氏瑞應圖曰玉馬者王者清明尊賢則至又曰乘黄王者輿服有度則出腰褭者神馬也與飛兔同以明君有德也又曰飛兔者日行三萬里禹治水土勤勞歴年救民之害天應其德則至駃蹄者后土之獸也自能言語王者仁孝於民則出禹治水有功而來又曰龍馬者神馬河水之精也髙八尺五寸長頸骼上有翼旁垂毛鳴聲九音有明王則見吕氏春秋曰秦穆公車敗失左驂自徃求馬見野人殺將食之繆公笑曰食駿馬肉而不飲酒余恐傷其性也遍飲之而去又曰伯樂學相馬所見無非馬者又曰古相馬者有寒風能相口齒麻朝能相頰女厲能相目管青能相唇吻陳悲能相股脚秦牙能相前賛君能相後並見馬之一徵也又曰今有千里之馬於此非得良工也猶若弗取良工相馬之工良工之與馬也相得然後成譬之若枹之與鼓夫士亦有千里髙節死義此士之千里也能使士行千里者其唯賢者乎又曰凡為善難任善易奚以知之今與驥俱走則人不勝驥矣居於車上而任驥則驥不勝人矣又曰良劔期乎斷不期乎莫邪莫邪良劔也取其能㫁無取於名也故曰不期莫邪良馬期乎千里不期乎驥驁驥千里馬名也王者乘之遊驁因曰驥驁也又曰宋人有取道者其馬不進剄而投之鸂水又復取道其馬不進又剄而投之鸂水如此者三雖造父之所以威馬不過此矣不得造父之道而徒得其威無益於御人主之不肖有似於此不得其道而徒多其威威愈多民愈不用又曰飢馬盈廐瞙然未見芻也飢狗盈宫瞙然未見骨也見骨與芻動不可禁動猶争也亂世之民瞙然未見賢者也見賢人則徃不可止又曰得十良馬不若得一伯樂得地千里不若得一聖人又曰小方大方之類也小馬大馬之類也小知非大知之類也又曰青龍之疋遺風之乗也髙誘曰皆馬名疾若遺風也非先為天子不可得而具具備具也燕丹子曰太子有千里馬荆軻謂太子曰千里馬肝美太子即進肝又曰丹質於秦秦王遇之無禮欲求歸秦王曰烏頭白馬生角乃許爾歸丹仰天而嘆烏即頭白馬即生角秦王乃放歸淮南子曰聖人之治猶造父之御也和輯乎御轡之際而緩急於唇吻之和正度乎胸臆之中而執節於掌握之間内得於中心而外合於馬志故能取道致逺而氣力有餘誠得其術也是故權勢者人主之車輿也大臣者人主之四馬也體離車輿之安而手失四馬之心而能無危者古今未之見也又曰天下有道飛黄服皁又曰王良造父之御也上車攝轡投足調均勞佚若一世皆以為工然而未甚貴也若夫鉗旦大丙之御也鉗旦大丙太乙之御除轡衘去韅鞅車莫動而自舉也馬莫使而自走也日行月動星燿而𤣥運電奔而鬼駭過歸鴈於碣石軼昆雞於姑餘姑餘在呉地悲思慮之察手爪之巧也嗜欲形於胷中精神踰於六馬以此弗御之御也又曰驊騮騄耳一日千里摶兔不如狼猰也又曰戎翟之馬皆可以馳驅或近或逺唯造父能盡其力三苗之民皆可使忠信或賢或不肖唯唐虞能齊其美又曰馬齒非牛蹄檀根非猗枝故見其一本而萬物知知别也又曰季秋之日乃教於田獵以習五戎命僕及七騶咸駕載旗又曰易調良馬使人欲馳飲酒而樂使人欲歌是而行之因謂之斷非而行之必謂之亂斷猶治也又曰夫馬之為草駒之時跳躍揚蹄翹尾而走人不能制齕咋足以噆肌碎骨蹶蹄足以破盧陷匈􅏐穿也及至圉人擾之良御教之掩以衡軛連以轡衘則雖歴險超塹弗敢辭也故其馬之不可化其可駕御教之所為也馬聾蟲聾蟲無知也而可以通氣志猶待教而成又况人乎又曰夫待腰䮍飛兔而駕之則世莫乘車矣腰䮍飛兔皆行萬里其行若飛因曰飛兔也待西施毛嬙而為妃則終身不家矣又曰日之行也不見其移也騏驥背日而馳草木為靡懸峰未簿而日在其前矣懸峰馬蹄下雞舌也太平御覽卷八百九十六
