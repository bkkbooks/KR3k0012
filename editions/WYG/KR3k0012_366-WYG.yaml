body:
  text: 太平御覽卷三百六十六宋李昉等撰人事部七耳目耳釋名曰耳耏也耳有一體属着兩邉耏耏然也禮曰是故先王之孝也色不忘乎目聲不絶乎耳傳富辰諌曰耳不聼五聲之和為聾又曰晋襄公卒靈公少晋人以難故欲立長君使先蔑士㑹如秦逆公子雍秦康公送雍公子于晋曰文公之入也無衛故有吕郤之難乃多與之徒穆嬴日抱太子以啼于朝曰先君何罪其嗣亦何罪舍適嗣不立而外求君将焉寘此出朝則抱以適趙氏頓首於宣子曰先君奉此子也以属諸子曰此子也才吾受子之賜不才吾唯子之怨今君雖終言猶在耳而棄之若何宣子與諸大夫皆患穆嬴且畏偪畏國人以大義來偪也乃背先蔑而立靈公以禦秦師又曰攝叔曰吾聞致師者右入壘折馘執俘而還皆行其所聞而復又曰林雍羞為顔鳴右下羞為右改下車戰也苑何忌取其耳不欲殺雍但截其耳以辱之詩曰君子無易由言耳属于垣又曰匪手攜之言視之事匪面命之言提其耳我非但以手攜摯之親視以其事之是非我非但語之親提撕其耳此言教道易曰何校㓕耳聪不明也又曰巽而耳目聰明論語曰六十而耳順穀梁傳曰梁自亡湎於酒滛於色心昏耳塞上無正長之治大臣背叛春秋元命苞曰耳者心之侯尚書大傳曰孔子曰自吾得由也惡言不至於耳史記曰吕太后遂㫁戚夫人手足去眼煇耳又淮隂傳曰韓信使人言於漢王曰齊反覆之國南邉楚不為假王鎮之其勢不定漢王大怒張良陳平躡漢王足因附耳寕能禁信之王乎戰國䇿曰蘇秦説李兊明日復來舍人謂兑曰臣竊觀蘇公説也其辨過於君君能聼乎兊曰不能曰君即不能願君堅塞而耳無聼其談明日復見終日談而去秦謂舍人曰昨日我談薄而君不動今精而君不動何也舍人曰我為塞兩耳無聼談也漢書曰楊惲報孫㑹宗書曰家本秦也能為秦聲婦趙女也雅善鼓瑟奴婢歌者數人酒后耳熱仰天拊缶而呼烏烏英雄記曰曹公擒吕布布顧謂先主曰𤣥徳卿為座上客我為降虜䋲縛何急獨不可一言耶操曰縛虎不得不急乃命緩布縛劉曰不可公不見布事丁建陽董太師乎操頷之布目先主曰大耳兒最叵信魏書曰荀攸年七八嵗父衢曽醉誤傷攸耳而攸出入逰戱常避䕶不欲令衢見衢後聞之乃驚其宿智如此呉録曰雲長走孫權使虞翻筮之曰必當㫁頭傷其耳果如翻言蜀志曰先主長七尺五寸垂臂下膝顧自見其耳晋書曰王導多疾每自憂陳訓曰耳竪必夀亦大貴又曰殷仲堪父患耳聞床下蟻動謂是牛鬭王隠晋書曰張軌為凉州刺史燉煌曹袪上言軌老病更請刺史軌治中率數十人皆割耳於盤流血訴枉得停蜀書曰武皇帝李雄美容貌相工相之曰此君口如方噐耳如相望位必過三公不疑也唐書曰汴州節度李忠臣嘗因奏對徳宗謂之曰卿耳甚大貴人也忠臣對曰臣聞驢耳甚大龍耳極小臣耳雖大乃驢耳也上悦之老子曰五音令人耳聾孟子曰伯夷耳不聼惡聲鶡冠子曰夫耳主聼兩頭塞之則上不聞雷霆淮南子曰禹耳三漏是謂大通興利除害决江疏河抱朴子曰老子耳長七寸又曰耳能聞雷霆而不識蟻虱之音吕氏春秋曰雷則掩耳電則掩目耳聞所惡不如無聞目見所惡不如無見又曰且天生人而使其耳可以聞不學其聞不若聾使其目可以見不學其見不若盲使其口可以言不學其言曲以爽使其心可以知不學其知暗以狂凡學非為能益也逹天性也説苑曰昔費仲惡來膠堇長鼻决耳從紂之心武王誅之愽物志曰南方落頭民其頭能飛以耳為翼瀨鄉記曰老子耳有三門王子年拾遺録曰沭胥國人左耳中出青龍右耳中出白虎龍虎初出之時如䋲縁頰手将靣而龍虎皆飛去地十餘丈而雲氣繞龍風氣吹虎俄而以手一揮龍虎皆還入耳髙士傳曰堯聘許由爲九州牧由聞之洗耳于河列仙傳曰務光夏時人耳長七寸陽都女耳細而長衆皆言此天人也又曰寗先生毛身廣耳阮丘耳長六七寸列士傳曰燕丹師田光往候荆軻值軻醉唾其耳中軻覺曰此出口入耳之言必大事也即往見光列女後傳曰劉仲敬妻者沛國桓林之姨也仲敬蚤亡桓乃引刀割耳宗婦問之桓曰吾自五代以來世知名男以忠孝顯女以貞順稱家以我年少必相嫁故預自裁割以信我心又曰曹文叔妻譙國夏侯寕之女文叔蚤亡妻㫁髪自誓其家欲嫁之又截兩耳司馬太傅美之乞為曹氏後又曰陽華穆妻者下邳劉方之女字桃樹生一男而穆早亡呉丁諿求之諿知名之士家将許焉桃樹乃操刀割耳其子又亡桃樹乃安身守正動不諐禮長沙耆舊傳曰太尉劉右少遇相師相師曰耳為天柱今君耳城郭必典家邦樊氏相法曰耳門不容麥嵗至百兼富目釋名曰目黙也謂黙而内識也眼限也童子限限而出也禮曰目者氣之清明者也又玉藻曰目容端又曽子曰十目所視十手所指其嚴乎又曰富辰曰目不别五色之章為昧傳曰宋華父督見孔父之妻于路目逆而送之曰美而艶又曰子玉使鬭勃請戰曰請與君之士戯君憑軾而觀之得臣與寓目焉又曰楚子将以商臣為太子訪諸令尹子上子上曰楚國之舉恒在少者且是人也蜂目而豺聲忍人也不可立也又曰秦伯伐晋取覊馬乃出戰交綏古名退軍為交綏秦晋志未敢堅戰兵未致争而兩軍退故曰交秦行人夜戒晋師曰兩軍之事皆未憗也明日請相見㬰駢曰使者目動而言肆懼我也将遁矣薄諸河必敗之又曰宋華元為植廵攻植将主也城者謳曰睅其目皤其腹弃甲而復于思于思弃甲復來睅出目皤大腹弃甲謂師也于思多鬚之貌又曰潞子嬰兒之夫人晋景公之娣也鄷舒為政而殺之又傷潞子之目又曰晋楚将戰晋侯筮之卜史曰吉卦遇復曰南國蹙射其元王中厥目及戰共王中目又曰叔孫豹㑹晋士匄于柯盟于督陽荀偃癉疽生瘍於頭濟河及著雍病目出卒而視不可唅目開口噤也宣子盥而撫之曰事呉敢不如事主猶視大夫稱主欒懷子曰其為未卒事於齊故也懷子欒盈也乃復撫之曰苟終所不嗣事于齊者有如河乃瞑受唅又曰宋公子地有白馬四公嬖向魋欲之向魋司馬桓魋卜也公取而朱其尾鬛以與之與向魋地怒使其徒奪之魋懼将走公閉門而泣之目盡腫又曰公侵齊門于陽州顔息射人中眉退曰我無勇吾志其目也詩曰巧笑倩兮美目盻兮素以為絢兮書曰正月元日舜格于文祖詢于四岳闢四門明四目逹四聰咨十有二牧曰食哉惟時易小畜曰輿説輻夫妻反目象曰夫妻反目不能正室也又説卦曰離為目春秋孔演圗曰蒼頡四目是謂並明春秋元命苞曰目肝之使又曰舜重瞳子是謂慈原上應攝提下應三元尚書大傳曰舜目四瞳子論語隠義曰衛蒯瞶亂子路興師往有孤黯者當師曰子欲入耶曰然黯從城上下麻䋲釣子路半城問曰為師耶為君耶曰在君為君在師為師黯因投之折其左股不死黯開城欲殺之子路目如明星之光曜黯不能前謂曰畏子之目願覆之子路以衣袂覆目黯遂殺之史記曰呉王賜子胥属鏤之劒以死子胥仰天歎曰嗟乎抉吾眼着吳東門上以觀越寇之入滅吳也又曰趙王與秦王㑹澠池秦王不肯擊缶相如曰五歩之内請得以頸血濺大王矣左右欲刃相如相如張目叱之左右皆靡秦王不懌為一擊缶又曰越王無疆與中國争强北伐齊齊威王使人説越王越王不納齊使者曰幸也越之不亡也吾不貴用智如其目之見毫毛而不自見睫也今王知晋之失計不知越之過是目論也又曰大梁人尉繚曰秦王為人蜂凖長目又曰漢王詣鴻門謝項羽羽欲殺漢王樊噲帶劒擁㦸楯入軍門披帷西向而立瞋目視羽鬢髪上指目眦盡裂又曰項王大呼馳下漢軍皆披靡時赤泉侯為騎将追項王項王瞋目而叱之人馬俱驚辟易數里楚漢春秋曰上過陳留酈生求見使者入通公方洗足問何如人曰状類大儒上曰吾方以天下為事未暇見大儒也使者出酈生瞋目案劒曰入言髙陽酒徒非儒者漢書曰東方朔上書曰臣朔目若懸珠齒如編貝東觀漢記曰杜根諌和熹鄧后以安帝宜親政事太后大怒囊盛撲殺之根詐死三日目中生蛆魏志曰太祖與韓遂馬超等單馬㑹語左右皆不得從唯将許褚超負其力隂欲前突太祖素聞褚勇疑從騎是褚問公有虎侯者安在太祖顧指褚瞋目盻之超不敢動又曰張繡反襲太祖營典韋戰於門中韋乃雙挾兩賊擊殺之餘賊不敢入復前突殺數人瘡重瞋目大罵而死又曰夏侯惇從征吕布為流矢所中傷左目時夏侯淵與惇俱為将軍軍中號惇為盲夏侯晋書曰王衍嘗因宴集為族人所怒舉罍擲其面衍初無言引王導共載而去然心不能平在車中攬鏡自照謂爾看吾目光乃在牛背上矣王隠晋書曰甘卓為楊威将軍歴陽内史郡人陳訓私語人曰甘公頭係視仰目中有赤脉當危於兵勿與将可也果為王敦所害又曰王敦枉害刁協及敦病白日見協乗軺車從吏騶詣敦而仰頭瞋目鄧粲晋紀阮籍能為青白眼禮俗士輙以白眼對之稽喜康之兄聞籍不哭見白眼喜不懌而退蕭子顯齊書曰褚淵有器度不妄舉動宅常失火煙燄甚逼左右驚擾淵神氣怡然索輿來徐去輕薄子頗以名節譏之以淵眼多白睛謂之白虹貫日也崔鴻十六國春秋前秦録曰符生驍果麤暴酗酒無賴祖洪甚惡之生無一目年七嵗洪戱之問侍者曰吾聞瞎兒一淚信乎侍者曰然生怒引佩刀自刺出血曰此亦一淚也洪大驚三國典畧曰齊韓鳯穆提婆髙阿那肱共處衡軸號曰三貴瞋目張拳有噉人勢又曰和士開常言曰瑯琊王目光弈弈數歩射人向者暫對不覺汗出又曰周武帝還自東伐初遇疾口不能言臉垂覆目老子曰五色令人目盲韓非子曰目見有百歩之外而不能見其背荘子曰温伯雪子適齊舍於魯仲尼見之不言子路問焉仲尼曰若夫人者目擊而道存也又曰孔子見老􅆅而語仁義老􅆅曰夫播糠眯目則天地四方易位矣夫仁義翻然乃憒吾心亂莫大焉孟子曰伯夷目不視惡色又曰存乎人者莫良於眸子眸子不能掩其惡胷中正則眸子瞭焉胷中不正則眸子眊焉范子曰掩目别黒白雖一時中猶不知天道也慎子曰離朱之明察毫末於百歩之外尺水不能見淺深非目不足其勢難覩也尸子曰使目在足下則不可以視又曰舜兩瞳子是謂重明孫卿子曰厭目而視者視一以為兩耳燕丹子曰樊於期聞荆軻之言於是自剄頭墮背後兩目不瞑韓子曰田駟欺鄒君将殺之田駟恐告惠子見鄒君曰有人見君則䁋大叶切閉目也其一目奚如君曰我必殺之惠子曰瞽䁋兩目君奚弗殺駟東欺齊侯南欺荆王駟之於人瞽也君奚惡乃弗殺又曰古人目短於自見故以鑑觀面又曰刻削之道鼻莫如大目莫如小鼻如可小小不可大目小可大大不可小舉事亦然又曰楚荘王子曰王之伐越何也王曰政亂兵弱荘子曰臣患知之如目也能見百歩之外而不能自見其睫王之弱亂非越王之下也而欲伐此知之如目也淮南子曰夫目察秋毫之末而耳不聞雷霆之音耳調玉石之聲而目不見泰山之髙何則不小有所志而大有所忘也孔叢子曰夫子適周見萇宏言終而退萇宏語劉文公曰吾觀仲尼有聖人之表其状河目而隆顙是黄帝之形貌也郭子曰劉尹道桓温鬚如反蝟毛眼如紫石稜自是孫仲謀一流人也抱朴子曰眼能察天衢而不能周項領之間蒋子語曰兩目不相為視昔呉有二人共評主者一人曰好一人曰醜乆之不决二人各曰爾可來入吾目中則好醜分矣士有定形二人察之有得失非苟相反眼睛異耳袁凖正書曰目以見小為明耳以聼大為聰顧子義訓曰假天下之目以視則四海毫末可見山海經曰一臂國為人一目中其面而居太公金匱曰一目視則不明一耳聼則不聪吕氏春秋曰孟賁過于先其伍船人怒以檝唬其頭中河孟賁瞋目視船人髪植目烈鬚指指直舟人盡惕駭播入於河使船人知孟賁不敢直視渉無先者又辱之乎不知故也又曰管子縛束於魯鮑叔曰君欲覇王則臣不若管夷吾桓公曰夷吾寡人之賊也射我者也不可鮑叔曰夷吾為其君射人若得之則彼亦将為君射人君不聼鮑叔固讓果聼之於是使告魯曰管仲寡人讎也願得而親加手焉魯許諾乃使吏鞟其拳膠其目以革裏其手也盛之以鴟夷置之車中至齊境桓公使人以朝車迎之又曰使其目可以見不學其見不若盲春秋後語曰平原君對趙王曰沔池之㑹臣察武安君之為人也小頭而鋭瞳子白黒分明小頭而鋭㫁敢行也瞳子白黒分明視事明也列仙傳曰秦召魏公子無忌不行使朱亥奉璧一雙秦王大怒将朱亥着虎圈中亥瞋目視虎皆血出濺虎虎終不敢視鄭元别傳曰元秀眉明目董卓别傳曰卓㑹公卿召諸降賊敗行責降者曰何不鑿眼應聲眼皆落地趙至自叙曰嵇康謂至曰卿頭小鋭瞳子白黒分明覘占停諦有白起風列仙傳曰偓佺魏山人採藥好食松實而目更方又曰赤斧戎人也為碧鷄祠主簿餌丹身及曈子皆赤神仙傳曰渉正巴東人入吳常閉目弟子隨之數十年莫有見開目者有一弟子固請之正謂開目音如霹靂光如電照弟子頓伏良乆乃起竹林七賢傳曰王戎眸子洞徹視日而眼照不虧世説曰顧長康云其哭桓宣武眼如懸河決溜又曰康僧淵目深而鼻髙王丞毎嘲之僧淵曰鼻者面之山目者面之淵山不髙則不靈淵不深則不清又曰裴令雋有姿容時人名之為玉人有疾至困武帝使王夷甫往視之王出語人曰眸子閃閃如巖下電精神挺動體中故如惡耳語林曰王右軍見杜宏治歎曰面如凝脂眼如㸃漆此乃神仙中人談藪曰王肅初歸國謂楊大眼曰在南聞君之名以為眼如車輪今視乃不異人大眼曰若旗鼓相望瞋眸奮發足使君亡魂䘮胆何必大如車輪又曰後魏昭成帝常擊賊流矢所中目賊破執射者至左右欲剥割之常曰彼各為主何罪乃釋之太平御覽卷三百六十六
