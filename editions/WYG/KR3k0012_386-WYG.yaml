body:
  text: 太平御覽卷三百八十六宋李昉等撰人事部二十七健羸健釋名曰健建也能有所見為也左傳莊公曰宋萬弑閔公于蒙澤曹師伐之南宫長萬奔陳以乗車輦其母一日而至乗車非兵車也駕人曰輦宋去陳二百六十里言萬之多力宋人請南宫長萬於陳陳人使婦人飲之酒而以犀革褁之比及宋手足皆見又曰初雩講于梁氏女公子觀之圉人犖自墻外與之戲子般怒使鞭之公曰不如殺之是不可鞭犖有力焉能投盖于稷門盖覆也稷門魯南城門走而自投扳其屋之桷反覆門上又宣公下曰晉魏顆見老人結草以抗杜囘杜囘秦之力人也又成公上曰髙固入晉師磔石以投人禽之而乗其車繫桑木焉以狥齊壘又成公下曰晉楚交戰叔山冉摶人以投中車折軾晉師乃止又襄公二曰晋荀偃士匄請伐偪陽偪陽人啓門諸侯之士門焉見門開故攻之懸門發鄹人紇抉之以出門者紇鄹邑大夫仲尼父叔梁紇也狄虒彌建大車之輪而蒙之以甲以為櫓狄虒彌魯人䝉覆也櫓大盾也左執之右㧞㦸以成一隊孟獻子曰詩所謂有力如虎者也主人縣布堇父登之及堞而絶之墜則又懸之蘇而復上者三主人辭焉乃退又哀公下曰楚白公作亂刼恵王子西以袂掩面而死子期曰昔者吾以力事君不可以弗終抉豫章以殺人而後死以効其多力豫章大木史記曰秦王有力好戲事任鄙烏獲孟説皆至大官王與説舉龍文赤鼎絶臏而死又曰范睢説秦昭王曰烏獲任鄙之力成荆孟賁慶忌夏育之勇又曰張良常學淮陽東見滄海君得力士為鐵椎重百二十斤秦皇東遊良與客俱擊秦皇慱浪沙中悞中副車秦皇大怒大索天下求賊甚急張良乃更姓名亡匿於下邳漢書曰項羽在鴻門沛公與張良在坐樊噲聞事急乃持盾入初入營營衛止噲噲直撞入立帳下羽目之問為誰良曰沛公參乗樊噲也羽曰壯士賜之巵酒彘肩噲既飲酒㧞劒切肉食之羽曰能復飲乎曰臣死且不辭豈特巵酒也又曰甘延夀字君况北地郁郅人少以良家子善騎射為羽林投石㧞距絶於等倫常超踰羽林亭樓由是遷為郎又曰淮南王長力能扛鼎廣陵王肯空手摶熊羆又曰上官桀從武帝上甘泉天大風車不得行解盖授桀桀奉盖雖風常屬車兩下盖御上竒其才力遷未央廐令又曰彭城王翌身長七尺七寸驍幹過人能手舉殿梁超過平陽楚漢春秋曰項梁隂養士最髙者多力㧞樹以擊地東觀漢記曰盖延字巨卿身長八尺彎弓三百斤以氣勢聞又曰隂興字君陵為期門僕射從上出入常操小盖疾風暴雨屏翳左右泥塗隘狭自投車下脱袴解履渉淖至膝又曰祭彤字次孫力貫弓三百斤入為大僕從至魯帝指子路室曰此太僕室也范曄後漢書曰虞延字子太陳留人延生時有物如疋練直昇天長八尺六寸力能扛鼎又曰董卓膂力過人雙帶兩鞬左右馳射為羗胡所畏魏志曰許禇字仲康長八尺餘大十圍容貌䧺毅勇力絶人漢末聚宗族䜿壁以禦寇賊賊攻壁禇令男女聚石如盖者禇飛石擲之所值皆碎以牛與賊易食牛奔還禇一手逆曳牛尾行百歩賊遂不敢取牛禇後事太祖以力如虎而癡號曰癡虎又曰典韋陳留人形貌魁梧膂力過人又曰吕布字奉先五原人也以驍武給并州刺史丁原為騎都尉便弓馬膂力過人號為飛將英雄記曰袁紹父成字文開名壯健貴戚權豪自大將軍梁兾以下皆與交結恩好言無不從故京師諺曰事不諧詣文開江表傳曰太祖與馬超單馬㑹語超負其多力常置六斛米囊東西走馬輙掣米囊以量太祖輕重許禇瞋目瞪盼超曰聞君有健將虎侯那在太祖指禇超乃止太祖尋知之歎息良久曰㡬為狡虜所欺王隠晉書曰吳彦字士則吳郡人有文武材幹長八尺餘膂力絶人如虎晉中興書曰庾闡父東以勇力聞世祖時西域遣一使胡趫䟁音巢勇果自謂無敵晉人不敢與校世祖募求勇敢之士惟東應募遂暴殺胡勇聞殊俗晋令曰選三部司馬皆能力舉千二百斤以上前驅司馬取使大㦸由基司馬取能挽一石七斗以上弓沈約宋書曰丁旿驍勇有氣力時人為之語曰勿㧞扈付丁旿蕭子顯齊書曰張敬兒為持節督雍梁二州刺史邢旰泊沔口敬兒舴艋過江詣晋熈王奕中江遇船覆左右丁壯者各走餘二小吏没䑳下呼呌官敬兒兩掖挟之隨船覆仰常得在水上如此翻覆行數十里方得迎接又曰東昏侯有膂力能擔白虎幢自製雜色錦伎衣綴以金花玉鏡衆寳逞諸意態崔鴻十六國春秋秦録曰姚興將軍王奚仲驍悍有膂力去其弓矟持短兵出堡與赫連勃勃戰衆多傷勃勃乃覊縻圖之斷其水路堡民執奚仲岀降勃勃謂奚曰卿忠臣也朕方與卿共平天下奚曰若蒙大恩速死為恵乃與所親數十人自刎而死又前趙録曰郭黙字元䧺河内懐人世以屠沽為業黙壯勇拳捷能貫甲跳三丈塹時人咸異之曰此兒必興郭氏河内陸允世之豪民望見以女妻之又曰陳安字虎侯家世農民安少慷慨曰大丈夫當乗軒杖節安能久執犁鋤乎遂東遊京師頗學書筭讀魏書見許禇而慕之乃自字虎侯遇晉室䘮亂遂憑結司馬賔驍壯果毅武幹過人多力善射持七尺刀貫甲奔及馳馬又前秦録曰張蚝本姓弓上黨法氏人也膂力過人能却曳牛走張平愛而子之媱於平妾知而責之蚝慙割隂以自誓遂為閹人堅甚寵之常侍左右終為名將所在有殊功稱鄧羗張蚝萬人敵也又後趙録曰張彌字巨秦汲郡人晉永嘉中與梁臣戍武徳城石勒攻之城潰彌隨例當坑大呼曰官當活健兒何以殺也曰有何健事而求活也彌曰武徳西城上大聲督時警備嚴設使賊不入正是張彌勒笑曰降兒能爾正是竒健乃赦之趙書曰汲桑清河貝邱人年二十餘力扛百鈞呼聞數里時人服之又曰劉靈陽平人年二十餘常期役於縣力制奔牛走及馳馬後魏書曰孝文帝有膂力年十餘嵗能以指彈碎羊髀骨又曰元淑字買仁有膂力彎弓三百斤善騎射又曰陳留王䖍姿氣魁傑膂力絶人毎以常矛短乃大作之猶患其輕後綴銅鈴於刃下其弓十倍如嘗人以其殊異於世䖍嘗臨陣以矟刺人遂貫胷髙舉以示於衆又嘗以一手頓矟於地騎馬偽退敵人争取引不能出䖍引弓射之一箭殺其二人揺矟之徒亡魄奔散徐乃命人取矟而反每從征伐乃率偏將先登陷陣勇冠當時又曰衛王儀長七尺五寸容貎甚偉美鬚髯有筭畧少能舞劒騎射膂力過人弓將十石陳留公䖍矟大見異時人云衛王弓桓王矟也又曰韓茂字元輿嘗從太宗征丁零時大風旌旗皆偃仆茂於馬上持幢初不傾倒太宗訝其膂力又曰伊馥代人也善射多力曳牛却行三國典畧曰周賀若敦嘗從太祖校獵於甘泉宫圍人不齊獸多越逸太祖大怒圍内唯有一鹿俄亦突圍而走敦躍馬馳之鹿走之東山敦弃馬歩逐山半掣而下太祖大悦周書曰韓䧺河東垣人也少敢勇魁岸膂力絶人工騎射有將帥才畧又曰竇熾字光成性寛眀有偉畧美鬢鬚身長八尺二寸善騎射膂力過人隋書曰魚俱羅馮翊下邽人也身長八尺膂力䧺壯言聞數百歩墨子曰紂有勇力之人生捕兕虎指畫殺人晏子曰昔夏之衰也有推侈大戲殷之衰也有費仲惡来足走千里手制兕虎子思子曰中行穆伯手捕虎列子曰公儀伯以力聞諸侯周宣王備禮聘之公儀伯至觀形懦夫也宣王心惑曰汝之力何以對曰臣之力能折春螽之股勝秋蟬之翼王作色曰吾之力者能分犀兕之革曳九牛之尾猶憾其弱公儀伯曰臣之師有南邱子者力無敵於天下而六親勿知未嘗用其力故也又曰魏黒邜殺邱邴章邴章之子来丹謀復仇丹氣猛形甚露計粒而食徙風而趨誓手劍以屠黒邜黒邜悍志絶衆力抗百夫筋骨皮肉非人類也延頸承刄披胷受矢鋩鍔摧屈而體無痕負其才力視来丹猶鶵鷇也孟子曰有馮婦善摶虎尹子曰中黄伯余左執太行之獶右摶雕虎唯象未與吾試願為牛與象鬭以自試又曰飛㢘惡来力角犀兕勇摶熊虎孔叢子曰孔鮒謂陳王曰梁人有陽由者其力扛鼎伎巧過人骨騰肉飛淮南子曰孔子勇復孟諸足蹀狡兎不以力聞六韜曰紂之卒握炭流湯者十八人崇侯虎等舉五百石重沙二十四人山海經曰中曲之山有櫰木食之多力穆天子傳曰有虎在於葭中七萃之士曰髙奔戎生捕以獻天子乃命為㭱而畜之東虞是曰虎牢吕氏春秋曰孔子之勁能招國門之闗招舉也淮南子同又曰趙氏中山之多力者曰吾兵衣鐵甲操鐵杖以戰所擊無不碎所衝無不陷以車投車以人投人春秋外傳曰少室為簡子右聞牛談有力請與之戲不勝致右焉簡子許之使少室為宰曰知賢而讓可以訓矣蜀王本紀曰秦王知蜀王好色乃獻女五人蜀王遣五丁迎女還梓潼見大虵入山穴一丁引其尾不出五丁共引蛇山乃崩説苑曰勇士孟賁水行不避蛟龍陸行不避虎狼發怒吐氣聲響動於天王充論衡曰語稱紂力能索鐵伸鈎撫梁易柱言其多力也風俗通曰潁川張欽孟孝吳楚反與亞夫常為前鋒陷陣潰圍傍人觀曰壯哉此君欽聞自矜遂死軍方言曰蹶膂力也東齊曰䠇宋魯曰膂膂力也郭璞曰律蹷多力貌通俗文曰强健曰馶音翅曹肇别𫝊曰肇之弟纂字徳思力舉千鈞眀帝寵之寢止恒同嘗與戲賭衣物有所獲輙入御帳取而出之石虎别傳曰虎字季龍勒從弟年十七八身長七尺五寸好弓馬射獵迅健有勇力同時等類多畏憚之異苑曰荆州上眀浦常有蛟殺人死者不脱嵗昇平中鄧遐為太守素勇健入水覔蛟曳出斬之至今不復有患博物志曰石蕃衛臣也有勇力背負千二百斤沙西京雜記曰江都王勁捷能超七尺屏風任豫益州記曰元帝為丞相有力士鍾齊本吳人百斛米分為三擔擔從渚入市五六里世説曰周處年少時㓙强使氣為鄉里所患義興溝水中有蛟山中有虎並皆犯暴百姓議與人為三横而處劇或説處使殺蛟虎遂入擊蛟或没或出行數十里經三日夜鄉里皆謂死更相慶處竟殺蛟而出始知為人情所患處遂自為改勵終為忠臣孝子楚辭曰魂兮来歸無上天一夫九首㧞木九千言有一丈夫身有九頭强梁多力從朝至暮能㧞木九千也張衡西京賦曰烏獲扛鼎都廬尋橦羸説文曰羸痿也釋名曰羸累也恒累於人也東觀漢記曰和熹太后遭新野君䘮悲傷思慕骨力不能自勝王隠晉書曰皇甫謐表從武帝借書上送一車書與謐謐羸病手不釋書歴觀今古無不皆綜又曰尚書令傅朂久羸瘦上令大官給乳酪吳越春秋曰子胥與要離見於吳王要離對曰臣吳國之東阡陌人細㣲無力迎風則偃背風則仆大王有命臣不敢盡死吕氏春秋曰吳王欲殺王子慶忌而莫之能殺吳王患之吳王之友曰要離謂王曰臣請殺之王曰汝㧞劒不能舉臂上車不能登足汝焉能殺之要離曰請必能吳王曰諾世説曰何晏字平叔體弱不勝重服又曰李欽是茂曽第六子清貞有逺操而少羸病不肯婚宦居住臨海常往兄侍中幕下既有髙名王丞相辟為公府掾欽得板命笑曰茂宏乃復以一爵假人又曰王相丞見衛洗馬居然有羸形雖復終日調暢猶若不堪羅綺太平御覽卷三百八十六
