body:
  text: 太平御覽卷一百九十四宋李昉等撰居處部二十二館驛傳舍亭館驛說文曰館客舍也從食官聲周禮曰五十里有市市有館館有積以待朝聘之客廣雅釋宫云館舍也桂苑云客舍也待賔之舎曰館開元文字云凡事之賔客館焉舎也館有積以待朝聘之官是也客舎逆旅名候館也公館者公宫與公所為也私館者自卿大夫以下之家禮記曰舊館人之䘮脫驂而賻左傳曰敢辱大館又左傳曰楚令尹子元欲蠱文夫人為館於其側而振萬焉萬儛又左傳曰改館晉侯饋七牢焉詩國風鄭緇衣曰適子之館兮還予授子之粲兮又大雅公劉于豳斯館周禮地官司徒下云國野之道十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有候館候館有積注云候館樓館可以觀望也又曰秋官司寇下云凡諸侯入王則逆勞于畿及郊勞視館注視館致館也又司儀云主君郊勞交擯三辭車送拜三揖受拜車送三辭再拜致館亦如之注云館舍也使大夫授之君又以禮親致之儀禮聘禮云卿致館注云致至也至此館主人以禮致之所以安之也又環人云掌送迎邦國之通賔客以路節達諸四方舍則授館又云至于國賔入館次于舍門注次待事于客儀禮公食大夫禮云有司卷三牲之爼歸于賔館注云牲之爼正饌尤尊盡以歸尊賔之至也又聘禮云厥明訝迎于館注云此訝下大夫以君命迎賔謂之訝迎亦皮弁也禮記曲禮上云問疾弗能遺不問其所欲見人弗能館不問其所舎又檀弓上云賔客至無所館夫子曰生於我乎舘死於我乎殯又曰子貢曰於門人之䘮未有所脱驂脫驂於舊館無乃已重乎又曽子問云卿大夫之家曰私館與公所為曰公館注云公館若今縣之官舍也左傳荘元年經曰夏單伯送王姬秋築王姬之館于外注云公在諒闇慮齊侯當親迎不忍便以禮接於廟又不敢逆王命故改築舎於外也又僖三十年傳云晉分曹衛之田公使臧文仲往宿於重館重館人曰晉新得諸侯必親其恭不速行将無及也又襄三十一年傳云子産相鄭伯如晉晉侯以我䘮故未之見也子産使壊其館之垣而納車馬士文伯讓之曰敝邑以政刑之不修寇盜充斥是以令吏人完客所館今吾子壊之其若異客何子産曰僑聞之文公之為盟主也宫室無觀臺榭以崇大諸侯之館今銅鞮之宫數里而諸侯舎於𨽻人門不容車不可踰越士文伯不能對晉侯見鄭伯有加禮厚其宴好而歸之乃築諸侯之館又昭十三年傳云宣子謂叔向曰子能歸季孫乎對曰不能鮒也能乃使叔魚見季孫曰鮒聞諸吏将為子除館於西河其若之何且泣又曰叔孫所館雖一日必葺其牆屋去之如始至漢書薛宣子恵為彭城令宣過之橋梁郵驛不修宣知其不能又郊祀志曰孫卿曰僊人可見上往常遽以故不能見今陛下可為館如緱氏城置脯棗神人可致且􅋖人好樓居於是上令長安作飛廉桂館甘泉作延夀館又曰鄭荘置驛以延賔客又曰公孫𢎞起徒歩數年至宰相封侯於是起客館開東閣以延賢人與叅謀議又元后傳曰王莽又知太后婦人厭居深宫中莽欲娛樂以示其權廼令太后四時車駕廵狩四郊存見孤寡婦人春幸繭館率皇后列侯夫人桑遵㶚水而祓除又外戚傳曰成帝許美人在上林涿沐館數召入飾室中元延二年懷子漢書叙傳曰述元紀云宫不新館陵不崇墓又揚雄傳長楊賦云張網置罟捕熊豪猪犺玃狐兎麋鹿載以檻車輪長楊射熊館义羽獵賦云於是禽彈中衰相與集於靖宜之館魏志曰文昭甄宣后明帝母也后已早廢父逸上蔡令早卒及明帝即位追封逸為上蔡侯諡敬侯適孫蒙襲爵蒙子暢嗣上為暢起大第車駕臨之故世説曰魏明帝為外祖母築館于甄氏自行視謂左右曰館當以何為名侍中繆襲對曰陛下聖恩齊于哲王罔極過于曽閔此館之興情鍾舅氏宜以渭陽為名魏書曰帝於後園為母起觀及宫名其里曰渭陽里晉書天文志云傳舎九星在莖善上近河賔客之館主胡人入中國客星守之備奸使亦曰胡兵起宋書文帝本紀云帝臨𤣥武館閱武又隠逸雷次宗傳云徴詣京邑為築室於鍾山西巖下謂之招隠館齊書褚伯玉傳云髙帝即位手詔吳會二郡以禮迎伯玉伯玉辭疾上不欲違其志勅於剡白石山立太平館以居之梁書髙祖紀云大統七年幸於宫城西立士林館延集學徒置集雅館以招逺學冲虛真經黄帝云黄帝於是放萬機舎寝去直侍徹鍾縣減厨膳退而閒居大庭之館齋心服形三月不親政事漢武帝故事云上自封禪後夣髙祖坐明堂羣臣亦夣想於是祀髙祖於明堂以配天還作髙陵館郡國志台州􅋖石山有館土人謂之黄公客堂堂兩邉有石歩廊觸石雲崇朝必有雨有四竿筯竹風吹自成音拂石皆浄即王方平逰處荆州圖記云襄陽縣南水行四十里陸道六十里有桃林館建康地記云顯仁館在江寧縣東南五里青溪中橋東湘宫巷下古髙麗使處西京雜記云公孫𢎞自以布衣為宰相乃開東閣營客館以招天下之士其外曰欽賢館以待大賢翹材館以待中材接士館以待國士又曰梁孝王逰於忘憂之館進諸逰士各使為賦隐設易遷館􅅤貞臺有女貞二人為主一曰張微子二曰傅禮和晉宫閣名云華林園有繁昌館建康館顯昌館延祚館夀安館千禄館班孟堅西都賦云於是天子乃登屬玉之館厯長楊之榭張平子西京賦曰顧往昔之遺館獲林光於秦餘又云郡國宫館百四十五石極盩厔并卷鄷鄠又云豫章珍館掲焉中峙班􅀈妤自傷賦曰痛陽禄與柘館皆宫名生二子處此二館皆失也乃褓襁而罹災豈妾人之殃咎兮将天命之不可求也張衡西京賦曰既新作於迎風增雨露與儲胥託髙基於山岡直摕霓以髙居薛綜注曰皆係館名張衡東京賦曰其西則有平樂都場示逺之館龍省盤蛇天馬半漢劉劭趙都賦曰置酒乎黄華之館左思魏都賦曰營宻館以周坊飭賔侣之所業潘尼東都館賦曰東館者盖東都侯之館也俄而遷居謂余曰吾将老焉故有終焉之心而無移易之意子且為我賦之傳舍釋名曰傳傳也人所止息而去後人復來轉相傳無常人也史記曰藺相如為趙王奉璧使秦秦王舍之廣成傳舍索隠曰廣成是傳舍之名傳載曰鄭審開元中為殿中侍御史充館驛使令每傳舍立十二辰候自審始也亭釋名曰亭停也人所停集也風俗通曰謹案春秋國語有寓望謂今亭也民所安定也亭有樓從髙省丁聲也漢家因秦大率十里一亭亭留也今語有亭留亭待盖行旅宿食之所館也亭亦平也民有訟爭更留辦處勿失其正也漢書項羽傳曰烏江亭長艤船待羽又曰武帝元封元年幸緱氏登太室上聞萬嵗聲者三故立萬嵗亭又韓信傳曰信從下鄉南昌亭長食張晏曰下鄉屬淮隂亭長妻苦之乃晨炊蓐食又曰李廣嘗從一騎至霸陵尉醉呵止廣宿亭下髙允塞上公亭詩序曰延和三年余赴京師發石門北行失道路寓宿代之快馬亭其俗云古塞上翁所遺之邑也公有良馬因以命之此其所遺也負長城而面南山臯潭帯其側湧波灌其前停騑䇿以流目抱遺風以依然仰徳音於在昔遂揮毫以寄言代人云塞上公姓李代之李氏並其後也潘岳傷弱子曰惟元康二年春三月壬寅弱子生夏五月余之長安壬寅舍于新安之千秋亭甲辰而弱子失越翌旦乙巳瘞于亭續漢書曰靈帝到下門亭使竇武持節以玉青盖迎入殿中又曰蔡邕避難在吳告人曰吾昔至㑹稽髙遷亭見竹椽從東間數第十六可以為籥取用果有異聲東觀漢記曰王郎起光武自薊東南馳晨夜至饒陽蕪蔞亭時天寒衆皆飢馮異上豆粥又曰趙孝父為田禾將軍孝嘗從長安來欲止亭亭長難之言有貴客過掃灑不欲穢汙地良久乃聽止吏因問曰田禾將軍子長安來何時發㡬日至孝曰尋到矣張璠漢記曰楚曄為天水太守之官與故太守䘮㑹于隴亭堂吏移䘮避曄曄讓于正堂闗西稱之謝承後漢書曰蒼梧廣信女子蘇娥行宿鵲巢亭為亭長龔夀所殺及婢致富取財物埋置樓下交阯刺史周敞行部宿亭覺夀奸罪奏之殺夀列異傳云鵠奔亭漢書典職曰洛陽二十四街街一亭十二城門門一亭魏畧曰從長安至大秦人民連屬十里一亭魏書曰元皇后以漢延嘉三年二月生齊郡白亭有黄氣滿室移日不散吳志曰孫權將如吳親乘馬射虎凌亭馬為虎所傷權投以雙㦸虎即廢又曰太史慈劉繇住涇縣立屯府大為山越所附孫䇿躬自攻討遂見囚執䇿即觧縛捉其手曰寧識神亭戰時耶卿爾時得我云何慈曰未可量也䇿大笑王隠晉書曰徐苗字叔胄髙宻淳于人也事曽祖至行感靈夜有神人告亭欲崩苗出亭崩得免又曰王羲之初度江㑹稽有佳山水名士多居之與孫綽許詢謝尚支遁等宴集於山隂之蘭亭崔鴻十六國春秋曰慕容垂請入鄴城拜廟苻登不許乃潜服而入亭吏禁之垂怒斬吏燒亭而去沈約宋書曰孔寗子與王華並有富貴之願自徐羡之等秉權日夜搆之於太祖曰寗子常東歸至金昌亭左右欲泊船寗子命去之曰此弑君亭不可泊也又曰徐湛之為廣陵郡守善為政威恵並行廣陵城舊有髙樓湛之更加修整更起風亭月觀吹臺琴室果竹繁茂成行帝王世紀曰桀敗於鳴條之野案孟子舜卒鳴條乃在東夷之地或言陳留平丘今有鳴條亭在安邑之西世説曰過江諸人每至暇日輙相要出新亭籍卉飲宴周顗在亭嘆曰風景不殊舉目有河山之異皆相視流淚惟丞相愀然變色曰當共戮力王室克復神州何至作楚囚相對泣耶夣書曰亭為積功民所成也夣築亭者功積成也夣亭壊敗恩澤傷也韋耀雲陽賦曰八鄉九市亭侯三六列樹表塗路有廬宿丹陽記曰京師三京新亭吳舊亭也故基淪廢丹陽尹司馬恢移創今地謝石創征虜亭三吳搢紳創治亭並太元中丹陽記曰稽亭北瞰大江南望髙嶽淹留逺客因以為名焉劉楨京口記曰劫亭臨湖湖通江陵郡治丹徒縣八縣來往經過此湖中多劫於邉立亭因以為名裴淵明廣州記曰尉佗築臺以朔望升拜號為朝拜臺傍江構起華舘以送陸賈因稱朝亭永嘉記曰樂城縣三京亭此亭是祖送行人之所王韶之始興記曰淘水源有堯山長嶺衡亘逺望如陣雲山下有平陵陵上有古大堂基十餘處雖已夷漫而猶可識謂曰堯故亭父老相傳堯南廵登此山故亭即其行宫三齊畧記曰曲城齊城東有萬嵗水水北有萬嵗亭漢武帝所造伏琛齊地記曰平夀城西北有平望亭莊子曰仁義者先生之蘧廬也注傳舍也華延雋洛陽記曰城内都亭華林奉常廣世昌益廣莫定陽遮要暴室廣陽西明萬嵗文陽東明視中東因建奉止奸得宫東陽千秋安衆孝敬清明二十四亭河隂界東出户鄉亭南泉亭街郵亭孔蹕㑹稽記云江夏太守宋輔於重山南白樓亭立學教授又郡國志云沛國桓儼避地至㑹稽聞陳業賢而往候之不見臨去入交州留書繫白樓亭柱而别鄱陽記曰白雲亭在縣西南旁對干越亭而峙焉跨石城之危瞰長江之深隨州刺史劉長卿題詩曰孤城上與白雲齊因以白雲為名豫章記曰徐孺子墓在郡南十四里曰白社亭吳嘉禾中太守長沙徐熙於墓􅎬種松太守南陽謝景於墓側立碑永安中太守梁郡夏侯嵩於碑邉立思賢亭松碑亭今並在松大合抱亭世世修治至今謂之謝君亭越絶書曰女陽亭者勾踐入役於吳夫人從道産女於亭養於檇李謂之女兒鄉郡國志皇甫謐云鳴條之野立鳴條亭又曰凉州候馬亭貳師伐大宛得天馬感西風頓覊而逸至燉煌北塞下鳴而去貳師候於此遂名之又曰韶州潼溪里有三楓亭又曰齊州周首亭即埋長狄喬如首於山西是也又曰冀州華陽亭即嵇康夜學琴於此又曰幽州督亢亭即荆軻以地圖獻秦處又曰柳州武丁岡有欒亭即太守欒巴所建也又曰柯亭一名千秋亭又名髙遷亭㑹稽記云漢議郎蔡邕避難宿於此亭仰觀椽竹知有竒響因取為笛果有異聲又曰潤州覆舟山有閬風亭襄江記峴山亭在襄陽縣東一十里今基跡尚存兩京新記曰西京苑内有望雲亭鞠場亭柳園亭真興亭神臯亭園桃亭臨渭亭永泰亭南昌園園北昌國亭流杯亭青門亭即召平種𤓰之所也又曰東京上陽宫有曜掌亭九州亭又曰東都苑内有金谷亭凝碧池建康記曰止馬亭在飛猨嶺口馬之登降於此止息故名之太平御覽卷一百九十四
