body:
  text: 太平御覧卷九十宋李昉等撰皇王部十五光武皇帝更始附後漢世祖光武皇帝東觀漢紀曰光武皇帝漢髙帝九世孫也出長沙定王發之後袁宏漢紀曰孝景帝生長沙定王發發中子買為舂陵節侯買生鬰林太守外外生鉅鹿都尉囬囬生南頓令欽欽生光武皇帝諱秀字文叔東觀漢紀曰皇考初為濟陽有武帝行過宫常封閉上將生皇考以令舎下濕開宫後殿居之建平元年十二月甲子夜上生時有赤光室中盡明皇考異之使卜者王長占之長曰此兆吉不可言是嵗縣界有嘉禾一莖九穗縣大豐熟因名上曰秀是嵗鳳凰來集濟陽故宫皆畫鳳凰聖瑞明兆始於此上為人隆凖日角大口美鬚眉長七尺三寸仁智明逺多權略樂施受人在家重慎畏事勤於稼穡兄伯升好俠非笑上事田業比之髙祖兄仲升年九嵗而南頓君卒隨其叔公在蕭入小學後之長安受尚書經師事盧江許子威大義略舉因學世事朝政美惡必先聞知具為同舎解說南陽大人徃來長安為之邸閒稽疑議嘗訟逋租于大司馬嚴尤尤見而竒之宛大姓李伯玉從弟軼數遣客求上上欲避之先是伯玉同母兄公孫臣為醫伯升請呼難伯升殺之上恐其怨故避之使來者言李氏欲相見甚誠無他意上乃見之懐刀自備入見因始侯兄弟為上言天下擾亂飢餓下江兵盛南陽豪右雲擾因具言䜟文事上殊不意獨内念李氏富厚父為宗卿師語言譎詭殊非次第嘗疾毒諸家子數犯法令李氏家富厚何為如是不然諾其言諸李遂與南陽府掾史張順等連謀上深念良久天變已成遂市兵弩絳衣赤幘時伯升在舂陵亦已聚㑹客矣上歸舊廬望見廬南若火光以為人持火呼之光遂盛赫然屬天有頃不見異之遂還歸宅乃與伯升相見初伯升之起也諸家子弟皆逃自匿曰伯升殺我及聞上至綘衣大冠將軍服乃驚曰以為獨伯升如此也素謹厚亦如之皆合㑹共勞饗新市平林兵王鳳王匡等因率舂陵子弟隨之兵合七八千人上騎牛與俱進殺新野尉後乃得馬進圍宛城王莽遣大司徒王尋大司空王邑將兵來征更始立以上為太常偏將軍時無印得定武侯家丞印佩之二公兵到頴川嚴尤陳茂與合尤問城中出者言上不敢取財物但合㑹諸兵為之計策尤笑言曰是美鬚眉目者耶欲何為乃如此初莽遣二公欲盛威武以振山東至驅虎豹犀象竒偉猛獸以長人巨無覇為壘尉自秦漢以來師出未嘗有也上邀之於陽關二公兵盛漢兵反走上馳入昆陽諸將惶恐各欲散歸與諸將議城中兵穀少宛城未拔力不能相救今昆陽即破一日之間諸將亦滅不同力救之反欲歸守其妻子財物耶諸將怒曰劉將軍何以敢如此上乃笑且去唯王常是上計㑹侯騎還言大兵已來長數百里望不見其後尾前已至城北矣諸將遽請上上到為陳相救之勢諸將素輕上及迫急上為畫成敗皆從所言二公兵已五六萬到遂還城作營圍之數重雲車十餘丈瞰臨城中旗幟蔽野塵烟連雲金鼔之聲數十里或為地道或為衝車撞城積弩射城中矢下如雨城中負户而泣二公自以為功在漏刻有流星墜營中正晝有雲氣如壊山當營而隕不及地尺而散吏士皆厭伏時漢兵在定陵郾者聞二公兵盛皆怖上厯說其意為陳天命請為前行諸部堅陳上將歩騎千餘前去大軍四五里二公遣歩騎數千合戰上奔之斬首數十級諸部將喜曰劉將軍平生見小敵怯今見大敵勇甚竒怪也上復進二公兵却諸部乗之斬首數百千級連勝遂令輕足將書與城中諸將言宛下兵復到而陽墜其書二公得書讀之恐上遂選精兵三千人從城西水上奔衝二公兵於是大奔遂北殺司徒王㝷而昆陽城中兵亦出中外並擊㑹天大雷風暴雨下如注水潦滍川盛溢二公大衆遂亂奔赴水溺死者以數萬滍水為之不流王邑嚴尤陳茂輕騎乗死人渡滍水逃去漢軍盡獲其珎寳輜重車甲連月不盡五月齊武公拔宛城六月上破二公於昆陽破宛後數日收伯升部將劉稷而伯升强爭之更始遂用譖愬復収伯升即日皆物故上在父城徵詣宛拜上為破虜大將軍封武信侯更始欲北之雒陽以上為司𨽻校尉先到雒陽整頓宫府三輔吏士東迎更始見諸將過者已數十軰皆冠幘衣婦人衣諸于繡䘿諸于大掖衣也如婦人之旌衣䘿音屈揚雄方言曰䄡褕其矩者自闗之西謂之䘿據此是諸于上加繡䘿如今半臂也大為長安所笑知者或畏其衣犇亡入邊避之及見司𨽻官屬皆相指視之極望老吏或垂涕曰復見漢官儀體賢者蟻附更始以上為大司馬遣之河北十月上持莭度孟津鎮撫河北安集百姓趙繆王子林立邯郸卜者王郎為天子移檄購求上十萬戸世祖引兵攻邯鄲連戰郎兵挫折郎遣諫議大夫杜長威見公據地曰實成帝遺體子輿也公曰正使成帝復生天下不可復得也况詐子輿乎長威請降得萬戸侯公曰一戸不可得長威曰邯鄲雖鄙君臣併力城守尚可支一嵗終不君臣相率而降但得全身可也辭去而郎少傅李立反郎開城門漢兵破邯鄲誅郎入宫收文書得吏民謗毁公言可繫者數千章公㑹諸將燒之曰令反側者自安也更始遣使者持節立公為蕭王諸將議上尊號上不許上發薊至中山諸將復請上尊號初王莽時上與伯升及姊壻鄧晨穰人蔡少公燕語少公道䜟言劉秀當為天子或曰是國師劉子駿也上戲言曰何知非僕耶坐者皆大笑時傳聞不見赤伏符文軍中所上未信到鄗上所與在長安同舎諸生彊華自長安奉赤伏符詣鄗與上㑹羣臣復固請乃命有司設壇于鄗之千秋亭六月己未即皇帝位改元為建武十月帝入雒陽華南宫二年正月益吳漢鄧禹等封自漢草創徳運正朔服色未有所定髙祖因秦以十月為正以漢水徳立北畤而祠黒帝至孝文賈誼公孫𢎞以為秦水徳漢當為土徳至孝武倪寛司馬遷猶從土徳自上即位案圗䜟推五運漢為火徳周蒼漢赤水勝火赤代蒼故上都雒陽制郊祀於城南行夏之時犧牲尚黒明火徳之運旗熾尚赤四時隨色郊祀帝堯以配天宗髙祖以配上帝上遣逰撃將軍鄧隆與幽州牧朱浮擊彭寵隆軍徽路浮軍雍奴相去百餘里遣吏上奏言寵破在旦暮上讀檄未竟怒曰兵必敗北汝歸可知吏還未至隆軍果為寵兵掩擊破浮軍逺至不能救以兵走幽州咸曰上神三年十月上幸舂陵祠園廟大置酒與舂陵父老故人為樂四年五月上幸靈奴為征彭寵故也自王莽末天下早霜連年百穀不成元年之初耕作者少民飢饉黃金一斤易粟一石至二年秋天下野穀旅生麻菽尤盛或生苽菜菓實野蠶成繭被山民收其絮採獲穀果以為蓄積是嵗野穀生者稀少而南畆亦益闢矣六年二月吳漢下朐城天下悉定唯獨公孫述隗囂未平上曰姑置此兩子於度外乃休諸將置酒賞賜之毎幸郡國下與見吏輙問以數十百嵗能吏次第下及掾史簡練臣下之行下無所隱其情道數十嵗事若案文書吏民驚惶不知所以人自以見識家自以蒙恩逺臣受顔色之惠坐席之間以要其死力當此之時賊檄日以一日數憂不可勝上猶以餘閒講經藝發圗䜟制告公孫述署曰公孫皇帝囂雖遣子入侍尚持兩心囂故吏馬援謂囂曰到朝廷凡數十自古世主未嘗有明主如此也材智驚人其勇非人之敵開心見誠與人語好醜無所隠諱圗講天下事極盡下恩兵事方略量敵校勝闊逹多大節與髙帝等經學博覧政事文辯前世無比囂曰如卿言勝髙帝耶曰不如也髙帝大度無可無不可今上好吏事動如節度不飲酒囂大笑曰如卿言反復勝耶七年正月詔羣臣奏事無得言聖人有舊制上書以青布囊素裹封書不中式不得上既上詣北軍待命前後相屬連嵗月乃决上躬親萬幾急於下情乃令上書啓封則用不得引經書取具文字而已奏詣闕平旦上其有當見及寃結者常以日出時騶騎馳出召入其餘以次聽中使者出報即罷去如神逺近不偏幽隠上達民莫敢不用情追念前世園陵至盛王侯外戚葬埋僣侈吏民相効浸以無限詔誥天下令薄葬八年閏四月車駕西征河西大將軍竇融與五部太守歩騎二萬迎上隗囂士衆震壊皆降囂走西城吳漢岑彭追守之九年正月隗囂餓出城飡粮糗􅖲腹脹死十一年十一月吳漢引兵擊公孫述入犍為界小縣多城守未下詔書告漢直擁兵到成都據其心腹後城營自解散漢意難前獨言朝廷以為我縳賊手足矣遣輕騎至成都燒市橋武陽以東小城營皆奔走降竟如詔書漢兵乗勝追奔述拒守詔書又戒漢曰成都十萬餘衆不可輕也且堅據廣都城去之五十里待其即營來攻罷倦引去乃首尾擊之勿與爭鋒述兵不敢來轉營即之移徙輙自堅十一月衆軍至城門述自將背城而戰吳漢鼔之述軍大破刺傷述扶輿入壁其夜死夷述妻子傳首於洛陽縱兵大掠舉火燔燒上聞之下詔讓吳漢副将劉禹曰城降嬰兒老母口以萬數一旦放兵縱火聞之可為酸鼻禹宗室子孫故嘗更職何忍行此仰視天俯視地觀於放麑啜羮之事二者孰仁且失斬將弔民之義又議漢殺述親屬太多是時名都王國有獻名馬寳劍直百金馬以駕鼓車劔以賜騎士苑囿池籞音御之官廢弋獵之事不御性不喜聽音樂手不持珠玉衣服大絹而不重綵征伐嘗乗革輿羸馬公孫述破益州乃傳送瞽師郊廟樂葆車乗輿物是後乃稍備具焉述伏誅之後而事少閒官曹文書減舊過半下縣吏無百里之繇民無出門之役十九年上幸南陽汝南至南頓止令舎大置酒賜吏民復南頓田租一歲吏民叩頭言皇考居此日久陛下發祥之地每來輙加厚恩但復一嵗少薄願復十嵗上曰天下重寳大噐常恐不任日慎一日安敢自逺期十嵗復増一嵗二十年六月上風眴黃癉病發甚以衛尉關内侯隂興為侍中興受詔雲臺廣室二十六年正月詔曰前以用度不足吏禄薄少乃自益其俸自三公下至佐吏各有差四月始營陵地於臨平亭南詔曰無為山陵陂池裁令流水而已迭興之後亦無丘壟使合古法今日月已逝當預自作臣子奉承不得有加乃令陶人作瓦器又曰臨平望平隂河水洋洋舟船泛泛善矣夫周公孔子有不得存安得松喬與之而共逰乎文帝曉終始之義景帝所謂孝子也故遭反復覇陵獨完非成法耶上自細書一劄十行報郡縣旦聽朝至日仄夜講經聽誦坐則功臣特進在側論時政畢道古今事次說在家所識鄉里能吏次第比類又道忠臣孝子義夫節士坐者莫不激揚悽愴欣然和恱羣臣爭論上前嘗連日皇太子嘗承閒言陛下有禹湯之明而失黃老養性之道今天下大安少省思慮養精神上答曰我自樂此三十年有司奏封禪詔曰災異連仍日月薄食百姓怨歎而欲有事於太山汙七十二代編録以羊皮雜貂裘何强顔耶三十一年羣臣復奏宜封禪遂登太山勒石紀號改元為中平三年春正月初立北郊祀后土東夷倭奴國遣使入貢二月戊戌帝崩在位三十三年時年六十有二遺詔曰朕無益百姓如孝文皇帝舊制𦵏務從約省刺史二千石長皆無離城郭無遣吏及因郵奏太子襲尊號為皇帝羣臣奏諡曰光武皇帝廟曰世祖三月𦵏原陵東觀漢紀曰上破王郎還過鄧禹營禹進食炙魚上大飡啖時百姓以上新破大敵欣喜聚觀見上飡啖勞勉將士威嚴甚厲於是皆竊言曰劉公真天人也又曰隗囂遣馬援奏詣亰都上出在宣徳殿南廡下引援入與相見上曰卿遨逰二帝間見卿使人慙援曰因天下反覆而盗賊自名姓者不可勝數也陛下寥廓大度同符髙祖乃知帝王自有真也又曰帝既有仁聖之明氣勢形體天然之姿固非人之敵翕然龍舉雲興霖雨而濟天下蕩蕩乎人無能名焉帝王世紀曰𤣥晏先生曰左氏春秋稱夏少康之起有田一成有衆一旅若漢之再命世祖不階成旅之資平暴反正遂建中興夏康同美矣袁山松後漢書曰前漢自成哀已下天地縱横巨猾竊命劉氏舊澤雖在而瞻烏之望㡬絶世祖以𦕈𦕈之祚起於白水之濵身屈更始之助位與羣豎並列于時懐璽者十餘建旗者數百髙才者居之南面疾足者為之王公茫茫九州瓜分臠切泯泯蒼生塵消鼎沸我扇之以仁風驅之以大威霜雪被而荆棘枯綱維振而逆鱗掃羣才畢奏人思盡能數年之間廓清四海雖曰中興與夫始創業者庸有異乎誠馬生之言固以寥廓大度同符髙祖又資太宗之仁兼孝宣之明一人之體其殆同乎故能享有神噐據乎萬物之上矣㑹稽典録曰上在長安中餘姚嚴遵俱共受學結好建元元年徵遵拜為諫議大夫共上宿遵以足加帝腹其夜客星犯帝座太史以聞上曰昨與嚴子陵卧也續漢書曰昔羿浞篡夏數十年少康生為仍牧正能修徳復夏厥勲大矣然尚有虞思及靡有鬲内外之助至於光武承王莽之簒起自匹庶一民尺土靡有憑焉發迹於昆陽以數千屠百萬非膽智之主孰能堪之討賊平亂克復炎漢號稱中興者無以加之矣中國既定柔逺以徳愛慎人命下及至賤武功既抗文徳聿脩勲績𢎞矣薛瑩漢紀曰王莽之際天下雲亂英雄並發其跨州據郡僣制者多矣大皆兾於非望然考其聰明仁勇自無光武儔也𢎞寛博納計慮如神是以任光竇融望風景附馬援一見觀顔識竒故能以十數年間掃除羣凶清復海内豈非天之所輔賛哉古者師不内御而光武命將皆授以方略使奉圗而進其違失無不折傷意豈文史之過乎不然雖聖人其猶病諸更始東觀漢紀曰劉𤣥字聖公光武族兄也弟為人所殺聖公結客欲報之客犯法聖公避吏於平林吏繫聖公父子張聖公詐死使人持喪歸舂陵吏乃出子張聖公因自逃匿王莽末南方飢饉人庶羣入野澤掘鳬茈而食更相侵奪新市人王匡王鳳為平理諍訟遂推為渠帥衆數百人諸亡命徃從之數月間至七八千人號新市兵平林人陳牧廖湛復聚千餘人號平林兵聖公入平林中與伯升㑹遂共圍宛聖公號更始將軍自破甄阜等衆庶來降十餘萬諸將立劉氏南陽英雄皆歸望於伯升然漢兵以新市平林為本其將帥素習聖公因欲立之而朱鮪立壇城南淯音育水上詣伯升吕植通禮經為謁者將立聖公為天子議以示諸將馬武王匡以為王莽未滅不如且稱王張卬㧞劍擊地曰稱天公尚可稱天子何謂不可於是諸將軍啟於聖公至於壇所奉通天冠進聖公於是聖公乃拜冠南面而立改元為更始元年上為太常偏將軍上破二公於昆陽城而更始收劉稷及伯升即日皆物故上馳詣宛謝罪更始大慙長安中兵攻王莽斬首收璽綬詣宛更始入便坐黃堂上視之曰莽不如此當與霍光等更始韓夫人曰莽不如此帝那為得之更始欲都洛陽李松等自長安傳送乗輿服御物及中黃門從官至洛陽關中咸相望天子更始遂西居東宫鼓鐘帷帳宫人數千宫府閭里安堵如舊更始上前殿郎吏以次侍更始顧刮席與小常侍語郎吏怪之更始委政於趙萌日在後庭與婦人耽飲諸將軍言事更始醉不能見韓夫人尤嗜酒毎侍飲見常侍奏事輙怒曰帝方對我飲正用此時持事來乎起抵破書案所置故守交錯州郡不知所從趙萌以私事忿侍中侍中曰陛下救我更始言大司馬縱之萌曰臣不受詔遂斬之又所置官爵皆出羣小被服不法或繡面衣錦袴䄡䄖諸于為百姓之所賤長安中為之歌曰竈下養中郎將爛羊頭關内侯其冬赤眉十餘萬人入關引兵入上林更始騎出厨城門諸婦女皆從後車呼陛下當下拜城更始下拜復上馬乃去至髙陵上聞更始失城乃下詔封更始為淮陽王而赤眉劉盆子亦下詔以聖公為長沙王更始嘗依謝禄居劉恭亦擁䕶之三輔苦赤眉暴虐皆憐更始而張卬等以為慮謂禄曰今諸營長多欲簒聖公者一旦失之合兵攻公自㓕之道也于是禄使從兵與更始共牧馬于郊下因令縊殺之帝王世紀曰更始名𤣥字聖公即位凡三年太平御覽卷九十
