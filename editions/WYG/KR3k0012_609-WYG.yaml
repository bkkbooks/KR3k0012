body:
  text: 太平御覽卷六百九宋李昉等撰學部三易詩書易易乾鑿度曰易者易也變易也不易也管三成徳為道苞籥鄭𤣥注曰管猶兼也一言而兼此三者以成其徳為道苞籥齊魯之間名門户及藏器之管為籥禮記經解曰潔靜精微而不賊則深於易者也論語孔子曰加我數年五十以學易可以無大過矣易曰易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶繫辭曰易之為書也不可逺為道也屢遷變動不居周流六虛上下無常剛柔相易不可以為典要又曰易之興也其於中古乎作易者其有憂患乎是故履徳之基也謙徳之柄也復徳之本也恒徳之固也損徳之修也益徳之裕也困徳之辨也井徳之地也巽徳之制也又曰夫易聖人所以極深而研幾也唯深也故能通天下之志唯幾也故能成天下之務説卦曰昔者聖人之作易也将以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章又曰昔者聖人作易也幽贊於神明而生蓍叅天兩地而倚數觀變於隂陽而立卦發揮於剛柔而生爻和順於道德而理於義窮理盡性以至於命春秋説題辭曰易者氣之節含精宣律厯上經象天下經計厯文言立符符信象出期節象兩也出期節者若至日閉闗商旅不行后不省方之類也象言變化繫設類跡孝經援神契曰易長於變書考命行授河宋均注曰授河者授河洛以考命行也帝王世紀曰庖犧氏作八卦神農重之為六十四卦黄帝堯舜引而伸之分為二易至夏人因炎帝曰連山殷人因黄帝曰歸藏文王廣六十四卦著九六之爻謂之周易周易正義曰伏羲重卦周公作爻辭此説與帝王世紀不同又孔氏作十篇亦曰十翼初卜商為易傳西漢之能名家者有施讐孟喜梁丘賀京房費直髙相又東漢鄭𤣥魏王弼並注易施孟諸家自漢及魏得並立而傳者甚衆至西晉梁施高三氏亡孟京二氏有書無師而鄭𤣥王弼所傳則費氏之學漢書藝文志曰虙犧氏仰觀象於天俯觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情文王於是重易六爻作上下篇孔氏為之彖象繫辭文言序卦之屬十篇故曰易道深矣人更三聖韋昭曰伏羲文王孔子也世厯三古孟康曰繫辭曰易之興其于中古乎則伏羲為上古文王為中古孔子為下古也及秦燔書而易為卜筮之事傳者不絶漢書曰京房學易於焦延夀嘗曰得我道以亡身者京生也東觀漢記曰任丹傳孟氏易作通論七卷世傳之號曰任居通後漢書曰孔融答虞仲翔書曰示所著易傳自商翟以來舛錯多矣去聖彌逺衆説騁辭曩聞延陵之禮樂今觀吾君之治易知東南之美者非但㑹稽之竹箭焉又觀象雲物察應寒温原本禍福與神㑹契可謂探賾旁通者也晉書曰王湛字處沖司徒渾之弟也初有隱徳人莫能知兄弟宗族皆以為痴其父昶獨異焉兄子濟每輕之嘗詣湛見床頭有周易問曰叔父何用也湛曰體中不佳時復看耳濟請言之湛因剖析𤣥理微妙有竒趣皆濟所未聞也濟遂留連彌日累夜自視缺然乃嘆曰家有名士三十年而不知濟之罪也北齊書曰權㑹本貧生無僕𨽻初任助教之日恒乗驢上下且職事處多每須經厯及其退食非晩不歸曽夜出城東門鐘漏已盡㑹唯獨乗驢忽有二人一人牽頭一人隨後有異生人漸漸失路不由本道㑹心甚怪之遂誦易經上篇一卷不盡前後二人忽然離散齊書曰張緒長於周易言精理奥見宗一時常云何平叔所不解易中七事梁書曰伏曼容字公儀平昌安丘人少篤學老善易倜儻好大言常云何晏疑易中九事以吾觀之晏了不學也唐書曰文宗時裴通自祭酒改詹事因中謝上知通有易學因訪以精義仍命進所習經本著易𤣥解并總論二十卷易禦冦十三卷易洗心二十卷世説曰殷荆州仲堪曽問逺公云易以何為體荅曰易以感為體曰銅山西崩靈鐘東應便是易也淮南子曰孔子讀易至於損益未嘗不喟然而嘆曰或欲利之適足以害之或欲害之適足以利之利害禍福之門不可不察劉向别傳曰所校讐中易傳淮南九師道訓除複重定著十二篇淮南聘善為者九人從之采獲故中書署曰淮南九師書王叔師正部曰易與春秋同經總一機之織經營天道以成人事金樓子曰按周禮筮人氏掌三易夏曰連山殷曰歸藏周曰周易解此不同按杜子春云連山伏羲也歸藏黄帝也按禮記孔子曰我欲觀殷道得乾坤焉今歸藏先以坤後以乾則知是殷明矣推歸藏既為殷制連山理是夏書詩卜商詩序曰詩者志之所之也情動於中而形於言也又曰在心為志發言為詩詩書曰通其言謂之詩左傳襄十六年曰晉侯與諸侯宴于温使諸大夫舞曰歌詩必類歌古詩當使各從義類齊髙厚之詩不類齊冇二心故荀偃怒曰諸侯有異志矣使諸大夫盟髙厚髙厚逃歸齊為大國髙厚若此小國必當冇從者又襄二十七年秋鄭伯享趙孟于垂隴子展伯有子西子産子大叔二子石從二子石印段公孫段趙孟曰七子從君以寵武也請皆賦以卒君貺武亦以觀七子之志子展賦草蟲草蟲召南詩曰未見君子憂心忡忡比趙孟為君子趙孟曰善哉民之主也抑武也不足以當之伯有賦鶉之賁賁賁賁􅅠詩曰人之無良我以為兄我以為君趙孟曰牀第之言不踰閫况在野乎非使人之所得聞也子西賦黍苖之四章黍苖小雅曰肅肅謝功召伯營之列列征師召伯成之比趙孟於召伯趙孟曰寡君在武何能焉子産賦隰桑隰桑詩義取思見君子盡心以事之趙孟曰武請受其卒草卒章曰心乎愛矣遐不謂矣中心藏之何日忘之趙孟欲子産之見規誨子太叔賦野有蔓草野有蔓草詩鄭風取其邂逅相遇適我願兮趙孟曰吾子之恵也太叔喜於相遇故趙孟受其恵印段賦蟋蟀蟋蟀詩唐風曰無以大康職思其居好樂無荒良士瞿瞿言瞿瞿然顧禮儀趙孟曰善哉保家之主也吾有望矣公孫段賦桑扈桑扈詩小雅義取君子有禮文故能受天之祜趙孟曰匪交匪敖福將焉往若保是言也欲辭福禄得乎卒享文子告叔向曰伯有將為戮矣詩以言志志誣其上而公怨之以為賔榮言誣則鄭伯未有其實趙孟倡賦詩以自寵其能久乎幸而後亡言必先亡叔向曰然已侈所謂不及五稔者夫子之謂也又曰楚靈王與子革語左史倚相趨過倚相楚史名也王曰是良史也子善視之是能讀三墳五典八索九丘皆古書名對曰臣嘗問焉昔穆王欲肆其心周穆王也肆極也周行天下將皆必有車轍馬跡焉祭公謀父作祈招之詩以止王心謀父周卿士祈父周司馬掌甲兵之職招其名也祭公方諫遊行故指司馬官而言也此逸詩王是以獲没於祗宫獲没不見簒臣問其詩而不知也若問逺焉其焉能知之王曰子能乎對曰能其詩曰祈招之愔愔式昭徳音愔愔安和貌也式用也思我王度式如玉式如金金玉取其堅重形民之力而無醉飽之心言國之用民當随其力任如金冶之器随器制形故言形民之力去其醉飽過盈之心王揖而入饋不食寢不寐數月深感子革之言論語孔子曰小子何莫學夫詩詩可以興可以觀可以羣可以怨邇之事父逺之事君多識於鳥獸草木之名又曰孔子謂伯魚曰汝為周南召南矣乎人而不為周南召南其猶正牆面而立也與又曰起予者商也商子夏始可與言詩已矣又曰詩三百一言以蔽之曰思無邪荘子曰詩以道志毛詩正義曰昔孔子刪古詩三千餘篇上取諸商下取諸魯皆絃歌以合韶武之音凢三百一十一篇至秦滅學亡六篇今在者有三百五篇正義云初孔子授訓卜商商為之序以授魯人申曾曽授魏人李克克授魯人孟仲子仲子授根牟子根牟子授趙人荀卿荀卿授漢人魯國毛亨作詁訓傳以授於趙國毛萇時人謂亨為大毛公萇為小毛公以其所傳故名其詩曰毛詩又曰東漢鄭𤣥取毛詩訓詁所不盡及同異者續為之注解謂之箋箋薦也言薦成毛意也詩含神霧曰集微揆著上統元皇下序四始羅列五際宗均注曰集微揆著若綿綿𤓰瓞人之初生揆其始是必将至著有天下也又曰詩者天地之心君徳之祖百福之宗萬物之戸也詩推度災曰建四始五際而八節通卯酉之際為革政午亥之際為革命春秋演孔圖曰詩含五際六情六情即六義也一曰風二曰賦三曰比四曰興五曰雅六曰頌春秋説題辭曰詩者天文之精星辰之度又曰在事為詩未發為謀恬淡為心思慮為志故詩之為言志也史記曰古詩三百餘篇孔子刪取三百五篇皆絃歌以合韶武之音然雅音之韻四言為主其餘非音之正也漢書曰匡衡字稚圭好學家貧傭作以供資用尤精力絶人諸儒謂之語曰無説詩匡鼎來應劭曰鼎𤣥也張晏曰匡衡少時字鼎匡説詩解人頤又藝文志曰古諸侯卿大夫交鄰國之微言相感當揖讓之時必穪詩以喻其志蓋以别賢不肖而觀盛衰也又曰哀樂之心感而歌詠之聲發誦其言謂之詩詠其聲謂之歌古有採詩之官王者所以觀風俗知得失自考正也遭秦而全者以其諷誦不獨在竹帛也晉書曰王褒字偉元性好讀詩至於哀哀父母生我劬勞未嘗不三復流涕門人受業者皆廢蓼莪之篇又曰王凝之妻謝氏字道韞將軍奕之女也聰識有才辯叔父安常問毛詩何句最佳荅曰吉甫作頌穆如清風仲山甫永懐以慰其心安謂其雅人深致顔延之庭誥曰詠歌之書取其連類合章比物集句詩為之祖陸徳明經典釋文曰孔子最先刪詩以授於子夏子夏遂作序言口以相傳未有章句劉歆七畧曰詩以言情情者信之符也書以决好好者義之證也書釋名曰書者言書其時事也漢藝文志曰書以廣聽荘子曰書以道事顧子曰儀訓云三墳五典粲粲如列宿落落如連珠也春秋説題辭曰尚書者二帝之迹三王之義所以推其運明命授之際書之言信而明天地之精帝王之功凡二百篇次第委曲尚者上也上帝之書也尚書正義曰上世帝王之遺書有三墳五典誥訓誓命孔子刪而序之斷自唐虞以下訖于周凡百篇以其上古之書故曰尚書遭秦滅學並亡漢興濟南人伏勝能口誦二十九篇至漢文帝時立尚書學以勝年且九十餘老不能行迺詔太常掌故晁錯就其家傳受之其書四十一篇歐陽大小夏侯傳其學各有能名是曰今文尚書劉向五行傳蔡邕勒石經皆其本其後魯共王壊孔子故宅於壁中得古文尚書論語悉以書還孔氏武帝乃詔孔安國定其書作傳定為五十八篇安國書成後遭漢武巫蠱事不行至魏晉之際滎陽鄭冲私於人間得而傳之獨未施行東晉汝南梅賾奏上始列於學官此則古文矣又漢書曰孔氏有古文尚書孔安國以今文字讀之又古文尚書序曰伏生年老言不可曉使其女傳言授晁錯漢書藝文志曰易曰河出圖洛出書書之所起逺矣至孔子纂焉上斷於堯下訖於秦凡百篇而為之序劉歆七畧曰尚書直言也始歐陽氏先名之大夏侯小夏侯立於學宫三家之學於今傳之陸徳明經典釋文曰漢宣帝太始中河内女子得秦誓一篇獻之與伏生所誦合三十篇漢世行之漢書曰元帝時豫章内史梅賾奏上孔傳古文尚書中亡舜典一篇乃取王肅注堯典慎徽五典下分為舜典一篇以編之後漢書杜林傳曰河南鄭興東海衛宏皆長於古學林嘗言林得興固諧矣使宏得林且有以益之及宏見林闇然而服濟南徐廵始師事宏後更從林學林前於西州得漆書古文尚書一卷常寳愛之雖遭艱困握持不離身出以示宏等曰林流離兵亂常恐斯經將絶何意東海衛子濟南徐生復能傳之是道竟不墜於地也宏廵益重之於是古文遂行唐書開元中宋璟嘗自寫尚書無逸一篇以獻𤣥宗置之内殿出入觀省成誦在心每嘆古人至言後代莫能及故任賢誡慾朝夕孜孜開元以來因無逸圖壊始以山水圖代之及穆宗問宰臣貞觀開元之理崔植因以是對請復以無逸為誡帝深善其言又曰髙郢子定幼聰警絶倫年七嵗時讀尚書湯誓問郢曰柰何以臣伐君郢曰應天順人不為非道又問曰用命賞于祖不用命戮於社是順人乎父不能對己見幼敏門又曰文宗集纂尚書中君臣事跡命工圖寫於太液亭朝夕觀覽太平御覽卷六百九
