body:
  text: 太平御覽卷三百九十三宋李昉等撰人事部三十四坐卧睡坐釋名曰坐挫也骨節挫屈毛詩車隣曰既見君子並坐鼓瑟禮記曲禮上曰夫為人子者坐不中席又曰離坐離立無徃參焉又曰男女不雜坐又曰立毋跛坐毋箕又曰有憂者側席而坐有䘮者専席而坐又曰虛坐盡後食坐盡前左傳襄五曰伍舉奔晉聲子遇之于郊班荆相與食又襄二十六年曰衛子鮮奔晉公使止之不可及河又使止之止使者而盟于河託扵木門木門青河不向衛國而坐又定上曰申包胥如秦乞師勺飲不入口七日秦哀公為之賦無衣九頓首而坐秦師乃出春秋演孔圖曰孔子長十尺大九圍坐如蹲龍立如牽牛爾雅曰妥安坐也漢書曰單父人吕公善沛令避仇従之客因家焉沛中豪傑吏聞令有重客皆徃賀蕭何為主吏主進進者㑹禮之財也主賦歛禮進為之帥也令諸大夫曰進不滿千錢坐之堂下髙祖為亭長乃紿謂謁曰賀錢萬實不持一錢謁入吕公大驚起迎之門吕公者好相人見髙祖状貌因重敬之引入上坐又曰上幸上林皇后慎夫人従其在禁中常同坐及坐郎署袁盎却慎夫人坐慎夫人怒不肯坐上亦怒起盎曰陛下既已立后慎夫人乃妾妾主豈可以同坐哉又曰茂陵徐生上䟽言霍氏泰盛後霍氏誅㓕而告霍氏者皆封人為徐生上書曰臣聞客有過主人者見其竈直突旁有積薪客謂主人更為曲突逺徙其薪不者且有火患主人黙然不應俄而家果失火隣里共救之幸而得息扵是殺牛致酒謝其鄰人灼爛在于上行餘各以功次坐而不録言曲突者又曰髙祖使陸賈賜趙佗印為南越王賈至趙佗魋結基倨見賈又曰諺曰千金之子坐不垂堂又曰陳遵字孟公時列侯有與陳遵同姓者每至門人謂陳孟公坐中莫不震動既至而非因號其人曰陳驚坐東觀漢記曰上幸譙使王覇攻周廷賊雨射城中中覇前酒樽覇安坐不動又曰隗囂圍来歙上自将救之圍觧置酒髙會賜歙班絶席坐在諸将之右謝承後漢書曰汝南薛惇字子禮為北海長家貧坐無完席妻曰白居無俸禄給子孫復無完席耶惇以善席與自坐敗者又曰鄭敬字次都釣於大澤折芰而坐以荷薦肉瓠瓢盛酒琴書自娱范􅁮後漢書曰袁術僣號人情離叛欲北至青州従袁譚曹操使𤣥徳邀之還夀春至江亭坐簀床而嘆曰袁術乃至扵是乎歐血而死又曰孔融性寛容少忌好士喜誘益後進及退閒軄賔客日盈其門常嘆曰坐上賔恒滿樽中酒不空吾無憂矣與蔡邕素善邕卒後有虎賁士貌類扵邕融每酒醉引與同坐又曰鄭公業諌董卓曰張孟卓東平長者坐不窺堂言不妄視也吴書曰孫權遣于禁還羣臣送禁虞翻謂禁曰卿勿謂吴無人吾謀適不用耳禁雖翻所惡然猶盛嘆翻魏文帝為翻設虛坐蜀志曰費褘為諸葛亮司馬值軍帥魏延與長史楊儀相憎每並坐論延或舉刃擬儀儀涕泣横集褘常入坐其間諌喻分别終亮之世各盡延儀之用也又曰王平字子均西岩渠人生長戎旅手不能書所識不過十字占授作書皆有意理使人讀史漢書記傳聽之備知其義従朝至夕端坐儼然也吴志曰歩隲字子山與廣陵衛旍俱以種𤓰自給㑹稽焦征羗郡之豪族隲等脩刺奉𤓰征羗見之隠几坐帳中設席于地坐隲旍忿恥隲神色自若鄧粲晉記曰裴遐性恬和同類有試遐者推堕床下遐拂衣還坐言無異色漢晉春秋曰王裒父儀為文帝所殺未嘗西向坐示不臣也晉中興書曰陶淡字處静年十五便服食絶榖家累千金僮客百數淡終日端拱絶不婚娶居臨湘縣山中立小草屋裁足容身時還家設小床獨坐不與人共何晏别傳曰晏小時武帝雅竒之欲以為子每挟将逰觀命與諸子長幼相次晏㣲覺於是坐則専席止則獨立或問其故答曰禮異族不相貫坐孟嘉别傳曰庾亮領江州嘉為従事禇裒為豫章出朝亮正旦大㑹時彦悉集嘉坐次第甚逺裒問亮曰聞有孟嘉其人何在亮曰在坐卿但自覔裒覩衆人指嘉謂亮曰將無是乎亮欣然笑嘉為裒所得乃益重嘉焉皇甫謐髙士傳曰管寧常坐一木榻五十餘年榻上當膝處皆穿六韜曰文王出見吕尚坐茅而漁乃再拜與歸又曰紂之時婦女坐綺之席晏子曰景公獵休坐地食晏子後至㓕葭而席公不恱曰子席何也對曰臣聞介胄坐陣不席獄訟不席獄戸不席三者皆憂也臣不敢以憂侍坐孟子曰晉平公之於亥唐也入云則入坐云則坐食云則食雖蔬食菜羮未嘗不飽莊子曰原憲處魯居環堵之室匡坐而弦歌風俗通曰延嘉中常侍坐畢超左悺音貫徐璜具瑗唐衡在帝左右縦其姦匿時人謂之語曰左廻天徐轉日具獨坐言其信用甚於圓轉又曰汝南陳伯敬行必舉歩坐必儼然郭子曰何克字次道徃王丞相許丞相以麈尾礭床呼何共坐云来来此是君位世說曰魏明帝使后弟毛曾與夏侯太初共坐時人謂之蒹葭倚玉樹說林曰馬融笇渾天不合召鄭𤣥令一笇便决及𤣥業成辭歸融心忌焉𤣥亦疑有追者乃坐橋下在水上據屐融果轉戒欲勅追之告左右曰𤣥在土下水上據木此必死矣遂罷追俗說曰王僧敬神明俊徹為一時之標桓𤣥時集聚賔客莫有出其右者王在坐都不復覺有餘人坐無王便覺殷仲文謝益夀為佳王僧敬兄弟列坐齋中見之若神小人従户前過皆肅然毛竪嵇康絶交書曰危坐一時痺不得揺卧說文曰眠翕目也寢病卧也卧休也釋名曰卧化也其精神變化不與覺時同也寐謐也謐静無聲也寢侵也損事功也瞑泯也無知泯泯也禮記玉藻曰君子寢恒東首又樂記曰魏文侯問于子夏曰吾端冕而聽古樂則惟恐卧聽鄭衛之音則不知倦論語公冶長曰宰予晝寢子曰朽木不可雕也糞土之墻不可汚也扵予與何誅又鄉黨曰寢不尸史記曰吴起為將與士卒最下者同衣食卧不設席行不乗騎又曰上自將擊黥布群臣居守皆送至灞上留侯病自强起至曲郵因說上令太子為將軍監闗中軍上曰子房雖疾强卧而傅太子漢書曰黥布反上疾欲使太子擊之吕后乗間為上泣曰上雖疾强載輜車卧而獲之諸將不敢不盡力又曰上欲廢太子吕后使建成侯吕澤刦張良曰君常為上謀臣今上日欲易太子君安得髙枕而卧又曰汲黯拜淮陽太守黯伏謝不受上曰君薄淮陽耶頋淮陽吏民不相得吾徒得君重卧而治之又曰初武帝遣昭帝以討莽何羅功封金日磾為秺侯日磾以帝少不受封輔政嵗餘病困大将軍光白封日磾卧授印綬一月薨又曰吴楚反乏粮饑欲退數挑戰周亞夫終不出夜軍中驚内相攻擊擾亂至於帳下亞夫終卧不起湏臾亦定又曰董賢常與上卧起嘗晝寢偏籍上衣袖上欲起恐動賢乃斷袖而起又曰王莽軍師外破大臣内叛憂懣不能食但飲酒㗖鰒魚讀軍書倦因憑几寢不復就牀後漢書曰彭寵自立為燕王其妻數惡夢又多見變怪五年春寵齋獨在便室倉頭子宻等三人因寵以卧寝寐共縳寵著牀告外吏云大王齋禁民使吏休東觀漢記曰吴漢記富平獲索二賊於平原明年春賊舉五萬餘人夜攻漢營軍中驚亂堅卧不動又曰上在邯鄲宫晝卧温明殿耿弇入造床下請問因說曰今更始失政天下可馳檄而定又曰楊政常過楊虛侯馬武稱疾卧欲政拜床下政入户徑上床坐武恨語言不懌政因曰蕃臣不思求賢報國而驕天下英俊今日揺動者刀入胷左右大驚蜀志曰先主既立益州廣漢太中夏纂請秦宻為師友祭酒領五官掾稱曰仲父宻稱疾卧在茅舍纂將功曹石祐主簿王並即宻第宴談宻卧如故沈約宋書曰羊欣字敬元従父不疑為烏程令年十二時王獻之為吴興太守甚知愛之獻之嘗夏月入縣欣着新絹裙晝寝獻之書數幅而去欣書本工因此彌善鍾離意别傳曰嚴遵者與光武皇帝俱為諸生逰渉他縣同門精學暮夜宿二人寒不得寝卧更相謂曰後若豪貴憶此難宜勿相㤀羅含别傳曰羅含字君章少嘗晝卧夢一鳥文色異常徑飛入口杜祭酒别傳曰君新作被腰眠覺晏起乃嘆腰便眠使人不起異事因令看陌上有寒人舉被乞之常眠布被中㑹稽典録曰陳脩字奉遷少為郡幹受韓詩榖梁春秋家貧為吏常出擔上下恒食乾糒每至正臘僵卧不起同僚請不肯徃其志操如此吴越春秋曰楚平王遣使封者函印綬追召子胥子胥以夜半時卧覺忽而仰天悲嘆言曰父兄俱死當誰歸乎泣下交流恐為楚所得乃貫弓執矢歩出東郭韓子曰堂谿空見昭侯曰今有白玉巵無當有瓦器有當君渇將何以曰以瓦器空曰為人主漏泄羣臣之語猶玉巵之無當也昭侯扵是每與空話事歸輙獨卧惟恐夢言泄扵妻妾桓譚新論曰成帝幸甘泉詔揚子雲作賦倦卧夢其五臓出在地以手収内入覺太少氣一年卒郭子曰王長史病篤即王仲祖也寝卧燈下轉麈尾視之嘆曰如此人曽不得四十及亡劉尹臨殯以璧柄麈尾着棺中因悼絶世說曰袁紹年少時曾遣人夜以劍擲魏武小不着魏武撥之其後来必髙因帖卧床上劍至果髙又曰郝隆七月七日出日中仰卧人問何以答曰我曬書也語林曰王子敬在齋中卧偷入齋取物幞装一室之内畧無不盡子敬卧而不動偷遂復登厨欲有所覔子敬因呼曰偷兒青氊是我家舊物可特置不於是羣賦始知其不眠悉置物驚走睡左傳宣上曰趙宣子諌靈公患之使鉏麑賊之晨徃将朝尚早坐而假寐不觧衣冠而睡麑退而嘆曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死漢書禮樂志曰魏文侯最為好音而謂子夏曰聽古樂則欲寐及聞鄭衛之音予不知倦焉又曰陳咸字子康父萬年嘗病召咸敎戒扵床下語至夜半咸睡頭觸屏風萬年大怒欲杖之咸叩頭謝曰具曉所言大人敎咸謟也萬年乃不復言晏子曰景公田於吴丘夜猶早公坐睡而夢有五大夫北靣稱無罪公覺召晏子晏子對曰昔君靈公田五大夫駭獸故斷其頭而𦵏之世說曰魏武云我眠中不可妄近近便斫人亦不覺左右宜深慎此後佯睡所幸人竊以被覆之因便斫殺自後安眠人莫敢近者郭子曰許侍中領司空入王丞相帳中眠睡益部耆舊傳曰何􅕼為成都令嘗眠睡其覺悟便得姦詐咸服其發摘或以為有術得知之無敢復欺者太平御覽卷三百九十三
