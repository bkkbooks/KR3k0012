body:
  text: 太平御覽卷二百九十八宋李昉等撰兵部二十九軍制偏將軍制禮記曰六十不預服戎師出不踰時為怨思也踰時即内有怨女外有曠夫周禮曰五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍鄭𤣥曰兩二十五人卒百人旅五百人師二千五百人軍萬二千五百人也後漢書光武紀曰建武元年二月赦天下賜民爵一級年八十復二算九十復甲卒張晏注曰復甲卒不預革車之賦也白虎通曰王命法三十受兵六十歸兵國有三軍所以備非常伐無道尊宗廟重社稷安不忘危何以言有三軍也論語云子行三軍則誰與詩云周王于邁六師及之三軍者何法法天地人也以為五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍二千五百人為師萬二千五百人為一軍三軍三萬七千五百人也𫝊曰一人必死十人不能當百人必死千人不能當千人必死萬人不能當萬人必死横行天下雖有萬人猶謙讓不以自足故復加五千人因法月數月羣隂之長也十二月足以窮盡隂陽備物成功萬二千人亦足以征伐不義致天下太平穀梁傳曰天子六軍諸侯上國三軍次國二軍下國一軍諸侯所以一軍者何諸侯藩屏之臣也任兵革之重距一方之難故得有一軍也淮南子曰季武子為三軍為作也武子魯卿季文子之子季孫宿也周禮天子六軍諸侯大國三軍魯伯禽之封舊有三軍其後削弱二軍而已武子欲專公政故欲益中軍為三三家各有其一事在魯襄公十一年叔孫穆子曰不可天子作師公帥之以征不徳師謂六軍之衆公謂諸侯為王卿士者為元帥也元侯作師卿帥之以承天子元侯大國之君師三軍之衆大國三卿皆命於天子一卿命於其君無軍無三軍也若元侯有事則命卿帥其所教武衛之士以佐元侯禮所云次國二軍小國一軍謂以賦出軍從征伐賛佐治也自伯子男有大夫無卿無卿無命卿也王制小國二卿皆命於其君也帥賦以從諸侯賦國中出兵車甲士以從大國諸侯是以上能征下無姦慝征正慝惡今我小侯也言小侯削弱之日乆矣處大國之間大國齊楚也繕貢賦以供從猶懼有討猶懼以不給見誅討若為元侯之所為之所為謂作三軍元侯所為以怒大國無乃不可乎弗從遂作中軍中者明已有上下軍自是齊楚代討於魯代更襄昭皆如楚襄公昭公如楚朝事楚也穰苴兵法曰五人為伍十五為隊一軍凡二百五十人隊餘竒兵隊七十有五以為中壘守地六千尺積尺得四里以中壘四面乗之一面得地三百歩壘内有地三頃餘百八十歩正門為握竒大將軍居之六纛五麾金鼓府藏輜積皆中壘外餘八千七百五十人隊一百七十五分為八陣六陣各有一千九十四人六陣各減一人以為二陣之部署舉一軍則千軍可知凡兵者有四正四竒或合而為一或離而為八陣故以正合以竒勝通典曰毎軍大將一人别奏八人傔十六人副二人分掌軍務奏傔減大將半判官二人典軍四人總管四人二主左右虞候二主左右押衙傔各五人在衙官下子將八人委其分行陣辨金鼔及部署傔各二人執鼓十二人吹角十二人司兵司倉司驛司胄城局各一人毎隊五十人押官一人隊頭一人副二人旗頭一人副二人火長五人六分支甲四分支戰袍一分支鎗又周禮萬有二千五百人為軍軍將皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十有五人為兩兩司馬皆中士五人為伍伍皆有長軍師旅卒兩伍皆衆名也伍一比兩一閭卒一族旅一黨師一州軍一鄉家所出一人按司馬法二十五人為兩四兩為卒百人也五卒為旅五百人五旅為師二千五百人五師為軍一萬二千五百人萬二千象十有二月五百象閏管子謂齊桓公曰欲正卒伍修兵甲則大國亦將為之君若有征戰之事則小國有守圉之備矣公欲速得意於天下諸侯則事有所隱而政有所屬不顯習於兵事故曰事有所隱軍陣屬之田獵故有所屬公作内政而屬軍令焉三分齊國為髙子之里為國子之里為公之里以為三軍擇其賢民使為里君毎里皆使賢者為君鄉有行伍卒長則有制令且以田獵因以賞罰因田獵之功過期行賞罰則百姓通於軍事矣於是乃制五家以為軌軌為之長十軌為里里有司四里為連連為之長十連為鄉鄉有良人以為軍令是故五家為軌故五人為伍軌長率之十軌為里故五十人為小戎里有司率之四里為連故二百人為卒連長率之十連為鄉故二千人為旅鄉良人率之三軍故有中軍之鼓中軍則公之里卒也有髙國之鼓春以田曰蒐振旅因屬軍政而且整旅秋以田曰獮理兵順殺氣因理兵是故卒伍定於里軍政定於郊内教既成令不遷徙故伍之人人與人相保家與家相受少同居長同遊祭祀同福死䘮相恤灾禍同憂居處同樂行作同和哭泣同哀是故夜戰其聲相聞足以相親晝戰則其目相見足以相識歡欣足以相死是故以守則固以戰則勝君有此教士三萬人以横行於天下教士謂先教習之士也誅無道以定周室天下大國之君莫之能圉也又曰凡立軍一人曰獨二人曰比三人曰參比參曰伍伍人為列列有頭二列為火十人有長立火字五火為隊五十人有頭二隊為官百人立長二官為曲二百人立候二曲為部四百人立司馬二部為校八百人立尉二校為禆千六百人立將軍二禆為軍三千二百人有將軍副將軍唐書曰髙祖起義兵命太宗將兵狥西河郡下之癸巳建大將軍府以裴寂為長史劉文静為司馬具設官屬始置三軍分為左右以公子建成為隴西公左領大都督左三軍將軍悉𨽻焉命太宗為燉煌公右領大都督右三軍將軍悉𨽻焉開倉庫以賑窮乏逺近嚮應又髙祖二年秋七月壬申詔曰天生五材百物資其噐用武有七徳撥亂所以定功故黄帝垂裳尚有阪泉之戰放勲光宅猶稱丹浦之師禁暴安人率由茲道創業垂統莫此為先以是周置六軍毎習蒐狩漢増八校畢選勇能故化行九有威震百蠻奸宄不興䖍劉息志季葉凌替軍政湮亡卒伍不修旌旗舛雜部伍符籍空有調發之名竟無討襲之用遂使夷狄放命盗賊交侵争戰多虞黔黎殄䘮朕受天明命撫有萬方爰自義師克成帝業至如超乗之士莫匪百金彀騎之材豈唯七萃今雖關塞寧謐荒裔肅清伊洛猶蕪江湖尚梗役車未息戎馬載馳武備之方猶宜精練所以各因部校序其統屬改授旗鼓創造徽章取象天官定其名號庻使前矛後勁類别區分玉帳絳宫威徳充備蹈茲湯火譬彼椒蘭大定戎衣止戈斯在於是置十二軍分關内諸府以𨽻焉萬年道為參旗軍長安道為鼔旗軍富平道為𤣥武軍醴泉道為井鉞軍同州道為羽林軍華州道為騎官軍寧州道為折威軍岐州道為平道軍幽州道為招揺軍西麟道為苑游軍涇州道為天紀軍宣州道為天節軍時髙祖以天下未定實資武力將舉關中之衆以臨四方故出此制也毎軍一人副一人取威名素重者為之督以耕戰之務自是士馬精强無敵於天下矣五代周史曰顯徳初世宗自髙平還乃大閱武士帝親臨之帝自髙平之役覩諸軍未甚嚴整遂有退却至是命太祖皇帝一槩簡閱選武藝超絶者署為殿前諸班因是有散員散指揮内殿直散都頭鐡騎控鶴之號復命總戎者自龍捷虎捷以降一一選之老弱羸小者去之軍士歩伍無不精當由是兵甲之盛近代無比偏將尚書曰司馬掌邦政統六師平邦國左傳曰趙朔趙嬰齊為中軍大夫鞏朔趙穿為上軍大夫荀息趙同為下軍大夫韓厥為司馬又晉侯請於王戊申以黻冕命士㑹將中軍且為太傅於是晉國之盜逃奔於秦又楚子北師次於延沈尹將中軍子西將左子反將右將飲馬於西河而歸又魯宣公十年夏六月晉師救鄭荀林父將中軍先軫佐之士㑹將上軍郄克佐之趙朔將下軍欒書佐之公羊傳曰秋衛師入盛曷為或言帥師或不言帥師將尊師少稱將將卑師衆稱師論語曰王孫賈治軍旅奚其䘮衛靈公之無道得賈尚不䘮也史記項羽本紀曰於是梁為㑹稽守籍為禆將又項王召宋義與計事而大悅因以為上將項羽為魯公范増為末將又灌嬰傳曰嬰擊陳豨受詔别攻豨丞相侯敞斬敞及特將五人文頴注云特一之將後漢書西域傳曰大秦國一名梨鞬所治城周百餘里各有官曹文書置三十六將皆㑹議國事晉書曰張光字景武江夏鍾武人也身長八尺明眉目美聲音少為郡吏家世有部曲以牙門將伐吳有功遷江夏西部都尉又羊祜在軍常輕裘緩帶身不披甲鈴閣之下侍衛者不過十數人而頗以田漁廢政常欲夜出軍司徐徹執棨當營門曰將軍都督萬里安可輕出將軍之安危亦國之安危也徹今日若死此門乃開祜改容謝之蓋此後稀出矣又吳彦為小將吳大司馬陸抗竒其勇略將㧞用之患衆情不允乃㑹諸將宻使人佯狂㧞刀跳躍來坐諸將皆懼而走惟彦不動舉几拒之衆服其勇乃擢用焉又天文志曰太白為上將羽林為中軍又文昌六星在北斗魁前天府也一曰上將建武威二曰次將尚書中書司吏賞功也又郎將位北主閱旗所以為武備也又畢八星主邊兵戈其大星一曰天髙二曰邊將又參白獸之體其中三星横列三將也北曰左眉主左將西北曰右肩主右將故皇帝占參應七將七將大天下兵精又南三星騎陣將軍騎將也南三星車騎車騎之中將也又狼一星在東南狼為野將主侵掠也色有常欲不動也後周書曰賀㧞岳事爾朱榮以定䇿功授前將軍時万俟醜奴僣稱大號關中騷動朝廷深以為憂榮將岳討之岳私謂其兄勝曰醜奴擁秦隴之兵足為勍敵若岳徃而無功罪立至假使克定恐讒愬生焉勝曰汝欲何計自安岳曰請爾朱氏一人為元帥岳副帥之則可矣勝以為然乃請於榮榮大悅即以天光為雍州刺史以岳為衛將軍左都督隋書曰大業九年徴天下兵募民為驍果置折衝果毅武勇雄武等郎將官以領驍果唐書曰李質者汴之牙將李㝏既為畱後倚質為心腹及朝廷以㝏為郡守㝏志邀節鉞質勸不從㑹㝏疽發質乃與監軍姚文夀謀斬㝏傳首京師有詔以韓充鎮汴充未至質權知軍州事使衙兵二千人皆日給酒食物力為之損屈充將至質曰若韓公始至頓去二千人日膳人情必大去若不除之後必無繼斷不可畱此弊以遺吾帥遂處分停日膳而後迎充太平御覽卷二百九十八
