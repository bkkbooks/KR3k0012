  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_878-1a, image: WYG0900/WYG0900-0661a.png}
body:
  text: 太平御覧卷八百七十八宋李昉等撰咎徵部五雪不時雪赤雪霜晝霜雹霧黃霧赤霧黒霧虹霓白虹紫蜺雪左傳曰昭公四年正月大雪劉向以為昭公娶呉婚於同姓董仲舒以為季孫宿専政陰氣盛也漢書曰武帝時十二月大雨雪人凍死時衡山王謀反廢而殺之又曰元帝時十一月齊楚大雨雪深五尺時石顯䧟魏郡太守京房殺之又曰王莽天鳯中地震大雨雪深一丈竹栢枯死其年瑯琊女子吕母為子報仇黨至數萬時天下大亂饑晉書曰呉孫權時正月大雨雪平地三尺鳥獸死者大半將軍全琮攻畧淮南戰死者千餘人又曰孫亮時春大雨雪震雷既雷則雪不當復降而亮見廢宋書曰孝武時大雪平地三尺明年虜侵兾州後魏書曰世宗太平真君八年比鎮大雪人畜凍死時政嚴急司徒崔浩濫被誅不時雪左傳曰桓公八年八月雨雪劉向以為夫人有淫行將弑之象桓公不覺與夫人如齊而弑死凡雨隂也雪又雨之隂也出非其時迫近象也董仲舒以為隂氣盛也易通卦驗曰乾得坎之蹇則夏雨雪京房曰夏雨雪臣為亂漢書曰文帝時六月大雨雪後二年淮南王長謀反遷蜀道死又曰武帝時三月雨雪平地厚五尺是嵗御史大夫張湯有罪自殺丞相嚴青翟自殺三長史棄市又曰成帝陽朔四年四月二日雨雪燕雀死後二年許皇后廢晉書曰武帝時大雪明年有步闡楊肇之敗死傷甚衆又九月大雪折木又曰穆帝時八月大雪人馬凍死時政由臣下崔鴻十六國春秋曰前凉張祚和平元年大㑹黒風晝闇五月雨雪行人凍死祚廣征兵三十餘道入撃南山諸羌時入千里張掖人王鸞上書諫言軍不可行且有大變祚怒為妖言斬之祚與嚴展呉純升飛鸞觀征虜趙長校尉張璹入謙光殿拜張元靚為主咸稱萬嵗祚愕然便下曰欲殺我耶長曰然遂刺祚傷額殺之又曰後蜀李雄以晉咸康六年八月死其日宫内積雪自外則否石虎鄴中記曰虎以五月發五百里内萬人營華林苑至八月天暴雨雪雪深三尺作者凍死數千人太史奏作役非時天降此變虎誅起部尚書朱軌以塞天災廣五行記曰梁武帝時三月大雪平地三尺時義州刺史文僧朗以州叛於魏大同中七月青州雪害苗稼交州刺史李賁舉兵僣號後魏書曰静帝興和二年五月大雪時北齊神武發卒十萬築鄴城又有無君之心又曰武定時二月大雪人畜凍死隋書曰北齊武成河清二年二月大雪連日南北千里平地數尺時匈奴與周師入荆州殺掠萬人又曰武成任用和士開至後主復寵之隴東王胡長仁元舅之尊欲即政被士開所譛出為齊州刺史武平二年三月天忽降雪一尺餘時生苖已出雪覆之壠禾頭後㣲萎而不死百姓相謂曰禾不死壠凍長仁在齊州宻遣刺客殺士開事發勅遣使於齊州賜死則壠凍之驗赤雪晉書曰武帝大康七年河陰雨赤雪二頃霜謝承後漢書曰郎顗上事曰今嵗常有霜氣月不舒光日不宣耀陛下倦於萬機政有闕也抱朴子曰若霜氣有圍城或入於城則外兵得入若霜氣從内出主人出戰京房易傳曰興兵妄誅厥災夏霜殺五穀誅不原情兹謂不仁冬先雨乃隕霜有芒角賢聖遭害其霜附木不入地也毛詩曰正月繁霜我心憂傷正月夏之四月也繁多也四月建巳純陽用事霜多急恒寒若之異傷害萬物故心憂也春秋考異郵曰魯僖公即位隕霜不殺草李梅實梅李大樹比草為貴是君不能伐也定公即位隕霜不殺菽菽者稼最强季氏之萌又曰穆公即位仲夏霜殺草日中不消春秋命厯序曰桀無道夏出霜師曠占曰春夏一日有霜者君父母酷政大嚴大殺天以示之何以言之霜滅殺萬草坐不殺也見變如此宜損威殺重人之命漢書五行志曰左傳僖公時八月霜不殺草謂襄仲専權殺嫡立庶公室遂弱至三十三年冬霜不殺草劉向以為君誅不行舒緩之應是時公子遂専政三桓繼為卿皆為亂也又曰定公元年八月霜殺菽劉向以為誅罰不由君出在臣下之象是時季氏逐昭公死于外又曰武帝時四月霜殺草木是時天下户口減耗又曰元帝時三月九月隕霜殺稼時宏恭石顯専政廹逐忠烈進用邪佞又曰王莽天鳯六年四月霜殺草木則専政所致至地皇四年秋霜闗東人相食馬適王匡等起兵羣盗大亂晉書曰武帝時八月霜害豆又五月隕霜傷穀時大舉征呉又五月霜殺桑麥時王濬大功被䧟無辜又曰惠帝時三月霜傷木五月雨雹時賈后廢愍懐太子隋書曰梁武帝時三月六月降霜殺草時發卒拒魏百姓勞苦唐書曰太宗貞觀初突厥頡利可汗部落五月霜降至四年為僕射李靖所滅晝霜隋書曰北齊武城時晝霜下其下日𫝊位於太子緯雹京房易飛候曰雹下盡樹木枝害五穀者禮記月令曰仲夏行冬令則雹凍傷穀左𫝊曰昭公四年正月大雨雹季武子問於申豐曰雹可禦乎對曰聖人在上無雹雖有不為災古者日在北陸而藏氷西陸朝覿而出之其出入也時今棄而不用雹之為災誰能禦之春秋考異郵曰僖公九年秋昭三年冬並大雨雹時僖公専樂齊女綺畫珠璣之好掩月光陰精凝為災異昭公事晉陰精用宻故災史記曰周孝王七年厲王生冬大雹牛馬死江漢俱動及孝王崩厲王立王室大亂漢書曰宣帝太始中山陽濟陽雨雹如鷄子深二尺五寸殺飛鳥牛馬皆死七月大司馬霍禹謀反伏誅八月霍皇后廢成帝時四月楚國雨雹大如斧飛鳥死時王氏専政又曰王莽時雨雹殺牛羊莽殺其少子咸時天下大亂百姓窮愁起為盗賊後漢書曰安帝初元四年六月郡國三雨雹大如鷄子殺六畜時鄧太后以陰專陽政又曰獻帝初平四年六月扶風雨雹大如斗殺人時天下潰亂曹操専政帝臨虛器呉志曰孫權時雨雹權聽讒太子和見廢晉書曰武帝時五月雹傷禾麥壊屋時王濬有大功被䧟帝不斷陰脅陽之應又曰惠帝時六月雨雹深三尺時賈氏専政遂廢愍懐太子又曰元帝時風雹殺人時王敦擁兵不朝内外戒嚴又曰明帝時京都大雨雹鷰雀死又曰四月大雨雹是年蘇峻為亂又曰穆帝時六月雨雹大如升後四年張祚在凉州為宋混所滅宋書曰文帝元嘉三十年五月旴􅇇雨雹大如鷄卵明年冬太子劭兵亂隋書曰梁武帝大通中四月雨雹時帝數捨身作奴為沙門所制陰脅陽之應崔鴻十六國春秋曰後趙石勒時暴風大雨雹震建徳殿端門㐮國市西門倒殺五人雹起西河大如鷄子平地三尺洿下丈餘行人禽獸死者萬數歴千餘里樹木摧折禾稼蕩然勒問徐光光曰去年不禁寒食介子推帝鄉之神也歴代所尊故有此災又曰石遵時雨雹大如盂升後百餘日為石鑒所殺鑒為冉閔殺之隋書曰陳宣帝大建二年六月八日大雨雹十年四月十六日又大雨雹始興王叔陵刺後主於䘮次據東府反俄而伏誅霧禮記月令曰仲冬行夏令則氛霧冥冥晉書曰成帝咸和元年大霧步武不相見㑹稽王道子専政之應國志厯曰晉咸和元年三月霧殺桑果宋書曰晉安王子勛泰始中即偽位于尋陽其日雲霧四合旬日被殺齊書曰武帝時大霧竟天如煙入人眼鼻後二年皇太子死後魏書曰静帝武定年冬大霧六旬晝夜不解明年常侍荀濟華山王大器及元思僅等謀殺大將軍髙洋事洩荀濟等並戮於市隋書曰陳後主末年正月朔大㑹羣官大霧四塞人眼鼻辛酸明年降隋陸機别𫝊曰機被誅日大風折木天地霧合抱朴子曰伊尹受戮大霧三日兵書曰霧四面圍城必有兵到城下不出其月黃霧尚書中候曰桀為無道地吐黃霧漢書曰成帝初即位封舅王鳯王根等五人闗内侯其月黃霧四塞終日竟夜着地者如土塵奪日光王鳯等大懼又曰王莽天鳯元年六月黃霧四塞其年縁邉大飢人相食晉書曰惠帝時冬黃霧四塞六日乃止明年趙王倫簒位時朝昏兵亂帝屢蒙塵又曰明帝初年頻有黃霧四塞時王敦害尚書刁恊僕射周顗又曰穆帝時凉州黃霧下如塵時張重華納譛後年重華死嗣子見殺又曰孝武帝初年黃霧四塞時㑹稽王道子専政親近佞人又曰安帝時黃霧昏濁不雨時桓元謀逆帝返正頻年大霧時帝室衰㣲臣下權盛兵及土地畧非君有晉中興書徴祥説曰大寧元年十一月黃霧四塞王敦之應宋書曰文帝元嘉二十九年十二月黃霧四塞崔鴻十六國春秋曰前凉張茂四年正月黃霧四塞其年茂死也又曰前趙劉聰元年十月聰將趙固與晉車騎將軍王申相拒於延津時黃霧晝夜人不相見固軍大敗又曰後趙石勒建平四年黄霧四塞氛障蔽天十月大疫死赤霧春秋運斗樞曰血濁霧天下小寃後魏書曰世宗正始二年正月夜陰霧四塞初黑後赤又延昌元年黄霧蔽塞時帝舅肇擅權矯詔害諸王公之應黑霧晉書曰愍帝建興二年春霧著人如墨連夜五日時天下兵起後二年帝降劉曜又曰元帝永昌元年十月京師大霧黑氣蔽天日月無光十一月王敦舉兵崔鴻十六國春秋曰前趙劉聰建元元年正月朔日黑霧四塞終日竟夜著人如墨五日而止後三年聰子粲殺其弟虹蜺易通卦驗曰虹不時見女謁亂公虹者陰陽交接之氣陽倡陰和之象今失節不見者似人君心在房内不循外事廢禮失義夫人淫恣而不制故曰女謁亂公京房易妖占曰虹出君池若飲君井其君無後春秋潜潭巴曰虹五色迭至照于宫殿有兵革之事春秋感精符曰九女並譌則九虹並見黃帝占軍氣訣曰攻城有虹欲攻之應京氏别對災異曰虹蜺近日則姦臣謀貫日則客代主其救也釋安樂試非常正股肱入賢良漢書曰虹蜺陰陽之精又曰雨蜺下属燕王旦井中飲井水竭其後誅續漢書曰靈帝光和元年有黒氣墮北宫温明殿東庭中黒如車葢起起奮迅五色有頭長十餘丈形似龍上問蔡邕對曰所謂天投蜺者也不見足尾不得稱龍中平元年黃巾賊張角等起東觀漢記曰光和中有虹蜺降嘉徳殿上引楊𤾉等入金商門崇徳署問以祥異對曰天投蜺天下恐海内亂晉書曰愍帝建興五年正月帝在平陽虹蜺亘天其年帝為劉聰所殺崔鴻十六國春秋曰前趙劉聰麟嘉元年時東西赤虹經天南有一旗隋書曰周武帝建徳五年圍北齊後主於晉州是夜州城上有虹首南向尾入紫宫長十餘丈六月晉州䧟後主被擒白虹詩雅廣灾曰撓弱不立邪臣蔽主則白虹刺日為政無常天下懐疑則蜺逆行周禮春官眡祲曰掌十煇之灋以觀妖祥七曰彌史記曰鄒陽上書曰荆軻慕燕丹之義白虹貫日太子畏之漢書曰成帝即位時年二十委政諸舅王鳯王音等兄弟五人逓為宰相五人同拜封號五侯五侯専權賢者屏退京兆尹王章以直言被誅正月有白虹出于營室後漢書曰唐檀永建五年舉孝㢘除郎中是時白虹貫日檀因上便宜三事陳其咎徵書奏棄官去呉志曰諸葛恪自新城出住東興有虹見其舡還拜蔣陵白虹繞其車後遂被誅崔鴻十六國春秋曰後趙石季龍建武六年大旱白虹經天建武九年白虹出大社連天至十四年國亂紫蜺太𤣥經曰紫蜺圍日其疾不割太平御覧卷八百七十八
