  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_299-1a, image: WYG0895/WYG0895-0596a.png}
body:
  text: 太平御覽卷二百九十九宋李昉等撰兵部三十練士兵衆隊伍練士通典搜才凡為將統戎在知士之器局當設科目差等優異應機而任以收其效曰選士之科沉謀宻畧出人者詞辯縱横能移奪人之性情堪辯説者能徃來聽言語覽視四方之事軍中之情偽日列於前者能得敵人之主佐門廬請謁之情堪間諜者能知山川險易行止形勢利害逺近井泉水草逕路迂直堪鄉導者巧思出人製造五兵及攻守噐械者引彊徹扎戈鋌劒㦸便於利用挺身捕虜搴旂斬將堪陥陣者趫揵若飛踰越城塹出入無形堪窺覘者徃返三百里不及暮至者破格舒鈎或負六百斤行五十歩四百斤行百歩者推歩五行瞻風雲氣候轉式多言天道詭説隂陽者此雖非兵家本事所要資權譎以取勝耳罪犯者父子兄弟破執讐者貧窮忿怒將欲快其志者故贅聓入虜欲昭迹揚名者長短經曰夫王者帥師必練簡英雄知士髙下因能授職各取所長為其股肱羽翼以伸威神然後萬事畢矣腹心一人主理繁應卒揆天消變摠撮計謀保國全命者也謀士五人主國安危謀慮未然論才能明賞罰受官位决嫌疑定可否者也天文三人主占星厯候風氣理時日考効驗占灾異知天心去就者也地利三人主軍行止形勢利害逺近險易水涸山阻而不失地利者也兵法九人主講論異同行事成敗練簡兵器凡軍陣所用利于兵法者也通粮四人主廣飲食宻蓄積通粮道致五穀令三軍不乏食用也奪威四人主擇才士諭兵馬風流電掣不識所由竒狀也鼓旂三人主佐旂鼔傳宣號令倐忽徃來出入若神股肱四人主出旂節任重持難修溝壍治壁壘回轉守禦者通才三人主拾遺補過集㑹術數周流並㑹應待賔客議論談語争息結解也權士三人主竒譎殊異非人所識行無窮之變也耳目七人主徃來聽言語覽視四方之事軍中之情偽日列於前也爪牙五人主揚威武激厲三軍冐也難死攻正令三軍勇猛羽翼四人主飛名譽震逺近動移四境以弱敵之心也游士八人主伺徴祥候開闔視敵人為謀者也偉士二人主為諸詐依托鬼神以惑敵心法算二人主計㑹三軍令理萬物也方士二人主為藥以全傷病也軍中有大勇敢死樂傷者聚一為卒名曰冐將之士有勃氣壮勇强暴者聚一為卒名曰䧟陣之士有學於長劍􅿹弧接武齊列者聚為一卒名曰銳竒之士有破格舒鈎强梁多力能潰破金鼓絶㓕旂旌者聚為一卒名曰勇力之士有能踰髙超逺輕足善走者聚為一卒名曰冠兵之士有故王臣失勢欲復見其功者聚為一卒名曰死闘之士有死事之人昆弟為其將報讐者聚為一卒名曰死貴之士有貧窮忿怒将快其志者聚為一卒名曰必死之士有故贅聓入虜欲昭迹揚名者聚為一卒名曰厲頓之士有辯言巧辭善毁譽者聚為一卒名曰間諜飛言弱敵之士有故激厲免罪之人欲逃其恥者聚為一卒名曰幸用之士有才伎過人能負重行百里者聚為一卒名曰待令之士夫卒强將弱曰陁音豕吏强卒弱曰䧟兵無選鋒曰北必然之勢矣故曰兵衆勢强士卒熟練知之者勝不知之者不勝不可忽也兵衆書曰如虎如貔如熊如羆於商郊又曰用咸戒於王曰王左右常伯常任凖人綴衣虎賁詩曰予王之爪牙予王之爪士周禮曰司戈盾掌戈盾之物而頒之軍旅㑹同授貳車戈盾建乘車之戈盾授旅賁及虎士戈盾左𫝊曰彤弓虎賁文公受之以有南陽之田又曰組甲三千被練三百史記曰蘇秦説惠王曰以韓卒之勇被堅甲帶利劍一人當百夫以韓之勁與大王之賢乃西面事秦為天下笑漢書晁錯云陛下又興數十萬之衆以誅數萬之匈奴以衆寡計之以十擊一之術也後漢書光武紀曰伯升拔宛已三日而世祖尚未知乃偽使持書報城中云宛下兵到而陽墮其書尋邑得之不憙諸將既累㨗膽氣益壯無不一當百後漢書曰光武起王莽遣大司徒王尋大司空王邑王莽時哀章所獻金匱圖有王㝷姓名王邑王商子於莽為從父兄弟也將甲百萬其甲士四十二萬人五月到潁川復與嚴尤陳茂合潁川郡今洛州陽翟縣也又曰王元説隗囂曰今天水完富士馬最强北收西河上郡東收三輔之地按秦舊迹表裏河山秦外山而内河元請以一丸泥為大王東封函谷關此萬世一時也又曰河南賊張歩據齊地耿弇討敗之歩肉袒負斧鑕於軍門鑕鍖也示必死鍖音竹林反弇傳歩詣行在而勒兵入據其城樹十二郡旗鼓弇凡平城陽琅邪髙宻膠東東萊北海齊千乘濟南平原泰山臨淄等令歩兵各以郡人詣旗下衆尚千餘萬輜重七千餘兩皆罷遣歸鄉里齊地悉平又曰建安中劉表為荆州牧即今江陵郡也𤣥德時在荆州衆力尚少諸葛亮曰荆非少人也而著籍者寡平居發調即人心不悦凡有游户皆使自實因録以一衆可也𤣥德用其計故表衆遂強其後表幼子琮乃以州衆附於曹操又曰百官志云節從武賁比二百石東觀漢記曰上賜馮異璽書曰聞吏士精銳水火不避搆賞之士必不令將軍負丹書失斷金也魏志曰張繡反魏太祖出戰不利輕騎引去典韋戰於門中賊不得入兵遂散從他門並入時韋校尚有十餘人皆殊死戰無不一當十賊前後至稍多韋以長㦸左右擊之左右死傷者畧盡晉書曰桓𤣥使陶謙屯覆舟山劉毅至蔣山裕棄弱登山多張旂幟𤣥不知測裕與毅分為數隊進突謙陣皆殊死戰無不一當百謙等諸軍一時奔散裕則劉裕也又職官志曰左衛將軍領雄渠武賁右衛將軍領飛武賁又天文志曰武賁一星在太㣲西蕃北下名南静室旄頭之騎官也徐爰宋書曰衆推髙祖為盟主移檄京邑遇吳甫之者驍将也其兵甚銳髙祖躬執長刀徑入其陣衆皆披靡甫之進至羅洛橋髙祖望賊旂鼓誓衆馳進挺劒指麾光燿如電將士皆莫敢仰視但馮神武爭為先登殊死戰無不一當百蕭方等三十國春秋曰陳安奔隴城前趙將劉賁馳將追之石虎止賁曰窮㓂歸兵不可迫也我士卒連勝皆已怠矣以驕怠之卒當致死之衆恐無萬全之利賁曰不然彼銳氣盡矣衆心畢沮人懐苟免莫有鬬志我卒乘猛氣甚盛皆一當十豈彼沮䘮之餘所能抗者乃躬先士卒戰輙敗之遂圍安於隴城又曰定陽人梁犢因怨趙也謀兵東還犢自稱大將軍率衆攻下辨尅之犢軍人皆多力善射一當十餘無兵甲惟用大斧施一丈柯攻戰若神所向崩潰後魏書曰趙燕鳯嘗使於苻堅曰彼國人馬實為多少鳯曰控弦之士數十萬見馬百萬疋堅曰卿言人衆可爾説馬太多是虛辭耳鳯曰雲中川自東山至西河二百里北山至南山百有餘里每嵗孟秋馬常大集畧為滿川以此權之使人言之猶尚未盡堅厚加贈遺又曰宋遣沈攸之呉憘公領卒數萬從泝清而進欲援下邳尉元遣孔伯恭率歩騎一萬以拒之并以攸之前敗軍人傷殘手足􅏿瓦膝行者盡送令還又官氏志曰太和中定品令有戰盾武賁將軍有募員武賁將軍有髙車武賁將軍又曰河北賊葛榮為魏將爾朱榮所擒餘衆悉䧏以賊徒既衆若即分部恐其疑懼或更結聚乃普告聽從所樂親屬相隨任所居止於是羣情喜説登即四散數十萬衆以時散盡待出百里之外乃使分道押領隨便安置咸得其宜擢其渠帥良才授用新附者咸安時人服其處分幾速三國典畧曰凡諸部曲平使招㩦赴投戎行前後行集霜戈電㦸無非武庫之兵龍甲犀渠皆是雲臺之仗文選曰雲屯七萃士魚麗六郡兵又曰士馬精研陸士衡辨亡論曰於是雲興之將帶州飈起之師跨邑哮闞之羣風驅熊羆之衆霧集又曰夫曹劉之將非一世所選向時之師無曩日之衆又曰孫子荆為石仲容與孫皓書曰今百僚濟濟俊乂盈庭虎臣武將折衝萬里國富兵强六軍精練隊伍太白隂經曰陽隊起一至九隂隊起九至一隊有五十人五人火長五九不失四十五人之數卒間容卒相去二歩隊間容隊相去一十八前後十歩隊其前後相去亦如之黄帝曰車間容車隊間容隊曲間容曲是也衛公兵法曰諸道狹不可並行者即第一戰鋒隊為首其次右戰隊次之其次左戰隊次之其次右駐隊次之其次左駐隊次之若道平川闊可以並行者宜作統法每統戰之銳隊居前兩戰並行次之又兩駐隊並行次之餘統准此若更堪齊頭行者毎統五隊横列齊行後統次之如毎統三百人簡取二百五十分為五隊第一隊抑戰鋒第二隊為主隊隊頭一人副隊頭一人其下等五十人為輜重隊别著隊頭一人每戰日守輜重遥為聲援若兵數更多皆類此諸將軍折衝果毅必須排定隊伍每引行發營須依次第戰日有罪須罰有功須賞依名排次甚為省易不然推逐稍難爭競不定又曰毎隊各給一旂行則引隊住則立於隊前大總管及副總管則立十旂以上副總管則立四旂以上行則前住則立於帳側統頭亦别給異色旂擬臨陣之時辨其進退駐隊等旂别様别造另引輜重各令本營行隊識認此旂諸軍相去既逺語聲難徹走馬報又勞煩故建幟用為節度旂方面旂舉當方面兵急須裝束旂向前亞方面兵急須進旂三豎即住旂卧即為審細看大將所舉之旂大將方面旂東方碧南方赤西方白北方黒專㸔方色亞處即是其方賊來便須禦捍攻擊又曰諸軍將戰每營跳盪隊馬軍隊竒兵隊戰鋒隊駐隊等分折為五等當軍各令一官押令出戰之時先用集等兵戰鬭如更須兵以次更須某等兵用盡當營輜重隊不得輙用亦各一官人押令使壁壘各令行其部伍不使紛雜自餘節度一依横陣太平御覽卷二百九十九
