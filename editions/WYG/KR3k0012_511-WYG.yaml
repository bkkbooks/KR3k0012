body:
  text: 太平御覽卷五百一十一宋李昉等撰宗親部一祖父母父母繼母祖父母釋名曰祖祚也祚先也禮記曲禮曰逮事父母則諱王父母不逮父母則不諱王父母毛詩商頌曰無念爾祖聿脩厥徳漢書曰虞詡陳國人祖父為郡縣獄吏務在寛恕常稱曰東海于公高其里門定國卒至丞相吾治獄六十年雖不及于公子孫何得不為九卿故字詡曰昇卿後選僕射尚書令漢書曰路温舒字長君從祖父受厯數天文也晉書曰何曾侍武帝宴退告其子遵曰國家應受命創業垂統吾毎侍宴未經聞經國逺圖唯說平生常事非貽厥孫謀之兆也後嗣其殆乎此吾子孫之憂汝等有可患指孫曰此輩必遇亂亡之及遵之子緩死兄嵩哭之曰吾祖其殆聖乎又曰李宻字令伯父早亡母改醮祖母劉撫養宻奉事以孝謹聞有暇則講學亡度師事譙周門人方之㳺夏大始初徴為太子洗馬宻以祖母老上表云臣無祖母難以至於今日祖母無臣難以終餘年母孫二人更相為命臣宻今年四十四祖母年九十六是臣盡節於陛下之日長而恭事於劉氏之日短劉終後復為太子洗馬又曰王爽字季明强正有志厯侍中嘗與㑹稽王道子飲道子醉呼為小子爽曰亡祖長史與簡文帝為布衣之交亡姑亡婦伉儷二宫何子之有又曰苻生字長生健第二子幼而無賴祖洪甚惡之生而無禮一目為童兒洪戯之曰吾聞瞎兒一淚信乎生怒引佩刀自刺出血曰此一淚洪大驚鞭之生曰性耐刀槊不堪杖箠洪曰吾以爾為奴生曰可不如石勒也洪懼跣而掩其口陳留志曰范喬字伯山年二嵗祖父馨臨終執其手曰恨不見汝成人因以所用硯與之至五嵗祖母以告喬喬便執硯流涕江㽔别傳曰㽔年十一始樗蒲祖母費為説往事有博奕破業廢身於是棄五木終身不以為戯父母爾雅曰父為考母為妣毛詩陟岵曰孝子行役思念父母也陟彼岵兮瞻望父兮陟彼屺兮瞻望母兮又蓼莪曰蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞蓼蓼者莪匪莪伊蔚哀哀父母生我勞瘁無父何怙無母何恃出則銜恤入則靡至父兮生我母兮鞠我撫我畜我長我育我顧我復我出入腹我欲報之徳昊天罔極禮記曲禮曰生曰父曰母死曰妣曰考左傳隐公曰鄭荘公母弟共叔以母之寵請邑居之京叚遂以京叛公伐叚叚出奔遂寘母姜氏於城頴而誓之曰不及黄泉無相見也既而悔之頴考叔曰若掘地及泉隧而相見其誰曰不然公從之遂為母子如初又荘公曰宋南宫長萬作亂奔陳以乗車輦其母一日而至又成公曰晉敗齊師於鞌齊請平晉人曰必以蕭同叔子為質對曰蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也吾子布大命於諸侯而曰必質其母以為信其若王命何且示以不孝令也又襄三曰晉叔向之母妬叔虎之母美而不使其子皆諫其母其母曰深山大澤實生龍蛇彼美余懼其生龍蛇以禍汝汝敝族也余何愛焉使往親寝生叔虎美而有勇欒盈嬖之故羊舌氏之族及於難公羊傳曰惠公者何隐之考也仲子者何桓之母也史記曰趙括奢之子趙孝成王欲以括為将母曰不可使也王曰母何以知之對曰妾事其父時其父為将王之所賞賜盡散與軍吏士大夫受命之日不問家事今括一朝為将軍吏不敢仰親之所賜悉藏於家而視利便田宅父子異心願王勿遣王曰母致之吾已决矣母曰王必遣忽有不稱妾乞不坐王許之後果敗為白起所坑漢書曰王陵沛人以兵屬漢王項羽得陵母置於軍中以招陵後漢使至陵母謂使者曰為老妾語陵漢王長者必有天下善事之無以老妾在故懐持二心遂伏劒而死羽怒烹之又曰陸賈使南越趙佗賜陸生槖中装直千金佗送亦千金吕后時病免歸家有五男乃出所使得越槖中装賣千金分與其子各二百金盡為生産賈常乗安車駟馬從歌舞鼓吹琴瑟侍者十人有寳劔直百金謂其子曰與汝約過汝給吾人馬酒食極歡十日而更所死家得寳劍及車騎從者又曰金日磾字翁叔休屠王太子也父以降漢見殺與母閼氏弟倫俱没入官後拜光禄大夫既親近未嘗有過武帝甚信愛之日磾母教誨兩子甚有法度上嘉之及死詔圖形於甘泉宫曰休屠王閼氏也日磾毎見畫拜泣不止又曰霍去病父仲孺河東人以縣吏給事平陽侯家與侯侍者衛少兒私通生去病仲孺吏畢歸家娶婦生子不相聞乆之去病為驃騎将軍撃匈奴道出河東至平陽傳舎遣迎仲孺趍入拜謁将軍迎拜因跪曰去病不早自知為大人遺體也仲孺扶服叩頭曰老臣得託命将軍此天力也去病為之大買田宅奴婢而去又曰嚴延年字次卿東海下邳人為河南太守冬日行屬縣刑戮囚徒流血數里河南號屠伯母見罵之曰汝宣化千里不聞人愛之殺人立威名豈為人父母㢤天道神明人不可獨殺我不意老見壮子被刑戮也行矣去東歸掃墓地耳嵗餘果敗延年兄弟五人皆有吏才並至大官東海號為萬石嚴嫗又曰雋不疑為京兆尹每行縣録囚徒還其母輙問有所平反治㡬人耶不疑多有平反母喜為之食或無所出母怒而不食故不疑為吏嚴而不殘後漢書曰竇武字游平扶風人初武生母産武并産一蛇送之林中後母卒𦵏有一大蛇自榛草出至撃柩流血若哀泣之容時人以為竇氏之祥又曰楊彪為太尉子脩為曺操所殺操見彪問曰君何痩之甚也彪曰媿無日磾先見之眀猶懐老牛䑛犢之愛操為改容又曰范滂字孟博汝南征羌人也建寧二年大誅黨人滂母就與之訣滂白母曰仲博孝敬足以供養仲博滂弟也滂從龍舒君歸黄泉存亡各得其所惟大人割不可忍之恩勿増感戚母曰汝今得與李杜齊名死何恨滂跪受教再拜而辭顧謂其子曰吾欲使汝為惡則惡不可為使汝為善則我不敗徳行路聞之莫不流涕又曰黄憲字叔度汝南人世貧賤父為牛醫袁閬母謂閬曰汝從牛醫兒来耶對曰閬不見叔度以為可及既覩其人則瞻之在前忽然在後固難測矣又曰廬江蔡宗字孟承競業嚴正其子未嘗見面子為二千石求謁宗宗下帳不許子伏於庭其母穿壁使其子窺之乃識儀貌又曰崔發事王莽位至大司空母師氏通百家之言莽以殊禮加之號成義夫人金印紫綬乗文軒丹轂又曰張甫字孟侯汝南人為太尉雖在公位父常居田里每有遷職一詣京師公卿罷朝俱謁甫府奉酒上夀時人榮之吳志曰蒋欽母踈帳縹被妻妾布裙孫權歎其在位能守約儉勅御府為母作被及幃帳晉書曰劉惔字貞長沛人少清簡有竒才與母任氏寓居京口家貧織芒屩以為養雖閉門圭竇晏如也又曰伏滔字𤣥度平昌人甚有才學知名拜著作郎孝武㑹西堂滔預坐還下車先呼子孫曰百人髙㑹天子先問伏滔在座如此固未易得為人作父如此如何又曰氾毓字稚春濟北盧人奕世儒素敦睦九族時人號之兒無常父衣無常主又曰荀羡字令則清和有準􅅻年七嵗遇蘇峻難随父在石頭峻甚愛惜之置羡於膝上羡乃隂白其母曰得一利刀子足以殺賊母掩其口又曰虞譚母孫氏訓子以節義朝廷嘉之拜昌武太守丞相以下皆拜之年九十五譚立養堂於家又曰郄詵濟隂人對䇿高第拜議郎母憂去職母在日苦病不欲車載家貧無以市馬乃於住堂北壁外假塟朝夕拜哭養雞種麻竭其方術䘮過三年得馬八匹輿棺至塚負土成壙又曰韓康伯潁川長社人母殷氏高明有行家恒貧伯年數嵗大寒母作布襦令伯捉熨斗而謂之曰且著布襦尋復作袴伯曰不須母問故曰火在斗中柄熱今上著襦下亦暖矣又曰羊耽妻辛氏隴西人侍中毗之女有才鑒鍾㑹為鎮西請其子琇為恭軍母曰吾為國家今日難至吾家矣行矣戒之軍旅之間可以濟者惟仁恕乎古之君子入則致孝於親出則盡忠於國在職思其所司在義思其所立無貽父母憂患而已後㑹至蜀果反琇竟以道全身又曰桑虞字子深魏郡黎陽人五代義居閨門雍睦青州刺史苻月甚重之嘗詣虞家升堂拜母時以為榮又曰周顗母李氏名絡秀汝南人中興時顗等並列顯位常冬至置酒絡秀舉酒賜三子曰吾本渡江託足無所不謂爾等並居貴位在吾目前吾身後何憂嵩起曰恐不如尊㫖伯仁志大而才短名重而職闇好因人之弊此非自全之道嵩性抗直亦不容於世唯阿奴碌碌在阿母前耳後果如其言阿奴即謨小字也又曰劉琨為并州刺史母謂之曰汝能𢎞濟經畧驅駕豪傑專欲除勝己以自安當何以濟禍必及我也後父母并為劉聰所害又曰朱序字次倫義陽人鎮㐮陽苻堅令苻丕圗序序母韓氏自登城履行謂西北角必先破受弊遂領百餘婢及城中女同丁築城三十餘丈後賊果從西北角攻衆潰城破遂固新築丕用引退得免城破㐮陽人謂此城為夫人城宋書曰張興世字文徳竟陵人以平江陵功轉右将軍父仲字子由興世致位給事中欲往襄陽又愛戀鄉里不肯去嘗謂興世曰雖田舎翁樂聞鼓角汝可送一部與吾行田時吹之興世素儉謹畏法白父曰此乃天子鼓角非田舎翁所吹乃止興世欲拜墓仲曰汝衛從甚多恐先人驚怖興世减撤而行又曰朱脩之義陽人加建武将軍留戍滑臺為索虜所攻母悲憂一旦乳汁驚出因號慟告家人曰我老非有乳汁之時今忽如此我兒必殁矣後數日㐫問至脩之果其日陷殁梁書曰王僧孺幼貧其母鬻紗布以自業嘗擕孺於市道塗中逢中丞鹵簿驅廹落溝中及孺拜中丞日引騶清道悲不自勝劉璠梁典曰張充字延符呉人父緒特進有重名充少不問細行肆意畋放時緒請改過呉始入西郭值充正獵左手臂鷹右手牽犬遥望見父乃脫韝放鷹紲犬向舟而拜緒曰一身兩役無亦勞乎充跪對曰充聞三十而立今二十九年矣請至来嵗終身折節緒曰若過而能改乃顔子矣及明年乃一朝易操尋師就學博覧今古鬱為名士蕭方等三十國春秋曰蘇峻作逆領軍卞壺以王師敗績遂单騎赴難二子從之俱殁母裴氏撫屍而哭之父為忠臣子為孝子夫何恨乎徴士翟陽聞之歎曰父死於前子殁於後忠孝之道萃於一門可謂賢矣又曰呉司徒孟宗少從南陽李肅學母為厚褥大被或問故曰小兒無徳可容而學者多貧故為廣被可得氣類相接也列女傳曰鄒氏孟軻之母見孟子少而學歸母方織問之曰子之廢學若吾斷織孟子懼因更勤不息遂成大儒世説曰華歆遇子弟甚整雖闇室之内儼然若朝典也又曰陳元方遭父憂哭泣甚哀容體骨立其母愍之竊以錦被䝉之郭林宗弔而見之謂曰卿海内名士四方是則如何當䘮以錦被焉孔子曰衣夫錦也食夫稲也於汝安乎吾不取也因奮衣而去自後賔客數至絶㫖百日繼母儀禮子夏傳曰繼母如母何以如母繼母之配父與親母同故孝子不敢殊也東觀漢記曰應慎字仲華為東平相事後母至孝精誠感應梓樹生㕔前屋上徙置府庭繁茂長大後漢書曰鮑永字君長上黨人事後母至孝妻于母前叱狗永遂去之晉書曰凉武昭王李𤣥盛后尹氏初適扶風馬元元卒為𤣥繼室以再醮之故三年不言撫前妻子如己所生又曰王祥字休徴琅琊人至孝繼母朱氏不慈由是失愛於父令掃除牛下祥愈恭謹父母有疾衣不觧帶母令守丹柰實每風雨則抱而哭母常思黄雀炙忽有黄雀數十飛入幕遂以供母三十國春秋曰王延九嵗䘮母行孝有聞後母卜氏御之無道延恭事彌謹卜嘗取蒲穣敗蔴與之貯衣延知而不言卜冬月杖之流血令求生魚延扣氷慟哭而得與之卜乃心悟撫之如所生也又曰晉安帝時郭逸妻以大竹杖打逸前妻之子子死妻因棄市如常刑家語曰曾参武城人志存行道後母遇之無恩其妻蒸梨不熟出之人曰此非七出也答曰蒸梨小物不用吾命况大事遂遣之終身不娶其子請焉告之曰高宗以後婦出孝已尹吉甫以後妻嫉伯竒知其得免非乎琴操曰尹吉甫周卿也子伯竒母早亡吉甫更娶後妻乃譛之於吉甫曰伯竒見妾羙欲有邪心吉甫曰伯竒慈仁豈有此也妻曰置妾空房中君登樓察之妻乃取毒蜂綴衣領令伯竒掇之於是吉甫大怒放伯竒於野宣王出逰吉甫從之伯竒作歌以感之宣王聞之曰此放子之辭也吉甫乃求伯竒而感悟遂射殺其妻捜神記曰衡農字剽卿東平人少孤事繼母至孝嘗宿于他舎值雷雨頻夢虎嚙其足農呼妻相出於庭叩頭三下屋忽然而壊壓死者凡百餘人唯農夫妻獲免太平御覽卷五百一十一
