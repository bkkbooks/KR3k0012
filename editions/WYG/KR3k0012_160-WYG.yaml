front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_160-1a, image: WYG0894/WYG0894-0453a.png}
body:
  text: 太平御覽卷一百六十宋李昉等撰州郡部六河南道下滑州濮州濟州鄆州青州齊州淄州莱州登州宻州徐州泗州兖州海州沂州滑州十道志曰滑州靈昌郡置在白馬禹貢兖州之域春秋時衛地戰國時屬魏秦為東郡地左傳曰狄滅衛衛立戴公以廬于曹今白馬地即曹邑也衛文公自曹邑遷于楚今衛南地也衛成公又遷于帝今濮陽縣也史記曰秦始皇五年拔魏十五城始置東郡後漢書曰樊絛封燕侯即東郡也濮州十道志曰濮州濮陽郡置在鄄城縣禹貢兖州之域春秋時衛地戰國時屬齊秦併天下即東郡地在漢爲濟隂郡之鄄城縣左傳曰齊桓公㑹諸侯于鄄杜注曰衛邑今東郡鄄城是也史記曰齊威王九年趙伐我取鄄左傳曰衛侯夢於北宫見人登昆吾之墟注云衛有觀在昆吾之墟今濮陽城是史記曰舜耕于厯山耕者讓畔應劭曰厯山即雷澤中山也水經曰昔師延爲紂作靡靡之樂武王伐紂延東走自投濮而死衛靈公將之晉舍於濮水之上夜聞歌聲召師涓受之濟州十道志曰濟州濟隂郡置在盧縣禹貢兖州之域春秋時其地屬齊秦兼天下爲東郡茌平地茌音仕淄反左傳曰齊鄭盟于石門尋盧之盟杜注曰今盧縣故城是史記曰扁鵲生盧故曰盧醫酈道元注水經曰碻磝城西即故茌平縣城碻磝即今州是也沈約宋書作敲囂字宋書曰元嘉七年到彦之北征拔碻磝後失之至二十七年以王𤣥謨爲寧朔將軍先鋒入河平之於此固守因置碻磝城郡國志曰後魏置濟州於單父城中昔石勒於耕處聞鼔角之聲即此圖經曰東阿春秋時齊地也郡國志曰其地岀繒縑故秦王服阿縞十道志曰石窌在長清縣左氏傳曰齊晉戰于鞍齊師敗績齊侯自徐關入辟女子曰君免乎曰免鋭司徒免乎曰免既而問之辟司徒之妻也與之石窌鄆州十道志曰鄆州東平郡置在須昌縣元和郡國志曰禹貢兖州之域春秋時屬宋即魯附庸須句國句音劬戰國時其地屬魏秦爲薛郡地漢爲東平國左傳曰晉人執季文子於莒丘公還待於鄆杜注曰鄆魯西邑又僖二十二年伐邾須句僖公將也又哀公十四年西狩于大野叔孫氏之車子鉏商獲麟賜虞人大野即鉅野縣青州十道志曰青州北海郡置在益都縣元和郡國志曰少昊之墟古青州之地舜時以青州越海遼逺分爲營州武王克商封師尚父於齊營丘周成王少時命太公東至于海西至于河南至於穆陵北至於無棣五侯九伯實得征之後子孫爲秦所滅分齊地置齊瑯琊二郡漢爲臨淄郡圖經曰少昊之代爽鳩氏虞夏則有季萴仕則反湯公逄公伯陵逄音蒲江反殷末有蒲姑皆爲諸侯國於此地周成王時蒲姑與四國作亂成王滅之以封太公史記曰齊有清河濁河可以爲固長城鉅防足以爲塞又曰蘇秦東説齊宣王曰齊南有泰山東有瑯琊西有清河北有渤海此所謂四塞之國也齊地方二千餘里齊軍之良進如鋒矢戰如雷霆解如風雨即有軍役未嘗倍泰山絶清河渉渤海也臨淄甚富其民無不吹竽鼔瑟彈琴擊筑鬭雞走狗臨淄之塗車轂相擊人肩相摩連衽成帷舉袂成幕揮汗成雨家給人足志氣高揚又曰齊所以名齊者有天齊祠也又封禪書曰始皇遊海上祠名山大川及八神求羡門之屬八神一曰天主祠天齊天齊淵水居臨淄南郊山下漢書曰夫齊東有瑯琊即墨之饒南有泰山之固西有濁河之限北有北海之利地方二千里持㦸百萬懸隔千里齊得十二焉又曰齊有三服之官綺爲首服紈素爲冬服輕綃爲夏服韓詩外傳曰齊景公遊於牛山之上北望齊國曰羙哉國乎鬱葱使古而無死則寡人將去此何之矣俯而泣下涕沾襟國子高子曰然臣頼君之賜疏食惡衣可得而食也駑馬柴車可得而乗也且猶不欲死而况君乎又俯首而泣晏子笑曰樂哉今日之遊宴也見怯君一諛臣二使古而無死則太公丁公至今猶存吾君方將被萊笠而立畎畝惟農事之恤何暇念死乎公慙乃引觴韓子曰景公與晏子遊于少海登栢寢之臺而望其國曰美哉堂堂乎後代孰有此晏子曰其田氏乎公曰寡人有國而田氏有之奈何對曰君欲奪之則近賢逺不肖振窮恤孤雖十田氏其如君何齊記曰晉永嘉五年東萊牟平曹嶷爲刺史所築城有大澗甚廣因之爲固謂之廣固城則有五龍口崔鴻十六國春秋南燕錄曰慕容德初議所都尚書潘聽曰青齊沃壤號曰東秦土方二千里四塞之固負海之饒可謂用武之國廣固者曹嶷之所營山川險峻足爲王者之都從之齊州十道志曰齊州齊南郡置在厯城縣古兖州之域周禮曰𤣥枵齊之分野左傳曰晉平公伐齊戰于厯下史記曰舜耕于厯下竹書穆天子傳曰天子自五鹿東征釣於漯水以祭淑人己巳天子東征飲于漯水之上漯水在紀阿即今禹城縣郡國縣道記曰章丘古高唐縣也春秋時齊邑史記曰齊威王使盻子守高唐趙人不敢東漁于河淄州十道志曰淄州淄川郡置在淄川縣禹貢青州之域周之九州爲幽州之境春秋及戰國時屬齊秦爲齊郡漢爲濟南郡之般陽縣漢志曰般陽屬濟南郡應劭曰在般水之陽王莽曰濟南亭圖經曰長山縣本漢於陵縣也隋改焉以界内長白山爲名漢志曰於陵屬濟南郡王莽曰於陸郡國志曰長山於陵城散宜生得瑞獸之地萊州十道志曰萊州東萊郡置在掖縣禹貢青州之域周之九州爲幽州之境秦置三十六郡屬齊郡漢志高祖置東萊尚書禹貢曰萊夷作牧左傳曰齊侯伐萊萊人使正輿子賂夙沙衛以索牛羊皆百疋齊師乃還後齊人復入萊萊恭公浮柔犇堂晏弱圍堂滅之遷萊子於郳郡國志曰東莱以其在齊國之東故云東莱史記曰周武王封太公於營丘萊侯聞之遂與太公爭營丘左傳曰聊攝以東姑尤以西其爲人也多矣聊攝齊西界姑尤齊東界謂聊城攝城姑水尤水在即墨縣漢書郊祀志曰武帝元封元年大旱禱萬里沙孟康云沙長三百里沙在莱州界地理志曰長廣縣有貕養澤周禮職方氏曰幽州之藪曰貕養長廣今昌陽縣登州十道志曰登州文登郡漢牟平縣屬東萊郡文帝封齊惠王子將閭為牟平侯將閭邑也圖經曰古莱子國戰國及秦屬齊郡漢已下屬東莱郡又曰文登漢腄縣有梁山漢書曰腄有梁山丹水所岀師古曰腄直類切史記曰始皇二十八年行郡縣上太山過黃腄經成山其後二十九年又東遊登成山升之罘勒石紀功密州十道志曰密州高密郡置在諸城縣禹貢青州之域兼得徐州之地秦爲瑯琊郡漢屬齊文帝分齊立膠西國封齊悼惠王子夘爲膠西王都高密齊記曰密州本東武縣樂府東武郡吟是秦本紀曰始皇二十八年南登琅邪大樂之留三月乃徙黔首三萬户琅邪臺下吳越春秋曰越王勾踐二十五年徙都瑯琊立觀臺周旋七里以望東海史記曰齊湣王爲燕師所敗唯莒與即墨二城不下立湣王之子法章於莒是爲襄王徐州十道志曰徐州彭城郡置在彭城縣元和郡國志曰禹貢徐州之域春秋時宋滕薛小邾偪陽之地六國時屬楚秦併天下爲泗水郡楚漢之際楚懷王自旴眙徙都之後項羽徙懷王於桞自立爲西楚霸王又都於此漢爲泗水郡後爲彭城郡漢書曰高祖過沛留置酒沛宫悉召故人父老子弟佐酒發沛中兒得百二十人教之歌酒酣上擊筑自歌大風之歌令兒皆習和之上乃起舞忼慨泣下謂沛父老曰遊子悲故鄉吾雖都關中萬歲之後吾䰟魄猶思沛宋書曰高祖經畧中原以彭城險要置府於此後王𤣥謨上表曰彭城南届大淮左右清汴城隍峻整襟衛周又自淮以西襄陽以北經塗三千達于濟岱六州之民三十萬户實由此境後魏書曰尉元上表曰彭城宋之要藩南師來侵莫不因之以凌諸夏泗州元和郡國志曰泗州臨淮郡理淮縣禹貢徐州之域春秋屬魯又爲徐子之國後秦滅楚爲泗水郡漢分置臨淮郡漢書地理志曰厹猶屬臨淮郡王莽曰康乂厹音仇即連水也都城記曰周穆王末徐君偃好行仁義東夷歸之者四十餘國穆王西巡聞徐君威德日逺遣楚襲其不備大破之殺偃王其子遂北徙彭城百姓從者數萬都徐國今徐城是也兖州十道志曰兖州魯郡置在瑕丘縣元和郡國志曰禹貢兖州之域春秋時爲魯國武王即位封周公於少昊之墟曲阜之地周公不就至子伯禽乃就封之後三十四君爲楚所滅楚以魯爲薛郡漢為魯國魏太祖爲兖州牧焉左傳曰季康子伐邾以邾子益來囚諸負瑕杜注云魯邑也有瑕丘城即今縣家語曰夫子爲中都宰今有中都城在焉漢書曰高祖畧地取湖陵方與地志屬山陽郡即今方與縣也左傳隠公五年矢魚于棠即此地唐為魚臺縣漢書曰吳楚七國反天子命周亞夫將三十六軍擊之亞夫至淮陽問客鄧都尉䇿安岀客曰莫若引兵東北壁昌邑以梁委吳使輕兵絶淮泗口塞吳饟道使吳梁相弊乃以全制其極破吳必矣亞夫從之乃破吳今金鄉縣有昌邑故城魏志曰太祖欲征陶謙時吕布在兖州荀彧説太祖曰昔高祖居關中光武據河内皆深根固蒂於以制天下進足以勝敵退足以自守故雖有困敗而終濟大業將軍本以兖州首事平山東之難百姓無不歸心悦服且濟河天下之要地是亦將軍之關中河内也不可不先定乃從之海州十道志曰海州東海郡置在朐山縣禹貢徐州之域春秋魯國之東境七國時屬楚秦爲薛郡地後分薛郡爲剡漢改剡爲東海郡漢書曰朐屬東海郡秦始皇立石海上以爲東門闕又曰東海郡祝其羽山在南鯀所殛之地王莽曰猶亭左傳曰公㑹齊侯于夾谷即此沂州十道志曰沂州瑯琊郡置在臨沂縣禹貢徐州之域也春秋時齊郡秦置瑯琊郡論語夫子曰㸃爾何如曰暮春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸夫子喟然嘆曰吾與㸃也又曰子之武城聞絃歌之聲夫子莞爾而笑曰割雞焉用牛刀又曰公山弗擾以費畔召子欲往子路不悦曰末之也已何必公山氏之之也漢地理志曰襄賁屬東海郡王莽曰章信後屬瑯琊郡賁音肥太平御覽卷一百六十
