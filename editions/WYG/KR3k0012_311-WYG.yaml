  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_311-1a, image: WYG0895/WYG0895-0684a.png}
body:
  text: 太平御覽卷三百十一宋李昉等撰兵部四十二請戰挑戰决戰上請戰左傳曰帥師以來固敵是求敵至不擊將何俟矣又曰晉師至于磨筓之下齊侯使請戰又曰子玊使伯棼請戰曰非敢必有功也願以間執䜛慝之口又曰晉侯逆秦師使韓簡視師韓簡晉大夫韓萬之孫復曰師少於我鬭士倍於我公曰何故對曰出因其資謂奔梁求秦入用其寵為秦所納饑食其粟三施而無報是以來也今又擊之我怠秦奮倍猶未也公曰一夫不可狃况國乎杜註狃􅏸也言辟秦則使􅏸來遂使請戰曰寡人不佞能合其衆而不能離也君若不還無所逃命秦伯使公孫枝對曰君之未入寡人懼之入而未定列猶吾憂也苟列定矣敢不承命又曰子玉使鬭勃請戰曰請與君之士戲君憑軾而觀之得臣與寓目焉晉侯使欒枝對曰敢煩大夫謂二三子戒爾車乗敬爾君事詰朝將見榖梁曰請一戰不剋請再再不剋請三三不剋請四四不剋請五五不剋舉國而授於是而與之盟史記楚世家曰六年秦使白起伐韓於伊闕大勝斬首二十四萬秦乃遺楚王書曰楚倍秦秦且率諸侯伐楚一旦之命願王之飭士卒得一樂戰楚頃襄王患之乃謀與秦平後漢書曰王覇傳軍中壯士路潤等數十人斷髪請戰挑戰孫子曰忿速可侮急疾之人可忿而致死忿速易動者主不可以怒而興軍不可以愠而致戰合於利而用不合於利而止人主聚衆興師以道理勝負之計不可以己之私舉兵則以策不可以己之愠故合利而戰也怒而可以復喜愠而可以復悅亡國不可以復存死者不可以復生主怒興兵人無素謀成計則破亡可危主愠而動倉卒而合戰所傷者必多怒愠復可以悅喜而亡國不可復存死不可復生言當須慎之也故曰明王儆之良將慎之此安危之道也儆戒也左傳曰趙旃求卿未得且怒於失楚之致師者請挑戰弗許請召盟許之左傳曰楚許伯御樂伯攝叔為右以致晉師許伯曰吾聞致師者御靡旌摩壘而還摩旌疾驅也摩近也樂伯曰吾聞致師者左射以菆代御執轡御下兩馬掉鞅而還攝叔曰吾聞致師者右入壘折馘執俘而還皆行其所聞而復晉人逐之左右角之樂伯左射馬而右射人角不能進矢一而已麋興于前射麋麗龜戰國䇿曰魏武侯問吳起曰兩君相當不知其將若何起曰令賤而勇者將而擊鋭交而自北告而勿罰觀敵進取一來一起其政以理奔北不追見利不取此將有謀若其衆追北其幟雜亂自止自行或縱或横貪利務得凡若此類將令不行史記吳世家曰夏吳伐越越王勾踐迎擊之檇李賈逵曰越地也越使死士挑戰三行造吳師自頸左傳曰使罪人三行屬劍於頸吳師觀之越因伐吳敗之姑蘇又曰漢王項羽相與臨廣武間而語項羽欲與漢王獨身挑戰漢王數項羽十罪羽大怒伏弩射中王胷漢王捫足曰虜中吾指又曰王翦代李信擊荆荆兵數挑戰終不出久之翦使人問軍中戲乎曰方越石超距翦曰士卒可用矣漢書曰項羽使人謂漢王曰天下匈匈徒以吾兩人願與王挑戰决雌雄無徒罷天下父子為也漢王笑謝曰吾寧鬬智不鬭力羽令壯士出挑戰三合樓煩輒射殺之羽大怒自披甲持㦸挑戰樓煩欲射羽瞋目叱之樓煩目不能視手不能發走還入壁不敢復出漢王使間問之廼羽也漢王大驚又曰楚漢相持彭越數絶楚糧道項羽欲討越謂其將曹咎曰謹守城臯則漢欲挑戰慎勿與戰無令得乗我十五日必誅彭越定梁地漢果數挑戰楚軍不出使大辱之五六日曹咎怒渡兵汜水漢擊之大破楚軍盡得楚國貨賂曹咎自刎汜水上後漢書曰張堪為謁者使送委輸縑帛并領騎七千匹詣大司馬吳漢伐公孫述在道追拜蜀郡太守時漢軍餘七日糧隂具船欲遁去堪聞之馳徃見漢言述必敗不宜退之䇿漢從之乃示弱挑敵述果自出戰死城下又曰王覇討蘇茂賊聚衆挑戰覇堅守不出方饗士卒作樂茂矢射營中中覇前酒樽安坐不動軍吏皆曰茂前日已破今易擊也覇曰不然茂客兵逺來糧食不足故數挑戰以徼一切之勝徼要也一切猶權時也今閉營休士所謂不戰而屈人之兵善之善者也茂既不得戰乃引還營又曰董憲叛馬成拜揚武將軍發㑹稽丹陽九江六安四郡兵擊憲進圍憲於舒令諸軍各深溝高壘憲數挑戰成堅壁不出守之嵗餘至六年春城中食盡乃攻之遂屠舒斬憲魏志曰公西征馬超進軍度渭超等數挑戰不許公乃剋日㑹戰先以輕兵挑之戰良久乃縱騎夾擊大破之魏氏春秋曰諸葛亮遇司馬宣王因挑戰致巾幗婦人之餙以怒宣王魏畧曰太祖在漢中而蜀主栖於山嶺使劉封下挑戰太祖罵曰賣履舎長使假子拒汝公乎呼我黄鬚兒來令擊之乃召曹彰晨夜進追西到長安而太祖已還崔鴻十六國春秋曰姚襄據黄落前秦苻堅遣將苻黄眉鄧羗等率步騎討之襄深溝高壘固守不戰鄧羗説黄眉曰傷弓之鳥落於虛發襄頻為晉將桓温張平所敗鋭氣喪矣今固壘不戰自窮㓂也襄性剛狠易以剛動若長驅鼔行且壓其壘襄必忿而出師可以戰擒也黄眉從之遣羗率騎三千軍於襄壘襄果怒盡鋭出戰羗偽不勝引騎而退襄追至平原羗廻騎拒襄俄而黄眉至大戰斬之盡俘其衆宋書曰沈攸之反自江西舉兵東下分兵出夏口據魯山攸之既至郢以郢城弱小不足攻宋郢州今江夏郡遣人告郢州守將柳世崇曰被太后令當蹔還都卿既相與奉國想行此意世崇答曰東下之師久承聲聞郢城小鎮自守而已攸將去世崇遣軍於西渚挑戰攸之果怒令諸軍登岸燒郭邑築長圍攻之世崇隨宜拒應衆皆披却攸之軍日久敗潰隋書曰陳茂從高祖與齊師戰於晉州賊甚盛高祖將挑戰茂固止不得因捉馬鞚高祖忿之㧞刀斫其額流血被面詞氣不撓高祖感而謝之厚加禮敬又曰竇榮定之擊突厥也史萬嵗詣轅門請自効榮定素聞其名見而大悅因遣人謂突厥曰士卒何罪過令殺之但當各遣一壯士决勝負耳突厥許諾因遣一騎挑戰榮定遣萬嵗出應之萬嵗馳斬其首而還突厥大驚不敢復戰遂引軍而去唐書曰高祖起師次霍邑隋將宋老生拒之上謂諸將曰老生若嬰城自守當即攻之主客勢懸卒難致力其計若何太宗進曰老生勇而無謀請以輕兵挑之必出戰則成擒矣從之太宗以數騎詣其城下舉鞭指麾若將圍城者老生果怒開門出兵太宗馳白高祖曰事諧矣高祖謂隴西公建成曰汝看兩陣將交引左軍直趨東門命太宗引右軍直趨南門以斷其歸路老生之軍背城而陣高祖以中軍與建成合陣于城東太宗及柴紹陣於城南老生麾兵進先薄髙祖而建成墜馬老生乗之中軍與左軍咸却太宗自南原遥見塵起知義師退率二百騎馳下峻坂殺一賊將遂横斷其軍出于陣後表裏齊譟響若崩山隋師大潰各捨杖而走縣門發老生不得入城乃棄馬投塹甲士斬之致其首於麾下流血數里死屍相枕四面乗勝進薄其城無攻具士卒緣城而上一時攀堞無敢當者遂平霍邑撫其餘衆而用之又曰杜伏威既敗隋師煬帝又遣將軍陳稜討之稜不敢戰伏威知其怯懦因遺稜婦人服以激怒之稜果大怒恚率衆而至伏威逆拒之殺數千人稜僅以身免又曰竇建徳自滎陽西上太宗以數百騎出虎牢關二十餘里以挑之徃徃設伏比至賊見我而旋是其上計乗險逐我是其下䇿賊初見騎少疑為斥候太宗謂曰我秦王也因引弓射之斃其一將賊兵六十騎並援槍而至從者咸失色太宗謂之曰爾但前去我自殿後於是按轡徐行賊至射之又斃一將賊懼而止已而復來如此再三每來必斃賊乃不敢復逼太宗且挑且還伏兵相次而發合擊破之獲其大將殷秋石瓉斬首數百級决戰上六韜曰周武王將伐紂問太公曰今敵人圍我斷後絶粮吾欲徐以為陣以敗為勝太公曰不可此天下困兵也暴用之則勝徐用之則敗可為四衝陣以驍騎驚其三軍左軍疾左右軍疾右中軍迭前迭後窺敵之空處吾軍疾擊鼔而當之又曰敵踈其陣又逺其後挑我以流矢以弱我弓弩勞我士卒為之奈何太公曰發我鋭士先擊其前軍騎列其左右引而分隊以隨其後三軍疾戰凢以少擊衆避之於易要之於險避之以晝取之以夜故曰以一擊十莫善於阨以十擊百莫善於險以千擊萬莫善於阻用衆者務易用少者務阨也左傳曰晉師伐齊陣于莘所臻切晉觧張御卻克鄭丘緩為右及戰卻克傷於矢流血及屨未絶鼔音中軍將自執旗鼓故雖傷而擊鼔不息也曰余病矣張侯曰自始合而矢貫予手及肘余折以御左輪朱殷豈敢言病吾子忍之丘緩曰自始合苟有險予必下推車子豈識之然子病矣以其不識己推車也張曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事殿鎮也集成也若之何其以病敗君之大事也擐甲執兵固即死也擐貫即就也擐音患病未及死吾子勉之左并轡并畢正切右援枹音孚而鼓馬逸不能止師從之晋師從卻克車齊師敗績又曰齊侯伐晉夷儀敝無存之父將室之辭以與其弟無存齊人也室之為取婦曰此役也不死反必娶於高國髙氏國氏齊貴族也無存欲必有功還取卿相之女先登求自門出死於霤下既入城夷儀人不服故鬬死于門屋霤下也齊侯克夷儀謂夷儀人曰得敝無存者以五家免給五家不使役乃得其尸公三襚之襚衣也比殯三加襚深禮厚之與之犀軒直蓋犀軒軒車直蓋高蓋也親推之三齊侯自推車三轉也國語曰齊莊公且伐莒為車五乗之兵而把梁華周獨不與焉故歸而不食其母曰食汝生而無義死而無名則雖非五乗孰不汝笑也生而有義死而有名則五乗之兵盡汝下也趣食乃行杞梁華周同車侍莊公而行至莒莒人逆之把梁華周下鬬獲甲首三莊公止之曰子止與子同齊國杞梁華周曰君為五乗之兵而周梁不與焉是少吾勇也臨敵涉難止我以利是惡吾行也深入多殺者臣之事也齊國之利非吾所知也遂進鬬壊車䧟陣三軍不敢當戰國䇿曰齊上將田單率師將攻狄魯仲連子曰將軍攻狄必不能下也單曰單以破亡餘卒破萬乗之燕今攻狄而不能下何也上車不謝而去遂攻狄三月不克齊嬰兒謡曰大冠若箕脩劒柱頥單乃復問仲連子對曰將軍在即墨之時坐即織簣立即仗挿為士卒倡當此之時將軍有死之心士卒無生之氣聞是言莫不掩泣奮臂而欲戰此所以破燕也當今將軍東有夜邑之封西有淄土之寳是以樂生而惡死此所以不勝也田單明日結髪厲氣立於矢石之間引桴而鼔之狄人乃下漢書曰御史大夫韓安國曰魏其言灌夫父死事身荷㦸馳不測之吳軍身被數十創名冠三軍此天下壯士也非有大惡爭杯酒不足引他過以誅也後漢書曰劉伯升起兵光武守昆陽莽將王尋王邑來討兵百萬先至昆陽以十萬圍數重時伯升已㧞宛三日而光武尚未知乃偽使持書報城中云宛下兵到而佯堕其書尋邑得其書不喜諸將既經累㨗膽氣益壯無不一當百光武乃與敢死者三千人從西城水上衝其中堅尋邑陣亂乗勢奔之遂殺王尋城中亦鼓噪而出中外合勢震呼動天莽兵大潰走者相騰踐又曰郟令馮方力戰死帝曰此健令也又曰吳漢率兵圍蘇茂於廣樂劉永將周建來救漢輕騎迎戰不利墮馬傷膝還營諸將謂漢曰大敵在前而公傷臥衆心懼矣漢乃勃然裹瘡而起椎牛饗士令衆軍曰賊衆雖多皆刼掠羣盗勝不相讓敗不相救非有仗節死義者也今日封侯之秋諸君勉之於是軍士激怒人倍其氣旦日建茂出兵漢選四部精兵三千餘人齊鼔而進建軍大潰奔還城漢長驅追擊大破之李陵答蘇武書曰昔先帝授陵步卒五千出征絶域五將失道陵獨遇戰單于謂陵不可復得便欲引還而賊臣教之遂使復戰故陵不免耳司馬遷報任少卿書曰李陵提步卒不滿五千深踐戎馬之地足厯王庭垂餌虎口横挑強胡億萬之師與單于連戰十有餘日所殺過當太平御覽卷三百十一
