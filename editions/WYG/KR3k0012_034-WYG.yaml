body:
  text: 太平御覽卷三十四宋李昉等撰時序部十九熱寒熱釋名曰熱爇也如火之燒爇也或曰暑煮也如煮物也說文曰溽濕暑也易曰寒徃則暑來書曰哲時燠若又曰僣恒暘若詩曰誰能執熱逝不以濯禮曰季夏之月土潤溽暑鄭𤣥注曰潤溽塗温又曰仲春行夏令則國乃大旱煖氣早來又曰仲秋行夏令則其國火災寒熱不節漢書曰􅄢賓國武帝時剽漢使成帝時復遣使奉獻謝罪杜欽說大將軍王鳳不令使使者逺向􅄢賓國曰此國道經大小頭痛之山赤土身熱之坂令人頭痛嘔吐唐書曰代宗時有迎凉草鳳首木迎凉草榦如竹葉細於杉乾枯而未嘗凋落盛暑而刺之牕户間則凉風自至易稽覽圖曰夏至之後三十日極熱京房易占候曰有雲大如車蓋十餘此陽火之氣必暑有暍者暍音謁禮斗威儀曰君喜怒無常時則常熱五經通義曰冬至陽動于下推隂而上之故大寒於上夏至隂動于下推陽而上之故大熱于上故易云日月運行一寒一暑日在牽牛則寒在東井則暑牽牛外宿逺人故寒東井内宿近人故温也白虎通曰夏至隂始起反大熱者何隂起陽氣推而上故大熱也又曰至人神矣入大澤不濡焚而不爇也又曰暍者反凍于冷風管子曰善為國者使農寒耕而熱耨淮南子曰熱焦沙寒凝水抱朴子曰洪從祖佛公每大醉及夏天盛熱輒入深淵之底一日許乃出以能閉氣胎息故耳又曰或問不熱之道曰或服𤣥水丸或服飛霜散霜一作雪昔王仲都用此方也桓子新論曰元帝被病廣求方士有漢中逸人王仲都者詔問所能對曰但能忍寒暑耳因為待詔至夏大暑日使暴坐又環以十罏火不言熱而身汗不出益州記曰瀘水即武侯渡處水有熱氣暑天不敢行廣州志曰南方炎洲氣薫數萬里為瘴又曰南方地暑熱交趾麥不成秀麻不生蕪菁無根括地圖曰天毒國冣大暑熱夏草木皆乾死民善收水以避暑將暑常入寒泉之下語林曰劉真長見王丞相時盛夏王公以腹熨彈碁局曰乃渹吴人以冷為渹渹音虛觥切劉既出人問見王公如何對曰未見他異惟作吳語耳山海經曰夀林之國夏有大暑不可以徃世説曰荀奉倩與婦至篤冬月婦病熱倩乃出中庭自取冷以身熨之黄帝素問曰黄帝問岐伯曰人傷于寒而轉為熱何也曰夫寒盛則生熱也楚招魂辭曰東方不可託些些楚語蘇資切十日代出流金爍石些鑠銷也言東方有扶桑之木十日並在其上言熱臨則金石至剛皆為銷鑠也彼皆習之魂徃必釋些釋解也䰟徃必解爛宋鮑昭苦熱行曰赤坂横西阻火山赫南威身熱頭且痛烏墮魂來歸湯泉𤼵雲潭焦烟起石􅀈日月有恒昏雨霧未嘗晞丹蛇踰百尺𤣥蜂盈十圍含沙射流影吹蟲痛行暉廓氣盡焦體蘭露夜沾衣飢猿莫一食晨禽不敢飛毒瘴尚多死渡瀘寧免灾病也主驅蹈死地昌志登禍機魏王粲大暑賦曰或赫熾以瘴炎或鬱術而燠蒸獸狼望以倚喘鳥垂翼而弗翔根生苑而焦炙豈含血而能當仰庭槐而嘯風風既生其如湯氣呼吸以袪暍汗雨下而沾裳就清泉以自沃猶沃涊而不凉體煩如以於悒心情悶而窘惶又曹植大暑賦曰大暑赫其遂蒸元服華而尚黄蛇折鱗於靈窟龍觧角于皓蒼遂乃温風赫曦草木垂榦山拆海沸沙融爍爛飛魚躍渚潜龜浮岸鳥張翼以逺栖獸交逝而雲散晉傳咸感凉賦曰踐朱明之中月星鬱隆以肇興赫融融以彌熾乃沸海而焦陵􅄞含困熱賦序曰夫閏于夏則崇暑在冬則増寒永熙元年閏在仲夏三伏之節始奏商秋之辰未期於時下里貧生居室卑陋小巷不來清風短廡不足増䕃外困流汗内懐煩暵歎彼厦屋之士口饜珍味體逸髙廊並天而寒暑殊同世而憂樂異卞伯玉大暑賦曰體沸灼乎如燎汗流爛兮珠連程曉詩曰平生三伏時道路無行車閉門避暑卧出入不相過今世褦襶子褦音柰襶音戴觸熱到人家主人聞客至顰蹙子六切柰此何謂當行起去安坐止􅀈跨􅀈音彭跨音誇所說了無急踏吟一何多疲倦向之苦甫問居極那揺扇臂中疼流汗正滂沱莫謂此小事亦是人一瑕傳戒諸髙明熱行宜見訶晉傅𤣥詩曰朱朔運將極溽暑晝夜興裁動四支廢舉身若山陵珠汗洽玉體呼吸氣鬱蒸塵垢自成泥素粉隨手凝魏曹植九詠曰温風翕兮煎沙石翕熱貌也鳥罔竄兮獸無蹠蹠之石切天覆我也言天暖石焦地熱鳥無所迯獸無所蹈履也寒釋名曰寒捍也捍格也說文曰􅀢寒也從雨執聲凛清寒也􅀢丁念切書曰休徴曰謀時寒若曰咎徴曰急恒寒若孔安國曰君能謀則時寒順之君行急則常寒順之又曰冬祁寒小民亦惟曰怨咨詩曰一之日觱𤼵風寒也二之日栗烈寒氣也又曰北風刺虐也衞國並為威虐百姓不親莫不相擕而去故云北風其凉雨雪其滂北風寒凉之風也滂盛貌也箋云寒凉之風病害萬物喻君政教酷暴民皆避亂而去禮記曰天地嚴凝之氣始于西南而盛于西北此天地之義象也又月令曰仲春行秋令則寒氣總至又曰季冬之月命有司大儺旁磔出土牛以送寒氣鄭𤣥曰丑為牛又曰九月中氣是月也霜始降則百工休謂膠漆作停乃命有司曰寒氣總至人力不堪其皆入室霜降清風戒寒将以聚人入室又曰孟冬行夏令則國多暴風巽為風夏主巽風事故行夏令則多暴風方冬不寒夏氣干時方冬而温蟄蟲復出蟲以寒蟄温而復出又曰大寒之月雞始乳鴈北鄉又曰季春行冬令則寒氣時𤼵草木皆肅傳曰楚莊王圍蕭申公巫臣曰行人多寒王廵三軍拊而勉之三軍之士皆如挾纊史記曰湏賈見范雎曰今叔何事范雎曰臣為人傭賃湏賈意哀之留與坐飲食曰范叔一寒如此哉乃取一綈袍賜之漢書曰上聞韓王信降匈奴自將擊之連戰乗勝逐北至樓煩㑹天寒士卒墮指者十二三又曰邴吉為廷尉時有老人年八十無子妻死娶後妻生一子而翁老死其子年數嵗有前妻女曰非我父之𦙍遂上聞吉曰吾聞老人之子甚不耐寒日中無影遂令騐之皆如其言又曰􅄯錯上疏曰夫胡貉之地積隂之處也木皮三寸土地寒故也氷厚六尺食肉而飲酪其人密裏鳥獸毳毛其性能音柰寒又曰王莽天鳯四年八月莽親之南郊鑄作威斗是日大寒百官人馬有凍死者又曰雲南郡㸃蒼山特寒四月五月中猶積雪皓然謝承後漢書曰盛夏多寒常彪上疏諫曰臣聞政治之本必順隂陽伏見立夏以來當暑而寒殆刑罰刻急郡國不和時令之所致也東觀漢書曰王郎起兵上自東南馳夜至蕪蔞亭時天寒冽衆皆饑疲馮異上豆粥明旦上謂諸將曰昨得公孫馮異字公孫豆粥寒飢俱解續漢書五行志曰獻帝初平四年六月寒風如冬時又曰光和四年冬大寒北海東萊瑯琊井中氷厚尺餘大有年又窮谷之地固隂沍寒趙書曰汲桑六月盛暑重裘累茵使人扇之患不清凉斬扇者軍中謂之謡曰奴為将軍何可羞六月累茵披貂裘不識寒暑斬人頭易稽覽圖曰冬至之後三十日極寒京房易占妖曰春夏寒政教急又京房傳曰有徳遭險兹謂逆命厥異寒春秋運斗樞曰日行失則雖當暖而寒春秋考異郵曰繆公即位仲夏大寒氷錯亂甚也老子曰􅏥勝寒靜勝熱文子曰婦人當年不織天下有受其寒者尸子曰雨雪楚莊王披裘當户曰我猶寒彼百姓賓客甚矣乃廵國中求百姓賓客之無居宿餱糧者賑之國人大悅又曰朔方之寒氷厚六尺木皮三寸北極山有不釋之氷晏子曰景公時雪三日公披狐白裘晏子入公曰怪哉雨雪三日不寒晏子曰古之賢君飽而知人飢煖而知人寒公曰善出裘發粟以與飢寒者又曰景公起大臺嵗寒役人凍死者有焉管子曰大寒大暑大風大雨其至不時此謂四刑淮南子曰北方有北極之山曰寒門積寒所在故曰寒門又曰夏蟲不可語氷蜩蟬不知寒雪又曰青女天神青女玉女仲春二月之夕乃閉其寒吕氏春秋曰衞靈公天寒鑿池苑春曰天寒恐傷民公曰寒哉春曰君衣狐裘坐熊席取火是故不寒民衣敝不補君則不寒民則寒矣公曰善命罷役左右曰是徳必歸于春公曰不可春所有之善即寡人之善也衞人悅當時衞公得君道矣又曰冬之徳寒又曰見瓶水之氷而知天下之寒國語曰火見而清風戒寒火心星清風寒風也清風至而修城郭戰國䇿曰田單為齊相過淄水有老人渉淄而寒不能行單乃解裘衣與之襄王曰單之厚施欲取我國乎有貫珠者聞之曰不如因與焉已下令曰寡人憂民之寒單解衣與之稱寡人意於是閭里相與語曰單之愛人乃王之致也周書時訓曰小寒之日鴈不北鄉民不懐王鵲不治巢國家不寧雉不始雊國乃大水大寒之日雞不乳淫女亂男鷙鳥不厲國不除兵水澤不堅言乃不從說苑曰國有五寒而水凍不與焉一曰政外二曰女廣三曰謀泄四曰不敬卿士而國敗五曰不能治内而務外此五者一見惟禍無福桓譚新論曰元帝時漢中有逸人王仲都能忍寒乃於盛寒日令袒衣載以駟馬於昆明池上繞氷而走御者厚衣狐裘甚寒而仲都獨無變也論衡說寒温有曰人君喜則温怒則寒又曰河東項曼都好道學仙去家三年而返曰去時有數仙人將上天離月數里而上月之旁其寒凄凄穆天子傳曰天子逰黄臺之丘日中大寒雨雪有凍死人天子作黄竹詩以愍之葛仙公别傳曰公與客談語時天大寒仙公謂曰客居貧不能人人得爐火請作一大火共致煖氣何如因吐氣火赫然從口出須㬰火滿屋客皆熱脫衣孝子傳曰閔子騫事後母極孝騫衣以蘆花御車失靷父怒笞之撫背之衣單父乃去後妻騫啟父曰母在一子寒母去三子單石虎别傳曰十三年春二月虎率三公九卿躬耕籍田又令夫人與命婦先蠶近郊是嵗八月雨雪大寒行旅凍死鍾離意别傳曰嚴遵昔與光武俱為諸生暮夜宿息二人寒不得寝卧更相謂曰後日豪貴憶此勿相忘别後數年光武有天下徴遵不至也西亰雜記曰淮南王好方士皆以術見嘘吸為寒暑劉向别録曰燕有寒谷不生五榖鄒衍吹律以煖之乃生禾黍因名黍谷廣志曰挹樓國地寒人多穴居也又曰北方寒氷厚三尺地凍五尺人氣出口為凌馬首常創洪範五行傳曰秦始皇九年四月寒凍民有死者又曰聽不聰事不謀厥罰恒寒晉朝雜事曰永寧二年十二月大寒凌破河橋又曰大興四年大寒傷民氷厚時王敦肆亂殺戮忠良神異經曰北方有層氷萬里厚百尺下有鼷在氷下土泥中其形如鼠食水草肉重萬斤作脯食之已熱其毛長八尺可以為褥卧之可以却寒又曰東南方海中烜與逺切洲上有湖其中惟有鯽魚長八尺食之宜暑而避風潯陽有林湖鯽魚大二尺餘食之肥美可以已寒黄帝素問曰地冽為寒太公金匱曰武王伐紂紂徃洛邑天隂雨寒雪十餘日漢張奐與延篤書曰太隂之紀氷厚三尺木皮三寸風威寒冽損筋傷骨非老憊者所堪而復加之以師旅因之以饑饉衆艱罄集不可一二言也後漢張衡思𤣥賦曰趄區中之隘陋兮将北渡而宣逰宣遍行積氷之皚皚兮清泉沍而不流沍凍也寒風凄其永至兮拂穹岫之騷騷𤣥武縮于殻中兮螣蛇蜿而自糾龜與蛇交曰𤣥武也魚矜鱗而并凌兮凌氷也鳥登木而失條晉潘岳寡婦賦曰夜漫漫以悠悠兮寒凄凄以凛凛魏應璩雜詩曰嵐山寒折骨面目盡生瘡嵐山𦍑中山名傅𤣥詩曰季冬時慘冽猛寒不可勝嚴風截人耳素雪隨地凝艸上飛霜起波中自生氷未夕結重衾崇朝不敢興又陸機樂府苦寒行曰北逰幽朔城凉野多險艱俯入窮谷底仰陟髙山巔凝冰結重澗積雪被長巒隂雲興巖側悲風鳴樹端不覩白日景但聞寒鳥喧猛獸憑林嘯𤣥猿臨岸歎平聲夕宿喬木下慘愴恒鮮歡渴飲堅氷漿飢待零霜餐又連珠曰沈寒凝海不能結風琴操曰曽子嘗耕于泰山之下遭天雨雪寒凍旬日不得歸乃作憂思歌也宋袁淑七言詠寒雪曰渚幽寒兮石烟聚日華收兮山氣深邊亭哀兮夜燧滅孤松振兮空岫吟魚戢鱗兮鳥收翰虹蟄火兮龍藏金太平御覽卷三十四
