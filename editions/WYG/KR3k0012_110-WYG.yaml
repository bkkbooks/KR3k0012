body:
  text: 太平御覽卷一百十宋李昉等撰皇王部三十五唐髙宗天皇大帝則天皇后中宗孝和皇帝睿宗𤣥貞皇帝髙宗天皇大帝唐書曰髙宗天皇帝諱治太宗第九子也母曰文徳順聖皇后長孫氏以貞觀二年六月生於東宫之䴡正殿五年封晉王七年進授并州都督幼而岐嶷端審寛仁孝友初授孝經於著作郎蕭徳言太宗問曰此書中以何言為善對曰夫孝始於事親中於事君終於立身君子之事上也進思盡忠退思補過將順其美匡救其惡太宗恱曰行此足以事父兄為臣子矣及文徳皇后崩晉王時年九嵗哀慕感動左右太宗屢加慰撫由是特深寵異尋拜右武衛大將軍十七年皇太子承乾廢魏王亦以罪黜太宗與長孫無忌房𤣥齡李世勣算計議立晉王為皇太子太宗每視朝常令在側觀决庶政或㕘議太宗數稱其善十八年太宗將伐髙䴡命太子留鎮定州及駕發有期悲號累日因請飛騎逓表起居并逓勅垂報並許之及軍旋太子從至并州太宗患癰太子親吮徂兖切之扶輦步従數日二十二年五月己巳太宗崩六月甲戌皇太子即皇帝位時年二十二詔大赦天下内外文武賜勲官一級永徽元年春正月辛丑上不受朝詔改元丙午立妃王氏為皇后二年春正月戊戌詔曰去嵗闗輔之地頗弊蝗螟天下諸州或水旱百姓之間致有匱乏此由朕之不徳兆庶何辜矜物罪已載深憂惕今獻嵗肇春東方方始糧廪或空事資賑給其遭蟲水處有貧乏者量以正義倉賑貸五年春三月戊午幸萬年宫辛未赦岐州及所經州縣繫囚以工部尚書閆立徳領丁夫四萬築長安羅郭八月大理奏决死囚捴有七十餘人六年九月庚午尚書右僕射禇遂良以諌立武昭儀貶授潭州都督乙酉洛州大水毁天津橋冬十月己酉廢皇后為庶人立昭儀武氏為皇后大赦天下七年正月辛未廢皇太子忠為梁王立代王𢎞為太子壬申大赦改元為顯慶元年五月己夘太尉長孫無忌進史館所撰梁陳周齊隋五代史志三十卷五年八月庚辰蘇定方等討平百濟面縳其王扶餘義慈國分為五部郡三十七城二百户七十六萬以其地置熊津等五都督府麟徳元年三月辛亥展大禮十二月丙戌殺西臺侍郎上官儀戊子庶人忠坐與儀交通賜死二年十月司禮太常伯劉祥道上疏請封禪癸亥髙麗王髙蔵遣其子福男來朝丁夘將封泰山發自東都是嵗大稔米斛五錢麰音牟麥不列於市麟徳三年春正月戊辰朔車駕至泰山頂是日親祀昊天上帝于封祀壇以髙祖太宗配饗己巳帝升山行封禪之禮庚午禪社首祭皇帝地祗以大穆太皇太后文徳皇太后配饗皇后為亞獻越國大妃燕氏為終獻辛未御降禪壇壬申御朝覲壇受朝賀改麟徳三年為乾封元年正月丙戌發自泰山甲午次曲阜縣幸孔子廟追諡太師增修祠宇以少牢致祭其褒聖侯徳倫子孫並免賦役三月己未次亳州幸老君廟追號曰大上𤣥元皇帝創造祠堂改陽榖縣為真元縣縣人宗姓給復二年夏四月甲辰車駕至自泰山先謁太廟而後入壇庚寅改鑄乾封皇寳錢又十月己酉司空英國公勣為遼東送行臺大總管以伐髙䴡三年二月戊寅以明堂制度厯代不同漢魏以還彌更訛舛遂増損古今新制其圖下詔大赦改元為總章元年二月戊寅幸九成宫九月癸巳司空英國公勣破髙䴡抜平壤城擒其王髙蔵及其大臣男建等以歸境内盡降其城一百七十上元二年三月丁巳天后親蠶於印山之陽時帝風疾不能聽朝政事皆決於天后自誅上官儀後上每視朝天后垂簾於御座後政事大小皆預聞之内外稱為二聖帝欲下詔令天后攝國政中書侍郎郝處俊諌止之調露元年十月單于大都䕶府突厥阿史徳温傳及奉職二部相率反叛二年八月甲子廢皇太子𢎞為庶人幽於别所乙丑立英王哲為皇太子改調露二年為永隆元年大赦天下閏十月庚申上以服餌令皇太子監國丙寅雍州大風害禾稼價翔湧是月裴行儉大破突厥史伏念之衆伏念為程務挺急追來降行儉於是盡平突厥餘黨行儉執伏念振旅凱旋永淳二年春正月甲午朔幸奉天宫遣使祭嵩嶽少室箕山具􅗔等山西王母巢父許由等祠十一月丁未自奉天宫還東都上疾甚宰臣以下並不得謁見冬十二月丁巳詔改永淳二年為𢎞道元年將宣赦書上欲親御則天門樓氣逆不能上馬遂召百姓於殿前宣之禮畢上問侍臣民庶喜否對曰百姓蒙赦無不感恱上曰蒼生雖喜我命危篤天地神祗若延吾一兩月之命得還長安死亦無恨是夕帝崩于貞觀殿時年五十六諡曰天皇大帝廟號髙宗文明元年八月葬於乾陵天寳十三載改諡曰天皇大𢎞孝皇帝則天皇后唐書曰則天皇后武氏諱曌并州文水人也父士彠憂縛切隋大業末為鷹揚府隊正髙祖行軍於汾晉每休止其家義旗初起從平京城貞觀時遷工部尚書荆州都督封應國公初則天年十四時太宗聞其羙容止召入宫立為才人及太宗崩遂為尼居感業寺大帝於寺見之復召入宫拜昭儀時皇后王氏良姊蕭氏頻與武昭儀争寵更䜛毁之帝皆不納進號宸妃永徽六年廢王皇后而立武宸妃為皇后髙宗稱天皇武后亦稱天后素多智計兼涉文史帝自顯慶已後多苦風疾百司表奏皆委天后詳决自此内輔國政數十年威勢與帝無異當時稱為二聖𢎞道元年十二月大帝崩皇太子顯即位尊天后為皇太后既將簒奪是日自臨朝稱制嗣聖元年春正月甲申朔改元二月戊午廢皇帝為廬陵王幽於别所仍改名哲己未立豫王輪為皇帝令居於别宫大赦天下改為文明皇太后仍臨朝稱制庚申廢皇太孫重照為庶人九月栁州司馬徐敬業殺揚州長史陳敬之舉兵移檄天下左玉鈐衛大將軍李孝逸討平之垂拱四年五月皇太后加尊號曰聖母神皇是秋七月大赦天下八月壬寅博州刺史瑯琊王冲據博州起兵命左金吾大將軍丘神勣為行軍捴管討之庚戌冲父豫州刺史越王貞舉兵與冲相應九月命内史岑長倩鳯閤侍郎張光輔左監門大將軍麴崇裕率兵討之丙寅斬貞及冲等傳首神都改其姓為虺氏曲赦博州韓王元嘉魯王靈䕫元嘉子黄國公譔靈䕫子左散騎常侍范陽王藹霍王元軌及子江都王緒故虢王鳳子東筦公融坐與貞通謀元嘉靈䕫自殺元軌流配黔州譔等伏誅改姓虺氏自是宗室諸王相繼誅死者殆盡矣其子孫年幼者咸配流嶺外并誅其親黨數百餘家載初元年春正月神皇親饗明堂大赦天下依周制建子月為正月改十二月為臘來嵗正月為一月大酺三日神皇自以曌字為名遂改詔書為制書秋九月革唐命改國號為周改元為天授大赦天下乙酉加尊號為神聖皇帝降皇帝輪為皇嗣丙戌立武氏七廟追尊神皇父士彠為孝明皇帝證聖元年春正月加尊號曰慈氏越古金輪聖神皇帝大赦天下大酺七日二月上去慈氏越古尊號秋九月親祀南郊加尊號天册金輪聖神皇帝大赦天下改元為天册萬嵗大辟已下及犯十惡常赦所不原者咸赦除之大酺九日萬嵗登封元年臘月上登封於神嶽大赦天下大酺九日丁亥禪于少室山聖厯元年正月親享明堂大赦天下改元大酺九日三月召廬陵王哲於房州九月庚子廬陵王哲為皇太子令依舊名顯大赦天下神龍元年春正月大赦改元上不豫制自文明元年已後得罪人除揚豫博三州及諸逆魁首咸赦除之癸夘麟臺監張易之與弟司僕卿昌宗謀反皇太子率左右羽林軍桓彦範敬暉等以羽林入禁中誅之甲辰皇太子監國大赦天下是日上傳皇帝位于皇太子徙居上陽宫戊申皇帝上尊號曰則天大聖皇帝冬十一月壬寅則天將大漸遺制祔廟歸陵令去帝號稱則天大聖皇后是日崩於洛陽宫之仙居殿年八十三諡曰則天大聖皇后祔𦵏於乾陵中宗孝和皇帝唐書曰中宗孝和皇帝諱顯髙宗第七子母曰則天大聖皇后顯慶元年十一月生於長安明年封周王授洛州牧儀鳯三年徙封英王改名哲授英州牧永隆元年章懐太子廢其年立為皇太子𢎞道元年十二月髙宗崩皇太子即皇帝位皇太后臨朝稱制改元嗣聖元年二月皇太后廢帝為廬陵王幽於别所其年五月遷於均州尋徙居房陵聖厯元年召還東都立為皇太子依舊名顯時張易之與弟昌宗潜圖逆亂神龍元年鳯閤侍郎張柬之鸞臺侍郎崔𤣥暐左羽林將軍敬暉右羽林將軍桓彦範司刑少卿袁恕己等定䇿率羽林兵誅易之昌宗迎皇太子大赦天下鳯閤侍郎韋承慶正諫大夫房融司禮卿崔慶等下獄甲辰命地官侍郎樊忱音諶徃京師吿陵廟乙巳則天傳位於皇太子丙午即皇帝位於通天宫大赦天下惟易之黨與不在被赦之内甲寅復國號依舊為唐社稷宗廟陵寢郊祀行軍旗幟服色天地日月等字臺閣官名並依永淳已前故事甲子立妃韋后為皇后大赦天下詔九品以上及朝集使極言朝政得失兼舉賢良方正直言極諫之士景龍三年十一月己丑親祀南郊皇后登堂亞獻左僕射舒國公韋巨源為終獻大赦天下四年五月丁夘前許州司兵參軍燕欽融上書言皇后干預國政安樂公主武延秀宗楚客等同危社稷帝怒召欽融廷見撲殺之時安樂公主志欲皇后臨朝稱制而求立為皇太子由是與后合謀進鴆六月壬申帝遇毒藥崩于神龍殿年五十五秘不發喪皇后親捴庶政立温王重茂為太子甲申發喪于太極殿宣遺制皇后臨朝大赦天下改元唐隆丁亥皇太子即帝位時年十六皇太后韋氏臨朝稱制大赦天下常赦所不原者咸赦除之内外兵馬令諸親王掌令韋温捴之特召諸府折衝兵五萬人分屯京城列為左右營諸韋子姓分統之庚子夜臨淄王隆基舉兵誅諸韋諸武皆梟首於安福門外韋太后為亂兵所殺九月丁夘上諡曰孝和皇帝廟號中宗𦵏定陵天寳十三載二月改諡曰太和大聖大昭孝皇帝睿宗𤣥貞皇帝唐書曰睿宗𤣥貞皇帝諱旦髙宗第八子中宗母弟龍翔三年六月己未生於長安其年封殷王領冀州大都督單于大都䕶右金吾衛大將軍及長謙恭孝友好學工草𨽻尤愛文字訓誥之書乾封元年徙封豫王總章二年徙封冀王上初名旭輪至是去旭字上元二年復封豫王拜右衛大將軍儀鳯三年遷洛州牧徙封相王復封豫王嗣聖元年則天臨朝廢中宗為廬陵王立豫王為皇帝仍臨朝稱制及革命改國號為周降皇帝為皇嗣令依舊名輪徙居東宫其儀一比皇太子聖厯元年中宗自房陵還帝數稱疾不朝讓位於中宗則天遂立中宗為皇太子封帝為相王又改名旦授太子右衛率長安中拜司徒右羽林衛大將軍自則天初臨朝及革命之際王室屢有變故帝每恭儉退讓竟免於禍神龍元年以誅張易之昆弟功進封安國相王遷太尉加實封其年立為皇太弟固辭不受景龍四年夏六月中宗崩韋庶人臨朝引用其黨分握政柄忌帝望素重潜謀陷害庚子夜臨淄王與太平公主子薛崇簡前朝邑尉劉幽求折衝麻嗣宗及宫苑総監鍾紹京等率兵入北軍誅韋溫紀處訥宗楚客武延秀馬秦客葉静能趙復溫楊均等諸韋武黨與皆誅之辛丑帝挾少主御安福門樓慰謝百姓大赦天下其日王公百寮上表咸以國家多難宜立長君以帝衆望所歸請即尊位甲辰少帝詔曰叔父相王髙宗之子昔以天下讓於先帝孝友寛簡彰信兆人神龍之初已有明旨將立太弟以為嗣君為王懇辭未行冊命所以東宫虛位至于厯年徹綴涉衝反在辰禍變倉卒然後稱制計立冲人欽奉前懐願遵理命上申先聖之旨下遂蒼生之心俯稽圖緯之文仰欽祖宗之烈即今日請叔父相王即皇帝位朕退守本藩歸於舊邸凡百卿士敬承朕言克贊我天人之休期光我有唐之勲業布吿遐邇咸使聞知相王上表讓曰臣以宗社事重國家情深誅鋤巨逆奉戴嗣王今承制旨猥推宸極在臣虚薄不敢祗膺循還震驚無任感哽制答曰皇極大寶天下至公王者臨之葢非獲已叔父勲在社稷蒼生推仰龍光紫宸實允係望請遵前旨勿或推讓於是少帝遜於别宫是日即皇帝位御承天門樓大赦天下景雲三年春正月辛未朔謁太廟癸酉上始釋慘七感切服御正殿受朝賀甲戌并汾絳三州地震壊人廬舍辛巳親祀於南郊戊子躬耕籍田己丑大赦天下改元為太極春二月丁夘皇太子釋奠於國學追贈顔回為太子太師曽參為太子太保每年春秋釋奠以四科弟子及曾參從祀列七十二賢上八月庚子帝傳位於皇太子自稱曰太上皇帝五日一受朝於太極殿自稱曰朕三品以上除授及大刑獄並决之其處分事稱誥令皇帝每日受朝于武徳殿自稱曰予三品以下除授及徒罪並令决之其處分事稱制勅甲辰大赦天下改元為先天二年秋七月甲子太平公主與左僕射竇懐貞侍郎岑義等謀逆事覺皇帝率兵誅之窮其黨羽太子少保薛稷左㪚常侍賈膺福右羽林將軍李慈李欽中書舍人李猷中書令崔湜尚書左丞盧蔵用太史令傳孝忠僧恵範等皆誅之兵部尚書郭元振従上御承天門樓大赦天下自大辟罪已下無輕重咸赦除之翼日太上皇誥曰朕將髙居無為自今已後軍國刑政一事已上並令皇帝處分開元四年夏六月甲子太上皇帝崩于百福殿時年五十五諡曰大聖貞皇帝廟號睿宗冬十月葬于橋陵天寳十三載改諡曰𤣥貞大聖大興孝皇帝太平御覽卷一百十
