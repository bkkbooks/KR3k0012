  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_167-1a, image: WYG0894/WYG0894-0510c.png}
body:
  text: 太平御覽卷一百六十七宋李昉等撰州郡部十三山南道上荆州峽州歸州復州郢州鳯州成州武州興州宕州扶州文州利州䕫州開州合州忠州萬州閬州果州荆州十道志曰荆州江陵郡漢舊縣屬南郡禹貢曰荆及衡陽惟荆州春秋元命苞曰軫散為荆州分為楚國爾雅曰漢南曰荆州周官職方氏曰正南曰荆州其山鎮曰衡山其澤藪曰雲夢其川江漢其浸潁湛其利丹銀齒革晉元康地記曰荆州於古蠻服之地漢書曰臨江閔王榮坐侵廟壖地為宫上徵榮榮行祖於江陵北門既上車軸折車廢江陵父老流涕言曰吾王不返矣王至詣中尉府郅都責訊王王怒自殺漢書地理志南郡江夏零陵桂陽武陵長沙漢中汝南楚分也史記曰蘇秦說威王曰楚西有黔中巫郡東有夏州海陽南有洞庭蒼梧北有涇塞郇陽地方五千餘里帶甲百萬車千乘騎萬匹粟支十年此霸王之資也淮南子曰楚地南卷沅湘北繞潁泗西包巴蜀東裹郯邳潁汝以為泗江漢以為池垣之以鄧林綿之以方城山髙尋雲霓深谿肆無景十二州志曰漢章帝建初二年徙鉅鹿王恭為江陵王三公上言江陵在京師正南不可以封乃徙為安陸王盛宏之荆州記曰元嘉中以京師根本之所寄荆楚為重鎮上流之所總擬周之分陜晉宋以降此為西陵釋名曰荆州取名荆山又曰荆警也南蠻數冦常置警左傳曰楚子西沿漢泝江將入郢王在渚宫下見之十道志曰當陽縣舊縣屬南郡廣陽思王子蓋之所封荆州記曰當陽本楚之舊邑左氏傳云楚潘崇伐麏至于錫穴潁容釋例云麏在當陽十道志曰公安縣漢孱陽縣地吳之南郡荆州記曰蜀主敗于襄陽南奔荆州吳大帝擢為左將軍荆州牧城此而鎮之時號蜀主為左安軍故名其城曰公安古今地名曰松滋縣古鳩兹地漢屬廬江郡峽州十道志曰峽州夷陵郡春秋戰國時並楚地秦置三十六郡屬南郡魏武於此置江陵郡梁置宜州周武帝以州居三峽之口改為峽州史記曰秦昭王二十九年秦將白起攻楚燒夷陵吳録曰蜀昭烈皇帝立宜都郡於西陵宜都記曰宜都郡陸抗攻歩闡於此荆渚記曰夷陵郡居大江之上西通全蜀故夷陵有安蜀古城吳志曰陸遜上疏夷陵迺要害之地實國家之闗限若失之非損一郡荆州亦可憂也十道志曰宜郡縣本漢夷陵縣屬南郡袁山松宜都山川記曰南崖有山名荆門北崖有山名虎牙故曰荆門虎牙即楚之西塞歸州十道志曰歸州巴東郡在周為䕫子國屬楚秦併天下為南郡之地漢置秭歸縣唐武德二年割䕫州之秭歸巴東二縣置歸州袁山松記曰屈原此縣人既被流放忽然暫歸其姊亦來因名其地為秭歸秭與姊同三國志曰吳置建平郡即宜都之西部也晉王濬自蜀江沿流伐吳守將吾彦表皓曰請増建平兵若建平不下晉師終不敢過皓不從復州十道志曰復州竟陵郡禹貢荆州之域春秋戰國時屬楚秦兼天下屬南郡漢十三州在荆州部即江夏之竟陵縣地唐武德五年為復州郡國志曰沔陽縣即楚王城也圖經曰監利縣漢容縣乾谿章華臺在焉郢州十道志曰郢州富水郡厯代所屬與竟陵郡同二漢屬江夏郡晉宋以來為竟陵郡地西魏屬安州後周武置郢州隨廢唐武德六年為郢州郡國志曰長壽縣武陵山春秋謂楚平王卒於樠木之下即此山也鳯州十道志曰鳳州河池郡土地所屬與金州同在秦隴西郡地漢為故道縣地故道今兩當縣是漢武改雍為涼後為涼州之地水經曰兩當縣水出陳倉縣之大散嶺西南流入故道川謂之故道水縣因水取名或云縣西有兩山相當故名之華陽國志曰河池一名仇池郭仲産秦州記云仇池山一名仇維山上有池似覆壺前志云是縣以山得名水經曰大散水流入黄花川黄花縣因水得名成州十道志曰成州同谷郡禹貢梁州之域古西戎地周省梁入雍為白馬氐國史記西南夷傳曰自筰以東北君長以什數冉駹最大自冉駹以東北君長以什數白馬最大皆氐類也後漢書曰河池一名仇池地方百頃左右悉白馬氐武州十道志曰武州武都郡土地所屬與成州同亦白馬氐之地漢書西南夷傳曰漢誅且蘭君并殺筰侯冉駹等皆震懼請臣置吏以為廣西部至元鼎六年以白馬氐為武都郡隴右記曰武都紫水有泥其色紫而粘貢之用封璽書故詔誥有紫泥之美郡國志曰武帝沮水之西有角弩谷即蜀將姜維剿五溪蠻之所魚豢魏略曰文帝黄初元年徙武都於美陽在今雍州好畤縣界武都故城是也興州十道志曰興州順政郡戰國時白馬氐之東境秦併天下為蜀郡地漢武元鼎六年置武都郡晉書曰懷帝永嘉中氐之人楊茂搜據武都郡子孫承嗣為氐王周地圖記曰郡有丙山山有穴即丙穴其口向丙因以為名每春三月上旬有魚長八九寸或二三日聮緜從穴出躍相傳名為嘉魚左太沖蜀都賦曰嘉魚出丙穴宕州十道志曰宕州懷道郡禹貢梁州之域古羌地周為雍州之境秦漢魏晉諸羌據之後漢書曰梁彌忿者宕昌羌也其先帝為豪祖勒自稱宕昌王彌忿世祖初求内附遂拜彌忿為宕昌王因封其地為宕昌藩即今宕州扶州十道志曰扶州同昌郡禹貢梁州之域實西戎之地周省梁入雍為雍州地秦漢魏晉並屬蕃夷後魏書曰廢帝前元年西逐吐谷渾定隂平於此置鄧州及鄧寧郡取前羌部落所居為之名時又置帖夷縣屬封統郡以戎夷寧帖為義也周地圖記曰後漢廢帝置同昌郡屬封統郡文州十道志曰文州隂平郡禹貢梁州之域周為雍州之境戰國時氐羌據焉漢武時開西南夷置隂平道以統其衆蜀志曰鄧艾自隂平景谷步道懸兵束馬經江由出綿竹華陽國志曰晉永平之後羌虜數叛遂立為郡以遏之輿地志曰晉永嘉之末太守王鍳以郡降李雄晉人因是悉流移於蜀漢其氐羌並屬楊茂梗化後不復為正朔所頒利州十道志曰利州益昌郡土地所屬與金州同春秋戰國時並屬蜀侯漢葭萌縣也華陽國志曰昔蜀王封其弟於漢中號曰苴侯因命其地曰葭萌苴侯與巴王通好巴與蜀為讎故蜀王怒伐苴苴奔巴求救於秦秦乃伐蜀遂滅蜀及巴苴置巴蜀二郡水經曰益昌有小劍城去大劍城戍三十里連山絶險飛閣通衢故謂之劍閣也蜀志曰先主使陳戎絶馬鳴閣魏武聞之喜曰此閣迺漢中之平隂乃咽㗋之要路馬鳴閣在益昌縣䕫州十道志曰䕫州雲安郡春秋時為魚國秦併天下為巴郡地漢為魚復縣左傳曰庸蠻叛楚莊王伐之七遇皆北唯禆儵魚人實逐之杜曰禆儵魚庸三邑魚魚復縣漢志曰江闗都尉理魚復有橘官魚庸三邑魚魚復縣郡國記曰白帝城即公孫述至魚復有白龍出井中因號魚復為白帝城昭烈因改魚復為永安又後漢書公孫述自以承漢土德故號曰白帝城蜀志曰羅憲為領軍守永安聞魏軍平蜀三日哭於都亭荆州圖記曰永安宫南一里渚下平磧上有諸葛亮孔明八陣圖聚細石為之各髙五尺皆棊布相當中間相去九尺正中開南北巷悉廣五尺或為人散亂及為夏水所沒至冬水退如故荆州記曰壘西聚石為八行行八聚謂之八陣圖因曰八陣既成自今行師不復敗後見莫能了之桓宣武伐蜀見之曰此常山虵勢也開州十道志曰開州盛山郡本漢朐䏰縣之地合州圖經記曰合州巴川郡秦漢屬巴郡宋置東宕渠郡西魏置合州忠州十道志曰忠州南賔郡土地所屬與䕫州同譙周巴郡地記曰後漢獻帝初平六年臨江縣屬永寧郡建安中改永寧為巴東郡臨江仍舊焉續漢志曰和帝永元中分枳縣置平都縣史記蘇代曰楚得枳而國亡萬州十道志曰萬州南浦郡土地所屬與通州同漢為巴郡朐䏰縣地續漢志曰朐䏰屬巴郡尋江源記曰梁山東西數千里望之若長雲垂天劍閣銘曰巖巖梁山積石峨峨又曰丙穴有嘉魚其味甚美丙穴在梁山縣柏枝山閬州圖經曰閬州閬中郡禹貢梁州之域春秋為巴國之地秦漢為巴郡華陽國志曰巴子後理閬中地形志曰閬中居蜀漢之半當東道要衝今郡城即古之閬中城後謂之隆城是也後魏典略曰此州古有隆城堅險因置隆州尋又立盤龍郡以郡中有盤龍山為名三巴記曰閬中有渝水賨民銳氣喜舞故髙祖樂其猛銳數觀其舞使樂人習之故樂府中有巴渝舞果州十道志曰果州南充郡禹貢梁州之域春秋戰國並屬巴子國秦惠王滅巴蜀是為巴郡地自漢晉為安漢縣華陽國志曰漢獻帝初元年劉璋分墊江縣為巴郡理此縣周地圖記曰相如縣有司馬相如故宅因以名縣郡國志曰馮緄為車騎將軍於此鐫崖十有餘處今果山有車騎崖益州記曰南充縣西有大昆井即古之鹽井也唐書曰貞元中謝真人於郡中之紫極宫上昇萬目所覩郡郭是夕處處有虹霓雲氣太平御覽卷一百六十七
