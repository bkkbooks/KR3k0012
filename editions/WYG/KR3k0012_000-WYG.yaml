  text: 太平御覽總目類書類天部一卷至十五卷時序部十六卷至三十五卷地部三十六卷至七十五卷皇王部七十六卷至一百一十六卷偏霸部一百一十七卷至一百三十四卷皇親部一百三十五卷至一百五十四卷州郡部一百五十五卷至一百七十二卷居處部一百七十三卷至一百九十七卷封建部一百九十八卷至二百二卷職官部二百三卷至二百六十九卷兵部二百七十卷至三百五十九卷人事部三百六十卷至五百卷逸民部五百一卷至五百一十卷宗親部五百一十一卷至五百二十一卷禮儀部五百二十二卷至五百六十二卷樂部五百六十三卷至五百八十四卷文部五百八十五卷至六百六卷學部六百七卷至六百一十九卷治道部六百二十卷至六百三十四卷刑法部六百三十五卷至六百五十二卷釋部六百五十三卷至六百五十八卷道部六百五十九卷至六百七十九卷儀式部六百八十卷至六百八十三卷服章部六百八十四巻至六百九十八卷服用部六百九十九卷至七百一十九巻方術部七百二十卷至七百三十七卷疾病部七百三十八卷至七百四十三卷工藝部七百四十四卷至七百五十五卷器物部七百五十六卷至七百六十五卷雜物部七百六十六巻至七百六十七卷舟部七百六十八卷至七百七十一巻車部七百七十二卷至七百七十六卷奉使部七百七十七卷至七百七十九卷四夷部七百八十卷至八百一卷珍寶部八百二巻至八百一十三卷布帛部八百一十四卷至八百二十卷資産部八百二十一卷至八百三十六卷百穀部八百三十七卷至八百四十二卷飲食部八百四十三卷至八百六十七卷火部八百六十八卷至八百七十一卷休徴部八百七十二卷至八百七十三卷咎徴部八百七十四巻至八百七十九巻神鬼部八百八十卷至八百八十四巻妖異部八百八十五卷至八百八十八卷獸部八百八十九卷至九百一十三卷羽族部九百一十四卷至九百二十八巻鱗介部九百二十九卷至九百四十三卷蟲魚部九百四十四卷至九百五十一卷木部九百五十二卷至九百六十一卷竹部九百六十二卷至九百六十三卷果部九百六十四卷至九百七十五卷菜部九百七十六卷至九百八十卷香部九百八十一卷至九百八十三卷藥部九百八十四卷至九百九十三卷百卉部九百九十四卷至一千卷臣等謹案太平御覽一千卷宋李昉等奉勅撰以太平興國二年受詔至八年書成初名太平編類後改為太平御覽宋敏求春明退朝録謂書成之後太宗日覽三卷一嵗而讀周故賜是名也凡分五十五門徵引至為浩博故洪邁容齋隨筆稱太平興國中編次御覽引用書一千六百九十種其綱目並載於首卷案此則今本前列書目乃宋時官本之舊而襍書古詩賦又不能具録以今考之無傳者十之七八胡公應麟經籍會通則以為是編所引大抵採自類書非其書宋初尚存力駁邁説之誤所言良是然考陳振孫書録解題曰或言國初古書多未亡以御覽所引用書名故也其實不然特因諸家類書之舊耳以三朝國史考之館閣及禁中書總三萬六千餘卷而御覽所引書多不著録盖可見矣是邁所云云振孫己先駁之矣應麟特剿襲其説耳應麟又曰御覽向行抄本十年來始有刻而譌􅍝特甚非老師宿儒即一篇半簡莫能句讀至姓名顛舛世代魯魚初學之士讀之或取為詩文用誤人不尠案此本前有萬厯元年黄正色叙曰太平興國迄今幾六百載宋世刻本俱已湮滅近世雲間朱氏僅存者亦殘缺過半海内鈔本雖多輾轉傳寫訛舛益甚吾錫士大夫有好文者因閩省梓人用活字校刋始事於隆慶二年至五年纔印其十之一二閩人散去於是浙人倪炳伯文謀於郡邑二三大夫協力鳩工鋟諸梨棗孫國子虞允一元力任校讐忽於隆慶六年捐館弗克終事今復苦於舛訛薛憲副應登有校得善本蔵諸家塾其仲子名逢者俾倪氏繕寫付梓云云所言刋本訛􅍝之故大概與應麟合然此書行世實有二本一為活字印本其板心稱共印五百部則正色所云印十之一二散去者其説不確一即倪氏此本二本同出一藁脱誤相類而校手各别字句亦小有異同今以二本㕘校併證以他書正其所可知而仍其所不可知古書義奥文句與後世多殊闕疑猶愈於妄改也宋初去古未逺即所採類書亦皆具有淵源與後來餖飣者逈别故雖蠧蝕斷爛之餘尚可據為出典世所傳宋以前書可考見古籍佚文者僅六七種曰裴松之三國志注曰酈道元水經注曰劉孝標世説新語注曰李善文選注曰歐陽詢藝文類聚曰徐堅初學記其一即此書也殘碑斷碣剥蝕不完歐陽趙洪諸家尚藉之以訂史傳况四庫菁華滙於巨帙獵山漁海採摭靡窮又烏可以難讀廢哉乾隆四十五年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀太平御覽經史圖書綱目周易周易正義周易文言京房易傳京房易說易乾鑿度京房易飛候周易叅同契周易緯焦贑易林郭璞易洞林管氏易林周易稽覽圖周易坤靈圖周易通統圖周易通卦驗張璠易註序周易是謀類易林變占周易集林雜占揚雄易太𤣥經尚書尚書正義尚書大傳尚書說書敘傳劉向洪範傳周書時訓逸書尚書中候尚書紀年韓書外傳尚書緯尚書考靈曜尚書帝命驗尚書帝驗期尚書璇璣鈐禹時鉤命訣汲冡周書毛詩毛詩正義毛詩義疏毛詩傳毛萇詩註毛詩題綱韓詩内傳韓詩外傳韋曜毛詩問劉禎毛詩義問郭璞毛詩拾遺劉芳詩箋音義正詩含神霧詩推災度陸璣詩草木蟲魚詩紀厯樞周禮大戴禮禮稽命㣲圖禮稽命曜禮含文嘉禮斗威儀儀禮禮統禮記禮記正義禮記外傳大戴禮五經異義五經通義五經正義三禮義宗三禮正義許愼五經異說楊方五經鉤沉邯鄲綽五