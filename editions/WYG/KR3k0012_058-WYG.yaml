body:
  text: 太平御覽卷五十八宋李昉等撰地部二十三水上水上釋名曰水準也平準物也廣雅同天下大水四謂之瀆江河淮濟也瀆獨出其所而入海也易曰坎為水潤萬物者莫潤乎水又曰水洊至坎又曰水流濕書曰水曰潤下潤下作鹹又曰若涉大水其無津涯尚書大傳曰非水無以準萬里之平非水無以通逺道任重也詩曰相彼泉水載清載濁又曰沔彼流水朝宗于海又曰濟有深涉渡也深則厲淺則掲有瀰濟盈濟盈不濡軌盈宜濡不以濡喻滛亂犯禮者也又曰就其深矣方之舟之就其淺矣泳之游之又曰毖彼泉水亦流于淇又曰河水瀰瀰河水洋洋北流活活又曰淇水在右泉源在左又曰揚之水不流束薪又曰泌之洋洋可以樂飢言樂道也禮曰今夫水一勺之多及其不測黿鼉蛟龍魚鼈生焉貨財殖焉又曰水之於人親而不尊又曰水為無當於五色五色不得不彰又曰祭宗廟水曰清滌又曰水煩則魚鼈不大又曰小人溺於水君子溺于禮夫水近於人而易溺人周禮曰水有時以凝傳曰共工氏以水紀故為水師而水名又曰潢汙行潦之水可薦於鬼神可羞於王公又曰鄭子産謂子太叔曰唯有徳者能以寛服民其次莫如猛夫火烈人望而畏之故鮮死焉水懦弱民狎而翫之則多死焉故寛為難也春秋元命苞曰水之為言演也隂化淖濡流施潜行也故其立字兩人交一以中出者為水一者數之始兩人譬男女言隂陽交物以一起也論語曰智者樂水又曰逝者如斯夫不舍畫夜爾雅曰水别流曰派風吹水涌曰波大波曰濤小波曰淪平波曰瀾直波曰涇水朝夕而至曰潮風行水成文曰漣水波如錦文曰漪水行曰渉逆流而上曰泝洄順流而下曰泝游亦曰沿流絶流而渡曰亂以衣涉水曰厲由膝以下為掲由膝以上為涉渡水處曰津濟潜行水下為泳漢書曰成帝建始三年秋京師民無故相驚言大水至天子親御前殿召公卿議大將軍鳳以為太后與上及后宫可御舟船令吏上長安城以避水羣臣皆從鳳議左將軍王商獨曰上古無道之國水猶不冐城郭今聖政和平世無變革上下相安何因當有大水一日暴至此必訛言也不宜令民上城重驚百姓上乃止有頃長安中稍定問之果訛言上於是壯商之固守數稱其議而鳳大慙自恨後漢書東陽人趙炳字公阿能越方禁與閩中徐登遇於烏傷溪水上乃禁溪水水為不流又曰竇太后臨政竇憲兄弟各擅威權丁鴻上封事曰夫壊崖破岩之水源由涓涓干雲蔽日之木起於萌蘖魏畧曰漢火徳忌水故去洛水而闕土魏為土土水之母水得土而流土得水而柔故除木闕水晉書曰陸雲先是嘗著衰絰上船於水顧見其影因大笑落水人救獲免又曰佛圖澄傳襄國城塹水源在城西五里其水源暴竭勒問澄何以致水澄曰今當勅龍取水乃與弟子法者等數人至故泉源上坐繩牀燒安息香呪願數百言如此三日水微流有一小龍長五寸許隨水來出諸道士競往視之有頃水大至隍塹皆滿又曰鄧攸為太子中庶子吳郡闕守人多欲之帝以授攸攸載米之郡唯飲吳水而已又曰孫登素性無怒人或沒諸水中欲觀其怒既出便大笑齊書陸慧時征虜功曹與㕘府軍沛國劉璡同從述為職行至吳璡謂人曰吳間張融與陸慧並宅其間有水此水必有異味遂往酌而飲之唐書曰新豐鸚鵡谷水清俗傳云此水清天下平開皇之初暫清尋濁至是而復清又曰乾元中嵐州上言合河關黄河水四十里間清如井水經四日而變又曰楊朝晟為邠州刺史奏方渠合水波皆賊路請城其地以備之軍次方渠無水師後囂然遽有青蛇乗髙而下視其跡水隨而流朝晟令築防環之遂為停前軍仰飲以足又曰孔若思遷庫部郎中若思常謂人仕至郎中足矣至是持一石止水滿于座右以示有止足之意老子曰止善若水水善利萬物而不爭處衆人之所惡故幾於道列子曰禹治水土迷之一國無風雨霜露不生鳥獸當國之中有山名壹嶺頂有口狀若圓環名曰滋穴有水涌出名曰神瀵臭過蘭椒味過醪醴又曰白公問于孔子曰人可與微言乎孔子不應白公曰若以石投水何如孔子曰吳之善沒者能取之曰若以水投水何如孔子曰淄澠之合易牙嘗而知之白公曰人固不可與微言耶又曰人有濵河而居者習於水勇於泅操舟鬻渡利供百口里裹糧就學者成徒而溺死者幾半本學泅不學溺而利害如此禮記曰君子之交淡如水又曰秋水時至百川灌河流之大也兩崖涘之間不辨牛馬言其廣於是河伯欣然自喜以天下之美盡在已矣又曰水之性不雜則清莫動則平又曰孔子觀於吕梁懸水三十仞流沫三十里黿鼉魚鼈不能游見一大夫游之數百步而去又曰水之守土地審無意則止于分所以為審又曰水靜明明燭鬢眉大匠取法焉水靜猶明而况聖人之心靜乎又曰水之積也不厚其負大舟也無力文子曰水之性欲清沙石穢之水之為道也廣不可極莫知其年深不可測長極無窮逺渝無涯息耗減益過淤不訾湧出曰息􅋩乾曰耗川枝流曰減九野注之曰益過耗曰淤不訾者言過尾閭入天壑入无底谷又曰水濁者魚噞喁又曰混混之水濁可以濯吾足青青之水清可以濯吾纓又曰水之道也大不可極深不可測上天為雨露下地為潤澤又曰猶鑿渠而止水抱薪而救火墨子曰古語君子不鏡於水而鏡於人鏡於水見面之容鏡於人則知吉凶管子曰水者地之血氣筋脈之流者故曰水具材也夫水淖溺以清仁也視之黒而白清也量之至滿而止智也流則至平義也人皆赴髙已獨趨下卑也卑也者道之室王者之器也準也者五量之宗素也者五色之質淡也者五味之中也故水藏萬物産於金石故曰水神凡有五害水一也旱二也風霧雹霜三也厲四也蟲五也五害之屬水最為大水有大小有逺邇水出山而流入海命曰經水别於他水入於大水及海者命曰枝水山之溝流於大水及海者命曰川水水出於地而不流者命曰淵水淮南子曰天下之物莫柔弱於水上天則為雨露下地則為潤澤萬物弗得不生百事不得不成大苞羣生而無所私澤及跂蹺跂蹺行也蹺微小之蟲也而不求報富贍天下而不既贍足也既盡也徳施百姓而不費徳澤加於百姓不以為費財物也行不可得而窮極也流行不止微而不可得把握也擊之無創財之不傷斬之不斷焚之不燃水之怪也淖溺流遁錯繆相紛遁逸也錯繆相紛波相經也而不可靡散利貫金石強濟天下水流缺石是其利也舟船所載無有重是其強也濟通也動容無形之域而翺翔忽區之上忽恱之區上也言其飛為雲雨無所不止邅迴川谷之間邅迴猶委曲也而滔騰大荒之野有餘不足與天地取與授萬物而無所前後前後皆與之是故無所私而無所公公私一也靡濫振蕩與天地洞鴻鴻大洞通無所左而無所右蟠委錯紾音軫與萬物始終流轉是謂至徳言水之為徳大極故曰至徳也夫水所以能成其至徳於天下者以其淖溺潤滑也故老耼之言曰天下至柔馳騁於天下之至堅出於無有入於無間是水也吾是以知無為之有益有益於生夫無形者物之大祖也無音者聲之大宗也無形生有形故萬物大祖也無音生有音故為大宗祖宗皆本也其子為光其孫爲水皆生于無形乎光無形道所貴也觀之故子為光也水形而不可闕之故為孫闕夫光可見而不可握水可循而不可毁故有像之類莫尊於水出生入死自無蹠有自有蹠無而以衰賤矣入死道謂匿于情欲也蹠適也自無形而適有形者離其本也自有形而適無形者不能復得道家之所共棄也故曰以衰賤也是故清静者德之至也而柔弱者道之要也虛無恬愉者萬物之用也注闕肅然應感殷然反本則淪於無形矣所謂無形者一之謂也一者道之本也所謂一者無匹合於天下者也卓然獨立塊然獨處上貫九天下貫九野九天八分中央九天野亦如之圓不中規方不中矩大渾而為一葉無根言微妙也懐囊天地為道開門開道之門穆文隱閔純徳獨存穆文隠閔皆無形之類也純不雜柔也布施而不既用之而不勤既盡也勤勞也又曰夫水之性若拙其所流而深之茨其所決而髙也茨積土頃滿之也使得循勢而行乗襄而流襄下也雖有腐髊流澌弗能汚腐髊骨澌水也其惟性非異也通之與不通也風俗猶此也誠決其善志防其邪知啟其善道塞其閒路與同出一道則民性可善而風俗遷矣又曰河水赤水遼水黒水江水淮水是謂六水白水宜玉黒水宜砥青水宜碧赤水宜丹黄水宜金青水宜龜汾水宜麻洛水輕利宜禾渭水多力宜黍漢水重安宜竹箭又曰土地各以類生人是故清水音小濁水音大湍水人輕遲水人重又曰白水出崑崙之原飲之不死又曰方諸見月則津而為水畢萬術曰方諸取水方諸形若杯元日以玉石合以十二月壬子夜半作之以承水即來抱扑子曰火出於陽燧燧員而火不員也水出於方諸諸方而水不方也又曰黄帝曰天在水外水在天外浮天而載地者水也又曰左慈以氣禁水水為逆流一二丈禁水着中庭露之大寒不氷尸子曰凡水其方折者有玉其圓折者有珠清水有黄金龍潤有玉英顧子曰顧夷子與子華遊東池子華曰水有四徳沐浴羣生深流萬世是仁也揚清激濁蕩去滓穢是義也柔而難犯弱而難勝是勇也道江疏河惡盈流謙是智也孟子曰數罟不入汚池魚鼈不可勝食也數罟宻網也又曰民之歸仁也猶水之就下又曰流水之為物也不盈科不行又曰原泉混混不舍晝夜盈科而後進放乎四海有本者如是茍為無本七八月之間雨集溝澮皆盈其涸也可立而待也故聲聞過情君子恥之又曰性猶湍水也決諸東方則東流決諸西方則西流人性無分于善不善也猶水之無分于東西也人無有不善水無有不下又曰仁之勝不仁也猶水之勝火今之為仁者猶以一杯水救一車薪之火也又曰觀於海者難為水遊於聖人之門者難為言觀水有術必觀其瀾瀾水中大波也孫卿子曰孔子觀於東流之水子貢問於孔子君子見大水必觀焉何也孔子曰夫水柔也而無為也似徳其浩浩乎不居似有道其延萬仞之谷不懼似勇主量必平似法盈不求概似正發源必東似志是以君子見大水必觀焉大戴禮孔子家語並有太平御覽卷五十八
