body:
  text: 太平御覽卷七百三十三宋李昉等撰方術部十四占星占風占雨望氣占星漢書曰髙祖元年十月五星聚東井客謂張耳曰東井秦地也漢王入關五星從嵗星聚當以義取天下後漢書曰嚴光字子陵少有髙名與光武同遊及帝即位光變姓名隠身不見帝思其賢乃令以物色訪之後齊國上言有一男子披羊裘釣澤中帝疑其光也乃備安車𤣥纁遣使聘之三反而後至帝常引光入論道舊故相對累日帝從容問曰朕何如昔時對曰陛下差増於徃因共偃卧光以足加帝腹上明日太史奏客星犯帝座甚急帝曰朕故人嚴子陵共卧耳又曰李郃字孟節漢中南鄭人也父頡以儒學稱官至愽士郃襲父業遊太學通五經善河洛風星外質朴人莫之識縣召署幕門侯吏和帝即位分使者皆㣲服單行各至州縣觀採風俗使者二人當到益州投郃舍時夏夕露坐郃因仰觀問曰二君發京師時寧知朝廷遣二使耶二人黙驚相對視曰不聞也問郃何以知之郃指星示云有使星向益州分野故知之耳又曰曹公破袁紹於官渡初桓帝時有黄星見於楚宋之分遼東殷馗善天文言後五十嵗當有真人起於梁沛之間其鋒不可當至是凡五十年而公破袁紹天下莫敵也晉書曰戴洋善占候揚州刺史嘗問吉凶於洋答曰熒惑入南斗八月暴水當有客軍西南來如期果大水而石冰作亂冰既據揚州洋謂人曰視賊雲氣四月當破果如其言㤗寧二年正月有流星東南行洋曰至秋應當壽陽及王敦作逆祖約問其勝敗洋曰太白在東方辰星不出兵法先起者為主應者為客辰星若出太白為主辰星為客辰星不出太白為客先起兵者敗今有客無主有前無後宜傳檄所部應詔伐之約乃率衆向合肥俄而敦死衆敗遂住壽陽洋又謂曰江淮之間當有軍事譙城虛曠宜還固守不然者雍丘沛皆非官有也約不從豫土遂陷於賊南中郎將桓宣以洋為叅軍將随宣徃襄陽太守陶侃留之住武昌時侃謀北伐洋曰前年十一月熒惑守胃昴至今年四月積五百餘日昴趙之分野石勒遂死熒惑以七月退從畢右順行入黄道未及天關以八月二十二日復逆行鈎繞畢向昴昴畢為邉兵主外域故置矢弓以射之熒惑逆行司無德之國石勒死是也勒之餘燼已自殘害今年官與太嵗太隂三合癸巳癸為北方北方當受災嵗鎮二星共合翼軫從子及已徘􅆦六年荆郢之分嵗鎮所守其下國昌豈非功德之徵也今年六月鎮星前角亢角亢鄭之分嵗星移入房太白在心房宋分順之者昌逆之者亡石季龍若興兵東南此其死㑹官若應取天與不取反受其咎侃志在中原聞而大喜㑹病篤不果行而薨又曰祖逖將城武牢未成而逖病甚先是華譚庾闡問術人戴洋洋曰祖豫州九月當死初有妖星見於豫州之分又曰陳訓謂人曰今年西北大將軍當死逖亦見星曰為我矣方平河北而天欲殺我此乃不祐國也俄卒于雍丘又載記曰符堅時有大風從西南來俄而晦冥恒星皆見又有赤星見于西南太史令魏延言於堅曰於占西南國亡明年必平蜀漢堅大悅又曰符堅以弟融為鎮東將軍代王猛為冀州牧融將發堅祖于覇東奏樂賦詩堅母苟氏以融少子甚愛之比發三至㶚上其夕又竊如融所内外莫知是夜堅寢於前殿魏延言天市南門屏内后妃星失明左右閽寺不見后妃移動之象堅問知之驚曰天道與人何其不遠遂重星官後魏書曰崔浩明識天文好觀星變常置金銀銅鋌於酢噐中令青夜有所見即以鋌畫紙作字以記其異又曰姚興死之前嵗大史奏熒惑在匏𤓰星中一夜忽然亡失不知所在或謂下入危亡之國將為童謡訛言之妖而後行其災禍太宗聞之大驚乃召碩儒十數人令與史官求其所詣崔浩對曰按春秋左氏𫝊說神降于莘其至即其物也請以日辰推之庚午之夕辛未之朝天有雲熒惑之亡當在此二日之内庚之與午皆主於秦辛為西夷今姚興據咸陽是熒惑入秦矣諸人皆作色曰天上失星人安能知其所詣而妄說無徵之言浩笑而不應後八十日熒惑果出於東井留守盤旋秦中大旱赤地昆明池水竭童謡訛言國内諠擾明年姚興死二子交兵二年國㓕於是諸人乃服曰非所及也唐書曰嚴善思同州朝邑人也少以學涉知名尤善天文歴數及卜相之術則天時為監察御史稍遷太史令聖歴二年熒惑入輿鬼則天以問善思善思對曰商姓大臣當之其年文昌左相王及善卒長安中熒惑入月鎮星犯天關善思奏曰法有亂臣伏罪且有臣下謀上之象嵗餘張柬之敬暉等起兵誅張易之昌宗其占騐皆此類又曰尚獻甫衛州汲人也尤善天文則天時召見起家拜太史令數顧問災異事皆符騐長安二年獻甫奏曰臣本命納音在金今熒惑犯五諸侯太史之位熒惑火也火能尅金是臣將死之徵則天曰朕為卿厭之遽轉獻甫為水衡都尉謂曰水能生金又去太史之位卿無憂矣其秋獻甫卒則天甚嗟異惜之又曰元和八年熒惑犯太㣲上相歴執法占者言今之三相皆不利治輕未重月餘李絳以足疾免明年十月李吉甫以暴疾卒九年六月武元衡為盗所害年五十八始元衡與吉甫齊年又同日為宰相及出鎮分領揚益至吉甫再入元衡亦還吉甫生月卒吉凶之數若符㑹焉占風後漢書曰郎顗上書曰今月十七日戊午徵日也日加申風從寅來丑時而止丑寅申皆徵也不有火災必當為旱願陛下校計繕修之費永念百姓之勞罷將作之官减彫文之飾損庖厨之饌退晏私之樂又曰任文公巴郡閬中人也父文孫明曉天官風星秘要文公少脩父術州辟從事哀帝時有越嶲太守欲反刺史大懼遣文公等五從事檢行郡界潜伺虛實共止傳舍時暴風卒至文公遽起曰諸從事促去當有逆變來害人者因起駕速驅諸從事未能自發郡果使兵殺之文公獨得免又曰李南字孝山丹陽句容人也少篤學明於風角和帝永元中太守馬稜坐盗賊事被徵當詣廷尉吏人不寧南特通謁賀稜意有恨謂曰太守不得今當即罪而君且相賀耶南曰旦有善風明日中時應有吉問故來稱慶旦日稜延望景晏以為無徵至晡乃有驛使齎詔書原停稜事南問其遲留之狀使者曰向渡宛陵浦黒航馬踠足是以不得速稜乃服焉後舉有道辟公府病不行終於家南女亦曉家術為由拳縣人妻晨詣㸑室卒有暴風女便上堂復姑求歸辭其二親姑不許乃跪而泣曰家代𫝊術風卒起先吹竈突及井此禍為婦女主㸑者妾將亡之應因著其亡日乃聼還家如期病卒又曰宗郎為吳令時卒有暴風宗占知京師當有大火記識時日遣人參候果如其言諸公聞其表上以愽士徵之宗恥以占騐見知聞徵書到包懸印綬於懸迋而遁去遂終身不仕吳志曰孫權征黄祖軍行及潯陽吳範見風氣因詣船賀催兵急行至即破祖祖夜亡權恐失之範曰未遠必生擒祖至五更果得之晉書曰祖約鎮譙梁國人反戴洋曰賊以辛酉反辛德在南方酉受刑梁在譙北乗德伐刑賊必破亡及甲子日東風而雷西行譙在南雷在軍前為軍驅除昔吳伐關羽天雷在前周瑜拜賀今與徃同故知必尅約從之果平又曰洋徃潯陽時劉𦙍鎮潯陽九月甲寅申時迴風從東來入𦙍兒船中西過狀如疋練長五六丈洋曰風從咸池下來攝提下去咸池為刀兵大殺為死䘮到甲子日申時府内大聚骨埋之𦙍問在何處洋曰不出州府門也𦙍架東門洋又曰東為天牢牢下開門憂天獄至十二月十七日洋又曰臘近可開門以五十人備守并以百人備東北寅上以却害氣裔不從二十四日壬辰裔遂為郭黙所害北齊書曰權㑹明風角𤣥象曾令家人遠行久而不反其行還垂欲至宅乃逢寒雪寄息他舍㑹方處學堂講說忽有旋風瞥然吹雪入戸㑹乃笑曰行人至何意中停遂命使人令詣其處追尋果如語每為人占筮小大必中但用爻辭彖象以辯吉凶占雨後漢書曰任文公為侍中從事時天大旱白刺史曰五月一日當有大水其變已至不可防救宜令吏人豫為其備刺史不聼文公獨儲大舩百姓或聞頗有為防者到其日旱烈文公急促載使白刺史笑之日將中天北雲起湏臾大雨至餔時湔水涌起十餘丈突壞廬舍所害數千人又曰髙獲善天文曉遁甲能役使鬼神時郡境大旱太守鮑昱自徃問何以致雨獲曰急罷三部督郵明府當自北出到三十里亭雨可致也昱從之果得大雨又曰揚統善天文推歩之術建初中為皷城令一州大旱統推隂陽消伏縣界䝉澤太守宗湛使統為郡求雨亦即降澍望氣史記曰漢文十五年夏四月趙人新垣平以望氣見因說上設立渭陽五廟欲出周鼎當有玉英見漢書曰范増說羽曰沛公居山東時貪財好色今聞其入關珍物無所取婦女無所幸此其志不小吾使人望其氣皆為龍成五色此天子氣急擊之勿失又曰孝武釣弋趙媫好昭帝母也家在河間武帝廵狩過河間望氣者言此有竒女天子使召之既至女兩手皆拳上自披之手即時申由是得幸號曰拳夫人進為媫妤居釣弋宫生昭帝又曰宣帝武帝曾孫戾太子孫生數月遭巫蠱事雖在襁褓猶坐収繫郡獄而邴吉為廷尉監憐之無辜使女徒更乳養望氣者言長安獄中有天子氣上遣使者分條中都官獄繫者輕重皆殺之内謁者令郭穰夜至郡獄吉拒閇使者不得入頼吉得全後漢書曰光武紀云望氣者蘇伯阿為王莾使至南陽遥望見舂陵郭唶曰氣佳哉欝欝葱葱然及始起兵還舂陵遠望舍南火赫然屬天有頃不見晉書曰秦時望氣者云五百年後金陵有天子氣故始皇東廵狩以厭之改其地曰秣陵壍北山以絶其勢及孫權之稱號自謂當之考其厯數猶為未及元帝之渡江也乃五百二十六年真人應之在此矣又曰初吳之未㓕也斗牛之間有紫氣道術者皆以吳方強盛未可圗也惟張華以為不然及吳平之後紫氣愈明又曰陳訓字道元厯陽人也學天文筭歴隂陽占候無不畢綜尤善風角孫皓以為奉禁都尉使其占候皓政嚴酷訓知其必敗而不敢言時錢塘湖開或言天下當太平青蓋入洛陽皓以問訓訓曰臣止能望氣未達湖之開塞退而告人曰青蓋入洛將有輿襯銜璧之事非吉祥也尋而吳亡及陳敏作亂弟宏為厯陽太守訓謂邑人曰陳家無王氣不久當㓕宏聞將斬之訓鄉人秦璩為宏參軍乃說宏曰訓善風角可試之如不中徐斬未晚也乃赦之時宏攻征東叅軍衡彦於厯陽乃問訓曰城中有幾千人攻之可拔不訓登牛渚山望氣曰不過五百人然不可攻攻之必敗宏復大怒曰何有五千人攻五百人而不得拔之令將士攻之果為彦所敗方信訓有道術乃優遇之宋紀曰齊宣帝墳塋在武進縣常有雲氣氲人故元嘉中望氣者稱此地有天子氣後周書曰蔣昇字鳳起少善天文𤣥象之學太祖雅信待之常侍左右以備顧問大統三年東魏將竇㤗入㓂濟自風陵頓軍潼關太祖出師馬牧澤時西南有黄紫氣抱日從未至酉大祖謂昇曰此何祥也昇曰西南未地主土土王四季秦之分也今大軍既出喜氣下臨必有大慶於是進軍與竇㤗戰擒之隋書曰􅅊鼎仕梁為太府卿至德初鼎質貨田宅寓居僧寺友人毛彪問其故答曰江東王氣盡於此矣吾與爾當塟長安期運將及故破産耳陳武帝在南州鼎望氣知其當王遂寄孥焉因謂陳武帝曰明年有大臣誅死後四嵗梁其代終天之厯數當歸舜後昔周㓕殷氏封媯滿于宛丘其裔子孫因為陳氏僕觀明公天縱神武繼絶統者無乃是乎武帝隂有圗僧辨意聞其言大喜因而定䇿太平御覽卷七百三十三
