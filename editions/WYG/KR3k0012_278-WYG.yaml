body:
  text: 太平御覽卷二百七十八宋李昉等撰兵部九邊將邊將史記曰李牧為趙將居鴈門備匈奴日擊牛饗士謹􅇏火多間諜敢有捕敵者斬王以為怯代之匈奴數來復使牧將牧曰如前乃敢奉令王許諾數嵗終無所得後選百金之士五萬彀弦者十萬大破匈奴又曰文帝時匈奴大入朝那殺北地都尉昂帝乃復問馮唐曰公何以知吾不能用㢘頗李牧也唐對曰臣聞上古王者之遣將跪而推轂曰閫以内者寡人制之閫以外者将軍制之軍功爵賞皆决於外歸而奏之此非虛言也臣大父言李牧為趙將居邊軍市之租皆自用饗士賞賜决於外不從中擾也委任而責成功故李牧乃能得盡智能遣選車千三百乗彀騎萬三千百金之士十萬是以北逐單于破東邊滅澹林西抑强秦南支韓魏當是之時趙㡬覇㑹趙王遷立用郭開讒卒誅李牧令顔聚代之是以兵破士北為秦所滅今臣竊聞魏尚為雲中守其軍市租盡以給士卒出私養錢五日一殺牛饗賔客軍吏舍人是以匈奴逺避不近雲中之塞敵嘗一入尚率車騎擊之所殺甚衆夫士卒盡家人子起田中從軍安知尺籍伍符終日力戰斬首捕敵上功幕府一言不相應文吏以法䋲之其賞不行而吏奉法必用臣愚以為陛下法太明賞太輕罰太重且雲中守魏尚坐上功首虜差六級陛下下之吏削其爵罰作之由此言之陛下雖得㢘頗李牧不能用也文帝說是日令馮唐持節赦魏尚復以為雲中守而拜唐為車騎都尉又曰武帝以李廣為未央衞尉而程不識亦為長樂衞尉不識故與廣俱嘗屯邊而廣行無部伍行陣就善水草屯舍止人人自便不擊刁斗以自衞幕府省約束文籍事然亦逺斥候未嘗遇害程不識正部曲行伍營陣擊刀斗士吏理軍簿至眀軍不得休息然亦未嘗遇害不識曰李廣軍極簡易然敵卒犯之無以禁也而其士卒亦佚樂咸樂為之死我軍雖煩擾然敵亦不得犯我是時漢邊郡李廣程不識皆為名將然匈奴畏廣之畧士卒亦多樂從廣而苦程不識漢書曰晁錯上言兵事曰自髙后以來隴西三困於匈奴非隴西之民有勇怯廼將吏之製巧拙異也故兵法曰有必勝之將無必勝之民由此觀之安邊境立功名在於良將不可不擇也又曰趙充國奏曰從今盡三月敵馬羸瘐必不敢捐妻子于他種中逺涉河山而來為冦是臣之愚計所以度敵且必瓦解其處不戰而自破也又曰張安世長子千秋為中郎將將兵隨度遼將軍范眀友擊烏程還謁大將軍光問千秋戰陣方略山川形勢千秋口對兵事畫地成圖無所㤀失後漢書曰竇憲懼誅自求擊匈奴以贖死㑹南單于請兵北伐乃拜憲車騎將軍金印紫綬官屬依司空依准也長史一人千石掾属二十九令史及御属三十二人見續漢志以執金吾耿秉為副發北軍五校漢有南北軍每軍中侯一人六百石掌臨五營黎陽雍營緣邊十二郡騎士漢官儀曰光武中興以幽冀并州兵騎克定天下故於黎陽立營以謁者監之又曰扶風郡尉部在雍縣以凉州近羗数犯三輔將兵衞䕶故俗稱雍營及羗胡兵出塞明年憲與秉各將四千騎及南匈奴左谷蠡王師子師子其名也萬騎出朔方鷄鹿塞南單于屯屠河屯屠河單于名將萬餘騎出滿夷谷度遼將軍鄧鴻鄧禹少子及緣邊義從𦍑胡八千騎與左賢王安國萬騎出㧽陽塞㧽陽在五原郡㧽音固皆㑹涿邪山憲分遣副校尉閻盤司馬耿䕫耿譚將左谷蠡王師子右呼衍王須訾等呼衍其號因以為姓匈奴遺種也今呼延姓是其後須訾名精騎萬餘與北單于戰於稽落山大破之敵衆崩潰單于遁走追擊諸部遂臨私渠北鞮海匈奴中海名也斬名王已下萬三千級獲生口馬牛羊槖駝百餘萬頭於是温犢須日逐温吾夫渠王抑鞮等八十一部率降者前後二十餘萬人憲秉遂登燕然山去塞三千餘里刻石勒功紀漢威徳令班固作銘又曰馬援討五溪蠻軍次下雋下雋縣名属長沙國故城今辰州沅陵縣雋音字兖反有兩道可入從壺頭則路近而水險壺頭山名也今在辰州沅陵東武陵記曰此山頭與東海方壺山相似神仙多所逰集故名壺頭山也從充則塗夷而運逺充縣名属武陵郡充音昌容反帝初以為疑及軍至耿舒欲充道援以為棄日費糧不如進壺頭搤其喉咽搤持也充賊自破以事上之帝從援䇿三月進營壺頭賊乗髙守隘水疾船不得上㑹暑甚士卒多疾死援亦中病遂困乃穿岸為室以避炎氣武陵記曰壺頭山邉有石窟即援所室也室内有蛇如百斛船大云是援之餘靈也賊每升險鼓譟援輒曵足以觀之左右哀其壯意莫不為之流涕又曰初馬援軍還將至故人多迎勞之平陵人孟冀有計謀於坐賀援援謂之曰吾望子有善言反同衆人邪昔伏波將軍路博徳開置七郡裁封數百户漢書曰平南越以為南海蒼梧鬰林合浦交趾九真日南朱崖儋耳九郡今此言七郡則與前書不同也今我㣲勞猥饗大縣功薄賞厚何以能長乆乎先生奚用相濟冀曰愚不及援曰方今匈奴烏桓尚擾北邊欲自請擊之男兒要當死於邊野以馬革裹屍還葬耳何能卧床上在兒女子手中耶冀曰諒為烈士當如此矣又曰鄧訓卒官吏人羗胡愛惜旦夕臨者日數千人戎俗父母死耻悲泣皆騎馬歌呼至聞訓卒莫不吼號或以刀自割又殺其犬馬牛羊曰鄧使君已死我曹亦俱死耳前烏桓吏士皆奔走道路訓任烏桓校尉時吏士也至空城郭吏執不聼以狀白校尉徐傿歎息曰此義也傿音於建反乃釋之遂家家為訓立祠毎有疾病輒請禱求福又曰竇固復出玉門擊西域詔耿秉及騎尉劉張皆去符傳以屬固專將兵者並有符傳擬合之取信今去符皆受固之節度也固遂破白山降車師又曰蔡彤使招呼鮮卑示以財利其大都䕶偏何鮮卑名遣使奉獻願得歸化慰納賞賜稍復親附其異種滿離髙句驪之屬絡繹欵塞上貂裘好馬帝輒倍其賞賜其後偏何邑落諸豪並歸義願自効彤曰審欲立功當歸擊匈奴斬送頭乃信耳偏何等皆仰天指心曰必自効即擊匈奴左伊祑訾部斬首二千餘級持頭詣郡其後嵗嵗相攻輒送首級又曰烏桓鮮卑追思蔡彤無己每朝賀京師常過塜拜謁仰天號泣乃去遼東吏人為立祠四時奉祭焉又曰耿恭以疏勒城傍有澗水可固五月乃引兵據之七月匈奴復攻恭募先登數千人直馳之胡騎散走匈奴于城下壅絶澗水恭於城中穿井十五丈不得水吏士渴乏笮馬糞汁而飲之笮謂壓笮也恭仰歎曰聞昔貳師將軍㧞佩刀刺山飛泉湧出貳師大宛城中名昔武帝時使李廣利伐大宛至貳師城因以為號今漢徳神明豈有窮哉乃整衣服向井再拜為吏士禱有頃水泉奔出衆皆稱萬嵗乃令吏士揚水以示敵又曰光武至薊聞邯鄲兵方到廣武將欲南歸召官屬計議耿弇曰今兵從南來不可南行漁陽太守彭寵公之邑人寵南陽宛人也上谷太守即弇父也發此兩郡控弦萬騎邯鄲不足慮也光武官屬腹心皆不肯曰死尚南首奈何北行入囊中漁陽上谷北接塞垣至彼路窮如入囊也光武指弇曰是我北道主人也又曰耿䕫為大將軍左校尉將騎八百出居延塞直奔北單于庭於金㣲山斬閼氏名王已下五千餘級單于與數騎脫亡盡獲其匈奴珍寳財畜去塞五千餘里而還自漢出師所未嘗至也又曰班超在䟽勒將還中國䟽勒舉國憂恐其都尉黎弇曰漢使棄我我必復為龜兹所滅耳誠不忍見漢使去因以刀自剄超還至于闐王侯以下皆號泣曰依漢使如父母誠不可去互抱超馬脚不得行超恐于寘終不聼其東又欲遂本志乃更還䟽勒䟽勒兩城自超去後復降龜兹而與尉頭連兵尉頭國居尉頭谷去長安八千六百五十里南與䟽勒接衣服類烏孫也超捕斬反者擊破尉頭又曰段熲破羗窮山深谷之中斬其渠師以下萬九千級獲牛馬騾驢氊裘廬帳什物不可勝數又曰郭凉字公文氣力壯猛雖武將然通經書多智略尤曉邊事有名北方又曰張奐前為度遼將軍與段熲爭擊羗不相平及熲為司𨽻校尉欲逐奐歸燉煌將害之奐憂懼奏記謝熲曰小人不明得過州將千里委命以情相歸又曰劉焉𫝊曰拜張魯鎮夷中郎將領漢寧太守通其貢獻謝承後漢書曰臧旻有幹事才達于從政討賊有功拜議郎還京師見太尉袁逢問其西域諸國土地風俗人物種數旻具答悉陳其狀手畫地形逢竒其才歎息言雖班作西域𫝊何以過此東觀漢記曰黄香為尚書曉習邊事毎行軍調度動得事理上知其勤數加賞賜魏志曰毌丘儉字仲恭有幹䇿為幽州刺史度遼將軍儉以髙句􅌐數叛帥軍出𤣥莵討之句􅌐王宫將步騎三萬逆軍汶上大戰宫連破走遂束馬懸車登九都山斬獲首虜以千數遣𤣥莵太守王頎追之過沃沮千餘里至肅慎界刻石記功刋丸都之山銘不耐之城呉志曰孫歆字公禮為邊將數十年善養士卒得其死力將帥姓名盡具識之所問咸對身長八尺儀貌都雅權悦曰吾乆不見公禮不圖進㿽如此後魏書曰韋珍髙祖初蠻首桓誕歸欵以為東荆州刺史令珍為使與誕招慰諸蠻珍自懸瓠西入三百餘里至桐栢山窮臨淮源宣揚恩澤莫不附降淮源舊有祠堂蠻俗恒用人祭之珍乃曉吿曰天地明靈即是民之父母豈有父母甘子肉味自今已後悉宜以酒脯代用群蠻從約至今行之凢所招降七萬餘户置郡縣而還以奉使稱㫖除左將軍樂陵鎮將賜爵覇城子又曰李崇行梁州刺史時巴兵擾動詔崇以將軍荆州刺史鎮上洛勅發陜秦二州兵送崇至辭曰邊人失和本怨刺史奉詔代之自然易帖但須一宣詔㫖而已不勞發兵自防懐懼也髙祖從之又曰宇文測行綏州事每嵗河氷合後突厥即來冦掠先發嘗預遣居人入城堡以避之測至皆令安堵如舊乃於要路數百處並多積柴仍逺斥候知其動静是年十二月突厥從連谷入冦至界數十里測命積柴之處一時縱火突厥謂有大軍至懼而遁走自相蹂踐委棄雜畜及輜重不可勝數測徐率所部收之分給百姓自是突厥不敢復至測因請置戍兵以備之隋書曰帝以薛世雄為玉門道行軍大將軍與突厥啓民可汗連兵擊伊吾師次玉門啟民可汗背約兵不至世雄孤軍度磧伊吾初謂隋軍不能至皆不設備及聞世雄度磧大懼請降詣軍門上牛酒世雄遂於漢舊伊吾城東築城號新伊吾因留銀青光禄大夫王威以甲卒千餘人戍之而還天子大恱進位正議大夫賜物二千段唐書曰馬總為安南郡都䕶本管經略使總敦儒學長於政術在南海累年清㢘不撓夷獠便之於漢所立銅柱之處以銅一千五百斤特鑄二柱刻書唐徳以繼伏波之跡又曰范希朝鎮振武蕃落之俗有長帥至必効竒駞名馬雖㢘者猶曰當從之致其歡希朝一無所受積十四年皆保塞而不踰垣又曰柳公綽為太原尹北都留守河東節度觀察等使是嵗北邊遣梅禄將軍李暢以馬萬匹來市託云入貢所經州府守帥假之禮分嚴其兵備留館則戒卒於外懼其襲奪太原故事出兵逆之暢及界上公綽使牙將祖孝恭單馬勞問待以脩好之意暢感義出涕徐驅道中不妄馳獵及至闢牙門令譯引謁宴以常禮及市馬而還不敢侵犯陘北有沙陁部落自九姓六州皆畏避之公綽至鎮召其酋朱耶執宜直抵雲朔塞下治廢栅十一所募兵三千付之留屯塞上以禦匈奴其妻母來太原者請梁國夫人以酒食問遺之沙陁感之深得其効梁吴均邊城將詩曰僕夲邊城將馳射靈關下箭銜鴈門石氣振武安瓦玉標丹霞斂金絡豔光馬髙旗入漢飛長鞭厯地寫太平御覽卷二百七十八
