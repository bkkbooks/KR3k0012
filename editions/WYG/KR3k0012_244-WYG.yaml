front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_244-1a, image: WYG0895/WYG0895-0231c.png}
body:
  text: 太平御覽卷二百四十四宋李昉等撰職官部四十二太子太師太子太傅太子太保太子少師太子少傅太子少保太子太師六典曰太子三師以道徳輔教太子者也止於動靜起居言語視聽皆有以師焉禮記文王世子曰教世子必以禮樂樂所以修内也禮所以修外也禮樂交錯於中發形於外是故其成也懌出則有師是以教喻而徳成也師者教以事而喻諸徳也大戴禮曰昔者周成王㓜在襁褓之中太公為太師唐書官品志曰太子太師太傅太保是為三師常師範訓導輔翊太子太傅禮記曰三王教太子立太傅少傅以養徳也太傅在前少傅在後史記曰萬石君姓石名奮無文學恭謹無比遷為太子太傅又曰夏侯勝為太子太傅受業詔撰尚書論語賜黄金百斤年九十卒官賜祭營葬平陵太子賜錢二百萬為勝素服五日以報師傅之恩儒者以為榮漢書曰叔孫通為太傅髙帝欲立趙王廢太子通諫曰昔晉獻公以驪姬故廢立太子晉國亂者數十年秦不早定扶蘇終使滅祀今太子仁孝陛下必廢嫡立庶臣願先伏誅以頸血汚地上曰公罷吾􅃧耳通曰太子天下本本一搖天下振動奈何以天下戲乎漢書曰景帝立太子以竇嬰為太傅十年栗太子廢嬰爭不能得謝病屏居藍田山下數月諸竇賔客辨士請説如故又曰蕭望之字長倩為太子太傅以論語授太子又曰疏廣字仲翁為太傅兄子受為少傅朝廷以為榮皆請免歸鄉里公卿祖餞東都門外百姓觀者歎曰賢哉二大夫初太子外祖許伯以太子少請使其弟舜監䕶太子家廣曰太子國儲副君師友必天下英俊不宜獨親外家今官屬已備若親暱外家非所以廣太子仁徳於天下也上善之東觀漢記曰建安二十八年大㑹百官詔問誰可傅太太子者羣臣承意皆言太子舅執金吾隂識可博士張佚正色曰今陛下立太子為隂氏乎為天下乎即為隂氏則隂侯可為天下則固宜用天下之賢士上稱善曰欲置傅者以輔太子今博士不難正朕况太子乎即拜為太子太傅又曰張湛字子孝為太子太傅及郭后廢因稱疾拜大中大夫病居中東門候舍故時人號中東門君帝數存問賞賜後大司徒戴渉被誅帝強起湛以代之至朝堂遺失溲便因自陳疾篤不能復任朝事遂罷之後漢書曰明帝以鄧禹先帝名臣拜太子太傅應劭漢官儀曰太子太傅日就月将琢磨玉質言太子有玊之質琢磨以道也魏志曰何䕫代凉茂為太子太傅每月朔太傅入見太子正法服而禮焉吳志曰呉粲遷太子太傅遭二宫之變抗言執正明嫡庶之分欲使魯王出住夏口遣楊竺不得令在都邑又時以消息語陸遜遜時駐武昌上表諫諍由此為竺等所譛又曰孫權寝疾徴大將軍諸葛恪為太子太傅㑹稽太守滕𦙍為太常並受詔輔太子又曰闞澤字徳潤㑹稽山隂人拜太子太傅領中書孫權嘗問書𫝊篇賦何者為美澤欲諷諭以明治亂因對賈誼過秦論極美權覽讀焉又曰程秉字徳樞汝南南頓人也秉事鄭𤣥避亂交州與劉熈考論大義遂博通五經士燮命為長史權聞其名儒以禮徵秉既到拜太子太傅又曰張温字恵恕呉郡吳人也温少修節操容貌竒偉孫權聞之以問公卿曰温當今與誰為比大司農劉基曰可與全綜為輩太常顧雍曰基未詳其為人也今無輩權曰如是張允不死也徵到廷見文辭古雅觀者傾竦權改容加禮罷出張昭執其手曰老夫託意君宜明之拜議郎選曹尚書尋遷太子太傅晉起居注曰武帝太始三年始置太子二傅是時官事大小皆由二傅太傅立草少傅寫之晉中興書曰賀循字彦先為太子太傅詔曰循清直履道秉尚貞貴居身以冲約為本立徳以儉譲為行可躬訓儲宫黙而成化唐書官品志曰太子太傅一人位視尚書令少傅一人位視左僕射魏故事曰太傅於太子不稱臣少傅稱臣太子太保禮記曰保也者慎其身以輔翼之而歸諸道者也晉書曰晉寔字子真以特進開府加太子太保晉中興書曰懐帝以荀組為侍中特進行太子太保傅暢晉贊曰賈充為太尉行太子太保以公位重其為保傅兼領各隨其時後魏書曰顯祖将禅位於京兆郡王子推隴西王源賀並固諫陸馥抗言曰皇太子聖徳承基四海屬望不可横議干國之紀臣請刎頸殿庭有死無二久之帝意乃解詔曰馥直臣也其能保吾子乎遂以馥為太保太子少師六典曰太子三少掌奉皇太子以觀三師之道徳而教諭焉晉書曰恵帝以衛尉裴楷為太子少師宋書曰太子少師少保并晉置後魏書曰郭祚領太子少師曽從世宗幸東宫肅宗幼弱祚懐一黄㼐出奉肅宗時應詔左右趙桃弓與御史王顯脣齒為世宗所信祚私事之時人謗祚者以為桃弓僕射黄㼐少師唐書官品志曰太子少師少傅少保是為三少各一人掌奉皇太子以觀三師之徳出則三師在前三少在後又曰李綱拜太子少師綱有脚疾不堪踐履太宗特賜歩輿令綱乘至閣下數引禁中問以政道又令轝入東宫皇太子引上殿親拜之綱於是陳君臣父子之道問寝視膳之方理順詞直聽者忘倦又曰貞觀十三年以左僕射房𤣥齡為太子少師𤣥齡上表遜位詔不許太宗因謂侍臣曰太子師保古難其選昔成王㓜小以周公為傅左右皆賢日聞雅訓自㓜及長便為聖君秦之胡亥趙髙傅之教以刑法及其立也誅功臣殺親族酷烈不已旋踵而亡以此言之善惡由於近習又曰唐休璟年力雖衰進取彌鋭時宫人賀婁氏用事而休璟為男取其養女因以自達拜太子少師時議譏之又曰長慶中以兼太常卿趙宗儒為太子少師太常有師子樂備五方之色非㑹朝聘饗不作焉至是中人掌教坊之樂者移牒取之宗儒不敢違以状白宰相以為事在有司執守不合關白而宗儒憂恐不已宰相責以懦怯不任事故換此散秩陶氏職官録曰三少舊視左僕射冠服同三太也太子少傅漢書曰上謂張良曰子房雖疾强起傅太子時叔孫通已為太傅以良行少傅事又曰匡衡字稚圭為太子少傅數上書陳便宜少好學家貧傭力以供資用東觀漢記曰建興二十八年以桓榮為少傅賜以輜車乘馬榮大㑹諸生陳車馬印綬曰今日所蒙稽古之力也可不勉乎後漢書曰徵王丹為太子少傅時大司徒侯霸欲與交友及丹被徵遣子昱候於道昱迎拜車下丹下車答之昱曰家公欲與君結交何為見拜丹曰君房有是言丹未之許也續漢書曰王丹字仲囬為太子少傅謇諤正直名德重於當時魏志曰邢顒字子昻初太子未定而臨淄侯植有寵丁儀等並贊翼其美太祖問顒顒對曰以庶代宗先世之戒也願殿下深鑒察之太祖識其意後遂以為太子少傅呉志曰薛綜綜子瑩瑩子兼三世並為太子少傅談者俱美之晉書曰山濤轉太子少傅在東宫年已七十病疾求退手詔不聽尋講武宣武場有詔濤乘歩輦導皇太子入時尚書僕射盧欽與濤言及孫武用兵本意武帝愕然而言曰山少傅故是天下談士也舉坐傾心又曰何曽議太子少傅當拜荀顗曰太之與少自二傅之名次耳非於太子有輕重也詔曰秦漢以來舊章廢滅隨時改作其故事不可依用宜逺準古義定二傅不臣拜又曰王雅為太子少傅時朝望屬王珣珣亦頗以自許及中詔用雅衆遂赴雅焉將拜遇雨請以繖入王珣不許因冐風雨而拜雅既貴倖威權甚振門下車騎常數百而善應接傾心禮之晉中興書曰周顗字伯仁拜太子少傅顗上䟽曰臣退自㤔省學不通一經智不効一官止足良難未能守分不悟天監忘臣頑蔽乃欲使臣内管銓衡外參傅訓質輕蟬翼事重千鈞此之不可不待識而明矣後周書蕭圎肅武帝建徳中授太子少傅増邑九百户圓肅以任當師傅調䕶是職乃作少傅箴曰惟王建國辨方正位左史記言右史書事莫不援立太子為皇之貳是以易稱明兩禮云上嗣東序養德震方主器束髮就學宵雅便肄朝讀百篇一夜乃寐愛日惜力寸隂無棄視膳再飯寝門三至小心翼翼大孝烝烝詢謀計慮問對疑承安樂必敬無忘戰兢夫天道益謙人心惡盈漢嗣不絶乎馳道魏儲迴還乎鄴城前史攸載後世揚名三善既備萬國以貞姬周長久實賴元良嬴秦短祚誠由少陽雖卜年七百有德過厯而昌數世萬一無徳不及而亡敬之敬之天惟顯思光副皇極永固洪基觀德審諭敢告職司太子見而悦之嘗致書勞問焉陳書曰孝明帝在東宫宣武皇帝欲以崔光為太子師傅光固辭帝令太子南面再拜宫官皆從太子拜光北面而立不敢答拜惟西面拜謝而出乃授光太子少傅傅𤣥太子少傅箴曰夫金木無常方圎應形亦有隠括習以性成故近朱者赤近墨者黒聲和則響清形正則影直正人在側德義盈堂鮑肆先入蘭蕙不芳傅臣司訓敢告君王太子少保晉書曰懐帝以光禄劉蕃為太子少保晉諸公讚曰惠帝以吏部尚書和嶠為太子少保唐書曰李綱字文紀為太子少保髙祖以綱隋代名臣甚加優禮毎手勑未嘗稱名其見重如此唐新語曰李適之為右相李林甫宻奏其好酒頗妨正事𤣥宗惑焉乃除太子少保適之遽命親故歡㑹賦詩曰避賢初罷相樂聖且銜盃為問門前客今朝㡬箇來舉朝服其度量太平御覽卷二百四十四
