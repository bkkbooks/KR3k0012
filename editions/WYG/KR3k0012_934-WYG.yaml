body:
  text: 太平御覽卷九百三十四宋李昉等撰鱗介部六虵虺虵下風俗通曰車騎将軍巴郡馮鯤字鴻卿為議郎發綬笥有二赤蛇可長三尺分南北走大用憂怖許季山孫憲得仙人祕要鯤請使卜云君後三歳當為邉将控地四五千里官以東為名後五年為大将軍南征此吉祥也蜀王本紀曰秦王知蜀王好色乃獻美女五人蜀王遣五丁迎女還梓橦見一大蛇入山穴中一丁引其尾不能出五丁共引虵山崩壓五丁寰中記曰東海有虵邱之地衆虵居之無人民多神虵或人頭而虵身又曰崑崙西北有山周迴三萬里虵長萬里常居此山飲食滄海陳畱風俗傳曰小黃縣者衞地故陽武東黄鄉也因黄水以名縣沛公起兵野戰喪皇妃於黄鄉天下平定乃遣使者以梓宮招魂幽野於是有虵在水自洗濯入于梓宫其浴處有遺髪故謚曰昭靈夫人雷次宗豫章記曰永嘉末有大虵長十餘丈斷道經過者輒以氣吸引取之吞噬已百數行旅斷絶道士吳猛與弟子數人往欲殺虵虵蔵深穴不肯出猛符南昌社公虵乃出穴頭數丈猛扵尾縁背而以足按虵頭著地弟子於後以斧殺之裴淵廣州記曰晉興郡蚺虵嶺去路側五十里忽有一物大百圍長數十丈行者過視則往而不返積年如此失人甚多董奉從交州出由此橋見之大驚云此虵也佳逆旅施符勅經宿往看虵已死矣左右白骨聚積成邱鄧明德南康記曰南野巘山有漢太傅陳蕃塜墓西㟁有廟今曰宫渚昔值軍亂聞墓有寶玉軍人爭掘指麾必啟忽大虵圍繞墓前崩雷晦雨當時竟不得發宋永初山川記曰始興郡有大虵名青葱有大虵名赤頸又曰柴桑縣有飛虵外國圖曰圓邱有不死樹食之多夀有赤泉飲之不老有大虵多為人害不可得居帝逰圓邱以雄黄精厭大虵郭子横洞冥記曰虵璣出塗風國有青靈虵產珠色光白又曰地三年種蜀黍其後七年有虵廣志曰永昌郡有岐尾虵又曰蝮虵與土色相亂長三四尺其中人以牙螫之裁斷皮出血則身盡痛九竅血出而死列異傳曰夀光侯者漢章帝時人劾百鬼衆魅有婦為魅所疾侯劾得大虵又有大樹人止之者死鳥過亦死侯劾樹下樹枯有虵長七八丈懸而死搜神記曰魯定公元年有九虵繞柱占以為九世廟不祀乃立焬宫又曰隋侯行見大虵傷救而治之其後虵銜珠以報之又曰竇武母産武并一虵送之林中後母卒及塟未窆有大虵自榛莽出徑赴喪所以頭撃柩涕血頃而去時人以為竇氏之祥又曰宋元嘉中廣州有三人共入山中伐木忽見石窠中有三卵大如升取歸煑之湯始熱便聞林中如風雨聲須臾有大蛇大十圍長四五丈逕来於湯中銜卵而去三人無幾皆死又曰秦瞻居曲阿彭王野忽有物如虵􅊳入其腦中虵来先聞臰臰氣便於鼻中入盤其頭中覺哄哄僅聞其腦間食聲咂咂數日而出去尋復来取手巾縳口鼻亦被入積年無他病唯患頭重異苑曰太原中汝南人伐竹見一竹中央虵形已成上枝葉如故吳郡桐廬民常伐餘遺竹見一竹竿成雉頭頸盡就身猶未成此亦竹為虵為雉也又曰薪野蘇卷常與奴婢居野舍毎至飯時輒有一物来其状似虵長七八尺五色光鱗卷異而飴之遂經數載產業加焉奴後宻打殺即得能食病日進三斛飯猶不為飽少時而死又曰丹陽鍾忠以元嘉冬月晨行有一虵長二尺許文色似青璢璃頭有雙角白如玉感而畜之於是資業日登經年虵自亡去忠及二子相繼殞斃此虵来吉去㐫其唯龍乎又曰魯國年縣象山上有寺廟今民欲架室者輒見大虵數十丈出来驚人故莫得安焉周景戎廬山記曰安侯世髙者安息國太子與友人共岀家學道友人恚怒死受蟒報為此宫亭湖神世高扵廣州為人所殺還生安息國復為王子年二十又棄國入吳之宫亭泊船過呼友人與語友人身長數十丈見世髙向之胡語竟各分去暮有一少年上世髙船跪受呪願因忽不見世髙語同船人曰向少年即此廟神也得離惡形矣蟒既見世髙從山南過死山北今乃柴桑民所居虵里是也幽明録曰㑹稽謝袒之婦初育一男又生一虵長二尺許便送出門去後數十年婦以疾終袒忽聞西北有風雨之聲頃之見一虵長數十丈腹可十餘圍入户造靈座因至柩所繞數匝以頭打柩目血淚俱出良久而去又曰㑹稽郡吏薛重得假還家夜户閉聞妻床上有丈夫鼾聲喚妻妻從床上出未及開户重持刀便逆問妻曰醉人是誰妻大驚愕因苦自申明實無人意重家唯有一户搜索了無所見見一大虵隱在床脚酒臭重便斬虵寸斷擲於後溝經數日而婦死又數日而重卒死經三日復生說始死時有人拮将重到一官府見官寮問何以殺人重曰寔不曾行㓙曰寸㫁擲在後溝此是何物重曰此是虵非人府君愕然而悟曰我常用為神而敢淫人之婦又妄訟人勅左右召来吏卒乃領一人来著平幘具詰其淫妻之過将付獄乃令人送重還廣五行記曰晉吳興太守袁元瑛嘗之官請郭璞筮吉㓙璞曰至官當有赤虵為妖不可殺之後到府果有赤虵在銅虎符函上蟠元瑛家人過殺之其後元瑛為徐馥所害又曰晉安帝義熈末年殷仲文年十三父亡家有大恠有大虵長丈或戴其堂屋或㧞其炊釡置地家人棄舍奔散唯仲文居喪如故然仲文後竟為宋髙祖所戮又曰陳時吳興顧楷之在桑樹上取其葉見五尺大虵入一小穴其從虵相次或三尺或五尺次第相隨略有數百楷急下樹看所入之處了不見有一孔日暮還家楷病口瘂不復得語又曰東光人東方飛龍病甚夢化為大黑虵以吿其妻既死遂有大黑虵入室上棟間飛龍諸子将殺之其母曰此是爾父諸子不用母言遂殺之即日暴雨諸子皆震死柩前唐景龍文館記曰興慶池者長安城東隅形勢之地也中多王侯第宅天后初有居人王純掘地獲黄金百斤致富官司聞之宻加搜獲純懼投於井中縣官窺之見雙赤虵仰首張吻遂不敢入純以此金當為已得復入取之還見赤虵赫然蟠屈純懼而出其夜井水湧溢漸成此池可廣百餘頃嶺表録異曰南土有金虵亦名蜴虵又名虵鮮州土出黔中桂州亦有即不及黔南者其虵粗如大指長一尺許鱗甲上有金銀解毒之功不下吉利也又曰蚺虵大者五六丈圍四五尺其次者亦不下三四丈圍亦稱是身有斑文如故錦纈俚人云春夏多於山林中等鹿過則林樹間閣其首伺鹿壊頭角墜地鹿身方嚥入腹如此後虵極羸弱及其鹿消壮俊悗懌勇徤於未食鹿者或云一年則食一鹿又曰兩頭虵嶺外多此類時有如小指大者長尺餘腹下鱗紅皆錦文一頭有眼口一頭似頭而無口眼云兩頭虵俱能進退亦繆也昔孫叔敖見之不祥乃殺而瘞之恐他人見復受其禍南人見之為常其禍安在吳氏本草經曰虵脫一名龍子單衣一名弓皮一名虵附一名虵筋一名龍皮一名龍單衣楚辭曰蝮虵蓁蓁封狐千里傅元神虵銘曰嘉兹虵靈斷而能續飛不須翼行不假足楊雄客難曰獨不見翠虵絳螭之将登天乎必聳身於蒼梧之淵階浮雲翼疾風而上虺毛詩鴻鴈斯干曰唯虺唯虵女子之祥國語曰吳伐越王請盟吳王将許之仲胥仲胥伍子胥曰不可許大夫種勇而善謀将還玩吳國於股掌之上婉辭順志為虺弗摧為虵将若之何吳王不聽乃許盟搜神記曰陳畱阮士禹傷於虺不忍其痛數嗅其瘡已而虺成於鼻中任昉述異記曰虺百年化為蛟蛟千年為龍龍五百年而為角龍又千年為應龍楚辭曰雄虺九首鯈忽焉在孔融答路粹書曰來彭冦賈之徒當世壮士愛惡相攻能為國患輕薄劣弱者如兩虺相喫適足還灾其身誠無所至太平御覽卷九百三十四
