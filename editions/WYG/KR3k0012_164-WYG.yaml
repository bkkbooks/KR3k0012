body:
  text: 太平御覽卷一百六十四宋李昉等撰州郡部十闗西道雍州華州同州岐州耀州乾州隴州邠州涇州寧州慶州原州靈州鹽州鄜州坊州丹州延州綏州銀州麟州夏州豐州勝州雍州尚書禹貢曰黒水西河惟雍州厥土惟黄壤厥田惟上上厥賦中下厥貢惟球琳瑯玕文耀鉤曰岐華已北龍門積石南至三危雍州也春秋說題辭曰秦金精堅故秦俗亦堅春秋元命苞曰雍壅也東距蒲坂西有漢中南含髙山北阻居庸應劭注漢志曰四靣積髙曰壅李廵注爾雅曰河西其氣蔽壅也晉太康地志曰雍州西北之位隂氣壅遏故以為名三輔黄圖曰始皇表河以為秦東門表汧以為秦西川史記蘇秦說秦孝公曰秦四塞之國被山帶河外有洪河之險西有漢中巴蜀北有代馬之利此天府也又曰獻公徙居櫟楊孝公作咸陽築冀闕徙都之貨殖傳曰闗中由汧雍以東至河華膏壤沃野千里自虞夏之貢以為上田漢書曰秦形勝之國也帶河阻山縣隔千里持㦸百萬秦得二百焉言秦地險固二萬人可敵諸侯百萬人也地勢便利其以下兵於諸侯譬猶居髙屋之上建瓴水也瓴盛水瓶也居髙屋之上而傾瓴水言其自上之勢易也又婁敬説髙祖曰陛下都洛陽豈欲與周室比隆哉周之都洛陽為天下之中四方納貢道里均有徳則易以王無徳則易以亡今陛下欲比隆成康之時為不侔矣且秦地被山帶河四塞以為固卒然有變急百萬之衆可當其固秦膏腴之地以為天府陛下入闗而都之山東雖亂秦故地可全而有也夫與人鬬不搤其吭而拊其背未能相勝今陛下入闗而都之此亦搤天下之吭而拊其背也髙祖以問羣臣羣臣皆山東人争言周王數百年秦二世而亡髙祖疑而未能决及留侯言入闗便即日車駕西都闗中又百官表曰内史周官秦因之掌治京師景帝二年分置左内史右内史太初元年更為京兆尹東方朔傳曰三輔之地南有江淮北有河渭汧隴以東商雒以西厥壌肥饒此所謂天府陸海之地也後漢書曰董卓徙都長安謂陳紀曰三輔平敞四面險固土地肥美號曰陸海三輔黄圗曰太初元年以渭城以西屬右扶風長安以東屬京兆尹長陵以北屬左馮翊以輔京師謂之三輔闗中記曰秦西以闗隴為限東以函谷為界二關之間謂之闗中地東西方千餘里十道志曰雍州京兆郡禹貢九州之一爵置十二等雍州亦在焉武王都豐鎬平王東遷以岐豐之地賜秦孝公始尹咸陽秦兼天下置内史以領關中項籍滅秦分其地為三以章邯為雍王都廢丘司馬欣為塞王都櫟陽董翳為翟王都髙奴謂之三秦髙祖入關定三秦復為内史武帝改為京兆尹華州十道志曰華州華隂縣置在鄭縣禹貢雍州之域元和郡縣圗曰周為畿内之國鄭桓公始封之邑其地邑名咸林春秋時為秦戰國為秦魏二國之境西嶽華山在焉秦為内史地漢為京兆尹國語曰鄭桓公為周司徒食采咸林也左傳曰晉侯許賂秦伯以河外列城五南及華山史記曰秦武公十一年初縣北鄭漢志曰秦屬京兆尹周宣王弟鄭桓公邑師古曰幽王既敗鄭桓公死之其子武公與平王東遷也爾雅曰河西華南之美者有華山之金玉焉魏志曰董卓遷都長安華歆求出為下邽令史記曰秦始皇二十六年東遊海上遣使關中至平舒道有人持璧遮使者曰為我遺鎬池君事具璧門水經曰渭水東經平舒城即江神返璧於華隂平舒道遺鎬池君之處也尚書秦誓曰歸馬于華山之陽放牛于桃林之野左傳曰晉使詹嘉處瑕以守桃林之塞杜曰今華隂東潼關是也同州元和郡縣志曰同州馮翊郡禹貢雍州之域春秋時屬秦本大荔戎國秦獲之更名曰臨晉七國時屬魏秦併天下為京兆馮翊扶風並内史之地漢為河上郡復為内史武帝更名左馮翊魏但為馮翊郡後魏改同州以禹貢云灃水攸同故名之也十道志曰漢王定三秦關中置三郡以塞國為河上郡後罷三郡以為内史武帝改為左馮翊應劭漢官解詁曰馮輔翊蕃故以為名水經曰洛水東南經沙阜東西八十里南北三十里俗名沙苑史記曰魏文侯十六年代秦築臨晉十六國春秋曰苻健時河渭溢蒲津監㓂登得一履於河中長七尺健歎曰覆載之内何所不有穆天子傳曰陽䊸之山河伯馮夷之所都漢志曰臨晉縣有河水祠又郊祀志祠河於臨晉博物志曰馮夷華隂人得仙道為河伯左傳曰秦晉戰于彭衙注曰馮翊郃陽縣西北有彭衙城又曰秦伐晉晉使吕相絶秦曰俘我王官翦我羈馬覊馬今在郃陽王官今在澄城漢書曰宣帝㣲時嘗困於蓮勺鹵中如淳曰為人所辱也蓮勺有鹽池名曰鹵中又漢志曰蓮勺屬馮翊蓮音輦勺音酌漢志曰郃陽屬左馮翊在郃水之陽即大雅大明之詩曰在洽之陽岐州元和郡縣圖曰岐州扶風郡今為鳯翔府禹貢雍州之域春秋時戰國時為秦都屬内史髙帝更名中地郡復屬内史景帝更名主爵都尉武帝改右扶風所以扶助京師行風化也史記曰秦文公作鄜畤靈公作吳陽上畤又作下畤今郡内有三畤原又曰始皇二十七年巡隴西北地出雞頭山過囘中囘中在扶風郡漢書曰文帝十四年匈奴入蕭闗殺北地都尉囘中宫候騎至雍水經曰郿縣有積石原魏青龍二年諸葛亮出斜谷與司馬宣王屯渭南郭洎算亮必争北原遂先據之亮至果不得上又魏氏春秋曰亮據渭南宣王謂諸將曰亮若出武功上依東轉是其勇也若西上五丈原即諸君無事矣亮果屯北原國語曰周之興也鸑鷟鳴於岐山今岐山縣是三秦記曰陳倉山上有石鷄與山鷄不别趙髙燒山鷄飛去而石鷄不去晨鳴山頭聲聞二十里或云玉鷄耀州五代史曰耀州本京兆府華原縣唐末李茂貞據鳯翔僣行墨制建為耀州以義勝為軍額命温韜為節度使乾州又曰本唐之奉天縣也唐末李茂貞建之為留後唐因之不改隴州元和郡縣圖曰隴州汧陽郡禹貢雍州之域秦文公所都漢為汧縣屬右扶風禹貢曰導岍及岐至於荆山説文曰隴天水大坂名也三秦記曰隴頭流水鳴聲嗚咽遙望秦川肝腸斷絶又曰隴渭西闗也其坂九逥不知髙幾許凡上者七日乃得越漢志曰隃麋屬右扶風即今之汧陽縣邠州元和郡縣圖曰邠州新平郡禹貢雍州之域公劉所居之地秦為内史地漢為右扶風本作豳字開元中以豳與幽字相渉改為邠漢志栒邑屬右扶風有豳鄉詩豳國公劉所都左傳曰畢原豐郇文之昭也十六國春秋曰苻堅時新平人王雕陳圖䜟王猛以為左道惑衆勸堅誅之雕臨刑上疏曰臣師劉湛明於圖記謂臣曰新平應出帝王寳器願陛下志之後果獲玉器焉十道志曰宜禄縣本漢鶉觚縣後魏又分置東隂盤縣周地圖記曰秦使蒙恬北築長城又於北原築城以觚奠酒而祭有鶉飛止觚上因以名縣今鶉觚原元和郡縣圖曰新平本漢漆縣後漢書曰建武八年隗囂攻略陽上至漆進止未定會馬援夜至上喜問之援聚米以為山谷於上指軍所從入上笑曰虜在吾目中矣涇州元和郡縣圖曰涇州安定郡禹貢雍州之域春秋時屬秦始皇時屬北地郡漢置安定郡宋永初山川記曰安定處山谷之間昆戎舊壌迫近夷狄修習武備人皆以馳射為事國語曰周共王遊於涇上宻康公從有三女奔之其母曰必致之於王夫獸三為羣人三為粲粲美之物也衆以美物歸汝而何徳以堪王猶不堪况汝小醜小醜備物終必亡康公不獻王王滅宻地有隂宻城詩大雅曰宻人不恭敢距大邦寧州元和郡縣圖曰寧州彭原郡禹貢雍州之域當夏之衰公劉邑焉周時為義渠戎王國至秦昭王殺義渠戎王并其地始皇時為北地郡漢因之漢志曰泥陽屬北平郡王莽曰泥隂應劭曰泥水出郁郅北蠻中十道志後漢改泥陽為富平後魏又改定平又曰義渠道屬北地郡莽曰義蒲漢書曰夏道衰而公劉失其稷官變於西戎邑于邠至秦繆公得由余西戎八國服秦岐梁涇漆之北有義渠烏氏朐衍之戎築城郭以居秦稍蠶食之惠王遂取義渠二十五城秦昭王殺義渠戎王於是秦遂有隴西上郡之地慶州元和郡縣圖曰慶州順化郡禹貢雍州之域古西戎地后稷子不窋居之今不窋故城在焉春秋時義渠戎王國始皇時為北地郡漢志曰郁郅屬北地郡有牧師苑官莽曰功著周地圖記曰郁郅城今則名尉季城在白馬嶺兩川交口水經曰尉季亦曰不窋疑郁郅之訛也十道志曰樂蟠縣本漢略畔道也漢志曰略畔道莽曰延年道有略畔山俗呼曰洛盤音訛耳原州元和郡縣圖曰原州平凉郡禹貢雍州之域春秋時地屬秦始皇時屬北地郡漢為安定郡漢志曰髙平屬安定郡莽曰鋪睦班固安豐戴侯頌曰髙平第一帝臨我師漢書曰漢文十四年匈奴入蕭闗殺北地都尉十道志曰蕭闗在原州後漢曰隗囂使牛邯守瓦亭闗十道志曰蕭關瓦亭在平凉郡靈州元和郡縣圖曰靈州靈武郡禹貢雍州之域春秋戰國屬秦秦併天下為北地郡漢髙為平富縣地漢志曰靈武屬北地郡莽曰威成惠帝四年置靈州有河竒苑號非苑師古曰水中可居曰州此地在河之洲随水髙下未嘗淪沒故號靈州河竒二苑皆在北十道志曰靈州有赫連勃勃所置果園水經云河水北有薄骨律鎮城在渚上舊赫連城也桑果榆林列植其上故謂之果州圖經曰周宣政二年破陳將吳明徹遷其人於靈州江左之人崇禮好學習俗皆化因謂之塞北江南鹽州元和郡縣圖曰鹽州五原郡禹貢雍州之域春秋時戎狄地秦屬梁州漢置五原郡地有五原因而名之史記曰漆沮之北有義渠朐衍之戎即此地漢志曰馬嶺屬北地郡以川形似馬嶺故以為名十道志曰馬嶺本鹽州也元和郡縣圖曰後魏為西安州以其有鹽池又改為鹽州鄜州音夫十道志曰鄜州洛交郡禹貢雍州之域春秋時秦地始皇時為上郡漢為上郡雕隂道地史記秦文公畋于汧渭之間夢黄蛇其口止於鄜衍以為上帝之徴遂於鄜立畤祭白帝焉漢書云匈奴南侵至朝郍膚施即此地漢志曰雕隂屬上郡彫山在西南坊州元和郡縣圖曰坊州中部郡禹貢雍州之域春秋時翟國秦屬内史漢為右馮翊翟道縣之地姚興時置杏城周置馬坊唐髙祖因置坊州取馬坊為名漢書曰朔方為西部都尉休屠為北部都尉搜渠為中部都尉郡志曰城本三秦髙奴之地翟道故城即今郡城是也俗謂之髙樓城穆天子傳曰癸酉天子命駕八駿之駟造父為御翔行經翟道升於太行元和郡縣圖曰宜君縣前秦苻堅於祋祤縣故城置延州元和郡縣圖曰延州延安郡禹貢雍州之域春秋時白狄所居秦漢屬上郡髙奴之地項羽以董翳為翟王居髙奴即其地也漢志曰膚施屬上郡有五龍山水經曰渭水東經髙奴水漢志髙奴水合豐林水謂之清水丹州元和郡縣圖曰丹州咸寧郡禹貢雍州之域春秋時為白翟所居秦漢為上郡地隋圖經集記曰義州孟春秋時白翟也其俗語云丹州白窒即白翟語訛耳綏州元和郡縣圖曰綏州上郡禹貢雍州之域春秋白翟所居七國時屬秦秦併天下為上郡漢初屬翟國復改為上郡有疏屬之山山海經曰貳負之臣曰危危與貳負殺窫窳帝梏之疏屬之山桎其右足反縛兩手與髪繫之山上木即此銀州元和郡縣圖曰銀州銀川郡禹貢雍州之域春秋時白翟地秦為上郡漢為河西郡圁隂縣地前漢志曰圜隂屬西河莽曰方隂師古曰圜字本作圁縣縣在圁水之隂因以為名也今有銀州銀水即是舊名猶存但字變耳耆舊傳驄馬城即銀州城也苻秦建元元年自驄馬城巡撫夷狄麟州元和郡縣圖曰禹貢雍州之域秦漢為雲中郡隋為勝州天寳中分勝州地置麟州晉太康地志曰自北地郡北行九百里五原塞即此地後漢光禄徐自為出五原塞數百里築城障列亭至盧朐山即今縣北光禄塞是也夏州元和郡縣圖曰夏州朔方郡禹貢雍州之域春秋及戰國時屬魏秦併天下屬上郡漢武分置朔方郡詩曰王命南仲城彼朔方漢書曰武帝元朔二年遣將軍衛青將兵擊匈奴出雲中至髙闕遂至符離收河南地置朔方五原郡符離漢北塞名十六國春秋曰赫連勃勃於朔方築大城既成下書曰今都城已建宜立美名朕方統一天下君臨萬國都城宜以統萬為名酈道元水經注統萬城赫連勃勃蒸土所築又曰朔方縣有契吳山赫連勃勃北逰登之嘆曰美哉斯阜臨廣澤而帶清流吾行地多矣自馬嶺以北大河以南未有若此之善者也漢書曰武帝時北置朔方之郡公孫𢎞數諫以為罷弊中國以奉無用之地上使朱買臣等難𢎞發十策𢎞不得一漢志曰朔方郡治窳渾莽曰溝捜窳渾有道西北出雞鹿塞又曰三封屬朔方郡今長澤縣有三封故城豐州元和郡縣圖曰豐州九原郡禹貢雍州之域秦漢地勝州元和郡縣圖曰勝州榆林郡禹貢雍州之域春秋時戎狄地戰國時晉趙地秦漢為雲中郡秦本紀曰始皇十三年伐趙取雲中因以為郡續漢書郡國志曰雲中郡領雲中咸陽楨陵沙南北輿武泉原陽定㐮武進成樂十一縣太平御覽卷一百六十四
