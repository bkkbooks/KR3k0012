body:
  text: 太平御覽􅃃一百四十宋李昉等撰皇親部六後魏宣武于皇后宣武高皇后宣武胡皇后孝明胡皇后西魏孝武髙皇后文帝乙弗后郁久閭后廢帝宇文后恭帝若于后東魏孝靖髙皇后後周文元皇后文叱奴后閔元后明獨孤后武成阿史那后孝李后宣楊后宣朱后宣陳后宣元后宣尉遅后静司馬后隋獨孤皇后宣華夫人煬帝蕭皇后後魏宣武于皇后後魏書曰宣武順皇后于氏太尉烈之弟勁之女也世宗始親政事烈時為領軍總心膂之任以嬪御未備因左右諷諭稱后有容徳世宗乃迎入為貴人時年十四甚見寵愛立為皇后謁於太廟后靜黙寛容性不妬忌生皇子昌三嵗夭没其後后暴崩宫禁事秘人莫悉而世之議者皆歸咎於髙夫人葬永泰陵諡曰順皇后宣武高皇后後魏書曰宣武高皇后文昭皇后弟偃之女也世宗納為貴嬪生皇子早夭又生建徳公主拜為皇后甚見禮重性妬忌宫人稀得進御及肅宗即位上尊號曰皇太后尋為尼居瑶光寺非大節慶不入宫中建徳公主始五六嵗靈太后恒置左右撫愛之神龜元年太后出覲母武邑君時天文有變靈太后欲以后當禍是夜遂暴崩天下寃之喪還瑶光佛寺𦵏殯皆以尼禮世宗暮年髙后悍忌夫人嬪御有至帝崩不蒙侍接者由是在洛二十餘年皇太子全育者惟肅宗一人而已宣武胡皇后後魏書曰宣武靈皇后胡氏安定臨涇人司徒國珍之女母皇甫氏産后之日赤光四照京兆山北縣有趙胡者善於卜相國珍徃問之胡云賢女有大貴之表方為天地母生天地主勿過三人知也后始為尼頗能講道世宗初入講禁中積數嵗諷左右稱后姿行世宗聞之召入掖庭為承華世婦而椒掖之中以國舊制相與祈祝皆願生諸王公主不願生太子也惟后毎謂夫人等言天子豈可獨無兒子何縁畏一身之死而令皇家不育冢嫡乎及肅宗在孕同列猶以故事相恐勸為諸計后意確然幽夜獨誓云但使所懐是男次第當長子子生身死所不辭也既誕肅宗進為充華嬪先是世宗頻年䘮皇子自以春秋長矣深加慎護為擇乳母皆取良家宜子者養於别宫皇后及充華嬪皆莫得而撫視焉及肅宗踐祚尊后為皇太妃後尊為皇太后臨朝聽政猶稱殿下令以行事後改令稱詔羣臣上書稱陛下自稱曰朕太后以肅宗冲㓜未堪親祭欲傍周禮夫人與君交獻之義代行祭祀訪尋故式門下召禮官博士議以為不可而太后欲以帷幔自障觀三公行事重問侍中崔光光便據漢時和熹鄧后薦祭故事太后大悦遂攝行祠禮太后性聡悟才藝始既為尼㓜相依託略得佛經大義親覧萬機手筆㫁决幸西園林法流堂命侍臣射不能射者罰之又自射針孔中之大恱賜左右布帛有差先是太后勑造申訟車時御焉出自雲龍大司馬門從西而北入自千秋門以納寃訟又親䇿孝秀州郡計吏於朝堂太后以肅宗幸華林園宴羣臣於都亭曲水令王公以下賦七言詩太后詩曰化光造物含氣貞肅宗詩曰恭己無為頼慈英王公以下賜帛有差太后父薨百寮表請公除太后不許尋幸永寕寺觀建刹於九級之基僧尼士女赴者數萬人後幸左藏公主嬪女以下從者百餘人皆令任力負布絹即以賜之尋幸缺口温水登雞頭山自射象牙簪一發中之勑示文武時太后得志逼幸清河王懌淫亂肆情為天下所惡領軍元义長秋卿劉騰等奉肅宗於顯陽殿幽太后於北宫於禁中殺懌自劉騰死义又寛怠太后與肅宗及髙陽王雍為計解义領軍太后復臨朝大赦改元自是朝政踈緩威恩不立天下牧守所在貪惏又鄭儼汙亂宫掖勢傾海内李神􅁤徐紇並見親侍一二年中位總禁要手握王爵輕重在心宣滛於朝為四方之所厭穢文武解體所在亂逆土崩魚爛始於此矣及武泰元年尒朱稱兵渡河太后盡召明帝六宫皆令入道太后亦自落髪榮遣騎拘送太后及㓜主於河隂太后對榮多所陳説榮拂衣而起太后及㓜主並被沈於河太后妹馮翊君収瘞於雙靈寺出帝時始葬以后禮而追加諡焉又曰靈太后裝飾游幸元順面諍曰禮婦人䘮夫自稱未亡人首去珠珥衣帔不縁陛下母臨天下年垂不惑過修容飾何以示後世靈太后慙而還召順責曰千里相徴豈欲衆見辱乎順曰陛下盛服炫容不畏天下所笑何恥臣之一言乎孝明胡皇后後魏書曰孝明胡皇后靈太后從兄冀州刺史盛之女也靈太后欲榮重門族故立為皇后肅宗頗有酒徳專嬖充華潘氏及嬪御並無過寵太后為肅宗選納抑屈人流時博陵崔孝芬范陽盧道約隴西李瓉等女但為世婦諸人訴訟咸見忿責武泰初后入道遂居於瑶光寺西魏孝武髙皇后後魏書曰孝武皇后高氏齊神武長女也帝見立乃納為后及帝西幸關中降為彭城王韶妃文帝乙弗后後魏書曰文帝文皇后乙弗氏河南洛陽人也其先世為吐谷渾渠帥居青海號青海王凉州平后之高祖莫瓌擁部落入附拜定州刺史封西平公自莫瓌後三世尚公主女乃多為王妃甚見貴重父瑗儀同三司兖州刺史母淮陽長公主孝文之第四女也后美容儀少言笑年數歲父母異之指示諸親曰生女何妨也若此者實勝男年十六文帝納為妃及帝即位以大統元年冊為皇后后性好節儉蔬食故衣珠玉羅綺絶於服玩又仁恕無嫉妬之心帝益重之生男女十二人多早夭惟太子及武都王戊存焉時新都關中務欲東討蠕蠕音軟㓂邉未遑北伐故帝結婚以撫之於是更納悼后命遜居别宫出家為尼悼后猶猜忌復徙秦州依子秦州刺史武都王帝雖限大計恩好不㤀後宻令飬髪有追還之意然秘禁外無知者六年春蠕蠕舉國渡河前驅已漸逼頗有言虜為悼后之故興此役帝曰豈有百萬之衆為一女子舉也雖然致此物論朕亦何顔以見将帥耶乃遣中常侍曹寵賫手勅令后自盡后奉勅揮淚謂寵曰願至尊享年千萬嵗天下康寕死無恨矣因命武都王前與之訣遺語皇太子辭皆悽愴因慟哭乆之侍御咸垂涕失聲莫能仰視召僧設供令侍婢數十人出家手為落髪事畢乃入室引被自覆而崩年三十一鑿麥積崖為龕而葬神柩将入有二叢雲先入龕中頃之一滅一出後號寂陵及文帝山陵畢手書云萬嵗後令后配享公卿乃議追諡曰文皇后祔于太廟廢帝時合葬於永陵郁乆閭后後魏書曰文帝悼皇后郁乆閭氏蠕蠕主阿那瓌之女容貎端嚴夙有成智大統初蠕蠕屢犯北邉文帝乃與通好結婚扶風王孚受使奉迎蠕蠕俗以東為貴后之來營幕户席一皆東向車七百乗騾萬疋驢千頭到黒鹽池魏朝鹵簿文物始至孚奏請正南面后曰我未見魏主故蠕蠕女也魏仗向南我自東面孚無以辭四年正月至京師立為皇后時年十四六年后懐孕将産居於瑶華殿聞上有狗吠聲心甚惡之又見婦人盛飾來至后所后謂左右曰此為何人毉巫傍侍悉無見者時以為文后之靈産訖而崩年十六葬於少陵原十七年合塟永陵當會横橋北后梓宫先至鹿苑帝輼音温輬音凉後來将就次所軏折不進廢帝宇文后後魏書曰廢帝皇后宇文后周文帝女也后初産之日有雲氣滿室氛氲乆之㓜有風神好陳列女圗置之左右周文曰毎見此女良慰人意廢帝之為太子納為妃及即位為皇后志操明秀帝深重之專寵後宫不置嬪御帝既廢崩后亦以忠於魏室罹禍恭帝若于后後魏書曰恭帝后若于氏司空長樂正公惠之女也有容色恭帝納之為妃及即位立為皇后後出家為尼在佛寺薨竟無諡東魏孝靖髙皇后後魏書曰孝静高皇后齊神武王之苐二女也天平四年詔聘以為后王前後固辭帝不許興和中詔侍中司徒孫騰司空襄成王旭一云㫤兼尚書令司州牧西河王悰藏宗切兼太常卿及宗正卿元孝友等奉詔致禮并備宫官侍衛以后駕迎於晉陽之丞相第五月立為皇后大赦天下齊受襌降為中山王妃後降於尚書左僕射楊遵彦後周文元皇后後周書曰文元皇后魏孝武妺初封平原公主適開府張歡遇后無禮帝殺歡改封后馮翊公主以配太祖生孝閔薨合葬成陵武成初尊追為皇后文叱奴后後周書曰叱奴后代人太祖為丞相納為姫生高祖天和三年六月尊為皇太后建徳三年三月癸酉崩四月丁巳葬固陵閔元后後周書曰閔元皇后名胡摩魏文帝苐五女初封晉安公主帝之為洛陽公尚焉及踐祚立為皇后帝被廢后出俗為尼高祖誅晉公護上帝尊號為帝以后為孝閔皇后居崇徳宫隋氏革命居里第大業十二年殂明獨孤后後周書曰明獨孤后太保衛公信之長女帝之在藩為夫人二年正月立為皇后即位數日崩塟昭陵世宗崩與后合葬武成阿史那后後周書曰武成阿史那后突厥木杆可汗俟斤之女突厥滅蠕蠕後盡有塞表之地控弦數十萬衆志陵中夏太祖方與齊人爭衡俟斤初欲以女配帝保定五年二月詔陳公純等備皇后文物及行殿并六宫以下一百二十人至俟斤牙帳所迎后俟斤又許齊人以婚将有異志純等在彼累請不得反命會雷風大起飃壞其穹廬等旬日不止俟斤大懼以為天譴去戰切乃禮送后及純等設行殿羽儀奉之以歸高祖行親迎之禮后有姿貎善容止高祖深敬焉宣帝即位尊為天元上皇太后開皇二年殂年三十二隋文詔后祔葬孝陵武帝李后後周書曰武帝李后名娥姿楚人于謹平江陵后家被籍沒至長安太祖以后賜高祖幸之生宣帝宣帝即位尊為天元聖皇太后宣帝崩静帝尊為大帝太后隋開皇初出俗為尼改名常悲薨以尼禮葬於京城南宣帝楊后後周書曰宣帝楊后名麗華隋文帝長女帝在東宫高祖為帝納后為皇太子妃宣政元年立為天元皇后后性柔婉不妬忌四皇后及嬪御等咸愛而仰之帝後昏暴滋甚喜怒乖度嘗譴后欲加之罪后進止詳閒辭色不撓帝大怒遂賜后死逼令引决后母獨孤氏聞之詣閤陳謝叩頭流血然後得免帝崩静帝尊為皇太后居於宏聖宫先是宣帝不豫詔隋文帝入禁中侍疾及大漸劉昉鄭譯等因矯詔以后父受遺輔政后雖初不預謀然嗣主㓜冲恐權在他族不利於己聞昉譯已行此詔甚恱後知父有異圖意頗不平形於顔色及行禅代憤惋愈甚隋文帝既不能譴責内甚愧之開皇六年封后為樂平公主後又議奪其志后誓不許乃止大業中殂祔葬定陵宣朱后後周書曰宣朱皇后名滿月吳人也其家坐事没入東宫帝為太子后被選掌衣服召而幸之遂生靜帝静帝立尊為天元帝后后本非良家子年長於帝十嵗踈賤無寵以靜帝故特尊崇之宣帝崩静帝即位尊為太后隋初出俗為尼改名法淨後殂以尼禮葬之京城宣陳后後周書曰宣帝陳皇后名月儀潁川人大将軍山提之第八女也選入宫拜為徳妃月餘立為天元左皇后帝崩出俗為尼改名華光父山提高祖平齊拜大将軍以后父超授上柱國除大宗伯宣元后後周書曰宣帝皇后名樂尚河南洛陽人也開府晟之苐二女年十五時被選入宫拜貴妃大豫元年七月立為天右皇后宣帝崩出俗為尼改名華勝父晟少以元氏宗室拜開府大象元年以后父進位上柱國拜翼國公宣尉遲后後周書曰宣帝尉遲皇后名繁熾蜀公廻之孫女也有美色初適杞公亮子西陽公温以宗婦例入朝帝逼而幸之後亮聞謀逆帝遂誅温追后入宫立為天元右大皇后帝崩出俗為尼改名華道隋開皇十五年殂静司馬后後周書曰靜帝司馬后名令姬柱國滎陽公消難之女也宣帝傳位於帝納后為皇后隋文帝以后父已擁衆奔陳廢后為庻人嫁為同州刺史李丹妻隋文獨孤皇后隋書曰文獻獨孤皇后河南洛陽人周大司馬河内公信之女也信見髙祖有竒表故以后妻焉時年十四髙祖與后相得誓無異生之子后初亦柔順恭孝不失婦道后姊為周明帝后長女為周宣帝后貴戚之盛莫與為比而后每謙卑自守世以為賢及周宣帝崩髙祖居禁中總百揆后使人謁髙祖曰大事已然騎獸之勢必不得下勉之髙祖受禪立為皇后性尤妬忌上亦毎事惟后言是用后見諸王及朝士有妾孕者必勸上斥之時皇太子多内寵妃元氏暴薨后意太子愛妾雲氏害之由是諷上竟廢太子立晉王廣皆后之謀也仁夀二年八月甲子日暈四重己巳太白犯軒轅其夜后崩於永樂宫時年五十九葬於太陵宣華夫人隋書曰宣華夫人陳氏乃陳宣帝之女也性聰惠姿貌無雙及陳㓕配掖庭後選入為宫嬪時獨孤皇后性妬忌後宫罕得進御唯陳氏有寵晉王廣之在藩也隂有奪宗之計規為内助每致禮物以取媚於陳氏皇太子廢立之際頗有力焉及文獻皇后崩進位為貴人専房擅寵主斷内事六宫莫與為比及上大漸遺詔拜為宣華夫人煬帝嗣位之後出居仙都宫尋召入嵗餘而終時年二十九帝悼之為製神傷賦煬帝蕭皇后隋書曰煬帝皇后蕭氏梁明帝巋之女也江南風俗二月生子者不舉后以二月生由是季父岌収而養之未幾夫妻俱死轉養舅氏張軻家然軻甚貧窶后躬親勞苦煬帝為晉王時髙祖将為王選妃於梁遍占諸女皆不吉巋迎后於舅氏令使者占之曰吉於是遂䇿為王妃后性婉順有智識好學解屬文頗知占候髙祖大喜之帝甚寵敬焉及帝嗣位詔立為后帝毎遊幸未嘗不隨侍後及宇文氏之亂隨軍至聊城化及敗没於竇建徳突厥處羅可汗遣使迎后於洛州建徳不敢留遂入於虜庭唐貞觀四年破突厥乃以禮致之歸於京師太平御覽巻一百四十
