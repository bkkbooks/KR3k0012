  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_075-1a, image: WYG0893/WYG0893-0598a.png}
body:
  text: 太平御覽卷七十五宋李昉等撰地部四十溝瀆渠甽澮汎灣浦溝釋名曰田間之水曰溝溝者搆也從横相交搆也爾雅曰谿注谷曰溝周禮曰匠人為溝洫九夫為井間廣四尺深四尺謂之溝方十里為城城間廣八尺深八尺謂之洫傳曰梁伯好土功乃溝公宫又曰魯將與齊戰師不踰溝樊遲曰請三刻而踰之衆從之又哀元年吳城䢴溝通江淮杜預曰於䢴江築城穿溝東北通射陽湖西北至禾口入淮通糧道也今廣陵䢴江是又史記云䢴溝即吳王夫差所開漕運以通上國者國語曰吳王夫差殺申胥不稔於嵗稔謂嵗熟也乃起師北征開為深溝通於商魯之間開掘地商宋也北屬之沂西屬之濟以會晉定公于黄池論語曰禹盡力於溝洫史記曰漢王四年王軍廣武關中兵益出當此時彭越起兵居梁地往來略楚兵絶其糧道齊王信又進擊楚項羽恐乃與漢王約中分天下割鴻溝而西者為漢鴻溝而東者為楚項羽歸漢王父母妻子軍皆呼萬嵗羽解而東漢王欲引而西用張良陳平計乃進兵追項羽博物志曰徐偃王治其國仁義著聞欲周行上國乃通溝陳蔡之間得朱弓朱矢酈道元水經注曰高唐縣有甘棗溝水側多􅀥故俗取名溝焉又曰酒泉延夀縣南有山石水出于莒地為溝殷氏世傳曰殷褒為滎陽令先多霪雨百姓饑饉褒乃穿渠入河四十餘里疏導原隰用致豐年民頼其利號曰殷溝而頌之莊子曰尋常之溝洫巨魚無所還其體而鯢鰌為之制孟子曰思天下之民匹夫匹婦有不被堯舜之澤者若已推而内之溝中楊子圖經曰六合縣東三十里從岱石湖入四里至溝中心與陵分界按後漢書張綱為廣陵太守濟惠於百姓勸課農桑於東陵村東開此溝引湖水灌田以此號為張綱溝阮勝之記曰吳王濞開茱茰溝通運至海陵倉北有茱茰村故以村立名崔豹古今注曰長安御溝謂之楊溝謂植髙楊於其上也一曰羊溝謂羊喜抵觸垣故為溝以隔之因曰羊溝也古詩曰今日斗酒别明日溝水頭蹀􅉜御溝上溝水東西流瀆禮記月令曰季春之月道達溝瀆開通道路爾雅曰溝注澮曰瀆漢舊儀曰祭四瀆用牲崔鴻十六國春秋前秦録曰建元十二年堅以關中水旱不時議仿鄭白故事發王侯以下及豪强富民僮𨽻三萬人開涇水上源鑿山起堤通渠引瀆以溉田民頼其利伏滔北征記曰姑熟西北有甘寧墓孫皓時占者云墓有王氣皓鑿其後十許里曰直瀆越絶書曰銅姑瀆長一百五十步去縣二十里渠史記河渠書曰禹以為河所從來者髙難以行平地數為敗乃釃二渠漢書音義曰釃分也以引其河載之高地過降水至于大陸播為九河也鄭國閒說秦令鑿涇自中山南西交瓠口為渠溉斥鹵之地四萬餘頃收皆畝一鍾於是關中為沃野無凶年秦因以富强卒併諸侯因命曰鄭國渠漢書曰禹作二渠以引河武帝時穿渠水岸苦崩乃鑿井相通行水井渠之生自此始穿得龍骨故名龍骨渠起谷口入櫟陽注渭中名白渠民得其饒歌曰田於何所池陽谷口鄭國在前白公起後舉鍤為雲決渠為雨又曰張掖郡有千金渠范曄後漢書曰樊宻所起廬舎皆有深堂高閣陂渠灌注又池魚牧蓄有求必給魏志曰遼西單于冐頓尤强公將征之鑿渠自滹沱入孤水名平虜渠又從泃河口鑿入潞河名泉州渠以通海又曰建安十八年九月鑿渠引漳水入白溝以通河又曰賈逵為豫州刺史通運渠二百餘里所謂賈侯渠北史曰郭衍為開漕渠大監部率水工鑿渠引渭水經大輿城北東至于潼關漕運四百餘里關中頼之名曰富人渠隋書謝胄為兖州刺史先是兖州城東沂泗二水合而南流沉濫大澤中胄遂積石堰之使决令西注陂澤盡為良田又通轉運利盡淮海百姓頼之號為謝公豐兖渠唐書曰温造為郎州刺史在任開後鄉渠九十七里溉田二千頃郡人獲利乃名為右史渠造自起居舎人出郡水經注曰漢司空漁陽王梁之為河南也將引榖水以溉京師渠成而水不流故以坐免後張純堰洛以通漕洛中公私懷贍是以渠今引榖水蓋純之創也又曰漢明帝之世司徒伏恭薦王景善能治水顯宗詔典謁者吳始作浚儀渠吳用景法水乃不害此即景時所修故瀆也渠流東注浚儀故復謂之浚儀渠也明帝十五年東巡狩至無鹽帝嘉景功拜河堤謁者又曰魏武帝又堰漳水迴流東注世號天井堰二十里中作十二墱墱相去三百步令互相灌注一原分為十二流皆懸水門自城西東入經銅雀臺下伏流入城東流謂之長明渠戴延之西征記曰洛陽城外四面有陽渠水周公所制也建春門外二橋最大縱一横一續述征記曰案河渠書溝洫志引河為洪溝一說秦至魏鑿渠引河灌大渠名曰洪溝焉崔寔政論曰戰國海内十二分魏州有史起引漳水灌鄴民以興歌蜀郡李冰鑿離堆通二江益郡至今頼之秦開鄭國漢作白溝而關中號為陸海郡國志瀛州平舒縣古五渠水魏延興初文安縣人孫願等捕魚此水先祭忽有羣魚從西而來有一人異甚謂願曰若得大魚勿殺及下網果得大魚乃殺之腹中得尺素祭而食之羣魚並飛遂不復得因名此處為飛魚口鄴城故事曰西門豹為令造十二渠決障水以溉民田因是户口豐饒今渠一名安澤陂是南康圖經曰前漢兒寛遷内黄令吏民大信表開六輔渠以大溉灌獲利因名曰兒公渠甽說文曰甽水流也周禮曰倍洫曰甽􅄞康養生論曰或益之以甽澮澮說文曰澮水流澮澮也廣二尋深二仞書曰予決九川距四海濬畎澮距川爾雅曰谷注溝曰澮釋文曰澮會也小溝之所會也汎續述征記曰齊人謂湖為汎汎中有九十九臺皆生葦蒲焉風俗通曰汎莽也言其平望汎莽無崖際也灣酈善長注水經曰沇水又東厯臨縣西為明月池白璧灣灣狀半月清潭鏡澈上則風籟空傳下則泉響不斷行者莫不擁檝嬉游徘徊愛翫江夏記曰敗舶灣在縣西北七里按吳志云孫權與羣臣泛觴於大船江中西上逢惡風權遣舵工張頡取􅚒洲谷利抜劒擬舵工急取樊口未及至口灣中船破因名敗舶灣權至岸謂谷利曰何怯於水也谷利曰大王萬乘之主欲涉不測之淵一旦傾危社稷何寄因登陸路而歸潯陽記曰蠡湖西灣夏秋水渺漲商徒縈紆牽舟循繞人力疲勞號為西疲灣亦云西灣又有白漕灣亦在湖西汎漲驚波似雪洶湧漕灣因是名焉又有落星灣灣内有落星石週圍百步許又有神林下有廟祈福而獲前進由是名焉又有女兒廟禱祈亦有靈應即不許所值亦無害永嘉郡記曰樂城縣三原亭去郡百二十里溪水清如鏡曩昔有得一死鮎者鬐大五六圍一鬐輒得數十斛鮓此灣無所不容有人能食者常自譬腹如三原灣無所不容水經注曰渭水東南與神澗水合開山圖所謂靈泉池也俗名之為萬石灣泉深不測實稱靈異先後漫遊者多罹其害鄱陽記曰清灣在縣東南七里隋開皇中太守梁文謙蒞官清潔取此灣水以自供後人思其德號為清灣浦說文曰浦水濵也詩曰率彼淮浦省此徐土郡國志曰夏曰浦有龍魚昔禹南濟黄龍夾舟之處楚詞曰望涔陽之極浦述異記曰上虞縣有石馳步水際謂之步也𤓰步在吳中吳人賣𤓰於江畔因以名也江中有魚步龜步湘中有靈妃步按吳楚間謂浦為步蓋語訛耳吳録曰富陽浦濮宋為吳縣之津吳大帝時有浦通浙江至廬溪故曰桐廬縣東有大溪注廬口渌波青巖昔晉徵士散騎侍郎戴勃遊此自言山水之極致也郡國志曰金陵西浦亦云項口即張碩捕魚遇杜蘭香處也江夏記曰南浦在縣南三里離騷曰送美人兮南浦其源出京首山流入大江春冬涸竭秋夏泛漲商旅往來皆於浦停泊以其在郭之南故稱南浦續搜神記曰廬江筝笛浦浦中有大舶覆水内漁人宿旁聞筝笛之聲及香氣氤氲云是曹公載妓船覆於此太平御覽卷七十五
