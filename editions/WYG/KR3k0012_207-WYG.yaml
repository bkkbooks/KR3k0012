  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_207-1a, image: WYG0894/WYG0894-0801a.png}
body:
  text: 太平御覽卷二百七宋李昉等撰職官部五太尉司徒上太尉禮記月令曰孟夏之月命太尉賛傑俊蔡邕章句曰太尉卿官春秋運斗樞曰赤龍負圖以出河見堯與太尉舜等百二十臣集發藏大麓春秋合誠圖曰堯坐中舟與太尉舜臨觀􅃫凰授圖史記曰孝惠帝六年置太尉官漢書曰太尉秦官也掌武事又曰髙祖言周勃重厚而少文然安劉氏者必勃也可為太尉東觀漢記曰劉彪字智伯為太尉在位清白㢘譲以率下又曰張輔字孟侯為太尉父尚在輔每遷轉乃一到雒父来適㑹正臘公卿罷朝俱賀嵗奉酒上輔父夀極欣慊莫不嘉其榮也後漢書曰楊震字伯起嘗客於湖水外不荅州郡禮命數十年衆人謂之晚暮而震勵志愈篤後有鸛雀啣三鱣魚飛集講堂前都講取魚進曰凢鱣者卿大夫之服象也數三者法三台也先生自此升矣後果位至太尉又曰劉寛為太尉靈帝頗好學藝每引見寛令講經寛嘗於坐被酒睡伏被加也為酒所加也帝問太尉醉耶寛仰對曰臣不敢醉但任重責大憂心如醉爾又曰張禹為太尉時連嵗災荒府藏空虛禹上䟽求入三嵗租税以助郡國廪假廪給也假借也許之又曰楊震代劉愷為太尉帝舅大鴻驢耿寳薦中常侍李閏兄於震震不從寳乃自徃候震曰李常侍國家所重欲令公辟其兄寳惟𫝊上意耳言非已本心𫝊在上之意震曰如朝廷欲令三府辟召固宜有尚書勅遂拒不許寳大恨而去又宦者𫝊曰曹嵩靈帝時貸賂中官及輸西園錢一億萬故位至太尉續漢書百官志曰太尉一人掌方岳事物功課嵗盡則奏其殿最而行賞罰世祖即位為大司馬又曰太尉郊廟掌亞獻大喪告諡南郊又曰王龔為太尉在位恭慎自非公事不通州郡書記其所辟命皆海内長者謝承後漢書曰鄭宏為臨淮太守行春有二白鹿隨車夾轂而行宏怪問主簿黄國鹿為吉凶賀曰聞三公車轓畵作鹿明府當為宰相宏後果為太尉又曰陳蕃拜太尉臨朝嘆曰黄憲若在不敢先佩印綬又曰鄭宏字巨君為太尉舉将第五倫為司空班位在下每正朝見宏曲躬自卑帝知遂置雲母屏風分隔之由此以為故事又曰京兆朱寵字仲威為太尉家貧食脱粟飯卧布被朝廷賜錦被粱肉皆不敢當華嶠後漢書曰安帝即位太尉徐防以災異寇賊䇿免就國凢三公以災免自防始也袁山松後漢書曰太尉劉虞讓位於羊續靈帝時為三公者皆輸禮錢千萬續舉褞袍以示之曰臣之所有唯此而已遂不代虞張璠漢記曰楊秉字叔卿為太尉嘗曰我有三不惑酒色財也天下稱為名公漢書百官表曰太尉秦官金印紫綬掌武事周勃灌嬰周亞夫等為之又百官表注曰太尉古官也自上安下曰尉故以為號又應劭漢官儀曰章帝詔曰司空牟融典職六年勤勞不怠其以融為太尉録尚書事又曰冲帝冊書曰太尉趙峻貳掌樞衡有匪石不貳之心又曰三公國之楨幹朝廷取正以成斷金大司農李固公侯之苗忠正不撓有史魚之風其以固為太尉又曰河間相張衡説明帝以為司徒治府以榮之欲更治太尉府府公南陽趙憙也西曹掾安衆鄭均素好名節以為朝廷新造北宫整飭宫寺今府本館陶公主第舍員職鮮少自足相授憙表陳之即見聽許其冬帝幸辟雍厯二府光鮮壮麗而太尉府獨卑陋顯宗東頋嘆息曰屠牛縱酒勿令乞兒為宰漢官典職曰太尉孝文三年置七年省武帝建元二年置五年復省更名大司馬建武二十七年復置太尉魏志曰文帝踐祚鍾繇遷太尉時華歆王朗並先世名臣帝罷朝謂左右曰此三公者乃一代之偉人也後日殆難繼矣又曰華歆拜太尉歆疾乞退讓位於管寧文帝不許臨當大㑹乃遣散騎常侍繆錫奉詔諭㫖曰朕新蒞庶事一日萬機懼聽斷之不明頼有徳之臣左右朕躬君其力疾就㑹以惠予一人将立几筵命百官總已以須君到然後御坐又曰鄧艾字士載既平劉禪詔曰艾曜威奮武深入虜庭斬将搴旗梟斬鯨鯢使僣號之主稽首係頸厯世逋誅一朝而平兵不踰時戰不終日震徹席卷蕩定巴蜀雖白起破强楚韓信克勁趙吴漢擒子陽亞夫滅七國計功論美不足比勲其以艾為太尉增邑二萬户又曰王祥字休徴為太尉司馬文王進爵為王祥與司徒何曾司空荀顗並詣王顗曰相王尊重今可相率而拜祥曰相國勢位誠為尊貴然乃是魏之宰相吾等魏之三公公王相去一階而已班列大同安有天子三司可輙拜人者耶損魏朝之美虧晉王之徳君子愛人以禮吾不為也及入荀顗遂拜祥獨長揖文王謂祥曰然後知君子見顧之重吴志曰孫皓詔曰范慎勲徳俱茂朕所敬憑宜登上公以副衆望可為太尉晉中興書曰郄鑒為太尉雖在公位冲心愈約勞謙日集誦翫墳索自少及長身無擇行家本書生後因喪亂解巾從戎非其本願常懐慨然咸康五年秋寝疾上䟽遜位優詔不許又曰桓溫授侍中太尉固讓不受旬月之中使者八至軺軒相望於道溫遂親職謝靈運晉書曰秦有太尉掌兵漢仍修之或置或省是故司馬之官主九伐之職齊職儀曰魏文黄初二年日蝕奏免太尉賈詡詔天地災害責在朕躬勿與三公遂為永制五代史後唐書荘宗御文明殿册齊王張全義為守太尉如常儀禮畢全義於尚書都省領事宰臣群官在列左諫議竇専不降階為御史所劾専援引舊典以對時宰臣不記故事無能詰責寝而不行汝南先賢𫝊曰陳蕃拜太尉讓曰齊七政訓五兵臣不如議郎王暢天文録曰三公星在北斗杓南主宣徳化和隂陽若今太尉司空之象也摯虞冊隴王太尉文曰朕惟君行為時表親則宗臣論道經邦保乂皇家是用進登上台司徒上尚書舜典帝曰契百姓不親五品不遜五品五常遜順也汝作司徒敬敷五教在寛五常之教務在寛也禮記王制曰司徒脩六禮以節民性明七教以興民徳齊八政以防淫一道徳以同俗養耆老以致孝恤孤獨以逮不足上賢以崇徳簡不肖以黜惡司徒地官卿掌邦教也又月令曰孟夏之月司徒行縣鄙蔡邕月令章句曰司徒教官也又曰契為司徒而民成謂知五教之禮也毛詩緇衣曰緇衣美武公也父子並為周司徒善于其職周人宜之故美其徳以明有善勸有功焉周禮曰乃立地官司徒帥其屬而掌邦教以佐王安擾邦國擾亦安也又曰大司徒之職掌建邦之土地之圖與其人民之數以佐王安擾邦國以天下土地之圖周知九州之域廣輪之數辨其山林川澤丘陵墳衍原隰之名物又曰地官曰大司徒之職凢建邦國以土圭土其地而制其域土其地猶言度其地也又曰大司徒之職以五禮防萬民之偽而教之中禮所以節止民之侈偽使其行得中以六樂防萬民之情而教之和樂所以蕩正民之情思使其心應和也又地官曰大司徒之職以保息六飬萬民一曰慈㓜保息謂安之也慈㓜謂愛㓜少也二曰飬老三曰振窮四曰恤貧五曰寛疾六曰安富安富為平其徭役不専取春秋𫝊曰祝鳩氏司徒也尚書大𫝊曰百姓不親五品不遜則責司徒韓詩外𫝊曰君臣不正人道不和國多盜賊人怨其上則責之司徒論語摘輔像曰仲尼為素王顔淵為司徒家語曰地宜不殖財物不畜萬民飢寒教訓不行風俗淫僻人民流散曰危危則飭司徒飭謂整攝漢書曰祝良字仲子東海人為大司徒鮑恢為長史以事至東海過其家見良妻布衣徒跣曳柴從田中歸恢告曰我司徒史也故来授書欲見夫人妻曰妾是也若掾耶恢下拜之歎息而歸東觀漢記曰鄧禹為司徒討赤眉不以時進光武貽書曰司徒堯也赤眉桀也今長安飢民孰不延望耶又曰袁安為司徒每朝㑹憂念王室未嘗不流涕又曰郭丹為司徒在朝名清亷公正後漢書曰蔡茂字子禮代戴渉為司徒在職清儉匪懈茂初在廣漢夢在大殿之極上有三穗禾茂跳取之得其中穗輙復失之主簿郭賀離席慶曰大殿者官府之形象也極而有禾人臣之上禄也取其中穗中台之位也於字禾失為秩雖曰失之乃以得禄秩也衮職有闕君其補之旬月而茂徴焉辟賀為掾又曰光武即位髙邑使使者持節拜鄧禹為大司徒䇿曰前將軍禹深執忠孝與朕謀謨帷幄決勝千里孔子曰自吾有回門人日親斬將破軍平定山西功効尤著百姓不親五品不遜汝作司徒敬敷五教在寛今遣奉車都尉徃授印綬封為鄼侯邑萬户其敬之哉禹時年二十四矣又曰范遷為司徒有宅數畝田不過一頃復推與兄子其妻常謂曰君有四子而無立錐之地又曰張湛稱疾不朝後大司徒戴涉被誅涉字叔平冀州清河人也坐所屬人盗金下獄帝强起湛以代之湛至朝堂遺失溲便溲小便也音所流反因自陳疾篤不能復任朝事遂罷之又曰馮勤遷司徒先是三公多見罪退帝賢勤欲令以善自終因讌見從容戒之曰朱浮上不忠於君下陵轢同列竟以中傷朱浮為大司空坐賣㺯國恩免又為陵轢同列帝銜之惜其功不忍加罪至今死生吉凶未可知豈不惜哉人臣放逐受誅雖復追嘉賞賜賻祭不足以償不訾之身訾量也言無量可比之價重之極也訾與資同忠臣孝子覽照前代以為鑑誡能盡忠於國事君無二則爵賞光乎當代功名列於不朽可不勉哉勤愈恭約盡忠號為任職又曰宣秉字巨公拜大司徒所得俸禄以収飬親族自無儋石之儲又曰鮑昱代王敏為司徒賜錢帛什器帷帳又曰司徒一人掌飬民事凡教民孝悌遜順謙儉飬生送死事則議其制建其度凢四方民事功課嵗盡則奏其殿最行賞罰謝承後漢書曰劉寵為司徒卧粗布被漢官典職曰司徒本丞相官哀帝改為大司徒主司徒衆遜五品府與蒼龍闕對厭於尊者不敢稱府也魏志曰華歆字子魚拜司徒歆素貧禄賜以賑施親戚故人家無儋石之儲公卿嘗並賜沒入生口唯歆出而嫁之帝嘆息下詔曰司徒國之雋老所與和隂陽理庶事也今太官重膳而司徒蔬食甚無謂也特賜御衣及其妻子男女皆作衣服又曰黄初元年改相國為司徒御史大夫為司空奉掌郎中令為大司農魏名臣奏曰黄門杜恕奏曰漢故事人民病疾責之司徒蜀志曰許靖字文休及先主即尊號䇿靖曰朕獲奉洪業君臨萬國夙宵徨徨不能撫綏百姓不親五品不遜汝作司徒其敬敷五教在寛君其朂哉秉哉無怠稱朕意焉靖雖年踰七十愛樂人物納誘後進清談不倦丞相諸葛亮皆為之拜吴録曰丁固為司徒初為尚書夢松樹生其腹上謂人曰松字十八公也後十年吾當為公乎遂如夢焉太平御覽卷二百七
