  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_928-1a, image: WYG0901/WYG0901-0256c.png}
body:
  text: 太平御覽卷九百二十八宋李昉等撰羽族部十五衆鳥鳥卵鳥巢衆鳥異物志曰錦鳥文如丹池錦而藻繢牙交俗人見其似錦因謂之錦鳥形㣲大於雉其鳴特有文章五色甚可愛周氏雜字曰鸀鳿鳥似鳬風土記曰鷫鸘􅒗屬飛則鳴其羽肅肅者也楚辭曰鴻鵠代游曼鷫鸘曼曼行也鷫鸘俊鳥風土記曰鷖鴫也以名自呼大如小雞生於荷葉上爾雅曰鸛鷒鶝鶔也如鵲短毛射之啣矢射人郭璞註曰一名􅦀羿河圖說徴示曰鳥一足曰獨見其勇强也廣州記曰新寧縣有獨足鳥大如鵠其色蒼其名自呼獨足臨海異物志曰東垂有一足鳥俗名曰獨足疑是商羊文身赤口惟食蟲豸不害稻粱鳴如人嘯聲時兩轉鳴或曰山譟鳥晝伏夜翔或時晝出則羣鳥譟之山海經曰有五采之鳥有冠名曰往鳥孔融周歲論曰儀屯集狂鳥穢之爾雅曰鶨䳢老郭璞註曰鴒鶨也俗謂之癡鳥鶨音丑眷切說文曰欺老􅀈也左思蜀都賦曰鷩鴺山棲綦每逺註曰鷩鴺鳥名今如山鷄其色班其雛色異出江東莊子曰周周銜羽以濟司馬彪註周周河上鳥也頭重尾輕是以銜他鳥羽如飛過何人之不可求益於物以補其所短也竺山真登羅山疏曰越王鳥狀似鳶口句末可受二升許南人以為酒器珍於文螺不踐地不飲江湖不唼百草不下餌蟲魚惟噉木葉糞似董陸香山人遇之既以為香又治雜瘡南方草木志曰有烏或名越王鳥大如孔雀喙長尺八九寸黄白黒色狀如人畫光飾似漆瑩磨尤益鮮明多持以飲酒出交趾九真劉欣期交州記曰䴌䮵黄喙二尺餘南人以為酒爵南越志曰䴌䮵一名越王鳥嶺南録異曰越王鳥如烏而頸足長頭有黄冠如杯用貯水相飲食衆鳥雛取其冠堅緻可為酒杯竺法真登羅山疏曰五距鳥足有重距其音先顧或謂之先顧鳥似孔雀背連錢文遊名山記曰芙蓉山有異鳥愛形顧影不自藏故為羅者所得人謂鷂􅀈廣州記曰廣寧縣有金鳥純白口脚如金其鳴自呼異物志曰鷢鳥大如雄雞色赤或黒而能鳴彈射取之其肉香美中作炙盛宏之荆州記曰魚腹縣南山有鳥時吐頷長數寸丹朱彪炳形色類綬因名吐綬鳥又曰晉太元中營道令何諧之於縣内得一鳥大如白鷺滕上及髀有銅環貫之環大小刻鏤如橄欖妙絶人工於時京師皆觀之嶺表録異曰有鳥形如野鵲翅羽黄綠間錯尾生兩枝長二尺餘直而不䮍唯尾稍有毛宛如箭羽因目之為帶箭鳥爾雅曰鳥鼠同穴其鳥為鵌其鼠為鼵郭璞注曰鼵如人家鼠尾短鵌如鵽而小色黄黒穴入地三四尺鼠在内鳥在外今在隴西鳥鼠同穴山出臨海異物志曰江湖海鳥大如鸛喙長八寸潮上即鳴又曰䳽􅀢海鳥喙長八寸天欲風雨内喙於土中向風海師以為候鳴如嘯又曰蜜母小鳥也色黒正月旦為蜜蜂周行諸山求安處蜂隨之蜜母暮還入蜂中郭璞蜜蜂賦曰大君以總羣氏又協氣於零雀每先馳而葺宇畨巖穴之經略蜜母一名零雀爾雅曰鴗天狗又曰鴢頭鵁孫炎曰鳥鵁也又曰突鶦鳥孫炎曰糓鶦水鳥又曰鷏􅀢母也廣志曰蚊母吐蚊大如鳩嶺南異物志曰五嶺溪山深處大鳥如鶬觀常吐蚊子輒從口中飛去謂之吐蚊鳥說文曰䴌水鳥也南方草木狀曰孔貴如小母雞臨海異物志曰獨舂鳥聲似舂聲聲多者五穀傷聲少者五穀熟又曰契鳥蘭草占米之貴賤背廻契其筮契一度即斛米百錢再度二百契仍五十隨契多少以占知之爾雅曰􅜥唐屠郭璞註曰鳥蒼白色臨海異物志曰􅀈䲴鳴聲哀俗云有母欲嫁因爨使子守之母遂不還兒因呼母言􅀈䲴也又曰遊鳥如鵞大其色黒以青絲頭繫竹竿呼之即來入手俗言是東海神所養不可食也臨海異物志曰獨􅀈鳥如隼其色黒其鳴如人呼雞聲爾雅曰鷚天籥也南方草物状曰金吉鳥大如小母雞臨海異物志曰有鳥耀儀名曰苦姑又曰除溪鳥小如鴝鵒甚黒天欲隂雨即鳴自言溪瀆又曰祖端端小鳥天欲雨即鳴抱朴子曰千秋鳥人面夀如其名魯連子曰南方有鳥名曰邽生而食其翼南方草物状曰羽鳥毛羽青黒色小如鳩俞益期與韓豫章牋曰林邑有鳥名歸飛臨海異物志曰賔師形大如􅀈鵒毛正黒色廣雅曰車攝鷦禮也山海經曰基山有鳥焉名􅡀􅝐食之無卧又曰北海蛇山有五采鳥飛蔽一鄉名曰鷖鳥又曰青邱有鳥其狀如鳩名曰灌灌又曰禱過之山有鳥三足人面名瞿如又曰松果山有鳥名䳋渠又曰上申山鳥名當扈状如雉食之不眴目又曰符遇之山其鳥名䲭可以衛火又曰英山有鳥状如鶉食之已癘名曰肥遺又曰臯塗山有鳥名曰數斯食之已癭又曰崑崙山有鳥名曰欽原蠚獸則死蠚木則枯又曰灌題山有鳥見人則躍名曰竦斯又曰梁渠之山有鳥名曰囂食之已腹痛可以止衕治衕下也又曰陽山有鳥自為牝牡名曰象虵又曰廆山有鳥名曰鴒䳩鈴要兩音其鳴自呼服之不昧又曰丑陽山有鳥名曰􅀈䳜可以禦火又曰翼望山有鳥状如烏三首六尾其名曰鵸䳜􅀝餘兩音服之使人不厭又以禦凶又曰青要山鳥名曰鴢音􅆼窕之􅆼也状如鳬青身而朱目赤尾食之宜子又曰攻離山有鳥名曰嬰勺其状如鵲赤喙白身其尾若勺似頂勺形其鳴自呼又曰鳥名青耕可以禦疫又曰天帝山有鳥其状如鶉黒文而赤翁翁頭下毛名曰擽食之已痔又曰泰山有鸓音畾其形如鵠而兩首兩足又曰北囂山有鳥状如人面名曰􅜥鵑夜飛而晝伏又曰太行山有鳥焉其状如鵲白身赤尾六足其名䴅音奔又曰馬成山有鳥状如烏白首而身青黄足其名曰鶌鶋食之不飢又曰號山有鳥名寓状如鼠又曰蔓聯之中有鳥羣居而多飛其毛如雌雉名鵁鳥鵁音交或作獨又曰單張山有鳥状如雉而文首白翼黄足其名曰白鵺食之已嗌又曰小侯山有鳥其状如烏而白文名曰鴣􅨊姑習兩音又曰北號山有鳥其状如雞而白首鼠足虎爪名鬿雀食人又曰羭次山有鳥状如梟人面而一足名曰槖􅖦音肥冬見夏蟄服之不畏雷看其毛羽令人不畏雷鳥卵左傳哀公下曰子西曰勝如卵余翼而張之漢書曰武帝時大宛諸國獻大鳥應劭人如二石瓮條支國大鳥卵如瓮魏志曰清河令徐孝龍取十三種物着筐中使管輅射之先說雞子後謂蠶蛹遂一一名之吳志曰孫權太子嘗嘲諸葛恪曰元遜何不食馬矢恪曰願太子食雞卵權曰人令卿食馬矢卿使人食雞卵何也恪曰所出同耳權大笑晉書曰戴安道少時取鷄卵汁溲白瓦屑作鄭元碑文手刻字文既綺藻器亦妙絶唐書武徳中西蕃突厥葉䕶可汗遣使貢條支巨卵二又曰貞觀二十一年西蕃吐陸可汗獻金卵瓶鳥􅑹也雕刻作禽獸而塗以黄金山海經曰西王母山有沷民國鳳卵是食甘露是飲韓詩外傳曰卵之性為雛不得良雞大育積日累九則不成為鶡管子曰子夏云彫卵然後瀹之所謂發藏散萬物墨子曰以他言非吾者猶以卵投石也盡天下之卵石猶不毁也孫卿子曰以桀詐桀則幸詐堯辟若以卵投石又曰卵有毛是說之難持者也而惠施鄧析能精之然而長者不貴非禮義之中也淮南子曰越鷄不能伏鶴卵又曰鴈北向鵲始加巢雉雊呼卵淮南萬畢術曰艾火令雞子飛取雞子去其汁燃艾火内空卵中疾風因舉之飛又曰鹽之累卵取鹽塗卵取他卵置上即累也抱朴子曰夏后始衰食卵鳳去如此則鳳有種矣楊子法言曰􅀈之不才其卵段君乏才其民野段敗也不屈其意不累其身不夷不惠可否之間神仙傳曰有人病就茅君請福煮鷄子十枚以内幛中須臾茅君悉擲出其中無黄者並差有黄者不愈常以此為候阮籍大人先生傳曰先生者以天地如卵耶小物細人欲論其長短議其是非豈不哀哉愽物志曰九竅者胎生八竅者卵生龜黿比諸此類咸卵生而影伏幽明録曰桂陽羅君章二十許都未有志不屬意學問常晝寢夢得一鳥卵五色輝耀不似人間物夢中因取吞之於是漸有志向遂勤學讀九經以清才聞羅含傳云吞飛鳥卵吳氏本草曰丹雞卵可作琥珀張衡南郡賦曰春卵百笋張孟陽洛禊賦曰浮素卵以蔽水灑𤣥醪於中河鳥巢尚書太傅曰古人鳳凰巢其樹好生惡殺說文曰鳥在木上曰巢在穴曰窠曽子曰鷹鸇以太山為下而増巢其上孫卿子曰古之王者烏鵲之巢可俯窺荘子曰古者禽獸多而人民少於是民皆巢居以避之則晝食菽粟暮棲木上故命之曰有巢氏之民又曰鵲上髙城之墉而巢於髙枝之巔城壊陵風而起淮南子曰鵲巢知風之所起言鵲作巢而知風一說背風也陸賈新語堯以仁義為巢舜以稷卨為枝秦以刑罰為巢故有覆巢破卵之意太平御覽卷九百二十八
