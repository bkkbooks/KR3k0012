  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_958-1a, image: WYG0901/WYG0901-0457a.png}
body:
  text: 太平御覽卷九百五十八宋李昉等撰木部七楠檜柞檀柘把梓楸樅椒木蘭夜合甘棠欓櫟橡楠㝷陽記曰黄金山有楠樹一年東邉榮西邉枯後年東邉枯西邉榮年年如此張葉云交讓樹者此是也檜爾雅曰檜栢葉松身尚書禹貢曰杶榦栝栢栢葉松身曰栝柞爾雅曰栩杼柞樹也毛詩車牽曰陟彼高岡析其柞薪析其柞薪其葉湑兮又曰維柞之枝其葉蓬蓬疏曰栩今柞殻為斗可以染皂今俗及河内云杼斗或云豫斗陸機毛詩疏義曰芃芃棫樸爾雅曰棫白桵注音㽔三倉説棫即柞也其木理純白無赤心為白桵直理易破故可為犢車輻又可為矛㦸西京雜記曰五柞宫有五柞樹皆連抱五株樹枝覆䕃數十畝崔豹古今注曰柞木出交州林邑國也色黑而有文亦謂之文木周處風土記曰舊説舜葬上虞又記云耕於歴山而始寜剡二縣界上舜所耕田在於山下山多柞樹靈越之間名柞為櫪故曰歴山䆄毛詩將仲子兮曰將仲子兮無踰我園無折我樹檀檀堅强之木又曰伐檀刺貪也在位貪鄙無功而受禄君子不得進而仕也聖賢冡墓記曰孔子墓檀樹柘禮記月令曰季春無伐桑柘又投壺曰矢以柘若棘無去其皮周禮冬官曰弓人辨六材一曰柘古史考曰烏號柘木枝長而烏集將飛柘彈烏烏乃號呼以柘為弓故稱烏號弓周書曰季夏取桑柘之火風俗通曰柘材為弓彈而放快崔寔四民月令曰柘色黄赤人君所服黄者中尊赤者南方人君之所向也雲南記曰㑹川室屋相次皆是板及茅舍滿川坡盡是花木亦有赤柘把爾雅曰把枸檵音計今枸把也毛詩將仲子兮曰將仲子兮無踰我里無折我樹把把木名疏曰狗脊也又湛露曰湛湛露斯在彼把棘左傳昭公曰聲子聘於晉還令尹子木與之説問晉故焉且曰晉大夫與楚孰賢對曰晉卿不如楚其大夫則賢皆卿材也如把梓皮革自楚往也雖楚有材晉實用之周書曰太姒夢梓化為把梓爾雅曰楰音俞鼠梓楸属也今江東有虎梓毛詩小弁曰惟桑與梓必恭敬止又定之方中曰樹之榛栗椅桐梓漆陸機毛詩疏義曰北山有楰爾雅曰楰鼠梓其樹葉木理如楸山楸之異者今人謂之苦楸濕時脆燥時堅今永昌人謂鼠梓漢人謂之楰禮斗威儀曰君乘火而王其政和平楸梓為長生周書曰太姒夢太子發取周庭之梓樹於商闕間化為把樹史記曰子胥將死告舍人曰必樹吾墓上以梓梓可為器而抉吾眼於呉之東門上以觀越兵入呉也漢書曰元帝初元四年皇后曾祖父濟南平陵王伯墓門梓桂卒生枝葉上茁劉向以為王氏代漢之象後漢書曰應順為冀州刺史廉直無私遷東門相賞罰必信吏不敢犯有梓樹生於㕔事室上事後母至孝衆以為孝感之應説苑曰伯禽與康叔封朝於成王見周公三見而三笞康叔有駭色謂伯禽曰有商子者賢人也與子見康叔封與伯禽見商子曰吾二子者朝乎成王見周公三見而三笞其説何也商子曰二子盍相與觀乎南山之陽有木焉名曰橋二子者往觀乎南山之陽見橋竦焉實而仰反以告乎商子商子曰橋者父道也商子曰二子盍相觀乎南山之隂有木焉名曰梓二子者往觀乎南山之隂見梓僂焉實而俯反以告商子商子曰梓者子道也二子者明日見乎周公入門而趨登堂而跪周公拂其首勞而食之曰安見君子二子對曰見商子周公曰君子哉商子也樂資春秋傳曰昔者鄭客入函谷至平舒見素車白馬曰吾華山君願以一牘致滈池君子之咸陽過滈池見一大梓樹有文石取以扣樹當有應者以書與之鄭客如其言見宫闕如王者居謁者出受書入有頃出云今年祖龍死山海經曰玉山碧山多梓木雞山美梓孟子曰拱把之桐梓人苟欲生之皆知所以養之者至於身而不知所以養之者豈愛身不若桐梓哉漢武故事曰衛子夫入宫上曰吾昨夜夢子夫庭中生梓樹數株豈非天乎是日幸之有娠郭氏𤣥中記曰秦文公造長安宫面四百里南至終南山山有梓樹大數百圍䕃宫中公惡而伐之連日不克夜有鬼謂梓樹曰若使三百人披頭以絲纒樹豈不壞汝後依此伐之樹神化為青牛逐之入澧水豫章記曰松陽門内有大梓樹大四十五圍樹先枯永嘉中一日忽更榮華太興中元帝果繼大業楸爾雅曰槄音滔山榎今之山楸子葉曰榎音賈大而皵音鵲楸大而皮麄皵者為楸也小而皵也榎小而皮麄皵者為榎漢書曰淮北滎南河濟之間千樹楸與千户侯等任昉述異記曰洛中有陸家白蓮種顧家斑竹趙有韓氏酸棗中山有楸户掌楸木者楸可以作器漢書貨殖傳有千樹楸樅七容切爾雅曰樅松葉栢身郭璞注今太廟梁用此木尸子所謂松栢之䑕不知堂室之有美樅魯連子曰松樅高千仞而無枝非憂王室無柱椒春秋運斗樞曰玉衡星散為椒援神契曰椒薑禦寒菖蒲益聰爾雅曰檓大椒也檓音毁今椒樹叢生實大者名為檓椒榝醜莍莍萸子聚生成房貌今江東亦呼莍萸而小赤色莍萸音求搜山海經曰琴鼔之山其木多椒景山多秦椒毛詩椒聊曰椒聊刺晋昭公也君子見沃之盛彊能脩其政知其蕃衍甚大子孫將有晋國焉椒聊之實蕃衍盈升彼其之子碩大無朋椒聊椒也陸機毛詩疏義曰椒聊聊語助也椒樹似茱茰有針刺葉堅而滑澤蜀人作茶呉人作茗皆取其葉以為香今成臯諸山間謂之竹葉椒樹亦如蜀椒小毒熱不中合藥可着飲食中用蒸雞䐁甚佳東海諸島上椒樹枝葉皆相似子長而不圓甚香其味似橘皮島上獐鹿食此椒葉其肉自然作橘香也又東門之枌曰貽我握椒椒分香也續漢書曰天竺國出石蜜胡椒黑鹽孫卿子曰民之親我歡若父母其好我芬若椒蘭應劭漢官儀曰皇后稱椒房取其實蔓盈升以椒塗屋取其温煖張璠漢記曰桓帝竇皇太后崩中常侍曹節王甫欲以貴人禮葬太尉李固乃扶病起𢷬椒自隨謂妻子曰若太后不得配桓帝吾不生還矣魏氏春秋同異曰鍾繇嬖庶子㑹之母出嫡夫人文帝命復焉繇恚忽飡椒致噤帝乃止齊書曰建武中王敬則於㑹嵇反奉子恪為名而子恪奔走未知所在始安王遥光勸上併誅高武諸子孫於是並勅竟陵王昭胄等六十餘人入永福省令太醫煮椒二斛并命辦數十具棺材謂舍人沈徽孚曰椒熟則一時賜死期三更當殺之㑹上暫卧主書單携啟依㫖斃之徽孚堅執曰事湏更審爾及三更子恪徒跣奔至建陽門上驚覺曰故當未賜諸侯命耶徽孚以答上撫床曰遥光幾悞人事及見子恪顧問流涕諸侯悉賜供饌世説曰石崇以椒為泥泥屋王愷以赤石脂泥壁崔寔四民月令曰正月之旦進酒降神畢室家無大小次坐先祖之前子孫各上椒酒於家長稱觴舉白范子計然曰蜀椒出武都赤色者善秦椒出隴西天水細者善風土記曰三香椒欓薑離騷曰申椒與菌桂播芳兮成堂晉成公綏椒花銘曰嘉哉芳椒載繁其實厥味惟珍蠲除百疾肇惟嵗首月正元日永介眉夀以祈元吉晉劉臻妻陳氏正旦獻椒花頌曰璇穹週廻三朝肇建美哉靈葩爰採爰獻聖容映之永夀於萬木蘭漢書曰孝桓帝元嘉元年芝生後庭木蘭之上神仙傳曰北海于君病癩見市有賣藥公孫帛者因問之公曰木蘭樹下當見卿明日往授素書二卷以消災救病無不愈者郭子横洞㝠記曰乾封三年大秦國獻花蹄牛飼以木蘭之葉使方國貢此葉此牛不甚食食一葉則累月不飢任昉述異記曰木蘭州在潯陽江中多木蘭樹昔呉王闔閭植木蘭於此用構宫殿又曰七里洲中有魯班刻木蘭為舟至今在洲中詩家所云木蘭舟出於此離騷曰鳲鴞集於木蘭兮又曰朝飲木蘭之隊露夕餐秋菊之落英夜合風土記曰夜合葉晨舒而暮合一名合昏甘棠爾雅曰杜甘棠今之杜棃杜赤棠白棠色赤白各異其名毛詩曰甘棠美召伯也蔽芾甘棠勿剪勿伐召伯所茇杖杜曰有杕之杜生于道周杜赤棠也欓宋春秋曰義熙八年太杜欓樹生於壇側欓尚黑也宋水徳忽生此樹櫟爾雅曰櫟其實梂毛詩晨風曰山有苞櫟莊子曰匠石之齊至曲轅見櫟杜樹曰是不材木故若是之夀淮南子曰十二月官獄其樹櫟水經曰若耶溪孤潭上有一櫟樹謝靈運與從弟惠連嘗逰之作連句題刻樹側橡後漢書曰李恂詣洛陽時嵗荒司空張敏司徒魯恭等各遣子饋糧悉無所受徙居新闗下拾橡實以自資橡櫟實也晉書曰虞摯從惠帝幸長安及東軍來迎百官奔散遂流離鄠杜之間轉入南山中糧絶飢甚拾橡實而食之又曰司馬元顯之討桓𤣥于時揚土飢虛運漕不繼江路商旅遂絶於是公私匱乏士卒惟給桴橡説苑曰莒穆公有臣朱厲附事穆公不見識焉冬處於山林食橡栗夏處於洲澤食菱藕穆公難朱厲附將往死之其友曰子事君而不見識焉今君難吾子死之意者其不可乎朱厲附曰始我以為君不吾知也今君死而我不死是果不知我也我將死之以謝天下不知其臣者遂往死淮南子曰高臺層榭接屋連桅非不麗也然而民無窟室闔廬可托於身者明主不樂也肥濃甘脆非不香美也然而民有糟糠橡栗不接於口者則明主不甘也抱朴子曰假榖於夷齊之門告寒於黔婁之家所得者不過橡栗緼褐必無太牢之膳狐裘之衣矣太平御覽卷九百五十八
