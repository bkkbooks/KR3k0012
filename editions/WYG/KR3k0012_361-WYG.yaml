body:
  text: 太平御覽卷三百六十一宋李昉等撰人事部二産産詩曰乃生男子載寢之牀乃生女子載寢之地又生民曰厥初生民時惟姜嫄誕彌厥月先生如達后稷之在其母終人道十月而生生如逹之生言易也不圻不疈無菑無害言易也凡人在母母則病生則圻疈菑害其母横逆人道以赫厥靈上帝不寜不康禋祀居然生子禮記内則曰妻將生子及月辰居側室側室謂夾之室次燕􅃦也夫使人日再問之至於生夫復使人日再問之子生男子設弧於門左女子設帨於門右弧者有事于武者也帨者婦人之佩巾三日始負子男射女否國君世子生告於君接以太牢三日卜士負之射人以桑弧蓬矢六射天地四方左傳隠公元年曰初鄭武公娶于申曰武姜生莊公及共叔叚莊公窹生驚姜氏故名窹生又襄五年曰初宋芮司徒生女子赤而毛棄諸堤下共姬之妾取以入名之曰棄長而羙又昭七年曰叔向娶生申巫臣氏生伯石伯石始生子容之母走謁諸姑子容母叔向嫂伯華妻也曰長叔姒生男姑視之及堂聞其聲而還曰是豺狼之聲也狼子野心非是莫䘮羊舌氏矣遂弗視又昭七年曰公衍公為之生也其母階出出之王日産舍公衍先生公為之母曰相與偕出請相與偕告晉公衍母使待已共白公三日公為生其母先以吾公為為兄公私喜於陽糓而思於魯曰務人為此禍務人公為也始與公若謀逐季氏且後生而為兄其誣也乆矣乃黜之而以公衍為太子家語曰子夏問曰商聞易之生人及萬物鳥獸昆蟲各有竒偶氣分不同而凡人莫知其情惟逹道徳者能原其本焉天一地二人三三三為九九九八十一一主日日數十故人十月而生八九七十二偶以承竒主辰辰為月月主馬故馬十二月而生七九六十三三主斗斗主狗故狗三月而生六九五十四四主時時主豕故豕四月而生五九四十五五為音音主猿故猿五月而生四九三十六六主律律主鹿故鹿六月而生三九二十七七主星星主虎故虎七月而生二九一十八八主風風主蟲故蟲八月而化其餘各從其類矣鳥魚生於隂而屬陽故皆卵生齕吞者八竅而卯生齟嚼者九竅而胎生日生者類父夜生者類母敢問其皆然乎孔子曰然吾聞諸老􅅨亦如子之言也史記楚世家曰吴囬生陸終陸終生六子圻疈而生焉又曰田嬰有子四十餘人其賤妾有子名文以五月生嬰告其母勿舉也其母竊舉生之及長因其兄弟而見其子文於田嬰嬰怒其母曰吾令若去此子而敢生之何也文質頓首曰君所不舉五月子者何故嬰曰五月子者長及户齊將不利其父母文曰人生受命於天乎受命於户耶嬰黙然文曰必受命於天君何憂焉必受命於户則不可髙其户耶漢書曰髙祖七年春令民産子復勿事三歳勿事不使役也又曰盧綰與髙祖同里綰親與髙祖太上皇相愛及生男髙祖綰同日生里中持羊酒賀兩家及髙祖綰壯學書又相愛也又曰武帝征伐四夷重賦於民民産子三歳則出口分至於生子輙殺元帝議令民産子七嵗及出口分東觀漢記曰敬隠宋后以王莾末年生遭世倉卒其母不舉棄之南山下時天寒冬十一月再宿不死外家出過於道南聞有兒啼聲怜之因往就視有飛鳥紆翼覆之沙石滿其口鼻能喘心怪違之以有神靈遂取而持歸養長至年十三歳乃以歸宋氏後漢書曰竇武母産武并産一虵又曰虞延初生上有物若一疋練遂上升天占者以為吉魏志曰黄初六年三月魏郡太守孔羡表黎陽令程放書言掾汝南屈雍妻王以去年十月十二日在草生男兒從右腋生水腹下而出其母自若無他異痛今瘡已愈母子安全無災無害也王隠晉書曰齊王冏輔政太安元年有婦人詣大司馬門寄産吏驅之婦人曰我截齊便去耳言畢不見識者聞而惡之至二年謀反誅又曰程咸字延林魏郡武安人也其母夜夣白頭公授之以藥曰服此當生貴子也生咸好學有才為鍾毓主記毓弟㑹問有可語吏否毓乃稱咸孫盛晉陽秋曰魏舒適主人妻産俄聞車馬之聲問其男女從者入反曰男也年十五年以兵死又問寢者對曰魏公舒于寳晉記曰愍帝建興三年抱罕之人産一龍子色似錦文望之如見神光在牀上少有就視者後魏書曰太祖道武皇帝諱珪獻明皇帝之子也以建國三十四年七月七日生於参合陂北明年有榆生於埋胞之坎遂成林前趙錄曰劉淵字元海父豹母呼延夣服日精十三月而生淵劉聰母曰張夫人十五月生聦焉三十國春秋曰前晉蒲洪父懐歸為部落小師其母婁氏因寤産洪驚悸而窹又曰後涼禿髪鳥孤七世祖壽闐之在孕也母夢一老父被髪在袵乘白馬謂曰爾夫雖西移終當東返至京必生貴男長為人主言終胎動而窹後􅃦生壽闐被中因以秃髪為號壽闐為名後趙書曰黎陽民妻産三男一女勒賜乳母榖綿以為休祥崔鴻南燕錄曰慕容徳皝少子母公孫夫人晉咸康中晝寢生徳左右以告方窹而起既生似鄭莊公曰長必有大徳遂以徳為名宋書曰王敬則母為女巫常謂人云敬則生時胞衣紫色後應得鳴鼔角人笑之曰汝子得為人吹角可矣又曰王鎮惡之産也當五月五日家人欲棄之其祖猛曰昔孟嘗君如是而相齊此兒必興吾族因以鎮惡為名又曰范曄字蔚宗母如厠産之額為塼所傷故以塼為小字北齊書曰武明婁皇后諱昭君性寛厚不妬忌髙祖率衆將討西㓂出師之夜后㝈生患切雙生子也生一男一女左右以危急請追告髙祖后弗聽曰王出統大兵何得以我故輕離大軍唐書曰幽州節度使劉濟怦之長子初母難産既産侍見是一大蛇黒氣勃勃莫不驚走及長頗異常童所居室焚人皆驚救濟從容而出衆異之累歴牧宰及怦為節度濟為行軍司馬怦卒軍人習河朔舊事濟請代父為帥朝廷從之莊子曰厲之夜半生其子也遽取火而視之汲汲然恐其似已也吕氏春秋曰夏侯孔甲佃于東陽萯山大風晦迷入民室主人方乳或曰后來是良日也子必大吉或曰不勝必有殃咎乃取歸曰為余子誰敢殃之子成人幕動析橑音老斧破斬其足遂為守者孔子曰嗚呼有命矣西京雜記曰王鳳五月五日生其父欲勿舉其母曰田文五月五日生父嬰勅其母勿舉母竊舉之後為孟嘗君以古事推之非不祥遂舉之又曰霍將軍妻産二子疑所為兄弟或曰前生為兄後生為弟今雖俱曰亦宜以先生者為兄或曰居上者宜為兄居下者宜為弟居下前生今宜以前生為弟時霍光聞之曰昔殷王祖甲一産二子曰􅅝曰良以卯生􅅝以已生良則以􅅝為兄以良為弟若以後生為兄􅅝亦當為弟矣昔許釐公一産二女曰妖曰茂楚大夫唐勒生二子一男一女男曰貞夫女曰瓊華皆以先生者為長近代鄭昌時文長倩並一生二男􅅬公一生二女季黎一生一男一女並以前生者為長霍氏亦以前生為兄焉𤣥中記曰朱梧縣其民服役依海際居産子以沙石自擁不食米正資魚以為生氣又曰丈夫民殷帝大茂使王英採藥於西王母至此絶糧不能進乃食木實衣以木皮終身無妻産子二人從背脅間出其父則死是為丈夫去玉門二萬里外國圗曰長人國姙六年乃生而白首兒長大則乘雲而不還龍類也崔𤣥山瀨鄉記曰李母祠在老子祠北二里祠門左有碑文曰老子聖母李夫人碑老子者道君也始起乘白鹿下託於李母胞中七十二年産於楚國淮陽苦縣瀨鄉曲仁里老子名耳星精也字伯陽號曰􅅨孔演圖曰孔子母徵在遊大澤之陂睡夣黒帝使請巳巳往夣交語曰汝乳必於空桑之中覺則若感生丘於空桑中廣志曰獠民皆七月生帝系曰陸終娶鬼方國君之妹謂之女嬇生六子孕而不育三年啓其母左脅三人出右脅三人出風俗通曰生三子不舉俗說生子至於三子似六畜言其妨父母故不舉之也謹按春秋國語越王勾踐令民生三子者與之乳母生二子者與之餼三子力不能獨養故與乳母所以人民䌓息卒滅强吴雪會稽之耻行霸於中國者也古陸終氏娶于鬼方謂之女嬇是生六子皆為諸侯今人多生三子子悉成長父母完安豈有天所孕育而害其父母兄弟者哉又曰不舉寤生子俗說兒墮地未能開目視者謂之寤生舉寤生子妨父母謹按春秋左氏傳鄭武公娶于申曰武姜生莊公及共叔段莊公寤生驚姜氏因名寤生武公老終天年姜氏亦然安有妨其父母乎又曰汝南周霸字翁仲為太尉掾婦於乳舍生女自毒無男時屠婦北卧得男因相與私貨易禆錢數萬後翁仲為北海相吏周光能見鬼署光為主簿使還致敬於郡縣因告光曰事訖臘日與小兒俱上冡去家經十二年不躬蒸嘗主簿微察知相先君寜息㑹同飲食忻娱否往到於冢上郎君沃酹主簿俯伏在後但見屠者弊衣蠡結倨神坐持刀割肉有五時衣帶青黒綬數人彷徨隂堂東西廂不敢來前光恠其故還至引見問之乞屏左右起造於膝前白事狀如此翁仲曰主簿出勿言因持劒上堂謂嫗汝何故殺吾子嫗大怒曰卿常言兒聲氣喜學似我老公欲死欲作狂語翁仲曰祀祭如不具服子母立截嫗辭窮情竭泣涕具陳其故時子巳年十八呼與辭決曰凡有子者欲以承先祖先祖不享血食無可奈何自以衣裘僮僕車馬遣迎取其女女嫁為賣䴵子婦後適西平李文思文思官至南陽太守翁仲便養從弟子熈為髙邑令又曰頴川有富室兄弟同居兩婦數月皆懐姙長婦胎傷因閉匿之産期至同到乳母舍弟婦生男夜因盗取之爭訟三年州郡不能决丞相王霸出坐殿前令卒抱兒去兩婦各十歩叱婦曰自往取之長婦抱持甚急兒大啼呌弟婦恐傷害之因乃放與而止甚悽愴長婦甚喜霸曰此弟子也責問乃伏又曰不舉父同月子俗云妨父也按左傳桓公之子與父同月生因名子同漢明帝亦與光武同月生神仙傳曰老子母懐之七十嵗乃生時割其左腋而生生而白首故謂之老子列仙傳曰木羽鉅鹿南祁鄉人貧母王助産嘗探兒兒生開眼視母大笑母乃驚佈仍夣見大冠赤幘者守兒曰此司命君也當報汝使汝子木羽得仙後生兒字木羽所探兒年十五夜有車馬迎之過呼木羽為我御來遂相隨去列異傳曰華子魚為諸生嘗宿人門外主人婦夜生有兩吏來詣其門便相向僻易欲退相謂曰公在此因踟蹰良乆一吏曰籍當定柰何得住乃前向子魚拜相將入出共語曰當與幾嵗一人曰當與三嵗子魚後故往視之兒果年三嵗已死乃自喜曰我固當公後果為太慰續搜神記同益部耆舊傳曰哀牛夷者其先有婦人名沙一居于牢山嘗捕魚於水中觸沉木若有感因懐姙十月産子男十人後沉木化而為龍出水沙一忽聞龍語曰若生我子今悉何在九子見龍驚走獨小子不能走背龍而坐龍就而䑛之其母為語謂背為九謂坐為隆因名小子曰九隆及後長大諸兄共推以為王􅀶物志曰蜀郡諸山夷名曰獠子婦人姙身七月生時必須臨水兒生便置水中浮即養之沉便遂弃也至長皆拔去其上齒後狗牙各一以為身餙論衡曰黄帝二十月而生又曰唐文伯河東蒲坂人也其生亦以夜半時適生有人從門呼其父名父出應之不見人見一木杖植其門側好善異為衆其父杖入門以示人占曰吉文伯位至廣漢太守以杖當得子之力矣譙周法訓曰一産二子者當以後生者為兄言其先胎也答曰此野人之鑿語耳君子不測暗安知胎之先後也傅子曰昔燕趙之間有三男子共娶一女生四子後爭訟廷尉延壽奏云禽獸生子逐母宜以四子還母尸三男子于市世說曰胡廣本姓黄五日生父母惡之乃置之甕投于江胡翁見甕流下聞有小兒啼聲往取因長養之以為子登三司流有中庸之號廣後不治其本親服云我本親巳為死人也世以此為深譏焉捜神記曰陳仲舉微時嘗宿黄申家而申婦方産有叩申門者家人咸不知乆乆方聞屋裏有言賔堂下有人不可進叩門者相告曰今當從後門往其一人便往有頃還留者問之是何等名為何當與幾嵗往者曰男也名為奴當與十五嵗後應以何死答曰應以兵死仲舉告其家曰吾能相此兒當以兵死父母驚之寸刃不使得執也至年十五有置鑿于梁上者其末出奴以為木也自下鈎之鑿從梁下䧟腦而死後仲舉為豫章太守故遣吏往餉之申家并問奴所在其家以此具告仲舉仲舉歎曰此命也異苑曰魏郡徐逮字君及婦平昌孟氏生兒頭有一角一脚頭正仰向通身盡赤落地無聲乘空而去又曰丹陽縣駱慶婦生一男一虎一貍貍虎毛色斑黒牙爪皆備即殺之兒經六日而死母不異又曰沛國武漂之妻林氏元嘉中懐身得病而死俗忌含胎入柩中要須割出妻乳母傷痛之乃撫尸而祝曰若天道有靈無令死被擘裂須臾尸面赩然上色於是呼婢共扶之俄頃兒墮而尸倒也嵩髙山記曰昔陽翟有婦人姙身三十月乃生子從母背上出五歳便入此山學道神明為母立祠因號曰開母祠焉太平御覽卷三百六十一
