front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_956-1a, image: WYG0901/WYG0901-0443c.png}
body:
  text: 太平御覽卷九百五十六宋李昉等撰木部五榆桐楊柳上榆毛詩曰東門之枌疾亂也幽公荒滛男女棄其舊業亟㑹於道路歌舞於市井爾東門之枌枌白榆也宛丘之栩子仲之子婆娑其下又山有樞曰山有樞隰有榆毛詩義疏曰駮馬梓榆也駮犖吕角切遥視似駮馬周禮秋官曰烜氏四時變國火春取榆柳之火禮記内則曰堇荁枌榆免薧􅎵瀡以滑之白枌白榆春秋元命苞曰三月榆莢落春秋運斗樞曰玉衡星散為榆爾雅曰藲荎音毆迭郭璞曰詩云山冇樞今之刺榆無姑其實荑姑榆也生山中葉圓而厚剥皮合漬之其味新香所謂蕪荑也説文曰榆白枌也梗山枌榆有刺莢可以為蕪荑史記曰凡望雲氣平望在桑榆上下餘二千里也漢書曰高祖禱豐枌榆社張晏曰枌榆社在豐東城三十里或曰枌榆鄉名也高祖里社也又天文志曰成帝河平元年旱傷麥民食榆皮又循吏傳曰龔遂為渤海太守勸民務農桑令口種榆一樹魏志曰鄭澤為魏郡太守百姓乏材木乃課種榆為籬後魏書曰太祖道武皇帝諱珪七月七日生三合陂北明年有榆生於埋胎處遂成林又曰桓帝曾中蠱後吐之地乃生榆木趙書曰從幽州大道滹沱造浮橋植行榆五十里置行宫管子曰五沃之土其榆脩長莊子曰鵲上高城之垝而巢於高榆之顛城壊巢折凌風而起故君子之居世也得時則義行失時則鵲起淮南万畢術曰八月榆檽音而令人不飢注曰以美酒漬榆檽曝乾以梁米紫莧實蒸令相合欲不食者三指撮以服之即不飢耳韓詩外傳曰楚莊王將伐晉曰敢諫者死孫叔敖進諫曰臣園中榆榆上有蟬方奮翼悲鳴飲清露不知螳螂之在後曲頸欲食之螳螂方欲食蟬不知黄雀在後舉頭而欲啄之黄雀食螳螂不知童子挾彈在榆下欲彈之童子欲彈黄雀不知在前有深坑後有掘株也楚乃息伐桓譚新論曰劉子駿信方士虛言謂神仙可學余見其庭下大榆樹久而剥折指謂曰彼樹無情然猶朽蠧人雖欲愛養何能使之不衰博物志曰食枌榆則眠不欲覺晉宫闕名曰華林園榆十九株雜五行書曰舍北種榆九株蠶大得廣志曰有姑榆有榔榆榔榆無莢材任車用至善蠶者出渤海東光以供官石虎鄴中記曰襄國鄴路千里之中夾道種榆盛暑之月人行其下鄒子曰春取榆柳之火范子計然曰蕪荑出地赤心者善汜勝之書曰種禾無期因地為時三月榆莢雨至高地强土可種禾崔寔四民月令曰二月榆莢成者收乾以為醬隨節早晚勿失其時夢書曰榆為人君徳至仁也夢採榆葉受賜恩也夢居樹上得貴官也夢其葉滋茂福禄存也古樂府詩曰天上何所有歴歴種白榆應璩與龎惠恭書曰見所上利民之術植濟南之榆栽漢中之漆嵇康養生論曰豆令人腫榆令人暝愚智所知也桐易緯曰桐枝濡毳而又空中難成易傷湏成氣而後華尚書禹貢曰嶧陽孤桐嶧山之陽特生桐中為琴瑟毛詩卷阿曰梧桐生矣於彼高岡又定之方中曰樹之榛栗椅桐梓漆爰伐琴瑟詩義疏曰梓實桐皮曰椅今民云梧桐也有青桐白桐赤桐白桐宜琴瑟今雲南牂牱人績以為布禮記月令曰清明之日桐始華周書曰不始華嵗有大寒禮斗威儀曰君乘火而王其政平梧桐常生爾雅曰櫬梧也今梧桐榮桐木即梧桐後漢書曰蔡邕行泰山見爨桐聞爆聲曰此良木也取而為琴齊書曰豫章王於邸起山列種桐竹號為桐山武帝幸之置酒為樂管子曰五沃之土其木宜桐莊子曰外乎子之神勞乎子之精倚樹而吟據槁梧而瞑神不休於性分之内則外矣精不正於自足之極則勞矣故行則倚樹而吟坐則據梧而瞑言有精者之自困者也又曰鵷鶵發南海而飛北海非梧桐不止非竹實不食又曰空門來風桐乳致巢司馬彪注曰門户空風喜投之桐子似乳著葉而生鳥喜巢之孟子曰今有場師舍其梧檟養其樲棘則為賤場師焉棄大取小吕氏春秋曰成王與唐叔虞燕居剪桐葉以為珪曰以此封汝虞喜以告周公周公請封虞成王曰余與虞戲也周公曰臣聞天子無戲言於是遂封虞叔於晉淮南子曰智有所不足故桐不可以為弩又曰夫以巨斧擊桐薪不待利時良日而後破之加巨斧桐薪之上而無人力之奉雖順招揺挾刑徳招揺斗杓也刑十二辰徳十日也而弗能破者以其無勢也淮南萬畢術曰桐木成雲注取十石瓮甖滿以水置桐其中葢之三四日氣如雲作董仲舒請雨書曰秋以桐魚九枚風俗通曰梧桐生於嶧陽山巖石之上採東南孫枝為琴聲甚清雅遁甲經曰梧桐不生則九州異君梧桐以知日月無閏生十二葉一邉有六葉從下數一葉為一月有閏則十三葉視葉小者則知閏何月也不生則九州各異君天下不同也王逸子曰木有扶桑梧桐松栢皆受氣淳矣異於羣類者也秦記曰初長安謡云鳳凰鳳凰止阿房苻堅遂於阿房植桐數萬株以待之其後慕容冲入阿房城而止焉冲小字鳳凰廣志曰梧桐有白者異國有白桐木其華有白毳取其毳淹漬緝織以為布逰名山志曰吹臺有高桐皆百圍嶧山孤桐方此為劣鄒山記曰鄒山古之嶧山魯穆公改為鄒今鄒山嶧陽猶多桐樹齊地記曰城北十五里有梧桐臺即梧宫也論衡曰李子長為政欲知囚情以梧桐為之象囚形乃鑿地為埳卧木囚其中囚罪若正木囚不動若有寃木囚動出人之精誠著木人也華陽國志曰益州有梧桐木其華采如絲人績以為布名曰華布沈懐逺南越志曰青桐華頗似木綿而輝重過之晉宫闕名曰華林園青白桐三株伏候古今注曰昭帝元鳳三年馮翊人獻桐枝長六尺九枝枝一葉異苑曰晉武帝時呉郡臨平岸崩出一石鼔打之無聲以問張華華云可取蜀中桐材刻作魚形扣之則鳴矣於是如言音聞數十里又曰句章呉平門前忽生一株青桐樹上有謡歌之聲平惡而斫殺平隨軍北征首尾三載死桐歘自還立於故根之上又聞樹顛空中歌曰死樹今更青呉平㝷當歸適聞殺此樹已復有光輝平㝷歸如鬼謡祖台之志怪曰蹇保至檀邱塢上北樓宿暮鼓二中有人著黄練單衣白帢將入持炬火上樓保懼藏壁中湏臾有二婢迎一女子上與白帢人入帳中宿未明白帢人輙先去如是四五宿後向晨白祫人纔去保因入帳中持女子問向去者誰答曰桐郎郎道東廟樹是也至暮鼓二中桐郎來保乃斫取之縛著樓柱明日視之形如人長三丈餘檻送詣丞相渡江未半風浪起桐郎忽投入水風浪乃息齊民要術曰梧桐山石間生者為樂器則鳴瑞應圖曰王者任用賢良則梧桐生於東廂桓譚新論曰神農黄帝削桐為琴任昉述異記曰梧桐園即呉夫差舊園也一名琴川梧園宫在句容縣傳云呉王别館有楸梧成林焉其梧子可食古樂府云呉宫秋呉王愁是也崔琦七蠲曰爰有梧桐生於𤣥谿傅根朽壤托險生危枚乘七發曰龍門之桐高百尺而無枝中鬱結而輪菌根扶疏以分離魏明帝猛虎行曰雙桐生空井枝葉自相加通泉溉其根𤣥雨潤其柯緑葉何蓩蓩青脩視曲阿張協七命曰寒山之桐出自太㝠含黄鐘以吐幹據蒼岑而孤生古詩曰井梧棲靈鳳楊柳上易大過九二枯楊生稊老夫得其女妻焦贛易林豫之晉曰鵲巢柳樹鳩奪其處任力劣薄天命不祜毛詩采薇曰昔我往矣楊柳依依楊柳蒲柳也又曰東門之楊刺時也婚姻失時男女多違親迎女猶有不至者也東門之楊其葉䍧䍧䍧䍧盛貌又南山有臺曰南山有桑北山有楊樂只君子邦家之光又小弁曰菀彼柳斯鳴蜩嘒嘒柳木茂盛則多蟬又曰有菀者柳刺幽王也暴虐無親而刑罰不中有菀者柳不尚息焉有菀然茂盛之柳行路之人豈有不庶幾欲就之止息又東方未明曰折柳樊圃柳柔脆之木樊藩也折以藩圃無益也毛詩䟽義曰楊之水不流束蒲蒲柳之木二種一種皮正青一種皮紅白可為箭簳左傳曰董澤之蒲蒲柳也今人以其為萑可笑矣又曰樹把把柳也生水旁樹如柳葉麤而白木理微赤今人以為車轂今淇水旁縁㟁水邊純把柳也大戴禮曰正月柳荑注荑發葉也爾雅曰檉河柳郭璞曰河旁赤葉水楊也旄澤柳生澤中者楊蒲柳詩云楊柳依依傳曰董澤之蒲漢書曰上林苑中僵柳樹一朝起生枝葉有蟲食其葉為字曰公孫病已立晆孟以為木下民之象當有從民間受命為天子者及昭帝崩無嗣大臣迎立昌邑王王即位滛亂無道霍光廢之更立昭帝兄衛太子之孫為宣帝帝本名病已晉書曰王㳟字孝伯美姿容人多悦之或目之曰濯濯如春月柳又曰嵇康性絶巧尤好鍜宅中有一柳樹甚茂乃激水圜之每夏月居其下以鍜東平吕安服康高致每一相思輙千里命駕又曰太康末京洛為折楊柳之歌其曲始有兵革苦辛之嘆終以禽獲斬截之事是時三楊貴盛而被族誅楊后廢黜幽死宫中折楊柳之應也又桓温傳曰温自江陵北伐行經金城見少為琅邪時所種柳皆已十圍慨然曰木猶如此人何以堪因攀枝執條泫然流涕南史隠逸傳曰陶潛字淵明有高趣宅邉有五柳樹嘗自著五柳先生傳晉書曰陶侃明識過人武昌道上通種楊柳人有竊之植於家侃見識之問何以盜官所種于時以為神沈約宋書曰蕭惠開為少府不得志其齋前産香草蕙開悉剷除别種白楊人謂之曰白楊邱暮間所植柰何於庭院種之答曰人不得志與死人何異其年惠開暴卒齊書曰王敬則初為散軍使魏於北館種楊柳後員外郎虞長曜北使還敬則問我昔種楊樹今大小長短曜曰虜中以為甘棠太平御覽卷九百五十六
