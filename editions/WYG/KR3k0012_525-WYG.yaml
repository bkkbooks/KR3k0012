body:
  text: 太平御覽卷五百二十五宋李昉等撰禮儀部四祭禮中又祭義曰祭不欲數數則煩煩則不敬祭不欲䟽䟽則怠怠則忘是故君子合諸天道春祫秋嘗秋霜露既降君子履之必有悽愴之心非其寒之謂也春雨露既濡君子履之必有怵惕之心如將見之又祭義曰文王之祭也事死者如事生祭之明日明發不寐饗而致之又從而思之祭之日樂與哀半饗之必樂已至必哀又祭義曰郊之祭大報天而主日配以月夏后氏祭其闇殷人祭其陽周人祭日以朝及闇祭日於壇祭月於坎以别幽明以制上下祭日於東祭月於西以别外内以端其位日出於東月生於西隂陽長短終始相廵以致天下之和又祭義曰祭之日入室僾然必有見乎其位周旋出戸肅然必有聞乎其容聲出戸而聽愾然必有聞乎其嘆息之聲又祭義曰孝子將祭慮事不可以不豫比時具物不可以不備虛中以治之比時猶先時也虛中言不兼念别事宮室既脩墻屋既設百官既備夫婦齋戒沐浴奉承而進之洞洞乎屬屬乎如弗勝如將失之其孝敬之心至也與又薦其薦爼序其禮樂備其百官奉承而進之百官助主人祭之於是諭其志意以其恍惚以與神明交庶或饗之孝子之志也又祭統曰凡治人之道莫急于禮禮有五經莫重于祭禮有五經言吉禮凶禮賔禮軍禮嘉禮也莫重于祭以吉禮為首務也夫祭者非物自外至者也自中出生于心者也心怵而奉之以禮是以惟賢者能盡祭之義怵感念親之貌也賢者之祭也必受其福非世所謂福也福者備也備者百順之名也無所不順者之謂備言内盡於己而外順於道也忠臣以事其君孝子以事其親其本一也又祭統曰祭者所以追飬繼孝也孝者畜也順于道不逆於倫是之謂畜畜謂順於德教是故孝子之事親也有三道焉生則養沒則䘮䘮畢則祭養則觀其順也䘮則觀其哀也祭則觀其敬而時也盡此三道者孝子之行也又祭統曰夫祭有十倫焉見事鬼神之道焉見君臣之義焉見父子之倫焉見貴賤之等焉見親疏之殺焉見爵賞之施焉見夫婦之别焉見政事之均焉見長㓜之序焉見上下之際焉此之謂十倫倫尤義也又祭統曰凡祭有四時春祭曰禴夏祭曰禘秋祭曰嘗冬祭曰烝禴禘陽義也嘗烝隂義也禘者陽之盛也嘗者隂之盛也故曰莫重于禘嘗又祭統曰周公旦有勲勞於天下成王康王追念周公而欲尊魯故賜之以重祭外祭則郊社是也内祭則大嘗禘是也言此者王室所銘若周公之功也又表記曰祭極敬不繼之以樂朝極辨不繼之以倦極猶盡也辨分别政事也又表記曰子曰后稷之祀易富也其辭恭其欲儉其禄及子孫禮稽命徵曰天子祭天地宗廟六宗五嶽得其宜則五榖豐雷雨時至四夷貢物清白黄馬黄龍翔黄雀集坤為地得宜則五榖豐美土精上為軒轅雷雨得宜故又應時至也周易豫象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考又云困九五曰利用祭祀祭祀所以受福也象曰利用祭祀受福也又云旣濟九五曰東鄰殺牛不如西鄰之禴祭實受其福牛祭之盛者也禴祭之薄者也居既濟之時而處尊位其所務者徳而已又曰觀盥而不薦有孚顒若王道之可觀者莫盛於宗廟宗廟之可觀者莫盛於盥也至薦則簡畧不足復觀又曰萃亨王假有廟假至也王以聚至有廟也彖曰王假有廟至孝享也左傳桓公曰凡祀啓蟄而郊言凡通祀下二句天地宗廟之事啓蟄夏正建寅之月祀天于郊龍見而雩始殺而嘗閉蟄而烝建亥之月昆蟲閉户萬物皆成可薦者衆故烝祭宗廟又僖公上曰五年晉人執虞公而脩虞祀歸其職貢于王又僖中曰初平王東遷也辛有適伊川辛有周大夫也見被髮而祭于野者曰不及百年此其戎乎其禮先亡矣秋晉秦遷陸渾之戎于伊川又僖下曰夏四月四卜郊不從乃免牲非禮也猶三望亦非禮也禮不卜常祀而卜其牲日牛卜日曰牲牲成而卜郊上怠慢也望郊之細也不郊亦無望可也又僖下曰衛成公夢康叔曰相奪予享相夏后啟之孫也居帝丘享祭祀也公命祀相寗武子曰不可鬼神非其族類不歆其祀祀鄫何事相之不享其于此乆矣非衞之罪也不可以間成王周公之命祀請改祀命又文上曰大事于大廟躋僖公逆祀也僖閔公兄不得為父子甞為臣位應在下今令居閔上故曰逆祀於是夏父弗忌為宗伯宗伯掌宗廟昭穆之禮也尊僖公且明見曰吾見新鬼大故鬼小新鬼僖公既為兄死時年又長也故鬼閔公死時年小弗忌明言其所見也先大後小順也躋聖賢明也言以僖公為聖賢也明順理也君子以為失禮禮無不順祀國之大事也而逆之可謂禮乎子雖齊聖不先父食乆矣故禹不先鯀湯不先契鯀禹父契湯十四世祖文武不先不窋不窋后稷子也宋祖帝乙鄭祖厲王猶上祖也又曰仲尼曰臧文仲不智者三作虛器謂居蔡山節藻梲也縱逆祀聴夏父躋僖公祀爰居三不智也海鳥曰爰居止于魯東門外文仲以為神命國人祀之又昭七年曰鄭子産聘于晉韓宣子曰寡君寢疾今夢黄熊入寢門其何厲鬼也對曰昔堯殛鯀于羽山其神化為黄熊以入于羽淵實為夏郊三代祀之晉為盟主其或未之祀乎韓宣子祀夏郊晉侯有間又曰晉侯問于史趙曰陳其遂亡乎對曰陳顓頊之後也舜重之以明徳至胡公不淫故周賜之姓使祀虞帝臣聞盛徳必百世祀虞之世數未也公羊傳曰曷為或言三卜或言四卜三卜是禮也四卜非禮也三卜何以禮求吉之道三禘甞不卜郊何以卜卜郊非禮也禮天子不卜郊卜郊何以非禮魯郊非禮也以魯郊禮故卜之魯郊何以非禮天子祭天諸侯祭土天子有方望之事注方望謂郊時望祭四方羣神日月星辰風伯雨師五嶽四瀆及餘山川三十六所無所不通諸侯山川有不在其封内者則不祭也注故魯郊非禮曷為或言免牲或言免牛免牲禮也免牛則非禮也免牛何以非禮傷者曰牛三望者何祭望也然則曷祭祭泰山河海曷為祭泰山河海山川有能潤于百里者天子秩而祭之觸石而出膚寸而合不崇朝而徧雨乎天下者惟泰山耳河海潤乎千里榖梁傳曰宫室不設不可以祭祭者薦其時也薦其敬也薦其義也非享味也又僖公曰夏四月不時四卜非禮也免牲者為之緇衣纁裳有司𤣥端奉送至于南郊免牛亦然乃者亡乎人之辭也猶者可以已之辭也國語楚語曰屈到嗜芰有疾召其宗老而屬之到楚卿屈蕩之子也芰蔆也宗老宗臣也屬託也曰祭我必以芰及祥宗老將薦芰屈建命去之建屈到之子子木也宗老曰夫子屬之子木曰不然祭典有之曰國君有牛享大夫有羊饋士有豕犬之奠庶人有魚炙之薦不珍羞異不陳奢侈夫子不以其私欲干國之典遂不用又楚語曰子期祀平王祭以牛爼于王子期平王子結也牛爼致爼于王也王問于觀射父曰祀牲何及對曰祀加于舉舉人君朔望之盛饋也天子舉以太牢祀以㑹太牢羊牛豕也㑹亦太牢舉四方之貢也諸侯舉以特牛祀以太牢卿舉以少牢祀以特牲庶人食采祀以魚上下有序則民不慢王曰其小大如何對曰禘郊不過繭栗烝嘗不過握把王曰何其小也對曰天神以精明臨下民故求備物不求豐大是故先王之祀也以一純二精三牲四時五色六律七事八種九祭十日十二辰以致之純心純一也二精玉帛也三牲牛羊豚也四時春夏秋冬也五色五采服也六律黄鐘太簇姑洗㽔賔夷則無射也七事天地人四時之物也八種八音九祭九州之助祭也十日甲至癸也十二辰子至亥也百姓千品萬官億醜兆民經入畡數以奉之百姓百官受民姓也千品姓有徹品十為千品五物之官陪屬萬為官官官有十醜為億醜天子之田九畡以飬兆民王取經入以食萬官也明德以昭之和聲以聽之以告徧至則無不受休天子禘郊之事必自射其牲王后必自親舂其粢諸侯宗廟之事必自射牛羊擊豕夫人必自舂其盛况其下之人其誰敢不戰兢以事百神春秋繁露曰大雩者何旱祭也難者曰大旱乃雩祭而請雨大水鳴鼓而攻社天地之所為隂陽之所起也或請焉或怒焉何也曰大旱者陽滅隂也陽滅隂者尊厭卑也固其義也雖太甚拜請之而已無敢有加也大水者隂滅陽也隂滅陽者卑勝尊也故鳴鼓而攻之朱絲而脅之可不慎哉又曰古者嵗四祭因四時所生熟而祭先祖父母也春曰祠者以正月始食韭也夏曰禴禴者以四月熟麵餅也秋曰嘗嘗者以七月嘗黍稷也冬曰烝烝者以十月進初稻也論語季氏曰季氏旅於泰山子謂冉有曰女弗能救與旅祭名諸侯祭山川在其封内者今陪臣祭泰山非禮也對曰不能子曰嗚呼曽謂泰山不如林放乎又曰祭如在祭神如神在子曰吾不與祭如不祭孝經云春秋祭祀以時思之鄭𤣥注四時變易物有成熟將欲食之故薦先祖念之若生不忘親也爾雅曰春祭曰祀祀之言食也夏祭曰禴新菜可礿也秋祭曰嘗嘗新榖也冬祭曰烝進品食也祭天曰燔柴既祭積薪燒之祭地曰瘞埋既祭埋藏也祭山曰庪縣庪縣謂懸置之于山川山海經曰懸以告玉是也祭川曰浮沉投祭水中或沉或浮祭星曰布布散祭於地祭風曰磔今俗當大道中磔狗云止風此其象也是類是禡師祭也師出征伐類于上帝禡于所征之地既伯旣禱馬祭也伯祭馬祖也將用馬力以先祭其先祖也禘大祭也五年一祭也繹又祭也祭之明日尋繹復祭周曰繹春秋經曰壬午猶繹商曰肜音同書曰髙宗肜日夏曰復胙未見義所出也五經異義曰夏至天子親祀方澤侍中騎都尉賈逵説曰魯無圜丘方澤之祭者周兼用六代禮樂魯用四代其祭天之禮亦宜損于周故二至之日不祭天地也二至夏至冬至謂不當祭也又曰京易今説臣動養君其義理也必望利下弗養道厥妖國有被髪于野祭者又曰古尚書説非時祭天謂之類言以事類告也肆類于上帝時舜告攝位非常祭又曰古周禮説大宗伯曰凡禮大神享大鬼祭大祇率執事而卜大鬼謂先王也史記曰亳人繆忌奏祠太乙方曰天神貴者太乙太乙佐曰五帝古者天子以春秋祭太乙又曰東南郊太牢具七日為壇開八通之鬼道于是天子令大祝立其祠長安城東南郊常奉祀如忌方其後人上書言古者天子三年一用太牢祀三一天一地一太一天子許之令太祝領祀之于忌太一壇上如其方後人復有上書言古者天子常以春解祠祀黄帝用一梟破鏡孟康曰梟鳥也食母破鏡獸名食父皇帝欲絶其類使百物祠皆用之破鏡如貙而虎眼漢使東郡五月五日送梟作梟羮以賜百官以惡鳥故食之冥羊用羊祠馬行用一青牡馬太乙澤山君地長用牛武夷君用乾魚隂陽使者以一牛令祠官領之而祀於忌太一漢書曰髙祖沛公祀黄帝祭蚩尤于沛庭而釁鼓旗幟皆赤又曰髙祖微時聞魏公子賢及即位每過大梁常祀公子髙祖十二年從擊黥布還為公子置守冢嵗四時奉祀公子矣又張子房從髙帝過濟北果得榖城山下黄石取而葆祠之及留侯死并𦵏黄石冢伏臘祠又郊祀志曰文帝下詔曰有異物之神見于成紀無害於民嵗以有年朕親郊祀上帝諸神百官以無諱于朕旁有司禮官曰古者天子夏親祠上帝于郊于是天子如幸雍郊見五帝以夏四月答禮焉又曰宣帝八月飲酎行祠孝昭廟先驅旄頭劍挺墮墜首插泥中刃向乘輿車馬驚公孫賀筮之有兵謀不吉卜還使有司侍祠是時霍氏外孫代郡太守任宣坐謀反誅宣子章為公車丞亡在渭城界中夜入廟居郎間執㦸立廟門待上至欲為逆發覺伏誅故事帝夜入廟其後待明而入自此始也又曰孔光父覇為闗内侯覇上書求奉孔子祭祀元帝下詔曰其令師褒成君闗内侯覇以所食邑户八百祀孔子焉又曰初朱邑且死屬其子曰我故為桐鄉嗇夫其吏民愛我𦵏必桐鄉後世子孫奉尚我不如桐鄉民及死其子𦵏之桐鄉西郭外民果共立祠嵗時祀祭至今不絶太平御覽卷五百二十五
