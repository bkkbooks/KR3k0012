  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_333-1a, image: WYG0896/WYG0896-0010a.png}
body:
  text: 太平御覽卷三百三十三宋李昉等撰兵部六十四屯田戍役屯田漢書曰昭帝始元二年詔發習戰射士詣朔方調故吏將屯田張掖郡調謂發選之也故吏前為官職者也今其郡習戰射士於張掖為屯田也調音徒料切將音子亮切朔方張掖並今郡地也又曰孝宣神爵元年遣後將軍趙充國將兵擊先零羗充國以撃虜殄滅為期乃欲罷騎兵屯田以待其弊奏曰臣所將吏士馬牛食月用糧榖十九萬九千六百三十斛鹽千六百九十三斛茭藁二十五萬二百八十六石石百二十觔也難久不解徭役不息又恐他夷卒有不虞之變且羗虜易以計破難用兵猝且没切言倉卒暴疾也故臣愚以為擊之不便計及公田人所未墾可二千頃已上願罷騎兵留㢮刑應募及淮揚汝南步兵與吏私從者合凡萬二百八十二人用榖月二萬七千三百六十三斛分屯要害處氷觧漕下繕鄉亭漕下以水運木而下也繕補也理湟陿以西湟音王陿音陜道橋七十所令可至鮮水左右田事出賦人二十畆田事出謂至春人田營田也賦班與之也至四月草生發郡騎及屬國胡騎伉健各千倅馬什二就草倅副也七碎切什二者千騎則與副馬二百疋為田遊兵以充入金城郡益積畜省大費令大司農所轉榖至者足支萬人一嵗食謹上田處及噐用簿唯陛下裁計之詔曰如將軍之計充國又奏曰今留步士萬人屯田地勢平易臣為以屯田内有亡費之利外有守禦之備騎兵雖罷虜見萬人留田為必擒之具其土崩歸徳宜不久矣詔罷兵獨充國留屯田大獲地利明年遂破先零也魏志曰武帝既破黃巾欲經畧四方而苦軍食不足羽林監潁川棗祗建置屯田於是以任峻為典農中郎將募百姓屯田於許下今潁川郡許昌縣也得榖百萬斛郡國列置官田數年之中所在積粟倉廪皆滿又曰廢帝齊王正始四年司馬宣王督諸軍伐吳因欲廣田積榖為兼并之計乃使鄧艾行陳項以東至壽春自今淮陽郡項城縣以東至今壽春郡也艾以為田良水少不足以盡地利宜開河渠可以大積軍糧又通運漕之道乃著濟河論以喻其指又以為昔破黃巾因為屯田積榖計都以制四方今三隅已定事在淮南每大軍征舉運兵過半功費巨億以為大役陳蔡之間上下田良可省許昌左右之稻田并水東下令淮北三萬人淮南三萬人分水且田且守小豐常收三倍於西計除衆費嵗完五百萬斛以為軍資六七年間可積三千萬斛於淮上此則十萬之衆五年食也以此乗敵無不克矣宣王善之皆如艾計遂北臨淮水自鍾離西南𢎞石以西盡泚水泚旁貼切四百餘里至一營營六十人且田且守兼修廣淮陽百咫二渠上引流下通淮潁大理諸陂於潁南潁北川渠三百餘里溉田二萬頃淮南淮北皆相連接自壽春到京師農官兵田雞犬之聲阡陌相屬每東南有事大軍出征杭舟而下逹於江淮資食有儲而無水害艾所建也晉書曰羊祐為征南大將軍鎮襄陽吳西城去襄陽七百里每為邊害羊君患之以意詭計令吳罷守於是戍邏减半分以墾田八百餘頃不乏其利祐之始至也軍無百日之糧及至季年有十年之積太康元年平吳之後當陽侯杜元凱在荆州今襄陽郡修召信臣遺迹召信臣所作鉏廬陂六門堰在今南陽郡虢縣界時為荆州所統也激用滍淯淯音育諸水以浸原田萬頃分疆刋石使有定分公私同之衆庶賴之號曰杜父舊水道淮沔漢逹江陵千八百里北無通路又巴丘湖沅湘之㑹表裏山川實為險固荆蠻之所恃也當陽侯乃開楊口起夏水逹巴陵千餘里夏水口在今江陵郡江陵縣界巴陵即今郡也内㵼長江之險外通零桂之漕零陵桂陽並今郡地南土歌之曰後代無叛由杜翁孰識知名與勇功又曰凉武昭王暠擊玉門以西諸城下之遂屯玊門陽關廣田積榖為東伐之資又曰東晉元帝督課農功二千石長吏以入榖多少為殿最其宿衛要任皆令赴農使軍各自佃即以為廪太興中三吳大飢後軍將軍應詹上表曰魏武帝用棗祗韓浩之議廣建屯田又於征伐之中分帶甲之士隨宜開墾故下不甚勞大功克舉間者流人奔東吳東吳今儉皆已返江西良田曠廢未久火耕水耨為功差易宜簡流人興復農官功勞報賞皆如魏氏故事一年中興百姓二年分稅三年計賦稅以使之公私兼濟則倉庾盈億可計日而行也又曰穆帝升平初荀羡為北部都尉鎮下邳今臨淮郡縣也起田於東陽之石鼈亦作臨淮郡界也公私利之齊書曰髙帝勑相崇祖修理芍陂田曰卿但努力營田自然平殄虜冦昔魏置典農而中都足食晉開汝潁而河汴委儲卿其勉之後魏書曰文帝大統十一年大旱十二年秘書丞李彪上表請别立農官取州郡户十分之一為屯人相水陸之宜料頃畆之數以贓贖雜物市牛科給令其肆力一夫之田嵗貢六十斛甄其正課并征戍雜役行此二事數年之中則榖積而人足矣帝覽而善之尋施行焉自此公私豐贍雖有水旱不為害也北史曰後魏刁雍除薄骨律鎮將雍以西土乏雨表求鑿渠溉公私田又奉詔以髙平安定統萬及薄骨律等四鎮出車牛五千乗運屯榖五十萬斛付沃野以供軍糧道多深沙車牛難阻河水之次造船水運又以所綰邊表常懼不虞造儲榖置兵備守詔皆從之詔即名此城為刁公城以旌功焉北齊書曰廢帝乾明中尚書左丞蘇珎芝又議修石鼈等屯嵗収數十萬石自是淮南防糧足又曰孝昭帝皇建中平州刺史􅄞曄建議開幽州督亢舊陂今范陽郡范陽縣界是長城左右營屯田嵗收稻粟數十萬石北境得以周贍又於河内置懐等屯以給河南之費自是稍止轉輸之勞又曰武成帝河清三年詔縁邊城守堪墾食者營屯田置都子使以統之子使當田五千頃嵗終課其所入褒貶隋書曰文帝開皇三年突厥犯塞吐谷渾冦邊轉輸勞弊乃命朔方總管趙仲卿於長城以北大興屯田隋書曰郭衍授朔州總管所部有恒安鎮北接畨境常勞轉運衍乃選沃饒地置屯田嵗剰粟萬餘石民免轉輸之勞唐書曰竇靜歴并州大總管司馬遷長史於時突厥數為邊患師旅嵗興軍糧不屬靜上表請於太原多置屯田以省餽運時議者以人物凋零不宜動衆書奏不省靜復上書辭甚切於是徴靜入朝與裴寂蕭瑀封徳彛等爭論於殿庭寂等不能屈竟從靜議嵗收數十萬斛髙祖善之又曰開元二十五年令諸屯𨽻司農等者每三十頃以下二十頃以上為一屯𨽻州鎮諸軍者每五十頃為一屯其屯應置者皆從尚書省處分其田屯重置者一依丞前封疆為定新置者並取荒閒無籍廣占之地其屯雖科五十頃易田之處各依卿原量事加數其屯官取勲官五品以上及武散官并前資邊州縣府鎮戍八品以上文武官内簡堪者充據所收斛斗等級為功罪諸屯田應用牛之處山原川澤土有硬軟至於耕墾用力不同土軟處每一頃五十畆配牛一頭彊硬處一頃二十畆配牛一頭即當屯之内有硬有軟亦准此法其稻田每八十畆配牛一頭諸營田若五十頃外更有地剰配得丁牛者所收斛皆准頃畆折除其大麥蕎麥乾蘿蔔等准粟計折斛斗以定等級天寶八年天下屯田百九十一萬三千九百六十石關内五十六萬三千八百十一石河北四十萬三千二百八十石河東二十四萬五千八百八十石河西二十六萬八千八百石隴西十四萬九百二石後上元中於楚州右射陽湖置洪澤屯壽州置芍陂屯厥田沃壤大獲其利王元長䇿秀才文曰今農戰不修文儒是競棄本徇末厥弊滋多戍役詩曰采薇遣戍役也文王之時西有昆夷之患北有獫狁之難以天子之命命將卒遣戍役以守衛中國故歌采薇以遣之又曰揚之水刺平王也不撫其民而逺屯戍於母家周人怨思焉左傳曰齊侯使連稱管至父戍葵丘𤓰時而往曰及𤓰而代期戍公問不至請代不許故謀作亂漢書曰晁錯上言守邊備塞勸農力本當世急務也臣聞秦北攻胡貊築塞河上南攻楊粤置卒戍焉非所以衛邊地而救民死也貪戾而欲廣地故功未立而天下亂夫起兵不知其勢戰則為人禽屯則卒積死夫胡貉之地積除之處也木皮三寸氷厚六尺食肉飲酪其人密理鳥獸毳毛密理謂肥肉也其性能寒楊粤音越之地少隂多陽其人疏理鳥獸稀毛其性能暑秦之戍卒不能水土戍者死於邊輸者僨於道秦民見行如往棄市因以讁發之名曰讁戍也凡民守戰至死而不降北者以計為之也戰勝守固則有拜爵之賞攻城屠邑則得其財鹵以富家室故能使其衆蒙矢石赴湯火視死如歸秦之發卒也有萬死之害無銖兩之報故其禍及己陳勝行戍至於大澤為天下先倡天下從之如流水胡人衣食之業不著於地如飛鳥走獸於廣壄美草甘水則止草盡水竭則移往來轉徙時至時去此胡人之業然合卒守塞一嵗而更不知胡人之能不如選常居者家室田作以為備為之髙城深塹具藺石布渠答藺石城上雷石也渠答鐵蒺藜也調立城邑每下千家為中周虎落虎落外蕃也上從其言募徙塞下又曰錯復言臣聞古之徙逺方以實廣虛也相其隂陽之利嘗其水泉之味審其土地之宜觀其草木之饒然後營邑立城制里割宅通田作之道正阡陌之界先為築室家有一堂二内二内内房也置噐物焉此民所以輕去故鄉而勸之新邑為置醫藥巫以救疾病以修祭祀男女有婚生死相恤此所以使民樂其處而有長居之心也又曰宣帝地節三年詔曰朕既不徳不能附逺是以邊境屯戍未息今復飾兵重屯久勞百姓非所以綏天下也其罷車騎將軍右將軍屯兵後漢書曰横野大將軍王常薨遣驃騎大將軍杜茂將衆兵屯北邊築亭候修烽燧又曰十五年徙鴈門代郡上谷三郡人置常山關以東又曰二十五年南單于遣子入侍於是雲中五原八郡人歸本土邊人在中國皆賜以裝錢轉輸給食也太平御覽卷三百三十三
