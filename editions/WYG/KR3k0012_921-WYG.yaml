body:
  text: 太平御覽卷九百二十一宋李昉等撰羽族部八鵲山鵲鳩鷃鶡鴠鵲禮記月令曰季冬月鵲始巢詩曰鵲巢夫人之德也國君積行累功以致爵位夫人起家而居有之又曰鵲之疆疆鶉之奔奔又曰防有鵲巢卭有旨苕誰舟予羙心焉忉忉爾雅曰鵲鵙醜其飛也翪郭璞注曰醜婁也翪羽竦上下切易通卦騐曰鵲者陽烏先物而動先事而應見於未風之象令失節不巢漢書曰梅福傳云今陛下既不納天下之言又加戮焉夫鳶鵲遭害則仁鳥增逝魏志曰管輅至安德令劉長仁家有鳴鵲飛來閣上其聲甚急輅曰鵲言東北一婦昨殺其夫牽引西家侯不過日在虞淵之際告者至矣到時果有東比同伍民來告隣婦手殺其夫詐言西家人與夫有嫌殺我婿也吳志曰烏赤十二年有兩烏衘鵲堕東觀權使領丞相朱據燎鵲以祭又曰孫和為南陽王之長沙行過蕪湖有鵲巢于帆檣官僚皆憂􅃤以為墻木傾危之象晉書曰王澄為荆州将之鎮送者傾朝澄見樹上鵲巢便脫衣上樹探鷇而弄之神氣蕭然旁若無人又曰梁州李歆時通街大樹上有烏鵲爭巢為烏所殺宋書曰徐羡之拜司空有䨇鵲於太極殿東鴟尾鳴喚後魏書曰李崇為揚州刺史時有泉水湧於八公山頂壽春城中有魚無數從地湧出野鴨羣飛入城與鵲爭巢北齊書曰武衛奚永洛與河内人張子信對坐有鵲鳴于庭樹鬭而墮焉子信曰鵲言不善向夕若有風從西南來歴樹拂堂角則有口舌事今夜有喚必不得往子信去後果有風來至夜髙儼使召永洛且云勅喚永洛欲赴其妻苦留稱墮馬腰折遂免于難又曰李元貞字元操信州刺史希禮之子也嘗詠鵲其佳句云東立朝兩君南飛夜月明為時所賞隋書曰郭雋字𢎞文太原人家門雍睦七葉共居犬豕同乳烏鵲通巢時人以為義感州縣上其事上遣平昌公宇文弼詣其家勞問之持書御史或廵省河北特表其門閭又曰翟普林父母俱終哀毁殆將滅性廬于墓側有二鵲巢其前樹每入其廬馴狎無所驚懼唐書曰髙祖圍堯君素於蒲州粮盡人相食有烏鵲巢其發石車之上人心遂離為李楚客斬首傳之京師又曰大厯八年夏四月乾陵上仙觀三尊殿有雙鵲銜柴及泥補葺殿之隙􅅛凡一十五處宰臣等上賀曰臣聞孝至於天則祥發陵邑德被於物則化及鳥獸伏惟陛下固心廣教宏道極和時殷霜露之㤙流行雲雨之澤故前聖乘裕歆於明誠皇天報貺鍚以加應來鵲感可翔可窺跡此人謀事歸神化望宜示中外編諸史册又曰貞元四年中書省梧樹上有鵲以泥為巢又曰竇申宰相叅之族子叅特愛申每議除授多詣于申或泄之以招權受賂每所至人謂之喜鵲又曰開成二年三月貞興門外鵲巢於古冡莊子曰至德之世烏鵲之巢攀援而窺之又曰鵲上髙城之絶而巢於髙樹之顛城壊巢折凌風而起故君子之居世也得時則蟻行失時則鵲起也又曰莊周逰乎雕陵之樊樊藩也逰于粟園之内覩一異鵲自南方來􅢅廣七尺目大運寸可廻一寸感周之顙而集於栗林孫卿子曰古之王者其政好生惡殺烏鵲之巢可俯而窺淮南子曰鵲知風之所起又曰乾鵲知來而不知往此修短之分也乾鵲鵲也見人有吉事之徵則修修然㓙事之徵則鳴啼而知來歲多風則巢於下枝而童子乃採其卵而不知各有所能故曰長短之分也又曰鴈北向鵲始加巢又曰赤肉懸則鳥鵲集鷹隼鷙則衆鳥散物之散交感以然淮南萬畢術曰鵲腦令人相思取鵲一雄一雌頭中腦燒之于道中以與人酒中飲則相思也穆天子傳曰西母還歸世民謡嚘以吟曰徂彼西土爰居于野豹虎為羣於鵲與處嘉命不還惟我惟女東方朔别傳曰孝武皇帝時閒居無事燕坐未央前殿天新雨止當此時方朔執㦸在殿堦旁屈指獨語上從殿上見朔呼問之生獨所語者何也朔對曰殿後栢樹上有鵲立枯枝上東向而鳴也帝使視之果然問朔何以知之對曰以人事言之風從東方來鵲尾長傍風則傾背風則蹶必當順風而立是以知之西京襍記曰樊将軍噲問陸賈曰自古人君皆云有瑞應豈有是乎賈曰有之乾鵲噪而行人至蜘蛛集而百事喜况人君處重位乎五行傳曰昭帝元鳳中有烏鵲鬭於燕王池上烏墮地烏君象後燕王誅死說文曰鵲知太歲之所在塩鐵論曰中國所鮮外國賤之崑山之旁以玉璞扺烏鵲魏太祖詩曰月明星稀烏鵲南飛繞樹三匝何枝可依􅀶物志曰鵲巢開口背太歲此非才知任自然也崔豹古今注曰鵲一名神女王子拾遺録曰員嶠之山名環丘上有方湖千里多大鵲髙一丈羣飛于湖際衘不周之粟於環丘之上郭子横洞冥記曰帝解鳴鴻之刀以賜東方朔刀長三尺朔曰此採首陽之金鑄為刀雄者以飛雌者獨在金出九陽清溪有鵲衘火於清溪之上廣異記曰南方赤帝女學道得仙居髙陽崿山桑樹上正月一日䘖柴作巢至十五日成或作白鵲或作女人赤帝見之悲慟誘之不得以火焚之女即升天因名帝女桑今人至十五日焚鵲巢作灰汁浴蠶子招絲象此也五行書曰燒鵲至酒中令家無盜賊山雀爾雅曰鷽山鵲郭璞注曰似鵲而有文采長尾觜脚皆赤說文曰鳶山鵲知來事也捜神記曰常山張顥為梁相天新雨後有烏如山鵲稍下墮地民爭取即化為一員石椎破之得一金印文曰忠孝侯印顥以聞藏之秘府顥後官至太尉鳩左傳曰郯子云少皡時祝鳩氏司徒者也鶻鳩氏司事者也五鳩鳩民者也杜預注曰祝鳩鵠也鵻鳩孝故為司徒主教民鶻鳩春來冬去故為司事治民欲聚故以鳩為民也禮記月令曰仲春之月鷹化為鳩又曰季春之月鳴鳩拂其羽鄭𤣥云鳲鳩飛旦翼相擊趨農急也詩曰翩翩者鵻陸疏曰鵻其今小鳩也一名䳕鳩幽州人或謂鷱􅟇梁宋之間謂之鵻揚州人亦然又曰宛彼鳴鳩今小鳩也月令鳴鳩拂其羽是也爾雅曰佳其鳺鴀鶌鳩鶻鵃鴡鳩王鴡郭璞注曰鳺鴀今䳕鳩鶌鳩似山鵲短尾青黒色多聲江東亦名曰鶻鵃鴡鳩鵰類江東呼曰鶚好在江渚山邊食魚毛詩傳曰鳥鷙而有别孫炎曰鶻鳩一名鳴鳩舍人曰鶌鳩今之班鳩也周書時訓曰糓雨之日又五日鳴鳩拂其羽鳴鳩不拂其羽國不治兵後漢書曰楊由從人飲勅諸生酒三行嚴車去請其故由曰向社中木上有鳩鳥鬬此兵之象由去後舎中有鬭者果殺二人也魏志曰管輅至郭恩家有飛鳩來在梁頭上鳴輅曰當有老公從東方來候肫一頭酒一壺主人雖喜當有小故明日果有客如其占而射雞作食前從樹間激中數歲女子流血驚怖梁書曰庾子與父域為巴州守卒于郡子與奉喪還鄉初發蜀有雙鳩巢舟中及至又栖廬側每聞哭泣之聲必飛翔簷上悲鳴激切隋書曰李德饒性至孝父􅃦疾輙終日不食丁憂水漿不入口五日後甘露降其庭樹有鳩巢其廬孔叢子曰邯鄲人正旦獻鳩于趙簡子厚賞之而放其鳩客曰正旦放鳩厚恩也得賞競捕之不如勿賞簡子曰善捜神記曰長安有張氏者獨處空室有鳩自外入止於牀張氏惡之披懐而祝之曰鳩今來為我禍耶飛上承塵為我福耶來入我懐以手探之則不知所在而得一金帯鉤焉遂寳之自是之後子孫昌盛有為必福貲財萬倍蜀客至長安聞之乃厚賂婢婢竊鉤以與蜀客張氏既失鉤漸漸衰耗而蜀客亦数罹窮厄不為己利或告之曰天命也不可以力求於是賫鉤以反張氏張氏復昌故關西稱張氏傳鈎云說苑曰梟逢鳩鳩曰子安之梟曰我将東徙鳩曰何也梟曰鄉人惡吾鳴鳩曰子改鳴則可如不能改鳴東徙猶惡子之聲也廣雅曰良臯鳩也骨鵃斑鳩也役鳩蔡鳩良皋浮鳩􅀈琴撡曰舜耕歴山思慕父母見鳩與母俱飛鳴相哺食益以感思乃作歌地理志曰榮陽有厄井漢王避項羽于中有雙鳩集飛井上羽以為無人故沛公得免因以為名故漢世正旦放鳩為此故也焦贛易林無妄之明夷曰千䲵黄鳩與鷂為仇或勢不敵雖衆無益益部耆舊傳曰廣漢景毅益州太守鳩果於所事雛卵育阮籍鳩賦序曰嘉平中得兩鳩子常食以黍稷後卒為狗所殺故為作賦傅咸斑鳩賦序曰庭楸蔚然成林閒居無為有時遊之顧見斑鳩音聲可恱於是捕而畜之既而馴擾偶出之籠無何失之其後時一來飛翔殆如有戀故聊賦之孫氏瑞應圖曰白鳩成湯時來王者飬耆老尊道德不失舊則至一本曰成王時來摯虞愧賦曰春栖教農童鳩崔豹古今注曰平帝元始三年濟南鳩生白子吳録曰赤烏十二年八月白鳩見章安魏畧曰文帝欲授禪郡國奏白鳩十九見張升鳩頌序曰陳留郡有白鳩出于郡界太守命門下賦曹吏張升作白鳩賦曰厥名梟鳩貎甚雍容丹青緑目耳象重重㑹稽典録曰皮延字叔然㑹稽山隂人飬母至孝居䘮有白鳩巢廬側遂以終䘮又曰鄭宏遷臨淮太守郡民徐憲在䘮致哀白鳩巢廬側宏舉為孝廉朝廷稱為白鳩郎晉書曰太始八年白鳩二集太廟南門左九嬪白鳩賦序鳩巢於廟闕而孕白鳩一雙毛色甚鮮金行之應也廣州先賢傳曰頓琦字孝異蒼梧人至孝母䘮琦獨身立墳歴年乃成居䘮踰制感物通霛白鳩栖廬側見人輙去見琦而留捜神記曰沛國戴文諶居陽城山有神降焉其妻疑是妖魅神已知之便去遂化作一五色鳥白鳩數十隻從有雲覆之遂不見南史曰姚察丁後母杜氏䘮解職在服制之中有白鳩巢于戸上方言曰䳕鳩自關而東周鄭之郊韓魏之都謂之􅟇鷱其􅝣鳩謂之鸊鷱自關而西秦漢之間謂之鵴鳩其大者謂之頒鳩小者謂之􅝣鳩或謂之䳫鳩或謂之䳕鳩或謂之鶻鳩梁宋之間謂之鷦􅟾傳曰鳴鳩氏司徒者也毛詩義䟽曰今雲南鳥大如鳩而黄啼鳴相呼不同集謂金烏或云黄當為鳩聲轉故名移也又云鳴鳩一名爽鳩又云是鸇周禮夏官羅氏職曰中春羅鳥獻鳩以飬老因行羽物鄭𤣥曰春鷹為鳩與春鳥變舊為新宜以飬老助生氣也爾雅曰鳴鳩鴶鵴郭璞注曰今之布谷江東呼穫谷呼戴勝或云鸇謝氏曰布谷類也續漢書禮儀志曰仲秋之月縣道皆案户比民年始七十者授之玉杖餔之以糜粥八十九十禮有加賜玉杖長九尺端以鳩為飾鳩者不噎之鳥也欲老人不噎所以愛民也淮南子曰孟夏之月以熟榖禾雄鳩長鳴為帝侯歲雄鳩盖布榖也魏書曰烏丸俗耕種常以布榖為候風俗通曰俗說髙祖與項羽戰敗于京索遁薄中羽追求之旹鳩正鳴其上追者以為鳥在無人遂得脫後及即位異此鳥故作鳩杖以賜老者案少皥五鳩鳩者聚民也周禮羅氏獻飬老漢無羅氏故作鳩杖以扶老楚辭曰進雄鳩之耿耿兮耿耿小節貌讒紛紛而蔽之言已欲如雄鳩進其耿耿小節之誠讒人尚復分隔蔽而障之又曰鳴鳩栖於桑榆言鳴鳩於桑榆之上鼔翼而鳴得其所也馮敬通於任武達書曰媍口而不榖孫卿子曰南方有鳥焉名曰蒙鳩以羽為巢而編之以􅄠繫之葦苕風至苕折子死卵破巢非不完也而繫者傾焉南方草物状曰畨鳩生海邉土穴中里民常以臈月正月捕食味如蟹待過十餘日不可復食合浦交趾九真有之鷃左傳曰郯子云少皥氏以鳥名官青鳥氏司啓者也杜預注云青鳥鷃也立春鳴立冬去爾雅曰老􅟾鴳鴳同鷃說文曰鷃鳲也從鳥聲春秋考異郵曰水滅火故䖟螫鷃宋均注曰鷃柔良之鳥鷃為水也春秋運斗樞曰機星散為鷃得義少殘百家則鷃無頭易通卦騐曰立春雨鶬鷃鳴鄭𤣥云鷃蒼状也廣志曰鷃常晨鳴如雞道路賈車以為行節出西方莊子曰窮􅄠之北有鳥焉其名鵬翼若垂天之雲摶扶揺羊角而上者九萬里斥鷃笑之曰我騰躍上不過數仭下翔蓬蒿之間此亦飛之至也而彼且奚適又曰載鼷以車馬樂鷃以鐘皷呂氏春秋曰亂國之妖有雉鷃國語曰晉平公射鷃使豎襄摶之失公怒将殺之叔向聞之夕公告叔向曰君必殺之昔吾先君唐叔射兕於徒林殪以為大甲以封于晉今君射鷃鷃不死摶而不得是揚君耻也勿令遠聞公忸怩顔乃趣赦之賈逵觧曰徒林園中池也言唐叔有才藝封于晉車陵别傳曰鷃雀不能乘激風以飛鶡鴠方言曰周魏宋楚之間謂䳚鴠或謂之獨舂自關而東謂之城旦或謂之倒懸或謂之鶡旦自關而西秦隴之内謂之鶡鴠廣志曰侃旦冬毛希夏毛盛禮記月令曰仲冬之月鶡鴠不鳴易通卦騐曰冬至鶡鴠不鳴又曰詩云相彼盍旦尚猶患之說文曰鴠可旦也塩鐵論曰大夫曰鶡鴠夜鳴旡益于明周書旹訓曰大雪之日鶡鴠不鳴鶡鴠猶鳴國多訛言太平御覽卷九百二十一
