body:
  text: 太平御覽卷九百九十五宋李昉等撰百卉部二麻葛藤女蘿莵􅆶烏杷羊齒牛蘈狗毒馬帚羊桃羊蹄䑕耳䑕尾芄蘭麻爾雅曰黂符云切枲實禮記曰苴麻之有黂枲麻别二名也莩麻母苴麻盛子者廣雅曰黂麻也毛詩丘中有麻曰丘中有麻彼留子嗟又齊風南山曰藝麻如之何横從其畆又東門之池曰東門之池可以漚麻又東門之枌曰不績其麻市也婆娑續麻者婦人之事也不績疾其今不為也禮記内則曰女子十年不出母教婉娩聽從婉謂言語也娩之言媚也皆謂容貌也執麻枲治絲蠒春秋說題辭曰麻之為言㣲也隂精􅆍宻女作纎㣲也麻生於夏夏衣物成禮儀故麻可以為衣陽成於三物以變化故三變縷布成也宋君注曰麻須隂以成夏枝葉成謂之衣亦夏生可作衣也三變謂麻生成形一變也漚取皮二變也績成為縷三變也華嶠後漢書曰崔寔為五原太守地宜麻枲而民不知種植又不能績織率无衣被冬月止種細草卧其中吏以草衣其身乃得出寔至教之績織晉中興書曰石勒昔居與李陽相近陽性剛愎每歲與争漚麻池共相打撲沈約宋書曰孝武帝大明中壊上所居陰室於其處起玉燭殿與羣臣觀之床頭有土鄣壁上挂葛燈籠麻繩拂之侍中袁顗盛稱上儉素之徳故能光有天下莊子曰顔囘曰願得郭内之田十畆以為絲麻不仕也淮南子汾水濛濁而宜麻列女傳曰河內二義者張伯仁仲仁之妻也兄弟少孤共居伯仁敦厚謙苦仲仁驕戾不節二婦紡績得好枲􅏘輙别異之以為仲仁衣服越絶書曰􅏘林山勾踐欲伐吴種􅏘以為弓絃也漢武內傳曰鸚鵡食􅏘晉令曰其上黨及平陽輸上􅏘二十二斤下􅏘三十六斤當絹一疋課應田者枲􅏘加半畆崔實四民月令曰二月三月可種苴􅏘二月可糶􅏘子本草經曰􅏘蕡一名􅏘勃味平生川谷治七傷利五臟下血氣多食令人見鬼狂走乆服輕身通神明􅏘子補中益氣乆服肥徤不老生太山吴氏本草經曰􅏘子中仁神農岐伯辛雷公扁鵲無毒不欲牡厲白薇先藏地中者食殺人麻藍一名麻蕡一名青葛神農辛岐伯有毒雷公甘畏牡厲白薇葉上有毒食之殺人麻勃一名花勃雷公辛無毒畏牡厲風俗通曰􅅫生􅏘中不扶自直葛爾雅曰㧞籠葛也似葛蔓生有節江東呼為蘢尾亦謂之虎葛細葉赤莖廣雅曰女青烏葛也毛詩周南葛覃曰葛之覃兮施于中谷維葉萋萋毛曰覃延也葛所以為絺綌毛詩葛藟曰綿綿葛藟在河之滸葛也藟也生於河之涯得其潤澤以長大而不絶又採葛曰採葛懼讒也彼採葛兮一日不見如三月兮葛所以為絺綌也事雖小日不見於君憂惧於䜛矣又唐風葛生曰葛生蒙楚蘝蔓于野周書曰葛小人得其葉以為羮君子得其材以為絺綌以為君子朝廷夏服吴越春秋曰採葛之婦人傷越王用心之苦也作苦何之歌其辭曰葛不連蔓葉台台嘗膽不苦味若飴令我採葛以作絲女工織兮不敢遲說文曰葛絺綌草也本草經曰葛根一名鷄齊根味甘平生川谷治消渴身大熱嘔吐諸痺起隂氣觧毒生汶山吴氏本草曰葛根神農甘生太山說苑曰綿綿之葛在於曠野良工得之以為絺綌良工不得枯死於野楚辭曰石磊磊兮葛蔓蔓怨公子兮悵忘歸君思我兮不得閒藤爾雅曰諸慮山櫐今江東呼櫐為滕似葛而麄大也攝虎櫐今虎豆也纒蔓林樹而生英有尾刺今江東呼之為獵攝二音也廣雅曰藟藤也易困上六曰困于葛藟于臲卼王弼注曰困於極而乘於剛下無其應行則愈危居不穫安故曰困於葛櫐于臲卼者也毛詩南有樛木曰南有樛木葛藟虆之注云興也南南圡也木下曲曰樛南􅁟之葛藟茂盛箋云木枝以下垂之故葛也藟也妾得纍而蔓之而上下俱盛作者喻后妃能以意下逮衆詩義疏曰纍蔓也似燕薁連蔓生蔓白色子赤可食酢而不美也幽州謂之推藟也山海經曰卑山其上多纍郭璞注曰今虎豆狸豆之属也纍也齊書曰觧叔謙字楚梁雁門人也母有疾叔謙夜於庭中稽顙祈福聞空中語云此疾得丁公藤治便差即訪毉及草注皆無識者乃求訪至宜都遥見山中一老公伐木問其所用答云此丁公藤療風尤驗叔謙便拜伏流涕具言來意此公愴然以數段與之并示以漬酒法叔謙受之尋視此人不知所處依法為酒母病即差梁書曰周宏正與子豫元俱載入東郡乗小船渡岸見藤花宏正挽而船覆俱溺僅免豫元遂得心驚疾汝南先賢傳曰蔡順字君仲至孝所居井桔橰歲久欲易之為在母没年上不敢一旦遽易勿生扶老藤遶之有鴆巢其上金樓子曰合浦有康頭山山有一頭鹿額上載科藤一枚四條直上各長一丈許雲南記曰雲南出藤其色如朱小者以為馬䇿大者可為柱杖崔豹古今注曰酒盃藤出西城藤大如臂實花皆可以酌酒自有文章暎徹可愛實大如盃味如豆䔩香羙消酒􅁟人提酒來至藤下摘花酌酒以其實消酒其國人寳之不傳於中國張騫使大宛得之事在張騫出闗志南方草物狀曰浮沉藤生子大如韲甌正月華色仍連著實十月臘月熟色赤生食之甜酢生交趾九真志毦藤生山中大如苹蒿蔓衍居民採取剥之以作毦然不多出興古合浦蕳子藤生縁樹木正月二月華四五月熟實如梨赤如雄鷄冠核如魚鱗取生食之味淡洎無甘苦出交趾合浦野聚藤縁樹木二月華苞仍連著實五六月熟子大如􅅅甌里民煑食其味甜酢出蒼梧科藤生金封山烏滸人徃徃賣之其色正赤又云以草染之出興古陳祈暢異物志曰葭蒲藤類延蔓他樹以自長飬實大小長短如蓮菆側尤切著枝格間實外有殻又無核剥乃食之煑而暴之甜羙食之不飢臨海異物志曰種藤附樹作根軟弱須縁樹而作土下條此藤既纒褁樹樹死且有惡汁藤盛成樹若木自然大者成至五十圍異物志曰菽藤圍數寸重於竹可以為杖篾以縳舩及以為席勝於竹也始興記曰黄溪出科藤王韶之始興記曰晉中朝有質子將歸忽有人寄其書告曰吾家在觀亭廟石間有懸藤君扣藤家人必自出歸者如言果有二人出水取書并曰江伯令君前入水見屋舍甚麗今俗咸言觀亭有江伯神也顧微廣州記曰草藤如栟櫚葉疎破皮青多棘刺高五六丈者如五六寸竹小者如筆管竹破其外青皮即萪藤藤類有十許種續斷草藤也一曰諾藤一曰水藤山行渇則止斷取汁飲之治人體有損絶沐則長髪去地一丈斷之輙更生根至地永不絶異苑曰隋郡永陽縣有山壁直千仭巗上有石室古名為神農窟窟前有百藥藂茂莫不畢偹又别有異藤花形如菱菜朝紫中緑晡黄暮青夜赤五色迭耀劉欣期交州記曰含水藤破之得水行者資以止渇裴淵廣州記曰力陳嶺民人居之作舩為業隨樹所居就以成槽皆去水艱遠動有數里生一草名曰膏藤津汁軟滑無物能比導地牽之如流五六丈舩數人便運嶺表録異曰南土多野鹿藤苖有大如鷄子白者細於筯採為山貨流布海内儋臺瓊管百姓皆制藤線編以為幕其妙者亦挑紋為花藥魚鳥之狀業此納官以充賦稅女蘿爾雅曰唐蒙女蘿女蘿兎絲别四名也詩曰爰采唐矣毛詩頍弁曰蔦與女蘿施于松柏蔦寄生也女蘿莵絲松蘿也莵𤓰爾雅曰蔩莵瓜也郭璞注曰似土瓜也孫炎曰一名茢也烏階爾雅曰欔烏階也郭璞注曰即烏杷也子葉相連著状如杷齒可以染皂羊齒爾雅曰綿馬羊齒郭璞注曰草細葉葉生而毛有似羊齒繅者以取蠒緒牛蘈爾雅曰藬大廻切牛蘈也郭璞注曰今江東呼牛蘈者髙尺餘許方莖葉長而銳華紫縹色可淋以為飲孫炎曰車前草一名牛蘈狗毒爾雅曰蘻音繋狗毒也樊光云俗語苦如蘩馬帚爾雅曰茾音萍馬帚也郭璞曰似蓍可為掃篲羊桃爾雅云長楚銚芅也今羊桃也或曰鬼桃葉似桃花白子如小麥毛詩羔裘隰有萇楚曰隰有萇楚猗儺其枝萇楚銚芅也說文曰長楚銚芅一名羊桃山海經曰豐山其木多羊桃而芳莖郭璞注曰一名鬼桃治皮腫越羊蹄詩義疏曰揚州謂羊蹄為蓫廣雅曰荲羊蹄也本草經曰羊蹄一名東方宿一名連蟲陸一名鬼目畏苦寒生川澤治頭秃疥瘙陰熱无子生陳留鼠耳廣雅曰无心鼠耳也廣志曰鼠耳葉如耳縹色也鼠尾爾雅曰葝鼠尾孫炎曰鼠尾可染皂也葝巨盈切吳氏本草曰鼠尾一名葝一名山陵翹治痢芃蘭爾雅曰芄芄蘭也郭璞注曰蔓生斷之有白汁可噉也毛詩芄蘭曰芄蘭刺惠公也驕而無禮大夫刺之芄蘭之支芄蘭草也柔華恒蔓延於地有所依縁則起詩義疏曰芄蘭摩羅也幽州謂之爵瓢太平御覽卷九百九十五
