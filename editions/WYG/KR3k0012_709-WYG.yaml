front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_709-1a, image: WYG0899/WYG0899-0314a.png}
body:
  text: 太平御覽卷七百九宋李昉等撰服用部十一薦蓆說文曰蓆藉也禮天子諸侯席有黼純繡純又曰蓆竹席也又曰蒻蒲子也可以為薦釋名曰薦所以自薦藉也蒲草也以蒲作之其體平也席釋也可卷可釋也書曰牖間南嚮敷重篾席黼純華玉仍几西序東嚮敷重底席綴純文貝仍几東序西嚮敷重豐席畫純雕玉仍几西夾南嚮敷重筍席𤣥紛純漆仍几詩邶栢舟曰我心匪席不可卷也席雖平尚可卷禮記曲禮曰羣居五人則長者異席席以四人為節為人子者坐不中席又曰有憂者側席而坐有喪者專席而坐侍坐於所尊敬無餘席又曰姑姊妹女子子已嫁而反兄弟不與同席而坐不與同器而食又曰奉席如橋居廟切橫請席何鄉請袵何趾南向北向以西方為上東鄉西鄉以南方為上若非飲食之客則布席席間函丈主人跪正席客跪撫席而辭客徹重席主人固辭客踐席乃坐又檀弓下曰仲尼之畜狗死使子貢埋之曰丘也貧無蓋與之席傳曰大輅越音活席昭其儉也又曰臧文仲不仁者三下展禽廢六關妾織蒲周禮天官玉府曰玉府掌王之袵席又春官曰司几筵掌五席大朝覲大饗射凡封國命諸侯以王位設黼扆扆前南鄉設筦筵紛純加繅席畫純加次席黼純諸侯祭祀席蒲筵繢純加筦席紛純右雕几竹席筦筵紛純加繅席畫純筵甸役則設熊席凡喪事設葦席大戴禮曰武王踐祚席前左端之銘曰安樂必敬前右端之銘曰無行所悔後左端之銘曰一反一側爾不可忘後右端之銘曰所鑒不逺視爾所代論語曰席不正不坐君賜食必正席先嘗之史記曰蘇秦激張儀令相秦以馬薦席坐之又曰任安田仁俱為衛將軍舍人居門下衛將軍從此兩人過平陽公主家令兩人與騎奴同席而食二子㧞刀斷席而坐主家皆恠而惡之莫敢問也又曰陳平以弊席為門漢書曰文帝以莞蒲為席又曰元帝病史丹以親宻侍疾上獨寢直入卧内頓首伏青蒲上後漢書曰更始至長安居長樂宫升前殿郎吏以次列庭中更始羞怍俛首刮蓆不敢視又曰來歙征隗囂徑至略陽斬隗囂守将因保其城囂乃悉兵圍略陽築堤灌城歙固守矢盡發屋斷木為兵上自將上隴囂衆潰走於是置酒髙㑹勞賜歙班坐絶席在諸將之上又曰鄧訓於閨門甚嚴兄弟莫不敬憚諸子進見未嘗賜席假以温色又曰趙丙有術曾至渡頭求舡不得乃布席於水而坐呼風而過又曰李恂遷武威太守坐事逸織席自給東觀漢記曰郭丹師事公孫昌敬重常持蒲編席人異之又曰王常為横野大將軍位次與諸將絶席又曰黃香家貧躬執勤苦盡心供飬暑則扇床枕寒則自温席又曰張禹為太傅尚書鄧太后以殤帝初育欲令重臣居禁内乃詔禹與三公絶席又曰宣秉建武元年拜御史中丞上特詔御史中丞與司𨽻校尉尚書令㑹同並專席而坐故京師號曰三獨坐謝承後漢書曰戴憑徴博士詔公卿大會羣臣皆就席憑獨立世祖問其意憑對曰博士說經皆不如臣而坐居臣上是以不得就席令與諸儒難說上甚善之後正旦朝賀令羣臣說經更相難詰義有不通輙奪其席以益之憑重五十席京師語曰解經不窮戴侍中又曰殷亮為博士講學大夫諸儒論勝者賜席亮重八九席帝曰學不當如是耶又曰許敬字鴻卿其鄉吏有誣君者㑹於縣令坐敬㧞刀斷席曰敬不忍與惡人同席又曰汝南薛惇字子禮為北海長史家貧坐無完席妻曰君無俸禄給子孫復無完席耶惇以善席與妻自坐敗者又曰衛良字叔賢拜尚書令病罷官還家無完席賓客省之者生桑下談論飲水去典畧曰袁尚袁熈奔遼東公孫康先置精勇於廐中請熈尚熈尚入乃縛之坐於凍地尚寒求席熈曰頭顱方行萬里何席之為蜀志曰先主少孤每販履織席為業晉書曰王渾為將軍鎮夀陽虛懐撫士坐無空席王隱晉書曰陶侃字士行親人過侃宿時大雪無草侃母湛撤床雜蔣手剉給客牛馬晉陽秋云􅃽薦也晉中興書曰王敦死裹以席塗以蠟埋齋中晉建武起居注曰立敬后廟薦蓆不用緑縁晉前燕書曰髙祖廆年十五出避難追者急走避民家入其屋以席自障追者入屋發視無所見遂免宋書曰林邑王陽邁初在孕其母夢生兒有人以金席籍之其色光麗夷人謂金之精為陽邁中國云紫磨者因以為名宋起居注曰元嘉中劉禎為御史中丞奏風聞廣州刺史韋朗於州部作白席三百二十領請以事追免郎官吳均齊春秋曰劉璡字子敬耿介好禮嘗與故人共車於津陽門内見一女子容質甚麗盻睞之璡因抽坐席懸車中以隔絶之其正如此唐書曰代宗時晉州男子郇模以麻辮髮持竹筐葦席哭於東市以三十字論時政每字條一事上即召見又曰𤣥宗子頴王璬為劔南節度大使𤣥宗將􅄑蜀遣璬先赴本郡渡綿州江乘舡見以綵縁席而籍者顧曰此可以為寢處奈何踐之令撤去六韜曰桀紂之時婦人坐文綺之席衣以紈綺之衣家語曰明王之守也則必折衝千里之外其征也還師袵席之上漢書儀曰天子登紫壇紺席除地用六彩席六重吕氏春秋曰衛靈公天寒鑿池宛春諫曰天寒起工恐傷民曰天寒乎哉宛春曰公衣狐裘坐熊席陬隅有灶是以不寒莊子曰申屠嘉兀者也與鄭子産同師伯昏瞀人合堂同席而坐也魯連子曰人君所察者三不可以不知不知行與不行譬以方為輪也不知宜與不宜譬以錦縁薦也列子曰楊朱南之沛之梁而過老子老子曰而睢睢而盱盱而誰與居夫太白若辱盛德如不足楊朱曰聞命矣其徃也舍者避席其來也煬者與之爭竈席晏子曰景公獵休坐地而食晏子後至滅葭而坐公不悅曰子獨席何也對曰臣聞介胄坐陳不席獄户不席二者皆憂也臣故不敢以憂侍坐公曰善令大夫皆席又曰景公飲酒移於晏子晏子曰夫鋪薦陳簠者人臣不敢與焉又移於司馬穰苴曰鋪薦席陳簠簋者人臣不敢與焉范子計然曰六尺蘭席出河東上價七十蒲席出三輔上價百兩子思子曰舜不降席而天下治桀紂不降席而天下亂韓子曰趙簡子謂左右曰車席㤗美夫冠雖惡頭必戴之履雖善足必履之今車如此其㤗美也吾將何以履之且夫美而耗上妨義之道也又曰衛嗣公時有人於縣令左右縣令發褥而席弊嗣公令人遺席曰吾聞汝發褥而席弊其賜汝席縣令大驚以君為神又曰孟獻伯相魯不坐重席又曰禹為蔣席頗縁此彌侈也而國不服者三十三人殷作茵蓆彫文彌侈矣國之不服者五十三又曰文公至河令席袵捐之舅犯聞之曰席蓐所卧也而君棄之臣不勝其哀說苑曰孔子困於陳蔡之間居環堵之内坐三經之席鹽鐵論曰古者庶人蒲席以草經及後踐蒲蒻復筵方薦帛縁者也又曰古者大夫複薦草縁蒲平簞筦今當富者繡茵崔豹古今注曰草名虎鬚者江東織以為席曰西王母席也東宫舊事曰太子有獨坐龍鬚席赤皮花經席一領山海經曰鵲山至箕尾山其人皆鳥身龍首祠之用白蒲為席西京雜記曰昭陽殿設緑熊席毛皆長一尺餘眠而擁毛自蔽望之者不能見也坐則没膝其中雜薫諸香一坐此席餘香百日不歇又曰趙飛燕為皇后其女弟上遺廻風席漢武帝内傳曰帝齋於尋真臺紫羅薦地夜二更後西王母至也王子年拾遺記曰軒皇使百辟羣臣受教者先列珪玉於蘭蒲席上又曰蕖乗草髙五尺葉色如紺葉形如半月之勢亦曰半月草花無實其質温柔可以為席又曰方丈山有草名濡䓸葉色如紺莖色如漆細軟可縈海人織以為薦席卷之不盈一手舒之列丈又曰崑崙山有葭紅色可編為席温柔如毯毳焉又曰瀛州南有金巒之舘有青瑶几覆以雲紈之素席用香水柔莞又曰岱輿山有草名莾煌葉圓如荷去之十歩炙人衣服則焦鳥獸不敢近也刈以為席方冬彌温以枝相磨則火出炙又曰穆王時西王母來敷碧蒲之席黃莞之薦莞色若金又曰燕昭王設麟文席麟文者錯雜寶餙席為雲霞麟鳳之狀神仙傳曰淮南王為八公設象牙席異􅁐曰庾實妻毛氏五月晒暴薦席忽見其三嵗女在席上卧驚怛便滅女真形在别牀如故不旬日而夭世傳仲夏忌移床搜神記曰羅威字行徳性至孝母老天寒以身温席而後授其處鄴中記曰石虎作席以錦雜以五香施以五彩綖編蒲皮縁之以錦范汪荆州記曰安城郡今屬江州出桃枝席成公興内傳曰登白鹿延成君為敷魚鬚之席文士傳曰張儼朱異張純三人共詣驃騎將軍朱據聞三人才名告各為賦然後乃坐純曰席為冬設簞為夏施揖讓而坐君子攸宜皇甫謐髙士傳曰嚴君平成都市賣卜詔徴不起蜀有富人羅仲與君平善問何以不徃曰無車糧仲即為具車馬糧米君平曰吾病有餘非不足也我有餘而子不足也我有餘而子不足奈何以不足奉有餘也仲曰吾一席直萬金子無儋石乃云有餘謬矣又曰老萊子親没隱䝉山之陽枝木為床薦艾為席益部耆舊傳曰張克為州治中從事刺史每自坐髙床為從事設單席於地鍾岏良吏傳曰吳隱之字處黙鄄城人也轉廣州刺史返舟之日唯身而已宅有茅茨六間坐無完席以蓬為屏風㑹稽先賢傳曰董昆字文通為太農帑坐無完席盧毓冀州論常山為林火陸為澤蒹葭蒲葦雲母御席地産不為無珍也汝南先賢傳曰鄭敬以茅葭為席常隨把栁之陰㑹稽典録曰隆脩字奉遷為豫章太守㕔事薦編至絶不改以郡俗不整常卷坐席唯徐穉李䞇數詣問乃待以殊禮世說曰管寧與華歆同席嘗讀書有乘軒冕過門者歆廢書出看寧割席分坐曰子非吾友也楚辭曰瑤席兮玉瑱揚雄甘泉賦云靡薜荔以為席分折瓊枝以為芳魏劉楨清虛賦曰布玳瑁之席設蟕蠵之筵太平御覽卷七百九
