body:
  text: 太平御覽卷七百九十六宋李昉等撰四夷部十七西戎五莎車波知栗弋悉居半越底延波路三童蒲山刼國獠丁令且彌陁羅伊羅賖彌澤散女國呼得曹國漕國何國短人小人軒渠温宿朱俱波尉頭滑國姑黙疊伏羅阿鈎羗葱茈羗莎車漢書曰莎車王治莎車城去長安九千九百五十里有鐡山出青玊又曰宣帝時烏孫公主小子萬年莎車王愛之莎車王無子死時萬年在漢莎車國人計欲自託扵漢又欲得烏孫心即上書請萬年為莎車王漢許之遣使者奚充國送萬年萬年初立暴惡國人不説莎車王弟呼屠徵殺萬年并殺漢使者自立為王約諸國背漢㑹衞侯馮奉世使送大宛客即以便宜發諸國兵擊殺之更立他昆弟子為莎車王又曰馮奉世至宛宛聞其斬莎車王禮之異扵他使得其名馬象龍而還帝甚悦下議封奉世關内侯少府蕭望之以奉世矯制發諸國兵雖有功效不可以為後代法即封奉世凡使者皆欲要功萬里之外爲國家生事於夷狄漸不可長不宜授封帝善其議以奉世爲光禄大夫波知北史曰波知國在鉢和西南土狭人貧依託山谷其王不能總攝有三池𫝊曰大者有龍王次者有龍婦小者有龍子行人經之設祭乃得過不祭多值風雪之困栗弋通典曰栗弋後魏通焉在葱嶺西大國一名栗特一名指夢出名馬牛羊珎果蒲萄酒其土地水美故也有大禾髙丈餘子如胡豆在安息北五千里附庸小國四百餘城太武帝時遣使朝貢悉居半北史曰悉居半國故西夜國也一名子合其王號子冶呼揵在于闐西去代萬二千九百七十里後魏大延初遣使來獻自後不絶越底延通典曰越底延國隋時聞焉治辛頭河北西北去賖彌國千餘里東北至𤓰州五千四百里其王婆羅門種類户數萬餘有弓矢刀鞘皮甲國法不殺人重罪流輕者杖國無課税其俗事佛王及庶人剪髪衣錦􅂁不開縫貧者白疊婦人為髻衣裙衫帔長巾俗清潔氣候温多稻有羊馬牛鍮石訶梨勒波路北史曰波路國在阿鈎羌西北去代一萬三千九百里其地濕熱有蜀馬土平物産國俗與阿鈎羌同三童通典曰三童在軒渠國西南千里人皆眼有三睛珠或有四舌者能為一種聲亦能俱語常貨多用犀象作金幣率效國王之面亦效王后之面若丈夫交易則用國王之面王死則更鑄蒲山北史曰蒲山國故皮山國也居皮城在于闐南去代一萬二千里其國西南三里有凍凌山後役屬于闐刧國通典曰刧國隋時聞焉在葱嶺東南西與賖彌國界接西北至邑怛國去長安萬二千里有户數萬氣候熱有稻麥粟豆羊馬出洛沙青黛婚姻同突厥死亡葬扵山谷又曰大唐武徳二年遣使貢寳𢃄金鏁頗梨水精盃各一頗梨四百九十枚大小有差獠魏書曰獠之初也出自梁益之間種類甚多散居山谷畧無氏族之别依樹積木以居其上名曰干蘭大小隨其家之人數往往推一長者為王父死則子繼若中國之黨族也獠王各有鼓角一雙使其子弟自吹擊之好相殺害多仇怨不敢逺行性同禽獸至扵忿怒父子不相避唯手有兵刄者先殺之若殺其父走避於外求得一狗謝其母然後敢歸母得狗謝不復嫌恨若報死相攻擊必殺而食之平常刼掠賣取狗而已親戚比隣指授相賣亡兒女一哭便不復追思唯執㦸持矛不識弓矢用竹為簧羣聚皷之以為音為細布色鮮净大狗一頭買一生口其俗畏鬼尤尚淫祀所殺之人美鬚髯者剥其面皮籠之扵竹及燥號曰神皷無不祀之以求福也北史曰獠者蓋南蠻之别種自漢中逹扵卭笮川洞之間所在皆有種類甚多所生男女無名字唯以長㓜次第呼之丈夫稱阿謩阿段婦人阿夷阿等之類皆語之次第稱謂也鑄銅爲器大口寛腹名曰銅㸑既薄且輕易扵熟食建國中李勢在蜀諸獠始出巴西渠川廣漢陽安資中攻破郡縣為益州大患自桓温破蜀之後蜀人東流山險之地多空獠遂挾山傍谷與夏人叅居者頗輸租賦在深山者仍不為編户梁益二州公私頗藉為利正始中夏侯道遷舉漢中内附宣武遣尚書邢巒爲梁益二州刺史以鎮之近夏人者安堵樂業在山谷者不敢爲冦其後朝廷以梁益二州控攝嶮逺乃立巴州以統諸獠後以巴酋嚴始欣為刺史又立隆城鎮所統獠二十萬户及周文平梁益令所在撫慰然天性暴亂旋致擾動每歳隨近州鎮出兵討之獲其生口以充賤𨽻謂之爲壓獠焉永昌郡𫝊曰獠民喜食人以為至珎美不自食其種類也怨仇乃相害食耳能水中潜行數十里能水底持刀刺捕取魚其人以口嚼食並鼻飲水死人有棺其𦵏取棺埋之丁令後魏書曰丁令在康居北勝兵六萬人隨畜牧依土處出貂䑕皮􅏈子皮西南去康居界三千里又曰丁令北有馬臘國其人音聲似鴈鶩從􅂰以上至頭人也􅂰以下生毛馬鬛馬蹄走疾扵馬勇徤敢戰且彌北史曰且彌國都天山東臨扵大谷在車師北去代一萬五百七十里本役屬車師陁羅伊羅通典曰陁羅伊羅國隋時聞焉在烏荼國北大雪山坡上縁梯登山接七百梯方到其國賖彌北史曰賖彌國在波知之南山居不信佛法専事諸神亦附嚈噠東有鉢盧勒國路嶮縁鐡鎻而度下不見底後魏熙平中宋雲等竟使不能逹澤散通典曰澤散國魏時聞焉屬大秦其治在海中央最與安息城谷相近西南諸大秦不知里數女國北史曰女國在葱嶺南其國以女為王姓蘇毗字末羯在位二十年女王夫號曰金聚不知政事國内丈夫唯以征伐爲務山上爲城方六里人有萬家王居九層之樓侍女數百人五日一聽朝復有小女王共知國政其俗婦人輕丈夫而姓不妬忌男女皆以彩色塗面而日中或數度變改之皆被髪以皮為鞋課税無常氣候多寒以射獵為業出鍮石朱砂麝香㹈牛駿馬蜀馬猶多鹽恒將鹽向天竺興販其利數倍亦數與天竺党項戰争其女王死國中厚歛金錢求死者族之中賢女二人一爲女王次為小王貴人死剥皮以金屑和骨肉置瓶中埋之經一年又以其皮肉石器埋之俗事阿脩羅神又曰有樹神嵗神初以人祭或用獮猴祭呼得通典曰呼得魏時聞焉在葱嶺北烏孫西北康居東北勝兵萬餘人随畜牧出名馬多貂鼠曹國北史曰曹國都郍宻水南數里舊是康居之邊也國無主康國王命子烏建領之都城方千里勝兵千餘人國中有得悉神自西海以東諸國並事之其神有金人波羅濶丈有五尺髙下相稱每月以駞五頭馬十匹羊一百口祭之東南去康國百里大業中遣使貢方物漕國北史曰漕國在葱嶺之北漢時􅄢賔國也其王姓昭武字順逹康國王之宗族也都城方四里勝兵萬餘人國法嚴峻俗重淫祠葱嶺山順天神者儀制極華以金爲屋以銀爲地祠者日有千餘人祠前有一魚脊骨有孔中通馬出入國王戴金牛頭冠坐金馬座土多稻粟豆麥饒象馬犎牛金銀鑌鐡氍㲣朱砂青黛安息青木等香黒鹽阿魏東去刼國七百里大業中遣使貢方物何國隋書曰何國都郍宻水南數里舊是康地也其王姓昭武亦康國王之族類都城方二里勝兵千人其王坐金羊床東去曹國百五十里西去安國三百里大業中遣使貢方物短人通典曰短人魏時聞焉在康居西北男女皆三尺人衆甚去奄蔡諸國甚逺康居長老𫝊聞常有商旅行北方迷惑道而到此國國中甚多珎寳夜光明月之珠其國去康居可萬餘里􅊳厥本末記云自突厥北行一月有短人國長者不踰三尺亦有一尺者頭少毛髮若羊胞之狀突厥呼為羊胞頭其傍無他種類相侵俗無冦盗但有大鳥髙七八尺恒伺短人喙而食之短人皆持弓矢以為之備按此亦在西北即魏略之短人國也小人通典曰小人在大秦之南軀纔三尺其耕種之時懼鶴所食大秦每衛助之小人竭其珎貨以酬報軒渠通典曰軒渠國多九色鳥青口緑頸紫翼紅膺紺頂丹足碧身緋背𤣥尾亦名九尾鳥亦名錦鳳其青多紅少謂之繡鸞恒從弱水西來或云是西王母之禽也其國幣貨同三童國温宿北史曰温宿國居温宿城在姑黙西北去代一萬五百五十里朱俱波通典曰朱俱波後魏時通焉亦名諸居槃國漢子合國也今并有西夜蒲犁依耐得若四國之地在于闐國西千餘里其東至葱嶺二百里西至渇槃國南至女國三千里北至踈勒九百里其王本踈勒國人後魏宣武永平中朱居槃國遣使朝貢其言音與于闐相似其間小異人貎多同華夏亦類踈勒大唐武德以後頻遣使朝貢尉頭北史曰尉頭國居尉頭城在温宿北去代一萬六百五十里滑國通典曰滑國車師之别種後漢順帝永建初八滑從班勇擊北虜有功漢以八滑爲後部親漢侯自魏晉以來不通巾國至梁武帝普通初其王厭帯夷粟陁始遣使獻黄獅子白貂裘波斯錦等物後魏時居桑乾地滑猶小國屬蠕蠕後稍强大征其傍國波斯渇槃􅄢賔龜茲踈勒姑黙于闐等國焉其獸有獅子兩脚駞人皆善騎射著小䄂長者􅂁用金玉爲𢃄女人被裘頭上刻木為角長六寸以金銀飾之兄弟共妻無城以氈屋為居東向開户其王金床隨太嵗轉無文字以木爲契與傍國通用左書羊皮爲紙無職官事天神火神每日出祀神而後食其跪一拜而止死以木爲槨父母死其子截一耳葬訖即吉其言語待譯然後通至後魏時謂之滑􅂒或云髙車之别種或云大月氏之種其源出於塞北自金山至後魏文帝時已八九十年矣在于闐之西東去長安萬一千里衣服類胡加以纓絡頭皆剪髮其語與蠕蠕髙車及諸胡不同部衆可十萬依隨水草其國無車有輿多駞馬用刑嚴急盜無多少皆腰斬盗一償十死者富家累石爲藏貧者掘地而埋隨身諸物皆置冢内又兄弟共娶一妻無兄弟者其妻戴一角㡌若有兄弟者依其多少之數更加㡌角焉西域康居于闐疏勒安息及諸小國三十許皆役屬之號爲大國每遣使朝貢孝明帝熙平中遣使伏子統宋雲使西城所經諸國不能知其本末及山川里數今舉其略云至隋時又謂挹恒國都烏滸水南二百餘里大月氐之種類也勝兵五六萬人俗善戰先時國亂突厥遣通設字詁强領其國俗同吐火羅南去曹國千五百里東去𤓰州六千里大業中遣使來貢按劉璠梁典滑國姓嚈噠後裔滑姓為國號傳訛又謂之挹怛焉姑黙北史曰姑黙居南城在龜兹西去代一萬五百里疊伏羅通典曰疊伏羅後魏時通焉去代三萬一千里國中有勿悉城北有壇竒水西流有白象土宜五榖宣武時遣使貢方物阿鈎羗通典曰阿鈎羗後魏時通焉在莎車西南國西有懸度山其間四百里中往往有棧道下臨不測之深人行以繩索相持而度土有五糓諸果市用錢爲貨居止立宫室有兵器葱茈羗通典曰燉煌西城之南山中從婼羗西至葱嶺數千里有月氐餘種曰葱茈羗白馬羗黄牛羗各有酋豪比與諸國接不知其道里廣狹𫝊黄牛羗種類孕身六月生南與白馬羗鄰並魏時聞焉太平御覽卷七百九十六
