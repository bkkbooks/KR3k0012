body:
  text: 太平御覽卷三百五十三宋李昉等撰兵部八十四㦸下殳矛㦸下孟子曰子之持㦸之士一日而三失伍世說曰舊制三公領兵入見皆交㦸义頸而前初曹公將討張繡入覲天子時始復此制公自是不敢朝見一出郭頌世語孫盛異同難語曰太祖嘗私入中常侍張譲室譲覺之乃舞手㦸于庭前踰垣而出材力絶人莫之能害于寶捜神記曰漢武帝時張寛為揚州刺史先是有二老翁争山地詣州訟疆界連年不决寛視事復來寛視二翁形狀非人令卒持㦸將入問汝何等精翁欲走寛呵格之化為巨蛇又曰成都王之攻長沙也反軍于鄴内外陳兵是夜㦸鋒皆有火遥望如懸燭就則無焉三十國春秋亦載劉敬叔異苑曰彭城劉黄雅以太元中為京口府佐被使還都路經行里亭多虎劉極自防衛牛馬繋于户前以㦸布於地上宵中士庶同睡虎乗間跳入跨越人畜獨取劉而去劉義慶幽明録曰項縣姚牛十餘歳父為鄉人所殺牛常賣衣服市刀㦸圖欲報讎後在縣門前相遇手刃之於衆中東陽無疑齊諧記曰東陽郡朱子之有一鬼恒來其家子之兒病心痛鬼曰待我為汝尋方云燒虎凥飲即差汝覔大㦸與我我為汝取也其家便持㦸與鬼鬼持㦸去須臾還放㦸中庭擲虎凥着地猶尚暖束晢發䝉記曰師子五色而食虎於巨木之岫一噬則百人仆唯畏鈎㦸顧愷啓蒙記曰玉精名委似美女而青衣見以挑㦸刺之以其名呼之可得也周處風土記曰㦸長一丈三尺奮揚俯仰乍跪乍立兼五兵而能乃謂名人又曰敎學講武戒逺慮戎首𤣥戈奮長雄迎來送往斫截横從扶強頓弱唯敵所從首先也𤣥戈北斗杓端招揺之内貫索之外獨星也㦸為五兵雄蓋取威㑹振也尤國㦸法先小送動之陵上攝逆下收功扵中國在首領之間來迎去順而下也植則虎龍交互神變無常去者厚餞來者不攘言用雙㦸之法交㦸相向左手為龍右手為虎更出更入更上更下上下無常隨變而改顛倒入懐轉如回風敵若孤勝攝㦸徐反可謂上下無常非為邪也進退無恒非離羣也蓋其進足奮手欲及機也如敵來輜去疾進而送之來重進疾開而待之南中八郡志曰永昌郡西南三千里有驃國以金為刀㦸焦贛易林曰桃弓葦㦸除殘去惡又曰倚鋒據㦸傷我胷臆春秋考異郵曰劉子單子挾猛入城天王奔走尹氏立朝國有三王天下兩生周分為二莫能救討強弩張於前長㦸㧞於後管子曰黄帝問於伯髙伯髙曰雍孤之山發水出金蚩尤受而制之以為雍孤之㦸晏子春秋曰景公飲酒移於晏子前驅欵門曰君至晏子立於門曰君何為非時而夜辱公曰酒醲之味金石之聲願與夫子樂之晏子曰夫鋪薦蓆陳簠簋者有人臣不敢與焉又移司馬穰苴介胄操㦸立於門曰鋪薦蓆陳簠簋者有人臣不敢與焉又曰崔杼殺莊公盟諸大夫令有敢不盟者㦸鈎其頸孫卿子曰雖有戈矛之㦸不如恭儉之利與人善言煖於布帛傷人以言深於矛㦸又曰孤父戈以钃牛愚莫甚焉钃徐玊切史曰鉏耰棘矜非錟音淡於句㦸長鎩也如淳曰長刃矛也又曰矛刀下有鐵上句曲然而成敗異變功業相反也尉繚子曰夫殺之五十歩之内者誰也曰矛㦸也韓子曰譬如劒㦸愚人行忿則禍生聖人誅暴則福成淮南子曰孟夏之月南宫御女赤色衣赤采吹竽笙其兵㦸髙誘曰有枝幹象陽布散也劉向新序曰趙簡子上羊腸之坂羣臣皆偏袒推車而虎㑹獨擔㦸行歌簡子曰寡人上坂㑹獨不推車而侮其上者其罪何若㑹曰為人臣侮其主者其罪死而又死簡子曰何謂死而又死虎會對曰身死妻子又死謂之死而又死又曰齊景公遊海上樂之六月不歸令左右敢言歸者死顔􅢴諌曰君樂治海上不樂治國儻有治國者君且安得出樂海也公據㦸將斫之􅢴撫衣而待之曰君奚不斫也昔桀殺關龍逢紂殺王子比干君奚不斫臣以參此二人不亦可乎公遂歸抱朴子曰太阿臨項長㦸指心而操不可奪也又曰拙者得工輸之斤斧不能以成雲梯怯者得馮婦之刀㦸不能以擒兕虎蔣子曰士有一餐而倒㦸義所驅也應璩詩曰丈夫要雄㦸更來宿紫庭今者宅四海誰復有不并又曰郡國募將士馳騁習弓㦸雖妙未更事難用應卒廹司馬相如上林曰曵明月之珠旗建干將之雄㦸干將韓王劍師雄㦸干將所造也左思吳都賦曰吳鈎越棘楚鐵利故稱越棘也又曰羽旄揚㽔雄㦸耀鋩繁欽撰征賦曰左倚雄㦸右攅干將兩都賦曰郎將司階虎㦸交鎩音殺又曰周蘆千列陛㦸百重陶侃表曰伏惟武庫傾蕩宿衛有失輙簡選其差可者奉獻金鈴大㦸五十張孫盛奏事曰諸違令私作鎧一領角弩力七石以上一張㦸十枚以上皆棄市張載劒閣銘曰一人荷㦸萬夫趦趄難行貎也李尤㦸銘曰鼔㦸之設以戒非常秉執操持邪暴是防須臾之分終日為殃山陸之禍起於豪芒張恊手㦸銘曰錟錟雄㦸精金練鋼名配越棘用過干將嚴鋒勁校摛鍔耀芒魏文帝書曰漢中地形實為險固四嶽三塗皆不及也張魯有精甲數萬臨髙守要一夫掉㦸千人不得進而我軍過之若駭鯨之决網罟奔兕之觸魯縞未足以喻其易應瑒表曰長㦸百萬胡馬千羣應真華覽曰强弩連城長㦸指塞傅𤣥朝㑹賦曰流蘇粲粲華蓋重隂羽林虎旅長㦸􅀈摻上音寅下音參賈誼過秦論曰陳渉以戍卒散亂之衆數百奮臂大呼不用弓㦸之兵鉏耰音優白梃横行天下秦人長㦸不刺强弩不射楚師深入戰於鴻門曽無藩籬之艱殳釋名曰殳殊也長丈二尺而無刃有所撞直降切桎歩降切於車上使殊離也說文曰殳以杖殊人也禮殳以積竹八觚長丈二尺建於車又曰弓矢圍殳矛守戈㦸助五兵長短各有所宜因事而施凡五兵當長以衛短短以救長代逓則久皆戰則彊淮南子曰武王執戈杖鉞以勝殷搢笏杖殳以臨朝魏文帝詩曰行行遊且獵且獵路南隅彎我烏號弓騁我纎驪駒走者貫鋒鏑伏者驚戈殳白日未及移手獲三十餘王粲七釋曰流鋒四射畢罕横厲奮干殳而稍繫馳鷹犬以搏噬夏侯湛獵兔賦曰擬以銳殳規以良弓覩豪末而放鏇兮殪之于田中左思吳都賦曰干鹵殳鋋腸夷勃盧謝惠連從軍行曰趙騎馳四牡吳舟浮三翼弓矛有恒用矛鋋元蹔息太公六韜曰方凶支鐵殳柄長三丈以上三百枝矛釋名曰矛冒也刃下冒矜也下頭曰鐏征問反鐏入地也松櫝長三丈其矜宜輕以松作之櫝速也前刺之言也矛長丈八尺曰矟馬上所持言其矟矟使殺也又曰繳殳繳也可以繳截敵陣之矛也仇矛頭為三义言以討仇敵之矛也矛㦸㦸常也其矜丈六尺不言常而云夷者言可夷减敵也亦車上所持也䓮矛長九尺䓮霍也所中霍然即破裂也方言曰五湖之間矛謂之鍦音施或謂之鏦音窓或謂之鋋其柄謂之矜又矛骹音敵細如鶴脛者謂之鶴膝世本曰杼作矛太公兵法曰矛之神名跌蹌書曰鍜乃戈矛礪乃鋒刃又曰門之内一人冕執銳銳矛也立于階側周成王朋士衛與也詩曰清人在彭駟介旁旁戔云清者髙克所軍之邑也駟介四馬也二矛重英河上乎翺翔重英矛之象也二矛重喬河上乎逍遥戔云二矛酋矛夷矛也又曰厹音求矛鋈鐓三隅矛也蒙伐有苑禮記曰進矛㦸者前其鐓後其刃大戴禮曰武王踐阼矛之銘曰造矛造矛少間弗忍終身之羞予一人所聞以戒後世子孫左傳曰齊伐魯冉有用矛於齊師故能入其軍史記曰武王牧野誓曰立爾矛漢書曰姑句家矛端生火光其妻曰矛端生火光此兵氣也魏志曰公孫瓉手執兩頭矛殺鮮卑數十人魏書曰議者多言闗中兵强習長矛非精選前鋒則不可以當也曹公謂諸將戰在我非在賊雖習長矛將使不可以刺諸君但觀之魏畧曰閻行金城人後名鮑字彦明少有健名始為小將隨韓約建安初約與馬騰相攻擊騰子超亦號為健行嘗刺超矛折因以矛撾超㡬殺之吳書曰孫策討山越斬其渠帥悉令左右分行逐賊騎與虞翻相隨翻喜用矛謂在前得平地勸策乘馬策曰卿無馬柰何答曰翻能步日行三百里三國異同傳曰公孫瓉為遼東屬國長史嘗從數十騎出行塞卒遇鮮卑百騎以矛撃殺傷數十人鮮卑由是畏之蜀志曰先主為曹公所逐棄妻子走令張飛將二十騎拒後據水斷橋瞋目横矛曰我張翼徳也可來決死無敢進者晉書載記曰蜀李雄無事小出丞相楊裒于後持矛馳馬過雄雄怪問之對曰夫統天下之重者如乗惡馬持矛也急之則慮自傷緩之則懼其失是以馬馳而不制也雄寤即還晉太康起居注詔曰諸王中尉及諸軍皆典兵以備不虞乃有着中戰衣木履持長矛者此為兒戲而無相彈懾也趙書曰趙討陳安於隴城城䧟安死乃謡曰隴上健兒曰陳安愛養將士同心肝騄驄馬鐡鏤鞍丈八蛇矛左右盤百騎俱出如雲浮追者十萬騎修修戰始三交失虵矛十騎俱蕩九騎留吳越春秋曰越以屈盧之矛越絶書曰勃山之矛歩光之劒獻吳王六韜曰紂之卒握炭流湯者十八人綰矛殺百步之外者千人韓子曰人有鬻矛楯者譽之曰吾楯之堅物莫能陷也又譽其矛曰吾矛之利於物無不陷也或曰以子之矛陷子之楯何如其人弗能應也劉向說苑曰秦急圍邯鄲邯鄲傳舍吏子李談謂平原曰邯鄲之民炊骨易子而食之而君之後宫婢妾荷綺縠餘粱肉士民兵盡或剡木為矛㦸而君之噐物鍾缶自恣吕氏春秋曰齊晋相與戰平阿餘子亡㦸得矛退而不自決謂路人曰亡㦸得矛可以歸乎路人曰㦸亦兵也矛亦兵也亡兵得兵何為不可以歸心猶不决遇髙唐之孤叔無孫當其馬前曰今者戰亡㦸得矛可以歸乎叔無孫曰矛非㦸也㦸非矛也亡㦸得矛豈无責乎阿餘子曰嘻還反戰死之神仙傳曰左慈見孫討逆討逆使慈着馬前欲手刺殺之討逆着鞭驅馬操矛逐慈慈着木履策杖徐步終不能及乃止列女傳曰巴趙娥者趙萬之妻羣縣遭亂萬得足疾不能行為賊所殺賊欲殺娥娥守喪不去賊舉矛指娥欲以怖之娥知賊必刼略乃以身赴輙貫心逹背而死劉敬叔異苑曰河間沐堅字壁强石勒時監作水田御下苛虐百姓怨毒為堅形以刃矛斫刺呪令斃堅尋得病苦被捶割於是遂殞夢書曰矛㦸為相待其早晩也夢得矛㦸者憂相勅也持矛待交友見人持矛待於己也持矛來倒却中止也魏文帝詩曰戈矛成山林𤣥甲曜日光樂府左延年秦女休行曰始出在西門遥望秦氏廬秦氏有好女自名為女休女休十四五為宗行報讎左執白陽刀右執宛景矛張奐與崔子貞書曰僕以元年到任有見兵二百馬如羖羊矛如錐鐵楯如榆葉諸葛亮集曰勅作部皆作五折剛鎧十折矛以給之太平御覽卷三百五十三
