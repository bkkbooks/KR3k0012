body:
  text: 太平御覽卷三百三十四宋李昉等撰兵部六十五輜重戎車戰艦亭障輜重釋名曰輜厠也謂軍糧什物雜厠載之以其累重故稱輜重後漢書注曰輜車名也孫子曰使敵不得至者險害之地攻其所必救能守其險害之要路敵不得自致故王子曰一犬當穴萬鼠不敢出一虎當溪萬鹿不敢過言守之固也故飽能飢之絶其糧也委軍而爭利則輜重捐委其庫藏輕師而行若敵乗虛而來抄絶其後則已輜重皆所捐棄是以軍無輜重則亡無糧食則亡無委積則亡此三者亡之道也史記曰漢王遣將韓信以兵數萬欲東下井陘擊趙趙王陳餘聚兵井陘口號稱二十萬李左車說陳餘曰韓信涉西河虜魏王擒夏銳欲以下趙此乗勝而去國逺鬬其鋒不可當臣聞千里餽糧士有飢色樵蘇後爨樵取薪也蘇草也師不宿飽今井陘之道車不得方軌騎不得成列行數百里其勢糧食必在後願足下假臣竒兵萬人從間路絶其輜重足下深溝髙壘堅營勿與戰使前不得鬬退不得還吾竒兵絶其後使野無所掠不至十日而韓信之頭可致於麾下不然必為所擒矣陳餘儒者常稱義兵不用詐謀竒計曰吾聞兵法十則圍之倍則戰之今韓信兵號數萬千里而襲我亦已罷極如今避不擊後有大者何以加之則諸侯謂吾怯而輕來伐我不聽韓信使人間覘知不用大喜乃敢引兵遂進竟破趙軍後漢書曰董訢許邯與更始諸將各擁兵據南陽諸城帝遣呉漢伐之漢軍所過多侵暴時破虜將軍鄧奉謁歸新野怒吳漢掠其鄉里遂返擊破漢軍獲其輜車屯據淯陽與諸將合從又曰鄧禹自箕關將入河東箕關在今王屋縣界河東都尉守關不開禹攻十日破之獲輜重千餘乗又曰耿弇追張步平壽乃肉袒負斧鑕於軍門鑕鍖也示必死祈林切弇傳步詣行在所而勒兵入據其城樹十二郡旗鼓東觀記曰弇凡平城陽琅琊髙密膠東東郡北海齊千乗濟南平原泰山臨淄等郡令部兵各以郡人詣旗下衆向十餘萬輜重七千餘兩皆罷遣歸鄉里晉書曰劉毅追桓𤣥於崢嶸州毅乗風縱火盡銳爭先𤣥衆大潰燒輜重夜走崔鴻十六國春秋曰前秦苻堅遣將王猛伐前燕慕容瑋師次潞川燕將慕容評率兵十萬禦之以持久制之猛乃遣其將郭度率騎五千夜從間道起火於髙山因燒評輜重火見鄴中評性貪鄙障固山泉賣樵鬻水積錢絹如丘陵三軍莫有鬬志因而大敗唐書曰髙宗遣將薛仁貴郭待封伐吐蕃仁貴留三萬人作兩栅輜重並留栅内倍道掩之待封不從仁貴之䇿領輜重繼進未至烏海吐蕃二十餘萬悉衆救其前運仰擊待封敗之待封趨山軍糧及輜重並為賊所掠仁貴遂退軍戎車書曰武王戎車三百兩車一乗步卒七十二人虎賁三百人與紂戰於牧野詩曰戎車既駕四牡業業又曰元戎十乗以先啓行禮記曰兵車不式武車綏旌前有水則載青旌前有塵埃則載鳴鳶前有車騎則載飛鴻前有士師則載虎皮前有摯獸則載貔貅行前朱鳥而後𤣥武左青龍而右白虎招揺在上急繕音勁其怒進退有度左右有局各司其局左傳曰晉車七百乗韅靷鞅靽遂伐其木以益其兵也又曰叔向曰寡君有甲車四千乗在行之必可畏也牛雖瘠僨於豚上其畏不死乎又曰楚子㑹諸侯伐隨軍於漢淮之間少師謂隨侯曰楚人上左君必左君楚君也無與王遇且攻其右右無良焉弗從戰於速把隨師敗績鬬丹獲其戎車榖梁曰趙盾長轂五綿地千里古司馬兵法曰戎車夏曰鈎車先正也鈎設浦車逺近計車量也以立壘正者什伍之例也殷曰寅車先疾也寅敬也所有旌旗幟所以知變化示應而不失周曰元戎先良也前立伐惡立善之旗所以知善罪之所在先齊良善而後伐之文選曰輕車霆激驍騎雷驚戰艦墨子曰公輸般自魯之楚為舟戰之具謂之鈎拒退則鈎之進則拒之也後漢書曰公孫述遣其將任滿田戎程汎將數萬人乗枋箄下江關枋箄以木竹為之浮於江水上爾雅曰舫泭也郭景純曰水中簰筏也華陽國志曰巴楚相攻故置江關關舊在赤甲城後移在江南遥對白帝城故基在今䕫州魚復縣南枋即舫字古通用耳箄音步佳切泭音疋俱切擊破馮駿及田鴻季𤣥等遂㧞夷道夷陵據荆門虎牙横江水起浮橋鬭樓立攅柱絶水道結營山上以拒漢兵彭攻之不利於是裝直進樓船冐突露橈數千艘並船名樓船之上施樓橈楫也爾雅曰楫謂之橈蓋謂露楫在外人在船中冐突取其觸冐而唐突也晉書曰周訪與諸軍共征杜弢弢作桔皋打官軍船艦周訪作長岐棖拒之桔皋不為害又曰劉裕北征廣固嶺南賊將徐道覆謂其師盧循曰今日之機萬不可失既克都邑劉裕雖還無能為也循從之初道覆密欲裝兵艦乃使人伐船材於南康山偽云將下都貨之稱力少不能得致即賤賣之價减數倍居人貪賤賣衣物而市之贛石水急贛古暗切出船甚難皆儲之如是者數四故大板積而百姓弗之疑及道覆舉兵案賣券而取無得隠匿者乃并裝之旬日而辦遂舉衆冦南康廬陵豫章郡諸守相皆委任奔走梁書曰陸納反叛造大艦一名曰三王艦者邵陵王河東王桂陽嗣王三人並為元帝所害故立其象於艦祭以太牢加其節蓋羽儀鼔吹每戰輙祭之以求福又曰王琳大營樓艦將圗舉義琳將張平宅乗一艦每將戰勝艦則有聲如野猪故琳戰艦以千數以野猪為名南史曰梁徐世譜從陸法和與侯景戰赤亭湖景軍甚盛世譜乃别造樓船舶艦火舫水車以益軍勢將戰又乗大艦居前大敗景軍擒景將任約景退走因隨王僧辯攻郢州世譜復乗大艦臨其倉間賊將宋子仙舉城降以功除信州刺史封魚復縣侯周書庾信𫝊曰信常有鄉關之思作哀江南賦以致其意云麾兵金匱校戰王堂蒼鷹赤雀鐵軸牙檣隋書曰楊素數進取陳之計拜信州總管賜錢百萬帛千叚馬二百疋而遣之素居永安造大艦名曰五牙牙起樓五層髙百餘尺左右前後置六柏竿並髙五十尺容戰者八百人旗幟加於上次曰黃龍置兵百人自餘平乗舴艦等各有差唐書曰曹王皋性多巧思常為戰艦挾以二輪令蹈之遡風澎浪其疾如掛帆席凡造物必省易而為久不可敗性纎悉每遺人糧肉必令自持衡秤量以致之官置布帛令縱書其幅而印之絶吏之私易三國典畧曰梁陸法和多聚兵艦欲襲陽冦武關梁主使止之法和謂使者曰法和是求道之人常不希釋􅆊天王坐處豈規人主之位乎但於空土佛所與主上香火因縁縁見主上應有報至故救援耳今既彼疑是以不可改也又曰梁陸納叛湘州時造二艦衣以牛皮髙十五丈一曰青龍一曰白虎選其驍勇者乗之以戰魏武軍令船戰令曰雷鼔一通吏士皆嚴再通士伍皆就船整持櫓棹戰士各持兵噐就船各當其所幡鼔各隨將所載船鼔三通大小戰船以次發左不得至右右不得至左前后不得易處違令者斬通典曰水戰船濶狹長短隨用大小勝人多少皆以米為率一人重米二石其檝棹篙櫓帆席絙索深石調度與當船不殊又曰樓船船上建樓三重列女牆戰格樹幡幟開弩牕矛穴置抛軍壘石鐵汁狀如城壘忽遇暴風人力不能制此亦非便於事然為水軍不可不設以成形勢又曰蒙衝以生牛皮蒙船覆背兩廂開掣棹孔前后左右有弩牕矛穴敵不得迓矢石不能敗此不用大船務於速進乗人之不及非戰之船也又曰鬭艦船上設女牆可髙尺墻下開製棹孔舷内五尺又建栅與女墻齊棚上又建女墻重列戰敵上無覆背前後左右樹牙旗幡幟金鼔此戰船也又曰走舸舷上立女牆棹夫多戰卒少皆選勇力精銳者往返如飛鷗乗人之不及金旗鼔幟列之於上此戰船也又曰遊艇無女牆舷上置漿牀漿音將左右隨大小長短四大一牀對牀八尺㑹追至逥軍轉陣其疾如風虞候居之非戰船也又曰海鶻頭低尾髙前大后小如鶻之狀舷下左右一浮版形如鶻翅翼以助其船雖風濤漲天免有傾側覆背上左右張生牛皮為城玊旗金鼔如常法江海之中戰船也傅𤣥上都賦曰飛雲鷁首龍舟艅艎艨艟水城蜀艇吳航萬艘俱興雲帆齊張縣斾光天征鐸琳瑯凌波泝流星列鴈行吳都賦曰戎車盈於石城戈船掩於江湖亭障後漢書馬成代驃騎大將軍杜茂繕治障塞自西河至渭橋西河今勝州富昌縣至渭橋本名橫橋在今咸陽縣東西河上至安邑前漢書曰河上地名故秦内史髙帝時改為河上郡武帝分為左馮翊太原至井陘太原今幷州也井陘今屬常山郡常山今恒州也中山至鄴皆築堡壁起烽燧十里一候在事五六年帝以成勤勞徴還京師又曰盧芳與匈奴烏桓連兵冦盜尤數縁邊愁苦詔王覇將㢮刑徒六千人與杜茂治飛狐道飛狐道在今蔚州飛狐縣北通媯州懐戎縣即古之飛狐口也推石布土築起亭障自代至平城三百餘里晉書曰凉武昭王暠修燉煌舊塞東西二凉以防北虜之患築燉煌舊塞西南二圍以威南虜唐書曰竇靜檢校并州大總管以突厥頻來入冦請斷石嶺以為障塞詔從之又曰馬燧奏隴州刺史兼御史中丞州西有通道二百餘步上連峻山於吐蕃相直虜每入冦皆出於此燧乃按險易立石種樹以塞之下置二門上設譙櫓八日而功畢李抱玉入覲燧與俱來留京師久之代宗知其能召見拜商州刺史又曰李朝晟為邠州刺史奏方渠合破道水皆賊路也請城城以備之詔問須兵㡬何朝晟奏臣部下兵自可集事不煩外助復問前築鹽州凡興師七萬今何其易也朝晟曰鹽州之役成集諸蕃戎盡知之今臣境近虜若大興兵即蕃戎入冦冦則戰戰則無暇城矣今請密發軍士不十日至塞下未三旬而功畢蕃人始知巳無可柰何上從之巳事軍還至馬嶺吐蕃始乗障數日而退又曰貞元九年二月將城鹽州詔曰設險守國易象垂文有備無患先王令典况修復舊制安固封疆按甲息兵必在於此鹽州地當衝要逺介朔陲東逺寧夏西援靈武密邇延慶保障王畿乃者城池失守制備無據千里亭障烽燧不接三偶要害役戍其勤若非興集師徒繕修壁壘設攻守之具務耕戰之方則封内多虞諸華屢驚由中及外皆靡寧居深惟永圗豈忘終食顧以薄徳至化未孚既不能復前古之封致四夷之守與其臨事而重擾豈若先備而安休是用𢎞久逺之謀修五原之壘使邊城有守中夏克寧不有蹔勞孰能永逸宜令左右神䇿軍及朔方河中綘邠寧慶兵馬副元帥渾瑊朔方靈鹽豐綏銀節度都統杜希全邠寧節度使張獻甫左神䇿行營節度使邢君牙夏綏銀節度使韓潭鄜坊丹延節度使王栖曜振武麟勝節度使范希朝各於所部簡擇馬步將士合三萬五千人同赴鹽州左神䇿將軍張昌宜充右神䇿將軍鹽州行營節度使權知鹽州刺史杜彦光充鹽州刺史應所板築及縁修城雜役等宜共取六千人充其餘將士皆列布營陣戒嚴設備明加斥候以警不虞其修城板築攻役將士各賜絹布有差其鹽州防秋將士三年滿與代更加給賜仍委杜彦光具名聞奏悉與改轉其防遏將士等畢事便合放歸仍賜布帛有差其諸軍吏士都賜皁絹千疋朕情非為巳悉在靖人咨爾將相之臣忠良之士竭誠奉國陳力忘勞勉茂功勲永安疆場必集兵事實惟衆心各自率勵以副朕意初貞元中鹽州為吐蕃所䧟毁其城而去自是塞外無保障靈武勢隔西逼鄜坊甚為邊患故命城之二旬而畢又詔兼御史大夫叱干遂統兵五千與兼御史中丞史復澄杜彦光之衆戍之是役也上念將士之勞厚令度支供給又詔涇原劒南山南諸軍探討吐蕃以分其力由是板築之際虜無犯塞者及畢中外咸稱賀焉又曰范希朝為振武節度使振武有黨項室韋交居州阜凌犯為盜日久匿作謂之刮城門居人懼駭鮮有寧日希朝周知要害置堡栅斥候嚴密人遂獲安異蕃雖鼠竊狗盜必殺無赦戎冦甚憚之又曰元和中城臨涇城從涇原節度使叚祐之請也臨涇城直涇州西北九十里實險要之鎮從前因循不修常為犬戎所堡其界有青石嶺嶺多美土軍人耕穫為蕃冦掠奪祐請修築議者是非相半祐決城之功畢時方以為大利三國典畧曰齊司徒斛律光築吞周跨隴定畨三城於境上太平御覽卷三百三十四
