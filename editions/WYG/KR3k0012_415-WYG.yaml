body:
  text: 太平御覽卷四百一十五宋李昉等撰人事部五十六孝女史記曰淳于緹縈者齊人也父淳于公為太倉令生女五人縈最小父犯死罪當刑乃罵其女曰生女不生男緩急非有益也縈自傷涕泣隨父至長安詣北闕上書曰妾父為吏齊中皆稱㢘平今坐法當刑妾傷死者不可復生刑者不可復屬雖欲改過自新其道無由妾願没為官奴以贖父之刑使得自新漢文帝憐悲其意原其父罪漢書曰東海有孝婦寡無子養姑甚謹姑欲嫁之終不肯姑告鄰人曰孝婦養我勤苦我老久累于壯奈何其後姑自縊死姑女告曰婦殺我母吏捕孝婦自經服罪于公以為此婦養姑孝聞必不殺也太守不聽于公爭之不能得乃抱其獄哭於府上因辭疾去遂殺孝婦郡中枯旱三年後太守至于公曰孝婦不當死前太守强斷之當在是乎於是太守殺牛自祭婦塜天立大雨後漢書和熹鄧皇后諱緩太傅禹之孫也父訓䕶羌校尉母隂氏光烈皇后從弟女也后年五歳太傅夫人愛之自為剪髪夫人年高目瞑誤傷后額忍痛不言左右見者怪而問之后曰非不痛也太夫人哀憐為斷髪難傷老人意故忍之耳晉書曰衛瓘及禍太保主簿劉繇等冐難收瓘而葬之楚王偉之伏誅也瓘女與國臣書先君名諡未顯無異凡人每怪一國蔑然無言春秋之失其咎安在悲憤感慨故以示意繇等執黄幡撾登聞鼓上言又曰㑹稽寒人陳氏有三女無男祖父母年八九十老無所知又篤癃病毋不安其室遇寒饑女相率於西湖採菱更日至市貨賣未嘗虧怠鄉里稱為義門多欲取為婦長女自傷㷀獨誓不肯行祖母尋相繼卒三女自營殯葬為菴舎屋墓側又曰永興概中里王氏女年五歳得毒病兩目皆盲性至孝年二十父死臨屍一叫眼皆血出小妹娥䑛其血左目即開時人稱為孝感唐書曰劉寂妻夏侯氏滑州胙城人字碎金父長雲為鹽城縣丞因疾喪明碎金遂求離其夫以終侍養經十五年兼事後母至以孝聞及父卒毁瘠殆不勝喪披髪徒跣負土成墳廬於墓側毎日一食如此者積年貞觀中有制表其門閭賜以粟帛又曰于敏直妻張氏營州都督晥城公儉之女也數歳時父母微有疾即觀察顔色不離左右晝夜省侍宛若成人及稍成長恭順彌甚適延壽公于欽明子敏直初聞儉有疾便即號踴自傷期於必死儉卒後㓙問至號哭一慟而絶高宗下詔賜物百段仍令史官編錄之又曰楊紹宗妻王氏華州華陰人也初年二歳所生母亡為繼母鞠養至年十五父又征遼而没繼母尋亦卒乃收所生母及繼母屍柩並立父形像招魂遷葬訖又廬於墓側陪其祖母及父墳永徽中詔曰故楊紹宗妻王氏因心為孝率性成道年廹桑榆筋力衰謝以徃在隋時父沒遼西招魂遷葬負土成墳又葬其祖父母等竭此老年親加板築痛結晨昏哀感行路永言志行嘉尚良深宜標其門閭用旌敏徳賜物三十段粟五十石又曰孝女賈氏濮州鄄城人也始年十五其父為宗人元基所害其弟强仁年幼賈氏撫育之誓以不嫁及强仁成童思其報復乃候元基殺之取其心肝以祭父墓遣强仁自列於縣有司斷以極刑賈詣闕自陳已為請代强仁死高宗哀之特制賈氏及强仁免罪移其家於洛陽又曰汴州李氏孝女年八歳父卒柩殯在堂十餘載毎日哭泣無限及長母欲嫁之遂截髪自誓請在家終養及喪母號毁殆至滅性家無丈夫自營棺槨州里欽其至孝送葬者千餘人葬畢廬於墓側蓬頭跣足負土成墳手植松柏數百株季昶列上其状制特表其閭賜以粟帛顔氏家訓曰張建女三歳喪母靈牀上屛風平生舊物屋漏沾濕出曝曬之女子一見伏牀流涕家人怪其不起乃往抱薦蓆淹潰精神傷沮不能飲食將以問醫醫胗脉云女腸斷矣因爾便吐血數日而亡中外憐之莫不悲歎宣州圖經曰宛陵管氏女名瑶年十七與母同寢母為虎所負去瑶哀呌隨之因囓虎耳墮方捨其母瑶即負母歸家氣絶武帝表其門以旌孝行王韶之孝子傳曰周青東郡人母疾積年青扶持左右四體羸痩村里乃斂錢營助湯藥母痊許女同郡周少君少君疾病未獲成禮乃求青母見青以託其父母青許之俄而命終青供奉十餘年公姑感之勸令更嫁青誓以匪石後公姑並自殺姑女告青害殺縣收拷捶遂以誣款七月刑青於市青謂監殺曰乞樹長竿繫白幡青若殺公姑血入泉不殺者血上天血乃緣旙竿上天宋躬孝子傳曰賈恩㑹稽諸暨人也母亡在殯為灾火所燒恩及妻栢號哭赴火火及不去隣近救助棺器得免恩栢二人髪膚燋烈須㬰俱死元嘉四年牓門曰孝蠲役三世師覺授孝子傳曰北宫氏女嬰兒子者齊人也無兄弟而父母老遂撤其環瑱誓不適人以奉養父母國人聞之莫不相率以孝請女為趙王后齊使候問使者曰北宫氏女嬰兒子無恙耶撤其環瑱至老不嫁以養父母此助王率民出於孝者也齊王聞之表其門以顯異焉異苑曰順陽南鄉縣楊豐與息女香於田穫粟豐因穫為虎所噬香年甫十四手無寸刃乃搤虎頸豐因獲免香以誠孝至感猛獸為之逡巡太守平昌孟肇之賜貸穀旌其門閭焉列女傳曰陳寡孝婦者陳之寡婦人也年十六而嫁未有子其夫當從戍屬孝婦曰我有老母吾不還汝肯善視吾母乎婦曰諾夫果死婦養姑不衰父母將嫁之孝婦曰受人之托豈可棄哉因欲自殺父母懼不敢嫁之養姑二十八年姑年八十四夀乃盡賣其田宅以葬之列女後傳曰珠崖二義者珠崖令之後妻及前妻女也女名初生十三珠崖多珠繼母連大珠以為係臂及令死當送喪還法内珠於奩入闗者死繼母棄之其子男九歳取之置其母鏡奩中皆不知也及闗闗候捜索得珠奩中吏曰誰當坐者初謂是其繼母取之乃白曰君不幸夫人解係臂棄之初心惜之取置夫人鏡奩中夫人不知也母亦謂實然憐之乃曰此珠妾之係臂也君不幸妾解之心不忍棄而置鏡奩中妾當坐因皆哭哀動傍人闗吏執筆書劾不能就一字闗候垂涕終日不能忍乃曰母子有義如此吾寜可坐之不忍加文後訪訊乃九歳男兒内焉又曰酒泉龎孝娟者趙君安之女也名娥親君安為同縣李夀所殺而娥親兄弟三人一時病亡夀乃喜而自賀以為莫已報也娥親聞之隂思欲以報壽備兵以伺壽十數年於縣門前斫殺壽訖詣縣自首守長義之解印綬去欲從娥親娥親曰讎怨殺身妾之分治獄制罪君之常理何敢苟生以枉公法後遇赦得免太常張奐聞嘉之禮以束帛又曰潁川公孫何者孫氏之女年十三怨家報其父父走得免何與母俱亡母先得讎人甚悅爭欲取心何便馳出叩頭涕泣曰老母常有篤疾垂沒之人安足殘戮以塞忿哉我是其兒父母所憐不如殺我遂殺之而捨其母㑹稽典錄曰孝女曹娥者上虞人父旴能弦歌為巫五月五日於縣泝江濤迎婆娑神溺死不得屍骸娥年十四歳乃緣江號哭晝夜不絶聲旬有七日遂投江而死縣長改葬娥於道傍為立碑焉益部耆舊傳曰孝女雄者犍為人父泥和為縣功曹縣長遣泥和拜􅊾謁郡太守乘船墮湍水物故屍喪不歸雄號泣晝夜心不圖存所生男二人並數歳乃各為作囊盛珠環以係兒臂數為訣别之辭家人每防閑之經百許日後稍懈雄因乗小船於父墮處慟哭遂自投水死弟賢其夕夢雄告之却後六日當共父出至期伺之果與父相持浮於江上郡縣長表言為雄立碑圖像其形焉續述征記曰梁鄒城西有籠水發源長城山直北流於梁鄒西注濟或云濟之孝婦誠感神明湧泉發室内事具水部晏子春秋曰景公所愛槐令吏守之犯槐者刑傷之者死有不聞命遇而犯之者吏收而拘之將加罪焉其女子往晏子之家説曰賤妾請有道於相國妾聞明君不為禽獸傷人今君以樹木之故殺妾父孤妾身恐害明君之政損明君之義晏子明日早朝而復於君公令吏罷守槐之役出犯槐之囚紀聞曰吳宣城郡青陽縣有梅根冶孝女李娥廟居㑹阜之巔林木秀茂周廻十里土人不敢樵採敬而事之日薦蘋藻娥父吳大帝時為鐵官冶以鑄軍器一夕鍊金鑪竭而金不出時吳方草創法令至嚴諸耗折官物十萬即坐斬倍又沒入其家而娥父所損折數過十萬娥年十五痛傷之因火烈遂自投于爐中赫然屬天於是金液沸湧溢於鑪口娥所躡二履浮出於鑪身則化矣其金汁塞鑪而下遂成溝渠泉注二十里入于江水其所收金凡億萬斤溝渠中鐵至今仍存故吳俗每治銅鐵必先為娥立祠享而祈福歙州圖經曰章頊歙縣合陽鄉人也妻程氏與二女入山採藥程為暴虎銜囓去二女寃呌挽其衣裙與虎爭力虎乃捨之程由是獲全時刺史劉賛嘉之給湯藥蠲户稅改鄉為孝女宣室志曰鄭邯耕民也天寶中母病人教令啖杏實可愈其妻楊氏曰此非時之物須勞苦以求之冀上天哀憫而賜子其傭耕侍疾吾欲徧於邑里訪之庶比於解叔謙丁公藤之感也乃至鄰郡易君子之衣而行忽於道傍莾穢中見一杏實悲喜再拜取之潔滌而歸奉其姑曰他郡有人憫其事遺此一實姑喜食之疾漸瘳明年夏忽一日雷風甚動其室廬殷殷不斷若在簷宇里人驚慴遁去者不可勝記楊氏泣告其姑曰去冬以莾穢中杏實奉姑終為郡人所遺今天將謫妾以死從此别矣乃伸臂黙於庭具訴其事詞未畢忽有聲若發其庭者雲物隂晦黙不可辨既而楊氏覺其臂若捧千金重莫能舉久方開霽乃視之有二金龍長數尺蟠遶其左右臂龍頂上有字曰賜楊氏自是其家日豐至為富室太平御覽卷四百一十五
