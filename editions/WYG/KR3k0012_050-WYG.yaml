body:
  text: 太平御覽卷五十宋李昉等撰地部十五隴塞及海外諸山隴山小隴山朱圉山契吳山可監山門石山燕然山天山祁連山焉支山勿居山臨松山三危山羊鶻山西王母樗蒲山九隴山鴻鷺山沙角山葱嶺巫咸山懸度山頭痛山鐵山青山石崖山䟽屬山侖山蛇山東口山流波山鈎吾山天臺山鵲山小次山長古山基山猥翼山峚山亶受山耆闍窟山靈鳥山隴山説文云隴山天水坂也辛氏三秦記引俗歌云隴頭流水鳴聲幽咽遥望秦川肝腸斷絶酈道元水經注云縣西山謂之小隴岩障髙嶮不通軌轍故張衡四愁詩云我所思兮在漢陽欲往從之隴坂長是也周地圗記云其山髙處可三四里登山東望秦州可五百里目極泯然墟宇桑梓與雲霞一色其上有懸溜吐於山中為澄潭名曰萬石潭流溢散下皆注於渭東人西役升此而望故鄉莫不悲思其歌云隴頭流水流離四下念我行役飄然曠野登髙望逺涕零雙墮是此山也小隴山三秦記曰小隴山一名隴坻又名分水嶺漢書揚雄解嘲云響若坻頽應劭曰天水有大坂名隴山其旁有崩落者聲聞數百里故曰坻頽又曰其坂九廻上者七日乃越上有清水四注下有隴縣因此水而名朱圉山漢書地理志曰天水冀縣有朱圉山一名岩山在縣城南十三洲志云朱圉有石鼓不擊自鳴則兵起契吳山凉州記曰契吴山在縣北七十里赫連勃勃北遊契吳而嘆曰美哉斯阜臨廣澤而帶清海吾行地多矣自嶺以北大河以南未有若斯之壯麗也可監山凉州記曰可監山一名都盧山皆涇水源與笄頭山連亘赫連定勝光二年畋于凉州登可監山望統萬城泣曰先帝若以朕承大業豈有今日在平凉縣縣接百泉界又云定據平凉登此山有羣狐繞之而鳴射之竟不得一定乃歎曰咄此亦怪事也石門山酈道元水經注灕水又東經石門口山髙嶮峻絶對岸若門故以得名疑即臯蘭山門也漢武元狩三年驃騎將軍霍去病出隴西至臯蘭謂是山之關塞矣燕然山漢書曰貳師將兵還至燕然山單于知漢軍勞倦自將五萬騎遮擊貳師軍大敗范蔚宗後漢書竇憲與單于戰於稽落山大破之降者前後二十餘萬人遂登燕然山去塞三千餘里刻石勒碑令班固作銘天山漢書曰漢使貳師將兵三萬騎出酒泉擊右賢王於天山得首數萬級而還又且西彌國王治天山東大谷去長安八千六百七十里續漢書曰竇固出塞至天山斬首千餘級水經注曰隂山故郎侯應言扵漢曰隂山東西一千餘里單于之苑囿也自武帝出師攘之於北漠匃奴過之未嘗不哭謂失此山也西河舊事曰天山髙冬夏常雪故曰白山山中有好木鐡匈奴謂之天山過之皆下馬拜在蒲海東一百里即漢貳師擊右賢王之處也山海經曰天山多金玉有雄黄莢水出焉而西流注於湯谷有神鳥状如黄囊赤如丹火六足四翼渾沌無面目是識歌舞實惟帝江九州要記曰凉州古武都有天山黄帝受金液神丹於此山山近崆峒山山頂有魏太祖馬埒焉祁連山漢書曰霍去病撃匈奴至祁連山濟居延水遂臻小月氐西河舊事曰祁連山在張掖酒泉二界焉支山在刪丹故縣東西百餘里南北二十里亦宜六畜匃奴失二山乃歌曰亡我祁連山使我六畜不蕃息失我焉支山使我婦女無顔色凉州記曰祁連山張掖酒泉二界之上東西二百里南北百餘里山中冬温夏凉宜牧牛乳酪濃好夏日酪不用器物刈草著其上不散酥特好酪一斛得升餘酥又有仙人樹行人山中飢渴者輙食之飽不得持去平居不可見焉支山漢書曰霍去病將萬騎出隴西涉孤奴水過焉支山千有餘里執渾邪王收休屠祭天金人凉州記曰焉支山在西郡界東西百餘里南北二十里有松柏五木其水草茂美宜畜牧與祁連同一名刪丹山勿居山後魏書曰張襄從太祖破賀訥登勿居山聚石為峰以記功徳命襄為文臨松山十六國春秋曰西晋元嘉元年張掖臨松山有石如張掖字掖字漸滅張字分眀又有文曰初祚天下西方安萬年後魏太和中置臨松郡故城在此山下臨松山一名馬蹄山又云丹松嶺三危山河圗括地象曰三危山在鳥鼠之西南與汶山相接上為天苑星黒水出其南西河舊事曰三危山有三峯故曰三危俗亦謂昇雨山在縣南二十里尚書禹貢謂竄三苗于三危又云導黑水至于三危入于南海西山經曰三危之山青鳥居之三青鳥主西王母取食者别自栖息于此山也羊鶻山叚國沙州記曰羊鶻山多岩石少樹木甚似魯國南鄒山傍山北行三十里逺眺顧瞻百里但見峻嶺巉岩無尺木寸草西王母樗蒲山崔鴻十六國春秋曰甘松山東北又二百里有西王母樗蒲山大有神驗江水出焉叚國沙州記曰羊鶻嶺東北二百里有大山遙望甚似東岳岱山極髙大嶮峻頗有靈驗西𦍑父老傳云是西王母樗蒲山九隴山周地國記曰昔有神人坐張掖西方上山西射酒泉郡西金山之白神射得九籌畫北山上遂成九隴因以為名鴻鷺山穆天子傳曰天子循黒水至于璧玉之山謂此也今名為鴻鷺山以多鴻鷺所棲也沙角山三秦記曰河西沙角山峰岩危峻逾於石山其沙粒麄有如乾糒又山之陽有一泉云是沙井泉厯今古沙不填之人欲登峰必步下入穴即有鼔角之音震動人足又西山舊事云沙洲天氣晴朗沙鳴聞於城内又云人逰沙山或結侣少或不曾逰必生怖懼莫敢前沙或随人足自頓下經宿却自還山上在縣西七里亦名鳥沙山葱嶺漢書曰西域三十六國有葱嶺其河兩源一源出葱嶺山一出于闐國在南山下其河北流與葱嶺河合廣志曰葱嶺山其上生葱茂于常葱西域諸國志曰葱嶺髙十二日可至頂巫咸山西域志曰巫咸山一名覆莫山水經注曰鹽水西出經巫咸山北山海經曰巫咸山之神以右手操青蛇左手操赤蛇在葆登羣巫所從上下也又大荒西經云大荒之中有靈州巫咸即巫朌巫彭巫姑巫直巫抵巫謝巫羅十里巫從此昇峰百藥爰在郭璞註云羣巫山下靈仙採藥往來也蓋神巫所逰故以得名懸度山漢書曰烏秅國有懸度山者谿谷不通以繩索相引而度頭痛山漢書曰杜欽説大將軍王鳳曰罽賔國自知絶逺兵不可至道厯大頭痛山小頭痛山赤土身熱之坂道狹者尺六寸長徑三十里漢書曰罽賔國厯大頭痛山有三池盤石坂道狹者尺六七寸繩索相引乃度廣志曰大頭痛山小頭痛山皆在罽賔東鐵山漢書曰莎車國有鐵山出青玉穆天子傳曰天子西征至剞居議切閭氏乃命剞閭氏供飬六師之人于鐵山之下天子祭鐵山青山水經注曰北地富平縣西河側有兩山相對水出其間即上河峽也世謂之青山河水厯峽北注支分東出也石崖山水經注曰塞外厯城有石崖山西去北城五百里山石且自然有文畫獸馬之状粲然成著頗似圗冩故亦謂之畫石山䟽屬山山海經曰貳負之臣曰危與貳負殺窫窳帝乃梏之䟽屬之山梏繫縳也桎其右足桎械也反縛兩手與髪約髪合縳之也繋之山上磐石之下在開題西北漢宣帝時使人鑿上郡發磐石石室中得一人徒倮被髪反縳械一足時人不識乃載之于長安帝以問羣臣羣臣莫能知劉子政案此言之宣帝大驚于是時人争學山海經矣論者多以為是其尸像非真體也意識者以為靈怪變化難以理測物禀異氣出于自然不可以常理推之可以近較察之矣魏時有人發周靈王冢得殉𦵏女子不死至數日而有氣數日而能言状如二十許女子而人送詣京師郭太后愛飬之恒不離左右十餘年太后崩哀思哭泣一年餘而死即此類也侖山音論山海經曰侖山者其山上有金玉下多青雘有木状如殻而赤理其汁如漆其味如飴食者不飢可以釋勞其名曰白若或作臯蘓臯蘓一名白若見廣推可以血玉血謂可以染玉作光彩也蛇山山海經曰北海之内有蛇山有水出焉東入于海入于海有五采之鳥飛蔽之漢宣帝元康元年五色鳥以萬數飛屬即此鳥五采之鳥名曰鷖鳥鳳屬也離騷曰駟玉虬以乘鷖兮東口山山海經曰東口之山君子之國其人衣冠帶劍役使虎豹好謙譲有司幽之民帝俊生星龍星龍生思幽思士不妻思女不夫言其人直思而氣通魄合而生子此莊子所謂白鶴相視眸子不運而風化之類也食黍食獸是使四鳥流波山山海經曰東海中有流波山入海七十里其上有獸状如牛蒼身而無角一足入水則必有風雨其光如日月其音如雷名曰䕫黄帝得之以其皮作鼓厥以雷獸之骨雷獸則雷神獸龍身厥擊也聲聞五百里以威天下鈎吾山山海經曰鈎吾山其上多金其下多銅有獸焉羊身人面而目在掖下虎齒人爪其音如嬰兒名曰􅭼號食人左傳所謂饕餮也天臺山山海經曰大荒之中有山名曰天臺海水入焉鵲山山海經曰鵲山其首中曰招搖臨于大海之上多桂桂葉似杜把長尺餘味辛白花叢生山間無雜木吕氏春秋曰招揺之桂是也多金玉有草木其状如韭而青花其名曰祝餘或作程茶食之不飢有木焉其状如穀而黒理穀楮也皮作紙其花四照言有光燄也若木花赤光照下見赤亦此類也見離騷註其名曰迷穀佩之不迷小次山山海經曰小次山山上多有玉下多銅有獸如猨白首赤足名曰未厭見則有大兵長古山山海經曰長古之山無草多木有獸焉状如􅀢而四耳名長古因山出此獸故名之音如吟如人呻吟聲見則郡縣大水基山山海經曰基山其陽多玉其隂多金多怪木有獸焉其状如羊九尾四耳其目在背其名曰猼訑摶施二音有鳥焉其狀如雞而三首六目六足三翼其名曰􅡀􅝐食之無卧猥翼山山海經曰猥翼山其中山多怪獸水多怪魚凡言怪者皆為状貎竒崛不常也尸子云徐偃汶水而得怪獸爭列於庭峚山峚音宻山海經曰峚山山上多丹木員葉赤莖黄花赤實味如飴食之不飢丹水出焉西注稷澤后稷神所憑因名其中多白玉膏其源沸沸湯湯玉膏涌出之聲也河圗云少室山有白玉膏服即仙矣亦此類也黄帝是食饗所以得登龍於鼎湖而靈化也是生𤣥玉言膏玉中又出黒玉也玉膏所出以灌丹木丹木五嵗五色乃清言鮮潔也五味乃馨言滋香也黄帝取峚山之玉榮謂玉華也而投之鍾山之隂以為玉種瑾瑜之玉為良玉也堅栗精宻禮記縝宻以栗或作粟玉有粟文所謂榖璧也潤澤有光澤謂潤澤也五色發作以剛以柔天地鬼神是食是饗玉所以為祈祭者言能動天地感鬼神也君子服之以衛不祥今徼外出金剛石石屬似金有光彩可以刻玉外國人帶之云辟惡氣也亶受山山海經曰亶受山多水無草木不可以上言崇峭也有獸焉其状如狸而有髪其名曰類或作施自為牝牡食者不妬莊子亦曰類自為雌䧺如今狟猪亦雌雄也耆闍窟山法顯記曰耆闍窟山未至頂三里有石窟佛本于此坐禪天魔波旬化作雕燕住窟前以恐阿難佛以神力隔石舒手摩阿難頂怖即得止鳥跡手文今悉在故名雕燕窟山前有四佛坐處靈鳥山支曇譚靈鳥山銘序曰昔始來逰王舎城憇靈鳥山舊云其山峰似鳥而威靈故以為名焉衆美咸歸壮麗畢備太平御覽卷五十
