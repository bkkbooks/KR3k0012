body:
  text: 太平御覽卷三百二十四宋李昉等撰兵部五十五招降詐降招左傳曰魯叔弓帥師圍費弗克敗焉為費所敗平子怒令見費人執之以為囚俘冶區夫曰非也區夫魯大夫也若見費人寒者衣之饑者食之為之令主而供其困乏費來如歸南氏亡矣人將叛之誰與居邑若憚之以威懼之以怒人疾而叛為之聚也若諸侯皆然費人無歸不親南氏將焉入矣平子從之費人叛南氏史記曰漢髙帝初陳豨反於代帝自徃擊之至邯鄲喜曰豨不南據漳水北守邯鄲知其無能為也因問周昌曰趙亦有壯士可令將者乎對曰有豨將王黃曼丘臣其麾下受購賞之故皆生得以故豨遂敗為樊噲軍卒追斬於州丘見四人四人謁帝慢罵曰豎子能為將乎四人慙伏帝封之各千户以為將左右諫曰從入蜀漢伐楚功未遍行今此何功而封帝曰非汝所知陳豨反邯鄲以北皆豨有吾以羽檄徵天下兵未有至者今唯獨邯鄲中有此耳吾胡愛四千户封此四人以慰趙子弟皆曰善漢書西南夷傳曰陸賈至南越越王恐頓首謝罪願奉明詔長為藩臣奉貢職於是下令國中曰吾聞兩雄不俱立兩贒不並世漢皇帝賢天子自今以後去帝制黄屋左纛後漢書曰岑彭與大司馬吳漢等圍洛陽數月朱鮪等堅守不肯下帝以彭嘗為校尉令徃説之鮪在城上彭在城下相勞苦歡語如平生彭因曰彭徃者得執鞭侍從􅂪薦㧞擢常思有以報恩今赤眉已得長安更始為三王所反皇帝受命平定燕趙盡有幽冀之地百姓歸心賢俊雲集親率大兵來攻洛陽天下之士逝其去矣公雖嬰城固守將何待乎嬰繞也謂以城自嬰繞而守之鮪曰大司徒被害時鮪要城固與其謀與音預又諌更始無遣蕭王北伐自知罪深彭還具言於帝帝曰夫建大事者不忌小怒鮪今若降官爵可保况誅罰乎河水在北吾不食言指河水為信言其明白也彭復往告鮪鮪從城上下雲索曰必信可乗此上彭趣索欲上趣向也鮪見其誠即許降後五日鮪將輕騎詣彭顧勑謂部將曰堅守待我若不還諸君徑將大兵上轘轅歸郾王尊更始傳尹為郾王乃面縛與彭俱詣河陽東觀記曰詣行在所河津亭帝即解其縛召見之復令彭夜與鮪歸城明旦悉其衆出降拜鮪為平狄將軍封扶溝侯蜀志曰關雲長圍魏樊城留兵將備公安及郡吳將吕蒙襲之兵到南郡南郡守將糜芳降蒙入據城盡得雲長將士家屬蒙皆撫慰約令軍中不得干厯人家有求取軍中震慄道不拾遺蒙朝暮使親近存恤耆老問所不足病疾者給醫藥饑寒者賜衣糧凡府藏財寶皆封閉以待吳主孫權蜀兵將還數使人與􅂪相聞􅂪輙厚遇其使周旋城中家家致問或手書示信其使還私相叅訊咸知家門無恙見待過於平時吏士因無鬭心㑹權至雲長於是率衆走交城西至漳鄉衆皆委兵而降三國典畧曰梁蕭乾字思惕梁秘書監子範之子容止雅正志性恬簡善𨽻書得叔父子雲之法閩中豪帥反叛陳武謂乾曰陸賈南征趙佗歸順隨何奉使黥布來臣追想清風髣髴在目乃令乾徃使諭以逆順渠帥並即欵附北史曰魏可朱渾元歸齊神武聞其來遣平陽太守髙崇持金環一枝賜元并運資糧候接隋書曰劉權為廣南太守行至鄱陽㑹羣盗起不得進詔令權召募討之權率兵與賊相遇不與戰先乗單騎詣賊營説以利害而羣賊感悦一時降附帝聞而嘉之又曰開皇末桂州俚李光仕聚衆為亂詔何稠召募討之師次衝嶺遣使者諭其渠帥洞主莫崇解兵降桂州長史王文周鏁崇以詣稠所稠宣言曰州縣不能綏飬致使邊民擾叛非崇之罪也乃命釋之引崇共坐并從者四人為設酒食遣之崇大悦歸洞不設備稠至五更掩入其洞悉散俚兵以臨餘賊象州逆帥杜條遼羅州逆帥龎靖等相降欵又曰仁夀初山獠作亂出衛𤣥為資州刺史以鎮撫之𤣥既至官時獠攻圍大牢鎮𤣥單騎造其營謂羣獠曰我是刺史䘖天下詔安飬汝等勿驚懼也諸賊莫敢動於是説以利害渠師感悦解兵而去前後歸附者十餘萬口髙祖大悦賜縑二千疋除遂州總管仍令劒南安撫唐書曰馬燧討李懐光自京師與渾瑊駱元光韓逰懷合軍次于長春宫懷光令驍將徐廷光以精卒六千守城兵械甚嚴燧度長春不下則懷光自固攻之則矌日持久死傷必甚乃挺身至城下呼廷光廷光素懼燧威名拜於城上燧度廷光心已屈乃謂曰我來自朝廷可西面受命廷光復西拜又曰公等皆朔方將士禄山已來首立大勲四十餘年功伐最髙柰何棄祖父之勲力為滅族之計耶從吾言非止免罪富貴可圖也賊徒皆不對燧又曰爾以吾言不誠今相去數歩爾當射我乃披襟示之廷光感泣俯伏軍士亦泣光一日賊將尉珪率兵二千以焦離堡降燧廷光道既絶乃因率其下出降燧乃以數騎徑入城處之不疑莫不畏服衆大呼曰吾復得為王人矣渾瑊私歎謂叅佐曰瑊謂馬公用兵與僕不相逺但恠累敗田悦今覩行師料敵僕不逮逺矣又曰曹王皋為衡州刺史初湖南團練使辛京杲遣將軍王國良鎮武岡京杲侵刻之又虐其士卒國良以兵叛因據山河守險刼行旅以自給詔徵荆南江西黔桂兵誅之二嵗不下乃以皋為潭州刺史湖南都團練使皋率諸事至武岡國良阻險兵不得進􅆏乃謂諸軍曰國良怨京杲刻害本非反也其情易不如降之乃三遺之書國良因謂降未得其情皋曰其心屈矣乃捨軍自稱使者乗扁舟直造其壘曰曹王也國良遂出降又曰于邵為巴州刺史時嵗儉夷獠相聚山澤為盗數千百人來圍州城邵撫勵州兵與之拒戰凢旬有二日間遣使説諭示以善惡山盗邀邵出乃以儒服出城致之不疑因皆降之又曰范希朝為朔方莭度使至靈武突厥别部有沙陀者北方推其勇勁希朝誘致之自甘州舉族來歸衆且萬人其後以之討賊所至有功降左傳曰蔡穆侯將許僖公以見楚子於武城許男面縳銜璧大夫衰絰士輿櫬楚子問諸逄伯對曰昔武王尅殷㣲子啓如是武王親釋其縳受其璧焚其櫬禮而命之使復其所楚子從之史記曰楚莊王圍鄭三月剋之入自皇門鄭伯肉􅃝牽羊以逆曰孤實不天不能事君懷怒以及敝邑孤之罪也敢不唯命是聽又曰周武王伐紂剋殷㣲子乃持其祭噐於軍門肉袒面縳左牽羊右把茅膝行而前以告於是武王乃釋㣲子復其爵後漢書曰武都㕘狼羌為㓂殺長史馬援將四千餘人徃擊之不與戰羌遂窮困悉降又曰陳宫降曹操曰奈卿老母何宫曰老母在公不在宫也夫以孝治天下者不害人之親操復曰奈卿妻子何宫曰聞覇王之主不絶人之嗣因請就刑遂出不顧操為之涕泣遂殺之傳首許市又曰耿秉與竇固至車師後王安得震怖從數百騎出迎秉與固司馬蘓安欲全功歸固即馳謂安得曰漢貴將獨有奉車都尉天子姊壻固尚光武女陽公主明帝妹也爵為通侯當先降之安得乃還更令其諸將迎秉秉大怒被甲上馬麾其精騎徑造固壁言曰車師王降訖今不至請徃梟其首固大驚曰且止將敗事秉厲聲曰受降如受敵遂馳赴之安得惶恐走出門脱㡌抱馬足降束觀記曰脱㡌趨鳴馬蹄也秉將以詣固其前王亦歸命遂定車師而還又曰太山賊叔孫無忌等暴橫一境州郡不能討衛羽説第五種曰中國安寧忘戰日久而太山險阻冦猾不制今雖有精兵難以赴敵羽請譬降之種敬諾羽乃徃備説禍福無忌即帥其黨與三千餘人降又曰劉盆子遣劉恭乞降曰盆子將百萬衆降陛下何以待之帝曰待汝以不死耳樊崇乃將盆子及丞相徐宣以下三十餘人肉袒降上得所傳國璽綬更始七尺寳劒及玊璧各一積兵甲宜陽城西與熊耳山齊又曰龎雄與梁慬及耿种歩騎萬六千人攻虎澤連營稍前單于惶怖遣左奥鞬曰遂王詣慬乞降慬乃大陣兵受之單于脱㡌徒跣面縳稽顙納質又曰岑彭與嚴説共守宛漢兵攻之數月城中糧盡人相食彭與説舉城降諸將欲斬之大司徒伯升曰彭郡之大吏執心堅守是其節也今舉大事當表義士不如封之以勸其後更始乃封彭為歸德侯又曰班超復使西域是時于闐王廣德新攻破莎車逐雄張南于闐國去長安九千七百七十里南與始羌西與始墨莎車國去長安九千九百五十里西域南北有大山中央有河東西六千餘里東至玉門陽關有兩道從鄯善傍南山北渡河西行至莎車為南道雄張猶盛也張音丁亮反波傍也波音詖而匈奴遣使監護其國超既西先至于闐廣德禮意甚疎且俗信巫言神怒何故欲向漢使有騧馬急求取以祠我廣德乃遣使就超請馬續漢書及華橋書騧字並作騩説文馬淺墨色也音京媚反超密知其狀報許之而令巫自來取馬有頃巫至超乃斬其首以送廣德因辭讓之廣德素聞超在鄯善誅滅虜使大惶恐即攻殺匈奴使者而降超重賜其王以下因鎮撫焉又曰張步戰敗退保平壽今青州北海縣蘇茂將萬餘人來救之茂讓步曰以南陽兵精延岑善戰而耿弇走之奈何就攻其營既呼茂不能待耶步曰負負無可言者負愧也再言之者愧之甚帝乃遣使告步茂能相斬降者封為列侯步遂斬茂使奉其首降又曰田戎聞秦豐被圍懼大兵方至欲降而妻兄辛臣諌戎曰今四方豪傑各據郡國洛陽地如掌耳續漢書曰辛臣為戎作地國圖彭寵張步董憲公孫述等所得郡國云洛陽所得如掌耳不如按甲以觀其變戎曰以秦王之强猶為征南所圍豈况吾耶降計决矣四年春戎乃留辛臣守夷陵自將兵沿江泝沔止黎丘刻期曰當降而辛臣於後盜戎珍寶從間道先降於彭而以書招戎戎疑必賣已遂不敢降東觀記云戎至期日灼龜卜降兆不中折遂止不降而反與秦豐合彭出兵攻戎數月大破之吳書曰壬申王璿受皓之降命解縛焚櫬近請相見晉陽秋曰濬平吳濬收其圖籍領州四郡三十三縣三百一十三戸五十二萬三千男女口二百三十萬後宮五千餘人晉書曰樊雅據譙郡祖逖使桓宣説之雅與宣置酒結友遣子隨宣詣逖少日雅便自詣逖逖遣雅還撫其衆僉謂前數罵辱逖懼罪不敢降雅閉城自守逖往攻之復遣宣入説雅即斬異己者遂共出降又曰建興中陳聲聚諸無頼二千餘家斷江抄掠陶侃遣朱伺為督護討聲衆雖少伺容之不擊聲求遣弟詣侃降伺外許之及聲去伺仍遣勁勇要聲弟斬之潛軍襲聲正旦並出祭祀飲食伺軍入其門方覺聲將閻晉鄭進皆死戰伺軍人多傷乃還營聲東走保董城伺又率諸軍守之遂重柴繞城作髙櫓以勁弩下射之又斷其其水道城中無水殺牛飲血閻晉聲婦弟也乃斬聲首出降又曰桓温伐蜀軍次天彭使叅軍周處孫盛守輜重自將歩卒直詣成都李勢使其叔父福及從兄權等攻彭模處等禦之福退走温反擊權等三戰三㨗賊衆散自間道歸成都勢於是悉衆與温戰于笮橋叅軍襲護戰沒衆懼欲退而鼓吏誤鳴進鼓於是攻之勢衆大潰温乗勢直焚其小城勢遂夜遁九十里至晉夀葭萌城其將軍鄧嵩咎堅觀勢降乃面縳輿櫬請命温解縳焚櫬送于京師温停蜀三旬舉賢旌能百姓大悦齊書曰始興王鑑鎮益州益州刼帥韓武方棠聚黨千餘人斷流為暴郡縣不禁行旅斷絶鑑行至上明武方乃出降長史虞悰等咸請殺之鑑曰武方為暴積年所不能制今降而被殺失信且無以勸善於是啓臺果被宥自巴西蠻夷兇惡皆望風降附三國典畧曰侯景黨儀同三司馬世雲率其所領降于慕容紹宗仍以鐵騎五千夾擊景景謂其衆曰汝軰家口髙登悉已殺之努力何慮無妻子待向江東當還入鄴用汝軰悉作本州刺史衆信之紹宗遥呼曰爾舉家悉在但能歸來官勲如舊乃被髪向北斗以誓之於是景衆大潰爭赴渦水為之不流後周書曰武帝平齊齊王至帝降自阼階以賔主之禮相見髙湝在冀州擁兵未下遣上柱國齊王憲與柱國隨公楊堅率軍討平之齊定州刺史范陽王髙紹義叛入突厥齊諸行臺州鎮悉降關東平合州五十郡一百六十二縣三百八十五戸三百二十萬二千五百二十八口二千萬六千八百八十六唐書曰王行本仕隋以軍功為朝散大夫堯君素之鎮河東也令行本統精甲七百人及君素被誅於東樓行本率兵赴之不及因捕殺君素者黨屬與數百人皆誅之後兵出戰官軍髙祖更令將軍秦武通擊之武通令軍中無得泄其謀於是掘長圍以逼之武通謂掘圍者曰若見賊但疾走以避之行本果出兵掘圍者走行本奔數里通率騎横出擊之賊衆潰因縱兵乗之殺七百餘人自此兵勢漸弱太宗求得其所親婦人遣入城喻意行本曰罪戾既深自知不免止當逃竄山谷耳因潛引武周又求援于竇建德武周遣其將相尋以兵援之太宗邀擊大破之行本窮急糧盡謀欲突圍而出人無從者遂面縛請降又曰劉闥亡將張君立奔於髙開道因與其將張金樹潛相連結時開道親兵數百人皆勇敢士也號為義兒恒在閣内金樹每督兵於閣下及將為變潛令其黨數人入其閣内與諸義兒陽為遊戲至日將夕隂斷其弓絃又藏其刀杖聚其弰於牀下合瞑金樹以其徒大呼來屯閣下向所遣人抱義兒弰一時而出諸義兒遽將出戰而弓弦皆絶刀杖已失張君立於外城舉火相應表裏驚擾義兒窮蹙爭歸金樹開道知不免死於是擐甲持兵坐於堂上與妻妾奏妓樂酣宴金樹之黨憚其勇不敢逼之天將曉開道先縊其妻及諸子而後自殺金樹陳兵大集執其義兒皆斬之又殺張君立死者五百餘人於是來降詐降史記曰楚漢相持項羽圍漢王滎陽漢王請和割滎陽以西者為漢亞父勸項羽急攻滎陽漢王患之陳平反間既行羽果疑亞父亞父大怒而去發病死漢將紀信曰事急矣臣請誑楚可以間出於是陳平夜出女子東門三千餘人楚因擊之紀信乃乗王車黄屋左纛曰食盡漢王降楚楚軍皆呼萬歳之城東觀之上以故與數十騎出西門遁走後漢書曰時漢中賊延岑出散關及更始將軍李寶合兵數萬人與逢安戰於杜陵岑等大敗死者萬餘人寶遂降安而延岑收散卒走寶乃密使人謂岑曰子努力還戰吾當於内反之表裏合勢可大破也岑即還挑戰安等空營擊之寶從後悉拔赤眉精幟更立已幡旗安等戰疲還營見旗幟皆白大驚亂走自投川谷死者十餘萬後魏書曰万俟醜奴万音墨俟音其宿勤明達等反叛寇掠涇川魏將崔延伯率衆軍將出營討賊未戰之間有賊數百騎詐持文書云是降簿乞且緩師延伯謂其事實逡廵未問俄而宿勤明達率衆自東北而至乞降賊從西競下諸軍前後受敵延伯上馬突陣賊勢摧挫便爾逐北遥造其營賊本輕騎延伯軍兼步卒兵力疲怠賊乃乗間得入城延伯軍遂大敗傷死者二萬人通典曰西魏大將周文帝征東魏戰於邙山禆將于謹率其麾下偽降立於路左東魏大將齊神武軍乗勝逐北不以為虞追騎過盡謹乃自後擊之敵人大駭獨孤信又収集兵士於後奮擊齊神武軍遂亂以此西魏軍得全而返又曰隋煬帝征髙麗九軍已度鴨緑水糧盡議欲班師諸將多異同又不測帝意㑹髙麗國相乙支文德來詣其營都將宇文述不能執文德逃歸述内不自安遂與諸將更進追擊時文德見軍中多饑色欲疲述衆毎鬭便北述一日之中七戰皆㨗既恃驟勝又内逼羣議於是遂進遇平壤城文徳降述料攻之未可卒㧞因而班師文德隨擊之大敗太平御覽卷三百二十四
