body:
  text: 太平御覽卷八百五十七宋李昉等撰飲食部十五蜜沙餳蜜張璠易注序曰蜜蜂以兼採為味韻集曰蜜蜂百草華所作也漢武帝故事曰西王母曰太上之藥有中華紫蜜雲山朱蜜續漢書曰天竺國出石蜜東觀漢記曰世祖嘗與朱祐共買蜜合藥後上追念之即賜祐白蜜一石問何如在長安時買蜜乎吳書曰袁術為雷薄等所距士衆絶糧時盛暑欲得蜜醬又無蜜在床歎息良久乃大咤曰袁術至於此乎呉志曰孫亮使黄門至中藏取蜜漬梅蜜中有䑕矢召問藏吏曰黄門從汝求蜜耶吏曰向求蜜寔不敢與黄門不服亮曰此易知耳令破䑕矢矢裏燥亮曰若久在蜜中中外當俱濕裏燥必是黄門所為黄門首服晉令曰蜜工收蜜十斛有能増二升者賞榖十斛晉太康起居注曰尚書令荀朂羸毁賜石蜜五升齊書曰明帝每好􅢡姨以銀鉢盛蜜漬之一食數鉢又曰陶𢎞景永明十年脱朝服掛神武門上表辭禄詔許之賜以束帛勅所在月給茯苓五觔白蜜二升以供服餌梁書曰任昉為新安太守郡有蜜嶺及楊梅舊為太守所採昉以冐險多物故即時停絶又曰傅昭為臨海太守郡有蜜巖前後太守皆自封固専收其利昭以文王之囿與百姓共之大可喻小乃教勿封梁四公記曰髙昌國遣使貢刺蜜帝命􅇐公迓之謂其使曰刺蜜是鹽城所生非南平城者使者曰其年風災刺蜜不熟故爾帝問􅇐公對曰南平城羊刺無葉其蜜色明白而味甘鹽城羊刺葉大其蜜色青而味薄以是知蜜之偽焉唐書曰蕃胡國出石蜜中國貴之上遣使至摩伽池國取其法令揚州煮諸蔗之汁於中厨自造焉色味逾於西域所出神仙𫝊曰飛黄子服中嶽石蜜及紫粱得仙王孚安城記曰郡東有山百姓呼宻崗産蜜焉荆州圖記曰赤馬山有蜜房二百所羅綴相望因名曰百房異物志曰交阯草滋大者數寸煮之凝如氷破如博碁謂之石蜜涼州異物志曰石蜜之味甜於浮萍非石之類假石之名實出甘柘變而凝輕范子曰白蜜出隴西天水本草經曰石蜜一名飴呉氏本草曰食蜜生武都谷劉根墨子枕中記鈔曰百花醴蜜楚辭招魂曰瑶漿蜜勺實羽觴左思蜀都賦曰蜜防郁毓被其阜漢昌縣多野蜂蜜蝎郭璞蜜賦曰繁布金房疊構玉室咀嚼滋液醸以為蜜散似甘露凝如割肪氷鮮玉潤髓滑蘭香魏文帝與孫權書曰今因趙咨奉石蜜五餅又與朝臣詔曰南方龍眼荔枝寧比西國蒲萄石蜜又曰新城孟太守道蜀猪㹠雞鶩味皆淡故蜀人作食喜著飴蜜沙餳張衡七辨曰沙餳石蜜逺國貢盛翁子與劉頌書曰沙餳西垂之産太平御覽卷八百五十七
