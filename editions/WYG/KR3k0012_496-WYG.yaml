body:
  text: 太平御覽卷四百九十六宋李昉等撰人事部一百三十七諺下鬭争諺下漢晉春秋曰諸葛亮卒楊儀整軍而出宣王不敢逼百姓諺曰死諸葛走生仲達梁祚魏國統曰王昶字文舒戒兄子云諺曰救寒無若重裘止謗莫若自脩斯言信矣張勃呉録曰陸稠字伯羸為廣陵太守奸吏歛手廣陵諺曰解結理煩我國陸君韓詩外傳曰夫知惡往古之所以危亡而不知積其所以安存則無以異乎却行而求逮於前人也鄙語曰不知為吏視己成事或曰前車覆後車戒江表傳曰諸葛亮表都䕶李嚴嚴少為郡戢吏用情深剋苟利其身鄉里為嚴諺曰難可狎李鱗甲又曰典韋容貌魁桀名冠三軍其所持手㦸長幾一尋軍中為之語曰帳下壯士有典君手提雙㦸八十斤又曰郭典字君業為鉅鹿太守與中郎將董卓攻黄巾賊張寳於汝陽典作圍塹卓不肯典獨於西當賊之衝晝夜進攻寳由是城守不敢出時人為語曰郭君圍塹董將不許幾令狐貍化為豺虎賴我郭君不畏强禦轉機之間敵為窮虜猗猗惠君保完疆土又曰栁琮字伯騫所拔進皆為時所稱致位牧守鄉里為諺曰得黄金一笥不為栁伯騫所識皇甫謐達士傳曰繆裴字文雅代脩儒學繼踵六博士以經行脩明學士稱之故時人為之語曰素車白馬繆文雅王祥别傳曰晉受禪時廊廟之士莫不懽容而祥色不加怡時人為之語曰王公恨恨有送故之情也張方賢楚國先賢傳曰諺曰黄尚為司𨽻奸慝自弭左雄為尚書令天下慎選舉荀氏家傳曰荀􅃉夫人有至行時歲荒每來糴者夫人恒叩其斛糴者歸量輒過其本時人號曰㧻斛夫人陳留風俗傳曰許晏字偉君授魯詩於琅琊王改學曰許氏章句列在儒林故諺曰殿上成羣許偉君曹操别傳曰吕布梟勇且有駿馬時人為之語曰人中有吕布馬中有赤兔文士傳曰江應元時人諺曰嶷然希言江應元又曰留侯七世孫張讃字子卿初居呉縣相人里時人諺曰相里張多賢良積善應子孫昌習鑿齒襄陽記曰黄承彦謂諸葛亮曰身有醜女才堪相配即載送之鄉里語曰孔明擇婦正得醜女和苞漢趙記曰陳安奮刀左右俱發隴上語曰隴上壯士有陳安丈八虵矛左右槃西京雜記曰韓嫣好彈以金為丸一日所失者十餘長安為之語曰苦饑寒逐彈丸京師兒童每聞嫣出彈輒隨之望丸所落便拾取焉英雄記曰袁紹父成字文開貴盛自梁冀以下皆為交言無不從京師諺曰事不諧詣文開三輔决録曰馮豹字仲文後母遇之甚酷豹事之愈謹時人為之語曰道德彬彬馮仲文又曰五門子孫凡門之伍門今在河西四十里澗榖洛三水之交傳聞馬氏兄弟五人共居此地作五門客舍因以為名主養猪賣豚故民為之語曰苑中三公館下二卿五門嚾嚾但聞豚聲又曰賈彪兄弟三人並有髙名彪最優天下稱曰賈氏三虎偉節最怒又曰游殷字幼齊為胡􅎮所害月餘􅎮得病但言伏伏游幼齊將鬼來於是遽死闗中諺曰生有知人之明死有貴神之靈臨海異物志曰安家夷皆好噉猴頭羮諺言人能負人千石之粟不願負人猴頭羮臛又曰䱥魚肥炙食甚美諺曰寧去累世田宅不去䱥魚額風俗通曰趙王好大眉人間半額楚好廣領國人没項齊王好細腰後宫有餓死者又曰延嘉中常侍單超左琯徐璜貝瑗唐衡在帝左右縱其姦逸時人為之語曰左迴天徐轉日貝獨坐唐應聲言信用甚於轉圜也又曰里語曰縣官漫漫怨死者半六韜曰天下攘攘皆為利往天下熙熙皆為利來列子曰周諺曰田父可坐殺晨出夜入自以性之恒啜菽茹藿自以味之極一朝處以軟毛綈薦以粱肉蘭味心痟體煩内熱生病矣又曰楊朱曰古語有之生相憐死相捐此語至矣又曰趙子文曰國諺有言察見淵魚者不祥智料隱逸者殃且君欲無盜莫若舉賢而任之孟子曰齊人有言雖有智慧不如乘勢雖有鎡基不如待時齊人之諺語也乘勢居富貴之勢也鎡基田器耒耜之屬也孔藂子曰平原君與子髙飲强子髙酒曰昔有遺諺堯舜千鐘孔子百觚子路嗑嗑尚飲百榼古之賢聖無不能飲也吾子何辭焉韓子曰鄙諺曰長袖善舞多錢善賈此言多資之易為工又曰古有諺曰為政猶沐也雖有棄髮之費而有長髮之利也慎子曰諺云不聰不明不能為王不瞽不聾不能為公蔣子萬機論曰學者如牛毛成者如麟角又曰猛虎不處卑勢勁鷹不立垂枝抱朴子曰桓靈諺曰舉秀才不知書察孝亷父别居寒素清白濁如泥髙第良將怯如蠅又曰古人欲達勤誦經今世圖官勉治生商君書曰公孫鞅謂秦孝公曰臣聞之疑行無名疑事無功君亟定變法之慮無惑天下之議語曰愚者暗於未成智者見於未萌邯鄲氏笑林曰桓帝時有人辟公府掾者倩人作奏記文人不能為作因語曰梁國葛龔者先善為記文自可冩用不煩更作遂從人言冩記文不去龔名姓府公驚不答而罷歸故時人語曰作奏雖工宜去葛龔賈誼新書鄙諺曰欲投鼠而忌器此善喻也鼠近於器尚憚而弗投恐傷器也况貴大之臣近於主帝乎桓子新論曰闗東鄙語曰人聞長安樂則出門而西向笑知肉味美則對屠門而大嚼又諺曰侏儒見一節而長短可知孔子言舉一隅足以三隅反觀吾小時二賦亦足以揆其能否崔寔政論曰每詔書所欲禁絶雖重懇惻罵詈極筆猶復廢捨終無悛意故里語曰州郡記如霹靂得詔書但掛壁又曰一歲再赦奴兒喑啞况不軌之民孰不回意應劭漢官儀曰里語云仕宦不止車生耳蔡邕獨斷曰古幘無巾王莽頭秃乃始施巾故語曰莽頭秃幘如屋王朗貧窶語曰諺曰魯班雖巧不能為乞丐者顔魏武選令曰諺曰失晨之雞思補更鳴昔季闡在白馬有受金取婢之罪棄而弗問後以為濟北相以其能故曹植令曰諺云相門有相將門有將夫相者文德昭將者武功烈鬭爭左傳𨼆公曰鄭伯將伐許授兵於太宫公孫閼與穎考叔爭車穎考叔挾輈以走輈車轅也子都拔㦸以逐之又襄二十六年秦伯之弟鍼如晉脩成叔向命召行人子員欲使荅秦行人子朱曰朱也當御御進也言當次行三云叔向不應子朱怒曰班爵同同為大夫何以黜朱於朝撫劒從之叔向曰秦晉不和久矣今日之事幸而集晉國賴之不集三軍暴骨子員道二國之言無私子常易之奸以事君者吾所能御也拂衣從之人救之平公曰晉其庶乎庶幾於治吾臣之所爭者太師曠曰公室懼卑臣不心競而力争不務徳而争善私欲已侈能無卑乎又襄二十六年楚伐鄭至于城麇鄭皇頡戍之出與楚師戰敗穿封戌囚皇頡公子圍與之爭之正於伯州犂正曲直也伯州犂曰請問於囚乃立囚伯州犂曰所爭君子也其何不知上其手曰夫子為王子圍寡君之貴介弟也下其手曰此子為穿封戌方城外之縣尹也誰獲子上下手以道囚意囚曰頡遇王子弱焉弱敗也言為王子所得戌怒抽戈逐王子圍史記曰藺相如功大拜為上卿位在廉頗右頗曰我為趙將有攻城野戰之功相如徒以口舌為勞位居我上吾不忍為之下必辱之相如聞之不肯與㑹每朝常稱病不欲與頗爭列於是舍人請辭去相如曰强秦不敢加兵於趙者徒以吾兩人在也今兩虎共鬭勢不俱生所以先國家之急而後私讎也又曰彭越字仲常漁巨野中為羣盜賊陳勝項梁起少年或謂諸豪傑相立叛秦仲可以來效之越曰兩龍方鬭且待之也又曰婁敬説上曰夫與人鬭不搤其亢張晏曰亢喉嚨拊其背未能全其勝也今陛下入闗而都案秦之故地此亦搤天下之亢而拊其背也又曰孔子去陳過蒲㑹公叔氏以蒲叛蒲人止孔子弟子公良孺者有勇力謂曰昔侍夫子遇難於匡今遇難於此命也吾寧鬭而死鬭甚疾蒲人懼謂曰無適衞吾出子也漢書曰項羽謂漢王曰天下匈匈以吾兩人願與王挑戰決雌雄漢王笑曰吾寧鬭智不鬭力又曰大將軍霍光秉政諸霍在平陽奴客持刀兵入市吏不能禁及尹翁歸為市吏莫敢犯者又曰邴吉常出逢羣鬭者死傷横道吉過之不問掾史獨怪之吉曰民鬭相殺傷長安令京兆尹職所當禁也宰相不親小事又曰原涉遣奴至市買肉奴乘涉氣與屠者爭言斫傷屠者又漢書張耳贊曰張耳陳餘世所稱賢始居約時相然信死豈顧問哉及據國爭權卒相滅亡勢利之交古人羞之續漢書曰孝靈皇帝於後園令宫人為列肆販賣使相偷盜爭鬭上臨視之以為樂東觀漢記曰執金吾賈復在汝南部將殺人潁川捕得冦恂乃戮之於市復以為恥過潁川謂左右曰吾今見恂必手劒之恂知其謀不欲與相見恂曰昔藺相如屈於廉頗者為國也乃勅屬縣盛供具一人皆兼二人之饌恂乃出迎於道稱疾還賈復勒兵欲追之而吏士皆醉遂過去恂以狀聞上乃徵恂恂至引見時復先在座欲起相避上曰天下未定兩虎安得私鬭又曰周黨字伯况太原人鄉佐發黨徭道於人中辱之黨學春秋長安聞復讎之義輒講下辭歸到與鄉佐相聞期鬭曰鄉佐多從兵往使鄉佐先拔刀然後與相擊鄉佐服其義勇袁山松後漢書曰劉盆子居長樂宫赤眉諸將日㑹論功名自言欲為某王欲得某官爭言號呼拔劒相擊英雄記曰吕布字奉先𤣥徳屯小沛袁術遣將紀靈步士三萬攻之因求救於布布率騎千餘馳赴之遣人招𤣥徳及靈等饗因謂靈曰布性不喜合鬭但喜解鬭耳蜀志曰劉封與孟達分爭不和封奪達鼓吹達遂降魏山海經曰形天與帝爭神帝斷其首葬之常羊之山神異經曰東北荒中有獸焉其狀如羊一角毛青四足似熊性忠而直見人鬭則觸不直聞人論咋不正名曰獬豸一名任法今御史用法冠俗曰獬豸冠也續搜神記曰晉太原中北地人陳良與沛郡民李焉共為賈後大得利焉殺良取物死十許日良忽蘇活得歸家説死時見周旋人劉舒舒久已亡謂良曰去年春社日祠祀家中鬭爭吾實忿之作一兕於庭前良故往報舒家其怪亦絶皇甫士安逸士傳曰髙鳯鄰里有爭財鬭者兵刃相加鳯脱衣巾為叩頭曰仁義遜讓不可廢也爭財者投兵謝之而罷東觀漢記又載又曰管寧所居屯落㑹有汲者或男女雜錯或爭井鬭䦧寧患之乃買器分置井傍汲以待之各自相責不復鬭㑹稽典録曰夏香字曼卿門側有犬井上有瓦盆里中兒童各競飲牛爭水共鬭香豫為汲多置盆器由是無爭費禕别傳曰魏延與楊儀並坐爭論延或舉刃擬儀儀涕泣下褘常入坐其間諫喻分别石勒别傳曰勒微時居與邑人李陽相近陽性剛愎每輕勒與爭漚麻池共相扞揲互有勝負呉越春秋曰伍子胥如呉時遇專諸於途專諸方與人鬭將就之適其怒有萬人之氣其妻一呼即還子胥怪而問其狀專諸曰夫屈一人之下必伸萬人之上列子曰昔共工與顓頊爭為帝怒觸不周之山崩折天柱絶地維胡非子曰胡非子脩墨以敎有屈將子好勇聞墨者非鬭帯劒危冠往見胡非子刼而問之曰將聞先生非鬭而好勇有説則可無説則死胡非子為言五勇屈將子悦服尸子曰魯人有孝者三為母北魯人稱之彼其鬭則害親不鬭則辱嬴矣不若兩降之韓子曰鄭人有相與爭年者一人曰吾與堯同年一人曰吾與黄帝兄同年訟此不決以後息為勝吕氏春秋曰楚之邊邑名曰卑梁其處女爭桑於境上戯而傷卑梁之女卑梁人以讓呉人呉人應不恭怒而殺之呉人往報之盡屠其家於是呉楚大爭淮南子曰佐祭者得嘗救鬭者得傷又曰三人同舍二人相與爭爭者各自以為直不能相聽一人雖愚必從而決之非以智也以不爭也説苑曰秦始皇太后不謹幸郎嫪毐封為長信侯專國事與侍中左右貴臣俱博飲酒醉爭言而鬭瞋目大呼桓子新論曰余前為典樂大夫有鳥鳴於庭樹上而府中門下皆為憂懼後余與典樂謝俟爭鬭俱坐免去風俗通曰臨淮有一人持一疋縑到市賣之道遇雨披戴後人求共庇廕授與一頭雨霽當别因共爭各云我縑詣府自言丞相薛宣呼騎吏中斷縑各與半後人濫受因前撮之縑主稱怨宣然後知責之具服又曰俗説二人共澡手令人爭鬭良無異器當共澡者其祝曰人相愛狗相嚙言狗鬭時灑之以水便自解也又曰坐不移罇俗説移罇令人爭鬭典論曰汝南許劭與族兄靖俱避地江東保呉郡爭論於太守許貢座至於手足相及郭璞易洞林曰殷洪喬令吾作卦得大壯之夬語之云慎勿與許姓者共事田作也必鬭相傷殷還宣城遂與許姓共田田熟有所爭此人舉杖欲撞之喬退思中間之戒辭謝僅乃得休夢書曰鶉鷃為鬭夢見鶉鷃主鬭嵇康太師箴曰若㑹酒坐見人爭語其形勢似欲轉盛便當捨去此鬭之兆也太平御覽卷四百九十六
