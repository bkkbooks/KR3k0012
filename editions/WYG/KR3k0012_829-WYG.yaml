body:
  text: 太平御覽卷八百二十九宋李昉等撰資産部九商賈左𫝊僖公下曰秦師及滑鄭商人弦髙將市於周遇之以乘韋先牛十二犒師曰寡君聞吾子將歩師出於敝邑敢犒從者不腆敝邑為從者之淹居則具一日之積行則備一夕之衛且使遽告于鄭又宣公下曰荆尸而舉荆楚也尸陳也楚武王始更為此陳法遂以為名也商農工賈不敗其業而卒乘輯睦事不奸矣奸犯也又成公下曰荀罃之在楚鄭賈人有將寘諸禇中以出既謀之未行而楚人歸之賈人如晉荀罃善視之如實出已賈人曰吾無其功敢有其實乎吾小人不可以誣君子遂適齊左𫝊昭元曰魯曽阜曰賈而欲贏而惡囂乎又昭公曰子干歸韓子問於叔向曰子干其濟乎對曰難宣子曰同惡相求如市賈焉何難對曰無與同好誰與同惡言棄疾本不與子干同好則亦不得同惡又昭公六曰臧㑹奔郈郈魴假使為賈正焉又昭公十六年曰鄭子産對韓宣子曰昔我先君桓公與商人皆出自周庸次比耦以艾殺此地斬之蓬蒿藜藿而共處之世有盟誓以相信也曰爾無我叛我無强賈母或匄奪爾有利市寶賄我勿與知恃此質誓故能相保以至於今今吾子以好來辱而謂敝邑强奪商人是教敝邑背盟誓也毋乃不可乎又定公下曰衛王孫賈曰苟衛國有難工商未嘗不為患使皆行而後可公以告大夫乃皆將行之史記曰吕不韋𫝊曰不韋陽翟大賈人也徃來販賤賣貴家累千金又曰白圭周人也與僮僕同苦樂趨時若猛獸鷙鳥之發故曰吾治生産猶伊尹吕尚之謀孫呉用兵商鞅行法是也其智不足與權變勇不足以决斷仁不能以取予强不能有所守雖欲學吾術終不告之矣葢天下言治生者祖白圭又曰齊俗賤奴虜而刁間獨愛貴之桀黠奴人之所患也唯刁間収取使之逐魚鹽商賈之利或連車騎交守相然愈益任之終得其力起富數千萬故曰寜爵無刁言其能使豪奴自饒而盡其力也漢書髙祖詔曰賈人無得衣錦繡綺縠絺紵􅄢操兵騎馬又曰陳豨反上聞豨將皆故賈人曰吾知與之矣乃多以金購豨將豨將多降又曰周人之失巧為趍利喜為商賈富人則商賈為利又曰通財鬻貨曰商又諺曰以貧求富農不如工工不如商刺繡文不如倚市門此言末業貧者之資也貪賈三之廉賈五之魏志曰王烈字彦方於時名聞在邴原管寧之右辟公孫度長史以商賈自穢太祖命為丞相椽徵未至卒梁書曰范雲為始興内史入境撫以恩德罷去亭候商賈露宿南史曰陸驗少而貧苦落魄無行邑人郁吉卿者甚富驗傾身事之吉卿貸以錢米驗借以商販遂致千金因出郡下散貲以事權貴北史曰和士開母喪託附者咸闕富商丁周嚴興等並為義孝有一士人在闕出謂人曰嚴興之南丁周之北有一朝士號哭甚哀聞者𫝊之士知而大怒管子曰商人通賈倍道兼行以夜繼日千里而不逺者利在前也魯連子却秦軍平原君欲封之終不肯受平原君乃置酒酒酣起前以千金為壽先生笑曰所貴天下之士者為人排患釋難解紛亂而無所取也即有取者是商賈之事連不忍為也尸子曰子貢衛之賈人也韓子曰鄙諺曰長袂善舞多資善賈此言多也又曰秦韓攻魏昭卯西説罷之齊荆攻魏卯東説罷之魏襄王賞之以五車將軍卯曰伯夷以將軍葬於首山之下而天下曰夫以伯夷之賢與其稱仁而以將軍葬是非力不滿也今臣罷四國之兵而王乃與臣五乗此其稱功猶嬴縢而履屩也淮南子曰賈多端則貧工多伎則窮心不一也國語曰晉叔向對韓宣子曰夫絳之富商韋藩木楗以過於朝唯其功庸不稱而能金玉其車文錯其服能行諸侯賄而無尋尺之祿無大績於民故也又曰齊管仲曰昔聖王處商就市井夫商羣萃而州處察其四時而監其鄉之資以知其市之賈負任儋荷服牛軺馬以周四方以其所有易其所無市賤鬻貴旦暮從事於此以飭其子弟相語以利相示以賴相陳以知賈少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故商之子恒為商又曰越大夫種曰臣聞之賈人夏則資皮冬則資綌旱則資舟水則資車以待之也白虎通曰商賈何謂也商之為言商其逺近度其有無通四方之物故謂之商也賈之為言固也固有其用物以待民來以求其利者也論衡曰揚子雲作法言蜀富賈人賫錢十萬願載於書子雲不聽夫富無仁義之行猶園中之鹿欄中之牛安得妄載異苑曰晉陵曲阿楊晩資財數千萬三呉人皆取直為商賈治生輙得倍值或行長江卒遇暴風及刼盜者若貸晩錢多獲免濟晩死後先所埋金悉移去隣人陳家陳嘗晨起見門外忽有百許萬鏹封題是楊晩姓字然後知財物聚散必由天運乎負販禮記曲禮曰夫禮者自卑而尊人雖負販者必有尊也而况富貴乎尚書大𫝊曰舜販於須丘漢書曰灌嬰睢陽販繒者説苑曰鮑叔身死管仲舉上袵而哭之泣下如雨從者曰非君臣父子也管仲曰非夫子所知也吾嘗與鮑子貧販於南陽吾三辱於市不以我為怯知我欲有所明也魏志曰𢎞農董遇字季直性質訥而好學興平中關中擾亂與兄季忠依將軍叚煨采梠負販而常挾持經書投閑習讀其兄笑之不改後魏書曰景穆季年頗親近左右營立田園以収其利髙允諫曰夫天下者殿下之天下富有四海何求而不獲而乃與販夫販婦競此尺寸乎傭賃左𫝊襄公二十七年曰崔氏之亂申鮮虞來奔僕賃於野以喪莊公冬楚人召之遂如楚為令尹史記曰倪寛貧無資用常為弟子都養時間行賃以給衣食行常帶經止息則誦習之又曰范雎微行弊衣間步見須賈須賈見之驚曰叔今何事范雎曰臣為傭賃賈哀之留與坐飲食乃取一綈袍以賜之漢書曰欒布梁人彭越為家人時常與布遊窮困賣傭於齊為酒家作數嵗别去而布為人所略賣為奴又曰匡衡字稚圭東海人父世農夫至衡好學家貧傭作以供資用後漢書曰鄭均好黄老書兄仲為縣遊徼頗受禮遺均數諫止不聴即脫身為傭嵗餘得錢帛歸以與兄曰物盡可復得為吏坐贓終身損棄兄感其言遂為亷潔謝承後漢書曰施延字君子少為諸生明於五經家貧母老周流傭賃避地於盧江臨湖縣種𤓰後復到呉郡海鹽取卒月直賃作半路亭下以養其母是時呉㑹未分山隂馮敷行部到縣延操箒往敷知其賢者下車謝使入亭請與飯食訖脫衣與之餉餞不受華嶠後漢書曰范式為荆州刺史友人南陽孔嵩家貧親老乃變名姓傭為新野阿里街卒式行部到新野而縣選嵩為道騎迎式式見而識之呼嵩把臂謂曰子非孔仲山耶對之嘆息語及平生曰昔與子俱曵長􅅂遊集帝學吾䝉國恩致位州牧而子懷道隱身處於卒伍不亦惜乎嵩曰侯嬴長守於賤業晨門肆志於抱關子居九夷不患其陋貧者士之宜豈為鄙哉勅縣代之嵩以為先傭未竟不肯去東觀漢記曰公沙穆來遊大學無資糧乃變服客傭為呉佑賃舂祐與語大驚遂共定交於杵臼之間又曰初梁鴻於大家臯伯通家賃舂為事歸其妻具食不敢於鴻前仰視舉案常齊眉伯通察而異之曰彼傭能使其妻敬之如此非凡人也又曰班超字仲升家貧恒為官傭寫書嘗輟書投筆嘆曰大丈夫當效𫝊介子張騫立功異域以取封侯安能乆事筆硯乎呉志曰闞澤字德潤㑹稽山隂人也家世農夫至澤好學家貧無資常與人傭書以供紙筆所寫既畢誦讀亦周南史曰張敬兒之為襄陽府將也家貧每休假輙傭賃自給嘗為城東呉泰家擔水通泰所愛婢事發時被㤗欲殺逃賣棺材中以葢加上乃免又曰王僧孺篤愛墳籍家貧常傭書以養母冩畢諷誦亦了又曰馮道根少孤家貧傭賃以養母行得甘肥未嘗先食必遽還以遺母又曰吳逵經饑荒男女死者十三人唯其夫妻獲全家徒四壁立冬無被袴書則傭賃夜則伐木燒磚妻亦同逵此情無有􅈈倦漢皇德頌曰侯瑾字子瑜燉煌人少孤貧依宗人居性篤學恒傭作為資暮還輙爇薪讀書擔釋名曰擔任也力所勝任也後漢書曰趙孝字長平父普王莽時為田禾將軍任孝為郎每告歸常白衣步擔從長安逺欲止郵亭亭先時聞孝當過以有長者客洒掃待之孝既至不自名長不肯内問曰聞田禾將軍子當從長安來何時至乎孝曰尋到矣於是遂去東觀漢記曰馬成為剡令上征河北成臝衣步擔渡河渚上魏志曰曹休年十餘嵗喪父獨與一客擔喪假葬擕將老母渡江至吳魏畧曰隗禧字子牙京兆人也家世單貧少好學初平中三輔亂禧南客荆州不以荒擾擔負經書每以採梠餘日則誦習之晉書曰郭文字文舉少愛山水尚嘉遁洛陽陷乃步擔避餘杭大滌山中獵者時往寄宿文夜為擔水而無倦色又曰譙秀字元彦在蜀遇范賁蕭敬相繼作亂秀乃避難宕渠中隣里宗族憑之者以百數秀年八十衆欲代之負擔秀曰各有士弱當先營䕶吾氣力猶足自起不以垂朽之年累諸君也又曰王澄字平子兄衍妻郭氏性貪鄙欲令婢路上擔糞澄年十四諌郭以為不可又曰董養字仲道見洛陽東北步廣里地陷有二鵝出焉其蒼者飛去白者不能飛知白者國家之象顧謂謝鯤阮孚曰易稱知幾其神君等可􅀷藏矣乃與妻荷擔入蜀莫知所終齊書曰桓康隨武帝在贛縣泰始初武帝起義為郡所執衆皆散康裝擔一頭貯穆后一頭貯文惠大子竟陵王子良自負置山中與門客蕭欣祈等四十餘人相結破郡獄出武帝梁書曰司馬申太清之難父母俱沒因此自擔以生菜食終身後漢書曰髙允性好文學擔笈負書千里就業方言曰嬴旅荷騰擔也齊楚陳宋之間曰嬴燕之外郊越之東甌吳之外鄙謂之旅南楚謂之嬴自關而西隴冀以往謂之荷凡以驢馬駝載物者謂之負他音大亦謂之荷先賢行狀曰平原王烈字彦方國中有盜牛者主得而釋之盜者曰子既放我幸無使王烈聞之明年國中行路父老負擔重有人代擔行數十里至家而去問姓名不語頃之老父失劔於路有人得而守之至暮劍主還見之即代擔者以告烈使問之乃昔盜牛人也淮南子曰量粟而舂數米而炊可以治家而不可以治國傅子曰夷吾為政士三妻者逐於境外三嫁者入於舂𨽻也國語曰天子禘郊之事必自射其牲牲牛王后必自舂粢諸侯宗廟之事必自射牛刲羊撃豕刲刺撃殺夫人必自舂其盛世本曰雍父作舂吕氏春秋曰赤冀作舂桓子新論曰宓儀之制杵臼萬民以濟及後人加功因延力借身重以踐碓而利十倍杵舂又復設機關用驢驘牛馬及役水而舂其力乃且百倍焦貢易林曰蹇之革曰折挺舂稷君不得食頭養病根無益於病嚴欣期交州記曰糠頭山在合浦海口𫝊云越王舂米於此積糠所成石虎鄴中記曰有舂車作木人及行碓於車上動則木人踏碓舂行十里成米一斛俗記曰王慶孫為襄陽都督後之鎮爾時沔中蠻盛斷道縛得王去將還家語王云汝是貴人試作貴人行者驅逼不得已王便行蠻以其貴人不堪苦便令與婦女共碓下舂王褒僮約曰事訖休息當舂一石嶺表異録曰廣南有舂堂以渾木刳為槽一槽兩邊約十杵男女間立以舂投糧敲磕槽舷皆有遍拍槽聲若鼓聞於數里雖思婦之巧弄秋砧不能比其流亮也太平御覽巻八百二十九
