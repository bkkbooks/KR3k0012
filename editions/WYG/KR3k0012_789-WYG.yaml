body:
  text: 太平御覽卷七百八十九宋李昉等撰四夷部十南蠻五南詔蠻驃國暴蠻等部落勿鄧大賧南瀘量水川彌若國彌臣國崑崙國小婆羅門國夜半國女王國獨錦國弄㨂蠻青蛉蠻長禪施蠻磨㱔蠻撲子國尋𫝊國裸形國苴望子國望蠻黒齒諸蠻繡面蠻穿鼻蠻長鬃㨂鋒范蠻南詔蠻唐書曰南詔蠻本烏蠻之别種也姓䝉氏蠻謂王為詔自言哀牢之後代居蒙舍州為渠州在漢永昌故郡東姚州之西其先渠師有六自號六詔兵力相埒各有君長無統帥蜀時為諸葛亮所征皆臣服之又曰南詔蠻國初有䝉舍龍生迦獨龎迦獨生細奴邏髙宗時来朝細奴邏生邏盛武后時来朝其妻方娠邏盛次姚州聞妻生子曰吾且有子死於唐地足矣子名曰盛邏皮邏盛至京師賜錦袍金帶歸國開元初邏盛死子盛邏皮立盛邏皮死子皮邏閣立又曰南詔蠻皮邏閣嗣立二十六年詔授特進南越國公賜名曰歸義其後破洱河蠻洱音而志切以功䇿授雲南王歸義漸强盛餘五詔浸弱先是劒南節度王昱受歸義賂奏六詔合為一詔歸義既併五詔服羣蠻破吐蕃之衆兵日以驕大遂徙居太和城天寶四載歸義遣孫鳳迦異来朝授鴻臚卿歸國恩賜甚厚又曰閣羅鳳襲封王無何鮮于仲通為劒南節度使張䖍陀為雲南太守仲通􅄶急寡謀䖍陀矯詐遇之不以禮舊事南詔嘗與其妻子謁見都督䖍陀皆私之有所徴求閣羅鳳多不應䖍陀遣人罵辱之仍宻奏其罪惡閣羅鳳忿怨因發兵反圍䖍陀殺之後遣使謝罪仍與雲南録事參軍姜如芝俱来請還其所虜掠具言吐蕃大兵壓境若不許當歸命吐蕃雲南之地非唐有也仲通不許囚其使進軍逼大和城為南詔所敗自是閣羅鳯北臣吐蕃又曰閣羅鳳死其孫異牟尋頗知書有才知善撫其衆吐蕃役賦蠻南重數又奪諸蠻險地城立城堡嵗徴兵以助鎮防牟尋益厭苦之有鄭回者本相州人天寶中授嶲州西瀘縣令嶲州䧟為所虜閣羅鳳以回有儒學更名曰蠻利甚愛重之命教鳳迦異及異牟尋立以回為清平官事皆咨之回嘗言於牟尋曰自昔南詔嘗欵附中國中國尚禮義以恵養為務無所求取今棄蕃歸唐無逺戍之勞利莫大焉牟尋善其言謀内附者十餘年矣㑹劒南西川節度使韋臯招撫諸蠻苴烏星虜望等歸化聞牟尋之意因諸蠻寓書於牟尋且招懐之牟尋乃斬吐蕃使去其所立帝號以歸家仍請復南詔舊名初吐蕃因爭北庭與迴鶻大戰死傷頗衆乃徴兵於牟尋須萬人牟尋欲因以襲之反示寡弱謂吐蕃曰蠻軍數少僅可發三千人入蕃五千人戍吐蕃乃將數萬踵其後晝夜兼行乗其無備大破吐蕃於神川鐡橋遣使告捷帝乃命兼御史中丞袁滋持節冊南詔王仍賜金印曰貞元冊南詔印又曰貞元遣使䝉凑羅棟等来獻鐸槊浪人劒驃國唐書曰驃國在永昌故郡南二千餘里其國境東隣真臘西接東天竺南盡溟海北通南詔些樂城界北距陽苴咩城六千八百里徃来通聘迦邏婆提等二十國役屬者道林王等九城食境土者羅君潜等二百九十八部落其王姓困沒長名摩羅惹其國相名摩訶思􅄼其王近適則舁以金䋲牀逺適則乗象嬪姝甚衆常數百人其羅城構以塼甃周一百六十里壕㟁亦構塼相𫝊本是舍利佛城城内有居人數萬家佛寺百餘區其堂宇錯以金銀皆塗以丹彩地以紫鑛覆以錦罽其俗好生惡殺其土宜菽粟稻粱無麻麥其理無刑名桎梏之具犯罪者以竹五十本束之復犯者撻其背數止五輕止三殺人者戮之男女七嵗則落髪止寺舍依桑門至二十不悟佛理乃復長髪為居人其衣服悉以白㲲為朝霞繞腰而已不衣繒帛云出於蠶為傷生故也君臣父子長幼有序華言謂之驃自謂突羅城闍婆人謂之徒里掘古未嘗通中國貞元中其王聞南詔異牟尋歸附心慕之八年乃遣其弟悉利移因南詔重譯来朝又獻其國樂凡十曲與樂工三十五人俱樂曲皆演釋氏經論之詞意以悉利移為試大僕卿南夷志曰驃國在永昌南七十五日程閣邏鳳所通也其國用金銀錢以青塼為圓城周行一日程百姓盡在城中有十二門當國王所居門前有大象路坐髙百餘尺國人多推步天文若有所訟者即令焚香向大象自思是非便各引退或有災疫王亦焚香對象思過自咎男子多衣白疊婦人當頂為髙髻以金銀真珠為飾衣青婆裙人披羅縀行必持扇貴家婦三人五人在傍持扇與波斯及婆羅門接界西去舍利城六十日程疑此是東天竺也暴蠻等部落南夷志曰竹子嶺東有暴蠻部落嶺西有盧鹿蠻部落又有生蠻磨彌殿部落此等部落皆東爨鳥蠻也男則髻女則散髪見人無節拜跪三譯乃與華通大部落則有大鬼主百姓二百家小部亦有小鬼主一切信使鬼巫用相主服制土多牛馬無布帛男女悉被牛羊皮勿鄧南夷志曰勿鄧部落大鬼主薨衢地方十萬里功部一姓白蠻五姓烏蠻婦人以墨繒為衣白蠻婦人白繒為衣下不過膝大賧南夷志曰大賧周迴百餘里悉是野蠻無君長地有瘴毒南賧人至中瘴者十死八九閣邏鳳嘗遣使築城於彼管制野蠻不逾嵗死者過半遂罷棄其土肥沃種瓠長丈餘冬􅆶亦然皆三尺圍又多薏苡無農桑收此充糧三面皆是雪山其髙造天南瀘南夷志曰瀘水蜀諸葛亮伐南蠻五月渡瀘大如臂川中氣候常熱雖方冬行過者皆袒衣流汗量水川南夷志曰量水川在湞池南兩日行漢舊黎州地川中有尺地其地水南流出一石竇中水流甚廣石竇甚狹蠻土云此竇忽室空則百姓憂溺彌諾國彌臣國南夷志曰彌諾國彌臣國皆邊海國也呼其君長為壽彌諾面赤而長彌臣面黒而短性恭謹每與人語向前一步一拜國無城郭彌諾王所居屋之中有一大柱雕刻為文飾以金銀彌臣王以木柵為居海際水中以石師子為屋四足仍以板葢悉用香木王出即乗象百姓皆樓居披婆羅籠男少女多俗好百樂樓兩頭置鼔飲酒即撃鼔男女携手樓中踏舞樂在永昌城西南六十日程崑崙國南夷志曰崑崙國王北去四洱河八十日程出象及青木香㫋檀㯽榔琉璃水精犀木等物蠻冦嘗攻之為其决水淹浸進退無計餓死萬餘不死者去其右腕放迴小婆羅門國南夷志曰小婆羅門國在永昌七十四日程俗不食牛曰預知身後事出貝齒白蠟越諾共大耳國来往蠻夷善之信通其國夜半國南夷志曰夜半國在蒼望城東北隔麗水城川原其婦人唯與鬼通能知吉凶禍福本土君長崇信之蠻夷往往以金購之要知善惡女王國南夷志曰女王國去驩州十月程往往與驩州人交易蠻嘗伐之中其藥箭百不存一獨錦國南夷志曰獨錦蠻之苖裔也在秦臧川去安寧兩日程其族多姓李異牟尋母即獨錦蠻女也有季負籃貞元中為大將軍在㪍弄㨂川為城使等弄㨂蠻南夷志曰弄㨂蠻則白蠻苖裔也本姚州弄㨂縣闕地舊為褒州嘗有首領誤殺司户懼罪率衆北奔闕磨磨㱔江則貞元中異牟尋破吐蕃城邑獲弄㨂城遷於永昌之地清蛉蠻南夷志曰清蛉蠻亦白蠻苖裔也本清蛉縣部落天寶中嶲州初䧟有首領尹氏父子相率南奔河縣閣邏鳳厚待之貞元中南詔清平官尹輔酋皆其人也衣服言語與䝉舍畧同長禪蠻南夷志曰長禪蠻闕烏蠻之後落在劒川屬浪詔其俗皆衣長禪曳地更無衣服唯披牛羊皮施蠻南夷志曰施蠻種族也鐡橋西北大施賧劒尋賧皆其所居之地男小繒布為􅥶襠袴婦人從頂横分其髪當額及頂後各為髻男女絡身跣足披牛羊皮磨㱔蠻南夷志曰磨㱔蠻鳥種也鐡橋上下及大婆小婆三探覽昆池等川皆其所居之地土多牛羊一家即有羊羣終身不洗手面男女皆披羊皮俗好飲酒歌舞樸子蠻南夷志曰樸子蠻勇悍趫捷以青婆羅叚為通身袴善射治其竹弓深林間射飛鼠發無不中部落首領謂之酋其土無食器以芭蕉葉藉之尋𫝊蠻南夷志曰尋𫝊蠻俗無絲綿布帛披婆羅籠跣足可以踐履􅎄棘持弓挾矢射豪猪生食其皮取其兩牙雙挿頂以為飾又條其皮以繋腰每戰閗即以籠子籠頭如兠鍪狀祼形蠻南夷志曰祼形蠻在尋𫝊城西三百里為巢穴謂之野蠻閣羅鳳既定尋𫝊蠻野蠻散居山谷集戰即召之亦無君長女多男少無田農衣服唯有木皮以蔽形或十妻五妻共養一丈夫盡日持弓下褐欄有外来浸害者即射之苴望子蠻南夷志曰苴望子蠻在蘭蒼江以西其人勇徤善於馬上用搶所乗馬不用鞍跣足衣闕纔蔽胷服而已望蠻南夷志曰望蠻外喻部落在永昌北其人長大排持槊前無强敵又能用木弓短箭𫝊毒藥中人立斃婦人跣足以青為衣聮珂貝巴珠斜絡其身有夫竪分髪為兩髻無夫者頂後為一髻垂之地宜沙牛角長四尺以来婦人嗜乳酪黒齒金齒銀齒繡脚南夷志曰黒齒金齒銀齒繡脚四蠻並在永昌開南雜種類也黒齒以漆漆其齒金齒以金鏤片裹其齒銀齒以銀有事見人則以此為飾􅃦食則去之皆當頂上為一髻以青布為通身袴又斜披青布條綉脚蠻則於踝上腓下周匝刻為文彩衣以緋布繡面蠻南夷志曰繡面蠻生一月則以針刺面青黛塗之如繡狀穿鼻蠻南夷志曰穿鼻蠻在柘東以徑尺金環穿鼻中隔下垂過頥從長即以絲䋲繋使人牽起仍行有次者花頭金釘兩枚從鼻兩邊穿令透下長鬃㨂鋒南夷志曰長鬃㨂鋒二蠻部落闕前為一長鬃髻下過臍每行則以物撑起君長闕在前各持一物撑之今為南詔所屬茫蠻南夷志曰茫蠻部落並開南雜種也茫是其君之號亦呼范記曰永昌城南先過唐封次鳳籃苴次茫天連次茫吐薅又有火賧茫昌城恐他茫鮓茫施皆其類也樓石無城郭或漆齒衣青布袴籐篾纒腰紅繒布纒髻出其餘垂後為飾婦女五色婆羅籠孔雀巢人家樹上象如水牛俗養以耕田棠魔蠻南夷志曰棠魔蠻去安南林西原十二程俗養牛馬長與漢人􅀶易大中八年經畧使苛暴入鹽一斗慱牛或馬一匹因茲隔絶不来太平御覽卷七百八十九
