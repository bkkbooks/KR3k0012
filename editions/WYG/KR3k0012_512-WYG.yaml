body:
  text: 太平御覽卷五百一十二宋李昉等􅁧宗親部二伯叔釋名曰伯把也把持家政也父弟為仲仲中也位在中也仲父之弟曰叔父叔少也叔父之弟曰季季癸也甲乙之次癸在下也説文曰伯長也爾雅曰父之昆弟先生為世父後生為叔父禮記檀弓曰滕伯文為孟虎齊衰其叔父也為孟皮齊衰其叔父也伯文殷時滕君也爵為伯名文家語曰孔子兄子有孔蔑者與宓子賤偕仕孔子徃過孔蔑而問焉曰自汝之仕何得何亡對曰未有所得而亡者三王事若聾聾宜襲前後相為拜襲也不得明也俸禄少饘粥不及親戚是骨肉益踈也公事多急不得弔死問疾是朋友道闕也其所亡者三即此謂矣孔子不悅往過子賤問如此宓對曰自来仕者無亡而得者三始誦之今得而行之是學益明也俸禄所供被及親戚是骨肉益親也向也有公事而兼以弔死問疾是朋友信篤也孔子喟然謂子賤曰君子哉若人魯無君子者斯焉取斯也漢書曰初高祖微時常避事時與賔客過其丘嫂食應劭曰丘氏女也孟康曰西方謂亡女壻為壻丘空也兄亡空有嫂也晉灼曰丘大也大嫂為冡嫂也嫂厭叔客来陽為羮盡轑釜客以故去而已視釜中有羮由是怨嫂及立齊代王而伯子獨不得侯太上皇以為言高祖曰非某敢忘封之也為其母不長者封其子信為頡羮侯又曰疏廣字仲翁東海蘭陵人也宣帝時為太子太傅兄子受字公子為少傅太子每朝因進見太傅在前少傅在後叔姪並為師傅朝廷以為榮又曰王莽字巨君孝元皇后之弟子父及兄弟皆以元成世封侯専政凡九侯五大司馬唯莽父曼死不侯五侯子争侈靡莽獨孤貧折節為儉受禮經勤身博學事母及寡嫂養孤児行甚整又外交英俊内事諸父世父鳯病莽侍疾亂髪垢面鳯且死以託太后及帝拜黄門郎東觀漢記曰鄭均好義篤實事寡嫂孤児恩禮甚至又曰魏譚有一孤兄子年一二嵗常自養親遭饑饉分升合以相生活譚時有一女生裁數月念無榖食終不能兩全棄其女養活兄子州郡高其義又曰桓榮卒子郁當襲爵譲於兄子顯宗不許不得已受封而悉以租入與之又曰淳于恭養兄崇孤兒教訓學問時不如意輙手責數以捶自撃其脛欲以感之兒慙負不敢復有過又曰郅惲友董子張叔父及為鄉里民所害子張庸惲往候之氣絶良久復視惲歔欷傳曰知子不悲天命痛讐不復也惲即起将客取仇人頭以視示子張見之悲喜因絶後漢書曰劉平字公子楚郡彭城人也更始時天下亂平弟仲為賊所殺其後賊復忽然而至平扶侍其母奔走逃難仲遺腹女始一嵗平抱仲女而棄其子母欲還取之平不聴曰力不能兩活仲不可以絶類遂去不顧謝承後漢書曰魏霸字嶠卿濟陽人為鉅鹿太守與兄子同苦樂不得自異又曰許荆兄子世嘗報讐殺人怨家㑹衆操兵至荆家欲殺世荆始從府休歸與相遇因出門觧劒長跪曰前無状相犯咎皆在荆不䏻相教既兄早殁一子為嗣如令死者傷其㓕絶今願殺身代世塞咎雖死以往猶謂更生怨家扶起荆曰許掾郡中稱為賢吾何敢相侵因遂委去華嶠後漢書曰薛苞弟子求􅂑苞不敢止乃中分其財奴婢引其老者曰我與共事乆若不能使也田廬取其荒頽曰吾少時所治意所戀也器物取其朽敗曰我服食已乆身口所安也袁山松後漢書曰范丹為萊蕪長去官於市賣卜妻紡績以自給丹弟子愷見丹在蕃不完載柴将客藩之時丹適行還怒勅子㧞柴載以還之後漢書曰馬援字文淵扶風茂陵人也援兄子嚴敦並喜譏議而通輕侠客援前在交趾遺書誡之曰吾欲汝曺聞人過失如聞父母之名耳可得聞而口不可得言也好議論人長短妄是非正法此吾所大惡寕死不願聞子孫有此行也汝曺知吾惡之甚矣所以復言者施襟結褵申父母之戒欲使汝曹不忘之耳龍伯高敦厚周慎口無擇言謙約節儉㢘公有威吾愛而重之願汝曺效之杜季良豪侠好義憂人之憂樂人之樂清濁無所失父䘮􅆀客數郡畢至吾愛而重之不願汝曺效之效伯髙不得猶為謹勅士所謂刻鵠不成尚類鶩也效季良不得陥天下輕薄子所謂畫虎不成反類狗也迄今季良尚未可知郡将下車輒切齒州縣以為言吾常寒心是以不願子孫效也又曰范遷字子盧沛國人也為司徒及在公公轉有宅數畆田不過一頃復推與兄子其妻謂曰君有四子而無立錐之地可餘俸禄以為後世遷曰吾備位大臣而蓄財求利何以示後在位四年薨家無擔石焉又曰張堪字君逰南陽宛人也堪早孤譲先父餘財數百萬與兄子又曰第五倫字伯魚京兆長陵人或問倫曰公有私乎對曰吾兄子嘗疾一夜十徃退而安寝吾子有疾雖不省視竟夕不眠若是者豈可謂無私乎又曰張属字伯達父歆為淮陽相終於家及令属徃篤志節儉父卒及吏人賻送前後百萬悉無所受又以田宅推與伯父自身寄止又曰中常侍趙忠言於省内曰袁本初坐作聲價好養名士不知此兒終欲作何叔父太傅隗聞而呼紹以忠言責之紹終不改又曰戴封遭伯父䘮去官又曰沮授為曺操所執授曰叔父母弟懸於袁氏若蒙公靈速死為福操歎曰孤早得授天下不足慮也遂赦而厚遇焉又曰劉矩字叔方少有髙節以叔父遼未得仕進遂絶州郡之命又曰伏恭字叔齊司徒湛之兄子湛位至光禄勲無子以恭為後魏書曰荀攸字公達祖父曇攸少孤及曇卒故吏張推求守曇墓攸年十三疑之謂叔父衢曰此吏有非常之色殆将姦亂衢悟乃推問果殺人亡命因是異之又曰盧毓字子家涿郡人也父植有名於世毓十嵗而孤遇本州亂二兄死難當袁紹公孫瓉交兵幽冀飢荒養寡嫂孤兄子以學行見稱又曰王昶字文舒太原人其為兄子及子孫名字皆一依謙實以見其意故兄子黙字處静沉字處道其子渾字𤣥冲深字道冲遂書戒之曰夫為人子之道莫大於保身全行以顯父母又曰馬玠居顯位常布衣蔬食撫育兄子甚篤又曰張範子陵及弟子戩為山賊所得範直詣賊請二子賊以陵還範範謝曰諸君相還兒厚矣夫人情雖愛其子然吾於戩之小請以陵易之賊義其志悉以還範又曰王基字伯興東莱曲城人也少孤與叔父翁居撫養甚篤亦以孝稱又曰髙慎字孝甫敦厚少華有沉深之量撫育孤兄子五人恩養甚篤瑯琊相何英嘉其行履以女妻焉蜀志曰諸葛亮初未有子求兄子喬為嗣瑾啟孫權遣喬来而亮以喬為嫡子故易其字焉拜為駙馬都尉王隐晉書曰庾衮孤兄女曰芳将嫁衣服具美衮以荆苕為箕箒召諸子集之于堂男女以班而命芳曰汝芳少孤今汝適人将事舅姑灑掃内庭婦人之道也故賜汝以此匪器之美欲汝之温恭朝夕雖休勿休也又曰魏舒質朴容貌少號遲鈍人莫知之唯叔父恒知其竒每有賔客進見常勸使過舒言吾兄子非常人也臧榮緒晉書曰阮籍随叔父至東兖州刺史王昶聞籍竒偉請與相見乃歎息不能測也又曰王湛字處冲司徒渾之弟也兄子濟輕之嘗詣湛見牀頭有周易問曰叔父何用此為湛曰體中不佳時脱復㸔耳濟請言之湛因剖析𤣥微妙有竒趣皆所未聞也濟才氣抗邁於湛畧無子姪之敬既聞其言不覺慄然心形俱肅遂留連彌日累夜自視缺然乃嘆曰家有名士三十年而不知濟之罪也濟有從馬絶難乗濟問湛曰叔頗好騎否湛曰亦好之因騎此馬姿形既妙廻䇿如素善騎者無以過之又濟所乗馬湛愛之湛曰此馬雖快然力薄不堪苦行近見督郵馬當勝但芻秣不至耳濟試養之而與已馬等湛又曰此馬雖快任方知之平路無以别也於是當蟻封内試之濟馬果躓而郵馬如常濟益歎異還謂其父曰濟始得一叔乃濟上人也武帝亦以湛為癡每見濟輙語之曰卿家癡叔死未濟常無以答及是帝又問如初濟曰臣叔殊不癡因稱其美帝曰誰比濟曰上比山濤不足下比魏舒有餘湛聞曰欲處我季孟間乎又曰殷浩字深源陳郡常平人也叔父融俱好老易融與浩口譚論詞屈著篇則融勝浩由是為風流譚論者所宗又曰鄧攸逃奔石勒負其妻子而去擔其兒及其弟子緩度不能兩全遂棄兒其後卒以無嗣緩服攸䘮三年又曰謝安字安石於山東營墅樓館林竹甚盛毎擕中外子姪徃来逰集餚􅄿亦屢費百金世頗以此譏焉安殊不以屑意又曰徐苗字叔胄髙宻淳于人也其兄皆早亡撫養遺孤慈愛州里田宅奴婢盡推與之又曰謝𤣥字幼度以勲封康樂縣公陳以先封東興侯賜兄子玩詔聴之更封玩豫寕伯又曰劉曜逼長安凉州刺史張寔叔父西海太守肅請為先鋒撃曜曰孤死者立心不􅁯本鍾儀在晉楚弁南音肅受晉寵割符列位羯逆㴞天朝廷傾覆晏安方裔難至不奮何以為人臣寔曰門户受重恩自當闔宗效死但叔父春秋已高氣力衰竭軍旅之事非耆耄所堪乃止既而聞京師陥没肅悲憤而卒又曰羅憲兄子尚字敬之少孤依叔父憲又曰慕容超字祖眀徳之兄子東海王納之子也苻堅破鄴以為廣武太守數嵗去官家于張掖徳南征留金刀而去及垂起兵山東苻昌收徳諸子皆誅之納母公孫氏以耄獲免妻叚氏方娠未决囚之於郡獄掾呼延評徳故吏也嘗有死罪徳免之至是将公孫及叚氏逃於羗中而生超焉年十嵗而公孫卒臨終授超以金刀曰若天下太平汝得東歸可以此刀還汝叔也何法盛晉中興書曰何充字次道道年在童齓伯父遂謂之曰我為小児時亡伯車騎謂我汝後當與伯父争名汝令器深𢎞亦當出我右又曰時氐賊强侵冦無己朝議求文武良将可以鎮遏北方者衛将軍謝安曰唯有兄子𤣥可堪此任中書郎郗超聞而嘆曰安違衆舉親眀也𤣥必不負舉才也於是徵還拜建武將軍兖州刺史領廣陵相監江北諸軍事又曰陸納字祖言為呉興太守衛将軍謝安嘗欲詣納納兄子俶怪納無供辦復不請問乃宻作數十人供安至納設茶果而已俶不精飲食客罷納大怒杖俶四十云不能光益父叔乃復穢我素業三十國春秋曰羊祜都督荆州鎮㐮陽時祜有平呉之志方樹基址擢王濬為巴郡太守将委以巴峡之任祜兄子暨謂祜曰觀濬為人志大者侈不可專任祜曰有大才必可用也識者謂祜可謂能舉善矣知人則哲叔子之謂乎又曰安帝時以劉謓之為散騎常侍光禄大夫不受謓之毅季父也義熈初謂毅蕃曰汝輩才力勢運足以得志當自争耳我不就汝求財又不受汝罪累每見毅等導從吏卒到門輙罵詬之毅甚敬畏毎未至宅數百歩止與白衣數人而進儀衛悉不自随及至毅敗天下服其先見而劉裕甚敬遇之又曰燕金紫光禄大夫高平公歆初歆伯父在光禄大夫拊歆首而告之曰汝儀容偉茂志節果勇當有佐命之功顯吾門者必汝也孫岩宋書曰許照先義興人也諸父肇坐事繋獄七年不判子姪三十餘人照先家最貧薄專獨㫁許無日在家餉饋􅒊莫非珍新家産既盡賣宅以充之肇諸子倦怠照先無有懈怠如是七嵗尚書沈演之嘉其操行􅒊事由此得釋沈休文宋書曰宗慤字元幹徴士炳兄子也年少時炳問慤所志答曰願乗長風破萬里浪炳曰汝若不富貴必破我門户又曰何承天叔盻為義陽令随盻之官隆安四年南蠻校尉違命為叅軍殷仲堪桓𤣥等牙舉兵以向朝廷承天懼禍難及已解職還益陽又曰劉凝之字志安小名長年南郡人也推家財與弟及兄子立屋於野外非其力不食典畧曰鄭均字仲虞任城人也好黄老兄亡後養嫂兄子恩禮甚篤及居併門盡推財産與之由是名稱風俗通云周玘字孟玉為右将軍掾弟子使客殺人被罪玘諸府與太守盛亮相見了不論弟子之命遂俱盡於獄弟婦不哭其子但哭孟玉孟玉以此為高曹瞞𫝊曰太祖一名吉利阿瞞少飛鷹走狗遊蕩無度其叔父數言之於嵩操患之後逢叔父於路乃陽敗面喎口叔父怪問其故太祖曰卒中惡風叔父以告嵩驚愕呼操操曰貌如故嵩曰叔父言汝中風為已差乎操曰初不中風但失愛叔父故見枉耳嵩乃疑焉後叔父有所告嵩終不復信操於是益得肆志陳留耆舊𫝊曰爰彌字伯仁年十嵗叔父蘭部濟隂從事與御卒俱獵縣送酒肉彌不肯受甞問其故答曰聞之於諸侯夫臨其事不食其食蘭然其言還而不受貞㓗之質由是以彰也海内先賢𫝊曰故南郡太守南陽程堅體履仁孝秉志清㓗少譲財兄子仕郡縣居貧無資磨鏡自給襄陽記曰龎綂字士元徳公從子也少未有識者唯徳公重之年十八使徃見司馬徳操與談既而歎曰徳公誠知人此實盛徳也張方賢楚國先賢𫝊曰隂蒿字文玊南陽新野人衛尉興從祖兄也少䘮父母與叔父居恭謙婉順温良節儉王莽末義兵初起乃與叔父避世蒼梧後徴拜謁者以叔父憂弃官漢南記曰北海靖王興性敦篤仁厚長有明略兄弟少為光武所撫育恩愛如子劉彦明燉煌實録曰汜固字孔完大将軍掾純之孫也推家財百萬與寡弟婦二百萬與孤兄子於是三府競辟皆不就張隲文士𫝊曰桓驎字元鳯伯父焉官至太尉精察好學年十三四在焉坐有宿年客焉告之曰吾此弟子頗有異才今已涉獵書𫝊殊能作詩賦為口賦詩與之客乃為詩曰甘羅十二揚烏九齡昔有二子今則桓生参差等蹤異世齊名驎即答曰邈矣甘羅超等絶倫卓彼揚烏命世稱賢嗟予惷弱殊才棄年仰慙二子俯愧前言傅子曰傅燮字南容奉寡嫂甚謹食孤姪如赤子世説曰郄鍳遭永嘉䘮亂窮餓鄉人共飴之公常擕兄子外甥周巽二小兒徃食鄉人曰各自窮飴以君之賢共欲存君耳恐不能兼飴公於是獨徃食輙􅍭飯著兩頬還吐與二兒後鍳亡巽時為鄮莫候切縣觧職歸席苫於公心䘮三年又曰謝太傅寒雪日内集與兒女講論文義俄而雪驟公欣然曰白雪紛紛何所似兄子胡児曰撒鹽空中差可擬兄女曰未若栁絮因風起公大笑樂即公大兄奕之女右将軍王羲之之婦也太平御覽卷五百一十二
