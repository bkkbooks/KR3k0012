body:
  text: 太平御覽卷七百四十九宋李昉等撰工藝部六書下古文書八分書𨽻書草書飛白書章草書行書古文王隠晉書曰荀朂領秘書監始書師鍾朗法太康二年得汲郡冡中古文竹書朂自撰次注冩以為中經别在秘書以較經傳闕文多所證明書斷曰古文者黄帝史蒼頡所造也頡首有四目通於神明仰觀奎星圜曲之勢俯察龜文鳥跡之象採乎衆形合而為字是曰古文援神契云奎主文章蒼頡倣象夫文字者總而為言包意以名事也分而為義則文者祖父字者子孫得之自然備其文理象形之屬則為之文因而滋蔓母子相生形聲㑹意之屬則謂之字字者言孶乳浸多也題於竹帛謂之書書者如也舒也紀也又曰魏衛覬字伯儒河東安定人官至侍中尤工古文筆跡精絶魏初淳古文者出於邯鄲淳伯儒冩淳古文尚書以示淳淳不能别篆書漢書曰元帝善史書續漢書曰靈帝置鴻都門諸生能為尺壁賦及工書鳥篆相課試至千人焉魏略曰邯鄲淳善蒼頡蟲篆許氏字指後魏書竇遵善指篆北京諸碑及臺殿樓觀門題多其書也書斷曰秦李斯妙大篆始省改之為小篆著蒼頡篇七章雖帝王質文世有損益終以文代質漸就澆漓則三皇結繩五帝畫象三王肉刑斯可况也古文可為上古大篆為中古小篆為下古三古謂之實草𨽻為華妙極於華者羲獻精窮於實者籀斯始皇以和氏之璧琢而為璽令斯書其文今太山繹山及秦望等碑並其遺迹謂國之偉寳百世之式斯小篆入神大篆加妙書斷曰大篆者周宣王太史史籀所作也或云柱下史始變古文或同或異謂之為篆篆者傳也傳其物理施之無窮甄豐定六書三曰篆書八體書法一曰大篆又漢書藝文志史籕十五篇盖此也又曰吕氏春秋云蒼頡造大篆非也若蒼頡造大篆則置古文何地所謂篆籕盖其子孫也史籕即大之祖也又曰小篆者秦丞相李斯所作也増損大篆異同籕文謂之小篆亦曰秦篆蔡邕篆讃曰體有六篆妙巧入神或象龜文或化龍鱗紆體放尾長翅短身延頸負翼勢似凌雲八分書唐書曰張廷珪與陳州刺史李邕親善屢上表薦之邕所撰碑碣之文必請廷珪八分書之甚為時人所重世論曰安定梁鵠字孟皇善八分書太祖使書信宫門牓題書斷曰八分書者秦羽人上谷王次仲所作也又曰後漢師宜官南陽人也靈帝好書徴天下工書於鴻都門至數百人八分稱宜官為最大則一字徑丈小則方寸千言甚矜其能而性嗜酒或時空至酒家因書壁以售之觀者雲集酤酒多售𨽻書吳志曰張昭字子布善𨽻書晉書云王羲之尤善𨽻書為古今之冠論者稱其筆勢以為飄若遊雲矯若驚龍深為從伯敦導所器重晉中興書曰李充字𢎞度母衛氏廷尉展之妹也充少孤母聰明有訓又善楷書妙參鍾索世咸重之克從兄咸亦善書沈約宋書曰文帝善為𨽻書又曰羊欣字敬元長𨽻書父又疑初為烏程令欣年十二時王獻之為吳興太守甚知愛之獻之嘗夏月入縣欣著新絹裙晝寝獻之書裙數幅而去欣本工書因此彌善也齊書曰王僧䖍善𨽻書宋文帝見其書素扇歎曰非惟跡逾子敬方當器雅過之齊書曰周顒少往外事車騎将軍臧質家得衛恒散𨽻書法學之甚能文惠太子使顒書𤣥圃茅齊壁國子祭酒何徹以倒薤書求就顒換之顒笑曰天下有道求不與易也三國典畧曰周白石縣男趙文深以題榜之功除魏興郡守文深字徳本南陽宛人也少學楷𨽻有鍾王之則當時書唯文深及冀擕而已王褒尤善書文深誓恨形於言色後知好當難及改習褒書竟無所成轉被􅏺議謂之學歩邯鄲焉至於碑牓人莫之逮褒亦推之宫殿樓閣皆其迹也世宗令至江陵書景福寺碑蕭察觀而美之陳書曰蕭引善𨽻書𨽻為當時所重髙宗嘗披奏事指引署名曰此字筆勢翩翩似鳥之欲飛引謝曰此乃階下假其羽毛耳唐書曰薛稷好古博雅尤工𨽻書自貞觀永徽之際虞世南禇遂良時人宗其書跡自後罕能繼者稷外祖魏徴家圗籍所有虞禇舊跡稷鋭精模倣筆勢遒麗當時无及之者書斷曰𨽻書者秦下邽人程邈所作也邈字元岑始為縣獄吏得罪始皇幽繫雲陽獄中覃思十年益大小篆方圓而為𨽻書三千字奏之始皇善之用為御史奉事繁多篆字難成乃用𨽻書為𨽻人佐書故曰𨽻書又曰和帝時賈魴撰滂喜篇以蒼頡為上篇訓纂為中篇滂喜為下篇所謂三蒼乃為三篇也皆用𨽻字冩之𨽻法由茲而廣酈善長水經注曰臨淄人發古冡得棺前和外隠起為𨽻字言齊太公六代孫胡公之棺也唯三字是古餘同今書𨽻字出古非始於秦也成公綏𨽻勢曰蟲篆既繁草槀近偽適之中庸莫尚於𨽻草書東觀漢記曰北海静王睦善草書臨病明帝驛馬令作草書尺牘十首焉范曄後漢書曰張超並善於草書妙絶時人魏志曰劉廙轉五官将文學文帝器之命廙同草書晉書曰王獻之時議者以為羲之草書江右中朝莫有及者獻之骨力逺不及父而媚趣過之又曰衛瓘字伯玊與尚書郎燉煌索靖俱善草字時人號之一臺二妙漢末張芝善草書論者謂瓘得伯英之筋靖得伯英之肉北齊書曰趙仲將善草𨽻雖與子弟書字皆楷正云草不可解若放之於人即似將輕易若當家卑㓜又恐其疑三國典畧曰蕭子雲齊豫章王獻文之子有文學工草書與兄弟子顯子昭齊名少子時又善書梁武帝稱之曰子敬之迹不及逸少蕭特之書遂逼其父陳書曰文帝時軍人丹徒盗發晉郄曇慕獲晉右軍將軍王羲之書及諸名賢遺跡事覺其書並沒縣官蔵於秘府文帝以伯茂好古多以賜之由是伯茂大工書甚得右軍之法唐書曰賀知章善草書好事者供其牋翰每紙不過數十字共傳寳之時有吳君張旭亦與知章相善而好酒每醉後號呼狂走索筆揮灑變化無窮若有神助時人號為真三輔决録曰趙襲字元嗣為燉煌太守先是杜伯崔子玉以工草稱於前世襲與羅暉亦能草頗自矜誇故張伯英與襲同郡太僕朱賜書曰上比崔杜不足下方羅趙有餘也趙一非草書曰夫草書之興也其於近古乎上非天象所垂下非河洛所吐中非聖人所造盖秦之末官書煩冗戰攻並作軍書交馳羽檄分飛故𨽻草趣急速耳示簡易之指非聖人之業也今之學草者不思其簡易之㫖直以為杜崔之書龜龍所見也齠齓以上苟任渉學者廢蒼頡史籕竟以杜崔為楷私書相與云適廹遽故不及草草本易而速今反難而遲失指多矣夫杜崔張子皆有超俗絶世之才博學餘暇逰手于斯後世慕焉專用為務鑚堅仰髙忘其罷勞夕􅅥不息昃不暇食十日一筆月數丸墨領袖如皁脣齒常墨雖隨衆坐不遑談戲展指畫地見䚡蘇耒切角中骨也出血猶不休輟然其為字無益工拙亦效嚬者之増醜學歩者之失節王右軍自叙草書勢曰昔晉時諸侯争長簡榭相傳望烽闕馬周太宗嘗以御筆賜周公飛白書曰鸞鳯凌雲必資羽翼股肱之寄誠在忠良髙宗為飛白書以賜侍臣賜戴至徳曰泛洪源俟舟檝賜郝處俊曰飛九霄假六翮賜李𤣥敬曰資啓沃罄丹誠大業拾遺曰大業年煬帝將幸江都命越王侑留守東都宫女半不隨駕争泣留帝攀車惜别指血染鞅帝不廽因飛白題二十字留賜宫妓云我夢江都好征遼亦偶然但留顔色在離别止今年唐㑹要曰貞觀十八年五日端午日太宗為飛白書作鸞鳯虬龍蛇等字筆勢驚絶謂司徒長孫無忌吏部尚書楊師道曰五日舊俗必用服翫相賀朕今各賀君飛白扇二枝庶動清風以増美徳書斷曰飛白書者後漢左中郎將蔡邕所作也王隠王愔並云飛白變楷制也本是宫殿題署勢既勁大字宜輕微不滿名為飛白王僧䖍云飛白是八分之輕者雖有此説按漢靈帝熹平年詔蔡邕作聖皇篇篇成詣鴻都門上時方修飾鴻都門伯喈待詔門下見役人以堊帚成字心有悦焉歸而為飛白之書漢末魏初並以題署宫閣其體有二剏法於八分窮微於小篆自非蔡公設妙豈能詣此可謂勝寄冥通縹緲神仙之事也法書要録曰飛白本是八分之輕者全用指法吳時張𢎞好學不仕常著烏巾時人號作張烏巾此人特善飛白能書者鮮不好之章草書晉書曰王羲之書初不勝庾翼郄愔及其暮年方妙常以章草答庾亮而翼深歎伏因與羲之書云吾昔有伯英章草十紙過江顛狽遂乃􅁯失常歎妙迹永絶忽見足下答家兄書煥若神明頓還舊觀書斷曰章草書漢黄門令史㳺所作也衛恒李誕並云初漢而有草法不知其誰蕭子良云章草者漢齊相杜操始變藁法非也王愔云漢元帝時史㳺作急就章解散𨽻體麄書之漢俗簡墮漸以行之是也又曰索靖字幼安善章草出于韋誕峻險過之若山形中裂水勢懸流雪嶺孤松氷河危石其堅勁則古今不逮後漢徐幹字伯章善章草班固與弟超書稱之曰得伯章與藁知識讀之莫不歎息實亦藝由己立名自人成後有蘇班者平陵人也五嵗能書甚為伯章之所稱又曰後漢張伯英損益伯度章草迹猶逸少増减元帝真書雖潤色開華精於斷割美則美矣至若髙深之到質素之風俱不逮其師也然名為今古之獨歩又曰張伯英草書急就章字皆一筆而成合於自然可謂變化之極楊欣云張芝皇象鍾繇索靖時並號書聖張芝善章草書崔瑗云龍驤豹變青出於藍又剏為今草天縱尤異率意超曠無惜是非若清澗長源流而無限縈廽崖谷任於造化至於蛟龍駭獸奔騰挐攫之勢手隨心變窈冥不知其所如也精熟神妙冠絶古今則百世不易之法式不可以智識不可以力求若上士游乎沉黙之鄉鸞鳯翔乎大荒之野韋仲將謂之草聖豈徒言哉又曰後漢張昶字文舒伯英季弟為黄門侍郎尤善章草家風不墜奕葉清華書類伯英時人謂之亞聖又曰後漢杜度字伯度京兆杜陵人也御史大夫延年曾孫章帝時為齊相善草書章帝云史㳺始草書傳之不絶其能又絶其跡剏其神妙其唯杜公韋誕云杜氏傑有骨力而字畫微痩崔氏法之書體甚濃結字工巧時有不及張芝嘉而學焉轉精其巧可謂草聖超前絶後獨歩無䨇矣行書書斷曰後漢頴川劉徳升字君嗣造行書即正書之小偽務從簡易相間流行故謂之行書王愔云晉世以來工書者多以行書著名昔鍾元常善行狎書是也爾後王羲之獻之並造其極焉又曰劉徳升桓靈之時以造行書擅名一草剏亦豐妍風流宛約獨歩當時胡昭鍾繇並師其法而胡書體肥鍾書體瘦亦各有君嗣之美又曰晉王修字敬仁善行書嘗就右軍求書乃冩東方朔畫讃與之王僧䖍云敬仁書殆窮其妙王子敬每省之咄咄逼人太平御覽卷七百四十九
