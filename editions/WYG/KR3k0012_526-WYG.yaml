body:
  text: 太平御覽卷五百二十六宋李昉等撰禮儀部五祭禮下漢書郊祀志曰洪範八政三曰祀祀所以昭事通神明也旁及四夷莫不修之下至禽獸豺獺有祭應劭曰孟春獺祭魚季秋􅉘祭獸是以聖王為之典禮焉又曰秦襄公攻戎救周列為諸侯居西自以為主少昊之神作西畤白帝其牲用駠駒黄牛羝羊各一云其后十四年秦文公東獵汧渭之間卜居之而告文公夢蛇自天下屬地其口止于鄜衍李竒曰鄜音孚文公問於史淳淳曰此上帝之徵君其祀之于是作鄜畤用三牲郊祭曰白帝焉自未作祠而雍旁故有吴陽武祠李竒曰雍旁有吴陽地雍東有好畤皆廢無祀或曰自古以雍州積髙神明之隩故立畤郊上帝諸神祠皆聚云盖黄帝時常用事雖殷周亦郊焉其語不經見搢紳者不道又郊祀志曰始皇東㳺海上行禮祀名山大川及八神求仙人羡門之屬八神將自古而有之或曰太公以來作之齊所以為齊以天齊也蘇林曰當天下之中故中央齊其祀絶莫知起時八神其一曰天主祠天齊天齊淵水居臨菑南郊山下又郊祀志曰文帝始幸雍郊見五畤祠衣皆上赤趙人新垣平以望氣見上言長安東北有神氣成五采若人冠冕焉或曰東北神明之舍西方神明之墓也神明日也日出東方舍謂暘谷日沒于西墓謂北谷也天瑞下宜立祠上帝以合符應于是作渭陽五帝廟同宇韋昭曰宇謂上同下異禮所謂復廟重屋也帝一殿面各五門各如其帝色祠所用及儀亦如雍五畤夏四月文帝親拜霸渭之㑹以郊見渭陽五帝五帝廟臨清渭其北穿蒲地溝水灌火舉而祠若光輝然屬天馬于是貴平至上大夫賜累千金而使博士諸生刪六經中作王制謀議巡狩封禪事文帝出長門若見五人于道北遂因直其立五帝壇祠以五牢東觀漢記曰建武三年上幸舂陵祠圜廟大置酒與舂陵父老故人為樂又曰桓譚字君山沛人章帝元和中行廵狩至沛令使者祀譚冢鄉里以為榮又曰李通上大司空印綬以特進奉朝請及有司奏請封諸皇子帝感通首創大謀即日封通少子雄為邵陵侯每幸南陽常遣使以太牢祀通父冢又曰顯宗拜馬嚴持兵長史將北軍五校士羽林兵三千人屯西河美稷衛䕶南單于聽置司馬從事牧守謁敬伺之將行敕嚴過武庫祭蚩􅀹親御阿閣觀其士衆時人榮之又曰永平中詔京兆右扶風以中牢祠蕭何霍光出郡錢榖給蕭何子孫在三百里内悉令祀祠又曰桓帝初立黄老祠北宫濯龍中以文􅄢為壇飾金淳釦砌彩色昡曜祠用三牲大官設珍饌作倡樂以求福祥漢王徳傳云章帝詔使者奉太牢致祠唐堯於陽武雲臺袁山松後漢書曰韓卓字子助陳留人蜡日有奴竊食祭其母卓義其心即日免之漢舊儀曰宗廟八月飲酎用九太牢元年祭天二年祭地三年祭五帝于畤三嵗一辦皇帝自行他祠不出祭天紫壇幄帷髙帝配天居室下西嚮設幄席又宗廟曰三年一大祫祭之子孫諸帝以昭穆坐于髙祖廟皆合食設左右坐髙祖南面繡幄帳堂上西北隅曲几黄金釦器每太牢中分之右辦上帝左辦上后俎餘委空積于前殿千斤名曰推俎子為昭孫為穆西曲屏風穆東面皆曲几如髙祖饌陳其后各分其左右坐如祖妣之坐法又曰原廟一嵗十二祠有閏加用太牢又曰惟八月飲酎駕夕牲牛以綉衣之皇帝暮視牲以方諸取水于月以陽燧取火於日為明水火左􅃝以水沷牛右肩手執鸞刀以殺牛取血薦之而即更衣又曰元封六年諸儒奏請施行董仲舒請雨事始令丞相以下求雨曝城南舞童女禱天神成帝五年始令諸官止雨朱繩乃縈社擊皷攻之又曰祭五嶽祀用三正色牲十月涸凍二月解凍皆祭祀乘傳車稱使者祭四凟用三正色牲祀注有馬祭人先於隴西西縣人先山皆有土人山下有畦呼如種菜畦畦中各王封祭參辰三辰于池陽谷口夾道左右為壇營覆地各周三十六里又云祭西王母于石室皆在所二千石令長奉祀漢五年復修周室舊祠祀后稷于東南常以八月祭以太牢舞者七十二人冠者五六三十人童子六七四十二人為民祈農報功又曰聖王之法追祭天地日月星辰山川萬神皆古之人能紀天地五行氣奉成其功以成人者也故其奉祀皆以人事之禮食之非祭祀天與土地金木水火石也又曰祭三皇五帝九皇六十四辰皆古帝王凡八十一姓也漢末英雄記曰公孫瓚上計吏郡太守劉其以事犯法檻車徴伯珪褠衣平幞御車到洛陽其當徙日南伯珪具豚米于墓上祭先舉觴綴祝曰昔為人子今為人臣當詣日南日南多瘴氣恐或不還與先人辭於此再拜慷慨而起其時州里人在京師者送行見之及觀者莫不欷歔魏志曰管寧恒著布襦袴布裙隨時單復出入閨庭能自拄杖不須扶持四時祭祀輒自力强改加衣服著紫巾故在遼東所有白布單衣親薦饌拜跪成禮寧少喪母不知形像常時觸發泫然流涕又曰穢南國常用十月祭祀晝夜飲酒歌舞名之為舞天又祭虎以為神呉志曰赤烏年有南鳥銜鵲墮東館丞相朱據燎鵲以祭干寳晉紀曰帝配饗魏太祖廟有奏諸功臣從饗者更以官為次在荀郭之上沈約宋書曰羊𤣥保自少至老謹于祭奠四時珍新未得薦者口不妄甞齊書曰張沖永明八年為假節監青冀二州行刺史事冲父卒遺命曰祭我必以鄉土所産無用牲物冲在鎮西時還呉國取果菜每至丞甞輒涕薦焉家語曰魯公索氏將祭而亡其下牲孔子聞之曰公索氏不及三年必亡矣後一年而亡孔叢子曰元和二年春帝東巡狩還過魯幸闕里以太牢祠孔子及七十二弟子作六代之樂大㑹孔氏男子二十以上者六十三人命儒者講論益都耆舊傳曰蜀郡張寛字淑文漢武時為侍中從上祀甘泉至渭橋有女子浴于渭水乳長七尺上怪其異遣問之女曰帝後第七車知我所為時寛在第七車對曰天星主祭祀者齋戒不嚴則女人星見汝南先賢傳云薛包歸先人冡側種稻以祭祀種芋以充饑耽詩恱禮𤣥虛無為舉孝亷賢良方正皆不就越絶書曰越王既得平呉春祭三江秋祭五湖因以其時為之立祠垂之來世傳之萬載鄰邦樂得來取之十二洲記曰昔禹治洪水既畢乃乗橋車到鍾山祠上帝于北河歸大功于九河也襄陽記諸葛亮所在各來為立廟朝議不合百姓遂因時祭之于道陌也摯虞雜記議曰故事祀臯陶于廷尉寺祭先聖于太學也桓子新論曰昔楚靈王驕逸輕下簡賢務鬼神信巫祝之道齋戒潔鮮以祀上帝禮羣神躬執羽紱起舞壇前吴人來攻其國人告急而靈王鼓舞自若顧應之曰寡人方祭上帝樂明神當蒙福佑焉不敢赴救而吴兵遂至俘獲其太子及后姬甚可傷論衡曰魯文公逆祀去者三人定公順祀叛者五人貫于俗者謂則禮為非曉禮者寡則知是者稀又曰凡祭祀之義有二一曰報功二曰循先報功以勉力也循先以崇恩也黄帝問𤣥女兵法曰六甲將及夫人姓名服色白其將皆著赤幘小冠帶白綬絞夫人足皆各象其禽獸足凡欲治致神當于帛上書諸神名姓如法祭法事六曰見形六十日一祭合諸神祭之祭法鋪長一九廣三寸白茅為籍編以青絲繫籍長二尺四寸廣六寸餅棗栗并脯置籍上杯皆黑中以丹砂九兩盛米嚢九枚置北斗座上中為九星六甲坐外四面十二坐前一杯受道者壇東北祭南向再拜祝軍令曰金鼓幢麾隆衡皆以立秋日祠先時一日主者請祠其主者奉祠若出征有所尅獲還亦祠向敵祠血于鐘鼓秋祠及有所尅獲還但祠不血鐘鼓祝文某官使主者某敢告隆衡鐘鼓幢麾夫軍武之器者所以正不義為民除害也謹以立秋之日潔牲稷旨酒而敬薦之又曰常以己丑日祠牛馬先祝文曰某月己丑某甲敢告牛馬先馬者用兵之道牛者軍農之用謹潔牲黍稷旨酒敬而薦之又曰軍行濟河主者常先白沉璧文曰某王使者某甲敢告于河賤臣某甲作亂天子使某師衆濟河以討醜類故以沉璧惟爾有神裁之曹植求祭先王表臣植百拜表自計違逺以來已踰旬日垂竟夏節方到臣悲傷有思先王公夏至日終是以家俗不以夏日祭至于先王自可以今辰告祠臣雖卑鄙實禀體于先王自臣雖貧窶䝉陛下厚賜足供太牢之具臣欲祭先王于北河之上羊猪牛臣能自辦者臣縣自有先王喜鰒臣前以表得徐州臧霸二鰒百枚足自供事請水𤓰五枚計先王崩來未能半嵗臣實欲告敬且欲復盡哀博士鹿優韓盖等以為禮公子不得稱先君先君公子之子不得祖諸侯謂不得廟而祭之也禮又曰庶子不得祭宗廟詔曰得月二十八日表知侯推情欲祭先王于河上覽省上下悲傷感切將欲遣禮以紓侯恭敬之意㑹博士鹿優等奏禮如此故寫以下開國承家顧廹禮制惟侯存心與吾同之殷允祭徐孺子曰惟太元六年龍集荒落冬十月哉生魄試守豫章太守殷君謹遣左右某甲奉清酌薌合一簋單羞再拜奠故聘士豫章徐先生周祇祭梁鴻文曰晉隆和四年十一月陳郡周頴文以藴藻行潦祀梁先生殷闡祭王東亭文曰今以少牢之奠敬薦東亭王侯之靈伯王祭孫叔敖文曰謹以豐修祭楚令尹孫君之靈渺渺千載悠悠舒經理無不通事隔者形尚想清塵承風效誠謝惠連祭古塚文曰東府掘城北塹入一丈餘得古塚上無封域不用磚瓦以木為槨中有二棺正方兩頭無和明器之屬材瓦銅漆有數十種刻木為人長三尺可有二十餘頭初開見悉識是人形以物棖撥之應手灰滅棺上有五銖錢百餘枚水中有甘蔗節及梅李核皆浮出而不甚爛壊銘志不存世代不可得而知之公命城者改埋于東崗祭以豚酒既不知其名字逺近故假為之號曰冥寞君云耳楊泉請辭曰古不墓祭𦵏于中原而廟在大門裏不敢外其親平明出𦵏日中反虞不敢一日使神無依也自周衰禮廢立寢于廟墓漢興而不改以先帝衣冠四時上食進果實而禘祫祭祀皆于宗廟及其末因寢之在墓咸往祭焉盖由京師三輔酋豪大姓力强財富婦女贍侈車兩相逐宿止墓下連日厭飫遂以成俗迄以今日夫死者骨月歸于土神而有靈豈肯守夫敗壊而于草莽哉唐書曰王義方初為太子校書魏徵張亮皆厚禮之亮誅坐與交游貶授儋州吉安丞行至南海舟人將以酒脯致祭義方曰黍稷非馨義在明德乃酌水而祭太平御覽卷五百二十六
