  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_498-1a, image: WYG0897/WYG0897-0491a.png}
body:
  text: 太平御覽卷四百九十八宋李昉等撰人事部一百三十九簡傲揶揄簡傲詩曰兕觵其觩㫖酒思柔彼交匪傲萬福來求禮曰傲不可長欲不可縱志不可滿樂不可極春秋曰衞侯饗苦成叔甯惠子相苦成叔傲甯子曰苦成家其亡乎古之為享食也以觀威儀省禍福也論語曰居簡而行簡無乃太簡乎韓詩外傳曰田子方之魏魏太子從車百乘迎之於郊太子再拜謁子方不下車太子不悦曰敢問何如則可以驕人矣子方曰吾聞以天下驕人而亡者有矣以一國驕人而亡者有矣由此觀之則貧賤可驕人矣失志不得則授履而之秦楚耳安往而不得貧賤乎於是太子再拜而後退子方遂不下車孔藂子曰子思居衞曾子謂子思曰昔吾從夫子巡於諸侯未嘗失其人臣之禮而猶聖道不行今吾觀子有傲世之心無乃不容乎子思曰時移勢異各有宜也當吾先君周制雖毁君臣固位上下相持欲行其道不勞以求之則不能入也今天下諸侯方欲力爭競招英雄以自輔翼此得士則昌失士則亡之秋也不自髙人將下吾不自貴人將賤吾舜禹揖讓成湯用師非故相詭乃時也華嶠後漢書曰趙壹字元淑恃才倨傲為鄉里所擯東觀漢記曰博士范升奏曰伏見太原周黨解履升華轂陛下見帝庭偃蹇慠慢逡巡進退臣願與並論靈臺之下魏畧曰丁謐少不肯交遊但博觀書傳為人亢毅頗有才略太和中常於鄴借人空屋居其中而諸王亦欲借之不知謐已得直開門入謐望見王交脚卧不起而呼其奴客曰此人等促呵使去王怒其無禮還具上聞之明帝收繫鄴獄以其功臣子原之蜀志簡雍字憲和涿郡人與先主有舊性簡傲跌蕩在先主座席猶箕倨傾倚威儀不肅自從適諸葛亮已下則獨擅一榻傾枕卧語無所為屈蜀志彭羕字永年廣漢人身長八尺貌甚偉姿性驕傲多所輕忽唯敬同郡秦子整王隠晉書曰魏末阮籍有才而嗜酒荒放露頭散髮裸袒箕倨作二千石不治官事日與劉伶等共飲酒歌呼時人或以籍生在魏晉之交欲佯狂避時不知籍本性自然也干寳晉記曰吕安友嵇康相思則命駕千里從之或遇其行康兄喜位至方伯拭席而待弗之顧也獨宿車中康母設酒求康兒共戯則去鄧粲晉記曰劉伶常着袒服而乘鹿車客有詣伶值其裸袒責伶伶笑曰吾以天為屋以屋為褌諸君不當入禈又何怨乎其自任若此又胡母輔之過河南門下將飲酒河南卒王子博倨坐其傍輔之叱使取火水博曰我卒也唯不乏吾事安能為人使輔之與語歎曰吾弗及也因言河南尹以為功曹習鑿齒漢晉陽秋曰陳蹇兄丕有名於世與夏侯元親交元拜其母蹇時為中領軍聞元㑹於其家悦而歸既入戸元曰相與未致於此蹇當戸立良久曰如君言乃趨而出意氣自若元大以此知之後魏書曰李栗雁門人也性簡慢怙寵不率禮度毎在太祖前舒放倨傲不自祗肅笑唾任情太祖積其宿憤天興三年遂誅之於是威嚴始厲制勒羣下盡卑謙之禮自栗始也後魏書曰元順字子和起家為給事中時尚書令髙肇帝舅權重天下人士望塵拜伏順曾懐刺詣肇門門者以其年少答云在座大有賔客不肯為通順叱之曰任成王兒可是賤也及見直往登牀捧手抗禮王公先達莫不怪懼而順辭吐傲然若無所覩肇謂衆曰此兒豪氣尚爾况其父耶晉中興書曰蔡謨讓司徒孝宗臨軒遣侍中璩黄門郎丁纂徵謨謨陳疾篤使主簿謝攸對自平旦至日中使者十餘反而謨不至孝宗時年八歲甚怪之亟問左右曰所召何人何以至今不來軒臨何當竟㑹稽王曰蔡公傲違上命無人臣之禮若人主卑屈於上大義不行於下亦不復知所以為治於是奏送謨廷尉以正刑書謨恨率子弟素服詣闕稽顙到廷尉待罪皇太后詔可依舊制免為庶人沈約宋書曰㑹稽太守孟顗事佛精懇而為謝靈運所輕嘗謂顗曰得道應須慧業文人生天當在靈運前成佛必在靈運後顗深恨此言禰衡傳曰衡字正平建安初自荆州北遊許都恃才慠逸臧否過差見不如己者不肯與言語人皆以是憎之文士傳曰阮籍從容曰平生曾遊東平縣樂其土風願得為東平太守文帝大悦即從之籍便騎驢徑到郡堂皆壊壁鄣内外相望敎令清當十餘日便騎驢歸淮南子曰賔有見人於季子者賔出季子曰子之賔獨有三過望我而笑是慢也談語而不稱師是叛也交淺而言深是亂也賔曰望君而笑是公也談語不稱師是通也交淺而言深是忠也故季之賔客一體也或以為小人或以為君子視之異也物理論曰今有吕子義清賢仕為率更令有人就之宿非其度數之内子義燃燭危坐通曉目不轉睛膝不移處㑹稽典録曰嚴光一名遵帝引入論故舊累日因共卧光以足加帝腹上明日太史奏客星犯帝坐甚急帝曰朕故人嚴子陵共卧耳語林曰羅含在宣武坐人介與他人相識含正容曰所識已多不煩復爾世説曰王子猷作桓溫車騎參軍桓謂王曰卿在府久當相料理王初不答直髙視手板拄頰云西山朝來致有爽氣應璩與崔元書曰豈有亂首抗巾以入都城衣不在體而以適人乎昔戴叔鸞箕坐見邊文祖此皆衰世之慢行也晉書曰何綏性既輕物翰札簡傲城陽王尼見綏書疏謂人曰伯蔚居亂而矜豪乃爾豈其免乎晉書曰謝奕與桓溫善溫辟為安西司馬猶推布衣好在溫座岸幘嘯詠無異常日桓溫曰我方外司馬又曰王獻之嘗經呉郡聞顧辟疆有名園先不相識棄肩輿逕入時辟疆方集賔友而獻之遊厯既畢傍若無人辟疆勃然數之曰傲主人非禮也以貴驕士非道也失是二者不足齒之傖耳便驅出門又曰王恬字導子性傲誕不拘禮法謝萬嘗造恬既坐少頃恬便入内萬以為必厚待己殊有喜色恬久之乃沐頭髮而出據胡牀於庭中曬髮神氣傲邁竟無賔主之意萬悵然而還又曰王徽之字子猷性卓犖不羈為大司馬桓溫參軍蓬首散帯不綜府事又為車騎桓冲騎兵問卿署何曹對曰似是馬曹又問管幾馬曰不知馬何由知數又問馬比死多少曰未知生焉知死嘗從冲行值暴雨徽之因下馬排入車中謂曰公豈得獨擅一車又曰劉伶嘗著袒服乘車客有詣伶值其裸袒責伶伶曰吾以天為屋以屋為褌諸君不當入中又曰謝萬既受任北征矜豪傲物常以嘯詠自髙未嘗撫衆兄安身憂之自隊主將師已下安無不慰勉謂萬曰汝為元帥諸將宜數接對以悦其心豈有傲誕若斯而能濟事也萬乃召集諸將都無所説直以如意指四座云諸將皆勁卒諸將益恨之又曰周顗王導甚重之嘗枕顗膝而指其腹曰卿此中何所有也答曰此中空洞無物然足容卿輩數百人導亦不以為忤又於導座傲然嘯詠導云卿欲希嵇阮耶顗曰何敢近捨明公逺希嵇阮又曰王澄為荆州刺史澄將之鎮送者傾朝澄見樹上鵲巢便脱衣上樹探鷇而弄之神氣蕭然傍若無人劉琨謂澄曰卿形體散朗而内實動俠以此處世難得其死澄黙然不答宋書曰張敷遷中書舍人與狄當周赳並管要務以敷同省名家欲詣之赳曰彼若不相容便不如不往詎可輕往耶當曰吾等並已員外郎何憂不得共坐敷先設二牀去壁三四尺二客就席酬接甚歡既而呼左右曰移吾牀逺客赳等失色而去又曰陶潛有造之者設酒潛若先醉便語客曰我醉欲眠卿可去宋書曰張敷永初初遷祕書郎嘗在省直中書令傅亮貴宿接要聞其好學過候之敷卧不即起亮怪而去齊書曰張欣泰領羽林監欣泰通涉雅俗交結多是名素下直輒遊園池著鹿皮冠衲衣錫杖挾素琴有以啓世祖曰將家兒何敢作此舉止齊書曰丘靈鞠好飲酒臧否人物在沈淵座見王儉詩淵曰王令文章大進靈鞠曰何如我未進此言達儉靈鞠宋世文名甚盛入齊頗減蓬髮㢮縱無刑儀不治家業王儉謂人曰丘公仕宦不進才亦退矣梁書曰何㸃雖不入城府而遨遊人世不簪不帯或駕柴車躡草屩恣心所適致醉而歸士大夫多慕從之時號為通𨼆隋書曰崔儦毎以讀書為務負恃才地忽略世人大署其戸曰不讀五千卷書者無得入此室數年之間遂博覽羣言多所通涉唐書曰鄭仁表洎之子也文章尤稱俊拔然恃才傲物人士薄之自謂門地人物文章具美嘗曰天瑞有五色雲人瑞有鄭仁表劉鄴少時投文於洎仁表兄弟嗤鄙之咸通末鄴為宰相仁表竟貶死南荒又曰崔元翰入朝為太常博士禮部員外郎竇參輔政用為知制誥詔令溫雅合於典謨然為太剛褊簡傲不能取容於時毎發言論略無阿徇忤執政㫖故掌誥二年而官不遷又曰李白常醉令髙力士脱靴由是斥去乃浪迹江湖終日沉醉時侍御史崔宗之謫官金陵與白詩酒唱和嘗月夜乘舟自采石達金陵著白衣宫錦袍於舟中顧瞻嘯傲傍若無人初賀知章見白賞之曰此天上謫仙人也揶揄説文曰人相笑曰揶揄東觀漢記曰光武令王霸至薊市中募人將以擊王郎市人皆大笑擧手揶揄之霸慙遽而返續晉陽秋曰襄陽羅友家貧嗜酒伺人祠祀往乞餘在桓溫府屢以貧乞禄溫以其誕肆許而不用同府人有得郡者溫為坐别友亦被命至尤晩溫問之答曰民欽道嗜味昨奉敎乃守旦出門於中途遇一鬼大見揶揄曰見汝送人作郡不見人送汝作郡民始怖終慙不覺淹緩溫笑用之為郡也太平御覽卷四百九十八
