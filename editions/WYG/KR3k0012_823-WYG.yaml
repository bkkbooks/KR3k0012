body:
  text: 太平御覽巻八百二十三宋李昉等撰資産部三耒耟犁耦種植耘耔耨钃耰銍銚鑄耒釋名曰耒來也古史考曰神農作耒耜世本曰咎繇作耒耜周禮冬官考工下曰車人為耒庛長有尺一寸中直者三尺有三寸上句者二尺有二寸内六尺有六寸與步相中也堅地欲直庛柔地欲句庛直庛則利推句庛則發倨句罄折謂之中地禮記月令季冬曰氷已入令人出五種命農計耦耕修耒耜具田器韓詩曰三月之時可預取耒耜修繕之至於四月始可以舉足而耕也魏志曰段灼上疏理鄧艾曰昔姜維有斷壠之志艾修治備守積榖彊兵值歳凶旱又為區種身被烏衣手執耒耜以率将士上下相感莫不盡力梁書曰賀革字文明少以家貧躬耕供養年二十始輟耒就父受業精力不怠唐書曰永徽二年髙宗親享先農躬御耒耜淮南子曰清英之美始于耒耜清英酒也耜釋名曰耜齒也如齒之斷物也周禮地官下山虞曰凡耒耜斬季材以時入之又秋官下曰薙氏掌殺草春始生而萌之夏入至而夷之秋䋲而芟之冬至日而耜之禮記禮運曰治國不以禮猶無耜而耨也毛詩國風曰三之日于耜四之日舉趾同我婦子饁彼南畝田畯至喜又曰小雅大田曰以我覃耜俶載南畝又周頌曰良耜秋報社稷也畟畟良耜俶載南畆播厥百榖實函斯活王隠晉書曰徐苖少孤家貧好學書晝執耒耜夜不廢讀誦後漢書曰趙琰遣人買耜刃得剰利六百即命送還刃主刃主髙之義而不受琰命委之而去唐書曰髙宗行籍田之禮躬執耒耜而九推焉禮官奏陛下合三推上曰朕以身率下自當過恨不終於千畆矣初将籍田觀于先農之壇因閲耒耜有雕刻文飾者謂左右曰田器農人執事在於素朴豈貴文飾乎乃命徹之國語曰周制有曰民無懸耜野無奥革吕氏春秋曰六尺之耜所以成􅅵其下八寸所以成畆犁釋名曰犁地也利則發土絶草根也魏畧曰王甫隆為燉煌太守民不曉作犁用工甚費隆乃教作樓犁省力過半又曰𢎞農太守劉類多市犁鎋載所部貿絲管子曰距國門以外窮四竟之内丈夫二犁童子五尺一犁以為三日之功令農始作服于公田鹽鐵論曰庻人乘馬者足以代勞而已故行則服軛止則執犁下種挽耬皆取備焉日種一頃至今三輔猶賴其利遼東耕犁轅長四尺迴轉相妨既用兩牛兩人牽之一人耜一人種二人挽耬凡用両牛六人一日則種二十五畆其懸絶如此陳留耆舊𫝊曰蕭令陳弇字叔明躬自握犁種五榖有黄雀隨犁翔弇上崔寔政論曰武帝以趙過為捜粟都尉教民耕植其法三犁共一牛一人将之唐書曰天寶初開砥柱之險以通流石中得古鐵犁鏵有平陸縣字因改河北縣為平陸縣後唐史明宗上顧謂侍臣曰朕昨日出城觀稼見百姓父子三人同曳犁耒者力農如是深歉予懐可賜耕牛二頭耦説文曰耦耕廣五寸為代二代為耦周禮地官下曰里宰以歳時合耦于鋤以治稼穡耨行秩叙以持有司之政令而徴歛其財賦又冬官曰匿人為溝洫耜廣五寸二耜為耦一耦之伐廣尺深尺為之畝田首倍之廣二尺深二尺謂之遂毛詩周頌曰駿發爾私終三十里亦服爾耕十千為耦國語曰吴王還自伐齊乃誶申胥曰昔吾先王體徳聖明達于上帝譬如農夫作耦以刈殺四方之蓬蒿董仲舒云禹見耕者五耦而軾過十室之邑而下見山仰之見谷俯之種植周禮地官大司徒之職曰辨十有二壤之物而知其種以教穡稼樹藝禮記月令曰孟春行冬令則水潦為敗首種不入又仲秋月是月也勸人種麥無或失時又禮運曰為禮不本於義猶耕而勿種也尚書洪範五行曰土爰稼穡稼穡作甘尚書酒誥曰妺土嗣爾股肱純其藝黍稷奔走事厥考厥長尚書考靈耀曰春鳥星昏中以種稷夏火星昏中以種黍菽孝經援神契曰土黄白宜種禾黒墳宜黍麥蒼赤宜菽泉宜稲說文曰禾之秀實曰稼莖節為禾家聲一曰稼家事也一曰在野曰稼史記曰棄為兒時其游戲好樹麻菽漢書曰景帝三年春正月詔曰農天下之本也黄金珠玉飢不可食寒不可衣以為幣用不識其終始間嵗或不登意為末者衆農民寡也其令郡國務勸農桑益種樹可得衣食勸吏發民若取庸黄金珠玉者坐贜為盗二千石聴者與同罪又曰王莽篡位二年興神仙事以方士蘇樂言起肖臺於宫中臺成萬金作樂其上順風作液湯又種梁禾於殿中或曰五色禾也先鬻鶴髓鬻者煮也瑇瑁犀玉二十餘物漬種計粟斛成一金言此黄帝榖仙之術以樂為黄門郎令主之東觀漢記曰范克為桂陽太守俗不種桑無蠶織絲麻之利類皆以麻枲頭緼著衣民墮窳少麄履盛冬皆以火燎充令属縣教民益種桑柘養蚕絲織履復令種紵麻數年之間人賴其利衣履温煖吴會分地記曰卞山者勾踐於此山鑄銅銅不鑠埋之生馬箠勾踐遣使者取徒於南村種之飾治為馬箠獻於吴陳書曰陳靈洗為重安公性好播植躬勤耕稼至於水陸所宜刈穫早晩雖老農不能及也淮南子曰夫樹林者灌以梁水疇以肥壤一人養之十人㧞之林必無耕又曰昏孤中則務種榖二月昏時孤星中於南方朱雀之宿也大火中則種黍菽大火東方蒼龍之宿四月建巳中南方也虛中則種粟麥北方𤣥武之宿也八月建酉中於南方也又曰古者民茹草飲水食樹木之實蠃蚌之肉多疾毒傷之患於是神農乃始教民播五榖相土地原隰燥濕肥墝髙下百草之滋味嘗泉甘苦令民知避就當此之時一日而遇七十毒又曰文公種米吕氏春秋曰氷凍方固后稷不種后稷之種必待春論衡曰后稷為種藝為戲汜勝之書曰稗水旱無不熟之時又特滋盛易得蕪穢良田畆得二三十斛宜種之以備凶年又稗中有米熟時一可𢷬取炊之不減粢米又可釀酒武帝時令典農種之一頃收二千斛斛得米三斗大儉可磨食之又曰三月榆莢雨時髙地強土可種禾薄田不能糞者以原蠶矢雜禾種之則禾不蟲又取馬骨莝之一石以水三石煮之三沸漉滓以汁漬附子五枚漬三四日去附子以汁和蠶矢燒如粥先種二十日以溲種曝勿令濕至種時以餘汁溲之種之則不生蝗蟲無馬骨汁亦可用雪雪者五榖之精也常以冬藏雪汁器盛埋地中治種如此則收萬倍又曰種傷濕鬱熱則生蟲取麥種候熟可穫擇穂大疆者秤束立塲之髙燥處無令有白魚取乾草雜藏之欲知嵗所宜以布囊盛粟諸物種平量埋隂垣之下冬至後五十日發取量之息􅇰多者嵗所宜又曰凡田種麥為首傷於大稠者鋤而稀之秋以鋤以棘柴曵之以壅麥根故曰子将欲富黄金覆土至春冬凍解棘柴曵之絶其乾葉到榆莢雨時候土白覆鋤如此收必倍冬雨雪止掩雪勿令從風飛去後雪復如此麥能早多實春凍解耕種土和遊麥生或茂大鋤如宿麥也又曰黍者暑也禾生心天雨灌其心必傷無實初種時務令兩人對持長索去其白露日出乃止種黍覆土鋤治如禾法欲稀於禾又曰大豆保歳易為宜古之所備㓙年也大豆生戴甲而出種土不可厚厚則項折不能長逹屈於土中而死又曰種稲春凍解地氣和時耕冬至後百三十日種大種時也又曰種麻預軟和田二月下旬三月上旬傍雨種其秕又曰種枲春凍解耕治其土春草生布糞田復耕平摩之又曰種小豆忌夘稲忌辰禾忌丙黍忌丒麻忌辰秫忌未寅小麥忌戌大麥忌子大豆忌甲凡九榖忌日不種之避其忌不可敗傷諸事忌禁日此非空言也其道自然若燒黍穰則害瓠也崔寔四民月令曰正月可種葵四月可収冬葵子六月六日可種葵中伏之後可種冬葵八月可種乾葵物理論曰稼借種也古今之言云餘夫稼農之本也耘說文曰耘除田間穢也左𫝊昭元年曰晉趙文子曰譬如農夫是穮是蓘毛詩甫田曰或耘或耔黍稷薿薿又周頌曰載芟載旅其耕澤澤千耦其耘徂隰徂畛論語曰子路從而後遇丈人以杖荷蓧子路問曰子見夫子乎丈人曰四體不勤五榖不分孰為夫子植其杖而芸宋書曰栁元景顔師伯嘗詣沈慶之會其遊田元景等鳴笳列卒滿道慶之獨與左右一人在田見之悄然改容曰夫貧賤不可卑富貴亦難守吾與諸公並出貧賤因時際會榮貴至此惟當共思損挹之事老子八十之年自見成敗者幾多諸君炫此車服欲何為於是挿杖而耘不為之顧元景等徹侍褰裳從之管子曰萬室之都必有萬鍾之藏藏鏹千萬千室之都必有千鍾之藏藏鏹百萬春以奉耕夏以奉耘孟子曰人病舍其田而耘人之田所求於人者重而所以自任者輕賈誼書曰鄒穆公有令食鳧鴈必以秕吏請以粟公曰夫百姓句牛而耕曝背而耘勤而不敢惰者豈為鳥獸哉粟養人也何以其養鳥也耔說文曰壅禾本也晉書曰陶潜歸去來曰懐良辰以孤徃或植杖而耘籽耨釋名曰耨似鋤以耨禾也左𫝊僖公下曰臼季使過冀見冀缺耨其妻饁之臼季胥臣敬相待如賓與之歸言諸文公曰敬徳之聚也能敬必有徳徳以治民君請用之爾雅曰斪斸謂之定鋤属犍為舍人曰拘􅠁名定耨魏書曰公孫淵官属上書曰七營虎士五部蠻夷各懐素抱不謀同心奮臂大呼排門遁出近郊農民失其耨鎛淮南子曰耨者剡耜而耕摩蜃蜃大蚌也摩令利用耕除草也又曰茢先稲熟農夫耨之者不以小利害大穫又曰聖人之用兵若櫛髪耨苖所失者小所利者多吕氏春秋曰先生者為米後生者為秕是故其耨也長其兄而去其弟養大殺小不知稼者其耨也去其兄而養其弟不收其粟而收其秕钃釋名曰钃誅也主以誅除物根株也說文曰钃斫也齊謂鎡基一曰斤柄性自曲者也管子曰美金以鑄戈劒矛㦸試諸狗馬惡金以鑄斤斧鉏夷属欘試諸木土又曰匠人有感斤欘故䋲可得斷也孟子曰齊人有言曰雖有智慧不如乘勢雖有鎡基不如待時耰說文曰耰摩田器也論語曰長沮桀溺耦而耕孔子過之使子路問津焉桀溺曰子為誰曰為仲由曰是魯孔丘之徒與對曰然㴞㴞者天下皆是也誰以易之且而與其從辟人之士也豈若從辟世之士哉耰而不輟賈誼書曰秦民借父耰鋤有徳色銍廣雅曰銍謂之刈尚書禹貢曰二百里納銍說文曰銍穫禾短䥥釋名曰銍穫禾鐵也銍銍㫁禾穂聲也銚說文曰錢銚也古田器也世本曰捶作銚管子曰一嵗之事必有一銚然後成農鑄釋名曰鑄亦鋤類迫也迫地去草也毛詩周頌良耜曰其饟伊黍其笠伊糾其鎛斯趙以薅荼蓼周頌臣工曰命我衆人痔乃錢鎛奄觀銍艾太平御覽巻八百二十三
