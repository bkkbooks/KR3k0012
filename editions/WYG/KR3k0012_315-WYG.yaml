body:
  text: 太平御覽巻三百十五宋李昉等撰兵部四十六水戰掩襲上水戰國語吳語曰越王軍於江南明日將舟戰於江晉書慕容超載記曰水戰國之所短敵之所長又曰陳敏作亂陶侃時鎮江夏以朱伺能水戰曉作舟艦乃遣作大艦暑為右甄據江口摧破敏前鋒又曰盧循遣别將徐道覆順流而下舟艦皆重樓何無忌率衆拒之長史鄧芝曰以神武之師抗彼逆衆廻山壓卵未足為譬然國家之計在此一舉聞其舟艦大盛勢居上流蜂蠆之毒邾魯成鑒宜决破南塘守二城俟其疲老然後擊之若棄萬全之長䇿而决成敗于一戰如其失利悔無及矣無忌不從遂以舟師拒之賊令强弩數百登西岸小山以邀射之而薄于山側俄而西風暴起無忌所乗小艦被飄于東岸賊乗風以大艦逼之衆遂奔敗無忌尚厲聲曰取我蘓武節來節至乃躬執以督戰賊衆雲集登艦者數十人無忌辭色無撓遂握節死之梁書曰王琳帥兵東下陳遣太尉侯填司空侯安都等拒之填等以琳軍方盛引軍入蕪湖避之時西南風至急琳謂得天道將直取揚州侯填等徐出蕪湖躡其後比及兵交西南風翻為填用琳兵放火燧以擲填船者皆反燒其船琳艦潰亂兵士赴水死十二其餘皆棄船上岸為陳軍所殺殆盡隋書曰楊素伐陳率水軍東下舟艫被江旌甲曜日素坐平乗大船容貌雄偉陳人望之懼曰清河公即江神也陳南康内史吕仲肅屯岐亭正據江峽於北岸鑿巖綴鐵鎖三條横絶上流以遏戰船素與仁恩登陸俱發先攻其柵仲肅軍夜潰素徐去其鎖又李安傳曰伐陳之役蜀兵順流東下時陳人屯白沙安謂諸將曰水戰非北人所長今陳人依險泊船以夜襲屯賊可破也越絶書曰伍子胥水戰法大翼一艘廣丈六尺長十二丈容戰士二十六人擢五十人舳艦三人操長鈎矛斧者四吏僕射長各一人凡九十一人當用長鈎矛長斧各四弩各三十四矢三千三百甲兠鍪各三十二莊子曰宋人有善為不龜手之藥者世世以洴澼絖為事客聞之請買其方百金聚族而謀曰我世世為洴澼絖不過數金今一朝而鬻技百金請與之客以説吳王吳王使與越人水戰大敗越人裂地而封之阮元瑜為曹公與孫權書曰若恃水戰臨江塞要欲令王師終不得渡似未必也孫子荆為石仲恭與孫皓書曰自傾國家整治噐械修造舟檝簡習水戰掩襲上白虎通曰襲者何謂行不假塗掩人不備也人銜枚馬纒勒晝伏夜行為襲也左傳曰凡師有鐘鼓曰伐無曰侵輕曰襲又曰初周人與范氏田公孫尨税焉趙氏得而獻之吏請殺之趙孟曰為其主也何罪止而與之田及鐵之戰以徒五百人宵攻鄭師取蠭旗於子姚之幕下又曰齊侯還自晉不入遂襲莒門于且于莒邑名傷股而退明日將復戰期于夀舒又曰秦伯使大夫杞子戍鄭使告于秦曰鄭人使我掌其北門之管鑰管若潛師以來國可得也穆公訪諸蹇叔蹇曰勞師以襲逺非所聞也蹇叔秦大夫師勞力竭逺主備之無乃不可乎且師行千里其誰不知公辭焉辭不受其言召孟明西乞白乙使出師于東門之外蹇叔哭之曰孟子吾見師之出而不見其入也晉人禦師必於殽殽有二陵焉大阜曰陵其南陵夏侯臯之墓臯夏桀之祖也其北陵文王之所避風雨此道在二陵之間南谷中各深委曲兩山相嶔故可以避風雨古道由此魏武帝西討巴漢惡其險而更開北山髙道也必死是間余收爾骨焉秦師遂東晉原軫曰秦違蹇叔而以貪勤民天奉我也奉不可失敵不可縱縱敵患生違天不祥必伐秦師欒枝曰未報秦施而伐其師其為死君乎先軫曰秦不哀吾喪而伐吾同姓秦則無禮何施之有吾聞之一日縱敵數代之患謀及子孫可謂死君乎言不可為背君遂發命遽興姜戎子墨衰絰晉文未葬故襄公稱子子以凶服従戎故墨之也遂敗秦師于殽獲百里孟明視西乞術白乙丙以歸家語曰吳晉遂遇黄池越王襲吳之國吳王歸與越戰滅戰國策曰蘓秦謂楚威王曰王興師襲秦此所謂兩虎相鬭也後漢書曰漁陽太守彭寵反自將二萬餘人攻幽州刺史朱浮于薊光武使將軍鄧隆救薊隆軍潞南浮軍雍奴遣吏奏狀帝讀檄怒謂使曰營相去百里其勢豈得相及彼若還北軍必敗矣寵果盛軍臨河以拒隆又别發輕騎三千襲其後大破隆軍朱浮逺遂不能救引而去又曰蘓茂周建與馬武合戰良久王霸軍中壯士路潤等數十人斷髪請戰霸知士心鋭乃開營後出精騎襲其背茂建前後受敵驚亂走散又曰鄧訓發湟中六千人令長史任尚將之縫革為船置于箄上以渡河掩擊迷唐廬落大豪多所斬獲又曰馬援討諸羗引精兵聚北山上援陳軍向山而分遣數百騎繞襲其後乗夜放火擊鼓呌譟虜遂大潰凡斬首千餘級援以兵少不得窮追收其榖糧畜産而還曹瞞傳曰公聞許攸來跣出迎攸勸公襲紹將公大喜乃選精鋭步騎皆執袁軍旗幟銜枚縛馬口夜從間道出入把束薪照所厯道問者語之曰袁公恐曹操鈔掠後軍還兵以益備聞者信以為然既至圍屯大放火營中驚亂大破之盡燔其糧榖寳貨斬督將睢元晉等割得諸軍淳于仲簡鼻殺士卒千餘人皆取鼻牛馬割唇舌以示紹軍將士皆惶懼又曰曹公征張魯至陽平張魯使弟衞據陽平關横山築城十餘里攻之不㧞乃引軍還賊見大軍退其守備懈公乃宻遣騎將等乗險夜襲大破之又曰廬江太守劉勲在皖城今同安郡恃兵强士勇横于江淮之間無出其右者孫䇿惡之時以江左自領㑹稽太守使人卑辭厚幣而説之曰海昏上繚宗人數欺下國患之有年矣擊之路由不便幸因將軍之神武而臨之且上繚國富廩實吴娃越姬充于後庭明珠大貝被于帑藏取之可以資軍雖蜀郡成都金碧之府未能過也策願舉敝邑士卒以為外援勲然之劉曄諫曰上繚雖小而城堅池深守之則易攻之則難不可旬而㧞也且兵疲於外而國虛於内孫策多謀而善用兵乗虛襲我將何禦之而將軍進屈于敵退無所歸羝羊觸藩羸其角不能退不能進其在兹乎勲不從遂大興師伐上繚其廬江果為策所襲勲窮蹙遂奔曹公魏志曰遣將鍾㑹鄧艾伐蜀蜀將姜維守劒閣鍾㑹攻維未能艾上言請從隂平江由邪徑經漢陽亭趣涪出劒閣西四百里去成都三百里竒兵衝其腹心劒閣之守必還赴涪則㑹方軌而進劒閣之士不還則應涪之兵寡矣軍志有之曰攻其不備出其不意今掩其空虛破之必矣冬十月艾自隂平行無人之地七百里鑿山通道造作橋閣山髙谷深至為艱險又糧運將匱頻於危殆艾以氈自裹推轉而下將士皆攀木縁崖魚貫而進先登至江油蜀守將馬邈降諸葛瞻自涪還綿竹列陣相拒大破之斬瞻及尚書張遵等首進軍至成都蜀主劉禪面縛輿襯詣軍門降又曰楊阜字義山天水蓽人也􅅊康以為别駕馬超率萬餘人攻冀城阜率國士大夫及宗族子弟勝兵千餘人使弟岳於城上作偃月營與超接戰自正月至八月拒守而救兵不至超入拘岳於冀殺刺史太守阜内有報超之志而未得其便外兄姜叙屯厯城阜少長叙家見叙母説前在冀中時事歔欷悲甚叙曰何乃爾阜曰守臣不能見君亡不能死亦何面目以視息天下乎時叙母慨然勅從阜計超聞阜等兵起自將出襲厯城得叙母罵之曰若背父之逆子弑君之傑賊天地豈久容敢以面目視人乎超怒殺之阜與戰身被五創宗族昆季死者七人吳志曰蜀關雲長遣糜芳守南郡自領兵圍樊吳主遣將吕蒙屯陸口外倍修恩厚與雲長結好雲長多留兵備公安南郡蒙上疏曰雲長多留備兵必恐蒙圖其後故也䝉常有病乞分衆還建業以理病為名彼聞之必徹備徐以大軍泝江馳上襲其空虛則南郡可下而雲長可擒也吳主然之蒙遂稱病還建業雲長果稍徹備而悉衆赴樊城蒙遂發兵逆流而上伏甲於舟使更衣為商人以理征棹逹曙兼行至其所置屯戍輒縛之遂絶斥堠師次于南郡襲奪其城雲長將士攻樊城未知聞城已陷而家屬無恙見待甚於平時無復鬬心稍稍散去雲長為吳師所擒荆州遂平又曰建安二十四年雲長圍曹仁於襄陽曹公遣左將軍于禁救之㑹漢水暴起雲長以舟兵生虜禁等步騎三萬送江陵唯城未㧞權内憚雲長外欲為己功與曹公牋乞討賊自効權正月先遣吕䝉襲公安獲將軍士仁蒙到南郡太守糜芳以城降蒙據江陵撫其老弱釋于禁之囚晉書曰王如京兆人也初為州武吏遇亂流移至宛時諸流人有詔並遣還鄉如等以關中荒殘不願歸征南將軍山簡南中郎將杜􅅋各遣兵送之而促期令發如遂􅅗結無賴少年夜襲二軍大破之又䧟攻襄城於是諸郡流人各率其黨攻諸城鎮多殺令長以應之未㡬衆四五萬號大將軍如後連年種榖皆化為莠軍中大饑又曰石勒遣其將石良率精兵五千襲李矩逆擊不利郭誦弟元復為賊所執遣元以書説矩曰去年東平曹嶷西賔猗盧矩如牛角何不歸命以示誦誦曰昔王陵之母在賊猶不改意弟當何論勒復遺誦麈尾馬鞭以示殷勤誦不答又曰張駿為凉州牧咸和初駿遣武威太守竇濤金城太守張閬武興太守辛巗揚烈將軍宋輯等率衆東㑹韓璞攻討秦州諸郡劉曜遣劉𦙍來拒屯于狄道城韓璞進渡沃干嶺辛巗曰我握衆數萬藉氐羗之鋭宜速戰以滅之不可以久久則變生璞曰自夏末以來太白犯月辰星逆行白虹貫日皆變之大者不可以輕動輕動而不捷為禍更深吾將久而斃之且曜與石勒相攻𦙍亦不能久也積至七十日軍糧竭遣辛巗督運于金城𦙍聞之大悦謂其將士曰韓璞之衆十倍於吾羗胡皆叛不為之用吾糧廪將懸難以持久今虜分兵運糧可謂天授吾也若敗辛巗璞等自潰彼衆我寡宜以死戰戰而不捷當無疋馬得還宜厲爾戈矛竭汝智力衆咸奮志於是率騎三千襲巗于沃干嶺敗之璞軍遂潰死者二萬餘人面縛歸罪駿曰孤之罪也將軍何辱皆赦之王隠晉書曰祖逖軍大饑進據太丘城樊雅遣六十餘人入逖營㧞㦸大呼向逖逖軍大亂不知賊之多少皆欲散走逖疑非多人但令左右拒之㑹督䕶董昭入共討賊賊從故道出太平御覽卷三百十五
