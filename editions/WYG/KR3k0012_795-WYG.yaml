body:
  text: 太平御覽卷七百九十五宋李昉等撰四夷部十六西戎四烏孫恱般迷宻党項焉耆小氏月拂䔉吐火羅泥婆羅大食烏孫史記曰烏孫在大宛東北可二千里行走隨畜牧與匈奴同俗漢書曰烏孫國多馬富人至四五千匹民貪狼無信多㓂盗最爲强國北史曰烏孫居赤谷城在龜兹西北去代一萬八百里其國數爲蠕蠕所侵西徙葱嶺山中無城郭隨畜牧逐水草後魏太延中遣使者董琬等使其國後每來朝貢通典曰烏孫漢時國號大昆彌理赤谷城烏孫於西域諸戎其形最異今青眼赤髭鬂狀類彌猴者本其種也謂王曰昆彌亦曰昆莫去長安八千九百里内地五千里地平多雨寒山多松樠不田作種樹隨畜逐水草與匈奴同俗又曰烏孫昆莫彌皆王號也故烏孫國有塞種大月氏種始張騫言烏孫本與大月氏共在燉煌間今烏孫强大可厚賂招令東居故地妻以公主以制匈奴武帝即位令騫齎金幣往賜昆莫於是使使獻馬願尚公主元封中遣江都王建女細君爲公主以妻焉公主别理宫室居嵗時一再與昆莫會置酒飲食昆莫年老語言不通公主悲愁自作歌曰吾家嫁我兮各天一方逺託異國兮烏孫王穹廬爲室兮氊爲墻以肉爲食兮酪爲漿天子聞而矜怜之又曰宣帝時都䕶鄭吉請分烏孫為大昆彌後段會宗爲都䕶時爲烏孫兵圍騎上書願發城郭燉煌以自救丞相王商大將軍王鳳及百寮議數日不决上召陳湯問對曰臣以爲此必無可憂夫胡兵五而當漢兵一刄扎鈍弓弩不利今聞頗得漢工然猶三而當一又兵法曰客倍而主人半然後料敵今烏孫人衆不足以勝㑹宗惟陛下勿憂且兵輕行五十里重行三十里今會宗發城郭燉煌兵歴時而至所謂報讎之兵非救急之用也烏孫瓦合不能久攻不過五日當有吉語聞居四日軍書至言已解恱般北史曰悦般國在烏孫西北去代一萬九百三十里其先匈奴北單于之部落也爲漢車騎將軍竇憲所逐北單于度金微山西走康居其羸弱不能去者住龜兹北地方數千里衆可二十餘萬凉州人猶謂之單于王其風俗言語與髙昌同而其人清㓗扵胡俗剪髮齊眉以醍醐塗之昱然光澤日三澡潄然後飲食其國南界有大山山傍石皆燋鎔流地數十里乃凝堅人取以爲藥即是流黃也與蠕蠕結好其王嘗將數千人入蠕蠕國欲與大檀相見入界百餘里見其部人不浣衣不絆髮不洗手婦人口䑛器物王謂其從臣曰汝曹誑我將我入此狗國中乃馳還大檀遣騎追之不及自是相仇讎數相征討後魏大武真君九年遣使朝獻并送幻人稱能割人喉脉令斷擊人頭令骨陷皆血出數升或盈斗以草藥内其口中令嚼咽之須臾血止養瘡一月復常又無痕瘢世疑其虛乃取死罪囚試之皆騐云中國諸名山皆有此草乃使人受其術而厚遇之又言其國有大術者蠕蠕凍死漂亡者十二三是嵗再遣使朝貢求與官軍東西齊契討蠕蠕大武嘉其意命中外諸軍戎嚴以淮南王他爲前鋒襲蠕蠕仍詔有司以其鼔舞之節施扵樂府自後每使朝貢迷宻北史曰迷宻國都迷宻城在者至㧞西去代萬二千一百里後魏正平元年遣使獻一峰黒槖駞其國東有山名郁悉滿山出金玊多鐵党項隋書曰党項羗者三苖之後也其種有岩昌白狼皆自稱彌猴種東接臨洮西平西拒葉䕶南北數千里處山谷間每姓别爲部落大者五千餘騎小者千餘騎織㹈牛尾及􅗑䍽羊毛以爲屋服裘褐被氊以為上餙俗尚武力無法令各爲生業有戰則相屯聚無徭役不相往來牧養犂牛羊猪以為供養不知稼穡無文字但推草木以記歳時三年一聚會殺牛羊以祭天人年八十以上死者以爲令終親戚不哭少而死者則云天枉共悲哭之有琵琶横吹撃缶爲節唐書曰党項羌在古析支之地漢西羌之别種也魏晉之後西羌微弱或臣中國或竄山野自周氏滅岩昌鄧至之後党項始强其界東至松州西接葉䕶南雜舂桑迷桑等羌北連吐谷渾處山谷間延亘三千里其種每姓别為部落一姓之中復分為小部落大者萬騎小者千騎不相統一有細封氏費聽氏頗超氏野辭氏米擒氏拓拔氏而拓拔最為强族俗皆土著居有棟梁其屋織㹈毛及羊毛覆之每年一易俗尚武無法令賦役其人多壽年至百五六十嵗不事産業好爲盗互相凌刼尤重復讎若讎人未得必蓬頭垢靣跣足蔬食要斬讎人而後復常男女並衣裘褐仍披大氊養驢羊以供其食不知耕稼土無五榖氣候多風寒五月草始生八月霜雪降求大麥扵他界醖以爲酒妻其庶母及伯叔母嫂子弟之婦淫穢烝䙝諸夷中㝡爲甚自周及隋或叛或朝常爲邊患貞觀三年南會州都督鄭元壽遣使招諭其酋長細封歩頼舉部内附太宗降璽書慰撫之歩頼因即來朝宴賜甚厚列其地爲軌州拜歩頼為刺史仍請率所部討吐谷渾其後諸姓酋長相次率部落皆來内屬請同編户太宗厚加撫慰列其地為崌奉巖逺四州拜其各首領爲刺史又曰有黒党項在扵赤水之西李靖之擊吐谷渾也渾主伏允奔扵黒党項居以空閒之地及吐谷渾舉國内屬黒党項酋長號敦善王因貢方物又有雪山之下及白狗舂桑白蘭等諸羌焉耆北史曰焉耆國在車師南都貟渠城白山南七十里漢時舊國也去代一萬二百里其王姓龍名鳩尸畢郍即前凉張軌所討龍熈之嗣所都城方二里國内凡有九城國小人貧無綱紀法令又曰其丈夫剪髪以爲首飾文字與婆羅門同俗事天神并崇信佛法尤重二月八日四月八日是日也其國咸依釋教齋戒行道焉又曰其國養蠶不以爲絲唯充綿纊俗尚蒲桃酒兼愛音樂南去海十餘里有魚鹽蒲葦萬度歸來攻焉耆鳩尸畢郍身率四五萬人出城守險以距度歸募壯勇勁兵直往衝鳩尸畢郍衆潰盡屠其城四鄙諸戎皆來降服獲其珎竒異翫殊方譎詭難識之物其時太武幸華隂山北宫度歸破焉耆露板至帝省訖賜司徒崔浩書曰萬度歸以五千騎經萬餘里扳焉耆三城獲其珎竒異物及諸委積不可勝數自古帝王雖云西戎即序有如指注不能控引也朕今手把而有之如何浩上書稱美隋書曰焉耆國俗奉佛書類婆羅門婚姻之禮有同華夏男子剪髮有魚鹽蒲葦之利唐書曰焉耆在京師西七千三百里其地良沃貞觀六年其王突騎支遣使貢方物復請開大磧路以便行李太宗許之自隋末離亂磧路遂閉西域朝貢者皆由髙昌及是髙昌大怒遂與焉耆結怨遣兵襲焉耆大掠而去又曰貞觀十四年侯君集討髙昌遣使與之相結焉耆王大喜請爲聲援乃破髙昌其王詣軍門稱謁焉耆人先爲髙昌所虜者悉歸之由是遣使謝恩并貢方物小月氏北史曰小月氏國都富樓沙城其王本大月氏王寄多羅子也寄多羅爲匈奴所逐西徙後令其子守此城因號小月氏被服頗與羌同其俗以金錢爲貨又曰其城東十里有佛塔周三百五十歩髙八十丈自佛塔初建計至後魏武定八年八百四十二年所謂百丈佛圖也拂䔉唐書曰拂菻國一名大秦在西海之上東南與波斯接地方萬餘里列城四百邑居連屬其宫宇柱梲多以水精琉璃爲之有貴臣十二人共理國政常使一人將囊隨王車百姓有事即以書投囊中還宫省發理其枉直其王無常人簡賢者而立之國中災異及風雨不時輙廢而更立王冠形如鳥舉翼冠及纓絡皆綴以珠寳著錦繡衣前不開襟坐金花床有一鳥似鵞其毛緑色常在王邊倚枕上坐每進食有毒其鳥輙鳴其都城疊石爲之尤絶髙峻凡有十萬餘户南臨大海城東靣有一大門其髙二十餘丈自上及下餙以黄金光輝燦爛連曜數里自外至王室凡大門三重列異寳雕餙第二門之樓門中懸一大金秤以金丸十二枚屬扵衡端以候日之十二時焉爲一大金人立扵側每至一時其金丸輙落鏗然後發聲引唱以紀日時毫釐無失其殿以琴瑟爲柱黄金爲地象牙爲門扇香木爲棟梁其俗無瓦擣白石為末羅之塗屋上其堅宻光潤還如玊石扵盛暑之節人厭囂熱乃引水潜流上遍扵屋宇機制巧宻人莫之知觀者唯聞屋上泉鳴俄見四簷飛溜懸波如瀑布激氣成凉風其巧妙如此風俗男子剪髪披帔而右袒婦人不開衿錦爲頭巾家資滿億封以上位有羊羔生扵土中其國人候其欲萌乃築墻以院之防外獸所食也然其臍與地連割之則死唯人著甲走馬及擊皷以駭之其羔驚鳴而臍絶便逐水草俗皆繡衣乘輜軿白盖小車出入擊皷建旌旄幡幟土多金銀奇寳有夜光璧明月珠駭雞犀大真珠車渠瑪腦孔雀翠珊瑚琥珀凢西域諸珍異多出其國又曰貞觀十七年拂菻王波多力遣使獻赤玻璃緑玻璃石緑金銀等物太宗降璽書答慰賜以綾綺又曰開元七年正月其王遣吐火羅大首領獻獅子不數月又遣大徳僧來朝貢吐火羅北史曰吐火羅國都葱嶺西五百里與挹怛雜居都城方二里勝兵十萬人皆善戰其俗奉佛兄弟同一妻迭寢焉每一人入房外掛其衣以爲志生子屬其長兄其山宂中有神焉每嵗牧牝馬扵宂所必産名駒隋大業中遣使朝貢通典曰髙宗永徽初遣使獻大鳥髙七尺其色𤣥足如駞皷翼而行日三百里能噉鐵夷謂之駞鳥又曰龍朔元年吐火羅置州縣使王名逺進西域圖記并請于闐以西波斯以東十六國分置都督府及州八十縣一百軍府一百二十六仍扵其國立碑以紀聖徳帝從之泥婆羅唐書曰泥婆羅在吐蕃西其俗剪髪與眉齊穿耳揎以竹筒牛角綴至肩者以爲姣麗食用手無匙筯其器皆銅多商賈少田作以銅爲錢背文為馬牛不穿孔衣服以一幅布蔽身日數盥潄以板為屋壁皆雕畫俗重博戱好吹蠡擊皷頗觧推測盈虛兼通歴術事五天神惟鐫石為像每日清水浴神烹羊而祭其王郍陵提婆身着真珠玻璃車渠珊瑚琥珀纓絡耳垂金鈎玊璫佩寳裝服飾坐獅子床其堂内散花香大臣及諸左右並坐扵地持兵數百列侍其側宫中有七層之樓覆以銅瓦欄檻楹栿皆飾珠寳樓之四角各懸銅槽下有金龍激水上樓注扵槽中從龍口而出狀如飛泉又曰貞觀中衛尉丞李義表往使天竺塗經其國郍陵提婆見之大喜與義表同出觀阿耆婆沴池週廻三十餘歩水常沸浦雖流潦暴集爍石焦金來賞者咸以物投之即生煙熖懸釡而炊湏臾而熱大食唐書曰大食國本在波斯之西大業中有波斯胡人牧駞扵俱紛摩地郍之山忽有獅子人語謂之曰此地西有三宂宂中大有兵器汝可取之宂中并有異石白文讀之便作王位胡人依言果見宂中有石及弰刃甚多上有文教其反叛扵是紏合亡命渡恒曷水刧奪商旅其衆漸盛遂割據波斯西境自立爲王永徽二年始遣使朝貢其王姓大食氏名噉蜜莫末膩自云有國已三十四年歴三主矣其國男夫黒色多鬚鼻大而長自婆羅門婦女白晢亦有文字出駞馬大扵諸國兵刄勁利其俗勇扵戰鬬好事天神土多沙石不堪耕種唯食駞馬等肉國西隣扵大海其王移宂中異石寘之扵國又曰其王常遣人乘船將衣糧入海經八年而未極西岸海中見一石石上有樹幹赤葉青樹上㮩生小兒長六七寸見人皆笑動其手脚頭着樹枝其使摘取一枝小兒便使収在大食王宫又曰龍朔中滅波斯拂菻其國始有米麵之屬又將兵南侵婆羅門吞併諸胡勝兵四十餘萬長安中遣使獻良馬景雲二年又獻方物開元初遣使來朝及進馬并寳鈿𢃄等方物其使謁見唯平立不拜憲司欲紏之中書令張説奏曰大食殊俗慕義逺來不可寘罪上特許之尋又遣使朝獻自云在本國惟拜天神雖見王亦無致拜之法所司屢詰責之其使遂請依漢法致拜杜還經行記曰一名亞俱羅其大食王號慕門都其女環偉長大衣裳鮮潔容止閑麗女子出必擁面無問貴賤一日午時禮天食肉作齋以殺牲爲功徳繫銀束佩銀刀斷飲酒禁音樂人相争者不至歐撃又曰其果有遍桃千年棗其蔓菁根大如斗而圓味甚美蒲桃大者如雞邜太平御覽卷七百九十五
