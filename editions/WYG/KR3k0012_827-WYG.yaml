body:
  text: 太平御覧巻八百二十七宋李昉等撰資産部七市説文曰市買賣所也周禮天官下内宰曰凡建國佐后立市設其次置其叙正其肆陳其貨賄出其度量淳制祭之以隂禮市朝者君所以建國也建國者必面朝後市王立朝而后立市隂陽相成之義又地官下司市曰司市掌市之治教政刑量度禁令大市日昃而市百族為主市雜聚之處言主者謂其多者也朝市朝時而市商賈為主夕市夕時而市販婦為主君過市則刑人赦夫人過市罰一幕世子過市罰一帟命夫過市罰一盖命婦過市罰一幃又曰司虣掌憲市之禁令禁其闘囂者與其虣亂者出入相凌犯者以属逰飲于市者若不可禁則搏而戮之又秋官掌戮曰凡殺人者踣諸市肆之三日刑盗于市周禮冬官匠人曰左祖右社面朝后市禮記月令仲秋曰是月也易関市来商旅納貨賄以便民事四方来集逺鄉皆至則財不匱上無乏用百事乃遂又王制曰有珪璧金璋不粥於市命服命車不粥於市宗廟之器不粥於市犧牲不粥於市戎器不粥於市用器不中度不粥於市兵車不中度不粥於市布帛精麤不中數幅廣狹不中量不粥於市姦色亂正色不粥於市錦衣珠玉不成器不粥於市衣服飲食不粥於市五榖不時果實未熟不粥於市草木不中伐不粥於市禽獸魚鼈不中殺不粥於市又曰命市納賈以觀民之所好􅁖志滛好辟又曰爵人於朝與士共之刑人於市與衆棄之左傳文公曰夫人姜氏歸於齊及歸也将行哭而過市曰天乎仲為不道殺嫡立庶市人皆哭魯人謂之哀姜又宣公上曰晋人獲秦諜殺諸絳市六日而蘇又宣公下曰楚子使申丹聘于齊不假道于宋及宋人殺之楚子聞之怒投袂而起履及于窒皇劒及於寢門之外車及於蒲胥之市秋楚圍宋又昭公三年曰齊景欲更晏子之宅曰子之宅近市湫隘囂塵不可以居請更諸爽塏者辭曰君之先臣容焉先臣晏子之先人臣不足以嗣之於臣侈矣且小人近市朝夕得所求小人之利也敢煩里旅公咲曰子近市識貴賤乎對曰既利之敢不識乎又曰昭公十九年楚令尹子瑕言蹷由於楚子曰彼何罪諺所謂室於怒市於色者楚之謂矣言􅂕王怒吴子而執其弟猶人忿於室家而作色於市人舍前之怒可也乃歸蹷由言楚子能用善言毛詩國風曰東門之枌疾亂也幽公滛荒風化之所行男女棄其舊業亟㑹於道路歌舞於市井爾又曰定之方中衞文公徙居椘丘始見城市而營宫室論語比考䜟曰從善繹繹襁負而歸市古史考曰神農作市髙陽氏衰市官不修祝融修市戰國䇿曰王孫賈年十五事閔王王出走失王之所其母曰汝事王王出汝不知其處汝尚何歸王孫賈乃入市中曰淖齒亂齊國殺閔王欲與我者􅃝右市人從者四百人與之誅淖齒又曰齊桓公宫中九市管仲為三歸之臺以掩桓公之罪也漢書曰曹參相齊使者召參去屬其後相曰以齊獄市為寄慎勿擾也後相曰治無大於此者乎參曰夫獄市者所并容也今君擾之奸人安所容乎又曰楚王戊與吴通謀申公白公二子諫不聼乃胥靡之衣之赭衣使杵臼椎舂於市又曰尹翁歸河東平陽人曉習文法大将軍霍光秉政諸霍在平陽奴客入市閗變吏不能禁及翁歸之為市吏莫敢犯者又曰何武兄弟五人皆為郡吏郡縣敬憚之武弟顯家有市籍租常不入縣數負其賦市嗇夫求商辱捕顯家顯怒欲以吏事中商武曰以吾家租賦繇役不為衆先奉公吏不亦宜乎史記刺繡文不如倚市門此言末業貧者之資也又曰司𨽻校尉解光奏王根縱横恣意大治宫室第中起土山立両市殿上赤墀户青𤨏又曰永平中王尊為京兆尹拊循貧弱鋤耘豪强宿豪大猾東市賈萬城西萭章翦張禁酒趙放晉灼曰翦張禁酒趙放此二人作翦作酒之家尊以正法按誅皆伏其辜又曰大君不理則畜賈游市乘民之不給百倍其本矣後漢曰㓂恂為潁川太守執金吾賈復在汝南部将殺人於潁川恂捕得繫獄時尚草創軍營犯法率多相容恂乃戮之於市復以為耻東觀漢記曰樊君治家産業起治廬舍髙楼閣陂池灌注竹木成林六畜雜菓檀漆桑麻門成市又曰江革客東海下邳傭賃以飬父母下邳知其孝市買輒與好善者雖無錢任貫與之又曰光武以祭遵為市令家人犯法遵格殺之東觀漢記曰閔仲叔客居安邑老病家貧不能買肉日買一片猪肝屠或不肯為斷也安邑令出𠡠市令遂買得仲叔恠問其子道状乃嘆曰閔仲叔豈以口腹累安邑耶遂去之沛又曰京兆尹閻㒷召第五倫署督鑄椽領長安市平銓衡正斗斛其後小民爭訟輒云第五椽平市無姦枉欺詐之巧又曰更始在長安官爵多羣小里閭語曰使兒居市决作者不能得傭之市空返問何故曰今日騎都尉注㑹日也由是四方不復信向京師又曰王郎起上在薊即移檄購上上令王覇至市中募人将以撃郎市人皆大咲舉手揶揄之覇慙而去又曰竇融請孔奮置議曹椽守姑臧長天下擾亂惟河西獨安而姑臧稱為富邑通市故𦍑市日四合毎居縣者不盈数日輙致豐積謝承後漢書曰王充家貧無書常逰洛陽市肆閲所賣書一見輒能誦憶遂通衆經又曰張楷字公超隐居𢎞農山中學者随之所居成市后華隂山南遂有公超市典畧曰荆軻者其先齊人也與燕之狗屠及髙漸離為友軻嗜酒日與狗屠飲於燕市漸離撃筑荆軻和之而歌相泣魏畧曰趙岐迯難江淮海岱靡所不歴自匿姓名買餅北海市中安丘孫嵩年二十逰市見岐察非常人乃停車問曰賣餅幾荅曰賣餅三十嵩曰視子非賣餅者當有怨者乃載岐歸家魏志曰遼東送袁尚首懸在馬市牽招觀之悲感又曰㐮邑劉氏與睢陽李永為讎典韋為報之永故富春長備衞甚謹韋乘車載鷄酒偽為候者門開懐匕首入殺永并殺其妻徐出取車上刀㦸歩出永居近市一市盡駭追者数百莫敢近又曰袁紹以董昭領魏郡時郡界大亂賊以萬数遣使往來交易市買昭厚待之因用為間乘虛掩討輙大剋破又曰顔斐為京兆太守青龍中司馬宣王在長安立軍市而軍中吏士多侵侮縣民斐以白宣王王乃發怒召軍市候便於斐前杖一百時長安典農與斐共坐以為斐宜謝乃私推築斐斐不肯謝良乆乃曰斐意觀明公受分陕之任乃欲一齊衆庶必非不得明公意也宣王遂嚴将吏士自是之後軍營郡縣各得其分又曰梁習為并州刺史鮮卑大人育延常為州所畏一旦将其部落五千餘騎詣習求互市習不聼則恐其怨若聼到州下又恐為所畧於是方許往與㑹空城中交市遂𠡠郡縣自将治中以下軍往就之市易未畢市吏縳一鮮卑延騎皆驚上馬彎弓圍習数重吏民惶怖不知所施習乃徐呼市吏問縳何意曰彼實侵民習乃使譯呼延延到習責言曰汝騎自犯法吏不侵汝汝何為使諸騎驚駭耶遂斬之餘俱破膽不敢動吴志曰孫皓愛妾或使人至市劫奪百姓財物司市中郎將陳素聲皓幸臣也時皓寵遇䋲之以法妾以愬皓皓大怒假他事焼斷聲頭投其身於四望之下晋書曰羊祜都督荆州卒而州人聞祜卒皆號慟罷市宋書申坦坐法當棄市羣臣為請莫得将行刑沈興公沈慶之入市抱坦慟哭曰卿無罪朝廷所枉誅我入市亦當不乆市以白上乃原生命撃上方尋改宥蕭子顯齊書曰帝於芳樂苑中立市大官每旦進酒肉雜肴使宫人屠酤貴人潘氏為市令帝為市魁執罰争者就潘氏決判管子曰市者貨之准也是故百貨賤則百利得百利得則百事治百事治則百事用節矣又曰百乘之國中而立市東西南北五十里千乘之國中而立市東西南北五十餘里又曰桀放虎於市以觀其驚司馬法曰殺戮於市威不善也用賞於朝戮於市勸君子懼小人也列子曰昔齊有欲金者清旦衣冠而之市適鬻金之所因攫其金而去吏捕問之對曰取金之時不見人徒見金孟子曰市㕓不征則天下皆悦願藏於市又曰軻少貧每在墓間識塟埋事又徙右市則軻知市井之利又徙在習學所遂盡識禮義孫卿子曰賈征於市不可以為市師韓子曰鄭人有買履者先自度其足而置之其坐乃入市而忘操之已得履乃曰吾忘持度又歸取之及反市罷遂不得履又曰衞嗣君使人為客過関市関吏苛難之因事関吏以金関吏乃舍之嗣君謂関吏曰其時過客而予女金女不遣之関吏乃大恐而以嗣君為明察又曰商太宰使少庶子之市顧反而問之曰何見於市對曰無見也太宰曰雖然何見也對曰市南門之外甚衆牛矢車僅可以行耳太宰因戒使者無敢告吾所問於女因召市吏而責之曰市門之外何多牛矢市吏甚怖太宰知之疾也乃聳懼又曰龎敬縣令也遣市者行而召大夫而申之公大夫亦遣於市立有間無以詔之卒遺行市者以為令與公大夫有言不相信以致無姦大夫雖告以命彼亦不言故不為姦也又曰龎恭與太子質於邯鄲言於魏王曰今一人言市有虎信之乎王曰不二人言市有虎王信之乎王曰不三人言市有虎王信之乎王曰寡人信之龎恭曰夫市之無虎也明矣然而三人言而成虎今邯鄲之去魏也逺於市議臣者過於三人願王察之龎自邯鄲反竟不得見六韜曰武王伐殷得二丈夫而問之曰殷國将亡亦有妖災乎其一人對曰殷君善治室大者百里中有九市春秋后語曰初亷頗之免於将而歸也失勢故人賓客盡去及復用客乃復至頗謝之客曰君何見之晩也天下以市道交君不知之耶君有勢我即進君無勢我即去此固其理君何怒焉春秋后語曰伍子胥橐載而出昭関夜行晝伏至於陵水無以餬其口坐行匍匐稽首肉袒而皷腹吹簫乞食於吴市又曰秦孝公使公孫鞅定法令法令既具恐人不信乃立三丈之木於國都市南門募民有能徙置北門者與千金又曰蘇秦在齊齊大夫多與争寵而使人刺之不殊而走殊絶齊王求賊不得蘇秦将死乃謂王曰臣死之後王車裂臣狥於市曰蘇秦為燕作亂於齊如此則刺臣之賊必得矣齊王如其言殺蘇秦賊果自出齊王因而誅之又曰始皇初立尊吕不􅅊為相國時諸侯多辯士如荀卿之徒著書布天下不􅅊亦使其客著所聞訓解各十餘萬言以為備天地萬物古今之事號曰吕氏春秋布咸陽市懸千金其上延諸侯遊士賔客有能増損改定一字者與千金莫有能定者桓譚新論曰扶風漆縣之邠亭部言本大王所處其民㑹日相與夜市而不為則有羞風俗通曰市井俗説市井者言至市有所鬻賣當於井上洗濯令其物香潔然后到市又曰陳留太守泰山吴文章少孤遭憂衰之世與兄伯武相失别二十年后㑹下邳市争計共鬬伯武毆文章欲報撃之心中惻愴手不能舉大自怵也因投杖於地觀者咸唾笑之還相問乃真兄弟也列仙𫝊曰隂生者長安中渭橋下乞兒也常止於市中乞市中厭苦以糞洒之長吏知之收繫着桎梏而續在市中乞又欲殺之乃去洒者家室自壊殺十餘人長安中謡曰見乞兒與美酒以免破家之咎神仙𫝊曰李何者蜀人也世𫝊見之不老如故常乞於成都市所得隨以與貧者夜去朝還市人不知其宿䖏漢名臣奏曰太尉属應劭司徒属孫嵩司空掾孔伷議以鮮卑隔在漠北犬羊為羣無君長帥廬落人居又其天性貪而無信故自漢興至兹数犯障塞吏民創禁不與交闗惟至互市乃來靡服非畏威懷德實欲中國珍異之貨耳三輔皇圖曰元始四年起明堂辟雍長安城南北為㑹市但列槐樹數百行無墻屋又無坊市闤門環列商賈居之都門亭在其外漢宫殿疏曰門市在渭橋北頭也季兒市東道在雍交道亭市在伊橋東細栁倉市在細栁倉華陽國志曰王長文字徳雋陽愚著絳衣帽牽猪過市乞人與語偽不聞常騎牛周遊陸機洛陽記曰三市大市名金市在大城中馬市在城東陽市在城南衞玠𫝊曰少時乘白羊於洛陽市舉市共觀咸曰誰家璧人於是家門州黨遂號曰璧人越書曰國豐市五日一㑹三秦記曰秦始皇作地市與生死人交易令云生人不得欺死者物市吏告始皇云死者凌生人生人走入市門斬斷馬脊故俗云秦地市有斷馬山謙之丹陽記曰京師四市建康大市孫權所立建康東市周時立建康北市永安中立秣陵闘場市隆安中發樂营人交易因成市也太平御覧巻八百二十七
