body:
  text: 太平御覽卷四百七十一宋李昉等撰人事部一百一十二富上周易曰富有之謂大業兼濟萬物故有曰富有尚書曰五福二曰富毛詩曰瞻烏爰止于誰之屋富人之屋烏所集禮記曰儒有不寶金玉而忠信以為寶不祈土地立義以為土地不祈多積多文以為富又曰富潤屋德潤身又曰問國君之富數地以對山澤之所出問大夫之富曰有宰食力祭器衣服不假問士之富數車以對問庶人之富數畜以對周禮曰太宰掌建邦之六典以佐王平邦國六曰事典以富邦國左傳曰秦后子有寵於桓后子秦桓公子也景公之母弟公子鍼如二君於景其母曰不去懼選選數也君子奢富弗去君將數其罪而加也又曰齊慶氏亡分其邑與晏子晏子不受人問曰富者人之所欲也何為不受對曰我非惡富恐失富也又曰初衞公叔文子朝而請享靈公退見史鰌而告之史鰌曰子必禍矣子富君貪罪其及子乎文子曰君既許我矣其若之何史鰌曰無害也子臣可以免子雖富禮恭不失臣禮富而能臣必免於難戍也驕戍文子之子公叔戌也其亡乎又曰鄭駟秦富而侈嬖大夫也而常陳卿之車服於其庭鄭人惡而殺之論語曰孔子曰富而可求也雖執鞭之士吾亦為之如不可求從吾所好又曰季氏富於周公而求也為之聚歛而附益之子曰非吾徒也小子鳴鼓而攻之可也求冉有名也季氏富矣而求聚民財以增之又曰富與貴是人之所欲不以其道得之不處也又曰不義而富且貴於我如浮雲又曰富而無驕易又曰富而好禮史記曰孔氏用鐵冶為業秦伐魏遷孔氏南陽大鼓鑄規陂池連車騎遊諸侯因通商賈之利有遊閒公子賜與名然其贏得過當愈於纎嗇家致富數千金故南陽行賈盡法孔氏之雍容又曰計然曰貴出如糞土賤取如珠玉財幣欲其行如流水脩之十年國富又曰蘇秦説齊王曰臨淄富而實其人無不鬭雞走狗六博蹋踘者又曰范蠡之陶乃治産積居與時馳逐十九年之中三致千金又曰君子富好行其德小人富以適其力又曰白圭曰吾治生業猶伊尹呂尚之謀又曰穰侯魏冉之富富於王家出闗輜車千乗有餘又曰白圭樂觀時變歲熟取榖與之絲漆繭凶取帛絮與之食趨時若猛獸鷙鳥之發又曰卓氏用鐵治富又曰程鄭富埓卓氏又曰吳楚七國兵起時長安中列侯封君從軍旅齎貸子錢子家以為侯邑國在闗東成敗未决莫肯與唯無鹽氏捐千金貸息什之三月吳楚平一歲中則無鹽氏息十倍用此富埓闗中又曰闗中富商大賈盡諸田田嗇田􅀈韋家栗氏安陵杜氏亦巨萬此其章章尤異者也皆非有爵邑奉禄弄法犯奸而富也盡椎埋去就與時俯仰獲其贏利以末致財用又曰吕不韋往來販賤賣富家累千金又曰齊俗賤奴虜而刁間獨愛貴之桀黠奴人之所患也惟刁間收使之逐魚鹽商賈之利或連車騎交守相然愈益任終得其力起富數千萬又曰范蠡浮海出齊變名姓自謂鴟夷子皮耕於海畔苦身務力父子治生無幾何致錢數千萬齊聞其賢以為相范蠡嘆曰居致千金官至卿相此布衣之極又受尊名不祥乃歸相印盡散財以分于知交鄉黨懷其重寶間行以去止于陶以為此天下之中交易有無之路通為生可致富矣於是自謂陶朱公復約身又耕畜勞居候時轉物逐什一之利居無何則致貲累巨萬天下稱陶朱公也又曰子貢既學於仲尼退而仕於衞廢著鬻財於曹魯之間徐廣曰子貢𫝊云廢居著猶居也讀音如貯七十子徒賜最為饒原憲不厭糟糠匿於窮巷子貢結駟連騎束帛之幣以聘諸侯所至國君無不分庭與抗禮者夫使孔子名布揚於天下者子貢先後之也又曰猗頓用盬鹽起而邯鄲郭縱以鐵冶成業與王者埓富烏氏倮韋昭曰烏氏縣名屬安定倮名也畜牧及衆斥賣求繒物間獻遺戎王戎王倍與之蓄至用谷量牛馬秦始皇命倮比封君寡婦清其先得丹穴而擅其利數世家亦不貲清寡婦也能守其業用財自衞不見侵犯秦皇帝以為貞婦而客之為築女懷清臺夫倮鄙人牧長清窮鄉寡婦禮抗萬乗名顯天下豈非以富耶又曰夫用貧求富農不如工工不如商刺繡文不如倚市門此言末業貧者之資也富者人之情性所不學而俱欲也今有無秩禄之奉爵邑之入而樂與之比者命曰素封又曰蜀卓氏之先趙人用鐵冶富秦破趙遷卓氏卓氏見虜略獨夫妻推輦行詣遷處諸遷虜少有餘財爭與吏求近處葭萌唯卓氏曰此地狹薄吾聞汶山之下沃野下有蹲鴟至死不饑民工於市易乃求遠遷致之臨卭大喜即鐵山鼓鑄運籌策傾滇蜀之民富至僮千人田池射􅀈之樂擬於人君程鄭山東遷虜也亦冶鑄賈椎髻之民富埓卓氏俱居臨卭漢書曰寗成既被刑乃詐刻傳出闗歸家曰仕不至二千石賈不至千萬安可比人乎乃貰貸買陂田千餘頃假貧人役使數千家致産數千萬為任俠又曰張耳大梁人少時及魏公子無忌為客嘗亡命遊外黄富人女甚美庸奴其夫亡抵父客如淳曰父時賓客也客謂曰求賢夫從張耳女聽為請决嫁之女家厚奉給耳以故致千里客宦為外黄令陳餘亦大梁人好儒術遊趙苦陘富人公乗氏以妻之餘年少父事耳相與為刎頸交又曰梁孝王未死財以巨萬計不可勝數及死藏府餘黄金尚四千萬斤他財物稱是也又曰張安世尊為公侯食邑萬户然身衣弋綈夫人自紡績家僮七百人皆有手伎作事内治産業續續纎㣲是以能植其貨富於大將軍光又曰卓氏女文君亡奔司馬相如相如與歸成都家徒四壁立相如與俱之臨卭盡賣車騎置酒舎乃令文君當壚相如身自著犢鼻褌與傭保雜作滌器於市中卓王孫恥之為杜門不出昆弟諸公謂王孫曰有一男兩女所乏者非財今文君既失身於司馬長卿長卿故倦遊雖貧其人才足依也且又令客奈何相辱如此王孫不得已分與文君僮百人錢百萬及其嫁時衣被財物文君復與相如歸成都買宅為富居又曰鮑宣上書哀帝曰奈何獨私養外親與幸臣董賢多賞賜以萬數奴從賓客漿酒藿肉蒼頭盧兒比日用致富非天意也又曰上使善相人相鄧通曰當貧餓死上曰然富通者在我何說貧於是賜通蜀嚴道銅山得自鑄錢鄧氏錢布天下其富如此餓部中亦出又曰原涉父哀帝時南陽太守時天下殷富大郡二千石死官賦歛送䘮皆千萬以上妻子通共受之以定産業時又少行三年䘮者及涉父死讓還南陽賻送行䘮塜廬三年由是顯名京師遊使部中亦出又曰故秦陽以田農而甲一州以田地過限從而富貴為一州第一翁伯以販脂而傾縣濁氏以賣脯而連騎張里以馬毉而擊鍾又曰宣曲任氏之先為督道倉吏秦之敗豪傑皆爭取金玉任氏獨窖倉粟楚漢相距滎陽人不得耕種米石至萬而豪傑金玊盡歸任氏任氏以此起富又曰安邑千樹􅀥燕秦千樹栗此其人皆與千户侯等又曰劉德寛厚好施家産過百萬則以賑昆弟賓客又曰史丹盡得父財身又食大國邑數見褒賞賜累千金僮奴以百數後房妾數十人内奢滛好飲食極滋味聲色之樂又曰富者土木被文錦犬馬餘粟肉又曰中大夫張匡上書言王商宗族權勢合貲巨萬計私奴以千數又曰郡國富人兼利顓業以資賂自行取重於鄉里者不可勝數又曰師史轉轂百數賈郡國無所不至能致千萬又曰京師富人杜陽樊嘉茂陵摯綱為天下高貲又曰許忠言貴家子弟富人或鬭雞走狗馬弋獵博戱亂齊人又曰成都羅裒貲至鉅萬後漢書曰郭况遷大鴻臚上數幸其宅賞金帛甚盛京師號況家為金穴言其富貴也又曰樊重字君雲世善農稼好貨殖性溫厚有法度三世共財子孫朝夕禮敬常若公家其營理産業物無所棄課役童𨽻各得其宜故能上下戮力財利歲倍至乃廣開田土三百餘頃其所起廬舎皆有重堂高閣陂渠灌注池魚畜牧有求必給貲至巨萬而賑贍宗族恩加鄉閭又曰宣帝時陰子方者至孝有仁恩當臘日晨炊而竈神形見方再拜受福家有黄羊因以祠之自是以後暴至巨富有田七百餘頃輿馬僕𨽻比於封君方常言我子孫必將强大至識三世而遂繁昌故後常以臘日祠竈而以黄羊又曰王丹字仲囘京兆人哀平時仕州郡家累千金隱居養志好施周給每歲農時輙載酒肴於田間候勤者而勞之其惰懶者恥不致丹皆兼功自厲邑聚相帥以致殷富其輕黠游薄廢業為患者輙曉其父兄使黜責之没則賻給親自將䕶其有遭䘮憂者輙待丹為辦也又曰馬防以病乞骸骨詔賜故中山王田廬以特進就第防兄弟貴盛奴婢各千人已上寶貨巨億皆買京師膏腴美業又大起第觀連閣臨道彌亘街道多聚聲樂曲度比諸郊廟賓客畢至京兆杜篤之徒數百人常為食客居門下刺史守令多出其家謝承後漢書曰戴遵字子高富於貲産輕財好義賓客常三四百人時人名之闗東大豪戴子高魏典畧曰公沙穆字文乂北海膠東人也體履清直兼學多文隱居東萊山中桓帝時有富人王仲者謂穆曰今多以貲仕吾奉子以百萬唯子所用穆荅曰斯意厚矣夫富貴在天得之有命以賄求爵姦莫大焉郡舉孝亷除郎中以高第為光禄主簿吳書曰劉表亡曹公向荆州表子琮降以節迎曹公諸將皆疑其詐曹公以問婁子伯子伯曰天下擾攘各貪王命以自重今以節來是必至誠曹公曰大善遂進兵寵秩子伯家累千金公曰婁子伯富樂於孤但勢不如孤耳從破馬超等子伯功為多曹公常歎曰子伯之計孤不及也蜀志曰董和字㓜宰南郡人益州牧劉璋以為牛鞞江原長成都令蜀土富貴時俗奢侈貨殖之家侯服玉食婚姻葬送傾家竭産和躬率以儉惡衣蔬食防遏踰僭為之軌制所在皆移風變善又曰糜竺字仲祖業貨殖僮客萬人貲産巨億王隱晉書曰石崇雖有人才而性麄强貪而好利富擬王者有司簿閱崇出宅財物及水碓有三千餘區蒼頭八百人他珍寶奇異不可稱數又曰何曾遒豪累世人有小紙為書者曾勅記室勿報也蒸餅上不拆作十字不食日膳萬錢猶曰無下筯處又曰刁逵字伯道弟暢字仲遠次𢎞字叔仁各厯職州刺史兄弟子姪並不治名行兢脩貨殖有田萬頃奴婢數千人義旗初建𢎞將謀起兵宋王遣劉毅誅之刁氏既富奴客縱横上山固澤為京口之蠧宋既誅暢散其榖帛金錢牛羊令民稱力取之彌日不盡時天下饑儉編户菜蔬及刁氏之破百姓充足徐廣晉記曰石季倫甚富侈衣服伎樂夸於許史有妓人曰綠珠美孫秀欲之使人求焉崇盡出其婢妾數十人皆藴蘭麝而被羅縠晉諸公讚和嶠字長輿逌之子也少知名以雅重稱常慕其舅夏侯𤣥之為人厚自封植嶷然不羣拜黄門郎遷中書令轉尚書愍懷太子初立以嶠為少保加散騎常侍家産豐富擬王公而性至儉恡宋書曰沈攸之少貧及貴在荆州富擬王侯夜中諸廂廊然燭達曉曳珠玉者百數人皆一時絶妙孫岩宋書曰徐湛之産業豐富室宇園池貴遊莫及門生千餘皆三吳富人子每出入行遊途巷盈滿唐書郝處俊侍中平恩公許圉師即處俊之舅早同州里俱宦達於時又其鄉人田氏彭氏以殖貨見稱有彭志筠顯慶中上表請以家財絹布二萬叚助軍詔受其絹萬疋特授奉議郎仍布告天下江淮間語曰貴如許郝富若田彭太平御覽卷四百七十一
