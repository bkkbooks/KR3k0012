  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_028-1a, image: WYG0893/WYG0893-0240c.png}
body:
  text: 太平御覽卷二十八宋李昉等撰時序部十三立冬冬至立冬禮記月令曰孟冬之月是月也以立冬先三日太史謁於天子曰某日立冬盛德在水天子乃齋立冬之日親率公卿大夫以迎冬於北郊還乃賞死事恤孤寡左傳曰仲尼問郯子曰丹鳥氏司閉者也立秋來立冬至易通卦驗曰立冬不周風至水始氷薺麥生雀入水爲蛤京房易占曰立冬乾王不周風用事人君當興邊兵治城郭行刑决罪三禮義宗曰十月立冬為節者冬終也立冬之時萬物終成為節名小雪為中者氣序轉寒雨變成雪故以小雪為中家語曰魚遊於水鳥遊於雲故立冬則燕雀入於海化為蛤符瑞圖曰八風循通八方之風應時而至也立冬北方廣莫風至一名寒風周書時訓曰立冬十月節水始氷水若不氷即國用匱乏地始凍地若不凍即灾咎之徴野雉化為蜃若不爲蜃即時多婬婦五行休王論云立冬乾王坎相艮胎震沒巽死離囚坤廢兊休冬至周易曰先王以至日閉關商旅不行后不省方尚書曰日短星昴以正仲冬孔安國註曰日短冬至日也星􅄧西方白虎七宿之􅄧宿並見以正冬之三節也禮記曰仲冬之月日短至隂陽爭諸生蕩爭者隂方盛陽欲起也君子齋戒處必掩身身欲寧去聲色禁嗜欲安形性事欲靜以待隂陽之所定周禮曰冬至日在牽牛景長一丈三尺夏至日在東井景長尺有五寸又曰薙氏掌殺草春日生而萌之夏日至而夷之秋繩而芟之冬日至而耜之若欲其化也則以水火變之謂以火燒其所掌薙之草已而水之則其土亦和美矣月令季夏乃燒薙行水利以殺草如以熱湯可以糞田疇可以美土疆又司徒職曰夏至日之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所㑹也隂陽之所和也然則萬物阜安乃建王國為制其畿方千里而封樹也春秋左傳曰僖公五年春正月辛亥朔日南至公既視朔遂登觀臺以望而書禮也凡分至啓閉必書雲物為備故也易通卦驗曰冬至之日見雲送迎從下嚮來歲大美人民和不疾疫無雲送迎德薄歳惡故其雲赤者旱黒者水白者為兵黄者有土功諸從日氣送迎其徴也又冬至始人主致八能之士或調黄鍾或調六律或調五行或調律厯或調隂陽或調正德鄭𤣥註曰致八能之士者言選於人衆之中取習曉者使之調為諧調和之意也又冬至始人主與羣臣左右從樂五日天下之衆亦家家從樂五日以迎日至之禮鄭𤣥註曰從者就也冬至君臣俱就大司樂之宫臨其肄樂祭天圜丘之樂以為祭事莫大於此又冬至成天文鄭𤣥註云天文謂之三光運照行天下冬至而數訖於是時也祭而成之所以報也又冬至之日立八神樹八尺表日中視其晷如度者則歳人和順晷不如度者歳惡晷入則水退則旱進二寸則月食進尺則日食進謂長於度也漢書曰宦者淳于陵渠復覆太初厯晦朔弦望皆最密日月如合璧五星如連珠孟康曰謂太初上元甲子夜半朔旦冬至時七曜皆㑹聚斗牽牛分度夜盡如合璧連珠也師古曰言其應候不差也又冬至陽氣起君道長故賀夏至隂氣起君道消故不賀司馬彪續漢書曰天子常以冬夏至日御前殿合八能之士陳八音聴樂均度晷景候鍾律權土炭効隂陽也續漢書禮儀志曰冬至前後君子安身靜體百官絶事不聴政擇吉辰而後省事聴事之日百官皆衣絳後漢書曰傅賢字仲舒遷廷尉每冬至斷獄遲廽流涕魏志曰黄初元年冬至日黄雀集于文昌殿前後魏崔浩女儀曰近古婦人常以冬至日上履襪於舅姑踐長至之義也西域諸國志曰天竺國以十月二十六日為冬至冬至則麥秀管子曰以冬至之日始數四十六日冬盡春始教民鑚燧謹竈泄所以夀人也淮南子曰冬至之日北宮御女黑色衣黑采擊磬石水王北方故處北宮其器鎩其畜彘鎩者却内像隂閉彘水畜又陽氣為火隂氣為水水勝故夏至濕火勝故冬至燥燥故炭輕濕故炭重又曰冬至井水盛盆水溢鵲始巢八尺之臬日中而景三尺吕氏春秋曰冬至後五旬七日菖蒲生百草之先生者於是始耕髙誘註曰菖蒲水草也又冬至日行逺道周四極命之曰𤣥明天又仲冬命之曰陽月陽氣在上人民空閒無所事作故曰陽月太𤣥經曰冬至及夜半以後者近𤣥之象也進而未及往而未至虛而未滿故謂之近𤣥也𤣥以子午為晝夜分冬至夜半以前癸亥之日也𤣥道好謙夜半以後天變雖進未及雖往未至猶在中虛而未盈滿也是為近𤣥則休也釋文曰冬至斗指子夜半時加午者也又調律者度竹為管蘆莩為灰列之九閉之中漠然無動寂然無聲㣲風不起纎塵不形冬至夜半黄鍾以應白虎通曰冬至廣莫風至斷大辟行刑獄也又冬至前後君子安身靜體百官絶事不聽政擇吉辰而後省事又冬至陽始起反大寒何也隂氣推而上故大寒玉燭寳典云十一月建子周之正月冬至日南極景極長隂陽日月萬物之始律當黄鍾其管最長故有履長之慶神農書曰冬至隂陽合精天地交讓天為不温地為不凍君為不朝百官為不親事不可出遊必有憂悔符瑞圖曰冬至東北方融風至一名炎風崔寔四民月令曰冬至之日薦黍羔先薦𤣥𠖇以及祖禰其進酒尊老及謁賀君師耆老如正旦又先後冬至各五日買白犬養之以供祖禰周書時訓曰大雪之日鶡鳥猶鳴者國有訛言虎不交將帥不和荔挺不出卿士專權冬至之日蚯蚓不結君政不行麈角不解冰不藏水泉不動隂不承陽厯義䟽曰大雪十一月節月之初氣也言太隂之氣以大水凝為雪故曰大雪冬至十一月之中氣也言冬至者極也太隂之氣上干於陽太陽之氣下極於地寒氣已極故曰冬至氣當易之是以王者閉關商旅不行以其陽氣乗踊君夀益長是以冬賀也亦以日之行天至於巽維東南角極之於此故曰冬至顔師古匡謬正俗曰鄭氏箋云鵲之作巢冬至加功至春乃成此言始起冬至加功力為巢蓋直言耳而劉昌宗周讀等音加為架名從以構為義則不應云架功也晉書曰周嵩母李氏常冬至飲酒舉觴賜三子曰吾本渡江託足無所不謂爾等並貴列吾目前吾復何憂嵩起曰恐不如尊㫖伯仁志大而才短名重而識闇好乗人之弊此非自全之道嵩性抗直亦不容於世唯阿奴碌碌當在阿母目下耳阿奴謨小字也後果如其言沈約宋書曰魏晉冬至日受萬國及百僚稱賀因小㑹其儀似歲朝也又冬至朝賀享祀皆如元日之儀又進履襪作赤豆粥荆楚記云共工氏有不才子以冬至日死為人厲愛赤豆故作粥禳之南史曰梁傅岐為始新令有囚當死㑹冬至岐乃放其還家曹掾固爭曰古者有此今不可行岐曰其若負信縣令當坐竟如期而反太守深相嘆異遽以狀聞梁書曰席闡出為東陽太守在郡有能名冬至悉放獄中囚依期而至齊書曰厙狄伏連冬至之日親表稱賀其妻為設豆餅伏連問此豆何因而得妻對曰於馬豆分减伏連大怒唐𤣥宗實録曰上御含光殿受朝太史奏曰朔日至厯數之先嘉辰之㑹按樂汁圖徴云朔日冬至聖主厚祚又按春秋感精符云冬至隂雲祁寒有雲迎日者來歲大美此並聖德光被上感天心請付有司以彰嘉瑞從之洽聞記曰赤土國直崖州南渡海經雞籠島冬至之日影在北夏至之日影在南開戸皆向北黄帝針灸經云冬至日風從南來者名為虛賊傷人也風角書曰候赦法冬至後盡丁巳之日有風從已上來未滿三日以上必有大赦養生要集曰南陽張平子云冬至陽氣歸内腹中熱物入胃易消化又通厯數家算法推考其紀從上古天元訖十一月甲子夜半朔冬至日月若連壁晉潘尼長至詩曰渾儀賦四氣玉衡運招搖靈晷修期夕日南始今朝宋鮑照冬至詩曰景移風度改日至晷遷換𦕈𦕈負霜鵲皎皎帶雲鴈長河夜䦨干層水如玉岸哀哀故老容慘慘愁歲晏陳新塗妻李氏冬至詩曰靈象尋數廻四氣平運散隂律鼓㣲陽大明啟修旦感與時來興心隨逝化歎式宴集中堂嘉賓盈朝館魏曹植冬至獻襪表曰伏見舊儀國家冬至獻履貢襪所以迎福踐長先臣或為之頌臣既玩其嘉藻願述朝慶千載昌期一陽嘉節四方交泰萬彚昭蘇亞歲迎祥履長納慶不勝感節情繫帷幄拜表奉賀并獻紋履七緉襪若干副上表獻以聞謹獻太平御覽卷二十八
