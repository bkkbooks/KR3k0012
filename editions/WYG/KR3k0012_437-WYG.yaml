body:
  text: 太平御覽卷四百三十七宋李昉等撰人事部七十六勇五盛𢎞之荆州記曰襄陽城北河水極深先有蛟年常為害太守鄧遐氣果兼人抜劔入水蛟繞其足遐因揮劔截蛟數叚流血丹水自此無復蛟患干寳捜神記曰東越閩中有虛嶺髙數十里下北隰中有大蛇長七八丈大十餘圍常病都尉及長吏下夢巫覡欲得啖童女常八月朝祭送蛇穴蛇輙吞之已用九女将樂李誕有小女名寄應募而行乃請好劔咋蛇犬作數斛餈疾資切蜜灌之以置穴口蛇出頭大如囷目如二尺鏡先啖餈寄便放犬蛇以劔斫殺得九女髑髏越王乃以寄為后漢末英雄記曰公孫瓉除遼東屬國長史連接邉冦每有警輙厲色慣怒如赴讐敵望塵奔繼之夜戰虜識瓉聲憚其勇莫敢犯之越絶書曰越王請臣於吳吳王許之子胥大怒目若夜光聲若哮虎曰此越未戰而服天以賜吳其逆天乎臣唯君王急制之吳王不聽遂許之又曰闔閭惡王子慶忌問於伍子胥子胥曰臣有所厚於國其人細小也曰要離臣嘗見其辱壯士菑丘訴東海上人也為齊王使於吳過淮津欲飲馬水神出取菑丘訴大怒偏袒操劔入水與戰殺兩蛟一龍連日乃出眇其左目遂之吳㑹於友人之座訴恃其與神戰之勇輕士大夫要離與之對座即謂之曰吾聞勇士之戰也與日戰者不移表與鬼戰者不旋踵與人戰者不達聲生往死還不受其辱今子與神戰於泉水之中亡馬失御又受眇目之病形殘名辱勇士所恥自驕於友人之旁何其忍負也於是菑丘訴卒於結恨勢怒未及有言座衆分解菑丘訴宿怒遣恨宣往攻要離要離戒其妻曰曩者吾辱壯士菑丘訴於大衆之座彼勇士有受不還報答之怒餘恨忿志㝠必來矣慎毋閉門菑丘訴果往入門不閉登堂不關入室不守放髪僵卧訢乃手抜劔而指要離曰子有三當死之過子知之乎要離曰吾不知也菑丘訴曰子辱吾於大座之衆一死也歸不閉門二死也臥不守衛三死也子有三死之過雖欲勿怒其得乎哉要離曰吾無三死之過子有三不肖之媿子知之乎菑丘訴曰吾不知要離曰吾辱子於千人之衆子不報答是一不肖也入門不駭登堂無聲是二不肖也後抜劔手持頭乃敢有言是三不肖也子有三不肖之媿而欲威我豈不鄙哉於是菑丘訴仰天歎曰吾之勇也人莫敢有訾吾者若斯要離乃加吾之上此天下壯士也劉彦明敦煌實録曰索苞有文武才舉孝亷除郎中每征伐剋敵勇冠三軍時人比之關張宋澄於金城為歩羗三千人所圍窮守孤城垂當破沒苞以完騎五千奮劔突陣徑入與澄對坐搥頭拊掌大笑羗皆佩楯擢刀四面直前苞謂澄曰君但安心觀我擊之乃除彄弓接矢繞搥射之莫不應弦而倒皆䧟楯通中立殺三十餘人創夷者百計羗即散走稱神嚴尤三将論曰王翦為秦将滅燕燕王喜奔逃東夷秦王曰齊楚何先李信曰楚地廣齊地狹楚人勇齊人怯請先從事於易表准正論曰兵有三勇主愛其民者勇有威刑者勇賞信於民者勇故仁愛加於下則有必死之民劉向新序曰田恒将弑君勇士六人刼子川捷曰子與我請分齊之半以予子不吾與今此是己子川捷曰子欲與我也以我為智乎臣弑君非智也以我為仁乎見利而倍君非仁也以我為勇乎刼我以兵懼而予子非勇也使吾無此三者與子無補於子若有此三者終不從夫子乃舎之又曰勇士一呼三軍皆辟易士之誠也夫勇士孟賁水行不避蛟龍陸行不避虎狼發怒吐氣聲響動天至其死矣頭身斷絶夫不用仁而用武當時雖快身必無後是以孔子勤勤行仁又曰齊遣淳于髠到楚髠為人短小楚王甚薄之謂曰齊無人耶而使子來子何長也髠對曰臣無所長腰中七尺之劔欲斬無壯王王曰止吾但戲子耳與髠共飲又曰秦王以五里地封鄢陵君鄢陵君辭不受使唐且謝秦王王忿然變色怒曰亦嘗見天子之怒乎且曰臣未嘗見王曰夫天子之怒伏尸百萬流血千里且曰大王亦嘗見布衣韋帯士之怒乎王曰布衣韋帯士之怒解冠徒跣以頭搶地耳何難知者且曰此乃庸夫庶人之怒耳非布衣韋帯士之怒也夫專諸刺王僚彗星襲月奔星晝出要離刺王子慶忌倉鷹擊於臺上聶政刺韓王白虹貫日此三者皆布衣怒也與臣将四士無怒則已一怒伏尸二人流血五歩即案其七首起視秦王曰今将是矣王色變長跪曰先生就坐寡人喻矣鄢陵獨以五十里在者徒用先生故乎又曰林既衣韋衣而朝齊景公景公曰此君子之服耶小人之服耶林既作色曰夫服亦何足以揣士行乎昔荆為長劔危冠令尹子西出焉齊桓短衣而遂溝之冠管仲隰朋出焉越文身翦髮范蠡大夫種亦出焉西戎左衽而組結由余亦出焉如君言衣大裘者當大號衣羊裘者當羊鳴今君衣􅈢裘而朝得無為變乎景公曰子自以為勇悍乎曰登髙臨危而目不眴而足不淩者此工匠之勇悍也入深泉取蛟龍拘黿而出者此漁夫之勇悍也入深山刺虎豹抱熊而出者此獵夫之勇悍也夫不難斷頭裂腹暴骨流血中野者此武士之勇悍也今臣居廣廷作色而辨以犯主君之怒前雖有乘軒之賞未為之動也後雖有斧鑕之威未為之恐也此既之所以為勇悍也劉敬升異苑曰荆州上明江浦常有蛟浴汲者死不脱嵗升平史陳郡鄧遐字應遥素勇徤憤而入水覓蛟得便與拳即曵著岸欲斫殺母語云蛟是神物寧勿殺之今可呪令勿復為害遐呪而放焉自茲迄今絶無此患盛𢎞之荆州記曰揮劒截蛟血流丹水餘同太公六韜曰大勇不勇又曰以死取人謂之勇又曰文王問太公曰守士柰何公曰危之而不恐者勇也又曰武王問太公曰陳士之道柰何太公曰軍中有大勇強暴者聚為一卒名曰䧟陳之士有伎格強良多力能潰破金鼔絶滅旌旗者聚為一卒名曰勇力之士老子曰勇於敢則殺勇於不敢則活荘子曰孔子遊於宋匡人圍數匝而弦歌不輟何也子曰由來吾語爾夫水行不避蛟龍者漁父之勇也陸行不避兕虎者獵夫之勇也白刃交於前視死若生者烈士之勇也聖人知窮之有命知勇之有持臨大難而不懼聖人之勇也由處矣吾命有所制矣無幾何持甲者進辭曰以為陽虎故圍之今非請辭而退又曰田光答太子曰竊觀太子客無可用者夏扶血冦之人怒而面赤宋臆脉勇之人怒而面青武陽骨勇之人怒而面白光所知荆軻神勇之人怒而色不變又曰闔廬試其民於五湖劔皆加於肩地流血幾不可止又曰大勇不闘大兵不冦又曰齊之好勇者其一人居東郭其一人居西郭卒然相遇於塗曰姑相與飲乎􅜠數行曰姑求肉乎一人曰子肉也我肉也尚胡求肉於是飲酒已因抽刀而相㗖至死止勇若此不若無勇又曰齊荘公時有士曰賓卑聚夢有壮士白縞之冠束布之衣素履黒劔從叱之唾其面􅅥然而寤徒夢也明召其伎而告之曰吾少好勇年十六而無所挫辱今夜辱吾将索之得之則可不得将死之每朝立乎衢三日不得退而自殺又曰兵天下之凶器也勇天下之凶徳也舉凶器行凶徳由不得已也吕氏春秋曰荆有攸飛者得寳劔于江干遂還及渉江至于中流有兩蛟夾繞其船攸飛曰子嘗見兩蛟繞船而活者乎船人曰未之嘗見也飛攘臂袪衣抜寳劔曰此江中之腐肉也朽骨也持劔赴江刺蛟殺之而後上船舟中之人皆得活荆王聞之仕以執圭抱朴子曰赴白刃而忘生格兕虎於谷者勇人也韓子曰越勾踐欲民輕死出見怒鼃乃為之式曰為其有氣故也明年民以頭獻十餘人由此觀之譽足殺人矣孟子曰晉有馮婦者善搏虎野有衆逐虎虎負隅莫敢攖馮婦趨而迎之攘臂而下車衆皆悦之趙歧曰馮姓婦名也又曰梁惠王曰寡人有疾寡人好勇孟子對曰王請無好小勇撫劔疾視曰彼惡敢當我哉此匹夫之勇敵一人者也詩云王赫斯怒爰整其旅以遏徂莒以篤周祜以對于天下此文王之勇也一人衡行于天下武王恥之此武王之勇也武王一怒而安天下之民今王亦一怒而安天下之民民唯恐王之不好勇也揚雄法言曰或問勇曰軻也曰何軻也曰軻也者謂孟軻若荆軻君子盗諸或問孟軻之勇曰勇於義而果於徳不以貧富貴賤死生動其心也其庶乎孫卿子曰有三勇上不脩亂世之君下不脩亂世之民無貧窮富貴天下知之則欲與天下共樂不知之則塊然獨立天地之間而不畏是上勇也禮恭意儉輕貨推賢有不肖者敢受而廢之是中勇也輕身重貨以斯勝人為意是下勇也召子曰孟賁曰生乎勇乎曰勇貴乎勇乎曰勇富乎勇乎曰勇三者人之所難而皆不足以易勇此其所以能攝三軍服猛獸故也又曰田成子問勇顔歜聚之答也不敬田子之僕填劔曰更言丹生不更則死歜聚曰以死為有智今吾生是也是吾所以懼汝而反以懼我又曰聖人畜仁而不主仁畜智而不主智畜勇而不主勇昔者齊桓公脅於魯君而獻地百里勾踐脅於㑹稽而身官之三年襄子脅於智伯而以顔為塊其卒桓公臣魯君勾踐滅吳襄子以智伯為戮此謂勇而能怯者也慎子曰有勇不以怒反與怯均也胡非子曰夫曹劌匹夫徒歩之士布衣柔履之人也唯無怒一怒而刼萬乘之師存千乘之國此謂君子之勇勇之貴者也又曰屈将子好勇見胡非刻而問曰聞先生非闘有説則可無説則死胡非曰吾聞勇有五等夫負長劒赴蓁薄折虎豹搏熊羆獵徒之勇也負長劔赴深泉折蛟龍縳黿鼉漁人之勇也登髙危之上鶴立四望顔色不變陶匠之勇也若近視必殺立刑之勇也昔齊桓公伐魯曹劌聞之觸齊軍見桓公曰臣聞君辱臣死君退師則可不退則臣以血濺君矣桓公懼管仲曰許與之盟而退夫曹劌匹夫一怒而却齊侯之師此君子之勇晏嬰匹夫一怒而沮崔子之亂亦君子之勇也五勇不同公子将何處屈将悦稱善乃解長劔釋危冠而請為弟子焉淮南子曰桀之力申鈎索鐵揉金椎移大犧水殺黿鼉陸縳熊羆然湯革車三百乘困之鳴條禽之焦門由此觀之則勇不足以為天下矣智不足以恃勇不足為強張華博物志曰賁育之勇劉義慶徐州先賢讃曰徐盛字文響環耶莒人也遭亂客居吳以敦直勇氣聞魏王出濡須孫權每選出戰者盛常在前魏嘗六出横江盛獨與諸将俱赴討時乘艦遇風落岸下諸将恐懼未有出者盛獨将上斫賊賊三披走所傷殺甚衆風止得還權大壯之應璩與許子俊書曰足下以方剛之盛年應不覊之勁勇将發虓虎之威致霜雪之誅擒吳梟蜀定功萬里而劉備不下山孫權不出水武力不奮猛氣畜氣勇其毒如何蔡謨書曰祖士雅昔𦵏雍丘城内祖約在夀春時賊據雍丘約遣路永将數百人夜縁入雍丘城戰并開墓䄡裘踰城出還夀春永勇如此太平御覽卷四百三十七
