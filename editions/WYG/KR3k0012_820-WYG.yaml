body:
  text: 太平御覽卷八百二十宋李昉等撰布帛部七布火浣布紵白疊布說文曰細布十五升布也纑布縷也絟細布也繐蜀布也釋名曰布布列諸縷繐慧也齊人謂凉為慧言服之輕細凉慧也周禮地官下載師曰凡宅不毛者有里布夏官下職方氏曰正北曰并州其水淶易其利布帛禮記曰仲夏之月毋暴布鄭𤣥注曰不以隂功于太陽事禮記曰玉藻曰年不順成君衣布為凶年變冠義曰始冠之冠緇布之冠也太古冠布齋則緇之其緌也左傳閔公曰衛文公大布之衣大帛之冠襄二曰諸侯圍偪陽主人懸布魯孟氏之臣秦董父登之及堞而絶之偪陽人懸而以試外之勇者墜則又懸之蘓而復上者三主人辭焉乃退主人嘉其勇故辭謝不復懸布帶其斷布以狥於軍三日帶其斷布以示勇也又襄二十八年齊子尾曰且夫冨如布帛之有幅焉為之制度使無遷也夫民生厚而用利於是乎正徳以幅之言厚利皆人之所欲惟正德可以為之幅無黜嫚黜猶放也謂之幅利利過則為敗吾不敢貪多所謂幅也周易說卦曰坤為布論語鄉黨曰齊必有明衣布史記張騫傳曰臣在大夏時見卭竹杖蜀布問安得此大夏國人曰吾賈人往市身毒在大夏東南可數千里又曰伏靈在莬絲之下燭之火滅即記其數以新布四尺環置之明即掘取漢書曰太公以布為貨廣二尺二寸為幅長四丈為疋又曰髙帝曰吾奮布衣取天下又曰文帝徙淮南王安道死時民謠曰一斗粟尚可舂一尺布尚可縫兄弟二人不可容又曰公孫𢎞為丞相而卧布被又曰張敞為京兆尹長安游徼受贓布罪名已定其母年八十守遺腹子詣敞自陳願乞一生之命敞多其母守節而出教更量所受布狹幅短度中䟽􅃜二尺價値五百由此得不死東觀漢記曰亷范年十五入蜀迎祖母䘮及到葭萌渡船没幾死太守張穆持筒中布數篋與范范曰石生堅蘭生香前后相違不忍行也遂不受又曰建初元年賈逵入北宫虎觀南宫雲臺使出左氏大義書奏上嘉之賜布五百疋衣一襲謝承後漢書曰靈帝時楊珽為零陵太守時蒼梧滑賊相聚吏民憂恐珽乃特制馬車數十乗以排囊盛石灰於車上繫布索於馬尾從風鼔灰賊不得視因以火燒布燃馬驚奔突賊陣又曰董卓獲山東兵以猪膏塗布十餘丈用纒其身然後燒之先從足起又曰呉郡夲不獻越布陸閎美容儀常衣越布单衣明帝好之因勑郡獻越布由此始也華嶠後漢書曰哀牢夷知染綵紬布織成文章如綾錦有梧木華績以為布幅廣五尺潔白不受垢汚先以覆亡人然後用之又曰王允與吕布及士孫瑞謀董卓有人書回字於布上負而行於市歌曰布乎布乎有告卓者卓不悟范􅁮後漢書曰馬太后詔曰吾為天下母而身服大練食不求甘左右但着帛布無香薰之飾者欲身率下也又曰元和二年詔令天下大酺五日賜公卿以下錢帛各有差及洛陽民當酺者布户一疋外三户共一疋賜博士弟子見在太學者布人三疋典略曰蘇秦如趙逄其隣子于易水之上從貸布一疋約價千金隣子不與魏畧曰大秦國在安息條支西出細布有織成紬布言用水羊毳名曰海西布又曰大秦國出金塗布緋持竹布發隆火浣布阿羅得布巴則布鹿代布温宿布五色枕布魏文帝詔曰夫珍翫所生皆中國及西域他方物比不如也代郡黄布為細樂浪練為精江東太木布為白故不如白疊布鮮潔也魏畧曰皇甫隆為燉煌太守燉煌婦人作裙率縮如羊腸用布一疋隆禁止之所省復不貲晉書曰王戎性慳從子將婚遺一單布衣婚畢却收之又曰蘇峻平后帑藏空竭庫中唯練數千端鬻之不售而國用不給導患之乃與朝賢俱制練布單衣於是人士歙然競服之練遂踴貴乃令主者出賣端至一金又曰謝尚書江夏相府以布四十疋為尚造烏布帳尚以為軍士􅃭袴又曰顧愷之為殷仲堪荆州參軍嘗因伐還仲堪特以布帆借之至破冡遭大風愷之與仲堪牋曰地名破冡直破冡而出下官平安布帆無恙宋書曰王𤣥謨侵魏為前鋒好營貨利一疋布責人八百梨以此倍失人心梁書曰蕭恢為郢州刺史境内大寧時有進筒中布者恢以竒貨異服即命焚之於是百姓仰徳陳書曰姚察自居顯要一不交通常有私門生不敢厚餉送南布一端花練一疋察謂曰吾所衣者止是麻衣蒲練此物於吾無用既欲相接欵幸不煩爾此人遜讓察厲色驅出自是莫敢饋送南史曰林邑國出古貝古貝古樹名也其華盛時如鵝毳抽其緒紡之以作布布與紵布不殊亦染成五色織為班布又曰東夷扶桑國其土多扶桑木故以為名扶桑如桐初生如筍國人食之實如棃而赤績其皮為布以為衣亦以為錦燕書曰宋該字宣孔為長史太祖㑹群僚以該性貪故賜布百餘疋令負而歸重不能致乃至僵頓以愧辱之後魏書曰楊大眼為荆州刺史常縳藁為人衣以青布而射之召諸蠻渠指示之曰卿等作賊吾正如此相殺也又曰楊椿歸老臨行誡子孫曰國家初丈夫好服綵色吾雖不記上谷翁時事然記清河翁時服飾恒見翁著布衣韋帶常自約勑諸父曰汝等後世若冨貴於今日者愼勿積金一斤綵帛百疋已上用為冨也北史曰齊鄭述祖為光州刺史有人入市盗布其父怒曰何汚仁君執之以歸首述祖特原之自是境内無盗唐書曰真觀十八年命將征遼東安州人彭通請出布五千疋以資征人上喜之比漢之卜式拜宣議郎晏子春秋曰景公謂晏子曰東海中有水而赤中有􅀥華而不實何也晏子曰昔秦穆公乗龍治天下以黄布裹蒸􅀥至海而淬其布於波黄布故水赤蒸􅀥故華而不實公曰吾佯問晏子對曰佯問者亦佯對之莊子曰魯君聞顔闔得道之人使人以幣先焉顔闔守門麤布之衣而自飯牛使者致幣顔闔對曰恐聼繆而遺使者罪不若審之使者還反復來求即不得孫卿子曰與人善言美若布帛與人惡言深於矛㦸韓子曰衛人有大妻禱而祝曰使我無故得百束布其夫曰何少也妻曰益則子將取妾又曰齊國好厚塟布帛盡於衣衾林木盡於棺槨桓公患之以告管仲曰布帛盡則無以為幣林木盡則無以為守備而人厚葬之不休禁之奈何管仲對曰凡人之有為也非名之則利之也於是乃下令曰棺槨過度者僇其尸罪夫當䘮者夫僇死無名罪當䘮者無利人何故為之也又曰公儀休相魯其妻織布休曰汝豈與人爭利哉遂燔其機淮南子曰布之新不如紵紵弊而不如布或善為新或善為故善由宜也抱朴子曰寸裂之錦黻未若堅光之韋布郭子曰劉道貞常為徒扶風王以五疋布贖之既而用為從事郎中當時以為美談吕氏春秋曰戎人見暴布者問曰何以為此莾莾也指麻而示之怒曰此權權何以為莾莾權權由飬治也莾莾長貌也說苑墨子曰古有用無文者禹是也土階三等衣裳細布當此時黼黻無所用務在完堅王子年拾遺記曰周成王六年然丘國遺貢獻使者衣云霞之布如今之朝霞布也列女傳曰楚江乙母者當恭王之時乙為大夫有入王宫盗者令尹以罪乙請於王而黜之處家無幾其母亡布八尋言令尹盗之王曰令尹在上冦盗在下尹令不知有何罪焉母曰昔日妾子為郢大夫人盗王宫中之物妾子坐之而黜令尹獨何不以是為過也王曰善令吏償母之布因賜金十鎰母讓金布曰妾豈貪貨而干王哉怒令尹之治也遂不肯受王曰母智若此其子必不愚乃復召江乙而用之先賢行狀曰王烈字彦方通識達道人皆慕之州閭成風咸竟為善時國中有盗牛者牛主得知盗者曰我邂逅迷惑從今以後將改過子既己見宥幸毋使王烈聞之人有以告烈者以布一端遺之廣州先賢傳曰丁宻蒼梧廣信人也清貧髙節非家織布不衣竹林七賢論曰王戎為侍中南郡太守劉肇遺戎筒中布五十端戎不受而厚報其書議者以為譏世祖患之為發詔議者乃息越絶書曰葛山者勾踐種葛使越女織治葛布獻於呉𤣥中記曰𤣥莬北有山山有花人取紡織為布南州志曰桂州豊水縣有緑藤俚人以為布南州異物志曰五色班衣以絲布古具木所作此木熟時狀如鵝毳中有核如珠珣公後切細過絲綿人將用之則治出其核但紡不織任意小抽相牽引無有斷絶欲為班布則染之五色織以為布弱軟厚緻上毳毛外徼人以班布文最煩縟多巧者名曰城城其次小麄者名曰文辱又次粗者名曰鳥麟顧㣲廣州記曰阿林縣有勾芒木里人斫其大樹半斷新條更生取其皮績以為布軟滑甚好裴氏廣州記曰蠻夷不蠶採木綿為絮皮員當竹剥古緑藤績以為布笑林曰沈珩弟峻字叔山有譽而性儉張温使蜀辭峻峻入内良久出語温曰向擇一端布欲以送卿而無粗者温嘉其能顯非俗說曰桓豹奴善乗騎亦有極快馬時有一諸葛郎自云能走與馬等桓車騎以百疋布置埓令豹奴乗馬與諸葛並走至者得布便俱走諸葛恒與馬齊欲至埓馬頭去布三尺許諸葛一躍坐布上遂得之杜寶大業拾遺録曰七年十二月朱寛征流球國還獲男女口千餘人并雜物産與中國多不同緝木皮為布甚細白幅闊三尺二寸亦有細班布幅闊一尺許夏侯開國呉郡賦曰金玉星煩明璫霞聚織絺細越青箋白紵名練奪乎樂浪英葛先乎三輔張載擬四愁詩曰主人遺我筒中布何以報之流黄素楊雄蜀都賦曰細絺弱折綿繭成袵筒中黄潤一端數金魏武遺令曰銅雀臺上安六尺牀施繐帳月旦十五日向帳作妓女等時時登銅雀臺望吾西陵墓田曹植表曰欲遣人到鄴市上黨布五十疋作車上小帳帷謁者不聽陸機吊魏武文曰悼繐帳之𠖇漠怨陵西之芒芒火浣布魏志曰青龍三年西域重譯獻火浣布詔大將軍太尉臨試以示百僚呉録曰日南北景縣有火鼠取毛為布燒之而精名火浣布崔鴻十六國春秋前秦録曰天竺國獻火浣布南史曰南海諸簿國東千餘里至自然火洲其上有樹生火中洲左近人剥取其皮紡績作布以為手布與焦布無異而色㣲青黑若小垢洿則投火中復見精潔或作燈炷用之不知盡列子曰周穆王大征西戎西戎獻崑吾劔火浣布其劒長尺有咫錬鋼赤刃用之切玉如泥焉其布浣之必投火中布則火色出而振之皜然疑乎雪也抱朴子曰海中蕭丘常有自生火常以夏起而秋㓕丘方十里當火起滿洲洲上純生一種木正著此木雖為火所焚而不麋但小燋黑人或得為薪者火之俱如常薪但不成灰炊熟則以水灌㓕之后復更用如此不窮夷人取此木華績以為布其木皮亦剥以灰煑治以為布但麤不及華俱可以火浣又有白䑕毛長三寸許亦居此洲上空水中入火中不燒灼也其毛又可績以為布故火浣有三種薄子曰長老說漢桓帝時大將軍梁冀作火浣布单衣㑹賔客行酒公卿朝臣前佯爭酒失杯而汚之偽怒解衣而燒之布得火煒華赫然而熾如燒凡布垢盡火滅粲然潔白如水澣之東方朔神異經曰南荒之外有火山長四十里廣五十里其中皆生不燼之木晝夜火燒得暴風猛雨不得㓕火中有䑕重千斤毛長二尺餘細如絲可以作布恒居火中色洞赤時時出外而色白以水逐而沃之即死織以為布搜神記曰崑崙之墟有炎火之山山中有鳥獸草木皆生長於炎火之中故有火浣布非此山草木之皮枲則其鳥獸之毛也漢世西域舊献此布中間久絶至魏初時人疑其有文無實文帝以為帝火酷烈無含育之氣著之典論明其不然曰不然之事絶智者之聽及明帝立詔三公曰先帝昔著典論不朽之格言其刋石於廟門之外及太學與石經並以為永示後世至此西域使至始獻火浣布焉於是刋㓕此論而天下笑之臣松之昔從征西洛陽歴觀舊物見典論石在太學者尚存而廟外廡之間諸長老云晉初受禪即用魏廟移此石於大學非兩處立也竊謂此言為然王子年拾遺記曰晉大康中有羽山之民獻火浣布其國人稱羽山之上有文石生火煙色似隨四時而見也名為凈火有不潔之衣投於石火之中雖滯汗淄湼如新浣矣當虞舜時其國獻黄布漢末獻赤布梁兾製為衣謂之丹衣而史家云單衣則今縫掖也字異聲同未知孰是又曰方丈山東有龍塲地方千里玉瑶為林或云龍常闘此處膏血如水流著物如淳漆燕昭王二年海人乘霞舟以彫壺盛膏數斗以獻王坐通雲之堂以火浣布為纒用龍膏為燈照耀百里梁四公記曰有商人賚火浣布三端帝以雜布積之令杰公以他事至於市所杰公遙識曰此火浣布也一是積木皮所作一是積䑕毛所作以詰商人具如杰公所說因問木䑕之異公曰木堅毛柔是可别也以陽燧火山隂柘木􅅡之木皮改常試之果驗異物志曰斯調國有火洲在南海中其上有野火春夏自生秋冬自死有木生於其中而不消也枝皮更滑秋冬火死則皆枯瘁其俗常以冬採其毛以為布色小青黑若塵垢汙之便投着火中則更鮮明也紵尚書禹貢曰荆河惟豫州厥貢漆枲絺紵毛詩宛丘東門之池曰東門之池可以漚紵彼美淑姬可與晤語左傳襄六曰季札聘鄭見子産如舊相識與之縞帶子産獻紵衣焉漢書曰賈人不得衣錦繡綺縠絺綌紵􅄢宋書曰戴法興㑹稽山隂人家貧父子以販紵為業華陽國志曰獠人賈言紵為蘭朱崖傳曰朱崖俗行來出入如着布或細紵布巾巾四幅其中内頭如領巾象說苑曰呉赤巾使於智氏假道於衛寗文子具紵絺三百製將以送大夫懇曰呉雖大國也亦不壞交假之道則亦敬矣又何禮焉文子不聽遂致之古樂府曰白紵歌盛稱三好宜及芳時作樂其辭曰白紵質如月輕如雲色如銀製以為袍餘作巾本呉辭也白疊漢書曰其白絮細布千鈞紋綵千疋荅布白疊也皮革千石比千乗之家晉令曰士卒百工不得服越疊呉時外國傳曰諸簿國安子織作白疊花布南史曰髙昌國有草實如繭繭中絲如細􅀈名為白疊子國人取織以為布布甚輭白交用焉呉篤趙書曰石勒建平二年大宛獻珊瑚琉璃􅕰㲪白疊廣志曰白疊布毛織出諸簿洲太平御覽巻八百二十
