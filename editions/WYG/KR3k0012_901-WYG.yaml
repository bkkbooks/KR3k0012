front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_901-1a, image: WYG0901/WYG0901-0055a.png}
body:
  text: 太平御覽卷九百一宋李昉等撰獸部十三驢騾槖駝驢説文曰驢似馬耳長也何承天纂文曰驢一曰漠驪其子曰􅐒史記曰匃奴竒畜驢騾也漢書西域傳曰烏桓國有驢無牛後漢書曰蘇子訓漢末入市投主人家停其驢忽死時夏月蛆從驢口中出主人見之白訓訓曰無苦遂徃驢邊舉杖驢忽走起又曰永平中更用驢輦嵗省億萬計全活徒士數千人又曰戴良字叔鸞其母喜驢鳴常學之以娯樂晉書曰王濟卒將葬時賢無不畢至孫楚雅敬濟而後來哭之甚悲客莫不流涕哭畢向靈牀曰卿嘗好我作驢鳴我為卿作之體似聲真賓客皆笑楚顧曰諸君不死而令王濟死乎世説曰王仲宣好驢鳴既葬魏文帝臨其喪顧語同逰曰王好驢鳴可各作一聲以送之赴客皆作驢鳴呉志曰諸葛恪父瑾長面似驢孫權大㑹羣臣使人牽一驢入長檢其面題曰諸葛子瑜恪跪曰乞請筆益兩字續其下曰之驢舉坐欣笑以驢賜恪晉陽春秋曰晉文帝親阮籍恒與譚戲任其所欲不廹以職事籍嘗言曰平生曾遊東平樂其士風願得為東平太守文帝大悦即従其意籍便騎驢徑到郡至皆壊府舎諸壁障使内外相望然籍教令清政常留十餘日便乘驢去又曰胡威字伯虎父質為荆州威自京都省之家貧無車馬僮僕威自驅驢單行拜見告歸每至客舍自放驢取樵㸑食畢復隨侣而進晉書曰石苞既定夀春以威惠服物淮南監軍王環輕苞素㣲又聞童謡曰官中大馬幾作驢大石壓之不得舒因是宻表苞與呉人交通又曰王導謂諸葛恢曰人言王葛不言葛王恢曰人言驢馬不言馬驢豈驢勝馬也沈約宋書曰後廢帝昱於耀靈殿上養驢數十又曰吏部尚書庾仲文荀萬秋嘗詣仲文逢一客姓夏侯主人問有好牛不言無問有好馬不又言無止有佳驢耳仲文答云甚是所欲客出門遂與相聞索之齊書曰劉祥􅀶才傲物嘗謂一驢曰汝努力如汝人才俱為令僕矣又曰謝超宗為人仗才使酒齊髙帝問以北方事超宗對失儀出為南郡王中軍司馬人或問曰聞有朝命定是何府答曰不知是司馬為復是司驢既是驢府王應是司驢為有司所奏以怨望免後魏書曰元恒傲狼兇虐安豊王延明每切責之曰昔宋有東海王禕志性凡劣人號曰驢王我熟觀汝所作亦恐不免驢當時聞者號為驢王三國典畧曰東魏静帝遷都鄴尚書郎已下盡令乘驢又曰齊蕭慤為太子洗馬慤字仁祖常患腰痛眩不堪馳馬齊主令乘驢以従見者笑之北史曰公孫軌拜尚書賜爵郡公出為武牢鎮將初太武將北征發驢以運粮使軌部調雍州令驢主皆加絹一百疋乃與受之百姓語曰驢無若負絹自壯衆共􅅓之又曰後魏車駕徃征蠕蠕司馬楚之與齊隂公盧中山等督運以繼大軍時鎮北將軍封沓亡入蠕蠕説令繫之以絶運蠕蠕乃潛遣覘楚之軍截驢耳而去有告失驢耳者楚之曰必覘賊截之為騐耳賊將至矣乃伐栁為城水灌令凍城立而賊至不可攻逼乃走散太武聞而嘉之唐書曰郭英鎮劒南娶女人令乘驢繫毬以寶鈿為驢鞍賞賜巨萬以為笑樂風俗通曰靈帝於宫中西園駕四白驢射自操轡驅馳周旋以為大樂於是公卿貴戚轉相倣至乘軿以為騎従價與馬齊又曰凡人相罵曰死驢醜惡之稱也董卓陵虐王室執政皆如死驢漢志曰靈帝駕四驢親自操轡驢者服重致逺上下山谷野人之所用耳何有帝王君子而驂駕之乎天意若曰國且亂賢愚倒置凡執政者皆如驢焉金樓子云漢靈帝養驢數百頭常自騎之馳驅遍京師有時駕四驢入市管子曰有驢仙者享五百嵗負乘而不輟厯無定主大驛於天下世説曰孝武帝未嘗見驢謝太𫝊問陛下遥想其形當何所似孝武掩口而笑答曰頭當似猪續搜神記曰石虎中有一胡道人知咒術乘驢作估客於外國深山中行下有絶澗窅然無底忽有惡鬼偷牽此道人驢下入絶澗道人尋跡咒誓呼諸鬼王須臾即驢物如故國朝傳記曰武后初稱周恐下心不安乃令人自舉供奉官正員外多置裏行拾遺補闕御史至有車載斗量之詠有御史臺令史將入室值裏行御史數人聚立門外令史不下驢衝過其間諸御史大怒将杖之令史云今日之過實在此驢乞先數之然後受罰御史遂許之謂驢曰汝技藝可知精神極鈍何物驢畜敢於御史裏行於是羞赭而止楚辭九懐曰驥垂兩耳中坂蹉跎蹇驢服駕無用日多又曰駕蹇驢而無策又何路之能極臧彦弔驢文曰爰有竒人西州之馳驅者體質強直禀性沈難聰敏寛詳髙音逺暢真驢氏之名駒也宋袁淑俳諧文驢山公九錫曰若乃三軍陸遇粮運艱難謀臣停算武夫吟歎爾乃長鳴上黨忼慨應官﨑嶇千里荷囊致飱用棲大勲力世不刋斯實爾之功也音隨時興晨夜不黙仰契𤣥像俯叶漏刻應更長鳴毫分不却雖挈壺著稱未足比德斯復爾之智也若乃六合昏晦三辰幽㝠猶憶天時用不應聲斯爾之鳴也青脊絳身長頰廣額脩尾後垂巨耳雙礫斯又爾之形也嘉麥既熟實須精麵負磨迴衡迅若轉電惠我衆庶神祇獲薦斯又爾之能也爾有濟師旅之勲而加之以衆能是用遣中大夫廬丘加廬使銜勒大鴻臚班脚大將軍宮亭侯以揚州之廬江江州之廬陵吳國之桐廬泠浦之朱廬封爾為中驢公騾廣志云騾北方或曰罔説文曰騾驢父焉母也崔豹古今注曰驢為牡馬為牝即生騾馬為牡驢為牝即生騰􅀢史記曰大將軍衞青圍匈奴薄暮乘六騾壮騎可數百冐圍去追之不及漢書曰髙昌性難伏乃作歌曰驢非驢馬非馬言髙昌似騾也三國典畧曰齊楊浦之嘗乘騾逰於公卿畧無慚色又曰侯莫陳悦既敗其子弟及麾下數十騎遁走至牽屯山不知所趣乃棄馬山谷乘騾而去唐書曰呉元濟叛其將有董重質者守洄與其部下乘騾即戰號騾子都最為勁悍官軍恒警備之吕氏春秋曰趙簡子有兩白騾而甚愛之陽城胥渠處廣門之官夜欵門而謁曰主君之臣胥有疾醫教之曰得白騾肝病則止不得則死謁者入通董安于御側愠曰嘻胥渠也欺君請即刑焉簡子曰夫殺人以活畜不亦不仁乎殺畜以活人不亦仁乎於是召庖人殺白騾取其肝以與陽城胥渠無幾何趙興兵而攻翟廣門之左七百人右七百人皆先登而獲甲首人主胡可以不好士抱朴子曰世不信騾乃驢馬所生云各自有種况乎仙者難知之事哉魯女生别傳曰李少君死後百餘日後人有見少君在河東蒲坂乘青騾帝聞之發棺無所有洞𡨕記曰脩彌國多神馬騾驢高十丈毛色皎然能行水上有兩翼或飛於海上常與牝馬合則生神驢又曰元封四年修彌國獻駮騾髙一丈毛色皆斑赤旋成日月之象常以金寳物器盛蒭以飼之置於黄門廐東方朔曰此六畜之下者無為深愛昔夏侯淫于原獸以亡其國况戎翟獻其鄙獸費財毁德非所以示天下也楚荘好馬叔敖知其失政願陛下省物全國家之機事騾鄙獸宜置之於負乘不用則棄之於野上乃放之後野人見有赤蛇自天屬地有雲氣來繞地及雲徐地復變為赤龍騎之入雲有人來告上曰滑稽兒使我失龍矣朔曰龍何難值恐陛下費金寳終化為騾驢耳帝納其言而深忌之呉厯曰朱據討查中獲驢騾二千餘頭晉書曰乘傳使者賣官出使遭周親喪以上皆上表聞聼得白服乘騾車晉諸公讚曰劉禪降乘騾車詣鄧艾神仙傳曰蒯子訓齊人也到京師諸貴人欲見之子訓曰我非有重瞳八采欲見我我亦無所道遂去諸貴人皆逐之問人云適去東陌上乘騾者乃各走馬逐之望見子訓騾徐行而名馬逐之不及乃各罷歸槖駝淮南子曰槖駝之本出泉渠廣志曰天竺以北多槖駝山海經曰號山陽之光山獸多槖駝善行流沙中日三百里負千斤史記匈奴傳曰其竒畜則槖駞又曰蘇秦傳曰蘇秦説楚威王曰大王誠能用臣之愚計則燕代槖駝良馬必實外廐漢書西域傳曰鄯善國多槖駝東觀漢記曰河官太守竇融遣使獻槖駝南單于上書獻槖駝單于嵗祭三龍祠走馬鬭槖駝以為樂事華嶠後漢書曰南單于遣使詣闕奉蕃稱臣入居於雲中遣使獻槖駝南史四夷傳曰滑國有兩脚槖駞及野驢有角皆善負重而行後魏書曰髙祖不飲洛水常以千里足名駞更牙向恒州取水以供贍焉後周書四夷傳曰西北有流沙數百里夏日多熱風為行旅之患其風欲至唯老駞知之即預鳴而聚立埋其口於沙中人以為候以氊擁其鼻口其風迅速須臾即過不爾則至危斃鹽鐵論曰齊陶之縑南漢之布中國以一端之縵得匈奴累金之物是以驘驢馲駞銜尾入塞博物志曰燉煌西度流沙千餘里中無水時時伏流處人不能知乗駱駞駞知水脉遇其處輙停不肯行以足蹋地人於蹋處掘之輙得水外國曰大秦國人長一丈五尺猿臂長脇好騎駱駞洛中記曰有銅駞二枚在宫之南四㑹道髙九尺號銅駱駝陸翽鄴中記曰二銅駝如馬形長一丈髙一丈足如牛尾長二尺脊如馬鞍在中陽門外夾道相向異苑曰西域苟夷國山上有石駱駝腹下出水以金鐵及手承取即便對過瓠蘆盛之則得飲之者令身體香淨而昇仙其國神秘不可數遇楚辭曰鼃黽遊乎華池騕褭奔亡勝駕槖駝腰褭駿馬郭璞山海經圖槖駝讚曰駞惟竒畜肉鞍是被迅騖流沙顯功絶地潛識泉源㣲乎其智太平御覽卷九百一
