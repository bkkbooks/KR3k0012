body:
  text: 太平御覽卷一百十九宋李昉等撰偏霸部三敘偏覇前趙劉淵劉聰劉曜敘偏覇晉書載記叙曰劉元海以惠帝永興元年據離石稱後漢九年石勒據襄國稱趙張氏先據河西是嵗自石勒後三十六年也重華自稱凉王後一年冉閔據鄴稱魏後一年苻健據長安稱秦慕容氏先據遼東稱燕是嵗自苻健後一年也儁始僣號後三十一年後燕慕容垂據鄴後二年西燕慕容冲據阿房是嵗也乞伏國仁據枹罕稱秦後一年慕容永據上黨是嵗也吕光據姑臧稱凉後十二年慕容徳據滑臺稱南燕是嵗也秃髮烏孤據㢘川稱南凉段業據張掖稱北凉後三年李𤣥盛據燉煌稱西凉後一年沮渠䝉遜殺段業自稱後凉四年譙縱據蜀稱成都王後二年赫連勃勃據朔方稱大夏後二年馮跋殺離班據和龍稱北燕提封天下十喪其八莫不龍旌帝服建社開枋華夷咸暨人物斯在或簒通都之鄉或擁數州之地雄圗内卷師旅外并窮兵凶於勝負盡人命於鋒鏑其為戰國者一百三十六載抑元海為之禍首云劉淵崔鴻十六國春秋前趙録曰劉淵字元海新興匈奴人先夏后氏之苖裔曰淳維世居北狄千有餘嵗至冐頓襲破東胡西走月氐服丁零内侵燕代控弦四十萬漢祖患之使劉敬奉公主以妻冐頓約為兄弟故子孫遂冐姓為劉氏建武初入居西河美稷後漢中平中單于羗渠使子於扶羅將兵助漢討平黄巾㑹羌渠為國人所殺於扶羅以其衆留漢自立為單于屬董卓之亂㓂掠太原河東屯於河内於扶羅死弟呼厨泉立以於扶羅子豹為左賢王即元海之父也魏武分其衆為五部以賢王豹為左部帥其餘部帥皆以劉氏為之太康中改置都尉雖分屬五部皆家于晉陽汾澗之濵豹妻呼延氏魏嘉平中祈子於龍門有一白魚頂有一角軒鬐躍鱗而至祭所久之乃去巫覡皆異之曰此嘉祥也其夜夢所見魚變為人左手把一物大如雞子光景非常授呼延氏曰此是日精服之生貴子寤以告豹豹曰吉徴也自是十五月而生淵淵生左手有文曰淵海遂以為名㓜而好學不舍晝夜常謂同門生朱紀范隆等曰吾每觀書傳常鄙隨陸無武綘灌無文一物之不知固君子恥之也二生遇髙皇不能建封侯之業兩公屬文帝不能開庠序之美惜哉於是文學武事並皆工絶猨臂善射膂力過人身八尺四寸鬚長三尺許當心有赤毫毛三根長三尺六寸太原王渾虛襟友之命子濟拜焉咸熈中為任子在洛陽晉文帝深待之時東莱王彌等皆憑結渾又屢言之晉帝帝召見與言大恱之後謂王濟曰劉元海容貌風儀機談鑒智雖漢金日磾無以加也㑹父豹卒帝以淵代為左部帥轉寧朔将軍監五部軍事太安中惠帝失政諸王迭相殘廢州郡奸豪所在蜂起從祖北部都尉左賢王劉宣等議曰今司馬氏骨肉相殘興復此時矣左賢王淵姿器絶人幹宇超世天若不恢崇單于終不虛生此人也於是共推劉淵為大單于劉淵曰當為崇岡峻阜何能為培塿乎夫帝王豈有常哉大禹生於西戎文王生於東夷顧惟徳所授耳今見衆十餘萬皆一當晉十皷行摧亂晉猶拉枯耳上可成漢髙之業下不失為魏武何呼韓邪足道哉宣等稱善元熈元年遷於左國城晉人東附者數萬宣等上尊號淵曰今晉氏猶在四方未定可仰尊髙祖法且稱漢王權停皇帝之號待宇宙混一當更議之十月為壇南郊即漢王位晉改永興元年為元熈元年大赦天下尊蜀後主為孝懐皇帝立髙祖以下三宗五祖之神主而祭之置百官以劉宣為丞相拜授各有差時東萊王彌起兵青徐二州遣使来降拜鎮東大將軍青州刺史東莱郡公四月汲桑叛自稱趙王選置州郡十一月石勒及胡部等帥衆来降永鳯元年七月鳯凰集于蒲子丞相劉宣等六十四人上尊號十月僣即皇帝位于南郊大赦改元以世子和為大將軍撫軍搃為車騎大將軍將軍曜為龍驤大將軍和瑞元年遷都平陽汾水得玉璽大赦改元二年以大司馬梁王和為皇太子八月淵寢疾以劉洋為太尉延年為太宰司徒總為大司馬大單于並録尚書事置單于䑓于平陽薨于光極殿太子和即位聰自西明門入斬和于西室九月葬淵于永光陵諡曰光文皇帝廟號髙祖劉聰崔鴻十六國春秋前趙録曰劉聰字𤣥明一名載淵第四子母張夫人之孕夢日入懐寤而告淵淵曰吉徴也自是十五月而生聰夜有日光之異左耳有一白毫長二尺餘㓜而聰悟究通經書百家之言孫呉兵法靡不誦之猨臂善射彎弓三百斤膂力驍捷冠絶一時永嘉四年僣即帝位于光極前殿大赦改元光興元年以衞尉呼延宴為使持節前鋒大都督配禁兵二萬七千自宜陽入洛川命東莱王彌劉曜及鎮軍石勒進軍㑹之晏進河南趙師前後十二敗晉師長驅圍洛陽䧟之聰兵大掠幽晉帝于端門殺晉太子及百官已下三萬餘人於洛水北築為京觀遷帝及太后侍中庾珉等于平陽大赦改元嘉平元年二月内晉帝進號儀同三司㑹稽郡公聰引帝入讌謂曰卿為豫章王時朕曾與王武子相造武子示朕於卿卿言聞其名久矣以卿所作樂府歌文示朕謂朕曰聞君善為辭賦試為看之朕時與武子俱為盛德頌卿稱善久之又引朕射于皇堂朕得十二籌卿與武子俱得九籌卿贈朕柘弓銀硯頗憶否帝曰臣安敢忘之但恨爾日不早識龍顔耳聰曰卿家骨肉相殘何其甚也帝曰此殆非人事皇天之意也大漢將應乾受厯故為陛下自相驅除耳且臣家若能奉武皇之業九族敦睦陛下何由得之三年春正月宴於光極前殿逼晉帝行酒庾珉王雋等起而大哭聰惡之二月丁未懐帝崩于平陽於是誅珉等三月立貴嬪劉氏為皇后四月愍帝即位於長安車騎曜等攻長安河東地震雨于平陽建元元年正月黑霧四塞著人如墨五日而止辛未日隕于地又三日相承出於西方東行平陽地震崇明觀䧟為池水赤如血赤氣至天有赤龍奮迅而去流星起於牽牛入紫微龍形逶迤其光照地落于平陽北十里視之則肉臭聞于平陽長三十步廣二十七步肉旁常有哭聲晝夜不止聰甚惡之癸未劉后産一蛇一虎各害人而走尋之不得頃之見在隕肉之旁己丑劉氏卒乃失此肉哭聲亦止十一月以晉王粲為國相大單于搃百揆十二月宣光陵石人皆行數步宫中鬼哭聲武庫䧟入地一丈五尺聰自去冬至是遂不復受朝賀軍國之事一决於粲立市於後庭與宫人宴戲或三日不醒秋七月河東大蝗唯不食粟豆司𨽻靳準率部民收而埋之哭聲聞於十餘里後乃鑚土飛出復食黍豆大司馬曜攻䧟長安外城九月犬與豕交于宫門有豕著進賢冠昇聰御坐大冠武冠帶綬與豕並昇俄而鬬死殿上宿衞莫有見其入者長安饑甚死者過半麴允為粥以供帝膳帝泣曰今窘厄如此外無救援勢不自知乃使侍中宋敞奉牋降曜敞隨使者至帝肉袒牽羊輿櫬銜璧出降東門曜受璧焚櫬遷愍帝及司徒梁汾驃騎麴允等諸臣百餘人至于平陽聰臨光極殿帝稽顙與麴允伏地大哭扶不能起聰大怒允自殺以帝為光禄大夫懐安侯以大司馬曜假黄鉞大都督陜西諸軍事太宰秦王二年正月東平王約卒十一月聰校獵上林以晉帝行車駕大將軍戎服執㦸前導行三驅之禮觀者皆指帝曰此故長安天子聚而觀之故老亦有悲泣者十二月大饗于光極前殿聰欲觀晉臣之意使帝行酒洗爵更衣使帝執蓋多有涕泣或有失聲者尚書郎辛賔起而抱帝大哭引出斬之戊戌愍帝崩於平陽三年聰所居螽斯則百堂灾焚其子㑹稽王康以下二十一人聰聞自投于牀下自此鬼哭宫中至于九月夜聲不絶四月尚書令王監崔懿之等極諫聰大怒收監等殺之秋七月鬼哭于光極殿聰晝見東平王約甚惡之徴秦王曜為丞相錄尚書事固辭仍以丞相領雍州牧靳準為大司空領司𨽻校尉癸亥薨于建始殿甲子粲即位大赦改元漢昌葬宣光陵諡曰武皇帝廟號烈宗八月以丞相曜為相國大都督司空靳準為大將軍領尚書事粲荒躭酒色遊宴後庭軍國之事一决於準準遂勒兵入宫執粲數而殺之追諡靈帝劉氏無少長男子盡刑于市發掘二陵焚燒宗廟鬼大哭聲聞百里準自號漢大王置百官遣使稱藩于晉相國曜自長安赴難前趙錄曰永嘉元年十二月大將軍東平王約卒一指猶煖遂不殯殮至甲戌乃蘇言見淵於不周山經五日遂復從至崑崙山三日而復反於不周見諸王公卿將相死者悉在大有人民宫室壯麗號曰蒙誅離國淵謂約曰東北遮須夷國無主久待汝父為之汝後二年當来後國中大亂相殺害吾家死亡畧盡但可永明軰數十人在耳汝且還後年當來見汝不久約拜辭而歸道過一國曰猗尼渠餘國引約入宫與約皮囊一枚曰為吾遺漢皇帝約辭而歸謂約曰劉郎後年来必見過當以女相妻約歸置皮囊於桁上俄而蘇謂左右曰桁上取囊来左右取得開之有方白玉題文曰猗尼渠餘國天王敬信遮湏夷國天王嵗在攝提當相見馳使奏呈聰曰若審如此吾不懼死也及聰以戊寅嵗薨與此玉并葬焉劉曜崔鴻十六國春秋前趙錄曰劉曜字永明淵之族子少孤見養於淵幼而聰慧性拓落髙亮雄武過人鉄厚一寸射而洞之身長九尺三寸手垂過膝生而眉白目有赤光鬚不過百餘根皆長三尺光初元年十月太保呼延宴等自平陽来奔上尊號於曜僣即皇帝位十二月靳準左右軍騎喬泰王騰等殺準奉六璽来降二年夏四月徙都長安立子熙為皇太子六月繕宗廟社稷南北郊于長安令曰葢聞王者之興必禘始祖我皇家之先出自夏后居于北夷世跨燕朔光文以漢有天下嵗久恩徳結于庶民故立漢祖宗之廟以懐民望昭武因循遂未悛革今欲除宗廟改國號御以大單于為太祖其議以聞於是太保呼延宴等議曰今宜承晉母子傳號以光文本封盧奴中之屬城陛下勲功茂於平洛終於中山中山分野屬大梁趙也宜革稱大趙遵以永行曜從之於是以冐頓配天淵配上帝三年五月西明門内大樹風吹折經一宿樹忽然變為人形髪長一尺鬚眉三寸皆黄白色有歛手之狀亦有兩脚著履之形唯無目鼻每夜有聲十日而生柯條遂為大樹枝葉甚茂四年將於霸陵西南營壽陵侍中喬豫和苞上疏諫曰伏聞敕㫖將營建壽陵将周圍四十里下深二十五丈以銅為棺椁黄金節之臣聞堯葬榖林市不改肆顓頊葬髙陽下不及泉聖王之於終也如是秦始皇下錮三泉周輪七里身亡之後毁不旋踵闇王之於終也如此從喪亂以来漢帝諸陵咸見踐辱唯霸陵獨全此雖太宗之達致然抑亦釋之之功興亡奢儉烱然於前唯陛下覽之曜大恱終南山崩所得白玉之尺有字曰皇王皇王敗趙昌以為己瑞羣臣咸賀中書監劉均曰山崩石壊國傾民亂皇王皇王敗趙昌者此言皇室將為趙所敗趙因之而昌大趙都於秦雍而勒跨全趙趙昌之應當在石勒不在我也曜憮然改容五年曜后羊氏卒故晉惠后也洛陽之䧟納之六年正月天裂廣一丈餘長五十丈十一年七月石虎率衆四萬人㓂擾河東進蒲坂曜選中外精銳自潼關北濟虎懼引師而還曜追而敗之枕尸一百餘里虎奔朝歌遂攻石生於金墉分遣諸將攻討汲郡河内十二月勒自帥衆拒之陣於洛西曜性少􅒬酒末年尤甚將戰飲數斗常乗赤馬無故蹋頓乃乗小馬北出復飲斗餘至西陽門撝陣就平勒將石堪因而乗之師遂大潰曜昏醉奔退而馬䧟石渠墜於冰上為堪所執勒將還襄國喻曜使與太子毗書令速降曜但勅毗與諸臣匡維社稷勿以吾易意建平末為勒所殺十二年正月太子毗大司馬南陽王𦙍等議欲西保秦州遂相率奔上邽石虎乗勝追戰枕尸千里上邽潰虎執毗及王公已下三千餘人皆殺之自劉淵建號西河至是二十有六載晉書載記曰曜在位十年而敗始元海以懐帝永嘉四年僣立至曜三世凡二十有七載以成帝咸和四年滅太平御覽卷一百十九
