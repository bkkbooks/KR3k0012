body:
  text: 太平御覽卷四百九十一宋李昉等撰人事部一百三十二慙愧尚書仲虺之誥曰成湯放桀於南巢惟有慙德又曰五子之歌曰萬姓仇予予将疇依鬱陶乎予心顔厚有忸怩鬱陶言哀思也顔厚色愧忸怩心慙也慙愧於仁人賢士也左傳曰吳公子札請觀周樂見舞韶濩者殷湯樂也曰聖人之𢎞也而猶有慙色聖人之難也家語曰孔子適衛顔刻衛靈公夫人南子同車出而令宦者雍渠驂乗使孔子次車遊過市孔子恥之顔刻曰夫子何恥子曰詩云覯爾新婚以慰我心乃嘆曰吾未見好德如好色者也漢書曰項羽至烏江亭長艤船待羽應劭曰止也孟康曰艤音蟻附船着岸如淳曰南方謂整舡向岸曰艤謂羽曰江東雖小地方千里衆數十萬亦足王也願大王急渡今臣有船漢軍至亡以渡羽歎曰廼天亡我何渡為且籍與江東子弟八千人渡江而西今亡一人還縱江東父兄憐而王我我何面目見之哉縱彼不言籍獨不愧於心乎又曰文帝常病癰鄧通為上嗽吮之上不樂從容問曰天下誰最愛我者乎通曰莫若太子大子入問疾上使太子齰癰而難之已而聞通甞為上齰之太子慙由是心恨通又曰直不疑南陽人也為即事文帝其同舍有告歸誤持其同舍郎金去已而同舍郎覺亡金意不疑不疑曰有之買金償後告歸者至而歸金亡金郎大慙又曰朱買臣字翁子㑹稽人家貧好讀書不治産業常刈薪樵負戴相隨婦數止買臣無歌謳道中買臣逾益疾歌妻羞之求去又曰建始三年秋京師民無故相驚言大水至百姓奔走相蹂􅏳韋昭曰蹂踐􅏳轢也老弱號呼長安中大亂天子親御前殿召公卿議大將軍鳯以為太后與上及後宫可御舟船令吏民上長安城以避水羣臣皆從鳯議左将軍王商獨曰自古無道之國水猶不冒城郭今政治和平世無兵革上下相安何因當有大水一日暴至此必訛言也不宜令上城重驚百姓上乃止有頃長安中稍定問之果訛言上於是美壯商之固守數稱其議而鳯大慙自恨失言東觀漢記曰王郎起上在薊郎移購上令王覇至市中募人将以擊郎市人皆大笑舉手揶揄之覇慙而去又曰汝南薛苞字孟嘗喪母以至孝聞父娶後妻而憎苞分出日夜號泣不能去至被毆杖不得已廬於舍外旦入而洒掃父怒又逐之乃廬於里門晨昏不廢積嵗餘父母慙而還之又曰王丹字仲固京兆人也時河南太守同郡陳遵闗西之大俠也其友人䘮親遵為䕶喪事賻助甚厚丹乃懐縑一疋陳之於主人前曰如丹此縑出自機杼遵聞而有慙色又曰樊重外孫何氏兄弟争財重恥之以田二頃解其忿訟縣中稱美推為三老年八十餘臨終其素所假貸人間數百萬遺令焚削文契債家聞者皆慙爭徃償之諸子從勑竟不肯受又曰魏覇字延年仕為光祿大夫覇妻死兄伯為覇取妻送至官舍覇笑曰年老兒子備具矣何空養他家女為即自入辭其妻奉案前因跪曰夫人視老夫復何中而遂失計義不敢屈即拜而出妻慙求去又曰卓茂為丞相史甞出道中人有認茂馬者茂問亡馬幾時乎曰月餘矣茂自知畜馬數年解馬與之挽車而去數日馬主自得其馬慙愧詣府叩頭謝歸馬又曰淳于恭字孟孫北海人以謙儉雅讓為節家有山田橡樹有盗取之恭助為收拾載之以歸乃知其所盗載橡還之恭不受人有盗刈恭禾者恭見之念其愧自伏草中至去乃起謝承後漢書曰梁兾奏誅李固固臨命與胡廣趙戒書曰梁氏迷謬公等曲從以吉為凶成事為敗漢家衰微從此始矣公等受主厚祿傾覆大事後之良史豈有所私固身已矣於義得矣夫復何言廣戒得書悲慙皆長歎袁山松後漢書曰皇甫嵩字義安定朝郍人善用兵飲食舍止必先将士然後乃安兵曹有受賂者嵩曰公素㢘清必資用乏乃出錢賜之吏羞慙而自殺由是衆皆樂為致死魏志曰曹仁攻吳蜀於樊于禁助之秋大霖雨漢水溢禁等七軍没禁遂降吳文帝踐祚權遣禁還引見禁髪皓白形容憔悴欲遣使吳先令謁髙陵帝豫於陵圖畵禁降服之狀禁見慙恚病薨又曰陳矯為尚書令明帝即位車駕常卒至尚書省矯跪問曰陛下欲何之帝曰欲案行文書耳矯曰此自臣職分非陛下所宜臨也若臣不稱其職則請就黜退陛下宜還帝慙廻車而返晉書曰朱冲字巨容南安人也少有志行閒靜寡欲好學而貧常以耕蓺為事隣人失犢乃認冲犢以歸後得犢於樹下大慙以犢還冲又曰王羲之傳時劉琰之為丹陽尹許詢常就琰之宿牀帷新麗飲食豐甘詢曰若此保全殊勝東山劉曰卿若知吉凶由人吾安得保此羲之在坐曰令巢許遇稷契當必無言二人並有愧色又曰嵇紹常詣齊王冏咨事遇冏燕㑹召董艾葛旟等共論時政艾言於冏曰嵇侍中善於絲竹公可令操之左右進琴紹推不受冏曰今日為歡卿何吝此耶紹對曰公匡復社稷當軌物作則垂之於後紹虛鄙忝備常伯腰紱冠冕鳴玊殿省豈有操執絲竹以為伶人之事若釋公服從私宴所不敢辭也冏大慙又曰庾亮傳初亮所乗馬有的顱殷浩以為不利於主勸亮賣之亮曰曷有己之不安而移之於人浩慙而退又曰王羲之傳素與王述不協先是王羲之甞謂賔友曰懐祖正當作尚書耳投老可得僕射更求㑹稽便自邈然及述䝉顯授羲之耻為其下遣使詣朝廷求分㑹稽為越州行人失辭大為時賢所笑既而内懐愧歎謂其諸子曰吾不减懐祖而位遇懸邈當由汝等不及坦之晉中興書曰王恭甞宴於司馬道子室尚書謝石為吳歌恭曰居端右之重集宰相之座而放妖俗之音乎並有慙色又曰熒惑守南斗經旬王導謂陶回曰南斗揚州分為熒惑守之吾當遜位以厭此謫回荅曰公以明德作相輔弼聖主宜親忠貞逺邪佞而與桓景造􅂰熒惑何由退舍導深愧之宋書曰王惠陳羣謝瞻才辯有風氣甞與兄弟羣從造惠談論鋒起文史間發惠時相酬應言清理逺瞻等慙而退又曰謝晦為荆州都督甚有自矜之色将之鎮詣從叔光祿大夫瞻别問晦年答曰三十五瞻笑曰昔荀中郎年二十七為北府都督卿比之已為老矣晦有慙色又曰何尚之在家常着鹿皮㡌及拜開府天子臨軒百僚陪位沈慶之於殿廷戱之曰今何不著鹿皮冠慶之累辭爵命朝廷敦勸甚切尚之謂曰主上虛懐側席詎宜固辭慶之曰沈公不效何公去而復還也尚之有愧色又曰顧凱之為尚書吏部郎甞於太祖坐論江左人品顧榮袁淑謂凱之曰卿南人性怯懦豈作賊凱之正色曰卿反以忠義笑人淑有慙色唐書婁師德初狄仁傑未為宰相時師德甞薦之及為宰相不知師德薦己數排師德合充外使則天甞出師德書表示之仁傑大慙謂人曰吾為婁公所含如此方知不逮婁公逺矣晏子春秋曰景公置酒太山之陽酒酣公四望喟然歎泣數行曰寡人將去此堂堂國死耶左右泣者三人曰吾細人也猶将難死而况公乎晏子搏髀仰天而大笑曰樂哉今日之飲也公怒曰子何笑也對曰怯君一諛臣三是以大笑公慙而更辭吳越春秋曰季札去徐而歸行道逢男子五月被裘採薪於道傍有委金一器季札見之忽不入意顧謂薪者曰來取此金薪者曰君舉止何髙視何下也五月被裘採薪寧是拾金者乎札慚於斯言下車禮之曰何子衣之鄙而言之正也子姓為何薪者曰君皮相之士何足以告姓字乎季札有慙色又曰吳師入郢闔閭既妻昭王夫人又及於伯嬴伯嬴秦康公之女平王之夫人昭王之母也伯嬴操刅曰妾聞天子天下之表也公侯一國之儀也天子失制則天下亂諸侯失節則國危今夫婦之道固人倫之始王教之端也令吾棄儀表之行從亂亡之欲犯誅絶之事何以行訓民乎妾聞生以辱者不如死以榮者使吳王棄儀表則無以生存一舉而兩儀辱妾以死守之不敢聞命也且凡欲近妾者為樂也近妾而死何樂之有先殺妾又何益於君王於是吳王慙耻遂退還舍博物志曰宋國有田夫謂其妻曰負日之暄人莫知者以獻吾君将有重賞里之富室告之曰昔人有美茙菽甘枲莖芹子者對卿豪稱之郷豪取而甞之澁於口懆於腹衆哂而怨之其人大慙而止列女傳曰河南羊子妻不知何氏女羊子甞行路得遺金一餅還以與妻妻曰妾聞志士不飲盗泉之水亷者不受嗟來之食况拾遺求利以汙其行乎羊子大慙鄭𤣥傳曰𤣥在袁紹坐汝南應劭因自贊曰故太山太守應仲逺北面稱弟子何如𤣥笑曰仲尼之門考以四科回賜之徒不稱官閥劭有慙色江表傳曰孫權既即尊位請㑹百官歸功周瑜張昭舉笏欲褒讚功德未及言權曰如公計今已乞食矣昭大慙伏地流汗㑹稽典録曰邵員字徳方餘姚人與同縣虞俊鄰居員先不知俊十餘年俊至吳與張温朱㨿等㑹清談干雲温等敬服於是吳中盛為俊談員聞而愧曰吾與仲明遊居此屋曽不能甄其英秀播其風烈而令他邦稱我之傑又曰鄭𢎞守陽羡郡郷民有弟用兄錢者為嫂所責未還之嫂詣𢎞𢎞為叔還錢兄聞之慙愧自繋於獄遂遣其婦賫錢還𢎞𢎞不受也又曰沈勲身自耕耘以供衣食人有盗獲其禾勲見而避之明日更収拾送致其盗者愧懼賫還不受又曰陳囂與明紀伯為鄰伯夜竊囂蕃地自益囂見之伺伯去後宻拔其蕃一丈以益伯伯覺之慙懼既還所侵又却一丈桓子新論曰昔宣帝時公卿大夫朝㑹庭中丞相語次言聞梟生子子長食其母乃能飛寧然耶有德賢者應曰但聞烏子反哺耳丞相太尉自悔其言之非也羣士皆少丞相而多彼賢人之言有益於德化是故君子掩惡揚善鳥獸尚為之諱而况於人乎風俗通曰陳國有張伯階弟仲階婦炊竈下至井上謂伯階我今日粧寧好否曰我伯階婦大慙愧其夕時伯階到更衣婦復逐牽其臂曰今且大誤謂伯階卿答曰故伯階語林曰明帝函封與王公開詔末云勿使冶城公知既視表答曰伏讀明詔似不在臣臣開臣閉無有見者明帝甚愧數月不欲見王公孔叢子曰陳勝既立為王其妻之父兄徃焉勝以衆賔待之長揖不拜無加禮其妻之父怒曰怙亂僭號而傲長者不能久矣不辭而去陳王跪送不顧王心慙焉吳王春秋曰管仲病桓公問惡乎屬國管仲曰使隰朋可盡逐易牙竪刁等管仲死盡逐之而食不甘宫不治朝不肅三年公皆召而返之公病常之巫從中出曰公将以某日薨易牙竪刁相與作亂塞宫門築髙墻不通人有婦人踰垣入而至公所公曰我欲食婦人曰吾無所得曰何對曰常之巫相與作亂塞宫門築髙墻不通人故無所得公慨然出涕曰嗟乎聖人所見豈不逺哉死者有知我将何面目見仲父乎䝉衣袂而絶乎燾宫太平御覽卷四百九十一
