body:
  text: 太平御覽卷八百五十三宋李昉等撰飲食部十一􅦑饊麴糵麩􅦑方言曰􅦑謂之䭉以豆屑雜餳也蒼頡解詁曰􅦑飴中著豆屑也説文曰􅦑豆飴也饊廣雅曰浮􅦴􅀈也􅦴音流説文曰饊熬慆張饘也急就篇曰飴餳盧諶祭法曰四時皆用饊麴糵書曰若作酒醴爾惟麴糵禮記曰仲冬之月乃命有司秫稻必齊麴糵必時左𫝊曰楚子伐蕭還無社與司馬卯言號申叔展還無社蕭人也司馬卯申叔展皆楚大夫叔展曰有麥麴乎曰無麥麴所以御濕也有山麴藭乎曰無方言曰􅀈音器䴭音才䴳子八切麰音牟大麥麴也䴽音卑細麵麴也䵆音䝉有衣麴䴹麴小麥為麯䴹即麴耳自闗而西秦豳之間曰􅀈晋之舊都曰䴭今河東人呼麴為䴭齊右河濟曰䴳北燕曰䴽麴其通語也説文曰麴酒母也䤓生衣也䤁熟麴也糵芽米也通俗文曰􅀈麥麴曰䴳釋名曰麴朽也欝之使生衣朽敗也糵缺也漬麥覆之使生牙開缺也史記曰文帝遺匈奴秫糵又曰通都大邑糵麴鹽豉千答東觀漢記曰順帝詔禁民毋得酤賣酒麴漢晋陽春秋曰愍帝在長安為劉粲所攻糧盡太倉有麴數十餅屑之為粥以供奉帝麯屑盡遂降列子曰子産有兄公孫朝聚酒千鍾積麴成封劉伶酒徳頌曰枕麴藉糟崔寔四民月令曰七月七日作麴麩蒼頡解詁曰麵細麩也説文曰麩小麥皮屑也史記曰陳平為人長大美色或謂陳平貧何食而肥若是其嫂疾平之不事家産曰亦食糠覈呉書曰袁術既為雷薄茅所距留住三日士衆絶糧乃還至江亭去夀春八十里問厨下尚有麥屑三十斛劉謙之晉記曰王莾誅童謡曰昔年食麥屑今年食䝁豆䝁豆不可食使我枯嚨喉崔寔四民月令曰五月五日至後可以糴麩至冬以養馬太平御覽卷八百五十三
