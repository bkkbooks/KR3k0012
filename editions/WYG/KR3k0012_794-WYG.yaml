body:
  text: 太平御覽卷七百九十四宋李昉等撰四夷部十五西戎三羌無戈湟中月氐胡氐車師髙昌吐谷渾波斯羌無戈後漢書曰羗無戈爰劒者秦厲公時為秦所拘執以爲奴不知爰劒何戎之别也後得亡歸而秦人追之急藏扵岩宂中得免羗人云爰劒初藏宂中秦人焚之有影象如虎為其蔽火得以免死既出又與劓女遇扵野遂成夫婦女耻其状被髪覆面羗人因以為俗遂俱亡入三河間諸羗見爰劒被焚不死恠其神共畏事之推以爲豪河湟間少五榖多禽獸以射獵為事爰劒教之田畜遂見尊信廬落種人依之者益衆羗人謂奴為無戈爰劒嘗為奴𨽻故因名之其後世為豪也又曰爰劒曾孫忍時秦獻公初立欲復穆公之迹兵師臨渭首滅狄伐戎忍季文卬畏秦之威將其種人部落南出賜支河曲西數千里與衆羗絶逺不復交通其後子孫分别各自為種任隨所之或爲犂牛種越嶲羗是也或爲白馬種廣漢羗是也或為叅狼種武都羗是也忍及弟舞獨留湟中並娶妻忍生九子為九種舞生十七子為十七種羌之興盛從此起矣又曰忍子研立時秦孝公雄强威服羗戎孝公使太子駟率戎狄九十二國朝周顯王研豪徤故羗中貎號其後為研種及秦始皇時務并六國以諸侯為事兵不西行故種人得以繁息又曰武帝征伐四夷開地廣境北却匈奴西逐諸羗及渡河湟築令居塞初開河西列置四郡酒泉武威張掖燉煌通道玉門隔絶羗胡使南北不得交關扵是鄣塞亭燧出長城外數千里又曰建武九年隗囂死司徒掾班彪上言今凉州部皆有降羗羗胡被髪左袵而與漢人雜處習俗既異言語不通數為小吏黠民所見侵奪窮忿無聊故致反叛夫蠻夷冦亂皆爲此也舊制益州部置蠻夷騎都尉幽州部置領烏桓校尉凉州部置䕶羗校尉皆持節領䕶理其怨結嵗時廵行問所疾苦又數遣使驛通導動静使塞外羗夷為吏耳目州郡因此可得警備今宜復如舊以明威防世祖從之即以牛邯為䕶羗校尉又曰燒何豪有婦人銅鉗者年百餘嵗多智算為種人所信向皆從計策之又曰龎叅以失期敗軍抵罪以馬賢代領校尉事後遣任尚為中郎將將羽林緹騎五營子弟三千五百人代班雄屯三輔尚臨行懷令虞詡説尚曰使君頻奉國命討逐冦賊三州屯兵二十餘萬民棄農桑疲苦徭役而未有功効勞費日滋若此出不免誠為使君危之尚曰憂惶久矣不知所如詡曰兵法弱不攻强走不逐飛自然之勢今虜皆馬騎日行數百里來如風雨去如絶弦以步追之勢不相及所以曠而無功也為使君計者莫如罷諸郡兵各令出錢數千二人共市一馬如此可捨甲胄馳輕兵以萬騎之衆逐數千之虜追尾掩截其道自窮便民利事大功立矣尚大喜即上言用其計乃遣輕騎鈔擊杜季貢扵丁奚城斬首四百餘級獲牛馬羊數千頭又曰順帝永建元年隴西種羌反叛校尉馬賢將七千餘人擊之戰於臨洮斬首千餘級皆率種人降進封賢都鄉侯自是凉州無事至四年尚書僕射虞詡上䟽曰臣聞子孫以奉祖為孝君上以安民為明此髙宗周宣所以上配湯武也禹貢雍州之域厥田惟上且沃野千里榖稼充積又有龜兹鹽池以爲民利上郡龜兹縣有鹽官即雍州之域也水草豐美土宜産牧牛馬銜尾群羊塞道北阻山河乘阸據險因渠以溉水舂河漕水舂即水碓也用功省而軍糧饒足故孝武皇帝及世祖築朔方西河置上郡皆為此也而遭元元無妄之災衆羌内瀆郡縣兵荒二十餘年棄沃壤之饒損自然之財不可謂利離河山之阻守無險之處難以為固今三郡未復園陵單外園陵謂長安諸國陵也單外謂無守固也而公卿選懦容頭過身張解設難但計所費不圖其安宜開聖徳考行所長書奏帝乃復三郡使謁者郭璜督徙者各歸舊縣繕城郭置坼堠而激河浚渠為屯田省内郡費嵗一億計遂令安定北地上郡及隴西金城常儲糓粟令周數年又曰順帝永和四年以來機爲并州刺史劉秉為凉州刺史大將軍梁商謂機等曰戎狄荒服蠻夷要服言其荒忽無常而統領之道亦無常法臨事制宜略依其俗今二君素性疾惡欲分白明黒孔子曰人而不仁疾之以甚亂也况戎狄乎其務安要荒防其大惡忍其小過機等天性虐刻遂不能從到州之日多所擾發五年夏雜種羌等遂反叛攻金城與西塞及湟中雜種羗大㓂三輔殺害長吏機秉並坐徴又曰自爰劒後子孫支分凡百五十種其九種在賜支河首已西及在蜀漢徼北唯叅狼在武都其五十二種衰少不能自立分散為附落或絶滅無後或引而逺去其八十九種唯燒當種最強勝兵十餘萬其餘大者萬餘人小者數千人更相鈔盗盛衰無常湟中月氐胡後漢書曰湟中月氐胡其先大月氐之别也舊在張掖酒泉地月氐為匈奴冐頓所殺餘種分散西踰葱嶺其羸弱者南入山阻依諸羌居止遂與共婚姻及驃騎將軍霍去病破匈奴取西河地開湟中扵是月氐來降與漢民錯居雖依附縣官而首施兩端其從漢兵戰鬬隨勢強弱被服飲食言語略與羌同亦以父名母姓為種其大種有七莊子曰羗人死燔而揚其灰風俗通曰羌本西戎卑賤者也主牧羊故羗字從羊人因以為號無君臣上下徤者為豪不能相一種别群分强者凌弱轉相抄盗男子兵死者以為吉辰終者謂之方范煜西羌論曰張奐盛稱戎狄一氣所生不宜誅盡流血汙野傷和致妖是何言之迂乎羌雖外患實深内疾若攻之不根是養疴扵心腹也又曰昔先王疆理九土判别畿荒知蠻貊殊性難以道御故斥逺諸華薄其貢職唯辭命而已若二漢御戎之方失其本矣氐支齊書曰氐楊氏與符氏同出洛陽漢世氐居仇池地號百頃建安中有百頃氐王是也又曰仇池四方壁立自然有樓櫓却敵狀髙並數丈有二十二道可攀縁而升東西二門盤道可七里上有岡阜泉源氐扵上平地立宫室果園食庫無貴賤皆為板屋土墻所治處名洛谷又曰宋文帝元嘉十九年龍驤將軍裴方明等伐氐尅仇池通典曰氐者西戎之别種在廣漢西君長數十而白馬最大或號青氐或號白氐或稱蚺氐此蓋中國人即其服色而名之也土地險阻有麻銅漆蜜椒蠟等勇戅抵冐貪貨死利居扵河地一名仇池方百頃四面斗絶數為邊㓂郡縣討之則依固自守其俗語不與中國及羌胡同各自為姓如中國之姓其服尚青俗能織布善種田畜羊豕馬牛婚姻備六禮知書疏多知中國之語又曰漢武元封三年氐人反遣兵討破之分徙酒泉郡元鳳初復叛遣大鴻臚田廣明討破之又曰魏武之初諸氐戎叛乃令夏侯妙才討之因徙武都之種扵秦川以禦風俗通曰氐羌抵冐貪饕至死好利樂在山谿本西南夷之别種號曰白馬孝武帝遣中郎將郭昌等引兵征之降服以為武都郡晉山隂令江統西戎論曰春秋之義内諸夏而外夷狄以其言語不通贄幣不同法俗詭異種類乖殊或居絶域之外山河之表﨑嶇險阻之地與中國壤斷土隔不相侵渉賦役不及正朔不加故曰天子有道守在四夷又曰匈奴求守邉塞而侯應陳其不可單于屈膝未央蕭望之議以不臣是以有道之君不攻夷狄也車師北史曰車師國一名前部其王居交河城後魏太武真君十一年車師王車夷落遣使進薛直上書曰臣亡父僻處塞外仰慕天子威徳遣使奉獻不空扵嵗天子降念賜遣甚厚及臣繼立不闕常貢天子垂矜亦不異前世敢縁至恩輙陳私懇臣國自無諱所攻擊經今八嵗人庶饑荒無以存活賊今攻臣急甚不能自全遂捨國東奔三分免一即日已到焉耆東界思歸天闕幸垂賑救扵是下詔撫慰之開焉耆倉給之正平初遣子入侍自後每使朝貢髙昌北史曰髙昌者車師前王之故地東西二百里南北五百里四面多大山以其地勢髙敞人庶昌盛因名髙昌亦云其地有漢時髙昌壘故以為國號東去長安四千九百里漢西域長史及戊巳校尉並居扵此晉以其地為髙昌郡張軌呂光沮渠蒙遜據河西皆置太守以統之又曰其國有八城多石磧氣候温暖厥土良沃榖麥一嵗再熟宜蠶多五果有草名刺其上生蜜而味佳出赤鹽其味美復有白鹽其形如玉髙昌人取以為枕貢之中國又曰後魏文帝和平五年髙昌人立麴嘉為王嘉字靈鳳金城榆中人遣使獻珠象白黒貂裘名馬鹽枕等宣武延昌中以嘉為持節平西將軍𤓰州刺史又曰後魏孝明熙平中遣使朝貢獻詔曰卿地隔關山境接荒漠頻請朝援徒國内遷雖來誠可嘉扵理未協何者彼之甿庶是漢魏遺黎自晋氏不綱因難播越成家立國積之已久惡徙重遷人懷戀舊今若動之恐異同之變爰在肘腋不得便如來表也又曰後魏孝明正光元年遣使奉表自以邊遐不習典誥求借五經諸史并請國子助教劉燮以為博士明帝許之又曰其國至隋時城周廻一千八百四十歩於坐室畫魯哀公問政扵孔子之像又曰服飾丈夫從羌俗婦人裙􅃭頭上作髻文字亦同華夏兼用左書有毛詩論語孝經置學官弟子以相教授雖習讀之而皆為譯語賦税則計田輸銀錢無者輸布又曰隋大業四年遣使貢獻帝待其使甚厚明年伯雅來朝伯雅髙昌國王名也因從擊髙麗還尚宗室女華容公主八年冬歸蕃下令國中曰先者以國邊荒境被髮左袵今大隋統御宇宙平一孤既沭浴和風庶均大化其庶人以上皆宜改服易制帝聞而善之下詔曰光禄大夫弁國公髙昌王伯雅本自諸華世阼西壤昔因多難剪為異服自我皇隋平一宇宙伯雅踰重阻奉貢來庭削袵曳裾懐音從夏可賜衣冠仍頒製造之式唐書曰髙昌有草名白疊其實類蠒國人採之織以爲布又曰武徳七年其王文㤗又獻狗雌雄各一髙六寸長尺餘性甚慧云本出拂菻國中國有拂菻自此始也又曰太宗嗣位復貢𤣥狐裘因賜其妻宇文氏花䥖一具宇文氏復貢玉盤也又曰貞觀四年冬宇文氏請預宗親詔賜姓李氏封長樂公主書慰諭之又曰貞觀十三年文㤗稱疾不朝太宗命侯君集為交河道大總管率左屯衛大將軍薛萬均及突厥契苾之衆歩騎數萬衆以擊之攻拔其城虜男女七千餘口文泰惶懼病死子智盛嗣立出城降君集先是其國童謡云髙昌兵馬如霜雪漢家兵馬如日月日月照霜雪廽首自消滅文㤗使人捕其初唱者不能得君集尋遣使告㨗太宗大悦宴百寮班賜各有差曲赦髙昌部内欲以髙昌為州縣特進魏徴諫以爲不便太宗不從遂以其地置西州又置安西都䕶府以鎮之吐谷渾後魏書曰吐谷渾慕容氏者本遼東鮮卑徒河涉歸有二子長曰吐谷渾少曰若洛廆涉歸死若洛廆代統部落别為慕容氏渾與洛廆二部馬鬭相傷洛廆怒謂渾曰何不分部令相逺渾曰馬是畜耳而何怒及求别甚易今當去汝萬里之外廆悔謝留之渾曰先公之世卜筮云有二子享福並流子孫我是卑庶理無並大今以馬致隔天所啟也試驅馬令東若還我當隨去即命擁馬背悲鳴西走遂西渡臨止扵甘松之南廆追悔之作吐谷渾阿于歌徒何以兄為阿于也遂依水草廬帳而居以肉駱為糧渾死其後以吐谷渾為氏又曰豺立自號沙州刺史部内有黄沙周廻數百里不生草木因號沙洲梁書曰武帝天監十三年其王休運籌遣使獻金装馬腦鍾二口又表扵益州立九層佛寺詔書許焉十五年又遣使獻赤舞龍駒及方物隋書曰其王以皂為㡌妻戴金花其噐械衣服略與中國同其王公貴人多戴幕䍦婦人裙襦辮髪綴以珠貝國無常税殺人及盗馬者死餘坐則徴物贖罪風俗頗同突厥有大麥粟豆青海周廻千餘里中有小山其俗至冬輒放牝馬扵其上得龍種吐谷渾嘗得波斯草馬放入海因生驄駒能日行千里故時稱青海騘馬又曰開皇十六年以光化公主妻吐谷渾王伏允上表欲稱公主為天后上不許唐書曰隋煬帝時其王伏允來犯塞煬帝親總六軍以討之伏允以數千騎潜扵泥嶺而遁其仙頭王率男女十餘萬口來降煬帝立其質子順為王送之本國又曰貞觀九年詔特進李靖西海道大總管時伏允太子順欲因此立功由是遂降乃詔曰吐谷渾擅相君長竊㨿荒裔志在㓙徳政出權門酋渠携二種落怨憤長惡不悛野心彌熾莫顧蕃臣之禮曽無事上之節僣竊彊場䖍劉兆庶積惡既稔天亡有徴朕君臨四海含育萬類一物失所責深在予所以爰命六軍申兹九伐義存活國情非黷武其子大寜王慕容順隋氏之甥志懷明悟長自中土幸慕華風爰見時機深識逆順以其愎諫違衆獨䧟迷途遂誅邪臣存兹大計翻然改轍代父歸罪忠孝之美深有可嘉子能立功足以補過既往之釁特宜原免然其建國西鄙已歴年代既從廢絶情所未忍繼其宗祀允歸令嗣可封順爲西平郡王又曰吐谷渾自晉永嘉之末始西度洮水建國扵羣羌之故地至龍朔三年為吐蕃所滅波斯北史曰波斯國都宿利城在忸宻西古條支國也去代二萬四千二百二十八里城方十里户十餘萬河經其城中南流土地平坦出金鍮石珊瑚琥珀車渠馬腦多大真珠玻棃瑠璃水精瑟瑟金剛火齊鑌鐡銅錫朱砂水銀綾錦疊毼氍毹㲪赤麞皮及鬱金蘇合青水等香胡椒蓽撥石蜜千年棗香附子訶黎勒無食子鹽緑雄黄等風物氣候暑熱家自藏氷地多沙磧引水溉灌其五榖及鳥獸等與中夏略同唯無稻及黍稷土出名馬大驢及駞往往有一日能行七百里富室至有數千頭又出白象獅子大鳥卵形如槖駞有兩翼飛而不能髙食草與肉亦能噉人其王姓波氏名斯坐金羊牀戴金花冠衣錦􅂁織成帔餙以珎珠寳物其俗丈夫剪髪戴白皮㡌貫頭衫亦有巾帔縁以織成錦婦女之服餙以金銀仍貫五色珠絡之扵􅈩上其國内别有小牙十餘所猶中國之離宫也每年四月出逰處之十月乃還王即位以後擇諸子内賢者宻書其名封之扵庫諸子及大臣皆莫之知也王死衆乃共發書視之其封内有名者即立以爲王餘子出各就邊任兄弟更不相見也國人號王曰醫􅓐妃曰防歩率王諸子曰殺野又曰其刑法重罪縣諸竿上射殺之次則繫獄新王立乃釋之賦税則准地輸銀錢又曰其俗以六月爲嵗首尤重七月七日十二月一日其日人庶以上各相命召設會作樂又曰後魏孝明神龜中其國遣使上書貢物云大國天子天之所生願日出處常為漢中天子波斯國王居和多千萬禮拜朝廷嘉納自此每使朝獻唐書曰波斯伊嗣侯遣使獻一獸名活褥虵形類䑕而色青身長八九寸能入穴取䑕又曰龍朔元年詔遣龍州南田縣令王名逺充使西域分置州縣因列其地疾陵城為波斯都督府授其王卑路斯為都督是後數遣使貢獻咸亨中卑路斯自來入朝髙宗甚加恩賜拜右武衛將軍儀鳳三年令吏部侍郎裴行儉將兵册送卑路斯還為波斯王行儉以其路逺至安西碎葉而還卑路斯獨返不得入其國漸為大食所侵客扵吐火羅國二十餘年有部落數千人後漸離散至景龍二年又來入朝拜為左威衛將軍無何病卒其國遂滅而部衆猶存自開元七年至天寳六載凡十遣使來朝并獻瑪腦床九年四月獻大毛繡舞筵無孔真珠等太平御覽卷七百九十四
