  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_021-1a, image: WYG0893/WYG0893-0192c.png}
body:
  text: 太平御覽卷二十一宋李昉等撰時序部六夏上夏上爾雅曰夏為朱明孫炎曰夏氣赤而光明又夏為昊天又夏祭曰薦薦上帝魚初薄也夏時百榖未登可薦者薄也釋名曰五月謂之蕤賓蕤者下也賓者敬也言陽氣下隂氣上極隂氣始賓敬之也書曰夏暑雨小民亦唯曰怨咨又堯典曰申命羲叔宅南交平秩南訛敬致日永星火以正仲夏厥民因鳥獸希革詩曰四月秀葽五月鳴蜩又正月繁霜我心憂傷又綢繆束楚三星在户今夕何夕見此粲者三星五月中在户也又維此六月既成我服我服既成于三十里又六月食鬰及薁鬰棣屬薁蘡薁也又六月莎雞振羽又四月維夏六月徂暑又冬之夜夏之日傳曰龍見而雩禮曰四月之節日在昴昏翼中曉牽牛中斗建巳位之初其日丙丁其帝炎帝其神祝融其蟲羽其音徴律中仲吕立夏之日螻蟈鳴後五日蚯蚓出後五日王瓜生盛德在火迎夏于南郊命樂正習盛樂中氣日在畢昏軫中曉須女中斗建巳位之中小滿之日苦菜秀後五日靡草死後五日小暑至挺重囚出輕繫無起土功無發大衆無伐大樹天子初衣暑服無大田獵以含桃先薦寢廟蠶事既登后妃獻繭天子飲酎用禮樂又五月之節日在參昏角中曉危中斗建午位之初律中蕤賓芒種之日螳蜋生後五日鵙始鳴後五日反舌無聲縶騰駒班馬政蓄百藥中氣日在東井昏亢中曉營室中斗建午位之中夏至之日鹿角觧後五日蜩始鳴後五日半夏生祀皇地祗于方丘日長至隂陽爭死生分君子齋戒薄滋味無致和節嗜慾定心氣無用火于南方可以居髙明可以逺眺望可以升山陵可以處臺榭又六月之節日在東井昏氐中曉東璧中斗建未位之初律中林鍾小暑之日温風至後五日蟋蟀居壁後五日鷹乃學習中氣日在柳昏尾中曉奎中斗建未位之中大暑之日腐草為螢後五日土潤溽暑後五日大雨時行命虞人入山行木無有斬伐中央土其日戊己其帝黄帝其神后土其蟲倮其音宫律中黄鐘之宫其祀中霤祭先心又樂正崇四術立四教春夏教以詩書又凡學春夏學干戈又春誦夏弦太師詔之又春作夏長仁也又明堂位曰季夏六月以禘禮祀周公於太廟升歌清廟下管象朱干玉戚冕而舞犬武皮弁素積裼而舞大夏周禮曰蕤賔午之氣五月建焉而辰在鶉首又山虞以仲夏斬隂木鄭衆曰隂木秋火生者鄭𤣥曰隂木生山北者冬斬陽夏斬隂也又凌人掌冰凌冰室也夏頒冰暑氣盛王以冰頒賜也又柞氏掌攻草木及林麓夏日至令刋陽木而火之又夏見曰宗宗道也義取主火行人云夏宗以陳天下之議榖梁傳曰四時之田皆為宗廟之事也夏田曰苗因為苗稼除害故曰苗皇覧逸禮曰夏則乘赤輅駕赤騮載赤旗以迎夏於南郊食菽其祭先黍與雞居明堂正廟啓南户尚書大傳曰南方者何也任方也任方者物之方任何以謂之夏夏者假也吁荼萬物而養之外也故曰南方夏又主夏者大火大火昏中可以種黍菽上吿乎天子而下賦之民三禮義宗曰夏大也謂萬物長大也夏謂南者南任也又火正曰祝融者祝甚也融明也言夏時物氣甚明也又南岳謂之霍霍者護也言陽氣用事盛夏之日護養萬物故以為稱又六月小暑為節者此以相形為名形大暑故謂之小暑六月之初暑氣熱未極故以小為名大暑為中者自十一月一陽爻上從地而出至此之時方始上徹陽氣併出以上大暑既極故暑為中大戴禮曰夏以教士車甲士執伎論力修四衛强股肱質射御才武聰慧始衆長入可以為儀綴於國出可以為卒誘於軍旅四方諸侯之㳺士國中賢者充焉方夏三月養長莠蕃庻物於時有事享於皇考爵士之有慶者七人以成夏事易通統圖曰夏月日行東南赤道曰南陸尚書考靈曜曰火星為夏期專陽相同精感符詩含神霧曰曹地處季夏之位土地勁急音中徴其聲清以急春秋繁露曰夏樂氣故養也孝經説曰斗指午為夏鶡冠子曰斗柄南指天下皆夏史記曰墨者亦尚堯舜言德行曰夏日葛衣冬日鹿裘又曰田嬰有子四十餘人其賤妾有子名文以五日生嬰告其母曰勿舉也其母竊舉生之及長因其兄弟而見其子文於田嬰田嬰怒其母曰吾令若去此子敢生之何也文頓首因曰君所不舉五月子者何故嬰曰五月子者長及户齊將不利父母文曰人生受命於天君何憂焉必受命於户則可髙其户耳誰能至户者嬰曰子休矣漢書曰熒惑南方夏火禮也視也禮虧視失逆夏令傷火氣罰見熒惑逆行一舎二舎為不祥居之三月國有殃五月受兵七月半亡地九月地太半亡又漢武帝始幸雍郊見五帝以孟夏四月答禮焉又賈誼既已謫居長沙長沙卑濕自以為壽不得長傷悼之乃為賦以自廣曰單閼之歲兮四月孟夏歲在卯曰單閼庚子日斜鵩集余舍五行志曰秦始皇六年四月大寒人多凍死時嫪毐及大臣二十餘人車裂以狥而滅宗放遷四十餘家于房陵又食貨志曰晁錯曰今農人五口之家其服役者不下二人其能耕者不過百畝百畝之收不過百石春耕夏耘秋穫冬藏代薪樵治官府給役使春不得避風塵夏不得避暑熱秋不得避隂雨冬不得避寒凍四時之間無日休息漢書魏相上書曰南方之神炎帝乘離執衡司夏張晏曰火為禮禮者齊平故曰衡也又曰魯昭公十七年六月朔日食說曰正月謂周六月夏四月為正陽純乾之月也慝謂隂爻也冬至陽爻起初故曰復至建巳之月為純乾亡隂爻而隂侵陽為災重故伐鼓用幣責隂之禮劉歆謂六月二日魯分也又漢元帝永光元年四月日色青白亡影韋昭曰日下無景也無景謂惟質見正中時有影亡光韋昭曰無光耀也是夏寒至九月後乃有光續漢書律厯志曰日行南陸謂之夏後漢書禮儀志曰五月五日朱索五色桃印為門户飾以止惡氣又仲夏之月隂氣萌作恐物不茂其禮以朱索連葦以施門户又立夏之日夜漏未盡五刻京都百官皆衣赤衣迎夏於南郊後漢書張純奏儀禮三年一祫五年一禘禘祭以夏四月夏者陽氣在上隂氣在下四月乾卦用事故曰陽氣在上故正尊卑之義也謝承後漢書曰羊茂字季實為東郡守夏處單板榻晉書曰魏末有孫登字公和汲郡人無家屬時人於汲縣北山上土窟中得之夏則編草為裳又肅慎國一名抱樓夏則巢居晉書曰山濤將去選官舉嵇康自代康與濤書吿絶且曰性巧而好鍜宅中有一柳樹甚茂乃激水圜之夏月居其下以鍜東平吕安服康髙致每一相思千里命駕每鍜向秀為佐又五行志云晉義熙時桓𤣥既簒位謡曰草生及馬腹鳥啄桓𤣥目及𤣥敗走至江陵時當五月被誅晉陽秋曰車允字武子家貧讀書常不得油夏月則練囊盛數十螢以夜繼日沈約宋書云羊欣字敬元父不疑為烏程縣令欣時年十二王獻之為吳興守甚知愛之嘗夏月入縣著新練裳晝寢獻之書數幅而去欣本攻書因此彌善又劉敬宣八歲䘮母四月八日入寺乃下頭上金鏡為母灌佛因泣下悲不自勝北齊書曰僕射魏收字伯起初習武不成改節讀書夏月坐板牀隨逐樹隂諷讀累年牀為之鋭遂工辭令也南史曰梁何逺為武昌太守武昌俗皆汲江水盛夏逺患水温每以錢買人井寒水不受錢者則以水還之其他事率多此類陸翽鄴中記石季龍於井氷臺藏氷三伏之月以氷賜大臣趙書曰汲桑六月盛暑而重裘累茵使十餘人扇之患不得清涼斬扇者軍中為之謡曰奴為將軍何可羞六月重茵被狐裘不識寒暑斷人頭三十國春秋曰燕王慕容熙后符氏嘗季夏思凍魚膾仲冬須生地黄皆下有司切責之不得加之以遣斥焉隋書曰煬帝大業十二年五月上幸玉華宫徵求螢火得數斛夜出逰於山西放之光徧巖谷續㑹要曰貞元六年五月朔御紫宸殿受朝先是上以五月一隂生臣子道長君父道衰非善月也因創是月朝見之儀國語曰魯宣公夏濫于泗淵漬罟於泗水之淵以取魚里革斷其罟而棄之曰古者大寒降土蟄發寒氣下謂季冬建丑之月土蟄𤼵謂孟春建寅之月水虞於是乎講罛罶取名魚登川禽而嘗之寢廟行諸國人助宣氣也水虞漁師也罛魚網罶笱也言陽氣起魚負氷故令國人取之今魚方別孕不教魚長又行罟網貪無蓺也公曰吾過而里革匡我不亦善乎吳越春秋曰越王念吳之復夏則握火說苑曰趙簡子謂陽虎曰春樹桃李夏得休息秋得其食樹蒺藜者夏不得息秋得其刺今子樹蒺藜耳太公金匱曰紂常以六月獵於西土發民逐禽民諫曰盛夏之時地務長養今大霧覆施乃發民逐禽以懸元元於野君殘一日之苗而民百日不食天子失道後必無福紂以妖言而誅之後數月天暴風雨𤼵屋折木六韜曰武王伐殷行遇二大夫而問之曰殷國常雨血雨灰雨石小者如雞子大者如箕常六月雨雪深丈餘武王曰大哉妖也其一人曰是非大妖也殷國大妖三十七章雨血雨灰雨石盛夏雨雪臣不謂妖災武王踧然而問三十七章之妖對曰殷君好射人以餧虎喜割人心喜殺孕婦喜寡人之婦孤人之子上數事皆三十七章之事又夏不操扇冬不服裘天雨不張蓋名曰禮將又冬氷可拆夏條可結傅子曰夏令披裘冬令披葛雖有嚴令終不從者逆也世說曰郗嘉賔三伏之月詣謝公炎暑方盛雖復當風交扇猶沾汗流離又周鎮罷臨川還都泊青溪時夏暴雨船舫狹小而漏殆無坐處丞相王導曰胡威之清何以過此又劉真長始見王丞相時盛暑之月丞相以腹熨彈棊局曰何如乃渹吳人以冷為渹也音楚敬反劉既出人問見王公如何劉曰未見他異唯作吳語耳又胡廣本姓黄五月生父母惡之乃置之甕投於江胡翁見甕流下聞有小兒啼聲往取因長養之以為子遂七登三司流譽當世廣後不治其本親服云我本親已以為死人也世以為深譏焉又謝遏按謝朗小名遏夏月常仰卧謝公清晨卒來未暇著衣跣出屋外方躡履問訊公曰汝可謂前踞後恭語評曰何平叔美姿儀面絶白魏文帝疑傅以粉夏月與熱湯餅既啖大汗出隨以朱衣自拭色轉皎然又陸機夏在洛忽思齋東頭竹篠中飲語劉寶曰吾思鄉轉切矣公孫尼子曰孔子有病哀公使醫視之醫曰子居處飲食如何孔子曰春居葛籠夏居宻陽秋不風冬不煬飲食不匱飲食不勤醫曰是良藥也太𤣥經曰蒙南方也夏也物之修長也皆可得而載也謂長出向上也括地圖曰天毒國最暑熱夏草木皆乾白虎通曰六月謂之林鍾林者衆也萬物成熟類衆多也蔡邕月令章句曰百榖各以其初生為春熟為秋故麥以孟夏為秋祠令曰季夏土王日祀黄帝于南郊帝軒轅配后土從之又季夏迎氣日祀中霤太平御覧卷二十一
