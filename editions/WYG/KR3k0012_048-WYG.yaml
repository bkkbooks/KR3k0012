body:
  text: 太平御覽卷四十八宋李昉等撰地部十三南楚諸山靜山驚磯山黄鶴山烽火山雞翅山闔閭山印山朔山望夫山翠屛山九宫山角山鐘臺山武昌山樊山西塞山白雉山鳯栖山神人山南昌山松門山馬當山釣磯山雞籠山五女山射的山石印山龍虎山羊山羅霄山鍾山望鳯山昌山石室山黄唐山儲潭山赤石山螺亭石山上洛山空山金雞山峽山梓潭山柴侯峽山官山君山盤固山歸美山莫巨山五章山麻山鄧公山明府山鶴嶺山石虹山洪崖山静山江夏圗經曰静山在縣東南一百一十里其山廽聳無連接曲澗清流山林茂峻可以息諸仁智栖逰羽客故名静山驚磯山江夏圗經曰在縣東九十里其山無連接西南俯臨大江下有石磯波濤迅急商旅驚駭故以為名黄鶴山江夏圗經曰在縣東九里其山斷絶無連接舊傳云昔有仙人控黄鶴於山故以為名故梁湘東王晉安寺碑云黄鶴從天而夜響是也烽火山江夏圗經曰烽火山在縣東北四十里梁典曰梁武征齊頓軍於此舉烽火相映故名烽火山雞翅山江夏圗經曰雞翅山在縣南八十里昔有金雞飛集於此故名雞翅舊記云金水有金雞翅山鷄向南飛産金於此水故名金水闔閭山武昌記曰昔闔閭與伍子胥屯衆於此山為城故曰闔閭山史記曰闔閭九年伍子胥伐楚又吳越春秋云伍子胥將吳兵攻破楚掘楚平王之墓葢嘗屯軍於此山是也印山武昌記曰奉新縣有渚石臨水髙三十丈上有字髣髴似印故曰印山輿地志云縣西有石臨水高三十丈有書字為印山此即是也朔山武昌記曰朔山有竹長一十餘丈圍數尺常有聲天將雨此竹鳴焉今無此竹望夫山輿地記曰望夫山上有望夫石層生蕪菁遂以名山上有石髙三丈形如女人謂之望夫石又記曰武昌郡奉新縣北山上有望夫石状如人立者今古相傳云昔有貞婦其夫從役逺赴國難㩦弱子餞送於此山既而立望其夫乃化為石因此為名焉翠屛山輿地志曰江水入富池一百八十里得奉新上流三百里有城山三面壁立一面峻極水是奉新大源本名石城山天寶五載改為翠屏山九宫山武昌記曰九宫山西北陸路去州五百八十里其山晉安王兄弟九人造九宫殿於此山遂以為名角山武昌記曰天欲雨其山有聲如吹角以此為名鐘臺山武昌記曰鐘臺山在縣東南一百里上有桃花洞洞側有李邕讀書之所荒基遺址石室花木猶在上有一石臺臺上有一鐘或時鳴響逺近皆聞故名鐘臺山也武昌山續捜神記曰晉武世宣城人秦精常入武昌山採茗遇毛人長丈餘引精至山西示以聚茗而後去俄而復還乃探懐中橘遺精精怖負茗急歸樊山江夏圗經曰樊山西陸路去州一百七十三里出紫石英山東數十步有岡岡上甚平敞青松緑竹常自蔚其下有水溪凛然常有寒氣故謂之寒溪有蟠龍石謝元暉詩云樊山開廣宴是也又干寳捜神記云樊山若天旱以火燒山即得大雨今往往有驗武昌記曰樊山孫權常獵於下見一姥問獵得何物答曰只獵得一豹曰何不見其尾言訖忽然不見權於後立廟祀之西塞山江夏風俗記曰西塞山髙一百六十丈週廻三十七里峻崿横江危峰斷㟁長波所以東注髙浪為之西翻袁宏東征賦云沿西塞之峻崿是也又江表傳云劉勲敗於彭澤因走入楚江聞皖已沒遂投西塞白雉山江夏圗經曰白雉山其山上有芙蓉峰前有獅子嶺後有金雞石西出金南出銅自晉宋南陳以來常置立爐冶烹煉鳳栖山江夏圗經曰鳳栖山西北陸路去州二百二十五里吳建興年中鳳凰䧏此山因以為名山有石鼓鼓鳴則雨神人山帝厯記曰神人山吳建衡三年有神人乗白鹿從此山出名神人山南昌山豫章圗經曰南昌山者昔吳王濞鑄錢之山時有夜光遥望如火以為銅之精光梁氏十道志云以豫章有銅山山中有洪井飛流懸注其深無底是也山有洪崖先生錬藥之井亦號洪崖山有石臼存焉松門山豫章圖經曰松門山者以其多松遂以為名北臨大江及彭蠡湖口山上有石鏡光明照人謝靈運彭蠡湖口詩云攀崖照石鏡牽葉入松門是也馬當山九江記曰馬當山高八十丈週廻四里在古彭澤縣北一百二十里其山横枕大江山象馬形廻風急擊波浪涌沸舟船上下多懐憂恐山際立馬當山廟以祀之釣磯山異苑曰釣磯山者陶侃甞釣於此山下水中得織梭一枚還掛壁上後化成赤龍從空而去其山石上猶有侃迹存焉雞籠山郡國志曰江州雞籠山山有石雞冠距如生有道士李鎮住此山下常賞翫之雞一旦自毁鎮曰雞既如此吾其終乎果卒五女山郡國志曰江州五女山始皇死五女𦵏此山天昏毎聞筝笛之聲射的山郡國志曰射的山者故老相傳云上有玉在石壁内遥望似有白處曽有胡人來取上山後遇風雨不果得今逺望頗似射侯故名射的焉石印山吳志曰天璽元年鄱陽郡言厯陵山石有文理成字巫言石印神有三郎皓遣使以太牢祭并印綬拜三郎為王又按江氏記云厯陵有石印山臨水高百丈有七穿騈羅穿中色黄赤相續因謂之石印山龍虎山信州圗經曰龍虎山在貴溪縣二山相對溪流其間乃張天師得道之山羊山宋永初山川記曰商安縣西有羊山山有燃石黄色而理麄以水灌之便熱若石灰以鼎置之烹煮可熟羅霄山王孚安成記曰萍鄉羅霄山澤水所出傍出石乳天旱吏人禱之因以大木長三四丈投井中即雨水懸輳井溢輙令木涌出而雨止蓋潛龍之穴也以陽居隂神精上通故叩之而必有所感則蜀都賦所云應鳴鼔而興雨者也鐘山裴子野宋略曰永嘉元年鐘山因洪水有鐘從山流出時人得之送上驗銘云是秦時樂器因以為名又安成記曰鐘山臨水阻峽春夏則湍洑涌沸湧上白沙如米兩㟁石山各有九十餘里以之候嵗若一㟁偏饒則其方豐稔民以為凖望鳳山宜春圗經曰望鳳山在州西北七十里上有一峰逺觀似鳳因以為名昌山宜春圗經曰昌山在州東六十里舊名傷山週廻連延一百八十里袁江流于其間巨石枕﨑潺激舟人上下多傾覆故名傷山顧野王輿地記云時人以傷為非善徴乃改為昌山石室山宜春記曰郡有石室山山有數石室相通髙十餘丈皆相似素壁若雪萬象森羅因以為名黄唐山輿地志曰贛縣黄唐山有石室數千間屋上通天窗下有方榻者二十人巾櫛而坐傍有小石室七所相通悉有石人室前時有車馬跡春夏草不生無諸毒蟲林木繁茂水石幽絶蓋靈仙窟宅也山下居人每丙日輙聞山室有笳鼓簫樂之音鄧徳眀記云有石子如彈丸聚在山角至丙日不復見他日復有其山獨立髙一千三百丈相傳以石室呼為黄唐廟因以為名儲潭山南康記曰儲潭山俯臨清潭有儲君廟因以名焉輿地志云咸和二年刺史朱偉所立常有漁者釣於此潭得金鎻索引舟中長數百丈忽一物随鎻而來其形如水牛眼赤角白見人驚駭拽走而漁以刀斷得數尺䆒不知其所由然也赤石山南康記曰赤石山大石連聳燦若舒霞山角多赤石有玉房瓊室耆舊相傳云宋元嘉年中有人自稱安道士者不知何許人被服巾褐栖於此山中數十年忽失所在其後時復有見者天寳六年勅改為玉房山螺亭石山南康記曰螺亭山有大石臨水號曰螺亭云昔有貧女採螺忽夜中見衆螺張口亂噉其肉貧女乃死其伴因殯水傍其冢化為巨石螺殻無數號曰螺亭石山上洛山輿地志曰虔州上洛山多木客乃鬼類也形似人語亦如人遥見分眀近則藏隠能斫杉枋聚于髙峻之上與人交市以木昜人刀斧交關者前置物枋下却走避之木客尋來取物下枋與人隨物多少甚信直而不欺有死者亦哭泣殯𦵏嘗有山行人遇其𦵏日出酒食以餉人山中有石墨可書空山南康圗經曰空山晉咸康五年太守庾恪於西山麓中建立神廟厯代祈雨最有靈應又郡國志云空山在郡南山多林木果實食物一郡皆資此山雖名空山其出物百倍於他山金雞山南康記曰金雞山臨貢水石色如霞其傍有穴廣四尺一石正當穴口如彈丸嘗有金雞出入此穴晉義熈中再三出見有人挾彈放丸於穴口化為石其雞至今不見因號曰金雞穴宋永初中又見栖翔於此峽山南康記曰峽山上時有夜光飛焰遥見若火炤燎于原從峽泝流數十里有石臨水名曰蛟窟天寶六載勅改名夜光山梓潭山南康記曰梓潭山有大梓樹吴王令都尉肅武伐為龍舟槽斫成而牽挽不動占云湏童男女數十人為歌樂乃當得行遂依其言以童男女牽拽没於潭中男女皆溺焉其後天晴朗髣髴若見人船夜宿潭邊或聞歌唱之聲因號梓潭焉柴侯峽山南康記曰柴侯峽山漢靈帝時有劉叔喬避地於此死𦵏村側自云柴侯墓晉末喪亂有發其塜者忽有大風雨棺及松柏悉飛渡水移上此峰其棺乃化為石因是名焉官山南康記曰官山天寶六年改名珠玉其山髙峻出善鳥香草嘗有人於此山見大珠玉相傳謂之官山君山南康記曰君山翠麗鮮眀遙若臺榭一名曰媧宫亦曰女姥山山去盤固山五十里上有玉臺方廣數十丈上有自然石室形風雨之後景氣眀静頗聞上有鼓吹之聲盤固山南康記曰盤固山有石井井側有大銅人常守之按此石井五百年水一湧起髙數丈銅人以手掩之其水即止其山盤紆峻嶒因號盤固山焉歸美山南康記曰歸美山髙數百丈逺望嵯峨靈闕騰空故老謂之神闕其山有水出焉四面嶮峻自然有石城髙數十丈週廻三百步又有石峽左右髙五六十丈勢若雙闕其状入雲復有古石室色如黄金號為金室有鸀鳥形色鮮潔自愛毛羽其隻者或鑒水悲鳴自絶方知孤鸞對鏡為不虛矣山頂有木枋數百片髙危非人力所及莫巨山荀伯子臨川記曰巖内有石人坐石盤上體有塵埃則興風雨洗訖晴日遍體潔朗如玉瑩浄民以為凖焉五章山荀伯子臨川記曰五章山絶岩嶮峭有蜜蜂依之為房其形如笠採者皆懸磴數十丈然後獲之麻山荀伯子臨川記曰麻山或登之者望廬岳彭蠡皆在其下有黄連厚朴恒生焉又有楓樹及數千年者如人形眼鼻口全而無臂脚入山往往見之或斫之者皆出血人以籃冠其頭眀日輙失籃俗名楓子鬼其山竹木稠宻如麻因名麻山天寶六年職方奏改為豐材山焉鄧公山信州圖經曰鄧公山在縣北本名銀山因鄧公為鄧公塲儀鳳二年邑人祭山山頹䧟焉按開山記云總章二年邑人鄧逺經刺史豆盧公陳開山之便㝷為山䧟後人立鄧公廟焉眀府山信州圖經曰眀府山在縣東其山久晴不雨山或自鳴必有大雨久雨不晴欲晴必有烟霧蓋其頭故老相傳祈請有驗鶴嶺山信州圖經曰鶴嶺山自貴溪縣界崗阜鱗次北入縣境嶺上多松樹有鶴窠因名鶴嶺山石虹山鄱陽記曰石虹山有石室中有石砥平如牀可容置數百人傍列石障如屛風篆書為八十三字有横石􅘳水而渡文彩青赤若虹蜺因名為石虹山洪崖山豫章記曰按舊經云古老相傳有洪崖先生者居此山上故以為名又列仙傳云洪崖山者山之陽有洪唐山寺中有洪崖壇每亢旱禱此太平御覽卷四十八
