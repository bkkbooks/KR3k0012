  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_352-1a, image: WYG0896/WYG0896-0150a.png}
body:
  text: 太平御覽巻三百五十二宋李昉等撰兵部八十三㦸上釋名曰㦸格也旁有枝格也戈勾矛㦸也戈過也所刺則决過所勾引制之不得過也車㦸曰常長丈六尺車前所持也八尺曰尋倍尋曰常故稱常也手㦸手所持摘之㦸也說文曰戈平頭㦸也從弋一横之象形也㦸有枝兵也㦸讀若棘鏌鋤大㦸也方言曰㦸楚謂之孑郭璞曰取名于鈎孑也凡㦸而無刃秦晉之間謂之釨或謂之鏔音寅吳揚之間謂之戈東齊秦晉之間謂其大者曰鏝胡鏝木干切其曲者謂之鈎􅀈鏝胡即今鷄鳴句孑㦸也南楚宛郢謂之匽㦸其柄自關而西謂之柲音祕或謂之殳音殊廣雅曰匽謂之雄㦸太公兵法曰㦸之神名大將趙氏兵書曰㦸參星主之周禮曰舍為壇壝音遺宮棘門鄭司農云棘門以㦸為門也左傳曰鄭伯將伐許授兵於太宫公孫閼與潁考叔争車考叔挾輈以走輈車轅也子都拔棘以逐之棘㦸也及大逵不及子都怒都閼字也又曰莊公四年楚武王荆尸授師孑焉以伐隨尸陳也孑者㦸然則楚始如此叅用㦸為陳也又曰鄭公子歸生受命于楚伐宋宋華元禦之戰于大棘宋師敗績囚華元狂狡輅鄭人鄭人入於井狂狡宋大夫輅迎也倒㦸而出之獲狂狡君子曰失禮違命宜其為擒也又曰晉侯飲趙盾酒伏甲將攻之遂跣以下公嗾獒逐焉靈輙倒㦸以禦公徒而免之問何故曰翳桑之餓人也又曰諸侯伐偪陽狄虒彌建大車之輪䝉之以甲為櫓左執之右㧞㦸成一隊又曰欒氏乗公門范宣子謂鞅曰矢及君屋死之鞅用劒以帥卒用劒短兵接欲致死也欒氏退攝軍從之遇欒樂欒盈之族也樂射之不中又注注屬矢於弦則乗槐本而覆或以㦸鈎之斷肘而死周書曰年飢上用與曲輈不漆矛㦸縷纒羽旄不擇烏史記曰平原君與楚合從言其利害日出而言之日中不决毛遂按劒而前曰今楚地方五千里持㦸百萬楚覇王之資也又曰蘇秦說韓王曰韓之劒㦸皆出於冥山棠谿漢書曰項羽令壯士挑戰漢有善騎射曰樓煩應劭曰樓煩今樓煩縣是也挑戰三合樓煩輙射殺之羽大怒自被甲持㦸挑戰樓煩欲射羽瞋目叱之樓煩目不能視手不能發走還入壁不復敢出又曰田肯賀上曰秦形勝之國也帶河阻山懸隔千里持㦸百萬懸南千里之外齊得十二焉非親子弟莫可使至齊者也又曰奉天子法駕迎皇帝代邸皇帝入未央宫有謁者十人持㦸衛端門曰天子在殿下何為者不得入又曰漢七年長樂宫成於是皇帝輦出房百官執㦸傳警引諸侯王以下至吏六百石以次奉駕又曰息夫躬云諸曹以下僕遬音速不足數卒有强弩圍城長㦸指闕陛下誰與備之又曰晁錯上言曰兩陣相近平地淺草可前可後此長㦸之地也劒楯三不當一又曰灌夫字仲儒父孟死吳軍夫奮曰願取吳王若將軍頭以報父仇於是夫被甲持㦸募軍中壯士所善願從數十人及出壁門莫敢前獨兩人及從奴十餘騎馳入吳軍至戲下所殺傷數十人又曰弦雄位不過執㦸又曰八月飲醻行祠孝昭廟是時霍氏外孫代郡太守任宣坐謀反誅宣子章為公車丞亡在渭城界中夜祛服入廟執㦸立廟門待上至欲為逆發覺伏誅後漢書曰光武署銚期為賊曹掾上畧地向北期從狥薊時王郎檄書到薊中起兵應郎光武趣駕出百姓聚觀諠呼滿道遮路不得行期騎馬奮㦸嗔目大呼左右曰䟆周禮𨽻僕掌䟆宫中之事鄭衆曰止行清道也若今警蹕說文䟆與蹕同衆皆披靡東觀漢記曰吳漢與蘇茂周建戰漢躬披甲持㦸告令諸部將曰聞鼓聲皆大呼俱進後至者斬遂鼔而進賊兵大破又曰建武四年隗囂遣馬援奏課京師因曰臣與公孫述同縣少小相善臣前往蜀述陛㦸乃見臣今臣逺從異方來陛下何以知臣非刺客奸人而簡易若是上大笑又曰田邑字伯玉為上黨太守時更始遣鮑永馮衍屯太原永衍恐其先降說之曰晏嬰臨盟擬以曲㦸不易其辭又曰楊政字子行師事博士范升建武中范升為太常丞為去妻所誣告坐事繋獄當伏重罪政以車駕出時伏道邊抱升子持車叩頭武騎虎賁恐驚馬引弓射之不去旄頭以㦸义政傷胷前廷政涕泣求哀上即尺一出升又曰孫程與王康等斬江京等迎立濟隂王是為順帝閻顯弟景為衛尉從省中還外府收兵至盛徳門尚書郭鎮率直宿羽林出逢景景因斫鎮不中鎮劒撃景墮車左右以㦸义其胷禽之送廷尉謝承後漢書曰彭循字子陽太守祕君聞循義勇多謀請循以守吳令民歌之曰時歳倉卒盜賊縱横大㦸强弩不可當頼遇賢令彭子陽司馬彪續漢書曰楊仁字文義巴郡人顯字特詔補北宫衞士及帝崩時諸馬貴盛各爭欲入宫仁被甲持㦸嚴勒明衞莫敢輕進者肅宗既立諸馬共譛仁上知其忠愈善之張􅀈漢南記曰陳蕃等欲除諸黄門謀泄閽寺之黨於宫中詐稱驚云外有反者蕃奔入宫小黄門朱寓以㦸刺蕃魏志曰董卓恐人謀已常以吕布自衞嘗失意㧞手㦸擿布布拳截之由是隂怨卓英雄記又載呂布請董卓卓常㧞㦸擲之言布亂其私室又曰袁術遣將紀靈等歩騎三萬攻劉備備求救於吕布嚴歩兵千騎二百馳往赴備布謂靈等曰布性不憙合鬬但憙觧鬭耳布令門侯於營門中舉一隻㦸布言諸軍觀布射㦸小支一發中者諸君當觧去不中可留鬭布舉弓射㦸正中支諸將皆驚言將軍天威也明日歡㑹然後各罷又曰張繡反襲太祖營太祖出戰不利典韋以長㦸左右撃之一义輙十餘􅀈音矛摧左右死傷者略盡韋被數十創短兵接戰賊前摶之韋雙挾兩㦸撃殺之餘賊不敢前又曰典韋好持大雙㦸與長刀軍中為之語曰帳下壯士有典軍持一雙㦸八十斤王沈魏書曰太祖討吕布於濮陽布有别屯在濮西相持太祖募隠陳典韋先占但持長矛撩㦸時西面反急韋左手持十餘㦸大呼起所抵無不應手倒者魚豢魏略曰徐庶字元直少好任俠為人報讎白堊烏角切突面被髪而走為吏所得乃感激弃其刀㦸更絹巾單衣折節學問吳志曰孫權拜諸葛恪丹陽太守授􅙶㦸武騎作鼓吹導引歸家又曰太史慈劉繇使循騎卒遇孫䇿慈便前鬭政與對策刺慈馬以攬慈項上手虎慈亦得策兠鍪又曰孫權乗馬射虎庱亭庱攄陵切馬為虎所傷權投以雙㦸虎遂却又曰孫綝遣中書郎李崇奪孫亮璽綬徵立瑯邪王休奉書於休曰綝以薄才見授大任不能輔導陛下頃月以來多所造立親近劉承恱於美色敗壊藏中矛㦸五千餘枚以為戲具韋昭吳書曰凌統怨甘寜殺其父操常於吕蒙舍㑹酒酣統乃以刀舞寧起曰能雙㦸舞蒙曰寜雖能未若蒙之巧也因操刀持楯以身分之張勃能録曰嚴白虎使弟輿諧長沙桓王請和許之輿請與王獨㑹面約既㑹王引白削斫席輿體動王知其無能以手㦸投之立死蜀志曰兩鑲音攘是謂閇木户持雙㦸是謂坐鐵室也常據華陽國志曰荆邯記公孫述曰昔漢祖敗而復征故能禽秦亡楚以弱為强況今地方數千杖㦸百萬晉書曰賈后字南風初為太子妃性酷虐嘗手殺數人或以㦸擲孕妾子隨刃墮地帝聞之大怒廢之又曰楊駿字文長為賈后所誅初温縣有人如狂造書曰光光文長大㦸為牆毒藥雖行㦸還自傷及駿居内府以㦸為衛至兵入駿府逃于馬廐以㦸殺之又曰裴楷有知人之鑒謂鍾㑹如觀武庫森森見矛㦸在前王隠書曰上聞賈后酷虐以㦸摘諸孕子者皆墮已治室金墉城尋當廢之趙粲救於内荀朂救於外故不濟焉又曰祖逖軍大飢進據食大邱城樊雅遣六十餘人入逖營拔㦸楯大呼向逖逖軍人夜不知何賊多少皆欲散走崔鴻前趙録曰杜育字子光濮陽人少為賊其母每怒育曰天下將亂且以習膽如意望封侯不如意但不使他人斫頭魯為賊圍衣甲三重持㦸蓬轉而出又曰劉聰獵上林以愍帝行車騎將軍戎服執㦸前導觀者指曰此故長安天子崔鴻後趙録曰冉閔所乗赤馬曰朱龍日行千里左杖雙刃矛右執鈎㦸斬鮮卑三百餘級齊書曰宋升平三年尤里封人於官髙湖際得瑞靸設合切㦸三杖旁有古字隋書曰柳彧為屯田侍郎固讓弗許時制三品以上門皆列㦸僕射髙熲子宏徳封應國公申牒請㦸彧判曰僕射之子更不異居父之㦸槊已列門外尊有厭卑之義子有避父之禮豈容外門既設内閣又施事竟不行熲聞而歎伏家語曰孔子北遊登于農山之上子路子貢顔回侍側孔子曰二三子各言爾志吾將擇焉顏回曰回願得明王聖主而相之敷其五教導之禮樂使城郭不修溝池不設鑄劒㦸為農噐放牛馬於原藪室家無離曠之思千載無戰鬬之患夫子懍然曰美哉徳也陸賈楚漢春秋曰沛公脫身鴻門從問道至軍張良韓信乃謁項王軍門曰沛公使臣奉白璧一雙獻大王足下玉斗一隻獻大將軍足下亞父受玉斗置地㦸撞破之樂資春秋後傳曰聶政㧞劒至韓韓相方坐府上持兵㦸而衛侍者甚衆聶政直入上陛刺殺俠累戰國策曰蘇秦說惠王曰徒手而致利安坐而廣地雖古五帝三王五伯明主賢君常欲坐而致之其勢不能故以戰續之寛則兩軍相守迫則杖㦸相撞又曰齊王建入朝於秦雍門司馬横㦸當馬前曰所為立王者為社稷王何以去社稷而入秦王不聽遂入秦英雄記曰吕布使陳登往詣曹操求徐州牧不得登還布怒㧞㦸斫几曰凡吾所求無獲但為卿父子所賣耳登不為動容徐對曰登見曹公言養將軍譬如養虎當飽其肉不飽則將噬人公曰不如卿言譬如養鷹飢則為用飽則颺去其言如此布意乃止王隆漢官解詁曰衛尉宫闕周廬殿掖屯陳夾道當兵交㦸應劭漢官儀曰舊制太子食湯沐十縣家合領主自有官置周衛交㦸五日一朝因坐東廂省視膳食東方朔傳曰武帝坐未央前殿天雨新止朔執㦸在殿陛遥指獨語上見呼問之朔對曰殿後栢樹上有鵲立枯枝上東向鳴上遣侍中視之如朔言上問何以知之朔曰風從東來鵲尾旁風則傾背風則蹷必當順風而立故知東向鳴也新雨生枝滑故枝澁故立枯枝上上大笑賜帛十疋又曰孝武元封三年作栢梁臺召羣臣有能為七言者乃得上坐衛尉交㦸禁不時陳壽益部耆舊傳張覇遷㑹稽太守是後盜賊衰少野無遺冦童謡曰弃若㦸弃若矛盜賊盡吏皆休蕭廣濟孝子傳曰魏陽不知何處人獨與父居父有刀㦸市南少年求之陽曰老父所服不敢相許少年怒道逢陽父打陽叩頭請罪父没陽斷少年頭以謝父冡前師覺授孝子傳曰仲子崔者仲由之子也子路仕衛赴蒯聵之亂衛人孟黶遂殺之子崔既長欲報父讎黶知之曰夫君子不掩人之不備須後日於城西决戰其日黶持蒲弓木㦸與崔戰而死張敞晋東宫舊事曰東列崇福門門各羗楯十幡鷄鳴㦸十張太平御覽卷三百五十二
