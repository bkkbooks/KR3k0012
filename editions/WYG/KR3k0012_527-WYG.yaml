body:
  text: 太平御覽卷五百二十七宋李昉等撰禮儀部六郊丘尚書召誥曰若翼日乙卯周公朝至于洛則逹觀于新邑營越三日丁巳用牲于郊牛二周書作雒曰乃設兆于南郊祀以上帝配以后稷農星先王皆與食毛詩昊天有成命曰昊天有成命郊祀天地也昊天有成命二后受之成王不敢康夙夜基命宥密昊大也昊天有成命者言周自后稷之生而已有成命也文王武王受其業施行道徳成此王功周禮春官大宗伯之職曰以禋祀昊天上帝禋之言烟也烟者周人尚臭烟氣之臭聞昊天上帝冬至日祀于圜丘天皇大帝也以實柴祀日月星辰星經星緯星也辰日月所㑹十二次也以槱燎祀司中司命風師雨師槱積也司中文昌宫中星也鄭云司中司命文昌第四第五星也風師箕星也雨師畢星也又春官上宗伯曰蒼璧禮天鄭𤣥曰禮天以冬至日謂天皇大帝在北極者凡禮神必以其類璧圓以象天黄琮禮地禮地以夏至日謂神在崑崙者琮方以象地又春官上典瑞曰四圭有邸以祀天以旅上帝鄭衆注曰於中央為璧圭著四面一玉俱成也故曰四圭有邸圭末四出也或說四圭有邸圭四角也上帝𤣥天也鄭𤣥注云禮天夏正郊天也上帝五帝也所郊以五帝殊言天者尊異之至兩圭有邸以祀地以旅四望兩圭者象地數二也謂所祀於北郊神州之神又春官下大司樂曰大司樂奏黄鐘歌大呂舞雲門以祀天神天神謂五帝及日月星辰也王者各以夏正月祀其受命之帝於南郊奏太簇歌應鐘舞咸池以祭地祇地祇祭於北郊謂神州之神及社稷靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬至日於地上之圜丘奏之若樂六變則天神皆降可得而禮矣天神主百神靈鼔靈鼗孤竹之管空桑之琴瑟咸池之舞夏至日於澤中之方丘奏之若樂八變而地祇皆出可得而禮矣地祇主崑崙禮記禮運曰孔子曰魯之郊禘非禮也周公其衰矣杞之郊也禹也宋之郊也契也是天子之事守也先祖法度子孫所常守也故天子祭天地諸侯祭社稷祝嘏莫敢易其常古是謂大假又禮運曰祭帝于郊所以定天位也祀社于國所以列地利也又郊特牲曰郊之祭也迎長日之至也大報天而主日也兆於南郊就陽位也掃地而祭於其質也器用陶匏以象天地之性也於郊故謂之郊用騂尚赤也用犢貴誠也尚赤者周也郊之用辛也自周之始郊日以至言日以至周郊天之月而日至陽氣新用事順之卜郊受命于祖廟作龜于禰宮尊祖親考之義也郊所以明天道也萬物本乎天人本乎祖此所以配上帝也郊之祭也大報本反始也又明堂位曰成王封周公于魯命魯公世世祀周公以天子之禮樂是以魯君孟春乘大輅載孤韣斾十有二旒日月之章祀帝于郊配以后稷天子之禮也又大傳曰禮不王不禘王者禘其祖之所自出以其祖配之又祭法曰有虞氏禘黄帝而郊嚳祖顓頊而宗堯夏后氏亦禘黄帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊契祖文王而宗武王鄭𤣥注曰禘郊祖宗謂祭祀以配食此禘謂祭昊天于圓丘又祭義曰郊之祭大報天而主日配以月夏后氏祭其闇殷人祭其陽周人祭日以朝及闇祭日於壇祭月於坎以别幽明以制上下祭日於東祭月於西以别外内以端其位日出於東日生於西隂陽長短終始相廵以致天下之和天下之禮致反始也致鬼神也致和用也致義也致讓也禮含文嘉曰五祀南郊北郊西郊東郊中兆正謀五者天子公侯伯子男卿大夫士所以承天也禮記外傳曰王者冬至之日祭昊天上帝於圜丘冬至一陽生非人力為之丘自然髙大也諸侯不祭天王肅云天惟一帝鄭𤣥以天有六帝周禮云祀昊天又旅五帝是六星辰之位列于壇下燔牲玉于壇上又曰夏至日祭皇祇地于方澤配以后土立冬之日祭神州地祇于北郊配以后稷此周制也左傳襄上曰三卜郊不從乃免牲孟獻子曰吾今而後知有卜筮夫郊祀后稷以祈農事是故啓蟄後郊郊而後耕今既耕而後卜郊宜其不從也榖梁傳曰宣公郊牛之口傷之曰緩辭也傷自牛作也改卜牛死乃不郊春秋繁露曰王者嵗一祭天于郊天者百神之君王者所最尊也又曰春秋之義國有大䘮者止宗廟之祭而不止郊祭不止郊祭者不敢以父母之䘮廢事天之禮也孝經曰昔者周公郊祀社稷以配天宗祀文王于明堂以配上帝也五經異義曰春秋公羊説禮郊及日皆不卜常以正日上下也魯于天子並事變禮今成王命魯使卜從乃郊不從即已下天子也魯以上辛郊不敢與天子同也又曰今尚書夏侯歐陽説類祭天名也以事類祭之奈何天位在南方就南郊祭之是也五經通義曰王者所以祭天地何王者父事天母事地故以子道事之祭日以丁與辛何丁者反覆自丁寧辛者當自克新也爾雅曰祭天曰燔柴祭地曰瘞埋廣雅曰圜丘太壇祭天也方澤太圻祭地也漢書曰髙祖入闗問故秦時祀上帝何如對曰四帝有白黄青赤之祀髙祖曰我知之矣待我而具五色乃立黑帝之祠名曰黑祀又郊祀志曰遂郊雍西隴登崆峒幸甘泉令祠祀官寛舒等具太乙祠壇祠壇倣亳忌太一壇壇三垓五帝壇環居其下各如其方黄帝西南除八通鬼道太乙所用如雍五畤物而加醴棗脯之屬殺一犛牛以為俎豆牢具又郊祀志曰三年一郊秦以十月為嵗首故常以十月上宿郊見通權火權火烽也狀若桔橰以火令其光明祀所拜於咸陽之旁而衣尚白其用如經祠云又郊祀志曰武帝立后土祠于汾陽立太乙祠于甘泉祭日以牛祝宰衣赤祭月以羊祝宰衣白宣帝于成山祠日菜山祠月又郊祀志曰成帝初即位丞相衡御史大夫譚奏言祭天于南郊就陽之義也瘞地于北郊即隂之象也因其所都而各饗焉昔者文武周公郊于豐鎬成王郊于洛邑由此觀天之随王者所居而享之可見也甘泉泰畤河東后土之祠宜可徙置長安續漢書祭祀志曰建武元年光武即帝位于鎬為壇營于鄗之陽祭告天地採用元始中郊祭祀二年正月初制郊兆于洛陽城南七里依鄗採元始中故事為圜壇入陛中又為皇壇天地位其上皆南向又祭祀志曰地郊在洛陽城北四里為方壇四階二年初别祀地祇位南面西上髙皇后配西面北上皆在壇上地理羣臣從食皆在壇下東觀漢記曰上都洛陽制兆于城南七里北郊四里行夏之時時以平旦服色犧牲尚黑明火德之運常服徽熾尚赤四時隨色季夏黄色議者曰昔周公郊祀后稷以配天宗祀文王以配上帝圗䜟著伊堯赤帝之子俱與后稷並受命而為王漢劉祖令宜郊祀帝堯以配天宗祀髙祖以配上帝有司奏議曰追跡先代無郊其五運之祖者故禹不郊白帝周不郊帝嚳漢雖唐之苗裔堯以歴數命舜髙祖赤龍火德承運而起當以髙祖配堯之後元復于漢宜以修奉濟陽城陽縣堯帝之冡雲臺致敬祭祀之禮宜亦如之又曰光武中元元年起明堂辟雍靈臺及北郊謝承後漢書丹陽方儲聰明善天文為洛陽令章帝欲出南郊儲上言當有疾風暴雨乘輿不可以出疑其妄儲飲酖而死果如儲言洛陽晝暝後漢書曰光武嘗問鄭興郊祀事曰吾欲以䜟斷之興對曰臣不為䜟帝怒曰卿之不為䜟非之耶興惶恐曰臣于書有所未學而無所非也帝意乃解漢儀曰漢制天地以下羣臣所祭凡一千五百四十新益為萬五千四十漢法三嵗一祭天于雲陽宫甘泉壇以冬至日祭天神下三嵗一祭地于河陽汾隂后土天宫以夏至日祭地地神出五帝祭于雍五畤又曰祭天用六采綺席六重長一丈中有幅四周縁之玉飾器凡器七千三百物具備飬牛五嵗至三千斤又曰皇帝祭天居雲陽宫齋百日上甘泉通天臺髙三十丈以候天神之下見如流火舞女童三百人皆年八嵗天神下壇舉烽火皇帝就行宮中不至壇所甘泉臺去長安三百里望見長安城黄帝以來所祭天之圜丘也又曰祭地河東汾隂后土宫宫曲入河古之祭地澤中方丘也禮儀如祭天名汾葵一名葵丘也宋書禮志曰魏文帝黄初二年正月郊祀天地明堂是時魏都洛京而神祇兆域明堂靈臺皆因漢舊事四年帝將東廵以大軍當出使太常一以特牛告祠南郊自後以為常又禮志曰太和元年正月郊祠武皇帝以配天宗祠文皇帝于明堂以配上帝是時二漢郊禋之制具存魏所損益可知也又禮志曰魏景初元年始營洛陽南委粟山為圜丘詔曰昔漢氏之初承秦滅學之後採摭殘缺以備郊祀自甘泉后土雍宫五祠神祇兆位多不輕見並以興廢無常以彼至此四百餘年廢無禘禮古代之所更立者遂有缺焉曹氏世系出自有虞氏今祭圜丘以始祖帝舜配地以武妃伊氏配天郊所祀曰皇天之神以太祖武皇帝配地郊所祭曰皇地之祇以武宣皇后配宗祀皇考髙祖文皇帝于明堂以配上帝江表傳曰羣臣以孫權未郊祀奏議曰頃者嘉瑞屢臻逺國慕義宜備郊祀以承天意權曰郊祀當于中土今非其所于何施此從臣復奏曰普天之下莫非王土王者以天下為家周文武郊酆鎬非必中土權曰武王伐紂即非鎬京而郊其所也文王未為天子立郊于酆見何經典復奏曰伏見漢書郊祀志匡衡奏徙甘泉河東郊于長安言文王郊于酆權曰文王至徳謙讓處諸侯之位明未郊也經傳無明文匡衡俗儒臆說非典籍正義不可用志林曰呉主糾駁祭祀之奏追貶匡衡謂之俗儒凡在見者莫不嘅然以為妙進聰理達于事宜至于稽之典籍乃更不通毛氏之說曰堯見天因以邰而生后稷故國之于邰命使事天故詩曰后稷肈祀庶無罪悔以迄于今言自后稷以來皆得祭天猶魯人郊祀也是以棫樸之作有積燎之薪文王郊酆經有明文匡衡豈俗而妄言哉文王雖未為天子然三分天下有二伐崇勘黎祖伊奔告天既棄殷乃眷西顧太伯三讓以有天下文王為王于義何疑然則匡衡之奏有所未盡案世宗立甘泉汾隂之祠皆出方士之言非經無據者也方士以甘泉汾隂黄帝祭天地之處故教武帝因之遂立二畤漢治長安而甘泉在此謂就乾位而衡云武帝居甘泉祭于其宫南北既誤矣祭地汾隂在水之間呼為澤中而衡云東之沙陽失其本意矣晉起居注曰武帝泰始元年十月太常諸葛緒上言博士祭酒劉喜等議曰帝王各尊其祖所自出大晉禮天郊當以宣皇帝配地郊宣皇后配明堂當以景皇帝文皇帝配博士孔晁議禮王者郊天以其祖配是以周公以后稷配天于南郊以文王配五精上帝于明堂經典無配地文魏以先妃配不合禮制周配祭不及武王禮制有斷今晉郊天宜以宣皇帝配明堂宜以文皇帝配有司奏大晉初建庶事未定且如魏詔郊祀大事速議為定晉書禮志曰晉太始二年詔羣臣議五帝即天也王氣時異故殊其號名雖有五其實一神明堂南郊宜除五帝之坐五郊改五精之號同昊天上帝各設一坐而已又禮志曰康帝建元元年正月將北郊有疑議太常顧和表北郊之月古無明文漢光武正月辛未始建北郊則與南郊同月元和中北郊同共正月周禮三王之郊一用夏正于是從和議是月辛未南郊辛巳北郊帝皆親奉晉書禮志曰晉孝武帝詔曰郊祀國之大事而稽古之制闕然便可詳議祠部郎徐邈議圜丘郊祀經典無二宣皇帝嘗辨斯義而檢聖典爰及中興備加研極以是南北二郊誠非異學所可輕改也仍舊為安晉起居注曰明帝太寧三年上親祀七月又詔自中興以來雖南郊未嘗北郊五嶽四凟名山大川應望秩者廢而未舉居其官者舉其職司其事而令一代之典闕而不備主者詳依舊處又曰安帝元興三年十二月明年應郊乗輿未反博訪内外議者謂應郊故承制中事左丞王納之議謂大享大祀大樂皆是承制不可得命三公行者郊天極尊惟一而已故非天子不祀也又按武皇受禪受命用二月郊元年中興亦以二月郊今郊時未過日望鸞駕無為欲速而遽皇輿旋反更不得親奉不如緩而盡美于是異同難明帝遂從納之議宋書禮志曰晉大始二年十一月有司又議古者邱郊不異宜併圜丘方丘于南北郊更修治壇兆其二至之祀合于二郊帝又從之一如宣帝所用王肅議也是月庚寅冬至帝親祀圜丘于南自後圜丘方澤不别立又曰孫權始都武昌及建業不從郊祀至末太元元年十一月祭南郊其地今秣陵縣南十餘里郊中是也晉氏南遷立南郊于已地非禮所謂陽位之義也宋武大明三年尚書右丞徐爰謂郊祀之位逺古肇開禮記燔柴于泰壇祭天也兆于南郊就陽位也漢初甘泉河東禋埋易位終亦徙于長安南北光武紹作定二郊洛陽南北晉氏過江悉在北及郊兆之議紛然不一又南郊道狹未議開闢遂于東南已地創立丘壇皇宋受命因而弗改且居民之中非邑外之謂今聖圖重造舊典畢新南驛開塗陽路修逺謂以郊正午以定天位博士司馬興之傅郁太常丞陸澄並同爰議乃移郊兆于秣陵牛頭山西正在宮之午位也傅𤣥正都賦曰建乎禋祀祈福上帝天子乃反古服襲大裘綖紐五綵平冕垂旒質文彬彬帝容孔修列大駕于郊畛升八通之靈壇執鎮珪而進蒼璧思致美乎上乾爾乃太簇為徵黄鐘為宫吹孤竹而拊雲和修軒轅之遺風類于圜丘六變既終則天神斯降可得而禮矣司馬相如封禪書曰濯濯之麟游彼靈畤孟冬十月冬徂郊祀馳我君車帝以享祉郭璞上疏曰臣嵗首粗有所占得解之既濟案解卦繇云君子以赦過宥罪既濟云思患而預防之郊祀者以通天人之誠感因農祥而祈事上乃致敬于黄靈下以播惠于黎民者也臣愚以為于卦之義既郊之後宜發哀矜之詔引在予之責務除瑕釁贊揚布惠使幽弊之民應養生以恱育否滯之氣隨谷風而舒散此亦寄時事以制用藉開塞而曲成者也太平御覽卷五百二十七
