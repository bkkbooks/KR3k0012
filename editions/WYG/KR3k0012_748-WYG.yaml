front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_748-1a, image: WYG0899/WYG0899-0571c.png}
body:
  text: 太平御覽卷七百四十八宋李昉等撰工藝部五書中王右軍題衛夫人筆陣圗後曰夫紙者陣也筆者刀弰也墨者鍪甲也水硯者城池也心意者將軍也本領者將副也結構者謀畫也颺筆者吉凶也出入者號令也屈折者殺戮也夫欲書者先乾研墨凝神靜思預想字形大小偃仰平直振動令筋脉相連意在筆前然後作字若平直相似状如筭子便不是書但得其㸃畫耳昔宋翼常作此書翼鍾繇之弟子乃咄之翼三年不敢見繇潜心改跡每畫一波常三過折筆每作一㸃常隠鋒而為之衛夫人筆陣圗曰若初學書先須大書不得從小善鑒者不寫善寫者不鑒多骨微肉者筋書多肉微骨者墨猪多力豐筋者聖無力無筋者病一一從其消息而用之王僧䖍論書曰王平南廙是右軍之叔自過江東右軍之前唯廙為最畫為晉明帝師書為右軍法又曰中書令王珉筆力過於子敬書舊品云有四疋素絹朝操筆至暮便竟首尾如一又無誤字子敬戲云弟書如騎騾駸駸常欲度驊騮前又曰鍾公之書謂之盡妙鍾有三體一曰銘石書最妙者也二曰章程書世傳祕書教小學者也三曰行狎書相聞者也三法皆世人所善虞龢論書曰晉謝奉起廟悉用棐材右軍取棐書之滿牀奉收得一大簣子敬後往謝奉為説右軍書甚佳而密已削作數十棐板請子敬書之亦甚佳奉並珍録後孫履分半與桓𤣥用履為楊州主簿餘一半孫恩破㑹稽畧之以去又曰晉時有一好事少年故作精白紗裓衣著詣子敬子敬便取書之草正諸體悉備兩袖及褾略周少年覺王左右有陵奪之色制祴而走左右果逐之及門外鬭争分裂少年纔得一袖耳梁武帝觀繇書法曰子敬不迨逸少猶逸少不迨元常學子敬者如畫虎也學元常者比畫龍也又曰夫運筆邪則無芒角執手寛則書緩弱㸃掣短則法臃腫㸃掣長則法離澌畫促則字横畫踈則形慢拘則乏勢放又少則純骨無媚純肉無力少墨浮澁多墨笨鈍此並任之自然之理也庾元威論書曰余為書十牒屏風書作百體間以采墨當時衆所驚異自爾絶筆唯留草本而已百體者懸針書秦望書汲冡書金鵲書玉文書鵠頭書虎爪書例薤書偃波書幡信書制書列書日書風書雲書科斗署書胡書蓬書相書天竺書轉宿書一筆篆𨽻飛白章草古文𨽻横書楷書小科𨽻芝英𨽻花草𨽻幡信𨽻鍾皷𨽻龍虎篆鳳魚篆麒麟篆仙人篆科斗篆雲篆魚篆鳥篆龍龜篆虎篆鸞篆龍虎𨽻鳯魚𨽻麒麟𨽻仙人𨽻科斗𨽻雲𨽻蟲𨽻魚𨽻鳥𨽻龍龜𨽻虎𨽻鸞𨽻龍書龜文書䑕書牛書龍書虎書草書兔書龍草書蛇草書馬書羊書猴書鷄書犬書豕書已上皆采色其外復有大篆小篆銘鼎摹印刻符石經象形篇章震書到書反左書等九體書所謂縑素書簡奏書牋表書行狎書檝書蒿書半草全草書此九法及真草之次第焉刪捨之外所存猶一百二十體袁昂古今書評曰王右軍書如謝家子弟縱復不端正者爽爽有一種風氣王子敬書如河洛間少年雖皆充悦而舉體沓拖殊不可耐羊欣書如大家婢為夫人雖處其位而舉止羞澁終不似真徐淮南書如南岡士大夫徒好尚風範終不免寒乞阮研書如貴冑失品次不能復排突英賢王儀同書如晉安帝非不處尊位而都無神明施肩吾書如新亭傖父一往見揚州人共語音態便出陶隠居書如吳興小兒形雖未成長而骨體甚駿快殷鈞書如髙麗使人抗浪甚有意氣滋韻終乏精味袁崧書如深山道士見人便欲退縮蕭子雲書如上林春花無處不發曹喜書如經論道人言不可絶崔子玉書如危峯阻日孤松一枝有絶望之意師宜官書如鵰羽未息翩翩自逝韋誕書如龍威虎振劔抜弩張蔡邕書骨氣洞達爽爽有神鍾司徒書字十二種意外殊妙實亦多奇邯鄲淳書應規入矩方圎乃成張伯英書如漢武帝愛道憑虛欲仙索靖書如飄風忽舉鷙鳥乍飛皇象書如歌聲繞梁琴人捨徽衛恒書如挿花美人舞笑鏡臺孟光禄書如崩山絶崖人見可畏張芝驚奇鍾繇特絶逸少鼎能獻之冠世四英共類洪芳不滅羊真孔草蕭行范篆各一時妙絶鍾繇書若飛鴻戲海舞鶴遊天行間茂密實亦難過蕭思話書走墨連綿字勢屈强若龍跳天門虎臥鳯闕薄紹之書字勢蹉跎如舞妓低腰仙人嘯樹江式論書表曰秦有八體一曰大二曰小三曰刻符四曰蟲篆五曰摹印六曰署書七曰殳書八曰𨽻書又曰漢時有六書一曰古文孔子壁中書也二曰奇字即古文而異者也三曰篆書云小篆也四曰佐書秦𨽻書也五曰繆篆所以摹印也六曰鳥蟲所以書幡信也李嗣真書後品曰蟲篆者小學之所宗草𨽻者士人之所尚近代君子故多好之或時有可觀耳武平一徐氏法書記曰梁大同中武帝勑周興嗣撰千字文使殷鐵石模次羲之之迹以賜八王徐浩論書曰初學之際宜先筋骨筋骨不立肉何所附用筆之勢特須藏鋒鋒若不藏字則有病病且未去能何有焉字不欲踈亦不欲宻亦不欲大亦不欲小小長令大大蹙令小疎肥令密密瘦令疎斯其大經矣筆不欲捷亦不欲徐亦不欲平亦不欲側側豎令平平竣使側捷則須定徐則須利如此則其大較矣徐浩古跡記曰中宗時中書令宗楚客奏事承恩乃乞大小二王真迹勅賜二十卷大小各十軸楚客遂装作十二扇屏風以禇遂良閑居賦枯樹賦為脚大㑹貴要張以示之時薛稷崔湜盧蔵用廢食歎美復不晏樂何延之蘭亭記曰蘭亭者晉右軍㑹稽内史瑯琊王羲之字逸少所書之詩序也右軍蟬聨美胄蕭散名賢雅好山水尤善草𨽻以晉穆帝永和九年暮春三月三日宦遊山隂與太原孫綽興公廣漢王彬之并逸少子凝徽操之等四十有一人修祓禊之禮揮毫製序興樂而書用蠶繭紙䑕鬚筆遒媚勁徤絶代更無凡二十八行三百二十四字字有重者皆搆别體就中之字最多乃有二十四字許箇變轉悉異遂無同者其時乃有神助及醒後他日更書數十百本終無如祓禊所書之者右軍亦自珍愛寳重此書留付子孫傳掌至七代孫智永永即右軍第五子徽之之後掌其書為蕭翼紿而取之又曰右軍孫僧智永常居永欣寺閣上臨書所退筆頭置之於大竹簏簏受一石餘而五簏皆滿凡二十年於閣上臨得真草千字文好者八百餘本浙江惠諸寺各施一本今有好者猶直錢數萬張懐瓘書詁曰文質相法立其三估貴賤殊品置其五等三估者篆籕為上估鍾張為中估羲獻為下估又曰崔張玉也逸少金也大賈則貴玉小商則重其金膚淺之人多任其耳但知王書為最真草一槩畧無差殊張懐瓘二王等書録曰承聖末魏師襲荆州元帝將降其夜乃聚古今圗書十四萬卷并大小二王跡遣後閣舎人髙善寳焚之吳越寳劔並將斫柱乃歎曰蕭世誠遂至於此文武之道今夜窮乎厯代秘寳並為煨燼矣張懐瓘書議曰其真書逸少第一元常第二世将第三子敬第四士季第五文舒第六茂𢎞第七其行書逸少第一子敬第二元常第三伯瑛第四伯玉第五季琰第六敬和第七茂𢎞第八安石第九章草子玉第一伯瑛第二㓜安第三伯玉第四逸少第五士季第六子敬第七休明第八其草書伯瑛剏立規範得物象之形均造化之理然其法太古質不剖斷以此為少也有椎輪草意之妙後學得漁獵其中宜為第一叔夜第二子敬第三處冲第四世将第五仲將第六士季第七逸少第八張懐瓘叙書法曰太宗自真草書屏風以示羣臣筆力遒勁為一時之絶嘗謂朝臣曰書學小道功非急務時或留心猶勝棄日凡諸藝業未有學而不得者也韋述書法記曰太宗貞觀中捜訪王右軍等真跡出御府金帛重為購賞由是人間古本紛然畢進書斷曰鍾繇字元常尤善書師曹喜蔡邕劉徳昇真書光妙乃過於師剛柔備矣㸃畫之間多有異趣雖神明不備可謂幽深無際而古雅有餘秦漢以來一人而已求其盡善盡美則狐裘而有羔袖其行書羲之之亞草書則索衛之下八分則有魏受禪碑稱此為最也又曰晉韋昶字文休太元中孝武帝改治宫室及廟諸門並欲使王獻之𨽻書題榜獻之固辭乃使劉瓌以八分書之後又使文休以大篆改八分焉或問王右軍父子書君以為如何答曰二王自可謂能未足知書也又文休妙于作筆王子敬得其筆歎為絶世又曰晉薄紹之字敬叔丹陽人也官至給事中善書憲章小王風格秀異若干将出匣光芒射人書斷曰晉太康中新起太極殿謝安欲使子敬題榜以為萬代寳而難言之乃說韋仲將題凌雲臺事子敬知其㫖乃正色曰仲将魏室大臣寧有此事使其若此知魏徳之不長安遂不之逼又曰齊王僧䖍善書孝武欲擅書名僧䖍不敢顯迹大明之世常用拙筆書以此見容又曰梁蕭子雲少善小篆草行諸體兼備而剏造小篆飛白意趣飃然㸃畫之際有若騫舉妍妙極難與比故歐陽詢云飛白張烏巾冠世其後逸少子敬又稱妙絶乃爾飛而不白蕭子雲輕灑得中蟬翼掩素逰霧崩雲可得而語其真書初學子敬晩師元常及其暮年筋骨亦備盖當世舉朝效之又曰梁庾肩吾論書云張工夫第一天然次之鍾天然第一工夫次之王工夫不及張天然過之天然不及鍾工夫過之懐瓘以為杜度章草並無所師欝然靈變為後世楷則此又天然第一也及有道變柱君章體以至草聖天然所資理可度矣池水盡墨功亦至焉隋永欣寺僧知果㑹稽人也煬帝甚善之上書嘗謂永師云和尚得右軍肉智果得骨夫筋骨蔵於膚肉山水不厭髙深書斷曰唐禇遂良善書少則服膺虞監長則祖述右軍真書得其媚趣若瑶臺青𤨏窅暎春林美人嬋娟似不任乎羅綺鈆華綽約則歐虞謝之其行草之間即居二公之後書斷曰唐髙正臣善書廣平人也嘗為人書十五紙人或戲換其五紙以示髙髙再看不悟客曰有人換公書髙乃審詳之得其紙客曰猶有在髙又觀之竟不能辯又曰唐宋令文河東陜人也官至左衛中郎將奇姿偉麗身有三絶曰書畫力尤於書備兼諸體偏意在草焉太平御覽卷七百四十八
