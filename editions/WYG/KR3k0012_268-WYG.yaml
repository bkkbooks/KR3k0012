body:
  text: 太平御覽卷二百六十八宋李昉等撰職官部六十六良令長下良令長下崔鴻十六國春秋北凉録曰張譚字元慶武威姑臧人也為和寧令政以徳化為本不務威刑民有過者讀孝經及忠臣孝子𫝊訓導之百姓愛之如父母號曰慈君又後趙録曰王謨字思賢甕鼻言不清暢尫短無威儀將拜曲陽令石勒疑之問長史張賓賓曰請試可勒從之政教嚴明百城尤最出為都部從事守宰去官者十五人北齊書曰郎茂除衛國令時有繫囚二百茂親自究審數日釋免者百餘人厯年詞訟不詣州省魏州刺史元暉謂曰長史言衞國人不敢申訴者畏明府耳茂曰人猶水也法令為隄防不固必致奔突苟無决溢使君何患哉暉無以應後周書曰辛昻行成都令昻到縣便與諸生祭文翁學堂因共歡宴謂諸生曰子孝臣忠師嚴友信立身之要如斯而已若不事斯語何以成名宜自勉克成令譽昻言切理至諸生深感悟歸而告其父老曰宰君教誡如此不可違之於是井邑肅然咸從其化陳書曰褚玠山隂縣多豪猾前後令皆以贓汙免髙宗患之謂中昌舍人蔡景厯曰稽隂大邑久無良宰卿文士之内試思其人景厯進曰褚玠㢘儉有幹用未審堪其選不髙宗曰甚善卿言與朕意同乃除山隂令隋書曰魏徳深遷貴鄉長為政清浄不言而治㑹興遼東之役徴稅百端使人往來責成郡縣于時王綱弛紊吏多贓賄所在徴斂下不堪命唯徳深一縣有無相通不竭其力所求皆給百姓不擾為大治尋轉館陶長貴鄉吏人聞之皆歔欷流涕語不成聲及将赴任傾城送之號泣之聲道路不絶既至館陶闔境老幼皆如見父母有猾人貟外郎趙君寔與郡丞元寳藏深相交結前後令長未有不受其指麾者自徳深至縣君寔屏處於室未敢輒出門逃竄之徒歸來如市貴鄉父老冐渉險難詣闕請留徳深有詔許之館陶父老復詣郡相訟以貴鄉文書為詐郡不能决㑹持莭使者韋霽杜整等至兩縣詣使訟之乃斷從貴鄉吏人歌呼滿道互相稱慶館陶衆庶合境悲哭因而居住者數百家隋書曰蘇威薦房恭懿授新豐令政為三輔之最上聞而嘉之賜物四百段恭懿以所得賜分給竆乏未幾復賜米三百石恭懿又以賑貧人上聞而止之時雍州諸縣令每朔朝謁上見恭懿必呼至榻前訪以理人之術又曰房彦謙遷長葛令甚有恵化百姓號為慈父仁夀中上令持節使者巡行州縣察長吏能不以謙彦為天下第一超授鄀州司馬吏民號哭相謂曰房明府今去吾屬何用生為其後百姓思之立碑頌徳又曰劉曠不知何許人也性謹厚每以誠恕應物開皇初為平鄉令單騎之官人有争訟者輒丁寧曉以義理不加繩劾自各引咎而去所得俸禄賑施窮乏百姓感其徳化更相篤勵曰有君如此何得為非唐書曰李大亮授土門令屬百姓饑荒盗賊侵剋大亮賣所乘馬分給貧弱勸以墾田嵗因大稔躬捕冦盗所擊輒平時太宗在藩廵撫北境聞而嗟歎下書勞之又曰賈敦頤弟敦實貞觀中為饒陽令政化清静老㓜懐之時敦頤復授瀛州刺史舊制大功以上不復連官朝廷以其兄弟在職俱有能名遂不遷替又曰髙宗以尚乘奉御權懐恩為萬年令賞能也時有奉乘安畢羅善於調馬上頗狎之懐恩因奏事遇畢羅在左右言戯無禮懐恩既退執而杖之上知而嗟賞謂侍臣曰懐恩乃能不避强禦真良吏也即日遷擢又曰景雲長安縣令李朝隐加太中大夫朝隐之宰京縣也政刑畢舉權豪懾憚有内寺以非禮干忤朝隐叱繫于獄上喜焉故有此命又曰路嗣恭京兆三原人始名劒客厯仕郡縣有能名後授神烏令考績上上而為天下最𤣥宗以其能嗣魯恭賜改其名又曰韋景駿開元中為肥鄉令縣人有母子相訟者景駿謂之曰吾少孤每見人養親自痛終天無分汝幸在温清之地何得如此錫類不行令之罪也因垂泣嗚咽取孝經與之令習讀於是母子感悟各請改悔遂稱慈孝累轉趙州刺史路由肥鄉人吏驚喜競來犒餞留連累日有童稚數人年甫十餘嵗亦在其中景駿謂曰計吾去此時汝輩未生既無舊恩何慇懃之甚也咸對曰比聞長宿𫝊說縣中廨宇學堂館舍堤橋並是明公遺跡將謂古人不意親得瞻覩不覺忻戀倍於常也其為人所思如此又曰馮伉遷尚書膳部貟外郎李抱真卒充弔贈使抱真男遺伉帛數百疋不納又轉送至京伉因表奏固請不受屬醴泉闕縣令宰臣進人名上意不可謂宰臣曰前使澤潞不受財帛者此人必有清政可以授之遂改醴泉縣令患百姓多昏猾為著諭䝉十四篇大指明忠孝仁義勸學務農每鄉給一卷俾其𫝊習又曰元徳秀字紫芝河南人也為魯山令先是墮車傷足不任趨拜汝郡守以客禮待之部人為盗吏捕之繫獄㑹縣界有猛獸為暴盗自陳曰願格殺猛獸以自贖徳秀許之胥吏曰盗詭計苟免擅放官囚無乃累乎徳秀曰吾不欲負約累則吾坐必請不及諸君即破械出之翌日格猛獸而還誠信化人大率此類又曰王敬則為暨陽令時軍後縣有一部刼逃入山中頗為人患敬則遣人致意刼帥使出首當申論郭下廟神甚酷烈百姓信之敬則引神為誓必不相負刼帥既出敬則於廟中設酒㑹於座収縛曰吾啓神若負誓還神十牛今不得違誓即殺十牛解神并斬諸刼百姓恱之晉史曰夀張令趙􅆳考滿之外量留二年以飛蝗避境故也廣州先賢傳曰黄豪字子㣲交趾人除外黄令豪約已儉節麄布蔬食所得俸秩悉賜貧吏一縣稱平益部耆舊傳曰羅衡字仲伯為萬年令誅除姦黨縣界肅然民夜不閉門繫牛馬於道傍曰以屬羅公又曰趙珜字孫明少好逰俠行部帶劍過長亭亭長譴之乃嘆曰無大志故為亭吏所輕耳於是解劍掛壁曰珜不乘輜車佩紱不復帶劍因之京師詣大學受業治春秋變行厲操名徳遂稱除野王令乃解劍帶之官治官清約以身率下煙火不舉常食乾糒又曰閻憲字孟度為綿竹令治以禮讓為首寛猛相濟其聴察甚明簡選吏職甚得其人男子杜成夜於路得遺装一嚢開視有錦二十五疋迄明詣吏曰縣有明君不能慙心故也又曰楊球字仲宣為茂陵令寛和多恵以至誠接下為民所愛比縣連嵗蝗灾曲折不入茂陵長沙耆舊傳曰祝良字邵卿為洛陽令貴戚斂手桴皷稀鳴時亢旱天子祈雨不得良乃暴身階庭告誠引罪紫雲沓起甘雨乃降陳留風俗𫝊曰昭帝時蒙人焦貢為小黄令路不拾遺囹圄空虛詔遷貢百姓揮涕守闕求索還貢天子聴増貢之秩千石令貢風化猶存其民好學多貧此其風也海内先賢傳曰公沙穆遷𢎞農令界有蝗蟲食禾稼百姓惶懼穆設壇謝曰百姓有過咎在典長罪穆之由請以身禱𤣥雲四集雨下滂沱自日中至晡不知蝗蟲所在百姓稱曰神明魯國先賢𫝊曰孔翊為洛陽令置水於庭前得私書皆投其中一無所發彈治貴戚無所􅂞避汝南先賢𫝊曰黄浮字隐公陽安人年二十在於民伍曽為墟里所差至當路亭於是感激學書慨然長嘆曰黄浮非郷里所知因隨人到京師求學嵗餘除昌慮長濮陽令同嵗子為都市掾犯罪當死一郡盡為之請浮曰周公誅二弟石碏討其子今雖同嵗子浮所不能赦也治政清明號為神君又曰陳曄邵陵人也體尚篤烈學通古今除巫令民張遺腹子年十五為父報讐吏捕得之曄愍曰嗟乎今殺遺腹之孤絶人嗣祀是不仁也去報讎之子是不義也不仁不義焉可為人君長哉遂解印綬逃亡鍾玩良吏𫝊曰髙玩字伯珎蜀郡人也除曲陽令及徴還送者不使出界布被緼裘猶去時之服朝野稱其清又曰司馬雋字元異補洛陽令豪右挫氣京都號曰卧虎又曰陳登字元龍廣漢人也為東陽令長視民如子崔氏家𫝊曰崔瑗為汲令乃為開渠造稻田薄鹵之地更為沃壤民頼其利長老歌之曰天降神明君錫我慈仁父臨民布徳澤恩恵施以序穿溝廣灌溉决渠作甘雨殷氏𫝊曰殷裒為滎陽令先多滛雨百姓饑饉君乃穿渠入河三十餘里䟽導原隰用致豐年民賴其利號殷渠而頌之鍾離意别𫝊曰意遷東平瑕丘令男子兒直勇悍有力便弓弩飛射走獸百不脫一桀悖好犯長吏意到官召署捕盗掾勅謂之云令昔嘗破三軍之衆不用尺兵嘗縛暴虎不用尺繩但以良謀為之耳掾之氣勢安若宜慎之因復召直子渉署門下將游徼私出入寺門無所闗白収渉鞭之直走之寺門吹氣大言言無上下意勅直能為子屈者自縛誡令不則鞭殺其子直果自縛意告曰令前告汝嘗縛暴虎不用尺繩汝自視何如虎自縛耶勅獄械直父子結連其頭對榜博壮切欲死掾吏陳諌乃貸之由是相率為善所謂上徳之政鷹化為鳩暴虎成狸此之謂也荀氏家𫝊曰荀貎除太原榆次令為政以徳人懐之時有鳯凰集其境内晉武帝下詔褒美太始三年卒吏人如䘮親戚為之樹碑其序曰仰之如日月敬之如神明愛之如父母樂之如時雨典略曰韓攸字仲潢潁川人為羸長時民大饑而太守未至攸因發食賑之吏白言太守垂至軍粮重事可湏來到攸言民命懸急令以擅出榖受罪合眼入地不以為恨也後竟不坐吏民䝉濟者數千人㑹稽典録曰徐𢎞字聖通為山隂令縣俗剛強大姓兼并𢎞到官誅剪姦桀豪右斂手商旅路宿道不拾遺童歌之曰徐聖通政無雙平刑罰姦宄空華陽國志曰王長文字徳雋元康初試守江源令縣収得盗馬賊及發塜賊長文引見誘慰時適臘晦皆遣歸家獄先有繫囚亦遣之謂曰教化不厚使汝等如此長吏之過也蜡節慶祚歸就汝上下善相懽樂過節來還當為汝思他理郡吏惶懼争請不許尋有赦令無不感恩又曰景毅字文堅梓潼人為髙陵令有文學以禮讓化民遷侍御史吏民守闕請之三年不絶捜神記曰徐栩字敬卿吳由拳人少為獄吏執法詳平為小黄令時屬縣大蝗野無生草小黄界飛過不集山公啓事曰温令許竒等並見稱名雖在職各日淺宜顯報大郡以勸天下詔曰案其資厯悉自足為郡守各以在職日淺則宜盡其政績不宜速他轉也博物志曰太公望為灌壇令期年風不鳴條文王夢見一婦人甚麗當道而哭問其故婦人言曰我東海太山神女嫁為西海婦欲東歸灌壇令當吾道太公有徳吾不敢以暴風疾雨過也文王夢覺明日召太公三日果有疾風暴雨去者皆西來也說苑曰晏子治東阿三年景公召而數之曰吾以子為可而使子治東阿今子治而亂子退而自察也寡人将加大誅乎晏子曰臣請改過易行而治東阿三年不治臣請死之景公許之於是明年上計景公迎而賀之曰善矣子之治東阿也晏子對曰前臣之治東阿屬託不行貨賂不至陂池之魚以利貧民當此之時民無饑者而君反以罪今臣之治東阿也屬託行貨賂至事左右陂池之魚入權家民之貧饑者過半君反迎而賀臣臣願乞骸骨景公乃下席而謝曰子強復治之東阿者子之東阿也寡人無復與焉新序曰昔子竒年十八齊君使之治阿既行矣悔之使使追曰未至阿及之還之已至勿還也使者及之而不還君問其故對曰臣見所與共載者白首也夫以老者之智以少者之决必能治阿矣是以不還又曰魯君使宓子賤為單父宰子賤辭去因請借善書者二人書其憲法教品魯君與之至單父使書子賤從旁引其肘書醜則怒之欲好則引之書者患之請辭而去歸以告魯君曰子賤苦吾擾之使不得施其善政也乃命有司無得擅徴發單父單父大治故孔子曰君子哉若人尚徳哉若人魯無君子者斯焉取斯美其徳也太平御覽卷二百六十八
