  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_003-1a, image: WYG0893/WYG0893-0055c.png}
body:
  text: 太平御覽卷三宋李昉等撰天部三日上日上說文云日者實也太陽之精不虧字從一象形也又君象也易曰離為日又日中則昃又日以暄之又日月運行一寒一暑又隂陽之義配日月又懸象著明莫大乎日月又日月之道貞明者也又日中為市致天下之民聚天下之貨又日徃則月來月徃則日來日月相推而明生焉又日昃之離不皷缶而歌則大耋之嗟凶又豐卦曰豐亨王假之勿憂宜日中宜照天下也又日月麗乎天又日月得天而能乆照書曰寅賔出日平秩東作日中星鳥以殷仲春又日永星火以正仲夏日短星昴以正仲冬又寅餞納日平秩西成宵中星虛以殷仲秋詩曰其雨其雨杲杲出日又謂予不信有如皎日又嗈嗈鳴鴈旭日始旦又日之夕矣羊牛下來又日居月諸照臨下土又春日遲遲采蘩祁祁禮曰二月中氣祀朝日於東郊又𤣥端而朝日於東門之外又天無二日土無二王又季冬是月也日窮于次月窮于紀又五月中氣是月也日長至十一月日短至周禮春官眡祲掌十煇之灋以觀妖祥辨吉凶一曰祲二曰象三曰䥴四曰監五曰闇六曰瞢七曰彌八曰叙九曰隮十曰想又大司徒以土圭之法測土深正日景以求地中日南則景短多暑日北則景長多寒傳曰酆舒問於賈季曰趙衰趙盾孰賢對曰趙衰冬日之日也趙盾夏日之日也注曰冬日可愛夏日可畏又哀公六年楚有雲如衆赤鳥夾日以飛三日楚子使問周太史曰其當王身若禜之可移於令尹司馬王曰除腹心之疾置之股肱何益王弗禜而死孔子曰昭王其不失國也宜哉爾雅曰觚竹北户西王母日下謂之四荒也郭璞注曰日下在西方昏荒之國也又岠齊州以南戴日為丹穴岠去也齊中也東至日所出為泰平西至日所入為泰蒙易坤靈圖曰至徳之萌日月若連璧易叅同契曰日為流珠青龍之俱日為陽陽精為流珠青龍東方少陽也尚書考靈曜曰黑帝亡二日並照又仲春仲秋日出於卯入於酉仲夏日出於寅入於戌仲冬日出於辰入於申又日光臨照四十萬六千里春秋感精符曰羣臣恣則日黄無光羣臣爭則日裂人主排斥則日夜出春秋元命苞曰陽數起於一成於三故日中有三足烏又一嵗三百六十五日四分度之一言陽布散立數合一故立字四合其一又日左行周天二十三萬里又七政度日月明春秋内事曰日者陽徳之母也禮統曰日者實也形體光實人君之象禮斗威儀曰政太平則日五色政公平則日黄中而赤暈政和平則日黄中而黒暈政象平則日黄中而白暈政升平則日黄中而青暈孝經援神契曰天地至貴精不兩明注天精為日地精為月又日中則光濫又日神五色明照四方又黄氣抱日輔臣忠徳至於天日抱戴易傳曰聖王在上則日光明而五色備又日者衆陽之精内明𤣥黄五色無主以象人君精精似青翼翼似黒𤣥𤣥似赤縞縞似白煌煌似黄光照無主不可以一色名也劉向洪範傳曰日者昭明之大表光景之大紀羣陽之精衆貴之象也故曰日出而天下光明日入而天下𠖇晦此其效也故日者天之象凡君父夫之類中國之應也明王之踐位羣賢履職天下和平黎民康寧則日麗其精明揚其景耀抱珥重光以見吉祥君獲慶賀劉昭幼童傳曰晉明帝諱紹元帝子初元帝為江東都督鎮揚州時中原喪亂有人從長安來帝問洛下消息澘然流涕帝年數嵗問泣故具以東渡意告之因問帝汝意謂長安何如日逺答曰不聞人從日邊來只聞人從長安來居然可知帝異之明日集羣臣筵㑹說以此答明帝又以為日近帝動容問何故異昨日之言答曰舉頭不見長安只見日以是知近帝大悅搜神記曰吳孫堅夫人懐孫策夢日入懐解道康地記曰齊有不夜城蓋古者有日夜中照於東境故萊子立此城以不夜為名七聖記曰鬰華赤文與日同居結隣黄文與月同居鬰華日精結隣月精莊子曰陽燧見日則燃為火金也摩拭令熱便置日中以艾就之火生又孔子圍於陳蔡太公任弔之曰子其昭昭如掲日月而行故不免又日出東方入於西極有目有距者待是而後成功又至人神矣乘雲氣騎日月淮南子曰日出於暘谷浴於咸池拂於扶桑是謂晨明登於扶桑之上扶桑東方之野爰始將行是謂朏音斐明至于曲阿曲阿山名是謂朝明臨于曽泉曽重也早食時在東方多水之地故曰曽泉是謂早食次于桑野是謂晏食臻于衡陽是謂禺中對于昆吾昆吾丘在南方是謂正中靡于鳥次鳥次西南方之山也是謂小遷至于悲谷悲谷西南方之大壑是謂晡時廻於女紀女紀西方隂地是謂大遷經于隅泉是謂髙舂言尚未𠖇上蒙先舂曰髙舂頓於連爛石是謂下舂連石西北山名言將欲𠖇下蒙悉舂故曰下舂爰止羲和爰息六螭是謂懸車六螭即六龍也薄於虞泉是謂黄昏淪于蒙谷是謂定昏日入崦嵫經細桞細桞西方之野入虞泉之池曙於蒙谷之浦蒙谷蒙汜之水西垂景在樹端謂之桑榆言其光在桑榆樹上又日中有踆七論切烏踆者趾也謂三足烏又若木在建木西末有十日其華照地髙誘注曰末端也若木端有十日狀如連珠華光照其下地又日者陽之主是以春夏則羣獸除角又堯時十日並出草木焦枯堯命羿仰射十日其九烏皆死墮羽翼又曰積陽之熱氣生火火氣之精者為日列子曰宋有田夫曝日於野美之不識廣厦綿縞之屬謂其妻曰吾負日之暄以獻吾君將獲重賞又穆王駕八駿之乘西觀日所入處又日積氣之中有光耀者又孔子晨遊見兩小兒爭辯而鬭孔子問其故一兒曰我以日始出時去人近日中時去人逺一兒曰我以為日初出時逺而日中時近曰爾何以知曰日初出大如車輪及中纔如盤盂此不為逺者小而近者大乎一兒曰日初出蒼蒼涼涼及其中如探湯此不為近者熱而逺者涼乎孔子不能决兩兒笑曰孰謂汝多知乎文子曰日出於地萬物蕃息尸子曰日五色陽之精象君徳也五色照耀君乘土而王又少昊金天氏邑於窮桑日五色互照窮桑又聖人以日圓盈尺光滿天下聖人居室而所燭彌綸六合又火在井中不能燭逺目在足下不可以視遠君之於國也猶天之有日居不髙則不明視不尊則不逺又聖人身猶日也夫日圜尺光盈天地聖人之身小其所燭逺矣任子曰日月為天下眼目人不知徳山川為天下衣食人不能謝符子曰盛魄重輪六合俱照非日月能乎吕氏春秋曰白水之南建木之下日中無影盖天地中也賈誼書曰周文王問鬻子曰敢問君子將入其職則於其民何如對曰君子將入其職則於其民也旭旭然如日之始出也既入其職則於其民也暵暵然如日之正中也既去其職則於其民也暗暗然如日之已入也故君子將入而旭旭者義先聞也既入而暵暵者民保其福也既去而暗暗者民失其教也文王曰受命矣暵音漢又曰湯曰學聖王之道譬其如日靜居而獨思譬其若火夫捨學聖王之道而靜居獨思譬其去日之明於庭而就火之光於室也然以小見不可以大知山海經曰東南海之外甘水之間有羲和之國有女子名曰羲和方浴日於甘淵羲和者帝俊之妻生十日郭璞註言生十子各以日名名之故言生十日堯因此立羲和之官以主四時又曰大荒之中有谷曰温源谷温源即湯谷也湯谷上有扶木扶桑在上一日方至一日方出言交㑹相代也皆載於烏中有三足烏又曰明星山日月所出又曰猗天山蘇門山日月所出又曰湯谷上有扶桑扶桑木也十日所浴九日居下枝一日居上枝又曰夸父逐日渇飲河渭不足北飲大澤未至道渇而死棄其杖化為鄧林又曰泑泑音黝黒之黝山神蓐収居之是山也西望日之所入其氣員日形員故其氣象亦然也神紅光之所司也未聞其狀汲冡周書曰本有十日迭次而出運照無窮堯時為妖十日並出太𤣥經曰日動而東天動而西天日錯行隂陽更廵錯違也廵行也又曰日一南而萬物死日一北而萬物生升北而萬物虛升南而萬物盈升之南也右行而左還升之北也左行而右還或左或右或死或生纂要曰日光曰景星月之光通謂之景日影曰晷出氣曰晛晛乃見切詩見晛曰消晛日氣日初出曰旭日昕曰晞大明曰昕詩曰匪陽不晞晞乾也言日所乾濕物也日温曰煦在午曰亭午在未曰昳日晩曰旰日將落曰薄暮日西落光返照於東謂之反景景在上曰反景在下曰倒景白虎通曰日行遲月行疾日行一度月行十三度十九分度之七日月徑皆千里雜占書曰日冠者如半暈也法當在日上有冠又有兩珥尤吉廣雅曰日名輝靈一名朱明一名東君一名大明亦名陽烏日御曰羲和范子計然曰日者寸也月者尺也尺者紀度而成數也寸者制萬物隂陽之短長也又曰日者火精也火者外景主晝居晝而為明處照而有光又曰日者行天日一度終而復始如環無端說苑曰師曠對晉平公曰少而學者如日出之光壯而學者如日中之光老而學者如秉燭夜行太平御覽卷三
