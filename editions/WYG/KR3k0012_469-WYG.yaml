  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_469-1a, image: WYG0897/WYG0897-0280a.png}
body:
  text: 太平御覽卷四百六十九宋李昉等撰人事部一百一十憂下懼憂下韓詩曰黍離伯封作也彼黍離離彼稷之苖離離黍貌也詩人求亡不得憂懣不識於物視彼黍離離然憂甚之時反以為稷之苖乃自知憂之甚也韓詩外傳曰魯監門之女嬰相從績之中夜而泣涕其偶曰子何為泣嬰曰吾聞衛世子不肖是以泣也偶曰衛世子不肖諸侯之憂也子獨泣為嬰曰禍相及也今衛世子甚不肖好兵吾男弟三人能无憂之毛詩節小弁曰踧踧周道鞠為茂草踧踧平易貌也我心憂傷惄焉如擣假寐永歎惟憂用老惄思也擣心疾毛詩栢舟北門曰北門刺仕不得志也言衛之忠臣不得其志爾出自北門憂心殷殷終窶且貧莫知我艱已焉哉天實為之謂之何哉左傳僖公上曰秦伯獲晉侯以歸秦穆夫人以太子罃𢎞與女簡璧登臺而履薪焉秦伯曰獲晉侯以䘮歸焉用之且晉人慼憂以重我天地以要我不圖晉憂重其怒也左傳宣曰荀林父請死晉侯欲許士貞子諫曰不可城濮之役晉師三日穀文公猶有憂色左右曰有喜而憂如有憂而喜乎公曰得臣猶在憂未歇也困獸猶鬭况國相乎左傳襄六年曰呉公子札來聘請觀周樂為之歌􅆁􅅠衛曰美哉淵乎憂而不困為之歌王曰美哉思而不懼其周之東乎左傳昭元年晉盟楚公子圍設服離衛叔孫穆子曰楚公子美矣君哉伯州犂曰此行也辭而假之寡君鄭行人揮曰假不反矣伯州犂曰子姑憂子晳之欲背誕也子羽曰當璧猶在假而不反子其無憂乎當璧謂棄疾事在襄十三年史記曰應侯任鄭安平使將擊趙安平為趙所困急以兵二萬人降趙應侯席藁請罪秦法任人而所任不善各以其罪罪之應侯當收三族王稽為河東太守與諸侯通坐誅應侯日以不懌昭王臨朝歎息應侯進曰臣聞主辱臣死今大王中朝而憂臣敢請其罪昭王曰吾聞之楚鐵劒利則士勇倡優拙則思慮遠夫以遠思慮而御勇士恐楚之圖秦也今武安君死鄭安平叛内無良將而外多敵國吾是以憂會稽典略曰越王近侵於强呉遠愧於諸侯乃脇諸臣而欲與之盟吾欲伐呉奈何而有功羣臣未對王曰夫主憂臣辱主辱臣死何大夫易見而難使者計倪官卑年少其居在後舉手而起曰殆哉非大夫易見難使是大夫不能也王曰何謂也倪曰夫官位財幣王之所輕使死者士之所重也王愛所輕責士所重也豈不難哉辛氏三秦記曰大秦國隔海心無憂患遇善風二十日得過心憂數年不得渡諺曰心無憂患不經二旬心若憂患遠離三春土人質直男女皆長一丈端正國主風雨不和則讓賢而治燕書曰慕容恪之威聲振於外敵初烈祖崩晉人喜曰中原可圖矣桓温曰慕容恪尚存所憂方重耳列子曰把國有人憂天地崩墜身無所寄廢寢與食列子曰仲尼閒居子貢入侍而有憂色子貢不敢問出告顔回顔囘援琴而歌孔子問曰若奚敢獨樂回曰吾昔聞之夫子曰樂天知命故不憂回所以樂也孟子曰樂人之樂人亦樂其樂憂人之憂人亦憂其憂從下忘反謂之流從上忘反謂之連從獸無厭謂之荒樂酒無厭謂之亡先王無流連之樂荒亡之行王孫子曰趙簡子獵於晉陽撫轡而歎董安于曰今遊獵樂也而主君興嘆何也簡子曰汝不知也吾校廐養食糓之馬以千數吾家養善逐之犬以數百欲以獵獸也憂隣國養賢以獵吾也孔子聞之曰簡子知所歎也孫卿子曰子路問於孔子曰君子亦有憂乎孔子曰君子其未得也則樂其意既得也又樂其治是以有終身之樂無一日之憂小人未得也則憂不得既得之又恐失之是以有終身之憂而無一日之樂也淮南子曰楚王亡其猨而林為之殘楚莊王猿也猨㨗躁依木而處故殘林以求宋王亡其珠池魚為之殫文澤火而林木憂憂見及也淮南子曰夫捧爵酒不知於邑言其輕也舉石之樽則白汗交流言其重也又况嬴天下之憂而任海内之事者乎又曰數匝之壽憂天下之亂猶憂河水少泣而益之也匝猶至也或作卒卒盡也言垂盡之年不足以憂天下之亂使水之多也龜三千嵗蜉蝣過三日以蜉蝣而為龜憂養生之具人必笑之故不憂天下之亂而樂其身之治者可與言道矣説苑曰智伯欲􅊞衛故遺之乘馬先之以璧衛君大説酌酒諸大夫皆喜南文子獨有憂色曰無力之禮無功之賞禍之先也又曰魯有賢女次室之子年適二十明曉經書常侍立而吟涕泣如雨有識謂之曰汝欲嫁耶何悲之甚對曰魯君年老太子尚小憂其姦臣起矣郭子曰王東海初過王承字安期東海内史登琅山歎曰我由來不愁今日直欲愁太傅曰當爾時形神俱往又曰初熒惑入太微尋廢海西簡文既登祚入太微帝惡之時郗超為中書郎在直引超入曰天命修短故非所計當無復近日事不超曰大司馬方將外固封疆内鎭社稷必無若斯之慮臣為陛下保之簡文因頌席仲初詩曰士痛朝危臣哀主辱其聲甚悽隂郗受假還東帝曰致意尊公超父愔字方回家國之事遂至於此由身不能以道匡衡思患豫防愧歎之深言何能譬因泣下語林曰陸士衡為河北都督已被間構内懐憂懣聞衆軍警角鼓吹謂其司馬孫極曰我聞此不如華亭鶴鳴俗説曰王孝伯起事王東亭殊憂懼時住在募士橋下持藥酒置左側詣其所念小人俞翼令在門前若見人騎儐從來汝便可取藥酒與我俄有行人乗馬過翼便進酒王語翼汝更看定非官人王語翼汝幾誤殺我楚辭曰心不怡之且久怡樂憂與憂其相接接續惟郢路之遼遠兮江與憂之不可涉又曰望孟夏之短夜何晦明其若嵗惟郢路之遠兮魂一夕而九逝又曰屈原放逐憂心愁悴彷徨山澤仰天歎息楚有先王之廟及公卿祠堂見圖畫天地山川神靈琦瑋及古賢聖怪物行事因書其壁呵而問之以洩憤懣舒寫愁思又曰漁父者原所作也屈原放逐江湖之間憂愁歎吟曰漁父避世隱身釣魚欣然樂時過屈原川澤之域怪而問之遂相應答楚人思念屈原叙其辭以相傳焉揚雄連珠曰臣聞天下有三樂有三憂焉隂陽和調四時不忒年穀豐遂無有夭折災害不生兵戎不作天下之樂也聖明在上祿不遺賢罰不偏罪君子小人各處其位衆臣之樂也吏不苟暴役賦不重財力不傷士女樂業民之樂也亂則反焉故有三憂山海經讚曰焉得鬼草是樹是蓻服之不憂樂天傲世如彼浪舟任波流滯懼東觀漢記曰王莽前隊大夫誅謀反者李次元聞事發覺被馬欲出馬駕在轅中惶遽著鞍上馬出門顧見車自覺乃止又曰龎萌還攻葢延延與戰破之詔書勞延曰龎萌一夜反叛相去不遠營壁不堅殆令人齒擊而將軍聞之夜告臨淮楚國有不可動之節吾甚美之夜聞急少能若是蜀志曰初孫權以妹妻先主妹才㨗剛猛有諸兄風侍婢百餘人皆親執刀侍立先主每入心常凛凛國語曰驪姬告優施曰君既許我殺太子立奚齊吾懼里克奈何優施曰為我具特羊從之飲酒中飲優施起舞謂里克妻曰主盍啗我大夫稱主妻亦如之盍啗我者肉也我敎兹此也暇豫事君言我教里克暇安樂事君乃歌曰暇豫之俁俁不如鳥烏俁俁疎遠之意言其智魯不如鳥烏人皆集於菀已獨集於枯菀喻茂盛枯喻衰落里克笑曰何謂菀何謂枯對曰其母為夫人其子為君可不謂菀乎其母既死其子又謗可不謂枯乎言申生無母又被謗可不謂之枯乎呉志曰𤣥徳詣京口見孫權求都督荆州權借之共拒曹公漢晉春秋曰吕範勸孫權曰將軍雖神武命世然操實有威力初併荆州恩信未著宜借𤣥徳使撫安之多操之敵而為樹黨計之上也權從之曹公聞以州借𤣥徳方作書落筆於地新序曰白公之難楚人有莊善者辭其母將往死之其母曰弃其親而死其君可謂義乎莊善曰吾聞事君者内其祿而外其身今所以養母臣之祿也身安得無死遂辭而行北至公門三廢車中其僕曰子懼矣曰懼曰何不反乎莊善曰懼者吾私也死君公義也吾聞君子不以私害公遂至公門刎頸而死幽明錄曰呉末中書郎失其姓名夜讀書家有重門忽聞外西門皆開恐有急詔户復開一人有八尺許烏衣帽持杖坐牀下與之熟相視吐舌至膝於是大怖裂書為火至曉雞鳴便去門户閉如故其人平安太平御覽卷四百六十九
