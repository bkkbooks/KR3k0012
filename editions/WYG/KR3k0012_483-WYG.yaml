body:
  text: 太平御覽卷四百八十三宋李昉等撰人事部一百二十四怒怨怒說文曰怒恚也易曰君子懲忿窒慾尚書曰今商王受弗敬上天降災下民皇天震怒命我文考肅將天威毛詩曰君子如怒亂庶遄沮又曰王赫斯怒爰整其旅又曰薄言往愬逢彼之怒又曰如震如怒闞如虓虎禮記曰父母怒不恱而撻之流血不敢疾怨起敬起孝左傳曰公孫閼與頴考叔争車頴考叔挾輈以走輈車轅也子都抜棘以逐之子都公孫閼也及大逵弗及子都怒又曰齊侯遊于姑棼遂田于貝丘姑棼貝丘皆齊地也見大豕從者曰公子彭生也怒曰彭生敢見射之豕人立而啼公懼墜于車傷足喪屨又曰齊侯與蔡姬乗舟于囿蕩公公懼變色禁之不可公怒歸之未絶之也蔡人嫁之齊侯以諸侯之師侵蔡蔡潰又曰先軫朝問秦囚公曰夫人請之吾舎之矣先軫怒曰武夫力而拘諸原婦人暫而免諸國墮軍實而長冦讎亡無日矣不顧而唾公使陽處父追之及諸河則在舟中矣又曰楚子使申舟聘于齊曰無假道于宋及宋華元曰過我而不假道鄙我也鄙我亡也殺其使者必伐我伐我亦亡也亡一也乃殺之楚子聞之投袂而起屨及於窒皇劒及於寢門之外車及於蒲胥之市秋九月楚子圍宋又曰衆怒不可犯又曰衛獻公戒孫文子甯惠子食皆服而朝日旰不召而射鴻於囿二子從之不釋皮冠而與之言二子怒而逐獻公又曰邾莊公與夷射姑飲酒私出閽乞肉焉奪之杖以敲之公在門臺臨廷閽以缾水沃廷邾子望見之怒閽曰夷射姑旋焉旋小便也命執之弗得滋怒自投於牀論語曰哀公問弟子孰為好學孔子對曰有顔回者好學不遷怒不貳過不幸短命死矣今也則亡國語曰晉郤獻子如齊聘齊頃公使婦人觀而笑之獻子怒歸請伐齊范武子退自朝曰郤子之怒甚矣不逞於齊必發諸晉國逞觧不得政何以逞怒余將致政焉以成其怒也史記曰孟嘗君客於趙平原君趙人聞孟嘗賢出觀皆笑曰始以薛公為魁梧也今視之乃𦕈小丈夫耳孟嘗聞之怒客與俱者下斫擊數百人遂㓕一縣以去又曰韓信使人言漢王曰齊反覆之國南邊呉楚請為假王以鎮之其勢可定漢王大怒罵曰吾困於此旦暮望若來張良陳平躡漢王足因附耳曰漢方不利寧能禁信乎不如因而立之漢王復罵曰大丈夫定諸侯即為真王何以假為又曰趙使藺相如賫璧西入秦秦王坐章臺見相如相如奉璧秦王大喜傳璧以示美人及左右左右皆呼萬歲相如視秦王無意償趙城乃前曰璧有瑕請指示王王授璧相如因持璧却立倚柱怒髪衝冠謂秦王曰趙王齋戒五日使臣奉璧拜送於庭何者嚴大王之威以修好也今臣至大王見臣列觀禮節甚倨得璧傳之美人以戱弄臣臣觀大王無意償城故臣復取璧大王必欲急臣臣頭今與璧俱碎於柱矣持璧睨柱秦王恐其破乃辭謝固請又曰鄒陽上書於梁王曰蘇秦相燕燕人惡之於王王按劒而怒食以駃騠漢書音義曰駃騠駿馬生七日而超其母漢書曰項羽令壯士出挑戰漢有善騎射曰樓煩應劭曰樓煩人名今有樓煩縣楚戰三合樓煩輒射殺之羽大怒自被甲執㦸挑戰樓煩欲射羽羽瞋目叱之樓煩目不能視手不能發走還壁中不敢復出又曰沛公從百餘騎見項羽於鴻門沛公起如厠招樊噲出獨騎噲與靳疆滕公紀成晉灼曰紀通父歩從間道赴軍使良留謝羽羽問沛公安在良曰聞將軍有意督過之脫身去至軍矣故使臣獻壁羽受又獻玉斗於范増范増怒撞破斗起曰吾屬今為沛公虜矣又曰黥布反上自征望布軍置陣如項籍軍上惡之與布相見謂布何苦而反曰欲為帝且怒罵之遂戰破布軍又曰文帝曰吾獨不得㢘頗李牧為將豈憂匈奴哉馮唐曰陛下雖得亷頗李牧不能用也上怒起入禁中又曰上獵上林中車駕未行先使韓嫣乘副車從數百騎馳視獸江都王望見以為天子辟從者伏謁道旁嫣驅而不見既過江都王怒為皇太后泣請得歸國入宿衛比韓嫣太后比銜嫣嫣時出入永巷不禁以奸聞皇太后怒使使賜嫣死上為謝終不得嫣遂死東觀漢記曰更始韓夫人尤嗜酒每侍飲見常侍奏事輙怒曰帝方對我飲正用此時持事來乎起抵破書案又曰龎萌為平狄將軍與盖延共擊董憲詔書獨下延而不及萌萌以為延譖已自疑遂反上聞之大怒乃自將兵討萌與諸將書曰吾常以龎萌為社稷臣將軍得無笑其言乎又曰鄧晨南陽人與上起兵新野吏乃燒晨先祖祠堂汚池室宅焚其冢墓宗族皆怒曰家自富足何故隨婦家入湯鑊中晨終無恨色又曰有詔㑹議靈臺所上謂桓譚曰天下事吾欲䜟決之何如譚黙然良久曰臣不讀䜟上問其故譚復極言䜟之非經上大怒曰桓譚非聖無法將下斬之譚叩頭流血良久得觧出為六安郡丞又曰戴憑為侍中數進見問得失上謂憑曰侍中當輔國政勿有𨼆情憑曰太尉西曹掾蔣遵清亮忠孝學通古今陛下納膚受之譖遂致禁錮世以是為嚴上怒曰汝南子復欲黨乎憑出自繫廷尉詔引見憑謝曰臣無謇諤之節而有狂瞽之言上即勑尚書觧遵禁錮又曰韓歆字翁君南陽人以從征伐有功封扶陽侯好直言為司徒嘗因朝㑹帝讀隗囂公孫述相與書歆曰亡國之君皆有才桀紂亦有才上大怒以為激發免歸田里上猶不釋復詔就責歆及子嬰皆自殺又曰竇憲恃宫掖聲勢遂以賤直奪沁水公主園公主不敢計後肅宗駕出過園指以問憲憲隂喝不得對後發覺帝大怒召憲切責曰今貴主尚見枉奪何况小人乎又曰杜根和熹鄧后臨朝根以安帝年長宜親政事乃上書直諌太后大怒収根囊盛撲殺之執法者私語行事人使不加力既而載出城外詐死三日目中生蛆因迯竄及鄧氏誅根方歸徴拜侍御史魏志曰太祖討張魯東還時有將軍許遊擁部曲不附太祖大怒先欲討之羣臣多諌可招懐遊共討強敵太祖横刀於􅂰作色不聴繆襲欲諌太祖逆謂之曰吾計已定卿勿復言襲曰若殿下計是耶臣方助殿下成之若殿下計非耶雖成宜改殿下逆令臣勿言何待下之不闡閎乎方今豺狼當路而狐狸是先人將謂殿下避強攻弱進不為勇退不為仁臣聞千石之弩不為鼷䑕發機萬鈞之鐘不以莛撞起音今區區之遊何足以勞神哉太祖曰善遂厚撫遊遊即歸附又曰夏侯惇從征吕布為流矢所中傷左目時夏侯淵與惇共為將軍軍中號惇為盲夏惇每覽照恚怒輒撲照著地又曰諸葛亮既屢遣使交書於司馬宣王又致巾幗婦人之飾以怒宣王將出戰辛毗伏節勒軍吏以下乃止吳志曰吕蒙字子明少依姊夫鄧當當為孫䇿將數討山越䝉年十五六隨當擊賊顧見呵不能禁歸告其母恚怒欲罰之䝉曰貧賤難居設有功富貴可致但不探虎穴安得虎子母哀而舎之又曰孫權為吳王忻宴之末自起行酒虞翻伏地佯醉不持權去翻起坐權大怒手劒欲擊之侍坐者莫不惶􅃍惟大農劉基起抱權諌曰大王以三爵後殺善士翻雖有罪天下孰知之權曰曹孟徳殺孔文舉孤於虞翻何有哉蜀志曰姜維為鄧艾所摧還隂平尋被後主勅命乃投甲詣㑹於涪軍將士咸怒抜刀斫石晉書曰王導妻曹氏妬導憚之乃密營别館以處衆妾曹氏知而將往焉導恐遲之以所執麈尾柄驅牛而進司徒蔡謨聞之戯導曰朝廷欲加公九錫導弗之覺但謙退而已謨曰不聞餘物惟有短轅犢車長柄麈尾導大怒謂人曰吾往與羣賢共游洛邑日何曾聞有蔡充兒又曰郗超實黨桓氏以父愔忠於王室不令知之將亡出一箱書付門生曰本欲焚之恐公年尊必以傷愍為病我亡後可呈此箱不爾便燒之愔後果哀悼成疾門生依言呈之則悉與温往反密計愔於是大怒曰小子死恨晚矣又曰周訪為荆州王敦以訪名將勲業隆重有疑色其從事中郎郭舒說敦曰荆州雖冦難荒弊實為用武之國若以假大將有尾大之患公宜自領以為梁州足矣敦從之訪大怒敦手書譬釋并遺玉環玉椀以申厚意訪投椀於地曰吾豈賈豎可以寳恱乎又曰陶侃嘗出遊見人持一把未熟稻問用此何為人云行道所見聊取之耳侃大怒曰汝既不佃而戯賊人稻執而鞭之齊書曰袁彖性剛嘗以㣲言忤世祖又與王晏不恊世祖在便殿用金柄刀子治𤓰晏在側曰外間有金刀之言恐不宜用此物世祖愕然窮問所以晏曰袁彖為臣說之上銜怒良久彖到郡坐匿用禄錢免官崔鴻後趙録曰冉閔為慕容恪所擒慕容儁立問閔曰汝奴僕下才何自妄稱天子閔曰爾曹人面獸心欲簒逆我一時英雄何為不作帝王耶儁怒鞭之三百後魏書曰李彪之入京也孤微寡援而自立不羣以李冲好士傾心宗附冲亦重其器學禮而納焉每言之髙祖公私共相援益及彪為中尉兼尚書為髙祖知待便謂非復籍冲而更相輕背惟公坐斂袵而已冲時震怒數責彪愆背瞋目大呼投斫几案詈辱肆口冲素温柔而一旦暴急遂發病荒悸言語亂錯猶扼腕呌詈稱李彪小人為醫藥所不能療或謂肝臟傷裂旬有餘日而卒列子曰宋有蘭子能以伎干宋元君雙杖屬其腦弄七劒而躡之元君立賜金帛又有蘭子能鷰戯聞之復以干元君元君大怒曰昔有異伎適值寡人有忻心故賜金帛彼必聞此復望吾賜拘而戮之莊子曰孔子往見盜跖下車而前謁者通之盜跖聞之忿怒目如明星髪上指冠孔子趨而進避席反走再拜盜跖大怒而展其足按劒瞋目其聲如豺虎韓子曰孟孫獵得麑使秦巴持之其母隨而呼秦巴不忍而與其母孟孫適至求麑不得大怒逐之居三月復召使為子傅燕丹子曰田光答太子曰竊觀太子客皆無可用者夏扶血勇之人怒而靣赤宋意脉勇之人怒而色青武陽骨勇之人怒而色白荆軻神勇之人怒而色不變呉越春秋曰呉王伐齊請公孫聖告之聖諌願大王勿伐齊王大怒曰吾天之所生神之所助使力士石畨擊以鐵槌身絶為五呉越春秋曰子胥諌吳王王怒賜以屬鏤之劒盛以鴟夷之器投之于江說苑曰秦王以五十里封鄢陵君鄢陵君辭不受使唐且謝秦王秦王怒曰嘗見天子之怒乎一怒伏尸百萬流血千里唐且曰大王嘗聞布衣韋帶之士怒乎伏尸二人流血五歩即按其匕首視秦王曰今將是矣王變色長跪曰先生就坐寡人諭矣列士傳曰秦召魏公子無忌無忌不行使朱亥奉璧一雙秦王大怒將朱亥著虎圈中亥瞋目視虎皆裂血出濺虎虎不敢動怨尚書曰商王受自絶于天結怨于民崇信奸回放黜師保又曰怨豈在明不見是圗毛詩曰亂世之音怨而怒其政乖又曰角弓父兄刺幽王也不親九族而好讒佞骨肉相怨故作是詩又曰民之無良相怨一方左傳曰宋華元將與楚戰殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政輿入鄭師故敗君子謂羊斟非人也以其私怨敗國殄民又曰晉侯賞從亡者介之推不言禄禄亦弗及其母曰盍亦求之以死誰懟對曰尤而効之罪又甚焉且出怨言不食其食又曰季郈之鷄鬭季平子郈昭伯季氏介其鷄郈氏為之金距平子怒益室於郈且讓之故郈昭伯怨平子又曰晉郤至獻楚捷于周與單襄公語驟稱其伐單子語諸大夫曰温季其亡乎位於七人之下而求掩其上怨之所聚亂之本也多怨而階亂何以在位又曰吳公子札來聘請觀於周樂為歌周南召南曰美哉始基之矣猶未也然勤而不怨矣為之歌小雅曰美哉思而不貳怨而不害其周徳之衰乎又曰子産曰我聞忠恕以損怨不聞作威以防怨又曰君子之言信而有徴故怨逺於其身小人之言僭而無徴故怨咎及之論語曰放於利而行多怨又曰貧而無怨難富而無驕易國語曰夫事君者犯而不懟怨而不怒戰國䇿曰趙襄子怨智伯漆其頭為飲器漢書曰汲黯列九卿而公孫𢎞張湯為小吏及𢎞湯稍與黯同位而尊用過之黯心􅄶不能無怨望見上言曰陛下用羣臣如積薪耳後來者居上東觀漢記曰長水校尉耿恭坐將兵不憂軍事肆心縱欲飛鷹走狗遊戱道上虜至不敢出得詔書怨懟徴下獄續漢祭祀志曰建武二十年二月羣臣上言即位三十年宜封禪泰山詔書曰即位三十年百姓怨氣滿腹吾誰欺欺天乎晉書曰趙王倫謟事賈后裴頠甚惡之倫數求官頠與張華復固執不許由是深為所怨王韶之晉記曰桓𤣥問衆曰朕其敗乎曹靖之對曰神怒民怨臣實憂懼𤣥曰民怨有之神何為怒對曰移晉宗廟所以怒也管子曰凡禍亂之所生各在非理故曰閑禍在除怨晏子春秋曰景公籍重而獄多拘者滿圄怨者滿朝文子曰人有三怨爵髙者人妬之官大者王惡之禄厚者怨處之夫爵益髙者意益下官益大者心益小禄益厚者意益薄淮南子曰和氏之璧夏氏之璜揖讓而進之則忻合夜以投人則為怨時與不時也楚辭曰怨靈脩之浩蕩兮終不察夫人心衆女嫉余之娥眉兮謡諑謂余以善淫琴操曰王昭君者齊國襄王之女也昭君年十七時顔色皎潔聞於國中襄王見昭君端正閑麗進於孝元帝既不幸納備後宫積五六年王昭君心有怨曠不飾其形容元帝每歴後宫踈畧不過其處後單于遣使者朝賀元帝陳設倡樂仍令後宫糚出昭君怨恚久不得侍列乃更脩飾盛服形容光輝帝令後宫欲至單于者起於是昭君喟然越席而前曰妾幸得備在後宫麄醜卑陋不合陛下之心誠願往元帝見昭君便驚悔不得復止遂以與之王昭君雖去漢至單于心思不樂乃作怨曠思惟歌曰秋木萋萋其葉萎黄我獨伊何改變厥常翩翩之燕遠集西羌髙山峨峨河水泱泱父兮母兮道里悠長嗚呼哀哉憂心惻傷太平御覽卷四百八十三
