body:
  text: 太平御覽卷四百六十七宋李昉等撰人事部喜説文曰喜不言而悦曰喜從壴口易曰上九傾否先否後喜尚書曰股肱喜哉元首起哉毛詩曰風雨如晦鷄鳴不已既見君子云胡不喜又曰我有嘉賓中心喜之又曰菁菁者莪樂育才也君子能長育人才則天下喜樂之也禮記曰樂者音之所由生也其本在人心之感於物是故其喜心感者其聲發以散又曰人喜則斯陶陶欝陶也陶斯詠詠斯揺又曰何為人情喜怒哀樂愛惡欲七者弗學而能也又曰武王承命興師誅商萬國咸喜軍發孟津前歌後舞又曰文王朝夕至於大寢之門外問於内豎曰今日安否何如内豎曰今日安太子乃有喜色左傳曰城濮役晉師三日榖文公猶有憂色左右曰有喜而憂如有憂而喜乎公曰得臣猶在憂未艾也困獸猶鬭况國相乎及楚殺子玉子玉得臣公喜而後可知也又曰子産始知然明問為政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀子産喜以語子太叔曰他日吾見蔑之面蔑然明名今吾見其心矣又曰公賜公衍羔裘使獻龍輔於齊侯齊侯喜與之陽榖又曰吳将伐齊越子率其衆以朝焉吳人皆喜唯子胥懼曰是豢吳也吳王聞之使賜之屬鏤以死又曰鄭六卿餞韓宣子於郊宣子曰二三君子請賦起亦以知鄭志子齹賦野有蔓草宣子曰孺子善哉吾有望矣子抑賦蘀兮宣子喜曰鄭其庶㡬乎公羊傳曰九月丁夘子同生子同者孰謂謂莊公何言乎子同生喜有正也此言喜有正何久無正子也又曰齊髙子來盟髙子者何齊大夫也何以不稱使我無君也然則何以不名喜之也爾雅曰坎坎僔僔喜也論語曰父母之年不可不知也一則以喜一則以懼又曰上失其道民散久矣如得其情則哀矜而勿喜又曰子曰道不行乗桴浮於海從我者其由與子路聞之喜尚書中候曰維王既誅崇侯虎諸侯貢萬民咸喜鄭𤣥曰王文王也貢貢異國物色也尚書大𫝊曰惟丙午王還師師乃鼓譟師乃慆前歌後舞鄭𤣥曰慆喜也衆大喜前歌後舞也春秋元命苞曰兩口銜土為喜喜得明心喜者為憙上天心朱均曰心為天主布政之宫萬物須之乃盛所以為喜也今於口上移一畫間之者於字體安也是為兩口銜土也喜得明明得所喜也春秋繁露曰春之言猶蠢也蠢蠢者喜樂之貌國語曰伯宗朝以喜歸其妻曰子貌有喜何也曰吾言於朝諸大夫皆謂我似陽子知有似也陽子陽處父也對曰陽子華而不實言而無謀是以難及於身子何喜焉戰國䇿曰吕他亡西周之東周盡輸西之情於東周東周大喜又曰孟嘗君出行至楚楚獻象牀郢之登徒直送之不欲往見孟嘗門人公孫戊曰臣郢之登徒直送象牀象牀之直千金傷此若髪標賣妻息不足以償足下能使僕無行先入有寳劒願獻之戊曰諾入見孟嘗曰諸國所以皆致相印於君以國事累君者誠悦君之義慕君之廉今君至楚而受象牀所未至國將何以待君孟嘗曰善戊趨而出孟嘗君曰今子舉足髙志之揚何也戊曰臣有大喜三重之以寳劒一孟嘗曰何謂也戊曰門下百數莫敢入諌臣入諌一喜諌而聽臣二喜諌而止君之過三喜史記曰趙使藺相如賫璧西入秦秦王坐章臺見相如相如奉璧秦王大喜𫝊璧以示美人及左右左右皆呼萬嵗又曰孔子由大司冦攝行相事有喜色門人怪之孔子曰非樂其貴然喜下人得吾也又曰龍且與韓信夾濰水陣信乃夜令人為萬餘囊滿盛沙壅水上流引軍半渡擊龍且佯不勝還走龍且果喜曰固知韓信怯也追信渡水信使人决壅囊水大至擊殺龍且又曰慶雲喜氣也又曰吕后謂髙祖曰季所居之上常有雲氣故從往常得季髙祖心喜又曰邑中人民常懼出獵任安為人分麋鹿雉兎衆人皆喜曰無傷也任少卿分則平也漢書曰朱博為左馮翊長陵大姓尚方禁少時盗人妻見斫創著頰博聞以他事召視其面果瘢博辟左右問方禁是何創禁自知情得叩頭服狀博笑曰大丈夫固時有是博欲洒卿耻能自効不方禁且喜且懼對曰必死博因親信以為耳目又曰髙祖入闗與父老約法三章民大喜也又曰英布間行與隨何俱歸漢王方踞床洗召布入見布大怒悔來欲自死就舍帳御飲食從官如漢王居布又大喜又曰韓信投漢蕭何等已數言上不用即亡何聞信亡不及以聞自追之人有言上曰丞相何亡上怒如失左右手居一二日何來謁上且怒且喜又曰吕須嘗以陳平前為髙帝謀執樊噲數䜛平於吕后曰為丞相不治事日飲醇酒戯婦人平聞日益甚太后聞之私喜又曰翟方進隨父至汝南蔡父竒方進形貌有封侯骨方進既厭為小吏聞蔡父言心喜又曰匈奴單于言願婿漢氏以自親元帝以後宫良家子王嬙字昭君賜單于忻喜謝承後漢書曰廬江毛義家貧以孝行稱南陽張奉慕其名往候之坐定而府檄適至以義守令義捧檄而入喜動顔色續漢書曰荀爽嘗謁李膺因為其御既還喜曰今日乃得御李君矣見慕如此東觀漢記曰上謂鮑永曰我攻懐三日兵不下闗東畏卿且將故人往即拜永諌大夫至懐謂太守曰足下所以堅不下者未知孰是也今聖主即位天下已定不降何待即開城降上大喜與永對食又曰賈復北與五校戰於真定大破之復傷瘡甚上驚復病尋愈追及上上見大喜又曰梁鴻妻椎髻著布衣操作具而前鴻大喜曰此真梁鴻之妻也字之曰徳曜又曰上幸長安祠髙廟十一陵厯覽宫館舊處㑹郡縣吏勞賜作樂者有縣三老大言陛下入東都臣望顔色儀數如先帝臣一歡喜百官嚴設如舊時臣二歡喜見吏賞賜識先帝時事臣三歡喜陛下聽用直諌黙然受之臣四歡喜陛下至明懲艾酷吏視人如赤子臣五歡喜進賢用能各得其所臣六歡喜天下太平徳合堯舜臣七歡喜也又曰上以馮異為孟津将軍屯河上撃走朱鮪追至雒陽城門環城一匝乃還上聞之大喜諸臣皆賀又曰郭伋字細侯河南人在并州素結恩徳行部到河西美稷有童兒數百各騎竹馬於道以迎拜伋問曰兒曹何自逺來對曰聞使君到喜故來奉迎魏志曰潁川戲志才籌畫士也太祖甚器之早卒太祖與荀彧曰自志才亡後莫可與計者汝潁間故多竒士孰可以繼之彧薦郭嘉召見論天下事太祖曰使孤成大業者必此人也嘉出亦喜曰真吾主矣吴志魯肅𫝊曰曹公破走魯肅先還權使諸将迎肅肅拜權起禮之因謂曰孤持鞌下馬相迎足以顯卿未肅趨進曰未也衆人聞之無不愕然就坐徐舉鞭曰願至尊恩徳加乎四海總括九州克成帝業更以安車蒲輪徴肅始當顯耳於是撫掌歡笑王隠晉書石珩問於袁甫曰西河胡常旱東河胡恒水甫曰東是吴人新附積憂成隂西是中國新平珠寳美人皆入志盈心滿長歡喜故旱孫嚴宋書曰劉宣字萬夀彭城人也素曉天文知晉室當復又夢丸土服之覺而喜曰丸者桓也桓既吞復吾本土乎齊書曰謝超宗詣東府門自通其日風慘太祖四座此客至使人不火自暖矣超宗既坐飲酒數廵辭氣横出太祖對之甚歡崔鴻後秦録曰秦末沃暑見于東井尹綿知秦将㓕心喜踴躍向天再拜唐書陸贄從幸山南道途難嶮扈從不及與帝相失一夕不至上喻軍士曰得贄者賞千金異日贄見上喜形於顔色其寵待如此周書曰人有五氣喜氣内畜雖欲隠之陽喜必見喜色油然以出又曰師曠見太子晉曰願聞一言王子應之曰吾聞太師将來吾心甚喜見子喜而又懼吾年甚少見子而懾盡亡吾度韓詩外𫝊曾子曰吾嘗仕為吏禄不過鍾釜猶欣欣而喜者非以多也樂其遂養也張勑吴録長沙桓王在厯陽遣書呼周瑜瑜将兵百人船粮器杖星夜馳赴王迎執瑜手曰卿至喜矣又曰吴王之女有所怨王者遂自殺王痛之葬於閶門外文石為槨髙墳深池珍玩人馬以狥葬國人哀之湛盧之劒夜飛去楚昭王覺劒在床首昭王召風胡子而問焉對曰越獻劒於吴名曰湛盧人君有過則去適他國聞吴王葬女奢侈以人從死其必是也昭王大喜胡冲吴歴曰太史慈字子義於神亭戰敗為孫策所執䇿素聞其名即解縳諮問進取之術慈曰州郡新破士卒離心若儻分散難復合聚欲出宣恩安集恐不合尊㫖䇿長跪答曰誠本心所望也明日日中望君來還諸將皆疑䇿曰太史子義青州名士以信義為先終不欺策明日大㑹諸將預設酒食立竿視中而慈至䇿大懽喜常與參論軍事司馬彪九州春秋曰曹公與袁紹相拒遣人招張繡繡欲歸紹賈詡勸繡歸曹公繡曰紹强又曹公與吾有讎不可詡曰此乃所以宜從之也夫有覇王之志者固將釋大怨明徳於四海也繡從之歸曹公曹公見之喜執詡手曰使我信重於天下者君也檀道鸞續晉陽秋曰初苻堅南冦京師大震謝𤣥入問討禦之方謝安夷然無懼色𤣥等既破賊有驛書至安方對客圍棋看書既畢攝放床上了無喜色還棋如故客問之安徐答曰小兒軰遂已破賊客罷還内過户安心喜甚不覺屐齒之折其矯情鎮物如此太公六韜曰因其所喜以順其志又曰文王拘羑里求天下珍怪而獻之紂大喜殺牛而賜之曹操别𫝊曰拜操典軍都尉還譙沛士卒共叛襲擊之操得脱身亡走竄平河亭長舍稱曹濟南處士卧養足創八九日謂亭長曰曹濟南雖敗存亡未可知公幸能以車牛相送往還四五日吾厚報公亭長乃以車牛送操未至譙數十里騎求操者多操開帷叱之皆大喜始悟是操雷煥别𫝊曰張華以煥為豐城令得雙寳劒乃送一劒與華自留一劒華得劒甚喜曰此干將也邴原别𫝊曰魏太祖為司空辟原署東閣祭酒太祖北伐三郡克單于還太祖曰孤返鄴守諸君必將來迎其不來者獨邴祭酒耳言訖未久而原先至門下通謁太祖大喜攬履而起逺出迎原曰賢者誠難測度孤謂君將不來而能逺自屈誠副饑渴之心零陵先賢𫝊曰劉巴入益州牧劉璋見而驚喜每有事咨問璋遣法正迎先主巴諌曰彼人傑入必有為不可内也既入巴復諌曰若使彼討張魯是放虎於山林璋不聽巴遂稱疾先主攻成都令軍中曰其有害巴者誅及三族及得巴甚喜别異記曰華子魚為諸生寄宿人門外主人婦夜生頃兩吏詣門便辟易却相謂曰公在此躊蹰良久一吏曰籍當定柰何住乃前向子魚拜将出並行共語曰當與㡬嵗一人曰當三嵗子魚後故往視之兒果已死子魚喜曰我固當公後果為太尉西京雜記曰樊将軍喻問陸賈曰自古人君皆云受命於天云有瑞應豈有是乎賈應之曰有之夫目瞤得酒食燈大花得錢財鴉鵲噪則行人至蜘蛛集而百事喜也晉朝雜事曰明帝入幘不正元帝自為正之明帝大喜莊子曰凡交近則縻以信逺則必忠之言以言必或𫝊之夫𫝊兩喜兩怒之言天下之難者也兩喜必多溢美之言兩怒必多溢惡之言凡溢之類妄則信之列子曰鄭人有薪於野者遇逸鹿從而擊之斃恐人之見也遮藏諸隍中覆之以蕉不勝其喜俄而遺其所藏之處遂以為夢焉又曰堯微服逰康衢聞兒童謡曰立我烝民莫匪爾極不識不知順帝之則堯喜疇教為此言兒童曰我聞之大夫魯欲使樂正子為政孟子曰吾聞之喜而不寐公孫丑曰然則奚為喜而不寐曰其為人也好善又曰子路人告之以有過則喜抱朴子曰人主有道國無虐政則四序從度五星不失次日不蝕朔月不薄望霜不夏繁雷不冬洩嘉瑞丕臻災殃寢滅此則天喜也吕氏春秋曰湯聞伊尹使人請之有侁氏不可伊尹亦欲歸湯湯於是請取婦為婚有侁氏喜以伊尹媵送女顧子曰夫哀樂喜懼愛憎怒於人之情人當其哀則欲哭泣擗踴遇其樂也則欲懽笑歌舞公孫丑曰君怒則自以和喜則收之以正楚辭曰師望在肆昌何識鼓刀揚聲后何喜王逸曰師謂太公也昌文王也后亦文王也曹植禮上表曰臣得出幽并之域獲覲百官之美此一喜也背茅茨之陋登閶闔之闥此二喜也猥以有靦之容瞻見穆穆之顔此三喜也將以檮杌之質禀受崇聖之訓此四喜也太平御覽卷四百六十七
