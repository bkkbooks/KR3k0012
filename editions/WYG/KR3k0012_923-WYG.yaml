body:
  text: 太平御覽卷九百二十三宋李昉等撰羽族部十鴿鸜鵒倉庚戴勝扈百舌伯勞啄木鳭鷯巂鵽鴞鴟茅鴟鳶鴿說文曰鴿鳩屬也後魏書曰崔光曽於門下省晝讀經有鴿飛集膝前遂入于懐縁臂上肩久之乃去道俗賛詠詩頌者数十人梁書曰侯景圍臺城軍士煮弩燻鼠捕食之殿堂舊多鴿羣聚至殱隋書曰文帝嘗宴逹頭可汗使者於武德殿有鴿于梁上命崔彭射之既發而中上大恱賜錢一萬貫又曰楊奏見赤鴿映棘髙二尺越絶書曰蜀有蒼鴿狀如春蒼戴祚西征記曰祚至雍丘始見鴿大小如鳩色似鸚鵡戯時兩兩相對鸜鵒周禮曰鸜鵒不踰濟地氣然也禮稽命徵曰孔子謂子夏曰鸜鵒至非中國之禽也左傳曰鴝鵒來巢書所無也師已曰異哉吾聞文武之世童謡有之師已魯大夫也鴝之鵒之公出辱之鴝鵒之羽公在外野往饋之馬鴝鵒跦跦公在乾侯跦跦跳行貌徵褰與襦褰袴也鴝鵒之巢逺哉遥遥稠父䘮勞宋父以驕稠父昭公死故䘮勞也宋父定公代立故以驕鴝鵒鴝鵒往歌來哭昭公生出歌也死還哭也童謡有是今鴝鵒來巢其將及乎公羊傳曰有鸜鵒來巢何以書記異爾異是非中國之禽也宜穴而巢何休注曰欲自下居上之徴春秋考異郵曰鴝鵒者飛行居于陽夷狄之鳥穴居于隂異苑曰五月五日翦鴝鵒舌令學人語山海經曰衡山多青臒及鸜鵒晉書曰鎮西将軍謝尚字仁祖善鴝鵒舞幽明録曰晉司空桓豁在荆州有參軍五月五日剪鸜鵒舌教令學語遂無所不言顧叅軍善彈琵琶鴝鵒每立聽移時又善能效人語聲司空大㑹吏佐令悉效四坐語無不絶似有生齆鼻語難學學之不肖納頭於瓮中以效焉遂與齆者語聲不異主典人于鴝鵒前盜物叅軍如厠鴝鵒伺無人宻白主典人盜某物參軍銜之而未發後盜牛肉鴝鵒復白叅軍曰汝云盜肉應有騐鸜鵒曰以新荷裹着屏風後檢之果然痛加治而盜者患之以熱湯灌殺叅軍為之悲傷遂欲殺此人以報其怨司空教曰原殺鴝鵒之痛誠合論殺不可以害禽鳥故極於法令止五歲刑淮南萬畢術曰寒皋斷舌使語寒臯一名鴝鵒也唐書曰秘書少監崔行功未得五品前忽有鴝鵒銜一物入其堂置案上而去乃角袋也數日加大夫荆楚歲時記曰五月鴝鵒子毛羽新成俗好登巢取養之以教其語號花鵒倉庚禮記曰仲春之月倉庚鳴毛詩曰春日載陽有鳴倉庚又曰倉庚于飛熠熠其羽又曰黄鳥于飛集于灌木又曰綿蠻黄鳥止于丘隅又曰睨睆黄鳥載好其音又曰黄鳥哀三良也交交黄鳥止于棘誰從穆公子車奄息詩義䟽曰黄鸝留也或謂黄栗留幽州謂之黄鶯或謂之黄鳥一名倉庚一名商庚一名黎黄一名楚雀齊人謂之搏黍關西謂之黄鳥常以椹熟時來在桑間此乃應節趣時之鳥或謂之黄袍爾雅曰倉庚商庚即黎黄也黧黄楚雀即倉庚也又皇寅鳥鄭樵注曰俗呼黄黧亦名􅀶黍韓詩曰簡斤黄鳥載好其音說文曰離黄倉庚也鳴即蚕生也戴勝禮記曰季春之月戴勝降于桑鄭𤣥注曰蚕将生之候也戴勝促織之鳥當此之時恒在桑間鳴也爾雅曰鵖鴒皮及切戴鵀郭璞注曰鵀即頭上勝也今亦謂為戴勝鵖鴔者猶􅀈鶝語聲轉耳春秋考異郵曰孟夏戴絍也陽御表以期達蚕珥絲在四月故孟夏戴絍出以任氣成天津也故戴絍出蚕期起維而戴之明趨時急也衘天表候以期至唯蠶是務珥吐也孝經援神契曰戴絍下蚕始生魏志曰戴鵀鳥巢張臶門隂告門人曰夫戴鵀陽鳥也而巢門隂此㐫兆也旬日而卒楊雄方言曰燕之東北朝鮮洌水之間鳴鳩謂之鶝䲹自關而東謂之戴鵀東齊海岱之間謂之戴南南猶鵀也或謂之鶭鸅謂之􅀈鶝燕之東北朝鮮洌水之間謂之􅫁扈詩曰交交桑扈率場啄粟桑扈竊脂也淺毛竊脂肉食今無肉自場啄粟失其往也不能以自治又曰交交桑扈有鶯其羽詩義疏曰或云有鶯其羽言雖小鳥其鶯然有文章左傳曰郯子云少皥摯以鳥名官九扈為九農正扈民無滛者也杜預注云扈止也止民使不淫爾雅曰春扈鳻扶云切鶞勑偷切夏扈竊𤣥秋扈竊藍冬扈竊黄桑扈竊脂棘扈竊丹行扈唶唶音即宵扈嘖嘖音責郭璞注云諸扈皆因其毛色音聲以為名竊藍青色山海經曰崌有鳥焉如鶚赤身白首其名竊脂又曰上車之山鳥多桑扈状如鳩以髯飛食之不􅀈目上音瞬淮南子曰馬不食脂桑扈不啄粟非亷也左思吳都賦曰四扈推移百舌禮記曰仲夏之月反舌無聲又曰郯子曰少皥鳥師而鳥名祝鳩氏司徒者也春秋保乾圗曰江充之害其萌交啄反鳥入殿風土記曰祝鳩反舌也鄭注云反舌者百舌鳥糜信難曰案緯書反舌蝦蟇也昔於長安與諸生共至城北水取蝦蟇剥視之其舌反成向此得非鄭君過乎喬夙荅曰蝦蟇五月中始得水常聒人耳何云無聲是以蝦蟇非反舌也易通卦騐曰反舌鳥也能反覆其舌隨百鳥之音周書曰芒種之日又五日反舌無聲反舌有聲佞人在側淮南子曰人有多言猶百舌之聲後魏書曰汝隂王天賜之孫慶和為東豫州刺史舉城降梁梁武以為北道緫督至項城朝庭出師討之望風退走梁武責之曰言同百舌膽若鼷鼠遂徙合浦孔子明鏡曰國君謀反有反舌鳥入宫格物論云百舌反舌鳥蒼毛尖觜形小於鴝鵒春二三月間鳴至五月無聲亦候鳥也鄭愔百舌鳥詩曰百舌鳴髙樹弄音無常則借問聲何煩末俗不尚嘿伯勞禮記曰仲夏之月鵙始鳴鄭注云伯勞蔡邕章句鵙伯趙也伯趙應時而鳴為陰候也左傳曰郯子云少皥時伯趙氏司至者也杜預註曰伯趙伯勞也夏至鳴冬至止也詩曰七月鳴鵙鄭𤣥註曰伯勞鳴将寒之候是月鳴鵙也晚寒鳥物之候皆從其氣焉爾雅曰鵙伯勞也郭璞註曰似鶷􅗾而大大戴禮曰夏小正曰五月鴂則鳴鴂者百鷯也鳴者相命也廣雅曰伯趙鵙也易通卦騐曰夏至小暑伯勞鳴孟子曰南蠻鴂舌博勞也淮南萬畢術曰伯勞使虵蜿蟬乃天使然也又曰伯勞守金人不取收伯勞血以塗金人不敢取也東方朔别傳曰與弟子偕行渇令弟子如道邉家求飲不知姓名主人開門不與須臾見伯勞飛逐主人門中李樹上朔謂弟子曰此主人姓李名伯勞爾但呼李伯勞果有李伯應之即入取飲陳思王植令禽惡鳥論曰國人有以伯勞獻諸廷者侍臣曰世人同惡伯勞之鳴敢問何謂也王曰月令仲夏鵙始鳴詩云七月鳴鵙夏五月鷦則鳴博勞也昔尹吉甫信后妻之讒而殺孝子伯奇其弟伯封求而不得作黍離之詩俗傳云吉甫後悟追傷伯奇出逰於外見異鳥鳴於桑其聲噭然吉甫心動曰無乃伯奇乎鳥乃撫翼其聲尤切吉甫曰果吾子也乃顧曰伯奇勞乎是吾子栖吾輿非吾子飛勿居言未卒鳥尋而栖其蓋歸入門集于幹之上向室而號吉甫命後妻載弩射之遂射殺後妻以謝之其俗惡伯勞鳴言所鳴之家必有尸也此好事者附名為之説而今普傳惡之斯實否也伯勞以五月而鳴應陰氣之動陰為賊害盖賊害之鳥也屈原曰鶗鴂之先鳴使百草為之不芳其聲鵙故以音名也晉書曰慕容垂之起於闗東歳在癸未苻堅之分氐戸於諸鎮也趙整因侍援琴而歌曰阿得脂博勞舊父是仇綏尾長翼短不能飛逺徙種人留鮮卑一旦緩急語阿誰堅笑而不納至是整言騐矣周書時訓曰芒種之日螳螂生又五日鵙始鳴鵙不鳴令壅遏兵書曰軍卒見伯勞鳴軍前後賊來圍吾軍伯勞鳴軍中軍分散有所配屬京房易傳曰伯勞聚邑中歳天伯勞鳴軍中師分而水且至夢書曰伯勞為憂口舌聲可惡也夢見伯勞憂口舌也斲木爾雅曰鴷斲木也郭璞注曰斵木䖝因名今斵木有兩三種在山中大者有赤色臨海異物志曰啄木大如雀喙足皆青毛色正青翠鳥類也凡啄木異種舌長寸杪有針刺俳諧集左氏詩曰南山有鳥自鳴啄木飢則縁樹暮則巢宿無干於人惟志所欲此盖禽鳥之性情也性清者榮性濁者辱閩中名傳曰薛令之唐開元中為左補闕兼太子侍講時冬官冷落又次難進令之題詩曰明月夜團圓照見先生盤盤中何所有苜蓿長䦨干飰澁匙難綰羮稀筯易寛只可謀朝夕那能度歳寒明皇因幸春宫見之不恱命筆酧之曰啄木觜距長鳳凰毛羽短既嫌松桂寒任逐桑榆煖令之遂投簪謝爵步東還鳭鷯爾雅曰鳭鷯剖葦郭璞注曰剖葦皮食其中蟲因名之鳭音刁又曰桃蟲鷦其䳄鴱注云鷦鷯一名鷦􅛯一名桃雀俗呼巧婦詩曰肇允彼桃蟲翻飛惟鳥爾雅曰桃蟲鷦也似小黄雀其雛化為蜩故俗語曰鷦鷯生蜩雀易林亦謂桃蟲生蜩或云布榖生子鷦鷯食之方言曰自西而東謂之雀或謂之女鴄今江東呼之曰巧婦自闗而東謂之􅀈爾雅曰鴟鴞鸋鴂陸疏云鸋鴂即巧婦闗西謂之桑飛或謂之襪雀荘子曰鷦鷯巢林不過一枝說苑曰孟嘗君寄客於齊王三年不見用客反見孟嘗君曰不知臣罪耶君之罪也孟嘗君曰縷因針而入不因針而急夫子之才必薄矣客曰不然臣見鷦鷯巢於江濵葦苕著之髪毛建之女工不能為也可謂完堅矣大風至則苕折卵破者其所託者使然也晉書曰張華素孤貧為鷦鷯賦成阮籍見之曰王佐之才由是聲名始著嶲音擕名杜宇爾雅曰嶲周也郭璞注曰嶲鳥名風土記亦云蜀王本紀曰望帝使臣鱉靈治水去後望帝以其妻通慚愧且以徳薄不及鱉靈乃委國授之望帝去時有子䳏鳴故蜀人悲子䳏鳴而思望帝望帝杜宇也臨海異物志曰鷤鴂一名杜鵑春三月鳴晝夜不止音自呼俗言取梅子塗其口兩邊皆赤上天自言乞恩至商陸子熟鳴乃得止耳吕氏春秋曰伊尹說云肉之美者嶲燕之翠髙誘注鳥名翠疎異苑曰杜鵑始陽相推而鳴先吐聲者先吐血死有人山行見一羣寂然聊學其聲便嘔血死鵽爾雅曰鵽鳩雉郭璞注曰鵽大如鴿鼠脚無後指出沙漠莊子曰青鵽愛子忘親司馬彪注曰鵽鳥專愛其子而忘其母也唐書曰髙宗時突厥犯塞初突厥之未叛也有鳴鵽羣飛入塞相繼蔽野邊人相驚曰此鳥一名厥雀南飛突厥犯塞之候也及是春還復北飛至靈夏悉墮地而死視之則無頭矣裴行儉問於右史苗神荅曰鳥獸之祥乃應人事何也對曰人雖最靈而禀性含氣同於萬類故吉凶兆於彼禍福應於此聖王受命龍鳳為嘉瑞者和氣仝也故漢髙祖斬虵而騐秦之必亡仲尼感麟而知己之將死夷羊在牧殷紂以滅鸜鵒來巢魯昭出奔鼠舞端門燕刺誅死大鳥飛集昌邑以敗是故君子處恭寅畏動必以義雖在幽獨如承大事知神明之照臨懼患難之及已也雉升鼎耳殷宗側身修徳鵩止坐隅賈生作賦以無患者徳勝祥也鴞毛詩曰鴟鴞周公之辭也鴟鴞鴟鴞既取我子無毁我室詩義疏曰鴟鴞似黄雀為小喙刺如錐取茅為巢以麻紩之如刺襪然縣著樹枝或一房或二房幽州謂之鸋鴂或曰女匹闗東謂之工雀闗西謂之襪雀或謂之巧婦鴟春秋運斗樞曰玉衡星散為鴟莊子曰鴟得腐鼠鵷雛過之仰而視之又曰鴟嗜鼠之鳥也淮南子曰虞氏者梁富人也登高樓臨大路設樂陳酒博於其上逰挾相隨行樓下博者射朋張中反兩而笑飛鳶墮腐鼠而中之逰俠相與語曰虞氏富人也常有輕人之志乃辱我以腐鼠其夜乃殺虞氏大滅其家此謂類而非也淮南萬畢術曰鴟腦令雞自伏收鴟腦以塗雞即伏不能起也吕氏春秋曰亂國之妖市有舞鴟鹽鐵論曰太山之鴟啄腐鼠於窮澤非有害之於人也今有司盗主人財而食之焉得若太山之鴟乎後魏書曰孝武即位蠕蠕諸藩並遣使朝貢帝臨軒宴之有鴟鳥飛於殿前帝素知竇熾善射因欲矜爾逺人乃給熾御箭兩隻命射應弦而落諸蕃人咸嘆異焉帝大恱列仙傳曰李仲甫夜卧牀或為鳥跱架上後至水口縣巨山上俟北風當飛度南海一山上有羅鷹者羅得鴟視之仲甫也後留更三年自云往崑崙去茅鴟爾雅曰狂茅鴟郭璞注曰􅣽鴟也似鷹而白孫炎曰大目鵂鶹也廣雅曰盧鵂茅鴟鳩也左傳曰叔孫穆子食慶穆子封泥祭穆子不說使工賦茅鴟亦不知茅鳩逸詩刺不敬也鳶禮記曰前有塵埃則載鳴鳶鳶鳴則將風也毛詩曰鳶飛戾天魚躍于淵爾雅曰鳶烏醜其飛也翔布翅翺翔太平御覽卷九百二十三
