body:
  text: 太平御覧卷六百二宋李昉等撰文部十八著書下㓜屬文著書下吕氏春秋曰吕不韋為秦相國集諸儒使著其所聞為十二記八覧六論合十餘萬言名為吕氏春秋暴之咸陽市門懸千金於其上有能增損一字者與之金時人無能增損說者以為非不能也盖憚相國畏其勢耳然其書以道德為凖的以無為為紀綱忠義為品式以公方為檢式與孟軻孫卿相表裏也列仙傳曰李耳字伯陽陳人也生于殷時為周柱下史好養精氣貴無名接而不施轉為守藏吏積年乃知其真人也仲尼師之去入大秦過闗令尹喜待迎之疆使著書作道德經上下二卷鶡冠子或曰楚人隠居衣敝履穿以鶡為冠莫知其名因服成號著書言道家事西京雜記曰淮南王著鴻烈二十篇鴻大也烈明也言大明禮教也號為淮南子一曰劉安子自云字中風霜之氣揚子雲以為一出一入字直百金又曰董仲舒夢蛟龍入懐乃作春秋繁露又曰葛洪家世有劉子駿漢言百卷首尾無題名但以甲乙丙丁記其卷數先父傳之歆欲撰書編錄漢事類未得構而亡故書無宗本止雜記而前後無事類後好事者以意次第之始甲終癸為十帙十卷合百卷洪家有小同異也又曰揚雄著太𤣥經夢吐白鳯凰集其頂上揚雄傳賛曰雄好古而樂道其志欲窮文辭成名于後世以為經莫大于易是故作太𤣥傳莫大于論語故作法言桓譚新論曰揚子雲才智聞道卓絶于衆漢興以來未有此也國師子駿曰何以言之答曰通才著書以百數惟太史公為廣大餘皆藂殘小論不能比之子雲所造法言太𤣥經也人貴所聞賤所見也故輕易之若遇上好事必以太𤣥次五經也抱朴子曰王充作論衡北方郡未有得之者蔡伯喈常到江東得之嘆其文高度越諸子及還中國諸儒覺其談論更逺嫌得異書或捜求至隱處果得論衡捉取數卷將去伯喈曰惟吾與汝共之勿廣也又曰盧生問曰蔡伯喈張平子才足著書正恐言逺㫖深世人不解故不著也余難云如果言子雲亦不應作太𤣥經也瓦甒木杯比門所饒金觴玉爵萬家无一也又曰孔鄭之門耳聽口受者滅絶而托竹素者為世寳也又曰余家遭火典籍蕩盡困于无力不能更得故抄撰衆書撮其精要用工少而所收多思不煩而所見博或謂洪曰流无源則乾條離株則悴吾恐玉屑盈車不如金璧余答曰詠源流者採珠而捐蚌登荆領者拾玉而棄石余之抄畧譬猶摘翡翠之藻羽脫犀象之角牙又曰稽君道問二陸優劣抱朴子曰朱淮南嘗言二陸重規沓矩無多少也一手之中不無鈍利方之他人若江漢之與潢潦陸子十篇誠為快書者其詞之富者雖覃思不得損也其理之約者雖淺筆腐毫不可益也陸平原作子書未成吾門生有在陸君軍中常在左右説陸君臨亡曰窮通時也遭遇命也古人貴立言以為不朽吾所作子書未成以此為恨耳余謂仲長統作昌言未竟而亡後董襲撰次之桓譚新論未備而終班固謂其成琴道今才士何不賛成陸公子書頴容春秋例曰著述之事前有司馬遷揚雄後有鄭衆班固近即馬融鄭𤣥其所著作違義正者畧舉一兩事以言之遷史記不識畢公文王之子而言與周同姓揚雄法言不識六十四卦云所從來尚矣論衡曰畫工好畫上世人不畫秦漢士者尊古卑今揚子雲作太𤣥經法言張伯松不肯一觀與並肩故賤其言也若生周世則為金匱也又曰淮南吕覧文不無累害所以出者家富官貴也人難充書繁重云玉少石多多者不珍龍少魚衆少者為神充答曰文衆勝寡財寡愈貧世無一卷吾有百篇人無一字吾有萬言孰為賢也充仕數不遇以章和二年徙家避難揚州丹陽入為治中才小任大職在刺劾筆札之思歴年寢廢章和三年罷州還年漸七十時可懸輿髮白齒落日月逾邁貧無供養志不娯快乃作養生之書凡十六篇論衡造於永平末定於建初之年耳新論曰余為新論術辨古今今亦欲興治也何異春秋褒貶耶今有疑者所謂蚌異蛤二五為非十也譚見劉向新序陸賈新語乃為新論莊周寓言乃云堯問孔子淮南子云共工争帝地維絶亦皆為妄作故世人多云短書不可用然論天間莫明於聖人莊周等雖虗誕故當採其善何云盡棄耶風俗通應邵撰序云風者天氣有寒煖地氣有隂陽泉水有羙惡草木有剛柔俗者含血之類象而生之百里不同風千里不同俗周秦嘗以月遣輶軒使采異代方知載之秘府及羸氏之亡遺棄殆盡蜀人嚴君平有千餘言林陶翁儒才有梗槩與揚雄續注二十七年凡九千字猶不如爾雅之宏麗張竦云懸諸日月不刋之書余不才敢比隆於斯人金樓子曰王仲宣昔在荆州著書數十篇荆州壊盡焚其書今在者一篇知名之士咸重之見虎一毛不知其斑又曰劉輔性矜嚴有盛名沉深好經書善說京氏易論集經傳及圖䜟文作五經通論世號之曰沛王通明帝甚敬重之賞賜恩寵加異又曰或問余曰子何不詢之有識共著此書何為區區自懃如此予曰夫荷旃被毳者難與道純綿之緻宻羮藜含糗者不足論大牢之滋味故服絺􅗽之凉者不知盛暑之鬰燠襲貂狐之煖者不知至寒之愴悽予之術業豈賔客之能窺斯盖以莛撞鍾以蠡測海也予嘗切齒淮南不韋之書謂為賓逰所製每至著述之間不命賓客之窺也又曰桓譚新論華譚又有新論揚雄有太𤣥經楊泉有太元經談此多悞動形象或曰桓譚有新論何處復有華譚揚子但有太𤣥經何處復有太元經也皆由不學使之然矣隋大業拾遺曰大業之初勅内史舎人竇威起居舎人崔祖濬及龍川賛治侯偉等三十餘人撰區宇圖志一部五百餘卷新成奏之又著丹陽郡風俗乃見以呉人為東夷度越禮義及屬辭比事全失修撰之意帝不恱遣内史舍人栁逵宣敕責威等云昔漢末三分鼎立大呉之國以稱人物故晉武帝云江東之有吳㑹猶江西之有汝頴衣冠人物千載一時及永嘉之末華夏衣纓盡過江表此乃天下之名都自陳平之後碩學通儒文人才子莫非彼土爾等著其風俗乃為東夷之人度越禮義於爾等可乎然于著述之體又无次序各賜杖一頓即日敕追秘書學士十八人修十郡志内史侍郎虞世基緫檢于是世基先命學士各序一郡風俗奏擬請體式學士著作佐郎虞綽序京兆郡風俗學士宣惠尉陵敬序河南郡風俗學士宣德郎杜寳序呉郡風俗四人先成以簡世基世基曰虞綽序京兆文理俱贍優博有餘然非衆人之所能繼陵敬論河南雖文華才富序事過繁袁朗杜寳吳蜀二序不畧不煩文理相副宜具狀以四序奏聞去取聽敕及奏帝曰學士修書頗得人意各賜物二十段付世基擇善用之世基乃鈔呉郡序付諸頭以為體式及圖志第一副本新成八百卷奏之帝以部帙太少更遣子細重修成一千二百卷卷頭有圖别造新様紙卷長二尺叙山川則卷首有山水圖叙郡國則卷首有郭邑圖叙城隍則卷首有公館圖其圖上山水城邑題書字及細並用歐陽肅書即率更令詢之長子攻于草𨽻為時所重㓜屬文東觀漢記曰班固字孟堅九歲能作賦頌因數入讀書禁中每行廵狩輙獻上賦頌魏志曰陳思王植年十歲善屬文太祖曰汝倩人耶植跪對曰言出為論下筆成章願當面試時銅雀臺新成太祖悉將諸子登臺使各賦之植援筆立就又曰文帝八歲屬文魏氏春秋曰阮籍㓜有奇才異質八歲能屬文性恬静兀然彈琴長嘯以此終日又曰庾闡字仲初少孤年九歲能屬文鄉里重之崔鴻十六國春秋曰南凉錄秃髪傉檀子歸年十三命為高昌殿賦援筆即成影不移漏傉檀覽而異之擬之曹子建云亦出思疾後魏書曰胡叟入長安觀風化隠匿名行懼人見知時京兆韋祖思少閱典墳多蔑時彦知叟至召而見之祖思習常待叟不足聊與叙溫涼拂衣而出祖思固留之曰當與君論天人之際何遽而反乎叟對曰論天人者亡乆矣與君相知何夸言若是也遂不坐而去至主人家賦韋杜二族一宿而成時年十有八耳具述前載无違舊美叙中世有協時事而末及鄙黷人皆奇其才畏其筆世猶傳誦之以為笑狎南史曰張率字士簡性寛雅年十二能屬文常日限為詩一篇或數日不作則追補之稍進作賦頌至年十六向作二千餘首有虞訥者見而詆之率乃一旦焚毁更為詩示焉託云沈約訥便向之嗟稱無字不善率曰此吾作也訥慚而退南史曰劉孝綽本名冉㓜聦敏七歲能屬文舅齊中書郎王融深賞之與同載以適親友號曰神童融每曰天下文章若無我當歸阿士即孝綽小字也又曰謝貞八歲嘗為春日閑居詩從舅王筠奇之謂所親曰至如風定花猶落乃追步惠連矣年十三尤善左氏春秋工草隸蟲篆後周書曰李旭㓜年已解屬文有聲洛下時洛陽剏置明堂旭年十歲數為明堂賦雖優洽未足才制可觀見者咸曰有家風矣三國典畧曰蕭大心字仁恕小名英童與大器同年十歲並能屬文嘗雪朝入見梁武帝詠雪令二童各和並援筆立成梁書曰栁惲早有令名少工篇什為詩云亭臯木葉下隴首秋雲飛瑯琊王融見而嗟賞因書齋壁及所執白蘭團扇又曰太祖文帝諱綱字世纉六歲能属文高祖驚其早就不之信也及于御前面試辭采甚美高祖嘆曰此子吾家之東阿也又曰丘遲字希範年八歲便屬文父靈鞠有才名常謂氣骨似我徴士何㸃見而異之又曰庾肩吾八歲能賦詩特為兄於陵所友愛又曰何遜字仲言八嵗能賦詩弱冠州舉秀才南鄉范雲見對䇿大相稱賞謂所親曰頃觀文人質則過儒麗則傷俗其能含清濁中今古見之何生矣沈約亦愛其文又曰陸從典字由儀㓜聦敏年八嵗讀沈約集見迴文妍麗援筆擬之便有佳致十二作栁賦其辭甚美從父瑜特所賞愛隋書曰李徳林㓜聦敏年數嵗誦左思蜀都賦十餘日便度高隆之見而嗟歎遍告朝士云若假其年必為天下偉器鄴京人士多就宅觀之月餘日中車馬不絶年十五誦五經及古今文集日數千言俄而該博墳典隂陽緯候无不通渉善屬文又曰于宣敏字仲達少沉密有才思年十一詣周趙王王命之賦詩宣敏為詩甚有幽貞之志王大竒之坐客莫不嗟賞起家右侍上士文選人名録曰曹植年十嵗誦詩讀論及賦數萬言能屬文又曰謝靈運㓜而聦慧善屬文舉筆立成文章之盛獨絶當時㓜童傳曰謝瞻字宣逺㓜而聦慧五嵗能屬文通𤣥理又曰孫士潜字石龍六嵗上書七嵗屬文金樓子自序曰余六嵗解為詩奉敕為詩曰池萍生已合林花發稍稠風入花枝動日照水光浮因爾稍學為文也太平御覽卷六百二
