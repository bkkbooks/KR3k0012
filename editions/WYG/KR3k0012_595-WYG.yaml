body:
  text: 太平御覧卷五百九十五宋李昉等撰文部十一論議牋啓書記論李充翰林論曰研求名理而論難生焉論貴於允理不求支離若稽康之論成文者矣文心雕龍曰論者倫也倫理無爽則聖意不墜昔仲尼微言門人追記故仰其經目稱為論語蓋羣論立名始於茲矣論者彌綸羣言而研精一理也是以莊周齊物以論為名不韋春秋六論昭列至如石渠論藝白虎通講聚述聖言通經論家之正體也及班彪王命嚴尤三將敷述昭情善入史體魏之初霸術兼名法傳嘏王粲校練名理迄至正始務欲守文而何晏之徒始盛𤣥論於是􅅨周當路與尼父争塗矣詳觀蘭石之才性仲宣之去代叔夜之辨聲太初之本𤣥輔嗣之兩例平叔之二論並師心獨見鋒頴精宻蓋論之英也至如李康運命同論衡而過之陸機辨亡效過秦而不及然亦美矣原夫論之為體所以辨正然否窮有數追究無形鑚堅求通鈎深取極乃百慮之筌蹄萬事之權衡也故其義貴圓通詞忌枝碎必使心與理合彌縫莫見其隙詞共心宻敵人不知所乗斯其要也是以論譬折薪貴能破理斤利者越理而横斷詞辨者反義而取通覧文雖巧而檢迹如妄惟君子能通天下之志安可以曲論哉漢書曰班彪遭王莾亂避地隴右時隗􅅝據隴右􅅝問彪曰往者周亡戰國並争天下分裂意者縱横之事復起於今乎將承運迭興在一人也願先生論之彪既感􅅝言又愍狂狡之不息乃著王命論以救時難後漢書曰王符耿介不同於俗因而憤恚著書以議於世不欲彰名號曰潜夫論又曰仲長統字公理每論古今世俗行事恒發憤歎息因著論名曰昌言晉書裴頠傳曰頠深患時俗放蕩不尊儒術何晏阮籍素有重名於世口談浮虛不遵禮法尸禄耽寵仕不事事至王衍之徒聲譽大盛位高勢重不以物務自嬰遂相傚效風教陵遲乃著崇有之論以釋其蔽又范喬傳曰光禄大夫李銓嘗論揚雄才學優於劉向喬以為向定一代之書正羣籍之篇使雄當之故非所長遂著揚劉優劣論又曰董養字仲道陳留浚儀人也太始初到洛下不干榮禄及楊后廢養因遊太學升堂歎曰建斯堂也將何為乎毎見國家赦書謀反大逆皆赦至於殺祖父母父母不赦者以為王法所不容也柰何公卿處議文餙禮典以至此乎夫人之理既㓕大亂作矣因著無化論以非之又曰魯褒字元道元康之後綱紀大壊褒傷時貪鄙乃隠姓名著錢神論其畧曰市井便易不患耗折親之如兄字曰孔方失之則貧弱得之則冨强無翼而飛無足而走觧嚴毅之顔開難發之口錢多者處前錢少者居後京邑衣冠疲勞講肄厭聞清談對之睡寐見我家兄莫不驚視又成公綏亦著錢神論梁書曰范縝字子真南陽武隂人也齊景陵王子良盛招賔客縝豫焉子良性好釋教而縝不信因著神威論以明之子良集僧難之而不能屈王筠難縝曰嗚呼范子曾不知其先祖神靈所在縝答曰嗚呼王子知其先祖神靈所在而不能殺身以從之又曰劉峻見任昉諸子西華等兄弟流離不能自振平生舊交莫有收恤西華冬月著葛巾帔練裙路逢峻峻泫然矜之因廣朱公叔絶交論到溉見其書抵几於地終身恨之後周書柳虬時人論文體者有今古之異虬以時有古今非文有古今乃為文質論隋書曰開皇之末國家殷盛朝野皆以遼東為意劉炫以為遼東不可伐作撫邊論以諷焉當時莫有悟者及大業之季三征不克炫言方騐典論曰余觀賈誼過秦論發周秦之得失通古今之制義洽以三代之風潤以聖人之化斯可謂作者矣抱朴子曰洪造穹天論云天形窮隆如笠冐地若謂天北方逺者是北方星宜細於三方矣語録曰宋岱為靑州刺史著無鬼論甚精莫能屈後有書生詣岱談論次及無鬼論書生乃拂衣而去曰君絶我軰血食二十餘年以君有青牛髯奴所以未得相困今奴已死可得相制矣言終而去明日岱亡議說文曰議語也又曰論難也周易節卦曰君子以制度數議徳行文心雕龍曰周爰咨謀是謂為議議之言宜審事冝也易之節卦君子以制度數議徳行周書曰議事以制政乃弗迷議貴節制經典之體也昔管仲稱軒轅有明臺之議則其來逺矣洪水之難尭咨四岳宅揆之舉舜疇五臣三代所興詢及芻蕘春秋釋宋魯桓務議及趙靈胡服而季父争論商鞅變法而甘龍交辦雖憲章無筭而同異足觀迄至有漢始立駮議駮者雜也雜議不純故曰駮也自兩漢文明楷式昭備藹藹多士發言盈庭若賈誼之徧代諸生可謂捷於議也至如主父之駮挾弓安國之辨匈奴賈捐之陳於朱崖劉歆之辨於祖宗雖質文不同得事要矣若乃張敏之斷輕侮郭躬之議擅誅程曉之駮校事司馬芝之議貨錢何曾蠲出女之科秦秀定賈充之謚事實允當可謂達議體矣漢世善駮則應劭為首晉代能議則傅咸為宗然仲瑗博古而銓貫有叙長虞識治而屬辭枝繁及陸機斷議亦有鋒頴而腴辭不剪頗累文骨亦各有美風格存焉夫動先擬議明用稽疑所以敬慎羣務弛張治術故其大體所資必樞紐經典采事實於前代觀變通於當今理不謬揺其枝字不妄舒其藻郊祀必洞於理戎事宜練於兵田榖先曉於農斷訟務精於律然後標以顯議約以正辭文以辨㓗為能不以繁縟為巧事以明覈為美不以深隠為竒此綱領之大要也若不逹政體而舞筆㺯文支離搆辭穿鑿㑹巧空騁其華固為事實所擯設得其理亦為浮辭所埋矣昔秦女嫁晉從文衣之媵晉人貴媵而賤女楚珠鬻鄭鄭為薰桂之櫝鄭人買櫝而還珠若文浮於理末勝其本則秦女楚珠復在於茲矣李充翰林論曰在朝辨政而議奏出宜以遠大為本陸機議晉斷亦名其美矣三國典畧曰王粲才既髙辨鍾繇王朗等雖名為魏卿相於朝廷奏議皆閣筆不敢措手又曰齊主命立三恪朝士議之太子少傅魏收為議衆皆同之吏部侍郎崔瞻以父與收有隙乃别立議收讀瞻議畢笑而不答瞻曰瞻議若是湏賛所長瞻議若非湏告所短何容讀國士議文直如此冷笑收慙而竟無言又曰齊魏收嘗在議曹與諸博士引據漢書論宗廟事博士笑之收便忿取韋𤣥成傳抵之而起博士夜共披尋遲明來謝曰不謂𤣥成如此學也南史曰馬聚梁天監初詔通儒定五禮有司舉聚修嘉禮除尚書祠部郎時創定禮樂聚所建議多見施行兼中書通事舍人每吉㓙禮當時名儒明山賔賀瑒等疑不能斷者皆取决焉唐書曰天寳中崔昌上封事推五行之運以國家合承周漢其周隋不合為二王後請廢詔下尚書省使公卿議昌獨見之明羣議不屈㑹集賢院學士衞包抗表陳議論之夜四星聚於尾宿天意昭然上心遂定求殷周漢後為三恪廢漢韓介􅈶等公以昌為左賛善大夫又曰張平叔判度支平叔欲以征利中上意以希大任請加鹽㩁貴售州郡時宰不能奪因下其議韋處厚奏議發十難以詰之上然後深知害人乃止平叔繇是始踈蔡邕獨斷曰有疑事公卿百官㑹議若臺閣有正處而獨執異意者曰駮議曰某官某甲議以為如是言下臣愚戅議異其非駮議不得言議異金樓子曰余後為江州副君賜報曰京師有論云論議當如湘東王士官當如此王充充時始為僕射領選也牋說文作箋說文曰牋表識書也文心雕龍曰牋者表也識表其情也崔寔奏記於公府則崇讓之徳音矣黄香奏牋於江夏亦肅恭之遺式矣公幹牋記文麗而規益子桓弗論故世所共遺若畧名取實則有美於為詩矣劉廙謝恩喻切以至陸機自叙情周而巧牋之善者也原牋記之為式既上規乎表亦下睨乎書使敬而不懾簡而無傲清美以惠其才彪蔚以文其響盖牋記之分也晉書曰劉卞字叔龍東平湏昌人也本兵家子質直少言為縣小吏功曹夜醉如厠使卞執燭不從功曹銜之以它事補亭子有祖秀才者於亭中作與刺史牋乆不成卞教之數言卓犖有大致秀才謂縣令曰卞公府掾之精者云何以為亭子令即召為門下吏異苑曰河内荀儒字君林乗氷省舅氏䧟河而死兄倫字君文求尸積日不得設祭水側又投牋與河伯經一宿岸側水開尸手執牋浮出倫牋謝之博物志曰鄭𤣥注毛詩曰牋不觧此意或云毛公嘗為北海𤣥是此郡人故以為敬耳世説曰郄司空在北府桓宣武惡其居兵權㕁於事機素暗遣牋詣桓方欲共奬王室修復園陵世子嘉賔出行道上聞信至急遣取牋視之竟寸寸毁裂便回車還依帳中卧更作箋自陳老病不復堪人間欲乞閒地自飬宣武大喜即發詔轉為都督五郡守㑹稽啓說文曰啓傳信也服䖍通俗文曰官信曰啟張璠漢記曰董卓呼三臺尚書以下自詣卓啓事然後得行文心雕龍曰啓者開也高宗云啓乃心沃朕心盖其義也孝景諱啟故兩漢無稱至魏國牋記始云啟聞奏事之末或云謹啟自晉來盛啟用兼表奏陳政言事既奏之異條讓爵謝恩亦表之别幹必歛散入規促其音節辨要輕清文而不侈亦啟之大畧也書記文心雕龍曰大舜云書用識哉所以記時事也盖聖賢言辭總為之書書之為體主言者也揚雄曰言心聲也書心畫也聲畫形君子小人見矣故書者舒也舒布其言陳之簡牘取象乎史貴在明决而已三代政暇文翰頗疎春秋聘繁書介彌盛繞朝贈士㑹以策子家與趙宣以書巫臣之遺子反子産之諫范宣詳觀四書辭若對靣又子服敬叔進弔書於滕君固知行人挈辭多被翰墨及七國獻書詭麗輻凑漢来筆札辭㫖紛紜觀史遷之報任安東方之難公孫楊惲之酬會宗子雲之答劉歆志氣盤桓各含殊采並杼軸乎尺素抑揚乎寸心逮後漢書記則崔瑗尤善魏之元愉號稱翩翩文舉屬章半簡必錄休璉好事留意辭翰抑其次也嵇康絶交實志高而文偉矣趙至叙離廼少年之激切也至如陳遵占辭百封各意禰衡代書親踈得宜斯皆尺牘之偏才也詳總書體本在盡言所以散欝陶託風采固宜條暢以任氣優游以懌懐文明從容亦心聲之獻酬也若夫尊貴差序則肅以節文自戰國以前君臣同書秦漢立儀始有表奏王公國内亦稱奏書張敞奏書於膠后其義美矣迄至後漢稍有名品公府奏記而郡將奏牋也漢書曰蘇武與常惠使匈奴被留昭帝即位數使使至匈奴常惠請其守者與俱得夜見漢使具自陳道教使者謂單于言天子射上林得鴈足有係帛書言武等在某澤中使者大喜如惠語單于視左右而驚謝漢使曰武等實在于是遣還漢又曰陳遵容貌竒偉備渉傳記贍於文辭性善書與人尺牘皆以為榮為河内太守既至官遣吏西上召善書吏十人於前治私書謝京師故人遵慿几口占且省官事書數百封親踈各有意又曰谷永字子雲便於筆札故時人云谷子雲之筆札樓君卿之脣舌後漢書曰鄧奉反於南陽趙熹素與奉善数遣書切責之而䜛者因言熹與奉合謀帝以為疑及奉敗帝得熹書乃驚曰趙熹真長者也即召熹引見賜鞍馬待詔公車又曰竇章字伯向好學有文與馬融崔瑗同好更相推薦融與竇書曰孟陵奴來賜書見手迹歡喜何量見於面也書雖兩紙紙八行行七字吳錄曰王宏為翼州刺史不發私書不畏豪族號曰王獨坐蜀志曰先主辟馬良為椽後遣使吳良請亮曰今銜國命恊穆二家幸為良介於孫將軍亮曰君試自為文良即為草曰寡君遣掾馬良通聘繼好以紹昆吾豕韋之勲其人吉士荆楚之令鮮於造次之華而有克終之美願降心存納以慰將命權敬待之又曰王平字子均生長戎旅手不能書所識不過十字而口授作書皆有法度使人讀史漢諸傳聽之畧知其義徃徃論說不失其指晉書曰荀朂與裴秀羊祜共官機宻時將發使聘吳並遣當時文士作書與孫皓帝用朂所作皓既報命和親帝謂朂曰君前作書使吳思順勝十萬之衆也又曰簡文輔政引髙崧為撫軍司馬桓溫擅率衆北伐簡文患之崧曰宜致書喻以禍福自當廻斾便於坐為書草曰冦讐宜平時㑹宜接此實為國逺圖經畧大算能𢎞斯㑹非足下而誰又曰王㳟將起兵討譙王尚之以謀告殷仲堪桓𤣥等俱從之推㳟為盟主剋期同赴京師時内外間阻津邏嚴急仲堪之信因庾楷逹之以斜絹為書内箭簳中合鏑漆之楷送於㳟㳟發書絹文角戾不復可識謂楷為詐晉陽春秋曰劉𢎞為荆州刺史每有興發手書守相丁寧欵宻故莫不感悦㒹倒爭赴咸曰得公一紙書賢於十部從事也沈約宋書曰劉穆之朱齡石並便尺牘嘗於高祖坐與齡石共答書自旦至日中穆之得百凾齡石得八十凾而穆之應對無廢又曰徐湛之善於尺牘音詞流暢南齊書曰周顒字彦倫善尺牘沈攸之送絶交書太祖口授令顒裁答齊春秋曰吳都張融字思光臨終及葬徴士何㸃使汝南周英為書與融謝􅊪見歎曰此書雖漂宕不倫亦有破的後周書曰梁䑓性果敢有志操不過識千餘字口占書啟辭意可觀又曰柳慶時父僧習為潁州郡地接都畿民多豪右將選官皆依倚貴勢競來請託選用未定僧習謂子曰權貴請託吾並不用其使欲還皆須有答汝等各以意為吾作書也慶乃具書草云下官受委大邦選吏之日有能者進不肖者退此乃朝廷恒典僧習讀書歎曰此兒有意氣丈夫當如是即依慶所草以報後唐書曰李襲吉掌太祖書記襲吉博學多通猶諳悉國朝近事為文精義練實動拘典故無所放縱羽檄軍書辭理尤徤自太祖上源之難與朱温不叶乾寕末劉仁㳟負恩其間論列是非交相騁答者數百篇警䇿之句播在人口文士稱之大復中太祖與朱温修好遣張特致書初叙相失之由至毒手尊拳之句温怡然大笑謂軍吏敬翔曰李公斗絶一隅削弱如此襲吉一函抵二十萬兵勢所謂彼有人何可當也如此之智筭得襲吉之筆如虎傅翼矣翔赧然而退魯連子曰燕伐齊取七十餘城唯莒與即墨不下齊田單以即墨破燕軍騎刼復齊城唯聊城不下燕將守城數月魯仲連乃為書著之於矢以射城中遺燕將書燕將得書泣三日乃自殺韓子曰鄭人有遺燕相國書者夜火不明因謂持燭者曰舉燭而誤於書中云舉燭非書意也燕相國受書而悅之曰舉燭髙明者舉賢而任之因以之治也皇甫謐髙士傳曰光武徴嚴光至司徒侯霸遣使西曹屬侯子道奉書光不起於床上箕踞發書讀訖問子道曰君房素癡今為三公寕小差否子道曰位已鼎足不癡也公曰遣卿來何言子道曰公聞先生至區區欲即詣廹於典司是以不獲願因日暮自屈語言光曰卿言不痴是非癡語也天子徴我三乃來人主尚不見當見人臣乎子道求報光曰我手不能書乃口授之曰君房足下位至鼎司甚善懷仁輔義天下悅阿䛕順㫖腰領絶無他言使者嫌少可更足光曰買菜乎求益也魯國先賢傳曰孔翊為洛陽令置水器於庭前得私書皆投其中一無所發彈治貴戚無所廻避典畧曰太祖嘗使阮瑀作書與韓遂於馬上具草書成呈之太祖攬筆欲有所定而竟不能増損語林曰殷洪喬作豫章郡臨去郡人因寄百餘函書至石頭悉擲水中因呪之曰沉者自沉浮者自浮殷洪喬不能作逹書郵魏文帝與吳質書曰元瑜書記翩翩致足樂也魏文帝集曰上平定漢中旅父都尉還書與余盛稱彼􅁟地形勢觀其詞知陳琳所為李充起居注曰牀頭書䟽亦不足觀或他事私宻不欲令人見之縱能不宣誰與明之若有泄露則傷之者至矣稽康與山濤書曰素不便書又不喜作書而人間多事堆案盈几不相酬荅則犯教傷義欲自勉强則不能乆延篤答張奐曰離别三年夣想言念何日有違伯英來惠之書盈四紙讀之反復喜不可言張奐與隂氏書曰篤念既宻文章粲爛奉讀周旋紙弊墨渝愈不離於手金楼子曰劉眭能作文春秋㫖義終始論及賦頌數十乂善史書當世以為楷則及寢病帝驛馬令其作草書尺牘十首古詩曰客從遠方來遺我一書札置之懷袖中三歲字不㓕又曰客從遠方來遺我䨇鯉魚呼童烹鯉魚中有尺素書長跪讀素書書中意何如上言加飡飯下言長相思太平御覧卷五百九十五
