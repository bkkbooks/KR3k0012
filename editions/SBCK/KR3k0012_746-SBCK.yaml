front:
  text: 太平御覽卷第七百四十六
  hash: sha256:589285bf50fbd6d1307beaa7b4c83d4fb29c9ff02b64a02d9ad2b8a50d797b97
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_746-1a}
body:
  text: 工藝部三射下御射下吕氏春秋曰射扚者欲其中小也射獸者欲其中大也物固不必可推又曰荆廷甞有白猨荆之善射者莫之能中荆王請養由基射之養由基矯弓操矢而徃發之則猨應矢而下白虎通曰天子所以親射何􅂇陽氣逹萬物也春陽氣微弱恐物有窒塞不能自逹者天子射熊何示服猛逺巧侫也熊爲獸猛巧者也非但當服猛巧者示當服天下巧侫之臣也諸侯射麋何示逺迷惑人者也麋之言迷也大夫射虎豹何示服猛也士射鹿豕何示除害也各取德而能服也大夫士射兩物何大夫士俱人臣隂數偶也侯者以布爲之何布者用人事之始也夲正則末正矣名之爲侯者何明諸侯有不朝者則當射之君子重同􅀋不忍射之故􅀞獸射之射主何爲乎曰射義非一也夫射者執弓堅固心平體正然後中也二人争勝樂以養德也勝􅀒俱降以崇禮譲故可以選士夫勝者發近而制逺選士所以􅂇微抑強調和隂陽戒不虞也天子射百二十歩諸侯九十歩大夫七十歩士五十歩明尊者所服逺卑者所服近也列女傳曰晉平公使工爲弓三年乃成射不穿一札公怒將殺工其妻見公曰妾之夫造此弓亦以勞矣而不穿一札是君不能射也妾聞射之道左手如矩右手如附枝右手放發左手不知公以其言爲儀儀法而穿七札弓工立得岀賜金三鎰英雄記曰􅀽術遣將紀靈率歩􅀐三萬攻劉備吕布遣人招備并請靈等饗飲謂靈曰布性不喜合􅋐但喜解􅃲耳乃令植㦸於營門彎弓曰諸君觀布射㦸小支中者當解兵不中留決􅃲布一發中㦸支遂罷兵西京􅄂記曰茂陵人周楊夲瑯耶人善馴野雞以爲媒用以射雉毎三春之月􅈋障自翳用鮭古迷切矢以射之日連百數茂陵輕薄者化之皆以􅄂寳錯厠翳障輕􅀐妖服追隨於道路以爲歡娱楊死其子亦善其事董司馬賢也好之以爲上客典論曰文帝自叙曰少好弓馬逐禽輙十里射常岀百歩後獩㹮貢良弓燕代獻名馬於鄴西獵終日獲麞鹿九雉兎二十後尚書令荀彧問余曰聞君善左右射此實難能余曰執事未覩凡埒有常徑的有定所雖矢發輙中非妙也􅀂夫馳平原赴豐草逐狡獸截輕禽使弓不虚彎矢不虚發此乃妙耳山海經曰軒轅國在窮山之際不敢西射畏軒轅之丘故也言敬畏黄帝威靈故不敢向之射也論衡曰養由基見寢石以爲虎射之飲羽案精誠所感不過入一寸耳今勇夫卒見寢石以手推之能令石有跡乎射經曰夫射者所以觀德也不能則辭之以疾懸􅀌之義在焉故曰和容爲上主皮爲次并之者又何加矣乃君子之所爭也雖欲勿用禮其捨諸乎王昶戲論曰禮記有投壷之宴論語稱􅀶弈之賢兹三戯者君子末事不足爲也樗蒲彈碁旣不益人又國有禁皆不得爲也吾見坐圍碁而死近事非逺昔晉侯以投壷丧宋公好􅀶弈亡豈不哀哉諸戲中唯有射者男子之事在於六藝􅀂欲戲唯得射而巳其餘不得爲也曹植樂府歌曰控弦破左的發矢摧月支仰手接飛猱俯身散馬蹄又曰􅃲雞東郊道走馬長楸間驅馳未能半􅀟􅇠過我前攬弓挾鳴鏑長驅上南山左挽因右發一縱兩禽連餘巧未盡展仰手接飛鳶觀者咸稱善衆工歸我妍御書曰􅀂朽索之御六馬禮曰君將駕則㒒執䇿立於馬前􅁥駕且爲馬行巳駕僕展軨展軨具視效駕自巳駕矣奮衣由右上取貳綏奮振去塵也貳副也跪乗未敢立散也執䇿分轡驅之五歩而立調成之也君岀就車則㒒并轡授綏車上㒒所主也左右攘辟謂羣臣陪位侍駕者也攘却也或音古讓乎也車騎而騶至于大門君撫㒒之手而顧命車右就車門閭溝渠必歩車右勇力之士備制非常者君行則陪乗君式則下歩行也凡㒒人之禮必授人綏􅀂㒒者降等則撫㒒之手不然則自下拘之撫小止之議也自下取之也㒒與巳下拘之由㒒手同爵則不受又曰魯莊公及宋人戰于乗丘懸奔父御卜國爲右馬驚敗績公墜左車授綏公曰未之卜也懸奔父曰他日不敗績而今敗績是無勇也遂死之圉人浴馬有流矢在白肉公曰非其罪也遂誄之周禮曰教國子以五馭一曰鳴和鑾二曰逐水曲三曰過表四曰儛交衢五曰逐禽在論語曰子謂門弟子曰吾何執執御乎執射乎吾執御矣大戴禮曰善御馬者正衘勒齊轡䇿均馬力和馬心家語曰閔子騫爲費宰問政於孔子孔子曰以德以法夫德法者御民之具猶御馬之有銜勒也君子人也吏者轡也刑者䇿也人君之政執其轡䇿而巳矣又曰子貢問治人於孔子孔子曰懔焉如與腐索御汗馬懔懼也汗突之馬也國語曰䥫之戰簡子曰鄭人擊我吾伏弢他刀切弢弓文流血鼓音不衰今日之事莫我􅀂也衛莊公爲右衛莊公奔晉趙簡子將納之爲右也曰吾九登九下擊人盡殪今日之事莫我加也郵無正御曰吾兩鞅將絶吾能止之郵無正大夫王良也鞅引也今日之事我止之次也駕而乗材材横也兩鞅皆絶史記曰周穆王乗驊騮騄耳使造父爲御日行千里徃見西王母莊子曰東野稷以御見莊公進退中繩周旋中䂓莊公爲造父弗過也顔闔遇之入見曰稷之馬將敗公密而不應少焉果敗而反公曰子何以知之曰其馬力竭矣而猶求焉故曰敗列子曰造父師曰􅁗豆氏造父之始從習御也執禮甚卑􅁗豆氏三年不吿造父執禮愈謹迺告之曰古語曰良弓之子必先爲箕良冶之子必先爲裘汝先觀吾趨趨如吾然後六轡可持六馬可御造父曰唯命所從􅁗豆氏乃立木爲塗僅可容足計步而置之履之而行趨走徃還無缺失也造父學之三日盡其巧􅁗豆歎曰子何敏也得之捷乎御者亦如此也曩汝行之於足應之於心推於御也齊楫乎轡銜之際急緩乎脣吻之和正度乎胷臆之中節節乎掌握之間内得於中心外合於馬志是故能進退履繩而旋曲中䂓取道致逺而氣力有餘誠得其術矣得之於銜應之於轡得之於轡應之於手得之於手應之於心則不以目視不以䇿驅心閑體正六轡不亂二十四蹄所投無差迴旋進退莫不中節然後車輪之外可使無餘轍馬蹄之外可使無餘地未甞覺山谷之嶮原隰之夷視之一也吾術窮矣汝其識之管子曰造父善御者也善視其馬節其飲食量其馬力故能取逺道而馬不罷音疲明主猶造父也善治其民度量其力也孟子曰昔者趙簡子使王良與嬖奚乗終日而不獲一禽嬖奚反命曰天下之賤工也或以告王良良曰請復之強而後可一朝而獲十嬖奚反命曰天下之良工也韓子曰鈆陵卓子乗蒼龍桃文乗鈎錦在前錯錣丁括切在後馬欲進則鈎錦之欲退則錯錣貫之馬因旁岀造父過之而爲之泣孫卿子曰定公問於顔闔曰東野畢之御善乎對曰善則善矣然甚將爲佚定公不􅀃入謂左右曰君子固誣人乎三日而牧來謂之曰東野畢之馬佚兩驂引兩服入厩定公越席而起召顔闔曰子言東野畢其馬將佚不識何以知之對曰臣以政知之昔者舜巧於使民而造父巧於使馬舜不窮其民造父不窮其馬是以舜無佚民造父無佚馬今野畢之御上車執轡衘體正矣歩驟馳騁朝禮畢矣歷險致逺其力盡矣然而求馬不巳是以知之公曰善哉尸子曰夫馬者良工御之則和馴端正致逺道矣㒒人御之則遟奔毀車矣民者譬之馬也尭舜御之則天下端正桀紂御之則天下奔於歷山淮南子曰急轡數䇿者非千里之御也又曰御者非轡不行學御者不爲轡也又曰舟覆乃見善游馬奔乃見良御善游故覆舟不溺良御故馬奔車不敗故見之又曰夫載重而馬羸雖造父不能以追急車輕而馬良雖中工可以致逺又曰良馬不待䇿錣丁刮切䇿端有鐵也而行駑馬雖兩錣之不能進爲此不用䇿錣而御則愚矣又曰􅀂夫鉗且大丙之御也鉗且大丙太一之御除轡衘棄箠䇿車莫動而自舉馬莫使而自走星燿而􅀇運電奔而􅀑駭進退詘伸不見塍余反四毀又曰尹需學御三年而無得焉常寢想之寢堅思之中夜夢受秋駕於師秋駕善御之術明日徃朝師望而謂之曰吾非愛道於子也恐子不可予也今日將教子以秋駕尹需反走北面再拜曰臣有天幸今夕固夢受之又曰夫馬之爲草駒之時跳躍揚蹄翹尾而走人不能制馬五尺以下爲駒放在草中故曰爲草駒之時翹舉也制禁也之及至圉人擾之良御教之圉養馬官擾順也掩以衝扼連以轡衘則雖歷險趨塹弗敢違戾故其形之爲馬其可駕御教之所爲也又曰夫御者馬體調乎車御心和乎馬則雖歷險至逺進退周旋無不如意雖有騏􅂹騄耳之良而使烏獲御之則馬反自恣恣却行也而人不御也太平御覽卷第七百四十六
