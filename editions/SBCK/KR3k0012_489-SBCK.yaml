front:
  text: 太平御覽卷第四百八十九
  hash: sha256:6c348c81bee15a96d64472181651b25c73cd57f49b6515d41b7aed96ca16f5b1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_489-1a}
body:
  text: 人事部一百三十别離毛詩曰出􅀫于濟飲餞于禰又曰申伯言邁王餞于郿又曰挑兮撻兮在城闕兮一日不見如三月兮又曰燕燕于飛差池其羽之子于歸逺送于野瞻望弗及泣涕如雨又曰送子渉淇至于頓丘又曰我送舅氏曰至渭陽又曰出宿于浦飲餞于祢又曰顯父餞之清酒百壷又曰有女仳離􅁣其歎矣禮記曰嫁女之家三夜不息燭思相離也左傳昭四年鄭六卿餞宣子於郊宣子曰二三子請賦詩起亦以知鄭志子􅚖賦野有蔓草子産賦羔裘子太叔賦褰裳子㳺賦風雨子旗賦有女同車子柳賦籜兮宣子喜曰二三子以命貺起賦不出鄭志二三君子皆數丗之主也家語曰孔子去周而老子送之曰吾聞冨貴送人以金仁者送人以言吾雖不能冨貴而竊仁者之號請送子以言凡當丗之聦明深察而近於死者好議人者也􅀶辨宏大而危其身者好發人之惡者也孔子曰敬奉教又曰孔子在衛晨興顔淵侍有哭者甚哀回曰此哭非獨哀死又悲生離也孔子曰何以知之對曰回聞􅁪山之鳥生四子焉羽翼旣成將分離悲鳴以相送哀有􅀋於此矣史記曰魯人或惡呉起曰起之爲人猜忍人也其少時家累千金將仕不遂遂破其家郷黨􅀏之起殺其謗巳者三十餘人而東出衛郭門外與其母訣齧臂而盟曰起不爲卿相不復入衛又曰貳師將軍李廣利將兵擊匈奴丞相劉屈􅈊爲祖道送渭橋與廣利別又曰踈廣踈受父子並爲皇太子師􅀓朝廷以爲榮在位歳乆廣謂受曰吾聞知足不辱知止不殆功遂身退天之道也今仕宦至二千石䆠成名立如此不去懼有後悔即日父子俱稱病乞骸骨上以其年篤老皆許之加賜黄金二十斤皇太子賜以五十斤公卿大夫故人邑子爲設祖道供帳東都門外蘇林注曰長安東郭門也送者車數百兩辭訣而去及道路觀者皆曰賢哉二大夫或歎息爲之下泣又曰肅宗遣諸王歸國帝特留東平王蒼賜以秘書列仙圖道術秘方至八月飲酎畢有司復奏遣蒼乃許之手詔賜蒼曰骨肉天性誠不以逺近親踈然數見顔色情重昔時中心戀戀惻然不能言於是車駕祖送流涕而訣復賜乗輿服御珎寳與馬錢布以億萬計又曰赤眉兵盛乃拜鄧禹前將軍持節西征自選可與俱者於是凡將六將軍吏二萬人禹辭訣上自從輕􅀐數百送至野鄧禹不能定赤眉乃遣馮異代禹討之車駕送至河南賜以乗輿七尺劒勑異曰諸將非不能徤闘然好虜掠卿本能御吏念自修飭無爲郡縣所苦異頓首受命又曰東平王蒼朝京師月餘還國帝臨送歸宫悽然懷思乃詔遣使詣國辭别之後獨坐不樂因就車歸伏軾而吟誦及採菽以増歎息又曰第五倫年少諸家惟令詣郡尹鮮于裒見而異之署爲吏後裒坐事徴臨去握倫臂訣曰恨相知之晚又曰申徒蟠爲太尉黄瓊所辟不就及瓊卒歸葬江東四方名豪會帳下六七千人談論莫有及蟠者唯南郡一生與相酬對旣别執蟠手曰君非聘則徴如是相見於上京矣蟠勃然作色曰始吾以子爲可與言何乃相教榮貴之徒􅁘因振手而去魏志曰夏侯惇薨以曹休爲鎭南將軍假節都督諸軍事車駕臨送下輿執手而別呉志曰魯肅代周瑜過吕蒙酒酣蒙問肅曰君受重任與關羽爲隣將何計略以備不虞肅應曰臨時施冝蒙因爲畫五䇿肅於是越席就之拊其背曰吕子明吾不知卿才略所及至於此也遂拜蒙母結友而別又曰劉繇亡於豫章孫䇿命太史慈徃撫安之左右皆曰慈必北去不還䇿曰子義舎我尚復與誰餞送昌門把腕別曰何時能還荅曰不過六十日果如期而反􅀳中興書曰王澄甞之荆州送者傾邑所別處樹上有鵲巢澄便脫衣着犢鼻上樹探鵲􅑹而弄之傍若無人􅀳中興書曰衛玠兄璪時爲散􅀐侍郎内侍懷帝玠以天下將亂移家南行母曰我不能捨仲寳而去也玠啓喻深至爲門户大計母涕泣從之臨別玠謂璪曰在三之義人之所重今可謂致身命之日兄其勉之乃扶將老母轉至豫章而洛城失守璪没焉沈約宋書曰王弘字方平家貧而性好山水求爲烏傷令尋以病歸桓謙以爲衛軍叅軍時殷仲文還姑熟祖送傾朝謙要弘之同行荅曰凡祖離送别必在有情下官與殷風馬不接無縁陪從謙貴其言又曰張敷音儀詳緩與人別執手曰念相聞後魏書曰南安王禎復封南安王後爲鎭北大將軍相州刺史帝餞禎華林都亭詔左右賦詩不能者並可聽射當使武士彎弓文人下筆帝送禎下堦流涕而別續齊諧記曰京兆田眞三人分財堂前有紫荆花葉茂異共議破爲三分明截之爾夕樹即枯死眞見之驚謂弟曰花本同株當分析枯悴况人兄弟孔懷而少離異是不如樹也兄弟相感更合呉録曰朱桓還屯濡湏權祖之桓奉觴曰臣當逺去願一捋陛下􅂡無所復恨權憑几前席桓進持􅂡日臣今日眞可謂捋虎􅂡者權大􅀏呉越春秋曰越王勾踐伐吳將與大夫范蠡入臣於呉群臣皆送浙江大夫文種前爲祝其辭曰皇天祐助先沉後􅀭禍爲德根憂爲福堂許邁别傳曰邁好飬生遣妾歸家東逰採藥於桐廬山欲斷穀以山近人不得專一移入臨安自以無復反期乃改名逺逰書與婦別管輅别傳曰諸葛樂與輅别戒以二言卿性樂酒雖温克然不可保寧當節卿相有水鏡之才所見者妙福如膏火不可不愼侍節散才游於雲漢之間不受冨貴也輅言酒不可極才不可盡吾欲持酒以禮持才以愚何患之有􅁘穆天子傳曰天子觴西王母瑶池之上王母謡曰白雲在天山川間之荆府圖曰襄陽縣南陸道六里有林館是餞行送歸之所水經曰壽春縣故城東爲長瀬津之側有射堂北亭迎送之所江表傳曰孫權乗飛雲大舡與張昭秦松魯肅十餘人共送周瑜大宴㑹叙別昭等皆出權獨與劉備留語因言次嘆瑜曰公瑾文武籌略萬人之英頋其噐量廣大恐不乆爲人臣耳李陵別傳曰陵與􅂫武書曰男兒生不成名死必葬蠻夷中耳誰復能屈伸稽顙還向北闕使刀筆吏弄其文墨邪願足下勿復望陵嗟乎子卿知復何言相去萬里人絶路殊生爲離別之人死爲異域之􅀑文士傳曰張翰到京師時齊王冏擅權翰謂同郡人頋榮曰天下紛紛未巳夫有四海之名者求退難吾本山林間人無望於時去矣子善以明防前以智慮後榮捉其手愴然嘆曰吾亦思汝採南山蕨飲三江水耳翰遂稱疾徑歸府以翰輙去除吏名世􅀃曰杜預屯荆州頓七里橋朝士悉祖之又曰阮籍㛐甞歸家籍相見與別人或譏之曰禮豈爲我輩設耶裴淵廣州記曰尉佗築臺以朔望升拜號爲朝䑓即岡傍江搆起華館以送陸賈因稱朝亭語林曰殷公北征朝士出送之軍容甚盛儀止可􅀚陳􅀃經略攻取之冝衆皆謂必能平中原將別忽逞才自槃馬遂墮地士以是知其必敗又曰有人詣謝公別謝公流涕人了不悲旣去左右曰尚客殊自密雲謝公曰非徒密雲乃自旱雷吕氏春秋曰吴起行魏武侯自送之西河而與起辝武侯曰先生將何以治西河對曰以忠以信以仁以義武侯曰四者足矣郭子曰周叔治爲晉陵謨子叔治光禄大夫西平貞侯顗弟周侯仲智送之周侯名顗字伯仁仲智名嵩次弟也叔治將泣涕不止仲智恚之曰困人及婦人別惟知啼便捨去周侯獨留與飲酒言語臨別流涕撫其背曰阿孥自愛孔藂子曰子髙遊趙平原君客有鄒文李節者與相友善及將還魯諸故人訣旣畢文節送行三􅀫臨別文節流涕交頥子髙徒握手而巳分背就路其徒問先生與彼二子善彼有戀戀之心而先生厲聲髙揖無乃非親之謂乎髙曰始吾謂此二子丈夫耳乃今知其婦人人生其有四方之志豈鹿豕哉而常羣聚乎其徒曰若此二子泣非耶吾荅曰斯二子良人也有不忍之心其於斷必不足矣又曰竇皇后弟廣國曰姉去我西時與我訣於傳舎中沐我而去又曰成帝遣定陶王之國王辭去上與相對涕泣而訣琴操曰商陵牧子娶妻五年無子父兄將欲與改娶妻聞中夜驚起􅀝户悲嘯牧子聞援琴鼔之痛恩愛永離歎别鶴以舒情故曰別鶴操古詩曰行行重行行與君生別離相去萬餘里各在天一涯道路阻且長㑹靣安可期胡馬嘶北風越鳥巢南枝相去日巳逺衣帶日巳緩棄􅂢勿復道弩力加飡飯李陵贈􅂫武詩曰携手上河梁遊子暮何之徘徊歧路間恨恨不能辭行人難乆留客言長相思安知非日月弦望自有時弩力崇明德皓首以爲期又曰仰視浮雲馳奄忽互相踰風波一失路各在天一涯又曰昔爲鴛與鴦今爲參與商又曰二鳬俱北飛一鳬獨南翔子當留斯土我獨歸故郷􅂫武贈李陵詩云黄鵠一逺別千里影徘徊古詩曰客從逺方來遺我一書劄上有長相思下言乆離别置書懷䄂中三歲字不滅江淹别賦曰黯然消魂者唯别而巳矣楚辭序曰離别也騷愁也經徑也言巳放逐離别中心愁思猶陳道徑以諷諌君又曰草木揺落而變衰憭栗兮􅀂在逺行登山臨水送將歸又曰悲莫悲兮生别離太平御覽卷第四百八十九
