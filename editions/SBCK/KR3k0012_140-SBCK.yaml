  text: 太平御覽卷第一百四十
  hash: sha256:4e598893d4c7cd72d6cf04f42c7f19ac5f37f952dce22b30099485ef7f955b9d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_140-1a}
body:
  text: 皇親部六後魏宣武于皇后宣武髙皇后宣武胡皇后孝明胡皇后西魏孝武髙皇后文帝乙弗后郁乆閭后廢帝宇文后恭帝􅀂干后東魏孝静髙皇后後周文元皇后文叱奴后閔元后明獨孤后武阿史那后孝李后宣楊后宣朱后宣陳后宣元后宣尉遲后静司馬后隋文獨孤皇后宣華夫人焬帝蕭皇后後魏宣武于皇后後魏書曰宣武皇后于氏太尉烈弟勁之女也丗宗始親政事烈時爲領軍緫心膂之任以嬪御未備因左右諷諭稱后有容德丗宗乃迎入爲貴人時年十四甚見寵愛立爲皇后謁于太廟后静黙寛容性不妬忌生皇子昌三歳夭没其后􅁀崩宫禁事祕莫能知悉而丗議歸咎于髙夫人葬永太陵謚曰慎皇后宣武髙皇后後魏書曰宣武髙皇后文昭弟偃之女也世宗納爲貴嬪生皇子早夭文生建德公主後拜爲皇后甚見禮重性妬忌宫人稀得進御及肅宗即位上尊號曰皇太后尋爲尼居瑶光寺非大節慶不入宫中建德公主始五六歳靈太后恒置左右撫愛之神􅀛元年太后出覲母武邑君時天文有變靈太后欲以太后當禍是夜􅁀崩天下怨之喪還瑶光佛寺葬殯皆以尼禮丗宗暮年髙后悍音翰忌夫人嬪御有至帝崩不蒙待接者由是在洛二丗二十餘年皇太子全育惟肅宗而已宣武胡皇后後魏書曰宣武靈皇后胡氏安定臨涇人司徒國珎之女后母皇甫氏産后之日赤光四照京兆北山縣有趙胡者善於卜相國珎徃問之胡云賢女有大貴之表方爲天地母生天地主勿過三人知也后姑爲尼頗能講道丗宗初人講禁中積數丗諷左右稱后姿行丗宗聞之乃召入掖庭爲承華丗婦而椒庭之中以國舊制相與祈祝皆願生諸王公主不願生太子也惟后每謂夫人等言天子豈可獨有兒子何縁畏一身之死而令皇家不育􅃁嫡乎及肅宗在孕同列猶以故事相恐勸爲諸計后固意􅃀然幽夜獨誓云但使所懷是男次第當長子生身死所不辭也旣誕肅宗進爲充華嬪先是丗宗頻䘮皇子自以春秋長矣􅀷加愼護爲擇乳母皆取良家冝子者養於别宫皇后及充華嬪皆莫得而撫視焉及肅宗踐祚尊后爲皇太妃後尊爲皇太后臨朝聽政猶稱殿下令以行事後改令稱詔羣臣上書曰陛下自稱曰朕太后以肅宗冲㓜未堪親􅀕欲傍周禮夫人與君交獻之義代行􅀕禮訪尋故式門下召禮官􅀶士議以爲不可而太后欲以惟慢自鄣觀三公行事重問侍中崔光光便據漢和熹鄧后熹音熙薦􅀕故事太后大悅遂攝行祠祀太后性聦悟多才藝姑旣爲尼㓜相依託略得佛經大義親覽萬機手筆断决幸西林園法流堂命侍臣射不能射者罰之又自射針孔中之大恱賜左右布帛有差先是太后勑造申訟車時復御焉出自雲龍大司馬門從宫西而北入自千秋門以納􅁈訟又親䇿孝秀州郡計吏於朝堂太后與肅宗幸華林園宴羣臣于都亭曲水令王公以下賦七言詩太后詩曰化光造物含氣貞肅宗詩曰恭巳無爲賴慈英王公以下賜帛有差太后父薨百寮表請公除太后不許尋幸永寧寺觀建刹於九級之基僧尼士女赴者數萬人後幸左藏公主嬪女巳下從者百餘人皆令任力􅀒布絹即以賜之尋幸闕口温水登雞頭山自射象牙簮一發中之勑示文武時太后得志逼幸清河王懌媱亂肆情爲天下所惡領軍元又長秋卿劉騰等奉肅宗於顯陽殿幽太后於北宫於禁中殺懌自劉騰死义又寛怠太后與肅宗及髙陽王雍爲計解又領軍太后復臨朝大赦改元自是朝政踈緩威恩不立天下牧守所在貪惏音嵐鄭儼寵私宫掖􅀔傾海内李神􅁤徐紇並見親待一二年中位緫禁要手握王爵輕重在心宣􅁋於朝爲四方之所厭穢文武懈體所在亂逆土崩魚爛始於此矣及武太元年􅈛朱榮稱兵渡河太后盡召明帝六宫皆令入道太后亦自落髪榮遣􅀐拘送太后及㓜主河隂太后對榮多所陳說榮拂衣而起太后及㓜主並沉於河水太后妹馮翊君収瘞於􅀟靈寺武帝時始葬以后禮而追加謚焉又曰靈太后頗事莊飾數出遊幸元順靣諍曰禮婦人夫䘮自稱未亡人首去珠珥音餌衣不被綵陛下母臨天下年垂不惑過修容飾何以示後丗靈太后慙而還入召順責曰千里相徴豈欲衆見辱也順曰陛下盛服炫容不畏天下所􅀏何耻臣之一言乎孝明胡皇后後魏書曰孝明胡皇后靈太后從兄兾州刺史盛之女也靈太后欲榮重門族故立爲皇后肅宗頗在酒德專嬖充華潘氏及嬪御並無過寵太后爲肅宗選納抑屈人流時􅀶陵崔孝芬女范陽盧道約女隴西李瓉等女俱爲丗婦諸人訴訟咸見忿責武太􅀄后旣入道遂居於瑶光寺焉西魏孝武髙皇后後魏書曰孝武皇后髙氏齊神武長女也帝見立乃納爲后及帝西幸􅀜中降爲彭城王妃文帝乙弗后後魏書曰文帝文皇后乙弗氏河南洛陽人也其先丗爲吐谷渾渠帥居青海號青海王涼州平后之髙祖莫瓌擁部落入附拜定州刺史封西平公自莫瓌後三丗尚公主女乃多爲王妃甚見貴重父緩儀同三司兖州刺史母淮陽長公主孝文之第四女也后羙容儀少言􅀏年數歳父母異之指示諸親曰生女何妨也􅀂此者實勝男年十六文帝納爲妃及帝即位以大統元年􅁽爲皇后后性好節儉􅂼食故衣珠玉羅綺絶於服玩又仁恕無嫉妬之心帝益重之生男女十二人多早夭唯太子及武都王戍存焉時新都􅀜中務欲東討蠕蠕音軟㓂邊未遑北伐故帝結㛰以撫之於是更納悼后命后遜居別宫出家爲尼悼后猶懷猜忌復徙后居秦州依子秦州刺史武都王帝雖限大計恩好不忘後宻令養髪有追還之意然事祕禁外無知之者六年春蠕蠕舉國渡河前駈巳過而頗有言虜爲悼后之故興此役帝曰豈有百萬之衆爲一女子舉也雖然致此物論朕亦何顔以見將帥耶乃遣中常侍曹寵賫手勑令后自盡后奉勑揮淚謂寵曰願至尊享千萬歳天下康寕死無恨也因命武都王前與之決遺語皇太子辭皆悽愴因慟哭乆之侍御咸垂涕失聲莫能仰視召僧設供令侍婢數十人出家手爲落髮事畢乃入室引􅀍入自覆而崩年三十一鑿麥積崖爲龕而葬神柩將入有二藂雲先入龕中頃之一滅一出後號寂陵及文帝山陵畢手書云萬歳後欲令后配饗公卿乃議追謚曰文皇后祔於太廟廢帝時合葬於永陵郁乆閭后後魏書曰文帝悼皇后郁乆閭氏蠕蠕主阿那瓌之長女容貌端嚴夙有成智大統初蠕蠕屢犯北邊文帝乃與通好結㛰扶風王孚受使奉迎蠕蠕俗以東爲貴后之來營幕戸席一皆東向車七百乗馬萬匹駞千頭到黒鹽池魏朝鹵簿文物始至孚奏請正南靣后曰我未見魏王故蠕蠕女也魏伏向南我自東靣孚無以辭四年正月至京師立爲皇后時年十四六年后懷孕將産居於瑶華殿聞上有狗吠聲心甚惡之又見婦人盛飾來至后所后謂左右曰此爲何人毉巫傍侍悉無見者時以爲文后之靈産訖而崩年十六葬於少陵原十七年合葬永陵當㑹横橋北后梓宫先至鹿苑帝輼音温輬音涼後來將就次所軸折不進西魏廢帝宇文后後魏書曰廢帝皇后宇文氏周文帝女也后􅀄産之日有雲氣滿室芬氣乆之㓜有風神好陳列女圖置之左右周文曰每見此女良慰人意廢帝之爲太子納爲妃及即位爲皇后志操明秀帝􅀷重之專寵後宫不置嬪御帝旣廢崩后亦以忠於魏室罹禍恭帝􅀂干后後魏書曰恭帝皇后􅀂干氏司空長樂公正惠之女也有容色恭帝納之爲妃及即位立爲皇后後出家爲尼在佛寺葬竟無謚東魏孝諍髙皇后後魏書曰孝静髙皇后齊獻武王之第二女也天平四年詔娉以爲皇后王前後固辭帝不許興和初詔侍中司空孫騰司空公襄城王旭一云昶兼尚書令司州牧西河王悰藏宗切兼太常卿及宗正卿元孝支等奉詔致禮并備宫官侍衛以后駕迎於晉陽之丞相第五月立爲皇后大赦天下齊受禪降爲山王妃後周文元皇后後周書曰文元皇后魏孝武妹初封平原公主􅃴開府張歡遇后無禮帝殺歡改封后馮翊公主以配太祖生孝閔薨袝葬成陵文叱奴后後周書曰文叱奴后太祖爲丞相納后爲􅁎生髙祖髙祖即位後尊爲皇太后建德三年三月己酉崩四月丁巳葬固陵閔元后後周書曰閔元皇后名胡摩魏文帝第五女􅀄封晉安公主愍帝爲洛陽公尚焉及踐祚立爲皇后帝􅀍廢后出俗爲尼髙祖誅晉公護上帝尊號爲愍帝以后爲孝愍皇后號崇義宫隋氏革命出居里第大業十二年殂明獨􅀌后後周書曰明獨孤后太保衛公信之長女也帝在藩納爲夫人帝即位立爲王后在位數日崩葬昭陵丗宗崩與后祔葬之武阿史那后後周書曰武阿史那后突厥木杆可汗俟斤之女突厥蠕蠕而恕反後盡有塞表之地控弦十數萬於是陵逼中原太祖方與齊人爭衡結以爲媛俟斤􅀄欲以女配帝保定五年二月詔陳公純等備皇后文物及行殿并六宫巳下一百二十人至俟斗牙帳所迎后俟斗又許齊人以㛰將有異志純等在彼累載不得返命㑹雷風大起飄壞其穹廬等旬日不止俟斗大懼以爲天譴去戰切乃禮送后及純等設行殿列羽儀奉之以歸髙祖行親迎之禮后有姿貌善容止髙祖􅀷敬焉宣帝即位尊爲天元上皇太后隋開皇二年殂年三十一隋文詔后祔葬孝陵孝帝李后後周書曰孝帝李后名娥姿楚人也于謹平江陵后家被籍没至長安太祖以后賜髙祖髙祖幸之生宣帝宣帝即位尊爲天元聖皇太后宣帝崩諍帝尊爲大帝太后隋開皇初出俗爲尼改名常悲薨以尼禮葬之京城南宣帝楊后後周書曰宣帝楊后名麗華隋文帝長女帝在東宫髙祖爲帝納后爲皇太子妃宣政元年立爲天元皇后后性柔婉不妬忌四皇后及嬪御等咸愛而仰之帝後昬􅁀滋甚喜怒乖度嘗譴后欲加之罪后進止詳閑辭色不撓帝大怒遂賜后死逼令引決后母獨孤氏聞之詣閤陳謝叩頭流血然後得免帝崩静帝尊后爲皇太后號弘聖皇太后初宣帝不䂊詔隋文帝入禁中侍疾及大漸劉昉鄭譯等因矯詔以后父受遺輔政后雖􅀄不預謀然以嗣主㓜冲恐權在他族不利於巳聞昉譯巳行此詔甚恱後知父有異圖意頗不平形於言色及行禪代憤惋愈甚隋文帝旣不能譴責内甚愧之開皇六年封后爲樂平公主後又議奪其志后誓不許乃止大業中殂祔葬定陵宣朱后後周書曰宣朱皇后名滿月呉人也其家㘴事没入東宫帝爲太子后􅀍選掌衣服召而幸之遂生靜帝靜帝立尊爲天元太皇后后本非良家子年又大帝十歳踈賤無寵以靜帝之故特尊崇之宣帝崩靜帝即位尊爲太后隋􅀄出俗爲尼改名法淨後殂以尼禮葬之宣陳后後周書曰宣陳后名月儀自云潁川人大將軍山提之女以選入宫拜爲德妃月餘立爲天元左大皇后帝崩出俗爲尼改名華光父山提本尔朱兆之􅊢仕齊爲特進開府謝陽王髙祖平齊拜大將軍以后父超授上柱國除大宗伯宣元后後周書曰宣元皇后名樂尚河南洛陽人開府晟之第二女也年十五􅀍選入宫拜貴妃後立爲天元右大皇后宣帝崩出俗爲尼名華勝父晟少以元氏宗室拜開府宣尉遲后後周書曰宣尉遲皇后名繁熾蜀公迥之孫女也有羙色􅀄􅃴􅂎公亮之子西陽公温後以宗婦入朝帝逼而幸之後亮聞謀逆帝遂誅温追后入宫立爲天元右大皇后帝崩出俗爲尼改名華道年四十殂静司馬后後周書曰静帝司馬后名令􅁎柱國滎陽公消難之女宣帝傳位於帝納后爲皇后隋文帝以后父消難擁衆奔陳廢后爲庶人後嫁爲隋司州史李丹妻隋文獨􅀌皇后隋書曰文獻獨􅀌皇后河南雒陽人周大司馬河内公信之女也信見髙祖有竒表故以后妻焉時年十四髙祖與后相得誓無異生之子后􅀄亦柔順恭孝不失婦道后姊爲周明帝后長女爲周宣帝后貴戚之盛莫與爲比而后每謙卑自守丗以爲賢及周宣帝崩髙祖居禁中㧾百揆后使人謂髙祖曰大事巳然􅀐獸之勢必不得下勉之髙祖受禪立爲皇后性尤妬忌上亦每事唯后言是用后見諸王及朝士有妾孕者必勸上斥之時皇太子多内寵妃元氏􅁀薨后意太子愛妾雲氏害之由是風上竟廢太子立晉王廣皆后之謀也仁壽二年八月甲子月暈四重巳巳太白犯軒轅其夜后崩於永安宮時年五十葬於太陵宣華夫人隋書宣華夫人陳宣帝之女也性聦慧姿貌無雙及陳滅配掖庭後選入宫爲嬪時獨􅀌皇后性妬後宫罕得進御唯陳氏有寵晉王廣之在藩也隂有奪宗之計陳氏皇太子廢立之際頗有力焉及文獻皇后崩進位爲貴人專房擅寵主斷内事六宫莫與爲比及上大漸遺詔拜爲宣華夫人焬帝嗣位之後出居仙都宫尋召入歳餘而終時年二十九帝深悼之爲製神傷賦焬帝蕭皇后隋書日煬帝蕭皇后梁明帝巋丘軌切之女也江南風俗二月生子者不舉后以二月生由是季父岌收而養之未幾岌夫妻俱死轉養舅氏張軻家然軻甚貧窶具宇切后躬親勞苦煬帝之爲晉王時髙祖將爲王選妃於梁遍占諸女皆不吉巋迎后於舅氏令使者占之日吉於是遂策爲王妃后性婉順有智識好學解屬文頗知占候高祖大善之帝甚寵敬焉及帝嗣位詔立爲后帝每遊幸未嘗不隨侍從及宇文氏之亂隨軍至聊城化及敗没竇建德突厥處羅可汗遣使迎后於洛州建德不敢留遂入於虜庭唐貞觀四年滅突厥乃以禮致之歸于京師太平御覽卷第一百四十
