front:
  text: 太平御覽卷第三十五
  hash: sha256:8d8a1e021688cee753697a3ccf641cd28bad23a8e603c6b2d19c584a8a528461
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_035-1a}
body:
  text: 時序部二十豐稔㓙荒旱豐稔時序曰華􅁰時和歳豐冝􅁰稷也又曰我􅁰與與我稷翼翼我箱旣盈我􅁃維億露積爲􅁃十萬曰億又曰彼有不穫穉此有不歛穧彼有遺秉此有滯穗伊寡婦之利秉把也鄭箋云成王之時言百榖旣多穗同齊然收刈促遽力皆不足而有不􅀗不斂遺秉滯穗寡婦取之以利也又曰豐年秋冬報也報者謂嘗也蒸也豐年多􅁰多稌亦有髙廪萬億及秭數萬至萬曰億數億至萬曰秭箋云豐年大有年也萬億及秭言毅多也爲酒爲醴烝􅂌祖妣以洽百禮降福孔偕偕遍也箋云蒸進也􅂌與也榖梁傳曰宣公十六年冬大有年五􅂖大熟漢書曰宣帝即位用吏多選百姓安土歳數豐穰􅂖每石數錢漢記曰鮑得脩志節有名績累官爲南陽太守歳荒災唯南陽豐稔吏民愛恱号爲神父又曰建武二年秋天下野􅂖旅生麻菽尤盛或生􅋎菜果實野蠶成蠒􅀍山民収其䋈採穫􅂖菓以爲畜積京房易逆刺曰天􅀨榖歳大熟尚書考靈耀曰春政不失五􅂖孳􅀄夏政不失甘雨時季夏政不失地無菑菑謂土不稼穡秋政不失人民昌冬政不失少疾䘮五政不失百榖稚熟日月光明晚熟曰稚詩曰稙稚菽夌禮稽命徴曰天子􅀕天地宗廟六宗五岳得其冝則五􅂖豐雷雨時至四夷貢物禮斗威儀曰君乗木而王則草木豐茂嘉􅂖並生春秋元命苞曰咸池主五􅂖其星五者各以有職以精委爲􅂖也宋均曰榖有五故五星主之咸池之爲言皆多也言榖生於子水含秀懷實至秋精垂故一名五車以載歸之爲言扶而化之孝經援神契曰歳星守心年􅂖豐晏子春秋景公伐魯得東門無澤公問魯年榖對曰隂冰厥陽冰厚五寸公問晏子晏子曰君問年􅂖荅以冰禮也隂冰厥陽冰厚五寸者寒温節寒温節則政平政平則上下和上下和則年􅂖熟臣恐疲兵而無成君盍盍何不也禮魯以息吾怨遂不伐魯汝南先賢傳曰􅀽安爲楚相㑹楚王坐事㸦相牽引拘繫者千餘人安受命即奔轡而行先决獄應時理遣一旬之中延千人之命其時甘雨滂沛歳大豊稔南越志曰髙興縣野多客雞其形如雞而五彩至則年穰臨海異物志曰獨舂鳥聲有似舂鳴聲多者五􅂖傷鳴聲少者五榖熟􅀽子正書曰語曰歳在辛酉乞漿得酒梅陶書曰古人就食於安里今三州米流出門無如今年豐也若以古人用之則累年之儲也廣雅曰年稔秋榖熟也桓子新論曰世俗咸曰漢文帝躬儉約修道德以先天下天下化之故致充實殷冨澤加􅀺庶榖至石數十錢上下饒羡物理論曰正月朝四靣黃氣其歳大豐此黄帝用事􅁟氣均和四方並熟鹽鐵論曰周公時天下太平丘陵髙下皆熟山海經曰鰩魚見天下大穰古歌詞曰長安城西􅀟貟闕上有一􅀟銅雀宿一鳴五􅂖生再鳴五􅂖熟凶荒禮曰歳㓙年􅂖不登君膳不􅀕胏馬不食􅂖馳道不除􅀕事不懸大夫不食梁士飲酒不樂皆爲自損憂民禮殺生則祭先有虞氏以首夏后氏以心殷人以肝周人胏不􅀕胏則不殺生也天子食曰少牢朔日大牢諸侯食日特牲朔日少牢除治道爲妨民取􅂼食懸樂噐鐘磬之属也梁嘉食也不樂去琴瑟也又曰㓙年則乗駑馬祀以下牲自貶損亦取易供也駑馬六種最下也下牲少牢若特豕特豚也傳曰五年春無冰梓愼曰今兹宋其饑乎歳在星紀而滛於􅀇枵以有時災隂不堪陽時災無水也隂盛用事而温無水是隂不勝陽地氣發泄也虵乗龍虵􅀇武之宿虚危之星龍歳星歳星木也爲青龍星失次爲虵所乗龍宋鄭之星宋鄭必饑又曰晉荐飢麥未皆不熟也使乞糴于秦秦伯謂百里奚與諸乎對曰天災流行國家代有救災恤鄰道也行道有福丕鄭之子豹在秦請伐晉秦伯曰其君是惡其民何罪秦於是乎輸粟于晉自雍及綘相繼命之曰汎舟之役後秦飢晉閉之糴又曰宋公子鮑禮於國人宋飢竭其粟以貸之年自七十巳上無不饋飴也􅂖梁傳曰一􅂖不熟謂之歉歉食不足二􅂖不熟謂之饑三􅂖不熟謂之饉爾雅曰􅂖不熟爲飢􅂼不熟爲饉菓不熟爲荒仍飢爲荐漢書曰髙祖二年􅀜中大飢米斛萬錢又曰漢興接秦之弊諸侯並起民失作業而大飢饉米石五千相食死者過半髙祖乃命民得賣子就食蜀漢又曰歳飢民貧卒食半菽或日半五􅂛噐名也臣瓉案士卒食􅂼菜以菽雜半之又曰元帝二年齊地飢米石三千餘又曰王莽時雒陽以東米石二千莽遣三公將運􅀜東諸侯倉賑貸窮乏又分遣大夫謁者教民煑木爲酪服䖍日煑木實爲酪酪不可食重爲煩擾流民入􅀜者數十萬人置養贍官以廪之盗發其廪民餓死者十七八東觀漢記曰王莽末南方枯旱民多飢餓郡人野澤掘􅝀水草實也茨而食又曰赤眉還入長安鄧禹與戰敗走至髙陵軍士飢餓皆食藻菜帝乃徴禹還勑曰赤眉無榖自當來降吾折之舌反捶笞之非諸將憂也謝承後漢書曰趙典兄子温遭歳大飢散家粮以賑窮餓所活萬餘人王隱晉書曰永嘉五年洛中大飢五月摯虞餓死又曰劉琨與丞相牋曰夏則桑椹冬則瑩音勞豆視此哀歎使人氣盡晉中興書曰中原亂中宗􅀄鎮江左假郗鑒龍驤將軍兖州刺史鎭鄒山又徐龕石勒左右交侵百姓飢饉野無生草時或掘野䑕蟄䴏而食之又曰太興元年詔曰亢旱榖貴百姓嗷嗷有資者貴糴貧羸之民益困漢世􅂖貴官賤糴使價不超越謂之平准今雖無此可出邸閣米萬斛使三分减一以平其價令貧困者悉得足以至秋也呉志曰駱公緒年八歳與親客歸㑹稽事嫡母甚謹時飢荒多有困乏公緒爲之飢飲食衰少其姉仁愛有行寡婦無子公緒見甚哀之娣問其故公緒曰士大夫糟糠不足我亦何必獨飽姉誠知如是何不告我而自苦􅀂此乃自以私粟與公緒又以告母母亦賢之遂使分施由是顯名周書曰天有四殃水旱飢荒其至無時非積畜何以備之夏歸藏曰士無兼年之食遇天飢妻子非其妻子也大夫無兼年之食遇天飢輿馬臣妾非其有也國無兼年之食遇天飢百姓非所有也戒之哉國語曰越大夫種謀曰今吴旣罷音疲罷勞也而大荒荐飢市無赤米米之惡也而囷簏空虚圎者爲囷方者爲簏其民必移就蒲嬴於東海之濵蒲蒲子嬴蚌蛤之属也賔海涯又曰魯饑臧文仲以玉罄如齊告糴宋廟罄鳴球也典略曰從興平元年至建安二年其間四歳中咸陽蕭條後賊李堪等始將部曲入長安居卓故塢中拔取酸􅀥䔧藋藋從吊切以給食發塚取衣盖形崔鴻三十國春秋曰諸州自建武元年十一月不􅀨雪至十二年八月榖價踴貴金斤直米二􅂛民流散死者十有五六百姓嗷然人無生頼又曰建元元年襄國大飢榖二􅂛直銀一斤肉一斤直銀一兩韓子曰秦大飢應侯請發五菀菓􅀥栗以活民王曰秦法賞有功誅有罪今發五菀是有功無功俱賞也墨子曰百􅂖不収謂之旱三榖不収謂之㓙四􅂖不収謂之餽音匱五􅂖不収謂之飢淮南子曰畜者欲歳之荒飢謂將取厚利􅀽子正書曰滑􅁵也今當凶年有欲與子隨侯之珠者又有欲與子一鍾之粟者子將何擇􅁵曰吾取粟可以救窮河圖曰日月兩重暈者飢之祥也魏名臣奏曰太尉司馬懿奏云秋澇傷五榖又無菜􅂼北方民巳有食桑皮者英雄記曰李催等相次戰長安中盗賊不禁白日虜掠是時榖一斛五十萬豆麥二萬人相食啖白骨委積臰􅁾滿路又曰幽州歳歳不登人相食有蝗旱之災民人始知採稆以􅀥堪爲粮榖一石十萬錢公孫伯圭開置屯田稍稍得自供給稆音吕又曰建安七年鄴中大飢芋一畒二萬錢慱物志曰荒年暫辟􅂖法但食䗶半斤輒支十日不飢漢應享應立豫讃序曰王莽居攝以病告歸後赤眉賊攻其所居城粒盡以私榖數十萬斛賑城中于時賑粟十數萬莫不稱其仁晉王洽集曰洽臨吴郡上表曰編户僵尸葬埋無主或闔門餓餒烟火不舉旱春秋考異郵曰旱之言悍也陽驕蹇所致也詩曰旱旣太甚悠悠山川又曰旱魃爲虐如惔如焚我心癉暑癉病也憂心如熏熏灼也又曰旱旣大甚藴隆蟲蟲雷而非􅀨書􅀃命曰􅀂歳大旱用汝作霖􅀨又曰􅆫􅁪􅊙􅀂君行僣差則常陽順之禮曰繆公召弦子問曰天乆不􅀨吾欲􅁀尫而奚􅀂對曰天則不􅀨而暴人之病子虐無乃不可乎暴巫而奚􅀂對曰天則不􅀨望之愚婦人於以求之無乃巳踈乎周禮曰司空掌羣巫之政令􅀂國大旱則率巫而舞雩又曰女巫旱暵則舞雩傳曰衛大旱寗莊子曰昔周飢克殷而年豐今邢方無道天其或者欲使衛討邢乎從之師興而􅀨又曰魯僖公三年自十月不雨至于五月不曰旱不爲災又曰衛大旱卜有事於山川不吉又曰僖公二十一年夏大旱公欲焚巫尫臧文仲曰非旱備也修城郭貶食省用務嗇儉也勸分無有相濟此其務也巫尫何爲天欲殺之則如勿生􅀂能爲旱焚之滋甚公從之是歳飢而不害又曰魯文十年正月不雨至于七月周正月今之十一月周十月今之五月又曰魯宣公九年葬我小君敬羸旱無麻始用葛茀茀所以引柩也又曰魯昭公十六年秋鄭大旱使屠擊有事於桑山􅀕山也斬其木不雨子産曰有事於山蓻山林也養護令繁植也而斬其木其罪大矣奪之官邑漢書曰百里嵩字景山爲徐州刺史時旱嵩行部傳車所經甘雨輙澍東海祝其合郷二縣在山間嵩不往二縣獨不得雨父老請之入界即􅀨澍又曰和帝永元六年秋旱時洛陽有􅁈囚帝録囚理􅁈未還宫雨澍鄧太后事同續漢書曰郡國旱公卿行雩禮求􅀨閉諸陽門衣皂衣興土龍立土人舞童二佾七日一處又曰郡國旱各掃除社稷公卿官長以次行雩禮求雨也魏志曰衛玠見黥面者其妻子没爲官僮玠曰使天下不􅀨者盖由此也太祖乃怒玠晉書曰督運令史淳于伯刑於建康市百姓諠譁咸曰伯􅁈於是大旱三年京氏易曰人君無惠澤於下則小旱管子曰春不収枯骨杇胔伐枯木而去之則夏旱至矣尸子曰湯之救旱也乗素車白馬着布衣身嬰白茅爲牲禱於桑麻之野此時絃歌鼓舞者禁之孟子曰七月八月之間旱則苗槁槁乾也晏子春秋曰齊景公時旱欲祀靈山及河伯晏子曰夫山以石爲身以草木爲毛髮今乆不􅀨毛髮將焦身且熱豈山不欲雨乎祀之何益君冝避殿暴露其索􅀨也公從之出野果大􅀨世􅀃曰湯時大旱七年雒川竭煎沙爛石乃使持三鼎祝山川教祀曰政不節邪使人疾邪賄賂行邪䜛夫昌邪宫室榮華也邪女謁成邪何不􅀨之甚洪範五行傳曰魯宣十年秋大旱時公興師而與齊伐葉失代國亢陽盖師旅百姓所不欲也應是而大旱益都􅂄舊傳曰趙瑶爲閬中令大旱瑶請􅀨於靈星應時降􅀨捜神記曰周暢爲河南尹元􅀄二年大旱暢乃葬路旁露骸爲立義塚應時注􅀨又曰諒輔字洪儒新都人爲郡五官􅁺時大旱太守自􅁀中庭而􅀨不降輔自誓曰日中􅀨不降請以身塞無狀無狀謂祈雨不降乃積薪柴自焚至日中時大雨一郡沾潤神農求􅀨書曰春甲乙不􅀨東爲青龍又爲大龍東方老人舞之壬癸黒又曰北不􅀨命巫祝􅀨曝之不􅀨禱山神積薪其擊鼔而焚之瑞應圖曰遇旱責躬引咎理察􅁈枉退去貪殘側修惠政則降以零雨如其有道術禱祝山川致龍轉石閇陽從隂之􅀋誠非瑞應是以魯侯有􅁀尫之消齊景以祠山見譏董仲舒曰春旱求􅀨令縣邑以水日令民禱社家人祠户無伐名木無斬山林曝巫聚虵八日於邑東門外爲四通之壇方八尺植蒼繒八其神共工􅀕以魚八夏求雨亦以水日家人祠竈無舉土功浚井曝釡鬲杵􅍫于街七日爲四通壇於邑南門外方七尺植赤繒七其神􅃖尤􅀕以赤雄雞七凢求雨之大禮丈夫欲藏匿女子欲和而樂師曠占旱曰歳欲旱旱草先生旱草者蒺䔧是也山海經曰太華之山削成四方有虵名􅏂遺六足四翼見則天下大旱湯時也東荒之北隅有山名㓙犁應龍處南極殺􅃖尤與夸父不得復上故下數旱旱而作應龍之狀乃得大雨上無作􅀨者故也令云土龍大此又曰傒昆之山有人衣青衣名曰黄帝女妖音魅􅃖尤伐黄帝請風伯雨師帝乃下天女曰妖雨止遂殺􅃖尤妖不得復上所居不雨又曰鱄魚雞山黒水多焉􅇾尾音如豚出則天下大旱東荒之北隅有焉有子徳元中牟平秩人也始夫太平御覽卷第三十五
