front:
  text: 太平御覽卷第二百九十二兵部二十三
  hash: sha256:02d47c25b40f5fbc33c233bf18b5bcc9a36879b9dc5ddd6752fe9ba2994a2348
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_292-1a}
body:
  text: 用間孫子曰興師十萬出師千里百姓之費公家之奉日費千金内外騷動不得操事者七十萬家古者八家爲隣一家從軍七家奉之言十萬之師不事不耕者凢七十萬家也相守數年以爭一日之勝是故明王聖主賢君勝將所以動而勝人成功出於衆者先知不可取於神􅀑不可禱祈以求不可像於事也不可以事􅀋求不可驗於事度不可以行事度也必取於人知敵之情也因人也故用間有五因間内間反間死間生間五間俱起莫知其道是謂神紀人君之寳也用時任五間也因間者因其郷人而用之也因敵郷人知敵表裹虚實之情故就而用之可使伺候内間者因其官人而用之者也因在官失職者􅀂刑戮之子孫與受罰之家也因其有􅂩就而用之也反間者因其敵間而用之者也敵使間來有急即呼之則不見何止亦因以知敵之情令吾間必索知之敵間之來間我者因而利之導而舎之舎居止也今吾人遺以重利復遇而舎止之可令詭其辝故反間可得而用也故能取敵之間而用因是而知之故郷間内間可得而使也因反敵間而知敵情郷間内間者皆可得使也因是而知之故死間爲誑事可使告敵因是可得而攻也因誑事而知敵情生間往反可使知其敵之腹心所在因是而知之故生間可使如期五間之事主必知之人主當知五間之用厚其禄豐其財知之必在於反間故反間不可不厚也反間者五間之夲事之要也故當在厚待之殷之興也伊摯在夏伊尹周之興也吕牙在殷吕望故唯明主賢將能以上智爲間者必成大功此兵之要三軍所恃而動者也巳上注出通典左傳曰楚師伐宋九月不服將去宋楚大夫申叔時曰築室反耕者宋必聽命楚子從之築室於宋分兵於田示無去志王從其言宋人懼使華元夜入楚師登子反之牀起之曰寡君使元以病告兵法因其郷人而用之必先知其守將左古謁者門者舎人之娃名因而利導之華元盖用此術得以自通曰敝邑易子而食析骸而㸑雖然城下之盟有以囯敝不能從也寕以囯敝不從城下盟去我三十里唯命是聽子反懼與之盟而告楚子退三十里宋及楚平華元􅀂不因間􅀂不用課无由得入楚軍也又曰楚師伐鄭鄭人將奔楚師夜遁諜告曰楚幕有烏乃止禮記曰晉人之覘宋者反報於晉侯曰陽門之介夫死而子罕哭之哀而民說殆不可伐也從之戰國䇿曰鄭武公欲伐胡先以其子妻胡因問群臣曰吾欲用兵誰可伐者大夫􅀜思其曰胡可伐武公怒而戮之曰胡兄弟之囯子言伐之何也胡君聞之以鄭爲親巳而不備鄭鄭襲胡取之此用死間之􅀔又曰燕昭王以樂毅爲將破齊七十餘城及惠王立與毅有􅂩齊將田單乃縱反間於燕宣言曰齊王巳死城不拔者二耳樂毅畏誅而不敢歸以伐齊爲名實欲連兵南靣王齊齊人未附故且緩即墨殘矣燕王以爲然使􅀐劫代毅燕人士卒離心單又縱反間曰吾懼燕人掘吾城外冢墓僇先人燕軍從之即墨人激怒請戰大敗燕師所亡七十餘城悉復之僇與戮同又曰􅁗師圍趙閼與音餘趙將趙奢救之去趙國都三十里不進􅁗間來奢善食遣之食音寺間以報􅁗將以爲奢師怯弱而止不行奢一隨而卷甲趨􅁗師擊破之斯則反用彼間又曰􅁗與趙兵相拒長平趙孝成王使廉頗爲將固壁不戰秦數挑戰廉頗不岀􅁗之間言曰􅁗之所患獨畏馬服趙奢之子爲將耳趙王信􅁗之間因以奢子爲將終爲􅁗將白起所敗史記曰楚漢相持未決勝負陳平言於漢王曰彼項王有骨鯁之臣以亞父范増鍾離昧龍且周殷之屬昧音妹且于間切不過數人耳大王誠能岀􅂢數萬斤金行反間間其君臣以疑其心項王爲人意忌信䜛必内相誅漢因舉兵攻之破楚必矣漢王然之乃出黄金四萬斤與平恣所爲不問出入平旣多以金縱反間於楚軍宣言諸將鍾離昧等爲項王將功多矣然終不得裂地而王欲與漢爲一以滅項氏分王其地項王果疑之使使至漢漢王爲太牢具舉進見楚使舉鼎俎而來也即佯驚曰吾以爲亞父使乃項王使也復持去更以惡草具進楚使去肉更草菜之具使歸具以報項王項王果大疑亞父亞父欲急擊下滎陽城項王不信不肯聽亞父聞項王疑之乃大怒曰天下事大定矣君王自爲之願賜骸骨歸歸未至彭城疽發背而死疽㿈創也音千餘切漢遣紀信詐降而漢王霄遁終滅項羽羽不悟反間而亡也又曰漢使酈食其說齊王田廣廣捨兵與酈生縱酒漢將韓信因齊無備襲齊破之田廣烹食其此偶成韓信用死間之勢又曰漢髙帝􅀍匈奴單于昌頓圍於白登乃使間厚遺閼氏乃謂昌頓曰兩主不相困今得漢地而單于終非能居之也且漢王亦有神單于察之昌頓乃解圍之一角於是髙帝令士皆持滿􅀓矢外郷從解角直出竟與大軍合而昌頓遂引兵而去又曰髙祖紀曰上問狶將皆故賈人也上曰吾知所以與之乃以金㗖將狶將多降者陳狶也後漢書曰西域將兵長史班超發于闐諸國兵擊莎車􅀛兹國揚言兵少不敵罷散乃隂緩生口歸以告􅀛兹王喜而不虞超即潛勒兵馳莎車營大破降之斯亦同死間之􅀔晉書曰益州牧羅尚遣將隗伯攻蜀賊李雄於郫城牙有勝負雄乃募武都人朴泰鞭之見血使譎羅尚欲爲内應以火爲期尚信之悉出精兵遣隗伯等率兵從泰擊雄雄將李􅋮於道設伏泰以長梯􅀝城而舉火伯軍見火起皆爭縁梯泰又以繩汲上尚軍伯餘人皆斬之雄因放兵内外擊之大破尚軍此用内間之勢又曰劉曜逼長安復圍北城太守麴昌遣使求救於麴允允率歩􅀐赴之去城數十里賊繞城放火煙塵蔽天反縱間詐允曰郡城已䧟焚燒向盡軍無及矣允信之衆懼而潰後數日麴昌突圍赴長安北城遂䧟崔鴻十六國春秋曰後涼吕光將吕延伐乞伏乹歸大敗之乹歸乃縱反間稱衆潰東奔成紀延信而追之延司馬耿雉曰告者視髙而色動必有姦計不可從相遇戰敗死之後魏書曰陛俟擊呉於杏城大破之獲呉二叔諸將請送京師俟獨不許曰呉一身藏竄非其親信誰能獲之􅀂停十萬之衆以追一人非上䇿也不如私許呉叔免其妻子使自追吴擒之必也諸將咸曰今來討賊旣破之獲其二叔唯走一人何所復至俟曰呉之恃逆夲自天性今􅀂獲免必誑惑愚人稱王者不死妄相扇動爲患必大遂遣呉二叔與之期呉叔不至諸將皆咎於俟俟曰此未得其便可必不背他日果斬呉以至皆如所言俟之明略皆此􅀋也通典曰東魏將段琛據冝陽遣將牛道􅁪扇誘邊人西魏將韋孝寛拒之遣諜之訪獲道􅁪手跡令善書者僞作道􅁪與孝寛書論歸欵之意又爲落燼燒迹􅀂火下書者還令諜人遺之於琛營琛得書果疑之道所經略皆不見用孝寛知其離沮因出竒兵掩襲擒道恒及琛等崤澠遂清又曰東魏大將齊神武率兵趣沙苑西魏大將周文帝遣將逹奚武覘之武從三􅀐皆衣敵人衣服至日暮去營數百歩下馬潛聽得其軍號因上馬歷營􅀂警夜者有不如法者往往撻之具知敵之情狀以告周文又曰髙齊斛律光字明月爲當時名將後周將韋孝寛守玉璧今絳郡禝山縣忌光英勇孝寛叅軍曲嚴頗知卜筮謂孝寛曰來年齊朝必大相殺戮孝寛因令嚴作謡言令間諜漏其文於鄴曰百􅂛飛上天明月照長安又曰髙山不推自崩槲樹不扶自堅祖珽因續之曰盲老公上下斧饒舌老母不得語令小兒歌之於路穆提婆聞之以告其母陸令萱令萱以饒舌斥巳也陸令萱即後主乳母盲老公謂祖珽也遂相與恊謀以謡言啓後主誅光周武帝聞之遂大赦境内始有滅齊之志竟平其國唐書曰黄州揔管周法明率兵擊輔公祏遇張善安阻兵夏口法明屯荆口鎭登戰艦與所親飲酒善安遣刺客數人詐爲漁者乗輕舟而至見者不以爲虞遂殺法明而去又曰衛國公李靖伐突厥可汗以唐儉先在突厥結和親突厥遂不備靖因掩擊破之亦以唐儉爲死間之􅀔衛公兵法曰夫戰之取勝此豈求之於天地在乎因人以成之歷􅀚古人之用間其妙非一也即有間其君者有間其親者有間其賢者有間其能者有間其助者有間其隣好者有間其左右者有間其縱横者故子貢史廖陳􅎮􅂫􅁗張儀范雎等皆慿此術而成功也且間之道有五焉有因其邑人使潛伺察而致詞焉有因其事故洩虚假令告示焉有因敵之使矯使其事而返之焉有審擇賢能覘彼向背虚實而歸說之焉有佯緩罪戾微漏我僞情浮計使亡報之焉凢此五間皆須隱秘重之以賞密始可行焉􅀂敵有寵嬖任以腹心者我當使間遺其珎玩恣其所欲順而傍誘之敵有重臣失􅀔不滿其志者我則㗖以厚利詭相親附採其情實而致之敵有親貴左右多詞誇誕好論利害者我則使間曲情尊奉厚遺珎寳揣其所間而返間之敵􅀂使聘於我我則稽留其使令人與之共處矯致殷勤僞相親暱朝夕慰論倍供殊味􅀚其辭色而察之仍旦暮令使獨與巳伴居我遣聦耳者潛於􅃨壁中聽所間使旣遲違恐彼恠責必是竊論心事我知事計遣而用之且夫用間以間人人亦用間以間巳巳以密往人以密來理須獨察於心叅㑹於事則不失矣􅀂敵使人來欲推我虚實察我動静覘知事計而行其間者我當佯爲不覺舎而厚利善飯之微以我言誑事示以前却期㑹即我之所湏爲彼之失者因其有間而返間之彼􅀂將我虚而以爲實即我承其弊而得其志矣夫水所以濟舟舟亦因水覆没間所以能成㓛亦慿間而傾敗􅀂束髮事主當朝正色忠以盡節信以竭誠不詭伏以自容不權冝以爲利雖有善間其可用乎太平御覽卷第二百九十二
