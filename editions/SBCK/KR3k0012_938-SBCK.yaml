front:
  text: 太平御覽卷第九百三十八
  hash: sha256:5c681c7a41575a7f87693aa29cf1401ea28307a279e3f748b1f5a5ca0e732de8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_938-1a}
body:
  text: 鱗介部十鯨鯢魚鯪魚䱜魚搥額魚海鰌魚石魚鰐魚鮫魚鱕魚石首魚黄首魚烏賊魚􅸕魚䱥魚鰒魚比目魚人魚虎魚鯨鯢魚春秋考異郵曰鯨魚死而彗星出左傳宣下曰古者明王伐不敬取其鯨鯢而封之以爲大戮鯨鯢大魚以喻不義之人春秋後語曰楚威王問宋玉曰先生其有遺行歟何士民衆庶不譽之甚也宋玉對曰天鳥有鳯而魚有鯨鳯凰上擊九千里翺翔乎窈􅁳之上夫藩籬之鷃豈能與料天地之髙哉鯨魚朝發於崑崙之墟暮􅀫於孟津赤澤之鯢豈能與量江漢之大哉故非獨鳥有鳯而魚有鯨士亦有之唐書曰開元七年大拂􅄺靺羯獻鯨鯢睛淮􅀯子曰麒麟闘則日月食鯨魚死而彗星岀鯨海中魚之王也鄧析書曰獵猛虎者不於後園釣鯨鯢者不於清池何則園非虎處池非鯨淵文字同􅀃苑曰昔南瑕子過程夲子程夲子爲之烹鯢魚南瑕子曰吾聞君子不食鯢魚程夲子曰乃君子不食子何事焉南瑕子曰吾聞上比所以廣德也下比所以狹行也比於善自進之階也比於惡自退之源也魏武四時食制曰東海有大魚如山長五六里謂之鯨鯢次有如屋者時死岸上毫流九頃其􅂡長一丈廣三尺厚六寸曈子如三􅂛梡大骨可爲矝廣志曰鯢魚聲如小兒有四足形如鱧出伊水也司馬遷謂之人魚故其著史記曰始皇帝之葬也以人魚之膏爲其燭也徐廣曰人魚似鮎而四足即鯢魚也崔豹古今注曰鯨海魚也大者長千里小者數千丈一生數萬子常以五月六月就岸邊生子至七八月導引其子還入海中皷浪成雷噴沬成雨水族驚畏之皆逃匿莫敢當其雌曰鯢大者亦長千里眼睛爲明月珠任眆述異記曰南海有珠即鯨魚目瞳夜可以鑒謂之夜光潘岳滄海賦曰魚則呑舟鯨鯢左思吴都賦曰長鯨吞航脩鯢吐浪木玄虚海賦曰其魚則横海之鯨突兀􅀌遊巨鱗刺雲洪鬐挿天顱骨成岳流膏爲淵曹毗觀濤賦曰於是神鯨來徃乗波躍鱗噴氣霧合噫水成津骸䘮成島嶼之墟目落爲明月之珠鯪魚音陵山海經曰鯪魚呑舟臨海水土記曰鯪魚背腹皆有刺如三角菱䱜魚南越記曰䱜魚南越謂爲􅉞雷魚長一丈子朝岀食暮還母腹常從臍中入口中出腹内有兩洞腹貯水以養子腹容二子兩腹則四子也其鰓鱗皮有珠文可以飾刀劒口孫綽望海賦曰勁䱜楊鬐以排流搥額魚臨海水土記曰搥額似䱜魚長四尺海鰌魚臨海水土記曰海鰌長丈餘金樓子曰鯨鯢一名海鰌穴居海底鯨入穴則水溢溢爲潮來鯨旣出入有節故潮水有期也嶺表録異曰海鰌魚即海上最偉者也其小者亦千餘尺毎歳廣州常發􅔓舡過南安􅐙易路經調􅀺地名海心有山阻東海濤嶮而急亦黄河之三門也深闊處或見十餘山或岀或没篙工曰非山島鰌魚背也日閃鬐鬛若􅉫朱旗日中忽雨霡霂舟子曰此鰌魚噴氣水散於空風􅀔吹來若雨耳近魚魚即皷舩而譟倐爾而没魚畏鼓物類相伏耳石魚臨海水土記曰石音矛附石以踞錯鰐魚吴時外國傳曰鰐魚大者長二三丈有四足似守宫常呑食人扶南王范㝷勑捕取置溝壍中尋有所忿者縳以食鰐􅀂罪當死鰐便食之如其不食便解放以爲無罪梁書曰林邑國於城溝中養鰐魚門外圈猛獸有罪者輙以餧猛獸及鰐不食爲無罪三日乃放之鰐大者長二丈餘狀如鼉有四足喙長六七尺兩邊有齒如刀劒魚常遇得麞鹿及人亦噉之蒼梧以南及外國皆有唐書曰韓愈爲潮州刺史旣視事詢吏民疾苦皆曰郡西湫水有鱷魚夘而化其長數丈食民畜産將盡以是民貧居數日愈徃視之令判官􅁗濟炮一豚一羊投之湫呪之曰今潮州大海在其南鯨鵬之大蝦蟹之細無不容鱷魚朝發而夕至今與鱷魚約三日乃至七日如頑而不徙湏爲物害則刺史選林􅇊壯夫操勁弓毒矢與鱷魚從事矣呪之夕有􅁀風雷起於湫中數日湫水盡涸徙於舊湫西六十里自是潮人無鱷患虞喜志林曰方有鱷魚喙長八尺秋時最甚人在舟邊者魚或岀頭食人故人持戈於舩側而禦之􅀶物志曰南海有鱷魚狀似􅀛斬其頭而乾之啄去齒而更生如此三乃止交州記曰鰐好出沙上夘大如鵝夘可食廣州異物志曰鰐魚長者二丈餘有四足喙長七尺齒甚利虎及鹿渡水鰐擊之皆斷喙去齒旬日更生嶺表録異曰鰐魚其身土黃色有四足脩尾形􅃺如鼉而舉止趫疾口森鋸齒徃徃害人南中鹿多最懼此物鹿走崖岸之上群鰐嘷呌其下鹿必怖懼落崖多爲鰐魚所得亦物之相攝伏也故李太尉貶官潮州經鰐魚灘沉損平生寳玩古書圖􅀞一時沉失遂召舶上崑崙取之但見鰐魚極多不敢輙近乃是鰐魚窟宅也鮫魚􅀃文曰鮫魚也皮可以飾刀山海經曰燕山漳水出焉其中多鮫魚郭璞曰鮫背上有甲朱文尾長三四尺皮可以飾刀劒口西京􅄂記曰尉佗髙祖時獻鮫魚茘芰髙祖報以蒲匋錦四疋􅀶物志曰東海中有鮫鯖魚旣生子子驚還入毋腹㝷復出任昉􅄒異記曰虎魚老則爲鮫鱕魚音藩南越記曰鱕魚􅈹有横骨如轓海中波浪爲之涌海船逢之必斷石首魚臨海異物志曰石首小者名䠓水其次名春來石首異種又有石頭長七八寸與石首同嶺表録異曰石頭魚狀如鱅魚隨其大小膽中有一石子如喬夌粒瑩白如玉有好竒者多市魚之小者貯於竹器任其壊爛即淘之取其魚脛石子以植酒籌黄靈魚臨海水土記曰黃靈魚小文正黄似石首烏賊魚南越記曰烏賊魚有矴遇風浪便虬前一􅂡下矴而住腹中血及膽正黒中以書也世謂烏賊壞墨而知禮故俗云是海􅀂白事小吏或曰古之諸生常自浮水烏見以爲死便徃喙之乃卷取烏故謂烏賊今烏化爲崖豹古今注曰烏賊魚名河伯從事小吏嶺表録異曰烏賊魚只有骨一片如龍骨而輕虚以指甲刮之即爲末亦無鱗而􅁏翼前有四足毎潮來即以二長足捉石浮身水上有小蝦魚過其前即􅄍涎惹之取以爲食廣州邊海人徃徃探得大者率如蒱扇煠熟以薑醋食之極脆美或入鹽渾爲乾搥如脯亦美吴中好食之左思吴都賦曰烏賊擁劒􅸕魚音佶臨海異物志曰􅸕似烏賊肥食甘美䱥魚音制臨海異物志曰䱥魚至肥炙食甘美諺曰寧去累世田宅不去䱥魚額鰒魚歩角反漢書曰王莽以􅀜東兵起憂懣不食但飲酒食鰒魚東觀漢記曰呉良字大儀齊人爲郡議曹椽正旦入賀太守門下􅁺王望前上言壽皆稱萬戚良跪曰門下侯謟明府無受其觴盗賊未弭人民困乏太守曰生言是遂不舉觴賜鰒魚百枚教署功曹良恥以言受官遂不肯謁後漢書曰張歩遣使伏隆詣闕上書獻鰒魚郭璞注三蒼云鰒似蛤偏著石廣志曰鰒無鱗有一靣附石折明細孔􅄂雜或七或九本草云石决明一名鰒魚音歩角切魏志曰倭國人入海捕鰒魚水無深淺皆沉没取之齊書曰禇彦囬時淮北属魏江南無鰒魚或有間􅀜得至者一枚直數千錢有餉彦囬鰒魚三十枚彦囬時雖貴而貧過甚門生獻計賣之云可得十萬錢彦囬變色曰我謂此是食物非曰財貨且不知堪錢聊爾受之雖復儉乏寜可賣餉取錢悉與親遊噉之少曰便盡陳思王求􅀕先主表曰先主喜食鰒魚前巳表徐州臧霸送鰒魚二百足自供事魏文帝與孫權書曰今因趙咨致鰒魚千枚比目魚爾雅曰東方有比目魚焉不比不行其名謂之鰈郭􅗛注日狀如牛脾一折兩片相合乃行江東呼至餘魚史記曰管仲諌桓公古者封禪東海有比目之魚捜神記曰東海名餘腹者昔越王爲膾割而未切墮半於水化爲魚臨海水土記曰兩片特立合體俱行比目魚也嶺表録異曰比目魚南人謂之鞋屉魚江淮爲之拖沙魚左思三都賦曰􅀟則比目片則王餘孫綽望海賦曰王餘􅀌遊比目􅀟遊人魚岀海經曰龍侯之山決水岀焉其中多人魚狀如䱱魚四足其音如嬰兒食之無癡疾史記曰秦始皇冢中以人魚膏爲燈燭臨海異物志曰人魚似人長三尺餘不可食虎魚范子曰虎魚岀東海郭璞江賦曰或虎狀􅀋人虎魚頭似虎腹背皆有刺太平御覽卷第九百三十八
