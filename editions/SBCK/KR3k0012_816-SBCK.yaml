front:
  text: 太平御覽卷第八百一十六布帛部三
  hash: sha256:a51f94d2ab2ca19bc2da7cc897c1d2d315378823a60ee8e7c588ce85c01984e1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_816-1a}
body:
  text: 羅綺織成綾縠紗綃綈􅄢紬羅釋名曰羅文羅䟽也纚簁也麤可以簁物也魏文帝詔曰江東爲􅁑寜比羅紈綺縠魏志曰自公侯巳下大夫以上皆服綾錦羅綺金縷之物自是以下􅄂綵之服通于賤人也􅀳書曰謝玄好帶紫羅香囊叔父安惡之不欲傷其意因賭而焚之遂絶晉令曰第一品巳下不得服羅綃東宫舊事曰太子納妃絳眞文羅一幅帔一絳杯文繡羅一幅帔一絳眞衣羅袴一王孫子曰隨珠曜日羅衣從風燕丹子曰荆軻左手把秦王䄂右手椹其􅇩秦王曰願聽琴聲而死召􅁎人皷琴聲曰羅縠單衣可掣而絶淮南子曰齊俗有䌓繡羅紈漢武内傳曰帝以七月七日掃除宫掖之内設大床於殿上以紫羅薦地燔百和香燃九微燈以待西王母西京􅄂記曰趙飛鷰爲皇后女弟在昭陽殿遺書曰今日嘉辰貴姉懋膺洪􅁽上禭三十條以陳踊躍金花紫羅面衣織成􅃭羅帷羅幌羅帳羅幬黃庭經曰黄庭爲不死之道受者先齋九日然後受之結盟立誓期以勿渫古者盟以玄雲之錦九十尺金簡鳯文羅四十尺徐延年別傳曰道士姓徐名延年仙人以新黄羅衣衣之王子年拾遺記曰周氏王五年因祗國獻女工一人善於工巧體貌輕潔􅀍纎羅新繡之衣又曰呉主孫權居昭陽宫趙夫人乃織羅縠累月而成裁之爲幔内外視之飄飄如煙氣輕動而房内自涼異􅁐曰張仲舒爲司空廣陵城北元嘉年七月中輙見門側有赤氣赫然後空中忽雨絳羅於其庭内廣七八分長五六寸皆以箋􅁓繼之廣長亦與羅等紛紛甚張惡而焚之猶有數片府州多相傳示張經􅀫􅁀疾而死世􅀃曰武帝常降王武子供饌悉用琉璃器婢子百餘人皆綾羅袴以手擎飲食宋玉風賦曰躋于羅帷經于洞房司馬相如美人賦曰女以玉􅁫挂臣冠羅䄂拂臣衣張衡南都賦曰羅韈懾惵而容與古詩曰明月何皎皎照我羅床帷古歌詩曰大婦織綺羅中婦織流黃小婦無所作挾瑟上髙堂阮籍詩曰西方有佳人皎皎如日光被服纎羅衣左右佩􅀟璫綺廣雅曰鬱金流黃綦綺􅀃文曰綺文繒也釋名曰綺踦也其文欹邪不順經緯之縱橫也有杯文形似杯也有長命其采色相間皆橫也福言長之者服之使人命長夲造者之意也有棋文方文如棋也漢書曰班伯侍講金華殿在織􅃭紈袴之間非其好也又曰賈人不得衣錦繡綺縠又曰孝文六年遺匈奴書使者言單于服繡祫綺衣東觀東記曰馬后􅂁極麤䟽諸主朝望見反以爲綺后曰此繒染色好故直用之漢書儀曰􅀕天用六綵綺席六重長一丈于寳􅀳紀曰初洛中名服有白石綺織者尤之曰石非繒綵之稱􅀳令曰第三品巳下得服􅄂杯之綺第六品巳下得服七綵綺東宫舊事曰太子納妃有七綵杯文綺􅀍一絳石杯文綺􅀍一七綵杯文絳袴長命杯文綺袴司馬相如長文賦曰張羅綺之幔帷垂楚組之連綱班固西都賦曰紅羅颯纚綺組􅌭紛潘岳秋興賦序曰余兼虎賁中郎將寓直散􅀐之省珥蟬冕襲綺紈之士此馬遊處古詩曰客從逺方來贈我一端綺文作􅀟鴛鴦裁爲合歡􅀍又曰緗綺爲下裳紫綺爲上襦曹植詩曰西北有織婦綺縞何􅌭紛清晨秉機杼日暮不成文織成廣雅曰天笁出細織成續漢書輿服志曰虎賁武騎皆鶡冠虎文單衣襄邑歳獻織成虎文魏略曰大秦國用水羊毛木皮野繭絲作織成皆好色魏略曰大秦國出金織成帳呉時魏國傳曰大秦國天笁國皆出金縷織成􅀳後略曰張方兵入洛諸官府大刧掠御寳織成流􅂫皆分割爲馬棧矣􅀳令曰織成衣爲禁物捜神記曰陳節謁諸神東海君以織成青􅃭一領遺之西京􅄂記曰宣帝􅀍収繫郡邸獄臂上猶帶史良娣合采婉轉􅁝繩係身毒國寳鏡一枚大如八銖錢及即位常以琥珀笥盛之緘以戚里織成一曰斜文織成西京􅄂記曰趙飛鷰爲皇后其女弟昭儀在昭陽殿遺飛鷰書曰今日嘉辰貴姉懋膺洪􅁽上禭三十五條以陳踊躍之志内有織成下􅅂杜蘭香傳曰蘭香降南郡張碩與碩織成袴衫鄴中記曰石虎冬月施流􅂫斗帳懸金薄織成腕囊又曰石虎皇后出女妓二千爲鹵簿冬月皆着紫綸巾熟錦袴脚着五文織成鞾又曰石虎獵着金縷織成合歡袴髙柔婦與柔書曰今奉織成袜一量綾釋名曰綾者其文望之似氷凌之理也漢官典職儀曰尚書郎直供青縑白綾􅀍魏略曰大秦國有金縷繡􅄂色綾其色利得中國􅁝素􅄙以爲胡綾魏志曰楊阜字義山爲城門校尉常見明帝着㡌􅀍縹綾半䄂阜問帝曰此於禮何法服也帝黙然􅀳咸康起居注曰詔臨邑使主范栁所貢物多絳綾是其所珎可籌量増賜􅀳安帝紀曰桓玄㓜時㑹于西堂設􅇊樂上施絳綾縷金以爲飾􅀳脩復山陵故事曰帝改服着白綾帽荀勗爲􅀳文王與孫皓書曰餉􅄂色綾十端後魏書曰辛穆字叔宗舉茂才爲雍州別駕􅀄隨父在下邳與彭城陳敬文友善敬文弟敬武少爲沙門從師逺學經乆不返敬文病臨卒以􅄂綾二十疋託穆與敬武穆乆不得見經一十年始於洛陽見敬武以物還之封題如故世稱廉信唐書曰太宗􅀄七品以上服􅀛甲􅀟具十花綾其色緑九品巳上服􅁝布及􅄂小綾其色青又曰長慶中浙西觀察使李德􅁉上表曰臣當道奉詔更令織定羅􅁝􅂁叚及盤絛綾一千疋況立鵝天馬豹盤絛文彩珎竒只合聖躬自服今所織千疋費用至多在臣愚誠亦所未諭乞酌臣當道物力所冝更賜節減即海隅蒼生無不受賜詔許罷進盤絛綾一千疋漢武内傳曰西王母侍女服紺綾之􅂁西京􅄂記曰霍光妻遺淳于衍散花綾二十五疋綾出鉅鹿陳寳光妻傳其法霍顯召入其弟使作之一疋直錢一萬又與緑綾七百端直錢百萬符丕荅謝玄書曰今徃大文羅大絞綾各五疋縠三禮圖曰五綵方山冠以綵縠爲之􅀃文曰縠細繒也釋名曰􅂖粟也其形戚戚如也戰國䇿曰計見齊宣王宣王曰願聞先生直言正諌計曰王之憂國愛民不如王之愛一尺之縠王使人爲冠不使左右便僻而使工者以爲能也今治齊國非左右便僻無使也故王之愛民不如一尺之縠事具冠門漢書曰江充召見太一宫自請願以所常􅀍服衣冠見上上許之充衣紗縠單衣東觀漢記曰建􅀄二年詔齊相其止物復送氷紈方空縠董巴輿服志曰羽林左右􅁥左右虎賁皆冠鶡紗縠單衣魏志曰􅀽術遂僣號荒侈滋甚後宫數百服綺縠餘梁􅁏楊子法言曰或曰霧縠之麗曰女工之蠧潜夫論曰小民或刻剥綺縠以成榆葉水波文枹朴子曰勁弩之餘力不能洞霧縠宋玉風賦曰主人女翳承日之華更􅀍丹縠之單衣司馬相如子虚賦曰雜羅綃垂霧縠言細好如霧出以復須也劉楨魯都賦曰其女工則絳綺縠荀勗爲􅀳文王與孫皓書曰餉縠三端紗東觀漢記曰馬融􅀶洽通儒敎養諸生千數融好侈飾常施絳紗帳前授生徒後列女樂􅀳書曰武帝泰始九年帝多簡良家子女以充内職自擇其美者以絳紗繫臂梁書曰王僧孺㓜貧其母鬻紗布以自業事具鹵簿門後魏書曰游明根以年踰七十表求致仕優詔許之引入陳謝悲不自勝帝言別殷勤仍爲流涕賜青紗丹衣委貌冠􅀍褥錦􅂁等物北齊書曰琅邪王儼字威仁武成第三子拜京畿大都督領軍大將軍領御史中丞遷大司徒􅀄從北宫出將上中丞凢京畿歩騎領軍之官屬中丞之威儀司徒之鹵簿莫不畢備帝與后在華林園東門外張幕隔青紗歩障觀之北史齊盧道䖍娉妻元氏甚聦悟常􅂛髙􅚋講老子道䖍從弟元明隔紗帷以聽焉唐書曰太宗幸蒲州刺史趙元揩服黄紗單衣迎謁路左東宫舊事曰皇太子􅀄拜有絳紗單衣王子年拾遺記曰漢武帝思李夫人不可復得詔董仲君曰朕思李氏其可得乎仲君曰可遥見而不可同帷幄有潜英石色青輕如毛羽寒盛則石温暑盛則石冷刻之人像不異眞人使此像徃則夫人至矣乃遣人至海經年而還得此石命工衣李夫人彩刻成置於輕紗幕裏宛􅀂生時帝大恱又曰江漢之民至暮春上巳之日禊集之祠或結五色紗囊盛食沉於波中以言蛟龍水虫畏之不侵食也蔡克別傳曰克字子尼體貌尊嚴莫有媟嫚髙平劉整儁才白衣居家車服奢麗謂人曰紗縠吾之常服耳遇蔡子在㘴而經日不自安齊諧記曰餘杭縣有一人姓沈名蹤與父同入山至夜二更中忽見一人着紗㡌披絳綾􅂁云是闘山王闘山在餘杭縣秦記曰符堅以太常韋逞母宋氏傳其父業周官音義乃就宋家立講堂書生百人隔絳紗幔而受業焉綃毛詩義䟽曰楊之水素衣朱繡繡當爲綃綃綺也禮記玉藻曰君子狐青裘豹褏玄綃衣以楊之君子大夫士也綃綺屬也染之於玄以狐青裘相冝也廣雅曰綃謂之緗􅀳令曰第六品巳下不得服羅綃王子年拾遺記曰燕昭王二年廣延國來獻善舞者二人昭王處以單綃華幄又曰呉主孫權居昭陽宫倦暑乃褰紫綃之帷曹植洛神賦曰踐逺遊之文履曵霧綃之輕􅅂綈􅀃文曰綈赤黄色也釋名曰綈似􅡻虫之色緑而澤也史記曰范睢改名爲張禄相秦秦伐魏魏使湏賈於秦睢爲微行􅁦衣徒步入邸見須賈賈驚曰范叔無恙乎今叔何事睢曰爲人賃賈意哀之留㘴飲食曰叔寒如此哉乃取其綈􅂁以賜之後睢見賈賈頓首言死罪睢曰公所以得不死者以綈􅂁戀戀有故人之意故釋公漢書曰文帝身衣弋綈如淳曰弋帛也漢書儀曰太官湯官奴婢各三千人大置酒日皆綈褠蔽膝漢書儀曰印綬盛以篋篋以緑綈白表裏西京􅄂記曰漢制天子玉几冬則加綈錦其上謂之綈几諸侯皆以竹木爲之不得加綈錦之飾王子年拾遺記曰漢成帝於太液池傍起宵遊宫以􅃮爲柱鋪黒綈之幕又造飛行殿所􅄑之宫咸以氊綈籍地惡車轍馬跡之喧也竹林七賢論曰舊俗七月七日法當曬衣諸阮庭中爛然莫非錦綈阮咸時緫角乃豎長竿摽大布犢鼻於庭中曰未能免俗爾鄴中記曰石虎尚方御府中巧工作錦織成署皆數百人有青綈或白綈或緋綈或黃綈或緑綈或紫綈范子計然曰綈出河東鹽鐵論曰鼲貂狢不益錦綈之寳是以王者不珎張衡西京賦曰木衣綈錦土􅀍朱紫􅄢韋輝光毛詩問曰七月之時無􅄄箋云􅄄毛布也賤者之所服也今􅄢亦用爲之爾雅曰􅈊􅄢也郭璞注曰毛􅈊所以爲􅄢也揵爲舎人注曰􅈊毛也􅄢胡人績羊毛作衣􅀃文曰􅄢西胡毳布也呉曆曰魏文帝賜呉王太子􅄢二張呉志曰孫堅爲董卓軍所攻堅與數十騎潰圍而出堅常着赤􅄢幘令親近將祖茂著之卓騎爭逐茂故堅從間道得免于寳􅀳紀曰孫皓遣使詔書賜班􅄢五十張絳􅄢二十張紫青􅄢各十五張崔鴻十六國春秋西秦録曰沮渠蒙遜尚書郎王朽送戎􅄢千疋銀三百斤鄴中記曰石虎御府􅄢有巳頭文􅄢麗子􅄢花􅄢扶南傳曰妥息國出五色􅄢鹽鐵論曰今冨者黃金馬腦勒􅄢繡馬掩汙桓譚新論曰余歸沛道病蒙絮􅀍絳􅄢䄡乗騂馬􅀫下邑東亭亭長疑是賊發卒余令勿闘乃問而去此安靜自存也曹植辯道論曰甘始謂王曰諸梁時西域胡來獻􅄢悔不取也班固與弟超書曰竇侍中前􅀉人錢八十萬市得􅄂􅄢十餘張紬􅀃文曰紬大絲繒也釋名曰紬抽也抽引絲端細緒也又謂之􅁝掛也掛於杖端振舉之也北史曰􅀽聿脩爲太常少卿出使廵省仍令考校官人得失經兖州時邢劭爲刺史别後送白紬爲别信聿脩不受與劭書云今日仰遇有異常行􅀲田李下古人所愼願得此心不貽厚責劭亦欣然頓解報書云老夫忽忽意不及此敬承來旨吾無間然弟昔爲清郎今日復作清卿矣太平御覽卷第八百一十六
