front:
  text: 太平御覽卷第八百二十一資産部一
  hash: sha256:1d42120d8e2936c7abad72b7b389ade7b7bbd8cad88e803c82378c6e21f2b49d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_821-1a}
body:
  text: 田釋名曰土巳耕者曰田田塡也五稼塡滿其中心也尚書禹貢曰冀州厥田惟中中孔安國曰田之高下肥瘠九州之中爲第五兖州厥田惟中下第六青州厥田惟上下第三徐州厥田惟上中第二楊州厥田惟下下第九荆州厥田惟下中第八豫州厥田惟中上第四梁州厥田惟下上第七雍州厥田惟上下第一周禮春官下籥章曰凡國祈年於田祖歌􅃎雅擊􅁟鼓以樂田畯祁年祁豐年也田祖始耕田者謂神農也田畯古先教田者爾雅曰畯農夫也又地官司徒之職曰均􅁟地以稽其人衆而周知其數上地家七人可任者家三人中地家六人可任者家二人下地家五人可任者家一人鄭玄日均平也周猶徧也一家男女七人以上則授上地所養天子使大夫治之自此以外餘地皆然禮記月令季夏後五日大雨時行乃燒薙行水利以殺草可以糞田疇可以美􅁟疆薙謂迫地芟草也此謂欲耕菜田先薙其草草乾燒之此月大雨流水潦蓄其中則草死不復生而地美可耕稼也又王制曰方一里者爲田九百􅅿一里方三百步方十里者爲方一里者百爲田九萬􅅿方百里者爲方十里者百爲田九十億􅅿億今十萬方千里者爲方百里者百爲田九萬億􅅿萬億今萬萬也自􅁪山至於南河千里而近冀州域自南河至於江千里而近豫州域自江至於衡山千里而遥荆州域自東河至於東海千里而遥徐州域自東河至於西河千里而近亦冀州域自西河至於流沙千里而遥雍州域西不盡流沙南不盡衡山東不盡東海北不盡􅁪山凡四海之内斷長􅀘短方三千里爲田八十萬億一萬億􅅿九州之大計方百里者爲田九十億􅅿山陵林麓川澤溝瀆城郭宫室塗巷三分去一其餘六十億􅅿以一大囯爲率其餘所以授民也又曰古者公田籍而不稅籍之言借也借民力治公田美惡取於此不税民之所自始也古者謂殷時左傳僖公三十一年曰春取濟西田分曹地也二十八年􅀳文討曹分其地境界未定至是乃以賜諸侯使臧文仲徃􅀫於重館高平方與縣西北有重郷城重館人告曰晉新得諸侯必親其共不速行將無及也從之分曹地自洮以東􅀓于濟盡曹地也文仲不書請田而巳非聘享㑹同也襄仲如􅀳拜曹田也又宣公下十五年曰初稅􅅿非禮也榖出不過籍周法民耕百􅅿公田十􅅿借民力而治之稅不過此以豐財也又襄公六曰子産治鄭使田有卦洫封界洫溝從政一年輿人誦曰取我衣冠而禇之取我田疇而伍之孰殺子産吾其與之及三年民又誦之曰我有子弟子産誨之我有田疇子産闢之子産而死誰其嗣之又哀公上曰季孫欲以田賦兵賦之法因其田財通出馬一疋牛三頭今欲别其田及家財各爲一賦故言田賦使冉有訪諸仲尼仲尼曰丘不識也三發三發問卒曰卒終也子爲國老待子而行􅀂之何子之不言也仲尼不對不公荅而􅀻於冉有曰君子之行也行政事度於禮施取其厚事舉其中斂從其薄如是則以丘亦足矣丘十六井出戎馬一疋牛三頭是賦之常法􅀂不度於禮而貪冒無厭則雖以田賦將又不足且子季孫􅀂欲行而法則周公之典在􅀂欲苟而行又何訪焉弗聽爲明年用田賦傳又哀公上曰子胥曰得志於齊猶獲石田也無所用之石田不可耕􅂖梁傳宣公五年曰􅀄稅􅅿宣公履􅅿擇而税之也古者田什一而籍言借民力十井而爲公耕一謂之什一而税也􅀄稅非正也毛詩小雅白華曰滮池北流浸彼稻田滮流貌箋云池澤浸􅃳稻田使之生殖又甫田曰倬彼甫田歳取十千倬明貌甫田謂天下田也十千言多也又大雅崧髙曰王命召伯徹申伯􅁟田徹治也箋云治者正其井牧定其賦稅爾雅曰田一歳曰菑今江東呼􅀄耕地反草爲菑二歳曰新田詩日于彼新田三歳曰畬易日不菑畬史記曰魏文侯使李悝作盡地力之教悝苦回反以爲地方百里提封九萬􅅿理田勤謹則􅅿益三斗不勤則損亦如之地方百里之増減輙爲粟百八十萬碩矣必􅄂五種以備災害力耕數耘収獲如宼盗之至謂促遽之甚恐爲風􅀨損也又曰秦孝公任啇鞅鞅以三􅀳地狹人貧三􅀳謂韓魏趙三卿今河東道之地秦地廣人寡故草不盡墾地利不盡出於是誘三􅀳之人利其田宅復三代無知兵事而務夲於内而使秦人應敵於外故廢井田制阡陌任其所耕不限多少數年之間國冨兵强天下無敵其後韓聞秦之好興事欲疲之乃使水工鄭國聞說秦令鑿涇水自中山西抵瓠口爲渠並北山東注洛三百餘里欲以漑田中作而覺秦欲殺國國曰始臣爲間然渠成亦秦之利也秦以爲然卒使就渠用注愼閼之水漑澤鹵之地四萬頃収背􅅿一種於是􅀜中爲沃野無凶年命曰鄭國渠閼音於據切又曰王翦將行請善田宅園池甚衆始皇曰將行矣何憂貧乎戰國䇿曰魏叔座爲將攻韓趙勝之魏王賞田百万座曰使士卒不崩直而不􅀝撓㨂不辟者此呉起餘教也鼔之不敢怠倦者臣也王特爲臣右手之倦賞臣可也􅀂以有功臣何力之有焉王曰善於是索呉起之後賞田二十萬以座不掩士之迹又與田二十萬漢書晁錯奏曰古者稅民不過什一至秦則不然用啇鞅之法改帝王之制一歳屯戍萬計力役三十倍於古田租口賦塩鐵之利二十倍於古如淳曰秦賣塩鐵貴故下民受其困或耕豪民之田稅十五如淳曰稅其五故貧民常衣馬牛衣而食犬􅇾之食又董仲舒說上曰秦用啇鞅之法改帝王之制除井田人得賣買冨者田連阡陌貧無立錐之地漢興循而未改古井田法雖難猝行冝少近古限人占田以贍不足塞兼井之路然後可善治也上不能用又曰是時冨豪皆爭匿財唯卜式尤欲助費於是以式終長者乃召拜爲中郎賜爵左庶長田十頃布告天下尊顯以諷百姓又曰貢禹上書曰臣禹年老貧窮家貲不滿萬錢妻子糠豆不贍短􅄄不完有田百三十􅅿陛下過意徴臣臣賣田十􅅿以供車馬又曰楊惲免官常不得志乃歌曰田彼南山蕪穢不治種一頃豆落而爲萁人生行樂耳須冨貴何時又曰張禹爲人謙愿内殖貨財家以田爲業及冨貴多買田至四百頃皆涇渭漑灌極膏􅃾上價又曰寗成曰仕不至二千石賈不至千萬安可比於人乎乃貰貸陂田千餘頃假貧民役使數千家致産數千萬爲任俠持吏長短從數十􅀐其使民威重於郡守又溝洫志曰太始三年趙中大夫白公復奏穿渠引涇水首起谷口尾入櫟陽涇渭中漑四千五百餘頃田名曰白渠民歌田曰於河許池陽谷口鄭國在前白渠起後舉鍾爲雲決渠爲雨涇水一石其泥數斗且漑且糞長我稷黍後漢書曰光武時天下墾田多不以實又户口年紀互有増减十五年詔下州郡檢覆其事而刺史太守多不平均或優饒豪右侵刻羸弱百姓嗟愁遮道號呼時諸郡各遣使奏事帝見陳留吏牘上有書視之云潁川弘農可問河南南陽不可問帝詰吏由趣吏不肯服抵言長壽街上得之抵欺也帝怒時顯宗爲東海公年十二在幄後言曰吏受郡勑當欲以墾田相方耳帝曰即如此何故言河南南陽不可問對曰河南帝城多近臣南陽帝郷多近親田宅踰制不可爲准帝令虎賁將詰問吏吏乃實首服如顯宗對於是遣謁者考實具知姧狀又曰樊重開廣田􅁟三百餘頃其所起廬舎皆有重堂髙閣陂渠灌注貲至巨萬而賑贍宗族恩加郷閭外孫何氏兄弟爭財重恥之以田貳頃解其忿訟縣中稱美推爲三老又曰馬援辭兄况欲就邊郡田牧東觀記曰援以况出爲河南太守次两兄爲吏京師見家用不足乃辭况欲就邊郡畜牧也况曰汝大才當晚成良工不示人以朴旦從所好後援辭隗囂歸洛陽居數月而無他職任援以三輔地曠土沃而所將賔客猥多乃上書求屯田上林范中帝許之東觀漢記曰司􅀠校尉梁松奏特進防光廖廖子豫兄弟父子並受爵士筞顯冠世多買京師膏􅃾美田作大廬近帯城郭妨困小民又曰郭丹字少卿南陽人累世千石父稚爲丹買田宅居業丹爲司徒視事五年薨詔問丹家時宗正劉匡對曰郭丹爲三公典牧州郡田􅅿不増張璠漢記曰鄭㤗字公業少有才略多謀家冨於財有田四百頃而食常不足名聞山東華嶠後漢書曰范遷爲司徒在公輔有宅數􅅿田不過一頃推與兄子又曰周爕專精禮易不讀非聖之書不脩賀問之好有先人草廬結于崗畔下有陂田常肆力自勤以給非身所耕漁則不食魏志曰夫定國之術在於強兵足食􅁗人以急農兼天下孝武以屯田定西域此先丗之良式也是歳乃募民屯田於許得穀數百万斛於是州郡例置田官所在積穀征伐四方無軍粮之患遂得以兼滅羣兇克平天下又曰鄧艾遷尚書郎時欲廣田稸榖爲滅賊資使艾行陳項巳東至壽春艾以爲田良水少不足以盡地利冝開河渠可以大積軍粮又通運漕之道乃著濟河論以喻其指又以爲昔破黃巾因爲屯田積榖許都以制四方今三隅巳定事在淮南毎大軍征舉運兵過半功費巨億以爲大役陳蔡之間土下田良可省許昌左右諸稻田并水東下今淮北二萬人淮南三萬人十二分休常有四萬人且田且守水豐常収三倍於西計除衆費􅀊完五百萬斛以爲軍資六七年間可積三千萬斛於淮上此則十萬之衆五年食也以此乗呉無不克矣宣王善之事皆施行正始三年乃開廣漕渠每東南有事大軍興衆汎舟而下逹于江淮資食有儲而無水害艾所建也又曰司馬郎爲丞相主簿以爲冝復井田徃者以民各有累世之業難中奪之是以至今承大亂之後民人分散土業無主皆爲公田宜及此時復之又曰鄭渾遷陽平沛郡太守郡界下濕患水澇百姓饑乏渾於蕭相二縣界興陂堨開稻田郡人皆以爲不便渾曰地􅀔洿下冝漑灌終有魚稻經乆之利此豐民之夲也遂躬率吏民興立功夫一冬間皆成比年大収頃􅅿歳増租入倍常民頼其利刻石頌之號曰鄭陂又曰劉靖都督河北諸軍事又脩廣戾渠陵大遏水漑灌薊南北三百里使種稻邊民利之蜀志曰􅀄諸葛亮自來成都有田十五頃子弟食自餘饒晉要事曰安帝義熈九年右丞張湏元議瑯瑯及湖熟界有皇后脂澤田四十餘頃參詳悉以借食民南史曰宋王惠兄鑒頗好聚歛惠意不同謂曰何用田爲鑒怒曰無田何由得食惠又曰何用食爲齊書曰王騫歷黄門郎司徒右長史不事産業有舊田在鍾山八十頃與諸宅及故舊共佃之常謂人曰我不如鄭公業有田四百頃而食常不周以此爲愧梁書曰夏侯夔爲豫州刺史率軍人於蒼陵立堨漑田千餘頃歳収榖百餘萬石以充儲備兼贍貧人境内頼之也又曰鄧元起少時嘗至西沮田舎有沙門造之乞元起有稻幾二千斛悉以施之時人稱其有大度後魏書曰髙允爲著作郎太武引見因問允萬機何者爲先時多禁封良田又京師逰食者衆允因曰臣少也賤所知唯田請言農事古人云地方一里則爲田三頃七十􅅿萬里則田三萬七千頃􅀂􅂆之則􅅿益三􅂛不􅂆則􅅿損亦如之損益之率爲粟二百二十二萬斛况以天下之廣乎􅀂公私有儲雖遇饑年復何憂哉帝善之除田禁悉以授百姓又曰裴延儁遷幽州刺史范陽郡有舊督亢渠徑五十里陽燕郡有故戾陵諸堨廣袤三十里皆廢毀多時水旱不調延儁乃表求營造遂躬自履行相度形􅀔隨力分督未幾而就漑田百萬餘􅅿爲利十倍百姓頼之北齊書曰帝賜穆提婆􅀳陽之田斛律光言於朝曰此田神武帝以來常種禾飼馬數千疋以擬㓂難今賜提婆無乃闕軍務也由是提婆怨光唐書曰貞元十六年盧羣爲義成軍節度鄭滑觀察營田使羣先􅀉寓鄭州典質得良田數頃及授節度各以本地契書分付所管令長令召還夲主時人稱美又曰起居郎崔覲隱居城固山所有良田分給奴婢令遞日供飲食之費覲與妻家事一不以問但水石自婢而已又曰温造爲河陽節度觀察使復懷州古秦渠三縣弃地悉爲良田後造左遷出爲㓪州刺史至則開後郷渠九十七里漑田二千頃郡人名其渠曰右史渠范子計然曰請問九田隨世盛衰有水旱貴賤願聞其情計然曰諸田各有名其從一官始以終九官所以設諸田差髙下始進退也假令一直錢百金一直錢九百此略可知從一􅅿至百􅅿直是大貴之極也孟子曰百􅅿之田勿奪其時數口之家可以無饑矣又曰易其田疇薄其稅歛民可使冨也􅀓子曰陸田者命懸於天也人力雖修水旱不時則一年功弃矣田制之由人人力苟修則地利可盡天時不如地利地利不如人事吕氏春秋曰魏襄王與羣臣飲酒酣王爲羣臣祝令羣臣皆得志史起對曰羣臣不肖者得志則不可王曰如西門豹之爲人臣也史起對曰魏氏之田也漳水存其傍西門豹不知用是過也明日召史起問漳水猶可以灌鄴田乎對曰臣爲之民必大怨臣臣雖死願王使他人遂之王使之爲鄴令史起因徃爲之鄴民大怨欲籍史起史起不敢出避之乃使他人遂爲之水巳行民大得其利相與歌之曰鄴有聖令號爲史公決漳水兮灌鄴旁終古斥鹵生稻梁春秋後語曰趙列侯謂其相公仲建曰寡人所愛可以貴之乎曰富可也貴之則不列侯乃命以田萬􅅿賜善歌者二人公仲建許諾而不與居一月列侯之代還問曰與之乎曰未有可者家語曰虞芮二國爭田而訟連年不決乃相謂曰西伯仁人盍徃質焉入其境則耕者讓畔行者讓路入其朝則士讓爲大夫大夫讓爲卿虞芮之君曰嘻吾儕小人不可以入君子之朝遂自相與成以其所爭爲閑田蕭廣濟孝子傳曰郭原平墓下有數十􅅿田不屬原平毎至農月耕者􅁪祼祖原平不欲使慢其墳墓乃貨家資買此田三農之月輙束帶垂泣躬自耕墾之汜勝之奏曰昔湯有旱灾伊尹爲區田教民糞種􅀒水澆稼収至􅅿百石勝之試爲之収至􅅿四十石越絶書曰呉北野禺櫟東所舎大疁者呉王田也又曰冨中大塘者勾踐治以爲義田也肥饒謂之冨中盛弘之荆州記曰桂陽郡界有温泉其下流有田􅁪資以浸灌常十二月種至明年三月新榖便登温液所周正可數􅅿過此水氣輙冷不復生苗豫章記曰郡江之西岸有槃石下多良田極膏􅃾者一􅅿二十斛稻米之精者如玉暎澈於器中續搜神記曰陽人姓何忘其名隱遁養志常至田舎人収穫在場上忽有一人長一丈黃踈單衣角巾來詣之翩翻舉其兩手並儛而來語何云君常見韶舞不足舞也便去何㝷逐遥向一山山有一穴裁容人其人即入穴何亦隨之􅀄入甚急前輙開廣便失人見良田數十頃何遂墾作以爲世業子孫于今頼之崔寔政論曰昔者聖王立井田之制分口耦地各相副適使人饑飽不偏勞逸齊均冨者不足僣差貧者無所企慕王㓪上求賑貸民表曰昔在西京有鄠杜膏􅃾之饒池陽谷口之利涇渭二川之水鄭國白渠之漑雲􅀨年成糞與灌並􅅿貨一金號爲陸海應璩書曰是以忽此蘇子帶郭之業求彼孫叔寢丘之地故求遠田在􅀜之西南臨洛水北據芒山曹植表曰乞城内田及城邊好田盡所賜百年力者臣雖生自至尊然心甘田野性樂稼穡又籍田論曰營疇萬􅅿厥田上上經以大陌帶以橫阡竒栁夾路名菓􅀍園宰農寔掌是謂公田唐明皇􅄂録曰上命宇文融爲招田使融方恣睢稍不已附者必加誣譛密奏以爲盧從愿廣致田園有地數百頃上素器重亦􅀝爲相者數矣而又族望官婚鼎盛於一時故上亦重言其罪但目從愿爲多田翁太平御覽卷第八百二十一
