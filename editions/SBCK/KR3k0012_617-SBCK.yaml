front:
  text: 太平御覽卷第六百一十七
  hash: sha256:e331dbcfcdad83a83286e85d89430bab0e04302837aa2600e1f1bb6bb856b99b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_617-1a}
body:
  text: 學部十一談論史記儒林傳云清河王太􅀓轅固以治詩孝景時爲􅀶士與黄生争論黄生曰湯武非受命乃弑也轅固曰不然桀紂虐亂天下之人心歸湯武湯武誅桀紂非受命謂何黄生曰冠雖􅁦必加於首履雖新必􅀜於足何者上下之分也今桀紂雖失君上也湯武雖聖臣下也臣下不能匡過以尊主而誅伐非弑而何轅固曰必􅀂云是髙祖伐秦耶於是帝曰食肉不食馬肝不爲不知味也學者不言湯武受命不爲非也漢書儒林傳曰武帝時江公與董仲舒並通五經能持論善屬文江公訥於口上使與舒議不如仲舒又曰楊雄爲人簡易佚蕩不能劇談而好深沉之思也又曰賈生徴見孝文帝方受釐坐宣室上因􅀑神事而問􅀑神之本賈具道所以然之狀至夜半帝前席旣罷曰吾乆不見賈生自以過之今不及也東觀漢記曰尹敏興班彪相厚每相與談常奠案不食晝即至暝夜即徹旦晉書曰潘京字丗長舉秀才到洛尚書令樂廣京州人也共談累日深歎其才謂京曰君天才過人恨不學耳􅀂學必爲一代談宗京感其言遂勤學不倦時武陵太守戴昌亦善談論與京共談假借之昌以爲不如巳􅀏而遣之令過其子􅀂思京方極其言論昌竊聽之乃歎服曰才不可假遂父子俱辱焉又曰郭象者字子􅀇少有才理好老莊能清言太尉王衍每云聽象語如懸河㵼水注而不竭又曰樂廣甞與裴顧清言欲以理服之而顧辭論豐􅀶廣􅀏而不言時人謂顧爲言談林藪又曰朝賢甞上巳禊飲或問王濟昨遊有何言談濟曰張華善􅀃史漢裴頠論前言往行靡靡可聽王戎子房季扎之間超然􅀇著又曰王衍妙善􅀇言唯談老莊爲事每捉玉柄麈尾與手同色義理有所不安隨即改更丗號曰口中雌黄朝野翕然謂之一丗龍門矣又曰胡母輔之字彦國與王澄等爲友澄甞與人書曰彦國吐佳言如鋸木屑霏霏不絶誠爲後進領䄂也又曰趙孟字長舒爲尚書都令史善於清談其靣有疵黯時人言諸事不决皆當問疵面又曰裴遐善言􅀇理音辭清暢泠然􅀂琴瑟甞與河南郭象談論一座嗟服又曰殷仲堪能清言毎云三日不讀道德論便覺舌夲間強晉中興書曰殷浩弱冠與京兆杜人並有美譽善言􅀇理又􅁃元規少好黄老能言􅀇理時人方之夏侯㤗􅀄又曰謝弈女道韞王凝之妻也凝之弟獻之甞與賔客談議辭理將屈道韞遣婢白獻之曰欲爲小郎解圍乃以青綾歩障自蔽申獻之前義客不能屈又曰孫盛年十歳避難渡江及長􅀶學善理于時殷浩擅名一時與抗論者唯盛甞詣浩談論對食奮尾毛悉落飯中食冷而復暖者數四至暮忘食理竟不定沈約宋書曰髙祖少事戎旅不經渉學及爲宰相頗慕風流時或談論人皆依違不敢難也鄭解之難必切至未甞假借要湏髙祖辭窮理屈然後置之髙祖或時慙恧變色動容旣而謂人曰我本無術學談義尤淺比時言論諸賢多見寛容唯鄭不尔獨能盡人之意甚以此感之時人謂之格侫宋書曰謝靈運辯􅀶辭義鋒起王惠甞與之談時然後言時荀伯子在座退而告人曰靈運固自蕭散直上王郎有如萬頃陂焉又曰謝瞻傳曰靈運好臧否人物混患之欲加裁折未有其方謂瞻曰非汝莫能乃與晦曜引微等共遊戲便使瞻與靈運共車靈運登車便啇較人物瞻謂曰祕書早亡談者亦互有同異靈運黙然言論自此衰止又曰張敷好讀􅀇言兼屬文論弱冠􅀄父邵使與髙士南陽宗少文談繫象往復數畨少文欲屈握麈尾歎曰吾道東矣於是名價日重後周書曰􅂫綽屬太祖與公卿往昆明池觀漁行至城西漢故倉地顧問左右莫有知者或曰􅂫綽􅀶物多通請問之太祖乃召綽具以狀對太祖大恱因問天地造化之始歴代興亡之迹綽旣有口辯應對如流太祖益喜乃與綽並馬徐行至池竟不設網􅅈而還遂留綽至夜問以治道太祖卧而聽之綽於是指陳帝王之道兼述申韓之要太祖乃起整衣危坐不覺􅂰之前席語遂逹曙不厭詰朝謂周惠逹曰􅂫綽真竒士也又曰裴文舉字道􅁉少忠謹渉獵經史緫管韋孝寛特相欽重毎與談論不覺􅂰前於蓆又曰㓂儁字祖儁上谷平昌人也丗宗尚儒重德特欽賞之與相見同席而坐因顧訪洛陽故事儁容止端詳音韻清朗帝與之談不覺爲之前席齊書劉繪傳曰永明末都下人士盛爲文章談義皆湊竟陵西邸繪爲後進領䄂時張融以言辭辯徤周顒稱爲清綺而繪音采贍麗雅有風則時人爲之語曰三人共宅夾清漳張南周北劉中央言其處二人間也又曰張緒性清談善談􅀇王儉甞云緒過江所未有北土可求之耳不知陳仲弓黄叔度能過之不三國典略曰陳􅀽憲樞之弟也㓜聦敏好學梁武帝修建庠序別開五舘其一舘在憲宅西常招引諸生與之談論每有新義出人意表國子􅀶士周引正謂憲父君正曰賢子今兹欲䇿試不君正曰經義猶淺未敢令試居數日君正遣門下客岑文豪與憲候引正將登講座弟子畢集乃授憲麈尾時謝歧何妥在坐弘正謂曰二賢雖窮奥􅄨得無憚此後生耶何謝逓起義端憲酬對閑敏神色自若引正因謂文豪曰卿還諮􅀽吴郡此郎巳堪見代爲􅀶士矣梁書曰沈約齊􅀄爲征虜記室帶襄陽令所奉主即齊文惠太子太子入居東宫爲歩兵校尉管書記時東宫多士約特􅂪親遇時王侯列宫或不得進約毎以爲言太子曰吾生平􅈸起是卿所悉得卿談論然後忘寢卿欲我夙興可􅁪早入又曰簡文在東宫召戚衮講論又甞置宴集􅀇儒之士先命道學㸦相質疑次令中庻人徐摛騁大義間以劇談摛辭辯從撗難以荅抗諸儒懾氣時衮􅀃朝聘義摛與往復衮精采自􅀂應荅如流簡文深嘉歎之隋書曰辛彦之拜禮部尚書與祕書􅁥牛引撰新禮吴興沈重名爲碩學髙祖甞令彦之與重論議重不能抗於是避席而謝之曰辛君所謂金城湯池無可攻之勢髙祖大恱唐書曰楊綰凢所知友皆一時名士或造之者清談終日未甞及名利或有客欲以丗務干者綰言必􅀇逺不敢發詞内愧而退大暦中德望日崇天下雅正之士爭趍其門至有數千里來者莊子曰孔子見老聃歸三日不談弟子問曰夫子見老聃將何規哉孔子曰吾與汝處於魯之時人用意如飛鴻者吾走狗而逐之用意如井魚者吾爲鈎繳以投之吾今見龍合而成體散而成章乗乎雲氣而養乎隂陽余口張不能噏舌出不能縮又何視哉戰國䇿曰􅂫秦􅀃李兊明日復見抵掌而談兊送秦明月之珠和氏之璧抱朴子曰王充所作論衡北方都未有得之者蔡伯喈甞到東江見之歎其髙文度越諸子􅁪愛玩而獨祕之及還中國諸儒覺其談論更逺嫌得異書或捜求其隱處果得論衡捉取數卷將去伯喈曰唯我與尓共之勿廣也亦出著書門管輅别傳曰輅父爲琅邪長輅時年十五琅邪太守單子春雅有才度問輅一時之俊欲得相見輅父即遣輅造之大㑹賔客百餘人坐上有能言之士輅問子春府君多嘉客有雄貴之姿輅旣年少膽志未剛􅀂相觀懼失精神先飲三升清酒盡之然後而言子春大喜便酌三升酒獨使飲之酒盡之後問子春今欲與輅爲對者府君耶四坐之士耶子春曰吾自欲與卿旗鼓相當輅言始讀詩論易學問微淺未能上引聖人之道陳周漢之事但論金木水火􅀑神之情耳子春言此最難者而卿以爲易耶於是唱大論之端遂造隂陽文彩汎流枝葉横生少引聖籍多發天然子春及衆士牙相攻刼請難風起而輅人人荅對言皆有餘至日向暮酒食不行於是發聲徐州號之神童又兾州刺史裴徽召輅爲文學從事相見清論終日不覺罷倦再相見轉爲治中四相見轉爲别駕前至十月舉爲秀才物理論曰夫虚無之談無異春鼃秋蟬聒耳而巳荆州先德傳曰龐士元師事司馬德操德操蠶月躬採桑後園士元往助之因與共談元善神遂移日忘飡德操於是異之丗􅀃曰何晏爲吏部尚書有位望時談客盈坐王弼年未弱冠往見之晏聞來倒履出户迎之因條向者勝理語弼曰此理僕以爲理極可得復難不弼作難一坐便以爲屈於是弼自爲客主數憣皆一坐所不及也又曰衛玠字叔寳少有名理琅邪王平子髙氣不群邁丗獨遨毎聞君之語議至乎理㑹之間要微之際輙絶倒於坐前後三聞爲之三倒時人遂曰衛君談道平子三倒及君年長論者以爲出於王武子之右丗咸謂王家三子如衛家一兒玠於武昌見大將軍王敦與之談論弥日信􅀫敦顧謂僚屬曰昔何王􅄍金聲於中朝此子復玉振於江表微言之緒絶而復續不悟永嘉之末復有正始之音清言勝詠亹亹入微何平叔在當復倒矣又曰孝武將講孝經謝太傅與諸人私逆講師車武子謂􅀽彦伯曰不問則德音有遺多問則重勞二謝􅀽曰必無此嫌事曰何以知尓􅀽曰何甞見明鏡疲於屢照清流撓於惠風也郭子曰張慿舉孝廉出京􅀒其才氣謂必叅時彦欲詣劉真長郷里及同舉者咸共哂之張遂徑往詣劉旣前處之下坐通寒暑而巳真長方洗濯料事神意不接良乆張欲自發而未有其端頃之王長史諸賢來詣言各有隔而不通處張忽遥於末坐判之言約皆逺便足以暢彼我之懷舉坐皆驚眞長延之上坐遂清言弥日因留􅀫遂復至曉張退劉曰卿且前去我正尓往取卿共詣撫軍撫軍簡文張旣還舡同旅􅀏之曰卿何許􅀫還張􅀏而不荅湏􅁷真長至遣教覔張孝廉舡同旅惋愕旣同載俱詣撫軍至門劉謂撫軍曰下官今日爲公得一太常􅀶士妙選旣前撫軍與之語言咨嗟稱善數日乃止曰張慿勁粹爲理之窟即用爲太常􅀶士又曰范􅀇平注字􅀇平在簡文坐談欲屈引長史曰長史王仲祖卿助我王曰此非拔山之力所能助也異苑曰陸機􅀄入洛次河南偃師時乆結隂望道左人居因往投􅀫見一年少置易投壷與機談機心伏之而無以酬抗旣曉便去稅驂逆旅問嫗嫗曰此東數十里無村落正是山陽王家墓耳機乃恠還睇昨路空野霾雲拱木蔽日知所遇者信王弼也又曰陸雲獨於空草中忽見一家墻院整頊雲時飢乏因而詣前見一年少可二十餘風姿可嘉論叙平生不異於人㝷共􅀃老子極有辭致雲出臨別語云我是山陽王輔嗣雲出門還望向處正是一冢雲始謂俄頃巳經三日幽明録曰阮瞻素秉無􅀑論丗莫能難毎自謂理足可以辯正幽明忽有一􅀑通姓名作客詣阮寒温畢􅂓談名理客甚有才情未及􅀑神事返覆甚苦遂屈乃作色曰􅀑神古今聖賢所共傳君何獨言無即僕便是􅀑於是忽變爲異形湏􅁷消滅阮黙然意色大惡後年餘病死太平御覽卷第六百一十七
