front:
  text: 太平御覽卷第六百九十七
  hash: sha256:64d53deaae1b7a22bcfb6aaf51babaa7f6adf7da1403c86d105c597cccb57ded
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_697-1a}
body:
  text: 服章部十四履舄韈履釋名曰履禮也飾足所以爲禮亦曰抱也所以抱足也􅃨其下曰舄舄腊也乆立地濕故􅃨其下使乾腊也不借言賤易有冝各自畜不假借之也齊人曰搏借􅅮借猶把鮓麁之貌也曰麁絲麻韋草皆同名麁麄措也言所以安措足也􅀃文曰履足所依也靸小兒履也鞮革履也廣雅曰履紟謂之碁丗夲曰於則作履扉於則黄帝臣草曰扉麻曰履也方言曰􅁝作之麻作之不借組者謂之履屨朝鮮洌水之上謂之卭角南方江􅃆之間惣謂之麄梁益謂之屣或謂之下几反一音盡履其通語也徐土邳沂之間今下邳沂音圻謂之叩角緉􅥭上兩下爽閞之東西或謂之緉或謂之􅥭其通語也史記曰張良甞遊於下邳圯上有一老父至良所墮其履圯下頋謂良曰孺子下取之父曰履我良業爲取履因長跪進之又曰東郭先生待詔公車貧困飢寒衣幣不完行雪中履屨有上無下足盡踐地道中人􅀏之又曰趙平原君使人於春申君欲誇楚爲瑇瑁簮刀劒之室飾以珠玉而春申君客三千餘人其上客皆躡珠履趙使大慙又曰淳于髠曰杯盤狼籍履舄交錯漢書曰王莾好髙冠厚履又曰鄭宗哀帝擢爲尚書僕射數諫爭毎見曳革履上􅀏曰我識鄭尚書履聲魏志曰曹公令曰議者以祠廟當解履吾受賜命帶劒不解履上殿今有事于廟而解履是尊先公而替王命敬父祖而簡君主也吾不敢脫履上殿蜀志曰先主少􅀌織履爲業曹公罵云賣履舎長又曰劉琰妻胡入賀太后后特留胡經月乃出胡有美色琰疑其與後主有私呼卒伍伯撾胡以履􅅮面胡具以言告琰坐下獄有司議曰卒非撾妻之人面非受履之地琰竟弃市晉書曰夜武庫火累代之寳皆焚焉孔子履漢祖斬蛇劒王莽頭並失又曰符健時霖雨河水溢浦津監冦登得一履於河長七尺三寸内指跡長一尺􅀷三寸續晉漢陽春秋曰江州刺史王弘造陶淵明無履弘從人脫履以給之語左右爲彭澤作履左右請履度淵明於衆坐伸脚令度及履至着而不疑晉惠帝起居注曰帝還洛陽至陵下謁無履取左右履着下拜趙録曰佛圖澄卒葬後郭門吏報石季龍云是師携一履西去季龍發其墓唯見一履與一石後魏書曰王遵業從容恬素􅀂處丘園嘗着穿履好事者多毀新履以學之宋書曰益州道士邵碩元徽二年忽告人云吾命終因卧而死後人見碩在荆州上明以一􅃗故履􅅞左脚而行甚疾遂不知所之齊書曰髙祖儉素宫人盡令着紫絲履太公金匱履之書曰行必慮正六韜崇侯虎曰今周伯昌懷仁而善謀冠雖弊禮加於首履雖新法以踐地可及其未成而圖之又曰昔帝堯王天下黼衣絓履不弊不更爲也晏子曰公問曰子近市識貴賤乎時公繁刑晏子曰踊貴履賤公愀然遂緩刑又曰景公爲履黄金之綦飾以銀連以珠良玉之約其長尺又曰景公爲履飾以金玉服以聽朝履重僕不能舉之問曰天寒乎晏子曰古之制衣服冬輕而煖夏重而清金玉之履是重而寒也公入徹履孫卿子曰大布之衣簏紃之履可以養體也莊子曰儒者冠圓冠者知天時履方屨者知地形又曰曽子居衛捉衿而肘見納履而踵决韓子曰鄭人有欲買履者先自度足而置其坐徃市而忘操之見履乃曰吾忘度足乃歸取之市罷不得履人曰何不試以足曰寧信度數無自信也又曰文王履係解視左右盡賢無可使係者因俛而係之又曰魯人身善織履其妻善織縞而徙於越或謂之曰子必窮履飾足也而越人跣縞爲冠之也而越人􅀍髮欲不窮可得乎賈子曰天子黒方履諸侯素方履大夫素圓履賈􅁩書曰昔楚昭王與呉戰楚軍敗昭王走而履决失之行三十歩復旋取左右問曰何惜此一踦履乎王曰楚國雖貧豈愛一踦履哉惡與偕出弗與俱反也自是之後楚國之俗無相弃者又曰履雖鮮弗加之於枕冠雖弊弗以苴履又曰二丗胡亥之爲公子曰詔置酒享羣臣召諸子賜食先罷胡亥下階羣臣陳履狀善者因行踐敗而去諸侯聞之者莫不太息及二丗即位皆知天下必弃之淮南子曰禹之趍時冠挂而弗頋履遺而不取塩鐵論曰古者庶人鹿菲草履今冨者韋沓絲履風俗通論數曰踦者竒也履舄之一也夢書曰履韈爲子属體末也若夢得履韈者必有子息也履者爲男韈者爲女也西京雜記曰趙飛鷰爲皇后其弟上遺同心七寳綦履又曰度安丗年十五爲成帝侍郎常着輕絲履又曰匡衡邑人有說詩者衡從與語質疑邑人推服到履而去拾遺録曰穆王起春宵之宮西王母來焉納丹豹文履魏武帝遺令曰諸舎中可學作組履賣之又内式令曰吏民多製文繡之服履絲不得過絳紫金黄絲織履前於江陵得雜綵絲履以與家約當着盡此履不得效作也晉令曰土卒百工履色無過緑青白婢履色無過紅青古儈古㑹切賣者皆當着巾帖額題所儈賣者及姓名一足着黒履一足着白履東宫舊事曰太子妃有絳地絞履一緉漢舊儀曰乗輿帶七尺斬蛇劒履虎尾約履徐乹古履儀曰正㑹大司馬問劒履上殿義徐言所以遂見從着履上殿時人見咸譏云古無履伹有舄今當着舄上殿不冝着履案周禮天王赤舄黒舄后素􅁑履鄭君注曰􅃨下曰舄單下曰履是則古有履也蔡謨荅臺符分别履舄之名事曰􅀍符小㑹義注侍臣劒履􅂛殿而摯虞決疑言劒舄履之名冝審謹案今時所謂履者自漢以前皆名屨屨左傳曰踊貴履賤禮曰户外有二屨不言二履賈􅁩曰冠雖弊不以苴屨亦不言苴履言履者猶足所履踐耳詩云糺糺􅁑屨可以履霜舄者一物之别名履者足踐之通稱稱先代以來優崇重臣言劒履則包舄也又大臣昇殿不唯朝㑹或私覿獨見臨時所着不必是舄故揔言履以明不跣而巳摯虞中朝􅀫臣多識徃行親覩其禮退而書之即是晉之故典令决疑言舄者書時事也儀注言履者舉揔名也㝷文揔意所稱雖異其制一也鄧德明南康記曰昔有盧躭仕州爲治中當元㑹至曉不及朝化爲白鵠至閣前迴翔欲不威儀以帚擲之得一􅀟履躭驚還就列内外左右莫不駭異時歩騭爲廣州刺史意甚惡之便以狀聞遂至誅滅荆州記曰興安水邊平石上有石履搜神記曰宮亭湖􅀌石有一估客下都經其下見二女子云可爲妾買兩緉絲履自厚相報估客至都與置之並一箱置履在内留廟中去兼一書一刀忘而和留之及下去乗舟忽有鯉魚躍入剖之得刀與書幽明録曰晉太寧元年餘杭人姓王失其名徃上舎過廟乞福旣去亡履巳行五六里􅈸復更反取一白衣人持履後至云宫使還君化爲鵠飛入田中列仙傳曰嘯父兾州人在曲周市􅀘履數十年不老人竒之又曰昭帝旣葬鈎弋夫人空棺無屍但有絲履列異傳曰胡母班爲太山府君賷書詣河伯貽其青絲履甚精巧也漢武内傳曰七月七日西王母降履􅀇瓊鳯文之舄列女傳曰翟方進學於京師後母憐其㓜隨之長安織履以給之皇甫謚髙士傳曰陳仲字子終自齊適楚楚王欲以爲相其妻子曰家織履以食淡然而無爲樂在其中矣謝使者􅁗嘉與婦淑書曰今枉虎龍組緹履一緉髙文惠婦與文惠書曰今聊奉組生履一緉曹植賀冬表曰獻白文履七緉韈百副崔寔四民月令曰八月制韋履十月作白履劉楨魯都賦曰纎纎絲履粲爛鮮新表以文組綴以朱蠙曹植洛神賦曰踐逺遊之人履曵霜綃之輕裙古樂府詩曰君子防未然不處嫌疑間􅀲田不納履李下不正冠張華輕薄篇曰足下黄金履手中􅀟莫􅁘甄述女詩曰足躡承雲履豊趺暠春錦古詩曰頭上金􅁫十二行足下絲履五文章傅􅀇履銘曰戒之哉念履正無履邪正者􅁻之路邪者凶之徴賈􅁩弔屈原文曰章甫薦履漸不可乆嗟􅀂先生獨離此咎舄崔豹古今注曰舄以木置履下乾腊不畏泥溺也方言曰履中有木者謂之􅃨舄自関而東謂之􅃨履其上單者謂之宛下單者謂之鞮詩曰公孫碩膚赤舄几几又南有嘉魚車攻曰赤芾金舄箋云金舄黄朱色也周禮天官下曰􅋰人掌王及后之服屨爲赤舄黒舄赤繶黄繶青句素屨葛屨鄭􅀇曰王告服有九舄有三等赤舄爲上冕服之舄也王后亦服唯祭服有舄鄭司農云赤繶黄繶黄繶以黄赤云絲爲下縁繶音憶左傳曰楚子次于乾谿雨雪王皮冠􅁗復陶􅁗所遺羽衣也翠􅀍以翠羽飾􅀍豹舄以豹皮爲􅂂執鞭以出三禮六服圖曰王后翬衣􅀇舄榆翟赤舄鞠衣着履鞠衣以下皆􅂂之三禮圖曰􅃨下曰舄單下曰履夏葛冬皮也􅀃苑曰襄成君始封之時衣翠衣帶玉佩玉劒履縞舄典論曰中常侍張譲子奉爲太醫令與人飲酒輙掣引衣掌發露形體以爲戲樂將罷又亂其舄履無不顛倒漢武内傳曰西王母履文鳯之舄列仙傳曰安期先生瑯瑘阜郷人􅁗始皇請見與語三日三夜賜金壁千萬出於阜郷皆置去留書以赤玉舄一枚以報拾遺録曰􅁗王子嬰寢於望夷宫夜夢有人長文􅂡􅁂絶青納王舄而乗丹車告云天下當亂王乃殺趙髙所夢則始皇之靈所着舄則安期所遺者列仙傳曰黄帝葬橋山山崩無尸唯劒舄存衝波傳曰足履萬錢之舄漂如日光宛如遊龍風俗通曰孝文身履革舄而衣弋綈又曰俗􅀃明帝時尚書郎鄴令王喬毎月朔常詣臺朝帝恠其來數而無車馬密令太史候望言其臨至時常有􅀟鳬從東􅀯飛來因舉羅得一􅃗舄使上方識是四年中所賜尚書􅂂也杜氏幽求曰褒衣􅀶帶髙冠厚舄佩以珠璣結之纓蕤陳思王七啓曰金華之舄動趾遺光韤􅀃文曰韤足衣釋名曰韤末在脚也左傳曰衛侯與諸大夫飲酒禇聲子韈而登席公怒帝王丗紀曰武王伐紂行至啇山韈係解五人在前莫肯係皆曰臣所以事君非爲係韈漢書曰中山王來朝成帝賜食後飽起下韈係解成帝以爲不能而賢定陶王又曰景帝時王生者善爲黄老言甞召居廷中公卿盡㑹張釋之爲廷尉王生頋曰吾韈解爲我結韈釋之跪而結之人或讓王生獨奈何辱張廷尉如此王生曰吾老且賤自度終亡益於張廷尉方今天下名臣吾故聊使廷尉跪結韤欲以重之諸公聞之賢王生而重釋之東觀漢記曰和帝召諸儒侍中賈逵黄香相難罷朝特頒賜履韈文子曰均爲縞也或爲冠或爲韈則履之又曰文王伐崇至鳯皇之墟而韈係解文王自結之太公問焉文王曰吾聞亡君所與處盡其役寡人雖不肖所與處皆先君之人也故無令結之漢舊儀曰凡齋􅀇豹韈耕用青韈㑹稽典録曰賀劭爲人美容止與人交乆益敬之在官府常著韈希見其足崔浩女儀曰近古婦以冬至日進履韈於舅姑張衡南都賦曰羅韈躡跡而容與曹植洛神賦曰凌波微歩羅韈生塵也皇甫規與馬融書曰謹上韈一量以通微薄􅁗嘉婦與嘉書曰今奉細布韈二量髙文惠婦與文惠書曰今奉織成韈一量曹植賀冬表曰獻韈七量并爲韈頌曰玉趾旣御􅂂和蹈貞行與録邁動以福并後漢崔駰作韈銘太平御覽卷第六百九十七
