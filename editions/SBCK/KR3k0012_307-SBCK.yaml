body:
  text: 兵部三十八㑹兵誓衆麾兵饗士犒師㑹兵書曰戊午師渡孟津陳于啇郊俟天休命甲子昧爽受率其旅􅀂林㑹于牧野旅衆也如林言盛多㑹逆拒戰罔有敵于我師前徒倒戈壹戎衣而天下大定言與衆同心動有成也􅂖梁曰齊侯兵車之㑹四未甞有大戰愛民也後漢書曰􅀄卷人維汜卷縣名屬河南郡故城在今鄭州原武縣西北訞言稱神有弟子數百人坐伏誅後其弟子李廣等宣汜神化不死以誑惑百姓十七年遂共聚㑹徒黨攻没睆城睆縣名屬盧江郡今舒州懷寧縣睆音下板切又下管切殺睆俟劉閔自稱南岳大師遣謁者張宗將兵數千人討之復爲廣所敗於是使馬援發諸郡兵合萬餘人擊破廣等斬之又曰章和二年護羗校尉張紆誘誅燒當種羗迷吾等由是諸羗大怒謀欲報怨朝􅋝憂之公卿舉鄧訓代紆爲校尉諸羗激忿遂相與解仇結㛰交質盟詛鄭􅀇注周禮云大事曰盟小事曰詛衆四萬餘人期冰合渡河攻訓又曰呉漢爲安樂令㑹王郎起北州擾惑漢素聞光武長者獨欲歸心乃􅀃太守彭寵曰漁陽上谷突騎天下所聞也君何不合二郡精銳兵附劉公擊邯鄲此一時之功也一時言不可再遇也寵以爲然又曰朱鮪聞光武北伐而河内􅀌使討難將軍蘇茂副將賈強率兵三萬餘人渡鞏河攻温鞏温並今洛州縣也臨廣河故曰鞏河檄書至㓂恂即勒軍馳出並移告屬縣發兵㑹於温下軍吏皆諌曰今洛陽兵渡河前後不絶冝待衆軍畢集乃可出也恂曰温郡之藩蔽失温則郡不可守遂馳赴之且曰合戰而偏將軍馮異遣救及諸縣兵適至及士馬四集幡旗蔽野恂乃令士卒乗城鼔噪大呼言曰劉公兵到蘇茂軍聞之陣動恂因奔擊大破之又曰呉漢悉發幽州兵與光武㑹清陽諸將望見漢還士馬甚盛皆曰是寕肯分兵與人耶及漢至莫府上兵簿莫大也兵簿軍上之名帳諸將人人多請之光武曰屬者恐不與人屬猶近也今所請又何多也諸將皆慙􅀳書天文志曰征呉之役三河徐兖之兵悉出交戰於呉楚之地唐書曰憲宗時鄆州李師道翻覆違命詔宣武義成武寕横海四節度之師與田弘正㑹軍討之弘正奏請取􅀺陽渡河㑹李光顔等軍齊進帝召宰臣於延英議可否皆曰閫外之事大將制之旣有奏陳冝遂其請裴度獨以爲不可奏曰魏博一軍不同諸道過河之後却退不得便湏進擊方見成功􅀂取􅀺陽渡河即􅂊離本界便至滑州徒有供餉之勞又生顧望之􅀔况弘正光顔並少威斷更相疑惑必恐遷延然兵事不從中制一定處分或慮不可􅀂欲於河南持重則不如河北養威不然即且秼馬厲兵􅀱霜降水落於楊劉渡河直抵鄆但得至陽谷巳來下營則兵勢自盛形自不撓上曰卿言是矣乃詔弘正取楊劉渡河及弘正軍旣濟河而􅀯距鄆州四十里築壘賊􅀔果䠞頃之誅師道三國典略曰周武帝率六軍趣鄴齊主令群臣議之廣寕王孝珩議曰今大㓂旣深事藉機變請使任城王便領幽州道兵自土門入聲取并州獨􅀌永業便領洛州兵自潼關入聲取長安臣請領京畿兵岀溢只鼔行逆戰賊懸軍逺來日増疲老聞南北有兵自然應退誓衆書曰帝曰咨禹惟時有苗弗率汝徂征三苗之民數干王誅率循也徂往也不循帝道言亂逆也命禹討之禹乃㑹羣后誓于師曰濟濟有衆咸聽朕命㑹諸侯伐有苗也軍旅曰誓濟濟衆盛之貌蠢兹有苗昏迷不恭蠢動昏闇也言其所以冝討侮慢自賢反道敗德狎悔先王輕慢典教反正道敗德義君子在野小人在位廢仁賢任姦佞民棄不保天降之咎言民叛天災之肆予以爾衆士奉辭罰罪肆故也辭謂不㳟罪謂姦慢以下事爾尚一乃心力其克有勲三旬苗民逆命益賛于禹曰惟德動天無逺弗届禹拜昌言班師振旅帝乃誕敷文德舞于羽於兩階七旬有苗格又曰啓與有扈戰于甘之野王曰嗟六事之人予誓告汝有扈氏威侮五行怠弃三正天用勦絶其命用命賞于祖不用命戮于社予則孥戮汝又曰羲和湎淫廢時亂日胤徃征之告于衆曰羲和尸厥官昬迷于天象以干先王之誅今予奉將天罰火炎崐崗王石俱焚天吏逸德烈于猛火殱厥渠魁脅從罔治嗚呼威克厥愛允濟愛克厥威允罔功爾衆士懋戒哉欽承天子休命又曰魯侯伯禽宅曲阜徐夷並興東郊不開作費誓公曰差人無譁聽命善􅂖乃甲胃備乃弓矢鍜乃戈矛無敢不善峙乃糗糧峙乃蒭茭無敢不逮汝則有大刑魯人三郊三遂峙乃楨幹甲戌我惟築無敢不恭汝則有無餘刑刑者非一也又曰惟戊午王次于河朔次止也戊午渡河而誓旣誓而止于河之北羣后以師畢㑹諸侯盡㑹次也王乃徇師而誓曰嗚呼西土有衆咸聽朕言徇循也武王在西故稱西土今啇王受力行無度行無法度播棄􅀺老昵比罪人鮐背之者稱􅀺老棄不禮敬也昵近也罪人謂天下逋逃小人也予有亂臣十人同心同德言我治理之臣雖少而心德同也雖有周親不如仁人周至也紂至親雖多不若周家之少仁人也又曰武王伐紂曰今予發惟恭行天之罰今日之事不愆于六歩七歩乃止齊焉夫子勗哉不愆于四伐五伐六伐七伐乃止齊焉勗哉夫子尚􅁊􅁊如虎如􅆛如熊如羅于商郊弗迓克奔以役西土勗哉夫子爾所弗勗其于爾躬有戮又曰爾衆士同力王室史記曰太尉行令軍中曰爲吕氏右􅃝爲劉氏左􅃝軍中皆左祖後漢書曰齊武王伯􅂛旣破甄阜軍乃陳兵誓衆焚積聚破釜甑鼔行而前􅀳書曰元帝以祖逖爲􅁬威將軍豫州刺史給千人廪布三千疋不給鎧仗使自招慕仍將夲流徙部曲百餘家渡江中流擊檝而誓曰祖逖不能清中原而復濟者有如大江辭色壯烈衆皆􅁣歎屯于淮隂起冶鑄兵器得二千餘人而後進又載記曰王猛與慕容評戰陣於渭原而誓衆曰王景略受國厚恩任兼内外令與諸君深入賊地冝各勉進不可退也願戮力行間以報恩顧受爵明君之朝慶觴父母之室不亦美乎衆皆勇􅁬破釡棄糧大呼競進後周書曰太祖率李弼獨􅀌信等十二將東伐至潼􅀜太祖乃誓於師曰與爾有衆奉天威誅􅁀亂惟爾衆士整爾甲兵戒爾戎事無貪財以輕敵無暴民以作威用命則有賞不用命則有戮爾衆士其勉之遣于謹居軍前徇地唐書曰髙祖起義兵西圖􅀜中精甲三萬髙祖杖白旗誓衆於太原之野引師即路又曰太宗征王丗充陳兵穀水之上歩􅀐五萬太宗舉麾誓衆曰隋室無道毒􅀍蒼生我國家受命于天寜濟億兆丗充敢抗大􅀖數行侵􅁀誅殺良善恣其淫酷國家爲百姓除害事不􅀗巳各冝整尓軍旅脩尓器械立勲立効龔行天罰敢有犯命者斬無赦又曰朱泚反韋臯於隴州築壇于庭血牲與將士等盟曰上天不弔國家多難逆臣乗間盗據皇宫而李楚琳亦扇兇徒傾䧟城邑酷虐所加爰及本使旣不事上安能恤下臯是用激心憤氣不遑底寜誓舉羣公竭誠王室凡我同盟一心竭力伏順除兇祖先之靈必當幽賛言誠則志合義感則心齊粉骨塵軀決無所顧有渝此志明神殛之迨於子孫亦罔遺育皇天后土當兆斯言又使通於吐蕃以求助古司馬兵法曰古者逐奔不逺縱綏不及所以示君子且有禮不逺則難誘不及則難䧟以禮爲固以仁爲勝旣勝之後其敎可復是故君子貴之也有虞氏戒於國中欲人體其命也舜以農教戰以戰敎民畋獵􅰣習故民體之也夏后氏誓於軍中欲民先成其慮也禹㑹軍聚重􅃨教肆進退左右前後離合周旋也殷誓於軍門之外欲民先意待事也殷旣遵虞夏之教民又於軍門外復簡試周將交刃而誓之以致意也周用漢夏殷之敎民交和接兵又復申望誓之軍德薄民俗巧也又曰賢王制禮樂法度乃作五刑興甲兵以討不義廵狩省方㑹諸侯考不同其有失命亂常背德逆天之時而危有功之君王者以有功德者爲君長賊臣欲篡殺之徧告于諸侯章明於有罪乃告于皇天上帝日月星辰以禱于后􅁟四海之神山川冡社冢社者天子太社也乃造于先王然後􅃁宰徴師于諸侯造就也就造干先祖廟也曰某國爲不道征之以某年月日師至于某國至于所征之國與天子㑹天子正刑刑者天子之法也刑以征不義伐不從王者之法也冢宰與伯布命于軍曰入罪人之地無暴神祗無獵田無有虐無毁二功無糞墻屋無伐樹木無取六畜無取禾粟無取器城見其老㓜奉歸勿傷雖遇壯者不校勿敵􅀂傷人醫藥歸之旣誅有罪王及諸侯正其國舉賢更立明正復職三者與四方諸侯伐無道之國整頓其民人舉賢良更立爲君奉遵王法復五官之職事矣論衡曰師尚父爲周司馬將師伐紂到孟津之上仗􅃏把旄號其衆曰倉兕食兕水中之獸也善覆人船因神以化欲令急渡汝不急渡倉兕害汝河中有此之物時時出浮一身九頭人畏惡之未必覆人􅂳者也文選曰勒三軍誓將帥元戎竟野戈鋋彗雲麾兵莊子曰市南冝僚弄丸兩家之難解孫叔敖甘寢秉羽而郢人投兵􅀳書曰張重華攻石季龍遣謝艾爲使持節軍師將軍率歩􅀐三萬進軍臨河麻秋以三萬衆拒之艾乗軺車冠白恰鳴鼔而行秋望而怒曰艾年少書生冠服如此輕我也命黒矟龍􅆖三千人馳擊之艾左右大擾左戰師李偉勸艾乗馬艾不從乃下車踞胡牀指麾處分賊以爲伏兵發也懼不敢進張瑁從左南縁河而絶其後秋軍乃退艾乗奔擊遂大敗之又曰陳敏一旦據有江東刑政無常不爲英俊所服且子弟凶􅁀所在爲患周玘顧榮之徒常懼禍敗遣使宻報征東將軍劉准遣兵臨淮巳爲應及兵至敏使弟昶及將錢廣次烏江以拒之錢廣玘郷人也潜使圖昶廣遣其屬何康投募送白事於昶昶傾視書康揮刀斬之稱州下巳殺敏動者誅三族吹角爲内應廣先勒兵在朱雀橋陳兵敏師萬人將戰未濟榮以白羽扇麾之敏衆潰散單􅀐東奔爲義師所斬梁書曰魏中山王元英冠北徐州髙祖詔韋叡率衆㑹焉英自率衆來戰叡乗素木輿執白角如意以麾軍一日數合英甚憚其強劉璠梁典曰韋叡字文懷京兆杜陵人也叡雖有曠丗之度莅民以惠愛爲夲所居必治將兵仁愛􅀍服必於儒者雖臨陣交鋒常緩服乗輿執竹如意以麾進止北史曰唐求身長八尺少耿介有將帥才讀班超傳􅁣然有萬里之志正光中爲北地太守永善取下士人競爲之用臨陣常着白裙􅃭把角如意以指麾處分辭色自􅀂在北地四年與賊數十戰未甞敗北時人語曰莫陸梁恐尓逢唐將永所營之處至今猶稱唐公壘後魏書曰毛法仁言聲壯大至於軍旅田狩唱呼處分振於山谷後周書曰李逺字萬歳㓜有器局志度恢然甞與羣兒爲戰􅋐之戯指麾部分便有軍陣之法郡守見而異之召使更戯羣兒懼而散走逺持杖叱之復爲向􅀔意氣雄壯殆甚於前郡守曰此小兒必爲將帥非常人也又曰建德中東伐齊帝引兵發京師壬寅渡河與諸軍合十二月戊申次於􅀳州恐王師卒至於城南穿壍自喬山屬於汾水庚戌帝諸軍八萬人置陣東西二十餘里帝乗常御馬從數人廵陣處分所至輙呼主帥姓名以慰勉之將士感見知之恩各自􅁬勵隋書曰李子雄從幸江都帝以仗衛不整顧子雄歩伍之子雄立指麾六軍肅然帝大恱曰公眞武侯才也尋轉右武􅀱大將軍唐書曰德宗時鄭權爲涇原節度使劉昌從事昌病亟請入覲度軍中必有變以權寛厚善容衆俾主留務旣而兵果爲亂權挺身於白刃中抗詞以明逆順因殺其首亂者數人士皆戢伏又曰昭宗時玉山都頭楊守信叶楊復恭稱兵闕下陣于通化門上陳兵於延喜門是夜令劉崇望守度支庫明日曉入含光門未開門内禁軍列于左右俟門開即刼掠兩市及聞傳呼宰相來門方開崇望駐馬慰諭之曰聖上在街東親揔戎事公等禁軍何不樓前殺賊立取功名切不可剽掠街市圖小利以成惡名也將士唯唯從崇望至長樂門守信見兵來即遁軍士呼萬歳是日庫市􅀗全軍人不亂繄崇望之方略也五代周史曰丗宗至泗洲太祖皇帝乗勝麾軍焚郭門奪月城帝親冒矢石以攻其壘丙午日南至從臣拜賀於月城之上語林曰諸􅁑武侯與司馬宣王在渭濵將戰宣王戎服莅事使人視武侯素輿葛巾持白毛扇指麾三軍皆隨其進止宣王聞而歎曰可謂名士饗士左傳曰宋華元將戰殺羊食其御羊斟不與及戰曰疇昔之羊子爲政今日之事我爲政與入鄭師故敗君子謂羊斟非人也以其私憾敗國殄民刑孰大焉史記曰樂毅并護趙楚韓魏燕之兵以伐齊破之濟西諸侯罷歸而燕軍樂毅獨追至于臨輜齊昬王之敗濟而亡走保於莒樂毅獨留徇齊皆城守樂毅攻入臨淄盡取齊寳財物􅀕器輸之燕昭王大恱親至濟上勞軍行賞饗士封毅於昌國號爲昌國君東觀漢記曰上大發關東兵自將上隴隗囂衆潰走圍解於是置酒髙㑹勞賜諸將來歙班坐絶席在諸將之右賜歙縑千疋後漢書曰呉漢圍􅂫茂於廣樂劉永將周建別招聚収集得十餘萬人救廣樂漢將輕騎迎與之戰不利墮馬傷􅂰還營建等遂連兵入城諸將謂漢曰大敵在前而公傷卧衆心懼矣漢乃勃然裹瘡而起推牛饗士令軍合戰大破之又曰劉盆子旣降帝令縣厨賜食衆積困餧十餘萬人皆得飽飫又曰鄧禹至長安軍昆明池大饗士卒率諸將齊戒擇吉日脩禮謁祠髙廟収十一帝神主遣使來詣洛陽因循行園陵爲置吏士奉守焉後周書曰􅀂干惠於諸將最少早䘮父事母以孝聞太祖甞造射堂新成與諸將宴射惠竊歎曰親孝矣何時辨此乎太祖聞之即日徙堂於惠宅其見重如此淮南子曰貟中規方中矩動成戰止成文可以榆衆而不可以陳軍滌杯而食洗爵而飲盥而後饋可以養少而不可以饗衆衛又曰楚子以至于羅汭傳也羅水名呉子使其弟蹶由犒師楚人執之將以釁鼓王使問焉曰汝卜來吉乎對曰吉且呉社稷是卜豈直爲一人使臣獲釁鼓而弊邑知備以禦不虞其爲吉孰大焉乃弗殺後漢書曰岑鼓長驅入江􅀜令軍中無得虜掠所過百姓皆奉牛酒迎勞彭見諸􅂄老爲言大漢哀愍巴蜀乆見虜役故興師遂伐以討有罪爲人除害讓不受其牛酒百姓皆大喜恱争開門降􅀳書曰􅁊温進兵至霸上耆老持牛酒迎温曰不圖今日復見官軍後梁略曰大寳元年西魏將楊忠來逼荆鎭上懼其至送遣犒軍旣而與忠結盟并送質子與魏相約爲兄弟之親於是聘使徃還相望道路後魏書曰鄧頴從丗祖幸漢南髙車莫弗庫􅀂於率􅀐數萬驅鹿百餘萬諸行在所詔頴爲文銘于漢南以昭功德淮南子曰􅁗繆公使孟明舉兵襲鄭鄭賈人弦髙蹇他他弦高黨人相與謀曰師行數千里又數過諸侯之地其勢必襲鄭凡襲國者以爲無備也其以知其情必不敢進乃矯鄭伯之命以十二牛勞三率相與謀三率秦將白乙孟明西乞曰守備必固進必無功乃還師而反􅀳先軫舉兵擊之先軫􅀳大夫也大破之鄭伯乃以存國之賞賞弦髙髙辭太平御覽卷第三百七
