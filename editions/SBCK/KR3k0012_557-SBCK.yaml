front:
  text: 太平御覽卷第五百五十七
  hash: sha256:33845a548af8443bfa7b9c2cb8c091b89e9e1abd6dac213f3203fdea0afff041
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_557-1a}
body:
  text: 禮儀部三十六冢墓􅀃文曰冢髙墳也壟丘也墓兆域也釋名曰冢腫也象山頂之髙者腫起也墓孝子思慕之處也丘陵象其形也書曰武王克啇封比干之墓周禮曰大司徒以夲俗六安萬民一曰媺音美宫室二曰族墳墓又曰冢人掌公墓之地辨其兆域而爲之圖先王之葬居中以昭穆爲左右公君也圗謂畫其地形及丘壟所處而藏之先王造塋者昭居左穆居右夾處東西凢諸侯居左右以前卿大夫士居後以其旋子孫各就其所出王以尊卑處其前後而亦併昭穆凢死於兵者不入兆域􅀾敗無勇投諸塋外以罰之凢有功者居前居王墓之前處昭穆之中央以爵等爲丘封之度與樹數別尊卑也王公日丘諸臣封漢律日列侯墳髙四尺関内侯以下至庶人各有差大喪記有曰請庶甫竁遂爲之尸竁尸絹切又士汭切葬穿壙也又音毳及竁以度爲丘遂共喪之􅉎器及葬言鸞車象人鸞車巾車所飾遣車也亦設鸞於象人謂以芻爲人言問其不如法度者及􅉎報斧以涖臨下棺也遂入藏凶器正墓域守墓蹕墓域守墓禁位謂丘封所居前後之禁所爲榮限凢􅀕墓爲尸凢諸侯及諸臣葬於墓者授之兆爲之蹕均其禁又曰墓大夫掌凢􅀖墓之域爲之圖凡􅀖中之墓地民所葬地令國民族葬而掌其禁令族葬各徒其親凢爭墓地者聽其獄訟師其属而巡墓厲居其中之室以守之厲營限遮列處禮曰適墓不登壟爲甘不敬塵冢也墓笙域助葬必執紼葬喪之大事紼引車索又曰孔子旣得合葬於防言旣得者少􅀌不知其墓曰吾聞之古者墓而不墳墓謂兆域土之髙者日墳也今丘也東西南北之人不可以不識音志也於是封之崇四尺四尺盖周之制也孔子先反當脩虞事門人後雨甚至後持封也孔子問焉曰尓來何遲也曰防墓崩孔子不應三三言之以孔子弗問孔子泫然流涕曰吾聞之也古不脩墓脩猶治也又曰易墓非古也易謂墓治草木不易者丘陵也又曰曽子曰朋友之墓有􅀫草而不哭焉􅀫草謂陳根也爲師必喪三年於朋友期可又曰子路去魯謂顔淵曰何以贈我贈送曰吾聞之也去國則􅂘于墓而後行反其國不􅂘展墓而入無君事主於孝􅂘言衣去也展省袒之謂子利曰何以處我處猶安也子路曰吾聞之也過墓則式過祀則下治者主於故又曰晉趙文子曰叔譽觀于九原叔譽叔向也文子曰死者如可作也吾誰與歸叔譽曰其陽豦父乎文子曰行并植於晉國不没其身其智不足稱也并猶專也謂㓻而專巳爲狐射姑所殺没終也其咎犯乎文子曰見利不頋其君仁不足稱也謂與文子避難至反國無安君之心及河授壁要君以利也我則隨武子乎利其君不忘其身謀其身不遺其友武子士㑹也晉人謂文子知人傳曰譽叔曰晉人禦師必於殽殽有二陵焉其南陵夏后臯之墓也又曰鄭子展子産帥車七百乗伐陳陳侯扶其太子偃師奔墓欲逃冢問也又曰呉將伐齊越子率其衆以朝呉將皆喜唯子胥懼曰是豢呉也夫闔閭聞之賜之属鏤以死屬鏤劒名將對曰樹吾墓檟檟可材也呉其亡乎史記曰黄帝崩葬橋山武帝廵朔方還􅀕黄帝冢曰吾聞黄帝不死今有冢何也左右曰黄帝巳上天群臣藏其衣冠故有冢帝曰吾誠得如黄帝視去妻子如脫屣也又曰樗里子卒葬渭南章䑓之東曰後百􅀊當有天子之宫夾我墓至漢興長樂宫在其東未央宫在其西武庫正直其墓漢書曰朱買臣獨行歌道中負薪墓間故妻與夫家俱上冢見買臣飢寒呼飯飲之又曰驃􅀐將軍霍去病卒天子悼之發屬國􅀇甲軍陳自長安至茂陵爲冢像祁連山又曰嚴延年東海下邳人爲河南太守母來見執因大驚謂延年曰天道神明人不可獨殺我不自意當老見壯子􅀍刑戮也行矣爲汝東歸掃除墓地耳遂去歸郡見昆弟宗人復爲言之後􅀊餘果敗東海莫不賢其母又曰哀帝令將作爲董賢起冢營義陵傍内便房剛栢題湊外爲徼道周垣數里闕果罳甚盛果音浮罳音思又曰莽奏貶􅀓太后號爲定陶恭王母丁􅁎莽復言恭王母丁􅁎不臣妾至葬渭陵冡髙與元帝山齊諸發恭王母及丁􅁎冢取其璽綬消滅徙恭王母歸定陶葬恭王冢次而葬丁􅁎復其故太后以爲旣巳之事不湏復發莽固争之后詔曰因改故棺爲致椁作冢祠以太牢謁者護旣發􅀓太后冢崩壓殺數百人開丁􅁎椁火出四五丈吏卒以水沃滅迺得入燒燔椁中器物開􅀓后棺臰聞數里公卿在位皆阿莽旨入錢帛追子弟及諸生四夷凡十餘萬人操持作具助將作掘平㳟王母丁姫冢二旬間皆平莽又周􅁄其豦以爲丗戒云時有羣鷰數千衘土投丁􅁎穿中又曰張賀爲掖庭令及宣帝即位賀巳死子又早亡上追思賀恩封其家恩德置守冢二百家又曰夏侯勝字公長遷太傅卒官賜冢塋葬平陵太后爲素服五日報師􅀓之恩儒者以爲榮斛縑五百疋除三子爲郎中長子壽服竟爲邸平侯相夢序告之曰乆客思郷里壽即弃官上書乞骸骨歸葬帝許之乃反舊塋焉魏略曰曹操微時人莫知之唯橋玄見而異焉謂曰今天下將亂安生民者其在君乎操感其知巳及後經過玄墓輙悽愴致􅀕魏志曰管輅過母丘儉墓下􅀝樹哀吟曰玄武藏頭倉龍無足白虎衘尸朱雀悲哭四危以備法當滅族卒如其言又曰幽州牧劉虞署田疇爲從事奉使未至虞巳爲公孫瓉所害及至謁􅀕虞墓陳章表􅂘泣而去呉書曰孫堅家于富春葬於城東冢上數有光恠雲氣五色王隱晉書曰􅀄太康元年汲縣民盗發魏安釐王冢得竹書􅃮字又曰交廣記呉將吕岱爲廣州遣掘尉他冢費損無獲他雖僣侈然慎終其身乃令後不知其豦鑒於牧堅所殘也又曰􅉖帝建興中曹嶷發景公及管仲冢尸並不朽繒帛可服珎寳巨萬又曰金郷縣北鑿石爲冢云得白虵白兎及得金故曰金人又曰王褒字偉元少立操尚父爲晉文王所害絶丗不仕立屋墓側以教授爲務旦夕常至墓前朝拜輙悲號斷絶墓前一栢樹褒常所攀涕所著樹色與凡樹不同書曰􅅬修南陽人也爲廣州牧修在海南積年爲邊夷所附卒請葬京師帝嘉其意賜墓田一頃又曰東海王越屯許路經滎陽過􅄞紹墓􅂘之悲慟刋石立文表贈官爵帝乃遣使䇿贈侍中光禄大夫加金章印綬進爵爲侯賜墓田一頃客一戸祠以少牢又曰盧志言於成都王頴曰黄橋戰亡者有八千餘人旣經夏暑露骨中野可爲傷惻昔周王葬枯骨況此等致死王事乎頴乃造棺八千餘枚以成都國秩爲衣服殮􅀕葬於黄橋北樹枳籬爲之塋城又立都􅀕堂刋石立碑紀其赴義之功使亡者家四時􅀕祀有所晉書載記曰西胡梁國兒於平涼作壽􅊘毎將妻妾入􅊘飲讌酒酣升靈床而歌時人或譏之國兒不以爲意前後征伐屢有功姚興以爲鎮北將軍年八十餘乃死宋書曰宋文帝元嘉二十五年行幸江寜經司徒劉穆之墓遣使致􅀕焉後魏書曰李冲字思順髙祖時爲尚書僕射卒葬覆舟山近杜預冢髙祖之意也後車駕自鄴還洛經冲墓左右以聞髙祖卧疾望墳掩淚又曰傅永字脩常登北邙於平坦豦􅁬矛躍馬盤旋瞻望有終焉之志逺慕杜預近好李冲王肅欲附葬於墓遂買左右地數畒遺勑子叔偉曰此吾之永宅也禮系曰天子墳髙三雉諸侯半之卿大夫八尺士四尺天子樹松諸侯樹栢卿大夫樹楊士樹榆尊卑差也楚漢春秋曰惠帝崩吕太后欲爲髙墳使從未央宮坐而見之諸將諌不許東陽侯垂泣曰日夜見惠帝冢悲哀流涕無以死傷生也臣竊哀之於是太后乃止蕭方等三十國春秋曰晉義熈九年盗發故驃􅀐將軍卞壼墓剖棺掠之壼屍面如生兩手悉拳􅀲生逹背戰國䇿曰齊宣王見顔觸曰觸前觸亦曰王前王作色曰
