front:
  text: 太平御覽卷第六百七十一
  hash: sha256:7eee718623fbfc7aa66a941f6454cedec872d3d37ab10712776f8dac21ea687d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_671-1a}
body:
  text: 道部十三服餌下登眞隱訣曰太極眞人昔以神方一首傳長里先生先生姓薛自號長里周武王時人也先生以傳西域揔眞王君即金闕聖君之上宰也按䭀飯方受西梁眞人所傳時在大宛北谷今長里傳九轉乃周􅀄間是爲受服䭀飯三四百年後乃合此丹蓋司命劒經序也惣眞王君傳太元眞人即東卿司命茅大君也以漢武帝天漢三年受之時年四十八後又以付二弟并各賜成丹一劑司命旣傳二弟而不載於此當以王君命使付非正次傳授也自二君以後惟定籙與楊君使示許長史并􅁺乃至于今故漢晉之世諸學道人各六合服金液昇仙無言九轉則此眞人方下授以來未有營之者受經皆登壇盟誓割帛跪金爲敢宣之約敢不敢也前盟則金龍玉魚後代止布帛而巳違􅉀􅀒信三祖􅀗考於水官謂妄傳非人也傳授湏齋盟用金玉偃鐶以代剪髮㰱血之誓也欲合九轉先作神釡當用滎陽長沙豫章土釡謂瓦釡也昔黄帝火九鼎於荆山太清中經亦有九鼎丹法即是丹釡從來咸呼爲鼎用􅂖糠燒之當在名山深僻處臨水上作䆴屋屋長四丈廣二丈開南東西三户先齋戒百日乃泥作神釜釡成搗藥令計至九月九日平旦發火按合諸丹無用年歳好惡惟日月中有期限及􅁻㓙琅玕以四月七月十二月中旬間發火曲晨以五月中起火太清九丹起火雖無定月而云作六一五月七月九月爲佳自齋以始便斷絶人事令待丹成也合丹可將同志及有心者四五人耳皆當同齋戒齋起日先投􅀇酒五斛於所止之流水中􅀂地無流水當作好井亦投酒於井中以鎭地氣令齋者皆飲食此水也合丹法又令以青石凾盛好龍骨十斤沉于東流水中名曰青龍液飲食之以通水靈也取東海左頋牡蠣具郡白石脂雲母屑蚯蚓􅁟滑石礬凢六物等分太極眞人以太上天帝君鎭生五藏上經刻于太極紫微􅀇琳殿東殿墉上此乃上清八龍大書非世之學者可得悟了也南岳赤松子受而服之求其注釋於太極眞人又青童君云五公之􅃾鎭生五藏錬白易軀可以少顔色湏齊戒泥竈修錬也雲􅃾之味香甘異美強血􅀘骨守氣凝液鎭生五藏長養魂魄眞上藥也眞人云此愈於錬八石餌雲母也眞人錬形於太陽易皃於三官者此之謂也又曰太極眞人青精䭀飯方按彭祖傳云大宛有青精先生能一日九食亦能終歳不飢即是此矣眞上仙之妙方斷􅂖之竒靈也清虚眞人說霍山中有學道者鄧伯元王􅀇甫受服青精石飯吞日景之法能夜中書又仙人龍伯髙受服青䭀方醉亡隱處方臺又定録君命吿椽云次服䭀飯兼􅂖勿違益髓除患肌膚充肥又􅁺書告長史覔米藥來山染作飯􅂲草燥又長史與大􅁺書令餉小􅁺白米是染作飯凡此六事有書者也太極眞人青精十石䭀飯上仙靈方王君注解其後大書者是太素本經及西梁口訣墨注者是清虚王君所釋南岳魏夫人敷撰而使司命楊君書之五眞共成一法足稱靈妙矣上元寳經曰子食草木之王氣與神通子食青燭之津此之謂也此太素所傳太極所撰上眞靈仙之至要不同餘術也服䭀飯百害不能傷疾疫不能干去諸思念絶滅三尸耳目聦明行歩輕捷能隱化遁變長服益壽茅司命大君語二弟云冝服四扇散昔黄帝授風后却老還少之道也我昔授之於髙丘先生今以相付耳又語小弟保命君曰卿冝服王母四童散此反嬰之祕道也體中少損冝服此方以􅀘腦耳按小茅君服時巳一百二十歳也夫此二方皆妙法也當齋戒修制又曰裴君受支子元服食茯苓之法焦山蔣山人所􅀓能長生乆視修合之際湏謹宻齊戒裴君又受支子元胡麻之法蔣先生惟服此二方位爲仙眞此二方書與世少異裴君所祕用者驗而有實凢服伏苓胡麻之方甚衆此法旣眞人所經用眞人手所書記必當最神勝於諸法􅀂能常服仙道可期但患人服未覺甚益便不服之故少有尅終之効􅀂體先不虚損及年少之時當服伏苓􅀂年三十歳當服胡麻蔣先生日此二方是大有之要法長生神仙之祕寳也大有者謂委羽山洞天大有宫中之書法彼人當有服之者寳玄經云伏苓治少胡麻治老合以齊戒服以朝早卉醴華􅃾宻也百卉之花以成腴醴五公謂爲卉醴華英火精水寳火精伏苓也性􅀬而合火伏苓則其精矣水寳胡麻也性冷色黒而含津澤故謂之水寳和以爲一還精歸寳此之謂也裴君以年少時所用故服伏苓也清虚眞人年十二便受此方于時未必虧損所以云服伏苓夜視有光也二方同耳皆長年之竒方也􅀂合二物倍用宻共煎搗爲丸乃隹按青精方伏苓禁食酸此專用伏苓不必禁酸味又曰清虚王眞人授南岳魏夫人􅂖仙甘草丸方魏夫人少多病疾王君於脩武縣中􅁻夫人曰學道者當去病先令五藏充盈耳目聦明乃可存思服御耳按王君􅀄降眞之時是晉元康九年冬於汲郡脩武縣廨内夫人時應年四十八也夫人按而服之及隱影去世之時年八十三歳也此晉成帝咸和八年甲午歳則夫人從服藥巳來三十五年矣其間或不必常相續也了無復他患先􅐄都愈髪不白齒不落耳目聦明常月中書道家章符夫人旣爲女官􅀕酒故猶以章符示迹耳存思入室動百日數十日了不覺勞旣在俗世家事相亂欲脩齋研誦便託以入室也食飲通快四體充盈即甘草丸之驗也謂之􅂖仙方脾胃旣和則能食而不害膚充而精察起居調節無澁利之患矣食􅂖而得仙故謂之􅂖仙也此夲九宫右眞公郭少金撰集此方諸宫乆巳有之至郭氏更撰集次第序說所治耳猶如青精乃太素之法而今謂太極眞人也學仙道者冝先服之昔少金以此方授介象又授劉根張陵等數十人亦稱此丸爲少金丸冝齋戒修合並無毒無所禁食一年大益無責旦夕之効也俗人亦皆可服之又曰雲芝英不擇日而修合治三尸伏疾服食一劑則􅂖虫死則三尸枯􅀂道士固食􅂖者乃冝服也􅂖虫旣滅使人食􅂖而無病過飽而不傷去尸虫之藥甚多莫出於此昔修羊公稷丘子東方朔崔文子啇丘子但服此藥以恊􅂖而皆得仙也漢景帝及武帝求索東方朔脩羊公祕方終不傳又曰北海公㳙子名姓不顯青童君弟子􅂫林之師也少餌木黄精授守一􅀇丹之道在世二千八百年􅀇洲上卿􅂫林字子􅀇㳙子弟子也同紫陽之師濮陽曲水人年二十餘辭家學道後授三元眞一遊變人間又曰太清正一眞人張道陵沛國人夲大儒漢延光四年始學道至漢未於鳥鵠山仙官來降授以正一盟威之教施化領民之法號天師即眞誥云奉張道陵正一平氣者是也天師靈寳伍符序及太清金液丹序並佳筆別有傳巳行於世又曰服五石者亦能一日九食百􅀜流淳亦能終歳不飢還老反嬰遇食則食不食亦平眞上仙之妙方斷􅂖之竒靈也陶隱居注云雖一日九食而吸饗流變不爲滓終歳不飯而容色更鮮又云吸引之易感無貴於七曜修行之早成不過於九道保守之堅固莫踰於鎭生衛用之急防無起於渾神藥石之速効豈勝於青精祈拜之感孰賢於朝謝也又曰服五石鎭五藏不壞又曰九苞鳯腦太極隱芝丹鑪金液紫華虹英太清九轉五雲之漿東􅌡白香滄浪青錢髙丘餘精積石飛田能使人壽考琴髙先生受鎭氣益命之道又行􅀘腦反丹之法寳劒上終曰太極曲晨八景丸服之能飛行太虚又曰太虚眞人服四極雲牙也又曰飛龍雲􅃾方錬五石之華膏身有玉光能夜書此藥愈於八石之餌又曰服日月之華者欲得􅁪食竹笋竹笋者日華之胎也一名太明又欲􅁪食松葉松者木之秀也欲服日月當食此物氣以感運也太虚眞人云松栢者木之秀又曰眞人挹五方元晨之暉食九霞之精注曰謂清晨之元氣始暉之霞精曰陽數九謂之九霞夲文云神光内耀朱華外陳太上黄素經曰凢道士臨食常上饗太和太平經曰青童君採飛根吞日景空洞靈章云朝飡五雲氣夕噏三晨光又云食黄琬紫眞之􅏁眞誥曰崑崙有絳山石髓玉樹之實又曰上淸金闕靈書紫文採服隂華吞月精之法昔授之於大微天帝君一名黄氣陽精藏天隱月之經也又曰諸爲道者酒􅁏最爲大忌酒之爲物能使人識慮昏迷性懷亂僻案諸藥中惟四童丸云用酒亦可以水又木丸以酒和煎之其餘不云酒服餌又曰後漢左慈就司命乞丹砂得十二斤以合九華丹又曰治明期與後漢末人張正禮在衡山中受服王君虹景丹積三十餘年又曰趙廣信陽城人也魏末來剡山受服氣法守􅀇中之道後服九華丹又曰朱孺子呉末人入赤水山服菊花餌木又受西歸子入室存泥丸法三十三章又曰鄭景世與張重華俱晉􅀄人也在􅈞山受行守五藏含日法服胡麻及􅀇丹又曰馬明生臨淄人爲縣吏逐賊􅀍傷太眞夫人以靈元救得差後師安期生受服太清丹又曰王玄甫沛人與鄧伯元俱在霍山受服青精石飯吞日丹景之法又曰黄山訣云養性服食藥物不欲食䔉及石榴子道士自不可食列仙傳曰赤將子轝者黄帝時人不食五􅂖而食百草華又曰天仙偓佺者槐山採藥人也好食松實體生毛目方能飛行及走馬又曰務光夏時人耳長七寸好琴服蒲韮根又曰㳙子齊人好餌术著天地之經三十八篇後釣於澤得符鯉中隱宕山能致風雨􅁻伯陽九仙法淮南王少得其文不能解也其琴心三篇有旨焉又曰劉景前漢時人也從邯鄲張君受餌雲母知其􅁻㓙抱朴子曰修道餌藥及隱居入山不得入小法者多遇害萬物之老者悉能爲恠常試人耳惟不能於鏡中易其眞形耳是以古之入山道士皆以明鏡徑九寸巳上懸於背後則老魅不敢近人或有來試人者則當頋視鏡中是列仙山神者如人形是鳥獸邪􅀑亦見昔人有於蜀雲臺山石室中忽有一人着黄練單衣葛巾至其前於是人頋鏡中乃鹿也因叱而成鹿徑去又林慮山下有一亭每􅀫者或死或病常夜有十數人衣或白或黑或婦人男子後郅伯夷過􅀫明燭而坐夜半果見宻以鏡照之乃羣犬也伯夷乃執燭起詐誤以燭燼落其衣聞燎毛遂以刀刺殺一犬餘駭去每入山湏擇吉日抱朴子曰天地之情狀隂陽之􅁻㓙茫茫乎其亦難詳也吾亦不必謂之有又亦不敢保其無然黄帝吕望皆所信伏近代嚴君平司馬遷皆所據用而經􅀓有歴剛曰吉日有自來矣王者立太史官封拜置立有事宗廟社稷郊祀天地皆擇其日也按玉鈐經云欲入山不可不知遁甲之祕術而不爲人委曲說其事也太平御覽卷第六百七十一
