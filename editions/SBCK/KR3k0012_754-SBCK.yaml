front:
  text: 太平御覽卷第七百五十四
  hash: sha256:e7b83c6c5bc763fdb78d930a810ef58b12e39bcda700544fce459ab66ad3eb77
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_754-1a}
body:
  text: 工藝部十一博樗蒱塞􅂫則切藏鈎古作彄蹴鞠愽說文曰博局戯六箸十二碁也論語曰飽食終日無所用心難矣哉不有博弈者乎爲之猶賢乎巳家語曰哀公問於孔子曰吾聞君子不博有之乎孔子曰有之爲其二乗也公曰有二乗何爲不博孔子曰爲其兼行惡道也史記曰宋湣公與南宫長萬博爭公怒辱之曰吾始敬􅀂􅀂汝今子魯虜也長萬病此言遂以局殺湣公又曰魏王與信陵君博北境舉烽火言趙宼入界信陵君曰臣有客能知趙王隂事言趙王獵非宼也又曰劇孟好博多少年之戲又曰蔡澤說范睢曰君獨不觀夫博者乎或欲大投或欲出分功班固弈指田博懸於投不必在行崔駰曰投瓊也此皆君之所明知也漢書曰孝文帝時呉太子侍博爭道不恭皇太子以愽局提呉太子殺之或云提音抵抵擲也又曰吾丘壽王字子贑少年以善格五召待詔蘇林曰博之􅀋也孟康曰格者行忤相周故巳言各或曰塞法至立各不得故云格五也又曰陳遵祖父遂字長子宣帝微時與遂有故相隨􅀶弈數負債及宣帝即位遂稍遷至太守賜遂璽書曰制詔太原太守官尊禄厚可以償博債矣神仙傳曰中山衛叔卿服雲母得仙漢武使其子度丗往華山求之度丗望見父上有紫雲白玉爲床與數人博戲度出問父所與博者是誰曰洪崖先生許由巢父也􅁗記曰吕光破􅀛兹始獲鳩摩羅什光死子纉立戯弄羅什或共碁博及殺子云斫胡奴頭什曰不斫胡奴頭其胡奴斫人頭後纉弟越字胡奴果斬纉頭涼州記曰吕光太安二年􅀛兹國使至獻寳貨竒珍汗血馬光臨正殿設㑹文武愽戯西域胡曰諸愽戯取人牛馬財物者胡俗皆陪償述征記曰極西南端門外有石石色青而細修之作博碁以遺江東甚可珎玩西京􅄂記曰許博昌安陵人也善大博竇嬰好之常與居處其術曰方畔揭道張􅀇究屈髙髙􅀇究屈張又曰張道揭畔方方畔揭道張究屈􅀇髙髙屈究張居三輔兒誦之法用六箸或謂之究以竹爲之長六分或用二箸愽昌又作太愽經一篇仐丗傳之莊子曰臧與榖牧羊而俱亡其羊問臧奚事則挾䇿讀書問榖奚事則􅀶塞以遊事業不同其亡羊均也列子曰虞氏者梁之富人也登髙樓大路設樂飲酒擊慱樓上抱朴子曰南陽文氏求食入山見髙岩上有數人對慱淮南子曰善愽者不欲牟慱以不傷爲牟牟大也進也不恐不勝平心定意投得其齊齊得其適行由其理雖不必勝得籌必多韓子曰薛公之相魏昭侯也有陽胡蕃者於王甚重而不爲薛公薛公患之於是乃與之􅀶與之百金令與昆弟􅀶戲俄又益之二百金又曰齊宣王問匡倩曰儒者愽乎對曰博也者貴梟勝者必殺梟是殺其所貴也儒者以爲害義故不博尹文子曰愽者盡開塞之冝得用通之路揚子法言曰或問侍君子愽乎曰侍坐則聽言有酒則觀禮焉事愽乎說苑曰􅁗始皇時嫪毒驕奢後與帝左右􅀶爭行乃瞋目太呼又曰晉靈公驕奢造九層之臺謂左右曰敢諌者斬孫息孫息即荀息也聞之求見公曰子何能孫息曰臣能累十二􅀶碁加九鷄子於其上公曰吾少學未甞見也子爲寡人爲之孫息即正顔色定志氣以棊子置於下而加九鷄子於其上左右慴息靈公俯伏氣息不續公曰危哉孫息曰公爲九層之臺三年不成危甚於此風俗通曰漢武帝與仙人共􅀶其投石中馬蹄處于今尚在典略曰荊軻與魯勾踐􅀶争道勾踐怒而叱之軻去而逃婁春秋舊事曰倪寛爲漢司農卿與太子愽爭局犯罪而還遁甲經曰天一亭遊六行亭亭天一之貴神也戰􅃲博戯漁獵但可皆不可向也薛孝通譜曰烏曹作􅀶其所由來尚矣􅀟箭以象日月之照臨十二碁以象十二辰之􅄤次則天地之運動法隂陽之消息表人事之窮逹窮變化之幾微履謙謝則知冲謝以致福觀殺罰則知當路而速禍行其道則掎鹿有歸保其家乃瞻烏爰集隱顯藏用莫不合道龍潜鵲起率皆趣良足以諧暢至娯始恊妙賞者也魏曹植治子等讃曰齊彊接子勇節徇虎門之􅀶忽晏置釁矜而自伐輕死重分魏王粲彈碁賦序曰因行騁志通權逹理六􅀶是也晉李尤愽銘曰夫無用心􅀶弈猶賢方平處下有不邪偏樗蒱晉書曰桓􅀇見人有好園宅悉欲取之勒以樗愽而賭之􅀇微聞義軍起憂懼弗能寢食或曰劉􅁉等狂惑事必無成􅀇曰􅁉足爲一丗之雄加以果於用兵劉毅家無檐石之儲樗蒱一擲百萬何無忌劉牢之外生酷似其舅共舉大事徃無不成又曰􅁑洪字雉川性寡欲無所愛玩不知碁局幾道樗蒱齒名又曰王獻之年數歳嘗觀門生樗蒱曰南風不競門生曰此郎亦管中窺豹時見一班又曰武帝胡貴嬪帝嘗與之樗蒱爭道遂傷上指帝怒曰此固將種也對曰北伐公孫西拒諸葛非將種而何帝甚有慙色又曰謝鯤婿殷叡好樗蒱奪其妹裝物以還戯債劉湛謂謝弘微曰謝氏累代財産充殷君一朝戯債卿視而不言譬弃物江海以爲廉耳又曰陶偘字士衡見諸叅佐或以談戯廢事乃取其樗蒱博具悉以投于江乃曰樗蒱者牧豬奴戯耳又曰劉毅於東府聚樗蒱大擲一判應至數百萬餘人並黒犢以還唯劉􅁉及毅在後毅次擲得雉大喜褰衣繞床叫謂同座曰非不能盧不事此耳􅁉惡之因挼五木乆之曰老兄試爲卿荅旣而四子俱黒其一子轉躍未定􅁉厲聲喝之即成盧焉毅意殊不快然素黒其面如鐵色焉旣而乃和言曰亦知公不能以此見借又曰周顗之死也王敦坐有一叅軍樗蒱馬於博頭􅀍殺因謂敦曰周家弈丗令望而位不至公及伯仁將登而墜有似下官此馬伯仁顗之字也又曰慕容寳􅀄在長安與韓黄李拫等因讌樗蒱寳危坐整容誓之曰丗云樗蒱有神豈虚也哉􅀂富貴可期頻得三盧於是三擲三盧宋書曰何尚之時頗輕薄少好樗蒱旣長折節蹈道以操立見稱爲陳郡謝琨所知與之遊處齊書曰李安民擊鵲尾江城有功明帝大㑹新亭樓勞諸軍令樗蒱共賵安民五擲皆盧帝大驚目安民曰卿面方如田封侯狀也安民少時貧窶有一人從門過相之曰君後當大冨貴與天子交手共戯至是果驗後周書曰王思政雖􅀍任委自以非相府之舊毎不自安太祖曽在同州與羣公宴集出錦􅄢及􅄂綾絹數叚命將摴蒱取之物旣盡太祖又解所服金帶令諸人遍擲曰先得盧者即與之羣公將遍莫有得者次至思政乃歛容跪坐而自誓曰王思政羇旅歸胡蒙宰相國士之遇方願盡心效命上報知巳􅀂此誠有實令宰相賜知者願擲即爲盧􅀂内懷不盡神靈亦當明之便使不作也便當殺身以謝所奉辭氣慷􅁣一坐盡驚即拔所佩刀撗於膝上覽摴蒱拊髀擲之比太祖止之巳擲爲盧矣徐乃拜而受之江㽔別傳曰㽔年十一始學樗蒱祖母爲說徃事有以博弈破業廢身者於是即弃五木終身不爲戯拘朴子曰林盧山中有一亭其中有􅀑毎有宿者常有十許人衣􅂁或白或黒或男或女有王伯夷過􅀫而坐誦經夜有十餘人與伯夷對坐自持樗蒱伯夷宻以鏡照之乃羣犬也郭子曰恒公宣武也年少至貧嘗摴蒱失數百斛米齒旣惡意亦沮自審不復振乃請救於􅀽彦道桓具以情告􅀽欣然無忤便即俱去出門云我不但拔卿要爲卿破之我必作快齒卿但快喚旣戯􅀽形勢呼咀音恒咀相呵􅁣牡擲必盧雉二人齊叫敵家震懼喪氣俄頃獲數百萬愽物志曰老子入胡日作樗蒱焉俗說曰殷伯弟爲何無忌叅軍在潯陽與何共樗蒱得何百萬便住何大怒罵殷丗說曰温嶠位未髙時屢與揚州淮中賈客樗蒱毎輙不競甞一過大輸物盡戯屈無因得反與太尉􅁃亮友善嶠於舫中大喚􅁃亮卿可贖我􅁃即送直然後得還異苑曰潁川陳寂元嘉中晝忽有一足􅀑長三尺許爲寂驅使欲與鄰人樗蒱而無五木􅀑乃取刀斫庭中楊枝於户間作之即燒灼黒白雖分明但朴爾又曰昔有人乗馬出行於岫裏見二老公相對樗蒱遂下馬以䇿拄地而觀之自謂俄頃望視其馬鞭漼然巳爛顧瞻其馬鞍亦枯朽旣還無復親識一慟而絶􅁃翼集曰頃聞諸君有樗蒱過差者􅀄爲是政事閑暇以娯意耳故未有言也今知大相聚集漸以成俗聞之能不憮然繁欽威儀箴曰其有退朝偃息閑居操橩瞿營切橩博子弄碁文局樗蒱言不及義勝􅀒是圖塞蘇則切說文曰塞行碁相塞謂之塞齊書曰沈文季字仲逹呉興武康人也尤善塞用五子穆天子傳曰天子北入邴音與井公塞魏王朗塞􅀔曰籴所與遊處唯東萊徐先生素習九章能爲計數問可以代博弈者乎曰塞其次也乃試習其術以驚睡焉邊韶塞賦序曰余離羣索居無講誦之事欲學無友欲農無耒欲弈無塞欲博無楮問可以代博弈者乎曰塞其次也書曰始作塞者其明哲乎故其用物也約其爲樂也大藏鈎古作彄辛氏三􅁗記曰昭帝母鈎弋夫人手拳而有國色先帝寵之世人藏鈎法此也法其拳乎西京􅄂記曰戚夫人以百錬金爲彄環照見指骨上惡之以賜侍兒荆楚歳時記曰爲藏彄之戯辛氏以爲鈎弋夫人所起周鈎成公綏並作彄字藝經􅁃闡則作鈎字其事同也俗去此戯令人生離有禁忌之家廢不修也風土記曰臈日飲􅀕之後嫂嫗兒童爲藏彄之戯分二曹以效勝􅀒􅀂人偶即敵對人竒居冝切奇獨也即使竒人爲遊附或属上曹或属下曹名爲飛烏以齊二曹人數一彄藏在數十手中曹人當射常益切知所在一藏爲籌五籌爲一賭異􅁐曰晉海西公時有貴人㑹因藏彄欻有一手間在衆臂之中脩骨巨指毛色麤黒舉坐咸驚尋爲桓大司馬所誅舊傳藏彄令人生離斯驗深矣晉􅁃闡藏彄賦曰歎延夜之藏彄賞一時之戯望以道生爲元師以子仁爲佐相盛翁子藏彄賦序曰余以臘後要命中外以行鈎爲戲心恱其事故賦之云蹴鞠風俗通曰九毛謂之鞠郭璞三蒼解詁曰鞠毛丸可蹋戯史記􅂫􅁗傳曰臨淄民無不吹竽鼓瑟擊筑􅃲鷄走狗六博蹴鞠漢書曰東方朔云董君董偃也貴寵天下莫不聞郡國走馬蹴鞠客輻湊於董氏焉魏略曰孔桂字叔林性便妍好蹴鞠故太祖愛之毎在左右唐書曰姜皎􅀇宗即位召拜殿中少監數召入卧内侍宴私以后妃連榻間以擊毬常呼之爲姜七梁兾別傳曰兾好蹴鞠西京􅄂記曰成帝好蹴鞠羣臣以蹴鞠勞體非至尊所冝帝曰朕好之可擇似不勞者奏之家君作彈碁以獻帝大恱賜青羔裘紫絲履以服朝覲焉又曰太上皇徙長安居深宫悽悵不樂髙祖竊因左右問正以生平所好皆屠販少年􅃲鷄蹴鞠以爲忻仐皆無此故不樂也劉向別録曰蹴鞠者傳言黄帝所作或曰起戰國時記黄帝蹴鞠兵􅀔也所以練武士知有才也今軍事無事得使蹴鞠有書二十五篇㑹稽典録曰唐庠字漢序三國鼎跱㸦興金革士以弓馬爲務家以蹴鞠爲學於是名儒洪筆絶而不續太平御覽卷第七百五十四
