  text: 太平御覽卷第七百七十六
  hash: sha256:821da5fb46ffe9c0d72c1a8c74a0144714d20a08d916c7f2492ef7ab3f775e4e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_776-1a}
body:
  text: 車部五轍軸轂輻輞軛輨枕軾箱轙轊環釭轄錬輠當蓋轑杠覆荅枸較幰䋺茵轍左傳曰齊師敗績公將馳之曹劌居衛切曰未可下視其轍登而望之曰可矣遂逐齊師旣克公問其故對曰夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之又曰昔穆王欲肆其心周行天下特皆必有車轍馬跡焉漢書曰户牖冨人張􅀒有女五嫁而夫輙死人莫敢娶陳平欲得之􅀒至平家乃􅀒郭窮巷以席爲門然門多長者車轍􅀒歸謂子仲曰固有羙如陳平而長貧賤者乎卒與之女老子曰善行無轍迹莊子曰汝不知螳蜋怒臂當車轍不知不勝其任也又曰莊周貸粟于監河侯曰我將得邑金貸子三百周曰有中道而呼者周視車轍中有鮒魚焉子何爲耶對曰我東海之波臣也君豈有􅂛斗之水而活我哉餘具魚門中劉伯倫酒德頌曰有大人先生以天地爲一朝萬瑚爲湏􅁷日月爲户牗八荒爲庭衢行無轍迹居無室廬幕天席地縱意所如於齊又以葱靈奔宋遂奔晉適趙氏史記曰淳于髠曰狶膏􅁄軸所以爲滑也然不能運方穿漢書曰臨江閔王榮立爲太子廢爲臨江王㘴侵廟壖地爲宫上徴榮榮行祖於江陵北門旣上車軸折車廢江陵父老涕泣竊言曰吾王不反矣轂詩曰文茵暢轂駕我騏􅑓周禮曰轂也者以爲利轉也凢斬轂之道必矩其隂陽陽也者稹音奠理而堅隂也者䟽理而柔是故以火養其隂而齊諸其陽則轂雖敝不藃音耗轂小而長則祚鋤革切大而短則摰音致又曰行澤者欲短轂行山者長轂短轂則利長轂則安左傳曰楚子與􅀂敖戰臯許射汰輈以貫笠轂榖梁傳曰長轂五百乗緜地千里長轂兵車四馬曰乘春秋考異郵曰黄池之㑹􅅬薛扶轂魯衛參乗後漢書曰崔駰字亨伯涿郡安平人祖母師氏能通經學百家之言王莽寵以殊禮賜號義成夫人金印紫綬文軒丹轂顯於新代老子曰三十輻共一轂當其無有車之用桓譚新論曰楚之郢都車掛轂民摩肩市路相交號爲朝衣新而暮衣弊左太冲蜀都賦曰累轂疊跡叛衍相傾張平子東京賦曰乗軒並轂又曰䟽轂飛軨又公讌詩曰神飈接丹轂輕輦隨風移沈休文餞吕僧珎詩曰持轂二崤道楊斾九河隂輻易曰輿說輻夫妻反目說音脱周禮曰輪人爲輪斬三材必以其時三材轂輻牙輻也者以爲直指也望其輻欲其揱音消爾而纎也進而胝音視之欲其肉稱也參分其轂長二在外一在内以置其輻凢輻量其鑿深以爲輻廣而鑿淺則是以大枕雖有良工莫之能固鑿深輻小則是固有餘而強不足故竑音宏其輻廣以爲之弱則雖有重任轂不折參分其輻之長而殺音其一則雖有深泥亦弗溓讀如漢書曰李陵擊匈奴矢盡斬車軸而持之輞釋名曰輞羅也周輪其外周禮曰輪人爲輪斬三材必以其時三村轂輻牙也牙讀如迓也間或謂之輞牙也者以爲固抱也凡揉而首切牙外不廉而内不挫旁不腫謂之用火之善廉絶也挫所也腫廆也是故䂓之以眡其圜音貟也萬音矩之以眡其匡也又曰六分其輪崇以其一爲之牙圍叄分其牙圍而􅃮其二不􅃮其踐地者軛續漢書曰文虎伏軾龍道衡軛齊書曰呉興有項羽神護郡㕔事太守不得上太守到郡必湏祀以軛下牛李安民奉佛法爲太守到郡不與神牛着􅄚上㕔事又於㕔上入􅀜齊俄而牛死葬廟側今呼爲李公牛韓詩外傳曰武王伐紂到邢丘軛折爲三天雨三日不休武王召太公而問之曰未可伐乎太公曰不然軛折爲三者軍當分爲三也天雨三日欲洒吾兵也韓子曰鄭縣人得車軛不知其名問人人曰此車軛也俄得一人復問對曰此車軛也問者大怒曰曩者車軛今又車軛是何衆也遂與􅋐音劇釋名曰似人履又曰伏莵在軸上似之也輨音管說文曰輨軨轂端錔也枕䆁名曰枕撗在前􅀂卧床之有枕方言曰軫謂之枕郭璞曰車璞後横木周禮曰車軫四尺謂之一等戈祕音必六尺有寸旣建而地音移崇於軫四尺謂之二等六分其廣以一爲之軫圍參分軫圍去一以爲式圍五分其軫間以其一爲之軸圍軫之方象地也軾周禮曰參分軫圍去一以爲式圍參分式圍去一以爲較圍釋名曰軾式也式所以敬者左傳曰齊與魯戰于長勺齊師敗績公將馳之曹劌曰未可下視其轍登軾而望之曰可矣又曰子玉使闘勃請戰曰請與君之士戯君慿軾而觀得臣與寓目焉又曰叔山冉摶人以􅄬中車折軾晉師乃止又曰長狄喬如之首眉隱於軾漢書曰酈生慿軛軾下齊七十二城宋玉九辨云􅀝結軫􅀆太息涕潺湲􅀆霑軾箱方言曰箱謂之輫音斐詩曰睆彼牽牛不以服箱通俗文曰車箱曰較音角風俗通曰車一曰兩相與爲體也原其所以叅車獨言兩箱轅及輪兩而耦故稱兩耳轙音義宜二音爾雅曰載轡謂之轙郭璞曰車軛軛環轡所貫轊音衛說文曰轊車軸端也杜林說轂錔也方言曰車轊齊謂之鮑明逺蕪城賦曰當昔全盛之時車挂轊人駕肩􅌀音鄽閈檏地歌吹沸天環釋名曰游環在休馬背上驂馬之外轡貫之游移前却無常處爾雅曰與環謂之􅂢徐絹切郭璞曰着車衆環詩曰游環脅驅釭音江說文曰釭轂之鐵也方言曰車釭燕齊海代之間謂之鐹音戈或謂之錕自関而西謂之釭錕音衮續捜神記曰鄭茂病亡殯殮訖未得葬忽然婦及家人夢茂云巳未應死偶悶絶耳可開棺岀我燒車釭以熨頂頭如言乃活轄釋名曰轄害也車之急害也詩曰出􅀫干干飲餞于言載脂載牽還車言邁牽與轄同左傳曰諸侯賔至甸設庭燎㒒人廵宫車馬有所賔從有侍巾車脂轄隷人牧圄各贍其事漢書曰陳遵嗜酒每大飲賔客滿堂輙閉門取客車轄投井中雖有急終不能去蔡邕獨斷曰乗輿之車皆副轄副轄者施轄於外乃服設轄銘曰載馳非轄不行臨政誤教非賢不明張平子東京賦曰重輪貳轄䟽轂展軨潘正叔贈陸機詩云星陳夙駕載脂載轄鍊釋名曰錬簡也錬釭軸之間使不相忘輠胡果切釋名曰輠褁也褁軹也軹指見於轂頭禮曰叔孫武叔朝見輪人以杖􅀜轂而輠輪者以是有爵而后讀如前後之後也餘具輪事注中史記曰淳于髠齊人也愽聞彊學其諌說慕晏嬰之爲人然而秉意觀色爲務故齊人謂之炙輠輠者之盛膏者炙之不盡猶有餘流言髠之智不盡如炙輠當通俗文曰車當謂箳歩輕切篂郭林宗別傳曰􅀫仲琰爲部從事嘗柴車駕牛編荆爲當蓋周禮曰輪人爲蓋逹常圍二寸達常盍斗杠入丘中也上欲尊而宇半下庇軹五尺謂庇輪四尺謂之庇軫參分弓長而揉其一以爲尊之蓋之二十有八以象星也杠周禮曰輪人爲盖逹常圍三寸桯音楹盖杠也信其桯圍以爲部廣六寸部長二尺桯長倍之四尺者二杠長八尺謂逹常以下也加逹常二尺則盖髙一丈也覆笭音岑釋名曰笭撗在車前在織竹作之空笭笭也廣雅曰覆笭謂之辟枸心廣雅曰從下枸軸也通俗文曰軸限者謂之枸較周禮曰參分式圍去一以爲較圍去一以爲軹圍釋名曰其較重卿所乗也幰許偃切通俗文曰張布曰幰儀制令曰諸車一品青油纁道幰朱裏朱絲絡網三品以上青道幰朱五品以上青徧幰碧裏六品以下皆不得用幰鹵簿令曰安車紫油通幰紫油纁朱裏四望車青油通幰青油纁並朱絲絡網后及皇太子車幰並准此風土記曰周禮以拂拭車一義謂施嚴惟幰潘岳籍田賦曰微風生於輕幰纎埃起乎朱輪潘尼書曰朝從長塗暮拪所集歸雲乗幰浮悽風㝷惟入䋺釋名曰䋺道也在後道曰使不得却縮也王隱晉書曰山濤爲尚書有人題曰閣中有大牛王齊鞅裴揩鞦和嶠踖踧不敢休茵釋名曰茵車中所㘴也用虎皮有文采詩曰隂靷音沃續文茵暢轂駕我騏􅑓音注漢書曰邴􅁻爲丞相馭吏嗜酒數逋蕩逋亡也蕩放也謂亡其所供之職而浙放也常從􅁻出醉歐丞相車茵上西曹主吏白欲斥之􅁻曰以醉飽之失去士使此人復何所容西曹但忍之此不過汚丞相車茵爾遂不去也太平御覽卷第七百七十六
