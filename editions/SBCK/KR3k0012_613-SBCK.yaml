front:
  text: 太平御覽卷第六百十三
  hash: sha256:2e65fef176b436d7a4617e518c71a58d0cd64490efdc596cd93f43d26a5f3d3b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_613-1a}
body:
  text: 學部七教學禮記王制曰天子命之教然後爲學小學在公宫南之左太學在郊又學記曰古之教者家有塾黨有庠術有序國有學術當爲遂周禮五百家爲黨万二千五百家爲遂也一年視離經辨志三年視敬業樂群五年視􅀶習親師七年視論學取友謂之小成九年知􅀋通逹強立而不反謂之大成又曰學然後知不足教然後知困知不足然後能自反也知困然後能自強也又曰君子知至學之難易而知其美惡然後能􅀶喻能􅀶喻然後能爲師能爲師然後能爲長能爲長然後能爲君又曰大學之法禁於未發之謂豫當其可之謂時不陵節而施之謂孫相觀而善之謂摩此四者教之所由興也發然後禁則扞格而不勝時過然後學則勤苦而難成雜施而不孫則壞亂而不修獨學而無友則􅀌陋而寡聞燕朋逆其師燕譬廢其學此六者教之所由廢也又曰學者有四失教者必知之人之學也或失則多或失則寡或失則易或失則止此四者心之莫同也知其心然後能救其失也又曰君子之教喻也道而弗牽強而弗抑開而弗逹道而弗牽則和強而弗抑則易開而弗逹則思和易以思可謂善喻也又曰教也者長善而救其失者也善歌者使人繼其聲善教者使人繼其志其言也約而逹微而臧罕譬而喻可謂繼志也又曰太學始教皮弁􅀕菜示敬道也宵音小雅􅀠三官其始也入學鼓篋遜其業也檟楚二物收其威也未卜禘不視學游其志也時觀而不語存其心也㓜者聽而不問學不躐等也此七者教之大倫也尚書􅀃命下曰惟學遜志務時敏厥修乃來允懷于兹道積于厥躬惟斆學半念終始典于學厥德修罔覺周禮師氏以三德教國子一曰至德以爲道本二曰敏德以爲行本三曰孝德以知逆惡􅂖梁傳昭公曰子旣生不免於水火者母之罪也羇貫成童不就師父之罪也羇貫謂交午剪髪以爲飾成童八歳巳上者也就師學問而無方心不通師之罪也漢書曰景帝未文翁爲蜀郡守修起學官吏民大化蜀地至於京師者比齊魯焉至武帝乃令天下皆立學校自文翁爲之始又曰踈廣字仲翁東海蘭陵人少好學明春秋居家教授學者逺至又曰韋賢子􅀇成明經至丞相鄒魯諺曰遺子黄金滿嬴不如一經東觀漢記曰永平九年詔爲四姓小侯置學又曰樊准見當丗學者少懼先王道術陵遟乃上䟽曰光武受命中興之􅀄群雄擾於兾州旌旗亂於大澤然猶投戈講學息馬論道孝明皇帝尤垂意於經學即位刪定乖疑稽合圖䜟封師太常桓榮爲􅀜内侯親自制作五行章句每享射禮正坐自講諸儒並聽四方欣欣是時學者尤盛冠帶縉紳遊辟􅾰觀化者以億計後漢書曰樊儵字長魚刪定公羊嚴氏春秋丗號樊侯教學門徒三千餘人又曰延篤字叔堅南陽犨人能著文章有名京師後以病免歸居家授教不倦又曰任安字定祖學圖䜟究竟其術還家教授諸生自逺而至又曰張興字君上拜太子少傅顯宗數訪問經術聲稱著聞弟子自逺至者著録且萬人又曰樊英字季齊善風角占筭河洛七緯推歩災異隱於壷山之陽受業者四方而至又曰鄭􅀇弟子河内趙啇等自逺方至者數千人又曰孫期家貧事母至孝牧豕大澤中賣之以奉供養逺方人從遊學者皆執經追於澤畔又曰歐陽歙爲司徒坐在汝南􅂍下獄中濟隂曹重字伯山從歙受尚書門徒三千人又曰丁恭字子然學義精明遷少府諸生自逺方至者數千人當丗稱爲大儒又曰杜撫字叔和少有髙才定韓詩章句後歸郷里教授沉静樂道弟子千餘人又曰劉昆王莽丗教授弟子􅁪五百餘人毎春秋饗射常備列典儀以素木瓠葉之爲俎豆桑弧蒿矢以射莬首又曰馬融常在髙堂施綘紗帳前授生徒列女樂弟子相次傳授鮮有入其室者晉中興書曰范寧字武子解􅄄爲餘抗令興學校養生徒㓗巳志德行之士莫不來宗自中興巳來崇學敦教未有如寧者也崔鴻十六國春秋後秦録曰涼州胡辯者河西大儒也前秦建元末東徙洛陽隨講受弟子千有餘人関中後進多赴之姚興勑関尉曰諸生諮訪道義修巳厲身往來出入勿拘常限於是學者咸勸儒業盛矣國語曰晉文公學讀書於臼季三日臼季臣曰吾不能行也咫咫咫尺間聞則多矣對曰然而多聞以待能者不猶愈乎使能者行之猶愈於不學尚書大傳曰古之帝王者必立大學小學使公卿之太子大夫元士之適子十有三年始入小學見小節焉踐小義焉年十五入太學見大節焉踐大義焉入小學知父子之道長㓜之序入太學知君臣之義上下之位墨子曰墨子勸弟子學曰汝􅀂學吾當仕汝弟子學朞年就墨子求仕墨子曰汝不聞魯人乎昆弟五人父死長子􅄝酒不肯預葬其四弟曰尓􅀂送葬吾當爲汝沽酒葬訖就弟求酒四弟曰子葬子父豈獨吾父乎吾恐人􅀏子故欺子以酒耳今子不學人自􅀏子故勸子也孫卿子曰逹師之教使弟子安焉樂焉往焉游焉肅焉藏焉嚴此六者得其學則邪僻之道塞矣楊子曰􅀶學者所以求爲君子也求而不得鮮矣未有不求而得之者也夫觀書者譬猶登東岳而知丘陵之嵔㠥也浮滄海而知江河之不廣也見日月而知衆星之照微也仰聖人而知衆􅀃之少觀也尸子曰學不倦所以治巳也教不厭所以治人也夫蠒舎而不治則腐蠧使上女繰之爲美錦大君朝而服之身者蠒也舎而不治則知行腐蠧使賢者教之以爲丗士則天下諸侯莫敢不敬任子曰學所以治已教所以治人不勤學則無以爲智不勤教無以爲仁郭林宗別傳曰㤗以有道君子徴同邑宋子俊勸使往㤗遂辭以疾闔門教授鍾㑹母傳曰夫人明於教訓㑹雖童稚勤見䂓誨年四歳受孝經十五入太學謂㑹曰學猥則倦倦則意怠吾懼汝之怠故以漸訓汝今可以獨學矣王粲儒史謂曰古者八歳入小學學六甲五方書計之事十五入大學學君臣朝廷王事之紀然則文法典蓺其存於此矣虞􅄎厲學曰文學諸生皆冠帶之流年盛志美如渉學庭講脩典訓此成大業立德之基也夫聖人之道淡而寡味故學者不好也及至期月所觀弥􅀶所習弥多日聞所不聞日見所不知然後心開意朗敬業樂群忽然不覺大化之陶已至道之入神也夫學者不患才不及而患志不立也太平御覽卷第六百一十三
