front:
  text: 太平御覽卷第二百八十四
  hash: sha256:8561494349f7cd07a5809f99fea403c6094cde712be41f75c3e5437d6cd86113
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_284-1a}
body:
  text: 兵部十五機略三後漢書朱儁傳曰趙弘據宛城儁因急擊弘斬之賊餘帥韓忠復據宛拒儁儁兵少不敵乃張圍結壘赴土山以臨城内因鳴鼓攻其西南賊悉衆赴之儁自將精卒五千掩其東北乘城而入忠乃退保小城惶懼乞降司馬張超及徐璆􅁗頡皆欲聽之儁曰兵有形同而􅀔異者􅁗項之際人無定主也故賞附以勸來耳今海内一統唯黄巾造㓂納降無以勸善討之足以懲惡今􅀂受之更開逆意賊利則進戰鈍則乞降縱敵長宼非良計也因急攻連戰不尅儁登土山望之顧謂張超曰吾知之矣賊今外圍周固内營逼急乞降不受欲岀不得所以死戰也萬人一心猶不可當況十萬乎其害甚矣不如徹圍并兵入城忠見圍解􅀔必自出自出則意散易破之道也旣而解圍忠果出戰儁因擊之大破之乗勝逐北數十里斬首萬餘級忠等遂降又曰董卓將三萬討先零羌卓於望垣北望垣縣屬天水郡爲羌胡所圍糧食乏絶進退逼急乃於所渡水中僞立􅋣以爲捕魚而潜從􅋣下過軍續漢書􅋣字作堰北賊追之决水巳􅀷不得渡時衆軍敗退唯卓全師而還又曰臧宮將兵屯駱越越人謀叛從蜀宮兵少力不能制㑹屬縣送委輸車數百乗至宫夜使鋸斷城門限令車迴轉岀入至旦即越人候伺者聞車聲不絶而門限斷相告以漢兵大至其渠帥乃奉牛酒以勞軍營宫陳兵大㑹擊牛釃酒饗賜慰納之又曰蜀有妖巫維汜弟子單臣傅鎮等復妖言相聚入原武城維或作侯刧吏人自稱將軍於是遣臧宮將北軍及􅀺陽營數千人圍之賊榖食多數攻不下士卒死傷帝召公卿諸侯王問方略皆曰冝重其購賞時顯宗爲東海王獨對曰妖巫相刧􅀔無乆立其中必有悔欲亡者但外圍急不得走耳冝小挺緩挺解也令得逃亡逃亡則一亭長足以禽矣帝然之即勑宮撤圍緩賊賊衆分散遂斬臣鎮等又曰岑彭南擊􅁗豐與其大將蔡宏拒彭等於鄧數月不得進帝怪以讓彭彭懼於是夜勒兵馬申令軍中使明旦西擊山都山都縣名屬􅀯陽郡乃緩所􅀗虜令得逃亡歸以告豐豐即悉其軍西邀彭彭乃潜兵渡􅃆水擊其將張楊於阿頭山大破之沔水源出武都東狼谷中即漢水之上源也阿頭山在襄陽從川谷間伐木開道直襲􅀺丘擊破諸屯兵豐聞大驚馳歸救之彭與諸將依東山爲營豐與蔡宏夜攻彭彭預爲之備出兵逆擊之豐敗走追斬蔡宏又皇甫嵩傳曰梁州賊王國圍陳倉復拜嵩爲左將軍督前將軍董卓各率二萬人拒之卓欲速進赴陳倉嵩不聽卓曰智者不後時勇者不留決速救則城全不救則城滅全㓕之􅀔在於此也嵩曰不然百戰百勝不如不戰而屈人之兵是以先爲不可勝以待敵之可勝不可勝在我可勝在彼彼守不足我攻有餘孫子之文有餘者動於九天之上不足者䧟於九地之下􅀇女三宫戰法曰行兵之道天地之寳九天九地各有表裏九天之上六甲子也九地之下六癸酉也子能順之萬全可保今陳倉雖小城守固備非九地之䧟也王國雖強而攻我之所不救非九天之􅀔也夫􅀔非九天攻者受苦害䧟非九地守者不拔國今巳䧟受害之地而陳倉保不拔之城我可不煩兵動衆而取全勝數十里􅀔如風􅀨所至皆奔散初述聞漢軍在平曲故遣大軍逆之及漢兵至武陽出延岑軍後蜀地震駭又曰馬援爲隴西太守發歩􅀐三千人擊先零羗將其妻子輜重移阻於允吾谷允吾音銳牙援仍潜行間道掩赴其營羗大驚壞復逺徙唐翼谷中援復追討之羗引精兵聚北山上援陳軍向山而分遣數百騎繞襲其後乗夜放火擊鼓叫譟虜遂大潰又曰馮異與鄧禹率車􅀐將軍鄧弘等議攻赤眉異曰賊衆尚多可稍以恩信傾難卒用兵破也上今使諸將屯澠池要其東而異擊其西一舉取之此萬成計也禹弘不從弘遂大戰移日赤眉佯敗弃輜重而走車皆載土以豆覆其上兵士飢爭之赤眉引還擊弘弘軍大亂異與禹合兵救之赤眉小却異以士卒飢倦可且休禹不聽復戰大爲所敗又曰河南賊張歩據地漢將耿弇討之壁於臨淄歩與其三第藍弘壽及故大彤渠帥重異等兵重姓異名也號二十萬至臨淄大城東將攻弇弇先出淄水上與重異遇突騎欲縱弇恐挫其鋒令歩不敢進固示弱以盛其氣乃引歸小城陳兵於内歩氣盛直攻弇營與弇禆將劉歆等合戰弇􅂛王宫壞臺望之臨淄夲齊國所都即齊王宫中壞臺也視歆等鋒交乃自引精兵横交突歩陣於東城下破之又曰赤眉青犢十餘萬衆並在射犬光武引兵將擊之耿純軍在前去衆營數里賊忽夜攻純􅀨射營中士多傷純勒部曲堅不動選敢死千人俱持強弩各傅三矢使銜枚間行傅着繞出賊後齊聲呼譟強弩並發賊衆驚走追擊之遂破又曰光武遣將王霸馬武擊河南賊周建於垂惠賊帥􅂫茂將五校兵四千餘人救建而先遣精􅀐遮擊馬武軍粮武徃救之建從城中出兵夾擊武武恃霸之援戰不甚力爲茂建所敗武軍奔過霸營大呼求救霸曰賊兵盛出必敗努力而巳閉營堅壁軍吏皆爭之霸曰茂兵精銳其衆又多吾吏士心恐而馬武與吾相恃兩軍不一此敗道也今閉營固守示不相援賊必乗勝輕進馬武無救其戰自倍如此茂建衆疲勞吾承其弊乃可尅也茂建果悉出兵攻武合戰良乆霸軍中壯士路潤等數十人斷髮請戰霸知士心銳乃開營後出精􅀐襲其背茂建前後受敵驚亂敗之又曰西域莎車􅀦王不供將兵長史班超發于闐䟽勒諸國二萬五千人擊之莎車求救􅀛兹􅀛兹王遣將發温􅀫姑墨尉頭合五萬人助之超召諸將及于闐䟽勒王議曰兵少不敵莫如各解散去于闐從此東歸長史亦從此西歸夜半聞聲鼓便發衆皆以爲然乃隂緩所擒得生口歸以超言告􅀛兹􅀛兹聞之喜使其將以萬騎於西界遮超温􅀫王將以千􅀐於東界遮于闐王人定後超密令諸司馬勒兵至鷄鳴馳赴莎車草營掩覆之胡皆驚走斬首五千級莎車遂降又曰光武遣將鄧禹西征至河東禹擊更始將王匡禹軍不利戰罷明日癸亥匡以六甲窮日不出禹因得更整兵勒衆明晨匡悉軍出攻禹禹令軍中無得輙動旣至營下因傳發諸將鼓而並進大破之又曰馮異將數萬人與賊約期㑹戰使壯士變服與赤眉同伏於道側明日赤眉使萬人攻異前部異裁出兵以救之裁少出兵所以示弱賊見􅀔弱遂悉衆攻異異縱兵大戰日􅉴賊氣衰伏兵卒起衣服相亂赤眉不復識別衆遂驚潰追擊大破於崤厎又曰岑彭將兵三萬餘人南擊􅁗豐抜黄郵豐與其大將蔡宏等拒於鄧數日不得進彭夜勒兵馬申令軍中使明早西擊山都乃緩所􅀗虜令得逃亡歸以告豐豐即悉其軍西邀彭彭乃潜兵度􅃆水擊其將張揚於河頭山大破之從川谷間伐木開道直襲􅀺丘破諸屯兵豐聞大驚馳歸救之彭依東山爲營豐與蔡宏夜攻彭彭先爲之備岀兵逆擊之豐敗走又曰張歩據齊地漢將耿弇征之歩將費邑分遣其弟敢守巨里弇進兵先脅巨里使多伐樹木揚言以填塞坈塹數日有降者言邑聞弇欲攻巨里謀來救之弇乃嚴令軍中趣脩攻具宣勑諸部後三日當悉力攻巨里城隂緩生口令得亡歸歸者以弇期吿邑邑至日果自將精兵三萬餘人來救之弇喜謂諸將曰吾所以脩攻具者欲誘致邑耳今來適其所求也即分三千人守巨里自引精兵上崗坂乗髙合戰大破之臨陣斬邑旣而收首級以示巨里城中兇懼兇許拱切費悉衆亡歸又曰將軍耿秉與竇固合兵一萬四千􅀐擊車師有後王前王前王即後王之子其庭相去五百餘里秉議先赴後王以爲并力根夲則前王自服固計未決秉􅁬身而起衆軍不得巳遂進並縱兵鈔掠斬首數千級收馬牛羊十餘萬頭後王安得震怖從數百􅀐出迎秉降又曰􅀽紹曹公相持於官渡俎授􅀃紹俎側居切可遣蔣竒別爲支軍於外以絶曹公之路紹不從許攸進曰曹公兵少而悉師拒我許下餘守􅀔必空弱􅀂分遣輕軍星行掩襲許伏則操爲成擒如其未潰可令首尾奔命破之必也紹又不用竟爲曹公所敗又曰曹公征河北師次頓兵黒山賊于毒等攻東武陽曹公引丘西入山攻毒等夲屯毒聞之弃武陽還魏武要擊於内黄大破之又曰曹公征張繡於穰荀攸曰繡仰食於劉表於乆而􅀔必離今緩之可誘致急之則相救公不從與繡戰表果救之公敗歸又曰青徐黄巾三十萬衆入渤海界欲與黒山合公孫瓉率歩􅀐二萬人逆擊於東光南大破之斬首二萬餘級賊弃輜重數萬兩奔走度河瓉因其半濟薄之賊復大破死者數萬太平御覽第二百八十四卷終
