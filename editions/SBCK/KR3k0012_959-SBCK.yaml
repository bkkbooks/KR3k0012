front:
  text: 太平御覽卷第九百五十九
  hash: sha256:bba615710a2639a2fe6fba4404f637ef66beeeb6135a46fa1d353b5a5a2ecbf4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_959-1a}
body:
  text: 木部八楛靈壽樗荆􅁄君子長生萬年黃蘖支子無患栟櫚楛尚書禹貢曰荆州厥貢惟菌簵楛注曰楛中矢榦皆出雲夢之澤也毛詩旱麓曰瞻彼旱麓山足也榛楛濟濟陸機毛詩䟽義曰榛楛似荆而赤葉似著上黨人篾以爲牛筥箱器又屈以爲􅁫故上黨調問婦人欲買赭不曰鼃中自有黄土買􅁫不曰山中自有楛又文賦曰彼榛楛之勿剪亦􅂪榮於集翠靈壽漢書孔光傳曰賜太師靈壽杖孟康曰扶老杖也服䖍曰靈壽木名也似竹有節長不過八九尺山海經曰廣都之野靈壽實華樗爾雅曰栲山樗栲似樗色小白生山中亦􅀋􅃮樹毛詩我行其野曰我行其野蔽芾其樗惡木也陸機毛詩䟽義曰蔽芾其樗樗樹及皮皆似􅃮青色耳其葉臭莊子惠子曰吾有大樹人謂之樗其本擁腫不中繩墨小枝拳曲不中䂓矩立之途匠者不顧今子之言大而無用衆所同去莊子曰何不樹於無何有之郷廣莫之野逍遥乎寢卧其下風俗通曰嘉平中有兩樗一􅀫長丈餘作人狀頭目宛然河洛記曰洛陽北山謂之邙山其上無大樹大業都城之北嶺上有古樗樹不知其來早晩婆娑周廽四五畒巳來在伊闕正南相當越公等將建都城之曰據此樹以爲南北定准嫌樗木名惡號曰婆娑羅樹矣荆春秋運斗樞曰玉衡星散爲荆廣雅曰楚荆也牡荆蔓荆也廣志曰赤莖大實者名曰牡荆又有山荆毛詩漢廣曰翹翹錯薪言刈其楚楚荆也又綢繆曰綢繆束楚三星在户左傳昭公曰伍舉入鄭聲子將如晉遇之於鄭郊班荆相與食而言復故班布也而荆坐地共議之史記曰廉頗肉􅃝􅀒荆因賔客至藺相如門謝罪卒與爲刎頸之交漢書曰淮南王安謀反伍􅀍諌曰昔子胥諌吴王云臣今見麋鹿遊姑􅂫之臺臣今亦將見宫中生荆􅁄露沾衣也東觀漢記曰尹勤治韓詩身牧豕事親至孝無有交遊門生荆􅁄後漢書曰鮑永爲魯郡太守時董憲別帥彭豐虞休皮常等各千餘人稱將軍不肯下頃之孔子闕里無故荆􅁄自除從講堂至于里門永異之謂府丞及魯令曰方今危急而闕里自開斯豈夫子欲令太守行禮助吾誅無道耶乃㑹人衆修郷射之禮請豐等共㑹觀視欲因此擒之豐等亦欲圖永乃持牛酒勞饗而潜挾兵器永覺之手格殺豐等擒破黨與帝嘉其略封爲􅀜内侯晉書曰索靖拜酒泉太守惠帝即位賜爵􅀜内侯有先識逺量知天下將亂指洛陽宫門銅駞歎曰㑹見汝在荆􅁄中耳老子曰師之所處荆􅁄生焉周景式孝子傳曰古有兄弟忽欲分異出門見三荆同株接葉連隂歎曰木猶欣然聚况我而殊哉遂還爲雍和一曰田真克弟神仙傳曰吴有徐隨居丹徒左慈過隨門下有􅀫客車六七乗欺慈云徐公不在慈去客皆見牛在楊樹杪車轂中皆生荆木長一二丈客懼入報隨隨曰此左公遣追之客逐慈叩頭謝客還見牛在故地無荆木也顧微廣州記曰撫納縣出金荆禮弓矢圖曰楚焞士敦反以荆爲之燃以灼正以荆者凢木心圎荆心方也地理志曰荆楚本多材因名地焉廣州記曰白荆堪爲履紫荆堪爲牀淮南萬畢術曰南山牡荆指病自愈節不相當有月暈時剋之杜寳大業拾遺録曰五年南方置北景林邑海隂三郡北景在林邑􅀯大海中與海隂接境其地東西一千餘里南北三百餘里海水四絶北去大岸三百餘里或云馬援鑄柱尚存地暑􅀬多大林木髙者數百㝷有金荆生於髙山峻阜大者十圍盤屈瘤蹙文如羙錦色艶於眞金中夏時有於海際得之工人數用甚精妙貴於沉檀􅁄毛詩湛露曰湛湛露斯在彼􅂎􅁄又黄鳥曰交交黄鳥止于􅁄又墓門曰墓門有􅁄斧以斯之周書曰太姒夢見商之庭産􅁄周禮秋官上曰朝士掌建􅀖外朝之法左九􅁄􅀌卿大夫位焉右九􅁄公侯伯子男位焉鄭玄曰樹􅁄以爲位者取其赤心而外刺象以赤心三刺也左傳昭公曰竪牛奔齊孟仲之子殺之投其首於寜風之􅁄上春秋元命苞曰樹􅁄聽訟其下者􅁄赤心有刺言治人者原心不失其赤實也後漢書曰馮異朝京師引見帝謂公卿曰是我起兵時主簿也爲吾披荆􅁄定􅀜中又曰仇覽字季智一名香陳留考城人也時考城令河内王渙政尚嚴猛聞覽以德化人署爲主簿後渙謝遣曰枳􅁄非鸞鳯所捿百里豈人賢之路今日太學曳長􅅂飛名譽皆主簿後耳以一月俸爲資勉卒景行晉書曰劉琨至并州荆􅁄成林犲狼滿道琨剪除荆􅁄収葬枯骸造府朝建市獄冦盗牙來掩襲甞以城門爲戰􅂣百姓􅀒楯以耕屬鞬而耨琨撫循勞來甚得物情又曰祖逖在河南公私豐贍士馬日滋方當推鋒越河掃淸兾朔㑹朝廷將遣戴􅀂思爲都督逖以􅀂思是吴人雖有才望無弘致逺識且巳剪荆􅁄収河南地而􅀂思雍容一旦來統之意甚怏怏又曰石季龍大饗羣臣於太武殿佛圖澄曰殿乎殿乎􅁄子成林將壞人衣龍殿石有􅁄生冉閔小字􅁄奴時龍養爲巳子又曰崔洪靖厲骨鯁爲尚書左丞時人爲之語曰叢生􅁄刺來自愽陵在南爲鷂在北爲鷹又曰顧愷之􅀞鄰女象以􅁄針釘之又曰姚萇符登師於渥源盡俘其衆乃掘符堅屍鞭撻荐之以􅁄坎土而埋之宋書曰􅀽淑上太祖書曰所謂捷鳥於烈火之上養魚於叢􅁄之中北齊書曰世祖爲後主擇師傅趙彦􅀷進馬敬德入爲侍講其妻夢猛獸將來向之敬德走超叢􅁄妻伏地不敢動敬德占之曰吾當得大官超􅁄過九卿也爾伏地夫人也隋書曰流求國居海島之中土人所居曰波羅檀洞壍柵三重環以流水樹􅁄爲藩韓子曰宋人爲燕王以􅁄刺之端爲沐猴者使王必三月齊而後觀之右御冶工謂王曰臣聞人主無十日不燕今王不能乆齊故以三月爲期也􅁄刺至小安可削乎王必察之王囚而問之果無有乃殺之冶人謂王曰士有虚名多􅁄刺之􅀃也吕氏春秋曰􅀥􅁄之有也裘狐之有也食􅁄之􅀥裘狐之皮先王固用非其有而巳有之湯武一日而盡有夏啇之地􅁗子曰踰枳􅁄之籬則有絓枉之患登椒桂之圃則有榮華之芳陳留􅂄舊傳曰魏尚􅀍繫詔獄有雀集獄􅁄上尚占曰夫􅁄樹者中心赤外有刺象我言有刺而赤心之至誠李嘗藥録曰􅁄實是􅀥針丗人用門冬苗代之非其真也廣五行記曰隋文帝開皇末年代州人姓王仕爲驃􅀐將軍性好畋獵所殺無數有五男無女後有一女子端正􅀂􅀞見者皆竒之父母特加鍾愛郷里爭爲作好衣而與之女年七歳一旦失之􅀄疑鄰里戲藏之㝷訪終不見者諸兄逺覔去家三十餘里於􅁄中見之欲就抱取驚走馬追不及兄弟以十餘􅀐圍之而口中唯作兎聲抱歸家不能言而身體盡􅁄所傷母爲挑之得刺盈掬不食而死唐新語曰吕太一爲户部貟外郎户部與吏部鄰司吏部移牒令墻宇悉立􅁄以防令史交通太一牒報曰眷彼吏部銓綜之司當湏簡要清通何必堅籬挿􅁄省中賞其俊拔楚辭曰甘棠枯於豐草号藜􅁄樹於中庭君子晉宫閣名曰華林園君子樹三株廣志曰君子樹似檉松曹爽樹之於庭長生洛陽記曰明光殿前有長生木樹二株鄴中記曰金華殿後有石虎皇后浴室種􅀟長生樹丗謂之西王母長生樹萬年晉宫閣名曰華林園有萬年樹十四株謝􅀇暉詩曰風動萬年枝黃蘖􅀃文曰蘖黃木也永嘉郡記曰青田出枯楊所經山路左側木則黄蘖爲林草便黄連覆地土人徃伐黄蘖者皆有酒食禱祀禱祀􅀂有違失山神意二藥輙化爲異物不可復得淮南萬畢術曰蘗令面恱取蘗葉三寸土􅋎三枚大􅀥七枚膏和塗面不得四五日立恱矣先以湯洗靣乃傅藥抱朴子曰黄蘗芝草者千歳黄蘗根下有如三斛器去本株三丈細根相連大如縷末服之盡一丈則地仙支子漢書貨殖傳曰巵茜千石亦比千乗之家地鏡圖曰望氣見人家黄氣者支子樹也晉令曰諸官有秩支子守護者置吏一人晉宫閣名曰華林園支子五株遊名山志曰樓石山多支子也本草經曰支子一名木丹葉兩頭尖如樗蒲形剥其子如蠒而黃赤葛洪治霍亂轉筋方曰焼支子二枚末服之立愈無患纂文曰無患木名也一名曰糅女放反婁實可去垢崔豹古今注曰程雅問櫨木名曰無患何也荅曰昔有神巫曰眊音餌能以符劾百􅀑得􅀑則以此木爲棒棒殺之丗人相傳此木爲衆􅀑所畏競取此木爲器以厭却邪魅故號曰無患卞敬宗無患枕讃曰爰兹素朴名爲吉姑匠人斯製以獻君子栟櫚廣雅曰栟音并櫚㯶也吴志曰孫權討黄祖祖横兩􅂪衝保守􅃆口以栟閭大紲繫石爲釘齊書曰髙帝討晉安王時朝廷器甲皆充南討帝軍容寡闕乃編楥皮爲馬具裝折竹爲􅀉生夜舉火進軍賊望見恐懼未戰而走梁書曰張孝秀性通率不好浮華常冠榖皮巾躡蒲履手執栟櫚皮麈尾服寒食散盛冬卧於石上唐書曰訶陵國在南方海中洲上竪木爲城作大屋重閣以㯶櫚皮覆之王坐其中山海經曰翠之山其木多㯶㯶樹無枝髙二丈許葉大而圓枝生杪頭尖實皮相披一行皮者爲一節可以爲索廣志曰㯶一名栟櫚葉似車輪乃在樹下下有皮􅆞之附地起二旬一採轉復上生􅀃文曰㯶一名蒲葵吴録地理志曰武陵臨沅縣多栟櫚木生山中晉令曰夷其民守護㯶皮者一身不輸之太平御覽卷第九百五十九
