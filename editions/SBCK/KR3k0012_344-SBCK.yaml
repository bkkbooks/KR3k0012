front:
  text: 太平御覽卷第三百四十四
  hash: sha256:2b65a91680527a2366600ae1572245d1363c87e8cb23f54d4e54a7248c413220
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_344-1a}
body:
  text: 兵部七十五劒下呂氏春秋曰伍貟如吴過於荆至江上欲渉見一丈人刺小舡方將漁從而請焉丈人刺度之巳絶江問其名族則不肯告解其劒以與丈人曰千金劒也願獻之丈人丈人不受曰荆國之法得伍貟者爵執圭禄萬石金千鎰昔者子胥過呉尚猶不取今我何用子之千金劒爲乎伍貟過於呉使人求之江上則不從得毎食必􅀕之祝曰江上之丈人天地至大矣將奚不有名不可得而聞身不可得而見又曰相劒者曰白所以爲堅也黄所以爲紐也黄白􅄂則堅且紐良劒也難者曰白所以不爲紐也黄所以爲不堅也黄白􅄂則不堅且不紐又柔則錈堅則折劒折且錈焉得爲利劒劒之精未革而或以爲良或以為惡􅀃使之也故有以聦明聽􅀃則妄􅀃者止无以聦明聽􅀃則堯桀无別矣此忠臣之所患賢者之所以廢也又曰荆有次非者一作佽得寳劒于干遂干遂邑名還反渉江至於中流有兩蛟夾繞其舩次非謂舟人曰汝嘗見兩蛟夾舟而舟中之人有全活者乎舟人曰未之見也次非曰􅀂如是吾固江中腐肉朽骨耳棄劒而巳余何愛焉遂攘臂祛衣抜劒赴江刺蛟殺之而復上舟中之人皆獲全荆王聞之仕以執圭周禮侯執信圭楚以次非爲勇武侯孔子聞之曰腐肉朽骨猶能除害見幾哉又曰劒不徒断車不自行或使之也又曰楚王有渉江者其劒自舟中墜於水遽契其舟曰是吾劒之所從墜也舟止從其所契者入水求之舟巳行矣而劒不行求劒􅀂此不亦惑乎龍魚河圖曰流洲在西海中地方三千里上多山川積石名爲昆吾石冶其石爲鐵作劒光明照洞如水精以割玉如土又曰劒名飛􅀭山海經曰鮫魚皮有珠文而堅可以飾刀劒口又曰汲郡冡中得銅劒一枚長三尺五寸今所名干將劒明古者通以錫銅爲兵噐又曰有君子之國其人衣冠帶劒廣雅曰断蛇魚膓純釣燕支蔡偷屬鏤千勝堂谿墨陽並劒名也周迁輿服􅄂事曰劒所從來乆矣其後唯朝服帶劒晉朝代之以木貴者玉飾首賤者以蚌金銀玳瑁爲雕飾張敞晉東宫舊事曰太子儀飾有玉頭劒古今注曰吴大帝有寳劒六一曰白虹二曰紫電三曰辟邪四曰流星五曰青􅁳六曰百里十洲記曰流洲在西海中上有山川積石爲昆吾冶其石成鐵作劒光明照如水精狀割玉如泥漢武内傳曰王母帶分景之劒上元夫人帶流黄擇精之劒神仙傳曰真人去丗多以劒代形五百年後劒亦能靈化其驗矣西京􅄂記曰漢髙祖斬蛇劒以七彩珠九華玉爲飾五色瑠璃爲匣刄上常如霜雪光景照外開囊拔鞘輙有風氣射人拾遺記曰顓頊髙陽氏有􅀞影劒騰空劒􅀂四方有兵此劒則飛赴指其方則尅未用時在匣中常如龍虎吟又曰越王勾踐使工人以白牛白馬祀昆吾山神以成八劒一名掩日以之指日則日光晝暗金者隂物也隂盛則陽滅二曰断水畫水開即不合三曰轉魄指月蟾免爲之倒轉四曰懸剪飛鳥遊遇觸其刃如斬截焉五曰驚鯢以之沈海鯨鯢爲之深入六曰滅魂扶以之夜行不遇魑魅七曰却邪有妖魅見之則止八日真剛以之切玉断金如刻削土木矣以應八方之氣也雷次宗豫章記曰吴未亡恒有紫氣見於牛斗之間占者以爲吴方興唯張華以爲不然及平此氣逾明張華聞雷孔章妙逹緯象乃要􅀫屏人問天文將來􅁻凶孔章曰無他象唯牛斗之間有異氣是寳物之精上徹於天耳此氣自正始嘉平至今日衆咸謂孫氏之祥唯吾識其不然今聞子言乃玄與吾同今在何郡曰在豫章豐城張遂以孔章爲豐城令至縣移獄掘􅀷二丈得玉匣長八九尺開之得二劒一龍淵二即太阿其夕牛斗氣不復見孔章乃留其一匣龍淵而進之劒至張公於宻發之光熖鞾韡煥􅀂電發後張遇害此劒飛入襄城水中孔章臨亡誡其子􅁪以劒自隨後其子爲建安從事經淺瀬劒忽於腰中躍出􅀄出猶是劒入水乃變爲龍逐而視之見二龍相隨而逝焉孔章曽孫穆之猶有張公與其祖書反覆桒根紙古字縣後有掘劒窟方廣七八尺捜神記曰東越門中有嶺髙數十里下北隰中有大蛇長七八丈大十餘圍常病都尉及長吏下夢巫覡欲得童女常八月朝􅀕送蛇輙吞之巳用九女季誕有小女名􅀉應慕而行乃請好劒咋蛇大作數斛深宻灌之以置穴口蛇出頭大如囤目如二尺鏡先啖深宻􅀉便放犬咋蛇以劒斫殺得九女髑髏越王乃娉􅀉爲后又曰㑹稽賀瑀字彦琚得疾不知人唯心下温二日蘇云吏巳將上天入曲房旁中有層架其上層有印中層有劒使瑀唯意所取而短不及上層取劒而出門吏曰恨不得印可䇿百神劒唯得使社公耳異苑曰晉惠帝元康三年武庫火燒孔子􅄚髙祖斬白蛇劒王莽頭等三物中書監張茂先懼難作列兵陳衛咸見此劒穿屋飛出莫知所向辛氏三􅁗記曰三月三日秦昭王置酒河曲有神人自泉而出捧水心劒曰令君制有西夏老子曰服文彩帶利劒又曰善攝生者兵無所容其刃莊子􅀃劒篇曰昔趙文王喜劒劒士俠門而客三千餘人日夜相擊於前死傷者歳百餘人好之不厭如是三年國衰諸侯謀之太子悝患之募左右曰孰能􅀃王之意止劒士者奉千金左右曰莊折子當能太子使人奉千金莊子弗受與使者皆往見太子曰聞太子欲用周者絶王之喜好也太子曰然吾王所見者唯劒士也莊子曰諾周善爲劒太子曰吾王所好劒士也蓬頭突􅁂垂冠縵胡之纓短後之衣瞋目而語難王見􅀃之今夫子必儒服見王事必大逆莊子請治劒服三日太子乃見王王脫白刃待之莊子入殿門不趍見王不拜王曰子欲何以教寡人使太子先焉曰臣聞大王喜劒故以劒見王王曰子之劒何能禁制曰臣之劒十歩一人千里不留行王大恱曰天下無敵矣莊子曰夫爲劒者示之以虚開之以利後之以發先之以至願得試之王曰夫子休就舎待命設戯請夫子王乃校劒士七日七夜死傷者六十餘人得五六人使捧劒於殿下乃召莊子王曰今日使劒士交劒莊子曰望之以乆矣王曰夫子御杖長短如何莊子曰臣之所奉皆可臣有三劒唯王所用請先言而後試王曰願聞三劒曰有天子之劒有諸侯之劒有庶人之劒王曰天子之劒何如曰天子之劒以燕谿石城爲鋒齊岱爲鍔晉衛爲脊周宋爲鐔韓魏爲鋏苞以四夷褁以四時統以渤海帶以常山制以五行論以刑德開以隂陽持以春夏行以秋冬此劒直之無前舉之無上按之無下運之無旁上决浮雲下絶地紀此劒一用匡諸侯天下服矣此天子之劒也文王芒然自失曰諸侯之劒如何曰諸侯之劒以智勇士爲鋒以清廉士爲鍔以賢良士爲脊以忠聖士爲鐔以豪傑士爲鋏此劒直之以無前舉之亦無上按之亦無下運之亦無旁上法圎天以順三光下法方地以順四時中和人意以安四郷此劒一用如雷電之震也四封之内無不賔服而聽從君命者此諸侯之劒也王曰庶人之劒如何曰庶人之劒蓬頭突􅁂垂冠縵胡之纓短後之衣瞋目而語難相擊於前上斬頸頷下决肝肺此无異􅋐雞一旦命已絶矣无所用於國事今大王有天子之位而好庶人之劒臣竊爲大王薄之王乃牽而上殿􅌠人上食王三環之莊子曰王安坐定氣劒事畢矣於是文王不出宮三月劒士皆伏斃其處矣又曰干越之劒匣而藏之不敢輕用寳之至也又曰大冶鑄金金踊躍曰我必爲鏌鎁烈子曰魏黒夘以匿嫌殺兵邴章匿嫌私恨也邴章之子來丹謀復父讎而丹氣甚猛其形甚露露羸耻假力於人誓以手劒而黒夘力抗百人非人􅀋也其視來丹猶鄒鷇也來丹之友申抱曰子怨黒夘至矣黒夘之易子過矣將奚謀焉來丹垂涕曰願子爲我謀申抱曰吾聞衛孔周其祖得殷之寳劒三僮子服之却三軍之衆奚不請爲來丹適衛見孔周執僕禮請先納妻子後言所欲周曰吾有三劒唯子所擇而皆不能殺人且先言其􅃺一曰含光視之不可見運之不知其所觸泯然無際經物而不覺二曰承影將旦昧爽之交日夕昏明之際北靣察之淡淡焉􅀂有物存莫有其􅃺其觸物也竊然有聲經物而物不疾三曰霄練晝則見影而不見光夜方見光而不見形其觸物騞然而過騞音休蘖隨過隨合􅁴疾而不血刃此三寳劒傳之十三丗矣而无施於事不能害物匣而藏之未嘗啓封來丹請其下者孔周乃歸其妻子跪而授其下劒丹再拜受之執劒從黒夘醉偃卧牗下自頸至腰三斬黒夘不覺丹以黒夘死趣而退遇卯子於門又擊之三下如接虚卯子方􅀏丹知劒不能煞人也歎而歸夘醒怒妻子醉而覆我使我嗌疾而腰急其子曰丹之來過於門三招我亦使我躰疾而支強彼其厭我哉又曰宋有蘭子者以數千宋元君弄七劒迭躍之五劒常在空中元君大驚立賜金帛又曰周穆王征西戎戎献昆吾之劒赤刀切玉如切泥管子曰昔􅁑大盧之山發而出金􅃖尤受而制之以爲劒鎧此劒之始也又曰羽劒珠飾者斬生之斧也墨子曰良劒期乎利不期乎莫耶孫卿子曰干將莫耶巨闕辟閭皆古之良劒也尉繚子曰呉越臨戰左右進劒呉子曰夫提皷揮捊臨難決疑接兵用刃此將軍也一劒之任非將軍事也又曰一賊鋏劒擊於市萬人無不觸辟者臣以爲非一人獨勇一市萬人皆不肖尸子曰水試断鵠鴈陸試断牛馬所以觀良劒也燕丹子曰荆軻左手把􅁗王䄂右手椹音砧其􅅐􅁗王曰今日之事從子計耳乞聽琴聲而死召􅁎人皷琴聲曰羅􅜄單衣可裂司德狀拜二而絶八尺屏風可超而越鹿盧之劒可􅀒而抜王於是􅁬䄂超屏風而走荆軻擲劒中銅柱焉淮南萬畢術曰拔劒􅀝户兒不夜驚又曰夫淳劒魚膓之始下夫擊則不能断刺則不能入髙誘注曰魚膓文繞屈譬􅀂魚膓又曰劒工或劒之似莫耶者唯歐治能名其種歐治良工也玉工眩玉之似碧盧者唯猗頓不失其情碧盧或作武夫猗頓魯之冨人能知玉理不失其情也抱朴子曰歐治不能鑄鈆錫爲干將符朗子曰符朗棄千金之劒抱朴子趨曰何夫子棄大而存小乎符朗不應賈子曰古者天子二十而冠帶劒諸侯三十而冠帶劒大夫四十而冠帶劒􅀠人不得冠庶人不帶劒亢倉子曰蜚景之劒威集白日氣成紫蜺以之封穫則與劂俱衛切刃也無擇蜚景神劒也劂鎌也神劒雖利以之獲陷猶司於鎌刀者也及夫凶邪流毒沸渭不靖加之運掌之上千里之内不留行矣凶邪流毒温疫之氣也此神劒之能辟凶邪故威光所行千里之内未嘗留止者也宋玉大言賦曰長劒􅀝天外班固幽通賦注曰衛靈公太子剻聵爲無道好帶長劒長一丈公錬乃作短者長一尺公知不可以傳國乃逐之魏都賦曰劒則流彩之珎素質之寳或虹蔚波映或􅀛文龍藻服之可以威百蠻指麾可以開昏擾古詩曰􅆎中鹿盧劒可直千萬餘博物志曰劒後擊鹿盧名曰属鏤又曰何意百錬鎠化爲繞指柔班固詩曰寳劒直千金又曰延陵輕寳劒曹子建詩曰拊劒西南望江文通詩曰􅀝劒臨八荒宋鮑昭詩曰􅀟劒將别離先在匣中鳴雌沈呉江裏雄飛入楚城吴江深無底楚闕有崇扃一爲天地别豈直限幽明神物終不隔千祀儻還并梁吴均詠寳劒詩曰我有一寳劒出自昆吾溪照人如照水切玉如切泥鍔邊霜凛凛匣上風凄凄􅀉語張公子何當來見携梁崔鴻詠劒詩曰寳劒出昆吾􅀛龍夾采珠五精􅀄獻術千戸竟論都匣氣衝牛斗山形轉鹿盧欲知天下貴持此問風胡曹植七啓曰歩光之劒越劒名華藻繁縟飾以文犀彫以翠緑綴以驪龍之珠錯以荆山之玉陸断犀象未足稱雋隨波截鴻水不漸刃張景陽七命曰楚之陽劒歐冶所營陽劒名也耶谿之挺赤山之精銷踰羊頭羊頭骨銷之也鏷以鍜成乃錬乃鑠萬辟千灌皆銷錬名豐隆奮椎飛廉扇炭神氣化成陽文隂縵旣亦流綺星連浮綵艶發光如散電質如曜雪霜鍔冰凝水刃霜絜形冠豪曹名珎巨闕指鄭則三軍白首麾晉則千里流血豈徒水截蛟鴻陸灑奔駟断浮翮以爲三絶重甲而稱利又曰􅀂其形震薛燭光駭風胡價兼三郷聲貴兩都或馳名傾􅁗或夜飛去吴功冠萬載威曜無窮揮之者無前擁之者身雄可以從服九國撗制八戎爪牙景附亟夏承風此盖希代之神兵也楚詞曰執棠溪棠溪劒名以拂蓬秉干將以割肉又曰撫長劒兮玉珥珥劒也鐔又曰余㓜好此竒服年旣老而不衰帶長鋏之陸離冠青雲之崔巍高皃後漢公孫瑞劒銘曰天生五才金德惟剛從革作辛含景吐商辨物利用勲伐弥彰曁彼良工歐治干將爰造寳劒巨闕墨陽精通皓靈獲兹休祥剖山竭川虹蜺消亡昭威耀武震動遐荒楚以定覇越以取強晉裴景聲文身劒銘曰噐以利顯實以名舉長劒耿介體文經武陸断􅀇犀水截輕羽九功斯像七德是輔晉張恊太阿劒銘曰太阿之劒丗載其美淬以清波歛以越砥如玉斯曜􅀂景在水不運自肅率土從䡄梁簡文帝謝勑賚方諸劒等啓曰纔發玉凾雕竒溢目始開牙撿麗飾交陳巳疋丹霞之暉乍比青雲之制身文且貴器用惟冝寒暑兼華左右相照梁沈約爲東宫謝勑賜孟嘗君劒啓曰田文重氣殉名四豪莫及寳劒雄身故能威陵􅁗楚人髙事逺遺物足竒謹加玩服以深存古太平御覽卷第三百四十四
