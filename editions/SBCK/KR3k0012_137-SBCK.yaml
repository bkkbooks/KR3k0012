body:
  text: 皇親部三東漢光武郭皇后光武陰皇后孝明馬皇后孝章母賈貴人孝章竇皇后孝章梁皇后孝隱宋皇后孝和陰皇后孝和鄧皇后曹大家附孝德左皇后孝安閻皇后孝安李皇后孝順梁皇后孝冲母虞貴人孝質母陳妃孝崇匽皇后孝桓梁皇后孝桓鄧皇后孝桓竇皇后孝仁董皇后孝靈宋皇后孝靈何皇后孝靈王皇后孝獻伏皇后孝獻曹皇后光武郭皇后續漢書曰光武郭皇后眞定槀人也安陽思侯昌女曰聖通世祖至眞定納聖通有寵丗祖即位聖通爲貴人建武元年生皇子強二年貴人立爲皇后強爲太子是後后寵衰數懷怨懟廢二十八年薨葬北陵光武陰皇后續漢書曰光武光烈陰皇后南陽新野人名麗華宣思哀侯陸女也陸卒後女年十九兄識嫁與世祖納后於苑當成里以后性寛仁宜母天下欲授以尊位后輙退讓自陳不足以當男爲東海王十七年郭皇后廢后立爲皇后十九年太子強廢東海王爲太子東觀漢記曰上微時過新野聞后羙心悅之後至長安見執金吾車􅀐甚盛因歎曰仕䆠當作執金吾娶妻當得隂麗華更始元年遂納后於􅁐孝明馬皇后續漢書曰孝明明德馬皇后伏波將軍新息侯援之女后年七􅀊幹治家事勑制僮御出入授計一以貫之諸家莫如其母不知其家事獨后所爲也後聞之咸驚異焉母甞使善卜者相后曰此女必當大貴遂爲帝王妃然而少子建武二十八年年十三以選入太子宫接待同列如承至尊先人後巳發於至誠由是見寵永平三年春有司奏請立長秋宫以帥八妾上未有所言皇太后曰馬夫人德冠後宫即其人也遂登后位身衣大帛御者秃裙不縁性不喜出入遊觀未甞臨御牎牖又不好音樂上時幸苑囿離宫以故希從輒誡言不宜晨起因陳風邪霧露之誡辭意甚備上納焉誦易經習詩論春秋略記大義讀楚辭尤善賦頌疾其浮華聽論輙摘其要讀光武皇帝紀至有獻千里馬寳劒者上以馬駕鼔車劒賜􅀐士手不持珠玉后未甞不歎息也時有楚獄囚證相引繫者甚多后慮其多濫承間爲上言之上惻然感動於是上夜起彷徨思論所納非臣下所得聞后志在克巳奉上不以􅀻家㚥朝廷兄爲虎賁中郎將兩弟黃門郎訖永平世不遷明帝體不安召黃門防奉參醫藥夙夜勤勞帝崩后作起居注省去防參醫藥事章帝即位后爲皇太后下詔告三輔二千石無得令馬氏㛰親因權託屬奸亂吏治犯者正法以聞太后素自喜儉前過濯龍門上見外家問起居車如流水馬如龍蒼頭衣緑褠直領領䄂正白頋視旁御者逺不及也亦不譴怒但絶其􅀊用冀以嘿止諠耳於是親戚􅀍服如一政教不嚴而從以躬率先之故也置織室蚕於濯龍中數徃來觀視内以娯樂外以先女功太后崩合葬顯節陵東觀漢記曰后長七尺二寸青白色方口美髮爲四起大髺但以髮成尚有餘繞結三匝復出諸髮眉不施黛獨左眉角小缺􅀘之如粟后素謹愼小感􅁣輒自責如平生事舅姑時新平主家御者失火及北閣後殿􅀷以自過起居不忻至正月當上原陵言我守備不精慙見原陵不上陳思王􅀞讃序曰昔明德馬后美於色厚於德帝用嘉之嘗從觀􅀞虞舜見娥皇女英帝指之戯后曰恨不如此爲妃又前見陶唐之象后指堯曰嗟乎羣臣百僚恨不戴君如是帝顧而􅀏孝章母賈貴人續漢書曰孝明賈貴人南陽人明德馬后之姨女孝章皇帝之母也初選入後宫爲貴人生章帝馬后無子帝旣生而馬后母養之明帝謂馬后曰人未必當自生子也但患養之不勤愛之不至耳􅀂能愛如巳子則孝敬亦如親生矣於是馬后待章帝過於所生章帝感養育之恩遂專名馬氏爲外家故賈貴人家不蒙舅氏之寵孝章竇皇后續漢書曰孝章章德竇皇后右扶風平陵人竇勲之女后生二歳呼卜相工見后皆言大貴有容貌才能母泚陽公主欲内之帝聞后有才色數以問諸家建初二年后與女弟隨主入見長樂宫進止得適人事脩備奉事長樂宫下至侍御貢獻問遺皆得其忻心太后異之亦可焉入掖庭見北宫章德殿后性敏給稱譽日聞太后亦縁意明年有司請立長秋宫遂立爲后有寵專固後宫先是宋貴人生太子慶梁貴人生和帝后心忌害之皆誣以挾邪媚道後以憂卒孝章梁皇后續漢書曰孝章恭懷梁皇后安定烏氏人也父竦建初中以女二人選入宫有寵其弟産孝和皇帝竇后母養欲隔絶梁氏初和帝生竦兄弟不蒙忻喜􅀼私相賀語言漏泄傳聞竇后惡之遂作蜚語誣䧟以惡詔書􅀓考竦死漢陽獄家屬徙九眞二貴人以憂薨永元九年竇太后崩竦長女嫕上書自陳上遂見嬺泣涕問訊賞賜舎第財物以二貴人葬有闕改殯之于承光宫小貴人尊號曰皇太后與姊貴人合葬于西陵上謚曰恭懷皇后儀比敬園追爵謚竦爲襃親愍侯徴還竦家屬敬隱宋皇后續漢書曰敬隱宋皇后右扶風平陵人當陽穆侯揚之女也兩女皆有才能令色永平末俱選入宫配皇太子皆寵明帝崩太子即位是爲章帝姊妹並爲貴人建初三年小貴人生皇子慶二歳立爲皇太子後竇后幸廢爲清河王至永元九年竇后崩清河王上書求上貴人家又爲外祖母求詣洛陽治病詔書聽之殤帝崩清河王子立是爲安帝鄧太后崩安帝追尊小貴人曰敬隱后孝和隂皇后續漢書曰孝和隂皇后呉房侯綱之女也后爲人聦惠有才能永元四年選入掖庭爲貴人以託先后近屬故有異寵立爲皇后自和熹鄧后入宫後隂后寵衰怨恨后外母鄧朱數出入后所有言后與朱共挾蠱賜后䇿遷于桐宫以憂死葬臨平亭部孝和鄧皇后曹大家附續漢書曰孝和和熹鄧皇后太傅髙宻侯禹之孫平壽敬侯訓之女也訓有五男三女長騭次京悝弘閶女燕次綏綏即后也次容蚤卒有子女娥甫在襁褓時后年十二傷娥早􅀌養視撫育慈恩􅀷至后七􅀊讀論語十二通詩諸兄讀經輒難問微意志在書傳母非之曰當習女工以供衣服今不是務汝當舉􅀶士耶后重違母意則縫綻極女工事暮夜􅀻買脂燭讀經傳宗族内外皆號曰諸生父訓心異之永元四年呼相工􅂫太相后大驚曰此成湯之骨法也貴不可言七年中復與諸家女俱選入宫姿容窈窕進退辭令粲然有異與衆女殊八年十一月巳夘后入掖庭爲貴人諸兄除郎中后時年十六德冠後宮后性恭肅小心承事隂氏夙夜兢兢接撫同列常尅巳下之上􅀷喜焉遂有特寵后自入宫遂􅀶覽五經傳記圖䜟内事風􅀨占候老子孟子禮記月令法言不觀浮華申韓之書上每欲官秩后諸兄弟輒爲推讓孝和世騭裁虎賁中郎將京悝弘閶黃門郎和帝未崩數失皇子皇子生養於民間羣僚無知者及和帝崩是日倉卒上下憂惶后乃収歛皇子皇子勝長有微疾殤帝生百餘日后欲自養長立爲皇子其夜即位尊皇后爲皇太后帝在襁褓皇太后臨朝建元元年三月太后崩丙午合葬順陵東觀漢記曰后年五歳太夫人爲剪髮夫人年老目􅄀并中后額雖痛忍不言一額盡傷左右怪而問之后言夫人哀我爲斷髮難傷老人意故忍之耳及爲太后時宫中亡大珠一筐太后念欲下掖庭考問之恐有無辜僵仆者乃親自臨見宮人閱問動察顔色開示恩信宫人即時首服不加鞭箠不敢隱情宫人驚咸稱神明曹大家附後漢書曰扶風曹世叔妻者同郡班彪之女也名昭字惠班一名􅁎愽學髙才世叔早卒有節行法度兄固著漢書其七表及天文志未及竟和帝詔就東觀藏書閣踵而成之帝數召入宮令皇后諸貴人師事焉號曰大家每有貢獻異物輒詔大家作賦頌及鄧太后臨朝預聞政事作女誡七篇年七十餘卒皇太后素服舉哀使者􅁥護喪事所著賦頌銘誄論䟽凡十六篇子婦丁氏爲撰集之又作大家讃焉孝德左皇后續漢書曰孝德左皇后安帝母也父仲躬犍爲武陽人后兄聖伯爲妖言伏誅父母同産皆没官后長掖庭有令色賜清河王王大悅特親幸自􅁎妾巳下莫能與比六年生男爲清河太子卒葬當利庭延平元年殤帝崩清河太子爲皇帝尊清河孝王曰孝德皇帝左􅁎曰孝德皇后孝安閻皇后續漢書曰孝安安思閻皇后河南滎陽人侍中長水校尉暢之女也有才能令色立爲皇后安帝崩閻后皇太后與兄顯定䇿禁中立濟北王少子北郷侯爲皇帝奉後以其年少欲乆專政於是太后攝政永建元年崩謚安思后合葬恭陵孝安李皇后續漢書曰孝安恭愍李皇后以宮人侍上見幸生順帝爲閻后所妬見鴆物故瘞葬城北帝即位左右以聞更以禮殯永元二年葬北陵謚曰愍皇后孝順梁皇后續漢書曰梁皇后大將軍啇女后有光景之祥及長聦叡仰承兄姊俯接弟妹恩情周悉旣有女功之巧尤好史書學問之事九􅀊能誦孝經論語遂治韓詩大義略舉女傳列圖常在左右宗族中外咸敬異焉選入掖庭相工茅通見之大驚曰此所謂日角偃月相之極貴臣所未常見於是以爲貴人恩寵日崇乃白上曰陽以􅀶施爲德隂以不專爲義蓋詩人螽斯之福則百斯男之祚所由興也願陛下思天行之普逮均貫魚之次序使小妾得免罪謗之累於是上愈善之益親顧焉陽嘉元年立爲皇后冲帝在襁褓太后攝政和平元年崩羣臣奏謚曰順烈皇后合葬憲陵孝冲母虞貴人續漢書曰孝順虞大家孝冲皇帝母也遭冲質仍夭政在梁氏故與質帝母俱抑而無號嘉平四年小黃門趙祐議郎畢正言上孝冲皇帝母虞大家質皇帝母渤海陳夫人皆誕生聖帝未有稱號今遭盛明當以母氏序載外戚朝廷之恩臣子極賤尚有追贈況二母見存而徒曰大家夫人非所示後進母以子貴之義上感其言即日拜大家爲貴人使中常侍持節就園授印綬孝質母陳妃續漢書曰樂安陳夫人孝質皇帝母也家夲魏郡少以􅇊入孝王宫得幸生質帝梁兾欲專國權令帝母不得至京都又帝短祚是以外家無他寵靈帝拜夫人爲孝王妃孝崇匽皇后續漢書曰蠡吾􅀶園匽貴人者桓皇帝母也上年十四襲父蠡吾侯翼爵即帝位追尊父爲崇皇陵曰􅀶陵匽夫人爲崇園貴人和平元年有司上言爲孝崇皇后即授印綬宫曰永樂孝桓梁皇后續漢書曰孝桓懿獻皇后順烈后之女弟也字女瑩上始即位備禮儀納綵案舊令娉后納采乗馬束帛如孝惠孝平故事娉后黃金二萬斤永初四年立爲皇后時太后秉政皇后擅寵後宫太后崩後后恩稍衰後宫姙孕􅀂産皇子后輒隨嫉害少有得全育者然終身亦無子後見御轉希至延熹二年以憂恚崩葬㦤陵孝桓鄧皇后續漢書曰孝桓鄧皇后字猛女母宣本微初適郎中鄧香生后後適梁紀故后冒姓梁氏上誅后兄冀等立猛女爲皇后惡梁姓之同改姓亳氏復姓鄧氏后特尊驕忌與上所幸郭貴人更相讃乃廢之凡立七年以憂死葬於北邙孝桓竇皇后儥漢書曰孝桓鄧皇后章帝竇后之族孫大將軍武之女也孝靈皇帝尊皇后爲皇太后臨朝武以䆠者放縱日乆謀悉誅除廢其䆠上欲獲忠節下副論者數入禁中進白太后太后以爲此皆天所生漢元以來丗丗用事國典常故何可廢耶但當誅惡耳宁常寺管覇頗聞其語結謀誅武武自殺太后歸長樂宫嘉平元年六月崩合葬宣陵孝仁董皇后續漢書曰河間愼園董貴人孝靈皇帝母也靈帝即皇帝位追尊父長爲孝仁皇帝陵曰愼陵董太夫人曰愼園貴人及竇太后歸政還長樂宫迎貴人到京都奉璽綬上尊號爲孝仁皇后稱永樂宫竇太后崩後永樂后數至前省與上相見與於政事中平六年上弃天下永樂后兄子重爲驃􅀐將軍何太后臨朝重與太后兄大將軍進權􅀔相害后每欲參于政事太后輒相禁塞后憤恚嗔罵曰汝欲怙大將軍耶勑驃􅀐斬大將軍頭來何太后以告進進収重免官爵重自殺后憂怖病還河間崩合葬愼陵孝靈宋皇后續漢書曰孝靈宋后帝敬宋貴人之從孫執金吾酆之女無寵而乆當正位後宫幸􅁎衆共讃惡誣以祝詛上信之遂䇿収璽綬后自致􅁀室獄以憂死父兄弟皆􅀍誅諸常侍少黃門在省闥者皆憐宋氏無辜共合錢収葬后及酆父子於睪門亭宋氏舊􅉷孝靈何皇后續漢書曰孝靈靈思何皇后南陽宛人也以良家子選入掖庭見幸妊身就館生男爲貴人父眞前卒召貴人同父兄何進爲郎中靈帝崩何皇后子辯立爲皇帝后爲皇太后進爲録尚書􅀽紹謀誅廢中官進以紹計白太后后不聽以爲中官統領禁省自古及今漢家故事不可廢也且先帝新弃天下柰何令我楚楚與士人共事乎及董卓屯顯陽議以爲太后迫永樂后令崩逆婦姑之節遷太后于桐宫太后􅁀崩羣臣奏謚曰靈思皇后合葬文陵孝靈王皇后續漢書曰孝靈靈懷王皇后孝獻帝母王璋女也才明聦敏能書㑹計以良家子應法相選入掖庭光和三年中夏幸妊身后怖畏何皇后服藥欲除姙胎安不動又后數夢􅀒日遂不敢摇四年三月癸巳生上庚子渴飲米粥遂􅁀薨上歸掖庭􅁀室嗇夫朱直擁養獨擇乳母歳餘永樂后自將護至三歳靈帝閔上早失所生追思后令羙乃作追德賦令儀頌陵曰文昭陵起墳文陵園北孝獻伏皇后續漢書曰孝獻伏皇后琅邪東武人侍中輔國將軍不其侯完女也后㘴與父完謀爲姧書詐罔不道上収后下􅁀室詔獄憂死兄弟皆伏誅張璠漢記曰曹操入其二女於宫貴人誣伏氏氏爲亂使御史大夫郗慮伏節収后后􅀍髮徒跣走而執上手曰不能復相活耶上大驚號哭曰我亦不知命在何時頋謂慮曰郗公天下􅁀虐豈有此乎左右莫不流涕遂殺后也曹暪别傳曰公遣華歆勒兵入宫収后后閑户匿壁中歆攘户廢壁牽后出孝獻曹皇后續漢書曰孝獻曹后丞相魏王操女也名憲建安十八年上納操二女憲節於後宫皆以爲貴人明年伏后薨憲爲皇后二十年獻帝禪位於魏憲拜山陽公夫人太平御覽卷第一百三十七
