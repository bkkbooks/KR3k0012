front:
  text: 太平御覽卷第五百三十九
  hash: sha256:15762853e2ec069557ff01554da85d8b29d65657307ca93ee353fb020aa7599e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_539-1a}
body:
  text: 禮儀部十八宴㑹上壽䞇宴㑹毛詩曰鹿鳴宴羣臣嘉賔也又曰鹿鳴曰棠棣曰宴兄弟也又嘉魚曰湛露天子宴諸侯也又伐木曰伐木宴朋友故舊也自天子至於庶人未有不湏友以成者也親親以睦友賢不弃不遺故舊則民德歸厚矣周禮春官上大宗伯掌饗讌之禮親四方之賔客禮記曰諸侯宴禮之義俎豆牲體薦羞皆有等差所以明貴賤也左傳文上曰魯文公四年衛寗武子來聘公與之宴爲賦湛露及彤弓不辭又不荅賦使行人私問對曰臣以爲肄業及之也昔諸侯朝正於王王宴之於是乎賦湛露則天子當陽諸侯用命也􅀂諸侯敵王所愾而獻其功王於是乎賜之彤弓一彤矢百玈弓十玈矢千以覺報宴今陪臣來繼舊好君辱貺之豈敢于大禮以自取戾又宣公曰晉侯飲趙盾酒伏甲將攻之其右提彌明知之趍登曰臣侍君宴過三爵非禮也又成公曰衛侯饗苦成叔寗武子相苦成叔傲􅇞子曰苦成家其亡乎古之爲饗食也以觀威儀省禍福也今夫子傲取禍之道也又昭二曰楚靈王享昭公于新臺好以大屈宴好好賜也大屈弓名也旣而悔之又昭公曰穆有塗山之㑹周穆王㑹諸侯於塗山在壽春東北漢書曰髙祖擊英布還過沛置酒悉召故人父老發沛中兒百二十人教之歌酒酣上自擊筑曰大風起兮雲飛􅀭威加四内兮歸故郷安得猛士􅀆守四方自起舞慷􅁣傷懷泣下數行謂父老曰逰子悲故郷吾雖都關中萬歳後吾䰟􅅎猶樂思沛也與沛父老諸母樂飲道舊故爲􅀏晉書禮志曰漢建安中將正㑹而太史上言正旦當日蝕朝士疑㑹否共諮尚書令荀彧時廣平計吏劉邵在彧坐曰梓愼禆竈古之良史猶占水火錯失天時諸侯旅見天子入門不得終禮者五日蝕在一然則聖人垂制不爲變異豫廢朝禮或者災消異伏或推術謬誤也彧及衆人咸善而從之遂朝㑹如舊亦不蝕魏書曰文帝爲魏王南征次譙大饗六軍及譙父老自娱樂伎列百戯魏志曰黄􅀄元年郭淮奉使賀文帝踐祚而道路疾病故計逺近爲稽留及群臣在㑹帝正色責之曰昔禹㑹諸侯塗山防風後至便行大戮今􅄎天同慶而最遟留何也對曰臣聞五帝先教導民以德夏后政衰始用刑辟今臣遭唐虞之丗是以免於防風之誅帝恱之晉書禮志曰漢儀有正㑹禮正旦夜漏未盡七刻鐘鳴受賀公侯以下執贄來庭二千石以上外殿稱萬歳然後作樂宴饗魏武帝都鄴正㑹文昌殿用漢儀又設百華燈晉氏受命武帝更定元㑹儀咸寜注是也晉起居注曰太常張華上書按舊事拜公建始殿因以小㑹盖所以崇宰輔也宋書禮志曰正旦元㑹設白虎罇於殿庭罇盖上施白虎􅀂有能獻直言則發此罇飲酒東宫舊事曰正㑹儀太子着逺逰冠絳紗􅂁登輿至丞華門前設位拜二􅀓二傅交拜禮畢不復登車太傳訓道在前少􅀓訓順在後太子入崇賢門樂作太子登殿西向坐丗􅀃曰孝武在西堂㑹伏韜預坐還下車使呼其兒語之曰天子百人髙㑹臨坐未得他語先問伏韜何在在不此故未易爲人作父如此何如摯虞决疑要注曰讌之與㑹威儀不同也㑹則隨五時朝服庭設金石懸虎賁着旄頭文衣鶡尾以列陛讌則服常服設􅁝竹之樂唯􅀫衛者列伏大㑹於太極殿小㑹於東堂丗􅀃曰過江諸人每至暇日相要出新亭藉卉飲宴周侯中坐而歎曰風景不殊舉目有江河之異皆流淚唯丞相愀然作色曰當共勠力王室尅復神州何至作楚因相對而泣也傳􅀇元㑹賦曰考夏后之遺訓綜殷周之典藝採秦漢之舊儀定元正之嘉㑹潘岳閑居賦曰席長􅱀列孫子柳垂隂車結䡄陸㰅紫房水佳頳鯉或宴于林或禊於汜昆弟班白兒童稚齒稱萬壽以獻觴咸一懼而一喜壽觴舉慈顔和浮水樂飲􅁝竹駢羅頓足起舞柷音髙歌人生安樂熟知其他古詩曰今日良宴㑹懽樂難具陳彈筝􅁬逸饗新聲妙人神古􅃩詩曰今日樂上樂相從天公出羙酒河伯出鯉魚靑龍前鋪席白虎持榼壷南斗工鼔琴北斗吹笙竿曹植侍太子坐詩曰白日耀靑天微雨静飛塵寒水辟炎暑凉風飄我身淸醴􅄹金觴肴饌縱撗陳齊人進竒樂歌者出西秦翩翩我公子機巧忽􅀂神曹植與丁廙詩曰嘉賔填城闕豊膳出中厨吾與二三子曲宴此城隅秦筝發西氣齊瑟楊東嘔肴來不虚歸觴至反無餘陸機皇太子請宴詩序曰感聖恩之罔極退而賦此詩也上壽毛詩大雅江漢曰虎拜稽首天子萬年虎拜稽首對楊王休作召公考天子萬壽左傳哀公宴於五梧武伯爲祝祝上壽酒也漢書曰髙祖與項羽鴻門㑹項㽵入爲壽進爵於尊者獻無􅆠之壽也史記曰武帝王太后在民間時所生一女者父爲金王孫王巳死韓王孫名嬀乗間而言曰太后有女在長陵武帝曰何不早言武帝乃自徃迎取乗輿至金氏門外使􅀐圍其宅女亡匿内中床下扶持出詔副車載之馳還入長樂宫太后曰帝何從來帝曰今者至長陵得臣姉與俱來帝奉酒前爲壽賜錢千萬奴婢三百人公田百頃甲第以奉姉太后謝曰爲帝費漢書衛靑傳曰時王夫人方幸於上寗乗􅀃青曰今王夫人幸而宗族未冨貴願將軍奉所賜千金爲夫人親壽靑以五百金爲壽上聞問靑以實對上迺拜寗乗爲東海都尉又曰倪寛爲御史大夫從東封㤗山登明堂寛奉觴再拜上千萬歳壽制曰敬舉君之觴又曰隆慮公主子昭平君尚帝女夷安公主隆慮主病困以金千斤錢十萬爲昭平君豫贖死罪上許之隆慮主卒昭平君日驕醉殺主􅀓繫獄廷尉上請上良乆曰法令者先帝所造也因弟故而誣先帝之法吾何面目入髙廟乎又下􅀒萬民乃奏其可哀不能自止左右盡悲東方朔前上壽曰臣聞聖王爲政賞不避仇讎誅不擇骨􅁏書曰不偏不黨王道蕩蕩此二者五帝所重三王所難也陛下行之是以四海之内元元之民各得其所天下幸甚臣朔奉觴昧死再拜上萬歳壽上乃起入省中乆時召讓朔免冠頓首曰臣聞樂大甚則陽溢哀大甚則隂頓陽變則心氣動心氣動則精神散而邪氣入銷憂者莫􅀂酒臣朔以上壽者明陛下正而不阿思以止哀也後漢書班超傳曰臣超區區特蒙神靈􅀼冀未便僵仆目見西域平定陛下舉萬年之觴薦勲祖廟布大喜於天下東觀漢記曰呉良濟郡人爲郡議曹􅁺正旦史入賀太守門下􅁺王望前言曰齊郡敗亂遭離盗賊人民飢餓不聞雞鳴狗吠之音明府視事五年五榖豐熟家給人足今日歳首請上雅壽􅁺史皆稱萬歳良跪曰門下􅁺佞謟明府勿受其觴盗賊未盡人民困乏良曹􅁺尚無絝望曰議曹惰寙自無絝寜足不爲家給人足耶太守曰此生言是也遂不舉觴賜鰒魚百枚署功曹後漢書曰竇后定䇿立靈帝帝以太后有授立之功率群臣朝于南朝親饋上壽也魏書曰文帝爲魏王南征次譙大饗六軍及譙父老設􅇊樂百戯令曰先王云樂其所自生禮不忘其本譙霸王之􅀖真人夲土其復譙租稅二年三老上壽日乆而罷晉書禮志曰元正上壽謁者引王詣樽酌壽酒跪授侍中侍中跪置御座前王還王自酌置位前謁者跪奏藩王臣某等奉觴再拜上千萬歳四箱樂作百官再拜巳飲又再拜唐書曰元和十四年齊魯初平宴文武百寮裴度舉觴獻壽跪而言曰陛下德配天地明並日月神武獨斷冦逆削平􅃬宴羣臣當兹令節臣備位台司幸逢昌運願與四海九州之人同上千萬歲壽上執酒爲飲之管子曰桓公管仲鮑叔牙􅇞戚四人飲飲酣桓公謂鮑叔牙曰盍不起爲寡人壽乎鮑叔牙奉杯而起曰使公母忘出在莒時也使管子母忘束􅅞在於魯也使寗戚母忘其飰牛車下也桓公避席再拜曰寡人與二大夫能母忘夫子之言則齊國之社稷不危也燕丹子曰太子置酒請荆軻酒酣太子起爲壽贄尚書曰五玉三帛二牲一死贄三帛諸侯丗子執緟公之􅀌執􅀇附庸之君執黄二生卿執羔大夫執鴈一死士執雉王帛生死所爲以贄以見之儀禮曰士相見之禮摯冬用雉夏用腒下大夫相見以鴈飾之以布維之以索如執雉上大夫相見以羔飾之以布四維之結于面左頭如麛執之如士相見之禮周禮春官上大宗伯曰以玉作六瑞以等􅀖國王執鎮圭公執桓圭侯執信圭伯執躬圭子執榖璧男執蒱璧鄭玄注日鎮安也以四鎮之山爲琢飾長一尺二寸公二王後及王之上公􅀟植謂之桓桓宫室之象所以安其上也信當爲身身圭躬圭盖皆象人形爲琢飾家長七寸榖所以養人蒱爲席所以安人二王或以榖爲飾或以蒱爲琢飾璧皆徑五寸不執珪者未成國也以禽作六摯以等諸臣執之言致也所執以自致孤執皮帛卿執羔大夫執鴈士執雉庶人執鶩工啇執雞皮帛束帛也表以皮爲之虎豹皮也帛如璧色繒也羔小羊取其羣而不失其􅀋也鴈取其候時而行雉取其守介而死不失其節鶩取其節鶩取其不飛遷鷄取其守時而動禮記曲禮下曰凡贄天子鬯諸侯圭卿羔大夫鴈士雉庶人之贄匹童子委贄而退贄之言至也天子無客禮以鬯爲贄者所以用告爲至也童子委贄而退不與成人爲禮也􅀃者以匹爲鶩也野外軍中無贄以纓拾矢可也非爲禮之處用時物而巳纓馬縏纓也拾謂射韝婦人之贄梖榛脯脩􅀥栗春秋莊公曰哀姜至公使宗婦覿用幣非禮也御孫曰男贄大者玉帛公侯伯子男執玉諸侯丗子附庸􅀌執帛小者禽鳥卿執折大夫執鴈士執雉以章物也章所執之物別貴賤女贄不過榛栗􅀥脩以告䖍也榛小栗脩脯䖍敬也皆取其名以示敬又定公下曰公㑹晉師于耳范獻子執羔趙簡子中行丈子皆執鴈魯於是乎始尚羔禮卿執羔大夫執鴈魯則同之今始知執羔之尊也榖梁傳莊公曰大夫宗婦覿用幣宗婦同宗大夫之婦覿見也禮大夫不見夫人不言及不正其行婦道故列數之也男子之一贄羔鴈雉腒贄所以至者也上大夫用羔取其從羣帥而不黨也下大夫用鴈取其知時飛翔有行列也士冬用雉夏用腒取其耿介交有時別有倫也腒腊也雉必用死爲其不可生膳也夏用腒備腐􅆨也婦人之贄􅀥栗腵脩􅀥取其早自矜莊栗取其敬栗腵􅁱取断断自脩整用幣非禮也用者不冝用者也大夫國體也國體謂爲君股肱而行婦道惡之故謹而日之也公羊傳莊公曰戊寅大夫宗婦覿用幣宗婦者何大夫之妻也覿者何見也用者何用者不冝用也不冝用幣爲贄也見用幣非禮也以文在覿下不使齎見知非禮也然則曷用􅀥栗云暇脩云乎禮記外傳曰王者朝臣諸侯之朝臣非南面之尊地不成國德不比玉故不執玉􅀌卿執皮帛虎豹之皮與束帛天子之􅀌卿少師少傳少保卿執羔天子六卿即諸侯之上大夫羔取其不乱羣大夫執鴈鴈飛有行列士執雉雉性剛有死節夏執乾雉餘三時皆執死雉工啇執鷄鷄司而鳴庶人執鶩鶩家鴨不逺飛庶人不出郷諸侯太子非天子所命者有列㑹之事則執皮帛繼子男之下婦人􅀄見舅姑執榛栗􅀥脩脯􅀥進於姑榛栗進於舅也執贄幣相見相敬也白虎通曰臣見君有贄者何䞇者質巳之誠王者縁臣子心以爲之制差有尊卑以副其意也公侯以玉爲質玉者取其燥不輕濕不重明公侯之德全也卿以羔爲贄羔者取其羣而不黨卿職在盡忠率下不黨大夫以鴈爲贄者取其飛成行列大夫職在奉命適四方動作當能自正以事君也士雉爲贄者雉取不可誘之以食脅之以威必死不可畜士行耿介守節也又曰公執玉取其暢逹也卿執羔取其跪乳有禮也書曰五玉三帛二牲一死贄又曰至正月朔日乃執贄而朝賀正月何歳竟氣改興新長相保重夲正始也羣臣贄賀其君父之五經異義曰謹按周禮􅀃五玉贄自􅀌卿以下執禽尊卑有差也禮不下庶人工啇又無朝儀五經無朝義五經無􅀃庶人工啇有贄穆天子傳曰天子賔于西王母乃執白珪􅀇璧以見西王母執䞇致敬献錦組百純􅀃苑曰鶩無他心故庶人以爲贄也太平御覽卷第五百三十九
