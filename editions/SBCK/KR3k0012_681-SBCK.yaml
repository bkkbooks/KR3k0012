front:
  text: 太平御覽卷第六百八十一儀式部二
  hash: sha256:4defbca01ad0acfe985cacbdf7f000ed8691d57af8c040239f335bcd372a22c1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_681-1a}
body:
  text: 鹵簿班劒棨㦸節鹵簿漢官儀曰漢乗輿大駕儀公卿奉引太僕御大將軍叅乗屬車八十一乗備千乗萬􅀐法駕公儀公卿不在鹵簿中河南尹執金吾洛陽令奉車都尉侍中叅乗屬車三十六乗蔡邕獨斷曰天子出車駕謂之鹵簿有大駕有小駕上所乘曰金根車駕六馬五色安車五色立車各一皆四馬是爲五時副車俗人號之曰五帝車非也又曰前驅有九旒雲罕闟㦸皮軒鑾旗車皆大夫載鑾旗者編羽毛列繫憧旁俗人名之曰鷄翹車非也後有金䤠黄􅃏黄門鼓車又曰古者諸侯貳車九乗秦㓕六國兼其服故大駕屬車八十一乗又曰凢乗輿車皆羽蓋金華􅀲黄屋左纛金鑁亡范切方釳繁纓重轂副鎋黄屋者蓋以黄爲裏也左纛者以􅈊牛尾爲之大如斗在最後左騑馬頭上金鍐者馬冠也髙廣各五寸上如三華形在馬髦前方釳者䥫也廣數寸在馬髦後有三孔垂翟尾其中繁纓在馬膺前重轂者轂外復有小轂施轄晉諸公賛曰賈后女宣華公主塟皆羽葆皷吹熊渠次飛爲鹵簿晉書曰帝自鄴還洛河間王顒將張方遣三千􅀐奉迎將渡河橋方又以新乗陽燧車青蓋三百人爲小鹵簿迎帝至邙山下又曰王浚都督幽州和演欲殺浚并其衆演與烏丸單于審登謀之於是與浚期遊薊城南清泉水上薊城内西行有二道演浚各從一道演與浚欲合鹵簿因而圖之值天􅁀雨兵器霑濕不果而還單于由是與其種人謀曰演圖殺浚事垂克而天卒雨使不得果是天􅂇浚也違天不祥我不可乆與演同乃以謀告浚浚宻嚴兵夜與單于圍演演持白幡詣浚降浚遂斬之又載記曰石季龍常以女􅀐一千爲鹵簿皆着紫綸巾熟錦袴金銀鏤帶五丈織成鞾遊于戯馬觀上安詔書五色在木鳯之口鹿盧逥轉狀􅀂飛翔焉宋書曰孝武舉義兵沈慶之有功􅀄慶之甞夣引鹵簿入厠中慶之甚􅁖入厠之鄙時有善占夣者爲解之曰君必大冨貴然未在旦夕問其故荅云鹵簿故是冨貴容厠中所謂後帝也知君冨貴不在今主及中興之功自五校至是而登三事又曰宋劉韞字彦文歷湘雍二州刺史令􅀞工圖鹵簿羽儀常自披翫以示蔡興宗興宗佯不知指韞所􅀞形云是誰韞曰是我也其庸如此又曰顔延之子竣旣貴重權傾一朝凢所資供延之一無所受器服不改居宅如舊常乗羸牛車逢竣鹵簿即屏住道側又曰文帝鎮江陵王華爲西中郞主簿諮議叅軍文帝未親政事悉委司馬張邵華性尚物不欲人在巳前邵性豪毎行來常引夾轂華出入乗牛車從者不過兩三人以矯之常相逢華陽􅀂不知是邵謂左右曰此鹵簿甚盛必是殿下乃下牽車立於道側及邵至乃驚齊書曰虞悰遷太子右率永明八年大水百官戎服救太廟悰朱衣乗車鹵簿於宣陽門外入行馬内駈逐入􅀍奏見原又曰陳顯逹建武世心懷不安􅀷自貶退車乗朽故導從鹵簿皆用羸小梁書曰朱异起宅東陂窮采功晚曰麗来下酣飲其中毎迫曛黄慮臺門將闔乃引其鹵簿自宅至城使捉城門停留管籥又曰吕僧珎爲兖州刺史姉適于氏住市西小屋臨路與列肆雜僧珎常導從鹵簿到其宅不以爲恥南史曰王僧孺爲尚書右丞僧孺少􅀌貧與母鬻紗爲業母甞携之至市道遇中丞鹵簿驅迫墜溝及是拜日引騶清道悲感不自勝陳書曰長沙王叔堅與始興王叔陵並招聚賔客各争權寵甚不平毎朝㑹鹵簿不肯爲先後必分道而趍左右或争道而闘至有死者隋書曰晉氏鹵簿御史軺車行中道班劒晉公卿禮祑曰諸公及開府位從公者給虎賁二十人持班劒晉中興書曰大和元年詔曰㑹稽王其以爲丞相給羽葆鼓吹班劒六十人宋書曰張敬兒加開府儀同旣得開府又望班劒語人曰我車邊猶少班䦨物又曰大明元年制大臣加班劒者不入宫城門㤗豫元年班劒依舊入殿徐邈奏議曰東宫班劒議者不處數案公卿故事給虎賁二十人持劒安平獻王加青盖九旒前後鼓吹虎賁亦二十人依准此數東宫班劒當不過二十棨㦸漢書曰韓延壽在東郡殖羽葆鼓車功曹引車皆駕駟馬載㦸五􅀐爲伍東觀漢記曰王郞遣諌議大夫杜威持節詣軍門上遣棨㦸迎延請入軍威稱􅀃實成帝遺體子輿也上曰設使成帝復生天下不可復得況詐子輿乎又曰建武元年杜詩爲侍御史安集洛陽時將軍蕭廣放縱兵士􅁀横民間詩勑曉不改遂格殺廣還以􅃺聞上召見賜以棨㦸復使之河東誅降逆賊楊異等漢雜事曰奉車都尉竇固征匈奴􅀐都尉秦彭副令彭別屯彭擅斬軍司馬固奏彭不由督率專賊殺人公卿議皆以爲固議是公府􅁺郞躬以爲彭得斬人上曰軍正校尉一統督將何以得專殺躬對曰一統將者謂在部曲也今彭別將軍事至急勢不得􅀜督漢制假棨㦸以當斧􅃏議者皆屈上從之呉志曰孫權拜諸葛恪撫越將軍領丹陽太守棨㦸武􅀐三百拜軍令作鼓吹導引歸家時年三十二又曰陸遜字伯言少爲孫權帳下右部督授棨㦸督㑹稽鄱陽丹陽三郡晉書曰羊祜在軍頗以畋漁廢政甞欲夜出軍司徐胤執棨當營門曰將軍都督萬里安可輕出今曰胤死此門乃開爾祜改容謝之此後稀出宋書曰王曇首領驍􅀐將軍元嘉四年車駕出北堂使三更竟開廣莫門南臺云應湏白獸幡銀字棨不肯開門尚書左丞羊玄保奏免御史丞傳隆已下曇首曰旣無異勑又闕幡棨雖稱上㫖不異單刺其不請白獸幡銀字棨致開門不時由尚書相承之失亦合糺正上特無問更立科條唐書曰龍朔中左衛大將軍范陽郡公張延師東夷都護儉弟也與兄太僕卿大師次兄儉同時三品宅中棨㦸齊列時號三㦸張家又曰徐泗節度李愿奏請換㦸有司以官㦸五年一換私家不在昜限詔以李晟忠勲之家特許之又曰吕諲爲相有司送㦸至宅諲釋􅃤服以受之時譏其失襄陽記曰李衡字叔平爲丹陽太守孫休加威逺將軍授以棨㦸荆州先賢傳曰羅獻字令則以泰始三年進位冠軍假節増鼓吹棨㦸崔豹古今注曰殳㦸前驅之器也以木爲之後世僣僞無復典刑以亦油韜之赤謂之油㦸亦曰棨㦸公主以下通之以前驅王昶謝棨表曰復假臣棨光榮照赫非臣怯弱所當荷受節􅀃文曰節信也象相合之形釋名曰節者號令賞罰之節也後漢書注曰節所以爲信以竹爲之長八尺以旄牛尾爲眊三重周禮地官下掌節曰掌守􅀖節而辯其用以輔王命􅀖節者鎭圭牙璋􅂖圭也王有命則別其節之用以授使者輔王命執以行爲信守􅀖國者用玉節守都鄙者用角節角用犀角其制未聞凢􅀖國之使節山國用虎節􅁟國用人節澤國用龍節皆金也以英蕩輔之杜子春云凾器盛此莭或曰英蕩書凾也􅀜門用符節貨賄用璽節道路用旌節皆有期以反命門關司門司􅀜也貨賄者主通貨符節宫中諸官府也壐節者今之印章也旌節者今使者所權也凢通逹於天下者必有節以傳輔之無節者有幾則不逹禮記玉藻曰凢君召以三節二節以走一節以趍節所以明信輔君命也使使召臣急則持二緩則持一傳曰宋襄夫人襄王之姉也昭公不禮焉昭公適祖母夫人因戴氏之族華樂皇皆族戴以殺襄王之孫孔叔公孫鍾離及大司馬公子卬皆昭公黨也司馬握節以死故書以官節國之符信也握之以死示不廢命公羊傳哀公曰齊景公謂陳乞曰吾欲立舎何如陳乞曰君欲立請立之陽生謂陳乞曰聞子將不立我也陳乞曰夫千乗之主將廢正而立不正必殺正者吾不立子者所以生也與之玉節而走之節信也折玉與陽生留其半爲後當迎之合以信防稱矯也景公死而舎立陳乞使人迎陽生史記曰􅀽盎使呉呉王囚之盎解節毛懷之遂歸報呉楚巳破漢書曰劉章巳殺吕産帝令謁者持節勞章章欲奪節謁者不肯章廼從與載因節信持斬長樂衛尉吕更始因謁者所持之節用爲信還入北軍復報太尉勃勃賀章曰所患獨産今巳誅天下定矣又曰呉王反周丘者下邳人亡命於呉酤酒無行王薄不任周丘乃上􅀃王曰臣以無能不得待罪行間臣非敢求有所將也願請王以一漢節必有以報王廼與之周丘得節夜持入下邳至傳舎召令斬之遂召昆弟所善豪吏一夜得三萬人又西域傳曰􅀄公主侍者馮嫽音繚能史書習事常持節爲公主使行賞賜於城郭諸國敬信之號曰馮大夫又曰蘇武使匈奴單于乃徙武北海上武仗節牧羊卧起操持節毛盡落又曰戾太子誅江充􅀄漢節純赤以太子持赤節故更爲黄毛加上以相别又曰張騫使月氏匈奴得之謂曰吾欲使越漢肯聽我乎留騫十餘歲予妻有子然騫持漢節不失又曰諸葛豐字少季爲司校尉㓨舉無所避侍中許章以外屬貴幸賔客犯事與章相連豐案劾章欲奏其事適逢許侍中私出豐駐車舉節詔章曰下欲収之章馳車去豐追之許因得入宫門自歸奏於是収豐節司􅈻去節自豐始也又南越傳曰遣韓千秋入越越以兵擊千秋等滅之凾封漢節置塞上好爲慢辭謝罪又匈奴傳曰漢使王烏等窺匈奴匈奴曰漢使不去節不以黒黯其面不得入穹廬王烏北地人習胡俗去其節黯靣入穹廬單于愛之又曰王莽簒位皇孫功崇公宗􅀍誅宗姉妨爲衛將軍王興夫人祝祖姑􅀍殺婢以絶口事發覺事連及司命孔仁妻亦自殺仁見莽免冠謝莽使尚書劾仁乗乹車駕坤馬左蒼龍右白虎前朱鳥後玄武右仗威節左􅀒威斗號曰赤皇非以驕仁乃以尊新室之威命也仁擅免天文冠大不敬有詔勿劾更易新冠其恠如此荀恱漢紀曰征和二年長安擾亂言太子反任安受太子節懷二心􅆎斬續漢書曰鮑永爲更始大將將兵安集河東赤眉害更始三輔道絶世祖即位遣諌議大夫儲大伯持節徴永永疑爲不審収繫大伯封節傳舎壁中遣人持至長安知更始審亡即發䘮出降東觀漢記曰光武拜岑彭爲刺姦大將軍督察營衆授以常所持節從平河北又曰郭丹爲更始諌議大夫更始敗諸將軍悉歸上普獲封爵丹無所歸節傳以弊布􅆞褁節合如擔晝伏夜行詣更始妻子奉還節傳因歸郷里又曰永平中遣鄭衆北使匈奴衆因上言臣前奉使不爲匈奴拜單于恚恨遣兵圍臣令復御命必見凌折臣誠不忍持大漢節對氊裘獨拜如今匈奴遂能服臣將有損大漢之強上不聽又曰温序字次房遷護羗校尉爲隗􅅝別將荀字所拘刼序素氣力大怒叱宇等曰虜何敢迫脅漢因以節撾殺數人宇曰此義士可賜以劒序受劒衘􅂡於口頋左右曰旣爲賊所迫殺無令􅂡汚地遂伏劒而死張璠漢記曰董卓謂􅀽紹曰劉氏種不足復遺紹勃然曰天下徤者豈唯董公横刀長揖徑出懸節於上東門而奔兾州獻帝春秋曰太傳司馬日磾假節循撫州郡􅀽術在壽春借節觀之因奪不還日磾失節憂恚而死魏書曰鎮北將軍劉静卒朝廷以許允代静巳受節傳丗止外舎大將軍與允書曰鎭北雖少事而都典一方念足下震華鼓建朱節歷夲州此所謂着繡晝行也允心甚恱又曰桓範黄􅀄中爲洛陽典農中郞將使持節都督青徐諸軍事治下邳與徐州刺史芻歧争屋引節欲斬歧爲歧奏不直坐免呉書曰婁圭字子伯􅀄依劉表後歸曹公曹公向荆州表子琮降以節迎曹公諸將皆疑曹公以問子伯子伯曰天下撓攘皆貪王命以自重今以節來必至誠公善之晉書曰石苞遷徐州刺史文帝之敗於東􅀜也苞獨全軍而返帝指所持節謂苞曰恨不以此授卿以究大事又曰京師危逼王澄率衆軍將赴國難而飄風折其節柱又曰何無忌自豫章拒盧循軍敗握節受害王隠晉書曰叚疋磾降石勒常着朝服持晉節勒亦不問晉中興書曰廣州人背刺史郭訥迎王機遂入廣州訥乃持節出機就訥求節訥曰昔蘇武不失節人以爲羙今寧可以與賊乎義不可得相與自可遣兵來取之機慙而止又曰王機簒廣州懼王敦來討杜㢰在鬰林與機結好機勸㢰取交州㢰至機執節曰節當相與迭持何可獨捉機遂以節與㢰後並爲陶侃所殺晉永昌起居注曰元帝使司空王導距王敦詔曰以吾征東時節給司空晉令曰使信節皆鳥書之唐書曰頴王璬爲劒南節度大使時玄宗將幸蜀璬赴藩卒遽不遑受節或􅀃假大槊油囊􅂪之璬曰但爲眞王何用假節漢武内傳曰西王母降殿前有五十大仙童執綵旄之節俗􅀃曰殷伯弟爲何無忌叅軍在㝷陽與何共樗蒲得何百便住何守請求贖决不聽何大怒罵殷曰戇子敢爾取節來殷猶慠然謂何曰朝廷授將軍三千􅌡兵狗頭節以威蠻獠乃復擬議國士異事何便令百人収殷付獄中兵歌嘯自若經一日遂置恚太平御覽卷第六百八十一
