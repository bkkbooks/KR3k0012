  text: 太平御覽卷第八百五十八
  hash: sha256:61c5250aa7c5f46982af57142ba633e2f0a4b1c7b5c11582ecbb2c733a1882a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_858-1a}
body:
  text: 飲食部十六酪酥附䬫餬䬫音低通俗文曰煴羊乳曰酪酥曰䬫餬釋名曰酪澤乳汁所作使人肥澤漢書曰武帝太􅀄元年更名家馬爲桐馬應劭曰主乳馬取其汁桐治之味酢可飲因以爲官如淳曰桐音筩主乳馬以韋革爲夾兠受數斗咸馬乳桐取其上肥因名曰桐馬今梁州亦名馬酪爲馬酒晉灼曰桐音揵桐之桐又曰丞相孔光奏省樂官七十二人給太官桐馬酒李竒日以馬乳爲酒也撞桐乃成又曰烏孫公主歌曰以􅁏爲食兮酪爲漿又曰王莽時飢教民煑木爲酪不可食重爲煩擾受日木實爲酪也或曰如令餌木屬後魏書曰神瑞二年秋榖不登太史令王亮等言䜟書云國家當都鄴大樂五十年勸帝遷都可救今年之飢帝以問崔浩浩曰非長乆之䇿也今留守舊都十分家南從不便水土疾疫死傷情見事露則百姓意阻四方聞之有輕侮之意今居北方至春草生乳酪將出兼有菜果足接來秋可不遷都也又曰臨淮王潭孫孚持白武幡勞河那瓌於柔玄懷荒二鎮間河那瓌衆号三十萬隂有異意遂拘留孚載以輼車日給酪一􅂛􅁏一叚唐書曰髙宗朝太僕以患疥馬乳造酪供進署承罪當死上特免之晉太康起居注曰尚書令荀朂嬴毀賜乳酪太官隨日給之漢武内傳曰西王母曰次藥有太􅀇之酪西河舊事曰祁連山冝牧牛羊羊肥乳酪奸不用器物刈草着其上不解散一斛酪外餘酥鄴中記曰并州之俗以冬至後百五日介子推斷火冷食作醴酪煑粳米或大麦作之又投大麥於其中酪擣杏子人煑作之亦投大麥中郭子曰王武子有數斛羊酪指示陸機曰卿東呉何以敵此機曰千里蓴羹未下塩䜴世􅀃曰楊德祖爲主簿侍坐人有餉酪者魏武噉少許乃題上作合字致坐中人並不解脩即噉之云公教令人一口復何疑又曰陸太尉詣王丞相公食之以酪陸還遂病明日有牋與王曰昨食酪過通夜委頓民雖呉人幾爲傖􅀑􅀏林曰吳人至京師爲設食者有酪酥未知是何物也強而食之歸吐遂至困顧謂其子曰與傖人同死亦無所恨汝故冝愼之魏文帝集載鍾繇書曰屬賜甘酪及櫻桃孫楚祠介子推祝文曰􅀥飯一盤醴酪二盂清泉甘水充君之厨傳咸集楊濟與咸書曰酥治瘡上急范汪祠制曰仲夏薦杏酪慕容晃與顧和書曰今致䬫餬十斤唐書曰武德二年凉州刺史安脩仁獻百年酥云餌之可延壽太平御覽卷第八百五十八
