front:
  text: 太平御覽卷第四百三十二
  hash: sha256:d73aa2bed6e4d98f952a3b1092712411f1457ce85bc6c45bad2ea5009cf0b875
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_432-1a}
body:
  text: 人事部七十三慈愛恭敬智聦敏強記慈愛􅀃文曰慈愛也釋名曰慈字也韓詩外傳曰夫爲人父者心懷慈仁之愛以畜飬之愛子不詈髦子不笞禮記學記曰夫慈者所以使衆也左傳昭五年曰子産卒仲尼聞之出涕曰古之遺愛孝經援神契曰母之於子也鞠養殷勤推􅏫居濕絶少分甘宗均曰少則自絶甘則分家語曰孔子曰明君心寛􅁉以容其民慈愛以優柔之漢書曰翟方進少爲郡小吏號遲鈍因病歸欲遊學後母慜其志而怜其㓜隨之長安織履以給之謝丞後漢書曰楊彪子循爲曹操所殺後見彪問曰公何瘦之甚對曰愧無日磾先見之明猶懷老牛䑛犢之愛操爲之改容列女傳曰魏孟陽之女芒夘之後妻也有三子前妻之子有五人皆不愛慈母前妻中子犯魏王令罪當死慈母憂感悲哀帶因減赤人有謂慈母曰人不愛母何爲憂懼勤勞如此母曰其父爲其􅀌也而使妾爲之繼母如爲人母而不能愛其子何謂慈乎魏王聞之髙其義赦其子而復其家自此之後五子親侍慈母老子曰吾有三寳一曰慈韓子曰愛子者慈於子重生者慈於生䝿功者於事仁淮南子曰堯立孝慈使民如子弟􅀃􅁐曰魏文侯封太子摯於中山三年使不徃來舎人趙倉唐曰爲人子三年不聞父問不可謂孝爲人父三年不聞子問不可謂慈臣願奉使侯何所好太子曰侯􅄝晨鳬好北犬倉唐􅔗北犬奉晨鳬文侯賜太子衣一襲令以鷄鳴時致之太子發筐視衣盡顛倒太子曰趣具駕君侯召我也唐來不受太子曰詩曰東方未明顛倒衣裳顛之倒之自公召之遂西至文侯大喜倉唐一使文侯爲慈父摯爲孝子潘岳西征賦曰夭赤子於西安坎路側而瘞之亭有千秋之號子無七日之期雖逸厲於延呉實潜慟於余慈蔡邕書曰邕薄祐早䘮二親年踰三十􅁂髮二色叔父親之猶􅀂㓜童陸則對􅚋食則比豆恭敬􅀃文曰恭肅也釋名曰恭供也自持也亦言供給事人敬警也易小過卦曰山下有雷小過君子以行過於恭取過於禮而不爲害易繫辭曰君子致恭以存其位易文言曰敬以直内義以方外敬義立而德不􅀌尚書五子歌曰居民上者奈何弗敬毛詩小弃曰唯桑與梓必恭敬止又曰敬之敬之天惟顯思大戴禮曰昔禹見耕者五偶而式過十室之邑則下爲秉德之士存焉又曰昔武王踐祚入於户未甞越履徃來過之不履影禮記曲禮曰君子恭敬蹲節退讓以明禮又檀弓上曰􅀳獻公將殺其丗子申生公子重耳謂之曰子盍言子之志於公乎丗子曰不可君安驪􅁎是我傷公之心也曰然則盍行乎丗子曰不可謂君謂我欲殺君也天下豈有無父之國哉吾何行如之使人辭於狐突曰君老矣子少國家多難伯氏不出而圖吾君圖謀伯氐茍出而圖吾君申生受賜而死再拜稽首乃卒是以爲恭丗子也又少儀曰賔客主恭􅀕祀主敬又樂記曰中正無邪禮之質也莊破恭順禮之制也又哀公問曰敢問何謂敬身孔子對曰君子過言則民作辭過動則民作則君子言不過辭動不過則百姓不令而恭敬如是則能敬其身能敬其身則能成其親矣又經解曰恭儉莊敬禮教也左傳宣上曰􅀳靈公不君趙宣子驟諌公患之使鉏麑賊之晨徃寢門闢矣盛服將朝尚早坐而假寐麑退而歎曰不忘恭敬民之主也賊民之主不忠觸槐而死又襄四年曰季氐以公鉏爲馬正賈逵曰馬正家司馬愠而不出閔子馬見之閔子馬曽大夫閔馬父也曰爲人子者患不孝不患無所恭敬父命何常之有公鉏然之敬恭朝夕恪居官次又昭二曰正考父佐戴武宣三人皆宋君也三命滋益恭三命上郷故其鼎銘云一命而僂再命而傴三命而俯俯恭於傴傴恭於僂循墻而走言不敢安行也亦莫余敢侮論語曰恭近於禮逺耻辱也又曰司馬牛憂曰人皆有兄弟我獨亡子夏曰啇聞之矣死生有命冨貴在天君子敬而無失與人恭而有禮四海之内皆兄弟也又曰樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可弃又曰子禽語子貢曰子之爲恭也仲尼豈賢於子乎家語曰孔子曰恭則近禮堯舜篤恭以王天下又曰顔淵將西遊宋問孔子曰何以爲身子曰恭敬而巳矣恭則近於禮忠敬則人愛史記曰子路爲蒲大夫辭孔子孔子曰蒲多壯又難治然則吾語汝恭以敬可以執勇漢書曰萬石君石奮其父趙亡徙温髙祖東擊項籍過河内時奮年十五爲小吏髙祖與語愛其恭敬奮積功勞孝文時太中大夫恭勤過宫闕門必下車趍見路馬必式子孫爲小吏來歸謁萬石君必朝服見之魏略曰常林少單貧帶經耕鋤其妻自擔餉餽之林雖在田野其相敬過於賔客呉書曰顧悌字子通待妻子有禮常夜入晨出希見其靣常疾篤妻出看之悌命左右自扶起冠幘王隱􅀳書曰􅁃衮執事有恪與弟子治藩跪而受條其人曰今在隱屏先生胡不踞衮乃揖而延之正席而坐吿之曰何以幽顯易其操者乎樊英别傳曰英甞病卧便室中英妻遣婢拜問英荅拜或問之英曰妻齊也􅀃􅁐曰魯有恭士名曰机泥行年七十其恭甚益冬日行隂夏日行陽一食之間三起見衣裘􅄄之士則爲之禮魯君問曰机子年甚長矣不可釋恭平泥對曰君子好恭以成其名小人學恭以除其刑斧鑚加於泥者何釋恭爲又曰趙簡子乗弊車瘦馬衣設羊裘其宰諌曰車新則安馬肥則徃來疾狐格之裘温且輕簡主曰吾非不知吾聞君子服美則益恭小人服美則益倨我以自俻恐有小人之心也智易繋辭曰智周乎萬物而道濟天下禮記中庸曰舜其大智也與舜好問而好察邇言論語公冶長曰寗武子􅀖有道則智􅀖無道則愚其智可及其愚不可及也寗武子衛大夫􅇞俞又雍也曰智者樂水又曰智者動爾雅曰歫齊州以南戴曰爲丹穴丹穴之人智史記􅁗使王稽於魏知范雎賢載入秦至湖穰侯至勞稽曰君得無與諸遊子俱來稽曰不敢即別去睢曰吾聞穰侯智士也其見事遲向者疑車中有人忘索之於是下車走行十餘里果使􅀐還索車中無人乃止又曰摴里子名疾秦惠王弟也滑稽多智秦人號曰智囊又曰􅄯錯以辯得幸太子太子家號曰智嚢又曰項王謂漢王曰天下匈匈數歳者徒以吾兩人耳願與漢王挑戰决雄雌漢王􅀏謂曰吾寧闘智不闘力漢書曰陳嬰者東陽令史也少年殺其令相聚邑中從之者得二萬人欲立嬰爲王嬰母謂曰吾爲乃家婦聞先故未曽貴今􅁀得大名不祥不如有屬成猶得封侯事敗易以亡亡爲世所指名也嬰乃不敢爲王范曄後漢書曰魯恭祖父匡王莽時羲和有權數號曰智囊于寳􅀳紀曰桓範出赴曹爽宣王謂蔣濟曰智嚢徃矣􅀳中興書曰王允之字淵猷年在揔角從伯敦深智之甞夜飲允之辭醉先眠時敦將謀作逆因允之醉別牀卧夜中與錢鳯計議允之巳醒悉聞其語恐或疑便於眠處大吐衣靣並汚鳯旣出敦果照視見其眠吐中以爲大醉不復疑之華陽國志曰任文孫字文公閬中人􅀄武檐山石折文公曰噫西方智士死吾其應之遂卒益部爲之諺曰任文公智無􅀟文子曰神者智之淵也神清則智明智者心之府也智公則心平莊子曰巧者勞智者憂尹子曰兩智不能相救兩貴不能相臨兩辯不能相屈力均勢敵故也啇君書曰智者見於未萌申子曰智均不相使力均不相勝吕氏春秋曰目之見也籍於照心之智也籍於重淮南子曰智之以智權者人英也又曰禆諶出而智公成子産之事新序曰魏文侯曰智士者國之器也國有智士則無諸侯之憂桓譚新論曰楊子雲何人耶荅曰才智開通能入聖道漢興以來未有此也論衡曰其智如傾其德如山智能之人湏三寸之舌一尺之筆以乃能自通又曰劉子駿漢朝智囊筆墨淵海􅀽子正書曰楊子曰莊周何人哉􅀽子曰太而不儉重而畏禍智人也孫卿智賦曰血氣之釋也志意之榮也百姓待之是謂君子之智聦敏論語公冶長曰子謂子貢曰汝與回也孰愈對曰賜也何敢望回回也聞一以知十賜也聞一以知二子曰弗如也吾與汝弗如也漢書曰桑弘羊雒陽賈人子以心計年十三爲侍中謝承後漢書曰應奉讀書五行並下九州春秋曰夏侯淵爲劉備所殺於陽平曹公自長安出斜谷至陽平俻拒險守峽王欲還出令曰鷄肋官屬不知所謂楊脩便曰夫鷄肋弃之可惜食之無所得以比漢中王欲還也引還呉志曰顧譚毎省簿書未甞下籌徒屈指心計盡發疑謬後魏書曰祖瑩字元珎十二爲中書學生􅀶士張天龍講尚書選爲都講生徒悉集瑩夜讀書勞倦不覺天曉催講旣切遂誤持曲禮卷上座􅀶士嚴毅不敢復還仍置禮於前誦尚書三篇不遺一字沈約宋書曰劉穆之内惣朝政外供軍旅决斷如流事無壅滯目覽辭訟手荅牋書耳行聽受口並酬應不相叅渉益部􅂄舊傳曰何祇􅀘成都令使人投筭祇聽其讀而心計不差升合其精如此費禕别傳曰于時戰國多事衆務煩猥禕識寤過人毎續書記粗舉目蹔視巳充其數接納賔客飲食嬉戯加之􅀶弈毎盡人之歡事不廢也董允代禕爲尚書令欲則禕之所行旬日之中事多紆滯允爲歎曰才力相懸􅀂此之逺􅀃􅁐曰昔鄒忌爲齊相稷下先生淳于髠之屬七十二人皆輕鄒忌爲設妙辭淳于三稱鄒忌三知之如應響淳于等辭詘而去故所以尚干將莫耶者貴於立斷也所以尚騏􅂹爲立至也是以聦明敏捷欲人之入也世􅀃曰魏武嘗過曹娥碑下楊脩從碑背上題曰黃絹㓜婦外孫韲􅍫魏武謂脩卿解不荅曰解魏武帝曰卿未可言待我思之行三十里乃曰巳得令脩别記所知脩曰黃絹色絲也於字爲絶㓜婦少女也於字爲妙外孫女子也於字爲好韲臼受辛也於字爲辤所謂絶妙好辤帝亦記之與脩同乃歎曰不如卿三十里世􅀃曰人餉食魏武帝一杯酪魏武噉少許盖頭題上爲合字以示衆莫之解次至楊脩使噉曰公教人一口何疑強記禮記曲禮曰􅀶聞強識謂之君子漢書曰上行幸河東甞云書一篋張安世憶記之後得書以相校無所遺失安世長子千秋爲中郎將將兵隨渡遼將軍范朋友擊烏桓還謁大將軍光光問千秋戰闘方略山川形􅀔千秋口對兵事􅀞地成圗無所忘失東觀漢記曰虞延字君大爲郡督郵光武東廵路由小黃髙帝母昭靈后園陵在焉詔呼延引見問園陵之事延占對可觀其陵株梓皆識其數爼豆犧牲頗暁其禮謝承後漢書曰應奉常從彭城相􅀽賀時出行閉治車師門内出半靣視奉奉即委去别後數十年於道路見車師識而呼之又曰呉郡陸續􅀄仕郡户曹史飢荒太守君興使續於都亭賦民饘粥續悉簡閱其人訊以名氏事畢興問所幾因􅀃六百餘人皆分别姓字無有誤謬又曰王充字仲任上虞人家貧無書常遊洛陽肆閱所賣書輙能誦憶􅀽山松後漢書曰荀淑與陳寔神交及其弃朗陵而歸也數命駕詣之淑御慈明從叔慈抱孫文􅀂而行寔亦令元方侍側季方作食抱孫長文而坐相對怡然甞一朝求食季方尚少跪曰髙聞大人荀君言甚善竊聽之甑壞飯成糜寔曰汝聽談解乎諶曰唯因令與二慈􅀃之不失一辭二公大恱典略曰延篤字叔堅南陽人􅀄從堂磎季度受春秋左傳借夲便諷魏志曰􅀄王粲與人共行讀道邊碑人問卿能誦否曰能即暗誦之不差一字觀人棊局壞粲爲復之碁者不信以帊盖局使更以他局爲之用相比校不誤一道其強記嘿識如此呉志曰朱桓強識與人一靣數十年不忘部曲妻子悉識之􅀳中興書曰陶􅋲明識過人武昌道上種楊栁人有竊之殖于其家侃見而識之問何以盗官所殖乎時以爲神益部􅂄舊傳曰張松識逹精異劉璋遣曹公楊脩以公所撰兵書示松飲讌之間一省即便闇誦禰衡别傳曰衡字正平黄射作章陵太守衡俱有所之見蔡伯喈所爲碑正平一過視之歎之言好後各歸章陵自恨不令使寫之正平曰吾雖一過皆識其所言唯第四行中石盡磨滅兩字不分明因援筆書之􅀄無遺失唯兩字不着蔡琰別傳曰琰字文􅁎邕之女年六歳邕鼔琴弦絶琰曰第一絃邕故斷其一絃問之琰曰第二絃邕故斷一絃琰曰第四絃世􅀃曰夏侯䇿魏文示其爵里刺一見之悉憶俗􅀃曰桓宣城䘮後家至貧孔夫人疾患湏羊解神不能得桓温以弟買得質羊羊主家富謂桓言僕乃不湏買得郎爲質但郎家貧幸可爲郎飬買得郎耳車􅀐冲也後江州出射堂射羊主東邊看射車􅀐猶識之呼來問公識我否荅云不識桓公曰我是昔日買得郎也太平御覽卷第四百三十二
