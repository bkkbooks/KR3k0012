front:
  text: 太平御覽卷第五十八
  hash: sha256:a0c416b2cdbd67f75472485636c88b9d9fb0fcd94c6b7be83c038a4f91870126
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_058-1a}
body:
  text: 地部二十三水釋名曰水准也平准物也廣雅同天下大水四謂之四瀆江河淮濟也瀆獨出其所而入海也易曰坎爲水潤萬物者莫潤于水又曰水洊至習坎又曰水流濕書曰水曰潤下潤下作鹹又曰􅀂渉大水其無津涯尚書大傳曰非水無以准萬里之平非人無以通逺道重任也詩曰相彼泉水載清載濁又曰􅃆彼流水朝宗于海又曰濟有深渉渡也深則厲淺則掲有弥済盈済盈不濡䡄盈冝濡不冝喻淫乱犯礼者也又曰就其深矣方之舟之方柎就其淺矣永之游之又曰毖彼泉水亦流于淇又曰瀏其清矣深皃河水洋洋北流活活溱與洧方渙渙兮春水盛又曰楊之水不流束薪不流束楚不流束蒲又曰泌之洋洋可以療飢言楽道也禮曰夫水一勺之多及其不測黿鼉蛟龍魚鱉生焉貨財殖焉又曰水之於人親而不尊又曰水無當於五色五色不得不彰又曰􅀕宗廟水曰清滌又曰水煩則魚鼈不大又曰小人溺於水君子溺於口夫水近於人而易以溺人同禮曰水有時以凝傳曰共工氏以水紀故爲水師而水名又曰潢汚行潦之水可薦於􅀑神可羞於王公又曰鄭子産謂子太叔曰唯有德者能以寛服民其次莫如猛火烈人望而畏之故鮮死焉水懦弱民狎而翫之則多死焉故寛爲難也春秋元命苞曰水之爲言演也隂化淖濡流施潜行也故其立字兩人交一以中岀者爲水一者數之始兩人譬男女言隂陽交物以一起也論語曰智者樂水又曰子在川上曰逝者如斯夫不舎晝夜爾雅曰水別流曰􅂀風吹水涌曰波大波曰濤小波曰淪平波曰瀾直波曰徑水朝夕而至曰潮風行水成文曰漣水波如錦文曰漪水行曰渉逆流而上曰沂洄順流而下曰泝游亦曰㳂流絶流而渡曰亂以衣渉水曰厲由􅂰以下爲掲由􅂰以上爲渉渡水處曰津済潜行水下爲泳漢書曰成帝建始三年秋京師民無故相驚言大水至天子親御前殿召公卿議大將軍鳯以爲太后與上及後宫可御舟舡令吏上長安城以避水群臣皆從鳯議左將軍王啇獨曰上古無道之國水猶不冒城郭今聖政和平世無變革上下相安何因當有大水一日􅁀至此必訛言也不冝令民上城重驚百姓上乃止有頃長安中稍定問之果訛言上於是壯啇之固守數􅁛其議而鳯大慙自恨失言後漢書東陽人趙炳字公河能越方禁與閩中徐登遇於烏傷溪水上禁小溪水不流又曰竇太后臨政竇憲兄弟各擅威􅁠丁鴻上封事曰夫壞崖破巖之水源由㳙㳙干雲蔽日之木起於葱蒨魏略曰漢火行忌水故去洛水而加佳魏爲土土水之母水得土而流土得水而柔故除佳加水晉書曰陸雲先是常着衰絰上舡於水頋見其影因大􅀏落水人救獲免又曰佛圗澄傳襄囯城壍水源在城西五里其水源􅁀竭勒問澄何以致水澄曰今當勑龍取水乃與弟子法首等數人至故泉源上坐縄牀燒安悉香呪願數百言如此三日水微流有一小龍長五寸許隨水來岀諸道士競往視之有頃水大至隍壍皆滿又曰鄧攸爲太乎中庶子呉郡闕守人多欲之帝以授攸攸載米之郡俸禄無所受唯飲呉水而巳又曰孫登性無恚怒人或没諸水中欲􅀚其怒旣岀便大􅀏齊書曰陸慧時爲征虜功曹與叅府軍沛國劉璡同從述職行至呉璡謂人曰呉間張融與陸慧並宅其間有水此水必有異味遂往酌而飲之唐書曰新豐鸚鵡谷水清代傳云此水清天下平開皇之􅀄暫清㝷濁至是而復清又曰乾元中嵐州上言合河􅀜黃河水四十里間清如井水經四日而變又曰楊朝晟爲邠州刺史奏方渠合不波皆賊路請城其地以俻之軍次方渠无水師徒嚚然遽有青虵乗髙而下視其跡水隨而流朝晟令築防環之遂爲渟泉軍人仰飲以足又曰孔􅀂思迁庫部郎中􅀂思常謂人仕至郎中足矣至是持一石止水滿於座右以示有止足之意老子曰上善􅀂水水善利万物而不争處衆人之所惡故幾於道列子曰禹治水􅁟迷之一國无風雨霧露不生鳥獸名曰終北有山名壷領頂有口􅀂圎環名曰滋穴有水涌出名曰神瀵􅆨過蘭椒味過醪醴又曰白公問扵孔子曰人可与微言乎孔子不應白公曰􅀂以石投水何如孔子曰呉之善没者能取之曰􅀂以水投水何如孔子曰淄澠之合易牙甞而知之白公曰人故不可与微言􅁘又曰人有濵河而居者習扵水勇扵泅操舟鬻渡利供百口裹粮就斈者成徒而溺死者幾半本斈泅不斈溺而利害如此莊子曰君子之交淡如水又曰秋水之至百川灌河流之大也两崖涘之間不辯牛馬言其廣於是河伯欣然自喜以天下之美尽在己矣又曰水之性不􅄂則清莫動則平又曰孔子􅀚扵吕梁懸水三十仞流沫三十里黿鼉魚鼈不能游見一丈夫游之数百歩而去又曰水之守土地審无意則止於分所以為審又曰水静則明燭􅁂眉大匠取法焉水静猶明而況聖人之心静乎又曰水之積也不厚其􅀒大舟也無力文子曰水之性欲清沙石穢之水之爲道也廣不可極莫知其言􅀷不可測長極无窮逺淪无涯息耗减益過於不訾涌出日息煎乾曰耗出川枝流曰减九野注之曰益過扵不訾者此過尾閭入大壑入无底谷又曰水濁者魚噞喁又曰混混之水濁可以濯吾足青青之水清可以濯吾纓又曰水之道也大不可極深不可測上天爲雨露下地爲潤澤又曰猶鑿渠而止水抱薪而救火墨水曰古語君子不鏡扵水而鏡扵人鏡扵水見面之容鏡扵人則知􅁻㓙管子曰水者地之血氣筯脉之流者故曰水之材也夫水淖溺以清好仁視之黒而白精也量之至滿至止正也流則至平義也人皆赴髙巳獨趍下卑也卑也者道之室王者之器也淮也者五量之宗素也者五色之質也淡也者五味之中也故水藏万物産金石故曰水神凢有五害水一也旱二也風霧雹霜三也厲四也䖝五也五害之屬水最爲大水有大小有逺迩水岀山而流入海命曰經水別於他水入扵大水及海者命曰枝水山之溝流於大水及海者命曰川水水出於地而不流者命曰渊水淮南子曰天下之物莫柔弱於水上天則爲雨露下地則爲潤澤万物弗得不生百事不得不成大苞群生而无所私澤及􅉥蹺􅉥蹺行也蹺微小之䖝也而不求報冨贍天下而不旣贍足也旣尽也德施百姓而不費徳澤加扵百姓不以爲己財費也行不可得而窮極也流膏不止微而不可得把握也擊之无創䠶之不傷斬之不断焚之不燃水之性也淖溺流遁錯繆相紛遁逸也錯繆相紛波相糾也而不可靡散利貫金石強濟天下水流缺石是其利也舟舡所載无有重是其強也済通也動溶无形之域而翶翔忽區之上忽慌之區上也言其飛爲雲􅀨无所不止邅廽川谷之間邅廽猶委曲也而滔騰大荒之野有餘不足與天地取與授万物而無所前後前後皆与之是故無所私而无所公公私一也靡濫振蕩与天地同鴻鴻大同通无所左而所右蟠委錯音􅎮與万物始終流轉是謂至德言水之爲德最大故曰至德也夫水所以能成其至德於天下者以其淖溺潤滑也故老聃之言曰天下至柔馳騁於天下之至堅出於无有入於无間是水也吾是以知无爲之有益有益扵生夫无形者物之大祖也无音者聲之大宗也无形生有形故爲物大祖也无音生有音故爲声大祖大宗皆大也其子爲光其孫爲水皆生于无形乎光無形道所貴也觀之故子爲光也水形而不可毀差之故孫爲形也夫光可見而不可握水可循而不可毀故有像之􅀋莫尊於水出生入死自无蹠有自有蹠无而以衰賤矣出生出生道謂去清浄也入死入死道謂情欲也蹠適也自无形􅃴有形離其本也自有形􅃴无形不能復得道家所以衰賤也是故清浄者德之至也而柔弱者道之要也要約虚而恬愉者万物之用也万物由之得爲人用粛然應感殷然反本則淪於无形矣所謂无形者一之謂也一者道之本也所謂一者无疋合於天下者也卓然獨立塊然獨處上通九天下貫九野九天八方中央也九野亦如之貟不中䂓方不中矩大渾而爲一弃无根言微妙也懷囊天地爲道開門開道之門穆忞隱閔純德獨存穆忞隱閔皆无形之􅀋也純不􅄂糅也布施而不旣用之而不勤旣尽也勤勞也又曰夫水之性􅀂拙其所流而深之茨其所决而髙也茨積土塡滿之也使得循势而行乗衰而流衰下雖有腐髊流澌弗能汙腐髊骨澌水也其性性非異也通之與不通也風俗猶此也誠决其善志防其邪心啓其善道塞其奸路与同出一道則民性可善而風俗迁矣又曰河水赤水遼水黒水江水淮水是謂六水白水冝玉黒水冝砥青水冝碧赤水冝丹黄水冝金清水冝􅀛汾水冝麻洛水䡖利冝禾渭水多力冝􅁰漢水重安冝竹箭又曰土地各以􅀋生人是故清水音小濁水音大湍水人䡖遟水人重又曰白水岀崑崙之原飲之不死又曰方諸見月則津而爲水又萬畢術曰方諸取水方諸形若杯无耳以五石合冶以十二月壬子夜半作之以承水即来抱朴子曰火岀於陽燧陽燧貟而火不貟也水岀於方諸方諸方而水不方又曰黃帝曰天在地外水在天外浮天而載地者水也又曰左慈以氣禁水水爲逆流一二丈禁水着中庭露之大寒不氷尸子曰凢水其方折者有玉其圎折者有珠清水有黄金龍渊有玉英顧子曰頋夷子與子華遊東池子華曰水有四德沐浴群生深流万丗是仁也􅀭淸激濁蕩去滓穢是義也柔而難犯弱而難勝是勇也道江䟽河惡盈流謙是智也孟子曰數􅅈不入汚池魚鼈不可勝食也数􅅈宻網也又曰民之㱕仁也猶水之就下也又曰仲尼亟稱於水曰水哉水哉何取於水也又曰原泉混混不舎晝夜盈科而後進放乎四海有本者如是也苟爲无本七八月之間雨集溝㑹皆盈其涸也可立而待也故聲聞過情君子耻之又曰性猶湍水也决諸東方則東流决諸西方則西流人性之无分於善不善也猶水之无分扵東西也人无有不善水无有不下也又曰仁之勝不仁也猶水之勝火也今之爲仁者猶以一盃水救一車薪之火也又曰􅀚於海者難爲水遊於聖人之門者難爲言􅀚水有術必􅀚其瀾瀾水中大波也孫卿子曰孔子􅀚於東流之水子貢問於孔子所以見大水必􅀚焉何也孔子曰夫水柔也而无爲也似徳其浩浩乎不屈似有道其赴百仞之谷不懼似勇主量必平似法盈不求槪似正發源必東似志是以君子見大水必􅀚焉大戴礼孔子家語並有太平御覽卷第五十八
