body:
  text: 偏霸部十三南齊蕭道成蕭􅄨蕭昭業蕭昭文蕭鸞蕭寳卷蕭寳融蕭道成蕭子顯齊書曰太祖髙皇帝諱道成字邵伯小字􅃲將漢相何二十四丗孫也何孫侍中彪免官居東海蘭陵郡於是爲蘭陵人太祖以元嘉四年丁卯􅀊生龍顙鍾聲鱗文遍體儒士雷次宗立學雞籠山年十三受業治禮記及左氏春秋襲爵晉興男江夏王大司馬參軍貟外侍郎直閣中書舎人右軍將軍㝷陽王子房反加輔國將軍師衆東討一日破十二壘轉冠軍將軍持節北討諸軍事鎭淮陰徴還遷督徐兖二州軍事南兖州刺史明帝常嫌太祖非人臣相民間流言云蕭道成當爲天子帝愈以爲疑遣鎭軍將軍呉喜以三千人北使令喜留軍破釡自將銀壷酒封賜太祖戎服出門迎即酌飲之喜還帝意乃悅七年徴還京師部下勸勿就徴太祖曰諸卿闇於見事主上誅諸弟太子稚弱作萬􅀊後計何􅀜他族唯應速發事緩必見疑今骨肉相害自非靈長之運禍難將興方與卿等戮力及還京拜散􅀐常侍太子右衛率時丗祖以功當别封贑縣太祖以一門二封固辭不受詔許之加二百户明帝崩遺詔爲右衛將軍領衛尉加兵五百人與尚書令􅀽粲護軍禇淵領軍劉勔共掌機事加侍中江州刺史桂陽王休範反出頓新亭以拒之加使持節平南將軍給鼓吹一部治新亭城壘未畢賊前軍巳至太祖方解衣髙卧以安衆心索白虎幡登西垣使寧朔將軍髙道慶羽林監陳顯達貟外郎王敬則浮舸與賊水戰自新林至赤岸大破之賊平振旅旋凱入百姓縁道聚觀曰全國者此公也遷散􅀐常侍中領軍都督二兖徐青冀五州鎭東將軍南兖州刺史進爵爲公増邑二千户與􅀽粲禇淵劉秉更日入直號爲四貴四年加尚書左僕射威名旣重蒼梧王深相猜忌幾加大禍陳太妃罵之曰蕭道成有功於國今􅀂害之後誰復爲汝著力者乃止楊玉夫等殺蒼梧王迎立順帝太祖移鎭東府進侍中司空録尚書事封竟陵郡公進太尉十二州諸軍事自大明太始巳來相承奢侈百姓成俗太祖輔政罷御省尚方諸飾玩至是又上表禁人間華僞雜物不得以金銀爲薄馬乗具不得作金銀渡不得作織成繡裙衣道路不得著錦履不得用紅色爲幡盖衣服不得剪綵帛爲雜花不以七寳飾樂器不得以金銀爲花獸不得輙鑄金銀爲像又進假黄􅃏都督中外諸軍事太傅領􅀭州牧劒履上殿入朝不趨賛拜不名署左右長史司馬從事中郎􅁺屬各四人大尉録尚書事南徐州如故三月進相國揔百揆封十郡爲齊公備九錫之禮加璽紱逺遊冠位在諸侯王上四月進爵爲王又命冕十有二旒建天子旌旗出警入蹕樂舞八佾辛卯宋使兼太保淵兼太尉僧䖍奉璽紱禪位建元元年四月甲午即位於南郊柴燎告天昇壇受禪禮畢即建康宫大赦改昇明三年爲建元元年封宋帝爲汝隂王五月汝隂王薨追謚爲宋順帝四年三月庚申有疾召司徒禇淵左僕射王儉曰吾遘疾弥留至于危篤公等奉太子如事吾當令太子敦睦親戚委任賢才崇尚節儉弘宣簡惠則天下之理盡矣壬戍崩于臨光殿年五十六謚曰太祖髙皇帝上少有大量􅀶渉經史善屬文雖經綸夷險不廢素業後宫器物欄檻以銅爲飾者改用䥫内殿施黄紗帳宫人著紫皮履欲以身率下移風變俗毎曰使我治國十年當使金土同價四月庚寅葬武進大安陵蕭頥蕭子顯齊書曰丗祖武皇帝諱頥字宣逺太祖長子也小諱龍兒生於建康淸溪宅其夜陳孝后劉昭后同夢龍據屋上故以字上􅀄爲㝷陽國侍郎辟西曹書佐出爲贑令尚書庫部桂陽王休範反上遣軍襲㝷陽事平除晉熈王諮議遷司徒右長史黄門郎散􅀐常侍江州刺史徴拜侍中領軍將軍給鼓吹一部又加持節都督京畿諸軍事僕射中軍大將軍開府儀同三司進爵爲公給班劒二十人齊國建爲丗子加侍中南豫州刺史給油絡車羽葆鼔吹以石頭爲丗子宫置二率坊有服章一如東宫進爲太子及太祖即位爲皇太子太祖崩上即位乙丑稱先帝遺詔以司徒禇淵録尚書左僕射王儉爲尚書令丙申立皇太妃王氏永明元年正月辛亥南郊大赦改元四年正月辛亥藉田禮畢甲寅幸閱武堂營酒小㑹十一年正月皇太子長懋薨甲午立太孫昭業爲皇太孫七月上不豫徙居迎昌殿始登階而屋鳴咤甚惡之戊寅大漸詔曰始終大期聖賢不免吾行年六十亦復何恨但皇業艱難萬機事重不能無遺慮耳太孫進德日茂社禝有􅀉子良善相毗輔思弘治道百辟庶條各奉爾職謹事大孫勿有懈怠知復何言又詔曰我識滅之後身著夏衣􅀞天衣純烏犀導路器服悉不得用寳物及織成常所服身刀長短二口鐵環者隨我入梓宫靈上勿以牲牢爲􅀕􅀕唯設䴵茶飲乾飯酒脯而巳喪禮每存省約不須煩民百官六時入臨又顯陽殿玉像諸佛及供飬具如别牒可盡心禮拜供飬自今公私皆不得出家爲道及起立塔寺以宅爲精舎並嚴斷之唯年六十必有道心者聽朝賢選序巳有别詔是日崩年五十四九月丙寅葬景安陵帝剛毅有斷爲治緫大體以冨國爲先頗不喜遊宴彫綺之事言常恨之未能頓遣詔凡諸遊煩宜從休息自今逺近薦獻務存節儉珠玉玩好傷工尤重嚴加禁絶蕭昭業蕭子顯齊書曰鬱林王昭業字元尚小名法身文惠太子長子也丗祖即位封南郡王文惠太子薨立爲皇太孫即位追尊文恵太子爲丗宗文皇帝隆昌元年正月大赦改元加太傅竟陵王子良殊禮閏月丁夘以鎭軍大將軍西昌侯鸞即本號開府儀同三司七月癸巳太后令嗣主特鍾沵氣爰表弱齡自入纂鴻業長惡滋甚居喪無一日之哀衰絰爲忻宴之服昏酣長夜萬機斯壅社稷危殆有過綴旒鎭軍居正體道家國是賴伊霍之舉實􅀉淵謨便可依舊典以禮廢黜中軍新安王體自文皇叡哲天秀冝入嗣洪業永寜四海外即以禮奉迎昭業少羙容止好􅀠書丗祖敕皇孫手書不得妄出以貴重之進對音吐甚有令譽王侯五日一問訊丗祖帝獨呼昭業至幄座别加撫問呼爲法身重愛甚文惠太子崩昭業毎臨􅂘輙號咷不自勝俄爾還内歡􅀏極樂在丗祖喪泣竟入後宫常列故伎二部入閣迎奏爲南郡王時文恵太子禁其起居節其用度昭業謂豫章王妃􅁃氏曰阿婆佛法言有福德生帝王家今日見作天子便是大罪左右主師動見拘執不如作市邊屠沽冨兒百倍矣及即位極意賞賜動百數十萬毎見錢曰昔時思汝一箇不得今用汝未朞年之間所岀諸庫儲錢數億垂盡開主衣庫與不逞群小又給閹人竪子各數人隨其所欲恣意輦取諸寳器以相剖擊破碎之以爲􅀏樂好鬬鷄密買雞至數千價丗祖御物甘草杖宫人寸斷用之毀丗祖招婉殿以封賜閹人徐龍駒爲齋龍駒尤親幸爲後閤舎人曰夜在宫房内昭業與文帝幸􅁎霍氏淫通龍駒勸長留内聲言度霍氏爲尼以餘人代之皇后亦淫亂齋閤通夜洞開内外淆雜無復分别壬辰使蕭鸞等率兵自尚書入雲龍門戎服加朱衣於上帝在壽昌殿聞外有變使閇内殿諸閹人登興光樓望報云見一人戎服從數百人在西鍾下須􅁷蕭鸞領兵先入帝走向愛􅁎徐氏房拔劒自刺不中以帛􅆞出殺之餘黨亦見誅卒時年二十二葬以王禮蕭昭文蕭子顯齊書曰海陵恭王昭文字季尚文惠太子第二子也封臨汝公鬱林王即位改封新安王及鬱林王廢尚書令西昌侯鸞奉帝纂統延興元年七月丁酉即位以尚書令鎭軍大將軍西昌侯鸞録尚書事揚州刺史封宣城郡公十月進爲太􅀓揚州牧如殊禮進爵爲王輔政帝起居皆諮而後行思食蒸魚菜太官令以無録公命不與辛亥皇太后令曰嗣主㓜冲庶政多昧早膺尫疾弗克負荷太􅀓宣城公宜入承寳命式寧宗祏帝可降封海陵王十一月稱王有疾數遣御師占視乃殞之時年十五謚曰恭王蕭鸞蕭子顯齊書曰髙宗明皇帝諱鸞字景栖始安貞王道生子也少􅀌太祖撫育恩過諸子宋丗爲安􅁻令有嚴能之名遷寧朔將軍淮南宣城二郡太守太祖踐祚遷侍中封西昌侯建武元年持節冠軍將軍郢州刺史丗祖即位轉度支尚書侍中領驍􅀐將軍王子侯舊乗􅆞帷車髙宗獨乗下帷儀從如素士遷中領軍左衛將軍豫州刺史尚書左僕射領右衛將軍武帝遺詔爲侍中尚書令加鎭軍中書監開府儀同三司海陵即位爲使持節都督楊南徐三州諸軍事揚州刺史鎭東城給五千人録尚書假黄􅃏中外都督加殊禮進爵爲王太后令廢海陵王以上入纂大位羣臣三請乃受命建武元年十月癸亥即皇帝位大赦改元戊子立皇太子寳卷賜天下爲父後者爵一級二年十月丁卯詔曰􅁤丗去奢事殷哲后訓物以儉理鏡前書朕思所以遷淳改俗反古移民可罷東田毀興光樓并敕水衡量省御乗永太元年四月甲寅改元大赦五月以太子中庶子梁王爲雍州刺史已酉崩于正福殿年四十七帝明審有吏才持法無所借大存儉約罷丗祖所起新林苑以地還百姓廢文帝所起太子東田賣之永明中輿輦舟乗剔去金銀還主衣庫太官進食有裹蒸帝白可四片破之餘充晚食丗祖掖庭中宫殿服御一無所改蕭寳卷蕭子顯書曰東昏侯諱寳卷字智藏髙宗第二子建武元年立爲皇太子髙宗崩太子即位永元元年正月大赦改元辛卯祀南郊詔二品清官以上應食禄者有二親或祖父母年登七十並給見錢二千貫二年八月甲申夜宫内失火十二月雍州刺史梁王起義兵於襄陽三年正月丙申合朔事畢與宫人於閱武堂元㑹皇后正位帝戎服臨視三月南康王寳融即皇帝位於江陵以太子左率李居士揔督西討諸軍事屯新亭九月義軍至南州輔國將軍申曹軍二萬人於姑熟奔歸丙辰李居士與義軍戰于新亭敗績十月冀青二州刺史桓和入衛屯東宫已邜以衆降光禄大夫張瓌先守石頭弃城奔還於是閇宫城自守李居士以新亭降軍築長圍守宫城十二月王珍國侍中張謏等帥兵入殿廢帝帝在東宫便好弄不喜書學及即位性重澁少言不與朝士接唯親信閹人日夜於後堂戯馬五更方卧至晡乃起漸出遊走屏逐居民從萬春門遊東宫以東至於郊外數十百里皆空家静室巷陌懸幔爲髙障置仗防之謂之屏除夜出晨反火光照天拜愛􅁎潘氏爲貴妃仍以金蓮帖地使妃行於其上曰此歩歩蓮花耶每岀妃乗卧輿帝􅀐馬從後着織成袴褶金薄帽執七寳􅆞矟戎服急裝不變寒暑凌冒􅀨雪不避坑阱馳騁渇乏輙下馬解取腰邊蠡器酌水飲之復上馬馳去選無賴小兒善走者爲逐馬左右百人常以自隨置射雉􅂣二百九十六處翳中帷帳及歩障皆祫縁以紅錦金銀鏤弩牙瑇瑁帖箭郊郭四民樵􅂫路絶吉凶失時􅓅疾弃屍不得殯葬後宫遭火之後更起仙華神仙玉壽諸殿刻畫彫彩麝香塗壁錦幔珠簾窮極綺麗又信􅀑神崔恵景事時蔣子文神爲假黄鉞使持節相國太宰大將軍揚州牧鍾山王以至尊爲皇帝迎神像及諸廟雜神皆入後宫禱祀祈福及聞兵入趨岀户閹人黄大刀傷其􅂰仆地曰奴反耶直後張齊斬首送梁王稱宣德皇后令依漢海昏侯故事追封東昏侯唐袐書監虞丗南公子先生論云公子曰宋齊二代廢主有五並驕淫狂􅁀前後如一或身􅀍殺戮或傾墜宗社豈厥性頑兇自貽非命將天之所弃用傾代業者乎先生曰夫木之性直匠者揉以爲輪金之性剛工人理以成器豈人事也唯上智下愚持禀異氣中庸之才全由訓習自宋齊以來東宫師傅備貟而巳貴賤禮隔規獻無由且多以位昇罕由德進善乎哉賈生之言昔者成王㓜在襁褓之中召公爲太保周公爲太傳太公爲太師保則保其身體􅀓則􅀓以德義師則導之教訓此三公之職也又置三少曰少保少􅀓少師是與太子宴者也故乃孩提有職三公三少同明者孝仁義禮以導習之遂去邪人不使見惡行選天下之儒士孝悌􅀶聞有道術者以翼衛之使與太子居處故太子生乃見正事聞正言行正道左右前後皆正人也習與正人居無不能無正猶生長齊地不能不齊言習與不正人居猶生長楚地不能不楚言也􅁗使趙髙􅀓胡亥教之獄訟所習者非斬劓人則夷人之三族也故胡亥今日即位明日射人有忠諌者謂之誹謗深計者爲之妖言視殺人如刈草菅然豈胡亥之性惡哉彼其導之者非其理也故選左右禆教之最急此五君者禀凡庸之性無周召之師逺益友之箴規狎不尚之近習以斯下質生而楚言覆國忘身理數然也蕭寳融蕭子顯齊書曰和帝諱寳融字智昭髙宗第八子建武元年封隨郡王永元元年改封南康王出爲荆州寧益梁南北􅁗七州諸軍事西平郎將荆州刺史蕭頴胄殺巴西梓潼二郡太守劉山陽奉王舉兵以雍州刺史蕭衍爲使持節都督諸軍事左將軍以蕭頴胄爲右將軍督行諸軍事夏侯亶自京師至江陵稱宣德太后令南康王冝纂成國祚光臨億兆方俟清宫未即大號可且封十郡爲宣城王加相國荆州牧又加黄鉞蕭頴胄爲左長史進號鎭軍蕭衍進號征東將軍巳已群僚上尊號中興元年正月乙已即皇帝位大赦改元以相國左長史蕭頴胄爲尚書令冠軍將軍蕭衍爲雍州刺史十二月建康平皇太后令以蕭衍爲大司馬録尚書事驃􅀐大將軍􅀭州刺史封建安郡公依晉武陵王遵承制故事百僚致敬二年正月皇太后臨朝入居内殿以大司馬蕭􅄛爲都督中外諸軍事殊禮進位相國揔百揆揚州牧封十郡爲梁公備九錫之禮逺遊冠位在諸王上二月進梁王爵爲王増封十郡建天子旍旗警入蹕三月景辰遜位于梁丁卯梁奉帝爲巴陵王徙姑熟戊辰薨年十五追爲和帝葬恭陵史臣曰夏以桀亡殷因紂滅郊天改朔理無延丗而皇符所集重興西楚神器蹔來雖有􅄀數徽名大號斯爲幸矣太平御覽卷第一百二十九
