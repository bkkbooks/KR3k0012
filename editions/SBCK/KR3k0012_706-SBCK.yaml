  text: 太平御覽卷第七百六
  hash: sha256:b3b30afe49587a7aeae8ca74f72f15a658e612c2a14e695e766912a76b12e772
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_706-1a}
body:
  text: 服用部八牀榻胡床牀許愼說文曰牀身之安也釋名曰牀裝也所以自裝裁也方言曰牀齊魯謂之簀陳楚之間謂之第音滓一音姊北燕朝鮮謂之樹􅁗晉之間謂之杠南楚趙東齊海岱之間謂之㯜音詵謂之北郊趙魏之間謂之牒易曰􅀄六剥牀以足篾貞凶象曰剥牀以足以㓕下也六二剥牀以辨篾貞凶象曰剥牀以辨未有與也六四剥牀以膚凶象曰剥牀以膚切近災也又曰巽在牀下象曰巽在牀下上窮也詩曰乃生男子載寢之牀禮曰曽子寢疾樂正子春坐於牀下曽元曽申坐於足童子隅坐而執燭童子曰華而睆大夫之簀與華盖也簀牀第也曽子曰然斯季孫之賜也我未之能易也元起易簀命元起也曽元曰夫子之病革音􅁄矣不可以變幸而至於旦請敬易之曽子曰尔之愛我也不如彼君子之愛人也以徳細人之愛人也以姑息吾何求哉吾得正而斃焉斯巳矣舉扶而易之反席未安而没左傳曰齊無知弑其君殺孟陽于牀注云陽小臣代公居牀事具逐門又曰楚子圍宋宋人懼使華元夜入楚師登子反之牀曰寡君使元以病告又曰夏子􅁃卒楚子使薳子慿爲令尹訪於申叔䂊叔䂊曰國多寵而王弱國不可爲也遂以疾辭方暑掘地下冰而牀焉重繭衣裘鮮食而寢楚子使醫視之復曰􅇤則甚矣而血氣未動乃使子南爲令尹周禮曰玉府掌王之袵席牀第國語曰晉獻公寢而不寐郤叔虎曰牀第之不安耶驪􅁎之不側耶戰國䇿曰孟嘗君至楚獻象牀郢之登徒直送之不欲行見孟嘗君門人公孫戍曰象牀之直千金傷此若髪標賣妻息不足以償足下能使僕無行先人有寳劒願獻之戍曰諾范曄後漢書曰􅀽術僣號人情離叛欲北至青州曹操使劉備邀之至江寕坐簀牀而歎曰􅀽術乃至於此乎歐血而死又曰向栩性卓詭常於竈北坐板牀上如是績乆板乃有膝踝足指之處又曰羊茂自季寳爲東郡太守冬日坐百羊皮夏月坐一榆木板牀􅂼食出界買塩䜴食之又曰薛淳爲漢中太守夏但坐板牀不設席冬坐羊皮河内高弘爲琅瑘相亦然也魏志曰陳登字元龍許汜與劉備並在荊州牧劉表坐汜曰陳元龍河海之士豪氣不除備問汜君言豪有事耶汜曰昔遭亂過下邳見元龍元龍無主客之意不相與語自上床卧使客卧下床備曰君有國士之名今天下大亂帝王失所望君憂國忘家有濟丗之意而君求田問舎言無所采是元龍所諱何縁當與君語如小人欲卧百尺樓上卧君於地下何但上下􅇃之間耶表大􅀏晉書曰武帝㑹宴凌雲臺衛瓘託醉因跪帝牀前曰臣欲有言因以手撫帝牀曰此座可惜帝意乃悟因謬曰公眞大醉也瓘於此不復言又曰齊獻王攸特爲文帝所寵愛毎見攸輙撫牀呼其小字曰此桃符坐也幾爲太子者數矣又曰中宗元帝旣登尊號百官陪列詔王導􅂛御牀共座導固辭曰太陽下同万物蒼生何由仰照中宗乃止又曰陶淡字起静好道養年十五六便絶榖設小床常獨坐不與人共又曰太尉郄鑒使人求女􅡾於王導問令就東廂遍觀諸子使者歸謂鑒曰王氏諸少年並佳然聞信至咸自矜持唯一人在東牀坦腹而食獨若不聞鑒曰正此佳􅡾訪之乃逸少也遂以女妻之又曰桓􅀇從荆州下都篡位所坐御牀忽䧟殷仲文進曰將由聖德淵重厚地不能載􅀇大恱燕書曰公孫鳯隱於昌􅀺九城寢於土牀也沈約宋書曰武帝􅀄開國有司奏東西堂施局脚床銀塗釘上不許使用直脚床釘用鐵也又曰江湛爲元􅇯劭所害􅀄湛家數見怪異未敗之日所眠床忽有數斗血又曰王微不仕元􅇯之變微尋書玩古遂至足不履地終日端坐床皆生埃唯當坐處獨浄又曰羊戎好爲􅀟聲江夏王義恭嘗設齊使戎布牀湏􅁷王岀以牀狹乃自開牀戎曰官家恨狹更廣七寸王􅀏曰卿豈唯善􅀟聲乃辨士也又曰張敷爲中書舎人狄當周赳善管要務以敷同省名家欲詣之赳曰彼若不相容接便不如不往詎可輕行當日吾等並巳貟外郎矣何憂不得共坐敷先設二床去壁三四尺二客就席數呼左右曰移我逺客赳等失色而去其自摽遇如此又曰王僧逹大明中以歸順功封寕陵縣五等侯迁中書舎黄門郎路瓊之太后兄慶之孫也宅與僧逹門並嘗盛車服詣僧逹僧逹將獵巳改服瓊之就坐僧逹了不與語謂曰身昔門下騶人路慶之者是何親遂焚瓊之所坐床齊書曰紀僧眞幸於武帝稍歷軍校容表有士風謂帝曰臣小人出自本縣武史遭逢聖時陛勞至此爲兒婚得荀昭先女即時無復所湏唯就陛下乞作士大夫帝曰江斆謝􅊪音藥我不得歷此意可自詣之僧眞承旨斆登榻坐定斆便命左右曰移吾牀讓客僧眞䘮氣而退之又曰虞愿除後軍將軍褚彦回詣愿不在見其眠床上積塵埃有書數卷彦回歎曰虞君之清乃至於此令人掃地拂床而去又曰竟陵王子良爲㑹稽郡閤下有虞翻舊床罷任還乃致以歸後於西邸起古齊多聚古人器服以充之又曰少帝夜醉蕭坦之與曹道挾抱還延昌殿置玳􅈘牀上梁書曰侯景旣篡位聞義師轉近猜忌弥深床前蘭錡自遶然後見客又曰長沙王㦤孫植性恬静獨處一室牀有􅂰痕宗室衣冠莫不堦則又曰兼弘性奢侈侍妾百餘人不勝金翠服翫車馬皆一時之絶有眠床一張皆是蹙栢四靣周匝無一有異通用銀鏤金花兩重爲脚也又曰賀革字文明少以家貧躬耕供養年二十如輟耒就父受業精力不怠有六尺方牀思義未逹則横卧其上不盡其義終不肯食又曰西域􅀛兹等國其王坐金牀隨太歳轉與妻並坐接客後魏書曰魏収讀書夏月坐板床隨樹隂諷誦積年牀版爲之銳减而精力不輟又曰韓務除龍驤將軍郢州刺史獻七寳牀象牙席唐書曰貞觀十八年召三品巳上賜宴於玄武門太宗操筆作飛白書羣臣乗醉就太宗手中相競散􅀐常侍劉洎登御牀引手然後得之其不得者咸稱洎登床罪當死請付法太宗􅀏曰昔聞婕妤辭輦今見常侍登床莊子曰驪􅁎之父封人之子晉國之始得也曰涕泣沾衿及其與同匡床食芻養而後悔其涕泣也啇君書曰明者無所不見人主處匡床之上而天下治論衡曰孔子將死遺祕書曰不知何一男子自謂􅁗始皇上我堂踞我床丗夲曰紂爲玉床南方志曰南方老人以􅀛支床及老人亡舁牀􅀛尚活天文集曰紫宫門外有天床六星東宫舊事曰太子有素栢局脚床七具漢武帝内傳曰武帝受西王母眞刑六甲雲飛十二事帝盛以黄金封以白玉凾􅃢瑚爲床紫錦爲帷安着柏梁臺上皇甫謐髙士傳曰老萊子隱蒙山之陽支木爲床神仙傳曰衛叔卿入華山有紫雲鬰鬰白玉爲床眞人周君傳曰周義山字季通令㑹仙人在金屋太室以彩玉爲牀馬明先生別􅀓曰明生隨神女還岱宗石室中金床玉几西京雜說曰武帝爲七寳床雜寳屏風別寳帳設於柱宫中時人謂爲寳宫又曰昭陽殿設玉牀又曰韓嫣以玳瑁爲床拾遺録曰董偃常卧延清之室􅀞石爲床石文如􅀞體甚輕出郅支國上設紫瑠璃帳火齊屏風又曰石季倫屑沉水之香如塵沬布置象床上使所愛者踐之無跡則賜眞珠百琲珠百枚曰琲若有跡者則節其飲食令體弱故閨中相戯曰尓非細骨輕軀那得百琲眞珠又曰頻斯國有楓林林東有大石室可容萬人坐壁上尅爲三皇之像天皇十二頭地皇一十一頭人皇九頭皆龍身亦有膏燭之處緝石爲床床上有􅂰痕深二三寸衡山記曰仙人室中有黄玉牀盛弘之荊州記曰長沙郡有賈􅁩所穿井旁局脚石床一床可容一人坐其形古制傳云􅁩所坐床也西征記曰金郷焦氏山北有漢司􅈻校尉曽峻塚前有石床長八尺瑩摩鮮明叩之即鳴時太尉從事中郎􅀓珎之諮議叅軍周室穆折石床各取一頭爲曽氏之後所訟鄴中記曰石虎御床辟方三丈其餘床皆局脚髙下六寸後宫别坊中有小形玉床又有轉􅀜牀射鳥獸異物志曰麡賫柴二音狼狀如麋而角向前入林則得之角正四據人因以作踞牀異苑曰沙門支法存有八尺沉香板床刺史王淡息切求不與遂殺而籍焉籍没也後息疾法存岀爲崇也丗說曰􅀽紹年少時曽夜以劒遣人擲魏武小下不着帝揆其後必髙因帖卧床劒至果髙語林曰簡文爲撫軍時所坐床上塵不聽左右拂見鼠行跡視以爲佳雜五行書曰凢安床東首貧賤疾病西首冨南首貢北首死兵書曰將坐床無故自動下欲害之夢書曰夢牀所壞者爲憂妻也曹植九詠曰蕙幬􅀆荃牀柴子太七折曰下莞上簟華鏤之床劉禎績慮賦曰布玳瑁之蓆設觜蠵觜蠵大􅀛也蠵音惟之床馮玫瑶之几對金精之盤合李􅀹卧牀銘曰體之所安寢處之歡夕則敬愼崇德逺姦榻堅牀銘曰體之所安寢處知歡乆則敬愼崇德逺姦釋名曰長狹而卑曰榻言其榻然近地也小者坐主人無二獨所坐也謝承後漢書曰徐稺字􅐐子豫章人陳蕃爲太守不接賔客唯稺來特設一榻去則懸之又曰周璆字孟玉陳蕃爲太守璆來置一榻去則懸之也蜀志曰簡雍性簡傲佚蕩自諸􅁑亮以下則獨擅一榻湏枕卧語無所爲屈呉志曰周瑜薦魯肅孫權引肅合榻對飲言議宋議書曰當陽侯劉彦節旣貴士子自非三署不得上方榻時以此少之又曰顔延之爲祕書􅁥光禄勲太常時沙門釋惠林以才學爲文帝所賞朝廷政事多與之謀遂士庻歸仰上毎引見常􅂛獨榻延之甚嫉焉因醉曰昔子同􅆖乗表絲正色此三台之座豈可使刑餘居之上變色又曰王瞻字明逺一字叔鸞􅀒氣慠俗好貶裁人物仕宋爲王府叅軍常詣劉彦節直登榻曰君侯是公孫僕是公子引滿促膝唯余二人彦節外雖酬之意甚不恱齊書曰孔休源字慶緒􅀶學爲晉安王府長史甚得人譽王深相􅀝仗常於中齋别施榻云此是孔長史坐人莫得預焉其見敬如此馬魏書曰元順爲吏部尚書右僕射上省登階向榻見榻甚故問都令史徐忤起曰此榻曽見先王坐順即哽塞涕泗交流乆而不能言遂令換之梁書曰臨汝侯猷爲益州頗僣濫客筵内遂有香燈都稜切不置連榻武帝知之以此爲僣還都以憂愧成疾卒唐書曰玄宗命太常韋縚讀時令毎月一篇毎孟月朔日上御宣政殿側置一榻東置靣案令韋縚坐而讀之又曰李峴爲相元載於政事堂置榻邀宣事中官坐峴至叱左右去榻唐髙士傳曰管寕自越海及歸常坐一木榻積五十餘年未嘗箕股榻上當膝處皆穿郭子曰杜預拜鎭南將軍朝士悉至客皆在連榻于稚舒後至曰杜元凱復以連榻坐客不坐便去列仙傳曰脩羊公者魏人也止華隂山石室有懸石榻卧其上石盡穿䧟胡牀風俗通曰靈帝好胡牀董卓權胡兵之應也魏志曰裴潜爲兖州刺史常作一胡牀及去官留以掛柱齊書曰張景眞僣侈武帝拜陵還景眞白服乗舴猛坐胡牀觀者咸疑是太子梁書曰武帝軍至新林楊公則自越城移此領軍府壘北樓與南掖門相對嘗登樓望戰城中遥見麾蓋縱神鋒弩射之矢貫胡牀左右皆失色公則曰虜幾中吾脚談􅀏如􅀄又曰侯景旣􅆲位時着白紗帽而尚披青􅂁頭挿象牙梳殿上常設胡床及荃蹄着鞾垂脚坐北齊書曰武成胡后與沙門曇献通布金錢於献席下又掛寳裝胡牀於献屋壁武成平生之所御者也􅁃肩吾賦胡牀詩曰傳名乃外域入用信中京足欹形巳正文邪體自平臨堂對逺客命旅誓􅀄征太平御覽卷第七百六
