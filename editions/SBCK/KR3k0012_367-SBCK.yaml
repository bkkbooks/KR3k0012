body:
  text: 人事部八頰鼻頞口舌頰􅀃文曰頰面旁也輔頰也釋名曰頰夾也面旁稱也亦取挾歛食物也傳曰宫之竒曰諺所謂輔車相依唇亡齒寒者其虞虢之謂乎輔頰輔車牙車又曰公侵齊門于陽州士皆坐列顔髙奪人弱弓籍丘子鉏擊之一人俱斃子鉏齊人偃且射子鉏中頰殪子鉏死易咸卦象曰咸其輔頰舌騰口􅀃也又夬卦曰壯于頄有凶頄求􅀛切面權也又曰艮其輔言有序施止於輔以處於中故曰無擇言史記曰漢王聞魏豹反方東憂楚未及擊謂酈生曰緩頰往􅀃魏豹能下之吾以萬户封􅀂又曰武帝元鼎六年定越地以爲儋耳郡張晏曰儋耳其俗鏤其頰皮上連耳匡分爲數支狀􅀂鷄腸又曰朱􅀶入守左馮翊長陵大姓尚方禁少時甞盗人妻見斫瘡著其頰􅀶知以他事召見視其面果有瘢􅀶辟左右問禁是何等瘡禁叩頭服狀􅀶􅀏曰大丈夫固時有是以爲耳目江表傳曰孫䇿殺吴郡太守許貢貢奴客潜民間欲報讎䇿出獵卒遇三人即貢客也射䇿中頰後􅀐尋至皆刺殺之王隱晉書曰大駕北伐成都王潁統王師於蕩隂敗績上傷頰失六璽左右奔走三國典略曰梁謝荅仁聞侯景奔乃自東陽率衆候之至錢塘間趙伯超曰公得何消息而閉門見拒伯超曰汝頰邊頞有耳否侯王巳死逺近悉平君將此兵欲向何處荅仁曰審如公言死無所恨淮南子曰厭音父在頰則好在顔則醜王子年拾遺録曰孫和月下舞水精如意悮傷鄧夫人頰血流婉轉弥苦及差而滅左頰有赤􅀧如誌迫而視之更益妍也諸嬖欲寵者皆以丹脂􅀧頰而後進幸唐子曰人多逺見百歩而不自知眉頰蔣齊萬機語曰許子將褒貶不平以拔樊子昭而抑許文休劉曄曰子昭發自賈豎年至耳順退能守静進能不苟濟荅曰子昭誠自長㓜完㓗然觀其揺牙樹頰自非文休敵也丗􅀃曰郄公遭永嘉喪亂窮餒郷人共餉之公甞􅂝兄子外生周翼二小兒往食郷人曰各自窮餒以君之賢共存君耳恐不能兼餉公於是獨往食輙含飯著兩頰還吐與二小兒後並得存過江公亡翼時爲剡縣解職歸席苫於公靈床頭心喪三年鼻釋名曰鼻嘒也出氣嘒嘒也公羊傳僖公曰邾婁人執鄫子用之社蓋叩其鼻以血社也孝經援神契曰伏羲山凖禹虎鼻史記范睢傳曰蔡澤遊學于諸侯小大甚衆而不遇從唐舉相舉熟視而􅀏曰先生􅂚鼻巨肩魋顔戲齃膝攣吾聞聖人不相殆先生乎戰國䇿曰􅂫子南使齊謂齊王曰臣聞當世之主必誅􅁀正亂今宋王射天笞地鑄諸侯之像使侍屏匽展其臂彈其鼻此天下無道而王弗伐王名終不成矣魏志曰管輅舉秀才何晏請曰試爲我作一卦知位當至三公否又連夢青蠅數十來集鼻上驅之不去輅曰鼻者天中之山髙而不危所以長守貴也今青蠅臰惡而集之位峻者亡願君侯上追文王六爻之旨下思尼父􅂏象之義然後三公可决青蠅可驅晉書曰謝安石本能爲洛下書生詠有鼻疾故音濁名流愛其詠而不能及或掩鼻以斆之又曰王澄在荆州叱左右捧士人宗廞別駕郭舒勵色謂左右曰使君過醉汝輩何敢妄動澄恚遣搯其鼻炙其眉崔鴻十六國春秋後趙録曰王謨字思賢甕鼻言不清暢尪短無威儀將拜曲陽令勒疑之問長史張賔賔曰請試可不勒從之由是政教嚴明百城尤最出爲都部從事守宰去官者十五人唐書曰薛舉每破陣所獲士卒皆殺之殺人多断舌割鼻莊子曰野人堊墁於鼻端􅀂蠅翼使斲之匠石運斤成風堊盡而鼻不傷列子曰夏禹蛇身人面牛首虎鼻而有大聖之德孟子曰西子蒙不潔則人皆掩鼻而過之韓子曰魏王遺楚美女楚王恱之夫人鄭䄂謂新人曰王甚愛子然惡子鼻見王常掩鼻則王長幸子於是新人從之王謂夫人曰新人見寡人常掩鼻何對曰言惡聞王口臰王怒甚因劓之淮南子曰東方人隆鼻山海經曰一臂國人一鼻孔論衡曰鼻不知臰爲􅙄人不知是非爲閇烏貢切又曰􅂫秦骨鼻爲六國相太玄經曰割鼻飴口喪其息主列士傳曰干將子赤鼻列女傳曰梁髙行者梁之寡婦榮於色敏於行早寡不嫁梁貴人争欲取之不能得梁王聞使娉焉乃授鏡操刀以割鼻曰妾所以不死者不忍㓜嗣之重􅀌也刑餘之人殆可釋矣王髙其節敬其身號曰梁髙行又曰沛國孫去病妻同郡戴元世女夫死母欲嫁之操刀割鼻刀鈍不入趨於石上礪之鼻然後斷郡表其閭又曰梁郡夏文珪妻沛國劉景賔女亦割鼻自誓不嫁列女後傳曰吴孫竒妻者廣陵范愼女名􅁎十八配竒竒亡愼以􅁎少寡無子迎還其家􅁎不肯迎者以父命迫之􅁎遂操刀割鼻三輔故事曰衛太子嶽鼻太子來省疾至甘泉宫江充告太子勿入陛下有詔惡太子鼻嶽尚以紙蔽其鼻充語武帝曰太子不欲聞陛下膿臰故蔽鼻武帝怒太子太子走還崔寔政論曰秦割六國之君劓殺其民於是赭衣塞路有鼻者醜故百姓鳥驚獸駭不知所歸命王湛別傳曰王處冲身長八尺龍頰大鼻世􅀃曰􅀄謝安在東山居布衣時兄弟有冨貴者劉夫人戲謂安曰大丈夫不當如此謝乃捉鼻曰但恐不免耳又曰石崇家造厠令婢以盤擎􅀥與厠人塞鼻又曰康僧淵目深而鼻髙王丞每嘲之僧淵曰鼻者面之山山不髙則不靈談藪曰宋廢帝常入武帝廟指其􅀞像曰此渠大好色不擇尊卑顧謂左右渠大鼻如何不齇即令􅀞工齇又曰齊世祖之征潁川也有皇角王淵者善相人見其容止竊議曰此不作大物㑹是垂涕洟者謂太原公洋也崔􅀇瀬郷記曰老子鼻􅀟柱養生經曰鼻者心之門頞􅀃文曰頞鼻莖也頞烏􅁑切釋名曰頞鞍也偃折如鞍也史記曰唐舉謂蔡澤曰先生魋顔蹙齃殆不相乎後漢書曰周爕字伯彦􅀄生顩頥折頞醜甚母欲弃之其父不聽曰吾聞賢聖多有異興我宗者乃此於是寳之顩玄拴切吴書曰諸􅁑恪字元遜瑾長子少知名少􅁂眉折頞廣顙莊子曰髑髏深嚬蹙頞曰豈能捨南面王樂而爲人生哉吕氏春秋曰文王好食昌葅孔子蹙頞而食之楊雄解嘲曰蔡澤山東匹夫也顩頥折頞涕唾流沬口􅀃文曰口者人之所以言食釋名曰口空也禮曰曽子謂子思曰伋吾執親之喪也水漿不入於口者七日又曰晉人謂趙文子知人文子其中退然如不勝衣中身也退知柔貌其言呐呐然如不出諸其口呐呐舒小貌音如恱切又玉藻曰口容止不安動也又少儀曰燕侍道於君子數噍母爲口容口容弄口噍才􅀏切又祭義曰惡言不出於口又緇衣曰小人溺於水君子溺於口口費而煩易出難悔易以溺人言口多空言且煩數也過言一出駟馬不能及不可得悔也口舌所覆亦如溺也傳曰鄭伯使許大夫百里奉許叔以居許東偏曰寡人有弟不能和恊而使糊其口於四方其况能乆有許乎又曰口不道忠信之言爲嚚又曰子玉使伯棼請戰曰非敢必有功也願以間執䜛慝之口又曰晏子曰君民者豈以陵民社稷是主臣君者豈爲口實社稷是養言君不徒居民上臣不徒求禄皆爲社稷又曰正考父佐戴武宣三命滋益恭故其鼎銘云一命而僂再命而傴三命而俯饘於是粥於是以糊余口又曰費無極言於楚子曰建與伍奢將以方城之外叛王執伍奢使城父司馬奮陽殺太子未至而使遣之知太子􅁈故遣令去太子建奔宋王召奮陽奮陽使城父人執巳以至王曰言出於余口入於爾耳誰告建也詩正月曰好言自口莠言自口莠醜也又十月之交曰無罪無辜讒口囂囂書序曰濟南伏生年過九十失其本經口以傳授又曰大禹謨曰惟口出好興戎朕言不再好謂賞善戎謂伐惡言口榮辱之主慮而言宣也成於一也又盤庚上曰相時憸民猶胥顧于箴言其發有逸口言憸利小人尚相顧於箴悔之言恐君其發動有過口之患也又􅀃命曰惟口起羞易􅀃卦曰兊爲口論語公冶長曰或曰雍也仁而不侫子曰禦人以口給屢憎於人又曰陽貨曰惡利口之覆􅀖家者公子翬謟于隱公謂隱公曰百姓安子諸侯􅀃子盍終爲君矣隱公曰否使脩菟裘吾將老焉公子翬恐􅀂其言聞于桓於是謂桓公曰吾爲子口隱矣孝經援神契曰舜大口又曰孔子海口言􅀂含澤論語擇輔像曰子貢斗星繞口南容升又曰太公大口鼻有伏藏史記曰周厲王得衛巫使􅁥謗者以告則殺之其謗鮮矣王喜告召公吾能弭謗矣召公曰是障之也防民之口甚於防水水壅而潰傷人必多民亦如之民之有口也猶土之有山川也財用於是乎出猶其有原隰衍沃也衣食於是乎生口之宣言也善敗於是乎興行善而備敗所以産則用衣食者也夫民慮之於心而宣之於口成而行之􅀂壅其口其與能幾何王不聽於是國人莫敢出言又曰季桓子受齊女樂三日不聽政又不致膰俎於大夫膰音煩孔子遂行而師已送曰夫子則非罪孔子曰吾歌可夫歌曰彼婦之口可以出走彼婦之謁可以死敗言婦人之口請謁是以憂使死人敗故可以出走也又曰鄧公曰吴王爲反數十年矣發怒於削地以誅晁錯爲名其意非在錯也且恐天下之士噤口不敢復言漢書曰漢王擊魏豹謂酈食其曰魏大將者其人爲誰曰柏直也漢王曰是口尚乳臰又曰髙祖欲廢太子周昌諌曰臣口不能言心知不可又曰良藥苦口利於病又曰張蒼免相後口無齒食乳女子爲乳母又曰條侯周亞夫相曰從理入口法餓死又曰揚雄口吃不能劇談又曰王莽爲人哆口哆唱者切東觀漢記曰光武爲人日角大口美湏眉又曰明徳馬后身長七尺三寸青白色方口美髮後漢書曰馬援在交阯還書戒兄子曰龍伯髙敦厚周愼口無擇言謙約節儉廉公有威吾愛之重之應劭漢官曰侍中乃存年老口􅆨帝賜以雞舌香令含之江表傳曰孫堅爲下邳丞時孫權生而方頥大口目有精光堅異之以爲貴象燕書曰申弼烈祖常從容問諸侍臣曰夫口以下動乃能制物鈇鑚爲用亦噬嗑之意而從上下何也弼荅曰口之下動上使下也鈇鑚之用上斬下也烈祖稱善南史曰謝朏出爲吴興郡守與弟瀹於征虜渚送別朏指瀹口曰此中唯冝飲酒唐書曰郝處俊孫象賢垂拱中坐事伏法臨刑言多不順自此法司每將殺人也必先以木丸塞口又曰杜黃裳性雅澹寛恕心雖從長口不忤物老子曰五味令人口爽管子曰桓公與管仲謀伐莒未發巳聞於國東郭郵至公問之子曰言伐莒乎東郭曰君子善謀小人善意臣視二君在堂上口開不合言莒也莊子曰公孫龍口呿而不合舌舉不下􅀑谷子曰口者機開也所以開閉情意也又曰口可以食不可以言周生烈子曰口者言之門河圖曰秦始皇虎口日角陸賈新語曰衆口所毀浮石沉木羣邪相抑以曲爲直􅀃苑曰口者開也舌者機也岀言不審駟馬不能追也吴越春秋曰越王勾踐入臣於吴吴王病大便太宰噽奉溲惡以出勾踐甞之後病口臰范蠡令左右食苓草以亂其氣曹瞞别傳曰操遨逰無度其叔數語其父操後行逢叔於道陽敗面爲口云中􅁀風叔告其父父呼見之操面如故從此叔言不復入信操益得縱恣爲王也杜如體論曰束脩之業其上在於不言諺曰口如鼻至老不失􅀓子曰擬金人銘作口銘云神以感通心由口宣福生有兆禍來有端情莫多妄口莫多言蟻孔潰河溜穴傾山病從口入禍從口出存亡之機開闔之術口與心謀安危之源樞機之發榮辱存焉王子年拾遺録曰昔伯禹入穴乃至一室裏一人身如蛇鱗於石上口吐一王簡以受禹簡長十二寸以量度天地又曰始皇二年謇消國善􅀞工者名烈裔口含丹墨噴壁即成龍雲之隊又曰沐胥國人年九萬歳以口噴水爲􅀨紛漫數十里俄而口吹爲風而􅀨皆止瀬郷記李母碑曰老子方口養生經曰軍營之中有甘泉注云軍營口也甘泉唾也又曰口爲華池相書曰大容手赤如丹貴壽又曰欲知人多舌當視其口如鳥喙言語皆聚此多舌人也談藪曰梁髙祖重陳郡謝玄暉詩常曰不讀謝詩三日􅁴曰臰舌釋名曰舌􅂥也舒􅂥所當言也詩雨無正曰哀哉不能言匪舌是出維躬是悴又曰婦有長舌維厲之階又抑曰莫捫朕舌言不可逝矣論語顔淵曰子貢曰惜乎夫子之􅀃君子也駟不及舌春秋元命苞曰舌之爲言逹也陽立於三故古在口中者長三寸象斗玉衡隂合有四故舌淪入溢音益内者長四寸宋均曰玉衡三星也魁四星也孝經鈎命決曰仲尼舌理七重陳機授度史記曰平原君旣巳定從而歸至於趙曰今毛生以三寸之舌強於百萬之師又曰留侯曰今以三寸之舌爲帝者師封萬户位列侯此布衣之極於良足也又曰張儀常從楚相飲巳而失璧門下意儀盗璧共執掠笞數百不服釋之其妻曰嘻子無讀書遊􅀃安此辱乎儀張口謂其妻曰視吾舌尚在否妻曰君舌在也儀曰足矣又曰郭解任俠有儒生侍使者坐客譽郭解生曰郭解專以姧犯法公何謂賢解客聞之殺此生斷其舌漢書曰蒯通謂韓信曰酈生一士伏軾掉三寸舌下齊七十城又曰東海公賔就斬王莽傳詣更始懸於宛市百姓共提擊之或切食其舌後漢書曰馬援與隗囂將楊廣書曰豈有知其無成而但萎腇咋舌义手從族乎萎腇軟弱也萎音於罪切腇音也罪切張璠漢記曰董卓於衆坐生斬人手足又鑿目截舌口百姓嗷嗷道路以目英雄記曰曹操與劉備密言備泄於􅀽紹紹知操有圖國之意操自咋其舌流血以失言誡後世魏末傳曰諸􅁑誕殺樂綝有典農都尉數䜛誕於是收而斬之罵曰卿坐舌先使人以竹攙其舌然後殺之攙音䜛又楚金切刾之也晉中興書曰温嶠密啓肅祖陳王敦作難敦聞曰果爲小物所欺乃募有能生得嶠者吾當手拔其舌晉書曰鳩摩羅什年七歳出家日誦千偈後死姚興依外國法焚屍薪滅形碎唯舌不爛沈約宋書曰南郡王義宣生而舌短言澁唐書曰波斯國俗法有罪者火燒鐵灼其舌瘡白者爲理瘡黒者爲有罪燕丹子曰荆軻見燕太子太子曰田先生今無恙乎軻曰光送軻之時言太子戒以國事恥以丈夫而不可向軻吞舌而死郭子曰殷仲堪云三日不讀道德論便􅁴舌本間強山海經曰反舌國其人反舌一曰交􅀃苑曰桓公飲管仲酒棄其半公問其故對曰臣聞酒入者舌出舌出者身棄臣謂棄身不如棄酒又曰韓子問叔向曰剛與柔孰堅叔向曰臣年八十齒再落而舌尚存是知剛不如柔也楊子法言曰五常者帝王之筆舌寧有書不由筆言不由舌也搜神記曰永嘉中有天竺胡人能斷舌先吐舌示賔客然後乃截血流覆地乃取置器中傳以示人取舌還合有頃如故桂陽先賢傳曰采陽陵字遂文果而好義郡長汲府君爲州所章陵􅀍掠考叅加五毒陵乃截舌以着盤中獻之廷尉羣公咸共議之事得清理又曰臨武程桓少有才藝爲九江主記􅁺府君爲人所章桓􅀍徴詣臺徐郎中委郎詣州乞就考於格上拔刃截舌
