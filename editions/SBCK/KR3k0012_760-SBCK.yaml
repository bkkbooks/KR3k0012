body:
  text: 器物部五盌盂􅂫鉝安哉匕箸机畢飯帚灸函飯函淅箕筐􅞊簞爵盌方言曰盌謂之盂或謂之銚銳或謂之櫂椀謂之䀁不謂之㳙抉蠲玦兩音􅀃文曰盌小盂也呉志曰曹公出濡湏甘寜爲前部督受勑斫敵前營孫權特賜米酒衆肴寧乃以銀椀酌自飲兩椀乃酌與其都督都督伏不肯時持寧引劒自削置膝上呵之曰卿見知於至尊孰與甘寧寧尚不惜死卿何以獨惜死乎都督即起拜持酒通次酌兵各一銀椀至更時衘枚出斫敵敵驚動遂退寜益貴重晉陽秋曰王敦許周訪荆州又授梁州訪怒敦書喻之遺以玉盌訪投盌於地又曰武帝時魏府丞蕭譚承徐脩儀䟽作􅃮􅀞銀帶粉盌詔殺之盤門中亦云晉咸康起居注曰詔賜遼東叚遼等瑠璃盌義熈起居注曰林邑王范明逹獻金盌一副蓋一副東宫舊事曰􅃮盌子一百枚抱朴子曰外國作水精椀實是合百􅁅以作之交廣間多有得其法而鑄作之者今以語俗人俗人殊不肯信乃云水精本是自然之物崔豹古今注曰魏帝以車渠石爲酒盌文士傳曰潘􅊂音夷與同僚飲主人有瑠璃椀使客賦之􅊂於座立成於手㝷陽記曰龍窟有深潭有人於此水邊洗銅盌忽浪起水長便失盌此人後見此盌置城裏井邊交州􅄂記曰太康四年刺史陶璜表送林邑王范熊所獻青白石盌一口白水精盌二口陶偘故事曰偘上成帝水精盌一枚丗􅀃曰王大將軍尚主如厠即還婢擎金盤盛水琉璃盛澡豆􅁗嘉婦與嘉書曰今奉金錯盌一枚可以盛書水瑠璃盌一枚可以服藥酒諸􅁑恢集詔荅恢曰今致瑠璃盌一枚表曰天恩賜廣州白盌釰滔母與從祖虞光禄書曰賜瑠璃盌盂說文曰盂飲器也方言曰宋楚趙魏之間或謂之㯸子忍箋矜二切一曰盤也河濟之間謂之䀂音安折音殘亦謂之銚銳漢書曰東方朔上甞使數家射覆置守宫於盂下使射之盂􅀂盇而大盇與鉢字同墨子曰􅀂夫兼相愛交相利此自先聖六王者親行之何以知先聖六王之親行之吾以其所書於竹帛鏤於金石琢於盤盂傳遺後丗子孫者知之晉四王起事曰惠帝還洛陽黄門以瓦盂盛茶上至尊韓子曰爲人君者猶盂也人猶水也盂圎水圎盂方水方凉州異物志曰琥珀作盂瓶東方朔荅客難曰安於覆盂􅂫鉝音立吕靜云胡食器也林邑記曰林邑王范明逹獻琉璃􅂫鉝二口安哉李尤安哉銘曰安哉令名甘旨是盛埏埴之巧甄陶所成食彼美珎思此鹿鳴匕方言曰匕謂之匙􅀃文曰音四匕也所以取飯易曰震驚百里不喪匕鬯詩曰有饛簋飱有捄􅁄匕箋云􅎅所以載鼎實也周禮曰大喪共角角折角匕也礼䘮大記曰楔齒用角也儀禮曰主人執匕禮曰杜蕢苦怪切謂晉平公曰蕢也宰夫也非切是供又曰匕以桑長三尺或曰五尺刋其柄與末匕所以載牲字者此謂䘮􅀕也吉􅀕􅎅用􅁄三禮圖曰匕以載牲體長二尺四寸葉􅀶三寸長八寸􅃮丹柄頭䟽匕形如飯操以􅁄心爲之英雄記曰董常大㑹賔客誘降反者以鑊之㑹者戰慄亡失匕箸與筯字同蜀志曰曹公謂先主曰天下英雄唯使君與操耳先主方食失匕箸王隱晉書曰石勒時有謡云一杯食有兩匙石勒死人不知沈約宋書曰太子妃上丗祖金縷匕箸上以賜沈慶之枹朴子曰道士李根煎鈆錫以藥如大豆者投中以鐵匕攪之冷即成鉏又有古強者自云四千歳嵇使君以玉匕與強後忽語嵇云昔安期先生以與之東宫舊事曰􅃮匕五十枚續齊諧記曰趙文詔爲東宫扶侍廨在青溪中橋夜與神女讌寢脫金簪與扶侍亦贈以銀椀及流離匕箸方言曰箸筩盛匕箸者也筩音桶陳楚宋魏之間謂之筲或謂之嬴音盈自􅀜而西謂之桶揔今俗亦通呼小籠桶揔桶音籠揔蘇孔切通俗文曰以箸取物曰欹音羈禮曰飯􅁰無以箸羹之有菜者用挾音莢其無菜者不用挾鄭􅀇曰挾猶箸也今人或謂箸爲挾提也史記曰漢王與酈食其謀撓楚權張良從外來曰陛下事去矣臣請借前箸爲大王籌張晏曰求借所食之箸用指畫或曰前湯武箸明之事以籌度今時之不若也又曰景帝居禁中召條侯周亞夫賜食獨置大胾不置箸條侯心不平顧謂尚席取箸景帝視而􅀏曰此豈不足君所乎條侯免冠謝謝承後漢書曰莽時有竒士巨母霸卧則枕皷以鐵箸食呉志曰趙逹善治九宫一筭之術甞遇知故知故曰倉卒之間無酒食以叙意逹以箸一􅃗􅄪三蹤撗之乃言卿東壁下有酒一斗鹿肉三斤何以言無主人慙曰知卿善射欲相試耳典略曰曹汝隨大軍破張魯命陳琳作書報太祖曰且夫墨子之守縈帶爲垣髙不可登析箸爲械堅不可入晉書曰何曽字頴考日食萬錢猶言無下箸之處東宫舊事曰􅃮箸一百􅀟荀卿子曰從山望木者十仞之木如箸而求箸不上析髙蔽其長也韓子曰紂爲象箸而箕子怖以爲象箸必不加於土鉶必將犀玉之杯象箸玉杯必不美菽藿則必薦豹胎薦豹胎必不衣短􅄄而食於茅茨之下則必錦衣九重廣室髙臺吾畏其終故怖其始故箕子見象箸以知天下之禍淮南子曰糟丘生乎象箸論衡曰以箸撞鍾以筭擊鼔鍾鼔不能鳴者用橦之者小也神仙傳曰􅁑􅀇嘗與客食玄以口中飯盡化爲蜂數百集於客身客皆投匕箸驚懼􅀇乃張口其蜂悉入葛洪治噎方曰與對食之人當以手捉箸問噎人曰此何等物噎人當荅曰箸即復曰咽下去即愈語林曰王藍田食鷄子以箸刺之不得便大怒王述也投于地相書曰人三指用箸者自如四指用箸貴五指用箸大富貴也机方言曰爼机也西南蜀漢之郊曰杫音賜史記曰項王爲髙爼置太公其上如淳曰髙爼机上也後漢書曰樂崧者河内人天性朴忠家貧爲郞常獨直臺上無􅀍止食糟糠帝毎夜入臺輙見崧問其故甚嘉之自此詔太官賜尚書以下朝夕飡給帷􅀍皂􅂁及侍史二人畢三禮圖曰畢似天畢以載牲醴又葉愽三寸長八寸柄長二尺四寸丹􅃮兩頭詩曰有捄天畢載施之行箋云畢所以助載鼎實儀禮曰宗人執畢鄭􅀇曰畢狀如文也禮曰畢用桑長三尺刋其柄與末畢所以助主人者刋猶削也飯帚􅀃文曰陳留以飯帚爲䈾䈾巢切亦盛箸籠又作筲也炙函東宫舊事曰􅃮㹮炙大函一具飯函列異傳曰景􅀄中城陽縣吏王巨嘗作倦枕机卧聞竈下呼曰文納何以在人頭下應曰我見枕不得動汝來就我至乃飯函也淅箕廣雅曰淅䉴音箱㔯音旋䉛音郁纂文曰䉛浙箕也一曰􅞉魯人謂之淅䉴方言曰箕陳魏宋楚文間謂之籮炊䉛謂之縮漉米䉛也或謂之㔯江東呼淅籖也筐方言曰箄必弭切簍音縷籅音餘䈱音叨筐也音筥江􅃆之間謂之籅趙代之間謂之䈱淇衛之間謂之牛筐處其通語也小者南楚謂之筐􅀜而西秦晉之郊謂之箄今江東亦名小籠爲箄􅀃文曰筐飯筐也飴牛筐也方曰筐圎曰三禮圖曰大筐以竹受五斛大夫以盛米致饋於聘賔小筐以竹受五升以盛米又曰筐以盛熬榖四種八筐大夫三種六筐士二種四筐易曰女承筐無實書曰厥篚織文篚筐屬也又曰厥篚檿絲厥篚􅀇纎縞厥篚織具厥篚􅀇纁璣組厥篚纎纊又曰惟其士女篚厥􅀇黄紹我周王詩曰采采卷耳不盈頃筐又曰于以采蘋南澗之賔于以盛之維筐及筥方曰筐貟曰筥又曰標有梅頃筐墍之又曰女執懿筐遵彼微行爰求柔桑懿筐深筐也禮曰蚕則績而蟹有筐左傳曰筐筥錡釡之噐潢汙行潦之水可薦於􅀑神可羞於王公又曰晉侯筮嫁伯􅁎於􅁗遇歸妹之睽其繇曰士刲羊亦無忘也女承筐亦無貺也西京􅄂記曰元后在家日䴏銜白石大如指墮績筐中后取之石自剖爲二其中文曰母天地遂復還合後爲皇后常致璽中莊子曰愛馬者以筐盛屎吕氏春秋曰有娀氏二佚女爲九成之臺帝令鷰往遺二卵争􅅮之覆以玉筐北飛遂不反吞之生契􅞊音吕方言曰􅞊盛飯筥也南楚謂之筲今建平人呼曰筲趙魏之郊謂之􅠚音袪􅞊今通語也􅀃文曰􅞊飯筥也受五升秦謂之䈾廣雅曰􅯡音溪映􅞊音旅也纂文曰􅯡映大筥也趙代以筥爲䈱論語曰斗筲之人何足算也筲竹器受二斗東宫舊事曰􅃮注綺織􅞊二十枚陶偘故事曰偘上成帝􅃮􅃨􅞊五十枚簞􅀃文曰簞飯器也禮曰凡以苞苴簞笥問人者操以授命儀禮曰小祝盤匜與簞巾于西階東左傳曰趙宣子田于首山見靈輙餓爲之簞食與肉又曰越圍呉趙孟使楚隆徃呉王拜稽首曰寡人不佞不能事越與之一簞珠使問趙孟簞小笥也問遺也論語曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂孟子曰孟子謂齊宣王曰今燕虐其民王往而征之民以爲將拯巳於水火之中也簞食壷漿以迎王師􅀂殺其父兄係累其子弟如之何其可又曰非其道則一簞食不可受於人如其道則舜受堯之天下不以爲泰又曰啇之君子實􅀇黄于篚以迎其君子其小人簞食壷漿以迎其小人黄石公三略曰良將用兵有饋一簞醪者使投之於河令士卒迎流而飲之爵觶散用歛􅀃文曰爵禮器也象爵之形觶音枝受四升詩曰赫如渥赭公言錫爵周禮曰享先王賛玉爵宗廟献用玉爵大朝覲㑹同賛獻玉爵王爵王禮諸侯之酢爵也又曰梓人爲飲酒器爵一升觚三升獻以爵而酬以觚禮曰執玉爵者弗揮爲其寳而脆也又曰知音智悼子卒未葬晉平公飲酒師曠李調侍鼔鍾杜蕢自外來聞鍾聲曰安在寢杜簣入寢歴階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐而飲之降趨而岀平公呼而進之曰簣曩者爾心或開予是以不與爾言飲曠何也曰子卯不樂紂以甲子死桀以乙夘亡王者謂之疾日不舉樂爲事所以自戒懼也知悼子䘮在堂未葬斯其爲子卯也大矣曠也太師也不以詔是以飲之也尓飲調何也曰調也君之䙝臣也爲一飲一食忘君之疾是以飲之也尓飲何也曰蕢宰夫也非刀匕是供又敢與知防是以飲之也平公曰寡人亦有過焉酌而飲寡人社蕢洗而揚觶公謂侍者曰如我死則必無廢斯爵也至于今旣畢獻斯楊觶謂之社舉又曰宗廟之􅀕貴者獻以爵賤者獻以散尊者舉觶卑者舉角凡觴一升曰爵二􅂛曰飢三􅂛曰觶四升曰角五升曰散也又曰魯祀周公於太廟爵用玉琖仍彫加以壁角爵君所進於尸也仍因也因爵之形爲稱也加加爵也散角皆以璧飾其口也又曰孔子射於矍相之圃蓋觀者如堵牆使公罔之裘序􅀧楊觶而語公罔之裘楊觶而語曰㓜壯孝弟􅂄耋好禮不從流俗修身以俟死者不在此位也蓋去者半處者半序􅀧又楊觶而語曰好學不倦好禮不變旄期稱道不乱者不在此位也蓋僅有存者三禮圖曰爵受一升尾長六寸博二寸傅翼兊音銳下方足􅃮赤雲氣又曰散受五升左傳曰凡公行告于宗廟反則飲至舎爵䇿勲焉爵飲酒器也旣飲置爵則書勲勞又曰􅉑公請器王賜之爵玉爵也爵人䝿石也後趙書曰石虎子韜以琉璃爵螺杯勸客酒呉志曰諸葛恪行酒至張昭昭不肯飲曰此非養老之禮權曰卿其能令張公辭屈乃當飲之恪曰昔師尚父九十秉旄杖􅃏猶未告老軍旅之事將軍在後酒食之事將軍在先何爲不養老也昭爲盡爵古今注曰章帝章和年銅酒爵岀河内泌水典論曰劉表諸子好酒造三爵大曰伯雅中曰仲雅小曰季雅楚辭九歌曰授北斗兮酌桂漿斗爲玉爵班婕妤賦曰酌羽觴兮銷憂孟康曰羽觴作生生爵形有頭尾羽翼也太平御覽卷第七百六十
