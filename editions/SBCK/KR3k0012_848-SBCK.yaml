body:
  text: 飲食部六食中王隠晉書曰何曽食日近萬錢猶曰無下箸處子劭驕奢簡貴有父風衣裘服翫新故巨積食必盡四方珍異一日之供以二萬爲限時論以爲太常御膳無以加之又曰皇甫謐姑子梁栁爲城陽太守或􅂆謐送謐曰栁爲布衣過吾送迎不出門食不過塩菜貧不以酒肉爲禮也今作郡而送豈古人之道哉晉書曰王導子恱疾篤導憂念特至不食積日忽見一人形狀甚偉􅀍甲持刀導問君是何人曰僕是蔣侯也公児不佳欲爲請命故來耳公勿復憂因求食遂噉數斗食畢勃然謂導曰中書患非可救者言訖不見恱亦殞絶又曰衛將軍謝安欲詣陸納納兄子俶怪納無辦乃宻作數十人饌安至納設菜菓而俶下精飲食納怒客去杖俶四十又曰郄鑒字道徴永嘉亂在卿里窮餒郷人以鑒名徳傳共餉之時兄子邁外生周翼並小常携之就食郷人曰恐不兼有所存鑒乃獨徃食訖飯着兩頰邊􅍭還與二児後並得存同過江邁位至護軍翼爲剡令鑒薨追撫育之恩解職而歸席苫心䘮三年又曰􅁃衮父亡作筥賣以養母母見其勤曰我無所食對曰母食不甘衮將何居母感而安之宋書曰謝景仁爲桓玄驍􅀐將軍時宋武帝爲桓循撫事軍中兵叅軍甞詣景仁諮事景仁與語恱因留帝食食未辨而景仁爲玄所召玄累促俄頃間􅀐詔績至帝屢求去景仁不許曰主上見待要應有方我欲與客食豈不得待竟安飽食然後應召帝甚感之又曰謝景仁愛弟音酣而憎弟述甞設饌請宋武帝希帝命豫坐而帝召述述知非景仁夙意又慮非帝命之請急不從帝馳遣呼述湏至乃飡其見重如此及景仁疾􅄒盡心視湯藥飲食必甞而後進衣不解帶不盥櫛者累旬景仁􅀷感愧焉又曰劉穆之少時家貧誕節􅄝酒食不修抅撿好徃妻兄弟乞食多見辱不以為耻其妻江嗣女甚明識每禁不令徃江氏後有慶㑹嘱勿來穆之猶徃食畢求㯽榔江氏兄弟戯之曰㯽榔消食君乃常飢何忽湏此妻復截髮市肴饌爲其兄弟以餉穆之自此不對穆之梳沐後穆之䆠逹而性更奢豪食必方丈且輙爲十人饌未甞獨飡每至食不過五盞盤義恭湏求果食日中無筭得未甞噉悉以與傍人諸王未甞敢求求亦不得又曰文帝宴於武帳堂上將行勑諸子且勿食至㑹所賜饌曰旰食不至有飢色上誡之曰汝曹少長豊佚不見百姓艱難今使爾識飢苦又曰文帝以謝弘微能膳羞毎就求食弘微與親舊經營乃進之後親人問上所御弘微不荅別以餘語酬之時人比之漢丗孔光又曰謝弘微兄曜卒弘微哀戚過禮服雖除猶不噉魚肉沙門釋惠琳甞與之食見其猶􅂼素謂曰檀越素旣多疾即􅁻猶未復膳􅀂以無益傷生豈所望於得理弘微曰衣冠之變禮不可踰在心之哀寶未能巳遂廢食歔欷不自勝又曰前廢帝常以木槽盛飯内諸􅄂食攪令和合掘地爲坑穽實之以泥水以糟食置前令以口就槽中食之用爲歡􅀏又曰宗慤累遷豫州刺史監五州諸軍事先是郷人􅁃業家冨豪侈侯服玉食與賔客相對膳必方丈而爲慤設粟飯菜爼謂客曰宗上軍串古患切噉麄食慤致飽而退􅀄無異辭至是業爲慤長史帶梁郡慤待之甚厚不以昔事爲嫌又曰沈攸之戰敗與第二子文和至華容之魽頭村投州吏家此吏甞爲攸之所鞭待攸之甚厚不以徃罰爲怨殺豚薦食旣而村人欲取攸之於櫟林與文和俱自經死又曰􅀽􅉖孫爲吏部郎孝建元年文帝詔曰羣臣並於中興寺八􅀜齊中食竟􅉖孫別與黄門郎張淹更進魚􅁏食尚書令何尚之奉法素謹宻以白孝武孝武使御史中丞王謙之糾奏並免官又曰阮佃夫奢侈中書舎人劉休甞詣之遇佃夫出行中路相逢要休同返就席便命施設一時珎肴莫不畢備凢諸火齊並皆始熟肴胾數十種佃夫常作數十人饌以待賔客故造次便辨􅀋皆如此雖晉丗王石不能過也又曰郭原平養親必以巳力傭賃以給供養主人設食原平以家貧父母不辦有肴味唯飡塩飯而巳􅀂家或無食則虚中竟日義不獨飽湏日暮作畢受直歸家於里糴買然後舉㸑齊書曰陳顯達髙帝即位拜護將軍後御膳不宰牲顯逹上熊蒸一盤上即以充飯又曰武帝收沙門寳誌在獄中語獄吏曰門外有兩輿食金鉢盛飯汝可取之果是文惠太子及竟陵王子良所供飬又曰王儉甞詣武陵王曄曄留儉設食盤中菘菜鮑魚而巳儉重其率直爲飽食盡歡而去又曰周顒隱居鍾山衛將軍王儉謂顒曰卿山中何所食顒曰赤米白塩緑葵紫蓼文惠太子問顒菜食何味最勝顒曰春􅀄早韮秋末晚菘又曰張緒口不言利有財輒散之清談端坐或竟日無食門生見緒飢爲之辦食然未甞求也梁書曰沈顗逢齊末兵荒與家人并日而食或有饋其梁􅁏者閉門不受唯採蓴荇根供食以樵採自資怡怡然恒不改其樂又曰孔休源到都寓於宗人少府孔登㑹以祠事入廟侍中范雲一與相遇深加褒賞曰不期忽覯清風頓祛鄙􅈔觀天披霧驗之今日後雲命駕到少府登便拂筵整席謂當詣巳備水陸之品雲駐筋命休源及至取其常膳正有赤倉米飯蒸䱒音醃魚雲食休源食不甞主人之饌髙談盡日同載還家登深以爲愧又曰臨川王蕭宏所倖江無敵服玩侔於齊東昏潘妃寳􅓏音爕直千万好食鰿音鲫魚頭常日進三百他珎膳盈溢後房食之不盡棄諸道路又曰何逺爲武昌太守江左水族甚賤逺毎食不過乾魚數片而巳又曰何裔侈於味食必方丈後稍去其甚者猶食白魚䱉脯糖蟹以爲非見生物疑食蚶蠣使門人議之學生鍾玩曰䱉之就脯但驟於屈申蟹之將糖躁擾弥甚仁人用意深懷如怛至於車螯蚶蠣眉目内闕慙渾沌之􅀉獷殻外緘非金人之慎不悴不榮曽草木之不􅀂無香無臭與瓦礫其何筭故冝長充庖厨永爲口實陳書曰徐孝克爲國子􅀕酒毎侍宴無所食噉至席散當其前膳羞損减帝宻記以問中書舎人管斌斌自是伺之見孝克取珎菓内紳帶中斌當時莫識其意後㝷訪方知其以遺母斌以啓宣帝嗟嘆良乆乃勑自今宴享孝克前饌並遣將還以餉其母時論美之崔鴻後趙録曰石虎召姚弋仲弋仲輕􅀐至鄴引入領軍省賜以御食仲怒曰國家有賊召我擊之官當見我問方畧以破賊而食我我來覔食耶乃引見又後燕録曰王鳯字道翔冝都王桓之子也桓好脩宫室鳯年八歳左右枹之隨桓周行殿觀桓問之曰此苐好不鳯􅀏曰此夲石家諸王故第今王脩之室無常人何煩過好桓大竒之毎食必與之同案鳯辭日今王之膳兼肴百品而外有糟糠之民非是小兒所可同大王之味也桓彌加歎賞又南燕録曰濟南尹鸞身長九尺腰帯十圍貫甲跨馬不據鞍由蹬慕容德見而竒其魁偉賜之以食一進斛餘德驚曰所噉如此非耕能飽且才皃不凢堪爲貴人可以一縣試之於是拜逢陵長政理脩明大􅀵民譽燕書曰少帝建熈六年上谷人公孫几乆隱昌􅀺之域冬衣單布寢土牀上夏則併飡茹於一器停使蛆臭然後乃食人咸異之莫能測也後魏書曰裴安祖年八九歳就師講詩至鹿鳴篇語諸兄云鹿得食相呼而况人乎自此未曽獨食又曰髙閭甞造胡叟家遇叟短褐曳柴從田歸舎爲閭設酒食皆自手辨索其館宇卑陋園疇􅄶局而飯菜精潔醢醬調羮見其妾並衰跛􅆌衣布穿􅁦閭見其貧以衣物直十餘疋贈之亦無辭愧又曰盧彪爲太子詹事魏􅀵常來詣之訪以洛京舊事不待食而起云難爲子費叔彪留之良乆食至但有粟飡葵菜木椀盛之片脯而巳所待僕從亦盡設食一與巳同又曰楊愔㓜時爲季父暐大嗟異顧謂賔客曰此兒恬􅁉有我家風宅内有茂竹遂爲愔於林邊別葺一室命獨處其中常同盤具盛饌以飯之因以督勵諸子曰汝軰但如遵彦謹愼自得竹林別室同盤重肉之食後椿誡子孫曰吾兄弟􅀂在家必同盤而食􅀂有近行不至必待其還亦有過中不食忍飢相待吾兄弟八人今存者有三是故不忍別食也又願畢吾兄弟不異居異財汝等眼見非爲虚假如聞汝等兄弟時有別齋獨食此人又不如吾等一丗也又曰元欽曽託青州人髙僧壽爲子求師師至未幾逃去欽以讓僧壽僧夀性滑稽乃謂欽曰凢人絶粒七日乃死始終五朝便尓逃遁去食就信實有所闕欽乃大慙於是待客稍厚又曰崔敬友恭寛接下循身勵節自景明巳降頻歳不登飢寒請匄者取足而去又置逆旅於蕭然山南大路之北設食以供行者又曰刁少雍字季仲少聦頴有孝行尤爲祖父紹先所愛紹先性􅄝羊肝常呼少雍共食及紹先卒少雍終身不食肝北齊書曰崔瞻在御史臺恒於宅中送食備盡珎羞別室獨飡處之自􅀂有一河東人士姓裴亦爲御史伺瞻便徃造焉瞻不與交言又不命匕筯裴坐觀瞻食罷而退明日裴自携匕筯恣情飲噉瞻方謂裴云我􅀄不喚君食亦不共君語君遂能不拘小節昔劉毅在京口冐請鵝炙豈亦異於是乎君定名士於是毎與之同食又曰趙郡王叡十歳䘮母髙祖親送叡至領軍府發䘮舉聲殞絶哀感左右三日水漿不入口髙祖與武明婁皇后殷勤敦譬方漸順旨由是髙祖食必喚叡同案其見愍惜如此又曰文宣昬逸常山王演固諫大􅀍歐撻閉口不食太后極憂之常謂左右曰儻小兒死柰我老母何於是毎問王疾謂曰努力強食當以王晞還汝乃釋晞令往王抱晞曰吾氣息惙然恐不能相見晞流涕曰天道神明豈令殿下遂斃此舎至尊親爲人兄尊爲人主安可與計殿下不食太后亦不食殿下縱不自惜不惜太后乎言未卒王強坐而飯晞由是得免遂還爲王友又曰楊休之除中山太守先是韋道建宋欽道代爲定州長史帶中山太守並立制禮之宫出行不得過百姓飲食有者即數錢酬之休之常以爲非及至郡復相因循或問其故休之曰吾昔非之者爲其失仁義今日行之者自欲避嫌疑豈是夙心直是處丗難耳後周書曰柳虬脫畧人間不拘小節弊衣䟽食未甞改操人或譏之虬曰衣不過適體食不過充飢孜孜營求徒勞思慮耳又曰長孫澄雅好賔客接引忘疲雖不飲酒而好觀人酣興常恐座客請歸毎勤中厨別進異饌留之隋書曰田翼不知何許人也性至孝養母以孝聞其母卧疾歳餘翼親易燥濕母食則食母不食則不食唐書曰髙祖師次于古堆去綘郡二十餘里有紫雲如華蓋樓闕之形正臨髙祖之上時隋絳郡通守陳叔達堅守不下髙祖謂厨人曰吾明日下城然後朝膳辛夘引兵攻城自旦及辰而破髙祖乃食又曰太宗謂侍臣曰夫仁義之道當思之在心常令相繼􅀂斯湏懈怠則去之巳逺猶如飲食資身恒令腹飽乃可存其性命又曰髙宗朝諸宰臣以政事堂供饌珎美議减其料東臺侍郎張文瓘曰此食天子所以重機務待賢才也吾軰􅀂不任其職當自陳乞以避賢路不可减削公膳以邀求名譽也國家之所費不在此苟有益於公道斯亦不爲多也衆乃止又曰髙宗朝文武官獻食賀破髙麗上御玄武門之觀德殿奏九部樂極懽而罷又曰髙宗朝皇太子乆在内不岀稀與宦臣接見典膳丞邢文偉减膳上啓曰竊見大戴記曰太子旣冠成人免保􅀓之嚴則有司過之史虧膳之宰史之義不得書過不書則死之宰之義不得撤膳不撤則死之近者巳來未甚延納談議不接謁見尚稀三朝之後但與内人獨居何由發揮聖智使睿哲文明者乎今史雖闕官宰當奉職􅁰備所司不敢逃死謹守禮經遽申减膳其年右史貟闕宰臣進擬數人上曰文偉嫌我兒不讀書不肯與肉喫此人甚正直可用爲右史遂拜焉又曰盧懷愼爲黄門監兼吏部尚書卧病旣乆宋璟盧從愿常相與訪焉懷愼卧於􅁦單席門無簾箔毎風雨至即以席蔽焉常器重璟及從愿見之甚喜留連永日命設食有蒸豆兩甌菜數爼而巳此外脩然無辦又曰韋陟性尚奢侈於饌羞尤爲精㓗植榖麥仍以鳥羽擇米毎食畢視厨中所委弃不啻萬錢之直又曰裴冕性夲侈靡尚車服及營珎膳毎㑹賔客有昩於品味之名者又曰順宗時宰臣鄭珣瑜韋執􅁩方與諸宰相㑹食於中書故事丞相方食百寮無敢通見者王叔文是日至中書欲與執􅁩計事令直省通執􅁩直省以舊事告叔丈叔丈怒叱直省直省懼入白執􅁩執􅁩逡廵慙􅎼竟起迎叔丈就其閤語良乆宰相杜佑髙郢珣瑜皆停筯以待報者云叔文索飯韋相公巳與之同食閤中矣佑郢等心知其不可畏懼叔文莫敢出言珣瑜獨歎曰吾豈可復處此乎頋左右取馬徑歸遂不起又曰永泰中軍容使魚朝恩加内侍監判國子監事丁未詔魚朝恩赴國子監視事將令宰相大臣及常叅并六軍將軍於國子監送上仍令京兆府造食岀教坊樂以寵之是日文武大臣巳下子弟二百餘人皆以本官備章服充附學生列於學館廊下待詔給錢一萬貫充食本以爲附學生厨食之資朝恩自是數詣國學從者常數百人京兆率錢以備膳羞一費或至數十萬又曰楊炎與門下侍郎盧􅂎同執大政􅂎形神詭陋夙爲人所褻而炎器岸髙峻罕防細故方病飲膳無節或爲糜飱別食閤中毎登堂㑹食辭不能偶䜛者乗之謂􅂎曰楊公鄙不欲同食􅂎衘之又曰常衮爲相將固讓堂厨同列以爲不可而止議者以爲厚禄重賜所以優賢崇國政也不能當辭位不冝辭禄食太平御覽卷第八百四十八
