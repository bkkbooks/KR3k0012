front:
  text: 太平御覽卷第五百三十四
  hash: sha256:cfeee005580cb5a908d1d496735d33637e5abeb9ac19651717b9a68e63935123
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_534-1a}
body:
  text: 禮儀部十三辟雍靈臺學校辟雍毛詩大雅曰鎬京辟雍自西自東自南自北無思不服武王作邑於鎬京箋云自由也武王於鎬京行辟雍之礼日四方來􅀚者皆感化其德心無不歸服禮記王制曰天子曰辟雍諸侯曰泮宫尊卑斈異名辟明雍和也所以明和天下也伴之言恤政教也禮記禮統曰所以制辟雍何教化天下也辟雍之制奈何王制曰辟雍圎如璧雍以水内如覆外如偃盤也諸侯泮宫半有水半有宫也諸侯所化者少故半有宮焉三王之制奈何夏天子曰重屋諸侯曰廣宗殷天子曰廟諸侯曰丗室周天子曰辟雍諸侯曰伴宮郷曰庠里曰序是其制也禮記外傳曰學者覺也人生也皆禀五常之正性故聖人脩道以教之使其發覺不失其性也小人斈道則易使也不從教則凶人也天子諸侯皆有大學小學小斈在東少陽之地公宫之左太學在西有虞氏之學曰庠亦謂之米廪藏躬耕之榖於斈中以供􅀕祀虞舜尚孝夏曰序殷曰瞽宗瞽無目者樂正古之學者周曰辟雍辟明也雍和也亦爲太學東膠漢書禮樂志曰武帝時丞相大司空奏請立辟雍㑹按行長安南營表未作遭帝崩群臣引以爲定謚及王莽爲宰衡欲耀衆庶遂興辟雍後漢書曰丗祖中元二年春􅀄起辟雍行大射之禮續漢書禮儀志曰明帝永平中始率群臣躬養三老五更于辟雍行大射之禮魏志曰明帝幸辟雍于㑹命群臣賦詩宋書禮志曰晉武帝太始六年帝臨辟雍行郷飲酒之禮詔曰禮儀之廢乆矣乃今復講肆舊典賜太常絹百疋丞愽士及學生酒咸寜三年惠帝復行其禮白虎通曰天子立辟雍者何所以行禮樂宣德化也辟者象璧以法天雍者何雍之以水象教化流行五經通義曰諸侯不得觀四方故缺以東南半天子之學故曰頖宫三輔决録曰辟雍水四周於外象四海也桓譚新論曰王者作圎池如璧形實水其中以圜壅之故曰辟雍言其上承天地以班教令流轉王道終而復始說苑曰辟雍天子郷飲之處戴延之西征記曰洛城南有平昌門道東辟雍壇去靈臺三里俱是魏武帝所立髙七丈班固東都賦辟雍詩曰乃流辟雍辟雍湯湯聖皇莅止造舟爲梁皤皤國老乃父乃兄抑抑皇儀孝友光明於赫太上示我漢行洪化惟神永觀厥成李尤辟雍賦曰卓矣煌煌永元之隆含􅀪該要周建大中蓄純和之優渥􅀆化盛溢而兹豐李尤辟雍銘曰惟王所建方中圎外清流四匝蕩滌濁􅁾傳玄帝幸辟雍郷飲酒賦曰時皇帝枉萬乗之尊􅀆以幸辟雍鹵簿齊列群官正容侍衛參差階㦸百重乃延郷七乃命王公是日也定小㑹之常儀􅀆饗殊俗而見逺􅀖連三朝以考學􅀆覽先賢之異同靈臺毛詩文王靈臺曰靈臺民始附也文王受命而民樂其有靈德以及鳥獸昆䖝焉天子有靈䑓所以􅀚祲象察氣妖祥經始靈臺經之營之庶民攻之不日成之詩氾暦樞曰靈臺候天意也經營靈臺天下附也禮含文嘉曰禮天子靈臺以考觀天人之際隂陽之㑹也揆星度之驗徴氣朔之瑞應原神明之變化爲萬姓獲福於天禮統曰所以制靈臺何以尊天重民備災御害豫防未然也夫王者當承順天地節禦隂陽也夏所以爲清臺何明明相承太平相續故爲清臺殷爲神臺周爲靈臺何質者據天而王天者稱神文者據地而王地者稱靈是其異也孝經援神契曰靈臺考符居髙顯聖王所以宣德察微五經通義曰王者受命而起所以立靈臺靈臺何以爲在於野中國之南附近辟雍依仁宮也靈臺制度奈何師􅀃之積土崇増其髙九仭上平無屋髙九仭者極陽之數上平無屋望氣顯著續漢書􅀕祀志曰明帝即位郊祀五帝於明堂卒事遂升靈臺以望雲物崔鴻十六國春秋後趙録曰建武二年置女大史靈臺仰觀災祥以考中外太史驗察虗實唐書曰乾元元年於永寜坊張守珪宅置司天臺制日建設􅀖都必稽􅀇象分列曹局皆應物冝靈臺二星主觀察雲物天文位在太微西南今興慶宫上帝延也考符之所合置靈臺三輔故事曰漢作靈臺於城東周作靈臺在灃水永東常以四孟之月登臺而觀述征記曰長安宮南有靈臺髙十仭上有銅渾天儀又相風銅鳥或云此鳥遇千里風乃動六韜曰文王旣出羑里召周公旦築爲靈臺新序曰周文作靈臺及池沼掘得死人骨吏以聞於文王文王曰更塟之天下聞之皆曰文王賢矣澤及朽骨而况於人乎班固東都賦靈臺詩曰乃經靈臺靈臺旣崇帝勤時登爰考休徴三光宣精五行布序習習祥風祁祁甘雨百榖蓁蓁庶草蕃廡屢惟豐年於皇樂胥潘岳閑居賦曰靈臺傑其髙跱闚天文之祕奥究人事之終始學校毛詩國風曰子衿刺學校廢也亂丗則學校不脩焉青青子衿悠悠我心青矜青領也學子之所服縱我不徃子寜不嗣音尚書大傳曰耰鉏巳藏歳事欲畢餘子皆入學十五始入小學見小節踐小義十八始入大學見大節踐大義周禮地官下師氏曰師氏以三德敎國子一曰至德以爲道夲二曰敏德以爲行夲三曰孝德以知逆惡又教三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長鄭􅀇注曰德行外内之言也在心爲德施之爲行居虎門之左司王朝凡國之貴遊子弟學焉禮記學記曰君子如欲化民成俗其必由學乎所學聖人之道在方䇿玉不琢不成器人不學不知道是故古之王者建國君民教學爲先又學記曰古之教者家有塾黨有庠術有序國有學比年入學中年考校一年視離經辨志三年視敬業樂群五年視愽習親師七年視論學取友謂之小成九年知􅀋通逹強立而不反謂之大成左傳襄六曰鄭人遊于郷校杜預曰郷乏學校以論執政然明謂子産曰毀郷校如何􅂲於中謗議國政也子産曰何爲夫人朝夕退而遊焉以議政之善否其所善者吾則行之其所惡者吾則改之是吾師也􅀂之何毀之論語䜟曰學者織也五經通義曰三王教化之宫揔名爲學夏爲校校言教也漢書曰郡國曰學縣道邑侯國曰校校學置經師一人續漢書禮儀志曰明帝永平中始師群臣飬三老五更於辟雍郡國縣道行飲酒禮于學校後漢書曰桓榮車駕幸太子學㑹諸􅀶士論難於前榮􅀍服儒衣温恭有藴藉藴藉猶言寛􅀶有餘也藴音於問反辯明經義每以禮讓相厭不以辭長勝人儒者莫之及厭服也特加賞賜又詔諸生雅吹擊磬盡日乃罷吹管奏雅頌也東觀漢記曰光武建武五年􅀄起太學宫諸生吏子弟及民以義助作上自齊歸幸太學賜􅀶士弟子有差宋書禮志曰漢獻帝建安二十二年魏國作泮宫于鄴城南魏文帝黄􅀄五年立太學於洛陽魏名臣奏曰蔣濟奏大學堂上官爲置鼓禮曰入學鼓篋遜其業也凡學受業皆當湏十五以上公卿大夫子弟在學者以年齒長㓜相次不得以父兄位也學者不恭肅慢師酗酒好訟罰飲水三升晉諸公讃曰惠帝時裴頠爲國子􅀕酒奏立國子太學起講堂築門闕刻石冩經晉令曰諸縣率千餘户置一小學不滿千户亦立宋書禮志曰晉征西將軍􅁃亮在武昌開置學官教曰人情重交而輕財好逸而􅁖勞學業致苦而禄荅未厚由捷徑者多故莫肯用心洙泗邈逺風雅彌替後生放狂不復憲章典謨臨官宰政者務目前之治不能閑於典誥遂令詩書荒塵頌聲寂寞仰瞻俯省能不歎􅁣南史曰宋時國學頺廢未暇脩復明帝大始六年置揔明觀以集學士或謂之東觀置東觀􅀕酒一人揔明訪舉郎二人儒􅀇文四科置學士千人其餘令史下各有差是歳以國學旣立省揔明觀於王儉宅開學士館以揔明四部書充之三輔舊事曰漢太學在長安門東書社門立五經愽士貟弟子萬餘人學中有市有獄光武東遷學乃廢任預益州記曰文翁學堂在大城南昔經災火蜀郡太守髙朕修復繕立其欒櫨椽節制猶古撲即令堂基六尺夏屋三間通皆圖􅀞聖賢古人之象及禮器瑞物堂西有二石室又以爲州學郡更於夷里橋道東起學也述征記曰太學在國子學東二百歩學堂裏有太學讃碑記曰建武三十七年立太學堂永建六年制下府繕治并立諸生房舎千餘間陽嘉元年畢刋子碑有太尉龐叅司徒劉﨑太常孔扶將作大匠胡廣荅記制黃圖曰禮小學在公宮之南太學在城南就陽位也去城七里王莽爲宰衡起靈臺作長門宫南去堤三百歩起國學於郭内之西南爲􅀶士之宫寺門北出王於其中央爲射宫門西出殿堂南嚮爲牆選士肆射於此中此之外爲愽士舎三十區周環之此之東爲常滿倉之北爲㑹市但列槐樹數百行爲隧無牆屋諸生朔望㑹此市各持其郡所出貨物及經書傳記笙磬樂相與買賣邕邕揖讓或論議槐下其東爲太學宮寺門南岀置令丞吏詰姦究理辭訟五愽士領弟子貟三百六十六經三十愽土弟子萬八百人主事髙弟侍講各二十四人學士司舍行無逺近皆隨檐雨不塗足暑不􅁀首决疑要注曰漢􅀄置愽士而無弟子後置弟子五十人又増滿五百漢未至數千人魏之務學者始詣太學爲門人二歳通二經者􅀘文學掌故滿三歳通三經者櫂爲太子舎人摰虞駮冝立學事曰河內太守魯夔使民二百家共立一學未成而司􅀠奏以違法尚書郎中􅀐都尉臣摰虞駮夔爲近畿大都朝所委任親臨民物足識事冝累表仍上求二百家立一學是其留心學校必欲有成也崔瑗南陽文學頌曰昔聖人制禮作樂也將以統天理物經國序民立均出度因其可利而利之俾不失性也故觀禮則體敬聽樂則心和然後知反其性而正其身也梁元帝召學生教曰閣下昔楚王好詩沛王傳易猶且傳之不朽以爲盛羙吾親承天旨聞方欲化行南國􅀍于西楚太平御覽卷第五百三十四
