front:
  text: 太平御覽卷第八百五十五
  hash: sha256:9a5d556658d3641670ef72517a31d3e3a3219d8c5108960fa4bd23fd101613cb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_855-1a}
body:
  text: 飲食部十三䜴韲䜴釋名曰䜴􅄝也五味調和湏之而成乃可甘􅄝也故齊人謂鼔聲如􅄝史記曰蘖麫鹽䜴千荅徐廣日或作合器名謝承後漢書曰羊續爲南陽太守塩䜴共壷􅀽宏漢紀曰李􅔸數設酒請郭汜或留汜汜妻懼與􅔸婢妾私而奪巳愛思有以離間之􅔸送饋汜妻乃以䜴爲藥汜將食妻曰食從外來儻或有故遂􅎥藥示之曰一栖不兩雄我固疑將軍之信李公也明日􅔸請汜大醉汜疑􅔸藥之絞糞汁飲之乃解於是遂相疑猜也三輔决録曰南陽舊語曰前隊大夫范仲公塩䜴蒜果共一䇶言其廉儉也豫章列士傳曰羊茂爲東郡太守岀界買塩䜴􅀶物志曰外國有豉法以苦酒溲豆􅁀令極􅏫以油麻蒸訖復􅁀三過乃止然後細擣椒屑篩下隨多少合投之金樓子曰五色茄一名金塩地榆一名玉䜴惟此二物可以煑石廣志曰苦􅁗䜴也楚辭招魂曰大苦酸醎大苦謂䜴辛甘行言取䜴調和以椒薑鹹酢酪則辛甘之味皆發而行古歌曰美䜴出魯門韲周禮曰醯人掌共五齊昌本脾折蜃豚拍􅀷蒲也記曰卒食客自前跪徹飯韲以授相者釋名曰蟹韲去其匡熟擣合如韲也通俗文曰淹韭曰韲淹薤曰東觀漢記曰王莽將敗北海逢萌載韲器於市曰辛乎因潜藏不見魏志曰華佗嘗見病咽塞者語之曰向來道隅有賣餅人萍韲甚酸可取三􅂛飲之如言立吐一虵王隱晉書曰􅀽甫曰美莫過稻不可以爲韲語林曰石崇嘗冬月得韭韲王愷貨崇帳下督云是擣韭根雜以麥苗耳楚辭曰懲於羹者而吹虀又曰呉酸毛蔞不沾薄毛菜也言呉人善爲致美其菜􅀂蔞味無沾薄言有調也又曰蒿也蔞不沾薄繁草也蔞香沾多汗也薄無味也言呉人工調鹹酸使偷蒿蔞以爲虀味酸又不薄􅃴甘美人也崔寔四民月令曰八月収韭菁作擣韲弘君舉食撽曰大市覆甖之蒜東里獨姥之醯大塩􅄂以薑椒叛奴使之春韲嶺表異録曰容南土風好食水牛􅁏言其脆美則柔毛肥􅇾不足比也毎軍衙有􅈰筵必先此物或炮或炙盡此一牛旣飽即以聖韲銷之聖韲如有菘云是牛膓胃中巳化草旣至即以塩酪薑桂調而啜之腹遂不脹北客到彼多赴此筵但能食􅁏罔有啜韲者太平御覽卷第八百五十五
