front:
  text: 太平御覽卷第五百二
  hash: sha256:0de2780d76e6d74b8f78d05e7dbcf51fce07d25568d9f4efd45cfffa8e672a82
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_502-1a}
body:
  text: 逸民部二逸民二後漢書曰王符字節信安定臨涇人好學有志隱居著書度遼將軍皇甫規官歸安定郷人有貨買鴈門太守者還家謁規規卧不迎旣入而問卿在郡食鴈羙乎有頃王符在門規素聞符名乃驚遽而起衣不及帶屣履出迎援符手而還與同坐極歡時人爲之語曰徒見二千石不如一逄掖言書生道義之爲貴也又曰向栩字輔興河内朝歌人常讀老子􅃺如學道常坐竈北板床上積乆板乃有􅂰踝足指之處時賔客就之輙伏不起時人莫能測後徴拜侍中􅋲然正色百官憚之又曰梁鴻字伯鸞扶風平陵人同縣孟氏有女狀肥醜甚黒力舉石臼擇對不嫁至年三十父母問其故女曰欲得賢如梁鴻者鴻聞娉之入門七日而鴻不荅妻乃跪床下請曰􅀼聞夫子髙義簡斥數婦妾偃蹇數夫今而見擇敢不請罪鴻曰吾欲裘􅄄之人可以俱隱今乃衣綺縞傅粉墨豈鴻所願哉妻曰以觀夫子之志耳妾自有隱居之服乃爲椎髻布衣操作具而前鴻大喜曰此眞梁鴻妻也字曰德曜孟光因共入霸陵山後至呉爲人賃舂毎歸妻爲具飡舉按齊眉又曰戴良字叔鸞汝南愼陽人母卒兄伯鸞居廬啜粥非禮不行良獨食肉飲酒哀至乃􅂘二人俱有毁容或問良曰子之居喪禮乎對曰然禮所以制情佚也情茍不佚何禮之所論哉豈􅀂乎食旨不甘故毁容之實􅀂味不存故口食之可也又曰法眞字髙卿扶風郿人愽通内外圖典爲􅀜西大儒弟子自逺方至者數百人性恬静寡欲不交人間事太守見之曰欲以功曹相屈光賛夲朝如何真曰以明府見待有禮故敢自同賔來若欲吏之真將在北山之北南山之南者矣太守玃然不敢復言又曰漢賔老父不知何許人也桓帝幸竟陵過雲夢臨􅃆水百姓莫不觀者老父獨耕不輟尚書郎張温異之使問曰人皆觀老父獨不觀何也父曰我野人耳不逹斯語請問天下亂而立天子耶治而立天子耶立天子以父天下耶役天下以奉天子耶昔聖王宰丗茅茨采􅁺而萬民以寧今子之君勞民自縱逸逰無忌吾爲子羞之又何忍與人觀之乎温大慙問其姓名不告而去謝沈後漢書曰龍丘萇呉郡人篤志好學王莽􅆲位隱居太山以耕稼爲業公車徴不應更始時任延年十九爲郡東部尉折節下士鍾離意爲主簿自請萇爲門下􅀕酒延教曰龍丘先生淸過夷齊志慕原憲都尉洒掃其門猶懼辱之何召之有又曰鄭敬字次卿汝南人閑居不修人倫都尉逼爲功曹㕔事前樹時有清汁以爲甘露敬曰明府政未能致甘露此木汁耳辝病去隱處精學同郡鄧敬公爲督郵過存敬敬方釣魚於大澤因折芰爲坐以荷薦肉瓠瓢􅄹酒言談彌日蓬廬蓽門琴書自娯丗祖公車徴不行又曰楊后字仲桓廣漢人潜身藪澤耦耕誦經司徒楊震表薦其髙操公車特徴不就益州刺史焦叅行部致謁后惡其苛􅁀時耕於大澤即委鉏疾逝叅志恚之収其妻子録繫欲以致后遂不知后所在乃出其妻子又曰張奉字公先弟表字公儀河内人兄弟少有髙節立精舎教授惡衣麄食太傅􅀽隗以女妻奉送女奢麗奴婢百人皆􅀍羅􅜄輜軿光路婦入門數年奉住精舎有如路人其妻待奉入朝乃徑前跪曰家公年老不以妾頑陋使侍君巾櫛自知不副雅操君如欲執梁鴻之髙節妾欲懷孟光之徴志奉無以荅妻悉徹玩飾􅀍服奴婢着縵帛執紡績具奉然後納之諸公連徴不就謂之張氏兩賢又曰符融字偉明少爲都官郎耻之委去私事少府李膺膺常貴融融幅巾􅄄衣振䄂清談膺捧手髙聽歎息不暇郭林宗始入京師詣融融一見與定至交海内服融髙識公府連徴不就魏志曰張臶在甸切字子明少逰太學後遁常山并州牧髙幹辟不至表安樂令不就後遷居任縣廣平太守盧毓到官二日綱紀曰承前致版謁臶毓教曰張先生所謂上不事天子下不友諸侯豈此版所可光飾哉但遣主簿奉書致羊酒之禮王隱晉書曰魏末有孫登字公和汲郡人無家属時人於汲郡北山上􅁟窟中得之夏則編草爲裳冬則􅀍髪覆靣對人無言好讀易鼓琴􅀄冝陽山中作炭者忽見有人不語精神不似常人帝使阮籍徃視與語亦不應籍因大嘯野人乃􅀏曰爾復作向聲籍又爲嘯籍將求出野人不聽而去登嘯如簫韶笙簧之音聲震山谷而還問炭人曰故是向人耳尋知求不知所止推問乆之乃知姓名孫登别傳又載又曰庾衮字叔褒頴川人與弟子治藩必跪而授條夌孰穫者雖畢而多捃者衮退待間乃方自捃不曲行旁掇跪而把之每飢率其邑人入于山林拾橡爲郡功曹舉清白異行皆不就值亂携妻子入林慮民歸之葆於大頭山而田其下有終焉之心咳發柱杖將起杖跌墜岸而死又曰董京字威輦不知何許人太始􅀄值魏禪晉遂􅀍髪佯狂常􅀫白社中時乞於市得殘碎繒絮結以自覆全帛佳綿則不肯受著作孫楚就社中與語遂載與歸終不肯坐後數年去莫知其所其寢處得一石子及詩曰未丗流奔以文代質逝將抱此􅀇虚歸我寂寞之室又曰夏統字仲御㑹稽人常學戯舡其母疾市藥于洛陽賈充聞而訪之問曰卿居海濵作何戯習仲御曰能戯舡耳充因命焉仲御即登舟鼓枻爲鯆音甫䱐音浮之歌學鯆䱐之狀俄然雲霧杳冥白魚跳入其舡充甚異之因就與語仲御不對充整服謝之仲御引掉而去弗之見也充乃歎曰可謂木人石心哉􅀄仲御在郷也人或􅀃之使仕仲御㪍然作色謂之曰我安能隨俗低眉下意乎聞君之言不􅁴寒毛競竪白汗四匝顔如渥丹心如火炙舌不住齒口不能張兩耳閉塞雙眸俱􅉂也遂竟不仕又曰董飬字仲道惠帝時遷楊后于金墉有侍婢十餘人賈后奪之然後絶膳八日而崩仲道喟然嘆曰天人旣滅大亂將至傾危宗廟在其日矣顧謂謝鯤阮千里等曰時旣如斯難可保也不如深居岩洞耳乃自荷檐妻子推鹿車入于蜀山莫知所止又曰郭文字文舉河内人隱居不仕常居臨安及呉興餘杭依山結廬臨清澗植榖種麻以供衣食常着葛巾披鹿皮其山多虎豹文獨無藩籬格障然虎豹並不至太興中楊州刺史王導聞其名乃自迎與相見尋而逃去莫知所在又曰郭瑀字元瑜燉煌人也避丗不仕凉州牧張天錫遣使者孟公明備禮徴瑀乃指翔鴻以示之曰此鳥也飛青雲之外翔深谷之中自東自西安可籠也遂逃入山公明乃拘其門人瑀嘆曰吾入山逃禄避罪豈謂隱其行義翻乃害平人乎乃出就徴及至姑臧值天錫母卒括髪入弔三踊而出還入其山天錫弗能強之後莫知所在又曰霍原字休明燕國廣陽人也少有志力叔父坐法當死原入獄訟之楚毒備加終免叔父年十八觀太學行禮因留貴逰子弟聞而重之元康未原以賢良徴累下州郡以禮遣皆不到也又曰郭􅄾音竒字公偉太原晉陽人也少方直有雅重􅀶學武帝欲以􅄾爲著作郎問􅄾族人尚書郎郭彰彰素疾􅄾荅云不識帝曰􅀂如卿言即堪郎矣遂決意用之及趙王倫簒位又欲用􅄾􅄾曰我巳爲武帝吏不容復爲今丗吏終身處於家又曰魯褒字元道南陽人也好學多聞以貧素自立元康之後綱紀大壞褒傷時之貪鄙乃隱姓名而著錢神論以刺之褒不仕莫知所終又曰任旭字次龍臨海章安人也㓜􅀌児童時勤於學及長立操清脩不染流俗郷曲推而愛之永康􅀄惠帝愽求清節俊異之士太守仇馥薦旭清貞㓗素學識通愽詔下以禮發遣旭以朝廷多故志尚隱遁辝疾不行元帝􅀄鎭江東聞其名辟爲􅀕酒並不就咸和二年卒魏氏春秋曰阮籍少時常逰蘇門山山有隱者莫知其姓
