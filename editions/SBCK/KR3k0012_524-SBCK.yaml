front:
  text: 太平御覽卷第五百二十四禮儀部三
  hash: sha256:b2893c139a8e9f8541613f5c39ad8ddca6648a06296f016f3519beb09b9461ab
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_524-1a}
body:
  text: 􅀕禮上毛詩召南曰采蘋大夫妻能循法度也能循法度則可以承先祖供􅀕祀也于以采蘋南澗之濵于以采藻于彼行潦蘋大萍也澗崖也藻聚藻也行潦流潦也又小雅天保曰􅁻蠲爲饎是用孝享􅁻善蠲絜也饎酒食也享獻也箋云謂將􅀕祀也禴祠烝甞于公先王春曰祠夏曰禴秋曰甞冬曰烝公事也箋云公謂后稷也君曰卜爾萬壽無疆君先君也尸所以象神卜子也箋云君曰卜爾者尸嘏主人傳神辭也又小雅􅁻日曰􅁻日維戊旣伯旣禱維戊順􅀋乗壯也伯馬祖也重物慎微將用馬力必先爲之禱其祖禱獲也箋云戊剛日也故乗壯爲順􅀋也又小雅大田曰來方禋祀以其騂黒與其􅁰稷以享以祀以介景福騂牛也黒羊豕也箋云成王之來則又禋祀四方之神祈報焉陽祀用騂牲隂祀用牲又小雅楚茨曰濟濟蹌蹌絜爾牛羊以往烝甞或剥或亨或肆或將濟濟蹌蹌言有容也亨餁之也肆陳將齊也或陳于皮或齊其肉箋云有容言威儀敬慎也冬􅀕曰烝秋􅀕曰甞祀之禮各有其事有解剥其皮者有煑熟之者有肆其骨體於爼者或奉持而進之者祝􅀕于祊祀事孔明祊門内也箋云孔甚也明狄備也契也孝子不知神之所在故使祝􅀶求之平生門内之旁待賔客之處祀禮於是甚明又小雅信南山曰􅀕以清酒從以騂壯享于祖考咸尚赤曰騂箋云清謂玄酒也酒􅊊鬯五齊三酒也􅀕之禮先以欎鬯降神然後迎生享于祖考納考時執其鸞刀以啓其毛取其血膋鸞刀乃有鸞者言割中節也箋云毛以告純人膋脂膏也血以告殺膋以升􅆨合之􅁰稷實之於蕭合馨香也是烝是享苾苾芬芬祀事孔明又生民曰生民尊祖也后稷生於姜嫄文武之功起於后稷故推以配天焉厥􅀄生民時維姜嫄生民如何克禋克祀以拂無子克能也弗之言祓也姜嫄之生后稷如何乎乃禋祀上帝於郊禖以祓除其無子之疾而得其福也履帝武敏歆攸介攸止載震載肅載生載育祀郊之時有大神之迹姜嫄履其拇指生子而飬之長名曰弃也又清廟曰清廟祀文王也周公旣成雒邑朝諸侯率以祀文王焉清廟者􅀕有清明之起德者之宫也謂􅀕文王又清廟烈文曰烈文成王即政諸侯助􅀕也新王即政必以朝享之禮􅀕於祖考告嗣位也烈文辟公錫兹祉福惠我無疆子孫保之烈光也文王錫之也又臣工曰振鷺二王之後來助􅀕也二王殷夏也其後祀也宋也振鷺于飛于彼西雍我客戾止亦有斯容箋云白馬於西雍之澤言所集得其處也興者喻祀宋之君有㓗白之徳來助􅀕周之廟得禮之冝又臣工潜曰潜季冬薦魚春獻鮪也猗與􅃮沮潜有多魚有鱣有鮪鰷鱨鰋鯉猗與欽美之言􅃮沮歧周二水也潜撡也以享以祀以介景福介助也景大也尚書舜典曰望于山川徧于羣神孔安國傳曰謂在逺者望􅀕之也羣神丘陵墳衍之屬又􅀃命曰黷于􅀕祀時謂弗欽孔安國傳曰􅀕不欲數數則黷黷則不敬也又洛誥曰祀于新邑咸秩無文孔安國傳曰以祀典祀于新邑皆次秩不在禮文者而禮之又多士曰罔弗明徳䘏祀孔安國傳曰自帝乙以上無不顯用有徳憂念齊敬奉其􅀕祀言能保宗廟社稷也尚書大傳周傳曰􅀕之爲言察也察者至也至者人事也人事至然後􅀕􅀕者薦也薦之爲言在也在也者在其道也禮志曰君子生則敬養死則敬饗也又五行傳曰簡宗廟不禱祠廢􅀕祀逆天時則水不潤下君行此四者爲逆天此宫之政北爲水故源流竭絶是水不潤下也亦如之又天官上獸人曰凡􅀕祀喪紀賔客共其死獸生獸共其㒵者凡獸入于腊人當乾之也皮毛䈥角入于玉府給作器物又天官上亨人曰􅀕祀共大羹鉶羮賔客亦如之大羹􅁏湆也鄭司農云大羹不致五味也鉶羹加塩菜也又地官上牧人曰牧人宰牧六牲而阜蕃其物以供􅀕祀之牲牷六牲謂牛馬羊豕犬雞凡陽祀用騂牲毛之隂祀用黝牲毛之望祀各以其方之色牲毛之毛純也陰祀􅀕六郊地及社禝也鄭司農云陽祀春夏也黝讀爲幽幽黒也凡時祀必用牷物時祀四時所常祀謂山川以下至四方百物也凡外􅀕毀事用尨可也尨謂􅄂色不純毀謂疈辜毀除殃咎之属也凡􅀕祀共其犧牲以授充人繫之犧牲毛羽折具也授充人者當殊養之凡牲不繫者共奉之謂非時而􅀕祀者又地官上曰牛人掌養國之公牛以待國之政令凡􅀕祀供其享牛求牛以授職人而蒭之鄭司農云享牛前􅀕一日之牛求牛禱於􅀑神祈福之牛也玄謂献神之牛謂所以登者凡􅀕祀供其牛牲之牙與其盆簝以待事牙謂福衡之屬盆簝皆器名又地官下閭師曰凡庶民不畜者􅀕無牲不耕者􅀕無盛矣又春官上太宗伯曰太宗伯之職掌建􅀖之天神人􅀑地祇之禮以佐王建保􅀖國建立也立天神人􅀑地祇之禮者謂祀之􅀕之享之之禮􅁻禮是也自􅁻禮於上汝以立安􅀖國者牙以相成明尊􅀑神重人事以禋祀祀昊天上帝以實柴祀日月星辰以楢燎祀司中司命風師雨師禋之言煙也周人尚􅆨煙氣之􅆨聞者也楢積也詩曰芃芃棫樸薪之楢之三祀皆積柴實牲體焉或有玉帛燔柴而􅂛煙所以報陽也以血􅀕􅀕社稷五祀五嶽以理沉􅀕山林川澤以疈辜􅀕四方百物不言􅀕地此皆地祇􅀕地可知也隂祀自血起貴氣􅆨也社稷土穀之神也有徳者配食凡􅀕祀大神享大􅀑享􅀕大祇帥執事而卜日􅀫視滌濯涖玉鬯省牲鑊奉玉齊詔大號治其大禮詔相王之大禮執事諸有事於􅀕者也􅀫申式也滌濯漑􅀕器也􅀂王不與􅀕祀則攝位王有故代行其􅀕事凡大􅀕祠王后不與則攝而薦豆籩徹薦徹豆籩后之事國有大故則旅上帝及四望王大封則先告后土乃頒祀于􅀖國都家郷邑頒讀爲班班其所當祀及其禮也都家郷邑謂王子弟及公卿大夫所食采地也又春官下太祝曰太祝掌六祝之辭太師冝于社造于祖馬融傳曰爾雅曰起大事動大衆必先有事於社也設軍社􅀋上帝社者社主也􅀋者以事􅀋告祀上啼國將有事於四望將行也四望日月星辰也及軍歸獻于社則前祝献於社主又春官曰家宗人掌家􅀕祀之禮凡􅀕祀致福大夫采地之所祀與都同􅀂先王之子孫亦有祖廟禮記月令曰孟春之月其祖户􅀕先脾春陽氣出祀之於户内陽也祀之先􅀕脾者爲春陽中於藏直脾爲尊也仲春之月天子獻羔開冰先薦寢廟獻羔謂献司寒也􅀕司寒而出冰薦於宗廟乃後賦之上丁命樂正習舞釋菜將舞必釋菜於先師以禮之天子乃率三公九卿諸侯大夫親徃視之順時逹物中丁又命樂正入學習樂是月也祠不用犧牲用珪璧更皮幣又月令曰孟夏之月共祀竈􅀕先肺夏陽氣盛􅀬於外祀之於竈從熱􅀋也祀之先肺者陽位在上肺亦在上肺爲尊也又月令仲夏曰祀皇地祇於方丘夏至之日祀皇地祇於方丘以髙祖神堯皇帝配坐以岳瀆等神從祀又月令仲夏曰命有司􅀕先牧謂仲夏􅀕先牧於大澤用剛日又月令季夏曰其祀中霤􅀕先心中霤猶中室也􅀕中霤之禮爲俎先進心是月也祀黄帝於南郊謂季夏土德王日則祀黄帝合樞紐於南郊以軒轅配坐以后土鎮星從祀也又月令曰孟秋其祀門􅀕先肝秋隂氣出祀之於門外隂也􅀕先肝者秋爲隂中於藏值肝凡祀門爲爼先進肝也又月令曰孟冬其祀行􅀕先腎冬隂氣盛寒於外祀之於行從辟除之􅀋行謂道也􅀕先腎者隂位在下賢亦在下凡祀行爲爼先進腎又月令孟冬日祀神州地祇於北郊謂立冬日􅀕神州地祇於北郊太宗文武聖皇帝配坐是月也命有司􅀕司寒謂孟冬􅀕司寒於北郊是月也命有司􅀕司中司命司人司禄謂立冬後亥日祀司禄等於國域西北又月令仲冬日命有司祈祀四海大川名源淵澤井泉順其盛徳之時􅀕也又曲禮上曰臨􅀕不惰􅀕服弊則焚之􅀕器弊則埋之又曲禮下曰無田禄者不設􅀕器有田禄者先爲􅀕服君子雖貧不鬻􅀕器雖寒不衣􅀕服去國􅀕器不踰境大夫寓􅀕器於大夫士寓􅀕器於士又曲禮下曰天子􅀕天地􅀕四方􅀕山川􅀕五祀歳徧諸侯方祀􅀕山川􅀕五祀歳徧大夫􅀕五祀歳徧士􅀕其先􅀕四方謂􅀕五官之神於四郊也勾芒在東祝融在南蓐收在西玄􅁳在北詩云來方禋祀者各􅀕其方之官而巳矣五祀謂竈中霤門行厲也此蓋殷時制也􅀕法天子立七祀諸侯立五祀大夫立三祀士立二祀謂周也凡􅀕有其廢之莫敢舉也有其舉之莫敢廢也爲其瀆神也廢舉謂􅀂殷廢農祀弃後不服廢弃祀農也非所􅀕而􅀕之名曰􅁋祀􅁋祀無福支子不􅀕􅀕必告於宗子不敢自專凢􅀕宗廟之禮牛曰一元大武豕曰剛鬛豚曰肥腯羊曰柔毛雞曰翰音犬曰羮獻雉曰䟽趾兎曰明視脯曰尹􅀕槀魚曰啇􅀕鮮魚曰脡􅀕水曰清滌酒曰清酌􅁰曰薌合梁曰薌萁稷曰明粢稻曰嘉􅂼韭曰豐夲鹽曰醎醝玉曰嘉玉弊曰量弊號牲物者兾於人用也元頭也武迹也腯肥也春秋傳曰􅀶碩肥腯充皃也尹正也啇猶量也歴直也萁辭也嘉善也稲􅋎􅂼之属也豐茂也大醎曰醝今河東云弊帛也又曲禮曰大饗不問卜􅀕五帝於明堂莫適卜也不饒冨冨之言備也備而巳勿多於禮又曰季氏􅀕逮闇而􅀕日不足継之以燭雖有強力之容肅敬之心皆倦怠矣有司跛􅀝以臨􅀕其爲不敬大矣他日􅀕子路與室事交乎户堂事交乎階質明而始行事晏朝而退孔子聞之曰誰謂由也不知禮乎又大傳曰牧之野武王之事也旣事而退柴於帝祈於社設奠於牧室柴尊告云地及先祖也遂率天下諸侯執豆籩駿奔走又􅀕法曰燔柴於㤗壇􅀕天也瘞埋於㤗折􅀕地也用騂犢壇折封土爲􅀕處也壇之言垣也垣明貌也折炤晢也必爲明之名尊神也地祀用黝牲與天俱用犢連言耳埋少牢於㤗昭􅀕時也相近於坎壇􅀕寒暑也王宫􅀕日也夜明􅀕月也幽宗􅀕星也雩宗􅀕水旱也四坎壇􅀕四方也山林川谷丘陵能出雲爲風􅀨見恠物皆曰神有天下者􅀕百神諸侯在其地則􅀕之亡其地則不􅀕昭明也亦謂壇也時四時也亦謂隂陽之神也埋之者隂陽出入於地中也凡此以下皆􅀕用少年又􅀕法曰聖王之制􅀕祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大菑則祀之能捍大患則祀之是故厲山氏之有天下也其子曰農能播植百榖夏之衰也周弃継之故祀以爲稷共工氏之霸九州也其子曰后土能平九州故祀以爲社帝嚳能序星辰以著衆堯能賞均刑法以義終舜勤衆事而野死鯀鄣洪水而殛死禹能脩鯀之功黄帝正名百物以明民共財顓頊能脩之契爲司徒而民成􅁳勤其官而水死湯以寛治民而除其虐文王以文治武王以武功去民之災此皆有功烈於民者也及夫日月星辰民所瞻仰也山林川谷丘陵民所取材用也非此族也不在祀典太平御覽卷第五百二十四
