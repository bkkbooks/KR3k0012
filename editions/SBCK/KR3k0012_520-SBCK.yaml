front:
  text: 太平御覽卷第五百二十宗親部十
  hash: sha256:ff658615a12be837b1407d490464775a22fe6447cf3c79a0dfea041c52b4275d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_520-1a}
body:
  text: 夫妻釋名曰夫妻匹敵之義也又曰士庶人曰妻妻齊也夫賤不足以尊稱故齊等言也易家人卦曰夫夫婦婦而家道正又序卦曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦夫婦之道不可以不乆也故受之以􅁪􅁪者乆也毛詩衡門曰豈其食魚必河之魴豈其取妻必齊之姜豈其食魚必河之鯉豈其取妻必宋之子何必大囯之女然後可妻亦取貞順而巳又草蟲大夫妻能以禮自防也喓喓草蟲趯趯阜螽興也喓喓聲也草蟲常羊也趯趯躍也阜螽鐢也卿大夫之妻待禮而行隨從君子未見君子憂心忡忡忡忡猶衝衝也婦人雖適人有歸宗之義亦旣見止亦旣覯止我心則降又采蘋曰采蘋大夫妻能循法度也能循法度則可以承先祖共􅀕祀矣女子十年不出姆教婉娩聽從執麻枲治終繭織絍組紃學女事以共衣服觀於􅀕祀納酒􅄴籩豆菹醢禮相助莫十有五而笄二十而嫁此言能循法度者今旣嫁爲六夫妻能循其爲女人時所學之事以爲法度也于以采蘋南澗之濵于以采藻于彼行潦于以奠之宗室牖下誰其尸之有齊季女尸主也齊敬也季少也又碩人曰碩人其頎衣錦聚衣齊侯之子衞侯之妻又氓曰女也不爽士貳其行士也罔極二三其德三歲爲婦靡室勞矣夙興夜寐靡有朝矣又棠棣曰妻子好合如鼓瑟琴好合志意合也合者如琴瑟之聲相應和也兄弟旣翕和樂且湛冝爾家室樂爾妻孥是究是圖亶其然乎又南山曰藝麻如之何横縱其􅅿取妻如之何必告父母取妻之禮議於生者卜於死者此之謂名析薪如之何匪斧不克取妻如之何匪媒不得此言取妻必待媒乃得也又韓弈曰韓侯取妻汾王之甥蹶父之子韓侯迎止于蹶之里百兩彭彭八鸞鏘鏘不顯其光諸娣從之祁祁如雲韓侯顧之爛其盈門如雲言衆多也諸侯一娶九女三國勝之諸娣衆妾也顧之曲顧道義也又思齊曰刑于寡妻至于兄弟以御于家􅀖言文王以禮法接待其妻至於宗族以此又能爲政治於家􅀖也禮記曰天子之妃曰后諸侯曰夫人大夫曰孺人士曰婦人婦人言服也庻人曰妻妻之言齊也又内則曰子甚冝其妻父母不􅀃岀冝猶善也子不冝其妻父母曰是善事我子行夫婦之禮焉没身不衰又曰女子二十而嫁有故二十三而嫁故謂父母䘮聘則爲妻聘問也妻之言齊以禮見問則得與夫敵耻奔則爲妾又坊記曰取妻不取同姓爲其近禽獸也所以附逺厚別也左􅀓隱公曰鄭公子忽如陳逆婦嬀辛亥以嬀氏歸甲寅入於鄭陳鍼子送女先配而後祖鍼子曰是不爲夫婦誣其祖矣非禮也何以能育禮逆婦必先告祖廟而後行鄭忽逆婦而後告廟故曰先配而後祖又曰桓公曰鄭􅀕仲專鄭伯患之使其壻雍紏殺之將享諸郊雍􅁎知之謂其母曰父與夫孰親其母曰人盡夫也父一而巳胡可比焉婦人在室則天父出則天夫女以爲疑故母以所生爲夲解之遂告􅀕仲曰雍氏舎其室而將享子于郊吾惑之以告􅀕仲殺雍糾尸諸周氏之汪公載以出曰謀及婦人冝其死也又莊公曰􅀄懿氏卜妻敬仲其妻占之曰􅁻是謂鳯凰于飛和鳴鏘鏘有嬀之後將育于姜五丗其昌並爲正卿八丗之後莫之與京又僖中曰狄人伐廧咎如赤狄之別種􅀗其二女叔隗季隗納諸􅀳公子公子以叔隗妻趙衰生盾文公取季隗生伯儵後以妻趙衰生原同屏括樓嬰原屏樓三子之邑也趙􅁎逆盾與其母趙􅁎文公女也盾狄女釈隗之子也子餘辭子餘趙衰字也􅁎曰得寵而志舊何以使人必逆之固請許之來以盾爲才固請于公以爲嫡子而使其三子下之以叔隗爲内子而巳下之卿之嫡妻爲内子又昭元曰鄭徐吾犯之妹羙公孫楚聘之矣楚子南穆公孫也公孫黒又強使委禽焉禽鴈也納采用鴈犯懼告子産子産曰是國無政非子之患也唯所欲與犯請於二子請使女擇焉皆許之子晢盛飾而入布幣而出子晢公孫黑也子南戎服而入左右射超乘而出女自房觀之曰子晢信羙矣抑子南夫也夫夫婦婦所謂順也適子南氏又莊公曰宋華父督見孔父之妻于路目逆而送之曰美而艶又曰楚子滅息以息嬀歸生堵敖及成王焉未言未與王言楚子問之對曰吾一婦人而事二夫縱不能死其又奚言又成下曰􅀳三郤害伯宗譛而殺之􅀄伯宗毎朝其妻必戒之曰盗憎主人民惡其上子好直言必及於難又襄四曰齊棠公之妻東郭偃之姉也東郭偃臣崔武子棠公死偃御武子以弔焉見棠姜而美之美其色也使偃取之爲巳取也偃曰男女辨姓今君出自丁臣出自桓不可武子筮之遇困之大過以示陳文子文子曰夫從風風隕妻不可娶也且其繇曰困于石據于蒺藜入于其宫不見其妻凶崔子曰􅊔也何害先夫當之矣遂取之又僖下曰􅀄臼季使過兾見兾鈌耨其妻饁之敬相待如賔與之歸言諸文公曰敬德之聚也能敬必有德德以治民請君用之文公以爲下軍大夫又昭七曰晉叔向適鄭􅞭薎惡欲觀叔向從使之収器者而徃立於堂下一言而善叔向聞之曰必􅞭明也下執其手以上曰昔賈大夫惡取妻而羙三年不言御以如臯射雉􅀗之其妻始􅀏而言賈大夫曰才之不可以巳也我不能射汝遂不言不笑也今夫子少不􅀭子􅀂不言吾幾失子矣又哀上曰齊侯伐􅀳夷儀弊無存之父將室之辭以與其弟無存齊人也室之爲取婦也曰此役也不死反必娶於髙國髙氏國氏齊貴族也無存欲必有功還取卿相之女也又成上曰齊􅀳戰于鞍齊師敗績齊侯見保者曰勉之齊師敗矣避女子女子曰君免乎曰免矣曰銳司徒免乎曰免矣曰茍君與吾父免矣可􅀂何乃奔齊侯以爲有禮旣而問之辟司徒之妻也予之石􅐎又成下曰魯聲伯之母不聘穆姜曰吾不以妾爲姒生聲伯而岀之嫁于齊管于奚生二子而寡以歸聲伯以其外弟爲大夫而嫁其外妹於施孝叔郄犨來聘求婦於聲伯聲伯奪施氏婦以與之婦人曰烏獸猶不失伉儷子將􅀂何曰吾不能死亡婦人遂行生二子於郄氏郄氏亡􅀳人歸之施氏逆諸河沈其二子婦人怒曰已不能庇其伉儷而亡之又不能字人之􅀌而殺之將何以終春秋漢含孳曰水火交感隂陽以設夫婦象也水火則隂陽也隂陽則夫婦也又曰妻象太隂臣法金位金隂中之剛故喻臣位水能純柔純柔妻象也戰國䇿曰鄒忌長八尺有餘身體逸麗朝服衣冠窺鏡謂其妻曰我孰與城北徐公徐公齊國之美麗者也妻曰愈窺鏡而自視不如逺矣暮寢而思之吾妻之美我私我也史記曰􅀳重耳謂其妻曰待我二十五年不來乃嫁其妻􅀏曰犂二十五年吾冢上栢大矣雖然妾待子又曰易基乾坤詩始􅀜雎夫婦之際人道大倫也禮之用唯婚姻爲競競又曰張儀巳學而遊􅀃諸侯甞從楚相飲巳而楚相亡璧門下意儀曰儀貧無行資必此人盗相璧共執儀掠笞數百不服釋之其妻曰嘻子無讀書遊􅀃安得此辱乎張儀謂妻曰視吾舌尚在不其妻􅀏曰舌在也儀曰足矣乃遂入􅁗􅁗王以爲客卿又曰吴起好用兵事魯君齊人攻魯欲將起以起取齊女爲妻而疑之起欲就名遂殺其妻以明不與齊魯卒以爲將攻齊大破之又曰外黄冨人女甚美嫁庸奴其夫徐廣曰一云其夫亡云抵父客如浮曰父時故賔客父客素知張耳乃卒爲請决嫁張耳張耳是時脫身游女家厚奉給張耳以故致千里客及宦魏爲外黄令名由此益賢漢書曰楊惲報叚㑹宗云家夲􅁗也能爲􅁗聲婦趙女也雅善鼓瑟又曰京兆尹張敞爲婦􅀞眉長安中傳京兆眉嫵有司以奏敞宣帝問之對曰臣聞閨房之内夫婦之私有過畫眉者范曄後漢書曰鮑宣妻者􅁊氏之女也字少君宣帝就少君父竒其清苦故以女妻之裝送甚盛宣不恱謂妻曰少君冨驕而吾貧不敢當妻曰大人以生守約故使妾侍巾櫛旣承君子惟命是從乃悉歸御服更衣短布裳與宣共挽鹿車歸郷里拜姑提瓮出汲後漢書曰班昭作女誡馬融善之令妻女習焉又曰沛周郁妻者字阿閑於婦道而郁驕􅁋輕躁多行無禮郁父偉謂阿曰新婦賢者女當以道正夫郁之不改新婦過也阿拜而受命退謂左右曰我無樊衛二􅁎之行故君以責我我言而不用君必謂我不奉教令則罪在我矣􅀂言而見用是爲子違父而從婦則罪在彼矣乃自殺又曰馮良有志行與妻子相遇如君臣又曰曹操攻吕布布欲降而陳宫等自以􅀒罪於操深沮其計謂布曰曹公逺來􅀔不能乆將軍􅀂以歩􅀐出屯於外宫將餘衆閉守於内􅀂向將軍宫引兵而攻其背􅀂但攻城則將軍救於外可破也布然之布妻曰昔曹氏待公䑓如赤子猶舎而歸我今將軍厚公䑓不過於曹而欲委全城􅂢妻子􅀌軍逺出乎􅀂一旦有變妾豈得爲將軍妻哉布乃止又曰酈炎風病慌忽性至孝遭母憂疾甚發動妻始産而驚死妻家訟之􅀵繫獄炎病不能治對遂死獄中尚書盧植爲之誄讃以昭其懿又曰公孫述連徴任永馮信並託清盲以避丗難永妻媱於前匿情無言見子入井忍而不救信侍婢亦對信姦通及聞􅄒誅皆盥洗更視曰丗適平自即清媱者皆自殺又曰周澤爲太守甞卧疾齋宫其妻哀澤老病闚問所苦澤大怒以妻干犯齋禁遂收送詔獄謝罪丗疑其詭激時人爲之語曰生丗不諧作太常妻一歳三百六十日三百五十九日齋一日不齋醉如􅅺又曰載封字平仲年十五詣太常師事東海申君申君卒送䘮到東海邊甞經其家父母以封當還豫爲娶妻封蹔過拜親不􅀫而去又曰河南尹王調洛陽令李阜與竇憲厚善縱舎自由尚書僕射樂恢劾奏調阜并及司􅈻校尉諸所刺舉無所廻避貴戚􅁖之妻毎諌恢曰昔人有容身避害何必以言取怨恢歎曰吾忍素餐立人之朝乎又曰更始尚書謝躬􅀄其妻知丗祖不平常戒躬曰君與劉公積不相能而信其虚談不爲之俻終受制矣躬不納竟爲丗祖所擒又曰河南樂羊子之妻者不知何氏之女也羊子甞行路得遺金一鉼還以與妻妻曰妾聞志士不飲盗泉之水廉者不受嗟來之食况拾遺求利以汗其行乎羊子大慙乃􅂢金於野而逺㝷師學一年來歸妻跪問其故羊子曰乆行懷思無佗異也妻乃引刀趍機而言此織生自􅅙蠒成於機杼一􅁝而累以至於寸累寸不已遂成丈匹今􅀂斷斯織也則損失成功稽廢時月夫子積學當日知所忘以就懿德􅀂中道而歸何異斷斯織乎羊子感其言復還終業遂七年不返又曰魏朗字仲英入爲尚書舉動皆有禮序室家相待如賔與子孫如嚴君焉又曰曹丗叔妻班彪之姑名昭字惠召入宮號曰大家毎有貢獻遣大家作賦頌注列女傳著女誡及詩並行於時魏志曰􅀄司馬宣王勒兵從闕下趣武庫當曹爽門人逼車住爽妻劉氏怖出至廳事謂帳下守督曰公在外今兵起如何督曰夫人勿憂乃上門樓引弩注箭欲發將孫謙在後牽止之曰天下事未可知如此者一二宣王遂過又曰郭淮字伯濟太原河曲人拜車􅀐將軍封曲陽侯淮妻王陵之妹當從坐侍御史徃􅀵羗胡渠師數千人叩頭請淮表留妻淮不從妻之道莫不流涕人人扼腕欲刼留之淮五子叩頭流血請淮淮不忍視乃遣妻還淮以書曰司馬宣王曰五子哀母不惜其身􅀂無其母是無五子亦無淮也書至宣王亦宥之魏氏春秋曰許允爲吏部郎選郡守明帝疑其所用非次旨召入將加罪允妻阮氏跣出謂曰明主可以理奪難以情求允之入帝怒詰之對曰某郡太守雖滿文字先至年限在後日限在前帝取事視乃釋遣出望其衣敗曰清吏也賜之衣允之出爲鎮北也喜謂其妻曰吾知免矣妻曰禍見於此何免之有魚豢魏略曰􅁊範字彦則沛郡人也使持節督青徐諸軍鎮下邳與徐州刺史鄒歧爭屋引節欲斬歧爲􅄮所奏不直坐免當轉爲兾州刺史統属鎮北將軍吕昭爲其妻仲長曰我寜作諸卿向公長跪耳不能爲吕子展屈也其妻曰君前在東坐欲擅斬徐州衆人謂君難爲作下今羞爲吕屈是復難爲作上範怒觸其首乃以刀鐶撞其腹妻其懷孕遂傷胎死又曰常林字伯槐河内人也少好學爲諸生帶經鋤其妻常自餉饋雖在田野相敬如賔􅀳書曰元康中梁國女子許嫁巳授禮聘尋而其夫戍長安經年不歸女家更以適人女不樂行其母逼強不得巳而去尋復病亡後其夫還逕至女墓不勝哀情便發塜開棺女遂活因與俱歸後聓聞知詣官争之所在不能决祕書郎王導議曰此是非常事不得以常理斷之冝還前夫朝廷從其議又曰謝安妻劉琰妹也旣見家門冨貴而安獨静退乃謂曰丈夫不如此也安掩鼻曰恐不免耳丗􅀃又載又曰吴隱之爲晉陵太守妻􅀒薪冬月無􅀍欲浣衣即披絮紡績以供朝夕又曰王凝之妻謝氏字道韞弈之女也􅀄適凝之還甚不樂弈曰王郎逸少子不惡汝何恨也荅曰一門叔父則有阿父中郎群從兄弟則有胡封羯末不意天壤之中乃有王郎又曰王導爲丞相妻曹氏性妬導甚憚之乃宻營别館以處衆妾曹氏知而將徃焉導恐妾􅀍辱遽命駕猶遟之以所執塵尾柄駈牛而進司徒蔡謨聞之戲導曰朝廷欲加公九卿之命弗之覺伹謙退而巳謨曰不聞餘物唯有短轅犢車長柄塵尾導大怒謂人曰徃與群賢共逰洛中何曽聞有蔡克兒也崔鴻前􅁗録曰􅁗州刺史竇滔妻彭城令􅂫道之女有才學織錦製廻文詩以贖夫罪劉向列女傳曰魯有秋胡子旣納妻五日而宦於陳五年乃歸未至其家見路徬有美婦人方採桑葉秋胡子􅀃之下車謂曰苦􅁀獨採桑吾行道逺願託桑䕃下一飡於是下齎休焉婦人採桑不輟秋胡子謂曰力田不如逢年力桑不如見郎今吾有金願以與夫人婦人曰嘻夫採力作紡績織絍以供衣食奉二親飬夫子而巳矣吾不願人之金所願願卿事上無有外意妾事夫家亦無􅁋佚之志子去矣収子之齎與子笥金秋胡子遂去歸至家奉金遺其母母使人呼其婦至乃向採桑者也胡秋子見之而慙婦曰子束髮脩身辭親徃仕五年乃還當驩喜乍馳乍驟􅀭塵疾至思見親今者乃􅀃路旁婦人而下子之裝以金予之是忘母也忘母不孝好色􅁋泆是汙行不義夫事親不孝則事君不忠處家不義則治官不理孝義並亡於身必不遂妾不忍見不孝不義之人子改娶矣妾亦不嫁遂去東而走自投於河而死又曰􅀳宗伯妻者􅀳大夫伯宗之妻也謂伯宗曰子之性固不可易也且國家多貳其危可立而待也子何不豫結賢大夫以託州􅀺焉伯宗子也伯宗曰諾乃得畢羊而友之及栾不忌之難三郄害伯宗譛而殺之畢羊乃送州􅀺千荆遂得免焉太平御覽卷第五百二十
