  text: 太平御覽卷第五百一十二
  hash: sha256:1d18c9bf5f1581b0db6996deb7ddc20e9abcad4fbc9e4924922dc8ced6ad9603
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_512-1a}
body:
  text: 宗親部二伯叔釋名曰伯把也把持家政也父弟爲仲仲中也位在中也仲父之弟曰叔父叔少也叔父之弟曰季季癸也甲乙之之次癸在下也􅀃文曰伯長也爾雅曰父之昆弟先生爲丗父後生爲叔父禮記檀弓曰滕伯文爲孟虎齊衰其叔父也爲孟皮齊衰其叔父也伯文殷時滕君也爵爲伯名文家語曰孔子兄子有孔蔑者與宓子賤偕仕孔子徃過孔蔑而問焉曰自汝之仕何得何亡對曰未有所得而亡者三王事􅀂聾聾冝爲襲前後相積襲也學焉得習言不得習學者是學不得明也俸禄少饘粥不及親戚是骨肉益踈也公事多急不得吊死問疾是朋友道闕也其所亡者三即此謂矣孔子不恱徃過子賤問如孔蔑對曰自來仕者無亡而得者三始誦之今得而行之是學益明也俸禄所供􅀍及親戚是骨肉益親也雖也有公事而兼以弔死問疾是朋友信篤也孔子喟然謂子賤曰君子哉􅀂人魯無君子者斯焉取斯也漢書曰􅀄髙祖微時嘗避事時與賔客過其丘嫂食應邵日丘氏女也孟康曰西方謂亡女壻爲丘婿丘空也兄亡空有嫂也晉灼曰丘大也大嫂爲家嫂也嫂厭叔與客來陽爲羮盡轢釡客以故去巳而視釡中有羮由是怨嫂及立齊代王而伯子獨不得侯太上皇以爲言髙祖曰某非敢忘封之也爲其母不長者封其子信爲頡羮侯又曰踈廣字仲翁東海蘭陵人也宣帝時爲太子太􅀓兄子受字公子爲少􅀓太子每朝因進見太􅀓在前少􅀓在後叔姪並爲師􅀓朝廷以爲榮又曰王莽字巨君孝元皇后之弟子父及兄弟皆以元成世封侯輔政凡九侯五大司馬唯莽父曼早死不侯五侯子爭侈靡莽獨􅀌貧折節爲儉受禮經勤身􅀶學事母及寡嫂養􅀌兄子行甚整又外交英俊内事諸父丗父鳯病莽侍疾亂髪垢面鳯且死以託太后及帝拜黄門侍郎東觀漢記曰鄭均好義篤實事寡嫂収兒恩禮甚至又曰魏譚有一􅀌兄子年一二􅀊常自飬視遭饑饉分升合以相生活譚時有一女生裁數月念無榖食終不能兩全棄其女飬活兄子州郡髙其義又曰桓榮卒子郁當襲爵讓於兄子顯宗不許不得巳受封而悉以租入與之又曰淳于㳟飬兄崇􅀌兒教誨學問時不如意輙平責數以捶自擊其脛欲以感之兒慙􅀒不敢復有過􅀽子又載又曰郅惲友董子張叔父及爲郷里民所害子張病惲往候之氣絶良乆復視惲歔欷惲曰知子不悲天命痛讎不復也惲即起將客取仇人頭以示子張見之悲喜因絶後漢書曰劉平字公子楚郡彭城人也更始時天下亂平弟仲爲賊所殺其後賊復忽然而至平扶持其母奔走逃難仲遺腹女始一􅀊平抱仲女而棄其子母欲還取之平不聽曰力不能兩活仲不可以絶􅀋遂去不顧謝承後漢書曰魏覇字嶠卿濟隂人爲鉅鹿太守與兄子同苦樂不得自異又曰許荆兄子丗嘗報讎殺人怨家㑹衆操兵至荆家欲殺丗荆始從府休歸與相遇因出門解劒長跪曰前無狀相犯咎皆在荆不能相教旣兄早殁一子爲嗣如令死者傷其滅絶今願殺身代丗塞咎雖死以徃猶謂更生怨家扶起荆曰許􅁺郡中稱爲賢吾何敢相侵因遂委去華嶠後漢書曰薛苞弟子求出苞不敢止乃中分其財奴婢引其老者曰與我共事乆􅀂不能使也田廬取其荒頓曰吾少時所治意所戀也器物取其朽敗曰我服食乆身口所安也􅀽山松後漢書曰范丹爲萊蕪長去官於市賣卜妻紡績以自給丹弟子愷見丹藩不完載柴將客藩之時丹適行還怒勑子抜柴載以還之後漢書曰馬援字文淵扶風茂陵人也援兄子嚴敦並喜譏議而通輕俠客援前在交阯還書誡之曰吾欲聞汝曹聞人過失如聞父母之名耳可得聞而口不可得言也好論議人長短妄是非正法此吾所大惡寧死不願聞子孫有此行也汝曹知吾惡之甚矣所以復言者施􅁭結䄜申父母之戒欲使汝曹不志之耳龍伯髙敦厚周慎口無擇言謙約節儉廉公有威吾愛之重之願汝曹効之杜季良豪俠好義憂人之憂樂人之樂清濁無所失父喪致客數郡畢至吾愛之重之不願汝曹効之効伯髙不得猶爲謹勑士所謂刻鵠不成尚􅀋鶩也効季良不得䧟爲天下輕薄子所謂􅀞虎不成反􅀋狗也訖今季良尚未可知郡將下車輒切齒州縣以爲言吾常寒心是以不願子孫効也又曰范遷字子廬沛國人也爲司徒及在公公輔有宅數畒田不過一頃復推與兄子其妻謂曰君有四子而無立錐之地可餘奉禄以爲後丗遷曰吾備位大臣而蓄財求利何以示後在位四年薨家無檐石焉又曰張堪字君遊南陽宛人也堪早􅀌讓先父餘財數百萬與兄子又曰第五倫字伯魚京兆長陵人或問倫曰公有私乎對曰吾兄子嘗疾一夜十徃退而安寢吾子有疾雖不省視竟夕不眠􅀂是者豈可謂無私乎又曰張禹字伯逹父歆爲淮陽相終於汲令禹性篤節儉父卒汲吏人􅉠送前後百萬悉無所受又以田宅推與伯父自身􅀉止又曰中常侍趙忠言於省内曰􅀽夲􅀄坐作聲價好飬死士不知此兒終欲作何叔父太􅀓隗聞而呼紹以忠言責之紹終不改又曰戴封遭伯父䘮去官又曰沮授爲曹操所執援曰叔父母弟懸命􅀽氏􅀂􅂪公靈速死爲福操歎曰􅀌早相得天下不足慮也遂赦而厚遇焉又曰劉矩字叔方少有髙節以叔父遼未得仕進遂絶州郡之命又曰伏恭字叔齊司徒湛之兄子湛弟黯位至光禄勲無子以恭爲後魏志曰荀攸字公逹祖父曇攸少􅀌及曇卒故吏張推求守曇墓攸年十三疑之謂叔父衢曰此吏有非常之色殆將姦亂衢悟乃推問果殺人亡命因是異之又曰盧毓字子家􅃰郡人也父植有名於丗毓十􅀊而􅀌遇夲州亂二兄死難當􅀽紹公孫瓉交兵幽兾飢荒飬寡嫂􅀌兄子以學行見稱又曰王昶字文舒太原人其爲兄子及子作名字皆一依謙實以見其意故兄子黙字處静沉字處道其子渾字􅀇冲深字道冲遂書戒之曰夫爲人子之道莫大於寳身全行以顯父母又曰毛玠居顯位常布衣􅂼食撫育兄􅀌子甚篤又曰張範子陵及弟子戩爲山賊所得範直詣賊請二子賊以陵還範範謝曰諸君相還兒厚矣夫人情雖愛其子然吾憐戩之小請以陵易之賊義其志悉以還範又曰王基字伯與東萊曲城人也少􅀌與叔父翁居撫飬甚篤亦以孝稱又曰髙慎字孝甫敦厚少華有沉深之量撫育􅀌兄子五人恩義甚篤琅瑘相何英嘉其履行以女妻焉蜀志曰諸􅁑亮􅀄未有子求兄子喬爲嗣瑾啓孫權遣喬来西亮以喬爲嫡子故易其字焉拜爲駙馬都尉王隱晉書曰􅁃衮􅀌兄女曰芳將嫁羙服具矣衮刈荆苕爲箕箒焉召諸子集之于堂男女以班而命芳曰汝芳少􅀌今汝適人將事舅姑洒掃庭内婦人之道也故賜汝以此匪器之羙欲汝之温恭朝夕雖休勿休也又曰魏舒容皃質朴少号遟鈍人莫之知唯叔父衡知其竒每有賔客造巳常勸使過舒言吾兄子非常人也臧榮緒晉書曰阮籍隨叔父至東兖州刺史王昶聞籍竒偉請與相見乃歎息以不能測也又曰王湛字處冲司徒渾之弟也兄子濟輕之嘗詣湛見牀頭有周易問曰叔父何用此爲湛曰體中不佳時脫復看耳濟請言之湛因剖析􅀇微妙有竒趣皆所未聞也濟才氣抗邁於湛略無子姪之敬旣聞其言不覺慄然心形俱肅遂留連彌日累夜自視鈌然乃歎曰家有名士三十年而不知濟之罪也濟有從馬絶難乗濟問湛曰叔頗好􅀐不湛曰亦好之因􅀐此馬姿形旣妙廽䇿如素善􅀐者無以過之又濟所乗馬湛愛之湛曰此馬雖快然力薄不堪苦行近見督郵馬當勝但芻秣不至耳濟試飬之而與巳馬等湛又曰此馬雖快任方知之平路無以别也於是當蟻封内試之濟馬果躓而郵馬如常濟益歎異還白其父曰濟始得一叔乃濟以上人也武帝亦以湛爲癡毎見濟輒調之曰卿家癡叔死未濟常無以荅及是帝又問如􅀄濟曰臣叔殊不癡因稱其羙帝曰誰比濟曰上比山濤不足下比魏舒有餘湛聞曰欲處我季孟間乎又曰殷浩字深源陳郡長平人也叔父融俱好老易融與浩口談論詞屈著篇則融勝浩由是爲風流談論者所宗又曰鄧攸逃奔石勤􅀒其妻子而主擔其兒及其弟子綏度不能兩全遂棄其巳子卒以無嗣綏服攸䘮三年又曰謝安字安石於東山營墅樓館林竹甚盛毎携中外子姪徃來遊集餚饌亦屢費百金丗頗以此譏焉安殊不以屑意又曰徐苗字叔胄髙宻淳于人也其兄弟皆早亡撫飬􅀌遺慈聞州里田宅奴婢盡推與之又曰謝玄字㓜度以勲封康樂縣公陳以先封東興侯賜兄子玩詔聽之更封玩豫寧伯又曰羅憲兄子尚字敬之少􅀌依叔父憲又曰劉曜逼長安凉州刺史張寔叔父西海太守肅請爲先鋒擊曜曰狐死首丘心不忘夲鍾儀在晉楚弁南音肅受晉寵割符列位羯逆滔天朝廷傾覆宴安方裔難至不奮何以爲人臣寔曰門户受重恩自當闔宗効死但叔父春秋巳髙氣力衰竭軍旅之事非耆耄所堪乃止旣而聞京師䧟􅃿肅悲憤而卒又曰慕容超字祖明德之兄北海王納之子也符堅破鄴以納爲廣武太守數􅀊去官家于張掖德之南征留金刀而去及垂起兵山東符昌収德諸子皆誅之納母公孫氏以耄獲免納妻叚氏方娠未决囚之于郡獄􅁺呼延評德故吏也嘗有死罪德免之至是將公孫及叚氏逃于羗中而生超焉年十􅀊而公孫卒臨終授超以金刀曰􅀂天下太平汝得東歸可以此刀還汝叔也何法盛晉中興書曰何充字次道道年在童齓伯父􅃉謂之曰我爲小兒時亡伯車􅀐謂我汝後當與伯父争名汝今器宇深弘亦當出我右又曰時氐賊強侵冦無巳朝議求文武良將可以鎮遏北方者衛將軍謝安曰唯有兄子􅀇可堪此任中書郎郄超聞而歎曰安違衆舉親明也􅀇必不􅀒舉才也於是徴還拜建武將軍兖州刺史領廣陵相監江北諸軍事又曰陸納字祖言爲呉興太守衛將軍謝安嘗欲詣納納兄子俶怪納無供辦復不敢問乃宻作數十人供安至納設茶果而巳俶下精飲食客罷納大怒杖俶四十云旣不能光益父叔乃復􅁾我素業三十國春秋曰羊祜都督荆州鎮襄陽時祜有平呉之志方樹基址擢王濬爲巴郡太守將委以巴峽之任祜兄子曁謂祜曰觀濬爲人志大者侈不可專任祜曰有大才必可用也識者謂祜可謂能舉善矣知人則哲叔子之謂乎又曰安帝時以劉鎮之爲散􅀐常侍光禄大夫不受鎮之毅季父也義􅄉􅀄謂毅蕃曰汝軰才力􅀔運足以得志當身爭耳我不就汝求位求財又不受汝罪累毎見毅等道從吏卒到門輙罵詬之毅甚敬畏毎未至宅數百歩止與白衣數人而進儀衛悉不自隨及至毅敗天下服其先見而劉􅁉甚敬遇之又曰燕金紫光禄大夫髙平公平歆􅀄歆伯父左光禄大夫熈拊歆首而告之曰汝儀容偉茂志節果當有佐命之功顯吾門者必汝也孫巖宋書曰許昭先義興人也諸父肇坐事繫獄七年不判子姪三十餘人昭先家最貧薄專獨斷訮無日在家餉饋肇莫非珎新家産旣盡賣宅以充之肇諸子倦怠唯昭先無有懈息如是七􅀊尚書沈演之嘉其操行肇事由此得釋沈休文宋書曰宗慤字元幹徴士柄兄子也年少時炳問慤所志荅曰願乗長風破萬里浪炳曰汝􅀂不冨貴必破我門户又曰何承天叔肹爲益陽令隨肹之官隆安四年南蠻校尉桓偉命爲叅軍時殷仲堪桓􅀇等牙舉兵以向朝廷承天懼禍難未巳解職還益陽又曰劉凝之字志安小名長年南郡人也推家財與弟及兄子立屋於野外非其力不食典略曰鄭均字仲虞任城人也好黄老兄亡後飬嫂兄子思禮甚篤及居併門盡推財産與之由是名稱風俗通云周玘字孟玉爲右將軍􅁺弟子使客殺人􅀍罪玘詣府與太守盛亮相見了不論弟子之命遂俱盡於獄弟婦不哭其子但􅂘孟玉孟玉由此爲髙曹瞞傳曰太祖一名􅁻利字阿瞞少飛鷹走狗遊蕩無度其叔父數言之於嵩操患之後逢叔父於路乃陽敗面喎口叔父怪問其故太祖曰卒中惡風叔父以告嵩驚愕呼操操曰貌如故嵩曰叔父言汝中風爲巳差乎操曰􅀄不中風但失愛叔父故見罔耳嵩乃疑焉後叔父有所告嵩終不復信操於是益得肆意陳留耆舊傳曰髙眘字孝甫敦厚少文華有沉深之量撫育􅀌兄子五人恩義甚篤琅邪相何英嘉其履行以女妻焉又曰爰彌字伯仁年十􅀊叔父蘭部濟隂從事與御卒俱獵縣送酒肉彌不肯嘗問其故荅曰聞之於諸侯夫臨其事不食其食蘭然其言還而不受貞㓗之質由是以彰也海内先賢傳曰故南郡太守南陽程堅體履仁孝秉志清㓗少譲財兄子仕郡縣居貧無資摩鏡自給襄陽記曰龐統字士元德公從子也少未有識者唯德公重之年十八使徃見司馬德操與談旣而歎曰德公誠知人此實盛德也張方賢楚國先賢傳曰隂嵩字文王南陽新野人衛尉興從祖兄也少䘮父母與叔父居㳟謙婉順温良節儉王莽未義兵􅀄起乃與叔父避丗蒼梧後徴拜謁者以叔父憂棄官張瑩漢南記曰北海靖王興性敦篤仁厚長有明略兄弟少爲光武所撫育恩愛如子劉彦明燉煌實録曰汜固字孔完大將軍􅁺純之孫也推家財百萬與寡弟婦二百萬與􅀌兄子於是三府競辟皆不就張騭文士傳曰桓驎字元鳯伯父焉知名官至太尉精察好學年十三四在焉坐有􅀫年客焉告之曰吾此弟子頗有異才今巳渉獵書傳殊能作詩賦君試爲口賦試與之客乃爲詩曰甘羅十二楊烏九齡昔有二子今則桓生參差等蹤異丗齊名驎即荅曰邈矣甘羅超等絶倫卓彼楊烏命丗稱賢嗟予惷弱殊才侔年仰慙二子俯愧過言􅀓子曰􅀓爕字南容奉寡嫂甚謹食􅀌姪如赤子丗􅀃曰郄鍳遭永嘉喪亂窮餧卿人共飴之公常携兄子外甥周翼二小兒徃食郷人曰各自窮餧以君之賢共欲存君耳恐不能兼飴公於是獨徃食輙含飯着兩頰還吐與二兒後鍳亡翼時爲莫候切縣解職歸席苫於公靈心喪三年又曰謝太􅀓寒雪日内集與兒女講論文義俄而雪驟公欣然曰白雪紛紛何所似兄子胡兒曰散塩空中差可擬兄女曰未􅀂柳絮因風起公大􅀏樂即公大兄弈之女左將軍王凝之之婦也太平御覽卷第五百一十二
