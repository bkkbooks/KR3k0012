body:
  text: 樂部七優倡􅁋樂優倡春秋元命包曰翼星主南宫之羽儀文物聲明之所豊茂爲樂庫爲天倡先王以賔于四門而列天庭之衛主俳倡近太微而爲尊家語曰魯定公與齊侯㑹於夾谷孔子攝相事齊奏宮中之樂優倡侏儒戲于前孔子趍進曰疋夫而熒侮諸侯有罪應誅於是斬侏儒手足異處齊俟懼有慙色史記曰優旃者秦侏儒也善爲􅀏言然合於道􅁗始皇時置酒而天雨陛楯者沾寒優旃見而哀之謂之曰汝欲休乎陛揗者曰幸甚優旃曰我即呼汝汝疾應曰諾居殿上上壽呼萬歳旃大呼曰陛楯郎郎曰諾優旃曰汝雖長何益故雨中立我雖短也故休居於是乎使得半相代史記曰􅁗昭王臨朝嘆息應侯進曰臣聞主憂臣辱主辱臣死今王中朝而憂臣敢請其罪王曰吾聞楚之鐵劒利而倡優拙夫鐡劒利則士勇倡優拙則思慮逺夫以逺思慮而衘勇土恐楚國之圖􅁗也漢書曰枚臯善爲賦不如相如又言爲賦多怪誕虚無不經有􅀋倡者也又曰孝惠帝葬安陵徙閞東倡優樂人五千户以爲陵邑潘安仁開中記曰善爲啁戯故語稱安陵啁也又曰張禹成就弟子爲人恭儉尤著淮陽彭宣至大司空沛郡戴崇至少府宣爲人恭儉有法度而崇愷悌多智二人異行禹甞置酒設樂與弟子娯禹將崇入後堂飲食婦人相對作優管絃鏗鎗極樂昏夜乃罷而宣之來禹見之於便坐講論經義日晏賜食不過一􅁏巵酒相對宣未甞得至後堂晉成帝咸康七年散􅀐常侍郎顧臻表曰宋代之樂設禮外之觀逆行連倒四海朝覲言觀帝庭而足以蹈天道以履地紀反天地之順傷彛倫之大乃命太常悉罷之其後復髙絙紫鹿又有天台山伎齊武帝遣主書董仲民按孫興公賦造作莓苔石石橋道士捫翠屏之狀尋省焉後魏書太武旣平河西得西涼樂至魏周之際遂謂之國􅇊魏代至隋咸重之其曲項琵琶竪箜篌之徒並出自西域非華夏舊器楊澤新聲神白馬之􅀋生於故歌非漢魏遺曲故其樂聲調悉與書史不同其歌曲有永代囯諱改焉樂解曲有萬代豊曲有于寘佛曲工人平上㥽緋褶白舞一人方舞四人白舞令闕方舞四人假髻玉支釵紫􅁝布褶白大口袴五彩接䄂烏皮鞾後魏道武帝天興六年冬詔太樂㧾章鼓吹増修雜戲造五兵角抵麒麟鳯凰仙人長蛇白象武及諸畏獸魚龍辟邪鹿馬仙車髙絙百尺長趫幢跳丸以備百戲大饗設之於殿前明元帝􅀄又増修之撰合大曲更爲鍾皷之節北齊神武平中山有魚龍爛熳俳優侏儒山車巨象拔井種􅀲殺馬剥驢等竒怪異端百有餘物名爲百戲隋書曰文帝開皇􅀄周齊百戲並放遣之焬帝大業二年突厥染干來朝帝欲誇之㧾追四方散樂大集東都􅀄於華林苑積翠池側帝惟宫女觀之有含利繩柱等如漢故事又爲夏育扛鼎取車輸石􅍫大盆器等各於掌上而跳弄之并二人戴竿其上舞忽然騰之而換易千變萬化曠古莫儔染于大駭之自是皆於太常教習毎歳正月萬國來朝留至十五日於端門外建國門内綿亘八里列爲戯􅂣百官起棚夾路從昏逹曙以縱觀之至晦而罷􅇊人皆衣錦繍繒綵其歌者多爲婦人服鳴環珮飾以花髦者殆三萬人初課京兆河南製此服而西京繒錦爲之中虚六年諸夷大獻方物突厥啓人以下皆國主親來朝乃賀於天津街盛陳百戯自海内凡有􅇊藝無不㧾萃崇侈器翫盛飾衣服皆用珠翠金銀錦􅄢絺繍其營費鉅萬閞西以安德王雄揔之東都以齊王􅌔㧾之金石匏革之聲聞數十里外彈弦㩎管以上萬八千人大列炬火光燭天地百戲之盛振古無比自是毎年以爲常焉大抵散樂􅄂戲多幻術皆出西域始以善幻人至中國漢安帝時天笁獻􅇊能自斷手足刳剔膓胄自是歴代有之趙書曰石勒叅軍周延爲館陶令斷官絹數百疋下獄以八議宥之後毎大㑹使俳優着介㥽黄絹單衣優問汝爲何官在我軰中曰我夲爲館陶令斗數單衣曰政坐取是故入汝軰中以爲􅀏列女傳曰夏桀旣棄禮義滛於婦人求四方美人積之後宫於俳優侏儒而爲竒偉戲者取之於房造爛熳之樂漢官典職曰正旦天子幸德陽殿作九賔樂舎利從東來戯於庭畢入殿門激水化成比目魚跳躍漱水作霧鄣日畢化成黄龍髙丈八出水遨戲於庭炫燿日光以二丈􅁝繫兩柱中頭間相去數丈兩倡女對舞行於䋲上又蹐局屈身藏形斗中鍾聲並唱樂畢作魚龍蔓延黄門鼓吹三通賈􅁩連語曰衛侯喜鶴鶴有飾以文繍而乗軒者賦歛繁多不頋其民貴優而輕大臣群臣或諌則面而叱之及翟伐衛冦挾域堞矣衛君泣而拜其臣民曰冦迫矣士民其逸之士民曰亦使君之貴優將君之愛鶴以君守戰矣我儕棄人也安能戰乃潰門而出走翟入衛君奔死遂䘮其國梁元帝纂要曰古艶曲有北里靡靡激楚結風陽阿之曲又有百戲起於秦漢有魚龍蔓延假作獸以戯髙絙鳯皇安􅒚王案並石季龍所作見鄴中記都盧尋橦今之縁竿見西京賦九劒九一名鈴見西京賦戯車山車興雲動雷見李尤平樂􅀚賦跟挂腹旋並縁竿所作見􅀓玄西都賦吞刀見西京賦吐火見西京賦激水轉石漱霧杠鼎並見李尤長樂􅀚及􅀓玄西都賦象人見漢書韋昭曰今之假面怪獸含利之戯並見西京賤列子曰宋有孫子者以妓千宋元君以􅀟枝長倍其身属其腫並趣並馳弄七劒迭而躍之五劒常在空中元君大驚立賜金帛又有蘭子能鷰戯者復以干元君元君大怒曰昔以異􅇊干寡人􅇊無用遇寡人歡心彼必聞此而進乃拘而戮之鷰戯􅀂絶倒投也石虎鄴中記曰虎正㑹殿前作樂髙絙龍魚鳯凰安息五案之属莫不畢備有額上縁橦至上鳥飛左囬右轉又以撞着口齒上亦如之誤馬車立木橦其車上長二丈橦頭安橦木兩􅇊兒各坐木一頭或鳥飛或倒掛又衣􅇊兒作猕候之形走馬上或在脇或在馬頭或在馬尾馬走如故名爲猨􅀐樂府雜録曰弄叅軍始因後漢舘陶令石躭有􅂍犯和帝惜其才免罪每宴樂即令衣白夾衫命優伶戲弄辱之經年乃放後爲叅軍誤也開元中有李仙鶴善此戯明皇特授韶州同正叅軍以食其禄是以陸鴻漸撰詞云韶州盖由此大周正樂曰漢武帝通西域始以善幻人至中國安帝時天笁獻􅇊能自斷手足刳腹胃自是歴丗有之唐髙宗􅁖其驚俗勑西域開津不令入中國唐書樂志曰睿宗時婆羅門樂人倒行而足舞極銛刀鋒植於地低因就刃以歴臉中又植於背下吹篳篥立其腹上終曲而無傷又伏伸其手足躡之旋身遶手百轉無已漢世有橦末􅇊又有盤舞晉世如之以柸盤舞詩云妍妯凌七盤言舞用盤七枚也梁謂之盤舞􅇊梁又有長蹻􅇊跳鈴􅇊擲倒跳劒􅇊吞劒􅇊今並存又有舞輪􅇊盖今之戯車輪者透三峽􅇊盖今之透飛梯之􅀋髙絙􅇊盖今之戯䋲者是也梁有猕猴幢戯今有縁竿􅇊又猕猴縁竽未審何者爲是今又有弄椀珠􅇊弄丹珠􅇊歌舞戯有大面撥頭蹋揺娘窟儡子等戯置教坊於禁中以處之又曰散樂非部伍之聲俳優歌舞􅄂奏漢天子臨軒設樂舎利獸從西方來戯於殿前激水成比自魚跳躍漱水作霧翳日此成黄龍脩丈八出水遊戯煇熠曰光䋲繫兩柱相去數丈二倡女對舞䋲上切肩而不傾如是􅄂變㧾名百戯江東猶有髙絙紫鹿􅉥行鱉食齊王卷衣笮䑕夏育杠鼎臣象行乳神􅀛抃足背􅀒靈嶽柱樹曰雪􅀞地成川之􅇊明皇􅄂録曰上御勤政樓大張聲樂羅列百􅇊時教坊有王大娘善戰百尺竿竿上施木山狀瀛洲方丈仍令小兒持鋒節出入其間而舞不輟時劉晏爲祕書省正字年方小形狀獰劣而惠悟過人上召於樓上簾下貴妃置於􅂰爲施粉黛與之巾櫛上令詠王大娘戴竿晏應聲曰樓前百戯競爭新唯有長竿妙入神誰爲綺羅翻有力猶自嫌輕更着人因命牙笏及黄紋􅂁以賜晏時有公孫大娘者善劒舞能爲鄰里曲及裴將軍士謂之春秋設大張􅇊樂雖小大優劣不同而劇其華侈遐方僻郡歡縱亦然樂府􅄂録曰大面出於北齊齊蘭陵王長恭才武而皃美常着假面以對敵常擊周師金墉下勇冠三軍齊人壯之爲此聲以効其指撝擊刺之容俗爲之蘭陵王入陣曲􅁋樂左傳曰煩手􅁋聲慆堙心耳乃忘和平謂之鄭聲許真五經異義曰鄭囯有溱洧之水男女聚㑹謳歌相感今鄭詩二十一篇婦人者十九故鄭聲􅁋也又云鄭重之音使人􅁋過也又曰惠王三年邊伯石遬蔿國出王立王頽王處千鄭三年子頽飲三大夫酒子國爲客子囯蔿囯客上客樂及偏聲偏舞六代之樂一日諸大夫偏釋鄭厲公見􅉑叔厲公鄭莊公之子厲公突也􅉑叔王卿士􅉑公林父也曰吾聞之司冦行戮君爲之不舉不舉樂也而况敢樂禍乎今吾聞子頽歌舞不思憂夫出王而代其位禍孰大焉臨禍忘憂是謂樂禍禍必及之盍納王乎􅉑叔許諾鄭伯將王自圉門入􅉑叔自北門入二門王城門殺子頽及五木夫王乃入禮記曰姦聲乱色不留聦明􅁋樂慝禮不接心術又曰姦聲感人而逆氣應之逆氣成象而􅁋樂興焉又曰作竒􅇊􅁋巧以蕩上心者殺無赦又曰鄭音好濫􅁋志宋音燕女溺志衛音趍數煩志齊音傲僻驕志此四者􅁋於色而害於德論語曰􅁖紫之奪朱􅁖鄭聲之乱雅樂包曰鄭聲􅁋聲之哀者漢書曰王莽􅀄獻新樂於明堂太廟群臣始冠麟韋之弁或聞其樂聲曰厲而哀非興國之聲也宋書曰廢帝元徽五年太樂雅鄭共千有餘人後堂􅄂􅇊不在其數裴子野宋略日先王作樂崇德以格神人通天下之至和節群生之流放故天子逹於士庶未曽去其樂而無非僻之心及周道衰微日失其序亂俗先之以怨怒國亡從之以哀思擾􅄂子女蕩恱􅁋志充庭廣奏則以魚龍靡漫爲瓌瑋㑹同享覲則以吴趍楚舞爲妖妍纎羅霧縠侈其衣踈金鏤玉砥其器在上班􅀭寵臣群下亦從風而靡王侯將相歌妓填室鴻啇冨賈舞女成群競相誇大互有争奪如恐不及莫爲禁令傷物敗俗莫不在此隋書曰裴藴􅌆帝徴爲太常少卿􅀄髙祖不好聲妓遣牛弘定樂非正聲清啇及孔部四舞之色皆罷遣從臣至是揣知帝意奏括天下周齊梁陳樂家子弟皆爲樂戸其六品巳下至於民庶有善音樂及倡優百戯者皆直太常是後異􅇊􅁋聲咸萃樂府皆置􅀶士弟子逓相教傳増益樂人至三萬餘國語曰平公旣作新聲新聲師㳙新聽者也師曠曰公室其將卑乎君之萌兆衰矣樂以間山川之風輝德於廣逺也風徳以廣風德者德各有風類也作樂各象其德韶夏護武之謂也風山川以逺之所樂以通山川之風􅀋也逺其德也風物以聽之修詩以詠之修禮以節之夫德廣逺而有節是以逺服而迩不遷迩近􅀃苑曰子路鼓瑟有北都之聲孔子聞之曰信矣由之不才也冉有侍孔子曰求來尓奚不謂由夫先王之制音也奏中聲爲中節彼小人則不然執末以論夲務剛以爲基故其音湫厲而微末以象殺伐之氣夫殺者乃亂亡之風也冉有以告子路子路曰由之罪也後果不得其死焉淮南子曰􅀭鄭衛之浩樂結激楚之遺風此齊人之所以􅁋泳流􅊺列女傳曰夏桀旣棄禮義􅁋於婦人求四方美人積之後宫造爛漫之樂吕氏春秋曰音樂之所由來逺矣故唯得道之人其可與言樂乎亡國戮民非無樂也其樂不樂溺者非不􅀏也溺人必􅀏雖􅀏不樂罪人非不歌也當死強歌歌不樂也亂世之樂有似於此夫樂有適心亦有過人之情欲壽而􅁖夭欲安而􅁖危欲榮而􅁖辱欲逸而􅁖勞四欲得四􅁖除則心適矣又曰楚之衰也作爲巫音髙誘注曰男曰鵛女曰巫華桓譚新論曰夫不剪之室不如阿房之宫不琢之椽不如磨龍石之桶玄酒不如蒼梧之醇控楬不如流鄭之樂樂􅀃曰聲放散則政荒崔氏云由君上驕逸則萬物荒散啇聲欹散邪官不理政壞刑罰不法而威令不行角聲憂愁爲政虐民民怨故也民不安業猶君失政徴聲哀苦事煩民勞君􅁋佚崔氏云由君邪民苦於役羽聲傾危則國不安崖氏云賦徭重其民困財物匱梁元帝纂要云古艶曲有北里靡靡激楚流風陽阿之曲皆非正聲之樂也流風亦日結鳳也唐㑹要曰調露元年太子使樂工於東宫新作寳慶之曲成命工者奏于太清觀始平縣令李嗣真謂道士劉槩輔儼曰此樂宫啇不和君臣相阻之徴也角徴失位父子不恊之兆也殺聲旣多哀調又苦􅀂國家無事太子受其咎矣數月太子廢又曰咸通中伶官李可乆善音律尤能轉喉爲新聲音辝曲折聽者忘倦京師屠沽少年効之謂之拍彈時同昌公主除䘮懿宗與郭淑妃悼念不巳可乆爲歎百年舞曲舞人皆盛飾珠翠仍􅀞魚龍地衣以列之曲終樂闋珠翠覆地詞語悽惻聞者流涕又常於安樂寺作菩薩蠻舞上益憐之可乆常爲子娶婦帝賜酒二銀鐏啓之乃金翠也時宰相曹磪中尉西門季玄屢論之懿宗不納至僖宗即位宰相崔彦昭奏遂死於嶺表開元傳信記曰唐開元末年涼州進新曲上命諸王於便殿觀之曲終諸王皆稱萬歳獨寕王不賀玄宗徴其故憲曰此曲雖嘉臣有聞焉夫曲者始於宮散於啇武於角徴羽莫不根柢囊括在於宫啇也臣見此曲宮離而少徴啇亂而加􅁀夫宮者君也啇者臣也宮不勝則君躰卑啇有餘則臣事僣臣恐異曰臣下有悖亂之事陛下有播越之禍莫不兆於斯曲也洎禄山南犯玄宗西幸方明寕王審音之妙也大業記曰安公子是隋焬帝將幸江都宮中所撰時樂工笛中吹此曲其父疾廢於卧内聞泫然流涕問其子何得此曲對曰宮中新翻也謂其子曰宫者君也此曲雖在羽調後有一宮聲徃而不返大駕東廵必不廻耳可託疾勿去其精如此太平御覽卷第五百六十九
