front:
  text: 太平御覽卷第七百七十五
  hash: sha256:0405423e8cdbcb107f6fb90ccb783a2febeef35bcfee6832c6c6a6e37d2e831a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_775-1a}
body:
  text: 車部四指南車軺車􅀞輪車四望車􅀞雲車雲母車通幰車象車騾車犢車羊車鹿車露車乗輿雜車轅輪􅁤指南車崔豹古今注曰指南車起於黄帝與􅃖尤戰涿漉之野􅃖尤作大霧士皆迷路故作指南車鹵簿令曰指南車駕四馬正道匠一人駕士十四人皆平巾幘緋衫大口袴洪範五行傳曰􅀂晉獻公雖與指南車終不覺矣齊桓公中才矣指南得悟失之則惑管仲桓公指南車也魏書馬鈞曰馬先生與髙堂隆􅁗朗爭言及指南車二子謂古典無記言之虚也先生曰古有之明帝乃召先生作之指南車成也崔鴻後趙録曰尚方令解飛機巧言􅀂神妙思竒發造指南車就賜爵􅀜内侯􅀑谷子曰肅愼氏獻白雉於文王還恐迷路問周公作指南車以送之又曰鄭人之取王也必載司南之車爲其不惑也述征記曰去端門百餘歩道南得方尚北門中有指南車車上有木仙人持信幡車東西人􅁪指南左思呉都賦曰俞􅀐騁路指南司方岀車檻檻􅀍練鏘鏘軺車釋名曰軺遥逺也四向逺望之車也說文曰軺車小車也謝承漢書曰許慶字子伯家貧爲督郵乗牛車鄉里號曰軺車督郵晉書曰李矩假爲滎陽太守矩招懷離散逺近多附之石勒親率大衆襲矩矩遣老弱入山令所在散牛馬因設伏以待之賊爭取牛馬伏發齊呼聲動山谷遂大破之斫獲甚衆勒乃退加矩冠軍將軍軺車幢盖傅子曰漢丗賤人乗軺則貴人李尤軺車銘曰輪以伐歩屏以蔽容􅀞輪車晉起居注曰穆帝永和六年皇太后嘗與帝俱出拜陵剋日尚書啓太后乗􅀞輪車以輦爲副詔曰故當乗輦車至建平陵門外易載東宫舊事曰皇太子􅀄拜有盡輪四望車四望車魏漢與楊彪書曰今贈足下四望通幰七香車二乗青牸牛二頭晉陽秋曰魏舒子亡詔曰唯有一息足堪負荷思所以散其哀懷給陽遂車四望晉諸公讃曰文淑破虜之後名聞天下當爲東夷校尉入辭丗祖見而惡之恐居邊不信宻諷監司奏淑作陽遂四望車僣飾過制免官􅀞雲車漢書曰武帝作􅀞雲車曹子建洛神賦曰六龍儼其齊首載雲車之容􅒨雲母車呉百官名曰劉蜀主得賜雲母車一乗晉書曰惠帝自鄴還洛殿中官屬備雲母輦及雲母車奉迎晉太康起居注曰齊王岀鎮詔贈清油雲母犢車傅子曰以雲母飾車謂之雲母車臣下不得乗時賜王公貴臣通幰車傅子曰有追鋒車施通幰車幰許偃切象車晉諸公讃曰平呉後南越獻馴象作大車駕之載黄門鼔吹數十人晉中朝散大駕鹵簿曰象車鼔吹一部十三人騾車蜀志曰後主劉禪乗騾車降鄧艾晉令曰乗傳出使曹朞䘮以上即自表聞聽德白服騾車副使攝事犢車釋名曰祥車祥善也善飾之車也犢車是也謝承後漢書曰潁陽劉詡好賑貧乏陳國張季扎吊師䘮值氷寒車毁牛病不能進詡逢之推所乗車強牛與之季札後知是詡還其車􅐬門不受頋譚别傳曰譚時爲太常録尚書事後徙交阯􅀄呉以罪徙者皆収家財入官及君下獄簿其資唯有犢車一乗牛數頭奴婢不滿十人無尺帛珠金之寳上聞而嘉之皆以君財付叔父穆晉書曰武帝賜汝南王亮追鋒皂車犢車又曰太傅王導妻曹氏導甚憚之乃宻營别館以處衆妾曹氏知將徃焉道恐妾􅀍辱遽令命駕猶遟之以所執麈尾柄驅牛以進司徒蔡謨聞之戯導曰朝廷欲加公九錫導弗之􅁴但謙退而已謨曰不聞餘物唯有短轅犢車長柄麈尾導大怒晉令曰百工不得服大綘紫􅙦音異假髻真珠璫珥文犀瑇瑁越疊以飾路張乗犢車羊車釋名曰羊車以羊所駕名車也晉書曰武帝平呉之後復納孫皓宫人數千自此掖庭殆將萬人而並寵者甚衆帝莫知所􅃴常乗羊車恣其所之至便宴寢宫人乃取竹葉挿户以塩汁洒地以引帝車又曰衛玠字叔寳五􅀊風神秀異惣角乗羊車入市見者以爲玉人觀者傾都晉太元起居注曰司􅀠校尉劉毅􅁗護軍羊琇私角弩四張又乗羊車請免官罪詔曰羊雖無制非素所乗者可如所奏鹿車後漢書曰更始拜趙憙爲五威偏將軍使諸將於昆陽憙􅀍瘡有戰勞還拜中郎將更始敗憙爲赤眉所圍迫急乃踰屋亡走與所友善韓仲伯等數十人携小弱越山阻僅出武􅀜仲伯以婦色羙慮爲強暴者所欲弃之於道憙責怒不聽因以泥塗仲伯婦靣載以鹿車身推之或前逢賊憙輒言其病狀以得免東觀漢記曰杜林􅀉隗囂終不降志辱身乃岀令曰杜伯山天子所不能臣至簮蒿蓆草不食其粟諸侯所不能支盖伯夷叔齊耻食周粟令且從師友之位湏道開通使順其志林雖拘於􅅝而終不屈節建武六年第成物故􅅝乃聽林持喪東歸旣遣而悔追令刺客楊賢於隴厎􅃒殺之覧見林身推鹿車載致弟䘮乃歎曰當今之丗誰能行義我雖小人何忍殺義士因亡去列女傳曰渤海鮑宣妻者桓氏之女也字少君宣嘗就少君父學父竒其清苦故以女妻之裝送資賄甚盛宣不說謂妻曰少君生尊寵習羙飾而吾貧賤不敢當禮妻曰大人以先生修德守約故使妾侍執巾櫛唯命是從宣􅀏曰然如是吾志也妻乃悉歸車馬侍御服飾更着短衣裳挽鹿車歸郷里拜姑禮畢提瓶出汲循行婦道禮節恭備郷􅀖稱之宣哀帝時爲司􅀠挍尉子永中興􅀄爲魯郡太守永之子昱嘗從容問曰太夫人寜復識挽車時不曰先姑有言存不亡安安不忘危吾焉敢忘乎晉書曰劉伶不以家産有無介意常乗鹿車携一壼酒使人荷鍤而隨之謂曰死便埋我其遺形骸如此風俗通曰鹿車窄小裁容一鹿也或云樂車乗牛馬者剉軒飲飼逹曙今乗此雖爲勞極然入傳舎偃卧無憂故曰樂車無牛馬而能行者獨一人所致耳露車晉陽秋曰平原幹隂雨則犢車而内露車或問其故曰露者宜内也晉中興書曰王尼洛陽傾覆避亂江夏王澄時爲荆州刺史見尼欣然厚供給之尼常歎滄海横流無安處早喪婦止有一息不用居宅唯畜露車牛一乗毎行輒使􅄦御詣人暮則􅀫車上無有定處少時澄卒荆土飢荒居求食不能得乃殺車牛煑之遂父子餧死晉王公百官志曰蜀劉主得賜露車七十乗孫主賜露車三十乗道元與天公牋曰有露車一乗轅復摧折以犁續之左﨑右􅝝五結切彊弱相􅀒傍行斫轅乗輿雜車鹵簿令曰記里曰白鷺鸞旗等三車並駕四馬正道匠各一人駕士各十四人皆平巾幘緋衫大口袴又曰辟惡車太卜令一人在車執弩箭平巾幘緋裲襠大口袴皮軒車左右金吾隊正一人在車執弩服同太卜其令行正道駕馬數駕士服色人數儀並同記里等車又曰安車四望車並駕四馬駕士各二十四人服同上又曰羊車駕果下馬一小吏十四人並青絲布褶紫碧腰􅁭青耳屩辨髮又曰屬車十二乗並駕牛駕士各八人服同記里等車又曰王鉞車或曰金􅃏車在武衛隊正一人在車次豹尾車右武衛隊正一人在車皆執武弁朱衣革帶並駕三馬駕士各十二人服同上轅周禮曰輈轅人爲輈輈車轅也輈有三度國馬之輈深四尺有七寸田馬之輈深四尺駑馬之輈深三尺有三寸唯轅直且無橈也左傳宣下曰軍行右轅左追蓐又曰改乗轅而北之又曰公孫閼與潁考叔爭車潁考叔挾輈以走子都拔􅁄以逐之弗及又曰師及齊師戰于次臯齊子淵捷從洩聲子射之中楯瓦繇朐汰輈七入者三寸東觀漢記曰江革母年八十革不欲摇動之常自居轅輓車不用牛馬晉儀注曰皇后乗油􅀞雲母安車駕􅆖馬油􅀞雲母安兩轅趙書曰後石造獵車千乗轅長三丈韓子曰呉起爲西河守􅁗有小亭臨境欲攻之不足以徴卒乃取車轅􅀝於北門外令曰有能徙至南門外者賜上宅民莫之徙也有徙者賜之如令又置一石亦令曰有能徙者賜之如􅀄民爭徙之乃令曰明旦攻城有先登者賜之上田上宅民争上一朝而拔之夢書曰賈人夢車轅折敗者憂亡遺衣物何以言之轅字去衣故知亡衣物方言曰楚衛之間轅謂之輈司馬長卿諫曰獵書曰轝不及還轅人不暇施功潘正叔迎大駕傳云狐狸夾兩轅豺狼當路立輪釋名曰輪彌綸也周匠之言或曰較言揔入輻中也易曰旣濟􅀄九曵其輪濡其尾無咎禮曰古者貴賤皆杖叔孫武叔朝見輪人以其杖􅀜轂而輠音禍輪者於是有爵而后杖也記庻人失禮所由始也叔孫武叔魯大夫叔孫州仇也輪人作車輪之官也又曰御婦車而壻授綏御輪三周先俟于門外周禮曰凢察車之道必自載於地者始也是故察車自輪始凢察車之道欲其樸音朴屬而微至不樸屬無以爲完乆也又曰輪人爲輪斬三材必以其時三材可以爲轂折牙也斬之時以材在陽則中冬斬之在隂則中夏斬之三材旣具巧者和之凢爲輪行澤者欲杼行山者欲侔杼謂削薄其賤地者侔上下等杼以行澤則是力以割塗也是故塗不附侔以行山則是搏以行石也是故輪雖敞不甐於鑿搏園厚也鄭司農云不甐於鑿謂不動於鑿中也􅀇謂甐亦敞也以輪之厚石錐鑿齧之不能敞其鑿傍使之動又曰軫之方也以象地也蓋之圎也以象天也輪輻三十以象日月也左傳曰余折以御左輪朱殷豈敢言病吾子忍之􅂖梁傳曰晉人與姜戎要而擊之殺疋馬竒輪無反者史記曰古封禪爲蒲輪惡傷土石草木續漢書曰張綱文紀與杜喬等八人受詔行天下號曰八俊七人皆奉命唯綱獨埋車於洛陽都亭不去也或問之曰豺狼當路安問狐狸遂奏梁兾等罪京師震悚莊子曰桓公讀書輪扁斵輪釋槌鑿問曰公所讀者何言曰聖人之言曰在乎曰已死矣然讀之者古人之糟粕也公曰寡人讀書輪人安得議有說則可無說則死輪扁曰以臣之事觀之斵輪徐則甘而不固疾則苦而不入不徐不疾得之於手應之於心口不能言有數在間而不能諭臣之子子亦不能受之於臣是以行年七十而老斵輪古之人與其不傳者死矣君之所讀者是古人之糟粕今士不同變化異時故冝絶學任惟之張衡思􅀇賦曰魂眷眷而屢頋􅀆馬􅀝輈而俳􅆦雲霏霏􅀆繞余輪風眇眇􅀆振余旟張恊洛禊賦曰權戚之家豪侈之族綵綺停鏕華輪方轂集乎長州之浦曜乎洛川之曲曹子建七啓曰飛軒電遊獸隨輪轉又應制詩云輪不輟運鸞無廢聲應吉甫華林集曰備言􅃬命羽蓋朱輪銘曰失名氏奚氏夲造後裔飾雍輪以代歩屏以從容輪軿并合出入道同追仁赴義惟禮是恭梁昭明太子文選序曰椎直追切輪爲大輅之始大輅寧有椎輪之質􅁤禮曰國中以䇿彗卹勿驅塵不出􅁤卹蘇没切勿者没卹没搔摩也又曰今天下車同􅁤書同丈行同輪莊子曰􅁤結于千里之外輪不迹於地張平子南都賦曰暮春之禊元巳之辰方􅁤齊軫祓音拂千陽濵張平子東京賦曰同衡律而一䡄量齊急舒於寒燠呉李重與太子牋白其皆克復舊職追㝷前􅁤今獨不然曹子建七啓曰當䡄見藉值足遇踐飛軒電獸逐輪轉謝靈運祖德詩曰􅁗趙欣來蘇燕魏遟文䡄陸士龍荅兄機詩曰衡䡄各殊迹牽牛非服箱王僧逹荅顔延年詩曰君子聳髙駕塵䡄實爲林太平御覽卷第七百七十五
