front:
  text: 太平御覽卷第三百五十三
  hash: sha256:049c7d6c65922925ead6429af85997620aa797d0532d4e1d07c6f668a248220a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_353-1a}
body:
  text: 兵部八十四㦸下殳矛㦸下丗􅀃曰舊制三公領兵入見皆交㦸义頸而前􅀄曹公將討張繡入覲天子時始復此制公自是不敢朝見一出郭頒丗語孫盛異同難語曰太祖甞私入中常侍張讓室讓覺之乃舞手㦸于庭前踰垣而出材力絶人莫之能害于寳捜神記曰漢武帝時張寛爲楊州刺史先是有二老翁争山地詣州訟疆界連年不决寛視事復來寛視二翁形􅃺非人令卒持㦸將入問汝何等精翁欲走寛呵格之化爲巨虵又曰成都王之攻長沙也反軍于鄴内外陳兵是夜㦸鋒皆有火遥望如懸燭就則亡焉三十國春秋又載劉敬叔異苑曰彭城劉黃雅以太元中爲京口府佐􅀍使還都路經竹里亭多虎劉極自防衛牛馬繫於户前手㦸布於地上宵中士庶同睡虎乗間跳入跨越人畜獨取劉而去劉義慶幽明録曰項縣姚牛十餘歳父爲郷人所殺牛常賣衣物市刀㦸圖欲報讎後在縣門前相遇手刄之於衆中東陽無疑齊諧記曰東陽郡朱子之有一􅀑􅁪來其家子之兒病心痛􅀑語之我爲汝尋方云燒虎丸飲即差汝覔大㦸與我我爲汝取也其家便持㦸與􅀑􅀑持㦸去湏􅁷還放㦸中庭擲虎丸着地猶尚暖束晢發蒙記曰師子五色而食虎於巨木之岫一噬則百人仆唯畏鈎㦸顧愷啓蒙記曰玉精名委似美女而靑衣見以桃㦸刺之以其名呼之可得也周處風土記曰㦸長一丈三尺􅁬楊俯仰乍跪乍立兼五兵而能乃謂名人又曰教學講武戒逺慮戎首玄戈􅁬長雄迎來送徃斫截横從扶強頓弱唯敵所從首先也玄戈北斗杓端招摇之内貫索之外獨星也㦸爲五兵雄盖取威􅁬振也凢用㦸法必先小振動之陵上攝下收功於中􅁪在首煩之間來迎去送順而不逆也植則虎龍交牙神變無常去者厚餞來者不攘言用雙㦸之法交相向左手爲龍右手爲虎更出更入更上更下上下無常隨變而改顚倒入懷轉如回風敵斃􅀌勝攝㦸徐反可謂上下無常非爲邪也進退無􅁪非離羣也蓋乃進足􅁬手欲及機也如敵來輕去疾進而送之來重進疾開而待之南州八郡志曰宋昌郡西南三千里有剽國以金爲刀㦸焦贑易林曰桃弓葦㦸除殘去惡又曰􅀝鋒據㦸傷我胷臆春秋考異郵曰劉子單子折猛入城天王奔走尹氏立朝國有三王天下兩主周分爲二莫能救討強弩張於前楴音剃㦸拔於後管子曰黃帝問於伯髙伯髙曰雍狐之山發水出金􅃖尤受而制之以爲雍狐之㦸晏子春秋曰景公飲酒移於晏子前驅欵門曰君至晏子立於門曰君何爲非時而夜辱公曰酒醴之味金石之聲願與夫子樂之晏子曰夫鋪薦席陳簠簋者有人臣不敢與焉又移司馬穰苴介胄操㦸立於門曰鋪薦蓆陳簠簋者有人臣不敢與焉又曰崔杼殺莊公盟諸大夫令有敢不盟者㦸鈎其頸孫卿子曰雖有戈矛之㦸不如恭儉之利與人善言煖於布帛傷人以言深於矛㦸又曰狐父戈以钃牛愚莫甚焉钃徐玉切又曰鉏擾􅁄矜非錟音談於句㦸長也如淳曰長刄矛也又曰矛刄下有鐵上句曲然而成敗異變功業相反也尉繚子曰夫殺之五十歩之内者誰也曰矛㦸也韓子曰譬如劒㦸愚人行忿則禍生聖人誅暴則福成淮南子曰孟夏之月南宫御女赤色衣赤采吹竽笙其兵㦸髙誘曰有披幹象陽布散也劉向新序曰趙簡子上羊膓之坂群臣皆偏􅃝推車而席會獨擔㦸行歌簡子曰寡人上坂會獨不推車而侮其主者其罪何􅀂會曰爲人臣侮其主者其罪死而又死簡子曰何謂死而又死席會對曰身死妻子爲戮謂之死而又死又曰齊景公遊海上樂之六月不歸令左右敢言歸者死顔歜諌曰君樂治海上不樂治國儻有治國者君且安得樂此海也公據㦸將斫之歜撫衣而侍之曰君奚不斫也昔桀殺關龍逢紂殺王子比干君奚不斫以臣叅此二人不亦可乎公遂歸枹朴子曰太阿臨項長㦸指心而操不可奪也又曰拙者得工輸之斤斧不能以成雲梯怯者得馮婦之刀㦸不能以格兕虎蔣子曰士有一飡而倒㦸義所驅也應璩詩曰丈夫要雄㦸更來􅀫紫庭今者宅四海誰復有不并又曰郡國貪慕將馳騁習弓㦸雖妙未更事難用應卒迫司馬相如上林賦曰曳明月之珠旗建干將之雄㦸干將韓王劒師雄㦸干將所造也左思吴都賦曰吴鈎越􅁄越鐵利故稱越􅁄也又曰羽旄楊雄㦸耀芒繁欽撰征賦曰左􅀐雄㦸右攅干將兩都賦曰郎將司階虎㦸交煞音金殺又曰周廬千列陛㦸百重陶侃表曰伏惟武庫傾蕩􅀫衛有闕輙簡選其差可者奉獻金鈴大㦸五十張孫盛奏事曰諸違令私作鎧一領角弩力七石以上一張㦸十枚以上皆弃市張載劒閣銘曰人荷㦸萬夫趑趄難行皃也李尤㦸銘曰皷㦸之設以戒非常秉執操持邪暴是防湏􅁷之忿終日爲殃山陵之禍起於豪芒張恊手㦸銘曰錟錟音談雄㦸清金練鋼名配越􅁄用過于將嚴鋒勁枝摛鍔耀芒魏文帝書曰漢中地形實爲險固四嶽三塗皆不及也張魯有精鉀數萬臨髙守要一夫揮㦸千人不得進而我軍過之􅀂駭鯨之决網􅅈奔兕之觸魯縞未足以喻其易應㻛表曰長㦸百萬胡馬千群應貞華覽曰強弩連城長㦸指塞􅀓玄朝會賦曰流蘇粲粲華蓋重隂羽林虎旅長㦸㩋撡上音蕭下音參賈誼過􅁗論曰陳渉以戍卒散亂之衆數百􅁬臂大呼不用弓㦸之兵鉏擾音優白挺横行天下秦人長㦸不刺強弩不射楚師深入戰於鴻門曾無藩籬之艱殳釋名曰殳殊也長丈二尺而無刄有所撞直降切桎陟降切於車上使殊離也􅀃文曰殳以杖殊人也禮殳以積竹八觚長丈二尺建於兵車旅賁以先驅也詩曰伯也執殳爲王前驅又曰彼候人兮荷戈與祋候人道路送迎賔客者也荷揭也祋殳也祋丁外切周禮曰車六等之數殳長四尺崇於人四尺謂之四等左傳曰宋張匂與子皮臼任鄭翩殺華多僚子皮華貙也任翩貙家臣華氏居盧門以南里叛公子成以􅀳師至成前奔晉今還救宋也會晉齊衛救宋與華氏戰于赭立公子城射華豹殪張匂抽殳而下殳長丈二在車邊又曰莒子庚輿將出奔聞烏存執殳而立於道左懼將止苑羊牧之曰君過之烏存以力聞可矣何必弑君成名遂奔齊韓子曰楚國法太子不得乗車至弟門時天􅀨王急召太子庭中有水太子遂驅車至弟門廷尉舉殳擊馬遂敗其駕焦贑易林曰大過之訟秉􅃏執殳挑戰先驅蕭子良古今蒙􅈻文體曰殳書者伯氏之職也古者文旣記笏武亦書殳也司馬兵法曰兵􅄂則不利長兵以衛短兵以守太長則犯太短則不及太輕則閱閱則易亂太犯則不濟季氏曰兵長短相爲衛守合同爲用太長太短太輕皆不如法度者也犯者觸推故不濟不及者不還於利閱者不固則破敗故奔北走擾亂煩也故􅀄列即㦸間焉一弓一㦸相間也次列殳矛間焉一殳一矛相間也又曰周左執黃􅃏右執白旄所以不進者審察斬殺之威也有司皆執殳戈示諸鞭朴之辱歐使不行不進者也又曰弓矢圉殳矛守戈㦸助五兵長短各有所冝因事而施凡五兵當長以衛短短以救長以㦸則乆皆戰則疆淮南子曰武王執戈秉􅃏以勝殷搢笏杖殳以臨朝魏文帝詩曰行行遊且獵且獵路南隅彎我烏號弓騁我纎驪駒走者貫􅄡鏑伏者飢戈殳白日未及移手獲三十餘王粲七釋曰流鋒四射罼罕撗厲􅁬千殳而捎擊㢮鷹犬以􅅮噬罼音必夏侯湛獵兎賦曰擬以銳殳規以良弓都毫末而放鏃兮殪之于窟中左思吴都賦曰于鹵殳鋋賜夷勃盧殳鋋皆矛也謝惠連從軍行曰趙􅀐馳四牡吴舟浮三翼弓矛有恒用殳鋋無蹔息太公六韜曰方凶兩枝鐵义柄長三丈以上三百枝矛釋名曰矛冒也刄下冒矜也下頭曰鐏徂悶切鐏入地也松櫝長三丈其矜冝徑以松作之櫝速也前速之言也矛長丈八尺曰矟馬上所持言其矟矟便殺也又曰繳矛繳也可以繳截敵陣之矛也仇矛頭爲三义言以討仇敵之矛也矛㦸㦸常也其矝丈六尺不言常而云夷者言可夷滅敵也亦車上所持也務矛長九尺務霍也所中霍然即破裂也方言曰五湖之間矛謂之鍦音施或謂之鋋或謂之鏦音䆫其柄謂之矝又曰矛骹音敵細如鸖脛者謂之鸖膝丗夲曰杼作矛太公兵法曰矛之神名趺蹌書曰鍜乃戈矛礪乃鋒刃又曰門之内一人冕執銳銳矛也立于階側周成王崩士衛殯也詩曰清人在彭駟介旁旁箋云清者髙克所軍之邑也駟介四馬也二矛重英河上乎翺翔重英矛之英飾二矛重喬河上乎逍遥箋云二矛酋矛夷矛也又曰厹音求矛鋈鐓三隅矛也鋈音沃鐓音隊蒙伐有苑蒙郭羽也伐干也苑文貌也禮記曰進矛㦸者前其鐓後其刃大戴禮曰武王踐祚矛之銘曰造予少聞弗忍終身之羞予一人所聞以戒後丗子孫左傳曰齊伐魯冉有用矛於齊師故能入其軍史記曰武王牧野誓曰立尓矛漢書曰姑句家矛端生火光其妻曰矛端生火光此兵噐也魏志曰公孫瓉手執兩頭矛殺鮮卑數十人魏書曰議者多言関中兵強習長矛非精選前鋒則不可以當也曹公謂諸將戰在我非在賊雖習長矛將使不得以刺諸君但觀之魏略曰閻行金城人後名艶字彦明少有徤名始爲小將隨韓約建安􅀄約與馬騰相攻擊騰子超亦號爲徤行甞刺超矛折因以矛撾超幾殺之吴書曰孫䇿討山越斬其渠帥悉令左右分行逐賊􅀐與虞飜相隨飜喜用矛謂在前得平地勸䇿乗馬䇿曰卿無馬奈何荅曰飜能歩日可行三百里三國異同傳曰公孫瓉爲遼東属國長史甞從數十􅀐出行塞卒遇鮮卑百􅀐以矛擊殺傷數十人鮮卑由是畏之蜀志曰先主爲曹公所逐弃妻子走令張飛將二十􅀐拒後據水斷橋瞋目横矛曰我張益德也可來决死無敢進者晉書載記曰蜀李雄無事小出丞相楊裒於後持矛馳馬過雄雄恠問之對曰夫統天下之重者如乗惡馬持矛也急之則慮自傷緩之則懼其失是以馬馳而不制也雄寤即還晉太康起居注詔曰諸王中尉及諸軍皆典兵以備不虞乃有着中戰衣木履持長矛者此爲兒戲而無相彈懾也趙書曰劉曜討陳安於隴城城䧟安死乃謡曰隴上徤兒曰陳安愛飬將士同心肝騄騘馬鐵鏤鞍丈八蛇矛左右盤百􅀐俱出如雲浮追者十萬􅀐脩脩戰始三交失蛇矛十􅀐俱蕩九􅀐留呉越春秋曰越屈盧之矛越絶書云勃盧之矛歩光之劒獻吴王六韜曰紂之卒握炭流湯者十八人綰矛殺百歩之外者千人韓子曰人有鬻矛楯者譽之曰吾楯之堅物莫能䧟也又譽其矛曰吾矛之利於物無不䧟也或曰以予之矛䧟子之楯何如其人弗能應也劉向􅀃苑曰􅁗急圍邯鄲邯鄲傳舎吏子李談謂平原曰邯鄲之民炊骨易子而食之而君之後宮婢妾荷綺縠餘梁肉士民兵盡或剡木爲矛㦸而君之噐物鐘磬自恣吕氏春秋曰齊晉相與戰平阿餘子亡㦸得矛退而不自决謂路人曰亡㦸得矛可以歸乎路人曰㦸亦兵也矛亦兵也亡兵得兵何爲不可以歸心猶不决遇高唐之􅀌叔無孫當其馬前曰今者戰亡㦸得矛可以歸乎叔無孫曰矛非㦸也㦸非矛也亡㦸得矛豈無責乎阿餘子曰嘻還反戰死之神仙傳曰左慈見孫討逆討逆使慈着馬前欲手刺殺之討逆着鞭駈馬操矛逐慈慈着木履䇿杖徐歩終不能及乃止列女傳曰巴趙娥者趙萬之妻郡縣遭亂萬得足疾不能行爲賊所殺賊欲殺娥娥守喪不去賊舉矛指娥欲以怖之娥知賊必刼略乃以身赴矛貫心逹背而死劉敬叔異苑曰河間沐堅字壁強石勒時監作水田御下苛虐百姓怨毒爲堅形以刄矛斫刺呪令速斃堅尋得病􅀂􅀍捶割於是遂殞夢書曰矛㦸爲相待期蚤晚也夢得矛㦸者憂相勑也持矛待交友見人持矛待於巳也持矛來倒却中止也魏文帝詩曰戈矛成山林玄甲曜日光樂府左延年􅁗女休行曰始出上西門遥望􅁗氏廬􅁗氏有好女自名爲女休女休十四五爲宗行報讎左執白陽刀右執宛景矛張奐與崔子眞書曰僕以元年到任有見兵二百馬如羖羊矛如錐鈇楯如榆葉諸葛亮集曰勑作部皆作五折剛鎧十折矛以給之太平御覽卷第三百五十三
