body:
  text: 人事部一百一十五禮賢易曰賁于丘園束帛戔戔又曰康侯用錫馬蕃庶晝日三接尚書曰所寳惟賢則邇人安又曰釋箕子囚封比干墓式啇容閭毛詩曰鹿鳴燕群臣嘉賔也旣飲食之又實幣帛筐篚以將厚意我有嘉賔鼓瑟吹笙吹笙鼓簧承筐是將又曰南山有臺樂得賢也得賢則能爲􅀖家立太平之基周禮曰三年則大比考其德行道藝而興賢者以禮賔之禮記曰賢者狎而敬之又曰天子二代之後尊賢也尊賢不過二代又曰孔子曰吾食於少施氏而飽少施氏食我以禮左傳曰晉伐魯范文子謂欒武子曰季孫於魯相二君矣妾不衣帛馬不食粟可不謂忠乎信讒慝而弃忠良若諸侯何家語曰孔子之鄭遇程子於途傾盖與語盡日而別國語曰勾踐滅吴反至五湖范蠡辭於王曰君王勉之臣不復入於越國矣遂乗輕舟以浮五湖莫知所終極王命工以良金冩蠡之􅃺而朝禮之又令大夫朝之環㑹稽三百里爲蠡地史記曰周公戒伯禽曰我一沐三握髮一飯三起以待士猶恐失天下之賢人又曰子貢所至國君無不分庭與之抗禮又曰鄒奭者齊諸鄒亦頗采鄒術之術以紀文於是齊王嘉之自淳于髠以下皆命曰列大夫爲開第臨康莊之衢又曰魏有隱士曰侯羸爲大梁夷門門者公子聞之於是置酒大㑹賔客坐定公子從車騎虚左自徃迎侯生侯生攝弊衣冠直上上坐公子執轡愈恭又曰成王使由余於秦繆公示以宫室積聚由余曰使􅀑爲之則勞神矣使人爲之亦苦人矣繆公於是與由余曲席而坐傳器而食又曰百里奚曰臣友蹇叔賢而時莫知繆公使人厚幣迎蹇叔以爲上大夫又曰伊尹名阿衡或云處士湯使聘迎之五反然後肯往又曰騮子如燕昭王擁篲先驅請列弟子之坐而受業又曰越石父賢在於縲紲之中晏子出遇之途解左􅆖贖之載歸弗謝入門乆之越石父請絶晏子懼然攝衣冠謝又曰楚威王聞莊周賢使使厚幣迎之許以爲相又曰趙良􅀃啇君曰夫五羖大夫荆之鄙人也聞穆公好賢願見披􅄄食牛朞年穆公知之舉之牛口之下而加百姓之上􅁗國莫敢毀也又曰四皓隱啇洛山惠帝爲太子爲書卑辭安車迎以爲客乃出漢書曰曹叅之相齊七十城天下􅀄定悼惠王冨於春秋叅盡召長老諸先生問所以治諸儒以百數參未知所定聞膠西有蓋公善治黄老言使人厚幣請之旣見蓋公蓋公爲言治道貴清静而民自定推此􅀋言之叅於是避正堂舎公焉又􅀄楚元王交禮待申公等穆生不嗜酒元王每置酒常爲穆生設醴及王戊即位常醴忘設焉穆生退曰可以逝矣又曰雋不疑字曼倩㴾海人治春秋爲郡文學進退必以禮名聞州郡武帝末郡國賊盗群起􅁀勝之爲直指使者衣繡持斧逐捕盗賊東至㴾海素聞不疑賢遣吏請與相見不疑冠進賢冠帶攂具劒佩環玦褒衣愽帶盛服至門門下使解劒不疑叱曰劒者君子武備所以衛身不可解請退勝之望見不疑容皃衣冠甚偉躧履起迎又曰髙祖詔曰賢士大夫有肯從我遊者吾能尊顯之布告天下有意稱明德者必身勸爲之駕遣詣相國府又曰武帝􅀄即位王臧迺上書請立明堂以朝諸侯不能就其事乃言師申公於是上使使束帛加璧安車以蒲裹車輪駕四馬迎申公弟子二人乗軺傳從至見上問治亂之事申公時巳八十餘對曰爲治者不至多言頋力行何如耳以爲太中大夫舎魯邸議明堂事又曰御史大夫朱愽奏王莽爲庻人莽就國南陽太守以莽貴重選門下椽孔休守新都相休謁莽莽盡禮自納休亦聞其名與相荅後莽疾休􅀱之莽縁恩意進其玉具寳劒欲以爲好休不肯受莽曰誠見君靣有瘢美玉可以滅瘢欲獻其􅇾耳解其􅇾休復辭莽曰君嫌其價耶遂推碎之自裹以進休休乃受莽徴去欲見休休稱疾不見莽又曰大將軍旣益尊然汲黯與亢禮或􅀃黯曰天子欲羣臣下大將軍尊貴誠重君不可不祥黯曰夫以大將軍有揖客反不重耶大將軍聞愈賢黯又曰梁孝王大營宮室爲􅃨道自宫連屬於平臺招延四方豪傑自山東遊士莫不至又曰光武側席以求幽人又曰沛公至髙陽見酈食其沛公方踞使兩女子洗足食其入即長揖不拜曰足下必欲聚徒合兵誅無道秦不冝踞見長者於是沛公輟洗起衣延食其上坐又曰趙壹字元淑舉羣上計到京師司徒􅀽逢受計吏皆拜伏庭中莫敢仰視壹獨長揖而巳逢令讓之曰計吏而揖三公何也對曰酈食其長揖漢王今揖三公何遽訝哉逢即歛枉下堂執其手延置上坐又曰井太春名丹少通五經善談難故京師爲之語曰五經紛綸井太春守静不交􅀔利建武中帝子沛獻王輔等五人皆好賔客請丹不能致信陽侯隂就光烈皇后弟也以外戚别使人要刼之丹不得巳旣至就故爲設夌飯葱菜之食丹推去曰以君侯能供養故來何爲如此就便設饌就欲起左右進輦丹曰昔桀駕人輦者是耶坐上失色就去輦談終日乃去謝承後漢書曰帝東廵過任城乃幸鄭均舎勑賜尚書禄以終其壽故人號爲白衣尚書又曰包咸字子良永平五年遷大鴻臚毎進見錫以机杖入屏不趍賛事不名經傳有疑輙遣小黄門就舎即門顯宗以咸有師傅恩而素清苦常時賞賜珎玩束帛俸禄増於諸卿又曰徐穉字孺子豫章人家貧常自耕稼恭儉義譲所居服其德屢辟公府不起時陳蕃爲太守以禮請署功曹穉不免之旣謁而退蕃在郡不接賔客唯穉來特設一榻去則懸之後舉有道拜太原太守皆不就􅀽山松後漢書曰周璆字孟玉爲樂城令逍遥無事縣中大治去官徴聘不至陳蕃爲太守璆來置榻去懸之續漢書曰皇甫規安定人有以貨買鴈門太守還家書刺謁䂓規卧不迎旣入而問曰卿前在郡食鴈美乎有頃白王符在門䂓素聞符名乃遽起衣不及帶􅄚履出迎援符手而還與同坐極忻時人爲之語曰徒見二千石不如一縫腋言書生道義之爲貴東觀漢記曰顯宗以張酺授皇太子經爲東郡太守元和二年東廵狩幸東郡引酺及門生并郡縣􅁺吏並㑹夜中帝先備弟子之儀使酺講尚書一篇然後脩君臣之禮賞賜殊特又曰和帝永元三年詔曰髙祖功臣蕭曹爲首有傳丗不絶之義曹相國容城侯無嗣朕甚閔焉望長陵東門見二臣之墓生旣有節終不逺身可遣使者以中牢祠大鴻臚悉求近冝爲嗣者又曰永平中江革爲五官中郎將朝會帝詔使虎賁迎扶腋革每進拜上輙自禮之小有疾輙太官送食寵遇甚厚京師貴戚衛尉順陽侯馬廖侍中竇憲等各奉書致禮遺革終不發書無所當受上以此重之又曰東平憲王蒼上書表薦名士左馮翊桓虞等虚巳禮下與叅政事又曰上還幸􅀕遵營時遵病上爲重茵席覆以御盖又曰東平憲王蒼開東閤延英雄􅀽宏後漢記曰崔駰詣竇憲始及門憲倒屣迎之曰吾受詔交公公何得薄哉魏志曰文帝引故漢太尉楊彪待以客禮詔曰乃祖以來丗著名節年過七十行不踰涯可謂老成人矣所冝寵異以彰舊德其賜公延年杖又曰太祖北征烏丸未至先遣使辟田疇又命由豫喻指疇戒其門下趍治裝門人謂曰昔􅀽公慕君禮命五至君義不屈今曹公使一來而君􅀂恐弗及者何也疇嘆而應之曰此非君所識遂隨使者到軍署司空户曹􅁺引見諮談明日出令曰田子泰非吾所冝吏者即舉茂才隨軍又曰管寕遇天下亂徃遼東投公孫度度虚舘以待之又曰鉅鹿張臶字子明養志不仕廣平太守盧毓到官三日綱紀白承前致板謁致毓教曰張先生所謂上不事天子下不友諸侯豈此板謁所可光飾哉但主簿奉書致羊酒之禮又曰太祖北征柳城過􅃰郡令曰比中郎將盧植名著海内舉爲儒宗乃國之棟幹也􅀌到此州嘉其餘風春秋之義賢者之後有異於人亟遣丞􅁺修飾墳墓并致薄酹以彰厥德又曰王粲徙長安左中郎將蔡邕見而竒之時邕才學顯著貴重朝廷常車􅀐瑱巷賔客盈座聞粲在門倒屣迎之粲至年旣㓜弱容狀短小一坐盡驚邕曰此王公孫有異才吾不如也吾家書籍文章盡當與呉志曰孫䇿得張昭甚恱謂曰吾方有事於四方待子不得輕矣乃上爲校尉待以師友之禮又曰頋邵年二十起家爲豫章太守下車禮先賢徐孺子之墓優待其後又曰吕蒙疾發孫權迎置内廐欲數見又恐其勞動常穿壁瞻之又曰太守王明以虞翻爲功曹孫䇿征會稽復命爲功曹待以交友之禮蜀志曰先主得諸葛亮情好日宻􅀜羽張飛不恱先主解之曰􅀌之有孔明猶魚之有水也又曰諸葛亮表曰先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中諮臣以當丗之務蕭子雲晉書曰明帝以太常桓榮爲五更躬式其閭親行養老之禮崔鴻北凉録曰且渠蒙遜令曰秘書郎中燉煌劉彦明學冠當時道先區内可授􅀇虚先生拜以三老之禮起陸沉觀於東苑以處之崔鴻前凉録曰宋纎字令文不應州郡辟命唯與隂顒齊好友善太守楊宣􅀞其象於閤出入視之崔鴻前􅁗録曰符堅要結英豪王景畧吕婆樓强汪梁平等皆有王佐之才堅並傾身禮之以爲股肱羽翼管子曰桓公在位管仲隰朋侍立有間二鴻飛而過桓公歎曰仲父今彼鴻鵠有時而南有時而北有時而往有時而來寡人之有仲父猶飛鴻之有羽翼孔藂子曰子魚居衛與張耳陳餘相善㑹陳勝呉廣自立爲王耳餘並爲之將遂言之陳王大恱遣使者齎千金加束帛以車三乗迎之子魚遂往陳王郊迎而執其手議時務孟子曰舜見帝帝館於貳室迭爲賔主是天子而交疋夫用下敬上謂之貴貴用上敬下謂之尊賢其義一也韓子曰文王伐崇與大夫謀襪係解視左又曰齊桓公時有處士小臣稷桓公三往見之不得見公曰吾聞布衣之士而輕爵禄雖萬乗無以異萬乘之主不好仁義亦無以下布衣之士於是五往乃得見董子曰禹見耕者五耦而式過十室之邑而下見山仰之見谷俯之避有道徳之人避俗之士也淮南子曰淮南王安養士數千人其中髙才八人又曰一目之羅不可以得鳥無餌之鈎不可以得魚遇士無禮不可以得賢吕氏春秋曰魏文侯見段干木立倦而不敢息及見翟黄踞於堂而與之言翟黄不悅文侯曰段干木官之則不肯禄之則不受今汝欲官則相至欲禄則上卿旣受吾爵又責吾禮無乃難乎韓詩外傳曰周公攝天子位七年布衣之士執贄所師見者十人所友見者十二人窮巷白屋所先見者四十九人時進善者百人教士者千人官朝者萬人當此之時誠使周公驕而且􅈔則天下賢士至者寡矣又曰楚襄王遣使者持金千斤白璧百雙聘莊子欲以爲相莊子曰獨不見未入廟之牲乎衣以文繡食以芻豢岀則清道而行止則居帳之内此豈不貴乎及其不免於死宰執旌居前或持在後當此之時雖欲爲􅀌犢從雞鼠遊豈可得乎僕聞之左手據天下之國右手刎其吭愚者不爲也環濟呉記曰皇太子登字子髙上爲選置師􅀓妙簡俊秀於是諸􅁑恪張休頋譚陳表等以選入侍誦講詩書其待接僚屬以布衣之禮與休譚等咸同輿而載或共床而􅆍劉縚先聖本紀曰伊尹耕於有莘之野王馳往見之彭氏子諌曰伊尹賤人可徒致之君無辱車乗王曰夫一草之本可巳天子病者天子難欣喜食之子誠不欲樂人病也遂黜彭氏之子皇甫士安髙士傳曰老萊子楚人耕於蒙山之陽雚葭爲牆蓬爲屋板木爲床蓍艾爲席或言楚王楚王遂至老萊子之門曰寡人愚陋獨守宗廟先生幸臨之老莱子曰僕山野之人不足以守政又曰亥唐者晉人也晉平公時朝多賢臣祁奚趙武師曠叔向皆爲卿大夫名顯諸侯唐獨守道不官隱於窮巷平公聞其賢致禮與相見而請事焉平公待於門唐曰入公乃入唐曰坐公乃坐唐曰食公乃食唐之食公也雖􅂼食菜羮公不敢不飽又曰朝福也者涿郡人以行義脩㓗著名昭帝時大將軍霍光秉政表顯義士詔郡國條奏行狀天下得福等五人福治義最髙以德行徴至京兆病不進㑹稽典略曰范蠡字少伯越之上將軍也本楚宛三户人􅀍髪佯狂倜儻􅀒俗文種爲宛令遣吏奉謁吏還白范蠡本國狂人生有此病種􅀏曰吾聞士有賢聖之資必有佯狂之議内有獨見之明外有不知之毀此固非二三子知之所知也駕車而往蠡知種之必來謂兄㛐曰今日有客願假衣冠有項種至抵掌而談旁人觀者聳聽􅀃苑曰鄒子􅀃梁王曰伊尹有莘氏之勝臣湯立以爲三公管仲城隂之狗盗齊桓以爲仲父百里奚乞食於路穆公委之以致寗戚叩轅行歌桓公任之以國太公望出夫朝歌之屠年七十而相周九十而封齊故詩云綿綿之􅁑在于曠野良工得之以爲絺紘良工不得枯死於地又曰齊桓公設庭燎爲士之欲造者朞年而士不至東野鄙人有以九九之術見者桓公曰九九足以見乎對曰臣非以九九爲足以見也臣聞主君設庭燎以待士朞年而士不至夫士之所以不至者君天下賢君也四方之士皆自論不及君故不至也夫九九薄能耳而君猶禮之况賢於九九者乎桓公曰善乃因禮之朞月四方之士相携而至矣又曰齊桓公使管仲治國管仲對曰賤不能臨貴公以爲上卿而國不治桓公曰何故管仲對曰貧不能禦冨桓公賜之齊市租一年而國不治桓公曰何故曰䟽不能制近桓公立以爲仲父齊國大安而遂覇天下孔子曰管仲之賢而不得此三權者亦不能使其君南靣而伯又曰燕昭王問於郭隗曰寡人地狹民寡齊人削取八城匈奴驅樓煩之下以􅀌之不肖得承宗廟恐危社稷存之有道乎郭隗對曰帝者之臣其名臣其實師也王者之臣其名臣其實友也覇者之臣其名臣其實僕也亡國之臣其名臣其實虜也今王將東靣目指氣使以求臣則厮役之才至矣北靣等禮不乗之以􅀔求臣則朋友之才至矣西靣逡廵以求臣即師傅之才至矣誠欲興道隗請爲天下之士開路於是燕王置郭隗爲上客又曰宋司城子罕之貴子韋也人與共養出與同衣司城子罕亡子韋不從復召子韋而貴之左右曰君善子韋也亡不後來貴之君獨不愧於君之忠臣乎子罕曰吾唯不用子韋故至於亡今吾之得復尚是子韋之遺德餘教也又曰楊囬北見趙簡子曰臣居郷三逐事君五去聞君好士故走來見簡子聞之絶食而歎左右進諌曰居郷三逐是不容衆也事君五去是不忠上也簡子曰子不知也夫美女醜婦之仇盛德君子亂丗所䟽也正直之行邪枉所憎也遂岀見之因授以爲相而國大治又曰朝無人猶鴻鵠之無羽翼也劉向新序曰魏文侯過段干木之閭而軾其僕曰君何爲軾曰段干木盖賢者安敢不軾且吾聞段干木未肯以巳易寡人之貴也段干木光乎德寡人光於地干木冨於義寡人冨乎財地不如德財不如義寡人當事之丗􅀃曰陳仲舉爲豫章太守至便問徐孺子所在欲先省之主簿曰群情欲府君先入廨陳曰武玉軾啇容之閭席不暇暖吾之禮賢有何不可又曰何晏爲吏部尚書有位望時談客盈坐王弼未弱冠徃見之聞弼來乃到屣迎之邴原別傳曰原字根短上北伐單于還住昌國原至門下通謁上甚喜覽履而起逺出迎原曰誠副飢虚之心虞老叔髙士傳曰宋少文慱學善屬文清心簡務宋髙祖領荆州辟爲主簿少文不應髙祖乃徹衛率尔從之遊延登第樹聽其髙談歎曰不知禮乃􅁴心明張璠漢記曰荀爽兄弟八人時人謂之八龍舊居豪里縣令苑康曰昔髙陽氏有才子八人署其里曰髙陽里􅁑洪西京雜記曰公孫弘自以布衣爲宰相乃開東閤營客館以招天下之士阮籍􅁗記曰昔子夏處西河之上而文侯擁篲鄒子居􅁰谷之隂而昭王陪乗夫布衣窮居韋帶之士王公大人所以屈體而下之者爲道存也􅁑洪西京雜記曰公孫弘營客館以招天下之士其名曰欽賢之舘以待大賢次曰翹材之舘以待眞材次接士之舘以待國士又曰文帝爲太子立思賢苑以招賔客虞預㑹稽典録曰陳囂山隂人宗正劉向黄門侍郎楊雄薦囂徳義可厲薄俗孝成皇帝特以公車徵囂時巳年七十毎朝請上常待以師􅀓之禮又曰光武嘗出南郊嚴遵曵長裾持鹿扇住立不動天子下車揖而別曹植公讌詩曰公子敬愛客終宴不知疲清夜㳺西園飛盖相追隨太平御覽卷第四百七十四
