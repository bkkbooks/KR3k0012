front:
  text: 太平御覽卷第九百六十木部九
  hash: sha256:cc640b94a6221947d28aad6dd1ecee7dfca4e01109b341189d2f6c21045eef9a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_960-1a}
body:
  text: 皂莢辛夷茱茰榖蔦合歡白銀枕音桄榔欀莎木木綿杬魄樕樸檴杔欒文木韶平仲君遷古度柜貝多射干時好摩厨榕夫漏都桶都咸千歳愼火勝火橎栘皂筴廣志曰雞栖子皂莢也宋書曰明帝憎婦人妬劉休妻王氏妬帝聞之賜休妾勑王氏二十杖令休於宅後開小店使王氏親賣掃箒皂莢以此辱之齊書曰明帝毎用皂筴授餘濼曆洛二音與左右曰此猶堪明日用又曰王儉素恨虞玩之東歸儉不出送朝廷無祖餞者玩之卒後貟外孔皚詣儉求㑹稽五官儉方盥投皂角於地曰卿郷俗惡虞玩之至死煩人三國典略曰梁元􅀄甘露降荆州皂莢樹陳書曰梁末童謡云不見馬上郎只見黃塵起黄塵汚人衣皂莢相料理及王僧辯平羣臣奏髙祖曰王僧辯本乗巳馬擊侯景馬上郎王字也黄塵陳也丗不解皂莢之義及陳滅於隋隋氏姓楊楊者羊也􅀃者以江東人謂羖羊角爲皂莢神仙傳曰劉綱受老君道成上大皂莢樹飛去入雲又曰雲仙翁斬皂莢樹以杯承之皆是好酒洛陽宫殿簿曰建始殿前槐及皂莢二十㧣扶南傳曰安息國出酢皂莢可食味最羙幽明録曰曲阿虞晩所居宅内有一皂莢樹大十餘圍髙十餘丈枝條扶踈䕃覆數家諸鳥依其上晩令奴斫上枝因墮殆死空中有罵詈者言晩汝何意伐我家居便以瓦石推擲大小並委頓如此一年漸消滅范子計然曰皂莢出三輔上價一枚一錢葛洪治溺死方曰擣皂莢裏以綿内死人下部中水出即活辛夷本草經曰辛夷一名辛引一名侯桃一名房木神農夲草曰辛夷生漢中魏興凉州川谷中其樹似杜仲樹髙一丈餘子似冬桃而小楚辭曰飲菌􅀂之朝露􅀆構桂木而爲室所飲食㓗清所處芬香雜橘柚以爲囿􅀆列辛夷與椒楨又曰乗赤豹􅀆從文貍辛夷車􅀆結桂旗茱茰洞林曰郭璞避難至新息有人以茱茰令璞射之璞曰子如小鈴含玄珠構支言之是茱茰􅀃文曰椒似茱茰出淮南揚州有茱茰樹風土記曰茱茰椒也九月九日成熟色赤可採丗俗亦以比日折茱茰費長房云以挿頭髻云辟惡異苑曰􅁃紹爲東郡令宗恊與紹中表旦服茱茰酒忽見紹來仍求酒執酒杯還置云茱茰氣恊云惡之耶紹云上官皆畏况我乎􅄂五行書曰舎東種楊茱茰各三株増年益壽除患害蜀都賦曰其圃則有蒟蒻茱茰曹植樂府歌曰茱茰自用芳不􅀂桂與蘭榖毛詩鶴鳴曰樂彼之園爰有樹檀其下維榖榖惡木也詩義䟽曰幽州謂之榖桑或曰楮桑荆楊交廣謂之榖今江南績其皮以爲布又搗以爲􅁓長數丈㓗白光澤甚好葉􅀄生可以爲茹􅀃文曰榖楮也裴淵廣州記曰蠻夷取㯏皮熟搥爲楬褁髻布鋪以擬氊錢塘記曰靈隱山四布似蓮花中央生榖樹甚髙大韓子曰宋人有爲其君以象爲楮葉者三年而成亂之楮葉中而不可別也吴氏夲草曰榖木皮治喉閉痺一名楮魏王花木志曰南方記楮子如梅實三月花色仍連實七八月熟土人鹽藏之味辛出交阯蔦音鳥爾雅曰寓木宛童也郭璞曰􅀉生樹也一名蔦漢書曰武帝使東方朔射覆郭舎人曰朔中榜臣百不中賜臣帛乃覆樹上􅀉生朔曰寠藪也舎人曰朔果不中朔曰生肉爲膾乾肉爲脯着樹爲􅀉生盆下爲寠藪上令榜舎人合歡古今注曰欲蠲人以憂則贈以丹􅁄丹􅁄一名忘憂欲蠲人之忿則贈以青裳青裳一名合歡能忘忿枝葉繁弱牙相交結毎一風來輙自相解不相牽綴嵇康種之舎前本草經曰合歡味甜平生川谷安五臟和心氣令人歡樂無憂乆服輕身明目生益州仲長統昌言曰漢安帝時有異物生長樂宫東廡柏樹永巷南閨合歡樹議者以爲芝草也羣臣皆賀受賜晉宫閣名曰華林園合歡四株神農夲草曰合歡生豫州河内川谷其樹似狗骨樹嵇康養生論曰萱草忘憂合歡蠲忿白銀湘州記曰益陽縣西山多銀木晉宫閣名曰華林園白銀八株􅚴音尤交州記曰􅚴赤色堪作舩作牀遊名山志曰樓石山多章􅚴皆爲三四五圍鄧德明南康記曰南康縣瞢音忘鄧切永極源去郡並九百地多章􅚴樹桄榔蜀志曰興古南漢縣有桄榔樹峯頭生葉有麵大者収麵乃至百斛華陽國志同吴録曰交趾南海縣出桄榔中有米屑爲麵臨海異物志曰桄榔木外皮有毛似栟櫚而散生作䋏音昨綆漬之不腐其木剛作鈠釤鋤利如鐵中石更利唯中焦榔致敗耳皮中有似擣稻米又似麥麵中作麵餌廣志曰桄榔樹大四五圍長五六丈洪直旁無枝條其㒹生葉似㨑葉斫其木肥堅難傷入數寸得麵愽物志曰蜀中有樹名桄榔皮裏出屑如麵用作餅食之謂之桄榔麵魏王花木志曰桄榔出興古國者樹髙七八丈其大者一樹出麵百斛交趾又有樹其皮有光屑取之乾擣以水淋之如麵可作餅餌嶺表録異曰桄榔樹枝葉並蕃茂與􅀥㯽榔等樹小異然葉下有􅂡如麄馬尾廣人採之以織巾子其鬢尤冝鹹水浸漬即麄脹而肕故人以此縛舶不用釘線木性如竹紫黒色有文理而堅工人解之以制愽弈局此樹皮中有屑如麵可爲餅食之水經曰漢興縣溪中多生卬竹桄榔樹樹出緜而夷人資以自給欀音湘吴録地理志曰交趾望縣有欀木其皮中有如白米屑者乾之水淋之似麵可作餅郡内皆有之左思吴都賦曰文欀貞橿莎木蜀志曰莎樹大四五圍長五六丈峯頭生葉出麵一樹出一石正白而味似桄榔南中八郡志曰莎樹大四五圍長十餘丈樹皮能出麵大者百斛色黃鳩民部落而就食之廣志曰莎樹多枝葉葉兩邊行列􅀂飛鳥翼其麵色白樹収麵不過一斛擣篩乃如麵不則如磨屑爲飯滑軟木緜吴録地理志曰交趾定安緜有木緜樹髙大實如酒杯中有緜如蚕之緜又可作布名曰緤一名毛布廣州記曰枝似桐枝葉似胡桃而稍大出交廣二州羅浮山記曰木緜正月則花大如芙蓉花落結子方生緜與葉耳子内有緜甚曰蚕成則熟南人以爲緼絮廣志曰木緜樹赤華爲房甚繁偪側相比爲緜甚軟出交州永昌杭爾雅曰杭魚毒也郭璞曰杭木子似栗生南方皮厚汁赤中藏􅆑菓臨海異物志曰杭味如楮廣志曰原木漬其汁消殺衆生生南魄爾雅曰魄榽音奚橀音醯也魄大木細葉似檀今江東多有之廣雅曰青檀似奚橀語曰齊人斫檀奚榽先殫樕樸音速卜爾雅曰樕樸心也郭璞曰檞樕別名檴杔檴呼化切􅀃文曰狗杶也欒􅀃文曰欒木也似木蘭從木欒聲文木吴録曰南朱桐縣有文木材堅黒如水牛角作馬鞭山海經曰符愚之山文木其實如􅀥南方草物􅃺曰文木樹髙七八丈其色正黒如水牛角作馬鞭日南有之韶裴淵廣州記曰韶葉似栗赤色子大如栗有􅁄刺破其皮内白猪肪着核不離味甜酢核如荔枝平仲左思吴都賦曰平仲君遷平仲實如銀君遷子如瓠君遷劉欣期交州記曰君遷樹子如馬乳魏王花木志曰君遷細似甘蕉子如馬乳古度吴録地理志曰廣州有木名古度不華而實裴淵廣州記曰古度葉如栗無華枝柯皮中生子子似櫨而酢煑以爲粽數日不煑化作飛蟻吴都賦曰松梓古度柜爾雅曰援柜柳郭璞曰拒似柳皮可煑作飲也貝多唐書曰貞觀中隋婆登國遣使朝献其國在林邑南海行二月東與訶陵西與迷􅀺車接北鄰大海風俗與訶陵同種稻毎月一熟亦有文字書之貝多葉杜寳大業拾遺録曰洛陽翊津橋通翻經道􅂣東街其道場有婆羅門僧及身毒僧十餘人新翻諸經其所翻經本從外國來用貝多樹葉書書即今胡書體貝多葉長一尺五六寸闊五寸許葉形似琵琶而厚大横作行書隨經多少縫綴其一邊怗怗然顧徽廣州記曰貝多似枇杷而有光澤耀日枝柯去地四五丈作懸根生地便大如夲株形一樹亦可有數十根如本形花白子不中食種於精舎浮圖前嵩髙山記曰嵩髙寺中有思惟樹即貝多也如來坐貝多下思惟因以爲名焉魏王花木志曰思惟樹漢時有道人自西域持貝多子植於嵩之西峯下後極髙大有四樹樹一年三花射干孫卿子曰西方有木名射干莖長四寸生於髙山之崖臨百仞之淵木非長也所立髙也君子居必擇郷遊必就士楚辭曰掘荃蕙與射干􅀆芸藜藿與蘘荷時好孫綽子曰北阜有木焉名曰時好摩厨異物志曰木有摩厨生于斯調摩厨木名也生於斯調州厥汁肥潤其澤如膏馨香馥郁可以煎熬如脂膏可以煎熬食物也彼州之民仰爲嘉肴花木志曰煎熬食物香美如華夏之人用油榕異物志曰榕樹栖栖長與少殊少時縁木後乃成樹故爲殊也髙出林表廣䕃原丘孰知􅀄生葛虆之儔魏王花木志曰榕木􅀄生少時縁縛他樹如外方扶芳藤形不能自立根本縁繞他木傍作連結有如羅網相絡然後木理連合欎茂扶踈髙六七丈嶺表録異曰榕樹桂廣容南府郭之内多栽此樹葉如冬青秋冬不凋枝條旣繁葉又蒙細而根􅂡繚繞枝榦屈盤上生嫰條如藤垂下漸漸及地藤梢入土便生根節或一大榕樹三五處有根者又横枝着鄰樹則連理南人以爲常不爲之瑞木夫漏徐􅂨南方記曰夫漏樹野生三月華五六月成子如术有煑着猪肉雞鴨羮中好可食亦中􅐭藏都桶徐􅂨南方記曰都桶樹二月花仍連實七月熟如􅆑魏王花木志曰南方草物狀都桶樹野生二月花色仍連着實八九月熟子如鴨􅆑民取食之其皮核滋味酢出九眞交趾都咸徐􅂨南方記曰都咸樹子大如指取子及樹皮曝乾作飲芳香千歳􅀽山松冝都山川記曰佷山有異木人無見其朽者其名曰千歳葉似􅀥色似桑冬夏青貞強少節目慎火南越志曰廣州有大樹可以御火山北謂之慎火或謂戎火多種屋上以防火勝火伏琛齊地記曰東武城東南有勝火木方俗音曰挺子其木經野火燒炭不滅故東方朔謂爲不灰之木左思齊都賦曰勝火之木衝水之草播栘音泥林邑記曰播栘樹柯節發根下垂虚中森羅望之似懸髪太平御覽卷第九百六十
