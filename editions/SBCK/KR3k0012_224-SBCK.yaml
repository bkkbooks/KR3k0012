front:
  text: 太平御覽卷第二百二十四
  hash: sha256:8e22f15658ebab92363e5b06ec191fba0a00e9e94ffbdc72e713a20e45a18497
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_224-1a}
body:
  text: 職官部二十二散􅀐常侍貟外散􅀐常侍通直散􅀐常侍散􅀐侍郎貟外散􅀐侍郎通直散􅀐侍郎散􅀐常侍六典曰唐貞觀􅀄置散􅀐常侍二貟􅀠門下省明慶二年又置二貟􅀠中書省始有左右之號並金蟬眊貂左散􅀐與侍中爲左貂右散􅀐與中書令爲右貂謂之八貂又曰散􅀐常侍晉代此官選望甚重時與黃門侍郎謂之黄散漢書百官表曰散􅀐中常侍皆加官所加或列侯將軍卿大夫正貟多至數十人應劭漢官儀曰􅁗及前漢置散􅀐及中常侍各一人散􅀐􅀐馬並乗輿車獻可替否魏志曰文帝延康元年置散􅀐常侍爲一官省中置四人與侍中同掌規諌不用宦者宦者爲官不過署令魏略自散􅀐常侍比於侍中貂璫挿石黄􅀄中始置四人出入侍從與上談議不典事蜀志曰魏文帝善孟逹之姿才容觀以爲散􅀐常侍吴志曰薛瑩旣至洛陽特先見叙爲散􅀐常侍荅問處當皆有條理晉書曰鄭黙字思元爲散􅀐常侍武帝出南郊侍中巳陪乗詔曰使鄭常侍叅乗又曰阮孚爲散􅀐常侍嘗以金貂換酒復爲所司彈劾帝宥之又曰華嶠字叔駿加散􅀐常侍班同中書寺爲内臺中書散􅀐著作及理禮音律天文數術南省文章門下撰集皆典統之也又曰何劭字敬祖曽之子也少與武帝同年有惣角之好及帝即位轉散􅀐常侍甚見親重晉起居注曰太康七年詔曰尚書馮紞忠亮在公歷職内外勤恪匪懈而疾未差屢求放退其以紞爲散􅀐常侍賜錢二千萬牀帳一具又曰升平五年詔曰前西中郎謝萬才義簡亮冝居獻替其以萬爲散􅀐常侍晉中興書曰􅁃闡有文章才美議者以爲冝綜國史於是召爲散􅀐常侍晉諸公賛曰司馬駿五六歳能書數魏王爲帝駿八歳爲散􅀐常侍常侍講齊書曰周盤龍自平北將軍爲散􅀐常侍武帝戯之曰卿著貂蟬何如兠鍪對曰此貂蟬從兠鍪中出耳齊職儀曰魏氏侍中皆􅀐從御登殿與散􅀐常侍對挾帝侍中居左常侍居右後魏書曰􅀄髙祖以李彪爲散􅀐常侍郭祚因入見髙祖謂祚曰朕誤受一人官禄對曰豈容聖詔一行而有差異髙祖曰朕昨誤沉吟曰此自應有讓朕欲别授一官湏􅁷彪有啓云伯石辭卿子産所惡臣欲之巳乆故不敢讓髙祖歎謂祚曰卿之忠諌李彪正辭使朕遲廻不能復决遂不移官又曰明亮爲常侍加武勇將軍進曰臣本官常侍是第三清今授武勇其號至濁又曰荀頽承明元年文明太后令百官舉才堪幹事人足委仗者於是公卿咸以頽應選徴拜散􅀐常侍又曰孝文謂散􅀐常侍元景曰卿等自在集書合省逋墯致使王言遺滯起居不修北齊書曰宋弁爲散􅀐常侍遷右將軍領黄門弁屢讓髙祖曰散􅀐位在中書之右常侍者黄門之庶兄領軍者二衛之假攝不足空存推讓而棄大委又曰朝貴多假常侍以取貂蟬之飾髙隆之自表解侍中并陳請假侍服者亦請罷之詔皆如表三國典略曰齊遣散􅀐常侍崔瞻聘于陳瞻辭韻温雅南人欽服力謂之曰常侍前朝何竟不來今日誰相對者又曰賀琛爲梁散􅀐常侍梁主與語常移晷刻故省中語曰上殿不下有賀雅琛容止都雅故人呼之隋書曰案漢官侍内金蟬左貂金取剛固蟬取髙㓗也董巴志曰内常侍右貂金璫銀附蟬内書今亦同此今宦者去貂内史金蟬右貂納言金蟬左貂開皇時特加散􅀐常待在門下者貂蟬至是罷之唯加常侍聘外國者特給貂蟬還則輸納於内省環濟要略曰散􅀐常侍入侍左右出則侍事於廊廡之下華嶠集云詔曰散􅀐以從容侍從承荅頋問掌讃詔命平處文籍故前世多叅用文學之士義郎華嶠有論義著述之才其以嶠爲散􅀐常侍兼與中書共叅著作事􅱻表謝云非臣典筆申辭所能陳謝貟外散􅀐常侍晉書曰吏部郎李重啓東莞太守曹嘉之才翰學義先代之後冝􅀘貟外常侍晉起居注曰咸康八年司徒王導表貟外常侍孫朝八年告老弃身茨宇永絶榮禄冝給夲官秩俸以終餘年梁書曰賀琛字國寳遷貟外散􅀐常侍舊尚書南座無貂貂自琛始也通直散􅀐常侍陶氏職官要録曰晉太始十年詔東平王楙爲貟外常侍通直殿中與散􅀐常侍通直通直之號盖自此始也朱鳯晉書曰左軍陳與騫之子以父老求去職宿衛不冝曠詔以爲通直常侍宋書曰通直散􅀐常侍貟四人魏末散􅀐常侍又有在貟外晉武帝使二人與散􅀐常侍通貟直故謂之通直散􅀐常侍晉江左置四人梁書曰鮑泉嘗乗髙幰車從數十左右繖盖服玩甚精道逢國子􅀕酒王承承疑非舊貫遣訪之泉從者荅曰鮑通直承恠焉復欲辱之遣逼車問鮑通直復是何許人而得如此都下少年遂爲口實見尚豪華人相戯曰鮑通直復是何許人而得如此以之爲􅀏謔北齊書曰張景仁除通直散􅀐常侍及奏御筆􅀧通直字遂爲正常侍也隋書曰許善心加通直散􅀐常侍聘於隋遇髙祖伐陳禮成而不􅀗反命累表請辭上不許留縶賔館及陳亡髙祖遣使告之善心素服號􅂘於西階之下藉草東向經三日勑書唁焉明日有詔就館拜通直散􅀐常侍賜衣一襲善心􅂘盡哀入房改服復出北面立垂涕再拜受詔明日乃朝伏泣於殿下悲不能興上頋左右曰我平陳國唯復此人旣能懷其舊君即是我誠臣也勑以夲官直門下省賜物千叚馬二十疋散􅀐侍郎魏志曰文帝延康元年置散􅀐常侍侍郎各四人又曰鍾敏字雅叔每十四爲散􅀐侍郎機捷談􅀏有父之風魏略曰孟康字公休安平人黄􅀄中以於郭后有外属并受九親賜拜遂轉爲散􅀐常侍是時散􅀐皆以髙才英儒充其選而康獨縁妃嬙雜在其間故于時皆共輕之號爲阿九康旣才敏因在冗官􅀶讀書傳後遂有所彈駮其文義雅而切要衆人乃更加意晉陽秋曰荀顗字景倩帝見而竒之曰荀令君子也擢拜散􅀐侍郎于寳晉紀曰處士馮恢志行過人以爲散􅀐侍郎張華曰臣請觀之􅀂不見臣上也見而有慠丗之容次也敬而爲賔主者固俗士也及華至恢待之恭於是時人少之唐書曰髙祖􅀄平長安拜舞人安叱奴爲散􅀐侍郎旣在朝列咸陪遊宴禮部尚書李綱諌曰臣案周禮均工樂胥不得預於士伍雖復才如子野妙等師襄皆終身繼世不易其業故魏武帝欲使禰衡擊鼓先解朝服露體而擊之問其故對曰不敢以先王法服而爲伶人之衣也唯齊末髙緯封曹妙逹爲王安馬駒爲開府有國家者以爲殷監今新定天下開太平之基起義功臣行賞未遍髙才碩學猶滯草萊而先令舞胡致位五品鳴玉曵組趍馳廊廟故非創規模貽子孫之道也髙祖不納􅁊氏家傳曰延康元年􅀄置散􅀐之官皆選親舊文武之才以爲賔宴之臣遷􅁊範爲散􅀐侍郎陶氏職官要録曰案漢􅀄有􅀐郎常侍有資者得爲􅀐郎資滿五萬爲常侍郎張釋之以資爲常侍郎盖此官也華嶠譜叙曰華歆有三子表字偉咎年二十餘爲散􅀐侍郎時同寮諸郎共平尚書事少並厲鋒氣要名譽尚書事至或有不便故遺漏不視及傳書者去即深文論駮唯表不然事有不便輙與尚書共論盡其意主者固執不得巳然後共奏司空陳恭等以此稱之貟外散􅀐侍郎晉起居注曰大興四年詔曰今以前司空從事中郎盧諶爲散􅀐侍郎在貟外晉中興書曰符堅青州刺史符朗降烈宗詔曰朗深識逆順望風歸化旣嘉此誠亦簡其才可貟外散􅀐侍郎并賜給之宋書曰貟外散􅀐侍郎置無貟後魏書曰梁三益字敬安於南陽内附髙祖與語善之曰三益三益殊不亞拜貟外散􅀐侍郎通直散􅀐侍郎晉大興元年起居注曰置通直散􅀐侍郎四人沈約宋書曰晉元帝使貟外散􅀐侍郎二人與散􅀐通直故謂之通直散􅀐侍郎後魏書曰李瑾字道瑜美容皃頗有文才遷通直散􅀐侍郎與黄門王遵業尚書郎盧觀典脩儀注臨淮王式謂瑾等三儁共掌帝儀可謂舅甥之國王盧即瑾之外兄也太平御覽卷第二百二十四
