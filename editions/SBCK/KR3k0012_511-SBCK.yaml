  text: 太平御覽卷第五百一十一
  hash: sha256:1cda6b7a2d42066de52dd898624033d7ad8e77cc057fbd05833c9482f4529897
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_511-1a}
body:
  text: 宗親部一祖父母父母繼母祖父母釋曰祖祚也祚先也禮記曲禮曰逮事父母則諱王父母不逮事父母則不諱王父母毛詩商頌曰無念爾祖聿脩厥德漢書曰路温舒字長君從祖父受暦數天文也後漢書曰虞詡陳國人祖父爲郡縣獄吏務在寛恕常稱曰東海于公髙其里門定國卒至丞相吾治獄六十年雖不及于公子孫何得不爲九卿故字詡曰昇卿後遷僕射尚書令晉書曰何曽侍武帝宴退告其子道曰國家應天受命創業垂統吾每侍宴未嘗聞經國逺圖唯􅀃平生常事非貽厥孫謀之兆也後嗣其殆乎此吾子孫之憂汝等猶可没指孫曰此軰必遇亂亡及遵之子綏死兄嵩􅂘之曰吾祖其殆聖乎又曰李宻字令伯父早亡母改醮祖母劉撫飬宻奉事以孝謹聞有暇則講學亡疲師事譙周門人方之遊夏太始􅀄徴爲太子洗馬密以祖母老上表云臣無祖母難以至於今日祖母無以終餘年母孫二人更相爲命臣宻今年四十四祖母年九十六是臣盡節於陛下之日長而恭事於劉之日短劉終後復爲太子洗馬又曰王爽字季明強正有志歴侍中嘗與㑹稽王道子飲道子醉呼爽爲小子爽曰亡祖長史與簡文帝爲布衣之交亡姑亡姉伉儷二宫何小子之有又曰符生字長生徤第二子㓜而無頼祖洪甚惡之生而無一目爲童兒洪戯之曰吾聞瞎児一淚信乎生怒引佩刀自刺出血曰此亦一淚洪大驚鞭之生曰性耐刀槊不堪杖箠洪曰吾將以爾爲奴生曰可不如石勒也洪懼跣而掩其口陳留志曰范喬字伯山年二􅀊祖父馨臨終執其手曰恨不見汝成人因以所用硯與之至五􅀊祖母以告喬喬便執硯流涕江蕤别傳曰蕤年十一始樗蒲祖母費爲􅀃徃事有􅀶弈破業廢身於是弃五木終身不以爲戯父母爾雅曰父爲考母爲妣毛詩陟岵曰孝子行􅃥思念父母也陟彼岵􅀆瞻望父􅀆陟彼屺􅀆瞻望母􅀆又蓼莪曰蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞蓼蓼者莪匪莪伊蔚哀哀父母生我勞瘁無父何怙無母何恃出則銜恤入則靡至父􅀆生我母􅀆鞠我撫我畜我長我育我顧我復我出入腹我欲報之德昊天罔極禮記曲禮曰生曰父曰母死曰妣曰考左傳隱公曰鄭莊公母弟共叔叚以母之寵請邑居之京叚遂以京叛公伐京叚出奔遂寘母姜氏於城潁而誓之曰不及黄泉無相見也旣而悔之頴考叔曰􅀂闕地及泉隧而相見其誰曰不然公從之遂爲母子如􅀄又莊公曰宋南宫長萬作亂奔陳以乗車輦其母一日而至又成上曰晉敗􅁗師于鞍齊請平晉人曰必以蕭同叔子爲質對曰蕭同叔子非他寡君之母也􅀂以疋敵則亦晉君之母也吾子布大命於諸侯而曰必質其母以爲信其􅀂王命何且是以不孝令也又襄三曰晋叔向之母妬叔虎之母羙而不使視寢其子皆諌其母母曰深山大澤實生龍蛇彼羙余懼其生龍蛇以禍汝汝􅁦族也余何愛焉使徃視寢生叔虎羙而有勇欒盈嬖之故羊舌氏之族及於難公羊傳曰惠公者何隠之考也仲子者何桓之母也史記曰趙括奢之子趙孝成王欲以括爲將母曰不可使也王曰母何以知之對曰妾事其父時其父爲將王之所賞賜盡分散與軍吏士大夫受命之日不問家事令括一朝爲將軍吏不敢仰視王之所賜悉藏於家而視利便田宅父子異心願王勿遣王曰母致之吾巳決矣母曰王必遣忽有不稱妾乞不坐王許之後果敗爲白起所坑漢書曰王陵沛人以兵屬漢王項羽得陵母置於軍中以招陵後漢使至陵母謂使者曰爲老妾語陵漢王長者必有天下善事之無以老妾在故懷持二心遂伏劒而死羽怒烹之又曰陸賈使南越趙他賜陸生橐中裝直千金他送亦千金吕后時病免歸家有五男乃出所使得越橐中裝賣千金分與其子各二百金令爲生産賈常乗安車駟馬從歌舞鼓吹琴瑟侍者十人有寳劒直百金謂其子曰與汝約過汝給吾人馬酒食極歡十日而更所死家得寳劒及車􅀐從者又曰金日磾字翁叔休屠王太子也父以降漢見殺與母閼氏弟俱没入宫後拜光禄大夫旣親近未嘗有過武帝甚信愛之日磾母教誨兩子甚有法度上嘉之及死詔圖形于甘泉宫曰休屠王閼氏也日磾每見􅀞常拜泣不止又曰霍去病父仲孺河東人以縣吏給事平陽侯家與侯侍者衛少兒私通生去病仲孺吏畢歸家娶婦生子不相聞乆之去病爲驃􅀐將軍擊匈奴道出河東至平陽傳舎遣迎仲孺趍入拜謁將軍迎拜因跪曰去病不早知爲大人之遺體也仲孺扶服叩頭曰老臣得訖命將軍此天力也去病大買田宅奴婢而去又曰嚴延平字次卿東海下邳人爲河南太守冬日行属縣刑戮囚徒流血數里河南号屠伯母見責之曰汝宣化千里不聞仁愛而殺人立威名豈爲人父母哉天道神明人不可獨殺我不意老見壯子􅀍刑戮也行矣去東歸掃墓地耳􅀊餘果敗延年兄弟五人皆有吏才並至大官東海號爲萬石嚴嫗又曰雋不疑爲京兆尹毎行縣録囚徒還其母輒問有所平反活幾人即不疑多有平反母喜而爲之食或無所出母怒而不食故不疑爲吏嚴而不殘後漢書曰竇武字游平扶風人初武母産武并産一蛇送之林中後母卒葬有一大蛇自榛草出至擊柩流血􅀂哀泣之容時人以爲竇氏之祥又曰楊彪爲太尉子修爲曹操所殺操見彪問曰君何瘦之甚也彪曰媿無日磾先見之明猶懷老牛舐犢之愛操爲改容又曰范滂字孟􅀶汝南征羗人也建寧二年大誅黨人滂母就與之訣滂白母曰仲􅀶孝敬足以供飬仲愽滂弟也滂從龍舒君歸之黄泉存亡各得其所惟大人割不可忍之恩勿増感戚母曰汝今得與李杜齊名死何恨滂跪受教再拜而辭頋謂其子曰吾欲使汝爲惡則惡不可爲使汝爲善則我不爲惡行路聞之莫不流涕又曰黄憲字叔度汝南人丗貧賤父爲牛醫􅀽閬母謂閬曰汝從牛醫児來耶對曰閬不見叔度自以爲及旣覩其人則曕之在前忽然在後固難測矣又曰廬江蔡宗字孟承兢廉嚴正其子未嘗見面子爲二千石求謁宗宗下帷不許子伏於庭其母穿壁使其子窺之乃識儀皃又曰崔發仕王莽位至大司空母師氏通百家之言莽以殊禮之号義成夫人金印紫綬乗文軒丹轂又曰張甫字孟侯汝南人爲太尉雖在公位父常居田里每有遷職輒一詣京師公卿罷朝俱詣甫府奉酒上壽時人榮之呉志曰蔣欽母踈帳縹􅀍妻妾布裙孫權歎其在位能守約儉勑御府爲母作􅀍乃幃帳晉書曰劉惔字眞長沛人少清逺有竒才與母任氏寓居京口家貧織芒屫以爲飬雖蓽門圭竇晏如也又曰伏滔字􅀇度平昌人甚有才學知名拜著作郎孝武㑹西堂滔預坐還下車先呼子系曰百人髙㑹天子先問伏滔在座不此固未易得爲人作父如此如何又曰汜毓字稚春濟北盧人奕丗儒素敦睦九族時人号之兒無常父衣無常主又曰荀羡字令則清和有準􅂊年七􅀊遇􅂫峻難隨父在石頭峻甚愛之惜置羡於􅂰上羡乃隂白其母曰得一利刀子足以殺賊母掩其口又曰虞譚母孫氏訓子以節義朝廷嘉之拜武昌太守丞相巳下皆拜之年九十五譚立飬堂於家又曰郄詵濟隂人對䇿髙第拜議郎母憂去職母在日苦病車及亡不欲車載家貧無以市馬乃於住堂北壁外假葬朝夕拜哭飬雞種䔉竭其方術喪過三年得馬八疋輿棺至􅊘􅀒􅁟成墳又曰韓康伯潁川長社人母殷氏髙明有行家􅁪貧伯年數􅀊大寒母爲作布􅃭令伯捉熨斗而謂之曰且着布􅃭㝷復作袴伯曰不湏母問故曰火在斗中柄􅀬今上着􅃭下亦當暖矣又曰羊躭妻辛氏隴西人侍中毗之女有才鑒鍾㑹爲鎭西請其子琇爲叅軍母曰吾爲國憂今日難至吾家行矣戒之軍旅之間可以濟者惟仁恕乎古之君子入則致孝于親出則盡忠於國在職思其所司在義思其所立無貽父母憂患而己後㑹至蜀果反琇竟以道全身又曰桑虞字子深魏郡􅀺陽人五代義居閨門雍睦青州刺史符朗甚重之嘗詣虞家昇堂拜母時以爲榮又曰周顗母李氏名洛秀汝南人中興時顗等並列顯位嘗冬至置酒洛秀舉酒賜三子曰吾本渡江託足無所不謂爾等並居貴位在吾目前吾身後何憂嵩起曰恐不如尊旨伯仁志大而才短名重而識闇好因人之􅁦此非自全之道嵩性抗直亦不容於丗唯阿奴碌碌在阿母前耳後果如其言阿奴即謨小字也又曰劉琨爲并州刺史母謂之曰汝能弘濟經略駈駕豪傑専欲除於勝巳以自安當何以濟禍必及我也後父母並爲劉聦所害又曰朱序字次倫義陽人鎮襄陽符堅令符丕圍序序母韓氏自登城履行謂西北角必先破受􅁦遂領百餘婢及城中女同丁築三十餘丈後賊果從西北角攻衆潰城破遂固新築丕用引退得免城破襄陽人謂此城爲夫人城宋書曰張興丗字文德竟陵人以平江陵功轉右將軍父仲字子由興丗致位給事中欲徃襄陽又愛戀郷里不肯去嘗謂興丗曰雖田舎翁樂聞鼔角汝可送一部與吾行田時吹之興丗素儉謹畏去白父曰此乃天子鼔角非田舎翁所吹乃止興丗欲拜墓仲子曰汝衛從甚多恐先人驚怖興丗減撤而行又曰朱脩之義陽人加建武將軍留戍滑臺爲索虜所攻母悲憂一旦乳汁驚出因號慟告家人曰我老非有乳汁之時今忽如此我兒必殁矣後數日㐫問至脩之果其日䧟殁梁書曰王僧孺㓜貧其母鬻紗布以自業常携孺於市道途中逢中丞鹵簿駈迫落溝中及孺拜中丞日引孺清道悲不自勝劉璠梁典曰張充字延符呉人父緒特進有重名充少不拘細行肆意畋放時緒請假還呉始入西郭值充正獵左手臂鷹右手牽犬遥望見父乃脫韝放膺紲犬向舟而拜緒曰一身兩役無亦勞乎充跪對曰充聞三十而立今二十九歳矣請至來􅀊終身折節緒曰􅀂過而能改乃顔子矣及明年乃一朝易操尋師就學􅀶覽今古鬱爲名士蕭方等三十國春秋曰􅂫峻作逆領軍卞壼以王師敗績遂單􅀐赴難二子盱隨之俱殁母裴氏撫屍而哭之父爲忠臣子爲孝子夫何恨乎徴士翟陽聞之歎曰父死于前子殁于後忠孝之道萃于一門可謂賢矣又曰呉司徒孟宗少從南陽李肅學母爲作厚褥大􅀍或問其故曰小兒無德可容而學者多貧故爲廣􅀍可得氣􅀋相接也列女傳曰鄒氏孟軻之母見孟子少而學歸母方織問之曰子之廢學􅀂吾斷織孟子懼因更勤不息遂爲大儒丗􅀃曰華歆遇子弟甚整雖闇室之内儼然􅀂朝典也又曰陳元方遭父憂哭泣哀慟容體骨立其母􅉖之􅀼以錦􅀍􅀩之郭林宗吊而見之謂曰卿海内之俊四方是則如何當喪以錦􅀍焉孔子曰衣夫錦食夫稻於汝安乎吾不取也因􅁬衣而去自後賔客絶數百日繼母儀禮子夏傳曰繼母如母何以如母繼母之配父與因母同故孝子不敢殊也東觀漢記曰應愼字仲華爲東平相事後母至孝精誠感應梓樹生廳前屋上徙置府庭繁茂長大後漢書曰鮑永字君長上黨人事後母至孝妻于母前叱狗永遂去之晉書曰凉武昭王李􅀇盛后尹氏􅀄適扶風馬元元卒爲􅀇繼室以再醮之故三年不言撫前妻子如巳所生又曰王祥字休徴瑯琊人至孝繼母朱氏不慈由是失愛於父令掃除牛下祥愈恭謹父母有疾衣不解帶母令守丹㮏實毎風雨則抱而泣母常思黄雀炙忽有黄雀數十飛入幕遂以供母三十國春秋曰王延九􅀊喪母孝行有聞後母卜氏御之無道延㳟事彌謹卜常取蒲穰敗麻與之貯衣延知而不言卜冬月杖之流血令求生魚延扣氷慟哭而得與之卜乃心悟撫之如所生也又曰晉安帝時郭逸妻以大竹杖打逸前妻之子子死妻因棄市如常刑家語曰曽參武城人志存孝道後母遇之無恩其妻藜蒸不熟出之人曰此非七出也荅曰藜蒸小物不用吾命况大事遂遣之終身不娶其子請焉告之曰髙宗以後婦出孝巳尹􅁻甫以後妻嫉伯竒容知其得免非乎琴操曰尹􅁻甫周卿也子伯竒母早亡􅁻甫更娶後妻妻乃譛之於􅁻甫曰伯竒見妾羙欲有邪心􅁻甫曰伯竒慈仁豈有此也妻曰置妾空房中君登樓察之妻乃取毒蜂綴衣領令伯竒掇之於是吉甫大怒放伯竒於野宣王出遊吉甫從之伯竒作歌以感之宣王聞之曰此放子之辭也􅁻甫乃求伯竒而感悟遂射殺其妻捜神記曰衡農字剽卿東平人少􅀌事繼母至孝常􅀫于他舎值雷雨頻夢虎嚙其足農呼妻相與出於庭叩頭屋忽然而壞壓死者几百餘人唯農夫妻獲免太平御覽卷第五百一十一
