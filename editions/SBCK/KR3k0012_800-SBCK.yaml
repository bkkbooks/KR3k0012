front:
  text: 太平御覽卷第八百四夷部二十一
  hash: sha256:536b081fc67719c268b4ae9328f35358d0b450796eeb55910fffd14e8dfec12d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_800-1a}
body:
  text: 北狄二揔叙北狄下史記曰唐虞以上有山戎獫狁葷粥晉灼曰堯時葷粥周曰獫狁秦曰匈奴又曰武王伐紂而營雒邑復居於豊鎬放逐戎狄涇洛之北時入貢命曰荒服又曰趙武靈王北破林胡樓煩築長城自代傍隂山下至髙闕在朔方爲塞而置雲中鴈門代郡漢書曰山戎伐燕告急子齊桓公北伐山戎山戎走又曰晉文公攘戎翟居于西河圁洛之間圁音嚚號曰赤翟白翟師古曰春秋所書晉師滅赤狄潞氏郄缺獲白狄又曰晉北有林胡樓煩之戎燕北有東胡山戎服䖍曰烏桓之先也後爲鮮卑又曰晉悼公使魏絳和戎翟戎翟朝晉後百餘年趙襄子踰句注而破之并代以臨胡貉貉音莫伯反後與韓魏共滅智伯分晉地而有之則趙有代句注以北而魏有西河上郡以與戎界邊又曰秦滅六國而始皇帝使蒙恬將數十萬衆北擊胡悉收河南地因河爲塞築四十四縣城臨河徙讁戍以充之有罪謫令戍之徙讁者令居之而通直道自九原至雲陽因邊山險壍谿谷可繕者繕之繕􅀘也起臨洮至遼東萬餘里又渡河據陽山北假中北假地名當是時東胡強而月氐盛又曰􅄧曰旄頭胡星也􅄧畢間爲天街胡貉月支旃喪引􅀆之民􅄧之主又曰楊雄上書北地之狄五帝所不能臣三王所不能制又曰前丗豈樂傾無量之費役無罪之人快心於狼望之北哉匈奴中地名以爲不一勞者不佚不暫費者不永寧是以忍百萬之師以摧餓虎之喙運府庫之財填盧山之壑而不悔也盧山匈奴中山也又曰狄不服中國未得髙枕安寢也又曰外國天性忿鷙鷙佷也音竹二反形容魁徤􅀒力怙氣難化以善易􅀠以惡􅀠謂附属之惡謂威也其強難詘其和難得故未服之時勞師逺攻又曰狄眞中國之堅敵也又曰王莽征匈奴嚴尤諌曰周秦漢征之皆未得上䇿者也周得中䇿漢得下䇿秦無䇿焉周宣王時獫狁内侵至于涇陽命將征之盡境而還其視戎狄之侵境而譬猶蚊蝱之螫歐之而巳故天下稱明是爲中䇿漢武帝選將練兵約齎輕糧深入逺戍約少也少齎裝雖有克獲之功胡輙報之兵連禍結三十餘年中國疲耗匈奴亦創艾創音􅀄向反艾讀日乂而天下稱武是爲下䇿秦始皇不忍小耻而輕民力築長城之固延袤萬里袤長也音茂轉輸之行起於􅀒海疆墳旣完中國内竭以喪社稷是爲無䇿今天下比年飢饉發三十萬衆具三百日糧兵先至者聚居􅁀露勢不可用一難也邊旣空虚内調郡國不相及屬此二難也計一人三百日食用糒十八斛非牛力不能勝胡也沙鹵多乏水草軍出未滿百日牛必物故此三難也胡地秋冬甚寒春夏甚風食糒飲水師有疾疫此四難也輜重自隨則輕銳者少幸而逢虜危殆不測此五難也莽不聽又曰夷狄之爲患也故自漢興忠言嘉謀之臣􅂚甞不運籌䇿相與爭於廟堂之上乎髙祖時則劉敬吕后時樊噲季布孝文時賈􅁩朝錯孝武時有王恢韓安國朱買臣公縣引董仲舒人持所見各有異同然揔其要歸兩科而巳搢紳之儒則守和親介胄之士則言征伐皆偏見一時之利害也又曰文帝徙六郡良家材力之士六邵謂隴西天水安定北地上郡西河也其日定天水西河武帝所置耳史夲其土地而追言之也聚天下精兵軍於廣武顧問馮唐與論將帥喟然歎息思古名臣此和親無益之明効也又曰董仲舒以匈奴可恱以厚利結之於天耳故與之厚利以没其意與盟於天以堅其約質其愛子以累其心使邊城守境之民父兄緩帶稚子咽哺胡馬不窺於長城而羽檄不行於中國不亦便於天下乎又曰孝武時雖征伐克獲而士馬物故亦略相當雖開河􅀯之野建朔方之郡亦弃造陽之北九百餘里匈奴人民每來降漢單于亦輙拘留漢使以相報復其桀鷔尚如斯又曰孝宣之丗單于臣服三丗稱藩賔於漢庭是時邊城晏閉牛焉布野又曰王莽􅆲位始開邊􅂩單于由是歸怨自絶莽斬其侍子邊境之禍搆矣又曰蕭望之曰戎狄荒服言其來服荒忽無常時至時去冝待以客禮又曰夷狄之人飲食不同言語不通僻居北垂寒露之野逐草隨畜射獵爲生隔以山谷雍以沙幕天地所以絶外内也又曰晁錯上書曰戰勝之威民氣百倍敗兵之卒没丗不復自髙后以來隴西三困於匈奴矣民氣破傷亡有勝意又曰以蠻夷攻蠻夷中國之形也今匈奴地形技藝與中國異上下山阪出入溪澗中國之馬弗與與如也險道傾仄且馳且射中國之􅀐弗與也風雨罷勞飢渇不困中國之人不與也此匈奴之長技也又曰材官騶發矢道同的騶謂矢之善者也春秋作菆宇發矢次射故中則同的則匈奴之革笥木薦弗能支也革笥以皮作如鎧春夜薦以木枚作如楯又曰胡貉之地積隂之處也木皮三寸冰厚六尺食肉而飲酪其人􅁡理鳥獸毳毛􅁡理謂其肥肉也毳細毛也其性耐寒又曰胡人衣食之業不著於地著直略反其勢易以擾亂邊境何以明之胡人如飛鳥走獸廣壄美草甘水則止草盡水竭則移以是觀之往來轉徙時至時去此胡人之生業而中國之所以不可離􅀯􅅿又曰匈奴欲立威者始於折膠秋氣至膠可折弓弩可用匈奴常以爲􅀱而出兵後漢書曰耿秉上言曰今北虜分爭以夷伐夷國家之利又曰間匈奴傳論曰并兵窮討掩其宻穴躡北追奔三千餘里破龍祠焚􅄢幕銘功封石偈呼而旋又曰王莽時盧芳詐稱武帝之後奔匈奴十二年芳與賈覽共攻雲中乆不下其將隨昱得芳之衆昱詣闕拜昱爲五原太守封鐫胡侯鐫謂鑿鑿之也晉書曰前漢末匈奴大亂五單于争立而呼韓邪單于失其國携率部落入臣於漢嘉其意剖并州北界以安之於是匈奴五千餘落入居朔方諸郡與漢人雜處後漢末群臣競言胡入猥多冝先爲其所建安中魏武帝始分其中衆爲五部部立其中貴者爲師復改帥爲都尉其左部都尉所統可萬餘落居於太原右部都尉可六千餘落居於祁縣􅀯部都尉可三千餘落居於蒲子縣北部都尉可四千餘落居興縣中部都尉可六千餘落居太陵縣又曰晉武帝踐祚後匈奴二萬餘落歸化帝復納之使居河西故冝陽城下後復與晉人雜居由是平陽西河新興上黨樂平靡不有焉又侍御史郭欽上䟽曰戎狄強獷歴古爲患魏􅀄置西北諸郡皆爲戎居今雖服從􅀂百年之後有風塵之警胡􅀐自平陽上黨不三日而至孟津北地西河太原馮翊安定上郡盡爲狄庭矣冝及平吴之威謀臣猛將之略出北地西河安定復上郡實馮翊於平陽以北諸縣募取死罪徙三河三魏四萬家以充之裔不亂華漸徙平陽􅁪農魏郡京兆上黨雜胡峻四夷出入之防明先王荒服之制萬丗之長䇿也又曰太康七年有萎莎胡率部落來降又曰北狄以部落爲􅀋其入居塞者有鮮支種有烏譚種有赤勒種有捍蛭種有萎莎種有赤莎種有鬰鞞種有委童種有大樓種不相雜錯又曰其國號左賢王右賢王左弈蠡王右弈蠡王左於六王右於六王左漸尚王右漸尚王左朔方王右朔方王左獨鹿王右獨鹿王左顯鹿王右顯鹿王左安樂王右安樂王凡十六等皆用單于親子弟賈􅁩新書曰臣聞強國戰智王者戰義帝者戰德故湯祝網而漢隂受舞三苗而南蠻服今漢帝國也冝以厚德懷四夷孰敢不承帝意陛下爲臣建三表設五餌以此與單于爭則下匈奴猶振槁也臣且以事􅀔諭天子之言使匈奴大衆信陛下也􅀂日出之灼灼故聞君一言雖有㣲逺其志不疑仇讎之人其心不殆􅀂此則信諭矣一表也臣又且以事􅀔諭陛下之愛令匈奴之自視也茍胡面而戎狀者其自以爲見愛於天子也猶弱子之於慈母也􅀂此則受諭矣一表也臣又且以事勢諭陛下之好令胡人之自視也茍其校之所長與其所工可以當天子之意􅀂此則好諭矣一表也愛人之狀好人之役愛有實以諾可期十死一生彼必將至此謂三表匈奴好之來者家長以上必衣繡家少者乃衣文錦爲銀車五乗大雕盡之駕四馬載緑盖從數􅀐御驂乗且雖單于之出入也不輕都此矣令匈奴降者時時得此而賜之一國聞之見之者希心而相告人人兾幸以爲吾至可以得此將以懷其目一餌也匈奴之使至者􅀂大降者也大衆之聚也上必有所召賜食焉飯物盛美胾炙醯醢方數尺於前令一人坐此胡人欲觀者固百數在旁得賜者之喜也且􅀏且飯味皆所􅄝而所未當得也今來者時時得此而饗之一國聞之者見之者垂涎而相告人自以吾至亦將得此將此懷其口一餌也降者􅀂使者至也必使人有所召客焉胡人之欲觀者勿禁令婦􅀓白黒繡衣而侍其堂者二三十人或薄或掩爲其胡戯使樂府吹簫鼓鞀令使降者時得此而樂一國聞之者見之者人人唯恐其後至也以此懷其耳一餌也凡降者陛下必有所冨令有髙堂􅃉宇善厨大囷廐有編馬庫有陣車時時大具召胡客饗胡令其居處樂皆過其慮出其單于或時時賜此匈奴一國傾心而兾人人汲汲其時將以此懷其腹一餌也於來降者上必時時有所召幸拊循而後得入官於胡嬰兒貴人子好可愛有數十人爲繡衣出則從出入則從入則更侍胡嬰兒得近侍胡貴人得佐酒上前使付酒錢出繡衣具帶服時以賜之令數人得此而居之一國聞者見者人人唯恐後至也以此懷其心一餌也晉中興書曰北狄其地南接燕趙北沙漠東漸九夷西界六戎丗丗自相君臣不禀中國正朔西域記曰諸胡俗婚姻相然許者先送同心指環崔豹古今注曰秦所築長城土色如紫漢塞亦然故稱紫塞焉李陵報蘇武書曰終日無覩但見異􅀋韋㡚毳幕以禦風􅀨又曰出禮義之郷入無知之俗又曰胡笳􅀇動牧馬悲鳴吟嘯成群邊聲四起班固燕然山銘曰鑠王師􅀆征荒裔勦匈奴􅀆截海外封神丘􅀆建隆碣熈帝載􅀆振萬丗古詩曰胡馬依北風越鳥巢南枝古胡無人行曰望胡地何嶮􆄱断胡頭脯胡臆陸機樂府詩曰駈馬陟隂山山髙馬不前借問燕山􅀱勁虜在燕然古詩曰出自薊北門遥望胡地桑陳琳樂府詩曰飲馬長城窟水寒傷馬骨蔡琰詩曰邊亭與華異胡風春夕起太平御覽卷第八百
