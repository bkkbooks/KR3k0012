body:
  text: 讃釋名曰稱人之羙曰讃讃纂也纂集其羙而叙之也文心雕龍曰讃者明也助也昔虞舜之祀樂正重賛盖唱發之詞也及益賛于禹伊陟賛于巫咸並颺言以明事嗟嘆以助詞者也故漢置鴻臚以唱拜爲讃即古之遺語也至如相如屬詞如賛荆軻及史班書記以讃褒貶約文以惣録頌體而論詞又紀傳後評亦同其名而仲治流別謬稱爲述失之逺矣及景純任雅動植必讃讃兼羙惡亦猶頌之有變耳然本其爲義事生奬歎所以古來篇體促而不廣必結言於四字之句槃桓于數韻之詞約舉以盡情照灼以送文比其體也發言雖逺而致用盖寡大抵所歸其頌家之細條也李充翰林論曰容象圖而讃立冝使辭簡而義正孔融之讃楊公亦其羙也晉書曰􅄞含紹之孫也弘農王粹以貴公子尚主館字甚盛圖莊周於室廣集朝士使含爲子讃含援筆爲之文不加􅀧其略曰嗟乎先生髙迹何局生處巖岫之居死􅀉雕楹之屋旣非其所没有餘辱粹有愧色又曰衛􅁪字巨山爲黄門郎善草􅀠太康元年汲縣人盗發魏襄王􅃁得䇿書十餘萬言其一卷論楚者最爲工妙􅁪恱之故竭思以賛其羙丗􅀃曰羊孚作雪讃曰資清以化乗氣以霏遇象能鮮即潔成輝桓伊遂以書扇箴文心雕龍曰箴所以攻疾除患喻針石垣又曰斯文之興盛於三代夏啇二箴餘句頗存及周之辛甲百官箴闕唯虞箴一篇體義備焉迄至春秋微而未絶故魏絳諷君於后羿楚子訓人於在勤戰伐巳來棄德務功銘辭代興箴文萎絶至楊雄稽古始範虞箴卿尹州牧二十篇及崔胡􅀘綴揔稱百官指事配位鑒有徴可謂追清風於前古攀辛甲於後代者也至於潘朂符節要而失淺温嶠侍臣愽而患繁王濟國子引多事寡潘君乗輿義正體蕪凢斯繼作鮮有克􅂨至於王㓪雜箴乃寘巾履得其戒愼而失其所施觀其約文舉要憲章武銘而水火井竈繁辭不巳志有偏也夫箴誦於經銘題於器名用雖異而警戒實同箴全禦過故文資确切銘兼褒讃故理貴弘潤取其要也然天言之道盖闕庸器之制乆淪所以箴銘實用罕施後代惟秉文君子冝酌其逺大矣陸士衡文賦曰箴頓挫而清壯周書曰夏箴曰小人無兼年之食遇天饑妻子非其妻子也大夫無兼年之食遇天饑臣妾非其臣妾也卿大夫無兼年之食遇天饑臣妾􅓅馬非其有也國無兼年之食遇天饑百姓非其有也左傳襄元曰昔周辛甲之爲太史命百官官箴王闕辛甲周武王太史也闕過也百官各以箴以誡王過也於虞人之箴曰虞人掌田獵者芒芒禹跡畫爲九州芒芒逺貌也畫分也經啓九道九道九州之道也啓開也民有􅃦廟獸有茂草各有攸處德用不擾人神各有歸故德不亂也在帝夷羿冐于原獸冐貪忘其國恤而思其麀牡言但念獵武不可重重猶數也用不恢于夏家羿以好武雖有夏家而不能恢大也獸臣司原敢告僕夫獸臣虞人也告僕夫不敢斥尊也范曄後漢書曰崔􅄾字子瑋梁兾聞其才請與交兾行多不䡄􅄾數引古今成敗以誡之兾不能受作外戚箴晉書曰張華懼后族之盛作女史箴以爲諷賈后雖凶妬而知敬重華又曰文帝子齊王攸武帝時爲太子太傅獻箴於太子其略曰無曰父子之間昔有江充無曰至親靡二或容潘崇䛕言亂眞譛潤離親驪􅁎之䜛晉侯疑申固親以道勿固以恩修身以敬勿託以尊丗以爲工後周書曰齊王憲友劉休徴獻王箴一首憲羙之休徴後又以此箴上髙祖髙祖方剪削諸弟甚恱其文唐書曰元和中吏部郎中栁公綽獻太毉箴曰寒暑滿天地之間浹肌膚於外好愛溢耳目之前誘心知於内端㓗爲隄奔射猶敗氣行無間隙不在大睿聖之姿清明絶俗心正無斜志髙寡欲謂天髙矣氣蒙晦之謂地厚矣撗流漬之聖情超遥萬方頼之飲食所以資身也過則生患衣服所以稱德也侈則生慢惟過與侈心必隨之氣與心流疾亦伺之上深嘉歎降中使勞問又曰敬宗遊幸無度李德􅁉獻丹扆箴六首霄衣箴曰先王聽政昧爽以俟鷄鳴旣盈日岀而視伯禹大聖寸隂爲貴光武至仁反支不忌無俾姜后獨去􅆪珥彤管記言克念前志又有正服罷獻納誨辨邪防微等箴文多不載帝甚嘉之胡廣百官箴叙曰箴諫之興所由尚矣聖君求之於下忠臣納之於上故虞書曰予違汝弼汝無面從退有後言墨子著書稱夏箴之辭崔瑗叙箴曰昔楊子雲讀春秋傳虞人箴而善之於是作爲九州及二十五管箴規匡救言君德之所冝斯乃體國之宗也太平御覽卷第五百八十八
