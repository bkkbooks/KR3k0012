front:
  text: 風雅之意􅀂馬融廣成上林之屬純爲今賦之體而謂之頌失之逺矣文心雕龍曰四始之至頌居其極頌者容也所以羙盛德而􅄒形容也昔帝嚳之丗咸累爲頌以歌九招自啇頌巳下文理允備夫化偃一國謂之風風正四方謂之雅雅容告神謂之頌風雅序人故事資變正頌主告神故義必純羙魯以旦次編啇以前王追録斯乃宗廟之正歌非饗燕之􅁪詠也時邁一篇周公所製哲人之頌規式存焉夫三閭橘頌情采芬芳比􅀋屬興又覃及細矣至於􅁗政刻文爰頌其德漢之惠景亦有􅄒容㳂丗並作相繼於時矣􅀂夫子雲之表充國孟堅之序戴侯武仲之羙顯宗史岑之述僖后或擬清廟或範䮐那雖深淺不同詳略有異其褒德顯容典章一也原夫頌惟典懿詞必清鑠敷冩似賦而不入華侈之區敬慎如銘而異於規式之域榆楊以發藻汪洋以樹儀雖纎巧曲致與情而變其大體所弘如斯而巳漢書曰宣帝徴王褒爲聖主得賢臣頌褒對曰夫荷旃􅀍毳者難與道純綿之麗宻羮藜唅糗者不足與論大牢之滋味今臣僻在西蜀生於窮巷之中長於蓬茨之下無有遊觀廣覽之知不足以塞厚望應明旨雖然敢不略陳愚而杼情素又曰成帝時西羗嘗有警上思將帥之臣追羙充國乃召黃門郎楊雄即充國圖􅀞而頌之後漢書曰帝召賈逵因勑蘭臺給筆札使作神雀頌范曄後漢書曰肅宗治脩古禮廵狩方嶽崔駰上西廵頌稱漢德帝雅好文章自見駰頌後常嗟歎之問侍中竇憲曰寧知崔駰乎對曰班固數爲臣􅀃之然未見帝曰公愛班固而忽崔駰此葉公之好龍也可試見之駰由此候憲憲屣履迎門􅀏謂駰曰亭伯吾受詔交公何得薄我哉遂揖入以爲上客又曰傳毅與班固賈逵共典校書毅追羙孝明帝功德最盛而廟頌未立乃依清廟作顯宗頌十篇奏之又曰平望侯劉毅以和熹鄧太后有德教請令史官著長樂宫聖德頌以敷宣景耀勒勲金石縣之日月攄之罔極以崇陛下蒸蒸之孝帝從之魏志曰黃􅀄三年黃龍見鄴西漳水中山王褒上頌賜黃金十斤晉春秋曰懷帝䧟於平陽劉聦加帝開府儀同三司㑹稽郡公引帝入醼謂帝曰卿爲豫章王時朕與王武子俱造卿武子稱朕於卿卿言聞名乆矣卿以所作樂府文示朕曰劉君聞君善詞賦試爲㸔也朕與武子俱爲盛德頌卿稱善者乆之又引朕射于皇堂朕得十二籌卿與武子俱得九籌卿又贈朕柘弓銀硯卿頗憶否帝曰安敢忘之恨尔日不得早識龍顔聦曰卿家骨肉何相殘之甚邪帝曰此殆非人事皇天意也大漢將興應乾受暦故爲陛下自相驅耳且臣家􅀂能奉武皇帝之業九族敦睦陛下何由得之聦甚有喜色晉書曰劉臻妻陳氏聦敏能屬文嘗正旦獻椒花頌其詞曰旋穹周廻正朝肇建青陽散暉澄景載煥臧榮緒晉書曰劉伶字伯倫沛國人也志氣曠放以宇宙爲狹著酒德頌爲建威叅軍以壽終崔鴻春秋前燕録曰慕容雋觀兵近郊見甘棠于道周從者不識雋曰唏此詩所謂甘棠于道甘者味之主也木者春之行也五德屬仁五行主土春以施生味以養物色又赤者言將有赫赫之慶于中土吾謂國家之盛此其徵也傳曰􅂛髙能賦可以爲大夫羣司亦各書其志吾將覽焉於是内外臣竂並上甘棠頌南史曰梁大同中嘗驟􅀨殿前徃徃有雜色寳珠梁武觀之甚有喜色虞􅀉因上瑞雨頌帝謂􅀉兄荔曰此頌典裁清拔卿之士龍也將加擢用􅀉聞之歎曰羙盛德之形容以申擊壤之情耳吾豈買名求仕者乎後周書曰顔之儀㓜潁悟三歳能讀孝經及長􅀶渉羣書好爲詞賦嘗獻神州頌辭以雅贍梁元帝手勑報曰枚乗二葉俱得遊梁應貞兩丗並稱文學我求才子鯁慰良深江陵平之儀隨例遷長安丗宗以爲麟趾學士隋書志曰比齊中書侍郎杜臺卿上丗祖武成皇帝頌齊主以爲未能盡善令和士開以頌示卒德林宣旨云臺卿此文未當朕意以卿有大才湏叙盛德即冝速作急進本也德林乃上頌十六章并序武成覽頌善之賜名焉一疋鄭玄别傳曰民有嘉􅀲者異本同實縣欲表附文辭鄙略君爲改作又著頌二篇侯相髙其才王充論衡曰古之帝王建鴻德者湏鴻筆之臣褒頌紀德也又曰永平中神雀羣集孝明詔上神雀頌百官上頌文比瓦石唯班固賈逵傅毅楊終侯諷五頌文比金玉崔駰西廵頌表曰臣聞陽氣發而鶬庚鳴秋風厲而蟋蟀吟氣之動也唐虞之丗樵夫牧監擊轅中韶感於和也臣不知手足之動音聲敢獻頌云零陵先賢傳曰周不疑字文直曹公時有白雀瑞儒林並已作頌不疑見操授􅁓筆立令復作操竒之
