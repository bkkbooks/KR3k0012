body:
  text: 人事部二十五㓜智上說文曰㓜小也釋名曰兒始能行曰孺子懦弱也十五曰童故禮有陽童牛羊之無角者曰童山無草木亦曰童言末巾冠似之左傳僖下曰楚子將圍宋使子文治兵於聧終朝而畢不戮一人子玉復治兵於蔿終日而畢鞭七人貫三人耳國老皆賀子文飲之酒蔿賈尚㓜後至不賀子文問之對曰不知所賀子之傳政於子玉曰以靖國也靖諸内而敗諸外所􅀗幾何子玉之敗子之舉也舉以敗國將何賀焉且子玉剛而無禮不可以治民過三百乗其不能以入矣苟入而賀何後之有又曰􅁗師過周北門左右免胄而下超乗玉孫滿尚㓜觀之曰􅁗師輕而無禮必敗輕則寡謀無禮則脫脫易也入險而脫又不能謀能無敗乎又成公下曰晉變書中行偃使程滑殺厲公使荀罌士魴逆周子于京師而立之悼公周公生十四年矣大夫逆于清原周子曰􅀌始願不及此雖及此豈非天乎抑人之求君使出令也立而不從將安用君二三子用我今日否亦今日恭而從之神之所福也傳言少而有才所以能自固對曰羣臣之願也敢不唯命是聽戰國䇿曰文侯疾故使張唐相燕弗肯行少庶子甘羅請行之文侯叱甘羅羅曰夫項橐七􅀊爲孔子師今臣年十二君其試焉奚遽言叱乃見張卿說而行之又曰王孫賈年十五事閔王其母曰汝朝出而晚還則吾􅀝門而望汝暮出不還則吾􅀝廬而望汝汝事王王出走不知其處汝尚歸王孫賈乃入市中曰淖齒亂齊殺王欲與我誅者􅃝右市人從者四百人與之誅淖齒史記曰項羽擊陳留外黄不下數日巳降項王令男子年十五以上詣城東欲抗之外黄令舎人兒年十三徃􅀃項王曰彭越強刼外黄外黄恐故且降待大王大王至又皆坑之百姓豈有所歸心從此以東梁地十餘城皆恐莫肯下矣項王然其言乃赦外黄當坑者漢書曰賈􅁩洛陽人年十八以能誦詩書稱於郡中河南守吴公聞其秀才召置門下甚愛之乃言賈􅁩年少頗通諸家之書文帝召以爲􅀶士又曰翟方進汝南上蔡人年十三失父給事太守府爲小吏號遟鈍不及事數爲􅁺史所辱方進自傷乃詣京師受經學後漢書曰任延字長孫南陽宛人也年十二爲諸生學於長安明詩昜春秋顯名太學學中號爲任聖童續漢書曰黄琬字子琰江夏人少失父母而辨惠祖父瓊􅀄爲魏郡太守建和元年正月日蝕京師不見梁太后詔問所蝕多少琬年七歳在傍曰何不言日蝕之餘如月之􅀄瓊大驚即以其言應詔後􅀷竒愛之時司空盛元疾瓊遣琬􅀱問㑹江夏上蠻賊事到府元發書視畢微戯琬曰江夏大􅀖而蠻多士少琬舉手對曰蠻夷猾夏責在司空又曰應奉字丗叔聦明自爲童兒及長凢所經歴莫不暗記讀書五行並下又曰樂恢字伯竒京兆長陵人父爲縣吏得罪令􅀵將殺之恢時年十一常于府寺門晝夜號泣令聞之即解出父又曰陳蕃字仲舉汝南平輿人年十五常閑處一室而庭宇蕪􅁾父友同郡薛勤來􅀱之謂蕃曰孺子何不洒掃以待賔客蕃曰丈夫處丗當除天下安事一室乎勤知其有清丗志東觀漢記曰馬援字客卿㓜而􅄮嶷年六歳能應接諸公專對賔客嘗有死罪亡命者來過客卿逃匿不令人知外􅀂訥而沉敏兄甚竒之以爲將相器故以客卿字焉又曰班固字孟堅年九􅀊能屬文誦詩賦及長遂􅀶貫載籍九流百家之言無不窮究學無常師不爲章句大義而巳性寛和容衆不以才能髙人諸儒以此慕之又曰丁鴻年十三從桓榮受歐陽尚書三年而明章句善論難爲都講遂篤志精銳布衣荷檐不逺千里又曰張堪字君遊年六􅀊受業長安治梁丘易才羙而髙京師號曰聖童又曰鄧禹字仲華南陽新野人年十三能誦詩受業長安時上亦遊學京師禹年雖㓜而見上知非常人遂相親附及漢兵起即䇿杖北渡追及上於鄴又曰承宫琅瑘姑􅂫人少􅀌年八􅀊爲人牧猪郷里徐子盛明春秋經授諸生數百人宫過其廬下見諸生講誦好因弃其猪而聽經猪主恠其不還來索見宫欲笞之門下生共禁止因留精舎門下樵薪又曰魯恭父建武􅀄爲甘陵太守卒官時年十二弟平年七􅀊晝夜號踊不絶聲郡中􅉠贈無所受歸服喪禮過成人又曰吴祐字季英陳留長垣人父恢爲南海太守祐年十二恢欲殺青簡以冩經書祐諌曰今大人踰越五嶺逺在海濵其俗舊多珎恠此書􅀂成則載之兼兩昔馬援以薏苡興謗其陽以衣囊邀名嫌疑之間誠先賢所愼也恢乃止撫其首曰呉氏丗不乏季子矣又曰和熹鄧后年五􅀊太夫人爲斷髮夫人年􅂄目􅄀并中后額雖痛忍而不言左右恠問之后言曰難傷老人意故忍之又曰黄香字文強江夏安陸人年九􅀊失母思慕憔悴殆不免喪郷人稱其至孝年十二􅀶覽傳記京師號曰日下無􅀟江夏黄香英雄記曰曹純字子和年十四喪父業富於財僮使人僕以百數純綱紀督御之不失其理好樂學問敬愛學士學士多歸焉由是爲逺近所稱年十六爲黄門郎漢雜事曰陳寔字仲弓漢末太史家瞻星有德星見當有英才賢德同遊者書下諸郡縣問頴川郡上事其日有陳太丘父子四人俱共㑹社小兒季方御大兒元方從拘孫子長文此是也魏氏春秋曰􅀽氏之敗也孔融與太祖書曰武王伐紂以妲巳賜周公太祖後見問之對曰以今度之想其當尓融􅀍収二子年八􅀊時方弈棊端坐不起左右曰而父見執不起何也二子曰安有巢毀而􅆑不破者乎魏志曰鍾㑹字士季頴川長社人太􅀓繇小子也少敏惠夙成中護軍蔣濟著論曰觀其眸子足以知人㑹年五􅀊繇遣見濟濟甚異之曰非常人又曰賈逵字梁道河東襄陵人自爲童戯弄常設部伍祖父習異之曰汝大必爲將帥口授兵法數萬言又曰楊俊同郡王象少􅀌時爲人僕隸年十七八見使牧羊而私讀書固獲捶楚俊羙其才質即贖象着家娉娶立屋然後與別又曰劉廙字恭嗣南陽安衆人年七􅀊戯講堂上頴川司馬德操撫其頭曰孺子孺子黄中通理寧自知不又曰司馬㓪字伯逹河内温縣人年九􅀊人有稱其父字者㓪曰慢人者不敬其親客謝之十二試爲童子郎又曰王粲爲中郎蔡邕見而竒之時邕顯著貴重朝廷常車􅀐填巷賔客盈坐聞粲在門倒屣迎之及至年旣㓜弱容狀短小一㘴盡驚邕曰此王公孫也有異才吾不如也吾家書籍文章盡當與之又曰陳羣字長文頴川許昌人祖父寔父紀叔父諶皆有盛名羣爲児時寔常竒之謂宗人父老曰此児必興吾宗又曰常林字伯槐河内温人年七􅀊父黨造門問林曰伯先在不汝何不拜林曰對子字父何拜之有於是咸共嘉之又曰曹休字文烈太祖族子年十餘歳見太祖太祖謂左右曰此吾家千里駒也使與文帝同止見待如子常從征討使領虎豹􅀐又曰夏侯惇字元讓沛國譙人年四歳求師就學人有辱其師者惇殺之由是以烈氣聞呉書曰虞翻少好學有才氣年十二客有􅀱其兄者不過翻翻追與書曰僕聞琥珀不授腐草礠石不授曲針過而不存不亦宣乎客得書異之又曰沈友字子正呉郡人年十一華歆行風俗見而異之因呼沈郎可登車語乎友逡廵却曰先生衘命將以禆􅀘先王之教齊風俗也而輕脫威儀猶負薪救火無乃更崇其熾乎歆慙曰自桓靈來未有幼童􅀂此者又曰陸績年六􅀊於九江見􅀽術術出橘與績績懷三枚去拜辤墮地術曰陸郎作賔客而懷橘乎績跪荅曰欲歸遺母術大竒之蜀志曰諸葛亮子瞻字思逺亮與兄瑾書曰瞻今巳八􅀊聦惠可愛嫌其早成不爲重器耳􅀳書曰王戎㓜而潁悟神彩秀徹視日不眩裴楷見而目之曰戎眼爛爛如巖下電年六七􅀊於宣武􅂣觀戯猛獸在檻中虓闞震地衆皆奔走戎獨立不動神色自􅀂魏明帝於閤上見而竒之又曰王澄字平子生而警悟雖未能言見人舉動便識其意衍妻郭性貪鄙欲令婢路上擔糞澄年十四諌郭以爲不可又曰中宗太子紹㓜而聦哲年數􅀊嘗置中宗膝上㑹長安使來中宗因問曰汝謂日與長安孰逺對曰日逺中宗問其故荅曰不聞人從日邊來然可知耳中宗異之明日㑹羣臣又問之對曰日近中宗失色曰何異昨日之言對曰舉目見日不見長安由是益竒之又曰王舒字允之揔角時嘗從從伯敦敦與錢鳯謀逆而允之時飲酒帳中卧悉聞其言慮敦疑之便於卧處吐涕狼藉敦果疑遣看之見吐唾以爲醉又曰謝尚字仁祖豫章太守鯤之子幼有至性八􅀊風神夙悟鯤嘗携之送客或曰此児一􅚋之顔回也尚應聲曰􅚋無尼父焉識顔回賔客莫不歎異年十􅀊遭父憂丹陽尹温嶠吊之尚號􅂘極哀旣而収涕吿訴舉止有異常童嶠甚竒之又曰韓康伯早􅀌家貧年數􅀊母爲作􅃭子令康伯捉熨母謂曰且着尋爲汝作袴伯曰巳足不復煩母問其故荅曰如火在熨斗中而柄亦熱今旣着􅃭皆當暖也母異之王隱晉書曰王儉字元衡内史下邳陳邵擅名徐州邵聞儉年十四善属文請作祝文邵謂郡客曰此生爲文有可􅀚採命爲督郵主簿邵迁給事儉毎爲定表晉中興書曰謝安字安石年四􅀊桓彛見而歎曰此児風神秀徹後當不减王東海揔角神識深敏氣宇條暢丞相王導知之由是著名又曰范宣陳留人年十􅀊能誦詩書甞以刀傷手捧手改容人問痛耶荅曰受全之體而致毁傷不可處耳少好學手不釋卷􅀶覧衆書善三禮又曰戴逵字安道譙國人少􅀶學好談論善屬文能鼓琴工書􅀞其餘巧藝靡不畢綜揔角時以雞􅆑汁溲白瓦屑作鄭玄碑又爲文手自刻字文旣綺藻器亦妙絶時人莫不驚歎知其深敏宋書曰劉秀之字道寳少􅀌貧有志操十許􅀊時與諸兒戯於前渚忽有大虵來勢甚猛無不顛怖驚呼秀之猶不動衆並異焉又曰王僧逹㓜聦敏弘爲州縣僧逹六七􅀊遇有通訟者竊覧其辤謂爲有理及入訟者亦進弘意其小留左右僧逹爲申理闇誦不失一句又曰徐湛之㓜與弟淳之共車行牛奔車左右人馳來赴之湛之先令取弟衆咸歎其㓜而有識又曰蔡興宗字興宗㓜爲父廊所重謂有巳風與親故書曰小児四􅀊神氣似可不入非􅀋室不與小人遊故以興宗爲之名興宗爲之字齊書曰王慈字伯寳琅耶臨沂人司空僧䖍子也八􅀊外祖宋江夏王義恭施寳物恣聽所取慈唯取素琴石硯義恭善之又曰􅀓昭六􅀊而􅀌哀毁如成人爲外祖所養十歳於朱雀航賣暦曰雍州刺史􅀽顔見而竒之顗甞來昭所昭讀書自􅀂神色不改顗歎曰此兒神情不凢必成佳器又曰頋恊從祖右光禄大夫張永甞携内外孫姪逰武丘山恊年數􅀊永撫之曰兒欲何戯恊曰兒正欲枕石漱流永歎息曰頋氏興於此子及長好學以精力稱又曰頋歡年六七􅀊父使驅田中雀遂作黄雀賦而歸雀食稻過半父怒將撻之見賦乃止梁史曰沈璞字道真童孺神意閑審武帝召見竒璞應對曰謂林子曰此非常兒也􅀄除南平王左常侍陳書曰王元䂓八􅀊而􅀌兄弟三人隨母依舅氏徃臨海郡時年十二郡土豪劉瑱者資財巨萬欲妻以女母以其兄弟㓜弱欲結強援元䂓泣謂曰姻不失親古人所重豈得苟安異壤輙婚非類母感其言而止崔鴻十六國春秋前凉録曰辛攀字懷逺年七􅀊隨父爽在京師北地程曉爽之親友目攀而􅀏曰犁牛騂犢孺子之謂攀曰戯及人親非雅訓也暁及衆賔大竒異之又後趙録曰徐光字季武頓丘人父聦以牛醫爲業光㓜好學有文才年十三嘉平中王陽攻頓丘掠之令主抹馬光但書柱爲詩賦而不親馬事陽怒撻之啼呼終夜不止左右以白陽陽召光付紙筆光立爲頌陽竒之又夏録曰吐谷渾拾寅者䖍國之弟也年數􅀊猶大啼􅀏母氏念憂其不惠父樹洛于曰此兒吾家驪肩馴駒伯樂尚不能目之而况庸人哉終成吾門户者必在此子年六七􅀊而器識不恒或謂之神童後魏書曰裴駿字神駒河東聞喜人㓜而聦惠親表異之稱爲神駒因以爲字駿從弟子安祖少而聦惠年八九􅀊就師講誦詩至鹿鳴篇語兄云鹿雖禽獸得食相呼而况人也自此之後未甞獨食又曰任城王澄之子順字子和年九􅀊師事樂安陳豐􅀄書王羲之小學篇數千言晝夜誦旬有五日一皆通利豐竒之白澄曰豐十五從師迄于白首耳目所經未見此江夏黄童不得無􅀟也澄􅀏曰藍田生玉何容不尓三國典略曰趙隱字彦深年五歳母􅀓便孀居傳謂之曰家貧兒小何以能濟隱泣而言曰􅀂天矜児大當仰報年十􅀊司徒崔光竒之謂賔客曰古人云觀眸子足以知之此兒必當逺至太平御覽卷第三百八十四
