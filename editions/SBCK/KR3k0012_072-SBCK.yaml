front:
  text: 太平御覽卷第七十二地部三十七
  hash: sha256:252b455165c6f25c7ead0790f0e75f3af67c5a859c87042f3799376c1c0c0ca0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_072-1a}
body:
  text: 藪澤陂藪􅀃文曰藪大澤也周禮曰楊州之澤藪曰具區荆州之澤藪曰雲夢䂊州之澤藪曰甫田青州之澤藪曰孟諸兖州之澤藪曰大野雍州之澤藪曰􅁌蒲幽州之澤藪曰醫無閭兾州之澤藪曰昭余祁虞候祈望皆官名也國語曰榖洛􅃲將毀王宫王欲壅之太子晉諌曰古之長民者不隳山不崇藪不防川不竇澤夫山土之聚也藪物之歸也又曰其後伯禹念前之非度度法􅁵改制景象物土地以􅀋百則儀之于羣生共之從孫四岳左焉髙髙下下䟽川導滯鐘水豐殖九藪泪越九原宅居九隩隩内九州之内皆可宅居也合通四海故天無伏隂地無散陽水無沉氣火無災燀神無間行民無􅁋心時無逆數物無害生師象禹之功度之于軌儀莫不嘉績克猒帝心皇天嘉之祚以天下爾雅曰魯有大野今髙平鉅野縣東北大澤晉有大陸今鉅鹿北廣河澤秦有楊紆音謳今在扶風洴縣西也宋有孟諸今在梁國睢陽縣東北也楚有雲夢今南郡華容縣東南巴丘丘川也吴越之間有具區今吴縣南大湖即震澤也鄭有甫由今滎陽中牟縣西阜田澤周有焦穫音牙今扶風池縣陽瓠中是也謂之十藪漢書曰司馬相如論巴蜀父老文云鷦鵬巳翔於寥廓之宇而羅者猶視於藪澤風俗通曰藪厚也草木魚鱉所以厚養人君與百姓也吕氏春秋曰昭餘祁一名大昭又名漚澤周禮并州藪俗名鄢城泊是桉藪自太原祁縣連延西接至此􅀜中記曰􅁌蒲藪案周禮職方氏雍州其藪曰􅁌蒲晉大康地志云汧澤有蒲谷郷􅁌中谷乃雍州之􅁌蒲也按漢書地理志取蒲藪即􅁌蒲藪是焉水經注曰汧水源出汧山蒲谷郷雍中谷决爲􅃶蒲藪澤釋名曰下水曰澤言潤澤也又曰水浹出而爲澤曰掌水所停處如手中也今兖州人謂澤曰掌􅀃文曰􅉾澤在崑崙墟下荷澤在山陽胡陸南易曰麗澤兊君子以朋友講習又曰澤中有雷隨君子以嚮晦入宴息又曰上天下澤履君子以辯上下定民志又曰澤上有地臨君子以教思無窮容保民無疆又曰山上有澤咸君子以虚受人又曰上火下澤聧君子以同而異又曰澤上有雷歸妹君子以永終知敝又曰山下有澤損君子以懲忿窒慾又曰澤上於地萃君子以除戎器戒不虞又曰澤上有水節君子以制數度議德行又曰澤中有火革君子以治曆明時又曰澤上有風中孚君子以議獄緩死又曰澤滅木大過君子以獨立不懼遁丗無悶又曰澤無水困君子以致命遂志又曰象曰澤上於天夬君子以施禄及下居德則忌河圖曰大迹出雷澤華胥履之生伏犧雷澤澤也書曰雷夏旣澤灉沮㑹同孔安國注曰雷夏澤名書大傳曰舜漁於雷澤鄭􅀇注曰雷澤今属濟隂詩曰彼澤之陂有蒲與荷周禮曰川澤其動物冝鱗物其植物冝膏物其民黒而津又曰澤虞掌國澤之政令爲之厲禁使其地之人守其財物以時入之于王府頒其餘于萬民禮曰􅆩􅀕魚然後虞人入澤梁禮記稽命徴曰王者德禮之制者澤谷中有朱鳥白玉赤虵赤龍出焉傳曰宣十五年晉侯救宋伯宗曰不可古人有言雖鞭之長不及馬腹天方受楚未可與争雖晉之強能違天乎諺曰髙下在心度時制置川澤納汚受汙濁也山藪藏疾又曰衛侯出奔齊孫氏追之敗公徒于柯澤齊北東河縣西南有大澤是也又曰叔向母曰深山大澤實生龍蛇廣雅曰方澤􅀕地也太公金匱曰夏桀之時有芩山之水桀常以十月發民鑿山穿陵通於河民諌曰孟冬鑿山穿陵是泄天氣發藏天子失道後必有敗桀殺之朞年芩山一旦崩爲天澤戰國䇿曰淳于髠一日見七人於齊宣王王曰千里而一士是比肩而立百丗而一聖􅀂隨踵而生淳于髠曰今求桔梗於沮澤則累丗不得一矣桔梗山中之草史記曰陳餘與張耳相失餘解印綬付耳亡入澤中捕魚又曰封禪書云上郊雍通回中道春至鳴澤漢書曰髙祖以亭長送徒驪山徒道亡到豐西澤中停飲夜皆解縱曰公等皆去吾亦從此逝矣又曰􅁗皇帝常曰東南有天子氣於是東游以厭當之髙祖即自疑亡匿隱巖石之間吕后與人俱求常得之髙祖恠而問之吕后曰季所居上常有雲氣故從往常得季髙祖心喜沛中子弟或聞之多欲附者西域傳曰康居國西北二千里有奄蔡國控􅁌十萬臨大澤而居又曰河有兩源合東注塩澤一名昌蒲海去玉門􅀜三百里廣輪四百里水冬夏不減皆以爲潜行地下續漢書吴祐甞牧豕於長垣澤中晉中興書曰劉牢之至五橋澤中敗續兵士殆盡牢之馬超五丈澗得免晉書曰陶侃少時漁於雷澤甞網得一織梭以掛于壁有頃雷􅀨至遂爲龍而去穆天子傳曰天子北征舎于珠澤山海經曰稷澤后稷神所慿因以爲名也帝王丗紀曰雀山之地一夕爲大澤而深九尺戴延之西征記曰巨澤魯之西界孔子􅀗麟處管子曰北澤焼火照臺下管子曰萬乗之國不可無薪而炊今北澤燒農夫得賣其薪蕘一束十信又曰涸澤數百歳水不絶者生其狀􅀂人長四寸黄衣黄冠戴黄蓋乗水鳥好疾馳以其名呼之可使千里外一日反報此涸澤之精也文子曰髙莫髙於天下莫下於澤天髙澤下聖人法之韓宣子曰魯焼積澤天北風火南􅀝恐焼國哀公懼自持衆趨救之新序曰晉公逐獸于碭入大澤迷不知所出問漁者送出澤因以諌之公令記其名漁者曰公亟反國臣亦反漁所又曰楚威王問於宋玉曰先生其有遺行也何士民衆庻不譽之甚宋玉對曰鯨魚朝發崑崙之墟暮􅀫於孟諸夫尺澤之鯢豈能與之量江海之大哉俗之民又安知臣之所爲哉風俗通曰水草交曰澤言潤萬物以阜民用水經注曰路温舒鉅鹿縣之東里人里􅁥門使温舒牧羊澤中取蒱牒用冩書即北澤也又曰􅉾澤河水之所潜也其源渾渾泡泡者也東去玉門陽􅀜一千三百里廣輪四百里其水澄停冬夏不减其中洄湍雷輪轉爲隱輪之脉當其圜流之上飛禽舊翮於霄中者無不墜於淵波即河水之所潜而出於積石也又曰徐州豐西澤即髙祖斬白虵之所又曰中牟縣圃田澤北與陽武分水澤多麻黄草故述征記曰踐縣境便覩斯卉斯卉窮則知踰界今雖不能然諒亦非􅍝詩所謂東有茂草也皇武子曰鄭之有原圃猶􅁗之有具圃澤在中牟縣西限長城東極官度北佩渠水東西四十許里南北二十許里中有沙岡上下二十四浦津流逕通淵潭相接各有名焉有大斬小斬有大􅁅小􅁅義魯練秋大白楊小白楊散嚇禺中羊圈大鵠小鵠龍澤鬯罷大哀小哀大長小長大縮小縮伯丘大蓋牛眼等浦水盛則北注渠溢則南潘故竹書紀年云梁惠成王十五年入河水于甫田又爲大溝而引甫水者也圖經曰晉有大陸吕氏春秋云晉之大陸猶趙之鉅鹿也按隋圖經云大陸大鹿大河即一澤而異名也漢書云路温舒取蒲於此也澤亦尚書云納于大麓是此也河南圖經曰廣成澤在梁縣西四十里後漢書云安帝永􅀄元年以廣成遊獵地假與貧人于時馬融作廣成頌云大漢之􅀄基也揆厥靈囿營于南郊右矕莫板切三途左枕嵩岳面據衡陽箕背王屋浸以波溬演以榮洛金山石牀殷起乎中神泉側出丹水星湟池恠石浮磬混乎其陂是此澤也隋大業中置馬牧焉亦名廣陂其漑灌之利至今百生頼之輿地志曰稡澤在王城西北三十里與金谷相近又郡國志云稡澤即金谷也有金水出焉故謂之金谷晉石季倫別墅在焉陂􅀃文曰陂池也書曰九川滌原九澤旣陂詩曰彼澤之陂有蒲有荷陂澤也史記曰髙祖母云劉媪甞息大澤之陂夢與神遇時雷電晦􅁳見蛟龍於其上巳而有娠遂産髙祖又曰寗成抵罪得脫乃詐馳傳出􅀜歸家稱曰仕不至二千石賈不至千萬安可比人乎乃貰貸買陂田千餘頃假貧民􅃥數千家焉漢書曰汝南舊有鴻郄大陂郡以爲饒成帝時􅀜東數水陂溢爲害翟方進爲丞相以爲决去陂水其地肥美省隄防之費遂奏罷之及翟氏敗後郷里歸惡於方進言方進請陂下良田不得而奏罷陂頋野王云王莾時甞苦旱起追怨方進童謡云壞陂誰翟子威飰我豆食美芋魁反乎覆陂當復誰言者兩黄鵠建武中太守鄧晨使許陽典復鴻郄以陽爲都水􅁺陽曰昔成帝夢上天天帝怒曰何故壞我濯龍池於是乃因髙下形勝起塘四百餘里數年乃立續漢書郭林宗交汝南黃叔度過􅀽奉髙不􅀫而去㤗曰叔度之量汪汪􅀂萬頃之陂澄之不清撓之不濁不可量也謝承後漢書曰汝南許陽暁以術承地脉太守鄧晨署爲平水􅁺使治鴻郄陂陂成人譛陽言取錢晨繫陽於獄户自開械自解晨釋之出時日暮陂上有火光引前清德之感也魏略曰明帝出次摩陂有龍見於井中帝出觀龍因改摩陂爲龍陂異苑曰東郷太湖吴庚申歳於此有一軍士五百人將破堰取魚先以酒肉祈神約令水涸夜夢人云塘水速竭􅀂見巨鱗慎勿殺也又有銅釜並不可發明徃决水翕然而盡得白魚形狀非常小人貪利剖而治之見昨所􅀕餘食充溢膓内須􅁷復得釡又取發水便􅁀出五百人一時􅃿溺唯督􅁥得存具􅀃事狀于今猶名此湖爲五百陂汝南先賢傳曰鄭敬去吏隱居于蟻陂之陽以魚釣自娱彈琴詠詩常方坐於陂側隨杞柳之䕃鋪茅蘼爲席淮南子曰譬􅀂同陂而漑田其受水均也孫綽子曰海人曰横海有魚一吸萬頃之陂抱朴子曰葛仙公毎酒醉常入家門前陂水中卧竟日乃岀方輿記曰新蔡縣葛陂費長房化竹之所後漢於此立葛陂縣河南圖經曰洛水自苑内上陽宫南㳽浸東注當宇文隑版築之時因築斜堤今東北流水衡作堰九所形如偃月謂之月陂壽春圖經曰芍陂在安豊縣淮南子曰楚相作期思之陂灌雩婁之野又輿地志崔寔月今云孫叔敖作期思陂即此是也故漢王景爲廬江太守重修起之境内豊給又桉芍陂上承渒水南自霍山縣北界騶虞石入號曰濠水是北流注陂中凡經百里灌四萬頃芍魏志音鵲太平御覽卷第七十二
