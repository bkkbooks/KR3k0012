front:
  text: 太平御覽卷第二百七十一
  hash: sha256:481d04c0bac1ca33666ec593a05ec91dc9e5c6b1db14b94dd02927a104882929
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_271-1a}
body:
  text: 兵部二叙兵下六韜曰大人之兵如虎如狼如􅀨如風如雷如電天下盡驚然後乃成又曰武王問太公曰欲引兵深入諸侯之地三軍卒有緩急或利或害吾欲以近通逺從中應外急三軍之用謂之何如公曰主將有隂符有大勝得敵之符長一尺有破軍擒敵之符長九寸有降城得邑之符長八寸有却敵執逺之符長七寸有反兵驚中堅守之符長六寸有請糧食益兵卒之符長五寸有敗軍亡將之符長四寸有卒利亡失之符長三寸諸奉使行符稽留􅀂符事聞符所告者皆誅符者主將所以隂通信語不得漏泄中外之道也王曰善黄石公記曰將所有爲威者號令也戰所以全勝者軍正也士所以輕戰者用兵也故戰如風發勇如河决衆可望而不可當可下而不可勝也黄石公三略曰聖王之制兵也非好樂之也將以誅􅁀也􅁀謂亂國賊民夫以義誅不義决江河漑螢火其尅必也啇君書曰夫民情好爵禄而畏刑罰人君設此二者以御民夫民力盡而名隨之功立而賞隨之君能使其民信此明於日月則兵無敵也吕氏春秋曰古之聖王有義兵譬之􅀂用良藥治人毒藥殺人義兵爲天下之良藥也又曰古聖王有義兵而無有偃兵兵所自來者尚矣古始有民凡兵也者威也威也者力也民之有威力性也性者所受於天也非人之所能爲也武有黄炎固用水火矣黄帝炎帝共德不得已也又曰人情欲生而惡死欲榮而惡辱死生榮辱之道一則三軍之士可使一心矣凢軍欲其衆也心欲其一也三軍一心則令可使無敵矣故曰其令彊者其敵弱其令信者其敵詘先勝於此則必勝之於彼矣又曰古之至兵士民未合而威已諭矣敵已服矣豈必用旌鼓干戈哉故善諭威者於其未發也於其未通也窅窅乎莫知其情此之謂至威之誠也又曰凢兵欲急疾捷先欲急疾捷先之道在於知緩徐遟後緩徐遟後急疾捷先之分也急疾捷先所以决義兵之勝也又曰雖有江河之險則凌之雖有大山之塞則蹈之并氣搏精心無有慮猶預之慮目無有視耳無有聞壹諸武而已矣又曰萬乗之國外之不可以距敵内之不得以守固其民非不可以用也不得所以用之術也不得所以用之術國雖大勢雖便卒雖衆何益也淮南子曰古之用兵者非利壤土之廣而貪金玉之賂將以存亡繼絶平天下之亂而除萬民之害也又曰凢有血氣之虫含牙戴角前爪後距有角者觸有齒者螫有蹄者趹喜而相戯怒而相害天之性也人有衣食之情而物弗能足也群居雜處分不均求不贍則争争則彊脅弱而勇侵怯人無筋骨之彊爪牙之利故割革而爲甲爍鐵而爲刃貪昧饕餮之人殘賊天下萬民騷動莫寧其所有聖人勃然而起乃討彊􅁀平亂世夷險除穢以濁爲清以危爲寧也又曰兵之所由來逺黄帝甞與炎帝戰矣炎帝神農氏之末世也與黄帝戰於阪泉帝滅之顓頊甞興共工争矣共工與顓頊争爲帝觸不周山之折也故黄帝戰於涿鹿之野黄帝與􅃖尤戰於􅃰鹿涿鹿在上谷堯戰於丹水之浦堯以楚伯受命滅不義於丹浦丹浦在南陽舜伐有苗有苗三苗啓攻有扈禹之子伐有扈於甘在右扶風鄠縣也自五帝而不能偃也况衰世乎又曰夫兵者所以禁􅁀討亂也炎帝爲火災故黄帝禽之共工爲水害故顓頊誅之教之以道導之以德而不聽則臨之以威武臨之以威武而不從則制之以兵革故聖人之兵也􅀂櫛髮耨苗所去者少而所利者多也又曰殺無罪之民而養不義之君害莫大焉殫天下之財而贍一人之欲禍莫深焉所爲立君者以禁􅁀討亂也今集萬民之力而反爲殘賊是爲虎􅀓翼􅂚爲不除也又曰霸王之兵以論慮之以䇿圖之以義扶之非以亡存也將以存亡也又曰聞敵國之君有加虐於其民者則舉兵而臨其境責之以不義刺之以過行兵至其郊乃令軍帥曰無伐樹木無掘墳墓無􅉯五􅂖􅉯燒也無焚積聚無捕虜民無收六畜無聚所征國民以爲採取無收其六畜以自饒利乃發號施令曰某國之君傲天侮􅀑決獄不辜殺戮無罪此天之所誅也民之所仇也兵之來也以廢不義而復有德也有逆天之道率民爲賊者身死族滅以家聽者禄以家以里聽者賞以里以郷聽者封以郷以縣聽者侯以縣尅國不及其民廢其君而易其政尊其秀士而顯其賢良賑其􅀌寡恤其貧窮出其囹圄賞其有功百姓開門而待之浙米而儲之浙清唯恐其不來也此湯武之所以致王也而齊桓晉文之所以成霸也又曰君爲無道民之思兵也􅀂旱而望􅀨也渇而求飲夫何誰與交兵接刃乎故義兵之至也至於不戰而心服也形可謂之極矣又曰大兵無創與􅀑神通五兵不厲天下莫敢之當建鼓不出庫諸侯莫不慴㥄沮膽故廟戰者帝神化者王所謂廟戰者法天道也神化者法四時也脩政於境内而逺方慕其德制勝於未戰而諸侯服其威也又曰民誠從令雖少無畏民不從令雖衆爲寡故下不親上下心不用卒不畏將其形不戰守有必固而攻有必勝不待交兵接刃而存亡機固巳形矣又曰兵有三勢有二鈐有氣勢有地勢有因勢將充勇而輕敵卒果敢而樂戰三軍之衆百萬之師志厲青雲氣如飄風聲如雷電誠積踰而威加敵人此謂氣勢狹路􅀜津大山名塞龍虵蟠蟠􅁈屈也却苙居却偃覆也苙登也羊膓道羊膓一屈一伸魚茍門竹笱所以捕魚其門可入而不得出也一人守險而千人不敢過此謂地勢因其勞倦怠亂飢渇凍暍推其揺揺擠其掲掲此謂因勢間諜間諜軍之反間也審錯䂓慮設蔚施伏草木盛曰蔚隱遁其形出於不意使敵人之兵無所適備此謂知鈐陣卒正前行選進退俱什伍搏前後不相蹍蹍蹀蹈也左右不相干受刃者少傷敵者衆此謂事鈐鈐勢必形吏卒愽精選良用才官得其人計定謀决明於死生舉錯得時莫不振驚故攻不待衝隆雲梯而城拔雲梯可依雲而立所以瞰敵之城中也戰不至交兵接刃而敵破明於必勝之數也又曰夫飛鳥之􅋧也俛其首猛獸之玃也匿其爪虎豹不外其牙噬犬不見其齒故用兵之道示之以柔而迎之以剛迎逆敵家示之以弱而乗之以彊爲之欲歙應之以張歙弱張彊也歙讀如脅將欲西如示之以東也又曰神莫貴於天勢莫便於地動莫急於時用莫利於人和此四者兵之幹植也然待道而後行可一用也又曰古之兵弓劒而已矣糟柔無繫脩㦸無刺糟柔木也無繫無鐵刃也刺鋒也糟讀如曹晚世之兵隆衝以攻渠憺以守隆髙也衝所以臨敵城衝突壞之渠壍也一曰渠甲名憺㦥所以御也連弩以射銷車以􅃲車弓弩通一􅁌以牛挽之以刃着左右爲機開發又曰古之伐國不殺黄口不獲二毛黄口㓜少也二毛有白髪於古爲義於今爲􅀏古之所以爲治者今之所以爲亂也又曰夫神農伏羲不施賞罰而民不爲非然而位政者不能廢法而治民不能及神農伏羲也舜執干戚而服有苗然而征伐者不能擇甲兵而制彊􅁀不能及舜也由此觀之法度者所以論民俗而節緩急也桓範世要論曰太古之􅀄民始有知則分争分争羣羣則智者爲之君長君長立則興兵所從來乆矣雖聖帝明王弗能廢也但用之以道耳故黄帝戰於阪泉堯伐驩兠舜征有苗夏禹殷湯周之文武皆用師克伐以取天下焉又曰聖人之用兵也將以利物不以害物也將以救亡非以危存也故不得已而用之也以爲戰者危事兵者凶器不欲令好用之故制法遺後命將出師雖勝敵而反猶以喪禮處之明弗樂也故曰好戰者亡忘戰者危不好不忘天下之王也又曰夫兵之要在於修政修政之要在於得民心得民心在於利之也要仁以受之義以理之故六馬不和造父不能以致逺民臣不附湯武不能以立功故兵之要在得衆得衆者善政之謂也善政者恤民之患除民之害故政善於内則兵彊於外也杜恕論曰天生五材民並用之廢一不可誰能去兵故兵之來也乆矣所以威不􅁤而昭文德所以討彊􅁀而除殘賊也聖人以興亂人以廢廢興存亡皆兵之由也昔五帝不能偃況衰世乎又曰濫殺無辜之民以養不義之君非兵之體也殫天下之財以贍一人之求非兵之體也怙其兵甲之器矜其變詐之謀欲以立威成名非兵之體也虜其君􅀠其臣遷其社易其民非兵之體也故夫霸王之用兵也始之以義終之以仁將以存亡非以亡存也將以禁􅁀非以爲􅁀也又曰兵之來也以除不義而授德克其國不傷其民廢其君而不易其政尊其俊秀顯其賢良賑其􅀌寡恤其窮困百姓聞之欣然簞食壷漿以迎其君奚之遲也以湯武之師用兵上也誰與交鋒而接刃哉又曰所謂善用兵者先弱敵而後戰者也􅀂乃征之以義以責其過振之以武以威其􅁋懷之以德以誓其民置之以仁以救其危此四者用兵之體所謂因民之欲乗民之力也又曰治國家理境内施仁義布德惠明勸賞黜幽昧功臣附親士卒和輯上下一心君臣同德指麾而響應此上兵之體也地廣民衆主賢將能國冨賞罰信未至交兵而敵人亡遁此次兵之體也知地之形因險阨之利明竒正之變審進退之冝援枹而鼓之黄塵四起乃以决勝此用兵之下非兵之體也又曰夫德義足以懷天下之民事業足以當天下之急選舉足以得賢才之用則兵之所加􅀂勁風振槁此兵之體也鹽鐵論曰兵者凶器也甲堅兵利爲天下殃其母制子故能乆長聖人法之厭而不傷蔣子萬機論曰夫虎之爲獸水牛之爲畜殆似兵矣夫虎爪牙旣鋒膽力無伍至於即豕也卑俯而下之必有扼喉之獲夫水牛不便速角又喬踈然處郊之野朋逰屯行部隊相伍及其寢􅀫因陣反禦􅀂見兕虎抵角牛全兕害矣􅀂用兵恃彊必鑒於虎居弱必誡水牛可謂攻取屠城而守必能全者矣劉向新序曰上古之時其民敦朴故三皇教而不誅無師而威故善爲國者不師三皇之德也至於五帝有師旅之備而無用故善師者不陣五帝之謂也湯伐桀文王伐崇武王伐紂皆陣而不戰故善陣者不戰三王之謂也及夏后之伐有扈殷髙宗討􅀑方周宣王之征熏鬻而不血刃皆仁聖之惠時化之風也至齊桓侵蔡而蔡潰伐楚而楚服而彊楚以致苞茅之貢於周室北伐山戎使奉朝覲三存亡一繼絶九合諸侯一匡天下衣裳之㑹十有一嘗有大戰亦不血刃至晉文公設虎皮之威陳曵柴之僞以破楚師而安中國故曰善戰者不死晉文公之謂也楚昭王遭闔閭之禍國滅昭王出亡父老迎而􅀏之昭王曰寡人不仁不能守社稷父老反􅀏何無憂寡人且從此入海矣父老曰有君􅀂此其賢也及申包胥請救􅂘秦庭七日秦君憐而救之秦楚同心遂走吴師昭王反國故善死者不亡昭王之謂也是故自晉文公已下至戰國而􅁀兵始衆於是以彊并弱以大呑小故彊國務攻弱國備守合從連衡群相攻伐故戰則稱孫吴守則稱墨翟至秦而以兵并天下窮兵極武而亡及項羽尚􅁀而滅漢以寛仁而興故能掃除秦之苛􅁀矣孝武皇帝攘服四夷其後天下安然故丗之爲兵者其行事略可觀也又曰樂毅以弱燕破彊齊七十餘城者齊無法故也孫武以三萬破楚二十萬者楚無法故也韓信以寡衆破趙萬者趙無法故也近者曹操以八千破􅀽紹五萬者􅀽無法故也此五子能以少尅多者軍有法故也故用兵無法猶乗舟無檝登馬而不勒是以良將思計如飢存法如渇所以戰必勝攻必拔也陳琳書曰王者之師有征無戰衛公兵法曰垝阪髙陵谿谷險難則用歩卒平原廣衍草淺地堅則用車追奔逐北乗虚獵散反覆百里則用􅀐故歩爲腹心車爲羽翼􅀐爲耳目三者相待參合迺行太平御覽卷第二百七十一
