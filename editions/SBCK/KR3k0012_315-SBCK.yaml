front:
  text: 太平御覽卷第三百一十五兵部四十六
  hash: sha256:4e1f844d045f0f1afd7992f46ec7bf45019d17a5aa9b75d19a506b4b30286ee3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_315-1a}
body:
  text: 水戰掩襲上水戰國語吴語曰越王軍于江南明日將舟戰於江晉書慕容超載記曰水戰國之所短吴之所長又曰陳敏作亂陶􅋲時鎮江夏以朱伺能水戰曉作舟艦乃遣作大艦署爲右甄據江口摧破敏前鋒又曰何無忌傳曰盧循遣别將徐道覆順流而下舟艦皆重樓無忌將率衆拒之長史鄧潜之諌曰今以神武之師抗彼逆衆逥山壓􅆑未足爲譬然國家之計在此一舉聞其舟艦大盛􅀔居上流蜂蠆之毒邾魯成鑒冝決破南塘守二城以待之其必不敢捨我逺下蓄力俟其疲老然後擊之􅀂棄萬全之長䇿而決成敗於一戰如其失利悔無及矣無忌不從遂以舟師拒之旣及賊令強弩數百登西岸小山以邀射之而薄于山側俄而西風大起無忌所乗小艦􅀍飄于東岸賊乗風以大艦逼之衆遂奔敗無忌尚厲聲曰取我􅂫武節來節至乃躬執以督戰賊衆雲集登艦者數十人無忌辭色無撓遂握節死之梁書曰王琳帥兵東下陳遣太尉侯瑱司空侯安都等拒之瑱等以琳軍方盛引軍入蕪湖避之時西南風至急琳謂得天道將直取楊州侯瑱等徐出蕪湖躡其後比及兵交西南風飜爲瑱用琳兵放火燧以擲瑱􅂳者皆反燒其船琳艦潰亂兵士透水死十二三其餘皆棄􅂳上岸爲陳軍所殺殆盡隋書曰楊素伐陳率水軍東下舟艫􅀍江旌甲曜日素坐平乗大􅂳容貌雄偉陳人望之懼曰清河公即江神也陳南康内史吕仲肅屯歧亭正據江峽於北岸鑿巖綴鐵鎻三條横絶上流以遏戰􅂳素令登陵先攻其柵仲肅軍夜潰素徐去其鎻又李安傳曰伐陳之役蜀兵順流東下時陳人屯白沙安謂諸將曰水戰非北人所長今陳人依險泊􅂳以夜襲屯賊可破也越絶書曰伍子胥水戰法大翼一艘廣丈六尺長十二丈容戰士二十六人櫂五十人舳艫三人操長鈎矛斧者四吏僕䠶長各一人凢九十一人當用長鈎矛長斧各四弩各三十二矢三千三百甲兠鍪各三十二莊子曰宋人有善爲不􅀛手之藥者世世以洴澼絖爲事不過數金一朝而鬻伎百金請與之客得之以􅀃呉王越有難呉王使之將冬與越人水戰大敗越人裂地而封能不􅀛手一也阮元瑜爲曹公與孫權書曰􅀂恃水戰臨江塞要欲令王師終不得渡亦未必也孫子荆爲石仲恭與孫皓書曰自頃國家整治器械修造舟擑簡習水戰掩襲上白虎通曰襲者何謂行不假塗掩人不備也人銜枚馬纒勒晝伏夜行爲襲也左傳曰凡師有鐘鼓曰伐無曰侵輕曰襲又曰􅀄周人與范氏田公孫厖稅焉趙氏得而獻之吏請殺之趙孟曰爲其主也何罪止而與之田及鐵之戰以徒五百人霄攻鄭師取䗦旗於子姚之幕下又曰齊侯還自晉不入遂襲莒門于且于莒子傷股而退明日將復戰期于壽舒又曰􅁗伯使大夫􅂎子戍鄭使告于􅁗曰鄭人使我掌其北門之管管鑰􅀂潜師以來國可得也穆公訪諸蹇叔蹇叔曰勞師以襲逺非所聞也蹇叔􅁗大夫師勞力竭逺主備之無乃不可乎且師行千里其誰不知公辭焉辭不受其言召孟明西乞白乙使出師于東門之外蹇叔􅂘之曰孟子吾見師之出而不見其入也􅀳人禦師必於殽殽有二陵焉大阜曰陵其南陵夏后臯之墓臯夏桀之祖也其北陵文王之所避風雨此道在二殺之間南谷中各􅀷委曲兩山相嶔故可以避風􅀨古道由此魏武帝西討巴漢惡其險而更開北山高道也必死是間余収爾骨焉􅁗師遂東晉原􅎮曰􅁗違蹇叔而以貪勤人天奉我也奉與奉不可失敵不可縱縱敵患生違天不祥必伐􅁗師欒枝曰未報􅁗施而伐其師其爲死君乎先􅎮曰􅁗不哀吾喪而伐吾同姓􅁗則無禮何施之有吾聞之一日縱敵數代之患謀及子孫可謂死君乎言不可謂昔君遂發命遽興姜戎子墨縗經晉文未葬故襄公稱子子以凶服從戎故墨之也遂敗􅁗師于殽獲百里孟明視西乞術白乙丙以歸家語曰吴􅀳遂遇於黄池越王襲吴之國吴王歸與越戰滅焉戰國䇿曰􅂫􅁗謂楚威王曰王興師襲􅁗此所謂兩虎相據也後漢書曰漁陽太守彭寵反自將二萬餘人攻幽州刺史朱浮於筋光武使將軍鄧隆救筋隆軍潞南浮軍雍奴遣吏奏􅃺帝讀檄怒謂使曰營相去百里其􅀔豈得相及比􅀂若汝也還北軍必敗矣寵果盛軍臨河以拒隆又别發輕􅀐三千襲其後大破隆軍朱浮逺遂不能救引而去又曰􅂫茂周建與馬武合戰良乆王霸軍中壯士路潤等數十人斷髮請戰霸知士心銳乃開營後出精􅀐襲其背茂建前後受敵驚亂走散又曰鄧訓發湟中六千人令長史任尚將之縫革爲􅂳置於箄上以渡河箄本殘也音歩佳反掩擊迷唐廬落大豪多所斬􅀗又曰馬援討諸羌引精兵聚北山上援陳軍向山而分遣數百􅀐繞襲其後乗夜放火擊鼓呌譟虜遂大潰凢斬首千餘級援以兵少不得窮追収其􅂖糧畜産而還又曹暪傳曰公聞許攸來跣出迎攸勸公襲紹將公大喜乃選精銳歩􅀐皆執􅀽軍旗幟銜枚􅅞馬口夜從間道出人把束薪所歴道問者語之曰􅀽公恐曹操鈔掠後軍還兵以益備問者信以爲然旣至圍屯大放火營中驚亂大破之盡燔其糧􅂖寳貨斬督將睢元􅀳等割得諸軍淳于仲簡鼻殺士卒千餘人皆取鼻牛馬割脣舌以示紹軍將士皆惶懼又曰曹公征張魯至陽平張魯使弟衛據陽平􅀜撗山築城十餘里攻之不拔乃引軍還賊見大軍退其守備懈公乃宻遣􅀐將等乗險夜襲大破之又曰廬江太守劉勲理明城今同安郡恃兵強士勇横於江淮之間無出其右者孫䇿惡之時巳有江左自領㑹稽太守使人卑辭厚幣而􅀃之曰海昬上繚宗人數欺下國患之有年矣擊之路由不便幸因將軍之神武而臨之且上繚國冨廪實吴姓越􅁎充於後庭明珠大貝􅀍於帑藏帑他剆切取之可以資軍雖蜀郡成都金碧之府未能過也䇿願舉弊邑士卒以爲外援勲然之劉曄諌曰上繚雖小而城堅池深守之則易攻之則難不可旬月而拔也且見疲於外而國虚於内孫䇿多謀而善用兵乗虚襲我將何禦之而將軍進屈於敵退無所歸羝羊觸藩羸其角不能退不能進其在兹乎勲不從遂大興師伐上繚其廬江果爲䇿所襲勲窮蹙遂奔曹公魏志曰遣將鐘㑹鄧艾伐蜀蜀將姜維守劒閣鐘㑹攻維未能拔艾上言請從隂平江由邪徑經漢德陽亭趣涪出劒閣西四百里去成都三百里竒兵衝其腹心劒閣之守必還赴涪則㑹方軌而進劒閣之士不還則應涪之兵寡矣軍志有之曰攻其不備出其不意今掩其空虚破之必矣冬十月艾自隂平行無人之地七百餘里鑿山通道造作橋閣山髙谷深至爲艱嶮又糧運將匱頻於危殆艾以氈自裹推轉而下將士皆攀木縁崖魚貫而進先登至江油蜀守將馬邈降諸􅁑瞻自涪還綿竹列陣相拒大破之斬贍及尚書張遵等首進軍至成都蜀主劉禪面􅅞與襯詣軍門降又曰楊阜字義山天水蓽人也韋康以爲别駕馬超率萬餘人攻兾城阜率國士大夫及宗族子弟勝兵千餘人使弟岳於城上作偃月營與超接戰自正月至八月拒守而救兵不至超入拘岳於兾殺刺史太守阜内有報超之志而未得其便外兄姜叙屯歴城阜少長叙家見叙母􅀃前在兾中時事歔欷悲甚叙曰何乃爾阜曰守臣不能見君亡不能死亦何面目以視息天下乎時叙母􅁣然勑從阜計超聞阜等兵起自將出襲歴城得叙母罵之曰􅀂背父之逆子弑君桀賊天地豈乆容敢以面目視人乎超怒殺之阜與戰身􅀍五瘡宗族昆季死者七人吴志曰蜀將􅀜羽遣麋芳守南郡羽領兵圍樊吴主遣將吕蒙屯陸口外倍脩恩厚與􅀜羽結好羽多留兵備南郡恐蒙有變蒙上䟽曰羽計樊而多留備兵必恐蒙圗其後故也蒙常有病乞分衆還建業以理病爲名羽聞之必徹備徐以大軍泝江馳上襲其空虚則南郡可不戰而羽易擒耳吴主然之蒙遂稱病而還建業羽果稍徹備而悉衆赴樊城蒙遂發兵逆流而上伏甲於舟使更衣爲啇人以理征棹逹􅍼兼行過羽所置屯戍輒􅅞之羽遂失驚師次于南郡襲奪其城羽吏士攻樊城未下聞城以䧟而家屬無恙見待甚於平時無復闘心稍稍散羽竟爲吴師所擒荆州遂平又曰建安二十四年􅀜羽圍曹仁於襄陽曹公遣左將軍于禁救之㑹漢水􅁀起羽以舟兵盡生虜禁等歩􅀐三萬送江陵唯城未㧞權内憚羽外欲以爲巳功淺與曹公乞討羽自効權征羽先遣吕蒙襲公安獲將軍士仁蒙到南郡太守糜芳以城降蒙據江陵撫其老弱釋于禁之囚晉書曰王如京兆人也􅀄爲州武吏遇亂流移至宛時諸流人有詔並遣還郷如等以􅀜中荒殘不願歸征南將軍山簡南中郎將杜㽔各遣兵送之而促期令發如遂潜結無頼少年夜襲二軍大破之又䧟攻襄城於是流人諸郡各率其黨攻諸城鎮多殺令長以應之未幾衆四五萬號大將軍後如連年種榖皆化爲莠軍中大飢又曰石勒遣其將石良率精兵五千襲李矩矩逆擊不利郭誦弟元復爲賊所執遣元以書􅀃矩曰去東平曹嶷西平猗廬矩如牛角何不歸命矩以示誦誦曰昔王陵父母在賊猶不改意弟當何論勒復遺誦塵尾馬鞭以示殷勤誦不荅又曰張駿爲涼州牧咸和􅀄駿遣武威太守竇濤金城太守張閬武興太守辛巖􅀭烈將軍宋輯等率衆來㑹韓璞攻討􅁗州諸郡劉曜遣其將劉胤來拒屯于狄道城韓璞進渡沃干嶺辛巖曰我握衆數萬籍氐羌之銳冝速戰以滅之不可以乆乆則變生璞曰自夏末以來太白犯月辰逆行白虹貫日皆變之大者不可以輕動輕動而不捷爲禍更深吾將乆而斃之且躍與石勒相攻胤亦不能乆也積十七日軍糧竭遣辛巖督於金城胤聞之大恱謂其將士曰韓璞之衆十倍於吾羌胡皆叛不爲之用吾糧􅅒將懸難以持乆今虜分兵運糧可謂天授吾也􅀂敗辛巖璞等自潰彼衆我寡冝以死戰戰而不捷當無疋馬得還冝厲爾戈矛竭汝智力衆咸􅁬於是率􅀐二千襲巖于沃干嶺敗之璞軍遂潰死者二萬餘人面􅅞歸罪駿曰􅀌之罪也將軍何辱皆赦之王隱晉書曰祖逖軍大飢進據食犬丘城樊雅遣六十餘人入逖營㧞㦸大呼向逖逖軍人夜不知何賊多少皆欲散走逖疑非多人但摧左右拒之㑹督護董贍入共討賊賊散故道出太平御覽卷第三百一十五
