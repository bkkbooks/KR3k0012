body:
  text: 兵部三十三先鋒殿郷導伏兵先鋒後漢書曰􅀕彤拜遼東太守至則厲兵馬廣斥候彤有勇力能貫三百斤弓虜毎犯塞常爲士卒前鋒數破走之東觀漢記曰賈復以偏將軍從上杖邯鄲擊青犢大戰日中賊陣堅不却上傳召復曰吏士飢且可朝食復曰先破之然後食耳於是􅀍羽先登所向皆靡諸將皆服其勇魏志曰張遼字文逺爲征東將軍征孫權􅀍甲戰先䧟陣銜壘入至麾下􅀳書劉牢之傳曰太元􅀄謝玄北鎭廣陵時符堅方盛玄多募牢之與東海何謙琅琊諸葛偘樂安髙衡東平劉􅁤西河田洛􅀳陵孫無終等以驍猛應選􅀇以牢之爲叅軍領精銳爲前鋒百戰百勝號爲北府兵敵人畏之又曰元興􅀄㑹稽王道子將討􅁊玄詔司馬柔之兼侍中以騶虞幡宣告江荆二州至姑熟爲􅀇前鋒所害又載記曰髙勾麗及宇文政國等謀滅廆以分其野太興􅀄三國伐廆廆曰彼軍􅀄其鋒甚銳若逆擊之落其計矣又曰吕隆載記曰冝曜􅀄鋒示其威武彼以我逺來必決死拒戰可一舉而平宋書曰劉懷愼彭城人也少謹愼質直始叅髙祖鎭軍車􅀐將軍事振武軍彭城内史從征鮮卑毎戰必先士卒及尅廣固懷愼率所先登髙祖拒盧循於石頭屢戰剋捷又張暢傳曰虜攻鼓城南門并放火暢躬自前戰身先士卒梁書曰宋武北伐廣固田子領偏師與龍驤將軍孟龍符爲前鋒龍符戰没田子力戰破之又曰孟龍符懷王第三子也驍勇有膽氣髙祖伐廣固以龍符統歩􅀐爲前鋒賊數千圍統攻之以衆寡不敵遂見害追贈青州刺史又表曰龍符投􅃑義切前驅効命摧鋒三捷毎爲衆先及西勦􅁊歆北殄索虜朝議爵賞未及施行㑹臣北伐復統前旅臨照之戰氣冠三軍于時逆徒實繁控􅁌掩澤龍符疋馬電躍所向摧靡􅁬伐深入知死不恡後周書曰髙祖東伐齊王憲率所部先向􅀳州明日諸軍揔集稍逼城下齊人亦大出兵陣於營南髙祖召憲馳徃觀之憲返命曰易與耳請破而後食帝恱曰如汝所言吾無憂矣内史柳昂私謂憲曰賊亦不少王安得輕之憲曰憲受委前鋒情兼家國掃此逋㓂事等摧枯啇周之事公所知也賊雖衆其如我何旣而諸軍俱進應時大潰其夜齊主遁走憲輕􅀐追之又曰李弼背侯莫陳恱以􅁗州歸國太祖謂弼曰公與吾同心天下不足平破恱得金寳奴婢悉以好者賜之拜􅁗州刺史從太祖平竇泰先鋒䧟敵太祖以所乗騅賜之及泰所着牟甲亦賜之唐書曰太宗擊王充選千餘􅀐爲竒兵皆皂衣玄甲分爲左右隊建大旗令􅀐將􅁗叔寳程䶧金尉遲敬德翟長孫等分統之毎臨㓂太宗躬􅀍玄甲先鋒率之􅀱機而進所向摧殄常以少擊衆賊徒氣懾殿廣雅釋詁曰殿後也桂苑曰殿鎭也軍後也開元文字曰樂只君子殿天子之􅀖謂鎭也孟之反不伐奔而殿言在軍後也前曰啓後曰殿傳曰公與石祁子玦寗莊子矢使守曰以此賛國擇利而爲之與夫人繡衣曰聽於二子渠孔御戎子伯爲右黄夷前驅孔嬰齊殿又曰十一月丁夘朔入平隂遂從齊師夙沙衛連大車以塞隧而殿此衛所欲守險者也殖綽郭最曰天殿國師齊之辱也子姑先乎乃代之殿又曰子儀之亂析公奔􅀳􅀳人寘諸戎車之殿以爲謀主殿後軍也又曰公侵齊門于陽州顔息射人中眉退曰我無勇吾志其目也師退冉猛僞傷足而先其兄㑹乃呼曰猛也殿又曰處父曰然則亂也必及於子先備諸與孟孫以壬辰爲期陽虎前驅林楚御􅁊子虞人以鈹楯夾之陽越殿越陽虎從弟也又曰侯犯亡之曰謀免我乎侯犯請行許之駟赤先如􅀫􅃸犯殿又曰夏衞公孟彄伐曹克郊還滑羅殿羅衛大夫又曰追鄭師姚般公孫林殿而射前列多死又曰宋公伐曹將還禇師子肥殿曹人詬之不行子肥宋大夫又曰陳璀陳莊渉泗孟之側後入以爲殿之側孟氏族字反也論語曰孟之反奔而殿將入門䇿其馬曰非敢後也馬不進也史記絳侯丗家曰周勃沛人也髙祖之爲沛公以中㳙從攻胡陵勃擊章邯車􅀐殿如淳注云殿不進吕瓉云在軍復曰殿也後漢書曰岺彭圍隗囂於西城囂將行廵周宗將蜀救兵到囂得出還兾漢軍食盡燒輜重引兵下隴延弇亦相隨而退囂出兵尾擊諸營彭殿爲後拒尾謂异其後也凡軍在前曰啓在後曰殿後周書曰髙祖伐齊還以齊王憲爲後拒齊主自率衆來追至於髙梁橋憲以精􅀐二千阻水爲陣齊領軍叚暢直進至橋隔水招暢與語語畢憲問暢曰􅀂何姓名暢曰領軍叚暢也公復爲誰憲曰我虞􅀱大都督耳暢曰觀公言語不是凡人今日相見何用隱其名位陳王純梁公侯莫陳芮内史王􅁩等並在憲側暢固問不巳憲乃曰我天子大弟齊王也指陳王巳下並以名位告之暢鞭馬而去憲即命旋軍而齊人遽追之戈甲甚銳憲與開府宇文忻各統精卒百􅀐爲殿以拒之斬其驍將賀蘭豹子山褥瓌等百餘人齊衆乃退又曰楊寛從天穆引軍趣成臯令寛與爾朱兆爲後拒㝷以衆議不可乃廻赴石濟寛夜行失道後期諸將咸言寛少與北海周旋今不來矣天穆荅曰楊寛非輕於去就者也其所逗留必有他故吾當爲諸君保明之語訖􅀱􅀐白寛至天穆撫髀而􅀏曰吾固知其必來遽岀帳迎之握其手曰是所望也唐書曰胡賊掠冝君令竇䡄討之􅀄不利䡄斬其部將十四人拔隊中小帥以代之䡄率數百􅀐殿於後令衆曰聞鼓聲有不進者自後斬之旣鼓士卒爭進擊賊破之斬首千餘級虜男女二萬餘口郷導孫子曰不用郷導者不得地利不任彼郷人而導軍者則不能得道路之便利先知迃直之計者勝此軍爭之法也衛公兵法曰凡是賊徒好相掩襲湏擇敢勇之夫選明察之士兼使郷導潜歴山原宻其聲晦其迹或刻爲獸䟽而履於中途或上冠微禽而幽伏於叢薄然後傾耳以遥聽竦目而深視專智以度事機注心而候氣色見水痕則可以測敵濟之早晚觀樹動則可以辨來㓂之驅馳也故烟火莫􅀂謹而審旌幟莫若齊而一爵賞必重而不欺刑戮必嚴而不捨止敵之動靜而我必有其備彼之去就而我豈不保其全哉必湏先覘敵國道路逺近水潦山林谿谷險阨城邑大小溝渠深淺畜積多少兵革之數豪傑姓名審而知之用兵之要也伏兵易曰伏戎于莽三􅀊不興左傳曰北戎侵鄭鄭伯患之曰彼徒我車懼其侵軼我也徒歩兵也軼突也公子突曰使勇而無剛者甞㓂而速去之甞試也勇則能徃無其剛不耻退也君爲三覆以待之覆伏兵也戎輕而不整貪而無親勝不相讓敗不相救先者見􅀗後必務進進而遇覆必速奔後者弗救則無繼矣乃可以逞從之戎人之前遇覆者奔鄭將祝聃逐之􅂨戎師前後擊之盡殪爲三部伏兵祝聃帥勇而無剛者先犯之戎而速奔以遇二伏兵至後伏兵伏兵起戎還走祝聃返遂遂之戎前後及中三處受敵故曰􅂨戎師殪死􅂨丁仲切又曰呉侵楚楚將養由基奔命楚司馬子庚以師繼之養由基曰呉乗我喪謂我不能師也必易我而不戒戒備子爲三覆以待我我請誘之子庚從之戰于庸浦庸浦楚地大敗呉師又曰秋九月􅀳侯飲趙盾酒伏兵甲將攻之其右提彌明知之右軍右也趍登曰臣將侍宴過三爵非禮也遂扶跣以下公嗾􅋙焉明摶而殺之􅋐且出提彌死之又曰衛侯在平壽平壽衛下邑公孟有事於蓋􅀗之門外有事􅀕也蓋􅀗衛郭門也齊氏惟於門外而伏甲焉齊豹之家後漢書曰馮異招集諸營保數萬人與賊約期㑹戰使壯士變服與赤眉同伏於道側且曰赤眉使萬人攻異前部異裁岀兵以救之裁小出兵所以示弱也賊見勢弱遂悉衆攻異乃縱兵大戰日􅉴賊氣衰伏兵卒起衣服相亂赤眉不復識别衆遂驚潰追擊大破於崤底降男女八萬人通典曰後漢末荆州牧劉表遣劉備北侵至鄴曹公遣將李典與夏侯惇距之備一旦燒屯去惇率諸軍追擊之典曰賊無故退疑必有伏南道穿狹草木深不可追也惇不聽與將于禁追之典與惇等果入賊伏􅂨戰不利典徃救備救至乃退又曰後漢末吕布從東緡與陳宫將萬餘人來與曹公戰時兵皆出取麥在者不數千人屯營不固曹公乃令婦人守陳悉將兵距之屯西有大堤其南樹木幽􅀷布疑有伏乃相謂曰曹操多詐勿入伏中引軍南七十餘里明日復來曹公隱兵堤裏岀半兵堤外布益進乃令輕兵挑戰旣合伏兵乗堤歩卒並進遂大破之􅀳書曰鎭南將軍杜元凱伐呉樂郷城􅀳牙門管定周旨等伏兵樂郷城外呉都督孫歆先遣車岀拒􅀳將王濬於上流大敗而還旨等發伏兵隨歆軍入歆不覺直至帳下虜歆於是進逼江陵呉都督將伍延僞請降而列兵登陴􅀳師攻剋之十六國春秋曰後􅀳石季龍攻􅀳將劉演于廪丘􅀳將邵續使文鴦救演季龍退止盧􅀜津以避之文鴦弗能進屯于景亭兖州豪右張平等起兵救演季龍夜弃營設伏于外􅀭聲將歸河北張平以爲信然入于空營季龍迴擊敗之遂䧟廪丘又曰夏赫連勃進屯依力川後秦姚興來伐至三城勃勃率騎禦之興遣其將姚文宗拒戰勃勃僞退設伏以待之興將姚榆生等追之伏兵夾擊皆擒之北齊書曰叚韶與右丞相斛律光率師伐後周五月攻服秦城周人於姚襄城南更起城鎭東接定陽又作深塹斷絶行道韶乃宻抽壯士從襲之又遣潜渡河告姚襄城中令内外相應度者千有餘人周人始覺於是合戰大破之諸將咸欲攻其新城韶曰此城一面阻河三面地險不可攻縱令得之一城地耳不如更作一城壅其要路破服秦城併加以圖定陽計之長者將士咸以爲然遂圍定陽其城主楊範固守不下韶登山以觀城勢乃縱兵急攻之七月屠其外城韶謂光曰此城三面重澗險阻並無走路唯慮東南一處耳賊若突圍必從此岀但簡精兵專守自是成摛光乃令壯士千餘人設伏於東澗口其夜果如所䇿賊遂出城伏兵擊之大潰範等面􅅞盡獲其衆後魏書曰万俟醜奴作亂關中魏將賀㧞岳率兵討之岳以輕􅀐八百北渡渭殺略其民以桃之醜奴大將遲菩薩果率歩􅀐三萬至渭北岳以輕􅀐數千餘菩薩隔水交言岳稱楊國威菩薩自言強盛徃復數返時巳逼暮於是各還兵宻於渭南傍水分精􅀐數十爲一處隨地形便置之明日自將百餘􅀐隔水與賊相見岳漸前進先所置􅀐隨岳而集􅀐旣漸増賊不復測其多少行二十許里至水淺可濟之處岳便馳馬東岀以示奔遁賊謂岳走乃棄歩兵南渡渭之輕􅀐追兵東行十餘里依横崗設伏待之賊以路險不得齊進前後繼至半度崗東岳乃迴與賊戰身先士卒急擊之賊便退走岳號令所部賊下馬者皆不聽殺賊顧見之便悉投馬俄而虜􅀗三千人馬亦無遺遂擒菩薩乃度渭北降歩卒萬餘隋書曰煬帝征􅄍谷渾至覆􅀽川時􅄍谷渾王與數􅀐而遁其名王詐爲渾主保車我眞山帝令將張定和率師擊之定和旣與賊相遇輕其衆少呼之命降賊不肯定和不􅀍甲挺身登山賊伏兵於巖石之下發矢中之而斃唐書曰武德中太宗圍王丗充於東都竇建德自河北率兵十二萬來救太宗自率騎二千五百歩卒千人趣武牢四月建徳自滎陽西上築壘于板渚太宗以五百􅀐岀武牢東二十餘里將挑戰先伏李勣程齩金秦叔寳等齩五巧切令尉遲敬德執矟造建德壘下大呼致師賊衆大驚擾岀兵數千􅀐太宗逡廵漸却遂引以入伏内李勣等奮擊大破之獲其大將殷秋石瓉斬首數百級又曰羅士信仕王充率千餘人奔于穀州髙祖以爲新安道行軍揔管使圖丗充士信進居前鋒退居後殿凡所虜獲悉分士卒以此爲常身未曽自取人有功者解衣下馬而賞之然持兵嚴􅁀有不用命者無問親友必皆斬決由是下不附而畏之及大軍至洛陽士信以兵圍丗充千金堡其中人大罵之士信怒夜遣百餘人將嬰兒數十從南而來至于堡下詐言從東都來投羅揔管也因令嬰兒啼譟旣而陽驚曰此千金堡吾輩錯矣忽然而去堡中謂是東都逃人遽岀兵追之士信伏五千人於路側􅀱其開門而奮擊遂破之殺無遺􅀋也又曰武德中菀君璋及突厥􅄍屯設來㓂馬邑髙蒲政設三伏以待之突厥至城下伏兵發大破之斬首二百餘級以滿政爲朔州㹅管曲赦馬邑又曰王君廓從大軍討別下轘轅羅山二縣王充遣將魏隱率兵拒之君廓撤營僞遁設伏以待之隱縱兵疾進發伏破之又曰太宗􅀄爲右元帥揔兵十萬徇東都軍屯西苑營於三王陵自三月而旋太宗俄而隋將叚逹率萬餘人自後而至太宗發伏以擊之賊師大敗親自追奔至金城下斬四十餘級又曰王君廓亡命聚徒數千人轉掠長平進逼夏縣河東郡丞丁榮以兵拒之又遣使慰諭君廓見其使謬爲恭敬稱欲歸首榮心輕之於是曜兵登山下十餘里君廓悉匿其衆於山谷中榮無所見引兵而退􅂊至山下君廓追擊大破之呉越春秋曰公子光伏甲於私室中具酒而王僚乃􅀍棠夷之甲三重使兵衛陳於道專諸置魚腹而進之刺王僚貫脾逹背王僚立死丗􅀃曰􅁊玄伏甲設饌廣延朝士因此欲誅謝安王坦之王甚遽問謝謝之寛容愈表於皃望階趣席方作洛生詠諷浩浩洪流􅁊憚其曠逺乃起解兵王謝舊齊名於此始別優劣太平御覽卷第三百二
