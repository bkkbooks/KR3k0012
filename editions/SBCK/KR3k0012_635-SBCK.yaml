front:
  text: 太平御覽卷第六百三十五刑法部一
  hash: sha256:7163aebde6a2e131d0eb6d95df37d736e9b2ae68da41e2e5d763d766b8d376f8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_635-1a}
body:
  text: 叙刑上易蒙卦曰􅀄六發蒙利用刑人象曰利用刑人以正法也刑人之道道所惡也以正法制故刑人也又曰豫卦曰順以動豫聖人以順動則刑罰清而民服又噬嗑卦曰噬嗑亨利用獄噬齧也嗑合也凢物之不親由有間也物之不齊由有過也有間與過齧而合之所以通也刑克以通獄之利也象曰雷電噬嗑先王以明罰勑法又曰豐卦象曰雷電皆至豐君子以折獄致刑文明以動不失情理也尚書舜典曰象以典刑象法也法用常刑用不越法流宥五刑宥寛也以流放之法寛五刑鞭作官刑以鞭爲治官事之刑朴則教刑扑夏楚也不勤道業則撻之金作贖刑金黄金誤而入刑出金以贖罪眚災肆赦怙終賊刑眚過也災害也肆緩也賊殺也過而有害當緩赦之怙姦自終當刑殺之欽哉欽哉惟刑之恤哉舜陳典刑之義勑天下使敬之憂欲得中又舜典曰帝曰臯陶蠻夷猾夏冦賊姦宄猾乱也夏華夏羣行攻刼曰㓂殺人曰賊在外曰姦在内曰宄言無教之致汝作士五刑有服士治獄官也五刑墨劓剕宫大辟服從也言刑得輕重中正之法也五服三就旣從五刑謂服罪也行刑當就三處大罪於原野大夫於朝士於市五流有宅五宅三居謂不忍加刑則流放之􅀂四㐫則有五刑之流各有所居五居之差有三䓁之居大罪四裔次九州之外次千里之外也惟明克允言臯陶能明信五刑施之逺近蠻夷猾夏使咸信服無敢犯之者又大禹謨曰帝曰臯陶惟玆臣庶罔或干予正無有干我正言順耳汝作士明于五刑以弼五教期于予治弼輔也期當也歎其能以刑輔教當於治躰刑期于無刑民恊于中時乃功懋哉雖或行刑以殺正殺終無犯者刑期於無所刑民皆合於大中之道是汝之功勉之臯陶曰帝德罔愆臨下以簡御衆又曰子夏曰昔者三王慤然欲錯刑遂罰錯處也遂行也平心而應之和然後行之然且曰吾意者以不平慮之乎吾意者以不和平之乎如此者三然後行之此之謂慎罰又曰孔子曰古之刑者省之今之刑者䌓之其教古者有禮然後有刑是以刑省也今也反是無禮而齊之以刑是以䌓也書曰伯夷降典禮析民惟刑謂有禮然後有刑也又曰兹殷罰有倫今也反是諸侯不同聽每君異法聽議獄也聽無有倫是故知法難也又曰有過赦小罪勿增大罪勿纍延罪無辜曰纍老弱不受刑有過不受罰故老而受刑謂之悖弱者受之不克不赦有過謂之賊詩小雅曰菀栁刺幽王也􅁀虐無親而刑罰不中也詩含神霧曰燁燁震電不寧不令此應刑政之大􅁀故震雷驚人使天下不安周禮地官上大司徒曰以郷八刑紏万民一曰不孝之刑二曰不睦之刑三曰不婣之刑四曰不悌之刑五曰不任之刑六曰不恤之刑七曰造言之刑八曰乱民之刑紏猶割􅀕也不弟不敬况師長也造言訛言惑衆乱民乱名改作執左道以亂政也任謂朋友相任也恤謂相憂又地官下司市曰市刑小刑憲罰中刑徇罰大刑朴罰其附于刑者歸千士徇舉以示其地之衆也朴撻也國君過市則刑人赦大人過市罰一幕世子過市罰一弈命夫過市罰一蓋命婦過市罰一帷謂諸侯及夫人丗子過其國之市大夫内子過其都之市也市者人所交利而行刑之處君子無故不遊􅀚焉若遊觀則施惠以爲説又曰秋官上曰大司㓂掌建􅀖之三典以佐王刑􅀖國詰四方典法也詰謹也書曰穆王耄荒度作詳刑以詰四方也一曰刑新國用輕典新國新辟地立君之國也用輕法者爲其民之未習於教二曰刑平國用中典平國承平守成之國用中典者常行之法三曰刑亂國用重典亂國􅆲弑叛逆之囯用重典者以其化􅁖伐㓕之也以五刑糾萬民一曰野刑上功紏力功農切力勤力也三曰軍刑上命紏守命將命也守不失部伍也三曰卿刑上德紏孝德六德也善父母爲孝也四曰官刑上能紏職能能其事也職職事脩理也五曰國刑上愿紏􅁀愿慤慎也暴當爲恭字文誤也禮曰刑不上大夫禮不下庶人又曰九十曰耄七年曰悼悼與耄雖有罪不加刑焉又曰刑者侀也刑者成也一成而不可變故君子盡心焉傳曰先君周公作誓命曰毀則爲賊掩賊爲藏竊藏爲盗盗器爲姦主藏之名頼姦之用爲大㓙德有常刑無赦在九刑不忌誓命巳下皆九刑之書又曰晉侯之第陽干亂行於曲梁行陳曲梁地名魏絳戮其僕僕御晉侯怒謂羊舌職曰合諸侯以爲榮陽干爲戮何辱如之必殺魏絳對曰絳無二志事君不避難有罪不逃刑其􅀅來辭何辱命焉言終魏絳至又曰聲子謂楚令尹子木曰善爲國者賞不僣而刑不濫賞僣則懼及􅁋人刑濫則懼及善人􅀂不幸而過寜僣無濫與其失善寧其利􅁋無善人則國從之從之亡也古之治民者􅂆賞而畏刑恤民而不倦賞以春夏刑以秋冬是以將賞爲之加膳則飫賜此以知其􅂆賞也將刑爲之不舉不舉則徹樂此以知其畏刑也又曰􅀄景公欲更晏子之宅曰子之宅近市湫隘囂塵不可以居湫下隘小囂聲塵土請更諸塽塏者塽明塏燥辭曰君之先臣容焉先臣晏子之先人臣不足以嗣之於臣侈矣公􅀏曰子近市識貴賤乎對曰旣利之敢不識乎公曰何貴何賤於是景公䌓於刑有鬻踊者故對曰踊貴屨賤景公爲是省於刑君子曰仁人之言其利􅀶哉晏子一言而齊侯省刑又曰鄭人鑄刑書鑄刑書於鼎以爲國之常法叔向使謂子産曰昔先王議事以制不爲刑辟懼民之有争心也夏有亂政而作禹刑啇有亂政而作湯刑夏啇之亂着禹湯之法言不能議事以制周有亂政而作九刑周之衰亦爲刑書謂之九刑三辟之興皆叔丗也言制書不起於始全盛之丗今吾子相鄭國作封洫立謗政制三辟鑄刑書制三辟謂用三代之末法將以靖民不亦難乎又曰爲刑罰威獄使民畏忌以􅀋其震曜殺戮雲電震曜天地威也刑獄以象􅀋之論語曰導之以政齊之以刑民免而無耻又曰禮樂不興則刑罰不中刑罰不中則民無所措手足孝經曰五刑之屬三千而罪莫大於不孝家語曰閔子騫問政於孔子孔子對曰以德以法夫德法者御民之具猶御馬之有衘勒也君者人也吏者轡也刑者䇿也夫人君之政執其轡䇿而已乎閔子騫曰敢問古之爲政孔子曰古者天子以内史爲左右手以德法爲衘勒以百官爲轡以刑罰爲䇿以萬人爲馬以御天下數百年而不失也又曰有父子訟者孔子同狴執之三月不別其父請止夫子赦焉曰上失其道獄犴不治不可刑也書曰義刑義殺勿庸以即汝心三尺之限空車不能登者何峻故也百刃之山重載陟焉何陵遟也俗之陵遟乆矣雖有刑法人能勿踰乎國語曰臧文仲曰大刑用兵甲次刑用斧􅃏中刑用刀鋸薄刑用鞭朴以威民也孔叢子曰仲弓問古之刑教與今之刑敎孔子曰古之刑教省今之刑敎繁古教有禮然後有刑是以刑省今無禮以教而齊之以刑是以刑繁史記曰胡亥立以趙髙爲郎中令令更變律有罪者相坐収族又群盗起胡亥責李斯斯懼上書請行督責刑者相半其後趙髙譛斯具五刑􅆎斬夷三族又曰申不害韓非好刑名法術之學以爲儒者以文亂法俠者以武犯禁漢書刑法志曰古人有言曰天生五材民並用之廢一不可鞭朴不可㢮於家刑罰不可廢於國征伐不可偃於天下用之有夲末行之有逆順耳又曰孝武即位徴發煩數百姓貧窮民􅀍酷吏擊姦断宄不勝於是招進張湯趙禹之屬修定法令又曰古之知法者能省刑夲也今之知法者不失有罪上下相臨以刻爲明深者􅀗功名平者多後患諺曰鬻棺者欲歳之疫非憎人欲殺之利在於人死又曰貢禹上言孝文皇帝時貴廉㓗賤貪汙賈人贅壻及吏坐􅂍者皆禁錮不得爲吏無贖罪之法欲令禁止海内大化武帝始臨天下尊賢用士開地廣境自見功大遂縱􅄝慾廼一時之變使犯法者贖罪入􅂖者􅀘吏是以官亂民貧盗賊並起又曰文帝制人有巳論其父母妻子同産坐之及收孥律令冝除之孥子也􅁗法一有罪并収其家也罪疑者與人從輕断之於是刑罰大省断獄四百又曰􅁗始皇專任刑罰躬操文墨晝断獄夜理書又曰于定國爲廷尉季秋後請讞時上常幸宣室齋而居决事刑獄號平反也反音畨又曰董仲舒云陽爲德隂爲刑陽常居大夏而生養育長爲事隂常居大冬而積於虚空不用之處以此見天之任德不任刑也又曰􅁗用啇鞅之法故帝王之道刑戮妄行人不聊生逃亡山野並爲盗賊断獄一歳八十萬數又曰刑法志曰古人有言滿堂飲酒有一人嚮隅而泣則一堂不樂王者之於天下猶一堂之上也一人不得平爲之悽愴今郡國􅀍刑或􅁈死者多此和氣所以未洽者也原夫獄刑所以蕃者書曰伯夷降典折民惟刑言伯夷示禮法以道人人習之禮然後用刑也言制禮以止刑猶隄防之隘水也今隄防陵遟禮制未立死刑過制生刑易犯飢寒並至窮斯濫溢豪傑擅私爲之囊槖言容隱姦刑􅀂槖盛物姦邪所隱則狃而寖廣狃串習也寖漸狃音女九切後漢書曰光武留心庻獄然自王莽之後舊章不存法網㢮縱無以懲肅梁統上䟽曰臣愚以爲刑罰在􅂨無取於輕是以五帝有流殛放煞之誅三王有大辟刻肌之刑所以爲除去亂也髙帝定法傳之後代遭丗康平因時施恩去肉刑相坐之法天下幾平武帝值中國全盛征伐逺方百姓罷􅁦豪傑犯禁姦吏弄法故重首匿之科著知縱之律宣帝履道要以御海内臣下奉憲不失繩墨天下稱安孝元孝哀即位日淺丞相王嘉等猥以數年之間虧除先帝舊約穿令断律凢百餘事臣取其尢妨政者條奏伏謂擇其善而從之以定不易之典時廷尉議以爲崇刑峻法非明王急務遂罷之又曰梁統對尚書問議刑曰聖帝明王制立刑罰故雖尭舜之盛猶誅四㓙經曰天討有罪五刑五用哉又曰爰制百姓于刑之􅂨孔子曰刑罰不中則民無所措手足措置也􅂨之爲言不輕不重之謂也春秋之誅不避親戚所以防患救亂全安衆庶豈無仁愛之恩貴絶殘賊之路也又曰郎顗上書言今立春之後火卦事用所當温而寒違反時節由功賞不至而刑罰必加也冝湏立秋順氣行罰太平御覽卷第六百三十五
