front:
  text: 太平御覽卷第八百三十八百榖部二
  hash: sha256:d84d3811326065b74ae06dddf8d20aedaf4e71d222f19dd696630e6bda1971ea
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_838-1a}
body:
  text: 米麥米後漢書曰帝因西征隗囂至􅃮􅃮縣屬右扶風諸將多以王師之重不冝逺入險阻計猶豫未决㑹召馬援夜至帝大喜引入具以群議質之援因􅀃隗􅅝將帥有土崩之勢兵進有必破之狀又於帝前聚米爲山谷􅃌畫形勢開示衆軍所從道徑徃來分析昭然可暁帝曰虜在吾目中矣明旦遂進軍囂衆大潰又曰獻帝時三輔大旱帝避正殿請雨遣使者洗囚徒原輕繫洗謂蕩滌也是時􅂖一斛五十萬豆麥一斛二十萬人相食啖白骨委積帝使御史侯汶岀太倉米豆爲飢人作麋粥經日而死者無數帝疑賑䘏有虚乃親於御坐前量試作麋乃知非實􅀽宏漢記曰時勑侍中劉艾取米豆五􅂛於御前作麋得滿三盂於是詔尚書曰米豆五􅂛得麋三盂而人委頓何也使侍中劉艾岀讓有司於是尚書令以下皆詣省閣謝奏収侯汶考實詔曰未忍致汶于理可杖五十自是之後多得全濟宋書曰晉平王休祐素無才能強梁自用大明之丗年尚少未得自專至是貪􅁋好財色在荆州裒刻所在多營財貨以短錢一百賦民田登就求白米一斛米粒皆令徹白若有破折者悉郍簡不受民間糴此米一升一百至時又不受米評米責錢凡諸求利皆悉如此又曰徐齊耕􅀳陵人也元嘉二十一年大旱人飢耕詣縣陳辤以米千斛助官振貸縣爲言上當時議以耕比漢卜式詔書襃美酬以縣令大明八年東土飢東海嚴成東􅁐王道益各以私榖五百餘斛助官振䘏梁書曰任昉爲新安太守爲政清省吏民便之卒於官唯有桃花米二十斛無以爲歛遺言不許將新安一物還都南史曰孔覬後爲司徒左長史弟道存代覬爲後軍長史江夏内史時東土大旱都邑米貴一􅂛將百錢道存慮覬甚乏遣使載五百斛米餉之覬呼使謂之曰我在彼三載去官之日不辦有路粮卿至彼未幾郍能便得此米即可載還彼吏曰自古已來無有載米上水者都下米貴乞於此貨之不聽吏乃載米而去梁書曰􅁃詵甞乗舟從􅹛中山舎還載米一百五十石有人寄載四十石及至宅􅀉載者曰君四十斛我百五十斛詵嘿然不言恣其取足隣人有􅀍執爲盗見劾妄疑詵矜之乃以書質錢二萬令門生詐爲其親代之酬備隣人獲免謝詵曰矜天下無辜豈其謝也又曰張率􅄝酒不事於家務尤忘懷在新安遣家僮載米三千石還呉宅及至耗太多率問其故荅曰雀䑕耗率􅀏而言曰壯哉雀䑕竟不研問南史隱逸傳曰陶潜爲彭澤令郡遣督郵至縣吏白應束帶見之潜歎曰我不能爲五斗米折腰向郷里小人即日解印綬去職賦歸去來以遂其志後魏書曰崔浩自饌食經序曰余備位台􅉗與叅大謀賞獲豐厚牛羊盖澤貨累巨萬衣則重錦食必梁􅁏逺惟平生思季路負米之時可復得乎故序遺文垂示來丗北史曰齊文宣帝崩當朝文士各作挽歌十首擇其善者而用之魏収陽休之祖孝徴等不過得一二首唯盧思道獨有八篇故時人稱爲八美盧郎唐書曰李峴爲京兆尹所在皆著聲績天寳十三載連雨六十餘日宰臣楊國忠惡其不附己以雨灾歸咎京兆尹乃爲長沙郡太守時京師米麥踴貴百姓謡言曰欲得米粟賤無過追李峴爲其政得人心如此又曰張万福爲泗州刺史魏州飢父子相賣餓死者接道万福曰魏州吾郷里也安可不救令其兄子將米百車徃餧之又使人於汴口求魏人自賣者給車牛贖而遣之又曰陽城嘗約其二弟云吾所得月俸汝可度吾家有幾口月食米當幾何買薪菜塩米凡用幾錢先具之其餘悉以付酒媪無留也未甞有所蓄積􅀃苑曰子路曰負重道逺者不擇地而休家貧親老者不擇禄而仕昔者由事二親之時常食藜藿之實而爲親􅀒米百里之外親没之後南遊於楚從車乗積粟萬鍾累茵而坐列鼎而食願食藜藿爲親􅀒米之時不可復得也枯魚衘索幾何不蠧二親之壽忽如過􅂩草木欲長霜露不停賢者欲養二親不待故曰家貧親老不擇禄而仕也吕氏春秋曰孔子窮於陳蔡之間藜羮不糝七日不甞粒晝寢顔回索米得而來爨之幾熟孔子望見顔回攫其甑中而飯之選間食熟謁孔子而進食孔子起曰今者夢見先君食㓗欲饋回曰可嚮者㶼煤入甑中回以爲弃之則不可置之則不㓗因攫而食之孔子歎曰人所信者目也而目猶不可信所恃者心也而心猶不足恃弟子記之知人固不易水經曰㑹稽有射的山逺望狀􅀂射侯故謂射的的之西有石室名之爲射堂年登否常占射的以爲貴賤之准的明則米賤的闇則米貴故諺云射的白斛米百射的􅀇斛米千麥毛詩􅅠柏舟桑中曰爰採麥矣沫之北矣又載馳曰我行其野芃芃其麥又思文曰思文后稷克配彼天立我蒸民莫匪爾極貽我來牟牟麥也禮記月令曰孟夏之月天子以􅇾甞麥孟春行冬令則首種不入蔡邕章句曰首種爲宿麥也左傳桓公曰夏四月鄭􅀕足帥師取温之麥温周蘇氏之地又文下曰魯襄仲如鄭拜榖之盟復曰臣聞齊人將食魯之麥又成上曰晉侯夢大厲公召桑田巫巫曰不食新麥矣六月丙午晉侯欲麥使甸人獻麥召桑田巫示而殺之將食張如厠陷而卒春秋佐助期曰麥神名含福姓習春秋􅀃題辭曰麥之爲言殖也寢生觸凍而不息精射刺直故麥含芒生且立也尚書大傳曰秋昏虚星中可以種麥孝經援神契曰黒墳冝􅁰麥周書曰四月孟夏王􅀄祈禱于岱宗乃甞麥于廟史記曰箕子朝周過故殷墟咸生禾􅁰箕子傷之欲􅂘則不可欲泣爲其近婦人乃作麥秀之詩以歌詠之其詩曰麥秀漸漸􅀆禾􅁰油油漢書曰武帝外事四夷而民去夲董仲舒􅀃上曰春秋他榖不書至於麥禾不成則書之以此見聖人於五榖最重􅀫麥今􅀜中俗不好種麥願陛下幸詔大司農使關中民益種􅀫麥無令後時東觀漢記曰髙鳯字文通南陽苑人誦讀晝夜不絶妻甞之田暴麥於池以竿授鳯令護鳥雀鳯受竿誦經如故天大雷􅁀雨流潦鳯留意在經忽不視麥麥隨水漂去又曰第五倫免歸田躬與奴共發株􅁄田種麥又曰董宣爲洛陽令卒官詔遣使視唯見布􅀍覆屍妻子對哭有大麥數斛又曰鄧禹平三輔粮乏王丹上麥二千斛禹髙其節義表丹嶺左馮翊又曰張堪爲漁陽太守勸民耕種以致殷冨百姓歌曰桑無附枝麥穗兩歧張君爲政樂不可支續漢書曰羊續爲南陽太守妻與子祕俱徃郡舎續閉門不納妻自將袐行其資藏唯布衾弊禂塩麥數斛又曰桓帝時童謡曰小麥青青大麥枯誰當穫者婦與姑丈夫何在西擊胡後西羌大至抽丁以征之􅀽山松後漢書曰范丹宇史雲外黄人使兒捃麥得五斛郷人尹䑓遺之一斛屬兒莫道丹後知即令并送六斛言麥已雜遂誓不取王隱􅀳書曰王褒宇偉元諸生有宻爲褒刈麥者褒遂弃之於是莫敢復佐晋書載記曰京兆杜洪􅀼據長安自稱􅀳征北將軍雍州刺史戎夏多歸之符健宻圗關中懼洪知之乃僞愛石祗宫室於枋頭課所部種麥示無西意有知而不耕種者健殺之以徇晉起居注曰咸康三年河北謡曰麥入􅁟殺石虎又曰太康十年嘉麥生扶風郿一莖四穟収實三倍崔鴻十六國春秋前凉録曰張駿九年雨五稼榖于武威燉煌種之皆生因名天麥又前􅁗録曰􅀄符健聞桓温之來伐也芟麥以待之故温掠無所得軍人大飢又曰新羅王遣使貢其方物在百濟東去長安九千八百里其人食麥又前凉録曰永嘉元年嘉麥一莖九穗生姑臧三國典略曰李岳字祖仁官至中散大夫甞爲門客所􅀃舉錢營生廣收大麥載赴晉陽􅀱其寒食以求髙價清明之日其車方逹又從晋陽載化生向鄴城路逢大雨並化爲泥息利旣少乃至貧迫當丗人士莫不􅀏之陳書曰侯景亂時吴明徹有粟麥三千餘斛而隣里飢餒乃白諸兄曰今人不圖乆柰何不與郷里共此於是計口平分同其豐儉羣盗聞而避焉頼以存者甚衆後周書曰大象末有強練師以無底囊歷長安市告乞市以米麥遺之隨即漏地人或問其故強練曰但令諸人見盛空耳隋􅀄遷都龍首山長安遂空矣隋書曰張文詡隱居甞有人夜中􅀼刈其麥者見而避之盗因感悟棄麥而謝慰諭之自誓不言固令持去經數年盗者向郷人論之始爲逺近所悉隣家築牆心有不直文詡因毀舊堵以應之唐書曰開元十三年河南府壽安縣人劉懷家有大麥六􅅿先熟與衆麥殊色其中有兩歧三歧四歧六歧者又曰元和九年六月三日宰臣武元衡爲盗所害先是長安謡曰打麥麥打三三三旣而旋其䄂曰舞了也解者謂打麥者打麥時也麥打者蓋謂闇中突擊也三三三謂六月三日也舞了者謂元衡之卒也又曰西女國每十月令巫者齎肴詣山中散糟麥於空大呪呼鳥俄而鳥如雞飛入巫者之懷因割腹而視之毎有一榖來歳必登􅀂有霜雪必有災異其俗信之名爲鳥卜又曰吐谷渾地氣大寒不生秔稻有青䴹還瓦切麥䝁音勞豆小麥蒿麥莊子曰大儒以詩禮發冢小儒曰口中有珠詩曰青青之麥生於陵坂生不布施死何含珠爲淮南子曰濟水通和而冝麥又曰三春之月天子衣青衣乗青龍食麥與羊􅁗子曰孔文舉爲北海相有人母病差思食新麥家無乃盗隣熟麥而進之文舉聞特償之家語曰宓子賤爲單父宰百姓化之齊人攻魯道由單父老謂曰麥己熟矣今齊寇至不及人人自收其麥請放民皆使出穫傳郭之麥可以益粮且不資㓂三請而宓子不聽俄而㓂逮于麥季孫聞之怒使人讓之密于蹷然曰今兹無麥明年可樹􅀂使不耕者得穫是民樂有㓂也且單父一歳之麥於魯不加強䘮之不加弱使民有自取之心其瘡必數丗不悉季孫聞之敝然媿曰地􅀂可入吾豈忍見宓子哉賈􅁩書同廣雅曰大麥麰也小麥麳也吕氏春秋曰得時之麥長秱而頸墨二七以爲行西服薄穗而赤色稱之重食之致香以息使人肥且有力范子計然曰東方多麥南方多稷西方多麻北方多菽中央多禾五土之所冝也􅀃文曰麥芒榖秋種厚薶故謂之麥麥金也金王而生火王而死從來有穗者從父思惟切麰周所受來牟也一麥二縫象其芒刺之形天所來也麧音紇堅麥也音􅃈小麥屑覆也䴾磨麥也䵂麥覆屑也十三斤爲三斗從麥啇聲䵄煑麥也麮麥白煑也稍麥莖也廣志曰虜小麥其實大麰似大麥形有二縫麥似大麥岀涼州旋麥三月種八月熟岀西方赤麥赤而肥出鄭縣有半夏小麥有秀芒大麥有黒穬麥呉氏夲草曰大麥一名穬麥五榖之盛無毒治消渴除熱益氣食􅁡爲使麥種一名小麥無毒治利而不中汜勝之書曰凡田六道種麥爲首子欲冨黄金覆謂曳柴壅麥根也夏至後七十日寒地可種􅀫麥又曰麥早種而虫有節晚種穗小而少漬麥種以酢漿無虫冬雪止掩其雪忽從風飛去則麥耐旱崔寔四民月令曰六月􅀄伏薦麥􅀲於祖祢陳留􅂄舊傳曰髙順宇孝父敦厚少華子式至孝蝝蝗爲灾不食式麥英雄記曰吕布令韓暹楊奉取劉備地麥以爲軍資曹暪傳曰太祖曽行麥中令士卒無敗麥犯者死􅀐士皆下馬持麥以相付太祖馬騰入麥中太祖曰􅀌爲軍帥不可殺請自刑因援劒割髮以置地諸葛恪別傳曰孫權甞饗蜀使費禕禕停食䴵索笔作麥賦恪亦請笔作磨賦咸稱善西域諸國志曰天竺一以十一月六日爲冬至則麥秀十二月十六日爲臘則麥熟愽物志曰啖麥令人多力又曰近丗有田夫至巧削木爲麥入市糴之糴者無疑歸磨乃覺非麥搜神記曰麥之爲蛺蝶由干濕也􅈛則萬物之變皆有也農夫止麥之化者區之以􅁅聖人理萬物之化者濟之以道孔融教髙密令曰髙密侯國牋言鄭國増門之崇令容髙車結駟之路出麥五斛以酬執事者之勞太平御覧卷第八百三十八
