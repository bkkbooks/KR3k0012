body:
  text: 方術部三醫二史記曰馮信臨淄人爲齊太倉長好醫淄川王令就淳于意學方意敎以審法逆順論藥法定五味及和劑湯法信受之擅名漢丗又曰髙期仕濟北王爲大醫王遣就倉公淳于意學經脉高下及竒絡結當論俞所居及氣當上下岀入邪正逆順之冝鑱石定砭灸之法歳餘亦頗通之又曰唐安臨淄人也雅性好醫倉公淳于意教五􅐷上下經脉竒咳四時應隂陽之法爲齊侍醫又曰杜信髙永侯家丞自知身病乃專心學醫倉公甚憐之教以上下經脉五􅐷之法又曰鄧訓爲護烏桓校尉羗胡俗恥病死每病臨困取以刀自刺訓聞有病困者輙拘縛束不與兵刃使醫藥療之愈者非一小大莫不感恱又王符論曰凡療病者必先知脉之虚實氣之所結然後爲之方故疾可愈而壽可長也爲國者必先知人之所苦禍之所起然後爲之禁故姧可塞而國可安也又曰郭玉者廣漢人也􅀄有老父不知何出常漁釣於涪水因號涪翁乞食人間見有疾者時下針石輙應時而効乃著針經􅐷脉法傳於代弟子程髙㝷求積年翁乃授之髙亦隠跡不仕玉少師事髙學方􅐷六徴之技隂陽不測之術和帝時爲太醫丞多有効應帝竒之仍試令嬖臣美手睕者與女子雜處帷中使玉各􅐷一手問所疾若玉曰左陽右隂脉有男女狀若異人臣疑其故帝歎息稱善玉仁愛不矜雖貧賤厮養必盡其心力而鑒療貴人時或不愈帝乃試令貴人羸服變處一針即差召玉詰問其狀對曰醫之爲言意也腠理至微腠理皮膚之間也韓子曰扁鵲見晉桓侯曰君有病在腠理也隨氣用巧針石之間毫芒即乖神存於心手之際可得解而不可得言也夫貴者處尊髙以臨臣臣懷怖懾以承之其爲療也有四難焉自用意而不任臣一難也將身不謹二難也骨節不強不能使藥三難也好逸惡勞四難也針有分寸時有破漏分寸淺􅀷之度破漏曰有衝破者也重以恐懼之心加以裁愼之志臣意且猶不盡何有於病哉此其所爲不愈也帝善其對年老卒官又曰曹褒遷城門校尉將作大匠時有疾疫褒廵行病徒爲致醫藥經理饘粥多蒙濟活東觀漢記曰鄧訓謙恕下士無貴賤見之如舊朋友徃來門内視之如子有過如鞭扑之教大醫皮廵從獵上林還暮􅀫殿門下寒疝病發時訓直事聞廵聲起徃問之廵曰異得火以熨背訓身至太官門爲求火不得乃以口嘘其背復呼同廬郎共更嘘至朝遂愈鍾離意别傳曰黄讜爲㑹稽太守建武十四年吴大疾疫署意中部尉督郵意乃露車不冠身循行病者門入家至賜與醫藥詣神廟爲民禱􅀕召録醫師百人合和草藥恐醫小子或不良毒藥齊賊害民命先自吞甞然後施行其所臨護四千餘人並得差愈後日府君岀行災害百姓攀車涕泣曰明郵府君不湏岀也但得鍾督郵民皆活也何顒别傳曰同郡張仲景緫角造顒謂曰君用思精而韻不髙後將爲良醫卒如其言顒先識獨覺言無虚發王仲宣年十七甞遇仲景仲景曰君有病冝服五石湯不治且成門後年三十當眉落仲宣以其貰音賖長也逺不治也後至三十疾果成竟眉落其精如此仲景之方術今傳於丗張仲景方序曰衛汎好醫術少師仲景有才識撰四逆三部厥經及婦人胎藏經小兒􅇟方三卷皆行於丗髙湛養生論曰王叔和性沉静好著述考覈遺文採摭羣論撰成脉經十卷編次張仲景方論編爲三十六卷大行於丗魏志曰華他字元化沛國譙人遊學徐土兼通數經曉飬性之術年且百歳而猶有壯灾時人以爲仙沛相陳珪舉孝廉太尉黄琬辟皆不就精於方藥處齊不過數種心分銖不假秤量針灸過數處裁七八壯若疾發結於内針藥所不能及者乃令先以酒服麻沸散旣醉無所覺因刳破腸皆抽割積聚若在腸胃則截斷洗除去疾穢旣而縫合􅀓以神膏四五日瘡愈一月之間皆平復又曰甘陵相夫人有娠六月腹痛不安他視脉曰胎已死矣使人手摸知所在在右即女在左即男人云在左於是爲湯下之果下男形即愈又曰縣吏尹丗苦四支煩口乾不欲聞人聲小便不利他曰試作􅀬食得汗即愈不汗後三日死即作􅀬食而汗不岀他曰藏氣巳絶於内當啼泣而絶果如他言又府吏倪㝷李延共止俱患頭痛身􅀬所苦正同他曰尋當下之延當發汗或難其病同療異他曰尋内實延外實故治之冝殊即各與藥明旦並起又督郵徐毅得病他徃省之毅謂他曰昨使醫曹吏劉祖針胃管訖便若欬嗽卧不安他曰刺不到胃管誤中肝也食當日减後五日不救遂如他言又東陽陳叔山小男三歳得下痢常先啼日以羸困問他他曰其母懷軀陽氣内養乳中虚冷兒得母寒故令不時愈他與四物紫􅁐九十日即除又至軍吏梅平得病除名還家家居廣陵未至二百里止親人舎有湏他偶至主人許主人令他視平他謂平曰君早見我不應至此今疾巳結促去可得與家人相見五日平應時歸果如他言又他行道見一人病噎塞嗜食而不得下家人車載欲徃就醫他聞其呻吟駐車徃視語之曰向來道傍有賣餅家䔉韲大酢從取三􅂛飲之病自當􅏔即如他言立吐虵一條遂懸之車邊欲造他他尚未還他家小兒戲門前迎見自相謂曰客車邊有物必是逢我公也疾者前入㘴見他壁北懸此虵輩以十數又有一郡守病他以爲其人盛怒則􅏔乃多受其貨而不加功無何弃去留書罵之守果大怒令人追殺守子知之属使勿逐守瞋恚吐黒血數􅂛而愈又有一士大夫患體中不快詣他他云君病至􅀷當破腹取之然君壽亦不過十年病不能殺君君忍痛十歳壽俱當盡不足故自刳裂也士大夫曰余不耐痛必請治之他遂下手所患㝷差十年竟死又廣陵太守陳登得胷中煩滿靣赤不食他􅐷脉曰府君胃中有蟲數􅂛欲成􅁏疽食腥物所爲也即作湯二􅂛先服一􅂛斯湏盡服之食頃吐出三􅂛許蟲赤頭皆動半身猶是生魚膾也所苦便愈他曰此病後三朞當發遇良醫乃可濟依期果發時他不在遂死又有婦人長病經年丗謂爲寒􅀬注病冬月中他令㘴石槽中平且用冷水汲灌云當滿百始七十灌冷戰􅁒死他令滿數至八十灌􅀬氣乃蒸出􅅝􅅝髙二三尺滿百灌他乃使然火温牀厚覆衣良乆汙洽出着粉燥便愈又有人病腹中攻痛十餘日􅁂眉墮落他曰是脾半腐可刳腹治也使飲藥令卧破腹就視脾果半腐壞以刀断之割去惡肉以膏􅀓之即􅆧太祖聞而異之召他常在左右太祖苦頭風每發心亂目眩他針鬲隨手而愈又軍吏李成苦欬晝夜不􅄰時吐膿血以問他他言君病腸癰欬之所吐非從肺來也與君散兩錢匕巳服當吐二􅂛餘膿血訖快自養一月小起好自將愛一年便徤十八歳當一小發服此亦復􅆧若不得此藥故當死復與兩錢散成得五六歳親人有病如成者謂成曰卿今強徤我見欲死何忍急去祛舉切藏藥以待不祥先特貸我􅏔爲卿從華他更索成與藥巳故到譙從索藥適㑹值他見收忩忩不忍從求後十八歳病發無藥可療以至死又曰樊阿彭城人少師華他甞問他求服食法他受以􅃮葉青黏散子方云服之去三蟲利五藏輕身益氣使人頭不白阿從其言年百餘歳􅃮葉所在有之青黏生於豊沛彭城及朝歌青黏一名地節一名黄芝主理五藏益精氣本出於迷人入山者見仙人服之以告他他以爲佳語阿阿秘之近者人見阿之壽而氣力強盛怪而問之所服食阿因醉亂誤說之人服多驗蜀志曰關羽爲流矢貫臂每陰雨常疼痛醫曰矢鏃有在當破臂刮骨去毒乃可除之􅀳書曰裴頠通􅀶多聞兼明醫術荀朂之修定律度也檢得古又短丗所用四分有餘頠上言冝以改諸度量若是未能悉革可先改太醫權衡此若􅆧違遂失神農􅄮伯之正藥物輕重分兩乖互所可傷夭爲害尤􅀷古壽考而今短折者未必不由此也卒不能用又曰顔含兄畿咸寜中得疾就醫自療遂死於醫家家人迎喪旐每繞樹而不可解引䘮者顛仆􅁛畿言曰我壽命未死但服藥太多傷我五藏耳今當復活愼無葬也其父祝之曰若尔有命復生豈非骨肉所願今伹欲還家不尔葬也旐乃解又曰張苗雅好醫術善消㤙􅐷處陳廪丘得病連服藥發汗汗不岀衆醫皆云發汗不出者死自思可蒸之如中風法令温氣於外迎之必得汗也復以問苗云曽有人疲極汗岀卧簟中冷得病苦増寒諸醫與散四日凢八過發汗汗不出苗乃燒地布桃葉於上蒸之即得大汗便於􅀍下􅀓粉身極燥乃起即愈廪丘如其言果差又曰趙泉性好醫方拯救無倦善療衆疾於瘧尤工甚爲當時所歎伏焉􅀳中興書曰􅁑洪字稚川丹陽句容人㓜覽衆書近得萬卷自號抱朴子善養性之術撰經用救驗方三卷號曰肘後方又撰玉凾方一百卷于今行用􅀳書曰皇甫謐字士安㓜沉静寡欲有高尚之志以著述爲務自號玄晏先生後得風痺疾因而學醫習覽經方手不輟卷遂盡其妙又曰劉德彭城人也少以醫方自逹衆疾於虚勞尤爲精妙療之隨手而愈猶是向風千里而至者多矣官至太醫校尉又曰史脫性器沉毅志行敦簡善􅐷候明消息多辨論以醫術精愽拜太醫校尉治黄疸病最爲髙手又曰宫㤗㓜好墳典雅尚方術有一藝長於巳者必千里㝷之以此精心善極諸疾於氣尤精制三物散方治喘嗽上氣甚有異効丗所貴焉又曰靳邵性明敏有才術夲草經方誦覽通究裁方治療意出衆表創制五石散方晋朝士大夫無不服餌皆􅀗異効又曰程據爲太醫令武帝􅀄受魏禪改元爲太始而據貢雉頭裘帝以竒􅇊異服典禮所禁焚之于殿前據以醫術承恩岀入禁闥因爲賈后合巴豆杏子丸害􅉖懐太子遂就戮焉又曰范汪字玄平性仁愛善醫術常以拯恤爲事凢有疾病不限貴賤皆爲治之十能愈其八九撰方五百餘卷又一百七卷後人詳用多􅀗其効又曰殷仲堪陳郡人能清言善屬文名士咸愛之謝玄以爲長史厚遇之仲堪父病積年衣不解帶躬夲醫術究其精妙執書揮淚遂眇一目又曰魏詠之字長道任城人也家貧素而躬耕爲事好學不倦生而菟缺有善相者謂之曰卿當冨貴年十八聞荆州刺史殷仲堪帳下有名醫能療之貧無行裝謂家人曰殘醜如此用活何爲遂齎數斛米西上以投仲堪旣至造門自通仲堪嘉其盛意召醫語視之醫曰可割而􅀘之但湏百日進粥不得語􅀏詠之曰半生不語而有半生亦當療之况百日耶仲堪於是處之別屋令醫善療之詠之遂􅐬口不言唯食薄粥其厲志如此及􅏔仲堪厚資遺之劉敬叔異􅁐曰王纂海陵人少習經方尤精針石宋元嘉中縣人張方女日暮􅀫廣陵廟門下夜有物假作其壻來魅惑成病纂爲治之始下一針有􅆩從女􅀍内走岀病遂愈宋書曰徐文伯字德秀濮陽太守熈曽孫也熈好黄老􅀮於􅁗望山有道士過求飲留一􅉚蘆與之曰君子孫冝以道術救丗當得二千石熈開之乃扁鵲鏡經一卷因精心學之遂名震海内生子秋夫弥工其術仕至射陽令甞夜有鬼聲甚悽愴秋夫問何所湏荅言姓斯家在東陽患􅆎痛死爲􅀑痛猶難忍請療之秋夫曰云何厝法􅀑請爲芻人案孔穴針之秋夫如言爲炙四處又針肩井三處設􅀕埋之明日見一人謝恩忽然不見當丗伏其通靈又宋明帝宮人患􅆎痛牽心毎至輒氣欲絶衆醫以爲肉癥文伯曰此髮瘕以油投之即吐得物如髪稍引之長三尺頭巳成虵能動懸柱上水滴盡一髪而巳病都差又宋後廢帝出樂遊苑門逢一婦人有娠帝亦善􅐷脉爲􅐷之曰此腹是女也問文伯文伯曰腹有兩子一男一女女左邊青黒形小於女帝性急便欲使剖文伯惻然曰若加刀斧恐其變異請針之立落便㵼足太隂􅀘手陽明胎便應針而落兩兒相續岀如其言又曰孫法宗忽苦頭創夜有女人至曰我是天使來相謝行創夲不関善人使者誤相及但取牛糞煑􅀓之即驗一􅀓便􅏔一境頼之又曰羊欣字敬元性好文儒兼善醫藥撰方三十卷爲代所重焉又曰􅁗承祖性耿介專好藝術於方藥不問貴賤皆治療之多所全護當時稱之爲工手撰方二十卷大行於丗太平御覽卷第七百二十二
