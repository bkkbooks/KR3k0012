body:
  text: 皇王部三十一隋髙祖文皇帝焬皇帝隋髙祖文皇帝隋書曰髙祖文帝姓楊氏諱堅弘農郡華隂人也漢太尉震八代孫鉉仕燕爲北平太守鉉生元壽後魏代爲武川鎮司馬子孫因家焉元壽生太原太守惠嘏恵嘏生平原太守烈烈生寜逺將軍禎禎生忠忠即皇考也皇考從周太祖起義􅀜西賜姓普六茹氏位至柱國大司空隋國公薨贈太保謚曰桓皇妣吕氏以大統七年六月癸丑夜生髙祖於馮翊般􅀂寺紫氣充庭有尼來自河東謂皇妣曰此兒所從來甚異不可於俗間處之尼將髙祖舎於別館躬自撫養皇妣甞抱髙祖忽見頭上角出遍體鱗起皇妣大駭墜髙祖於地尼自外入見曰巳驚我兒致令晚得天下爲人龍顔額有五柱入頂目光外射有文在手曰王長上短下沉深嚴重􅀄入太學雖至親昵不敢狎也年十四京兆尹薛善辟爲功曹十五以太祖勲授散􅀐常侍車􅀐大將軍儀同三司封成紀縣公武帝即位遷左小宫伯出爲隋州刺史進位大將軍後徴還遇皇妣寢疾三年晝夜不離左右丗稱純孝宇文護執政尤忌髙祖屢將害焉大將軍侯伏侯壽等匡護得免其後襲爵隋國公武帝娉髙祖長女爲皇太子妃益加禮重齊王憲言於帝曰普六茹堅相貌非常臣每見之不覺自失恐非人下請早除之帝曰此止可爲將耳内史王軌驟言於帝曰皇太子非社稷主普六茹堅皃有反相帝不恱曰必天命有在將若之何髙祖甚懼深自晦匿建德中率水軍三萬破齊師於河橋明年從帝平齊進位柱國與宇文憲破齊任城王髙湝於兾州除定州㹅管宣帝即位以后父徴拜上柱國大司馬大象􅀄遷太僕丞右司武俄轉大帝每廵幸􅁪委以居守大象二年五月以髙祖爲楊州惣管將發􅁀有足疾不果行乙未宣帝崩時静帝㓜冲未能親理政事内史大夫鄭譯御正大夫劉昉以髙祖皇后之父衆望所歸遂矯詔引髙祖入㹅朝政都督内外諸軍事周氏諸王在藩者髙祖恐其生變稱趙王招將嫁女於穾厥爲詞以徴之丁未發䘮庚戌周帝拜髙祖假黄􅃏左丞相百官惣已而聽焉十二月甲子周帝詔以郢州之漢東二十郡爲隋國劒履上殿入朝不趨賛拜不名備九錫之禮加璽紱逺遊􅃣相國印緑綟綬位在諸王上隋國置丞相巳下一依舊式髙祖再讓不許於是建臺置官大定元年二月丙辰詔王冕十有二旒建天子旌旗出警入蹕乗金根車駕六馬備五特副車置旄頭雲䍐樂儛八佾設鍾簴宫懸王妃爲王后長子爲太子前後三讓乃授俄而周帝以衆望有歸乃下詔遣大宗伯大將軍金城公趙煚奉皇帝璽紱百官勸進髙祖乃受焉開皇元年二月甲子上自相府常服入宫備禮即皇帝位於臨光殿設壇於南郊遣使柴燎告天是日大赦改元爲開皇六月癸未詔以􅀄受天命赤雀降祥五德相生赤爲火色其郊及社廟依服冕之儀而朝㑹之服旗幟犧牲各令尚赤戎服以黄秋七月乙夘上始服黄百寮畢賀二年六月景申詔曰龍首山川原秀麗卉物滋阜卜食相土冝建都邑定鼎之基永固無窮之業所在公私府宅規模逺近營構資費隨事條奏仍詔左僕射髙熲將作大匠劉龍鉅鹿郡公賀婁子幹太府少卿髙龍乂等創造新都三年春正月庚子將入新都大赦天下六年二月丁亥發丁男十一萬修築長城三旬而罷七年春正月癸巳有事於太廟乙未制諸州􅀊貢三人丁巳祀朝日於東郊已巳陳遣兼散􅀐常侍王亨兼通直散􅀐常侍王眘來聘壬申車駕幸醴泉宫是月發丁男十萬餘修築長城二旬而罷夏四月巳酉幸晉王第庚戍於楊州開山陽瀆以通運漕八年冬十月甲子將伐陳有事於太廟命晉王廣秦王俊清河公楊素並爲行軍元帥以伐陳九年春正月巳巳白虹夾日辛未賀􅀂弼拔陳京口韓擒虎抜陳南豫州癸酉以尚書右僕射虞慶則爲右衛大將軍景子賀􅀂弼敗陳師於蔣山獲其將蕭摩訶韓擒虎進師入建業􅀗其將任蠻奴􅀗陳主叔寳陳國平得州三十郡一百縣四百癸巳遣使持節廵撫之夏四月巳亥幸驪山親勞旋師乙巳三軍凱入獻俘於太廟拜晉王廣爲太尉五月巳夘以吏部尚書蘇威爲尚書右僕射六月乙丑以荆州㹅管楊素爲納言丁丑以吏部侍郎盧愷爲禮部尚書時朝野物議咸願登封秋七月景午詔曰豈可命一將軍除一小國遐邇注意便謂太平予以薄德而封名山用虚言而干上帝非朕攸聞而今以後言及封禪冝即禁絶二十年冬十月乙丑皇太子勇及其諸子並廢爲庶人殺柱國太平縣公史萬􅀊巳巳殺左衛大將軍五原郡公元旻十一月戊子天下地震京師大風雪以晉王廣爲皇太子十二月戊午詔東宫官属不得稱臣於皇太子仁壽元年春正月乙酉朔大赦改元以尚書右僕射楊素爲尚書左僕射納言蘇威爲尚書右僕射丁酉徙河南王昭爲晉王三年七月詔令州縣搜掦賢哲皆取明知今古通識治亂究政敎之夲逹禮樂之源不限多少不得不舉以三旬咸令進路徴召將送必湏以禮四年春正月景辰大赦甲子幸於仁壽宫乙丑詔賞罰支度事無巨細並付皇太子夏四月乙夘上不豫六月庚申大赦天下八月甲辰上疾甚卧於仁壽宫與百寮辭訣並握手歔欷是時唯太子及陳宣華夫人侍疾太子無禮宣華訴之帝怒曰死狗郍堪付後事遽令召勇楊素祕不宣乃屏左右令張衡入拉帝血濺屏風􅁈痛之聲聞于外年六十四在位二十四年史臣曰髙祖龍德在田竒表見異晦明藏用故知我者稀始以外戚之尊受託􅀌之任與能之議未爲當時所許是以周室舊臣咸懷憤惋旣而王謙固三蜀之阻不踰朞月尉遟逈舉全齊之衆一戰而亡斯乃非止人謀抑亦天之所賛也乗兹機運遂遷周鼎于時蠻夷猾夏荆楊未一劬勞日􅉴經營四方樓船南邁則金陵失險驃􅀐北指則單于欵塞職方所載並入疆理禹貢所圗咸受正朔雖晉武之克平吴㑹漢宣之推亡固存比義論功不能尚也七德旣敷九歌巳洽要荒咸曁尉侯無警於是躬節儉平傜賦倉廪實法令行君子咸樂其生小人各安其業強無陵弱衆不􅁀寡人物殷阜朝野歡娯二十年間天下無事區宇之内晏如也考之前王足以叅蹤盛烈但素無學術不能任下無寛仁之度有刻薄之資曁乎暮年此風逾扇又雅好符瑞暗於大道建彼維城權侔京室人皆同帝制靡所適從聽哲婦之言惑邪臣之􅀃溺寵廢嫡託付失人滅父子之道開昆弟之􅂩縱其尋斧剪伐本枝墳土未乾子孫繼踵屠戮松檟􅂊列天下皆非隋有惜哉迹其衰怠之源稽其亂亡之兆起自髙祖成於焬帝所由來逺矣非一朝一夕其不祀忽諸未爲不幸也賜皇帝隋書曰焬皇帝諱廣一名英小字阿􅐣髙祖第二子也母曰文獻獨􅀌皇后上羙姿儀少敏慧髙祖及后於諸子中特所鍾愛在周以髙祖勲封鴈門郡公開皇元年立爲晉王拜柱國并州揔管時年十三尋授武衛大將軍進位上柱國河北道行臺尚書令大將軍如故髙祖令項城公韶安道公才李徹輔導之上好學善屬文沉深嚴重朝野属望髙祖宻令善相者來和遍視諸子和曰晉王眉上􅀟骨隆起貴不可言旣而髙祖幸上居第見樂器絃多斷絶又有塵埃若不用者以爲不好聲妓善之上尤自矯飾當時稱爲仁孝嘗觀獵遇雨左右進油衣上曰士卒皆霑濕我獨衣此乎乃令持去六年轉淮南道行臺尚書令其年徴拜雍州牧内史令八年冬大舉伐陳以上爲行軍元帥及陳平進位太尉賜輅車乗馬衮冕之服玄珪白璧各一復拜并州揔管髙祖之祠太山領武候大將軍明年歸藩後數載突厥宼邊復爲行軍元帥出靈武無虜而還及太子勇廢立上爲皇太子是月當受􅁽髙祖曰吾以大興公成帝業令上出舎大興縣其夜烈風大雪地震山崩民舎多壞壓死者百餘口仁壽􅀄奉詔廵撫東南是後髙祖每避暑仁壽宫恒令上監國四年七月髙祖崩上即皇帝位於仁壽宫八月奉梓宫還京師并州揔管漢王諒舉兵反詔尚書左僕射楊素討平之十一月癸丑詔可於伊雒營建東京即設官分職以爲民極也大業元年正月壬辰朔大赦改元立妃蕭氏爲皇后改豫州爲􅁗州洛州爲豫州廢諸州揔管府景申立晉王昭爲皇太子三月丁未詔尚書令楊素納言楊逹將作大匠宇文愷營建東京徙豫州郭下居民以實之辛亥發河南諸郡男女萬餘開通濟渠自西苑引榖洛水逹於河自板渚引河通於淮庚申遣黄門侍郎王弘上儀同於上澄往江南採木造龍舟鳯舸黄龍赤艦樓船等數萬艘七月景子詔曰今宇宙平一文軌攸同十歩之内必有芳草四海之中豈無竒秀諸在家及見入學者􅀂有篤志好古躭恱典墳學行優敏堪膺時務所在採訪具以名聞即當隨其器能擢以不次八月壬寅上御龍舟幸江都以左武衛大將軍郭衍爲前軍李景爲後軍文武官五品巳上給樓舩九品巳上給黄蔑舳艫相接二百餘里冬十月巳丑赦江淮巳南陽州給復五年舊揔管内給復三年二年春正月辛酉東京成賜監督者各有差三月庚午車駕發江都夏四月庚戍上自伊闕陳法駕備千乗萬􅀐入於東京辛亥上御端門大赦免天下今年租賦三年四月甲午詔曰夫孝悌有聞人倫之夲德行敦厚立身之基或節義可稱或操履清潔所以激貪厲俗有益風化強毅正直執憲不撓學業優敏文才美秀並爲廊廟之用寔乃瑚璉之資才堪將略則抜之以禦侮膂力驍壯則任之爪牙爰及一藝可取亦冝採録衆善畢舉與時無弃以此求治庶幾非逺文武有職事者五品巳上宜依今十科舉人有一於此不必求備朕當待以不次隨才升擢景申車駕北廵狩六月戊子次榆林郡丁酉啓民可汗來朝巳亥吐谷渾髙昌並遣使貢方物甲辰上御北樓觀漁於河北宴百僚秋七月辛亥啓民可汗上表請變服襲􅃣帶詔啓民賛拜不名位在諸侯王上甲寅上於郡城東御大帳其下備儀衛建旌旗宴啓民及其部落三千五百人奏百戯之樂賜啓民及其部各有差八月壬午車駕發榆林乙酉啓民飾廬清道以候乗輿帝幸其帳啓民奉觴上壽宴賜極厚上謂髙麗使者曰歸語尓王當早來朝見不然者吾與啓民廵彼土矣皇后亦幸義城公主帳己丑啓民可汗歸蕃癸巳入樓煩􅀜壬寅次太原詔營晉陽宫九月己未次濟源幸御史大夫張衡宅宴享極歡己巳至于東都五年三月己巳車駕西廵河右乙亥幸扶風舊宅夏四月己亥大獵於隴西壬寅髙昌吐谷渾伊吾並遣使來朝乙巳狄道党項羗來貢方物癸亥出臨津􅀜渡黄河至西平陳兵講武五月乙亥上獵於抜延山長圍周亘二千里庚辰入長寧谷度星領甲申宴羣臣於金山之上六月景午次張掖辛亥詔諸郡學業該通才藝優敏膂力驍壯超絶等倫在官勤舊堪理政事立性正直不避強禁四科舉人壬子髙昌王麴伯雅來朝伊吾吐屯設等獻西域數千里之地上大恱景辰上御觀風行殿盛陳文物奏九部樂設魚龍曼延宴髙昌王吐屯設於殿上以寵異之其蠻夷陪列者三十餘國戊午大赦天下文皇巳來流配悉放還郷晉陽逆黨不在此例寵右諸郡給復一年行經之所給復二年秋七月丁夘置馬牧於青海渚中以求龍種無効而止九月癸未車駕入長安六年二月庚申徴魏齊周陳樂人悉配太常三月癸亥幸江都宫甲子以鴻臚卿史祥爲左驍衛大將軍夏四月丁未宴江淮巳南父老頒賜各有差七年二月己未上升釣臺臨楊子津大宴百寮頒賜各有差庚申百濟遣使朝貢乙亥上自江都御龍舟入通濟渠遂幸於涿郡八年正月辛巳大軍集於涿郡壬午下詔曰髙麗小醜昬迷不恭崇聚渤碣之間荐食遼􅁾之境親㹅六師用伸九伐拯厥阽危恊從天意􅀂髙麗泥首轅門自歸司寇即宜解􅅞焚櫬弘之以㤙其餘臣人歸朝奉順咸加撫慰各安生業隨才任用無隔夷夏營壘所次務在整肅芻蕘有禁秋毫勿犯布以恩宥喻以禍福若其同惡相濟抗拒官軍國有常刑俾無遺􅀋明加曉示稱朕意焉揔管一百一十三萬三千八百號二百萬其餽運者倍之癸未第一軍發終四十日引師乃盡旌旗亘千里近古出師之盛未之有也三月癸巳上御師甲子臨戎於遼水橋戊戌大軍爲賊所拒不果濟右屯衛大將軍左光禄大夫麥鐵杖武賁郎將錢士雄孟金乂等皆死之甲午車駕渡遼大戰於東岸擊賊破之進圍遼東時諸將各奉旨不敢赴機旣而髙麗各城守攻之不下六月己未幸遼東責怒諸將止城西數里御六合城七月壬寅宇文述等敗績於薩水右屯衛將軍辛丗雄死之九軍並䧟將帥奔還亡者二千餘􅀐癸卯班師九月庚寅上至東都九年春正月丁丑徹天下兵募民爲驍果集於涿郡二月戊寅幸遼東以越王侗民部尚書樊子盖留守東都庚子北海人郭方預聚徒爲盗自號盧公衆至三萬攻䧟城大掠而去夏四月庚午車駕渡遼壬申遣宇文述楊義臣􅃐平壤五月丁丑熒惑入南斗己夘濟北人甄寶車聚衆萬餘寇掠城邑六月乙巳禮部尚書楊玄感反於􅀺陽丙辰玄感逼東都河南賛治裴􅀪䇿拒之反爲賊所敗戊辰兵部侍郎斛斯政奔於髙麗庚午上班師髙麗犯後軍八月壬寅左翊衛大將軍宇文述等破楊玄感於閿郷斬之餘黨悉平十年二月辛夘詔曰菆尓髙麗僻居荒表鴟張狼噬侮慢不恭抄􅀼我邊陲侵軼我城鎮是以去􅀊出軍問罪遼碣殪長蛇於玄莬戮封豕於襄平扶餘衆軍風馳電逝追奔逐北徑踰沮水滄海舟檝衝賊腹心焚其城郭汚其宫室髙元伏鑕泥首送欵軍門尋請入朝歸罪司寇朕以許其改過乃詔班師而長惡靡悛宴安鴆毒此而可忍孰不可容便可分命六師百道俱進朕當親執武節臨御諸軍秣馬九都觀兵遼水順天誅於海外救窮民於倒懸征伐以正之明徳以誅之止除元惡餘無所問三月壬子行幸􅃰郡癸亥次臨渝宫親御戎服禡􅀕黄帝斬叛軍者以釁鼔秋七月甲子髙麗遣使降囚送斛斯政上大恱八月己巳班師二月壬申上如東都其日大赦天下戊子入東都十二年七月甲子幸江都宫以越王侗光禄大夫叚逹太府卿元文都檢校民部尚書韋津右武衛將軍皇甫無逸右司郎盧楚等惣留後事十三年二月巳丑馬邑校尉劉武周殺太守王仁恭舉兵作亂北連突厥自稱定楊可汗庚寅賊帥李宻翟譲等䧟興洛倉越王侗遣武賁郎將劉長恭光禄少卿房崱擊之反爲所敗死者十五六庚子李密自號魏公稱元年開倉以賑羣盗衆至數十萬河南諸郡相繼皆䧟焉五月甲子唐公起義師於太原丙寅突厥數千寇太原唐公擊破之秋七月壬子熒惑守積屍丙辰武威人李軌舉兵反攻䧟河西諸郡自稱凉王建元安東八月辛巳唐公破武牙郎將宋老生於霍邑斬之十一月景辰唐公入京師辛酉遥尊帝爲太上皇立代王侑爲帝改元義寧帝在江都聞唐公舉兵動容者乆之以手琢按曰渠有竒相渠得之矣如此者再三遂欲渡江幸丹陽時􅀫衛諸將皆是􅁗人各有懷土之志宇文化及因人之心與裴䖍通作亂入犯宫闈􅀫衛皆走遂執帝將出示衆數以十罪復引帝入求鴆不得令狐行逹牽帝使坐以練布縊之時年五十蕭后令宫人撤床簀爲棺以埋之化及發後右禦衛將軍陳稜奉梓宫於成象殿葬吴公臺下發歛之始容㒵􅀂生衆咸異之唐平江南之後改葬雷塘􅀄上自以蕃王次不當立每矯情飾行以釣虚名隂有奪宗之計時髙祖雅信文獻皇后而性忌媵妾皇太子勇内多嬖幸以此失愛帝後庭有子皆不育之示無私寵取媚於后大臣用事者傾心與交中使至第無遺賤皆曲承顔色伸以厚禮婢僕徃來者無不稱其仁孝又常私入宫掖宻謀於獻后楊素等因機􅌟扇遂成􅆸立太平御覽卷第一百六
