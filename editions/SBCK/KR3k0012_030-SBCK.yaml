  text: 太平御覽卷第三十時序部十五
  hash: sha256:a46555099d03cf9be034474f5dbedffffde2852c40a7b34fc02aa6c2fa084763
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_030-1a}
body:
  text: 人日正月十五日晦日中和節社寒食三月三日人日荆楚歳時記曰正月七日爲人日董勛問禮俗曰正月一日爲雞二日爲狗三日爲猪四日爲羊五日爲牛六日爲馬七日爲人以七種菜爲羮翦綵爲人或鏤金薄爲人以貼屏風亦戴之頭􅁂董勛問禮俗云人入新年形容改從新又造華勝相遺起於晉代見賈充李夫人典戒云像瑞圖金勝之形又取像西王母戴勝也舊以正月七日爲人故名爲人日今北人此日亦有諱食菜者與楚食正反剪綵鏤金薄爲人皆符人日之意與正旦鏤雞於戸同北人亦有至人日諱食故歳菜唯食新菜者又餘日不刻牛羊狗猪馬之像而二日獨施人雞此則未喻郭縁生􅄒征記云壽張縣安民山魏東平王鑿山頂爲㑹望處刻銘於壁文字猶在所載銘辞即此處老子云衆人熈熈如登春臺如享大牢楚詞云目極千里傷春心則春日登臨自古爲適但不知七日竟起何代晉代桓温參軍張望亦有正月七日登高詩近代巳來南北同耳北人此日食煎餅於庭中作之云薰大未知所出也雜五行書曰正月七日男吞赤豆七顆女呑二七顆竟年無病又曰宋武帝女壽陽公主人日卧於含章殿簷下梅花落公主額上成五出花拂之不去皇后留之看得幾時經三日洗之乃落宫女竒其異竟效之今梅花粧是也談藪曰北齊髙祖七日􅂛髙宴羣臣問曰何故名人日魏收對以董勛正月一日爲雞七日爲人按一說云天地􅀄開以一日作雞七日作人也劉臻妻陳氏進見儀曰正月七日上人勝於人魏東平王是日登壽張安仁山銘曰正月七日厥日惟人䇿我良駟陟彼安仁隨陽休之正月七日登髙侍晏詩曰廣殿麗年輝上林起春色風生拂雕輦雲廻浮綺翼隨薛道衡人日思歸詩曰入春􅂊七日離家巳三年人歸落鴈後思發在花前晉李充正月七日登剡西寺詩曰命駕升西山寓目眺原疇正月十五日史記樂書曰漢家祀太一以昬時祠到明今人正月望日夜游觀燈是其遺事荆楚歳時記曰正月十五日作豆糜加油膋其上以祠門戸齊諧記曰正月半有神降陳氏之宅云是蠶室􅀂能見祭當令蠶桑百倍疑非其事􅀕門備之七祠今州里風俗望日祠門其法先以楊枝挿門而􅀕之齊諧記曰吴縣張成見一婦人立宅東南角謂成曰此地是君􅁞室我即地神矣正月半日可作白粥泛膏於上以祭之當令君家蚕桑百倍言訖而去絶失所在或爲作膏粥巳後年年大得蚕世人正月半作粥禱之加以􅁏覆其上登屋食之呪云登膏糜挾䑕腦欲來不來待我三蚕老則以爲蚕襄鼠與齊諧記相符又覆􅁏亦是覆膋之理石虎鄴中記正月十五日有登髙之㑹則登髙又非今世而然者也其夕則迎紫姑以卜劉敬叔異苑云紫姑夲人家妾爲大婦所妬正月十五日感激而死故世人作其形迎之云子壻不在云是其壻曹夫人巳行云是其姑紫姑可出異苑又云於厠間或猪欄邊迎之捉之覺重是神來也平昌孟氏甞以此日迎之遂穿室而自尓正著以敗衣盖爲此也洞覽云帝嚳女將死云生平好樂至正月可以見迎又其事也俗云溷厠之間必湏浄然後能致紫姑異苑曰世人以十五日迎紫姑捉者覺重便是神來奠設酒果亦􅁴皃輝輝有色即跳躁不住能占衆事卜將來蚕桑又善射鈎好即大舞惡則仰眠平昌孟氏􅁪不信躬試往捉便自躍穿頂求失所在也唐兩京新記云正月十五日夜勑金吾㢮禁前後各一日以看燈光􅀂晝日世􅀃正月十五日祢衡甞􅀍魏武謫爲鼓吏於此日試鼓漁陽桴作魚陽叅淵淵有金石聲後漢書注曰文士傳曰衡擊鼓爲漁陽叅撾蹋地來躡足􅉥脚容態不常鼓節甚悲易衣單復擊鼓叅撾而去至今有漁陽撾自衡始也叅音七甘切陳太子舎人徐德言之妻叔寳之妹封樂昌公主才色冠絶時陳政方亂德言知不相保謂其妻曰以君之容國亡必入權豪之家儻情縁未断猶兾相見冝有以信之乃破一鏡人執其半約曰他日必以正月望日賣於都市我當在即以是日訪之及陳亡其妻果入楊素之家德言遂以正月望日訪於都市有蒼頭賣半鏡者大髙其價人皆􅀏之德言直引至其居出半鏡以合之仍題詩曰鏡與人俱去鏡歸人不歸無復姮娥影空餘明月輝陳氏得詩涕泣不食素知之還其妻仍厚遺之與德言歸江南竟以終老玉燭寳典曰正月十五日作膏粥以祠門户西域記曰摩竭陁國正月十五日僧徒俗衆雲集觀佛舎利放光􅀨花唐蘇味道正月十五日夜詩曰火樹銀花合星橋鐵鏁開暗塵隨馬去明月逐人來游􅀐皆穠李行歌盡落梅金吾不惜夜玉漏莫相催又崔液正月望夜游詩曰玉漏銅壷且莫催鐵􅀜金鏁徹明開誰家見月能閑坐何處聞燈不看來又曰神燈佛火百輪張刻像圖形七寳裝影裏如聞金口說空中似散玉毫光又曰金勒銀鞍控紫騮玉輪朱幰駕青牛驂驔始散東城曲倐忽還逢南陌頭晦日荆楚歳時記曰元日至于月晦並爲酺聚飲食每月皆有􅁌望晦朔以正月􅀄年時俗重以爲節士女汎舟或臨水宴樂玉燭寳典曰元日至月晦人並爲酺食渡水士女悉湔裳酹酒於水湄以爲度厄今世人唯晦日臨河解除婦人或湔裙後魏盧元明晦日泛舟應詔詩曰輕􅁅吹上管落蓂飄下蔕遲遲春色華晼晼年光麗北齊魏收晦日泛舟應詔詩曰裊裊春枝弱􅀜􅀜新鳥呼棹唱忽逶迤菱歌詩顧慕睿賞方月色宴言忘日暮猶豫慰人心照臨康國歩唐太宗月晦詩晦魄移中律凝暄起麗城􅇁雲朝盖上穿露暁珠呈􅀏樹花分色啼枝鳥合聲披􅁭勤眺望極目暢春情中和節唐書云貞元五年正月十一日詔曰四序嘉辰歴代増置漢宗上巳晉紀重陽或􅀃穰除雖因舊俗與衆宴樂誠洽當時朕以春方發生􅀱維仲月勾萌畢逹天地同和俾其昭􅂫冝均暢茂自今已後以二月一日爲中和節内外官司並休假一日先勑百寮以三令節集㑹今冝以中和節代晦日中和之節自兹始也又曰其月二十八日中書侍郎李泌奏伏以仲春􅀄吉制嘉節以徴之更晦日於往月之終揆明辰於來月之始請令文武百辟以是日進農書司農獻穜稑之穜三公戚里上春服士庶以刀尺相遺村社作中和酒祭勾芒神聚㑹宴樂名爲饗勾芒祈年􅂖仍望各下州府所在頒行從之又云貞元六年上以中和節宴百寮於曲江上賦詩以賜之百官皆和焉是歳戴叔倫爲容州刺史素有詩名上乃令録其詩以賜之社孝經緯曰社土地之主也土地闊不可盡􅀕故封工爲社以報功也禮記月令曰二月之節是月也擇元日命人社爲祀社稷也春事興故祭之以祈農祥元日謂近春分前後戊日元吉也又曰王爲群姓立社曰太社􅁟自立社曰皇社諸侯爲百姓立社曰國社自立社曰侯社大夫巳下立社曰置社尚書曰用命則賞于祖不用命則戮于社社主隂隂主殺論語曰魯哀公問社於宰我對白夏后氏以松殷人以栢周人以栗曰使民戰史記曰共工氏之子爲后土能平水土故祀以爲社故天子曰大社必受霜露風雨以逹天地之氣也社所以親地也地載万物天垂象取法於天所以尊天而親地也社共粢盛所以報本反始也漢書曰陳平爲里中社宰分􅁏甚均父老善之平曰使平得宰天下亦如此􅁏又曰髙祖天下定詔御史令治榆社春用羊彘祠之魏志曰王脩年七歳䘮母母以社日亡來年隣里社脩感念母悲哀其隣里聞爲之罷社晉書曰阮脩字宣子伐社樹或止之籍曰或社爲樹伐樹則社移樹而爲社伐樹則社亡也荆楚歳時記曰社日四隣並結綜㑹社牲醪爲屋於樹下先􅀕神然後饗其昨鄭氏云百家共一社今百家所社綜即共立之社也寒食荆楚歳時記曰去冬節一百五日即有疾風甚􅀨謂之寒食據暦合在清明前二日亦有去冬至一百六日陸翽鄴中記曰寒食三日作醴酪又煑粳米及夌爲酪擣杏仁煑作粥案玉燭寳典今日悉爲大夌粥研杏仁爲酪别餳沃之又孫楚祭子推文云􅁰飯一盤醴酪二盂是其事也又曰并州俗冬至一百五日爲介子推斷火冷食三日作乾粥是今之糗也范曄後漢書曰周舉遷并州刺史太原一郡舊俗以介子推焚骸有龍忌之禁至其月咸言神靈不樂舉火舉移書於子推廟云春中寒食一月老小不堪今則三日而巳魏武帝明罰令曰聞太原上黨西河鴈門冬至後百有五日皆􅴟寒之地老少羸弱將有不堪之患令人不得寒食􅀂犯者家長半歳刑主吏百日刑令長奪一月俸周斐汝南先賢傳曰太原舊俗以介子推焚骸一月寒食莫敢煙㸑劉向別録曰寒食蹋蹴黄帝所造夲兵勢也或云起於戰國案鞠與毬同古人蹋蹴以爲戯古今藝術圖云寒食鞦韆夲北方山戎之戯以習輕趫者也又按周舉移書及魏武明罰令陸翽鄴中記並云寒食断火起於子推琴操所云子綏綏即推也又云五月五日與今有異皆因流俗所傳據左傳及史記並無介子推􅀍焚之事案周禮司烜氏仲春以木鐸脩火禁于國中注云爲季春將出火也今寒食准節氣是仲春之末清明是三月之􅀄然即禁火盖周之舊制玉燭寳典曰寒食此節城市尤多􅋐雞􅆑之戯左傳有季郈􅋐雞其來逺矣同書時訓曰清明之日桐不華歳有大寒曰䑕不化國多貪殘虹不見婦人亂色戴勝不降桑政教不平唐李崇嗣寒食詩曰普天皆滅熖匝地盡藏煙不知何處火來就客心燃又宋之問途中寒食詩曰馬上逢寒食途中属暮春可憐江浦望不見洛橋人又沈佺期嶺表逢寒食詩曰嶺外逢寒食春來不見􅄳洛陽新甲子何日是清明三月三日漢書曰武帝即位數年無子平陽公主求良家女十餘人飾置於家帝祓灞上而過焉還平陽主主見所待美人帝不恱旣飲謳者進帝獨恱衛子夫􅀿劭云祓除也今月上巳祓禊是也又漢書禮儀志曰三月上巳日官人並禊飲於東流水又曰太后春幸蚕舘率皇后列侯夫人桒遵灞水而祓除又曰三月上巳官民皆㓗於東流水上自洗濯祓除去􅀫垢爲大㓗㓗者言陽氣布暢萬物記出始㓗之也續漢志曰上已大㑹賔從於薄落津後漢書曰梁啇上已日㑹賔客於洛水酒酣継以薤露坐者聞之皆爲掩泣曰此所謂哀樂失時非其所也殃將及乎啇至秋果薨魏志曰􅀽紹三月上已大㑹賔從於簿落津聞魏郡兵及黒山賊于毒等數萬人共覆鄴城殺守坐中客家在鄴者皆憂怖失色或起而立紹容皃自􅀂不改常度又晉中興書曰王導謂從兄敦曰王仁德未著而名位猶輕兄名巳振冝有以共相匡舉㑹三月三日中宗出禊乗肩輦敦導並􅀐從紀瞻使人覘之旣聞敦導􅀐從乃大驚自出拜於道左中宗從容謂導曰卿吾之蕭何也宋書曰武帝三月三日登八公山劉安故臺望日城郭如疋帛之繞藂花也崔鴻十六國春秋曰李暠三日讌于曲水命羣僚賦詩暠爲之序韓詩曰溱與洧方洹洹􅀆洹洹盛皃也謂三月桃花水下之時至盛也惟士與女方秉蕳􅀆秉執也蕳蘭也當此盛流之時衆士與衆女方執蘭拂除邪􅁖鄭國之俗三月上巳之辰此雨水之上招魂續魄拂除不祥故詩人願與所恱者俱往觀之荆楚歳時記曰三月三日四人並出江渚池沼間爲流杯曲水宴續齊諧記曰晉武帝問尚書郎摯虞曰三日曲水其義何指荅曰漢章帝時平原徐肇以三月􅀄生三女至三日而俱亡一村以爲恠乃相携之水濵盥洗因水以泛觴曲水之義起於此也帝曰􅀂如所談便非好事尚書郎束晢曰摰虞小生不足以知之臣請說其始昔周公城洛邑因流水以泛酒故逸詩云羽觴隨波又秦昭王三日置酒河曲見有金人出捧水心劒曰令君制有西夏及秦霸諸侯乃因此處立爲曲水二漢相縁皆爲盛集帝曰善賜金五十斤左遷摯虞爲陽城令夏仲御別傳曰夏仲御詣洛到三月三日洛中公王以下莫不方軌連􅎮並南浮橋邊禊男則朱服耀路女則錦綺粲爛仲御時在舡中曝所市藥雖見此輩稳坐不揺賈充望見深竒其節顧相與語此人有心膽有似兾缺走往問舡中安坐者爲誰仲御不應重問徐乃荅曰㑹稽北海間民夏仲御夏統字仲御風土記曰漢末有郭虞者有三女一女以三月上辰一以上巳二日而三女産乳並亡迄今時俗以爲大忌故到是月是日婦女忌諱不復止家皆適東流水上就通逺地祈祓自㓗濯也丘淵之征齊道里記曰城北十五里有栁泉符朗常以爲解禊處鄴中記曰石虎三月三日臨水㑹公主妃主名家婦女無不畢出臨水施張幔車服粲爛走馬歩射飲宴終日陸翽鄴中記曰華林園中千金堤上作兩銅龍相向吐水以注天泉池通御溝中三月三日石季龍及皇后百官臨池㑹賞續捜神記曰盧充獦見麞便射中之隨逐不覺逺忽見一黒門如府舎問鈴下鈴下對曰崔少府宅也進見少府語充云尊府君爲索小女婚故相迎耳三日畢車送充至家母問之具以􅃺對與崔別正四年而三月三日臨水戯遥見傍水有犢車充往開車户見崔女與三男共載情意如􅀄抱兒還充又與金鋺乃別戴延之西征記曰天泉之南有東西溝承御溝水水之北有積石壇云三月三日御坐流杯之處雜五行書曰欲知蚕善惡常三月三日天隂而無日不􅀨蚕大善風俗通曰謹案周禮女巫掌歳時以祓除疾病禊者㓗也故於水上盥㓗之也巳者祉也邪疾已去祈介祉也竹林七賢論曰王濟嘗解禊浴水明日或問王曰昨日遊有何語議荅曰張華善􅀃史漢裴逸民叙前言往行衮衮可聽晉羲之三月三日蘭亭序曰永和九年歳在癸丑暮春之􅀄㑹于㑹稽山隂之蘭亭修禊事也群賢畢至少長咸集此地有崇山峻嶺茂林脩竹又有清流激湍映帶左右引以爲流觴曲水列坐其次雖無絲竹管􅃶之盛一觴一吟亦足以暢叙幽情是日也天㓪氣清惠風和暢仰觀宇宙之大俯察品􅀋之盛所以遊目騁懷足以極視聽之娱信可樂也宋顔延之三日曲水詩序曰日􅆞胃維月􅁤青陸皇祗發生之始后土布和之辰思對上靈之心以荅庻萌之願有詔掌故爰命司暦獻洛飲之禮具上巳之儀南徐輦道北清禁林略亭臯跨芝田菀太液懷層山山居峻垝葱翠幽烟於是離宮衛設別殿周徼然後昇秘駕引緹􅀐揺玉鸞發流吹天動神移淵渟雲委以降于行所禮也梁沈約三日率尓成篇曰麗日属元已年芳具在斯開花巳匝樹流鸎復滿枝洛陽繁華子長安輕薄兒東出千金堰西臨鴈鶩陂遊絲映空轉髙栁拂地垂絲萍文照曜紫鷰光陸離清晨戯伊水薄暮􅀫蘭池象筵排寳瑟金瓶泛羽巵寧憶春蠶起日暮桑欲萎梁簡文帝三月曲水詩序曰竊以周成洛邑自流水以禊除晉集華林同文􅁤而髙宴莫不禮具義舉沓矩重規照動神明雍熈鍾石是節也上巳属辰餘萌逹壤倉庚應律女夷司􅀱尓乃分階樹羽踈泉泛爵羽觴㳂泝蕙肴沓來賔儀式序盛德有容舞艶七盤歌浮六變遊雲駐彩仙鶴來儀都人野老雲集霧㑹結軫方衢飛軒照日晉張華三月三日後園㑹詩曰暮春元日陽氣清明祁祁甘􅀨膏澤流盈習習祥風啓滯導生禽鳥逸豫桑麻滋榮纎條􅀍緑翠華含英於我皇后欽􅀂昊乾順時省物言觀中園讌及群辟乃命􅀄筵合樂華池祓濯清川汎彼龍舟泝游洪源又張華上巳篇曰仁風導和氣勾芒御昊春沽洗應時月元巳啓良辰明從自逺至童冠八九人伶人理新樂膳工獻時珎春醴踰九醖冬青過十旬晉閭丘冲三月三日應詔詩曰暮春之月春服旣成􅂛陽潤土冰渙川􅄹餘萌逹壤嘉木敷榮后皇宣遊旣讌且寧光光華輦侁侁從臣上䕃丹幄下藉文茵臨池挹盥濯故絜新俯鏡清流仰睇天津藹藹華林巖巖景陽嶪嶪峻宇弈弈飛梁垂䕃倒景􅀂翶􅀂翔浩浩白水汎汎龍舟皇在靈沼百辟周遊激櫂清歌鼓枻行謳聞樂咸和具醉斯柔在昔帝虞德􅀍遐荒千鏚在庭苗人來王今我哲后古聖齊芳惠此中國以綏四方元首旣明股肱惟良樂只君子今日惟康又潘尼上巳日帝㑹天淵池詩曰青春暮月六氣和理律應姑洗日惟元己谷風散凝微陽戒始春服旣成明靈降祉又陸機櫂歌行曰遲遲暮春日天氣柔且嘉元􅁻陸􅀄巳濯穢遊黄河龍舟浮鷁首羽旗垂藻葩乗風宣飛景逍遥戯中波隋盧思道上巳禊飲詩曰山泉好風日城市厭囂塵􅂓持一樽酒共㝷千里春餘光下幽桂夕吹舞青蘋何時出􅀜後重有入林人唐沈佺期三月三日棃園亭侍宴詩曰九門馳道出三巳禊堂開􅀞鷁中川動青龍上苑來野花飄御座河栁拂天杯日晚迎祥處笙鏞下帝臺後漢張衡南都賦曰於是暮春之禊元巳之辰方䡄齊􅎮祓于陽濵朱帷連綱曜野暎雲男女妖􅕼服絡繹何􅌭紛晉成公綏洛禊賦曰考􅁻日簡良辰祓除鮮禊同㑹洛濵妖童媛女嬉逰河曲或渙纎手或濯素足臨清流坐沙􅂣列罍樽飛羽觴又張恊禊賦曰夫何三春之令月嘉天氣之絪緼流水清泠以汪濊原隰葱翠以龍鱗於是縉紳先嘯疇命友携接黨童冠者八九主希孔墨賔慕顔栁􅀂夫權戚之家豪侈之族乗􅀐齊鑣華輪方轂青盖雲浮參􅏔相属集于長洲之浦曜乎泠川之曲遂乃停與蕙渚息駕蘭田朱幔虹舒翠幕蜺連浮素􅆑以蔽水洒􅀇醪於中河水禽爲之駭踊陽侯爲之動波又阮瞻上巳會賦曰臨清川而嘉讌聊睱日以遊娱䕃朝雲而爲盖託茂樹以爲廬又王廙洛都賦曰􅀂乃暮春嘉褉三巳之辰貴賤同遊方􅂹齊輪麗服靚粧祓乎洛濵流芳塞路炫日暎雲又禇爽禊賦曰伊暮春之令月將解褉於通川川廻瀾以澄暎嶺峭崿以霏烟輕霞舒於翠崖白雲暎於青天風透林而自清氣扶嶺而載鮮太平御覽卷第三十
