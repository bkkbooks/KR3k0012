  text: 太平御覽卷第八百三十四資産部十四
  hash: sha256:3f2dcb9da11f3405f2930f20bc62fbbf9e70fa34e96823d214dfdeaecc1c8d57
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_834-1a}
body:
  text: 釣筌罛網􅅈罶罺􅇁涔􅊻笱欚梁軥罠罨箄􅩬銛釣毛詩何彼穠矣曰其釣維何維絲伊緡伊維緡綸也箋云釣者以此有求於何彼以爲之乎以絲爲之綸則是善釣也又國風竹竿曰籊籊竹竿以釣于淇又小雅采緑曰之子于釣言綸之繩綸釣繳也其釣維何維魴及鱮維魴及鱮薄言觀者論語􅄒而曰子釣而不綱綱謂爲大索横流屬釣尚書大傳曰周文王至磻溪見吕望釣文王拜之尚云望釣得玉璜刻曰周受命吕佐檢徳合于今昌來提戰國䇿曰魏王與龍陽君共􅂳而釣龍陽君得十餘魚而涕下王曰何謂也對曰臣之始得魚也臣甚喜後得益大今欲弃臣前之所得矣今臣與王拂枕席爵至人君走人於庭避人於塗四海之内其美人多矣聞臣之得幸王也必裂裳而趍王臣亦猶曩之所得魚也亦將弃矣臣安能無涕乎魏王曰有是心也何不相告於是布令於四境之内曰有敢言美人者族謝承後漢書曰鄭敬隱於蟻陂釣魚大澤折芰爲坐以荷薦􅁏瓠瓢盈酒琴書自娯後漢書曰郭玉者廣漢人􅀄有老父不知何所岀常漁釣於涪水自號涪翁乞養民間見有病者時下針石有效王從受術焉又曰嚴光字子陵㑹稽餘姚人少有髙名與光武同遊及光武即位乃變姓名隱身不見帝思其賢令以物色訪之後齊國上言有一男子披羊裘釣澤中帝疑其光也備安車􅀇纁聘之三反而後至拜爲諌議大夫不屈乃耕於冨春山後人名其釣處爲嚴陵瀬晉書曰翟莊湯之子也少以弋釣爲事及長不復獵或問魚獵同是害生之事而先王止去其一何哉莊曰獵自我釣自物未能頓去故先節其甚者夫貪餌吞鈎豈我哉時人以爲知言宋書曰王弘之性好釣上虞江有一處名石頭弘之常垂綸於此經過者不識之或問漁師得魚賣不弘之曰亦不得得亦不賣日夕載魚入上虞郭經親故門各以一兩頭置門内而去又曰文帝甞與群臣臨天泉池帝垂綸良乆不􅀗王景文越席曰臣以爲垂綸者清故不獲貪餌衆皆稱善又曰漁父者不知姓名亦不知何許人也太康孫緬爲㝷陽太守落日逍遥渚際見一輕舟凌波隱顯俄而漁父至神韻蕭灑垂綸長嘯􅃡其異之乃問有魚賣乎漁父􅀏而荅曰其釣非釣寧賣魚者耶􅃡益怪焉遂褰裳渉水謂曰竊觀先生有道者也終朝鼓枻良足勞止吾聞黄金白璧重利也駟馬髙蓋榮􅀔也方今主道文明守在海外隱淪之士靡然向風子胡不賛緝熈之美何晦用其􅀂是也漁父曰僕山海狂人不逹丗務未辯賤貧無論榮貴乃歌曰竹竿籊籊河水悠悠相忘爲樂貪餌吞鈎非夷非惠聊以忘憂於是悠然鼓棹而去孔叢子曰子思居衛衛人釣於河得鱞一作魚魚焉其大盈車子思問之曰鱞魚魚之難得者也子如何得之對曰吾下釣垂一魴之餌鱞過而弗視也更以豚之半體則吞之子思喟然曰鱞雖得貪以死餌士雖懷道貪以死禄文子曰魚不可以無餌釣獸不可以空器召列子曰詹何以獨璽絲爲綸芒針爲鈎荆條爲竿剖粒爲餌引盈車之魚於百仭之川洎流之中綸不絶鈎不申竿不撓因水勢而施舎也又曰渤海之東有大壑焉實惟無底之谷其中有五山常隨潮波上下徃還不得暫峙使巨鼇十五舉首而載之五山始峙而不動而龍伯國有大民曁五山之所一釣而連六鼇合􅀒而趨歸其國灼其骨以數焉荀卿子曰自上莅下猶夫釣者焉隱於手而應於釣則可以得魚􅀑谷子曰古之善摩者如操釣而臨深淵而投之必得魚矣闕子曰魯人有好釣者以桂爲餌黄金之鈎錯以銀碧垂翡翠之綸其持竿處位即是然其得魚不幾矣故曰釣之務不在芳飾事之急不在辯言莊子曰莊子釣於濮水之上楚王使大夫二人徃見焉曰願以境内累夫子莊子持竿不頋又曰任公子好釣巨魚爲大綸巨釣以犗牛爲餌蹲㑹稽投東海朞年不得魚巳而大魚食之牽巨釣驚􅀭波而􅁬鬐白波􅀂山海水振蕩任公子得􅀂魚離而腊之浙河以東蒼梧以北莫不厭􅀂魚者淮南子曰詹公之釣千歳之鯉又曰聖人以道德爲竿以昏義爲鈎餌役之天地門萬物孰非其有哉又曰無餌之釣不可以得魚愚士無禮不可以得賢又曰釣者静之罛者舟之􅇁者抑之􅊻者舉之爲之異得魚一也孫綽子曰海人與山客辯其方物海人曰横海有魚額􅀂華山之頂一吸萬頃之波山客曰鄧林有木圍三萬㝷直上千里傍䕃數國有人曰東極有大人斬木爲䇿短不可支釣魚爲鮮不足充饑抱朴子曰金鈎玉餌雖珍而不能制九淵之沉鱗顯寵豐禄雖貴而不能致無欲之幽人符子方外曰太公釣隱溪五十有六年矣而未甞得一魚魯連聞之徃而觀其釣太公跪石隱崖且不餌而釣仰詠俯吟及暮而釋竿􅀓子曰劉曄責楊曁曰夫釣者中大魚則縱而隨之湏可制而後牽之則無不得也人主之威豈徒大魚而巳子誠直臣然計不足不可不精思也穆天子傳曰天子北征舎於珠澤此澤岀珠因名之云今越携平澤出青珠以釣於流水又曰辛未天子北還釣于漸澤食魚于桑野又曰天子乃釣于河以觀姑繇之木姑繇大木也山海經日尋木長千里生河邊謂此木之􅀋六韜曰吕尚坐茅以漁文王勞而問焉吕尚曰魚求於餌乃牽其緡人食於禄乃服於君故以餌取魚魚可殺以禄取人人可竭以小釣釣川而擒其魚中釣釣國而擒其萬國諸侯吕氏春秋曰善釣者出魚乎千仭之下餌香也又曰太公釣於兹紂之丗文王得之而王文王千乗也紂天子也天子失之而千乗得之知與不知也又曰若釣者魚有大小餌有冝適羽有動静羽釣浮也􅀃苑曰宓于賤爲單父宰過於陽書曰子亦有以送僕乎陽書曰吾少也賤不知治民之術有釣道二焉請以送子子賤曰釣道柰何陽書曰夫投綸餌迎而吸之者陽橋也其爲魚也薄而不美􅀂存􅀂亡􅀂食不食者魴也其爲魚也薄而味厚宓子賤曰善於是未至單父冠蓋迎之者交接於道子賤曰驅驅之夫陽書之所謂陽橋者至矣焦贑易林曰曵綸江海鈎挂魴鯉王孫利得以饗仲友列仙傳曰吕尚冀州人避紂亂釣于卞溪三年不􅀗魚比嫗聞曰自可止矣公曰非尔所矣果􅀗大鯉得兵鈐於魚腹中後葬無尸唯玉鈐六薦在棺中又曰㳙子者齊人釣於澤得符鯉中又曰陵陽子明銍郷人釣施溪得白龍子解網拜謝放之後數十年得白魚腹中有書教子明服食遂上黃山採五石脂石肺服之三年白龍來迎之神仙傳曰左慈宇元放盧江人少有神通甞在曹公坐公從容曰今日髙㑹珍羞略備所少呉松江鱸魚耳而放下坐應曰此可得也因求銅盤貯水以竹竿餌釣於盤須􅁷引入鱸魚出公大􅀏㑹者咸驚中論曰獨思則滯而不通獨爲則困而不就善釣不易坻而得魚君子不降席而追道又曰又王遇姜公於渭濵皤然皓首秉竿而釣文王得之灼􅀂祛雲而見日霍􅀂開霧而觀山桓範丗論曰水則有波釣則有磨我欲更之無如之何言物動而舋巳彰形行而迹巳著又曰釣巨魚不使嬰兒輕預非不親力不堪也王子年拾遺記曰漢帝元鳯中季秋之月泛衝瀾靈鷁之舟窮晷繼夜釣于䑓下以香金爲鈎霜絲爲綸丹鯉爲餌得白蛟長三丈大若蛇無鱗甲又曰呉主與潘夫人遊釣得大魚呉主喜夫人曰昔聞泣魚今乃爲喜有喜必憂以爲深誡至末年漸相譛毀稍見離退時人謂夫人知幾釣䑓今猶存焉丗􅀃曰劉道眞少時常漁釣草澤善歌嘯聞者莫不留連有一老嫗識異常人甚樂歌嘯乃殺豚進之道眞食豚盡了不謝嫗見不飽又進一豚食半還之後爲吏部郎嫗兒爲小令史道眞超用之兒不知由復白母母告之於是齎牛酒詣道眞道眞曰去去無可復相報楚辭曰以直鍼爲釣又何魚之能得宋玉釣賦曰宋玉興登徒子偕受釣於􅀇淵退而見見於楚襄玉登徒子曰夫􅀇淵之釣也以三㝷之竽八絲之綸餌以蛆蟟鈎以細針以岀三尺之魚於數仭之水中盧植與張然明書曰臨江而釣終日不􅀗一魚魚之不食其餌也是以君子愼其舉謝􅀇與兄書曰居家大都無所爲正以垂綸爲事足以永日此固下大有鱸魚一岀手釣得四十七枚又與書曰昨曰䟽成後岀釣手所􅀗魚以爲二坩鮓今奉送筌周易曰筌者所以在魚得魚而忘筌廣雅曰篝筌謂之昆莊子曰得魚忘筌王朝之與􅁃安牋曰此間萬頃江湖撓之不濁澄之不清而百姓投一綸下一筌者皆奪其魚器不輸十疋則不得放不知􅃮園吏何得持竿不頋漁父鼔泄而歌滄浪也罛􅀃文曰罛􅅈也尓雅曰魚􅅈謂之罛郭璞注曰㝡大網􅅈也今江東云毛詩碩人曰河水洋洋北流活活施罛􅁾􅁾鱣鮪發發莊子曰函車之獸介而離山不免乎網􅅈淮南子曰張天下以爲籠因江海以爲􅅈又何亡魚失鳥之有乎綱􅅈張獸事少故併見漁部廣雅曰罻罾魚網謂之􅅈􅀃文曰網庖羲所結繩以田以漁也周禮天官上曰獸人掌􅅈田獸辨其名物􅅈網也以網􅅮所當田之獸冬獻狼夏獻麋春秋獻獸物狼膏聚麋膏散聚則温散則凉以救時之苦也獸物凡獸皆可献也時田則守􅅈備獸觸攫禮記中庸曰子曰人皆曰予知驅而納諸􅅈獲䧟阱之中而莫之知辟也毛詩國風曰九罭之魚鱒魴興也九罭􅚶􅅈小魚之網也魴大魚也周易曰庖犧氏結繩而爲網􅅈尓雅曰緵􅅈謂之九罭九罭魚網也今之百嚢􅅈是亦謂之􅧡今江東呼爲􅚶韓詩曰九罭之魚鱒魴九罭取鰕芘也史記曰泉陽漁人䂊且舉網獲江東神􅀛漢書曰豺􅆩未􅀕􅆯網不布於壄澤焉魏志曰邴原在遼東十餘年後乃潜遁還南行巳數日而公孫度甫覺度知原之不可復追也因曰邴君所謂雲中白鸖非鶉雉之網可能羅始吾自遣之勿復求也宋書曰孫法宗常居墓所山禽野獸皆悉馴附每逢鹿觸網必解放之備以錢物陳書曰張昭宇德明呉郡呉人也㓜有孝性父熯常患消渇􅄝鮮魚昭乃身自結網捕魚以供朝夕南史曰陳王固甞聘魏宴昆明池魏人以南人􅄝魚大設􅅈網固以佛法呪之遂一鱗不獲文子曰臨河欲魚不􅀂退而織網老子曰天網恢恢踈而不漏莊子曰魚不畏網而畏鵜鴣網者公平無􅀻鵜鴣有欲得之心故魚畏又曰豐狐文豹不免於網羅之患者文也韓于曰善張網者引其網不一一攝萬目而後得一一攝萬目而後得則是勞而難􅀗引其網而魚巳慕矣故吏者民之夲網也故聖人治吏不治民又曰靖郭君將城薛客曰君聞大魚乎網不能止繳不能絓也蕩而失水螻蟻得意焉孟子曰數􅅈不入洿池魚鱉不可勝食也抱朴子曰太昊師蜘蟵而結網國語曰魯宣公夏濫於泗淵濫漬也漬􅅈於泗水之淵以取魚泗在魯城北里革斷其􅅈而棄之􅅈網曰古者大寒降土蟄發降下也寒氣􅀄下謂季冬建丑之月大寒之後也士蟄發謂孟春建寅之月蟄虫始震魚上水􅆩􅀕魚水虞於是乎講罛罶取名魚登川禽而甞之寢廟行諸國助宣氣也今魚方别孕不放魚長又行罣􅅈貪無藝也公聞之曰吾過而里革匡我不亦善乎是良􅅈也爲我得法良善使有司藏之使吾無忘諗言里此􅅈則不忘里革言諗告也曰藏􅅈不如寘里革於側之不忘也寘置又曰聖人貴讓且諺曰獸惡其網民惡其上獸惡其網爲害己民惡其上爲病也古文考曰庖羲作卦觀像而作網丗夲曰芒則網宋襄注曰芒庖羲臣吕氏春秋曰湯見設網者四靣張而祝之曰自天下者自地岀者自四方來者皆罹我網湯曰嘻盡之矣非桀其孰如此又曰舜之末遇時也以其從屬拙他財取水利編蒲葦結罘網應璩報東海相染季然書曰足下頓弥天之網収萬仭之魚量之以谿谷數之以陔兆何其壯乎觀夫任公子之所釣此爲鰌音秋鰕未足爲吾子之道罶毛詩鹿鳴曰魚麗于罶鱨鯋又小雅苕之華曰䍧羊僨首三星在罶䍧羊牝羊也罶曲梁寡婦之笴也爾雅曰􅊔婦之笱謂之罶敦璞注曰謂以簿爲其魚笱廣雅曰曲梁謂之􅄧纂文曰楊州取魚罶也吴人謂之爲笱主􅀃文曰罶曲梁寡婦笱魚所留也罺爾雅曰罺謂之汕郭璞注曰今之撩􅅈也犍爲舎人曰以薄摷魚曰摷者也纂文曰以魚乗水上爲汕􅇁爾雅曰籗謂之􅇁郭璞注曰捕魚籠毛詩小雅曰南有嘉魚蒸然􅇁􅇁纂文曰以鐡施掉因以取魚符子曰天羅廓矣野人猶有􅇁翳之勤涔爾雅曰糝謂之涔郭璞注曰今作糝者聚柴於水中魚得寒入其裏藏隱因以簿圍捕取之犍爲舎人曰以米投水中養魚曰涔也纂文曰以鐡施竹頭取魚爲涔罾􅀃文曰􅊻魚網也史記曰陳勝詐爲書置人所罾魚腹中風土記曰罾樹四植而張網於水車輓上下之形如蜘蟵之網方而不圎楚辭曰鳥何萃􅀆蘋中􅊻何爲􅀆木上俞失其所應璩新詩曰洛水禁􅊻􅅈魚鱉不爲殖罾􅅈網名空令自相啖吏民不得食笱毛詩雞鳴弊笱曰弊笱在梁其魚唯唯又小雅小弁曰無逝我梁無發我笱􅀃文曰笱曲竹捕魚笱也從竹勾亦聲也欚音禮廣雅曰其􅊻謂之欚梁毛詩國風曰維鵜在梁不濡其翼鵜洿澤也梁水中之梁鵜在梁可謂不濡其翼彼其之子不稱其服箋云不稱者言徳薄而服尊維鵜在梁不濡其咮咮啄也彼其之子不遂其媾又小雅曰鴛鴦在梁戢其左翼言休息也箋云梁石絶水之梁戢歛也鴛鴦休息梁又曰彼何人斯其心孔艱胡逝我梁不入我門魏志曰文帝東征郭后留譙宫時后兄表留􅀫衞欲遏水取魚后曰水當通運漕又少材木奴客不在目前當復私取官竹木作梁遏水今奉車所不足者豈魚乎齊地記曰髙宻郡有古斷水處因造魚􅀊収億數故號曰萬疋梁軥廣雅曰軥謂之軥上罠􅀃文曰罠䰻也罨廣雅曰罨鮆網也風土記曰罨如􆃁而小斂口從水上掩而取者也箄纂文曰箄流水中張魚器也􅩬纂文曰取蟹者曰􅩬銛纂文曰鐡有鉅施竹頭以擲魚爲銛太平御覽卷第八百三十四
