front:
  text: 太平御覽卷第二百五十三
  hash: sha256:fd4723000ab27e09593bf6817c38e83198517247f7f237f3e43f8fa500d887c2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_253-1a}
body:
  text: 職官部五十一内史郡丞郡叅軍督郵内史史記曰汲黯字長孺公孫弘爲相乃上言曰右内史界部中多貴人宗室難治非素重臣不能任請徙黯爲内史數歳官事不廢漢書曰倪寛遷右内史寛旣治民勸農業表奏開六輔渠六輔謂京兆馮翊扶風河東河南河内也定水令以廣漑田收租稅時裁闊狹與民相假貸以故租多不入後有軍發右内史以負租課殿當免民聞皆恐失之大家牛車小家擔􅀒輸租襁屬不絶課更最上由此愈竒寛晉書曰孔季恭爲吴興内史吴興頻䘮太守言項羽神爲崇君居郡事竟無害也又曰王薈字敬文恬虚守靖不競榮利少歷清官除吏部郎侍中建威將軍呉國内史時年餞粟貴人多饑死薈以私米作饘粥以飴餓者所濟活甚衆梁書曰頋憲之爲衡陽内史先是郡境連歳疾疫者死者太半棺木尤貴悉裏以生席弃之路傍憲之下車分告屬縣求其親黨悉令殯葬其家人絶滅者憲之爲出公禄使綱紀營護之又土俗山民有病輙云先祖爲禍皆開冢剖棺水洗枯骨名爲除祟憲之曉諭爲陳生死之別事不相由風俗遂改時刺史王奐新至唯衡陽獨無訟者乃歎曰頋衡陽之化至矣又曰傅昭爲安成内史郡自宋巳來兵亂相接郡府舎稱凶毎昬旦聞人􅀑相觸在任者鮮以􅁻終及昭至有人夜見甲兵出曰傅公善人不可侵犯乃騰虚而去有頃風雨忽至飄郡㕔事入隍中自是郡遂無患咸以昭貞正所致又曰傅昭爲安成内史郡多猛獸爲害常乃命去檻穽猛獸竟不爲害又曰殷鈞字季和陳郡長平人也爲臨川内史鈞體多疾閉閤卧理而百姓化其德刼盗皆奔出境又曰伏暅爲永陽内史在郡清㓗政務安静郡人何貞秀等一百五十四人詣州言狀湘州刺史以聞詔勘有十五事爲吏人所懐帝善之隋書曰樊子蓋爲河南内史屢有治績文帝謂曰今爲公別造玉麟符以代銅獸也唐書曰王及善契丹作亂山東不安起授滑州刺史則天謂曰邊賊反叛卿雖疾閤可將妻子曰行三十里緩歩至彼與朕卧理此州以斷河路也因問朝廷得失及善備陳理亂之冝十餘道則天曰彼末事也此爲夲也卿不可行乃留拜内史郡丞漢書曰黄霸爲頴川郡守有郡丞老病聾督郵欲逐之覇曰許丞廉吏雖老尚能拜起送迎止頗重聽何傷其善􅂇之無失賢者意又曰黄覇爲河南太守丞霸爲人明察内敏又習文法爲丞處職當於法令太守甚任之吏民愛敬焉東觀漢記曰光武議靈臺所處上謂桓譚曰吾欲䜟决之何如譚黙然曰臣不讀䜟上問其故譚復言䜟非經上大怒曰桓譚非聖無法將下斬之譚叩頭流血良乆乃得解出爲六安郡丞意忽忽不樂病卒時年七十餘又曰趙典兄子温􅀄爲京兆郡丞歎曰大丈夫生當雄飛安能雌伏遂弃官而去後官至三公謝丞後漢書曰劉平爲濟陽郡丞太守劉育甚重之任以郡職漢名臣奏曰張禹奏曰案令丞相奏事司直持案長史將簿中二千石奏事皆與其丞合縁是以臣下各得盡心竭誠而事公明王隱晉書曰范晷字彦長南陽人僑居清河仕爲郡五官後爲河内郡丞時裴叔則爲河内郡知之爲裴所伏後爲侍御史隋書曰張湏陁爲齊郡丞屬歳饑􅂖米湧貴湏陁將開倉賑給官屬咸曰待詔勑不可擅與湏陁曰今帝在逺遣使徃來必掩歳序百姓有倒懸之急如待報至當委溝壑矣吾􅀂以此􅀗罪死無所恨先開倉而後上狀帝知之而不責也又曰王文同爲􅁪山郡丞有一人豪猾毎持長吏短前後守令咸憚之同下車聞其名召而數之因令左右剡木爲大撅埋於廷出尺餘四角各埋小撅令其露心於木撅上􅅞四支於小撅以捧毆其背應時潰爛郡中大駭吏人相視懾氣唐書官品志曰丹陽㑹稽吴郡吴興及萬户郡丞並六百石汝南先賢傳曰周防字偉公年十六任郡小吏丗祖廵狩汝南召椽史試經防尤能誦讀拜爲守丞防以未冠請去師事徐州刺史蓋豫明經舉孝廉拜郎中陸機集上表曰伏見司徒下諌議大夫張暢除當爲豫章内史丞暢才思清敏志節貞厲秉心立操早有名譽其年時舊比多歷郡守唯暢陵遟自首未齒而佐下藩遂􅌃碎濁於暢名實居之爲劇前後未始有此愚以爲冝解舉試以近縣詔暢旣爲是人所稱便差代郡叅軍晉書曰阮子避亂渡江元帝以爲安東叅軍蓬髮飲酒不以王務縈心北史曰盧文偉少􅀌有志尚頗渉經史年三十八始舉秀才除夲州平北府流叅軍說刺史裴擕案舊迹脩督冗陂漑田萬頃人頼其利晉劉弘教曰太康以來天下無虞遂共尚無爲貴談莊老少有說事外託論公務内但共談􅀏今即同舟而載安可不人人致力耶督郵韋昭辯釋名曰釋云督郵主諸縣罰以􅀒郵殷糺攝之也漢書曰田延年爲河東太守行縣在平陽召故吏五六十人延年皆臨見令有文者東有武者西閱數十人次到尹翁歸獨伏不肯起對曰翁歸文武兼備唯所施設延年召上辭問甚竒其對使歸府案事發姦窮竟事情延年大重之徙署督郵河東二十縣分爲兩部閱孺部汾北翁歸部汾南又曰孫寳爲京兆尹以立秋日署故吏侯文爲東部督郵入見勑曰鷹隼始擊常順天氣取姦惡以成嚴霜之誅椽部拒有人乎文曰無其人不敢空受職寳曰誰文曰霸陵杜穉秀寳曰更言其次文曰犲狼方横道不宜復問狐狸穉秀聞之杜門不通水火穿後牆爲小戸不敢犯法東觀漢記曰趙勤字孟卿南陽􅁄人明逹好學介然特立太守駱珎召署曹吏至􅁺督郵太守桓虞下車葉令雍霸及新野令皆不遵法乃復勤督郵到葉見霸不問縣事但髙談清論以激厲之霸即陳責解印綬去勤還入新野界令聞霸巳去遣吏奏記陳罪復還印綬去虞乃歎曰善吏加良鷹矣下韝即中又曰虞延陳留人光武東廵過小黄髙帝母昭靈后園陵在焉延爲部督郵詔呼引見問園陵之事延占拜可觀其園陵樹蘖皆諳其數爼豆犧牲頗曉其禮帝善之勑延從駕到魯還經封丘城門下小不容羽盖上怒使撻侍御史延因陛見引咎以爲罪在督郵上詔曰以陳留督郵虞延故貸御史罪後漢書曰馬援爲郡督郵送囚至司命府王莽置司命官上公巳下皆烈糺察囚有重罪援哀而縱之遂亡命北地遇赦因留牧畜又曰陳球爲繁隂令時魏郡守諷縣求賄球不與太守怒撾督郵令逐球督郵不肯曰魏郡十五城獨繁陽有異政令逐之將致議於天下太守乃止司馬彪續漢書曰鐘離意仕郡爲督郵縣亭長受民雞酒府下記考之意封還記詣閤白見以春秋責重先内後外政化之夲由近及逺冝先請府内且闊細微太守賢之謝承後漢書曰㑹稽謝夷吾字堯卿爲西部督郵烏程長有罪太守第五倫使夷吾徃收之到縣入閤便大哭以三百錢爲禮便歸倫問其故對曰三十日中當死故不收之至時果如其言謝承後漢書曰許慶字子伯家貧爲郡督郵牛車郷里號曰軺車郵慶甞與友人談論漢無統嗣幸臣專􅀔丗俗衰薄賢者放退􅁣然據地悲哭時人􅁛許子伯哭丗又曰聞人襲爲郡督郵行則􅀒擔卧則無􅀍連􅍪皮以自覆不受人食之費魏志曰蒲寵字伯寜山陽昌邑人年十八爲郡督郵時郡内李朔等擁部曲害于平民太守使寵糺焉朔等請罪不復侵掠又曰髙堂隆字叔平平陽人魯髙堂生後也少爲諸生太守薛悌命爲督郵督軍與悌争名悌而呵之隆案劒叱督軍曰昔魯定見侮仲尼歴階趙彈􅁗筝相如進缶臨臣名君義之所討也督軍失色悌起止之列異傳曰汝南北部督郵西平劉伯夷有大才略案行到懼武亭夜􅀫或曰此亭不可􅀫伯夷乃獨徃􅀫去火誦詩書五經訖卧有頃轉東首以絮巾結兩足以幘冠之拔劒解帶夜時有異物稍稍轉近忽來覆伯夷伯夷屈起以􅃑掩之以帶繫魅呼火照之視得一老狸色赤無毛持火燒殺之明日發視樓屋間得魅所殺人髮結數百枚於是亭遂清静舊說狸髠千人得爲神也漢魏先賢行狀曰故宗正南陽劉伯字奉先少履清節忠亮正直研精文學無不綜覽甞爲督郵時豫章太守虞績以饕餮穢汙徴至郡界當就法車不肯就坐伯乃㧞刀敺績績恐就車乃徑上尚書以肅王道廣州先賢傳曰徐徴字君求蒼梧茘浦人少有方直之行不撓之節頗覽書傳尤明律令延憙五年徴爲中部督郵時唐帝恃豪貴京師號爲唐獨語遣賔客至蒼梧頗不拘法度徴便收客郡市髠笞乃白太守太守大怒收徴送獄主簿守閤白此人無故賣買旣侵百姓汙辱婦女徐徴上念明政據刑申耻今便治郡無復爪牙之吏後督郵當徒跣行奉諸貴戚賔客耳太守荅知徴爲是迫不得巳㑹稽先賢􅀓曰茅開字季闔餘姚人爲督郵平决厭衆心甞之部歴其家不入門當路向堂朝拜府君益善之鐘離意別􅀓曰汝南黄讜拜㑹稽太守召意署北部督郵時郡中大疫黄君轉署意中部督郵意乃露車不冠身循行病者門入家賜與醫藥詣神廟爲民禱􅀕其所臨戸四千餘人後日府君出行灾眚百姓攀車言曰明府不湏出也但得鐘離督郵民皆活也馬融長笛賦序曰融旣􅀶覽又好音樂能皷琴吹笛爲督郵獨卧平陽鄔中有洛客舎逆旅吹笛融聞甚悲遂作長笛賦云尓太平御覽卷第二百五十三
