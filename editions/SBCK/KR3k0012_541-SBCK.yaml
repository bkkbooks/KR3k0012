  text: 太平御覽卷第五百四十一
  hash: sha256:7f67fbfdd24ca39f0878547944c3d9307312c9f1c5a75c5de740371252c137a5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_541-1a}
body:
  text: 禮儀部二十婚姻下媒婚姻下論語曰子謂公冶長可妻也雖在縲絏之中非其罪也以其子妻之子謂南容􅀖有道不廢􅀖無道免於刑戮以其兄之子妻之冶長弟子魯人也􅀯容南宫縚也爾雅曰女子子之夫爲壻壻之父爲姻婦之父爲婚婦之父母壻之父母相謂爲㛰姻國語曰董叔將娶於范氏叔向曰范氏冨盍已乎曰欲爲繫援焉繫援欲自結連於大援也他日董祈愬之於范獻子曰不吾敬也獻子執而紡之紡猶懸也懸於庭之槐也叔向過之曰子盍爲我請乎叔向曰求繫旣繫矣求援旣援矣欲而得之又何請焉家語曰伯夏生叔梁紇叔梁紇娶於魯施氏生女九人無男叔梁紇曰雖有九女是無子也乃求婚於顔氏顔氏有三女小曰徴在顔父問三女曰鄒大夫雖父祖爲士然先聖之裔也今其人身長九尺武力絶倫吾甚貪之雖年長性嚴不足爲疑三子孰能爲之妻二女莫對徴在進曰從父所制將何問焉父曰即尓能矣遂以妻之又曰男子二十而冠有爲人父之端女年十五許嫁有適人之道羣生閉藏乎隂而爲化育之始聖人因時以合偶男女窮天數也霜降而婦功成嫁娶者行焉季秋霜降嫁娶者始於此氷泮而農桑起婚禮殺於此焉龍魚圖曰以賣馬錢娶婦令多惡病夫妻離別漢書曰陳平邑有冨人張􅀒有女孫五嫁夫輙死人莫敢娶平欲得之邑中有大喪平家貧待喪待先徃後去罷爲助張負旣見之喪所獨視偉平平亦以故後去隨平至其家家乃􅀒郭窮巷以席爲門然門外多長者車張負欲以女孫與平其子仲曰平貧柰何與之女負曰固有美如陳平長貧賤者乎卒與女平貧乃假貸幣以聘與酒肉之資以内婦又曰張耳大梁人也少時及魏公子無忌爲客嘗亡命遊外黄外黄冨人女甚羙嫁庸奴亡其夫去抵父客素知張耳謂女曰必欲求賢夫從張耳女聽爲請決嫁之女家厚奉給耳耳以故致千里客及官魏外黄令陳餘亦大梁人好儒術遊趙苦陘冨人公乗氏以其女妻之又曰張放得幸成帝放取皇后弟平恩侯許嘉女上爲放供帳賜甲第充以乗輿服餘飾時號爲天子娶婦皇后嫁女又曰王閎妻父蕭咸爲中郎將董賢父恭慕之欲以賢爲弟求婚咸恐私謂閎曰董公爲大司馬􅁽文云允執其中此堯禪舜之文長老見者莫不心懼此豈家子所能堪耶閎性有智略聞咸言心亦悟乃還報謙逺之意恭不恱又曰鄭崇字子游夲髙宻大族丗與王家相嫁娶後漢書曰􅀽術僣亂曹操託楊彪與術婚姻誣以欲圖廢置奏収下獄劾以大逆孔融聞之不及朝服徃見操曰楊公四代清德海内所瞻周書父子兄弟罪不相及況以􅀽氏歸罪楊公操曰此國家之意融曰假使成王殺召公周公可得言不知邪操遂理出彪魏志曰王褒與管彦男女各始生許爲㛰彦爲西夷校尉褒女更許人彦弟馥問褒褒曰賢兄葬父於洛陽隨母還臨淄用意如此何㛰之有魏氏春秋曰司空東萊王基當丗大儒豈不逹禮而納司空王忱女以姓同源異故也又曰陳矯夲劉氏子出嗣舅氏而婚于夲族徐宣毎非之廷議其闕太祖以矯才量欲全之乃下令曰喪亂以來風教凋薄謗議之言難同褒貶自建安五年巳前一切勿論其以斷前誹議者以其罪罪也魏志曰桓楷字伯緒劉表辟爲從事􅀕酒欲妻以妻妹蔡氏楷自陳巳結㛰他處拒而不受也又曰王粲父謙名公之胄何進爲長史欲與爲婚見二子使擇焉謙不許魏書評曰夏侯曹氏丗爲婚姻故淳淵仁洪休尚眞等並親舊肺腑貴重於時左右勲業咸有勞効吴書曰陶謙字恭祖丹陽人縣甘公出遇之塗見其容皃異而呼之住車與語甚恱之因許妻以女甘夫人怒曰聞陶家兒遊戲無度如何以女許之甘公曰彼有竒表後必大成遂與之後徐州牧吴志曰吕範字子衡汝南細陽人少爲縣吏有容觀姿皃邑人劉氏家冨女羙範求之母謙欲勿與劉氏曰觀吕子衡寜爲乆貧者耶遂爲㛰王隱晉書曰初后父楊駿欲以女妻鄭黙子預黙忌其太盛距而不㛰晉書曰王籍之爲太子文學居叔母之喪而㛰丞相司直劉隗奏之帝下令云詩稱殺禮多㛰以㑹男女之無夫家者正今日之謂也可一解禁止自今後冝爲其防又曰阮脩字宣子居貧四十未有室王敦等歛錢爲㛰皆名士也時慕之者求入錢而不得宋書曰江湛字微淵濟陽考城人也爲義康司徒主簿司空擅道濟爲子求湛妹婚不許義康有命又不從時人重其立志義者也吴均齊春秋曰桓閎字叔通太祖輔政使禇淵致意爲子晃求女㛰閎不敢聞命曰辭霍不婚常所嘉揖齊大非偶所以不敢承殊眷太祖雖嘉其退讓而心不能懽也蕭子顯齊書曰王秀之字伯􅁬臨沂人也吏部尚書禇淵見秀之正潔欲與結㛰秀之不肯以此頻爲府外兵叅軍梁書曰江蒨方雅有風格僕射徐勉權重唯蒨及王規與抗禮不爲之屈勉因蒨門客翟景爲子繇求婚於蒨蒨不荅景再言之乃杖景四十由此與勉忤韓子曰楚王謂田鳩曰墨子者顯學也其身體可則也其言多不辯何也田鳩對曰昔者秦伯嫁女於晋公子爲之飾裝從文衣之媵七十人至晉晉人愛其妾而不愛公女此可謂善嫁妾矣未可謂善嫁女也又曰齊桓公微服以巡民家人有年老而自養者公問其故對曰臣有子五人家貧無以妻之使傭未及反公歸以告管仲管仲曰畜積有腐棄之財而民饑餓宫中有怨女而民無妃公曰善乃論宫中婦女而嫁之因下令曰丈夫三十而室女子十五而嫁又曰衛人嫁其子而教之曰必私積聚爲人婦而出常也其成居幸也其子因私積聚其姑以爲多􅀻而出之其子所以返者倍其所以嫁其父不自罪於教子非也而自知其益冨淮南子曰禮三十而娶文王十五而生武王非法也歲星十二歲而周天天道一備故國君十二歳而冠冠而娶十五而生子重國嗣不從古制也白虎通曰婚姻者何謂昬時行禮故曰㛰婦人因夫而成故曰姻又曰人道何以有嫁娶者何以爲情性之大者莫大於男女之交人倫之始莫􅀂夫婦男三十而娶女二十而嫁何陽數竒隂數偶男長女㓜者何陽道舒隂道促男三十䈥骨以堅彊任爲人父女二十肌膚充盛任爲人母合爲五十應大衍之數生萬物也又曰禮曰女子十五許嫁納采問名納吉請期親迎以鴈爲贄納徴用玄纁故不用鴈也納徴玄纁束帛離皮玄三法天纁二法地也陽竒隂偶明陽道之大也離皮者兩皮也以爲庭實庭實偶也又曰嫁娶必以春何春天地交通萬物始生隂陽交接之時也詩曰士如歸妻迨氷未泮夏小正曰二月冠子娶婦之時也夫有惡行妻不得去地無去天之義夫雖有惡猶不可去也故郊特牲記曰壹與之醮終身不改悖逆人倫殺妻父母廢絶綱紀亂之大者也義絶乃得去耳天子諸侯一娶九女者何重國廣繼嗣也適九何地有九州承天之施無所不生一娶九女亦足承君施九而無子百亦無益也又曰男二十五繫心女十五許嫁感隂陽也陽數八隂數一男八歳毀齒陽氣數竒三八二十四加一而繫心隂數偶故再成十四加一爲五故十五許嫁各加一者明專一繫心所以繫心者防其滛佚也又曰㛰經曰賔􅂛北面奠鴈再拜稽首降出婦從房中降自西階壻御婦車授綏遣女於禰廟重先人之遺體不敢自專故告禰也父母親戒女何親親之至父曰戒之敬之夙夜無違命母施矜結縭曰勉之敬之夙夜無違宫事父誡於阼階母誡於西階庶女及門内施鞶申以父母之命命之曰敬恭宗廟父母之言夙夜無愆視諸衿鞶去不辭誡不諾盖耻之重去也鄭玄別傳曰故尚書左丞同縣張逸年十三爲縣小史君謂之曰尓有賛道之質玉雖羙湏雕􅅣而成器能爲書生以成尓志不對曰願之乃遂㧞於其輩妻以弟女列女傳曰邵南申女者申人之女也旣許嫁於農家禮不備而欲迎之女與其人言其人媒氏往求命之者以爲夫婦者人倫之始也不可不正夫家輕我違制不可以行夫家訟之女曰一物不具一禮不備守節持義必死不徃又曰魯師春姜者魯師氏之母也嫁其女三徃而三逐春姜問故以輕其室人也春姜召其女而笞之曰夫婦人以順從爲務貞慤爲首故婦事夫有五平旦纚笄而朝則有君臣之嚴沃盥饋食則有父子之敬報反而行則有兄弟之道必期必誠則有朋友之信寢席之交然後有夫婦之際君子謂春姜曰知隂陽之順逆也楚國先賢傳曰孫㑺字文英與李元禮俱娶太尉桓焉女時人謂桓叔元兩女俱乗龍言得壻如龍也丗􅀃曰王戎儉恡其從子婚與一單衣裁後便責之戎女適裴氏貸錢數萬女歸戎色不􅀃女還錢乃懌丗􅀃曰温嶠從姑劉氏家值亂離唯有一女姑問嶠有求婚意荅云佳壻難得但如嶠比云何姑荅云喪破之餘乞得粗相存活便足慰吾餘年敢希汝比却數日嶠報姑云已得㛰處門地粗可壻身不减嶠因下玉鏡臺一枚姑大喜旣婚交禮女以手披紗扇大􅀏曰固嫌是此老奴果如所疑玉鏡臺是嶠爲劉越右長史北征劉聦所得也又曰王文度爲桓公長史桓爲兒求垣女王許桓藍田旣還因言桓求巳女婚藍田大怒文度還云下官家中先得㛰處桓公曰吾知矣此尊府君不肯又曰王丞相􅀄在江左欲結吴人請婚陸太尉太尉曰培塿無松栢薫蕕不同器抏雖不才義不爲亂倫之始也又曰諸葛恢大女適􅁃亮兒次女適羊忱兒亮子􅀍􅂫峻害改適江霦恢兒娶鄧攸女子時謝尚書求其小女婚恢乃云羊鄧是平婚江家我顧伊􅁃家伊顧我不能復與謝褒兒㛰也又曰諸葛恢女旣寡誓不復再出其女性甚凶彊無有登車理恢旣許江思玄婚乃移家嫁之􅀄紿女云冝徙於是家人一時去獨留女在後比其覺巳不復得出江郎暮來女􅂘詈積日漸乆歇江霦暝入􅀫但在對牀上後觀其意轉帖霦乃詐厭良乆聲氣轉急女乃呼婢云喚江郎覺江於是躍來就之云自是天下男子厭何預卿事而見喚耶旣􅈛相關不得復不與人語於是黙然而慙遂爲夫妻聖證論云嫁娶古人皆以秋冬毛詩曰東門之楊其葉牂牂毛萇傳曰男女失時不逮秋冬也李固助展允婚教曰告文學師議曹史展允篤學貧苦慈孝推譲年將知命妃匹未定聞之愴然其閔哀之夫冠娶仕進非所以巳親允兄弟無意亦朋友不好事之罪也前遣師輔爲允娶云譚處士等各欲佐助迄今未定出錢千萬率先生大夫府内􅁺史守助佐幹及譚􅁺等其欲議朋友少徴條名目允貧也禮冝從約二三萬錢足以成婚虞翻與弟書曰長子容當爲求婦其父如此誰肯嫁之者造求小姓足使生子天其福人不在舊族楊雄之才非出孔氏芝草無根醴泉無源家聖受禪父嚚母頑虞家丗法出癡子魏􅀽淮正論曰或曰同姓不相娶何也曰逺别也曰今之人外内相㛰禮歟曰中外之親近於同姓同姓且猶不可而况中外之親乎古人以爲無疑故不制也今以古之不言固謂之可㛰不知禮者也或曰國語云同德則同姓同姓雖逺男女不相及異德則異姓異姓雖近男女相及也斯言何故也曰司空季子有爲而言也文公將求秦以反國不敢逆秦故也梁簡文帝資遣孔燾二女敎曰夫思人至郷事惟悼徃表閭式墓義匪字孤至如游殷之息見撫張旣撟玄之子受託魏王斯故羙在令終受兼身後故無􅃬令孔燾經術弘長志履貞槩遊處積年一朝長徃聞其在室二女並未有行可廣訪姻家務求偶對媒毛詩七月曰伐柯如之何匪斧不克娶妻如之何匪媒不得毛詩氓曰送子渉淇至于頓丘匪我愆期子無良媒周禮地官下曰媒氏掌萬民之判凡男女自成名以上皆書年月日名焉令男三十而娶女二十而嫁又地官曰媒氏凡男女之隂訟聽之于勝國之社隂訟争中冓之事以觸法者家語曰孔子之郯遇程子於途顧謂子路曰取束帛以贈先生子路對曰由聞士不中間不見女無媒君子不與交禮焉白虎通曰男娶女嫁何隂卑不能自專就陽而成之故傳曰陽唱隂和男行女隨男不專娶女不專嫁必由父母湏媒妁何逺耻防滛佚也淮南子曰女因媒而嫁不因媒而親闞駰十二州志曰烏孫國嫁娶責馬娉先令媒者與婦􅀫徐乃壻近桓玄傳曰元顯取妾殆同六禮以尚書僕射爲媒人長史爲逆客屈原離騷曰吾令豊隆乗雲兮求宻妃之所在解佩纕以結言兮吾令蹇脩以爲理蹇脩伏羲氏之臣言我旣見宻妃解佩帶取玉結言契令蹇脩爲媒以通辤理也莊子曰親父不爲其子媒親父譽之不􅀂非其父者太平御覽卷第五百四十一
