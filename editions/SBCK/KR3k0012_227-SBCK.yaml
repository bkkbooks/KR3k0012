body:
  text: 職官部二十五侍御史殿中侍御史監察御史侍御史六典曰侍御史掌糺舉百寮推鞫獄訟凢有别付者則按其實狀以奏􅀂尋常之獄推訖断于大理凢事非大夫中丞所劾而合彈奏者則具其事爲狀大夫中丞押大事則豸冠朱衣纁裳白紗中單以彈之小事常服而巳續漢書百官志曰侍御史貟五人秩六百石以公府􅁺属髙第􅀘之或牧守議郎郎中爲之掌察非法受公卿群吏奏事有違失者舉劾之凢郊廟及大拜則一人監威儀有違失則劾奏漢官儀侍臣下曰御史􅁗官也案問有御史掌􅀖國都鄙及萬民之治今以賛􅃁宰應劭漢官儀曰侍御史周官也爲柱下史冠一名曰柱後以䥫爲之言其審固不撓也或􅀃古有獬豸獸主觸邪佞故執憲者以其角形爲冠耳余覽􅁗事云始皇滅楚以其君冠賜御史漢興襲秦因而不改漢書儀曰御史貟四十五人皆是六百石其十五人衣綘給事殿中爲御史宿盧在石渠門外二人尚璽四人持書給事二人持前中丞一人領餘三十人留寺理百官事也史記曰趙禹者郿人武帝即位禹以刀筆吏積勞遷爲侍御史與張湯論定律令又曰下杜人程懇爲御史得罪始皇幽繫雲陽十年從獄中作大􅂐少者増益多者損减方者使貟貟者使方奏之始皇善之出爲御史又曰張蒼好舊曆秦時爲御史主柱下方書漢書曰江充拜直指繡衣使督三輔盗賊禁察踰侈時近臣多奢僣充皆舉劾請没入車馬令身從北軍擊匈奴奏聞貴戚惶恐又曰王駕字翁孺武帝時爲繡衣御史逐捕羣盗皆縱而不誅又曰嚴延年遷御史劾霍光專廢立東觀漢記曰陳寵曽祖父咸哀平間以明律爲侍御史王莾簒位父子相將歸郷里閉門不出乃収家中律令文書壁藏之以俟聖主咸常戒子孫爲人議法當依輕雖有百金之利無與人重後漢書曰桓典爲侍御史執政無所避常乗􅍡馬京師畏之語曰行行且止避騘馬御史又曰杜詩爲御史安集洛陽時將軍蕭廣放縱兵士􅁀横民間百姓惶擾詩勑曉不改遂格殺廣還以狀聞世祖召見賜以棨㦸焉又曰李恂拜侍御史持節使幽州宣布恩澤慰撫北狄所過皆圖冩山川屯田聚落百餘卷悉封奏上肅宗嘉之又曰光武聞杜林還三輔乃徴拜侍御史引見問以經書故舊及西州事甚恱之賜以車馬衣􅀍又曰陳翔字子麟拜侍御史元日朝賀大將軍梁兾威儀不整翔奏請収兾理罪時人竒之又曰楊秉字叔節拜侍御史京畿咸稱其宰相之才又曰譙􅀇爲繡衣使者持節分行天下觀覽風俗所至專行誅賞續後漢書曰种音中暠字景伯順帝時爲侍御史􅁥護太子承光宫中常侍髙􅆊受勑迎太子不齎詔書以衣車載太子欲出太子太􅀓髙褒不知所以力不能止開門臨去暠至撗劒當車曰御史受詔監護太子太子國之儲副人命所繫常侍來無一尺詔書安知非挾姦耶今日之事有死而巳􅆊不敢争又曰張綱字文紀遷侍御史漢􅀄遣八使廵行風俗八使同日拜謂之八彦皆宿儒要位唯綱年少官微受命各之所部而綱獨埋車輪於洛陽都亭曰犲狼當路安問狐狸遂奏大將軍梁兾兄弟罪惡京師震悚魏志曰􅀽紹字夲􅀄有姿皃威容能折節下士士多附之太祖少與交以大將軍􅁺爲侍御史又曰帝嘗大會殿中御史簮白筆側階而坐上問左古此爲何官何主左右不對辛毗曰謂御史舊時簮筆以奏不法今者直備官但珥耳吴志曰吕岱親近吴都徐原慷愾有才志岱知其可成賜巾褠古切衣侯丹與共言論後遂薦抜官至侍御史原性忠壯好直言岱時有得失原輙諌爭又公論之人或以告岱岱􅀏是我所以貴德淵德淵岱字者也及原死岱􅂘之甚哀曰德淵吕岱之益友今不幸岱復於何聞過談者美之又曰張紘字子綱廣陵人也孫䇿遣紘奏章至許宫留爲侍御史少府孔融等皆與親善又曰朱據字子範吴郡人也􅀘侍御史是時選曹尚書曁艶疾貪汚在位欲沙汰之據以爲天下未定冝以功覆過弃瑕取用舉清勵濁足以沮勸􅀂一時貶黜懼有後咎艶不聽卒敗晉書曰􅁃峻字山甫長安大獄乆不决轉峻御史往断朝野稱當又曰劉毅子暾它昆切正直有父風爲御史庫失火尚書郭彰率百人自衛而不救火暾正色詰之彰怒曰我能截卿角也皦㪍然謂彰曰君何時敢恃寵作威作福天子法冠而欲截角呼命􅁓筆奏之彰伏不敢言衆人皆釋乃止隋書曰柳調轉侍御史左僕射楊素嘗於朝堂見調因獨言曰柳調通躰弱獨揺不湏風調歛板正色曰調信無取者公不當以爲侍御史調信有可取不應發此言公當具瞻之秋樞機何可輕發素甚竒之又曰游元爲侍御史奉使於􅀺陽督運㑹楊􅀇感作逆乃謂元曰獨夫肆虐天下士大夫肝腦塗地以䧟身絶域之所軍粮断絶此亦天亡之時我今親率義兵誅無道卿意如何元正色荅曰尊公荷國寵靈功叅佐命髙官重禄近古莫儔公之兄弟青紫交映當謂竭誠盡節上荅鴻恩豈意墳土未乾親圖反噬深爲明公不取願思禍福之端僕有死而巳不敢聞命􅀇感怒而囚之屢脅以兵竟不屈節於是害之又曰陳孝意大業􅀄爲魯郡司法書佐郡内號爲廉平太守􅂫威嘗欲殺一囚孝意固諌至於再三威不許孝意因解衣請先受死良乆威意乃解謝遣之漸加禮敬及威爲納言奏孝意侍御史又曰獬豸冠案禮圖曰法冠也一曰柱後惠文如淳注漢官云惠蟬也細如蟬翼今御史服之禮圖也又曰獬豸冠髙五寸􅁗制也法官服之案董巴志云獬豸神羊也蔡邕云如麟一角應劭曰古有此獸主觸不直故執憲者爲冠以象之􅁗滅楚以其冠賜御史唐書李素立丁憂髙祖令所司奪情授七品清要官所司權擬雍州刺史録叅軍髙祖曰此官要而不清又擬祕書郎髙祖曰此官清而不要遂擢授侍御史又曰柳範爲侍御史時吴王恪好畋獵損居人範奏憚之太宗因謂侍臣曰權萬紀事我兒不能匡正其罪合死範進曰房􅀇齡事陛下猶不能諌止畋獵豈可獨罪萬紀太宗大怒拂衣而去乆之獨引範曰何得逆折我範曰臣聞主聖臣直陛下仁明臣敢不盡愚直太宗意乃解又曰髙宗嘗問群臣求可爲御史者僉舉萬年尉楊子失其名居數月復問之群臣又舉焉上曰吾聞斯人常褻服居公堂視事其可爲凖繩司乎由是百司群僚必表而視事又曰乾封中韋仁約除侍御史與公卿相見未嘗行拜禮或勉之仁約曰鵰鶚鷹鸇豈衆禽之偶柰何設拜以狎之且耳目之官故當特立乃曰御史銜命出使不能動揺山岳震懾州縣誠曠職耳又曰賈言忠河南洛陽人也乾封中爲侍御史時朝廷有事遼東言忠奉使往支軍粮及還髙宗問以軍事言忠畫其山川地􅀔具陳遼東可平之􅃺髙宗恱又問諸將優劣言忠曰李勣先朝舊臣聖鑒所悉龐同善雖非闘將而持軍嚴整薛仁貴勇冠三軍名可振敵髙偘儉素自處忠果有謀契苾何力沉毅持重有統御之才然頗有忌前之癖諸將夙夜小心忘身憂國莫逮於李勣者髙宗深然之又曰劉思立宋州寕陵人也髙宗時爲侍御史属河南河北旱儉遣御史中丞崔謐等分道存問賑給思立上䟽諌曰今麥序方秋蠶功未畢三時之務萬姓所先勑使撫廵人皆竦抃忘其家業兾此天恩踊躍叅迎必難抑止集聚旣廣妨廢亦多加以途程往還兼之晨夕停滯旣縁賑給湏立簿書本欲安存却成煩擾又無驛之處􅀐馬稍難簡擇公私湏􅁷追集雨後農務特切常情蹔廢湏􅁷即􅃜歳計每爲一馬遂勞數家從此相乗恐更滋甚望且委州縣賑給待秋後閑時出使褒貶䟽奏謐等遂不行又曰李義府恃寵用事婦人淳于氏有美色坐事繫大理乃諷丞畢正義枉法出之將納爲妾㑹有宻言其􅃺者上令給事中劉仲䡄鞠之義府恐洩其謀逼正義自縊於獄中上知而特原義府之罪侍御史王義方奏義府檀殺寺丞陛下雖巳釋放然天子置三公九卿二十七大夫八十一元士本欲水火相濟塩梅相成然後庶績咸熈風雨交泰則知人主不得獨是非昔唐堯至聖失之於四㐫漢祖深仁失之於陳狶光武聦明寛恕失之於逢萌魏武勇略英雄失之於張邈此英傑之主莫不失之於前得之於後陛下継聖撫有萬􅀖蠻陬夷落猶懼刑綱况輦轂咫尺姦臣肆虐殺一六品寺丞足使忠臣抗憤縱令正義自縊此事弥不可容便是畏義府之權􅀔能殺身以滅口此則生殺之威巳非主出賞罰之柄下移姦佞請乞重勘當正義死之由雪􅁈氣於幽泉誅姦臣於白日對仗叱義府令下義府視不退義方三叱上旣無言義府趍出又曰王志愔􅀶州聊城人也少以進士擢第神龍年累除左臺御史執法剛正百寮畏憚時人呼皂鵰言其顧瞻人吏如鵰鶚之視鷰雀也又曰􅂫􅉞案問鄭普思其妻有寵於韋庶人特勑令對御辨折上屢抑瓌而伸普思侍御史范献忠歴階而前曰臣請先罪􅂫瓌上問其故献忠曰􅂫瓌國之大夫荷榮貴乆矣不斬逆賊而後聞奏今使眩惑天聦揺動刑柄而普思反􅃺昭露陛下曲爲申理此則王者不死今聖躬萬福豈有兩天子􅁘臣請先死終不能事普思上意乃解獄遂定又曰御史遭長官於途皆免帽降乗長官戢轡辝而上馬乾封中王本立爲御史意氣頗髙途逢長官端揖而巳自是諸人或降而立或足至地或側鞭㢮􅌱輕重無􅁪開元以來但舉鞭聳揖而巳也又曰劉藏器爲侍御史時衛卿尉遟寳琳抑人爲妾藏器奏請還其父母上旣可其奏寳琳私奏乞之上又從之藏器復執奏上又可之寳琳又請如是三藏器進言曰法者海内之懸衡上下之所共􅀂刑罰不中則人無所措手足陛下􅀂用捨恣情愛憎由巳則國之刑憲何所施陳今寳琳請陛下從之臣執奏陛下亦從之今日從之明日又改之欲令下人何以遵奉天人無信不立疋夫疋婦尚不可失信況爲天子安可戯言今陛下二三其言處分不定臣恐四海之内無所適從上竟從藏器所奏又曰王播爲侍御史貞元末華臣李實爲京兆尹恃恩頗撗嘗遇播於途不避故事尹避臺官播移文詆之又曰温造拜侍御史請復置彈事朱衣豸冠於外廊大臣阻而不行李祐自眞州入拜金吾違制進馬一百五十疋造正衙彈奏祐服戰汗流祐私謂人曰吾踰蔡州城擒吴元濟未嘗心動今日膽落于温御史吁可畏哉英雄記曰􅀽紹辟犬將軍府不得巳起從命舉髙第遷侍御史弟術爲尚書紹不欲爲臺下告疾求退三輔决録曰韋約字季明司徒劉愷甚敬重之謂曰君以輕去就故大位不躋今歳垂盡選御史實欲煩君約曰犬馬齒盡旣無膂力又無考課所以躊躇戀慕者以明公禮遇隆崇未能自割因稱素有風疾眩冒不堪乆侍遂徒跣趍出公追不及陳留􅂄舊傳曰楊仁字文義明帝引見問當代政治之事仁對上大竒之拜侍御史明帝崩是時諸馬貴賤各争入宫仁􅀍甲持㦸遮勑宫門不得令入章帝旣立諸馬貴更讃仁刻峻於是上善之通典曰侍御史之職四謂推推有掌推鞫彈掌彈舉公廨知公廨事􅄂事臺中事悉揔之定殿中監察以下職事及進名改轉臺内之事悉主之號為臺端它人稱之曰端公其知雜事者謂之􅄂端最爲雄極食座之南設撗榻謂之南床殿中監察不得座亦謂之癡床言處其上者皆矯傲自得使人如癡故謂之癡床也凢侍御史之例不出累月則遷登南省故號爲南床百曰客其行止出入揖讓去就殿中巳下皆禀而隨之先後虧失者有罰又曰二漢侍御史所掌凢有五曹一曰令曹掌律令二曰印曹掌劾曰三曰供曹掌齊祀四曰尉馬曹掌廐馬五曰乗曹掌獲駕豹尾之内便爲禁省又曰舊例御史臺不受訴訟有通辭􅃺者即於臺門候御史競徃門外収採知可彈者略其姓名皆云風聞訪知永徽中崔義玄爲大夫劾􅃺題告人姓名黄石公隂謀祕法曰熒惑火之精御史之象主禁令刑罰収捕糺正殿中侍御史六典曰殿中侍御史掌殿庭供奉之儀式凢冬至元正大朝㑹則具服升殿􅀂郊祀廵省則其服從於旌門撿察視其文物之有􅃜闕則糺之凢兩京城内則分知左右廵名察其所廵之内有不法之事三國典略曰齊宋丗良字元友魏孝莊時爲殿中侍御史詣河北括户大獲游惰至汲郡旁見有骸骨移書􅄟之其夜有􅀨滂沲孝莊勞之曰卿所括得丁倍於本帳􅀂官人皆如此便是更生出一天下也唐書官品志曰殿中侍御史四人掌殿中禁衛内事又曰張行成爲殿中侍御史糺劾不避權戚太宗以爲能房􅀇齡曰觀古今用人必因媒介􅀂行成者朕自舉之無先容也又曰王無競自監察御史轉殿中侍御史舊例每日更直於殿前正班宰相宗楚客楊再思甞離班偶語無競前曰朝禮至敬公等大臣不冝輕易以慢􅁪典楚客等大怒轉無競爲太子舎人又曰殿中侍御史郭震劾刑部尚書趙彦照太子賔客韋嗣立青州刺史韋安石曰彦照以女巫趙五娘左道亂常託爲諸姑潜相影援旣因提挈遂踐台階或駈車造門施婦人之服或携妻就謁申猶子之情同惡相濟一至於此又張易之兄弟􅀔傾朝野嗣立此際結爲舅甥神龍之􅀄巳合誅死天網踈漏􅆎領誤全與安石託附阿韋編諸属籍中宗晏駕削太皇輔正之制定阿韋臨朝之䇿此時朝野危懼人神怨憤臣忝司清憲敢不糺彈彦照等並請准法處分於是並貶官山公啓事曰中書属通事令史孫琳限滿乆習内事才冝殿中侍御史湏空􅀘之不審可否詔曰可曹氏傳曰左擁起於碎吏武帝以爲能擢爲殿中侍御史監察御史六典曰監察御史掌分察百寮廵按郡縣糺視刑獄肅整朝廷有不肅敬及􅋐失者則糺而劾之唐書曰李素立武徳􅀄爲監察御史時有犯法不至死者髙祖將令殺之素立諌曰三尺之法與天下共之法一動摇則人無所措手足陛下甫創鴻業遐荒尚阻柰何輦轂之下便棄刑書臣忝法司不敢奉旨髙祖從之又曰張嘉貞蒲州猗氏人也坐事免歸郷里居長安侍御史張循憲爲河東採訪使薦嘉貞材堪憲官請以巳之官秩授之則天召見垂簾與之言嘉貞奏曰臣以草萊而得謁九重是千載一遇也咫尺之間如隔雲霧竟不覩日月恐君臣之道有所未盡則天遽令卷簾與語大恱擢拜監察御史又曰紀履忠爲監察御史劾奏御史中丞來俊臣犯􅃺有五一專擅國權二謀害忠善三􅂍賄貪濁四失義㪍禮五􅁋昏很戾論兹五罪合至萬誅請下獄理罪又曰蕭至忠爲監察御史彈鳯閣侍郎同鳯閣鸞臺三品􅂫味道􅂍污貶官御史大夫李承嘉甞召諸御史責之曰近日彈事不諮大夫禮乎衆不敢對至忠進曰故事臺中無長官御史人君耳目比肩事主得各自彈事不相􅀜或先白大夫而許彈事如彈大夫不知白誰也承嘉黙然而憚其剛正又曰崔琬爲監察御史彈奏宰相宗楚客紀處納等驕恣䟦扈請収劾之舊制大臣有􅀍御史彈者皆俯僂趍出待罪朝省楚客瞋目作色稱以忠鯁􅀍誣中宗令琬與楚客約爲兄弟人竊歎焉又曰齊澣定州義豐人少以詞學稱弱冠制科登第景雲二年中書令姚崇用爲監察御史彈劾違犯先於風教當時以爲稱職又曰開元五年監察御史杜暹往磧西覆屯㑹郭處瓘與史獻等不叶更相執奏詔暹案其事實史獻以金遺暹固辭左右曰公逺使絶域不可失蕃人情暹不得巳受之埋於幕下旣去出境乃移牒令収取之又曰李勉拜監察御史属朝廷右武勲臣恃寵多不知禮大將榮崇嗣於行在朝堂背闕而坐言􅀏自􅀂勉劾之拘於省司肅宗特原之歎曰吾有李勉始知朝廷尊矣又曰御史臺奏准舊例監察御史從下六人各察尚書省一司又准興元元年十月勑令監察從上第一人察吏部禮部第二人察兵部工部第三人察戸部刑部第四人者伏以監察第一第二人巳充監察及舘驛等使新人除出使外並無以觀其能否今請守舊制新人分察從之又曰元稹拜監察御史奉使東蜀劾奏東川節度使嚴礪違制禮擅賦入籍没塗山甫等吏民八十八户田宅奴婢時礪巳死七州刺史皆責罰稹雖舉職而執政有與礪厚者惡之又曰楊収兄假自浙西觀察判官入爲監察御史兄弟並居憲府特爲新例又曰李憕音澄太原人也宇文融爲御史括田户奏知名之士崔希逸咸廙業宇文順于􅐐卿李宙及憕爲判官攝監察御史分路檢察以課並遷監察御史又曰栁渾拜監察御史臺中執法之地動限儀矩渾性放曠不甚檢束察長拘局忿其踈縱渾不樂乞外任執政惜其才奏爲左􅀘闕太平御覽卷第二百二十七
