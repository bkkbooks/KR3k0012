body:
  text: 羽族部三鸞鶴鴻鵠鵾鷄鸞春秋元命苞曰火離爲鸞春秋孔演圖曰天子官守以賢舉則鸞在野春秋運斗樞曰天樞得則鸞鳥集詩含神霧曰王者德化充塞照洞八􅁳則鸞臻尚書中􅀱曰昔者軒提象鸞鳥來儀又曰周公歸政於成王太平制禮鸞鳥見孝經援神契曰德至鳥獸則鸞鳥舞謝承後漢書曰方儲字聖明㓜喪父事母母終日自􅀒土成墳種竒樹千株鸞鳥栖其上白􅇠遊其下又曰靈帝建寜四年河南上言二鳯凰二鸞鳥集原縣東觀漢記曰王阜爲重泉令鸞鳥止學宫闕阜使􅁺沙疊爲張雅樂擊磬鳥舉足垂翼應聲而舞止縣庭留十餘日去北史後魏柳楷對蕭寳寅曰大王齊明帝子天下所属且謡言曰鸞生十子九子㱭一子不㱭􅀜中亂武王有亂臣十人亂者理也大王理當􅀜中何所疑慮山海經曰軒轅之國清沃之野鸞鳥自歌海内經云廣都之野鸞自歌又曰女牀之山有鳥言其狀如翟而五采以文名曰鸞鳥見則天下安寜􅀃文曰鸞者神靈之精也赤色五采鷄形鳴中五音頌聲作則至周書王㑹曰成王時氐羗獻鸞鳥孫氏瑞應圖曰鸞鳥赤神之精鳯皇之佐鳴中五音肅肅雍雍喜則鳴舞人君行歩有容進退有度􅀕祀宰人咸有敬讓禮節親踈有序則至一本曰心識鍾律律調則至鳴舞以和之漢武内傳曰西王母曰仙之次藥有靈丘倉鸞之血焦贛易林曰温山松栢常茂不落鸞鳯以庇得其歡樂括地圖曰羽民有羽飛不逺多鸞鳥食其􅆑去九疑四萬二千里抱朴子曰崑崙圖曰鸞鳥似鳯而白纓聞樂則蹈節而舞至則國安樂决録注曰辛繕字公文治春秋䜟緯隱居華隂光武徴不至者有大鳥髙五尺鷄首䴏頷虵頸魚尾五色備舉而多青棲繕槐樹旬時不去􅀪農太守以聞詔問百僚咸以爲鳯太史令蔡衡對曰凡象鳯者有五多赤色者鳯多黄色者鵷鶵多青者鸞多紫者鸑鷟多白者鵠今此鳥多青者乃鸞非鳯也上善其言三公聞之咸遜位避繕繕不起車頻秦書曰符堅時􅀜隴人安百姓豐樂民歌曰長安大街兩邊種槐下走朱輪上有鸞栖崔駰七言詩曰鸞鳥髙翔時來儀應治歸得合望規啄食㨂實飲華池范太鸞鳥詩序曰􅄢賔王結置峻祁之山獲一鸞鳥王甚愛之欲其鳴而不能致乃飾以金樊饗以珎羞對之逾戚三年不鳴夫人曰聞鳥見其􅀋而後鳴可懸鏡以映之王從言鸞覩影感􅆻􅁣焉悲鳴哀響中宵一奮而絶鶴韻集曰鶴善鳴鳥春秋􅀃題辭曰鶴知夜半鶴水鳥也夜半水位感其生氣則益喜而鳴易通卦驗曰立夏清風至而鶴鳴周易曰鳴鶴在隂其子和之左傳曰狄人伐衛懿公好鶴鶴有乗軒者將戰國人受甲者皆曰使鶴鶴實有禄位余焉能戰毛詩曰鶴鳴誨宣王也鶴鳴于九臯聲聞于天興也臯署也言身隱而名著詩義䟽曰鶴大如鵝長三尺脚青黒髙三尺餘赤頰赤目喙長四寸多純白亦有蒼色者今人謂之赤頰常夜半鳴髙聞八九里唯老者乃聲下今吴人園中及士大夫家皆飬之鷄鳴時亦鳴漢書曰王莽常以鶴髓瀆􅂖種學仙後漢書曰鄭􅀪傳孔靈符㑹稽記曰射的山南有白鶴爲仙人取箭􅀪甞採薪得一遺箭頃有人覓􅀪還之問何所欲􅀪識其神人也曰常患􅀂耶溪載薪爲難願旦南風暮北風移後果然故􅀂耶溪風至今呼爲鄭公風也晉書曰􅄞紹始入洛或謂王戎曰昨於稠人中始見􅄞紹昻昻然􅀂野鶴之在鷄群戎曰君復未見其父耳又曰吴隱之年十餘歳丁父憂每號泣行人爲之流涕事母孝謹及其執喪哀毀過禮家貧無人鳴鼔毎至􅂘臨之時常有􅀟鶴唳及祥練之夕復有群鴈俱集宋書曰齊髙帝鎮淮隂爲宋明帝所疑􅀍徴爲黃門郎深懷憂慮見平澤有群鶴仍命筆詠之曰八風舞遥翮九野弄清音一摧雲門志爲君死中禽梁書曰􅁃域母好鶴唳域在位營求孜孜不怠一旦􅀟鶴來下論者以爲孝感所致莊子曰鳬脛雖短續之則憂鶴脛雖長斷之則悲又曰老子謂孔子曰夫鶴不日浴而白烏不日黔而黒列子曰詹何曰聞先大夫之言捕旦子之弋弱纎乗風振之連􅀟鶴於青雲之際用心專動手均也墨子曰子禽問曰多言有益乎對曰蝦蟇日夜鳴口乾而人不聽之鶴雞時夜而鳴天下振動多言何益抱朴子曰周穆王南征一軍盡化君子爲猨爲鶴小人爲蟲爲沙神異經曰西海之外有鶴國男女皆長七寸爲人自然有禮經論跪拜壽三百歳人行如飛日千里百物不敢犯之唯畏海鵠鵠遇吞之亦壽三百歳人在鶴腹中不死琴操曰髙陵牧子取妻五年無子父兄欲爲改娶妻聞中夜驚起􅀝户悲嘯牧子聞之援琴鼓之乙痛恩愛之永離歎别鶴以舒情故曰別鶴操論衡曰藝増篇鶴鳴九折之澤聲聞於天此増益也按鶴鳴參天人則不聞鳴在于澤云何謂乎八王故事曰陸機爲成都王所誅顧左右歎曰今欲聞華亭鶴唳不可復得陶􅋲別傳曰􅋲丁母艱在墓下忽有二客來弔不􅂘而退儀形鮮異知非常人遣看之但見􅀟鶴飛而冲天丗􅀃曰劉尊祖少爲殷中軍所稱之於􅁃公􅁃公甚欣便取爲佐引見坐獨榻上與語劉尓日殊不稱􅁃小失望遂名之爲羊公鶴昔羊叔子有鶴能舞甞向客稱之客至試使駈來氃氋而不能舞故稱之又曰僧支道林好鶴時有遺其􅀟鶴者翅長欲飛林意惜之乃鎩其翮鶴軒翥不能復起乃舒翼反顧視之如似懊喪意林公曰旣有凌霄之姿何肯爲人作耳目近翫乎養令翮成遂放飛去述異記曰宋元嘉􅀄鎮北將軍王仲德鎮彭城左右出獵遇一鶴將二子悉禽之歸以獻王王使養之其小者口爲人所裂遂不能飲食大者輙含粟哺之飲輙含水飲之先令其飽未曽亡也王甚愛之令精加養視大者羽翮先成毎翥冲天小者尚未能飛大者終不先去留飲餄之又於庭中蹇躍教其飛颺六十餘日小者能飛乃與俱去風􅁟記曰鳴鶴戒露此鳥性警至八月白露降流於草上滴滴有聲因即髙鳴相警移徙所􅀫處淮南八公相鶴經曰鶴者陽鳥也而遊於陽因金氣依火精以自養金數九火數七故七年小變十六年大變百六十年變止千六百年形定體尚㓗故其色白聲聞天故頭赤食於水故其喙長軒於前故後指短樓於陸故足髙而尾凋翔於雲故毛豐而肉踈大喉以吐故脩頸以納新故生天壽不可量所以體無青黄二色者木土之氣内養故不表於外是以行必依洲嶼止不集林木盖羽族之宗長仙人之騏􅂹也鶴之上相瘦頭朱頂露眼黒精髙鼻短喙䯓音故列切頰音德宅切耳長頸促身鷰膺鳯翼雀毛􅀛背鼈腹軒前垂後髙麤節洪髀纎指此相之備者也鳴則聞於天飛則一舉千里鶴二年落子毛易黒􅀧三年産伏復七年羽翮具復七年飛薄雲漢復七年舞應節復七年晝夜十二時鳴聲中律復百六十年不食生物復大毛落茸毛生雪白或純黒泥水汚復百六十年雄雌相見目精不轉而孕千六百年飲而不食鸞鳯同爲群聖人在位則與鳯皇翔於甸穆天子傳曰至于巨蒐氏巨蒐之人乃獻白鶴之血以飲天子又曰天子飲於孟氏爰舞白鶴二八吴越春秋曰吴王闔閭有女王伐楚與夫人及女㑹食蒸魚王甞半以與女女怨曰王食我殘魚辱我不忍乆生乃自殺闔閭痛之葬於􅀖西昌門鑿地爲女墳積土爲山文石爲郭金鼎玉柸銀樽株􅃭之寳皆以送女乃儛白鶴於吴市中令萬民隨觀之遂使與鶴俱入羡門因塞之以送死漢武帝内傳曰宣帝即位尊孝武廟爲丗宗行所廵狩郡國皆立廟告祠丗宗廟曰有白鶴集後庭東觀漢記曰章帝至岱宗柴望畢白鵠三十從西􅀯來經祀壇上列仙傳曰王子喬見桓良曰待我緱氏山頭至期果乗白鶴住山㒹望之不得到又曰簫史善吹簫能致白鶴神仙傳曰介象死吴先帝思之以象所住屋爲廟時時往􅀕之有白鶴來止李尊太元真人茅君内傳曰茅盈留句曲山告二弟曰吾去有局任不復得數相徃來父老歌曰茅山連金陵江湖據下流三神乗白鶴各在一山頭佳雨灌旱稻陸田亦復周妻子保堂室使我無百憂白鶴翔金穴何時復來遊邴原別傳曰邴君所謂雲中白鶴非鶉鷃之網能羅矣永嘉郡記曰沐溪野青田中有􅀟白鶴年年生伏我長大便去只伯餘父母一􅀟在耳精白可愛多云神仙所養荆州記曰衡山有三峯極秀一峯名紫盖峯清天明景輙有一􅀟白鶴廻翔其上清響亮􅜂焦贑易林曰白鶴衘珠玉韶之神境記曰滎陽郡􅀯百餘里有蘭巖常有􅀟鶴素羽皦然日夕偶影翔集傳云昔夫婦俱隱此年數百歳化成此鶴臨海記曰郡西北有白鶴山周逥六十里髙三百丈有泄水懸注遥望如倒挂白鶴因以爲名古老相傳云此山昔有晨飛鶴入㑹稽雷門鼓中於是雷門鼓鳴洛陽聞之孫恩時斫此鼓見白鶴飛出髙翔入雲此後鼓無復逺聲古歌辭曰飛來白鶴從西北來十十五五羅列成行妻卒􅀍病不能相隨五里還顧六里徘􅆦吾欲衘汝去口噤不能開吾欲􅀒汝去毛羽日摧頽唐書曰天寳中華隂郡奏白鶴見于西嶽五福峯又曰至德中肅宗降誕之辰有慶雲属天白鶴飛舞於上所居殿宇翶翔二十餘匝而去戰國䇿曰莊辛謂楚襄王曰黄鶴生江海俯喙鰋鯉仰斷菱藕奮其六翮自以爲無患與人無争不知夫射者方脩弧矢治矰繳將加巳者萬仞之上故晝遊江湖夕調鼎俎韓詩外傳曰田饒事魯哀公而不見察謂哀公曰夫雞有五徳君猶瀹而食之者以其所從來近也未􅀂黄鸖一舉千里止君園池喙君稻梁君猶貴之以其所從來逺也故臣將去君黄鶴舉矣離騷曰黄鶴之一舉􅀆知山川之紆曲舉􅀆知天地之圎方述異傳曰荀瓌字叔瑋潜栖却粒甞東遊憇江夏黄鶴樓上望西南有物飄然降自霄漢俄頃巳至乃駕鶴之賔也鶴止户側仙者就席羽衣虹裳賔主􅂬對巳而辭去跨鶴騰空眇然煙滅韓子曰師曠鼓新聲平公問師曠此何聲也曰清啇公最悲乎師曠曰不如清徵公曰可得聞乎師曠曰古之得聽清徵者皆有徳義之君公曰得試之乎師曠不得巳援琴一奏有􅀇鶴二八從南方來集於廓門之危再而列三奏延頸而鳴舒翼而儛音中宫啇公大恱提觴起爲師曠夀其後大旱孫氏瑞應圖曰􅀇鶴者知音樂之節至又曰黄帝習崑崙以儛衆神􅀇鶴二八翔其右伏侯古今注曰鶴千歳則變蒼又千歳黒所謂􅀇鶴也王子年拾遺記曰周昭王時塗脩國獻青鳯丹鶴各一雄一雌以潭臯之粟餧之以溶溪之水飲之左思吴都賦曰青鶴鶖鶬鴻禮記曰前有車􅀐則載飛鴻取其飛有行列舉於旗首以警衆又曰孟春之月鴻鴈來鴻自􅀯方來將北反其居也季秋之月鴻鴈來賔來賔言客止來去也左傳曰衛獻公戒孫文子寗惠子食皆服而朝日旰不召勑戒二子欲共宴食皆服朝衣待命旰宴而射鴻於囿二子從之公不釋皮冠而與之言二子怒如􅀫宿孫文子邑毛詩曰鴻鴈美宣王也大曰鴻小曰鴈又曰鴻飛遵渚公歸無所毛詩義䟽曰鴻鵠羽毛光澤純白似鶴而大長頸肉羙如鴈又有小鴻大小如鳬色亦白今人直謂鴻也周易漸曰􅀄六鴻漸于干上九鴻漸于陸其羽可用爲威儀吉鴻水鳥也適進之義治於下而升故以鴻爲喻儀可貴也韓詩外傳曰齊使獻鴻渴使者於道飲鴻而失之使者至楚曰臣欲亡去爲兩使不通欲拔頸而死將以吾君賤士貴鴻也楚王賢之以爲上客史記陳渉歎曰䴏雀安知鴻鵠之志哉管子曰桓公在位管仲隰朋見立有間有二鴻飛過桓公歎曰仲父令彼鴻鵠有時而南有時而北四方無逺所欲至而至焉唯有羽翼之故是能通其意於天下乎寡人有仲父猶飛鴻之有羽翼也魯連子曰展母所爲魯君遺齊襄君鴻至黽浴鴻鴻失其裝在御者曰鴻毛物可使􅀂一結紿置鴻耶荅曰吾非不能買鴻是上隱君下蔽罪也尸子曰虎豹未成文而有食牛之氣鴻鵠之鷇羽翼未合而有四海之心賢者之生亦然淮南子曰蜂房不容鴻􅆑淮南万畢術曰鴻毛之囊可以渡江盛鴻毛於縑囊可以渡江不弱也楊子法言曰鴻飛􅁳􅁳弋人何慕焉新論微子操微子傷殷之將亡終不可柰何見鴻鵠髙飛援琴作操其聲清以淳傳子曰鴻不學飛飛則冲天􅂹不學行行則千里二丗脩驪山陵採玉者傾山採珠者蔽海又曰丈夫重義如太山輕利如鴻毛可謂仁義也諺曰巳是而彼非不當與非争彼是而巳非不當與是平也􅀶物志曰鴻鵠壽千歳背胎産也晉書隱逸傳曰郭瑀燉煌人也張天錫使盖公明徴之瑀翔鴻以示之曰此鳥也安可籠哉遂深逃絶迹公明拘其門人瑀歎曰吾逃禄非避罪也豈得隱居行義害及門人乃出就徵隋書曰盧思道遷武陽太守非其好也爲􅀌鴻賦以􅀉其情曰命志學之歳自郷里遊京便見識知音歴受群公之眷年登弱冠甫就朝列談者過誤遂􅀼虚名通人楊令君邢特進巳下皆分庭致禮倒屣相接翦拂吹嘘長其光價而才夲駑拙性實踈􅂴􅀔利貨殖淡然不營雖籠絆朝市且三十載而獨往之心未始去懷抱也攝生舛和有少氣之病分符坐嘯作守東原洪河之湄沃野弥望嚻務旣屏魚鳥爲隣有離群之鴻爲羅者所獲野人馴養貢之於余置諸池庭朝夕賞翫旣用銷憂兼以輕疾大易稱鴻漸於陸羽儀盛也楊子曰鴻飛􅁳􅁳騫翥髙也淮南子云東歸碣石違溽暑也平子賦曰南寓衡陽避祁寒也􅀂其雅歩清音逺心髙韻鵷鸞巳降罕見其儔而鍜翮牆隂偶影獨立唼􅱷粃粺雞鶩爲伍不亦傷乎余五十之年忽焉巳至永言身事􅁣然其多緒乃爲之賦聊以自慰鵠史記曰齊王使淳于髠獻鵠於楚岀邑門道飛其鵠徒掲空籠以見楚王曰齊王使臣獻鵠過於水上不忍鵠渇出而飲之而飛去吾欲刺腹絞頸而絶恐人議吾君以鳥故令士自殺鵠毛物多相􅀋者吾欲買而代之是不信而欺吾王欲赴他國奔亡痛吾兩主使不通故來受罪楚王曰善􅀃苑曰魏文侯使舎人無擇獻鴻於齊其事同宋書曰桓榮祖善彈爲東海太守登西樓見翔鵠雲中謂左右曰當生取之於是彈其兩翅毛脫盡墜地無傷養毛生乃去􅀯史孝義傳曰謝昌寓陳郡人也爲劉悛廣州參軍孝性甚至甞養一鵠昌寓病二旬而鵠二旬不食昌寓亡而鵠遂飛去韓詩外傳曰晉平公遊於河而樂曰安得賢士與之樂此也舩人盖胥跪而對曰夫珠出江海玉出崑山無足而至者猶主君好之士有足而至者猶主君好之士有足而不著者盖主君無好士之意耳何患無士乎平公曰吾食客門左千人門右千人朝食不足夕收市賦暮食不足朝收市賦吾何謂不好士乎對曰夫鴻鵠一舉千里所恃者六翮耳背上之毛腹下之毳益一把飛不爲加髙損一把飛不爲加下今君之食客門左門右各千人亦有六翮在其中矣將皆背上之毛腹下之毳也新序曰晉文公遊西河舟人固桑樹􅀃苑曰趙簡子遊於河舟人古對几書二語同離騷曰縁鵠飾玉后帝是饗后帝謂殷湯曰也言伊尹始仕縁亨鵠鳥之美脩王鼎以事於湯湯賢之遂以爲相也録異記曰魏安􅁵王曰寡人得如鵠之飛視天下如莾也吴客有隱遊者聞之作木鵰而獻王王曰此有形無用者也夫作無用之器丗之姦民也召遊者加刑焉遊者曰臣聞大王之好飛也故敢獻鵰安知王之不知此也可謂知有用之用未窹無用之用矣乃取而􅀐之遂飜然而飛去莫知所之鄧徳明􅀯康記曰昔有盧躭仕州爲治中少有捿仙之術甞元㑹至曉不及朝列化爲白鵠至閤前迴翔欲下威儀以箒擲之得一􅃗履躭乃驚還坐内外左右莫不駭異時步騭爲廣州刺史意甚惡之便以狀列聞遂至誅滅異苑曰太亨二年冬大寒南洲人見二白鵠語於橋下曰今兹寒不減尭崩年也於是飛去抱朴子曰千歳之鵠隨時而鳴能登於木色純白腦盡成骨列仙傳曰陵陽子安死葬山下有黄鵠來栖其冢邊樹鳴聲呼安安又曰魯陶門女者少寡養姑紡績爲産魯人欲求之女乃歌曰黄鵠早寡七年不􅀟宛頸獨􅀫不與衆同禽鳥尚然况於貞良魯人聞之遂不復求楚辭曰寕與黄鵠比翼乎將與鷄鶩争食乎伏侯古合注曰漢惠五年七月黃鵠二集蕭池漢書曰黄鵠下建章宮太液池中公卿上壽賜諸侯王列侯宗室金錢西京􅄂記曰始元元年黃鵠下太液池上爲歌曰黄鵠飛􅀆下建章羽粛粛􅀆行蹌蹌金爲衣􅀆菊爲裳自顧薄德愧爾嘉祥廣志曰黄鵠出東海漢以其來集爲祥魏武樂府曰黄鵠摩天極髙飛後宫尚得烹煑之崔鴻十六國春秋後趙録曰揚州獻黄鵠鶵五徙之于􅀇武池頸長一丈聲聞十餘里淮􅀯子曰鳯皇曽遊萬仞之上鴻鵠鶬鵠莫不憚驚郭璞賦曰晨鵠天雞此鵠属也鵾雞穆天子傳曰鵾鷄飛八百里郭璞曰鵾雞即鵠属也管子曰鳬鶩之舎鵾雞之通逺楚辭曰鵾雞啁哳而悲鳴張衡西京賦曰翔鵾仰而不逮薛系曰鷤雞也音昆也嵇康琴賦曰鵾雞遊􅃶千里別鵠張華鷦鷯賦曰鵾雞竄於幽險太平御覧卷第九百一十六
