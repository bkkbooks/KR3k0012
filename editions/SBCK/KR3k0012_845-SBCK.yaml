front:
  text: 太平御覽卷第八百四十五飲食部三
  hash: sha256:ec94de773e5b1874d1ad2aae28103236b5c4b42734b233d833842f60cc818955
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_845-1a}
body:
  text: 酒下孟子曰禹惡旨酒而好善言孔叢子曰平原君與子髙飲強子髙酒曰有諺云堯舜千鍾孔子飲百觚子路嗑嗑尚飲百榼古之賢聖無不能飲子何辭焉子髙曰以予所聞聖賢以道德兼人未聞飲酒列子曰夫醉者之墜於車也雖􅐄不死骨節與人同犯害與人異其神全也乗亦不知也墜亦不知也死生驚懼不入乎其胷是故遌物而不慴彼得全於酒而猶􅀂是况得全於天乎韓子曰晉平公與羣臣飲飲酣乃喟然而歎曰莫樂爲人君惟其言而莫之違師曠侍坐於前援琴撞之公披袵而避琴傷於臂公曰大師誰撞師曠曰今者有小人言於側者故撞之公曰寡人也師曠曰嘻是非君人者之言也左右請除之公曰釋之以爲寡人戒又曰齊桓公飲酒醉遺其冠耻之三日不朝管仲曰此非有國之耻也公胡不雪之以政公曰善因發倉賜貧窮論囹圄岀薄罪處三日而民歌之曰公胡不復遺冠乎又曰宋人有少者欲效善見長者飲無餘亦自飲而盡之王孫子新書曰楚莊王攻宋厨有臰肉樽有敗酒將軍子重諫曰今君厨肉臰而不可食樽酒敗而不可飲而三軍之士皆有飢色欲以勝敵不亦難乎莊王曰請有酒投之士有食饋之賢淮南子曰楚㑹諸侯魯趙皆獻酒於楚王主酒吏求酒於趙趙不與吏怒乃以趙厚酒易魯薄者奏之楚王以趙酒薄遂圍邯鄲抱朴子曰鄭君釀酒酒成因以附子甘草屠内酒中􅁀令乾如雞子大一丸投一斗水立成美酒又曰􅁑仙公毎飲酒醉常入門前陂中竟日乃岀曽從呉主到列州還大風仙公舡没呉主謂其巳死湏􅁷從水上來衣履不濕而有酒色云昨爲伍子胥召設酒不能便歸以淹留也吕氏春秋曰肥肉厚酒務以自強命曰爛膓之食韓詩外傳曰夫飲食之禮不脫屨而即序者謂之禮跣而上坐者謂之宴能飲者飲之不能飲者巳謂之醧齊顔色均衆寡謂之沉閉門不出者謂之湎故君子可以宴可以醧不可以沉不可以湎黄石公記曰昔者良將用兵人有饋一單醪者使投之於河令將士迎流而飲之夫一單醪不能味一河水三軍思爲之死非滋味及之也賈􅁩新書曰晉師伐號􅉑公出奔至澤中曰吾飢渴甚其御者進清酒腵脯問御曰汝何故謟䛕曰恐君必亡所以儲也號公作色怒御者曰臣言誤也君所以亡者天下皆不肖疾公賢也􅉑公喜據軾而􅀏飢勌乃枕御者􅂰而卧御以塊代其􅂰而去􅉑公因餓死神異經曰西北海外有人長二千里兩脚中間相去千里腹圍一千六百里但日飲天酒五􅂛不食五􅂖魚肉唯飲天酒忽有飢時向天仍飲好游山海間不犯百姓不千萬物與天地同生又曰西北荒中有酒泉此酒美如肉清如鏡其上有玉樽取一鐏復一罇與天地同休無乾時飲此酒人不死不生東方朔別傳曰武帝幸甘泉長平阪道中有䖝赤如肝頭目口齒悉具先驅馳還以報上使視之莫知也時朔在屬車中令徃視焉朔曰此謂恠氣是必秦獄處也上使案地圖果秦獄地上問朔何以去之朔曰夫積憂者得酒而解乃取䖝置酒中立消賜朔帛百疋後屬車上盛酒爲此故也􅀃苑曰魏文侯與大夫飲使公乗不仁爲觴政曰飲􅀂不盡浮之大白文侯不盡公乗不仁舉白浮君也又曰呉王從民飲酒子胥諌曰昔白龍下清泠之淵化爲魚漁者射中其目白龍上告天王捨萬乗從布衣恐有射目之患也論衡曰東風至酒湛溢按酒味酸從東方木也味酸故酒湛溢也又曰文王飲酒千鍾孔子百觚聖人􅅐腹小大與人均等􅀂飲千鍾冝食百牛能飲百觚則能食十羊使文王身如防風孔子身如長狄文王孔子率禮之人垂譽後丗豈千鍾百觚􅁘紂車行酒􅀐行炙二十日爲一夜按紂以酒爲池因謂車行酒以􅁏爲林因爲􅀐行炙耳或是覆酒滂沲於地因以爲池釀酒積糟因以爲丘懸肉似林因言肉林耳西京􅄂記曰司馬相如還成都以所服鷫鸘裘就市陽昌貰酒與卓文君爲歡典論曰孝靈末百司湎酒酒千文一斗常侍張讓子奉爲太醫令與人飲輙去衣露形爲戯樂也又曰洛陽令郭珎家有巨億毎暑召客侍婢數十盛裝飾羅縠披之􅃝祼其中使進酒又曰劉表有酒爵三大曰伯雅次曰仲雅小曰季雅伯雅容七􅂛仲雅六􅂛季雅五􅂛又設大針於杖端客有酒輙以􅥵之驗醉醒也博物志曰劉􅀇石曽於中山酒家沽酒酒家與千日酒飲之至家大醉其家不知以爲死葬之後酒家計向千日徃視之云巳葬於是開棺醉始醒俗云􅀇石飲酒一醉千日又曰西域有蒲桃酒積年不敗彼俗傳云可至十年欲飲之醉彌日乃解古今記曰烏孫國有青田核得水則有酒味甚淳美如好酒飲盡隨更注水隨成不可乆乆則苦不可飲名曰青田酒丗􅀃曰鍾毓鍾㑹少有令譽其父晝寢因共偷服散酒父時覺且託寐以觀之毓拜而後飲㑹飲而不拜父問其故毓曰酒以成禮不敢不拜問㑹㑹曰偷酒乃非禮所以不拜又曰阮籍遭母憂在晉文王座進酒肉司􅀠何曽亦在座曰明公方以孝理天下而阮籍以重哀顯於公座飲酒食肉冝流之海外以正風教文王曰嗣宗毁頓如此君不能共憂之冝且有疾而飲酒食肉固䘮禮也籍飲噉不輟神色自􅀂歩兵校尉􅆙厨中有貯酒數百斛阮籍乃求爲歩兵或云籍與劉靈飲歩兵厨中酒未盡並醉而物故皆好事者爲之籍景元年卒太始中靈猶存焉又曰劉靈縱酒放達或脫衣倮形在室中人見譏之靈曰我以天地爲棟宇室屋爲禈衫諸君何以入我禈中又曰張季鷹縱任不拘時人號爲江東歩兵或謂之曰卿乃縱適一時獨不爲身後名也張荅曰使我有身後名不如即時一杯酒又曰阮宣子甞歩行以百錢掛杖頭至酒店便獨酣暢雖當丗貴盛不肯詣也又曰山季倫爲荆州時出酣暢人爲之歌曰山公時一醉逕造髙陽池日暮倒載歸酩酊無所知時復乗駿馬倒着白接籬舉手語葛強何如并州見髙陽池在襄陽是其愛將并州人也襄陽記曰漢侍中習郁於峴山南依范蠡養魚法作魚池池邊有髙堤皆種竹及長楸芙蓉覆水是遊宴各家山季倫遊此池未嘗不大醉而還恒曰此是我髙陽池也又曰鴻臚孔群好飲酒王丞相語云卿恒飲酒不見酒家覆缾布日月乆則糜爛群曰公不見糟中肉乃更堪乆群常與親舊書云今年田得七百斛秫米不了麹蘖事又曰周顗字伯仁風徳雅重深逺危亂還江東積年恒大飲酒嘗經三日不醒人謂之三日僕射又曰諸阮能飲酒仲容至宗人間􅀂集不復用常杯酌以瓮盛酒賔坐相向大酌更飲時有羣猪來飲酒去上便共飲之又曰桓公有主簿善別酒輙令先嘗好者謂青州從事惡者謂平原督郵青州有齊郡平原有革縣從事言至齊督郵言至革上住又曰王孝伯問王大阮籍何如司馬相如王大曰阮籍胷中壘隗故湏澆之言同相如唯有酒異大悅小字王大歎曰三日不飲酒覺形神不復相親宋明帝文章志曰洸􅄝酒一飲或連日不醒自號上頓也諺以大飲爲上頓起於忱也王孝伯云名士不湏竒才但使常得無事痛飲酒讀離騷便可稱名士也神仙傳曰孔元方者專修道術元方爲人惡衣踈食飲酒不過一斗年百七十餘歳道成人或請元方同㑹人人作酒令次至元方作令元方無所􅀃直以一杖柱地因把杖倒堅頭在下足在上以一手持酒倒飲之人莫能爲也列仙傳曰酒客者梁市上酒家客也作酒常美日售萬錢有過逐之主人酒便酸敗異苑曰有虹食薛願釡中水盡願輦酒飲之虹吐金滿釡因置豐冨也益部􅂄舊傳曰楊子拒妻劉臣公之女字奉漢有四男二女拒早亡敎道閨門動有法則長子元珎甞出飲酒自輿而歸母不見十日諸弟謝過乃見數責曰夫飲酒有節不至沉湎者禮也汝乃沉荒慢而無禮自爲敗首何以帥先諸弟郭仲産湘州記云衡陽縣東南有酃湖土人取此水以釀酒其味醇美所謂酃酒毎年嘗獻之晉平呉始薦酃酒於太廟是也時鏡新書曰晉海西令董勛云正旦飲酒先飲小者何也勛曰俗以小者得歳故先以酒賀之老者失時故後飲酒十洲記曰􅘵州有玉膏如酒味名曰玉酒飲數斗輙醉令人長生南岳夫人傳曰夫人設王子喬瓊􅂫緑酒孝子傳曰蔡順字君仲母飲酒吐嘔顚倒恐母中毒嘗母吐驗之楚辭曰蕙肴設今蘭籍奠桂酒兮椒漿又屈原曰衆人皆醉唯我獨醒漁父曰衆人皆醉何不餔其糟而歠其醨梁四公記曰髙昌遣使獻乾蒲桃凍酒帝命􅇐公迓之謂其使曰蒲桃七是洿林三是無半凍酒非八風谷所凍者又無髙寕酒和之使者曰其年風災蒲桃不熟故駮雜凍酒奉王急命故非時耳帝問术公群物之異對曰蒲桃洿林者皮薄味美無半者皮厚味苦酒是八風谷凍成者終年不壞今臭其氣酸洿林酒滑而色淺故云然嶺表録異曰南中醖酒即先用諸藥別淘漉粳米漉乾旋旋入藥和米搗熟即緑紛矣熱水溲而􅇛之形如餢飳以指中心刺作一竅布於簟席上以茍􅂎構葉罨之其體候好弱一如造麹法旣而以藤薎貫之懸於煙火之上每醖一年用幾箇餅子固有恒凖矣南中地䐘春冬七日熟秋夏五日熟旣熟貯以瓦甕用糞掃火燒之亦有不燒者爲清酒也大抵廣州人多好酒晚市散男兒女人倒載者日有三二十軰生酒行即兩靣羅列皆是女人招呼鄙夫先令嘗酒盎上白瓷甌謂之刮一三文不持一錢來去嘗酒致醉者當壚嫗但􅀏弄而巳蓋酒賤之故也太平御覽卷第八百四十五
