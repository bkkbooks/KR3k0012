front:
  text: 太平御覽卷第九百二十八
  hash: sha256:a2d4c54b4bdc470a3aa3503cd149a3b3bb17ee6278227af865db67c657be1d92
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_928-1a}
body:
  text: 羽族部十五衆鳥鳥􅆑鳥巢衆鳥異物志曰錦鳥文如丹地錦而藻繢相交俗人見其似錦因謂之錦鳥形微大於雉其雌特有文章五色甚可愛周氏􅄂字曰鸀鳿鳥似鳬風土記曰鷫鸘鶖属飛則鳴其翅肅肅者也楚辭曰鴻鵠代游曼鷫鸘曼曼行也鷫鸘俊鳥風土記曰鷖鴫也以名自呼大如小鷄生於荷葉上爾雅曰鸛鷒輻蹂也如鵲短尾射之衘矢射人郭璞注云一名隨羿河圖說徴示曰鳥一足曰獨立見則主勇強也廣州記曰新寧縣有獨足鳥大如鵠其色蒼其鳴自呼獨足臨海異物志曰東垂有一足鳥俗名曰獨足疑是啇羊文身赤口唯食蟲豸不害稻梁鳴如人嘯聲將雨轉鳴或曰山譟鳥晝伏夜翔或時晝岀則羣鳥譟之山海經曰有五采之鳥有冠名曰狂鳥孔融周歳論曰儀鳯屯集狂鳥穢之爾雅曰鶨䳢老郭璞注曰鴒鶨也俗謂之癡鳥鶨音丑眷切說文曰欺老鶨也左思蜀都賦曰鷩鴺山栖綦母遂注曰鷩鴺鳥名如今山鷄其色班其鶵色異岀江東莊子曰周周銜羽以濟河司馬彪注周周河士鳥也頭重尾䡖是以銜他鳥羽如飛過何人之不可求益於物以􅀘其所短也笁法真登羅山䟽曰越王鳥􅃺似鳶口句末可受二􅂛許南人以爲酒器珎於文螺不踐地不飲江湖不唼百草不餌蟲魚唯噉木葉糞似董陸香山人遇之旣以爲香又治􅄂瘡南方草物志曰有鳥或名越王鳥大如孔雀喙長尺八九寸黄白黒色􅃺如人晝光飾似􅃮瑩磨尤益鮮明多持以飲酒出交趾九真劉欣期交州記曰䴌黄喙二尺餘南人以爲酒爵南越志曰䴌䮵一名越王烏嶺南録異曰越王鳥如烏而頸足長頭有黄冠如柸用貯水㸦相飲食衆鳥鶵取其冠堅緻可爲酒柸笁法真登羅山䟽曰五距鳥足有重距其音先頋或謂之先頋鳥似孔雀背連錢文遊名山記曰芙蓉山有異鳥愛形頋影不自藏故爲羅者所得人謂廣州記曰廣寜縣有金鳥純白口脚如金其鳴自呼異物志曰鳥大如雄鷄色赤或黒而能鳴彈射取之其􅁏香美中作炙盛弘之荆州記曰魚復縣南山有鳥時吐物長數寸丹朱彪炳形色􅀋綬因名吐綬鳥又曰晉太元中營道令何諧之於縣内得一鳥大如白鷺􅂰上及髀有銅環貫之環大小刻鏤如橄㰖子妙絶人工于時京師皆觀之嶺表録異曰有鳥形如野鵲翅羽黄縁間錯尾生兩技長二尺餘直而不􅙂唯尾梢有毛宛如箭羽因目之爲帶箭鳥爾雅曰鳥䑕同穴其鳥爲䳜其䑕爲鼷郭璞注曰鼠如人家䑕尾短䳜如鷰而小色黄黒穴入地三四尺䑕在内鳥在外今西在隴西鳥䑕同穴出臨海異物志曰江潮海鳥大於鸛啄長八寸潮上即鳴又曰䳽鳥海鳥也喙長八寸天欲風雨内喙於土中向風海師以爲候鳴如嘯又曰􅁡母小鳥也色黒正月旦爲􅁡蜂周行諸山永安處蜂隨之􅁡母暮還入蜂中郭璞􅁡蜂賦曰大君以緫羣氏又恊氣於零雀毎先馳而葺宇畨巖穴之經略􅁡母一名零雀爾雅曰竭水狗又曰鴝頭鵁孫炎曰鳥鵁也又曰突鶦鳥孫炎曰榖鶦水鳥又曰鷏􅻀母也廣志曰蚊母吐蚊大如鳩嶺南異物志曰五嶺溪山深處有大鳥如鶬鸛常吐蚊子輙從口中飛去謂之吐蚊鳥說文曰䴌水鳥也南方草物狀曰孔貴如小母鷄臨海異物志曰獨春鳥聲似㫪聲聲多者五榖傷聲小者五榖熟又曰􅆻鳥蘭草占米之貴賤背廻􅆻其莖􅆻一度即解米百錢再度二百未􅆻仍五十隨􅆻多少以占知之爾雅曰􅜥唐屠郭璞注曰以鳥蒼白色臨海異物志曰焳鳴聲哀俗云繼母欲嫁因㸑使人守之母遂不還兒因呼母言䲴也又曰遊鳥如鵝大其色黒以青􅁝頭繫竹竿呼之即来入手俗言是東海神所養不可食也臨海異物志曰獨􆈼鳥如隼其色黒其鳴如人呼鷄聲爾雅曰鷚天籥也南方草物􅃺曰金􅁻鳥其大如小母鷄臨海異物志曰有鳥耀儀名曰苦姑又曰除溪鳥小如鴝鵒甚黒天欲隂雨即鳴音言溪瀆又曰祖端端小鳥天欲雨即鳴抱朴子曰千秋鳥人面壽如其名魯連子曰南方鳥名曰邽生而食其翼南方草物狀曰羽鳥毛羽青黒色小於鳩俞益期與韓豫章牋曰林邑有鳥名歸飛臨海異物志曰賔師形大如鴝鵒毛正黒色廣雅曰車攝鷦禮也山海經曰基山有鳥焉名􅡀鵃食之無卧又曰北海蛇山有五采鳥飛蔽一郷名曰翳鳥又曰青丘有鳥其狀如鳩名曰灌灌又曰禱過之山有鳥二足三面名瞿如又曰松果山有鳥名䳋渠又曰上申山鳥名當扈狀如雉食之不眴目又曰符遇之山其鳥名鴖可以衛火又曰英山有鳥狀如鶉食之巳癘名曰肥遺又曰宰塗山有鳥名曰數斯食之巳癭又曰崑崙丘有鳥名曰欽原蠹獸則死蠹木則枯又曰灌題山有鳥見人則躍名曰竦斯又曰梁渠之山有鳥名曰􅅝食之巳腹痛可以止衕治衕下也又曰陽山有鳥自爲牝牡名曰象虵又曰廆山有鳥名曰鴒䳩鈴要兩音其鳴自呼服之不脒又曰丑陽山有鳥名曰䳅鵌可以衛火又曰翼望山有鳥狀如烏三首六尾其名曰鵸䳜􅀝餘兩音服之使人不眯又以禦㓙又曰青要山有鳥名曰音􅆼窕之窈也狀如烏青身而朱目赤尾食之冝子又曰攻離山有鳥名曰嬰勺其狀如鵲赤喙白身其尾􅀂勺似勺形其鳴自呼又曰鳥名青耕可以禦疫又曰天帝山有鳥其狀如鶉黒文而赤翁翁領下毛名曰櫟食之巳痔又曰翏山有鳥名鸓音畾其如鵠而兩首四足又曰北􅅝山有鳥狀如人面名曰􅜥鵑夜飛而晝伏又曰太行山有鳥焉其狀如鵲白身赤尾六足其名䴅音奔又曰馬城山有鳥狀如烏白首而身黄足其名曰鶌居食之不飢又曰號山有鳥名㝢狀如䑕又曰夢聮之山有鳥羣居而多飛其毛如雌雉名曰鵁鳥音交或作獨又曰畢張山有鳥狀如雉而文首白翼黄足名曰白䲽食之巳嗌又曰小侯山有鳥其狀如烏而白文名曰鴣􅨊姑習兩音又曰北號山有鳥其狀如鷄而白首䑕足虎􅀲名曰魁雀食人又曰羭次山有鳥狀如梟人面而一足名曰橐􅖦音肥冬夏蟄服之不畏雷看其毛羽令人不畏雷鳥􅆑左傳哀公下曰子西曰勝如􅆑余翼而張之漢書曰武帝時大宛諸國獻大鳥􅆑應邵曰如二石瓮條攴國有大鳥􅆑如瓮魏志曰清河令徐孝龍取十三種物着篋中使管輅射之先說鷄子後謂蚕蛹遂一一名之呉志曰孫權太子甞朝諸􅁑恪曰元遜何不食馬矢格曰願太子食鷄􅆑權曰人令卿食馬矢卿使人食鷄􅆑何也恪曰所出同耳權大􅀏晉書曰戴安道少時取鷄􅆑汁溲白瓦屑作鄭玄碑文手刻字文旣綺藻器亦妙絶唐書武德中西蕃突厥葉護可汗遣使貢條支巨􅆑二又曰貞觀二十一年西蕃吐陸可汗獻金􅆑瓶鳥􅑹也彫刻作禽獸而塗以黄金山海經曰西王母山有沷民國鳯􅆑是食甘露是飲韓詩外傳曰􅆑之性爲鶵不得良雞大育積日累乆則不成爲鶵管子曰子夏云彫􅆑然後􅊪之所謂發積藏散萬物墨子曰以他言非吾者猶以􅆑投石也盡天下之􅆑石猶不毁也孫卿子曰以桀詐桀則幸詐堯譬􅀂以􅆑投石又曰􅆑有毛是說之難持者也而惠施鄧析能精之然而長者不貴非禮義之中也淮南子曰越鷄不能伏鶴􅆑又曰鴈北向鵲始加巢雉鴝呼􅆑淮南萬畢術曰艾火令鷄子飛取鷄子去其汁燃艾火内空􅆑中疾風因舉之飛鹽之累􅆑取鹽塗􅆑取也􅆑置上即累矣抱朴子曰夏后始衰食鳯􅆑而鳯去如此則鳯有種矣揚子法言曰雌之不才其􅆑叚君乏才其民野叚敗也不屈其意不累其身不夷不惠可否之間神仙傳曰有人病就茅君請福煑鷄子十枚以内帳中湏􅁷茅君悉擲出其中無黄者並差有黄者不愈常以此爲候阮藉大人先生傳曰􅀂先生者以天地如􅆑耶小物細人欲論其長短議其是非豈不哀哉􅀶物志曰九竅者胎生八竅者􅆑生􅀛黿諸授􅀋皆􅆑生而影伏幽明録曰桂陽羅君章二十許都未有志不属意學問常晝寢夢得一鳥􅆑五色􅄂耀不似人間物夢中因取吞之於是漸有志向遂更勤學讀九經以清才聞羅含傳云吞飛鳥􅆑吴氏本草曰丹鷄􅆑可作虎珀張衡南都賦曰春􅆑夏笋張孟陽洛禊賦曰浮素􅆑以蔽水洒玄醪於中河鳥巢尚書大傳曰古人鳯皇巢其樹好生惡殺說文曰鳥在术上曰巢在穴曰窠曾子曰鷹鸇以太山爲下而増巢其上孫卿子曰古之王者烏鵲之巢可俯莊子曰古者禽獸多而人民少於是民皆巢居以避之晝拾象粟暮栖木上故命之曰有巢氏之民又曰鵲上髙城之墉而巢於髙枝之㒹城壤陵風而起又曰至德之君烏鵲之巢可攀援而窺淮南子曰鵲巢知風之所起言鵲作巢而知風一說背風也陸賈新語堯以仁義爲巢舜以稷卨爲杖􅁗以刑罰爲巢故有覆巢破􅆑之患太平御覽卷第九百二十八
