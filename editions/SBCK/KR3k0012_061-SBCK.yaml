front:
  text: 太平御覽卷第六十一地部二十六
  hash: sha256:62c457fe8e4aad8b8e8ce94fee5e41e54cc2cf16cd531d001a3a8ac85ed14f02
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_061-1a}
body:
  text: 河祥瑞沉祭决塞淮濟河祥瑞折沉􅀕折決塞並附釋名曰河下也隨地下處而通流也山海經曰崑崙山縱廣萬里髙萬一千里去嵩山五萬里有青河白河赤河黒河環其墟其白水出其東北陬屈向東南流爲中國河河百里一小曲千里一大曲發原及中國大率常然東流潜行地下至規期山北流分爲兩源一出䓗嶺一出于闐其河復合東注蒲昌海復潜行地下南出積石山西南流又東廻入塞過燉煌酒泉張掖郡南與洮河合過安定北地郡北流過朔方郡西又南流過五原郡南又東流過雲中西河郡東又南流過上都河東郡西而出龍門汾水從東於此入河東即龍門所在吕氏春秋曰龍門未開河出孟門東大溢是謂洪水禹鑿龍門始南流至華隂潼􅀜與渭水合又東廻過砥柱砥柱山名河水分流包山而過山見水中􅀂柱然今陜州東河北陜縣三縣界及洛陽孟津所在至鞏縣與洛水合成皐與濟水合濟水出河北至王屋山而南截河渡正對成皐又東北流過武德與沁水合至􅀺陽信都信都今兾州絳水所在絳水亦曰潰水一曰漳水鉅鹿之北遂分爲九河鉅鹿今邢州大陸所在大陸澤名九河一曰徒駭二太史三馬頰四覆釡五胡蘇六簡七絜八鉤盤九鬲津又合爲一河而入海齊􅁊公塞九河以廣田居故館陶貝丘廣川信都東光河間以東城池九河舊跡猶存漢伐河決金堤南北多罹其害議者常欲求九河故迹而穿之未知其所是以班固云自兹距漢以亡其八枝也河之故瀆自沙丘堰南分河出焉故尚書稱導河積石至于龍門今絳州龍門縣界南至于華隂北至于砥柱東至于孟津在洛北都道所湊古今以爲津東過洛汭至于大伾洛汭今鞏縣在河洛合流之所也大伾山今汜水縣即故成皐也山爯成曰伾北過絳水至于大陸其絳水今兾州信都大陸澤名今邢州鉅鹿又北播爲九河同爲逆河入海是也同合出九河又合爲一名爲逆河逆迎也言海口有潮夕潮以迎河水書曰九河旣道孔安國注曰河水分爲九道詩曰關􅀜雎鳩在河之洲又曰新臺有泚河水瀰瀰又曰河水洋洋北流活活又曰誰謂河廣一葦航之誰謂送逺􅉥予望之又曰不敢􅁀虎不敢慿河大戴禮曰聖人有國則河不滿溢禮斗威儀曰君乗土而王其政太平則河溓宋均注曰河不災溢也傳曰周詩有之曰俟河之清人壽幾何詩逸詩也言人壽促而河清遲喻􅀳之不可待也又曰楚昭王有疾􅁲河爲祟大夫請祭王曰江漢沮漳楚之望也河非所獲罪春秋考異郵曰河者水之氣四瀆之精所以流化故曰河潤千里孝經援神契曰河者水之伯上應天漢史記曰秦滅六國自以爲獲水德之瑞更名河曰德水漢書曰河有兩源一出葱嶺山一出于闐于闐在南山下其北流與葱嶺河合東注蒲昌海一名鹽澤又曰長水校尉髙竝言河決率常於平原東郡左右其地形下而土䟽惡也聞禹理河本空此地以爲水猥近察秦漢河決曹衛之域不過百八十里可空此地勿以爲官亭民室張璠漢紀曰郭伋爲頴川太守光武詔曰賢能太守去帝城不逺河潤九里兾京師并蒙其福魏志曰􅀽紹渡河沮授臨舟歎曰上􅄹其志下務其功悠悠黄河吾其濟乎說􅁐曰甘茂使齊渡河舩人曰河水猶澗耳君不能渡何王之能說乎甘茂曰持擑隨流臣不􅀂子說萬乗之君子不如我􅁊譚新語曰大司馬張仲議曰河水濁一石水六斗泥而民競決河漑田令河不通利至三月桃花水至則決以其噎不泄也可禁民勿復引河韓詩外傳曰申徒狄非丗將自投於河崔嘉聞而止之曰聖人民之父母也今爲濡足之故不救溺人可乎申徒狄曰昔桀殺龍逄紂殺比干而亡天下呉殺子胥陳殺泄治而滅其國非無聖知不用故也遂􅀒石而沉於河河圖始開圖曰黄帝問風后曰余欲知河之始開風后曰河凢有五皆始開乎崑崙之墟愼子曰西河下龍門其流駃竹箭抱朴子曰撮攘不能塡決河升水不能冷原火又曰寸膠不能理黄河之濁尺水不能却蕭丘之火淮南子曰武王伐紂至孟津陽侯之波逆流而擊疾風晦􅁳人馬不相見於是武王左操黃􅃏右執白旄瞋目而麾曰余在天下誰敢害余意者於是風濟波罷又曰河以委虵委虵音逶迤故能逺山以陵遲故能髙道以優游故能化又曰水九折注海而流不絶者有崑崙之輸也風俗通曰河播也播爲九州也物理論曰河色黄衆川之流蓋濁之也百里一小曲千里一曲一直山海經曰從極之淵深三百仞唯冰夷􅁪都焉冰夷馮夷也淮南子曰馮夷得道以潜大川馮夷人面乗兩龍乗雲車駕二龍水經注曰禹理洪水觀於河見白面長人魚身出曰吾河精也授禹河圖而還於淵又曰昔澹臺子羽齎千金之璧渡河陽侯波起兩蛟挾舟子羽曰吾可以義求不可以威刼操劒斬蛟蛟死波休乃投璧於河三投而輙躍出乃毀璧而去示無恡意又曰崑崙在北去嵩髙五萬里地之中也髙萬一千里河水岀其東北蕭廣濟孝子傳曰三洲人者各一州人皆􅀌單焭獨三人闇㑹樹下息因相訪問老者曰寜可合爲斷金之業邪二人曰諾即相約爲父子因命二人於大澤中作舎且欲成父曰此不如河邊二人曰諾河邊舎幾成父曰又不如河中二人復填河二旬不立有一書生過之爲􅅞兩土肫投河中㑹父往呼止之曰甞見河可塡耶觀汝行耳相將而去明日俱至河邊望見河中土髙丈餘祥瑞河附禮記曰河岀馬圖言龍馬􅀒圖也河圖曰黄帝云余夢見兩龍授圖乃齊往河洛而求有魚折溜而止魚汎曰圖跪而受之運斗樞曰舜與諸侯觀河洛有黄龍􅀒圖岀置帝前䠠入水而前去䠠之遊反又音帶䠠去也拾遺記曰黄河千年一清聖王之大瑞也易乹鑿度曰帝王將起河水先清清變白白變赤赤變黒黒變黄各三日中候曰榮光出河休氣四塞滎光即五色論語曰河不出圖吾巳矣夫沉􅀕河附穆天子傳曰天子西狩獵獲白狐玄貉以􅀕于河禮記曰三王之􅀕川也皆先河後海此所謂務本言海之本源自河也史記曰元光中河決於匏子於是天子臨決河沉白馬玉璧於河令羣臣從官自將軍巳下皆􅀒薪塡決河而取淇園之竹以爲堰天子旣臨河決悼功之不成乃作瓠子之歌决塞河附􅂖梁傳曰梁山崩壅河三日不流􅀳君召伯尊伯尊遇輦者問焉輦者曰君親素縞帥羣臣哭之旣而祠焉伯尊至君問之伯尊如其言而河流矣左傳曰伯宗漢書曰成帝時河決潰金隄凢灌四郡河隄使者王延丗塞以竹落長四丈大九圍盛以小石兩􅂳夾載而下之三十六日河隄成改元爲河平又曰賈讓奏言治河有上中下三筞􅀂徙其當水衝之人以避之放河使北入海泛濫期月自定不勞人力此功一立河定人安千載無患謂之上筞􅀂多穿漕渠使人得以漑田雖非聖人法然亦救敗術也今㩀堅地作石隄東西水門但用木以土耳旱則開東方水門以漑田水則開西方髙門以分河此誠冨國安人興利除害謂之中䇿苟繕完故堤増卑陪原勞費無巳數逢此害謂㝡下䇿也又曰武帝元光中河水從頓丘發卒十萬救決河起龍淵宫武廟也自作之故言宫吕氏春秋曰故龍門未開吕梁未發河水孟門大溢逆流名曰洪水禹乃決江䟽河爲彭蠡之鄣所治者千八百國此禹之功文子曰江河之大溢不過三日水經注曰漢平帝之丗河汴決壞未及得修汴渠東侵日月彌廣門閭故處皆水中也漢明帝永平十二年議治汴渠上乃引樂浪人王景問水形便景陳利害應對敏捷帝甚善之乃賜山海經渠書禹貢圖及以錢帛發卒數十萬詔景與將作謁者王呉治渠防築隄修堨起自滎陽東至千乗海口千有餘里景乃商度地勢鑿山開澗防遏衡要踈決壅積十里一門水更相廽注無復潰漏之患明年渠成帝親隨廵行詔濵河郡國置河堤貟吏如西京舊制由是顯名王呉及諸從事者皆増秩一等順帝陽嘉中又自汴河口以東縁河積石爲堰通淮曰金堤靈帝建寜中又増修石門以遏渠口水盛則通注津耗則輟流淮春秋􅀃題辭曰淮出桐栢淮者均也均其務釋名曰淮圍也圍遶揚州北界東至海廣雅同􅀃文曰淮岀南陽平氏桐栢大復山東南水經注及山海經云淮水岀南陽平氏縣桐栢山其源初則涌岀復潜流三十里然後長騖東北經大復山從義陽郡北東過江夏平春縣北又東過新息縣南期思縣北至原鹿縣南與汝水合又東過廬江安豐縣與決水合東北至九江壽春縣東與頴水合壽春縣北與淝水合又東至當塗縣北與渦水合東北至下邳淮隂縣與泗水合東至廣陵淮浦縣而入海也近海數百里通朝夕潮尚書稱導淮自桐栢東㑹于泗沂入于海是也書曰淮沂其乂又曰泗濵浮磬淮夷蠙珠周禮曰橘踰淮而北爲枳此地氣然也詩曰率彼淮浦省此徐土孟子曰禹排淮泗而注諸江焦貢易林曰江河淮海天之奥府衆利所聚可以饒有劉向􅀃􅁐曰莊周貧徃貸於魏文侯文侯曰待吾邑粟之來而奉之周曰乃今者周之來見道牛蹄中有鮒魚焉太息謂周曰我尚可活也周曰須我爲汝向南詣楚王決江淮以漑汝鮒魚曰今命在盆甕之中耳乃爲我見楚王決江淮以漑我汝即索我於枯魚之肆矣􅀳陽秋曰秦始皇東遊望氣者云五百年後金陵有天子氣於是始皇改曰秣陵塹北山以絶其􅀔今建康即秣陵西北界所塹即建康南淮也今謂之秦淮淮南子曰夫醉者超江津以爲㝷常之溝也濟釋名云濟濟也言源岀河北濟河而南也水經注及山海經云濟水出河東垣縣王屋山初名流水風俗通云濟水出常山房子縣賛皇山此又則是一水耳應氏以爲流入濟者非也東出温縣西北始名濟水孔安國注尚書泉源爲沇流去爲濟在温西北平地又東南流當鞏縣之北而南入河與河並流過成臯成臯今汜水縣􅀳書地道志曰濟自大伾入河與河水􅃲大伾成皐古成皐兼包鞏縣之界溢出爲滎水東流過陽武及封丘縣又東過􅁈朐縣南至定陶縣南又東北流與荷水㑹東至乗氏縣西分而爲二其一東北流入鉅野澤過壽張西與汶水合又北過榖城縣西又東北過廬縣北經齊郡東萊郡而入海也尚書稱導沇水東流爲濟河水所在也又東北㑹于汶又東北入于海是也淮南子曰濟水通和冝麥風俗通曰濟岀常山房子賛皇山廟在東郡臨邑縣濟者齊也齊其度量也戴延之西征記曰濟水自大岯入河與河水􅃲而東流劉向􅀃􅁐曰泗瀆江河淮濟何以視諸侯能蕩滌垢濁焉能通百川於海焉能蕩岀雲􅀨焉爲德甚美故視諸侯周禮冬官曰鸜鵒不踰濟地氣然也左傳曰鄭伯之車僨于濟韓子曰清濟濁河足以爲限長城巨防足以爲塞齊五戰之國也太平御覽卷第六十一
