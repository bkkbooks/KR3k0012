front:
  text: 太平御覽卷第六百七十四道部十六
  hash: sha256:c344a05251302c75851290bbb2d8db9c47f03440f3c515858af9dbf7749fb4e9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_674-1a}
body:
  text: 理所五岳山名圖曰性命魂神之所屬皆有理所神異經曰崑崙有銅柱其髙凌雲所謂天柱圍三千里貟曲如削下有仙曹九府治所又曰崑崙三角其一角正北干辰星名曰閬風巓其一角正西名曰玄圃臺其一角正東名曰崑崙宫上有玉樓十二景雲映日朱霞九光西王母之治所眞官仙靈之所宗登眞隱訣曰上清之境九天之門上皇太皇帝君玉尊集群神於其中以定天下萬民之罪福又曰西華堂在上清王母所居又曰文德宫張叔隱處之又曰八景城在上清玉晨道君所居又曰赤城太元眞人所居又曰上清有楊􅋁殿上皇太帝玉尊集羣眞於内又曰希琳殿在上清東海八停山上太帝君所居又曰琅玕殿在上清金闕聖君所居也又曰上清之境有丹城紫臺上皇大帝君玉尊集處又曰七靈臺在上清境玉晨道君所居又曰明眞臺在上清境東海八停太山上帝所居又曰郍弗臺在上清境方諸東華山上青童君所居又曰上清境有希林臺太帝道君居之東方朔十洲記曰有光碧堂西王母所處也三九素語曰蘭臺宫赤桂玉女處之玉房宫黄帝之女處之十洲記曰滄浪海島上有積石室多石象八石腦石桂英也又曰紫石宫室九老仙都治處也又曰崑崙山一名昆陵山一名玄圃臺上有積石圃大冶井西母宴㑹之所也又曰崑崙有瓊華室西王母處之又曰玄洲在北海亥地有太玄仙都伯眞公所治也又曰聚窟洲在西海中北接崑崙上多眞仙宫弟有辟邪天鹿之獸洲上有大樹與楓木相似而芳華聞數里又曰神仙島有紫石宫室九老仙都治處仙官數萬人又曰方丈在東海中三天司命所居處羣仙皆徃來其上太洞眞經曰太素三元山有中黄太一上帝之館又曰玉晨大道君治蘂珠貝闕又曰玉皇道君居青雲之城玉堦文陛又曰玉容堂者虚無眞人之逸宅亦眞氣之明堂又曰玉容堂者太上之明堂也得道符籍之所在又曰萬華宫在小有玉眞之天小有先生之所治又曰絶空之宫在玄洲之北九眞仙上帝司禁君㑹仙處也又曰圎華宫黄老之所處又曰太霞之中太虚元君之所處也又曰秀華山太極真人呼曰圎明丹室五靈眞君處之又曰青精君登紫空之山化玉室之内又曰崑崙山有金丹流雲之堂上接琁璣之輪下在太室之中西王母所治眞仙之女所處也又曰玉室青精君之所處又曰玉華三元君處流逸之室又曰太虚有太霞之室合九雲而立宇太虚元君之所處也又曰青華之室青童君乗玉彫之軿御圎珠之氣而入山室又曰大老之室在上清八皇老君乗廣琅車而入又曰流剛山上有暉景之室西王母治所也金根經曰青要帝君在丘玉國黄金紫殿青要帝君所處又曰八闕天人散香其間闕上有金臺九層臺上玉晨鎮君所進居也有金輝紫殿後聖金闕帝君所居處也上清經曰上清南極長生司命君藏瑶臺丹靈宫又在蘭庭雲臺又登絶空之中紫碧玄臺又曰有紫微玄琳殿中央黄老君居之又曰恊晨虚觀層之室太上大道君閑居處也又曰元始居紫雲之闕碧霞爲城又曰有黄房之室一石玉容之堂眞晨道君治其中太眞科崇玄臺天師朝禮處又曰有燕仙室天師教化處也南眞􅀃曰西王母女媚蘭字申林治滄浪山受書爲雲林天人又曰北元中玄道君李慶賔女受書爲東宫靈昭文人治方丈臺第十三朱館中又曰閬野者閬風之府是也崑崙上有九府是爲九宫太極爲太宫諸仙皆是九宫之官僚耳至於眞人乃九宫之公卿也又曰大方諸宫青君常治處也其上人皆天眞髙仙太極公卿諸司命所處有服日月芒法雖巳得道爲眞猶故服之霍山赤城亦爲司命之府惟太元眞人南岳夫人在焉李仲甫在西方韓衆在南方餘三十二司命當皆在東華東華青童爲大司命㹅統也楊君亦去東􅎮執事不知當在第幾耳又曰句曲山漢三茅君治其上各乗一白鵠集於處所時人㸦有見者山生黄金漢靈帝時詔勑郡縣採句曲之金以充武庫至孫權時又遣􅀫衛人採金常輸於官又曰方丈西北有隂成大山滄浪西南有陽長大山其山多眞仙之所處是陽九百六應數之摽掲也秀華山有玉堂乃五靈眞君所處也又曰金華山上有五宫太一所處又曰玄洲之上有景暉之室西母之治所神洲七轉七變經曰西隴濛汜之濵紫微玉堂王母請誥靈素章之處也飛龍隱訣曰北極眞公治於北極廣虚之室大洞雌一篇曰三元君在元虚之室元始序曰寒靈丹殿在上清太玄王都道君請眞文之處又有玉寳之殿帝尊所處也王君内傳曰紫清太素瓊闕太素三元道君之所治也洞玄經曰太極紫瑶之闕太極玄元眞君所治之處自天地已來人之生死簿籍在其中玉清書曰玉户瓊門九皇上眞在其中茅君内傳曰玉清天中有散華臺是四斗七晨道君之所治也列仙傳曰太空瓊臺太平道君處之上清八景飛經曰玉寳臺三元君所登處也三元眞一經曰黄􅏱紫户玄精之室身中三一尊君常栖息之所神祝經曰太上玄堂天人所止夲行經曰有三元洞室妙眞人所處也道學傳曰茅山鷰口洞女冠錢妙眞登壇處也定志經曰天尊静處玄都元陽七寳紫微官太一洞眞經曰有太極紫房宫天帝寳神所處也玉清經曰玉清宫髙眞玉皇出入處洞􅁳記曰冝都崇堂在紫泥之海東方朔宴息之所也洞眞經曰大老寢堂八皇老君居處也三元玉檢經曰廣靈之堂太素三元君處之在上清天玄母八門經曰五通仙堂者五通帝君在其内又曰散花玉室三素元君在其内玉清隱書曰瓊琳堂上皇玉帝寢宴處也道學傳曰洞室中有太隂堂龍威丈人所見眞文之所處也􅀛山元籙曰文􅀛洞室上元君坐之處也􅁑洪神仙傳曰金華山有石室一所丹溪人皇􅀄平之隱處也清虚眞人王君内傳曰委羽山洞周迴萬里名曰大有空明天司馬季主在其中又曰西域玉山洞周廻三千里名太玄惣眞天司命君之所處也名山記曰益州西南青城山一名青城郡山形似城其山有崖舎赤壁張天師所治處南連峨嵋山山遥望唯見兩青嶺山如蚕蛾之眉亦有洞天諸靈書所藏不知當是第幾洞天也又曰赤城丹山洞周三百里名曰上清玉平天此山下洞臺方二百里司命君之府也玉京經曰玄都玉京山有七寳城太上無極大道虚皇君之所治也髙仙之玄都焉大有經曰太清極玄宮在元景之上太上君居之三元布經曰上清玉景宫佩三元布人在其中道迹經曰秀華玉堂五靈眞之所處也又曰洞眞堂元始天王太一髙聖君􅀃觀身大戒之所也昇玄經曰玉清臺仙聖遊衍之所七星移度經曰帝君上登太極瓊臺上原經曰眉笁仙公住南岳五符經曰皇人在峨嵋山北絶巗之下蒼玉爲屋􅀛山元籙曰紫閣西華玉女居之神祝經曰九合之室太上在其内玉晨明鏡經曰有太玄玉晨金華之室三素元君處之眞誥曰大茅山西南有四平山俗呼爲方山其下有洞室名曰方臺洞與華陽通號爲別宇幽館得道者處之又曰方偶山下有洞室名曰方源舘幽人居之又曰包山下有石室銀户方圎百里又曰有天市壇范丘林受口訣處又曰有方臺仙人蔡天生隱其内又曰清虚宫司馬季主隱處也又曰積石臺朱孺子居之又曰寢静之室㳙子處之又曰蓬萊仙公洛廣休治蓬萊山又曰許玉斧居方山洞爲上清仙公又曰羡門今在蒙山大洞黄金之庭受書爲中元仙卿又曰廣漢郡綿竹縣東九里有山昔韓衆於上得仙有大石銅爲誌治應箕􅀫又曰廣漢郡新都縣去成都一百五十里山有芝草神藥前有池水中有神魚五頭昔王方平於此與太上相見治應斗􅀫又曰越雋郡卭都縣有小山大山名􅂪治山其髙無踰伊尹於此學道上有芝英金液草服之度世治應奎􅀫又曰雲臺山有桃一樹三年一花五年一實懸絕無底之谷唯趙昇乃自擲取得桃子餘者無能取之治應胃宿又曰天柱山有玉女乗白鶴仙人乗白鹿在雲臺治前有兩碑又曰玉局治在成都南永壽元年正月七日太上乗白鹿張天師乗白鶴來至此坐局脚玉􅇃即名玉局治應􅀑􅀫又曰鍾山在北海子地隔弱水自生神草仙家種芝課計頃畒如稻􅃺亦有玉石泉上有九源丈人宫主領天下水神又曰扶桑在碧海中大帝宫太眞東主所治處也又曰蓬萊山上有九天眞宫蓋太眞仙人所居玉凉仙山經曰方諸宫青童君治之太丹宫南極元君治之白山宫太素眞君治之西城宫惣眞王君治之太眞科曰有無央宫髙上太眞居之􅀛山元籙曰金華宫西華玉女處之上清經曰啓金宫玉寳九霄丈人居之七映宫紫映九霄眞人居之玉清元寳宫髙上虚皇君處之金靈宫紫虚髙上元皇道君居之朱靈宫上皇虚君居之洞雲宫皇上帝君處之金輝宫紫皇君居之靈映宫髙亭君居之變化宫玉皇先生居之玉寳宫紫精君居之飛玄宫玄一君居之玄上宫玉皇先生居之變雲宫太帝君居之金門宫皇上帝君居之陽明宫洞眞君居之元景宫太素君處之紫瑶宮北玄君居之納靈宫南朱君居之音光宫西華君居之靈金宫中元君居之紫微宫東明君居之鳯生宫髙上君居之朗範宫元辰君居之七瑶宫九元君居之鬰森宫大明君居之雲森宫元靈君居之洞霄宫三元君居之返香宫元昭君居之長命宫太極元君居之髙虛宫紫元君居之飛玄宫上眞老君居之瓊容宫洞景君居之耀瓊宫大陽君居之明眞宫景元君居之紫曜宫司命君居之通妙宫天皇君居之金華宫黄房君居之天皇宫太一君居之閑清府九天丈人居之又有丹府三天玉童居之又有重􅁳府玉寳九霄丈人居之鳯生府九霄眞人居之金府靈皇君居之丹神府上皇元道君居之生眞府玉虚君居之金魂府萬始先生居之務虚府皇帝君居之紫曜府紫皇君居之神變府中元君居之九合府玉皇先生居之又曰有􅤆層之室玉晨道君處之又曰幃緑之室太元眞人處之漢武内傳曰有紫桂宫太上丈人居之太平御覽卷第六百七十四
