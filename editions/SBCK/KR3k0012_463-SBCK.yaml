body:
  text: 人事部一百四辯上說文曰辯治也音被免切尚書曰君罔以辯言亂舊政爾雅曰諸諸便便辯也論語曰便便言惟謹爾鄭􅀇曰便便辯貌又曰孔子曰惡利口之覆􅀖家者又曰禦人以口給家語曰子夏問子貢何人子曰辯人丘弗及也又曰宰予魯人也有口才以言語著名又曰孔子登農山謂二三子各言爾志子貢進曰賜願使齊楚合戰於莽瀁之野兩壘相當旗鼓相望埃塵相接挺刃交兵賜着縞衣白冠陳􅀃其間推論利害二國釋患唯賜能之矣夫子曰辯哉史記曰子貢利口巧辤孔子常絀其辯田常欲爲亂於齊移兵欲伐魯孔子謂弟子曰夫魯墳墓所處父母之國國危二三子何爲莫出子貢請出孔子許之遂行子貢壹出存魯亂齊破呉強晉霸越又曰漢遣陸賈􅀃項王請大公項王弗聽漢王復使侯公徃􅀃項王乃與漢約中分天下割鴻溝以西者爲漢鴻溝以東者爲楚項王即歸漢王父母妻子軍皆呼萬歳漢王乃封公爲平國君曰此天下辯士所居號爲平國又曰范睢欲事魏王家貧無自資乃先事魏中大夫須賈爲魏使齊齊襄王聞睢辯有口賜金印及牛酒又曰上問上林諸尉禽獸十餘左右視不能對虎􆂁嗇夫從旁代尉對上所問禽獸簿甚悉次觀其口對響應無窮乃拜嗇夫爲上林令又曰􅁗蔡澤遊學于諸侯大小甚衆而不遇因從唐舉相曰聞子相李兊百日之内持國柄有之乎曰有之澤曰今􅀂臣者何如唐舉熟視而􅀏曰先生揭􅈹戾脣魋顔蹙齃吾聞聖人不相殆先生乎蔡澤被唐舉之戲乃曰冨貴吾所自有吾不知者壽也願聞之舉曰先生從今巳徃四十三歳澤􅀏謝去謂其衘者曰吾躍馬食肉冨貴四十三年亦足矣乃來入􅁗使人宣言以感怒應侯范睢曰燕容蔡澤天下俊雄辯智士也彼一見􅁗王必奪君位應侯使人召澤澤入揖應侯應侯固不快矣及見又倨應侯因讓之曰子甞宣言欲代吾相􅁗豈有之乎對曰然應侯曰請聞其􅀃澤曰吁君何見之晚耶夫四時之序功成者去未成者來君禄位貴盛私家之冨皆巳極矣不退將危臣之代君不亦冝乎應侯善之乃延入坐爲上客後數日入朝言於王曰客有新從山東來蔡澤其人辯士臣見人衆莫能及之臣不如也王召見與語大恱之拜爲客卿應侯因謝病請歸相印昭王許之以澤爲相終如其志又曰蘇􅁗初與張儀俱事鬼谷先生十一年皆通六藝經營百家之言􅀑谷先生弟子五百餘人爲之土窟窖􅀷二丈先生曰有能獨下􅀃窖中使我泣出者則能分人主之地乆蘇􅁗下􅀃窖中􅀑谷先生泣下沾衿次張儀下􅀃窖中亦泣先生曰􅂫􅁗詞說與張儀一體也又曰楚陳􅎮詞辯之士也􅀄與張儀俱事􅁗惠王惠王皆重之儀惡􅎮於王曰陳􅎮重幣輕信􅁗使之楚將爲交也今楚不善於􅁗而善於􅎮王以儀言召􅎮問之􅎮曰然王聞楚有两妻者乎王曰不聞􅎮曰楚有兩妻者人挑其長者長者罵之挑其少者少者復挑之居無何有兩妻者死客謂挑者曰謂汝娶長者乎少者乎挑者曰娶長者客曰長者罵汝少者復挑汝何故娶長者對曰居人之所則欲其挑我爲妻則欲其罵人今楚王明主昭陽賢相使􅎮爲臣常以國情輸楚楚王將不留臣昭陽將不與臣從事矣臣必之楚足以明臣爲楚與不也􅎮岀張儀入問王曰􅎮果欲之楚不王曰然􅎮天下之辯士寡人遂無柰何也惠王終相張儀􅎮遂奔楚楚用爲上卿後􅎮爲楚使之􅁗惠王見之謂曰子去寡人之楚寡人甚思子子思寡人乎􅎮曰王聞越人莊舄乎王曰不聞􅎮曰越人莊舄仕楚執珪有頃而病楚王曰舄越之鄙人凢人之思固在其病也思越則越聲不思越則楚聲使人聽之猶尚越聲今臣弃逐之楚能無􅁗聲哉漢書曰酈食其有詞辯年六十身長八尺鬢髮皓然請見髙祖謁者曰上好嫚罵人不喜儒生有客冠而來者輙解其冠而溺其中食其作色叱之曰我髙陽酒徒何儒生之有謁君股慄而見之髙祖乃踞床使兩女子洗足食其入長揖不拜曰欲助􅁗攻諸侯乎將欲率諸侯攻􅁗乎髙祖罵曰竪儒夫天下同苦􅁗乆矣故諸侯相率攻􅁗汝奚爲助􅁗耶食其曰必欲聚合義兵誅無道􅁗不冝踞見長者髙祖懔然而起抜足揮洗攝衣延食其坐而謝之食其因言六國縱横王覇之道高祖大恱問其計食其曰足下起烏合之衆収散亂之兵不滿二旅而欲皷行入􅁗所謂探虎口而餵餓狼也夫陳留者當天下之衝四通五逵之郊城堅粟多可以少留臣知其令請使命下之如不聽可舉兵攻之臣爲内應不崇朝而拔之矣於是髙祖乃遣食其􅀃陳留令髙祖引兵隨之遂下陳留又曰少府五鹿充宗貴幸善梁丘氏易元帝好之欲考其異同令與諸家論易充宗貴辯口諸儒莫能與抗皆稱疾不敢㑹有薦朱雲者召入攝齊登臺抗首而請音動左右旣論難連柱五鹿君故諸儒爲之語曰五鹿嶽嶽朱雲折其角又曰婁護爲人短小精辯論議常依名節聽之者竦然與谷永俱爲五侯上客長安號曰谷子雲之筆札婁君卿之脣舌言其見信用也又曰􅄯錯頴川人也爲太子家令以其辯得幸太子太子家號曰智囊又曰田蚡貴幸爲中大夫辯有口學盤盂諸書應劭曰黄帝史孔甲所作名也孔甲盤孟二十六篇又曰東方朔自公卿在坐朔皆傲弄無所屈上以朔口諧給甞問先生視朕何如主也朔對曰自唐虞之隆成康之際未足喻當世臣朔伏觀陛下功德陳五帝之上在三王之右非􅀂此而巳誠得天下賢士公卿在位或得其人譬若以周邵爲丞相孔丘爲御史大夫太公爲將軍卞莊子爲衛尉臯陶爲大理后稷爲司農伊尹爲少府應劭曰伊尹善烹割太官屬少府故令作子貢使外國顔閔爲􅀶士子夏爲太常孟子爲右扶風季路爲埶金吾契爲鴻臚龍逢爲宗正伯夷爲京兆管仲爲馮翊魯般爲將作山甫爲光禄申伯爲大僕延陵季子爲水衡百里奚爲典屬國曉其風俗故令為之柳下惠爲大長秋史魚爲司直蘧伯玉爲太傅如淳曰太傅傅人主使無過伯玉欲寡其過也孔父爲詹事叔敖爲諸侯相子産爲郡守王子慶忌爲期門夏育爲鼎官羿爲旄頭宋萬爲式道候上乃大􅀏也又曰終軍字子雲濟南人少好學以辯􅀶能屬文聞於郡年十八選爲􅀶士弟子至府太守聞其有異才召見軍甚竒之及至長安上書言事武帝異其文拜軍爲謁者給事中又曰蒯通知天下權在於韓信令背漢乃先微感信曰僕甞受相人之術相君之面不過封侯又危而不安相君之背貴而不可言信曰何謂也通曰天下􅀄作難也俊雄豪傑建號壹呼天下之士雲合霧集魚鱗雜襲飈至風起當此之時憂在亡􅁗而巳今劉項分争使人肝腦􅂗地流離中野不可勝數今時兩主懸命足下足下爲漢則漢勝與楚則楚勝臣願披心腹肝膽効愚忠恐足下能用也方今爲足下計莫􅀂兩利而俱存之三分天下鼎足而立天下孰不聽足下願圖之信曰漢王遇我厚吾豈可見利而背恩乎通曰臣聞勇累震主者身危功盖天下者不賞今足下挾不賞之功載震主之威歸楚楚人不信歸漢漢人震恐足下欲將安歸乎故猛虎猶預不如蜂蠆之致螫孟賁狐疑不如童子之必至信不忍背漢遂謝通通􅀃不聽惶恐乃佯狂爲巫天下旣定後信以罪廢爲淮隂侯謀反誅臨死歎曰悔不用蒯通之言髙帝曰是齊辯士蒯通廼詔齊召蒯通至上欲烹之曰􅀂教韓信反何也曰狗各吠非其主當彼時臣獨知韓信非知陛下也且􅁗失其鹿天下共逐之高材者得天下洶洶争欲爲陛下所爲頋力不能何憚誅耶上迺赦之又曰淮南王黥布反朱建諌之不聽漢旣誅布聞建諌之髙祖賜建號平原君家徙長安爲人辯有口刻廉剛直行不苟合義不取容又曰辯士曹丘生數招權頋金錢孟康曰招金錢事權貴而求事也事貴人趙談竇長君等善季布聞􅀉書諌長君曰吾聞曹丘非長者勿與通及曹丘歸欲得書謁布竇長君曰季將軍不􅀃足下足下無徃固請遂使書人先發書布大怒曹至則揖布曰楚人諺曰得黄金百鎰不如得季布一諾足下何以得此聲梁楚之間哉且僕與足下俱楚人使僕游􅀭足下名於天下顧不羙乎何足下之距僕􅀷也布乃大恱引入留數日爲上客厚送之布名所以益聞者曹丘􅀭之也范曄後漢書曰黄琬字子琰瓊之孫早而辯慧祖父瓊爲魏郡太守建和元年正月日蝕京師不見而瓊以狀聞梁太后太后詔問所蝕多少瓊思其對而未知所况時琬年七歳在旁云何不言日蝕之餘如月之􅀄瓊大驚即以其言應詔又曰孔融字文舉孔子丗孫也李膺爲河南尹恃才倨傲誡守門者非吾通家子孫不得輙通融年十二入洛欲以觀其人乃謂守門者曰吾與李君通家子孫耳守門者告膺膺呼召問曰卿與吾有何所故融曰臣先君孔子與公老君同德比義則臣與公累代通家也膺大恱引坐謂曰卿欲食乎融曰須食膺曰教卿爲客之禮主人問食但讓不須融曰不然教君爲主之禮但置於食不須問客膺慙乃歎曰吾將老死不見卿冨貴也融曰公殊未死膺曰如何融曰鳥之將死其鳴也哀人之將死其言也善向來公言未有善也故知未死膺甚竒之後與膺談論百家經史應荅如流膺不能下之又曰劉祐字伯祖中山安國人也祐􅀄察孝廉􅀘尚書侍侍郎閑悉故事文札強辯每有奏議對應爲儕􅀋所歸謝承後漢書曰郭宏爲郡上計吏正月朝覲宏進殿下謝祖宗受恩言辭辯麗專對移時天子曰潁川乃有此辨士邪子貢晏嬰何以加之羣公屬目卿士歎伏又曰郭宏爲郡上計吏朝廷問宏潁川風俗所尚土地所岀先賢將相儒林文學之士宏援經以對陳事荅問出言如浮引義如流東觀漢記曰班超字仲叔扶風平陵人徐令彪之子也爲人大志不脩細節然内孝謹居家常執勤苦不耻勞辱有口辯而渉獵書傳魏志曰黄􅀄元年郭淮奉使賀文帝踐祚而道路疾稽留帝正色責之曰昔禹㑹諸侯於塗山防風後至使行顯戮今􅄎天同慶而最留遲何也淮對曰臣聞五帝先教道人以德夏后政衰始用刑辟今臣遭唐虞之代是以自知免於防風之誅也帝恱之擢領雍州刺史魏典畧曰邯鄲之北有蘇大侯者􅂫􅁗徃􅀃之􅂫大侯送以百金家丞問其故蘇大侯曰客辯士也立談之間再奪吾地而復歸之吾地雖小豈直百金耶又曰韓宣字景然渤海人爲人短小建安中丞相召署軍謀椽冗散在鄴甞於鄴歩行入宮於東掖門内與臨淄侯植相遇時天新雨地有泥潦宣欲避之閡潦不得去乃以扇自鄣住於道邊植嫌旣不去又不爲禮乃駐車使其常從問宣何官宣云丞相軍謀椽也植又問曰應得唐突列侯不宣曰春秋之義王人雖微列于諸侯之上未聞宰士而爲下士諸侯之禮植又曰即如所言爲人父吏見其子應有禮不宣又曰於禮臣子一例也植知其難窮乃釋去去以爲辯也梁祚魏國統曰黄權來降文帝從容謂權曰君舎逆効順欲進蹤陳韓邪對曰臣過受劉氏殊遇降呉不可歸蜀無路是以歸命且敗君之將免死爲幸何古人之敢慕也帝善之呉志曰孫權問諸􅁑恪曰卿父與叔父孰賢對曰臣父爲優權問其故對曰父知所事叔父不知以是爲優權又大噱命恪行酒至張昭前先有酒色不肯復飲曰此非養老之禮也權曰卿其能令公辭屈乃當飲之耳恪難昭曰師尚父九十秉旄伏􅃏猶未告老也今軍旅之事將軍在後酒食之事將軍在先何謂不養老也昭卒無辭遂爲盡爵又曰孫權遣都尉趙咨使魏帝問曰呉王何等主趙咨對曰聦明仁智雄畧之主也帝問其狀荅曰納魯肅於凢品是其聦也拔吕蒙於行軍是其明也獲于禁而不害是其仁也取荆州兵不血刃是其智也據三州虎視於天下是其雄也屈身於陛下是其略也又曰薛綜字仲文沛郡人其先田文封薛因以氏焉避地交州士爕召爲交阯太守及還都蜀使張奉於權前嘲尚書闞澤澤不能荅綜曰有犬爲獨無犬爲蜀横目狗身䖝入其腹奉曰不當復别呉耶綜應聲曰無口爲天有口爲呉君臨萬􅀖天子之都奉無以對焉韋昭呉書曰呉使郎中令陳化使魏魏文帝因酒酣問化曰呉魏峙立誰將平壹海内者乎化曰易稱帝出乎震化聞先哲知命舊􅀃紫盖黄旗運於東南帝曰昔文王以西伯天下豈復在東乎化曰周之􅀄基大伯在東是以文王能興於西帝􅀏竒其辭又曰沈珩字仲山孫權以珩有智謀能專對乃使至魏魏文帝問曰呉嫌魏東向乎珩曰不嫌也曰何以言之曰恃舊盟言歸于好是以不嫌又問太子當來寕然乎珩曰臣在東朝不坐宴不與􅀂此之議無所聞也文帝善之乃引珩自近談語終日珩隨事響應無所屈服張勃呉録曰呉興沈友字子正善屬文有口辯每所至衆人皆黙因號曰謐衆咸言其筆之妙力之妙舌之妙皆絶於人也蜀志曰先是應闓送張裔於孫權諸􅁑亮遣鄧芝使呉亮令芝言次從權請裔裔自至呉數年流徙伏匿權未知也許之遣裔臨發乃引見問裔曰蜀卓氏寡女亡奔司馬相如貴土風俗何以乃爾裔對曰愚以爲卓氏之女猶賢於買臣之妻權又謂裔君還必用事西朝終必不作田父於閭里也將何以報我對曰裔􅀒罪而歸將委命有司􅀂蒙僥倖得全首領五十以前父母之年自此以後大王之賜也又曰伊籍字幾伯陽人隨先主入益州東使呉孫權聞其才辯欲逆折以辭籍適入拜權曰勞事無道之君籍即對曰一拜一起未足爲勞又曰呉遣使張温來聘百官皆徃餞焉温問􅁗密曰天有頭乎密曰詩女乃眷西顧以此推之頭在西方温曰天有耳乎密曰詩云觀鳴于九臯聲聞于天􅀂其無耳何以聽之温曰天有姓乎密曰姓劉曰何以知之密曰天子姓劉故以此知之温曰日生於東乎密曰雖生於東而没於西荅問如響温服密之文辯凢如此􅀋也太平御覽卷第四百六十三
