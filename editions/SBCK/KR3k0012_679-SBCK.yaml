front:
  text: 太平御覽卷第六百七十九
  hash: sha256:d0fe29473dbb553dc61775f0f48d70f9308a9f9120d07d26dd505da1e930a04d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_679-1a}
body:
  text: 道部二十傳授下金簡玉字經曰黄帝受襄城小童歩六紀之法又曰黄累小童受歩三經之法也又曰廣成受東中元童歩六官之法也文始内傳曰太上遣繡衣使者傳命尹喜玉帝七聖玄紀曰七聖撰上玄之章以付五老上眞仙都左公藏於紫蘂玉笈封以啓命之章西􅀛定籙東華校名三天正法曰太眞靈籙祕在太上靈都之宫付五老上眞仙都左公四極明科曰帝嚳之時九天眞王駕九龍之輿降牧德之臺授帝此真文也又曰凢授上清寳經皆當備信信以誓心以寳於道無信而受經謂之越天道無盟而傳經謂之泄天寳玉清隱書曰有帝簡金書玄玉緑籍可以傳玄羽玉經玄羽玉經付玄羽玉郎以授上清眞人又曰傳授上皇玉慧玉清之隠書金玄隱玄之羽書經者皆五老校圗太一式觀又曰上皇玉帝命太老眞人開瓊珠之篋出玉清隠書玄羽玉經以傳太微天帝君二十四生圗曰元始天帝於長桑碧林園中聞帝尊普告元聖尊神洞玄天文靈寳玉奥也又曰依舊典府仰之格付度道君女青律云太眞玉帝上宫府仰之格舊經億刼不傳也又曰帝尊在恊晨靈觀登白玉座具宣祕要開闡妙門太玄經曰老子傳授經戒籙儀注訣曰以局脚小案置經綵巾覆上明眞經曰元始尊在香林園中􅀃明眞經太清中經曰道曰愼無賣吾以求寳也愼無傳吾非其人也愼無閉吾絶吾學也又曰太真經曰師之傳授選其上有仙相中有仁孝下有才能篤志者然後授之太上真經曰太上曰成道歸夲混同無􅀄出三界外濟九天中接生與善授記德人玄羽經曰元嬦金爲簡刻玉篇授葛玄金根經曰太上以大洞真經付上相青童君掌録於東華青宫使傳後聖應爲眞人者此金簡玉札出自太上靈都之宫刻玉爲札結金爲簡書以朱文編以朱繩之結太眞科曰太上告張陵天師曰内外法契與天地水三官折石飲丹爲誓也張陵受命爲天師命弟子扶翼爲嗣師上崇虚之堂登白虚之壇醮奏太一傳授口訣傳命嗣師承代基業行教天人真誥曰裴君曰大洞眞經讀之者輕舉昔中央黄君隠祕此經丗不知也􅀂知之祕而不傳又曰紫陽眞人受􅂫君三一玄丹之道又曰有北海公㳙子受守一玄丹之道又曰東宫中候眞夫人受桐􅁊眞人飛解脫綱之道又曰昔周君學道常山中積年精思忽見老人知是神異乃叩頭請道老人出素書七篇令誦之周君仙去又曰趙叔期學道王屋山時出民間聞有卜者在市肆叔期曰欲入天門調三關存朱衣正崑崙叔期知神人因拜乞要訣因出一書與之是胎精中記拜此書入山誦之後合神丹服而􅂛天王君内傳曰王子登得太上丈人授以瓊藴隱書井雲碧陽水飛丹法君服之絶見逺物坐在立亡役使羣神又曰太素三元君遣西華靈妃甄幽簫齎成命之書以雲瓊爲板紫金刻之以授王君子登後聖道君列紀曰道君命五老上真開紫蘂玉笈雲錦囊出靈書紫丈上經以付青童君八素眞經曰若精勤皆當書以蘂簡刻以瓊文位爲上清左眞公昇玄經曰張道陵曰不敢以身傳此教太上曰何得頋難廢不通法汝當建意無謂不可傳􅀂丗有道士得此仙經披㝷首尾知是真要無師可授便得奉行天戒經曰􅁑玄告弟子鄭隱云吾昔所授善道太上所貴今爲師友是以相授吾去丗也將有樂道慈心居士來生吾門者子當以今道業事一通付之法應丗丗傳授也子以一通依科傳付弟子佳者也若無其人一通封五岳名山可也又曰劉翊字子朔潁川人有道德家世子仁感濟於人遇師皇先生告翊曰子仁感天地隂德􅀑神太上嘉子之用心使我授汝以長生之道吾仙官也尓能從我去否翊曰願從教乃特入桐栢山中授以隠地八術服五星之華而今度名東華來在洞中爲定籙府右理中監又曰淳于斟字叔通㑹稽人漢桓帝時爲徐縣令好道術數服餌胡麻黄精後入呉烏目山中隠居人授以虹景丹經修行得道在洞中爲典栢執法郎主誠有道者又曰桃俊錢塘人少爲郡吏漢末入增城山中學道遇東郭㓜平㓜平􅁗時人乆隠増城得道者也㓜平授俊服九精練氣輔星存心之術俊修之道戒在東華宫中爲北河司命又曰張奉字公先河内人也太傅􅀽隗常歎其髙操後入剡山遇山圖公子授奉九雲水強梁鍊桂法在東華宫爲太極仙侯又曰夏馥字子治陳留人也少好道服术餌和雲母後入呉山從赤湏先生受錬魂法又遇桐栢真人授以黄水雲漿法得道在洞中爲明晨侍郎又曰後漢劉寛字文饒少好道爲司徒太尉年七十三遇青谷先生降於寢室授其杖解法入太華山行九息服氣及授以爐丹方修之道成在洞中作童􅀄府上師至始學者又曰劉少翁數入太華山中遇西岳丈人授其仙道又曰黄景華司空黄瓊女韓衆授以岷山丹服得仙法又曰趙威伯東郡人少好道師邯鄲張先生晚在中岳受玉珮金璫經於丘林乃漢樓舡將軍衛行道婦也遂受行挹日月之景又服九靈明鏡華遂得道在華陽内爲保命承主仙籍并記學道者井主􅁀雨水領五芝金王章又曰張玄賔魏武帝時人也遇真人樊子明於少室授以道變隠景之道在天柱山靈寳經曰迦羅山樹下有三天人講元陽經明眞科曰元始尊在香林園中與衆教化諸法内音玉字經曰大􅆊隱語西母以上皇元年七月丙午於洞室下教以授清虚眞人王君傳於夏禹封文於南浮洞室石匱故五符經云九天靈書猶封於石匱是也玉訣下云五老真人封題玉匱亦其例也孔靈符云㑹稽山南有宛委山其上石俗呼爲石匱壁立于雲累梯然後至焉昔禹治洪水其功未就乃齋於此山發石匱得金簡玉字以知山河躰勢於是䟽導百川各盡其冝上清經曰元始天帝與南極元君登太空瓊臺五老上眞仙都公開鬰林之笈雲錦之囊上清變化七十四方解形之道三元布經以授於元君道學傳曰王母云此靈光生經聽四千年得傳一人无其人聽八千年頓傳二人授非其人是爲泄天道可傳而不授是爲閇天寳不計限而妄授之是爲輕天老受而不敬是爲慢天藻泄閇輕慢四者延禍之事也同道謂之天親同心謂之地愛傳授當相親愛共均榮辱又曰漢武帝自撰西王母所􅀃集爲一卷及所與經圖之屬盛以黄金之几封以白玉之凾安着栢梁臺上像名經曰東方上尊凭十寳鳯丈之曲几敷􅀃道要真經太上黄素經曰凡修受太洞眞經雌一竒文常置經於几格㓗浄處法輪經曰夫欲授經皆當齎金寳之信詣師請受道貴法重道非言不行輕傳則爲非寳空修則爲賤道衆篇經曰古人非心不仙末世非財不度所以尓者末世貴財賤道也以黄金万斤仙經一部施于窮山末世乃取金弃經黄金刻爲身患仙經刻得長生公知如此不能免貪也非道弘人此之謂也大有經曰大上寳章傳太帝君太帝君傳天帝君天帝君傳太微天帝太微天帝傳金闕帝君金闕帝君傳東海青受之以金爲盟長九寸廣四寸厚三分刻而書之以封山川五岳之真精也三元真一經曰盟誓三官委帛血壇割革大約乃得授付受者盟者保神以堅心故萬物不能犯天地不能違以素絲一兩齋百日或五十日或三十日或二十日十日也法以四十年得傳一受玄丹玉經曰青布三十二尺朱帛三十二尺明鏡二枚告誓爲不泄之約八術神虎隱文曰欲受八術隱文者齎金龍玉魚盟誓而受之受大洞真經亦用此又曰上金十兩以爲神真之信也錦九十尺以誓九天青繒四十尺以盟其文好道樂真勤心注玄輕物貴道者始可與言又曰受三天虎書者齎金虎玉鈐素錦玄羅各四十尺以爲金真之誓盟于天地不宣之約也太一洞真玄經曰古者傳經盟誓皆㰱血断髮立壇盟天今自可以金青代髮膚之躰又云違此者失兩明玄母八門經曰琅玕華丹五石玄􅃾之法皆結盟真一修檢經曰受太一法二十四年得傳又曰東海玉華妃停文期青童君之妹降授張微子服霧之方又曰主仙道君即命侍女范運華趙峻珠王抱臺等發瓊笈披緑藴出上清隠書龍文八靈真經二卷授范襄平太行經曰仁安逺遊山林於寒靈洞穴遇玄和先生授靈寳黒帝真文又曰西方有九光靈童以白帝真文授皇妃又曰央有無生童子於色之國授元君信然靈寳赤帝真文三元經曰元始於明霞觀以上真玉撿下授三天玉童馬明生内傳曰龔仲陽受嵩髙小童歩紀之法珠囊曰陸元德呉興東遷人宋文帝召入内服膺尊異時太后王氏雅信黄老降母后之尊執門徒之禮又曰陶弘景字通明魏郡平陽人也自云華陽隱居梁髙祖太子從而受道梁簡文邵陵諸王謝覽沈約阮忻虞權並服膺師事之又曰劉法先彭城人也爲宋明帝崇靈舘主帝先師陸元德元德卒又師事法先盡北靣之禮又曰薛彪之晉陵人也煙爐神鼎之法无不辯其精麄究其難易門人有所請益必誨示勤懇隨量而退又曰謝暄字元映陳郡陽夏人也年十二辭親入髙壽山師朱天賜菜食長齋專務修道朱性嚴厲入室者惟暄人也隱虞山雖居幽寂逺近歸向林谷常滿又曰􅁃承仙字崇光潁川􅋣陵人也㓜聦悟􅀶極羣書時處士劉弘碩學尤明老莊隱于荆州之沙洲承仙師之講習多所該究家貧無書每事假借一覧便誦又曰孫遊岳字玄逹東陽永康人也宋泰始中陸元德自廬岳下都闡揚至教遊岳乃出京師問道親侍惟席預入室之流其宏言奥旨非遊岳不傳太一記曰裴君精思五年五帝曰君登八極城明真靈臺授揮神九有之術玉皇譜籙曰元始丈人登玉虚之壇受九天譜籙葛洪神仙傳曰嚴青者㑹稽人也居貧常於山逢一人與青語臨別贈素書一軸但以㓗器盛之置髙處井教青服石腦法太平御覽卷第六百七十九
