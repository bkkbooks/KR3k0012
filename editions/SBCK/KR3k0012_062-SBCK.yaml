front:
  text: 太平御覽卷第六十二地部二十七
  hash: sha256:9d4d5f52727e64fc0ec40b8d23f4adc778dac822f401612b5acf2b225a9c66d1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_062-1a}
body:
  text: 涇渭霸滻豐鎬澇潏伊洛􅈆澗榖漢􅃆涇書禹貢曰涇屬渭汭屬逮也水北曰汭言治水注入渭詩曰涇以渭濁湜湜其沚傳曰諸侯之大夫從晉侯伐􅁗以報櫟之役濟涇而次􅁗人毒涇上流師人多死以毒藥投涇水之上流􅀳師飲之多死國語曰恭王遊於涇水上宻康公從三女奔之其母曰必致之於至夫獸三爲羣女三爲粲粲羙之物汝何德以堪之康公弗許一年恭王滅宻史記曰韓聞􅁗之好興事乃使水工鄭國間􅀃􅁗令鑿涇水自中山西抵瓠口爲渠以漑田又曰􅁗二丗夢白虎嚙左􅆖殺之卜涇爲崇二丗乃齊望夷宫而欲祀之漢書曰涇雖不在大川之祀以近咸陽得比大川之祀又曰太始二年趙中大夫白公鄭德曰白姓公爵時人多相謂爲公復􅁗穿渠因名白渠民得其饒歌之曰田于河所池陽谷口鄭國在前白公起後舉鍤爲雲決渠爲􅀨涇水一石其泥數斗且漑且糞如淳曰水停淤可以當糞長我禾􅁰衣食京師億萬之口益部􅂄舊傳漢武祀甘泉至涇橋有女子浴於涇水乳長七尺怪遣問之女曰帝後第七車知我時侍中張寛在第七車對曰天星主􅀕祀齋戒不㓗則女人見水經注曰涇水導源安定朝郍縣西笄頭山􅁗始皇廵地西出笄頭山即是山也蓋大隴之異名渭詩曰我送舅氏于渭之陽史記曰􅁗武王三年渭水赤三日昭王十四年又赤三日洪範五行傳曰赤者火色盖亦以火沴水也渭水􅁗大川也隂陽亂秦用嚴刑敗亂之象史記曰西伯獵遇太公渭之陽與語大恱漢書曰武帝元光六年春穿漕渠通渭山海經曰渭水出鳥䑕同穴山東注河入華隂北鳥䑕同穴山今在隴西首陽縣渭水出其東經南安天水略陽扶風始平京兆至弘農華隂縣入河也三輔黄圖曰始皇兼天下都咸陽渭水貫都以象天漢水經注曰渭水中舊有忖留神象此神甞與魯班語班令其人出忖留曰我貌醜卿善圖物容我不能出班於是拱手與言曰出頭見我忖留乃出首班於是以脚􅀞地忖留覺之便還没水故置其象於水中唯背以上立水上三輔决録曰項中山飲馬渭水日與三錢以償之列子曰夸父逐日渴飲渭水不足乃渴死淮南子曰渭水多力冝􅁰霸水經注曰霸者水上地名也水東合滻水過白鹿原至􅁗虎圈北入渭漢書地理志曰霸水出藍田谷古曰滋水秦穆公更名霸水以彰霸功漢書曰漢王元年十月至霸上􅁗王子嬰降滻水經注曰滻水出京兆藍田谷北入于霸地理志曰滻水出南陵縣之藍田谷西北流與一水合水出西南莽谷東北流注滻水水又北歴藍田川北流注于霸水又云滻水北至霸陵入霸水也兩京記曰西京東市平凖署東隅有放生池分滻水渠自道政坊東城西流注之俗號海地又曰滻水西岸有阪舊名滻阪隋文帝惡阪之名改名長樂坡豐漢書地理志曰􅃮沮旣從豐水逌同顔師古注曰豐水出鄠之南山言沮水旣從入渭豐水亦同來也水經注曰渭水東與豐水㑹短隂山無他髙山異蠻唯原阜石墽而巳水上舊有便門橋毛詩文王有聲曰豐水有􅉮武王豈不仕貽厥孫謀以燕翼子文子曰老子云豐水之深十仞而不受塵垢金䥫在中形見於外鎬水經注曰鎬水上承鎬池於昆明池北周武王之所都也故詩云考卜維王宅是鎬京維􅀛正之武王承之鎬水又北流與滮池合又北經清冷臺西逕慈石門注于渭鄭􅀇曰豐鎬之間水北流也澇􅀃文曰澇水出扶風鄠北入渭山海經曰牛首之山澇水出焉西注於潏水多飛魚潏字林曰潏水出杜陵縣水經注曰漓水上承皇子陂水逕漸臺東入渭亦名沈水又名髙都水漢王氏五侯大治池宅引髙都水入長安城故百姓歌之曰五侯􅀄起曲陽最怒決壞髙都竟連五杜土山漸臺象西白虎是也伊水經曰伊水出南陽縣西荀渠山左傳僖中曰􅀄平王東遷也辛有適伊川杜預注曰辛有周大夫也見􅀍髮而􅀕於野者曰不及百年此其戎乎山海經曰獨蘇之山伊水出焉東流注於洛今伊水出上洛廬氏縣熊耳山東北至河南洛陽縣入洛戴延之西征記曰伊水上源經新城陸渾二縣男女無少長皆病癭俗云水土所致伊水不可飲也吕氏春秋曰有莘氏女子採桑得嬰兒桑中其母居伊水上故命之曰伊尹伊尹母化爲空桑洛水經注曰洛水出京兆上洛縣護舉山地理志洛水出􅃁嶺山易上繫曰洛出書聖人則之易乹鑿度曰王者盛德之應洛水先温九日乃寒五日變爲五色又曰帝王將起河洛龍見察其首黒者人正白者地正赤者天尚書禹貢曰導洛自熊耳在冝陽之西也東北㑹于澗􅬖㑹于河南城南又東㑹于伊合于洛陽之􅀯又東北入于河合于鞏之東也尚書中􅃸曰武王沉璧于河禮畢退至日旰榮光幕河青雲浮洛毛詩曰瞻彼洛矣維水泱泱春秋􅀃題辭曰洛出熊耳山雒之爲言繹也繹其燿也宋均注曰水光燿也國語曰靈王二十二年榖洛􅃲將毀宫室王欲壅之太子􅀳曰夫山土之聚也藪物之歸也川氣之導也澤水之鍾也夫水聚於髙歸於下今吾執政無乃實有所僻而滑夫二川之神王卒壅之王室大亂又曰伊洛竭而夏亡河竭而啇亡漢書曰武帝穿渠引洛水岸遂崩乃鑿井深四十餘丈徃徃爲井井下相通行水謝承後漢書曰沛國陳宣建武十年雒水出造津城門或欲築塞之宣諌曰昔王尊正身金堤水退况聖主耶言未絶而水去水經注曰昔黄帝之時天大霧三日帝遊洛水之上見大魚殺五牲以醮之天乃甚雨七日七夜魚流始得圗書魏略曰漢火行忌水故洛去水而加焉山海經云􅁗買之山洛水出焉東注於河其中有藻玉述征記曰洛水底有礜石故上無水􅈆水經曰􅈆水出河南榖城縣北出東與千金渠合又東過偃師入于洛澗水經曰澗水出新安縣南白石山東南入于洛又曰三輔决録注云馬氏兄弟五人共居澗榖二水之交作五門客舎因舎以爲名今在河南西四十里以山海經推校里數不殊仲治所記水㑹尚有故居處斯則澗水也即周書所謂我乃卜澗水東言是水也榖水經曰榖水出弘農澠池縣南嶓􅃁林榖陽谷也山海經曰愽山之西有林焉曰嶓􅃁榖水出焉東流注于洛其中多㻒玉今榖水出于崤東馬頭山榖陽谷東北流歷澠池川韋昭國語注曰洛水在城南榖水在王城北東入于􅈆靈王時榖水盛出於王城西而南流合於洛兩水相格有似于􅃲而毀王城西南也漢􅃆尚書禹貢曰江漢朝宗于海也詩曰漢廣德廣所及也文王之化􅀍于南國美化行乎江漢之域又曰滔滔江漢南國之紀又曰南有喬木不可休息漢有游女不可求思左傳曰蔡昭侯爲兩珮與兩裘以如楚獻一珮一裘於昭王子常欲之不與三年止之蔡侯歸及漢執玉而沉曰余所濟漢而南者有􅀂大川又曰楚國方域以爲城漢水以爲池又曰吴師伐郢楚子常濟漢而陣自小別至于大別蜀志少府王謀等上言前襄陽男子張嘉王休獻玉璽璽潜漢水於深淵暉景燭曜璽光􅜂天孫巖宋書曰漢中城固縣漢水岸際有異聲如雷俄頃岸崩有銅鐘十二出自潜壤體制旣精扣之清響韓詩曰鄭交甫過漢臯遇二女妖服珮兩珠交甫與之言曰願請子之珮二女解珮與交甫而懷之去十歩探之則亡矣廻顧二女亦即亡矣水經注及山海經注云漢水出隴坻道縣嶓􅃁山􅀄名􅃞水東流至武都沮縣始爲漢水東南至葭萌與羗水合至江夏安陸縣名􅃆水故有漢􅃆水之名即周昭王溺於此豦又東至竟陵合滄浪之水即屈原遇漁父䖏又東過三澨水觸大別山南而入江也􅁃仲雍漢水記曰漢水出廣漢􅃞水出隴西東流至武都而與漢水合􅃆水出武都沮縣尔與漢水相合又東爲滄浪之水過三澨至于大別南入于江東匯澤爲彭蠡東爲北江入于海是也匯迴也音胡賄反言漢水合大江廻流入彭蠡澤東北至南徐州名爲北江而入海又曰􅃆水東經萬山北山下有潭中有杜元凱碑元凱好尚後名作兩碑並述已功一碑立峴山一碑沉此潭中曰千載之後何知不深谷爲陵也又曰漢東經西城縣故城爲鱣湍洪波漭盪漰浪雲頽古者舊言有鱣魚􅁬鬐望濤直上至此曝鰓因以名鱣湍焉又曰漢水經西城縣故城南又東爲龍泉泉上有胡鼻山石􅀋胡人鼻故也下臨龍井渚泉深數丈盛弘之荆州記曰􅃆水隈潭極深先有蛟爲害鄧遐爲襄陽太守拔劒入水蛟繞其足遐自揮劒截蛟數叚流血丹水勇冠當時於後遂無蛟患又曰荆藴玉以潤其區漢含珠而清其域梁州記曰漢水發源隴西氐道縣之嶓冡山東至于夏口合江綿帶四州之城經塗五千餘里謂之􅃆水水經曰􅃆水出武都沮縣東狼谷中注曰一名沮水以其􅀄出沮洳然也淮南子曰漢水重安而冝竹箭太平御覽卷第六十二
