front:
  text: 太平御覽卷第五百五十一禮儀部三十
  hash: sha256:c542c4327ad5797257a0799230ecb534a22f877d1e41ef38119887233dd37784
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_551-1a}
body:
  text: 棺周昜繫辭曰古之葬者厚衣之以薪葬之中野不封不樹䘮期無數後世聖人易之以棺椁周禮春官䘮祝曰及祖飾棺乃載遂御凡卿大夫之䘮掌事而斂飾棺禮記檀弓上曰有虞氏瓦棺始不用薪者虞氏上陶夏后氏聖周大熟曰堲燒士治以周於棺殷人棺椁棺大也以木爲之言椁大於棺殷人上棺周人牆置翣牆栁衣也凡此言後王之制文也周人以殷人之棺椁葬長殤以夏后氏之堲周葬中殤下殤以有虞氏之瓦棺葬無服之殤略未成人禮記檀弓上曰有子曰夫子制於中都四寸之棺五寸之椁以斯知之不欲速朽也中都魯邑名孔子嘗爲之宰爲民作此制禮記檀弓上曰天子之棺四重尚深􅃉也諸公三重諸侯再重大夫一重士不重水兕革棺􅀍之其厚三寸以水牛兕牛之革以爲棺􅀍革各厚三寸合六寸也此爲一重也杝棺一所謂折棺也爾雅曰椵杝梓棺二所謂屬與大棺四者皆周周匝棺束縮二衡三袵毎束一衡亦當爲横袵今小要也栢椁以端長六尺以端題湊也其方盖一尺也禮記檀弓下曰天子崩虞人致百祀之木可以爲棺椁者斬之掌山澤之官百祀畿内百縣之祀以爲棺椁斬伐也禮記檀弓上后木曰䘮吾聞諸縣子曰夫䘮不可不深長思也后木魯者孝公子惠伯鞏之後買棺外内易我死則亦然禮記檀弓下曰陳乾昔寢疾屬其兄弟而命其子尊巳曰如我死則必大爲我棺使吾二婢子夾我婢子妾也陳乾昔死其子曰以殉葬非禮也况又同棺乎弗果殺善尊巳不陷父於不義也禮記䘮大記曰君大棺八寸屬六寸椑四寸上大夫大棺八寸屬六寸下大夫大棺六寸屬四寸士棺六寸大棺棺之在表君裏棺用朱緑用雜金鐟大夫裏棺用玄緑用牛骨鐟士不緑鐟所以瑑着裏也君蓋用􅃮三祍三束大夫蓋用􅃮二祍二束士蓋不用漆二祍二束用􅃮者塗合牝牡中也祍小要君大夫鬊􅀲實于緑中士埋之緑當爲角聲之設角即謂棺之内也禮記外傳曰凡棺之重數從内數向外如席之重也兕革棺一各三寸内一重有水牛皮次兕皮二者合爲一重都厚六寸一名椑棺又名櫬椑者堅如壁櫬者親於身也杝棺二厚八寸杝曰椵木在椑棺之外屬棺三其厚四寸屬者施杝棺外大棺四厚六寸屬棺之列也屬棺大棺皆用梓也上公去水牛皮兕皮外有三重也侯伯巳下去水兕杝棺外二重卿大夫唯屬棺與大棺一重士不言重唯棺而巳左傳宣上曰鄭人討幽公之亂斵子家之棺以四年殺君故也斵薄其棺不使從卿禮左傳成上曰宋文公葬椁有四阿棺有翰檜杜預注曰翰旁飭檜上飭王礼左傳襄上曰齊姜薨􅀄穆姜使擇美槚檟梓之屬以自爲櫬與頌琴櫬棺也頌琴琴名猶言雅琴也皆㣲以送納季文子取以葬君子曰非禮也禮無所逆婦養姑者也虧姑以成婦逆莫大焉穆姜成公母齊姜成公婦也左傳襄上曰定姒薨不殯于廟無櫬不虞櫬親身棺也季孫以定姒本賤旣無備器議其䘮制欲殯不過廟又不及哭也匠慶謂季文子曰子爲上卿而小君之䘮不成不終君也父其母是不終事君之道也君長誰受其咎􅀄季孫爲巳樹六檟於蒱圃東門之外蒱圃場圃名矣匠慶請木季孫曰略匠慶用蒱圃之檟季孫不禦禦止左傳哀上曰趙簡子與鄭戰簡子誓曰志父無罪君實圖之􅀂其有罪絞縊以戮桐棺三寸不設屬辟屬辟棺之重數王棺四重君再重大夫一重素車樸馬以載柩無入于兆兆葬域下卿之罰也公羊傳定公匂國君薨正棺於兩楹之間然後即位論語先進曰顔淵死顔路請子之車以爲之椁欲得賣之以爲顔淵作椁也顔路顔淵之父子曰才不才亦各言其子也鯉也死有棺而無椁吾不徒行以爲之椁以吾從大夫之後不可徒行也鯉孔子子伯魚家語曰孔子之䘮公西赤掌殯葬焉桐棺四寸栢椁五寸家語曰墨子葬法棺三寸足以朽骨衣三領足以朽肉掘地之深下無漏􅂔發􅂥於上襲之以明其所止也􅀃文曰棺􅀜也可以掩屍櫬附身棺也櫝匱也槥櫝也史記曰飛廉生惡來俱以材力事紂武王伐紂并殺惡來時飛廉爲紂使北方還無所報爲壇霍太山而報得石棺銘曰天令處父與發亂賜汝石棺死遂葬霍太山古史考曰舜作瓦棺湯作木棺漢書曰髙祖下令士卒從軍死者爲槥服䖍曰槥音衛應劭曰小棺也今謂之櫝歸其縣縣給衣衾棺葬具致其尸於家縣官更給衣衾歛祠以少牢吏親葬漢書曰張湯自殺昆弟欲厚葬湯母曰湯爲大臣􅀍惡言死何厚葬爲載以牛車有棺無椁上聞曰非此母不生此子漢書曰哀帝崩有司奏董賢乃自殺死後其父恭等不悔過乃復以緲􅀞棺作時之色左蒼龍右白虎上著金銀日月玉衣珠璧至尊無以加漢書曰王莽奏貶丁􅀓太后號改葬發取璽綬太后以爲旣徃之事不湏發莽固爭之太后詔曰因故棺爲致椁作塜葬旣開􅀓太后棺臰聞數里續漢書禮儀志曰王公王貴人皆樟棺朱􅃮􅀞雲氣公特進樟棺黒漆續漢書曰楊震數灱諌爲樊豊等所譛遣歸夲郡震行至城西凡陽亭謂諸子門人曰身死之日以􅄂木爲棺單􅀍裁足盖形勿歸塜次勿設􅀕祠因飲酖而卒續漢書曰曹襃在射聲營舎有停棺椁不葬者百餘所襃親自履行愴然爲買空地悉葬其無主者續漢書曰周盤字伯堅年七十三歳朝集諸生講論終日因令其二子曰吾日者夢見先師東里先生與我講於隂堂之奥而長歎豈吾齒之盡乎命終之日桐棺足以周身外椁足以周棺歛刑懸封濯衣幅巾編四寸簡冩堯典一篇并刀筆各一以置棺前示不忘聖道其月望無病忽終學者以爲知命東觀漢記曰郭鳯字君張善􅀃灾異􅁻凶占應病先自知死日豫令弟子市棺斂具至其日如言卒東觀漢記曰耿秉薨賜朱棺玉衣東觀漢記曰梁啇薨賜東園朱壽器銀鏤玉匣東觀漢記曰長沙有義士古􅀄遭父䘮未葬隣人火起及􅀄舎棺不可移􅀄冒火伏棺上㑹火滅東觀漢記曰大司徒歐陽歙坐在汝南􅂍罪死獄中歙􅁺陳元上書追訟之言甚切至帝乃賜棺木贈􅉠三千疋謝承後漢書曰徐爲長沙郡將死遺令不受贈􅉠一疋私馬賣以買棺謝承後漢書曰和帝追封太后父梁松爲褒親愍侯改殯賜東園􅀞棺玉匣衣衾而葬之魏志曰李􅔸等葬董卓於郿并収所焚屍之􅁅合斂於棺而葬之是日大風􅁀雨霆震卓墓水入藏漂其棺木魏志曰宣王討王陵赦罪陵自知罪重試索棺釘以觀大傳意竟給之遂自殺曹操别傳曰操破梁孝王棺収金寳天子聞之哀泣􅀳書曰夏侯湛將殁遺命小棺薄斂不脩封樹論者謂湛雖生不砥厲名節死則儉約令終是深逹存亡之理也後魏書曰崔光韶誡子孫曰吾兄弟自㓜及老衣服飲食未曽一片不同至於兒女官婚榮利之事未甞不先以推弟弟頃橫禍權作松棺亦可以爲吾作松棺使吾見之南史曰宋光禄大夫劉鎭之年三十許病篤巳辦凶具旣而疾愈因蓄棺以爲壽九十餘乃亡此器方用宋書曰王敬則爲旣陽令􅀄至旣陽縣陸主山下宗侶十餘舡同發敬則舡獨不進乃令入水推之見烏漆棺敬則呪云􅀂是吉使舡速進吾富貴當改葬􅈛舡須􅁷進入縣城収此棺葬之宋書曰􅀽昻爲豫章内史丁所生母憂去職以䘮還江路風潮􅁀駭昻乃􅅞衣着棺誓同沉溺及風止餘舡皆没唯昻舡獲全咸謂精誠所致梁書曰衡陽宣王子簡位郢州刺史卒於官䘮將引柩有聲議者欲開視王妃栁氏曰􅀳文巳有前例不聞開棺無益亡者之生徒増生者之痛遂止􅀳公卿禮秩曰諸公及從公薨者賜東園秘器在外都督者給秘器直錢三十萬安平王孚薨給東園温明秘器楊駿誅賜五木棺一具載以官路車三十國春秋曰􅀳黃門郎殷仲堪遊於江濵見流棺於水乃接焉旬日之中門前之溝忽起爲岸是夕有人通夢於仲堪自稱徐伯感君之惠無以報仲堪因問門岸爲何祥乎對曰水中之岸其名爲洲君將爲也言終而没唐書曰玄宗開元二十年自東都幸太原至太行坂路隘逢椑車問左右曰車中何物左右奏曰禮天子出則載禆車以從先王之制也上曰焉用此命焚之無椑自此始也莊子曰古之䘮禮貴賤有儀上下有等天子棺椁七重諸侯五重大夫三重士再重墨子獨生不歌死不服桐棺三重而無椁以爲法式愼子曰匠人成棺而無憎於人利在人也死吕氏春秋曰善棺椁所以俻螻蟻也今世俗大亂人主踰侈非爲死者慮亦所以相矜淮南子曰吾生有七尺之形死有一棺之土淮南子曰鬻棺者欲民之疾疫也蓄粟者欲歳之荒飢也鹽鐵論曰古者瓦棺堲周足以収形骸髮齒而巳及其後桐棺不依桑棺不留今冨者䋠題牆湊中者梓棺楩椁貧者繒囊緹槖風俗通曰葉令王喬天下一玉棺於㕔事前令臣吏試入終不摇喬曰天帝獨欲召我沐浴服飾寢其中盖便立覆􅀫昔葬於城東縣牛皆流汗風土記曰陽羡縣令􅀽起生有神靈無疾􅁀亡殯斂巳竟風雷􅁳晦失起䘮柩山下居民夜聞山下有數十人晨徃山上見起棺柩俄而潜藏唯有石塚石壇今在神仙傳曰介象爲呉主所徴至武昌連求去不許象言病帝使左右以美梨一奩賜象須􅁷象死帝殯而埋之以中時死其日晡時到建業以所賜䔧付守􅁐吏後吏以􅃺聞即發象棺棺中無所有有奏符捜神記曰令有縣孫􅀌城古􅀌竹君之國也靈帝光和元年遼水中有浮棺人破斫之棺中人語曰我伯夷之弟􅀌竹君也海水壞我棺椁是以漂汝斫我何爲乃不敢破因爲立祠民有發視者無疾而死捜神記曰北有道人能令人與死人相見其同郡人婦死巳數年聞而徃見之曰願令一見死婦死不恨矣道人曰可然聞鼓聲疾出俄而得見之與婦言語悲喜恩情如生良乆聞鼓音悢悢不能得時出門閇户掩壻壻乃徒岀閇其衣􅅂户間掣絶而去後數歳餘此人死家葬之開塚見婦棺盖下有衣􅅂悢力尚反異苑曰海陵如臯縣東城村邊海岸崩壞一古墓有方頭漆棺以朱題上云百七年墮水元嘉二十載三月墜於懸獻巴蜀志曰獠夷死即立埋棺不卧設盛弘之荆州記曰冠軍縣東一里有張詹墓魏太和時人也刻碑背曰白楸之棺昜朽之裳銅錢不入瓦器不藏嗟爾後人幸勿我傷自胡石之亂墳墓莫不夷毀此墓元嘉􅀄猶儼然六年大水民飢始􅀍發􅀄開金銀錫銅之器爛然畢俻有二朱􅃮棺棺前垂竹薄簾金釘釘之永嘉郡記曰樂成縣石堂水口先時有一􅃮棺逆水入溪十餘里便住有靈下人云是方姥甚有靈驗從征記曰劉表塚在髙平郡表子琮擣四方珎香數十石着棺中蘇合消救之香莫不畢俻永嘉中郡人衡熈發其墓表㒵如生香聞數十里熈懼不敢犯陸機大墓賦曰覩洪檟而爲櫘櫘小棺也太平御覽卷第五百五十一
