body:
  text: 皇親部十四太子三崔豹古今注曰漢明帝爲太子樂人作歌詩四章以賛太子之德一曰日重光二曰月重輪三曰星重輝四曰海重潤東觀漢記曰東海恭王疆光武皇帝長子也母郭后建武二年六月立爲皇太子十七年十月郭后廢爲中山太后自郭后廢疆不自安數因左右陳誠願備藩輔其十九年六月疆廢爲東海王二十八年十月就國食東海魯國并二郡二十九縣租入倍諸王賞賜恩寵無倫比致虎賁旄頭宫殿設鍾簴之懸疆性聦逹恭謙臨之國比上書讓還東海十九縣又固皇太子因辭上不許以疆章示公卿大夫􅀷嘉歎之續漢書曰趙喜爲太尉中元二年上崩喜受遺詔典録喪禮新承王莽之亂國無舊典皇太子與諸王雜坐同席尊卑無别喜乃正色橫劒殿階扶下諸王以明尊卑范曄後漢書曰孝順皇帝安帝之子母李氏爲閻皇后所害永寕元年立爲皇太子延光三年安帝乳母王聖大長秋江京中常侍樊豐􅉲太子乳母王聖舅厨監邴􅁻殺之太子數爲歎息王聖等懼有後禍遂與豐京共䧟太子太子坐廢爲濟隂王明年三月安帝崩北郷侯立濟隂王以廢黜不能上殿親臨梓宫悲號不食内外羣僚莫不哀之及北郷侯薨車􅀐將軍閻顯及江京與中常侍劉安陳逹等白太后秘不發喪而更徴立諸國王子乃閇宫門屯兵自守十一月丁亥京師及郡國十六地震是夜中黄門孫程等十九人共斬江京劉安陳逹等迎濟隂王於德陽殿西鍾下即皇帝位年十一魏志曰文帝爲五官將而臨淄侯植才名方盛各有黨與有奪文之議文帝使人問賈詡自固之術詡曰願將軍恢崇德度躬素士之業朝夕孜孜不違子道如此而巳文帝從之􅀷自砥礪太祖又甞屏除問詡黙然不對太祖曰與卿言而不荅何也詡曰屬有思故不即對耳太祖曰何思詡曰􅀽本􅀄劉景􅂛父子也太祖大􅀏於是太子遂定魏略曰太祖不立太子太子自疑是時有髙元昌者善相人乃呼問之對曰其貴乃不可言因問壽幾何元昌曰其壽至四十當有小恙過是無憂後無幾而立太子也丗語曰辛毗女憲英適太常羊耽外孫夏侯湛爲其傳曰憲英聦明有才鑒􅀄文帝與陳思王爭爲太子旣而文帝得立抱毗頸而告之曰辛君知我喜不毗以告憲憲歎曰太子代君主宗廟社稷也代君不可以不慼主國不可以不懼冝慼而喜何以能乆魏其不昌乎魏志曰明帝文帝太子也生而太祖愛之常念在左右魏書曰明帝生數歳而有歧嶷之姿武帝異之曰我基於尓三丗矣毎朝燕㑹同與侍中近臣並列帷幄好學多識特留意於法理魏略曰文帝以郭后無子詔使子明帝帝以母不以道終意甚不平後不􅀗巳乃敬事郭后旦夕因長御問起居郭后亦自以無子遂加慈愛文帝始以帝不恱有意欲以他􅁎子京兆王爲嗣故不拜太子魏末傳曰明帝甞從文帝獵見子母鹿文帝射殺鹿母使帝射鹿子帝不從曰陛下殺其母臣不忍復射其子因涕泣文帝即放弓箭以此􅀷竒之而建樹之意定也王隱晉書曰武皇帝寛惠仁厚深沉有智量風度容貌綽如也景元中爲撫軍咸熈元年晉國􅀄開立爲丗子遷撫軍大將軍開府副相國二年立爲太子又曰惠帝爲太子時上素知太子闇弱後必亂國然不能擇才乃遣荀朂和嶠徃觀之朂還盛稱太子德更進茂不同西宫之時也嶠荅詔稱臣以爲太子如故不見更勝此自陛下家事非臣所盡也於是天下貴嶠而賤勗也又曰愍懷太子名遹音聿字熈祖少聦惠武帝愛之六七歳時帝夜望火太子牽上衣裾使入闇中上問其故太子對以暮夜倉卒冝備非常不當近火光令人照見也又甞見官養猪肥大不常復問上何不殺以賜左右而乆費五榖上即烹之由是益竒之常稱以爲似宣皇帝亦以東宫無嫡有託後之意太康十年詔曰遹旣長且仁可令以遹爲廣陵王以廣陵臨淮爲封國邑五萬户及丗祖崩惠帝即位立爲皇太子詔曰遹尚㓜􅀩今出止東宫雖當頼師傅羣賢之訓其遊處左右冝得正人陳共周旋能相長益者太保衛權息庭司空司馬􅁗息略太子太傅楊濟息毖音秘太子少師裴楷息憲太子少傅張華息禕尚書令華廙音翼息􅁪並以道義之門有不肅之訓其令此六人更共徃來止其後太子好卑居小馬小牛令左右􅀐斷羈勒使墮地又令人屠肉巳自分齊手揣輕重斤兩不差云其母夲屠家女也頗好遊宴或闕朝侍稍失儲副望賈后無子妬害滋甚九年正月月暈赤黃數重三月十八日榮陽河南潁川繁霜殺桒及姚李杏花尉氏􅀨血有聲􅀂牛出許昌城夏桒生于東宫西廂日長尺餘數日枯日中􅀂飛鷰者積數月漢中平中亦有此變皆爲太子也賈后作頡子髻太子見頡之象也是時謡曰宫東馬子莫聾啌前至臘月􅆞汝􅷔十一月天連大風發屋折樹十二月二十八日后遣宫婢齎書與太子云陛下昨夜不快汝可入朝太子如令請朝詔聽二十九日入朝賈后不見使婢陳儛賜􅀥酒強使飲辭不見聽太子醉賈后誣奏太子有悖書廢徙金墉城以千兵防送幽于許昌宫之別坊賈后與賈謐等早害太子以絶民望三月十四日矯詔使小黄門孫慮害太子賈后表以廣陵王禮殯趙王倫誅賈謐廢賈后帝乃使持節兼司空衛尉伊䇿故皇太子曰嗚呼少資歧嶷之質荷先帝殊異之寵大啓土宇奄有淮陵朕奉遵遺旨建尓儲副以光顯我祖宗祗尓徳行以從保傅事親孝敬禮無違者而朕昧于凶構致􅈛于非命之禍俾申生孝巳復見于今頼宰相賢明人神憤怨朕心討厥有罪咸伏其辜何􅀘於荼毒􅁈魂酷痛哉是用切怛悼恨震動於五内今追復皇太子䘮禮備制反葬京畿祠以太牢魂而有靈尚獲􅈛心文士傳曰賈謐與愍懷太子博爭道成都王厲聲曰皇太子國之儲君賈長淵何得無禮晉書曰明帝元皇帝長子也㓜而聦哲爲元帝所寵異年數歳常坐置膝上屬長安使來因問帝曰汝謂日與長安孰逺對曰不聞人從日邊來居然可知也元帝異之明日宴羣僚又問之對曰日近元帝失色曰何乃異間者之言對曰舉目見日不見長安由是益竒之及帝即尊號立爲皇太子已見明帝紀中何法盛晉中興書曰肅祖中宗長子也建武元年中宗爲晉王拜王太子及踐尊號爲皇太子􅁽曰於戯朕承天緒忝繼祖宗之洪基君臨于萬􅀖戰戰兢兢􅀂渉淵水未有攸濟自古聖王敷宅四海莫不建立元子夲枝百丗今稽古授􅈛于儲宫以陪貳于朕躬欽哉氽其克念乃祖日新厥德何逺非佞何親非賢欽翼師傅以丕崇大化可不愼歟氽其敬之又曰孝宗穆皇帝諱聃康帝子也建元二年康帝疾篤左光禄大夫領司徒謨尚書令恢等上䟽曰臣聞皇義􅀇邈五帝攸徃淳風澆散三王傳嗣欲令國有常居民有定奉􅀜諸盛衰不易之道也伏惟皇子天挺竒表隆凖豐下歧嶷之姿彰於始年大成之風顯於朞月冝建立儲宫允副民望請下太史擇􅁻日告宗廟備禮儀奉行奏可後魏書曰太宗明元皇帝道武之長子􅀄帝母旣賜死大祖乃召帝告曰昔漢武帝將立其子而殺其母不令婦人後與國政使外家無亂汝當繼統吾故逺同漢武爲長乆之計帝素純孝哀泣不能自勝太祖怒召之帝欲入左右曰孝子事父小杖則受大杖避之今陛下怒盛入或不測䧟帝於不義不如且出待和解而進不晚也帝從之乃遊行於外及元紹之逆也帝還而誅之天賜六年即皇帝位又曰景穆皇帝太武皇帝之長子也母曰賀夫人延和元年立爲皇太子時年五歳明惠強識聞則不忘及長好讀經史皆通大義太武甚竒之􅀄太武之伐河西李順等咸言姑臧無水草不可行太子有疑色及車駕至姑臧乃詔太子曰姑臧城東西門外涌泉於城北其大姑河澤草茂盛可供大軍數万人之多言亦可惡也太子謂言者曰爲人臣不實􅀂此豈是忠乎吾􅀄聞有疑但帝决行耳幾誤人大事言者復何靣目見帝也正平元年六月薨於東宫時年二十四賜謚曰景穆皇太子髙宗即位追尊爲景穆皇帝廟號恭宗又曰丗宗宣武皇帝孝文皇帝第二子也母曰髙夫人初夢爲日所逐避於牀下日化爲龍繞巳數匝遂有娠生帝於平城宫二十一年立爲皇太子又曰肅宗孝明帝諱詡丗宗第二子也延昌元年立爲皇太子二年丗宗幸東宫召崔光與黃門甄琛廣陽王淵等並賜坐詔光曰卿是朕西臺大臣當今爲太子師傅光起拜固辭詔不許即命肅宗出從者十餘人勑以光爲􅀓之意令肅宗拜光光又拜辭不當受太子拜復不􅀩許肅宗遂南面再拜詹事王顯啓請從太子拜於是宫臣畢拜光北面立不敢荅拜唯西面拜謝而出又曰廢太子生而母死文明太后撫視之常置左右詔曰昔塗山有育美名列於夏典任姒作配昌發顯於周書故能緝熈丕緒祚延八百自元子誕育於今四載而名表未孚於四方茂實未昭於朝掖非所以憲章逺猷允光禮度者也太皇太后親發明旨爲之立名依德恊義名恂字元道國祚永隆儲貳有􅀉無窮之兆於是而始乃大赦天下太和十七年七月癸丑立恂爲皇太子髙祖毎歳征幸常留守恂不好書學體貌肥大􅀷忌河洛暑􅀬意毎追樂北方庶子髙道恱數苦諫恂甚銜之乃手刃道恱於禁中髙祖引羣臣於清徽堂議廢之爲庶人置之河陽後謀逆賜死梁書曰天監十四年正月朔旦帝臨軒冠太子於太極殿舊制太子着逺遊冠金蟬翆緌纓至是詔加金愽山又曰昭明太子母丁貴嬪有疾太子還永福省侍疾衣不解帶及薨歩從喪還宫至殯水漿不入口毎哭慟絶武帝命中書舎人顧恊宣旨曰毀不滅性聖人之制不勝喪比於不孝有我在郍得自毀如此可即強進飲粥太子奉勑乃進數合自是至葬日進麥粥一􅂛武帝又勑曰聞汝所進過少轉羸痩我比更無病正爲汝如此􅇩中亦圯塞成疾應強加饘粥不使我恒尓懸心雖屢奉勸逼終喪日止一溢不甞菜菓之味體素壯􅆎帶十圍至是減削過半每入朝士庶見者莫不下泣又曰昭明太子性愛山水於􅀇圃穿築更立亭館與朝士名素者遊其中甞泛舟後池畨禺侯軌盛􅁛此中冝奏女樂太子不荅詠左思招隱詩云何必絲與竹山水有清音軌慙而止又曰昭明太子好士愛文劉孝綽與陳郡殷芸呉郡陸倕琅瑘王筠彭城劉洽等同見禮待太子起樂賢堂後周書曰宣帝諱贇髙祖長子帝即位多過惡初帝之在東宫也髙祖慮其不堪承嗣遇之甚嚴朝見進止與諸臣無異雖隆寒盛暑亦不得休息性旣嗜酒髙祖遂醪醴不許至東宫帝每有過輙加捶扑甞謂之曰古來太子􅀍廢者幾人餘兒豈不堪立邪於是遣東宫官屬録帝言語動作每月奏聞帝憚髙祖嚴矯情脩飾以是過惡遂不聞隋書曰􅌆帝髙祖第二子也母文獻獨􅀌皇后上美姿儀少敏惠髙祖及后於諸子中特鍾愛髙祖幸上所居第見樂器􅃶多斷絶又有塵埃􅀂不用者以爲不好聲􅇊之玩上尤自矯飾當時稱爲仁孝及太子勇廢立爲皇太子唐書曰李綱隋開皇末爲太子洗馬皇太子勇甞以歳首宴宫臣左庶子唐令則自請奏琵琶又歌武媚娘之曲綱趨而出勇曰我欲爲樂耳君勿多事及勇廢黜文帝召東宫官屬切讓之無敢對者綱對曰今日之事乃陛下之過非太子之罪也太子才非上品性是常人􅀂得賢明之士輔導之足堪継嗣皇業方今多士盈朝當擇賢居任奈何以􅃶􅁔鷹犬之才日在其側致令至此乃陛下訓導不足豈太子之罪耶隋書曰元德太子昭􅌆帝長子也生而髙祖命養宫中三歳時於􅀇武門弄石師子髙祖與文獻后至其所髙祖適患腰痛舉手慿后昭因避去如此者再三髙祖歎曰天生長者誰復敎乎由是大竒之髙祖甞謂曰當爲􅈛娶婦昭應声而泣髙祖問其故對曰漢王未婚時恒在至尊所一朝娶便則出外懼將違離是以啼耳上歎其有至性特鍾愛焉􅌆帝即位便幸雒陽宫昭留守京師大業元年帝遣使者立爲皇太子唐書曰太宗文皇帝髙祖第二子也母曰太穆皇后以隋開皇十八年生於武功之別館初在孕而語声聞於外后心異之將誕育后不之覺而太宗已生髙祖受禪拜尚書令進封􅁗王武德九年立爲皇太子又曰隱太子建成髙祖長子也大業末髙祖捕賊汾晉令建成携家屬􅀉于河東義旗建遣使密召之建成與巢王元􅁻間行赴太原建成至髙祖大喜拜左領大都督封隴西郡公引兵略西河郡從平長安義寧元年冬隋恭帝拜唐國丗子開府置僚屬二年授抚軍大將軍東討元帥將兵十萬徇洛陽及還恭帝授尚書令武德元年立爲皇太子時太宗功業日盛建成與齊王元􅁻濳謀作亂九年六月三日太宗密奏建成元􅁻􅁋乱後宫因自陳曰臣於兄弟無􅁝毫所負今欲殺臣似爲丗充建德報讎臣今枉死永違君親魂歸地下實亦恥見諸賊髙祖省之愕然報曰明日當勘問汝冝早叅四日太宗將左右九人至􅀇武門自衛髙祖巳召裴寂蕭瑀竇延陳叔逹封倫宇文士及顔師古等欲令窮覆其事建成元􅁻行至臨湖殿覺變即廻馬將東㱕宫府太宗隨而呼之元􅁻馬上張弓再三不彀太宗乃射之建成應􅁌而斃又曰髙宗文皇帝太宗弟九子母曰文徳順聖長孫皇后貞觀二年生於東宫之麗正殿封晉王㓜而歧嶷端審寛仁孝友初授孝經太宗問曰此書中何言爲善對曰夫孝始於事親中於事君終於立身太宗大恱曰行此足以事父兄爲臣子矣太子承乾廢長孫無忌李勣等議立爲皇太子又曰太子承乾得罪太宗欲立晉王而限以非次惶惑不決乃御兩儀殿羣臣盡出獨留長孫無忌及司空房􅀇齡李勣謂曰我三子一弟所爲如此我心無􅂓因自投於床抽佩刀欲自刺無忌等驚懼爭前扶抱取佩刀以授晉王無忌等請太宗所欲報曰我欲立晉王無忌曰謹奉詔有異議者臣請斬之太宗謂晉王曰汝勇許汝也汝冝拜謝晉王因下拜太宗謂無忌等曰公等旣符我意未知物論何如無忌曰晉王仁孝天下屬心乆矣乞召問百僚必無異辭於是建立遂定太平御覽卷第一百四十八
