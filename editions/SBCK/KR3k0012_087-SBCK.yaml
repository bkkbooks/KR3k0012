body:
  text: 漢髙祖皇帝項籍附孝惠皇帝前少帝後少帝漢髙祖皇帝河圖曰帝劉季曰角戴勝斗􅅐􅀛背龍眼長七尺八寸明聖而寛仁又曰劉受紀昌光岀軫五星聚井龍魚河圖曰髙皇攝正揔萬庭四海歸詠治武明文德道治承天精元祚興隆恊聖靈尚書帝命驗曰賊起蜚夘生虎賊起蜚始皇立也卯劉字之别也皇立而劉生虎仁男髙祖又曰有人雄起戴玉英玉英寳物之名戴之謂骨表祈旦失籥亡其金虎祈讀曰哲白也謂之素也且失籥户將開金虎獸之長喻於秦君東南紛注精起紛紛動擾之貌注星之精起謂劉氏也尚書考靈耀曰卯金岀軫握命孔符卯金劉字之别軫楚分野之星符圖書劉所握天命孔子制圖書詩含神霧曰含始吞赤珠刻曰玉英生漢皇刻刻鏤也有玉英之文春秋演孔圖曰其人曰角龍顔始卯金刀含仁義春秋燿鈎曰庶人爭權赤帝之精庶人項羽劉季者也争權並欲起也史記曰髙祖沛豐邑中陽里人姓劉氏字季母媪嘗息大澤之陂夢與神遇是時雷電晦暝父太公往視則見蛟龍於上巳而有娠遂産髙祖髙祖爲人隆凖而龍顔美􅂡髯左股有七十二黒子仁而愛人意豁如也爲泗上亭長廷中吏無不狎侮好酒及色常從王媪武􅀒貰酒時飲醉卧武􅀒王媪見其上常有龍恠之髙祖每酤留飲酒讎如淳曰讎音售數陪嘗繇咸陽縱觀始皇帝曰嗟乎丈夫當如此也髙祖以亭長爲縣送徒驪山到豐西澤中止飲夜皆解縱所送徒徒中壯士願從者十餘人髙祖􅀍酒夜經澤中令一人行前還報曰前有大蛇當徑願還髙祖醉曰壯士行何畏乃前拔劒斬虵虵分爲兩道開行數里醉困卧後人來至虵所有一老嫗夜􅂘人問何哭嫗曰人殺吾子人曰嫗子何爲見殺嫗曰吾子白帝子也化爲虵當道今爲赤帝子斬之因忽不見後人至告髙祖髙祖乃心獨喜􅁗始皇帝曰東南有天子氣於是東遊以厭當之髙祖隠於芒碭山間吕后與人俱來常得之髙祖恠問吕后曰季所居上常有雲氣故從徃常得季髙祖又喜沛中子弟或聞之多欲附者􅁗二世元年秋陳勝等起沛令欲以沛應勝沛父老皆曰生平所聞劉季竒恠當貴且卜筮之莫如劉季最吉乃立爲沛公祠黄帝􅀕􅃖尤於沛庭而釁鼓旗熾皆赤漢元年冬十月五星聚於東井沛公兵先諸侯至霸上􅁗王子嬰降軹道旁遂西入咸陽召諸縣豪桀曰父老苦􅁗苛法乆矣誹謗者族偶語者棄市吾與諸侯約先入􅀜者王之吾當王􅀜中與父老約法三章耳殺人者死傷人及盗抵罪餘悉除去􅁗民大喜五年項羽㓕諸侯尊漢王爲皇帝天下大定髙祖都雒陽置酒南宫髙祖曰通侯諸將無敢隠朕皆言其情吾所以有天下者何項氏之所以失天下者何髙起孟康曰姓髙名起也王陵對曰陛下慢而侮人攻城略地降下者因以予之與天下同利也項羽妬賢嫉能有功者害之賢者疑之戰勝而不與人功得地而不與人利此所以失天下者也髙祖曰公知其一未知其二運籌䇿於帷帳之中決勝於千里之外吾不如子房鎮國家撫百姓給餉饋不絶粮道吾不如蕭何連百萬之衆戰必勝攻必取吾不如韓信此三人者皆人傑也吾能用之此所以取天下也戍卒婁敬􅀃髙祖曰都雒陽不便不如入􅀜據􅁗之國上以問張良因勸上即日車駕西都長安九年髙祖大朝諸侯群臣置酒未央前殿上奉玉巵起爲太上皇壽曰始大人嘗以臣無頼不能治産業不如仲力今某之業所就與仲力孰多群臣皆稱萬􅀊大爲􅀏樂髙祖廻歸過沛留置酒沛宫悉召故人父老子弟佐酒發沛中兒得百二十人教之歌酒酣髙祖擊筑自爲歌詩曰大風起􅀆雲飛􅀭威加海内􅀆歸故郷安得猛士􅀆守四方令兒皆和習之髙祖乃起舞慷􅁣傷懐泣數行下謂沛父兄曰遊子悲故郷吾雖都􅀜中萬􅀊後吾䰟魄猶樂思沛且朕自沛公以誅暴逆遂有天下其以沛爲朕湯沐邑後其民世世無有所與沛父兄諸母故人曰樂飲極歡道舊故爲􅀏樂十餘日髙祖欲去沛父兄固請留髙祖曰吾人衆多父兄不能給乃玄沛中空縣皆之邑西獻獻牛酒髙祖復留止張飲三日張宴曰張張惟髙祖擊黥布時爲流矢所中行道病甚吕后迎良醫醫入見髙祖問醫醫曰病可治於是髙祖嫚罵之曰吾以布衣提三尺劔取天下此非天命乎命乃在天雖扁鵲亦何益遂不使治病四月甲辰崩于長樂宫時年六十一在位十二年葬長陵群臣上尊號爲髙皇帝令郡國諸侯各立髙祖廟以􅀊時祠及孝惠五年思髙祖之悲樂沛以沛宫爲髙祖原廟也􅀄髙祖不脩文學而性明逹好謀能聽自􅁥門戍卒見之如舊􅀄從民心作三章之約天下旣定命蕭何治律令韓信申軍法張蒼定章程如淳曰章歷數之章術也程者權衡丈尺斛斗之平叔孫通制禮儀陸賈造新語又與功臣剖符作誓丹書鐵契金匱石室藏之宗廟雖日不暇給規摹弘逺矣又曰范増􅀃項羽曰沛公居山東貪於財貨好美姬今入􅀜財物無所取婦女無所幸此其志不在小漢書賛曰漢承堯運徳祚巳盛斷虵著符旗幟尚赤恊于火德自然之應得天統矣荀恱漢紀曰項羽自立爲楚王王梁楚地九郡都彭城立沛公爲漢王王巴蜀漢中四十一縣都南鄭諸侯皆就國漢王欲攻楚丞相蕭何諌曰雖王漢之惡不猶愈於死乎且語曰天漢其稱甚羙夫能屈於一人之下則伸於萬人之上湯武是也願大王王漢撫其民以致賢人收用巴蜀還定三􅁗天下可圖乃就國又曰髙祖開建大業統辟元功度量規矩不可尚矣是時天下􅀄定而庶事草創故韶夏之音未有聞焉楚漢春秋曰項王在鴻門而亞父諌曰吾使人望沛公其氣衝天五彩湘糺或似雲或似龍或似人此非人臣之氣也不􅀂殺之帝王世紀曰豐公家于沛之豐沛邑之陽里其妻夢赤馬􅀂龍戯巳而生執嘉是爲太公即太上皇也太上皇之妃曰媪是爲昭靈后名含始遊於洛池有玉鷄衘赤珠出刻曰玉英吞此者王含始吞之生􅀖字季又曰􅀇晏先王曰禮稱至道以王義道以霸觀漢祖之取天下也遭􅁗世暴亂不偕尺土之資不權將相之柄發迹泗亭􅁬其智謀羈勒英雄鞭驅天下或以威服或以德致或以義成或以權斷逆順不常霸王之道􅄂焉是以聖君帝王之位而無一定之制三代之美固難及矣後漢班叔皮王命論曰在昔帝堯之禪曰咨爾舜天之暦數在爾躬舜亦命禹暨于稷契咸佐唐堯光濟四海弈世載德至于湯武而有天下雖其遭遇異時禪代不同至于應天順民其揆一也是故劉氏承堯之祚氏族之世著于春秋唐據火德而漢紹之始起沛澤則神母夜號以彰赤帝之符由是言之帝王之作必有明聖顯懿之德豐功厚利積累之業然後精誠通于神明流澤加於生人故能爲􅀑神所福饗天下所歸往未見運世無本功德不能紀而得堀然在此位者世俗見髙祖興於布衣不逹其故以爲適遭暴亂得􅁬其劒遊􅀃之士至比天下於逐鹿幸捷而得之不知神器有命不可智力求悲夫此世之所以多亂臣賊子者項籍河圖曰恠目勇敢重瞳大力楚之􅀖尚書中􅃸曰自號之王霸姓有工項羽爲西楚霸王工項宇之側史記曰項籍者下相人也地里志云臨淮有下相縣字羽􅀄起時年二十四季父項梁梁父即楚將項燕爲􅁗將王剪所戮項氏世世爲楚將封於項故姓項氏籍少時學書不成去學劒又不成項梁怒之籍曰書足以記名姓而巳劒一人敵不足學學萬人敵於是項梁乃教籍兵法籍大喜梁殺人與籍避仇於呉􅁗始皇帝遊㑹稽渡浙江梁與籍俱觀籍曰彼可取而代也梁掩其口曰無妄言族矣梁以此竒之籍身長八尺餘力能扛鼎韋昭曰扛舉也才氣過人􅁗二世元年九月㑹稽守餘廣曰爾時未云太守也通謂梁曰楚漢春秋曰㑹稽假守適通也吾欲發兵使公及桓楚爲將是時桓楚亡在澤中梁曰桓楚亡人莫知其處獨籍知召籍使授命召桓楚守曰諾梁召籍入須􅁷梁眴籍曰可行矣於是籍遂拔劒斬守頭遂舉呉中兵使人收下縣得精兵八千人項梁乃渡江而西凡六七萬人軍下邳此時沛公亦起沛往焉乃求楚懷王孫立以爲楚懷王王召宋義以爲上將軍項羽爲魯公次將范増爲末將諸別將皆屬宋義號爲卿子冠軍項羽晨朝上將軍宋義即其帳中斬宋義頭出令軍中曰宋義與齊謀反楚楚王隂令羽誅之當是時諸將皆懾服莫敢枝梧如淳曰梧當枝猶枝桿也臣瓉曰小杜爲枝邪柱爲梧今屋梧邪柱是也皆曰首立楚者將軍家也今將軍誅亂乃相與共立羽爲假上將軍懷王因使羽爲上將軍乃悉引兵渡河皆沉船破釡甑燒廬舎持三日糧以示士必死無一還心於是至則圍王離與􅁗軍遇九戰絶其甬道大破之虜王離諸將皆從壁觀楚戰士無不一當十呼聲動天地項羽召見諸侯諸侯入轅門張晏注曰軍行以車爲陣轅相􅀝爲門曰轅門無不􅂰行而前莫敢仰視項羽引兵西屠咸陽殺􅁗降王子嬰燒􅁗宫室火三月不滅收其寳貨婦女而東人或􅀃項王曰􅀜中阻山河四塞地肥饒可都以霸項王見􅁗宮室皆以燒殘破又心懐思欲東歸曰冨貴不歸故郷如衣繡夜行誰知之者􅀃者曰人言楚人沐猴而冠耳果然張晏曰沐猴猕猴也項王自立爲西楚霸王王九部都彭城漢之二年漢王伐楚皆巳入彭城收其寳貨項王乃從蕭晨擊漢軍而東至彭城大破漢軍漢軍皆走相隨入榖泗水二水皆在沛郡彭城殺漢卒十餘萬人漢卒皆南走山楚又追擊之靈壁東徐廣曰在彭城睢水上徐廣曰睢水彭城西水入泗水漢軍却爲楚所擠擠排也多殺漢卒十餘萬皆入睢水睢水爲之不流圍漢王三匝於是大風從西北起折木發屋􅀭沙石窈􅄀晝晦逢迎楚軍楚軍大亂壞散而漢王乃得與數十􅀐遁去漢之四年項王西與漢俱臨廣武而軍孟康注曰築兩城相對在廣武敖倉西三皇山山上相守數月當此時彭越數反梁也絶楚糧道項王患之楚漢乆相持未決丁壯苦軍旅老弱罷轉漕項王謂漢王曰天下匈匈數􅀊者徒以吾兩人耳願與漢王挑戰李竒曰挑身獨戰不湏衆也挑音茶了反瓉曰挑戰擿撓敵求戰古謂之致師决雌雄無徒苦天下之民父子爲也漢王􅀏謝曰吾寧闘智不能闘力項王命壯士出挑戰漢王有善􅀐射者樓煩應劭曰樓煩今樓煩縣楚挑戰三合樓煩輙射殺之項王大怒乃自􅀍甲持㦸挑戰樓煩欲射之項王瞋目叱之樓煩目不敢視手不敢發遂走還入壁不敢復出漢王使人間問之乃項王也漢王大驚於是項王乃即漢王相與臨廣武間而語漢王數之項王怒甚欲一戰漢王不聽項王伏弩射中漢王漢王傷走入成臯項王乃與約中分天下割鴻溝以西者爲漢文頴曰於榮陽下引河東爲鴻溝以通宋鄭陳蔡曹衛兵濟汝淮泗㑹於楚即今官渡水也鴻溝而東者爲楚項王巳約乃引兵解而東歸漢欲西歸張良陳平說曰楚兵疲食盡此天亡楚之時也漢王乃追項王至垓下項王軍壁垓下兵少食盡漢軍及諸侯兵圍之數重夜聞漢軍四靣皆楚歌應劭曰楚歌者雞鳴歌也漢巳略得其地楚歌者多也項王乃大驚曰漢皆巳得楚乎是何楚人之多也項王乃夜起飲於帳中有羙人名虞徐廣曰云虞氏常幸從駿馬名騅常􅀐之於是項王乃悲歌慷􅁣自爲詩曰力􅋞山􅀆氣蓋世時不利􅀆騅不逝騅不逝􅀆可奈何虞􅀆虞􅀆奈􅀂何歌數闋美人和之項王泣下數行左右皆泣莫能仰視於是項王乃上馬􅀐麾下壯士􅀐從者八百餘人直夜潰圍南出馳走平明漢軍乃覺之令􅀐將灌嬰以五千􅀐追之項王渡淮􅀐能屬者百餘人耳項王至隂陵徐廣曰在淮南迷失道問一田父田父紿曰左文頴曰紿欺也欺令左也左乃䧟大澤中以故漢追及之項王乃復引兵而東至東城漢書音義曰縣名屬臨淮乃有二十八􅀐漢􅀐追者數千人項王自度不得脫謂其􅀐曰吾起兵至今八􅀊矣身七十餘戰所當者破所擊者服未嘗敗北遂霸有天下然今卒困於此天之亡我非戰之罪也項王乃欲東渡烏江瓉曰在牛渚也烏江亭長艤船待孟康曰艤音蟻附着岸也如淳曰南方人謂整船向岸曰艤謂項王曰江東雖小地方千里衆數十萬人亦足王也願大王急渡今獨臣有船漢軍至無以渡項王􅀏曰天之亡我我何渡爲且籍與江東子弟八千人渡江而西今無一人還縱江東父兄憐而王我我何靣目見之縱彼不言籍獨不愧於心乎乃謂亭長曰吾知公長者吾􅀐此馬五歳所當無敵嘗一日千里吾不忍殺之以賜公乃令􅀐皆下馬歩行持短兵接戰獨籍所殺漢軍數百人項王身亦􅀍十餘創頋見漢􅀐吕馬童曰􅀂非吾故人乎馬童靣之張晏曰以故人難親斫之故皆靣之也如淳曰靣不視正也指王翳曰如淳曰指示王翳也此項王也項王乃曰吾聞漢購我頭千金邑萬戸吾爲汝得徐廣曰亦可取是功德之德也乃自刎而死漢以魯公禮葬項王於榖城太史公曰吾聞之周生周時賢也曰舜重瞳子又聞項羽亦重瞳子豈其苗裔乎何其興之暴也夫􅁗失其政陳渉首難豪傑蜂起相與並爭不可勝數然羽非有尺寸乗􅀔起隴畒之中三年遂將五諸侯滅􅁗此時山東六國而齊趙韓魏燕五國並伐􅁗故云五諸侯也分裂天下而封王侯政由羽出號爲霸王位雖不終近古以來未嘗有也周生烈子曰桀紂是湯武之梯􅁗項是大漢之階也四逆不興則三順不勝也蔣子萬機論曰項羽􅀂聽范増之䇿則平歩取天下也譙周法訓曰劉項方爭父戰於前子闘於後孝惠皇帝史記曰孝惠爲人仁弱髙祖以爲不􅀋我也常欲廢太子而立戚􅁎子如意􅀋我戚􅁎得幸常從上之􅀜東日夜啼泣欲立其子代太子吕后年長常留守希見上益䟽髙祖崩太子襲號爲惠皇帝吕后最怨戚夫人及其子趙王惠帝慈仁知太后怒自挾與趙王起居飲食太后欲殺之不得間孝惠元年十二月帝晨出射雉趙王少不能早起太后聞其獨居使人特鴆而飲之犂明孝惠還趙王巳死徐廣曰犂猶比太后遂斷戚夫人手足去眼燻耳使居厠中命曰人􅇾居數日乃召孝惠帝來觀人􅇾孝惠見問迺知是戚夫人也迺哭因􅀊餘不能起使人請太后曰此非人之所爲臣爲太后子終不能治天下孝惠以此日飲爲􅁋樂不聽政故有疾又曰太史公曰孝惠皇帝髙后之時􅀺民得離戰國之苦君臣俱欲休息乎無爲故惠帝垂拱髙后女主稱制政不出閨房天下晏然刑罰罕用罪人是希民務稼穡衣食滋殖矣漢書曰孝惠諱盈之字曰滿應劭曰禮謚法柔質慈民曰惠矣七年帝崩于未央宫案帝年十七即位在位七年矣葬安陵漢書賛曰孝惠内脩親親外禮􅌠相可謂寛仁之主遭吕太后虧損至德悲夫荀恱漢紀曰立皇后張氏帝姉魯元公主之女也太后欲以重親故以配於帝也論曰夫婦之際人道大倫姉子而爲后昬於禮而瀆於人情非所以示天下作民則也群臣莫諌過也班固漢書􅄒曰孝惠短世髙后稱制罔頋天顯吕宗以敗前少帝史記曰惠帝崩太子即位爲帝號令一出太后太后稱制宣平侯女爲孝惠皇后時無子佯有娠取羙人子名之殺其母立所名子以爲太子也孝惠崩太子爲帝帝壯或聞其母死非眞皇后之子乃出言曰后安能殺吾母而名我太后聞而患之恐其後爲亂於是乃幽之於永巷中群臣奉旨廢帝後少帝史記曰后元年立孝惠後宮子弘爲襄成侯二年以爲常山王更名義四年廢少帝立常王義爲帝更名私不稱元年者以太后制天下事也八年太后崩大臣誅諸吕相與隂謀曰少帝及梁淮陽常山王皆非眞孝惠子迺相與隂使人召代王至長安共尊立爲天子東平侯興居曰誅吕氏吾無功請得除宫迺與太僕汝隂侯􅅬公入宫前謂少帝曰足下非劉氏不當立乃召乗輿載少帝出少帝曰欲將我安之乎代王遂入而聽政夜有司分部誅滅梁淮陽常山王及少帝於帝邸太平御覽卷第八十七
