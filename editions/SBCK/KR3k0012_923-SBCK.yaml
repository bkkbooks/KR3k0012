body:
  text: 羽族部十鴿鸜鵒倉庚戴勝扈百舌伯勞斵木鳭鷯嶲鵽鴞鴟茅鴟鳶鴿說文曰鴿鳩属也後魏書曰崔光魯於門下省晝讀經有鴿飛集􅂰前遂入於懹縁臂上肩乆之乃去道俗賛詠詩頌者數十人梁書曰侯景圍䑓城軍士煑弩燻䑕捕雀食之殿堂舊多鴿羣聚至是殱焉隋書曰文帝甞宴逹頭可汗使者於武德殿有鴿鳴於梁上上命崔彭射之旣發而中上大恱賜錢壹萬又曰楊秦見赤鴿映􅁄髙二尺越絶書曰蜀有花鴿狀如春花戴祚西征記曰祚至雍丘始見鴿大小如鳩色似鸚鵡戲時兩兩相對鸜鵒周禮曰鸜鵒不踰濟鄭司農注云不踰濟無妨中囯有也地氣然也禮稽命徴曰孔子謂子夏曰羣鵒至非中國之禽也左傳曰有鸜鵒來巢書所無也師巳曰異哉吾聞文成之丗童謡有之師巳魯大夫也鸜之鵒之公出辱之鸜鵒之羽公在外野徃饋之馬鸚鵒株株公在乹侯株株跳行貌徴褰與􅃭褰袴也鸜鵒之巢逺哉遥遥稠父䘮勞宋父以驕稠父昭公死故䘮勞也宋父定公代玄以驕鸜鵒鸜鵒徃歌來哭昭公生出歌也死還􅂘也童謡有是今鸜鵒來巢其將及乎公羊傳曰有鸜鵒來巢何以書記異也何異爾非中國之禽也冝穴而巢何休注曰鸜鵒猶欲此推固欲自下居上之徴春秋考異郵曰鸜鵒者飛行属於陽夷狄之鳥穴居於隂異􅁐曰五月五日翦鸜鵒舌令學人語山海經曰衡山多青臒及鸜鵒晉書曰鎭西將軍謝尚字仁祖善鸜鵒舞幽明録曰晉司空桓豁在荆有叅軍剪五月五日鸚鵒舌教令學語遂無所不名頋叅軍善彈琵琶鸜鵒毎立聽移時又善能效人語聲司空大㑹吏佐令悉效四坐語無不絶似有生􅙄􅈹語難學學之不似因内頭於瓮中以效焉遂與􅙄者語聲不異主典人於鸜鵒前盗物叅軍如厠鸜鵒伺無人宻白主典人盗如千種一二條列衘之而未發後盜牛􅁏鸜鵒復白叅軍曰汝云盗􅁏應有驗鸜鵒曰以新荷褁着屏風後檢之果􅀗痛加治而盗者患之以􅀬湯灌殺叅軍爲之悲傷累日遂請殺此人以報其怨司空言曰原殺鸜鵒之痛誠合治殺不可以禽鳥故極之於法令止五歳刑也淮南萬畢術曰寒臯斷舌可使語取寒臯斷其舌即語寒臯一名鸜鵒唐書曰祕書少監崔行功未得五品前忽有鸜鵒衘一物入其堂置案上而去乃魚袋玦數日加大夫荆楚歳時記曰五月鸜鵒子毛羽新成俗好登巢取養之以教其語謂之花鵒倉庚禮記曰仲春之月倉庚鳴毛詩曰春日載陽有鳴倉庚又曰倉庚于飛熠熠其羽又曰黄鳥于飛集于􅈅木又曰綿綿黄鳥止于丘阿又曰睍睆黄鳥載好其音又曰黄鳥哀三良也交交黄鳥止于􅁄誰從穆公子車奄息詩義䟽曰黄麗留也或謂黄栗留幽州謂之黄鸎或謂之黄鳥一名倉庚一名啇庚一名鵹黄一名楚雀齊人謂之􅅮􅁰􅀜西謂之黄鳥常以椹熟時來在桑間此乃應節趣時之鳥或謂之黄􅂁爾雅曰倉庚商庚即鵹黄也鵹黄楚雀即倉庚也又曰皇黄鳥郭璞曰俗注黄離留亦呼名􅁰韓詩曰簡簡黄鳥載好其音說文曰離黄倉庚也鳴即蚕生也戴勝禮記曰季春之月戴勝降于桑鄭玄曰蚕將生之候也戴勝趣織之鳥是時􅁪在桑言降􅀂時治自天來故重之爾雅曰鵖彼及切鴒皮及切戴勝鵀也郭璞曰鵀即頭上勝也亦呼爲戴勝鴒者猶今鶝語聲鶰轉耳春秋考異郵曰孟夏戴絍降說辞曰戴絍之爲言戴勝也陽衘表以期逹蚕珥􅁝在四月故孟夏載絍出以任氣成天津也故載絍出蚕期起維而載之明趣時急也衘天表候以于期巳至唯蚕是務珥吐也孝經援神契曰戴絍下蚕始生魏志曰戴絍鳥巢張臶門隂告門人曰夫戴鵀陽鳥而巢門隂此凶祥也旬日而卒楊雄方言曰燕之東北朝鮮洌水之間鳲謂之鶝䲹自􅀜而東謂之戴絍東齊海岱之間謂之戴南南猶絍也或謂之紡澤或謂之輻燕之東北朝鮮洌水之間謂之􅫁􅫁郭璞注尔雅曰尸鳩布榖非戴勝也尓雅紡在戴絍下然曰案尓王鳥名尓方言依此義又失之廣雅同也扈詩曰交交桑扈率塲啄粟桑扈􅀼脂也牋云􅀼脂肉食今無􅁏自塲啄粟失其性也不能以自治又曰交交桑扈有鶯其羽詩義疏曰或說有鶯其羽言雖小鳥其鶯然有文章左傳曰郯子云少皥摯以鳥名官九扈爲九農正扈民無􅁋者也杜預注云扈止也止民使不滛尓雅曰春扈頒扶云切鶞􅃙偷切夏扈􅀼玄秋扈􅀼藍冬扈􅀼黄桑扈􅀼脂􅁄扈􅀼丹行扈唶唶子夜切宵扈嘖嘖郭璞注曰諸扈皆因其毛色音声以名也犍爲舎人曰頒折主三士冝榖種樹也􅀼玄黒色移民去黄􅀼扈青移民収歛􅀼黄色黄氏盖藏􅀼丹色赤爲民折鳥行扈晝行鳴宵扈夜行鳴皆隨四時同依諸扈爲節候也嘖音債山海經曰崌山有鳥焉如鶚赤身白首其名􅀼脂郭璞注曰今呼責雀爲􅀼脂疑非此也又曰上申之山鳥多當扈􅃺如雉以髯飛食之不眴目上音瞬淮南子曰馬不食脂桑扈不啄粟非廉也左思齊都賦曰四扈推移春秋冬夏四時鳥也百舌禮記曰仲夏之月反舌無聲鄭玄注曰反舌百舌也又曰郯子曰少皥鳥師而鳥名祝鳩氏司徒者也杜預注鳩故爲鵙徒主司教民春秋保乹圖曰江充之害太子交啄反舌鳥入殿宋均注曰交啄反舌百舌鳥風土記曰祝鳩反舌也鄭注禮記云反舌百舌鳥麋信難曰案緯書反舌蝦蟇也昔於長安與諸生共至城北水中取蝦蟇剥視之其舌反成向此則鄭君得過乎喬夙荅曰蝦蟇五月中始得水當聒人耳何云無聲是知蝦蟇非反舌鳥易通卦驗曰反舌鳥乃能反覆其舌隨百鳥之音周書曰芒種之日又五日反舌無聲反舌有聲侫人在側孔子明鏡曰國臣謀反有反舌鳥入宫淮南子曰人有多言猶百舌之聲後魏書曰汝陽王爲東䂊州刺史舉城降梁梁武以爲北道緫督至項城朝廷出師討之望風退走梁武責之曰舌同百鳥瞻􅀂鼷䑕遂徙合浦郭愔百舌鳥詩曰百舌鳴髙樹弄音無常則借問聲何煩永俗不尚嘿伯勞禮曰仲夏之月鷃始鳴鄭云鵙搏勞蔡邕章句鵙伯勞一日伯趙應時而鳴爲隂候也左傳曰郯子云少皥時伯趙氏司至者也杜預注曰伯趙伯勞也夏至鳴冬至止詩曰七月鳴鵙鄭玄曰伯勞鳴將寒之候五月鳴幽也晩寒鳥物之候後從其氣焉爾雅曰鵙伯勞也郭璞注曰似􅗾而大大戴禮夏小正曰五月鳲則鳴鳲者伯鷯也鳴者相命也廣雅曰伯趙鵙也易通卦驗曰夏至小暑伯勞鳴孟子曰南蠻鴂舌愽勞也淮南萬畢術曰伯勞使虵蜿蟬乃天使然也又曰伯勞守金人不敢取取伯勞血以塗金人不敢取東方朔別傳朔與弟子偕行渴令弟子扣道邊家求飲不知姓名主人門門不與湏􅁷見伯勞飛集主人門中李樹上朔謂弟子曰此主人姓李名伯當尓但呼李伯當果有李伯當應即入取飲陳思王植貪惡鳥論曰國人以伯勞鳥獻諸庭者侍臣謂曰丗同惡伯勞之鳴何謂也王曰月令仲夏鵙始鳴詩云七月鳴鵙七月夏之五月鵙則􅀶勞也昔尹􅁻甫信後妻之䜛而殺孝子伯竒其弟伯封求而不得作􅁰離之詩俗傳云􅁻甫後悟追傷伯竒出遊于田見異鳥鳴於桑其聲噭然􅁻甫心動曰無乃伯竒乎鳥乃拊翼其聲尤切􅁻甫曰果吾子也乃頋曰伯竒勞乎是吾子栖吾輿非吾子飛勿居言未卒鳥㝷聲而栖其盖歸入門集于井幹之上向室而號􅁻甫命後妻載弩射之遂射殺後妻以謝之故俗惡伯勞鳴言所鳴之家必有尸也好事附名爲之說令俗人惡之其實否也伯勞以五月鳴應隂氣之動陽爲仁養隂爲殘賊伯勞盖賊害之鳥也屈原曰鵙鴂之先鳴使百草爲之不芳其聲鵙鵙故以音名也晉書曰慕容垂之起於􅀜東歳在癸未苻堅之分氐戸於諸鎭也趙整因侍援琴而歌曰阿得脂􅀶勞舅父是仇綏尾長翼短不能飛逺徙種人留鮮卑一旦緩急語阿誰堅􅀏而不納至是整言驗矣周書時訓曰芒種之日螳蜋生又五日鵙始鳴若不鳴号令壅逼兵書曰軍行卒見伯勞鳴軍前後賊來圍吾軍伯勞鳴軍中軍分散有所配属京房易妖占曰伯勞聚邑中􅀊大水伯勞鳴軍中師分而水且至鳴於君之宫凶夢書曰伯勞爲憂口舌聲可惡也夢見伯勞憂口舌也斵木爾雅曰鴷斵木也郭璞注曰斵木虫因名今斵木有兩三種在山中者大有赤色臨海異物志曰啄木大如雀喙足背青毛色正青翠鳥類也凡啄木異種舌長二寸抄有刺針裴諧集左氏詩曰南山有鳥自名啄木飢則縁樹暮則巢􅀫無干於人惟志所欲此盖禽獸性清者榮性濁者辱閩中名士傳曰薛令之唐開元中爲左􅀘闕兼太子侍講時東宫官冷落乆次難進令之題詩云明月夜􅇛􅇛照見先生盤盤中何所有苜蓿長䦨干飯澁匙難綰羮稀筯易寛只可謀朝夕郍能度歳寒明皇因幸春宫見之不恱命筆酬之曰啄木觜距長鳯凰毛羽短旣嫌松桂寒任逐桑榆䁔令之遂投簮謝爵徒歩東還鳭鷯爾雅曰鳭鷯剖葦郭璞注曰好剖葦皮食其中虫因名之鳲音刀又曰桃虫鷦其䳄注云䳺折桃雀俗呼爲巧好婦詩曰肇允彼桃虫翻飛惟鳥注桃虫鷦鷯是也故爾雅曰桃虫鷦也微小黄雀其鶵化爲蜩故俗語曰鷦鷯生蜩雀易林亦謂桃虫生蜩或云布榖生子鷦鷯養之方言曰自􅀜而東謂之土雀或謂之女匠今亦名巧婦以東呼希母自􅀜而西謂之􅷑鴙爾雅云􅷑鴙鵄鴞属也非寗决音自􅀜而西謂之桑死或謂之蔑雀莊子曰鷦鷯巢深林不過一枝說苑曰孟甞君􅀉客於齊王三年不見用客反見孟嘗君曰不知臣罪耶君之過也孟甞君曰縷因針而入不因針而急夫子之才必薄矣客曰不然臣見鷦鷯巢於葦之苕鴻毛著之臨危建之工女不能爲可謂完堅矣大風至則苕折􅆑破者其所託者使然也晉書曰張華素􅀌貧爲鷦鷯賦成阮籍見之曰王佐之才也由是聲名始著巂音携一名杜宇爾雅曰巂周也郭璞注曰巂鳥孫炎爲鷰別名風土記亦云是赤口鷰也蜀王本紀曰望帝使臣鱉靈治水去後望帝與其妻通慙愧且以德薄不及鱉靈乃委國授之去望帝去時子䳏鳴故蜀人悲子䳏鳴而思望帝望帝杜宇也從天墮臨海異物志日鷤䳏一名田鵑春三月鳴晝夜不止音聲自呼俗言取母血塗其口兩邊皆赤上天自言乞恩至當陸子熟鳴乃得止耳吕氏春秋曰伊尹說云􅁏之美者巂燕鷰之翠髙誘注鳥名翠踈異苑曰杜䳌始陽相推而鳴先發聲者便吐血死昔有人山行見一羣寂然即􅂓學其聲便嘔血死鵽爾雅曰鵽鳩冠雉郭璞注曰鵽大如鴿似䳄雉䑕脚無後指歧爲鳥憨急羣飛出北方沙漢地莊子曰青鵽愛子忘親司馬彪注曰鵽鳥専愛其子而忘其母也唐書曰髙宗時突厥犯塞􅀄突厥之未叛也有鳴鵽羣飛入塞相繼蔽野邊人相驚曰此鳥一名突厥雀南飛突厥犯塞之候也及是春還復北飛至靈夏之北悉墮地而死視之則無頭矣裴行儉問於右史苗神容曰鳥獸之祥乃應人事何也對曰人雖最靈而禀性含氣同於萬􅀋故􅁻凶兆於彼禍福應於此聖王受命龍鳯爲嘉瑞者和氣同也故漢髙斬蛇而驗􅁗之必亡仲尼感麟而知巳之將死夷羊在牧殷紂以滅鸜鵒來巢魯昭出奔䑕舞端門燕刺誅死大鳥飛集昌邑以敗是故君子䖍恭寅畏動必思義雖在幽獨如承大事知明神之照臨懼患難之及巳也雉􅂛鼎耳殷宗側身以修德鵩止坐隅賈生作賦以叙命卒以無患者德勝祥也鴞毛詩曰鴟鴞周公救亂也鴟鴞鴟鴞旣取我子無毀我室詩義䟽曰鴟鴞似黄雀而小啄刺如錐取茅爲巢以麻紩之如刺絑靴縣著樹或一房或二房幽州謂之鸋鳲或曰女匠􅀜東謂之工雀􅀜西謂之蔑雀或謂巧女爾雅曰鴟鴞鸋􅟾鴟春秋運斗樞曰玉衡星散爲鴟莊子曰鴟得腐䑕鵷鶵過之仰而視之又曰鵄嗜䑕之鳥也淮南子曰虞氏者梁富人也登髙樓臨大路設樂陳酒􅀶於其上遊俠相隨行樓下􅀶者射中而􅀏飛鳶墮腐䑕而中遊俠俠相與語曰虞氏冨人奚有輕人之志乃辱我以腐䑕其夜乃殺虞氏大滅其家此謂􅀋非也淮南萬畢術曰鴟腦令鷄自伏取鴟腦以塗鷄自即伏不能起也吕氏春秋曰亂國之妖市有舞鴟鹽鐵論曰㤗山之鴟啄腐䑕於窮澤非有害於人也今有同盗主財而食之焉得􅀂㤗山之鴟乎後魏書曰孝武即位蠕蠕諸藩並遣使朝貢帝臨軒宴之有鴟鳥飛鳴於殿前帝素知竇熾善射因欲矜示逺人乃給熾御箭兩􅃗命射鴟應􅁌而落諸蕃人咸歎異焉帝大恱列仙傳曰李仲甫夜卧床上或爲鴟鳥跱架上後至沓縣臣山上候北風當飛度南海山上有羅鷹者羅得鴟視之仲甫也後留更三年自云徃崑崙去茅鴟爾雅曰狂茅鴟郭璞注曰折鴟也似鷹而白孫炎曰大目鵀鶹也廣雅曰盧休茅鴟鳩也左傳曰叔孫穆子食慶封慶封汜􅀕穆子不說使工爲之誦茅鴟茅鴟逸詩刺不敬亦不知鳶禮記曰前有塵埃則載鳴鳶鳶鳥則膊風也毛詩曰鳶飛戾天魚躍于淵爾雅曰鳶鳥醜其飛也翔布翅翶翔漢書曰成帝河平元年太山有鳶焚其巢子墮地黒色東觀漢記曰馬援擊交阯下潦上霧毒氣上蒸仰視烏鳶跕跕丁兼切墮水中梁書曰永安侯蕭礭字仲正少好弓馬人有􅀏者礭謂之曰吾當爲國家破賊故預習之毎臨陣對敵意氣安祥帶甲據鞍自朝至夕馳驟徃返不以爲勞侯景愛之􅁪在左右常從景出獵見飛鳶景衆射之莫能中礭射之應弦而落自是王偉忌之隋書曰崔彭善射逹頭可汗遣使於上曰請得崔將軍一與相見上曰此必善射聞於虜庭所以來請耳遂遣之及至匈奴中可汗召善射者數十人因擲􅁏於野以集飛鳶遣其善射者射之多不中復請彭射之連發數矢皆應弦而落突厥相頋莫不歎服可汗留彭不遣百餘日上賂以繒綵然後得歸又曰長孫晟引啓民可汗歸附賜射於武安殿選善射者十二人分爲兩列啓民曰臣有長孫大使得見天子今日賜射願入其列許之給晟箭六􅃗發皆入鹿啓民列竟勝時有鳶羣飛上曰公善彈爲我取之十發俱中應丸而落是日百官􅀗賚晟獨居多􅀶物志曰漢舊使綦國送鳶􅆑給太官晉中興書徴祥說曰永和九年呉郡獻白鳶太平御覽卷第九百二十三
