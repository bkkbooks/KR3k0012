front:
  text: 太平御覽卷第三百三十六
  hash: sha256:5451104570d24186f048ab3cd4479a2c8ead86a023d20cb949691bc4b1848ae4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_336-1a}
body:
  text: 兵部六十七攻具上詩曰帝謂文王詢尓仇方同尓弟兄以尔鉤援與尓臨衝以伐崇墉毛萇日仇匹也鉤鉤折所以鉤引上城者也臨臨車也衝衝車也墉城也左傳曰晉使解􅀭如宋使無降楚鄭人囚之以獻於楚楚子使反其言三而後許登諸樓車所謂雲梯使呼宋人而告遂致其君命楚子舎之以歸春秋感精符曰齊晉並争呉楚更謀不守諸侯之節競行天子之事作衡車厲武將輪有刄衡着劍以相振懼宋均曰衡䧟敵之車也輪有刄鑿輸着刃也衡馬軛也後漢書曰王㝷王邑攻光武嚴尤􅀃王邑曰昆陽城小而堅今假號者在宛凾進大兵亟急也紀力切彼必奔走宛敗昆陽自服邑曰吾昔以虎牙將軍圍翟義坐不生得以見責讓翟義字丈仲方進少子爲東郡太守王莽居攝義心惡之乃立東平雲子義自号柱天大將軍以誅莽乃使孫建王邑等將兵擊義破之義士自殺故坐不生得今將百萬之衆遇城而不能下何謂耶遇或謂過也遂圍之數十重列營百數雲車十餘丈雲車即樓車稱雲其髙也昇之以望敵猶墨子云般輸爲雲梯之械瞰臨城中俯視曰瞰旗幟蔽野廣雅曰幟播也埃塵連天鉦鼓之聲聞數百里説丈曰鉦鐃也似鉦或爲地道衝輣撞城衝撞車也詩臨衝閑閑許愼曰輙樓車也輣步耕切又曰黄巾賊起盧植征之連戰破賊張角等走保廣宗植築圍鑿塹造作雲梯垂當拔之帝遣小黄門左豊詣軍觀賊形勢或勸植以賂送豊植不肯豊還言於帝曰廣宗賊昜破耳盧中郎固壘息軍以緩天誅帝怒遂檻車徴植􅀽山松後漢書曰朱儁擊黄巾賊趙弘於南陽斬之賊復以韓忠爲師儁兵力少不能急攻乃先起􅁟山以臨之因僞脩攻具曜兵於西南儁身自􅀍甲將精卒乗其東北遂得入城忠乞降東觀漢記曰􅀄王莽之遣王㝷王邑也欲盛威武以震山東甲衞衝輣干戈旌旗戰攻之具甚盛後㝷邑環昆陽城作營圍之數重雲車十餘丈瞰城中或爲地突或衝車橦城積弩射城中矢如雨下城中􅀒户而汲又曰伯升作攻城􅋐車上曰兵法但有所圖􅀞者不可用伯升遂作後有司馬犯軍令當斬坐闘車上又曰隗􅅝破後有五谿六種㓂侵見便鈔掠退阻營塹來歙乃大治攻具衝車度塹遂與五谿戰大破之又曰呉漢常獨厲吏士治兵事上時令人視呉公何謂還言方脩攻具上曰呉公隠􅀂一敵國矣魏志曰太祖戰不利復壁􅀽紹爲髙櫓起土山射營中太祖乃爲發石車擊紹樓皆破紹爲地道欲襲太祖營太祖輙於内爲長塹以拒之魚豢魏略曰郝昭字伯道守陳倉城爲諸􅁑亮所圍起雲梯衝車以臨城昭以火箭逆射其雲梯梯上之人皆燒死又曰衡山王賜謀反使枚赫陳喜作輣車又曰膠東康王􅀉作樓車戰具以備淮南事及漢治淮南事連􅀉􅀉發病死韋昭呉書曰督將張異攻麻屯敗使將王吉作臨車雲梯尅日攻拔之又曰魏遣曹眞夏尚等到江陵連屯圍城攻擊甚急真等起土山鑿地突樓櫓臨城征北將軍朱然在城中晏然無恐隨形勢立備巧不得施張勃呉録曰黄武二年曹休令臧霜以輕舡敢死萬人襲攻徐陵燒攻城車殺略數千人王隠晉書曰宣帝討公孫淵至襄平遂圍之起土山地道脩櫓鈎橦發石雨下晝夜攻之斬傳其首又曰諸􅁑誕反淮南孟康王墓曰冝作􅁟山斂諸侯材板簿櫓以爲攻具又曰叚匹磾所立代郡太守辟閭嵩與劉琨鴈門太守王處後軍謀殺磾奉琨宻作攻具欲夜襲磾磾兒強取處女爲妾遂以攻具告磾磾遂斬王處辟閭嵩及其徒黨王韶之晉紀曰宋王圍慕容超張繯巧思絶人使爲攻具城上火石弓矢無所用之超黨震懾城内知亡矣晉起居注曰徐道霸蟻聚堅城因山固守今董率諸軍圍塹四合髙撞雲梯三方並攻即日登城斬徐道覇以釁鉦鼔蕭方等三十國春秋曰呉王皓聞師之將興也乃使劉恪守牛渚使張悌造攻車於戯塲又曰劉􅁉攻南燕得燕人張綱治攻具旣成設飛橋懸梯􅀍以牛皮火石不能害攻城之士得肆力焉和范漢趙記曰麟嘉三年太子粲討趙同郭黙於洛陽黙使耿稚等夜北渡河襲太子營飛梯騰柵而入太子勒兵於東北穿柵而出又曰光􅀄二年石勒召幽兾之衆十餘萬人造攻車飛梯攻平陽小城今上遣􅀐萬五千曳柴楊壁曀於山谷㝷汾州向平陽内外擊之勒師潰髙閭燕志曰光始五年春慕容熈與符后征髙麗至遼東爲衝車馳道以攻之崔鴻前凉録曰麻秋晉攻抱罕圍塹數重雲梯抛車地突百道皆通於内亦起雲梯抛車穿地以應之秋衆傷數萬崔鴻後凉録曰將軍竇苟從吕光攻􅀛兹每登雲梯入地道墜落􅂫而復上車頻􅁗書曰苟長圍襄陽作飛雲車攻城尅之沈約宋書曰竟陵王誕據廣陵反丗祖使慶之塞塹造道立行樓土山并諸攻具時夏雨不得攻城上使御史中丞􅁃徽之奏慶官以激之自四月至于七月乃屠城斬誕又曰元嘉二十七年虜主佛狸遂攻圍懸瓠行汝南郡事廣陵陳憲嬰城自守虜多作髙樓施弩以射城内飛矢雨下城中􅀒户以汲又毀佛圗取金像以爲大鈎施之衝車端以牽樓作蝦蟆車以塡塹憲督厲將士固女牆而戰賊死者屍與城等又曰僞燕主慕容超尚書郎張䌉乞師於姚興自長安返太山守申宣執送之䌉有巧思先是帝修攻具城上人曰汝不得張䌉何能爲也及至升諸樓車以示之故城内莫不失色超旣求救不􅀗䌉反見虜乃求稱藩割大峴爲界獻馬千疋不聽又曰十月張䌉修攻具成設飛樓懸梯木慢板屋冠以皮弓矢無所用之劉毅遣上黨太守趙恢以千餘人來援帝夜潜遣軍㑹之明旦恢衆五千方道而進每晉使將到輙復如之六年二月丁亥屠廣固孫嚴宋書曰柳元景等北討諸軍攻具進兵城下僞弘農太守李􅀄古拔嬰城自固諸軍鼔噪陵城衝車四臨數道俱攻先登生擒李􅀄古拔沈休文宋書曰晉安王子勛反以殷琰督䂊州刺史大宋遣輔國將軍劉勔用草茅苞土擲以塞塹城内以火箭射之草未及燃後土續至塹便欲滿隊主趙法進計以鐡殊子灌之珠子流滑悉縁􅂩得入草於是火然勔乃作大蝦蟆車載上牛皮蒙之三百人推以塞塹琰户曹叅軍虞挹之造抛車擊之以石車悉破壞宋起居注曰劉道符露板曰七月二十日部率衆車虎士攻城鉤車至城東南樓下逆賊程天祚等道窮數迫仍乞降附齊書曰殷琰反帝遣輔國將軍劉勔西討之築長圍創攻道於東南角并作大蝦蟆車載土牛皮蒙之百人推以塞壍琰乃始降三國典略曰侯景作尖項木驢攻城石不能破也羊侃作雉尾矩灌以膏臘取擲焚之乃退梁書曰侯景爲曲頂木驢攻城矢石所不能制羊􅋲作短尾炬施鐡鏃以油灌之擲驢上焚之俄盡賊又東西起二土山以臨城城中震駭􅋲命爲地道潜引其土山不能立又作登城樓髙十餘丈欲臨射城中􅋲曰車髙壍虚彼來必倒可卧而觀之及車動果倒衆皆服焉賊旣頻攻不捷乃築長圍朱异張綰議出擊之帝以問偘偘曰不可賊多日攻城旣不能下故立長圍欲引城中降者耳今擊之出人􅀂少不足當賊􅀂多則一旦失利門隘橋小必大致挫衂不從遂使千餘人出戰未及交鋒望風退走果以争橋赴水死者太半矣隋書曰遼東之役何稠攝右屯衝將軍領御營弩手三萬人時工部尚書宇文愷造遼水橋不成師未得濟右屯衝大將軍麥䥫杖因而遇害帝遣稠造橋二日而就􅀄稠製行殿及六合城至是帝於遼左與賊相對夜中施之其城周廻八里城及女垣各髙十仞上布甲士立仗建旗四隅置闕面別一觀觀下三門遟明而畢髙麗望見謂􅀂神功是歳加金紫光禄大夫唐書曰姜礭爲交何道行軍副緫管率衆數千先大軍出伊吾趣柳城谷依山採木造攻城器械其地有班超紀功碑礭磨去其文刋頌國功而去陶公故事曰臣􅋲言郭黙狂狡肆行凶虐􅀒阻城險用稽天誅臣土山陵其城樓櫓攻具備設宋先朝故事曰慕容超大將垣遵踰城帰順髙祖使遵等治攻城橦車築長圍髙三丈外三重壍周􅁶輿服雜事曰轒輼今之橦車也其下四輪從中權之至敵城下又曰漢世祖造大戰車駕數牛上設樓櫓置疆塞之外以拒匈奴酈善長水經注曰交州刺史檀和之軍次區粟進逼城飛梯雲橋懸樓登壘鉦鼔大作風烈火颺城摧衆䧟斬區栗王范扶龍首十五已上坈截無赦太公六韜曰凢三軍有大器攻圍邑有橨榅臨衝城中則有雲梯飛樓又曰凢三軍行師領衆旦則有雲梯逺望夜則有雲火萬炬又曰武王􅃦疾十日太公􅀒王乃駕騖寘之車周旦爲御至于孟津大黄叅連弩大才扶咠車並戰具也飛鳬赤莖白羽以䥫爲首雷影青莖赤羽以銅爲首副也晝則爲光夜則爲星方頭䥫搥重八斤亦軍備也大柯斧重八斤一名鐵鉞軍備也行馬廣二文二十具渡溝飛橋廣五尺轉關鹿盧八具天舡一名天漢以濟丈水也鷹􅀲方㐫䥫把柄長七尺天陣日月斗柄杓左一右一仰背天陣地陣丘陵水泉有左右前後之利人陣車馬文武積楹臨衝攻城圍邑雲梯飛樓視㦲中也武衝大櫓三軍所湏雲火萬炬以防火也吹鳴箛威振万里也太公金匱曰武王問太公今民吏未安賢者未定何以安之太公曰不須兵器可以守國耒耜是其弓弩鋤杷是其矛㦸簦笠是其兠鍪鏁斧是其攻具太公覆車拭法曰諸出軍行將屯營置陳必法天之圎法北辰爲上將角爲衝車訾爲鈇􅃏敵當衝車者敗當鈇􅃏者亂又曰諸出軍行將屯守攻陳設壇祠禱戎器皿塗金鼔神攻具必以斗加四季時令朱雀所居神與今日日上神王相而克莊子曰梁麗可衝城不可以室穴言殊器也墨子曰備衝法絞善麻長八丈内有大樹則擊之用斧長六尺令有力者斬之又曰墨子自齊至郢見楚王楚王曰公輸般爲我雲梯取宋矣墨子乃見公輸般解帶爲城以褋爲械公輸九設攻城之具機變墨子九拒之械盡墨子禦有餘公輸屈曰吾知拒子矣墨子曰子不過欲殺臣臣之弟子禽滑氂三百人巳持臣守禦之器在宋城上而待楚矣又曰禽子問雲梯旣施爲之柰何墨子曰雲梯者重器也矢石沙炭以雨之薪火湯水以濟之如此則雲梯之功敗尸子又載般爲蒙天之階階成將以攻宋墨子請獻十金般曰吾義固不殺人墨子再拜傳子序馬鈞曰鈞石車敵人於樹邊懸濕牛皮中之則墮石不能連属而欲作一輪懸大石數十以機鼔輪爲常則懸石飛擊敵城使首尾電至甞試以車輪懸瓴數十飛之數百歩矣曹植征東賦曰循櫓於清流汜雲梯而容與禽元帥于中舟振靈威於東野陳琳武軍賦序曰廻天軍於易水之陽以討瓉焉鴻溝叅周鹿菰十里荐之以􅁄迺建脩樐于青霄竁深隧下三泉飛梯雲衝神鈎之具不在吴孫之篇三略六韜之術者凡數十事祕莫得聞也乃作武軍賦曰鈎車轇轕九牛轉牽雷呴激折櫓倒垣其攻也則飛梯行臨雲閣虚構上通紫霓下過三壚繁欽爲史叔良作移零陵檄曰金鼔震天丹旗曜野巨堙旣設􅀽宏祖逖碑曰逖爲豫州刺史薨時君柩未旋羣㓂圍城衝櫓旣附城將降矣勇士五百撫戈同泣非祖侯之爲吾誰爲死并力齊赴卷甲宵起遂䧟堅陣負才而反大平御覽卷第三百三十六
