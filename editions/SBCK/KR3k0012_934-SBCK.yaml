front:
  text: 太平御覽卷第九百三十四鱗介部六
  hash: sha256:226275d7bbd21c221a72c154fc3a9c379cf3cd526ffc75a61e4e5150606e7b17
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_934-1a}
body:
  text: 虵下虺虵下風俗通曰車􅀐將軍巴郡馮緄字鴻卿爲議郎發綬笥有二赤虵可長三尺分南北走大用憂怖許李山孫憲得先人秘要緄請使卜云君後三歳當爲邊將東地四五千里官以東爲名後五年爲大將軍南征此吉祥也蜀王本紀曰秦王知蜀王好色乃獻美女五人蜀王遣五丁迎女還梓潼見一大虵入山穴中一丁引其尾不能出五丁共引虵山崩壓五丁玄中記曰東海有虵丘之地衆虵居之無人民多神虵或人頭而虵身又曰崑崙西北有山周廻三萬里巨虵長萬里虵常居此山飲食滄海陳留風俗傳曰小黃縣者宋地故陽武東黃郷也因黃水以名縣沛公起兵野戰䘮皇妣于黃郷天下平定乃使者以梓宮招魂幽野於是丹虵在水自洗濯入于梓宫其浴有遺髮故謚曰昭靈夫人雷次宗豫章記曰永嘉末有大虵長十餘丈斷道經過者輙以氣吸引取之吞噬巳百數行旅斷道道士呉猛與弟子數人徃欲殺虵虵藏深穴不肯出猛符南昌社公虵乃出穴頭髙數丈猛於尾縁背而以足按虵頭着地弟子於後以斧殺之裴淵廣州記曰晉興郡蚺虵嶺去路側五六里忽有一物大百圍長數十丈行者過視則徃而不返積年如此失人甚多董奉從交州出由此嶠見之大驚云此虵也住行旅施符勑經􅀫徃看虵巳死矣左右白骨積聚成丘鄧德明南康記曰南野巘山有漢太傅陳蕃塜墓西岸有廟名曰宫渚昔值軍亂聞墓有三寶軍人爭掘指麾必啓忽大虵圍繞墳前崩雷晦􅀨當時竟不得發宋永􅀄山川記曰興古郡有大蛇名青葱有大蛇名赤頸又曰柴􅄑縣有飛蛇外國圖曰圎丘有不死樹食之乃壽有赤泉飲之不老有大蛇多爲人害不可得居帝遊圎丘以雌黃精厭大虵郭子橫洞􅁳記曰虵璣出塗云國有青靈虵産珠色光白如瓊琰之􅀋愽物志曰蝮虵秋月毒盛無所齧草木以泄其氣草木即死樵採設爲此草木所傷刺者亦殺人又曰地三年種蜀􅁰其後七年多虵廣志曰永昌郡有歧尾虵又蝮虵與土色相亂長三四尺其中人以牙歷之裁斷皮出血則身盡痛九竅血出而死列異傳曰壽光侯者漢章帝時人劾百􅀑衆魅有婦爲魅所病侯劾得大虵又有大樹人止之者死鳥過亦死侯劾樹夏枯有虵長七八丈懸而死捜神記曰魯定公元年有九虵繞柱占以爲九世廟不祀乃立煬宫又曰隋侯行見大虵傷救而治之其後虵銜珠以報之又曰竇武母産武而并虵虵送之林中後母卒及葬未定有大虵自榛草而出赴䘮所以頭繫柩涕血頃而去時人知爲竇氏之祥又曰宋元嘉中廣州有三人共入山中伐木怱見石窠中有三􅆑大如􅂛便取煑之湯始􅀬便聞林中如風雨聲湏􅁷有一虵大十圍長四五丈逕來於湯中衘􅆑而去三人無幾皆死又曰秦瞻居曲阿彭皇野忽有物如虵突入其腦中虵來先聞臰死氣便於鼻中入盤其頭中覺泓泓冷聞其腦間食聲咂咂數日而出去㝷復來取手巾急縳口鼻亦􅀍人積年無他病唯患頭重異苑曰太元中汝南人伐竹見一竹中央虵形巳成上枝葉如故呉郡桐廬民嘗伐餘遺竹見一宿竿成雉頭頸盡就身猶未成此亦竹爲虵虵爲雉也又曰薪野蘓卷常與奴婢居野舎毎至飯時輙有一物來其狀似虵長七八尺五色光鮮卷異而飴之遂經數載産業加焉奴後宻打殺即得能食病日進三斛飯猶不爲飽少時而死又曰丹陽鍾忠以元嘉冬月晨行見有一虵長二尺許丈色似青瑠璃頭有􅀟角白如王忠感而畜之於是資業日登經年虵自亡去忠及二子相繼殞斃此虵來􅁻去㓙其唯龍乎又曰魯國年縣象山上有寺廟今民欲架室者輙見大虵數十丈出來驚人故莫得安焉周景式廬山記曰安侯世髙者安息國太子與友人共出家學道友人好恚怒死受蟒報爲此宮亭廟神世髙於廣州爲人所殺還生安息國復爲王子年二十又棄國入呉之宫亭汨舡過呼友人與語友人身長數十丈見世髙向之胡語竟各分去暮有一少年上世髙舡跪受呪願囚忽不見世髙語同舡人曰向少年即此廟神也得離惡形矣蟒旣見世髙從山南過死山北今桒柴民所居虵里是也幽􅁳録曰㑹稽謝祖之婦初育一男又生一虵長二尺許便逕出門去後數十年婦以老終祖忽聞西北有風雨之聲頃之見一虵長十數丈腹可十餘圍入户遶靈座因至柩所繞數匝以頭打柩目血淚俱出良乆而去又曰㑹稽郡吏鄮音懋縣薛重得假還家夜户閉聞妻床上有丈夫眠聲喚妻乆從床上岀未及開户重持刀便逆問妻曰醉人是誰妻大驚愕因􅀂自申明實無人意重家唯有一户捜索了無所見見一大虵隱在床脚酒臭重便斬虵寸斷擲於後溝經數日而婦死又數日而重卒死經三日復生說始死有人祰將重到一官府見官寮問何以殺人重曰實不曽行凶曰寸斷擲在後溝此是何物重曰此是虵非人府君愕然而悟曰我當用爲神而敢􅁋人婦又妄訟人勑左右召來吏卒乃領一人來着平巾幘具詰其􅁋妻之過將付獄重乃令人送還廣五行記曰􅀳呉興太守􅀽玄瑛嘗之官請郭璞筮􅁻凶璞曰至官當有赤虵爲妖不可殺之後到府果有赤虵在銅虎符凾上蟠玄瑛家人䙤殺之其後玄瑛爲徐馥所害又曰晉安帝義熈末年殷仲文年十三父亡家有大恠有大虵長丈或戴其堂屋或拔其炊釡置地家人棄舎奔散唯仲文居䘮如故然仲文後竟爲宋髙祖所戮又曰陳時呉興顧楷在田上樹取桒葉見五尺大虵入一小穴其從虵相次或三尺或五尺次第相隨略有數百楷急下樹看所入之處了不見有一孔日暮還家楷病口瘂不復得語又曰東光人東方飛龍病甚夢化爲大黒虵以告其妻旣死遂有大黒虵入室上棟間飛龍諸子將殺之其母曰此是爾父諸子不用母言遂殺之即日􅁀􅀨諸子皆震而死前唐景龍文館記曰興慶池者長安城東隅形􅀔之地也中多王侯第宅天后􅀄有居人王純掘地獲黃金百斤致冨官司聞之宻加捜獲純懼投於井中縣官窺之見􅀟赤䖵仰首張吻遂不敢入純以此金當爲巳復入井取之還見赤蛇赫然蟠屈純懼而出其夜井水涌溢漸成此池可廣百餘頃嶺表録異曰南土有金虵亦名錫虵又名地鱓州􅁟出黔中桂州亦有即不及黔南者其虵麁如大指長一尺許鱗甲上有金銀解毒之功不下􅁻利也又曰蚺虵大者五六丈圍四五尺以次者亦不下三四丈圍亦稱是身有班文如故錦纈俚人云春夏多於山林中等鹿過則衘之自尾而吞唯頭角礙於口即􅀷入林樹間閣其首伺鹿壞頭角墜地鹿身方嚥入腹如此後虵極羸弱及其鹿消壯俊恱懌勇徤於未食鹿者或云一年則食一鹿又曰兩頭蛇嶺外多此􅀋時有如小指大者長尺餘腹下鱗紅背錦文一頭有口眼一頭似頭而無口眼云兩頭俱能進退亦謬也昔孫叔敖見之不祥乃殺而􅄟之恐他人見復受其禍南人見之爲常其禍安在呉氏本草經曰虵脫一名龍子單衣一名弓皮一名虵附一名虵筯一名龍皮一名龍單衣楚辭曰蝮虵蓁蓁封􅀌千里􅀓玄神虵銘曰嘉兹虵靈斷而能續飛不湏翼行不假足楊雄客難曰獨不見翠虵絳螭之將登天乎必聳身於蒼梧之淵階浮雲翼疾風而上虺毛詩鴻鴈斯于曰唯虺唯虵女子之祥國語曰呉伐越越王請盟呉王將許之申胥申胥伍子胥曰不可許大夫種勇以善謀將還玩呉國於股掌之上以婉辭順志虺而弗剉爲虵將􅀂之何呉王不聽乃許盟捜神記曰陳留阮士禹傷於虺不忍其痛數嗅其瘡巳而虺成於鼻中任昉述異記曰虺五百年化爲蛟蛟千年化爲龍龍五百年而爲角龍又千年爲應龍楚辭曰雄虺九首儵忽焉在孔融荅路粹書曰朱彭冠賈之徒當世壯士惡相攻能爲國患輕薄劣弱者如兩虺相囓適足還災其身誠無所至太平御覽卷第九百三十四
