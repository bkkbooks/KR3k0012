body:
  text: 皇王部七夏帝禹帝啓帝太康帝仲康帝相有窮后羿寒浞帝少康帝宁帝槐帝芒帝泄帝不降帝局帝廑帝孔甲帝臯帝發帝桀夏帝禹史記曰夏帝禹名曰文命禹之父曰鯀鯀之父曰帝顓頊顓頊之父曰昌意昌意之父曰黃帝帝堯之時洪水滔天浩浩懐山㐮陵下民其咨堯求能治水者群臣四嶽皆曰鯀可治水無狀乃殛鯀於羽山堯崩舜問四嶽曰有能成美堯之事者使居官皆曰伯禹爲司空可成美堯之功舜命禹汝平水土維是勉之禹拜稽首讓於契后稷皐陶舜曰女其徃視爾事矣禹爲人敏給克勤其德不違其仁可親其言可信禹遂與益后稷奉帝命命諸侯百姓興人徒以敷土行山表木定髙山大川禹傷先人之功不成受誅乃勞身焦思居外十三年過家門不敢入陸行乗車水行乗船􅅺行乗橇孟曰橇刑如箕橋行􅅺上如淳曰橇音茅蕝謂以板置􅅺上以通行路也山行乗􅞬徐廣曰􅞬音丘遥反如淳曰􅞬車謂以鐵如錐長半寸施之履下以上山不蹉跌也開九州通九道陂九澤度九山舜崩三年䘮畢禹避舜之子啇均於陽城天下諸侯皆去啇均而朝禹禹於是遂即天子位南靣朝天下國號曰夏后姓姒氏娶塗山氏之女生子曰啓禹東廵狩至于㑹稽而崩帝王丗紀曰伯禹夏后氏姒姓也母曰修巳見流星貫􅄧夢接意感又吞神珠薏苡胷拆而生禹於石紐虎􅈹大口兩􅈹耳叅鏤首戴鈎釣鈐也胷有玉斗足文履巳故名文命字髙宻身九尺二寸長於西羗夷人􅀄禹未登用之時父旣降在疋庶有聖德夢自洗於河觀於河始受圗括地象也圖言治水之意四嶽舉之舜進之堯堯命爲司空繼鯀治水乃勞身勤苦不重徑尺之壁而愛日之寸隂手足胼胝又納禮賢士一沐三握髮一食三吐飡堯美其績乃賜姓姒氏封爲夏伯故謂之伯禹天下宗之謂大禹年二十始用三十二而洪水平年百歳崩于㑹稽因葬㑹稽山隂之南今山上有禹􅃁井祠下有群鳥耘田修紀或云修已未詳河圖握拒起曰帝命伯禹曰告汝九術五勝之常可以克之汝能從之汝師徒將興雒書靈准聽曰有人謂禹也大口耳叅漏足履巳漏空也戌巳土之日故當平水土故以爲名也載成鈐有骨表如鈎鈐懷玉斗懷琁璣玉衡之道或以爲有黑子如玉斗也書曰禹别九州分其所界隨山濬川刋其木深其流任土作貢任其土地所其貢賦又曰正月朔旦受命于神宗受舜終事之命神宗反祖之宗廟言神尊也率百官􅀂帝之初舜􅀄攝帝故事尚書帝命驗曰禹白帝精以星感星金精也脩紀山行見流星意感栗然生姒戎文禹栗然感㒵姒禹氏禹生戎地一名政命尚書旋璣鈐曰禹開龍門導積石决岷山治九貢龍門積石山名貢功也治九州之功又曰禹開龍門導積石岀􅀇珪上刻曰延喜玉受德天錫佩禹切旣成天岀􅀇珪天􅃬之者以徳佩禹有治水功者必佩以􅀇玉尚書中􅃸曰伯禹在庶伯官稱禹號也因爲德謚庶庶人也四嶽師舉薦之帝堯四嶽四方諸侯也師衆也薦進也握括命不試爵授司空禹握括地象天巳命之故不復試以衆官司空於周爲冬卿掌制國之五溝行導水之事伯禹稽首讓于益歸稽首拜頭至手益歸賢者堯臣歸讀曰夔也帝曰何斯􅀂眞何不聽讓之辭斯此也若汝也此汝眞其人出爾命圖示乃天爾汝也禹方讓隱之故言岀汝所天命也圖括地象示讀曰祇祇是也乃天使汝治水非我也伯禹曰臣觀河百靣長人魚身岀曰吾河精也觀河􅀚於河水也授臣河圖帶足入淵河圖謂括地象帶足去也音帶伯禹拜辭禹將行故拜去詩含神霧曰禹之興黒風會紀黑力黒也風風后也並黄帝臣復神伯禹當斯而至也禮曰禹立三年百姓以仁遂焉大戴禮曰宰我曰請問禹孔子曰髙陽之孫鯀之子曰文命敏給克濟其德不回其仁可親其言可信聲爲律身爲度左凖繩右䂓矩履四時據四海平九州戴九天明耳目治天下禮含文嘉曰禹卑宫室垂意於溝洫百榖用成神龍至靈􅀛服玉女敬養天賜妾傳曰禹會諸侯於塗山執玉帛者萬國春秋孔演圖曰天命之見􅀱期門靈􅀛穴庭􅀇龍衘雲靈􅀛虚虎也穴庭者星入太微門􅀇龍水精也衘雲者蓋此召氣也春秋元命苞曰禹之時民大樂其駢三聖相繼故樂名大夏也孝經鈎命决曰命星貫昴脩紀夢接生禹命使之星謂流行之星也遁甲開山圖曰禹㳺於東海得玉碧色長一尺二寸光如日月自昭逹幽􅁳楊雄蜀王夲紀曰禹夲没山廣柔縣人生於石細其地名痢兒畔禹母吞珠孕禹坼堛而生於縣塗山娶妻生子啓紀年曰禹立四十五年語曰子曰禹吾無間然矣孔子惟禹功德之盛也言不能復間厠其間也菲飲食而致孝乎鬼神馬融曰菲薄也致孝􅀑神􅀕祀豊㓗也惡衣服而致美乎黻冕孔安國日損其常服以盛􅀕祀卑宮室而盡力乎溝洫包曰方里爲井井間有溝溝廣四尺十里爲城城中有洫洫􅀷廣八尺也符子曰禹讓天下於竒子竒子曰君言佐舜勞矣鑿山川通河漢首無髮股無毛故舜也以勞報子我生而逸不能爲君之勞矣越絶書曰禹始憂民救水到大越於茅山大㑹計爵有功更名茅山謂之㑹稽及其王矣廵狩大越吴越春秋曰禹案黃帝中經見聖人所記曰在九疑山東南天柱號曰宛委承以文玉覆以盤石其書簡青玉爲字編以白銀禹乃東巡狩登衡山求之卧見赤繡衣男子自稱􅀇夷倉水使者來􅀱禹令禹齋三月更求之禹乃齋三月登宛委山取得書通水經遂周行天下使益䟽記之名曰山海經又曰舜崩禹服䘮三年朝夕號泣形體枯槁面目黎黒十州記曰禹治洪水畢乃乗蹻車到鍾山祠上帝於北阿歸大功于九天禹經諸侯五岳使工刻石識其里數髙下其字科斗書非漢人所了諸名山亦然鬻子曰禹之治天下也以五聲聽門懸鼓鍾鐸磬而置鞀音祧於簨􅙇曰教寡人以道者擊鼔教寡人以義者鼓鍾教寡人以事者振鐸語寡人以憂者擊磬語寡人以獄訟者揮鞀此之謂五聲是以禹嘗據饋而七起日中不暇食於是四海之士皆至隋巢子曰昔三苗大乱天命殛之夏右受之大神降而輔之司禄益食而民不飢司金益冨而國家寳司命益年而民不夭四方歸之莊子曰昔者禹堙洪水親自橾橐耜而滌天下之川服無跋脛無毛沐甚􅀨擳疾風置萬國禹大聖也而形勞天下如此使後世之墨者多以裘􅄄爲衣以􅄚屩爲服日夜不依以自爲極曰不如能此非禹道也不足謂墨孟子曰書曰洚水警余洚水者洪水也書尚書逸篇也水逆行降洞無涯故日洚水洪大也使禹治之禹掘地而注之海驅蛇龍而放之菹水由地中行江淮河漢是也險阻旣逺鳥獸之害人者消然後人得平土而居之堯使禹治洪水通九州故曰掘地而注之海也沮澤生草者也今青州爲澤有草者爲菹水流行於地而去也民下髙就平土故日險阻遠出水去故鳥獸害人者消盡也尸子曰禹長頸鳥喙面皃亦惡天下從而賢之好學也又曰古者龍門未闢吕梁未鑿禹於是䟽河决江十年不闚其家生偏枯之病歩不相過人曰禹歩墨子曰禹葬衣衾三領桐棺三寸􅁑以繃􅀘庚切之下不及泉上不通臭旣葬收餘壤爲壟􅀂叅耕之畒韓子曰禹之王天下也身執木畚以爲民先股無完胈體無生雖臣虜之勞不􅀂於此矣吕氏春秋曰禹年三十未娶行塗山恐時暮失制乃娶塗山女又曰禹南濟乎江黃龍􅀒舟舟中之人恐懼禹仰而􅀏曰受命於天竭力以濟生人受命天也奈何憂於龍焉龍弭耳低尾而逃又曰昔者禹一沐而三握髮一食而三起以禮有道之士通乎巳之不足通乎巳之不足則不與物爭矣又曰禹之决江水也民聚瓦礫及其事巳成功巳立爲萬世利禹之所見者逺也而民莫之知賈􅁩書曰禹常晝不暇食而夜不暇􅃦方是時憂務民也淮南子曰昔者鯀作三仞之城諸侯倍之禹知天下叛之乃壞城平地散財物禁甲兵施之以德海外賔服四夷納職又曰禹沐􅁋雨櫛疾風决江䟽河鑿龍門闢伊闕修彭蠡之防乗四載隨山刋木平治水土定千八百國夙興夜寐以致聦明輕賊薄歛以寛民力布徳施惠以振困窮吊死問疾以養􅀌霜百姓親附政令流行又曰禹爲水以身解於陽旰之河解禱也陽旰河在秦又曰堯之時天下大水禹身執畚鍤以爲民先䟽河而導九攴攴分鑿江而通九路辟五湖而定東海又曰禹之趨時冠挂而不頋履遺而不取冠有所桂着去不暇頋視非爭其先也爭得其時也􅀃苑曰禹見罪人下車問而泣之左右曰夫罪人不順道故然焉君王何爲痛之至於此也禹曰堯舜之民皆以堯舜之心爲心今吾爲君百姓皆以其心爲心是以痛之抱扑子曰禹乗二龍郭攴爲馭黄帝􅀇女兵法曰禹問於風后曰吾聞黄帝有􅀒勝之圗六甲隂陽之道今安在乎風后對曰黄帝藏㑹稽之山下其坎􅀷千丈廣千尺鎮以盤石致難得也禹北見六子問海口所出禹乃决江口鳴角㑹稽龍神爲見玉匱浮禹乃開而視之中有天下經十二卷禹未及持之其四卷飛上天禹不能得也其四卷復下陂池禹不能極也禹得中四卷開而視之及魏陳王曹植夏禹賛曰于嗟夫子拯丗濟民克卑宫室致孝􅀑神􅂼食薄服紱冕乃新厥德不回其誠可親亹亹其德温温其仁尼稱無間何德之純又禹治水賛曰嗟夫夏禹寔勞水功西鑿龍門䟽河導江梁歧旣闢九州以同天賜􅀇圭奄有萬􅀖又禹渡河賛曰禹濟于河黃龍乗船舟人並懼禹歎仰天子受天運勤功恤民死亡命也龍聞弭身􅁃信禹渡江賛曰二江􅀄鑿九谷新成風飛蠲涌水起龍驚樂天知命無待憂生危舟遂静亂檝還平帝啓歸藏曰昔夏后啓筮享神於大陵而上釣臺枚占皐陶曰不􅁻史記曰昔夏后啓筮乗龍以登于天枚占于臯陶臯陶曰􅁻而必同與神交通以身爲帝以王四卿又曰啓禹之子其母塗山氏之女也扈氏不服啓伐之大戰於甘誓遂㓕有扈氏天下咸歸山海經曰大樂之野夏后啓於此舞九代馬乗兩龍雲蓋三層左手操翳右手操瓌珮玉横在大運山北一曰大道之野帝王世紀曰啓升后十年舞九韶三十五年征河西又曰帝啓一名建一名余德教施于四海貴爵而上齒養國老於東序養庶老於西序在位九年年八十餘而崩矣越絶書曰禹崩啓立曉知王事達君臣義吕氏春秋曰夏后伯即啓也與有扈戰於甘澤而不勝六卿請復之夏后伯曰不可吾地不淺吾民不寡我而不勝是吾德薄而教不善也於是乎處不重席食不貳味琴瑟不張鍾鼓不脩子女不飾親親長長尊賢使能朞年而有扈氏服故欲勝人者必先自勝矣帝太康書曰太康尸位以逸豫滅厥德黎民咸貳乃盤遊無度畋于有洛之表十旬不反有窮后羿距于河厥弟五人御其母以從徯于洛之汭五子咸怨述大禹之戒以作歌其一曰皇祖有訓民可近弗可下皇君也君祖禹有訓戎也近謂親之下謂失之者也民惟􅀖夲夲固􅀖寕言人君當國民以安國也予視天下愚夫愚婦一能勝予言能敬畏小民所也得衆心一人三失怨豈在明不見是圖三失過非一也不見是謀備其微予臨兆民懔乎􅀂朽索之馭六馬十万曰億十億曰兆言多也懍色貌朽腐也朽腐之索御六馬言危懼甚爲人上者奈何不敬能訓則不驕在上不驕則髙而不危其二曰訓有之内作色荒外作禽荒作爲也迷乱曰荒色女色禽鳥獸甘酒嗜音峻宇彫牆甘嗜無厭足也峻髙大彫飾盡有一于此未或不亡此六者棄徳之君有其一必亡况兼有乎其三曰惟彼陶唐有此冀方陶唐帝堯氏都冀州統天下四方今失厥道亂其紀綱乃厎滅亡言失堯之道乱其法制白致滅亡其四曰明明我祖萬􅀖之君有典有則貽厥子孫典謂經籍則法貽遺也言仁及後丗􅀜石和鈞王府則有荒墜厥緒覆宗絶祀金鐵銀石供民器用通之使和平則官民足言古制有而太康失其業以取亡其五曰鳴呼曷歸予懐之悲曷何也言思而悲萬姓仇予予將疇依鬱陶乎予心顔厚有忸怩弗愼厥德雖悔可追言人君行巳不愼其德以速滅敗欲改悔其可追及乎言無益也帝王丗紀曰太康無道在位二十九年失政而崩帝仲康書曰惟仲康肇位四海㣧侯命掌六師羲和廢厥職酒荒于厥邑㣧后承王命徂征羲和廢其職官還其私邑以酒迷乱仲康命㣧侯掌六師徃就其邑討之帝相紀年曰帝相即位處啇丘元年征淮夷二年征風夷及黄夷帝王丗紀曰帝相一名相安自太康巳來夏政凌遟爲羿所逼乃徙啇丘依同姓諸侯斟灌斟㝷氏羿遂襲帝號是爲羿帝有窮后羿帝王丗紀曰羿有窮氏未聞其姓其先帝嚳以世掌射故於是加賜以弓矢封之於鉏爲帝司射歷唐及虞夏至羿學射於􅁻甫其辭佐長故亦以善射聞與吴賀北遊使羿射雀左目羿引弓射之誤中左目羿俯首而愧終身不忘故羿善射至今稱之及有夏之衰羿自鉏遷于窮石因夏民之不附以代夏政逼篡帝位故號窮氏傳曰昔有夏之方衰也后羿自鉏遷于窮石因夏民以代夏政恃其射也不脩民事而􅁋于原獸棄武羅伯囚熊髠尨圉四子皆羿之賢臣而用寒浞土捉反寒浞伯明氏之䜛子弟也伯明后寒棄之夷羿收之信而使之以爲巳相浞行媚于内而施賂于外愚弄其民而娱羿于田樹之詐匿以取其國家内外咸服羿猶不悛將歸自田家衆殺而烹之以食其子食羿子其子不忍食諸死于窮門殺之於國門靡奔有鬲氏靡夏遺臣事羿者有鬲國名浞因羿室生澆五叫反及豷音處恃其䜛匿詐僞而不德于民使澆用師滅斟灌及斟㝷氏二國夏同姓諸侯仲康之子后相所依處澆于過處豷于戈過戈二國名靡自有鬲氏收二國之燼以㓕浞而立少康少康滅澆于過后杼滅豷于戈后杼少康子有窮由是遂亡寒浞帝王世紀曰寒浞有窮氏旣篡羿位復襲有窮之號浞因羿之室生澆及豷多力能陸地盪舟浞使奡率師滅斟灌斟㝷氏殺夏帝相於過㓕豷於戈恃其詐力不䘏民事􅀄夏之殺帝相也妃有仍氏女曰后緍方娠逃岀自竇歸于有仍生少康焉􅀄夏之遺臣曰靡事羿羿死逃奔有鬲氏收斟㝷二國餘燼殺寒浞而立少康帝少康傳曰昔有過澆殺斟灌以伐斟鄩澆寒浞子封於過滅夏后相后緍方娠逃出自竇后緍相妻也娠懷身也歸于有仍生少康焉爲仍牧正牧官之長澆使椒求之逃奔有虞爲之庖正虞思於是妻之以二姚思有虞君也自以二女妻少康姚姓也而邑諸綸綸虞邑也有田一成有衆一旅方十里爲成五百人爲旅能布其德而逃其謀兆始也以收夏衆撫其官職遂滅過戈復禹之績祀夏配天不失舊物魏髙貴郷公少康漢髙論曰少康生於滅亡之後降爲諸侯之􅀠﨑嶇逃難僅以身免能布其德而兆其謀卒滅過戈克復禹績非至德弘仁豈濟斯勲漢祖因土崩之勢專任智力以成功業爲子則數危其親爲君則囚繫賢相身没之後社稷幾傾􅀂典少康易時而處或未能復大禹之績矣又論曰三代之世任德濟勲如彼之難􅁗項之際任力成功如此之昜且太上立德其次立功就令漢祖功髙未􅀂少康盛德之茂也帝宁直吕反紀年曰帝宁居原自遷于老王帝王世紀曰帝宁一號后予或曰公孫曼能率禹之功夏人報􅀕之在位十七年帝槐紀年曰后芬立四十四年帝王世紀曰帝芬一名帝槐或曰祖武在位二十六年帝芒紀年曰后芒即位元年以􅀇珪賔于河東狩于海獲大魚后芒陟位五十八年帝王世紀曰帝芒一名和或曰帝芒帝泄帝王世紀曰帝泄一名帝世或曰泄宗在位十六年帝不降紀年曰不降即位六年伐九苑五十九年其弟立是爲帝局帝王世紀曰帝不降一名帝降或曰北成北字或作江字帝局帝王世紀日帝􅈰一名帝禺或曰髙陽在位二十一年帝廑音近紀年曰帝廑一名胤甲即位居西河天有祅孽十日並岀帝王世紀日帝廑一名頊或曰董江在位二十年帝孔甲傳曰昭二十九年秋龍見于絳郊皆魏獻子問於蔡墨曰古者國有豢龍氏有御龍氏及有夏孔甲擾于有帝擾順也其德能順於天帝賜之乗龍河漢各二四頭爲乗各二乗十六頭各有雌雄史記曰帝孔甲立好方術􅀑神事􅁋亂夏后氏德衰諸侯叛之天降龍二有雌雄孔甲弗能食未得豢龍氏陶唐旣衰其後有劉累學擾龍于豢龍氏以事扎甲孔甲賜之姓曰御龍氏漢書曰孔甲作盤盂銘三十六篇列仙傳曰師門爲夏孔甲龍師孔甲不能修其心意殺而埋之外野一旦風􅀨迎之記則山木皆焚孔甲祠而禱之未還而道死吕氏春秋曰夏后孔甲甞于東陽薲音頻山天大風晦孔甲迷入民室主人方乳乳産也咸言后來是良日子誰敢殃之長成人幕動折撩斧破斬足遂爲守者以其無足爲守門之官乃作破斧之歌帝臯紀年曰后昊立三年帝臯也帝王世紀曰帝臯一名臯茍帝發紀年曰后發一名后敬或曰發惠其子立爲桀帝桀歸藏曰昔桀伐唐而枚占於營營或曰不􅁻不利岀征唯利安處彼貍爲䑕書曰伊尹相湯伐桀升自陑遂與桀戰于鳴條之野尚書帝命驗曰桀失其玉鏡用其噬虎玉鏡喻清明之道噬虎喻暴虐之風尚書帝命􅀱曰夏桀無道殺􅀜龍逢絶滅皇圖壞亂暦紀皇天也紀綱紀也天之圗暦龍逢引以諫桀也殘賊天下刑法峻也賢人遁逃避時虐也􅁋色慢易男女無别不事祖宗韓詩外傳曰桀爲酒池可以運舟糟丘足以望十里家語曰夏桀昆吾斬刈􅀺民如草木焉天下討之如疋夫史記曰自孔甲以來諸侯多叛夏桀不務德而虐傷百姓百姓不堪廼召湯而囚之夏臺巳而釋之湯修德諸侯皆歸湯湯遂率兵以伐夏走鳴條逐放而死紀年曰后桀命扁伐山民山民女于桀二人曰琬曰琰桀愛二人女無子焉斵其名于􅀂華之玉苕是琬華是琰而棄其元妃于洛曰妺喜桀傾宮飾瑶臺作瓊室立玉門湯遂滅夏桀逃南巢氏自禹至桀十七世有王興無王用歳四百七十一年帝王世紀曰帝桀􅁋虐有才力能伸鈎索鐡手摶熊虎多求美女以充後宫爲瓊室瑶臺金柱三千始以瓦爲屋以望雲􅀨大進侏儒倡優爲爛漫之樂設竒偉之戯縱靡靡之聲日夜與妺喜及宮女飲酒常置妺喜於膝上妺喜好聞裂繒之聲桀爲發裂繒以順適其意以人駕車肉山脯林以爲酒池一鼓而牛飲者三千餘人醉而溺水以虎入市而視其驚伊尹舉觴造桀諌曰君王不聽群臣之言亡無日矣桀聞折然啞然嘆曰子又祅言矣天之有日由吾之有民日亡吾乃亡也兩日􅋐蝕􅀑呼於國桀醉不窹湯來伐桀以乙夘日戰于鳴條之野桀未戰而敗績湯追至大涉遂禽桀於焦放之歷山乃與妺喜及諸嬖妾同舟浮海奔于南巢之山而死􅀶物志曰夏桀之時爲長夜飲居􅀷宫中男女雜處三旬不出不聽政太公六韜曰桀時有瞿山之地桀十月鑿山陵通之於河民有諌者曰冬鑿地穿山是發天之隂泄山之氣天子後必敗桀以袄言殺之管子曰桀女樂三萬人晨譟聞於衢服文繡衣裳莊子曰桀之治天下也使天下人瘁瘁焉人苦其性是不愉也墨子曰昔夏桀貴爲天子冨有天下勇力之人生裂兕虎指畫殺人王孫書曰桀紂爲君徙愚妾之言違長者之諌衣温而忘百姓之寒食羙而忘天下之飢或身放南巢或頭縣赤旗斯亦無他也但不節財而暴民也尸子曰伯夷叔齊餓死首陽無地故也桀放於歴山紂殺於鄗宮無道故也有道無地則餓有地無道則亡又曰昔者桀紂縱欲長樂以苦百姓珍恠逺味必南海之葷北海之鹽西海之菁東海之鯨此其禍天下亦厚矣又曰昔夏桀之時至德滅而不楊帝道掩而不興興舉也客臺振而掩覆客臺行禮客之室言不能行禮故天大振勤而覆敗犬成羣而入泉言將滅壤犬失其主故噑入淵一􅀃犬禍彘衘藪而席隩彘衘晨席入人隩内言彘禍美人婢首墨面而不容婢首亂頭也萃興髪并編爲婢首不修容飾也㬅聲吞炭内䦨而不歌㬅聲見世衰亂將滅故吞炭自敗音聲􅐬氣而不歌飛鳥鎩翼走獸决蹄鍛翼殘翼決致蹇也言桀無道田獵鳥獸悉􅀍創殘翼廢脚山無峻幹澤無佳水峻幹羙材佳水清水言入山澤不以時故又曰桀爲琁室瑶臺象廊玉牀琁瑶石之次玉也象才廊室也權天下虐百姓於是湯以革車三百乗伐于南巢南巢盧江居巢收之夏宫天下寜定百姓和輯譙周法訓曰桀紂雖有天子之位而無一人之譽也猶朽木枯樹逢風則仆也􅀽子正書曰桀紂有民左億右億之衆四岳三塗之險京山中南之固及在鳴條之野一朝而失天下符子曰桀觀炮烙於瑶臺謂龍逢曰樂乎龍逢曰樂桀曰觀刑曰樂何無惻怛之心焉逢曰天下苦之而君爲樂臣爲君股肱熟有心恱而股肱不恱乎桀曰聽子諌諌得我功之不得我刑之龍逢曰臣觀君冕非冕也冕危石也臣觀君履也非履也履春冰也未有冠危石而不壓蹈春冰而不䧟桀歎曰子知我之亡而不自知亡子就炮烙之刑吾觀于亡知我不亡龍逢行歌曰造化勞我以生休我以炮烙乃赴火而死禹至桀合十九帝淮南子曰桀之力剔觡伸鈎觡角索鐡椎移大戯大􅃧軍之大旗水殺黿鼉陸捕熊羆然革車三百乗困之嗚條鳴條今陳州平丘地禽之焦門太平御覽卷第八十二
