body:
  text: 地部十三南楚諸山静山驚磯山黄鶴山烽火山雞翅山闔閭山印山朔山望夫山翠屏山九宫山角山鍾臺山武昌山樊山西塞山白雉山鳯栖山神人山南昌山松門山馬當山釣磯山雞籠山五女山射的山石印山龍虎山羊山羅霄山鍾山望鳯山昌山石室山黃唐山儲潭山赤石山螺亭石山上洛山空山金雞山峽山梓潭山柴侯峽官山君山盤固山歸美山莫巨山五章山麻山鄧公山明府山鶴嶺山石虹山洪崖山静山江夏圖經曰静山在縣東南一百一十里其山廻聳無連接曲澗清流茂林髙峻可以息諸仁智拪遊羽客故名静山驚磯山江夏圖經曰在縣東九十里其山無連接西南俯臨大江下有石磯波濤迅急啇旅驚駭故以爲名黃鶴山江夏圖經曰在縣東九里其山斷絶無連接舊傳云昔有仙人控黃鶴於山因以爲名故梁湘東王晉安寺碑云黃鶴從天之夜響是烽火山江夏圖經曰烽火山在縣東北四十里梁典云梁武征齊頓軍於此舉烽火相應故名烽火山雞翅山江夏圖經曰雞翅山在縣南八十里昔有金雞飛集此故名雞翅山舊記云金水有金雞從雞翅山向南飛産金於此水故名金水闔閭山武昌記曰昔闔閭與伍子胥屯衆於此山爲城故曰闔閭山史記曰闔閭九年子胥伐楚又春秋云子胥將兵破楚掘平王之墓皆屯軍於此山印山武昌記曰奉新縣有渚石臨水髙三十丈上有字髣髴似印故曰印山輿地志云縣西有石臨水髙三十丈有書字爲印山此即是也朔山武昌記曰朔山有竹長一十餘丈圍數尺常有聲天將􅀨此竹鳴焉今無此竹望夫山輿地記曰望夫山上有望夫石石上曽生蕪菁遂以名山上有石髙三丈形如女人謂之望夫石又記曰武昌郡奉新縣北山上有望夫石狀􅀂人立者今古慱云昔有貞婦其夫從役逺赴國難擕弱子餞送於此山旣而立望其夫乃化爲石因以爲名焉翠屏山輿地志曰江水入富池一百八十里得奉新上流三百里有城山三面壁立一面峻極水是奉新大源本名石城山天寳五載改爲翠屏山九宫山武昌記曰九宫山西北陸路去州五百八十里其山晉安王兄弟九人造九宫殿於此山遂以爲名角山武昌記曰天欲雨其山有聲如吹角以此爲名鍾臺山武昌記曰鍾臺山在縣東南一百里上有桃花洞洞側有李邕讀書之所荒基遺址石室花木猶在上有一石室臺上有一名鍾或時鳴響遠近皆聞故名鍾臺山武昌山續捜神記曰晉武世宣城人秦精常入武昌山採茗遇一毛人長丈餘引精至山曲示以藂茗而後去俄而復還乃探懐中橘遺精怖􅀒茗而歸樊山江夏圖經曰樊山西陸路去州一百七十三里岀紫石英山東數十歩有岡岡上甚平敞青松緑竹常自蔚然其下有水溪凛凛然常有寒氣故謂之寒溪有磻龍石謝玄暉詩云樊山開廣宴是也又干寳捜神記云樊山􅀂天旱以火燒山即致大雨今往往有驗武昌記曰樊山孫權常獵於下見一姥問獵得何物荅曰只獵得一豹曰何不堅其尾言訖忽然不見權於後立廟祀之西塞山江夏風俗記曰西塞山髙一百六十丈周廻三十七里峻崿撗江危峯断岸長波所以東注髙浪爲之西飜􅀽宏東征賦云㳂西塞之峻崿是也又江表傳云劉勲敗於彭澤走之入楚江聞晥巳没遂投西塞白雉山江夏圖經曰白雉山其山上有芙蓉峯前有師子嶺後有金雞石西金南岀銅􅑭自晉宋梁陳巳來常置立炉治烹煉鳯栖山江夏圖經曰鳯栖山西北陸路去州二百二十五里呉建興年中鳯皇降此山因以爲名山有石鼓鼓鳴則雨降神人山暦帝記曰神人山呉建衡二年有神人乗白鹿從此山岀因爲名神人山南昌山豫章圖經曰南昌山者昔呉王濞鑄錢之山時有夜光遥望如火以爲銅之精光梁氏十道志云以豫章有銅山山中有洪井飛流懸注其深無底是也山有洪崖先生錬藥之井亦號洪崖山有石曰存焉松門山䂊章圖經曰松門山者以其山多松遂以爲名北臨大江及彭蠡湖山上有石境光明照人謝靈運入彭蠡湖口詩云攀崖照石境牽葉入松門是也馬當山九江記曰馬當山髙八十丈周􅅆四里在古彭澤縣北一百二十里其山横枕大江山象馬形􅅆風急擊波浪涌沸舟舡上下多懷憂恐山際立馬當山廟以祠之釣磯山異苑曰釣磯山者陶侃嘗釣於此山下水中得織梭一枚還掛壁上後化成赤龍從室而去其山石上猶有侃迹存焉雞籠山郡國志曰江州雞籠山山上有石雞冠距如生有道士李鎭住此山下常賞翫之雞一旦自毀鎭曰雞旣如此吾其終乎果卒五女山郡國志曰江州五女山始皇死五女葬此山天昏毎聞筝笛之聲射的山郡國志曰射的山者古老相傳云上有玉在石壁内南面遥望似有白處曽有胡人來取上山後遇風雨不果得今逺望頗似射侯故名射的焉石印山呉志曰天璽元年鄱陽郡言歷陵山石有文理成字巫言石印神有三郎皓遣使以大牢祭并印綬拜三郎爲王又按江氏記云歷陵有石印山臨水髙百丈有七穿駢羅穿中色黄赤相續因謂之石印山龍虎山信州圖經曰龍虎山在貴谿縣二山相對谿流其間乃張天師得道之山羊山宋永􅀄山川記曰啇安縣西有羊山山有燃石黄白而理麄以水灌之便􅀬􅀂石炭以鼎置之烹煑可熟羅霄山王孚安成記曰萍郷羅霄山澤水所岀水傍岀石乳天旱吏人禱之因以大木長三四丈投井中即􅀨水懸湊井溢輙令木涌岀而雨止蓋潜龍之穴也以陽居隂神精上通故扣之而必有玄感則蜀都賦云應鳴鼓而興雨者也鍾山裴子野宋略曰永嘉元年鍾山因洪水有鍾從山流岀時人得之送上驗銘云是秦時樂器因以爲名又按成記云鍾山臨水阻峽春夏則湍洑涌沸濆上白沙如米兩岸石上各九十餘里以之􅀱歳􅀂一岸偏饒則其方豊穰民以爲準望鳯山冝春圖經曰望鳯山在州西北七十里上有一峯逺觀似鳯以此爲名昌山冝春圖經曰昌山在州東六十里舊名傷山周廻連延一十八里􅀽江流於其間巨石枕﨑潺激舟人上下多傾覆故名傷山顧野王輿地記云時人以傷爲非善徴乃改爲昌山石室山冝春記曰郡有石室山山有數石室相連髙十餘丈皆相似素壁􅀂雪萬像森羅於其所因以爲名黄唐山輿地志曰贑縣黃唐山有石室如數千間屋上通天䆫下有方榻者二石人巾櫛而坐傍有小石室七所相通悉有石人室前時有車馬跡春夏草不生無諸毒蟲林木繁茂水石幽絶盖靈仙窟宅也山下居毎丙日輙聞山室有茄鼓簫樂之音鄧德明記云有石子如彈丸聚在山角至丙日不復見他日復有其山獨立髙一千三百丈相傳以石室呼爲黄唐廟因以名焉儲潭山南康記曰儲潭山俯臨清潭有儲君廟因以名焉輿地志云咸和二年刺史朱偉所立常有漁者釣於此潭得金􅃈縈引舟中向數百丈忽一物隨瑣而來其形如水牛眼赤角白及見人驚駭拽走而漁者以刀断得數尺不知其所由然也赤石山南康記曰赤石山大石連聳粲􅀂舒霞山角多赤石有玉房瓊室耆舊相傳云宋元嘉年中有人自稱安道士者不知何許人披服巾􅄄栖於此山中數十年忽失所在其後有人時復見者天寳六年勑改爲玉房山螺亭石山南康記曰螺亭山有大石臨水號曰螺亭云昔有貧女暮宿於亭採螺忽夜中見衆螺張口亂噉其肉貧女乃死其伴因殯水傍其冢化爲巨石螺殻無數號曰螺亭石山上洛山輿地志曰䖍州上洛山多木客乃􅀑􅀋也􅄱似人語亦如人遥見分明近則藏隱能斫杉枋聚於髙峻之上與人交市以木易人刀斧交􅀜者前置物枋下却走避之木客㝷來取物下枋與人隨物多少甚信直而不欺有死者亦哭泣殯葬嘗有山行人遇其葬日岀酒食以設人山中有石墨可書空山南康圖經云空山晉咸康五年太守􅁃恪於山西麓中建立神廟歷代祈雨最有靈應按郡國志云空山在郡南山多林木果實食物一郡皆資此山雖名空山其出物百倍於他山金雞山南康記曰金雞山臨貢水石色如霞其傍有穴廣四尺一石正當穴口如彈丸嘗有金雞岀入此穴晋義熙中再三出見有人挾彈放丸於穴口化爲石其雞至今不見因號曰金雞穴宋永初中又見捿翔於此峽山南康記曰峽山上時有夜光飛熖遥見若火炤燎于原從峽泝流數十里有石臨水名曰蛟窟天寳六載勑改名夜光山梓潭山南康記曰梓潭山有大梓樹吴王令都尉蕭武伐爲龍舟槽斫成而牽引不動占云湏童男女數十人爲歌樂乃當得遂依其言以童男女牽拽糟没于潭中男女皆溺其後天晴朗浄髣髴􅀂見人舡焉夜􅀫潭邊或聞歌唱之聲因號梓潭焉柴侯峽南康記曰柴侯峽山漢靈帝時有劉叔喬避地於兹死葬村側自云柴侯墓晋末䘮亂有發其􅊘者忽有大風雨棺及松栢悉飛渡水移上此峯其棺乃化爲石因是而名之官山南康記曰官山者天寳六年改名珠玉山其山髙峻有善鳥香草嘗有人於此山見大珠玉相傳謂之官山君山南康記曰君山翠麗鮮明遥􅀂臺􆇍名曰媧宫亦曰女姥石山去盤固山五十里上有玉臺方廣數十丈上有自然石室􅄱風雨之後景氣明静頗聞山有鼓吹之聲盤固山南康記曰盤固山有石井井側有大銅人常守之按此石井五百年水一湧起髙數丈銅人以手掩之其水即止其山盤紆峻嶒因號爲盤固山焉歸美山南康記曰歸美山髙數百丈逺望嵯峨靈闕騰空故老謂之神闕其山有水岀焉西面嶮峻自然有石城髙數十丈周廽三百歩又有石峽左右髙五六十丈勢􅀂􅀟闕其狀入雲復有古石室色如黃金號爲金室有鸀鳥形色鮮絜自愛毛羽其􅃗者或鑒水向影悲鳴自絶方知􅀌鸞對鏡爲不虛矣山頂有杉枋數百片髙危懸絶非人力所及焉莫巨山荀伯子臨川記曰巖内有石人坐盤石上體有塵穢則興風雨洗訖晴日遍體絜朗如玉瑩浄民以爲準焉五章山荀伯子臨川記曰五章山絶巖嶮峭有宻蜂依之爲房其形如笠採者皆懸磴數十丈然後獲之麻山荀伯子臨川記曰麻山或有登之者望廬岳彭蠡皆在其下有黃連厚朴􅁪生焉又有楓樹及數千年者如人形眼􅈹口全而無臂脚入山往往見之或斫之者皆岀血人以籃冠其頭明日看輙失籃俗名楓子􅀑其山竹木稠宻如麻因名麻山天寳六年職方奏改名豊材山焉鄧公山信州圖經曰鄧公山在縣北本名銀山因鄧逺爲鄧公場儀鳯二年􅀕山山頽䧟焉按開山記云揔章二年邑人鄧逺經刺史豆盧公陳開山之便㝷爲山䧟後人立鄧公廟焉明府山信州圖經曰明府山在縣東其山乆晴不雨山或自鳴必有大雨乆雨不晴欲晴自有煙霧蓋其頭古老相傳祈請有驗鶴嶺山信州圖經曰鶴嶺山自貴溪縣界崗阜鱗次北入縣境嶺上多松樹有鶴窠因得名爲鶴嶺山石虹山鄱陽記曰石虹山有石室中有石砥平如床可容置數百人旁列石鄣如屏風􅂐書爲八十三字有撗石跨水而渡文彩青赤􅀂虹蜺因名爲石虹山洪崖山䂊章記曰按舊經云古老相傳昔有洪崖先生者居此山上故以爲名又列仙傳云洪崖山者山之陽有洪唐寺山中有洪崖壇每亢旱禱於此太平御覽卷第四十八
