front:
  text: 太平御覽卷第八百七十四咎徴部一
  hash: sha256:1f82483e1a3a2a5a27834f50a3042861ed4b5498f4913abfe2a889e4a141843f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_874-1a}
body:
  text: 叙咎徵天天裂天開天光天崩天鳴四時叙咎徴易曰履霜堅冰至文言曰積善之家必有餘慶積不善之家必有餘殃又曰􅁻凶悔吝生乎動者也尚書洪範曰咎徴曰狂􅁪雨􅀂僣􅁪陽􅀂豫􅁪燠􅀂急􅁪寒若蒙􅁪風若左傳曰􅀄内虵與外虵闘於鄭南門之中内虵死六年而厲公入公聞之問於申繻曰猶有妖乎對曰人之所忌其氣􅆋以取之妖由人興也人無㸑焉妖不自作人弃常則妖興故有妖易是􅀋謀曰斗機絶綱玉衡撥攝提亡鄭玄注曰斗機絶綱斗者天中之精天失其平故斗機絶綱玉衡撥也攝提者斗前之星爲斗施政教布之八野今斗失其正故攝提亦爲之亡不見五星合狼弧張晝視無日虹蜺煌煌夜視無月彗孛蔣蔣此皆屬乾乾多爲天失其主故著天者皆失其正也當藏者出當出者消危處易期當藏者岀解晝視無日虹蜺煌煌也當岀者消解夜視無月也是爲危處易期太山失金雞西岳亡玉羊太山失金雞者箕星亡也箕者爲風風動雞鳴今期侯者亡故雞亦亡西岳亡玉羊者狼星亡狼在於未爲羊也天卑地髙雷讙公行天下雷同讙譁公行無所畏也星晝奔蜺夜光上無乾下無常天昧昧履踐氷上無乾乾氣不正故下無常天地昧昧喻不正也晝視無日夜視無月何明之有乎履踐氷者峻急之法行􅀍其刑也民衣霧主吸霜民衣霧侫政行􅀍其毒也主吸霜􅀍隂毒將害躬也間可􅀝杵於何藏解上天卑地髙天地相去其間才可􅀝一杵耳或言枚其意同不知夏不知冬不見父不見兄所以然者以天卑地髙髙卑列故卑以父兄尊爲子弟也望之漠漠視之茫茫羣黨假威岀坐玉牀小人羣黨假王者威權坐於玉牀者王之牀也尚書大傳曰田獵不􅀫飲食不享出入不節奪民農時及有姦謀則木不曲直弃法律逐功臣殺太子以妾爲妻則火不炎上好治宫室飾臺榭内􅁋亂犯親戚侮父兄則稼穡不成好攻戰輕百姓飾城郭侵邊境則金不從革簡宗廟不禱祠廢􅀕祀逆天時水不潤下又曰爰用五事建用皇極一曰貌貌之不恭是謂不肅厥咎狂厥罰常雨厥極惡時則有􅀛孽時則有雞禍次二曰言言之不從是謂不乂厥咎僣厥罰常陽厥極憂時則有妖妭時則有介蟲之孽時則有大禍次三曰視視之不明是謂不哲厥咎恭厥罰常燠厥極疾時則有草妭時則有倮蟲之孽次四曰聽聽之不聦是謂不謀厥咎急厥罰常寒厥極貧時則有鼓妭時則有豕禍次五曰思思之不容是謂不聖厥咎霧厥罰常風厥咎㐫短折時則有脂夜之妭時則有華孽時則有牛禍王之不極是謂不建厥咎霧厥罰常隂厥極弱時則有射妭時則有龍虵之孽時則有馬禍時則有日月亂行星辰逆行洪範五行傳曰凢有所害謂之災無所害而異於常謂之異故災爲巳至異爲方來家語孔子曰天災地妭所以儆人主也寤夢徴怪所以儆人臣也災妭不勝善政怪夢不勝善行六韜曰武王伐殷得二丈夫而問之曰殷國之將亡亦有妖災乎其一人對曰有殷國嘗􅀨血雨石大者如甕小者如箕嘗六月雨雪深尺餘其一人對曰是非殷國之大妭也殷國之大妭四十七章殷君喜殺人喜以人飴虎喜割人心喜殺孕婦喜殺人之父􅀌人之子喜刑禍喜以信欺欺者爲忠忠諌者不賞以君子爲下小人爲上以佞辯爲相子爲政急令􅁀取萬民愁苦好田獵畢弋走狗飾馬喜脩池臺宫七十有三所大宫百里善爲酒池糟丘而牛飲者三千人喜聽䜛用譽無功者賞無尺丈無錙銖無秤衡無功賞無罪誅此殷國之妭也白虎通曰災異者何也災之爲言傷也隨事而誅異之爲言怪也先發感動何以言災者有所害也說苑曰趙簡子問於翟封餘曰吾聞翟雨䖟榖三日雨血三日馬生牛牛生馬信乎曰信簡子曰災足亡國乎封曰雨䖟􅂖三日䖟風之所飄也雨血三日鷙鳥擊於上也馬生牛牛生馬􅄂收也此非翟之災也簡子曰然則翟之妖奚也對曰其君㓜弱其大臣比黨以求禄其百官肆断而無常其政令不竟而數改此其妖也京氏別對災異曰五􅂖無實何君無仁徳臣懷叛戻華飾虚舉薦賢實不相副内爲􅂫􅁗之行外以夷齊之語故致五􅂖多無實朝無賢害氣傷穡不救國大飢其救也選明經舉茂才改徃脩來退去貪狼施恩行惠賞賜勞臣此災乃銷矣天左傳宣下曰天反時爲災又曰定公元年曰諸侯之大夫城成周三旬而畢乃歸諸侯之成齊髙張後不從諸侯晉女叔寛曰周萇弘齊髙張皆將不免萇弘違天天旣厭周徳萇弘欲遷都以延其祚故曰違天髙子違人天之所壊不可支也衆之所爲不可奸也爲哀三年周人殺萇弘六年髙張來魯天裂哀氏易妖占曰天裂陽不足下害上之象天裂見人兵起國亡天開見光流血滂滂晉書曰惠帝元康中天西北裂時人主昬闇賈后專政又曰大安中天裂爲二聲如雷是時長沙王奉帝出拒成都王頴河間王顒迭威專命僣亂之象又曰成帝咸和四年冬天裂西北時蘇峻之子以萬人入吴興天下有兵􅀜中轉亂明年石勒僣位又曰穆帝昇平五年天裂廣數丈聲如雷又曰哀帝􅀄即位天中裂黄三四丈聲如雷野雉皆雊時帝荒疾不識萬機太后臨朝桓温專政崔鴻十六國春秋曰前趙劉曜建元􅀄天裂廣一丈長五十餘丈時四方交戰隋書曰梁武帝太清中天裂西北長十丈闊二丈光出如電聲如雷明年侯景䧟臺城天開漢志曰惠帝二年天開東北長二十餘丈廣十丈後有吕后廢二少帝諸吕作亂蕭子顯齊書曰齊東昬侯永元中夜天開黄色明照頃有物絳色如小甕漸大如倉􅅒聲如雷墜太湖野雉皆雊其年東昬見廢隋書曰陳後主至徳􅀄天開西北至東南其内有黄􅄂色聲如雷後年章大寳舉兵反陳竟國亡天光書紀年曰周昭王末年夜有五色光貫紫微其年王南廵不退漢書曰成帝元延元年四月無雲有雷聲光四下至昏乃止晉穆帝永和十年前凉張祚之元年正月夜天有光如車蓋明年祚􅀍殺宋書曰文帝元嘉十八年七月天有黄光洞燭至二十二年太子詹事范曄反伏誅天崩崔鴻十六國春秋曰後涼麟嘉五年天崩有聲􅀂雷乆之乃止又曰前趙劉聦麟嘉三年天崩聲􅀂雷乆乃止是歳聦死天鳴京氏易妭占曰天有懸車之聲人主憂又曰易傳曰萬民勞厥妭天鳴晉書曰武帝末天東有聲如雷又曰元帝太興元年天鳴東南有聲如風水相薄三年天又鳴其後王敦入石頭王師敗績元帝屈辱制於強臣隋書曰梁武帝天􅁥時有聲如雷二是歳交州刺史李凱舉兵反後年又西北隆隆有聲如雷赤氣至地是歳盗殺東莞琅邪太守中大通年西南有聲如雷其年北凉州刺史簡欽反崔鴻十六國春秋曰前凉張駿時晉建興十七年八月天有大聲下震地孟池縣人夜怪室如晝時起視見西北開有門光明照地至二十二年遜于重華又曰南燕六年天鳴是年桓玄廢其主自立稱大楚又曰前􅁗符堅建元十四年天鼓鳴至二十年堅爲姚萇所殺隋書曰北齊文宣天保年中天西南有聲如雷時帝不恤國政大興師旅又曰後主武平末年後主東遁至青州是日西方有聲如雷是月爲周師所擒又曰周宣帝建徳年天西北有聲如雷未幾吐谷渾大㓂邊又曰陳宣帝太建十二年天有聲如風水相擊三夜乃止又曰後主􅀄即位八月天有聲如風水相擊俄又如之九月夜天東北有聲如䖝飛漸移西北至徳元正月天東南有聲如䖝飛後降於隋隋書曰開皇二十年四月天有聲如㵼水自南而北六月􅁗王俊薨河圖稽命徴曰帝劉即位百七十年大隂在庚辰江充詭其變天鳴所坼四時禮記月令曰孟春行夏令則雨水不時草木早落國時有恐行秋令則人有大疫猋風暴雨揔至藜莠蓬蒿並興行冬令則水潦爲敗雪霜大摯首種不入仲春行秋冬則其國大氷寒氣揔至㓂戎來征行冬令則陽氣不勝麦乃不熟民多相掠行夏令則國乃大旱煖氣早來䖝螟爲害季春行冬令則寒氣時發草木皆肅國有大恐行夏令則人多疾疫時􅀨不降山陵不収行秋冬則天多沉隂􅁋雨早降兵革並起孟夏行秋令則苦雨數來五􅂖不滋四鄙入保行冬令則草木早枯後乃大水敗其城郭行春令則蝗虫爲災􅁀風來格秀草不實仲夏行冬令則雹凍傷􅂖道路不通􅁀兵來至行春令則五􅂖晩熟百螣時起其國乃饑行秋令則草木零落果實早成民殃於疫季夏行春令則榖實鮮落國多風欬民乃遷徙行秋令則丘隰水潦禾稼不熟乃多女災行冬令則風氣不時鷹隼早鷙四鄙入保孟秋行冬令則隂氣大勝介䖝敗􅂖戎兵乃來行春令則其國乃旱陽氣復還五穀無實行夏令則其國多火災寒􅀬不節民多瘧疾仲秋行春令則秋雨不降草木生榮國乃有恐行夏令則其國大旱蟄蟲不藏五榖復生行冬令則風災數起􅀵雷先行草木早死季秋行夏令則其國大水冬藏殃敗民多􅍠嚏行冬令則國多盗賊邊境不寧􅁟地分裂行春令則煖風來至民氣懈惰師興不居孟冬行春令則凍閉不宻地氣上洩民多流亡行夏令則國多􅁀風方冬不寒蟄䖝復出行秋令則霜雪不時小兵時起土地侵削仲冬行夏令則其國乃旱氛霧􅁳􅁳雷乃發聲行秋令則天時雨汁􅀲瓠不成國有大兵行春令則䖝蝗爲敗水泉咸竭民多疥癘季冬行秋令則白露早降介䖝爲妭四鄙入保行春令則胎天多傷國多固疾命之曰逆行夏令則水潦敗國時雪不降水凍消釋太平御覽卷第八百七十四
