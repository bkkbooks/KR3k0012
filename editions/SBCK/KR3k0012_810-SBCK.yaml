front:
  text: 太平御覽卷第八百十珎寳部九
  hash: sha256:60e504e029eea587f214ff55432f5be1e1c64cd63c51c5cbdd2464352170a3a4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_810-1a}
body:
  text: 金中東觀漢記曰郭况遷爲大鴻臚上數幸其第賞賜金帛京師號況家爲金穴言其冨貴謝承後漢書曰豫章張載字仲宗爲廣陵太守舉孝子呉奉爲孝㢘奉賫金爲禮載閇門不受奉以囊盛投載園中而逝載追不及賫金至廣陵還奉又曰雷義字仲公常濟人死罪者後以金二斤謝之義不受金主候義不在嘿投金於承塵上後葺治屋得金主巳死義乃以付縣曹張璠漢記曰永昌太守鑄黄金之虵献之梁兾益州刺史种暠發其事後漢書曰中興􅀄有應嫗者生四子而寡見神光照社試探之乃得黄金自是諸子宦學並有才名至㻛七代通顯又曰益州金銀之所出魏略曰田豫爲并州胡宻懷金三十斤曰以此上公張䄂受之荅其厚意胡去之後皆悉付外具狀聞於是詔褒之曰昔魏絳開懷以納戎今卿舉䄂以受狄金朕甚嘉焉又曰大􅁗國出金織成帳也魏志曰繁昌縣授禪石碑中生金表送上羣臣盡賀蜀志曰先主平蜀賜諸􅁑亮等金數百斤王隱􅀳書曰永嘉􅀄陳國項縣賈逵石碑中生金人盗鑿取賣賣巳復生此江東之瑞也又曰咸寜三年起居注載燉煌郡上釜銅生金中百陶不消可以切玉又曰鄱陽樂安出黄金鑿土十餘丈披沙之中所得者大如豆小者如􅆝米南郡象林南有四國皆稱漢人貢金供稅􅀳後略曰載賈后以鹿車詣金墉城飡金屑而死晉書曰清河王覃􅀄爲清河丗子所佩金鈴歘生隱起如麻粟者祖母夲陳太妃以爲不祥毀而賣之占者以金是􅀳行大興之祥覃爲皇胤是其瑞也毀而賣之象覃見廢不終之驗也晉永和起居注曰廬江太守路永表言於􅂖城北見水岸邊紫赤光得金一枚文如印齒宋書曰禇彦回爲吏部尚書有人求官宻䄂中將一餅金因求清閑出金示之曰人無知者彦回曰卿自應得官無假此物􅀂必見與不得不相啓此人大懼収金而去彦回叙其事而不言其名時人莫之知也南史曰南海扶南國王諸農死子陽邁立陽邁􅀄在孕其母夢生兒有人以金蓆籍之其色光麗夷人謂金之精者爲陽邁中國云紫磨者因以爲名宋永􅀄二年遣使貢献以陽邁爲林邑王宋書曰齊武帝常至劉悛宅晝卧􅁴悛自捧金澡灌受四􅂛以沃盥因以與帝齊書曰金車王者至孝則出金人王者有盛德則游於後池林邑有金山金汁流於浦又曰梁武帝於襄陽起兵蕭頴胄以荆州應焉時長沙寺僧鑄黄金爲龍數千兩埋土中歴相傳付稱爲下方黄鐵頴胄因取此龍以充軍實梁書曰武陵王紀鎭蜀旣東下黄金一斤爲一餅百餅爲簉至百簉銀五倍之其他錦􅄢稱是每戰則懸金以示將士終不賞賜又曰廬陵王續之子應不惠王薨至庫内閱珎物見金鋌問左右曰此可食不荅曰不可應曰旣不可食並㹅乞汝南史曰林邑國有山皆赤色其中生金金夜則出飛狀如螢火又曰甄法崇之孫彬有行業郷黨稱善甞以一束䇡就州長沙寺庫質錢後贖䇡還於䇡束中得五兩金以手巾裹之彬得送還寺庫道人大驚云近有人以此金質錢時有事不得舉而失擅越乃能見還輙以金半仰酬徃復十餘彬堅然不受詠曰五月披羊裘而􅀒薪豈拾遺金者耶卒還金梁武帝布衣而聞之及踐祚以西昌侯藻爲益州刺史乃以彬爲府録事叅軍帶郫縣令將行同列五人帝誡以㢘愼至彬獨曰卿昔有還金之美故不復以此言相屬由此名德益彰陳書曰歐陽頠在嶺南交州刺史􅀽曇綬密以金五百兩􅀉頠令以百兩還合浦太守龔爲四百兩付兒智矩餘人弗之知頠㝷爲蕭㪍所破貲財並盡唯所􅀉金獨存曇緩亦㝷卒至是頠並依信還之時人莫不歎伏之崔鴻十六國春秋後趙録曰建武元年十一月不􅀨雪至二年八月􅂖價湧貴金一斤直米二􅂛又前燕録曰汜昭字嗣先燉煌人辟州主簿志在理枉申滯人有於夜中報昭黄金者昭責而遣之後魏書曰趙柔字元順甞在路得人所遺金珠一貫價直百縑柔呼主還之又曰孫􅁤字元慶爲諸軍司馬太武平赫連昌引諸帥入其府藏各令任意取金玉諸將取之􅄹懷􅁤獨不取帝把手親探金賜之謂之曰卿臨財廉朕所以増賜者欲顯廉於衆人又曰叚揮自慕容璝歸魏太武至長安人告暉欲南奔云置金於馬韀中帝宻遣視之果如告者斬之於市又曰李安丗爲主客令毎有江南使至多出藏内珎寳令都下冨室好容服者貨之令使任情交易時齊劉纉至金玉肆問價纉曰北方金玉太賤當是山川所出安丗曰聖朝不貴金玉所以同於瓦礫又皇上德通神明地不愛寳故川無金山無玉纉􅀄將大市得安丗言慙而罷又曰副貨國城周匝七十里國王有黄金殿殿下有駞七頭髙三尺又曰拔豆國出金銀河鈎羗國出金珠北史齊李㓜㢘少寡欲爲兒童時􅀄不從家人所求請故甞以金寳授之終不取強付輙擲之地後爲南青州刺史主簿徐乾富而􅁀横歴政不能禁㓜㢘􅀄至因其有犯収繫之乾宻通䟽奉黄金百挺奴婢二十人㓜㢘不受遂殺之北史隋獻皇后山陵後帝賜楊素金鉢一實以金銀鉢一實以珠隋書曰上賜王公巳下射楊素箭爲第一上手以外國所献金精盤價直鉅萬以賜之唐書曰太宗謂侍臣曰水旱不調皆爲人君失德朕德不修天當責朕百姓何罪而尚多窮困聞有鬻男女者朕甚愍焉於是遣御史大夫杜淹廵􅀜内諸州出御府金寳贖還父母又曰開元中杜暹爲監察御史徃西覆屯蕃人賫金以遺暹因辭不受左右以不可失蕃人之情暹受而埋於幕下旣出境乃移牒令収取之又曰德宗詔曰朕聞王者不責逺物所寳惟賢故堯設茅茨禹卑宫室光武捨去寳劒順帝封還大珠朕仰企前王思齊太素邕州所奏金坈誠爲潤國語人於利非朕素懷方以不貪爲寳惟德其物豈尚兹難得之貨生其可欲之心耶其金坈任人採斸官不得占又曰貞元元年四月南詔王異牟㝷與其酋長定計遣使趙莫羅眉由南安使凡三軰致書於韋臯各賫生金丹砂爲贄三分前臯所與牟㝷書各持其一爲信歳中三至京師且曰牟㝷請歸大國永爲藩巨所献生金以喻向化之意堅如金也丹沙示其赤心耳上嘉之乃賜牟㝷詔書又曰韋執􅁩時爲翰林學士受賕爲人求科第夏卿不應執􅁩乃􅊥懐中出金以内夏卿䄂夏卿驚曰吾與􅀂頼先人德致名位幸各已達豈可如此自毀壞擺䄂而去執􅁩大慙又曰路隨爲翰林學士乃兼金紫有以金帛謝除制者必比之曰吾以公事接私賄耶終無所納管子曰玉起於禺氏山金起於汝漢珠起於赤野此寶相去各七千里湯以杜山之金以贖民之賣子者禹以歴山之金贖賣子者江陽之珠天下一美上有丹砂下有黄金上有慈石下有銅金上有陵石下有鈆錫上有赭下有鐡􅁑盧山發而出金􅃖尤取以爲劒鎧雍狐山發而出金􅃖尤取以爲㦸楚有汝漢之黄金晏子曰景公爲履黄金之綦僅能舉之列子曰齊人有鬻金者清旦衣冠之市適鬻金者之所因攫其金而去吏捕得之問曰人皆在焉子攫人之金何故對曰取金之時不見人徒見金魯連子曰􅁗圍趙邯鄲魏使將軍新垣衍入邯鄲令趙尊􅁗爲帝魯連子􅀃罷之􅁗軍退平原君以千金爲先生壽􅀏曰􅀂即有取啇賈之事連不忍爲也莊子曰今大冶鑄金金踊躍曰我且必爲鏌鎁大冶必以爲不祥之金又曰以瓦注者巧以黄金注者昏所要重則心矜又曰至仁無親至信辟金金玉小信之質耳至信則隆又曰金石有聲不考不鳴也韓子曰荆南麗水之中生金又曰魯丹三􅀃中山之君而不受也因散五十金事其左右復見未語而君與之食魯丹出不及舎遂去中山其御曰交乃始善我何故去之魯丹曰夫以人言善我必以人言罪我未出境而公子惡之曰爲趙來間中山君因索而罪之又曰張譴相韓病將死公乗無正懷三十金而問之其疾居一月公自問張譴曰君子死將誰使代子荅曰無正法而畏上雖然不如公子食我之得民也張譴死因相公乗無正又曰荆王弟在􅁗􅁗不出也中尉之士曰資臣百金臣能出之因載百金之􅀳見叔向曰荆王弟在􅁗􅁗不出也請以百金委之叔向受金而見平公曰可以城壷丘矣平公曰何以對曰荆王弟在􅁗􅁗不出是􅁗荆惡也必不敢禁我城壷丘􅀂禁之我曰爲我出荆王之弟吾不城也彼如出之可以得禁彼不出是卒惡也不敢禁我城壷丘矣曰善乃城壷丘謂􅁗公曰爲出荆王之弟吾不城也􅁗因出之荆王大􅀃以錬金百鎰遺之墨子曰昔夏使飛廉折金於山鑄昆吾鼎成而方不炊自烹不舉自藏不遷自行以􅀕昆吾之墟其兆繇曰蓬蓬白雲一南一北一東一西九鼎使成遷三國夏失殷受殷失周受孟子曰齊王以兼金一百遺孟子兼金好金也列子曰夏華殷謂湯曰渤海之東不知幾億萬里有大壑中有山一曰岱輿二曰方壷三曰貟嶠四曰􅌡洲五曰蓬萊其上髙觀皆金闕淮南子曰玦五百歳生黄澒五百歳生黄金黄金千歳爲黃龍玦石也中央數五故五百歳一化澒音胡貢反澒黄金水銀也􅁗以一鎰爲一金而重一斤漢以一斤爲一金又曰舜藏金千斤於嶄巖之山所以塞貪鄙之心又曰子極溺者金玉不􅀂得㝷常纆傳子曰懸千金於市人不敢取者分定矣委一錢於路童子争者分不定矣抱朴子曰合金液用古稱黄金一斤都合用四十萬而成一劑可令八人仙也其次餌黄金一斤可得地仙又内篇曰山中亥日稱人字者金玉知其物則不能爲害又曰呉景帝時戍將於廣陵掘一大冡棺中人靣如生兩耳及􅈹孔中皆有黄金大如􅀥許此假物不朽之效也太平御覽卷第八百一十
