  text: 太平御覽卷第六百二十
  hash: sha256:3ae343e7aff8649fcf1bd170f1188a611fb82d9552368941c150f60e4c196ae4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_620-1a}
body:
  text: 治道部一君爾雅曰林烝天帝皇王后辟公侯君也易師卦曰大君有命開國承家尚書泰誓曰嗟我友􅀖冢君越我御事庶士明聽誓惟天地萬物父母惟人萬物之靈亶聦明作元后元后作民父母又曰洪範曰惟辟作福惟辟作威惟辟玉食毛詩曰天保下報上也君能下下以成其政臣能歸美以報其上焉禮記禮運曰禮者君之大柄也政者君之所以藏身子思曰人主自􅆇則衆謀不進事是而􅆇之猶却衆謀况知非以長乎夫不察事之是非而恱人之讃巳闇莫甚焉不度理之所在而阿䛕求容謟莫甚焉君闇臣謟以居百姓之上民弗與也􅀂此不巳國無􅀋矣荀恱漢紀論曰有王主有治主有存主有衰主有危主有亡主體正性仁心明志固動以爲人不以爲巳是謂王主克巳恕躬好問力行動以從義不以從情是謂治主勤居守業不敢荒怠動以先公不以先私是謂存主情義交争公私並行一得一失不純道度是謂衰主情過其義私多於公制度踰限政令失常是謂危主親用邪䜛放逐忠賢縱情追欲不顧禮度岀入游放不拘儀禁賞賜行禮以越公用忿怒施罰以踰治理遂非文過知而不改忠言壅塞直諌誅戮是謂亡主故王主能致興平治主能脩其政存主能保其國衰主遭無難則庶幾得全茍有難則殆矣危主遭無難則幸而免有難則亡亡主者必亡而巳矣白虎通曰君者群也群下之所歸心管仲曰地之生財有時民之用力有倦而人君之欲無窮以有時與有倦養無窮之君而度量不生於其間則上下相疾也鄧析書曰君有三累臣有四責何謂三累親所信一累也以名取士二累也近故䟽親三累也何謂四責受重賞而無功一責也居大位而不治二責也爲理而不平三責也御軍陳而奔背四責也君無三累臣無四責可謂安國家也又曰爲君者當􅀂冬日之陽夏至之隂萬物歸之莫之使也偃卧而功自成優㳺而政自治又曰爲君者滅形匿影群下無私掩目塞耳萬民恐震循名責實案法立成是謂明主孟子曰君視臣如手足臣視君如腹心君視臣如犬馬臣視君如國人君視臣如土芥臣視君如㓂讎孫卿子曰君舟也庻人水也水能行舟亦能覆舟又曰君者義也義正則君正君者盤也水者民也盤方則水方盤貟則水貟君者源也水者流也源清則流清源濁則流濁鬼谷子曰事聖君有聽從無諌争事中君有諌諍無謟䛕事􅁀君有􅀘削無矯拂又曰君得名則群臣恃之君失名則群臣欺之尸子曰孔子謂子夏曰汝知君子乎子夏曰魚失水則死水失魚猶爲水也孔子曰商汝知之又曰日在井中不能燭逺日在足下不可以視君之有國猶天之有日居不髙則不明視不尊則不逺韓子曰晉平公問叔向齊桓公九合一匡君之力臣之力叔向稱管仲隰明之力師曠曰君壤地也臣草木也壤地美然後草木碩亦君之力臣何力之有焉又曰勢者君之輿也威者君之䇿也臣者君之馬也民者君之輪也􅀔固則輿安威定則䇿勁臣順則馬良人和則輪利而爲國皆失此有覆輿走馬折䇿敗輪矣又曰爲人君者猶壷也民亦水也壷方水方壷圎水圎吕氏春秋曰魏文侯燕飲皆令諸大夫論巳或言君仁或言君義或言君智至任座曰君不肖君也得中山不封君弟而封君之子是以知君不肖文侯不恱座趍而起次及翟璜曰君賢君也其主賢者其臣之言直今座之言直是以知君賢也又曰善爲君者蠻夷反舌皆服俗淳也水泉深則魚鼈歸之人君賢則豪傑赴之又曰君者仁義以治之愛利以安之忠信以道之務除其災致其福故人之於上也􅀂璽之於塗也抑之以方則方以圎則圎􅀂五種之地必應其􅀋而蕃息百倍此五帝三王之所以無敵也又曰古之王者其所爲少其所爲少因者君術也爲者臣道也爲則擾矣因則静矣因冬爲寒因夏爲暑君奚事焉故曰君道無爲又曰昔太古甞無君其民聚生群處知母不知父無親戚兄弟夫妻男女之別無上下長㓜之道無進退揖讓之禮無衣服履帶宫室畜積之便無器械舟車城郭險阻之備此無君之患故臣之義不可不明也自上丗以來天下亡國多矣而君道不廢者天下利之也又曰齊桓公染於管仲鮑叔晉文染於舅犯郭偃荆莊王染於孫叔敖沈尹承呉闔閭染於伍貟文之義越句踐染於范蠡大夫種此五君者所染當故覇諸侯范􅁻射染於張栁朔王生中行寅染於籍秦髙強呉夫差染於王孫雄太宰嚭智伯瑶染於智國張武申尚染於魏義偃長宋康王染於唐鞅田不禮此六君者所染不當故國皆殘亡身或死辱爲君非爲君而因榮也非爲君而安也以爲行理也又曰先王用非其有如已之有通乎君道者也君者處虚素服而無智故能使衆智也無能故能使衆能也能執無爲故能使衆爲也無智無能無爲此君之所執又曰鄭君問於􅀍瞻曰聞先生之義不死君信有之乎􅀍瞻對曰有之夫言不能聽道不能行則固不事君也􅀂言聽道行又何死亡故􅀍瞻之不死亡賢於死亡也又曰豫讓欲報襄子其友謂之曰子之所道甚難而無功謂子有志則然矣謂子智則不然以子之材而索事襄子索求襄子必近子子得近之而行所欲此甚易而功必成豫讓􅀏而應之曰是爲先知報後知也爲故君賊新君矣大亂君臣之義也子無失吾所爲矣凢吾所爲此者所以明君臣之義也非從易也淮南子曰君根夲也臣枝葉也根夲不善枝葉茂者未聞也有道之丗以人與國無道之丗以國與人以賢人而與之國堯舜是也以國與人桀紂與湯武是也說苑曰晉平公問於師曠曰人君之道奈何師曠曰人君清静無爲務在於􅀶愛趣在任賢開耳目以察萬方不溷溺於俗不拘繫於左右廓然逺見倬然獨立屢省考績以臨臣下此人君之操也平公曰善新序曰趙襄子問於王子維曰呉之所以亡者何也對曰呉君恡而不忍襄子曰冝哉呉之亡也恡則不能賞賢不忍則不能罰姦賢者不賞有罪不罰不亡何待潜夫論曰凢人君之治莫大於和隂陽夫隂陽者以天爲夲天心順則隂陽和天心逆則隂陽乖天以民爲心民安樂則天心順民愁苦則天心逆抱朴子曰清玄剖而上浮濁黄判而下流尊卑等威於是乎著曩聖取諸兩儀而君臣之道立設官分職而雍熈之化隆君人者必脩諸已以先四海去偏黨以平王道遣私情以樹至公昭德塞違庸親昵賢使規盡其圎矩盡其方矣太平御覽卷第六百二十
