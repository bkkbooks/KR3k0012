front:
  text: 太平御覽卷第五百九
  hash: sha256:e97b374108d036b1ea08c5c1156ee9ca1bdc4cbf9280121341402b6c0ff8ae5f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_509-1a}
body:
  text: 逸民部九逸民九皇甫士安髙士傳曰嚴遵字君平蜀人常賣卜成都市日得百錢以自給卜訖則閉肆下簾以著書爲事楊雄少從之遊數稱其德李強爲益州牧喜曰吾得君平爲從事足矣雄曰君可備禮與相見其人不可屈也王鳯請交不許歎曰益我貨者損我神生我名者殺我身故不仕時人服之又曰鄭朴字子真修道静黙丗服其清髙大將軍王鳯以禮聘之遂不屈楊雄法言盛稱其德曰谷口鄭子真耕於嚴石之下名振京師馮翊人刋石祠之至今不絶又曰李弘字仲元蜀人居城都之圭里里中化之班白不􅀒擔男女不錯行弘嘗爲縣令郷人共送之元無心就行因共酣飲月餘不去刺史使人喻之仲元曰夲不之官惟楊雄重之曰不夷不惠居於可否之間又曰鄭玄字康成北海髙宻人也學孝經論語兼通京氏公羊春秋三正暦九章筭術周官禮記左氏春秋大將軍何進辟􅀇州郡迫脅不得巳而詣進設机杖之禮以待玄􅀇以幅巾見進一􅀫而逃去公府前後十餘辟並不就又曰任安字定祖少好學隱山不營名利時人號安曰任孔子連辟不就建安中讀史記魯連傳歎曰性以㓗白爲治情以得志爲樂性治情得體道而不憂彼棄我取與時而無爭遂終身不仕號曰任徴君又曰管寧字㓜安靈帝末以中國方亂乃舉其友邴原渉海依遼東太守公孫度度虚館禮之其後中國少安人多南歸唯寜不還黄􅀄中華歆薦寧寧知公孫淵必亂乃因徴辭還以爲太中大夫固辭不就寧凢徴命十至輿服四賜常坐一木榻上積五十年未嘗箕琚榻上當􅂰皆穿常着布裙貉裘唯祠先人乃着舊布單衣加首絮巾遼東郡圖其形於府殿號爲賢者又曰胡昭字孔明棄妻子不應􅀽紹之命武帝亦辟昭昭自陳夲志帝曰人各有志出處不同勉卒髙尚義不相屈昭乃隱陸渾山中又曰焦先字孝然丗莫知其所出或言生漢末及魏受禪常結草爲廬於河之湄獨止其中冬夏􅃝不着衣卧不設席又無草蓐以身親土其體垢汙皆如泥滓不行人間或數日一食行不由邪徑目不與女子迕視口未甞言雖有驚急不與人語後野火燒其廬先因露􅃦遭冬雪大至先􅃝卧不移人以爲死就視如故後百餘􅀊卒􅄞康髙士傳曰子州友父者堯舜各以天下讓友父友父曰我適有勞憂之病方治之未暇在天下也又曰石户之農不知何許人與舜爲友舜以天下讓之石户夫􅀒妻戴携子以入海終身不反又曰伯成子髙不知何許人也唐虞時爲諸侯至禹復去而耕禹徃趍而問曰昔堯治天下吾子立爲諸侯堯授舜舜授予吾子去而耕敢問其故何耶子髙曰昔尭治天下至公無私不賞而民勸不罰而民畏今子賞而不勸罰而不畏德自此衰刑自此作夫子盍行無留吾事偘偘然遂復耕而不顧又曰卞隨務光者不知何許人湯將伐桀因卞隨而謀曰非吾事也湯遂伐桀以天下讓隨隨曰后之伐桀謀於我必以我爲賊也而又讓我必以我爲貪也吾不忍聞乃自投桐水又讓務光光曰廢上非義殺民非仁無道之丗不踐其土况於尊我哉乃抱石而沉廬水又曰小臣稷者齊人抗厲希古桓公三徃而不得見公曰吾聞士不輕爵禄無以易萬乗之主萬乗之主不好仁義無以下布衣之士於是五徃乃得見焉又曰亥唐晉人也髙恪寡素晉國憚之雖􅂼食菜羹平公毎爲之欣飽公與亥唐坐有間亥唐出叔向入平公伸一足曰吾向時與亥子坐腓痛足痺不敢伸叔向悖然作色不恱公曰子欲貴乎吾爵子子欲冨乎吾禄子夫亥先生乃無欲也吾非正坐無以飬之子何不恱哉又曰㳙子齊人餌术接食甚精至三百年後釣於河澤得鯉魚中符後隱於宕石山能致風雨告伯陽九仙法淮南王少得其文不能解其旨又曰商容不知何許人也有疾老子曰先生無遺教以告弟子乎容曰將語子過故郷而下車知之乎老子曰非謂不忘故耶容曰過喬木而趍知之乎老子曰非謂其敬老耶容張口曰吾舌存乎曰存曰吾齒存乎曰亡知之乎老子曰非謂其剛亡而弱存乎容曰嘻天下事盡矣又曰􅀜令尹喜周大夫也善内學星辰服食老子西遊喜先見氣物色遮之果得老子老子爲著書因與老子俱之流沙西服巨勝實莫知所終又曰康市子者聖人之無欲者也見人爭財而訟推千金之璧於其旁而訟者息又曰狂接輿楚人也耕而食楚王聞其賢使使者持金百鎰聘之曰願先生治江南接輿􅀏而不應使者去妻從市來曰門外車馬迹何深也接輿具告之妻曰許之乎接輿曰冨貴人之所欲子何惡之妻曰吾聞至人樂道不以貧易操不爲冨改行受人爵禄何以待之接輿曰吾不許也妻曰誠然不如去之夫􅀒釡甑妻戴絍器變姓名莫知所之嘗見仲尼歌而過之曰鳯􅀆鳯􅀆何德之衰徃者不可諫來者猶可追後更名陸通好飬性在蜀峨嵋山上丗丗見之皇甫士安髙士傳曰陸通字接輿楚昭王政亂乃陽狂不仕故曰接輿也又曰榮啓期者不知何許人也披裘帶索鼓琴而歌孔子曰先生何樂也對曰天生萬物唯人爲貴吾得爲人是一樂也以男爲貴吾得爲男二樂也人生有不免於襁褓吾行年九十五矣是三樂也貧者士之常死者民之終居常以待終何不樂也又曰長沮桀溺者不知何許人也耦而耕孔子遇之使子路問津焉長沮曰夫執輿者爲誰子路曰是孔子是魯孔丘歟曰是也曰是知津矣問於桀溺桀溺曰子爲誰曰仲由孔丘之徒歟對曰然曰與其從避人之士豈􅀂從避丗之士哉耰而不輟子路以告孔子孔子憮然曰鳥獸不可與同群吾非斯人之徒歟又曰荷篠丈人不知何許人也子路從而後問曰子見夫子乎丈人曰四體不勤五榖不分孰爲夫子植其杖而耘子路行以告子曰隱者也使子路反見之至則行矣又曰顔闔者魯人也魯君聞其賢以幣聘焉闔方服布衣自飲牛使者問曰此顔闔家耶曰然使者致幣闔曰恐聽誤而遺使者羞使者至復來求之闔乃鑿坯而遁又曰市南冝僚楚人也姓熊白公爲亂使石乞告之不從承之以劒而遼弄丸不輟魯侯問曰吾學先王之道勤而行之然不免於憂患何也僚曰君今能刳形洒心而遊無人之野則無憂矣又曰太公任者陳人孔子圍陳七日不火食太公徃吊之曰子幾死乎夫直木先伐甘井先竭子其飾智以警愚修身以明汙昭昭如掲日月而行故汝不免於患也孰能削迹􅂢勢不爲功名者哉無責於人人亦無責焉孔子曰善辭其交遊廵於大澤入獸不亂群而况人也又曰漢隂丈人者楚人也子貢適楚見丈人爲圃入井抱甕而灌用力甚多子貢曰有機於此後重前輕名曰拮槹用力寡而見功多丈人作色曰聞之吾師有機事者必有機心機心存於􅅐則純白不備子貢愕然慙不對有間丈人曰子奚爲曰孔丘之徒也丈人曰子非􅀶學以疑聖智獨絃歌以買聲名於天下者乎方且亡汝神氣墮汝形體何暇治天下乎子徃矣勿妨吾事又曰延陵季子名札呉王之子㝡少而賢使上國還㑹闔閭使專諸刺殺王僚致國於札札不受去之延陵終身不入呉國􅀄適魯聽樂論衆國之風及過徐徐君欲其劒札心許之及還徐君巳死即解劒帶樹而去又曰范蠡者徐人也相越滅呉去之齊號鴟夷子治産數千萬去止陶爲朱公復累巨萬一日蠡事周師太公服桂飲水去越入海百餘年乃見於陶一旦棄資財賣藥於蘭陵丗丗見之又曰屠羊說者楚人也隱於屠肆昭王失國說徃從王王反國欲將賞􅀃􅀃曰大王失國􅀃失屠羊大王反國􅀃亦屠羊臣之爵禄巳復矣又何賞之有王使司馬子綦延之以三珪之位􅀃曰願長反屠羊之肆耳遂不受又曰閭丘先生齊人也宣王獵於社山社山父老十三人相與勞王王賜父老不租父老皆謝先生獨不拜王曰少也復賜無徭􅃥先生復獨不拜王曰父老幸勞之故荅以二賜先生獨不拜何也閭丘曰聞王之來望得壽得冨得貴於大王也王曰死生有命非寡人也倉廪備災無以冨先生大官無闕無以貴先生閭丘曰非所敢望願選良吏平法度臣得壽矣賑乏以時臣得冨矣令少敬長臣得貴矣太平御覽卷第五百九
