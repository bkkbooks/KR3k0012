front:
  text: 太平御覽卷第三百七十七
  hash: sha256:5668a6f740d2f44f0f7698995731714f3a17e61f9ce9f4f2652abfecd8f4ebe0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_377-1a}
body:
  text: 人事部十八長中國人長絶域人長中國人禮斗威儀曰君乗土而王其民長君乗金而王其民洪白長大春秋演孔圗曰孔子長十尺大九圍坐如蹲龍立如牽牛就之如􅄧望之如斗周書曰丘陵之人專而長史記曰晏子爲齊相出其御之妻從門窺其夫爲相御擁大蓋䇿駟馬意氣陽陽甚自得也旣而歸其妻請去夫問故妻曰晏子長不滿六尺身相國名顯諸侯今者妾觀其出志念􅀷矣常有以自下者今子長八尺廼爲人僕御然子之意自以爲足妾是以求去也其後夫自抑損晏子恠而問之以實對薦以爲大夫漢書曰東方朔上書曰臣朔少失父母長養兄嫂年十三學書三冬文史足用年二十二長九尺三寸又曰車千秋長八尺餘體貌甚麗武帝見而恱之又曰金日磾父以不降見殺與母閼氏弟綸俱没入官輸黄門養馬日磾長八尺二寸容貌甚嚴馬又肥好上異而問之以夲狀對上即日賜湯沐衣冠拜爲馬監又曰王商長八尺餘身體洪大容貌絶人單于來朝見商而拜又曰王莽夙夜連率韓愽上言有竒士長一丈大十圍來至臣府曰欲奮擊胡虜自謂巨母霸出於蓬萊東南五城西北昭如海瀕軺車不能載三馬不能勝即日大車四馬建虎旗載覇詣闕卧則枕鼔以䥫著食此皇天所以輔新室又曰朱雲字子游魯人少時通輕俠借客執仇長八尺餘貌甚壯以勇力聞年四十迺變節從􅀶士白子反受易東觀漢記曰馮勤字衛伯魏郡人曽祖父楊宣帝時爲弘農太守有八子皆爲二千石趙魏間榮之號萬石焉兄弟形皆偉壯唯勤祖優知長不滿七尺常自謂短陋恐子孫似之乃爲子汎娶長妻生勤長八尺三寸又曰賈逵長八尺二寸京師爲之語曰問事不休賈長頭華嶠後漢書曰趙壹字元淑漢陽人體貌魁梧身長八尺羙􅂡眉望之甚偉范曄後漢書曰虞延字子大陳留人延生其上有物􅀂一疋絹遂上􅂛天占者以爲􅁻及身長六尺六寸􅆎帶十圍力能扛鼎又曰大將軍􅀽紹揔兵兾州遣使要鄭玄大㑹賔客􅀇最後至乃延􅂛上坐身長八尺飲酒一斛秀眉明目容儀温偉又曰郭林宗儀貌魁岸身八尺聲如鍾􅀽宏漢紀曰長樂衛尉馬騰其長八尺身體洪大面鼻雄異而性賢厚人多敬之魏志曰許禇字仲康長八尺餘大十圍容貌雄異勇力絶人晉書曰羊祐身長七尺三寸羙􅂡眉太原郭奕見之曰此今之顔子也晉書載記曰劉曜子胤風骨俊茂爽朗卓然身長八尺三寸髮與身齊多力善射驍捷如風雲曜因以重之三十國春秋曰燕徴其東萊太守王鸞鸞身長九尺􅆎帶十圍貫甲跨馬不據鞌由鐙燕王徳見而竒其魁偉賜之食一進一斛餘徳驚曰所噉如此非耕而能飽但才貌不凢堪爲貴人可以一縣試之繇是拜逢陵長甚有治績崔鴻前􅁗録曰鹿緼字處嘿西平人也身長八尺􅆎帶十圍清辯善論雄武便弓馬孝友貞亮聲髙一時車頻􅁗書曰符堅時有申香長十尺以上爲拂盖郎裴景仁􅁗書曰姚萇圍符堅遣僕射尹緯詣闕陳事堅見緯貌魁梧志氣秀傑􅆎帶十圍瑰偉異常驚而問曰卿於朕丗何爲所作偉荅曰尚書令史堅􅀏曰卿宰相才也宋書曰南郡王義宣爲荆州刺史白晢羙􅂡眉身長七尺五寸􅆎帶十圍齊書曰王茂先身長八尺㓗白羙容儀齊武帝布衣時常見之歎曰王茂先年少堂堂如此必爲公輔又曰劉善明平原人也長八尺九寸質素不好聲色北齊書曰肅宗孝昭皇帝諱演字延安聦敏有識度􅀷沉能断不可窺測身長八尺􅆎帶十圍儀表望風逈然獨秀周書曰􅁃信字子山㓜而俊邁聦敏絶倫􅀶覽羣書尤喜春秋左氏傳身長八尺􅆎帶十圍容止頽然有過人者三國典略曰冦儁歸老不復朝覲天王思與相見乃令入朝儁身長八尺􅂡髮皓然容止端詳音韻清朗天王與之同席而坐因訪洛陽故事不覺屢爲前膝唐書曰李義琰身長八尺􅀶學多識髙宗毎有顧問言皆切直孟子曰曹文公弟曹交問曰聞文王七尺湯九尺今交九尺四寸食粟而巳如何則可淮南子曰朱儒問天髙於脩人曰吾不知曰子雖不知猶近之於我也故凢問事必於近之者呉越春秋曰伍子胥見吴王僚僚望其顔色甚可畏長一丈大十圍眉間一尺王僚與語三日辭無復者胥知王好之毎入言倍有勇壯之氣帝王丗紀曰季歴之妃生文王昌身長十尺又曰禹長九尺九寸殷湯長九尺涼州記曰吕光字丗明連結豪賢好施待士身長八尺四寸目重瞳子左肘生寅印性沉重質略寛大有度量時人莫之識唯王猛布衣時異之曰此非凢人司馬彪序傳曰朗祖父儁字元異􅀶學好古倜儻有大度長八尺三寸腰十圍儀狀魁岸行與衆有異郷黨宗族咸影附焉祖冲之述異記曰符徤皇始四年有長人見身長五丈語人張靖曰今當太平新平令以聞健以妖妄召靖繫之是月霖雨河渭泛溢蒲坂津監登於河中流得大􅄚一􅃗長七尺三寸足跡稱􅄚指長尺餘文深七寸璅語曰齊景公伐宋至曲陵夢見大君子甚長而大大下而小上其言甚怒好仰晏子曰􅀂是則盤庚也夫盤庚之長九尺有餘大下小上白色而髯其言好仰而聲上公曰是也是怒君師不如違之遂不伐宋也丗說曰滿寵寵子偉偉子奮皆長八尺長絶域人河圖玉板曰從崑崙以北九萬里得龍伯國人長三十丈生萬八千歳而死從崑崙以東得大􅁗國人長十丈從此以東十萬里得佻吐凋國人長三丈五尺從此以東千里得中􅁗人長一丈龍魚河圗曰天之東西南北極各有銅頭鐵額兵長三千萬丈三千億萬人天之東西南北極各有金剛敢死力土長三千萬丈三千億萬人天中有太平之都有都甲食􅀑鐵靣兵長三千萬丈三千億萬人尚書洪範五行傳曰長狄之人長盖五丈餘也又曰􅁗始皇時有大人身長五丈足跡六尺夷狄服見於臨洮天戒􅁗曰勿大行夷狄之道將受其禍云左傳文下曰冬十月敗狄于鹹􅀗長狄僑如冨父終甥摏其喉以戈殺之埋其首於子駒之北門以命宣伯得臣因名宣伯曰僑如以旌其功公羊傳文公曰長狄兄弟三人一者之齊王子城父殺之一者之魯叔孫得臣殺之則未知其之晉者也榖梁傳文公曰魯文公十一年叔孫得臣敗狄于鹹獲長狄也兄弟三人迭害中國得臣善射射中其目身横九􅅿斷其首而載之眉見於軾春秋考異郵曰長狄兄弟三人各長百尺狄者隂氣時中國衰有夷狄萌家語曰呉伐越隳㑹稽􅀗巨骨一節專車載焉呉子使來聘魯以問孔子孔子曰丘聞昔禹致羣臣於㑹稽之山防風氏後至禹戮之其骨節專車客曰防風何字也子曰汪罔之君守封嵎之山爲􅃮姓在虞夏啇爲汪罔氐於周爲長翟氏今曰大人客曰人之長極幾何子曰長者不過十丈數之極也魏略曰天竺國人皆長一丈八尺車隣國男女皆長一丈八尺魏志曰咸熈二年襄武縣言有大人見長三丈餘跡長三尺六寸白髮着黄單衣戴黄巾呼人王始語云今當太平列子曰渤海之東有大壑焉中有五山一曰岱輿二曰貟嶠三曰方壷四曰瀛洲五曰蓬萊群聖居之帝使巨鼇十五舉首而戴之迭爲三番龍伯之國有大人一釣而連六鼇合負而歸於是岱輿貟嶠二山沉於大海帝馮怒侵滅龍伯之國使小至伏羲神農時其國人猶長數十丈淮南子曰東方之人長一丈孫綽子曰海人與山客辯其方物海人曰横海有魚額􅀂華山之頂一噏萬頃之波山客曰鄧林有木圍三萬尋直上千里傍䕃數國東極有大人斬木爲䇿短不可杖釣魚爲鮮不足充餔音逋山海經曰東海之外大荒之中有波谷山者有大人之國有大人之市名曰大人堂有一人蹲其上張其兩臂漢武故事曰公孫卿至東萊云見一人長五丈自稱巨公牽一黄犬把一黄雀欲謁天子因忽不見神異經曰東南有人焉周行天下其長七丈腹圍如長箕頭箕頭髮煩乱也不飲食朝呑惡􅀑三千暮吞二百但吞不咋鋤格切此人以􅀑爲飯以霧露爲漿名天郭一名食耶吞食耶􅀑一名黄父黄父􅀑俗人依此名兩名之又曰西北海外有一人焉長二千里兩脚中間相去千里腹圍一千六百里但飲天酒五天酒甘露也不食五榖魚肉忽有飢時向天乃飽好山海間不犯百姓不干萬物與天地同生名無路之人言無路者髙大不可爲路也一名仁禮曰仁也一名信與天地俱生而不没故曰信一名神又曰西南大荒中有人焉長一丈其腹圍九尺踐􅀛蛇戴朱鳥左手慿青龍右手慿白虎知河海斗斛識山石多少知天下鳥獸言語知百榖草木鹽苦名曰聖一名哲一名先通一名無不逹凡人見拜者令人神智又曰東南隅大荒之中有朴父焉夫婦並髙千里腹圍百輔百輔圍千里也天􅀄立時使夫妻導開百川􅈸不用意讁其夫妻並立東南男露其勢女彰其殺勢殺隂陽氣息如人不畏寒暑不飲不食湏黄河清當復更使其夫妻導百川蜀王夲紀曰􅁗襄王時宕渠郡獻長人二十五丈六尺括地圖曰大人國孕三十六年而生生兒白首長丈外國圖曰大􅁗國人長一丈五尺猿臂長脅好􅀐駱駞辛氏三􅁗記曰燉煌西盡大􅁗隔海心無憂遇善風不經二十日得渡心憂數年不得渡該曰心無憂患不經二旬心􅀂憂患逺離三春士人賢直男女皆長一丈端正國主風雨不和則讓賢而治之郭子横洞􅁳記曰有攴提國人長三丈二尺有三手一手當􅅐手足三指太平御覽卷第三百七十七
