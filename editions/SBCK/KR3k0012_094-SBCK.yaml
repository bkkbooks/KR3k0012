front:
  text: 太平御覽卷第九十四皇王部十九
  hash: sha256:44751f22b3e2aabc1f4671c4f84469566da0fb191b41b8bf5eb25acddf2ee096
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_094-1a}
body:
  text: 魏烈祖明皇帝齊王髙貴郷公陳留王烈祖明皇帝魏志曰明皇帝諱叡字元仲文帝太子也生而太祖愛之常令在左右年十五封武徳侯黄􅀄二年爲齊公三年爲平原王以其母誅故未建爲嗣七年夏五月帝病篤乃立爲皇太子丁巳即皇帝位詔太傅三公以文帝典論刻石于廟門之外青龍見郟之摩陂井中幸陂觀龍於是改元爲青龍摩陂爲龍陂二年三月山陽公薨素服發哀使持節典護䘮追謚山陽公爲漢孝獻皇帝葬以漢禮孫權入居巢湖口向合肥新城又遣將陸議孫韶各將萬餘人入淮􅃆六月征東將軍滿寵進軍拒之秋七月帝親御龍舟東征權攻新城將軍張頴等拒守力戰帝軍未至數百里權遁走群臣以爲大將軍方與諸􅁑亮相持未解車駕可西幸長安帝曰權走亮膽破大將軍必制之吾無憂矣遂進軍幸夀春録諸將功封賞各有差八月大曜兵饗六軍遣使者持節犒勞合肥夀春諸軍行還許昌宫司馬宣王與亮連圍積日亮數挑戰宣王堅壘不應㑹亮卒其軍退還景􅀄元年㤗山茬縣言黄龍見茬土狸反於是有司奏以爲魏得地統冝以建丑之月爲正月定暦改年爲孟夏四月眼色尚黄犧牲用白戎事乗黒首白馬建大赤之旗朝㑹建太白之旗改太和暦爲景􅀄暦其春夏秋冬孟仲季月雖與正歳不同至於郊祀迎氣礿祠蒸甞廵狩蒐田分至啓閉班宣時令中氣早晩敬授民事皆以正歳斗建爲暦數之序二年十二月帝寢疾不豫太尉宣王還至河内帝驛馬召到引入卧内執其手謂曰吾疾甚以後事屬君君其與爽輔少子吾得見君無所恨矣宣王頓首流涕即日帝崩于嘉福殿年三十六葬髙平陵魏書曰帝生數歳而有􅄮嶷之姿武皇帝異之曰我基於爾三世矣每朝讌㑹同與待中近臣並列帷幄好學多識特留心於法理容止可觀望之儼恪即位之後容受直言聽受吏民士卒上書一月之中至數十百封雖文辭鄙陋猶覽省究意無厭倦又曰青龍三年起太極諸殿築㹅章觀髙十餘丈建翔鳯於其上又於芳林園中起陂池檝櫂越歌又於列殿之北立八坊諸才人以次弟序處其中貴人夫人巳上轉南附焉其秩名擬百官之數帝常遊宴在内乃選女子知書可附信者六人以爲女尚書使典省外奏事處分當畫可自貴人巳下至尚保及給掖庭洒掃習伎歌者各有千數通引榖水過九龍前玉井綺蘭蟾蠩含受神龍吐出使􅀶士馬均作司南車水轉百戯歳首建巨獸魚龍曼延弄馬倒􅀐備如漢西京之制築閶闔諸門外罘音浮罳音思太子舎人張茂以吴蜀數動諸將出征而帝盛興宫室留意於玩飾賜與无度帑藏空竭乃上書諌之魏氏春秋曰魏明帝天姿秀出立髮委地口吃少言而沉毅好斷􅀄諸公受遺輔導帝皆以方位處之政自己出而優禮大臣開容善直雖犯顔極諌無摧戮也其君人之量如此之偉然不思建徳垂風固維城之基至使大權偏據社稷無衛悲夫魏略曰明帝欲平北邙令登臺見孟津辛毗諌曰􅀂九河溢涌洪水爲害丘陵皆夷何以禦之帝乃止魏末􅀓曰􅀄帝爲平原王母甄后妬文帝殺之故不立爲太子甞從帝獵見鹿子母帝射殺鹿母詔明帝射鹿子明帝曰陛下巳殺其母臣不忍殺其子因涕泣文帝即放弓箭以此􅀷竒之而建樹之意定矣廢帝齊王芳魏志曰齊王諱芳字蘭卿明帝無子養王及􅁗王詢宫省事祕莫有知其所由夾者魏氏春秋曰或云任城王楷子也青龍三年立爲齊王景􅀄三年正月明帝病甚乃立爲皇太子是月即皇帝位二月西域重譯獻火浣布詔大將軍太尉臨試以示百僚帝加元服賜羣臣各有差大將軍司馬景王將謀廢帝以聞皇太后太后令曰皇帝芳春秋巳長不親萬機躭􅁋内寵沉漫女德曰延倡優縱其醜謔延六宫家人留止内房毁人倫之叙亂男女之節恭孝日虧悖傲滋甚不可以承天叙奉宗廟遣芳歸藩于齊以避皇位是日遷居别宫時年二十三使者持節送衛營齊王宫於河内之重門制度皆如藩國之禮魏略曰景王將廢帝遣郭芝入白太后后與帝對坐芝謂帝曰大將軍欲廢陛下立彭城王據帝乃起去太后不恱芝曰太后有子不能教令太將軍章巳成又勒兵在外以備非常但當從旨將復何言太后曰我欲見大將軍口有所說芝曰何可見耶但當速取璽綬太后意折乃遣傍御取璽綬着坐側芝出報景王景王甚懽又遣使者授齊王印綬當出就西宫帝受命遂載王車與太后別垂涕始從太極殿南出群臣送者數千人太尉司馬孚悲不自勝餘多流涕王出後景王又使使者請璽綬太后曰彭城王我之季也今未立我當何之且明帝當􅅸嗣乎吾以爲髙貴郷公睿文皇帝之長孫明皇帝之弟子於禮小宗有後太宗之義其詳議之景王乃更召羣臣以皇太后令示之乃定迎髙貴郷公是時太常以發二日待璽綬於温事定又請璽綬太后令曰我見髙貴郷公小時識之明日我自欲以璽綬手授之魏丗譜曰晉受禪封齊王爲邵陵公年四十三太始十年薨謚曰厲公廢帝髙貴郷公魏志曰髙貴郷公諱髦字彦士文帝孫東海定王彬子也正始五年封郯縣髙貴郷公少好學夙成齊王廢公卿議立公十月公至于􅀇武館羣臣奏請舎前殿公以先帝舊處避止西廂羣臣又請以法駕迎公不聽丙寅公入于洛陽羣臣迎拜西掖門南公下與將荅拜儐者請曰儀不拜公曰吾人臣也遂荅拜至止車門下輿左右曰舊乗輿入公曰吾􅀍皇太后徴未知所爲遂歩至太極東堂見于太后是日即皇帝位百僚陪位者欣欣焉甘露元年夏四月幸太學問諸儒曰聖人幽賛神明仰觀俯察始作八卦後聖重之爲六十四立爻以極數凡斯大義罔有不備而夏有連山殷有歸藏周曰周昜昜之書其故何也昜愽士淳于俊對曰庖犧因燧皇之圖而制八卦神農演之爲六十四黄帝堯舜通其變三代隨時質文各繇其事故昜者變昜也名曰連山似山出納雲氣連天地也歸藏者萬事莫不歸藏於其中也帝又曰􅀂使庖犧因燧皇而作昜孔子何以不云燧人氏没庖犧氏作乎俊不能荅講昜畢復命講尚書帝問曰鄭玄云稽古同天言堯同於天也王肅云堯順考古道而行之二義不同何者爲是􅀶士􅁃峻對曰先儒所執各有乖異臣不足以定之然洪範稱三人占從二人之言賈馬及肅皆以爲順考古道以洪範言之肅義爲正帝曰仲尼言唯天爲大唯堯則之堯之大羙在乎則天順考古道非其至也今發篇義以明聖徳而舎其大更稱其細豈作者之意耶峻對曰臣奉遵師說未喻大義至於文質折中裁之聖思復命講禮記帝問曰太上立徳其次務施報爲治何由而教化各異皆脩何政而能致於立徳施而不報乎􅀶士馬照對曰太上立徳謂三皇五帝之丗以徳化民其次施報謂三王之丗以禮爲治也帝曰二者教化薄厚不同將主有優劣耶時使之然乎照對曰誠由時有樸文故化有薄厚也帝幸壁雍㑹命羣臣賦詩侍中和逌音由尚書陳騫等作詩賦稽留有司奏免官詔曰吾以闇昧愛好文雅廣延詩賦以知得失而乃爾紛紜良用反側其原逌等主者宣勑自爾巳後羣臣皆當翫習古義脩明經典稱朕意焉魏氏春秋曰公神明爽儁徳音宣㓪罷朝景王私曰上何如主也鍾㑹對曰才同陳思武􅀋太祖景王曰􅀂如卿言社稷之福也甘露元年二月帝讌群臣於太極東堂與侍中荀顗尚書崔賛袁亮鍾毓中書令虞松等並講述禮典遂言帝王優劣之差帝慕顗有立因問顗等曰有夏旣衰后相殆滅少康収集夏衆復禹之績漢髙祖拔起壠􅅿驅帥豪雋芟夷􅁗項包舉宇内斯二主可謂殊才異略命世大賢者也考其功徳誰冝爲優顗等對曰夫天下重器王者天授徳應期運然後能受命創業至於階縁前緒興復舊績造之與復固難易不同少康功德雖羙猶爲中興之君與漢世祖同流可也至如髙祖臣等以爲優帝曰自古帝王功徳言行互有髙下未必創業者皆優紹繼者咸劣也湯武髙祖雖俱受命賢聖之分所覺懸殊少康殷宗中興之羙夏啓周成守文之盛論徳校實方諸漢祖吾見其優未聞其劣頋所遇之時殊故所名之功異爾少康生於滅亡之後降爲諸侯之􅀠﨑嶇逃難僅以身免能布其徳而兆其謀卒滅過戈克復禹績祀夏配天不失舊物非至徳􅀪仁豈濟斯勲漢祖因土崩之勢仗一時之權專任智力以成功業行事動静多違聖撿爲人子則數危其親爲人君則囚繫賢相爲人父則不能衛子身没之後社稷幾傾􅀂與少康易時而處或未能復大禹之績也推此言之冝髙夏康而下漢祖矣漢􅀳陽秋曰帝見威權日去不勝其忿乃召侍中王沉尚書王經散騎常侍王業謂曰司馬昭之心路人所知也吾不能坐受廢辱今日當與卿自出討之王經曰昔魯昭公不忍季氏敗走失國爲天下􅀏今權在其門乆矣朝廷四方皆爲之致死不顧逆順之理非一日也旦宿衛空闕兵甲寡弱陛下何所資用而一旦如此無乃欲除疾而更􅀷之耶禍殆不測冝見重詳帝乃出懷中板投地曰行决矣正使死何所恨况不死耶於是入白太后沉業奔走告文王爲之備帝遂帥僮僕數百鼔譟而出文王弟屯􅀐校尉伷音胄入遇帝於東止車門左右呵之伷衆奔走中護軍賈充又逆帝戰於南闕下帝自用劒揮衆欲退太子舎人成濟問充曰事急矣當云何充曰今日之事無所問也濟即前刺帝刃出於背文王聞大驚自投於地曰天下其謂我何太傅孚奔徃枕帝股而哭哀甚殺陛下者臣之罪也葬髙貴郷公于洛陽西北三十里屈澗之濵下車數乗不設旌旐百姓相聚而觀之曰是前日所殺天子也或掩面而泣悲不自勝帝王世紀曰髙貴卿公爲太子舎人成濟所害年二十以公禮葬之陳留王魏志曰陳留王諱奐字景明武帝孫燕王宇之子也甘露三年封安次縣常道郷公髙貴郷公卒公卿議迎立公六月入于洛陽即皇帝位於太極前殿大赦改元景元四年詔伐蜀命征西將軍鄧艾督帥諸軍趣甘松沓中雍州刺史諸􅁑緒督諸軍趨武都髙樓首尾踧討􅀂擒姜維便當東西並進掃滅巴蜀也又命鎭西將軍鍾㑹由駱谷伐蜀所至輙克十一月蜀主劉禪降巴蜀皆平咸熈二年命􅀳王冕十有二旒建天子旌旗進王妃爲王后丗子爲太子八月相國晉王薨太子炎紹封襲位㹅攝百揆十二月禪位于晉改次于金墉城而終館于鄴時年二十在位六年帝王世紀曰陳留王即位禪􅀳封陳留王就國治鄴奉魏宗祀魏世譜曰􅀳封帝爲陳留王年二十八太安元年崩謚曰元皇帝魏志評曰古者以天下爲公唯賢是與後代世位立子以嫡􅀂胤嗣不繼則冝取旁親明徳􅀂漢之文宣者斯不易之常准也明帝旣不能然情繫􅀻愛撫養嬰孩傳以大器託付不專必叅枝族终於曹爽誅夷齊王替位髙貴郷公才惠夙成好問尚辭亦文帝之風流也然輕躁肆忿自䧟大禍陳留王恭巳南靣宰輔統政仰遵前式揖讓而禪遂饗封大國作賔于􅀳比之山陽班寵有加焉太平御覽卷第九十四
