front:
  text: 太平御覽卷第六十三
  hash: sha256:9ed85d620fc4289b1e6db1720224099987c3b3f87b52f4c43d92e887c55b7b55
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_063-1a}
body:
  text: 地部二十八河南諸水孝水槖水涑水菊花源滍水澧水汝水潁水丹水白水灌水潧水洧水京水索水濮水隕石水吕梁水豪水汳水雎水泗水洙水沂水濰水汶水沐水淄水澠水孝水山海經曰平逢山西十里廆山其陽多㻬琈之玉俞隨之水出于其隂北流注于榖丗謂之孝水也潘岳西征賦曰澡孝水以濯纓嘉美名之在兹槖水陜縣圖經曰槖水即魯水也西北入城百姓頼之呼爲利人渠是也又按唐史云武德元年陜東道行臺金部􅀰中長孫操自郡東又引水入城以代井汲百姓頼之與上渠俱利於民涑水十道志曰涑水亦名襄水荆楚之地水駕山而上者皆呼爲襄上也今土人呼爲涑水上流亦呼爲襄名即無定故陸澄地理記曰襄陽無襄水也又按襄􅃆記云中廬有涑水注于􅃆此水中有物如三四􅀊小兒􅂰頭如虎掌􅀲常没水中出􅂰頭示人小兒不知者欲弄之輙便啖人或人有生得者摘其鼻可小小使之名曰水虎菊花源荆州記曰菊花源傍悉生芳菊􅀍徑浸潭流其滋液水極芳馨谷中有三十餘家不穿井仰飲此水上壽二三百中壽百餘其七八十者猶不爲壽夫菊能輕身益氣令人乆壽於此有徴矣又後漢胡廣字伯始爲侍中乆患風羸南歸飲此水遂瘳焉滍水傳曰􅀳陽處父侵蔡楚子上救之與晉夾滍而軍水經曰滍水出南陽魯陽縣西之堯山張衡南都賦曰其川瀆則滍澧􅖐濜發源巖穴布濩漫汗漭􅃞洋溢㹅激急趣箭馳風疾又曰滍水又東南逕昆陽縣故城昔漢光武與王㝷王邑戰于昆陽敗之走者相騰踐奔殪百餘里㑹大雨如注滍川盛溢虎豹皆股戰士卒爭赴溺死者以萬數水爲不流王邑嚴尤陳茂輕􅀐皆乗尸而渡澧水􅀃文曰澧水南陽雉衡山東入汝山海經曰葛山澧水出焉音礼東流于余澤其中多六足魚漢書地理志曰充縣歷山澧水出焉又離騷云阮有芷􅀆澧有蘭也又有澹水王仲宣贈孫文始詩云悠悠澹澧是也澹水澧水汝水􅀃文曰汝出弘農盧氏還歸山東入淮春秋􅀃題辭曰汝出猛山汝之爲言女也宋均注曰女取其生孕也詩曰汝墳道化行也文王之化行乎汝墳之國水經曰汝出河南梁縣勉郷西天息山注曰地理志云出髙陵山即猛山也亦言出魯陽縣之大孟山愽物志云出燕泉山並異名也東觀漢記曰􅀓俊從上迎擊王莽二公於陽􅀜漢兵反走還到汝水上於水岸以手飲水澡頰塵垢謂俊等曰今日罷倦甚諸卿寧憊耶潁水􅀃文曰潁水出潁川陽城乹山東入淮豫州浸也水經注曰潁有三源右水出陽乹山之潁谷中水出導源少室左水岀少室南谿漢書曰灌夫潁川人宗族豪撗潁水謡曰潁川清灌氏寧潁水濁灌氏族韓子曰鄭人有卜子妻市買鼈歸過潁川以鼈當渴飲之遂失鼈吕氏春秋曰湯讓天下於卞隨卞隨自投於潁水丹水漢書曰髙祖入􅀜王陵起兵丹水以歸漢水經曰丹水出京兆上洛縣冢嶺山至丹水縣入于汋吕氏春秋曰尭有丹水之戰以服南蠻注曰水出丹魚先夏至十日夜伺之魚浮水側赤光上照如火網而取之割其血以塗足可以歩行水上長居淵中尚書逸篇曰堯子不肖舜使居丹淵爲諸侯故號曰丹朱六韜曰尭伐有扈戰於丹水之浦白水水經曰白水岀朝陽縣西東流過其縣南至新野縣東入于㳙東觀漢記曰光武皇考封南陽之白水郷莊子曰兩神女於白水之上禹過之而趍曰治天下奈何女曰股無肢脛不生毛手足胼胝何足以至司馬彪注言憂天下太甚灌水水經注曰灌水經蓼縣禇先生所謂神􅀛出於江灌之間是也潧水􅀃文曰潧水出鄭國水經注曰潧水出鄶城西北雞絡塢下東南流入洧潧字今作溱詩曰子惠思我褰裳渉溱子不我思豈無他人又曰溱與洧方渙渙􅀆士與女方秉簡􅀆溱洧鄭兩水名蘭簡孟子曰子産聽鄭國之政以其乗轝濟人於溱洧洧水􅀃文曰洧出潁川陽城山東南入潁水經云出宻縣馬嶺山注云洧別源也詩曰子惠思我褰裳渉洧子不我思豈無他士傳曰鄭大水龍􅃲于時門之外洧淵時門鄭城門也京水水經注曰京水發源京縣黄堆山東亦名祝東泉勢沸湧􅃺若鼎􅀭湯俗謂之京水也索水水經注曰索水出京縣西南嵩渚山與􅀜水同源分流即古旃然水也左傳謂楚伐鄭次旃然即此水名史記曰漢王敗於彭城韓信擊破楚兵於京索間以故項羽不能西濮水􅀃文曰濮水出東郡濮陽南入鉅野水經曰瓠子河東北過禀丘縣爲濮水史記曰􅀳平公令師㳙皷琴未終師曠止之曰亡國之音也平公曰是何道出荅曰此師延所作也與紂爲靡靡之樂武王伐紂師延東走自投濮水之中故聞此聲必於濮水之上先聞此聲者國削問果於濮上得之莊子曰釣於濮水楚王使大夫二人先焉曰願以境内爲累莊子持竿不顧也隕石水水經注曰睢陽有隕石水一名􅃮溝左傳云隕石於宋五隕星也故老云此水有時竭涸五石存焉故名隕水石墜處爲澤吕梁水述征記曰彭城吕縣有吕梁水則莊子所稱文夫也列子曰孔子􅀚吕梁懸水三十仞流沫三十里黿鼉魚鼈不能游之數百歩而出􅀍髪行歌莊子亦載豪水水經注曰豪水出隂陵縣之陽亭北小屈石穴北注于淮莊子曰莊子與惠子遊於壕梁水上汳水疋万切水經曰汳水岀隂溝至浚儀縣北入睢水注云隂溝即浪蕩渠也亦言汳受旃然水字今作汴又云丹沁亂流於武德絶河南入陽合故汳兼丹水之稱河泲水斷汳承旃然而東目王賁􅈅大梁水出縣南而不逕其北夏水洪泛則是瀆津通故渠即隂溝也於大梁北又曰浚水矣故陳留風俗傳云浚水逕其北者也睢水漢書曰項羽與漢王戰于靈壁東漢軍大敗睢水爲之不流又地理志曰睢水首受陳留縣浪蕩渠水經曰睢水東逕睢陽縣又東過相縣南流當蕭縣南入淮又曰睢水又東經睢陽縣故城南積而爲蓬洪澤也又九州要記云睢陽水在宋城西又云渙水經新城南又東南合明溝水又曰傳云睢渙之間出文章天子郊廟御服岀焉尚書所謂厥篚織文者也泗水􅀃文曰泗受濟水東入淮禮曰曽子謂子夏曰吾與尓事夫子於洙泗之間退而老於西河之上漢書地理志曰洙泗之水其民渉度㓜者扶老及魯道衰洙泗之間齗齗如也論衡曰儒書言孔子􅁙泗水泗水爲之却流此虚也泗水無知天神使之却流孔子生時何不使之尊敬乎水經注曰地理志曰泗岀濟隂乗氏縣又云出卞縣地經言北山皆爲非矣山海經泗水出魯東北余昔因公事㳂歷徐沇路經洙泗因令㝷其源流水出卞縣故城東南桃墟西北春秋昭公七年謝息納季孫之言以孟氏成邑與晉而遷于桃杜預曰魯國卞縣東南有桃墟丗謂之曰陶墟舜所處也井曰舜井皆爲非也墟有漏澤方一十五里澤西際阜俗謂之嬀亭山蓋有陶墟舜井之言因復有嬀亭之名矣阜側有三石穴廣圎三四尺穴有通否水有􅄹漏漏則數夕之中傾陂竭澤矣左右居民識其將漏䂊以木彰穴口魚鼈􅁀鱗不可勝載矣自此連岡通阜西北四十許里岡之西際便得泗水之源也博物志曰泗水陪尾蓋斯阜矣石穴吐水五泉俱導泉穴各徑尺餘水源南側有一廟栝栢成林時人謂之原泉祠非所究也又曰漢景帝三年有白頸烏與黒烏群闘於吕縣白頸烏不勝墮泗水中死者數千洙水水經曰洙水出泰山蓋縣臨樂山西南至卞縣入于泗注云洙水西南流盗泉水注云泉出卞城東北卞山之隂論語考䜟曰水名盗泉仲尼不漱又注曰夫子教於洙泗之間今於城北二水之中即夫子領徒之所也從征記曰洙泗二水交於魯城東北十七里闕里有洙泗牆南北一百二十歩東西六十歩四門各有石閫北門去洙水百餘歩沂水􅀃文曰沂水出東海費東入泗一曰出㤗山蓋青州浸也水經曰沂水出㤗山蓋縣艾山注曰鄭􅀇云出沂山或云臨山水有二源南源所導丗謂之祚泉山北水所發俗謂之魚窮泉俱東南流合成一川論語曰暮春之月春服旣成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸西京雜記曰魯人秋胡娶妻三日而遊宦三年休還其婦採桑于郊胡至不識而恱之乃遺金一鎰妻曰妾夫遊官未返于兹三年未有衱辱如今日也不顧胡慙而退至家問妻何在母曰採桑于郊乃是向來挑者也夫妻俱慙遂赴沂水而死尸子曰韓雉見申羊於魯有龍飲於沂韓雉曰吾聞之岀見虎搏之見龍射之今弗射是不行吾聞也遂射之郡國志云小沂水今號爲長利圯上有橋即張良爲黄石公取履所濰水水經注曰濰水導源濰山許愼吕忛云濰水出箕屋山淮南子曰濰出覆舟山盖廣異名也史記韓信與楚將龍且夾濰水而陳於此信夜令爲萬餘囊盛沙以遏濰水引軍擊且僞退且追北信決水水大至且軍半不得渡遂斬龍且汶水􅀃文曰汶水出琅邪㤗山朱虚東入濰又云出㤗山菜蕪西南入濟從征記曰汶水岀萊蕪縣西南流又言自入萊蕪谷夾路連山數百里水黒多行石澗中出草藥饒松栢林灌綿濛崖壁相望或傾岑岨徑或廻巖絶谷清風鳴條山壑俱響陵髙谷深兼惴慄之懼危溪險徑有懸束之艱未岀谷十餘里有別谷在􅀌山下谷有清泉泉上數丈有石穴二口容人平行入穴丈餘髙九尺餘廣四五丈言是昔人居山之處薪㸑烟黔猶存谷中林木緻宻行人尠有能至矣又有許山田引灌之蹤尚存出谷有平丘靣山傍水土人悉以種麥云此丘不冝殖稷􅁰而冝麥齊人相承以殖之詩曰汶水湯湯行人彭彭周禮考工記曰狢踰汶則死地氣然也論語雍也曰季氏使閔子騫爲費􅌠子騫曰善爲我辭焉如有復我者則吾必在汶上矣傳曰齊人歸我汶陽之田沐水水經云沐水出琅邪東莞縣西北山東南經東海厚丘縣梁天􅁥二年三月土人張髙等五百餘人相率開鑿此溪引水漑田二百餘頃俗名爲紅花水東流入泗州漣水界淄水水經曰淄水出㤗山萊蕪縣原山注云丗謂之原泉淮南子曰淄澠之水合易牙甞而知之淄澠齊二水也新序曰齊有田巴先生者行脩於内智明於外齊君聞其賢聘而問政焉田巴對曰政在正身正身之夲在於羣臣大王召臣臣改制前飾將造公門問於臣妾曰奚􅀂妾愛臣將出門問從者從者畏臣據臨淄水而觀影然後自知醜惡也今齊之臣妾諌王者非特二人王如臨淄水見巳之惡過而能敃斯齊國治矣澠水水經注曰澠水出營丘城東丗謂之漢湊水入于時水傳曰有酒如澠太平御覽卷第六十三
