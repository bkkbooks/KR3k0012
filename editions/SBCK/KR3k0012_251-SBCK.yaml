front:
  text: 太平御覽卷第二百五十一
  hash: sha256:be13083d12c3b87bfb02130bfac7a0fe04358cbd19d7c280d96c9687510fa4b8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_251-1a}
body:
  text: 職官部四十九都督惣管都護都督晉書曰杜預爲都督荆州諸軍事南􅁟羙而謡之曰後丗無叛由杜翁孰識智名與勇功又曰陶侃爲都督荆雍益梁四州諸軍事是時荆州大飢百姓多飢死侃至秋熟輙糴至􅏇復價糶之士庶歡恱咸􅂪濟頼又曰羊祜都督荆州諸軍事招擕以禮懐逺以德吴人恱服呼爲羊公又曰􅁃翼都督江荆益三州刺史制度規模毎出於人數年之中軍國充實人情翕然稱其才明由是自河以南皆懷歸附又曰陳􅎰爲陶侃廣州長史侃夢有司馬以鎧與侃􅎰以爲司馬國姓鎧者捍國之器節下當進位果除都督交州又曰張寔都督涼州下令曰忝繼前蹤庶幾刑政不爲百姓之患而比年飢旱殆由庶事有闕竊慕箴誦之言以􅀘不逮自今有面刺孤罪者酬以束帛翰墨陳孤過者荅以筐篚謗言於市者報以羊米又曰石苞都督楊州諸軍事苞因入朝當還辝髙貴郷公留語盡日旣出白文帝曰非常主也數日而有成濟之事又曰劉胤代温嶠都督江州諸軍事領江州刺史假節胤位任轉髙放豪日甚縱酒躭樂不恤政事大殖財貨啇販百萬􅀄胤之代嶠也逺近皆謂非選陶侃郄鑒咸云胤非方伯才朝廷不從或問王恱曰今大難之後繩紀頓絶自江陵至于建康三千餘里流人萬計布在國之南藩要害之地而胤以侈汰之性卧而對之不有外變必有内患恱曰間温平南語家公云連得惡夢思見代者㝷云可用劉胤此乃温意非家公也是時朝廷空罄百官無禄唯資江州運漕而胤啇旅繼路以私廢公有司奏免胤官書始下而爲郭黙所害又曰王㳟爲都督兖青兾幽并徐州晉陵諸軍事平北將軍假節鎮京口􅀄都督以北爲號者累有不祥故桓冲王坦之桓彛之後不受鎮北之号㳟表讓軍号以超授爲辭而實惡其名於是改号前將軍北史曰賀蘭祥除都督荆州刺史見有發掘古冢􅁀露骸骨乃謂守令日比豈仁者爲政􅁘命所在收藏時夏亢陽即日降雨唐書曰宋璟轉廣州都督仍爲五府經略使廣州舊俗皆以竹茅爲屋屢有火災璟教人燒瓦改造店肆自是無復延燒之患夷夏懷惠立碑以紀其政又曰王方翼爲夏州都督屬牛疫無以營農方翼造人耕之法施􅀜鍵使人推之百姓頼焉惣管後周書曰長孫儉爲荆州惣管甞詣闕奏事時值大雪遂立於雪中待報自旦逹暮竟無惰容其奉公勤至皆此􅀋也又曰赫連逹遷大將軍夏州揔管三州五防諸軍事逹雖非文吏然性質直遵守法度輕於鞭撻而重愼死罪性又廉儉邊境胡民或饋逹以羊者逹欲招納異􅀋報以繒帛主司請用官物逹曰羊入我厨物出官庫是欺上也命取私帛與之識者嘉其仁恕焉北史曰韋孝寛爲延州揔􅃹兄夐至州與孝寛相見將別孝寛以所乗馬及轡勒與夐夐以其華飾心不欲之謂孝寬曰昔人不棄遺簮墜履者惡與之同出而不與同歸吾之操行雖不逮前烈然捨舊䇿新亦非吾志也乃乗舊馬以歸隋書曰元褒爲原州揔管有啇人爲賊所刼其人疑同􅀫者而執之褒察其色寛而辝正遂捨其人啇詣闕訟褒受金縱賊上遣使窮治之使者薄責褒曰何故利金而捨盗也褒便即引咎􅀄無異詞使者與褒俱詣京師遂坐免官其盗㝷發於他所上謂褒曰公朝廷舊人位望隆重受金捨賊非善事何至自誣也曰臣受委一州不能息盗賊臣之罪一也州民爲人所謗不付法司懸即放免臣之罪二也牽率愚臣無頋刑法不持文書約束至令爲物所疑臣之罪三也臣有三罪何所逃責臣又不言受賂使者復將有所窮究然則縲絏横及良善重臣之罪是以自誣上歎異之稱爲長者又曰元景山爲豪州揔管先是州民王廽洛張季真等聚結亡命每爲刼盗前後牧守不能制景山下車遂捕之廽洛季真挺身奔江南擒其黨與數百人皆斬之法令明肅盗賊屏迹稱爲大治又曰韋丗康甞因侍宴再拜陳讓曰臣無尺寸之功位亞台鉉今犬馬齒截不益明時恐先朝露無以塞責願乞骸骨退避賢能上曰朕夙夜庶幾求賢􅀂渇兾與公共治天下以致太平今之所請深乖夲望縱令䈥力衰謝猶屈公卧治一隅於是出拜荆州揔管時天下唯置四大揔管并楊益三州並親王臨統唯荆州委於丗康時論以爲美丗康爲政簡静百姓愛恱合境無訟又曰韋藝遷營州揔管藝容皃瓌偉毎夷狄叅謁必整儀衛盛服以見之獨坐满一塌蕃人畏懼莫敢仰視又曰薜道衡聲名藉甚一時仁壽中楊素專掌朝政道衡旣與素善上不欲道衡乆知機宻因而檢校襄州揔管道衡乆蒙駈䇿一旦違離不勝悲戀兼之哽咽髙祖愴然改容曰尓光隂晚暮侍奉誠勞朕欲令尓將攝兼撫氓俗今尓之去朕如斷一臂於是賫物三百叚九鐶金帶并時服一襲馬十疋慰勉遣之又曰樊子蓋轉循州揔管許以便冝從事十八年入朝奏嶺南地圖賜以良馬雜物又曰令􅀌熈拜桂州揔管十七州諸軍事許以便冝從事刺史巳下官得承制􅀘授給帳内五百人賜帛五百疋發傳送其家累改封康郡公熈至部大弘恩信其溪洞渠帥更相謂曰前時揔管皆以兵威相脅今者乃以手教相諭我輩其可違乎於是相率歸附先是州縣生梗長吏多不得之官􅀉政於揔管府熈悉遣之爲建城邑開設學校華夷感敬稱爲大化又曰李安領行軍揔管率蜀兵順流東下時陳人屯白沙安謂諸將曰水戰非北人所長今陳人依險泊舩必輕我而無備以夜襲之賊可破也諸將以爲然安率衆先鋒大破陳師髙祖嘉之唐書曰田留安拜魏州揔管劉闥之亂也來攻州城于時山東豪猾多殺長吏以應賊百姓兇人咸懷異志凡諸守皆以心腹自衛多所猜防由是上下情隔怨叛者多留安獨撫結所部示無疑阻九有白事者無間踈逺皆至卧内謂人曰吾與卿輩同爲國守自冝一心無爲疑貳也必欲弃同即異背順歸逆亦任卿輩斬吾頭而去矣城中父老逓相誡勵子弟曰田公以赤心相付何得􅀒之由是人情遂固州人苑竹林者劉闥之黨也􅀄有異圖留安隂知之而不發其事因引置左右委以関鑰竹林感其意遂歸心焉卒收其力用又曰劉丗讓拜廣州揔管將之官髙祖問以備邊之䇿丗讓荅曰突厥比數南宼者徒以馬邑爲其中路耳如臣計者於崞城置一智勇之將多貯金帛有來降者厚賞賜之數出竒兵掠其城下踐其禾稼敗其生業不出歳餘彼當無食馬邑不足圖也髙祖曰非公無可任者可馳驛至彼善爲經略丗讓於是以兵臨馬邑髙满政以其地來降突厥患之遣曹繁陁來詣中國言丗讓與可汗通謀將爲亂由是得罪籍没其家及突厥來降言丗讓􅀄無逆謀始原其妻子都督護漢書曰宣帝時匈奴日逐王欲降漢使人與鄭􅁻相聞􅁻發渠犁􅀛兹諸國五萬人迎日逐王吉送三千人小王將十三人隨􅁻至阿曲頗有亡者􅁻追斬之將詣京漢封日逐王爲德歸侯􅁻旣破車師降日逐威震西域遂并護車師以西故号爲都護都護之置自􅁻始焉上嘉其功乃下詔曰都護西域􅀐都尉鄭􅁻撫循外蠻宣明威信封􅁻爲安逺侯漢之号令班於西域始自張騫成於鄭􅁻也又曰叚㑹宗爲人好大節而功名爲西域都護與谷永相友善永閔其老復逺出與書戒之曰足下以柔逺之靈德復典都護之重職甚休願吾子因循舊貫無求竒功萬里之外以身爲夲願詳思愚言又曰元帝時甘延夀爲西域都護陳湯爲副郅支單于數困辱漢使湯與延壽謀曰郅支所在絶逺無金城強弩之守如發屯田吏士從烏孫直詣其城可以成功延夀欲奏之湯曰國家與公卿議大䇿非凡所見必不從㑹延壽乆病湯獨矯制發兵延壽聞之欲止焉湯怒按劒叱延夀曰大衆巳集竪子欲沮衆耶延壽遂從之部勒行陣益置楊威白虎合􅀐之校張晏曰西域陣法之名也即日引軍分行遂斬郅支單于頭送京師延夀封茂成侯湯封􅀜内侯功大賞少爲石顯匡衡所抑應劭漢官儀曰西域都護武皇帝始開通西域三十六國其後稍分至五十餘國置使者校尉以領護之宣帝神雀三年改曰都護秩二千石平帝時省都護令戊巳校尉領之沈約宋書曰􅀄漢宣帝置西域都護以加􅀐都尉􅀂諌大夫護西域諸國光武建武􅀄始有督軍諸使至獻帝建安中魏武相漢遣大將外出督十軍二十軍者始号都督曹􅀽張楊之徒雖以三公假節領州郡然無都督之号也三國時亦有都護中都護左右都護將軍兼督諸軍猶是舊制意也黄􅀄三年上軍大將曹真始都督中外諸軍事揔諸軍髙貴卿公正元二年晉文帝都督中外諸軍事㝷加大都督之号太始中置小都督江左亦時有也吴朝鎮將揔兵亦曰都督大軍出爲二部則曰左右都督分武昌爲兩部亦曰左右部大督其揔一者則曰大都督又繞帳羽林無難之屬隨事有督無常号也至諸葛恪以下輔政乃都督中外諸軍事蜀􅀜羽在江陵亦督軍州至張飛姜維亦爲中外都督如吴魏也晉氏以來宰輔任重者爲中外大都督方伯望隆者亦如大都督之号凡諸都督雖軍号有輕重無假節也唐書曰馬揔爲安南都護揔敦儒學長於政術在南海累年清廉不撓夷獠便之於漢所立銅柱之處以銅一千五百斤特鑄二柱刻書唐德以繼伏波之迹太平御覽卷第二百五十一
