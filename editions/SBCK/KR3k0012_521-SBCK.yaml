front:
  text: 太平御覽卷第五百二十一宗親部十一
  hash: sha256:718d7d5207c783a0b4cfaedf14d2d3463189efd08c2fa5c9bfbb273e7035209f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_521-1a}
body:
  text: 慈母保母乳母妾出婦舅舅母外甥姨慈母保母禮記内則曰子生異爲孺子室於宫特掃一室以處之擇於諸母與可者必求其寛􅁉慈惠温良恭敬愼而寡言者使爲子師其次爲慈母其次爲保母皆居子室此人君飬子之禮也諸母衆妾也可者􅀓御之屬也子師教示以善道者慈母知其嗜欲者保母安其居處者士妻食乳之而巳又曽子問曰子㳺曰䘮慈母如母禮與如母謂父卒三年也孔子曰非禮也古者男子外有􅀓内有慈母君命所使教子也何服之有言無服也昔者魯昭公少䘮其母有慈母良及其死也公弗忍也欲䘮之有司以聞曰古之禮慈母無服今也君爲之服是逆古之禮而亂國法也􅀂終行之則有司將書之以遺後丗無乃不可乎公曰古者天子練冠以燕居吾弗忍也遂練冠以喪慈母䘮慈母自魯昭公始也左傳襄六曰宋大災宋伯􅁎卒侍姆也姆女師也乳母史記曰武帝時有所幸倡郭舎人者發言陳辭雖不合道然令人主和恱武帝少時東武侯母甞養帝帝壯時號曰大乳母率一月再朝朝奏入有詔使幸臣馬遊卿以帛五十疋賜乳母有詔得令乳母乘車行馳道中當此之時公卿大臣皆敬重乳母乳母家子孫奴從者横􅁀長安中當道掣頓人車馬奪人衣服聞於中不忍致之法有司請徙乳母家室處之於邊奏可乳母當入至前面見辭乳母先見郭舎人爲下泣舎人曰即入見辭去勿疾歩數還顧乳母如其言謝去郭舎人疾言罵之曰咄老女子何不疾行陛下巳壯矣寜尚湏汝乳而活耶於是武帝憐之乃下詔止無徙乳母後漢書曰安帝時鄧太后臨朝帝不親政事小黄門李閏與帝乳母王聖甞共譛太后兄執金吾鄧悝等言欲廢帝立平原王德帝毎忿懼及太后崩遂誅鄧氏而王聖女伯榮扇動内外競爲侈虐明年帝崩立北郷侯爲天子王聖及黨與皆見徙王隠晋書曰賈充子􅀺民三歲乳母抱向閤充入􅀺民喜踊充嗚之充夫人郭槐遥望疑充即鞭殺乳母兒思母病死槐又生男向歳乳母抱中庭充過拈兒頰郭又疑之復鞭殺乳母兒又死充遂無嗣譚藪曰宋何承天爲著作郎時新著作多貴遊少年或戲承天謂爲妳母承天曰鳯凰將九子妳母何言耶妾禮記曲禮曰買妾不知其姓則卜之又内則曰聘則爲妻奔則爲妾妾之言接也聞佼有禮走而徃焉以得接見於君子又曰妾雖老年未滿五十必與五日之御雖婢妾衣服飲食必後長者妻不在妾御莫敢當夕辟女君之御日也妾將生子及月辰夫使人日一問之左傳成上曰魯聲伯之母不聘不娉無媒禮穆姜曰吾不以妾爲姒昆弟之妻相謂爲姒生聲伯而出之又昭五晏子對齊景公曰内寵之妾肆奪於市外寵之臣僣令於鄙又哀下曰魯公子荆之母嬖荆哀公庶子將以爲夫人使宗人亹夏獻其禮宗人禮官對曰無之公怒曰女爲宗司立夫人國之大禮也何故無之對曰周公及武公娶於薛孝惠娶於啇自桓以下娶於齊此禮也則有􅀂以妾爲夫人則固無其禮也出婦禮記檀弓曰子上之母死而不䘮子上孔子曾孫子思伋之子名白其母出門人問諸子思曰昔者子之先君子䘮出母乎曰然禮爲出母期父卒爲文後者不服耳子之不使白也䘮之何也子思曰昔者吾先君子無所失道道隆則從而隆道汚則從而汚汚猶殺也有隆有殺進退如禮伋則安能自予不能及爲伋也妻者是爲白也母不爲伋也妻者是不爲白也母故孔氏之不䘮出母自子思始也又内則曰子甚冝其妻父母不􅀃出冝猶善也漢書曰王􅁻少時學問居長安其東家有大􅀥樹垂庭中􅁻婦取􅀥以啖􅁻􅁻後知之乃去婦東家聞而伐其樹隣里共止之因固請􅁻令還婦里中爲之語曰東家有樹王陽去婦東家􅀥完去婦復還又曰王禁生元后元后母魏郡李氏女也後以妬去更嫁爲河内荀賔妻後漢書曰馮衍娶北地女任氏爲妻悍忌不得畜媵妾兒女常自探井臼老竟逐之又曰黄允濟隂人也以雋才知名郭林宗見而謂曰卿有絶人之才足成偉器然恐守道不篤將失之矣後司徒􅀽隗欲爲從女求姻見允而歎曰得壻如是足矣允聞而黜遣其妻夏侯氏婦請姑曰今當見棄方與黄氏長辭乞一㑹宗屬以展離訣之情於是大集賔客二百餘人婦中坐攘􅃑數允隱慝􅁾惡十五事言畢登車而去允以此廢於時又曰李充字大遜家貧兄弟六人同衣遞食妻􅀼謂充曰今貧居如此難以乆安願思分異充僞許之曰當醖酒具㑹請呼郷里内外充於坐中前跪白母曰此婦無狀而教充離間母兄罪合遣斥便呵叱其婦遂令出門婦衘涕而去齊書曰劉瓛母孔氏瓛娶王氏縁壁挂履土落孔氏床上孔氏不恱瓛即出其妻梁書曰孔謙從兄靈慶甞病􅀉於謙謙出行還問起居靈慶曰向飲冷􅀬不調即時猶渴謙退遣其妻家語曰婦有七出三不去七出者不順父母無子滛僻嫉妬惡疾多口舌􅀼盗不順父母者爲其逆德也無子者爲其絶丗也􅁋僻者爲其亂族也嫉妬者爲其亂家也惡疾者爲其不可供粢盛也多口舌者爲其離親也􅀼盗者爲其反義也三不去者謂有所取無所歸也與其經三年之䘮也先貧賤後冨貴也凡此皆聖人所以慎男女之際重婚姻之始也又曰曽子妻以炊藜蒸不熟出之古樂府詩曰上山採􅐘蕪下山逢故夫迴首問故夫新人復何如舅舅母釋名曰舅乆也爾雅曰母之昆弟爲舅毛詩􅁗風曰渭陽康公念母也康公之母晉獻公之女文公遭麗􅁎之難未反而􅁗􅁎卒穆公納文公康公時爲太子贈送文公于渭之陽念母之不見也我見舅氏如母存焉及其即位思之而作是詩也我送舅氏曰至渭陽何以贈之路車乗黄我送舅氏悠悠我思何以贈之瓊瑰玉佩也儀禮曰舅母之昆弟也傳曰何以服緦從服也言從母服也禮記檀弓曰從母之夫舅之妻二夫人相爲服君子未之言也左傳僖中曰􅁗伯納晉公子重耳及河子犯以璧授公子曰臣􅀒覊紲以從君廵於天下臣之過多矣臣猶知之而况君乎請由此亡公子曰所不與舅氏同心者有如白水投其璧于河又曰􅁃懌甞以毒酒餉江州刺史王允之允之覺其有毒飲犬犬斃乃密奏之帝曰大舅巳亂天下小舅復欲爾邪懌聞飲酖而卒又曰劉璵字慶孫與弟琨字越石並爲尚書郎郭弈之甥也名著當時京師爲之語曰洛中弈弈慶孫越石又曰荀勗頴川人少􅀌貧依於舅氏㓜而歧嶷早成十歳能屬文鍾繇曰此兒當及曽祖爽耳又曰殷浩坐徙東陽信安縣外甥韓康伯浩素賞愛之隨至徙所經歳還都浩送至渚側詠曹顔逺詩曰冨貴他人合貧賤親戚離因而下泣又曰衛玠字叔寳驃􅀐將軍王濟玠之舅也雋爽風姿毎見玠輙歎曰珠玉在旁覺我形穢又曰郄愔字方回與姉夫王羲之有邁丗之風獻之兄弟愔子超未亡時献之兄弟甞躡履脩甥舅之禮及超死見愔怠慢履而候之命席便坐愔􅁣然曰嘉賔不死䑕子敢爾又曰武帝楊后諱艶字瓊芝弘農人母天水趙氏早卒依舅家舅母仁愛親乳之使他人乳已子世􅀃曰衛展字道舒爲江州有舊投之都不祗待唯餉王不留行一斤此人便命駕李弘範聞之曰家舅刻薄反役使卉木也又曰魏明帝爲外祖築館旣成謂左右曰當何名之侍中繆襲曰陛下聖思齊於哲王罔極過於曽閔此館之興情鍾舅氏冝以渭陽名焉上從之妬記曰謝太傅劉夫人不令太傅有別房寵公旣深好聲色不能全節遂頗欲立妓妾兄子及外甥等微逹其旨乃共諌劉夫人方便稱關睢螽斯有不妬忌之德夫人知諷巳乃問誰撰詩荅曰周公夫人曰周公是男子乃相爲耳􅀂使周姥傳應無此語也蔡邕進表曰平丘程末年十四時父叔没末抱屍號泣悲哀舅哀其羸劣嚼􅀥肉以哺之末見食歔欷不能吞咽外甥釋名曰姉妹之子曰甥出配他男而生也爾雅曰男子謂姉妺之子爲出謂我舅者吾謂之甥也儀禮子夏傳曰甥何以緦報之也左傳莊公曰楚文王伐申過鄧鄧祁侯曰吾甥也止而享之騅甥􅡭甥養甥請殺楚子鄧侯不許三甥曰亡鄧國者必此人也􅀂不早圖後君噬臍其及圖之乎史記曰汲黯字長孺濮陽人司馬安是其姉子與黯同爲太子洗馬漢書曰霍去病衛青姉少兒子也又曰顔安字翁孫魯人眭孟姉子也東觀漢記曰黄香字文強年十二家業虚貧衣食不贍舅龍郷侯爲作衣􅀍不受晉書曰魏舒少爲舅寗氏所養寗氏營宅相者云當出貴甥舒時尚㓜自言曰當爲外氏成此宅相又曰石崇字季倫其甥歐陽建與趙王倫有􅂩倫僞詔收崇及建建作臨終詩又曰謝重字景重子約字宣暎曽於公座戯嘲無禮於其舅􅀽湛湛謂曰汝父昔巳輕舅今汝復來加我可謂兩丗無渭陽之情約父重即王敬之外孫與舅有不恊之論湛故有此云又曰范汪少􅀌年六􅀊過江依外家􅁃氏荆州刺史王澄見之曰興范族者必此子也十三䘮母居䘮盡禮及長好學􅀶識多通善談名理又曰韓康伯清和有思舅殷浩曰康伯能自摽置居然是出群器也又曰何無忌東海郯人少有大志鎮北將軍劉牢之即其舅也時鎮京口每有大事皆叅議之桓玄之􅆲與劉􅁉劉毅共興義兵桓玄聞之甚懼其黨曰烏合之衆􅀔必無成玄曰劉􅁉勇冠三軍劉毅家無擔石之儲摴蒱一擲百萬何無忌劉牢之甥酷似其舅共舉大事何爲無成又曰姚興太史令髙魯遣其甥王蒙暉隨劉藻送玉璽一鈕并圖䜟祕文於慕容德吴均齊春秋曰劉瓛字珪沛人五歳聞舅孔昭先讀管寧􅀓欣然請更讀因聽受曰可及此耳三輔决録曰􅁻閎㓜有美名九歳明尚書舅何邈死家貧子㓜閎自造墳塋殯葬之衛玠別傳曰玠王武子甥也武子常與乗白羊車入市舉市曰誰家璧人曰武子甥也武子常與同遊語曰昨與外甥玠並出冏􅀂明珠在側朗然來照人姨爾雅曰母之姊妹爲從母儀禮子夏傳曰從母丈夫婦人服從母母之姊妹傳曰何以小功也以名加也外親之服皆緦之外親異姓正服不過緦晉書曰何充字次道廬江人王導妻姉之子故少與王導善旱爲顯官甞詣舎導以麈尾指床呼充共座曰此是君座也宋書􅀄髙祖産而皇妣殂孝皇貧薄議欲不舉髙祖從母生懷敬未朞乃斷乳而養髙祖以舊恩之故懷敬累至㑹稽太守三輔决録曰周季貢班固姉之子也善屬文䘮婦作問神其姨曹大家難之太平御覽卷第五百二十一
