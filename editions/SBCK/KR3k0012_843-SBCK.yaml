body:
  text: 飲食部一酒上丗夲曰儀狄始作酒醪變五味少康作秫酒戰國䇿曰帝女儀狄作酒而進於禹春秋緯命曰凢􅁰爲酒陽據隂乃能動故以麴釀􅁰爲酒麴隂也是先漬麹􅁰後入故曰陽相感皆據隂也相得而沸是其動也凡物隂陽相感非唯作酒釋名曰酒酉也釀之米麹酉澤乆而味美也亦言踧也能否皆強相踧持也又入口咽之皆踧其靣也􅀃文曰酒就也所以就人性之善惡也一曰造也􅁻凶所起造也又曰酴音途酒母也醴酒一􅀫熟也醪汁滓酒也酎三重之酒也醨薄酒也醑莤酒也酒經曰空乗穢飯醖以稷麥以成醇醪酒之始也烏梅女䴷胡板反甜醹音乳九投澄清百品酒之終也周禮天官下曰酒正掌酒之政令以式法授酒材辨五齊之名一曰泛齊二曰醴齊三曰盎齊四曰醍齊五曰沉齊以節度作之故以齊爲名泛者成而滓浮泛泛然如今冝成醪矣醴猶體也成而汁滓相將如今甛酒矣盎猶翁也成而色翁翁然葱白色如今鄼白矣醍者成而紅赤如今下酒矣沉者成而滓沉如今造清酒矣辨三酒之物一曰事酒二曰昔酒三曰清酒事酒如今之醳酒也昔酒乆酒今之舊醳也清酒今之冬釀夏成者也禮記月令孟冬曰是月也乃命有司秫稲必齊麹孽必時湛熾必㓗水泉必香陶器必良火齊必得兼用六物酒官監之無有差貣有司謂煑酒之官六物者一曰秫稻二曰麹孽三曰湛熾四曰水泉五曰陶器六曰火齊命酒官監之無有差貣謂失誤善惡又曲禮曰侍飲於長者酒進則起進受於尊所降席拜受敬也長者辭少者反席而飲長者舉未釂少者不敢飲又檀弓曰知悼子卒未葬悼子晉人夫荀盈平公飲酒師曠李調侍鼔鍾樂作也杜蕢自外來聞鍾聲曰安在曰在寢燕於寢杜蕢入寢歴階而􅂛酌曰曠飲斯又酌曰調飲斯又酌堂上北靣坐飲之降趍而岀三酌皆罰平公呼而進之曰蕢曩者爾心或開予是以不與爾言謂始來入時開謂諌争有所發爾飲曠何也曰子夘不樂紂以甲子死桀以乙夘亡王者謂之疾日不以舉樂爲吉事所以自戒懼知悼子在堂斯其爲子夘也大矣言大臣䘮重於疾日也曠也大師也不以詔是以飲之也詔告也師典奏樂爾飲調何也曰調也君之䙝臣也爲一飲一食忘君之疾是以飲之也言調貪酒食褻嬖也近臣亦當規君疾憂爾飲何也曰蕢也宰夫也非刀􅎅是共又敢與知防是以飲之也防禁放盗又玉藻曰君子之飲酒也受一爵而色洒如也洒如肅敬貌二爵而言言斯言言和敬貌禮巳三爵而油油油油􅀃敬貌以退禮飲過三爵則敬殺可以去矣又樂記曰夫豢豕爲酒非以爲禍也而獄訟益繁則酒之流生禍也以榖食犬豕曰豢爲作也言豢豕作酒本以饗祀養賢而小人飲之善醉以致獄訟是故先王因爲酒禮壹獻之禮賔主百拜終日飲酒而不得醉焉此先王之所以備酒禍也壹獻士飲酒之百拜以喻多禮又坊記曰子云觴酒豆肉讓而受惡民猶犯齒左傳莊公二十二年曰陳公子完奔齊桓公使爲正卿辭使爲工正飲桓公酒樂公曰以火繼之辭曰臣卜其晝未卜其夜不敢君子曰酒以成禮不繼以􅁋義也夜飲爲滛樂也以君成禮弗納於􅁋仁也又宣公上曰晉侯飲趙盾酒伏甲將攻之其右提弥明知之右車右趍曰臣侍君宴過三爵非禮也遂扶以下又成公下曰鄢陵之戰楚王召子反謀􅂖陽堅獻飲於子反子反醉而不能見糓陽子反内竪王曰天敗楚也夫余不可以待乃宵遁又襄公二十三年曰季武子無適子公彌長而愛悼子欲立之訪於臧紇曰飲我酒吾爲子立之季氏飲大夫酒臧紇爲客爲上賔旣獻巳獻酒臧孫命北面重席新樽㓗之酒㓗旣新復㓗召悼子降逆之大夫皆起臧孫下迎悼子及旅而召公鉏獻酬禮畢而通行爲旅使與之齒季孫失色又昭公十二年曰晉侯以齊侯宴中行穆子相穆子苟呉投壷晉侯先穆子曰有酒如淮有肉如坻淮水名坻山名寡君中此爲諸侯師中之齊侯舉矢曰有酒如澠有肉如陵寡人中此與君代興代更也亦中之又哀公下曰齊子我夕夕視事陳逆殺人逢之遂執以入陳氏方睦使疾而遺之潘沐備酒肉焉使詐病内潘沐并得酒􅁏潘沐可以沐頭饗守囚者醉而殺之而逃又曰衛侯占夢嬖人以能占夢見愛求酒於大叔僖子僖子大叔遺不得與卜此人比而告曰君有大臣在西南隅弗去懼害託占􅁲夢而言乃逐大叔遺遺奔􅀳毛詩國風曰十月穫稻爲此春酒以介眉夀又小雅魚藻曰王在在鎬豈樂飲酒箋云豈亦樂而天下平安萬物得其姓武王何所處乎處於鎬京樂八音之樂與群臣飲酒而巳又小雅曰伐木許許釃酒有藇以筐曰釃以數日湑藇美貌又曰有酒湑我無酒酤我湑莤之也酤一􅀫酒也箋云酤買也此族人東王之思也王有酒則沛莤之王無酒酤買之要欲厚於族人尚書酒誥曰乃穆考文王肇國在西土厥誥毖庻􅀖庻士越少正御事朝夕曰祀兹酒文王告衆國衆土朝夕勑之唯􅀕祀用此酒不常飲惟天降命肇我民惟元祀天降威我民用大亂䘮徳亦罔非酒惟行越小大􅀖用䘮亦罔非酒惟辜文王誥敎小子有正有事無彛酒越庻國飲惟祀德將無醉自成湯咸至于帝乙成王畏相惟御事厥棐有恭不敢自暇自逸矧曰其敢崇飲崇聚也自暇自逸猶不敢况敢聚㑹飲酒乎明無厥或誥曰羣飲汝勿佚盡執拘以歸于周予其殺盡執拘羣飲酒者以歸於京師我其擇罪重者而殺之論語曰惟酒無量不及亂沽酒市脯不食禮記外傳曰五齊三酒皆供􅀕祀之用五齊尊而三酒卑所以明齊者酒人和合之分劑之名也一曰泛齊酒之􅀄成滓有泛者泛泛然俗爲白醪二曰醴齊醴體也汁滓未相同一體也今之甜酒也三曰盎齊一名醆酒狀如葱白色今之白醝酒也四曰醍齊色在白赤之間五曰沉齊一名澄齊醍之與沉三酒與上君夫人及賔長廟中酌獻尸相酬酢之用三酒者列於堂下臣下相酌酬酢之用一曰事酒一名醳酒新成者酌飲有事謂廟中助􅀕親事者也廟中有事者爲榮二曰昔酒乆成而色白謂舊醳之酒與無事飲之三曰清酒冬醸夏成味醇厚史記曰秦繆公亡善馬歧下野人共得而食之者三百餘人逐得欲法之公曰君子不以畜害人乃赦之又曰髙帝除秦苛法爲簡易羣臣飲酒争功髙帝患之叔孫通知上益厭也􅀃上願與諸弟子共起朝儀漢七年長樂宫成羣臣皆朝十月復置法酒諸臣侍坐殿上皆伏以尊卑次起上壽觴九行謁者言罷酒御史執法舉不如儀者輒引去竟朝置酒無敢失禮者髙帝乃曰吾今日知爲皇帝之貴也又曰沛公先入􅀜屯覇上項羽至沛公左司馬曹無傷使人言於羽曰沛公欲王􅀜中羽大怒欲擊之沛公因項伯見羽羽留沛公飲項王項伯東向坐亞父南向坐亞父者范増也沛公北向坐張良西向侍増數目項王舉所佩玉玦示之者三項王黙然項莊入以劒舞欲因擊沛公張良至軍門見樊噲曰甚急今項莊抜劒舞其意常在沛公也噲曰此迫矣臣請入與之同命噲即帶劒擁盾入軍門交㦸之衛士欲止不内噲側其盾以撞衛士仆地噲遂披帷西向而立瞋目視項王項王按劒而跽曰客何爲者良曰沛公叅乗樊噲也王曰壯士賜之巵酒則與斗巵酒樊噲飲之王曰賜之􅇾肩則有一生􅇾肩噲覆盾於地拔劒切而㗖之王曰壯士能復飲乎曰臣死且不避巵酒安足辭又曰曹叅代蕭何爲相一遵何約束日夜飲淳酒卿大夫及賔客見叅不事事皆欲言至者叅輙飲醉之終莫得言丞相舎後園近吏舎吏舎日飲歌呼從吏惡之無如之何乃請叅遊園中聞吏醉歌呼從吏請按之叅乃取酒張坐飲亦歌呼與相叅又曰髙祖過沛置酒自擊筑爲歌使沛子弟佐酒又曰髙后與諸吕劉氏大臣宴飲令朱虚侯章爲酒吏章曰臣將種也請以軍法行酒后可之酒酣諸吕有一人醉亡酒章追斬之后與左右皆大驚也漢書曰酒者天之美禄帝王所以頥養天下享祀祈福扶衰養病百福之㑹又曰百末旨酒百華之末酒也布蘭生芬芳布列若蘭之生也又曰于定國飲酒至石不亂益精明又曰陳遵字孟公毎大飲賔客閉門取車轄投井中雖有急終不得去又曰張讓專權孟他以蒲桃酒一斗遺讓拜他爲涼州刺史後漢書曰光武詔馮異歸家上冡使太中大夫賫牛酒令二百里内太守都尉巳下及宗族㑹焉又曰㓂恂數與鄧禹謀議禹竒之因奉牛酒交歡又曰魯恭兄弟俱爲諸儒所稱學士争歸之太尉趙憙慕其志毎歳時遣子問以酒粮皆辭不受問遺也又曰汝南太守歐陽歙請郅惲爲功曹汝南舊俗十月饗㑹百里内縣皆齎牛酒到府讌飲時臨饗禮訖歙敎曰西部督郵縣延天資忠貞禀性公方摧破姧㓙不嚴而理今與衆儒共論延功顯之于朝太守敬嘉厥休牛酒飬徳主簿讀書教户曹引延受賜惲於下坐愀然前曰司正舉觥愀變色皃也司正主禮儀者觥罰爵也以君之罪告謝于天案延資性貪邪外方内圎言延外示方直而實柔弱也朋黨搆姦罔上害人所在荒亂怨慝並在明府以惡爲善股肱以直從曲此旣無君又復無臣惲敢再拜奉觥歙色慙動不知所言門下􅁺鄭敬進曰君明臣直功曹言切明府德也可無受觥哉歙意少解曰實歙罪也敬奉觥又曰張酺雖在公位而父常居田里酺毎有遷職輒一詣京師嘗來􅃸酺適㑹歳節公卿罷朝俱詣府奉酒上壽極歡醉衆人皆慶羡之及父卒旣葬詔遣使賫牛酒爲釋服又曰大將軍􅀽紹㹅兵兾州遣使要鄭􅀇大㑹賔客玄最後至乃延升上坐身長八尺飲酒一斛秀眉明目容儀温偉魏志曰徐晃破􅀜羽振旅還摩陂太祖迎晃七里置酒大㑹太祖舉巵酒勸晃且勞之曰全樊襄陽將軍之功也又曰吕布􅀐將侯成遣客収馬十五疋客悉驅馬云向沛城欲歸劉備成自將􅀐逐之悉得馬還諸將合禮賀釀五六斛酒獵得十餘猪未飲食先持半猪五斗酒自入詣布前跪言蒙將軍恩逐得所失馬將來相賀自釀少酒獵得猪未敢飲食先奉上微意又曰邴原􅀄辭家求學原舊性能飲酒自行之後八九年間酒不向口單歩􅀒笈苦身持刀至陳則師韓子助頴川則宗陳仲弓汝南則交范孟愽􅃰郡則親盧士幹臨別師友以原不飲酒㑹米肉送原原曰夲能飲酒但以荒思廢業故断之耳今當逺別因見貺餞可以飲讌於是安坐飲酒終日不醉太平御覽卷第八百四十三
