  text: 太平御覽卷第三百四十五
  hash: sha256:cd3b712b4ac47a115901128b5e37a5bffee20aa548c9f1f2bbbe7f5ab20fd96a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_345-1a}
body:
  text: 兵部七十六刀上釋名曰刀到也以斬伐到其所乃擊之也其末曰鋒言􅀂蜂刺之毒利也其本曰環形似環也其室曰削削峭也其形峭殻褁刀躰也室口之飾曰琫琫捧也捧來口也下末之飾曰㻫㻫卑也在下之言也短刀曰拍髀帶時拍躰旁也又曰露拍言露見也佩刀在佩旁之刀也或曰容刀爲刀形而幾刃備容儀而巳剪刀剪進前也書刀給書簡札有所刋削之刀也封刀鉸刀皆隨時名之也􅀃文曰刀兵也象形也㓵五各切刀劒刃也削髀也欹􅩻曲刀也鞞布頂切剞居綺切劂居衛切字林曰琫佩刀下飾也天子以玉諸侯以金㻫佩刀飾也太公兵法曰刀之神名曰脫光尚書曰赤刀大訓􅀪壁琬琰在西序孔安國注曰寳刀赤刀削也大訓虞書也詩曰執其鸞刀又曰何以舟之維玉及瑶鞞琫容刀舟帶也禮記曰割刀之用鸞刀之貴貴其義也左傳曰子皮欲使尹何爲宰子産曰猶未能操刀而使割也榖梁曰孟勞魯之寳刀也論語曰孔子之武城聞弦歌之聲夫子莞爾而􅀏曰割雞焉用牛刀春秋繁露曰禮之所爲興也刀之在右白虎之象也春秋演孔圖曰八政不中則天雨刀史記曰郭解姊子􅀒解之􅀔與人飲使之釂子削切非其任強灌之人怒拔刀刺殺解姉子亡去漢書曰昭帝遣李陵故人隴西任立政等三人俱至匈奴招陵立政等至單于置酒賜漢使者李陵衛律皆侍坐立政等見陵未得私語即目視陵而數自循其刀環握其足隂諭之言可歸漢也又曰龔遂爲渤海太守民有帶持刀劒者使賣劒買牛賣刀買犢可爲帶牛而佩犢者也又曰盖寛饒奏事上以爲怨謗下吏寛饒引佩刀自剄北闕下衆莫不憐之又曰李廣利爲貳師將軍征大宛軍中無水㧞佩刀刺山飛泉涌出又曰王尊爲東平王相王曰願觀相國佩刀尊前引刀視冝然又曰應奉得賜金錯把刀東觀漢記曰朱暉字文季年十三與舅母家属入宛城道遇賊欲奪婦女衣暉抜刀曰錢物可得諸母衣不可奪今日朱暉死也賊義之􅀏曰童子内刀遂放遣又曰賜鄧遵金對鮮卑緄帶一具金錯刀五十辟把刀墨再屈環撗刀金錯屈尺八佩刀各一又曰􅀕遵襲略陽遣護軍王忠皆持鹵刀斧伐樹開道至略陽襲隗囂又曰班超曰臣乗聖威神出萬死之志兾立鈆刀一割之用又曰馬嚴爲陳留太守建􅀄中嚴病遣㓛曹史李襲奉章詣闕上親召見襲問疾病形􅃺以黄金十斤佩刀書刀革帶付龔賜嚴遣太醫送方藥又曰張歩攻耿弇營飛矢中弇股以佩刀截之左右無知者獻帝春秋曰越􅀐校尉汝南伍孚忿董卓無道欲身自殺之挾佩刀詣卓孚語畢辭出卓至閤執手孚因引刀刺卓卓多力却不中即殺孚英雄記曰董卓謂􅀽紹曰劉氏種不足復遺紹勃然曰天下徤者豈唯董公撗刀長揖徑出懸節於上東門而奔兾州漢魏春秋曰劉琮乞降不敢告備備亦不知乆而覺之遣所親問琮琮令宋忠詣備宣白是時曹公在宛備乃驚駭謂忠曰卿諸人作事如此不早相語今禍至告我不亦大劇乎引刀向忠曰今斷卿頭誠不足以􅄙忿亦耻大丈夫臨别復殺卿軰也魏志曰王祥事後母至孝後母嫉之伺祥卧以刀斫之值祥出外持刀斫着􅀍祥知不言如故又曰許禇從討􅀽紹於官渡時常從士徐他等謀爲逆以禇常侍左右憚之不敢發伺禇休下日他等懷刀入禇至下舎心動即還侍他等不知入帳見禇大驚愕他色變禇􅁴之即擊殺他等太祖益親信之出入同行不離左右又曰典韋陳留人形皃魁梧旅力過人好節俠襄邑劉氏與睢陽李禮爲讎韋爲報之禮故冨春長備怨甚謹韋乗車載雞酒僞爲候者門開懷匕首入殺禮并殺其妻徐出取車上刀㦸歩去禮居近市一市盡駭追者數百莫敢近之魏武帝令曰往歳作百辟刀五枚適成先以一與五官將其餘四吾諸子中有不好武而文學將以次與之呉志曰孫堅至錢塘㑹海賊掠賈人堅行操刀上岸以手東西指麾􅀂分部人兵以邏遮収賊賊望見以爲官兵捕之即委財物散走又曰孫權以公孫淵稱蕃遣張彌許晏至遼東拜淵爲燕王張昭諌切權不能堪按刀而怒曰吴國士人入宫則拜孤出宫則拜君􅀌之敬君亦爲至矣而數於衆折􅀌􅀌常恐失計昭熟視權曰臣雖知言不見用而毎竭愚忠者誠以太后臨崩呼老臣於床下遺詔頋命之言故耳因泣涕撗流權擲刀置地與昭對泣吴書曰凌統怨甘寜殺其父操寕常備統不得讎之嘗於吕䝉舎㑹酒酣統乃以刀儛寕起曰寕能􅀟㦸儛蒙曰寕雖能未􅀂䝉之巧也因操刀持楯以身分之後權知統意因令寕將兵徙屯江表傳曰孫權抜刀斫前奏案曰諸將吏敢復有言當迎曹操者與此案同蜀志曰􅀄孫權以妹妻先主妹才捷剛猛有諸兄風侍婢百餘人皆親執刀侍立先主毎入心常懔懔王隱晉書曰衛瓘􅁥軍護軍鍾㑹素與瓘至厚坐則同床行則同輿㑹書板上欲殺胡烈等示瓘瓘言不可㑹自削弃反問瓘何許聞消息相疑益露瓘厠上見烈故給使令出語三軍㑹逼瓘不得議定經􅀫不眠各撗刀􅂰上陸機晉書曰王濬之在巴郡也夢懸四刀於其上甚惡之濬主簿李毅拜賀曰夫三刀爲州而見四刀爲益一也明府其臨益州乎後果爲益州晉中興書曰􅀄魏徐州刺史任城吕䖍有佩刀工相之以爲必三公可服此刀䖍謂別駕王祥曰苟非其人刀或爲害卿有公輔之量故以相與祥始辭之固強乃受祥爲司空祥死之日以刀授弟覧曰吾兒皆凡汝後必興足稱此刀故以相與覽後弈丗賢興於江東又曰孫恩者亦名靈秀琅邪人孫秀之族也丗奉事北斗之道恩叔泰字敬逺師事錢塘杜子恭弟子子恭有祕術嘗就人借􅀲刀其主求之子恭曰當送相還刀主行至嘉興有魚躍入舩中破魚得􅀲刀其爲神效往往如此又曰郭翻武昌人墜刀於水路人爲取翻仍以與之路人不取至於三四固辭翻曰尓尚不取我豈能復得路人曰我􅀂取此將爲天地􅀑神之所責矣翻知其終不受復沈刀於水路人悵然乃復驚汲爲取之翻於是不逆其意十倍刀價與之其廉不受惠皆此􅀋矣晉書曰元帝以劉琨爲侍中太尉其餘如故并贈名刀琨荅曰謹當躬自執佩馘截二虜又載記曰慕容翰北􅄬宇文歸旣而逃還歸乃遣勁􅀐百餘追之翰遥謂追者曰吾旣思戀而歸理無反靣吾之弓矢汝曹足知無爲相逼自取死也汝可百歩竪刀吾射中者汝便冝反不者可來前也歸􅀐解刀竪之翰一發便中刀鐶追􅀐乃散又曰赫連勃勃以叱干阿利領將作大匠發嶺北夷夏十萬人於朔方之北黒水之南營起都城勃勃自言朕方統一天下君臨萬􅀖可以統萬爲名阿利性尤工巧然殘忍刻􅁀乃蒸土築城錐入一寸即殺作者而并築之勃勃以爲忠故委營繕之任又造五兵之器精銳尤甚旣成呈之工匠必有死者射甲不入即斬弓人如其入也便斬鎧匠又造百錬剛刀爲龍雀大環號曰大夏龍雀銘其背曰古之利器吴楚湛盧大夏龍雀名冠神都可以懷逺可以柔逋如風靡草威服九區丗甚珎之復鑄銅爲大皷飛廉翁仲銅駞龍獸之属皆以黄金飭之列於宫殿之前凡殺工匠數千以是器物莫不精麗蕭子顯齊書曰丗祖武皇帝諱􅄨字宣逺不豫徙御延昌殿乗輿始登階而殿屋鳴咤上惡之詔曰我識滅之後身上着􅀞天衣純烏犀導常所服身刀長短二口鐵環者隨我入梓宫北齊書曰綦母懷文造􅀫鐡刀其法燒生鐵精以重柔鋌數􅀫則成鋼以柔鋌爲刀以五特之脂斬甲三十札今㐮國治家所鑄􅀫鐡柔鋌是其遺法也刀猶甚快利但不能截札耳梁書曰席闡文爲西中郎中兵叅軍領城扄梁武帝之將起兵闡文勸頴曹同焉仍遣客田祖恭私報帝并獻銀裝刀帝報以金如意南史曰韓子髙㑹稽山隂人也家本微賤侯景之亂寓都下景平陳文帝出守呉興子髙年十六爲揔角容㒵美麗􅃺似婦人於淮渚附部伍􅀉載還郷里文帝見而問曰能事我乎子髙許諾子髙本名蠻子帝改名之性恭謹􅁪執備身刀唐書曰李嗣業京兆髙陵人也身長七尺壯勇絶倫天寳􅀄隨募至安西頻經戰􅃲于時諸軍􅀄用陌刀業善用之毎爲隊頭所向必䧟又曰王及善􅀄除右千牛衛將軍髙宗曰朕以卿忠謹故與卿三品要職他人非捜辟不得至朕所卿佩大撗刀在朕側知此官貴否河圗曰恠目勇敢重瞳天􅀨刀楚之􅀖宋均注曰項羽遁甲開山圖曰神芝五色生於名山之隂五色雲氣覆之其味甘苦以銅刀收之又曰霍山有玉石芝生大石上萬人牽終不拔以竹刀割之即断太公六韜曰大擼刀重一斤長四尺三百枚傳咸奏事曰尚書舊奏給介士二百人人給大銅口刀各一枚博物志曰周書云西域獻火浣布昆吾氏獻切玉刀浣布汙燒之則絜切玉刀切玉如泥一云切玉如䗶蜜布漢魏丗有獻者刀則未聞崔豹輿服注曰吴大皇帝有寳刀三一曰百錬二曰青犢三曰漏影拾遺記曰帝解鳴鴻刀賜東方朔朔曰此刀黄帝時採首陽之金鑄爲此刀雄者巳飛雌者獨在一出洞􅁳記林邑記曰林邑王范文先是夷奴􅀄收牛洞中得鱧魚私將還欲食之其主撿求文恐因曰將礪石還非魚也主往看果是石文知異看石有鐵鑄石爲兩刀呪曰魚爲刀􅀂斫石入者文當爲此國王斫石即入人情漸附之裴淵廣州記曰石林竹勁利削爲刀切象皮如纎茅楊泉物理論曰古有阮師之刀天下之所寳貴也阮之作刀受法於金精之靈七月庚辛見金神於治􅁥之門其人光色煒燿向而再拜神執其手曰子可教也阮致之閑宴設饌而問焉神教以水火之齊五精之陶用隂陽之候取剛軟之和行其術三年作刀千七百七十口而䘮其明其刀平背狹刃方口洪首截輕微絶絲髮之系斫堅剛無變動之異丗不恡百金精求不可得也其次有􅂫家刀雖不及阮家亦一時之利器也次有陽紀趙青間皆不能継虞喜志林曰古人鑄刀以五月丙午取純火精以恊其數也魏武帝内戒令曰百錬利器以辟不祥攝服姦宄者也捜神記曰宫亭湖􅀌石有估客下都徑其下見二女子云可爲買兩量絲履自厚相報估客至都有好絲履并箱盛之自市一書刀亦在箱中旣還以箱及香置廟中而去忘取刀湖中正汎忽有鯉魚跳入􅂳中破魚得刀祖台志恠曰廷尉徐元禮嫁女從祖與外兄孔正陽共詣徐家道中有土墻見一小兒倮身正赤手持刀長五六寸坐墻上磨甚駛獨語因跳車上曲蘭中坐反覆視刀輙䑛之至徐家門前枽樹下又跳下坐􅁅中復更磨刀日晡新婦就車中見小兒持刀入室便刺新婦新婦應刀而倒扶還解衣視心腹紫色如酒槃大有頃便亡􅀑子出門儛刀上有血塗枽樹火燃斯湏燒盡神異經曰南荒之中有如之何樹三百歲作華九百歳作實實有核形如棗子長五尺金刀割之則飴木刀割之則辛食之得地仙列仙傳曰丁次卿者不知何許人也漢順帝賣刀遼東市時人名之丁氏次卿有寳刀神仙傳曰蜀人李阿傳丗不老有古強者隨阿入青城山恐有虎狼取父大刀阿見而怒取強刀以擊石刀折敗強竊憂刀敗阿復取刀左右擊地刀復如故還強也列異傳曰有神王方平降陳節方家以刀一口長五尺一長五尺三寸名泰山環語節方曰此刀不能爲餘益然獨卧可使無􅀑入軍不傷勿以入厠溷且不冝乆服三年後求者急與果有戴卓以錢百萬請刀録異傳曰有王更生者爲漢中太守郡界有􅀽氏廟靈響更生過廟􅀕去而遺其刀而遣小史李髙還取刀髙見刀在廟床上髙進取去仰見座上有一君着大冠􅂁衣頭􅁂半白謂髙曰可取還勿道見我後吾當祐汝髙還如言不道後髙仕爲郡守當復遷爲郡髙時年巳六十餘祖髙者百餘人髙乃道昔爲更生小吏見遣至廟所取遺刀見廟神使吾莫道至今不敢道然心常以欺君爲慙言畢此刀立刺髙心下湏􅁷死廬江七賢傳曰漢武帝出淮陽到舒州不覧城問曰此郷名何陳翼對曰郷名不覽上曰萬乗主所問不祥耶欲舉燔之翼曰臣言不欺佩刀當生毛欺則無毛也視之刀有毛長寸乃不燔列士傳曰專諸持一剛刀置魚腹中以刺王僚列女傳曰龐娥親者酒泉龐子夏妻趙君安女君安爲同縣李壽所殺三子遭疫而死壽大喜娥親聞曰李壽汝莫喜焉知娥親不手刃汝耶乃隂市刀志在殺壽後於都亭奮刀斫壽刀折抜壽佩刀断壽頭詣獄求死詔赦之吴時外國傳曰扶南諸王殺其國人以刀斫刺往往有不入者以汗露塗刀刃斫之乃入國人名之曰蟬也蒲元傳曰君性多竒思得之天然􅀋之事出􅀂神不嘗見鍜功忽於斜谷爲諸􅁑亮鑄刀三千口鎔金造器特異常法刀成白言漢水鈍弱不任淬用蜀江爽烈是謂大金之元精天分其野乃命人於成都取之有一人前至君以淬乃言雜涪水不可用取水者猶悍言不雜君以刀􅀞水云􅄂八升何故言不取水者方叩頭首伏云實於涪津渡􅀒倒覆水懼怖遂以涪水八升益之於是咸共驚服稱爲神妙刀成以竹筒宻内鐵珠滿其中舉刀断之應手靈落􅀂薙生蒭故稱絶當丗因曰神刀今之屈耳環者是其遺範也費禕別傳曰孫權以手中嘗所執寳刀贈之禕荅曰臣不才何以堪明命然刀所以討不庭禁􅁀亂者也但願大王勉建功業同􅅄漢室臣雖闇弱不􅀒來頋桂陽先賢􅀞讃曰成武丁以疾而終殮畢其友從臨武縣來至郡道與武丁相逢友曰子欲何之而不將人荅曰今吾南遊爲過報小兒善護大刀到其門見其妻哭泣問之荅曰夫没友大驚曰吾適與相逢乃發棺視了無所見遂除縗絰而心喪之咸以武丁得神仙太平御覽卷第三百四十五
