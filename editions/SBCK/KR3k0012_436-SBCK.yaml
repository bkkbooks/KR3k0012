front:
  text: 太平御覽卷第四百三十六人事部七十七
  hash: sha256:b2be11030ef31a6d3092811e61cfd3da4439586fbfde6e304042218ada8382fe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_436-1a}
body:
  text: 勇四崔鴻十六國春秋前燕録曰將作大匠屯􅀐校尉朝郍侯青武邑人也機巧有筭略驍勇善􅀐射所在先登䧟陳慕容儁擬之張飛又曰成公都􅀳興元呉人也都􅀐猛有勇力陽慮之戰年十八撗矛太呼賊不敢當獨歩當時擬之方叔論者咸曰當求之於古造次無其比也後魏書曰來大千驍果善􅀐射遷中散至於朝賀之日大干常着御鎧盤馬殿庭莫不歎異嘗從太宗獵見虎在髙巖上大干持矟直前刺之應手而死太宗嘉其勇壯又爲殿中給事又曰乙瓌代人也其先世統部落世祖時瓌父正知慕國威化遣瓌入貢世祖因留之瓌便弓馬善􅀐射手格猛獸膂力過人數從征伐甚見信待尚上谷公主世祖之女也又曰􅁃葉爲將有謀略治軍清整常以少擊多士衆服其智勇名冠諸將又曰楊播字延慶自云弘農華隂人也除左將軍㝷假前將軍隨車駕南討至鍾離師廻詔播領歩卒三千􅀐五百爲衆軍殿時春水􅀄長賊衆大至舟艦塞川播以諸軍渡淮未訖嚴練南岸身自居後諸軍賊衆遂集於是圍播數重播乃爲圎陳以禦之身自􅅮擊斬殺甚多相拒再􅀫軍人食盡賊圍更急髙祖在北而望之旣無舟舡不得救援水􅀔稍减播領精􅀐三百歷其舩大呼曰今我欲渡能戰者出賊莫敢動遂擁衆而濟髙祖甚壯之賜爵華隂子又曰河間公齊烈帝之玄孫也少雄傑魁岸世祖愛其勇壯引侍左右從征赫連昌世祖馬蹶賊衆逼帝齊以身蔽捍决死擊賊賊乃退又曰賈思伯字仕休齊郡益都人也世宗即位加輔國將軍任城王之圍鍾離也以思伯持節爲其軍司及失利思伯爲後殿以思伯儒者謂之必死及至大喜曰仁者必勇常謂虚談今於軍司見之矣又曰于栗磾代人也少習武藝拜冠軍將軍道武畋干白登山見熊領數子道武顧謂栗磾曰能􅅞之乎栗磾曰能道武曰􅀂􅅮之不勝豈不虚斃一壯士耶栗磾曰自可能致御前坐而制之㝷而擒之􅀳將劉􅁉遺栗磾書曰黒稍將軍磾常好持黒矟故有其號又曰楊大眼武都氐王難當之孫也少驍勇趫捷走如飛電宣武南征尚書李冲典選統校征官大眼徃求征焉冲不許大眼曰尚書不見知聽下官出一伎便出長繩三丈繫之於髻而走繩直如矢馬馳不及冲大驚曰千載巳來未有此人也遂用爲軍主大眼顧謂同寮曰吾之今日所謂蛟龍得水之秋也自此一舉不復與諸君齊列矣所經戰皆武冠六軍大眼妻潘氏善射詣軍省大眼至攻戰遊獵之際潘氏亦戎裝齊鑣並轡乃至還營同坐幕下對諸寮佐言􅀏自得大眼指謂諸人曰此潘將軍也明帝加光禄大夫淮泗之間童兒啼者恐之云楊大眼至無不立止王秉之􅀄歸國也謂大眼曰吾在南時聞君之名以爲眼如車輪及見君乃不異常人大眼曰皷旗相望瞋眸􅁬發足使君目不能視何必大如車輪又曰文成帝名濬太武孫晃子也即位後冬大儺矅兵帝有勇力善􅀐射靈丘南有山髙四百餘丈詔群官仰射山峯無能踰者帝彎􅓡發矢出山四十餘丈過山南二百歩遂詔刋石勒銘紀功北齊書曰髙昻字敖曹膽力過人姿儀殊異其父次同爲求嚴師加鞭撻昂不遵師訓專事馳騁每言男兒當撗行天下自取冨貴誰能端坐讀書作老􅀶士也其父曰此兒不滅吾族當大吾門以其昂藏敖曹故以名字北史曰逹奚震少驍勇走及奔馬周文嘗渭北挍獵時有兎過周文前震與諸將􅔡射之馬倒而墜震足不傾躓因歩射之矢中兎顧馬纔起遂廻身騰上周文喜曰非此父不生此子陳書曰蕭摩訶齊軍戰有西域胡妙於弓矢弦無虚發衆軍尤憚之及將戰明徹謂摩訶曰􅀂殪此胡則彼軍奪氣君有關張之名可斬顔良矣摩訶曰願識其形狀當爲公取之明徹乃召降人有識胡者云胡着絳衣擭皮弓兩端骨弭明徹遣人覘乃知胡在陣仍自酌以飲摩訶摩訶飲訖馳馬衝齊軍胡挺身出陣前十餘歩彀弓未發摩訶遥擲銑鋧立中其額應手而仆齊軍大力十餘人出戰摩訶又斬之又曰周䥫虎事梁河東王􅊫王僧辨擒欲烹之䥫虎曰侯景尚未滅奈何殺壯士耶僧辨竒之後降髙祖又曰蕭摩訶帥齊兵爲㓂髙祖遣安都北拒齊軍於鍾山龍尾及北郊壇安都謂摩訶曰卿驍勇有名千聞不如一見摩訶對曰今日令公見矣隋書曰宇文慶從武帝攻河隂先登攀堞與賊短兵接戰良乆中石廼墜絶而後􅂫帝勞之曰卿之餘勇可以賈人也又曰楊玄感驍勇多力毎戰親軍長矛身先士卒喑嗚叱咤所當者莫不震懾論者方之項羽又曰魚俱羅馮翊下邽人也身長八尺膂力絶人聲氣雄壯言聞數百歩又曰權武少果勁勇力絶人能重甲上馬嘗倒投於井未及泉復躍而出其拳捷如此又曰長孫晟突厥之内大畏長孫惣管聞其弓聲謂爲霹靂見其走馬稱爲閃電王􅀏曰將軍震怒威行域外遂與雷霆爲比一何壯哉唐書曰丘行恭從討王世充㑹戰於邙山之上太宗欲知其虚實強弱乃與數十􅀐衝之直出其後衆皆披靡莫敢當其鋒所殺傷甚衆旣而限以長堤與諸􅀐相失唯行恭獨從㝷有勁􅀐數人追及太宗矢中御馬行恭乃廻􅀐射之發無不中餘賊不敢復前然後下馬拔箭以其所乗馬進太宗行恭於御馬前歩執長刀巨躍大呼斬數人突陣而出得入大陣貞觀中有詔刻石爲人馬以象行恭拔箭之狀立於昭陵闕前又曰淮陽王道玄拜洛州惣管及府廢改授洛州刺史五年劉黒闥引突厥㓂河北復授山東道行軍惣管師次下􅀶與賊軍遇道玄帥􅀐先登命副將史萬寳督軍繼進萬寳與之不恊及道玄深入而擁兵不進謂所親曰吾奉手詔言淮陽小兒雖名爲將而軍之進止皆委吾今其輕銳越濘交戰大軍道動必滔泥溺莫如結陣以待之雖不利於王而利於國道玄遂爲賊所禽全軍盡没唯萬寳逃歸道玄遇害年十九太宗追悼乆之嘗從容謂侍臣曰道玄終始從朕見朕深入賊陣所向必尅意嘗企慕所以毎陣先登蓋學朕也惜其年少不遂逺圗因爲之流涕又曰王君廓鎮幽州㑹突厥入㓂君廓邀擊破之俘斬二千餘人獲馬五千疋髙祖大恱徴入朝賜以御馬令於殿庭乗之而出因謂侍臣曰吾聞藺相如叱秦皇目皆出血君廓徃擊竇建德將出戰李勣遏之君廓發憤大呼目及鼻耳一時流血此之壯氣何謝古人不可以常例賞之復賜錦􅂁金帶還鎮幽州又曰劉世讓爲并州惣管統兵屯於鴈門突厥處羅可汙與髙開道苑君璋合衆攻之甚急鴻臚卿鄭元璹先使在蕃可汙合元璹來􅀃之世讓厲聲曰大夫奈何爲夷狄作􅀃客􅁘經月餘虜乃退及元璹還述丗讓忠勇髙祖下制襃美之又曰李嗣業賊將李歸仁􅀄以銳師數來挑戰我師攅矢而逐之賊軍大至逼我追􅀐突入我營我師􅅝亂嗣業謂郭子儀曰今日之事􅀂不以身啖㓂决戰於陣萬死而兾其一生不然則我軍無子遺矣嗣業乃脫衣徒􅅮執長刀立於陣前大呼當嗣業刀者人馬俱碎殺十數人陣容方駐前軍之士盡執長刀而出如牆而進嗣業先登􅁬命所向摧靡又曰張濬拜諌議大夫其年冬宰相王鐸至滑臺兼充天下行營都統方徴兵諸侯奏用濬爲都統判官時王敬武􅀄破弘覇郎軍大振累詔徴平盧兵敬武獨不赴援鐸遣濬徃􅀃之敬武巳授僞命復怙強不迎詔使濬至謁見責之曰公爲天子守藩王臣賫詔宣諭而侮慢詔使旣未識君臣禮分復何顔以御軍民哉敬武愕然謝咎旣宣詔軍士按兵黙然濬並召將佐集於鞠塲靣諭之曰人生効忠仗義所兾粗分逆順懸知利害黃巢前日販鹽虜耳公等捨累葉天子而臣販鹽白丁何利害之可論耶今諸侯勤王天下響應公等獨據一州坐觀成敗賊平之後去就何安􅀂能此際排難解紛陳師鞠旅共誅宼盜迎奉鑾輿則冨貴功名指掌可取吾惜公軰捨安而即危也諸將改容引過謂敬武曰諌議之言是也即時出軍從濬入援京師晏子春秋曰昔夏之衰也有推移大戯殷之衰也有費仲惡來足走千里手裂兕虎任之以力凌轢天威專行勇力不顧乎義理是以桀紂以㓕殷夏以衰又曰莊公􅁬乎勇力不顧於行尚勇力之士無忌於國貴戚不薦善偪邇不引過故晏子見公公曰古者亦有徒以勇力立於丗者乎晏子對曰嬰聞之輕死以行理謂之勇誅􅁀不避強謂之力故勇力之立也以行理義也今公自􅁬乎勇力不顧乎行􅁀尚勇力之士無忌於國身立威疆行流􅁋􅁀貴戚不薦善偪邇不引過反聖王之德而脩㓕君之行用此存者嬰未嘗聞有也呉越春秋曰專諸豊邑人伍子胥􅀄去楚如呉時遇之於塗專諸方與人闘其怒有萬人之氣甚不可當其妻一呼即還子胥恠而問其壯何夫子怒之盛聞一女子之聲而即折道寧有􅀃乎專諸曰子視吾之儀寧􅀋愚者耶何言之鄙也夫屈一人之下必申萬人之上子胥因相决之推䫙深目虎口鷹背戾於從難知其勇士也又曰伍子胥見呉王僚王僚望其顔色甚可畏長一丈大十六圍眉間一尺僚與語三日辭無復者賢人也子胥知王好之毎入言語􅋲􅋲有勇壯之氣也孔演漢魏春秋曰許禇之爲人長八尺餘大十圍容貌甚雄勇力絶人漢末賊起禇在汝南與少年相聚及宗族數千家共堅壁相保曹公脩兵汝南禇以其衆歸公公見而壯之曰此樊噲也即日拜都尉引入􅀫衛諸從禇俠客皆爲虎士出入周旋不離左右軍中以禇力如虎癡勇號曰癡虎至今天下稱之皆謂其姓名也呉均齊春秋曰戴僧静㑹稽永興人臨湘侯副大祖在淮隂雅有人鑒見而賞之㑹匈奴卒至僧静應募出戰單力直前虜􅀐奔退又斬三級時天盛寒乃脫衣口銜三頭以刀揷背拍浮而還臨湘侯大賞之曰殺三人亦可反命矣進之於太祖石頭之役功冠諸將遂至貴顯蕭方等三十國春秋曰符洛雄勇多力猛氣絶人坐制奔牛射洞犁耳符堅深憚之故常爲邊守又曰劉陽少驍猛甚有勇力手曳牛尾却行百歩又曰趙將麻秋命黒槊龍騰三千人馳擊謝艾軍艾左右擾動李偉勸艾乗馬艾不從乃下踞胡􅇃而麾衆趙人以爲有伏懼而不進韓詩外傳曰衛靈公晝寢而起志氣益衰使人馳召勇士公孫道遭行人卜啇子夏曰何馳之疾也對曰君晝寢而起使我馳召勇士公孫子夏曰微而勇􅀂者可乎御曰可子夏曰戴我而反至君曰延先生上起召公孫俄而至入門拔劔疾呼曰啇不我取􅀂頭子夏顧叱之曰咄内劔吾將與􅀂言勇於是君令内劔而上子夏曰來吾甞與子從君而北見趙簡子趙簡子􅀍髮仗矛而見我君從十三行之後趍而進曰諸侯相見不冝不朝服君不朝服行人卜啇將以頭血濺君之衣矣使反朝服而見吾君者子耶我耶曰子也子夏曰子之勇不􅀂我一矣又與子從君而東至海曹齊君重鞇而坐從十三行之後趍進曰諸侯相見不冝相臨以其一鞇而去之者子耶我耶曰子也子夏曰子之勇不􅀂我二矣又與子從君於囿中於是兩軍逐我君與拔矛格而還之者子耶我耶曰子也子夏曰子之勇不􅀂我三矣所貴爲士者上不攝萬乗下不放乎疋夫外立節矜敵而不侵掠内禁殘害而君不危殆是士之所長而君子之所致貴也􅀂夫以長掩短以衆􅁀寡凌轢無罪之民而威於閭巷之間者是士之甚毒而君子之所致惡也於是靈公避席曰抑乎寡人雖不敏請從先生勇又曰孔子游於景山之上子路子貢顔回從焉孔子曰君子登髙必賦􅈛願言者何其丘將啓汝子路曰由願􅁬長㦸􅀭三軍乳虎在後仇敵在前􅅮躩快志進救兩國之患孔子曰勇士哉又曰齊莊公出獵有螳蜋舉足將􅅮其轉輪問其御曰此何蟲也對曰此螳蜋者也其爲蟲知進而不知退不量力而輕敵莊公曰以此爲人必爲天下勇士矣於是廻軍避之勇士歸之虞􅄎江表傳曰曹公出濡湏號歩􅀐四十萬臨江飲馬孫權帥衆七萬應之使甘寧領二千人爲前部督權宻勑寜使夜入魏軍寧乃選手下徤兒百餘人徑詣公營下便拔鹿角踰疊入營斬得數十級北軍驚駭皷譟舉火如星寜巳還入營作皷吹稱萬歳因見權權曰聊以觀卿膽耳即賜絹千疋刀百口權曰孟德有張遼􅀌有興覇足相敵也停住月餘北軍乃退劉向列士傳曰秦召公子無忌無忌不行使朱亥奉璧一􅀟謝秦秦王大怒執朱亥着虎圈中瞋目視虎終不敢動殷氏世傳曰亮字子華少好學年四十舉孝廉到陽城遇兩虎争一羊馬不敢進於是亮乃按劔直至虎所斬羊腹虎乃各得其半去時人爲之謡曰石里之勇殷子華􅁀虎見之合爪牙劉昭㓜童傳曰魏太祖㓜而智勇年十歳嘗浴於譙水有蛟來逼自水􅁬蛟乃潜退於是畢浴而還弗之言也後有人見大虵奔逐太祖􅀏之曰吾爲蛟所擊而未懼斯畏虵而恐耶衆問乃知咸驚異焉又曰􅁗舞陽者燕國人也年十二以勇氣聞人犯必殺之莫有敢迕視太平御覽卷第四百三十六
