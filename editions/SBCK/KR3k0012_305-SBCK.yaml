front:
  text: 太平御覽卷第三百五
  hash: sha256:469f5ae347374846ef58ac5fafc45e251896c6ddd7723aa0f26f9ec6c6e4e4bd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_305-1a}
body:
  text: 兵部三十六征伐下􅀃苑曰趙簡子舉兵伐齊有􅀍甲者􅀏之曰子何􅀏對曰臣有􅀫􅀏簡子曰有以􅀃之則可無則死對曰當桑之時臣鄰家夫與妻俱之田見桑中女因追之不能還反其妻怒而去之臣􅀏其曠也簡子曰今吾伐國失國是吾曠也還師而歸又曰中行獻子將伐鄭范文子曰不可得志於鄭諸侯讎我憂必滋長郄至又曰得鄭是兼國也則王者固多憂乎文子曰王者盛其德而逺人歸故無憂今我寡德而有王者之功故多憂今子見無事而欲冨樂者乎新序曰􅁗欲伐楚使使者徃觀楚重寶楚王聞之召令尹子西問焉曰􅁗欲觀楚寳器和氏之璧隋侯之珠可以示諸侯乎封曰臣不知也召昭奚恤問焉對曰此欲觀吾國之得失而圖之非國之重寳也遂使恤應之恤發精兵三百人陳於西門之内爲東西之壇􅁗使者至恤曰君客也請就上位東子西南面太宗子方次之葉公子髙次之司馬子反次之恤自居西面之壇稱曰客觀楚之寳器楚所寳者賢臣也理百姓實倉􅅒使民人各得其所子西在此奉珪璧使諸侯解忿憤之難交兩國之欣使無兵革之憂太宗子方在此守封疆謹境界不侵鄰國隣國亦不見侵葉公子髙在此理師旅正兵戎以當強敵提桴鼓以動百萬人衆使皆赴湯火蹈白刃出萬死不顧一生司馬子反在此􅀂懷霸王之餘義撮治亂之遺風昭奚恤在此唯大國所觀􅁗使者懼然無以對遂揖而去使者反言於􅁗君曰楚多賢臣未可謀也又曰湯居亳七十里地與葛爲隣􅁑伯放淫不祀湯使人問之曰何爲不祀曰無以供犧牲也湯使人遺之牛羊􅁑伯食之又不以祀湯又使人問曰何爲不祀曰無以供粢盛也湯又使衆徃爲耕老弱餽食葛伯率其民要其有酒肉􅁰稻者奪之不受者殺之有一童子以􅁰肉餉殺而奪也書曰葛伯仇餉此之謂也爲其殺是童子而征之四海之内皆曰非冨天下也爲匹夫匹婦報讎也蜀王夲紀曰􅁗惠王欲伐蜀乃刻五石牛置金其後蜀人見之以爲牛能大便金牛下有養卒以爲此天牛也能便金蜀王以爲然即發卒千人使五丁力士拖牛成道致三枚於城郭􅁗道得通石牛力也後遣丞相張儀等將兵隨石牛道伐蜀焉英雄記曰建安中曹操於南皮攻􅀽譚斬之操作鼔吹自稱萬歳於馬上舞也紀年曰周穆王四十七年伐紆大起九師東至于九江比黿以爲梁春秋後􅁗語曰陳軫爲楚使來見􅁗惠王曰卞莊子方刺獸而管竪子止之曰兩獸方食牛牛必甘甘必争争必􅋐􅋐則大者傷小者死從傷而刺之一舉必有􅀟獸之功卞莊子以爲然立待之頃有兩獸之功今韓魏相攻朞年不解是必大國傷小國亡從傷而伐之一舉必有兩實此猶卞莊子刺虎之􅀋也惠王曰善又楚語曰白起將兵伐楚楚人黄歇者遊學􅀶聞襄王以爲辯故使於􅁗說昭王曰天下莫強於􅁗楚今聞大王欲伐楚此猶兩虎相與􅋐而怒犬受其弊不如善楚􅁗王乃止不伐楚約爲與國黄歇受約而歸又趙語曰張孟談隂見韓魏之君曰臣聞脣亡者齒寒今智伯率二君而伐趙趙亡矣趙亡則二君爲之次二君曰我知其然呉越春秋曰夫差令於􅀖中曰寡人欲伐齊敢有諌者死太子友請朝時懷丸挾彈從後園而來衣沾履濡呉王夫差怪而問之太子友對曰臣遊後園聞秋蟬之鳴徃而觀之秋蟬登髙樹飲清露悲吟以爲安不知螳蜋超枝縁條曵􅆎舉刃欲援其形也螳蜋貪心時進志在有利不知黄雀縁茂林徘徊枝葉欲啄螳蜋也夫黄雀知伺螳蜋之有味不知臣躊躇引彈蜚丸之集其背也又曰越王勾踐請大夫種曰􅀌聞呉王淫而好色因此而壞其謀可也大夫種曰可唯君王選擇美女二人而進之於是越王曰善哉乃使相工索國中得苧羅山賣薪之女名西施鄭旦而獻於呉又曰越王念呉欲復承之乃中夜抱柱而哭訖復承之以嘨於是羣臣咸曰君王何愁心之甚夫復讎謀敵非君王之憂自臣下急務也又曰呉王闔閭將伐楚登臺向風而嘨有頃而歎羣臣莫有曉王意者子胥乃薦孫子孫子者呉人也名武善爲兵法僻隱幽居丗人莫知其能孟子曰春秋無義戰彼善於此則有之矣征者上伐下也敵國不相征也吕氏春秋曰智伯將伐仇繇之國山險無道乃遺以大鍾方九䡄仇繇開道迎之因其道取其國韓子曰智伯鑄大鍾遺仇繇由君大悦除道迎之七月由仇亡也又曰闔閭選多力者五百人利止者三千人以爲前陳止足與荆戰五戰五勝遂有郢東征至于庳廬西伐至于巴蜀北廹齊􅀳令行中國又曰凡人之攻伐也非爲利則因名也名實不得國雖彊大則曷爲攻矣解在乎史墨來而輟不襲衛趙簡子可謂知動靜矣晉趙簡子鞅將襲衛史墨徃暏之反曰蘧伯五爲政未可與加簡子輟不伐衛故曰史墨來而輟不襲衛也又曰楚之邊邑曰卑梁其處女與呉之邊邑處女桑於境上戯而侍卑梁之處女卑梁人扶其侍子以讓呉人呉人􅀿之不恭卑梁人怒殺而去之呉人徃報之盡屠其家卑梁公怒曰呉人焉敢攻吾邑舉兵反攻之老弱盡殺之呉王夷昧聞之怒使人舉兵侵楚邊邑堯夷而復去之呉公子光又率師與楚人戰於雞父大敗之獲其師又曰荆莊王欲伐陳使人視之使者曰陳不可伐也莊公曰何故對曰城郭髙溝洫深畜積多也寜國曰陳可伐也寕囯楚臣夫陳小國也而畜積多賦斂重也則民怨上矣城郭髙溝洫􅀷則民力罷矣興兵伐之陳可取也莊王聽之遂取陳又曰箴尹爲荆使於宋司城子罕觴之西家之潦經其庭而不禁箴尹問其故曰西家髙吾宫卑潦不經吾庭不得冩爲是吾不禁也箴尹歸適遇荆欲攻宋箴尹諌於王曰宋不可攻也其君賢相仁賢者得民仁者能用之攻之必無功也淮南子曰堯時十日並出焦禾稼殺草木民人無食羿窳九嬰大風封豕鑿齒脩虵皆爲害堯乃使羿誅鑿齒於疇華之澤南地也殺九嬰於水凶水火之怪在北狄之地繳大風於青立之野大風鷙鳥也射十日而下其九日殺羿窳􅃺如龍首食人在西方也斷脩虵於洞庭在南方擒封豕於桑林封豕大彘也桑林湯禱旱地又曰􅀳伐楚三舎不止大夫擊之莊王曰先君之時􅀳不伐楚及􅀌之身而􅀳伐楚是􅀌之過也􅀂何其辱群大夫曰先臣之時􅀳不伐楚今臣之身而􅀳伐楚此臣之罪也請擊之王俛而泣涕沾襟起而拜羣大夫􅀳人聞之曰君臣爭以過爲在巳不可伐也夜還師而歸又曰諸侯伐􅁗及涇莫濟魯襄十一年􅀳悼公伐鄭秦人伐􅀳救鄭十四年晉使六卿帥諸侯之大夫伐􅁗至涇水無有先渡者也􅀳叔嚮見叔孫穆子曰諸侯伐不恭而討之及涇而止於􅁗何益何益於伐􅁗之事穆子曰豹之業及匏有苦葉矣不知其他業事匏有苦葉詩風篇名匏有苦葉濟有􅀷渉深則厲淺則揭言其必濟不知其他叔嚮退召舟虞與司馬舟虞掌舟司馬掌兵曰夫苦瓠不材於人共濟而巳材若裁也不裁於人言不可食共濟而巳佩匏可以渡水魯叔孫賦匏有苦葉必將渉矣詩以言志具舟除隧不共有法隧道共具也舟虞具舟司馬除道法刑也是行也魯人以莒人先濟諸侯從之又曰文公立四年楚成王伐宋四年魯僖二十七年冬也宋背楚事􅀳故楚伐之公率齊􅁗伐曹衞以救宋魯僖二十八年春􅀳侯侵曹伐衛傳曰楚始得曹而新婚於衛也宋人使門尹班告急於􅀳門尹班宋大夫公告大夫曰宋人告急舎之則宋絶舎不救則宋降楚與我絶告楚則不許我告請請宋於楚楚不許我我欲擊楚齊􅁗不欲其􅀂之何又曰自大畢伯士之終也大畢伯士犬戎氏之二君終卒也犬戎氏以其職來王以其職謂其嗣子以其貴寳來見王天子曰予必以不享征之且觀之兵享賔服服禮以責犬戎而示之兵非也其無乃廢先王之訓而王幾頓乎幾危頓敗吾聞夫犬戎樹敦樹立言犬戎立性悙撲師舊德而守終純固師循也純專固一言犬戎氏脩先王之舊德奉其常職天性專一終身不移不聽穆王貴其厚享也其有以禦我矣禦應距也王不聽遂征之得四白狼四白鹿以歸白狼白鹿犬戎自是荒服者不至穆王責犬戎非禮􅁀兵露師傷威毁信荒服者不至又曰啇王帝辛大惡于人啇殷人本號辛紂名大惡大爲人所惡也庶人不忍欣載武王以致戎于啇牧載奉武兵牧啇郊牧野也是先王非務武也勤恤人隱而除其害恤憂隱痛又曰忠臣者務崇君之德讇臣者務廣君之地何以明之陳夏徵舒殺其君楚莊王伐之陳之人聽命莊王巳討有罪遣卒戍陳戍守也欲守陳大夫畢賀申叔時使於齊及還而不賀莊王曰陳爲無道寡人起六軍以討之征暴亂誅罪人群臣皆賀而子不賀何申叔時曰人有牽牛而徃蹊於人之田中田主殺其人而奪之牛罪則有矣罰亦重矣今君王以陳爲無道舉兵而征之因誅罪人遣卒戍陳諸侯聞之非以王爲誅罪人也貪陳國也蓋聞君子不棄義以爲利王曰善乃罷陳之戍後諸侯聞之朝於楚此務崇君之德也始張式爲智伯謀張式􅀳人􅀳六將軍中行子取弱而上下離心可伐以廣地於是伐范中行滅之矣又教智伯求地於韓魏韓魏裂地而授之趙氏不予乃率韓魏而伐趙圍晋陽三年三國隂謀遂滅之此務爲其君廣地也夫爲君崇德者霸爲君廣地者㓕故千乗之國文德行者王湯武是也萬乗之國好廣地者亡智伯是也莊子曰犀首請魏伐齊季子諌勿伐華子聞而醜之曰善言伐齊亂人也善言勿伐亦亂人謂伐之與不伐亂人者又亂人也列子曰􅀳文公出㑹欲伐衛公子鋤御而􅀏之公問之對曰􅀏臣鄰之人也鄰之人有送其妻適私家者道見桑婦恱而與之言然顧視其妻亦有招之者臣竊􅀏此也公悟乃引師而還未至而有伐其北鄙矣墨子曰天賜武王黄鳥之旗以伐紂又曰湯在鏕宫夢神謂之曰夏桀無道汝克戡之孫卿子曰堯伐驩兠舜伐三苗禹伐共工湯伐有夏文王伐崇武王伐紂此兩帝四王者仁義之兵於天下也尉繚子曰武王之伐紂也河水逆流左􅆖霆死地方百里戰卒三萬紂之陣起自黄鳥至于赤斧其間百里武王不罷士民兵不血刃克殷誅紂其人事然韓子􅀳獻公欲伐虞􅉑乃遺之屈産之乗垂􅁄之璧女樂二八以縈其心以亂其政阮嗣宗爲鄭冲勸􅀳王牋曰前者明公東誅叛逆全軍獨尅禽闔閭之將斬輕銳之卒以萬萬計太平御覽卷第三百五
