front:
  text: 太平御覽卷第六百六十七道部九
  hash: sha256:e3df8f3df59464bfc0773c550e42df7fa6052f3f61f00a133ca27de53c5a6d15
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_667-1a}
body:
  text: 齋戒太上經曰思神録氣習法登階名之爲齋太極眞人曰齋莫過乎靈寳其法髙妙不宣於世仙聖口訣祕而不書太一齋法玄之又玄指教經曰奉道不齋戒如無燭夜行失道自苦耳太眞科曰修三守一齋爲本基學道以齋戒爲夲太上所重老氏所營仙眞所頼又曰道士能日中一食不飱穢惡隨月齋戒晝夜不怠不害一切拔度蜎飛當得至道又曰道士修經習業以道德二篇爲先齋戒受之度人濟巳也又曰救解父母疾病當齋官露臺齋中奏子午章苦到必感又曰􅀇清玉皇之道上皇天帝授太微天帝君三元紫精君眞陽元老君後以付太上道君以傳金闕李君李君傳太靈眞人南岳赤君又紫元夫人以傳清靈王君王君傳南岳魏夫人夫人傳楊君使授許長史及􅁺授受者齋戒七日又曰衆眞授道先齋戒百日或三十日或十日又當先告齋一日以洗素心三千年六傳尋上經齋戒無如此者行之十四年太上迎以玉輪登上清爲上眞三皇經曰凢齋戒三事以定心口身之業也又曰凢齋戒講讀元譜大經佩服内文以成其道又曰凢齋者佩服三皇内文以成隱顯道登眞隱訣日道齋謂之守静謂齋定其心潔静其體在乎澄神遣務檢隔内外心齋者也又曰修道之人湏齋戒禮謝七世之愆又曰上清每以􅁻日㑹五眞凢修道之人當其􅁻日思存􅁻事心願飛仙立德施惠振救窮乏此太上之事也當湏齋戒遣諸􅄂念宻處静室眞誥曰齋戒不可雜處必亂正道也凢甲寅庚申之日是尸􅀑競亂精神躁穢之日當齋戒不寢遣諸可欲凢五夘之曰常當齋戒入室東向心拜在神念氣適意所陳又曰漢建安中左慈聞句曲山在金陵通峨眉羅浮故渡江尋之遂齋戒三月而登此山乃得其門入茅君受以三種神芝􅀫啓功儀曰捧香仙女下衛齋戒之人又曰太極眞人受太上口訣千歳五傳依隱書之制齋戒五日乃授立約珠囊曰凢八五岳以甲子上旬之日沐浴齋戒七日乃行􅀂名山有芝英竒藥者奉之作素奏丹書其文乞登仙度世飛行上清再拜放自鷄犬各一於石上而去然後求芝英竒藥所欲必獲惡􅀑老魅不敢試人􅀂學道不知此術入山多厄抱朴子曰家有三皇圖必先齋戒百日乃召致天地五岳社稷之神後聖君命清虚小有真人撰集上仙眞籙緫名爲上眞正法以慴萬邪百年再授于人湏齋戒方得三元品經曰學道之夲當先修中元齋戒之法贖罪謝過於太眞則書名􅀇圖靈寳赤書曰元始五老諸天帝皇帝以歳六齋之月㑹於上三天靈都宮元陽紫微之臺集筭天元推校運度又云紫微宫舊格丹書白素齋戒百日誦之太素玉籙經曰齋戒存思誦習此經精進無怠神通智逹位爲太素眞人太平經曰眞人云人之精神常居空閑之處不居汙濁之間也欲思還神皆當齋戒香室中百病自除不齋戒則精神不肯返人也皆上天共訴人所以人病積多死者不絶八素奔辰訣日七曜五星審識形色見之早晚於庭伺之􅀂晦􅁳之夕皆於寢室存念齋戒修行如存奔日月之法日中赤氣紫芒者爲曜靈九神華芒也月中黄氣白光八朗之芒是爲月華夜精道人皆知服日月之氣而吸九華靈芒能修存奔日月之道安妃授楊君書二卷皆是竒法日月之道甚多髙妙上清金闕靈書曰太上之吉㑹日者髙眞集宴慶獻之日也廻元者太上之更始日也甲子隂陽之首氣月晦改度之􅀄萌故爲新日也不知此日者不得解罪除過不得刻簡上眞當湏齋戒於是日思存􅁻事此廻元訣也又曰黄庭内景經一名太上琴心文又名大帝金書扶葉大帝君宫中盡誦此經金簡刻書之故曰金書又名東華玉篇東華者方諸宮名東海青童君所居也其中仙曹多齋戒誦詠刻玉書之又曰太極左眞人曲素訣辭一名九天鳯氣􅀇丘大眞書太上授太極左眞人眞人傳東海方諸宮青童大君使傳道士􅀫有名應神仙眞人者佩之二十年得見三元君齋戒青金之誓以代􅉀約八道祕言日欲行九眞之法者齋戒静室至湏專寂心禱飛仙上登紫庭又曰九天鳯氣􅀇丘眞書􅀇都丈人仙科授佩齋戒三日佩之者得仙道德經序訣曰尹喜知紫氣西邁齋戒想見道眞及老子度􅀜授二篇經義靈書經曰十部妙經金字玉簡諸天眞仙齋戒月日上詣玉京誦其文威儀經曰齋戒景福度人先爲先人後巳與志􅀇同一夲行書日授靈寳赤書者必先齋戒東卿司命經曰先師王君昔見授太上明堂􅀇真上經齋戒休粮存念日月咽服光芒之液常宻行之此上眞道也太上􅀇眞經先盟而後行行之然後可聞玉佩金璫之道耳季偉昔長齋三年竭誠殫思乃能得之神光映身然後受書此眞􅀇之道要而不煩吾常祕寳藏之囊肘故以相示愼宻者也好道者欲求神山冝先齋戒登山昔左慈齋戒三月拜禮靈山竭誠三年然後二茅君引前又曰黄庭内景玉經曰扶桑太帝君命賜谷神王傳南岳夫人授受齋戒九日又曰三元眞一經金闕帝君所守東海小童以傳㳙子㳙子傳􅂫君􅂫君傳周君授受齋百日或五十日或三十日或七日四十年傳一人十人止後聖道君命清靈小有天王修集上仙眞籙緫名紫元夫人傳王君王君傳南岳魏夫人夫人傳楊君楊君傳許􅁺授受齋三日或七日鳯眞之文大上授太極左眞人眞人傳東海方諸君青童君此亦衆眞相傳授受齋三日佩之九年得見二元君於上清金闕又曰太上智慧經太上付上相又紫元夫人傳王君而王君傳南真南真傳楊君今授許長史􅁺授受齋戒五十日又曰太丹隱書飛真之道存想之法也此蓋楊君止抄一經誦以與長史耳亦獨九真之龍書也未見齋戒之法不可遵行眞誥有朝太素法云受洞决旋行太丹隱書存三元洞房者即謂此也但不具耳世有周君學注洞房事亦是抄耳此經語而注之爲施修之法未見眞夲而事旨不具名山記曰大茅山有小穴口石塡之但精心齋戒可得而遊中茅山東亦有小穴穴口如狗竇劣容人入耳愈入愈闊外以盤石掩塞穴口故餘小穿如杯大使山靈守衛之此磐石亦時開發􅀂勤懇齋戒尋之得從而入易於常洞口好道者欲求神仙冝預齋戒則三茅君於句曲見之授以要道入洞門句曲有五門立志齋戒三月尋登此門者可入矣九天經曰玉輔上宰齋戒建節侍於太清法輪經曰仙公齋戒未及歳年而感召天眞下降浄室又曰念眞齋戒緘口愼言靈寳大戒經曰不受大戒徒爲長齋四極明科經曰凢學上清之道奉其宗師入室齋戒太上科曰凢經從師受皆眞官侍衛湏齋戒講誦雌一五老經曰長修善行日中乃飰齋戒三年乃得受太洞眞經大上丹簡墨籙曰道之去聖日已逺矣傳冩科戒謬誤者衆􅀂有所疑師不能解者可齋戒一月求靈應之審靈仙感降報語於人傳授經曰齋者簡素爲上神先映身集仙籙曰崑崙􅀇圃見正一眞人勤苦齋戒讀經崇道太宵琅書曰立三夲書一爲長鎭一爲供齋一爲研習者常自隨所住室中別置格上躬自出入勿使委非其所冩經之時湏先齋戒經中有圖圖或別卷各有侍官典圖眞吏請問經曰道不存師齋誦無感玉佩金璫經曰衆眞登太瓊臺齋戒三月崆峒經曰太上道君齋戒於西那玉國羅浮之岳又曰青精䭀飵方太極眞人傳王君授受之際齋戒十日二千六百年傳十人雲牙玉方王君傳南岳魏夫人齋戒五日服之可以絶􅂖去尸虫王君遊觀天下詣􅀛山齋三月又齋戒三年詣太素還西城又齋三月受書周君少遇中央黄老君遊丹城乞長生度世之道授以上眞之道乃還登常山石室中齋戒念慮乆歴歳時後仙去道學傳曰左敦字尚隱雲陽人雲陽山即茅山也敦所居山舎西十五里有一石室西南二里復有一石室皆容數十人西南室父老傳云有銅牛出皆銅靷銅卷相傳號爲絧室曲入至深立北通潢池而洞崑崙毎三元齋戒之日敦徃二室祈禱皆髣髴眞形又曰陸脩静字元德呉興人太始七年率衆建三元露齋太眞上倉元上録經曰凢有生之域清少濁多􅁾障相纒行善不立邪氣來侵強魔守試上學之人齋戒存思禁隔􅅝塵非􅀋之物唐突去來皆是穢濁當擇日齋戒佩破淹之符以昇玉清太平御覽卷第六百六十七
