front:
  text: 太平御覽卷第七百七十一舟部四
  hash: sha256:e0a928353b541c4d3d205be737f217b56b6ac1164ed5cd35d094698ac3f50045
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_771-1a}
body:
  text: 艇舴艋筏檝篙槳櫓柂䌫笮㠶㠶檣五兩榜桅筌􅰢牂柯泝斗艇釋名曰二百斛以下曰艇其形艇一人二人所乗行者也廣雅曰舼音卭艇舟也淮南子曰越舼蜀艇不能無水而行陸機思歸賦曰棹河淵之輕艇舴艋上知格切下音猛廣雅曰舴艋舟也臨海記曰西北有白鵠山髙三百丈上有一舟名舴艋前頭有石鼓石艇丗云石鼓鳴則􅁟地㓂亂隆安􅀄此鼓屢鳴果有孫恩賊此處多山精水祟不可輕陟山下平地便望見舴艋民王志􅀕山神求到鼓所遂得至捉搥打鼓閭里咸聞如金玉之響下山便病死蓋登山召禍撃鼓自殺也異苑曰檀道濟元嘉中鎮㝷陽入朝伏誅濟未下時有人施􅅈於柴桑江収得大舡孔鑿􅀂新使匠作舴艋云勿斵工人誤截兩頭檀以爲不祥殺三巧手欲以塞諐匠違約加斵凶兆先遘矣宋元嘉起居注曰有司奏云楊州刺史王弘上㑹稽從事韋詣觧列先風聞餘姚令何玢之造作平床一乗舴艋一艘精麗過常用功兼倍請免玢今官詔可其奏筏論語曰道不行乗桴浮于海從我者其由與子路聞之喜東觀漢記曰吴漢教乗筏從江下巴郡盗賊解散張堪爲陪義長公孫述遣撃之有同心士三千人相謂曰張君養我曹爲今日也乃選習水三百人斬竹爲椑渡水英雄記曰曹操進軍至江上欲從赤壁渡江無舡作竹椑使部曲乗之從漢水來下出大江注浦口未即渡周瑜又夜宻使輕舡走軻百艘燒椑操乃夜走吴録曰孫䇿欲渡江舡少欲徃便求䇿姑王氏分命伐蘆爲樑以佐舡渡人吴録地理志曰蒼梧髙要縣郡下人避瘴氣乗筏來停此六月來十月去歳歳如此雷次宗豫章記曰望蔡縣有一石室入室十餘里得水廣數十歩清深不測邊有筏竹遊者伐竹爲筏過水莫能究其源出好鍾乳淮南子曰方車蹠越乗桴入朝欲無寵不可得也許填曰桴木筏越絶書曰木客大冡者勾踐之兄弟冢也􅀄徙之琅邪使樓舡卒二千八百人松栢以爲桴故曰木客也檝說文曰檝舟棹也書曰􅀂濟巨川用汝作舟檝詩曰檜檝松舟方言曰檝或謂之撓或謂之擢吴越春秋曰子胥伐楚因引軍襲鄭治漁者之子在鄭乃還列女傳曰趙簡子南撃荆至河津津吏醉卧不能渡簡子怒將殺之津吏之女姢乃持檝而前走曰妾父聞主君將渡恐風波之起水神動駭故禱祝九江三淮之神不勝杯杓餘􅄋醉於此君命之誅願以微軀易父之死簡子將渡用檝少一人姢曰妾居河濟之間重乎丗習舟檝之事願備貟持檝簡子遂與渡中流呤河激之歌簡子乃娉以爲夫人其母遽曰河水激揚濟之不易淮南子曰七尺之檝動大舡者因水爲資也人君發一言之號而令行於民者衆爲資也說苑曰襄城君始封之日衣翠衣帶玉鈎履縞舄立乎流水之上大夫莊辛過而說之曰願把君之手其可乎襄城君作色不言莊辛遷延稱曰君獨不聞鄂君乗青翰之舟張翠蓋㑹鍾鼓之音越人擁檝而歌曰今夕何夕兮寨州水流今日何日兮得與子同舟山有木兮木有枝心恱君兮君不知於是鄂君榆􅃑而擁之舉繡􅀍而覆之襄城君乃奉手進之楊子法言曰灝灝音浩于海濟樓舡之力也航人無檝如航河李􅁤注曰喻有民無禮樂治也抱朴子曰瓊艘瑶檝無渉川之用金弧玉弦無激矢之能是以斤㓗而無政事者非撥亂之器儒雅而乏治略者非翼亮之才左思吴都賦曰篙音髙工檝師選自閩隅翼御長風狎翫靈胥篙方言曰所以刺舡謂之篙盛弘之荆州記曰魚復縣瞿唐灘上有神廟先極靈驗刺史二千石經過皆不鳴鼓角篙旅恐觸石有聲乃以布裹篙頭王韶始興記曰含進公口下流有枯木曰聖鼓上下人以篙犯之者皆虐喻益期與韓豫章牋曰馬伏波昔開道篙跡鑿石猶存槳方言曰所以隱擢謂之槳郭璞注曰摇僧小耕也江東含呼胡人也楊泉五湖曰赤檜升棹檀槳細堅櫓釋名曰在旁曰櫓櫓旅也用旅力然後舟行也吴志曰吕蒙襲􅀜羽至㝷陽晝伏精兵於䑦􅑳中役白衣揺櫓作啇賈服晝夜兼行至羽所置屯候盡収縳之是故羽不聞知遂到南郡柂釋名曰舡尾曰柂也在後見拖曵且弼正舡不使他戻也方言曰舡後曰舳好舳制水也郭璞曰今江東呼爲軸也孫放別傳曰􅁃公建學校孫君年最㓜入爲學生班在諸生之後公問君何獨居後荅曰不見舡拖耶在後所以正舡㝷陽記曰盧山西嶺有甘泉曽見一拖從山嶺流下此溪中人號爲拖下溪宣穆所遣人見山湖中有敗艑而後拖流下信其不妄孫綽子曰動而不乗不理􅀂汎舟而無拖趙壹嫉邪賦曰奚異渉海之失拖坐積薪而待燃張華遊仙詩曰遊仙迫西極弱水隔流沙雲榜鼓霧拖飃忽陵飛波䌫爾雅曰汎汎楊舟紼縭維之紼索也縭緌也郭璞曰索也緌吴書曰甘寜住止常以繒錦䌫舟去輙割弃以示奢笮音鑿纂文曰竹索謂之笮茅索謂之索釋名曰引舟者曰笮笮作也起舟使動作也漢鼓吹曲曰桂樹爲君舡青􅁝爲君笮木蘭爲君棹黄金錯其間㠶釋名曰隨風張幔曰帆帆汎者舟疾汎汎然也韻集曰颿舡張也颿音凢馬疾歩也義以與㠶同長沙􅂄舊傳曰夏隆仕郡時潘濬爲南征太守遣隆脩書致禮濬飛㠶中流力所不及隆乃於岸邊抜刀大呼指濬爲賊因此􅀍收濬竒其以權変自通解縛賜以酒食吴時外國傳曰從加郍調州乗大伯舶張七㠶時風一月餘日乃入􅁗大􅁗國也南州異物志曰外徼人隨舟大小或作四㠶前後沓載之有盧頭木葉如牖形長丈餘織以爲㠶其四㠶不正前向皆使邪移相聚以取風吹風後者激而相射亦並得風力􅀂急則隨冝城減之邪張相取風氣而無髙危之慮故行不避迅風激波所以能疾永嘉記云郡有石帆又有破石傳云古有神人以破石半爲㠶故名石帆吴郡録海記曰海虞縣有穿山下有洞穴髙十丈廣十餘丈山昔在海中行侣舉㠶從穴中過陸景典語曰􅀌特與水軍一萬從風舉㠶朝發海島暮至呇渚郭璞江賦曰舳艫相接萬里連檣泝洄㳂流或漁或啇也五兩淮南子曰􅀂綄胡管切之候風也許慎曰綄􅃸風扇也楚人謂之五兩兵書曰凢候風法以雞羽重八兩建五重旗取羽繫其巓立軍營中郭璞江賦曰氣氛梫於清旭覘五兩之動静榜􅀘孟切明堂月令曰榜舫人習水者也司馬相如上林賦曰榜人歌聲流喝烏邁切釋名曰舡筌􅰢桅釋名曰舡前立柱曰桅桅巍也巍巍髙皃也筌􅰢釋名曰舟中牀以薦物者曰筌言伹有簀也筌牀也其上板曰􅰢言所覆衆慮也牂柯魏略曰沐並字徳信少有志氣吴將朱然圍樊城遣兵於硯山斫牂柯材兵作食先熟者呼共食後熟者曰不也呼者曰汝欲作沐徳信耶其名乃播異域雖華夏不知者以爲前丗人也華陽國志曰楚頃襄王遣將軍莊蹻泝沅水岀且蘭且干余切以伐夜郎王㭬牂柯擊舡於且蘭旣克夜郎而􅁗奪楚黔中地無路得歸遂留王之號爲莊王以且蘭有㭬舡牂柯處因改其爲名牂柯異物志曰牂柯者繫舡筏也其山在海中小而髙以繫舡伐也俗人謂之越王䍧柯逺望甚小而髙不似山望之以爲一株樹在水中也㝷陽記曰郡西北有一松楊樹枝條繁茂垂隂數􅅿傳云陶桓公䍧柯成此樹豫章記新淦音紺縣北二十五里曰封溪今有聶友所伐梓繫着䍧柯處昔聶友於此左右夜照射遇一白鹿友遂射之鹿帶箭走友即躡跡追㝷不得見向箭着一梓樹友即伐樹數斧便有血出而落之梯隨復故創音瘡不可得斷友更多將手刀復伐之輦其梯而焚之樹遂斷斫以二板以還繫着渚下以樟木爲䍧柯後友舡行遇風舡皆没唯友舡獨全㝷看乃向椊板夾扶其舡友大異之後友在京都此板於豫樟來至友許輙有大喜中更異梓板至輙有憂所用樟木爲牂柯者遂生爲樹今猶存其木合抱始到植之今枚條皆向下板門中亦述其事泝斗與折同廣雅曰泝斗謂之栕以之切纂文曰杼水斗也太平御覽卷第七百七十一
