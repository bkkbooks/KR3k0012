front:
  text: 太平御覽卷第五百八
  hash: sha256:b1bf4ee3ff5dfbc645ae2201dfdf072045fb5cd4a6ae9a6ece835b4134568784
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_508-1a}
body:
  text: 逸民部八逸民八皇甫士安髙士傳曰摰峻字伯陵京兆長安人少治清節與太史令司馬遷交好峻獨退身修德隱於􅛪山遷旣親貴乃以書勸峻進曰遷聞君子所貴乎道者三太上立德其次立言其次立功伏惟伯陵材能絶人髙尚其志以善厥身氷清玉㓗不以細行累其名固巳貴矣然未盡太上之所由也願先生少致意焉峻報書曰峻聞古之君子料能而行度徳而處故悔恡去於身利不可以虚受名不可以苟得漢興巳來帝王之道於斯始顯能者見利不肖者自屏亦其時也周易大君有命小人勿用徒欲偃仰從容以送餘齒耳峻之守節不移如此遷居太史官爲李陵游說下腐刑果以悔恡􅀍辱峻遂髙尚不仕卒於􅛪􅛪人立祠号曰􅛪君又曰韓福者涿人也以行義脩㓗著名昭帝時將軍霍光秉政表顯義士郡國條奏行􅃺天子得福等五人行義㝡髙以德行徴至京兆病不得進元鳯元年詔䇿曰朕􅉖勞福以官職之事賜帛五十疋遣歸其務修孝悌以教郷里福歸終身不仕卒于家又曰安丘望之京兆長陵人也少治老子經恬静不求進官號曰安丘丈人成帝聞欲見之望之辭不肯見上以其道德深重常宗師焉望之不以見敬爲髙愈自損退爲巫醫於民間著老子章句故老氏有安丘之學扶風耿况王伋等皆師事之從受老子終身不仕道家宗焉又曰丘訢字季春扶風人也少有大材傲丗不能與俗人爲群郡召始見曰明府欲臣訢耶友訢耶師訢耶明府所以尊寵人者極於功曹所以榮禄人者巳於孝廉一極一巳皆訢所不用也府君異之遂不敢屈三輔决録曰丘訢傲俗自謂無伍又曰荀靖字叔慈父淑有名績靖兄弟八人号曰八龍靖至孝闔門悌睦隱身脩道弟爽字慈明亦有材學汝南許章稱二人皆玉也慈明外朗叔慈内潤太尉辟不就及終頴陽令丘禎号靖曰玄行先生頴川太守王懷亦謚曰昭定先生又曰任棠字季卿以春秋教授隱身不仕龐參爲漢陽太守就家候棠以薤一夲水一盆置户屏前自抱孫兒伏户下叅曰棠是欲諭太守也水欲太守清也㧞一夲薤欲太守擊強宗也抱孫兒當户者欲太守開門恤􅀌也終叅去不言詔徴不至及卒郷人圗畫其形至今稱任徴君也又曰張仲蔚平陵人與同郡魏景卿俱修道德隱身不仕明天官愽物善屬詩賦所處蓬蒿没人閉門飬性不治榮名時人莫識唯劉龔知之又曰髙恢字伯逺少治老子經恬虚不營丗務與梁鴻善隱於華隂山又曰姜肱字伯淮彭城廣戚人也家丗名族肱兄弟三人皆孝行著肱年㝡長與二弟仲海季江同􅀍卧甚相親友及長各娶兄弟相愛不能相離習學五經兼明星緯弟子自逺方至者三千餘人聲重於時凡一舉孝廉十辟公府九舉有道至孝賢良公車三徴皆不就仲季亦不應徴辟建寧三年靈帝詔徴爲犍爲太守肱得詔乃告其友曰吾以爲虚􅀗實遂藉聲價盛明之丗尚不委質况今政在私門哉乃隱遯命乗舡浮海使者追之不及再以􅀇纁聘不就即拜太中大夫又逃不受詔名振天下年七十卒于家又曰徐稚字孺子豫章南昌人也少以經行髙於南州桓帝時汝南陳蕃爲豫章太守因惟薦稚於朝廷由是三舉孝廉賢良皆不就連辟公府不詣未嘗荅命公薨輒身自赴弔太守黄瓊亦嘗辟稚至瓊薨歸葬江夏稚旣聞即負笈徒歩豫章三十餘里夏瓊墓前致酹而哭之後公車三徴不就以壽終又曰夏馥字子治陳留圉人也少爲諸生質直不茍動必依道同縣髙儉及蔡氏凡二家豪冨郡人畏事之唯馥閉門不與髙蔡通桓帝即位災異數發詔百司舉直言之士各一人太尉趙戒舉馥不詣遂隱身乆之靈帝即位中常侍曹節等專朝禁錮善士謂之黨人馥雖不交官然聲名爲節等所憚遂以汝南范滂山陽張儉等數百人並爲節所誣悉在黨中詔下郡縣各捕以爲黨魁馥於是頓足而歎曰㜸自巳作空汙良善一人逃死禍及百家何以生爲乃剪􅂡變服易形改姓入相慮山中爲冶工客作形貌毀悴積傭三年而無知者後詔悉放儉等皆出馥獨歎曰以爲人所棄不冝復齒郷里矣留賃作不歸家人求不知所處其後人有識其聲者以告同郡上黨太守濮陽潜潜使人以車迎馥馥自匿不肯見潜車三返乃得馥又曰申屠蟠字子龍陳留外黄人也少有名節同縣大女雖玉爲父報仇外黄令梁醜欲論殺玉蟠時年十五爲書生進諌曰玉之節義足以感無耻之孫激忍辱之子不遭明時尚當追旌廬表况在清聽而不加哀矜醜善其言乃爲讞減死論人稱之及父母卒蟠思慕不飲酒食肉十餘年遂隱居學治京氏易嚴氏春秋小戴禮三業先通因􅀶貫五經兼明圗緯學無常師始與濟隂王子居在太學子居病困以身託蟠蟠即歩􅀒其喪至濟隂遇司􅀠從事於河鞏之間從事義之爲符傳護送蟠蟠不肯􅄬傳於地而去事畢還家前後凡一察蒲車特徴皆不就年七十四以壽終又曰郭泰字林宗太原人也少事父母以孝聞身長八尺餘家貧郡縣欲以爲吏歎曰大夫何能執鞭斗筲哉乃辝母與同郡宗仲至京師從屈伯彦學春秋􅀶洽無不通又審於人物由是名著於陳梁之間歩行遇雨巾一角蟄衆人慕之皆折巾角士争往從之載䇿􅄹車凡㤗知之於無名之中六十餘人皆先言後驗以母喪歸徐稚來吊以生芻一束頓泰廬前而去泰曰􅀯州髙士徐孺子也詩曰生芻一束其人如玉吾不堪此喻後辟司徒府有道徴皆不就又曰􅀽閎字夏甫汝南人也築室於庭中閉門不見客旦於室中向母拜雖子徃不得見也子亦向户拜而去首不着巾身無單衣足着木履母死不列服位公車再徴不詣范滂羙而稱之曰隱不違親身不絶俗可謂至賢也又曰牛牢字君直丗祖爲布衣時與牢遊夜講訖共言䜟劉秀當爲天子丗祖曰安知非我萬一各言爾志牢獨黙然丗祖問之牢曰丈夫立義不與帝友衆大􅀏及丗祖即位徴牢稱疾不至詔曰朕㓜交牛君直淸髙士也􅁪有疾州郡之官者常先到家致意焉刺史郡守是以每輒奉詔就家存問牢恒􅀍髪稱疾不荅詔命又曰成公者成帝時自隱性名嘗誦經不交丗利時人號曰成公成帝時出遊問之成公不屈節上曰朕能冨貴人能殺人子何逆朕哉成公曰陛下能貴人臣能不受陛下之官陛下能冨人臣能不受陛下之禄陛下能殺人臣能不犯陛下之法上不能折使郎二人就受政事十二篇又曰彭城老父者楚之隱人也見漢室衰乃自隱修道不治名利至年九十餘王莽時徴故光禄大夫龔勝欲爲太子師友􅀕酒耻事二姓莽迫之勝遂不食而死莽使者及郡守巳下㑹斂者數百人先生痛勝以名致禍乃獨入哭勝甚悲旣而曰嗟乎薫以香自燒膏以明自煎龔先生夭天年非吾徒也哭畢而起出衆莫知其誰又曰宋勝之字即子南陽安衆人也少􅀌年十五失父母家于榖城中孝慕甚篤中化之少長有禮勝之毎行見老人檐負輒以身代之獵得禽獸嘗分肉與有親者貧依姉居數􅀊乃至長安受易通明以信義見稱從兄裒爲東平内史遣吏召之勝之曰衆人所樂者非勝之願也乃去遊太原從郇越牧羊以琴書自娱丞相孔光聞而就太原辟之不至元始三年病卒于太原又曰東海隱者漢故司直王良友人建武中良以清節徴用歷位至一年復徴還見友不肯見而讓之曰不有忠信竒謀而取大位自知無德曷爲致此而復遽去何徃來屑屑不憚煩也遂距良終不納論者髙之又曰韓順字子良天水成紀人也以經行清白辟州宰不就王莽未隱於南山地黄四年漢兵起於南陽順同縣隗囂等起兵自稱上將軍西州大震唯順脩道山居執操不廽囂以道術深逺使人賷璧帛車辭厚禮聘順欲以爲師順因使謝囂曰禮有來學義無徃教即欲相師但入深山來囂聞矍然不敢強屈其後􅅝等諸姓皆滅唯順山栖安然以貧㓗自終焉又曰摯恂字季直伯陵之十二丗孫也明禮易遂治五經愽通百家之言又善屬文詞論清羙渭濵弟子扶風馬融沛國桓驎等自逺方至十餘人旣通古今而性温敏不耻下問故學者宗之常慕其先人之髙遂隱於南山之隂􅀄馬融始從恂受業恂愛其才因以女妻之融後果爲大儒文冠當丗以是服恂之知人永和中和帝􅀶求名儒公卿薦恂行侔曽閔學擬仲舒文叅長卿才同賈􅁩實瑚璉噐也冝在宗廟爲國真輔由是公車徴不詣大將軍竇憲舉賢良不就清名顯於丗以壽終三輔稱焉又曰姜􅄮字子平漢陽上郡人也少失父獨與母兄居治書易春秋恬居守道名重西州延熹中沛國橋玄爲漢陽太守召歧欲以爲功曹歧稱疾不就玄怒勑督郵尹益収歧􅀂實不起者欲嫁其母而後殺歧益争之􅀇怒益撾之益得杖且諫曰歧少修學孝義栖遲衡廬郷里歸仁名宣州里實無罪杖益敢以死守之􅀇心乃止歧於是髙名逾廣及母死喪禮畢盡讓平水田與兄岑遂隱以畜􅉕豕爲事教授者滿於天下營業者三百餘人辟州從事不詣民從而居之者數千家後舉賢良公府辟以爲茂才爲蒲坂令皆不就以壽終於家太平御覽卷第五百八
