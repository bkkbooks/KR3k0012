body:
  text: 偏霸部十四北齊髙歡髙澄髙洋髙歡北齊書曰髙祖神武皇帝姓髙氏諱歡字賀六渾㴾海蓨人也六丗祖隱晉玄菟太守皇考樹性通率不事家業住居白道南數有赤光紫氣之異隣人以爲怪勸徙居以避之皇考曰安知非􅁻居之自若及神武生而皇妣韓氏殂飬於同産姊婿鎮嶽隊尉景家神武旣累丗北邊故習其俗遂同鮮卑長而深沉有大度輕財重士爲豪俠所宗目有精光長頭髙權齒白如玉少有人傑素家貧及娉武明皇后始有馬得給鎮將遼西叚長常竒神武貌謂曰君有康濟之才終不徒然便以子孫爲託神武自隊主轉輪爲函使嘗乗驛過建興雲霧晝晦雷聲隨之半日乃絶􅀂有神應者毎行道路徃來無風塵之色又嘗夢履衆星而行􅁴而内喜爲函使六年毎至洛陽給令史麻祥使祥嘗以肉㗖神武神武性不立食㘴而進之祥以爲慢巳笞神武四十及自洛陽還傾産以結客親故恠問之荅曰吾至洛陽􅀫衛羽林相率焚領軍張彛宅朝廷懼其亂而不問爲政􅀂此事可知也財物豈可常守耶自是乃有澄清天下之志與懷朔省事雲中司馬子如及秀容人劉貴中山人賈顯智爲奔走之友懷朔户曹史孫騰外兵史侯景亦相友結孝昌元年歸尓朱榮於秀容先是劉貴事榮盛言神武羙至是始得見以憔悴故未之竒也貴乃爲神武更衣復求見焉因隨榮之廐廐有惡馬榮命剪之神武乃不加羈絆而剪竟不蹄齧巳而起曰御惡人亦如此馬矣榮遂㘴神武於床下屏左右而訪時事神武曰聞公有馬十二谷色别爲群將此竟何用也榮曰但言尓意神武曰方今天子愚弱太后􅁋亂孽寵擅命朝政不行以明公雄武乗時奮發討鄭儼徐紇而清帝側霸業可舉鞭而成此賀六渾之意也榮大恱語自日中至夜半乃出自是毎參軍謀旣而榮以神武爲親信都督于時魏明帝銜鄭儼徐紇逼靈太后未敢制私使榮舉兵内向榮以神武爲前鋒至上黨明帝又私詔停之及帝􅁀崩榮遂入洛邑將簒位神武諌恐不聽請鑄像卜之鑄不成乃止孝莊帝立以定䇿勲封銅鞮伯榮嘗問左右曰一日無我誰可主軍皆稱尓朱兆榮曰此正可統三千􅀐以還堪代我主衆者唯賀六渾耳因誡兆曰尓非其匹終當爲其子穿鼻乃以神武爲晉州刺史於是大聚斂因劉貴貨榮下要人盡得其意州庫角無故自鳴神武異之無幾而孝莊誅榮及尓朱兆自晉陽將舉兵赴洛召神武使長史孫騰辭以蜀汾胡欲反不可委去兆恨焉騰命神武曰兆舉兵犯上此大賊也吾不能乆事之自是始有圗兆計及兆入洛執莊帝以北神武聞之大驚又使孫騰僞賀兆因密覘孝莊所在將刧以舉義不果乃以書喻之言不冝執天子以受惡名於海内兆不納殺帝而與尓朱丗隆等立長廣王曄改元建明封神武爲平陽郡公魏普泰元年二月神武自領軍次信都髙乾封隆之開門以待遂據冀州是月尓朱度律廢元曄而立節閔帝欲羈縻神武三月乃白節閔帝封神武爲勃海王徴使入覲神武辭四月癸巳又加授東道大行臺第一鎭人酋長龐蒼鷹自太原來奔神武以爲行臺郎㝷以爲安州刺史神武自向山東飬士繕甲禁兵侵掠百姓歸心乃詐爲書云尓朱兆將以六鎮人配契胡爲部曲衆皆愁爲并州符徴兵討歩落稽發萬人將遣之孫騰尉景爲請留如此者再神武親送之郊雪涕執别人號慟􅂘聲動地神武乃喻之曰與尓俱失郷客義同一家不意在上乃尓徴召直向西巳當死後軍期又當死配國人又當死柰何衆曰唯有反耳神武曰反急計湏推一人爲主衆願奉神武神武曰尓郷里難制不見􅁑榮乎雖百萬衆無刑法終自灰滅今以吾爲主當與前異不得欺漢兒不得犯軍令生死任吾則可不尓不能爲取􅀏天下衆皆頓顙死生唯命神武曰􅀂不得巳明日推牛饗士喻以討尓朱兆之意封隆之進曰千載一時普天幸甚神武曰討賊大順也極時大業也吾雖不武以死繼之何敢讓焉六月庚子建義於信都乃抗表罪狀尓朱氏丗隆等祕表不通八月尓朱兆攻䧟殷州李元忠來奔孫騰以爲朝廷隔絶不權立天子則衆望無所係十月壬寅奉章武王融子渤海太守㓪爲皇帝年號中興是爲廢帝十一月攻鄴相州刺史劉誕嬰城固守神武起土山爲地道往往建大柱一時焚之城䧟入地永熈元年正月壬午拔鄴城據之廢帝進神武大丞相柱國大將軍太師是時青州建義大都督崔靈珍大都督耿翔皆遣使歸附行汾州事劉貴弃城來降閏三月尓朱天光自長安兆自并州度律自洛陽仲逺自東郡同㑹鄴衆號二十萬挾洹水而軍節閔以長孫承業爲大行臺揔督焉神武令封隆之守鄴自岀頓紫陌時馬不满二千歩兵不至三萬衆寡不敵乃於韓陵爲圎陣連牛驢以塞歸道於是將士皆爲死志四面合擊之尓朱兆責神武以背巳神武曰夲勠力者共輔王室今帝何在兆曰永安枉害天柱我報讎耳神武曰我昔日親聞天柱計汝在户前立豈得言不反耶且以君殺臣何報之有今日義絶矣乃合戰大敗之四月斛斯椿執天光度律以送洛陽長孫承業遣都督賈顯智張歡入洛陽執丗隆彦伯斬之兆奔并州仲逺奔梁州遂死焉時兇蠧旣除朝廷慶恱旣而神武至洛陽廢節閔及中興主而立孝武孝武旣即位授神武大丞相天柱大將軍太師丗襲定州刺史増封并前十五萬户神武辭天柱減户五萬壬辰還鄴魏帝餞于乾脯山執手而別七月壬寅神武帥師北伐尓朱兆封隆之言侍中斛斯摏賀拔勝賈顯智等徃事尓朱普皆反噬今在京師寵任必構禍􅂩神武深以爲然乃歸天光度律於京師斬之遂自􅇭口入尓朱兆大掠晉陽北保秀容并州平神武以晉陽四塞乃建大丞相府而定居焉尓朱兆旣至秀容分兵守險出入冦抄神武􅀭聲討之師出止者數四兆意怠神武揣其歳首當宴㑹遣竇泰以精􅀐馳之一日一夜行三百里神武以大軍繼之二年正月竇泰􅍕至尓朱兆庭軍人因宴休惰忽見泰軍驚走追破之於赤洪嶺兆自縊神武親臨厚葬之慕容紹宗以尓朱榮妻子及餘衆自保焉突城降神武以義故待之甚厚神武之入洛也尓朱仲逺部下都督橋寧張子期自滑臺歸命神武以其助亂且數反覆皆斬之斛斯椿由是内不自安乃與南陵王寳炬及武衛將軍元毗魏光王思政搆神武於魏帝帝舎人元士弼又奏神武受敕大不敬於是魏帝與神武􅂩矣天平元年正月魏帝下詔罪狀神武爲北伐經營神武亦勒馬宣告曰􅀌遇尓朱擅權舉大義於四海奉戴主上義貫幽明撗爲斛斯椿䜛構以誠節爲逆首昔晉趙鞅興晉陽之甲誅君側惡人今者南邁誅椿而巳以髙昻爲前鋒曰􅀂用司空言豈有今日之舉司馬子如荅神武曰夲欲立小者正爲此耳魏帝徴兵􅀜石召賀抜勝赴行在所遣大行臺長孫承業大都督頴川王斌之斛斯椿共鎭武牢七月魏帝躬率大衆屯河橋神武至河北十餘里再遣口申誠􅅃魏帝不報神武乃引軍渡河魏帝問計於群臣或云南依賀拔勝或云西就􅀜中或云守洛口死戰未决而元斌之與斛斯椿爭權不睦斌之弃椿徑還給帝云神武兵至即日魏帝遜位於長安巳酉神武入洛陽止於永寧寺八月神武以萬機不可曠廢乃與百僚議以清河王亶爲大司馬居尚書下舎而承制决事焉神武尋至弘農遂西尅潼􅀜九月庚寅神武還至洛陽乃遣僧道榮奉表􅀜中又不荅乃集百僚沙門􅂄老議所推立以爲自孝昌衰亂國統中絶神主靡依昭穆夫序遂議立清河王丗子善見議定白清河王王曰天子無父苟使兒立不惜餘生乃立之是爲孝靜帝魏於是始分爲二神武以孝武旣西恐逼崤陜洛陽復在河外接近梁境如向晉陽形勢不能相接議遷鄴護軍祖營賛焉詔下三日車駕便發户四十萬狼狽就道神武留洛陽部分事畢還晉陽自是軍國政務皆歸相府二年正月魏帝褒詔以神武爲相國假黄􅃏劒履上殿入朝不趨神武固辭四年十一月壬辰神武西討自蒲津濟衆二十萬周文軍於沙􅁐神武以地阨少却西人鼓噪而進軍大亂弃器甲十有八萬神武跨橐駞候船以歸元象元年三月辛酉神武固請解丞相魏帝許之四月庚寅神武朝于鄴壬辰還晉陽興和元年七月丁丑魏帝進神武爲相國録尚書事固讓乃止十一月神武以新宫成朝於鄴魏帝與神武讌射武定四年八月癸巳神武將西征自鄴㑹兵晉陽九月神武圍王壁以挑西師不敢應西魏晉州刺史韋孝寛守王壁頓軍五旬城不拔死者七萬人聚爲一冢有星墜於神武營衆驢並鳴士皆讋懼神武有疾十一月庚子輿疾班師庚戍遣太原公洋鎭鄴辛亥徴丗子澄至晉陽有惡鳥集亭樹丗子使斛斯律光射殺之巳卯神武以無功表解都督中外諸軍事魏帝優詔許焉是時西魏言神武中弩神武聞之乃勉坐見諸貴使斛律金勑勤歌神武自和之哀感流涕侯景素輕丗子嘗謂司馬子如曰王在吾不敢有異王無吾不能與鮮卑小兒共事子如掩其口至是丗子爲神武書召景景先與神武約得書書微􅀧乃來書至無􅀧景不至又聞神武疾遂擁兵自固神武謂丗子曰我雖疾尓靣更有餘憂色何也丗子未對又問曰豈非憂侯景叛耶曰然神武曰景專制河南十四年矣常有飛􅀭跋扈志頋我能飬豈爲汝駕御也今四方未定勿遽發哀庫狄干鮮卑老公斛律金勑勤老公並性純道直終不􅀒汝可朱渾道元劉豊生逺來投我必無異心賀拔焉過兒樸實無罪過潘樂和厚汝兄弟當得其力韓􅁤少戅宜寛借之彭樂心腹難得宜防護之少堪敵侯景者唯有慕容紹宗我故不貴之留以與汝冝深加殊禮委以經略之事五年正月朔日蝕神武曰日蝕其爲我耶死亦何恨景午陳啓於魏帝是日崩於晉陽時年五十二祕不發喪天保􅀄追崇爲獻武帝廟號太祖髙澄北齊書曰丗祖文襄皇帝諱澄字子惠神武長子也母曰婁太后生而􅄮嶷神武異之魏中興元年立爲渤海王丗子就杜詢講學敏悟過人詢甚歎服二年加侍中開府儀同三司尚孝靜帝妹馮翊長公主時年十三神情儁爽便􅀂成人䄂武試問以時事得失辯析無不中理自是軍國籌䇿皆預之天平元年加使持節尚書令大行臺并州刺史三年入輔朝政加領軍左右京畿大都督時人雖聞器識猶以少年期之而機略嚴明事無凝滯於是朝野振肅武定四年十一月神武西討不豫班師文襄馳赴軍所侍衛還晉陽五年正月丙午神武崩七月戊戍魏帝詔以文襄爲使持節大丞相都督中外諸軍録尚書事大行臺㴾海王文襄啓辭願停王爵壬寅魏帝詔太原公洋攝理軍國遣中使敦喻八月戊辰文襄啓申神武遺令請減國邑分封將督各有差辛未朝于鄴固辭丞相魏帝詔曰旣朝野攸慿安危所繫不得令遂夲懷須有權奪可復前大將軍餘如故七年五月文襄帥師赴頴川六月尅之獲西魏大將王思政等八月文襄遇盗崩􅀄梁將蘭欽子京見虜文襄以配厨欽求贖之不許京與其黨六人謀作亂時京將進食文襄却之謂人曰昨夜夢此奴殺我又曰急殺却京聞之寘刃於盤下冒言進食文襄怒曰我未索食何遽來京揮刀曰將殺汝文襄自投傷足入床下賊黨至去床遇弑時年二十九追謚文襄皇帝髙洋北齊書曰顯祖文宣皇帝諱洋字子進髙祖第二子丗宗之母弟后􅀄孕毎夜有赤光照室后私常怪之􅀄髙祖之歸尓朱榮時經危亂家徒壁立后與親姻相對共憂寒餒帝時尚未能言欻然應曰得活太后及左右大驚而不敢言鱗身重踝不好戯弄􅀷沉有大度晉陽曽有沙門乍愚乍智時人不測呼爲阿秃師帝曽與諸童共見之歴問禄位至帝舉手再三指天而巳口無所言見者異之髙祖嘗試觀諸子意識各使治亂􅁝帝獨抽刀軿之曰亂者須斬髙祖是之又各配兵四出而使甲􅀐僞攻之丗宗等怖撓帝乃勒衆與彭樂敵樂免胄言情猶擒之以獻後從丗宗行過遼陽山獨見天門開餘人無見者内雖明敏貌若不足丗宗毎嗤之云此人亦得冨貴相法亦何由可解唯髙祖異之天平二年授驃􅀐大將軍儀同三司武定元年加侍中五年授尚書令中書監京畿大都督七年八月丗宗遇害事出倉卒内外震駭帝神色不變指麾部分自􅀂臠斬群賊而􅃮其頭徐宣言曰奴反大將軍􅀍傷無大苦也當時内外莫不驚異焉乃赴晉陽親揔庶政務從寛厚事有不便者咸蠲省焉八年正月戊辰魏帝詔進帝位使持節丞相都督中外諸軍録尚書事大行臺齊郡王食邑一萬户三月辛酉又進封齊王邑十萬户自居晉陽寢室夜有光如晝旣爲王夢人以筆點巳額旦以告館客王曇哲曰吾其退乎曇哲再拜賀曰王上加􅀧成主字乃當進也夏五月辛亥帝如鄴甲寅進位相國揔百揆加九錫殊禮齊王如故魏帝遣兼太尉彭城王韶奉皇帝璽綬禪位于帝戊午乃即皇帝位於南郊􅂛壇柴燎告天事畢還宫御太極前殿詔大赦天下改武定八年爲天保元年辛酉尊王太后爲皇太后辛未遣大使於四方觀察風俗問民疾苦嚴勒長吏厲以廉平興利除害務存安静六月詔吉凶車服制度各爲等差具立條式使儉而獲中又詔兾州之勃海長樂二郡先帝始封之國義旗􅀄起之地并州之太原青州之齊郡霸業所在王命是基君子所作貴不忘夲思申恩洽蠲復田租丁亥詔立王子殷爲皇太子王后李氏爲皇后八月詔曰有能直言正諌不避罪辜謇謇􅀂朱雲諤諤􅀂周舎開朕意沃朕心弼予一人利兼百姓者必當寵以榮禄待以不次又諸牧民之官仰專意農桑勸課廣収天地之利以備水旱之災庚寅詔曰朕以虚寡嗣弘王業思所以賛􅀭盛績播之萬古雖史官執筆有聞無墜猶恐緒言遺羙時或未書在位王公文武大小降及民庶爰至僧徒或親奉音旨或承傳旁􅀃凡可載之文籍悉宜條録封上冬十月巳卯備法駕御金輅入晉陽宫朝皇太后於内殿十一月周文帝率衆至陜城分􅀐北渡至建州景寅帝親戎出次城東周文帝聞帝軍嚴盛歎曰髙歡不死矣遂退明年征契丹帝親踰山嶺爲士卒先露頭祖身晝夜兼行千餘里唯食肉飲水壯氣弥厲竟大破契丹􅀗十餘万口􅄂畜數十萬頭嘗於東山遊宴以􅀜隴未平投盃震怒將侯西伐西人爲之震恐帝素沉敏有逺亮􅀄文襄崩祕不發喪其後漸露魏帝􅀼謂左右曰大將軍此殂似是天意威權當歸王室矣及帝將幸晉陽親入辭謁於昭陽殿從者千人居前持劒者十餘輩帝在殿下數十歩立而衛士昇階巳二百許皆攘􅃑扣刃􅀂對嚴敵帝令主者傳奏須詣晉陽言訖再拜而出魏帝失色目送帝曰此人似不能見容吾不知死在何日洎受禪之後留心政術御下肅清六七年後以天下無事便留連飲宴通日竟夜躬自鼓舞􅃝露形體􅀓粉塗黛乗駞牛驢不施鞍勒親戚貴臣雜錯侍從徴集媱嫗分付從官親看無禮以爲戯樂貴妃薛氏甚􅀍愛寵忽憶其經與清河王岳私通命支解之弄其髀以爲琵琶歎曰佳人難再得後又以刀子劃楊愔腹崔季舒託俳優言曰老公子惡戯因掣刀子而去之又置愔於棺中載以轜車幾下釘者數焉發丁匠三十萬人營三臺於鄴構木髙二十七丈兩棟相去二百餘歩工匠危怯皆繫䋲自防帝登脊疾走無怖畏時復雅舞折旋中節傍人見者莫不寒心帝沉􅊺日甚婁太后舉杖擊之曰如此父生如此兒帝曰天子母豈不如共壻眠時即當嫁老母與胡太后大怒自此不復開顔帝免冠辭謝乃設席於地脫背就罰苦請笞脚五十因此戒酒一旬還復如􅀄又令元黄頭與諸國自金鳯臺各乗紙鴟以飛黄頭至紫陌乃墯於地凡所殺害或支解或火燒或投水蓋以萬數又誅元氏或父母爲主或身常貴盛皆斬於東市凡七百餘人悉投屍漳水剖魚者多􅀗爪甲都下爲之乆不食魚七年秋自河西揔􅁗戍築長城東至於海前後所築東西凡三千餘里率十里一戍其要害置州鎮凡二十五所八年春帝在城東馬射勑京城婦女悉赴觀不赴者罪以軍法七日乃止是年於長城内築重城自庫洛拔而東至於塢紇戍凡四百餘里先是發丁匠三十餘萬營三臺於鄴下因其舊基而髙􅀶之大起宫室及遊豫園至是三臺成改銅爵曰金鳯金武曰聖應氷井曰崇光十一月甲午帝登三臺御乾象殿朝讌群臣並命賦詩以新宫成故也十年春正月甲寅帝如遼陽甘露寺二月景戍帝於甘露寺禪居深觀唯軍國大政奏聞三月景辰帝至自遼陽十月甲午帝􅁀崩於晉陽宫還京師葬武寧陵謚曰文宣皇帝廟號髙祖武平􅀄又改廟號顯祖先是帝問泰山道士曰吾得幾年爲天子荅曰得三十年帝曰十年十月十日得非三十也吾甚畏之過此無慮人生有死又何致惜但憐正道尙幼人將奪之耳帝及期而崩年三十一太平御覽卷第一百三十
