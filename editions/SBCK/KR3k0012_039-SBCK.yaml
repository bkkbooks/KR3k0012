body:
  text: 地部四嵩山華山㤗山􅁪山衡山霍山嵩山釋名曰嵩字或爲崧山大而髙曰嵩詩曰嵩髙維嶽峻極于天維嶽降神生甫及申國語曰夏之興也祝融降于崇山韋昭注曰崇嵩字古通用夏都陽城嵩山在焉白虎通曰中央之嶽獨加嵩髙字者何中央居四方之中髙故曰嵩髙山續漢書曰武帝禮􅀕中嶽聞有呼萬歲聲三於是以三百户封奉祠命曰崇髙爲嵩髙也孫嚴宋書曰髙祖表曰沙門釋法義於嵩髙廟所石壇下得玉壁三十二枚黄金一缾符彩潤㓗河南太守毛脩之以靈岳降瑞送諸神府列仙傳曰王喬周靈王太子晉也好吹笙作鳯鳴遊伊洛之間浮丘公接以上嵩髙山三十餘年後於山上見桓良曰告我家七月七日待我緱氏山頭果乗白鶴駐山巓望之不得到舉手謝時人數日而去漢武内傳曰漢武帝夜夢與少君俱上嵩髙山半道有繡衣使者乗龍持節從雲中下言太一請少君覺告近臣曰如朕夢少君將捨朕去矣劉義慶丗說曰嵩髙山北有大穴晉時有人誤墮穴中見二人圍碁下有一杯白飲與墮者飲氣力十倍碁者曰汝欲停此否墮者曰不願停碁者曰從此西行有大井其中蛟龍伹投身入井自當出􅀂餓取井中物食之墮者如言可半年乃出蜀中因入洛問張華華曰此仙館也所飲者玉􅄴耳所食者龍肉石髓崔鴻十六國春秋前秦録曰王猛至深山見一老父據胡牀鬚􅁂皓然猛進拜老父曰王公何因拜也遣人送猛出山顧視乃嵩髙山也山海經曰太室之山即中岳嵩山今在陽城縣西也其上有木焉葉􅃺如梨赤理服者不垢有草焉其􅃺如禾服者不昧上多美石次玉者也嵩髙山記曰漢有道士從外國將貝多子來於嵩岳西脚下種之并立浮圗今有四樹與衆木有異一年三花花白色其香甚佳嵩山最是栖神靈藪也東出一里有自然五􅂖神芝仙藥東脚下有衆果樹云是漢果園後有小山名牛山多香樹昔有婦女姙身三十月生子五歲便入嵩髙學道通神明爲母立祠號開母祠又有三臺山漢武東廵過此山見三學仙女遂以爲名又一石室有自然經書飲食室前石柱似承露盤有石暗滴下食之一合與天地相畢中頂南下二百歩亦有岳廟􅀞爲神像有玉人髙五寸玉色光潤相傳曰明公山人或失之經旬乃見山海經曰少室之山有木焉名曰帝休葉􅃺如楊枝五衢黄華黒實服者不怒其上多玉其下多鐡其中多䱱魚得其食者無蟲疾可以禦惡服之不怒郭氏注云陽城西谷名季室亦曰少室山顚有白玉膏服之仙山有周昭王陵又戴延之西征記曰少室山中多神藥漢武帝築登仙臺在其峯郡國志云少室山一名􅁰室山􅀒􅁰城在南故因山以名城也又云少室有金像人徃視則有白露起迷人雜道書曰少室之陽髙于平地八百六十丈方十里可避兵水之災華山禮記曰地之廣厚戴華岳而不重范曄後漢書曰張揩字公超隱居弘農山學者隨之所居成市能爲五里霧後華山南遂有公超霧市唐書曰李適之代牛仙客爲右相累封清和縣公與李林甫争權不叶適之性踈爲其隂中林甫常謂適之曰華山有金鑛採之可以富國上未知適之心善其言他日從容奏之􅀇宗大恱顧問林甫對曰臣知之乆矣然華山陛下夲命王氣所在不可穿鑿臣不敢上言帝以爲愛巳薄適之言踈之白虎通曰西方爲華山者何少隂用事萬物生華故曰華山武帝傳曰魯女長樂人􅀄餌麻及水絶􅂖八十餘年日更少壯色如桃花一旦與故人别云入華山去後五十年先相識者逢女華山廟前乗白鹿從玉女三十人并謝其郷里親戚故人崔鴻十六國春秋前燕録曰石虎使人探䇿于華山得玉板山海經曰華山􅊘也􅊘者神􅀑之所舎也其祀之以太華又曰泰華之山削成而四方其髙千仞其廣千里郭璞注曰山上明星玉女主持玉漿得服之即神仙之道嶮無不通也有虵曰肥遺六足四翼見則天下旱列仙傳曰馬明生從安期先生受金液神丹方乃入華隂山中合金神丹昇天也又曰脩羊公者蜀人也止華隂山石室中中有懸石榻卧其上石盡穿䧟又曰毛女者在華隂山中獦師丗丗見之體生毛自言秦始皇宫人也又曰呼子先者漢中闕下卜師也壽百餘歲臨去呼酒家嫗曰急裝當與嫗共應中陵王今夜有仙人持二茅狗來先持一與酒家嫗得俱􅀐乃龍上華隂山也周禮曰豫州其鎭山曰華山華山記云山頂有池生千葉蓮花服之羽化因曰華山又曰山有三峯謂蓮花毛女松檜也辛氏三秦記曰華山在長安東三百里不知幾千仞如半天之雲晏子春秋曰君子􅀂華山松栢旣多望之自不知厭薛綜注西京賦曰華山對河東首陽山黃河流於二山之間古語云夲一山當河河水過之而曲行河神巨靈以手擘開其上以足蹈離其下中分爲兩以通河流今覩手跡於華嶽上足迹在首陽山下俱存焉韓子曰􅁗昭王使工人施鈎梯上華山以松栢之心爲博箭長八尺棊長八寸勒之曰昭王甞與天神博於此周易是謀􅀋曰西岳亡玉羊鄭􅀇注云玉羊華山之精山海經曰小華山即少華也其木多荆􅂎鳥多赤鷩可以禦火泰山詩曰泰山巖巖魯􅀖是瞻傳曰鄭伯請釋泰山之祀而祀周公以泰山之祊易許田公羊傳曰山川有能潤于百里者天子秩而􅀕之觸石而出膚寸而合不崇朝而遍􅀨天下者唯泰山乎語曰季氏旅於泰山子謂冉有曰汝不能救歟旅􅀕名也禮諸侯􅀕山川在其封内者今陪臣􅀕泰山非禮也冉有孔子時仕季氏救猶止也對曰不能子曰嗚呼曽謂泰山不如林放乎孔子意云泰山之神知禮過於林放之賢逺也白虎通曰王者功成封禪必於泰山者何萬物之始交代之處也史記曰漢武帝封泰山白雲起封中漢書曰武帝封泰山禪石閭應劭注曰石閭在泰山下南方土人言仙人閭應劭漢官儀曰泰山東南名日觀者鷄一鳴時見日始欲岀長三丈所觀者望見長安其髙如視浮雲其峻如無道徑望人如盂升或以爲小白石或以爲氷雪視巖石松樹欝欝蒼蒼如雲中晉書曰張忠隱于泰山教授弟子教以形不以言符堅徴之及至堅賜以衣冠辭曰年杇髮落不堪衣冠請以野服入覲從之後乞還堅以安車送之行逹華山歎曰我東岳道士殁于西岳命也及􅀜而死道書福地記曰泰山多芝草五石下有洞天周廽三千里􅀑神之府􅀽山松後漢書曰光武封泰山雲氣成宫闕風俗通曰古封泰山禪梁甫舊說岱宗上有金篋王䇿能知人年壽脩短漢武帝探䇿得十八因倒讀曰八十其後果壽長八十博物志曰泰山一曰天孫言爲天帝孫也主召人魂東方萬物始成故知人生命之長短五經通義云一曰岱宗言王者受命易姓報功告成必於岱宗也東方萬物始交代之處宗長也言於群嶽之長白虎通曰王者受命必封禪封者廣厚也禪除也爲壇字夲爲單以其􅀕神故從示皆刻石紀號著巳之功績以自効也天以髙爲尊地以厚爲德故増泰山之髙以報天禪梁甫之阯以報地也史記曰無懷氏封泰山禪云云伏犧封泰山禪云云神農封泰山禪云云炎帝封泰山禪云云黄帝封泰山禪云云顓頊封泰山禪云云帝嚳封泰山禪云云堯封泰山禪云云禹封泰山禪㑹稽周成王禪梁甫肅然及蒿里石閭後又凡五脩封泰山後漢書曰光武封泰山禪梁甫凢云云亭亭肅然蒿里社首梁甫皆泰山下小山也石閭在西巖下漢官儀及泰山記曰泰山盤道屈曲而上凢五十餘盤經小天門大天門仰視天門如從穴中視天䆫矣自下至古封禪處凢四十里山頂西巖爲仙人石閭東巖爲介丘東南巖名日觀日觀者鷄一鳴時見日始欲出長三丈許又東南名􅁗觀秦觀者望見長安吴觀者望見㑹稽周觀者望見齊黄河去泰山二百餘里於祠所瞻黄河如帶􅀂在山阯山南有廟悉種栢千株大者十五六圍相傳云漢武所種小天門有秦時五大夫松見在茅君内傳云仙家凢有三十六洞天岱宗之洞周廽三千里名曰三宫空洞之天列仙傳曰稷丘君者泰山道士也武帝時以道術受賜後上東巡泰山稷丘君乃冠章甫衣黄衣擁琴來拜武帝曰陛下勿上也必傷足上必欲上及上數里左右足指果折乃止列仙眞人傳曰馬明靈者齊國臨淄人也夲姓和字君賢爲縣吏捕賊爲所傷當時殆死良乆忽於道間見一女以时後管中一丸藥大如小豆與明服之於是即愈血絶瘡合隨神女還岱宗石室中上下懸絶重巖深隱去地千餘丈其中金牀玉机乃人跡所不能至神仙傳曰劉馮者沛人學道於穆王子服石桂英及中岳石流黄年三百餘歲而有少容後入泰山中又曰􅁗山下老父者失其姓名漢孝武皇帝廵狩見老父鋤於道間頭上白光髙數丈將問之父對曰臣年八十五時衰老垂死頭白齒落有道者教臣絶榖但服飲水并作神枕枕中有三十二物其二十四物以當二十四氣其八物當八風臣行之轉少日行三百里今年九十矣帝受其方賜縑帛去父入岱宗山十年五年時還郷里三百餘年乃不復還也上黨記曰太行坂東頭即泰山也避丗者區種而食或射熊於巖間泰山記曰泰山廟在山南悉種栢樹千株大者十五十六圍長老傳云漢武所種廟及東西房三十餘間并髙樓三處春秋饗祀泰山君常在此壇周易是謀􅀋曰泰山失金鷄鄭􅀇注曰金鷄泰山之精丘淵之齊記曰泰山東岳也瀛􅀶二縣共界漢武封禪割此縣以供祀泰山故曰奉髙三十里有延陵兒􅊘伍輯之從征記曰泰山於所經諸山非最髙而岑崿軒舉凌跨衆阜雲霞草木藹然靈異苑囿神竒故無螫虫猛獸孟子曰孔子登東山而小魯登泰山而小天下尸子曰泰山之中有神房阿閣帝王録淮南子曰清之爲明杯水而見眸子濁之爲闇河水不見泰山新序曰挾泰山以超北海􅁪山亦名常山史記曰趙簡子謂諸子曰吾藏寳符於常山往得者立焉諸子竟往無所得無恤曰常山臨岱可取也簡子曰是知符矣遂立之白虎通曰北方爲常山者何隂終陽始其道常乆故曰常後魏書曰道武立廟於上置侍祀九十九人歲時禱水旱至文成帝東廵親禮其神焉春秋元命苞曰昂畢散爲兾州分爲趙國立爲常山崔鴻前燕録曰慕容儁壽光三年常山寺大樹根下得壁七十二圭七十光色精竒有異常玉孫子兵法曰常山之虵名曰率然一身而兩頭擊其一頭則一頭至擊其中則兩頭俱至神農本草曰常山有草名神農置之門上每夜叱人常山圖經曰北嶽􅁪山在縣西北一百四十里尚書禹貢太行􅁪山至于碣石有􅁪水出焉其下有祠晏天王按山記曰髙三千九百丈上方三十里周廽三千里上有泰􅀇之泉神草十九種道者服之成仙又太史公云北岳者有五名一名蘭臺府二名列女宫三名華陽臺四名紫微宫五名太一宫或云太茂山山北四百餘里號飛狐之口有率然虵孫吴諭兵􅀔管子曰其山北臨代南俯趙東接河海之間早生而晩殺五􅂖之所蕃熟四種五穫焉陽固北都賦曰茂丘茂山也盖􅁪岳之別名沠水從西來甚大至茂山之西沉伏于地過山而復出其大如􅀄世言避􅁪岳之靈衡山周官曰荆州其山鎭曰衡山徐靈期南岳記曰衡山者五嶽之南嶽也其來尚矣至于軒轅乃以灊音潜霍之山爲副焉故爾雅云霍山爲南嶽盖因其副焉或云衡山一名霍山至漢武南廵又以衡山遼逺道隔江漢於是乃徙南嶽之􅀕于廬江灊山亦承軒轅副義也于寳搜神記曰漢武徙南嶽之􅀕著廬江潜縣之霍山郭璞爾雅注云霍山在廬江郡潜縣別名天柱山漢武以衡山遼逺讖緯以霍山為岳故􅀕之也晉書曰劉驎之嘗採藥至衡山深入忘返見有一澗水南有二石囷一開一閉水深廣不得過欲還失道遇伐弓人問遥僅得還家或說囷中皆仙靈方藥驎之欲更㝷終不復知處羅含湘中記曰衡山九疑皆有舜廟太守至常遣户曹致祀則如絃􅁔之聲也吴越春秋曰禹傷父功不成登衡山血白馬以􅀕之忽然而卧夢赤繡文衣男子稱􅀇夷蒼水使者謂禹曰欲得我山書者齋於黄帝之嶽禹乃退齋三日登宛委發石得金簡玉字之書得治水之要也盛弘之荆州記曰衡山有三峯其一名紫盖毎見有􅀟白鶴􅆦翔其上一峯名石囷下有石室㝷山徑聞室中有諷誦聲一曰芙蓉上有泉水飛流如舒一幅白練山海經曰衡山一名岣嶁山其上多青艧鳥多鸜鵒岣音矩嶁音縷湘中記曰衡山九疑皆有舜廟遥望衡山如陣雲㳂湘千里九向九背乃不復見有玉牒焉禹按其文以治水也劉敬叔異宛曰湘東姚祖太元中爲郡吏經衡山望巖下數少年並執筆作書祖行旅休息乃過之未至百歩少年相與飛颺遺一紙書其字皆鳥跡郡國志衡山南嶽也南嶽記云當翼􅎮度機衡謂之衡山山有錦石斐然成文霍山白虎通曰南方爲霍山者何太陽用事護養萬物故爲霍山爾雅曰大山宫小山霍郭璞注曰宫謂圍繞也禮記曰君爲廬宫是也漢書武帝以衡山夐逺䜟記皆以霍山爲南嶽故􅀕其神於此宋書曰霍山數年來常有鍾聲潜發重壤山崩間六鍾自出制度合古式聲中律吕山海經白霍山有獸焉其狀如狸白尾有鬛名曰朏朏可以忘憂音沛謂畜之也黄庭内景經曰霍山下有洞臺方二百里司命君之府也白虎通曰小山繞大山爲霍太平御覽卷第三十九
