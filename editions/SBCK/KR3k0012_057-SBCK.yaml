front:
  text: 太平御覽卷第五十七
  hash: sha256:0becfd06bc77e9dc50785a65c0497925590f8191fd8b2c6811603960cf9770dd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_057-1a}
body:
  text: 地部二十二林麓原隰林􅀃文曰平土有叢木曰林釋名曰林森也森森然也爾雅曰野外謂之林易曰即鹿無虞惟入于林中焦贑易林曰山林麓藪非人所處鳥獸無禮使我心苦詩曰肅肅兎􅆯施于中林赳赳武夫公侯腹心又曰林有樸蔌野有死鹿白茅純束又曰爰居爰處爰䘮其馬于以求之于林之下又曰鴪彼晨風鬱彼北林毛萇曰北林名也招賢人往從之使疾如晨風之飛入北林又曰有鶖在梁有鶴在林鄭􅀇曰鶖之性貪惡而今在梁鶴絜白而反在林也又曰厥初生民時惟姜嫄載生載育時維后稷誕寘之隘巷羊牛腓字之毛萇曰寘置也腓辟也字愛也鄭􅀇曰姜嫄置后㮨羊牛之徑亦以爲異也誕寘之平林㑹伐平林置人平林又爲人所収取也又曰瞻彼中林牲牲其鹿毛萇曰視彼林中其鹿相軰偶牲牲衆多今朝廷羣臣皆相欺皆言其鹿之不知也又曰翩彼飛鴞集于泮林食我桒椹懷我好音鄭􅀇曰鴞惡鳴之鳥止於泮水之木食桒椹改其鳴歸就我善音喻人感於恩則化之禮曰草木零落然後入山林又曰林藪川澤有能取􅂼食野虞敎導之又曰林麓川澤以時入而不禁蔡邕月令章句曰叢木曰林受衆流注曰海周禮曰凢􅀖工入山林而掄材不禁又曰林衡掌廵林麓之禁令而平其守以時計林麓而賞罰之鄭􅀇曰平其守者平其地民守林麓之部分又曰柞氏掌攻草木及林麓夏日至令刋陽木而火之冬日至令剥隂木而水之鄭􅀇曰刋剥也生山南爲陽木生山北爲隂木火之水之則使其􅀠不又鄭注曰竹木曰林大戴禮曰髙山多林虎豹蕃孕焉深泉大川魚龍交焉左傳曰楚薳掩爲司馬書土田度山林鳩藪澤収隰臯楊方五經鈎深曰夫鳥遊曠澤之地而北翮者万群虎居繁林之藪而接豪者千數又曰夫霜樹落葉而鴻鴈南飛桃林披華而􅀇鳥入宇家語曰芝蘭生於深林不以無人而不芳君子脩道立德不爲困窮而改節史記曰殷紂厚賦稅實鹿臺錢􅄹鉅橋粟廣沙丘苑臺大戯沙丘以酒爲池懸􅁏爲林爲長夜之飲又曰稷母姜嫄見巨人迹心忻踐之而身動如孕胎居期生子棄之隘巷馬牛不踐徙之林中㑹山林多人遷之渠中水上鳥以翼覆薦之又曰單于秋馬肥大㑹蹛林課校人畜又曰神􅀛在江南嘉林中嘉林者無鳥獸無毒䖝火所不及斧所不至帝王世紀曰桀爲􅁏山脯林以酒爲池使可運舟漢書曰草木未落斧不入於山林犲􅆩未􅀕􅅈綱不布於埜澤又曰山林之士往而不能返朝廷之士入而不能出後漢書曰法雄爲南郡太守移書屬縣曰凢虎狼之在山林猶人民之居城市張瑩漢南記樊重家素富田至三百頃竹木成林六畜放牧桒􅃮魚池閉門成市魏志曰曹植上䟽曰東有覆敗之軍西有殪没之將至使蜂蛤浮翔於淮泗鼲鼬讙譁於林木臧榮緒晉書曰㕁詵爲雍州刺史帝於東堂餞之問詵曰卿自以爲何如詵對曰臣舉賢良對䇿爲天下第一猶桂林之一枝昆山之片玉世祖􅀏侍中奏免詵詔曰吾與之戯耳又曰華譚移前松滋令􅀽甫曰枯澤非應龍之泉平林非鸞鳯之窟又曰王戎少阮籍二十餘年相得如時軰遂爲竹林之遊晉書曰劉靈與阮籍嵇康相遇忻然神解便􅂝手入林又曰嵇康以髙契難期每思郢質所與神交者唯阮籍山濤遂爲竹林之遊預其流者向秀劉靈阮咸王戎干寳晉紀曰初管輅過母丘氏墓下􅀝樹哀吟精神不樂林木雖茂無形可交碑誄雖美無後可守後魏書曰魏之先居幽都也鑿石爲祖宗之廟於烏洛侯國西北自後南遷其地隔逺遣中書侍郎李敞詣石室告祭天地以皇祖先妣配敞等旣祭斬樺木立之以置牲體而還後所立樺木生長成林其民益神之咸謂魏國感靈祗之應也又曰太祖道武帝以建國三十四年七月七日生於叅合陂北明年有榆生於埋胞之坎後遂成林又曰葬昭成皇帝於金陵營梓宫木柹盡生成林顧愷之啓􅂪記曰汎林鼔於浪巓注西北海有汎林或方三百里或方百里皆生海中浮土上樹根隨浪鼔動山海經曰桃林方三百里在崑崙南夸父山北又曰夸父逐日走渇飲河不足道渇死其杖化爲鄧林山謙之呉興記曰於潜縣北有天目山山上衆木甚美非常因名翔鳯林盛弘之荆州記曰宅上山頂有玉女冢瑩墳整固上有喬木叢生名爲女貞林常有白猿拪遊哀鳴清絶又曰江陵縣東一百里有緑林山茂林蓊鬱襄陽大路經由其西所謂當陽之緑林也五端休江陵記曰城西北六十里有大林春秋魯文公六年楚飢戎侵其西至于阜山師于大林即此地也又曰州城東北十二里有曹公林相傳云建安十三年曹操躡劉備於當陽長坂廻師頓此林因謂之曹公林任豫益州記曰廣平有石紐林禹生處也地方百許里今人猶不敢居止外國圖曰桂林地多林木無平土衆猴居之無人民去九疑四萬里􅀛林地險無平土衆􅀛居之應劭風俗通曰配林在太山西南五六里金樹木蓋不足言劉義慶世􅀃曰魏武行役失汲道三軍皆渇乃曰前有大梅林饒子􅅴酸可以解渇士卒聞之口皆水岀乗此得及前源莊子曰孔子遊乎緇帷之林坐杏壇之上弟子讀書孔子絃􅁔鼔琴曲未半漁父下舡而來國語曰康叔射兕于徒林殪以爲大甲越絶書曰麻林者越王種麻於此以爲弩絃故名麻林麓􅀃文曰林屬於山曰麓一曰麓者守山林吏也左傳僖公十四年沙麓崩書鴻範五行傳曰沙麓者山名也詩文王篇旱麓章曰瞻彼旱麓山足曰麓禮記曰林麓川澤以時入而不禁漢書曰王翁孺徙魏郡元城元城建公曰昔春秋時沙麓崩晉史卜之曰隂爲雌陽爲雄土火相乗後六百四十五年冝有聖女興今王翁孺徙其地日月當之翁孺生禁禁生元后漢書應劭曰麓林之大者風俗通曰尚書云堯禪舜納于大麓麓林屬於山者也原釋名曰原元也如元氣廣大也書曰旣修太原至于岳陽孔安國曰髙平曰原太原今以爲郡又曰大野旣瀦東原厎平孔安國曰東原致功而平言可耕也又曰􅀂火之燎于原弗可嚮邇其猶可撲滅詩曰度其鮮原居歧之陽在渭之將萬􅀖之方下民之王鄭􅀇曰文王自知德威謀居善言􅄮山之南渭水側爲萬國所向作民之君又曰篤公劉于胥斯原旣庶旣繁旣順迺宣而無永嘆鄭玄曰公劉之相此原以居民而無長嘆者也又曰鶺鴒在原兄弟急難又曰原隰膴膴堇荼如飴又曰皇皇者華于彼原隰又曰􅃮沮之從天子之所瞻彼中原其祁孔有又曰中原有菽庶民採之又曰原隰旣平泉流旣清周禮曰原師辯原隰之名又曰大司徒之職辯五地之物生五曰原隰其動物冝臝物其植物冝叢物其民豊􅁏而􅋻禮曰孟夏之月天子始命野虞岀行田原爲勸民也又曰聖王所以順山者不使居川不使渚者居中原而弗敝也傳曰晉侯蒐于清原作五軍以禦狄也又曰晉魏綘曰昔辛甲之爲太史命百官官箴王闕於虞人之箴曰在帝夷羿冐于原獸用不恢于夏家獸臣司原敢告僕夫又曰晉侯宋公齊國歸父秦小子憖次于城濮楚師背􅈶而舎晉侯患之聽輿人之誦曰原田莓莓舎其舊而新是謀公疑焉子犯曰戰也戰而捷必得志於諸侯􅀂其不捷表裏山河必無害也春秋􅀃題辭曰原端也平而有度也宋均曰度法則也公羊傳曰上平曰原􅂖梁傳曰中國曰太原夷狄曰大鹵國語曰温之㑹晉人執衛成公歸之于周使醫鴆之不死醫亦不誅臧文仲言於僖公曰刑大者陳之原野小者致之朝市五刑三利是無隱也今晉人鴆衛侯不死亦不誅其使者諱而惡之有諸侯之諸必免之爾雅曰廣平曰原又曰可食者曰原郭璞曰可食謂種榖給食也犍爲舎人曰廣平謂土寛博而平史記封禪書曰秦文公作鄜畤靈公作呉陽上畤宣公又作宻下畤盖三畤在此原故號三畤原臧榮緒晉書曰宣帝鎭􅀜中諸葛亮攻郿據渭水南五丈原帝禦之對壘相持百餘日俄而亮卒唐書髙祖校獵於華池之萬壽原白鹿見髙祖親御狐矢射而獲之郡國志曰韓馮翊有原按詩曰有倬其道韓侯受命是此原也又古今地名云韓武子食菜於韓原亦秦晉戰於此地即獲杜回又秦獲晉惠侯以歸之處裴景仁符書曰符徤始皇五年鳯皇降渭濵杜陵南原三日而去崔鴻前秦録曰丞相符雄與􅁊温戰白鹿原晉師敗績又曰符徤攻張琚于冝秋還登石安原而歎曰美哉斯原也悵然有終焉之意又曰晉梁州刺史司馬勲率歩􅀐三萬自漢中入秦川符徤拒之五丈原勲敗還潘岳􅀜中記曰周文王葬於畢長安東南有原名畢原又曰驪山有白鹿原周平王時白鹿岀此原故名之又曰宣帝少依許氏長於杜縣樂之後葬於南原立廟於曲池之北亭曰樂遊原辛氏三秦記曰長安城北有平原數百里無山川湖水民井汲巢居井深五十丈有伯夷墓人食薇可常食或云夷叔食之三年顔色如故戴延之西征記曰河東塩池東呉坂登七山原毎登一原輙峭起五六里原上平廣不知巨極周處風土記曰陽羡邑者蓋呉郡之名境原則平坦髙阜岡􅀂伏龍也隰釋名曰隰蟄也蟄隰意也􅀃文曰隰坂下濕也春秋􅀃題辭曰下濕曰隰二者濕也下而澤也尚書大傳曰下而平者謂之隰隰之言猶濕也詩曰淇則有岸隰則有泮毛萇曰泮陂也又曰山有扶􅂫隰有荷華又曰山有􅃮隰有栗又曰山有榛隰有苓毛萇曰苓大苦也又曰山有苞櫟隰有六駁鄭􅀇曰山之有櫟隰之有六駮皆其所冝又曰隰桑有阿其葉有儺鄭􅀇曰隰中之桑茂盛喻君子不用而野處也禮曰孟春之月天子祈􅂖于上帝善相丘陵阪險原隰土地所冝五􅂖所殖以教導民必躬親之又季夏行秋令則丘隰水潦禾稼不熟傳曰晉曲沃武公伐翼逐翼侯于汾隰􅆖絓而止夜獲之及欒共叔又曰楚薳掩爲司馬書土田度山林鳩藪澤収隰臯太平御覽卷第五十七
