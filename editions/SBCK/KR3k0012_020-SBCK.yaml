front:
  text: 太平御覽卷第二十
  hash: sha256:abb4f637666e99e8802e39392c64a860d1e2876524ec7f4e6f8b2c544f0173e1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_020-1a}
body:
  text: 時序部五春下立春春分春下說苑曰管仲曰吾不能以春風風人夏􅀨􅀨人吾道窮矣白虎通曰嫁娶以春何春者天地交通萬物始生隂陽交接之時也京房占曰春當退貪吏進柔良恤㓜􅀌賑不足求隱士即萬物應節而生隨氣而長所爲春令司馬法曰春不東征秋不西伐月食班師所以省戰也謂春不成生秋不伐熟夫兵隂象也月食則隂毀故息戰也顔氏家訓曰夫學者猶種樹也春翫其華秋取其實講說文章春之華也脩身利行秋之實也徐子中論曰夫名之繫於實也猶物之繫於時也生物者春也吐華者夏也布葉者秋也収成者冬也斯無爲而自成者􅀂強爲之則傷其性矣風俗通曰赤春俗說赤春從人假貸家皆自乏之時謹案詩曰春日載陽有鳴鶬鶊月令衣青衣服蒼玉又爾雅春曰青陽凡三春時不得復赤也今里語曰相斥角牛原其所以言不當角牛春從人求索也斥與赤音相似周生烈曰仁如春風惠如冬日汜勝之書曰三月榆莢􅀨髙地強土可種禾投荒録曰南方春時晴霽即如夏隂􅀨即如冬不復有韶光麗景􅀂通四時言之夏多而微有冬春與秋不復辯矣陸機要覽曰九花樹生南岳雖經雪凝寒花必開便落時人謂之應春花眞誥曰正月庚申上帝殺害日不可請乞百事無益登眞隱訣曰正月午天地凶門日不可建造穿鑿又曰正月亥地破日不可開山動土虞丗南史略曰北齊盧士􅀷妻崔林義之女有才學春日以桃花靧兒面靧荒内切洗靣也呪曰取紅花取白雪與兒洗靣作光恱取白雪取紅花與兒洗靣作光澤取雪白取花紅與兒洗靣作華容楚辭曰獻嵗發春􅀆洎吾南征又曰目極千里􅀆傷春又曰開春發嵗􅀆承陽施惠養百姓􅀆又曰王孫遊􅀆不歸春草生􅀆萋萋又曰青春受謝謝去也白日昭昭者明也崔駰臨洛觀春賦曰迎夏之首桃之夭夭楊柳依依張衡歸田賦曰仲春令月時和氣清原隰鬱茂百草滋榮王睢鼓翼鶬鶊哀鳴交頸頡頏􅀜􅀜嚶嚶於焉逍遥聊以娯情湛方生惜春賦曰夫榮凋之感人由色象之在鏡事隨化而遷廻心無主而虚映眄秋林而情悲遊春澤而心令孰云知其所以乗天感而叩性古樂府詩曰青青園中葵朝露待日晞陽春布德澤萬物生光暉張衡歌曰浩浩陽春發楊柳何依依百鳥自南歸翺翔萃我枝李充春遊賦曰蓋適性莫暢乎遊而時和莫踰乎春陸機樂府詩曰遊容芳春林春芳傷客心和風飛清響鮮雲垂薄隂蕙草饒淑氣時鳥多好音翩翩鳴鳩羽喈喈鶬鶊吟王廙春可樂曰春可樂􅀆樂孟月之初陽野暉赫以揮緑山翠蒨以發蒼立春禮記月令曰孟春之月是月也立春太史先三日謁於天子曰某日立春盛德在木天子乃齊太史禮官之屬謁告立春之日親率公卿諸侯大夫以迎春於東郊起春祀青帝靈威仰於東郊之北也周禮迎郊五十里也還乃賞公卿大夫於朝命相布德和令行慶施惠下及兆民傳曰凡分至啓閉必書雲物爲備故也立春爲啓立冬爲閉又曰郯子對孔子曰少皡摯爲鳥師而鳥名青鳥氏司啓者也青鳥倉鶊也以立春鳴立夏止開元禮曰立春祀青帝於東郊以太昊配以勾芒氏嵗星三辰七宿從祀立春後丑日祀風師於國城東北易通卦驗曰立春條風至宋均注曰條風者條逹萬物之風也孝經鈎命决曰先立春七日勑獄吏决詞訟有罪當入無罪當出立春勑門欄無􅀜籥以迎春之精下弓戴楯鼓示音聲動昆蟲也孝經緯曰周天七衡六間曰立春後十五日斗指寅爲􅀨水後十五日斗指甲爲驚蟄後十五日斗指乙爲清明後十五日斗指辰爲榖􅀨續漢書禮儀志曰立春之日夜漏未盡五刻京都百官皆衣青郡國縣官下至令史皆服青幘立青幡施土牛耕人于門外以示兆民又曰立春之日下寛大書曰制誥三公方春東作敬始愼微動作順之罪非殊死且勿案驗漢書曰元始中故事兆五帝郊於洛陽四方壇皆三尺無等立春于東郊􅀕東帝勾芒月令章句日東郊去邑八里木數也車旗服飾皆青歌青陽八佾舞雲翹之舞返因賜文官太愽司徒以下縑各有差漢官名秋曰賜司徒司空帛三十匹九卿十五匹古今注曰建武八年立春勑賜公十匹卿七匹也又曰立春之日皆青幡幘迎春于東郭外令一童男冐青衣先在東郭外野中迎春至自野中則迎者拜之而還弗􅀕三時不迎又郎顗上䟽曰今立春之後火卦用事當温而寒違反時節由功賞不至而刑罰必加也冝須立秋順氣行罰臣伏案飛􅀱叅察衆政京房作易飛候以爲立夏之後當有震裂涌水之害又曰自司徒居位隂陽多謬時劉折爲司徒至陽嘉二年榮免乆無虚巳進賢之筞天下興議異人同咨咨嗟歎也且立春巳來金氣再見謂元年十二月己丑夜白氣入玉井二年正月巳丑白虹貫日此金氣再見也金能勝木必有兵氣冝黜司徒以應天意又郎顗對問曰方春東作報徳之始元氣開發養導萬物王者因天視聽奉順時氣務崇温柔遵行月令禮祀月令孟春天子命相布德和令行慶施惠下及兆人仲春安萌芽養㓜少存諸􅀌省囹圄去桎桔止獄訟而今立春之後考事不息秋冬之政行乎春故虹春見掩蔽日曜凡邪氣乗陽則虹蜺在日斯皆執事刻急所致殆非朝廷優寛之本此其變常之咎也又曰孔子作春秋書正月者敬􅀊之始也公羊傳曰元年春王正月元年者何君之始年也正月者何嵗之始王者則天之象因時之序冝開發德號爵賢命士流寛大之澤垂仁厚之德禮祀迎春於東郊還乃賞公卿諸侯大夫於朝命相布和令行慶施惠下及兆人慶賞遂行無有不當順助元氣含養庶􅀋如此則天文昭爛星辰顯列五緯循􅁤四時和睦五帝五星否則天陽不光天地溷濁時氣錯逆霾霧蔽日爾雅曰風而雨土爲霾也自立春以來累經旬朔未見仁德有所施布但聞罪罰考掠之聲夫天之應人疾於影響而自從入嵗常有蒙氣月不舒光日不宣曜日者太陽以象人君政變於下日應於天清濁之占隨政抑􅀭天之見異事無虚作豈獨陛下倦於萬機帷幄之政有所闕歟晉書禮志曰太史毎嵗上年曆先立春讀五時令服各隨方色帝御座尚書以下就席訖賜酒一巵唐書曰景龍中中宗孝和帝以立春日宴別殿内出剪綵花令學士賦之又曰景龍四年正月八日立春上令侍臣自芳林門經苑東度入仗至望春宫迎春内出綵花樹人賜一枝荆楚嵗時記曰立春日悉剪綵爲鷰以戴之帖冝春之字􅀓咸鷰賦有其言矣傳咸鷰賦云四氣代王敬逆其始彼應運而方臻乃設鷰以迎止羣輕翼之􅄮􅄮􅀂將飛而未起何夫人之功巧式儀形之有以御青書以賛時着亘春之嘉社周書時訓曰立春之日東風不解凍號令不行蟄蟲不震隂氣姧陽魚不上氷甲胄私藏􅀨水之日􅆩不􅀕魚國多盗賊鴻鴈不來逺人不服草木不萌動果􅀲不熟國語曰農祥晨正唐固注曰農祥房星也晨正謂晨見南方謂立春之日齊人月令曰凡立春日食生菜不可過多取迎新之意而巳及進漿粥以導和氣四時􅛞要曰立春貯水謂之水神釀酒不壞修眞入道秘言曰以立春日清朝北望有紫縁白雲者爲三元君三素飛雲也乗八輿之輪上詣天帝是太素三元君女眞也天帝是天帝玉清君天子􅀱見再拜自陳某乙乞得侍給輪轂以意云云􅀂雖不見與服之形亦冝拜乞之他放此三過見元君之輦者白日昇天按舉塲常試立春日望三素雲詩取此事眞誥曰立春日勿行威刑八節同此論衡曰立春爲土象人男女各二秉耒鉏與鋤同或立土牛象人土牛未必耕也順氣應時示率下也春分禮曰春分之日􅀇鳥至後五日雷乃發聲後五日始電傳曰􅀇鳥氏司分者也春分來秋分去易通卦驗曰震東方也主春春分日青氣出直震此正氣也氣出右物半死氣出左蛟龍出震氣不出則嵗中少雷萬物不實人民疾􅀬孝經說曰春分之日日在中衡
