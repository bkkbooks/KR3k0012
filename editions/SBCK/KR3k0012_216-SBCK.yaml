front:
  text: 太平御覽卷第二百一十六職官部十四
  hash: sha256:f9cf9756b6a9cafee647e16b2f20e7b200582d50d5f8f8cb978a5c6c64bb109d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_216-1a}
body:
  text: 吏部四司郎中貟外吏部郎中六典曰吏部郎中掌考天下文吏之班秩階品魏志曰諸葛誕字公休爲吏部郎人有所囑託輙顯其言而亟用之後有當否則公議其得失以爲襃貶自是羣寮莫不愼其所舉魏志曰􅀽侃論議清當柔而不犯善與人同當廢興之間人所趨務者常謙退不爲也時人以是稱之歷選部郎號爲清平魏氏春秋曰許允爲吏部郎選郡守明帝疑其所用非次召入將加罪允妻阮氏跣出謂曰明主可以理奪難以情求允領之而入帝怒詰之允對曰某郡守雖限滿文書先至年限在後某守雖後日限在前帝取事視乃釋遣出望其衣敗曰清吏也蜀志曰趙戩字叔茂京兆長陵人質而好學言稱詩書愛鄙於人不論踈密辟公府入爲尚書選部郎董卓欲以所私並充臺閣戩拒不聽卓怒召戩欲殺之觀者皆爲戩懼而戩自􅀂及見卓列辭正色陳􅀃是非卓雖凶戾屈而謝之晉書曰山濤爲吏部郎文帝與書曰足下在事明雅邁時念多所乏今致錢二十萬絲百斤榖二百斛又曰李重字茂曾遷尚書吏部郎詢朝衆而斥華競存公平而塞私謁是以羣才罔不畢舉又曰吏部郎缺文帝問人於鍾㑹㑹曰裴楷清通王戎簡要皆其選也於是以楷爲吏部郎又曰徐寧少未知名爲興縣令時廷尉桓彛稱有人倫鑒識護軍􅁃亮每屬之訪一佳吏部郎彛嘗去職至廣陵尋親舊還遇風停浦中累日憂悒因上岸見一室宇有似􅅟署訪之云是興縣彛乃造之寧清惠􅀶渉相遇欣然因留數夕彛大賞之結交而別至都謂􅁃亮曰吾爲卿得一佳吏部郎亮問所在彛曰人所應有不必有人所應無不必無徐寧眞海岱清士因爲叙之即遷吏部郎又曰杜錫字丗嘏􅀘吏部郎不敢用郷曲一人又曰王戎少頴悟二十四爲吏部郎又曰李胤爲吏部清愼選舉號爲廉平荀綽晉後略曰武含字景緯官歷中庶子遷散􅀐常侍以母在日誨云汝修其志仕當爲尚書郎懼進叙有違前言乃辭常侍爲吏部郎晉中興書曰阮放與從弟孚齊名爲吏部郎銓管之任甚有稱譽性清約不理産業爲郎不免飢乏王導􅁃亮以其名士供給衣食放由是得立又曰畢卓字茂丗新蔡人少亦放逹泰興末爲吏部郎常飲酒廢職比舎郎釀卓因醉夜至其甕間取酒飲之掌酒者不察執而􅅞之郎徃視乃畢吏部也遽釋其􅅞卓遂引主人宴於甕側取醉而去卓常謂人曰右手持酒杯左手持蟹螯拍浮酒池中便足了一生宋書曰王僧綽爲吏部郎叅掌大選究識流品諳悉人物抜才舉能咸得其分又曰何尚之遷吏部郎告休定省傾朝廷送別於治渚及至郡叔度謂曰聞汝來此傾朝相送可幾客荅曰殆數百人叔度􅀏曰此是送吏部郎耳非􅀜何彦德也昔殷浩亦嘗作豫章定省送別者甚衆及廢徙東陽船泊征虜亭積日乃至親舊無復相窺者又曰王微字景􅀇吏部尚書江湛舉微爲吏部郎微與湛書曰君平生云揚我名者殺我身天爵且猶滅名安用吏部郎哉其舉何陋其事不經非獨搢紳者不道僕妾皆􅀏之又曰王恱之爲吏部郎隣舎有會同者遺恱之餅一甌辭不受曰此費誠小然少來不願當之又曰􅀽淑爲吏部郎其秋大舉北伐淑侍坐從容曰今當鳴鑾中岳席卷趙魏撿玉岱宗今其時也臣逢千載之會願上封禪書一篇太祖􅀏曰盛德之事我何足以當之齊書曰陸慧曉遷吏部郎尚書令王晏選門生􅀘内外要局慧曉爲用數人而止晏恨之送女妓一人欲與申好慧曉不納吏曹都令史歷政以來諮執選事慧曉任巳獨行未嘗與語帝遣左右單景儁以事誚問慧曉謂景儁曰六十之年不復能諮都令史爲吏部郎也上􅀂謂身不堪便當拂衣而退帝甚憚之又曰謝朓遷尚書吏部郎中上表三讓中書疑朓官未及讓以問沈約曰宋元嘉中范曄讓吏部朱循之讓黄門蔡興宗讓中書並三表詔答其事宛然近代小官不讓遂成􅁪俗恐此有乖讓意王藍田劉安西並貴重􅀄自不讓今豈可慕此不讓耶孫興公孔覬並讓記室今豈可三署皆讓耶謝吏部今授超階讓別有意豈􅀜官之大小梁書曰顧憲之字士思爲吏部郎􅀄其祖凱之嘗爲吏部於庭列植嘉樹謂人曰吾爲憲之種耳至是憲之果爲此官又曰王亮字奉叔爲吏部郎銓序著稱及後爲吏部尚書拘資次而已當代謂爲不能後魏書曰宋繇沮渠蒙遜平酒泉於繇室得書數千卷鹽米十斛而已蒙遜歎曰􅀌不喜尅李歆欣得宋繇耳拜尚書吏部郎中委以銓衡之任又曰鄧淵􅀶覽經書長於易筮太祖定中原擢爲吏部郎淵明解制度多識故事與崔􅀇伯叅定朝儀律令音樂及軍國文記詔䇿多淵所爲又曰孝文帝欲創革舊制選置百官謂羣臣曰爲朕舉一吏部郎給卿三日假尋曰朕已得之矣乃徴崔亮爲之亮字敬儒自叅選事垂將二十年廉愼明決尚書曰非崔郎中選事不辦又曰韋㻛爲吏部郎性貪婪鬻賣官吏皆有定價王藴別傳曰藴字叔仁爲吏部郎欲使時無屈滯曾下鼓急出日􅉴乃至家去臺數里髙褰車帷先後與語不得進也一官缺求者十輩藴連狀呈宰録曰某人有地某人有才不得者甘心無怨晉懷帝永嘉官名曰吏部郎太原温畿字元甫丗論以其爲人夷曠似玉郭子曰劉道眞少時漁釣草澤善歌嘯聞之者莫不留連有一老嫗識其非人甚樂其歌嘯及殺豚進之道眞食豚盡了不謝嫗見其不飽又進一豚又食半餘半還之後道眞爲吏部郎嫗兒爲小令史道眞乃超用之兒不知所由問母而後知之於是齎牛酒以詣道眞道眞􅀏曰去去無可復相報者丗􅀃曰山濤舉阮咸爲吏部郎白曰清直寡欲萬物不能移也山濤啓事曰人才旣自難知中人巳下情僞又難吏部郎以碎事日夜相接非但當正巳而巳乃當能正人議郎杜黙德履亦佳太子庶子崔諒中郎陳淮皆有意正又其次不審有可用者不􅀽宏與謝僕射書曰聞見擬爲吏部郎不知審尓果當至此誠相遇之過梁陸倕拜吏部郎表曰銓衡庶品歷選賔實阮咸眞素屢薦未登陸亮忠心裁居敗職自非季重清識李毅恬正何以區分管庫式鑒胥吏吏部貟外郎六典曰吏部貟外郎二人一人掌判南曹每歳選人有解狀簿書資歷考課必由之以覆其實乃上三銓其三銓進甲則署焉一人掌判曹務凡預太廟齋郎帖試如貢舉焉唐書曰崔郾爲吏部貟外姧吏不敢欺􅀌寒無援者未嘗留滯銓叙之美爲時所稱五代史後唐書曰蕭頃遷吏部貟外郎先是張濬由中書出爲右僕射曲爲朱温判官髙劭使祖䕃求一子出身官省寺皆稱無例濬指揮甚急吏徒惶懼頃乃判狀云僕射未集郎官未赴省上指揮吏曹公事且非南宫舊儀濬聞之慙悚致謝頃由是名振司封郎中司封貟外郎六典曰司封郎中貟外郎掌􅀖之封爵凡有九等一曰王正一品食邑一萬户二曰郡王從一品食邑五千户三曰國公從一品食邑三千户四曰郡公正二品食邑二千户五曰縣公從二品食邑一千五百户六曰縣侯從三品食邑一千户七曰縣伯正四品食邑七百户八曰縣子正五品食邑五百户九曰縣男從五品食邑三百户職貟令曰司封郎中掌封璽皇宗諸親内外命婦及國官邑官告身并選流外親品等第等司勲郎中司勲貟外郎六典曰司勲郎中貟外郎掌􅀖國官人之勲級凡勲十有二轉爲上柱國比正二品十一轉柱國比從二品十轉爲上護軍比正三品九轉爲護軍比從三品八轉爲上輕車都尉比正四品七轉爲輕車都尉比從四品六轉爲上􅀐都尉比正五品五轉爲􅀐都尉比從五品四轉爲驍􅀐尉比正六品三轉爲飛􅀐尉比從六品二轉爲雲􅀐尉比正七品一轉爲武􅀐尉比從七品考功郎中六典曰考功郎中貟外郎掌内外文武官吏之考課凡應考之官皆具録當年功過行能夲司及夲州長對衆讀議其優劣定爲九等考第各於所由司准額校定然後送省唐書曰代宗幸陜考功郎中裴諝歩懷考功及南曹二印赴行在上見而謂之曰疾風知勁草果信矣考功貟外郎唐書曰席豫襄陽人周湖州刺史固七丗孫近徙家河南豫進士及第開元中累官至考功貟外郎典舉得士爲時所稱唐書曰孫逖爲考功貟外郎逖選貢士二年多得俊才􅀄年則杜鴻漸至宰輔顔眞卿爲尚書後年抜李華蕭頴士趙驊登上第逖爲人曰比三人便堪掌綸誥又曰劉思立宋州寕陵人也遷考功貟外郎始奏請明經加帖進士試􅄂文自思立始也又曰鄭澣爲考功貟外郎刺史有驅迫人吏上言政績請刋石紀政者澣探得其情條責廉使巧跡遂露人服其敏識又曰李渤穆宗即位召爲考功貟外郎十一月定京官考不避權幸皆行昇黜奏曰宰臣蕭俛叚文昌崔植是陛下君臨之􅀄用爲輔弼安危理亂决在此時况陛下思天下和平敬大臣禮切固未有昵比左右侈滿自賢之心而宰相之權宰相之事陛下一以付之實君義臣行千載一遇之時也此時􅀂失他更無時而俛等上不能推至公申烱誡陳先王道德以沃君心又不能正色匪躬振舉舊法復百司之本如此則敎化不立矣臣聞政之興廢在於賞罰俛等作相巳來未聞奬一人德義舉守官奉公者使天下在官之徒有所激勸又不聞黜一人職事不理持禄養交者使尸禄之徒有所懼如此則刑法不立矣雅正莫辯混然無章教化不行賞罰不設天下之事復何望哉一昨陛下遊幸驪山宰相翰林學士是陛下股肱心腹冝皆知之蕭俛等不能先事未形忘軀懇諫而使陛下有忽諌之名流於史􅁽是䧟君於過也孔子曰所謂大臣者以道事君不可則止􅀂俛等言行計從不當如是􅀂言不行計不從湏奉身速退不冝尸素於化源進退戾也何所避辭其蕭俛叚文昌崔植三人并翰林學士杜元頴等並請考中下御史大夫李絳左散􅀐常侍張惟素右散􅀐常侍李益等諌幸驪山鄭覃等諌畋遊是皆恐陛下行幸不息恣情無度又恐馬有銜蹶不測之變風寒生疾之憂急奏無所詣國璽委於婦人中倖之手絳等能率御史諌官論列於朝有懇激事君之禮其李絳張惟素李益三人伏請賜上下考外特與遷官以彰陛下優忠賞諌之美其崔元略冠供奉之首合考上下縁與于翬上下考于翬以犯贓處死准令須降請賜考中中大理卿許季同任使于翬韋道冲韋正牧皆以犯贓或左降或處死合考中下然頃者䧟劉闢之亂弃家歸朝忠節明著今冝以功􅀘過請賜考中中少府監裴通職事修舉合考中上以其請追封所生母而捨嫡母是明罔於君幽欺其先請考中下伏以昔在宰夫入寢擅飯師曠李調今愚臣守官請書宰相學士中下考上愛聖運下振頺綱故臣懼不言之爲罪不懼言之爲罪也其三品官考伏縁限在今月内進輙先具如前其四品巳下官續具條流聞奏狀入留中不下議者以宰輔曠官自冝上䟽論列而渤越職釣名非盡事君之道唐新語曰李廻秀任考功貟外知貢舉有進士姓崔者文筆非佳廻秀覽之良乆謂曰清河崔郎儀貌不惡􅂡眉如㦸精彩甚髙出身何處量豈必湏進士再三喻而遣之聞者大噱太平御覽卷第二百一十六
