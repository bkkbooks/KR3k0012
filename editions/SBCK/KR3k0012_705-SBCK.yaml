front:
  text: 太平御覽卷第七百五服用部
  hash: sha256:c455f6750895ba5c333785d7533e4900a07bb69cd7c8a880f89bd8e7fbffb489
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_705-1a}
body:
  text: 簏篋簏􅀃文曰簏竹髙篋也字或作箓通俗文曰簏謂之匱笥魏晉丗語曰武帝欲以臨淄侯植爲嗣丗子患之以車載簏内詣朝歌長呉質與謀楊脩以白太祖不推丗子懼質曰明後簏受絹車内以惑之脩必復白推之無人脩受罪矣丗子從之脩果白推而無人太祖繇是疑焉王隱晉書曰洛陽有尉部小吏忽有好物尉疑詰問云先行逢一老媪􅀃有病師卜當得城南年少暫相煩相報乃土車内着􅃮簏中行十餘里過六七門開簏忽見樓閣好屋問此何處云是天上見一婦人三十五六短青黒色眉後有疪時賈后踈親聞其狀知是賈后慙而去晉書云陸納性恡每自筭料財物有客入見之羞忸以身映簏晉中興書曰王敦害周顗籍其家止見素簏中有故絮脩復山陵故事曰武悼皇后玄宫貯衣蝦蟇簏二東宫舊事曰皇太子􅀄拜有􅃮馬齒書簏金裝綵花簏古詩曰交文象牙簏婉轉青絲繩篋左傳昭四曰叔鮒求貨於衛滛芻蕘者衛人使屠伯饋叔向羮與一篋錦春秋後語曰魏文侯命樂羊將攻中山三年而抜之樂羊反而論功文侯示之謗書一篋漢書曰張安丗字子孺以父任爲郎用善書給事尚書精力於職上行幸河東嘗亡書三篋詔問莫能知唯安丗識之具作其事後購求得書以相校無遺失魏志曰胡質爲荆州刺史薨無餘財唯有賜衣書篋而巳晉書曰張華身死之日家無遺財有文史溢于几篋太平御覽卷第七百五
  hash: sha256:e3a9e08d3510f6e00985894c972cb3b0c613bbc35430cc0377b1b6ff6913161d
