front:
  text: 太平御覽卷第六百九十八
  hash: sha256:3bc7ef3ff3ff7afdfa63c69c2ba3769c1ad34f2743a27123164218d2f55c6d2a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_698-1a}
body:
  text: 服章部十五屨􅄚屣鞾屩􅓏屨釋名曰屨拘也所以拘足也􅀃文曰屨履也一曰鞮也詩曰􅁑屨五兩冠綏􅀟止葛屨服之賤者也冠綏服之尊者箋云以喻不冝同處又􅁑屨曰糺糺葛屨可以履霜夏􅁑屨冬皮履莫非所以履霜周禮曰屨人掌王及后之服履爲赤舄黒舄赤繶黄繶青句素屨葛屨􅃨下曰舄單下曰履古人言屨以通於􅃨今人言屨以通於單句當爲約赤繶黄繶以赤黄之絲爲下縁也辨外内命夫命婦之屨功屨散屨功屨次命屨散屨去飾著大戴禮曰入於户未嘗越屨是髙柴之行也禮曰侍坐於長者屨不上堂解屨不敢當階就屨跪而舉之屏於側向長者而屨跪而遷屨俯而納屨又曰户外有二屨言聞則入言不聞則不入母踐屨母踖席又曰國家靡敝君子不履絲屨左傳曰齊侯遊于姑棼遂田于貝丘具丘齊地見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼墜於車傷足喪屨反誅屨於徒人費弗得鞭之見血又曰楚子使申舟使于齊曰無假道于宋及宋華元曰過我而不假道鄙我也鄙我亡也亡一也乃殺之楚子聞之投􅃑而起屨及於窒皇劒及於寢門之外又曰齊晉戰于鞌郄克傷於矢流血及屨未絶鼓音又曰呉伐越越子禦之大敗之靈姑浮以戈擊闔廬靈姑浮越大夫闔廬呉王傷將指取其一履其足大指見斬遂失履姑浮取之榖梁傳曰公弟叔肹其曰弟叔肹賢之也宣公殺赤而非之宣公殺子赤叔肹非責云織屨而食終身不食宣公之食孟子曰許行自楚之滕其徒數十人皆衣􅄄梱屨織席以爲食梱音閫猶叩椓丗織履欲使堅故叩之賣履席以供飲食也􅄚釋名曰􅄚搘以踐泥也爲兩足搘以踐泥也帛􅄚作之如屩者也不曰帛屩而曰帛􅄚者屩不可以踐泥􅄚可以踐泥也故謂之􅄚漢書曰􅀽盎使呉呉王使圍守之乃刀决帳直出􅄚行七十里東觀漢記曰范􅂛奏云伏見太原周黨東海王良山陽王戎使者三到乃肯就車脫衣解􅄚昇于華轂晉書曰宣王􅀄欲追諸葛於関中多蒺藜乃使軍吏二千人着軟材木􅄚前行然後卒進焉晉宣帝雜教云當預作大平木􅄚遂賤時有蒺藜􅄚行蒺藜悉着屐底又曰謝安遣弟石及從子􅀇征符堅所在克捷安方對客圍碁有驛書到碁畢還内過户限心喜不覺􅄚折齒又曰王述性急當食雞子以箸刺之不得便怒擲於地雞子圎轉不止便下以􅄚齒踏之不得嗔甚掇口中嚼而吐之又曰祖約好財阮孚好着蠟􅄚同是累而未判其得失有詣約見正料財物客至屏當不盡餘兩小簏着背後傾身障之意未能平或有詣阮正見蠟􅄚因歎曰未知一生當着幾量􅄚神色閑暢於是勝􅀒始分又曰石勒擊劉曜使人着䥫􅄚施釘登城晉中興徴祥􅀃曰舊爲􅄚者齒皆逹名曰露夘泰元中忽不復徹名隂夘亦服妖也識者以爲夘謀也必有隂謀烈宗末驃􅀐叅軍􅀽恱之始有隂謀之事及隆安遂致大亂宋書曰謝靈運好山水㝷山陟嶺必造幽峻巖嶂數十重莫不備盡登躡常着木􅄚上山則去其前齒下則去其後齒又曰虞玩之髙帝鎮東府朝廷致敬玩之爲少府猶躋􅄚造席髙帝取􅄚視之訛黒針銳蒵斷以芒接之問曰卿此􅄚巳幾載玩之曰􅀄釋􅄄拜征北行佐買之着巳三十年貧士竟不易辦髙帝咨嗟因賜以新􅄚玩之不受問其故荅曰公之賜恩華俱重但􅆱簮弊席復不可遺所以不敢當帝善之又曰劉凝之有甞認其着􅄚􅀏曰僕着巳敗今家中覔新者償君此人後田中得所失送還不肯復取齊書曰沈麟士昔甞行路隣人認其所着􅄚麟士曰是卿􅄚耶即跣而反隣人得􅄚送前者還之麟士曰非卿􅄚耶􅀏而受之蕭子顯齊書曰襄陽有盗發古塚者傳云是楚王冢􅀗玉􅄚玉屏風梁書曰范廉爲呉興太守廣陵髙爽有儉薄才客於廉委以文記爽甞有求不遂乃爲􅄚断以喻廉曰㓨鼻不知啑蹋面不知瞋齧齒作歩數持此得勝人譏其不計恥辱以此取名位論語隱義注曰孔子至蔡解於客舎人夜有取孔子一􅃗屐去盗者置屐於受盗家孔子屐長一尺四寸與凢人屐異孔藂子曰孔穿振方屐見平原君宋元嘉起居注曰劉禎彈廣州刺史韋朗贓有白荆屐六七十量風俗通曰延嘉中京師長者皆着木屐婦女始嫁作漆􅀞􅄚五色綵爲系後黨事起九族俱繫婦人挃盖木屐之像丗􅀃曰王子敬兄弟見郄公躡履問訊甚脩外生禮及嘉賔死着髙履儀容輕慢每命坐皆云有事不暇坐郄公􅁣然曰若使嘉賔不死䑕軰敢爾語林曰鄭􅀇在馬融門下業成辭歸融心忌之鄭􅀇亦疑有追乃坐橋下㩀屐融果轉式逐之告左右曰􅀇在上下水上而據木此必死矣遂罷追矣竟以免華陽國志曰何隨家飬竹人盗其筍隨行見恐盗者覺挈屐而歸皇甫謐髙士傳曰􅀽閎字夏甫汝南人也築室於庭首不着布身無單衣足着木屐汝南先賢傳曰戴良嫁女布裳木屐􅁗記曰符健皇始四年新平縣有長人見語民張靖曰符氏應天受命當太平健以爲妖妄下靖獄是月河渭蒲坂津竪寇登於河中得􅃗屐長七尺二寸稱履五指長尺餘指尺􅀷寸登以獻健因赦靖劉欣期交州記曰趙嫗者九真軍安縣女子乳長數尺不嫁入山聚羣盗常着金摛踶屐􅁃仲雍荆州記云劉盛公枝江人桓司空臨州與上佐遊於靈溪盛公詣市還着皂盖布裙以杖荷􅄚詣桓司空神仙傳曰左慈見孫討逆着鞭駈馬慈着木􅄚䇿杖徐歩然終不能及乃止搜神記曰昔作屐婦人圎頭男子方頭盖作意欲别男女也太康婦人皆方頭􅄚與男無别集異記曰廣平游先期妄見一人着赤袴褶知是其魅乃以刀斫之乃死良乆方變是所常着履異􅁐曰介子推逃禄隱跡枹樹燒死文公拊木哀嗟伐而製屐每懷割股之功俯視其屐曰悲乎足下足下之稱將起於此又曰丹陽縣有梅姑廟姑生時有道術能着屐行水上後􅀒道法壻怒殺之投其屍於水上乃隨波流漂至今廟處晦望之日時見水霧中曖然有屐夢書曰麄屐爲使令卑賤􅀋也夢得麄屐得僮使也王襄僮約曰持斧入山斷輮裁轅若有餘材當作俎几木屐屣􅀃文曰屣鞮屬也鞮革履也史記曰漢孝武帝云使朕誠得如黄帝視弃妻子如脫屣耳魏志曰王粲字仲宣蔡邕見而竒之賔客盈坐聞王到倒屣迎之後漢書曰皇甫規有當丗重望郷人有行賄爲郡守謁規規卧不起聞王符至遂倒屣而迎春秋後語曰魏太子擊逢文侯之師田子方於朝歌朝歌紂之所都金衛州地引車避下謁之田子方不爲禮太子擊因問曰富貴者驕人乎貧賤者驕人乎子方曰貧賤者驕人耳夫諸侯而驕則失國大夫而驕則失家冨貴者安敢驕人貧賤驕人耳行不合言不從則去之楚越􅀂脫屣然太子不懌而去淮南子曰堯之有天下也年衰志悶舉天下而傳之舜猶却行而脫屣孟子曰舜視弃天下猶弃弊屣也丗􅀃曰何晏爲吏部尚書王弼未弱冠徃見之晏倒屣迎之鞾與靴同釋名曰鞾夲胡服也趙武靈王始服之北齊書曰鄭太妃􅀄與神武避葛榮同走并州􅀒困燃馬屎自作鞾又曰任王諧爲并州刺史有婦人臨汾水浣衣有乗馬人換其新靴而去婦人持故靴詣州言之諧召城外諸嫗以靴示之紿曰有乗馬人於路􅀍賊刼害遺此靴焉得無親屬乎一嫗撫膺􅂘曰兒昨着此靴向妻家如其語捕􅀗一時稱明察後魏書曰有人遺趙柔鞾數百枚柔與子善明鬻之於市有人從柔買柔索絹三十疋有啇人知其賤與柔三十疋善明欲取之柔曰與人交易一言便定豈可以利動心也遂與之唐書曰建中􅀄贈司徒沈易良之妻崔氏即太后之季父母也上見之方屣而鞾鄴中記曰石虎皇后出女􅀐千人皆着五綵織成靴列仙傳曰仙人文賔太丘人也賣靴爲業魏武與楊彪書曰今足下織成靴一量慕容晃與頋和書曰今致繡靴一量傳咸表曰凉州民先辨靴從軍之物然後作衣屩音脚􅀃文曰屩屐也釋名曰屩草屨也出行着之屩輕便因以爲名也春秋後語曰趙相虞卿躡屩檐簦來􅀃孝成王一說賜白壁一􅀟黄金百鎰再見拜爲上卿故號虞卿謝承後漢書曰江夏劉勤字伯家貧作屩供食常作一量屨斷勤置不賣出行妻賣以糴米勤歸炊熟恠問何所得米妻以實告勤責曰妻賣毀物欺取其直也因弃不食仕至司徒宋書曰劉敬宣嘗夜與僚佐宴空中有投一􅃗芒屩於坐墜敬宣食盤上長三尺寸巳經人着耳鼻間並欲壞頃之敬宣叅軍司馬道賜反敬宣爲其所害又曰張暢在彭城爲魏太武所圍太武遣李孝伯至城欲與暢語李伯曰君南􅁟膏梁何爲着屩君而着此使將士云何暢曰膏梁之言武誠爲愧但以不武受命統軍戎陣之間不容綏服齊書曰沈瑀爲餘姚令瑀􅀄至富吏皆鮮衣美服自彰別瑀怒曰汝等下縣吏何得自擬貴人悉使著芒屩麄布侍立終日足有蹉跌輙加榜捶又曰禇彦回㓜有清譽宋元嘉末魏軍逼􅀲歩百姓咸􅀒擔而立時父湛之爲丹陽尹使其子弟並着芒屩於齋前習行或譏之湛之曰安不忘危彦回時年十餘甚有慙色梁書曰侯景即位童謡曰脫青􅂁着芒屩荆州天子定應着又曰何􅀧方尚書乗柴車躡草屩恣心所適致醉而歸陳書曰沈衆武帝時兼吏部尚書􅁥起太極殿恒卧布袍芒屩以麻䋲爲帶朝士咸共誚其所爲唐書曰孟元陽起於陳許軍中理戎整肅曲環主屯作西華元陽芒屩立稻田中湏役者退而方去風土記曰美朱爽之輕履篾龍舄之文章爽藤也赤色縁木而長大如箭竿越人以爲屩經以青芒行山草便於用靴故越人重之捜神記曰元康之末至太安之間江浦之域有敗屩自聚於道多或至四五十兩人散去之投林草中明日視之悉復矣民或云見狸銜而聚之丗之所􅀃屩者人之賤服而當勞辱下民之象也敗者疲弊之像也道者地理四方所以交通王命所由徃來也今敗屩聚於道者象下民疲病將相聚爲乱絶四方而壅王命臨海水􅁟記曰屩魚長一尺狀如屩形俗説曰劉真長少時居丹徒家至貧劇方回數出南射堂射劉往市賣屩路經射堂邊過人無不看射劉過􅀄不迴頋方回異之遣問信荅云老母朝來未得食至市貨屩不得展詣後過劇呼之使來與共語覺其佳􅀏林曰南方人至京師者人戒之曰汝得物唯食愼勿問其名也後詣主人入門内見馬矢便食惡臭乃歩進見敗屩弃於路因復嚼殊不可咽頋伴曰且止人言不可皆信後詣貴官爲設饌因相視曰故是首物且當勿食􅓏音爕宋書曰􅀽粲爲丹陽尹歩􅓏白陽郊野間遇一士人便呼與飲明日此人謂􅀍知到門求進粲曰昨飲酒無偶聊相要耳竟不與相見齊書曰江泌字士倩濟陽人也少貧好學書則斫􅓏爲業夜則讀書隨月光光斜則握卷升屋梁書曰臨川王宏奢侈過度後庭數百十人皆極天下之選所倖江無畏服玩侔於齊東昏潘妃寳􅓏直千萬太平御覽卷第六百九十八
