front:
  text: 太平御覽卷第五百三
  hash: sha256:eeb24bbbee83d72dfaf04ede2ff9cb2aebc4728d0686d5be1fc4afd7dd3625e7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_503-1a}
body:
  text: 逸民部三逸民三王隱晉書曰龔莊字子偉巴西人也㓗巳自守與鄉人譙秀齊名父叔爲李特所害莊積年不除喪力弱不能復讎及李壽戍漢中與李期有嫌期特孫也壯欲假壽以報乃􅀃壽曰節下􅀂能并有西􅁟稱藩於晉人必樂從且捨小就大以危易安莫大之䇿也壽然之遂率衆討期果克之壽猶襲僞号欲官之壯誓不仕賂遺一無所受壯書􅀃壽以歸順允天心應人望永爲國藩福流子孫壽不納壯謂曰百行之夲莫先忠孝旣假壽殺期私仇巳雪又欲使其歸朝以明臣節壽旣不從壯遂稱耳聾又云手不制物終身不復至成都下帷研考經典覃思文章至李􅀔時卒又曰韓績字興齊廣陵人也先避丗居于呉之嘉興父建仕呉至大鴻臚績少好文學以潜退爲操布衣􅂼食不交當丗由是東土並宗敬焉司徒王導聞其名辟以爲􅁺不就咸康末㑹稽内史孔愉上䟽薦之詔以安車束帛徴之稱老病卒于家又曰譙秀字元彦巴西人也少而静黙不交於丗知天下將亂預絶人事雖内外宗親不相見郡察考廉州舉秀才皆不就及李雄據巴蜀慕秀名具束帛安車徴皆不應常冠皮弁弊衣躬耕山藪後避難宕渠郷里宗族依慿之者以百數秀年出八十衆代之負檐秀曰各有老弱當先營護吾氣力猶足自堪豈以垂朽之年累諸君也年九十餘卒又曰辛謐字叔重隴西狄道人也少有志尚愽學善属文恬靜不接交遊召拜太子舎人諸王文學累徴不起永嘉末沒于劉聦拜太中大夫固辭不受又厯石季龍之世並不應辟命雖處喪亂之中頽然髙邁視榮利蔑如也及冉閔􅆫亂復備禮徴爲太常謐遺閔書因不食而卒又曰索襲字偉祖燉煌人也虚靜好學不應州郡之命舉孝廉賢良方正皆以病辭遊思於陰陽之術著天文地理十餘篇多所啓發不與當世交通或獨語獨􅀏長歎涕泣或請問不言燉煌太守陰澹奇而造焉經日忘返而歎曰索先生碩德名儒眞可以諮大義澹欲行郷射之禮請爲三老㑹病卒時年七十九又曰楊軻天水人也少好易長而不娶學業精微養徒數百常食麄飯飲水衣短褐人不堪其憂而軻悠然自得踈賔異客音㫖未嘗交也雖受業門徒非入室弟子莫得親言欲所論授入室弟子令相與宣授劉曜僭號徵拜太常軻固辭不赴曜亦敬而不逼遂隱於隴山及曜爲石勒所擒秦人東徙軻留長安石季龍嗣位備􅀇纁束帛安車徵之軻以疾辤迫之乃發旣見季龍不拜與語不言有司以軻倨傲請從大不敬論季龍弗從下詔任軻所尙常卧土床覆以布被倮寢其中下無茵褥潁川荀輔好奇之士也造而談經軻瞑目不荅輔發軻披露其形大􅀏之軻神體頽然無驚怒之狀于時咸以爲焦先之徒未有能量其深淺也後上䟽陳思鄕求還季龍送以安車蒲輪自歸秦州仍教授不絶又日公孫鳳字子鸞上谷人也隱于昌黎之九城山冬衣單布寢土床彈琴吟咏陶然自得人咸異之莫能測也慕容暐以安車徵至鄴及見暐不言不拜衣食舉止如在九城賔客造請鮮得與言數年病卒又曰公孫永字子陽襄平人也少而好學恬虚隱於平郭南山不娶妻妾非所墾植不衣不食吟咏巖間忻然自得年逾九十操尚不􅃜與公孫鳯俱􅀍慕容暐徴至鄴王公巳下造之不與言雖經隆寒盛暑端然自􅀂一􅀊餘詐狂暐送之平郭後符堅又將備禮徴之難其年耆路逺乃遣使致問未至卒堅􅀷悼之又曰張忠字巨和中山人也永嘉之難隱於太山恬静寡欲清虚服氣飡芝餌石修導飬之法冬無緼􅂁夏則帶索端拱尸居無琴書之適不修經典勸教但以至道虚無爲宗其居依崇巖幽谷鑿地爲窟居去忠六十餘歩五日一朝其教以形不以言弟子授業觀形而退立道壇于窟上每旦朝拜之食用瓦器鑿而爲谷左右居人饋之衣食一無所受年在期頥而視聽無爽符堅遣使徴之乃至長安堅賜以衣冠辝曰年朽髮落不堪衣冠請以野服入謁從之後堅以安車送之行逹華山歎曰我東岳士殁於西岳命也柰何行五十里及􅀜而死堅謚安道先生又曰石垣字洪孫自云北海劇人居無定處不娶妻妾不營産業食不求羙衣必麄弊或有遺其衣服受而施人人有喪葬輒杖䇿弔之路無逺近時有寒暑必在其中或同日共時咸皆見之姚萇之亂莫知所終又曰郭荷字承休洛陽人也六丗祖整漢安順之丗公府八辟公車五徴皆不就自整及荷丗以経學荷明究群籍特善史書不應州郡之命張祚遣使者以束帛安車徴爲愽士􅀕酒後上䟽乞還祚以安車蒲輪送還張掖東山年八十卒謚曰􅀇徳先生又曰祁嘉字孔賔酒泉人也少清貧好學年二十餘夜忽䆫中有聲呼曰祁孔賔隱去來脩飾人間甚苦不可諧所得未毛銖所喪如山崖旦而逃去至燉煌依學官誦書貧無衣食爲儒生都飬以自給遂博通經傳精究大義而教授門生百餘人張重華徴爲儒林􅀕酒常謂爲先生而不名之以壽終又曰瞿硎先生者不得姓名亦不知何許人也㤗和末常居宣城郡界山中有瞿硎因以名焉大司馬桓温常往造之旣至見先生􅀍鹿裘坐于石室神無忤色温及僚佐數十人皆莫測之乃命伏滔爲之銘賛竟卒於山中又曰宋纎字令文燉煌人也少有逺操沉静不與丗交隱於酒泉南山酒泉太守馬岌髙尚之士也具威儀鳴鍾鼓造纎纎髙樓重閤拒而不見岌歎曰名可聞而身不可見徳可仰而形不可觀吾乃今而後知先生人中之龍也題詩於石壁曰丹崖百丈青壁萬尋竒木蓊􅊊蔚􅀂鄧林其人如玉維國之琛室邇人遐實勞我心纎注論語及爲詩頌數萬言年八十篤學不倦張祚復遣使者備禮徴爲太子友逼喻甚切纎喟然歎曰德非干木何敢稽停明命遂至姑臧祚遣其太子太和以執友禮造纎稱疾不見贈遺一皆不受後卒謚曰玄虚先生又曰鄧粲長沙人也少以髙㓗著名與南陽劉驎之南郡劉尚公同志友善並不應州郡辟命荆州刺史桓公卑辤厚禮請粲爲别駕粲嘉其好賢乃起應召驎之尚公謂粲曰卿道學􅀷衆所推懐忽然改節誠失所望粲荅曰足下可謂有志於隱而未知隱夫隱之爲道朝亦可隱市亦可隱隱􅀄在我不在於物公等無以難之又曰汜騰字無忌燉煌人舉孝廉除郎中天下兵亂去官還家太守張閟造之閉門不見禮遺一無所受歎曰吾聞亂丗貴而能貧乃可以免散家財五十萬以施宗族柴門灌園琴書自􅃴刺史張􅁤徴之爲府司騰曰門一杜其可開乎固辤病卒又曰王長文字德郁廣漢人少以才學知名放蕩不覉州郡辟爲别駕乃微服􅀼出舉州莫知所之後於成都市中蹲踞而坐齧胡餅食之刺史知其不出乃禮遣之於是閉門自守不交人事著通􅀇經四卷文言卦象可用以爲卜筮晉中興書曰虞喜字仲寜好學愽古中宗􅀄鎭江左上䟽薦喜公車徴不至司空賀循每一詣喜輙經信􅀫云不能測也康帝以爲散􅀐常侍又不起永和􅀄將禘太廟應有遞毀尚書郎徐禪詣喜諮焉喜所著數十萬言又曰髙陽許詢字玄度丹陽許玄字逺逰並治髙不仕詢有才藻能清言玄山居服食志求仙道逰㑹稽臨海山誓不歸家乃與婦書令改適後入剡深山莫知所止或以爲昇仙又曰翟陽字長淵尋陽人耕而後食凡有饋贈一無所受􅁃亮薦湯以國子愽士徴不起湯子莊字祖休遵湯之操雅好弋釣及長不復獵人或問莊曰同是害生之道而先生止去其一何也莊曰獵自我釣自物故先節其甚者且貪餌吞釣豈我哉時人以爲知言晚節亦不復釣端坐蓽門啜菽飲水徴辟皆不就莊子矯矯子法賜並徴不至丗有隱行又曰郭翻字長翔不交丗事家于臨川唯以漁獵爲娯常以車獵道逢病人以車送之徒歩而返􅁃亮薦公車徴不就乗小舡歸武昌􅁃翼躬徃造之以翻船狹小欲引入大􅂳翻曰使君不以名鄙賤而辱臨之此固野人之舟也遂不肯翼便俯屈入其􅂳中終日而去又曰孫略字文度呉人少佃於野人有刈其稲者略避之旣而刈一擔自送與之郷人感愧終日屢空怡然自足辟命皆不就妻虞預女也少禀伯喜風共安儉約又曰何􅄾音竒字萬倫飬志衡門不交人事豊約與隣郷共之頻徴不起桓温登􅄾縣界山喟然歎曰此山􅀯有人焉何某真正是也又曰陶淡字處静􅋲之孫雅好仙道年十五六便服食於山中立小草屋設小床獨坐故舊入山􅀱者輒移渡澗莫得近夲州舉秀才淡聞遂逃羅縣山中終身不返莫知所終又曰范宣少尚隱遁博綜衆書徴辟並不應雖閑居屢空常研講爲業諷誦之聲有􅀂齊魯太平御覽卷第五百三
