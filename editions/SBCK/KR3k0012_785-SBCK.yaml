body:
  text: 南蠻一叙南蠻越裳國黄支國盤瓠􅅒君板楯蠻俚叙南蠻禮記曰王制曰南方曰蠻雕題交阯有不火食者矣雕文謂刻肌以丹青􅄺之交距足相郷不火食地氣煖不爲病傳曰庸人率群蠻以叛楚庸今上庸縣屬楚之小國麋人率百濮聚於選將伐楚選楚地百濮夷也於是申息之北門不啓又曰楚子聞蠻氏之亂也與蠻子無質也質信也使然丹誘戎蠻子嘉殺之遂取蠻氏又曰王子朝使告于諸侯曰兹不􅂖震蕩播越竄在荆蠻未有攸底詩曰蠢爾蠻荆大􅀖爲讎蠢動也蠻荆荆州之蠻也又曰脩爾車馬弓矢戎兵用戒戎作用逷蠻方蠻方蠻荆之外也此時中國微弱故復戒將率之臣以治軍實又曰保有鳬繹遂荒徐宅至于海􅀖淮夷蠻貃及彼南夷莫不率從尚書舜典曰柔逺能邇惇德允元而難任人蠻夷率服帝曰臯陶蠻夷猾夏㓂賊姦宄猾乱也夏華夏也羣行攻劫曰㓂殺人曰賊在外曰姦在内曰究言無殺所致也又禹貢曰三百里蠻以文德來之不制以法論語曰子張問行子曰言忠信行篤敬雖蠻貃之􅀖行矣史記曰呉太伯弟仲雍皆周大王之子避季歴乃犇荆蠻文身斷髮示不可用荆蠻義之從西歸之千餘家漢書曰賈􅁩上書云凢天子者天下之首何也上也蠻夷者天下之足何也夫下也丗􅀃曰郝隆爲桓温南蠻叅軍三月三日就温席作詩曰娵隅躍清池温問何物荅曰蠻名魚爲娵隅桓曰何爲作蠻語隆曰千里􅄬公始得一蠻府叅軍郍得不作蠻語越裳國尚書大傳曰交阯之南有越裳國周公居攝六年制禮作樂天下和平越裳以三象重譯而獻曰雉曰道路悠逺山川阻深音使不通故重譯而朝成王以歸周公曰徳不加焉則君子不饗其質質亦贄也政不施焉則君子不臣其人吾何以獲此賜也其使請曰吾受命吾國之黄耇日乆矣天之無烈風注雨意者中國有聖人乎有則盍往朝之周公乃歸之於王稱先王之神致以薦于宗廟周德旣衰於是稍絶黄支國漢書曰黄支國去合浦日南三萬國俗與朱崖略同武帝時來貢具多明珠璧琉璃竒石異物大珠圍及二寸至􅇛者置之平地終日不得止槃瓠後漢書曰昔髙辛氏有犬戎之㓂帝患其侵􅁀而征伐不尅乃訪募天下有能得犬戎之將呉將軍首者購黄金千鎰邑萬家又妻以少女時帝有畜狗其毛五采名曰槃瓠下令之後槃瓠遂衘人頭造闕下群臣恠而診視之乃呉將軍首也帝大喜乃以女配槃瓠槃瓠得女􅀒而走南山止石室中所處險絶人跡不至於是女解去衣裳爲僕鑒之髻結著獨力之衣僕鑒獨力皆未詳流俗或改鑒爲堅者妄穿鑿也經三年生子十二人六男六女槃瓠死後因自相夫妻織績木皮染以草實好五色衣服製裁皆有尾形其衣裳班蘭語言侏離好入山壑不樂平曠帝順其意賜以名山廣澤其後滋蔓號曰蠻夷外癡内􅃛安土重舊以先父有功母帝之女田作賈販無􅀜梁符傳租稅之賦有邑君長皆賜印綬冠用􅆩皮名渠帥曰精夫相呼爲姎徒姎焉郎切􅀃文曰自自稱姎我也今長沙武陵蠻是也又曰南蠻其在唐虞與之要質故曰要服夏商之時漸爲邊患曁于周代黨衆弥盛故詩曰蠢爾蠻荆大􅀖爲讎至楚武王時蠻與羅子共敗楚師殺其將屈瑕莫敖不設備故敗縊于荒谷群帥囚于治父也楚師旣振遂屬於楚及呉起相悼王南并蠻越遂有洞庭蒼梧􅁗昭王使白起伐楚略取蠻夷始置黔中郡又曰漢興改􅁗黔中郡爲武陵􅀊令大人輸布一疋小口二丈是謂賨布􅀃文曰賨南蠻賦曰音牛冬切雖時爲㓂盗而不足爲郡國患光武建武二十三年武陵蠻精夫相單程等大㓂郡縣遣武威將軍劉尚發南郡長沙武陵兵萬餘人乗舩泝沅水入武谿擊之沅水出牂牁故旦蘭東北經靈溪長沙巴陵郡入洞庭通功也武溪在靈溪郡盧溪縣尚輕敵深入悉爲所没又遣伏波將軍馬援將兵至臨沅今武陵郡武縣即漢臨沅縣也擊破之單程等飢困乞降㑹援病卒謁者宗均聽悉受降爲置吏以司之群蠻遂平又曰順帝永和􅀄武陵太守上書以蠻夷率服可比漢人増其租賦議者皆以爲可尚書令虞詡獨奏曰自古聖王不臣異俗非德不能及威不能加其獸心貪婪難率以禮是故羈縻而綏撫之附則受而不逆叛則弃而不追先帝舊典貢稅多少所由來乆矣今猥増之必有怨叛計其所得不償所費必有後悔帝不從其冬澧中漊中蠻漊水出令澧陽郡漊音婁果爭貢布非舊約遂殺郷史舉種反叛明年遣武陵太守李進討破之斬首數百級餘皆降散又曰延熹中長沙零陵蠻反叛㓂江陵荆州刺史劉度謁者馬睦南郡太守李肅皆奔走肅王簿胡爽扣馬首諌曰蠻夷見郡無儆備故敢乗間而進明府爲國大臣連城千里舉旄鳴皷應聲十萬􅁗何委付守之重而爲逋逃之人平肅拔刃向爽曰􅁺促去太守今急何暇此計枹馬固諌肅遂殺爽而走帝聞之徴肅弃市復爽門問拜家一人爲郎魏略曰髙辛氏有老婦居王室得耳疾挑之乃得物大如蠒婦人盛瓠中覆之以槃俄湏化爲犬其文五色因名槃瓢于寳晉紀曰武陵長沙郡夷槃瓢之後􅄂處五服之内慿山阻險每常爲猱雜魚肉而歸以􅀕槃瓠俗稱赤髓撗裙子孫唐書曰黄國公􅁽安昌者槃瓠之苗裔也丗爲巴東蠻師與田李向鄧各分槃瓠一禮丗傳其皮盛以金凾四時致􅀕黄閔武陵記曰山半有槃瓠石室可容萬人中有石床槃瓢行迹今接山窟前有石羊石獸古跡竒異尤多坐石窟大如三間屋遥見一石仍似狗形蠻俗相傳云是槃瓠象也荆州記曰阮陵縣君居酉口有上就武陽二鄉唯此是槃瓠子孫狗種也二郡在武陵溪之北􅅒君後漢書曰巴郡南郡蠻本有五姓色氏樊氏瞫氏瞫音審相氏鄭氏皆出於武落鍾離山在今郡是陵山縣其山有赤黒二穴巴氏之子生於赤穴四姓之子皆生黒穴未有君長俱事􅀑神乃共擲劒於石穴約能中者奉以爲君巴氏子務相乃獨中之衆皆歎又令各乗土舩約能浮者當爲君餘姓悉沉惟務相獨泘因共立之是爲廪君乃乗􅁟舩從夷水至鹽陽塩水有神女謂廪君曰此地廣大魚塩所出願留共居廪君不許塩神暮輙來􅀫旦即化爲蟲與諸蟲群飛掩蔽日光天地晦􅁳積十餘日􅅒君思其便因射殺之天乃開明廪君於是君乎夷城四姓皆臣之􅅒君死魂魄丗爲白虎巴氏以虎飲人血遂以人祠焉又曰秦惠王并巴中以巴氏爲蠻夷君長世代尚秦女其人爵比不更有罪得以爵除又曰漢興南郡太守靳強奏請一依秦時故事至光武建武二十三年南郡潳山蠻雷遷等始反叛潳音屠㓂掠百姓遣武威將軍劉尚討破之徙其種人七千餘口置江夏界中其後􅃆中蠻是也漢之江夏郡今竟陵郡冨水安陸齊安漢陽江夏蘄春郡地皆是也又曰和帝永元十三年巫蠻許聖等漢之巫縣今雲安郡巫山縣也以郡収稅不均懐怨恨遂屯聚反叛荆州諸郡兵討破之復悉徙置江夏靈帝光和三年江夏蠻復反宼爲患累年廬江太守陸康討破之漢廬江即今郡也丗夲曰􅅒君使人操青縷以遺塩神曰嬰此即相冝云與女俱生弗冝將去塩神受縷而嬰之廪君即立陽石上望青縷而射之塩神死天乃大開􅀃文曰􅞲南郡蠻夷布也􅞲音稼荆州圗曰夷陵縣西有温泉古老相傳此泉元出塩于今水有塩氣縣西一獨山有石穴有二大石並立穴中相去一丈俗名爲隂陽石隂石常濕陽石常燥盛弘之荆州記曰昔廪君浮夷水射塩神于陽石之上按今施州清江縣江水一名夷水一名塩水源出清江縣西都亭山水經曰夷水别出巴郡魚復縣注云水色清照十丈分沙石蜀人見澄清因名清江板楯蠻後漢書曰板楯蠻者􅁗昭襄王時有一白虎常從群虎數遊􅁗蜀巴漢之境傷害千餘人昭王乃募國中有殺虎者賞邑萬家時有巴郡閬中夷人能作白竹之弩乃登樓射殺白虎昭王嘉之以其夷人不欲加封乃刻石盟要復夷人頃田不租十妻不筭一户免其一頃田之租稅雖有十妻不輸口筭之錢也傷人者論殺人得以倓錢贖死何承天纂文曰倓蠻夷贖罪貨也倓音徒濫也盟曰􅁗犯夷輸黄龍一􅀟夷犯􅁗輸清酒一鍾夷人安之又曰漢髙帝爲漢王發夷人還伐三􅁗今尓中􅁗川􅁗地旣定上遣還巴中復其渠帥羅朴督鄂度夕龔七姓不輸租賦餘户乃􅀊入賨錢口四十丗号爲板楯蠻夷閬中有渝水其人多居水左右天性勁勇􅀄爲漢前鋒數䧟陣俗喜歌舞喜音虚記切髙祖觀之曰此武王伐紂之歌也乃命樂人習之所謂巴渝舞也又曰靈帝光和中巴郡板楯叛㓂掠三蜀及漢中諸郡帝欲大發兵乃問益州計吏考以征討方略漢中上計程苞對曰板楯七姓射殺白虎立功先丗復爲義人其人勇猛善於兵戰昔安帝永和􅀄中羗入漢川郡縣破壞得板楯救之羗死敗殆盡故號爲神兵羗人畏忌傳語種軰勿復南行至建和三年羗復大入實頼板楯連槯破之前車􅀐將軍馮緄南征武陵雖丹陽精兵之銳亦􅀝板楯以成其功近益州郡亂太守李顒亦以板楯討而平之忠功如此夲無惡心但長吏郷亭更賦至重僕􅃥箠楚過於奴虜闕庭悠逺不能自聞含怨呼天叩心窮谷故邑落相聚以致叛戾非有謀主僣號以圗不輒今但選明能牧守自然安集不煩征伐也帝從其言遣太守曹謙宣詔赦之即皆降服北史曰自劉石亂後請漸得北遷陸渾以南溝於山谷道武旣定中山蠻王梅安率渠帥數千朝京求留質子以表忠欵拜安侍子豹爲安逺將軍延興中大陽蠻首桓誕擁河水以北滍葉以南八萬餘落内屬孝文嘉之拜誕東荆州刺史襄陽王誕字天生桓玄子也旣内屬居朗陵王師南伐請爲前駈討義陽不果而旋太和十七年蠻首田益宗率部曲四千餘户内屬襄陽蠻首雷婆思等十一人率千餘户内徙求居大和川詔給廪食後開南陽全有􅃆北之地蠻人安堵不爲宼賊宣武景明􅀄太陽蠻首田育丘等二萬八千户内附詔置四郡十八縣魯陽蠻魯北鷰等聚衆萬餘攻逼頻陽遣右衛將軍李崇討平之徙萬餘家於南北及六鎮尋叛南走所在追討比及河殺之皆盡正始二年梁􅃆東太守田清喜擁七郡三十一縣户萬九千内附永平􅀄東荆州表太守桓叔興前後招慰大陽蠻歸附者一萬七百户請置郡十六縣五十詔前鎮東府長史麗道元檢行置之後二荆兩郢蠻大擾動斷三鵶路殺都督㓂盗至於襄城汝水百姓多􅀍其害連年攻討散而復舍其暴滋甚有冉氏向氏田氏陬落最盛大者萬家小者千户更相崇樹僣稱王決七據三峽斷遏水路荆蜀行人至有假道者周文略定伊􅈆聲教南􅀍諸蠻畏威靡然向風後唐州蠻田魯嘉叛自号豫州伯王雄等計平之尋而蠻師舟令賢向五子王等反攻䧟白帝天和􅀄開封陸騰討斬之以其骸骨於水邏城側爲京觀後蠻蜑音但見輙大哭自此狼戾之心去矣俚後漢書曰建武十二年九真徼外蠻里張里蠻之别号今則呼爲俚人率種人慕化内属封爲歸漢里君沈懷逺南越志曰晉康郡夫陙音純縣人夷曰丗尺切其俗柵居實惟俚之城落南州異物志曰廣州南有賊曰俚此賊在廣州之南蒼梧欎林合浦寧浦髙凉五郡中央地方數千里往往別村各有長帥無君主恃在山險不用王自古及今弥歴年紀民俗惷愚唯知貪利無有仁義道理土俗不愛骨肉而貪寳貨及牛犢􅀂見賈人有財物水牛者便以其子易之夫或鬻婦兄亦賣弟􅀂隣里有􅀒其家債不時還者其子弟中愚者謂其兄曰我爲汝取錢汝但當善殯葬我耳其處多野􅁑爲鈞挽數寸徑到債家門下謂曰汝負我錢不肯還我今當自援因食野􅁑而死債家門下其家便稱宛宗族人衆往債家曰汝不還我錢而殺我子弟今當擊汝債家慙懼因以牛犢財物謝之數十倍死家乃自収死者罷去不以爲恨裴淵廣州記曰俚獠貴銅皷唯髙大爲貴面闊丈餘方以爲竒􅀄成懸於庭尅晨置酒招致同􅀋來者􅄹門其中豪冨子女以金銀爲大义執以叩鼓竟留遺主人名爲銅皷􅁫風俗好殺多構讎怨欲相攻擊鳴此鼓集衆到者如雲有是鼓者極爲豪強太平御覽卷第七百八十五
