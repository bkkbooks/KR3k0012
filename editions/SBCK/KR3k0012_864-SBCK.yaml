  text: 太平御覽卷第八百六十四
  hash: sha256:586c0d1daa3e6be01ed3dfd130af35073d918128bd5311aabe90de0e081c6c75
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_864-1a}
body:
  text: 飲食部二十二脂膏油脂膏周禮庖人曰凢用禽獸春行羔豚膳膏香夏行踞鱐音搜膳膏臊秋行犢膳膏腥冬行鱻羽膳膏羶用禽獸謂煎和之以獻王也鄭司農云膏香牛脂也臊豕膏也杜子美云膏臊犬膏腥豕鮮生魚也羽鴈也膏也羶羊脂也􅀇謂膏腥雞膏也八物者得四時之氣尤盛爲人食之弗勝是以用休廢之脂膏煎和膳之又冬官梓人曰天下之獸五脂者膏者嬴者羽者鱗者脂牛羊之属膏豕之属也宗廟之事脂者膏者以爲牲致美味也禮曰脂用葱膏用薤脂肥凝者澤者曰膏煎諸膏膏必滅之肝膋取狗肝一幪之以其膋膋腸問脂幪音蒙小切狼臅膏以與稻米爲酏狼臅臆中膏之然反爾雅曰氷脂一也莊子云肌膚􅀂氷雪氷雪脂膏也􅀃文曰膫牛膓脂膫音力彫反通俗文曰脂在脊曰昉在骨曰音􅃢獸脂聚曰䐃音窘史記曰敗脂辱處也而公伯千金後漢書曰孔奮爲姑臧長力行清㓗爲衆人所􅀏以爲身處脂膏不能自潤徒益苦辛耳淮南子曰無角者膏而無前有角者脂而無後油魏志曰孫權至合肥新城滿寵馳徃赴募壯士數十人折松爲炬灌以麻油從上風放火燒賊攻具又曰黄􅀄三年車駕幸宛使夏侯尚率諸軍與曹真共圍江陵權將諸葛瑾與尚軍對江瑾度入江中渚而分水軍於江中尚夜多持油舡將歩􅀐萬餘人於下流潜渡攻瑾諸軍夾江燒其舟舡水陸並攻破之王隠晉書曰元康三年武庫火檢校是工匠盗庫中恐罪乃投燭着麻膏中火燃又曰齊王囧起義孫秀多歛葦炬益儲麻油於殿省爲縱火具東宫舊事曰月給油六􅂛宋書曰朱脩之爲荆州刺史去鎮之日秋毫無犯計在州巳來然油及􅀻牛馬食官榖草以􅀻錢六十萬償之梁書曰沈約年十三而遭家難潜竄㑹赦乃免旣而流寓􅀌貧篤志好學晝夜不釋卷母恐其以勞生疾常遣減油滅火又曰張纉爲湘州刺史州境大寜晚好積聚多冩書數万卷有油二百斛米四千石他物稱是又曰侯景攻臺城爲曲項木驢攻城矢石不能制羊􅋲作雉尾炬施鑯鏃以油灌之擲驢上焚之俄盡又曰􅀄侯景旣南奔魏相髙澄命先剥景妻子靣皮悉以油煎殺之後周書曰衛刺王真作亂率其黨襲肅章門不得入乃縱火燒之尉遟運懼火盡直黨得進乃取油灌木以益火火勢轉盛真不得進乃退􅀶物志曰煎油水氣盡無煙不復沸則還冷得水而􅆋起飛散釋名曰柰油禱柰實和之以􅂗繒上燥而發之形似油也杏油亦如之太平御覽卷第八百六十四
