body:
  text: 封建部五婦人封夫人郡君縣君郷君􅃬命附婦人封左傳成公上曰晉敗齊師齊侯遂自徐􅀜入見保者曰勉之齊師敗矣曰避女子使避君也齊侯單還婦人不知之也女子曰君免乎曰免矣曰銳司徒免乎曰免矣曰苟君與吾父免矣可􅀂何乃奔齊侯以爲有禮旣而問之壁司徒之妻也壁司徒主壘壁予之石􅐎石􅐎邑名濟北盧縣東有地名石􅐎音溜陳留風俗傳曰髙祖與項氏戰厄於延郷有翟母者免其難故以延郷爲封丘縣以封翟母焉夫人後漢書曰崔􅂐母師氏能通經學百家之言王莽寵以殊禮賜號義成夫人金印紫綬文軒丹轂顯於新代唐書曰魏衡妻王氏梓州郪人也武德􅀄薛仁果舊將旁仚地侵掠梁部因獲王氏通而妻之後企地漸強盛衡謀以城應賊企地領衆將趨梁州未至數十里飲酒醉卧王氏取其佩刀斬之擕其首入城賊衆乃散髙祖大恱封爲崇義夫人又曰咸亨中燕山道揔管右領軍大將軍李謹行大破髙麗叛徒於瓠蘆河之西俘獲數千人自是平壤餘衆走投新羅時謹行妻劉氏留在代奴城髙麗引靺羯攻之劉氏擐甲率衆守城乆之賊乃退上嘉其功特封爲燕郡夫人又曰鄒保英妻奚氏不知何許人也萬歳通天年中契丹賊李盡來冦平州保英時任刺史領兵討擊旣而城􅀌援寡勢將欲䧟奚氏乃率家僮及城内女丁相助固守賊退所司以聞優制封爲誠節夫人又曰王君㚟上嘗於廣逹樓引君􅎢及妻夏氏設宴賜以帛夏氏亦有戰功故特賞之封爲武威郡夫人五代史晉史曰鎮州節度使安重榮妻彭城郡夫人劉氏封魯國夫人南陽郡夫人韓氏封陳國夫人重榮立二嫡妻非禮也朝廷並命之亦非制也郡君漢書曰武帝尊王太后母臧兒爲平原君後漢書曰􅀪農人宰宣素性佞邪欲取媚於梁兾乃上言大將軍有周公之功今旣封諸子則其妻冝爲邑君詔遂封兾妻孫壽爲襄城君兼食陽翟租歳入五千萬加賜赤紱比長公主長公主儀服同藩王又曰安思閻皇后追尊后母宗爲滎陽君晉中興書曰肅祖太妃豫章恭惠君苟氏􅀄以微入宫生肅祖中宗以母賤命虞妃母養肅祖而出嫁苟爲馬氏妻太寜元年馬氏無疾而卒肅祖迎母還宫飬稱建安君追贈豫章君謚曰恭惠後魏書曰景明􅀄丗追舅氏封外祖母蓋氏爲清河郡君又曰靈太后臨朝以元乂妹封乂妻新平君後遷馮翊君縣君漢書曰王太后微時爲金王孫婦婦生在民閒蓋諱之也武帝始立韓嫣白之帝曰何爲不蚤言乃車駕自徃迎之其家在長陵小市直至其門使左右入求之家人驚恐女逃匿牀下扶持出拜帝下車立曰大姊何藏之􅀷也載至長樂宫與俱謁太后太后垂涕女亦悲泣帝奉酒前爲壽錢千萬奴婢三百人公田百頃甲第以賜姊太后謝曰爲帝費因賜湯沐邑號脩成君又曰宣帝賜外祖母號爲愽平君以愽平蠡吾兩縣户萬一千爲湯沐邑范曄後漢書曰靈思何皇后追封父眞爲車􅀐將軍舞陽宣德侯封后母與爲舞陽君魏志曰文德郭皇后安平廣宗人也母董爲郡君追改封父永爲灌津敬侯丗婦董爲常陽君又曰青龍二年春追謚后兄儼曰安成郭穆侯封儼丗婦劉爲東郷君又追封逸丗婦張爲安嘉君又曰明元郭皇后西平人也齊王即位尊后皇太后封太后母杜爲郃陽君又曰明悼毛皇后河內人黃初中以選入東宫明帝時爲平原王進御有寵出入與同輿輦追封后母夏氏爲野王君又曰太始三年詔曰漢文追崇靈文之號武宣有平原愽平之封咸所以奉尊尊之敬廣親親之恩冝追封故衛將軍景侯夫人羊氏爲平陽君也臧榮緒晉書曰武悼楊皇后廢在金墉城與母髙都君龐氏共止髙都君臨刑后抱持號叫不食而崩晉中興書曰穆皇后􅁃氏字文君左將軍琛第三女贈琛爲車􅀐將軍母丘氏封安陽縣君從母荀氏永宣縣君又曰簡文順皇后王氏字蘭始驃􅀐將軍述之再從妹追贈前夫人成氏東豐縣君後夫人成氏東興君沈約宋書曰孝穆趙皇后諱安宗下邳僮人也父裔永初二年有司奏裔命婦孫可建昌縣君又曰孝穆蕭皇后名文壽蘭陵人父卓初與裔俱贈金紫光禄大夫妻下邳趙氏封呉郡壽昌縣君唐書曰古􅀇應妻髙氏固守飛狐縣城卒免爲突厥所䧟下詔曰頃屬黙啜攻城咸憂䧟没丈夫固守猶不能堅婦人懷忠不憚流矢由兹感激危城重安如不襃昇何以􅅄勸古􅀇應妻可封爲徇忠縣君又曰衡方厚妻程氏方厚太和中任邕州都督府録事叅軍爲招討使董昌齡誣枉殺之方厚妻程氏力不能免乃抑其哀如非􅁈者昌齡雅不疑慮聽其歸喪程氏故得以徒行詣闕截耳於右銀臺門告夫􅀍殺之􅁈御史臺鞠之得實諌官亦有章䟽故昌齡再授譴逐程氏開成元年降勑曰乃者吏爲不道虐殺尓夫詣闕申􅁈徒行万里﨑嶇偪畏濵於危亡血誠旣昭幽憤果雪雖古之烈婦何以加焉如聞􅀌孀無依晝􅂘待盡俾榮禄養仍錫䟽封可武昌縣君英雄記曰董卓孫女名白時尚未笄封爲渭陽君於郿城起壇從廣二丈餘髙五六尺使白乗金華青蓋車都尉中郎將刺史二千石在郿者各令乗軒􅆪筆爲白導從之壇上使兄子横爲使者授印綬也潘岳冝城宣君誄曰行成于巳名生於人考終定謚寔曰宣君祝宗蒞事卿相奉引輕車整駕介亡列陣鸞輅依容輼車􅂛襯郷君魏志曰卞隆以后父封睢陽郷侯隆妻王氏爲顯陽君追封隆前妻劉氏爲仁愼郷君后親母故也又曰甄儼孫女爲齊王皇后后父巳没封后母爲廣陽郷君晉書曰立皇后楊氏母太原龐氏爲安昌郷君追外曽祖母故司徒王朗夫人夏氏爲滎陽郷君晉中興書曰哀靖皇后王氏字穆之司徒左長史濛之女也初爲瑯瑘王妃哀帝即位拜爲皇后追贈父濛金紫光禄大夫封晉安縣侯母愛氏爲安國郷君也又曰元敬皇后虞氏字孟母濟陽外黃人也祖壽撫軍大將軍􅁺父豫太傅叅軍中宗之爲瑯瑘王納后爲妃豫妻王氏爲邢陽縣君從母散􅀐常侍新野王罕妻爲平陽郷君又曰康獻皇后禇氏太傅襃之女封母謝氏爲㝷陽郷君又曰成恭皇后杜氏陵陽京兆人也母裴氏爲廣德縣髙安郷君賜錢百萬布五百疋又曰穆章皇后何氏字法倪司空充之女追贈父充光禄大夫封晉興侯母孔氏長樂郷君又曰王藴以后父徴拜金紫光禄大夫封建昌侯母劉氏平樂君沈約宋書曰武敬臧皇后諱受東莞人也父儁追贈金紫光禄大夫妻髙密叔孫氏遷永平郷君唐書曰獨􅀌武都謀叛王丗充歸國事覺誅死武都子師仁年始三歳丗充以其年㓜不殺使禁掌之乳母王氏號蘭英請髠鉗求入保養丗充許之蘭英撫育提擕備盡筋力時喪亂年饑人多餓死蘭英扶路乞丐捃拾遇有所得便歸與師仁蘭英唯啖土飲水而巳後詐採拾乃􅀼師仁歸于京師髙祖嘉其義下詔曰師仁乳母王氏慈惠有聞撫鞠無倦提擕遺㓜背逆歸朝冝有襃隆以錫其號可封永壽郷君錫命尚書曰平王錫晉文侯秬鬯圭瓉作文侯之命左傳曰王命尹氏䇿命晉文公爲侯伯􅃬之大路之服戎路之服彤弓一彤矢百兹弓矢千秬鬯一卣虎賁三百人左傳曰文元年天王使榮叔來􅃬公命杜預注曰諸侯即位天子􅃬以命珪合瑞爲信􅀂僖二十八年王賜晉侯命亦其比也又曰襄十四年王使劉定公賜齊靈公命曰昔伯舅太公佑我先王股肱周室師保万民世胙太師以表東海王室之不壞繄伯舅是賴余今命汝環環齊靈公名也兹帥舅氏之典纂乃祖考無忝乃舊勲敬之哉無廢朕命纂継也因昏而加褒顯傳言王室不能命有功國語曰襄王使邵伯過及内史過賜晉惠公命吕甥郤芮相晉侯不敬晉侯執玉卑拜不稽首内史過歸以告王曰晉不亡其君必無後且吕郤將不免王曰何故對曰夏書有之曰衆非元后何戴后非衆無以守邑邑國在湯誓曰余一人有罪無以尓万方万方有罪在子一人在余一人乃我教道之過在盤庚曰國之臧則維汝衆今啇書盤庚是也臧善國俗之善則維女衆歸功於下也國之不臧則維余一人是有逸罰逸過罰罪也國俗之不善則維一人是我有過其罪當在我也如是則長衆使人不可不愼人之所急在大事大事戎祀也先王知大事之必以衆濟故祓除其心以和惠人祓拂也考中度􅂨以莅之莅臨考中省巳之中心以度人之中心恕以臨之也昭明物則以訓之制義庶孚以行之義冝庻衆孚信當制立事冝爲衆所信也祓除其心精也精潔考中度􅂨忠也忠恕也昭明物則禮也制義庶孚信也然則長衆使人之道非精不和非忠不立非禮不順非信不行今晉侯即位而背内外之賂背外不與􅁗也背内不與里丕田也虐其處者弃其信虐其處者殺里丕之黨不敬王命弃其禮施其所惡弃其忠巳所不欲勿施於人所惡於下无以事上今晉侯皆施之於人故曰弃其忠也以惡實心弃其精實滿四者皆弃則逺不至而近不和矣四者精忠禮信將何以守國古者先王旣有天下又崇立上帝明神而敬事之於是乎有朝日月以教人事禮天子以春分朝日以秋分夕月諸侯春秋受職于王以臨其人大夫士曰恪位著以儆其官中庭之左右曰位門屏之間曰着也庶人工啇各守其業以共其上猶恐有墜失也故爲車服旗章以旌之爲班爵貴賤以別之爲令聞嘉譽以聲之猶有散遷懈慢而著在刑辟流在裔土於是乎有蠻夷之國有斧􅃏刀墨之人而況可以􅁋縱其身乎夫晉侯非嗣也而得其位嗣適嗣也亹亹􅇶􅅥保位戒懼猶曰未也􅀂將廣其心而逺其隣凌其人而卑其上將何以固守夫執玉卑替其摯拜不稽首誣其王摯替無鎭誣王無人夫天事􅁪蒙任重享大者必速及故晉侯誣王人亦將誣之欲替其鎭人亦將替之大臣享其禄不諌而阿之亦必及焉襄王三年而立晉侯八年而隕於韓十六年而晉人殺懷公無胄秦人殺子金子公子金吕甥子公卻苪之字又曰襄王使太宰文公及內史興錫晉文公命上卿逆於境晉侯郊勞館諸宗廟饋九牢設庭燎及期命于武宫設桑主布机筵太宰莅之晉侯端委以入太宰以王命冕服内史賛之三命而後即冕服旣畢賔饗贈餞如公命侯伯之禮而加之以宴好內史興歸以告王曰晉不可不善也其君必霸逆王命敬奉禮義成敬王命順之道成禮義德之則德以道諸侯必歸之且禮所以觀忠信仁義忠所以分也仁所以行也信所以守也義所以節也忠分則均仁行則報信守則固義節則度分均無怨行報無匱守固不偷節度不擕􅀂人不怨而財不匱令不偷而動不擕其何事不濟中能應外忠也施三服義仁也守法不􅁋信也行禮不疚義也臣入晉境四者不失臣故曰晉侯其能禮矣王其善之樹於有禮艾人必豐王從之使於晉者道相逮及惠后之難王出在鄭惠后惠王之后㐮王継母陳嬀有寵生子帶將立子帶未及而卒子帶奔齊王復之又通于㐮王之后隗氏王廢隗氏周大夫頽叔姚子奉子帶以翟師伐周王出適鄭處于汜事在魯僖二十四年晉侯納之襄王十六年立晉文公二十一年以諸侯朝于衡雍且獻楚捷遂爲踐土之盟於是乎始霸范曄後漢書曰董昭等欲共進曹操爵國公九錫備物密以訪荀彧彧曰曹公夲興義兵以匡振漢朝雖勲庸崇著猶禀忠貞之節君子愛人以德不冝如此事遂寢操心不能平㑹南征孫權彧勞軍于譙表留彧晉中興書曰烈宗沖㓜桓温威震内外人情噂沓牙生同異謝安與王坦之盡忠匡翼温諷朝廷欲爲九錫使驍􅀐將軍􅀽宏具草時温巳病篤宏以呈安安視輙云不好更改之使弥歴旬日至于温薨錫命遂寢太平御覽卷第二百二
