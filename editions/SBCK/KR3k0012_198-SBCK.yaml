body:
  text: 封建部一叙封建爵異姓王封叙封建周禮夏官職方氏曰乃辨九服之􅀖國方千里曰王畿其外方五百里曰侯服又其外方五百里曰甸服又其外方五百里曰男服又其外方五百里曰采服又其外方五百里曰衛服又其外方五百里曰蠻服又其外方五百里曰夷服又其外方五百里曰鎭服又其外方五百里曰藩服凡􅀖國千里封公以方五百里則四公方四百里則六侯方三百里則七伯方二百里則二十五子方百里則百男以周知天下史記曰太史公曰殷以前尚矣周封五等公侯伯禽康叔於魯衛地各四百里親親之義襃有德也太公於齊兼五侯地尊勤勞武王成康所封數百而同姓五十地上不過百里下三十里以輔衛王室又曰髙祖定天下田横猶居海島帝喻之曰横來大者王小者侯又曰齊威王召即墨大夫而語之曰自子之居即墨也毀日至然吾使人視即墨田野闢民人給官無事東方以寕是子不事吾左右以求譽也封之萬家又曰鄒忌以鼔瑟見齊威王王恱之三月而受相印淳于髠見之曰善􅀃髠有愚志願陳諸前髠􅀃畢即出至門而語其僕曰是人者吾􅀃之微言其應我􅀂響之應聲是必封不乆矣漢書曰李廣與望氣王朔語自漢擊匈奴廣未甞不在其中而諸校尉材能不及中以軍功取侯者十數人廣不爲人後然終無封邑者何也豈吾相不當侯耶朔曰將軍自念豈有所恨者乎廣曰吾爲隴西太守羌甞反吾誘降八百餘人詐而同坑曰禍莫大於殺降此乃將軍所以不得侯也東􅀚漢記曰上封功臣皆爲列侯大國四縣餘各有差博士丁㳟等議曰古帝王封諸侯不過百里故利以建侯取法於雷上曰古之亡國皆以無道未甞聞封功臣地而滅也又曰馮勤爲郎中給事尚書以圖議軍粮在事精勤遂見親識由是使典諸侯封事百官表注記曰王者之制公侯伯子男凡五等上大夫卿下大夫上中士下士凡五等周興隆三聖制法立爵五等封國八百親親建國則周公宅魯康叔啓衛賢賢表德則太公封齊九命旣賜用征諸侯魯以周公之故郊􅀕昊天車服有􅁉季丗陵遟􅆫施無度強弱相吞舊制不復循也禹貢徐州土五色王者取五色土以爲社封四方諸侯各割其方色土與之皆苴以白茅皆假銅虎竹使符第五夫爲諸侯始受封之各有菜地百里之諸候以四十里爲菜地七十里之諸侯以二十里爲菜地五十里諸侯以十五里爲菜地其後子孫雖有黜地而菜地丗丗不黜漢􅄂事曰天子太社以五色土爲壇封諸侯者取其土苴以白茅授之各以所封方之色以立社於其國故謂之受茅土漢興唯皇子封爲王者得茅土其他臣以户賦租入爲節不受茅土不立社王隱晉書曰元康􅀄楊駿輔政封賞過度石崇與散􅀐常侍蜀郡何舉共爲駮議以爲陛下聖德光􅀍皇靈啓祚正位宣化萬國歸心今承洪基此乃天授至於班爵行賞􅄖於太始崔鴻十六國春秋後燕録曰符定符紹等降慕容垂下書封紹等爲侯以酬􅁗王之惠且擬三恪呉越春秋曰呉王聞勾踐盡心自守增之以封越王乃使大夫種賫葛布十萬甘蜜九欓文笥七枚狐皮五􅀟以報增封之禮韓子曰穰侯越魏而東攻齊五年􅁗不益一尺之地反成其陶邑之封應侯以攻韓八年成其汝南之封自是以來諸用􅁗者皆應穰之􅀋也故勝戰則大臣尊益地則私封立􅀃􅁐曰鄭桓公東㑹封於鄭舎於宋東之逆旅逆旅之􅅱從外來曰客將焉之曰㑹封於鄭逆旅之叟曰吾聞之時難得而易失也今客之寢安殆非㑹封者也鄭桓公聞之援轡自駕其僕接術而載之􅀽子曰今有卿相之才居三公之位循其治政以寜國家未必封侯也今軍政之法斬一牙門將者封侯夫斬一將之功孰與安寕天下者安寕天下者不爵斬一將之功者封侯失賞之意也又曰春秋鄭莊公封母弟於京􅀕仲曰都城過制國之害也其後卒相攻伐國内大亂故過度則有強臣之禍鄙小則有微弱之􅁨􅁗以列國之􅀔而并天下自以由諸侯而起之也於是去五等之爵而致郡縣雖有親子母弟皆爲匹夫及其政衰夫一呼而天下去及至漢家見亡􅁗以􅀌特亡也於是大封子弟或連城數十廓地千里自􅀜巳東皆爲王國力多而權重故亦有七國之難白虎通曰王者即位先封賢者憂民之急也故列土分疆非爲諸侯張官設府非爲卿大夫皆爲民也封諸侯以夏何陽氣盛養故以封諸侯盛養賢也立人君陽德之盛者也又曰受命之王致太平之美羣臣上下之功故盡封之乃中興征伐大功皆封所以襃大功也盛德之士亦封之所以尊有德封者必試之爲附庸三年有功因而封之五十里凡士有功者亦爲附庸附丗其位大夫有功成封五十里卿成封七十里公成封百里又曰公居百里侯居七十里何封示之優賢義欲襃尊而上之何以知殷家侯不過七十里曰土有三等有百里七十里五十里公卿大夫者何謂也内爵稱也爲爵稱公卿大夫何爵者量其職盡其才公之爲言公正無私也卿之爲言章也善明也大夫之爲言大扶扶進人也王充論衡曰堯舜之人可比屋而封桀紂之人可比屋而誅曹植遷都賦曰余􅀄封平原轉出臨淄中命鄄城遂徙雍丘改邑浚儀而末將適于東阿號則六易居實三遷連遇瘠土衣食不繼爵易中孚卦曰鳴鶴在隂其子和之我有好爵吾與爾縻之左傳襄公三年曰齊莊公爲勇爵設爵位以命勇士殖綽郭最欲與焉州綽曰東閭之役臣左􅆖迫還於門中識其枚數識門枚樓其可與乎公曰子爲晉君也對曰臣爲􅀠新然二子者譬之禽獸臣食其肉而寢其皮矣言甞射得之也白虎通曰爵五等者法五行或三等者法三光或法三或法五何質者據天故象三光文者據地故法五行禮含文嘉曰殷爵三等周爵五等各有冝也王制曰王者之制爵禄凢五等謂公侯伯子男乎此據周也所以名之爲公侯何公者公正無私之意侯者侯順逆故也孝經援神契曰二王之後稱公大國侯皆千乗象雷百里所潤雲雨同史記曰􅁗聞馬服子將乃隂使白起爲上將軍竒兵絶趙軍後趙軍分而爲二糧道絶􅁗王聞趙食道絶王自之河内賜民爵各一級發十五已上悉詣長平遮絶救之又曰􅁗始皇四年百姓内粟千石拜爵一級漢書曰惠帝元年民有罪得賣爵三十級以免死罪應劭日一級直錢二千凡爲六萬􅀂今贖入三千疋強矣晉灼武帝一級七十萬始皇本紀入粟千斛拜爵一級時制各異者也賜民爵户一級六年令民得賣爵又曰衛青比年擊胡賦稅旣竭不足以奉戰士有司請令民得賣爵及贖禁錮免賦罪請置賞官名曰武功爵也又曰宣帝五鳯四年大司農中丞耿壽昌奏設常平倉以給北邊省轉漕爵􅀜内侯􅀽山松後漢書曰建寧二年爵乳母趙堯爲平氏君魏書曰太祖置名號侯爵十八級􅀜中侯爵十七級􅀜外侯十六級五大夫十五級與舊列侯凡六等魏氏春秋曰黄􅀄三年帝欲封太后母尚書陳羣奏曰案典籍之文無婦人分土命爵之制在禮婦人因夫爵秦違古法漢氏因之非先王之令典帝曰是也晉書曰長樂馮恢父爲􅀪農太守愛少子淑欲以爵傳之恢父終服闋乃還郷里結草爲廬陽瘖不能言淑得襲爵恢始仕管子曰爵不尊禄不重者不與圖難犯危以其道爲未可以求之也是故先王制軒冕足以著貴賤不求其美設爵禄足以守其服不求其觀使君子食於道小人食於力孟子曰有天爵者有人爵者仁義忠信樂善不倦此天爵也公卿大夫人爵也天爵以德人爵以禄古之人修天爵而人爵從之今之人脩其天爵以要人爵旣得人爵而棄其天爵則惑之甚者也啇君書曰明王之所貴唯爵其賞不榮則民急其列不顯則民不事爵易得也則民不貴淮南子曰爵禄者人臣之銜轡􅀃􅁐曰晉文公出亡周流天下舟之僑去虞而從文公文公反國擇可爵而爵之擇可禄而禄之僑獨不與焉文公酌諸大夫酒酒酣公曰二三子盍爲寡人賦乎舟之僑曰君子爲賦小人請陳其辭辭曰有龍矯矯頓失其所一虵從之周流天下龍反其淵虵寧其處公戄然曰子欲爵也請待旦日之朝子欲禄耶請今命廪人之僑曰請而得其賞廉者不受也言盡而名至仁者不爲也遂退終身誦甫田之詩風俗通曰漢武帝諱徹改曰通侯或曰列侯􅁗時六國未平將帥皆家􅀜中故稱􅀜内侯通侯言其功大通於王室列者言其功德列著乃饗爵也王粲爵論曰爵自一級轉登十級而爲列侯譬猶秩自百石轉遷而至於公也而近丗賞人皆不由等級從無爵封無列侯原其所以爵廢故也司馬法曰賞不踰時欲民速觀爲善之利也近丗爵廢人有小功無以賞也乃積累焉頒事足乃封侯非所以速爲而及時也上觀古比髙祖功臣及白起衛鞅皆稍賜爵爲五大夫客卿庶長以至於侯非一頓而封也夫稍稍賜爵與功大小相稱而俱登旣得其義且侯次有緒使慕進者逐之不倦矣異姓王封漢書曰髙祖定天下功臣異姓王者八國張耳呉芮彭越黥布臧荼盧綰與兩韓信皆徼一時之權變以詐力成功咸得裂土南面稱􅀌見疑強大懷不自安事窮勢迫卒謀叛逆終於滅亡張耳以知全至子亦失國唯呉芮之起不失正道故能傳號五丗以無嗣絶澤流支庶有以矣夫以其不用詐力也漢書曰張耳大梁人也少時及魏公子母忌爲客甞亡命遊外黄外黄富人女甚美庸奴其夫亡邸父客父客謂曰必欲求賢夫從張耳女聽爲請決嫁之女家厚奉給耳耳故致千里客宦爲外黄令髙祖爲布衣時甞從耳遊􅁗滅魏故購求耳千金耳變姓名之陳爲里監門後項羽素亦聞耳賢廼分趙立耳爲常山王田榮襲耳耳敗走漢漢二年遣耳與韓信擊破趙井陘斬陳餘泜水上四年夏立耳爲趙王耳薨子敖嗣立爲王又曰韓信平齊使人言漢王曰齊夸詐多變反覆之國南邊楚不爲假王以塡音鎭之其􅀔不定今權輕不足以安之臣請自立爲假王當是時楚方急圍漢王於滎陽使者發書漢王大怒罵曰吾困於此旦暮望而來佐我乃欲自立爲王張良陳平從後躡漢王足因附耳語曰漢方不利寧能禁信之自王乎不如因立善遇之使自爲守不然變生漢王亦寤因復罵曰大文夫定諸侯即爲眞王耳何以假爲遣張良立信爲齊王徴其兵使擊楚又曰彭越字仲昌邑人也常漁鉅野澤中爲盗陳勝起歳餘澤間少年相聚百餘人徃從越請仲爲長乃行略地收諸侯散卒得千餘人沛公之從碭北擊昌邑越助之昌邑未下沛公引兵西越亦將其衆居鉅野澤中項籍入􅀜王諸侯還歸越衆萬餘人無所屬齊王田榮叛項王漢乃使人賜越將軍印使下濟隂以擊楚大破楚軍漢二年拜越爲魏相國將兵略定梁地漢王之敗彭城􅄙而西也越皆亡其所下城獨將其兵北居河上漢三年越常徃來爲漢游兵擊楚項王與漢王相距榮陽越攻下睢陽外黄十七城漢王追楚爲項籍所敗固陵廼謂留侯曰諸侯兵不從爲之奈何留侯曰彭越夲定梁地功多始君王以魏豹故拜越爲相國今豹死亡後且越亦欲王而君王不蚤定今取睢陽以北至榖城皆許以王彭越則兵至矣於是漢王發使使越如留侯䇿使者至越乃引兵㑹垓下項藉死立越爲梁王都定陶又曰項羽入咸陽黥布爲前鋒項王封諸將立布爲九江王後與隨何俱歸漢漢王方踞牀洗而召布入見布大怒悔來欲自殺出就舎張御飲食從官如漢王居布又大喜過望漢益分布兵而與俱北收兵至成臯四年秋七月立布爲淮南王又曰盧綰豐人也與髙祖同里及髙祖􅀄起沛綰以客從入漢中爲將軍項籍死使綰別將劉賈擊臨江王共尉還從擊燕王臧荼皆破平時諸侯非劉氏而王者七人上欲王綰羣臣觖望及虜臧荼乃下詔諸將相列侯擇羣臣有功者以爲燕王羣臣知上欲王綰皆曰太尉長安侯綰常從平定天下功最多可王上乃立綰爲燕王諸侯得幸莫如燕王者漢十年陳豨反漢旣斬豨其禆將降言燕王綰使范齊通謀豨所上使使召綰綰稱病又謂其幸臣曰非劉氏而王者獨我與長沙耳今上病屬任吕后吕后婦人專欲事誅異姓王者及大功臣迺稱病不行髙祖崩遂亡入匈奴又曰呉芮􅁗時畨陽令甚得江湖間民心號曰畨君天下之􅀄叛􅁗也黥布歸芮芮以女妻之因率越人舉兵以應諸侯沛公攻南陽迺遇芮之將梅鋗呼􅀇切與偕攻析酈降之及項羽相王以芮率百越佐諸侯從入􅀜故立芮爲衡山王項籍死上以鋗有功於入武􅀜故德芮徙爲長沙王都臨湘又曰惠帝崩立孝惠後宫子爲帝吕太后臨朝稱制遂立周吕侯子台爲吕王台弟産爲梁王建城侯釋之子禄爲趙王台子通爲燕王又封諸吕凡六人皆爲列侯太后病困以趙王禄爲上將軍居北軍梁王産爲相國居南軍戒産禄曰髙祖與大臣約非劉氏王者天下共擊之今王吕氏大臣不平我即崩恐其爲變必據兵衛宫愼母送喪爲人所制太后崩太尉周勃丞相陳平朱虚侯劉章等共誅産禄迎立代王是爲孝文皇帝晉書曰􅀄武帝爲王時王祥與荀顗徃謁謂祥曰相國王尊重列侯旣巳盡敬今便當拜也祥曰相國誠爲尊貴然是魏之􅌠相吾等魏之三公公王相去一階而巳班列大同安有天子三司而輙拜人者損魏朝之望虧晉王之德君子愛人以禮吾不爲也及入顗遂拜而祥獨長揖帝曰今日方知君見顧之重矣北齊書曰尉景之子粲少歷顯職體性麄武天寳􅀄封庫狄干等爲王粲以不預王爵大恚恨十餘日閉門不朝帝恠遣就宅問之隔門謂使人曰天子不封粲父作王粲不如死使云湏開門受勑粲遂彎弓隔門欲刺使者使者以􅃺聞之文宣使叚韶諭旨粲見韶唯撫膺大哭不荅一言文宣親詣其宅慰之方復朝請㝷追封景長樂王唐書曰安禄山死朝廷欲圖大舉詔郭子儀帥師趨京城師於潏水之西與賊將安太清安守忠戰後從元帥廣平王率蕃漢之師十五萬進收長安京師老㓜百萬夾道懽叫涕泣而言曰不圖今日復見官軍是時河東河西河南所盗郡邑皆平以功加司徒封代國公入朝天子遣兵仗戎容迎于灞上肅宗勞之曰雖吾之家國實由卿再造子儀頓首感謝乾元元年九月詔子儀與九節度之師討安慶緒以中官魚朝恩爲觀軍容宣慰使朝恩害子儀之功媒蘖之召還京師子儀雖失兵柄乃心王室以禍難未平不遑寢息俄而史思明再䧟河洛朝廷旰食復慮蕃冦逼迫京畿言事者以子儀有社禝大功今殘孽未除不冝置之散地肅宗深然之上元元年以子儀爲諸道兵馬都統復爲朝恩所間事竟不行上元二年李光弼兵敗於邙山河陽失守又河中軍亂殺其帥李國貞太原節度使鄧景山亦爲部下所殺恐其合從連賊朝廷深憂之後軰帥臣未能彈壓遂用子儀爲朔方河中北庭潞儀澤沁等州節度行營兼興平定國副元帥進封汾陽郡王出鎭絳州子儀至絳擒殺其國貞賊首王元振數十人並誅之太原辛雲京聞子儀誅元振亦誅害景山者由是河東諸鎮率皆奉法又曰渾瑊皐蘭州人也本鐵勒九姓部落之渾部也父釋之少有武藝從朔方軍積戰功於邊上累遷至開府儀同三司寧朔郡王德宗幸奉天瑊率家人子弟自京城至乃署爲行都虞候以拒朱泚賊平德宗還宫以瑊爲河中尹河中綘慈隰節度使封咸寧郡王又曰馬燧字洵美汝州郟城人少甞與諸兄讀書輟卷歎曰丈夫當建功於代以濟四海安能矻矻爲一儒哉燧姿度魁異沉勇多智略後朱泚之亂燧守太原燧以晉陽王業所起乃引晉水而注城之東渚以爲池寇至計省守陴者萬人㝷兼保寧軍節度使封北平郡王太平御覽卷第一百九十八
