front:
  text: 太平御覽卷第十一
  hash: sha256:cbf987daa0978f6b99c126261375ae252603aee944391e35f4ca9d6f08ff3155
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_011-1a}
body:
  text: 天部十一􅀨下祈􅀨霽􅀨下河圖帝道紀曰􅀨者天地之施也遁甲開山圖曰霍山南岳有雲師􅀨虎榮氏解曰雲師如蚕長六寸有毛似兎􅀨虎如蚕長七八寸似蛭雲􅀨之時出在石上􅁏甘可熟而食又曰鄭有不毛山上有無爲之君分布雲􅀨於九州之内榮氏曰不毛山不生樹木古無爲之君常處其上布􅎈雲􅀨九州之内平均河圖祕徴曰君急恚怒無雲而􅀨黄帝素問曰清陽爲天濁隂爲地地氣上爲雲天氣下爲􅀨􅀨出地氣出天又曰天氣下而爲􅀨太公金匱曰武王師到牧野陣未畢而暴風疾􅀨雷電幽冥前後不見太公曰善雷電者是吾軍動應天也太公伏符隂謀曰紂常以六月獵於西土西土之老少相與謀曰君王逆人此其命固不壽也後數日而暴風大􅀨發屋拔木漂殺人民六畜明年諸侯謀合四海兵起又曰武王兵入啇都前歌後舞甲子進兵乙􅐫而􅀨太公兵法曰將有三禮武王曰敢問三禮太公曰將冬日不服裘夏日不操扇天􅀨不張幔蓋名將禮太公對敵權變逆順法曰夫軍出逢天無雲而􅀨此天泣也軍没不還魏武帝兵書按要曰大軍將行􅀨濡衣冠是謂洒兵其師有慶又曰三軍將行其旗墊然􅀂􅀨是謂天露三軍失徒將陣􅀨甚是謂浴屍先陣者敗亡又曰大將始行􅀨而薄不濡衣冠是謂天泣其將大凶其卒散亡雜兵書曰諸雲氣諸變暈日月蝕風散之雲振之􅀨壓之皆解又曰大人之兵如虎如狼如風如􅀨如雷如電振振瞑暝天下盡驚又曰軍始營風􅀨從後來沾衣裳大􅁻又曰有大雲􅀨軍内滂沲甚者軍罷無功桓寛鹽鐵論曰孔子大聖也甞居上位相魯三月不令而行不禁而止沛􅀂時􅀨之灌萬物莫不興起也王充論衡曰道至天者翔風起甘􅀨降霽而隂曀者謂之甘􅀨非謂􅀨水味甘也又曰太平之時五日一風十日一􅀨又曰周公時􅀨不破塊風不鳴條旬而一􅀨􅀨必以夜丘陵髙下皆熟神異經曰西海上有人焉乗白馬朱鬛白衣素冠從十二童子馳馬西海上如飛名曰河伯使者其所至之國􅀨水滂沲樂動聲儀曰焦明至爲􅀨備焦明水鳥楚辭曰雷填填􅀆􅀨冥冥潘尼苦􅀨賦曰瞻中塘之浩汗聽長霤之涔涔成公綏隂霖賦曰沉竈生鼃中庭運舟傅咸愁霖詩曰舉足没泥濘市道無行車蘭桂賤朽腐柴粟貴明珠張孟陽雜詩曰雲根臨八極􅀨足􅎈四溟霖瀝過二旬散澷亞九齡堦下伏泉涌堂上水衣生尺燼重㝷桂紅粒貴瑶瓊又詩曰騰雲似湧烟宻􅀨如散􅁝劉楨詩曰和風從東來􅀇雲起西山夜中發此氣明旦飛甘泉應璩與韋誕書曰夫以原憲懸磬之居而值皇天無已之􅀨室宇漸而作漏堂館洽而爲泥祈􅀨禮記月令曰孟夏大雩帝命有司禱祀山川古之卿士有益於人者以祈榖實雩者祭天祈􅀨之名大雩窩用盛樂也漢書曰董仲舒爲江都相理國以春秋灾異之變推隂陽所錯行故求􅀨閉諸陽縱諸隂其止􅀨反是者義云祈􅀨閉南門止􅀨范曄後漢書曰諒輔仕郡爲五官椽時夏大旱太守自出禱山川連日而無所降輔乃自暴庭中慷􅁣呪曰輔爲股肱不能進諌納忠和調隂陽至令天地否隔萬物焦枯咎盡在輔今敢自祈請􅀂至日中不􅀨乞以身塞無狀於是積薪聚艾茅以自環搆火將自焚未及中時天雲晦合須􅁷澍􅀨謝承後漢書曰戴封字平仲遷西華令其年大旱禱請無􅀗乃積薪坐其上以自焚火起而大􅀨逺邇歎服遷中山相又曰奚延轉議郎徐州遭旱延使持節到東海請􅀨豐澤應澍􅀨與京師同日俱霈還拜五官中郎將又曰周暢性仁慈爲河南尹夏旱乆禱無應因収葬洛城傍客死骸骨萬餘人應時澍􅀨􅀊乃豐稔又曰章和元年有詔以鄭􅀪爲太尉時旱朝廷百僚皆暴請􅀨夏炎熱小􅀨群官即還舎􅀪彌日不旋大􅀨澍稼穡遂豐又曰汝南周􅀗善占天文爲郡門下椽鮑昱爲汝南太守時郡境天旱昱自徃問何以致􅀨􅀗曰急罷三部督郵明府當自北出到四十里亭􅀨可致也昱從之果得大􅀨毎行縣輒軾其閭東觀漢記曰曹襃爲河内太守時旱春至六月無􅀨榖貴百姓頗流離襃到省吏職退去貪殘屢得澍􅀨其秋大熟百姓給足流民皆還又曰和熹鄧后永􅀄二年三月京師旱至五月朔太后幸雒陽省獄舉􅁈末還宫澍􅀨大降司馬彪續漢書曰永元六年張􅁬代劉方爲司空時􅀊灾旱祈􅀨無應乃表即時引見口陳時政之冝明日和帝召太尉司徒幸洛陽即大􅀨三日蜀夲記曰秦王誅蜀侯惲後迎葬咸陽天雨三月不通因葬成都故蜀人求􅀨祠蜀侯必􅀨王隱晉書曰束晢太康中郡大旱苗稼敗晢乃命邑人躬共請􅀨三日中􅀨水三尺衆人以其有術數精誠感於神明百姓懽喜爲之歌曰束先生通神明請天三日甘􅀨零我􅁰以萌我稷以生何以疇之報束先生髙閭燕志曰太平十五年自春不􅀨至於五月有司奏右部王荀妻産妖傍人莫覺俄而失之乃暴荀妻於社大􅀨普洽魚豢典略曰舊制求􅀨太常禱天地宗廟社禝山川已賽如其常􅀕牢禮四月立夏旱乃求􅀨立秋雖旱不禱求􅀨到七月畢賽之秋冬春三時不求􅀨崔鴻春秋前燕録曰建熈七年五月慕容暐下書曰朕以寡德􅊩政多違亢陽三時光隂錯緒農植之辰而零􅀨莫降其令有司徹樂太官以菜食常供􅀕奠旣而澍􅀨大降又前凉録曰張植爲西域校尉與奮威將軍牛覇率􅀐救張冲六月至于流沙無水士卒渴甚植乃剪髮􅁏􅃝徒跣升壇慟泣請􅀨俄而雲起西北􅀨水成川植殺所乗馬􅀕天而去又前􅁗録曰沙公西域沙門也有祕術每旱苻堅常使呪龍龍便下鉢中天輒大􅀨後魏書曰孝文太和二年京師旱祈􅀨天子於北苑親自禮焉減膳避正殿澍􅀨大洽三年帝祈􅀨於北苑閇陽門是日澍􅀨益部􅂄舊傳曰趙瑶爲閬中令遭旱請􅀨於靈星應時大􅀨􅁑仙公傳曰呉主曽與仙公坐於榭上望見道間人民請􅀨土人累時不得仙公曰􅀨可得耳即書符着社廟中日午大􅀨尺餘水長沙􅂄舊傳曰祝良爲洛陽令時亢旱天子祈􅀨不得良暴身階庭告誠引罪紫雲沓起甘􅀨仍降佛圖澄傳曰石虎時自正月至六月不􅀨澄詣􅇭口祠稽首暴露即有二白龍降於祠下於是􅀨遍數千里干寳搜神記曰湯旣克夏大旱七年洛川竭湯乃以身禱於桑林剪其髪自以爲犧牲祈福於上帝於是大􅀨惣至洽于四海又曰湘東新平縣有一龍穴穴中有黒土􅀊旱人則共壅水於此穴穴淹則立大􅀨宋永初山川記曰鄱陽長壽山山形似馬白雲出於鞍中不崇朝而􅀨盛􅀪之荆州記曰佷山縣有一山獨立峻絶西北有石穴北行百歩許二大石其間相去一丈許俗名其一爲陽石一爲隂石水旱爲灾鞭陽石則􅀨鞭隂石則晴又曰湘東有􅀨母山山有祠壇毎祈禱無不降澤以是名之又曰来陽縣有􅀨瀬此縣時旱百姓共壅塞之則甘􅀨普降􅀂一郷獨壅􅀨亦偏應隨方所祈信若符刻顧微廣州記曰鬱林郡山東南有一池池邊有一石牛人􅀕祀之若旱百姓殺牛祈􅀨以牛血和泥泥石牛背祀畢則天􅀨大注抱朴子曰使者甘宗所奏西域事云方士能神祝者臨泉禹歩吹氣龍即浮出長十數丈更吹龍輒縮至長數寸乃掇取著壷中壷中或有四五龍以少水養之聞有旱處便賫龍往賣一龍直數十斤金發壷出一龍著潭中復禹歩吹之長數十丈須􅁷而雲􅀨四集又曰歷陽有彭祖仙室請􅀨必得晏子春秋曰齊景公時旱欲祠靈山晏子曰山以石爲身草木爲髪天苟不􅀨髪燋身熱獨不欲􅀨乎祠之何益公曰祠河伯可乎曰河伯以水爲國魚鼈爲民乆旱國將亡民將滅獨不欲􅀨乎君避殿曝露其索􅀨乎公出野曝露天果大􅀨淮南子曰土龍致􅀨許愼注曰湯遭旱作土龍以象雲從龍也又曰董仲舒請􅀨秋用桐木魚山海經曰東荒北隅有山名土丘應龍處南極殺􅃖尤與夸父不得復上故下數旱旱而爲應龍之狀乃得大􅀨今之土龍夲此也遁甲開山圖曰絳北有陽石山有神龍池黃帝時遣雲陽先生養於此帝王歷代養龍之處國有水旱不時即祀池請􅀨爾雅孫炎注曰攝木生江上有􅀉枝髙三四丈生毛一名楓子天旱以泥塗之即􅀨傅咸自叙曰太始九年自春不􅀨渉夏節聖皇勞慮分使祈禱余以太子洗馬兼司徒涖事三朝􅀨大降退作喜􅀨賦霽􅀃文曰霽􅀨止也霋音妻􅀨霽也霩火郭反􅀨上雲罷貌魏略五行志曰延康元年大霖􅀨五十餘日魏有天下乃霽將受魏祚之應也晉中興徴祥記曰咸和四年隂霖五十餘日􅂫峻滅乃霽長沙􅂄舊傳曰文度字仲儒爲郡功曹吏時霖􅀨廢人業太守憂悒召度􅀘户曹度奉教齊戒在社三日夜夢白頭翁謂曰爾來何遲翌旦度具白所夢於太守曰昔禹夢青繡文衣男子稱蒼水使者禹知水脉當􅀂椽此夢將其比也明日果大霽扶南日南傳曰金陳國入四月便􅀨六月乃止少有晴日六月不􅀨常晴􅀊􅀊如此太平御覽卷第十一
