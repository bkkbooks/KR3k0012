front:
  text: 太平衘覽卷第五百六十五
  hash: sha256:5dc8d41cb4a36e72730c00fbda48e74702ea69cf0760aaacced29cba81e46051
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_565-1a}
body:
  text: 樂部三雅樂下律吕雅樂下國語曰夫琴瑟尚宮鍾尚羽石尚角大不踰宫細不過羽故樂器重者從細輕者從大瓦絲尚啇匏竹尚徴革木一聲吕以和樂律以平聲金石以動之絲竹以行之歌以詠之匏以宣之􅁟以賛之革木以節之物得其常曰樂清濁相應曰聲聲相保曰和細大不踰曰平如是金磨之石擊之絲木越之匏竹節之以節八風春秋感精符曰冬至日人主與群臣左右縱樂五日天下人衆亦家縱樂五日以迎日冬至人主備八能之士撞黄鍾之鍾擊黄鍾之皷公卿大夫列士乃使八能之士擊黄鍾之皷用馬革皷貟徑八尺一寸皷黄鍾之瑟瑟用槐木瑟長八尺一寸吹黄鍾之律間音以竽􅀘竽長四尺二寸天地以和應黄鍾之音得蕤賔之律應則公卿大夫列士以德賀於人主因請政所行請五官之符各受其賞聲之調者時氣和則人主以礼賜公卿列士五日儀定天地之氣和人主公卿大夫列士之德則隂陽之晷如度數夏日至之礼如冬日至之礼舞八樂皆以肅敬爲戒八音者雲用五英大筮大卷大韶大夏大護大武也黄鍾之音調諸氣和人主之音順則蕤賔之律應磬聲和公卿大夫列士誠信林鍾之律應此謂冬日至成天文夏日至成地理頴客春秋釋例曰周用六代之禮樂故有雲門咸池大韶大夏大護大武也魯受四代之禮樂故不舞雲門咸池示有降殺也五經通義曰受命而王者六樂焉以太一樂天以咸池樂地以肆夏樂人以大夏樂四時以大護樂五行神明以大武樂六律各象其性而爲之制以樂其先祖又曰歌舞同處􅁘異􅁘歌者象德舞者象功君子尚德下功故歌在堂舞在庭歌以飬形歌者有聲舞者有形何言歌在堂也以燕礼曰升歌鹿鳴以是知之何以言舞在庭也援神契曰合忻之樂舞於堂四夷之樂陳於户以是明之韓詩外傳曰古者天子左右五鍾將出則撞黄鍾而右五鍾應之馬鳴中䂓律駕者文御者有數立則磬折拱則抱鼓出入中䂓折旋中矩然後太師奏升車之樂告出也入則撞蕤賔以治容貌容貌治則得顔色齊顔色齊則肌膚安蕤賔有声鵠震馬鳴及倮介之虫無不延頸以聽蕤賔在内者皆玉色在外者皆金声然後少師奏升堂即席告入也此言物􅀋相感声相應之義也又曰湯作護聞其宫声使人温良而寛大聞其啇声使人方廉而好義聞其角声使人惻隱而仁愛聞其徴声使人樂飬而好施聞其羽声使人㳟儉而好礼白虎通曰樂也君子樂得其道小人樂得其欲声音何声鳴也聞其声即知所生声音者謂官啇徴羽也音飲也剛弱清濁和而相飲也音有八謂金石􅁝竹土木匏革太平乃作樂樂所以防􅁋奢民飢寒何樂之防子思子曰繁於樂者重於憂厚於味者薄於行君子同則有樂異則有禮孟子曰莊暴見孟子曰暴見於王王語暴以好樂暴未有以對也孟子曰王之好樂甚則齊國其庶幾乎他日見於王曰王嘗語莊子以好樂有諸王變乎色曰寡人非能好先王之樂也直好丗俗之樂耳曰今之樂猶古之樂也臣請爲王言之今王鼔樂於此百姓聞王鍾鼔之声管籥之音舉疾首䠞頞而相􅀂曰吾王之好皷樂夫何使我至於此極也父子不相見兄弟妻子離散此無他不與民同樂也今王皷樂於此百姓聞王鍾鼔之声管籥之音舉欣欣然有喜色而相告曰吾王庶幾無疾病與何以能皷樂也此無他與百姓同樂也今王與百姓同樂則王矣墨子曰程繁問於子墨子曰聖王不爲樂昔諸侯倦於聽治息於鍾皷之樂士大夫倦於聽治息於竽琴之樂農夫春耕夏耘秋歛冬藏息於吟􅇲之樂今夫子曰聖王不爲樂此譬之猶馬駕而不脫弓張而不弛墨子曰昔者堯舜有茅茨者且以爲禮且以爲樂湯放桀環天下自立因先王之樂又自作樂命曰護又循九韶武王勝殷殺紂環天下自立因先王之樂又自作樂命曰象周成王因先王之山海經曰祝融生子長琴是處揺山始始作樂丗􅀃曰荀公曽善解音声時論謂之闇解遂調律吕正雅樂毎至正㑹殿庭作四指自謂宮啇無不諧韻阮咸妙賞時論謂之神解每至公㑹作樂荀心識阮意必謂之不調而阮口􅀄無言直意忌之遂出阮爲始平太守後有田父耕於野地中得周時玉尺便是天下正尺荀試以校巳所治鍾皷金石􅁝竹皆短校一米於此伏阮之妙解徴阮南還􅀃苑曰孔子至齊郭門之外遇一嬰兒擊一壷相与俱行其視精其心端孔子謂御曰趣駈之韶樂方作故樂不獨自樂也又以樂人非獨以自正也又以正人樂􅀃曰聖人作樂不以爲娱樂以觀得失之節故不取備於一人必湏八能之士故八士或調隂陽或調五行或調盛人或調律暦或調五音與天地神明合德者則七始八終各得其冝也七始謂四方天地人也又曰上元者天氣也居中調禮樂教化流行㹅五行氣爲一下元者地氣也爲萬物始質也爲萬物之容範中元者人氣也其氣以定萬物通於四時承天心理禮樂通上下四時之氣和合人之情以愼天地者也時元者受氣於天布之於地以時出入萬物者也風元者禮樂之夲萬物之首物莫不以風成熟也聖王知物極盛則衰暑極則寒樂極則哀是以日中則昊月盈則蝕天地盈虚與時消息制禮作樂者所以改丗俗致祥風和􅀨露爲萬姓􅀗福於皇天者也聖人作樂䋲以五元度以五星碌貞以道德彈形以䋲墨賢者進佞人伏䋲正也碌碌摩也貞正也彈割也要覽曰桓君山曰余兄弟頗好音甞至洛聽音終日而心足由是察之夫􅀷其旨則欲罷不能不入其意故過已風俗通曰案劉韶鍾律書曰春宫秋律百卉必凋秋宫春律萬物必榮夏宫冬律雨雹必降冬宫夏律雷必發声夫音樂至重所感者大故曰知禮樂之情能作知禮樂之文者能述華譚論曰夫無声者五音之祖无形者萬物之君夲其祖然後情啇徴之妙理其君然後正妍朴之容推精朴以撿得失稽清濁以接在亡夫􅀫瘤嫫母經日而人不視者何一尺之靣醜也西施毛嬙靡服而人左顧者何一尺之靣好也夏􅁎以容美而陳亡濮水以声好而國滅夫何媱哇之有乎是以聖王知物之感人無窮而情之好􅁖无節无窮則人不能防其行无節則中材不能制其欲是以爲制可行之禮立中庸之法使賢者俯就不肖者企及明樂之妙以爲教也阮籍樂論曰聖人之作樂將以順天地之體成萬物之性也故定天地四方之音以迎隂陽八風之聲均黄鍾中和之律開群生萬物之氣奏之圜丘而天神下奏之方丘而地祗上吴楚之風好勇故其俗輕死鄭衛之風好􅁋故其俗輕蕩輕死故有蹈水赴火之歌輕蕩故有桑間濮上之曲懷永曰之娯抱長夜之忻云終身之樂􅁋縱之俗故江淮以南其民好殺漳汝之間其民好奔呉有􅀟劒之節趙有挾琴之客氣發於中声入於耳手足飛􅀭不覺其駭也桓譚新論曰楊子雲大才而不曉音余頗離雅操而更爲新弄子雲曰事淺易喜􅀷者難識卿不好雅頌而恱鄭声冝也律呂周禮曰大師掌六律六同以合隂陽之声陽声黄鍾大蔟姑洗蕤賔夷則無射隂声大吕應鍾南吕函鍾小吕夾鍾皆文之以五声宫啇角徴羽皆播之以八音金石土革􅁝木匏竹注云以合隂陽之声者声之隂陽各有合也黄鍾子之氣也十一月建焉而辰在星紀大吕􅐫之氣也十二月建焉而辰在􅀇枵太簇寅之氣也正月建焉辰在娵訾應鍾亥之氣也十月建焉辰在析木之津姑洗辰之氣也三月建焉而辰在大梁南吕酉之氣也八月建焉而辰在壽星蕤賔午之氣也五月建焉而辰在鶉首林鍾未之氣也六月建焉而辰在鶉火夷則申之氣也七月建焉而辰在鶉尾中吕巳之氣也四月建焉而辰在實沈無射戍之氣也九月建焉而辰在大火夾鍾夘之氣也二月建焉而辰在降婁辰與建交錯互處如表裏然是其合也其相生則以隂陽六體爲之黃鍾􅀄九下生林鍾之􅀄六也林鍾又上生太簇之九二太蔟又下生南吕之六二南吕又上生姑洗之九三姑洗又下生應鍾之六三應鍾又上生蕤賔之九四蕤賔又下生大吕之六四大吕又上生夷則之九五夷則又上生夾鍾之六五夾鍾又下生無射之上九無射又上生中吕之上六同位者象夫婦異位者象母子所謂律娶妻而吕生子者也又曰典同掌六律六同之和以辨天地四方隂陽之声以爲樂器注云陽声属天隂声属地天地之声布於四方故書同或作銅鄭司農云陽律以竹爲管隂律以銅爲管竹陽也銅隂也各順其性吕氏春秋曰黄帝詔伶倫作爲音律伶倫自大夏之西乃之崑崙之隂取竹於嶰谷以生竅厚簿均者断兩節間其長九寸而吹之以爲黄鍾之宫日含少次制十二管以崑崙之下聽鳯之鳴以別十二律其雄鳴爲六雌鳴亦六此黄鍾之宫適合皆可生之而律之夲也故曰黄鍾徴而均鮮全而不傷其爲宫獨尊象大聖之徳可以明至賢之功故奉而薦之于宗廟以歆迎功德丗丗不忘是故黄鍾生林鍾林鍾生大吕大吕生夷則夷則生太蔟太蔟生南吕南吕生夾鍾夾鍾生無射無射生姑洗姑洗生應鍾應鍾生蕤賔之分所生益之一分以上生三分所生去其一分以下生黄鍾大吕大蔟夾鍾姑洗中吕蕤賔爲上林鍾夷則南吕無射應鍾爲下生大聖至理之丗天地之氣合以生風日至則曰行其風以生十二律放仲冬短至則生黄鍾季冬生大吕孟春生太蔟仲春生夾鍾季春生姑洗孟夏生仲吕仲夏生蕤賔季夏生林鍾孟秋生夷則仲秋生南吕季秋生無射孟冬生應鍾天地之風正十二律也樂書曰雅樂部器隨律定聲合德其所也黄鍾之均則用黄鍾之器合太蔟之均則用太蔟之器是故旋宫法此聲律克諧則無借器度音咸取中声恊律是以三倍黄鍾而大至于雷霆謂黄鍾之律度三分九寸而倍成一尺八寸則合雷霆之濁声也九寸而減餘四寸五分則應中宫之清声也唯當九寸是謂正聲而可恊和神人感通天地流而不息合同而化是故地氣上隮天氣下降隂陽相摩天地相蕩鼓之以雷霆􅁬之以風雨動之以四時煖之以日月而百化興焉如此則樂者天地之和也故書云声依永律和声則五音不失其常六律不差其度謂􅀌竹之管律應夾鍾聲與氣諧故感天神而降􅀌竹之管律應林鍾聲與器諧故感地祇而出隂竹之管律應黄鍾聲與器諧故感人􅀑而至樂纂云昔晉人有銅藻盤無故自鳴問之於張茂先荅曰此器與洛陽宫鍾聲相諧宫中撞鍾故鳴也􅀂以鑢之音殊其鳴可止後果如其言也是故樂之制器法度均聲得之毫􅁵失之千里故大樂之道與政通矣古今樂録曰北齊神武覇府田曹叅軍信都芳代号知音能以管候氣觀雲色甞與人對語即指天曰孟春之氣至矣人徃驗管而飛􅁅巳應毎月所候言皆無爽又爲輪扇二十四理地中以測二十四氣毎一氣感則一扇住並與管􅁅相應􅀂合符契焉又曰隋文帝遣毛爽及蔡子元于普明等以候節氣依古於三重宻屋之内以木爲案十有二具每取律吕之管隨十二辰置于案上而以土埋之上平於地中實葭莩之􅁅以輕緹素覆律口每地氣至與律􅁳符則􅁅飛衝素散出于外而氣應有早晚􅁅飛有多少或􅀄入月其氣即應或至中下旬開氣始應者或􅁅飛出三五夜而盡或終一月才飛少許者帝異之問牛弘對曰􅁅飛半出爲和氣􅁅全出爲猛氣吹􅁅不能出爲衰氣和氣應者其政平猛氣應者其臣縱衰氣應者其君暴帝駮之曰臣縱君暴其政不和非月別暴也今十二月律於一􅀊内應並不同安得暴君縱臣􅀂斯之甚也弘不得對太平御覽卷第五百六十五
