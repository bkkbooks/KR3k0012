front:
  text: 太平御覽卷第六百四十六
  hash: sha256:3805346938b5b0a041434b5ccdf0a8f7a1d71fbbc2e1e11d4b934a162ac8b0fe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_646-1a}
body:
  text: 刑法部十二斬梟首弃市考竟斬釋名曰斬蹔也蹔加兵即斷也周書曰武王使尚父以士卒馳商師大崩商辛乃内登于鹿臺之上自燔王崩于火武王先入乃射三發而後下車擊之以輕吕劒名也斬之黄􅃏懸諸大白旗乃適二女之所射之三發擊之以輕吕斬之以􅀇􅃏懸諸小白旗左傳成上曰韓獻子將斬人郤獻子馳將救之至則旣斬之矣郤子使速以徇告其僕曰吾以分謗也家語曰郟谷之㑹齊侯奏宮中之樂俳優侏儒戯於公前孔子趍進歴階而上不盡一等曰疋夫而熒侮諸侯者罪應誅請有司速加法焉於是斬侏儒手足異處齊侯懼有慙色史記韓信亡楚歸漢未知名爲連敖坐法當斬其軰十三人巳斬次當至信信乃仰視適見􅅬公曰上不欲就天下乎何爲斬壯士􅅬公竒其言狀其皃釋而不斬與語大恱之又曰張蒼坐法當斬解衣身長肥白如瓠時王陵見而恠其羙士乃言沛公救勿斬漢書曰王訢濟南人以郡縣吏積功稍遷爲􅀍音罷陽令武帝末軍旅數發郡國盗賊群起繡衣御史􅁀勝之逐捕盗賊以軍興從事誅二千石以下勝之過􅀍陽欲斬訢訢解衣伏鑕仰天言曰使君專殺生之柄威震郡國今復斬一訢不足以増威不如時有所寛以明恩貸令盡死力勝之壯其言貰不誅因與相結厚也東觀漢記曰任光字伯卿􅀄爲郷嗇夫漢兵攻宛軍人見光冠服鮮明令解衣將斬而奪之㑹光禄勲劉賜適至視光容皃長者乃救全之後漢書曰趙王在長安爲赤眉所得赤眉欲斬之白馬從事見趙王儀狀􅂡眉羙好絶衆護而活之又曰獻帝疾愈大㑹未央殿董卓朝服升車而馬驚墜泥還入更衣其少妻止之卓不從遂行乃陳兵夾道自壘及宫左􅀐右歩屯衛周匝令吕布扞前後王允乃與士孫瑞宻表其事使瑞自書詔以授布令􅀐都尉李肅與同心勇士七十餘人僞着衛士服於北掖門内以待卓卓將至馬驚不行恠懼欲還吕布勸令進遂入門肅以㦸刺之卓衣甲不入傷臂墜車顧大呼曰吕布何在布曰有詔討賊臣卓大罵曰庸狗敢如是耶布應聲持矛刺卓趣兵斬之主簿田儀及卓倉頭前赴其尸布又殺之馳賫赦書以令宫陛内外士卒皆稱萬嵗魏略曰京兆鮑出字文才值丗飢餓出覔食後噉人賊以繩貫其母手掌駈去出走追斬賊得其母還魏志曰于禁字文則昌狶叛太祖遣禁征之禁急進攻狶與禁有舊詣禁降諸將皆以爲狶已降當送太祖也禁曰諸君不知公常令先圍而後降者不赦夫奉法行令事上之節也狶雖舊交禁可失節乎自臨與狶訣霣涕而斬之郡中震慄無求不獲又曰夏侯玄雅量弘濟臨斬東市顔色不變舉動自􅀂又曰鄧艾父子旣囚鍾㑹至成都先送艾然後作亂㑹巳死本營將士追艾檻車迎還衛瓘遣田續等討艾遇於綿竹西斬之蜀志曰魏延夢頭上生角以問占夢趙直直詐延曰夫麟有角而不用此不戰而賊欲自破之象也退而告人曰角之爲字刀下用也頭上用刀其㓙甚矣後爲馬岱所斬又曰劉璋勑􅀜戍諸將文書勿復通先主先主大怒召璋白水軍督陽琛責以無禮斬之又曰張松書與先主及法正曰今日大事垂可立功如何釋此去乎松兄廣漢太守肅懼禍退以白璋發其謀於是璋収斬松晉書曰楚王瑋旣誅汝南王亮衛瓘㝷又詔解嚴云瑋矯詔解嚴斬刑臨死出其懷中青紙詔以示監刑尚書劉頌流涕言此詔書也奉此而行謂爲社禝今更爲罪託體先帝受枉如此幸見申列頌亦歔欷不能仰視又曰荀晞字道將河南山陽人爲兖州刺史斷决如流人不敢欺以從母子爲都護犯法晞斬之旣而素服哭曰殺汝者兖州刺史哭弟者荀道將以嚴刻斬戮号曰屠伯後爲石勒所殺又曰石閔仕僞趙石鑒爲侍中録尚書事鑒使石苞夜誅閔不剋反爲閔攻殺鑒苞等殺胡人斬􅀜踰城不可勝數閔知胡人不爲己用頒令下毎人斬一胡文官賜爵一級武官立拜牙門于時一日之中斬胡萬人於是鼻髙多􅂡濫死者甚衆胡人死至二十餘萬又曰皇甫謐字子方少遵父操永嘉中愽士徴不起避亂荆州􅐬門居未嘗入城府􅁞而後衣耕而後食南土人士咸尊敬之刺史陶􅋲禮之甚厚王敦弟王廙代􅋲廙至荆州大失物情百姓叛廙大行誅戮立威以方回爲􅋲所禮責其不來詣巳乃収而斬焉荆􅁟華夷莫不流涕三十國春秋曰丙寅丞相府斬督運令史淳于伯于建康於是以力拭柱血逆流上二丈三尺下四尺五寸其直如絃後魏書曰叚暉從丗祖至長安有人告暉欲南奔丗祖問曰何以知之告者曰暉置金於馬韀中不欲逃走何由尔也丗祖宻遣視之果如告者之言斬之於市齊書曰􅁃弘逺字士操清實有士譽仕齊爲江州長史刺史陳顯逹舉兵敗斬於朱雀航將刑索帽着之曰子路結纓吾不可以不冠而死又曰陳顯逹起兵官軍繼至顯逹不能抗退走至西州趙譚注矟刺落馬斬之於籬側血涌湔籬似淳于伯之􅀍刑也崔鴻前趙録曰卜栩隱于龍門山嘗與郭璞論易栩曰吾大厄在四十一亦未見子之令終璞曰戮吾禍在江南不在此也鎮北靳冲攻太原不剋歸罪於栩輒斬之劉聦大怒曰此人朕所不得加刑冲何人哉遣御史丞誥衍持節斬冲也隋書曰刑部侍郎辛亶嘗衣緋禈俗云利於官上以爲厭蠱將斬之􅂫綽曰據法不當死臣不敢奉詔上怒甚謂綽曰卿惜辛亶而不自惜也命左僕射髙頴將綽斬之綽曰陛下寜可殺臣不得殺辛亶至朝堂解衣當斬上使人謂綽曰竟何如對曰執法一心不敢惜死上拂衣而入良乆乃釋之明日謝綽勞勉之賜物三百叚漢新事曰奉車都尉竇固征匈奴􅀐都尉􅁗彭副固令彭别屯彭擅斬軍司馬固奏彭不由督率賊殺人公卿議皆以爲固議是公府􅁺郭躬以爲彭得專斬人上曰軍正校尉一統督何以得專殺躬對曰一統將者謂在部曲也今彭别將兵軍事至急􅀔不得􅀜督將有詔躬上殿令尚書令與公卿雜難躬曰督將授斧􅃏稱令故得擅行法都尉别得行軍法何以明之躬對曰軍正校尉別將兵假斧鉞即得專軍法難者曰今不假故不得擅殺躬曰漢制假􅙺㦸以當斧􅃏議者皆屈上從之晉朝雜事曰夜遣通事令史張林黄門令史駱休開神虎門迎故太傅趙王至太極前召収中書監張華侍中朝䛑尚書裴頠解結侍郎杜斌等斬之於東鍾下華等大呼自稱忠臣張林詰之曰公等知太子無罪何不諌諌􅀂不從何不去也遂斬之華陽國志曰王濬自成都帥水陸軍及梁州又率七萬人伐呉臨發斬牙門將李延延所愛將也以争􅀐斬之衆莫不肅商君書曰晉文公將欲明刑以親百姓顚頡後至吏請其罪君曰用事焉吏遂斷顛頡之首以徇晉國之士皆懼曰顚頡之有寵斬以徇而况我乎韓子曰禹過諸侯㑹稽之上防風後至禹斬之王韶孝子傳曰周青東郡人也母患積年青扶侍左右五體羸瘦村里乃歛錢營助湯藥母痊許嫁同郡周小君小君疾未獲成禮乃求見青屬累父母青許之俄而命終青供飬爲務十年中翁姑感之勸令更嫁青誓以匪石翁姑並自殺女姑告青害殺収考遂以誣欵七月刑青於市青謂監殺者曰乞樹長竿擊白幡青􅀂殺翁姑血入泉不殺血上天旣斬血乃縁竿上天梟首傳曰叔孫昭子殺竪牛􅄬其首於寜風􅁄上漢書曰三族令先黥劓斬左右趾梟首􅉁其骨謂之具五刑又曰漢王病愈西入􅀜至櫟陽存問父老梟故塞王欣頭櫟陽市又五行志曰江充掘巫蠱太子宫太子乃斬充舉兵與丞相劉屈􅁵戰太子敗走自殺明年屈􅈊復坐祝詛􅆎斬妻子梟首續漢書曰張濟爲河南令中常侍叚珪奴乗犢車于道濟即收捕梟首懸尸珪門也後魏書曰宋鴻貴爲定州平北府叅軍送戍兵於荆州坐取兵絹四百疋兵欲告之乃斬兵十人又踈凡不逹律令見律有梟首之非乃生斷兵手以水洗然後斬决㝷坐伏法時人哀兵之苦嘆鴻貴之愚也廷尉决事曰河内太守上民張太有狂病病發殺母弟應梟首遇赦議不當除之梟首如故棄市禮曰刑人於市與衆弃之史記􅁗皇平六國制天下藏詩書及偶語弃市漢書曰中元二年改磔曰弃市應劭曰先諸死刑皆死之市令改曰弃市自非妖逆不復磔也又曰竇嬰矯先帝詔當棄市嬰陽病痱不食欲死或聞上無意殺嬰復食治病晉書曰范堅遷尚書右丞時廷尉奏殿中吏劭廣盗官慢二張合布三十疋有司正刑弃市廣二子宗年十三雲年十一操黄幡撾登聞鼓乞恩辭求自没爲奚官奴以贖父命尚書朱映議以爲天下之人無子者少事遂行便成永制堅亦同映議又曰咸和二年句容令孔恢罪弃市詔曰恢自䧟刑網罪當大辟但以其父年老而有一子以爲惻然可特原之隋書曰文帝意毎尚􅃤急姧回不止京市白日公行掣盗人間強盗亦往往而有帝患之問群臣斷禁之法楊素等未及言帝曰朕知之矣詔有人能糺告者􅃿賊家産業以賞糺人時月之間内外寧息其後無賴之徒候冨人子弟出路者而故遺物於其前偶拾取則擒以送官而取其賞大抵􅀍䧟者甚衆帝知乃命盗一錢巳上皆棄市行旅皆晏起早􅀫天下懔懔焉考竟釋名曰獄死曰考竟考竟者考得其情竟其命於獄也後漢書曰陽嘉三年春詔以乆旱京師諸獄無輕重皆且勿考竟湏得澍雨又曰丹陽方儲明風角爲洛陽令功曹是竇憲客客爲憲所諷夜殺人斷頭着奩中置廐門下欲令儲去官儲摩死者耳邊問誰所殺有頃曰死人言爲功曹所殺収功曹考竟又曰向相字甫興性卓詭不倫狀如學道又似狂生張角起相不欲國家興兵但遣將河上北向讀孝經賊自滅張讓䜛相與角同心収送黄門北寺獄考竟之又曰董卓􅀍誅蔡邕在司徒王允坐殊不意言之而歎有動於色允勃然叱之曰董卓國之大賊幾傾漢室君爲王臣所冝同忿而懷其私遇以忘大節今天誅有罪而反相傷痛豈不與爲逆哉即収付廷尉考竟其罪邕陳辞謝乞黔首刖足繼成漢史士大夫多矜救之不能得太尉馬日磾馳往謂允曰伯喈曠丗逸才多識漢事當續成史爲一代典且忠孝素著而所坐無名之誅無乃失名望乎允曰昔武帝不殺司馬遷使作謗書流於後丗方今國祚中衰不可令佞臣執筆在㓜主左右旣無益聖德復使吾黨􅂪其訕議曰磾退而告人曰王公其不長丗乎善人國之紀制作國之典滅紀廢典其能乆乎邕遂死獄中晉書曰王豹上書勸齊王囧與成都王頴如分陜之利㑹長沙王乂至於囧案上見豹牋謂囧曰小子離間骨􅁏何不銅駞下打殺囧旣不能嘉豹之䇿遂納乂言乃奏爲臣不忠不順不義輒都街考竟以明邪正豹將死曰懸吾頭大司馬門見兵之攻齊也衆庻􅁈之俄而囧敗三國典略曰齊兖州刺史武城縣公崔陵恃預舊恩頗自矜縱寵妾馮氏假其威刑恣情取納風政不立爲御史所劾召收繫廷尉考竟遂死獄中太平御覽卷第六百四十六
