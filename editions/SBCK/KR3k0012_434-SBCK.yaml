front:
  text: 太平御覽卷第四百三十四
  hash: sha256:bfcd5eedd45ebd9933c33757fdb9bcba43c31f00dbe7ee1d420cfd74ad8aaa1e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_434-1a}
body:
  text: 人事部七十五勇二漢書曰韓信數以䇿干項羽弗用漢王之入蜀信亡楚歸漢未得知名爲連敖楚官也坐法當斬其疇十三人皆巳斬至信信乃仰視滕公曰上不欲就天下乎而斬壯士滕公竒其言壯其貌釋弗斬與語大恱之漢王以爲治粟都尉信謂漢王曰臣嘗事項王請言項王爲人也項王意嗚叱咤千人皆廢然不能任屬賢將匹夫之勇也又曰齊哀王弟章髙后封爲朱虚侯章年二十有氣力忿劉氏不得職嘗入侍醼飲髙后令章爲酒吏章自請曰臣將種也請得以軍法行酒髙后曰可酒酣章進歌舞巳而曰請爲太后言耕田髙后兒子畜之􅀏曰顧乃父知田耳􅀂生而王子安知田乎章曰知之太后曰試爲我言田意章曰深耕種立苗欲䟽非其種者鋤而去之太后嘿然頃之諸吕有一人醉云酒章追拔劔斬之而還報曰有云酒一人臣謹行軍法斬之太后大驚已許其軍法母以罪也因罷酒又曰江都易王非二年立爲汝南王吴楚反時非年十五有才氣上書自請擊吴景帝賜非將軍印擊吴吴破徙王江都治故吴國以功賜天子旌旗又曰李廣爲上谷太守數與匈奴戰典屬國公孫昆耶爲上泣曰李廣才氣天下無􅀟自􅀒其能數與虜硧恐亡之或曰硧音角上乃徙廣爲上郡太守廣以郎中令將四千􅀐出右北平􅀶望侯張騫將万􅀐與廣俱異道行數百里匈奴將四万􅀐圍廣軍士皆恐廣乃使其子敢徃馳之敢從數十􅀐直貫胡􅀐出其左右而還謂廣曰胡虜易與耳軍士乃安爲圜陳外郷胡急擊矢下如雨漢王兵死者過半漢矢且盡廣乃令持滿母發而廣身自以大黃射其禆將服䖍曰黃間弩殺數人胡虜益解㑹暮吏以無人色而廣意氣自􅀂益治軍軍中服其勇也明日復力戰而􅀶望侯軍亦至匈奴乃解去又曰王尊字子贑涿郡人爲東平相時王素驕不奉法尊謂王曰天下皆言王勇但􅀒貴安能勇如尊乃勇耳王變色欲格殺之遷東郡太守河水盛溢泛浸瓠子金堤老弱奔走至恐水大决爲害尊躬率吏民投沉白馬祀水神河伯尊親執圭璧使巫䇿祝請以身塡金堤因止宿廬居隄上吏民數千萬人爭叩頭救止尊終不肯去及水盛隄壞吏民皆走唯一主簿泣在尊旁尊立不動而水波稍却廻還吏民嘉壯尊之勇節白三毛朱英等奏其狀詔秩尊中二千石賜黃金二十斤又曰朱雲字游魯人徙平陵少時通輕俠借客報仇身長八尺餘容貌甚壯以勇力聞又曰趙充國字翁孫隴西人後徙金城令居以六郡良家子善􅀐射􅀘羽林爲人沉勇有大略少好將帥之節學兵法通知四夷事武帝時以假司馬從貳師將軍擊匈奴爲虜所圍漢軍乏食數日死傷者多充國乃與壯士百餘人潰圍䧟陣貳師引軍隨之遂得解身􅀍二十餘創貳師奏􅃺詔徴充國詣行在所武帝親自視其創嗟嘆之拜爲中郎又曰項羽下邳人身長八尺二寸力能扛鼎少學書劔不成季父梁怒羽羽曰書足以記姓名劔一人敵不足學也梁梁竒之教以兵法籍大喜遇秦始皇遊㑹稽渡浙江梁與籍俱觀籍曰彼可取而代也梁掩其口㑹七月陳勝起兵九月㑹稽守通謂梁曰江西皆反此亦天亡秦時也先則制人後則爲人所制吾欲發兵使公及桓楚將梁曰桓楚亡人獨籍知其處請召籍受命籍因擊殺數十人府中讋伏梁遂舉郡中得八千人渡江而去至下邳軍巳六七萬邯鄲人范曽􅀃梁曰秦滅六國楚最無罪自懷王入秦不返楚人憐之至今􅀂立楚後亡楚必也梁然之梁於是立懷王孫心爲楚王是爲義帝從民望也都盱眙梁自號武信君師次定陶有驕色宋義諌曰戰勝而驕卒墮者敗今卒墮矣秦兵日益爲君危之梁不聽秦將章邯兵至擊楚大破梁戰死義帝以宋義有先見徴爲上將軍羽爲次將范増爲末將北救趙至安陽留不進籍謂義曰今秦軍圍鉅鹿疾引兵渡河楚擊其外趙應其内破秦軍必矣義曰不然夫􅅮牛之䖟不可以破虱蝨蟣今秦攻趙戰勝則兵疲我乗其弊不勝則我引兵鼔行而西必舉秦矣夫擊敵輕銳我不如公坐運籌䇿公不如我因下令曰猛如虎狠如羊貪如狼強不可令者斬之乃置酒髙㑹留四十六日不進是時天寒士卒飢凍籍曰且國家兵新破王坐不安席掃境内屬將軍國家安危在此一舉今不恤士卒而徇私非社稷之臣也籍乃斬宋義於帳中左右懾伏莫敢枝梧悉發兵渡河沉舟敗釡燒廬舎持三日粮示必死乃大破秦兵虜王離諸將入轅門膝行而前莫敢仰視師次鉅鹿㑹戰夜坑秦卒二十萬入􅀜屠咸陽殺子嬰自立爲西楚覇王與漢王相持五年後漢兵大㑹垓下食盡與漢王戰不利圍之夜聞漢軍作楚歌聲驚曰漢巳得楚乎遂與從􅀐者八百人夜潰圍南馳漢令􅀐將灌嬰追至東城籍唯單􅀐自知智窮乃大呼躍自刎而死遂爲五將各分一體漢王以魯公葬於􅂖城諸項賜姓劉又曰樊噲沛人也身長八尺家貧以屠爲業後爲髙祖叅乗髙祖項羽㑹鴻門因飲范曽起出爲項莊曰汝可以劔舞便因擊沛公殺之莊入爲壽曰軍中無以爲樂臣請以劔舞因拔劔起舞時項伯亦起舞常以身翼蔽漢王時帳下唯有張良噲居營門外聞事急乃持楯橦入立於帳下項羽目之問誰張良曰漢王叅乘樊噲也羽曰壯士賜之巵酒彘肩噲旣飲酒咀彘肩羽曰能復飲乎噲曰臣死且不辭何憚巵酒且漢王入􅀜定咸陽曝師于㶚上以待大王今大王至而聽小人言與漢王有􅂩臣恐天下解心疑大王也項羽嘿然噲因目揮漢王佯如厠遂與噲輕􅀐歸營漢王即皇帝位封噲爲武陽侯後從上擊陳豨有功遷左丞相又從上破黥布後上病惡見人群臣莫敢入噲排闥直入大臣等隨之噲曰陛下起沛何其壯也今天下巳定又何憊也且陛下病甚不見臣等計㑹國事獨與一宦者處幽室中絶不見臣等陛下豈不思趙髙之事乎上􅀏而起又曰天漢二年貳師李廣利將三萬􅀐出酒泉擊右賢王於天山召李陵欲使爲二師將輜重陵召見武帝叩頭自請曰臣所將屯邊者皆荆楚勇士竒才劔客也願得一隊到蘭于山以分單于兵無令專嚮貳師上曰將惡相屬􅁘吾發軍多無􅀐予汝陵對無所事􅀐願以少撃衆兵五千渉單于庭上壯而許之又曰李敢男禹亦有勇甞與侍中貴人飲侵陵之莫敢應後愬之於上上召禹使刺虎懸下圈中未至地有詔引出之禹落中以劔斬絶纍欲刺虎上壯之遂無殺心又曰季布弟季心氣盖􅀜中任俠方數千里士爭爲死中尉郅都不敢加少年時惜其名行是時心以勇聞布以諾聞􅀜中范曄後漢書曰牛邯字孺卿狄道人有勇力才氣雄於邊陲又曰盖延字巨卿漁陽安陽人也身長八尺彎弓三百斤邊俗尚勇力而延以氣聞又曰帝使王覇與馬武攻周建􅂫茂救建與武戰覇曰開營後出精􅀐襲其背茂建前後受敵驚亂敗走覇武各歸營賊後聚挑戰覇堅卧不出方饗士作倡戯茂兩射營中中覇前酒罇覇安坐不動又曰中郎將張耽性勇銳而善撫士卒軍中皆爲用命遂繩索相懸上通天山破烏桓悉斬其渠帥還得漢民獲其畜生財物東觀漢記曰劉伯􅂛都部將宗人劉禝數䧟陳潰圍勇冠三軍聞更始立怒曰夲起兵圗大事者伯􅂛兄弟更始何爲者耶更始聞而心忌之以禝爲抗威將軍禝不肯拜更始乃収禝將誅之伯升固爭并執伯升即日害之又曰􅀕遵爲征虜將軍將兵北入箕􅀜與弘農厭新栢華蠻賊合戰中弩矢入口洞出舉裒掩口血流裒中衆見遵傷却退遵呵吏士吏士進戰皆一人擊十大破之又曰馬援曰方今匈奴烏桓尚擾北邊欲自請擊之男兒要當死於邊野以馬革褁屍還墓耳何能卧牀上在兒女子手中􅁘又曰耿秉性勇壯而簡易於事軍行常自􅀍甲在前休止不結營部然逺斥候明要誓有警軍陳立成士卒皆爲死又曰永平中竇固擊匈奴班超爲假司馬將兵別擊伊吾戰於蒲􅀋海多斬首虜固又遣與從事郭恂俱使西域鄯善王廣禮敬甚備後更踈懈超謂其官屬曰寧覺廣志意薄乎此必有北虜使來也召侍胡詐之曰匈奴使來數日安在侍胡具服超悉㑹其吏士三十六人酒酣激怒曰不探虎穴不得虎子當今之計獨有因夜以火攻虜使彼不知我多少必大震怖可殄盡鄯善破膽功成事立也衆曰善遂將吏士徃奔虜營超手格殺三人斬其使明日乃還吿郭恂恂大驚旣而色動超知其意舉手曰􅁺雖不行班超何心獨擅之乎恂乃恱鄯善一國震怖竇固具上超功并求更選彼西域帝壯超詔固曰吏如班超何故不遣而選乎今以超爲軍司馬令遂前功固欲益其兵超曰願得夲所從三十餘人足以備有虞多益爲重煩又曰楊政字子行京兆人甞過楊虚侯馬武武稱疾見政去對机邊􅇃卧欲令政拜􅇃下政入户前排武徑上􅇃坐武恨語言不懌政把武手責之曰卿蒙國恩備位蕃臣不思求賢助國而驕天下英俊今日揺者刀入脅左右大驚以爲見刼操兵滿側政顔色自􅀂㑹信陽侯至責數武令爲朋友其果勇敢折皆此􅀋也又曰賈復以偏將軍從上拔邯鄲擊青犢大戰至日中賊陣堅不却傅召復曰吏士飢且朝飯復曰先破之後食耳於是􅀍羽先登所向皆靡諸將咸服其勇上以復敢􅀷入希令逺征而壯其勇節常自從之故復少方靣之勲諸將毎論功復未曽有言上輙曰賈君之功我自知之又曰張歩攻耿弇營合戰飛矢中弇股以佩刀截之左右無知者又曰邳彤爲遼東太守有勇力能貫三百斤弓虜毎犯塞常爲士卒先鋒數破之又曰温序爲護羗校尉行部爲隗囂將苟宇所拘刼序素有氣大怒叱宇等曰虜何敢迫脅漢將因以節撾殺數人衆爭欲殺之宇止之曰此義士死節可賜以劔序受劔銜􅂡於口顧左右曰無令􅂡汚又曰朱暉字文季南陽人暉早􅀌有氣决年十三莽敗天下亂與外氏家屬從田間奔入宛城道遇群賊賊操兵弩欲倮奪婦女衣物昆弟賔客皆惶迫伏地莫敢動暉抜劔前曰財物皆可取諸母衣不可得今日朱暉死日也賊見其小壯其志􅀏曰童子内刀遂舎之謝承後漢書曰彭脩字子陽㑹稽人年十五時父爲郡吏得休與脩歸道爲盜所刼脩困迫乃拔佩刀前持盗曰父辱子死盗相謂曰此童子義勇士也不冝逼之遂辭謝而去魏志曰龐德將所領與曹仁共抜宛遂南屯樊討􅀜羽樊下諸將以德兄在漢中頗疑之德常曰我受國恩義在効死親與羽交敵射羽中額時德常乗白馬羽軍謂之白馬將軍又曰曹仁從平荆州以仁行征南將軍留屯江陵拒呉周瑜瑜將數萬人來攻遣部曲將牛金逆與挑戰賊多金衆少遂爲所圍仁望金等垂没左右皆失色仁氣􅁬怒甚將壯士數十􅀐直前衝入賊圍等金乃得解餘衆未盡出仁復直還突出金兵賊乃退又曰臧覇字宣髙太山人父戒爲縣獄􅁺據法不聽太守所欲殺太守怒収戒詣府送者百餘人覇年十八將客數人於南山中奪之送者莫敢動因與父俱亡命東海由是以勇壯聞又曰曹真字子丹太祖族子也少􅀌召飬與諸子同使與文帝共止嘗獵爲虎所逐顧射之應聲而倒太祖壯其鷙勇使將虎􅀐討虚丘賊拔之封靈壽亭侯又曰劉曄字子楊淮南成德人也鄭寳張多許慶之屬各擁部曲寳㝡驍果才力過人一方所憚曄時年二十餘㑹太祖遣使詣州有所案問寳從數百人齎牛酒來􅃸使曄令家僮將其衆坐中門外爲設酒飯與寳於内宴飲密勒徤兒令因行觴而斫寳寳性不甘酒視􅃸甚明觴者不敢發曄因自引取使刀以斫殺寳斬其首以令其軍魏書曰吕布字奉先五原人也董卓爲都尉誓爲父子遷至中郎將卓毎以布自衛布嘗小失於卓卓拔㦸擲之布趫捷得免布由是隂怨於卓布後應王允於門刺殺卓卓將李􅔸等阻兵布自南陽投􅀽術自術又投􅀽紹紹與布擊張燕布嘗御良馬號赤兎能馳城飛壍遂突張燕軍陣一日或至三四皆斬首而出遂破燕軍布乃􅁀橫紹患之布不自安求還洛陽後復從􅀽術攻劉備於沛破之曹公自將至下邳擊布降之見曹公曰今日巳後天下定矣公曰何以言之布曰明公所患不過布耳今布將􅀐明公將歩天下不足定顧謂劉備曰玄德卿爲坐客我爲降虜繩縳我急獨不一言乎曹公􅀏曰縳虎不得不急遂縊殺之又曰張遼字文逺爲蕩㓂將軍陳簡梅成叛太祖討之簡入潜山中有天柱山遼遂進軍斬簡成首太祖論功曰登山履峻險遼之功也増封假節孫權率十萬衆圍合肥遼募其敢死者八百人登鋒䧟陣大破之太祖遣遼屯合肥給遼母車輿兵馬遂詣屯所勑遼母至所在令道從迎觀者榮之江東小兒啼恐之曰遼來遼來無不止矣又曰許禇字仲康長八尺大十圍勇力絶人太祖􅀄見曰此樊噲也即日拜都尉太祖征韓遂馬超等單馬㑹語禇從行馬超􅀒其力欲前突素聞禇勇乃問太祖曰公有虎侯安在太祖指禇瞋目眄之超不敢動數日㑹戰大破超等軍遷武衛中郎將武衛之號自此始也又曰典韋形皃魁梧膂力過人好持大􅀟㦸與長刀軍中爲之語曰帳下壯士有典君手提􅀟㦸八十斤太平御覽卷第四百三十四
