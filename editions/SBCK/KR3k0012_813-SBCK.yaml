front:
  text: 太平御覽卷第八百一十三珎寳部十二
  hash: sha256:3498fa279a5f7d7f75e97105cff9ed96288759d418b1453e2b7d1988b255e2ab
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_813-1a}
body:
  text: 銅鐵金鋼鍮石銅左傳僖中曰鄭伯朝楚楚子與之金旣而悔之與之盟曰無以鑄兵故以鑄三鍾金銅史記曰􅁗使徐福入海還僞辭曰臣見海中大神曰汝􅁗王之神薄得觀而不得取即從臣徃蓬萊山見芝城宫闕有使者銅色而龍形光上照天又曰􅁗始皇収天下兵聚之咸陽爲銅鑄金人十二各千石置庭中又曰張孟談董安于之治􅀳陽也公室之堂皆以練銅爲柱又曰趙襄子使厨人以銅斗擊代王殺之而取其地又曰上使善相相鄧通當貧餓死文帝於是賜通蜀嚴道銅山得自鑄錢景帝立有告通盗出徼鑄錢盡没入一簮不得着身􅀉死人家又曰龍門碣石多銅鐵漢書曰武帝即位好鬼神之事李少君以却老方見上上有故銅器問少君少君曰此器齊桓公十年陳於􅁊寢巳而案其刻果齊桓公器又曰黄帝采首陽山銅鑄鼎於荆山之下又曰王莽夢長樂宫銅人五枚並起立莽惡之使尚方鐫滅銅人應之又曰呉有豫章郡銅山招致天下人民亡命者盗鑄錢又曰凡律度量衡用銅者所以同天下齊風俗也銅爲物至精不爲燥濕寒暑變其節不爲風雨􅁀露改其形介然有常似於士君子之行是以用銅也又曰王莽天鳯四年八月莽親之南郊鑄作威斗威斗者以五色銅爲之又曰無雷國有銅華嶠後漢書曰靈帝時使掖庭令畢嵐鑄銅人四列於蒼龍玄武闕外又曰脩玉堂殿鑄銅人四黄鐘四其音中黄鍾也子爲黄鍾及天禄蝦蟇又鑄四出文錢天禄獸也范曄後漢書曰馬援善別名馬於交阯得駱越銅鼓乃鑄爲馬式又曰馬援征南海鑄銅柱於林邑國以極漢南界又曰崔烈納錢爲司徒乆之不自安從容問其子鈞曰吾居三公於議者何如鈞曰大人少有英稱歴位卿守論者不謂當爲三公而今登其位天下失望烈曰何爲然也鈞曰論者嫌其銅臭烈怒舉杖擊之又曰薊子訓遁去不知所止後人復於長安東霸城見之與老翁共磨娑銅人相謂曰適見鑄此而巳近五百歳矣魏略曰眀帝徒長安諸鍾虡駱駞銅人承露盤折銅人不可致住霸城又鑄作銅人列坐於司馬門外呉志朱異口賦弩曰南岳之幹鍾山之銅應機命中獲隼髙墉晉書曰南陽王模督􅁗雍時􅀜中飢荒百姓相噉加以疾癘盗賊公行模力不能制乃鑄銅人鍾鼎爲釡器以易榖議者非之崔鴻十六國春秋後趙録曰石勒徙洛陽銅馬翁仲二于襄國列之永豐門北史曰後魏明帝􅀄爾朱筞與從弟丗隆宻議廢立乃以銅鑄孝文及咸陽王橲等五王子像成當奉爲主唯莊帝獨就唐書曰開元中許昌縣之唐祠掘地得古銅罇又隱起􅀟鯉􅂐書文曰冝子孫又曰開元十三年宋州獻古銅鼎十九及鍾磬甑釡罇杓盤瓶各數四時宋城尉􅀳日休因板築獲而獻之又曰􅀄天寳中天下州郡皆鑄銅爲玄宗擬其形容首冠環焰足承菡萏與尊佛之像間列於殿堂號爲眞容及山東䧟率􅀍鎔毀而􅁪州獨存又曰文宗問宰臣曰幣輕錢重如何宰臣楊嗣復曰此事巳乆但且禁銅不可遽變其法法變即必擾人李珏曰今請加鑪鑄錢他法不可先有格令州府禁銅爲器當今以銅爲器而不知禁所病者制勑一下曽不經年而州縣因循所以制令相次而視之爲常今自淮而南至於江嶺鼓鑄銅器列而爲肆州縣不禁市井之人逐錐刀之利以緍範爲他器鬻之售利不啻數倍是則禁銅之令必在嚴切斯其要也又曰五臺山有金閣寺鑄銅爲瓦塗金其上照燿山谷計錢巨億萬淮南子曰銅英青又曰銅不可以爲弩抱朴子曰呉時發廣陵大􅃁中有銅爲人數十頭皆長五尺又曰金簡記云以五月丙子日中時鑄五石下其銅五石雄黄丹砂雌黄礬石曽青也皆鑄粉之以金華池􅃮之内太一神鼎中下以桂薪燒之銅成以銅炭冶之取牡銅以爲雄劔取牝銅爲雌劒帶之以入河則蛟龍巨魚水神不敢進也欲知銅之牝壯當令童男童女俱以水灌銅以其在火中尚赤時也則銅自分爲兩叚有凸起者則牡銅也凹䧟者則牝銅也又曰山中夜見胡人銅之精也山海經曰昆吾之山其上多赤銅此山出金色赤如火以切玉如泥周穆王持西戎爲兵獻汲冡中得銅金劔一枚長三尺五寸故通以錫雜爲兵器帝王丗紀曰紂作銅柱令男女祼形縁之落則妲巳􅀏國語管仲曰美金以鑄㦸劒鑄冶試諸狗馬狗馬難爲利者惡金以鑄鉏夷斤欘惡麄夷平也所以削草平地也斤形似鉏而小欘斫也廣雅曰白銅謂之鋈赤銅謂之錫漢武内傳曰上起神屋臺以銅爲柱黄金塗之神異經曰入金山下四丈得丹楊銅張華曰此銅與金相似典術曰陶丹銅以爲金也賈􅁩書曰下不得鑄錢則民反耕田矣西京􅄂記曰髙祖􅀄入咸陽宫周行庫藏見銅人十一枚坐皆髙三尺列在一筵上琴筑笙竽皆有所執皆綴花綵儼然􅀂生人筵下有銅管上口髙數尺出筵後其一管内空一管有䋲大如指使一人吹管一人紐䋲則琴筑笙竽皆作聲音與眞樂不異虞喜志林曰建武中南郡男子獻銅皷背有銘及呉時江水中鍾上有百餘字人莫有識者地鏡圖曰草莖黄秀下有銅器士緯曰銅出於石爲鈴則小鑄鍾則大南中八郡志曰雲南舊有銀窟數十劉禪時􅀊常納貢亡破以來時徃採取銀化爲銅不復中用丗語曰元康八年陵雲臺上生銅賈􅁩鵩鳥賦曰隂陽爲炭萬物爲銅張瑩漢南記曰安帝見銅人以問侍中張陵對曰昔􅁗始皇時有大人十二身長五丈履六尺皆夷狄之服見於臨洮此天將亡􅁗之證而始皇誤喜以爲瑞乃鑄銅人以爲像上曰何以知之對曰臣見傳載亦其人􅎍上有銘林邑記曰林邑王范文鑄銅爲牛銅屋行宫荆州記曰衡陽重安縣有苦歷反塘故老相傳云此塘中有銅神今猶時聞銅聲水轉變緑魚爲之死武當山記曰山有石室中有銅杖長七尺越絶書曰赤堇之山破而出錫􅀂耶之谷涸而出銅歐冶因爲純鈞之劒玄中記曰銅之精爲童奴嶺表異録曰蠻夷之樂有銅皷焉形如􅆎皷而一頭有靣皷靣圎二尺許靣與身連全用銅鑄其身遍有䖝魚花草之狀通體均勻厚二分已來鑪鑄之妙實爲竒巧擊之響亮不下鳴鼉貞元年中驃國進樂有玉螺銅皷玉螺盖螺之白者非􅅣王所爲即知南蠻酋首之家皆有此皷也咸逋末幽州張直方貶龔州刺史到任後修葺州城縁掘土得一銅皷牽復載以歸京到襄漢以爲無用之物遂捨于延慶禪院用代木魚鐵尚書曰華陽黒水惟梁州厥貢璆鐵尚書􅀃命曰􅀂金用汝作礪孔安國曰鐵須礪以成利器禮記月令曰季春之月命工師令百工審五庫之量金鐵皮革無或不良左傳昭七年曰􅀳趙鞅賦􅀳國一皷鐵以鑄刑鼎著范宣子刑書各出功力共皷石爲鐵一鼓而足之春秋孔演圖曰八政不中則鐵飛春秋繁露曰蒸石取鐵非人意也禍福所從生亦非人意乎廣雅曰鐵朴謂之礪史記曰邯鄲郭縱以鐵冶成業與王者埒冨也又曰卓氏宛氏以鐵冶致冨漢書五行志曰武帝征和二年􅃰郡鐵官鑄鐵消皆飛去時劉屈􅈊爲太守後死象漢書曰髙祖又與功臣剖符作誓丹書鐵契藏之宗廟又曰張良以家財求客㓨􅁗王得力士爲鐵椎重一百二十斤􅁗始皇至愽浪沙中良與客俱擊􅁗皇帝又曰張敞弟武拜爲梁相武曰當以柱後惠文冠彈治之耳應劭日柱後以鐵爲柱夲法官冠也又曰成帝河平二年沛郡鐵官冶鐵飛又曰李㝷􅀃王根曰政感隂陽猶鐵炭之低仰見效可信者天文志曰懸士炭也以鐵易土耳先冬夏至懸鐵炭於衡各一端冬陽氣至炭仰而鐵低夏至炭低而鐵仰又曰婼羌國有鐵自化作兵范曄後漢書曰赤眉降徐宣等曰自今日得降猶去虎口歸慈母丗祖曰卿鐵中鎗鎗庸中佼佼耳又曰公孫瓉徙鎭易京慮有非常乃居於髙京以鐵爲門魏略曰弁辰國出鐵韓穢皆從市之諸市買皆用鐵如中國用錢也王隱􅀳書曰石苞字仲容􅀄爲縣吏買鐵鄴市市長沛國趙元儒見苞異之便與結交􅀳陽秋曰肅愼土無塩鐵晉書曰林邑國王范逸死奴文篡立文曰南西卷縣夷帥范雅奴也甞牧牛澗中獲二鱧魚化成鐵用以爲刀刀成乃對大石障而呪之曰鱧魚變化冶成􅀟刀石障破者是有神靈進斫之石即瓦解文知其神乃懷之􅀳書載記曰赫連㪍㪍以鐵伐爲氏曰使我宗族子孫剛銳如鐵皆堪伐人也齊書曰髙祖素儉約後宫物器欄檻以銅爲飾者並改以鐵梁書曰康絢築浮山堰將合淮水漂没復決潰衆患之或謂江淮多蛟能乗風雨決壞岸其性惡鐵因是引東西二冶鐵器大則釡鬲小則钁鋤數千萬斤沉於堰所後漢書曰崔挺爲光州刺史先是州内少鐵器用皆求之他鏡挺表復鐵官公私有頼莊子曰金鐵蒙以大緤載六􅂹之上則致千里淮南子曰上古之時未有鐵器磨蜃以耨又曰鐵不可以爲舟又曰豐水之深十仭不受塵埃投金鐵焉則形見於水山海經曰克光之山龍首之山其隂多鐵神異經曰南方有獸焉角足大小形狀如水牛皮毛黒如􅃮食鐵飮水其糞可爲兵器其利如鋼名曰嚙鐵俗云咋鐵玄黄經曰南方嚙鐵糞利如鋼食鐵飲水腹中不傷也河圖曰赤帝有女譌鐵飛之異新序曰公孫敖曰夫玉石金鐵猶可􅅣磨以爲器用而況於人論衡曰紂力能索鐵申鉤盧綝四王起事曰張方請帝遷都五千􅀐皆鐵􅆞稍魏武故事曰領長史王必是吾郷披荆􅁄時吏忠而勤事心如鐵石語林曰許玄度出都爲弟㛰弟少愚恐人嘲弄玄度爲解而獲免眞長􅀏曰許玄度爲弟張十重鐵歩障異􅁐曰楚王與羣臣獵於雲夢縱良犬逐狡兎三日而􅀗之其膓是鐵良工曰可以爲劒十洲記曰流沙在西海中上多山川積石爲昆吾石治其石成鐵作劒光明洞照如水精狀割玉如切泥土廣州記曰鄧平縣有鐵石南方草物狀曰鐡出躭蘭州禆夷莊舡載鐵至扶南賣之華陽國志曰公孫述廢銅錢鑄鐵錢百姓貨賣不行金鋼􅀳起居注曰咸亨三年燉煌上送金鋼生金中百淘不消可以切玉出天笁玄中記曰金鋼出天笁大􅁗國一名削玉刀削玉如鐵刀削木大者長尺許小者如稻米欲刻玉時當作大金鐶着手指開其背如月以割玉刀内環中以刻玉南州異物志曰金鋼石也其狀如珠堅利無疋外國人好以飾玦環服之能辟惡毒南越志曰波羅基國出鋼珠㓪照幽夜林邑記曰林邑王范明逹獻金鋼指鐶抱朴子曰扶南有金鋼可以刻玉體似紫石英外國人名爲千延至於百丈底着盤以鐵槌打之不能傷以羖羊角扣之則漼然氷泮服䖍通俗文曰亂金謂之鉅鍮石廣志曰鍮石似金亦有與金雜者淘之則分鍾㑹蒭蕘論曰夫莠生似禾鍮石像金齊周捨謂沙門法雲曰孔子不飲盗泉之水法師何以捉鍮石香爐荅曰檀越旣得戴纛貧道何爲不得執鍮唐書曰髙宗上元元年詔九品服淺碧並鍮石帶八胯王子年拾遺記曰石虎爲四時浴臺皆用鍮石珷玞爲隄岸太平御覽卷第八百十三
