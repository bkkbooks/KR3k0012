front:
  text: 太平御覽卷第七十一
  hash: sha256:9dd29a41f822bf8a51e145b83b1c25a9e68e7118bebe18379377f051377157cf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_071-1a}
body:
  text: 地部三十六瀵水瀑布温泉潢津渚潏沚坻湄濆涘波瀵水爾雅曰瀵水出尾下瀵敷問切汾隂有水口知車輪名爲瀵尾猶底也列子曰禹之治水而失塗􅍝之一國其名終北不知際畔無風雨霜露魚禽草木國中有山名韋嶺頂有穴􅃺􅀂圎環名曰滋穴有水涌岀曰神瀵山臭過蘭椒味過醪醴一源分爲四國人飲神瀵力志平和過則醉經旬廼醒也瀑布水水經注曰漯水又南入山瀑布飛梁懸河注壑崩湍十許丈謂之馬落山幽明録曰衡山三峯最爲竦桀自非清霽素朝不可望見峯下有泉飛流如舒一疋絹分映青林直注山下雖織羅不動其上翛翛􅁪淒清風也臨海記曰郡西北有白鵠山山有池水懸注遥望見如倒挂白鵠因以名山下有深湖湖中又有魚如二百斛舡大長二丈許羅浮山記曰羅嶺之南有瀑布挂泉四十餘丈周景式廬山記曰泉在黄龍南數里即瀑布水也土人謂之泉潮其水出山腹挂流三四百丈飛湍於林峯表岀望之􅀂懸索注水處石悉成井其深不測也何尚之清暑殿賦曰深波奔上瀑布懸下孫興公天台山賦曰赤城霞起以建摽瀑布飛流而界道笁法真登羅山䟽曰増城縣有石溝深廣三丈有兩瀑布皆同注比溝相傳云是仙人流杯池水温泉華陽國志曰卭都縣南有温水冬夏常熱其源可湯鷄豚下流澡洗治􅀫病餘多􅁖水水神自司不可獩汚及沉亂髪照面使人􅁖疾幽明録曰始興靈水源有湯泉每至霜雪見其上蒸氣髙數十丈生物投之須􅁷便熟呉録曰始興縣有始興山山出温泉可以瀹鷄山海經曰温水出空峒山山在臨汾南入河逕陽北也幽明録曰艾縣輔山有温冷二泉同出一山之足兩泉發源相去數尺熱泉可以瀹鷄冷泉常􅀂冰生博物志曰不周山六川之水温如湯也辛氏三􅁗記曰始皇生時作閣道至驪山八十里人行橋上車行橋下金石柱見存西有温泉俗云始皇與神女戯不以禮女唾之則生瘡始皇怖謝神女爲出温泉後人因洗浴江乗地記曰東南三十五里有湯泉半冷半温共同一壑盛弘之荆州記曰新都縣有温泉冬月未至數里遥見白氣如烟上下交映狀如綺䟽又有車輪􅀟轅形世人傳昔有玉女乗車自投此泉人時見女子姿儀光麗徃來倐忽人造泉有一聲則沸從下出而不可止也又曰􅀥陽縣界有温泉其下有田資以浸􅈅一年三熟王孚安城記曰冝陽縣南郷有温泉焉以生雞􅆑投其中熟如煑也伏琛齊地記曰曲城東七十里有温水水如湯沸可療百病煑物無不熟也水經注曰温水出太一山其水沸湧如湯杜彦逹曰可治百病世清則病愈丗濁則無驗潢􅀃文曰潢積水池也晏子春秋曰景公與晏子立曲潢之上公望見齊國問晏子曰後丗孰將踐有齊者晏子對曰非賤臣之所敢議津論語曰長沮桀溺耦而耕孔子過之使子路問津焉長沮曰夫執輿者爲誰子路曰爲孔丘曰是魯孔丘與曰是也曰是知津矣言數周流自知津處晉書曰雷煥卒子華爲州從事持劒行經延平津忽於􅆎間躍出墮水使人没水取之不見劒但見兩龍各長數丈蟠縈其文章没者懼而返須􅁷光采照水波浪驚沸崔鴻十六國春秋曰石虎起河橋於靈昌津採石爲中濟石無大小下輙隨流用功五百餘萬而終不成虎遣散􅀐侍郎崔收沉璧中流告神巳地震水流莫不傾壞壓死者百餘人虎甚怒乃斬工匠止作而還又曰慕容德正月渡􅀺陽津流澌冰合鄴令韓􅁤言於德曰光武渡呼沲澌冰自合大王濟河天橋自成靈命所扶徴兆巳見德大恱改􅀺陽津爲天橋津郡國志曰陜州平陸縣小平津張讓刧獻帝處南岸有勾陳壘武王伐紂八百諸侯㑹處又曰杜預造河橋於冨平即此也又曰曹州離狐縣有延津澹臺子羽投璧断蛟處酈善長注水經曰舊東郡白馬縣神馬亭有神馬寺去白馬津可二十許里東南去白馬縣故城可五十里開山圖所謂白馬山也山上常有白馬群行悲鳴則河决馳走則山崩又曰吕望東海人也老而無遇以釣竿周吕望行年五十賣食􅁄津七十則屠牛朝歌行年九十身爲帝師又曰弘農郡有竇津􅀃者咸云漢武微行栢谷遇辱感其妻深識旣反厚賚賞焉賜以河津令其鬻渡今竇津是也又曰雲中定襄之間有津曰君子濟昔漢桓帝十三年西幸榆中東行代地洛陽大賈齎金貨隨帝後行夜迷失道徃投津長津長送之渡河賈人卒死津長埋之其子㝷求父䘮發塜舉尸資費一無所損其子悉以金與之津長不受事聞於帝帝曰君子也即名其津爲君子濟又曰河水東北爲長壽津述征記曰凉城至長壽津六十里河之故瀆在焉異苑曰石勒元􅀄十一年伐劉曜於洛陽從大河南濟時凍將合軍至而冰自冸舟檝無閡遂生擒曜謂是神靈之助改名靈昌津吴越春秋曰句踐入吴吴王遣之越王伏不敢起呉王遂引上車范蠡爲執御至三津之上仰天而歎淚下沾􅁭曰嗟乎􅀌厄也不意復生渡此津渚釋名曰渚􅃒也能􅃒水從傍迴也詩云鴻飛遵渚公歸無所於汝信處又曰魚潜在淵或在於渚又曰鳬鷖在渚公尸來燕來處廣雅曰渚處也晉書曰温嶠至牛渚磯水深不可測丗云其下多恠物嶠遂燬犀角而照之須􅁷見水族覆水竒形異狀或乗車馬著赤衣者嶠其夜夢人謂巳曰與君幽明異路何意相照也意甚􅁖之嶠先有齒疾至是㧞之中風至鎮未旬而卒又曰殷羡建元中爲豫章太守去郡郡人多附書一百餘封行至江西石頭渚岸以書擲水中祝曰沉者自沉浮者自浮殷洪喬非是致書郵故時人號爲投書渚吴興記曰烏程西風渚者防風氏國也幽明録曰淮南牛渚津水極深無可筭計人見一金牛形甚瑰壯以金爲鏁絆文選詩曰􅀟鷰遊蘭渚潏釋名曰潏術也堰使水鬰術也魚梁水碓之􅀋也爾雅曰人所爲曰潏爲舎人曰人力水爲居止沚釋名曰沚也小可以息其止也廣雅同詩曰遡洄從之宛在水中沚又曰菁菁者莪在彼中沚傳曰澗溪沼沚之芼潢汚行潦之水可薦於􅀑神可羞於王公坻􅀃文曰秦謂陵阜曰坻釋名曰坻遟也能小遏水使流遟也賈􅁩􅨱鳥賦曰乗流爰逝􅀆得坻則止湄神仙傳曰河上公漢景帝時結草爲菴於河之湄常讀老子帝不解老子數事遣問公不荅帝駕從之公即躍身空中矣濆􅀃文曰濆水涯也詩曰汝墳道化行也文王之化行乎汝墳之國也遵彼汝墳伐其條枚又曰彼汾沮洳言采其莫涘􅀃文曰涘水涯也詩曰綿綿葛藟在河之涘又曰所謂伊人在水之涘波釋名風吹水成文爲瀾瀾連也波體轉流相及連也小波曰淪淪倫也水文相次有倫理也詩曰有豕白蹢烝渉波矣魏志曰魏明帝至廣陵臨江觀兵見濤波汹涌歎曰此天所以限南北也遂歸又曰徐宣從文帝於廣陵六軍乗舟風浪􅁀起帝舩廻倒宣時病在後凌波獨前群僚無至者帝壯之遷尚書益部􅂄舊傳曰張霸爲㑹稽太守入海捕賊遭疾風晦􅁳波水涌起士卒驚曰霸霸曰無得恐太守奉法追賊風必不爲害須􅁷風静波止莊子曰孔子遊乎緇帷之林休坐乎杏壇之上有漁父者孔子曰其聖人歟乃下求之漁父語訖刺舡而去延縁葦間顔淵還車子路授綏孔子不顧待水波定不聞挐音而後敢乗挐舡櫂也淮南子曰武王伐紂渡盟津陽侯之波逆如擊疾風晦􅁳人馬不相見於是武王左操黄􅃏右執白旄瞋目而麾之曰余在天下誰敢害吾意者於是風濟波罷又曰楚人有乗舡而遇大風者波至而恐自投於水非不貪生而畏死或恐死而忘生也丗􅀃曰桓宣武在南州與㑹稽王㑹於漂州于時􅃞舟江側謝公亦生狂風忽起波浪鼔涌非人力所制桓有懼色㑹稽王亦微異唯謝公怡然自􅀂頃間風止桓問謝曰向郍得不懼謝徐􅀏荅曰何有三才同盡理孔叢子曰子順謂韓王曰胡越之人同舟濟江中流遇風波其相救如左右手所患同也廣雅曰陽侯濤大波也戰國䇿曰或謂公叔曰乗舟漏而不塞則舟沉矣塞漏舟而輕陽侯之波則舟覆矣今公自以辯於薛公是塞漏舟而輕陽侯之波也太平御覽卷第七十一
