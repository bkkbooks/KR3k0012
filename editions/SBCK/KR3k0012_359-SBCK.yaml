body:
  text: 兵部九十羈珂韀障泥防汗當胷鞘尾鞭枊羈肌許愼􅀃文曰羈馬絡頭也左傳曰晉公子重耳之及難也秦伯納之及河子犯以璧授公子曰臣􅀒羈紲從君廵於天下杜預曰羈馬羈紲馬彊也臣之罪甚多矣請由此亡又曰􅀄晉侯之竪頭湏守藏者其出也竊藏以逃文公出時也盡用以求納之及入求見公辭以沭謂㒒人曰居者爲社稷之守行者爲羈絏之僕其亦可也何必罪居者漢書曰今漢承衰周􅁀􅁗極弊之後流俗巳薄於三代而行堯舜之刑是猶以鞿羈而御駻馬如淳曰鞿音機以䋲繫馬領曰鞿駻突之馬也音汗東觀漢記曰光武皇帝雖發師旁縣人馬席薦䩭靽皆有成賈而貴不侵民樂與官市䩭音羈音半康㤗呉時外國傳曰加營國王好馬月支賈人常以舶載馬到加營國國王悉爲售之􅀂於路失䩭靽但將頭皮示王王亦售其半價郭頒晉丗語曰愍懷太子好卑雞小馬小牛置田舎令左右􅀐斷羈勒令墮馬韓詩外傳曰昔衛獻公走反國及郊將班邑於從者而後入太史栁莊曰如皆守社稷則孰􅀒羈靮音的而從如皆從則孰守社稷君反國而復爲私也無乃不可乎釋智匠古今樂録曰襄陽銅蹄哥曰龍馬紫金鞍翠毛白玉羈照曜􅀟闕下知是襄陽兒杜夷幽求曰羈蚊絆蚤禁其非法刳蟣屠虱求其肝膽非至精誰能知之又曰衘羈之馬伏􅇫之駒莫不思平原曠澤翅尾而馳陸也又曰琱羈鏤絆呼名翹陸不可化也夢書曰羈繮爲相要制也夢得羈繮要約士也羈結語言繮徃來也羈結韁竪結勑疆也弊絶不用難俛仰也摯虞逸􅂹詩曰逸􅂹無鑣轡騰陸從長川剪落就羈靮飛軒躡雲煙孫綽詩曰野馬閑於羈澤雉屈於樊神王自有所何爲人事間􅀓玄馳射馬賦曰百鳥齊興六􅂹孔閑金衘玉羈文防鏤鞍明珂景㓪華䩸采鮮􅀓玄良馬賦曰金羈在首發以明珂鏤鞍采䩸織防含華䩸音茸􅀓玄難良馬賦曰飾以金羈申以玉纓結以輕軒節以和鈴曹植遊俠篇曰白馬飾金羈連翩西北馳借問誰家子幽并遊俠兒孫惠三馬哀辭序曰余於物特所留心而所服三馬一時離羈感田子之愛遂作哀文云尓珂服䖍通俗文曰勒飾曰珂郭義恭廣志曰期調國出金銀白珠硫􅲚水精噐五色珠馬珂又曰剽刄國出桐華布珂珠貝艾香雞舌香􅀓玄樂府豫章行曰輕裘綴孔翠明珂曜􅃢瑚張華輕薄篇曰文軒樹羽蓋乗馬佩玉珂韀隋書曰宇文述素好着竒服炫燿時人雲定興爲製馬韀於後角上缺方三寸以露白色丗輕薄者爭放學之謂爲許公缺勢又遇天寒定興曰􅀫衛必當耳冷述曰然乃製裌頭巾令深袹音陌耳又學之名爲許公栢勢述大恱曰雲兄所作必能變俗我聞作事可法故不虚也障泥王隱晉書曰韓友字景先廬江舒人舒縣廷􅁺王睦卒病死巳呼魄家人就友卜令以丹􅀞板作日月置尸頭前及卧虎皮馬彰泥登時大愈蕭方等三十國春秋曰髙勾驪以千里馬生羆皮鄣泥獻于南燕燕王超大恱荅以水牛能言鳥丗􅀃曰王武子善解馬性甞乗一馬着連乹彰泥前有水終不肯渡王云此必是惜彰泥使人解去便徑度防汗東觀記曰和帝永元三年西謁園陵桓郁兼羽林中郎將從賜馬二疋并鞍勒防汗魏百官名曰黄地金鏤織成萬歳鄣泥一具又織成防汗一具桓寛鹽鐵論曰古者庶人賤􅀐繩控草鞮皮薦而己及其後革鞍攻成鐵鑣不飾令冨者黄金琅勒􅄢繡弇汗弇音奄司馬彪戰略曰孟逹將蜀兵數百降魏魏文帝以逹爲新城太守太和元年諸􅁑亮從成都到漢中逹又欲應亮遺亮玉玦織成鄣汗蘇合香亮使郭摸詐降過魏興太守申儀與逹有隙摸語儀亮言玉玦者巳決織成者言謀巳成􅂫合香者言事巳合當胷後漢書曰太守趙興署鮑永功曹時有矯稱侍中止􅀓舎者興欲謁之永疑其詐諌不聽出興遂駕徃永乃拔佩刀截馬當胷乃止當胷以韋爲之也後數日莽詔書果下捕矯稱者永由是知名鞙尾服䖍通俗文曰馬鞻音樓尾曰鞙胡畎切魏百官名曰赤茸鍮石鞙尾一具鞭禮記曰獻車馬者執筴綏又曰君車將駕則㒒執䇿立於馬前巳駕僕展軨鄭玄曰展軨具視効駕白巳駕也奮衣由右上取貳綏􅁬振去塵也貳副也執筴分轡驅之五歩而立左傳曰晉公子重耳之及於難也及楚楚子享之曰公子􅀂反晉國則何以報不榖對曰􅀂以君之靈得反晉國晉楚治兵遇於中原其避君三舎􅀂不􅀗命其左執鞭弭右属橐鞬以與君周旋又曰宋告急於晉伯宗曰不可雖鞭之長不及馬腹又曰楚靈王使圉徐以懼吴楚子次于乾谿以爲之援雨雪王皮冠秦復陶翠􅀍豹舄執鞭以出執鞭以敎令右尹子革夕子革鄭丹也夕暮也王見之去冠􅀍舎鞭與之語又曰晉荀瑶帥師伐鄭鄭駟弘請救於齊陳成子救鄭及濮雨不渉成子衣製杖戈製雨衣也立於阪上馬不出者助之鞭之公羊傳曰陽虎將殺季孫于蒲圃使臨南御之至孟衢臨南投䇿使陽越下取䇿陸機毛詩草木虫魚䟽曰据枝葉似楨松尓雅曰据櫃也去匱切節似扶老即金靈壽是也今人以爲馬鞭及杖孔藂子曰刑以齊民譬之於御則鞭䇿也漢書曰婁敬云太王以狄伐故去􅃎杖馬箠去居歧又曰石慶爲太㒒御出上問車中幾馬慶以䇿數馬畢舉手曰六馬又曰李廣擊匈奴匈奴兵多破廣軍生得廣廣時傷置絡間而卧行十餘里廣陽死睨其傍有一胡兒􅀐廣騰而上胡兒馬因鞭馬南馳數十里得其餘軍又曰大司空士夜過奉常亭亭長呵之告以官名亭長醉曰寧有符􅀓耶士以馬箠擊亭長漢獻帝起居注曰李􅔸性喜􅀑恠左道之術又於朝廷省門爲董卓設神坐數以羊祠之祠畢過省閤問帝起居求入見􅔸帶三刀手復與鞭合持一刀侍中侍郎見􅔸帶仗皆惶恐亦帶劒持刀先入在帝側張勃呉録曰大皇帝大㑹飲宴下馬迎魯肅肅入拜起禮之謂言子敬􅀌持鞍下馬相迎足以顯未肅趨進曰未也衆咸愕然旣坐徐舉鞭曰願麾下威德加于四海然後以安車軟輪徴肅始當顯耳帝拊掌歡􅀏又曰大皇帝潜軍於晥口命陸遜爲大都督假􅃏大皇帝親執鞭以見之虞􅄎江表傳曰孫權攻合肥不能下徹軍將退兵巳上道權與吕蒙蔣欽陵統等在後張慢飲食畢垂當發魏將張遼帥六七千人奄至圍􅃒數重權乗駿馬上津橋南巳見徹丈餘無板谷利附在馬後使持鞍緩鞚利於後著鞭以助馬􅀔遂得超度王隱􅀳書曰上黨鮑瑗家多䘮病貧苦淳于叔平曰君舎東北有桑樹徑至市入門數十歩當有一人持新馬鞭便就買還以懸北桑樹三年當􅁀得財也瑗遂承其言詣市果得馬鞭懸之正三年浚井得錢數十萬銅鐵雜噐復可二十餘萬於是家業用展病者亦愈于寳晉記曰晉永嘉􅀄有神見兖州甄城民家免奴爲主簿自号爲樊道基有嫗號成夫人欲迎致便載車行當得此免奴主簿從行爲譯以宣所冝汝南梅蹟字仲眞去鄴來經兖州聞其然因結羊丗茂阮士公諸賔徃觀之成夫人便遣主簿出當與貴客語主簿死不肯避成夫人因大嗔索士公馬鞭脫主簿鞭之何法盛晉中興書曰祖逖與劉琨中夜而坐相謂曰􅀂四海鼎沸豪傑並起吾與足下相避於中原後琨與親舊書曰吾枕戈待且志梟逆虜常恐祖生先人着鞭耳沈約宋書曰胡蕃字道序義旗起桓􅀇戰敗將出奔藩於南掖門捉玄馬鞚曰今羽林射手猶有八百皆是義故西人一旦捨此欲歸可復得乎玄直以馬鞭指天而巳於是奔散蕭方等三十國春秋曰石勒遣石虎率精􅀐五千掩李矩營生執矩外甥郭謂之弟元教元作書與謂􅀃云去年東平曹嶷西賔猗盧矩如牛角何不歸命勒與謂書餉塵尾馬鞭􅀃賔禮賢弟想同斷金徃物爲信矩所領將士並欲歸勒矩知衆之去巳乃率衆來歸又曰城都王頴誅黄門孟􅅼於是東海王越髙宻王簡皆懼奔國琅邪王睿又將出焉而徼禁甚宻頴又先下諸津禁止諸貴人王至河陽乃見抅焉宋典後至以鞭拂之曰舎長官禁貴人而尓見止耶因大􅀏之吏乃放遣因得奔國崔鴻前􅁗録曰符堅起教武堂于渭城命太學生明隂陽兵法教爲將士朱彤諌曰虎將之士受教學生強􅆬之術乃弱本之方夫養將之法譬之養馬秣以髙􅇫習以戰馭長鞭䇿後金勒制前折旋䂓矩在知進退又曰符堅引群臣議代晉太子左率石越曰今歳鎭守斗福德在呉弗可犯且國有長江之嶮朝無昬政之臣願保境養民伺其虚􅂩堅曰武王伐紂逆歳犯星夫差威陵上國爲勾踐所滅雖有長江其能固乎吾之衆投鞭於江足斷其流吾當内斷其心矣又曰符堅時關中謡曰長鞘馬鞭擊左股太歳南行當避虜秦呼鮮卑爲白虜慕容垂起關東歳在癸未崔鴻後梁録曰咸寧二年盗發張駿墓得珠簾琉璃􅃢瑚馬鞭樂資春秋後傳曰魯仲連曰齊閔王將之魯夷維子爲執鞭而從之􅀽希之漢表傳曰費禕放離切領漢節誘納降附越嶲太守張嶷牋誡禕曰昔岑彭率師來歙杖節咸皆見害刺客不鎮重也今明公位尊權重冝覧前事後歳首禕持節行酒郭循以馬鞭中小刀刺禕禕數日薨魏百官名曰駝馬鞭二枚異苑曰長山張舒以元嘉九年二月二十四日奄見一人着朱衣平上幘手捉青柄馬鞭云汝何可教便隨我去見素絲繩繫長梯來下舒上梯仍造大城綺堂洞室地如黄金有一人長大不巾蹟獨坐絳紗帳中語舒曰主者誤取汝賜汝秘術卜占勿貪錢賄舒亦不覺受時劉義慶幽明録曰餘杭人沈縱家素貧與父同入山還未至家見一人左右導從四百許前車輜重馬鞭夾道鹵簿如二千石遥見縱父子使喚住就縱手中燃火縱因問是何貴人荅曰是闘山王在餘杭南縱知是神叩頭云願見祐􅂇後入山得一王㹠從此如意又曰桓玄旣肆無君之心使御史害太􅀓道子於安城玄在南州坐忽見一平上幘人持馬鞭通云蔣侯來玄驚愕然便見階下奴子御幰車見一士大夫自云是蔣子文君何以害太􅀓與爲伯仲頋視之間便不復見又曰廣陵韓晷字興彦陳敏反時與敏弟恢戰於尋陽還營下馬覺鞭重見有緑錦囊中有短卷書着鞘皆不知所從來開視之故榖紙佛神呪經謝氏􅀑神列傳曰下邳陳超爲􅀑君弼所逐改名何䂓從餘杭歩道還家求福絶不敢出入五年後意漸替懈與親舊臨水戯酒酣共􅀃徃事超云不復畏此􅀑也小俛首乃見􅀑影在水中超驚怖時亦有乗馬者超借馬􅀐之下鞭奔驅此􅀑去超逺近常如􅀄微聞􅀑云汝何規耶急急就死呉㑹分地記曰六山者勾踐於此山鑄銅銅不鑠則埋之上生馬箠勾踐遣使者移於南社種之飾治以爲馬箠獻於呉劉欣期交州記曰兕出九德有一角角長二尺餘形如馬鞭柄闞駰十三州志曰山桒縣人俗貪僞好持馬鞭行邑故語曰沛國龍冗至山桒詐託旅使􅀂奔喪道遇冦抄失資糧太公隂謀曰武王曰吾欲造起居之誡隨之以身箠書曰馬不可極民不可劇馬極則躓民劇則敗莊子曰莊子使楚見空髑髏髐然司馬彪曰髐曰骨皃撽以馬箠而問之曰夫子貪生理而爲此乎將有亡國之事斧􅃏之誅乎語卒援髑髏枕而寢又曰馬蹄可以踐霜雪毛可以御風寒齕草飲水翹足而陸此馬之真性也及至伯樂曰我善治之燒剔之刻之雒之連之以羈編之以皂棧馬之死者十二三矣飢之渇之馳之驟之齊之前有橛飾之患後有鞭䇿之威而馬之死者巳過半矣淮南子曰昔者王良造父御也投足調均勞逸􅀂一安勞樂進馳騖􅀂滅左右􅀂鞭周旋􅀂環丗皆以爲巧然未見其貴也􅀂夫鉗具太丙之御也除轡舎銜去鞭弃䇿軍車莫動而自舉馬莫使而自走又曰大丈夫恬然無思澹然無慮以天爲蓋以地爲輿四時爲馬隂陽爲騶電以爲鞭䇿雷以爲車輪鹽鐵論曰無鞭䇿雖造父不能以調四馬無􅀔位雖舜禹不能以治萬民又曰􅁗攝利銜以御宇内執脩箠以笞八極杜夷幽求曰召渇者以臨河不待鞭䇿而自至􅀃苑曰黙無過言慤無過事木馬不能行亦不費食騏􅂹日馳千里鞭箠不去其背楊偉時務論曰轡䇿靽摯之具設雖剛怒麄戾蹄齧之馬􅀂足抅靽縶口銜轡勒箠䇿必至則躡䠱循􅁤䠱録切丗􅀃曰王敦在姑熟晉帝出看敦營敦覺追帝帝以金馬鞭與客舎姥莫􅀘切姥以水澆馬屎令追者問姥姥云去巳乆矣追者乃止也又曰王澄字平子從荆州下過王敦敦謀欲害之而平子左右二十八人悉捉鐵馬鞭爲衛敦不敢近夢書曰鞭箠爲所使有􅃙趨也夢得鞭箠欲有使也持以鞭馬使朋友也鞭使馬疾服諾喜也曹植丸詠曰乗逸嚮􅀆執電鞭忽而徃􅀆怳而旋曹植陌上桒曰望雲際有眞人安得輕舉繼清塵執電鞭騁飛麟張華輕薄篇曰文軒樹羽蓋乗馬珮玉珂横簪列瑁瑇長鞭施象牙楊雄河東賦曰奮電鞭􅆖雷輜鳴洪鍾建五旗魏文帝臨渦賦曰建安十八年終譙余兄弟從上拜墳墓遂乗馬遊觀經東園遵渦水相佯乎髙樹之下乃駐馬書鞭爲渦賦􅀓􅀇良馬賦曰鞭不得揺手不及動忽然增逝􅁏飛骨踴􅀓玄馳射馬賦曰佷如革戾如膠鞭裁向腹奮尾跳􅥑曹植表曰願得䇿馬執鞭首當塵路撮風后之竒接呉孫之要追慕卜商起矛左右李尤馬箠銘曰御者箠䇿示有威怒東野之敗督責過度温嶠與陶公書曰奉惠赤角一具及鞉皷馬鞭皷角旣周軍用馬鞭服以周旋玩之於乎與之偕老也偃武之日乃當藏之篋笥耳謝艾宻令與楊􅀄曰今遣舎人孔章特口論要宻將軍可差腹心人旨致􅃢瑚馬勒香瓔於盈切一具遺王擢王擢狐疑於將軍父子事得施矣􅀽宏與范曽書曰四海鼎沸天轡將移杖短䇿以晨征登重幙以吐竒指六合以倒戈望崑崙而舉麾枊五葬切魚豢魏略曰獻帝露布益州曰馬繫枊而不暇解貫胄延頸以侍白刄枊五剛切又五浪切蜀志曰靈帝末先主從校尉鄒靖討賊有功除安喜尉督郵以公事到縣先主求謁不通乃直入傳􅅞督郵杖二百解綬繫其頸着馬枊弃官亡命常璩華陽國志曰建寧郡同瀬縣存馬縣雍闓反時結壘於縣山繫馬馬枊柱生成林今夷言無梁林無梁夷言馬也蕭子雲晉史草曰姚略時有賀僧者不知何人自云遊歷五郡時人號爲賀五郡齋戒奉道爲百姓􅀃􅁻凶略死泓立僧謂泓曰冝絜掃一馬廐開屋設大枊有異馬其大非常自逺來天所送矣趙書曰徐光字秀武頓丘人父以牛毉爲業光年十四五爲將軍王陽秣馬光但書馬枊屋柱爲詩頌不親馬事異苑曰丹陽甘卓字季思照鏡無頭乃見在馬枊荀氏靈􅀑志曰泰元中有道人從外國來多有術法自􅀃所受術師曰衣非沙門也甞行見一人擔上有小籠子可受斗餘語檐人云吾歩疲極欲蹔􅀉君擔上人甚怪之慮是狂人便語君欲何許自居邪荅云君􅀂見許正欲入君此籠子中檐人愈恠其竒君能入籠中便是神人也即入籠中籠亦不更大擔亦不􅁴重至國中一家大冨而性慳惜不行仁義語檐人吾試爲君破奴慳囊即至其家有一快馬甚惜之在枊下繫忽失去尋求不知處明日見馬在五斗甖中終不可破取不知何方得取之便徃語言君作百人厨食周餉窮困者馬當得出耳主人即狼狽作之旣畢馬還在柱淮南萬畢術曰馬枊生腐芽者取馬枊生芽可以爲藥食煞鳬矣太平御覽卷第三百五十九
