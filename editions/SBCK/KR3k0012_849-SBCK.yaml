front:
  text: 墨子曰聖王制飲食足以充虚繼氣強股肱使耳目聦明不極五味之調芬之和不致逺國珎怪異物矣又曰不可衣短􅄄不可食糟糠飲食不美面目顔色不足視也衣服不美身體從容不足觀也是以食必梁肉衣必文繡莊子曰巧者勞而智者憂無能而無所求飽食而遨遊汎􅀂不係之舟又曰秋禽之肥易牙和之非不美也彭祖以爲傷壽故不食之又曰廉者不食不義之食不噉不義之水又曰孔子病子貢岀卜孔子曰汝待也吾坐席不敢先居處􅀂齊食飲􅀂􅀕吾卜之乆矣慎子曰小人食於力君子食於道又曰飲過度者生水食過度者生貪燕丹子曰太子常與荆軻同案而食同牀而寢公孫尼子曰食甘者益於肉而骨不利也又曰太古之人飲露食草木實聖人爲火食號燧人飲食以通血氣闕子曰義渠之人烹鼋鼈不熟臊穢腥臭中國之民雖飢餓三日不啓口至死弗食也呉章莊􅁻受而和之病人食之爲之輕體万乗飲之爲之解怒故􅍳鼈至腥臊不可加然而病之爲之輕體万乗爲之解怒何也呉章莊􅁻之調存也韓子曰堯之王天下也糲粢之食藜藿之羮雖監門之養不厭於此矣又曰呉起出遇故人而止之食故人有他故期反而食至暮不來起不食而待之明日使人求得乃與之食又曰孫叔敖相楚糲飯菜羹枯魚之膳又曰管仲束􅅞自魯之齊路飢而泣過綺邑乞食封人跪飱之因竊謂仲曰􅀂用齊將何報我曰如子之言我且賢之用能之使我何報子封人怨之又曰季孫相魯子路爲都令魯以五月起衆爲長溝當此時子路以其私秩粟爲漿飲要溝者於五衢而飡之孔子聞之使子貢往覆其飲擊毀其器曰魯君有民子奚爲乃飡之子路怒攘肱而入請曰夫子疾由之爲仁義乎所學於夫子者仁義也仁義者與天下共而同其利者也今以由之秩粟而飡民其不可何也孔子曰由之野也吾以女知之女徒未及也女故如是之不知禮也女之飡之爲愛之也夫禮天子愛天下諸侯愛境内大夫愛官職士愛其家過其所愛曰侵今魯君有民而子擅愛之是子侵也不亦誣乎言未畢而季孫使者至讓曰肥也起民而使之先生令弟子從役止而飡之將奪肥民耶孔子駕而去魯又曰凡人上不屬天下而不着地以筋骨爲根夲不食則不能活是以不免於欲利之心欲利之心不除其身之憂也故聖人衣可犯寒食足以充虚則不憂矣又曰嬰兒共戯以塵爲飯以塗爲􅁰以木爲胾薄暮必資餉食者塵不可食也又曰餓歳之春從弟不饟穰歳之秋踈客必食非踈骨􅁏少多之心異也孟子曰飢者甘食渴者甘飲是未得飲食之正也飢渴害之也豈唯腹爲有飢渇之害人心亦皆有口害也孫子曰鑠金洪鑪盗􅀠不探鴆􅁏在爼餓徒不食淮南子曰􅋩􅆈焚炙調齊和之適以窮荆呉甘酸之變符子曰顔子有疾三日不食問之曰吾師也食非丹不飡茹非芝不食故七百歳子何不吮瑶以延生咀蘂以養齡也禮含文嘉曰燧人始鑚火炮生爲熟使人無腹疾山海經曰有叅青馬爲西王母取食吕氏春秋曰有城氏有二佚女爲之九成之臺成猶重也飲食必以皷又曰湯得伊尹設朝見之􅀃湯以至味湯曰可得爲之乎對曰君之國小不足以具之爲天子然後可具三郡之蟲水居者腥􅁏攫者臊草食者羶臭惡猶美皆有所以凢味之本水最爲始五味三材九沸九變火爲之紀時其疾徐減腥去臊鼎中之變精妙微纎口不能言志不能論􅀂射御之微隂陽之化四時之數故乆而不􅁦又曰趙襄子攻翟勝左人中人使者來謁之下左人中人城也襄子方食搏飯有憂色左右曰一朝而下兩城此人之所喜今君有憂色何也襄子曰江河之大也不過三日焱風􅁀􅀨日中不湏􅁷今趙氏之德行無所積一朝而下兩城亡其及我乎白虎通曰王者四食何明有四方之物食四時之功也四方不平四方不順有徹膳之法焉所以明至尊著法戒也
  hash: sha256:000a51e8a05135b58d1324cdb3731ef89ad7ab43f3fb7f4d52496a1893734123
