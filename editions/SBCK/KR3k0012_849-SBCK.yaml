body:
  text: 王者居中央制御四方平旦食少陽之始食時大陽之始晡時食少隂之始食時大隂之始􅀃文曰饔饍熟食也餱乾食也䉵具食也䉵士眷切􅴱中食也弍文切餔日加申時食也饛盛器滿兒饛音蒙餬􅀉食也飫燕食食也餞送去食也餁火熟也釋名曰食殖也所以自生殖也塩鐵論曰古者燔􅁰而食捭豚相享賔㛰相召豆羹白飯今則燔炙滿案臑豚包鼈膾鯉􅀃苑曰晏子所與同衣食者百人而天下之士至也又曰晏子侍景公曰朝寒請子進煖食於寡人對曰臣非厨養之臣社稷之臣也又曰子思居於衛緼􅂁無裏二旬九食又曰魯有儉者煑甂中之食甂必眠切小益食而美以遺孔子子受之如受犬馬之遺弟子曰先生何爲受之熹如此曰非以煑甂瓦之薄也食之美故念吾親也揚子法言曰或曰食如蟻衣如華金朱煌煌無巳㤗乎曰由其德舜禹受天下不爲太不由其德亦太矣李􅁤注曰蟻言精細或曰北夷􅀍我純績帶我金犀珎膳㬅餬不亦厚乎曰社稷靈也不可不厚也論衡曰王子喬不食榖壽百嵗按人生禀飲食之性故形上有口齒下有孔竅以注冩口齒以進食王子喬形體與人同何以獨能度丗耶夫衣以温膚食以充腹衣温食飽則精神明盛人之生也以食爲氣草木以土爲氣閉口不食拔草離土必不壽矣桓譚新論曰太原郡隆冬不火食五日雖病不敢觸犯王者冝應改易潜夫論曰何知國之將亂也以其不􅄝賢也故病家之厨非無饌也乃其人弗之能食故遂至於死也亂國之官非無賢也乃其君弗能存故遂亡矣又曰欲知人且疾不􅄝食欲知國將亡不􅄝賢風俗通曰俗􅀃􅗬馬啖賔客宴食巳闕主意未盡欲復飲酒餘無施更岀脯鮓椒薑塩豉言其速疾如􅗬馬之傳命􅗬音瑱又曰俗􅀃臨日月薄食而飲令人蝕口謹案日太陽之精君之像也日有蝕之天子不舉樂里語不救蝕者出行遇􅀨恐有安坐飲食重懼也又曰堪輿書云上朔㑹客必闘争按劉君陽爲南陽牧甞上朔設盛饌了無闘者蔡邕月令論曰問者曰春食麥羊夏食菽雞魚之屬但以爲時味之冝不合之於五行月令服飾所食器械之制皆從五行者􅀃所食獨不以五行巳畧乎曰亦甞思之矣凢十二辰之㑹五時所食者必家人所畜丑牛未羊戍犬酉雞亥豕而巳其餘虎以下非食也汝南先賢傳曰周舉字宣光爲并州刺史太原舊俗以介子推燒死至其亡時民爲絶火食老少多死舉作書置子推廟中􅀃民不冝寒食因勒使炊食如故益部􅂄舊傳曰何祗字君肅爲人寛厚通濟體甚壯大能食飲好聲色不治節儉時人少貴之者曹毗杜蘭香傳曰蘭香戒張碩不露頭食永昌郡傳曰獠民口嚼食并以鼻飲水異苑曰新野􅂫卷與婦佃於野舎毎至飲時輙有一物來其形似虵長七尺五寸光采卷異而飴之遂經數載産業加焉婦後宻打殺即得能食病日進三斛飯猶不飽少時而死幽明録曰海中有金臺岀水百丈結構巧麗窮盡神工臺内有金机彫文備制上有百味之食四丈力神常立守護有一五通仙人來欲甘膳四神排擊遷延而退又曰河南趙良與其郷人諸生到長安界遇霖􅀨粮乏相謂曰飢正爾當那得食耶應時美飯備在前兩人驚愕不敢食有人聲曰但食無嫌也明日早兩人復曰那復得美食即復在前遂至長安無他禍福祖台之志恠曰建康小吏曹著見廬山夫人夫人爲設酒噉金鳥啄甖其中鏤刻竒飾異形非人所名下七子合盤盤中亦無俗中餚􅁗記曰符朗甚別味㑹稽王道子爲㓪設盛饌問曰􅀜中之食孰􅀂此荅曰皆好唯塩味少生嵩髙山記曰山下巖中有一石屋亦有自然經書自然飲食􅀶物志曰魏明帝時京邑有一人食噉兼十人遂肥不能動其父甞爲逺方長吏送彼徃縣令故義傳食之一二年間一郷爲儉齊諧記曰江夏郡安陸縣有人姓郭名坦兄弟三人其大兒忽得時行病病後遂大能食一日食斛餘米其家供給五年乃至罄貧語曰汝當自覔食後至一家門前巳得筥飯後門乞此家出語之汝已就前門得那復後門乞其人荅曰實不知君有两門腹大饑不可忍後門有三畦韮一畦大蒜因噉两畦便大悶極卧地湏􅁷大吐吐一物似籠出地漸漸大及主人持飯岀不復能食遂撮飯内着向所吐物上即消成水此人於此病遂得差􅀽淮正書曰方丈之食不過一飽綈􅂁之繡不過一煖裴􅀇新言曰管仲奪伯氏駢邑三百使之飯􅂼食没齒無怨言􅀂管氏取以營私則一邑不可奪也又曰孝子欲親之食云我巳食欲親之衾云我不寒此漫孝也神仙傳曰焦先者字孝然河東太陽人郷里累丗云百七十歳常煑白石以與人熟如大芋者日日入山伐薪以布施先從村頭一家起周而復始擔薪以置人門外人見之時即鋪席與坐爲設食先便就坐食亦不與人語􅀂人不見其擔薪往時乃置薪於人門間便去連年如此結草庵於河渚或數日一食欲食則爲人賃作人以衣衣之乃使限功受直足得一食輙去人欲多與終不肯取亦有數日不食時東晢發蒙記曰廉頗畢老日噉肉百斤曹植與呉季重書曰食􅀂填溝壑飯􅀂灌漏巵其人固難量豈非大丈夫之樂哉丗􅀃曰陳太丘詣荀㓪陵貧儉無僕從迺使元方將車季方持杖從後長文尚小載著車中既至荀使叔慈應門慈明行酒餘六龍下食又曰桓公坐有叅軍椅蒸薤不得解共食者又不助而掎終不放生者􅀏桓公曰同盤尚不相􅂇况復危難勑令免官又曰劉真長王仲祖共行日旰未食有相識小人貽其飡者肴案甚盛真長辭焉仲祖曰􅂓以充虚何􅀂真曰小人都不可作縁又曰羊㬅拜丹陽尹客早者並得佳設曰晏則漸罄不復及精隨客早晩不問貴賤羊固拜臨海飲食皆美雖晚至者猶獲其盛饌時論以固之豊腆乃不如㬅之真率也又曰王東亭嘗之矣郡就汰公道人􅀫別脯許府家徃瓦官寺設慢屋竟一寺東亭將夕至夜後汰公設豆藿麋汰公自噉一大東亭難汰公遂強進半湏􅁷東亭行帳設名飲食果炙畢備汰公都無所噉俗􅀃曰桓琙音城性噉犬毎暝琙時使從兄索食黄帝八十一問曰人不食七日而死者何也然人胃中常有留榖三㪷五􅂛水三􅂛故平人一日再至清一行二􅂛半日中五勝七日七五三㪷五勝而水榖盡矣故平人不食飲七日而死者水榖津液俱盡故也弘君舉食檄曰又取灄湖獨穴之鱧灄音攝赤山後陂之蓴伺漉泠豉及熱應分食畢作躁酒炙冝傳酒便清香肉則豆不㹀麞肶􅀂披繙急火中炙脂不得薫聞香者躑躅千咽者塞門羅奠椀子五十有餘牛䐑擣炙鴨䐹魚熊白麞脯糖蟹濡臺車螯生甜滋味逺來百醉之後談悶不除應有蔗薑木􅀲元李陽梅五味橄欖石榴􅀇拘葵羹脫煑各下一杯明皇􅄂録曰天寳中諸公主相効進食上命中官􅀽思藝爲檢校進食使水陸珎羞數千盤之費蓋中人十家之産中書舎人竇華甞因退朝遇公主進食方列於通衢乃傳呵按轡行於其間官苑小兒數百人奮挺而前華僅以身免嶺表録異曰康州恱城縣北百餘里山中有樵石穴毎歳郷人􅅣爲燒食器䖍州亦有乃食牢也但燒令熱徹以物儭閣置之盤中旋下生魚肉及葱韭韲􅉁之􅀋頃尅即熟而終席煎沸南中有親朋聚㑹多燒樵石亦極熱疑石中有火毒大平御覽卷第八百四十九
