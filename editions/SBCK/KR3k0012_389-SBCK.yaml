body:
  text: 人事部三十嗜好容止嗜好禮記檀弓上曰孔子與門人立拱而尚右二三子亦皆尚右孔子曰二三子之嗜學也我則有姉之䘮故也二三子皆尚左喪上右隂也􅁻上左陽也又􅀕義曰先王之孝也心志嗜欲不忘乎心又􅀕統曰不齊則於物無防也嗜欲無止也及其將齋也防其邪物訖其嗜欲耳不聽樂左傳閔公曰衛懿公好鶴鶴有乗軒者及有狄人之難國人皆曰鶴實有禄位余焉能戰遂敗又僖中曰齊侯好内多内寵内嬖如夫人者六人左傳襄公曰鄭伯有好田而嗜酒爲窟室而夜飲酒擊鍾焉朝至未巳朝者曰公焉在家臣故謂伯有爲公其人曰吾公在壑谷壑谷窟室又昭公曰莒子􅁃輿虐而好劒苟鑄劒必試諸人又哀上曰曹伯陽即位好田弋曹鄙人公孫彊好弋獲白鴈獻之公羊傳僖公曰虞公貪而好寳及爲晉所滅抱寳牽馬而出國語曰屈到嗜艾有疾召其宗老而屬之􅀕我必以艾子木曰夫子不以私欲奸國之典言不犯常法遂不用論語公冶長曰子曰十室之邑必有忠信如丘者焉不如丘之好學也又雍也曰哀公問弟子孰爲好學孔子對曰有顔回者好學不遷怒不貳過不幸短命死矣又衛靈公曰子曰吾未見好德如好色者也家語曰子路見孔子曰汝何好對曰好長劒孔子曰加之以學豈可及乎子路曰南山有竹不揉自直斬而用之射逹於犀兕以此言之何用學焉子曰括而羽之所逹深矣史記曰魏文侯問曰呉起何如人李克曰起貪而好色然其用兵司馬穰苴弗過也於是魏文侯以爲將拔􅁗五城又曰范増說項羽曰沛公居山東之時貪於財貨好羙􅁎入􅀜財物無所取婦人無所幸此其志不在小漢書曰濟東王彭離昏暮私與其奴亡命少年數十人行剽殺人取財物以爲好以是爲好喜之事也又曰漢家言律暦者夲張蒼蒼好書無所不觀無所不通又曰朱買臣字翁子呉人也家貧好讀書不治産業又曰陳遵嗜酒毎大飲賔客滿座輒􅐬門取客車轄投井中雖有急不能去續漢書曰劉寛簡略嗜酒不好盥浴東觀漢記曰耿弇字伯昭扶風人少好習學文業帝又令試􅀐士建旗鼓肆馳射由是好將帥之事又曰姜詩字士游廣漢雒人以傭作飬母赤眉賊經其里落云不可驚孝子母好飲江水児取水溺死􅂲母知詐云行學􅀊􅀊作衣投於江中俄而涌泉出於舎側味如江水又曰更始韓夫人尢嗜酒毎侍飲常侍奏事輒怒曰帝方對我飲正酣何此時持事來乎起禠破書案謝承後漢書曰馬武字子張南陽人爲人好酒豁逹敢直言時在御前靣折同列以爲􅀏樂典略曰荆州牧劉表跨有南土子弟驕貴並好酒設大針於杖端客有醉寢伏輒以劖鋤衘切刺驗其醒醉晉書曰王濟好弓馬嘗乗一馬着連乾鄣泥前有水終不肯渡濟云此必是惜鄣泥使人解去便渡故杜預謂濟有馬癖晉中興書曰郭璞性輕易不持威儀嗜酒好色或過度其友人于寳常誡之曰此非適性爾璞曰吾所受有夲限用之􅁪恐不盡乃憂爲害乎後魏書曰辛少雍字季仲少有孝行尤爲祖父紹先所受紹先愛食羊肝常呼少雍共食及紹先卒少雍終身不食羊肝宋書曰􅁃炳之性好㓗士大夫造之者去未出户輒令拭席枕床時陳郡殷沖亦好净小人非淨浴新衣不得近左右士大夫小㓗每容接之炳好㓗反是冲每以此譏焉又曰謝靈運出爲永嘉太守郡有名山水靈運素所愛好出守旣不得志遂肆志遊遨遍歷諸縣動逾旬朔又曰劉邕所噉食毎異於人性嗜瘡痂以爲味似蝮魚常詣孟靈休靈休先患炙瘡瘡痂落床上邕因取食之靈休大驚邕荅云性之所嗜靈休瘡痂未落者悉禠取以貽邕邕旣去靈休與何朂書曰邕向見噉遂舉體流血南康囚史二百許人不問有罪無罪逓㸦與鞭鞭痂常給邕膳齊書曰何修之字士威廬江人也性好㓗一日之中洗滌者十餘過猶恨不足時人稱爲水淫于時又有遂安令劉爲性弥浄㓗縣中洒掃郭邑無撗草水湔塵穢百姓不堪命㘴免官又曰王思逺瑯瑘臨沂人也好簡㓗衣服垢􅁾方便不前形像新楚乃與促􅂰雖然旣去之後猶令二人交箒掃其㘴處又曰明帝好食逐夷以銀鉢盛宻漬之一飡數鉢謂王景文曰此味卿頗足不景文曰臣夙好此味貧素致之甚難帝甚恱食逐夷積多􅅐腹不息氣將絶疾大困一食漬汁猶至三㪷終以此卒管子曰呉王好劒而國士輕死墨子曰晉文公好士之惡服大夫䍧羊之裘韋以帶劒大帛之􅃣越王好士勇自焚其室曰越國之寳悉在此中王自鼓蹈火而死者百餘人孟子曰曽晢嗜羊􅀥而曽子不忍食羊􅀥羊􅀥大􅀥也莊子曰子張見魯哀公哀公不禮曰臣聞君好士不逺千里以見公今見公之好士也有似葉公子髙之好龍葉公好龍室中彫文盡以爲龍於是天龍聞而下之窺頭於牖拖尾於堂葉公見之弃而還走失其魂魄五神無主是葉公非好龍也夫似龍而非龍也今君非好士也夫似士而非士也新序同尹文子曰昔齊桓公好紫闔境不鬻異綵又曰齊宣王好射所用弓不過三石以示左右左右引之皆曰此不下九石而宣王終身自以爲用九石韓子曰齊桓公好服紫一國盡服紫當時十素不得一紫公患之管仲曰君欲止之何不試勿衣也謂左右曰甚惡紫臭公曰諾於是三日境内莫有衣紫又曰楚恭王與晉厲公戰于鄢陵楚師敗恭王傷目其戰之時司馬子反渴而求飲榖陽竪操觴酒而進之子反曰此酒也竪曰非也飲之子反謂之嗜酒弗能絶口又曰公儀休相魯而嗜魚一􅀖皆爭買魚而獻之公儀子不愛又曰鄒君好服長纓左右皆服纓纓甚貴鄒君患之問左右對曰君服之百姓亦多服是故貴也鄒君因先自斷其纓而出國中皆不服長纓賈􅁩曰文王使吕望傅太子發發􅄝鮑魚公不與曰鮑魚不登於爼豈有非禮而可養太子哉說􅁐曰魏文侯封太子擊於中山三年不徃來趙倉唐曰君何不遣人使大國太子曰願之乆矣未得可使者對曰臣願奉使於是遣倉唐緤北大奉晨鳬獻之文侯曰擊愛我知我所􅄝好韓詩外傳同風俗通曰趙王好大眉民闊半額楚王好廣領國人没頸文士傳曰嵆康性絶巧好鍜家有盛栁樹乃激水圜之夏天甚凉􅁪居其下自鍜有人就者康不受其直孝子傳曰隗通字君相犍爲􅈎道人母好飲江􅆃水常乗舡捷致漂浚辛苦忽然有撗石特起直江脊後取水無復勞劇又曰陳遺爲郡主簿母好食鐺底焦飯常持一囊盛之懸案下郭子曰陸士衡􅀄入雒張公云冝詣劉道眞於是二陸旣徃劉尚在哀制性􅄝酒禮畢􅀄無他言唯問東吴有長柄胡盧卿得種不陸兄弟珠失望乃云悔徃丗說曰謝遏年少􅀇也好着紫羅香囊太傅患之而不欲傷其意賭得而焚之又曰林公好鶴徃剡東時有人遺其􅀟鶴少時翅長欲飛林公意甚惜之乃鎩其翮鶴騫翥不能復起乃舒翼反頭視之如似懊惱意林公曰旣有凌霄之姿何肯爲人作耳目近翫養令翮成遂飛去又曰王武子好驢鳴旣葬文帝臨其喪顧語同遊曰王子好驢鳴可各作聲以送赴客皆一時作驢鳴語林曰王武子死孫子荆哭之甚悲賔客莫不垂涕哭畢向靈座曰卿嘗好我作驢鳴令我爲君作驢鳴聲似真賔客皆􅀏孫聞之曰諸君不死而令王武子死賔客皆怒焉又戴叔鸞母好驢鳴叔鸞毎爲驢鳴以樂其母又曰祖約少好財阮遥集好屐並常自經營同是一累而未判其得失有詣祖見料視財物客至併當不盡餘兩小􅼣以置背後傾身障之意未能平或有詣阮正見自蠟屐因歎曰未知一生當着幾緉􅄚神甚閑暢於是勝負始分也又曰王子猷嘗暫􅀉人空宅住使令種竹或問暫住何煩尓嘯詠良夕直指竹曰何可一日無此君語林曰張湛好於齋前種松栢􅀽山松出遊好令左右挽歌時人謂張屋下陳尸􅀽道上行殯曹植永􅀕先王表曰先王喜鰒魚臣前以表徐州􅆇霸遺鰒魚二百枚足自供事容止毛詩曰臣工振鷺二王之後來助􅀕也二王夏殷也其後􅂎宋也振鷺于飛于彼西雍我客戾止亦有斯容箋云自鳥集於西雍之澤言所集得其有斯容言威儀之􅀂鷺然也禮記玉藻曰君子之容舒遲足容重舉欲遲也手容恭髙且正也目容端不睇視也口容止不妄動也聲容静不􅎪咳也頭容直不傾顧也氣容肅似不息也立容德如有予也色容莊勃如戰色㘴如尸尸居神位敬慎也燕居告温温告謂教使也詩云温温恭人凡􅀕容貌顔色如見所􅀕者喪容纍纍嬴憊貌也色容顚顚憂思貌也視容瞿瞿梅梅不審貌也言容繭繭聲氣微也戎容曁曁果毅貌也言容詻詻教令嚴也色容厲肅儀形貌也視容清明察於事也立容辨卑母讇辯讀爲貶自貶卑謂聲磬折也又表記曰容貌以文之衣服以移之是故君子服其服則文以君子之容有其容則文以君子之辭左傳定下曰邾隱公來朝子貢觀焉邾子執玉髙其容仰公受玉卑其容俯子貢曰以禮觀之二君者皆有死亡焉論語子張曰曽子曰堂堂乎張也難與並爲仁矣言子張容儀盛而於仁道薄難勉進漢書曰薛宣好威儀容止甚可觀又曰息夫躬河内陽人也少受春秋通覽詩書容貌壯麗爲衆所異又曰江充召見大臺宫自請以所常􅀍服見上上許之充衣紗縠單衣􅃣歩摇􅃣爲人魁岸容貌甚壯帝望見而異之謂左右曰燕趙固多竒士又曰武帝即位徵天下賢良待以不次之位自衒鬻者以千數東方朔上書曰臣朔年二十二長九尺三寸目􅀂懸珠齒􅀂編貝又曰王商爲丞相河平四年單于來朝引見丞相㘴未央庭中單于前拜謁商商起離席與言單于仰視商貌大畏之遷延却退天子聞而歎曰此眞漢相矣又曰司馬相如字長卿蜀郡成都人也至臨卭富人卓王孫請之相如時從車􅀐雍容閑雅甚都羙也詩曰不見子都都王孫有女文君新寡竊從户窺心說而好之遂夜奔相如又曰雋不疑字曼倩渤海人也􅁀勝之爲直指使者至東海素聞不疑賢請與相見望見不疑容皃尊嚴衣􅃣甚偉勝之躧履起迎續漢書曰侯霸字君房河南人爲人矜嚴有威容家累千金不事産業篤志詩書師事房元常爲都講東觀漢記曰上過頴陽􅀕遵以縣吏數進見上愛其容儀署爲門下吏又曰虞延字子太陳留人爲都督郵丗祖聞而竒之二十年東廵路過小黄髙帝母昭陵后園陵在焉時延爲都督郵詔呼引見問園陵之事延進􅈲從容跪拜可觀其陵樹株栢皆諳其數爼豆犠牲頗曉其禮帝善之勑延從駕西盡郡界賜錢及劒帶佩刀還郡又曰杜詩薦伏湛䟽曰容皃堂堂國之光輝智略謀慮朝之淵藪齠齓勵志白首不衰實足以先後王室名足以光示逺人柱石之臣宜居輔弼英雄記曰􅀽紹生而孤㓜爲郎容皃端正威儀進止動見倣効弱􅃣除復陽長有清能名呉書曰張純字元基少厲操行學􅀶才秀切問捷對容止可觀拜郎中􅀘廣德令治有異績擢爲太子輔義都尉呉録曰􅅬胤年十二􅀌單焭獨爲人白晢威儀可觀毎正朔朝㑹脩覲在位大臣見者莫不歎賞魏志曰延康元年蜀將孟逹率衆降逹有容止可觀文帝甚器愛之使逹爲新城太守加散􅀐常侍蜀志曰魏文帝察黄權有局量試欲驚之遣左右請權未至之間累催相屬馬使奔馳交錯於道官屬莫不禠魄而權舉止顔色自􅀂後領益州刺史大將軍司馬宣王深器之問權曰蜀中有卿軰幾人權􅀏而不荅曰不圗明公見頋之重蜀志曰彭永年廣漢人身長八尺容皃甚偉姿性驕傲多所輕忽唯敬同郡􅁗子勑呉志曰張昭容皃矜嚴有威風權常曰孤與張公言不敢妄也舉􅀖憚之王隱晉書曰王褒少立操尚非禮不動非法不言身長八尺四寸容皃絶異音聲清亮辭氣韶雅沈約宋書曰元凶弑逆義宣發哀即日便舉兵張暢爲元佐位居僚首哀容俯仰䕃映當時舉哀畢變服着黄韋袴褶出射堂簡人音姿容止莫不瞩目見之者皆願爲盡命又曰羊欣字敬先少靜黙無競於人羙言􅀏善容止徧覽經籍尤長􅀠書賈􅁩新書曰朝廷之容師師然翼翼然整以敬􅀕祀之容遂遂然粥粥然敬以婉軍旅之容愊然肅然固以猛喪紀之容怮然懾然􅀂不還頋譚别傳曰譚字子嘿呉人常慕賈􅁩之爲人身長七尺八寸少言􅀏容皃矜整有珪璋威重未常失色於物非其人或終日不言顔含别傳曰顔髦字居道含之子也少慕家業惇於孝行儀狀嚴整風皃端羙桓公見而歎曰顔侍中廊廟之望也桓邵别傳曰邵字敬倫丞相之第五子清貴簡素風姿甚羙而善治容儀雖家人近習莫見其怠墮之皃温見而稱之曰可謂鳯鶵郭子同三輔決録曰竇叔髙名􅀇爲上郡計吏朝㑹數百人儀狀絶衆天子異之詔以公主妻之出同軰調􅀏焉叔髙時巳自有妻不敢以聞方欲迎婦與訣未發而詔召叔髙就第成婚益部􅂄舊傳曰張肅有威儀容貌甚偉弟松爲人短小不持節操然識逹精果有材幹劉璋乃遣詣曹公曹公不甚禮楊修深器之脩以所撰兵書示松飲讌之間一省即便闇誦修以此異之㑹稽典録曰賀邵善容止正其衣􅃣尊其瞻視動静有常與人交乆益敬之至於官府左右莫見其跣坐常着韈希見其足荀氏家傳曰荀羡風器英秀識准摽貴明􅂡眉羙音氣俯仰頋盻容止可則丗說曰太尉揔角時常造公司徒王衍神情明秀風姿詳雅山公嗟嘆者良乆旣去目之而言曰何物老嫗生此寧馨児然􅂲誤天下生民者未必非此人又曰崔琰字季珪聲姿髙朗􅂡長四尺甚有威重武帝見匈奴使自以形陋不足以雄逺國使季珪代自捉刀立牀頭旣畢令間諜問曰魏王何如荅曰王雄望非常然牀頭捉刀人此乃英雄也魏武追殺其使又曰裴令公有容儀脫􅃣冕麤服亂頭皆好時人以爲玉人又曰時人見嵇中散歎曰蕭肅如長松下風髙而且􅀷山公曰嵆叔夜巖巖􅀂􅀌松之獨立及其醉也如玉山之將頽又曰王右軍見杜􅀪治歎曰靣如凝脂眼如點漆此神仙中人也又時人謂左軍飄􅀂遊雲矯􅀂驚龍又曰海西時諸公毎朝朝堂猶暗唯㑹稽王來軒軒若朝霞舉太平御覽卷第三百八十九
