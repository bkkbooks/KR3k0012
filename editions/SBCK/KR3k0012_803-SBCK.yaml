body:
  text: 珠下唐書曰髙祖朝􅂚婆郍可汗獻大珠上曰珠信爲寳朕所寳者赤心耳何用珠爲竟不受又曰貞觀中桂州都督李􅀪節以清愼聞身殁之後其家賣珠上聞之乃宣言於朝曰此人生時宰相言其清白今日旣然所舉者豈得無罪必可理之不可捨也魏徴諌曰陛下言此人不清未見受財之所聞其賣珠將罪舉者臣不知所謂自聖朝巳來爲國盡忠清貞自守終始不渝者屈突通張道源而巳通子三人來選共有一疋羸馬道源兒子不能存立未見一言及之今􅀪節爲國立功前後大蒙賞賚居官終殁不言貪殘妻子賣珠未爲有罪審其清者無所存問疑其濁者傍罪舉人雖疾惡情深實以好善不篤臣􅀼思度未見其可恐有識聞之必生撗議伏惟再思上撫掌曰造文不思遂有此語方知談不容易又曰婆利東有羅刹國其人極陋朱髮黒身獸牙鷹􅀲時與林邑人作市以夜而來自掩其面其國出火珠狀如水精日午時以珠承影取艾依之即火出管子曰桓公問管子曰昔者周人有天下諸侯賔復名教通於天下而奪於其下何數也管子對曰君分壤而貢入市朝同流黄金一篋也江陽之珠一篋也此謂以寡爲多以狹爲廣又曰珠者隂之陽也故勝火玉者陽之隂也故勝水其化如神故天下藏珠玉諸侯藏金石又曰以珠玉爲幣又曰玉起於禺山珠起於赤野又曰丹靑在山民知而取之美珠在淵民知而取之丹青與珠各有所用之性故雖在山泉而人猶知而取之况在於人懷嗟而不知乎晏子春秋曰景公爲履黄金之綦飾以銀連以珠列子曰子華之門徒指河曲之隈謂啇丘開曰彼中有寳珠泳可得也啇丘開從如泳之旣岀果得珠孫卿子曰在物莫明於珠玉珠玉不覩王公則不爲寳又曰昔衛靈公坐重華之臺侍御數百隨珠照日羅衣從風仲叔御入諌靈公下席再拜曰寡人過矣莊子曰夫唾大者如珠小者如霧又曰黄帝遊於赤水之北登于崑崙之丘遺其􅀇珠使知索之而弗得使離朱索之而弗得使罔象索之乃得又曰河上有貧窮待織蕭綃而食者其子投淵得千金之珠謂其子曰取石來鍜之夫千金之珠必在九重之淵驪龍頷下子能得珠者遭其睡也使驪龍悟子尚奚有哉又曰脩其道之謂備不以物挫志之謂完君子明於此則韜乎其事沛乎其爲萬物逝也􅀂然者藏金於山藏珠於川又曰儒以詩禮發蒙大儒曰東方作矣事之何􅀂小儒曰未解裙􅃭口中有珠詩固有之曰青青之麥生陵之陂生不布施死何用含珠爲鄒子曰珠生於南海玉岀於湏彌無足而至墨子曰和氏之璧夜光之珠三􅁄六異此諸侯所謂良寳尸子曰水貟折者有珠韓侯曰隨侯之珠不嬰以銀黄其質至美物不足以飾又曰楚人賣珠於鄭者爲木蘭之櫝薫以桂椒綴以玫瑰輯以翡翠鄭人買其櫝而還其珠此可謂善賣櫝矣未可謂善鬻珠也淮南子曰曽城九重有珠樹在其西又曰美玉不雕美珠不文質有餘也又曰明月之珠不能無纇又曰楚王亡其猨而林木爲之殘楚莊王猨捷躁衣木而處故殘林以求之也宋玉亡珠而池中魚爲之殫又曰珠玉尊則天下爭禮樂飾則純朴散又曰禹填鴻水以爲山堙崑崙以爲土中立曽城九重其髙萬一千里上有木禾禾長五丈五尺珠樹玉樹不死樹沙棠琅玕綘樹並在曽城沙棠琅玕珠􅀋矣玉璜在西北隅任子曰丹淵之珠沉於黄泥牟子曰珠玉少而貴凢属多而賤聖人七經而巳佛遂萬億言恐煩而無當也抱朴子曰識珍者必拾濁水之明珠賞氣者必採穢藪之芳蕙穆天子傳曰北征舎于珠澤此澤出珠故名也珠澤之藪方四十里山海經曰開明山北有珠樹又曰三珠樹生赤水山其爲樹如栢葉皆爲珠一曰其狀􅀂彗如彗星狀又曰鳥䑕同穴之山滋水出焉西注于漢水多如魚魮之魚是生珠玉亦珠玉蚌􅀋又曰數暦之山楚水出焉其中多白珠今蜀郡平澤岀青珠戰國䇿曰張丑爲質於燕王欲殺之走出國境境吏得丑丑曰燕所爲將殺我者人有言我有寳珠也王欲得之我失巳乆矣如燕不信今子但欲致我我且言子之奪我珠而吞之燕王必且殺之刳子之腹矣吾要且死子之腹亦且寸絶境吏恐而放之又曰􅂫秦􅀃李兊不能聽送秦以明月之珠和氏之璧黒貂之裘又曰有人操隨侯之珠露野無弓弩之衛必危吕氏春秋曰宋桓司馬有寳珠抵罪岀亡王使人問珠之所在曰投之池中於是竭池而求之魚得禍焉又曰以隨侯之珠彈千仞之雀丗必􅀏之是何也所用重所要輕又曰精氣之集也阜於珠玉與爲精朗陸賈新語曰聖人不用珠玉而寳其身漢武故事曰上起神屋以白珠爲簾瑇瑁爲柙東方朔記曰珠彈不如泥丸各有所用也東方朔神異經曰西北荒中有二金闕上有明月珠徑三丈光照千里塩鐵論曰珠璣出桂林距漢萬餘里􅀃苑曰墨子謂滑􅈊曰今凶年有欲與子隨侯之珠者曰不得賣也以爲飾又欲與子一鍾粟者得珠不得粟不得珠得粟子將何擇滑􅈊曰粟可取也新序曰秦使使者往觀楚之寳器楚王召子西而問焉曰吾和氏之璧隨侯之珠可以示諸子西對不知召昭奚恤而問焉昭奚恤對曰吾國之寳器在賢臣珠玉玩好之物非寳之重者太玄經曰明珠彈於飛肉其得不復論衡曰天地之間物氣相􅀋實非者多海外西南有珠樹焉察之是珠然非魚中之珠也夫十日之日猶珠樹也珠樹非真珠十日似日非實日也又曰隨侯以藥作珠精曜如真又曰人審知有冨貴之命則幽居俟之不湏勞形求索也猶珠在山不求貴價於人人自貴之命冨之人筋力自輕命貴之人才智自髙白虎通曰德至淵泉即江出大貝海岀明珠釋名曰王后首飾曰副副覆也上有垂珠歩則揺也蔡邕勸學曰明珠不􅉷焉發其光寳玉不􅅣不成珪璋古今注曰章帝元和元年明珠岀館陶大如李有明曜三年明月珠出豫章海昏大如雞子圍四寸八分章和元年鬰林大珠圍三寸和帝永元十五年鬱林降民得大珠圍五寸徑寸七分郭子横􅁳記曰帝起甘泉望風臺臺上得白珠如花一枝帝以飾九華之蓋望之􅀂照月王子年拾遺記曰黄帝之子名青陽是曰少昊一名摯有白雲之瑞號爲白帝有鳯衘明珠致於庭少昊乃拾珠懷之使照服於天下又曰燕昭王時有黒鳥白頭集王之所衘洞光之珠圎徑一尺此珠色黒如􅃮而懸室内百神不能隱其精靈又曰石季倫所愛婢數十人季倫甞屑沈水香如塵末布象床上使所愛者踐之無跡則賜真珠百琲􅀂有迹者即節其飲食令體輕故閨中相戲曰尓非細骨輕軀郍得百琲真珠琲蒲愷切珠貫之名也又曰舜葬蒼梧之野有鳥如雀自丹州而來􅄍五色之氣如雲名曰慿宵鳥時來蒼梧之野衘者沙珠積成壟阜名曰珠丘今蒼梧之外採藥時得青石㓗如珠服之不死帶者身輕又曰瀛洲有鳥如鳯身紺翼丹名藏珠毎鳴翔而􅄍雜珠累斛仙人常以其餘飾仙裳輕而耀於日月也西京􅄂記曰髙祖斬白蛇劒上有七采珠九華玉爲飾􅄂厠五色琉璃爲匣劒在室光影猶照於水也又曰漢諸陵寢皆以竹爲簾簾皆爲水文􅀛鳯之像昭陽殿織珠爲簾風至則鳴如珂珮之聲列仙傳曰朱仲者㑹稽市販珠人也髙后時募三寸珠乃詣闕上之珠好過度賜五百金魯元公主私以七百金從仲求仲獻四寸珠送闕下旣去景帝時復獻三寸珠數十􅋞去不知所之列女傳曰珠崖令卒官妻息送喪歸漢法内珠入関者死妻弃其係臂珠男年九歳好而取之置其母鏡奩中母不知也至関吏搜索得珠問誰當坐者前妻子􅀄曰􅀄當坐之継母請吏曰幸無劾兒誠不知也妾當坐􅀄又曰夫人哀􅀄之􅀌欲以活􅀄耳因號泣傍人莫不酸鼻隕涕関吏執筆不能就一字乃曰母子有義如此吾寧坐之不忍加文又且相譲安知孰是乃弃珠而遣之神仙傳曰麻姑欲見蔡經母及經弟婦弟婦新産十數日麻姑望見之曰噫且止勿前即求少許米便以擲地視米墮地皆成珠方平􅀏曰姑故年少吾老矣不喜復作此變化也列仙傳曰鄭交甫將往楚道至漢臯臺下見二女佩兩珠大如荆難夘交甫與之言曰欲子之佩二女解與之旣行返顧二女不見佩亦失矣吴越春秋曰越王允常聘歐冶子造五劒􅁗客薛燭善相劒示之燭曰雖傾城量珠玉猶未可與也又曰伍貟奔吴至昭􅀜􅀜吏欲執之伍貟曰上所以索我者以我有美珠也今執我將言爾取之􅀜吏因捨焉邴原別傳曰原逺遊學詣安丘孫崧崧辭曰君郷里鄭君知之乎原荅曰然崧曰鄭君學覽古今學者之師模君乃舎之似不知也而曰然何原曰故有登山而採玉者有入海而採珠者不知山之髙海之深哉􅀶物志曰鮫人從水出寓人家積曰賣絹將去從主人索一器泣而成珠滿盤以與主人又曰五月五日取青蛉頭正中埋皆成青珠王朗雜事曰焦生乞恩辭生未有婦從烏桓贖李娥爲妻與耳中金璫一􅀟珠四枚璫二􅀟珠三十􅀟合中真珠一􅂛盧綝四王起事曰張方刼帝西遷國家有寳物詔石將軍載之於是放軍人八千餘人三日輦之尚有缺角真珠百餘斛又曰惠帝遷長安時洛陽御府有大珠璫百餘斛衛玠別傳曰驃􅀐王武子君之舅也常與君同語語人曰昨日與吾外甥並坐冏􅀂明珠之在我側朗然來暎人搜神記曰吴王夫差女名玉童子韓重有道術王恱之結氣死葬于昌門之外重至􅃁前􅂘祭女見形將重入􅃁臨去取徑寸明珠以送重又曰隋侯行見大虵傷救而治之其後虵衘珠以報之徑盈寸純白而夜光可燭堂故歴丗稱隋珠焉又曰澮參養母至孝曽有􅀇鶴爲戎人所射窮而歸參收養療治瘡愈放之後鶴夜到門外參秉燭視之鶴雌雄􅀟至各御明月珠報參焉又曰南海之外有鮫人水居如魚不廢緝績其人能泣珠幽明録曰洛下有洞穴婦欲殺夫推下經多時至底仍得一穴行數十里見人皆長三丈披羽衣如此九處最晚所至告飢長人指中庭栢樹下有一羊令跪捋羊􅀄捋得一珠後得始令其噉之即得療飢復㝷穴行出交州還洛問張華云九處地仙名九館大夫羊爲癡龍􅀄一珠食之天地等壽次者延年後者充飢而巳事具嵩山又曰漢武帝幸河渚聞􅃶歌之音而有老公及年少數人出皆長八九寸爲帝奏樂飲酒樂老公顧命洞穴之寳一人受命下没川底得一大珠徑數寸明耀絶丗上問東方朔朔曰河底有穴沉數百丈中有赤蜯生此珠也事具樂部又曰王敦召王猛猛至江口入水中命舡人進舡至大電見猛行水中從東北還逆舡弟子問其故猛云水神數興波浪賊害行旅暫約勒以真珠一握爲信三秦記曰始皇􅃁中以夜光珠爲日月殿懸明月珠晝夜光明三輔决録曰昆明池中有神池通白鹿原人釣魚綸絶而去夢於漢武帝求去鈎帝明日戲於池見大魚衘索帝曰豈夢所見耶取而放之後三日池邊得明珠一􅀟帝曰豈魚之報耶沈懷逺南越志曰珠有九品大五分以上至一寸八分分爲八品有光彩一邊小平似覆釡者名璫珠璫珠之次爲走珠走珠之次爲滑珠滑珠之次爲磥砢珠磥砢珠之次爲官兩珠官兩珠之次爲税珠税珠之次爲符珠孫柔之瑞應圖曰晉平公鼓琴有􅀇鶴二八而下衘明珠舞於庭一鶴失珠覔得而走師曠掩口而􅀏廣志曰莫難珠其色黄生東夷又有明珠稱光大徑寸或圍二寸以上出黄支有至貟珠置平地終日不得停今上方名以甲乙爲次第石珠鑄石爲珠廣志曰夫餘地美珠如酸􅀥又曰班魚頭中有白石如珠璣出北海梁四公記曰震澤中洞庭山南有洞穴深百餘尺旁行五十餘里至龍宫杰公謂是東海龍王第七女掌龍王珠藏小龍千户衛護此珠龍畏蠟愛美玉及空靑而􅄝燒鷰使通信可得寳珠帝聞大喜乃詔有能使者厚賞之於是羅子春兄弟三人應募帝勑百工以于闐舒河中美玉造小函二以桐木􅁅發其光求宣州空青汰取其精者用海魚膠調之成二函火堅之龍腦香㝷亦繼之杰公曰以蠟塗子春等身及衣佩石乃燒鷰五百枚入洞穴至龍宫守門小蛟聞蠟氣俯伏不敢動乃以燒鷰百事賂之令其通以其上上者獻龍女龍女食之大喜又上玉函青􅇲具陳帝旨洞中有龍五千餘歳能變化出入人間善譯時俗之言龍女知帝禮之以大珠三小珠七雜珠一石以報帝命子春等乗龍載珠還國食頃之間便至龍去而子春薦珎帝大喜喜得聘通靈異獲天人之寳以珠示杰公公曰三珠其一是天帝如意珠之下者其二是驪龍珠之中者七珠二是虫珠五是海蚌珠人間之上者雜珠是蚌蛤虵鶴等珠不如大珠之貴帝遍示百竂朝廷咸謂杰公虚誕莫不詰之杰公曰如意珠之上者夜光照四十餘里中者十里下者一里光之所及無風􅀨雷雹水火刀兵諸毒癘驪珠九色夜光百歩中者十歩下者一室光之所及無虵虺虫豸之毒虫珠七色多赤六足二目目當其處有曰如鐡蟻臯蚌珠五色皆有夜光及數尺無瑕者爲上有瑕者爲下蚌珠生於其腹與月盈􅃜虵珠所致隋侯噲參即其事也又問虵鶴之辯對曰使其自識帝命杰公記虵鶴二珠斗餘雜珠散於殿前取大黄虵􅀇鶴各十數處布珠中間於是鶴御其珠鳴舞徘􅆦虵衘其珠盤屈宛轉羣公觀者莫不歎服帝復出如意龍虫等珠校光之逺近七元之數皆如杰公之言盛引之荆州記曰石藴玉以潤其區漢含珠而清其域闞駰十三州志曰僧彊疊國在天笁南佛寺三千餘所其地有神珠非玉石晝夜於國中光明於日珠徑一尺五寸其色正碧草方草木狀曰凡採珠一旁小平形似覆釡第一珠母肉玉白人民以薑韲食之常璩華陽國志曰廣陽縣山出青珠永昌郡愽南縣有光珠穴出光珠珠有黄珠白珠青珠碧珠徐哀南方草物狀曰凡採珠常三月用五牲祈禱􅀂祠􅀕有失則風攪海水或有大魚在蚌左右自蚌珠長二寸半在漲海中其一寸五分其光色一旁小平形似覆釡爲第一璫珠凡三品其一寸三分雖有光色形不貟正爲第二滑珠凡三品萬震南州異物志曰合浦有民善游採珠兒年十餘便教入水求珠官禁民採珠巧盗者蹲水底剖蜯得好珠吞之而出裴氏廣州記曰鯨鯢目即明月珠故死不見有目精林邑記曰黄􅀍州上户口殷冨多明珠􅄂寳語林曰王長史語林道人曰眞長可謂金石滿堂林公以語孫興公興公曰語不得耳選擇正可得少碎珠耳又曰中朝有人詣王太尉過王安豐大將軍丞相在坐因徃別屋見李寅平子還謂人曰今之行􅠅目皆琳琅珠玉又曰王夷甫處衆中如珠玉之在瓦石宋玉風賦曰垂珠歩揺來排臣户太平御覽卷第八百三
