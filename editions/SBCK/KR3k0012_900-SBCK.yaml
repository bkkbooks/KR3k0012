front:
  text: 太平御覽卷第九百
  hash: sha256:88201c38a9cde10ed55a796a1a7ca50fa7173d68732540cfc627c89293545ba6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_900-1a}
body:
  text: 獸部十二牛下逸士傳曰堯讓天下於許由由逃之巢父聞而洗耳於池濵樊竪字仲父牽牛飲之見巢父洗耳乃驅牛而還恥令牛飲其下流􅀜中記曰周元年老子之度􅀜令尹喜先勑門吏曰􅀂有老公從東來乗青牛薄板車者勿聽過􅀜其日果見老公乗青牛車求度􅀜吏入白之喜曰諾道今來矣我見聖人矣即帶印綬出迎設弟子之禮楊泉物理論曰武帝拜少翁爲文成􅀊餘無効應乃作帛以飯牛陽言此牛有異應殺而視之得帛書武帝識其手跡其言妖怪乃急窮竟其事事急而首服於是誅文成而隱其事地鏡圗曰齊氣之見爲牛雲氣占曰趙雲如牛北夷之氣如牛郭子撗洞􅁳記曰元封三年大􅁗獻花蹄牛髙六尺尾環繞角生四耳又曰元封三年大􅁗獻牛善走多力使輦銅石以起望仙宫迹在石上皆如花形故陽􅀜之外有花牛津英雄記曰董卓少嘗遊羌中與豪帥相結後更歸耕於野諸豪帥有來從之者卓乃爲殺耕牛與之共宴樂皇甫謐髙士傳曰民有牛􅁀管寜田者寧爲牽着凉處自飲食還牛主主得牛大慙先賢行狀曰王烈字彦老通識逹人時國中有盗牛者牛主得之盗者曰我邂逅迷惑從今巳後將改過子旣巳赦宥幸無使王烈知之人有以告烈烈以布一端遺之間年中行路老父擔重有人代擔行數十里欲至家置之而去問姓名不以告老父復行失劒於路有人行而遇之欲置而去懼後人得之遂守之至暮劒主還見之即前擔人也老父攬其􅃑曰子前代吾擔不得姓名今子復守吾劒未若子之仁者請告吾姓名吾將以告王烈乃語之而去老父以告烈烈曰丗有仁人吾未之見使人推之乃昔時盗牛人也廣州先賢傳曰羅威字德仁南海番禺人隣家牛數入食其禾旣不可逐又爲斷芻多着牛家門中不令人知數數如此牛主驚怪不知爲誰隂廣求乃覺是威自後更相約率檢犢不敢復侵威田玄中記曰大月支及西胡有牛名曰反牛今日割取其肉三四斤明日其肉巳復創即愈也又曰萬􅀊樹精爲青牛漢桓嘗岀遊河上忽有一青牛從河中出人驚走太尉何公時爲中尉將軍有勇刀走逆牛見公走還河公以左手挽牛足右手持斧斫牛頭而殺之此青牛者萬年之木也嵩髙記云山有大松或千嵗其精變爲青牛蜀王夲紀曰􅁗惠王欲伐蜀乃刻五石牛置金其後蜀人見之以爲牛能大便金蜀王以爲然即發卒千人使五丁力士柂牛成道致三枚於成都􅁗道得石牛力也後遣氶相張儀等隨石牛道伐蜀也楊龍驤洛陽記曰石牛在城西石虎當衰石牛夜喚聲聞三十里事奏虎虎遣人打落牛兩耳尾以鐵釘釘四脚今具存劉道眞錢塘記曰明聖湖有金牛嘗有見者神化莫測遂以名湖凉州異物志曰有水牛育於河中鬱林異物志曰周留者其實水牛蒼毛豕身角􅀂擔矛衛護其犢與虎爲讎又曰周留牛毛青大腹銳頭青尾其狀似猪齊地記曰東萊牛島上嘗以五月海牛産乳海牛形似牛而無角騂色虎聲爪牙亦如虎脚似鼉魚尾似鮎魚尾長尺餘其皮甚軟可供百用牛見人奔入水以杖擊鼻則得之史苓武昌郡記曰武昌牛崗古老相傳云有金牛出此今半巳崩破坈大數十丈牛因躍出踐崗邊石遺迹尚在常璩華陽國志曰牛飲水者昔程鄭於此飲牛江爲之竭因以爲名劉欣期交州記曰九眞居風山夷人有一嫗向田見金牛出食斫得鼻鎻長丈餘後人徃徃見牛夜出光曜數十里也盛弘之荆州記曰䴏尾洲南有龍龐二洲二洲之間舊云多異魚而投􅅈揮網輒便桂絶有水客沉而視之見有石牛二頭常爲網害故網絶焉酈道元注水經曰陽城東八十里有牧牛山下有九十九泉即滄河之上源也􅂄舊云山下夲有百泉競發有一神牛駭身自山而降下飲泉竭故山得其名裴氏廣州記曰有石牛毎旱殺牛以血和泥泥石牛背旣畢則雨洗牛背􅅺盡方止顧微廣州記曰陽縣里民有一児年十五六牧牛牛忽䑛此児隨所䑛處肉悉白浄而甚快遂聽牛日日䑛之兒俄而病死其家葬児殺此牛以供賔客凡食此牛肉者男女二十餘人悉變爲虎笁法眞登羅山䟽曰増成縣南有烈清洲洲南又有牛潭漁人見金牛常出水盤石上義熈中縣民張安釣此潭於石上躡得金鏁大如指長數十㝷㝷之不巳俄有物從水中引之力不能禁以刀斫斷唯得數尺遂致大冨後義興周靈分亦好釣嘗見此牛寢伏石上旁有金鎻徃掩之得二丈許遂以財雄爲南江都尉祖台之志恠曰苟晞爲兖州鎮去京師五百里有貢晞珍異食者欲貽都邑親貴慮經信􅀫之間不復鮮羙募有牛能日行數百里者當厚賞之有人進一牛云此一日行千里晞乃命具丁車善馭書䟽發遣旦發日中到京師取荅書還至一更始竟便達晞以其駿快䈥骨必將有異遂殺而觀之亦無靈異唯見􅀟䈥如小竹大自頭挾脊着肉裏故外不􅁴也又曰陶太尉微時喪當葬家貧親自營作塼有一班牸牛載塼致忽然失去便自尋覔忽於道中逢一老翁問云君欲何所覓太尉具荅更舉手指云向於山崗上見一牛眠山圩中必是君牛此牛所眠處便好作墓安墳當之致之極貴小復不當位極人臣丗爲方嶽矣又指一山云此山亦好但不如向耳亦當丗出刺史也言訖便不復見太尉墓之皆如其言劉敬叔異􅁐曰余以義熈十三年爲長沙景王驃􅀐叅軍在西州得一黄牛時將貨之便晝夜銜草不食流淚瘦􅇤又曰即墨有古冡或發之有金牛塞埏門不可移動犯之則㫬也異物志曰合浦牛如橐駞案項上有特骨大如覆斗足揵疾其行如馬日行三百里列仙傳曰陽都女者市上酤酒家女也生而眉連耳細而長衆以爲異皆言此天人也㑹犢子牽一黄犢來過都女恱之遂留相奉侍都女隨犢子出取桃一􅀫而反郭季産集異記曰兖州人舡行忽見水上有浮鎻牽取得數十許丈乃得一白牛與常牛無異而形甚光鮮可愛人知是神物乃放之牛於是入水鎻亦隨去于寳搜神記曰晉大興元年武陽太守王諒牛生子一頭八足兩尾而共一腹又曰武都故道有祠􅁟生梓樹焉􅁗文公二十七年使人伐之樹創隨合經日不斷文公乃益發卒持斧者四十人猶不斷疲還息其一人傷足不能去卧樹下聞􅀑相與言勞乎攻戰其一人曰何足爲勞又曰􅁗公必將不休如之何荅曰􅁗公其如子何又曰赭衣􅁅坌子如之何黙然無言卧者以告於是令工皆衣赭隨斫創坌以􅁅樹斷化爲牛使􅀐擊之不勝或墮於地髻解􅀍髮牛畏之乃入水不敢出故􅁗自是置旄頭􅀐劉義慶幽明録曰巴丘縣金崗以上丗里名黄金瀬古有釣於潭獲一金鎻引之滿一舩金牛出聲貌奔壯奮躍還潭鎻乆乃盡釣人刀斫得數尺故潭瀬取名又曰桓玄時牛大疫有一人食死牛肉因得病亡復生云􅀄死時見一人執籙將至天上有一貴人問云此人何罪對曰此人坐食疫死牛肉貴人云今須牛以轉輸肉以充百姓何故復殺之催遣還又曰桓玄在南郡國第居時出詣殷荆州於鵠穴逢一老公駈青牛形色怪異桓即以所乗馬易牛乗至零陵駚非常因思息駕飲牛牛逕入水不出桓遣人覘守經日絶跡也又曰元嘉中益州刺史吉翰遷爲南徐州先於蜀中載一青牛每常自乗􅁪於目前養視翰遘疾多日牛亦不肯食及亡牛流涕滂沱􅁻氏喪未還都先遣駈牛向宅牛不肯行知其異即待䘮喪旣下舡便隨去又曰桓沖鎮江陵正會夕當烹牛牛忽孰視帳下都督甚乆目中泣下都督呪之曰汝若能向我跪者當啓活也牛應聲而拜衆甚異之都督復謂曰汝若須活遍拜衆人者直徃牛涕殞如雨遂拜不止值沖醉不得啓遂殺牛沖醉止得啓沖聞之歎息都督痛加鞭罰又曰護軍琅邪王華有一牛甚快常乗之齒巳長華後夢牛語之曰衰老不復堪苦載載二人尚可過此必死華謂偶尓夢與三人同載還府此牛果死神仙傳曰呉有徐隨居丹徒左慈過隨門下有􅀫客六七欺慈云徐公不在慈去客皆見牛在楊樹杪車轂中皆生荆木長一二丈客懼入報隨隨曰此左公也遣追之客乃逐慈叩頭陳謝客還見牛故在弋轂中亦無復荆木也郭養恭廣志曰麒牛似鹿又似牛肉羙皮温常處滇濵也滇音顛宣驗記云天笁有僧養一牸牛日得三􅂛乳有一人乞乳牛曰我前身爲奴偷法食今生以乳饋之所給有限不可分外得也嶺表録異曰自瓊至振多溪澗澗中有石鱗次水流其間或相去三二尺近似天設可躡之而過或有乗牛過者牛皆促歛四蹄跳躍而過或失則隨流而下見者皆以爲􅀏彼人喭曰跳石牛骨碌好􅀏又好哭又曰瓊州不産驢馬人多􅀐黄牛亦飾以鞍韀加之銜勒可􅀐者即自小習其歩驟亦甚有穩快者太平御覽卷第九百
