front:
  text: 太平御覽卷第二百四
  hash: sha256:99ab51fa8ca8e8db71b1197eff0431344964b47d75055a338ead26fd74ef1652
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_204-1a}
body:
  text: 職官部二丞相上尚書曰成湯居亳初置二相以伊尹仲虺爲之又君奭曰我聞在昔成湯旣受命則有伊尹格于皇天又說命曰髙宗夢得說使百工營求諸野說築傳巖之野爰立作相置諸左右命之曰若金用汝作礪若濟巨川用汝作舟楫若歳大旱用汝作霖􅀨啓乃心沃朕心若藥不瞑􅅭厥疾弗瘳韓詩外傳曰田饒事魯哀公而不見察田饒謂哀公曰臣將去君黃鵠舉矣哀公曰何謂也饒曰君獨不見雞乎雖有五德君猶曰滿而食之者何以其所從來者近也夫黃鵠一舉千里止君園池食君魚鼈啄君忝梁無此五德猶貴之以其所從來者逺也臣將去君黃鵠舉矣哀公曰止吾將書子之言也饒曰臣聞食其食者不毀其器䕃其樹者不折其枝有臣不用何書其言遂去之燕燕用爲相三年燕政大治哀公喟然太息爲之避寢左傳曰仲虺居薛爲湯左相又曰齊桓公置射鈎而使管仲相國語曰季文子相宣公成公無衣帛之妾無食粟之馬仲孫他諌曰子爲魯上卿相二君矣妾無衣帛馬不食粟人其以子爲愛且不華國乎文子曰吾亦願之然吾觀國人其父兄之食麤衣惡而我羙妾與馬無乃非相人乎且吾聞之以徳榮爲華不聞以妾與馬文子以告孟獻子獻子囚之七日自是子服之妾衣不過七􅂛之布馬餼不過稂莠餼米也稂童粮史記曰黃帝得六相而天地治神明至黃帝得􅃖尤而明天道得太常而察地利得奢龍而辨東方得祝融而辨南方得風后而辨西方得后土而辨北方謂之六相又曰堯舉八凱倉舒隤敳檮戭大臨尨降庭堅仲容叔逹爲八凱即垂益禹臯陶之倫也庭堅即臯陶字也使主后土后土地官也以揆百事莫不時叙地平天成揆度成亦平也舉八元伯􅁬仲堪叔獻季仲伯虎仲熊叔豹季狸爲八元也使布五敎于四方内平外成内諸夏外夷狄謂之十六相亦曰十六族又曰􅁗悼武王二年始置丞相官樗里疾甘茂爲左右丞相又曰鄭以子産爲相一年竪子不戲狎班白不提挈童子不犁畔二年市不豫賈三年門不夜閇道不拾遺四年田器不歸五年土無尺籍喪期不令而治鄭二十六年而死丁壯號哭老人兒啼子産去我死乎民將安歸又曰公儀休爲魯相客有遺魚者不受客曰聞君嗜魚何故不受相曰以嗜魚故今爲相能自給魚今受而魚誰復給我魚故不受食茹抜其園葵而弃之見布好而出其家婦燔其機云欲令農士工女安其所豈可害其貨乎又曰石奢楚昭王相也堅直廉士無所避行縣道有殺人者相追之乃其父也縱其父還自繫使人言之於王曰殺人者臣之父也夫以父立政不孝也廢法縱罪非忠也臣罪當死王曰追而不及不當伏罪奢曰不􅀻其父非孝也不奉主法非忠也王赦罪上惠也伏誅而死臣職也遂不受令自刎而死又曰五羖大夫之相􅁗也勞不坐乗暑不張蓋行國中不驅車乗不操干戈功名藏於府庫德行施於後丗五羖大夫死國中男女流涕童子不歌謡舂者不相杵又曰秦莊襄王薨太子政立尊吕不韋爲相國號稱仲父又曰二丗亡誅李斯乃拜趙髙爲中丞相事無大小皆決之又曰趙髙爲丞相欲爲亂恐羣臣不聽乃先設驗持鹿獻於二丗曰馬也二丗􅀏曰丞相誤耶謂鹿爲馬問左右或黙或言馬以阿順趙髙或言鹿髙因隂中諸言鹿者以法又曰韋丞相賢者魯人以讀書術爲吏至大鴻臚有相工相之當至丞相有男四人相之至第二子名􅀇成相工曰此子貴當封侯丞相曰我爲丞相有長子是安從得之後賢竟爲丞相病死而長子有罪論不得嗣而立􅀇成又曰魏相者濟隂人以文吏至丞相其人好武令諸吏帶劒前奏事或有不帶劒者當入奏事乃借劒而敢入又曰匡衡爲御史大夫歳餘韋丞相死代爲丞相封樂安侯衡十年之間不岀長安城門至丞相豈非遇時而合也漢書曰陳平陽武人周勃沛人髙帝即位以勃爲右丞相以平爲左丞相帝問勃曰一歳決獄錢榖岀入幾何勃不知汗出浹背上問平平曰有主者上曰主者誰曰决獄責廷尉錢榖責治粟內史上曰君所主何事平曰臣主佐天子理隂陽調四時理万物撫四夷上曰善於是出勃語平曰君獨不早教我乎又曰蕭何沛人陳狶反上自將聞吕后用何計誅韓信拜何相國何病惠帝自臨視何疾因問君百歳後誰可代君對曰知臣莫若主帝曰曹叅何如何曰帝得之矣臣雖死無恨矣又曰曹叅沛人聞蕭何薨告舎人趨治裝吾當入相使者果召叅爲相擇郡國長史訥文辭謹厚者爲丞相史叅日夜飲酒賔客見叅不事事皆欲有言至者叅輙飲以醇酒醉而後去終莫得開說又曰蕭何拜相國益封五千户卒五百人爲衛衆人皆賀邵平獨弔謂何曰禍自此始也何乃讓封悉以家財佐軍上喜又曰張蒼免相文帝以皇后弟竇廣國賢有行欲相之恐天下以吾􅀻廣國乆念不可而髙帝時大臣餘見無可者乃以御史大夫申屠嘉爲丞相嘉爲人廉直門不受􅀻謁時太中大夫鄧通方愛幸賞賜累鉅万文帝常燕飲通家是時嘉入朝而通居上旁有怠慢之禮嘉奏事畢因言曰陛下幸愛其臣則冨貴之至於朝廷之禮不可以不肅朝罷嘉爲檄召通通至詣丞相府免冠徒跣頓首謝嘉嘉坐自如弗爲禮責曰夫朝廷者髙皇帝之朝廷通小臣戲殿上大不敬當斬使吏今行斬之如淳曰嘉語其吏日今便行斬之上度丞相巳困通使使持節召通而謝丞相此吾弄臣君􅇚之又曰公孫􅀪頴川人武帝以􅀪爲丞相掌列侯唯􅀪無爵詔封平津郷侯六百五十户丞相封侯自􅀪始也􅀪食一肉脫粟飯故人賔客仰衣食家無餘財又曰公孫賀字子叔北地人引拜爲丞相不受印綬泣涕曰臣本邊鄙鞍馬􅀐射不任宰相又曰車千秋夲姓田爲髙寢郎訟太子􅁈曰子弄父兵罪當笞天子之子過誤殺人何罪哉臣嘗夢見白頭公教臣言於是上召見千秋千秋體貌甚嚴帝說之曰髙廟神靈使公教我公當遂爲吾輔相數月爲丞相封冨民侯千秋一言寤主旬月至宰相丗未嘗有又曰蔡義河內人詔求能爲韓詩者徴義待詔乆不進見義上䟽曰臣行能無所比容貌不及衆而不弃人倫者竊以聞於先師自託於經術願賜清間之燕盡精思於前上召見說詩恱之擢爲光禄大夫代楊敞爲丞相時年八十餘短小無􅂡眉貌􅀋老嫗行歩傴僂常兩吏扶乃能行又曰邴吉爲丞相寛大好禮讓􅁺史有罪輙予長休吉終無所案驗客或謂吉侯爲漢相姦吏成其􅀻吉曰夫以三公之府有案吏之名吾竊陋焉後人代吉公府不案吏自吉始也吉馭吏􅄝酒數逋蕩嘗從吉出醉嘔丞相車茵上西曹主吏白欲斥之吉曰以醉飽之失去士使此人將復何所容西曹忍之此不過汙丞相茵耳遂不去也又曰王啇字子威涿郡人爲丞相有威重長八尺餘身體鴻大容貌過人河平四年單于來朝引見白虎殿丞相啇坐未央庭中單于前拜謁啇啇起離席與言單于仰視啇貌大畏之遷延却退天子聞而歎曰此眞漢相也又曰邴吉爲丞相常出逢􅃲者死傷横道吉不問又逢人逐牛牛喘息吐舌止駐使􅀐吏問逐牛行幾里吏怪之吉曰人􅃲殺傷長安令亰兆尹所當禁吾備宰相不親小事方春少陽用事未可以􅀬恐牛近行此時氣失節三公典調隂陽職所憂也又曰薛宣爲丞相相府辭訟例不滿萬錢不爲移書後皆遵用薛侯故事然官屬譏其煩碎無大體不稱賢相也又曰韋賢字長孺爲丞相年七十餘乞罷歸賜第丞相致仕自賢始也又曰田蚡爲丞相絀黃老刑名百家之言延文學儒者數百人儒由是興又曰丞相有病皇帝法駕親至問疾及瘳視事則賜以飬牛上尊酒如淳曰律稻米一㪷得酒一㪷爲上尊稷米一㪷得酒一㪷爲中尊粟米一㪷得酒一㪷爲下尊顔師古曰稷即粟也中尊者冝爲􅁰米不當言稷且作酒自有澆淳之異爲上中下耳非必繫於米也又曰有天地大變天下大過皇帝使侍中持節乗四白馬賜上尊酒十斛牛一頭䇿告殃咎使者去半道丞相追上病使者還未白事尚書以丞相不起病聞若丞相不勝任使者䇿書駕駱馬即時布衣歩出府免爲庻人若丞相有他過使者奉䇿書騅騩馬即時歩出府乗棧車牝馬歸田里思過又曰大司空朱􅀶奏曰帝王之道不必相襲髙帝置御史大夫次丞相典政度以職相叅歷載二百天下安寕今更大司空與丞相同故事選中二千石爲御史大夫任職者爲丞相位次有叙所以尊聖德重國相也今中二千石未更御史而爲丞相非所以重國政也臣願罷大司空以御史大夫爲百僚師哀帝從之又曰相國丞相皆􅁗官金印紫綬掌承天子􅂇理萬機􅁗有左右丞相髙帝更名相國蕭何曹叅並爲之哀帝更名大司徒後漢書曰李通自爲宰相謝病不視事連年乞骸骨帝每優寵之令以公位歸第養疾漢舊儀曰丞相車兩黒轓􅀐者戈絳􅁺史見禮如師白録不拜朝示不臣也聽事閤曰黃閤無鍾鈴漢雜事曰田蚡爲丞相中二千石拜謁蚡不爲禮汲黯爲主爵都尉見蚡未嘗拜揖之而巳漢舊儀曰丞相有病皇帝法駕親至問疾薨即移於第中賜棺􅉠葬地葬日公卿以下㑹送應劭漢官曰丞相有疾御史大夫日一問起居百官亦如之魏志曰曹公􅀄平十三年漢罷三公官置丞相御史大夫夏六月以公爲丞相又曰鍾繇字元常魏國􅀄建爲大理遷相國文帝在東宫賜繇五熟釡爲之銘曰於赫有魏作漢藩輔厥相惟鍾寔幹心膂靖恭夙夜匪遑安處百僚師師楷兹度矩蜀志曰諸葛亮率諸軍攻祁山魏明帝使張郃距亮亮使馬謖督諸軍在前馬謖違亮節度爲所破戮謖以謝衆上䟽自貶以右將軍行丞相事呉志曰張昭字子布􅀄孫權當置丞相衆議歸昭權白方今事職冗者貴重非所以優也後孫劭卒百寮復舉昭權曰􅀌豈爲子布愛乎顧丞相事煩而此公性剛所言不從怨咎將至非所以益之又曰顧雍爲丞相孫權常遣中書郎詣雍有所諮訪若合雍意事可施行雍即與相反覆究而論之爲設酒食如有不合雍即正色改容嘿然不言無所施設即退告權權曰顧公歡恱是事合冝也其不言者是意未平也􅀌當重思之其見敬信如此又曰萬彧爲右丞相王蕃啁彧曰魚潜於淵出水吹沬何則物有夲性不可横處非分也彧出自溪谷羊質虎皮虗受光赫之寵跨越三九之位犬馬猶能識飬將何以報厚施乎彧曰唐虞之朝無謬舉之才造父之門無駑蹇之質蕃上誣明選下訕楨幹亦何傷於日月多見其不知量耳又曰顧雍字元歡呉郡人也代孫邵爲丞相平尚書事其所選用文武將吏隨能所任心無適莫時訪逮民間及政職所冝輙密以聞若見納用則歸之於上不用終不宣泄權以此重之又曰歩騭字子山代陸遜爲丞相猶誨育門生手不釋書􅀍服居處有如儒生然門内妻妾服飾奢綺頗以此見譏又曰陸凱遷丞相孫皓性不好人視已羣臣侍見睛莫敢迕凱說皓曰夫君臣無不相識之道若卒有不虞不知所赴皓聽凱自視晉書曰東海王越爲太􅀶問王尼何以獨不拜尼數越事事非宰相是以不拜又曰山濤薨魏舒領司徒有頃即眞舒居位持重爲任職不顯人之矩咸推有宰相望禄賜散之九族家無餘財齊書曰禇淵美儀貌善容止俯仰進退盛有風則每朝會百僚逺國莫不延首目送之宋明帝常歎曰禇淵能遲行緩歩便持此得宰相矣又曰明帝顧命江祐兄弟及始安王遥光尚書令徐孝嗣領軍蕭坦之更曰帖勑時呼爲六貴皆宰相也齊職儀曰相國緑綟綬衮冕服湯以伊尹爲宰相仲虺爲右相髙宗得􅀓說立爲相魏襄王以公孫衍爲相􅀖趙孝成王以廉頗爲相國太平御覽卷第二百四
