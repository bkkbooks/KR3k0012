front:
  text: 太平御覽卷第九十一
  hash: sha256:dcd51dc1151581780376604a42468418d1f35e9a9485ddc228a0d15d114f08f0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_091-1a}
body:
  text: 皇王部十六後漢顯宗孝明皇帝肅宗孝章皇帝穆宗孝和皇帝孝殤皇帝恭宗孝安皇帝少帝北郷侯顯宗孝明皇帝東觀漢記曰孝明皇帝諱陽一名莊丗祖之中子也母光烈皇后􅀄讓尊位爲貴人故帝十二以皇子立爲東海公三歳爵爲王㓜而聦明叡智容貌壯麗丗祖異焉數問以政議應對敏逹謀謨甚􅀷温恭好學敬愛師􅀓所以承事兄弟親宻九族内外周洽世祖愈珎上徳以爲冝承先序建武十七年十月廢郭皇后隂貴人爲皇后以上爲皇太子治尚書備師法兼通九經畧舉大義􅀶觀群書以助術學無所不照中平二年二月丗祖崩皇后太子即位永平二年二月上初臨辟雍行射禮十月上幸辟雍􅀄行養老禮甲子上幸長安祠髙廟遂有事十一陵歴覽館舎邑居舊處㑹郡縣吏勞賜作樂三年十月上與皇太后幸南陽章陵周觀舊廬召見隂鄧故人上在于道所幸見吏勞賜省事畢歩觀行部署不用輦甲夜讀衆書乙夜盡乃寐先五鼔起率常如此五年十月上幸鄴徽趙王㑹鄴賜錢百萬八年十月上臨辟雍養三老五更禮畢上手書赦令尚書僕射待節詔三公十年閠月行幸南陽祠章陵以日至復祠於舊宅禮畢召校官弟子作雅樂奏鹿鳴上自御塤篪和之以娯嘉賔至頃勞饗三老官屬是時天下安平人無徭役歳比登稔百姓殷冨粟斛三十牛􅀍野十三年二月上耕籍田畢賜觀者食有一諸生前舉手曰善哉文王之遇太公也上書板曰生非大公子亦非文王也十五年二月東巡狩三月幸孔子宅祠孔子及七十子御講堂命太子諸王􅀃經幸東平王宫上憐廣陵侯兄弟賜以􅡘御之物又聖皇子輿馬悉賦予之十七年春甘露仍降樹枝内附芝生前殿神雀五色翔集京師是夜上夢見先帝太后夢中喜覺因悲不能寐明旦上陵百官胡客悉㑹太常丞上言陵樹華有甘露上令百官採甘露受賜畢罷上從席前伏御牀視太后鏡奩音廉中物流涕勑昜奩中脂澤粧具自帝即位尊奉建武之政有加而無損􅀄世祖閔傷前世權臣太盛外戚豫政漢家中興唯宣帝取法至於建武朝無權臣外族隂郭之家不過九卿親屬勢位不能及許史王氏之半至永平后妃外家貴者裁家一之備列將校尉在兵馬官充奉􅀫衛闔門而巳無封侯豫朝政者自皇子之封皆減舊制諸王皆當略與楚淮陽相比什減三四曰我子不當與先帝子等又國逺而小於王善節約謙儉如此八月帝崩于東宫前殿在位十八年時年四十八謚曰孝明皇帝葬顯節陵十二月有司奏上尊號曰顯宗廟與世宗廟同日而祠祫􅀕於世祖之堂共進武徳之舞如孝文皇帝祫􅀕髙廟故事孝明皇帝尤垂意於經學即位刪定擬議稽合圗䜟封師太常桓榮爲関内侯親自制作五行章句毎饗射禮畢正坐自講諸儒並聽四方欣欣是時學者尤盛冠帶搢紳逰辟雍而觀化者以億計又曰建武四年五月甲申皇子陽生豐下銳上顔赤色有似於堯上曰赤色名之曰陽至十三年通春秋上循其頭曰呉季子陽對曰愚戇無比及阿乳母以問師􅀓曰少推誠對師􅀓無以易其辭華嶠後漢書明帝性􅄶察甞以事怒郎樂崧以杖撞崧崧走入牀下上怒甚疾言曰郎出郎出崧曰天子穆穆諸侯皇皇未聞人君自起撞郎上乃赦之又曰世祖旣以吏事自嬰帝􅀹任文法㹅攬威柄權不借下值天下􅀄定四民樂業户口衣食滋植斷獄號居前世之十二中興巳來追蹤宣帝夫以鍾離意之廉法諌諍懇切以寛和爲首以此推之斯亦難以德言者也薛瑩漢記賛曰明帝自在儲宫而聽允之徳著矣及臨萬機約身率禮恭奉遺業一以貫之雖夏啓周成繼體持統無以加焉是以海内乂安四夷賔服斷獄希少有治平之風號曰顯宗不亦宜乎潜夫論曰明帝時公車以反支日不受章奏帝聞而恠曰民廢農逺來詣闕而復拘以禁忌豈爲政之意乎於是遂蠲其制後漢書曰明帝遵奉建武制度無違者後宫之家不得封侯與政舘陶公主光武之女爲子求郎不許而賜錢千萬謂群臣曰郎官上應列􅀫出宰百里非其人則人受其殃是以難之故吏稱其官民安其業逺近肅服户口滋殖焉後漢書曰帝善刑理法令分明日晏坐朝幽枉必逹外内無倖曲之􅀻在上無矜大之色斷獄得情號居前世之十二故後之言事者莫不先建武永平之政然而鍾離意宋均之徒常以察慧爲言夫豈􅀪人之度未優乎肅宗孝章皇帝東觀漢記曰孝章皇帝諱烜孝明皇帝太子永平三年二月以皇子立爲太子年四歳㓜而聦逹才敏多識世事動容進正聖表有異壯而仁明謙恕温慈惠和寛􅁉廣􅀶親愛九族矜嚴方厲威而不猛旣志於學始治尚書遂兼五經周覽古今無所不觀於是上敬重之每事諮焉永平十八年孝明皇帝崩帝即位范曄後漢書曰章帝建􅀄元年詔有司明選舉進柔良退貪猾順時令理􅁈獄又詔以上林池禦田賦與貧人四年詔曰蓋三代遵人教學爲本漢承暴􅁗褒顯儒術建立五經爲置愽士其後學者精進雖曰承師亦別名家孝宣帝以爲去聖乆逺學不猒􅀶故遂立大小夏侯尚書又立京氏易至建武中復置嚴民顔氏春秋大小戴禮愽士此皆所以扶進微學廣道藝也孔子曰愽學而篤志切問而近思仁在其中矣於戯其勉哉於是下太常將大夫愽士議郎郎官及諸儒㑹白虎觀講議五經同異使五官中郎魏應承制問侍中淳于恭奏帝親稱制臨决如孝宣甘露石渠故事作白虎議奏今白虎通也元和二年正月詔曰人有弃子者復勿筭三歳令諸懐姙者賜胎養榖三斛復其夫勿筭一歳著以爲令又詔三公方春生養萬物莩甲冝助萌陽以育時物其令有司罪非殊死勿案驗章和元年八月南廵狩幸梁祠沛髙原廟豐枌榆社二年正月帝崩於章徳前殿在位十二年時年三十一遺詔無起寢廟一如先帝法制葬敬陵廟曰肅宗論曰魏文稱明帝察察章帝長者帝素知人猒明帝苛切事從寛厚除􅃤獄之科著胎養之令奉承明徳太后盡心孝道割裂名都以崇建周親平傜簡賦而人頼其慶又體之以忠貞文之以禮樂藩輔克諧群后徳讓謂之長者不亦冝乎東觀漢記序曰孝乎惟孝友于兄弟聖之至要也乾乾夕惕寅畏皇天帝王之上行也明徳慎罰湯文所務也密静天下容於小大髙宗之極致也肅宗兼兹四徳以繼祖考臣下百僚力誦聖徳紀述明詔不能辯章豈敢空言増廣以累日月之光袁山松後漢書曰孝章皇帝弘􅁉有餘明斷不足閨房䜛惑外戚檀寵惜乎􅀂明章二主損有餘而􅀘不足則古之賢君矣薛瑩漢記賛曰章帝以繼世承平天下無事敬奉神明友于兄弟息省徭賦綏静兆民除苛法蠲禁錮抑有仁賢之風矣是以隂陽恊和而百姓安樂衆瑞並集不可勝載考之圖籍有微云爾帝王世紀曰孝章皇帝以中元三年生於京師其母姓祕不出號其墓日長信冢三輔决録注曰何敞字文髙爲汝南太守章帝南巡過郡有刻鏤屏風爲帝張設詔命侍中黄香銘之曰古典務農雕鏤傷民忠在竭節義在脩身敞懼禮賢命士改脩徳化穆宗孝和皇帝東觀漢記曰孝和皇帝諱肈章帝之中子也母曰梁貴人早薨上自歧嶷至於緫角孝順聦明寛和篤仁孝章猶是􅀷珎之以爲冝承天位年四歳以皇子立爲太子􅀄治尚書遂兼覽書傳好古樂道無所不照章和二年春二月章帝崩太子即位永元三年春正月帝加元服四年六月大將軍竇憲潜圗弒逆幸北宫詔収捕憲黨使謁者収憲大將軍印綬遣憲及弟篤景就國到皆自殺五年正月宗祀五帝於明堂遂登靈臺望雲物大赦天下自京師離宫果園上林廣成囿悉以假貧人恣得収捕不収其稅十二年春正月上日以五經義異書􅀓意殊親幸東觀覽書林閱篇籍朝無寵族政如砥矢惠澤沾濡鴻恩茂篤外憂庶績内勤經藝自左右近臣皆誦詩書徳教在寛仁恕並洽是以􅀺元寜康方國協和真符瑞應八十餘品帝讓而不宣故靡得而記元興元年十二月帝崩于章徳前殿在位十七年時年二十七葬順陵廟曰穆宗東觀漢記序曰穆宗之嗣世正身履道以奉大業賔禮耆艾動式舊典宫無嬪嬙鄭衛之讌囿無槃樂逰畋之豫躬履􅀇徳虚靜自損是以屢獲豐年逺近承風云爾後漢書曰自竇憲誅後帝躬親萬機每有灾異輙延問公卿極言得失舊南海獻龍眼茘枝十里一置五里一堠奔騰險阻死者相繼時臨武長汝南唐羌縣接南海乃上書陳狀帝下詔曰逺國珎羞夲以薦奉宗廟苟有傷害豈愛人之本其勑令太官勿復受獻由是遂省續漢書曰孝和年十四能折外戚驕撗之權即昭帝斃上官之􅀋矣朝政遂一民安職業懃恤夲務苑囿希幸逺夷稽服西域開泰郡國言符瑞八十餘品咸懼虚妄抑而不宣云爾范曄後漢書曰自中興以後逮于永元雖頗有㢮張而俱存不擾是以齊民歳増闢土世廣偏師岀塞則漢北地空都護西指則通驛四方豈其道逺三代術長前世將服叛懐來自有數也孝殤皇帝東觀漢記曰孝殤皇帝諱隆和帝之少子也和帝皇子數十生者輙夭故殤帝養於民元興元年十二月和帝崩是日倉卒殤帝時生百餘日乃立以爲皇太子其夜即位尊皇后鄧氏爲皇太后帝在繦褓太后臨朝延平元年八月帝崩于崇德前殿年二歳葬康陵又曰孝殤繦褓承統寢疾不豫天命早崩國祚中絶社禝無主天下敖然頼皇太后臨朝孔子稱有婦人焉信哉恭宗孝安皇帝東觀漢記曰孝安皇帝諱祐清河孝王弟二子也少聦明敏逹慈仁惠和寛容􅀶愛好樂施予自在邸弟數有神光赤虵嘉應照耀於室内盤紆殿屋牀第之間孝王常異之年十歳善史書嘉經籍和帝甚喜重焉號曰諸生數燕見在禁中特加賞賜下及玩弄之物諸王子莫得與比殤帝即位鄧后臨朝以帝㓜小詔留於清河邸欲爲儲副殤帝崩以王青蓋迎齊中殿中拜爲長安侯乃即帝位謙讓恪懃孜孜經學志在供飬委政長樂宫永􅀄元年十一月上始講尚書躭於典藝二年春正月帝加元服延光四年三月帝崩干葉縣在位十九年時年三十二御車所止飲食百官鼓漏起居車􅀐鹵簿如故及還宫皇后與兄顯中常侍江京樊豐等共興僞詐不欲令群臣知上道崩欲僞道得病遣司徒等分詣郊廟社稷告天請命誣罔靈秖以亡爲存其夕發䘮羣寮百姓如䘮考妣塞外蠻夷致􅀕涕泣葬恭陵范曄後漢書論曰孝安皇帝雖稱尊享御而􅁠歸鄧氏至損徹膳服克念治道然令自房帷威不逮逺始失根統歸成陵弊遂復計金授官移民逃㓂推咎台衡以荅天眚詩云哲婦亦惟家之索矣薜瑩漢書賛曰安帝之􅀄委政太后十有餘年及親萬機佞邪始進閹宦用事寵加􅀻愛阿母王聖勢傾朝􅋝遂樹姦黨摇動儲副山陵未乾蕭牆作難兵交禁省社稷殆危典略曰安帝永􅀄元年以災故免司空尹勤凡以災㓂故輙免三公多以卿爲之或再三退而還復其故桓靈又甚自此始也少帝北郷侯續漢書曰安帝崩太子前廢後無餘子皇后與兄閻顯謀以北郷侯犢爲帝嗣三月立北郷侯皇太后臨朝十月辛亥北郷侯薨顯及江京等徴濟北河間王子欲以爲嗣中黄門孫程王康等十九人共討京等迎立濟隂王皇徳傅曰安帝崩北郷侯即尊位十月北郷侯薨以王禮葬未即帝位不成君故以王禮葬太平御覽卷第九十一
