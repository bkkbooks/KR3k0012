front:
  text: 太平御覽卷第八百五十四飲食部十二
  hash: sha256:a0695becdce112a8ae952492c749d37bf464aee07b8c5ca9825f1bbf6d807739
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_854-1a}
body:
  text: 糟糠糟􅀃文曰糟酒滓也糠榖皮也春秋後語曰張儀􅀃韓惠王曰韓地多阨惡山居五榖所生非菽而麥民之食大板菽飯藿羹一歳不収民不厭食糟糠又曰秦急圍邯鄲邯鄲且欲降􅀓舎吏子李同􅀃平原君曰今邯鄲之民析骨而炊易子而食可謂急矣而君之後宫以百數婢妾􅀍綺縠餘梁􅁏而民􅁦衣不完糟糠不厭君器物鍾鼔自􅀂使秦破趙安得而有此哉後漢書曰明帝姉湖陽公主新寡帝與共論朝臣微􅀚其意主曰宋公威容德器羣臣莫及帝白方且圖之後弘􅀍引見帝令主坐屏風後因謂弘曰諺言貴易交冨易妻人情乎弘曰臣聞貧賤之知不可忘糟糠之妻不下堂帝顧謂主曰事不諧矣華嶠後漢書曰藥崧家貧爲郎無􅀍食糟自此詔給大官食魏志曰李通禽黄巾大師呉覇而降其属遭歳大飢通傾家振施與士分糟糠皆争爲用由是盗不敢犯六韜太公曰古之亂君夏桀殷紂積糟爲丘以酒爲池飲者常三千人糠爾雅曰糠謂之􅆉米皮廣志曰糠謂之䅥通俗文曰碎糠曰䊳牟皮切史記曰呉中大夫應髙􅀃膠西王母曰舐糠及米漢魏春秋曰甄后之誅由郭后之寵及殯令以糠塞口後明帝逼殺郭后使殯如甄后晉書曰王戎子万有美名而太肥戎令食糠而肥愈甚又曰孫綽性通率好譏調甞與習鋻齒共行綽在前頋謂鑿齒曰沙之汰之瓦石在後鑿齒曰􅉫之颺之糠粃在前齊書曰頋歡所居郷中有學舎歡貧無以受業於舎壁後􅀝聽無遺忘者夕則燃松節讀書或然糠自照墨子曰備城皆收藏􅁅糠馬矢又曰人衣短􅄄食糠糟莊子曰播糠脒目則天地四方易位矣韓子曰糟糠不厭者不待梁􅁏而飽短􅄄不完者不湏文繡而好潜夫論曰不命大將以討叛羗州郡稍興兵􅀂排糠障風掏沙壅河抱朴子曰上丗􅀇水結而不寒肴糠絶而不飽劉欣期交州記曰合浦海口有糠頭山傳云越王舂米於此積糠而成太平御覽卷第八百五十四
  hash: sha256:cd46a078dd38e9b7236cc4691b919e06788359d7866b74611a0894a378ce35c0
