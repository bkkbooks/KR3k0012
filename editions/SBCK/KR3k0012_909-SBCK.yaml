front:
  text: 太平御覽卷第九百九
  hash: sha256:6706f1752cfa5a27bdd6e96e77a41190f708672598a8ab920676e80981e1ed57
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_909-1a}
body:
  text: 獸部二十一狼狐狢狼爾雅曰狼牡貛音歡牝狼其子檄吉堯切絶有力迅􅀃文曰狼似犬銳頭而白頰詩曰狼跋其胡載㚄音致其尾疐跲也又曰子之昌􅀆遭我猱之陽􅀆並驅從兩狼􅀆周禮天官獸人曰冬獻狼禮曰狼臅音觸膏又曰君之車厥右虎裘厥左狼裘左傳曰伯石始生子容之母走謁諸姑子容母叔向㛐伯華妻姑叔向母也曰長叔姒生男兄弟之妻相謂姒也姑視之及堂聞其聲而還曰是犲狼之聲也狼子野心非是莫喪羊舌氏矣遂弗視史記大宛傳曰烏孫王昆莫􅀄生弃於野狼徃乳之漢書曰江都王建宫人有過者或放狼令齧殺之建觀而大􅀏爲樂又曰髙祖使太子將兵四皓曰今使太子將兵無異羊將狠也宋書曰王仲德􅀄遇符氏之敗兄叡同起義兵與慕容垂戰敗仲德􅀍重創走與家屬相失路經大澤困未能玄卧林中有一小兒青衣年可七八􅀊􅀐牛行見仲德驚曰巳食未仲德言飢小兒玄湏􅁷復來得飯與之食畢欲行而􅁀雨莫知津逕有一白狼至前仰天而號號訖銜仲德衣因渡水仲德隨後得濟與叡相見後魏書曰匈奴單于生女姿容甚羙國人皆以爲神單于曰吾有此女安可配人將以與天乃於國無人之地築髙臺置二女其上曰請天自迎之經三年其母欲迎之單于曰不可未徹之間復經一年乃有一老狼晝夜守臺下爲穴經時不玄其小女曰吾父處我於此欲與天而今狼來或是神物遂乃就之其姉大驚曰此是畜生無乃辱父母也妹不從下爲狼妻而産子後遂滋繁成國故其民好引聲長歌又似狼嘷又曰􅀄道武避窟咄難遣穆崇還察人心崇單馬與從者微服入其營㑹道武爲㫪妾所識賊皆驚起崇求從者不得因匿坑中徐乃􅀼馬奔走於大澤有白狼向崇號崇覺窹馳馬隨狼走遂免難道武異之命崇立祀子孫丗奉焉後周書四夷傳曰突厥之先匈奴之別種也爲隣國所破其族有一小兒弃草澤中有牝狼以􅁏飼之及長與狼交合遂有孕焉彼王聞此兒尚在重遣殺之使者見狼在側并欲殺狼狼遂逃于髙昌國之北山山有洞穴穴内有平壌荗草周廻數百里四面俱山狼匿其中遂生十男其後各爲一姓阿史郍即其一也又曰突厥旗纛之上施金狼頭侍衛之士皆謂附離夏言亦狼也盖本狼生志不忘本耳唐書曰薛延陁部落嘗有一客乞食於主人者主人引與入帳命妻具饌其妻頋視客乃狼頭人也主人不知􅁴妻告隣人共視之狼頭人巳食主人而去相與逐之至鬱督軍出見二人追者告其故二人曰我是也我即神人薛延陁當滅我來取之追者懼而返走又曰髙宗時有孝子年十二䘮父母以孝聞晝夜􅀒土爲墳又葬曽祖父母經二十載其功始畢有白狼號鳴於墓側詔旌表其門帝王丗紀曰有神牽白狼銜鈎入殷國語曰周穆王將征犬戎􅀕公謀父諌不聽遂征之得四白狼四白鹿以歸自是荒服者不至述異記曰周幽王時牛化爲虎羊化爲狼洛南有避狼城云幽王時群臣爲狼食人故築城避之今洛中有狼村是其處也穆天子傳曰舂山百獸所聚爰有狼材野馬山海經曰盂山有獸多白狼白虎又圗讃曰矯矯白狼有道則遊應符變質乃銜靈鈎淮南萬畢術曰取狼皮以當空户則羊畏不敢出矣毛詩草木蟲魚䟽曰狼能爲小兒啼聲以誘人去數十歩止其猛揵者人不能制雖善用兵者其不能尅也其膏可以煎和其皮可以爲裘狐􅀃文曰狐妖獸也􅀑所乘也有三德其色中和小前大後死則首丘禮檀弓曰君子曰樂樂其所自生禮不忘其夲古之人有言曰狐死正丘首仁也易解卦曰九二田獲三狐得黄矢貞􅁻又曰未濟亨小狐汔濟濡其尾詩國風曰南山崔崔雄狐綏綏又曰有狐綏綏在彼淇梁又曰莫赤匪狐莫黒匪烏漢書曰陳勝呉廣於所次旁藂祠張晏曰次人所止處藂祠􅀑所慿夜篝音構火狐鳴呼曰大楚興陳勝王卒皆夜驚恐旦日卒中往往指目勝廣晉書曰王浚據幽州有狐踞府門躍入㕔事後浚果敗又曰涼武昭王暠子歆爲涼州牧時有狐上南門主簿汜稱曰諺曰野獸入家主人將去狐上南門又狐者胡也天意􅀂曰有胡人居于此城南面而居也後竟爲沮渠蒙遜所滅王隱晉書曰劉丗則女病媚積年韓友令作布囊張着䆫間乃閉户駈逐湏􅁷囊大脹急縳口懸樹間視之唯有二三斤狐毛遂差又曰淳于智濟北人夏侯藻母病因五皷中出詣智卜有一狐當門向之嘷唳藻愁愕遂駞詣智智曰禍甚急君速歸在狐嘷喚處撫心啼坐勿休然後其禍僅可免也藻如之母亦扶病而出家人旣集堂屋五間拉然􅁀崩唐書曰哥舒翰素與禄山思順不恊上每和解禄山謂翰曰我父是胡母是突厥公母是突厥公是胡與公族􅀋頗同何得不相親乎翰應之曰古人云野狐向窟嘷不祥以其忘夲也敢不盡心焉禄山甚怒以爲譏其胡也莊子曰夫豐狐文豹是何罪之有哉其皮爲之災也管子曰代出狐白之皮狐應隂陽之變六月而一見公貴買之代人忘其難得喜其貴價必相率而求之取此物者因令齊載金錢之代谷求狐白皮代王聞之果去其農處山林求狐二十四月不得一狐離皮聞而伐之王即將其士卒服於齊慎子曰廊廟之材非一木之枝狐白之裘非一狐之皮范子曰狐皮出天外穆天子傳曰天子獵於滲澤得白狐玄貉􅀕於河宗山海經曰青丘之國有狐而九尾郭璞注曰丗平則出爲瑞也又曰武都之山有黒水焉其上有玄狐蓬尾蓬蓬其尾也􅀃􅁐日蓬狐文豹書紀年曰宣王時鳥化爲狐夏伯抒子東征獲狐九尾玄中記曰五十􅀊之狐爲淫婦百􅀊狐爲羙女又爲巫神禮斗威儀曰君乗火王政平南海輸以文狐春秋潜潭巴曰白狐至國民利不至下驕恣韓詩外傳曰狐水神也春秋後語曰楚宣王以昭奚恤爲相諸侯畏之王問群臣曰吾聞北方畏昭奚恤亦誠何如江乙對曰虎求百獸而食之得狐狐曰子無噉我天帝令我長百獸子􅀂食我是逆天帝之命子以我爲不信我爲子先行隨我後觀百獸見我能無走乎虎以爲然隨狐而行百獸見之皆走虎不知獸之畏已反以爲畏狐也今王地方五千里帶甲百萬而任之於昭奚恤然北方非畏奚恤其實畏王之甲兵故人臣見畏者君威也君不用則威亡矣趙曄呉越春秋曰禹年三十未娶行塗山恐時暮失辭曰吾之娶也必有應巳矣乃有白狐九尾而造於禹禹曰白者吾服也九尾者王證也於是塗山人歌曰綏綏白狐九尾龎龎成于家室我都彼昌禹乃娶塗山女淮南子曰夫狐之摶雉也必卑體弭毛以待其來也雉見而信之故可得而禽也淮南萬畢術曰犀角置狐穴中狐不歸枹朴子曰玉榮記曰狐及狸狼皆夀八百􅀊滿三百暫變爲人形西京雜記曰廣川王去疾聚其無頼少年遊獵無度國内􅃁墓盡發之甞發欒書􅃁無餘物有一白狐見人驚走左右㦸之不得傷左足於是王夢一丈夫髮眉盡白來謂王曰何故傷吾左足以杖叩王左脚王乃患脚至死不􅏔白虎通曰狐死首丘不忘夲也德至鳥獸則九尾狐見九者子孫繁息也於尾者後當盛也崔豹古今注曰章帝元和二年白狐九尾見信都魏略曰文帝受禪九尾狐見於譙都名山記曰狐者先古之淫婦也其名曰紫紫化而爲婦故其名自稱阿紫伏滔北征記曰皇天塢北古特陶穴晉時有人逐狐入穴行十餘里得書二千卷又曰河冰厚數尺冰始合車馬未過湏狐先行此物善聽水無聲乃過酈善長水經注曰狐性多疑故俗有狐疑之􅀃管輅傳曰夜有一小物如獸手持火以口吹之書生舉刀斫斷腰視之狐也郭璞九尾狐賛曰青丘竒獸九尾之狐有道祥見出則衘書作瑞於周以摽靈符劉敬叔異􅁐曰有胡道洽者自云廣陵人好音樂醫術之事體有臊氣恒以名香自防唯忌猛犬自審死日誡弟子曰氣絶便殯勿令狗見我尸也死於山陽歛畢􅁴棺空即開看不見尸體時人咸謂狐也搜神記曰酒泉郡毎太守到官無幾輙卒死後渤海陳斐使此郡斐行卜卜者曰逺諸侯放伯永能解此則無憂斐旣到官侍有張醫有王侯卒有史侯斐恒逺之夜半有上斐􅀍者斐便以􅀍置取之物跳踉音郎訇訇作聲乃言曰我無惡意當深報府君府君曰汝爲何魅曰我夲百年狐今爲魅垂當神聽一放我我字伯永府君有急難呼我斐乃喜便放之忽然有赤光如電後毎事先以語斐於酒泉境界無毫毛之姧咸曰聖君月餘主簿李音私通斐侍婢旣而驚懼遽爲伯永所白遽與諸僕謀殺斐伺旁無人便伏人欲格殺之裴即呼伯永有如曳疋綘諸僕伏地失䰟乃以次􅅞取皆伏即殺音等伯永乃辝謝斐曰未及白姧乃爲府君所召猶用慙又曰燕昭王墓有老狐化男子詣張華講􅀃華恠之謂雷孔章曰今有男子少羙髙論孔章曰當是老精聞燕昭王墓有華表柱向千年可取照之當見如言化爲狐又曰有一書生呉中皓首稱胡􅀶士教授諸生忽復不見九月九日士人相與登山遊觀聞講書聲命僕尋之見空􅃁中群狐羅列見人即走老狐獨不去是皓首書生續搜神記曰襄陽習鑿齒爲荆州主簿從桓武帝出獵時大雪於江陵城西見草上雪氣岀伺視見一黄物射之應箭死徃取乃一老雄狐脚上帶綘綾香囊又曰呉郡頋旃獵至一崗忽聞人語聲云咄咄今年衰乃與衆㝷覔崗項有一穽是古時􅃁見一老狐蹲􅃁中前有一卷簿書老狐對書屈指有所計校放犬咋殺之取視口中無復齒頭毛皆白簿書悉是姧愛人女名巳經姧者朱鈎頭所䟽名有百數旃女正在簿次金樓子曰狐白之裘天子􅀍之而在廟堂爲狐計者不􅀂走於平澤狢􅀃文曰狢似狐善睡周禮考工記曰狢踰汶則死土氣然也爾雅曰狢子狟穆天子傳曰天子獵於滲澤得玄狢以􅀕河宗後秦記曰姚襄遣參軍薛瓉使桓温温以胡戲瓉瓉曰在北曰狐在南曰狢何所問也太平御覽卷第九百九
