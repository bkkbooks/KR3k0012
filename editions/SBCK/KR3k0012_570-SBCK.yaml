body:
  text: 樂部八歌一釋名曰人聲曰歌歌柯也以聲吟詠有上下如草木有柯葉充言歌聲如柯也爾雅曰徒歌謂之謡尚書曰帝庸作歌曰勑天之命惟時惟幾用庶尹允諧故作歌以戒之安不忘危也勑正也奉天命以臨人惟在順時惟在慎微也乃歌曰股肱喜哉元首起哉百工熈哉元首君也股肱之臣喜樂盡忠君之理功乃起百王之業乃􅆳載歌曰元首明哉股肱良哉庶事康哉賡續載成也帝歌歸美股肱乃安以成其美又歌曰元首叢脞哉股肱惰哉萬事隳哉􅓜脞細碎無大畧曰君如此則臣懈萬事隳廢其功不成歌以申成也脞音倉果反又曰九功惟序九序惟歌六府三事之功次序皆可歌樂乃德政之致也勸之以九歌俾勿壞六府三事之功次壞在此三者而巳又曰禹曰於帝念哉德惟善政政在養民水火金木􅁟榖惟脩正德利用厚生惟和九功惟叙九叙惟歌又曰詩言志歌永言聲依永律和聲又五子之歌曰太康尸位以逸豫畋於有洛之表十旬不反厥弟五人御其母于洛之汭五子咸怨述大禹之戒以作歌其一曰怨豈在明不見是圖爲人上者柰何不敬其二曰内作色荒外作禽荒甘酒􅄝音峻宇雕墻有一于此未或弗亡其三曰惟彼陶唐有此兾方今失厥道乱其紀綱乃厎滅亡其四曰明明我祖萬􅀖之君有典有則貽厥子孫荒墜厥緒覆宗絶祀其五曰嗚呼􅂚歸予懷之悲萬姓仇予予將疇依􅊊陶乎予心顔厚有忸怩弗慎厥德雖悔可追毛詩曰情動於中而形於言言之不足故嗟歎之嗟歎之不足故永歌之永歌之不足故不知手之舞之足之蹈之也又􅁑屨園有桃曰心之憂矣我歌且謡又谷風四月曰君子作歌唯以告哀禮記曰子貢問師乙曰賜也聞聲歌各有冝也如賜者冝何歌也師乙曰乙賤工也何足以問其所冝請誦其所聞而吾子自執焉寛而静柔而正者冝歌頌廣大而静䟽逹而信者冝歌大雅恭儉而好禮者冝歌小雅正直而静㢘而謙者冝歌風肆直而慈愛者冝歌啇温良而能斷者冝歌齊夫歌者直巳而陳德也動巳而天地應焉四時和焉星辰理焉萬物育焉故啇者五帝之遺聲也啇人識之故謂之啇齊者三代之遺聲也齊人識之故謂之齊明乎啇之音者臨事而屢斷明乎齊之音者見利而能讓臨事而屢斷勇也見利而能讓義也有勇有義非歌孰能保此故歌者上如抗下如隊曲如折止如槁木倨中矩句中鈎纍纍乎端如貫珠故歌之爲言也長言之也􅀃之故言之言之不足故長言之長言之不足故嗟歎之嗟歎之不足故不知手之舞之足之蹈之也又檀弓曰原壤之母死登木歌曰狸首之班然執女手之卷然又樂記曰昔者舜作五絃之琴以歌南風又檀弓上曰孔子蚤作􅀒手曳杖逍遥於門歌曰太山其頽乎梁木其壞乎哲人其萎乎又曰魯人有朝祥而暮歌者子路􅀏之又曰歌者在上匏竹在下貴人聲也又曰奠酬而工􅂛歌發德音也歌者在上匏竹在下貴人聲也周禮春秋太師大􅀕祀師瞽登歌小師掌教絃歌教謂教瞽朦出音絃謂琴瑟歌依詠詩也左傳哀二十一年八月公乃齊侯邾子盟齊人責稽首因歌之曰魯人之臯數年不覺使我髙蹈言魯人臯緩數年不知荅斉稽首故使我髙蹈來爲此㑹唯其儒書以爲二國憂又曰昭十三年南蒯將適費飲郷人酒郷人或歌之曰我有圃生之􅂎乎從我者子乎去我者鄙乎倍其鄰者耻乎巳乎巳乎非吾黨之士乎巳乎巳乎言自遂不改又曰哀五年秋齊景公卒冬十月公子嘉公子駒公子黔奔衛公子鉏公子陽生來奔皆景公子在萊者萊人歌之景公死乎不與埋三軍之事乎不與謀師乎師乎何黨之乎又曰襄四年崔子稱疾不視事公問崔子遂從姜氏入于室公拊楹而歌歌以命姜氏論語曰夫子與人歌而善必使反之而後和之又曰楚狂接輿歌而過孔子曰鳯兮鳯兮何德之衰徃者不可諌來者猶可追巳而巳而今之從政者殆而又曰子於是日哭則不歌史記曰古詩三千餘篇孔子曰其重句施於禮上採契后稷中述殷周之盛至幽厲之缺始於祍席故曰閞睢以爲風之始鹿鳴爲小雅始文王爲大雅始清庿爲頌始三百五篇皆絃歌之以求合韶武雅頌之音禮樂自此可得而述又曰漢家常以正月上辛祠太一甘泉夜到明忽有流星至於祠壇上使童男女七十人俱歌又得神馬渥洼水中爲太一歌曰太一貺兮天馬下治沾赤汗兮洙流赭今安疋兮龍爲友後伐大宛得千里馬蒲桃爲歌曰天馬來兮從西極經萬里兮歸有德承靈威兮降外國渉流沙兮四夷服又曰箕子朝周過故殷墟咸生禾􅁰箕子傷之欲哭則不可欲泣爲近婦人乃作麥秀之詩以歌詠之曰麥秀漸漸兮禾􅁰油油彼狡童兮不我好仇所狡童者紂也民爲流涕又曰淳于髠見梁惠王王屏左右見之終無言王讓之髠曰王志在音吾是以黙也王曰㑹有獻歌者未及言之也又曰趙武靈王夢見處女鼓琴而歌曰美人焭兮顔若舜華若苕之榮命兮曽無我羸且曰王飲酒樂數言所夢想見其狀吴廣聞之内其女姓嬴孟姚也甚有寵立爲后又曰文王克殷伯夷叔齊恥之不食周粟隠首陽山作歌日登彼西山兮言采其薇矣以亂易􅁀兮不知其非神農虞夏忽焉没兮我適安歸又曰項羽軍壁垓下兵食少盡軍四面皆楚歌應邵曰楚歌者鷄鳴時歌也項王乃歌曰漢巳皆得楚乎是何楚人之多項王乃悲歌忼愾曰力拔山兮氣盖丗時不利兮騅不逝騅不逝兮可柰何虞兮虞兮柰􅀂何漢書曰李延年善歌武帝幸之時人語曰一雌復一雄􅀟飛入紫宫又曰孝惠帝所教歌兒百二十人有鈌輙􅀘又曰田横齊王建之親族也秦滅六國田氏悉爲庶人髙祖遣韓信破齊後定天下田横乃與五百人深居海島髙祖即位遣使者徴之横與將士俱至尸郷亭頓止横乃奮躍自刎而死從者不敢哭遂歌以􅀉之今之挽歌起於此矣又曰張釋之爲中郎將從行至霸俊是時慎夫人從上指視慎夫人新豊道曰此是邯鄲道也使慎夫人鼓瑟上自􅀝瑟而歌又班固頌論功歌詩靈芝歌曰因露寐兮産靈芝象三德兮瑞應圖延壽命兮光此都縁上帝兮象太微叅日月兮揚光輝又曰武帝幸雍祠五畤􅀗白麟作白麟之歌又曰上幸行河東祠后土頋視帝京忻然中流歌曰秋風起兮白雲飛草木黄落兮鴈南歸蘭有秀才兮菊有芳懷佳人兮不能忘汎樓舡兮濟汾河横中流兮􅀭素波蕭鼓鳴兮發擢歌忻樂極兮哀情多少壯幾時兮柰老何又曰孝武南廵狩至于盛唐尋陽浮江親射蛟江中􅀗之舳艫千里薄樅陽而出作盛唐樅陽之歌又曰髙帝崩皇大后迺令戚夫人髠鉗衣赭春春且歌曰子爲王母爲虜終日舂薄暮常與死爲伍相離三千里當使誰告汝太后聞之大怒曰乃欲􅀝汝子耶遂鴆殺趙王斷戚夫人手足去眼熏耳名曰人􅇾又曰漢以江都王女昭君妻烏孫悲愁自作歌曰吾家嫁我兮天一方逺託絶國兮烏孫王穹廬爲室兮氊爲牆以肉爲食兮酪爲漿居常悲思兮内感傷願爲黄鵠兮歸故郷又曰燕王旦謀反事敗王憂懣置酒方載宮㑹賔客群臣妾坐飲王自歌曰歸空城兮狗不吠鷄不鳴横術何廣兮固知中國之無人華容夫人起舞歌曰髮紛紛兮不暇梳骨籍籍兮枕丘􅇕母求子兮妻求夫俳佪兩渠問兮君子獨安居又廣陵王胥祝詛事發覺有司按驗有實使者反及置酒顯陽殿召太子覇及子女董訾胡生等夜飲使所幸八子郭昭君家人子趙左君等王自歌曰空乆生􅀆無終長不樂兮安窮奉天期兮不得湏􅁷千里馬兮駐待路黄泉下兮幽深人生要死兮何爲苦心可用爲樂心所喜出入無悰爲樂亟蒿里召兮郭門閱死不得取代庸身自逝又曰元帝自度曲􅀍歌注云聲終更授其次曰度曲度曲未終雲起雪飛是也謝承後漢書曰􅀕遵爲將取士皆用儒術對酒設樂必雅歌􅄬壷東觀漢記曰朱酺明帝時爲益州刺史移書屬郡喻以聖德白狼王等百餘國重譯來庭歌詩三章酺獻之後魏書曰鄭道昭字僖伯兼中書侍郎從征河北髙祖饗侍臣於懸匏於大竹堂道昭兄懿俱侍坐樂作酒酣髙祖乃歌曰日月光天兮無不曜江左一隅兮獨未照彭城王勰續歌曰願從聖王兮登衡㑹萬國馳誠兮混日外鄭懿歌曰雲雷大振兮天地闢率􅁟來賔兮一正暦邢巒歌曰舜舞干戈兮天下歸文德逺􅀍兮莫不思道昭歌曰皇風一鼓兮九地匝戴日依天兮清六合髙祖又歌曰遵彼汝墳兮昔化貞未若今日􅀆道風明宋弁歌曰文王政教兮暉江沼寕知大化􅀆光四表吴書曰留賛􅀄爲將臨敵必先􅀍髮叫天因抗音而歌左右應之乃進戰晉書曰三月上巳日㑹稽夏統字仲御入洛陽市藥太尉賈充問曰卿能􅁟地曲乎統曰百姓懷君恩作慕歌爲孝女曹娥作河女之章爲伍子胥作小海唱今欲之充曰善乃以足扣舷舡引聲囀喉清激慷􅁣大風應至含水激天雲雨響集充曰聽慕歌之聲便髣髴見大禹之容聞河女之音不覺涕泣交下即謂伯􅁎髙行在目前聆小海之唱謂子胥屈平立吾之左右又曰􅀽山松善音樂舊歌有行路難曲詞頗踈質山松乃文其辭句婉其節制因酣歌之聞者流涕又曰應􅉟督南平天門武陵三郡事時政令不一諸蠻怨望並謀背叛􅉟召蠻酋破銅劵與盟由是懷􅉟數郡無虞其後天下大亂􅉟境獨全百姓歌之曰乱離旣普殆爲􅁅朽僥倖之運賴兹應后歳寒不彫􅀌境獨守拯我塗炭恵隆丘阜潤同江海恩猶父母又曰山簡慠誕好酒甞止襄陽習公池日晚醉歸自歌曰山公時一醉遥造髙陽池日暮倒載歸酩酊無所知時復能􅀐馬倒着白接籬舉頭問􅁑強何如并州兒晉陽秋曰髙祖伐公孫淵過夲縣賜牛酒􅂖帛郡守典農㑹暮次父老故舊讌飲髙祖作歌曰天地開闢日月重光今遭際㑹奉辭遐方將掃逋穢還過故郷肅清萬里㧾齊八荒告成歸老待罪舞陽鄧粲晉紀曰太子洗馬郭訥字敬言甞入洛觀伎人歌言佳石崇問其曲訥不知崇􅀏卿不識曲郍得言佳訥荅譬如見西施何必識其姓名然後知美崇無以難崔鴻十六國春秋曰􅀄符堅二十五年滅慕容冲姉清河公主年十四有姝色堅納之寵冠後庭冲時年十二亦有龍陽之美堅又幸之姉弟專寵宫人莫進長安中歌之曰一雌與一雄􅀟飛入紫宫咸懼爲亂王猛切諌乃出冲冲卒爲堅賊又前燕録日慕容廆父渉歸分户以封長庶子吐谷渾分馬以給之及廆嗣位而二部馬闘廆怒遣使讓渾曰先公分建有別柰何不相逺離而令馬有闘傷渾曰馬飲食水草闘其常性何故怒及於人兄弟至親而闘起於馬當去汝萬里於是遂西移八十里廆後悔之遣乙那樓追渾謝之乃擁廻渾馬馬東行數百歩輙悲嗚西奔衝突山谷如是者十餘日此非人事遂附隂山靣黄河晉永嘉之亂南遷隴右廆以孔懷之思作吐谷渾阿于歌歳暮窮思常歌之及儁垂僣號以爲輦後大曲孟嘉別傳桓温問嘉曰聽􅇊􅁝不如竹竹不如肉何謂也荅曰漸近自然一坐咨嗟晉書曰孝武太元中琅邪王軻之家有􅀑歌子夜殷允爲章郡僑人􅁃僧度家亦有􅀑歌子夜殷允爲章郡亦是太元乎則子夜是此時以前人也齊書曰蕭惠基解音律尤好魏三祖曲及相和歌每奏輙賞恱不能巳也梁書曰羊侃有妓孫荆玉能反􅆎怗地衘得席上玉簮􅀄賚歌人王娥兒東宫亦賚歌者屈偶之並妙盡竒曲一時無對唐書曰劉禹錫泛朗州司馬鑾俗好巫每􅁋祠鼓舞必歌俚辭禹􅃬或從事於其間乃依騷人之作爲新辭以教巫祝故武陵谿洞間夷歌率多禹錫之辭也又曰開元中歌工長孫元忠元忠之祖受於侯將軍貴昌并州人也亦代習北歌貞觀中有詔令貴昌以其聲教樂府元忠之家代相傳習如此雖譯者亦不能通知其辭盖年歳乆逺失其真矣􅁝桐唯琴曲有胡笳聲五百七十卷終
