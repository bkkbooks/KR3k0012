front:
  text: 太平御覽卷第一百五
  hash: sha256:4ab85c3dc8e6d01af9b8b06efb14ae2e49632426dd9642882eff8845bf648f90
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_105-1a}
body:
  text: 皇王部三十後周太祖文皇帝孝閔皇帝明皇帝武皇帝宣皇帝静皇帝後周太祖文皇帝周書曰太祖文皇帝姓宇文氏諱㤗字黑􅆩代郡武川人其先出自炎帝炎帝爲黄帝所滅子孫遁居朔野有葛烏兎者雄武多筭略鮮卑慕之奉以爲主遂揔十二部落丗爲大人其後裔孫曰普回因狩得王璽三紐有文曰皇帝璽普回異之以爲天授其俗謂天子曰宇文因號宇文國并以爲氏焉太祖徳皇帝之少子也母曰王氏􅀄孕五月夜夢抱子昇天􅂊不至而止寤而吿德皇帝德皇帝喜曰雖不至天貴亦極矣魏孝昌二年燕州亂太宗始以統軍從尓朱榮征之先是北海王顥奔梁梁人立爲魏王令率兵入洛魏孝莊帝出居河内以避之榮遣賀抜岳討顥仍迎孝莊帝太祖與岳有舊乃以別將從岳及孝莊帝反正以功封寜都子邑三百户遷鎭逺將軍歩兵校尉万俟上音墨下音其醜奴作亂􅀜右孝莊帝遣􅈛朱天光及岳等討之太祖遂從岳入􅀜先鋒破魏行臺尉遟菩薩等及平醜奴定隴右太祖功居多遷征西將軍金紫光禄大夫増邑三百户加直閤將軍行原州事太常元年岳以太祖爲左丞領岳府司馬加散􅀐常侍事無巨細皆委决焉表太祖爲持節衛將軍夏州刺史魏永熙三年正月岳與侯莫陳恱討曹泥二月岳爲悅所害四月太祖率輕􅀐臨恱軍恱大懼太祖統兵􅁬擊大破之悅遁走追及斬之魏帝遣著作郎姚㓜瑜持節勞軍進太祖侍中驃􅀐大將軍開府儀同三司􅀜西大都督洛陽縣公承制封拜使持節如故七月丁未從帝洛陽率輕􅀐入􅀜太祖備儀衛奉迎謁見東陽驛八月齊神武襲䧟潼關侵華隂太祖率諸軍屯霸上以待之齊神武留其將薛瑾守􅀜而退太祖乃進軍襲瑾虜其卒七千還長安進位丞相冬十月齊神武推魏清河王亶子善見爲主徙都於鄴是爲東魏閏十二月魏孝武帝崩太祖立魏南陽王寳炬爲嗣是爲文皇帝大統十七年春三月魏文帝崩皇太子嗣位太祖以􅃁宰㹅百揆三年魏帝有怨言魏臨淮王育廣平王賛等垂泣諌之帝不聽於是太祖與公卿定議廢帝立齊王廓是爲恭帝元年夏四月帝大饗群臣魏史栁虬執簡書􅁻於朝曰廢帝文皇帝之嗣子年七􅀊文帝託於安定公曰是子也才由于公不才亦由于公公冝勉之公旣受兹重􅀉居元輔之任又納女爲皇后遂不能訓誨有成致令廢黜􅀒文皇帝付嘱之意此咎非安定公而誰太祖乃令太常盧辯作誥諭公卿曰嗚呼我羣后曁衆士維文皇帝以襁褓之嗣託於予訓之誨之庶厥有成而予岡能弗變厥心庸曁乎廢墜我文皇帝之志嗚呼兹咎予其焉避子實知之矧爾衆人之心哉惟予之顔豈惟今厚將恐來丗以子爲口實乙亥魏帝詔封太祖子邕爲輔城公憲爲安城公邑各二千户三年九月太祖有疾還至雲陽命中山公護受遺輔嗣子冬十月乙亥崩於雲陽宫還長安發喪時年五十二葬于成陵謚曰文公孝閔帝受禪追尊爲文王廟曰太祖武成元年追爲文皇帝孝閔皇帝後周書曰孝閔皇帝諱覺字陁羅足太祖第三子也母曰元皇后大統八年生於同州七􅀊封略陽郡公時有善相者史元華見帝退謂所親曰此公子有至貴之相但恨其夀不足以稱之耳魏恭帝三年三月命爲安定公丗子十月乙亥太祖崩景子丗子嗣位爲太師大􅃁􅌠十二月丁亥魏帝詔以歧陽之地封帝爲周公庚子禪位於帝元年春正月辛􅐫即天王位柴燎告天朝百官於路門追尊皇考文公爲文王皇妣爲文后大赦天下封魏帝爲宋公帝性剛果見晉公護執政深忌之司㑹李植軍司馬孫􅁪以先朝佐命入侍左右亦疾護權重乃與宫伯乙弗鳯賀抜提等潜謀請帝誅護帝然之又引宫伯張先洛同謀先洛宻白護護乃岀植爲梁州刺史􅁪爲潼州刺史鳯等遂不自安更奏帝將召羣臣入因此誅護先洛又白之時小司馬尉遟綱揔統􅀫衛兵護乃召綱共謀廢立令綱入殿中詐呼鳯等論事旣至以次執送護第並誅之綱乃罷禁兵帝方悟無左右獨在内殿令宫人持兵自守護又遣大司馬賀蘭祥逼帝遜位遂幽於舊邸月餘以弑崩時年十六護誅後謚曰孝閔皇帝陵曰静陵明皇帝後周書曰丗宗明皇帝諱毓小名統萬突太祖長子也母曰姚夫人永熈三年太祖臨夏州生帝於統萬城因以名焉大統十四年封寧都郡公十六年行華州事㝷拜開府儀同三司冝州諸軍事冝州刺史魏恭帝三年授大將軍鎮隴右孝閔踐祚進位柱國轉歧州諸軍事歧州刺史治有美政􅀺民懷之及孝閔帝廢晉公護遣使迎帝於歧州秋九月癸亥至京師止於舊邸甲子羣臣上表勸進備法駕奉迎帝固襄羣臣固請是日即天王位大赦天下乙􅐫朝羣臣於延夀殿武成元年春正月乙酉太師晉公護上表㱕政帝始親覽萬機軍旅之事護猶㹅焉􅀄改都督諸州軍事爲揔管八月己亥改天王稱皇帝追尊文王爲文皇帝大赦改元二年春正月癸丑朔大㑹羣臣於紫極殿始用百戯三月辛酉重陽閣成㑹羣公列將卿大夫及突厥使者於芳林園賜錢帛各有差夏四月帝因食遇毒庚子大漸辛􅐫崩於延壽殿時年二十七謚曰明皇帝廟稱丗宗葬昭陵武皇帝後周書曰髙祖武皇帝諱邕字祢羅突太祖第四子母曰叱奴太后大統九年生於同州有神光照室㓜而孝敬聦敏有器質太祖異之曰成吾志者必此兒也年十二封輔城郡公孝閔帝踐祚拜大將軍出鎮同州丗祖即位遷柱國授蒲州諸軍事蒲州刺史武成元年入爲大司空治御正進封魯國公領宗師甚爲丗宗所親愛朝廷大事多共叅議性沉深有逺識非因顧問終不輒言丗宗毎歎曰夫人不言言必有中武成二年丗宗崩遺詔傳位於帝帝固讓百官勸進乃從之壬寅即皇帝位大赦天下保定元年春正月戊寅詔曰寒暑亟周􅍕及徂歳改元命始國之典章朕承寳圖冝遵故實可改武成三年爲保定元年嘉號旣新惠澤冝􅄎文武百官各増四級以大􅃁宰晉國公護爲都督中外諸軍事四年十月詔大將軍大􅃁宰晉國公護率軍伐齊齋於太廟庭授以斧􅃏於是護惣大軍出潼関大將軍權景宣率山南諸軍岀豫州少師楊摽岀軹関天和元年正月大赦改元五月甲午詔曰道德交䘮禮義嗣興襃四始於一言美三千於爲敬是以在上不驕處滿不溢冨貴所以長守􅀖國於焉乂安故能承天静地和民敬􅄦明並日月道合四時朕雖庸昧有志前古甲子乙邜禮云不樂萇弘表昆吾之稔杜蕢􅀂恠切有楊觶音寘之文自丗道喪亂禮儀紊毀此典茫然巳墜于地昔周王受命請聞顓頊廟有戒盈之器室爲復禮之銘矧伊末學而能忘此冝依是日有事停樂庶知爲君之難爲臣不易貽之後昆殷鍳斯在四年春正月辛夘朔廢朝以齊武成薨故也遣司㑹河陽公李綸等㑹葬於齊仍弔􅐠焉建德元年三月癸夘朔曰有蝕之齊遣使來聘景辰誅大􅃁宰晉國公護其子柱國潭國公㑹㑹弟大將軍莒國公至崇業公静并柱國侯伏侯龍恩龍恩弟大將軍萬壽大將軍劉勇等大赦改元罷中外府二年秋七月巳巳祠太廟自春末不雨至於是月壬辰集百寮於文德殿帝責躬罪巳問以治政得失五年十月乙酉帝㹅戎東伐以越王盛爲右一軍㹅管􅂎國公亮爲右二軍㹅管隋國公楊堅爲右三軍㹅􅃹譙王儉爲左一軍㹅管大將軍竇恭爲左二軍惣管廣化公丘崇爲左三軍㹅管齊王憲陳王純爲前軍六年春正月尉遟勒擒齊主及其太子􅁪於青州四月乙巳至自東伐列齊主於前其王公等並從車轝旗幟及器物以次陳於其後大駕布六軍備凱樂獻俘於太廟京邑觀者皆稱萬􅀊戊申封齊主爲温國公宣政元年三月於蒲州置宫廢同州及長春宫甲戌􅀄服常冠以皂紗爲之加簮而不施纓道其制􅀂今之折角巾也上大將軍郯國公王軌破陳師於吕梁擒其將呉明徹等俘斬三萬餘人五月己􅐫帝揔戎北伐遣柱國平原公􅁎願東平公宇文紳舉等率軍五道俱入發関中公私馬驢悉從軍癸巳帝不豫止於雲陽宫丙申詔停諸軍事六月丁酉帝疾甚還京其夜崩於乗輿時年三十六謚曰武皇帝廟稱髙祖葬孝陵宣皇帝後周書曰宣皇帝諱贇字乾伯髙祖長子也母曰李太后武成元年生於同州保定元年五月景午封魯國公建徳元年四月癸巳髙祖親告廟冠於阼階立爲皇太子詔皇太子廵撫西土文宣皇后崩髙祖諒闇詔太子㹅朝政五旬而罷髙祖毎廵幸四方太子常留􅁥國五年二月又詔皇太子廵西土因討吐谷渾宣政元年六月丁酉髙祖崩戊戍太子即皇帝位尊皇后爲皇太后大象元年春正月癸酉受朝於露門帝服通天冠絳紗􅂁羣臣皆服漢魏衣冠大赦改元大成􅀄置四輔官以上柱國大􅃁宰越王盛爲大前疑相州㹅管蜀國公尉遟逈爲大右弼申國公李穆爲大左輔大司馬隋國公楊堅爲大後丞二月辛巳詔曰皇太子衍地居上嗣正統所歸逺慿積德之休允恊無􅆠之祚帝王之量不肅而成天禄之期不謀巳至朕今傳位於衍乃睠四海深合謳歌之望俾予一人髙蹈風塵之表萬方兆庶知朕意焉可大赦天下改大成年爲大象元年帝於是自稱天元皇帝所居稱天臺冕二十有四旒車服於鼓皆以二十四爲節内史御正皆置上大夫皇帝衍稱正陽宫置納言御正諸衛等官皆准天臺尊皇太后爲天元皇太后二年五月甲午夜帝備法駕幸天興宫乙未帝不豫還宫詔隋國公堅入侍疾巳酉大漸御正下大夫劉昉與内史上大夫鄭譯矯制以隋國公堅受遺輔政是日帝崩於天德殿時年二十二謚曰宣皇帝葬定陵靜皇帝後周書曰靜皇帝諱衍後改爲闡宣帝長子也母曰朱皇后建徳二年六月生於東宫大象元年正月癸夘封魯王戊午立爲皇太子二月辛巳宣帝於鄴宫傳位授帝居正陽宫二年夏五月乙未宣帝寢疾詔帝入􅀫於露門學巳酉宣帝崩帝入居天臺廢正陽宫大赦天下停洛陽宫作大定元年春正月壬午詔曰朕以不天夙遭極罰光隂遄速遽及此辰窮慕􅆞綿言増號絶踰祀革號憲章前典可改大象三年爲大定元年二月庚申大丞相隋王楊堅爲相國惣百揆備九錫之禮又加冕十有二旒建天子旌旗出警入蹕並依魏晉故事甲子隋王楊堅稱號帝遜於別宫隋氏奉帝爲介國公邑萬户車服禮樂一如周制上書不爲表荅不稱詔有其文事竟不行開皇元年五月壬申崩時年九􅀊謚曰靜皇帝葬恭陵太平御覽卷第一百五
