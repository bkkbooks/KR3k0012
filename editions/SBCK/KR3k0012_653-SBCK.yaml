front:
  text: 太平御覽卷第六百五十三釋部一
  hash: sha256:fd51319832f08359e1513439e9c5c5d5b9a0920c249b94bea54a00f1e2e67cf9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_653-1a}
body:
  text: 叙佛漢書曰漢使驃􅀐將軍霍去病出隴過焉􅂄山得休屠王􅀕天金人顔師古注曰作金人以爲天神之主而􅀕之即今佛像是其遺法也後漢紀曰浮圖者佛圖也西域夭笁國有佛道焉佛者漢言􅁴也將以􅁴悟群生也統其教以脩善慈心爲主不殺生􅀋專務清浄其精進者號爲沙門漢言息自心蓋息意去欲而歸無爲也又以爲人死精神不滅隨復受形所行善􅁖皆有報應故所貴行善脩道以練精神練而不巳以至無生而得佛也身長一丈六尺黄金色項佩日月光變化無常無所不入故能化通萬物而大濟羣生􅀄帝夢見金人長大項有日月光以問群臣或曰西方有神其名曰佛其形長大而黃金色陛下之所夢得無是乎於是遣使天笁而問道術遂於中國而圖其形像焉有經書數千卷以虚無爲宗包羅精麤無所不統善爲宏闊勝大之言所求在於一躰之内而所明在於視聽之表故丗俗之人以爲虚誕然歸於玄微深逺難測故王公大人觀死生報應之際莫不瞿然自失也晉書曰後趙百姓以佛圖澄故多奉佛皆營造寺廟相競出家真僞混淆多生愆過季龍下書料簡其著作郞王度奏曰佛外國之神非諸華所應祠奉漢代􅀄傳其道唯聽西域人等得立寺都邑以奉其神漢人皆不出家魏承漢制亦修前􅁤今可断趙人悉不聽詣寺燒香禮拜以遵典禮宋書曰頋歡以佛道二家教異學者互相非毀乃著夷夏論曰道經云老子入􅀜之天笁維衛國國王夫人名曰浄妙老子因其晝寢乗日精入浄妙口中後年四月八日夜半時剖左腋而生墜地即行七步於是佛道由此而始興焉又玄妙内篇佛經云釋迦成佛有塵劫之數出法華無量壽然二經所說如合符契道則佛也佛則道也其聖則符其迹則反歡雖同二注而意黨道教司徒􅀽􅀕託爲道人以駮之後魏書釋老志曰凢說教大抵言生生之􅀋皆因行業而起有過去當今未來歴三丗識神不滅凢爲善􅁖必有報應漸積勝業陶冶麤鄙經無數形澡練神明乃致無生而得佛道其門階次二行等級非一皆縁淺以致深藉微而爲著率在於積仁順蠲嗜欲習虚静而成通照也其始修心則依佛法僧謂之三歸又有五誡云殺盗媱妄言飲酒大意與仁義禮智信同梁書曰郭祖􅀷以武帝溺情内教朝政㢮縱輿櫬詣闕上封事曰比來慕法普天信向家家齋戒人人懴礼不事農業空談彼岸夫農業者今日濟育功徳者將來勝因豈可惰本勤末置近効賖也時帝大弘釋典將以昜俗故祖深尤言其事以爲都下佛寺五百餘所窮極宏麗僧尼十餘萬資産濃沃所在郡縣不可勝言道人又有白從尼則畜養女皆不貫人藉天下户口幾亡其半而僧尼多非法養女皆服羅紈其蠧俗傷法抑由於此恐方來處處成寺家家剃落尺土一人非復國有南史曰天笁諸國皆事佛道自後漢明帝法始東流自此以來其教稍廣別爲一家之學元嘉十二年丹楊尹蕭摹之奏曰佛教􅀍于中國巳歷四代而自頃以來更以奢競爲重請自今以後有欲鑄銅像者悉詣臺自聞興造塔寺精舎皆先列言須許報然後就功先是晉丗􅁃冰始創議欲使沙門敬王者後桓玄復述其議並不果行宋大明六年孝武使有司奏沙門接見皆尽敬詔可隋書經藉志曰釋迦在丗四十九年教化乃至天龍人􅀑並來聽法弟子多有得道證果後於构尸郍城娑羅􅀟樹間二月十五日入般􅄺槃譯言滅度亦言常樂我浄弟子迦葉等追共撰述教爲十二部經唐書曰傅弈上䟽請除去釋教髙祖付群官詳議太僕卿張道源稱弈奏合理中書令蕭瑀與之爭論曰佛聖人也弈爲此議非聖人者無法請寘嚴刑弈曰禮本於事親終於奉上則忠孝之理著臣子之行成而佛踰城出家逃背其父以匹夫抗天子以継躰悖所親瑀非出於空桑乃遵無父之教臣聞非孝者無親瑀之謂矣瑀不能荅但合掌曰地獄所設正爲是人又曰㑹昌中道士趙歸真舉羅浮道士鄧元起有長年之術帝遣中使迎之繇是與衡山道士劉玄静膠固而排釋氏牟子曰或問曰佛從何而生寧有先祖牟子曰佛生天笁假形王家父曰白淨夫人字曰浄妙四月八日佛精從天來夫人晝寢夢見象六牙欣然恱之遂感而孕因以八日從母右脇而生太子有三十二相八十種好頰如師子皮不受塵水手足皆鈎鏁毛悉向上又曰子得佛道以來良有益否牟子曰吾自得佛道來如開浮雲見白日如執火炬入􅁳室矣建康實録曰吴赤烏十年胡人康僧會入境置經行所朝夕禮念有司以聞帝曰昔漢明帝感夢金人使徃西方求之得摩騰笁法蘭來中國立經行教今無乃是遺􅀋乎因引見僧㑹其言佛教滅度巳乆唯有舎利可以求請遂於大内立壇結静三七日得之帝崇佛道以是江東􅀄有佛法髙僧傳曰釋惠嚴宋髙祖素所知重文帝在位情好尤宻先是帝未甚崇信京尹蕭摹之上啓請制起寺及鑄像帝廼與侍中何尚之吏部郎羊玄保等議之謂尚之曰謝靈運常言六經典文本在濟俗爲治必求靈性真奥豈得不以佛經爲指南耶近摹之推逹性論尢爲名理羊玄保進曰此談蓋天人之際豈臣所冝預竊恐􅁗楚論強兵之術孫吴畫吞併之計將無取此耶帝曰此非戰國之具良如卿言尚之曰夫禮隱􅇣則戰士怠貴仁徳則兵氣衰若以孫吴爲志苟在吞噬亦無堯舜之道豈唯釋教而巳邪帝恱曰釋門有卿亦猶孔氏之有季路丗說曰殷中軍見佛經云理應在阿堵上注云佛經之行東國尚焉而記傳無聞莫詳其始牟子曰漢明帝夜夢見神人身有日光飛止殿前意甚忻恱明日問群臣有通人􅀓毅對曰聞天笁有得道者號曰佛身有日光殆將其神於是上悟遣羽林郞􅁗景􅀶士弟子等十二人之大月氏冩取佛經四十二章在蘭䑓石室又曰􅁃公常入佛圖見卧佛曰此子疲於津梁時人以爲名言􅄺槃經云如來背痛於􅀟樹間北首而卧故後之圗繪者爲此像也佛地論曰佛者覺也覺一切種智復能開􅁴有情如睡夢􅁴故名爲佛姓釋伽號牟尼佛普曜經曰從兠率天降神於西域迦維衛國浄飯王宫摩耶夫人剖左脅而生時多靈瑞生而能言本相經曰年十九踰城出家學道勤行精進禪定六年成道具三十二相八十種好􅄺槃經曰醍醐之敎喻於佛性從乳出酪從酪出􅂫從生􅂫出熟􅂫熟蘇出醍醐醍醐蘇之精也法顯記曰佛生於殷末道成於周􅀄至成王十二年經律始到新頭河河即張騫所到之處佛國記曰佛有四牙廣半寸長半寸一牙在呵條國又一牙在天上又一牙在海龍王宫又一牙在乹陁國國王使大臣九人守保之月朝捧擎牙出牙或時放光明香花數十斛散牙上而牙不没唐韓愈論佛骨䟽曰伏以佛者夷狄之一法耳後漢時流入中國上古末甞有也昔黃帝在位百年年一百一十歳少昊在位八十年年一百八十歳此時天下太平百姓安樂壽考然而此時未有佛也至殷湯亦年百歳湯孫太戊在位七十五年武丁在位五十九年書史不言其年壽考所極蓋亦非因事佛而致然漢明帝時始有佛法明帝在位纔十八年耳其後亂亡相継運祚不長宋齊梁陳元魏巳下事佛漸謹年代尤促唯梁武帝在位三十八年前後三度捨身施佛宗廟之􅀕不用牲牢盡日一食止於莱菓其後竟爲侯景所逼餓死䑓城國亦尋滅事佛求福乃更爲禍由此觀之佛不足信也亦可知矣髙祖始受隋禪則議除之當時群臣才識不逺不審知先王之道古今之冝推闡聖明以正斯弊其事遂止陛下神聖睿武數百年巳來未有倫比即位之􅀄不許度人爲僧尼道士又不許創立寺觀臣愚以爲髙祖之志必行於陛下之身縱未能行豈可恣之轉令盛矣今聞陛下令群僧迎佛骨於鳯翔樓以舁入内又令諸寺送迎供飬臣雖至愚必知陛下不惑於佛以祈福也直以年豊人樂徇人之心爲京都士庶設詭異之觀戯翫之具耳然百姓愚􅄀易惑難曉苟見陛下如此將謂真心信佛皆云天子大聖猶一心敬信百姓何人更惜身命以至焚頂燒指百十爲群解衣散錢自朝至暮轉相倣傚唯恐後時老少奔波弃其業次􅀂不明加禁遏更歷諸寺必有断臂臠身以爲供養者傷風敗俗傳􅀏四方非細事也夫佛本夷狄之人與中國言語不通衣服殊制口不言先王之法言身不服先王之法服不知君臣之義父子之恩假如其身至今尚在奉其國命來朝京師陛下容而接之不過宣政一見禮賔一設賜衣一襲衛而出境不令惑衆也况其身死巳乆枯朽之骨㓙穢之餘豈令入宫禁孔子曰敬􅀑神而逺之古之諸侯行冝於國尚令巫祝以桃茢拂除不祥然後進弔今無故取朽穢之物親臨視之巫祝不先桃茢不用群臣不定其非御史不舉其失臣實耻之乞以此骨付有司投水火永絶根本断天下之疑絶後代之惑使天下之人知大聖之作爲出於尋常萬萬也豈不盛哉豈不快哉太平御覽卷第六百五十三
