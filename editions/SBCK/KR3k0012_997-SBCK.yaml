  text: 太平御覽卷第九百九十七
  hash: sha256:72d8ac5a8245383d7d50e18154c0ec13f2e8d9114c4144d9aa3aaa6179cdf9f4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_997-1a}
body:
  text: 百卉部四荼䓞蒿青蒿莪蒿蔞王芻􅆱逢蕭艾王􅀲薇莎蒺䔧荼爾雅曰荼苦菜苦菜可食毛詩谷風曰誰謂荼苦其甘如薺又蟋蟀采苓曰采苦采苦首陽之下苦苦采禮記月令孟夏曰小滿之日苦菜秀蔡邕章句曰苦菜也不榮而實謂之秀廣雅曰遊冬苦菜也䓞來計切􅀃文曰䓞草可以染黄漢書曰諸侯王盭音戾綬如淳曰盭緑出晉灼曰盭草名日出瑯瑘平昌縣似艾可染因以爲綬名蒿爾雅曰蘩皤蒿郭璞注曰蒿也蒿葭也郭璞注曰今人採青蒿香中炙㗖者爲葭也葭愆刀切蔚牡菣無子者又曰蘩之醜秋爲蒿醜􅀋也春時各有種名至秋老成皆通吁爲蒿大戴記曰周時德澤洽和蒿茂大以爲蒿柱名爲蒿宫此天子之露寢也􅀶物又載陸機毛詩䟽義曰采蘩爾雅曰皤蒿也凢艾色白爲皤今白蒿是也春生秋乃香美可生食蒸一名遊胡北海人謂之旁勃又曰匪莪伊蔚蔚牡蒿牡菣也似蒿三月始生七月花花似胡麻花而紫赤八月爲角角似小豆角銳而長一名馬新蒿毛詩鹿鳴曰􅊯􅊯鹿鳴食野之蒿毛云葭也青蒿詩䟽義曰蒿青蒿也荆䂊汝隂皆謂之葭東觀漢記曰杜林􅀉隗􅅝地終不降志辱身至簮蒿蓆草不食其粟也隋書曰􅀄唐髙祖欲遣李密東征朝士諌曰李密性多輕狡好爲反叛願勿遣之帝曰蒿箭射蒿蘺耳吾豈不知耶三輔決録曰孫晨字元公冬月無􅀍以蒿一東暮卧旦收之神仙服食經曰十一月採彭㝅彭㪍白蒿也兎食之壽八百歳莪蒿爾雅曰莪蘿今莪蒿也亦曰􅅒蒿毛詩曰菁菁者莪樂育材也菁菁者莪在彼中阿又谷風􅖋莪曰􅖋􅖋者莪匪莪伊蒿詩義䟽曰莪蒿也生澤田漸洳處葉似邪蒿細科二月中生莖葉可食又可蒸香美頗似蔞蒿􅀃文曰莪蒿也從草我聲廣志曰莪蒿䕲蒿錢塘記曰靈隠山􅂖樹樹下生莪鬱茂􅀂沃土所生蔞毛詩關雎漢廣曰言刈其蔞蔞蒿也陸機毛詩義䟽曰蔞葉似艾白長數寸髙尺餘好生水中脆羙可食王芻爾雅曰菉王芻也菉蓐也今呼鴟脚莎吴氏本草曰王芻一名黄草神農雷公生太山山谷治身熱邪氣小兒身􅀬氣􅆱洪範五行傳曰􅆱之爲言􅆱也百年一夲生百莖此草木之壽知􅁻凶者也聖人以問􅀑神焉􅀃文曰􅆱蒿屬也生千歳三百莖易以爲數天子􅆱九尺諸侯七尺大夫五尺士三尺史記曰天下和平王道得而其莖長大其叢生者百莖共根今丗取八十莖八尺即難得矣六十莖長六尺即可用也淮南子曰上有叢􅆱下有神􅀛論衡曰􅆱生七十歳生一莖七百歳生十莖神靈之物故遟也蓬爾雅曰齧彫蓬薦􅁰蓬别蓬種􅀋尚書大傳曰子夏於壤室編蓬户彈琴瑟以歌先生之風可以發憤矣毛詩鵲巢騶虞曰彼茁者蓬蓬草名也又伯兮曰自伯之東首如飛蓬禮記内則曰射人以桑弧蓬矢六射天地四方桑弧蓬矢矢夲太古也天地四方男子所有事也禮記儒行篇曰蓬户甕牖編蓬爲户也魏略曰鮑出值飢餓採蓬實得數斗爲母作食三輔决録曰張仲蔚平陵人也與同郡魏景卿俱􅀮身不仕明天官􅀶物好屬詩賦所居蓬蒿没人管子曰無法程式飛捶而無所定謂之飛蓬之間明王聽此言曽子曰蓬生麻中不扶自直白沙在泥與之皆黒晏子曰魯哀公失國走齊景公問焉曰子之年甚少矣道止于此乎哀公對曰吾少之時人多愛我者吾禮不能親人多諌我者吾忌不能從以内無弼外無輔弼輔無一人謟䛕者甚衆譬之猶秋蓬也􅀌其根夲密其枝葉也􅀃苑又載莊子曰列子食於道見百歳髑髏攓蓬而指之曰唯予與汝知未曽死未曽生也啇君書曰今夫飛蓬遇飄風而行千里者乗風之􅀔也准􅀯子曰見飛蓬轉而知爲車楚辞曰蓬艾親入御于弟兮弟床簀也喻親宻曹植詩曰轉蓬離夲根飃䬙隨長風可意廻飈舉吹我入雲中髙上髙無極天路安可窮􅀋此流宕子􅂢軀逺從戎司馬彪詩曰百草應節生含氣有淺􅀷秋蓬獨何華飃䬙隨風轉王朗諌行役夜表曰司空臣朗言朗聞飛蓬隨風集于王梁之衡而駟馬爲之奔乳虎爲之走蓬非馬之䇿馬非蓬之敵所以或奔走者驚也蕭爾雅曰蕭荻即髙音狄毛詩􅁰離採􅁑曰彼採蕭兮一日不見如三秋兮詩義䟽曰蕭今荻蒿也或謂牛尾蒿莖可作燭有香氣故􅀕祀脂􅋹之爲香也許愼以爲艾蒿非也禮王度記曰士蕭庶人艾艾蕭不同明矣又蓼蕭曰蓼蕭澤及四海也蓼彼蕭斯零露湑兮周禮天官上曰甸師􅀕祀供蕭茅􅀃文曰蕭艾蒿也莊子曰河上有家貧窮緯蕭爲業司馬彪曰蕭蒿也緯織也織蒿爲箔山海經曰囊山之隂多蕭郭璞詩曰得意在蘭蓀忘懷􅀉蕭艾艾爾雅曰艾冰臺今艾蒿也毛詩曰􅁰離採􅁑曰彼採艾兮一日不見如三歳兮齊書曰紀僧真爲髙帝冠軍府叅軍主簿僧真夣蒿艾生滿江驚而白之髙帝曰詩人採蕭蕭即艾也蕭生斷流卿勿廣言陳書曰陳暄素通脫以俳優自居傲弄轉甚後主稍不能容後遂摶艾爲帽加于其首以火􅋹之燃及於髪垂涕求哀聲聞於外而弗之釋莊子曰越王子搜逃乎丹穴越國無君求王子捜不從之丹穴不肯出越人薫之以艾孟子曰七年之病求三年之艾漢武帝内傳曰削冰令正圎舉以向月以艾於後承其影得火師曠占曰歳疫病草先生病草者艾也崔寔四民月令曰三月可採艾王􅀲周書曰立夏之日螻蟈鳴又五日丘蚓出又五日王􅀲生禮記月令曰孟夏之月王爪生春秋運斗樞曰機星散爲抜葜薇爾雅曰薇垂水生於水邊毛詩鵲巢草蟲曰陟彼南山言採其薇又曰采薇遣戍役也采薇采薇薇亦柔止史記曰伯夷叔齊義不食周粟隠首陽山採薇而食之廣志曰薇葉似萍可蒸食三􅁗記曰伯夷食薇三年顔色不異武王戒之不食而死莎爾雅曰薃胡老切侯莎其實媞夏小正曰薃也者莎䔺媞者其實媞大分切廣雅曰地毛莎䔺也廣志曰莎可以爲雨衣毛詩題綱曰南山有臺臺一名夫湏莎草也言山生臺及莎以自䕃喻人君得賢以自尊也後周書曰豆盧寜甞與梁人企定遇於平涼川相與肆射乃於百歩懸莎草以射之七發五中企定時以爲能贈遺甚厚任昉述異記曰昔戰國時魏國苦􅁗之難有民從征戍􅁗不返其妻思之而卒旣葬􅊘上生木枝葉皆向夫所在而傾因謂之相思木今􅁗趙間有相思草􅃺􅀂石竹而節節相續一名斷膓草又名愁婦草亦名孀草人呼爲寡婦莎蓋相思之流也蒺䔧爾雅曰茨蒺䔧也布地蔓生細葉子有三角刺人易困卦曰困于石據于蒺䔧入于其宫不見其妻凶毛詩曰牆有茨衛人刺其上也牆有茨不可掃也晉中興書徴祥􅀃曰義熈中宫城上及御道左右皆生蒺䔧亦草妖也􅀃􅁐曰晉平公置酒椃祁之臺使郎中馬童布蒺䔧於階下令召師曠師曠至履而上堂仰天歎曰夫􅁏生蟲還自食木生蠹還自刻人出妖還自得九鼎之具不當生王堂廂不當生蒺䔧來八日脩百官立太子君將死矣至期果死又曰陽虎得罪於衛北見簡子曰自今以來不復樹人矣簡子曰何哉陽虎對曰夫堂上之人吾所樹者過半朝廷之吏邊境之士臣所立者亦過半矣今夫堂上之人親刼臣於君朝廷之吏親危於法邊境之士親刼臣於外簡子曰唯賢者爲能報愚不肖者不能夫樹桃李者夏得其休息秋得食焉樹蒺䔧者夏不得休息秋得其刺焉今子之所樹者蒺䔧也非桃李也自今以來擇人而樹之母以死樹而擇之續捜神記曰沛國一士人姓周生三兒向應可語便啞有一人逕門過乞飲曰君有罪可逺内自思我於外待君主人異其言乃知非常人便入内思諐􅄽同出謂客曰昔爲小兒時鷰巢中有三子試以指納巢中鷰子亦出口承之乃取三蒺䔧與其子其子吞之即死其母尋還不復見其子出徘徊悲鳴而去有此事今甚悔之客曰是矣便聞其兒言語周正客乃去不知所在也夲草經曰蒺䔧一名止行一名升雅一名傍通一名水香離騷曰江蘺弃於窮巷兮蒺䔧蔓乎東廂太平御覽卷第九百九十七
