front:
  text: 太平御覧卷第一百九十二
  hash: sha256:c13fd4d789bb4186d61c2d8619c5617737eff1fbee19eb3c43698ba8fc6f4e41
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_192-1a}
body:
  text: 居處部二十城上說文曰城以盛民也墉城垣也釋名曰城盛也盛受國都也又曰城上垣謂之睥睨言於孔中睥眺非常也亦曰陴言禆􅂇城之髙也亦曰女牆言卑小比之於城若女子之於丈夫也所謂堞亦女牆也易曰城復于隍詩曰宗子維城無俾城壞又曰挑􅀆逹􅀆在城闕􅀆又曰衛文公徙居楚丘始建城市而建宫室得其時制焉孑孑干旌在浚之城又曰崇墉言言又曰哲夫成城哲婦傾城又曰靜女其姝俟我於城隅又曰赳赳武夫公侯干城禮記曲禮上曰登髙不指城上不呼左傳隱公曰鄭莊公立姜氏愛共叔爲請京使居之謂之京城太叔􅀕仲曰都城過百雉國之害也又曰美城之大名也又曰楚囊瓦城郢沈尹戍曰苟不能衛城無益也又曰梁伯好土功亟城而不處民罷而不堪則曰某宼將至乃溝公宫曰􅁗將襲我民懼而潰又曰備豫不虞善之大者也莒恃其陋而不修城郭浹辰之間而楚克其三都又曰無戎而城讎必保焉又曰楚子圍鄭守陴者皆哭楚子退師鄭人脩城進復圍之三月克之又曰叔向告晉侯曰城上有烏齊師其遁又曰君其脩德而固宗子何城如之又曰士弥牟城成周計丈尺揣髙卑度厚薄仞溝洫物土方議逺迩量事期計徒庸慮材用書糇糧令役於諸侯又曰宋城華元爲植廵功城者謳曰晘其目皤其腹弃甲而復于思于思弃甲復來使其驂乗謂之曰牛則有皮犀兕尚多弃甲則郍役人曰縱有其皮丹􅃮若何華元去之曰夫其口衆我寡榖梁傳襄公曰古者大國過小邑必飾城禮罪禮也明己囯無罪公羊傳曰城雉者何五板而堵五堵而雉百雉而城公羊傳曰曰天子之城千雉髙七雉公侯百雉髙五雉男五十雉髙三雉史記云􅁗始皇使蒙恬北築長城西屬流沙東至遼水以捍胡又曰􅁗二丗欲􅃮城優旃曰善哉􅃮城光蕩蕩㓂來不得上易爲􅃮耳顧難爲䕃屋二丗􅀏遂止漢書曰武帝太􅀄元年使將軍公孫敖築塞外受降城又曰梁孝王廣睢陽城周圍七十里又曰貳師遣屬國胡􅀐二千與虜戰虜兵壞散死傷者數百人漢軍乗勝追北至范大夫城漢將姓范􅀄築此城范亡其妻率衆完保之因以爲名又曰車師前治交河城外分流繞城下故號交河去長安八千一百五十里又曰昭帝元鳯六年募郡國徙遼東􅀇兎城續漢書曰耿恭字伯宗爲戊巳校尉屯後王部金蒲城謁者􅀜寵爲戊巳校尉屯前王部柳中城魏志曰曹公攻馬超渡渭每爲超􅀐所衝突營不得立地又多沙不可築城婁子伯說公今天寒可沙爲城以水灌之一夜可立從之乃多作縑囊以盛土堰水夜渡兵作城比明城立公軍於是盡得渡于寳晉紀曰魏文帝之在廣陵呉人大駭乃臨江爲疑城自石頭城至于江乘以木爲枝衣以葦席加彩飾焉一夕而成晉書云涼州城有龍形故名卧龍城夲匈奴所築也又曰朱序遷梁州刺史鎭襄陽符堅遣軍圍序序母韓氏自行城謂西北角當先弊遂領百餘婢及城中女丁築二十餘丈賊攻新築不敗遂引退襄陽謂之夫人城晉載記曰赫連勃勃以叱于呵利領將作大匠乃蒸土築城以錐刺之錐入一寸即殺作者不入即殺行錐者勃勃以爲忠沈約宋書曰檀道濟見收脫幘投地曰乃壞汝万里長城又曰氐師楊難當㓂漢中魏興太守薛健據黄金城崔鴻十六國春秋北燕録曰􅀄後燕光帝始中丁靈民楊道獵於白鹿山爲契丹所􅀗流漂塞外至大難北及􅀺大國逐出草以射獵爲業至十月乃收葦爲城水澆令凍髙一丈五尺東北七八十里南北二十餘里名凌城居於其中又夏録曰赫連勃勃下書曰古人制起城邑或因山水或以義立名今都城巳建万堵斯作克成弗逺冝有美名朕方統一天下君臨万國可以統万爲名焉燕書曰太祖皝八年使唐柱等築龍城立門闕宮殿廟園籍田後遂改爲龍城縣北齊書曰唐邕字道和爲給事黄門中書舎人文宣岀塞邕必陪從文宣甞登并州童子佛寺望并州曰此何等城也或曰金城湯池天府之國也文宣曰我謂唐邕是金城此非也唐書曰景雲二年三月張仁愿於河北築三受降城先是朔方與突厥以河爲界北有佛雲祠突厥每入宼必禱祠􅀱冰合而入時黙啜西擊仁愿乗虚奪取漠南之地築三城首尾相應以拂雲祠爲中城東西相去各四百里皆據津濟遥相應接北拓三百餘里於牛頭胡􅀖山北置烽􅀱百八十自是突厥不得度山放牧朔方更無宼掠減鎭兵數万人又曰天寳二年正月二十八日築神都羅城號曰金城又曰天寳六載十二月築會昌城於陽所置百司及公卿邸第又曰建中元年五月築奉天城四年十月上避難于奉天􅀄術士桑道茂奏請城奉天爲王者之居至是方驗又曰貞元九年二月詔復築鹽州先是貞元三年城爲吐蕃所壞自後塞外無堡障犬戎入宼旣城之後邊患頓息五經異義曰天子之城髙九仞公侯七仞伯五仞子男三仞白虎通曰天子曰崇城言崇髙也諸侯曰干城言不敢自專禦於天子也周書曰周公作成周于土中立城方千六百二十丈郛方七十二里南繫洛水北因陜山爲天下之大制也家語邑百雉之城古之制也國語曰衆心成城言以衆心爲城墨子曰􅄙帶爲城琴操􅂎梁死妻援琴歌曰樂莫樂􅀆新相知悲莫悲􅀆生別離哀感皇天􅀆城爲隳列女傳曰齊人􅂎梁襲莒戰而死其妻就夫之死城下哭之七日而城崩淮南子曰崐崘山有層城九重又曰鯀作九仞之城墨子曰城四門守城之法積樵營􅄂茅葦有木有荻有積沙有蓬艾有麻脂有金錢有積粟莊子曰孔子說盗跖曰使爲將軍造大城數百里跖曰城之大者莫大乎天下也韓子曰靖郭君城薛客諌靖郭君曰君失齊國雖薛城至於天猶無益也靖郭君乃不城薛博物志曰處士東里塊責禹亂天下禹退作三城強者攻弱者守敵者戰城郭禹始也又曰代城始築立版幹一旦亡西南五十里於澤中自立結葦爲門因就營築焉其城圎周三十七里爲九門故城處呼曰東城崔豹古今注曰秦所築長城土色紫漢塞亦然故稱紫塞韓詩外傳曰趙簡子薨未葬中牟叛之旣葬五日襄子興兵而攻之圍未匝而城自壞襄子擊金而退軍吏曰誅中牟之罪而城自壞天􅂇也何爲退襄子曰吾聞君子不乘人於利不阨人於險使其城成然後攻之述異志曰廬山上北嶺有城號康王城天雨聞鼓角之聲傳云周康王好音累廵名山故有康王之號又曰㝷陽柴桑縣城晉永和中有童謠呼爲平石城時人僉謂平滅石之徴也後桓􅀇􅆲位晉帝爲平固王恭帝爲石陽公俱遷於此城又曰㝷陽張允家在夲郡郡南有古城張少貧約屢徃遊憇忽有一老公來與張言因問之此城何名荅曰吾不知爲南郡城耳言訖便去不知所之張旣岀官仕進累遷位登元凱後爲南郡太守即以城號以志老父之言焉又曰安陽有金城城皆如金色堅勁不崩摧先儒云上古時天􅀨黄金也酈元水經注曰魯陽開水歴衡山西南經皇后城建武元年光武遣侍中􅀓俊持節迎光烈皇后於濟陽後發兵三百餘人􅀫衛皇后道路歸京師蓋稅舎所在故得其名矣又曰漢水東合甲水南流經金井城又曰漢水東經方石城在髙原上髙十餘丈四面臨平形若覆盆其城􅀫是流􅄂聚居故丗亦謂流􅄂城又曰易水西山寛中谷東經五大夫城昔北平侯王潭所居王莽之亂生五子並避亂隱居北山故其後居丗以爲五大夫城河北記云易縣有五公城王潭不從王莽潭子興生五子避隱於此丗祖並封爲侯元才北平侯顯才蒲平侯益才安嘉侯季才唐侯所謂中山五侯其西三十里有五大夫城說與此同說􅁐曰中行穆子圍鼔鼔人有以城叛來降者穆子不許軍吏曰師徒不勤得城何故不受穆子曰有以吾城叛者吾所惡也人以城來獨何賞􅁗州記曰天水郡治上邽城前有湖中冬夏中停無增减天水取名由此湖也又曰金城郡漢昭元始六年所置應劭云􅀄築城得金故曰金城凡城皆稱金言其固也故墨子稱金城湯池齊地記曰即墨城東西百八十里平昌城髙六丈有臺有井與荆水通失物於井得之於荆水又神龍出入焉故一名龍城三齊略記曰陽庭城東西二百五十里青城山􅁗始皇登此山造石城入河三十里臨海射魚方四百里水変血色今猶尓也􅄙道虎齊記曰不夜城在陽庭東南一百二十里淳于髠稱海童作妖城古有日夜出見於東境故萊子此城以不夜爲名異之夢書曰城爲人君一縣尊也夢見城者見人君也夢築新城有功名新序曰梁伯湎於酒􅁋於色心惛而耳塞好作大城而不居民罷甚武當山記曰魏興錫縣有長利城父老伯相傳云是長安土所築邑塞於餘城王韶之始興記曰有任將軍城􅁗南海尉任囂城也合逕有三城馬鞍城白鹿城白沙城晉咸康中張魴甚有惠政白鹿羣游取一而獻之故因以爲名􅀽山松冝都記曰限山縣有山名下魚城四面絶崖兩道可上皆險山周廻可二十里上有林木池水里民種於山下􅀳永嘉亂土人登此避賊賊守之經年食魚擲下與賊以示不窮賊遂退散因以此爲下魚城呉地記曰咠門外越城者越來伐呉呉王在姑􅂫築此城以逼之又有越來溪又曰越來溪西魚城者呉王旣遊姑蘇築此城以飬魚又曰魚城之西有故城長老云築以釀酒今俗人呼之爲苦酒城又曰匠門外鴨城者吳王築此城以飬鴨又曰婁門外鷄陂者呉王飬鷄城又曰海渚有呉王闔閭與越結怨相伐築城名曰南武城以禦越盛弘之荆州記曰馬牧城東三里有蜂城故老相傳云飢年民結侣拾蜂止憇其中故因爲城又云城隨門􅀔上大下尖其形似蜂故有蜂號二稱莫知所附故並載焉又曰當陽縣東南有麥城城東有驢磨城掎角城傳云伍員造此二城以攻麥城故假驢磨之名又曰樊城西北有鄾城即春秋所稱鄾子之國光武云宛最強鄾次之即謂此鄾城西北行十餘里鄧侯呉離之國爲楚文王所滅今爲鄧縣鄧城西百餘里有榖城伯綏之國城門有石人焉刋其腹云摩鞬愼莫言疑此亦周太廟金人緘口銘背之流也又曰秭歸縣西有楊城周廻十餘里即熊繹所居荆州圖記曰江夏郡所治夏口城其西南角因磯爲髙崇墉枕流上則過眺山川下則激浪﨑嶇是曰黄鵠磯寔舟人之所艱也又曰白帝城西臨大江東南髙二百丈西北髙一千丈又曰鄧城有樊城是樊仲山甫所封也又曰沌陽縣有却月城西一里有馬城也又曰夷陽縣南對岸有陸抗故城即山爲墉西面天險上有歩闡故城又曰新野郡魏三公城左右傳漢時三公餞離處也伏滔北征記曰梁國名故宋國微子所封城再重大城梁孝王所築孟粤北征記曰許昌在洛水之西城方圎二十里有三重城南北東西士門金城西南貟實中臺髙六丈餘方圎二畒上有廟城門有鐵鑊􅀜中記曰長安地皆黑壤城今赤如火堅如石父老所傳鑿龍首山土爲城又諸臺􅀜亦尓益州記曰益州城張儀所築錦城在州南蜀時故宫也其處號錦里成都記曰府城夲呼爲錦城􅁗滅蜀張儀所築也每面各三里周廻十二里髙七丈屢皆傾側忽有大􅀛周行隨其所躡而築之功果就焉故亦號爲􅀛城三輔黃圖曰長安城西南頭第二門名直城王莽改曰端路今名直城太平御覽卷第一百九十二
