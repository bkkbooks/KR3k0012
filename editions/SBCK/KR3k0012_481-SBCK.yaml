front:
  text: 太平御覽卷第四百八十一
  hash: sha256:e875beff54bd7c6c69fbe8cf1163318e1ad0f838b24c2e8e70407a7724b046b5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_481-1a}
body:
  text: 人事部一百二十二仇讎上周禮地官調人曰調人掌司萬民之難而諧和之馬融曰難謂相與爲仇也凢和難父之讎避諸海外兄弟之讎避諸千里之外從父兄弟之讎不同國君之讎視父師長之讎視兄弟交友之讎視從父兄弟禮記曰子夏問於孔子曰居父母之仇如之何夫子曰寢苫枕干不仕弗與共天下也遇諸市朝不反兵而闘曰請問居昆弟之仇如之何曰仕弗與共國銜君命而使雖遇之不闘曰請問居從父昆弟之仇如之何曰不爲魁主人能則執兵而陪其後又曰祁奚請老晉侯問嗣焉稱解狐其讎也將立之而卒事具薦舉部又曰齊髙發帥師伐莒莒不仕齊故也莒子奔紀鄣紀鄣莒邑使孫書孫書陳無字子占也伐之􅀄莒有婦人莒子殺其夫巳爲􅊔婦及老託於紀鄣紡焉以度而去之曰紡纑連所以度城而藏之以待外攻者及師至則投諸外􅄬繩城外隨之而出或獻諸子占子占使師夜縋而登縁繩登城也登者六十人縋絶師鼔譟城上之人亦譟莒共公懼啓西門而出齊入紀傳言怨不在天又曰呉伐越越子勾踐禦之陣于㩦李靈姑浮以戈擊闔廬傷將指取其一履其大足指見斬遂失履姑浮取之也還卒於陘去㩦李七里夫差使人立於庭苟出入必謂巳曰夫差而忘越王之殺汝父乎則對曰唯不敢忘三年乃報越也又曰五年春晉圍栢人士吉射奔齊􅀄范氏之臣王生惡張桞朔言諸昭子使爲栢人令柳朔爲栢人宰也昭子范吉射也昭子曰夫非而讎乎對曰私讎不及公好不廢過惡不去善義之經也臣敢違之及范氏出栢人奔齊張栁朔謂其子尔從主免之我將止死王生授我矣授我以死節也公羊傳曰齊哀公享乎周紀侯譛之襄公將復讎乎紀逺祖九丗矣九丗猶可以復讎乎雖百代可也家亦可乎曰不可國何以可國君一體也先君之耻猶今君之耻也戰國䇿曰晉畢陽之孫豫譲始事范中行氏不􅀃去而就知伯知伯寵之及三晉分知氏趙襄子最怨知伯而將其頭以爲飲器讓遁逃山中曰嗟乎士爲知巳者死女爲悅己者容吾其報知氏之讎矣乃變姓名爲刑人入宫塗厠欲以刺襄子襄子如厠心動執問塗者讓刃其扞曰欲爲知伯報讎左右欲殺之襄子曰彼義士也吾謹避之耳知伯已死無後而其臣報讎此天下之賢人也卒釋之讓又􅃮身爲癩滅􅂡去眉自刑以變其容爲乞人而徃乞其妻不識曰􅃺貌不似吾夫其音何􅀋吾夫之甚也又吞炭爲亞變其音有謂之曰子之道甚難而無功謂子有志則然矣謂子智則否以子之才而善事襄子襄子必近子子之得近而行所欲此甚見而功必成讓乃􅀏而應之曰是爲先知報後知爲故君賊新君大亂君臣之義者無此矣凢吾所謂此者以明君臣之義非從易也且夫委質而事人而求弑之懷二心以事君也吾所爲難亦將以愧天下後丗人臣懷二心者頃之襄子當出讓伏所當過橋下襄子至橋而馬驚襄子曰此必豫讓也使人問之果讓於是襄子數讓曰子不甞事范中行氏乎知伯滅范中行氏而子不爲報讎反委質事知伯知伯巳死子獨何爲報之深也讓曰臣事范中行氏中行氏以衆人遇我我故衆人報之知伯以國士遇我我故國士報之襄子乃喟然泣曰嗟乎豫子豫子爲知伯名旣成矣寡人舎子亦以足矣子自爲計使兵環之譲曰臣聞明主不掩人之義忠臣以死爲名君前以寛舎臣天下莫不稱君之賢今日之事臣故伏誅然願請君之衣而撃之則死不恨非所望也敢布腹心於是襄子義之乃使使者持衣與讓譲拔劒三躍擊之曰可以報知伯矣遂伏劒而死死之日趙國之士聞者皆爲涕泣史記曰􅁗昭王聞魏齊在平原君所欲爲范睢必報其仇乃佯爲好書遺平原君曰願與君爲布衣之交十日飲也又曰項梁殺人與項籍避仇吳中呉中賢大夫皆出項梁下又曰留侯張良者其先韓人也秦滅韓良家僮三百人弟死不葬悉以家財求客刺􅁗王爲韓報仇以大父五代相韓故乃變姓名之東海得力士以鐵椎椎秦始皇中其副車又曰河東李文故甞與張湯有􅂩已而爲御史中丞湯有所愛史魯謁居知文與湯弗平使人上飛變告文姦事事下湯湯治論殺文􅀽山松後漢書曰􅂫謙字仲讓爲郡督郵李暠爲美陽令貪􅁀謙案得其贓謙遷金城太守治有異跡延熈九年至京師暠時爲司􅀠收謙誣䧟之死獄中謙子不韋字公先變名姓以家財求劒客邀暠不得暠之大司農乃於司農府旁買舎夜爲地突入暠室中暠適出不值破其卧具暠大怖􅁄屋上以板棧地而卧一􅀫數徙不韋乃至魏郡掘暠父􅃁斬級以􅀕父墓級首又曰樂府左延年􅁗女休行曰始出上西門遥望􅁗氏家􅁗氏有好女自名曰女休女休年十五爲宗行報讎左執白陽刀右據宛景矛讎家東南僵女休西上山上山四五里關吏不得休女休前置辭生爲燕王婦今爲詔獄囚刀矛未及下攏􅥧擊鼔赦書下東觀漢記曰海曲有吕母者子爲縣吏犯小罪宰論殺之吕母怨宰宻聚客規以報仇母家素豐貲産數百萬乃益釀醇酒買刀劒衣服少年來沽者皆貰與之視其乏者輙假衣裘不問多少少年欲相與償之吕母泣曰縣宰枉殺吾子欲爲報怨耳諸君寧肯哀之乎少年許諾相聚得數十百人因與吕母入海自稱將軍遂破海曲執縣宰殺之以􅀕其子冡也又曰趙喜字伯陽南宛人也少有節操從兄爲人所殺無子喜十五常思欲報之乃挾兵結客後遂徃復仇而仇家皆疾病無相拒者喜以因疾報殺非仁者心且釋之而去顧謂仇曰尔曹􅀂徤逺相避也後病愈悉自􅅞詣喜不與相見後竟殺之又曰周黨字伯况太原人至長安遊學􅀄郷佐甞衆中辱黨父黨懷之後讀春秋聞復讎之義更輟講而還與郷佐剋日交刃黨爲其所復困頓郷佐服義與歸養之數月方􅂫旣悟而去整身修志州里稱其髙也又曰申屠蟠同郡緱氏女玉爲父報讎殺夫氏之黨吏執玉以告外黄令梁配欲論殺玉蟠時年十五爲書生進諫曰玉之節義足以感無耻之孫激忍辱之子不遭明時當表旌廬墓況在清聽而不加哀矜配善其言乃爲讞得減死論郷人稱美之又曰酒泉龐㳙母者趙氏之女字娥父爲同縣人所殺而娥兄弟三人俱疾物故讎乃喜而自賀以爲莫已報也娥隂懷感憤乃潜備刀兵常推車以候讎家十餘年不能得後遇於都亭刺殺之因詣縣自首曰父仇巳報請就刑戮福冨長尹喜義之解印綬欲與俱亡娥不肯去曰怨塞身死妾之明分結罪治獄君之常理何敢苟生以枉公法後遇赦得免州郡表其閭太常張奂嘉歎以束帛禮之又曰彭寵故舊渤海趙寛妻子家屬依託寵居寛仇家趙伯有好奴以賕寵寵貪之爲盡殺寛家屬寵之勃徳不仁貪狼如此又曰郅惲友人董子張病將終惲候之子張視惲戯欷不能言惲曰吾知子不悲天命痛讎不復也惲即起將客遮仇人取其頭以示子張子張見而氣絶惲即詣縣以狀自首漢書曰原渉與新豐冨人祁大伯友大伯同母弟王游公素嫉渉時爲縣門下􅁺􅀃尹公曰君以守令辱原渉如是一旦眞令至君復單車歸爲府史渉刺客如雲殺人皆不知主民可爲寒心今爲君計莫若條奏其舊惡君必得真令如此渉亦不敢怨矣尹公如其計王莽果以尹公爲真令渉繇此怨王游公遂殺游公及子斷兩頭去謝承後漢書曰橋􅀇遷齊國相郡有孝子爲父報讎繫臨淄獄􅀇愍其至孝欲上讞减罪縣令路芝酷烈苛􅁀因殺之懼玄收録佩印綬欲走􅀇自以爲深􅀒孝子捕得芝束􅅞藉械以還笞殺以謝孝子􅁈魂范曄後漢書曰劉鯉更始子也得幸於劉輔鯉怨劉盆子害其父因輔結客殺盆子兄故式侯恭輔坐繫詔獄三日乃得釋魏志曰楊阿若後名豐字伯陽少遊俠常以報仇解怨爲事至建安中太守徐揖誅郡中強族黄氏時黄昂得脫在外乃募衆得千餘以攻揖揖城守豐時在外以昂爲不義乃􅂢妻子入南羌中合衆得千餘􅀐昂獨走出􅆧捕得之豐遂殺之又曰韓曁字公至同縣豪右陳茂譛曁父兄幾致大辟暨陽不以爲言庸賃積資隂結死士遂追㝷擒茂以首􅀕父墓由是顯名又曰典韋形貌魁捂膂力過人好節俠襄邑劉氏與睢陽李禮爲讎韋爲報之禮故冨春長備怨甚謹韋乗車載雞酒僞爲候者門開懷匕首入殺禮并殺其妻徐岀取車呉志曰孫翊之妻徐氏甚美賊嬀覽殺翊悉取其嬪妾而復欲逼徐氏恐違之見害時月垂竟乃使人謂覽乞至晦日設􅀕除服覽許之徐氏遂潜使親信者語翊舊所委任將孫髙􅀓嬰二人具白逼巳之狀欲徴立計以求助焉髙嬰等聞之涕泣言舊蒙翊恩許之乃宻結翊平時所侍養二十餘人以徐氏之言語之仍皆􅉀誓合謀至晦日徐氏遂設􅀕除服薫衣沐浴内施帷帳以􅀱覽焉大小怪其如此無不悽愴覽宻遣偵之無復疑慮徐氏乃命髙嬰輩羅住戸外使人報覽言巳除凶畢矣覽遂盛飾而入徐氏出拜戸外覽􅂊下拜徐氏即呼二郡可起髙嬰等齊出即時殺覽徐氏却服縗絰使持覽首以􅀕墓舉軍震駭以爲神韋昭呉書曰凌統怨甘寧殺其父操寧常避統不與相見孫權亦命統不得讎之甞於吕蒙舎酒酣統乃以刀舞寧起曰寧能􅀟㦸舞蒙曰寧雖能未若蒙之功也因操刀楯以身分之王隱晉書曰趙誘爲杜曽所害誘子胤斬曽食其肝肺又曰桓温父􅀍害之時温年十五枕戈泣血宻欲報仇經年方知乃提刀直進手刃仇人由是名重當時又曰龔壯字子偉值惠懷末天下大亂李特爲㓂壯父叔並爲特所害壯欲報仇㑹李壽鎮漢中壽時與李期有嫌壯因􅀃壽討期壽然之遂帥衆還討期特孫也故壯假以復讎壽旣捷因欲官壯誓不仕又曰沈充敗于呉興呉興人呉儒充之將也充亡失道誤入儒家誘内充重壁因􅀏謂充曰三千户侯也充曰封侯不足貪也爾大義全我我宗族必厚報􅀂必殺我汝族滅矣儒遂殺之充子勁字丗堅即潜報仇族滅呉氏沈約宋書曰沈林子以仇讎未復從髙祖尅京城進平都邑時年十八身長七尺五寸仇沈預慮林子爲害常􅀍甲持戈至是林子與兄田子還東報讎五月夏節直入預男女無長㓜悉屠之以預首􅀕父祖墓孫嚴宋書曰宋越父爲蠻所殺其讎甞出郡越白日於市口刺殺之太守夏侯穆嘉之擢爲隊主後魏書曰淳于誕字靈逺年十二隨父向楊州父於路爲盗所害誕雖童稚而哀感奮發傾資結客旬朔之内遂得復讎由是州里歎異之又曰孫益德其母爲人所害益德童㓜爲母復仇還家哭於殯以待縣官髙祖文明太后以其㓜而孝決又不逃罪特免之梁書曰張景仁廣平人也父天監􅀄爲同縣違法所殺景仁時年八歲及長志在復讎普通七年遇法公田渚手斬其首以􅀕父墓事竟詣郡自􅅞乞依刑法太守蔡天起上言乃下教褒美之原其罪下属長蠲其一户租調以旌孝行唐書曰絳州孝女衛氏子無忌夏縣人也􅀄其父爲郷人衛長則所殺無忌時年六歲母又嫁更無弟兄及長常思復讎無忌從伯甞設宴爲樂長則時亦預坐無忌以摶擊殺之旣而詣吏稱父讎旣報請就刑戮廵察大使黄門侍郎禇遂良以聞太宗嘉其孝烈特令免罪給傳乗徙於雍州并給田宅仍令州縣以禮嫁之太平御覽卷第四百八十一
