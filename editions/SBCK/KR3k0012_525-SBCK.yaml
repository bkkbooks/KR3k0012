front:
  text: 太平御覽卷第五百二十五禮儀部四
  hash: sha256:c1804614664b39c0efa5326a3b4675e53172cf2acf90aa495a859d11840e20b0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_525-1a}
body:
  text: 􅀕禮中又􅀕義曰􅀕不欲數數則煩煩則不敬􅀕不欲䟽䟽則怠怠則忘是故君子合諸天道春禘秋甞霜露旣降君子履之必有悽愴之心非其寒之謂也春􅀨露旣濡君子履之必有􅇶􅅥之心如將見之又􅀕義曰文王之􅀕也事死者如事生􅀕之明日明發不􅄰饗而致之又從而思之􅀕之日樂與哀半饗之必樂巳至必哀又􅀕義曰郊之􅀕大報天而主日配以月夏后氏􅀕其闇殷人􅀕其陽周人􅀕日以朝及闇􅀕日於壇􅀕月於坎以別幽明以制上下􅀕日於東􅀕月於西以別内外以端其位日出於東月生於西隂陽長短終始相廵以致天下之和又􅀕義曰􅀕之日入室僾然必有見乎其位周還出户肅然必有聞乎其容聲岀戸而聽愾然必有聞乎其嘆息之聲周還出户謂薦設時也無户者一户􅀂食間則有出户而聽之又􅀕義曰孝子將􅀕慮事不可以不豫比時具物不可以不備虚中以治之此時猶先時也虚中言不兼念餘事宫室旣脩牆屋旣設百物旣備夫婦齋戒沐浴盛服奉承而進之洞洞乎屬屬乎如弗勝如將失之其孝敬之心至也與脩設謂掃除及黝堊薦其薦爼序其禮樂備其百官奉承而進之百官助主人進之於是諭其志意以其慌愡以與神明交庶或饗之庶或饗之孝子之志也又志統曰凡治人之道莫急於禮禮有五經莫重於􅀕禮有五經謂􅁻禮凶禮賔禮軍禮嘉禮也莫重於􅀕謂以􅁻禮爲首也夫􅀕者非物自外至者也自中出生於心也心􅇶而奉之以禮是故唯賢者能盡􅀕之義􅇶感念親之貌也賢者之􅀕也必受其福非世所謂福也福者備也備者百順之名也無所不順者之謂備言内盡於巳而外順於道也忠臣以事其君孝子以事於親其夲一也又􅀕統曰􅀕者所以追飬繼孝也孝者畜也順於道不逆於倫是之謂畜畜謂順於徳敎是故孝子之事親也有三道焉生則養殁則喪喪畢則􅀕養則觀其順也喪則觀其哀也􅀕則觀其敬而時也盡此三道者孝子之行也殁終也又􅀕統曰夫􅀕有十倫焉見事􅀑神之道焉見君臣之義焉見父子之倫焉見貴賤之等焉見親踈之殺焉見爵賞之施焉見夫婦之別焉見政事之均焉見長㓜之序焉見天下之際焉此之謂十倫倫猶義也又􅀕統曰凡􅀕有四時春􅀕曰杓夏􅀕曰禘秋􅀕曰甞冬􅀕曰烝謂夏殷時禮也礿禘陽義也甞烝隂義也禘者陽之盛也甞者隂之盛也故曰莫重於禘甞夏者尊卑著而秋萬物成又􅀕統曰周公旦有勲勞於天下成王而欲尊魯故賜之以重􅀕外􅀕則郊社是也内􅀕則大甞禘是也言此者善周公功也又表記曰􅀕極敬不繼之以樂朝極辯不繼之以倦極猶盡也辯分別政事也􅀕義曰􅀕之日樂與哀半饗之必樂巳至必哀又表記曰子曰后稷之祀易冨也其辭恭其欲儉其禄及子孫冨之言備也以傳世之禄兵倫者之􅀕易備也禮稽命徴曰天子􅀕天地宗廟六宗五嶽得其冝則五􅂖豐雷􅀨時至四夷貢物青白黄馬黄龍翔黄雀集坤爲地得冝則五榖豐矣土精上爲軒轅主雷雨得冝故又應時至也士瀆四輔故四夷各貢方色之馬也精爲馬不言赤黒義足通也黄龍黄雀皆土精也周易豫象曰雷岀地奮豫先王以作樂崇徳殷薦之上帝以配祖考又困九五曰利用􅀕祀􅀕祀所以受福也象曰利用􅀕祀受福也又旣濟曰九五東鄰殺牛不如西鄰之禴􅀕實受其福牛􅀕之盛者也禴􅀕之薄者也居旣濟之時而處尊位物皆濟矣將何爲焉其所務者􅀕祀而巳􅀕祀之盛莫盛脩徳故沼沚之毛蘋繁之菜可羞於􅀑神故􅁰稷非馨明徳惟馨是以東鄰殺牛不如西鄰之禴􅀕實受其福也又曰觀盥而不薦有孚顒􅀂王道之可觀者莫盛乎宗廟宗廟之可觀者莫盛於盥也至薦􅂤略不足復觀又萃曰萃亨王假有廟假至也王以聚至有廟也􅂏曰王假有廟致孝享也全聚乃得致孝之享也左傳桓公曰凡祀啓蟄而郊言凡祀通下三句天地宗廟之事啓蟄夏正建寅之月祀天南郊龍見而雩龍見建巳之月蒼龍􅀫之體昬見東方萬物始盛時雨而大故􅀕天逺爲百榖祈膏􅀨始殺而甞建酉之月隂氣始殺嘉榖始熟故薦甞於宗廟閉蟄而丞建亥之月昆蟲閉户萬物皆成可薦者衆故烝􅀕宗廟又僖上曰五年晉人執虞公而脩虞祀歸其職貢於王虞所命也又僖中曰􅀄平王東遷也辛有適伊川辛有周大夫也見􅀍髮而􅀕於野者曰不及百年此其戎乎其禮先亡矣秋􅁗晉遷陸渾之戎于伊川又僖下曰夏四月四卜郊不從乃免牲非禮也猶三望亦非禮也禮不卜常祀而卜其牲曰牛卜日曰牲成而卜郊上怠慢也望郊之細也不郊亦無望可也又僖下曰衛成公夢康叔曰相奪予享相夏后啓之孫也居帝丘享􅀕也公命祀相寗武子曰不可􅀑神非其族􅀋不歆其祀祀鄫何事相之不享於此矣衛之罪也不可以聞成王周公之命祀請改祀命改祀相之命也又文下曰大事于太廟躋僖公逆祀也僖是閔公兄不得爲父子甞爲臣位應在下今令居閔上故曰逆祀也於是夏父弗忌爲宗伯宗伯掌宗廟昭穆之禮也尊僖公見明見曰吾見新􅀑大故􅀑小新􅀑僖公旣爲兄死時年又長也故􅀑閔公死時年小弗忌明言其所見也先大後小順也躋聖賢明也言以僖公爲聖賢也明順禮也君子以爲失禮禮無不順祀國之大事也而逆之可謂禮乎子雖齊聖不先父食乆矣故禹不先鯀湯不不先契鯀禹父契湯十二丗祖文武不先不窋不窋后稷子也宋祖帝乙鄭祖厲王猶上祖也仲尼曰臧文仲其不智者三作虚器謂居蔡山節藻梲也縱逆祀聽夏父躋僖公祀爰居三不智也海鳥曰爰居止於魯東門外文仲以爲神命國人祀之又昭二曰鄭子産聘于晉韓宣子曰寡君寢疾今夢黄熊入寢門其何厲􅀑也對曰昔堯殛鯀于羽山其神化爲黄熊以入于羽淵實爲夏郊三代祀之晉爲盟主其或未之祀乎韓宣子祀夏郊晉侯有間又曰晉侯問於史趙曰陳其遂亡乎對曰陳顓頊之後也舜重之以明徳至胡公不淫故周賜之姓使祀虞帝臣聞盛徳必百丗祀虞之丗數未也公羊傳僖公曰􅂚爲或言三卜或言四卜三十禮也四卜非禮也三卜何以禮求􅁻之道三禘甞不卜郊何以卜卜郊何禮也禮天子不卜郊卜郊何以非禮魯郊非禮也以魯郊非禮故卜耳昔武王旣没成王㓜小周公居攝行天子事制禮作樂致大平有王功周公夢成王以王禮葬之命魯使郊以彰周公之徳非正故卜三􅁻則用之不􅁻則免牲也魯郊何以非禮天子􅀕天諸侯􅀕土土謂社天子有方望之事方望謂郊時所望􅀕四方羣神日月星辰風伯雨師五嶽四瀆及餘山川三十六所也無所不通諸侯山川有不在其封内者則不􅀕也􅂚爲或言免牲或言免牛免牲禮也免牛非禮也免牛何以非禮傷者曰牛三望者何望􅀕也然則􅂚􅀕􅀕泰山河海山川有能潤千百里者天子秩而􅀕之此皆助天宣氣布功故􅀕天及之觸石而出膚寸而合不崇朝而徧􅀨乎天下者唯泰山爾河海潤于千里榖梁傳曰宫室不設不可以􅀕􅀕者薦其時也薦其敬也薦其義也非享味也又僖公曰夏四月不郊四卜非禮也免牲者爲之緇衣纁裳有司玄端奉送至於南郊免牛亦然乃者亡乎人之辭也猶者可以巳之辭也國語楚語曰屈到􅄝芰有疾召其宗老而屬之屈到楚卿屈蕩之子也芰菱也宗老宗臣屬託也曰􅀕我必以芰及祥宗老將薦芰屈建命去之建屈到之子子木也宗老曰夫子屬之子木曰不􅀕然典有之曰國君有牛享大夫有羊饋士有豚犬之奠庶人有魚炙之薦不羞珍異不陳庶侈夫子不以其私欲干國之典遂不用又楚語曰子期祀平王􅀕以牛爼於王子其楚平王之子結也牛爼致爼於王也王問於觀射父曰祀牲何及對曰祀加于舉舉人君朔望之盛饌也天子舉以太牢祀以㑹太牢牛羊豕也㑹亦太牢舉西方之貢諸侯舉以特牛祀以太牢卿舉以少牢祀以特羊大夫舉以特牲祀以少牢特牲豕也士食魚炙祀以特牲庶人食菜祀以魚上下有序則民不慢王曰其小大何如對曰禘郊不過蠒栗烝甞不過握把王曰何其小也對曰天神以精明臨下民故求備物不求豐大是故先王之祀也以一純二精三牲四時五色六律七事八種九􅀕十日十二辰以致之純心純一也二精玉帛也三牲牛羊豕也四時春秋冬夏也五色五采服也六律黄鍾太簇姑洗蕤賔夷則無射也亡事天地人四時之物也八種八音異種也九􅀕九州之助􅀕也十日甲至癸也十二辰子至亥也百姓干品萬官億醜兆民經入畡數以奉之百姓百官受民姓也千品姓有徹品十爲干品五物之官陪屬萬爲萬官官有十醜爲億醜天子之田九畡以養兆民王取經入以食萬官也明徳以昭之和聲以聽之以告徧至徧至光􅀍四表格于上下也明無不受休天子禘郊之事必自射其牲王后必自親春其粢諸侯宗廟之事必自射牛羊繫豕夫人必自舂其盛况其下之人其誰敢不戰兢以事百神春秋繁露曰大雩者何旱􅀕也難者曰大旱乃雩􅀕而請􅀨大水鳴鼓而攻社天地之所爲隂陽之所起也或請焉或怒焉何也曰大旱者陽滅隂也陽滅隂者尊􅎹卑也固其義也雖大甚拜請之而巳無敢有加也大水者隂滅陽也隂滅陽者卑勝尊也故鳴鼔攻之朱􅁝而脅之又曰古者歳四􅀕因四時所生熟而􅀕先祖父母也春曰祠祠者以正月始食韮也夏曰禴禴者以四月煑麫餅也秋曰甞甞者以七月甞􅁰稷冬曰烝烝者以十月進􅀄稲也論語季氏曰季氏旅於泰山子謂冉有曰汝不能救與旋􅀕名也諸侯􅀕山川在其􅀖内者今陪臣􅀕泰山非禮也對曰不能子曰嗚呼曽謂泰山不如林放乎孔子意云泰山之神知禮過林放之賢逺􅀕如在􅀕神如神在子曰吾不與􅀕如不􅀕孝經云春秋􅀕祀以時思之鄭玄注曰四時變易物有成熟將欲食之先薦先祖念之􅀂生不忘親也爾雅曰春􅀕曰祠祠之言食也夏􅀕曰礿新菜可礿也秋􅀕曰甞甞新榖也冬􅀕曰烝進品物也􅀕天曰燔柴旣􅀕積薪燒之􅀕地曰瘞埋旣􅀕埋藏也􅀕山曰􅔑懸或􅔑或懸置之於山山海經曰懸以􅁻王是也􅀕川曰浮沉投􅀕水中或沉或浮也􅀕星曰布布散􅀕於地也􅀕風曰磔今俗當大道中磔狗云止風此其象也是􅀋是禡師􅀕也師岀征伐􅀋於上帝禡於所征之地旣伯旣禱馬􅀕也伯􅀕馬祖也將用馬力必先􅀕其先祖也禘大􅀕也五年一􅀕也繹又􅀕也􅀕之明日㝷繹復􅀕東南郊常奉祀如忌方其後人上書言古者天子三年一用太牢祠三一天一地一太一天子許之令太祝領祠之於忌太一壇上如其方後人復有上書言古者天子常以春解祠祠黄帝用一梟破鏡孟康曰梟鳥名也食母破鏡獸名食父黄帝欲絶其􅀋使百物祠皆用之破鏡如貙而虎眼如淳曰漢使東郡送梟五月五日作梟羮以賜百宫以其惡鳥故食之􅁳羊用羊祠服䖍曰神名也馬行用一青壯馬太一畢山山君地長用牛武夷君用乾魚隂陽使者以一牛孟康曰隂陽之神也令祠官領之而祠於忌太一壇旁漢書曰髙祖沛公祠黄帝􅀕􅃖尤於沛庭而釁鼔旗幟皆赤又曰髙祖微時聞魏公子賢及即位毎過大梁常祀公子髙祖十二年從擊黥布還爲公子置守冢歳四時奉祀公子矣又張子房從髙帝過濟北果得榖城山下黄石取而葆祠之及留侯死并葬黄石冢伏臘祠黄石留侯又郊祠志曰文帝下詔曰有異物之神見于成紀無害於民歳以有年朕親郊祀上帝諸神禮官議無諱以朕勞有司禮官曰古者天子夏親祠上帝於郊故曰郊於是天子始幸雍郊見五帝以孟夏四日荅禮焉又曰宣帝八月飲酎行祠孝昭廟先驅旄頭劒挺墮墜首挿泥中刃向乗輿車馬驚公孫賀筮之有兵謀不􅁻卜還使有司侍祠是時霍氏外孫代郡太守任宣坐謀反誅宣子章爲公車丞亡在渭城界中夜入廟居郎間執㦸立廟門待上至欲爲逆發覺伏誅故事帝夜入廟其後待明而入自此始也又曰孔光父霸爲􅀜内侯食邑霸上書求奉孔子􅀕祀元帝下詔曰其令師襃成君􅀜内侯霸以所食邑户八百祀孔子焉故霸遣長子福數於魯奉夫子祠又曰􅀄朱邑且死屬其子曰我故爲桐郷嗇夫其吏民愛我必葬桐郷後世子孫奉尚我不如桐郷民及死其子葬之桐郷西郭外民果共立祠歳時祠􅀕至今不絶太平御覽卷第五百二十五
