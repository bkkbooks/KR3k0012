front:
  text: 太平御覽卷第六百二十六
  hash: sha256:45d48c812a22a12217e4a7b36a60b6c541adc054b8b860fba258a490dd55051e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_626-1a}
body:
  text: 治道部七貢賦下漢書曰孝文時晁錯說上令人入粟得以拜爵邊食足支五歳可令入粟郡縣足支一歳已上可時赦勿収農人租如此德澤加於萬人帝從之後天下充實乃下詔曰農天下之夲務莫大焉今勤身從事而有租稅之賦是謂夲末者無以異也夲農也末賈也言農與賈俱出租無異也於勸農之道未備其除田之租稅又曰董仲舒說上曰古者稅人不過十一其求易供使人不過三曰其力易足􅁗用啇鞅之法加月爲更卒巳復爲正卒一歳屯戍一歳力役三十倍於古更卒謂給郡縣一月而更者也正卒謂給中都官者率計令人一歳之中屯戍及力役之事三十倍多於古也田租口賦塩鐵之利二十倍於古􅁗賣塩鐡貴故下人受其用也旣收田租又出口賦而官更奪塩鐡之利卒計一歳之中失其資二十倍多於古也或耕豪人之田見稅十五故貧人常衣馬牛之衣而食犬􅇾之食又曰倪寛爲左内史勸農業緩刑獄卑體下士務在於得民心收租稅時裁闊狹與民相假貸爲有貧弱及農要之時不即徵収也以故租多不入後有軍發左内史以􅀒租課殿當免皆恐失之大家牛車小家擔􅀒輸租繦屬不絶課吏以最上上由此愈竒寛又曰元鳯中詔曰夫榖賤則傷農今三輔太常榖减賤减猶少也其令以菽粟當今年賦租稅元年􅀄詔曰天下以農桑爲夲日者省用罷不給官减外徭耕桑者益衆而百姓未能家給朕甚􅉖焉其减口賦錢有司奏請减什三上許之後漢書曰建武中田租三十稅一有産子者復以三年之筭明帝即位人無横徭天下安寕時􅂖尚貴尚書張林上書言榖所以貴由錢賤也可盡封錢一取布帛爲租以通天下之用從之魏志曰太祖􅀄平􅀽紹下令田租􅅿収粟四􅂛戸絹二疋綿二斤餘不得擅興晉書曰武帝平呉後制戸調之式丁男之戸歳輸絹三疋綿三斤女及次丁男爲戸者半輸諸邊郡或三分之二逺者三分之一夷人輸賨布戸一疋逺者或一丈不果田者輸義米戸三斛逺者五斗極逺者輸筭錢人二十八文齊書曰髙帝􅀄竟陵王子良上表曰今所在􅂖價雖和而比室飢嗛縑纊雖賤駢門躶質而守宰務在裒刻圍桑品屋以准貲課政令斬樹發瓦以充重賦破人敗産賈利一時進違舊科退容姦利欲人康泰其可得乎隋書曰􅀄蘇威父綽在西魏時以國用不足爲征租稅之法頗稱爲重旣而歎曰今所爲者正如張弓非平丗也後之君子誰能施乎威聞其言毎以爲己任至是威爲納言奏減賦役從輕典帝悉從之又曰開皇元年陳平上御朱雀門觀凱旋因行慶賞頒給所費三百餘萬帝以江表􅀄定給復十年自餘諸州並免當年租賦十二年有司上言庫藏皆滿帝曰朕旣薄賦於人又大經賜用何得爾也對曰用處常出納處常入略計毎年賜用至數百萬叚曽無减損乃更開左藏之院搆屋以受之詔曰旣冨而教方知廉恥寜積於人無藏府庫今年田租三分減一兵减半功調全免唐書曰開元八年二月制曰頃者以庸調無慿好惡湏准故遣作様以頒諸州令其好不得過精惡不得至濫任土作貢防源斯在諸州送物作巧生端苟欲副於斤兩遂即加其丈尺有至五丈爲疋者理甚不然闊尺八長四丈同文共䡄其事乆行立様之時湏載此數􅀂求兩而加尺甚暮四而朝三冝令所司簡閱有踰於比年常例尺丈過多者奏聞又曰開元二年十五年定令諸課户一丁租調准武德二年之制其調絹絶布並隨郷土所出絶絹各二丈五尺輸絹絁者綿三兩輸布麻三斤其絹絁爲疋布爲端綿爲屯麻爲綟􅀂當户不成疋端屯綟者皆隨近合成其調麻毎年支料有餘折一斤輸粟一􅂛與租同受管子曰地之生財有時人之用力有倦人君之欲無窮以有時與有倦養無窮之君而度量不生於其間度量不生賦投無限也則上下相疾也又曰桓公伐楚濟汝水踰方城望汶山使貢絲於周室列子曰周穆王大征西戎西戎獻昆吾之劒切玉如泥又曰周王時西域國有山人來王爲中天之臺月月獻玉衣旦旦薦玉食王執山人之祛騰而上天文子曰楚人檐山鷄路人問曰何爲也欺之曰鳯凰也路人請十金弗與倍乃與之將獻楚王經􅀫鳥死路人不惜其金唯恨不得獻國人傳之咸以爲真鳯遂聞楚王王感其貴買欲獻於已厚賜之過於買鳥之金十倍舜子曰齊威王夫人死有十孺子薛公欲知王所立爲十玉珥而美其一獻於王王以賦十孺子明曰坐視美珥所在而勸以爲夫人也孟獻子曰畜馬乗不察於雞豚伐冰之家不畜牛羊百乘之家不畜聚歛之臣與其有聚歛之臣寧有盗臣此謂國不以利爲利以義爲利也孟子曰夏后氏五十而貢殷人七十而􅂇周人百􅅿而徹其實皆什一也徹者徹也􅂇者藉也詩曰雨我公田遂及我私唯􅂇爲有公田由此觀之雖周亦􅂇也又曰尊賢使能則天下之士皆恱而願立於其朝矣市􅒡而不征則天下之啇皆恱而願藏於其市矣㕓市宅也古無征衰丗征之王制曰市􅌀而先稅周禮曰國宅無征法而不㕓者當以什一之法征其地耳不當征其㕓宅也􅀜譏而不征則天下之旅皆恱而願出於其路矣言􅀜禁異服異語耳不征稅也周禮曰􅀜市之賦司􅀜門之征猶譏王制不征謂文王以前文王亦不征也耕者􅂇而不稅則天下之農皆恱而願耕於其野矣􅂇者井田什一􅂇佐公家治公田不横稅賦􅀂履畒之􅀋廛無夫里之布則天下之人皆恱而願爲之氓矣里居也布錢也夫一夫也周禮曰宅不毛者岀里布田不耕者有屋粟凢人無職事者出夫家之征襄代縁是之重故孟子欲反則寛夫去里布則人皆樂之人白圭問孟子曰吾欲二十而取一何如孟子曰子之道貊道也萬室之國一人陶則可乎曰不可器不足用也夫貊五􅂖不生唯􅁰生之無城郭宫室宗廟􅀕祀之禮諸侯幣帛饔餼無百官有司故二十取一而足也今居中國去人倫無君子如之何其可也孫武曰夫帝王處四海之内居五千里之中焉能盡專其利是以分建諸侯以其利而利之使食其土之毛實役其人民之力故賦稅無轉徙之勞徭役無怨曠之歎矣新序曰楚人有獻魚楚王者曰獲魚食之不盡賣之不售棄之又惜故來獻之左右曰鄙哉辭也楚王曰子不知魚意其以此諭寡人也於是乃遣使恤鰥寡而存􅀌獨岀倉粟發幣而賑不足罷去後宫不御者出人以鰥夫楚民欣欣大恱隣國歸之荀恱論曰昔文帝十三年六月詔除人田租且古者十一而稅以爲天下之中正今漢人田或百一而稅可謂鮮矣然豪冨強人占田踰多其賦太半官収百一之稅而人輸豪家太半之賦官家之惠優於三代豪強之􅁀酷於亡􅁗是以惠不下通而威福分於豪人也今不正其本而務除租稅適足以資冨強也魚豢魏略曰漢陽嘉三年踈勒國王貢西海青石帶舟至皇甫謐帝王丗紀曰西王母慕舜徳來獻白環及玦并貢益地圖西京􅄂記曰􅀄脩上林苑群臣逺方各貢合枝李者楊乎楊孚異物志曰橘爲樹白華而赤實皮旣馨香裏又善味交阯有橘官一人秩三百石歳主貢御橘􅄂望氣經曰黄白氣潤澤入翼四海有侯王來獻者天子賜四海之國入􅎮諸侯王者有獻車者岀􅎮天子用車爲幣賜諸侯王魏文帝與王朗書曰孫權重遣使稱臣奉貢明珠百篚黄金千鎰馴象二頭或牝或牡擾禽鸚鵡其他珎玩盈舟溢航千􅀋萬品太平御覽卷第六百二十六
