front:
  text: 太平御覽卷第一百九十
  hash: sha256:6a36b5541659bb4c6b9dd8cd4858ed087edf2b0eaa3eab7e96bf6b965851469f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_190-1a}
body:
  text: 居處部十八倉囷􅁃倉說文曰倉榖藏也倉黄取而藏之故謂之倉周禮注曰藏米曰􅅒釋名曰倉藏榖物也詩云乃求千斯倉乃求万斯箱以峙其粻又曰豐年多黍多稌亦有髙􅅒万億及秭又曰我倉旣􅄹我􅁃惟億尚書曰武王克啇發巨橋之粟大頼于万姓巨橋紂倉也傳曰楚莊王賑廪同食注賑􅅒開倉同食上下無異禮記月令曰季春發倉廪賜貧窮又曰五榖皆入必量於歳又曰循行積聚無有不歛又曰孟冬命有司穿竇窖修囷倉謹蓋藏務積聚又曰國無九年之畜爲不足無三年之畜曰急周禮曰儲畜以待凶荒又曰倉人掌粟入之藏辦九榖之物以待􅀖用若榖不足則止餘法用有餘則藏之以待凶而頒之又曰廪人掌九榖之數以待國之匪頒賜稍食以歳之上下數􅀖用以知足否以詔榖用以治年之豐凶公羊傳桓公曰御廪災御廪者何粢盛之所藏也論語曰舊榖旣没新榖旣􅂛春秋佐􅂇期曰天廪倉神名均明史記曰舜母嫉舜舜父使舜塗泥倉放火而燒舜舜垂席而下得無傷又曰李斯年少時入倉觀倉中䑕食粟居大廡下斯乃歎曰人之賢不肖譬如䑕矣在所處耳乃從荀卿學帝王之術又曰宣曲任氏之先爲督道倉吏􅁗之敗也豪桀皆爭取金玉而任氏獨窖倉粟及楚漢交兵民不得田而豪桀金玉盡歸任氏又曰髙帝七年立太倉漢書曰汲黯因使矯制發倉救河内飢民上釋罪又曰武帝之􅀄民給家足太倉之粟陳陳相因詩曰如岡如阜如山如陵又宣紀曰耿夀昌奏設常平倉豐則籴儉則粜以利民又曰王嘉奏事曰孝文時吏居官者或長子孫以官爲氏倉氏庫氏則倉庫吏之後也又鄒陽上書呉王曰呉有諸侯之位而實冨於天子轉粟西郷陸行不絶水行滿河如淳曰言漢京師仰須山東漕運以自給耳不如海陵之倉又賈􅂢之上書曰武帝元狩六年太倉粟紅腐不可食又食貨志曰漢宣帝時年豐人少利時大司農中丞耿壽昌上計令郡國皆築倉以榖賤時増其價而籴以利農榖貴時減其價而粜以利人名曰常平倉百姓利之也後漢書曰韓韶字仲黄潁川舞陽人也少仕郡辟司徒府􅁗山賊公孫舉僞號歴年守令不能破多爲坐法尚書選三府􅁺屬能治劇者乃以韶爲羸長羸縣故城在今兖州塼城縣東北也賊聞其賢相戒不入羸境餘縣多􅀍㓂廢耕桑其流入縣界求索衣粮者甚衆韶愍其飢困乃開倉賑之所廪贍万餘户主者爭謂不可韶曰長活溝壑之民而以此伏罪含􅀏入地矣太守素知韶名徳竟無所坐又曰隗嚻旣敗公孫述欲安衆以成都郭外有􅁗時舊倉述改名白帝倉述以色尚白故改之自王莽巳來常空述即使人言白帝倉出榖如山陵百姓空市里徃觀之述乃大㑹羣臣問曰白帝倉竟出榖乎皆對言無述曰訛言不可信道隗王破者復如此矣俄而嚻將王元降述以爲將軍又曰虞詡時朝歌賊􅇞季等數千人攻殺長吏屯聚連年州郡不能禁乃以詡爲朝歌長故舊皆弔詡曰得朝歌何衰詡􅀏曰志不求易事不避難臣之職也不遇盤根錯節何以別利器乎始到河内太守馬稜勉之曰君儒者當謨謀廟堂之上反在朝歌邪詡曰􅀄除之日士大夫皆見弔勉詡籌之知其能爲也朝歌者韓魏之郊背太行臨黄河去敖倉百里而青兾之人流亡万數賊不知開倉招衆刧庫兵守成臯斷天下右臂此不足憂也今其衆新盛難與爭鋒兵不厭權願寛假轡䇿勿令有所舉閡而巳及到官設令三科以募求壯士自􅁺吏巳下各舉所知攻刧者爲上偷盗爲次帶喪服而不事家業者爲下收得百餘人詡爲之饗會悉􅀒其罪使入賊中誘令劫掠乃伏兵以待之遂殺賊數百人及潜遣貧民能縫者傭作賊衣以綵縫其􅅂爲幟幟記也續漢書曰以縫縷其􅅂也有市里者吏輙擒之賊由是駭散咸稱神明魏志曰􅀽渙字耀􅀸爲魏國郎中令及卒太祖爲之流涕以榖二千斛一敎以太倉榖千斛賜郎中令家一敎以垣下榖千斛與曜卿家外不解其意敎曰以太倉榖者官法也垣下榖者新舊也呉書曰建康宫城即呉􅁐城城内有倉名曰􅁐倉故開北瀆通轉運於倉所時人亦呼爲倉城晉咸和中修􅁐城爲宫惟倉不毀故名太倉在西華門内道北晉書鄭黙出爲東郡太守值􅀊荒人飢黙輙開倉賑給乃舎都亭自表待罪朝廷嘉黙憂國詔書褒歎比之汲黯班告天下若郡縣有此比者聽出給入爲散􅀐常侍又曰王渾武帝受禪加揚烈將軍遷徐州刺史時年荒饑渾開倉賑贍百姓頼之又曰王藴爲呉興太守民飢輙開倉贍䘏主簿請先列上待報藴曰行仁義敗無恨坐違科免官士庶詣闕左降晉陵太守郡國誌曰衡山石廪峯一如倉􅁃有二户一開一閇閇者亦有關鑰之形王子年拾遺記曰曹曽遇丗亂家家焚廬曽畜書万卷慮其先文湮没乃積石如倉廪以藏書丗謂曹家書倉焉水經注云汾陽故城積粟所在名之曰羊膓倉在晉門閭陽北石磴縈委若羊膓故以爲名即今羊膓坂是也越絶書曰君均東倉春申君造西倉名曰君均西倉門周一里八歩又曰呉兩倉春申君所造一名均輸洛陽記曰有常滿倉天門集曰廪星主倉說􅁐曰子路爲蒲令備水災興民春修溝瀆爲民煩苦故人予一簞食一壷漿孔子聞之使子貢止之子路忿然不恱往見夫子曰由也以暴雨將至恐有水災故與民脩溝瀆以備之而民多匱於食故與人一簞食一壷漿而夫子使賜止之何也夫子止由之行仁也夫子以仁敎而禁其行仁由也不受子曰尓以爲餓何不告於君發倉􅅒以給食之而以尓􅀻饋之是汝不明君之惠見汝之􅀻義也速巳則可矣否則尓受責不乆矣子路心服而退又曰北郭騷踵見晏子曰竊恱先生之義願乞所以養母者晏子使人分倉粟府金而遺之辭金而受粟有間晏子見疑於景公出犇北郭子召其友而告之曰吾恱晏子之義而甞乞所以養母者吾聞之曰養及親者身更其難今晏子見疑吾將以身白之遂造公庭求復之曰晏子天下之賢者也今去齊國國必侵矣方必見國之侵也不若先死請絶頸以白晏子逡廵而退因自殺也公聞之大駭乘馳而自追晏子及之郊請而反之晏子不得巳而反之聞北郭子之以死白巳也太息而嘆曰嬰不肖罪過固其所也而士以身明之哀哉晉陽秋曰泰始四年七月立常平倉豐則糴儉則糶以利民也管子曰錯國不傾之地積不涸之倉藏不竭之府注不涸之倉言務五榖也述征記曰東城二石橋舊於王城之東北開渠引洛水名曰陽渠東流經洛陽於城之東南然後北廻通運至建春門以輸常滿倉永嘉郡記曰青田溪發源太湖湖是白土無復細石中生藴藻冬天水􅀬如湯故衆魚歸之名爲魚倉益州記曰今成都縣東有頽城毀垣土人云古白帝倉也異􅁐曰餘姚縣倉封閇完密而年年輙大損耗是冨陽縣桓王陵上雙石􅀛所食即斵毁􅀛口於是無復􅃜減三輔故事曰漢大將軍周亞夫軍於細柳今石激是也石激西有細柳倉城東嘉禾倉老子曰田甚蕪倉甚虚管子曰倉廪實知禮節又曰不務地利則倉不􅄹莊子曰諸中國之在海内不似稊米之在太倉乎韓子曰韓昭侯之時黍種貴昭侯令人覆廪吏果竊黍種糶之淮南子曰近敖倉者不爲之多飯期滿腹而巳鹽鐵論曰匈奴因山谷爲城池水草爲倉廪地理志曰敖倉在河南廣武山鄭國所置漢王與頃羽爭天下運敖倉之粟囷西京􅄂記曰曹元理善筭友人陳廣漢有二囷忘其石數後筭欠一斗乃有䑕大如斗在其中呉志曰周瑜過魯肅求資肅有米三千石乃指一囷與之續異記曰晉陵無錫尉嚴無欲貯榖後開乃成虵以草焚之便貧詩曰胡取禾三百囷􅀆􅁃韓詩外傳曰王者藏於天下諸侯藏於百姓農夫藏於囷􅁃啇賈藏於篋笥毛詩曰曽孫之􅁃如坻如京注曰􅁃露積也太平御覽卷第一百九十
