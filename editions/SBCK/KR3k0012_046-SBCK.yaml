body:
  text: 地部十一江東諸山敬亭山蓋山九華山幘山牛渚山慈母山蕪湖山望夫山博望山陵陽山白紵山中山三鶴山黟山靈山巖山三山橫山鐡峴山九井山石城山攝山黃鶴山覆舡山北固山虎丘山女山秦履山馬鞍山中州山三白山馬蹄山祘山㑹骸山石姥山大辟山花山虞山陽城山姑􅂫山硯石山香山華山包山石鼓山粟山定山封山岝㟧山孺子山響山晚山百丈流襄二山印渚山天目山卞山敬亭山郡國志及宋永初山川記曰宛陵北有敬亭山山有神祠即謝朓賽雨賦詩之所其神云梓華府君頗有靈驗蓋山紀義宣城記曰登蓋山一百許歩有泉俗傳云昔有舒氏女未適人其父析薪於此女忽坐泉處牽挽不動父遽告家比來唯見清泉湛然其女性好音樂乃作􅃶􅁔即泉涌浪廻復有赤鯉一􅀟躍岀今作樂嬉遊泉猶故沸涌九華山九華山録曰此山竒秀髙岀雲表峯巒異狀其數有九故號九子山焉李白因遊江漢覩其山秀異遂更號曰九華又曰山之上有池塘數畒水田千石其池有魚長者半㝷頒首頳尾朱鬐丹腹人欲觀之叩木魚即躍以可食之物散於池中食訖而藏焉其水流􅂥爲龍池溢爲瀑泉入龍潭溪有白墡窟其􅁟如麵不墋歉歳人多食之顧野王輿地記曰九華山山髙一千丈劉禹錫序曰余嘗愛終南太華以爲此外無竒愛女几荆門以爲此外無秀及見九華始悼前言之容易也幘山宣城圖經曰幘山北面迤邐連九華山其山層峯嵳峩遐睇狀如冠幘因號爲幘山牛渚山宣城圖經曰牛渚山突岀江中謂爲牛渚圻古津渡處也江表傳云司馬徽論運命暦數云黃旗紫蓋見於東南終有天下者荆楊君子又壽春童謡言天子當西上孫皓大喜即載妻子及後宫數千從牛渚陸道西上云青蓋入洛陽適還大雪寒凍殆死輿地志云牛渚山首有人潜行云此處連洞庭傍達無底見有金牛狀異乃驚怪而岀牛渚山北謂之採石按今對採石渡口上有謝將軍祠又按江源記云啇侶於此取石至都輸造石渚因名採石呉初以周瑜屯牛渚鎭西將軍謝尚亦鎭此城慈母山宣城圖經曰慈母山在當塗縣北臨江丹陽記云山生簫管竹王襃洞簫賦云原夫簫管之所生于江南之丘墟即此處也其竹圎緻異於衆處自伶倫採竹嶰谷巳後唯此簳見珎歴代常給樂府而俗呼爲鼔吹山山有慈母祠也蕪湖山宣城圖經曰蕪湖山在縣西南山因湖以名之漢末於湖側置蕪湖縣以其地卑畜水非深而生蕪藻故因以名縣焉晉爲重鎭謝尚王敦皆鎭於此陳平縣廢以其地入當塗縣望夫山宣城圖經曰望夫山昔人往楚累歳不還其妻登此山望夫乃化爲石其山臨江周廻五十里髙一百丈博望山宣城圖經曰博望山有二山夾大江東曰博望西曰天門按郡國志云天門山亦曰峨嵋山楚獲吴艅艎於此按其山相對時人呼爲東梁西梁山據縣圖爲天門山輿地志云博望梁山東西隔江相對如門相去數里謂之天門宋孝武詔曰梁山天表象魏以旌國形仍以二山爲立闕故曰天門陵陽山宣城圖經曰陵陽山在涇縣西南一百三十里列仙傳云陵陽子明釣得白龍放之後五年龍來迎子明上丹陽陵陽山一百餘年乃得仙山髙一千餘丈又有子安仙人也來就子明二十年一旦忽死因葬山下常有黃鵠栖其處樹上鳴云子安子安也白紵山宣城圖經曰宣州白紵山在縣東五里本名楚山桓温領妓逰此山奏樂好爲白紵歌因改爲白紵山中山宣城圖經曰宣州中山又名獨山有溧水縣東南一十里不與群山連接古老相傳云中山有白兎世稱爲筆最精山前有水源號爲獨水按輿地記云宣州溧水縣有獨山下有獨水流演不息即此山也三鶴山宣城圖經曰三鶴山在溧水縣東南六十里昔有潘氏兄弟三人於此山求仙後道成化爲三白鶴於此冲天黟山黟音伊歙縣圖經曰北黟山在縣西北一百六十八里髙一千一百七十丈豊樂水岀焉舊名黃山天寳六年勑改焉案江南諸山之大者有天台天目而天目近連浙江天台俯瞰滄海江海者實以地下爲百川所歸然歙州則江之上㳺而海上濫觴也今計歙川之平地巳合與二山齊矣况其山又有摩天戞日之髙此則浙江東西宣歙池饒江等州山並是此山之支脉明矣其諸峯悉是積石有如削成煙嵐無際雷雨在下其霞城洞室符竇瀑泉則無峯不有􅀂林澗之下巖峦之上竒蹤異狀不可摸冩信霊仙之窟宅也山中峯有溪丘公仙壇彩霞霊禽捿止其上是浮丘公與容成子逰之處所昔有人到壇所忽見樓臺煥然樓前有蓮池左右有塩積米積遂歸引村人上取了不知其處所山下人往往聞峯上有仙樂之声霊山郡國志曰歙縣有霊山天欲雨先聞鼔角声此山上有圎石如車蓋縣以鼔鳴爲􅀱一鳴令遷不鳴令不去山一名三姑山三年一野火燒數未滿人燒之即雨新安記曰霊村有山生香草名曰霊香又有黃精山上有霊壇道士祈請不燒香自然芳馥村人常射獵經踐此土犯山神終無所獲又輿地志云霊山髙峻有圎石髙數丈上有石蓋也巖山山謙之丹陽記曰秣陵縣南三十里有巖山山西有石室山東大道左有方石長一丈刻勒銘題賛吴功德孫皓所建也三山山謙之丹陽記曰江寜縣北十二里濵江有三山相接即名三山舊時津濟道也横山山謙之丹陽記曰丹陽縣東十八里有横山連亘數十里或云楚子重至于横山是也鐵峴山山謙之丹陽記曰永世記云縣南百餘里鐵峴山廣輪二百許里山岀鐡楊州今鼓鑄之九井山姑熟記曰縣南十里有九井山即殷仲文九日從桓公逰九井賦詩處也石城山江乗地記曰石城山嶺鄣千里相重似􅀂一逰歷者以爲吴之石城猶楚之九疑也多生箭竹又有桑樹山上有城因以名焉攝山江乗地記曰扈村有攝山山多藥草可以攝生因名之方四靣各起重嶺逰者名繖山􅄱似繖也山頂舊有周江乗廟傳云吴時人未詳名字黃鶴山京口記曰有黃鶴山在縣界晉王恭爲刺史改創西南樓名萬歳西北名芙蓉樓至今存焉又輿地志云俗傳此樓飛向江外以鐵鎻縻之方巳覆舡山梁武輿駕東行記曰有覆舡山酒罌山南次髙􅌐山傳云昔髙驪國女來東海神乗舡致酒礼娉之女不肯海神撥舡覆酒流入曲阿故曲阿酒美也北固山南徐州記曰城西北有别嶺入江三面臨水號云北固劉楨京口記云廻嶺入江懸水峻壁舊北固作固字梁髙祖云作鎭作固誠有其語然北望海口實爲壯觀以理而推冝改爲顧望之顧輿地志云天景清明登之望見廣陵城如在青霄中虎丘山顧凱之虎丘山序曰吴城西北有虎丘山越絶書曰闔閭冢名虎丘銅槨三重女山山謙之南徐州記曰丹徒縣西九里臨江有女山山東許貢客刺孫筞所也秦履山山謙之南徐州記曰曁陽縣西南可三十五里有秦履山傳云秦皇登之以望江海馬鞍山山謙之南州記曰曁陽縣北九里馬鞍山東有黃山郭璞葬所中州山山謙之南徐州記曰南沙縣北百里有中州山昔在海中去岸七十里義熈以來沙漲遂與岸連三白山山謙之南徐州記曰剡縣有三白出鐵常供戎器山東頭南面有石穴髙丈餘容十數人􅁪津液流潤天將雨輙有雲群行從南來暎山山亦岀雲應之與同比就虞山即大􅀨矣馬蹄山劉損京口記曰石峴東連馬蹄山山上石有馬蹄跡因以爲名祘山劉損京口記曰祘山無峯嶺臨江魏文帝南望致歎㑹骸山吴郡縁海四縣記曰帶海有㑹骸山傳云山有金牛昔有兄弟三人共鑿求之坎崩同死因以爲名石姥山劉道眞錢唐記曰石姥山有一石甑厥􅃺殊似居絶嶺之顚大數十圍下有三石足支之大辟山郡國志曰餘杭大辟山本名餘杭山一名由拳髙峻爲最旁有由拳村岀藤􅁓晉書曰郭文字文舉隱於餘杭大辟山山中曽有猛獸殺一麈於菴側文舉因以語人人取賣之分錢以奉文舉曰我􅀂須此自當賣之所以相語不須故也花山陸道瞻吴郡記曰吴縣有花山太康中生千葉蓮花於上故曰花山虞山陸道瞻吴郡記曰海虞縣西六里有虞山上有仲雍冢陽城山董監吴地記曰冨春有陽城山縣氏所葬漢末上有光雲氣天屬姑􅂫山董監吴地記曰姑􅂫山一名姑胥連撗山之北越絶書云吴地胥門外有九曲路闔閭造以逰姑胥之臺望湖中闚百姑淮南子亦謂之姑餘硯石山董監吴地記曰硯石山在縣西門外亦名石鼔山又有琴臺在其上越絶書云呉人於硯石置館娃宫劉逵注吴都賦引楊雄方言云吴有館娃宫吴人呼美女爲娃故三都賦云幸乎館娃之宫張女樂而娱群臣今吴縣有館娃郷香山董監吴地記曰香山吴王遣美人採香於山因以爲名故有採香徑華山華山精舎記曰老子枕中記云呉西界有華山可以度難父老云山頂北有池上生千葉蓮花服之羽化因曰華山長林森大荒楚蔽日輿地志云山上有石鼔晉隆安中鳴乃有孫恩之乱山在縣西六十三里包山呉地記曰包山在縣西一百三十里中有洞庭深逺世莫能測呉王使霊威丈人入洞穴十七日不能尽因得玉葉上刻霊寳經二卷使示孔子云禹之書也又郡國志云洞庭山有宫五門東通林屋西達峩􅔞南接羅浮北達岱岳又按􅀇中記云呉國西有具區澤中包山有洞庭寳室入地下潜行通琅􅁘東武淮南子云斷脩虵於洞庭左傳云哀公元年夫差敗越於夫椒今太湖中别有夫椒山下有大洞天宫潜涌五岳包山上舊無三班謂虵虎雉侯景乱後乃有虎虵爲人之害石鼔山郡國志曰吴王離宫在石鼔山越王獻西施於此山山有石馬望之如人􅀐南有石鼔鼔鳴即兵起粟山吴地記曰粟山一名新石頭山上有城下有飛泉石杵有吴先王刻題處石杵西有舎古老言古於北採金劉道眞記云縣西有姥山絶嶺之上有石甑一人摇輙動與千人不異定山吴地志曰定山突岀浙江中波濤所衝行侣爲阻謝靈運詩曰朝發漁浦南暮宿富春郭定山杳雲霧赤亭無淹泊此山是也封山呉興記曰風渚在武康縣東十八里古防風國有風公廟水曰風渚山即封山也岝㠋山呉興記曰於潜縣西二里有岝㟧山有絶壁髙三十許丈謝安甞登之臨壁垂足曰伯昏無人何以過是當時稱以爲難一云本在太湖中禹治水移於此孺子山呉興記曰東遷縣有孺子山徐孺子入呉哭友人嘗登之因以爲名響山呉興記曰晩山北十八里有響山人於山下語無大小響則隨聲曲折應之晩山呉興記曰於潜縣西六十里有晩山悉是松木眞墨所出也百丈流襄二山呉興記曰山墟村有山名曰百丈流襄二山堯遭洪水此山不􅃿但餘百丈因以名山水流襄山嶺因名流襄印渚山呉興記曰印渚山上承浮溪水從渚以上至縣悉石瀬惡道不可行舡以下水道無險故行旅集焉晉王胡之爲吴興太守至印中歎曰非唯使人心情開滌亦􅁴日月清朗傳云渚次石文似印因以爲名天目山郡國志曰天目山上有數百年樹名曰翔鳯樹輿地志云上有兩湖謂左右目故名天目也山極髙峻上多美石泉木名茶雜道書曰天目山左髙於地七千五百丈右髙於地七千丈從廣三千里上有淵中有魚可食無毒虫水經注曰呉興郡於潜縣北有天目山山極髙峻崖嶺竦疊西臨後澗山上有霜木皆是數百年樹謂之翔鳯林東面有瀑布下注數畒深沼名曰蛟龍池水南流經縣西爲縣之西溪卞山郡國志曰卞山卞和採玉處山東足有一名簣髙數尺晉太康中人開之風雨晦􅄀遂止歷代莫知所封又宋書云蕭惠明爲吴興太守郡界有卞山山下有項羽神廟相承云羽多居郡㕔事前後七人太守不敢上㕔惠明謂綱紀曰孔季恭曽爲此郡未聞有災遂盛設筵榻接賔數日未幾惠明忽見一人長丈餘張弓挾矢向之旣而不見因發背旬日而殞太平御覽卷第四十六
