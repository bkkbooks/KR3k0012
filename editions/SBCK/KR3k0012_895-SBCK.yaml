front:
  text: 太平御覽卷第八百九十五
  hash: sha256:5875599360a28096f20c7fb096af858e0ef75acbf0ded1a599089b87b0a3645c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_895-1a}
body:
  text: 獸部七馬三晉書曰王濟善解馬性甞乗一馬著連乾鄣泥前有水終不肯渡濟云此必是惜鄣泥使人解去便渡故杜預謂濟有馬癖又曰王師敗於蕩隂嵇紹􅀍害􅀄紹之行也侍中􅁗准謂曰今日向難卿有佳馬否紹正色曰大駕親征以正伐邪理必有征無戰􅀂使乗輿失守臣節有在駿馬何爲聞者莫不歎息載記曰慕容廆有駿馬曰赭白有竒相逸力石季龍之伐􅁄城也皝將岀避難欲乗之馬悲鳴踶齧人莫能近皝曰此馬見異先朝􅀌常仗之濟難今不欲者盖先君之意乎乃止季龍尋退皝益竒之至是四十九歲矣而駿逸不􅃜儁比之於鮑氏􅍡命鑄銅以爲其象親爲銘讃鐫其旁置之薊城東掖門是􅀊象成而馬死又曰符堅遣使西域稱楊堅之盛德并以繒綵賜諸國王於是朝獻者十有餘國大宛獻天馬千里駒皆汗血朱鬛五色鳯膺麟身及諸珎異五百餘種堅曰吾思漢文之返千里馬咨嗟羙詠今獻馬其悉返之庶剋念前王髣髴古人矣乃命羣臣作止馬詩而遣之示無欲也又曰武昭王暠字􅀇盛少而好學性沉敏寛和羙噐度通渉經史尤善於文義及長頗習武藝誦孫呉兵法甞與吕光太史令郭黁及其同母弟宋繇同􅀫黁起謂繇曰君當位極人臣李君有國土之分家有騧草馬生白額駒此其時也吕光末京兆叚業自稱凉州牧以燉煌太守趙郡孟敏爲沙州刺史署􅀇盛效輦今敏尋卒燉煌護軍馮翊郭謙沙州治中燉煌索仙等以􅀇盛温毅有惠政推爲寧朔將軍燉煌太守􅀇盛􅀄難之會宋繇仕於業告歸燉煌言於􅀇盛曰兄忘郭黁之言耶白額駒今巳生矣􅀇盛乃從之又曰􅁃亮所乗馬的顱殷浩以爲不利勸賣之亮曰􅂚有巳之不安移於人乎晉中興書曰㳟帝之爲琅邪王好竒戯閉一疋馬於門内令人射之欲觀幾箭而死左右曰馬國姓而射之不祥甚矣乃止俄而桓􅀇篡位續安帝紀曰司馬休之奔廣固慕容超有欲害心而休之不知休之常以所乗騅馬於牀前養飼忽連鳴不食注目視鞍休之試􅀍之即不動也訖還牀坐馬又驚跳因試􅀐視馬即驟岀裁至門外奔而馳之走行數里休之頋望所住巳有㓂至乗以南奔殆而􅀗免後還荆州加騅馬揚武之號王隱晉書曰馬隆子咸爲成都王前鋒長沙王所統冠軍司馬王湖率衆討咸於馬市咸堅不動湖乃使數十􅀐下馬縳㦸於鞍而令向咸又使數十􅀐各刾所放馬馬驚奔咸軍軍壞湖因馳逐猛戰臨陣斬咸于寳晉紀曰桓範岀赴曹爽宣王謂蔣濟曰智囊徃矣濟曰智則智矣駑馬戀芻豆爽必不能用也鄧粲晉紀曰王湛有隱兄弟宗族皆以爲癡居墓次不交當丗兄子濟性好馬所乗駿快意甚愛之湛曰此馬雖快力薄不堪苦近見督郵馬當勝此濟然之取督郵馬榖食十數日與湛試之湛未甞乗馬卒然便􅀐馳騁歩驟不異於濟而馬不相勝湛曰直行平路何以别馬唯當於蟻封於是就蟻封盤馬濟馬果倒躓濟乃服崔鴻十六國春秋曰驍􅀐將軍吕光封西域平上䟽曰唯􅀛兹據三十六國之中制彼王侯之命入其國城天􅂹龍麟腰􅙂丹髦萬計盈厩雖伯益更生衛賜復岀不能辨也又曰太上四年髙麗使至獻美女十人千里馬一疋兖州民王蒲率衆二千來降獻千里馬一疋羊􅂡去地九寸拜蒲長水校尉廪丘公宋書曰宋大明五年吐谷渾拾寅遣使獻舞馬沈約宋書曰鮮卑二子長曰吐谷渾少曰若洛廆􅀂洛廆别爲渾庶長廆正嫡父在特分七百戸與渾渾與廆二部俱牧馬馬􅃲相傷廆怒讓渾曰􅃲在馬而怒及人耶乖別甚易今當去汝萬里於是擁馬西行廆悔悟深自咎責遣舊父老及長吏乙郍樓追渾令還渾曰我是卑庶理無並大今以馬致别殆天所啓諸君試擁馬令東馬若還東我當相隨去即使二千􅀐共遮馬令廻馬廻不盈三百歩顃然悲鳴西走聲􅀂頽山如是者十餘㢠一廻一逺樓跪曰可汗此非復人事又曰劉瑀爲右衛將軍年位本在何偃前孝武􅀄偃爲吏部尚書瑀圖侍中不得與偃同從郊祀時偃乗在前瑀䇿駟居後相去數十歩瑀蹋徒合切馬及之謂偃曰君轡何疾偃曰牛駿馭精所以疾耳偃曰君馬何遟曰騏􅂹羅於覉絆所以居後偃曰何不着鞭使致千里荅曰一蹙造青雲何至與駑馬争路蕭子顯齊書曰楊玉夫殺宋蒼梧王將首與王敬則敬則送太祖太祖夜乗常所􅀐赤馬入殿及踐祚号此馬爲龍驤將軍後魏書曰髙肇字道文文昭王太后之兄也大舉征蜀以肇爲大將軍都督諸軍面辭丗宗於東堂親奉䂓略是日肇所乗駿馬停於神虎門外無故驚倒又轉卧倒渠中鞍且瓦解衆咸恠異肇辭出見而惡焉丗宗崩肇還髙陽王與領軍于忠遣壯士殺之後周書曰于謹甞率􅀐追茹茹前後十七戰盡降其衆甞爲賊所圍謹乗駿馬一紫一騧賊所先識乃使二人各乗馬突陣而出賊以為謹也皆争逐之謹乃入塞三國典略曰西魏孝武將爲齊太祖所殺孝武索所乗波斯騮馬命太宰南陽王躍之將舉其鞍馬蹶而死帝惡之日晏還宫至後門馬驚不前捶之鞭折入謂潘弥曰今日幸無他不弥曰過夜半則大􅁻湏􅁷帝飲酒遇鴆而崩時年二十五謚曰孝武殯於草堂佛寺十餘年乃葬又曰髙歡歸尔朱榮劉貴事榮盛言歡羙榮未之竒也歡更衣服重求見焉因隨榮之厩厩有害馬榮命翦之歡不絆翦竟不蹄齧巳而起曰凢御惡人亦如此矣榮遂坐歡於牀下屏左右而訪時事歡曰聞公有馬十二各色別爲羣將此竟何用也榮曰且言爾意歡曰方今天子愚弱太后淫亂四方雲擾朝政不行以明公雄武乗時奮發但將討鄭儼徐紇爲辭舉鞭足以定天下此是賀六渾意榮大恱曰尔意即我意也自是每叅軍謀又曰齊盧濳與特進慕容儼善儼之將死謂其子曰盧尚書教我爲人我死之後將吾騂馬與之其子遂以他馬與濳儼䘮出得停不肯進巫祝爲儼聲曰何意不與盧尚書騂馬其子遵命儼䘮乃行又曰齊馮子琮􅀍執於省内以弓􅁌絞殺之使内叅以庫車載其尸歸人無知者子琮所乗之馬曳韁走以頭扣車􅃺如號哭見者異之車至其門諸子方握槊聞庫車來以爲賜也大喜開視乃哭又曰齊主北伐太保領太僕安定玉賀拔仁進馬並非駿足齊王讓之仁對曰御馬超逸羣下不逮齊主大怒免爲庶人命之負炭輸於晉陽又曰周裴果字戎昭魏齊州刺史遵之子也從軍征討乗黃􅍡馬衣青􅂁毎先登䧟陳時人號爲黃􅍡年少又曰周賀􅀂敦與陳侯瑱相拒敦軍數有叛人乗馬投瑱者輙納之乃别取一馬牽以赴舩中人逆以鞭之如是者再三馬便畏舩不上後㐲兵於岸乃遣人乗以招瑱瑱兵迎接競來牽馬敦發伏兵掩之盡殪後有亡命者猶謂爲詐不復納也又曰梁普通中童謡言或云青絲白馬者侯景乃常乗白馬以青絲爲勒用應謡言陳書曰􅀄有童謡曰黄班青􅍡馬發自壽陽涘來時冬氣末去日春風來始其後陳主果爲韓擒所敗擒夲名擒虎黄班之謂也破建康之始復乗青􅍡馬徃反時節皆相應隋書曰􅄍火羅國有山穴中出神馬毎歲牧牝馬於穴所産必名駒又曰􅄍谷渾有青海周迴千餘里中有小山其俗至冬輙放牝馬於其上言得龍種甞得波斯草馬放入海因生􅍡駒日行千里故時稱青海􅍡焉又曰長孫晟從晉王破突厥玉大喜引晟入内同宴極歡有突厥逹官來預坐􅀃言突厥之內大畏長孫揔管聞其弓聲謂爲霹􅆮見其走馬稱爲閃電王􅀏曰將軍震怒威行域外遂與雷霆爲比一何壯哉唐書曰貞觀十三年三月乙巳吉辰厩産白馬朱鬛又曰貞觀中骨利幹遣使朝貢太宗遣雲麾將軍康蘇密徃慰撫之仍列其地爲􅀇闕州俄又遣使隨􅂫密使入朝獻良馬十疋太宗竒其駿異爲之制名號爲十􅂹一曰騰霜白二曰皎雪􅍡三曰凝露􅍡四曰懸光􅍡五曰决波騟六曰飛霞驃七曰發電赤八曰流金騧九曰翔麟紫十曰奔紅赤又爲文以叙其事又曰永徽中吐谷渾河源郡王慕容諾􅂚鉢遣使獻駿馬上問其馬之種性對曰臣國中之㝡者所以獻之上曰良馬人之所欲豈可輟彼不足而加我之有餘哉乃命還之又曰永徽中駮馬國遣使朝貢其地在突厥之北漸近北海去京師一萬四千里户十萬勝兵三萬人馬三十萬疋馬色並駮故以爲名又曰開元十二年太原獻異馬駒其耳如筒左右各一十六助肉尾無毛又曰天寳中隴右節度皇甫惟明奏龍支縣人庫狄孝義有馬生龍駒經九旬有九日身有鱗而不生毛臣就撿視時有慶雲五色遥覆馬上乆而不散伏望宣付史官以光實録從之又曰吐火羅國有頗梨山南崖穴中有神馬國人毎牧牝馬於其側時産名駒皆汗血焉又曰李懷逺雖乆居榮位而弘尚簡率其園宅無所改作甞乗􅅃叚馬左僕射豆盧欽望謂曰公榮貴如此何不買駿乗荅曰此馬幸免驚蹶無假别求聞者莫不歎羙周史曰徐台符仕晉爲翰林學士中書舎人契丹之䧟中原也台符從虜帳北至於薊門及戎人內潰乃竄身南歸􅀄台符所乗馬好嘶鳴及自虜中廻常露􅀫於草中雖胡􅀐連羣經其左右而台符馬􅀂箝其口然及行至漢地即嘶鳴如故時人以爲積善之所感也太平御覽卷第八百九十五
