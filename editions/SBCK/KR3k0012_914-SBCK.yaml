body:
  text: 羽族部一鳥周禮曰庖人供六禽辯其名物六禽鴈鶉鷃雉鳩鴿又曰中秋献良裘王乃行羽物行羽物以飛鳥賜群吏中秋鳩化爲鷹順其始殺大班羽物又曰射鳥氏掌射鳥􅀕祀以弓矢歐烏鳶凢賔客㑹同軍旅亦如之又曰羅氏掌羅烏鳥蜡則作羅􅃭天子大蜡謂十二月合取万物而素饗之􅃭細宻之羅又曰中春羅春鳥獻鳩以養國老行羽物春鳥蟄而始出是時鴈化爲鳩折春鳥變舊爲新冝以養老生氣行謂賦物又曰掌畜掌養鳥而阜蕃教擾之鳥之可養盛大蕃息􅀕祀供夘鳥其夘丙薦之鳥四時貢鳥物鴞鴈之属以四時來共膳獻之鳥雉及鶉駕之属又曰翨氏翨音翼掌攻猛鳥各以其物爲媒而掎之猛鳥鴈隼之属置其所養之物於絹中鳥未下則掎其脚以時獻其羽翮又曰硩簇氏硩音摘又他歴切簇音蒼獨切掌覆夭鳥之巢覆毀也夭鳥惡鳴之鳥若鴞鵩以方書十日之號十有二辰之號十有二月之號十有一歳之號又曰庭氏掌射國中之夭鳥􅀂不見其鳥獸則以救日之弓與救月之矢夜射之中􅀂神也則以太隂之弓與枉矢射之禮曰獻鳥者佛其首又曰執禽者左首又曰大羅氏天子之掌鳥獸者也又曰鳥皫色而沙鳴鬰皫普表切又曰凢生天地之間者有血氣之屬必有知之屬莫不知愛其􅀋今是夫鳥獸則失䘮其群匹越月踰時焉則必反廵過其故郷翔廻焉鳴號焉蹢䠱焉踟蹰焉然後乃能去之小者至於䴏雀獨有啁噍之頃焉然後乃能去之故有血氣之屬者莫智於人故人於其親也至死不窮傳曰或叫于宋大廟曰譆譆出岀鳥于毫社如曰譆譆又曰郯子來朝公與之宴叔孫昭子問焉曰少皡氏以鳥名官何郯子曰我髙祖少皡摯之立也鳯鳥適至故紀於鳥爲鳥師而鳥名又曰鳥則擇木木豈能擇鳥詩曰伐木丁丁鳥鳴嚶嚶嚶其鳴矣求其友聲易曰比王用三駈失前禽邑人不誡吉又曰井泥不食舊井無禽又曰旅鳥焚其巢又小過曰有飛鳥之象焉飛鳥遺之音不冝上冝下大􅁻上逆而下順也書曰日中星鳥以殷仲春厥民析鳥獸孳尾孔安國曰乳化曰孳交接曰尾日永星火以正仲夏厥民因鳥獸希革夏時鳥獸毛羽希少改揚革改宵中星虚以殷仲秋厥民夷鳥獸毛毨兟理也毛更生生整理也日短星夘以正仲冬厥民燠鳥獸氄毛鳥獸皆生毳細毛也周書旅􅋙曰珎禽竒獸弗育于國論語曰鳥之將死其鳴也哀又曰鳥獸不可與同羣爾雅曰鳥之雌雄不可别者以翼右掩左雄左掩右雌鳥之美長醜爲鶹􅝎二足而羽謂之禽春秋孔演圖曰鳥化爲書孔子奉以告天赤爵集書上化爲黄玉刻曰孔提命仰應法爲赤制又曰黒帝治生五角之禽以觸民宋均注曰陽數玉也春秋考異郵曰鳥魚者隂中陽陽中隂皆􅆑生以􅀋翔故魚從水鳥從陽凢飛翔羽翮柔良之獸皆爲陽陽氣仁故鳥哺公鳥飛於風魚浮之水是故陽氣輕勁也含二氣故生吞齕者八竅而􅆑生鳥雞􅀋也序命暦羲皇燧人始名物蟲鳥獸之名尚書考靈曜曰鳥爲春􅀱歸藏啓筮曰金水之子其名曰羽蒙乃占之曰羽民是生百鳥史記曰秦仲知百鳥之音與之語皆應焉又曰楚莊王即位三年不出號令日夜爲樂令國中曰有敢諌者死無赦伍舉入諌莊王左抱鄭􅁎右抱越女坐鍾鼓之間伍舉曰願有進隱隱爲隱藏其意曰有鳥在於阜三年不蜚不鳴是何鳥也莊王曰三年不蜚蜚將冲天三年不鳴鳴將驚人舉退矣吾知之矣又曰楚湏襄王十八年人有好以弱弓微繳加歸鴈之上者王聞而召之問焉對曰小臣之好射鶀音其鴈羅鸗徐廣曰鸗野鳥也音龍小矢之發也何足爲大王道哉且稱楚之國大王之賢所弋非特此也昔者三王以弋道德五伯以弋戰國故􅁗魏燕趙者其鴈也齊魯韓衛者青首也青首小鳬有青者邹費郯邳者羅鸗也外則其餘不足射也見鳥六􅀟以喻下文秦趙等十二國故曰六􅀟唯王何取王何不以聖人爲弓勇士爲繳時張而射之此六􅀟者可得而囊載也其樂非特朝夕之樂也其獲非特鳬鴈之實也漢武故事曰武帝作玉堂以玉壁薄椽頭鑄爲太鳥黄金􅂗長五丈拪屋上續漢書曰楊震將葬大鳥來止亭樹下地安行到柩前正立低頭淚出衆人更共摩牧抱特終不驚駭其鳥五色髙丈餘兩翼長二丈三尺人莫知其名也魏志曰髙唐隆臨終上䟽諌明帝臣觀黄􅀄之際天兆其戒異􅀋之鳥育長鷰巢口􅀲俱赤此魏室之大異也晉書曰趙王倫篡位時於殿上得異鳥問皆不知名其日向夕宫西有素衣小皃言是服劉鳥倫使録小兒并鳥閉置空室明旦開視户如故並失人鳥所在倫目上有廇以爲妖焉南史曰甄恬字彦約中山無極人也居江陵數歳喪父哀感有􅀂成人家貧養母常得珎羞及居喪廬於墓側􅁪有鳥􅀇黄雜色集於廬樹恬􅂘則鳴􅂘止則止齊書曰曲江公蕭遥欣年七歳出齊時有一左右小兒善彈無飛鳥不應􅁌墜落欣曰九戲多端何急彈此鳥自空中翔飛何關人事無趣殺此生左右感其言遂不復彈鳥梁書曰何胤退居吴武丘寺講經論常禁殺有異鳥如鶴紅色集講堂馴狎如家禽南史曰海中浮鵠山去地千餘里上有女人年三百歳有女道士百四五人年並出百俱在山中學道遣使獻紅席梁武帝方捨身時其使適至此草常有紅鳥居下故以名觀其圖狀則鸞鳥也又曰梁武帝捨身時有男子不知何許人於衆中自割身以飴飢鳥血流遍體而顔色不變開講日有三足鳥集殿開講日有三足鳥集殿之東户自戸適于西南懸楣三飛三集白雀一見于重雲閣前連李樹後魏書曰波斯國有鳥形如橐駞有羽翼飛而不能髙食草與肉亦能噉火馳走甚疾一日能七百里也又曰彭城王􅎰從􅃆北除使持節都督南征諸軍事正中軍大將軍府􅎰於是親勒大衆湏􅁷有二大鳥從南而來一向行宫一向府幕各爲所獲􅎰言於帝曰始有一鳥望旗顛仆臣謂大􅁻帝戲之曰鳥之畏威豈獨中軍之略也吾亦分其一耳此乃大善北史曰周豆盧勣爲渭州刺史鳥䑕山絶壁千仞由來乏水諸羗苦之勣馬足所踐忽飛泉涌出有白鳥翔止㕔前乳子而後去人爲之謡曰我有丹陽山飛玉漿濟戎夷人神鳥來翔隋書曰煬帝征遼東帝舎臨頓見大鳥丈餘縞身朱足游泳自若上異之詔虞綽爲銘帝覽而善之命有司勒於海上又曰大業十二年一月甲子夜有二大鳥似鵰飛入大業殿止干殿至明而去又曰王丗充將欲篡位羅取雜鳥書帛繫其頸自言符命而散放之或有彈射得鳥而來獻者亦拜官爵唐書曰太宗謂禇遂良學問稍長性亦堅正旣冩忠誠甚親附於朕譬如飛鳥依人自加憐愛又曰永徽中吐火羅國獻大鳥髙七尺其足如駞有翅而能飛行日三百里能噉銅鐵夷俗呼爲駞鳥上以太宗懷逺所致獻于昭陵乃刻像於陵之内又曰永徽中萬年宫有小鳥生大鳥又曰大暦八年有大鳥見於武功縣群鳥隨而噪之武功縣神䇿行營將張日芬射而獲之以獻是鳥肉翅狐首四足足有􅀲其廣四尺三寸其毛色赤形􅀋蝙蝠又曰大中十年舒州吴塘堰有衆禽成巢闊七尺髙一丈而水禽山鳥鷹隼鷰雀之􅀋無不馴狎又有鳥人面緑毛􅀲喙皆紺色其聲曰甘人呼爲甘蟲莊子曰飛鳥之影未甞動也文子曰有鳥將来張羅待之得鳥者一目也今爲一目之羅即無得鳥時孫卿子曰鳥窮則啄人窮則詐淮南子曰鳥排空而飛獸蹶石而走又曰射者扞鳥號之弓彎綦衛之箭重之羽蓬蒙子之巧以要飛鳥猶不能與羅者競多何則以所持之小也張天下以爲之籠因江海以爲􅅈又何亡魚失鳥之有乎又曰一目之羅不可以得鳥無餌之鈎不可以得魚遇士無禮不可以得賢德又曰毛羽者飛行之􅀋也故屬於陽又曰繫舟水中鳥聞之髙翔魚聞之沉淵又曰鳥不于防者雖近弗䠶鳥燕之属是也其當道者雖逺弗釋當道謂作防客者故曰不釋也又曰夫飛鳥主巢狐狸主穴巢者巢成而得􅀫焉趍捨行義亦人之所捿􅀫也又曰鳥魚皆生於陰屬於陽故鳥魚皆夘魚游於水鳥翔於雲又曰羽嘉生飛龍羽加羽蟲之先也蜚龍龍之有羽者飛龍生鳯皇鳯皇生鸞鳥鸞鳥生庻鳥九羽者生於庻鳥也又曰蒲且之連鳥於百仞之上而詹何之鶩魚於大淵之中此皆得清浄之道也又曰羽者嫗伏毛者孕育淮南萬畢術曰人靣擊地飛鳥自下取蘗木爲人形似鳥而血塗人面以擊地飛鳥自下抱朴子軍術曰衆鳥群飛徘徊軍上不過三日有􅁀兵至焉鳥聚軍中將當賞功増秩鳥集將軍之旗將軍増官鳥集軍中莫知其名軍敗也阮子曰髙鳥相木而集智士擇士而翔晏子春秋曰景公射鳥野人駭之公令吏誅之晏子曰鳥獸故非人所養野人駭之不亦冝乎公曰善自尓巳來一㢮鳥獸之禁又曰景公好弋使顔􅃰主聚鳥而亡公召吏殺之晏子曰諸侯聞之以君重鳥輕士公曰勿殺春秋後語淳于髠曰夫鳥同翼者聚飛而獸同足者俱行各有儔也又曰魏有更羸脉者與王處廪下仰見飛鳥引弓虚發而鳥墮下魏王恠而問曰何以得至此羸脉曰此孽生也生曰先生何以知之對曰其飛徐其鳴悲其飛徐者故瘡痛也其鳴悲者乆失群也故瘡未息而驚心未去聞􅁌音烈而髙飛故隕也孽餘也先􅀍傷而餘瘡未差故聞􅁌聲而奮驚而隕也五違切創與瘡同又曰燕王使􅀐刼代樂毅奔趙王卒離心田單乃令城中食者先􅀕先祖於庭中飛鳥悉飛舞其上或下啄其食燕人皆恠之穆天子傳曰曠原之野飛鳥之所解羽春之山飛鳥之所拪㫪山之澤清水温泉飛鳥百獸之所飲食家語曰孔子在衛顔回侍側聞􅂘聲甚哀子曰回汝知此何􅂘對曰此哭非但爲死又爲生離回聞桓山之鳥生四子焉羽翼旣成將分于四海其母悲鳴而送之哀聲有似於此謂其往而不返也回􅀼以音􅀋而知之又曰蒼鳥群飛熟使萃之蒼鳥蒼鴈又曰稷帝投之水上鳥何燠投弃燠温鳥以羽翼覆薦温之白虎通曰鳥所以飛何鳥者陽也飄輕故飛也禽者何鳥獸之揔名明爲人所禽制蔡邕月令章句曰天官五獸前有朱雀鶉火之體凢鳥生於水衝波傳曰顔淵子路於洙泗見五鳥色由熒熒之鳥也見色分明故曰熒熒廣志曰東齊多鳥爵千百爲群小户種㯏或以爵爲患文士傳曰張衡有巧藝甞作木鳥假以羽翮腹中施機能數里飛又曰㑹稽山隂禹葬聖人化感鳥獸故象爲民佃春耕拔草根秋啄除其穢故縣官禁民不得殺傷此鳥犯者刑之無赦㑹稽典録曰夏方字文昌家遭癘父母伯叔一時死九十三喪方年十四晝則􅀒土哀號暮則扶棺哭泣比葬年十七烏鳥集聚猛獸乳其側幽明録曰符堅時有射師經嵩山望見松樹上有一􅀟白鳥似鵠而大至樹下又見一蛇長五丈許樹上取鳥未至鳥一丈鳥便欲飛蛇張口歙之鳥不得去􅌭紛一食頃鳥轉欲困射師引弩射三矢蛇隕而鳥得颺去湏􅁷雲晦雷發驚耳駭目而向鳥徘徊其上毛落紛紛雷息電滅鳥亦髙飛十州記曰祖沷州有不死之草似菰苗秦始皇時死者横道有鳥如烏狀御此草以覆死人面皆登時起坐而遂活也異苑曰蘭陵昌慮縣華山有井鳥巢其中金喙黒色而圓翅此禽見則大水荆楚歳時記曰春分日民並種戒火草於屋上有鳥如烏先鷄而鳴架架格格民􅀱此鳥則入田以爲􅀱人架犁格也又曰夏七月有鳥民穫􅂖其聲自呼農人候此鳥則犂把上岸太平御覽卷第九百一十四
