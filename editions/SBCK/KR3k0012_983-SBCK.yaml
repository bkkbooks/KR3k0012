front:
  text: 太平御覽卷第九百八十三香部三
  hash: sha256:d24a270701d2fa61137dc30a10eb5609ac446946fe1141579372b7368b400d97
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_983-1a}
body:
  text: 槐香蘭香蘪蕪蕙草䔾車杜蘅白芷荃香薫香兠末香反生香驚精香白蛤狸藁本香神精香􅀛甲香槐香􅄞含槐香賦序曰余以太簇之月登於歴山之陽仰眺崇巒俯視幽坂乃覩槐香生􅂪楚之間曽見斯草殖於廣夏之庭或披帝王之圃恠其遐弃遂􅁶樹于中唐華麗則殊彩阿郍芳實則可以藏書又感其弃本髙崖委身階庭似傳􅀃顯殷四􅅱歸漢故因實制名蒙蒙緑葉揺揺弱莖蘭香易曰同心之言其臭如蘭蘭芳也易卦通驗曰冬至廣莫風至蘭始生􅀃文曰蘭香草也韓詩曰溱與洧􅀃文云詩人言溱與洧方盛流洹洹然謂三月桃花水下之時士與女方盛流秉蘭􅀆秉執也蘭簡也當此盛流之時衆姓與衆女方執蘭而拂除鄭國之俗三月上巳之日此兩水之上招魂續魄拂除不祥大戴禮夏小正曰五月蓄蘭爲沐浴禮曰婦人或賜之􅊉蘭則受而獻諸舅姑左傳曰鄭文公有賤妾曰燕姞夢天使與巳蘭曰余爲伯儵余而祖也以是爲而子以蘭有國香人服媚之旣而文公見之與之蘭而御之辭曰妾不才幸而有子將不信敢徴蘭乎姞曰諾生穆公名之曰蘭論撰考䜟曰漸於蘭則芳漸於鮑則臭史記曰冬至短極蘭根出蜀志曰先主殺張􅁉諸葛亮救之先主曰芳蘭當門不得不鋤晉書曰惠帝時温縣有人如狂造書曰兩火没地哀哉秋蘭歸形街郵終爲人歎及楊駿巳死楊后􅀍廢賈后絶其膳八日而崩塟街郵亭北百姓哀之兩火武帝諱蘭楊后字也宋書曰劉湛欲􅀽淑附巳而淑不爲改意由是大相乖失淑乃賦詩曰種蘭忌當門懐壁莫向楚楚少別玉人門非種蘭所晏子春秋曰曽子將行晏子送之曰嬰聞君子贈人以財不􅀂以言吾請以言乎夫蘭夲三年而成湛之􅀂滫則君子不近庶人不佩湛之麋而駕征馬矣非蘭夲美也願子必求所湛􅂫子曰蘭以芳自燒膏以肥自􅌊而恱切翠以羽殃身蚌以珠致破文子曰日月欲明浮雲盖之藂蘭欲脩秋風敗之又曰蘭芷不爲莫服而不芳與君子行遊苾􅀆如入蘭芷之室乆而不聞則與之化矣范子計然曰大蘭出漢中蘭輔出河東弘農白者善孫卿子曰人之親我欣􅀂父母其好我芬若椒蘭淮南子曰兩心不可以得一人一心可以得百人男子樹蘭美而不芳蘭芳草女之美芳也男子樹之盖不継子得食肥而不澤継子假母也精不相與徃來也淮南子曰蘭生幽宫不爲莫服而不芳抱朴子曰人鼻無不樂香故流黄欝金芝蘭􅂫合􅀇膳索􅑟江籬揭車春蕙秋蘭價同瓊瑶而海上之女逐酷臭之夫家語孔子曰芝蘭生於􅀷林不以無人而不芳君子修道立德不爲困窮而改節爲之者人也死生者命也語林曰謝太􅀓問諸子姪曰子弟何䂊人事而政欲使其佳諸人莫有言者車􅀐荅曰譬如芝蘭玉樹欲使其生於庭堦耳又曰毛伯成旣􅀒其才噐常稱寜爲蘭摧玉折不作蕭芳苃榮羅含別傳曰含致仕還家庭中忽自生蘭此德行幽感之應蔡質漢官儀曰尚書郎懷香握蘭趍走丹墀盛弘之荆州記曰都梁縣有小山山上水極淺其中悉生蘭草緑葉紫莖芳風藻谷俗謂蘭爲都梁即以號縣云夲草經曰草蘭一名水香乆服益氣輕身不老楚辭曰余旣滋蘭之九畹􅀆滋蒔也二十畝爲畹又曰扈江離與辟芷􅀆扈披也楚人名披曰扈離薜芷皆香草名也紉秋蘭以爲佩紉細又曰沅有芷􅀆澧有蘭言沅和中有盛茂之正禮水之中有芬芳之蘭喻湘夫美亦異於衆人也􅁒思公子未敢言又曰秋蘭􅀆蘪蕪羅生􅀆堂下緑葉􅀆素枝芳菲􅀆襲予秋蘭􅀆青青緑葉􅀆紫莖滿堂􅀆美人忽獨與余􅀆目成又曰光風轉蕙泛崇蘭趙壹疾邪賦曰勢家多所冝欬唾自成珠􅀍􅄄懷珠玉蘭蕙化爲芻張衡怨詩曰秋蘭嘉美人也嘉而不獲用故作是詩也猗猗秋蘭植彼中阿有馥其芳有黄其葩雖曰幽深厥美彌嘉之子之逺我勞如何酈炎詩曰靈芝生河洲動揺回洪波秋蘭榮何晚嚴霜害其柯哀哉之芳草不植太山阿琴操曰猗蘭操者孔子所作也孔子聘諸侯莫能任自衛反魯過億谷之中見薌蘭獨茂喟然歎曰夫蘭當爲王者香今乃獨茂與衆草爲伍乃止車援琴鼓之自傷不逢時託辭於香蘭云晉傳玄詠秋蘭詩曰秋蘭䕃玉池池水清且芳􅀟魚自踊躍兩鳥時徊翔晉王羲之蘭亭記曰永和九年􅀊在癸丑暮春之􅀄㑹于㑹稽山隂之蘭亭修禊事也蘪蕪􅀃文曰江蘺蘪蕪也楚謂之蘺晉謂之􅡖軒嬌切齊謂之􅊉尓雅曰蘄􅊉蘪蕪郭璞曰香草也葉小如萎狀淮南子曰似虵床山海經曰臭如蘪芜春秋運斗樞曰維星散爲蘪蕪淮南子曰亂人者􅀂虵床之與蘪蕪山海經曰洞庭之山其草多蘪蕪廣志曰徴蕪香草魏武帝以藏衣中吴氏夲草曰蘪蕪一名芎窮古詩曰上山採蘪蕪下山逢故夫郭璞讃曰蘪蕪善草亂之虵床不隕其貴自別以芳蕙草廣雅曰皇草蕙草也山海經曰天帝之山其下多菅蕙菅似茅􅂛山其草多蕙廣志曰蕙草緑葉紫華魏武以爲香燒之楚辭曰光風轉蕙泛崇蘭又曰旣滋蘭􅀆九畹又樹惠之百􅅿司馬相如子虚賦曰於是乃相與撩於蕙圃盤姍㪍窣皆草間行貌姍音蘇寒切窣蘇骨切上金隄䔾車去謁切尓雅曰䔾車䒗音乞輿也郭璞曰䔾車香草也見離騷􅀃文曰䔾䒗輿也䒗音乞廣志曰䔾車黄葉白華出徐州楚辭曰畦留夷與擖車􅄂杜蘅與芳芷杜蘅山海經曰天帝之山有草焉其狀如葵臰如蘪蕪名杜蘅香草也可以走馬郭璞曰帶之令人便或曰馬得之而徤走食之而癭爾雅曰杜土鹵也郭璞曰社衡也似葵而香也唐書曰貞觀中度支郎以宋謝眦詩云芳洲多杜􅀂乃下坊州令貢州判司報云坊州不出杜􅀂應由謝眦詩誤太宗聞之大􅀏判司改雍州司法度支郎免官廣雅曰杜蘅杜若也范子計然曰杜􅀂出南郡漢中大者善夲草經曰杜􅀂一名杜衡白芷山海經曰􅉑山其草多葯郭璞注曰葯白芷也一名香草也廣雅曰白芷葉謂之葯淮􅀯子曰今皷舞者便媚擬神擬象也身􅀂秋葯􅀍風葯白芷香草􅀍風言其弱髮􅀂結旌屈而復舒范子計然曰白芷出齊郡以春取黄澤者善也夲草經曰白芷一名芳香味辛温生河東吴氏夲草曰白芷一名􅡖許嬌切一名符離一名澤分一名葩楚詞曰獻歳發春􅀆汨吾南征緑蘋葉齊􅀆白芷生又曰桂揀􅀆蘭撩辛夷楣􅀆葯房又曰掔木根以㓗芷􅀆掔持也貫薜荔之落蘂貫拾也薜荔草蘂佩結香香拾其花心次表草巳之忠信也荃香楚辭曰荃不察余之中情􅀆荃香草以喻君􅀍分香故以香草爲喻反信䜛而齊怒斊疾也又曰荃撓􅀆蘭旗薫香左傳曰晉獻公以驪􅁎爲夫人卜人曰一薫一蕕十年尚猶有臭薫香草也山海經曰浮山有草焉麻葉而方莖赤華而黒實臰如麋無名曰薫草也廣雅曰鹵薫也其葉謂之惠魏略曰大􅁗出薫草􅂫子曰象以牙䘮身不能去其白薫以芳自燒不能去其香淮南子曰以㓗白爲汙辱譬猶沐浴而杼溷薫燧而􅀒􅇾燒薫自香楚人謂之薫燧也抱朴子曰常以執日取天井上土以和栢葉薫草以泥門户方一尺則盗賊不來西京􅄂記曰漢掖庭有緑熊席其席皆長一丈餘眠而擁毛自蔽望其不能見坐則没􅂰其中􅄂諸薫香一坐此席餘香百日不歇成公綏宣清賦曰哀薫草之見焚兠末香漢武故事曰西王母當降上燒兠末香兠末香兠渠國所獻如大豆塗門香聞百里関中常大疾疫死者因生反生香真人􅀜尹傳曰老子曰真人遊時各坐蓮華之上華徑一丈有反生靈香逆風聞三十里驚精香十洲記曰聚窟洲在西海中上有天山形似鳥之狀因名爲人鳥山山中多大樹與桐相似而芳華蘂香聞百里因名返魂樹叩其樹樹能作聲如牛呴聞者必震駭伐其木根於玉釡中煑取汁更微微以火熟煎如黒飴令可丸名曰驚精香或名震靈九亦名返生香亦名却死香氣聞數百里死屍在地聞氣即活延和六年春西胡月氏國王遣使者獻香四兩大如雀􅆑黒如桑椹帝以香國中所乏以付庫白蛤狸異物志曰白蛤狸刳其外韋囊以酒洒而隂乾之其氣如麝􅀂􅄂真麝中鮮有別者藁夲香水經曰三城水又經香陘山山上悉生藁夲香丗故名焉神精香郭子横洞􅁳記曰元朔二年波祗國亦名波弋國獻神精香草一名荃麋一名春蕪一根五百條其枝間如竹節柔軟其皮如絲可以爲布所謂春蕪布亦曰香荃布堅宻如紈也掘之一斤滿宫皆香婦人帶之彌爲香馥􅀛甲香任昉述異記曰􅀛甲香即桂香嘉者一名紫木香一名金杜香一名蘪草香出蒼梧桂林二郡界今吴中有麋草似藍而甚芳香第九百八十三卷末
