  text: 太平御覽卷第五十三
  hash: sha256:ad66ea2283e44bd934520062ef6c82134057f9bd87e8b2bc50b6fa96bfd97618
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_053-1a}
body:
  text: 地部十八丘陵阪陘峽岡丘說文曰丘土之髙非人所爲丘字從一一地也人居在丘南從北中拜之居在崑崙一曰四方髙中央下象形也詩曰送子渉淇至于頓丘又曰子之蕩􅀆苑丘之上􅀆又曰崇丘萬物得極其髙大也又曰楊園之道猗于畝丘又曰綿蠻黄鳥止于丘隅又曰丘中有麻彼留子嗟禮曰太公封於營丘比及五世皆反葬於周君子曰樂樂其所自生禮不忘其本古之人有言曰狐死正丘首仁也正丘首正首丘也仁恩也又曰公叔文子升於瑕丘蘧伯玉從二子衛大夫文子曰樂哉斯丘也死則我欲葬焉蘧伯玉曰吾子欲之則瑗請前利其欲害人良田也瑗伯玉名也又曰爲髙必因丘陵爲下必因川澤周禮曰丘陵其動物冝羽物其植物冝覆物其民專而長傳曰車脫其輹火焚其旗不利行師敗于宗丘春秋元命包曰堯爲天子季秋下旬夢曰帝遺吾馬喙子其母爲扶始昇髙丘賭白帝上有雲虎之狀感巳生臯陶春秋􅀃題辭曰丘者墓也又曰丘谷輔氣元士扶化爾雅曰丘一成爲敦丘成猶重周禮曰爲壇三成今江東呼地高堆者敦舊音頓再成銳上爲融丘三成爲崑崙丘崑崙山三重􅄱如累三盂如乗者乗丘􅄱似車乗如渚者渚丘水中小洲爲渚水潦所止泥丘頂上洿下丘方胡丘形四方絶髙爲之京人力所作非人爲之曰丘地自然生水潦所還曰將丘宦音謂丘邊有界埓水繞環之上正章丘頂平澤中有丘都丘在水澤内當塗梧丘塗道塗岀其右而還之重丘言爲道所䂓畫途岀其前戴丘道岀丘南途岀其後昌丘道岀丘北水岀其前渻丘水岀其後沮丘水出其右正丘水岀其左營丘今齊之營丘淄水過其南及東如覆敦者敦丘邐迤沙丘左髙咸丘右髙臨丘前髙旄丘後髙陵丘偏髙阿丘丘背有丘爲負丘中央隆峻狀如負一丘於背上右澤定丘右陵泰丘宋有泰丘見史記如畒畒丘丘有壟界如田如陵陵丘丘上有丘爲宛丘陳有宛丘今在陳郡陳縣淮晉有潜丘今在太原晉楊陽縣淮南有州􅀺丘今在壽春天下有名丘五其三在河南二在河北說者多以州􅀺宛營爲河南者潜敦爲河北者案北方稱天下之名丘恐此諸丘碌碌未足用當之殆别有魁梧桀大者五但未詳其名號所在耳廣雅曰小陵曰丘又曰丘上有木爲祕丘家語曰丘陵爲牡谿谷爲牝方言曰冢大者謂之丘穆天子傳曰天子昇于崑崙之丘以觀黃帝之宫郭璞注曰黄帝廵狩四海登崑崙山起宫室於其上又曰爲盛􅁎謚曰哀淑人之丘天子名之爲丘作名是曰淑人之丘乙丑天子東征舎乎五鹿叔㛗七和切且哭思盛􅁎也㛗穆王女也是曰女㛗之丘困以名五鹿也丁夘山海經曰崑崙之丘實惟帝之下都莊子曰衛靈公死卜葬於故墓不􅁻卜葬於沙丘而􅁻掘之數仞得石槨焉洗而視之有銘曰不慿其子靈公奪而埋之夫靈公之爲靈乆矣淮南子曰堯時有大風爲民害乃繳大風於青丘之野許愼注曰大風大鷙鳥也文子曰川竭而谷虛丘夷而泉塞越絶書曰闔閭冢在呉縣昌門外名曰虎丘下廣平六十歩水深丈五尺銅槨三重玉鳬之流扁諸之劒在焉卒十万人治之取􅁟臨湖葬三曰白虎居上故號曰虎丘東方朔十洲記曰長洲一名青丘在南辰巳地地五千里去岸二十五萬里上饒山川又多大樹樹有二千圍者一洲之上專是林木故一名青丘仙草靈藥甘液玉英靡所不有齊地記曰營丘在臨淄小城内古以爲齊室也丘下周三百餘歩髙九丈北廂下隆丈五造井水深七丈餘井與地平伏韜北征記曰博望城内有成湯伊尹箕子冢今皆爲丘􅄒異記曰南海中有軒轅丘鸞自歌鳯自舞古云天之樂也郡國志曰濮陽縣本顓頊之城今謂之帝丘夏后之代昆吾居之春秋衞遷于帝丘夢人登昆吾之墟是也又曰濮州初徒陶於乗丘故縣掘得􅃮盃二厎内有朱書曰乗丘旣見風日糜然爛碎矣陶今定陶外國圖曰貟丘之上有不死樹食之乃壽有赤泉飲之不老蕭丘多大風無人民群犬居之青丘之民食榖衣野􅁝去琅瑘萬三千里神丘有火穴其光照千里去琅瑘三萬里陳留風俗傳曰雍丘縣有五陵之丘以故名縣酈善長注水經曰沮水西逕楚昭王墓東對江陵城故王仲宣之賦登樓云西接昭丘是也又曰隋縣有断虵丘隋侯岀見大虵中断因舉而藥之故謂之断虵丘又曰鞏縣北有山臨河謂之岑原丘下有穴謂之鞏穴言山潜通淮濟北逹于河直穴有渚謂之鮪渚十道志云岑原丘在縣西北三十三里陵釋名曰陵隆也體隆髙也易曰天險不可升地險山川丘陵又曰躋於髙陵三歳不覿詩曰鴪彼飛隼率彼中陵又曰髙岸爲谷深谷爲陵禮曰五月可以居髙明可以遠眺望可以處臺榭傳曰蹇叔送其子曰殽有二陵其南陵夏后臯之墓其北陵文王之所避風􅀨也春秋說題辭曰陵之爲言稜也輔山成其廣層稜扶推益厥長也孝經援神契曰德至山川丘陵則景雲岀宋均注曰景雲應間澤不偏也爾雅曰大阜曰陵又曰東陵阠所陳切南陵息愼西陵威夷中陵朱勝北陵西隃鴈門是也音戍陵莫大於加陵梁莫大於溴梁墳莫大於河墳謂之八陵穆天子傳曰天子東遊次于崔梁曝蠹書于羽陵莊子曰盗跖死於東陵之上又曰歩仞之丘陵巨獸無所隱其軀而孽狐天子東征釣于隰水􅀕淑人是日􅀕丘爲之降吕氏春秋曰凢葬必於髙陵之上以避狐狸之患水泉之濕此則善矣楊子法言曰百川學海而至於海丘陵學山而不至山是故惡夫住者住止魏子曰堯入百仞之溪則不照三里非矇闇位卑勢下故也桀紂昇百丈之陵能見四海非照明位髙勢尊故也十洲記曰崑崙陵即崑崙山也西海之戍地北海之亥地去中國十萬里有弱水周匝繞山呉録曰張紘言於孫權曰秣陵楚武王所置名爲金陵秦始皇時望氣故掘断連崗改名秣陵物理論曰地者鎭之以五岳積之以丘陵阪詩曰阪有􅃮隰有栗爾雅曰坡者曰阪郭璞注曰阪地不平也史記曰漢文帝嘗從覇陵西馳下峻坂表盎􅄃轡上曰將軍怯也盎曰臣聞千金之子坐不垂堂百金之子立不􅀝衡今聖主乗危馳不側之淵如馬警車敗柰髙廟何上乃止漢書地理志曰河東蒲坂縣故曰蒲泰更名應劭曰秦始皇東廵見有長坂孟康曰本属晉文公以賂秦秦人還蒲魏人喜曰蒲反矣漢書曰王陽爲益州至卭僰蒲北切坂九折歎曰柰何以先人之遺體乗此險乎遂以病去及王遵爲刺史至此坂問吏曰此非王陽所畏道􅁘叱其馭駈之曰王陽爲孝子王遵爲忠臣􅀿劭注曰坂在嚴道縣界漢書西域傳曰西域有赤玉身􅀬之坂上即今人身􅀬無色頭痛嘔吐續漢書地理志曰河東大陽縣有顛軨坂蜀志曰先主至當陽之長坂爲曹公所追敗王隱晉書曰孫登楊駿逼迎之與語不荅賜布􅂁登借刀截断棄門中大呼云刺斫刺斫卒病死後人見在貴馬坂穆天子傳曰天子南還昇于長松之坂郭僕注曰坂有長松酈善長注水經曰洛水東逕九曲其地千里有九坂之曲穆天子傳所謂天子西征升九阿是也又曰河水東逕旋門坂北今城臯西大坂是也昇陟此坂而東趣成臯城列女後傳曰吕榮者呉郡許昇之妻也昇爲賊所害榮貞固自守黄巾賊陳寳欲干穢之榮執節不聽寳遂殺榮是日疾風暴􅀨雷電晦􅁳寳恐懼叩頭謝葬之而去䴢府君聞榮髙行遣主簿􅀕之又岀錢助縣爲冢於嘉興郭里墟北名曰義婦坂華陽國志曰有牛叩頭坂馬搏頰坂其嶮如此晋太康地記曰常山曲陽縣有􅁪山坂號飛狐口上壺関縣有羊膓坂地理志曰凾谷東坂謂之八特坂述征記曰黄卷坂者傍絶澗以昇潼関長坂十餘里九坂皆迤邐長坂東京賦曰所謂西阻九阿者也戴延之西京賦曰黄坂去終南六十里少華山西任豫益州記曰汶江水源岀玉輪坂下今属汶江郡在郡東北三十里古今地名曰􅁳軨坂在塩池東呉城之北今之呉坂新序曰趙簡子上羊腸之坂群臣皆推車宗㑹獨當㦸行歌簡子曰人臣而侮其主其罪􅀂何宗㑹曰其罪死君亦聞人君而侮其臣乎則智者不爲謀辯者不爲闘則其國危乎簡子曰善以宗㑹爲上客郡國志曰雍州咸陽縣北十五里長平坂漢武帝幸甘泉馳道有􅆉覆地赤如生肝問東方朔朔曰秦獄地􅁈氣也臣聞酒能銷愁以酒澆之果銷矣陘爾雅曰山絶曰陘郭璞注曰連山中断者也漢書曰趙王成安君陳餘聞漢且襲之聚兵井陘口號稱二十萬穆天子傳曰天子北征乃絶漳水至于鈃山之下郭璞注曰即井鈃山今在常山石邑郷述征記曰燕趙間凢厥山路名之曰陘井陘在常山峽水經注曰丹山在丹陽属巴丹山西即巫山者也帝女居焉宋玉所謂我帝之季女名曰瑶􅁎未行而亡封于巫山之陽髙唐之岨且爲雲暮爲􅀨朝朝暮暮陽臺之下旦朝視之果如其言故爲立廟號朝雲焉其間首尾一百六十里謂之巫峽盖因山爲名也盛弘之荆州記曰舊云自二峽取蜀數千里中􅁪是一山此盖好大之言也唯三峽七百里中兩岸連山略無闕處重巖疊嶂隱天蔽日自非停午夜分不見日月至於夏水襄陵㳂泝阻絶或王命急宜有時云朝發白帝暮至江陵其間一千二百里雖乗奔御風不爲疾也春冬之時則素湍渌潭廻清到影絶獻多生檉栢懸泉瀑布飛其間清榮峻茂良多雅趣毎晴初霜旦林寒澗肅常有髙猿長嘯属引凄異空岫傳嚮哀轉乆絶故漁者􅁔曰巴東三峽巫峽長猿鳴三聲淚沾裳又曰南崖有重嶺疊起最大髙崖間有石色如人􅀒刀牽牛人黒牛黃成就分明此崖旣大加以江湍縈紆廻塗經宿猶望見之行者歌曰朝發黃牛暮宿黃牛三日三夜黄牛如故􅁃仲雍荆州記曰巴陵楚之丗有三峽明月峽廣德峽東突峽即今之巫峽秭歸峽歸郷峽袁山松冝都記曰巴陵楚之丗有三峽髙山重鄣非日中半夜不見日月猿鳴至清諸山谷傳其響冷冷不絶也王韶之始興記曰宿縣有觀峽横巒交枕絶崖岝㟧護水口有貞女峽峽西岸水際有石如人形髙可七尺狀似女子是曰貞女父老相傳秦丗有女數人取螺於此遇風􅀨晝昏而一女化爲此石鄧德朋南康記曰雩都峽其水常自激通奔如轉輪郡國志曰南郷峽峽西八十里有巴郷村善釀酒故俗稱巴郷酒也村傍有溪溪中多靈壽木焉水經注曰湞陽觀峽下有廟丗人以爲河伯晉時縣人有使至洛者使訖將還忽有一人􅀉其書云吾家在觀前石間石間懸藤即其處也但扣藤自當有人取之使者依其言果有二人岀外取書并延入水府衣不霑濡又曰續漢書云虞詡爲武都太守下辯東三十餘里有峽峽中白水生大石鄣塞水流春夏輙濆溢敗壞城郭詡使人燒石以醋灌之石皆淬裂因鐫去焉遂無泛溺之害又曰涇水東南逕都盧山山路之中常有如彈筝之聲行者鼔舞樂而後去即􅃶歌之山也故謂此山峽爲彈筝峽隴西記曰襄武有錦鏡峽即黒水所經其峽四望花木明媚照影於其中因以稱之也峽程記曰瀘合遂蜀四郡皆峽之郡自蠻江桔栢沲導等江至此二百八十江㑹于峽前次荆門都四百五十灘即有清水重峯胡灘漢灘忽雷閃電咤灘瀬灘狼尾使君主簿皆使君主簿沉舟之所遂爲名其他不悉記之三峽者即明月峽仙山峽廣澤峽其有瞿塘灧澦鷰子屏風之􅀋皆不預三峽之數李膺益州記曰廣陽州東七里水南有遮要二塠石石東二里至明月峽峽前南岸壁髙四十丈其壁有圎孔形如滿月因以爲名崗釋名曰崗亢也在上言之詩曰陟彼髙崗我馬􅀇黃又曰如山如阜如崗如陵又曰謂山盖髙爲崗爲陵又曰陟彼崗矣瞻望兄矣尚書曰火炎崑崗玉石俱焚爾雅曰山脊曰崗山謙之丹陽記曰句容縣東三十五里有龍崗崗頂有沸潭周廻十三丈聞人聲水便沸動不聞不涌也王韶之始興記曰郡西南有芙蓉崗髙􅀂玉山隣枕郊郭周廻連亘四十餘里又曰含淮縣白鹿城南有白鹿崗晉咸和中郡民張鮑作令著惠有白鹿遊此崗因以爲名雷次宗豫章記曰洪井西有鸞崗舊􅀃洪崖先生乗鸞所憩處也顧微廣州記曰四㑹有金崗行人往往見金於崗側裴淵廣州記曰城西北五里連續大崗直上百㝷名爲越王冢呉朝掘覔尉他墓竟無所見於天井崗得六玉璽一小車州城北有馬鞌崗秦時瞻氣者言南方有天子氣始皇發民鑿破此崗地中岀血今鑿處猶在増城縣有雲母崗日出照之晃曜武昌記曰城北有崗髙數丈名曰鳯闕其處顯敞昇闕以望州澤多所遠瞻呉黃龍元年有鳯皇集此崗故謂之鳯闕鳯闕南十里有金牛崗古老相傳云有金牛岀此崗崗今半崩坈深数丈金牛躍岀踐崗邊遺跡猶存王妥安成記曰萍鄉西津南五里山名女崗天氣將􅀨水輙先涌岀石門而有五色玄黄百姓謂之玉女披衣鄧德明南康記曰陳蕃墓在青龍崗土人傳云昔見一物龍􅄱而通身絶青数出崗頂及山邊故言名青龍也又曰贑縣馬脊崗在縣西其形馬脊故以爲名也任端休江陵記曰州城北五十四里有楚平王冢枝江班竹崗又云平王冢周廽数百歩未知孰是荆州記曰零陵郡東南有黃溪黄溪西有礬石崗衡山記曰衡山有曽青崗岀曽青可合仙藥有靈壽崗有靈壽木周廽数十里芝草崗有神芝靈草郡國志曰乆畱崗昔太守衛諷罷郡還京故老送別乆留此崗又曰顯朝崗在欝平縣陸績制渾儀處隋圖經曰歴陵縣西十里有石子崗寳山也而髙大有冢如硯子世謂之研子冢是趙簡子冢也石虎令人發之􅀄得炭深一丈得連木板厚髙八尺次得流泉水水色清冷非常以牛皮爲囊作絞車以汲之一月而水無極乃止築城繞之氣成樓闕􅐱元注水經注曰􅖋水岀襄國石井崗崗上有井大如輪隋區宇圖志云此井光武營軍所鑿傍有藂荆􅁄生皆蟠縈如人手結云是光武繫馬處又石勒時天旱沙門佛圖證於此崗掘得一死龍長尺餘濟之以水良乆乃􅂫㝷􅀕之龍騰空而上天雨即降因名龍崗鄱陽記曰大雷崗在縣東北後漢雷義字仲公所居又有小雷崗側又曰雷煥所居之處太平御覽卷第五十三
