body:
  text: 文部十五品量文章歎賞改定詆訶品量文章後周書薛寘傳曰前中書􅁥盧柔學業優􅀷文藻華贍而寘與之方駕故丗號曰盧薛焉梁書曰何遜文章與劉孝綽並見重時謂之何劉梁元帝著論云詩多而能者沈約文少而能者謝眺何遜三國典畧曰劉逖字子長少好弋獵􅀐射後發憤讀書頗工詩詠行臺尚書席毗嘗嘲之曰君軰詞藻譬􅀂春榮湏􅁷之翫非宏材也豈比吾徒千丈松樹常有風霜不可雕悴逖報之曰旣有寒木又發春榮何如也毗􅀏曰可矣唐書曰富嘉謨雍州武功人也舉進士長安中累轉晉陽尉與新安呉少微友善同官先是文士撰碑頌皆以徐􅁃爲宗氣調漸劣嘉謨與少微屬詞皆以經典爲本時人欽慕之文體一變稱爲冨體嘉謨作􅀟龍泉頌干燭谷頌少微撰崇福寺鍾銘詞最髙雅作者推重張鷟字文成凢八登甲科貟外郎貟半千謂人曰張子之文如青銅錢萬選萬中未聞退時時流重之目爲青錢學士楊盈川華州華隂人少與絳州王勃范陽盧照隣東陽駱賔王皆以文詞知名海内稱爲王楊盧駱亦號爲四傑烱聞之謂人曰吾愧在盧前恥居王後當時議者亦以爲然其後崔融李嶠張說皆爲一時宗匠崔李甞曰王勃文章宏逸有絶塵之跡固非常流所及炯與照隣則可企而致盈川之言不信矣張􅀃謂人曰楊盈川之文如懸河注水酌之不竭旣優於盧亦不减王耻居王後則信然愧在盧前爲誤矣李華善屬文與蘭陵蕭潁士友善華舉進士時著含元殿賦萬餘言潁士見而賞之曰景福之上靈光之下華文體温麗少宏傑之氣潁士詞鋒俊發華自以所業過之乃爲􅀕古戰場文燻汚之如故置於佛書之閣華與潁士因閱佛書得之華謂之曰此文何如潁士曰可矣華曰當代秉筆者誰及於此潁士曰君稍加精思便可及此華愕然又曰元和詞人元稹論杜子美之詩盖所謂上薄風騷下該沈宋古奪􅂫李氣呑曹劉掩顔謝之􅀌髙雜徐􅁃之流麗盡得古今之體勢而兼人之所獨專矣則詩人巳來未有如子美者是時山東人李白亦以文竒取稱時人謂之李杜予觀其壯浪縱恣擺去拘束模冩物象及樂府歌詩誠亦􅏔肩於子美矣至􅀂鋪陳終始排比聲韻大或千言次猶數百詞氣豪邁而風調清深屬對律切而脫弃凢近則李尚不能歷其藩翰况堂奥乎魏文帝典論曰文人相輕自古而然傅毅之於班固伯仲之間耳而固小之與弟超書曰武仲以能屬文爲蘭臺令史下筆不能自休夫人善於此自見而文非一體鮮能備善是以各以所長相輕所短矣里諺曰家有弊帚享之千金斯不自見之患也今之文人魯國孔融文舉廣陵陳琳孔璋山陽王粲仲宣北海徐翰偉長陳留阮瑀元瑜汝南應瑒德璉東平劉楨公幹斯七子者於學無所遺於辭無所假咸自以騁騄􅂹於千里仰齊足而並馳以此相服亦良難矣盖君子審巳以度人故能免於斯累而作論文王粲長於辭賦徐翰時有逸氣然粲之匹也如粲之􅀄征登樓槐賦翰之􅀇猿漏巵貟扇橘賦雖張蔡不足過也然於它文未能稱是琳瑀之章表書記今之俊也應瑒和而不壯劉楨壯而不宻孔融體氣髙妙有過人者然不能持論理不勝辭至于􅄂以謿戲及其時有所善楊班之儔也常人貴逺賤近向聲背實又患闇於自見謂巳爲賢夫文本同而未異盖奏議冝雅書論冝理銘誄尚實詩賦欲麗此四科不同故能之者偏也唯通才能備其體文以氣爲主氣之清濁有體不可力強而致譬諸音樂曲度雖均節奏同撿至於引氣不齊巧拙有素雖在父兄不能以移子弟盖文章經國之大業不朽之盛事年壽有時而盡榮樂止乎其身二者必至之常期未􅀂文章之無窮是以古之作者􅀉身於翰墨見意於篇籍不假良史之辭不託飛馳之勢而聲名自傳於後故西伯幽而演易周旦顯而制禮不以隱約而不務不以康樂而加思夫然則古人賤尺璧而重寸隂懼乎時之過巳而人多不強力貧賤則懼於饑寒冨貴則流于逸樂遂營目前之務而遺千載之功日月逝于上體皃衰於下忽然與萬物遷化斯亦志士大痛也融等巳逝唯幹著論成一家之言傅子曰或問劉歆劉向孰賢􅀓子曰向才學俗而志中歆才學通而行邪詩之雅誦書之典謨文質足以相副玩之􅀂近㝷之益逺陳之􅀂肆研之􅀂隱浩浩乎其文章之淵府也李充翰林論曰潘安仁爲文也猶翔禽之羽毛衣􅀍之綃縠抱朴子曰丗謂王充一代英偉所著文時有小疵猶鄧林枯枝滄海流芥未易貶者又曰歐陽生曰張茂先潘正叔潘安仁文逺過二陸又曰張潘與二陸爲比不徒驟歩之間也歐陽曰二陸文詞源流不出俗撿又曰􅁗時不􅁴無鼻之醜陽翟憎無癭之人陸君深疾文士放蕩流遁遂往不爲虚誕之言非不能也陸君之文猶玄圃之積玉無非夜光也吾生之不別陸文猶侏儒測海非所長也歎賞晉書曰張載爲濛汜池賦司􅈻校尉傅􅀇見而嗟歎以車迎之言譚盡日爲之延譽遂知名又曰張華字茂先阮籍見華鷦鷯賦許以王佐之才中書郎成公綏亦推華文義勝巳陸機弟雲嘗與機書云君苗見兄文輙欲燒其筆硯後􅁑洪著書稱機文猶玄圃之積玉無非夜光焉五河之吐流源如一焉其􅒮麗妍贍英銳源逸亦一代之絶乎􅀯史曰王筠字元禮善屬文沈約每見其文常咨嗟謂曰昔蔡伯喈見王仲宣曰吾家書籍悉當相與㒒雖不敏請附斯言筠嘗以詩呈約報書歎詠以爲後進擅美約又嘗謂筠叔志曰賢弟子文章之美可謂後來獨秀又曰謝眺好奬人才㑹稽孔闓粗有文筆才未爲時人所知孔稚珪嘗令草讓表以示眺眺嗟吟良乆手自折簡冩之謂珪曰士子聲名未立應共奬成無惜齒牙餘論其好善如此吴均齊春秋曰丘靈鞠善屬文宋孝武殷貴妃亡靈鞠上挽歌詩云雲横廣陌闇霜深髙殿寒帝摘句咨嗟賞之即轉爲新安王北平中郎中叅軍唐書曰封敖爲翰林學士拜中書舎人敖搆思敏速語近而理勝不務竒澁武宗深重之嘗草賜陣傷邊將詔警句云傷居尓體痛在朕躬帝覽而善之賜之宫錦李德􅁉在相位定䇿破廽鶻誅劉稹議兵之際同列或有不可之言唯德􅁉籌計相畫竟立竒功武宗賞之封衛國公守太尉其制語有遏横議於風波定竒謀於掌握逆稹盗兵壷􅀜晝鏁造􅂰嘉話開懷静思意皆我同言不它惑制出敖往慶之德􅁉口誦此數句撫敖曰陸生有言所恨文不迨意如卿此語秉筆者不易措言坐中解其所賜玉帶以遺敖深禮重之又曰馮定爲太常少卿文宗毎臨樂鄙鄭衛詔奉常習開元中霓裳羽衣舞以雲韶樂和之定統樂立於庭文宗以其端凝􅀂植問其姓氏翰林學士李玨奏定之名文宗喜問曰豈非能爲古章句者耶遂召昇階文宗自吟送客西江詩吟罷益喜因錫以禁中瑞錦仍令大録所著古體詩以獻丗􅀃曰孫興公作天台賦成以示范榮期曰卿試擲置地要作金石之聲范曰恐子之金石非宫啇中聲然毎至佳句輙云應是我軰語又曰左思字太冲作三都賦時人互有譏訾思意不甚愜後示張華曰此二京可三然君文未重於丗冝以示髙名之士思乃請序於皇甫謐謐見之嗟嘆遂爲作序於是先相訾者莫不歛袵讃述焉又曰􅁃仲􅀄作楊都賦成呈􅁃亮以親族之懷大爲其名價云可三二京四三都於是人人競冩都下􅁓爲之貴顔氏家訓劉孝綽當時旣有重名無所與讓唯服謝詠置几案動輙諷吟味其文改易語曰爲命禆諶草創之丗叔討論之行人子羽脩飾之東里子産潤色之漢書曰倪寛善屬文張湯爲廷尉廷尉府盡用文史法律之吏而寛以傳生在其間見謂不習事不署曹除爲從吏之北地租畜數年還至府上畜薄㑹廷尉時疑奏巳再却矣􅁺吏莫知所爲寛言其意􅁺吏因使寛爲奏奏成讀之皆服以白廷尉張湯湯大驚召寛與語乃部其材以爲􅁺上寛所作奏郎時得可意異曰湯見上問曰前奏非俗吏所及誰爲之者湯言兒寛上曰吾固聞之乆矣湯由是嚮學以寛爲奏讞􅁺晉書曰􅀽宏從桓温北伐又作北征賦皆其文之髙者嘗與王珣伏滔讀其北征賦至聞所傳於相傳云獲麟於此野但靈物以瑞德奚受體於虞者䆒尼父之慟哭似實慟而非假豈一性之足傷乃致傷於天下至此便改韻珣云此賦必傳千載無容率尓今於天下之後便移韻結事然於冩送之致似未爲盡桓温曰卿思益之宏應聲曰感不絶於予心愬流風而獨冩珣諷味乆之謂滔曰當今文章之美當共推此生宋書曰王誕字茂世有才藻晉孝武帝崩從叔尚書令珣爲哀䇿出夲示誕曰猶少叙節物一句誕便攬筆益之接其秋冬代變云霜繁廣除風回髙殿詢歎美因而用之齊書曰張融作海賦文詞詭激獨與衆異後以示鎭軍將軍徐覬之覬之曰卿此賦實超􅀇虚但恨不道塩耳融即求筆注曰漉沙構白􅆈波出素積雪中春飛霜暑路齊書劉繪傳曰魚復侯子響誅豫章王嶷欲求葬之召繪爲表湏􅁷便成嶷歎曰袮衡何以過此唯足八字文提携鞠養俯見成人後魏書髙祖嘗宴侍臣於清徽堂遂令黄門郎崔光讀暮春群臣應詔詩至彭城王勰詩髙祖仍爲改一字曰昔祁奚舉子天下謂之至公今見勰詩始知中府之舉非私也勰曰臣露此掘才見本朝之私頼􅂪神筆賜刋得有令譽髙祖曰雖雕琢一字猶是王之本體勰曰臣聞詩一言可蔽今陛下刋以一字足以價等連城唐書文苑傳曰李啇隱能爲古文不喜偶對從令狐楚幕楚能章奏遂以其道授啇隱自是始爲今體章奏三國典略曰齊王在東山飲酒投柸怒赫召魏収於前丘爲書曰朕歷數在射志清四海蕞尓􅁗隴乆阻風化混一之事期在今日必當訓旅誓衆天動雲臨朕巳下木汾流成舡晉地便當躬先將士入王璧徑掩長安梟彼兇首朕與梁國舊敦好睦聞其姦計乃欲規謀冝令上黨王渙揔勒熊熊星流風卷王者之言明如日月冝宣内外咸使聞知書成齊主覽之於兇首下足九言曰雖藏山没水終不縱赦於是遣渙南侵曹植與楊脩書曰丗人之著述不能無病僕常好譏彈其文有不善者應時改定昔丁敬禮常作小文使僕潤飾之僕自以才不過􅀂人辭不爲也敬禮謂僕卿何所疑難文佳麗吾自得之後丗誰相知定吾文者耶常歎此言逹以爲美譚丗􅀃曰司馬景王令中書虞松作表再呈輙不可意令松更定松思竭不能改心存之形於顔色鍾㑹察其憂問松松恱以實荅㑹取爲定五字恱服之以呈景王景王曰不當尒耶誰所當也曰鍾㑹向亦欲啓之㑹公見問不敢饕其能王曰如此可大用令來日平旦入見王獨撫手歎息曰此眞王佐才也詆訶曹植與楊脩書曰劉季緒才不能逮於作者而好詆訶文章椅摭利病晉書曰左思字太冲齊國臨淄人也作三都賦搆思十年門庭藩溷㫮置筆硯遇得一句即便䟽之賦成思恐時人未之見重先以示皇甫謐謐稱善爲其賦序陸機入洛欲爲此賦聞思作之撫掌而􅀏與弟雲書曰此間有槍助庚切作三都賦湏其成當以覆酒瓮耳及思賦出機絶歎服以爲不能加也遂成當以輟筆焉三國典略曰齊有大儒劉畫恨不學屬文力復緝綴作賦一首名爲六合自謂紀倫魏収謂人曰賦名六合其愚巳甚及其見賦又愚於名又曰邢劭嘗云江南任昉文體本踈魏収非直模擬亦大偷竊収聞之乃言曰劭常於沈休文集裏作賦何意道我偷任語任沈俱有重名邢魏各有所好顔之推嘗以二公之意問於祖珽珽曰見邢魏之臧否即任沈之優劣又曰魏収言及沈休文集毀短之徐之才怒曰卿讀沈文集半不能解何事論其得失謂収曰未有與卿談収去避之隋書曰髙搆以老病解職河東薛道衡才髙當丗毎稱構有清鑒所有文筆必先以草呈搆而後出之搆有所詆訶道衡未嘗不嗟伏隋􅁃自直少好學屬文於五言詩尤善性恭慎不妄交遊特爲所愛帝有篇章必先示自直令其詆訶自直所難帝輙改之至於再三俟其稱善然後方出其見親禮如此唐書曰文苑傳曰天寳未詩人杜甫與李白齊名而白自􅀒文格放逹譏甫齷齪而有飯顆山之嘲誚國朝傳記曰梁常侍徐陵聘於齊時魏収文學北朝之秀收録其文集以遺陵令傳之江左陵濟江而沉之從者以問陵曰吾爲魏公藏拙太平御覽卷第五百九十九
