front:
  text: 太平御覽卷第七百一
  hash: sha256:d0828438815d389a65069762f0e1c4702653b4b689c1561ab57f86c75faef770
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_701-1a}
body:
  text: 服用部三屏風歩障承塵屏風釋名曰屏風以屏障風也扆在後所依􅀝也周禮天官掌次曰王大旅上帝掌次設皇邸大旅上帝􅀕天於圎丘也鄭司農曰皇羽覆也玄謂後板屏風與梁羽象鳯皇色以爲飾也禮記明堂位曰天子􅀒斧扆􅀯面而立鄭玄曰斧扆􅀞屏風又三禮圖曰扆縱廣八尺􅀞斧文今之屏風則遺象也漢書曰陳萬年字㓜公善人事賂外戚爲御史大夫子咸字子康年十八有異材抗直數言事刺譏近臣萬年嘗病召咸教誡於牀下語至夜半咸睡着頭觸屏風萬年大怒欲杖之曰乃公教戒汝汝反睡不聽吾言何也咸叩頭謝曰具暁所言大要教咸謟也萬年因不復言又曰班伯以侍中光禄大夫養疾乆之成帝出過臨侯伯伯乃再視事自大將軍薨後師古曰主鳯也富平定陵侯張放淳于長等始愛幸出爲微行行則同輿執轡入則侍中設宴飲之㑹及趙李諸侍中皆引滿舉白時乗輿幄坐帳􅀞屏風師古曰坐音才卧反􅀞紂醉踞姐巳作長夜之樂上以伯新起數目禮之因顧指􅀞而問伯紂爲無道至於是虖伯對曰書云迺用婦女之言何有踞肆於朝所謂衆惡歸之不如是之甚者也上曰苟不居此此圖何戒伯曰沉湎于酒微子所以告去也式號式謼大雅所以留連也師古曰大雅蕩之詩云式號式謼俾晝作夜醉號謼以晝爲夜流連作詩之歡而泣涕流連也而諸書乃以留連荒亡盖失之矣大雅以流連不謂飲酒之人也謼音大故反詩書淫亂之戒其厚皆在於酒上迺喟然歎曰吾乆不見班生今日復聞讜言放等不懌又曰成帝省减椒房掖庭用度許皇后上疏曰設妾欲作某屏風張於某所必䋲妾以詔書矣又曰王莽常翳雲母屏風東􅀚漢記曰宋弘嘗燕見御座新施屏風圖􅀞列女帝數顧視之弘正容言曰未見好德如好色者上即爲撤之上姉湖陽公主新寡上與共論朝臣微觀其意主曰宋公威容德器群臣莫及上曰方圖之後弘見上令主坐屏風後因謂弘曰諺言貴易交冨易妻人情乎弘曰臣聞貧賤之交不可忘糟糠之妻不下堂上顧謂主曰事不諧矣謝承後漢書曰鄭弘爲太尉舉第五倫爲司空班次在下每正朔朝見弘曲躬自卑上問知其故遂聽置雲母屏風分隔其間由此爲故事呉志曰景帝時紀亮爲尚書令子騭爲中書令毎朝㑹詔以御屏風隔其座焉或曰隔以雲母屏風又曰曹不興善􅀞孫權使􅀞屏風誤筆落􅀧素因就以作蠅權以爲生蝇舉手彈之魏書曰太祖雅性節儉帷帳屏風壞則􅀘納魏志曰太祖平栁城班所􅀗器物特以素屏風素慿几賜毛玠曰以君有古人之風故賜君以古人之服晉書曰呉隱之字處黙清貧劉􅁉拜太常􅀸以竹蓬爲屏風坐無氊席續晉陽秋曰何無忌母劉牢之姉無忌與宋髙祖謀夜於屏風中製檄文母登屏風窺之大喜曰汝能如此吾讎雪矣宋書曰顔延之愛􅁎死以冬日臨􅂘忽見妾排屏風以壓延之延之懼墜地因病又曰王琨儉於財用設酒不過兩爵輙云此酒難遇塩豉薑菜之屬並掛屏風酒漿悉置牀下内外有求琨手自付之宋起居注曰元嘉中中丞劉禎奏風聞廣州刺史韋朗於州作緑沉銀泥漆屏風二十三牀請以事免朗官王琰宋春秋曰明帝性多忌諱禁制廻避者數十百品亦惡白字屏風書古來名文有白字輙加改易􅀇黄朱紫隨冝代之齊書曰冝都王鏗年十􅀊時與吉景曜啇略先言徃行左右誤排抩瘤屏風倒壓其背顔色不異言談無輟亦不顧視又皇太子在雍有發古得玉屏風遣將還都又劉悛傳武帝常在東宫毎幸悛坊閑言至夕賜屏風帷帳南史曰王逺字景舒位光禄勲時人謂逺如屏風屈曲從俗能蔽風露言能不􅃜物理也唐書曰太宗引虞丗南爲秦府十八學士嘗令冩列女傳以裝屏風于時無夲丗南書之一無遺失又曰田神功卒賜屏風茵褥於靈座又曰憲宗以天下無事留心典墳著書十四篇名曰前代君臣事跡冩於六扇屏風以示宰相春秋後語曰孟嘗君毎待客坐語屏風後常有侍吏主記所與客語知其親戚居處客去後使使謝餽無所遺失塩鐵論曰一杯棬去逺反􅀃文曰䊎用百人之力一屏風就萬人之功其爲多矣功積於無用財盡於不急桓譚新論曰五聲各從其方春角夏徴秋啇冬羽宫居中央而兼四季以五音湏宫而成可以殿上五色錦屏風諭而示之望視則青赤白黄各各異􅀋就視則皆以其色爲地五色文之丗其欲爲四時五行之樂亦當各以聲爲地而用四聲文飾之猶彼五色屏風矣西京雜記曰廣川王去疾發魏哀王冢有石屏風又曰趙飛鷰爲皇后其女弟遺雲母屏風瑠璃屏風又曰漢江都王建勁徤嘗跳越七尺屏風漢武舊事曰帝起神臺其上扉屏風悉以白琉璃作之光冶洞澈也郭子横洞􅁳記曰上起神明臺上有金牀象席雜玉爲􅀛甲屏風拾遺録曰董偃嘗卧延清之室設紫瑠璃屏風列麻油燈於戸外視屏風若無屏風矣侍人唯見燈明以言無礙乃於屏風外扇偃曰玉石豈湏扇而後清涼也侍者乃屏風扇以手摸之方知有屏風之礙矣又曰孫亮作瑠璃屏風甚薄而徹毎於月下淸夜舒之常愛寵四􅁎使坐屏風中外望之乃如無隔唯香氣不通於外劉向七畧別傳曰臣與黄門侍郎歆以列女傳種􅀋相從爲七篇以著禍福榮辱之効是非得失之分􅀞之於屏風四堵桓任別傳曰任子亡􅉖念之爲作象著屏風置座邊古今注曰孫亮作瑠璃屏風鏤作瑞應圖一百二十種鄴中記曰石虎作金銀鈕屈膝屏風衣以白縑􅀞義士仙人禽獸之像讃者皆三十二言髙施則八尺下施四尺或施六尺隨意所欲也三輔决録曰何敞爲汝南太守和帝南廵過郡有刻鏤屏風爲帝設之帝命侍中黄香銘之曰古典務農雕鏤傷民忠在竭節義在脩身風土記曰陽羡縣令􅀽起生有神異無病而亡塚東靣有屏風盖神之所坐東宫舊事曰皇太子納妃有牀上屏風十二牒織成漆連銀鈎紐織成連地屏風十四牒銅環鈕京兆舊事曰杜陵蕭彪字伯文爲巴郡太守以父老歸供養父有客常立屏風後自應使命三􅁗記曰荆軻入􅁗爲燕太子報讎把秦王衣􅃑曰寕爲􅁗地􅀑不爲燕地囚王美人彈琴作語曰三尺羅衣何不掣四靣屏風何不越王因掣衣而走得免叚􅀛龍凉州記曰有人發張駿墓得眞珠簾箔雲母屏風語林曰滿􅁬字武秋羸惡風侍坐武帝屢顧看雲母幌或云北䆫琉璃屏風實密似踈有難色武帝􅀏之荅曰臣如呉牛見月則喘或云是胡質侍魏明帝坐俗說曰荀介子爲荆州刺史荀婦大妬恒在介子齋中客來便閉屏風有桓客者時爲中兵叅軍來詣荀諮事論事巳訖爲復作餘語桓時年少殊有姿容荀婦在屏風裏便語桓云桓叅軍君知昨人不論事巳訖何以不去桓狼狽便走又曰謝萬作呉興郡其兄安時隨至郡中萬眠常晏起安清朝便徃牀前叩屏風呼萬起淮南王屏風賦曰列在左右近君頭足不逢仁人永爲杇木曹毗詩叙曰余爲黄門在直多懐遂作詩書屏風李尤屏風銘曰舎則潜辟用則設張立必端直處必廉方壅閼風邪霧露是抗奉上蔽下無失其常王羲之與殷浩書曰􅂆令􅀞廉藺於屏風歩障晉書曰石崇與王愷相尚愷以紫絲歩障四十里崇以錦歩障五十里以敵之又曰王凝之妻謝氏有才辯凝之甞與賔談論詞理將屈謝氏遣婢白獻之曰欲與小郎解圍乃施青綾歩障自蔽與客申獻之前議客不能屈齊書曰江夏王寳玄與崔惠景叛景敗寳􅀇逃奔數日乃出帝召入後堂以歩障裹圍之令羣小數十人鳴鼓角繞其外遣人謂曰汝近圍我亦如此少日乃殺之北齊書曰琅瑘王儼字仁威武成弟三子也武成甚愛之儀衛甚盛帝甞與后在華林園東門外張幕施青綾歩障以􅀚之東宫舊事曰太子納妃有絲布碧裹歩障三十漆竽銅鈎拾遺記曰石虎爲浴臺列鳯文錦歩障縈蔽於浴所語林曰許􅀇度將弟出都婚諸人聞是􅀇度弟欽遲之旣見乃甚癡便欲嘲弄之玄度爲之解紛諸人遂不能犯境劉眞長歎曰玄度爲弟婚施十重鐵歩障語林曰大將軍刑周伯仁以歩障繞之經日巳具王曰周伯仁子弟癡何以不知取其翁屍周家然後収之承塵釋名曰承塵施於上以承塵土也周禮春官下曰幕人掌帟綬之事云謂帟在王幕若幄中坐上承塵也後漢書曰雷義字仲公豫章鄱陽人也􅀄爲郡功曹皆擢舉善人不伐其功義嘗濟人死罪罪者後以金二斤謝之義不受金主伺義不在黙投金於承塵上後葺理屋宇乃得金金主巳死無所復還義乃以付縣曹宋書曰建平王宏子景素在南徐甚得人心而謗聲曰積􅀷懷憂懼嘗與故吏劉璡獨處曲臺有鵠集於承塵飛鳴相追景素泫然曰若斯鳥者遊則叅于風煙之上止則隱于林木之下飢則啄渇則飲形體無累于物得失不􅀜於心一何樂哉搜神記曰長安有張氏者獨處一室有鳩自外入止于牀張氏惡之披懷而祝曰鳩尔來爲我禍耶飛上承塵上爲我福也來入我懷鳩飜飛入懷乃化爲一鈎從尔資産巨萬又曰􅀶陵劉伯祖爲河東太守所止承塵上有神能語京師詔書誥下消息輒豫吿伯祖伯祖問其所食啖欲得羊肝於前切之臠隨刀不見盡兩羊肝有一老狸􅆌眇在案前持刀者舉刀欲斫之伯祖訶止自舉着承塵上湏􅁷大􅀏曰向者啖肝醉忽失形與府君相見大慙愧後伯祖當爲司􅀠復先語伯祖云某月某日書當到期如言及入司􅀠府神隨逐承塵上輙言省内事伯祖大恐怖謂神曰今職在刺舉左右貴人聞神在此因以相害神荅曰如府君所慮當相捨去遂無聲支僧載外國事曰斯訶調國有大冨長者條三弥與佛作金薄承塵一佛作兩重承塵抱朴子曰余友人滕永叔嘗養大猕猴以鐵鏁鏁之着牀間而犬忽齧殺之永叔便合鏁埋之後百許日有􅀑者見猕猴走上承塵上不悟是猕猴􅀑也驚指之曰猕猴何以􅀍傷流血断走乎永叔曰始乃今日知猴死復有􅀑乎語林曰􅀓信忿母母羸病恒驚悸信乃取鷄鴨去毛置承塵上行落地母輙恐怖楚辭曰經堂入奥朱塵筵塵承塵也太平御覽卷第七百一
