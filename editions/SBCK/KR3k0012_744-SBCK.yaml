body:
  text: 工藝部一叙藝射上叙藝書曰以旦代某之身予仁􅀂考能多材多藝禮曰是月也命將講武習射御角力執弓挾矢以獵又曰德成而上藝成而下又曰尚􅇊而賤車則人興藝周禮曰保氏掌諌王惡而養國子以道馬融曰道六藝乃敎之六藝禮樂射御書數論語曰太宰問於子貢曰夫子聖者歟何其多能也子貢曰固天縱之將聖又多能也又曰志於道據於德依於仁遊於藝漢書曰元帝多􅇊藝華嶠後漢書曰鄧禹十三男各令習一藝梁書曰栁惲字文暢早有令名少工篇什彈琴爲士流涕一帝謂周捨曰吾聞君子不可求俻至於栁惲可謂具美分其才藝足了十人又曰朱异字彦和通覽五經渉獵子史􅀶弈書筭尤善沈約面試皆妙乃戲之曰君何不廉天下有藝君一時持去可謂不廉也後漢書曰祖珽字孝徴裴譲之字士禮俱崇文學邢劭省中爲之語曰多􅇊多能祖孝徴能賦能詩裴讓之皆一時之美也後趙録曰張材􅇊烏譚部人也善棊􅀶蹴鞠􅃲雞諸􅇊身長八尺飲酒石餘不亂射上中論藝紀曰射以平志御以和心書以綴事數以理煩李顒遊藝箴曰邈矣􅁎旦惟藝之淵易曰弦木爲弧剡木爲矢弧矢之利以威天下蓋取諸睽睽乖也物乖則爭興弧矢之用所以威乖爭也又曰公用射隼于髙墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以岀而有獲語成器而後動者也括結也君子待時而動則無結閔之患也詩曰旣張我弓又挾我矢又曰終日射侯不岀正􅀆禮曰工尹啇陽與陳弃疾追吴師及之陳弃疾謂工尹啇陽曰王事也子手弓子射諸射之斃一人韔弓丑亮切韔弓衣止其御曰朝不坐燕不與殺三人亦足以反命矣朝燕于寢大夫坐於上士立於下然則啇陽與御者皆土也孔子曰殺人之中又有禮焉善之又曰孔子云士使之射不能則辭以疾懸弧之義也男子生而設弧於門左示有射道而未能也又曰射有似乎君子失諸正鵠反求諸其身反求於其身不以怨人也盡曰正皮曰鵠也又曰孔子射於矍相之圃蓋觀者如堵墻矍相地名也樹菜􅂼曰圃射至於司馬使子路執弓矢岀延射曰賁房吻切軍之將亡國之大夫與爲人後者不入其餘皆入蓋去者半入者半先行飲酒禮將射弓以司馬子路執弓矢延射則爲司射也賁讀爲僨僨猶覆則也又使公罔之裘序􅀧楊觶而語曰㓜壯孝悌􅂄耋好禮不從流俗修身以俟死者不在此位也蓋去者半處者半序㸃楊觶而語曰好學不倦好禮不變耄期音基稱道不亂者不在此位也蓋僅有存焉之發聲也射畢又使此二人舉觶者古者於旅也語語謂􅀃美理也三十曰壯􅂄耋皆老也流俗失俗也處猶留也不可以在此賔位序􅀧或爲徐􅀧壯或爲將耄期或爲旄動又曰射之爲言繹也或曰舎也繹者各繹己之志也故心平體正持弓矢審固持弓矢審固則射中矣故曰爲人父者以爲父鵠爲人子者以爲子鵠爲人君者以爲君鵠爲人臣者以爲臣鵠故射者各射巳之鵠故天子大射謂之射侯射侯者射爲諸侯也射中則得爲諸侯射不中不得爲諸侯大射將􅀕擇士之射也以爲某鵠者將射還視侯中之則成人不中之則不成人也得爲諸侯爲有慶也不得爲諸侯謂有譲也天子將􅀕必先習射於澤澤者所以擇士也已射於澤而后射於射宫射中者得與於􅀕不中者不得與於􅀕不得與於􅀕者有讓削以地得與於􅀕者有慶益以地進爵絀地是也澤宫名也士謂諸侯朝者諸臣及所貢士也皆先令習射於澤巳乃射宫課中否也諸侯有慶者先進爵有讓者先削地也故男子生桑弧蓬矢六以射天地四方天地四方者男子之所有事也故必先有志於其所有事然後敢用榖也左傳曰晉楚將戰潘尫乏子黨與養由基蹲甲而射之徹七禮焉蹲聚以示王曰君有二臣如此何憂於戰王怒曰大辱國詰朝尓射死藝言汝以射自多必當以藝死也吕錡夢射日中之退入於􅅺吕錡魏錡也占之曰􅁎姓日也異姓月也射而中之退入於􅅺亦必死矣及戰射恭王中目王召養由基與之二矢使射吕錡中項伏弢他力切弓衣也以一矢復命言一發而中又曰衛獻公出奔􅀄尹公他學射於􅁃公差􅁃公差學射於公孫丁二子追公二子也與差也爲孫氏逐也公孫丁御公子魚曰射爲背師不射爲戮射而禮乎子魚􅁃公差也禮射不求中也射兩軥而還軥車軛卷者今俗謂之軥心木尹公他曰子爲師我則逺矣乃反之他不從丁學故曰逺始與公差具退悔而獨還射丁公孫丁授公轡而射之貫臂貫手公他臂又曰吴子諸樊伐楚以報舟師之役門于巢攻巢門也巢牛臣曰吴王勇而輕􅀂啓之親門啓開門也我獲射之必殪殪死也是君也死疆其少安從之吴子門焉牛臣隱於短墻以射之卒又曰昔賈大夫惡貌醜也娶妻而美三年不言御以如臯射雉獲之其妻始􅀏而言周禮曰不司樂掌成均之法鄭司農云均調也樂師主調其音大司樂主受此成事已調之樂大射王岀入令奏王夏及射令奏騶虞騶虞樂章名在召南之卒章王射以騶虞爲節也詔諸侯以弓矢舞舞謂執弓挾矢揖讓進退之儀又曰樂師掌國學之政以教國子少舞謂以年㓜少時教之舞凡射王以騶虞爲節諸侯以貍首爲節大夫以采蘋爲節士以采繁爲節騶虞采蘋采䌓皆樂章名在囯風召南爲貍首在樂記又曰王以六耦射三侯三獲三容樂以騶虞九節五正諸侯以四耦射二侯二獲二容樂以貍首七節三正􅀌卿大夫以三耦射一侯一獲一容樂以采蘋五節二正士以三耦射犴侯一獲一容樂以采蘋五節二正鄭司農云三侯虎熊豹也容者乏也待􅀗者所蔽也九節析羽九重設於長杠正所射也􅀂王大射則以貍歩張三侯鄭司農云貍歩謂不舉足爲折歩於今爲半歩也􅀇謂貍善傳者也行則止而擬度焉其發必􅀗是以量侯道法之也王射則令去侯立於後以矢行吿卒令取矢鄭司農云射人王令人去侯所而立於後也以矢行告射人以矢行髙下左右告於王者也又曰射鳥氏掌射鳥鳥謂中膳羞者鳬鴈鳴鴞之屬也􅀕祀以弓矢敺烏鳶凡賔客㑹同軍旅亦如之烏鳶善鈔盗便汗人射則取矢矢在侯髙則以并夾取之鄭司農云王射則射鳥氏主取其矢在侯髙者矢着侯髙人手不能及則以并夾取之并夾鍼箭具夾讀爲習故司弓矢職曰大射燕射共弓矢并甲又曰庭氏掌射國中之祅鳥􅀂不見鳥獸則以救日之弓與救月之矢夜射之不見鳥獸謂夜來鳴呼爲恠者獸狐狼之屬鄭司農云救日之弓救月之矢謂日月食所作弓矢玄謂日月之食隂陽相勝之變也於日食則射太隂月食則射太陽􅀂神也則以太隂之弓與枉矢射之神謂非鳥獸之聲􅀂或叫于宋大廟譆譆出岀者又曰王大射則共虎侯熊侯豹侯設其鵠諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠大射者爲祭祀射王將有郊廟之事與􅀖國所貢之士可以與祭者射者可以觀徳行其容躰比於禮其節比於樂而中多者得與於􅀕凢大射各於其射宫侯者其所射也以虎豹熊麋之皮飭其側所謂皮侯三之大射虎侯王所自射也熊侯諸侯所射豹侯卿大夫以下所射諸侯之大射熊侯諸侯所自射豹侯羣臣所射卿大夫之大射麋侯君臣共射焉又曰保氏掌養國子以道教之五射五射一曰白矢二曰參連三曰剡注四曰襄尺五曰井儀也論語曰君子無所争必也射乎言於射而後有争也揖讓而􅂛下而飲射於堂􅂛及下皆揖讓而相飲也其爭也君子多筭飲少筭君子之所爭也又曰射不主皮射有五善焉一曰和志體和也二曰和容有容儀三曰主皮能中質四曰和順合雅頌五曰與舞同射者不但以中皮爲善亦兼取其和容也爲力不同科古之道也爲力力役之事亦在上中下設三科焉故曰不同科也韓詩外傳曰楚熊渠子夜行見寢石以爲伏虎彎弓而射之没金飲羽下視知其石也因復射之矢摧無跡也三禮射侯圗曰天子大射之時天子虎侯九十歩諸侯熊侯七十歩卿大夫豹侯五十歩畿内諸侯大射君熊侯九十歩卿大夫參侯七十歩士豻五旦切侯五十歩天子卿大夫射君臣共射一麋侯五十歩諸侯卿大夫亦如之天子及諸侯之士皆無大射叅侯者以豹皮爲鵠以麋皮爲飾叅之爲言􅄂也豻侯者以胡大皮爲鵠亦以爲飾又曰天子賔射亦三侯天子射五正侯諸侯射三正侯卿大夫射二正侯諸侯賔射二侯君三正卿大夫賔射君臣共射一侯二正士與士賔射豻侯二正士不得􅀞雲氣故以豻皮飾其側也畿内諸侯與外國同其侯道亦如之又曰天子燕射天子熊侯諸侯卿大夫士虎豹侯諸侯燕射君亦熊侯卿大夫亦冝叅侯士鹿豕卿大夫與其臣燕射君臣共射虎豹侯士燕射亦冝豹侯􅀞鹿豕焉畿内諸侯與外國用其侯道亦如賔射戰國䇿曰楚有養由基者善射去楊葉百歩而射之百發百中有一大夫過之曰善射可敎矣由基子試代我射之客曰我非能敎子出左屈右也夫射者百發百中而不以善息少焉氣衰力勌弓撥矢拘一矢發而不中前功盡弃矣又曰更羸與魏王處廡下有鴈從東方來更羸虚發而鴈下魏王曰射可至此乎更羸曰其飛徐其鳴悲飛徐者故瘡痛也鳴悲者失群也故痛未息驚心末去故聞弦音而下史記曰漢有善􅀐射者樓煩楚挑戰三合樓煩輙射殺之又曰李廣爲右北平太守出獵見草中石以爲虎射之中石没鏃視之石也因復更射之終不復入廣所居郡聞有虎常自射之及居右北平射虎虎騰傷廣廣亦竟射之廣爲人猨臂其善射亦天性也雖其子孫他人學者莫能及廣擊匈奴中貴人從匈奴三人射之中貴人殺其􅀐且盡中貴人走廣廣曰是必射鵰者鵰鳥善射者射之也逐之果然廣爲將其射見敵非十歩之内度不中不發發即應弦而倒用此爲將兵數困辱漢書曰匈奴畏郅都之威刻木像都之狀交弓射之莫能一中又曰堂邑父胡人也善射與張騫俱使西域每處困之時射鳥獸供食後漢書曰王寵善射十發十中皆同處焉又曰董卓膂力過人􅀟帶兩鞬左右馳射爲羌胡所畏魏志曰挹婁國古肅愼氏之國也善射入人目又曰文帝共上常獵爲虎所逐顧射應聲而倒太祖壯其摯勇使將武􅀐魏略曰成公英從太祖出獵有三鹿走過太祖命英射之三發三鹿皆應弦而倒吴志曰太史慈字子義􅀄北海相孔融以黄巾㓂􅁀出屯都昌爲賊管亥所圍慈乃帶䭈攝弓上馬將兩􅀐自隨各作一的持之開門直出外軍圍下左右人並驚駭兵馬牙岀慈引馬至城下塹内植所持的各一出射之射畢徑入門晨復如此圍下人或起或卧故慈復植的射之畢復入門明晨復岀如此無復起者於是鞭馬直突圍中馳去此賊覺知慈行巳過又射數人皆應弦而倒故無敢追者慈猿臂善射弦不虚發甞從孫䇿討麻保賊賊於屯裏縁樓上行罵以手持樓棼慈引弓射之矢貫手着棼圍外萬餘人莫不稱善其妙如此晉書曰劉曜字永明身長九尺六寸垂手過膝雄武有膂力射鐡入一寸焉時號神射也又曰􅁃翼時有衆萬詔加都督征討諸軍事師次襄陽大㑹僚佐陳旌甲親授弧矢曰我之行也善此射矣遂三起三疊徒衆屬目其氣十倍又曰􅁃翼鎮武昌謝尚數詣翼諮謀軍事甞與翼共射翼曰卿􅀂破的當以鼓吹相賞尚應聲中之翼即以其副鼓吹給之又曰楊濟遷太子太傳濟有才藝常從帝校獵北邙山下與侍中王濟俱着布袴褶􅀐馬執角弓在輦前猛獸突岀帝令濟射之應弦而倒須􅁷復一岀濟受詔又射殺之六軍大呌稱快又曰魏舒累遷後將軍鍾毓長史毎與叅佐射舒常爲畫籌而巳後遇朋人不足以舒滿數毓􅀄不知其善射舒容貌閑雅發無不中舉坐愕然莫有敵者毓歎而謝曰吾之不足以盡卿才有如此射矣一又曰江州刺史􅁃恱隆安中爲司徒長史曾至京口劉毅時甚窶先就府借東堂與親故出射而恱與僚佐徑來詣毅吿之曰毅軰迍否之人合一射甚難君於諸堂並可望以今日見讓恱不許射者皆散唯毅留射如故又曰王愷以帝舅奢豪有牛名八百里駮常瑩其蹄角王濟請以錢千萬與牛對射而賭之愷亦自恃其能令濟先射一發破的因據胡牀叱左右速探牛心來湏􅁷而至一割便巳齊春秋曰冝都王鑑字宣徹太祖第十六子善射常取甘蔗挿地百歩射之十發十中古之楊葉殆不能加陳書曰禇玠剛毅有膽决長􅀐射常從司空侯安都於徐州出獵遇猛獸玠射之再發中口入腹俄而獸斃燕書曰賈堅字丗固彎弓三石餘烈祖以堅善射故親試之乃取一牛置百歩上召堅使射曰能中之乎堅曰少壯之時能令不中今巳年老正可中之恪大􅀏射發一矢拂脊再一矢磨腹皆附膚落毛上下如一恪曰復能中乎堅曰所貴者以不中爲竒中之何難一發中之堅時年六十餘觀者咸服其妙又曰慕容根善射甞從行獵有一野羊立於懸崖太祖命左右射之莫有中者根自募求射之一發而中崔鴻十六國春秋燕録曰建威翰奔還夲國有勁􅀐百餘追之翰遥謂之曰吾旣思戀而歸必無返面吾之弧矢汝曹知否無爲相逼自取死也吾處汝國乆矣誓不殺汝可百歩竪刀吾射中者汝便冝返不中者可前也諸􅀐解刀竪之翰發而中鐶追􅀐乃散又後燕録曰慕容盛行遇賊盛曰汝欲當鋒乎試竪汝手中箭百歩我善中之冝慎汝命如不中當束身相授盗乃竪箭盛一發中之盗曰相試耳資而遣之又前􅁗録曰符琳字永瑶堅之第五子也有文武才藝引弓五百斤射銅犁耳至於山水文詠皆綺秀清麗又前凉録曰索孚字國明燉煌人善射十中八九或謂之曰射有法乎孚曰射之爲法猶人主之治天下也射者弓有強弱矢有銖兩弓不合度矢不端直主雖逢蒙不能以中才不稱官萬務荒殆雖有尭舜之君亦無以治也又趙録王劉曜親圍陳安於隴城安突圍而岀近則刀矛俱發輙害六七逺則􅀟帶兩鞬左右馳射太平御覽卷第七百四十四
