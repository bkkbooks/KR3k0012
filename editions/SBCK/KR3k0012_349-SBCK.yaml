front:
  text: 太平御覽卷第三百四十九
  hash: sha256:375d5bb4fd30ec8ea755c1e1d9138d198566e4162bd579a30cbb344268aef58c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_349-1a}
body:
  text: 兵部八十箭上字林曰箭矢竹也字統曰箭者竹之別形大身小葉曰竹小身大葉曰箭箭竹主爲矢因謂矢爲箭開元文字曰東南之美者有會稽之竹箭焉箭篠也自關而東謂之矢自關而西謂之箭箭者竹名因以爲號也三鐮謂今䇶音同射箭也平題今戲射箭也鐮稜也題頭也􅀃文曰箭矢也從竹前聲釋名曰矢指也言其所指向迅疾也又謂之箭箭進也其夲曰足矢形似木木以下爲夲以根爲足又謂之鏑鏑敵也可以禦敵也齊人謂之鏃言其所中皆族滅也􅀜西曰釭釭鉸音校也言有鉸刃也其體曰簳言挺簳也其旁曰羽如鳥羽也鳥湏羽而飛矢湏羽而前也齊人曰衛所以導衛矢也其末曰括括㑹也與弦㑹也括旁曰义形如义也方言曰箭自關而東謂之矢江淮之間謂之鍭音侯􅀜西曰箭郭璞注云箭者竹名因以爲號也楊雄方言曰凡箭鏃三者謂之羊頭其廣薄而長薄謂之錍音卑爾雅曰東南之美者會稽竹箭焉注云會稽山名今在山隂縣南竹箭條也又曰金鏃剪羽謂之鏃骨鏃不剪羽謂之志郭璞注曰金鏃今錍箭也骨鏃金骨骲不剪謂以鳥羽自然淺狹不復剪也骲音雹孫卿子曰浮游作矢丗夲曰夷牟作矢黄帝二臣太公兵法曰箭之神名續長趙氏兵書曰矢一名信徃易曰得金矢利艱貞吉又曰射雉一矢亡終以譽命書曰周成王崩垂之竹矢在東房垂舜共工所爲也詩曰周道如砥其直如矢又曰弓矢旣同又曰舎矢如破又曰旣張我弓旣挾我矢發彼小豝殪此大兕又曰束矢其㥰㥰衆意勁急也五十矢爲束禮記曰故男子生桑弧蓬矢六以射天地四方天地四方者男子之所有事也故必先有志於其所有事又曰月令仲冬云是月也伐木取竹箭注云此時堅成可伐取也又曰后妃執弓挾矢于髙禖之前又曰乗丘之役圉人浴馬有流矢在白肉公曰非其罪也遂誄之周禮曰東南曰揚州其山鎮曰㑹稽其澤藪曰具區其川三江其浸五湖其利金錫竹箭又曰司弓矢掌八矢之法八矢一曰枉二曰絜音結三曰殺四曰鏃五曰矰六曰茀七曰􅁪八曰陣音痺凡枉矢絜矢利火射用諸守城車戰殺矢鏃矢用諸近射田獵矰矢茀矢用諸弋射􅁪矢痺矢用諸散射此八矢者弓弩各有四焉盖柱殺矰􅁪弓所用也絜鏃茀痺弩所用也左傳曰魯莊公以金㒒姑射南宫長万杜預曰矢名也又曰狄人伐衛公與石祁子玦與寗莊子矢使守曰以此賛國擇利而爲之又曰祝􅅨射王中肩王亦能軍又曰楚子與莫敖氏戰于睪滸睪滸楚也伯棼射王汰輈及皷跗着於丁寕伯棼越椒也輈車轅汰過也箭過車轅上也丁寧鉦也又射汰以貫笠轂師懼退王使廵師曰吾先君文王克息獲三矢焉伯棼竊其二盡於是矣皷而進之遂滅􅀂敖氏又曰吕錡射恭王中目王召飬由基與之兩矢使射吕錡中項伏弢而死以一矢復命弢音韜又曰郄克傷流血及屨未絶皷音曰余病矣張侯曰自始合而矢貫予手及肘余折以御左輪朱殷豈敢言病吾子忍之又曰齊師遁晉州綽及之射殖綽中肩兩矢夾脰脛頸又曰楚君以鄭故親集矢於目鄢陵戰晉射中楚王目也又曰齊子淵捷從泄聲子射之中楯凡繇朐音劬汰輈匕入者三寸又曰孟之側後入以爲殿抽矢䇿馬曰馬不進也不欲伐善榖梁曰偏弓鏃矢不出境偏當爲敦鏃矢矢名皆天子之噐也論語曰子曰直哉史魚􅀖有道如矢􅀖無道如矢家語曰子路見孔子孔子曰何好對曰好長劒孔子曰以子所能加之以學豈可及乎子路曰南山有竹不扶自直斬而用射逹於犀革以此言之何學爲孔子曰括而羽之鏃而礪之其入不益􅀷乎子路再拜國語曰吴晉㑹于黄池吴王擐甲陳卒赤旗赤羽之矰望之如火賈逵注曰矢羽爲矰又曰仲尼在陳有隼于陳侯之庭而死楛矢貫之石砮矢長尺有咫陳惠公使人以隼如仲尼之館問之仲尼曰隼之來也逺矣此肅愼氏之矢也昔武王尅商通道于九夷八蠻注􅀃苑云百蛮使各以其方賂來貢使無忘職業於是肅愼氏貢楛矢石砮其長尺有咫先王欲其令德之致逺以示後人使永鑑焉故銘其括鐫書功名也括箭羽之間曰肅愼氏之貢矢以分大􅁎配虞胡公而封諸陳古者分同姓以珎玉展親也分異姓以逺方之職貢使無忘服也故分陳以肅愼之矢君􅀂使有司求諸故府其可得也使求得之金櫝如言櫝櫃也惠公使有司求之故府得肅愼氏矢於金櫃之中如仲尼之所言也史記曰魏公子無忌進兵擊􅁗秦軍解去遂救邯鄲趙王及平原君自迎公子平原君􅀒䪍音蘭矢爲公子先引注吕忱字林曰䪍盛弩矢漢書曰李陵擊匈奴一日五十萬矢皆盡虜攻急陵歎曰復得數十矢足以脫矣又曰匈奴右賢王圍李廣廣爲圎陣外向矢下如雨漢兵死者過半又曰婁煩射項羽弓發矢欲到羽怒目叱矢乃墜地煩亦恐死又曰李廣夜行見石如虎乃射之其矢没羽續漢書曰來歙擊隗囂守略陽城大戰登城相射乃發屋斷木爲箭東觀漢記曰耿弇與張歩戰矢中弇股以佩刀截之左右無知者又曰上拜冦恂河内太守恂移書屬縣講兵肄射伐淇園之竹治矢百餘萬又曰匈奴破離後王安得攻金滿城耿恭以毒藥􅀓矢傳語匈奴漢家箭神中其瘡者必有異因發強弩射之虜中矢者視瘡皆沸並大驚相謂曰漢兵神真可畏也遂解去魏志曰挹婁在失館東北千餘里弓長四尺如弩楛長八寸青石爲鏃又曰陳琳曰矢在弦上不可不發魏略曰孫權乗大船出濡湏口來觀魏軍曹公使弓弩亂發射之矢着其船船乃偏重箭墜將傾權因廻船復以一靣受矢矢均船平乃放船而走蜀志曰􅀜羽爲流矢所中貫其左臂醫者曰矢鏃有毒當湏破臂刮骨也晉書石季龍載記曰石韜起堂于太尉府號曰宣光殿梁長九丈石宣視而大怒斬匠載梁而去韜怒增之十丈宣聞之恚甚使楊杯牟皮牟成趙生等縁猕猴梯而入殺韜置其刀箭而去又毛寳傳曰寳軍縣兵少噐仗濫惡大爲祖煥桓撫所破寳中箭貫髀徹鞍使人蹋鞍抜箭血流滿鞾又桓玄傳曰逹枚回恬興祐之迎擊玄矢下如雨玄嬖人丁仙期萬盖等以身蔽玄並中數十箭而死崔鴻三十國春秋西􅁗録曰白蘭王吐谷渾阿柴臨卒呼子弟謂曰汝等各奉吾一􅃗箭將玩之地下俄而命母弟慕延曰取汝一􅃗箭折之延折之又曰汝取十九􅃗箭折之延不能折柴曰汝曹知單者易折衆則難摧勠力一心然後社稷可固言終而卒又後燕録曰慕容盛行至西樂遇盗陜中盛曰我六尺之軀入水不溺在火不焦汝欲當鋒乎試竪尓手中箭百歩我􅀂中之冝愼尓命如其不中當束身相授盗行竪箭盛一發中之盗曰相試耳資而遣之宋書朱齡石弟超石傳曰阿簿千歩􅀐十萬屯河北岸超石以軟弓小箭射虜又曰謝靈運山居賦云其竹則二箭殊葉四苦齊味注云三箭一者苦箭大葉一者竿箭細葉又曰朱修之傳曰魯秀擊襄陽修之發連弩射秀秀亦發連弩應之修之使軍人縁水拾箭又曰謝莊傳云時河南獻舞馬詔羣臣爲賦莊所上其辭曰迎調露於飛鍾赴承雲於驚箭齊書曰陳顯逹傳云顯逹杜姥莫􅀘切宅大戰破賊矢中左眼抜箭而鏃不出地黃村潘嫗善禁先以釘釘柱嫗禹歩作氣釘即時出乃禁顯逹目中鏃出之三國典略曰梁以護軍將軍陸法和爲郢州刺史封江乗縣公法和甞軍次白帝謂人曰諸􅁑孔明可謂名將吾目見之此城旁有埋弩箭鏃一斛許因令掘之果如其言北齊書曰郎基字丗業迁海西鎮將梁吴明徹攻海西基糧仗皆盡乃削木爲箭􅁓爲羽得圍解還朝㒒射楊暗勞之曰卿夲文吏遂有武略削木箭􅁓羽皆無故事班墨之思何以過之後魏書曰丗宗幸鄴還於河內懷界帝親射矢一里五十餘歩侍中髙顯等奏伏見御弧矢臨原弋逺弦動羽馳鏃所逮三百五十餘歩臣等伏惟陛下聖武自天神藝夙荗巧會騶虞之節妙盡矍居約切圃之儀威稜攸疊甝胡甘切兕懾氣才猛所振勍憝弭心足以肅截九區赫服八宇矣盛事竒迹必冝表述勒銘射宫永彰聖藝後周書曰王傑魏恭帝元年從于謹圍江陵時柵內有人善用長矟戰士將登者多爲所斃謹令傑射之應弦而倒登者乃得入餘衆繼進遂拔之謹喜曰濟我大事者在此箭也又曰賀拔嶽旣遇害于河曲太祖乃率輕􅀐馳赴平凉時齊神武遣長史侯景招引嶽衆太祖至安定遇之謂景曰賀拔公雖死宇文泰尚存卿何爲也景失色對曰我猶箭耳隨人所射安能自裁景於此即還又曰􅁃信傳云信常有郷􅀜之思作哀江南賦以致其意云兩觀當㦸千門受箭白虹賁日蒼鷹擊殿又曰長孫晟傳云晟與汝南公獵見二鵰飛而爭肉因以兩箭與晟曰射取之晟彎弓馳徃遇雕相躍一發􅀟貫焉唐書曰太宗討劉黒闥闥常於肥郷列陣太宗親率左右擊之有一突將勇壯絶人直衝太宗刃將接太宗以天䇿上將大箭射之中心洞背應弦而斃遂傳此箭於北蕃突厥見而驚歎又常輕􅀐近出遇三􅀐皆賊中驍勇有名者舉槍而進左右請避之太宗不從待其將至連發三矢相次皆斃敵人懾氣焉又曰貞元十四年貢武舉并應百􅃗箭及三十􅃗箭等今年權停時諫議大夫田敦因蒙召對奏言兵部武舉等毎年常數百千人持挾弓矢出入皇城間恐非所冝上聞而瞿然故命停之其實武舉者每􅀊不過十數人時議惡敦貴欲非短舊事奏議不實自是訖于貞元更不復置太公六韜曰䧟堅陣強敵大黃參連弩飛鳬電景矢自副注云飛鳬電景矢名飛鳬尺莖白羽以爲首電景青莖尺羽以鋼爲首鋼一作鐵太公金匱曰武王伐殷丁侯不朝尚父乃􅀞丁侯三旬射之丁侯病遣使請臣尚父乃以甲乙日抜其頭箭丙丁曰拔其目箭戊己日拔其腹箭庚辛曰拔其股箭癸亥日抜其足箭丁侯病乃愈四夷聞皆懼越常氏獻白雉太平御覽卷第三百四十九
