  text: 太平御覽卷第四
  hash: sha256:8e359f8eff43eac2493c9d95b38df00e831c69e3fc0cd2b009cd8ffd1ba9050d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_004-1a}
body:
  text: 天部四日下日蝕晷附月月蝕附日下帝王世紀曰文王夢日月着身望氣經曰日上有黃氣君喜下有黄氣名永福又曰漢文帝時日中有王字徐整長曆曰泉湯之精上合爲日徑千里周圍三千里下於天七千里談藪曰魏文帝爲王時夢日墜地分爲三巳得一分而内懷中鄧析書曰君者當如冬日之陽夏日之隂萬物歸之莫之使也王充論衡曰日不入地也譬人把火夜行平地去人十里火光藏矣非滅也又曰夫日月不圎視之如圎者去人逺也夫日火精也在地火不圎在天火何故獨圎日月在天猶五星五星猶列星不圎何以明之春秋之時星隕宋都視之石也不圎是知日月五星亦不圎也又曰儒書言魯陽公與韓戰戰酣日暮援戈而麾之日爲之反三舎此言虚也凡人能以精誠感動天者專心一意委務積神通天天爲變動然尚未可謂然魯陽公志在於戰爲日暮一麾安能令日反使聖人麾日日終不反魯陽公何人而使日反又曰儒言日中有三足烏日者火也烏入火中燋爛安得而立然烏日氣也又曰日中近出入逺日中小者光明故也出入時大者光闇故也又曰桀無道兩日並照在東者將起在西者將滅費昌問馮夷曰何者爲殷何者爲夏馮夷曰西夏也東殷也於是費昌徙族歸殷殷果克隆又曰儒者論日出扶桑暮入細栁扶桑東方之地細栁西方之野又曰日晝行千里夜行千里騏􅂹晝日亦千里然則日行舒疾與騏􅂹歩相􅀋崔豹古今注曰漢明帝爲太子樂人作歌詩四章一曰日重光云天子之德光明如日太子比德焉故云重也周髀曰日光外照徑八十一萬里徐幹中論曰文王遇姜公于渭陽􅀂披雲見白日物理論曰日者太陽之精也夏則陽盛隂衰故晝長夜短冬則隂盛陽衰故晝短夜長氣引之也行陽之道長故出入夘酉之北行隂之道短故出入夘酉之南春秋隂陽等故日行中平晝夜等也地說書曰日照四十五萬里皇甫謐季曆曰日者衆陽之宗陽精外發故日以晝明名曰曜靈龍魚河圖曰陽積精爲日汲􅃁書曰胤甲居於河西夫有妖㜸十日並出又言本有十日迭次而運照無窮金匱曰三苗之時三月不見日黄帝占書曰日中三足烏見者其所居分野有白衣㑹楚辭曰十日並出流金鑠石戰國筞曰聶政刺韓相荆軻刺秦王並白虹貫日史記曰漢景帝王夫人姙娠夢日入懷以生武帝又曰堯其仁如天其知如神就之如日望之如雲漢書曰李尋上䟽曰夫日者宗陽之長暉光所燭萬里同晷人君之表也故日將旦清風發暉羣隂退伏又曰文帝時新垣平上言日再中臣以􅃸知之居頃之際日却復中乃更以十七秊爲元秊又曰鄒陽上書􅀃梁孝王曰昔荆軻慕燕丹之義白虹貫日太子畏之後漢書曰張重字仲篤明帝時舉孝廉帝曰何郡小吏荅曰臣日南吏帝曰日南郡人應向北㸔日荅曰臣聞鴈門不見壘鴈爲門金城郡不見積金爲郡臣雖居日南未甞向北看日應劭漢官儀曰太山東南名曰日觀日觀雞鳴時見日魏志曰程立夢登太山捧日立以白太祖太祖遂加日於立上因改名昱􅀳書曰荀爽曰日下荀鳴鶴􅀳陽秋曰建武元年三日並出三齊略曰秦始皇作石橋於海上欲過海看日出處有神人驅石去不速神人鞭之皆流血今石橋猶赤色季尤九曲歌曰年歳晩暮日巳斜安得壯士飜日車日蝕書曰乃季秋月朔辰弗集于房瞽奏鼔嗇夫馳庶人走凡日食天子伐鼔于社責上公也嗇夫主幣之官馳取弊禮天神衆人走供敕日食之百役也禮記昏義曰男教不脩陽事不得謫見於天日爲之蝕是故日蝕則天子素服而修六官之職蕩天下之陽事傳曰魯昭公十七年日有蝕之祝史請用幣叔孫昭子曰日有蝕之天子不舉伐鼔於社諸侯用幣於社伐鼔於朝禮也又莊二十五年曰夏六月辛未朔日有蝕之鼔用牲于社非常也唯正月之朔慝未作日有蝕之於是乎用幣于社伐鼔于朝注曰日蝕曆之常也然食於正陽月則諸侯用幣于社請救于上公伐鼔于朝退而自責以明隂不冝侵陽臣不冝掩君公羊傳曰六月辛未朔日有蝕之以朱絲縈社或曰脅之或曰爲暗恐犯之故縈之社者土地之主日者土地之精上敷於天而犯日故朱絲縈之助陽抑隂榖梁傳曰天子救日置五麾陳五兵五鼔諸侯置三麾三兵三鼔大夫擊拆凡有聲皆陽事也以猒隂氣也論語云日月之蝕人皆見之更也人皆仰之漢書曰黄琬祖父香爲魏郡守時日蝕而京師不見魏郡乃表日食之􅃺帝問日食多少香乆而無對琬年六􅀊在傍謂香曰日食之餘如月之􅀄遂用其言荅詔漢書曰日者德也故日蝕則脩德又曰劉寵鄭弘徐昉趙喜虞延並爲三事以日蝕免官淮南子曰騏驎闘則日月蝕許愼注曰騏驎大角之獸故與日相符晷釋名曰晷規也如規畫也說文曰晷日影也周禮地官曰大司徒以土圭之法測土􅀷正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所㑹也隂陽之所和也土圭所以致四時日月之景也測猶度也不知廣􅀷故日測鄭司農云測土􅀷謂南北東西之􅀷也日南謂立表處太南近日曰北謂丘表處太北逺日景夕謂日趺景乃中立表處太東近日景朝謂未中而景中立表處太西逺日玄謂晝漏半而置土圭表隂陽審其南北焉景短於土圭謂之日南是地於日爲近南景長於土圭謂之日北是地於日爲近北東於土圭謂之日東是地於日爲近東東西於土圭謂之日西是地於日爲近西如是則塞暑隂陽風􅀨偏而不和是未得其所求几日景於地千里而差一寸易通卦驗曰冬至晷長丈三尺鄭玄注曰晷者所立八尺表隂也三尺長之極也春分晷長七尺二寸四分夏至晷長尺有四寸八分秋分晷長二寸四分又曰冬至之日樹八尺之表日中視其晷晷如度者則􅀊羙人民和順晷不如度者則其􅀊惡人民爲僞言政令不平晷進則水晷退則旱􅀳太康記曰河南陽城縣是爲土中夏至之景尺有五寸所以爲􅀱南越志曰日南五月立表望之日在表北景居南風土記曰鄭仲師以爲夏至之日立八尺之表景尺有五寸謂之地中一云陽地城一云洛陽淮南子曰都廣南方山名衆帝所自上下日中無景蓋天地之中日中時日直無晷故曰地中山海經曰長留之山其神白帝少昊居之是神也主司反景日西入則景反東照言司察之也鄭康成謂移一寸於地千里景尺五寸於南戴日下萬五千里然則千里寸景巳課不効交州大搉去洛九十餘里蓋水陸曲非論景度俓意也推直考實其五千乎昔交州主簿學士孫悚云巳常立表効景景在表南豈古郡以日南爲名者其斯義乎此郡又有北景縣北此二字旣相似音又相近加以蠻土舌軟聲淺事在可疑月月蝕附釋名曰月闕也言滿則復鈌也又曰朔月之名也朔蘇也月死復􅂫生也晦盡之名也晦􅁅也火死爲􅁅月光盡似之也昡月半之名也其形一旁曲一旁直若張弓􅁌也望月滿之名也日月遥相望也􅀃文曰朏月未成明也魄月始生魄然也承大月月生二日謂之魄承小月生三日謂之朏朏音斐易曰坎爲月書曰月經於箕則多風離於畢則多􅀨又曰哉生明哉始也始生明月三日也又曰哉生魄魄生明死十五日之後詩曰月離於畢㑭滂沲矣又曰如月之􅁪禮曰大明生於東月生於西此隂陽之分夫婦之位也又曰天秉陽垂日星秉猶持也言天持陽氣施生照下土也地秉隂竅於山川播五行於四時和而后月生也是以三五而盈三五而闕竅孔也言地持隂氣岀内於山川以舒五行於四時也此氣和乃后月生而上配日若臣功成進爵位一盈也闕屈伸之義也必三五者播五行於四時一曰水二曰火三曰木四曰金五曰土合爲十五之成數也又曰月者三日而成魄三月而成時是以有三讓建國必立三卿三賔者政教之本禮之大叅也言禮者隂也大數取法於月也又曰天子與后猶日之與月陽之與隂相須而後成又曰秋分之日祀夕月於西郊又曰􅀕日於壇􅀕月於坎以別幽明以制上下幽明者謂日照晝月照夜又曰太隂之精上爲月月者天地之隂金之精也傳曰楚晉將戰吕錡夢射中月退入於泥占之曰姬姓日也異姓月也必楚王也及戰射恭王傷目吕錡死之京房易飛􅀱曰正月有偃月必有嘉主尚書大傳曰晦而月見西方謂之朓朓條也條逹行疾㒵朔而月見東方謂之側匿側匿猶行遲貌側匿則侯王其肅粛急也日君象也月臣象也君政急則日行疾月行徐臣逡廵不進朓則侯王其徐徐緩也君政緩日行徐月行疾臣放恣也詩推度災曰月三日成魄八日成光蟾蠩體就穴鼻始萌宋均注曰穴决也决􅈹兎也禮斗威儀曰政太平則月多耀政頌平則赤明政和平則黒明政象平則白明政升平則青明又曰君乗土而王其政平則月圎而多暈春秋考異郵曰諸侯謀叛則月生瓜牙后族專政則日月並照春秋感精符曰月者隂之精地之理又曰人主兄日姉月春秋演孔圗曰蟾蠩月精也春秋元命苞曰陰精爲月日行十三度常詘任而受受陽精也受明精在内故金水内景又曰月之爲言闕也兩設以蟾蠩與兎者隂陽􅀟居明陽之制隂隂之􅀝陽帝王世紀曰堯時有草夾階而生毎月朔日生一莢至月半則生十五莢至十六日後日落一莢至月晦而盡􅀂月小餘一莢王者以是占曆唯盛徳之君應和氣而生以爲堯瑞名曰蓂莢一名曆莢一名瑞草㑹稽先賢傳曰闞澤年十三夢見名字炳然在月中搜神記曰孫堅妻懷權夢月入懷告堅曰妾昔懐筞夢日入懷今又夢月堅曰子孫興矣文子曰百星之明不如一月之光又曰日月欲明浮雲蓋之叢蘭欲秀秋風敗之淮南子曰水􅂔之精爲月又曰月者太隂之精又曰蛤蟹珠􅀛與月盛衰月毁則魚腦減又曰月一名夜光月御曰望舒亦曰纎阿又曰日月天之使也積隂之寒氣乆者爲水水氣之精者爲月又曰晝隨􅁅而月暈闕許愼注曰有軍事相圍守則月暈以蘆􅁅環缺其一面則月暈亦闕於上又曰方諸見月則津而爲水髙誘注曰方諸隂燧太蛤也熟摩拭令􅀬以向月則水生也許愼注曰諸珠也方石也以銅盤受之下水數升又曰日不知夜月不知晝日月爲明而不能兼也又曰月之光可以逺望而不可以細書枹朴子曰昔帝軒􅀱鳯鳴以調律唐堯觀蓂莢以知月又曰王生云月不圎望之圎者月􅀄生及旣􅃜之後視之冝加三寸鏡稍稍轉大不當􅀄如破環漸漸滿也又曰俗士多云今月不及古月之㓪又曰月之精生水是以月盛而潮濤大又曰金華和丹其光上與日月相連丹金爲盤椀以承日月得神液如方諸又曰黃帝醫經有蝦蟇圖言月生始二日蝦蟇始生人亦不可針炙其處范子計然曰月水精内影又曰月行疾二十九日三十日間一與日合取日之度以爲月節吕氏春秋曰月群隂之夲月望則蚌蛤實羣隂盈月晦則蚌蛤虚羣隂廢夫月形乎天而羣隂化于淵又曰月羣隂之宗月毁則魚腦減符子曰盛魄重輪六合俱照非日月能乎張衡靈憲曰羿請不死藥於西王母羿妻姮娥竊以奔月託身於月是爲蟾蜍又曰月者隂精積而成獸象兎蛤焉其數偶荆州占曰月珥且戴不出百日主有大喜山海經曰大荒之中有日月山日月所出入風俗通曰呉牛望見月則喘使之苦於日見月怖喘矣河圖令占篇曰地淪月散必有立王龍魚河圖曰帝淫佚則奎有角月有足及日月有九行黑道二岀黄道北赤道二出黃道南白道二岀黃道西青道二出黃道東立春春分月從東靑道立秋秋分從西白道立夏夏至從南赤道立冬冬至從北黑道天有四表月有三道聖人知之可以延年益壽劉義慶世􅀃日滿奮疾畏風在武帝坐北䆫作琉璃屛風實密似踈奮有難色帝􅀏之奮荅日臣猶吳牛見月而喘白虎通日月所滿缺何歸功於日也三日成魄八日成光二八十六轉如歸功晦朔至旦受符得復行也月有小大何天左旋日月右行日行遲月行疾月及日爲一月至二十九日未及七度即須三十日過七度日不可分故乍大乍小明有陰陽也有閏月何周天三百六十五度四分度之一十二月日不匝十二度故三年一閏五年再閏名陰不足陽有餘閏者陽之餘也軍國占􅃸曰􅀂月三珥者大臣有喜若月冠而復軍者天下有喜廣雅曰夜光謂之月五經通義曰月中有兎與蟾蠩何月隂也蟾蠩陽也而與兎並明隂係於陽也孫氏瑞應書曰君不假臣下之權則月楊光又曰景星者天醒音精也狀如半月生於晦朔助月爲明王者不􅀻人則見虞喜安天論曰俗傳月中仙人桂樹今視其􅀄生見仙人之足漸巳成形桂樹後生焉劉向七略曰京房易􅀃云月與星至隂也有形無光日照之乃有光喻如鏡照日即有影見月初光見西方望巳後光見東方皆曰所照也皇甫謐年暦曰月者羣隂之宗月以霄曜名曰夜光遁甲開山圖榮氏解曰女狄暮汲石紐山下泉水中得月精如雞子愛而含之不覺而吞遂有娠十四月生夏禹論衡曰月行一日一夜行二萬六千里與鳬飛相􅀋地􅀃書曰月照四十五萬里徐整長曆曰月俓千里周圍三千里下於天七千里楚詞天問曰夜光何德死而又育厥利維何而顧兎在腹言月中兎何所貪利而居月之腹顧望也運斗樞曰后族檀權月生足芒主􅀔奪於后族羣妃之黨撗僣則月盈並出小月承大月羣姦在宫主􅀂贅旒大承小近臣起䜛人撗陪臣執命三公望氣崔豹古今注曰漢明帝作太子樂人歌四章以賛太子之德其一曰日重光二曰月重輪三曰星重曜四曰海重潤漢書曰月立夏夏至行南方赤道曰南陸立秋秋分行西方白道曰西陸立冬冬至行北方黑道曰北陸分則同道至則相過晦而見西方謂之朓朔而見東方謂之肭亦謂之側匿朓音他了反肭音女六反朓健行疾貌也肭縮遲貌側匿猶縮儒亦遲貌又曰月穆穆以金波蓋光彩皃又曰元后母夢月入懷而生元后又曰髙帝七年月暈圍參畢七重占曰畢昴間天街也街北胡也街南中國也昴爲匈奴參爲趙畢爲邊兵是􅀊髙祖自將至平城爲冒頓所圍七日廼解又曰李尋上書曰月者衆隂之長妃后大臣諸侯之象也晉書曰謝太傅庭中夜坐月色無玷歎以爲佳謝景重率爾曰意謂不如微雲􅀧綴太傅曰卿居心不淨乃欲滓􅁾太清又曰徐孺子年九􅀊月下戯人或曰􅀂令月中無物當極愈明徐曰不爾譬如眼中無瞳子何必不暗後魏書曰天興五年十月月暈左角太史令晁宗奏角䖝將死牛果大疫麋亦多死楊雄長楊賦曰西壓月窟窟月所出入也東震日域傅􅀇擬天問曰月中何有白兎擣藥傅咸詩曰團團三五月皎皎耀清輝陸機詩曰安寢北堂上明月入我牖照之有餘輝攬之不盈手宋謝靈運怨曉月賦曰卧洞房兮當何恱滅華燭兮弄曉月昨三五兮旣滿今二八兮將鈌浮雲褰兮収泛濫明舒照兮殊皎㓗墀除兮鏡􅁥廊櫳兮澄澈宋謝莊月賦曰陳王初䘮應劉端憂多暇悄焉疚懷弗怡中夜于時斜漢左界北陸南􅄤白露曖空素月流天沉吟齊章殷勤陳篇抽毫進牘以命仲宣仲宣跪而稱曰臣聞日以陽德月以隂靈擅扶光於東沼嗣􅀂英於西溟引􅀇兎於帝臺集素娥於后庭􅀂夫氣霽地表雲歛天末洞庭始波木葉微脫列􅀫掩縟長河韜映柔祇雪凝圎靈水鏡連觀霜縞周除氷淨歌曰羙人邁兮音塵闊隔千里兮共明月宋鮑昭翫月詩曰始見西南樓纎纎如玉鈎未映東北墀姢姢似蛾眉娥眉蔽珠攏玉鈎隔璅䆫三五二八時千里與君同夜移衡漢落徘徊帷户中梁沈約詠月詩曰月華臨靜夜夜靜滅氛埃方暉竟入户圎影􅂩中來髙樓切思婦西園遊上才臨軒映珠綴應門照緑苔洞房殊未曉清光信悠哉周王襃􅀜山月詩曰􅀜山夜月明愁色照孤城半形同漢陣金影逐胡兵天寒光轉白風多暈欲生􅀉言亭上吏遊客解雞鳴月蝕易曰月盈則蝕詩曰彼月而食則維其常禮曰婦順不脩隂事不得謫見于天月爲之蝕故月蝕則后素服而修六宫之職蕩天下之隂事淮南子曰麒麟闘則日月蝕又曰月望日奪其光月十五日與日相望東西中絶則月蝕奪光也劉向􅀃􅁐曰秦胡亥立日月薄蝕熒惑襲月荆州占曰月蝕后自提鼔階前把搥擊鼔者三中良人諸御者宫人皆擊杵救之月巳蝕后乃入齋服縞素三曰不從樂以應其祥此先王之所以免天地之誅而解四境之患也晉書曰永嘉元年月蝕赤如血二月敬則反太平御覽卷第四
