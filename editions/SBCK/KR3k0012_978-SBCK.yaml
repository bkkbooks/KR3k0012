front:
  text: 太平御覽卷第九百七十八菜茹部三
  hash: sha256:b6450995da3f6018b1b7ab8fbc7ea76ac4d6ce2712af414ecba697698d965534
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_978-1a}
body:
  text: 􅀲易夬卦曰九五以􅂎瓠􅀲含章有隕自天􅂎木之柔者􅀲之果大者龍魚河圗曰􅀲有兩鼻者煞人詩曰文王之興夲由太王也綿綿􅀲瓞民之􅀄生自土沮􅃮興也箋云􅀲之本實継先歳之􅀲必小狀似瓞故謂之瓞綿綿然若將無長大時興者喻后稷乃帝嚳之曹封於部其後公劉失職遷于幽居沮􅃮之地歷丗亦綿綿然至太王而得其民心而生王業故本周之興云于沮􅃮也耳大戴禮曰五月乃􅀲乃者治􅀲之辭也􅀲也者始食􅀲八月剥􅀲蓄􅀲時也禮曰爲天子削􅀲者副之巾以絺副拆也旣削四祁之乃横断而巾覆焉爲國君華之巾以綌華中製之不四折也爲大夫累之果倮也倮不巾覆也士㚄之不中裂横断去㚄而巳音帝庶人齕之不横断又月令曰仲冬之月行秋令則天時雨汁􅀲瓠不成雨汁者水雪䕌下左傳曰齊侯使連稱管至父戊葵丘􅀲時而徃曰及􅀲而代朞戍公問不至請代不許故謀作亂春秋運斗樞曰逺雅頌著倡優則李生􅀲論語曰子路曰佛盻以中牟叛子之欲徃也如之何子曰然有是言不曰堅乎磨而不磷不曰白乎􅄺而不緇吾豈匏􅀲也哉焉能繫而不食爾雅曰瓞大結切瓝歩角切其紹瓞郭璞注曰俗呼折􅀲爲瓞紹者􅀲蔓緒亦著子但小如瓝耳史記曰邵平者故􅁗東陵侯􅁗破爲布衣貧種􅀲長安城東􅀲美故丗謂東陵􅀲漢書地理志曰燉煌古􅀲州地生美􅀲續漢書曰牽牛星荆州謂之河鼔主開梁織女主􅀲果又曰安帝元􅀄三年有􅀲異夲共生一􅀲蔕時以爲􅀲者外焉離夲而實女子外屬之象也是時閻皇后與外親耿寳共譛太子廢爲濟隂王更外迎濟北王子犢立之􅀽山松後漢書曰建和二年河東􅀲兩體共蔕後漢書曰施建字君子沛人也家貧母老常鬻力供養種􅀲自給應劭漢官儀曰太官菓丞官別在外掌菓􅀲菜茹吴志曰歩騭字子山臨淮淮隂人避難江東單身窮困與廣陵衛旌同年相善俱以種􅀲自給晝勤四體夜誦經傳㑹稽焦征羌郡之豪族呉録曰征羌名矯甞爲征羌令人客放縱騭與旌求食其地懼爲所侵乃共脩刺奉􅀲也吴録曰姚翁仲甞種􅀲菜灌園以供衣食時人或餉一無所受晉書曰咸寜二年嘉􅀲同蔕生於成都又曰皇甫謐年二十不學遊蕩無度或以爲癡甞得􅀲果輒進叔母任氏任氏曰孝經云三牲之養猶爲不孝汝今年餘二十目不存教心不入道無以慰我皇甫謚自叙同又曰桑虞仁孝自天年十四䘮父毀瘠過禮虞有園宅北數里􅀲菓􅀄熟有人踰垣盗之虞以園援多􅁄㓨恐偷見人驚走而致傷損乃使奴爲之開道及偷􅀒􅀲將出見道通聞虞使除之乃送所盗􅀲叩頭請罪歡然盡以􅀲與之齊書曰建元􅀄武帝即位郅撝爲司徒左長史先是武帝與撝同從宋明帝射雉郊野渴倦撝得青􅀲與上對剖食之又曰竟陵王子良夏月客至爲設􅀲飲又曰郭原平以種􅀲爲業大明七年大旱􅀲瀆不復通舡縣令劉僧秀􅉖其窮老開瀆下水與之原平曰普天大旱百姓俱困豈可㓕漑田之水以通運􅀲之舡乃歩他道徃錢塘貨賣沈約齊紀曰韓靈敏早䘮父兄靈珎至孝母亡家貧無以葬與靈珎種爪靈敏朝採暮還復生未甞减耗葬事由此舉孝子傳同梁書曰任昉卒武帝間問方食西菀緑沉􅀲投之於盤悲不自勝因屈指曰昉少時常恐不滿五十今四十九可謂知命又曰郭祖深清儉常服故布衣素木按食不過一􅁏有姥餉一青􅀲祖深報以疋帛有冨人効之以貨鞭而徇衆朝野憚之又曰鄭灼字茂昭勵志好學多苦心􅀬􅀂􅀲時輙偃卧以􅀲鎮心起便讀誦其篤志如此北齊書曰蘭欽爲廣州刺史前刺史新渝侯映之夢南安侯恬權行州事兾得即真及聞欽至嶺厚貨厨人塗刀以毒削􅀲進之欽及愛妾俱死帝聞大怒檻車収恬削爵土後魏書曰楊愔典選多以言㒵取人時謗詞云尚書典選似貧人買􅀲唯取大者又曰郭祚以夲官領太子少師祚曽從丗宗幸東宫肅宗㓜弱祚懷一黄㼐出奉肅宗時應詔左右趙挑弓深爲丗宗所信祚私事之時人謗祚者号爲挑弓僕射黄㼐少師後周書曰王羆性儉率甞有客與羆食􅀲客削􅀲侵膚稍厚羆意嫌之及􅀲皮落地乃引手就地取而食之客甚有愧色又曰趙王招知隋文欲遷周鼎宻欲圗之藏兵刃於帷席之間後院亦伏壯士文帝從者多在閣外唯楊弘元坐於戸側招以佩刀割􅀲㗖隋文未之疑元胄􅁴變扣刀而入招迺以大觴親飲胄酒北史曰宋瓊字普賢以孝稱母曽病季秋月思􅀲瓊夢想見之求而遂􅀗時人異之隋書曰文帝用法定制行署取一錢巳上聞見不告言者坐至死自此四人共盗一榱桶三人同竊一􅀲事發即時行決又曰秦孝王俊奢侈過甚頗好於内妃崔氏性妬甚不平之遂於􅀲中進毒俊由是遇疾徴還京師上以其奢縱免官以王就弟唐書曰杜如晦薨後太宗食􅀲美愴然思之遂輟其半使置之於靈座又曰髙宗子八人武后所出者自爲行第長曰孝敬皇帝􅁥國仁明爲后所忌而鴧之次曰雍王賢爲太子次曰中宗次曰睿宗及孝敬遇害諸第甞所不安晨夕懷懼雖父母之前無由敢言乃作黄䑓􅀲詞令樂人歌之欲微悟上意歌曰種􅀲黄䑓下􅀲熟子離離一摘使􅀲好再摘令􅀲稀三摘尚由可四摘抱蔓歸然太子竟亦流竄於黔州又曰徳宗建中􅀄誤以髙力士養女楊氏婦爲沈太后是時沈氏故老巳盡無識太后者上宻使中人就洛陽視髙氏年狀頗同曩時太后甞削􅀲哺上刃傷左拇指髙氏甞剖􅀲亦傷左拇指中人皆閹官女子且非審識太后見上仁孝有殊喜莫敢沮者髙氏辭曰實非太后具陳族姓内外以自明又曰貞元四年夏右神䇿軍獻瑞􅀲三蔓各爲一蔕而生三􅀲莊子曰朽􅀲化爲魚物之變也墨子曰今有入人塲園取人􅀲者得罰今之諸侯攻伐踰􅀼人􅀲者數千萬而自曰義也􅁗子曰食􅀲者雖去蔕何以連其根孫卿子曰臯陶之色如削􅀲抱扑子曰五原蔡誕入山而還欺家人云至崑崙山有玉􅀲其形如丗間􅀲但爲光明洞徹而堅須以玉井水洗之便軟而可食又曰曽參鋤􅀲三足烏集其冠孝故也家語曰曽子芸􅀲而誤斷其根曽晢怒以大杖擊其背曽子仆地有頃乃􅂫孔子聞之告門弟子曰參來勿内也曽子使人請孔子孔子曰舜之事瞽瞍小捶則受大捶則走參委身以待􅁀怒旣身死䧟父於不義不孝孰大焉古文竒字曰􅁗改古文爲大􅂐及􅈻字周人多誹謗怨恨􅁗苦天下不從而諸生到者拜爲郎凡七百人􅁡種􅀲於驪山􆀹谷中温處􅀲實成使上書曰􅀲冬有實有詔下􅀶士諸生􅀃之人人各異􅀃則皆使徃視之而爲伏機諸生賢儒皆至焉方相難不泱因發機從上填之以土皆壓終古文璅語曰􅀄刑史子臣謂宋景公從今巳徃五月五日臣死後五年五月丁巳吴亡以後五祀八月辛巳君薨刑史子臣至死日朝見景公夕死後吴亡景公懼思刑史子臣之言將至死日乃逃於􅀲圃遂死之求得巳䖝矣賈􅁩新書曰昔梁大夫宋就爲邊縣令與楚隣界梁亭楚亭皆種􅀲梁亭劬力數灌其􅀲羙楚人窳而稀灌其􅀲惡楚令以梁􅀲之美怒其􅀲之惡因徃夜竊搔梁􅀲皆有焦者矣梁亭􅁴請其尉欲執搔楚􅀲宋就曰是構怨分禍之道也令人􅀼爲楚亭夜灌其􅀲令勿知也楚亭旦而徃􅀲則巳灌􅀲日以美楚亭徃而察之則梁亭之爲也楚令大恱因以聞楚王楚王聞之恱梁之隂讓也乃謝以重幣而友於梁王新序同裴淵廣州記有􅀲冬熟號爲金叙味乃甜美廣志曰􅀲之所出以遼東廬江燉煌之種爲美有鳥􅀲狸頭􅀲􅁡䇶􅀲女臂􅀲龍蹄􅀲羊髓􅀲又有魚􅀲犬􅀲如斛出涼州陽城􅀲有青登􅀲大如三􅂛魁有桂枝􅀲長二尺餘蜀地温食􅀲至冬熟有春日􅀲細小小瓣冝藏正月種三月成有秋泉􅀲秋種十月熟形如羊角色蒼黒列仙傳曰溪人者南郡編人居山間有仙人常止其家從之買􅀲教之練􅀲與附子桂實服之一年能飛登山入水徃來海邊又曰服閭者不知何許人常徃來海邊諸祠中有三仙於祠中􅀶賭􅀲雇閭使擔黄􅀲數十頭令瞑目乃上方大山神仙傳曰葛公冬爲客設生􅀲漢武内傳曰西王母謂上元夫人曰後造朱炎山陵食靈􅀲其味甚好頋此未乆巳七千歳矣又曰仙之上藥有空同靈􅀲四刼一實也道學傳曰禇雅字􅀇通人與共居常取水洒掃或夏月種􅀲恣人來取㐲侯古今注曰孝平帝元年武陵縣生􅀲花如䓗紫色實如小麥墮地復生郭子横洞􅁳記曰有龍肝􅀲長一尺花紅葉素生於氷谷所謂氷谷素葉之􅀲零陵仙賢傳曰李融宇元者承陽人固始侯相使其爲政得吏民心屢致祥瑞甘􅀲六子共莖璽書慰勞遷廣漢太守南岳夫人内傳曰夫人姓魏名華存性樂神仙季冬之月夜半清明有四真人並可年二十餘天姿秀頴至静室因設酒肴陳􅀇紫撩降實靈爪太上黄庭内景經注曰大霍山下有洞䑓司命君之府也中有神靈􅀲食之者至玄也荆楚􅀊時記曰七月七日設􅀲果於庭中以乞巧有喜子布網於􅀲上則爲得巧劉向別録曰尹都尉書有種􅀲篇鄭􅀇別傳曰民有獻嘉􅀲者異夲同實縣欲表府文詞鄙略君爲改作又著頌一篇侯相髙其才吴越春秋曰吴夫差爲越所敗遁而去得自生之􅀲其實巳熟掇而食之問左右曰是乃冬有􅀲近道而人不食何也左右曰盛夏之時人食生􅀲起居道傍􅀲子復生故人惡食夏侯曽先㑹稽記曰曹娥父溺死娥見􅀲浮其豦即得父屍􅀶物志曰人以冷水自漬至膝可頓啖數十枚􅀲漬至腰啖轉多至頸可啖百餘枚所漬水皆作􅀲氣􅀲味搜神記曰吴時有徐光常行幻術於市里從人乞􅀲其主弗與便從索瓣種之俄而􅀲蔓延生花實乃取食之因賜􅀚者及視所賫皆亡耗矣幽明録曰安定人周敬種􅀲時亢旱鬼爲槤音輦水澆􅀲􅀲大滋䌓問姓名不荅還白父甞有惠於人否父曰西郭樊營先作郡吏償官數百斛米我時以百斛助之其人巳死又曰孫鍾冨春人堅父也與母居至孝篤信種􅀲爲業有三少年容服妍麗詣鍾乞􅀲愛樂無巳爲設食出􅀲禮敬殷勤臨去曰我等司命感郎見接之厚送出門三人曰山中可作塜復言欲連丗封侯爲數丗天子鍾曰數丗天子言訖悉化成白鵠列異傳曰遼東丁伯昭自􅀃其有客字次節旣死感見待㤙常爲本家致竒異物試臈月中從索􅀲得美􅀲數枚來在前不見形也􅄒異記曰䂊章郡有盧松村羅根生於此村側墾荒種􅀲又於外立一神壇􅀲始引蔓清晨行之忽見壇上有新板墨書曰此是神地所遊處不得停止種殖可速去根生拜謝跪呪曰竊疑村人利此熟地生苗容或假託神􅈲以見驅斥審是神教願更朱書賜報明早徃㸔向板猶存悉以朱代墨任昉􅄒異記曰漢章帝元年上虞獻􅀟蔕􅀲一實五色又曰吴桓王時㑹稽生五色􅀲今吴有五色􅀲歳充貢獻五行記曰梁吏部尚書何敬容夏患瘧疾􅀉在蔣山道士館時忽見一人玄衣大帽立在帳側自稱楊胡靈將􅀲四枚云與公少時言訖因不見後數月敬容以罪免官夲草經云􅀲一名土芝吴氏夲草曰􅀲子一名瓣七月七日採可作靣脂劉禎􅀲賦曰禎在曹植坐厨人進􅀲禎爲立成辭曰含金精之芳流冠衆􅀲而作珎設諸清流一浮一藏片以金刀四剖三離承之雕盤幕以纎絺甘侔􅁡房冷甚氷圭􅄞含甘􅀲賦序曰丗云三芝􅀲處一焉謂之土芝張載􅀲賦曰羊骹虎掌桂枝􅁡䇶玄表丹裏呈素念紅豊敷外偉緑瓤内醲傅􅀇􅀲賦曰白者如素黒者如􅃮黄踰金箱青侔含翠舊有􅁡䇶及青括樓嘉味溢異鮮􅀋寡疇一齧之頃至三揺頸細飢蜜理多瓤少瓣豐旨絶異食之不䬼音烏懸切陸機􅀲賦曰夫其種族頭數則括樓定挑黄扁白􅅮金􅁫􅁡䇶小青大班􅀇骭音幹素腕狸首虎磻東陵出於􅁗谷桂髓起於巫山夏侯孝􅀂梁田賦曰入果林造􅀲田摘虎掌拾黄班落蔕離母漬以寒泉左思蜀都賦曰其圃有􅀲疇芋區王廙洛都賦曰􅀲則桂枝括樓緑瓤青飢消暑湯䬼解渴療飢樂府歌詩曰君子防未然不處嫌疑間􅀲田不納履李下不整冠古詩曰甘􅀲抱苦蔕美草生荆􅁄愛利防有刀貪人自還賊阮籍詩曰昔聞東陵􅀲近在青門外連畛短阡陌母子相拘帶張華真人篇曰朱李生東􅁐甘􅀲出西郊曹植求􅀕先王表曰乞請水􅀲五枚太平御覽卷第九百七十八
