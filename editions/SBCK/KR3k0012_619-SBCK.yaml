front:
  text: 太平御覽卷第六百十九
  hash: sha256:5ca5ce89df65531d6002cdd6f55cd6f6dcf426f235f87ff1552c045ea915a51a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_619-1a}
body:
  text: 學部十三圗書下採求遺逸借書賜書冩書載書負書附焚書採求遺逸史記曰髙祖入咸陽蕭何先收秦圖書劉歆七略曰武帝廣開獻書之路百年之間書積如丘山故外有太史􅀶士之藏内則延閣廣内祕室之府物理論曰魯恭王壊孔子舊宅得周書闕無冬官漢武購千金而莫有得者遂以考工記備其數漢書曰成帝河平三年遣謁者陳農求遺書於天下東觀漢記曰杜林於河西得􅃮書古文尚書經一卷每遭困厄握抱此經後魏書曰髙謐字安平典祕閣謐以墳典殘缺奏廣訪郡邑大加繕冩由是圖籍莫不審正又曰李暠署劉昞爲儒林􅀕酒從事中郎暠好尚文籍典史穿落者親自􅀘治昞時侍側前代暠暠曰躬自􅀘者欲人重此典籍隋書曰劉􅋑除殿内將軍時牛引奏請購求天下遺逸之書􅋑遂僞造書百卷題爲連山易魯史記等録上送官取賞而去後有人訟之經赦免死北史曰隋裴矩伐陳之役領元帥記室旣破丹陽晉王廣令矩與髙潁收陳圖籍又曰隋牛引上表請開獻書之路曰昔周德旣衰舊經紊弃孔子以大聖之才開素王之業憲章祖述制禮刋詩正五始而條春秋闡十翼而􅀪易道及秦皇馭㝢呑滅諸侯先王墳籍掃地皆盡此則書之一厄也漢興建藏書之䇿置校書之官至孝成之代遣謁者陳農求遺書於天下詔劉向父子讎校篇籍漢之典文於斯爲盛及王莽之末並從焚燼此則書之二厄也光武嗣興尤重經誥未及下車先求文雅至肅宗親臨講肆和帝數幸書林其蘭臺石室鴻都東觀祕牒填委更倍於前及孝獻移都吏人擾亂圖書縑帛皆取爲帷囊所収而西裁七十餘乗屬西京大亂一時燔蕩此則書之三厄也魏文代漢更集經典祕書郎鄭黙刪定舊文時之論者美其朱紫有別晉氏承之文籍尤廣晉祕書監荀朂定魏内經更著新簿屬劉石慿陵從而失墜此則書之四厄也永嘉之後㓂竊競興其建國立家雖傳名号憲章禮樂寂滅無聞劉􅁉平姚􅇦收其圖籍五經子史􅂊四千卷皆赤軸赤紙文字古拙並歸江左宋祕書丞王儉依劉氏七略撰爲七志梁人阮孝緒亦爲七録緫其書數三萬餘卷及侯景渡江攻破梁室秘省經籍雖從兵火其文德殿内書及公私典籍重本七萬餘卷悉送荆州及周師入郢繹悉焚之於外城所收十􅂊一二此則書之五厄也後魏爰自幽方遷宅伊洛日不暇給經籍闕如周氏創基􅀜右戎車未息保定之始書止八千後加收集方盈萬卷髙氏據有山東􅀄亦採訪驗其本目殘闕猶多及東夏􅀄平獲其經史四部重雜三萬餘卷所益舊書五千而巳今御書單本合一萬五千餘卷部帙之間仍有殘缺比梁之舊目正有其半至於隂陽河洛之篇醫方圖譜之􅀃弥復爲少臣以經書自仲尼迄今數遭五厄興集之期屬膺聖代今祕籍見書亦足披覽但一時載籍湏令大備不可王府所無私家乃有􅀂猥發明詔廉開購賞則異典必致觀閣斯積上納之於是下詔獻書一卷賚縑一匹一二年間篇籍稍備乃揔加編次召天下工書之士京兆韋霈南陽杜頵等於祕書内􅀘續殘缺爲正副二本藏於宫中其餘以實祕書内外之閣凢二萬餘卷煬帝即位祕閣之書分爲三品於東都觀文殿東西廂屋以貯之東屋藏甲乙西屋藏丙丁後唐史曰都官郎中􅁃傳美充三川捜訪圖籍使傳美僞蜀王衍之書舊察家在成都便於歸計且言成都具有本朝實録及傳美使廻所得􅂊九朝而巳其餘殘缺雜書盖不足紀借書西京􅄂記曰匡衡勤學邑人大姓又不識字家冨多書乃與客作不求其價主人恠而問之衡曰願得主人書遍讀之主感歎給以書後成大儒後漢書曰王充師事扶風班彪好􅀶覽而不守章句家貧無書常遊洛陽市肆閱賣書一見輙能誦憶遂􅀶通衆流百家之言蜀志曰李權從秦宓借戰國䇿宓曰成湯大聖覩野漁而有獵逐之失定公賢者受女樂而弃朝事道家法曰不見可欲使心不亂是故君子先以懿文德也􅀶物志曰蔡邕有書萬卷漢末年載數車與王粲亡後相國􅁺魏諷謀及粲子預焉旣􅀍誅邕所與粲書悉入粲族子業王隱晉書曰齊王攸好學不倦借人書皆治護時以還之又曰皇甫謐表從武帝借書上送一車與之謐羸病手不釋卷歴觀古今無不皆綜先賢傳曰延篤從唐溪李度受左氏欲冩傳本無紙乃借夲誦及篤辭歸李度曰卿欲冩本何故辭歸荅曰巳誦之矣齊張率傳曰時陸少􅀇家有父澄書萬餘卷率與少􅀇善遂通書籍盡讀其書陳書曰孔奐字休文山隂人好學經史百家莫不通渉沛國劉顯時稱學府每共奐討論深相歎乃執奐手曰昔伯喈墳素悉與仲宣吾當希彼蔡君足下無愧王氏所保書籍㝷以相付後魏書曰崔亮家貧傭書自業時隴西李冲當朝任事亮從兄光往依之謂亮曰安能乆事筆硯而不往託李氏也彼家饒書因可得學亮曰弟妹飢寒豈可獨飽自可觀書於市安能看人眉睫乎後周書曰梁蔡文寳字敬仁甞以書干僕射徐勉大爲勉所賞異乃令與其子遊處所有墳籍盡以給之遂􅀶覽群書學無不綜北齊書曰劉晝少􅀒笈從師伏膺無勌恨下里少墳籍便杖䇿入都知太府少卿宗正丗良多書乃造焉丗良納之恣意披覽晝夜不倦隋書曰盧思道字子行聦爽俊辯就魏收借異書數年之間才學兼著唐書曰裴行儉􅀄以門䕃􅀘􅀪文生累年在館唯閉户讀書舘司將加薦舉固辭左僕射房􅀇齡問其故對曰遭隋季亂離私門書籍蕩盡兾在舘披閱有所成耳又曰中書令李敬􅀇亳州譙人也􅀶覽群書特善三禮􅀄上在東宫馬周啓薦之召入崇賢舘兼預侍讀仍借御書令讀之又曰陽城字元宗北平人也代爲官族家貧不能得書乃求爲集賢冩書吏竊官書讀之晝夜不出房經六年乃無所不通賜書後漢書曰東平王蒼傳明帝賜蒼以祕書列圖道術祕方又曰王景永平二年議修汴渠乃引見問景以理水景陳其利害應對敏捷帝善之乃賜景山海經河渠書禹貢圖又曰章帝賜黃香淮南孟子各一本又曰班彪字叔皮㓜與從兄嗣共遊太學家有賜書内足於財好古之士自逺方來齊春秋曰蕭晉字元卿蘭陵人家有賜書志學不倦也陳書曰江揔字揔持㓜篤學有詞采家傳賜書數千卷緫㝷讀未甞釋手也唐書曰垂拱三年新羅王金政明遣使請禮記一部并新文章令所司冩􅁻凶禮禮并於文舘詞林掎其詞渉規誡者勒成五十卷賜之又曰開元十九年命有司冩毛詩禮記左傳文選各一部以賜金城公主從其請也冩書王子年拾遺記曰張儀􅂫秦二人同志逓剪髮以相活或傭力冩書行遇聖人之文無題記則以墨􅀞於掌内及股裏夜還更折竹冩之抱朴子自叙曰􅁑洪字稚川丹陽句容人也生爲二親所驕饒累遭火典籍蕩盡伐薪賣之給筆夜以冩書家貧乏紙所冩皆反覆有字人少能讀者桓譚新論曰余同時佐郎官有梁子􅀄􅀭子林好學所冩萬卷至於白首甞有所不曉百許􅀉余余觀其事皆略可見蕭子顯齊書曰隱士沈驎士火燒書數千卷驎士年過八十耳目猶聦明乃手冩細書復成三二年卷滿數十篋後魏書曰穆子容少好學無所不覽求天下書逢即冩録所得萬餘卷三國典略曰郎基字丗業中山新市人魯郡太守智之孫也泛涉墳籍清愼無所營求甞語人云任官之所木枕亦不湏作况重於此乎唯頗令人冩書樊子蓋曽遺之書曰在官冩書亦是風流罪過基荅曰觀過知仁斯亦可矣梁書曰􅀽峻字孝髙早􅀌志篤好學家貧無書從假借必皆抄冩自課日五十紙紙數不登則不止後周書曰裴漢借人異書必躬自録本至於疾疹弥年亦未甞釋卷載書負書附史記曰􅂫秦􅀃秦王書十上而􅀃不行去秦而歸􅀒書擔橐形容枯槁續漢書曰李固爲三公子躬歩以驢􅀒書從師墨子曰墨子南使衛載書甚多強唐子見而恠之對曰昔周公曰朝讀書夕見七十二士相天下猶如此吾安敢廢此也晉書曰張華無餘財唯文史溢几篋徙居載書三十車也焚書史記曰秦始皇二十二年令天下敢有藏詩書百家語者悉詣守尉燒之下三十日不燒黥爲城旦所不禁醫藥卜筮種樹之書耳風俗通曰董卓盪覆王室天子西移所載書七十車遇􅀨道難分半投弃即於處燒燔麋爲􅁅穢淮南子曰王壽􅀒書而行見徐慿曰事者應變而動書者言之所出智不籍書王壽乃焚其書而舞也三國典略曰􅀄侯景來旣送東宫妓女尚有數百人景乃分給軍士夜於宫中置酒奏樂忽聞火起衆遂驚散東宫圖籍數百厨焚之皆盡􅀄太子夢作秦始皇者云此人復欲焚書旣而見􅋹夢則驗焉又曰周師䧟江陵梁王知事不濟入東閣竹殿命舎人髙善寳焚古今圖書十四萬卷欲自投火與之俱滅宫人引衣遂及火滅盡并以寳劒斫柱令折歎曰文武之道今夜窮矣太平御覽卷第六百十九
