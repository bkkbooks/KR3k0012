front:
  text: 太平御覽卷第二百一十
  hash: sha256:339329691e43058ee0b5ffce730c2fa247664b7f8931c86d17791da8b90a1035
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_210-1a}
body:
  text: 職官部八録尚書尚書令録尚書漢書曰張安丗領尚書事職典樞機以謹慎周密自著每言大政巳決輙移病出聞有詔令乃驚使吏之丞相府問焉自朝廷大臣莫知其與議也又曰孔光字子夏領尚書事凡典樞機十餘年守法度修政事不希苟合或問温室省中樹皆何木也光荅以他語其愼密也如此應劭漢官曰章帝詔曰司空牟融典職六年勤勞不怠其以融爲太尉録尚書事又曰和帝䇿書曰故太尉鄧彪元公之族三讓弥髙海内歸仁爲羣賢酋其以彪爲太傅録尚書事百官揔巳以聽又曰靈帝䇿書曰故太尉陳蕃忠亮謇諤有不吐茹之節司徒胡廣敦德允元五丗從政今以蕃爲太􅀓與廣叅録尚書事又曰沖帝䇿書曰太尉趙峻二丗掌典機衡有匪石不二之心大司農李固公族之苗忠直不回余以峻爲太􅀓固爲太尉叅録尚書事晉書曰元康元年誅楊駿詔曰司徒王渾秉德忠正器量􅀪逺歷位内外文武勲庸著在方䇿冝叅弼機衡以亮天工其令録尚書事又曰賈充爲太尉録尚書事及伐呉爲大都督呉平遣侍中程咸犒勞増邑八千户又曰㑹稽王道子元顯並録尚書事時謂道子爲東録元顯爲西録晉中興書曰㤗和元年詔㑹稽王體道冲虗理識明允阿衡孝文有保乂之規輔弼哀皇盡翼亮之道朕承洪緒仍聞善誘愼徽五敎儀形具瞻登賢顯親國之典也其以爲丞相録尚書事入朝不趨讃拜不名劒履上殿給羽葆鼓吹班劒六十人又曰元興元年八月庚子尚書下舎火是時桓􅀇用事出鎭姑熟名雖在外實遥録尚書故天火示不復用也又曰明帝后庚氏爲皇太后九月癸卯皇太后臨朝稱制司徒王導録尚書事􅀓暢晉故事曰何劭王戎張華裴楷楊濟和嶠爲愍懐太􅀓通省尚書事張華爲光禄大夫尚書七條事皆諮而後行惠帝之丗太保衛瓘太宰河間王顒太􅀓東海王越皆録三省尚書祕書事沈約宋書曰髙武永初三年尚書令揚州刺史徐羡之爲司空録尚書事又曰孝武帝即位以大將軍江夏王義恭爲太尉録尚書事又曰諸公録尚書事古制也王肅解尚書納于大麓曰堯納舜於尊顯之官使大録万機之政案漢氏諸吏平尚書奏事後霍光以大司馬大將軍平尚書事齊書曰明帝爲宣城王録尚書事廢帝昭業思蒸魚太官以無録公命不與後魏書曰比海王祥􅀄遷大將軍録尚書事祥之命其夜暴風雲電抜其庭中桐樹大十圍倒立夲處天威如此識者知其不終三國典略曰齊以并省尚書令髙阿郍肱爲録尚書事郍肱才伎庸劣不渉文史尚書郎中源師常白郍肱云龍見當雩郍肱問曰何處龍見作何顔色師荅曰此是龍星湏雩祭也非是眞有龍見郍肱曰漢兒多事強知星􅀫唐書官品志曰録尚書一人位在令上掌與令同但不糾察今則紏彈見事與御史中丞更相廉察陶氏職官要録曰後漢章帝以太􅀓趙喜太尉牟融並録尚書事尚書有六名自此始也因斯以來每帝㓜即位輙置太􅀓録尚書事尚書令六典曰尚書令掌揔領百官儀形端揆其屬有六尚書一曰吏部二曰户部三曰禮部四曰兵部五曰刑部六曰工部凡庻務皆會而決之漢官儀曰尚書令主賛奏揔典綱紀無所不統秩千石故公爲之者朝㑹不階奏事增秩二千石天子所服五時衣賜尚書令其三公列卿將大夫五營校尉行􅃨道中遇尚書令僕射左右丞皆迴車䂊避衛士傳不得紆臺官臺官過乃得去漢尚書稱臺魏晉巳來爲省漢書曰張安丗字子􅐐少以父任爲郎用善書給事尚書精力於職休沐嘗岀上行幸河東云書三篋詔問莫能知唯安丗識之具作其事後購求得書以相校無所遺失上竒其才擢爲尚書令東觀漢記曰陳忠爲尚書令數進忠言辭旨􅀪麗前後所奏悉條於宫上閣以爲故事又曰侯霸爲尚書令􅀷見任用樊准爲尚書令明習漢家故事周密畏慎申屠剛爲尚書令謇謇多直言無所屈撓後漢書曰宋均拜尚書令每有駮議多合上旨均嘗刪翦疑事帝以爲有姦大怒収郎􅅞格之諸尚書惶恐皆叩頭謝罪均顧厲色曰蓋忠臣執義無有二心若畏威失正均雖死不易小黃門在傍入具以聞帝善其不撓即令貸郎又曰申屠剛遷尚書令光武嘗欲岀遊剛以隴蜀未平不冝宴安逸豫諫不見聽遂以頭軔乗輿輪帝遂爲止又曰郭賀字喬卿爲尚書令百姓歌之曰厥德仁明郭喬卿忠正朝廷上下平又曰侯霸拜尚書令條撰善政有便於民者除其煩苛時令立春下寛大詔書由霸始建言多施用又曰陳蕃岀爲豫章太守性方峻不接賔客徴爲尚書令送者不出郭門華嶠後漢書曰申屠剛爲尚書令時内外羣官多帝自遷舉加以法理嚴察職事過苦尚書近臣乃至捶撲牽曵於前羣臣莫敢言唯剛每極諫張璠漢記曰左雄爲尚書令在位者各肅清時稱曰左伯豪爲尚書令天下皆愼選舉伯豪雄字也漢官曰尚書令􅁗官銅印墨綬與司􅀠校尉御史中丞皆專席坐京師號曰三獨坐言其尊重如此魏志曰陳矯字季弼尚書令魏明帝卒至尚書門矯跪問何之帝曰欲案行文書耳矯對曰此臣職分非陛下所冝臨也若不稱則請就黜帝慙迴車又曰荀彧自爲尚書令常以書陳事臨薨皆焚毁故竒䇿密謀不得盡聞又非正道不用心名重天下莫不以爲儀表海内英俊咸宗焉魏氏春秋曰荀攸字公逹爲尚書令從太祖征伐常謀謩帷幄時人及子弟莫知其所言太祖每稱之曰公逹外愚内智外怯內勇外弱内強不伐善無施勞知可及愚不可及雖顔回寗武子不能過文帝在東宫太祖謂曰荀公逹人之師表也汝當盡禮敬之攸曽病丗子問疾獨拜牀下其見尊異如此始攸入尚書太祖聞名與語大恱謂荀彧鍾繇曰公逹非常人也吾得與之計事天下當何憂哉蜀志曰費禕代蔣琬爲尚書令于時戰軍多事衆務煩猥禕識寤過人每省讀書記粗舉目暫視究其意旨其速數倍於人終亦不忘常以朝晡聽事其間接賔客飲食嬉戯加之􅀶弈每盡人之歡事後遷大將軍録尚書事董允代禕爲尚書令旬日之中事多停滯允歎曰人才力相懸若此非吾所及又曰蔣琬宇公琰諸葛亮每言公琰託志忠雅當與共讃王業也密表後主臣若不幸後事冝以付琬亮卒琬爲尚書令時新喪元帥逺近危悚琬出􅀋抜萃處羣寮之右旣無戚容又無喜色神守舉止有如平常由是衆望漸服又曰劉巴字子初代法正爲尚書令躬履淸儉不治産業又自以歸附非素懼見猜嫌恭黙守靖退無􅀻交非公事不言又曰吕乂字季陽代董允爲尚書令庻事無留門無停賔又歷職內外治身儉約謙静少言爲政不煩號爲清能然持法刻􅀷好用文俗吏故居大官名聲損於郡縣時晉書曰樂廣爲尚書令所在無當時功譽然爲後人所思又曰裴秀爲尚書令秀創制朝儀廣陳刑政朝廷多遵用之以爲故事在位四載爲當丗名公又曰李胤爲尚書令雖歷職内外而在公退食在家貧儉兒病無以市藥上賜錢十萬又曰荀朂守尚書令課試令史以下覈其才能有闇於文法不能決疑處事者即時遣岀帝嘗謂曰魏武帝言荀文若之進善不進不止荀公逹之退惡不退不休二令君之羙亦望於君也又曰㑹稽王道子嘗集朝士置酒於東府尚書令謝石因醉爲委巷之歌王恭正色曰居端右之重集藩王之第而肆􅁋聲欲令羣下何所取則石􅀷衘之又曰王彪之字叔虎爲尚書令與謝安共掌朝政安每稱曰朝之大事衆不能決者諮之王公無不得判又曰太熈元年詔曰夫揔百揆之得失管王政之開塞者端右之職也是以自漢代以來每選此官必愼其人議郎王戎可爲尚書令又曰衛瓘字伯玉拜尚書令性嚴整以法御下視叅佐尚書郎若􅁺屬又曰熊逺啓曰伏見吏部以太尉荀組爲尚書令復領荆州牧自三代以來未聞以納言之官而岀領牧伯者晉中興書曰卞壼爲尚書令司徒王導稱疾不朝壼奏導專任無敬事寢不行舉朝憚壼又曰萬恊遷尚書令詔曰尚書令恊抗志髙亮才鑒􅀶雅朕甚嘉之晉書曰百官表注尚書令一人唐虞官也是謂文昌天府銅印墨綬五時朝服納言幘進賢兩梁冠佩水蒼玉官品第三俸月四十五斛領都揔攝諸曹出納王命晉公卿禮秩曰尚書令拜受命皆䇿命薨則於朝堂發哀古之􅃁宰以在端右故也晉故事曰賈充爲尚書令以目疾表置省事於是遂置省事吏四人品職章服與諸曹令史同宋書曰王僧䖍爲尚書令嘗爲飛白書題尚書壁曰圎行方止物之定質脩之不巳則溢髙之不巳則躓引之不巳則遺是故去之冝疾當時嗟賞以比座右銘又曰武帝踐祚王瑩遷尚書令時有猛獸入郭上意不恱以問羣臣皆莫能對瑩在御筵乃歛板荅曰昔擊石拊石百獸率舞陛下應籙御圖武象來格帝大恱衆咸服焉齊書曰謝朏字敬沖徴爲司徒尚書令朏辝脚疾不堪謁仍角巾自輿詣雲龍門謝旣見乗小車就席齊職儀曰􅁗漢之丗委政公卿尚書之職掌封奏令賛文書僕射主開閉令不在則僕射奏下其事魏氏重内職八座尚書任同六卿舜舉八元八凱以隆唐朝今號八座爲元凱謂賢能用事義如昔也梁書曰何敬容爲尚書令貪恡爲時所嗤鄙其署名敬字則大作苟小爲文容字大爲父小爲口陸倕戯之曰公家苟旣竒大父亦不小敬容遂不能荅又曰漏禁中語故嘲誚日至甞有客姓吉問卿與邴吉逺近曰如明公之與蕭何唐書曰太宗在藩甞爲尚書令其後人臣莫敢爲遂廢其官廣德元年代宗以親賢有大勲遂特拜尚書令又曰廣德二年冬詔郭子儀於尚書省視尚書令事命宰臣巳下特遣射生五百􅀐執㦸翼從自朝堂至于省賜以教坊音樂五代史梁書開平三年詔􅂛尚書令爲正一品按唐典尚書令正二品至是以將授趙王鎔此官故􅂛之會稽先賢傳曰沈勲徴詣南宫賜酒拜尚書令持節臨辟雍名冠百僚襄陽􅂄舊傳曰劉季和曰荀令君至人家坐處三日香徐廣車服儀制曰尚書令軺車黒耳後户通典曰大唐尚書令朝服鷩冕八旒七章三梁冠鷩雉也可爲冠也武德初太宗爲􅁗王時嘗居之其後人臣莫敢當故自龍朔二年制廢尚書令又曰舊尚書令有大㕔當省之中今謂之都堂丗說曰崇禮闥在東掖門内路西即尚書省崇禮門東建禮門内即是尚書令下舎之門太平御覽卷第二百一十
