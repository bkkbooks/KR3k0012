body:
  text: 居處部一宫丗本曰堯使禹作宫釋名宫穹也屋見垣上穹隆也爾雅曰宫謂之室室謂之宫史記曰天官書曰􅀇武虚危主宫室大戴記曰周時徳澤和洽蒿茂大以爲宫柱名爲蒿宫毛詩曰定之方中作爲楚宫揆之以日作爲楚室又曰鼓鍾于宫聲聞于外易曰上古穴居而野處後丗聖人易之以宫室上㨂下宇以待風雨蓋取諸大壯左傳曰襄公作楚宫穆叔曰太誓云人之所欲天必從之君欲楚夫故作其宫􅀂君不復適楚必死是宫也六月公薨于楚宫又曰晉成虒祁之宫又成銅鞮之宫數里論語曰禹卑宫室而盡力乎溝洫禹吾無間然矣史記曰騶子之燕昭王擁彗先驅請列弟子坐而受業築碣石宫親徃師之又曰􅁗始皇造阿房宫徴發天下工匠又曰􅁗始皇所居之宫有祈年宫長信宫梁山宫又曰戎使由余於􅁗􅁗繆公示以宫室積聚由余曰使􅀑爲之則勞神矣使人爲之亦苦民矣又曰項羽屠咸陽焚其宫室三月火不㓕又曰盧生􅀃始皇曰人主爲微行所居而人知之則害於神願上居無令人知則不死之藥殆可得也乃命咸陽之旁三百里内宫觀二百七十􅃨道甬道相連帷帳鍾鼔美人充之所幸言其處者死始皇幸梁山宫望見丞相車􅀐衆不善之中人以告丞相損車􅀐始皇怒曰此中人泄吾語捕時在旁者斬之自是莫知所在决事悉於咸陽宫又曰始皇二十七年作長信宫於渭􅀯通驪山作甘泉前殿築甬道自咸陽屬之築牆垣如街巷又曰漢武帝時河決天子自臨決河沉白馬玉壁作瓠子歌於是築宫其上名曰宣房宫又曰樗里子卒葬于渭南章臺之東曰後百歳是當有天子之宫夾我墓樗里疾室在於昭王廟西渭南隂郷樗里故俗謂之樗里子至漢興長樂宫在其東未央宫在其西武庫正直其墓􅁗人諺曰力則任鄙智則樗里漢書曰漢八年蕭丞相營作未央宫立東闕北闕蒼龍􅀇虎二闕前殿武庫太倉髙祖還見宫闕壯麗甚怒曰天下方未定何治宫室過度也何曰非壯非麗無以威四夷旦令後世無以加也又曰􅀄江充召見犬臺宮晉灼曰黄圖上林有走狗觀也古曰今書本犬臺有作太臺字者誤也漢無太臺宫自請願以所常􅀍服冠見上上許之充爲人魁岸容貌甚壯帝望見而異之謂左右曰燕趙固多竒士旣至前問以當丗政事上恱之又曰武帝六年冬行幸囬中春作首山宫又曰上幸不其祠神人于交門宫􅀂有向坐拜者作交門之歌又曰幸河東之明年正月鳯皇集祋祤於所集處得玉寳起歩壽宫又曰栢梁災越巫勇之廼曰越俗有火災又起屋必以大用勝服之於是起建章宫爲千門萬户又曰梁孝王吴楚破梁最親有功又爲大國居天下膏􅃾北界泰山西至髙陽四十餘城多大縣孝王太后少子愛之賞賜不可勝道於是孝王築東苑方三百餘里廣睢陽城七十里大治宫室爲􅃨道宫連屬於平臺四十餘里如淳曰在梁東北離宫所在晉灼曰或􅀃在城中東北角得賜天子旌旗從千乗萬􅀐出警入蹕擬於天子又曰孝武作建章宫爲千門萬户有鳯凰闕髙二十餘丈中有蓬萊方丈瀛洲壷梁象海中神山南有玉堂壁門大鳥之屬立神明臺井幹樓度髙五十餘丈輦道相屬焉又曰􅁗起咸陽西至雍離宫三百師古曰凡言離宫者皆謂於別處置之非常所居也鍾鼓帷帳不移而具又爲阿房之殿髙數十仭師古曰阿房者言殿之四阿皆爲房也一􅀃大陵曰阿言其殿髙􅀂於阿上爲房也房次王作旁􅀃云始皇作四十殿未有名以其去咸陽近且號阿房阿近也八尺曰仭也東西五里南北千歩從車羅􅀐四馬馳鶩旌旗不撓師古曰撓屈也言庭之廣大殿之髙敞衆􅀐馳鶩無所觸建立旗旌不屈撓撓音女孝切爲宫室之麗至於此使其後世曽不得聚廬而託處焉又曰鄒陽諌吴王曰臣聞􅁗􅀝曲臺之宫應劭曰始皇帝所治處也􅀂漢家未央宫也懸衡天下服䖍曰􅀜西爲衡應劭曰衡平也如淳曰衡猶稱也言其縣法度於其上也師古曰此􅀃􅁗自以爲威力強固非論平法也下又言陳勝連從兵之據則是􅀃從撗之事耳服釋是也􅀞地而不犯兵加胡越師古曰􅀞地不犯者法制之行至其晩節末路張耳陳勝連從兵之據師古曰從音子容切以叩函谷咸陽遂危師古曰叩擊也何則列郡不相親萬室不相救也又曰後元二年幸盩屋作五柞宫張晏曰有五柞樹因以名又曰甘露二年幸萯陽宫在鄠萯音倍後漢書曰永平三年夏旱而大起北宫鍾離意詣闕免冠上䟽曰伏見陛下以天時小旱憂元元降避正殿躬自克責而皆密雲遂無大潤豈政有未得應天心者邪昔成湯曹旱以六事自責曰政不節邪使人疾邪宫室榮邪女謁盛邪苞苴行邪䜛夫昌邪竊見北宮作人失農時此所謂宫室榮也自古非患宫室小狹但患人不安寜冝且罷以應天心臣意以疋夫之才無有重能乆食重祿擢備近臣比受厚賜喜懼相半不勝愚戇征營罪當萬死征營不自安也帝䇿詔報曰湯引六事咎在一人其冠履勿謝比上天降旱宻雲數㑹朕戚然慚懼思獲善應故分布禱請闚候風雲北祈明堂南設雩塲明堂在洛陽城􅀯言北祈者蓋時修雩塲在明堂之南也今又勑大匠上作諸宫減省不急庶消災譴詔因謝公卿百僚遂應時澍雨又曰東平王蒼薨元和三年東廵狩幸東平宫追念蒼謂其諸子曰思其人至其郷其處在其人亡因泣下沾􅁭魏志曰帝營作許昌宫楊阜諌曰堯尚茅茨而萬國安禹卑宫室而天下樂桀作琁室象廊紂爲傾宫鹿臺皆喪社稷也吴志曰後主二年六月起新宫於太􅀄之東制度􅀹廣二千石巳下皆自入山督攝伐木又壞諸地大開􅁐囿起土山作樓觀加飾珠玉製以竒名右臨硎左彎碕又開城北渠引後湖水激流入宫内廵遶堂殿窮極􅇊巧功費萬計又曰赤烏十年春二月適南宫三月改作太􅀄宫詔移武昌材瓦有司奏武昌宫作巳二十八年恐不堪用冝别更置帝曰大禹卑宫室爲美今軍事未巳所在多賦妨損農業且建業宫乃朕從京來作府舎耳材柱率細年月乆逺恐朽壞今武昌宫材木自可用繕之晉書曰尚書僕射謝安石以宫室杇壞啓作新宫帝權出居㑹稽王第二月始興功内外日役六千人安與大匠毛安之决意修定皆仰摸􅀇象體合辰極並新制置省閣堂宇名署時正構太極殿欠一梁有梅木流至石頭石頭津主啓聞取用之因􅀞花於梁上以表瑞焉又起朱雀重樓皆繡栭藻井門開三道上重名朱雀觀觀下門上有銅雀懸楣上刻木爲龍虎左右相對王隱晉書曰髙堂隆刻鄴宫屋材云後􅀂干年當有天子居此宫惠帝止鄴宫治屋土剥更渥始見刻字計年正合時載記曰石勒欲營鄴宫先是廷尉續咸諌止之及是霖雨中山西北􅁀水流漂巨木百餘萬根集于堂陽勒大恱謂公卿曰諸卿知否此非爲災天意欲吾營都矣於是營之勒親定䂓模又曰劉曜命起酆明觀立西宫建凌霄樓於滈池侍中喬豫和苞上䟽曰臣聞人主之興作也上准乾坤俯順人時是以衛文承亂亡之後宗廟流漂無所而猶上憲營室作爲楚宫故能上興康叔武公之迹延九百之慶也今奉詔書將營酆明觀市道蒭蕘咸非之曰一觀之費足以平涼州矣又奉勑旨復欲擬阿房而建西宫模瓊樓而建陵霄以此功費亦可以吞吴蜀剪齊魏矣書奏曜大恱宋書曰少帝以石頭城爲長樂宫東府城爲未央宫齊書曰髙祖永明元年秋七月車駕幸青溪舊宫設金石樂在位者賦詩唐書曰東都平太宗入觀隋氏宫室嗟後主罄人力以逞奢侈薛収進曰峻宇雕牆殷辛以滅土階茅㨂唐堯以昌􅁗帝増阿房之飾漢后罷露臺之費故漢祚延而􅁗禍速自古如土崩瓦解取譏後代良以奢虐所致太宗恱其對又曰髙祖甞避暑于仁智宫又曰閻立徳受詔造翠微宫及玉華宫咸稱旨賞賜甚厚又曰太宗將幸九成宫姚思廉諌曰離宫遊幸􅁗皇漢武之事固非堯舜禹湯之所爲也言甚切至太宗納之西京􅄂記曰趙王如意年㓜未能親就外傅戚􅁎使舊趙内傅趙媪􅀓之號其室爲養徳宫又曰五柞宫有五柞樹皆連抱上枝覆䕃數十􅅿其西有青桐觀觀有三梧桐樹樹下石騏驎二枚刋其脇爲文字是􅁗始皇酈山墓上物也頭髙一丈三尺東邊者前左脚折折處有赤如血父老謂其有神皆含血而屬䈥焉帝王世紀曰紂作傾宫七年乃成大十里髙十丈又曰堯有貳宫漢武故事曰上起明光宫發燕趙羙女二千人充之取年十五巳上二十巳下滿四十者出嫁掖庭令惣其籍時有死出者隋捕之凡諸宫美人可有七八千建章未央長樂三宫皆輦道相屬懸棟飛閣不由徑路六韜曰殷君喜治宫室七十三所大宫百里宮中九市列仙傳曰鈎弋夫人齊人病六年右手拳望氣者云東方有貴人氣推而得之召到姿色甚偉帝披其手得一玉鈎而手尋展故名其宫爲鈎翼宫十洲記曰方丈山上有􅀇琉璃宫博物志曰夏桀之時爲長夜宫於深谷之中男女􅄂處三旬不岀聽政其後大風飄沙一夕填此宫谷鄴中記曰石虎在時自襄國至鄴二百里中四十里輙立一宫宫有一夫人侍婢數十黄門宿衛石虎下輦即止凡虎所起内外大小殿臺觀行宫四十四所項國志曰武帝遊五柞宫欲廣上林令譙隆諌曰堯舜至治廣徳不務􅁐囿帝初不恱後拜爲中郎墨子曰上古之人未知爲宫室就陵而居處下潤傷民故聖人作爲宫室宫室之法髙足以避潤濕中足以禦風寒上足以待霜雪牆髙足以別男女故以便生不以爲樂也今之爲宫室必厚歛百姓􅁀奪民財爲曲直之室青黄刻鏤之飾故國貧而人難訴也管子曰黄帝有合宫以聽政穆天子傳曰天子􅂛于崑崙之丘以觀黄帝之宫越絶書曰美女宫周五百九十歩土城者句踐所習教美女西施鄭旦宮室方言曰吴有館娃之宫列子曰周穆王時西域國有化人來王執化人之祛騰而上天曁化人之宮構以金銀絡以珠玉出雲雨之上實爲清都紫微也孟子曰齊宣王見孟子於雪宫吕氏春秋曰武王勝殷靖箕子之宫也神異經曰東方有宫青石爲牆髙三仭左右闕髙百尺􅀞以五色門有銀牓以青石碧鏤題曰天地長男之宫西方有宫白石爲牆五色􅀇黄門有金牓而銀鏤題曰天地少女之宫西南有宫以金爲牆闕有金牓以銀鏤題曰天皇之宫南方有宫以赤石爲牆赤銅爲門闕有銀牓曰天地中女之宫北方有宫以黒石爲牆題曰天地中男之宫東南有宫以黄石爲牆以黄牓碧鏤題曰天地少男之宫西南有宫以黄銅爲牆題曰地皇之宫十洲記曰青丘山上有紫宫天真仙女多遊於此又曰方丈山有琉璃宫紀年曰穆王所居鄭宫春宫􅀃苑曰楚使使聘齊齊王享之梧宫使者曰大哉梧乎王曰江海之魚吞舟况大國之樹三輔故事曰桂宫周匝十里内有光明殿走狗臺土山􅃨道横北庭從宫中西上城至神明臺三輔黄圖曰有夜光宫望逺宫昭臺宫蒲桃宫棠梨宫萯陽宫長平宫五柞宫漢宫闕名曰長安有長樂宫未央宫長門宫鼓篁宫承光宫冝春宫池陽宫長平宫黄山宫望仙宫長楊宫集靈宫延壽宫祈年宫通天宫馺娑宫沛宫林光宫甘泉宫龍泉宮首山宫交門宫明光宫五柞宫萬歳宮竹宫壽宫建章宫太一宫思子宫見漢書長樂等宫或在京師或在外邵或帝王所居或祠祀所在或因事以置夜光宫棠梨宮扶茘宫見三輔莫圖桂宫見三輔故事鼎湖宫谷口宫魏略曰大􅁗國城中有五宫相去各十里宫室皆以水精爲梱食器亦然郡國誌曰金河府摩磷宫北二十里有石殿一飛橋向岸􅀞以古賢哲士太常卿蔣少遊制太和五年文明太后來幸釣得鯉魚一􅀟長三尺以黄金鏁穿鰓放於池中後皆長五尺沉泛相隨正光元年五月五日天清氣爽聞池内鏘鏘聲水中驚沸湏􅁷雷電晦􅁳有氣五道自池中屬於天乆之乃滅波止水定唯見一魚化爲龍矣又曰􅁗川宮昔非子到􅁗於此築宫室又曰廬山有三宫上宫在懸崖之表人所不及次宫在山巖下兩邊有隂陽溝有石羊馬夾道相對下宫在彭蠡湖際隋圖經曰大業十六年自江都還洛陽勑於汾州北臨汾水起汾陽宫即管涔山汾河源所出之處當盛暑之時臨河盥潄即涼風凛然如八九月其北多雨經夏罕有晴日一日之中倐忽而雨倐忽而晴晴雨未曽經日雖髙嶺千仞嶺上居人掘地深二三尺即得清泉用之壽春圖經曰十宫在縣北五里長阜􅁐内依林傍澗踈逈跨㞯隨地形置焉並隋煬帝立也曰歸鴈宫回流宫九里宫松林宫楓林宫大雷宫小雷宫春草宫九華宫光汾宫是曰十宫西京記曰通義坊唐髙祖龍潜舊宅武徳元年以爲通義宫六年髙祖臨幸大宴羣臣引見鄰里父老班賜有差貞觀元年立爲興聖尼寺焉又曰大明宫南接京城之北面西接京城之東北隅􅀄髙宗甞患風痺以宫内湫濕屋宇擁蔽乃於此置宫司農少卿梁孝仁充使製造北據髙岡南望爽塏視終南如指掌坊市俯而可窺東京記曰上陽宫在皇城西南東苑前苑東垂南臨洛水西亘􅂖水上元中韋機充使所造列岸脩廊連亘掘地得銅器似盆而淺中有隱起􅀟鯉之狀魚間有四􅂐字曰長冝子孫時人以爲李氏再興之符髙宗末年常居此宫以聽政也兩京記曰上陽宫西有西上陽宫兩宫夾􅂖水虹橋架逈以通徃來楚辭曰魚鱗屋􅀆龍堂紫貝闕􅀆珠宫太平衘覽卷第一百七十三
