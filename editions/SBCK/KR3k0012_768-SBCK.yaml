front:
  text: 太平御覽卷第七百六十八舟部一
  hash: sha256:34bcd6e0573b6ed4abb73d868457d06b92c118880d104217a33335420ee466fa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_768-1a}
body:
  text: 叙舟上釋名曰舡循水而行又曰舟言周流也舡上屋曰廬象舎也其上重室曰飛廬在上故曰飛也又在其上曰雀室於中候望􅀂鳥雀之驚視也又曰舟名青翰千翼赤鳥亦名鷁首說文曰舡從舟從鈆省聲艘舡揔名也艘音騷易曰刳木爲舟剡木爲檝舟檝之利以濟不通詩曰汎彼栢舟在彼中河舟在河中猶婦人在夫家是其常處又曰二子乗舟汎汎其景二子伋夀願言思子中心養養又曰汎汎楊舟載沉載浮楊木也舟之汎浮隨所載旣見君子我心則休書曰予乗四載隨山刋夲所載者四其一曰水乗舟又曰􅀂乗舟汝弗濟臭厥載禮曰季春之月舟牧覆舟五覆五反乃吿舟備具于天子鄭玄曰舟官覆反舟者備傾漏也蔡邕章句曰備謂檝擢紼纚維引之具左傳曰齊侯與蔡姬乗舟于囿蕩蕩公公懼變色禁之不可公怒歸之未之絶也蔡人嫁之齊侯以諸侯之師侵蔡又曰冬晉荐饑使乞糴于􅁗􅁗輸於晉自雍及綘相繼命之曰汎舟之殺泛謂水運入河汾也又曰􅁗伯伐晉孟明濟河焚舟示必无也取王宫及郊王宫郊皆晉地晉人不出遂自茅津濟封崤屍而還第津在河東埋文陽縣西封藏又曰楚敗吴師獲其舟餘皇餘皇舟名又曰晉楚將戰趙嬰齊使其徒先具舟于河故敗而先濟也春秋潜潭巴曰澤浮舟天子以亡爲憂宋均注曰潭無底之澤令浮舟言隂盛之耳論語曰南宮适問於孔子曰羿善射奡盪舟俱不得其死然爾雅曰舫舟也天子造舟諸侯維舟大夫方舟士特舟庶人乗柎郭璞注曰造北舡爲橋也維連四舡也方併兩舡也特單舡也柎編木以渡也廣雅曰艦大舡也舫艕舩也蒙衝艑歩典切䑦音鈎􅑳音鹿舸古我切共音廷音孟音舟洪舟挺舟猛舟也家語曰舟非水不行水入舟則没君非民不治民犯上則君危戰國䇿曰或謂公叔曰乗舟舟漏而不塞則舟沉矣塞漏舟而輕陽侯之波則舟覆矣令公自以辯於薛公而輕秦是漏舟而輕陽侯之波也願公察之帝王丗紀曰昭王濟漢舡人惡之以膠舡進王中流膠舡刺舩遂免害漢書曰鄧通蜀郡南安人以櫂舡爲黄頭郎師古曰櫂舡能持櫂行舡也士勝水其色黄故刺舡之郎皆着黄㡌因號曰黄頭郎也又曰景帝三年吴大舡自覆吴地以舡爲家國􅀅亡也又曰武帝汾歌曰汎樓船兮濟汾河横中流兮楊素波又曰武帝浮江射蛟舳艫千里李斐曰舳後持抱處艫舡頭刺擢處也又曰武帝時越欲漢用舡戰逐水戰相逐乃大脩昆明池列館環之治樓舡髙十餘丈旗幟加其上又曰伍􅀍曰吴王伐江陵木以爲舡又曰薛廣徳爲御史大夫秋上酎􅀕宗廟出便門欲御樓舡廣徳當乗輿免冠頓首曰冝從橋詔曰大夫冠廣徳曰陛下不聽臣臣自刎以血汚車輪陛下不得入廟矣上不恱光禄大夫張猛進曰臣聞主聖臣直乗􅂳危就橋安聖主不乗危御史大夫言可聽上曰曉人不當如是耶乃從橋又曰江都易王子建不道使宮女乗小舡建以足踏覆宫女溺乍沉乍浮建觀而大􅀏後漢書曰馬援平南越將樓舡大小二千餘艘士二萬餘人進擊九真賊徴側餘黨都羊等自無功至居風無功居風二縣並属九真郡斬􅀗五千餘人嶠南悉平嶠嶺嶠也廣州記曰援到交趾立銅柱爲漢之極界又曰第五倫爲㑹稽太守永平五年坐法徴老小攀車叩馬啼呼相隨曰裁行數里不得前倫乃僞止亭舎隂乗舡去衆知復追之及詣廷尉吏人上書守闕者千餘人是時顯宗方按梁松事亦多爲松訟者帝患之詔公車諸爲梁氏及㑹稽太守上書者勿復受㑹帝幸􅋝尉録囚徒得免歸田里身自耕種不交通人物數年拜宕渠令又曰任文公巴郡人爲從事天大旱白刺史曰五月一日當有大水其變巳至不可防救冝令吏人預爲其備刺史不聽文公獨儲大舩百姓或聞頗有爲防者到其日旱烈文公急命促載使白刺史刺史􅀏之日將中天北方雲起湏􅁷大雨至脯時湔水涌起十餘丈酈元水經注云湔水出綿道玉疊山在今益州湔音子建反突壞廬舎所害數千餘人文公遂以占術馳名又曰郭林宗遊洛陽始見河南尹李膺大竒之遂相友善於是名震京師後歸郷里衣冠諸儒送至河上車數千兩林宗唯與李膺同舟而濟衆賔望之以爲神仙焉又曰趙炳嘗臨海求􅂳人不和之和許也俗夲作知者誤也炳乃張蓋㘴其中長嘯呼風亂流而濟於是百姓神服從者如歸魏志曰尚書僕射杜畿受詔作御樓􅂳於陶河試舡遇風没文帝爲之流涕詔曰昔􅁳勤其官而水死稷勤百榖而死杜畿忠之至也又曰徐宣遷司隷校尉從至廣陵六軍乗舟風浪􅁀起帝舡洄倒宣疾在後陵波而前羣寮無至者帝壯之又曰郭嘉死太祖征荆州還於巴丘遇疾燒舡歎曰郭奉孝􅀂在不使􅀌至此奉孝嘉字又曰鄧哀王仲字蒼舒五六歳智􅀂成人孫權曽致巨象太祖欲知其輕重訪之羣下咸莫能岀其理仲曰量象大舡之上而刻其所至稱物以載之則交可知矣太祖大恱即施行焉魏略曰孫權乗大舡來觀軍公使弓弩亂發箭着其舡舡偏重將覆權因廻舡復以一靣受箭箭均船平乃還吴志曰諸􅁑恪岀征東興有虹見其舡又曰吴人以舟檝爲輿馬以巨海爲夷庚也􅀳書曰陸機􅀄詣張華華問雲何在機曰雲有􅀏疾未敢自見俄而雲至華爲人多髭製好帛䋲纒髭雲見而大􅀏不能自巳先是常着縗絰上舡於水中顧見其影因大􅀏落水人救獲免又曰張慿字長宗祖鎮蒼梧太守慿年數歳鎮謂其父曰我不如汝有佳兒慿曰阿翁詎冝以子戯父耶及長有志氣爲郷閭所稱舉孝廉􅀒其才自謂必叅時彦􅀄欲詣劉惔郷里及同舉者共􅀏之旣至惔處之下座神意不接憑欲自發而無端㑹王濛就惔清言有所不通慿於末制之言旨深逺足暢彼我之懷一座皆驚惔延之上座清言彌日留􅀫至旦遣之慿旣還舡湏􅁷遣傅教覔張孝廉舡便召與同載遂言之於簡文帝帝召與語歎曰張慿勃窣爲理窟官至吏部郎御史中丞又曰王濬徴拜右衛將軍除大司農車􅀐將軍羊祜雅知濬有竒略乃宻表留濬於是重拜益州刺史武帝謀伐吴詔濬修舟艦濬乃作大艦連舡方百二十歩受二千餘人以木爲城起樓櫓開四門其上皆得馳馬來徃又畫鷁首怪獸於舡首以懼江神舟檝之盛自古未有太康元年正月濬自成都率巴東􅁥軍廣武將軍唐彬攻吴丹陽尅之擒其丹陽􅁥盛紀吴人江險磧要害之處並以䥫鎻横截之又作䥫錐長丈餘暗置江中以逆拒舡先是羊祐獲吴間諜具知情狀濬乃作大筏數十亦方百餘歩縳草爲人􅀍甲持仗令善水者以筏先行筏旣行遇䥫錐䡄着筏去又作炬長十餘丈大數十圍灌以麻油在舡前遇鏁然炬燒之湏􅁷融液斷絶於是舡無所礙王隱晉書曰陶侃擊蜀賊王真真拘得侃有雀舡侃欲投水都督王榱蘇扶侃入小舡得脫晉中興書曰􅂫峻作逆與祖渙許栁等將萬餘人出撗江連舡東渡時遇西風旣濟船江中忽更東風吹舡還西岸峻書善憙憙曰是天􅂇我固將志也又曰郭飜武昌人安西將軍􅁃翼以帝舅之重躬徃逼飜欲强起飜曰人性各有所短豈可强逼翼以飜舡俠小欲引就大舡飜曰使君不以民鄙賤而辱臨之此固野人之舟也翼俯屈入其中舡太公六韜曰武王伐殷先岀於河吕尚爲􅀅以四十七艘舡濟於河又曰天舡一名天撗以濟大水又曰殷君爲酒池可遊舡莊子曰顔回問於仲尼曰回嘗濟於深之泉津人操舟􅀂神吾問焉操舟可學也曰遊善者數音朔能􅀂乃夫没人未甞見舟而便操之吾問焉不吾告敢問何謂也仲尼曰善遊者之數能忘水故也彼視衆泉􅀂陵視舟之覆猶車之却退也視泉􅀂陵故視舟之覆於淵猶車却退於􅄮也又曰藏舟於壑藏山於澤謂之固矣然則夜半有力者􅀒之而走昧者不知也又曰水之積也不厚則其􅀒大舟也無力覆盃水於􅉾於交切堂之上則芥爲之舟置杯焉則膠水淺而舟大也又曰孔子遊乎緇維之林坐杏壇之上有漁父者下舡而來孔子乃下求之至於澤畔有將杖挐而引其舡頋見孔子再拜而起乃刺舡而去延縁葦間顔淵還車了不頋待水波定不聞挐音只而後敢乗又曰方舟而濟河有虚舡來觸舟雖有惼心之人終不怒也忽有一人在其上則惡聲隨之向不怒向虚而今實也又曰巧者勞而智者憂無能者無所求也食而遨汎􅀂不係之舟也又曰散木以爲舟則沉是不材之木鄧析子曰同舟渉海中流遇風救患􅀂一所憂同也孔藂子曰順謂韓王曰吴越之人同舟濟江中流遇風波其相救如左右手不慎所同之患是不如吴越之舟人也尸子曰六馬登糟丘方舟泛酒池劉析書曰舟行於水車轉於陸此􅀔自然者也文子曰舟浮江海不爲莫乗而沉君子行道不爲莫知而止孫卿子曰君者舟也庶人者水也水則載舟水則覆舟墨子曰工倕作舟慎子曰燕鼎之重乎千鈞乗於吴舟則可以濟所託者浮道也又曰行海者生而至越有舟也行陸者立而至秦有車也秦越逺塗也安坐而至者械也韓子曰千鈞得舡則浮錙銖失舡則沉非千鈞輕而錙銖重也有􅀔之與無􅀔也又曰奔車之上無仲尼覆舟之下無伯夷號令者國之舟車安則知廉危則争越也太平御覽卷第七百六十八
