front:
  text: 太平御覽卷第三百八十五
  hash: sha256:e6f883ded7e5f1abd43682d171124eb503d0c215fd0eed3c209f5c68042e0af9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_385-1a}
body:
  text: 人事部二十六㓜智下唐書曰李百藥字重䂓隋内史令德林子也爲童兒時多疾病祖母趙氏故以百藥爲之名七歳解屬文父友齊中書舎人陸乂馬元熈甞造德林讌集有讀徐陵文者云旣取成周之禾將刈琅耶之稲並不知其事百藥時侍立進曰傳稱鄅人藉稲杜預注云鄅國在瑯瑯開陽乂等大驚異之又曰禇亮字希明㓜聦敏好學善屬文慱覽無所不至經目必記於心喜逰名賢尤善談論年十八詣陳僕射徐陵與啇搉文章深異之陳後主聞而召見使賦詩江揔及諸詞人在坐莫不推善又曰陳叔逹陳宣帝子年十餘􅀊侍宴賦詩十韻援筆便就僕射徐陵甚竒之又曰劉仁䡄尉氏人也㓜少恭謹好學遇隋末喪亂不遑專習毎行坐所在輙書空􅀞地由是􅀶渉文史又曰權德輿生四􅀊能屬詩七􅀊居父喪以孝聞十五日文數百篇編爲童蒙集集十卷名聲日大又曰蔣乂字德源吏官呉兢外孫以外舎冨墳史㓜便記覽不倦七􅀊時誦􅁃信哀江􅀯賦數遍而成誦在口以聦悟強力聞於親黨間又曰髙郢子定㓜聦警絶倫七􅀊時讀尚書湯誓問郢曰奈何以臣伐君郢曰應天順人不爲非道又問曰用命賞于祖不用命戮于社是順人乎父不能對列子曰孔子東逰見兩小兒辯日問其故一小兒曰我以爲日始出去人近而日中時逺一児曰我以爲日出時逺而日中近一児曰􅀄出大如車蓋及中才如盤蓋此不爲逺者小而近者大乎一児曰日􅀄出蒼蒼凉凉及其中如探湯此不爲近者􅀬而逺者凉乎孔子不能決兩小児􅀏曰孰爲汝多知乎尸子曰蒲衣生八年舜讓以天下周王太子晉生八年而服師曠魯連子曰齊之辯士田巳辯於狙丘議於稷下毀五帝罪三王訾五伯離堅白合同異一日而服千人有徐劫者其弟子曰魯連連謂徐劫曰臣願得當田子使之必不復談可平徐劫言之巴曰余弟子年十二然千里駒也願得待議於前可乎田巴曰可魯連得見曰今楚軍南陽趙伐髙堂燕人在遼國亡在旦暮先生將奈何田巴曰無奈何魯連曰危不能爲安亡不能爲存無貴學士矣今先生之言有似梟鳴出聲人皆惡之願先生勿復談也田巴曰謹受教明日見徐劫曰先生之駒乃飛兎騕􅙂也豈特千里哉孔叢子曰孟子居尚㓜請見子思子思見之甚恱其志命子上侍㘴焉禮敬子居甚崇子上不願也客退子上請曰白聞士無介不見女無媒不嫁孟孺子無介而見大人􅀃敬之白也未喻敢問子思曰然吾昔從夫子於郯遇程子於途傾盖而語終日而别命子路將束帛贈焉以其道同於君子也今孟子居孺子也言稱堯舜性樂仁義丗所希有也事之猶可况加敬乎又曰子和爲臨晉令􅃦疾不瘳乃命其二子留葬焉二子長曰長彦年十有二次曰季彦年十􅀊父友西洛人姚進先有道徴不就養志于家長彦季彦常受教焉旣除喪有先人遺書兄弟相勉諷誦不倦于時蒲坂令許君然造其宅勸使歸魯奉以車二乗辤曰載柩而反則違父遺命舎墓而去則心所不忍君然曰以孫就祖於禮爲得願子無疑荅曰􅀂以死有知也祖猶隣宗族焉父獨留此不巳劇乎吾其定矣遂還其居於是甘貧研精墳典十餘年間㑹徒數百故時人爲之語曰魯孔氏好讀經兄弟講誦可不聽學士來者有聲名不過孔氏郍得成郭子曰梁國楊氏子年九􅀊甚聦慧孔君平詣其父父不在乃呼兒爲設菓有楊梅孔指以示兒此實君家菓児應聲荅曰未聞孔雀是夫子家禽周書曰晉平公使叔譽于周見太子晉與之言五稱三而窮李固別傳曰固􅀍誅弟子汝南郭亮始成童遊學洛下乃詣闕上書乞收固屍不許因往臨哭喪不去太后聞而誅之孔融别傳曰孔文舉年四􅀊時毎與諸兄共食梨引小者人問其故荅曰我小児法當取小由此宗族竒之又曰融十􅀊隨父詣京師聞漢中李公清節直亮慕之欲往觀其爲人遂造公門謂門者曰我是公通家子孫也門者白之公曰髙明父祖常與孤遊乎跪而應曰先君孔子與明公先李老君同德比義而相師友則融與公累丗通家坐衆數十人莫不歎息咸曰異童子也太中大夫陳煒後至曰人小了了大或未能佳少府尋聲荅曰君子之㓜時豈當惠乎李公撫抃大􅀏頋少府曰髙明長大必爲偉器范曄後漢書云詣李膺也何晏别傳曰晏時小養魏宫七八歳便慧心大悟衆無愚智莫不貴異之魏武帝讀兵書有所未解試以問晏晏分散所疑無不氷釋邴原别傳曰原字根矩十一喪父家貧早孤隣有書舎原過其傍而泣師問曰童子何罪原曰一則願其不孤二則羡其得學師亦哀原之言而爲之曰童子苟有志我徒相教不求費也於是遂就書一歳之間誦孝經論語管輅別傳曰輅年八九􅀊便喜仰視星辰得人輙問其名夜不肯􅄰自言家雞野鵠猶尚知時况於人乎與比隣兒共戯土壤中輙書地作天及日月星辰毎荅言說事語皆不常􅀫學􅂄人不能折之時年十五來在官舎始讀論語及易便開源布華辤義斐然于時黌上諸生四百餘人皆伏其才琅瑘太守單子春雅有才度聞輅一黌之儁欲見之父遣輅造之大㑹賔客百餘人輅旣年少懼失精神請先飲三􅂛清酒然後與言子春大喜便酌酒獨使飲之子春曰吾自欲與輅旗鼓相當於是唱大語之端遂經乎隂陽子春及衆士卒共攻劫請難風起而輅荅對言皆有餘至日向暮酒食不得子春語衆人曰此年少盛有才器聽其言語正似司馬子遊獵之賦何其磥硌雄壯英神秀茂必能明天文地理變化之數於是徐州號之神童傳宣別傳曰宣字丗和北地泥陽人年十三而著河橋賦有文義傳嘏別傳曰嘏字昭先年八􅀊喪母號泣不絶聲自然之哀同於成人年十四始學疑不再問三年中誦五經皆究其義群言無不綜覧何禎别傳曰禎廬江潜人父他字文竒有儁才早卒禎在孕而􅀌生遇荒亂歸依舅氏齠齓乃追行喪哀泣合禮郷邑稱焉十餘􅀊耽志􅀶覧研精群藉名馳淮泗杜􅀕酒别傳曰君在孩抱之中異於凢童舉宗竒之年六七􅀊在縣北郭與小兒軰爲竹馬戯有車行老公停車視之歎曰此有竒相吾恨不見徐邈别傳曰君諱邈字仙民東莞人􅄮薿朗慧聦悟七􅀊渉學詩賦成章趙至别傳曰至字景眞代郡人流客緱氏令新之官至年十三與母共道傍觀母曰汝先丗夲非微賤家也丗亂流離遂爲士仵耳後能至此不至荅曰可耳便求就師讀書早起聞父耕叱牛聲釋書而泣師問其故荅曰自傷不能致榮使老父不免勤苦師大異之稱其當爲竒器傳暢自叙曰暢字洪迎年四􅀊散􅀐常侍扶風曽叔虎以德量喜與余戯常解衣褶􅀍脫余金環與侍者謂余當恡惜之而經數日不索遂於此見名言論甚重孝子傳曰華光字榮祖彭城人年七􅀊欲見父像永􅀞其父形像朝夕拜謁母有病輙呼天禱祠母即瘳愈毎得珍甘置父像前劉向别傳曰楊信字子烏雄第二子㓜而明慧雄筆玄經不㑹子烏令作九數而得之雄又疑易羝羊觸藩弥日不就子烏曰大人何不云荷㦸入榛列子傳曰孔融􅀍誅􅀄女七􅀊男九􅀊以其㓜弱得􅀉他舎主人有遺肉汁男渴而飲之女曰今日之渴豈得乆活何頼知肉味乎兄號泣而止或言於曹操遂盡殺之及収至女謂兄曰􅀂死者有知得見父豈非至願延頸就刑顔色不變文士傳曰張惇字子純與張儼及朱異俱童少徃見驃􅀐將軍朱據聞三人才名欲試之曰爲吾賦一物然後坐儼賦犬曰守則有威出則有獲韓盧宋鵲書名竹帛純賦席曰席爲冬設簟爲夏施揖讓而㘴君子攸冝異賦弩曰南嶽之幹鍾山之銅應機命中獲隼髙墉據大欣恱又曰桓驎字元鳯沛國龍亢人伯父焉知名官至太尉驎精敏年十三四在焉㘴有􅀫客爲詩曰甘羅十二楊烏九齡昔有二子今則桓生叅差等蹤異丗齊名驎即應聲荅曰邈矣甘羅超等絶倫卓彼楊烏命丗稱賢嗟予蠢弱殊才侔年仰慙二子俯媿過言又曰劉楨字公幹少以才學知名年八九􅀊能誦論語詩論及篇賦數萬言警悟辯捷所問應聲而荅當其辤氣鋒烈莫有折者又曰阮瑀少有儁才應機捷麗就蔡邕學歎曰童子竒才朗朗無􅀟又曰王弼字輔嗣山陽髙平人㓜聦逹年十餘􅀊便能誦詩書讀莊老善通其意又曰杜育童孺竒才􅀶學能著文章心解性逹無所不綜一時稱爲舞陽杜孔子三輔決録曰張旣字德容爲児童郡功曹㳺殷察異之殷先歸勑家設賔饌及旣至殷妻􅀏曰張德容童昏小児何異於客哉殷曰方伯之器也殷遂與旣論覇王之略饗訖以子楚託之海内先賢傳曰童子汝南謝廣河南趙建年十二通經詔以爲二童應化而皆拜郎中汝南先賢傳曰郭亮童㓜之年則有尚義之心年十四始欲出學聞頴川杜周甫精黌多長杜亮造門而師學焉朝受其業夕巳精講動聲則宫商清暢推義則尋理釋結周甫竒而偉之又曰黄憲字叔度丗貧賤父爲牛醫頴川荀淑嘗至頴陽遇憲於逆旅時年十四淑竦然異之揖與語移日不能去謂曰子吾之師表也旣而前至􅀽閬所曰子國有顔子寜識之乎閬曰君見叔度耶零陵先賢傳曰周不疑字文直長安人始嬰孩時巳有竒異至年十三曹公聞之欲拜識旣見即以女妻之不疑不受時有白雀瑞儒林並巳作頌不疑見操授􅁓筆立令復作操異而竒之廣州先賢傳曰董正字伯和南海人少有令姿貧寒不戚耽意術籍志在規俗年十五通毛詩三禮春秋㑹稽先賢傅曰淳于長通年十七􅀃宓氏昜經貫洞内事萬言兼春秋郷黨稱曰聖童益部􅂄舊傳曰張霸牢伯饒蜀郡成都人也年數歲知禮義郷人號爲張僧子七嵗通春秋復欲進餘經父母曰汝小未能也覇曰我饒爲之故字伯饒㑹稽典録曰王充字仲任爲児童遊戯不好狎侮父誦竒之十􅀊教書數又曰餘姚伍賤字士微父爲倉監失去官􅂖薄領罪至於死賤爲執筆檢校相當由是見異􅉑爲神童江氏家傅曰江㽔字丗林年十一始知樗蒲數以爲遊祖母費爲􅀃徃事有以􅀶弈破業廢身者於是即弃五木終身不以爲戯荀氏家傅曰朂字公魯年十二能通春秋屬文從外柤鍾繇甚竒之常稱此児當繼司空又曰荀淑子爽字慈明一名諝㓜而好學年十二能通春秋論語太尉杜喬見而稱之曰可爲人師爽遂耽思經書慶吊不行徵命不應潁川爲之語曰荀氏八龍慈明無􅀟華陽國志曰童子李餘涪人兄夷殺人亡命母愼當死餘年十三詣吏代母死吏以餘年小不許因自刎死吏以白令令哀傷言郡郡上書出慎太守與令以家財葬餘圗􅀞府庭涼州記曰武王吕光字丗明以石氏建武四年生夜有光輝舉舎異之因名曰光年十􅀊與諸兄弟於里巷闕軍戯群童咸推爲主割土處中部分行伍郷黨皆称之丗􅀃曰崔駰有文才不其縣令往造之駰子瑗年九􅀊書門曰雖無于木君非文侯何爲入我里閭令見之問駰曰必児所書召瑗使書乃書曰君使臣以禮臣事君以忠又曰徐孺子年九􅀊常月下戯人語之曰􅀂令月中無物極當明矣徐曰不然譬如人眼中有瞳子無此可不暗乎又曰孔文舉有二子大者六􅀊小者五􅀊父眠小者床頭盗酒飲之大児謂曰酒以行禮何以不拜荅曰偷酒郍得復行禮又曰夏侯稱字義權自孺子而好合聚童児爲之渠帥戯必爲軍旅戰陣之事有違者輙嚴以鞭捶衆莫敢逆父淵隂竒之使讀項羽傳及兵書不肯曰能則自爲耳安能學人年十六淵與之畋見奔虎稱驅馬逐之一箭而倒名聞太祖把其手喜曰我得汝矣與文帝爲布衣之交毎讌㑹景陵一座辨士不能荅丗之髙尚者從之遊弟榮字幼權㓜聦慧七􅀊能屬文誦書日千言經目輙識文帝聞而請焉賔客百餘人人奏一刺悉書其郷邑姓丗所謂爵里刺也示之一過而使遍談不謬一人帝深竒之漢中之敗榮年十三左右提之走不肯曰君親在難焉所逃死乃奮劒戰遂殁又曰孫盛爲􅁃公記室叅軍從獵其第二児齊莊俱行􅁃公不知忽於獵塲見齊莊時年七八􅀊謂曰君亦復來耶應聲荅曰所謂無小無大從公于邁又曰何晏年七􅀊明慧􅀂神魏武帝竒受以晏母在宫内欲以爲子晏乃􅀞地令方自處其中曰何氏之廬又曰鍾㑹少有令譽年十二三魏文帝聞之語父繇曰可令卿二子來於是命見毓面有汗文帝問曰卿靣何以獨汗毓對曰戰戰惶惶汗出如漿復問㑹卿何不汗對曰戰戰慄慄汗不得出又曰王戎七歳常與諸小兒遊看道邊有李樹子壓枝折諸児競走取之唯戎不去人問之荅曰樹在道邊而子多苦李也取之信然又曰王濬冲裴叔則二人揔角詣鍾士季客問鍾向二童是誰鍾曰裴揩清通王戎簡要二十年此二賢當爲吏部尚書兾尓時天下無復滯才語林曰孫䇿年十四詣􅀽術俄而外通劉豫州來係便求去􅀽曰劉豫州何􅀂荅曰英雄忌人旣出下東階而劉備從西階上但得轉頋視孫足行殆不復前矣又曰劉道真年十六在門前弄塵垂鼻至胷洛下年少乗車從門過曰年少甚塠􅿞劉便隨車問爲惡爲善劉曰令君翁亦塠􅿞母亦塠􅿞上呼回反下徒回反卷第三百八十五
