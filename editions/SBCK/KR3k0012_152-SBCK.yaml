front:
  text: 太平御覽卷第一百五十二皇親部十八
  hash: sha256:55b588c9d47ddf261dd3b73f0eca6296d989df107bb1e05ef83aabdcf08ab7bf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_152-1a}
body:
  text: 公主易㤗卦曰帝乙歸妹以祉元􅁻婦人謂嫁曰歸㤗者隂陽交秦之時女隨尊位履中居順帝乙歸妹誠合斯義尚書堯典曰􅁵降二女于嬀汭嬪于虞注云降下也嬪婦也楚辭曰帝子降兮北渚目渺渺兮愁予王逸注曰黄子堯子也毛詩曰何彼穠矣美王􅁎也雖則王􅁎亦下嫁於諸侯車服不繫其夫下王后一等猶執婦道以成肅雍之德也何彼穠矣棠棣之華􅂚不肅雝王􅁎之車何彼穠矣華如桃李平王之孫齊侯之子春秋左傳曰襄四年曰昔虞閼父爲周陶正以服事我先王閼父舜之後當周之興閼父爲武王陶正我先王頼其利器用也與其神明之後也舜聖故謂之神明庸以元女大􅁎配胡公庸用也元女武王之長女胡公閼父之子滿也而封諸陳以備三恪周得天下封夏殷二王後又封舜後謂之恪并二王後爲三國其禮轉降示敬而巳故曰三恪又莊元年曰單伯送王􅁎王將嫁女于齊命魯爲主故單伯送天子嫁女於諸侯使同姓諸侯主之不親昏尊卑不敵築王􅁎之館于外公羊傳曰天子嫁女于諸侯天子至尊不自主婚必使諸侯同姓者主之史記曰婺女天孫也又曰公叔相魏尚魏公主而害呉起公叔之僕曰易去也魏相曰奈何其僕曰呉起爲人節廉而自喜也君因先與武侯言曰夫呉起賢人也而侯之國小又與強􅁗壤界竊恐呉越之無留心也侯即曰奈何因謂侯曰恐試近以公主起有留心則必愛無留心則必辭侯以此卜之君因召呉起而與歸即令公主怒而輕君起見公主之輕君也則必辭於是呉起見公主之賤魏相果辭魏武侯魏武侯疑之而不信也又曰李斯長男由爲三川守諸男皆尚􅁗公主諸女悉嫁諸公子由告歸咸陽斯置酒于家百官長皆前爲壽門庭車􅀐以千數漢書曰單于兵強數苦北邊上問婁敬敬曰陛下誠能以嫡公主妻單于厚奉遺之彼知漢女送厚蠻夷必慕以爲閼氏生子必爲太子豈曾聞外孫與大父抗禮哉又曰周勃下廷尉吏侵辱之勃以千金與獄吏獄吏迺書牘背示之曰以公主爲證公主孝文女也勃子勝尚之故獄吏敎引爲證又曰宣平侯張敖尚惠帝姊魯元公主有女惠帝即位吕太后欲爲重親以公主女配帝又曰孝武衛皇后字子夫爲平陽主謳者武帝即位數年無子過平陽主旣飲謳者進帝獨􅀃子夫帝起更衣子夫侍尚衣軒中得幸還坐甚忻賜平陽主金千斤子夫上車主拊其背曰行矣強飯勉之即貴願無相忘又曰烏孫以馬千疋娉女漢元封中遣江都王建女細君爲公主以妻焉賜乗輿服御物爲備官屬侍御數百人贈送甚盛烏孫昆莫以爲右夫人公主至其國自治宫室昆莫年老言語不通公主悲愁自爲作歌天子聞而憐之遣使持帷帳錦繡給遺焉又曰林慮公主子昭平君尚武帝女夷安公主林慮病困以金千斤錢千萬爲昭平君豫贖死罪帝許之林慮公主卒昭平日驕醉殺主傅母繫獄廷尉上請左右爲言前入贖陛下許之帝曰吾弟老有是一子死以囑我故於是爲之垂涕良乆曰法令先帝所造因弟故而誣先帝之法吾何靣目入髙廟乎遂可其奏又曰昭帝始立年八歳帝長姊鄂邑盖長公主居禁中共養帝盖公主私通客河間丁外人上與大將軍聞之不絶主懽有詔外人侍長公主又曰初帝姑館陶公主號竇大主堂邑侯陳午尚之午死主寡居年五十餘矣董偃始與母以賣珠爲事年十三隨母出入主家左右言其姣好召見曰吾爲母養之因留第中敎書計相馬御射頗讀傳記至年十八冠出則執轡入則侍內爲人温柔愛人以故諸公接之名稱城中號曰董君又曰梁王以至親故得自置相二千石出入遊戲僭於天子天子聞之心不善太后知帝弗善迺怒梁使者弗見按責王所爲梁使見太長公主如淳曰景帝姊也而泣曰何梁王爲人子之孝爲人臣之忠太后曾不省也長公主具以告太后太后喜爲帝言之帝心迺解又曰烏孫公主遣女來至京師學鼔琴漢遣侍郎樂奉送主女過􅀛兹􅀛兹前遣人至烏孫求公主女未還㑹女過􅀛兹􅀛兹王器留不遣復使使報公主公主許之後公主上書願令女比宗室入朝而􅀛兹王絳賔亦愛其夫人上書言得尚漢外孫爲昆弟願與公主女俱入朝後數来朝賀樂漢衣服制度歸其國治宫室作徼道周衛出入傳呼如漢家儀外國胡人皆曰驢非驢馬非馬􅀂􅀛兹王所謂騾也又曰薛宣封爲侯時妻死而敬武馬公主寡居上令宣尚焉及宣免歸故郡公主留京師後宣卒公主上書願還宣葬延陵奏可其子況私從燉煌歸長安㑹赦因留與主私亂後漢書曰漢制皇女皆封縣公主儀服同列侯其尊崇者加號長公主儀服同蕃王諸王女皆封縣亭公主儀服同郷亭侯肅宗唯特封東平憲王蒼瑯瑘孝王京女爲縣公主其後安帝桓帝妹亦封長公主同之皇女皇女封公主者所生之子襲母封爲列侯皆傳國于後郷亭之封則不傳襲又曰光武姊湖陽公主新寡帝與共論朝臣微觀其意主曰宋公威容德器羣臣莫及帝曰方且圖之後宋􅀪􅀍引見帝令主坐屏風後因謂􅀪曰喭言貴易交冨易妻人情乎􅀪曰臣聞貧賊之交不可忘糟糠之妻不下堂帝顧主曰事不諧矣又曰董宣爲洛陽令時湖陽公主蒼頭白日殺人因匿主家吏不能得及主出行而以奴驂乗宣於夏門候之乃駐車叩馬以刀畫地大言數主之失叱奴下車因杖殺之主即還宫訴帝帝大怒召宣欲箠殺之宣叩頭曰願乞一言而死帝曰欲何言宣曰陛下聖德中興而縱奴殺良民將何以治天下乎臣不須箠請得自殺即以頭擊楹血􅀍靣帝令小黃門持之使宣叩頭謝主宣不從帝強使頓之宣兩手據地終不肯俯主曰文叔爲白衣時藏亡匿死吏不敢至門今爲天子威不能行一令乎帝􅀏曰天子不與白衣同又曰鄧晨初娶丗祖姊元及漢兵起晨將賔客㑹􅁄陽兵敗丗祖即位封晨房子侯帝又感悼姊没於亂兵追封謚元爲新野節義長公主立廟于縣西封晨長子汎爲呉房侯以奉公主之祀又曰竇憲字伯度女弟立爲皇后憲恃宫掖聲勢遂以賤直請奪沁水公主園田主逼畏不敢計後肅宗駕出過園指以問憲憲喑嗚不能對又曰班始尚清河孝王女隂城公主順帝之姑貴驕􅁋亂與所嬖人居帷中召始入使伏牀下始積怒永建五年遂抜刀殺主帝大怒腰斬始同産皆弃市又曰竇融長子䄓尚内黄公主子勲尚東海恭王彊女比陽公主又子固亦尚世祖女􅄺陽公主竇氏一公兩侯三主親戚功臣中莫與爲比又曰皇女義王建武十五年封舞陽公主適延陵郷侯大僕梁松舞陽縣屬潁川郡松梁統之子其傳云尚光武女舞隂公主又鄧訓傳舞隂公主子梁扈有罪與交通此云舞陽誤松坐誹謗誅又曰皇女中禮十五年封􅄺陽公主適顯親侯大鴻臚竇固􅄺陽屬南陽郡顯親縣屬漢陽郡固竇融子肅宗尊爲長公主皇女紅夫十五年封館陶公主適駙馬都尉韓光光坐與淮陽王延謀反誅又曰館陶公主爲子求郎明帝不許而賜錢千萬謂羣臣曰郎官上應列宿出宰百里有非其人則民受其殃是以難之也又曰明帝永平二年少府隂就子豐殺妻酈邑公主就坐自殺續漢書曰印璽綬王公玉匣銀縷夫人貴人長公主絧縷謝承後漢書曰楊喬爲尚書容儀偉麗數上書言政事桓帝愛其才貌詔妻以公主喬固讓不聽遂閇口不食七日而死魏志曰明帝愛女淑薨追封謚淑爲平原公主爲之立廟魏略曰初東阿王植到􅀜自念有過冝當謝帝乃留其從官着􅀜東將兩三人微行見清河公主欲因主以謝而􅀜吏以聞帝使人逆之不得太后以爲自殺也對帝泣下魏末傳曰何晏婦金郷公主即晏同母妹公主賢明謂其母沛王太妃曰晏爲惡日甚將不保身母􅀏曰汝得無妬晏耶俄而晏死有一男年五六歳宣王遣人録之晏婦藏其子王宫中向使者搏頰乞之使者具以白宣王宣王亦聞晏婦有先見之言心常嘉之且爲沛王故特原不殺呉志曰朱據字子範呉郡人有姿貌乃尚公主拜左將軍封雲陽侯謙虚接士輕財好施晉書曰王濟字武子少知名尚武帝妹常山公主公主妬忌兩目失明終無子又曰武帝勑衛瓘第四子宣尚繁昌公主瓘自以諸王之故胄婚對微素抗表固辭不許又曰孫秀子㑹年二十爲射聲校尉尚帝女河東公主公主母喪未朞便納娉禮㑹形貌短陋奴僕之下者初時與冨室兒於城西販馬百姓忽聞其尚主莫不駭愕又曰桓温尚南康公主温與􅁃翼友善􅁪相期以寧濟之事翼甞薦温於明帝曰桓温少有雄略願陛下勿以常壻畜之冝委以方邵之任託其􅀪濟艱難翼卒以温爲都督荆梁四州諸軍事又曰武帝爲晉陵主求壻王珣曰謝混雖不及劉眞長不減王子敬帝曰如此便足㑹帝崩􅀽崧欲以女妻之珣曰卿莫近禁臠臧榮緒晉書曰賈后二女宣華女彦封宣華􅀪農郡公主女彦年八歳聦明歧嶷便能書學諷誦詩論病困賈后欲議封女彦語后曰我尚小未及成人禮不用公主及薨謚哀獻皇女以長公主禮送葬又曰孝懷詹事裴紹息猷尚榮陽長公主紹字承伯秀從兄子猷不願㛰聞詔在中書即娉温嶠妹中丞傅宣奏猷大不敬又曰帝之姑姊妹皆爲長公主加緑綬晉中興書曰王敦字處冲尚武帝女襄城公主天下大亂敦將還臺悉以主嫁時侍婢百餘人配給將士金寳一時弃梋又曰臨海公主惠帝第四女羊皇后所生初封清河公主未出適值永嘉亂傳賣長城民錢温温以送女女遇主甚酷主自告呉興太守周禮以聞於是殺温及女適譙國曹統又曰南康宣公主興男明帝長女􅁃后所生初封遂安縣主適桓温又曰新安愍公主道福簡文第三女徐淑媛所生適桓濟重適王獻之晉讃曰初衛瓘子宣尚世祖女繁昌公主宣遇黄門不厚致有讒構楊駿欲專朝政諷内外奪宣公主瓘由此去位上㑹諸妃主議問主宣待汝薄今欲離汝意云何主素訥不能自申但泣泣是不欲離諸主因言泣是婦人重於再出故泣耳於是遂離與姑妹書稱故新婦宋書曰公主納徴虎豹皮各一又曰王偃字子游母晉孝武帝女弟鄱陽公主宋受禪封永成君偃尚宋武帝第二女呉興長公主諱榮男常倮偃􅅞諸庭樹時天夜雪噤凍乆之偃兄恢排閤告主乃免偃謙虚恭謹不以世事􅀜懷位右光禄大夫贈開府儀同三司子藻位東陽太守尚文帝第六女臨川長公主諱英媛公主性妬而藻別愛左右人呉崇祖景和中主讒之於廢帝藻下獄死主與王氏離婚又曰何瑀尚武帝少女䂊章康長公主諱次男公主先適徐喬美容色聦敏有智數文帝丗禮待特隆瑀豪競於時與平昌孟靈休東海何勗等並以輿馬相尚公主與瑀情愛隆密何氏踈戚莫不霑􅀍恩紀又曰趙倩尚文帝第四女海鹽公主甚愛重倩甞因言戲以手擊主事上聞文帝離婚又曰禇湛之字休􅀇秀之子也尚宋武第七女治安公主拜駙馬都尉著作佐郎公主薨復尚武帝第五女呉郡宣公主諸尚主者並因丗胄不必皆有才能湛之謹實有意幹故爲文帝所知歷顯位太平御覽卷第一百五十二
