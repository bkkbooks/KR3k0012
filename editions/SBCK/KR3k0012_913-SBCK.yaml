body:
  text: 太平御覽卷第九百一十三獸部二十五􅄂獸驒騱昆蹄蒙頌贙魋蜼鼰豦驨㚟石榖猶㹠竹㹠原天狗獜䝣獀鹿蜀􅀋猼訑狸力土螻讙讙幽鴳足訾那父天馬朏文開明窮竒褱彘䍺羬羊􅅝長古谿邊㺟犱狳渾沌檮杌無損綢齧鐵飛骸獸破鏡猯狖􅚦麡狼兩頭獸獑猢黄要含利兹白虎豹聆䑕壄羊猛氏飛遽射干獌狿蒲勞驒騱上音㒹下音奚􅀃文曰驒騱野馬屬史記曰匈奴畜則駃古穴切騠下奚切驒騱昆蹄爾雅曰昆蹄研善升甗孫炎曰昆蹄之馬蹄平如研而善升山甗者郭璞日􅁗時有昆蹄死昆駼大胡切枝蹄研善升甗蒙頌爾雅曰蒙頌猱狀郭璞注曰即蒙貴也似雖而小紫黑色可畜捕䑕勝猫九真曰南出之猱猕猴之屬也贙爾雅曰贙乎大切有大力郭璞注曰出西海天秦國有飬之似山狗多力獷惡也魋爾雅曰魋如小熊􅀼毛而黄蜼余救切爾雅曰卬鼻而長尾郭璞注曰似弥候而大黄黑色長數尺鼻露上面􅀨則自懸於樹以尾塞鼻或以兩指也鼰古聞切爾雅曰鼰䑕身長􅂡而賊􅁗人謂之小驢郭璞曰鼰而鼠而馬喙一歳千斤爲物殘賤也豦音渠爾雅曰豦迅頭郭璞注曰今建平山中有豦如狗似猕猴多髯能舉石橋人驨爾雅曰驨音㩦如馬而一角不角者騏也㚟刄略切􅀃文曰㚟獸似􅇠青色而大頭與􅇠同足與鹿同山海經曰湪光之山獸名㚟郭璞曰㚟似􅇠而鹿脚青色也石􅂖􅀃文曰􅂖大木切􅀋犬􅆎以上黄􅆎以下黒食母猴或曰􅂖似䍧羊風土記曰石􅂖似狢而形短常捕敢猴猨司馬相如上林賦曰獑音䜛猢榖音厄猶余救切􅀃文曰猶玃屬一曰隴西謂犬子爲猶爾雅曰猶如麂善登木㹠魯連子曰北方有獸名爲㹠生而角當心俯厲其角潰心而竹㹠徐哀南方記曰竹㹠野生長一尺三寸在土穴中常食竹根味如鴨肉原山海經曰翠望之山亦作王翠山有獸􅃺如狸一目二尾名曰原音音奪衆聲言能作百種聲可以禦凶也天狗山海經曰隂山濁谷之水出焉有狩􅃺如狸或作狗白首名曰天狗可以禦凶獜音鄰山海經日依軲之山有狩焉狀如虎有􅀲甲名曰獜言體有鮮甲也食之不畏風䝣獀上音渠下音獀山海經曰䝣獀獸食猛獸鹿蜀山海經曰杻陽之山有獸􅃺如馬而白文頭如虎而長尾其音如謡如人歌其名曰鹿蜀佩之冝子孫山海經圖讃曰鹿蜀之獸馬質虎文驤首吟鳴矯矯騰群佩其皮毛子孫如雲􅀋山海經曰亶受之山有獸狀如狸而有髮其名曰􅀋自爲牝壯食者不妬猼訑上音摶下音他山海經曰基山有獸其狀如羊九尾四目其目在背名曰猼訑佩之不畏山海經圖讃曰猼訑以羊眼乃在背視之則竒推之無恠欲不恐懼厥皮可佩狸力山海經曰拒山有獸狀如豚有距其音如狗吠其名曰狸力見則其縣多土功土螻山海經曰崑崙之丘有獸焉其狀如羊而四角名曰土螻讙讙山海經曰翼望之山或作王翠有獸狀如狸一目而三尾名曰讙讙音歡或作原其音如百聲言其能作百種聲或日百物名也未祥是可以衘凶服之治癉黄癉病音旦也幽頞音遏山海經曰邊春之物有獸狀如禺而文背善􅀏見人則卧名曰幽頞或作妭也其鳴自呼也山海經圖讃曰幽頞似猴俾愚作智觸物則􅀏見人佯睡足訾山海經曰蔓聮之山有獸狀如禺而有鬛牛尾文臂馬蹄見人則􅀏名曰足訾其鳴自呼也那父山海經曰灌題之山有獸狀如牛而白尾音如叫如人叫喚名曰那父天馬山海經曰馬成之山有獸如白犬而黑頭見人則飛其名天馬其鳴自呼也音那或作能山海經曰甘􅀥之山有獸狀如數鼠而文題數鼠未詳名曰那食之治癭朏音普妹切山海經曰霍山有獸如狸白尾有鬛名朏畜之亡憂文山海經曰放皐之山有獸狀如蜂枝尾而反舌善呼名文開明山海經曰開明獸身􅀋虎而九首皆人面東郷立崑崙窮竒山海經曰封山有獸􅃺如牛而蝟毛名曰窮竒食人或云窮竒聞人闘乃􅂇不直者文王出獵所獲張揖注上林賦曰窮竒其音如狗噑食神異記曰西北有獸狀如虎有翼名窮竒褱上音謂下音懷山海經曰堯光之山有獸如人而彘尻冬蟄名褱音如斵木如人斫木聲見則其縣有役彘山海經曰浮玉之山有獸狀如虎而牛尾音如犬名曰􅇾羬羊山海經曰華山之首曰錢來之山有獸狀如羊而馬尾名曰羬羊其胎可以巳腊治體腊也􅅝山海經曰羭次之一山有獸狀如禺而長臂其名曰􅅝長古山海經曰長古之山有獸狀如禺而四耳名長古因其山名音如吟見則郡縣大水谿邊山海經曰天帝之山有獸狀如狗名谿邊或作遺席其皮者不蠱古縛切山海經曰皐􅂗之山有獸狀如鹿白尾馬足人手前兩脚似人手而四角名曰玃犰狳上音永下音余山海經曰餘我之山有獸􅃺如􅇠鳥喙鴟目虵尾見人則眼言陽死也其名曰犱徐其鳴自叫見則蟲蝗爲敗渾沌東方朔神異經曰崑崙西有獸其狀如犬有兩目而不見兩耳而不聞有腹而無五藏有膓直而不旋食而徑過人有德行而往抵􅠅音觸之人有凶惡而往依慿之天使其然名曰渾沌一名無耳一名無心所居無常咋尾囬轉向天而􅀏檮杌東方朔神異經曰西方荒中有獸焉狀如虎而身大虎毛長尺張華注曰言此獸毛皆如豪猪毛也人面虎足口有猪牙尾長一丈八尺名曰檮杌此獸食音羔東方朔神異經曰北方有獸焉其狀如師子食虎食人吹人則病口中吹人名曰􅁪近人村里入人居室中百姓患苦天帝徙之北方荒中也無損神異經曰南方有獸其狀如鹿豕頭有牙鹿尾善依人求五􅂖名曰無損其肉可作鮮使瀋吕審也肥美而鮮肉懷吞不入瀋盡更添肉使復以作鮮如􅀄愈乆而乃美名曰不盡鮮綢神異經曰西方深山有獸鳥面目手足毛色如猴體大如驢善縁髙木皆雌無雄名曰綢湏人三合而有子要路強牽男人將上絶冡之上取菓并􅀼五􅂖食更合三畢而定十月乃生齧䥫神異經曰南方有獸角足大小狀如水牛其毛黒如􅃮食鐵而飲水其糞可爲兵器其利如鋼名齧鐵飛駭獸洞􅁳記曰漢武帝時翕韓國献飛骸獸狀如鹿青色以寒青之􅁝爲繩繫之獸死帝愛而不埋掛之於苑門皮毛皆爛朽唯骨色猶青時人咸知其神更以繩繫其足閉於重觀後數月往􅀚唯見繩之所繫處頭尾皆背皆飛去有野人於草間得其斥脊皆能飛起取還以獻帝乃以野人所獻骨脊及頭尾之骨春爲粉以蝙蝠和爲丸以療百疾其丸夜視之有光服之體有光明破鏡漢書郊祀志曰古者天子常以春解祠黄帝用破鏡孟康曰獸名食父如黄要欲絶其􅀋使祠用之破鏡如貙而䖍眼也猯音湍淮南子曰猯知曲穴亦鳥獸之智狖􅀃文曰䑕狖屬善旋吴録地里志曰建安陽縣多狖似猿而露鼻􅀨則以尾反塞鼻孔郡内及臨海皆有之􅚦力水力爲二切異物志曰􅚦之屬捷勇於猨豽面及鼻徴倒向上尾端分爲兩條天􅀨便以挿鼻孔中水不入性畏人見人則顚倒投擲或墮地奔走無所廽避觸樹衝石或至破頭折脛俗人罵恃力人云癡如􅚦又張揖注上林賦曰飛􅚦飛䑕也其狀如􅇠而䑕首以其髯飛郭璞曰鼯䑕也毛紫赤色一名飛生麡狼上才􅀆切異物志曰麡狼􅃺似鹿而角前向入林挂角故􅁪在平淺草中肉肥脆香美逐入林則得之皮可作履襪角正西據南人因以作路牀兩頭獸盛􅀪之荆州記曰武陵郡西有陽山山有獸如鹿前後有頭常以一頭食一頭行山中有時見之者獑猢上音䜛下音胡蜀地志曰獑猢獸似猕猴爲獸竒捷常在樹上歘然騰躍百歩五十歩􅀂鳥黄要蜀地志曰黄要獸一名墠微一名䖍巳鼬身狐首生子長大自活羣逐其母令不得飲食將有所求而先見此獸則不得矣含利張衡西京賦曰呀含利呀呀化爲仙車鄭氏婚禮謁文讃曰含利爲獸廉而能謙禮義乃食口無譏兹白􅀶物志曰兹白􅀂白鳥踞牙食虎豹其狀如昔耳身􅀂虎豹尾長參其身食虎豹虎豹􅀶物志曰逢伯雲所􅀃有獸縁木緑文似豹名虎僕毛可爲筆聆䑕􅀶物志曰丹裏之山有獸焉狀如䑕名曰聆䑕以其尾飛也壄羊土移者切張揖注上林賦曰壄羊麢羊也似羊而青猛氏孟康注上林賦曰蝦蛤猛氏皆獸名郭璞曰今蜀中有獸狀如熊而小毛淺有光澤名猛氏蝦飛遽張揖注上林賦曰飛遽天上神獸鹿頭而龍身射干郭璞注子虚賦曰騰逺射干張揖注曰騰逺獸也射干似縁狐能木獌狿上音万下丑延切又音延郭璞注子虚賦曰獌狿大獸似狸長百㝷蒲勞
