body:
  text: 人事部七十一信謹慎信釋名曰信申也相申束使不相違也易中孚卦曰信及豚魚豚魚喻卜民也又乾文言曰君子忠信所以進德也韓詩外傳曰受命之主正其衣冠而立儼然人望而信之其次聞言而信次見其行而信旣聞其言旣見其行衆皆不信民之下也又曰孟子少時東家甞殺猪孟子問其母曰東家猪何爲其母曰欲啖汝母悔失言曰吾懷是子席不正不坐割不正不食胎敎之也今適有知而欺之是敎之不信乃買東家猪肉以食之明不欺也禮記儒行曰儒有不寳金玉而忠信以爲寳又曰忠信以爲甲胄左傳僖中曰晉侯圍原命三日之粮原不降命去之諜出曰原將降矣軍吏曰請待之公曰信國之寳也民之所庇也得原失信何以庇民所亡滋多退一舎而原降吕氏春秋云七日期原不下去之也明年復伐與土期必得而反原聞之乃下衛人曰文公信至矣乃歸之故曰改原得衛新序云温人聞之而降故曰伐原得温又僖下曰王子虎盟諸侯于王庭要言曰皆奬王室無相害也君子謂是盟也信公羊傳曰莊公㑹齊侯盟于柯莊公將㑹曹子進曰君之意何如莊公曰寡人之生則不􅀂死自傷與齊侯讎不能復也曹子曰然則君請當其君臣請當其臣莊公曰諾於是㑹莊公升壇曹子手劔而從之管子進曰君何求曹子曰城壞􅎹境齊數取魯邑以渝信君不圖歟君爲齊桓公也不當許侵魯地太甚願請汶陽之田管仲顧曰君許諾桓公曰諾曹子請盟巳曹子摽劔而去之要盟可犯而桓公不欺曹氏可讎而桓公不怨桓公之信著乎天下自柯之盟始也又僖公曰晉獻公死奚齊立里克謂荀息曰君殺正廢長而立㓜如之何願與子慮之荀息曰君甞訊臣問臣對曰使死者反生生者不愧乎其言則可請信矣里克知其不可與謀退殺奚齊荀息立卓子里克殺卓子荀息死之荀息可謂不食其言矣論語學而曰信近於義言可復也復覆也言語之信可反覆又顔淵曰子貢問政子曰足食足兵民信之矣子貢曰必不得巳而去於斯三者何先曰去兵曰必不得巳而去於斯二者何先曰去食自古皆有死民無信不立言民所特急者信也爾雅曰西至日入所爲太蒙太蒙之人信史記􅂫􅁗􅀃燕王曰尾生與女子期於梁下女子不來水至不去抱梁柱而死又曰楚莊王圍宋五月不解宋城中急無食華元乃夜私見楚將子反告莊王王問曰城中何如曰析骸而炊易子而食王曰誠哉是言我軍亦有三日粮以其信故遂罷兵去又曰季札之􅀄使北過徐君君好季札劔口弗敢言季札知之爲使上國未獻還至徐君巳死於是乃解其寳劔繫徐君􅃁樹而去從者曰徐君巳死尚誰與乎季子曰不然吾心巳許之豈以死背吾心漢書曰季布楚人以任俠爲名然諾聞楚人爲之諺曰得黄金百斤不如季布一諾東觀漢記曰郭伋在并州行部到美禝有童兒數百􅀐竹馬迎拜問使君何當還伋計日告之旣還先期一日乃止乎野亭湏期而入又曰任延除細陽令每至􅀊時伏臈輙休遣繫囚徒各使歸家並感其恩德應期而還有囚於家􅀍病自載詣獄旣至而死延率􅁺吏殯于門外百姓恱之范曄後漢書曰范式字巨卿山陽金郷人也少遊太學爲諸生與汝南張劭爲友劭字元伯二人並告歸郷里式謂劭曰後二年當還將過拜尊親見孺子焉乃共尅期後期方至元伯具以白母請設饌以俟之母曰二年之別千里結言尓何信之審也對曰巨卿信士必不乖違母曰􅀂然當爲尓醖酒至其日巨卿果到升堂拜母盡歡而別又曰髙湖及銅馬餘衆降光武封其渠帥爲列侯降者猶不自安光武知其意令各歸營勒兵乃自乗輕􅀐案行部陳降者相語曰蕭王推赤心置人腹中得不投死乎哉呉暦曰太史慈字子義於神亭戰敗爲孫䇿所執䇿素聞其名即解縳請見諮問進取之術慈曰州軍新破士卒離心欲出宣恩安集恐不合尊意䇿長跪荅曰誠夲心所望也明日日中望君來還諸將皆疑䇿曰太史子義青州名士以信義爲先終不欺䇿明日大㑹諸將豫設酒食立竿視影日中而慈果至晉陽秋曰陸抗羊祜推信礼之好抗甞遺祜酒祜飲之不疑抗有疾祜饋之藥抗亦推心服之唐書曰蕭至忠年少時與友人期於路隅㑹風雪凍冽諸人皆奔避就宇下至忠曰寧有與人期而求安失信乎獨不去衆咸歎服鬻子曰上下相親謂之和不永而得謂之信子思曰同言而信信在言前同令而化化在令外聖人在上民遷如化列子曰子華有寵於晉不仕而居三卿之右禾生子伯范氏之上客也出行坰外􅀫於田􅅱商丘開之舎中夜禾生子伯二人相與言子華之名􅀔能使存者亡亡者存冨者貧貧者冨啇丘開先窘於飢寒潜於牗聽之因之子華子華之門徒皆丗族也見啇丘開年老力弱面目犁黒狎侮欺紿無所不爲遂與啇丘開俱乗髙臺於衆中澷言曰有能自投下者賞百金衆皆競應啇丘開以爲信然遂并投之形􅀂飛鳥楊於地巳骨無傷因復指河曲之隈曰波中有寳珠泳可得也啇丘開復從而泳之水底潜行曰泳旣出果􅀗珠焉衆始同疑俄而范氏之藏失火子華曰􅀂能入火取錦者從所得多少賞焉啇丘開徃無難色入火徃還埃不漫身不燋范氏之徒乃其謝之曰吾不知子之有道而紿子吾不知子之有神而辱子敢問其道啇丘開曰吾亡道雖吾之心亦不知其所以然有一於此試與子言之􅇮子二客之􅀫吾舎也聞譽范氏子之􅀔能使存者亡亡者存冨者貧貧者冨吾誠之無二心故逺而來及來以子黨之言皆實也唯恐誠之不至行之不及不知形體之所措利害之所著也心一而巳物無迕者如斯巳矣今昉知子黨之紿我我内藏猜慮外矜觀聽追無昔日之不燋溺也坦然内􅀬愓然震悸矣水火豈復可近哉自此之後范氏門徒路遇乞兒馬醫弗敢辱也必下車而揖之宰我聞之以告仲尼仲尼曰汝不知乎夫至信也動天地感􅀑神撗六合而無逆豈但履危嶮入火水而已哉孫卿子曰君者治之源也源清則流長在上有信小民不待探籌投鈎莊子曰夫交邇則相靡以信交逺則忠之以言愼子曰折劵契属符節賢不肖用之劵契不爲人信人自用之韓子曰魏文侯與虞人期獵明日天疾風左右止文侯文侯曰不可以疾風故失信遂犯風而徃戰國䇿同又曰齊索讒鼎於魯以其僞徃齊曰使樂正子來將聽魯君謂樂正子樂正子曰君胡不以眞徃曰我愛之荅曰臣亦愛臣之信又曰呉起示其妻以組曰子爲我織組合如是組妻織組異善呉起曰非詔也使衣之而歸妻徃請之起曰家無虚言吕氏春秋曰呉起治西河欲諭其信於民乃置表於南門之外令於邑中曰有能僨此表者仕長大夫民相謂曰此必不信有一人曰試徃僨表還來謁之呉起見而仕大夫又復立表令於邑中如前邑人守門争表又曰晉文公伐原示信明年復伐之與士期必得原然後返原人聞之乃下衛人聞之以信爲至矣乃歸晉故曰攻原得衛者此之謂也始文公非不欲原也不信得之不􅀂勿得必誠以得之歸之者非獨衛也文公可謂知求矣又曰人主必信信之爲政大矣信立則虚言可以賞矣虚言可以賞則六合之内皆爲巳府天行不信不能成歳地安不信草木不大春風不信其華不盛夏暑不信其土不肥秋雨不信其􅂖不堅冬寒不信其地不閇天地之大四時之化而猶不能以不信成物也又况乎人事君不信則百姓誹謗社禝不寧處官不信則少不畏長貴賤相輕賞罰不信則民易犯法不可使令交友不信則離散鬱怨不能相親百工不信則器械苦僞丹􅃮不眞夫可與爲始可與爲終可與尊通可與卑窮者其唯信乎信而又信重襲於身乃通於天以此君人則膏雨甘露降寒暑四時當矣又曰齊桓公伐魯魯人不敢戰去魯國五十里而封之魯請比􅀜内侯以聽桓公許之曹劌謂莊公請從於是明日將盟莊公與劌皆懷劔至於壇上曰魯國去境數百今去境五十亦無生矣均其死也戮於君前管仲鮑叔進曹劌案劔當兩陛下間曰君將改圗母或進者荘公曰封於汶則可不則請死管仲曰以地衛君非以君衛地君其許之乃遂封汶南與之盟歸而欲勿予管仲曰不可人將刼君而不知不可謂智臨難而不能勿聽不可謂勇許之而不予不可謂信不智不勇不信有此三者不可以立功名子之雖亡地亦得信也以四百里之地見信於天下君猶得也莊公仇也曹劌賊也信於仇賊又况於非仇賊者乎夫九合而之合一匡而之聽乃從此生矣賈􅁩書曰禹與士民同務故不自言其信諭矣淮南子曰管子以小辱成大榮􅂫􅁗以百誕成一信又曰胡人彈骨胡人盟約置酒人頭骨中飲以相􅁩越人齧臂中國唼盟所由各異其於信一也􅀃苑曰魏太子謂經侯曰主信臣忠此魏國之寶也列女傳曰魯之母師者九子之寡母也臘日祀畢悉召諸子謂曰婦人之義非有大故不出夫家然吾父母家多㓜稚歳時禮不理吾從汝謁徃􅁥之謁請也􅁥視也諸子皆稽首唯諾又召請婦曰婦人有三從之義無專制之行少繋於父母長繫於夫老繋於子今諸子許我視私家願與少子俱以備婦人出入之制諸婦其愼房户之守吾夕而反於是使少子僕歸辦家事天隂還失早至閭外而止待夕而入魯大夫從臺上見而恠之召而問之曰母從北來至閭外而止良乆乃入吾不知其故是以召母也對曰妾不幸早失夫獨與九子處臘日從諸子謁歸視私家與諸婦孺子期夕而反妾恐其酺醵醉飽酺醵合聚飲酒也人情所有也妾反失早故止閭外盡期而入大夫美之言於穆公穆公賜母尊號曰母師使朝謁夫人夫人諸􅁎皆師之㑹稽典録曰卓恕字公行上虞人恕爲人篤信言不􅀫諾與人期約雖遭􅁀風疾雨雷電冰雪無不必至甞從建業還家辝太傅諸􅁑恪恪問何當復來恕對曰某日當復親覲至是日恪欲爲主人停不飲食以湏恕至時賔客㑹者皆以爲㑹稽建業相去千餘里道阻江湖風波難必豈得如期湏􅁷恕至一座盡驚諸􅁑亮別傳曰魏明帝自征蜀幸長安遣宣帝督張郃諸軍勁卒三十餘萬潜軍宻向劔閣亮有戰士十萬十二更下在者八萬時魏軍始陳番兵適交亮叅佐咸以敵衆強多非力所制冝權停下兵以并聲􅀔亮曰吾聞用武行師以大信爲夲得原失信古人所惜去者束裝以待期妻子鶴望以計日皆勑速遣於是去者感恱願留一戰住者憤勇咸思致命臨戰之日莫不抜刄爭先以一當十殺張郃却宣帝一戰大尅此之由也王符論曰夫十歩之間必有茂草十室之邑必有忠信謹愼易頥卦曰君子以愼言語節飲食尚書堯典曰愼徽五典五典克從毛詩蕩抑曰敬愼威儀惟民之則周禮地官大司徒曰以賢制爵則民愼德禮記中庸曰君子戒愼乎其所不睹恐懼乎其所不聞盖君子愼其獨也又儒行曰敬愼者仁之地也又太學曰敬愼者仁之地也又太學曰有國者不可以不愼辟則爲天下僇矣是故君子先愼乎德論語學而曰愼終追逺民德歸厚矣又爲政曰多聞闕疑愼言其餘則寡尤多見闕殆愼行其餘則寡悔尤過又述而曰子之所愼齋戰疾又公冶長曰季文子三思而後行孝經曰在上不驕髙而不危制節謹度滿而不溢髙而不危所以長守貴也滿而不溢所以長守冨也家語曰孔子入后稷廟左前有金人焉三緘其口而銘其背曰我古之愼言人也戒之哉無多言多言多敗無多事多事多患安樂必戒無所行悔漢書曰成帝爲太子寛􅀶謹愼上甞急召太子出龍樓門不敢絶馳道西至直城門得絶乃度又曰石建爲太僕奏事事下建續之驚恐曰書馬者與尾而五服䖍曰作馬字典者五建上事誤作四今乃四不足一􅀗譴死矣第慶爲太僕御出上問車中幾馬慶以䇿數馬畢舉手曰六馬又曰金日磾自在左右目不忤視者數十年賜出宫女不敢近上欲内其女後宫不肯應其篤愼如此又曰霍光入禁闥小心謹愼未嘗有過又曰張安丗職典樞機以謹愼周宻自著又曰孔光性周宻謹愼時有所言輙削藁沐日歸休兄弟妻子燕語終不及朝廷政事或問光温室省中樹皆何木也光嘿不應更荅以他語其不泄如此東觀漢記曰陳寵字昭公沛人爲尚書寵性周宻重愼時所表薦輙自手書人莫得知常言人臣之義􅀂不畏愼自在樞機謝遣門人不復教授絶知友之路又曰樊楚字文髙爲尚書郎毎當直事常晨駐馬待漏雖在閑署冠劔不解於身毎齊祠恐失時乃張燈俯伏又曰隂識爲執金吾居位數十年與賔客語不及國家其重愼如此又曰蔡倫字敬仲爲中常侍有才學盡忠重愼毎至休下輙閉門絶賔客曝體田野又曰樊宏字靡卿拜光禄大夫位特進宏爲人謙愼毎當朝㑹先到俯伏待事時至乃起上聞之勑騶臨朝乃告勿令豫到又曰杜安字伯夷貴戚慕其名或遺其書安不發悉壁藏之後捕貴戚賔客安聞壁出書而封如故由是不罹其患又曰張純字伯仁爲虎賁中郎將純素重愼周宻時上封事輙削去草後漢書曰馬援在交趾還書誡兄子曰龐伯髙敦厚周宻吾愛之重之願尓曹効之又曰馬光字叔山爲衛尉卿上以光周宻謹愼特親異之又曰皇甫嵩爲人愛愼勤書前後上表陳諌有􅀘益者五百餘事皆手書毀草不宣於外呉志曰闞澤字德潤山隂人也性謙恭篤愼人有非短口未甞及容貌似不足者王隱􅀳書曰李康嘗荅司馬文王問因以爲家誡曰昔侍於先帝時有三長史俱見臨辭出上曰爲官長當愼當勤當清脩此三者何患不治乎上問臣曰必不得巳於斯三者何先吾對曰愼乃爲先夫清者不必愼愼必自淸上曰卿言得之矣晉書曰羊祜多所進逹而人不知所由或謂祜愼宻太過者枯曰是何言歟夫入則造􅂰出則詭辭君臣不宻之誡吾惟懼其不及不能舉賢取異豈得不愧知人之難哉且拜爵公朝謝恩私門吾所不取晉起居注曰太康四年制曰選曹銓管人才冝得恪謹寡欲栁華崇夲尚書朱整周愼敬讓以自居是其人也後魏書曰􅁃岳代人也置相州即拜岳爲刺史公廉平當百姓稱之鄴舊有園池時菓􅀄熟丞吏送之岳不受曰菓未進御吾何得先食其謹愼如此北齊書曰封隆之字祖􅒨渤海脩人也性寛和有度量義旗始建首叅經略竒謀妙䇿宻以啓聞上書削藁罕聞於外髙祖嘉其忠謹毎多從之隋書曰髙頴字昭􅀇渤海蓨人也少明敏尤善詞令所出竒䇿宻謀及損益時政皆丗無知者又曰李德林字公輔􅀶陵平安人也從入官巳後典機務甚宻慎常云古不言温樹何足稱也唐書曰温彦􅀶自掌知機務即杜絶賔客國之利害知無不言太宗嘉之及薨謂侍臣曰彦􅀶以憂國之故勞精竭神我見其不逮巳二年矣恨不縱其閑逸致夭生靈又曰陸元方在官清謹再爲宰相則天將有遷除每先以訪之必宻封以進未甞露其私恩臨終取前後草奏悉命焚之且曰吾隂德於人多矣其後庶幾福不衰矣又有書一匣常自緘封家人莫有見者及卒視之乃前後勑書其愼宻如此又曰楊再思在位累載屈節希旨無所規弼然愼畏末嘗忤物或謂再思曰公名髙位重何爲屈折如此再思曰丗路艱難直者受禍苟不如此何以全其身哉又曰髙郢性恭愼廉㓗罕與人交游守官奉法勤恪掌誥累年家無制草或謂曰前軰皆留制集公焚之何也曰王言不可存私家時人重其愼宻太公金匱曰黃帝曰予之居上揺揺恐夕不至朝尸子曰言美則響美言惡則響惡身長則影長身短則影短名者響也行者影也是故愼而言將有和之愼而行將有隨之淮南子曰君子之居民上也􅀂以腐索御馬恐失民意􅀂履薄冰蛟在其下又曰􅀂行獨梁不爲无人不兢其容殷康明愼曰犇車之上無仲尼覆舟之下無伯夷益言愼也魏任嘏別傳曰嘏字紹先樂安􅀶昌人也文帝時爲黃門侍郎毎納忠言輙手書壞夲自在禁省歸書不封帝嘉其淑愼太平御覽卷第四百三十
