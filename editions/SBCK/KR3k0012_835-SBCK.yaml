front:
  text: 太平御覽卷第八百三十五資産部十五
  hash: sha256:302c51648a069aa4dadbdd57840f85d16be6c0179e7bd2c9128bf475d2d6e41f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_835-1a}
body:
  text: 錢上周禮天官下曰外府掌􅀖布之入出以共百物而待􅀖之用凡有法者布泉也布讀爲宣布之布其藏日泉其行曰布取名於水泉其流行無不偏泉始蓋一品周景王鑄大泉而有二品後數變易不復識夲制至漢唯有五銖乆行王莽改貨而易作泉布多至十品今存於民間多者有貨布大泉貨泉貨布長二寸五分廣寸首長八分有竒廣八分其圜好徑二分半足枝長八分其右文曰貨左文曰布重二十五銖直貨泉二十五大泉徑一寸二分重十二銖文曰大泉直十五貨泉貨泉徑一寸重五銖右文曰貨左文曰泉直一也國語曰周景王二十一年將鑄大錢景王周靈王之子錢者金幣之名所以質買物通財用也古曰泉後轉曰錢大錢大於舊其價重也單穆公曰不可穆公王卿士單靖公曽孫古者天災降戾於是乎量資幣權輕重以振救民量度資財也權稱振拯也民患輕則爲之作重幣以行之民患幣輕而物貴則作重幣以行其輕也於是乎有母權子而行民皆得焉重曰母輕曰子以子貨物物輕則子獨行物重則以母權而行之也子母相通民皆得其欲也􅀂不堪重則多作輕而行之亦不發重於是乎有子權母而行小大利之堪任也不任者幣重物輕則妨其用也故雜而用之子權母者母不足則以于平而行之故民皆以爲利今王廢輕而作重民失其資能無匱乎廢䡖而作重則大竭而未寡故民失其資􅀂匱王用將有所乏民財匱無以供上故王用將乏乏則將厚取於民民不給將有逺志是離民也給供也逺志通逃也若民離而財匱災至而備亡王其若之何病亡無救災之備也王其圖之王弗聽卒鑄大錢歸藏曰有人將來遺我錢財曰夜望之周書曰武王剋商發鹿䑓之錢散鉅橋之粟韓詩曰旣詐我德賈用不售一錢之物舉賣百何時當售乎史記曰􅀄􅂫􅁗之燕貸百錢爲資及得資以百金償之又曰髙祖以愛繇咸陽吏皆送奉錢三李竒注或三百或五百蕭何獨以五後益封二千戸又曰單父人吕公善沛令避仇從之沛中豪傑吏聞令有客皆徃賀蕭何爲主吏主進令諸大夫曰不滿千錢坐堂下髙祖爲亭長素易諸吏乃給爲謁曰賀錢萬實不持一錢又曰上使善相者相鄧通曰當貧餓死文帝曰能富通者在我何謂貧於是賜通蜀嚴道銅山自鑄錢鄧氏錢布天下又曰安息在大月氏西以銀爲錢錢如其王靣王死轉更錢效王靣焉又曰今上即位武帝數歳漢興七十餘年之間國家無事京師之錢累百巨萬貫朽而不可校自孝文造四銖錢至是歳三十餘年從建元以來用少縣官徃多即銅山鑄錢民益盗鑄不可勝數錢益少而貴漢書曰􅁗兼天下幣爲三等黄金以鎰爲名孟子曰二十兩爲鎰臣瓉按􅁗以一鎰爲一金漢以一斤爲一金上幣銅錢漢興以爲􅁗錢重難用更令民鑄莢錢如淳曰如榆莢又曰凡貨金錢布泉之用夏殷以前其詳靡記太公爲周立九府貟法李竒曰貟即錢黄金故貨而方寸重一斤錢圎函方輕重以銖布泉廣二尺二寸爲幅長四丈爲疋故貨寳於金利於刀流於泉布於門行如流泉布於民間束於帛束又曰孝惠帝時天下􅀄定呉有䂊章銅山即招致天下亡命者盗鑄錢又曰髙后二年秋七月行八銖錢又曰文帝五年除盗鑄錢令應劭曰聽放鑄更造四銖應劭日文帝以五分錢泰䡖小更作四銖錢文亦曰半兩錢今民閒半兩錢最䡖小又曰建元元年春行三銖錢五年春罷三銖錢行半兩錢又曰成帝時郡國鑄錢民多姦錢多輕而公卿請令京師鑄官赤仄如淳曰銅爲其郭也今錢見有赤仄者不知作法云何是又曰宣帝二年春岀水衡錢應劭曰水衡與折府皆天子私錢耳縣當仰給司農今丗水衡錢言宣帝即位爲異政又曰自孝武元狩五年三官􅀄鑄五銖錢至平帝元始中成二百八十億萬餘又曰韓信爲楚王都下邳信至國召下郷亭長賜錢百曰公小人爲徳不竟又曰東方朔曰侏儒長三尺餘奉一囊粟錢二百四十臣朔長九赤餘亦一囊粟錢二百四十侏儒飽欲死臣朔飢欲死又曰張安丗以父子封侯在位太盛廼避不受禄詔都内別藏張氏無名錢以百萬數文預曰都内主藏官也張晏曰安丗以還官官不薄又曰貢禹上書曰臣禹年老家貧不滿萬錢又曰王嘉奏事云孝元皇帝奉承大業温恭少欲都内錢三十萬水衡錢二十五萬少府錢十八萬内錢上林後宫貴人從上林獸圏猛獸驚出馮貴人當之文帝嘉其義賜錢五萬掖庭見親加賜親属其人勿衆謝重失人心賞賜節約是時外戚資千萬者少是故少府水衡錢多又曰王莽居攝欲防民盗鑄乃禁不得挾銅炭又曰􅄢賔國以銀爲錢􅀐馬漫爲人靣楚漢春秋曰項梁隂養生士九十人叅木者所與計謀者也木佯疾於室中鑄大錢以具甲兵後漢書曰明帝時館陶公主光武女爲子求郎不許而賜錢千萬謂羣臣曰郎官上應列􅀫岀宰百星史記曰太微宫後二十五星郎位也有非其人則民受其殃是以難之又曰樊鯈卒帝遣小黄門張音問所遺言先是河南縣亡失官錢典􅀒者典謂主典􅀒謂欠􅀒坐死及罪徙者甚衆遂委責於人以償其耗郷部吏司因此爲姧鯈常疾之欲奏罷之疾病未及得上音歸具以聞帝覽之而悲歎勑郡並從之又曰京兆尹閻興召第五倫爲主簿時長安鑄錢多姦巧乃署倫爲督鑄錢􅁺領長安市東觀漢記曰時長安市未有祑又鑄錢官䡖姦所集無能整齊理之者興署倫督鑄錢掾領長安市其後小人爭頌皆云第五􅁺所平亦無姦枉又曰􅀄馬援在隴西上書言冝如舊鑄五銖錢事三府三府奏以爲未可事遂寢及援還從公府求得前奏難十餘條乃隨牒解釋東觀漢記曰十三難援一一觧之條奏其􅃺也更具表言帝從之天下頼其便又曰公孫􅄒廢銅錢用鐡官錢置鐵以鐵錢百姓貨幣不行蜀中童謡言黄牛白腹五銖當復好事者􅀼言王莽稱黃􅄒自號白五銖錢漢貨也言天下當并還劉氏又曰江革建武末年與母歸郷里毎至歳時縣當案比安驗以比之猶今㒵閱也革以母老不欲揺動自在轅中輓車不用牛馬由是郷里稱之曰江巨孝臨淄令楊音髙之設特席顯異巨孝於稠人廣衆中親奉錢以助供養又曰楊秉免歸雅素清儉家至貧窶并曰而食任城故孝廉景虜齎錢百餘萬以餉秉秉􅐬門拒絶不受又曰鍾離意薦劉平王望等書奏有詔徴平等特賜辨裝錢至皆拜議􅀰又曰崔寔從兄烈有重名於北州歷位郡守九卿靈帝時開鴻都門牓賣官爵公卿州郡下至黄綬各有差其冨者則先入錢貧者到官而後悟輸是時叚熲樊陵張温等雖有功勤名譽然皆先輸貨財而後登公位烈時因傳母入錢五百萬得爲司徒及拜日天子臨軒百僚畢㑹帝頋謂親倖者曰悔不小靳可至千萬靳固惜之也程夫人於傍應曰崔公冀州名士豈買官頼我得是反不知姝邪姝美也言反不可斯事之美也姝或作株株根本也又曰董卓壞五銖錢更鑄小錢悉取洛陽及長安銅人鍾虞飛廉銅馬之属以充鑄焉故貨錢物貴榖不數萬又錢無輪郭文章不便人用魏志曰卓鑄小錢大五分無文章肉好無輪郭不磨鑢也時人以爲􅁗始皇見長人於臨洮乃鑄銅人卓臨洮人也而今毁之雖成毁不同凶􅁀相􅀋焉又曰車駕西廵乃厚賜韋彪錢珍羞食物使歸平陵上家又曰鄭弘爲陽羡令都郷部民有弟用兄錢者爲嫂所責叔未還嫂詣弘言之弘賣中單爲叔還錢兄慙自繫婦即去又王符論曰夫竊位之人天奪其鑒寧見朽千萬而不忍賜人一錢續漢書曰劉寵宇祖榮遷㑹稽太守正身率下郡中大治徴入爲將作大匠山隂民去治數拾里有􅀂郍水在山谷間五六老翁年七八十聞遷相率共送寵人齎百錢寵見勞來曰父老何乃自苦逺來皆對曰山父鄙老生未甞到郡縣他時吏發求不巳民間或夜行不絶狗吠竟夕人不得安自明府下車以來狗不吠夜吏希至人間年老遭值聖化聞當見弃去故戮力來送寵謝之爲選受壹大錢故寵在㑹稽號爲取一錢其清如是又曰扶風人事孫奮居冨而慳恡梁冀因以馬乗遺之從賃錢二十萬􅁬以錢十萬與之冀大怒又曰靈帝中平二年二月巳酉南宫靈䑓災庚戌樂中城殿門災延及北闕燒嘉德和歡殿收天下田畒十錢以治宫加調刺史二千石遷除皆責治宫錢大郡至二千萬帝本侯家居貧即帝曰桓帝不能作家曽無私錢財故於西園造萬金堂以爲私藏復􅀉小黄門常侍家私錢至數千萬東觀漢記曰光禄勲杜林與馬援郷里親厚援南方還時林馬適死援遣子持一疋馬遺林曰朋友有車馬之饋可以備之居數日林遣子奉書曰將軍内施九族外有賔客望恩者多林父子食卿禄禄常有盈今奉錢五萬援謂兒曰當以此爲法杜伯山所以勝我者也又曰趙勤字益卿劉賜姊子勤童㓜有志操徃來賜家國租適到時勤在旁賜指錢示勤曰拜乞汝三十萬勤曰拜而得錢非義所取終不肯拜又曰鄭均字仲虞兄仲爲縣吏受禮遺均數諌止不聽即脫身岀作嵗餘得數萬錢歸以與兄曰錢盡可復得爲吏坐􅂍終身損弃兄感其言遂廉㓗稱清吏又曰王阜爲益州太守大將軍竇憲貴盛甞移書益州取六百萬阜疑有姧詐以狀上憲追奴騶帳下吏李文迎錢阜以詔書末報距不與丈積二十餘日詔書報給文以錢市馬獻帝春秋曰靈帝作錢猶五銖而有四道連於邊輪識者以爲妖􅀼言錢有四道京師將破壞此錢四出散於四方乎還如其言范曄後漢書云四出錢應劭漢官曰王莽篡位以劉字金刀罷五銖更作小錢丈曰貨泉其文反白水眞人此則丗祖中興之瑞也魏書曰劉虞在幽州清浄儉約以禮義化民靈帝時南宫災吏遷􅀘州郡者皆責助治宫錢或一千萬或三千萬冨者以私財辨或發民錢備之貧而清慎者無以充調或至自殺靈帝以虞清貧特不使出錢也又曰劉􅀋爲弘農太守使人掘地求錢所在市里皆有孔穴又曰文帝夢磨錢文欲令滅而更明周宣占之曰陛下家事時帝欲治第植逼太后加貶守呉書曰嘉禾五年春鑄大錢一當五百詔使吏民輸銅討銅卑直設盗鑄之科蜀志曰先主攻劉璋與士衆約􅀂事定府庫百物孤無䂊焉及援成都士衆捨干弋赴庫藏競取寳物軍用不足備甚憂之劉巴曰易耳但當鑄直百錢平諸物價令吏爲官市備從之數月之間府庫充實晉陽秋曰朝士以牛酒勞齊王冏平原王幹獨齎百錢晉書曰阮宣子常杖頭挂百錢造市店酣飲而歸又曰王衍疾其妻郭氏之貪鄙故口末甞言錢郭氏欲試之令婢以錢繞牀使不得行衍晨起見錢謂婢曰舉阿堵物却其措意如此又曰王導子恱少侍講東宫歴呉王友中書侍郎導夢人以百萬錢買恱意甚惡之後掘地得錢二皆藏閇而恱果以疾終又曰張䡄爲凉州叅軍索輔言於䡄曰古以金貝皮幣爲貨息榖帛量度之耗二漢制五銖錢通易不滯太始中河西荒廢遂不用錢裂疋以爲叚數縑布旣壞市易又難徒壞女工不任衣用弊之甚也今中州雖亂此方安全冝優五銖以濟通變之㑹䡄納之立制准布用錢錢遂大行人頼其利南史曰宋文􅀽皇后家夲貧薄后毎就上求錢帛以贍之上性儉所得不過錢三五萬帛三五十疋後潘淑妃有寵愛傾後宫咸言所求無不得后聞之未知信否乃因潘求三十萬錢與家以觀上意􅀫昔便得因此恚恨成疾不復見上宋書曰劉秀之爲南􅁗州刺史加都督漢饑饉秀之躬自儉約先是漢川悉以絹爲貨秀之限令用錢百姓利之又曰始興王濬甞送錢三萬餉􅀽淑一􅀫復遣追取謂爲使人謬誤欲以戯淑淑與濬書曰聞之前志七年之中一與一奪義士猶或非之况宻迩旬次何其裒益之亟也􅀼恐二三諸侯何以觀之又曰廢帝即位鑄二銖錢形式轉細官錢毎岀人間即摸效之而大小厚薄皆不及也無郭不磨鑄如今之剪鑿者謂之耒子錢景和元年沈慶之啓通私鑄錢一千錢長不盈三寸大小稱此謂之鵝眼錢劣於此者謂之綖環錢貫之以縷入水不沉隨手破碎市井不復料數十萬錢盈一掬斗米一萬啇貨不行明帝􅀄唯禁鵝眼綖環其餘皆通用又曰張融解􅄄爲新安王子鸞行叅軍王母殷淑儀薨後四月八日建齋并權佛僚佐襯者多至一萬少者不减五千融獨注襯百錢帝不恱曰融貧當序以佳禄出爲封溪令又曰郭丗通甞與人共於山隂市貨物誤得一千錢當時不覺分背方悞追還夲主驚歎以半直與之丗通委之而去又曰蔡廓罷䂊章郡還起二宅先成東宅以與兄䡄之廓亡後䡄之罷長沙郡還送錢五十萬以禆宅直廓子興宗年十一白母曰一家由來豐儉必共今日宅直不冝受也母恱而從焉䡄之深有愧色謂其子談曰我年六十行事不及十嵗小兒又曰劉凝之隱居荆州年饑衡陽王義季慮凝之餒斃餉錢十萬凝之大喜將錢至市門觀有飢色者悉分與之俄頃而盡又曰山隂人孔祐至行通神隱於四明山甞見山谷中有數百斛錢視之如瓦石不異又曰戴法興父碩子法與二兄延壽延興並脩立延壽善書延興好學山隂有陳戴者家冨有錢三千萬郷人或云戴碩子兒敵陳戴三千萬錢齊書曰曹武爲右衛將軍晚節在雍州致見錢七千萬皆厚輪大郭又曰丘冠先使于蠕蠕執節不拜爲所殺武帝以冠先不辱命賜其子雄錢一萬布三十疋雄不受又曰范述曽任永嘉太守勵志清白不受饋遺明帝下詔襃美徴爲游擊將軍郡故舊送錢二十餘萬一無所受又曰趙僧巖栖遟山谷常以一壷自隨一旦謂弟子曰吾今夕當死壷中大錢一千以通九泉之路蠟燭一挺以照七尺之尸至夜而亡梁書曰頋恊爲舎人常有門生始來事恊知其廉㓗不敢厚餉止送錢二千恊發怒杖二十因此事者絶於饋遺又曰􅁃丹父景休位御史中丞丹少有才雋與㐲挺何子明俱爲周捨所狎􅀄景休罷巴東郡頗有資産丹􅀒錢數百萬責者塡門景休怒不爲之償旣而朝賢之丹不之景休景休恱乃悉爲還之梁書曰宋季雅罷南康郡市宅居吕僧珍宅側僧珍問宅價曰千一百萬怪其貴季雅曰一百萬買宅千萬買隣及僧珍生子季雅徃賀署函曰錢一千閽人少之不爲通強之乃進僧珍疑其故親自發乃金錢又曰江禄爲武寧郡頗有資産積錢於壁壁爲之倒迮銅物皆鳴人戲之曰所謂銅山西傾洛鍾東應者也又曰何逺爲武昌太守武昌俗皆汲江水盛夏逺患水温毎以錢買人井寒水不受錢者則摙水還之其他事率多如此南史曰蕭惠明子素梁天􅁥中位丹陽尹丞􅀄拜日武帝賜錢八萬素一朝散之親友又曰謝譓爲東陽内史及還五官送錢一萬止留一百荅書曰數多留少更以爲愧又曰梁謝舉兄子僑素貴甞一朝無食其子啓欲以班史質錢荅曰寧餓死豈可以此充食乎太平御覽卷第八百三十五
