body:
  text: 時序部十六五月五日伏七月七日五月五日大戴禮曰五月五日蓄蘭爲沭謝承後漢書曰陳臨爲蒼梧太守推誠而理導人以孝悌臨徴去後夲郡以五月五日祠臨東城門上令小童㓗服舞之又禮儀志曰五月五日朱索五色桃印爲門户飾以止惡氣也沈約宋書曰元徽五年五月五日皇太后賜帝玉柄毛扇帝嫌其毛柄不華因此欲加酖害宋略曰王鎮惡以五月五日生家人欲弃之其祖猛曰昔孟甞君以此日生卒得相齊此兒必興吾宗以鎭􅁖爲名唐書曰崔信明以五月五日正中時生有異雀數頭身形甚小五色皆備集于庭樹鼓翼齊鳴其聲清亮隋太史良使至青州遇而占之曰五月爲火火爲離離爲文采日正中文之盛也又有雀五色􅁬翼而鳴此兒必文藻煥爛聲名播於天下雀形旣小禄位殆不髙矣及長􅀶聞強記下筆成章郷人髙孝基有知人鑒毎謂人曰崔信明才學富贍雖名冠一時但恨其位不逹耳孝子傳曰紀邁五月五日生其母弃之村人紀淳妻養之年六歳夲父母云汝是我兒邁涕泣傭所得輒上母續齊諧記曰屈原五月五日投汨羅而死楚人哀之毎至此日竹筒貯米投水祭之漢建武年長沙歐回見人自稱三閭大夫謂回曰甞見􅀕甚善但常年所患蛟龍所竊今􅀂有惠可以練樹葉塞其上以五綵絲約之此二物蛟龍所憚也回依言後乃復見感之今人五日作糭子帶五色絲及練葉皆是汨羅之遺風也西京雜記曰王鳯以五月五日生其父欲不舉其叔曰昔田嬰勑其母勿舉田文文後爲孟嘗君以古事推之非不祥遂舉之鄴中記曰并州俗以介子推五月五日燒死世人爲其忌故不舉食飼非也北方五月五日自作飲食飼神及作五色縷五色辛盤相問遺不爲介子推也荆楚歳時記曰五月五日西人並蹋百草今人又有闘百草之戯又曰五月五日競渡俗爲屈原投汨羅日傷其死所並命舟檝以拯之舸舟取其輕利謂之飛鳬一自以爲水軍一自以爲水馬州將及土人悉臨水而觀之又曰是月俗忌盖屋及曝薦席風俗通云五月盖屋令人頭秃又異苑云新野庚寔家甞以五月􅁀席忽有一小兒於席下俄失所在其後寔女子遂亡相傳弥以忌爲此條通五月之事今附於此又曰五月五日荆楚人並蹋百草將艾以爲人懸門户上以攘毒氣故師曠占曰歳病則艾草先生也風土記曰仲夏端五端􅀄也俗重五日與夏至同先節一日又以菰葉褁粘米以粟􅀥􅁅汁煑令熟節日啖煑肥􅀛令極熟去骨加鹽豉蓼名曰􅉁􅀛黏米一名糭一曰角􅁰盖取隂陽尚包褁未之象也􅀛表肉裏陽内隂外之形所以賛時也抱朴子曰或問辟五兵之道荅以五月五日作赤靈符着心前又曰蟾蜍萬歳者頭上有角頷下丹書八字再重五月五日中時取之隂乾百日以其足􅀞地即爲流水風俗通曰五月五日以五彩絲繫臂者辟兵及􅀑令人不病温又曰亦因屈原一名長命縷一名續命縷一名辟兵繒一名五色絲一名朱索又有條逹等織組雜物以相贈遺孝經援神契云仲夏始出婦人染練或有作務玉燭寳典云此節備擬甚多其尚矣又曰日月星辰鳥獸之狀文繡金縷帖􅀞貢獻所尊古詩云繞臂􅀟條逹是也又曰五月五日集五色繒辟兵余問服君服君曰青赤白黒以爲四方黄爲中央襞方綴於􅅐前以示婦人蠶功也織麥􆁔懸於門以示農工成傳聲以襞爲辟兵耳音清麥莖也養生要集曰木味苦小温生漢中南鄭山谷五月五日採之琴操曰介子綏國語曰介子推割腓股以啖重耳重耳復國子綏獨無所得綏甚怨恨乃作龍虵之歌以感之終不肯出文公令燔山求之子綏遂抱木而燒死文公令民五月五日不得發火玉燭寳典曰五月五日採艾懸於户上以攘毒氣按荆楚歳時記云宗則字文度常以五月五日未鷄時採艾見似人處􅄃而取之用灸有驗是日競渡採雜藥夏小正曰此月蓄藥以蠲除毒氣也異苑曰五月五日剪鴝鵒舌以能學人語又曰田文母嬖五月五日生文父勑令勿舉之後母私舉文長成童以實告之文遂啓父曰不舉五月予何父云生及户損父文曰壽命於天豈壽命於户若壽命於户何不髙其户誰能至其户耶父知賢爲嗣齊封爲孟常君世􅀃曰胡廣夲姓黄五月五日生父母惡之置瓮中投於江胡翁聞瓮中有兒啼往取之養爲子遂七登三司㑹稽典録曰女子曹娥者㑹稽上虞人父能絃歌爲巫漢安二年五月五日於縣江泝濤迎波沉溺死不得尸娥年十四㳂江號哭晝夜不絶聲七日遂投江而死習鑿齒與禇常侍書曰想往日與足下及江州五月五日共澡浴戯處追㝷􅀫眷髣髴王儀心實悲矣國史􅀘曰􅀭州舊貢江心鏡五月五日楊子江中所鑄也或言中有百錬者六七十錬則已易破難成往往有自鳴者酈元注水經曰如深水有異魚按正光元年五月五日天氣清爽聞池中鎗鎗􅀂鉦鼓聲池水驚而沸湏􅁷雷電晦􅁳有五色虵自池上屬於天乆之乃滅波上水定唯見一魚在其一變爲龍伏日暦忌釋曰伏者何也金氣伏藏之日也四時代謝皆以相生立春木代水水生木立夏火代木木生火立冬水代金金生水至於立秋以金代火金畏火故至庚日必伏庚者金也隂陽書日候夏至後第三庚爲􅀄伏第四庚爲中伏立秋後􅀄庚爲後伏謂之三伏曹植謂之三詢也史記曰張子房始見下邳圯上老父與一編書曰讀是爲王者師後十三年濟北殿􅂖城山下黄石即我也良後從髙帝過濟北果見􅂖城下黄石良取寳而祠之留侯死并黄石葬之毎上塚伏臘祠黄石又曰秦穆公始爲伏祠漢書曰東方朔爲郎伏日詔賜諸郎􅁏朔獨拔劒割􅁏謂其同官曰當早歸請受賜即懷􅁏而去上問朔曰賜􅁏不待詔而去何也上令自責朔曰受賜不待詔何無禮也拔劒割􅁏一何壯也割之不多又何廉也歸遺細君又何仁也上􅀏曰令生自責而反自譽復賜酒一巵􅁏百斤遺細君又曰楊煇報孫㑹宗書曰田家作苦歳時伏臘烹羊炰羔斗酒自勞去聲漢官儀曰伏日萬􅀑所行故謹漢魏日有食之㑹故漢書楊煇閑居曰養羊沽酪供伏臘之費典略曰大駕都許使光禄大夫劉松北鎮􅀽紹軍與紹子弟日共宴飲常以三伏之際晝夜酣飲極醉至於無知云以避一時之暑故河朔有避暑飲王翽鄴中記曰石季龍於氷井臺藏冰三伏之月以冰賜大臣荆楚歳時記曰六月伏日並作湯餅名爲辟惡宋玊􅀇謨壽陽記曰明義井三伏之日炎暑赫曦男女行來其氣短急望見義井則喜不可言未至而憂旣至而樂號爲歡樂井世􅀃曰郗嘉賔三伏之日詣謝公炎暑熏赫復當風交扇猶沾汗流離謝著故絹衣食熱白粥晏然無異郗謂謝公曰非君幾不堪此崔寔四民月令曰􅀄伏薦麥􅀲於祖禰也風俗通曰漢中巴蜀自擇伏日俗􅀃漢中巴蜀廣漢土地温暑草木蚤生晚枯氣異中國夷狄畜之故令自擇伏日也謹案漢書髙帝分四都之衆用良平之䇿還定三秦席卷天下盖君子所因者夲也論㓛定封加以金帛重復寵異令自擇伏日不同於風俗也書儀曰六月三日伏日昔賈􅁩在湘南六月三庚日有􅨱鳥來時以南方毒惡以助太陽銷爍萬物故損人因避之稽含因熱賦序曰三伏之節始奏啇秋之辰未期余下俚貧生居室卑陋狹巷不來清風短廡不足増䕃歎彼夏屋之士體逸髙廊並天而寒暑殊同世而憂樂異矣程曉詩曰平生三伏時道路無行車閉門避暑卧出入不相過今世能襶子觸熱到人家主人聞客來嚬蹙柰此何摇扇臂中疼流汗正滂沲傳戒諸髙明熱行冝見呵晉潘岳懷縣詩曰南陸迎脩景朱明送末垂􅀄伏啓新節隆暑亦赫曦七月七日漢武帝故事曰景帝嘗夢髙祖謂巳曰王美人生子可名爲􅇾以乙酉年七月七日旦生武帝於猗蘭殿謹按同􅄀記漢武帝未生之時景帝夢一赤彘從雲中直下崇芳閤帝覺而坐於閣果見赤氣從雲中直下如林木蔽户牖望閣上有丹霞蓊欝旣而乃改崇芳閣爲猗蘭殿後王夫人生武帝也又曰七月七日上於承華殿齋其日忽有鳥從西方來集殿前上問東方朔朔曰此西王母欲來也有頃王母至有二青鳥如烏夾侍王母旁之又曰王母遣謂帝曰七月七日我當暫來帝至日掃宫内燃九華之燈又曰漢武帝内傳曰帝登㝷眞之臺齊至七月七日夜忽見天西南如白雲起鬱鬱直來趨宫有頃西王母至乗紫雲之輦又曰七月七日乃掃除宫掖之内張雲錦之帷燃九光微燈夜二唱後西王母駕九色之班龍上殿又曰七月七日西王母降武帝戴太真晨纓之冠履􅀇瓊鳯文之舄宋卜子楊園苑䟽曰太液池西有武帝曝衣閤常至七月七日宫女出后登樓襮衣晉書曰魏武帝辟髙祖以漢祚將終不欲屈節於曹氏辭以風痺不能起居魏武遣親信令史微服於髙祖門下樹䕃下息時七月七日髙祖方曝書令史􅀼知還具以告乃重遣辟之勑行者曰􅀂復不動便可収之髙祖懼而應命後魏書曰太祖道武皇帝韓珪七月七日生於叅合陂又曰任城王澄爲雍州功縗在身故以七月七日集文武馬射張普惠字洪賑爲録事參軍奏記請停列仙傳曰陶安公者六安鑄治師也一朝火散上紫色衝天安公伏治下求哀須􅁷朱雀止治上曰安公治與天通七月七日迎汝以赤龍至日龍來安公􅀐之東南而去邑中數萬人預共送之皆與辭訣又曰王子喬周靈王太子晉也好吹笙作鳯鳴遊伊洛之間浮丘公椄以上嵩髙山二十餘年後於山中謂桓良曰告我家七月七日待我緱氏山頭是日果乗白鶴駐山嶺望之不得到舉手謝時人數日而去又曰吴蔡經去家時巳老及還更少壯頭髮皆黒語家中言七月七日王君當來可作數百斛飲擬之至期日王方平果來乗羽車駕五龍聞金鼓簫管人馬之聲荆楚歳時記曰七夕婦人結綵縷穿七孔針或以金銀鍮石爲針宋孝武七夕詩曰迎風披綵縷向月貫􅀇針陳􅀲果於中庭以乞巧有喜子網於􅀲上以爲符應周處風土記云七月􅀄七日重此日其夜灑掃中庭然則中庭乞願其舊俗乎又曰魏時人或問董勛云七月七日爲良日飲食不同於古何也勛云七月􅁰熟七日爲陽數故以麋爲珎今北人唯設湯餅無復有麋矣又曰陸雲與兄平原書曰機爲平原相一日按行曹公器物書刀五板瑠璃筆一枚景􅀄二年七月七日劉婕妤云見此使人恨然案魏武帝於漢爲相不得有婕妤又景􅀄是魏明帝年如此則文帝物也與曹公器玩同處故致舛雜矣日緯書曰牽牛星荆州呼爲河鼓主開梁織女星主􅀲果甞見道書云牽牛娶織女取天帝錢二萬備禮乆而不還􅀍驅在營室是也言雖不經有是爲怪也西京雜記曰戚夫人侍兒賈佩蘭云在宫時見戚夫人侍髙祖至七月七日於臨百子池作于滇樂畢以五色縷相覇謂爲連受又曰漢彩女常以七月七日穿針於開􅁭樓俱以習俗也輿地志曰齊武帝起層城觀七月七日宫人多登之穿針世謂之穿針樓淮南子曰七月七日午時取生􅀲葉七枚直入北堂中向南立以拭靣靨即當滅矣又萬畢術曰七月七日採守宫隂去聲乾之合以井華水和塗女身有文章即以丹塗之不去者不􅁋去者有姦晉周處風士記曰七月􅀄七日其夜灑掃於庭露施几筵設酒脯時果散香粉於筵上以祈河鼓爾雅曰河鼔謂之牽牛織女言此二星辰當㑹守夜者咸懷私願咸云見天漢中有弈弈白氣有光耀五色以此爲徴應見者便拜而願乞冨乞壽無子乞子唯得乞一不得兼求三年乃得言之頗有受其祚者梁吴均齊諧記曰桂陽成武丁有仙道忽謂其弟曰七月七日織女何事渡河荅曰暫詣牽牛世人至今云織女嫁牽牛也韋氏月録曰龍魚河圖云七月七日取赤小豆男吞一七女吞二七令人畢歳無病又曰七月七日曬曝革裘無虫又曰合烏鷄藥是七月七日取烏鷄血和三月三日桃花末塗靣及遍身三二日肌白如玉此是太平公主法曽試有効世􅀃曰郝隆七月七日見隣人皆曝曬衣物隆乃仰出腹卧云曬書崔寔四民月令曰七月七日作麴合藍丸及蜀􅃮丸􅁀經書及衣裳習俗然也世傳竇后少小頭秃不爲家人所齒遇七夕人皆看織女獨不許后出乃有神光照室爲后之瑞竹林七賢論曰阮咸字仲容籍兄子也諸阮前世儒學善屋室内足於財唯籍一巷尚道業好酒而貧舊俗七月七日法當曝衣諸阮庭中爛然莫非綈錦咸時揔角乃堅長竿摽大布犢􅈹禈於庭中曰未能免俗􅂓復共爾酉陽雜俎曰魏僕射收臨代七月登舜山徘􅆦顧眺謂主簿崔撫曰吾所經多矣於山川沃壤􅁭帶形勝天下名州不能過此唯未審東陽何如撫對曰青得古名齊得舊號二處山川形勢相似曽聽所論不能踰越公遂命筆爲詩雜異書曰時有女子尚㓜七夕見家人出庭望􅀱天門開獨在室中不出曰􅀂合當見者雖暗室中亦應見之至夜深忽見天上門開雲物赫弈因求冨及長嫁而冨旣寡衆累鉅萬有賈客貨其絹百匹去而舩覆溺資貨皆没其女子偶開後房見絹在其中但濕耳後賈客歸而自首女子曰絹歸矣驗之而信亦出夷堅每亦是開元巳後事國史􅀘曰興元元年七月七日斬僞官喬琳將臨刑嘆曰琳以七月七日生亦以此日死豈非命也夫古詩曰迢迢牽牛星皎皎河漢女纎纎擢素手軋軋弄機杼終日不成章泣涕零如􅀨河漢清且淺相去復幾許盈盈一水間脉脉不得語晉潘尼七月七日侍皇太子宴􅀇圃園詩曰啇風􅀄授辰火微流朱明送夏少昊迎秋嘉木茂園芳草􅀍疇於時我后以豫以游宋孝武七夕詩曰開庭鏡天路餘光不可臨㳂風披弱縷迎曜貫􅀇鍼薄藝誠無取時務􅂓可㝷宋謝惠連詠牛女詩曰落日隱簷楹外月照簾櫳􅇛􅇛滿葉露淅浙振條風蝶足年闕相從遐川阻昵愛脩渚曠清容弄杼不成藻聳轡騖前蹤昔離秋巳􅀨今聚夕無􅀟傾河易廻幹欵情難乆悰沃􅀂靈駕旋寂寞雲幄空留情顧華寢遥心逐奔龍宋顔延之織女贈牽牛詩曰婺女麗經星姮娥捿飛月慙無一媛靈託身侍天闕閭殊闔未央銀河豈沐髮漢隂不夕悵長河爲誰越有促讌歸期萬頃涼風發非怨杼柚勞但念芳菲歇宋謝莊七夕詠牛女應詔詩曰輟機起春暮停箱動秋􅁭琥車照漢右芝駕肅河隂珠殿釭未暗瑶庭露巳深夜清豈淹抑􅁌徽無乆臨􅂫彦七月七日詠織女詩曰火流凉風至少昊恊素藏織女思北征牽牛歎南陽時來嘉慶集整駕巾玉箱瓊佩垂藻㽔霧裙結雲裳金翠耀華輜軿軒散流芳釋轡紫微庭解􅁭碧琳堂忻燕未及究晨暉照扶桑仙童唱道情盤螭起騰驤悵悵一霄促遲遲別日長梁簡文帝七夕穿針欹疑詩曰憐從帳裏出想見夜䆫開針欹疑月暗縷散恨風來梁劉孝儀詠織女詩曰金鈿已照耀白日未蹉􅋸欲待黄昬至含嬌渡淺河梁􅁃肩吾七夕詩曰玉匣卷懸衣針縷開夜扉姮娥隨月落織女逐星移離前㸔促夜別後對空機􅀉語雕凌鵲填河未可飛隋􅁃信七夕賦曰􅇠月先上羊燈次安覩牛星之曜景視織女之闌干於是秦娥麗妾趙艶佳人窈窕名鷰逶迤姓秦娥麗裝而半故憐晚飾之全新此時併捨房櫳共往庭中縷條緊而貫中針􅈹細而穿空隋王眘七夕詩曰天河横欲暁鳯駕儼應飛落日移粧鏡浮雲動別衣懽逐今霄盡愁隨還路歸猶將􅀫昔淚更上去年機張文恭七夕詩曰鳯律驚秋氣龍梭静夜機星橋百枝動雲路七香飛映月廽雕扇凌霜曳綺衣含情向華幄流態入重闈歡餘夕漏盡怨結暁驂歸誰念分河漢還意兩心違太平御覽卷第三十一
