body:
  text: 皇親部二漢太上昭靈后髙祖吕皇后髙祖薄皇后孝惠張皇后孝文竇皇后孝景薄皇后孝景王皇后孝武陳皇后孝武衛皇后孝武李皇后孝昭趙太后孝昭上官皇后衛太子史戾后史皇孫王悼后孝宣許皇后孝宣霍皇后孝宣王皇后孝元王皇后孝元傅皇后信都馮太后孝成許皇后孝成帝趙皇后孝哀丁太后孝哀􅀓皇后孝平母衛􅁎孝平王皇后漢太上昭靈后詩含神霧曰含始吞赤珠刻曰玉英生皇刻刻漏有玉英文也後赤龍感女媪劉季興春秋握成圖曰執嘉妻含始游雒池赤珠出刻曰玉英吞此者爲王客以其年生劉季爲漢皇爲王客者爲王者所賔客史記曰髙祖母媪甞息大澤之陂夢與神遇時雷電晦􅁳父太公徃視則見蛟龍於上巳而有娠遂産髙祖帝王世紀曰太上皇名執嘉妃曰媪爲昭靈后陳留風俗傳曰沛公起兵野戰喪皇妣于黃郷天下平定乃使使者以梓宫招魂於幽野於是有丹蛇在水自洒濯入于梓宫其浴處有遺髪故謚曰昭靈后黃郷今小黃縣也髙祖吕皇后漢書曰髙祖后吕皇后父吕公單父人也好相人髙祖微時吕公見而異之乃以女妻髙祖生惠帝魯元公主後漢王得定陶戚夫人愛幸生趙王如意吕后爲人剛毅佐髙帝定天下髙祖崩惠帝立吕后爲太后乃令永巷囚戚夫人髠鉗衣赭衣令春戚夫人舂且歌曰子爲王母爲虜終日舂薄暮常與死爲伍相離三千里當誰使告汝太后聞之大怒曰乃欲􅀝汝子邪乃召趙王欲誅之使者三反趙相周昌不遣太后召趙相相至長安使人復召趙王王來惠帝慈仁知太后怒自迎趙王灞上入挾趙王與起居飲食數月帝晨出射趙王不能早起太后伺其獨居使持鴆飲之迨帝還趙王死太后遂斷戚夫人手足去眼燻耳飲瘖藥使居鞠域中名曰人􅇾居數月召惠帝視人􅇾帝視而問知其戚夫人廼大哭因病歳餘不能起使人請太后曰此非人所爲臣爲太后子終不能復治天下以此日飲爲滛樂不聽政七年而崩立孝惠後宫子爲帝太后臨朝稱制后治天下八年病大禍而崩髙祖薄皇后漢書曰髙祖薄􅁎文帝母也父呉人􅁗時與故魏王宗女魏媪通生薄􅁎魏豹立爲王而魏媪内其女於魏宫許􅀒相薄􅁎當生天子曹參等虜魏王薄􅁎輸織室詔内後宫􅀊餘不得幸始􅁎少時與管夫人趙子兒相愛約曰先貴無相忘巳而管趙先幸漢王四年㘴河南城靈臺此兩羙人侍相與􅀏薄􅁎􅀄時約漢王問其故兩人俱以實告漢王心悽然憐薄􅁎是日召欲幸之對曰昨暮夢龍據妾胷上曰是貴徴也吾爲汝成之遂幸有娠􅀊中生文帝髙帝幸􅁎戚夫人之屬吕后怒皆幽之不得出宫而薄􅁎以希見故出從子之代代王爲帝尊爲皇太后東觀漢記曰中元元年告祠髙廟曰髙皇吕后不宜配食薄太􅁎慈仁孝文皇帝賢明子孫賴福延至于今宜配食地祇髙廟今上薄太后尊號爲髙皇后遷吕太后于園孝惠張皇后漢書曰孝惠張皇后宣平侯敖女也敖尚帝姉魯元公主有女惠帝即位吕太后欲爲重親以公主女配帝爲皇后欲其生子萬方終無子廼使陽爲有身取後宫羙人子名之殺其母立所名子爲太子惠帝崩太子立爲帝吕后崩大臣正之以非孝惠子誅之孝惠后廢處北宫孝文竇皇后漢書曰孝文竇皇后景帝母也吕太后時以良家子選入宫㑹太后出宫人以賜諸王各五人竇􅁎家在清河乃求其主者願歸清河而主者誤寘於代籍中竇􅁎泣涕而行及至代代王獨幸竇􅁎生子文帝立數月公卿請立太子而竇􅁎爲皇后景帝立爲皇太后好黃帝老子言景帝及諸竇不得不讀老子以尊其術孝景薄皇后漢書曰孝景薄皇后孝文薄太后家女也景帝立立薄妃爲皇后無子無寵立六年薄太后崩皇后廢孝景王皇后漢書曰孝景王皇后武帝母也父仲槐里人􅀄嫁爲金王孫婦生一女矣而母臧兒卜筮曰兩女當貴欲􅀝兩女奪于金氏金氏怒不肯與決乃内太子宫太子幸愛之生三女一男男方在身夢日入其懷中以告太子太子曰此貴徴也景帝即位立爲皇后男爲太子景帝崩武帝即位爲皇太后也孝武陳皇后漢書曰孝武陳皇后長公主嫖女也武帝得立爲太子長公主有力取主女爲妃及帝即位妃立爲皇后擅寵驕貴十餘年而無子聞衛子夫得幸幾死者數焉上愈怒后又挾婦人媚道頗覺元光五年上遂窮治之女子楚服等㘴爲皇后巫蠱祠􅀕祝詛大逆無道相連及誅者三百餘人楚服梟首於市漢書武帝陳皇后退居長門宫司馬相如長門賦序曰孝武皇帝陳皇后得幸頗爲妬别在長門宫愁悶悲思聞相如天下工爲文奉黃金百斤爲相如文君取酒因求解悲愁之辭而相如爲頌以奏主上皇后復得親幸孝武衛皇后漢書曰孝武衛皇后字子夫生微賤爲平陽主謳者武帝即位數年無子平陽主求良家女子十餘人飾置家帝祓灞上祓除也於灞木上自祓除今三月上巳祓禊也還過平陽主主見所侍羙人帝不悅旣飲謳者進帝獨悅子夫帝起更衣子夫侍尚衣軒中得幸還㘴忻甚賜平陽主金千斤主因奏子夫送入宫子夫上車主拊其背曰行矣強飯勉之即貴願無相忘入宫歳餘不復幸武帝擇宫人不中用者斥出之子夫得見涕泣請出上憐之復幸遂有身尊寵元朔元年生男據遂立爲皇后據即戾太子也孝武李皇后漢書曰孝武李夫人本以倡進􅀄夫人兄延年性知音善歌舞武帝愛之每爲新聲曲聞者莫不感動延年侍上起舞歌曰北方有佳人絶丗而獨立一顧傾人城再顧傾人國寧知傾城傾國佳人不可再得上歎息曰善丗豈有此人乎平陽主因言延年有女弟上乃召見之實妙麗善舞由是得幸生一男是爲昌邑哀王李夫人少而蚤卒上憐閔焉圖􅀞其形於甘泉宫及衛思后廢後四年武帝崩大將軍霍光縁上雅意以李夫人配食追上尊號曰孝武皇后􅀄李夫人病篤上自臨候之夫人蒙􅀍謝曰妾乆病形貌毀壞不可以見帝願以王及兄弟爲託上曰夫人病甚殆將不起一見屬託王及兄弟豈不快哉夫人曰婦人貌不脩飾不見君父妾不敢以燕墮見帝上曰夫人􅀂一見我將加賜千金而子兄弟尊官夫人曰尊官在帝不在一見上復言欲必見之夫人遂轉向壁欷歔而不復言於是上不恱而起夫人姊讓之曰貴人獨不可見上屬託兄弟耶何爲恨上如此夫人曰所以不欲見帝者廼欲以􅀷託兄弟也我以容貌之好得從微賤愛幸於上夫以色事人者色衰則愛絶愛絶則恩絶上所以戀戀顧念我者廼以平生容貌也今見我毁壞顔色非故必且畏惡有吐弃我意尚肯復追思憫録其兄弟哉及夫人卒上以厚禮葬焉孝昭趙太后史記曰鉤弋夫人姓趙氏河間人也得幸武帝生子一人即昭帝也武帝年七十乃生昭帝昭帝立時年五歳衛太子廢上居甘泉宫召􅀞工圖􅀞周公􅀒成王於是左右羣臣知武帝意欲立少子後數日帝譴責鉤弋夫人脫簪珥叩頭帝曰引將去送掖庭獄夫人還顧帝曰趨行女不得活夫人死雲陽宫時暴風楊塵百姓感傷使者夜持棺徃葬之封識其處其後帝間居云問左右曰人言何云左右對曰人言以爲且立其子何爲去其母乎帝曰然是非兒曹愚人所知也徃古國家所以亂也由主少母壯女王獨居驕蹇􅁋亂自恣莫能禁也汝不聞吕后邪故諸爲武帝生子者無男女其母莫不譴死豈可謂非賢聖哉漢書曰孝武鉤弋趙婕妤家在河間武帝廵狩過河間望氣者言此室有竒女天子氣使使召之旣至兩手皆拳上自披之手即時伸由是得幸號曰拳夫人進爲婕妤居鉤弋宫大有寵元始三年生昭帝號鉤弋子妊身十四月廼生上曰聞昔堯十四月而生今鉤弋亦然廼命其生門曰堯母門昭帝即位追尊爲皇太后漢武故事曰拳夫人進爲婕妤居鉤弋宫解黃帝素女之術從上至甘泉因幸告上曰妾相運正應爲陛下生一男男七歳妾當死今年必死宫中多蠱氣必傷聖體言終而卧遂卒旣殯香聞十餘里因葬雲陵上哀悼又疑非常人發􅃁室棺無尸唯履存爲起通靈臺於甘泉常有一青鳥集臺上徃來至宣帝時乃止列仙傳曰鉤翼夫人姓趙少好學沉静病卧六年右手拳飲食少望氣云東方有貴人氣推而到姿色甚偉帝披其手得一鉤而手尋拳生昭帝旣而帝害之殯尸不臭而香數月昭帝即位更葬之棺空但有衣履故名其宫曰鉤翼後避諱改爲弋孝昭上官皇后漢書曰孝昭上官皇后隴西上邽人祖父桀因材力親近爲侍中昭帝始立年八歳帝姊鄂邑長公主居禁中共養后父安因主親近丁外人聞之長公主召入爲婕妤月餘爲皇后年甫六􅀊安以后父封侯後桀謀反發覺后以少不預謀亦以霍光外孫不廢宣帝即位合葬平陵衛太子史戾后漢書曰衛太子史良娣宣帝祖母也太子有妃有良娣有孺子妻妾凡三等子皆稱皇孫史良娣生男進號史皇孫武帝末巫蠱事起衛太子及良娣史皇孫皆遭害史皇孫王悼后漢書曰史皇孫王夫人宣帝母也名公碩太始中得幸於史皇孫皇孫妻妾無號位皆稱家人子征和二年生宣帝帝生數月衛太子皇孫敗家人子皆㘴誅莫有収葬者唯宣帝得全即尊位後追尊母夫人謚曰悼后祖母史良娣曰戾后皆改葬孝宣許皇后漢書曰孝宣許皇后元帝母也父廣漢昌邑人爲暴室嗇夫廣漢有女平君十四五當爲内者令歐侯氏子婦臨當入門歐侯子死其母將行卜相言當大貴母獨喜張賀聞許嗇夫有女乃置酒請之酒酣爲言曽孫可妻也廣漢許諾明日嫗聞之怒廣漢重令爲媒介遂與曽孫及立爲帝平君爲婕妤是時霍將軍有小女與皇太后有親漢書宣帝即位公卿議更立皇后皆心議霍將軍女亦未有言上乃詔求微時故劒大臣知旨白立許婕妤爲皇后孝宣霍皇后漢書曰孝宣霍皇后光女也母顯旣使女醫陰殺許后顯因爲女成君衣􅀘治入宫漢書曰孝宣許后起微賤登至尊從官車服甚節儉五日一朝皇太后於長樂宫親奉案上食以婦道供養及霍后立亦循許后故事而皇太后親霍后之姊子故常竦體敬而禮之皇后輿駕侍從甚盛賞賜官屬以千萬計與許后時懸絶矣孝宣王皇后漢書曰孝宣王皇后父奉光少時好􅃲雞宣帝在人間數與奉光㑹相識奉光有女年十餘每欲適人所當適者輒死故乆不行及宣帝即位召入後宫稱爲婕妤霍皇后廢後上憐太子蚤失母幾爲霍氏所害於是乃選後宫素謹朴而無子者遂立王婕妤爲皇后令母養太子元帝即位爲皇太后成帝即位爲太皇太后時成帝母亦姓王氏故號太皇太后爲卭城太后年七十餘崩以后父奉光封卭城侯故號之孝元王皇后漢書曰孝元王皇后王莾之姑也王賀字翁孺爲武帝繡衣御史逮捕魏郡盗皆縱不誅以奉使不稱免歎曰吾聞活千人者有封吾所活者萬餘人後世其興乎翁孺旣免而與東平陵終氏爲怨廼徙魏郡元城委粟里爲三老魏郡人德之元城建公曰元城縣建公姓名也昔春秋沙麓崩􅀳史卜之曰隂爲陽雄土火相乗此􅀛繇文隂元后陽漢也王氏舜後土也漢火故曰土火相乗隂盛而沙麓崩故有沙麓崩後六百四十五年冝有聖女興其齊田乎今王翁孺徙正值其地日月當之元城郭東有五麓之墟即沙麓地也後八十年有貴女興天下云翁孺生禁字雅君禁生女政君即元后也􅀄母李親妊政君在身夢月入其懷及壯大婉順得婦人道常許嫁未行所許者死後東平王娉政君爲􅁎未入王薨禁獨怪之使􅁲數者相政君當大貴不可言禁心以爲然乃教書學鼓琴五鳯中獻政君年十八矣入掖庭爲家人子皇后擇後宫可以娯侍太子者政君與在其中及太子朝皇后迺見政君等五人微令旁長御問知太子所欲太子殊無意於五人者不得已於皇后強應曰此中一人可是時政君坐近太子又獨衣絳縁遂送政君於太子宫見内殿得御幸有娠甘露三年生成帝於甲館畫堂爲丗嫡皇孫宣帝崩太子即位是爲孝元皇帝立太孫爲太子以母王妃爲皇后哀帝即位爲太皇太后哀帝崩無子以莽爲大司馬共徴立中山王奉哀帝後是爲平帝平帝年九歳常􅀍病太皇太后臨朝漢傳國璽以孺子未立璽藏長樂宫及莽即位請璽太后不肯以授莽莽使安陽侯舜諭旨舜素謹飭太后雅愛信之舜旣見太后知其爲莽求璽怒罵之曰而屬父子宗族蒙漢家力富貴累代旣無以報受人􅀉託乗便利時奪取其國不復顧恩義爲人如此者狗猪不食其餘天下豈有而兄弟耶且􅀂自以金匱符命爲新皇帝變更正朔服制亦當自更作璽傳之萬世何以用此亡國不祥璽爲欲求之我漢家老寡婦旦暮且死欲與此璽俱葬終不可得太后因泣涕莽欲脅之廼出璽投之地莽改號太后爲新室文母絶之於漢太后年八十四建國五年二月癸丑崩三月乙酉合葬渭陵孝元傅皇后漢書曰孝元􅀓昭儀哀帝祖母也父河内温人昭儀少爲上官太后才人自元帝爲太子得進漢書曰孝元􅀓皇后帝即位爲婕妤甚有寵爲人有才下至宫人左右飲酒酹地皆祝延之信都馮太后漢書曰孝元馮昭儀平帝祖母也元帝即位二年以選入後宫就館生男拜爲婕妤父奉世婕妤内寵與傅昭儀等建始中上漢書曰元帝建始中幸虎圈􅃲獸後宫皆㘴熊佚出圈攀檻欲上殿左右貴人􅀓昭儀等皆驚走馮婕妤直前當熊而立左右格殺熊上問人情驚懼何故前當熊婕妤對曰妾聞猛獸得人而止妾恐熊至御坐故以身當之元帝嗟嘆以此倍敬重焉孝成許皇后漢書曰孝成許皇后平恩侯嘉女元帝悼傷母恭哀后居位日淺而遭霍氏之􅇳故選嘉女以配皇太子侍送者還白太子忻􅀃狀元帝喜謂左右酌酒賀我左右皆稱萬歳乆之及成帝即位立許妃爲皇后后聦慧善史書自爲妃至即帝位后常寵於上後宫稀得進見乆之皇后寵亦益衰而後宫多新愛姉平安侯夫人謁等爲媚道祝詛後宫有娠者太后大怒下吏考問謁等誅死許后㘴廢處昭臺宫孝成帝趙皇后漢書曰孝成趙皇后夲長安宫人初屬陽阿主家學歌舞號曰飛鷰成帝甞微行出過陽阿主作樂上見飛鷰而說之召入宫大幸有女弟復召入俱爲婕妤貴傾後宫父臨爲咸陽侯後月餘乃立婕妤爲皇后後寵以衰而弟絶幸爲昭儀居昭儀舎其中庭彤朱而殿上髹漆切皆銅沓冒黃金塗白玉階璧帶徃徃爲黃金釭函謂璧中之横帶承藍田璧明珠翆羽飾之自後宫未甞有焉孝哀丁太后漢書曰定陶丁􅁎哀帝母也河平四年生哀帝丁􅁎爲太后建平三年丁太后崩起陵恭皇之園王莽秉政乃奏貶傅太后號曰定陶恭王母丁太后號曰丁􅁎元始五年莽復奏恭王母及丁􅁎葬渭陵􅃁髙與元帝山齊禮有改葬謂發王母及丁􅁎􅃁徙歸定陶太后以爲旣巳之事不湏發莽固爭之太后詔曰因故棺爲致槨作􅃁祠以太牢旣發􅀓太后􅃁崩壓殺數百人開丁􅁎椁戸火出炎四五丈吏卒以水沃滅乃得入燒燔椁中器物莽復奏言前恭王母生僭居桂宫皇天震怒災其正殿丁􅁎死莽踰制度今火焚其椁此天見變以告當改如媵妾也共王母及丁􅁎椁棺皆名梓宫珠玉之衣非藩妾服請更以木椁代去珠玉葬丁􅁎媵妾之禮奏可旣開􅀓太后棺臭聞數里掘平恭王母丁􅁎故􅃁二旬間皆平莽又周􅁄其處以爲時戒云時有羣鷰數千衘土投􅃁中孝哀􅀓皇后漢書曰孝哀􅀓皇后定陶􅀓太后弟子也哀帝爲定陶王時􅀓太后欲重親取以配王帝崩王莽白太后令孝哀皇后退就桂宫後月餘復與孝成趙皇后俱廢爲庶人就其園自殺孝平母衛􅁎漢書曰中山衛􅁎平帝母也父曰子豪子豪女弟爲宣帝婕妤生楚孝王長女又爲元帝婕妤生平陽公主成帝時中山孝王無子上以衛氏吉祥以子豪少女配孝王生平帝平帝年二歳孝王薨代爲王哀帝崩無嗣太皇太后與莽迎中山王立爲帝莽欲顓國權衛􅁎及外家不當得至京師乃賜衛􅁎璽綬即拜爲中山王后莽長子宇非莽隔絶衛氏日夜啼泣思見帝而但益户邑宇復教令上書求至京師㑹事發覺莽殺宇盡誅衛氏支屬莽簒國廢爲家人後􅀊餘卒葬孝王旁孝平王皇后漢書曰孝平王皇后莽女也莽欲依霍光故事以女配帝帝崩莽立孝宣帝玄孫嬰爲孺子莽即真以嬰爲定安公王皇太后號爲定安公太后時年十八爲人婉嫕有節操自劉氏廢常稱疾不朝㑹莽敬憚傷哀欲嫁之迺號爲皇室主令立國將軍成新公孫建丗子豫飾將醫徃問疾后大怒笞鞭其旁侍御因發病不肯起莽遂不敢強也及漢兵誅莽焚燒未央宫后曰何面目以見漢家自投火中而死太平御覽卷第一百三十六
