  text: 太平御覽卷第九百四十四
  hash: sha256:17612af147ff8688b208ce58849b2203a818338d6b3b18c1f62ff4c299e943b4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_944-1a}
body:
  text: 蟲豸部一蟲蟬蝇蟲爾雅曰有足謂之蟲無足謂之豸周禮冬官梓人曰外骨内骨卻行仄行連行紆行以脰鳴者以注鳴者以旁鳴者以翼鳴者以股鳴者以胷鳴者謂之小蟲之屬外骨􅀛屬内骨鼈屬郤行螾衍之屬􅁅行蟹屬連行魚屬紆行蛇屬脰鳴鼃屬注鳴精列屬旁鳴蝟蜆屬翼鳴發皇屬股鳴蚣蝑動股屬胷鳴榮原屬大戴禮曰毛蟲之精者曰麟羽蟲之精者曰鳯介蟲之精者曰􅀛鱗蟲之精者曰龍倮蟲之精者曰聖人禮記月令曰孟春之月蟄蟲始振仲春之月蟄蟲咸動啓户始出仲秋之月蟄蟲坏户坏益也季秋之月蟄蟲咸俯在内皆墐其户墐謂塗閉之春秋考異郵曰二九十八主風精爲蟲八日而化風列波激故其命從蟲蟲之爲言屈申也東觀漢記曰永平三年春有司奏立長秋宫以率八妾上未有所言皇太后曰馬貴人德冠後宫遂登至尊先之數日夢有小飛蟲萬數隨着身入皮膚中復飛去魏書華佗傳曰廣陵太守陳元龍得疾所苦胷中煩滿面赤不能飯佗持其脉曰府君胃蟲有數升欲成内蝕病食腥物所爲也今可去也即作湯二升先飲一升湏􅁷復一升食頃吐岀數升蟲長一二寸赤頭皆揺半軀皆是生魚膾也趙書曰前石時淳觚曰􅆧婦産􅆑大如盂剖之有蟲如巨蟻二足立行異苑同蕭子顯齊書曰王敬則少時於草中射獵有蟲如烏豆集其身擿去乃脫脫處皆流血敬則惡之詣道士卜曰不湏憂此侯之瑞也敬則聞之喜故出都自効後魏書曰蠕蠕東胡之苗裔也木骨閭死子車庶㑹自號柔然役屬於魏丗祖以其無知狀􅀋於蟲故改其號爲蠕蠕隋書曰田式拜襄州揔管專以立威爲務所愛奴嘗詣式白事有蟲上其衣衿上揮䄂拂去之式以爲慢巳立棒殺之莊子曰井蛙不可以語於海者拘於墟也夏蟲不可以語於冰者篤於時也魯連子曰百足之蟲斷而不蹶持之衆也淮南子曰凢有血氣之蟲含牙戴角前爪後距有角者觸有齒者噬有毒者蠚有蹄者趹喜而相戲怒而相害天之性也又曰故草食之獸不疾易藪疾患水居之蟲不疾易水行小變而不失常小變易水易草食故食草水居故水中故曰不疾失其常也又曰太隂所在蟄蟲首穴處鵲巢以郷爲户又曰水食者善游能寒魚鼈之屬是也土食者無心不惠蚯蚓之屬是也又曰介蟲之動以固介甲􅀛鼈之屬動行也貞蟲之動以毒螫貞蟲細􅆎蜂蟲蜾蠃之屬無牡牡之合曰貞而有毒故能螫又曰山有猛獸林木爲之不斬園有螫蟲藜藿爲之不採言人畏也抱朴子曰毒粥陳則旁有爛腸之䑕明膏舉則下有聚死之蟲又曰慕惡者猶宵蟲之赴明燭學惡者猶輕埃之應飄風也孫卿子曰肉腐出蟲魚枯生蠧論衡適蟲篇曰變復之家謂蟲食榖者吏貪狼所致也蟲頭赤者武官黒者文吏按蟲頭赤身白頭黒身黄復􅀿何官􅁘今蟲食五榖則爲災桂蠧桑蝎不恠何也桂中藥桑給􅅙何可不恠書卷不舒衣襞不懸皆生蟲也此復閞何吏􅁘又曰司南之杓投於地其柄南指魚肉之蟲集地北行自然之性也丗夲曰廪君乗土船至􅐭塲􅐭水神女子止廪君廪君不聽􅐭神爲飛蟲諸神從而飛蔽日爲之晦廪君不知東西所當七日七夜使人以青縷遺􅐭神曰纓此與爾俱生􅐭神受縷而纓之廪君應青縷所射􅐭神死天則大開崔豹古今注曰光武建武六年山陽有小蟲皆􅀋人形甚衆明日皆懸樹枝而死搜神記曰東陽劉寵北征􅀅炊飯盡變爲蟲又家人蒸粆亦化爲蟲火愈猛而蟲愈壯寵遂見誅仲興書又載廣五行記曰漢武帝幸甘泉宫馳道中有蟲赤色頭目鼻盡具觀者莫識帝使東方朔視之對曰此􅁗時拘繫無辜衆庶愁死咸仰首歎曰恠哉故名恠哉此必􅁗之獄處朔又曰凢憂者得酒而解以酒沃之當消於是取蟲致酒中湏􅁷糜散􅁊譚新論曰睢陵有董仲君好方道嘗坐重罪繫獄佯病死數日毁蟲出而復活蟬昜通卦驗曰遘上九候蟬始鳴不鳴國多妖言蟬應期鳴言語之象今失節不鳴鳴則失時故多妖言毛詩蕩之什曰咨汝殷啇如蜩如螗注蜩蟬也螗蝘也毛詩䟽義曰鳴蜩蟬也宋衛謂之唐蜩陳鄭云蜋海岱之間謂之蟬通語也禮記月令曰仲夏之月蜩始鳴季秋之月寒蟬鳴又檀弓曰范則冠而蟬有緌蟬蜩也緌謂蜩啄長在腹下爾雅曰蜩蜋蜩夏小正曰蜋蜩者五彩具螗蜩夏小正曰螗蜩者蝘俗呼為胡蟬江南謂之螗􅡻音荑蚻蜻蜻如蟬而小方言云有文者謂之螓夏小正曰鳴蚻虎懸􅝺茅蜩江東呼爲茅截似蟬而小青色蝒馬蜩蜩中最大者爲馬蟬蜺寒蜩寒螿也似蟬而小青赤月令日寒蟬鳴蝒音绵孝經援神契曰蟬無力故不食周書曰夏至又五日蜩始鳴不鳴貴臣放逸立秋之日寒蜩鳴不鳴人臣不力爭梁書曰朱异爲通事舎人後除中書郞時秋日始拜有飛蟬正集异武冠上時咸謂蟬珥之兆又曰何戢爲呉興太守頗好􅀞扇宋孝武賜戢蟬雀扇善􅀞者顧景秀所􅀞時呉郡陸探微顧寳先皆能􅀞歎其巧絶戢因王晏獻之上令晏厚酬其意後周書曰宣帝汰侈旣自比上帝不欲令人同巳甞自􅅁綬及通天冠加金附蟬顧見侍臣武弁上有金蟬及王公有綬者並令去之荘子曰仲足適楚出遊林中見痀僂者承蜩猶掇之也仲尼曰巧乎有道􅁘曰我有道也五六月累丸二而不墜則失者錙銖累二九於竿頭是用手足亭審世累三而不墜則失者十一所失愈少也累五而不墜猶掇之也吾處身也􅀂厥株拘吾執臂也􅀂槁木之枝雖天地之大萬物之多而唯蜩翼之知吾不反不側不以萬物易蜩之翼何爲不得遺彼故得此也又曰鵬之飛其翼􅀂垂天之雲搏扶揺而上者九萬里去以六月一息者也蜩與鸒鳩􅀏之曰我決處而飛槍榆枋而止時則不至而空於地而巳奚以九萬里而圖南爲也孫卿子曰曜蟬者務明其火振其樹􅀂火不明雖振樹無益人有明德則天下㱕之若蟬㱕明火也又見吕氏春秋淮南子曰孟秋凉風至白露降寒蟬鳴寒蟬青蟬也蟲隂􅀋感氣鳴也又曰蛇不足而行魚無耳而聽蟬無口而鳴有然之者也然如是也又曰蚕食而不飲二十二日而化蟬飲而不食三十日而蛻􅀃苑曰呉王欲伐荆吿其左右曰敢有諌者死舎人有少孺子者欲諌不敢則懷九操彈於後園露沾其衣如是者三旦吴王曰子来何若沾衣如此對曰園中有樹其上有蟬蟬髙居悲鳴飲露不知螳蜋在其後也螳蜋委身曲附欲取蟬而不知黃雀在其旁也黄雀延頸欲啄螳蜋而不知彈丸在其下也此三者皆務欲得其前利而不顧其後之有患也呉王曰善哉乃罷其兵論衡曰王充建武三年生爲小兒不妄狎倫不掩雀捕蟬􅐭鐵論曰以所不覩不信人􅀂蟬之不知雪􅀭雄方言曰蟬楚謂之蜩宋衛之間謂之螗蜩江南呼爲螗蛦也陳鄭之間謂之蜋蜩蜋音良􅁗晉之間謂之蟬海岱之間謂之䗁斉人呼爲巨䗁音枝其小者謂之蟧或謂之蝒音綿馬按尔雅蛨者馬蜩非别名蝒馬也此方言誤耳其小者謂之陵蚻如蟬而小青色今開西呼爲凌􅝺也有文者謂之蜻蜻尔雅云蜻即夌蚻也其雌謂之疋必一切大而黒者謂之踐音棧黒而赤者謂之蜆雲霓蜩蟧謂之芽蜩江東呼為芽􅝺􅣒謂之寒蜩闇蜩按尔雅以蜺爲寒蜩月令亦曰寒蟬鳴蝒寒蟬非瘖者此諸蟬名通出尔雅而多駮錯未可詳據也寒蟬寒螿也似蟬而小􅣒音應崔豹古仐註曰牛亨問董仲舒曰蟬爲齊女何荅曰昔薺王后怨王而死尸變爲蟬登庭樹嘒唳而鳴王悔恨之故曰斉女又曰貂蟬胡服也貂者取其有文而不煥外柔而昜内剛而勁也蟬者取其清虚而識時變也在位者有文而自耀有武而不示人清虚自牧識時而動也曹大家蟬賦曰吸清露於丹園抗喬枝而理翮崇皇朝之輝光映豹豹而灼灼陸雲寒蟬賦曰昔人稱雞有五德而作賦焉至於寒蟬才齐其美獨未之思而莫斯􅄒夫頭上有幘則其文也含氣飲露則其清也􅁰稷不享則其廉也處不巢居則其儉也應候守常則其信也加以冠冕取其君子則其操可以事君可以立身豈非至德之蟲哉且攀木寒鳴貪士所歎余昔僑處􅀼有感焉公侯常伯乃身紆紫黻手執龍淵俯鳴佩玉仰撫貂蟬於上盧之多士光帝皇之侍人騰儀像於雲闥望景曜乎通天邁休声之五德豈烏雞之獨珎傅􅀇蟬賊曰美兹蟬之純㓗禀隂陽之微靈傅咸粘蟬賦曰櫻桃其爲樹則多䕃其爲果則先熟故種之於㕔所之前時以盛暑逍遥其下有蟬鳴仰而見之故命粘取以弄小兒退惟當蟬之得意於冨貴而不虞禍之􅀅來也蠅韓詩曰雞鳴䜛人也匪雞則鳴蒼蠅之聲薛君曰雞逺鳴蝇声相似也毛詩甫田曰青蠅大夫刺幽王也營營青蠅止于樊蠅之爲蟲汙白使黑汙黑使白喻佞人變亂善惡也豈弟君子無信䜛言營營青蠅止于􅁄䜛人罔極交亂四國漢書曰成帝建始元年六月青蠅萬數集未央宫殿中朝者坐服䖍曰公卿以下朝㑹坐也又曰昌邑王賀夢青蠅矢積西階可五六石以屋版瓦覆發視之青蠅矢也以問龔遂遂曰陛下之側䜛人衆多願皆放逐之賀不用其言卒至於廢也東觀漢記曰光武與隗􅅝書曰蒼蝇之飛不過三數歩托􅂹之尾得以絶羣後漢書曰楊章爲杜喬李固薦爲平原令後喬固􅀍刑章行赴洛見喬固暴屍坐其旁驅逐蠅蟲魏略曰王思正始中爲大司農性急甞執筆作書蠅集筆端驅去復來如是再三思怒自趂逐蠅不能得還取筆擲地踏壞之張勃呉録曰曹不興帝使􅀞屏風筆落素便􅀧爲蠅帝疑生乃彈之前􅁗書曰苻堅欲赦與王猛符融議甘露堂悉屏左右堅親爲赦文有大蒼蠅集于筆端驅而復來俄而長安街巷人相告曰官令大赦有司以聞堅驚曰禁中無屬耳之垣事何從泄也勑窮之咸言有一小兒衣青衣大呼于市曰官令大赦湏􅁷不見堅歎曰其向蒼蠅乎梁書曰昭明太子食中頻得蠅蟲之􅀋密置拌邊恐厨人􅀗罪不令人知見北史曰庫狄伏連居室患蠅杖門者曰何故聽入唐書曰武儒衡爲中書舎人元稹知制誥儒衡一日因㑹食公堂有蠅集􅀲上忽發怒命繫去之曰適從何所夾而遽集此淮南子曰夫江河之腐胔不可勝數也然􅀕者汲焉大也一盃酒蠅漬其中匹夫弗甞小也朝子曰以火去蛾蛾愈多以魚毆蠅蠅愈至吕氏春秋曰以狸致䑕以冰致蠅掦子法言曰或問蒼蠅紅紫蒼蠅間乎白黑紅紫似朱而非朱也論衡曰清受塵白受垢青蝇所汚常在練素邑犬羣吠吠所恠也虞翻別傳曰翻放棄南方自恨䟽節骨體不媚犯上􅀗罪當長没海隅生無可與語死以青蠅爲弔客天下一人知巳者足以不恨崔豹古今注曰蠅虎蠅狐也形似蜘蛛而色灰白善捕蠅一名蠅蝗一名蠅豹揚雄方言曰蝇東齊謂之羊陳楚之間謂之繩自􅀜而西秦晉之間謂之蠅廣五行記曰魏吏部尚書何晏甞夢青蠅數十頭來自鼻上驅之不肯去以問管輅輅曰鼻者天中今有青蠅臰惡而來集之位峻者顚輕豪者亡不可不思之至明年何晏及鄧颺皆伏誅太平御覽卷第九百四十四
