body:
  text: 錦繡錦􅀃文曰錦襄邑織成也釋名曰錦金也作之用功重其價如金故制字帛與金也禮記王制曰錦文珠玉成器不鬻於市不示民也奢與貪成猶善也禮記玉藻曰童子之節也緇衣衣錦縁錦紬并紐錦束髮皆朱錦童子未冠之稱冠禮日將冠者綵衣紒也又玉藻曰君衣狐白裘錦衣以􅄄之錦衣狐裘諸侯之服也又曰居士錦帶居士道藝處士也又中庸曰詩云衣錦褧衣惡其文之著也故君子之道闇然而日章小人之道的然而日亡言君子深逺難知小人淺近易知也所以不知孔子以其深逺也揮爲褧錦衣以美而君子以褧表之爲其文章露似小人也左傳閔公曰衛遷于曹齊桓公歸夫人魚軒重錦三十兩又襄三曰晉侯先歸公享晉六卿于蒲圃賄荀偃束錦加璧又襄五曰左師見夫人之歩馬者歩馬習馬問之對曰君夫人氏也左師曰誰爲君夫人余胡弗知圉人歸以告夫人使饋之錦與馬先之以玉又襄六曰子皮欲使尹何爲邑子産曰少未知可否子皮曰吾愛之夫徃而學焉亦愈知治子産曰人之愛人求利之也今吾子愛人以政猶未能操刀而使割也其傷實多子之愛人傷之而巳子有美錦不使人學製焉大官大邑身之所庇而使學者製焉其爲美錦不亦多乎言官邑人重多於美錦也又昭四曰􅀳合諸侯次于衛地叔鮒求貨於衛􅁋蒭蕘者􅁋放也欲使衛惠之而致貨也衛人使屠伯饋叔向羮與一篋錦屠伯衛大夫也曰諸侯事􅀳未敢携貳況衛在君之宇下屋宇之下喻近而敢有異志蒭蕘者異於他日敢請之請止之也叔向受羮反錦受羮示不逆其意且非貨也又昭四曰平丘之㑹公不與盟􅀳人執季孫意如以幕蒙之使狄人守之司鐸射魯大夫也懷錦奉壷飲氷以匍匐焉守者御之乃與之錦而入匍匐􅀼徃飲季孫也氷箭箭盖可以取飲者也又昭六曰齊侯將納公命無受魯貨申豐後女賈豐賈二人皆季氏家臣也以幣錦二兩二丈爲一端二端爲一兩所謂匹也二兩二匹􅅞一如瑱瑱充耳􅅞卷也急卷使如充耳易懷藏適齊師謂子猶之人髙齮齮子猶家臣子猶梁丘據能貨子猶爲髙氏後粟五千􅁃言􅀂能爲我行貨於子猶當爲請使得爲高氏後又當致粟五千􅁃􅁃十六斗丸八千斛髙齮以錦示子猶子猶欲之齮曰魯人買之百兩一布以道之不通先入幣財言魯人買此甚多布陳之以百兩爲數子猶受之又哀上曰呉人藩衛侯之舎藩籬子服景伯謂子貢曰夫諸侯之㑹事旣畢矣侯伯致禮地主歸餼侯伯致禮以禮賔也地主所㑹主人也餼生物以相辭也各以禮爵讓今吾不行禮於衛而藩其君舎以難之難􅀂困也子盍見大宰乃請束錦以行以賂呉毛詩淇澳碩人曰碩人其頎衣錦褧衣齊侯之子衛侯之妻又蟋蟀曰角枕粲兮錦衾爛兮又巷伯曰巷伯刺幽王也寺人傷於䜛而作是詩也萋兮斐兮成是貝錦萋斐丈相錯也彼譛人者亦以太甚論語曰宰我問三年之䘮期巳乆矣君子三年不爲禮禮必壊三年不爲樂樂必崩舊􅂖旣没新􅂖旣􅂛鑚燧改火期可巳矣子曰食夫稻衣夫錦於女安乎曰安女安則爲之爾雅曰素錦綢杠以白地錦韜旗之竿尚書大傳曰古之帝王者必有命民能敬長憐􅀌取舎好讓舉事力者命於其君然後得乗飾車軿馬衣文錦漢書曰項羽在􅀜中懐思東歸曰冨貴不歸故郷如衣錦夜行又曰景帝二年下詔曰雕文刻鏤傷農事錦繡纂組害女工冝禁之又曰賈人母得衣錦謝承後漢書曰朱寵仲威爲太尉家貧食脫粟卧布被朝廷賜錦􅀍梁􅁏皆不敢當漢官儀曰虎賁中郎將古官衣紗縠單衣虎文錦袴餘郎亦然漢官典職曰尚書郎直中官供錦􅀍魏志曰景􅀄中賜倭女王絳地交龍錦五疋紺地勾文錦三疋倭獻􅁀文􅄂錦二十疋魏文帝詔曰前後每得蜀錦殊不相比適可訝而鮮􅂌尚復不愛也自吾所織如意虎頭連璧錦亦有金薄蜀薄來至洛邑皆下惡是爲下土之物皆有虚名典略曰孔子反衛夫人南子使人謂之曰四方君子之來者必見寡小君孔子不得巳見之夫人在錦帷中孔子北靣稽首呉志曰蔣欽字公弈爲右護軍孫權常入其内母練帳縹􅀍權歎其在貴守約勑御府爲其母作錦􅀍改易帷帳又曰甘寜住止常以繒錦維舟去輙割弃以示奢又曰諸􅁑融父兄質素雖在軍旅身無采飾而融錦􅄢文繡獨爲奢侈環氏呉紀曰蜀遣使獻重錦千端江表傳曰陸遜攻劉備於夷陵備捨舡歩走燒皮鎧以斷道使兵以錦挽車走入白帝蜀志曰先主入益州賜諸􅁑亮法正張飛􅀜羽錦各千疋王隱􅀳書曰􅀽甫字公曹稱所知於領軍何勗勗曰君稱其好人則多所冝何以爲欲使宰民不可爲臺閣職乎甫曰人各有能有不能此人雖好好莫過錦錦不可以爲熖王隱晉書曰竇滔妻􅂫氏善屬文符堅時滔爲秦州刺史􅀍徙流沙􅂫氏思之織錦爲回文詩以􅀉滔循環宛轉以讀之詞甚悽切􅀳書曰石季龍僣立遷都于鄴傾心事佛圖澄有重於勒下書衣澄以綾錦乗以雕輦南史曰宋元凶劭將作難賜􅀽淑等袴褶又就主衣取錦裁三尺爲一叚又中裂之分蕭斌與淑及左右使以􅅞袴褶齊書曰江淹爲宣城太守時罷歸始泊禪靈寺渚夜夢一人自稱張景陽謂曰前以一疋錦相􅀉今可見還淹探懐中得數尺與之此人大恚曰郍得割截都盡顧見丘遲謂曰餘尺旣無用以遺君自爾淹文章躓矣趙書曰前石死調大臣子弟六十人爲挽郎引錦一疋後魏書曰甄琛爲定州刺史旣至郷衣錦晝遊政體嚴細甚無聲譽又曰孝武至彭城宋江夏王義恭獻蠟燭十挺武陵王駿獻錦一疋北史曰齊畢義雲家有十餘機織錦并造金銀器物後周書曰太祖曽在同州與郡公宴集出錦􅄢及􅄂綾絹數叚命諸將樗蒲取之唐書曰王方慶天后初爲廣州都督境内清肅手制襃之曰朕以卿歷職有稱故授此官旣美化逺聞實副朝􅀉令賜卿􅄂綵六十叚并瑞錦等物以彰善政也又曰大曆初代宗詔許宰臣元載王縉及左僕射裴冕戸部侍郎判度支第五􅄾京兆尹􅀺幹各出錢三十萬宴郭子儀于子儀私第内侍魚朝恩叅其㑹焉朝恩出錦三十疋羅五十疋綾一百疋爲子儀纒頭之費極歡而罷舊俗賞歌舞人以錦綵置之頭上謂之纒頭宴饗加惠借以爲詞又曰大曆中代宗勑曰王制命市納賈以觀人之好惡布帛精麤不中度廣狹不中量不鬻於市漢詔亦云纂組文繡害女工也朕思以恭儉克巳敦朴化人毎尚素玄之服庶齊金土之價而風俗不一踰侈相髙浸弊於時其來自乆耗縑繒之夲資錦綺之奢異彩竒文恣其誇競今師旅未戢􅀺元不康豈使􅁋巧之功更虧恒制在外所織造大張錦軟錦瑞錦透背及大􅰃錦竭鑿六硬巳上錦獨窠文紗四尺幅及獨窠呉綾獨窠司馬綾等並冝禁斷其長行髙麗白錦􅄂色錦及常行小文字綾錦花文所織盤龍對鳯麒麟師子天馬辟邪孔鵲仙鶴芝草萬字􅀟勝及諸織差様文字等亦冝禁斷又曰張萬福爲和州刺史賊許果至楚州大掠節度使韋元甫命萬福追討未至淮隂果爲其將康自勸所逐自勸擁兵繼掠循淮南東萬福倍道追而殺之代宗發詔以勞之賜衣一襲宫錦十􅀟又曰太和中賜修指南車記里古人故金忠義男公亮緋衣牙笏錦三十疋范子計然曰錦大丈出陳留列子曰范氏之藏火子華曰􅀂能入火取得錦者從所多少啇丘開入火徃還而身不燒尸子曰夫捨而弗治則腐而棄使工女繰之以爲美錦人君朝而服之子思子曰管仲饋錦也雖惡而登朝子産練紫也雖美而不尊孔子家語淮南子曰管仲文錦也雖醜登廟子産練帛也美而不尊管雖不及聖猶文錦也子産先思後去如練帛雖温不堪爲宗廟服枹朴子曰籍孺董鄧猶錦紈之裹塵埃又曰寸錦足以知巧刺䑕足以知勇又曰寸裂之錦黻未􅀂堅完之韋布又曰小文雖巧猶寸錦細碎之珎太公六韜曰夏桀殷紂之時婦人錦繡文綺之㘴席衣以綾紈嘗三百人穆天子傳曰吉日甲子天子乃執白珪玄璧以見西王母好獻錦組百純郭璞注日純疋錦名也組綾屬音祖也西王母再拜受之又曰盛􅁎之䘮天子使襞人贈用文錦漢武内傳曰帝見西王母巾器中有一卷小黃書盛以紫錦之囊帝問此書是仙方耶不審其目可得瞻盻不王母出以示之此五岳之眞形圖也文袐禁豈汝穢質所冝佩王母即命女宋靈賔更取一圖以與武帝靈賔􅊥懷中得一卷盛以雲錦之囊王母起立手以付帝􅀃苑曰魏文侯與田子方語有兩童予衣錦而侍於君前田子曰此君之寵子乎文侯曰非也此其父死於戰此其㓜􅀌也寡人収之潜夫論曰夫攻玉以石治金以鹽濯錦以魚浣布以􅁅物故有以醜治好者矣郭子横洞􅁳記曰元鼎元年起招仙靈閣於甘泉宫西編翠羽麟毫爲廉有走龍錦有翻鴻錦西京􅄂記曰武帝時得貳師天馬以玫瑰石爲鞍轡鏤以金銀以緑地五色錦爲蔽泥王子年拾遺記曰貟矯之山名環丘東有雲石廣五百里有蠶長七寸黒色有角鱗以霜雪覆之然後作繭長一尺其色五綵織爲文錦入水不濡其質輕煖柔滑又曰周成王時因祗國致工女一人善織以五色絲内口中手引而結之便成文錦其國人來獻有雲崑錦文如雲霞有樓堞有離珠錦文似貫佩珠也有􅂐􅊢錦文似大􅂐字有列明錦文羅燈燭七幅皆廣三尺又曰周靈王起昆昭之臺以享群臣張鸞章錦文如鸞翔又曰呉趙逵之妹善書􅀞巧妙無􅀟能於指間以綵絲爲雲龍虬鳯之錦大則盈尺小則方寸神仙傳曰淮南王爲八公張錦綺之帳燔百和之香又曰左慈字元放廬江人少有神道嘗在魏武帝坐帝曰恨無蜀中生薑耳放曰亦可得也因曰吾前遣人到蜀買錦可過勑使者増市二端須􅁷即得薑還并獲使報華陽國志曰閻憲字孟度成都人名知人爲綿竹令以禮讓化民莫敢犯者有民杜成夜行得遺賄一囊中有錦二十疋求其主還之曰縣有明君何敢􅀒也陳留風俗傳曰襄邑縣南有渙水北有睢水傳曰睢渙之間文章故有黼黻藻錦日月華蟲以奉天子宗廟御服焉異物志曰錦鳥文章如丹地錦而藻繢㸦交俗人見其似錦因謂之錦鳥鄴中記曰石虎冬月施熟錦流􅂫斗帳四角安純金龍頭銜五色流􅂫或用黃地􅀶山文錦或用紫綈及小明光錦又曰織錦署在中尚方大登髙小登髙大明光小明光大愽山小愽山大茱莄小茱莄大交龍小交龍蒲桃文錦班文錦鳯皇錦朱雀錦韜文錦桃核文錦丹陽記曰闘塲錦署平關右遷其百工也江東歷代尚未有錦而成都獨稱妙故三國時魏則布於蜀而呉亦資西道語林曰陳元方遭父䘮骨立其母愍之以錦􅀍蒙其上郭林宗徃弔見而責之賔客絶百許日世􅀃曰石崇錦歩障四十里左思蜀都賦曰貝錦斐成濯色江波古詩曰錦衾遺洛浦同􅂁與我違夏侯孝􅀂集羊太常辛夫人傳曰夫人字憲英衛尉肅侯毗之女不好華麗琇上夫人子帔縁以錦不肯服從外孫胡母楊上夫人錦􅀍夫人反卧之諸􅁑亮集曰今民貧國虚決敵之資唯仰錦耳張温表曰劉禪送臣温孰錦五端魏武與楊彪書曰今贈足下錦裘二領繡尚書益稷曰予欲觀古人之象藻火粉米黼黻絺繡尚書大傳曰未命爲士得衣繡毛詩終南曰君子至止黼衣繡裳又楊之水曰素衣朱繡從子于鵠鵠曲沃邑也鵠音沃又九罭曰九罭美周公也我遘之子衮衣繡裳周禮秋官下小行人曰合六幣琮以錦琥以繡又冬官上􅀞繢曰五采備謂之繡禮記月令曰仲秋之月命有司文繡有􅁪必修其故左傳閔公曰狄伐衛公與石祁子玦寗莊子矢曰以此賛國擇利而爲之與夫人繡衣曰聽於二子春秋潜潭巴曰天子文繡布地必動絶無嗣釋名曰繡脩也文脩然也史記曰范睢􅀃昭王曰秦韓之地形相錯如繡又曰文帝所幸愼夫人令衣不得曳地帷不得文繡以示敦朴又曰楚莊王有愛馬衣以文繡漢書曰廣川王去后昭信譛􅁎榮愛視瞻意態不善疑有私時愛爲王刺方領繡􅀳灼注曰今婦人直領爲方領上刺作黼黻文也去取燒之又曰齊織作繡宣帝時呼韓邪單于來賜帛繡綺八千疋又曰武帝詞太一祝宰衣紫及繡又曰江充使匈奴拜直指繡衣御史使督三輔又曰􅁀勝之爲直指使者衣繡持斧逐捕盗賊威震州郡又曰􅄢賔刺文繡又曰刺繡文不如倚市門此言末業貧者之資也又曰霍光薨贈絮繡􅀍百領又百官表曰侍御史有繡衣直指武帝所制東觀漢記曰更始遂共謀誅百􅂛乃大㑹諸將以成其計更始取伯􅂛寳劒視之繡衣御史申屠建隨獻玉玦更始竟不能發又曰李忠獨不掠財物上曰我欲賜之諸君無望乎取大驪馬及繡􅀍以賜忠魏志曰張旣爲尚書出爲雍州刺史太祖謂旣曰還君本州可謂衣繡晝行矣魏略曰大秦國有金縷繡色綾其國利得中國絲素解以爲胡陵􅀳中興書曰中宗所幸鄭夫人衣無文繡後魏書曰王憲爲并州刺史還京師以憲年老特賜錦繡布帛珎羞禮膳管子曰桀女樂三萬人無不服文繡衣裳也墨子曰古之人未知爲衣服衣皮帶茭今則厚歛百姓以錦繡文彩靡曼衣范子計然曰能繡細文出齊上價疋二萬中萬下五千也孫卿子曰天子尊重無上矣衣被則五綵􅄂間色重文繡莊子曰楚聘莊子莊子曰子不見夫犧牛乎衣以文繡入於太廟雖欲爲􅀌犢其可得乎淮南子曰繡爲􅀍則冝爲冠則議國語齊桓公曰昔吾先君襄公陳妾數百食必梁􅁏衣必文繡帝王世紀曰紂不服短􅄄處於茅屋之下必將衣繡遊於九重之臺賈􅁩曰繡是古天子之服今冨人大賈嘉㑹召客以􅀍牆屋􅀃􅁐曰􅀳平公使叔向聘呉呉人飾舟以送之左百人右百人有繡衣而豹裘者有錦衣而狐裘者歸以告平公平公曰呉其亡乎又曰鄂君乗青翰之舟張翠蓋越人擁檝而歌曰心恱君兮君不知於是鄂君舉繡被而覆之楊子法言曰今之學也非獨爲華藻又從而繡其鞶恱喻今學煩多也鹽鐵論曰古庶人老耄而後衣絲其餘則麻枲而巳故命曰布衣今冨者綺繡羅紈素綈水綿論衡曰齊郡能刺繡恒女無不能者襄邑能織錦恒婦無不巧者目見而手狎也又曰刺繡之師能縫帷裳網縷之工不能織錦儒生能爲文吏文吏不能爲儒生也文吏一旦在位則鮮冠利劒一歳典職則田宅併集又曰繡之未刺錦之未織絲帛何以異哉反其加五采之功施針縷之飾則文章煥燿學士有文章其猶絲帛布色之功􅁊譚新論曰陽城子張名衡蜀郡人王翁與吾俱爲講樂􅀕酒及寢疾預買棺槨多下錦繡立被發􅃁崔贑易林离之大過曰􅀍繡夜行不見文章安㘴玉堂乃無咎殃洞􅁳記曰甘泉有霞光繡藻龍繡連煙繡王子年拾遺記曰孔子生之夕有麟吐玉書於闕里人家乃以繡紱繫麟角而去又曰呉主孫權常歎魏蜀未夷軍旅之隟思得善􅀞者使圖作山川地形軍陣之象趙夫人曰丹青之色易歇滅不可爲乆寳妾能刺繡作列國圖於方帛上冩五岳河海城邑行陣之形進於呉主時人謂之針絶呉越春秋曰呉王死辭曰不忍見伍子胥吾死必結璧連組以幕吾目恐其不蔽即復重羅繡三㤿以爲奄明生不昭我身死不見我形吾何言哉物理論曰世傳有夫死而婦許以不嫁者誓以繡衣禭以衣尸納諸棺焉後三年婦出適迎有日矣有行道人夜求人家􅀫向晨主人語之婦約之辭􅀉所誓之衣曰子到􅀂千里當逢之還此衣焉或者出門到所言處果見迎車具以事告還其繡衣婦遂自經而死又曰夫論事比􅀋不得其體雖飾以華辭文以美言無異錦繡衣掘株管弦樂土梗非其趨也世􅀃曰曹植妻衣繡太祖登臺見之以違制命還家賜死戒經六禽變曰寅爲衣裳文繡夢書曰錦繡爲憂事有文章夢得錦繡憂縣官也班固詩曰長安何紛紛詔葬霍將軍刺繡􅀍百領縣官給衣衾張衡四愁詩曰美人贈我錦繡叚何以報之青玉案班固與竇將軍牋曰固於張掖縣受賜虎頭繡鞶囊一􅀟慕容晁與顧和書曰今致繡鞾一量太平御覽卷第八百一十五
