front:
  text: 太平御覽卷第五百六十四
  hash: sha256:0e0f91d3ccc216bda85cbdd796cb65b972568b48a07780ba9bc2eaeb94a8aa3b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_564-1a}
body:
  text: 樂部二雅樂中傳曰呉季札來聘請觀於周樂使工爲之歌周南召南曰美哉始基之也猶未也猶有啇紂未盡善也然勤而無怨矣爲之歌邶􅅠衛曰美哉淵哉憂而不困者也吾聞衛康叔武公之徳如是是其衛風乎爲之歌王曰美哉思而不懼其周之東乎爲之歌鄭曰美哉其細巳甚民弗堪也是其先亡乎爲之歌齊曰美哉泱泱乎大風也表東海者其大公乎爲之歌􅃎曰美哉蕩蕩乎樂而不􅁋其周公之東乎爲之歌􅁗曰美哉此之謂夏聲夫能夏則大大之至也其周之舊乎爲之歌魏曰美哉渢渢乎大而險儉而易行以德輔此則明主也爲之歌唐曰思􅀷哉其有陶唐氏之遺民乎不然其何憂之逺也非令德之後誰能􅀂是爲之歌陳曰國無主其能乆乎自鄶以下無譏焉爲之歌小雅曰美哉思而不貳怨而不言其周德之衰乎猶有先王之遺民焉爲之歌大雅曰廣哉熈熈乎熈熈和樂聲也曲而有直躰其文王之徳乎爲之歌頌曰至矣哉盛德之所同也見舞象箾􅀯籥者曰羙哉猶有所憾見舞大武者曰羙哉周之盛也其􅀂此乎見舞詩韶護者殷湯樂也曰聖人之弘也而猶有慙德聖人之難也見舞大夏者禹之樂也美哉勤而不德非禹其誰能及之見舞韶箾者舜之樂也曰至矣哉大矣如天之無不覆也如地之無不載也雖甚盛德其蔑以加此矣􅀂有他樂吾不敢請巳又曰宋公享晉侯於楚丘請以桑林桑林殷天子樂名也荀罃辝荀偃士丐曰諸侯宋魯於是觀禮宋王者後魯以周公故皆用天子禮樂故可觀也魯有褅樂賔登用之禘三年太􅀕則作四代之樂也別􅀕群公則用諸樂也宋以桑林享君不亦可乎言俱天子樂也舞師題以旌夏旌夏大旌也題識也以大旌表識其行列也晉侯懼而退入於房旌夏非常卒見之人心偶有所畏卜桑林見崇見於卜兆也荀見偃士丐欲奔請禱焉奔走還宋禱謝荀罃不可曰我辝禮矣彼則以之猶有􅀑神於彼加之言自當加罪於宋晉侯有聞又曰晉與諸侯伐鄭鄭人賂晉侯以師悝師觸師蠲皆樂師名歌鍾二肆肆列也懸十六爲一肆三十二枚也及其鎛磬女樂二八晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之魏絳於是乎始有金石之樂禮也大夫有功則賜樂也論語曰師摯之始關雎之乱洋洋乎盈耳哉魯太師摯識關雎之聲而首理其乱者洋洋乎盈耳德而美之又曰樂云樂云鍾鼓云乎哉言樂不但崇此鍾鼓而巳所貴者貴其移風易俗也又曰子語魯太師樂曰樂其可知也始作翕如也始作謂金奏時聞金作人皆翕如變動之㒵從之純如也從讀曰縱縱之謂八音皆作純如感和之皃皦如也繹如也以成皦如使清別之皃也繹如志意條逹又曰子謂韶盡美矣又盡善也韶舜樂也美舜自以德禪於堯又盡善謂太平也謂武盡美矣未盡善也謂周武王樂美武王以此功定天下未盡善致太平孝經曰移風易俗莫善於樂爾雅曰宫謂之重商謂之敏角謂之經徴謂之迭羽謂之栁郭璞注皆五音之列名其義未詳史記曰趙簡子疾五日不知人扁鵲曰昔秦繆公甞如此五日不知人七日乃窹語大夫曰我之帝所甚樂與百神遊于鈞天廣樂九奏萬舞不􅀋三代之樂其聲動人心又曰樂所以上事宗廟下以變化􅀺庶又曰凢樂者使萬民感蕩滌雅穢斟酌以飾厥性又曰太史公曰音樂者所以動盪血脉通流精神而和正心也又曰凢音由於人心天之與人相通如影之象形響之應聲也故爲善者天報之以福爲􅁖者天報之以殃其自然者也故舜作五􅃶之琴歌南風之詩而天下治紂爲朝歌北鄙之音身死國亡舜之道何弘也紂之行何隘也夫南風之詩生長之音也舜樂好之樂天下同意得萬國之歡心故得天下也夫朝歌者不時也北者敗也鄙者陋也紂樂好之萬國殊心諸侯不附百姓不親天下叛之故身死國亡漢書曰聲者蕩滌人之邪意全其正性也啇章也物成熟可章度也角觸也物觸地而出戴芒角也宫中也居中央暢四方唱始施生爲四聲納也徴祉也物盛大而畨祉也羽宇也物聚藏宇覆之也恊之五行則角爲木五常爲仁五事爲皃啇爲金爲義爲言徴爲火爲禮爲視羽爲水爲智爲聽宮爲􅁟爲信爲思以君臣民事物言之則宫爲君啇爲臣角爲民徴爲事羽爲物又曰樂者四暢交於中而發作於外此先王立樂之方也又曰樂者歌九德誦六詩是以薦之郊廟則􅀑神享之也又曰夫樂通神明安民庶故聽者無不虚巳竦神恱而成流是以海内徧知上德􅀍服其風光輝日新化上而遷善而不知所以然至於萬物不夭天地順而嘉應舉故詩曰磬管鏘鏘降福穣穣魏志曰太祖以杜夔爲軍謀􅀕酒叅太樂事因令創制雅樂夔善鍾律聡思過人絲竹八音靡所不能唯歌舞非所長散􅀐侍郎鄧静尹啇善詠雅樂歌師尹胡能歌宗廟郊祀之曲舞師馮肅時知先代諸舞惣究研精逺考經誥近採故事教習講律備作樂器復先代之樂皆自夔始也呉録曰呉中呼周瑜爲周郎瑜精意音樂三爵之後其有闕誤瑜必知之而頋時呉人謡曰曲復設周郎頋宋書臧嘉傳曰武帝入京城進至建鄴桓􅀇走武帝使喜入宫収圖書器物封府庫有金飾樂器武帝問喜卿欲此乎喜正色曰主上幽逼播越非所將軍首建大義劬勞王室雖復不肖實無情於樂帝􅀏曰聊以戯耳齊書蕭惠基傳曰自宋大明巳來聲􅇊所尚多鄭衛而雅樂正聲鮮有好者惠基解音律尤好三祖曲及相和歌每奏輙賞恱崔鴻十六國春秋曰後􅁗録姚興傳曰濟南公邕字子和興之弟也尤喜音樂皆能度其盈虚増改曲調世咸傳之号濟南新調後魏書曰元孚封萬年郷男永安末樂器殘鈌莊帝命孚修之上表曰昔太和中故中書􅁥髙閭太樂令公孫崇修造金石數十年間乃奏成功時大集儒生考其得失太常卿劉芳請別營造乆而方就復召公卿量校合否論者沸騰莫有適從登􅀍旨勑並見施用徃􅀊大軍入洛戎馬交馳所有樂器亡失垂盡臣至太樂署問太樂令張軋􅀛等云丞前巳來置宫懸四箱筍簴十六架編黄鍾之磬十四雖器名黄鍾而聲實夷則考之音制不甚諧韻姑洗懸於東北太蔟編於西北蕤賔列於西南並皆器象􅀂位調律不和又有儀鍾十四簴懸架首和不叩擊今便刪廢以從正則臣今據周禮鳬氏脩廣之規聲氏居句之法吹律求聲叩鍾求響損除繁重討論實録依十二月爲十二吕各准辰次當位懸設月聲旣備隨用擊奏則㑹還相爲宫之義又得律吕相生之體今量鍾磬之數各以十二架爲定奏可于時縉紳之士咸往觀聽靡不咨嗟歎服而反太傳録尚書長孫承業妙解聲律時復稱善隋書曰文帝性㳟儉不好聲妓嘗遣牛弘定樂帝曰非正聲雅樂清啇九部四舞皆令罷之又曰萬寳常不知何許人也父大通從梁將王琳歸于齊後復謀還江南事泄伏誅由是寳常􅀍配爲樂戸因而妙逹鍾律遍工八音造玉磬以獻於齊又甞與人方食論及聲調時無樂器寳常因取前食器及雜物以著扣之品其髙下宫啇畢備諧於絲竹大爲時人所賞然歴周泊隨俱不得調開皇􅀄沛國公鄭譯等定樂􅀄爲黄鍾調寳常雖爲令人譯等毎召與議然言多不用後譯樂成奏之上召寳常問其可否寳常曰此亡國之音豈陛下之所冝聞止不恱寳常因極言樂聲哀怨􅁋放非雅正之音請以水尺爲律以調器上從之寳常奉詔遂造諸樂器其聲率下鄭譯調二律并撰樂譜六十四卷具論八音旋相爲宫之法改􅃶移柱之規爲八十四卷調一百四十四律變化終於一千八聲時人以周禮有旋宫之義自漢魏以來知音者皆不能通見寳常特創其事皆哂之至是試令爲之應手成曲無所疑滯見者莫不嗟異於是損益樂器不可勝紀其聲雅淡不爲時人所好太常善聲者多排毁之又太子洗馬􅂫夔以鍾律自命尤忌寳常夔父威方用事凡言樂者皆附之而短寳常數詣公卿怨望􅂫因誥寳常所爲何所傳受􅀄有一沙門謂寳常曰上雅好符瑞有言徴詳者上皆恱先生當言從胡僧受學云是佛象菩薩所傳音律然則上必恱先生所爲可以行矣寳常然之遂如其言以荅威怒曰胡僧所傳仍是四夷之樂非中國所冝行也其事竟寢寳常聽太常所奏樂􅊄然而泣人問其故寳常曰樂聲􅁋厲而哀天下不乆相殺盡時四海全盛聞其言者皆謂爲不然大業之末其言卒驗寳常貧無子其妻因其卧疾遂竊其資物逃寳常飢餧無人贍竟餓而死及將死也取其所著書焚之曰何用此爲見者於火中採得數卷見行於丗時論哀之開皇之丗有鄭譯何妥盧賷􅂫夔蕭􅁻並討論墳籍撰著樂書皆爲當丗所用至於天然識樂不及寳常逺矣安馬駒曹妙逹王長通郭金樂等能造曲爲一時之妙又習鄭聲而寳常所爲皆歸於雅此軰雖公議不附寳常然皆心服謂以爲神又曰文帝開皇六年尚因周樂命工人齊樹提撿校樂府改換聲律益不能通俄而沛公鄭譯奏上請更修正於是詔太常卿牛弘國子􅀕酒辛彦之國子􅀶士何妥等議正樂然淪繆旣乆積年議不定帝怒曰我受天命七年樂府猶歌前代功德命治書侍御史李諤引弘等下將罪之奏曰武王剋殷至周公相成王始制禮樂所事體大不可速成帝意乃解又曰開皇中亡齊伎曹妙逹安馬駒等以藝遊三公之家新聲變曲傾動當丗天子不能禁也帝令妙逹理郊廟樂咸冩傾杯行天之聲萬寳常觀於樂署部􅇊樂中唯百濟樂清有歌人間謳謡之曲爲耳目之娯者不可勝載唐書曰鄭從讜在汴時以兄處誨嘗爲鎮師殁于是郡訖一政受代不於公署舉樂又曰王涯爲太常卿文宗以樂府之音鄭衛太甚欲聞古樂命涯詢於舊工取開元時雅樂選樂童按之名曰雲韶樂樂曲成涯與太常丞李廓少府􅁥􅁃丞慮押樂工獻於梨園亭帝按之於㑹昌殿上恱賜涯等錦綵又曰乹元􅀄上謂于休烈曰古聖人作樂以應天地之和以合隂陽之序則人不夭札物不疪癘且金石絲竹之噐也人比親享郊廟每聽懸樂宮啇不倫或鍾声失度集樂工考磬來朕當於内自定太常集樂考試數目審知差錯然後令别鑄造磨刻及事畢上臨三殿親試考擊皆合五音群臣稱慶又曰祖孝繫隨毛爽授律皆得爽之法一律而生五音十二律爲而六十音因而六之故有三百六十音以當一􅀊之日又祖􅄒沉重依淮南本數用京房舊術求之得三百六十律各因其月律而爲一部以律數爲母以氣候為子以一中氣所有以日爲子以母命子隨所多少分直􅀊以配七音起丁冬至以黄鍾爲宫太簇爲啇林鍾爲徴南吕爲羽姑洗爲角其餘月建皆依運行毎月各以本律宫爲旋宫之義由斯著矣武德之樂漢尅暴秦之從所作也言以武德除亂使天下樂行也四時之樂文帝之作也言以巳節儉澤施於四海天下和平也又曰正月享西京太廟大樂令裴知古謂萬年令元行冲曰金石諧和當有􅁻慶之事其在唐室子孫乎其月中宗即位復國爲唐國史􅀘曰宋沉善音律太常乆亡徴調沉考鍾律得之太平御覽卷第五百六十四
