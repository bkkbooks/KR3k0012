front:
  text: 太平御覽卷第一百六十一
  hash: sha256:7d961f5bfc48db137e0156d82b19d90f590475f10bd79dd9f4e58d7fa3fa699d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_161-1a}
body:
  text: 州郡部七河北道上懷孟衛相洺邢冀趙鎭定瀛懷州元和郡縣圖曰懷州河内郡禹貢冀州之域覃懷之地周爲畿内及衛䢴雍三國春秋時屬􅀳七國時屬韓魏二國􅁗兼天下滅衛爲三川郡禹貢曰覃懷底績至于衡漳後漢書曰光武定河内而難其守問於鄧禹曰諸將誰可使守河内者禹曰昔髙祖任蕭何於􅀜中無復西顧之憂今河内帶河爲固戸口殷實北通上黨南迫洛陽宼恂文武備足非此子不可也乃拜恂爲河内太守恂移書屬縣講兵肄射伐湛園之竹以爲矢養馬收租以給軍左傳曰周與鄭人蘇忿生之田州陘隤懷州今河内縣又曰襄王賜􅀳文公以陽樊温原攅茅之田晉於是始啓南陽在􅀳山之南河之北故曰南陽元和郡縣圖曰河内縣春秋野王邑也左傳曰􅀳人執晏弱于野王漢志曰武德縣屬河内始皇東巡自以武德定天下故名之也十道志曰脩武本寗邑也韓詩外傳曰武王伐紂勒兵於寗故改曰脩武韓非書曰􅁗昭王敗趙長平西伐脩武漢書曰漢武帝將幸緱氏至汲縣之新中郷得南越相吕嘉首因立爲􅀗嘉縣孟州圖經曰孟州河陽郡禹貢冀豫二州之境則武王伐紂㑹盟津是也周爲畿内蘇忿生之邑後爲􅀳邑左傳曰􅀳侯召王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩于河陽北齊書曰神武使潘岳鎭北城又使髙永樂守南城以備西魏又東魏所築中潬城仍置河陽􅀜故有河陽三城侯使冀州圖經曰河陽在河内郡南六十四里有宫有􅀜􅀳書曰潘岳才名冠丗爲衆所嫉出爲河陽令左傳隱三年曰鄭􅀕足帥師取温之麥秋又取成周之禾又僖十年狄滅温今河内温縣温子奔衛周襄王以地賜􅀳文公衛州元和郡縣圖曰衛州汲郡禹貢冀州之域後爲殷都衛縣界朝歌是也戰國時屬魏􅁗屬河東郡漢爲汲縣地地理志曰河内殷之舊都周旣滅殷分其畿内爲三國詩風邶庸衛是也邶以封紂子武庚鄘管叔尹之衛蔡叔尹之以監殷人謂之三監史記曰周旦以成王命興師殺武庚禄父殺管叔放蔡叔以殷餘民封康叔爲衛君居河淇之間故商墟漢志曰朝歌屬河内紂所都周武王弟康叔所封更名衛王莽曰雅歌劉子曰邑號朝歌墨子廽車後漢書曰虞詡爲朝歌令多盗連年不解親舊多勞弔之曰得朝歌何衰也詡􅀏曰難者不避易者必從臣之節也詡謁河内太守馬稜稜曰君儒者乃在朝歌甚爲君憂之詡曰賊犬羊相聚以求飽暖耳去敖倉不過百里不知取以爲粮青冀流民不知掠以爲衆守其阨塞此爲斷天下之右臂也今則不然此無大計之効也詡悉平之春秋後序曰太康五年呉宼始平余自江陵還襄陽解甲休兵乃申予舊意修成春秋釋例及經傳集解始訖㑹汲郡汲縣有發其界内舊塚者得古書皆簡編科斗文字發塚者不以爲意徃徃散亂科斗書乆廢推㝷不能盡通始者藏在祕府余晚得見之劉澄之山川古今記曰􅀺陽古􅀺國也詩曰􅀺侯寓于衛是也相州元和郡縣圖曰相州鄴郡禹貢冀州之域春秋時地屬􅀳戰國時屬魏魏文侯使西門豹守鄴是也􅁗併天下爲邯鄲上黨二郡之地漢髙帝分置魏郡治鄴尚書曰河亶甲居相後魏書曰道武幸鄴訪立州名尚書崔光對曰昔河亶甲居相冝曰相州道武從之漢志曰魏郡領鄴館陶斥丘等一十八縣後魏書曰文帝太和十八年卜遷都經鄴登銅雀臺御史崔光等曰鄴城平原千里漕運四通有西門使起舊迹可以饒冨在德不在險請都之孝文曰君知其一未知其二鄴城非長乆之地石虎傾於前慕容滅於後國冨主奢􅁀成速敗且西有抂人山東有列人縣北有栢人城君子不飲盗泉惡其名也遂止魏書曰黄武二年以魏郡東部爲陽平郡西部爲廣平郡廣平陽平魏平三郡爲三魏也圖經曰安陽紂都也在淇洹二水之間本殷墟所謂北􅃁是也戰國䇿曰紂昔聚兵百萬左飲淇水使竭右飲洹水不流􅀳書載記曰石勒諸將佐議欲都鄴將攻三臺張賔進曰三臺險固攻守未可卒下於是進襄國漢志曰内黄屬魏郡春秋呉子􅀳侯㑹于黄池今黄澤在西陳留有外黄故加内云洺州十道志曰洺州廣平郡屬禹貢冀州之域春秋時爲赤狄之地後屬􅀳左傳􅀳荀林父敗赤狄于曲梁是也七國時屬趙秦併天下爲邯鄲郡漢􅀄置廣平國禹貢曰覃懷底績至于衡漳衡漳在肥郷縣左傳曰公㑹單頃公及諸侯同盟于雞澤杜注云雞澤在廣平曲梁縣漢志廣平國領縣十六武帝征和二年改爲平于國宣帝復故王莽曰冨昌十道志曰洺水縣本漢斥漳縣也漢志曰以其國斥鹵故云斥漳又曰曲周屬廣平國莽曰直周圖經曰邯鄲單盡也邯山名謂邯山之所盡也邢州十道志曰邢州鉅鹿郡禹貢冀州之域秦併天下於此置信都縣屬鉅鹿郡左傳曰凡蔣邢茅周公之胤也又成十五年楚大夫申公奔􅀳􅀳以爲邢大夫東陽􅀳之山東魏郡廣平是郡國志曰邢州尚書坊東平地周百餘歩其所鳴響人馬行上轟轟有聲掘之即火出十三州志曰鉅鹿唐虞時大麓之地尚書堯試舜百揆納于大麓麓則林之大者堯之禪舜欲使天下皆見之故合羣臣與百姓納之大麓之野然後授受以明巳禪也張耳傳曰髙祖從平城還過趙趙王自上食禮甚卑髙祖箕踞趙相貫髙等乃壁人栢人要之上過欲􅀫心動問縣名爲何曰栢人上曰栢人者迫於人也不宿而去栢人今堯山縣冀州十道志曰冀州信都郡元和郡縣圖曰春秋時屬􅀳七國時屬趙在秦屬鉅鹿郡李公緒趙記曰趙孝成王造壇臺之宫爲趙都朝諸侯故曰信都史記曰秦時有客􅀃張耳曰兩君羈旅難以獨立立趙後扶以義可以就功乃求趙歇立爲趙王居信都漢書曰項羽分趙立張耳爲常山王居信都改曰襄國􅀳書曰張賔􅀃石勒曰襄國因山慿險實形勢之國可都之遂都於此晉書曰初童謡云古在左月在右讓去言或入口古在左月在右胡字也讓去言爲襄也或入口爲國也㝷爲石勒所都後漢書曰王郎僣號河北悉應光武自薊南行至下􅀶惶惑不知所之有白頭父在道傍指曰努力信都爲長安守光武即馳赴信都太守任光開門出迎魏志曰韓馥爲冀州牧公孫瓉欲襲之􅀽紹使髙幹諷馥令以冀州讓紹馥素恇怯因然其計馥長史耿武諌曰冀州雖鄙帶甲百萬榖支十年􅀽紹􅀌客窮軍譬如嬰兒在股掌之上絶其乳哺立可餓殺柰何以州與之馥不從以州與紹盧植冀州風􅁟記曰冀州聖賢之泉藪帝王之舊地十三州志曰冀州之地古京也人患剽悍故語曰仕宦不偶值冀部後漢書曰王郎起光武自薊南馳及至南宫遇大風雨光武引車入道傍空舎馮異抱薪鄧禹􅋹火光武對竈燎衣異進麥飯兎肩魏志曰太祖拔鄴領冀州收或􅀃太祖冝復古置九州冀州所制者廣天下服矣太祖將從之荀彧曰􅀂是則冀州當得河東馮翊扶風西河幽井之地所奪者衆今分冀州將皆動心一旦生變天下未昜圖也公從之趙州元和郡縣圗曰趙州趙郡禹貢冀州之域春秋時屬􅀳戰國時屬趙秦爲邯鄲郡平􅁄縣地又趙國兩漢及魏以封建子弟趙記云女子盛飾冶容習絲竹長䄂傾絶諸侯左傳曰師及齊師衛孔圉及鮮虞伐􅀳取􅁄蒲即今平􅁄縣也史記蘇秦􅀃趙曰當今之時山東之建國莫強於趙趙地方二千里西有常山南有漳河東有清河北有燕代漢志曰元氏屬常山縣王莽曰井􅀜亭趙公子元之封邑故曰元氏後漢書曰光武北征彭寵隂后從行生明帝於元氏傳舎章帝幸元氏祠光武顯宗於縣舎又祠顯宗於始生堂皆奏樂用新詩復元氏祖十道志曰髙邑縣趙房子之邑竹書紀年作魴子漢以爲鄗縣鄗音大各反後漢復改爲髙邑後漢書曰光武至鄗羣臣請即帝位於是設壇􅂣於鄗南千秋髙亭五成陌今趙州栢郷縣鎭州十道志曰鎭州常山郡元和郡縣圖曰禹貢冀州之域周爲并州地春秋時爲鮮虞國戰國時屬趙秦兼天下爲鉅鹿郡十三州志曰真定夲名東垣以河東有垣故此加東耳漢書曰髙帝時代相陳豨反使趙利守東垣上自攻之不下卒罵帝帝怒増兵急攻城斬罵者改曰眞定漢志曰井陘屬常山郡穆天子傳曰天子獵于鉶山注曰燕趙謂山脊爲鉶即今井陘是史記曰秦始皇十七年改趙王剪下井陘元和郡縣圗曰靈壽縣夲中山國都也十三州志曰中山武公本周之同姓其後桓公不恤國政晉太史餘見周王王問之諸侯孰先亡對曰中山之俗以晝爲夜以臣觀之中山其先亡乎其後魏樂羊爲文侯將拔中山封之靈壽戰國䇿曰九門縣本有九室而居趙武靈王改爲九門縣史記曰趙惠王三十八年藺相如城九門大城定州十道志曰定州􅀶陵郡禹貢冀州之域虞舜十二州蓋并州之域春秋時鮮虞白狄之國後改爲中山國張曜中山記曰郡理中山以其城中有山故謂之中山又云郡治中人城漢志曰盧奴縣屬中山國盧水出焉圖經曰安喜縣即古盧奴縣也有黒水故池深而不流俗謂黒水爲盧不流爲奴漢書外戚傳曰宣帝母王夫人微時與父泣别於栁􅀫城在豐義縣十道志曰唐縣本春秋時鮮虞邑也漢爲唐縣地漢志曰唐縣屬中山國王莽曰和親故堯國也堯爲唐侯邑於此堯山在唐東北望都界孟康曰晉荀吴伐鮮虞入中人今中人亭是應劭風俗通曰中人城北四十里有左人亭鮮虞故邑左人亭即唐縣也漢書曰望都屬中山國莽曰順調堯山在北堯母慶都山在南登堯山見都山故以爲名圖經曰陘邑縣本七國時中山國之苦陘縣也史記曰李克爲中山相苦陘之吏上計入多於前克曰苦陘上無山林之饒下無藪澤牛馬之息而入多於前是擾亂吾民也於是免之十道志曰鼔城縣春秋鼔子之邑漢下曲陽之地春秋左氏傳曰晉荀吴圍鼔以鼔子鳶鞮歸鉅鹿下曲陽有鼔衆十三州志曰中山有上曲陽故加下耳圖經曰北平縣本秦曲逆縣之地屬中山國漢書曰髙祖北征還過曲逆上其城望室甚大曰壯哉縣吾行天下獨見雒陽與是耳於是封陳平爲曲逆侯後漢書曰章帝北廵北岳以曲逆名不善改爲蒲隂瀛州十道志曰瀛州河間郡禹貢冀州之域舜十二州爲并州之境春秋時屬燕趙二國􅁗井下爲河間郡漢爲河間國郡國志曰瀛州以地帶滄海物産滋瀛故以名之又云以瀛海爲名漢志曰河間國領縣四樂成候井武隧弓髙王莽曰朔定應劭曰在南河之間漢書曰武帝時望氣者云西北有女極貴遂訪之於河間得鈎弋夫人十道志曰􅀶野縣夲漢蠡吾縣地十三州志曰太􅀄元年蠡吾侯去入繼孝質是爲孝桓帝追尊其父蠡吾侯翼爲孝崇皇帝陵曰􅀶陵因改爲􅀶野縣漢志曰髙陽縣屬􅃰郡王莽曰髙亭以其在髙河之陽故曰髙陽漢志曰東平舒屬渤海郡以代郡有舒故此加東也即平舒縣太平御覽卷第一百六十一
