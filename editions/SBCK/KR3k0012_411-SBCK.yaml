body:
  text: 人事部五十二孝感孝經左契曰元氣混沌孝在其中天子孝天龍􅀒圖地􅀛出書大孽消㓕雲景岀㳺孝經援神契曰庶人孝則木澤茂浮珍舒恪草秀水出神魚此庶人謂有德不仕若曾子之孝千里感母能使其域致珍也東觀漢記曰明帝光武弟四子隂后所生即祚長思逺慕至踰年迺率諸王侯公主外戚郡國計吏上陵如㑹殿前禮正月上謁原陵夢先帝太后如平生親率百官上陵其日降甘露積於樹百官取以薦㑹畢上伏御牀視太后鏡奩中物感慟悲涕令易脂澤粧具左右皆泣莫能仰視又曰姜詩字士遊廣漢雒人遭值年荒與婦傭作養母賊經其里束兵安歩云不可驚孝子母好飲江水児常取水溺死夫婦痛恐母知詐云行學歳作衣投于江中俄而涌泉出於舎側味如江水井旦出鯉魚一􅀟謝承後漢書曰方儲字聖明丹陽歙人㓜䘮父事母母終自􅀒土成墳種竒樹千株白兎遊其下魏略曰程堅字謀角南陽人居貧以磨鏡給養母喪哀號􅇫下有馬毎聞堅哭輙淚岀暫輟芻草晉書曰王祥性至孝継母朱氏不慈猶令除掃牛下祥愈恭謹父母有疾衣冠不解母令守㮈實毎風雨至抱樹而立母又思黄雀炙忽有十數黄雀飛入幕以共母食又母冬月欲食生魚祥脫衣剖冰求之􅀟鯉躍出郷里以爲孝感所致又曰吴隱之字處黙年十歳丁父憂毎號哭行人爲流涕家貧無人鳴皷毎至號哭之時有􅀟鶴警呌及祥練之夕復有群鴈俱集時人咸以孝感所致晉中興書曰何􅄾字萬倫遭母憂停柩在殯爲鄰火所逼煙熖巳交家乏僮役計無從出乃匍匐棺所號哭而巳俄而風止火息堂屋一間乃免又曰烏程吴逹徃經飢饉父母兄嫂及群從小㓜之親十有三人逹病篤鄰里咸葦褁衣而埋之親属皆盡存者唯逹夫妻而巳家徒四壁晝則傭賃夜還燒塼伐木夜在山中屢遇虎虎下道避之夫妻勤苦朞年中成七墓十二棺鄰里嘉上其志義葬日悉出助之太守張崇之義其志行加羔鴈之禮命􅀘功曹史逹以門寒固辭不就蕭子􅂋齊書曰永興王氏女年五歳得毒病兩目皆盲性至孝年三十父死臨尸一呌眼皆血出小妺娥舐其血左目即開時人稱爲孝感崔鴻十六國春秋前趙録曰劉殷七歳䘮父哀毀過禮曽祖母王氏盛冬思堇殷年九歳乃於澤中慟哭収涙視地見有堇生焉得斛餘而歸食而不減至堇生乃盡其夜夢人謂殷曰西籬下有粟窹而掘之得粟十五鐘焉銘曰七年粟百石以賜孝子劉敦自是食之七年乃盡又曰王延字延元西河人也九􅀊喪母後母卜氏遇之無道延供事彌謹卜恒取蒲穰及敗麻頭與延貯衣其姑聞而問之延知不言卜盛冬􅃙延云思生魚延求魚不􅀗卜杖之流血延尋汾叩凌而哭得生魚一􅃗長五尺卜食之積日不盡爾乃心寤撫延如親子􅁗記曰符健皇始元年晋梁州刺史司馬勲入秦州􅀗尚書趙琨煞而棄其尸琨子煥求父尸不得乃悲號不已俄有群鳥悲鳴從山而來來而復反尋鳥向山而得父尸南史曰潘綜吴興烏程人也孫恩之亂妖黨攻破村邑綜與父驃共走避賊驃年老行遲賊轉逼驃語我不能去汝走可脫幸勿俱死驃因之坐地綜迎賊叩頭曰父年老乞賜生命賊至驃亦請賊曰兒年少自能走今爲孝子不去老子不惜死乞活此兒賊因斫驃綜抱父於腹下賊斫綜頭面凢四創綜當時悶絶又一賊從傍來相謂曰卿欲舉大事此兒以死救父尔何可煞煞孝子不祥賊乃止父子乃得免齊書曰匡昕字令先廬陵人有至性隱金華山服食不與俗人交母病亡已經七月昕奔還號呌母即蘇皆謂孝感所致齊春秋曰宗元卿字希符早􅀌爲祖母所養祖病元卿在逺輙心痛大病則大痛小病則小痛如此常也又曰焦華父遺曽病甚冬中思􅀲華忽夢人謂之曰聞爾父思􅀲故送助養呼從者進之華跪受寤而􅀲在手香非常也父食之而病愈又曰劉靈哲字文明母病祈禱至多忽夢一人以藥與之曰煑服之即差驚窹於枕間得所夢之藥似竹根服之立差餘根於齋前種葉似􅝀茈莫有識者又曰蕭叡明字景懠在計切母病風積年晝夜祈禱時寒叡明下淚爲氷筯額上叩血出亦氷不流忽有一人以小石凾授之曰此能治丈夫百病叡明受之忽不見人以亟奉母唯有三寸絹丹書爲日月字母即平愈又曰解叔謙字楚梁母有疾於夜庭中祈祠聞空中云此疾無他得丁公藤爲酒便差即詣醫及本草皆無識者乃求訪至冝都遥覩山中一老翁伐木問其所用荅曰此丁公藤治風尤驗叔謙伏地流涕具􅅃求意此公與之四叚并示漬酒法叔謙拜領受之復視翁不見依法爲酒母疾頓愈梁書曰陸囊字師伯常卒心痛醫方湏三斗粟漿時屬凝冬日又暮矣求乞無所忽有老人詣門貨漿量如方斛始欲酬直無何失之時以襄孝感致焉又曰􅆇盾有孝性隨父􅀫直廷尉母劉氏在宅暴亡盾左手中指痛不得寢及曉宅信果報凶問其感通如此又曰甄恬字彦約數歳䘮父哀戚有若成人年八􅀊問其母恨不識父悲泣累日忽云有見形􅃺即其父也及母亡廬于墓有鳥玄黄色集于廬􅀣恬哭即鳴止則無聲陳書曰吴明徹㓜􅀌性至孝年十四感墳􅉷未修家貧無以取給乃勤力耕種時天下亢旱苗稼燋枯明􅜂哀憤毎之田中號哭仰天自訴居數日有田還者云苗已更生明􅜂疑其欺已及徃如言秋而大􅀗足充葬用三國典略曰柳遐母甞乳間發疽醫去湏人吮膿遐應聲即吮旬日遂瘳咸以爲孝感所致後魏書曰王崇字乾邕陽夏雍丘人也母亡扶而後起􅁂髮墮落未及遷葬權殯宅西崇廬於殯所晝夜哭泣鳩鴿群生有一小鳥素質黒眸形大於雀拪於崇廬朝夕不去母䘮始闋復丁父憂哀毀過禮是年陽夏風雹所經之處禽獸􅁀死草木摧折至崇田畔風雹便止禾麦十頃無所損落及過崇地風雹如􅀄咸稱至行所感又曰吴逺逹河東聞憙人父母爲人所煞四時號慕悲感郷鄰及長報仇避地永安後欲改葬歳月淹乆亡失墳墓連年於聞熹舊郷推尋弗􅀗號哭之聲晝夜不止周逰廵歴呌訴神祈忽於逺逹足下地䧟得父銘記因遷葬曽祖已下三丗九䘮後周書云張元字孝始芮城人年十六祖䘮明三年元居常憂泣遂請七僧燃七燈七日七夜轉藥師經行道言曰元爲孫不孝使祖䘮明今日燃燈光普施法界願祖目見明元求代闇如此七日其夜夢見一老翁以金鞞療其祖目謂元曰勿憂悲也三日之後祖目必差如期果明唐書曰豫州人許坦年十歳餘父入山採藥父爲猛獸所噬即號呌以杖擊之獸遂奔走父以得全太宗聞而謂侍臣曰坦雖㓜童遂能致命救親至孝自􅂨深可嘉尚授文林郎賜物五十叚又曰􅀶州梁文貞􅉑州閿郷人少從征役比廻父母皆卒文貞恨不􅀗終養乃穿壙爲門磴道出入晨夕灑掃其中結廬墓側未甞蹔息自是不言三十年家人有所問但畫字以對其後山水衝断驛路更於原上開道經文貞墓前由是行旅之逺近莫不欽歎有甘露降塋前樹白兎馴擾開元􅀄縣令崔季友刋石以紀之十四年刺史許先奏文貞孝行特絶泣血廬墓三十餘年請宣付史官又曰安金藏神龍􅀄䘮母葬於都南闕口之北廬於墓側躬造石墳石塔晝夜不息原上舊無水忽有湧泉自出又有李樹盛冬花開犬鹿相狎蕭廣濟孝子傳曰杜孝巴郡人也少失父與母居至孝充役在成都母喜食生魚孝於蜀截大竹筒盛魚二頭塞之以草祝曰我母必得此因投中流婦出渚乃見筒横來觸岸異而取視有二魚含􅀏曰必我壻所􅀉熟而進之聞者歎駭又曰邢渠失母與父仲居性至孝貧無子傭以給父父老齒落不能食渠常自哺之專專然代其喘息仲遂康休齒落更生百餘歳乃卒也又曰隗通字君相母好飲江水常乗舟檝置之深浚艱辛忽有横石特起直趍江脊後取水無復勞劇又曰辛繕字㓜文母䘮精廬旁有大鳥頭髙五尺鷄首鷰領魚尾虵頸備五色而青棲于門樹又曰文讓養母至孝及喪不用僮僕之力兄弟二人營築其墳蹔歸取糧群鳥數千衘壤俄而成墳小􅀃曰宋冝都王鏗三歳䘮母及有識問母所在左右告以早亡便思慕食祈請幽􅄀求一夣見至六歳夣見一婦人謂之曰我是汝之母鏗悲泣旦􅀃之容貌衣服事事如平生也丗􅀃曰鄭子産善事母奉命聘晉道中心痛遣人還家起居問母母曰吾忽心體不調憶想汝耳更無他也祖台志怪曰吴中書郎盛仲至孝母王氏失明仲蹔行􅃙婢食母婢乃取蠐螬蒸食之母甚以爲美不知是何物兒還母曰汝行後婢進吾食甚甘然非魚肉汝試問之旣而問婢婢服曰實是螬蠐仲抱母慟哭母目霍然立開宋躬孝子傳曰丘傑字偉跱吴興烏程人也遭母䘮以熟菜有味不甞於口病歳餘忽夢見母曰死正是分別耳何事乃爾荼苦汝噉生菜遇蝦蟆毒靈牀前有甌甌中三丸藥可取服之傑驚起果得甌甌中有藥服之下科斗子數􅂛丘氏丗寳此甌宋大明七年災火焚失之又曰陳遺吴郡人少爲郡吏母好鐺底燋飯遺在役常帶一囊毎煑食輙録其燋以貽母後孫恩亂聚得數􅂛常帶自隨及逃竄多有餓死遺食此得活母晝夜泣涕目爲失明耳無所聞遺還入户再拜號咽母豁然有聞見又曰韓靈珍東海郯人䘮母三年貧無所葬與弟靈敏共種􅋎半畒欲以營殯及􅀲熟採賣毎朝取暮復生大小如􅀄遂得充葬又曰夏侯訢字長況梁國寧陵人也母疾屢經危困訢衣不釋帶二年母不忍見其辛苦使岀便寢息訢岀便卧忽夢見其父來曰汝母病源深痼天常矜汝至孝賜藥在屋後桑樹上訢乃驚起如言得藥而取水和進之便得痊差又曰宋承字丗林父資喪葬舊塋􅀒土作墳不役僮僕一夕間土壤自髙五尺松竹生焉又曰韋俊字文髙京兆杜陵人甞與其父共有所之夜宿逆旅時多虎將曉虎遶屋號吼俊乃岀户當之虎弭耳屈膝伏而不動俊跪曰汝飢可食我不冝驚吾親老虎逡廵而退屋人皆安全又曰伍襲字丗長武陵人父没羌中乃學羌語言衣服與賔客入搆羌諸令相攻襲乗其仇戎讎羌􅀒䘮而歸葬畢因居墓所毎哭輙有鹿踞墳而鳴漢法死事之􅀌皆拜郞中而襲不忍受吏迫之乃掘室逃其中吏不知處又曰繆斐東海蘭陵人父忽患醫藥不給斐夜叩頭不寢不食氣息將盡至三更中忽有二神引鏁而至求斐曰尊府君昔經見侵故有怨報君至孝所感昨爲天曹攝録斐驚起視父巳差父云吾昔過伍子胥廟引二神像置地當是此耳又曰紀邁廬江人本姓舒以五月五日生母棄之村人紀淳妻趙氏養之年六歳本父母時來看語曰汝是我生邁泣涕告趙趙乃具言始末及年十歳傭力所得輙分二母各半淳亡無子邁乃斬衰三年本父母繼亡又並齊衰心喪三年趙欲爲娶齎酒米徃㛰家道值醉人打趙體悶忽有一狗直至衘邁衣若此者三邁心動走赴㛰家逢醉人適共舉酌於草中邁乃以檐煞二醉人趙歸得平乃詣縣首令宥之乃誓不娶後邁甞寢忽有一女言姓衛昨忽􅁀死天神矜􅉖君無妻故使相報邁具􅀃其狀母子至衛門外果如言送喪上車牛不肯動趙乃與主人具叙􅀃之主人開柩女有氣息至曉便復蘇語具說始末如趙所言遂爲夫婦趙卒邁絶復􅂫者日數四邁年五十甞病幾死夢神曰君行至孝延暦將得百歳果九十七而卒又曰王靈之年十三喪父二十年塩醋不入口􅀍病著牀忽有一人來問疾謂之曰飡橘當差俄而不見之庭中橘樹隆冬乃有三實食之病尋愈咸以至孝所感㑹稽典録曰虞國少有孝行後爲日南太守常有􅀟鴈􅀫㕔事毎出行縣飛逐其車旣卒於官逐喪還至餘姚於墓前歷三年乃去又曰沈震字彦威烏程人十歳遭飢荒忽夜中有人告震曰西籬下地中有米五十石可供養旦夕即掘之果􅀗焉風俗通曰楊範字文端齊人齊宋之亂母在縣賊中採椹藏於地夜取之進母如是非一忽於地中得米十斛上有字云米十斛賜孝子楊範以資給母劉向孝子圖曰郭巨河内温人甚冨父没分財二千萬爲兩分與兩弟巳獨取母供養􅀉住鄰有凶宅無人居者共推與之居無禍患妻産男慮養之則妨供養乃令妻抱兒欲掘地理之於土中得金一釡上有鐡劵去賜孝子郭巨巨還宅主宅主不敢受遂以聞官官依劵題還巨遂得兼養兒又曰前漢董永千乗人少失母獨養父父亡無以葬乃從人貸錢一萬永謂錢主曰後􅀂無錢還君當以身作奴主甚慜之永得錢葬父畢將徃爲奴於路忽逢一婦人求爲永妻永曰今貧􅀂是身復爲奴何敢屈夫人之爲妻婦人曰願爲君婦不恥貧賤永遂將婦人至錢主曰夲言一人今何有二永曰言一得二理何乖乎主問永妻曰何能妻曰能織耳主曰爲我織千疋絹即放爾夫妻於是索􅁝十日之内千疋絹足主驚遂放夫婦二人而去行至夲相逢處乃謂永曰我是天之織女感君至孝天使我償之今君事了不得乆停語訖雲霧四垂忽飛而去廣州先賢傳曰丁宻字靖公遭父憂寢於塚側致飛鳬一􅀟㳺宻廬旁小池後遭母喪宻至所居一􅀫故時􅀟鳬復來時人服其至孝朝野僉載曰崔渾爲侍御史清白温恭能盡色養父母母小不康輙祈幽請以身代母甞有疾渾跪請病受已有頃覺疾從十指入俄而遍身母所苦遂愈丁父艱勺飲不入口毁脊骨立無何不勝哀而卒朝野傷心御史臺記曰崔希喬清河人也以孝悌稱解􅄄臨清尉丁母憂哀毀殆至滅性服闋􅀘鄭縣尉清介公方聞乎京邑轉鄭縣丞所居堂芝草生焉一暝而葩盖盈尺矣州以􅃺申歳餘遷􅁥察出授并州兵曹轉慿翊令人吏畏愛風化大行貧弱之輩荷其仁恕時有雲如盖當其㕔事斯湏五色雜綵周於縣郭道俗仰望乆之以􅃺聞勑編諸國史尋迁司勲貟外其并州㕔前有叢葦小鳥來巢如鷦鷯矣孕􅆑􅂊數日毁而見已諭於母矣枝且不勝墜于地月餘五色成文如鵝馴擾閑睱無復驚懼泊能飛翔時歸舊所人到于今稱爲兵曹鳥􅀄居喪管城每一􅂘群鳥畢集至于萬數墻宇皆遍至有樹條折者周於原野村鄰嗟稱之毎所居其巢燕敷乳必返哺踰旬後分飛矣此孝義感通也史系曰趙儁字子竒平陽岳陽人也父聃爲縣西曹書佐嗜酒夜歸里墅撗卧途中儁年十八見父歸遲即尋迎之父酔􅀒而不勝脫已衣覆之是時冬中沍寒方甚儁單衣而已岳陽山多􅋧獸夜有豹視之爲之歧道而去將旦與父同歸縣吏異之時人以儁孝感所致父卒不呼相者自營丘封有白鵲常遊於其家􅀥樹儁毎朝夕臨鵲爲之悲鳴終䘮而去㑹潞帥劉稹反家近潞封軍士齊討民散走時儁母年八十餘唯一子乃平其父墓别以物識之輦其母入文城西山妻蹇歩捨之至山數􅀫妻方至逃難者多糇糧踴貴儁拾橡實飴之以木􅁡供膳者終歳逮稹㓕復輦其母東歸岳陽丘隴悉爲軍盗所發唯儁家墓得完復起􅊘焉母卒哀毀過制縣令京兆韋伯倫知之給米粟蠲其家㑺將葬母貧鬻其子質劑已定其夜夢一人謂曰爾舎東有錢百萬乃自發之及旦㑺自舎東手掘之果得錢符夢數焉太平御覽卷第四百一十一
