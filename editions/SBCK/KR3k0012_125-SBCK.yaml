body:
  text: 偏霸部九後涼吕光吕纂吕隆後燕慕容垂慕容寳慕容盛慕容熈慕容雲後涼吕光崔鴻十六國春秋後涼録曰吕光字丗明略陽人其先自沛遷略陽因家焉丗爲氐酋父婆樓字廣平佐命前秦官至太尉光以趙建武中生於方頭夜有神光之異故名焉年十歳與諸童兒遊戲邑里爲戰陣之法童兒咸推爲主長而身長八尺四寸目重童子左肘有肉印沉粹凝重寛簡有大量人莫之知唯王猛異之曰此非常人言之符堅舉賢良除美陽令民夷憚愛隣境肅淸遷鷹揚將軍以功賜爵􅀜內侯建元十九年以光爲使持節西討諸軍率將軍姜飛彭晃杜進等歩􅀐七萬討西域十二月至􅀛兹􅀛兹王帛純捍命不降光軍其城南五里爲一營深溝髙壘廣設疑兵爲木被甲羅之壘上以爲持乆之計二十年五月帛純乃傾財寶請救於獪胡獪胡王遣弟率二十餘萬救之胡便弓馬善矛槊鎧如連鏁射不可入乃以革索爲骨䇿馬擲人多有中者衆甚憚之姑默宿尉頭等國及諸胡外內七十萬人光遷營相接陣爲勾鏁之法精􅀐爲遊軍彌縫其闕秋七月戰于城西大敗之帛純逃奔王侯降者三十餘國進入其城城有三重廣輪與長安地等城中塔廟千數帛純宫室壯麗煥􅀂神居胡人奢侈富於生養家有蒲桃酒至千斛經十年不敗士卒淪没酒藏者相繼諸國貢􅅃屬路立帛純弟震爲王以安之光撫寧西域威恩甚著秦以光爲使持節散􅀐常侍王門巴西諸軍事安西將軍西域校尉進封順郷侯二十一年正月大饗文武博議進止衆咸請還光從之三月引還以駞二萬餘頭致外國珍異千餘品駿馬萬餘匹而還九月光入姑臧自領凉州刺史護羗校尉大安元年符丕以光爲車􅀐大將軍涼州牧領護西域大都酒泉公光始聞符堅爲姚萇所害􅁬袂哀怒三軍縞素大臨于城南傳檄諸州期孟冬大舉謚堅爲文昭皇帝十月大赦境内改建元爲大安十一月羣竂􅂆進曰長虵未殄方掃清國難宜進位元台十二月上光爲侍中中外都督隴右諸軍大將軍涼州牧酒泉公三年八月甘露降逍遙園白鷰翔于酒泉衆鷰成列而從之麟嘉元年正月麟見金澤縣百獸從之於是羣寮奉請崇進名號光從之二月僣即王位于南郊大赦改元置官司丞郎以下猶攝州縣事三年九月大廟新成追尊父爲景昭王祖爲宣公曾祖爲㳟公髙祖爲敬公龍飛元年五龍見于浩舋羣臣咸賀􅂆光稱號六月僣即天王位于南郊大赦改年備置羣司立丗子紹爲太子四年九月光寢疾十二月疾甚立太子紹爲天王光自號太上皇帝以子纂爲太尉弘爲司徒詔曰吾疾病不濟吾終之後使纂統六軍􅀪管朝政汝㳟己無爲委重二兄庶可以濟今外有強冦民心未寜汝兄弟輯睦則貽厥萬丗􅀂内相圖則禍不旋踵纂弘泣曰不敢有二心薨葬髙陵謚武皇帝廟號太祖吕纂崔鴻十六國春秋後凉録曰呂纂字永緒光之長庶子母趙淑媛少便弓馬不好書大安元年至于姑臧光臨薨執手戒之曰汝性麤武深爲吾憂開基旣難守成不易善輔永業勿聽讒言光薨紹袐不發䘮纂排閤入哭盡哀而岀紹懼以位讓之曰兄功髙年長宜承大統纂曰臣雖長陛下國家之􅃴不可以私愛而亂大倫驍􅀐吕超謂紹曰纂臨喪不哀步髙視逺􅀚其舉止恐成大變宜早除之纂聞超謀遂率壯士數百踰北城攻廣夏門入自青角門昇謙光殿紹登紫閣自殺吕超出奔廣武纂遂僣天王位大赦改龍飛四年爲咸寧元年謚紹隱王纂遊田無度荒躭酒色常與左右因醉馳獵於坑澗之間殿中侍御史王回扣馬諌不納畨和太守吕超擅伐鮮卑思盤思盤訴超於纂纂召超入朝怒曰卿恃兄弟桓桓欲欺吾也要當殺卿然後天下可定超頓首曰不敢纂引諸臣讌于內殿吕隆屢勸纂酒已至昏醉乗步輓車將超等遊于内至琨華堂東閤車不得過纂親將竇川駱騰􅀝劒于壁推車過閤超取劒擊纂纂下車擒超超刺纂洞􅇩奔于宣德堂將軍魏益入斬纂首以徇隆旣簒位謚纂靈帝葬白石陵吕隆崔鴻十六國春秋後凉録曰吕隆字永基光弟寳之子旣殺纂遂僣即王位大赦改咸寧三年爲神鼎元年二月追尊父寳爲文皇帝超有佐命之勲拜爲侍中都督中外諸軍事輔國大將軍録尚書事封安定公二年秦遣鴻臚恒敦拜隆征北大將軍河西諸軍事涼州牧建康公三年隆以二凉之逼遣超賷珍寳請迎于秦遣尚書左僕射齊難率歩􅀐四萬來迎隆率户一萬隨難東遷旣至長安秦以隆爲散􅀐常侍尚書公如故超爲安定太守其後㘴與兆興少子廣平公弼謀反誅呂光以乙酉歳據涼州至于是歳歳在癸卯凡一十九年後燕慕容垂崔鴻十六國春秋後燕録曰慕容垂字道明皝第五子小字阿六敦母蘭淑儀垂少有器度長七尺七寸手垂過􅂰皝甚寵之常曰此兒闊達好竒終能破人家或龍成人家故名霸字道業因墜馬傷前二齒後改名􅆙外以慕郤􅆙爲名內實惡而改之㝷以䜟記之文去夫以垂爲名稱尊號封呉王建熈十年以車􅀐大將軍敗􅁊温於枋頭威名大震太傅上庸王評深忌之垂遂出奔秦符堅聞垂至大悅郊迎執手禮之甚重王猛惡垂雄略勸堅殺之堅不從以爲冠軍將軍封賔都侯歷京兆尹符堅敗於淮南垂軍獨全堅以千餘􅀐奔之丗子言於垂曰家國傾䘮皇綱廢㢮當隆中興之業建少康之功宜恭承皇天之意因而取之垂曰彼悉心投命􅀂何害之乃以兵屬垂垂至澠池言於堅曰王師不利北境之民或因此輕動臣請奉詔輯寧朔裔且龍鄴舊都陵廟所在乞過展拜以申罔極堅許之權翼諌曰垂􅀲牙名將今之韓白且丗豪東夏志不爲人下頃避禍歸誠非慕義也而恐冠軍之號不飽其志列地百里未滿其心且垂猶鷹也飢則附人飽便髙颺遇風塵之㑹必有凌霄之志堅曰卿言是也但朕巳許之匹夫猶重信況萬乗之主乎翼曰陛下重小信而輕忽社稷臣見其往不見其還􅀜東之變垂其首乎自涼馬臺結草筏而渡至安陽脩牋於長樂公丕垂至館之於鄴西㑹符暉告丁零翟斌聚衆四千謀逼洛陽丕於是配垂兵二千遣廣武將軍符飛龍率氏􅀐一千爲垂之副貳戒飛龍曰垂爲三軍之統卿爲垂之謀主符暉告急簡書相㝷垂方圖飛龍停河內不進悉誅氐兵命左右殺飛龍濟河焚橋衆三萬至洛陽符暉閇門拒守不與交通翟斌率衆㑹垂勸稱尊號垂曰新興侯國之正統􅀌之君也􅀂以諸君之力得平􅀜東當以大義喻秦奉迎反正誣上自尊非􅀌心也乃自稱大將軍燕王承制行事翟斌爲建義將軍封河南王弟德爲范陽王衆至二十萬濟自石門長駈攻鄴元年正月朝羣寮于淸陽宫以暐在長安依晉愍帝在平陽中宗稱王改年建武故事改秦建元爲燕元元年立太子寶爲燕王太子攻抜鄴郛丕固守中城垂壍而圍之於魏郡肥郷築新興以置輜重進師攻鄴開其西奔之路二年三月丕弃鄴奔并州以魯陽王和爲南中郎將鎭鄴十二年垂定都中山建興元年正月羣寮勸垂正尊號辛卯􅆫即皇帝位於南郊大赦改元立子寶爲皇太子十年五月太子寶率衆八萬伐魏范陽王德爲之後繼魏聞寶將至徙于河西寶臨河不敢濟引師還次於參合俄而魏軍大至三軍奔潰寶與德等數千􅀐奔免十一年三月垂大衆出參合太子寶出天門垂至參合見積骸如山設祭吊之死者父兄各皆號哭軍中哀慟垂慙憤嘔血因而寢疾築燕昌城而還寶等至雲中聞垂疾皆引歸及垂于平城夏四月薨于上谷俎陽年七十一謚武成皇帝廟號丗祖晉書曰垂以太元二十一年死在位十三年墓曰宣平陵慕容寳崔鴻十六國春秋後燕録曰慕容寳字道祐垂第四子元璽四年生于信都少輕果無志操好人倿巳叚后謂垂曰太子姿質雍容柔而不断非濟丗之雄遼西髙陽陛下兒之賢者宜擇一樹之垂不納謂曰汝謂我爲晉獻公乎建興十一年四月僭即皇帝位大赦改爲永康元年寳遣將軍趙王麟逼叚后曰常謂主上不能嗣守大統今竟能不冝早自裁以全叚氏后怒曰汝兄弟尚逼殺母豈能保守社稷吾豈惜死念國㓕不乆遂自殺八月立妃叚氏爲皇后濮陽公榮爲皇太子二年正月魏使脩和寳不許二月魏攻中山其夜尚書慕容皓謀殺寳立趙王麟寳與太子榮等萬􅀐就清河王㑹于薊以開封公慕容詳守中山五月詳遂僣稱尊號九月趙王麟率衆入中山殺詳麟復僣尊號中山飢麟出據新市與魏師戰于義臺敗績南奔魏入中山寳遣御史中丞兼鴻臚魯遂持節授司徒范陽王德丞相兾州牧承制南夏封公侯牧守三年二月寳發龍城以撫軍慕容騰爲前軍歩􅀐三萬將南伐次于乙連長上叚速骨宋赤眉因民之憚逺役殺司空樂浪王宙衆旣幸亂投伏奔走寳馳還龍城又與長樂王盛等南奔尚書蘭汗殺速骨等十餘人奉太子榮承制大赦遣迎寳還于薊寳欲北還盛等咸以汙忠􅅃虚實未明宜就范陽王德寳從之乃自薊而南四月寳至鄴鄴中遺民固請留之寳不從南至􅀺陽城西聞范陽王德稱制懼而退乃還龍城次于廣都蘭汗又遣左將軍蘇超迎寳具申􅅃誠忠節無差寳於是命發汗遣弟難率五百􅀐逆寳至龍城難引寳入于外邸殺之年四十四殺太子榮及王公卿士百餘人汗自稱大將軍大單于昌􅀺王號年青龍七月長樂王盛襲誅汗盛即位僞謚寳惠愍皇帝廟號列宗慕容盛崔鴻十六國春秋後燕録曰慕容盛字道運寳之庶長子秦建元十年生于長安二十年符堅誅慕容氏盛奔東歸至垂問以西事􅀞地成圖垂􅀏謂之曰昔魏撫明帝之首遂乃侯之祖之愛孫有由來矣於是封長樂公建興六年領北中郎鎭薊進爵爲王及寳爲蘭難所殺盛馳赴哀盛潜結大衆謀討難及汗等斬之建平元年七月告成宗廟大赦改青龍元年謙揖自卑不稱尊號以長樂王稱制諸王貶爵爲公東陽公慕容根等九十八人上尊號盛不許十月根等又請盛許之丙子僣即皇帝位正月朝羣臣于承乾殿大赦改建平元年爲長樂元年二年正月大赦盛去皇帝之號稱庶民天王三年八月右將軍慕容國謀率禁兵襲盛前將軍叚璣等因衆心阻動潜於禁中鼔譟大呼盛聞變率左右出戰衆皆披潰一賊從闇中擊盛傷足遂取輦昇前殿召叔父河間公熈囑以後事熈未至而薨年二十九僞謚昭武皇帝廟號中宗晉書曰盛㓜而羈賤流漂長則遭家多難夷險安危備甞之矣懲寳闇而不斷遂峻極威刑纎介之嫌莫不裁之於未萌防之於未兆於是上下震恐人不自安雖推忠誠親戚亦皆離貳舊臣靡不夷㓕安忍無親所以卒於不免是歳隆安五年也慕容熈崔鴻十六國春秋後燕録曰慕容熈字道文一名長生垂之少子燕元二年生于常山建興八年封河間王永康初隨寳奔龍城拜司􅀠校尉長樂元年遷僕射中外督領昌􅀺尹盛薨遂僭即皇帝位大赦改長樂三年爲光始元年二年正月熈引見州郡􅂄舊于東宫問以民所疾苦司􅀠部民劉瓉對問稱旨拜帶方太守是春大治宫室四月立符貴人爲昭儀五月築龍騰􅁐廣十里餘役徒二萬起景雲山于􅁐内又起逍遙宮甘露殿連房數百觀閣相交鑿天河渠引水入宫又爲符昭儀鑿曲光海淸涼池季夏暑熱士卒不得休息􅠽死者半四年二月昭儀符氏卒符貴嬪爲皇后九月符后遊畋熈從之北登白鹿山東過青嶺南臨滄海冬十一月乃還百姓苦之士卒爲虎狼所害及凍死者五十餘人五年十月擬鄴之鳳陽作弘光門累級三層建始元年正月大赦天下三月太史丞梁延年夢月化爲五白龍夢中占之曰月臣也龍君也月化爲龍當有臣爲君寤而告人曰國祚其將盡乎是日符后起承華殿髙承光一倍􅀒土於北門土與榖同價典軍杜静載棺詣闕上書諌熈大怒斬之后嘗季夏思凍魚繪冬須生地黃皆下有司切責不得加以大辟四月符后卒熈悲號躃踊若喪考妣擁其尸而撫之曰體巳就冷命遂斷矣於是僵仆絶息乆而乃􅂫服斬縗食粥百寮宮内設位哭臨有司桉檢􅂘者有淚則不無淚則加罪羣臣振懼莫不含辛以爲淚髙陽王妃張氏熈之嫂也美姿容熈欲以爲殉乃毀其禭鞾中有弊氊遂賜死三女叩頭求哀熈弗許營陵周輪數里下固三泉内圖􅀞尚書八座之像熈曰善爲之朕將隨后入此陵轜車髙大毀北門而出中衛將軍馮跃左衛將軍張興先皆㘴事亡奔以熈政之虐也與跃從兄萬泥等三十二人結盟推夕陽公慕容雲爲主發尚方徒五千人分屯四門入宮授甲閉門拒守中黃門趙洛生奔告熈熈曰此䑕盗耳朕還當誅之乃収髮貫甲馳還赴難夜至龍城攻北門不尅遂入龍騰􅁐左右潰散熈微服逃于林中爲人執送雲等殺之年二十三雲葬之徽平陵謚曰昭文皇帝晉書曰垂以孝武帝太元八年僭立至熈四丗凡二十四年以安帝伐熈二年㓕慕容雲崔鴻十六國春秋後燕録曰慕容雲字子雨寶之養子祖父和髙勾麗之支庶自云髙陽氏之苗裔故以髙爲氏寳之爲太子雲以武藝給侍東宮永康初拜侍御郎以疾去官及熈葬后馮跃詣之告以大謀雲懼跃等強之四月即天王位復姓髙氏大赦改建始元年爲正始元年國仍號大燕以馬跃爲侍中中外都督録尚書事武邑公二年慕容歸爲遼東公主燕之宗祀三年冬十月雲臨東堂幸臣離班桃仁懷劒執紙而入稱有啓抽劒擊雲雲以几拒班桃仁進而殺之推立馮氏爲主跃即位謚爲懿惠皇帝始垂以丙戌之􅀊建號中山馮跃即位之歳歳在己酉二十四年太平御覽卷第一百二十五
