front:
  text: 太平御覽卷第六百三十八
  hash: sha256:4d2a8c729858a460b1fbfa4d56196c42ed15fea65bea4da726f1206e08b3633a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_638-1a}
body:
  text: 刑法部四律令下科附齊書曰􅀄江左用晉丗張杜律二十卷孔稚珪刪注修改與竟陵王議務從輕曰仲尼有言古之聽獄者求所以生之今之聽獄者求所以殺之與殺不辜寧殺有罪則斷獄之職古所難矣冩律上國學置律􅂇敎依五經例䇿試上髙第便擢用之北齊書曰武成帝河清中有司奏上齊律其不可爲定法者別制權令三卷與之並行後平􅁗王髙歸彦謀反湏有約罪律無正條於是遂有別條權令與律並行大理明法上下比附欲出則附依輕議欲入則附從重法姦吏因之舞文出没至于後主權倖用事有不附之者隂中以法綱紀紊亂卒至於亡三國典略曰齊封􅄒渤海蓨人廷尉卿軌之子也乆爲法官明解律令議断乎允時人稱之隋書曰李德林開皇元年勑令與太尉任國公于翼髙頴等同脩律令事訖別賜九環金帶一駿馬一疋賞損益之多也又曰劉行本爲侍御史雍州別駕元肇言於上曰有一州吏受人餽錢二百文依律令合杖一百然臣下車之始與其爲約此吏故違請加徒一年行夲駮之曰律令之行並發明詔與民約束今肇乃敢重其教命輕忽憲章欲申乞言之必行忌朝廷之大信􅃜法取罪非人臣之禮上嘉之唐書曰髙祖入關除隋苛政爲約法十二條唯制殺人刼盗背軍叛逆餘並蠲除之及受禪又用開皇律令除其苛細五十三條格務存寛簡取便於時仍遣裴寂殷開山郎楚之沈叔安崔善爲之徒撰定律令太宗即位命長孫無忌房玄齡與當朝通議之士更加􅁵改戴胃魏徴又言舊律太重於是議絞刑之五十條断其右趾焉應死者多蒙全活得罪者咸稱頼之又曰太宗問大理卿劉德威曰近來刑網稍宻何也對曰誠在君上不由臣下主好寛則寛好急則急律文失入減三等失出减五等今則反是失入則無辜失出則􅀗大罪所以吏各自愛競執深文畏罪之所致耳太宗然其言又曰神龍元年趙冬曦上書曰臣聞夫今之律者乃有千餘條近有隋之姦臣將弄其法故著律曰犯罪而律無正條者應出罪則舉重以明輕應入罪即舉輕以明重立夫一言而廢其數百條自是迄今竟無刋革遂使死生冈由乎法律輕重必因乎愛憎受罰者不知其然舉事者不知其犯臣恐賈􅁩見之必爲之慟􅂘矣又曰時所用舊律其文起自魏文侯師李悝悝撰攻諸國法著經以爲王者之政莫急於盗賊盗賊湏刻捕故著囚捕二篇其輕狡越城愽戯借假不廉􅁋多踰制以爲􅄂律一篇又以具其加减是故所著六篇而已然皆罪名之制也六韜曰文王問太公曰願聞治國之所貴太公曰貴法令必行法令必行則治道通治道通則民大利民大利則君德彰文王曰法令必行大利人民柰何太公曰法令必行則民俗利民俗利則利天下是法令必行大利人也又曰願聞爲國之大失太公曰爲國之大失者爲上作事不法君不􅁴悟是大失也文王曰願聞不法公曰不法法則令不行則主威傷不法法則邪不正邪不正則禍亂起不法法則刑妄行刑妄行則賞無功不法法則國昏亂國昏亂則臣爲變君不悟則兵革起兵革起則失天下文王曰誡哉管子曰法者所以興功懼􅁀律者所以定分止事又曰凢國無法則衆不知爲無度則事無儀有法不正有度不直則治僻治僻則國亂故曰正法直度罪殺不赦誅戮必信民畏而懼武威旣明令不再行又曰凢君國之重器莫重乎令令重君尊君尊國安令輕君卑君卑國危故安國存乎尊君尊君存乎行令行令存乎嚴罰嚴罰令行則百吏皆恐罰不嚴令不行則百吏皆喜故明君察於治人之夲本莫要乎令故曰􅃜令者死益令者死增益令者殺無赦不行令者死又曰凢牧民者欲民之可御也欲民之可御則法不可不重也法者將立朝廷將立朝廷則爵服不可不貴也爵服不可不貴也爵服加於不義則人賤其爵服民賤其爵服則人主不尊人主不尊則令不行矣又曰法者法天地之位象四時之行所以治天下四時之行有寒有暑聖人法之故有文有武天地之位有前有後有左有右聖人法之以建經紀春生於左秋殺於右夏長於前冬藏於後生長之事文也収藏之事武也是故文事在左武事在右聖人法之以行法令又曰正月之朝百吏在朝君乃岀令布憲于國五郷之師五屬大夫皆受憲于上大夫安子曰君之以尊者令令不行是無君也故明君慎令文子曰文子問老子曰法安所生曰法生於義義生於衆適衆適合乎人心此治之要也法非從天生非從地出發於人間反巳自正啇君書曰凢人主德行非出人也勇力非過人也然民雖有聖智弗敢謀有勇力弗敢殺雖衆弗勝其制民無億万之數雖行重賞而民弗敢爭行重罰而民弗敢怨者法也又曰法令者民之則也爲治之本也所以備民也知者不得過過者不得不及名分不定而欲天下之治也是猶欲無飢而去食欲無寒而去衣也欲至東而西行其不幾亦明矣一􅇠走而百人逐之非􅇠一可以分百也由名之未定也夫賣􅇠在市盗不敢取分之定也今法令不明其名不定天下之人得議之也慎子曰法之功莫大使私不行君之功莫大使民不争今立法而行私是私與法争其亂甚於無法立君而尊賢是與君争其亂甚於無君故有道之國法立則私義不行君立則賢者不尊民一於君事断於法是國之大道也又曰法雖不善猶愈於無投鈎分財投䇿分馬非以鈎䇿爲均也使得榮者不知所以德得惡者不知所以怨乃以塞怨望也又曰堯爲匹夫不能使隣家至爲主則令行禁止由此觀之賢未足以服不肖而勢位足以屈賢申子曰君必有明法正義􅀂懸權衡以稱輕重所以一群臣也又曰堯之治也盖明法察令而巳聖君任法而不任智任數而不任說黄帝之治天下置法而不變使民安樂其法也又曰昔七十九代之君法制不一號令不同然而俱王天下何也必國冨而粟多也韓子曰魯燒積澤天北風火南向恐燒國哀公自將衆趍救火人盡逐獸而火不救乃召仲尼仲尼下令曰不救火而逐獸者比入禁之罪令下未徧火遂救矣又曰治大國而數變法則民苦之是以有道之君貴虚静重變法也又曰釋法術而爲治堯不能正一國使中正守法術拙匠執䂓矩尺寸則萬不失一也又曰董安于爲趙上地之守行石阜山中見深澗峭如墻深百仭因問其郷左右曰人甞有入此者乎對曰無有曰嬰兒癡聾狂亂人甞有入此者乎對曰無有馬羊牛甞有入此乎對曰無有安于喟然嘆曰吾能治矣使吾法之無赦猶入澗之必死也則民莫知犯何爲不治也又曰荆㽵王有弟門者立法群臣大夫諸侯公子入朝馬蹄踐霤者廷理斬其輈戮其御於是太子入朝馬蹄踐霤廷理依法太子怒入爲王泣曰必爲誅戮廷理王曰法者所以敬宗廟尊社稷故臣受命尊敬社稷者社稷之臣焉可誅也太子乃還走避舎露􅀫三日北面再拜請罪又曰夫人臣之侵其主也如地形焉即漸以徃使人主失端東西易面而不自知故先王立教司南以端朝夕明王使其群臣不遊意於法之外不爲惠於法之内虎所以能服狗者爪牙也使虎釋其爪牙使狗用之則虎反服於狗矣人主者以形德制臣也今君釋其刑德而臣用之則臣反制於君矣又曰犇車之上無仲尼覆舟之下無伯夷故號令者國之舟車也安則智廉生危則鄙争起又曰越王問於大夫種曰吾欲伐呉可乎對曰可以吾賞厚而信罰嚴而必君必欲知之何不試焚於是遂焚宫室民莫救火乃下令曰民之救火而死者比死敵者之賞勝火而死者比勝敵之賞不救火者比降北之罪民之塗其體􅀍濡衣赴火者左三千人右三千人始知必勝之􅀔也又曰吴起爲魏武侯西河之守秦有小亭臨境起欲攻之乃􅀝一車轅於北門之外而令曰有能徙北南門之外賜之上田上宅民莫之徙也及有徙之者遂賜之如令俄又置一石赤􅁰東門之外而令之曰有能徙之於西門之外者賜之如􅀄民則争徙之乃下令大夫曰攻亭有能先登者仕之國大夫賜之上田宅民争上於是攻亭一朝而拔之阮子曰漁人張網於淵以制吞舟之魚明主張法於天以制強良之人立法以隄民百姓不能千立防以隄水江河不能犯傅子曰律是咎繇遺訓漢命蕭何廣之又曰天爲有形之主君爲有國之主天以春生猶君之有仁令也天以秋殺猶君之有威令也故仁令之發天下樂之威令之發天下畏之樂之故樂從其令畏之故不敢違其令􅀂寛令發而人不樂無以稱仁矣威令發而下不畏無以言威矣無仁可樂無威可畏而能保國致治者未之有也㑹稽典録曰董昆字文通餘姚人也少遊學師事頴川荀季卿受春秋治律令明逹法理又才能撥煩縣長潘松署功曹史刺史盧孟行部垂念􅁈結松以孟明察於法令轉署昆爲獄史孟到昆斷正刑法甚得其平孟問昆夲學律令所師爲誰昆對事荀季卿孟曰史與刺史同師孟又問昆從何職爲獄史松具以實對孟歎曰刺史學律猶不及昆召之署文學杜預律序曰律以正罪名令以存事制張斐律序曰張湯制越官律趙禹作朝㑹正見律塩鐡論曰夫善言天者合之於人善言古者考之於今二尺四寸之律古今一也又曰昔􅁗法䌓於秋荼而網宻於凝脂然而上下相趍姦僞萌生崔寔政論曰君以審令爲明臣以奉令爲忠故背制而行賞謂之作福背令而行罪謂之作威作威則人畏之作福則人歸之夫威福者人主之神器也譬之操莫耶矣執其柄則人莫敢抗失其柄則還見害也風俗通曰臯陶謨虞始造律蕭何成以九章此關諸百王不易之道也夫吏者治也當先自正然後正人故承憲履繩動不失律令也科後漢書曰章帝時陳寵代郭躬爲廷尉帝納寵言制除鉆琴嚴切鑚諸􅃤酷之科又曰明帝永平十二年詔曰車服制度恣極耳目田荒不耕游食者衆有司其中明科禁冝於今者宣下郡國魏志曰曹仁少時不脩行檢及長爲將嚴邪正奉法令常置科於左右案以從事宋書曰頋深之子寳先大明中爲尚書水部郎先深之爲左承荀万秋所劾及寳先爲郎万秋猶在職自陳不拜丗祖詔曰憲司之職理有􅁵正而頃刻無輕重輙致私絶此風難長主者可嚴爲其科劉邵律畧曰刪舊科採漢律爲魏律懸之象魏楊雄劇秦美新曰金科玉條科條謂所施法律金玉珎之也說文曰科程也程品也十發爲程十程爲寸太平御覽卷第六百三十八
