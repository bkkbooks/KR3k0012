  text: 太平御覽卷第一百七十六
  hash: sha256:aa8a711cd090443b029561e515d75404a0e5ce64304a3e01017ba667a42761cb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_176-1a}
body:
  text: 居處部四堂堂皇附樓堂􅀃文堂殿也釋名曰堂猶堂堂髙顯㒵也禮記曰堂上不趨堂上接武堂下布武又曰將上堂聲必楊又曰禮有以髙爲貴者天子之堂九尺諸侯七尺大夫五尺士三尺又曰覲天子不下堂而見諸侯下堂而見諸侯天子之失也由夷王以下尚書大傳曰天子堂廣九雉諸侯七雉伯子男五雉雉三尺也續漢書曰中平二年造萬金堂於西園三十國春秋西涼傳曰李暠於南門外臨水起堂名曰靖恭堂以議朝政閱武事堂成圖讃自古明王忠臣孝子貞女暠自爲序以明鑒戒文武群寮亦皆圖焉是月白雀翔于靖恭堂暠頌之梁書曰髙祖五年改閱武堂爲徳陽堂改聽訟堂爲議賢堂後魏書任城王澄從髙祖於觀徳殿髙祖曰躬以觀徳次之凝閑堂髙祖曰名要有義此堂天子閑居之義不可縱奢以忘儉自安以忘危故此堂後作茅茨堂謂李沖曰此東曰歩元廡西日遊凱廡此坐雖非唐堯之君卿等當無媿於元凱冲對曰臣旣遭唐堯之君不敢辝元凱之譽髙祖曰光景垂落朕同宗則有載考之義卿等將出無逺何得黙尔示聽徳音即命黄門郎崔光鄴郭雅邢巒崔休等賦詩言志燭至公卿辝髙祖曰在夜載考宗族之義卿等且還朕與諸王宗室欲成此夜飲和苞漢趙記曰劉聦嘉平三年廷尉陳元逹極諌聦怒將斬之聦時幸逍遥園李中堂元逹抱堂下樹叫曰臣所言者社稷之計聦免之於是易李中堂爲愧賢堂北史齊文襄於鄴東起山池遊觀河澗王孝瑜遂於第作水堂龍舟植幡矟於舟上數集諸弟宴射爲樂武成幸其第見而恱之故盛興後園之翫習於是貴賤慕効處處營造又曰􅀂干惠事母以孝聞周文甞造射堂新成與諸將宴射惠竊歎曰親老矣何時辨此周文聞之即日徙堂於惠宅論衡曰王者之堂墨子稱堯舜堂髙三尺儒家以爲卑下假使之然髙三尺之堂蓂莢生於階下湏臨堂察之乃知莢數夫起視堂下之莢孰與懸日曆於扆坐頋輙見之也風俗通曰殿堂象東井形刻作荷蓤蓤水物也所以厭火晉宫閣名曰洛陽宫有則百堂螽斯堂休徴堂延禄堂仁壽堂綏福堂含芳堂樂日堂椒華堂芳音堂顯成堂承光堂五福堂嘉寜堂瑞應圖帝琴堂前有二橘樹連理改琴堂爲連理堂華陽國志曰文翁立講堂作石室一曰玉堂在城南􅀄堂遇火太守更脩立又増二石室虞氏家記曰虞潭爲右衛將軍太夫人年髙求解職􅀍詔不聽特假百日迎母東歸起養堂親親集㑹作詩言志齊地記曰臨淄城西門外有古講堂基柱猶存齊宣王脩文學處也拾遺記曰董偃常卧延清之堂設火齊屏風又曰海人獻龍膏爲燈於燕昭王王坐通雲之堂具燈王子年拾遺記漢武息於延涼室卧夢李夫人授帝蘅蕪之香帝驚起而香氣猶著衣枕歷月不歇帝弥思涕乃改延涼室爲遺芬夢堂襄􅃆記白馬泉毎年刺史三月上旬於此泉起曲水流杯堂引泉水爲祓禊之所臨時構造事竟毀除其流杯堂本在壘城西郡國誌王屋縣有孔子學堂西南七里有石室臨大河水􅀔湍急五里之間寂無水聲如似聽義又曰齊桓公宫城西門外有講堂齊宣王立此學也故稱爲稷下學莒子如齊盟于稷門此也宋永􅀄山川古今記永康縣縉雲堂黄帝練丹處又曰費北有積弩堂益州記文翁學堂在城南羊頭山記太學堂洛陽南開陽門外長十丈廣三丈堂前石經四部本碑凡四十八枚西尚書周易公羊十六碑南禮記五碑東論語三碑有諌議大夫馬日磾碑議郎蔡邕銘又曰聖壽堂石虎造垂王佩八百大小鏡二萬枚丁香末爲泥油瓦四面垂金鈴一萬枚去鄴三十里聞響十洲記曰崑崙山有光碧之堂西王母所居郡國志雞陂之側即春申君子假居之殿也後太守居之以數失火故塗以雌黄遂名黄堂􅀃苑曰聖人之於天下譬如一堂之上也今有滿堂飲酒者一人獨纍然向隅而泣則一堂之人皆不樂矣管子曰堂上逺於百里門廷逺於萬里今歩者一日百里之情通堂上有事十日而君不聞歩者十日千里之情通堂下有事一月而君不聞歩者百日萬里之情通門庭有事朞年而君不聞此謂逺於萬里也漢武内傳曰上元夫人言西王母有六甲之術用之可以遊景雲之宫登流霞之堂漢武故事曰玉堂去地十二丈基堦皆用玉東京賦金華玉堂白虎麒麟潘尼詩曰鸞鳯棲堂廡不􅀂翔廖廓文選天台山賦玉堂䕃暎乎髙隅楚辝曰魚鱗屋􅀆龍堂古詩云黄金爲君門白玉爲君堂庭中生桂樹華燈何煌煌堂皇附漢書曰坐堂皇上室而無四壁曰皇也廣雅曰堂皇合殿也洛陽記曰洛陽宫有桃間堂皇杏間堂皇㮏間堂皇竹間堂皇李間堂皇魚梁堂皇醴泉堂皇百戯堂皇晉宫闕名曰洛陽宫有水碓堂皇擇果堂皇陸機四言詩序曰太子宴朝士於宣猷堂皇遂命機賦詩樓爾雅曰狹而脩曲日樓􅀃文曰樓重屋也樔澤中守草樓也釋名曰樓有戸牖諸孔婁婁然也史記曰方士言武帝曰黄帝爲五城十二樓以候神人帝乃立神明臺井幹樓髙五十丈輦道相屬漢書曰濟南人上皇帝明堂圖圖中有一殿四面無壁以茅蓋通水園宫垣爲􅃨道上有樓從西南入蓋樓之始也又郊祀志云其南有玉堂壁門大鳥之屬立神明臺井幹樓髙五十丈輦道相屬焉顔師古注云漢宫閣䟽云神臺髙五十丈上有九室東觀漢記云公孫述造十層赤樓也後漢書曰張奐傳􅀄奐爲武威太守其妻懷孕夢帶奐印綬登樓而歌占者曰必將生男復臨兹郡命終此樓旣而生子猛以建安中爲武威太守殺刺史州兵圍之急猛耻見擒乃登樓自焚而死又曰黄昌爲郡守陜縣彭氏造髙樓臨道昌行縣彭氏婦人輙􅂛髙樓而觀昌乃殺之蜀志曰周群作小樓多令奴更直臺上視天􅂊有一氣即白群晉書曰石崇作樓令婢緑珠作歌舞於上孫秀求緑珠不得及崇􅀍収方在樓上謂珠曰吾今爲汝死矣珠乃墜樓而死又曰於石頭東城内起髙樓加累入於霄漢連堞帶於積水署曰入漢樓宋書曰大明元年五月壬子紫氣出景陽樓狀如煙廻薄父之詔改景陽爲景雲樓趙書云趙染襲長安秦王業奔射鴈樓格戰至天明不抜齊書曰東昏侯後宫起仙華神仙玉壽諸殿窮盡雕綵以麝香雜香塗壁時丗祖於樓上施青􅃮世謂之青樓帝曰武帝不巧何不純用瑠璃又曰焦度甞戰敗逃于宫亭湖中江州刺史王景文誘降復拒沈攸之於郢城登樓詈辱攸之攸之攻不能下至今呼此樓爲焦度樓也又魏虜傳云虜自佛貍世至萬民世増雕飾正殿西築臺謂之白樓樓南又有伺星樓梁書處士陶弘景傳云弘景止于句容之句曲山永明􅀄更築三層樓弘景處其上弟子居其中賔客至其下又曰武帝大同十年幸蘭陵因賦歸舊郷詩巳酉幸京口城北固樓曰此不足以固守然北望江山實爲壯觀乃改名北頋因幸廻賔亭宴帝郷故老及迎候者少長數千人各賫錢三千文與之周書曰長孫儉傳云爲荆州刺史人安其業吏人表請爲儉構清德樓樹碑刻頌朝議許焉盛弘之荆州記云西鄂城東有三女稚殁三女造此樓於墓所老君本記云周康王時文始真人結草爲樓占星候氣登真隱訣云長綿樓上太清上宫名玉晨道君所居吴越春秋云㑹稽郡小城勾踐築周千一百二十歩西北立爲龍翼樓世􅀃云桓征西治江陵城甚麗顧長康曰遥望層城丹樓如霞墨子云偏城三十歩置坐候樓樓出堞四尺百歩一木樓樓前面九尺髙七尺二百歩一立樓去城中二丈五尺洛陽地記曰洛陽城内西北角有金墉城東北角有樓髙百尺魏文帝造也盛弘之荆州記曰荆州城西百餘歩有丹霞樓臨川康王之置吴越春秋曰范蠡爲勾踐立飛翼樓以象夫門爲兩蟉繞棟以象龍角羊頭山記曰原城西門南角有萬歳樓俗傳飛入江常以鐵鏁維之又樓上時見一道白氣如煙刺史必死輕者貶謫州人至今爲常候郡國誌定州安縣城上樓謂之神女樓又曰馬邑白樓即後魏納姚興女爲后后悲思因造此樓登望飾以鈆粉故名之又曰金華縣因山爲名城南臨溪水髙阜上有樓名曰􅀇暢樓宋沈約造以吟詠於此處韋述兩京新記曰上陽宫有麗青臺浴日樓十洲記曰崑崙山有玉樓十二層虞氏家記曰吴小城白門蓋吴王闔閭所作也至􅁗始皇帝守宫吏燭䴏窟失火燒宮而此樓故有瀬郷記曰老子廟有皇天樓九柱樓静念樓皆􅀞仙人雲氣􅀽彦伯羅山䟽曰仰望石樓眇然在雲中金陵地記吴嘉禾元年於桂林苑落星山起三重樓名曰落星樓吴都賦曰享戎旅於落星之樓世􅀃曰凌雲臺樓觀極精巧先稱平衆材輕重當冝然後造構乃無錙銖相􅀒掲臺雖髙峻􅁪隨風揺動魏明帝登臺懼其􅀔危别以大材持之樓即便頺瓌論者謂輕重力偏故也九江録曰􅁃亮在武昌諸佐吏殷浩等乗秋夜佳景共登南樓俄而不􅁴亮至衆將避之公曰老子於此不淺便坐談詠至今名􅁃公樓幽明録曰鄴城鳯陽門五層樓去地二十文安金鳯皇二頭於其上一頭飛入漳河清朗見在水底一頭今獨存水經鄧州伯陵山上有入郷樓益州記曰成都有百尺樓晉宫閣名云洛陽有鳯皇樓詩曰西北有髙樓上與浮雲齊樂府詩云日出東南隅照我􅁗氏樓漢宫閣名云長安有馬伯騫樓又有貞女樓晉宫閣名晉有伺星樓又曰緫章觀儀鳯樓在觀上廣望觀之南又别有翔鳯樓又有慶雲樓本平御覽卷第一百七十六
