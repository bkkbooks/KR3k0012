body:
  text: 工藝部七數􅀞上數說文曰筭長六寸計曆數者也從弄竹言常弄乃不誤也易曰大衍之數五十大合天地之數凡五十有五言五十者舉成數天數二十有五地數三十凢天地之數五十有五此所以成變化而行􅀑神也周禮曰保氏養國子以道乃教之六藝六曰九數鄭司農曰九數方田粟米差分少廣啇工均輪方呈羸不足旁要今有重差勺桀句服也漢書律歷志曰數者一十百千萬也所以筭數事物慎性命之理也又曰武帝時桑􅀪羊以計筭幸以心計年十三爲侍中又曰宣帝時大司農丞耿夀昌以善筭爲筭工得幸於上又曰計啇善爲筭著五行論筭術二十六卷又曰張蒼明習天下圖書計籍又善筭律歷故令蒼以列侯居相府領主郡國上計者吴志曰顧譚每省簿書未甞下筭徒屈指心計盡發疑謬下吏以此服之又曰趙逹河南人也治九宫一筭之術究其微旨是以能應機立成對問􅀂神使人取小豆數􅂛播播布切之席上立言其數驗覆果信甞過知故知故爲之具食食畢謂曰倉卒乏酒又無嘉肴無以叙意如何逹因取盤中􅃗筋再三縱横之乃言卿東壁下有美酒一斛又有鹿􅁏三斤何以辭無主人􅀏曰以卿善射欲以相試耳遂岀酒酣飲又有書簡上作千萬數着空倉中封之令逹筭之逹云但有名無實其精微􅀂是逹寳惜其術自闞澤殷禮皆名儒善士屈節就學祕而不告也太史丞公孫􅅬師事之累年賫酒拜跪而請逹曰吾先人得此欲圖爲帝王師至仕來三丗不過太史郎誠不欲復傳之且此術微妙頭乗尾除一筭之法父子不相語􅀄孫權行師征伐毎令逹有所推歩皆如其言問其法終不言由此見非逹常􅀏謂諸星氣風術者曰當廻筭帷幕不岀户牖以知天道而反晝夜􅁀露以望氛祥不亦難乎無間引筭自投乃歎曰吾筭盡某年月日其終矣逹妻數見逹效聞而􅂘泣逹欲弭妻意乃更筭言向者謬誤耳尚未也後如期死權聞逹有書求之不得録問其女乃發逹棺一無所得法遂絶焉王隱晉書曰王戎爲同徒好治生公嫗二人常以象牙籌晝夜筭計家財唐書曰僧一行姓張氏公謹之孫也􅀄求訪師資以窮大衍至天台山國清寺見一院古松十數門有流水一行立於門屏間聞院僧於庭布筭聲而謂其徒曰今日當有弟子自逺求吾筭法巳合到門豈無人導逹也即除一筭又謂曰門前水當却西流弟子亦至一行承其言而趨入稽首請法盡授其術焉而門前水果却西流西京􅄂記曰安定嵩真明筭術成帝時人也真常以筭自尅其壽七十三真曰綏和元年正月二十五日晡時死矣書壁以誌之至二十四日晡時死妻曰真筭時見長下一筭欲以告之慮脫故不吿之今校一日也又曰曹元理善筭術成帝時人也常從友人陳廣漢廣漢曰吾有二囷米忘其石數子爲吾筭之元理以食筋十餘轉曰東囷七百四十九石六斗七合西囷六百九十七石八􅂛遂署囷門後出米西囷六百九十七石九􅂛中有一䑕大可一􅂛東囷無差元禮後嵗復過廣漢以米數告之元理以手擊牀曰遂不知䑕之殊米不如剥面皮矣廣漢爲之取酒脯數斤元理復筭曰千牛産二百犢萬雞將産五百鶵羊豕鵝鴨皆道其數菓蓏盧果切肴蔌悉知其所乃曰如此貲業之廣何供具之薄廣漢慙曰有倉卒賔無倉卒主人元理曰俎上䒱㹠一頭厨中荔枝一盤皆可以爲設廣漢再拜謝罪入取之盡日爲歡其術後傳南季南季傳項滔滔傳子陸皆得其分數而失其􅀇妙焉老子曰善計者不用籌䇿尹文子曰凡數十百千萬億億萬千百十皆起於一推至億億無差矣山海經曰帝令竪亥歩自東極至於西極五億千選選萬也九千八百八十歩竪亥右手把筭左手指青丘曰五億十萬九千八百天地東西二億三萬三千里南北二億一千五百里天地相去一億五萬里也慱物志曰南郡冝城王子山到㤗山從鮑子真學筭異苑曰晉安有越王餘筭䇿長尺許白者似骨黒者似角云越王行海作筭有餘弃之於水生焉風俗通曰十十謂之百十百謂之千十千謂之萬十萬謂之億十億謂之兆十兆謂之經十經謂之垓十垓謂之􅀘十􅀘謂之選十選謂之載十載謂之極有物者有事者紀於此矣過此徃者則其數可紀其名未之或聞也夫數一爲特侯竒􅃗二爲再兩偶􅀟三爲叅四爲乗賈􅁩書曰數度之道以六爲法數度之始始於微細有形之物莫細於毫是故立一毫以爲度十毫爲髮十髮爲􅁵十釐爲分十分爲寸十寸爲尺備於六故先王以爲天下用也周髀曰周公問於殷髙曰寡人聞子大夫善數數筭也語林曰鄭􅀇馬融門下三年不得見令髙足弟子傳授而巳融筭甞渾天合召􅀇令筭一轉便決衆咸駭服謝察微筭經曰易稱太極是生兩儀蓋數之先也自􅀠首作術容成造曆顯筭斯興故也一位筭法曰萬萬穰爲載數之極矣或問之曰何以數之爲載按孫子筭經云古者積錢上至於天天不能容下至於地地不能載天不能蓋地不能載故名曰載又曰按司馬遷史記云自􅁗孝公時啇鞅獻三術内一開道阡陌以五尺爲歩二百四十歩爲􅅿又曰按千乗之圗周之制度司馬法六尺爲歩歩百爲􅅿是古之制也發象筭經曰問云度之起起於何荅曰度之起起於忽忽是神􅆉口中吐絲名也十忽爲一絲十絲爲一毫筭經曰量之起起於何荅曰量之起起粟粟是隂陽而生從六甲而出故六粟爲一圭十圭爲一抄筭經曰秤之起起於何荅曰秤之起起於􅁰􅁰是三稜草子也一􅁰爲一絫十絫爲一銖􅀞釋名曰􅀞挂也以五色挂物上也周禮曰􅀞繢之事􅄂五色東方謂之青南方謂之赤西方謂之白北方謂之黒天謂之􅀇地謂之黄青與白相次也赤與黒相次也􅀇與黄相次也此言􅀞繢六色所象及布移之彩第凡􅀞繢之事後素功素白綵也後布之爲其功易以潰汚之也論語曰繪事後素史記曰武帝衛太子廢後上居甘泉宫召􅀞周公􅀒成王圗於是左右羣臣知上意欲立少子也少子即昭帝也又曰甘露三年單于始入朝宣帝思服肱之美圗􅀞其人於騏麟閣法其狀貌署官爵姓名又曰李夫人早卒帝圗􅀞其形於甘泉宫又曰金日磾母教誨兩子甚有法度武帝聞而嘉之病死詔圖於甘泉宫曰休屠王閼氏日磾每見􅀞常拜向之涕泣東觀漢記曰馬援還誡兄子曰􅀞虎不成反􅀋狗也又曰宋弘甞讌見御座新施屏風圗􅀞列女丗祖數顧視之􅀪曰未見好德如色者帝撤之范曄後漢書曰光和元年置酒鴻都門􅀞孔子及七十二弟子之像又曰明帝遣使天笁問佛道法遂於中國圗􅀞形像焉又曰顯宗圖􅀞建武中名臣列將於雲䑓以椒房故謂馬后獨不及馬援東平王蒼觀圗言於帝曰何故不􅀞伏波像帝􅀏而不言又曰陳紀字元方父憂殆將滅性豫州刺史嘉其至行上書􅀞像百城以厲俗魏書曰曹休祖父甞爲吴郡太守休見壁上祖父􅀞下榻拜而涕泣魏氏春秋曰徐邈善􅀞作走水􅆩摽於水濵羣􅆩集焉晉書曰顧愷之尤善丹青謝安深重之爲有蒼生巳來未之有也愷之每􅀞人成數年不􅀧目睛人問其故荅曰四禮妍􅃖夲無􅀜於妙處傳神冩照正在阿堵物中甞恱一隣女挑之弗從廼圗其形於壁以􅁄針釘其心女遂患心痛愷之因致其情女從之遂宻毎重嵇康四言詩因爲之圗常云手揮五􅁌易目送歸鴻難毎冩人形妙絶於時甞圗裴楷像頰上加三毛觀者覺神明殊勝又爲謝鯤像在石巖裏云此子宜著丘壑中欲圗殷仲堪堪有目疾固辭愷之曰明府正爲眼耳􅀂明􅀧瞳子飛白拂上使如輕雲之蔽月豈不美乎顧愷之甞以一厨􅀞糊題其前􅀉桓􅀇所皆其深所珎者􅀇乃發其厨後竊取􅀞而緘閉如舊以還之紿云未開愷之見封題如􅀄但失其􅀞直云妙􅀞通靈變化而去亦猶人之登仙了無恠色又曰王獻之桓温常使􅀞扇筆悟落因􅀞作爲烏駮特牛甚妙劉毅傳曰毅平桓􅀇入建康􅀄桓􅀇於南州起齋悉􅀞盤龍於其上號爲盤龍齋毅小字盤龍至是遂居之晉書曰韓支字景先鄧林婦病積年垂死醫巫皆息意支爲筮之使􅀞作野猪着卧處屏風上一􅀫覺佳於是遂差齊書曰滎陽毛惠逺善􅀞馬彭城劉瑱善􅀞婦人當丗並爲第一又曰齊王秀之字伯奮仕至侍中時宗測優遊秀之弥所欽慕乃令陸探微􅀞其形與巳相對又曰王亮字叔奉臨沂人也齊竟陵王良開西邸延賢俊使工􅀞其像亮亦豫焉梁書曰伏曼容素美風彩帝常以方􅄞叔夜使呉人陸探微􅀞叔夜像以賜之又曰昭明太子好士愛文劉孝綽與陳郡殷芸呉郡陸倕瑯瑘王筠彭城劉治等同見賔禮太子起堂乃使􅀞工先圗孝綽後魏書曰劉子業廟中皆􅀞祖父形入曽祖􅁉廟指像曰此渠大英雄生禽數天子次入祖義隆廟指像曰此渠不惡次入駿廟曰此渠大好色顧謂左右曰此渠大齇鼻即令􅀞工齇駿像鼻也北齊書曰唐陵王孝珩於㕔上􅀞蒼膺見者以爲眞焉又曰魏收字伯起鉅鹿曲陽人也兼尚書僕射帝於華林園別起􅀇洲苑備極山林樓觀之麗詔於閣上􅀞収容像其見重如此陳書曰顧野王傳曰宣城王爲楊州刺史野王及瑯瑘王襃並爲賔客王甚愛其才野王又好丹青善圗冩王於東府起齋乃令野王􅀞古賢命王襃賛之時人稱爲二絶唐書曰張昌宗甞命􅀞工圗冩武三思及納言李嶠鳯閣侍郎蘇味道夏官侍郎李逈秀麟臺少􅁥王紹宗等十八人形像號爲髙士圗又曰薛稷善􅀞愽採古跡睿宗在藩留意於小學稷於是特見招引又曰韓滉尢工書兼善丹青以繪事非急務自晦其能未甞傳之又曰王維書􅀞特臻其妙筆蹤措思叅於造化而創意經圗即有所缺如山水平逺雲峯石色絶跡天機非繪者之所及也人有得奏樂圗者不知其名維視之曰霓裳第三疊第一拍也好事者進樂工按之一無差誤咸服其精思也又曰閻立夲雖有應務之才而尤善圗􅀞於冩真􅁗府十八學士圗及貞觀中凌煙閣功臣圗並立夲之跡也時人咸稱其妙太宗甞與侍臣學士泛舟於春苑池中有異鳥隨波容與太宗擊賞數賜詔座者爲詠召立本令冩之時閤外傳呼云􅀞師閻立夲時已爲主爵郎中奔走流汗俛伏池側手揮丹粉瞻望座賔不勝媿􅎼退誡其子曰吾少好讀書幸免墻面縁情染翰頗及儕流唯以丹青見知躬厮役之務辱莫大焉汝其深戒勿習此末􅇊又曰裴延齡恃恩惟顧少連不避延齡及􅀞一鵰令羣鳥噪之遂獻焉唐李寳臣爲成德軍節度使寳臣爲朱滔使曰吾聞朱公貌如神得而識之願因繪事而觀可乎滔乃圖其形以示之寳臣懸於射堂命諸將熟視之曰朱公信神人也鍾岏良吏傳曰鄭純字長伯廣漢人也爲永昌太守清廉獨絶及卒列􅀞東觀三齊記略曰􅁗始皇求與海神相見神云我形醜約莫圗我形當與帝㑹始皇入海三十里與神相見左右有巧者潛以脚􅀞神形神怒帝負約乃令帝速去始皇即馬前脚猶立後脚隨䧟歩僅得登岸􅀞者溺死續齊諧記曰魏明帝遊洛水水中有白獺靡淨可憐見之輙去帝顧玩之終不可得侍中徐景山曰臣聞􅆩􅄝鯔魚乃不避死可以此􅃸之乃自􅀞板作兩生鯔音淄魚懸岸於是羣􅆩競赴遂一時執得帝嘉之謂曰不聞卿知􅀞何其妙也荅曰臣亦未甞執筆人之所作者自可庶幾耳帝曰是善用所長者也西京􅄂記曰元帝後宫旣多不得常見乃使􅀞工圗其形按狀幸之諸宫人皆賂􅀞工多者十萬王嬙不肯遂不得見後匈奴求美女帝按圖以昭君行及召見貌爲第一帝悔之而名籍巳去乃按其事􅀞工弃市籍貲􅀞工有桂陵毛延夀冩人好醜老少必得其真安陵陳敝新豐劉白襲寛並工牛馬人形杜楊望亦善􅀞尤善布色樊育亦善布色同日弃市京師􅀞工於是差稀拾遺記曰周靈王時有韓房者自渠胥國來獻王駞房長一文垂髮至膝周人見之如神明矣以丹砂􅀞左右手爲日月盈缺之勢不異眞焉可照百餘歩又噴水爲雲蔽􅃜其側靈王視之忽不知所在或云昇天又曰秦始皇二年謇㳙國獻善􅀞之者名烈啇口含丹黒噴壁即成龍雲之像以指歷地􅀂繩分矣轉手􅀂䂓方寸之内四瀆五岳列國莫不悉備􅀞爲鳯鸞皆軒軒􅀂行也韓子曰客有爲齊王􅀞者王問曰􅀞孰最難對曰狗馬最難孰曰最易對曰􅀑魅最易夫狗馬人之所知也旦暮覩於前不可􅀋之故難也􅄦魅無形無形者不可覩故易也淮南子曰􅀞西施之面者美而可恱規孟賁之目者大而可畏又曰宋􅀞呉冶宋人工􅀞呉人工冶其爲微妙堯舜之聖不能及也抱朴子曰衛恊張黒有􅀞聖之名華陽國志曰漢嘉郡以禦􅄂夷冝􅋑曜之廼雕飾城墻華􅀞府寺及諸門作山神海靈窮竒鑿齒夷人􅀄出入恐騾馬或憚之趑趄􅀃苑曰齊起九重之臺國中有能􅀞者則賜之錢狂卒敬君居常飢寒其妻端正敬君工􅀞貪賜􅀞臺去家日乆思念其婦遂􅀞其像向之喜􅀏旁人見以白王王以錢百萬請妻敬君惶怖許聽丗說曰戴安道爲范宣􅀞南都賦圖范宣看而咨嗟焉俗說曰顧虎頭爲人􅀞扇作阮籍嵇康都不􅀧眼精送還扇主曰􅀧眼精便欲能語論衡曰人好觀圗􅀞上所􅀞古之死人也見死人之面孰與視其言行古賢之遺文竹帛之所載粲然豈徒墻壁之􅀞哉丗夲曰史皇作圗史皇黄帝臣也謂􅀞物像也新序曰葉公子髙好龍門亭軒牖皆畫龍形一旦眞龍垂頭於䆫棹尾於户葉公驚走失措焉風俗通曰按百家書云公輸般之水上見蠡謂蠡曰開汝匣見汝形蠡􅃴岀頭般以足􅀞圗之缺古今名􅀞録曰晉有史道碩􅀞田家十月圗爲丗所珎孫暢之述􅀞曰漢靈帝詔蔡邕圗赤泉侯楊喜五丗將相形像於省中又詔邕爲讃仍令自書之邕文􅀞書于時獨擅可謂備三美矣又曰劉裒漢靈帝時作雲漢圖人見之自然覺􅀬更􅀞北風圗􅀬者還覺凉魏陳思王􅀞讃序曰蓋􅀞者鳥書之流也昔明德馬后美於色厚於德帝用喜之甞從觀􅀞過虞舜之像見俄皇女英帝指之戯后曰恨不得如此人爲妃又前見陶唐之像后指堯曰嗟乎羣臣百僚恨不戴君如是帝顧而咨嗟焉晉傳咸􅀞像賦序曰先有􅀞卞和之像者以爲臧文仲知栁下惠之賢而不與立卞子自刖以有證相去逺矣戲􅀞其像於卞子之旁特赤其面以示猶有慙色宋炳山􅀞叙曰竪􅀞三寸寔當千仞之髙横墨數尺實體百里之逈晉王彪之詩序曰余自求致仕詔累不聽因扇上有二踈􅀞作詩一首以述其美太平御覽卷第七百五十
