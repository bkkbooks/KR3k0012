front:
  text: 太平御覽卷第八百八珎寳部七
  hash: sha256:684860700fc1c2eb088184bb23d03f8adad38a68d9b995da2fccf42a44d660f2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_808-1a}
body:
  text: 琥琥珀馬腦琉璃車渠頗􅀺水精雲母瑟瑟玗琪琥􅀃文曰琥發兵瑞玉爲琥文周禮春官上大宗伯曰白琥禮西方周禮秋官下小行人曰合六幣琥以繡也左傳昭七曰魯昭公疾徧賜大夫大夫不受賜子家子􅀟琥一環一璧受之大夫皆受其賜事見璧門吕氏春秋曰戰闘用琥虎魄廣雅曰琥魄珠也生地中其上及旁不生草淺者五尺深者八九尺大如斛削去皮成琥魄􅀄時如桃膠凝堅乃成其方人以爲枕出􅀶南縣典略曰大􅁗國多琥魄續漢書曰哀牢夷出光珠琥魄呉書曰虞翻少好學有高氣年十二客有候其兄者不遇遇翻翻追書與曰僕聞虎珀不取腐芥慈石不受曲針過而不存不亦冝乎客得書竒之由是見稱沈約宋書曰武帝時寧州常獻虎珀枕甚光麗時將北征以虎珀治金瘡上大恱命擣碎分付諸將西京􅄂記曰宣帝有身毒寳鏡一枚大如八銖錢常以虎珀笥盛之異物志曰虎珀之夲成松膠也或以作杯瓶華陽國志曰珠穴出光珠虎珀能吸芥西域諸囯志曰珠穴出麋盧水邊沙中有短腰蜂窠燒治以爲虎珀玄中記曰楓脂輪入地中千秋爲虎珀􅀶物志曰松脂淪入地中千年化爲茯苓千年化爲琥珀虎珀一名紅珠今太山有茯苓而無虎珀益州永昌出虎珀而無茯苓或復云燒蜂窼所作未詳此二􅀃拾遺記曰昔漢武寳鼎元年西方貢珎恠青虎珀鷰置之静室自於室内鳴翔又曰呉主聞潘夫人有色令進其圖圖成呉主見之驚喜以琥珀如意撫案即折曰此神女也因納之又曰江引恱鄧夫人月下舞水精如意誤傷其頰令太醫醫之以白􅆩髓和琥珀末塗之遂差神農夲草經曰取鷄􅆑黄白渾􅄂者熟煑及尚軟隨意刻作物以苦酒漬數􅀫旣堅内着杓中佳者亂眞矣此丗所常用作無不成左思蜀都賦曰虎珀丹青珠江瑕英潘尼詩曰駕言遊西岳寓目二華山金樓虎珀階象榻瑇瑁筵中有神秀士不知幾何年馬腦廣雅曰馬腦石次玉也魏略曰大秦國多馬腦涼州記曰吕纂咸和二年盗發張駿陵得馬腦鍾榼北齊書曰武平中除傅伏爲東雍州刺史㑹周克并州遣韋孝寛來招伏曰并州已平故遣公兒來報便冝急下授上大將軍武郷郡開國公即給告身以金馬腦二酒鍾爲信伏不受北史曰梁主蕭􅊫曽獻馬腦鍾周文帝執之頋丞郎曰能擲樗蒲頭盧者便與鍾巳經數人不得頃至薛端乃執樗蒲頭而言曰非爲此鍾可貴但思露其誠耳擲之五子皆黒文帝大恱即以賜之古今注曰魏武帝以馬腦石爲馬勒拾遺記曰帝顓頊時有丹丘國獻馬腦甕以盛甘露充於厨丹丘之地有夜义駒䟦之􅀑能以赤馬腦爲瓶盂及樂器皆精妙於中國用者一云馬腦者惡􅀑之血凝成此物也黃帝時有馬腦甕至堯時猶有甘露在其中􅄹而不竭玄中記曰馬腦出月氐魏文帝曰馬腦勒賦曰玉屬也出自西域文理交錯有似馬腦故其方人因以名之陳琳馬腦勒賦曰託瑶溪之寳岸臨赤水之珠波陸機靈􅀛賦曰􅀂車渠繞理馬腦縟文􅀛甲錯黿龍鱗王粲馬腦勒賦曰遊大國以廣觀兮覽希丗之偉寳惣衆材而課美兮信莫臧於馬腦琉璃孝經援神契曰神靈滋液則琉璃鏡廣雅曰琉璃珠也韻集曰琉璃火齊珠也漢書地理志曰武帝使人入海市琉璃續漢書曰哀牢夷出火精琉璃漢武故事曰武帝好神仙起伺神屋扉悉以白琉璃作之光照洞徹又曰漢成帝爲趙飛鷰造服湯殿緑琉璃爲户魏略曰大􅁗國出赤白黒黄青緑紺縹紅紫十種琉璃魏書曰天笁國人商販至京自云能鑄石爲五色琉璃於是採礪山石於京師鑄之旣成光澤美於西方來者乃詔爲行殿容百餘人光色映徹觀者見之莫不驚駭以爲神明所作自此國中琉璃遂賤人不復珎之呉暦曰黃龍扶南諸外國來獻琉璃􅀳書曰王濟豪侈帝常幸濟宅供饌甚豐悉貯琉璃器中帝甚美又曰汝南王醼公卿以琉璃鍾行酒酒及崔洪洪不肯執問其故曰慮有執玉不趍之義洞􅄀記曰東方朔得五色露以琉璃器盛之獻武帝拾遺記曰董偃設紫琉璃屏風丗􅀃曰滿􅁬畏風在􅀳帝坐北䆫作琉璃扉實宻以踈􅁬有寒色帝􅀏􅁬荅臣猶呉牛見月而喘吴牛水牛也南士多暑而水牛畏熱見月疑是日所以喘􅁬太尉寵之孫也廣志曰琉璃出黄支斯調大􅁗日南諸國南州異物志曰琉璃夲質是石欲作器以自然􅁅治之自然􅁅狀如黄􅁅生南海濵亦可浣衣用之不湏淋但投之水中滑如苔石不得此􅁅則不可釋十洲記曰方文山上有琉璃宫杜篤論都賦曰槌蜯蛤辟琉璃諸葛恢集曰詔荅恢今致琉璃枕一傳咸汚巵賦曰人有遺余琉璃巵者小兒竊弄墮之不潔意旣惜之人有感物之汙辱乃喪其所以爲寳況君子行身而可以有玷乎左思呉都賦曰致逺琉璃珂玳孫公逹琵琶賦曰回風臨樂刻琉璃車渠廣雅曰車渠石次玉也魏略曰大􅁗國多車渠古今注曰魏武帝以車渠爲酒杯玄中記曰車渠出天笁國古車渠椀賦曰車渠玉属多纎理縟文出於西國其俗寳之小以繫頸大以爲器王粲車渠椀賦曰􅄂玄黄以爲質似乾坤之未分兼五德之上美超衆寳而絶倫陳思王車渠盌賦曰唯盌之所生于涼風之峻湄光如激電景􅀂浮星河神恠之瓌瑋信一覽而九驚王處道車渠觶賦曰温􅀂騰螭之􅂛天曜似遊鴻之逺臻頗􅀺梁四公子記曰扶南大舶從西天笁國來賣碧頗􅀺鏡面廣一尺五寸重四十斤内外皎潔置五色物於其上向明視之不見其質問其價約錢百萬貫文帝令有司筭之傾府庫當之不足其商人言此色界天王有福樂事天澍大雨雨衆寳如山納之山藏取之難得以大獸肉投之藏中肉爛􅀋寳一鳥衘出而此寳焉舉國不識無敢酬其價者唐書曰髙宗上元二年十二月拔汗那王獻碧頗􅀺及地黄􅀛兹白王素稽獻金頗􅀺天笁記曰大雪山中有寳山諸七寶並生取可得唯頗􅀺寳生髙峯難得玄中記曰大􅁗國有五色頗􅀺紅色㝡貴十洲記曰崑崙山上有紅碧頗􅀺宫名七寳堂是也水精廣雅曰水精謂之石英續漢書曰哀牢夷出水精魏略曰大􅁗國一名􅀺難宫室皆水精爲柱食器亦然廣志曰水精出大􅁗黄支國十洲記曰崑崙山上有水精闕山海經曰堂庭山多水玉注曰水玉仐水精也列仙傳曰赤松子服水玉拾遺記曰周靈王二十三年起昆昭之臺篩水精爲泥又曰鬰夷國於山上架樓室向明以開户牖以水精火藻爲階司馬相如上林賦曰精磊砢劉魯都賦曰水精潜光於雲穴也劉公幹清慮賦曰入鐐碧之間出水精之都上青艧之山蹈琳瑉之塗雲母春秋運斗樞曰樞星散爲雲母漢書曰王莽侍中待詔有􅀃莽鴟自虎吻犲狼聲者莽誅待詔而封告者後常翳雲母屏風非親近莫得見范曄後漢書曰鄭弘爲太尉弟五倫爲司空􅀄倫爲㑹稽召弘署督郵毎朝弘曲躬自卑帝聽置雲母屏風分隔其間晉陽秋曰孫秀降賜雲母車梁書曰南岳鄧先生名郁荆州建平人也少而不仕隱居衡山極峻之嶺立小板屋兩間足不下山斷􅂖三十餘載唯以澗水服雲母屑日夜誦大洞經唐書曰呉王杜伏威性好左道因合金丹求長生之術常服雲母散又曰尉遲敬德遂飛練金石閑居服雲母粉淮南萬畢術曰雲母入地千歳不朽雲母在足無踐􅁄注曰取大雲母塗足下踐􅁄不能刺淮南子曰雲母來水雲母石可致水抱朴子曰雲母五色其多青者名雲英冝以春服之多赤者名雲珠冝以夏服之多白者名雲液冝以秋服之多黒者名雲母冝以冬服之但有青黄二色者名雲沙冝以季夏服之皛皛純白者名磷石可四時長服又曰呉景帝戍將於廣陵掘冢有人如生棺中雲母厚尺許西京􅄂記曰晉幽公冢甚髙美門􅀜皆是石坐撥除深入乃得雲母深處見百餘尸縱横相枕籍皆不朽唯一男子餘皆女子或坐或立或卧衣服形色不異生人又曰成帝設雲母帳雲幄雲幕於甘泉紫殿丗謂之三雲殿晉公卿禮族曰賜太牢安平王治雲母輦晉宫闕名曰含元池中有雲母舡洛陽宫殿記曰宫中有林啇等觀皆雲母置䆫裏日照之煒煒有光列仙傳曰方囬堯時隱人練食雲母三齊記曰東武城有雲母山山有雲母因以爲名安期先生常所遊餌東園祕記曰以雲母壅尸則亡人不朽帝馮貴人素國色亡巳十餘年冢爲賊所發形貌如故但冷耳盗共姧通之後捕得之此賊言貴人棺有數斛雲母石虎鄴中記曰虎作雲母五眀金薄扇裴淵廣州記曰増城縣有雲母向日出照之晃曜地理志曰瑯瑘定山出雲母王建平典術曰雲母有五名其色青黒五色亂文者名曰雲母白而微青名曰雲英如水露黄白名曰雲沙青赤􅄂者名曰雲珠黄白而赤重厚名陽起石雲母根也其中黑文班如錢名雲膽傷人不可服第一隣石第二雲母第三雲珠第四雲英第五雲光服隣石壽五千年服雲母壽三百年服雲英千年服雲光與天地同保瑟瑟明皇􅄂録曰上於華清宫置長湯數十間屋又爲銀鏤􅃮舡至於檝棹皆飾以珠玉又於湯中壘瑟瑟及沉香爲山以狀􅌡洲方丈又曰􅉑國夫人奪韋氏宅造中堂旣成召匠圬墁授二百萬賞其直而復以金盃二瑟瑟三斗爲賞後曽有􅁀風㧞樹委其堂上已而視之略無所傷旣撤瓦以觀之皆承以木瓦其傳作精至皆此􅀋也玗琪􅀃文曰玗石之似玉者也爾雅曰東方之美者醫無閭之珣玗琪山海經曰開明北有玗琪樹玗琪玉屬太平御覽卷第八百八
