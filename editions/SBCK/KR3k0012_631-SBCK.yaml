front:
  text: 太平御覽卷第六百三十一
  hash: sha256:4cfe3108896014909f1978b3c5742990a27d68a69cf8ab835702c89f54641813
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_631-1a}
body:
  text: 治道部十二薦舉中東觀漢記曰光武召鄧禹曰吾欲北發幽州突􅀐諸將誰可使者禹曰呉漢與鄧弘俱客􅂫弘稱道之禹數與語其人勇鷙有智謀諸將鮮及上以禹爲知人上欲定河内問禹曰諸將誰可守河内者禹曰冦恂文武備足有牧民御衆之才上乃用之又曰東平王蒼薦吏呉良上以章示公卿曰蕭何薦韓信設壇即拜不復考試以良爲議郎又日王丹字仲回􅀄有薦士於丹者丹選舉之而後所舉者䧟罪丹免客暫自絶俄而徴丹復爲太子太􅀓乃呼客見之謂曰何量丹之薄不爲設食以罰之相待如舊又曰南陽太守杜詩上䟽薦伏惠公曰竊見故大司徒陽都侯伏惠公自行束脩訖無毀玷篤信好死守死善道經爲人師行爲儀表衆賢百姓郷望德義微過斥退乆不復用識者􅉖惜儒士痛心又曰上嘗問宋弘通愽之士弘薦沛國桓譚才學洽聞幾幾近岀及楊雄劉向父子於是召譚拜議郎給事中上毎讌輙令鼔琴好其繁聲弘聞之不恱悔於薦舉聞譚内出遣吏召之譚至不舉席而讓之曰吾所以薦子者欲令輔國家以道而今數進鄭聲以亂雅樂非頌德忠正也後大㑹群臣上使譚鼓琴見弘失其常度上恠而問之弘乃離席免冠謝曰臣所以薦桓譚者望能以忠正導主而今朝廷欽悅鄭聲臣之罪也又曰杜林字伯山扶風人爲御史先與鄭興同寓隴右乃薦之上乃徴興爲太中大夫又曰陳寵字昭公沛人爲尚書寵性純淑周宻重慎時有表薦輙自手書削草人莫得知又曰韋豹字季明數年辟公府輒以事去司徒劉愷辟之謂曰卿輕人好去就故爵位不踰今歳垂盡當辟御史意在相薦子其留乎豹曰犬馬齒衰豈敢乆待薦之私非所敢當遂跣而起愷追之遥去不頋范曄後漢書曰東平王蒼以至戚輔政時班固始弱冠􅀃蒼曰將軍以周邵之德立於夲朝今者將軍幕府新開廣延群俊四方之士顚倒衣裳將軍冝効唐殷之舉審伊臯之薦令逺近無偏幽隱必逹光名宣於當世貴烈著於無窮竊見故司空􅁺桓梁京兆􅀕酒馮晉扶風􅁺李育京兆督郵郭基凉州從事王雍恒農功曹殷肅此六子者皆有殊行絶才德隆當丗如蒙徴納以輔髙明此山梁之秋夫子所爲嘆也蒼納之又曰曹騰加位特進其所進逹皆海内名人陳留虞放邊留南陽延固張温恒農張兾頴川堂谿等皆所舉也漢􅄂事曰傅喜爲右將軍傅太后與政事喜數諌之后不恱喜上印綬病在家司空何武尚書唐林上書曰魯以季友治亂楚以子玉輕重魏以無忌折衝項以范増存亡故楚跨有南􅁟帶甲百萬隣國不以爲難子玉爲將文公仄席而坐及其死君臣相慶百万之衆不及一賢於是上拜喜爲大司馬封髙武侯又曰谷永爲尚書薦薛宣竊見少府宣材茂行㓗逹於從政有退食自公之節寡移賞遊說之􅂇臣恐陛下忽於羔羊之詩捨功實之臣任虚華之譽是以越陳宣行能唯留神考察上然之遂以宣爲御史大夫魏志曰太祖旣定河北而髙幹舉并州叛衛固與范先通謀太祖謂荀彧曰河東􅀍山帶河當今天下之要地也君爲我舉蕭何冦恂以鎮之彧曰杜幾可於是拜幾爲河東太守固等卒伏又曰頴川戯志才籌畫之士太祖甚器之早卒太祖與荀彧書曰自志才亡後莫可與計事者汝潁固多竒士誰可以繼之彧薦郭喜召見與語天下事太祖曰使􅀌成大業者必此人也喜亦喜曰真吾君矣又曰張郃字儁乂河間人也郃雖武將而愛儒士嘗薦同郡畢諶經修行明詔曰昔􅀕遵爲將常置五經大夫居軍中與諸生雅歌投壷今將軍外勤戎旅内存國朝朕嘉將軍之意擢諶爲愽士又曰桓範薦徐宣曰臣聞帝王之用當丗俊才争奪之時以䇿畧爲先分定之後以忠義爲首故晉文行子犯之計而賞曰季之言髙祖用陳平之智而託後於周勃􅀼見尚書徐宣體忠厚之行秉直亮之性清雅特立不隨丗俗確然難動社稷之節今僕射􅆙宣行掌後事腹心任重莫如宣者帝遂以宣爲右僕射又曰陳群薦廣陵陳矯丹楊戴乾太祖並用之後乹以忠義死矯爲名臣蜀志曰諸􅁑亮自比管仲樂毅時人莫之許唯徐元直徐庶字元直謂爲信然時先主屯新野庶謂先主曰諸􅁑孔明者卧龍也將軍豈願見之乎先主曰君與俱來庶曰此人可就見不可屈致將軍冝枉駕頋之由是先主遂造亮凢三於是情好日宻􅀜羽張飛等不恱先主解之曰􅀌有孔明猶魚之有水也願諸君勿復言羽飛乃止呉志曰劉繇字正禮東來人兄岱字公山平原陶洪薦繇欲令舉茂才刺史曰前年舉公山柰何復舉正禮乎洪曰􅀂使君用公山於前擢正禮於後所謂御二龍於長衢騁騏􅂹於千里不亦可乎又曰周瑜薦魯肅才冝佐時當廣求其比以成功業不可令去也權即召肅與語甚恱之衆賔罷退獨引肅還合榻對食又曰凌統字公績呉郡人爲孫權將甚見親重時有薦同郡盛暹於權者以爲梗槩大節有過於公績權曰但令如公績足矣後召暹夜至公績巳卧聞之攝衣出門執其手以入其愛善不害如此晉書曰桓尋字茂倫性通朗早有盛名有人倫識鑒抜才取士或出於無聞或得之孩抱時人方之許郭又曰劉恢甞薦呉郡張慿卒爲美士衆以此服其人又曰華譚字令恩廣陵人除甄城令過漢水作莊子讃序以示功曹後見教不常譚疑不能爲私問是廷􅁺張延所作譚即抜延薦達於部遂得升擢比譚爲廬江延亦巳爲郡譚至廬江舉寒族周訪爲孝廉訪果立功名時以譚爲知人又曰江統爲司徒左長史東海王越爲兖州牧以統爲別駕委以州事與統書曰昔王子師爲豫州未下車辟荀慈明下車辟孔文舉貴州人士有堪應者否統舉髙平郗鑒爲賢良陳留阮脩爲直言濟北程収爲方正時以爲知人徐廣晉紀曰張華少自牧羊而篤志好學􅀄爲縣史盧欽竒其才數稱薦之晉中興書曰賀循㑹稽人郡鈴下有楊方者字公迴丗爲郡威儀少好學有竒才以門役在閤下公事之暇輒讀五經郷邑未之別也内史諸􅁑恢聞方學召爲給使見而異之謂有殊常之才即解役散置左右以門人待焉由是􅀖壤敬異方始得周旋郷貴虞喜兄弟以儒學立名並知拔之後恢欲薦郡功曹於中宗使方具其事主簿虞預以薦為美送示太常賀循遂向京師稱美之司徒王導辟以爲􅁺方始岀都交遊人間縉紳咸厚遇之傅暢晉諸公讃序曰魏舒雖有宇量衆望未能悉歸侍中任愷爲丗祖所委任秦始中啓舒散􅀐常侍侍中尚書令又爲吏部遷僕射舒雖體度弘雅而才鈍無所創設遷光禄大夫開府領司徒丗祖臨軒使太常任愷拜授朝廷以愷前啓拔舒而爲王人人爲愷怨之也宋書曰劉穆之爲丹陽尹凢所薦逹不納不止常云我雖不及荀文􅀂之舉善然不舉不善又曰王鎮惡頗讀諸子兵書喜論軍國大事􅀐射非長而縱橫善果斷武帝伐廣固鎮惡時爲臨澧令人或薦之武帝召與語異焉因留宿且謂叅佐曰鎮惡王猛孫所謂將門有將即署前部賊曹破賊有功封博陸縣五等子又曰謝晦字宣明􅀄爲昶建威府中兵叅軍孟昶死帝問劉穆之昶府誰堪入府穆之舉晦即命爲太尉叅軍武帝嘗訊獄其旦刑獄叅軍有疾晦代之晦車中一覽訊牒隨問酬對無失即日署刑獄賊曹又曰張邵元嘉五年爲征虜將軍領寕蠻校尉雍州刺史加都督􅀄王華與邵不和及華叅要親舊爲之危心邵曰子陵子陵華字方弘至公豈以私􅂩害正義是任也華實舉之又曰晉平王休祐爲南徐州帝就禇彦回求幹事人爲上佐彦回舉沈文季轉􅀐長史東海太守又曰劉道産在雍州有惠化遂蠻歸懷皆出縁征爲村落户口殷盛及産死羣蠻大爲冦􅁀孝武西鎮襄陽江夏王羲恭薦柳元景乃以爲武威將軍隨郡太守至廣設方畧斬獲數百郡境肅然又曰荀伯子好學愽覽經傳解􅄄奉朝請貟外散􅀐侍郎著作郎徐廣重其才學舉伯子及王韶之並爲佐郎同撰晉史齊書曰愽昭字茂逺御史中丞劉俅薦於武帝永明􅀄以爲南郡王侍讀又曰孔休源字慶緒州舉秀才太尉徐孝嗣省其䇿深善之謂同坐曰觀此足稱王佐之才瑯瑘王融雅相友善薦之於司徒竟陵王爲西邸學士又曰江革字休映弱冠舉南徐州秀才時胡諧之行州事王融與諧之書令薦舉諧之方貢瑯瑘王沉便以革代之又曰武帝將下都劉懷珎白帝曰夏口是兵衝要地冝得其人髙帝納之與武帝書曰汝旣入朝當湏文武兼資人委以後事武帝乃舉栁世隆自代轉爲武陵王前軍長史江夏内史行郢州事又曰明帝詔求異士始安王遥光表薦王􅌔及東海王僧孺除􅌔散􅀐從事中郎將又曰梁武帝之臨雍州問京兆人杜惲求州綱紀惲言柳慶逺武帝曰文和吾已知所問未知者耳因辟爲别駕又曰陸厥字韓卿少好屬文永明元年詔百官舉士同郡司徒左曹􅁺顧暠之表薦厥堪舉秀才梁書曰何遜字伯言八歳能賦沈約嘗謂遜曰吾毎讀卿詩一日三復猶不已其爲名流所稱如此天監中兼尚書水部貟外郎南平王引爲賔客後廌之於武帝與呉均伹進倖又曰朱异字彦和呉郡人也有詔求異能之士五經博士明山賔表异髙祖召見使􅀃孝經周易甚􅀃之謂左右曰朱异實異能後見山賔謂曰卿所舉殊得其人仍召异直西省又曰陸襄字師卿天監三年都官尚書范軸表薦襄起家爲著作郎陳書曰陸瓊字伯玉㓜聦惠有令名深爲文帝所貴及封周迪陳寳應等都官符及大手筆並中勑付瓊及宣帝爲司徒妙簡僚佐吏部尚書徐陵薦瓊於宣帝言其具覆敏文史足用近居郎署歳月過淹左曹􅁺缺凢膺兹選雖階次小踰其屈滯巳積乃除司徒左曹􅁺北齊書曰祖鴻勲范陽人也僕射臨淮王或表薦鴻勲有文學冝試一官勑除奉朝請人謂之曰臨淮舉卿便以得調竟不相識恐非其冝鴻勲曰爲國舉才臨淮之務但鴻勲何從而謝之或聞而喜曰吾得其人矣太平御覽卷第六百三十一
