  text: 太平御覽卷第九百三十一鱗介部三
  hash: sha256:cce0a65ef228349d0287814589e08f8061e6b9199ac99cb5af669e16f8ccbba9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_931-1a}
body:
  text: 􅀛爾雅曰􅀛三尺賁今呉興陽羡縣君山上有池池中有六眼􅀛􅀛俯者靈行頭低仰者謝行頭仰前弇諸果甲前長左倪不􅀋行頭今江東所謂者以甲卜審右倪不􅀂行頭右庳爲右食甲形皆爾一曰神􅀛龜之最神明二曰靈􅀛涪陵郡出大􅀛甲可以卜縁中文似瑇瑁俗呼爲靈􅀛即今觜􅏲􅀛一名靈􅏲能鳴􅏲以規切三曰攝􅀛小􅀛也腹甲曲折解能自張閉好食虵江東呼爲靈􅀛也四曰寳􅀛書曰遺我大寳􅀛五曰文􅀛甲者文彩者河圖曰靈􅀛􅀒書丹甲青文六曰筮常在著藂下潜伏見􅀛榮傳七曰山􅀛八曰澤􅀛九曰水􅀛十曰火􅀛此者說􅀛生之處所火􅀛猶火䑕午耳物有含異氣者不可以常理推然亦無所恠周易曰或益之十朋之􅀛又說卦曰離爲􅀛京房易緯曰靈􅆱四十九莖下有千歳神􅀛守之焦贑易林曰􅀛猒江海陸行不止自今枯藁失其都市尚書臯陶謨曰昆命于元􅀛又禹貢曰九江納錫大􅀛又曰寜王遺我大寳􅀛文王也遺我大寳􅀛疑則卜之尚書中􅀱曰堯沉璧於洛玄􅀛􅀒書出於背中赤文朱字止壇塲沉璧於河黒􅀛出赤文題又曰周公攝政七年制禮作樂成王觀於洛沉壁禮畢王退有玄􅀛青純蒼光背甲刻書上躋于壇赤文成字周公冩之雒書曰靈􅀛者玄文五色神靈之精也上隆法天下法地能見存亡明於􅁻凶王者不偏黨尊􅂄老則岀洪範五行曰􅀛之言乆也十歳而靈比禽獸而知􅁻凶者也周禮天官上鼈人曰春獻鼈蜃秋獻􅀛魚又春官下􅀛人曰􅀛人掌六􅀛之屬各有名物天􅀛曰靈屬地􅀛曰緯屬東􅀛曰果屬西􅀛曰雷屬南􅀛曰獵屬北􅀛曰􅀂屬凢取􅀛用秋時攻􅀛用春時各以其物入于􅀛室六􅀛各異室也大戴禮曰甲之蟲三百六十而神􅀛爲之長禮記月令曰季秋登􅀛取黿甲􅀋秋乃堅成故是月登取又學記曰青黒縁者天子之寳􅀛也又禮運曰麟鳯􅀛龍謂之四靈逸禮曰天子􅀛尺二寸諸侯八寸大夫六寸士民四寸􅀛者隂蟲之老也􅀛三千歳上游於卷耳之上老者先知故君子舉事必考之禮統曰神􅀛之象上貟法天下方法地背上有盤法丘山玄文交錯以成列宿五光昭􅀂玄錦文運轉應四時長尺二寸明􅁻凶不言而信左傳襄二十三年曰臧武仲自邾使告臧賈且致犬蔡焉大蔡臧文仲所居大􅀛也曰紇不佞失守宗祧祧廟敢告不吊言我爲人後不至於道而失守紇之罪不及不祀不祀絶也言冝有後也子以大蔡納請其可請爲先人立後其必可也賈曰聞命矣再拜受􅀛公羊傳定公曰弓繡質質祔􅀛青純純縁春秋運斗樞曰瑶光星散爲􅀛史記􅀛䇿傳曰余至江南觀其行事問其長老云􅀛于歳乃游蓮葉之上江傍家人嘗畜􅀛飲食之以爲能導引致氣有益於助衰飬老豈不偉哉史記禇先生曰能得名􅀛者財物歸之家必大冨至千萬一曰北斗􅀛二曰南辰􅀛三曰五星􅀛四曰八風􅀛五曰二十八宿􅀛六曰日月􅀛七曰九州􅀛八曰王􅀛凢八名􅀛􅀛各有文在腹下此􅀛不必滿尺二寸民人得長七八寸可寳矣神􅀛岀於江中廬江郡常歳時出􅀛長尺二寸者二十枚輸太卜官太卜官因以吉日剔取其腹下甲􅀛千歳乃滿尺二寸有神􅀛在江南嘉林中嘉林者獸無虎狼鳥無鴟梟草無毒螫野火不及斧斤不至是謂嘉林􅀛在其中嘗巢於芳蓮之上左脅書文曰甲子重光得我者匹夫爲人君有土正諸侯得我爲帝王南方老人用􅀛支牀足行二十餘歳老人死後移床􅀛尚生能行氣導引又曰宋元王二年江使神􅀛使於河至於泉陽漁者豫且舉網得而囚之置之籠中夜半􅀛來見夢於宋元王曰我爲江使於河而網當吾路泉陽漁者豫且得我我不能去身在患中王有德義故來告愬元王􅅥然乃召􅀶士衛平而問之平曰􅀛也王求之泉陽豫且曰夜半舉網得􅀛使者載行入端門見王延頸而前三歩而止縮頸而却復其故處於是元王擇日齋戒以刀剥之元王之時衛平相宋宋國最強􅀛之力也魏略曰文帝時神􅀛岀於靈芝池晉書曰懷帝永嘉元年有玉􅀛出於覇水也崔鴻十六國春秋前燕録曰海出大􅀛枯死於平墩遼東送之侍郎王弘以爲宇文允得􅀛滅亡之徴也晉書曰符堅末髙陸人穿井得􅀛大三尺背上有文象八卦堅命太卜池飬之食以粟及死藏其骨於太廟是夜廟丞髙虜夢􅀛謂之曰我本岀將歸江南遭時不遇殞命秦庭又有人夢於虜曰􅀛三千六百歳終必妖興亡國之象也其後竟驗又載記曰乞伏國仁隴西鮮卑人也昔有如弗斯出連叱盧三部自漠北南岀太隂山遇一巨蟲於路狀􅀂神􅀛大如阜乃殺馬而􅀕之祝曰􅀂善神也便開路惡神也遂塞不通俄而不見乃有一小兒在焉南齊書曰永明年唐濳獻青毛神􅀛一頭梁書曰元帝爲江州刺史時有安成望族劉敬躬者田間得白蛆化爲金􅀛將銷之􅀛生光照室敬躬以爲神而禱之所請多驗也三國典畧曰梁陸法和至襄陽城北大樹下􅀞地方二尺令弟子掘得一􅀛長一尺五寸杖叩之曰汝欲岀此巳數百歳􅀂不遇我豈見天子日爲授三歸􅀛乃入草去陳書曰武宣章皇后母常遇道士以小􅀛遺巳光采五色曰三年有徴及朞后生紫光照室因失􅀛所在隋書曰開皇中掖庭宫毎有人來挑宫人宫司以聞帝曰門衛甚嚴人何從而入當是妖精耳因戒宫人曰􅀂逢但斫之其後有物如人夜來登床宫人抽刀斫之􅀂中枯骨其將落牀而走宮人逐之因入池而没明日帝令涸池得一􅀛徑尺餘其上有刀迹煞之遂絶唐書曰先天二年丁未江州獻靈􅀛六眸腹下有玄文象卦文梁記曰朱友貞末年許州獻緑毛􅀛以爲瑞因宮中造室以居之目爲􅀛堂晉史曰安州李金全之將叛也郡樓有介蟲如􅀛而巨鱗銳首能䧟堅出於金全足下金金惡而焚之列子曰渤海之東有大壑焉其中有山無所連著常隨潮波上下徃還不得暫峙焉仙聖毒之訴於上帝帝恐流於西極失羣聖之居使巨􅀛十五舉首而戴之迭爲三番六萬歳一交焉五山始峙而不動龍伯之國有大人舉足而不盈數十歩而曁五山之所一釣而連六􅀛合􅀒而趣歸其國灼其骨以數焉莊子曰莊釣於濮水楚王使大夫徃先白焉曰願以境内累子莊子持竿不顧曰吾聞楚有神􅀛死已二千歳矣巾笥而藏之廟堂之上此􅀛者寧其死留骨而貴乎寧其生而曳尾塗中乎大夫曰寕生而曳尾塗中莊子曰徃矣吾將曵尾於塗中又曰宋元君夜半而夢人􅀍髮窺阿門曰予自宰露之淵予爲清江使河伯之所漁者余且得予元君覺召占夢者占之曰此神􅀛也君曰漁者有余且乎左右曰有君曰令余且㑹朝明日余且朝君曰若漁何得荅曰且之網得白􅀛五尺君曰獻若之􅀛􅀛至君再欲殺之再欲活之心疑卜之曰殺􅀛以卜吉乃刳􅀛以卜七十二鑚而無遺筴仲尼曰神􅀛能見夢於元君而不能避豫且之網智能七十二鑚而無遺筴不能避刳膓之患淮南予曰􅀛三千歳蜉蝣不過三日以蜉蝣而爲􅀛憂飬生之具人必􅀏之又曰牛􅇾顱亦骨也而弗灼必問吉凶於􅀛者以其歷歳乆也抱朴子曰千歳靈􅀛五色具焉其雄額上兩骨起似角解人言浮於蓮葉之上或在䕺􅆱之下以來朱浴之乃剔取其甲火炙擣服方寸匕日三盡一具壽千歳又曰山中辰曰稱雨師者龍也巳曰稱寡人者社中虵也稱時君者􅀛也又曰郄儉少時行獵墮空冢中饑餓見冢中先大􅀛數數迴轉所向無常張口吞氣或俛或仰素聞􅀛能導引乃試隨􅀛所爲遂不復饑百餘日後竟能咽氣斷榖魏王弃置土室中􅐬試之一年不食顔色恱懌氣力自􅀂符子曰􅀖人獻燕昭王以大豖者曰於今百二十歳􅀖人彼背歲彗星見彼操其柄我操其標吾又夢與荆上􅅮彼在上我在下吾以無戰子以爲何如咎犯對曰卜戰􅀛􅑒是荆人也我迎歳彼背歳彼去我從之也又曰晉屠岸賈欲追趙氏趙盾夢見叔帶持􅀛而哭甚悲巳而􅀏拊手且歌謂趙盾􅁲之占兆絶而後好趙史援占曰此甚惡非君之身國語曰夫服心之文也如􅀛焉灼其中必文於外􅀂楚公子不爲君必死不合諸侯矣家語曰孔子問􅃮彫馮曰子事臧文仲武仲及孺子容此三大夫者孰爲賢乎對曰臧氏家有守􅀛焉文仲三年而爲一兆武仲三年而爲二兆孺子容三年而爲三兆馮從此見之􅀂夫三人之賢與不賢所未敢識也孔子曰君子哉􅃮彫氏之子其言人之美也隱而顯言之過也微而著智不能及明不能見孰克如之論衡曰􅀛三百歳大如錢游華葉上三千嵗則青邊有距山海經曰大苦山陽狂水出焉注于伊水中多三足􅀛星經曰天􅀛五星在南漢中廣志曰觜兹維切􅏲夷焦切形如􅀛出交州山􅀛在山上食草長尺餘栁氏􅀛經曰􅀛一千二百嵗可卜天地之終始何以言之三千四十二占於天地千􅀊之􅀛甲黒􅀛有五色時用之神仙傳曰南極子融即柸呪之即成􅀛煑之可食腹藏皆具柸成􅀛殻煑取􅁏還成柸㑹稽後賢傳曰孔愉字敬康甞至呉興餘不亭見人籠􅀛於路愉求買而放於溪中􅀛行至水反顧視愉及封此亭而鑄印􅀛首廻屈三鑄不正有似昔􅀛之顧靈德感應如此華陽國志曰秦惠王十二年張儀司馬錯破蜀克之儀因築城城終頺壞後有一大􅀛從硎而出周行旋走乃依􅀛行所築之乃成古史考曰伏羲時靈􅀛􅀒河圖八卦是也洛陽記曰禹時有神􅀛於洛水􅀒文列於背以受禹文即治水文也南越志曰􅀛甲名神屋出南海生池澤中呉越謂之元佇神􅀛大如拳而色如金上甲兩邊如鋸齒􅀲利而能縁大木捕鳴蟬至美可食不中於卜以其小故也嵩髙山記曰千歳松或化爲伏􅀛義興記曰君山廟其下有池池中有三足六眼􅀛崔豹古今注曰􅀛一名玄衣督郵一名元緒王子年拾遺録曰崑崙山第五層有神􅀛長一尺九寸四翼萬嵗則􅂛木而居也亦能言矣郭子橫洞􅁳記曰黃安代郡人也常去自云卑猥不敢處人間執鞭懷而欲書􅀞地以記其數一夕地成池矣明腹移亦復成池時人謂言黃安舌耕年可八十餘視􅀂童子常服朱砂舉體皆赤冬不着衣坐一大神􅀛時人問子坐此􅀛幾年對曰昔伏羲氏始造網􅅈有此􅀛以授吾􅀛背巳平此蟲畏日月之光二千嵗而一岀頭我坐此􅀛巳來五遇岀頭矣行則􅀒􅀛而移世人謂黃安萬歲􅀶物志曰人有出行墜深泉澗者無出路饑餓分死左右見􅀛虵甚多朝暮引頸向東方人因伏地學之遂不復饑體殊輕便能巖岸經數年後試竦身舉臂遂超出澗上即得還家顔色恱懌頗更􅃛慧勝故還食榖啖滋味百餘日中復其本質又曰􅀛三千歳猶旋卷耳之上􅆱千嵗三百莖同本以老知􅁻㓙神異經曰西方大荒中有人焉長丈其腹圍九尺踐􅀛虵載朱鳥知河海􅂛斛識山石多少知天下鳥獸言語續捜神記曰司徒蔡謨親友王蒙者單獨常爲蔡公所怜公嘗令曰捕魚獲􅀛如車輪公付厨帳下倒懸􅀛着屋蒙其夕纔眠巳厭如此累夜公聞而問蒙何故厭荅云眠輙夢人倒懸巳公容慮向􅀛乃令人視􅀛所在果倒懸着屋公嘆曰果如所度命下􅀛於地於是蒙即得安寢􅀛乃去又曰晉咸康中豫州刺史毛寳戍邾城有一軍人於武昌市見人賣一白􅀛子長四五寸潔白可愛寳便買取持歸着瓮中養之日日大近欲尺許其人憐之持至江邊放水中視其去後邾城遭石勒敗毛寳弃豫州旣越江莫不沉溺寳于時􅀍鎧持刀亦同自投旣入水中覺如隨一石上水裁至腰湏􅁷游去中流視之乃是先所養白􅀛甲六七尺旣送至東岸出頭視此人徐游而去中江猶迴首數焉又曰鄱陽縣民黃赭入山採荆楊子遂迷不知道數日饑餓怱見一大􅀛赭便呪曰汝是靈物吾迷路不知道今􅀐汝背示吾路􅀛即回右􅈩赭即從行去十餘里便至溪水見賈客行舡赭即徃乞食便語舡人云我向者於溪邊見一􅀛甚大可共徃取之言訖靣即生瘡旣徃亦復不見􅀛還家數日病瘡而死劉敬叔異苑曰餘姚縣倉封印完全而開之覺大損耗後伺之乃是冨陽縣桓王陵上􅀟石􅀛所食即密令毀􅀛口於是不復損耗又曰孫權時永康有人入山遇一大􅀛即束之歸􅀛便言曰遊不良爲時君所得人甚恠之載岀欲上呉王夜洎越里纜舡於大桑樹霄中樹呼􅀛曰勞乎元緒奚事爾耶􅀛曰我􅀍拘縶方見烹臛雖盡南山之樵不能潰我樹曰諸􅁑元遜􅀶識必致相苦令求如我之從計從安岀􅀛曰子明無多辭禍將及爾樹寂而止旣至權命煑之焚柴萬車語猶如故諸􅁑恪曰燃以老葉乃熟獻人仍說􅀛樹共言權登使伐取煑􅀛立爛今烹􅀛猶多用葉薪野人故呼􅀛爲元緒孔氏志恠曰㑹稽吏謝宗赴假呉中獨在舡忽有女子姿性妖婉來入舡問宗有佳絲否欲市之宗因與戲女漸相容留在舡􅀫歡宴繼曉因求宗􅀉載宗便許之自爾舡人恒夕但聞言􅀏兼芬馥氣至一年徃來同宿宻伺之不見有人方知是邪魅遂共掩之良乆得一物大如枕湏􅁷叉得二物並小如拳以火視之乃是三􅀛宗悲思數日方悟自說此女子一歳生二男大者名道愍小者名道興旣爲􅀛送之於江廣五行記曰晉孝武太元中呉郡岑泉爲司農造碑於江畔湖西之村見石􅀛載碑從田中岀還其先處萍藻猶在腹下其月泉􅁀亡任昉述異記曰陶唐之世越裳國獻千嵗神􅀛方三尺餘背上有文背科斗書記開闢已來命録之􅀛曆伏滔述帝功德銘曰胡書􅀛暦之文又曰周時城陽雨錢終日方絶王莽時未央宫雨五銖錢旣至地悉爲􅀛兒又曰􅀛一千年生毛壽五千歳謂之神􅀛壽萬年曰靈􅀛孫惠􅀛賦曰有輜衣之大夫兮衣玄繡之衣裳乗輜車之岌兮駕雲霧而翺翔風雨爲之電􅁬兮五色赫以焜煌李顒􅀛賦曰質應離象位定坎居賤彼孕頥賁我靈符浮洛川見緯書洞祕􅄨通玄虚太平御覽卷第九百三十一
