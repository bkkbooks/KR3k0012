front:
  text: 太平御覽卷第一百五十八
  hash: sha256:0487e2ac69505bbe87236aef5fd34e78e91e9a6ace1146635f545eef26e46d80
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_158-1a}
body:
  text: 州郡部四河南道上開封府河南府陜州東京開封府元和郡國志曰禹貢兖州之域春秋時爲鄭地戰國時爲魏都史記曰魏恵王自安邑里徙大梁今浚儀縣按後漢書大梁城魏惠王所築漢書曰酈食其􅀃髙祖曰陳留天下之衝四通五逹之郊又曰文帝以皇子武爲梁王都大梁後東徙睢陽注曰睢陽今宋州也後漢書曰明帝永平十五年東巡至大梁春秋後語曰􅂫秦去韓之魏􅀃襄王曰大王之地南有鴻溝陳留汝南郾邵陵舞陽新都東譙潁煑棗無䟽鴻溝今在譙縣潁今潁州煑棗今曹州宛可地無䟽或作無咠未詳所在西有長蛇之地史記作長城之地今武原縣有長城北有河水卷燕酸棗地方千里田舎廬廡之數無所不畜收人民之衆牛馬之多夜行不絶􅟁􅟁殷殷車馬聲也􅟁火宏切夫魏天下之強國也王天下之賢王也郡國志曰東魏孝靜帝以此置梁州周宣帝改爲汴州以其臨汴水爲名也隋大業十三年州廢以開封浚儀屬鄭州隋亂䧟賊唐武徳四年平王丗充復置汴州五代史曰梁開平元年梁祖􅀄開國升汴州爲開封府建名東京元管開封浚儀陳留雍丘封丘尉氏六縣至是割滑州之酸棗長垣鄭州之中牟武陽宋州之襄邑曹州之戴邑許州之扶溝􅋣陵陳州之太康九縣􅀠焉後唐復降爲汴州以宣武軍爲額其陽武長垣扶溝考城等四縣仍且􅀠汴州其餘五縣却還夲部晉天復中復升爲東京復以前五縣􅀠之漢周並因之太康地記曰豫州之分其人得中和之氣性安舒其俗阜其人和今俗多寛慢漢志曰開封逢池在東北或曰宋之逢澤也瓉曰汲郡古文梁惠王廢逢忌之藪以賜民今浚儀是也史記曰王稽興范睢言曰先王待我于三亭之南三亭今屬浚儀陳留風俗儀傳曰阮簡爲開封令有劫賊外白甚急簡方圍棊長嘯曰局上有劫甚急徐廣史記音義曰秦孝公㑹諸侯於蓬澤圖經曰浚儀有髙陽故城顓頊髙陽氏佐少昊有功封於此城又曰浚儀有信陵亭在城内即魏公子無忌勝槩之地左傳曰韓起送女於楚還過鄭鄭伯勞諸國今圍城是也漢志曰陳留郡鄭邑後爲陳所併故曰陳留瓉曰宋亦有留彭城留是也留屬陳故稱陳留也古史考曰伊尹生於空桑陳留有空桑故城家語曰孔子南遊於楚至阿谷之隧使子貢奉觴從女子乞飲今陳留有阿谷水漢志曰雍丘屬陳留故􅂎國周武王封禹後東樓公左傳曰衛侯伐鄭至于鳴鴈在雍丘有鳴鴈亭左傳曰齊桓公㑹諸侯于葵丘今在雍丘縣漢志曰東昏陳留郡莽改曰東明又曰襄邑屬陳留有服官莽曰襄平師古曰襄邑宋地夲承匡襄陵郷宋葬公所葬故曰襄陵􅁗始皇以承匡卑濕故徙縣於襄陵謂之襄邑縣陳留風俗傳曰襄邑縣南有渙水睢水傳曰睢渙之水出文章故有黼黻藻錦日月華蟲以奉天子宗廟御服焉左傳曰宣二年鄭破宋師于大􅁄杜預曰在襄邑後漢地理志曰陳留郡巳吾有大􅁄郷國都記云封丘衛地故燕之延郷也髙祖與項羽戰戰於延郷有翟母免其難故以延郷封翟母焉漢志曰封丘屬陳留郡孟康曰春秋時敗翟于長丘今翟溝是也漢志曰尉氏屬陳留郡應劭曰古獄官曰尉氏鄭之别邑也瓉曰鄭大夫尉氏之邑遂以爲邑師古曰鄭大夫尉氏亦以掌獄之官故爲族耳後漢地理志曰陳留郡尉氏有陵樹郷郷北有澤澤有天子􅁐囿有秦樂廐漢以馴養猛獸漢志曰外黄屬陳留郡張晏曰魏郡有内黄故加外耳瓉曰縣有黄溝故依之也左傳曰惠公敗宋師于黄杜注外黄縣東有黄城陳留風俗傳曰沛公起兵野戰喪皇妣於皇郷天下平定乃使使者以梓宫招䰟於野有丹蛇自洒濯入梓宫其俗處仍有遺髮其處在小黄屬陳留漢志曰長垣屬陳留郡莽曰長固孟康曰春秋㑹于匡今匡城是晉地道記云長垣故衛故匡城地孔子所厄處也地道記曰承匡城在縣西左傳文十一年㑹晉郤􅆙于承匡是也漢志曰鄢屬陳留莽曰順通左傳隱公曰鄭伯克叚于鄢又鄭太叔侵鄭至于廪延注曰縣北有延津後漢地理志曰即酸􅀥也戰國䇿云齊欲發卒取周九鼎顔率曰夫梁之君臣欲得九鼎謀於沙海之上爲日乆矣沙海屬浚儀陳留風俗傳曰縣有蒼頡師曠城其城有列仙吹臺梁王增築之以爲吹臺俗号繁臺史記曰大梁城有十二門東門曰夷門隱士侯嬴年七十家貧爲大梁夷門抱關者魏公子無忌厚遺之不肯受水經曰大禹塞滎陽澤開渠以通淮泗名莨菪渠即汴渠也漢平帝時河汴決壞後明帝遣使者修治汴渠至隋大業中更令開導名通濟渠引河水入汴口自大梁之東引入泗連于淮至江都宮入于海亦謂之御河河畔築御道植栁煬帝廵幸乗龍舟而徃江都自楊益湘南至交廣閩中公私漕運商旅軸轤相接隋書曰大業元年以汴水迃曲廻復稍難自大梁城西南鑿渠引汴水入號通濟渠西京河南府十道志曰洛州周之舊都禹貢豫州之域尚書洛誥曰召公旣相宅周公往營成周使來告卜作洛誥予惟乙夘朝至于洛師我卜河朔􅀺水我乃卜澗水東􅈆水西惟洛食又卜􅈆水東亦惟洛食言先卜河北􅀺水不吉又卜澗􅈆之間乃吉周禮司徒職曰以土圭之法測土深正日影以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所㑹也隂陽之所和也然則百物阜安乃建王國焉又曰午爲鶉午周之分野自栁九度至張十七度七星周之分野周書曰周公將致政乃作大邑于洛北因邙山以爲天下之湊也孝經援神契曰八方之廣周洛爲中於是遂築新邑營定九鼎以爲王之東都漢書曰商祖欲都洛陽戍卒婁敬求見上曰陛下都洛陽欲與周室比隆哉上曰然敬曰陛下取天下與周室異周之先自后稷積德十餘丗公劉避狄居豳大王以狄伐故去􅃎之歧國人争歸之文王爲西伯武王伐紂八百諸侯不期而㑹成王即位周公之屬輔相焉乃營成周於洛邑以爲天下中四方納貢道里均有德則以王無徳則易以亡凡居此者欲務以德致人不令後丗驕奢以虐民也及周之衰乃分爲二天下莫朝周不能制形勢弱也今陛下用兵取天下百姓肝腦塗地而欲比隆周室臣以爲不侔矣不如都秦帝以問張良良曰洛陽雖險其中不過百里四面受敵此非用武之國不如都關中婁敬之􅀃是也􅀶物志曰周在中樞三河之分風雨所起四險之國武王克殷定鼎郟鄏以爲東都皇甫謐帝王丗紀曰周公相成王以鄷鎬偏在西方職貢不均乃使邵公卜居洛水之陽以即中土元和郡縣志曰河南府三代皆爲都邑周公營之爲成周秦爲三川郡漢爲河南郡後漢光武都之左傳曰􅀄平王東遷辛有適伊川見􅀍髮而􅀕於野者曰不及百年此其戎乎其禮先亡矣帝王丗紀曰周襄王十五年秦晉遷陸渾之戎于伊川果辛有之言又曰晉趙鞅納王使汝寛守闕塞服䖍曰闕塞南山伊闕也史記曰秦武王謂甘茂曰寡人欲通三川以窺周室死且不朽矣漢志曰雒陽周公遷殷民是爲成周春秋昭二十二年晉合諸侯于狄泉以其地大成周之城王莽曰冝陽後漢書曰時天下墾田不以實戸口互有増減詔下郡國檢覆其事而州郡多不均平百姓嗟怨帝見陳留牘上有書視之云潁川弘農可問河南南陽不可問帝怒時顯宗爲東海公年十二言曰吏受郡勑當欲以墾田相方耳帝問曰何故言河陽南陽不可問對曰河南帝城多近臣南陽帝郷多近親又曰梁鴻登北邙山作五噫之歌曰登彼北邙􅀆噫覽觀帝京􅀆噫宫室崔嵬􅀆噫寥寥未央􅀆噫人之劬勞􅀆噫魏志曰明帝即位欲平北邙山令登觀臺見孟津廷尉辛毗諌曰天地之性髙髙下下今而反之旣非其理􅀂九河盛溢洪水爲害丘陵皆夷何以禦之乃止晉書曰武帝問尚書郎虞摯三日曲水事摯曰漢章帝時平原徐肇以三月􅀄生三女至三日俱亡一村以爲怪乃相携至水邊洗除因流水以濫觴遂以成俗帝曰􅀂如所􅀃非嘉事也尚書郎束晳對曰虞摯小生未究其夲此事起自周公卜成洛邑因流水泛酒故逸詩羽觴隨波流及秦昭王時三月上巳日置酒河曲遂有金人自泉而出捧水心劒於王曰令君制有西夏此即其處因立爲曲水焉二漢相㳂爲盛集帝嘉晢對隋書曰焬帝命僕射楊素等營構宫室大業元年遂成新都而徙居之今洛陽宫是也洛陽地圖曰鞏在洛水之間鞏固也言四面有山可以鞏固也朱超石與兄書曰洛下道路夲好青槐暎䕃可愛陸機洛陽記曰洛陽有銅駞街漢鑄銅駞二枚在宫南四㑹道相對俗語曰金馬門外集衆賢銅駞陌上集少年水經曰伊水東北過伊闕昔大禹䟽龍門以通水兩山相對望之如闕伊水歷其間謂之伊闕穆天子傳曰天子射鳥有獸在葭中七萃之士髙賁戎擒之以獻天子命畜之東虞曰虎牢唐諱虎故改武其後又名成臯十道志曰壽安縣漢冝陽縣也史記曰張儀爲􅁗􅀃韓王曰大王今不事􅁗􅁗下甲據冝陽斷韓之上地東取成臯滎陽則鴻臺之宫非大王有也又􅂫􅁗􅀃韓宣惠王曰韓北有鞏成臯之固東有宛穰洧水南有陘山密縣有徑山西有冝陽商坂之塞地方九百里帶甲數十萬陜州十道志曰陜州陜郡禹貢豫州之域周爲二伯分陜之地即古虢國地戰國時屬韓􅁗併天下屬三川郡史記曰周成王時召公爲三公自陜以西召公主之自陜以東周公主之後漢書曰獻帝東歸至陜議者欲令天子浮河東下太尉楊彪曰臣弘農人從此巳下東有三十六難非萬乗所當從乃止史記曰芮國在今馮翊界魯桓公三年芮伯萬爲母姜氏所逐遂居于魏今芮城是也詩曰虞芮質厥成文王蹶厥生毛萇注曰虞芮之君相與爭田而乆不平乃相謂曰西伯仁人盍往質焉及入境見行者讓路耕者讓畔咸相謂曰我等小人不可以履君子之庭乃相讓所争之地以爲閑田天下聞之歸周者四十餘國唐書曰天寳元年陵郡太守李齊物鑿三門山路所通深便於漕運於所開瀆中得古鏵鉏上有古􅂐平陸二字由是其年改爲平陸縣山海經曰夸父之山其北有林名曰桃林廣圍三百里中多馬造父於其中得驊騮騄耳之乗以獻穆王尚書曰放牛於桃林之野春秋曰處桃林之塞桃林在靈寶縣太平御覽卷第一百五十八
