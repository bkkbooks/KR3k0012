front:
  text: 太平御覽卷第九百九十九
  hash: sha256:ab89583bc03d3c112c933c3f5d1025fcd1536b8f3ef0530011c9dd5876956bba
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_999-1a}
body:
  text: 百卉部六芙蕖蒲菖蒲菰馬藻鳬葵馬􅖋蕣芙蕖爾雅曰荷扶蕖別名芙蓉江南呼荷其莖茄其葉蕸其夲蔤莖下白蒻在泥中者其華菡蓞其實蓮其根藕其中的蓮中子也的中薏中心苦者也薏音億廣雅曰菡蓞芙蓉周書曰魚龍成則藪澤竭即蓮藕掘毛詩澤陂曰彼澤之陂有蒲與荷荷芙渠也又山有扶􅂫曰山有扶􅂫隰有荷華荷華扶渠也毛詩義䟽曰芙蕖莖爲荷其華未發爲菡蓞已發爲芙蕖其實蓮蓮青皮裏白子爲的的有青長三分如鈎爲薏語曰苦如薏也的五月中生生啖脆其秋表皮黒的成食或可磨以爲飯䡖身益氣令人強徤幽荆楊豫取備飢年其根爲藕幽州人謂之光爲光如牛角謝承後漢書曰鄭敬爲新遷功曹甞與同郡鄧敬因折芰爲坐以荷獻肉瓠瓢􅄹酒言談弥日宋書曰臧質􅀃南郡王義宣反兵敗無所歸乃入南湖逃􅇡無食摘蓮噉之追兵至窘急以荷覆頭自沉於水唯出􅈹軍主鄭俱兒望見射子中心兵刃乱至膓胃􅆞縈水草沈約宋書曰文帝元嘉二十一年天泉池樂遊􅁐池玄團池生蓮同榦宋起居注曰㤗始二年嘉蓮一􅀟駢花實合跗同莖生豫州鱧湖宋紀曰文帝元嘉年蓮生建康額擔湖一莖兩華齊書曰涪陵王鑿金蓮花以貼地令潘妃行其上曰此歩出芙蓉三國典略曰齊師伐梁梁以糧運不繼調市人餽軍建康令孔奐以夌屑爲飯用荷葉褁之一􅀫之間得數萬褁又曰梁江從簡光禄大夫革之子也頗有才學年十七爲採荷調以刺何敬容其文曰欲持荷作柱荷弱不勝梁欲持荷作鏡荷暗夲無光敬容弗覺唯唯嗟其工管子曰五沷之土生蓮王子年拾遺記曰漢昭帝遊栁池有芙蓉紫色大如斗花葉柔甘可食芬氣聞十里之内蓮實如珠郭子横洞􅁳記曰北及玄坂去崆峒十七萬里日月不至其地自明有紫河萬里流珠千文中有寒荷霜下方香茂抱朴子曰千歳神􅀛巢於蓮葉之上萬歳歴曰齊太和二年烏程縣閣下生蓮華頋啓期婁地記曰婁門東南有華墽口殼切陂中生千葉蓮花其荷無異菡蓞色白豈佛經所載者乎古今注曰芙蓉一名荷華生池澤中一名澤芝一名水花色有赤白紅紫青黄紅白二色苦多華大者至百葉華山記曰山頂有池池中生千葉蓮華服之羽化因名華山諸草木方曰七月七日採蓮華七分八月八日採蓮根八分九月九日採蓮實九分隂乾下簇服方寸匕令人不老真人閞尹傳曰老子語喜天崖之淵真人所遊各各坐蓮華之上一華輙徑十丈􅀃文曰茄芙蕖莖也荷芙蕖實也蓉芙蕖夲也捜神記曰王敦在武昌鈴下儀仗生蓮華五六日而落􅀃曰易稱枯楊生華何可及也今狂華生枯木敦終逆而身死王韶之神境記曰九嶷山過半路皆行竹松下夾路有青澗澗中有黄色蓮蓮華芳氣􅄹谷幽明録曰晉末黄祖至孝母病篤庭中稽顙俄頃天漢開明有一老翁以兩丸藥賜母服之衆患頓消翁曰汝入三月可汎河而來依期行見門題曰善福門内有水曰􅊺源池有芙蕖如車輪浮圖澄傳曰澄以鉢盛水燒香呪之湏􅁷青蓮華出外國外國事曰􅀻訶條國大洲上有大山上有石井井自生千葉白蓮華及衆蓮華出陶隠居夲草注曰宋時太官作羊血舀空紺血切削藕誤落中遂皆散不凝醫仍用治血多効神農夲草注曰血藕實莖一名水芝所在池澤皆有生豫章汝南郡者良苗髙五六尺葉團青大如扇其花赤名蓮荷子黒狀如羊矢范寗爲豫章表曰新涂令孟佃民解列縣㕔事前二丈陸地生蓮華入冬死至陽更生四枝今年三月復生故處繁殖轉多華有二十五杖鮮明可愛有異常蓮古詩曰渉江採芙蓉蘭澤多芳草採之欲遺誰思之在逺道楚辭曰芙蓉始發雜芰荷紫莖屏風屏風水葵丈緑波些言復有水葵生於中也莖紫色風起動波緑其葉而生紋也或曰紫莖言荷莖紫色屏風爲荷葉如屏風張奐芙蓉賦曰黄螺圎出垂蕤散舒纓以金牙􅀧以素珠曹植羙芙蓉賦曰竦芳柯以從風兮􅁬纎枝之璀璨其始榮也曒􅀂夜光尋扶木其􅀭煇也晃􅀂九日出􅊙谷芙蕖騫産菡蓞星屬絲條垂珠丹莖加緑混混兮韡韡爛􅀂龍燭潘尼芙蓉賦曰或擢莖以髙立似彫輦之翆盖或委波而布體擬連壁之攅㑹古詩曰江南可採蓮蓮葉何田田楚辭曰令薜茘以爲理兮憚舉趾而縁木因芙蓉而爲媒兮憚褰裳而濡足又曰製芰荷以爲衣集芙蓉以爲裳又曰築室兮水中葺芝兮以荷盖傳玄歌曰曲池何澹澹芙蓉敞清源榮華盛壯時見者誰不歎一朝光采落故人不廻顔蒲爾雅曰莞苻蘺其上蒚今西方人呼蒲爲莧蒲蒚謂其頭臺首也今江東謂之芙蘺西方亦名蒲中莖爲蒚謂之爲席蒚音翮毛詩澤陂曰彼澤之陂有蒲與蕳又魚藻曰魚在在藻依于其蒲左傳文公曰仲尼曰臧文仲其不仁者三下展禽廢六􅀜妾織蒲三不仁也又昭公二十年晏子對齊侯曰澤之萑蒲丹鮫守之漢書曰蒲輪安車以徴賢晉灼曰以蒲褁車輪又曰路温舒字長君父使牧羊温舒取澤中蒲截以爲編用寫書又曰元帝病數問景帝立􅑟東王故事史丹侍疾候上獨􅃦直入卧内頓首伏青蒲上服度曰青緑蒲也孟康曰以蒲爲廢蔽也太子由是得不廢東觀漢記曰劉寛遷南陽太守温仁多恕吏民有過但蒲鞭罰之示辱而已晉書曰王育字伯春京兆人也少􅀌貧爲傭牧羊毎過小學必歔欷流涕時有暇即折蒲學書忘而失羊爲羊主所責將鬻已以償之東郡許子章敏逹之士也聞而嘉之代育償羊給其衣食使與子同學遂􅀶通經史齊書曰崔景真爲平昌太守有惠政常懸一蒲鞭而未嘗用去任之曰土人思之爲立祠焉北齊書曰尉瑾少威儀子德載以蒲鞭責之便自投井瑾自臨井上呼云兒出聞者皆􅀏三齊略記曰鬲城東南有蒲䑓􅁗始皇東遊海上於臺下繙音煩蒲繫馬至今歳歳蒲生榮委猶􅀂有繫狀似水􅀭可以爲箭穆天子傳曰天子于珠澤之藪方三十里爰有萑蒲萖葦􅀃文曰蒲草也以作席蒻蒲子也以爲平席丗謂蒲蒻風土記曰蒲生於陸葉如烏扇而紫于詭坊一曰􅀗蒲好草也續述征記曰烏常沉湖齊人謂湖爲沉中有九臺皆生結蒲云􅁗始皇遊此臺結蒲繫馬自此蒲生則結前􅁗記曰符洪家生蒲長五丈節狀如竹咸以異之謂之蒲家因氏焉洪後以䜟文草付應王遂改姓爲符幽明録曰河東常醜奴寓居章安縣以採滿爲業將一小兒湖邊拔蒲見一女子容姿殊羙乗一小􅂳載􅐜徑前投醜奴舎􅀉住醜奴嘲之㓕火共卧覺有腥氣又指甚短惕然疑是魅女已知人意便求出戸變而爲􅆩嵇康集序曰孫登夏甞編蒲爲裳冬披髮自覆淮南萬畢術曰酒薄復厚漬以宛蒲断蒲漬酒中有湏出之即酒厚也楚詞曰抽蒲兮陳坐援堇兮爲盖菖蒲左傳僖下曰王使周公閱來聘饗有昌歜歜菖蒲􅉁也春秋運斗樞曰玉衡星散爲菖蒲菖蒲逺雅頌着倡優則玉衡不明菖蒲冠環也梁書曰太祖后張氏諱尚柔甞於室内忽見庭前菖蒲生花光彩照灼非丗所有后驚異之謂侍者曰汝見否皆云不見后曰甞聞見菖蒲花當貴因取食之生髙祖吕氏春秋曰冬至五旬七月昌本者百草之先生也􅀃􅁐曰丈公好食昌夲葅本草即菖蒲風俗通曰菖蒲放花人得食之長年神仙傳曰王興咸陽人採菖蒲食以得長生一寸九節者羅浮山記曰宣山中菖蒲一寸二十節堅芬之極方言曰菖蒲得石上生九寸節以上紫花尤善吴氏夲草曰菖蒲一名堯時薤本草經曰菖蒲生石上一寸九節者乆服輕身明耳目不忘不迷惑生上洛典術曰聖王仁功濟天下者堯也夫降精於庭爲薤感百隂爲菖蒲焉今之菖蒲是也菰廣雅曰菰蔣也其米謂之彫胡周官曰鳥冝菰鄭玄注曰蔬彫胡􅀃文曰蔣菰也彫胡一名蔣晉中興書曰毛璩爲譙王司馬時海陵縣地多菰蒲處所幽􅃉亡戸保之璩請討放火而進天旣旱地皆菰封封燃叛人走出近得萬户廣志曰菰可食以爲席温於蒲生南方莊子曰孔子之楚舎於蟻丘之蔣宋玉賦曰主人之女爲臣炊彫胡之飲馬藻爾雅曰莙牛藻似藻菜大江東呼爲馬藻毛詩采蘋曰于以采藻于彼行潦陸機毛詩䟽義曰采藻水草也生於水底葉似鷄􅂫可食荆楊人食以當榖救飢飢荒時蒸而食之顔氏家訓曰或問東宫舊事六色􅄢䋿是何等物當作何音荅曰案􅀃文云莙牛藻也讀􅀂威音塢瑰􅀼即陸機所謂藴藻葉如蓬者也又郭璞注三蒼亦云蕰藻之􅀋也細葉蓬茸然生今水中有此物一節長數寸細茸􅁝圎繞可愛長者二三十節猶呼爲莙又寸斷五色􅁝撗着線股間䋲之以象莙草用以飾物名爲莙於時當紲六色􅄢此莙以飾緄帶張敞因造􅁝傍畏耳作隈郭子横洞􅁳記曰昆靈池有倒藻枝葉横倒水上長九尺餘縱横而生狀如結䋄有野鴨鵝鳬及鷗鷁來翔觀水池上入此草障皆不得出如入􅊻䋄也亦曰水䋄草鳬葵􅀃文曰􅈋鳬葵也纂文曰鳬葵其實可作醬馬蓼爾雅曰紅蘢古其大者蘬俗呼紅草爲蘢殼語轉耳毛詩緇衣山有扶􅂫曰山有橋松隰有遊龍毛云紅草也毛詩義䟽曰紅草一名馬蓼葉麄大赤白色生外澤中蕣爾雅曰椵木槿櫬木横别二名也似李樹華朝生夕殞可食或呼爲日及亦曰王蒸廣雅曰日及木槿也一名朱槿一名赤槿􅀃文曰蕣木槿也毛詩有女同車曰有女同車顔如蕣華蕣木槿也禮記月令曰仲夏之月木槿榮􅀓玄曰蕣華麗木也謂之曰冾或謂之冾容或謂之愛老潘尼以爲朝菌太平御覽卷第九百九十九
