front:
  text: 太平御覽卷第十五
  hash: sha256:e18c9f60f3206ae428dcbb79ed4f3ba4ac664e9bc46e25efb5f6959865b0b97d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_015-1a}
body:
  text: 天部十五氣霧霾曀氣釋名曰氣猶餼也餼然有聲而無形也易曰天地氤氲萬物化醇又曰潜龍勿用陽氣潜藏又曰精氣爲物逰魂爲變精氣烟煴聚而成物聚極則散而遊䰟爲變又曰天地定位山澤通氣禮曰仲春行秋令則其國大水寒氣惣至又曰三月之節是月也生氣方盛陽氣發􅂥勾者畢出萌者盡逹又曰三月之節是月也命國儺九門磔攘以畢春氣又曰季春行冬令則寒氣時發草木皆肅又曰孟秋行冬令則隂氣大勝行春令則其國乃旱陽氣復還又曰八月之節是月也天子乃儺以逹秋氣又曰九月之節霜始降則百工休乃命有司曰寒氣惣至人力不堪又曰季秋行春令則煖風來至人氣懈惰又曰小雪之日後五日天氣上升地氣下降又曰孟冬行春令則凍閇不宻地氣上􅂥又曰地氣且􅂥是謂發天地之房諸蟄則死又曰十二月中氣命有司大儺旁磔以送隂氣又曰社􅀕土而主隂氣也又郷飲酒曰天地嚴凝之氣始於西南而盛於西北此天地温厚之盛氣也此天地之仁氣也周禮曰眡祲掌十煇之法以觀妖祥辨吉凶妖祥善惡之徴鄭司農云煇謂日光之氣又曰視祲之官春分望氣傳曰節宣其氣尚書中候曰堯沉璧於河休氣四塞春秋繁露曰氣之清者爲精人之清者爲賢治身以賢積精爲道春秋元命苞曰隂陽聚爲雲氣史記曰海旁蜃氣象樓臺廣野氣成宫闕又曰項羽夲紀曰范増􅀃項羽曰沛公志不在小吾令人望其氣皆爲龍虎成五彩此天子氣也冝急擊勿失又秦紀曰始皇東遊望氣者云五百年後金陵有天子氣於是始皇東遊以猒之改金陵爲秣陵壍之以絶其氣漢書曰武帝巡狩過河間見紫青氣自地屬天望氣者云下有竒女求之得拳夫人後生昭帝又曰宣帝㓜時號曰曾孫生數月遭巫蠱事雖在襁褓猶繫郡邸獄邴吉爲廷尉􅁥治巫蠱憐曾孫無辜至後二年武帝疾望氣者云長安獄中有天子氣上遣使者分條中都官詔獄繫者亡輕重皆殺之内者令郭穰夜至郡邸獄􅁻閉門拒使者不得入曽孫頼吉得全應劭漢官儀曰丗祖封禪夕有青氣上與天屬遥望不見山巔又曰髙祖在沛隱芒碭山每遊上輒不欲令吕后知常在􅀷僻處后亦常知其處髙祖問曰何以知之后曰君所居處上有紫氣又曰孝靈熹平年八月辛未白氣如疋練衝北斗第四星爲大獸狀明年楊州刺史臧旻攻盗賊斬首數千級東觀漢記曰和帝永和十二年癸酉夜白氣長三丈起國東北指軍市十日是月西域蒙竒踈勒二國歸義謝承後漢書曰郎顗上書曰去年閏月白氣從天苑入玉井西將有叛戾之患金精之變太尉所掌冝責以灾異漢書五行志曰永興二年光禄勲舎壁下有青氣視之得玉鈎玦漢光武封禪儀曰元年封禪晝有白氣夜有赤光又曰建武三十二年二月十九日之山虞此日山上雲氣成宫闕百官皆見之二十一日夕牲時有白氣廣一丈東南極望二十二日禮畢正直壇所有氣與天屬遥望不復見山楚漢春秋曰亞父謀曰吾望沛公其氣衝天五色相摎或似龍或似虵或似虎或似雲或似人此非人臣之氣也王隱晉書曰武帝咸寕元年洛陽太祖廟中有青氣占者云以爲東莞音官王後當有天子後改封琅邪江東之應也又曰魯勝字叔時以􅀊日望氣乃長歎知將來多故便稱疾去官中書令張華敬之欲用之遣二子諭意遂不動又曰張華察牛斗間有紫氣乃豐城之劒氣也呉志曰朝宫井上旦有五色氣孫堅令浚之得漢傳國璽又曰孫堅葬冨春城東􅊘有光上屬天下蔓數里皆曰非凡氣也孫氏其興乎蜀志曰劉毅向攀等上言建安二十二年數有氣必有天子出其方南中八郡志曰永昌郡有禁水水有惡毒氣中去聲物則有聲中樹木則折名曰􅀑彈中人則􅍕然青爛宋永初山川記曰寧州瘴氣􅞒露四時不絶西升記曰老子西出關關令尹喜占氣知神仙過荆州記曰夷道縣有望州山山下有泉欲雨泉中有赤氣騰上于天莊子曰􅀂夫乗天地之正而御六氣之辨以遊無窮者彼惡乎待哉郭象曰御六氣之辦即是遊變化之塗也又曰人之生氣聚則爲生散則爲死列子曰太􅀄者氣之始也又曰天積氣之成者也孫卿子曰水火有氣而無生草木有生而無知抱朴子曰軍上氣黒如樓將軍移軍必敗其將勇則氣如火火􅀔如張弩雲如日月赤氣繞之所見之地大勝不可攻也又曰或問登陟之道曰或用􅀥心爲飛車存念則五虵六龍而乗之上升三十里名爲太清其氣甚剛勝人也師言鳶飛漸髙直舒兩翅而自進漸乗剛氣也淮南子曰土地各以􅀋生人是故山氣多男澤氣多女水氣多瘖於金風氣多聾林氣多癃木氣多傴髙誘曰自此上至山氣多男皆生子乃有此疾也下氣多尰岸下下濕腫足日尰石氣多力象石也險阻氣多癭暑氣多殀音夭寒氣多壽谷氣多痺丘氣多狂廣氣多仁下而平者爲廣陵氣多貪象陵積聚也輕土多利利疾也重土多遲清水音小濁水音大湍水人重湍急流悍水也中土多聖人皆應其􅀋也又曰太清之始世天覆以德地載以樂四時不失其序風􅀨不降其虐日月淑清而楊光五星循􅁤而不失其行此時􅀇元氣至休氣者也吕氏春秋曰天圎爲精氣圎通周復無雜故曰圎魏子曰北夷之氣象群羊南夷之氣􅀋􅂳山海之氣象樓臺宫闕都邑之氣象林木家語曰食氣者神明而夀洛書曰有氣象人青衣無手在日西天子之氣也遁甲開山圖曰巨靈者偏得元氣之道故以元氣一時生混沌又曰自老子生周青氣凌遲俗儒道士無所通驗河圖曰崑崙山有水水氣上蒸爲霞地鏡圖曰望百姓家黄氣者蘖梔子樹也山有白氣而鬰鬱中有神龍三輔舊事曰漢作靈臺以四孟月登而觀黃氣爲疾病赤兵黒水荆州圖曰冝都郡望州山􅀽山松冝都記曰武鍾山山根有涌泉成溪溪注丹水天隂欲雨輒有赤氣故名丹溪論衡曰陳留虞延字君人夜生母見其上氣如一疋絹徑上天以問人人曰吉氣與天通後仕至司徒楚辭曰飡六氣而飲沆􅒭􅀆漱正陽而含朝霞王逸日飡吞日精食元符也陵陽子明經曰春食朝霞朝霞者日始出赤氣也秋食淪漢淪漢者日没後赤黄氣也冬食沆瀣沆瀣者北方夜半氣也夏食正陽正陽者南方日中氣也又天問曰伯強安處惠氣安在注曰伯強是大疫􅀑也所至恣惡氣傷和氣霧釋名曰霧冒也氣蒙冒覆地物也昏暗之時則爲妖灾明王聖主則爲祥瑞禮記月令曰仲冬行夏令則其國乃旱氛霧􅁳冥爾雅曰地氣發天不應曰霧尚書中候曰桀無道地吐黄霧春秋元命包曰霧隂陽之氣也隂陽怒而爲風亂而爲霧漢書曰爰盎諌文帝勿遷淮南王恐其逢霧露病死又曰王氏五侯同日俱封其日黄霧四塞又曰漢髙祖至平城匈奴圍上七日天大霧漢使人還徃胡不覺後得免平城之難又曰孝成帝建始元年夏四月黄霧四塞上問楊興等對曰隂盛侵陽之氣也東觀漢記曰馬援謂官屬曰吾在浪泊西里間下潦上霧毒氣薫蒸仰視烏鳶跕跕都業吐業二音墮水中謝承後漢書曰河南張楷字公超性好道術能作五里霧於華隂時關西人裴優亦能作三里霧魏略曰劉雄鳴每出雲霧中識道不迷惑時人因謂爲雲霧王隱晉書曰樂廣爲尚書令衛瓘見而竒之令諸子造焉曰此人之水鏡也每見瑩然􅀂開霧覩青天又曰大寧元年黃霧四塞王敦之應也宋元嘉起居注曰盱眙民王彭先丁母艱居喪至孝元嘉之始父又喪亡彭兄弟二人土功未就郷人助彭作塼塼事須水濟值天旱穿井盡力不得水彭號窮無計一旦天霧霧消之後於塼竈前自然水生沈約宋書曰後漢正月朝天子臨徳陽殿受朝賀舎利從南方來戲於殿前激水化成比目跳躍嗽水作霧翳日燕書烈祖後記曰無璽六年蔣幹遣侍中繆髙太子詹事劉猗賷傳國璽詣晉求救猗􅀒引行數百里黃霧四塞迷荒不得進乃還易取行璽始得去帝王丗紀曰凡重霧三日必大􅀨雨未降霧不可冒行又曰帝沃丁八年伊尹卒年百有餘􅀊天霧三日沃丁葬以天子之禮祀以太牢親自臨喪三年以報大德焉又曰黄帝時天大霧三日帝遊洛水之上見大魚殺五牲以醮之天乃甚雨七日七夜魚流始得圖書今河圖也丗傳大霧三日必有甚雨自此始也漢武内傳曰東方朔乗雲飛去仰望天霧覆之不知所在劉向列女傳曰陶荅子妻者陶大夫荅子之妻也荅子仕陶三年名譽不興家冨三倍其妻數諌曰夫子能薄而官大是謂嬰害無功而家昌是謂積殃昔楚令尹子文之仕家貧而國冨福結於子孫名垂於後代今夫子貪冨務大不顧後害妾聞南山有􅀇豹霧雨七日不下食者何也欲以澤其衣毛而成其文章故藏以逺害今君與此背不無後患乎􅁑洪神仙傳曰欒巴爲尚書郎一旦天大霧對坐不相見失巴所在後問其故乃是巴還成都與親故别也又曰淮南王聞有道術之士必卑辭厚幣以致之於是八公乃往一人能坐致風􅀨立起雲霧王試之無不効李先生傳曰先生名廣字祖和夲南陽人劉備遣軍欲取先生先生起霧半天備􅀐自相殺先生因此乃入呉冝都山川記曰郡西北三十里有丹山天晴山嶺忽有霧起迴轉如煙不過再朝􅀨必降王烈之安成記曰縣人有謝􅅒者行田歸路中忽遇雲霧霧中有一人乗􅀛而行􅅒知神人拜請求隨去父曰汝無仙骨不得去也湘州記曰曲江縣有銀山山常多素霧嵩髙山記曰有獵師在山見浮圖竒妙異常有金像比來㝷求白霧忽起不知寺處東方朔十洲記曰漢武帝天漢中西胡國獻猛獸使者曰猛獸之出生崑崙或生􅀇圃食氣飲霧解人語當其神也立起風雲吐嗽霧露百邪迸走因名猛獸王粲英雄記曰曹公赤壁敗行至雲夢大澤中遇大霧迷失道路王子年拾遺記曰平沙千里色如金細如粉風吹起如霧亦曰金霧西京雜記曰太平之代霧不塞望浸滛􅀍薄而已又曰東海人黃公立興雲霧坐成山河叚􅀛龍凉州記曰吕光幸天淵池時天清朗忽然起霧有五色雲在光上陳留風俗記曰雍丘縣有祠名夏后公祠有神井龍能致霧雹愽物志曰王爾張衡馬均者昔俱冒霧行一人無恙一人病一人死無恙者飲酒病者食死者空腹莊子曰騰水上溢故爲霧抱扑子曰白霧四靣圍城不出百日大兵至城下又曰與善人遊如行霧中雖不濡􅊜潜自有潤又曰通天犀角有白理如線自夲徹末者以此角大霧重雲之夜置中庭終不沾濡􅂫子曰蜀郡鄧公呼吸成霧韓子曰飛龍乗雲騰虵㳺霧雲罷霧散與螾與蚓字同蟻同矣淮南子曰甚霧之朝可以細書不可以望尋常之外又曰騰虵遊霧困於蝍蛆又曰昔者馮夷大丙之御也皆古得道能御隂陽遊微霧經霜雪而無迹照日光而無影魏子曰雲霧之盛須􅁷而訖暴􅀨之盛不過終日是以人君喜怒不見於容魚龍河圖曰山冬天霧十日巳上不除者山崩之後出水脉也京房易占曰大霧君迷惑雲霧四起則時多隱士伏侯古今注曰漢元帝竟寧元年大霧樹皆白潜潭巴曰大霧三十日群猾起上下相蒙上少下多故群猾起志林曰黄帝與􅃖尤戰於涿鹿之野􅃖尤作大霧弥三日軍人皆惑黄帝乃令風后法斗機作指南車以別四方遂擒􅃖尤望氣經曰十月癸巳霧赤爲兵青爲殃又曰六月三日有霧則􅀊大熟地鏡圖曰玉之千􅀊者行遊諸國其所居國必三日變爲日中之霧漢武帝故事曰武帝葬茂陵芳香之氣異常積於憤之間如大霧黃帝􅀇女戰法曰黄帝與􅃖尤九戰九不勝黄帝歸於太山三日三夜霧􅁳有一婦人人首鳥形黃帝稽首再拜伏不敢起婦人曰吾􅀇女也子欲何問黃帝曰小子欲萬戰萬勝遂得戰法焉徐幹中論曰文王遇姜公於渭陽執竿而釣文王得之灼若披雲而見白日霍若開霧而覩青山温嶠與陶􅋲箋曰霧氣過差則君道幽晦霾釋名曰霾晦也如物塵晦之色也詩曰終風且霾惠然肯來爾雅曰風而雨土爲霾崔豹古今注曰漢昭帝元鳯三年天雨黄土晝夜昏霾曀􅀃文曰曀天隂沉也詩曰終風且曀惠然肯頋又曰曀曀其隂爾雅曰隂而風爲曀太平御覽卷第十五
