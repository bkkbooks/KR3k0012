body:
  text: 方術部十五巫上說文日巫祝也女能事無形舞降神也象人兩襃無形與工同意周禮春官日司巫掌羣巫之政令若國大旱則帥巫而舞雩雩旱祭也國有大烖則帥巫而造巫􅁪凡喪事掌巫降之禮男巫掌望祀望衍授號旁招以茅女巫掌歲時祓除釁浴旱暵則舞雩若王后弟則與祝前凡􅀖之大烖歌􅂘而請禮日君臨臣喪以巫祝桃茢執弋惡之爲有凶邪之氣在側君聞大夫之喪去樂卒事血往未襲也其己襲則止巫去桃茢鬼所惡茢萑苕可掃不􅖤所以異於生也又曰襄公朝于荆康王卒荊人曰必請襲欲使襄之公依魯人日非禮也荆人强之巫先桃茢荊人悔之巫祝桃茢君臨臣喪之禮又日歲旱穆公召縣子而問然日天乆不雨吾欲暴巫而奚若日天則不雨而望之愚婦人於以求之母乃已䟽乎巳猶甚也巫主接神亦覡天哀而􅀨之春秋傳說巫日在女日巫在男日覡周禮女巫旱暵則舞雩傳曰晉侯改葬共太子秋狐突適下國遇太子太子使登僕而告之曰夷吾無禮余得詣於帝矣將以晉卑秦秦將祀余對曰臣聞之神不歆非􅀋民不祀非族君祀無乃殄乎且民何罪失刑乏祀君其圖之君日諾吾將復請七日新城西偏將有巫者而見我乎許之遂不見又曰夏大旱公欲焚巫尫臧文仲日非旱備也脩城郭貶食省用務牆勸分社預注曰勸分有無相濟也此其務也巫尩何爲天欲殺之則如勿生若能爲旱焚之滋甚公從之是歲飢而不害又曰初楚范巫商似商似范巫之名謂成王與子玉子西日三君皆將强死城濮之役王思之故使止子玉曰母死不及止子西縊而懸絕王使適至遂止之使爲商公㳂漢沂江將入郢王在渚宫下見之懼而辭曰臣免於死又有䜛言謂臣將逃臣歸死於司敗也王使爲工尹又與子家謀殺穆王穆王聞之殺􅃲冝申及仲歸又曰晉侯夢大厲被髪及地搏膺而踊曰殺余孫不義余得請於帝矣壞大門及寢門而入公懼入于室又壞戸公覽召桑田巫桑田晉邑巫言如夢公日何如日不食新麥矣言公不得及食新麥六月丙午晉侯欲麥使甸人獻麥饋人爲之召桑田巫示而殺之將食張如厠陷而卒又曰晉中行獻子將伐齊夢與厲公訟弗勝公以戈擊之首墜於前跪而戴之奉之以走見梗陽之巫皐他日見諸道與之言同巫日今兹主必死若有事於東方則可逞獻子許諾晉伐齊又日公在楚楚人使公親禭公患之穆叔日祝殯而襚則布幣也先使巫祝除殯之凶邪而行禭禮與朝而布幣無異乃使巫以桃茢先殯茢黍穰楚人弗禁旣而悔之書日敢有􅁪舞于宫酣歌于室時謂巫風論語日人而無􅁪不可以作巫醫史記曰魏文侯時西門豹爲鄴令往到鄴㑹長老問民之疾苦長老云苦於河伯娶婦以故貧豹問其故對日鄴三老廷􅁺常歲歛百姓取其錢數百萬用其二三十萬為河伯娶婦與巫共分其餘錢持歸當其時巫行視小家女好者云是當爲河伯婦卽娉取洗沐爲治新繒綺縠之衣閒居齊戒爲治齊宮河上張緹絳帳帷女居其中爲具牛酒飰食十餘日共粉飾之如嫁女床席令女居其上浮之河中始浮行數十里乃沒其人家有好女者恐大巫祝爲河伯取之以故多持女遠逃亡以故城中益空無人又貧困所從來乆遠矣民人俗語曰即不爲河伯娶婦水來漂溺人民西門豹曰至爲河伯娶婦時願與三老巫祝父老送女河上幸來告語之吾欲往送女皆曰諾至其時西門豹往會之河上三老官屬豪長父老皆㑹與人民觀之者三二千人其巫老女子也年七十從弟子女十人所衣皆繒單衣立大巫旁西門豹曰呼河伯婦來視其好醜即將女出帷中來至前豹視之頋謂三老巫祝父老女子曰是女不好煩大巫嫗爲入報河伯更求好女後日送之卽使卒共抱女巫嫗投之河中有頃曰巫嫗何乆也弟子趨之復以弟子一人投河中有頃曰弟子何乆也復使一人趨之復投一弟子河中凡三弟子西門豹曰巫嫗弟子女也不能白事煩三老入白之復投三老河中西門豹簪筆罄折嚮河立待良乆長老吏旁觀者皆爲驚恐西門豹頋日巫嫗三老不來還柰之何復使廷掾與豪長一人趨之皆叩頭且破額血流地色若死􅁅西門豹曰諾且留待之須􅁷豹曰廷􅁺起矣河伯留之乆也皆罷去歸鄴吏民大驚恐是後不敢復言河伯娶婦又日武帝時游水發根服彪云游水縣名發根人姓言上都有巫病而􅀑下之上召置祠之甘泉及病使人問神君神君曰天子無憂病於是病愈又曰􅁊梁灾越巫勇之曰越俗有火災後起屋必用勝服之於是作建章宫度爲千門萬戸又曰起巫立越祀而以雞卜上信之漢書日音義日持雞雞卜如鼠卜矣又日孝武帝天漢二年秋上禁巫祠道中者文頴日始漢家於道中祠排禍咎移之於行人百姓以其不經今止之也後漢書日樊􅑂等至􅀪農舉更始諸將連戰尅勝衆遂大集乃分萬人爲一營凡三十營置三老從事各一人進至華陰軍中常有齊巫皷舞祠城陽景王以求福助以其定諸吕安社稷故郡國多為立祠焉盆子承其後故軍中祠之也巫言景王大怒日當爲縣官何故作賊縣官謂天子也有􅀏巫者輒病軍中驚動時方望弟陽怨更始殺其兄乃逆説崇等日更始荒亂令不行故使將軍得至於此今將軍擁百萬之衆西向帝城而無稱號名爲群賊不可以乆不如立宗室挾義誅伐以此號令誰敢不服崇等以爲然而巫言益甚前及鄭令阜孫乃相與議日今廹近長安而鬼神如此當求劉氏共尊立之六月遂立盆子為帝自號爲建世元年又曰許楊字偉君汝南平輿人也少好術數王莽輔政召爲郞稍遷酒泉都尉及莽篡位楊乃變姓名爲巫醫逃匿他界莽敗方還鄕里又曰第五倫爲㑹稽太守㑹稽俗多淫祀好卜筮人常以牛祭神百姓財産以之困匱其自食牛肉而不以薦祠者發病且死爲牛鳴前後郡將莫敢禁倫到官移書屬縣曉告百姓其巫祝有依託􅀑神者詐怖愚人皆案論之有妄屠牛者吏輒行罰人初頗恐懼或祝詛妄言倫案之愈急後遂絶百姓以安又曰順帝時廷尉河南吳雄字季高以明法律斷獄平起自孤寒致位司徒雄少時家貧喪母營人所在封土者擇葬其中喪事趣辨不問時日毉巫皆言當族滅而不頋及子訢孫恭三代廷鼠爲法名家又日宋均爲九江太守陵道縣有虞后二山人共祠之衆巫遂取百姓男女以為公嫗以男爲山公以女爲山嫗猶祭之尸主也歲歲改易旣而不敢嫁娶前後守令莫敢禁均乃下書日自今以後爲山娶者娶巫家勿擾良人於是遂絕又日安丘望之字仲都京兆長陵人少時學老子經恬靜不求進官號曰安丘丈人成帝聞欲見望之辭不肯見爲巫醫於人閒也獻帝起居注日李􅔸性喜鬼怪左道之術常有道人女巫繫下神祭六丁符劾厭勝之具無不爲又於朝廷省門外爲董卓作神坐數以牛羊祠之天子使左中郞將李國持節拜􅔸爲大司馬在三公之右􅔸自爲得鬼神之助乃厚賜諸巫東觀漢記曰高鳯年老執志不倦名聲著聞太守連召請恐不得免自言本巫家不應爲吏又日班超使西域于闐王廣德超至禮意甚踈其俗信巫言神怒何故向漢漢使有驪馬急求取以祠我廣德就超請馬超許之而令巫自來取馬有頃巫至超即斬其首送廣德因辭讓之呉志曰景帝有疾求視􅀑者得一人景帝欲試之乃殺鵝而埋之於中架小屋施床机以婦人紙履服物着其上乃使覡視之告日若能說此冢中鬼形狀者即信當厚賜加賞矣竟日盡夕無言帝問之急乃日實不見有鬼但見一白鵝立墓上所以不即白之者疑是鬼神變化作此想當候其真形而定無復移易不知何故不敢不以實上聞景帝乃厚賜之晉書日夏統字仲御從父敬寧祠先人迎女巫章丹陳珠二人並有國邑裝服甚麗善歌舞又能隱形匿景甲夜之初撞鍾擊鼓閒以絲竹丹珠乃大破舌吞刀吐火雲霧杳冥流火電發統諸從兄弟欲往觀之難統於是共紿之日從父閒疾病得瘳大小以爲喜欲因其祭祀並往賀之􅀸可俱行乎統從之入門忽見丹珠在中庭輕步徊舞靈談􅀑􅀏飛觴挑柈酬酢翩翻統驚愕而走不由門破藩直出又日武悼楊后旣為賈后所幽死賈后又信妖巫謂太后必訢􅁈先帝乃覆而殯之施諸厭劾符書藥物畋李矩屯于榮陽劉聦遣從弟暢步騎三萬討矩屯于韓王故壘時暢卒至城東未睱爲備遣使奉牛酒許降于暢暢大饗渠帥人皆醉飽知矩謀夜襲之兵士以賊衆皆有懼色矩令郭誦禱鄭子産曰君昔相鄭惡鳥不鳴凶胡臭羯何得過庭使巫揚言東里有教當遣神兵相助將士聞之皆踊躍爭進又載記曰石虎太子􅃉保母劉芝初以巫術進及養䆳有深寵通賄賂豫言論權傾朝廷親貴多岀其門封芝爲冝城君又曰李雄母羅氏雄信巫覡之言多有忌諱至欲不葬其母司空趙肅諫之宋書日前廢帝子業好遊華林園竹林堂使婦人倮身相逐有一婦人不從命斬之後經少時夜夢遊後堂有一女子罵曰尓悖虐不道明年不及熟矣帝怒遂於官中求得似所夢者戮之其夕復夢所戮女罵曰汝枉殺我以訴上帝至是巫云此堂有􅀑帝日與陰山公主及六宫綵女數百人隨群巫捕􅀑屏除侍衛帝親自射之又日王僧綽豫參朝政從兄微懼其太盛勸令損抑僧綽乃求吳郡及廣州㑹巫蠱事泄上先召儈綽具以言之又曰明帝選王儉尚陽羨公主拜駙馬都尉帝以儉嫡母武康主因太初巫蠱事不可以爲婦姑欲開冢離葬儉因人自陳密以死請故事不行齊書日鬱林王在西州令女巫楊氏禱祝速求大位及文惠薨謂由楊氏之力倍加敬信呼揚婆宋氏己來人閒有揚婆兒歌蓋此徵也武帝有疾又命揚氏日夜祈禱又曰明帝身有衣絳衣服飾皆赤以爲厭勝巫覡云後湖水頭經過宫内致帝有疾帝乃自至太官水溝左右啓太官無水則不立決意塞之欲南引淮流會崩事寢又曰東昏侯偏信蔣侯迎來入宫晝夜祈禱左右朱光尚詐云見神動輒諮啓並云降福遂加位國朱又爲靈帝車服羽儀一依王者又曲信小祠日有十數巫師魔媪迎送紛紜光尚輒託云神意范雲謂光尚曰君是天子要人當思百全計光尙曰至尊不可諫止當託神􅀑以達意耳後東入樂遊人馬忽驚以問光尚光尙曰先帝大瞋不許數出帝大怒拔刀與光尙尋覔旣不見處乃縛菰爲明帝形北面斬之又日諸曁東洿里屠氏女父失明母有痼病疾親戚相棄鄉里不容女移父母遠住紵舎晝採樵夜紡績以供養父母俱卒親營殯葬􅀒土成墳忽空中聲云汝性可重山神欲相驅使汝可爲人療病必得大富女謂是魃魅弗敢從遂得病積時隣舎人有溪蜮毒者女試療之自覺病便差遂以巫道爲人療病無不愈家産日益鄉里多欲娶之女以無兄弟誓守墳墓不嫁又日武陵王曅爲祠部尚書巫覡或言曅有非常之相以此自負武帝聞之故無寵未常處方岳焉又日王敬則母爲女巫常謂人云敬則生時胞衣紫色後應德嗚皷􅊁人􅀏之日汝子得爲人吹􅊁可矣後果封侯給皷吹又日袁君政字世忠爲豫章内史性不信巫邪有師世榮稱道術爲一郡巫長君政在郡小疾主簿熊丘薦之師云須疾者衣爲信命君政以所着􅃭與之事竟取􅃭云神將送與北斗君政使檢諸身於衣裏􅀗之以爲亂政卽刑於市而焚神一郡無敢行巫梁書曰沈約病夢齊和帝劒斷其舌令巫視之言如夢乃呼道士奏赤章於天稱禪代之事不由已岀又日元帝背生黑子巫媪見日此大貴不可言又日蔡撙爲臨海太守有百姓楊元孫以婢探蘭貼與同里正黃權約生子酬乳哺直權死後元孫就權妻吳氏贖婢吳背約不還元孫訴樽判還本主吳能爲巫出入撙内以金釧賂撙妾遂改判與吳元孫撾登聞皷訟之爲有司劾時撙已去郡雖不坐而常以爲耻又日王神念爲靑兾二州刺史性剛正所更州郡必禁止淫祠時東北有石鹿山臨海有神廟祅巫欺惑百姓遠近祈禱縻費極多及神念至便令毁拆風俗遂改後魏書曰郭祚少而孤貧姿貌不偉鄉人莫之識也有女巫許相後當富貴祚涉厯經史習崔浩之書尺牘文章見稱於世舉秀才對策上第拜中書士累遷黄門侍郞又曰定州流人解思安其兄慶賔懼後追責規絕名貫乃認城外死屍詐稱其弟爲人所殺迎歸殯葬頗􅀋思安見者莫辨又有女巫楊氏自云見􅀑說思安􅀍害之苦飢渴之意慶賔又誣疑同軍兵蘇顯甫李蓋等所害經州訟之二人不勝楚毒各自款引獄將決竟李崇疑而停之密遣二人非州内所識者僞從外來詣慶賔告日僕往在北州去此三百有一人見過寄宿夜中共語疑其有異便卽詰問迹其由緒乃云是流兵背役逃走姓解字思安時欲送官苦見求及稱有兄慶賔今住楊州相國城内更姓徐君脫矜愍爲往告報見申委曲家兄聞此必重相報所有資才當不愛惜今但見質若往不􅀗送官何晩是故相造詣伸此意君欲見雇幾何當放賢弟若其不信可見隨看之慶賔帳然失色求其少停當備財物此人具以報崇攝慶賔問日尓弟逃亡何故妄認他屍慶賔伏引更問蓋等乃云自誣數日之間思安亦為人糺送崇召女巫視之鞭笞一百崇斷獄精審皆此􅀋也三國典略曰初齊神武之克鄴城於北臺上建立神祠盍布衣時所事也每祠之日唯與巫潘嫗及數人行事親自神宰割外無見者至是齊主焚除此廟并擲巫於火令燒殺之又曰齊髙緯夜夢黑衣貴人送相驅逐乃向之拜巫者烏大以厭之又於芳林園自着破衣裳爲窮兒入市躬自交易焉築西鄙諸城爲羌兵皷譟凌之多作黑衣人共相執縛親率内參臨拒或實彎弓射人自晉陽東巡單馬馳騖前不得有人解髪散而歸又曰崔季舒未遇害家池蓮莖化爲人面着鮮卑帽妻晝魘魘寤云見人長一丈遍體黒毛欲來逼已巫曰此是五道將軍入宅者不祥又曰侯景之首至于江陵梟之於市然後煑而漆之以付武庫先是謡曰苦竹町市南有好井荆州軍殺侯景及首至湖東付諮議參軍宗季長季長宅東有苦竹町以景首置其中用市南井水煑之先是巫言有􅀑萬計斷頭折頸入宅去來云季長大懼設齋迎佛又有數萬鳥自江津飛噪集其家焉北史曰齊琅邪王儼之未獲罪鄴北城有白馬佛塔是石季龍時爲澄公所作儼將脩之巫日若動此浮圖北城失主不從破至弟二級得白虵長數丈迴旋失之數旬而敗又曰竇泰母初夢風雷暴起若有雨狀出庭觀之見雷光奪目驟雨霑灑窹而驚汗遂有娠朞月而不産大懼有巫曰渡河湔裙裾産子必易便向水所忽見一人日當生貴子生可從而南泰母從之俄而生泰隋書日衛昭王爽討突厥明年徵為納言高祖甚重之未幾爽寢疾上使巫者薛榮宗視之云衆􅀑爲厲爽令左右驅逐之居數目有􅀑物來擊榮宗榮宗走下而死其日爽薨又曰李景爲代州惣管先是府內井中甃上生花如蓮并有龍見時變鐵爲馬甲士又有神人長數丈見於城下其跡長四尺五寸景問巫對曰此是不祥之物來食人血耳景大怒推出之旬日而兵至死者數萬焉又曰李密破宇文化及化及還其勁兵良馬多戰死士卒皆倦王世充欲乗其弊而擊之恐人不一乃假託􅀑神言夢見周公乃立祠於洛水上遣巫宣言周公欲令僕射急討李密當有大功不則兵皆疫死兵多楚人俗信妖妄故出言以惑之衆皆請戰太平御覽卷第七百三十四
