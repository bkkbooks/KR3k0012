front:
  text: 太平御覽卷四百一十
  hash: sha256:840e49568761f63e91fc5840180d3c14f0e7ff9c760d1df872e7158f6928b1ca
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_410-1a}
body:
  text: 人事部五十一交友五請交不許世交父子交絶交交友五􅀓幹與張叔威書曰吾與足下義結紈素恩比同生東方朔與公孫弘書曰爵禄不相責以禮同􅀋之遊不以逺近爲故東門先生居蓬户空穴之中魏公子一朝以百􅀐造之吕望未甞與文王同席而坐一朝讓以天下半大丈夫相知何必接塵而遊垂髮齊年哉張奥與延叔堅書曰吾與叔堅剖心相知豈以流言相猜耶曹植離友詩曰王旅旋兮背故郷彼君子兮篤人綱騰駕行兮歸朔方馳原隰兮尋舊疆郭璞贈温嶠詩曰人亦有言松竹有林及爾臭味異夲同岑言以忘得交以淡成謝眺贈友人詩曰芳洲有杜若可以贈佳期清風動簾夜􅀌月照䆫時安得同携手酌酒賦新詩陸倕贈京邑僚友詩曰時逢世道泰騫足歩髙衢江間寒事早夜露傷秋草心屬姑􅂫臺目送邯鄲道李郭或同舟潘夏時方駕歡娱終美景敷文永清夜捉􅂰豈異人戚戚皆明婭蕭鈞晚景遊泛懷友詩曰龍門低御溝鳯轄轉芳州雲峯􅀄辯夏麥氣早迎秋山翠餘煙積川平晚照收浪隨文鷁轉波逐彩鴛浮風花輕未洛巖泉咽不流一辭金谷菀空想竹林遊潘岳詩曰投分􅀉石友白首同所歸古善哉行曰月没參横北斗䦨干親友在門忘寢與飡請交不許後漢書曰侯覇欲友王丹霸子見丹下車拜丹荅拜覇子曰大人方願交歡奈何拜小子丹曰君房有是言丹未之許也又曰張霸遷侍中時皇后兄虎賁中郞將鄧騭當朝貴戚聞覇名行欲與爲交逡廵不荅衆􅀏其不識世務魏志曰將軍張遼與其護軍武周有隙遼就刺史温恢求交胡質質辭以疾遼岀遇質曰僕安意於君何以相􅀌如此質曰古人之交也多取知其不貪奔北知其不怯聞流言而不信故可終也武伯南身爲雅士徃者將軍稱之不輟於口今以睚䀝之恨反成嫌􅂩況質才薄豈能終好是以不願也遼感其言復與周平蜀志曰劉巴字子􅀄零陵先賢傳曰張飛甞就巴􅀫巴不與語飛遂忿恚諸葛亮謂巴曰飛雖實武人愛慕足下足下雖天爵素高冝少降意巴曰丈夫處世當交四海英雄如何與兵子共語晉書曰解系字以連濟南人也系及二弟結育並清身㓗巳甚有聲譽時荀朂門宗弘盛朂諸子謂系等曰我與卿爲友應向我公拜朂曰我與君尊先使君親厚系曰不奉先君遺敎公若與先君厚徃日哀頓當垂書問親厚之誨非所敢承朂父子大慙梁書曰􅁃詵字彦實新野人也性純夷簡罕所遊狎河東柳惲欲與之交拒而不許齊春秋曰王僧祐字喬宗亭然獨立不交當代名士王思逺之徒託意請交並不降意自天子及侯伯未甞與一人逰焉嵇康髙士傳曰井丹字大春扶風人也􅀶學故京師爲之語曰五經紛綸井太春未甞書刺􅀱謁人梁松請友丹不肯見後遂􅀮遁皇甫士安髙士傳曰嚴遵字君平蜀人也楊雄少從之遊數稱其徳李温爲益州牧喜曰吾得君平爲從事矣雄曰可備禮與相見其人不可屈也王鳯請交不許歎曰益我財者損我神生我名者殺我身故不仕時人服之世􅀃曰何晏鄧颺夏侯太􅀄並求􅀓嘏交而嘏終不許諸人乃因荀粲􅀃合之􅀓曰夏侯太􅀄志大心勞能合虚譽誠所謂利口覆國之人鄧颺何晏有爲而躁􅀶而寡要外好名利而内無関籥此三賢者皆敗徳之人耳逺之猶恐罹禍况可親之哉後皆如其言又曰南陽宗世林與魏武同時而薄其爲人不與之交及魏武作司空揔朝政從容問宗曰可以交未荅曰松栢之志甚存世交後漢書曰孔僖字仲和魯人也祖父建少遊長安與崔􅂐仕王莾爲建新大尹僖與崔􅂐孫駰復相友善焉晉書曰咸寜􅀄有司奏何劭及兄遵等受故鬲令􅀽毅貨雖經赦宥冝皆禁止事下廷尉詔曰太保與毅有累世之交遵等所取蓋薄一皆置之父子交左傳襄五年曰􅀄伍叅與蔡太師子朝友其子伍舉與聲子相善聲子子朝之子也伍舉出奔鄭將遂奔晉聲子將如晉遇之於鄭郊班荆相與食班布也布荆坐地朋友世親也魏書曰陳群字長文通逹有識度其所交皆父黨也魯國孔融與群父紀友又與群交王隱晉書曰王戎隨父渾在郎舎時阮籍亦爲郎毎詣渾輙云與卿語不如阿戎談戎時年十五籍乃交焉北齊書曰陸昂字雲駒洛陽人也父子璋魏中書監昂爲河間邢劭所賞邢又與子璋交遊甞謂子璋云吾以卿老蚌復岀明珠髙士傳曰班嗣在京師家有賜書内足於財父黨楊子雲已下莫不造門唐書曰郄士羙字和夫少好學善記覽父友顔真卿肅潁士軰甞與之討論經傳應對如流旣而相謂曰吾曹異曰當交二郄之間矣汝南先賢傳曰薛勤字恭祖仕郡爲功曹陳仲舉時年十五爲父齎書詣勤勤頋而察之明日造焉仲舉父出迓勤勤曰足下有不凢子吾來候之不從卿也言義盡日道學論曰許邁字叔玄清虚接真遐棲世表志在往而不返故自改名逺遊與王右軍父子爲世外之交王亦辭榮好養生之事毎造逺遊未甞不彌日忘返束哲吊蕭孟恩文曰東海蕭惠字孟恩者父昔爲御史與哲先君同僚孟恩及哲旦夕同遊分義早著孟恩夫婦皆亡門無立嗣哲時有伯父從兄之憂未􅀗自往致文一篇以弔其魂絶交毛詩谷風曰谷風刺幽王也天下俗薄朋友道絶焉又曰伐木廢則朋友缺矣史記曰相國曹叅始微時與蕭何善及爲將相有􅂩又曰越石父賢在於縲紲之中晏子出遭塗解左􅆖贖之載歸弗謝入門乆之石父請絶晏子懼然攝衣冠謝曰晏雖不仁免子於厄何求絶之速也石父曰不然吾聞君子屈於不知已而伸於知已者方吾在縲紲之中彼不知我也夫子旣已感而贖我者是知已知已而無禮固不如縲紲之中漢書曰張耳陳餘始居約時相然信死豈頋問哉及據國争權卒相㓕亡􅀔利之交古人羞之蓋謂是矣又曰蕭育少與陳咸朱􅀶爲友著聞當世徃者有王貢故長安人語曰蕭朱結綬王貢彈冠言其相薦逹也始育與公卿子顯名咸最先進年二十餘爲御史中丞時朱􅀶尚爲杜陵亭長爲咸育所舉援後遂並歷刺史郡守相及爲九卿而􅀶先至將軍上卿歴位多於咸育遂至丞相育與􅀶後有􅂩不能終故世以友爲難也范曄後漢書曰許劭少峻名節好人倫多所賞識劭邑人李逹杜直有髙氣劭􅀄善之而後有隙東觀漢記曰梁鴻􅀄與京邑蕭友書約不爲陪臣及友爲郡吏鴻以書責之而去又曰王良字仲子東海人少清髙爲司徒司直以病歸一歳復徴至滎陽疾篤不任進道乃過其友人友人不肯見曰不有忠言竒謀而取大位何其往來屑屑不憚煩也遂拒之良慙自後連徴輙稱疾魏志鍾繇傳曰王弼爲人淺而不議物情􅀄與王􅀺荀融友善􅀺奪其黄門郞於是恨􅀺與融亦不終又曰管寜與華歆同學歆聞車馬聲岀門寜割席曰子非吾友也徐廣晉記曰相國􅁺魏諷有盛名同郡任􅁴與諷友善鄭袤謂覧曰諷姦雄必以禍終子冝絶之後諷果敗齊書曰􅀄劉逖與祖班以丈義相得結陳雷之契又爲弟俊聘班之女將免魏彦深等也以告逖仍付宻啓令其奏聞彦深等頗知之先自申理班由是疑逖告其所爲及班􅀍出逖遂遣弟離婚其輕交易絶如此唐書曰韋澳貫之之子也大和六年擢進士弟兄温與御史中丞髙元俗友善温請用澳爲御史謂澳曰高二十九持憲綱欲與汝相靣汝必得御史澳不荅温曰高君端士汝不可輕澳曰然恐無皇身御史終不詣元􅁉之門􅀽叔真隱士傳曰鶡冠者或曰楚人也隱居山林衣􅁦履穿以鶡爲冠莫測其名因服成號著書言道家事馮煖甞師事焉煖後顯於趙鶡冠子懼其薦已也乃與煖絶焉新序曰吴有士張胥鄙譚夫吾前交而後絶張胥鄙有罪拘將死譚夫吾合徒取之岀於道而後知其夫吾輟行而辭曰吾義不同子故前交而後絶吾聞之君子不以安肆志不爲危易行吾今從子是安則肆志危則易行也吾因子而生子􅀂反拘而死闔廬聞之命吏釋之胥鄙辭曰吾義不同於譚夫吾故不受其任矣今利以是出誠以譚夫吾故免也遂觸廧而死譚夫吾聞之曰致任而不受倿也不知而岀之愚也侫不可以接上愚不可以事君吾行虚矣人􅁖以吾力生吾亦恥以此立於世乃絶頸而死後漢朱公叔絶交論曰世之務交遊也甚矣不惇于業不忌于君犯禮以追之背公以從之事替義退公輕私重劉孝摽廣絶交論曰騁黄馬之劇談縱碧雞之雄辨於是有弱冠王孫綺紈公子道不挂於通人聲未遭於雲閣是曰談交魚以泉涸而煦沫鳥因將死而鳴哀断金由於湫隘刎頸起於苫蓋是曰窮交馳鶩之俗澆薄之倫無不操權衡秉纎纊衡所以量其􅁿重纊所以属其臯息若衡不能舉纊不能飛雖顔冉龍翰鳯雛曽史蘭薫雪白視􅀂逰塵遇如土梗近世有樂安任眆見一善則盱衝搤捥遇一才則􅀭眉扺掌雌黄出於脣吻朱紫由其月旦於是冠蓋輕湊衣裳雲合輜軿擊轊坐客􅁪满及瞑目東越歸駭洛浦繐悵猶懸門罕漬酒之彦墳未􅀫草野絶動輪之賔藐是諸􅀌朝不謀夕自昔把臂之英金蘭之友曽無羊舌下泣之仁寜慕郈成分宅之徳太行孟門豈云嶃絶是以耿介之士疾其􅀂斯獨立髙山之頂驩與䴢鹿同群􅀽嶠與禇左軍解交書曰皇太后踐登正祚臨御皇朝將軍之於國外姓之太上皇也與將軍逰處少長雖丗譽先後而臭味同歸平昔之交禮與數而降箕踞之欣隨位事而替雖欲虚詠濠肆脫落儀制其能得乎嵇康與山濤絶交書曰足下見直木必不爲輪曲者不以爲桷盖不欲枉其天材令得其所不可自好章甫強越人以文冕也今但願守陋巷教子孫時時與親舊叙闊陳􅀃平生濁酒一杯彈琴一曲志願畢矣太平御覽卷第四百一十
