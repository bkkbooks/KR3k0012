front:
  text: 太平御覽卷第三百九十三
  hash: sha256:396e773c49365dc23582df7f0db0acbc32af165590b1d8c8de0fe2c7d89ac847
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_393-1a}
body:
  text: 人事部三十四坐卧睡坐釋名曰坐挫也骨節挫屈也小人羣黨坐於王床王床者玉者床毛詩車鄰曰旣見君子並坐鼔瑟禮記曲禮上曰夫爲人子者坐不中席又曰離坐離立無徃叅焉又曰男女不離坐又曰立母跛坐無箕又曰有憂者側席而坐有䘮者專席而坐又曰虚坐盡後食坐盡前左傳襄五曰伍舉奔晉聲子遇之郊班荆相與食班布荆坐又襄二十六年曰衛子鮮奔晉公使止之不可及河又使止之止使者而盟于河託於木門木門青向不向衛國而坐怨之深也又定上曰申包胥如􅁗乞師勺飲不入口七日􅁗哀公爲之賦無衣九頓首而坐􅁗師乃岀春秋演孔圖曰孔子長十尺大九圍坐如蹲龍立如牽牛爾雅曰妥安坐也漢書曰單父人吕公善沛令避仇從之客因家焉沛中豪桀吏聞令有重客皆徃賀蕭何爲主吏主進進者㑹禮之財也主賦歛禮進爲之師也令諸大夫曰進不滿千錢坐之堂下髙祖爲亭長乃紿爲謁曰賀錢萬實不持一錢謁入吕公大驚起迎之門吕公者好相人見髙祖􅃺皃因重敬之引入坐上坐又曰上幸上林皇后愼夫人從其在禁中常同坐及坐郎署􅀽盎却慎夫人坐慎夫人怒不肯坐上亦怒起盎曰陛下旣巳立后慎夫人乃妾妾主豈可以同坐哉又曰茂陵徐生上䟽言霍氏㤗盛後霍氏誅㓕而吿霍氏者皆封人爲徐生上書曰臣聞客有過主人者見其竈直突傍有積薪客謂主人更爲曲突逺徙其薪不者且有火患主人嘿然不應俄而家果失火隣里共救之幸而得息於是殺牛致酒謝其隣人灼爛者在於上行餘各以功次坐而不禄言曲突者又曰髙祖使陸賈賜趙他印爲南越王賈至尉他魋結基倨見賈基倨謂伸其兩肤而坐也亦曰箕踞又曰諺曰千金之子坐不垂堂又曰陳遵字孟公時列侯有與陳遵同姓者毎至門人曰陳孟公坐中莫不震動旣至而非因號其人曰陳驚坐東觀漢記曰上幸譙使王霸攻周建賊雨射城中中霸前酒鐏霸安坐不動又曰隗囂圍來歙上自將救之圍解置酒髙㑹賜歙班絶席坐在諸將之右謝承後漢書曰汝南薛悙字子禮爲北海長家貧坐無完席妻曰白居無俸禄給子孫復無完席耶悙以善席與自坐敗者又曰鄭敬字次都釣於大澤折芰而坐以荷薦肉瓠瓢盛酒琴書自娱范曄後漢書曰􅀽術僣號人情離叛欲北至青州從􅀽譚曹操使劉備邀之還壽春至江亭坐簀床而歎曰􅀽術乃至於是乎歐血而死又曰孔融性寛容少忌好士喜誘益後進及退閑職賔客日盈其門常歎曰坐上賔恒滿罇中酒不空吾無憂矣與蔡邕素善邕卒後有虎賁士皃􅀋於邕融毎酒酣引與同坐又曰鄭公業諌董卓曰張孟卓東平長者坐不闚堂言不妄視也吴書曰孫權遣干禁還羣臣送禁虞翻謂禁曰卿勿謂吴無人吾謀適不用耳禁雖爲翻所惡然猶盛歎翻魏文帝爲翻設虚坐蜀志曰費禕爲諸葛亮司馬值軍帥魏延與長史楊儀相憎每並坐論延或舉刃擬儀儀泣涕横集禕常入坐其間諌喻分別終亮之丗各盡延儀之用也又曰王平字子均西宕渠人生長戎旅手不能書所識不過十字而占授作書皆有意理使人讀史漢書記傳聽之備知其義從朝至夕端坐儼然也吴志曰歩騭字子山與廣陵衛旍俱以種􅀲自給㑹稽焦征羗郡之豪族騭等脩刺奉􅀲征羗見之隱几坐帳中設席於地坐騭旍旍忿耻騭神色自􅀂鄧粲晉記曰裴遐性恬和同􅀋有試遐者推墮床下遐拂衣還坐言無異色漢晉春秋曰王褒父儀爲文帝所殺未甞西向坐示不臣也􅀳中興書曰陶淡字處靜年十五便服食絶榖家累千金僮客百數淡終日端拱絶不㛰娶居臨湘縣山中立小草屋裁足容身時還家設小床獨坐不與人共何晏別傳曰晏小時武帝雅竒之欲以爲子毎挾將遊觀命與諸子長㓜相次晏微覺於是坐則專席止則獨立或問其故荅曰禮異族不相貫坐位孟嘉別傳曰􅁃亮領江州嘉爲從事禇褒爲豫章出朝亮正旦大㑹時彦悉集嘉坐次第甚逺褒問亮曰聞有孟嘉其人何在亮曰在坐卿但自覔褒觀衆人指嘉謂亮曰將無是乎亮欣然􅀏嘉爲褒所得乃益重嘉焉皇甫謐髙士傳曰管寧常坐一木榻五十餘年榻上當􅂰皆穿六韜曰文王出田見吕尚坐茅而漁乃再拜與歸又曰紂之時婦女坐之綺席晏子曰景公獵休坐地食晏子後至滅葭而席公不恱曰子席何也對曰臣聞介胄坐陣不席獄訟不席獄户不席三者皆憂也臣不敢以憂侍坐孟子曰晉平公之於亥唐也入云則入坐云則坐食云則食雖􅂼食菜羹未甞不飽莊子曰原憲處魯居環堵之室匡坐而弦歌風俗通曰延嘉中常侍坐單超左悺音貫徐璜具瑗唐衡在帝左右縱其姦慝時人謂之語曰左廻天徐轉日具獨坐言其信用甚於圎轉又曰汝南陳伯敬行必舉歩坐必儼然郭子曰何次道充字次道徃王丞相許丞相以麈尾礭床呼何共坐云來來此是君位丗􅀃曰魏明帝使后弟毛曽與夏侯太􅀄共坐時人謂之蒹葭􅀝玉樹語林曰馬融笇渾天不合召鄭玄令笇一笇便决及玄業成辭歸融心忌焉玄亦疑有追者乃坐橋下在水上據􅄚融果轉戒欲勑追之告左右曰玄在土下水上據木此必死矣遂罷追俗􅀃曰王僧敬神明俊徹爲一時之摽桓玄時集聚賔客莫有岀其右者王在坐都不復覺有餘人坐無王便覺殷仲文謝益壽爲佳王僧敬兄弟列坐齋中見之若神小人從户前過皆肅然毛竪􅄞康絶交書曰危坐一時痺不得揺卧􅀃文曰眠翕目也􅃦病卧也卧休也釋名曰卧化也其精神變化不與覺時同也􅄰謐也謐静無聲也寢侵也損事功也瞑泯也無知泯泯也禮記玉藻曰君子寢恒東首鄭玄注日首生氣也又樂記曰魏文侯問於子夏曰吾端冕而聽古樂則唯恐卧聽鄭衛之音則不知倦論語公冶長曰宰予晝寢子曰朽木不可雕也糞土之墻不可汚也於予與何誅誅責又郷黨曰寢不尸布展手足似尸象史記曰吴起爲將與士卒最下者同衣食卧不設席行不乗􅀐又曰上自將擊黥布羣臣居守皆送至灞上留侯病自強起至曲郵因􅀃上令太子爲將軍􅁥關中軍上曰子房雖疾強卧而傳太子漢書曰黥布反上疾欲使太子擊之吕后承間爲上泣曰上雖疾強載輜車卧而護之諸將不敢不盡力又曰上欲廢太子吕后使建成侯吕澤劫張良曰君常爲上謀臣今上日欲易太子君安得髙枕而卧又曰汲黯拜淮陽太守黯伏謝不受上曰君薄淮陽耶頋淮陽吏民不相得吾徒得君重卧而治之又曰􅀄武帝遣昭帝以討莽何罪功封金日磾爲秺侯日磾以帝少不受封輔政歳餘病困大將軍光白封日磾卧授印綬一月薨又曰吴楚反乏粮飢欲退數挑戰周亞夫終不出夜軍中驚内相攻擊擾亂至於帳下亞夫終卧不起湏􅁷亦定又曰董賢常與上卧起嘗晝􅃦偏藉上衣䄂上欲起恐動賢乃斷䄂而起又曰王莽軍師外破大臣内叛憂懣不能食但飲酒㗖鰒歩角切魚讀軍書倦因慿凡寢不復就床後漢書曰彭寵自立爲燕王其妻數惡夢又多見變恠五年春寵齋獨在便室倉頭子宻等三人因寵卧寢寐共縳寵着床告外吏云大王齋禁皆使吏休東觀漢記曰吴漢擊冨平獲索二賊於平原明年春賊率五萬餘人夜攻漢營軍中驚亂堅卧不動又曰上在邯鄲宫晝卧温明殿耿弇入造床下請問因􅀃曰今更始失政天下可馳檄而定又曰楊政常過楊虚侯馬武稱疾卧欲令政拜床下政入户徑上床坐武恨語言不懌政因曰蕃臣不思求賢報國而驕天下英俊今日摇動者刀入脅左右大驚蜀志曰先主旣定益州廣漢太守夏纂請􅁗宻爲師友􅀕酒領五官􅁺稱曰仲父宻稱疾卧在茅舎纂將功曹石祐主簿王並即宻第宴談宻卧如故沈約宋書曰羊欣字敬元從父不疑爲烏程令年十二時王獻之爲吴興太守甚知愛之獻之常夏月入縣欣着新絹裙晝寢獻之書數幅而去欣書本工因此彌善鍾離意別傳曰嚴遵者與光武皇帝俱爲諸生遊渉他縣同門精學暮夜􅀫二人寒不得寢卧更相謂曰後若豪貴憶此之難冝勿相忘羅含別傳曰羅含字君章少甞晝卧夢一鳥文色異常徑飛入口杜􅀕酒別傳曰君新作􅀍腝眠覺晏起乃歎腝便眠使人不起異事因令看陌上有寒人舉􅀍乞之常眠布􅀍中㑹稽典録曰陳脩字奉遷少爲郡幹受韓詩榖梁春秋家貧爲吏常岀檐上下恒食乾糒音備每至正臈僵卧不起同僚請不肯徃其志操如此吴越春秋曰楚平王遣使者封凾印綬追召子胥子胥以夜半時卧覺忽而仰天悲歎言曰父兄俱死當誰歸乎泣下交流恐爲楚所得乃貫弓執矢歩出東郭韓子曰堂谿空見昭侯曰今有白玉巵無當有瓦器有當君渴將何以曰以瓦器空曰爲人主漏泄羣臣之語猶玉巵無當也昭侯於是毎與空話事歸輙獨卧唯恐夢言泄於妻妾桓譚新論曰成帝幸甘泉詔楊子雲作賦倦卧夢其五藏岀在地以手収内入覺大少氣一年卒郭子曰王長史病篤王仲祖也寢卧燈下轉麈尾視之歎曰如此人曽不得四十及亡劉尹臨殯以璧柄麈尾着棺中因慟絶丗􅀃曰􅀽紹年少時曽遣人夜以劒擲魏武小不着魏武撥之其後來必髙因怙卧床上劒至果髙又曰郝隆七月七日岀日中仰卧人問何以荅曰我曬書也語林曰王子敬在齋中卧偷入齋取物幞裝一室之内略無不盡子敬卧而不動偷遂復登床欲有所覔子敬因呼曰偷兒青氊是我家舊物可特置不於是羣賊始知其不眠悉置物驚走睡左傳宣上曰趙宣子諌靈公患之使鉏麑賊之鉏麑晉力士也晨徃將朝尚早坐而假寐不解衣冠而睡麑退而歎曰不忘恭敬民之主也賊民之主不忠弃君之命不信有一於此不如死也觸槐而死漢書禮樂志曰魏文侯最爲好音而謂子夏曰聽古樂則欲􅄰及聞鄭衛之音子不知倦焉又曰陳咸字子康父萬年甞病召咸敎戒於床下語至夜半咸睡頭觸屏風萬年大怒欲杖之咸叩頭謝曰具䁱所言大人敎咸謟也萬年乃不復言晏子曰景公田於梧丘夜猶早公坐睡而夢有五大夫北面稱無罪公覺召晏子晏子對曰昔君靈公田五大夫駭獸故断其頭而葬之命之曰五大夫之丘命人掘而葬之丗􅀃曰魏武云我眠中不可妄近近便斫人亦不覺左右冝深慎此後佯睡所幸人􅀼以􅀍覆之因便斫殺自後安眠人莫敢近者郭子曰許侍中頋司空入王丞相帳中眠事具帳部益部􅂄舊傳曰何􅕼爲成都令嘗眠睡其覺悟便得姦詐咸畏􅕼之發摘或以爲有術得知之無敢復欺者太平御覽卷第三百九十三
