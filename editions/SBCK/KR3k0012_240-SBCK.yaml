front:
  text: 太平御覽卷第二百四十
  hash: sha256:fa103c8dc2f3f82af19317f2ffb01023ffe10268fa106ccc85542b151af05475
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_240-1a}
body:
  text: 職官部三十八雜號將軍下建威將軍奮威將軍奮武將軍振威將軍揚威將軍建武將軍輕車將軍伏波將軍材官將軍折衝將軍虎威將軍偏將軍禆將軍虎牙將軍漢臣將軍計虜將軍破虜將軍建義將軍刺姦將軍輔威將軍􅀭化將軍安漢將軍輔漢將軍都護將軍立義將軍中堅將軍厲威將軍盪㓂將軍討逆將軍輔呉將軍盪魏將軍鷹􅀭將軍牙門將軍中將軍中領軍中護軍北軍中􅀱朱衣直閣直寢直後直齋監軍建威將軍東觀漢記曰光武以耿弇爲建威大將軍從攻雒陽奮威將軍魏志曰吕布殺董卓王允以布爲奮威大將軍儀比三司又曰􅉁援說􅀽紹紹即表爲奮威將軍奮武將軍呉志曰賀齊封豫章東部民彭材李玉王海等起爲賊亂衆萬餘人齊詩平之誅其首惡餘皆降服㨂其精徤爲兵次爲縣户遷奮武將軍振威將軍魏志曰太祖以程昱爲振威大將軍破􅀽譚尚􅀭威將軍魏志曰臧覇字宣髙太山人也從太祖討孫權於濡湏口與張遼爲前鋒行遇霖雨大軍先反水遂長賊舡稍近將士皆不安遼欲去覇止之曰公明於利鈍寧肯􅂢吾等耶明日果有令遼至以語太祖太祖善之拜覇揚威將軍建武將軍魏志曰太祖以夏侯惇爲建武將軍又曰文帝善孟達姿才容觀以爲建武將軍輕車將軍漢書曰武帝元光七年以公孫賀爲輕車將軍屯馬邑伏波將軍環齊要略曰伏波舡渉江海欲浪伏息也漢書曰武帝元鼎五年以路􅀶德爲伏波將軍伐南越吕嘉東觀漢記曰光武以馬援爲伏波將軍魏志曰夏侯惇爲伏波將軍領河南尹使得以便冝從事不拘科制太祖常與同載特見親重出入卧内諸將莫得比也王隱晉書曰武帝以孫琇爲伏波將軍材官將軍漢書曰武帝以李息爲材官將軍軍馬邑折衝將軍魏書曰武帝以樂進爲折衝將軍虎威將軍魏志曰于禁字文則太山人將軍王服異之薦禁才任大將太祖召見與語拜軍司馬後拜虎威將軍呉志曰朱然字義封從孫權討􅀜羽別與潘璋到臨沮擒羽遷昭武將軍封西安郷侯虎威將軍吕蒙病篤權問曰卿如不起誰可代者蒙對曰朱然膽守有餘愚以爲可任蒙卒權假然節鎭江陵齊書曰栁世隆元景子也出爲虎威將軍上庸太守帝謂元景曰卿昔以虎威之號爲隋郡今復以授世隆使卿門世不絶公也偏將軍後漢書曰呉漢字子顔南陽宛人家貧以販馬自業素聞世祖長者獨欲歸心及世祖於廣阿拜漢爲偏將軍又曰臧宫字君翁潁川人也從世祖征戰諸將多稱勇世祖察宫勤力少言甚親納之及至河北以爲偏將軍呉志曰陳武字子列廬江人孫䇿在壽春武脩謁時年十八長七尺七寸及權統事尤爲權所愛拜爲偏將軍又曰董襲字元伐㑹稽人長八尺武力過人拜偏將軍禆將軍魏志曰李通字文達江夏平春人以遊俠聞於江汝之間屬連歳大飢通傾家振施與士分糟糠建安初通舉衆詣太祖于許太祖討張繡通爲先登大破繡軍拜禆將軍虎牙將軍漢書曰宣帝以雲中太守田順爲虎牙將軍伐匈奴范曄後漢書曰盖延字巨卿漁陽人也身長八尺邊俗尚勇力而延以氣聞延與呉漢同歸世祖從平河北世祖即位拜虎牙將軍漢臣將軍東觀漢記曰上於大㑹中指王常謂群臣曰此家率下江諸將輔翼漢室心如金石真忠臣也是日以常爲漢臣將軍與諸將絶席討虜將軍東觀漢記曰光武以王覇爲討虜將軍擊董憲破虜將軍魏志曰李典字㬅成山陽鉅野人爲破虜將軍典好學問貴儒雅不與諸將争功敬賢士大夫恂恂􅀂不及中軍稱其長者建義將軍東觀漢書曰光武以朱祐爲建義將軍攻朱鮪刺姦將軍東觀漢記曰光武以軍市令􅀕遵爲刺姦將軍范曄後漢書曰岑彭字君然南陽􅁄陽人也後世祖拜爲刺姦大將軍使督察衆營授以常所持節輔威將軍東觀漢記曰光武以臧宫爲輔威將軍揚化將軍東觀漢記曰光武以堅鐔爲揚化將軍安漢將軍蜀志曰麋笁字子仲益州旣定拜爲安漢將軍班在軍帥將軍之右笁雍容敦雅而翰翮非所長是以待之上賔之禮未曽有所統御然賞賜優寵無與爲比又曰王平字子均諸􅁑亮卒於武功軍退還魏延作亂一戰而敗平之功也遷安漢將軍輔漢將軍東觀漢記曰光武以鄧奉爲輔漢將軍都護將軍魏志曰曹洪累從征討爲都護將軍立義將軍魏志曰龐德以衆降太祖聞其驍勇拜立義將軍中堅將軍魏志曰太祖以許禇爲中堅將軍又以張遼爲行中堅將軍厲威將軍魏志曰太祖征荆州還留满寵行厲威將軍盪㓂將軍蜀志曰張嶷字伯􅄮自越嶲徴詣成都民夷戀慕泣涕過旄牛邑邑民襁􅀒來迎反追㝷至蜀郡界其督率隨嶷朝貢者百餘人嶷至拜盪宼將軍慷􅁣壯烈人多貴之討逆將軍呉志曰曹公表孫䇿爲討逆將軍封呉侯輔呉將軍呉志曰孫權以張昭爲輔呉將軍沈約宋書曰呉置輔呉將軍班亞三司盪魏將軍呉志曰吕據太元元年大風江水盛溢泛流漸淹城門權使視水獨見據使人取大舡以備宫權嘉之拜盪魏將軍鷹􅀭將軍晉書曰郭奕咸寧初遷雍州刺史鷹􅀭將軍㝷假赤幢曲盖鼓吹牙門將軍蜀志曰魏延字文長義陽人也以部曲將隨先主入蜀數有戰功遷牙門將軍中將軍北齊書曰沙苑之敗崔仲文持馬尾以渡河波中乍没乍出髙祖望見之曰崔􅁺也遽遣舡赴接旣濟勞之曰卿爲親爲君不顧萬死可謂家之孝子國之忠臣加中將軍中領軍魏略曰中領軍延康中置故漢北軍中􅀱之官又曰太祖以史渙忠勇爲中領軍領禁軍又曰太祖還長安以曹休爲中領軍又曰文帝征孫權以尚書令陳群爲中領軍晉書曰呉隱之爲中領軍清儉不革毎月􅀄得禄裁畱身粮其餘悉分賑親族家人績紡以供朝夕時有困絶或併日而食􅁪布衣不完妻子不霑寸禄晉中興書曰羊祜字叔子遷中領軍悉統宿衛入直殿中執兵之要事兼内外齊書曰蕭景先武帝少年與景先共車行埿路車乆故壞至領軍府西門車轅折俱狼狽景先謂帝曰兩人脫作領軍亦不得忘今日艱辛及武帝踐阼詔以景先爲領軍拜日羽儀甚盛傾朝觀屬拜還未至府門中詔相聞領軍今日故當無折轅事耶景先奉謝梁書曰臧盾遷中領軍領軍管天下兵要監局事多盾爲人敏贍有風力長於撥繁職事甚理天監中呉平􅀱蕭景居此職著聲稱至是盾復繼之三國典略曰齊左僕射祖珽附陸令萱求爲領軍齊主許之侍中斛律孝卿謂上洛王元海侯吕芬等云珽是漢兒兩眼盲豈合作領軍也元海遂入啓之珽言於齊主云元海與臣素有􅂩必是元海譛臣齊主曰然珽列元海共太府少卿李叔元平准令張叔略等結明樹黨陸令萱又唱和之遂除元海爲鄭州刺史叔元爲襄城郡守叔略爲南營州録事叅軍珽遂獨處機衡揔知兵事齊王亦令中要人扶侍出入毎同御榻論决朝政髙堂隆集曰巳巳詔書中領軍游繫皆清玉佩中護軍史記曰漢髙帝以陳平爲護軍中尉盡護諸將漢書曰護軍都尉秦官元狩四年屬大司馬元夀元年更名司㓂元始元年更名護軍魏志曰韓浩字元嗣以忠勇顯爲中護軍掌禁兵置長史司馬從太祖討張魯魯降議者以浩智略足以綏邊欲留使都督諸軍鎭漢中大祖曰吾安可以無護軍乃與俱其見親如此王隱晉書曰鄧攸遷吏部尚書牧馬於家庭妻子素食當時清浄内外肅然遷爲中護軍晉起居注曰武帝太始七年詔曰中護軍職典武選冝得堪幹其事者左衛將軍羊琇有明贍才見乃心在公其以琇爲中護軍晉中興書曰司徒王導將以趙氷爲中護軍孔愉謂導曰中興以來處此官者用周伯仁應思逺今誠乏才豈可以趙氷居之其秉正不撓皆此􅀋也世語曰夏侯􅀇世名知人爲中護軍抜用武官無非俊傑多牧州典郡皇甫謐集云護軍武士之官晉王羲之臨護軍教曰今所任要在於公役均平其􅏔大史忠謹在公者覆行諸營家至人告暢吾乃心其有老落篤􅜡不堪從役或有飢寒之色不能自存者區分處别自當叅詳其冝北軍中􅀱漢書曰武帝置中壘校尉掌北軍壘門外内續漢書曰光武中興中省壘置中􅀱五尉校營又曰孔文舉拜北軍中􅀱王隱晉書曰荀晞字道將爲北軍中􅀱又曰太祖永昌元年以鍾雅爲北軍中􅀱五年省併領軍晉中興書曰陶囬字恭之王導以囬有器幹擢拜北軍中􅀱囬性不畏強禦朱衣直閣後魏書曰元文景大司農卿康之次子除貟外郎冠軍將軍朱衣直閤直寢後魏書曰于忠字思賢弱冠拜侍御史文明太后臨朝刑政頗峻忠朴直少言終無過誤㝷除左中郎將領直寢又曰楊津字羅漢弘農華隂人也夲字延祚髙祖賜名焉少端謹以器度見稱爲直寢直後後魏書曰元天穆性和厚美形皃年二十起家貟外郎領直後蕭子顯齊書曰臨海亡命田流自號東海王逃􅇡㑹稽鄮縣邊海山谷中立屯營官軍不能討明帝遣直後聞人襲說降之直齋後魏書官氏志曰大和九年十月􅀄置直齋監軍史記曰穰苴將兵扞燕晉之師苴曰臣素賤君擢之閭伍之中加之大夫之上願得君之寵臣國之所導以監軍景公使莊賈徃苴與賈約曰㑹日中於軍門苴先馳至軍立表下漏賈素驕貴夕時乃至苴遂斬賈以徇三軍軍士皆震慄服之東觀漢記曰光武使來歙監諸將范曄後漢書曰宋均字叔庠爲監軍時伏波將軍馬援征武溪南臨沅水軍士多病均懼衆軍疾疫矯詔迫降之諸將莫􅀿均乃勒兵圍賊城詐爲詔而降之爲置長吏而歸自劾矯詔之罪帝善之魏志曰司馬文王征夀春使監軍石苞統卒爲遊軍晉武帝起居注曰豫州刺史胡威忠素質直思謀深奥其以威爲監軍刺史如故沈約宋書曰監軍盖諸將出征大將監領之太平御覽卷第二百四十
