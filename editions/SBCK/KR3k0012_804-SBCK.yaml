front:
  text: 太平御覽卷第八百四
  hash: sha256:f5ac5dca56a2710a1d5c68d370cd80b07a18b0adc3d5b387c330d1def38832eb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_804-1a}
body:
  text: 珎寳部三玉上尚書堯典曰在璿璣玉衡以齊七政孔安國注日在察也璿美王璣衡王者正天之器可轉運者七政日月五星各異政舜察天文齊七政審巳當天心與否又㣧征曰火炎崑崗玉石俱焚山脊曰崗崑山出玉言火逸而害玉又禹貢曰華陽黒水惟梁州厥貢璆璆玉名也雍州厥貢惟球琳瑯玕球琳皆玉名琅王玕石而似珠又顧命曰成王􅀍冕服馮玉几又曰大玉夷玉天琭在東序尚書中候曰湯沉璧於洛黒鳥隨魚止化爲黒玉赤勒文尚書􅀃曰有人能起載玉英鄭􅀇日王果實召載爲骨衣也尚書大傳曰堯致舜天下贈以昭華之玉周書曰武王俘啇舊寳玉萬四千佩玉億有八萬周禮天官下曰玉府掌王之金玉玩好兵器凢良貨賄之藏共王之服玉佩玉珠玉齊則共食玉王是陽精之純者食之所禦水氣又春官上大宗伯曰玉作六器以禮天地四方以蒼璧禮天以黄琮禮地以青珪禮東方以赤璋禮南方以白琥禮西方以􅀇璞禮北方儀禮聘禮曰凡執玉無籍者襲鄭􅀇注云籍言脩也大戴禮曰玉在山而木潤淵生珠而崖不枯珠者隂中之陽也破勝火玉者陽中之隂也破勝水禮記月令曰孟春之月天子衣青衣服蒼玉又曲禮上曰受珠玉者以掬又曰執玉爵者弗揮又曰執玉不趍志重玉也又檀弓曰石駘仲卒駘仲衛大夫石碏之疾無適子有庻子六人卜所以爲後者莫適立也曰沭浴佩玉則兆言齊潔則得吉兆也五人者則沐浴佩玉石祁子曰孰有執親之喪而沭浴佩玉者乎不沭浴佩玉心正且知禮又月令曰孟春之月天子衣青衣服蒼玉又玉藻曰古之君子必佩玉右徴角左宫羽玉聲所中也徵角在右事也民也可以勞宫羽在左宫也物也冝逸趨以采齊路門外之樂節也門外謂之趨齊當楚薺之薺行以肆夏登堂之樂節周還仲規反行也冝圎折還中矩曲行也冝方進則揖之退則揚之然後玉鏘鳴也揖之謂小免見於前也揚之謂小仰見於後也鏘聲貌又曰君子無故玉不去身君子於玉比德焉故謂喪與災天子佩白玉而􅀇組綬公侯佩山􅀇玉而朱組綬大夫佩水蒼玉而純組綬世祖佩瑜玉而綦組綬士佩瓀玟而緼組綬玉有山􅀇水蒼者視之文色所似也緩者所以佩玉相承受也又學記曰玉不􅅣不成器人不學不知道又聘義曰子貢問於孔子曰敢問君子貴玉而賤珉何也爲玉之寡珉之多與孔子曰非爲珉之多故賤之也玉之寡故貴之也夫昔者君子比德於玉焉温潤而澤仁也縝宻而栗知也縝髮也栗堅貌廉而不劌義也劌猶傷也義者不苟傷人也垂之如墜禮也禮尚謙卑叩之其聲清越以長其終詘然樂也樂作則有聲止則無也越猶陽也詘絶止貌瑕不掩瑜瑜不掩瑕忠也暇玉之病也瑜其中間美者孚尹旁逹信也氣如白虹天也精神見于山川地也精神亦精氣也虹天氣也圭璋特逹德也特逹謂以朝聘天下莫不貴者道也道者人無不由詩云言念君子温其如玉故君子貴之也禮含文嘉曰玉石得冝則太白常明禮稽命徴曰王者得禮制則澤谷之中有白玉焉禮斗威儀曰君乗金而王則紫玉見於深山左詩桓公曰􅀄虞叔有玉虞公求旃不獻旣而悔之曰周諺有之疋夫無罪懷璧其罪吾焉用此以其賈害乃獻之又莊公曰􅉑公晉侯朝王享禮命之宥命之以幣物有助也皆玉五㲄非禮也又僖上曰天王使邵武公内史過賜晉侯命受玉惰過歸告王曰晉侯其無後乎事具錫命門又僖下曰楚子玉自爲瓊弁玉纓未之服也先戰夢河神謂巳曰􅂌余賜汝孟諸之麋弗致也大心與子西使榮黄諌弗聽榮季曰死而利國猶或爲之况瓊玉乎是糞土也而可以濟師將何愛焉弗聽又僖下曰晉侯執衛侯歸之于京師使醫衍酖衛侯寗俞貨醫使薄其酖不死公爲之納玉於王興晉侯皆十㲄王許之乃釋衛侯又文公下曰秦伯使西乞術來聘且言將伐晉襄仲辭玉事具奉使部又曰莒太子僕以其寳玉來奔又成上曰晉及齊戰于鞍齊師敗齊侯使賔媚人賂以紀甗玉磬與地不可則聽客之所爲又襄十五年曰宋人或得玉獻諸子罕子罕弗受獻玉者曰以示玉人玉人能治玉者玉人以爲寳也故敢獻之子罕曰我以不貪爲寳爾以玉爲寳􅀂以與我皆喪寳也不􅀂人有其寳稽首而告曰小人懷璧不可以越郷言必謂盗所害納此以請死也請免死子罕寘諸其里使玉人爲之攻之攻治也冨而後使復其所賣玉得冨又曰襄公十八年晉侯伐齊將濟河獻子以朱􅁝玉二瑴􅀟玉日瑴而禱曰齊環怙恃其險􅀒其衆庻環齊靈公名􅀒依也弃好背盟陵虐神主神主民也謂數伐魯民人曽臣彪將率諸侯以討焉彪晉平公名稱臣者明上有天子以謙告臣曽臣猶臣其官臣偃實先後之守官之臣偃獻子名苟捷有功無作神羞羞恥也官臣偃無敢復濟偃信巫言故以死自誓唯爾有神裁之沈玉而濟又昭七年曰燕曁齊平燕人歸燕􅁎嫁玉與齊侯賂以瑶罋玉櫝斝耳不克而還瑶玉也櫝匱也斝耳玉爵又曰公賜公衍羔裘使獻龍輔於齊侯龍輔玉名遂入羔裘齊侯喜與之陽榖陽榖齊邑又曰公疾徧賜大夫從公者大夫不受賜子家子􅀟琥琥玉器一環一璧輕服細好之服受之大夫皆受其賜巳未公薨子家反賜於府人曰吾不敢逆君命也大夫皆反其賜又昭十六年曰晉韓起聘于鄭宣子有環其一在鄭啇玉環同工共朴自共爲􅀟宣子謁諸鄭伯謁請子子産弗與曰非官府之守器也寡君不知子太叔子羽謂子産曰韓子亦無幾求言所􅀂我用瓘斝玉瓉鄭必不火子産弗與以爲天災流行非禳所息故也爲明年宋衛陳災傳又定上曰蔡昭侯爲兩佩與兩裘佩佩玉也以如楚獻一佩一裘於昭王昭王服之以享蔡侯又曰蔡侯歸及漢執玉而沈曰余所有濟漢而南者有􅀂大川自誓言􅀂復渡漢當受禍明如大川又曰季平子行東野還未至丙申卒于房陽虎將以璵璠歛與璠美玉君所賜仲梁懷弗興曰改歩改玉昭公之出孫行君事偑璵􅀕宗廟今定公立復臣位改君歩則亦當去璵璠陽虎欲逐之告公山不狃曰彼爲君也子何怨焉又定下曰邾隠公來朝子貢觀焉邾子執玉髙其容仰公受玉卑其容俯王朝者之贄子貢曰以禮觀之二君者皆有死亡焉又曰陽虎脫甲如宫取寳玉大弓以出又哀上曰衛太子禱曰大命不敢請佩玉不敢愛又曰吴申叔儀乞糧於公孫有山氏曰佩玉葉􅀆余無所繫之榖梁傳隱公曰賵玉曰唅春秋孔演圖曰孔子論經有烏化爲書孔子奉以告天赤爵集書上化爲玉刻曰孔提命作應法春秋􅀃題辭曰孔子以受黄玉葬魯城北毛詩國風曰將翺將翔佩玉鏘鏘將將鳴玉而後行又竹竿曰巧􅀏之瑳佩玉之郍瑳巧􅀏貌郍行有節度又小雅曰它山之石可以攻玉攻錯也又大雅曰維玉及瑶鞞琫容刀詩含神霧曰孔子曰詩者天地之心刻之玉板藏之金府韓詩外傳曰良玉度尺雖有千仞之土不能掩其光周易鼎卦曰上九鼎玉鉉大吉無不利鄭􅀇注曰鼎蓋象玉似剛而柔廉而不劌易曰乾爲金爲玉孝經援神契曰神靈滋液百寳用則玉有瑛華宋均曰尊卑不失其服玉者英華也論語子罕曰子貢曰有美玉於斯韞櫝而藏諸求善價而沽諸子曰沽之哉沽之哉我待價者也寧有自訟賣之道乎我居而待價者又季氏曰孔子曰求虎兕出於椑􅀛玉毁於櫝中是誰之過與逸論語曰璠璵魯之寳玉也孔子曰美哉璠璵逺而望之煥􅀂也近而視之瑟􅀂也一則理勝一則孚勝又曰玉十謂之區治玉謂之􅅣亦謂之雕雙王爲瑴五榖爲區雕治璞也㲄音角瑳玉色鮮白也瑩玉色也瑛玉光也瓊赤玉也璿瑾瑜美玉也璑舞三采玉也玲瑲琤􅖰瑝鍠玉聲也璬玉佩玉也瑱充耳也璪玉飾以水藻也史記曰范蠡事越王勾踐二十餘年竟滅吴范蠡曰君行令臣行意乃載其輕寳珠玉乗舟浮海行終不反漢書曰陳平求見漢王拜平爲都尉綘灌等或䜛平曰雖美丈夫如冠玉耳又曰文帝始幸雍新垣平以望氣見平使人持玉柸闕下獻之平言上曰闕下有寳玉氣果有獻玉柸者又郊祀志曰宣帝祀河東之明年鳯凰集祋祤於所集處得寳玉乃起萬壽宮又曰王莽就國孔休守新都相休謁見莽莽進其玉具寳劒休不肯受莽因曰誠見君靣有瘢美玉可以滅獻其璏耳即解其璏休復辭莽遂椎碎之自裏以進休也後漢書曰孝明帝時汴渠成故行幸滎陽廵行河渠薦嘉玉潔牲以禮河神續漢書曰桓帝時光禄吏舎下夜有青氣視之得玉鈎玦各一鈎長七寸三分玦五寸四分身中皆雕鏤又曰三老五更杖玉杖民年七十授之以玉杖華嶠後漢書曰嘉平中􅀽逢爲三老賜玉杖范曄後漢書曰梁兾金玉珠璣異方珎怪積藏室魏志曰漢時夫餘王葬用玉鉀常䂊以付玄莬郡王死則迎取以葬公淵伏誅􅀇莬庫猶有玉鉀一具今夫餘庫有玉璧珪瓉數代之物傳丗以爲寳􅂄老言先代之所賜也魏略曰大􅁗國出采玉五色玉夫餘國出赤玉晉書曰中興東遷舊章多闕而冕旒飾以翡翠􅃢瑚及􅄂珠等顧和奏舊冕十有二旒皆用玉珠今用􅄂珠等非禮􅀂不能玉可用白琁成帝於是始下太常改之沈約宋書曰紫玉王者不藏金玉則光見􅀷山崔鴻十六國春秋南燕録曰鎮南長史恱壽謂南海王法曰向見北海王子天資􅀪雅神爽髙邁始知天族多竒玉林皆寳又前涼録曰辛攀字懷逺隴西狄道人兄鑒曠弟寳迅皆以才識知名􅁗雍爲之語曰三龍一門金友玉昆又曰􅀄吕光之稱王也遣市六璽於于闐六月玉至也燕書曰文帝熈平二年左部民得玉璽玉鼎趙書曰劉聦徙治平陽於汾水中得白玉四寸髙二分龍鈕文曰有新保之後魏書曰崔挺爲光州刺史掖縣有人年踰九十板輿造州自稱少曽充使林邑得一美玉方尺四寸甚有光彩藏之海島垂六十歳忻逢明政今願奉之挺曰吾雖德謝古人未能以玉爲寳遣舡隨取光潤果然迄不肯受乃表送都又曰李預字元凱歴征西大將軍長史帶馮翊太守府解罷郡遂居長安羡古人飡玉法乃採訪藍田躬徃政得􅀂環璧雜器形者大小百餘頗有麤黒者亦挾盛以還至而觀之皆光潤可玩預乃椎七十􅋞爲屑食之餘多惠人後預及聞者更求玉於前處皆無所見翊公源懷弟得其玉􅅣爲器佩皆鮮明可寳預服經年云有効驗而丗事寢食皆不禁節又加好酒損志及疾篤謂妻子曰吾酒色不絶自致於死非藥過也然吾尸體必當異勿速殯令後人知飡服之妙時七月中旬長安毒􅀬預屍四􅀫而體色不變其妻常氏以玉珠二枚唅之口閉常謂曰君自云飡玉有神驗何不受唅言訖齒啓納珠因虚其口都無穢氣舉歛棺堅直不傾委死時有遺玉屑數􅂛囊盛納諸棺中又曰髙祐爲中書侍郎時有人於零丘得玉印一以獻詔以示祐祐曰印上有籕書二字文曰守壽壽者命也我獲其命亦是歸我之徵又曰穆弼有風格善自位置髙祖􅀄定代族欲以弼爲國子助教弼辭曰先臣以來蒙恩累丗比校徒流實用慙屈髙祖曰朕欲厲胄子故屈郷先白玉投泥豈能相汚弼曰旣遇明時恥沉於泥滓又曰孝昌中於廣平王第掘得古玉印勑召祖瑩與李琰之令辯何丗之物瑩云此是于闐國王晉㤗康中所獻乃以墨塗字觀之果如瑩言時人稱爲􅀶物後周書曰武帝保定中晋公護獲玉斗以獻北史曰于謹平江陵獲大玉徑四尺圍七尺及諸輿輦法物以獻又曰隋文時王邵上表云稽覽圖史又云政道則隂物變爲陽物鄭􅀇注云䓗變爲韮亦是謹案自六年巳來逺近山石多變爲玉石爲隂玉爲陽太平御覽卷第八百四
