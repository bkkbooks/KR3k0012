front:
  text: 太平御覽卷第九百六十八果部五
  hash: sha256:c6141e21d511ada4da75ffa1bd89b2a60683f33abef3447d1515a83a8c0fd3bd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_968-1a}
body:
  text: 杏李杏典術曰杏木者東方歳星之精師曠占曰杏多實不蟲者來年秋善書紀年曰昭公六年十二月桃杏花幽王十年九月桃杏實山海經白靈山之下其木多杏盧諶􅀕法曰夏祠用杏崔寔四民月令曰三月杏花盛可播白沙輕土之田後周書曰張元芮城人性廉㓗南隣有杏二樹杏熟多落元園中諸小兒競取食之元所得者悉以還主唐史曰馬燧之子暢以第中大杏饋竇文塲文塲以進徳宗德宗未甞見頗怪暢令中使就封杏樹暢懼進宅廢爲奉誠園管子曰五沃之土其木冝杏莊子曰孔子遊緇帷之林休坐杏壇之上弟子讀書孔子絃歌鼓琴玄晏春秋曰衛倫過予言及於味稱魏故侍中劉子楊食餅知鹽生精味之至也予曰師曠識勞薪易牙別淄澠子楊今之妙也定之何難倫因命僕取粮糗以進予甞之曰麥也有杏李㮏味三果之熟也不同予焉得兼之倫􅀏而不言退告人曰士安之識過劉氏吾將來家實多故杏時將發故揉以杏汁李時將發又揉之李汁㮏時將發又揉以㮏汁故兼三味汜勝之書曰杏始華趣耕輕土杏華落趣耕䦨又曰杏花如何可耕白沙也盧毓冀州論曰魏郡好杏地産不爲無珎神仙傳曰董奉字君異居廬山爲人治病重病得愈者令種杏五株輕病得愈者爲栽一株數年之中杏有十數萬株鬰然成林杏子熟奉於林中所在作簞食一器宣語買杏者不復湏來報但自取之一器榖便得一器杏有人少榖徃而取杏多即有三四頭虎逐之奉悉以杏所得榖賑救貧窮㝷陽記曰杏在北嶺上有樹百株今猶稱董先生杏株南岳夫人傳曰仙人有三玄紫杏西京􅄂記曰上林有文杏林有文彩蓬萊杏東海都尉于台獻一株花雜五色六出云是仙人所食者廣志曰榮陽有白杏鄴中有赤杏有㮏杏嵩髙山記曰嵩髙山東北有牛山其山多杏至五月爛然黄茂自中國䘮亂百姓飢饉皆資此爲命人人充飽而杏不盡洛陽宫殿簿曰明光殿前杏一株顯陽殿前杏六株含章殿前杏四株晉宫閣名曰暉章殿前杏一株楊衒之洛陽伽藍記曰西方于闐王不信佛法有啇胡將一比丘毗盧旃在城南杏樹下白王伏罪今輙將異國沙門來在城南杏樹下王聞忿怒即徃看毗盧旃語王言如來遣我來令王造覆盆浮圖一軀使王祚永隆王言使我見佛我當從命毗盧旃鳴鍾告佛佛即遣羅㬋羅變爲佛形從空而見真容王五體投地即於杏樹下置立寺舎焉任昉􅄒異記曰杏園洲南海中多杏海上人云仙人種杏處漢時常有人舟行遇風泊此洲五六月曰食杏故免死云洲中有冬杏王充果賦云冬實之杏春熟之甘晉郭太機果賦云杏或冬而實又曰范蠡宅在湖中有海杏大如拳又曰頼郷老子祠有縹杏司馬相如長門賦曰飾文杏以爲梁王逸荔支賦曰魏土送西山之杏王廙洛都賦曰豹柌赤杏胡道安黄甘賦曰越魏都之赤杏朱超石與兄書曰光武墳邊杏甚美今奉送其核潘岳閑居賦曰梅杏郁棣之屬華實照爛言所不能極也李爾雅曰休無實李一名趙李座接慮李今之麥李也駮赤李子赤也桃李醜核子中有核人􅀥李曰㚄之毛詩鵲巢曰何彼穠矣華如桃李平王之孫齊侯之子又淇澳木􅀲曰投我以木李報之以瓊􅅼韓詩外傳曰子質仕魏文侯獲罪而北遊謂簡主曰從今巳去不復樹徳於人矣簡主曰春樹桃李夏得䕃其下秋得食其實春樹蒺䔧夏不採其葉秋得刺焉今子所樹非其人也春秋運斗樞曰玉衡星散爲李又曰逺雅頌著倡優則李生􅀲史記曰桃李不言下自成蹊晉書曰王戎年七歳甞與諸小兒遊看道邊李樹子多折枝諸小兒競走取之唯戎不動人問之荅曰樹在道邊而子多必苦李也取之信然又曰王安豊有好李常賣恐人得種􅁪鑚其核又曰和嶠性至儉家有好李帝求之不過數十王武子因其直率將少年能食之人將斧詣園飽啖畢伐之送與嶠問何如君李齊書曰王僧孺少時有餽其父冬李先以一與之不受曰大人未見不容先甞三國典略曰齊武成寵任東平王儼而儼器服翫飾同於齊主甞於南宫見典御進新氷釣盾獻早李還而怒曰尊兄巳有我何意無唐書曰武徳中有獻李樹連理盤屈如龍又曰貞觀中玉華宫李樹連理隔澗合枝又曰神龍中陳州官舎有李樹黄落將盡忽更鮮茂而生花焉管子曰五沃之土其木冝李晏子曰景公病疽在背欲見不得公問國子國子曰􅀬如火色如日大小如未熟李公問晏子曰色如蒼玉大如璧也公曰不見君子不知野人拙也孟子匡章曰陳仲子豈不誠廉士哉居於陵三日不食耳目無聞見也井上有李螬食實者半匍匐徃食之三咽而後聞見也趙歧注曰李實虫食之過半也吕氏春秋曰子産相鄭桃李之垂於街者莫之援也抱朴子曰五原蔡誕入山而還欺其家人云到崑崙山崑崙山有玉李光明洞徹而堅湏以玉井水澆之便軟可食又曰南頓人張助者耕於白田有一李栽應在耕次助意惜之欲持歸乃掘取之未得即去以濕土封其根以置空桑中遂忘取之助後作逺職不在後其里中人見桑中忽生李謂之神有病目痛者䕃息此桑下因祝之言李君能令我目愈者謝一㹠其目偶愈便殺㹠􅀕之傳者過差便言此樹能令盲者得視逺近噏然牙來請福山海經曰邊春之山多李里人常採之漢武内傳曰李少君謂武帝溟海之􅀥大如􅀲鍾山之李大如瓶臣以食之遂生竒光又曰仙之上藥有圎丘紅李晉宫閣名曰暉章殿前李一株鄴中記曰華林園有春李冬華春熟周處風土記曰南居細李四月先熟列仙傳曰師門者嘯父弟子也食桃李葩又曰老子之母適到李樹之下而生老子生而能語指李樹曰此以爲姓真人王褒内傳曰五靈丹山上有玄雲之李食之得仙􅄞康髙士傳曰長靈安丘生病篤弟子公沙都來省之與安共於庭樹下聞李香開目見􅀟赤李著枯枝自墮掌中安食之所苦除盡􅀏林曰趙伯翁醉眠數歳孫兒縁其腹戯因以李子内其肶音毗臍中累七八枚旣醒了不覺數日後乃知痛李爛汁岀以爲臍穴懼死乃命妻子處分家事李核出㝷問乃知是孫兒所爲夢書曰李爲獄官夢見李者憂獄官西京􅄂記曰上林苑有紫李青綺李黄李青房李緑李顔淵李岀魯志合枝李五株羗李朱李車下李燕李猴李蠻李廣志曰䑕李朱李可以染又曰車下李車上李亦春熟可染也又曰麥李細小有溝道李有黄建李青皮李馬肝李赤李房林李有䭞余石切李肌黏茹似䭞有㮏李離核李李似㮏有璧李熟必先劈裂有經李一名老李其樹數年則枯有杏李味小酢似杏有黄扁李有夏李有冬李十一月熟此三李種鄴園有春李冬華春熟郭子横洞􅁳記曰琳國去長安九千里多生玉葉李色如碧五千歳一熟味酸苦韓終常食之亦名韓終李也唐新語曰安金藏䘮母廬於墓側有湧泉自出又有樹盛冬開花犬鹿相狎採訪使廬慎以聞詔旌其門閭列異傳曰􅀽夲􅀄時有神岀河東號度索君民共立廟兖州蘇氏母病徃禱見一人着白布單衣髙冠似魚頭語度索君曰昔廬山共食白李未乆巳三千年日月易得使人悵然去後度索君曰南海君也任昉述異記曰魏文帝安陽殿前天降朱李八枚啖一數日不食今李種有安陽李大而甘者即其種也又曰杜陵有金李李之大者爲之夏李尤小者呼爲䑕李又曰防陵定山有朱仲李園三十六所潘岳閑居賦云房陵朱仲之李又曰果賦云三十六之朱李又仙李縹而神李紅陸士衡果賦云中山之縹李又曰武陵原在吴中山中無他木盡生桃李俗呼爲桃李原原上有石洞洞中有乳水丗傳􅁗亂吴人於此避難者食桃李實者皆得仙吴氏本草曰李核治仆僵花令人好色東方朔占曰朔與弟子俱行朔渴命弟子叩道邊人家門不知室主姓名􅀜門呼不應朔復徃之門住湏􅁷􅀶勞飛集所呼門中李樹上朔見之語弟子曰此室人當姓李名􅀶汝呼言李􅀶􅀶自當應汝室中人果姓李名慱出門應與朔相見入取飲與朔鹽鐵論曰桃李實多者來歳爲之穣左思齊都賦曰露桃霜李王逸荔支賦曰房陵縹李王廙洛都賦曰銅馬朱櫻房陵緗李􅁃􅀇黙水井賦曰接朱李於玄泉來甘􅀲於清濤傳玄李賦曰河沂黄建房陵縹青一樹三色異味殊名張載􅀲賦曰朱李零於桂圃蒲陶潰於椒林古歌詩曰桃生露井上李樹生桃傍曹植詩曰南國有佳人容華􅀂桃李阮籍詩曰嘉樹下成蹊東園桃與李古樂府歌曰君子防未然不處嫌疑間􅀲田不納履李下不正冠魏文帝與吴質書曰浮甘􅀲於清泉沉朱李於寒水太平御覽卷第九百六十八
