front:
  text: 太平御覽卷第八十一
  hash: sha256:7b730285fa799dba6402299449ccd298b56e0cb1a460a048c17baec43c42b7c3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_081-1a}
body:
  text: 皇王部六帝舜有虞氏史記曰虞舜名重華冀州人也作什器於壽丘就時於􅀒夏舜父頑母嚚第傲皆欲殺不可得即求在側舜耕歷山歷山之人皆讓畔漁雷澤雷澤之人皆讓居陶河濵器皆不苦窳堯乃賜舜絺衣與琴爲築倉廪與牛羊舜舉八凱使主后土以揆百事舉八元使布教于四方臯陶爲大理民服其實伯夷主禮上下咸讓垂主工師百工攻功益主虞山澤開闢棄主農則百榖時茂契主司徒百姓和親龍主賔客逺人至興九韶之樂鳯皇來翔舜年五十攝行天子事年五十八而堯崩年六十一代堯踐帝位踐位三十九年南廵狩崩于蒼梧之野葬於九疑是爲零陵帝王丗紀曰舜姚姓也其先岀自顓頊顓頊生窮蟬窮蟬有子曰敬康生勾芒勾芒有子曰橋牛橋牛生􅎩瞍妻曰楃登見大虹意感而生舜於姚墟故姓姚名重華字都君龍顔大口黒色身長六尺一寸有聖徳始遷於夏於頓丘責於傳虚家本冀州每徙則百姓歸之其母早死瞽瞍更娶生象象傲而父頑母嚚咸欲殺舜舜能和諧大杖則避小杖則受年二十始以孝聞堯以二女娥皇女英妻之見舜於貳宫設饗禮迭爲賔主南面而問政命爲司徒太尉試以五典有大功二十夢眉長與髮等堯乃賜受以昭華之玉老而命舜代巳攝政明年正月上日始受終于文祖太尉行事堯崩三年䘮畢以仲冬甲子月次于畢始即眞以土代火色尚黃乃詢四岳闢四門明四目逹四聦東廵狩登南山觀河渚受圖書表賜群臣尊伯禹稷契皐繇皆益地有苗氏􅀒固不服禹請征之舜曰我德不厚行武非道也吾前教由未也乃修教三年執干戚而舞之有苗請服立誹謗之木申命九官十二牧及殳斨朱虎熊羆等二十五人三載一考績黜陟幽明於是俊乂在官群后德讓百僚師師以五采章施于五色之服以六律五聲八音恊治蒸民乃粒萬􅀖作乂庶績咸熈乃作大韶之樂簫韶九成鳯皇來儀擊石拊石百獸率舞故孔子稱韶盡美矣又盡善也景星曜於房群瑞畢臻德􅀍天下􅀄舜旣踐帝位而父瞽瞍尚存舜常戴天子車服而朝焉天下大之故曰大舜都乎咸陽或營蒲坂嬀汭嬪于虞故因號有虞氏有二妃元妃娥皇無子次妃女英生啇均次妃登北氏生二女霄明燭光有庶子八人皆不肖故以天下禪禹舜年八十一即真八十三而薦禹九十五而使禹攝政攝五年有苗氏叛南征崩于鳴條年百歳殯以瓦棺葬蒼梧九疑山之陽是爲零陵謂之紀市在今營道縣下有群象爲之耕雒書靈准聽曰有人方靣日衡重華衡有􅇧表如日也眉上曰衡重華重童子握石椎懷神珠椎讀曰錘錘平輕重也握謂如琁璣玉衡之道懷神珠喻有聖性也西王母受益地圖西王母西荒之國也在西方得此益地之圖來獻舜受終鳯皇儀黃龍感朱草生蓂莢孳尚書舜典曰愼徽五典五典克從納于百揆百揆時序賔于四門四門穆穆納于大麓烈風雷􅀨不迷帝曰咨尓舜詢事考言乃言底可績三載汝陟帝位尚書帝命驗曰虞舜聖在側陋光耀顯都握石椎懐神珠椎讀曰錘神珠喻聖性尚書中候考河命曰帝舜曰朕維不仁蓂莢浮着百獸鳯晨蓂莢浮着萌牙百獸率率鳯皇司辰也又曰􅀂稽古帝舜曰重華欽翼皇象翼奉也象歷也舜敬奉皇天之歷數七政得失也又曰舜至于下稷榮光休至稷讀曰側下之側曰西之時休美也榮光氣也黃龍􅀒卷舒圖出水壇畔赤文緑錯錯分也文而以緑色分其間尚書大傳曰舜不登而髙不行而逺又虞夏傳曰維元祀廵狩四嶽八伯堯始得義和今爲六主春夏秋冬并掌方嶽之事是爲四嶽出則爲伯後乃分置八伯壇四奥沉四海􅀕水曰沉封十有二山肇十有二州韓詩外傳曰昔舜甑盆無膻而功不以巧獲罪詩含神霧曰握登見大虹意感生帝舜大戴禮曰宰我曰請問帝舜孔子曰蟜牛之孫瞽瞍之子也曰重華好學孝友聞於四方陶家事親寛􅁉温良教而知時畏天而愛民恤逺而親親世以孝聞於天地三十在位嗣帝所五十乃死葬于蒼梧之野禮記曰舜作五絃之琴以歌南風又曰舜其大智也與德爲聖人尊爲天子冨有四海之内宗廟饗之子孫保之又曰舜其大智也與舜好問而好察邇言隱惡而􅀭善執其兩端用其中於民其斯以爲舜乎邇近也近言而善易以進人察而行之也兩端過與不及也用其中於民賢與不肖皆能行之也斯比也其德如此乃号爲舜舜之言充也又曰子曰之後丗雖有作者虞帝弗可及也矣君天下生無私死不厚其子子民如父母有􅉃怛之愛有忠利之教禮含文嘉曰舜損已以安百姓樂動聲儀曰孔子曰簫韶者舜之遺音也温潤以和似南風之至其爲音如寒暑風􅀨之動物如物之動人雷動獸含風􅀨動魚龍仁義動君子財色動小人言樂之動人也􅀷故舉見事以爲喻是以聖人務其夲春秋演孔圖曰舜目四童謂之重明承乾乾踵堯海內冨昌童童子也踵猶履也履其所行也春秋運斗樞曰舜以太尉受號即位爲天子五年二月東廵狩至于中月與三公諸侯臨觀太尉公官名也唐虞五載一廵狩中月月半也臨觀河月或爲舟以也黃龍五彩􅀒圖出置舜前圖以黃玉爲匣如櫃長三尺廣八寸厚一寸四合而連有户此含樞紐之命故龍匣黄也四合有撗道相合也有户言可開闔白玉撿黃金繩芝爲􅅺封兩端章曰天黃帝符璽五字廣袤各三寸􅀷四分鳥文文字也四或爲三舜與大司空禹臨侯望愽等三十人集發大司空公官名臨候國氏望愽名圖􅀇色而綈狀可舒卷長三十二尺廣九寸而如也三或爲五中有七十二帝地形之制天文官位度之差孝經援神契曰舜龍顔重童大口手握襃龍顔取象􅤧故有此骨表也重童取象雷多精光也大口以象斗星又爲天作喉舌握襃手中襃字喻從勞苦起受襃飾致大位者也論語曰舜有臣五人而天下治五人者禹稷契臯陶伯益又曰無爲而治者其舜也與夫何爲哉恭巳正南靣而巳矣爲猶安也言舜相堯去四凶旋四門穆穆也論語比考䜟曰堯舜等昇首山觀河渚有五老遊於河渚相謂曰河圖將來告帝期五老流星上入昴有頃赤龍􅀒玉苞舒圖出堯與大舜等共發曰帝當摳百則禪虞百年而禪與舜堯喟然歎曰咨爾舜天之歷數在爾躬孔叢子曰舜身六尺有竒靣頷無毛亦聖也朝子曰歷山農者侵畔舜徃而耕者讓河濵漁者爭坻舜徃朞年而漁者讓長東夷之陶者窳舜徃陶朞年而器以牢墨子曰堯舉舜於服澤之陽孟子曰雞鳴而起孳孳爲善者舜之徒也雞鳴而起孳孳爲利者跖之徒又曰堯之於舜使其子九男事之二女女焉百官牛羊倉廪備以養舜於畎􅅿之中而後舉之加諸上位又曰舜生於諸馮遷於􅀒夏卒於鳴條東夷之人也諸馮􅀒夏鳴條皆地名也􅀒夏在海東方夷之地故曰東夷之人也又曰舜之飯糗茹草也􅀂將終身焉及其爲天子也􅀍袗衣鼔琴二女果􅀂固有之袗衣􅀞繪者也此言舜窮居之時􅀂將終身及其爲萬乗之主􅀍服繪繡􅀂固常自所有也分定使之然也又曰舜之居􅀷山之中也與木石居與鹿豕遊其所以異於􅀷山之野人者幾希舜耕歷山之時居山之間折豕近人􅀂與人遊希逺也當此之時舜與野人相去豈逺哉及其聞一善言見一善行􅀂決江河沛然莫之能禦也又曰舜流共工于幽州放驩兠于崇山殺三苗于三危殛鯀于羽山四罪而天下咸服又曰大舜有大焉善與人同舎已從人樂取於人以爲善大舜虞舜也孔子􅁛曰巍巍故曰大舜也有大善焉能舎巳從人子路與舜同也自耕稼陶漁以至爲帝無非取於人者取諸人以爲善是與人爲善也又曰天下大恱而將歸巳視天下恱而歸巳猶草芥也唯舜爲然舜不以天下歸巳爲樂號泣于田也不得乎親不可以爲人不順乎親不可以爲子舜盡事親之道而瞽瞍底豫瞽叟底䂊而天下化瞽叟底豫而天下之爲父子者定此之謂大孝又曰堯崩三年喪畢舜避堯之子於南河之南天下諸侯朝覲者不之堯之子而之舜訟獄者不之堯之子而之舜謳歌者不謳歌堯之子而謳歌舜曰天也夫然後之中國踐天子之位也莊子曰羊肉不慕蟻蟻慕羊肉羊肉羶也舜有羶行百姓恱之故三徙成都至鄧之墟十萬家堯聞舜之賢舉之童土之地童土不生草之地曰冀得其來之澤舜來施恩澤也又曰舜讓天下於善卷善卷曰余立於宇宙之中冬日衣皮毛夏日衣􅁑絺春耕種足以勞動秋收歛足以休食日出而作日入而息逍遥於天地之間而心意自得吾何以天下爲悲夫子之不知余也遂不授於是去而入􅀷山莫知其處又曰舜以天下讓其友北人無擇北人無擇曰異哉后之爲人也居於畎􅅿之中而遊堯之間不􅀂是而巳又欲以辱行汗漫我吾羞見之自投清冷之泉尸子曰舜兼愛百姓務利天下其田也荷彼耒耜耕彼南􅅿與四海俱有其利雷澤也旱則爲耕者鑿瀆儉則爲獵者表虎故有光􅀂日月天下歸之􅀂父母又曰舜南面而治天下天下太平燭於玉燭息於永風食於膏火飲於醴泉舜之行其猶河海乎千仞之溪亦滿焉由此觀之禹湯之功不足言也又曰堯問於舜曰何事曰事天問何任曰任地問何務曰務人又曰舜一徙成邑再徙成都三徙成國其致四方之士堯聞其賢草茅之中與之語政至簡而易行與之語道廣大而不窮於是妻之以皇媵之以娥九子事之而託天下焉又曰舜云從道必􅁻反道必凶如影如響也又曰舜事親養兄爲天下法其遊也得六人曰雒陶方回續牙伯陽東不識􅁗不空皆一國之賢者也又曰昔者舜兩眸子是謂重明作事成法出言成章又曰舜舉三后而四死除何爲飢渇寒暍勤勞􅃲争又曰有虞之君天下也使天下貢善啇周之君天下也使天下貢財公孫􅀪曰舜牧羊於黄河遇堯舉爲天子陸賈新語曰舜藏黄金於嶄巖之山􅂢珠玉於五湖之淵以塞􅁋邪之欲淮南子曰舜之時共工振滔鴻水滔漫之共工炎帝之後隨髙堙下壅百川以爲民害以薄空桑空桑地名在魯龍門未開吕梁未發江淮通流四海涬溟民皆上丘陵赴樹木舜乃使禹䟽三江五湖決伊闕導􅈆澗通溝洫注之東海鴻水漏九州乾萬民皆寜其性又曰昔者舜耕于歴山歴山在濟隂成陽朞年而田者爭處磽硧以封畔肥饒相讓也釣於河濵朞年而漁者争處湍瀬湍疾瀬淺以曲隈􅀷澗相與也又曰舜作室築墻茨屋辟地樹􅂖令民皆蒼梧又曰舜不降席而天下治周生列子曰舜甞駕五龍以騰唐衢武嘗服九駮以馳文塗此上御也徐氏中論曰小人恥其靣不如子都君子恥其行不如舜禹杜夷幽求曰以舜禹之登庸視孔氏之窮屈不以跛鱉之與晨􅂹乎符子曰舜禪夏禹於洞庭之野吕氏春秋曰舜有子九人不予其子而授禹至公也風土記曰舜東夷之人生於桃丘嬀水之汭損石之東舊􅀃言舜上虞人也虞即㑹稽縣距餘姚七十里如寕上虞
