front:
  text: 太平御覽卷第九十皇王部十五
  hash: sha256:09847e285eeaf794dec15728356ddc996f7905b05aa88702401c0e183ff84b5e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_090-1a}
body:
  text: 光武皇帝更始後漢世祖光武皇帝東觀漢記曰光武皇帝漢髙帝九世孫也出長沙定王發之後袁宏漢記曰孝景帝生長沙定王發發中子買爲舂陵節侯買生鬱林太守外外生鉅鹿都尉回回生南頓令欽欽生光武皇帝諱秀字文叔東觀漢記曰皇考􅀄爲濟陽有武帝行過宫常封􅐬上將生皇考以令舎下濕開宫後殿居之建平元年十二月甲子夜上生時有赤光室中盡明皇考異之使􅁲者王長曰此善事不可言是歳嘉禾生一莖九穗長大於凡禾縣界大豐熟因名上曰秀是歳鳯皇來集濟陽故宫皆􅀞鳯皇聖瑞萌兆始形於此上爲人隆凖日角大口羙􅂡眉長七尺三寸仁智明遠多權略樂施愛人在家重慎畏事懃於稼穡兄伯升好俠非􅀏上事田作比之髙祖兄伯升年九歳而南頓君卒隨其叔父在蕭入小學後之長安受尚書經師事廬江許子威大義略舉因學世事朝政每下必先聞知具爲同舎解􅀃南陽大人徃來長安爲之邸闇稽疑議甞訟逋租於大司馬嚴尤尤見而竒之宛大姓李伯玉從第軼數遣客求上上欲避之先是時伯玉同母兄公孫臣爲醫伯升請呼難伯升殺之上恐其怨故避之使來者言李氏欲相見欵誠無他意上乃見之懐刀自備入見因始侯兄弟爲上言天下擾亂飢餓下江兵盛南陽豪右雲擾因具言䜟文事上殊不意獨内念李氏冨厚父爲宗卿師語言譎詭殊非次弟甞疾毒諸家子數犯法令李氏家冨厚何爲如是不然諾其言諸李遂與南陽府􅁺史張順等連謀上􅀷念良乆天變巳成遂市兵弩絳衣赤幘時伯升在舂陵亦巳聚㑹客矣上歸舊廬望見廬南􅀂火光以爲人持火呼之光遂盛赫然屬天有頃不見異之遂從南郭歸宅乃與伯升相見􅀄伯升之起也諸家子弟皆逃自匿曰伯升殺我及聞上至絳衣大冠將軍服乃驚曰以爲獨伯升如此也中謹厚亦如之皆合㑹共勞饗新市平林兵王鳯王匡等因率春陵子弟隨之兵合七八千人上􅀐牛與俱殺進新野尉後乃得馬進圍宛城王莽遣大司徒王㝷大司空王邑將兵來征更始立以上爲太常偏將軍時無印得定武侯家丞印佩之二公兵到頴川嚴尤陳茂與合尤問城中出者言上不敢取財物但合㑹諸兵爲之計􅁽尤􅀏言曰是羙眉目者耶欲何爲乃如此􅀄莽遣二公欲盛威武以振山東至驅豹犀象竒偉猛獸以長人巨無霸爲壘尉自􅁗漢以來師出未曽有也上邀之於陽􅀜二公兵盛漢兵反走上馳入昆陽諸將惶恐各欲散歸與諸將議城中兵穀少宛城未拔力不能相救今昆陽即破一日之間諸將亦滅不同力救之反欲歸守其妻子財物耶諸將怒曰劉將軍何以敢如此上乃􅀏且去唯王常是上計㑹􅀱騎還言大兵巳來長數百里望不見其後尾前巳至城北矣諸將遽請上上到爲陳相救之勢諸將素輕上及迫急上爲畫成敗皆從所言二公兵巳五六萬到遂環昆陽城營圍之數重雲車七餘丈瞰臨城中旗幟蔽野塵熛連雲金鼓之聲數十里或爲地突或爲衝車撞城積弩射城中矢下如雨城中􅀒户而汲二公自以爲功成漏刻有流星墜營中正晝有雲氣如壞山直營而霣不及地尺而散吏士皆壓伏時漢兵在定陵郾者聞二公兵盛皆怖上歴說其意爲陳大命請爲前行諸部堅陳上將歩騎千餘前去大軍四五里二公遣歩騎數千乗合戰上奔之斬首數級諸部將喜曰劉將軍平生見小敵怯今見大敵勇甚竒恠也上復進二公兵却諸部乘之斬首數百千級連勝遂令輕足將書與城中諸將言宛下兵復到而陽墜其書二公得書讀之恐上遂選精兵三千人從城西水上奔陣二公兵於是大奔北殺司徒王㝷而昆陽城中兵亦出中外並擊㑹天大雷風暴雨下如注水潦成川滍水盛溢二公大衆遂潰亂奔赴水溺死者以數萬滍水爲之不流王邑嚴尤陳茂輕􅀐乗死人渡滍水逃去漢軍盡􅀗其珎寳輜重車甲連月不盡五月齊武公拔宛城六月上破二公於昆陽破宛後數日収伯升部將劉稷而伯升強爭之更始遂用譛愬復収伯升即日皆物故上在父城徴詣宛拜上爲破虜大將軍封武信侯更始欲北之雒陽以上爲司􅀠校尉先到雒陽整頓官府三輔官府吏東迎雒陽者見更始諸將過者巳數十輩皆冠幘衣婦人衣諸于繡䘿諸于大掖衣也如婦人之旌衣䘿音屈楊雄方言曰䄡褕其矩者自閔目西謂之䘿據此是諸于上加繡䘿如今半臂也大爲長安所􅀏知者或畏其衣犇走入邉郡見司􅀠官屬皆相指視之極望老吏或垂涕曰復見漢官威儀賢者蟻附更始以上爲大司馬遣之河北十月上持節度孟津鎮撫河北安集百姓趙王庶兄胡子立邯鄲卜者王郎爲太子移檄購求公十萬户世祖引兵攻邯鄲連戰郎兵挫折郎遣諌議大夫杜長威見公據地曰實成帝遺體子輿也公曰正使成帝復生天下不可復得也况詐子輿乎長威請降得萬户侯公曰一户不可得長威曰邯鄲雖鄙君臣并力城守尚可支一歳終不君臣相率而降但得全身也辤去而郎少傅李立反郎開城門漢兵破邯鄲誅郎入王宫収文書得吏民謗毁公言可擊者數千章公㑹諸將燒之曰令反側者自安也更始遣使者即立公爲蕭王諸將議上尊號上不許上發薊至中山諸將復請上尊號􅀄王莽時上與伯升及姉壻鄧晨穰人蔡少公燕語少公道䜟言劉秀當爲天子或曰是國師劉子駿也上戯言曰何知非僕耶坐者皆大􅀏時傳聞不見赤伏符文軍中所上未信到鄗上所與在長安同舎諸生疆華自長安奉赤伏符詣鄗與上㑹羣臣復固請乃命有司設壇于鄗南千秋亭六月巳未即皇帝位改元爲建武十月帝入雒陽幸南宫三年正月益呉漢鄧禹等封自漢草創德運正朔服色未有所定髙祖因􅁗以十月爲正以漢水徳立北畤而祠黒帝至孝文賈􅁩公孫臣以爲􅁗水徳漢當爲土德至孝武倪寛司馬遷猶從土德自上即位案圖䜟推五運漢爲火徳周蒼漢赤水生火赤代蒼故上都雒陽制郊祀於城南行夏之時犧牲尚黑明火徳之運徽熾尚赤四時隨色郊祀帝堯以配天宗髙祖以配上帝上遣㳺擊將軍鄧隆與幽州牧朱浮擊彭寵隆軍潞浮軍雍奴相去百餘里遣吏上奏言寵破在旦暮上讀檄未竟怒曰兵必敗北汝歸可知吏還未至隆軍果爲寵兵掩擊破浮軍逺至不能救以兵走幽州咸曰上神三年十月上幸舂陵祠園廟大置酒與舂陵父老故人爲樂四年五月上幸盧奴爲征彭寵故也自王莽末天下旱霜連年百穀不成元年之􅀄耕作者少民飢饉黃金一斤昜粟一石至二年秋天下野穀旅生麻菽尤盛或生􅀲菜菓實野􅁞成繭􅀍山民收其絮採獲榖果以爲蓄積至是歳野榖生者稀少而南畒亦益闢矣六年二月呉漢下朐城天下悉定唯獨公孫述隗囂未平上曰取此兩子置度外乃休諸將置酒賞賜之每幸郡國下與見吏輙問以數十百歳能吏次第下􅁺史簡練臣下之行下無所隠其情道數十歳事􅀂案文書吏民驚惶不知所以人自以見識家自以蒙恩逺臣受顔色之惠坐席之間以要其死力當此之時賊檄日以百數憂不可勝上猶以餘間講經藝發圖讖制告公孫述署曰公孫皇帝囂雖遣子入侍尚持兩心囂故吏馬授謂囂曰到朝廷凡數十見自事主未常見明主如此也材直驚人其勇非人之敵開心見誠與人語好醜無所隱諱圖講天下事極盡下恩兵事方略量敵校勝闊逹多大節與髙帝等經學􅀶覽政事文辯前世無比囂曰如卿言勝髙帝耶曰不如也髙帝大度無可無不可今上好吏事動如節度不飲酒囂大􅀏曰如卿言反復勝也七年正月詔羣臣奏事無得言聖人又舊制上書以青布囊素褁封書不中式不得上旣上詣北軍待執前後相塵連歳月乃决上躬親萬機急於下情乃令上書啓封則用不得刮璽書取具文字而已奏詣闕平旦上其有當見及􅁈結者常以日日出時騶􅀐馳出召入其餘以俟中使者出報即罷去所見如神逺近不偏幽隱上逹民莫敢不用情追念前世園陵至盛王侯外戚葬埋僣侈吏民相効浸以無限詔有誥天下令薄葬八年閏月車駕西征河西大將軍竇融與五部太守歩􅀐二萬迎上隗囂士衆震壞皆降囂走入城呉漢岑彭追守之九年正月隗囂餓岀城飡粮糗糒腹脹死十二年呉漢引兵擊公孫述入犍爲界小縣多城守未下詔書告漢直擁兵到成都據其心腹後城營自解散漢意難前獨言朝廷以爲我縛賊手足矣遣輕騎至成都燒市橋武陽以東小城營皆奔走降竟如詔書漢兵乗勝追奔述距守詔書又戒漢曰成都十萬人且堅據廣都城去之五十里待其即營攻城罷倦引去乃首尾擊之勿與爭鋒述兵不敢來轉營即之移徙輙自堅十一月衆軍至城門述自將背城而戰呉漢攻之述軍大破刺傷述扶輿入壁其夜死夷述妻子傳首於洛陽縱兵大掠舉火燔燒上聞之下詔讓呉漢副將劉禹曰城降嬰兒老母口以萬數一旦放兵縱火聞之可爲酸􅈹禹宗室子孫故甞更職何忍行此仰視天俯視地觀於放麑啜羮之義二者孰仁矣失斬將吊民之義又議漢殺述親屬太多是時名都王國有獻名馬寳劒直百金馬以駕鼓車劔以賜騎士􅁐囿池籞音禦之官廢弋獵之事不御雅性不喜聽音樂手不持珠玉衣服大絹而不重綵征伐甞乗革輿羸馬公孫述故哀帝時即以數郡備天子用述破益州乃傳送瞽師交廟樂葆車乗輿物是後乃稍備具焉述伏誅之後而事少閑官曹文書減舊過半下縣吏無百里之繇民無出門之役十九年上幸南陽汝南至南頃止令舎大置酒賜吏民復南頓田租一歳吏民叩頭言皇考居此日乆陛下識知寺舎毎來輙加厚恩但復一歳少薄願復十歳上曰天下重寳大器常恐不任日慎一日安敢自逺期十歳復増一歳二十年六月上風眗黄癉病發甚以衛尉􅀜内侯隂興爲侍中興受詔雲臺廣室二十六年正月詔曰前以用度不足吏禄薄少乃自益其俸自三公下至佐史各有差四月始營陵地於臨平亭南詔曰無爲山陵陂池裁令流水而巳迭興之後亦無丘壟使合古法今日月巳逝當豫自作臣子奉承不得有加乃令陶人作瓦器又曰臨平望平隂河水洋洋舟􅂳泛泛善矣夫周公孔子猶不得存安得松喬與之而共逰乎文帝暁終始之義景帝所謂孝子也故遭反覆霸陵獨完非成法耶上常自細書一札十行報郡縣旦聽朝至日晏夜講經聽誦坐則功臣特進在側論時政畢道古行事次􅀃在家所識郷里能吏次第比􅀋又道忠臣孝子義夫節士坐者莫不激􅀭悽愴欣然和恱羣臣爭論上前常連日皇太子甞承間言陛下有禹湯之明而失黃老養性之道今天下大安少省思慮養精神上荅曰我自樂此三十年有司奏封禪詔曰灾異連仍日月薄食百姓怨歎而欲有事於太山汙七十二代編録以羊皮雜貂裘何强顔耶三十年羣臣復奏冝封禪遂登太山勒石紀號改元爲中平二年二月戊戌帝崩于南宫前殿在位三十三年時年六十二遺詔曰朕無益百姓如孝文皇帝舊制葬務從約省刺史二千石長皆無離城郭無遣吏及因郵奏太子襲尊號爲皇帝羣臣奏謚曰光武皇帝廟曰世祖三月葬原陵東觀漢記曰上破王郎還過鄧禹營禹進食炙魚上大飡㗖時百姓以上新破大敵欣喜聚觀見上飡勞勉吏土威嚴甚厲於是皆􅀼言曰劉公真天人也柬觀漢記曰隗囂遣馬援奏詣京都上出在宣徳殿南廡下引援入與相見上曰卿遨遊二帝間見卿使人慙援曰今天下反覆而盗賊自名字者不可勝數也陛下恢廓大度同符髙祖乃知帝王自有眞也又曰帝旣有仁聖之明氣勢形體天然之姿固非人之敵翕然龍舉雲興三兩而濟天下蕩蕩人無能名焉帝王世紀曰􅀇晏先生曰左氏春狄稱夏少康之起有田一成有衆一旅􅀂漢之再命世祖不階成旅之資平􅁀反正遂建中興與夏康同羙矣􅀽山松後漢書曰前漢自成哀巳下而天地縱横巨猾􅀼命劉氏舊澤雖在而瞻烏之望殆絶世祖以眇眇之㣧起於白水之濵身屈無妄之力位與羣竪並列于時懷璽者十餘建旗者數百髙才者居之南面疾足者爲之王公茫茫九州􅀲分臠切泯泯蒼生塵消鼎沸我扇之以仁風駈之以大威霜雪􅀍而洪􅁄枯綱維振而逆鱗掃羣才畢湊人思與能數年之間廓清四海難曰中興與夫始創業者庸有異乎誠馬生之言固以寥廊大度同符髙祖又資太宗之仁兼孝宣之明一人之體其殆乎同故能享有神器據乎萬物之上矣㑹稽典録曰上在長安中與餘姚嚴遵俱共受學結好建元元年徴遵拜爲諌議大夫共上􅀫遵以足加帝上其夜客星犯帝座太史以聞上曰昨與嚴子陵卧也續漢書曰昔羿浞篡夏數十年少康生爲仍牧正能脩徳復夏厥勲大矣然尚有慮思及靡有鬲内外之助至於光武承王莽起自疋庶一民尺土靡有慿焉發迹於昆陽以數千屠百萬非膽智之主孰能堪之討賊平亂克復炎漢號稱中興者無以加之矣中國旣定柔逺以徳愛慎人命下及徭賦武功旣備抗文徳脩經術勲績弘矣薛瑩漢紀曰王莽之際天下雲亂英雄並發其跨州據郡僣制者多矣人皆兾於非望然考其聦明仁勇自無光武儔也弘寛􅀶納計慮如神是以任光竇融望風景附馬援一見覩顔識竒故能以十數年間掃除群凶清復海内豈非天之所輔賛哉古者師不内御而光武命將皆授以方略使奉圖而進其違失無不折傷意豈文史之過乎不然雖聖人其猶人病諸更始東觀漢記曰劉􅀇字聖公光武族兄也弟爲人所殺聖公結客欲報之客犯法聖公避吏於平林吏繫聖公父子張聖公詐死使人持䘮歸舂陵吏乃出子張聖公因自逃匿王莽末南方飢饉人庶群入野澤掘鳬茈而食更相侵奪新市人王匡王鳯爲平理諍訟遂推爲渠師衆數百人諸亡命往從之數月間至十八千人號新市兵平林人陳牧廖湛復聚衆千餘人號平林兵聖公入平林中與伯升㑹遂共圍宛聖公號更始將軍自破甄阜等衆庶來降十餘萬諸將立劉氏南陽英雄皆歸望於伯升然漢兵以新市平林爲本其將帥素習聖公因欲立之而朱鮪立壇城南淯音育火上諸伯升吕植通禮經爲謁者將立聖公爲天子儀以示諸將馬武王匡以爲王莽未滅不如且稱王張印拔劒擊地曰稱天公尚可稱天子何謂不可於是諸將軍起與聖公至於壇所奉通天冠進聖公於是聖公乃拜冠南面而立改元爲更始元年上爲太常偏將軍上破二公於昆陽城而更始収劉稷及伯升即日皆物故上馳詣宛謝罪更始大慙長安中兵攻王莽斬首収璽綬詣宛更始入便坐黄堂上視之曰莽不如此當與霍光等更始韓夫人曰莽不如此帝郍爲得之更始北都洛陽李松等自長安傳輿服御物及中黃門從官至洛陽􅀜中咸相望天子更始遂西居東宫鍾鼔帷帳宫人數千官府里閭安堵如舊更始上前殿郎吏以次侍更始頋刮席與小常侍語郎吏恠之更始委政於趙萌曰在後庭與婦人躭飲諸將軍言事更始醉不能見韓夫人尤嗜酒每侍飲見常侍奏事輙怒曰帝方對我飲正用此時持事來乎起音棒書案破之所置牧守交錯州郡不知所從趙萌以􅀻事捽中骨反侍中侍中曰陛下救我更始言大司馬縱之萌曰臣不受詔遂斬之又所署官爵皆羣小􅀍服不似或繍靣衣錦袴諸服䄡䄖爲百姓之所賤長安中爲之歌曰竈下養中郎將爛羊胃􅀐都尉爛羊頭􅀜内侯其冬赤眉十餘萬人入關引兵入上林更始􅀐出厨城門諸婦女皆從後車呼更始當下拜城更始下馬拜謝城乃去至髙陵上聞更始失城乃下詔封更始爲淮陽王而赤眉劉盆子亦下詔以聖公爲長沙王更始仍許赤眉求降上璽綬乃封爲畏威侯赤眉謝禄曰三輔兵多更始一旦失之遂害更始詔鄧禹牧葬於霸陵
