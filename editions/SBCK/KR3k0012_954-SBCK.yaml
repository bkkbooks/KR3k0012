front:
  text: 太平御覽卷第九百五十四木部三
  hash: sha256:aad8bcac941ad64c3dd4ea8056b4f3ae2036682e070005aacf25a3f3b3984981
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_954-1a}
body:
  text: 栢槐栢書曰荆州厥貢杶幹栝柏詩曰邶柏舟言仁人而不遇也衛頃公之時仁人不遇小人在側汎彼栢舟亦汎其流栢木所以冝爲舟也又曰鄘栢舟共姜自誓也衛世子共伯早死其妻守義父母欲奪而嫁之誓而不許故作是詩也汎彼栢舟在彼中河又曰徂來之松新甫之栢新甫山名周禮曰兾州其利松栢禮記曰禮之於人也如松栢之有心也巳具松部五經通義曰諸侯􅃁樹栢爾雅曰栢掬也漢書曰武帝造栢梁殿與羣臣宴其下又云作栢梁臺也漢書曰朱愽爲御史大夫府中列栢有野烏數千捿其上顔氏家訓曰朝夕鳥也文土徃徃誤作烏鳶用之漢書曰昭帝時長安諸陵栢樹枯倒者悉起生葉蟲食作字公孫病巳立後昭帝崩昌邑王即位二十七日􅀍廢迎立宣帝名巳後叚爲詞東觀漢記曰李詢遭父母䘮六年躬自􅀒土樹栢常住冢下謝承後漢書曰陳留虞延爲郡督郵光武巡狩至外黄問延園陵栢樹株數延悉曉之由是見知也王隱晉書曰王褒字偉元痛父不以命終絶丗不仕立屋墓側旦夕常至墓前朝拜輙悲號断絶墓前一栢樹褒棠所攀援涕泣所着樹色與凢樹不侔蕭方等三十六國春秋曰王敦令郭璞筮卦曰明公起事禍必不乆敦怒曰卿壽幾何曰命盡曰中引出斬之璞曰當何之乎曰南山之首曰我知之矣必在􅀟栢之間乎時有鵲巢而甚茂宋書曰魯郡孔子舊廟有栢樹二十株經歷漢晉其大連抱士人崇敬之莫犯也江夏王義恭悉遣人取之父老皆歎息齊書曰王儉字仲寳司徒􅀽粲見之歎曰宰相之門也栝栢豫章雖小巳有棟梁之器又曰江夏王鋒以明帝失權常忽忽不樂著脩栢賦以見其志曰旣殊羣而抗立亦含貞而挺主豈春日之自芳亦霜下而爲盛衝風不能摧其枝積雪不能改其性雖坎􅇄於當年庻後彫之可詠時鼎業潜移鋒獨􅁣然有興復之意又曰王晏之爲貟外郎也父普曜齋前栢樹忽成梧桐論者以爲梧桐雖有棲鳯之羙而失後彫之節梁書曰侯景旣䧟臺城都下王侯庻姓廟樹咸見殘毀唯文宣太后廟四周栢樹獨鬰茂及景篡南郊都官尚書吕季略􅀃景令伐此樹以立三橋斫南面十餘株再宿悉枿生便長數尺時旣冬月翠茂如春賊乃大驚惡之使悉斫殺識者以爲昔僵柳起於上林乃表漢宣之應廟樹重青必彰陜西之瑞北齊書曰魏蘭根丁母憂居䘮有孝稱將葬常山郡境先有董卓祠祠有栢樹蘭根以卓凶逆無道不應立祠至令乃伐栢以爲椁材人或勸之不伐蘭根盡取之了無疑懼又曰樊衛性至孝䘮父􅀒土成墳植栢方數十􅅿朝夕號慕又曰文宣王曽晉陽夜􅀫松門嶺有數株松皆巳千年枝葉踈茂似有神物所託文宣時巳􅀍酒向嶺瞋罵射中一株未幾枯死後周書曰武帝伐齊永昌公椿屯雞栖原齊王憲密謂椿曰兵者詭道去留不定見機而作不得遵常汝今爲營不湏張幕可伐栢爲菴示有形􅀔令兵去之後賊猶致疑也齊主分軍萬人向千里俓㑹􅀍勑追還率兵夜返齊人果謂栢菴爲帳幕不疑軍退翌日始悟隋書曰蔡景王整文帝弟也周明帝時以武元軍功賜爵從武帝乎齊力戰而死文帝􅀄居武元之憂率諸弟􅀒土爲墳人植一栢四根鬰茂西北一根整栽者獨黃後因大風雨并根失之果不終吉唐書曰長壽二年冬十月萬象神宫側有檉松樹皆變爲栢又曰狄仁傑􅀘大理丞時將軍權善才坐斫昭陵柏樹仁傑奏其罪免職髙宗怒令誅之仁傑進曰古人假使盗長陵一杯土陛下何以加之今陛下以昭陵一株栢殺一將軍千載之後謂陛下爲苛主臣不可奉制帝意稍解孫卿子曰栢經冬而不凋􅂪霜而不變可謂得其眞矣國語曰髙山峻原不生草木松柏之地其草不肥山海經曰三株樹生赤水上其爲樹如栢葉實皆爲珠又曰白於之山其上多松栢穆天子傳曰甲申天子􅂛于大北之隥此太行山而降休于兩栢之下有兩樹也東方朔傳曰孝武皇帝時閑居無事燕坐未央前殿天新􅀨止朔執㦸在殿階獨語上呼問之荅曰殿後栢樹上有鵲立枯枝上向東鳴上遣視如朔言上問何以知之朔曰以人事言之風從東方來鵲尾長傍風則蹶必當順風而立是以知東向鳴也何以知立枯枝上朔曰新􅀨上生枝滑枯枝澁是以知立枯枝上大􅀏風俗通曰墓上樹栢路頭石虎周禮方相氏入墟􅇌魍像魍像好食亡者肝腦人家不能常令方相立於墓側以禁禦之而魍像畏虎與栢列士傳曰延陵季子解寳劒帶徐君墓栢樹洞􅁳記曰磅山之北有穴穴上有栢昔李少翁於閬隂移來此穴種此栢巳見扶桑三枯海水涸竭帝覺遣人徃穴掘不見其棺唯見赤鷰飛飜入雲移栢植於通靈臺水經曰陘山有鄭􅀕仲冢􅀕仲廟舊有一枯柏樹其塵根故株之上多生稚栢列秀青青望之可喜從征記曰泰山廟中栢皆三十餘圍俠兩階赤眉常斫一樹見血而止今斧創猶在地理志曰華山生文栢范子計然曰栢枝脂出輔上􅂛價七十中三十下十漢官儀曰正旦飲栢葉酒上壽漢武故事曰栢梁臺髙二十丈悉以栢香聞數十里列仙傳曰赤湏子好食栢實齒落更生仙經曰服栢子人長年三輔黄圖曰漢文帝覇陵不起山陵稠種栢樹三輔舊事曰漢諸陵皆屬太常又有盗栢者弃市太山記曰山南有太山廟種栢樹千株大者十五六圍長老傳云漢武所植三齊記曰堯山祠旁有栢樹枯而復生不知幾世陳留􅂄舊傳曰李充䘮父父􅃁側有夜盗斫栢樹者充手刃之述征記曰栢谷谷名也漢武帝微行所至處長慠賔於栢谷者也谷中無廽車地狹以髙原林栢䕃藹窮曰殆弗覩陽景也晉官闕名曰華林園栢二株崔寔四民月令曰七月収栢實列異記曰陳倉人有得異物者其形不􅀋猪亦不似羊衆莫能名二童子曰此爲媪常在地下食死人腦􅀂欲殺之使栢葉挿其頭幽明録曰王丞相見郭景純請爲一卦卦成郭意甚惡云有震厄公能命駕西出數里得一栢樹截如公長置常寢處災可消也王從之數曰果震栢木粉碎任昉述異記曰盧氏縣有盧君古塚塚傍古栢二枝條䕃二百餘歩樹文隱起皆􅀛甲堅如鐵石嵇康飬生論曰麝食栢而香楚詞曰山中人􅀆芳杜􅀂飲食石泉兮飯松栢古歌曰平陵東松栢桐不知何人却義公劉越石扶風歌曰南山石嵬嵬松柏何摧摧上枝拂青雲中心十數圍洛陽發中梁松栢􅀼自悲誰能刻鏤此公輸與魯班􅀍之用丹􅃮薫用􅂫合香夲自南山栢今爲宫殿梁槐周禮曰朝士掌三槐三公位焉鄭玄曰槐之言懷言來人也又曰司烜氏掌冬取槐檀之火左傳曰趙宣子驟諌公患之使鉏麑賊之晨徃􅃦門闢矣盛服將朝尚早坐而假寐不解衣冠而睡麑退歎曰不忘恭敬民之主也賊民之主不忠弃君之命不信有一於此不如死也觸槐而卒春秋元命苞曰樹槐聽訟其下槐之言帰也情見帰實也春秋􅀃曰槐木者靈星之精爾雅曰懷槐大葉而黒槐樹葉大色黒者名爲槐守官槐葉晝聶霄忼郭璞曰守宫槐晝日聶合而夜布晉儒林􅀕酒杜行齊􅀃在明陵縣南有一樹似槐葉晝聚合相着夜則舒布即守宮折江東樹與此相反俗因合昏曉晝夜異其理等霄炕音忼聶合也炕張也合晝夜開也五經通義曰士冢樹槐國語曰董叔將娶於范氏叔向曰盍巳乎曰欲爲繫援焉他日董祁愬之范獻子曰不吾敬也獻子執而紡之於庭槐叔向過之曰子盍爲我請乎叔向曰欲而得之又何請焉紡懸也漢書曰昭帝建始四年山陽社中大槐樹吏人伐断之其夜復自立如故晉書曰符堅僣號自長安至于諸州夾路皆種槐柳百姓歌曰長安大街夾路楊槐下走朱輪上有棲鸞又曰大司馬府有老槐樹殷仲文對而歎曰此樹婆娑生意盡矣崔鴻前凉録曰􅀄河右不生楸槐栢􅃮張駿之丗取於㤗隴而植之終於皆死而酒泉宫之北隅有槐樹生焉李玄盛著槐樹賦沈約宋書曰孔子夜夢三槐之間豐沛之􅀖有赤氣驅車對楚西北街之見芻兒敵麟傷其左足薪而覆之梁書曰􅁃肩吾常服槐實年七十餘目看細字􅁂皆黒離亂之際奔于江陵後周書曰韋孝寛之爲雍州刺史先是路側一里置一土堠經􅀨頺毀毎湏修之自孝寛臨州乃勒部内當堠處植槐樹代之即免修復行旅又得芘䕃文帝後見恠問知之曰豈得一州獨爾當令天下同之於是令諸州道路一里種樹一株十里種三樹百里五樹焉隋書曰髙頴字昭玄領新都大監毎坐槐樹下以聽事多不依行列有司伐之特令存之勿去示於後人又曰士囬以孝聞開皇􅀄卒子士雄少質直孝友䘮父復廬於側􅀒􅁟成墳其庭前有一槐樹先甚欎茂及士雄居䘮樹遂枯死服闕還宅死槐復榮髙祖聞之歎其父子至孝下詔褒􅀭號其所居爲累德里唐書曰永崇二年太平公主降駙馬薛紹以萬年縣爲禮㑹之所公主輅車自興安門南至宣陽坊之西街夜設燎炬烈熖相屬夾路槐樹多有死者又曰正元中度支欲取兩京道中槐樹爲薪更栽小樹先下符牒渭南縣縣尉張造牒曰召伯所憩尚勿剪除先皇舊遊豈冝斬伐乃止又曰長慶中􅉑州刺史蕭祐奏湖城縣永方郷百姓閻酆五代同居家内槐一夲再生枝葉管子曰五沃之􅁟其木冝槐晏子春秋曰齊景公有所愛槐使守令犯槐者刑傷槐者死有醉而傷槐且加刑焉其女懼而告晏子曰妾恐鄰國聞之謂君愛槐而殘人可乎晏子入言之公出傷槐之囚罷其禁淮南子曰槐之生也入季春五日而兎目十日而䑕耳更旬而始規二旬葉成規葉始開也又曰九月官􅃸其樹槐是月繕修守備故官候樹槐槐懷也取懷近逺也又曰老槐生火又曰槐市學也樹以青槐燧人秋取槐檀之火天之所覆地之所載六合所包隂陽所照雨露所扶此皆生於父母所闕於一和也父天母地故槐榆與橘柚合而兄弟有廣與三危通爲一家抱朴子曰槐子新瓷合泥封之二十餘日其表皮皆爛乃洗之如大豆日服之此物至􅀘腦早服之令人髪不白而長生太公金匱曰武王問太公曰天下神來甚衆恐有識者何以待之太公曰請樹槐於王門内有益者入無益者距之三輔黄圖曰元始四年起明堂辟雍爲愽士舎三十區爲㑹市但列槐樹數百行諸生朔望㑹此市各持其郡所出物及經書相與賣買雍雍揖讓論議槐下􅋲􅋲誾誾如也事具禮部學校篇焦贛易林家人之乾曰千歳槐身多斧斤汝南先賢傳曰新蔡鄭敬字子都爲郡功曹都尉髙懿㕔事前有槐樹有露􅀋甘露者懿問􅁺屬皆言是甘露敬獨曰明府政未能致甘露但樹汁耳懿不恱託疾而去楊衒之洛陽伽藍記曰李昌年廣陵王元淵􅀄除儀同三司緫衆北討葛榮夜夢着衮衣􅀝槐樹立以爲吉徴問於楊元慎元慎曰三公之祥淵甚恱之元愼退還告人曰廣陵死矣槐字木傍􅀑死後當得三公廣陵果爲􅁑榮所殺追贈司徒公終如其言太平御覽卷第九百五十四
