front:
  text: 太平御覽卷第三百六十四
  hash: sha256:10b9d341db5ea815ed6ef625f58d344e88244e9d827ec6393c693b89d9a4323d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_364-1a}
body:
  text: 人事部五頭下頂額頭下呉志曰孫權太子和􅀍幽閉驃􅀐將軍朱據尚書僕射屈晃率諸將吏泥頭自縛連日詣闕請和又曰諸􅁑恪􅀍誅臨淮臧均表乞收葬恪曰臣聞雷震􅁬激不崇一朝大風衝發希有極日今恪父子三首懸示積日觀者數萬詈聲成風國之大刑無所不震又曰􅀜羽旣敗走權使虞翻筮之得兊下坎上節五爻變而之臨翻曰不出二日必當斷頭果如翻言權曰卿不及伏羲可與東方朔爲比矣晉書曰嵇康謂趙至曰君頭小而銳有白起風童子白黒分明又曰桓温卒子􅀇爲嗣襲爵年七歳温服終府州文武辭其叔父沖沖撫􅀇頭曰此汝家故吏也􅀇因涕淚􅀍面衆並異之王隱晉書曰蒼梧太守呉臣據郡邑不恭王命孫權遣歩騭爲交州喻臣臣照鏡不見其頭騭因入斬之又曰王珣與謝玄俱􅀍辟桓温曰謝􅁺必擁麾杖節王􅁺當作黒頭公未易才也􅀳中興書曰􅁃亮與􅂫峻戰於建陽門王師敗績亮於陣携其三弟懌條翼南奔温嶠顯宗幸嶠舡亮泥首謝罪崔鴻前􅁗録曰東海王符雄字元才洪之季子以功拜龍驤將軍征伐皆有殊績雄醜形貌頭大足短故軍中稱之爲大頭龍驤􅁗記曰符堅祖洪見堅􅃺貌欲令頭堅腹軟字之曰堅頭隋書曰髙祖文皇帝生馮翊波􅀂寺皇妣抱帝忽見頭上出角遍體起鱗大駭墜帝於地春秋後語平原君曰澠池之㑹臣察武安君之爲人小頭而銳瞳子白黒分明視瞻不轉小頭而銳斷敢行也瞳子白黒見事明也視瞻不轉執志強也可以持乆難與争鋒廉頗足以當之呉越春秋曰眉閒尺逃楚入山道逢一客客問曰子眉間尺乎荅曰是也吾能爲子報讎尺曰父無分寸之罪枉􅀍荼毒君今惠念何所用耶客曰湏子之頭并子之劒尺乃與頭客與王王大賞之即以鑊煑其頭七日七夜不爛客曰此頭不爛者王親臨之王即㸔之客於後以劒斬王頭入鑊中二頭相齧客恐尺不勝自以劒擬頭入鑊中三頭相咬七日後一時俱爛乃分葬汝南冝春縣并三冢山海經曰三首國一身三首羽民國爲人長頭又曰共工之臣曰相仰氏共工霸九州者也九首以食于九山晏子春秋曰景公遊於梧丘夜夢五大夫稱􅁈公問晏子晏子曰昔靈公田有大夫駭獸斷其頭埋之命曰五大夫丘公令掘之果如其言又曰湯長頭而寡髮莊子曰雲將東過扶揺之枝雲將雲之主師也扶摇木名生海東而適遭鴻蒙鴻蒙自然元氣雲將曰天氣不和地氣􅊊結六氣不調四時不節今我願合六氣之精以育羣生爲之奈何鴻蒙拊髀爵躍掉頭曰吾弗知吾弗知又曰亡羊而得牛斷指而得頭燕丹子曰荆軻謂樊於其曰今得將軍之首與燕地圖􅁗王必喜而見軻軻將左手把其䄂右手椹其􅇩則將軍積忿除矣於是起扼腕執刀曰是日夜所欲而今聞命於是自刎頭墮背後兩目不瞑以凾盛於其首與軻入􅁗吕氏春秋曰今有人於此斷頭以易冠殺身以易衣丗必惑也是何也冠所以飾頭衣所以飾身今殺所飾而要所以飾則不知所爲矣丗之趨利似此亦不知所爲也帝系譜曰神農牛首伏羲人頭蛇身黄帝素問曰頭者精明之主也董卓別傳曰卓知所爲不得逺近意欲以力服之遣兵於雒陽城時遇二月社民在社下飲食悉就斷頭駕其車馬載其婦女財物以斷頭繫車轅軸還雒云攻敗大獲稱萬歳入􅀜雒陽城門焚燒其頭神仙傳曰曹公捕左慈數日得之便斷頭以白曹公公大喜曰果慈頭定視是一束茅耳搜神記曰南方有落頭民呉時將軍朱桓得一婢每夜卧後頭輙飛去或從狗竇或從天䆫中出入以耳爲翼將曉復還數數如此旁人恠之夜照視唯有身無頭其體微冷氣息裁屬乃蒙之以􅀍至時頭還礙􅀍不得安再三墮地噫咤甚愁而體氣急疾􅀂將死者乃去􅀍頭復起􅀓頸得安復如常人時南征大將亦徃徃得之又甞有覆以銅盤者頭不得進遂死􅀶物志同又曰渤海太守史良好一女子許而不果良斷其頭而歸投於竈下曰當令火葬頭語曰使君我相從何圖當耳異苑曰管寧避難遼東還汎海遭風舡垂傾没寧思􅄽曰吾甞一朝科頭三晨晏起今天怒猥集過恐在此又曰晉惠帝元康三年武軍火燒夫子履漢斬白蛇劒􅃮王莽頭等録異傳曰漢武帝時蒼梧賈雍爲豫章太守有神術出界討賊爲賊所殺失頭雍上馬還營營中咸走來視雍雍􅇩中語曰戰不利爲賊所傷諸君視有頭爲佳無頭佳乎吏泣曰有頭佳雍曰不然無頭亦佳言畢遂死幽明録曰河東賈弼小名翳兒具諳究丗譜義熈中爲琅邪府叅軍夜夢有一人面齄甚多大鼻瞷目請之曰愛君之貌欲易頭可乎乃於夢中許易明朝起自不覺而人悉驚走琅邪王大驚遣傳教呼視弼到琅邪遥見起還内弼取鏡自㸔方知恠異因還家家悉驚入内婦女走藏弼坐自陳􅀃良乆并遣人至府檢問方信後能半面啼半面􅀏兩手各捉一筆俱書辭意皆美此爲異也餘並如先列女傳曰京師節女長安大昌里人夫有仇仇家執父使要其子爲中間女念不聽則殺父殺父不孝聽則殺夫殺夫不義乃許之曰夜在樓上新沐頭東首卧者是還譎其夫使卧他處自沐卧樓上仇家斷其頭而去仇悲義之遂不殺其父益部耆舊傳曰叚翳字元章善天文風角有一諸生來學積年諸生略究要術辭歸郷里翳爲作一脂筒中盛簡書曰有變乃發視之生至葭萌與吏争津吏檛從人頭破開筒得書言到葭萌與吏􅃲破頭者以此脂裹之生喟然而歎乃還卒其業􅀶物志曰人以冷水漬至􅂰啖􅀲數十漬至頭可啖百餘水皆作􅀲氣括地圖曰白民白首身􅀍髮三巴記曰巴有將軍曼子請於楚以平巴亂楚使請城曼子曰城不可得乃自刎其頭與楚楚義之以上卿禮葬其頭巴以上卿禮葬其身長沙􅂄舊傳曰劉壽少時遇相師曰君腦有玉枕必至公也後至太尉李郃別􅀓曰公耳有竒表腦枕如鼎形易洞林曰郭璞爲左尉周恭卜云君墮馬傷頭尉後乗馬行黄昏坂下有犢車觸馬馬驚頭打石上流血殆死語林曰魏郡太守陳異甞詣郡民尹方方􅀍頭以水洗盤抱小兒出更無餘言異曰􅀍頭者欲吾治民如理髪洗盤者欲使吾清如水抱小兒者欲使吾愛民如赤子也丗􅀃曰祖廣字淵度行怕縮頭詣桓南郡下車桓曰天甚明􅀰祖叅軍如從屋漏中來又曰諸􅁑道明􅀄過江左名亞王􅁃之下先爲臨沂令丞相謂曰明府當爲黒頭公楚辭曰魂兮來歸君無上天些一夫九首抜木九千些頂􅀃文曰頂巓也易大過卦曰過渉滅頂凶無咎韋曜毛詩問曰早􅀑眼在頂上列女􅀓曰齊鍾離春齊無鹽邑之女鍾離性春名也其爲人極醜無􅀟臼頭深目頂上少髮折腰出􅇩莊子曰支離䟽頥隱於臍肩髙於頂應璩新詩曰醉酒巾幘落頂秃赤如狐額釋名曰額鄂也有垠鄂也故幽州人謂之鄂易􅀃卦曰巽爲廣顙上大下小故爲廣顙河圖曰黄帝廣顙龍額又曰天之東西南北極各有銅頭鐵額兵長三千萬丈三千億萬人毛詩􅅠栢舟君子偕老曰子之清􅀭􅀭且之顔也清視明也􅀭廣揚而顔豊滿也展如之人兮􅀖之媛也詩含神霧曰代漢者龍顔珠額春秋元命苞曰在天爲文昌在人爲顔顙太一之謂也顔之言氣畔也陽立於五故顔博五寸論語􅎥輔象曰樊遟山額有􅀂月衡反宇䧟額是謂和喜方言曰䭭音稽額也顔顙也江湘謂之頭中夏謂之額東齊謂之顙河濟淮泗之間謂之顔漢書曰成帝幸宫人嚴宫生男帝爲趙昭儀召殺之宫曰果欲姊弟擅天下我兒男也額上有壯髪􅀋孝元帝令兒安在危殺之矣奈何令長信得聞之東觀漢記曰和熹皇后年五歳夫人爲鬋髪夫人年老目瞑并中后額雖痛忍不言又曰銚期從擊王郎將兒宏劉奉於鉅鹿下期先登䧟陣手殺五十餘人瘡中額攝情復戰遂大破之又曰馬廖上䟽曰夫改政移風必有其本長安語曰城中好廣眉四方過半額魏志曰龐意親與􅀜羽交戰射羽中額王隱􅀳書曰元帝白毫生額上有光明崔鴻後趙録曰石勒征見無劉曜守軍大恱舉手指天又指額曰天也北齊書曰文宣帝洋爲王時夢人以筆􅀧記額明日告舎人王雲哲曰吾其誅乎雲哲賀曰王上加􅀧爲主乎後果然隋書曰劉孝焯字士龍信都人犀額􅀛背望髙視逺聦敏深沉弱不好弄又曰􅌆帝令陳稜討杜伏威伏威自出陣前挑戰稜部將射中其額伏威怒指之曰不殺汝我終不拔箭遂馳之􅀗所射者使其拔箭然後斬之鹽鐵論曰古者君子思徳小人思利今人堅額徤舌或以致業抱朴子曰老君額有三理上下徹語林曰賈充問孫皓何以好剥人面皮皓曰憎其顔之厚呉都賦曰雕題之士注曰鏤額也嶺南並鏤額額題也相書占氣􅄂要曰黄氣如帶當額横卿之相也有卒喜皆發於色額上面中年上是其􅃸也黄色最佳又曰額臨者男早得官女子早成太平御覽卷第三百六十四
