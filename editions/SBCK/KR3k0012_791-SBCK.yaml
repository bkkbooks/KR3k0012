body:
  text: 南蠻七西南夷夜郎滇卭莋嶲冉駹白馬白狼夷禪國牂牁濮尾濮木綿濮文面濮析􅆎濮赤口濮黒􅈎濮朱提昆弥靣㸑東女國西南夷梁祚魏國統曰西夷土有異犀三角夜行如大炬火照數十歩或時解脫則藏於􅀷宻之處不欲令人見之王者貴其異以爲􅆪札消除㓙逆又曰西南夷有大湖名曰禁水水中有毒氣中有物嘖嘖作聲射中木石則破裂中人則死其俗名曰􅀑彈聞聲巳至不可得見故也郭義恭廣志曰建寧郡其氣平冬不極寒夏不極暑盛夏如此五月盛冬如此九月天下之異地海内唯有此按月令記五氣中之位冝在西南如此豈當土行之方戊巳之域乎夜郎漢書曰南夷君長以十數夜郎最大漢武帝建元六年太行王恢擊東粤因兵威使番陽令唐􅂪風曉南粤南粤食􅂪蜀枸醬枸音矩􅂪問所從來曰道西北牂牁江江廣數里出番禺城下􅂪歸至長安問蜀賈人獨蜀出枸醬多持竊出市夜郎夜郎者臨牂柯江江廣百餘歩足以行舩南粤以財物役属夜郎西至桐師然亦不能臣使也􅂪廼上書曰竊聞夜郎所有精兵可得十萬浮舩牂柯出不意此制粤一竒也誠以漢之強巴蜀之饒通夜郎道爲置吏甚易上許之乃拜􅂪中郎將將千人從巴莋􅀜入遂見夜郎侯多同多同其侯名厚賜諭以威德約爲置吏使其子爲令夜郎旁小邑皆貪漢繒帛以爲漢道險終不能有也乃且聽􅂪約還報乃以爲犍爲郡發巴蜀卒治道自􅈎道指牂柯江蜀人司馬相如亦言西夷卭莋可置郡使相如以中郎將徃諭皆如南夷爲置一都尉十餘縣屬蜀後數歳道不通士罷餓餧離暑濕死者甚衆西南夷又數反發兵興擊耗費亡功上患之使公孫弘徃視問焉還報言其不便上許之罷西夷獨置南夷兩縣一都尉稍令犍爲自保就令自保守且脩成其郡縣也夜郎侯始􅀝南粤南粤反巳滅還誅反者夜郎遂入朝上以爲夜郎王又曰昭帝始元中牂柯談指同並等二十四邑凢三萬餘人皆反並音伴談指同並後皆爲縣属漢牂柯郡遣水衡郡都尉發蜀郡犍爲兵擊破之後姑繒葉榆人復反鈎町侯亡波率其人擊之有功漢立亡波爲釣町王至成帝河平中夜郎王興與鈎町王禹漏卧侯俞漏卧侯邑名後爲縣属牂柯更舉兵相攻牂柯大守請發兵誅興等議者以道逺不可擊遣太中大夫張匡持節和解並不從杜欽􅀃王鳯曰張匡和解蠻夷王侯王侯不從不憚國威其効可見恐議者選耎復守和解選耎怯不前之意也選音息兖反耎音人兖反太守察動静有變迺以聞如此則復曠一時曠空也一時三月言空廢一時不早發兵也王侯得収獵其衆申固其謀黨助衆多各不勝忿必相殄滅自知罪成狂勃守尉言起狂勃心而殺守尉逺藏温暑毒草之地雖有孫吴將賁育士􅀂入水火徃必焦没智勇俱亡所設施屯田守之費不可勝量冝因其罪惡未成疑漢加誅隂勑旁郡守尉練士馬大司農先調穀積要害處調發也要害者在我爲要於敵爲害也調音徒釣切選任職太守徃以秋凉時入誅其王侯尤不軌者即以爲不毛之地亡用之人聖王不以勞中國即猶草也不毛言不生草木也冝罷郡放弃其民絶其王侯勿復通如以先帝所立累代之功不可隳壞亦冝因其萌芽早断絶之及巳成形後師興則萬姓􅀍害矣鳯於是薦陳立爲牂柯太守立至牂柯迺從吏數十人出行無何召興將數千人出徃立數責因断興頭出曉其衆皆釋兵降釋解也興子耶務収餘兵迫脅旁二十邑反立又擊平之後漢曰夜郎者􅀄有女子浣於遯水有三節大竹流入足間聞其中有號聲剖竹視之得一男子歸而養之及長有才武自立爲夜郎侯以竹爲姓武帝平南夷夜郎侯迎降天子賜其王印綬後遂殺之夷獠咸以竹王非血氣所生甚重之求爲立後牂柯太守吴霸以聞天子乃封其三子爲侯死配食其父今夜郎縣有竹王神是也滇漢書曰南夷君長其西靡莫之屬以十數滇地最大皆椎髻耕田有邑聚楚威王時使將軍莊蹻將兵循江上巴黔中以西莊蹻至滇池地方三百里旁平地肥饒數千里以兵威定屬楚欲歸報㑹秦擊奪楚巴黔中郡道塞不通因迺以其衆王滇變服從其俗以長之秦時嘗破略通五尺道漢元狩中天子乃令王然于柏始昌吕越人等十餘軰間岀西南夷指求身毒國至滇滇當羗乃留爲求道師古曰當羗滇王名四歳餘皆閉昆明莫能通滇王與漢使言孰與我大及夜郎侯亦然各自以一州主不知漢廣大使者還因盛言滇大國足事親附師古曰可專事招來之令其親附也天子注意焉及南粤巳滅乃使王然于以兵威風諭滇王入朝滇王有衆數萬人其旁東北勞􅀷靡莫皆同姓相杖未肯聽杖猶􅀝也相依􅀝爲援而不聽滇王入朝也勞莫數侵犯使者吏卒元封二年天子發巴蜀兵擊滅勞􅀷靡莫以兵臨滇滇王始首善以故弗誅滇王離西夷舉國降請置吏入朝於是以爲益州郡賜滇王印復長其民西南夷君長以百數獨夜郎滇受王印滇小邑也最寵焉後漢書曰滇郡有池周回二百餘里水源􅀷而末更淺狹有似倒流故謂之滇池河土平敞多岀鸚鵡孔雀有塩池田漁之饒金銀畜産之冨人俗豪俠居官者皆冨及累代及王莽政亂益州郡夷棟蚕􅀂豆等起兵殺郡守越嶲姑復夷人大牟亦皆叛莽遣寧始將軍廉丹發巴蜀吏人卒徒十萬擊之連年不尅而還以廣漢文齊爲太守群夷始得其和及公孫述據益土齊固守拒險聞光武即位乃聞道遣使自聞蜀平徵爲鎭逺將軍封成義侯於道卒詔爲起祠堂郡人立廟祠之又曰建武十八年夷渠帥棟蚕與姑復挵㨂揲榆連然滇池建怜昆明諸種反叛遣武威將軍劉尚發卒擊之尚軍渡瀘水入益州界群夷皆弃壘奔走尚進軍連戰皆破之追至不韋孫盛蜀譜曰􅀄秦徙吕不韋子弟宗族於蜀漢武開西南夷置郡縣徙吕氏以充之因置不韋縣斬獲甚衆諸夷悉平又章帝元和中蜀郡王阜爲太守政化尤異有神馬四疋出滇池中蜀志曰後主建興二年諸葛亮率衆南征所戰皆捷孟獲者爲夷所服募生致之旣得使觀於營陣之間問曰此軍何如獲曰不知虚實故敗定易勝耳亮縱之使更戰七擒而亮猶遣獲獲止不去曰公天威也南人不復反矣遂至滇池南中皆平卭漢書曰自滇以北君長以十數卭都最大皆椎髻耕田有邑聚後漢書曰卭都夷者武帝開以爲卭都縣無幾而地䧟爲汙澤因名爲卭池南人以爲卭河其後復反叛元鼎六年漢兵自越嶲水伐平之以爲越嶲郡其郡土地平原有稻田俗多遊蕩而喜謳歌略與牂柯相􅀋豪帥放縱難得制御王莽時郡守枚根枚根太守姓名也調卭人長貴以爲軍侯更始二年長貴攻殺根自立爲卭榖王至光武因就封之授越嶲太守印綬後劉尚擊益州夷路由越嶲長貴聞之疑尚旣定南邊威法必行巳不得自放縱即聚兵招呼諸君長多釀毒酒欲先以勞軍因襲擊尚尚知其謀即分兵先據卭都遂掩長貴誅之徙其家属於成都又曰安帝時永昌益州蜀郡夷並今雲南郡也皆叛衆十餘萬破壞二十餘縣益州刺史張喬乃遣從事楊竦將兵至楪榆破之渠帥三十六種皆來降附竦因奏長吏姦猾侵犯蠻夷者九十人皆减死論又曰永平中卭都太守巴郡張翕政化清平得夷人和在郡十七年卒夷人愛慕如䘮父母􅂫祁斯人叟二百餘人齎牛羊送喪至翕本縣起墳􅀕祀詔書嘉羙爲立祠堂後夷人反亂天子以翕有遺愛乃拜其子湍爲太守夷人歡喜皆奉迎道路曰郎君儀貌􅀋我府君後湍頗失其心有欲叛者諸夷􅂄老相曉語曰當爲先府君故遂得以安南中八郡志曰卭河縱廣二十里􅀷百餘丈多大魚長一二丈頭持大遥視如載鐵釜狀李膺益州記曰卭都縣下有一老姥家貧􅀌獨毎食輙有小虵頭上戴角在床間姥憐飴之後稍長大遂長丈餘令有駿馬虵遂吸殺之令因大忿恨令姥責出虵母云在床下令即掘地愈大而無所見令遷怒殺姥虵乃感人以靈言嗔令何殺我母當爲母報讎此後毎夜輙聞􅀂風四十許日百姓相見咸驚語汝頭郍忽戴魚是夜方四十里與城一時俱䧟爲湖土人謂之爲䧟河唯姥宅無恙訖今猶存漁人採捕必依止􅀫毎有浪輙居宅側恬静無他風静水清猶見城郭樓櫓畟然畟音測今水淺時土人没水取得舊木堅貞光黒如漆好事者以爲枕相贈焉莋漢書曰自嶲以東北君長以十數莋都最大其俗或土著或移徒後漢書曰莋都夷者武帝所開以爲莋都縣其人􅀍髪左袵言語多好譬􅀋居處略與汶山夷同土岀長年神藥仙人山圖所居焉元鼎六年以爲沉􅀺郡至天漢四年并蜀爲西部置兩部尉一居旄牛主徼外夷一居青衣主漢人也嶲漢書曰桐師以東北至葉榆名爲嶲昆明編髪隨畜遷徙無常處無君長地方可數千里永昌郡傳曰越嶲郡在建寧西北千七百里治江都縣自建寜髙山相連至川中平地東西南北八千餘里郡特好桑蠶冝􅁰稷麻稻梁冉駹漢書曰自荏以東北君長以十數冉駹最大其俗或着土或移徙後漢書曰冉駹夷者武帝所開元鼎六年以爲汶山郡今蜀郡西北通化郡地也至宣帝地節三年夷人以立郡賦重帝乃省并蜀郡爲北部都尉其山有六夷七羗九氐各有部落其王侯頗知文書而法俗嚴重貴婦人黨母族死則燒其尸土氣多寒雖在盛夏氷猶未釋皆依山居止累石爲室髙者至十餘丈爲卭籠今彼土夷人呼爲雕又土地剛鹵不生穀粟麻菽唯以夌爲資而冝畜牧有旄牛無角一名犝牛肉重千斤毛可爲毦犝徒冬切毦音貳出名馬有羺羊羚音靈可療毒又有食藥鹿鹿麑有胎者其膓中糞亦療毒疾又有五角羊麝香輕毛毼鷄猩猩其人能作旄氈班􅄢青頓毞毲羊羧之屬青頓毲羧並未詳字書無二字特多雜藥地有鹹土煑以爲塩麡羊牛馬食之皆肥麡音子兮切其西又有三河槃于虜北有黄石北地盧水胡其表乃爲徼外後靈帝時復分蜀郡北部爲汶山郡白馬漢書曰蜀之西冉駹以東北君長以十數白馬最大皆氐􅀋也後漢書曰白馬氐者武帝元鼎中分開廣漢西部合以爲武都土地險阻有麻田出名馬牛羊􅃮宻氐人勇戅抵冒貪貨死利居於河池一名仇池方百頃四面斗絶數爲邊宼郡縣討之則依固自守元封三年氐人反叛遣兵破之昭帝元鳯中氐人復叛執金吾馬適建姓馬適名建等將三輔太常徙討破之建武􅀄氐人悉附隴蜀反隗囂㓕其酋豪乃背公孫述降漢馬援上復其王侯君長賜以印綬後􅅝族人隗茂反殺武都太守氐人大豪齊鍾留爲種􅀋所敬信威服諸豪與郡丞孔􅁬繫茂破斬之白狼夷後漢書曰永平中益州刺史梁國朱輔好立功名慷慨有大略在州數歳宣示漢德威懐逺夷自汶山以西前代所不至正朔所不加白狼槃木唐菆等百餘國户百三十餘萬口六百萬以上舉種奉貢稱爲臣僕輔上䟽曰臣聞詩云􅀍狙者歧有夷之行傳曰歧道雖僻而人不逺詩人誦詠以爲符驗今白狼王唐菆等慕化歸義作詩三章路經卭來山太零髙坂峭危峻險百倍歧道繦􅀒老㓜􅀂歸慈母逺夷之語辝意難正草木異種鳥獸殊􅀋有犍爲郡􅁺田恭與之習狎頗曉其言臣輙令訊其風俗譯其辝語今遣從事史李陵與恭護送詣闕并上其樂詩昔在聖帝舞四夷之樂今之所上庻備其一帝嘉之事下史官録其歌焉東觀記載其歌并載夷人之本語並重譯訓語爲華言令范史所載者是也至和帝永元十二年旄牛徼外白狼樓薄蠻夷王唐繒等遂率種人十七萬口内属樿國音檀後漢書曰和帝永元九年樿國王雍由調遣使重譯奉國珎寳和帝賜金印紫綬安帝永寧􅀄復遣使朝賀獻樂及幻人能變化吐火自支解易牛馬頭又善跳丸數乃至千自言我海西人海西即大􅁗也禪國西南通大􅁗明年元㑹安帝作樂於庭封雍由調爲漢大都尉賜印綬金銀綵繒各有差牂柯後漢書曰􅀄楚頃襄王時遣將莊豪從沆水伐夜郎軍至且蘭㭬舩於岸而歩戰旣㓕夜郎因留王滇池以且蘭有㭬舩牂柯處乃改其名爲䍧柯異物志曰牂柯擊舩戕也牂柯地多兩潦俗好巫􅀑禁忌寡畜生又無蠶桑故其郡最貧句縣有桄榔木可以爲麵百姓資之又曰公孫述時牂柯大姓龍傳尹董氏與郡功曹謝暹保境爲漢乃遣使從番禺江奉貢番禺江今南海郡光武嘉之並加褒賞桓帝時郡人尹珍自以生於荒裔不知禮義乃從汝南許慎應奉受經書學成還郷里教授自是南域始有學焉永昌郡傳曰牂柯郡在建寧東北千二百里處所險峻率皆髙山而少平地唐書曰牂柯蠻首領亦姓謝氏其地北去兖州一百五十里東至辰州二千四百里南至交州一千五百里西至昆明九百里無城壁散爲部落而居土氣􅊊熱多霖雨稲粟再熟無傜役唯征戰之時乃相屯聚刻木爲契其法劫盗者三倍還􅂍殺人者出牛馬三十頭乃得贖死以納死家風俗物産略與東謝同其首領謝龍羽大業末據其地勝兵數萬人又曰武德三年牂柯蠻首領謝龍羽遣使朝貢授龍羽牂州刺史封夜郎郡公貞觀四年復朝貢開元十年大酋長謝元齊死詔立其嫡孫嘉藝襲其官封二十五年大酋長趙君道來朝獻方物元和三年五月勑自今巳後委黔南觀察使差本道軍將充押領牂柯昆明等使四年正月遣使來朝是月遣中使魏德和領其使并賷國信物降璽書賜其王焉自後朝貢不絶臨海異物志曰桄榔木生牂柯外皮有毛似栟櫚而散生其木剛作鋤利如䥫中更利唯中焦根乃致敗耳皮中有似檮稻米片又似麦􅋗作餅餌廣志曰桄榔樹大四五圍長五六丈洪直旁無枝條其㒹生葉不過數十似授葉破其木肌堅難傷入數寸得􅋗赤黃宻緻可食濮周書㑹曰卜人丹沙云西南之蠻丹沙所出按卜人盖今之濮人也又曰陽令伊尹爲四方獻令伊尹曰臣請正南歐隑五來切柱國指子陸童百濮九箘請今以珠璣瑇琩象齒文犀翠羽􅙪鶴短狗爲獻永昌郡傳曰雲南郡在建寧南四十五里治雲南縣亦多夷濮分布山野千五百人女大小蹲踞道側皆持數種器杖時宼鈔爲郡邑之害尾濮永昌郡傳曰郡西南千五百里徼外有尾濮尾􅀂􅀛形長三四寸欲坐輙先穿地空以安其尾􅀂邂逅誤折尾便死男女長各隨冝野㑹無有嫁娶猶知識母不復别父俗云貸老相食則此濮也古人所􅀃非目見也扶南土俗傳曰枸利東有蒲羅中人人皆有尾長五六寸其俗食人按其地並西南蒲羅盖尾濮之地名梁祚魏國統曰西南有夷名曰尾濮其地出瑇琩犀象珠璣金銀葛越桂木人皆蠻夷重譯乃通也木綿濮郭義恭廣志曰木綿濮土有木綿樹多葉又房甚繁房中綿如蚕所作其大如捲音拳文靣濮廣志曰文靣濮其俗劖靣而以青􅀞之劖音讒折􅆎濮廣志曰折􅆎濮其俗生子皆折其􅆎赤口濮廣志曰赤口濮在永昌南其俗折其齒劖其脣使赤又露身無衣服墨􅈎濮廣志曰墨􅈎濮在永昌西南山居耐勤苦其衣服婦人以一幅布爲裙或以貫頭丈夫以榖皮爲衣其境出白蹄牛犀象武魄金銅華布朱提永昌郡傳曰朱提郡在犍爲南千八百里治朱提縣川中縱廣五六十里有大泉池水湏名千湏池又有龍池以灌漑種稻與􅈎道接時多援郡取鳴嘯於行人徑次聲聒人耳夷分布山谷間食肉衣皮雖有人形禽獸其心言語服飾不與華同有堂狼山山多毒草盛夏之月飛鳥過之不能得去又曰建寧郡朱提之東南六百里土氣和適盛夏之月熱不鬱述猛冬時寒􅃤慄又曰末昌郡在雲南西七百里郡東北八十里瀘倉津此津有鄣氣徃以三月渡之行者六十人皆悉悶亂毒氣中物則有聲中樹木枝則折中人則令奄然青爛也又曰興古郡在建寜南八百里郡領九縣縱經千里皆有瘴氣蒜榖雞豚魚酒不可食皆食啖病害人郡北三百有盤江廣數百歩􅀷十餘丈此江有毒瘴九縣之人皆号曰鳩民言語􅄝慾不與人同鳩民咸以三尺布角割作兩䄡不復加鍼縷之功也廣頭着前狹頭覆後不盖其形與祼身無異昆弥國唐書曰昆弥國一曰出昆明西南夷也在㸑之西洱河爲界即葉榆河其俗與突厥略同相傳云與匈奴本是兄弟國也漢武帝得其地入益州部其後復絶諸葛亮定南中亦所不至武徳四年嶲州治中􅁻弘使南寧因至其國諭之至十二月遣使朝貢貞觀十九年四月右武侯將軍梁建方討蠻降其部落七十二户力九千三百西㸑唐書曰西㸑方南寜之渠帥也自云本河東安邑人也七丗祖仕晉爲南寧太守属中國亂遂王蠻夷梁元帝時南寧州刺史徐文盛徵詣荆州有㸑瓉者遂據南寜之地延袤二千餘里俗多華民饒駿馬明珠犀象瓉死有二子震翫分統其衆隋開皇􅀄遣使朝貢文帝遣韋丗冲將兵鎮之析置恭州恊州昆州未幾復叛後遣史萬歳擊之所至皆破踰西洱河臨滇池而還翫懼而來朝文帝誅之諸子没爲官奴不収其地因與中國絶髙祖受禪拜翫子弘逹爲昆州刺史令持其父屍歸葬本郷益州叚綸又遣俞大施至南寧諭其部落悉來歸􅅃自是朝貢不絶東女國唐書曰東女國西羗之別種以西海中復有女國故稱東女焉俗以女爲王東與茂州党項接東南與雅州接隔羅女蠻及白狼夷其境東西九日行南北二十日行有大小八十餘城王所居名康延川中有弱水南流用牛皮爲舩以渡四萬衆勝兵万餘人散在山谷女王号爲賔就有女官曰髙覇平議國事在外官僚並男夫爲之其王侍女數百人五日一聽政令王􅀂死國中多歛金錢動至數万更於王族求令女二人而立之大者爲王其次爲小王􅀂大王死即小王嗣立或姑死而婦継無有簒奪其所居皆起重層屋王至九層國人至六層其王服青毛緌裙下領衫上披青􅂁其䄂委地冬則羔裘飾以紋錦爲小鬟髻飾之以金耳垂璫足履索􅝿俗重婦人而輕丈夫文字同於天竺以十一月爲正又曰東女國其俗毎至十月令巫者齎肴詣山中散糟夌於空大呪呼鳥俄而有鳥如雞飛入巫者之懷因剖腹而視之毎有一榖來歳必登􅀂有霜雪必多災異其俗信之名爲鳥卜其居喪服飾不改爲父母則三年不櫛沐貴人死者或剥其皮而藏之内骨於缾中楺以金屑而埋之國王將葬其大臣親属殉死者數十人隋大業中蜀王秀遣使招之拒而不受武徳中女王囯歛臂鈐湯湯傍氏始遣使貢方物髙祖厚資遣之又曰垂拱二年東女國王歛臂遣大臣湯劒石來朝仍請官号則天􅁽拜歛臂爲左玉鈴衛將軍仍以瑞錦製蕃服以賜之天授三年其王俄琰兒來朝開元二十九年十二月其王趙曵夫遣子獻方物命有司宴于曲江令宰臣巳下同宴又封曵夫爲歸昌王賜其子帛放還復以男子爲王貞元九年七月其王湯立悉與􅀉隣國王董卧度白狗國王羅陁忽逋租囯王弟鄧吉知南水囯蘇唐磨咄覇囯王董藐蓬各率其種落詣劒南西川内附其哥隣等國皆散居山川弱水王即國􅀄女國之弱水部落其悉董國在弱水西故亦謂之弱水西悉董王舊皆分􅀠邊郡祖父例授將軍中郎果毅等官自中原多故皆爲吐畨所役属其部大者不過三二千户各置縣令十數人理之土有絲絮歳輸於吐蕃至是悉與之同盟相率献􅅃兼賫天寳中國家所賜官告共三十九通以進西川節度使臯處其衆於維覇保等州給以種粮耕牛咸樂生業立悉等數國王自來朝召見於麟德殿授官賞各有差卷終
