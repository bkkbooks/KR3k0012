front:
  text: 太平御覽卷第四百五十六
  hash: sha256:186b0a5f892650bda527e286f87654ee8ace0ad237f09977bb2af43d1495c8fc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_456-1a}
body:
  text: 人事部九十七諫諍六周書曰微子開者紂之兄也紂不道數諫不聽度紂終不可諫欲死之及去未能决乃問太師箕子少師比干曰紂湎於酒婦人之言是用􅀂渉水無津涯箕子曰今誠得治國國治身死不恨爲死終不治不如去之紂乃爲象牀箕子曰彼爲玉牀則思逺方珍怪之物而御之矣爲人臣者諫不聽是彰君之惡乃􅀍髮佯狂比干曰君有過不以死爭則百姓何辜矣乃直言諌紂怒刳視其心微子曰父有過三諫不聽則號泣而隨之臣三諫不聽則其義可以去矣又曰許綰魏襄王欲爲中天之臺誡曰敢諌者死綰乃負操捶而入曰臣聞大王將爲中天之臺願加一力焉王曰何也對曰臣聞天地相去萬五千里今王因而半之當髙七千五百里基址當廣八千里盡王之地不足以爲大王必欲爲之先起兵以伐諸侯及四夷盡有地乃足矣然以林木之積人徒之衆倉廪之輸當給其外乃可以作襄王嘿然無以應之乃罷又曰叚規智伯請地於韓康子康子欲勿與規諌曰不可夫智伯之爲人好利而鷙復來請地而勿與則必加兵於我矣􅀂與之彼又請地於他國他國不聽必向之以兵然則與可以免於患而待事之變康子曰善因使使者封萬家之縣一與智伯智伯大恱復請地於趙不與果隂約韓魏而伐圍晉陽三年後韓魏應之遂滅智伯又曰田嬰齊宣王弟封靖郭君於薜嬰自威王以來任職有功故封之靖郭君嬰將城薛客多諌者嬰謂謁者有諌者勿通於是人有請見者曰臣請三言而巳矣􅀂過三言臣則請烹靖郭君見之客趨進曰海大魚因返走君不解曰更言之客對曰君夫不聞海大魚乎網不能止釣不能牽忽而失水則螻蟻得志焉今齊亦君之水也􅀂長有齊奚以薛爲君􅀂一旦失齊雖降薛之城到天猶無益也君曰善遂不城薛又曰不幸不聞其過福在受諫基在愛民固在親賢戰國䇿曰齊王有幸臣九人九人欲傷安平君田單田單之與王君臣無禮隂結諸侯之雄俊其志欲有爲也貂勃從楚來王賜諸前酒酣王曰召相田單貂勃避席稽首曰王惡得此亡國之言乎人臣之功豈有厚於安平君乎王乃煞九子益封安平君又曰先生王歜造門而歌欲見於宣王宣王使謁者延入王歜趨見王爲好􅀔王趨見歜爲好士於王何如使者還報宣王因趨而迎之於門與入曰寡人聞先生直言正諫不諱王歜曰生於亂丗事亂君焉敢直言正諌宣王忿然作色不􅀃有間王歜曰昔先君桓公所好者五天子受籍立爲太伯今王有四焉宣王說曰寡人愚陋焉能有四王歜曰先君好馬好狗好酒好色王亦好之先君好士王不好士宣王曰當今之丗無士寡人何好歜謂王曰丗無騏􅂹騄耳王駟巳備丗無東郭韓盧氏之犬王走犬巳備無毛嬙西施之妓王宮巳充王亦弗好士也何患無士附託辛戰國䇿曰趙旦伐燕蘓代爲燕王謂趙惠王曰今者來過川蜯方岀曝而鷸啄其肉蜯合而掩其啄鷸曰今日不􅀨明日不􅀨蜯將爲脯蜯亦謂鷸曰今日不出明日不出必見死鷸兩者不肯相捨漁父得而并禽之今趙旦伐燕燕趙乆相交以弊大衆臣恐強􅁗之爲漁父也惠王曰善乃止之又曰趙太后新用事􅁗急征之趙氏求救於齊齊曰必以長安君爲質兵乃出太后不肯大臣強諫太后謂左右有復言令長安君爲質者老婦必唾其靣右師解龍言願見太后盛氣而湏之入而徐趨曰老臣賤息舒旗最少不肖而衰􅀼愛隣之願令得􅀘黒衣之數以衛王宫太后敬諾問年幾何矣對曰十五歳矣太后曰丈夫亦愛憐少子對曰甚於婦人太后曰婦人異甚對曰左右臣竊以爲嫗之愛燕后賢於長安君過矣媪之送燕后時􅀕祀則祝之曰必不使反豈非計長乆爲子孫相繼爲王也今媪尊長安君之位而封之以膏􅃾之地與之重器而不反今令有功於國山陵崩長安君何以自託於趙老臣與媪爲長安君短也故以爲其愛不􅀂燕后太后曰諾惟君所使之於是爲長安君約車百乗質於齊齊兵乃出􅀘逸禮傳曰衛靈公之時蘧伯玉賢而不用弥子瑕不肖而任事史鰌患之數言蘧伯玉賢而不聽病且死謂其子曰我死則治喪於北堂吾生不能進蘧伯玉而退弥子瑕是不能正君也生不能正君者死不當成禮而致尸於北堂於是足矣靈公徃吊問其故其子以父言聞靈公靈公失容曰吾失矣立召蘧伯玉而進之召弥子瑕而退之徙喪於堂成禮而後去衛國以治史鰌之力也史鰌以尸諫可謂忠不衰矣孝經援神契曰三諌侍放復三年眷眷所以者臣爲君諌􅀂言有過而放矣所諌事遂以行者遂去不留凢侍放者兾君用耳事以行灾咎將至無爲留之臣侍放於郊君不絶其禄者亦不欲去道不合故去耳以其宗廟賜之環即還之玦則去國語曰周靈王二十二年榖雒􅃲將毁王宫王欲壅之太子晉曰不可晉聞古之長人者不墮山不崇藪不防川不竇澤行成坤國語曰呉伐越越王令諸稽郢行成於呉曰君王不以鞭箠使之而辱軍士使冦令焉􅀂御冦之號令勾踐請一介嫡女執箕箒一介嫡男奉盤匜以隨諸御匜沃器也春秋貢獻不懈王府諺曰狐埋之而狐搰之是無成功也今大王旣封植越國而又刈之刈斬是無勞也呉王曰吾將許越謝成申胥諌曰申胥楚臣五貟不可許大夫種勇以善謀將還玩呉國於摧掌之上以得其志故婉約其辭以從王志爲虺弗摧爲虵將􅀂何虺短虵長呉王不聽乃許盟立後土國語曰魯武公以括與戲見宣王武公敖也括武公長子伯御也王命立戲樊仲山父諌樊宣王卿七山父之所封也仲山父樊穆仲也曰不可立也不順必犯王命犯王命必誅故出命不可不愼也命之不行政之不立行而不順民將弃上夫下事上少事長所以爲順也今天子立諸侯而建其少是敎逆也天子其圖之又曰宣王旣喪南國之師乃料民于太原仲山父諫曰民不可料也無故而料民天之惡也害於政而妨於後嗣王卒料之及幽王乃㓕諷諫木國語曰晉平公射鷃不死使堅襄􅅮之失公怒拘將煞之叔向聞之曰君必煞之昔吾先君唐叔射兕于徒林殪以爲大甲以封於晉今君嗣吾先君射鷃不死􅅮之不得是揚吾君之恥者也君必速煞之無令逺聞君顏忸怩乃走赦之􅀃􅁐曰齊景公遊於海上而樂之六月不歸令左右曰敢有先言歸者致死不赦顔燭趍進諫曰君樂治海上而六月不歸彼儻有治國者君且安得樂此海也景公援㦸將斬之顔燭進撫衣待之曰君奚不斫也昔者桀殺􅀜龍逢紂殺王子比干君之賢非比二主也臣之材亦非比二子也君奚不斫以臣叅此二人者不亦可乎景公􅀃遂歸中道聞國人謀不内矣又曰呉王欲伐荆舎人少孺子欲諫不敢則懷丸操彈遊於後囿露沾其衣王曰何沾衣如此對曰榆上有蟬髙居而鳴不知螳蜋在其後螳蜋欲取蟬不知黄雀在其傍黄雀延頸欲啄螳蜋而不知彈丸在其下臣欲彈雀不知露沾衣如此三者皆務欲得其利而不顧其後患也王曰善哉乃罷兵又曰晉平公好樂多其賦歛不治城郭敢有諫者死國人憂之有咎犯者見門大夫曰臣聞主君好樂故以樂見門大夫入言晉人咎犯欲以樂見平公曰内之止坐殿上則出鍾磬竽瑟坐有頃平公曰客子爲樂咎犯對曰臣不能爲樂臣善隱平公召隠士十二人咎犯曰隱臣竊願昧死御平公曰諾咎犯申其左臂而詘五指平公問於隱官曰占之爲何隱官皆曰不知平公歸之咎犯則申其一指曰是一也便游赭畫而後城門二也柱梁衣繡土民無褐三也侏儒有餘酒而死士渴四也民有饑色而馬有粟秣五也近臣不敢諫逺臣不得逹平公曰善乃屏鍾皷除竽瑟遂與咎犯治國又曰枚乗上書諌呉王曰福生有基禍生有胎納其基絶其胎禍何從來哉泰山之溜穿石殫極之綆斷幹水非石之鑚繩非木之鋸也漸摩使之然夫銖銖而稱之至石必差寸寸而度之至丈必過石稱丈量俓而寡失十圍之木始生於孽可分而絶可擢而拔據其未生先其未形磨礲砥礪不見其損有時而盡種樹畜長不見其益有時而大積德循行不知其善有時而用弃義背理不知其惡有時而亡臣乗願大王熟計而身行之此百王不易之道呉王不聽卒死丹徒又曰晉靈公造九層臺費用千億謂左右曰敢有諌者斬荀息聞之上書求見靈公張弩持矢見之謂曰子欲諌耶息曰不敢諫也臣能累十二􅀶碁加九鷄子其上公曰子爲寡人作之息即正顔色定志意以碁子置下加九鷄子其上左右慴息靈公扶伏氣息不續公曰危哉危哉息曰是不危也復有危於此者公曰願復見之息曰九層之臺三年不成男不得耕女不得織國有空虚隣國謀議將欲興兵社稷亡滅君欲何望靈公曰寡人之過乃止於此即壞九層之臺又曰􅁗始皇時侯生諌始皇望見侯生大怒侯生曰陛下之淫萬萬丹朱而千千桀紂臣恐陛下之千亡曾不一存始皇嘿然乆之曰汝何不蚤言侯生曰陛下之自賢自健上侮五帝下陵三王弃毒撲就末􅇊陛下徴見乆矣臣等恐言之無益而自爲取死也故逃而不敢言又曰楚莊王伐陽夏師乆而不罷羣臣欲諌而不敢莊王獵於雲夢椒舉諌曰所以多得獸者馬也而廢王國亡王之馬豈可哉王曰善不榖之屈強國之可以長諸侯也知得地可以爲冨也亡其民之不用也明日飲諸大夫酒椒舉爲上客罷陽夏之師晏子春秋曰景公爲長庲音來舎也將欲美之有風雨作公與晏子入坐飲酒致堂上之樂酒酣晏子作歌曰穗兮不得穫秋風至兮草零落風雨之拂煞之靡弊之歌終顧而流涕張掖而儛公止之曰今日夫子有賜譏寡人之罪遂廢酒罷役又曰齊景公使人飬所愛馬暴病死景公怒令人持刀欲煞飬馬者是時晏子侍前左右執刀而進晏子止之而問古者堯舜支解人從何體始公懼然曰從寡人始遂止不支解公曰以屬獄晏子曰請數之使自知其罪然後煞之獄公曰可晏子數之曰尓有罪三公使汝飬馬汝煞之當死罪一又煞公之所愛馬當死罪二使公以一馬之故而煞人百姓聞之必怨吾君諸侯聞之必輕吾國汝一煞公馬使公怨積於百姓兵弱於隣國汝當死罪三令以屬獄公喟然曰赦之又曰景公築路􅃦之臺三年未息而又爲鄒之長塗晏子諌公斬板而去之又曰景公有愛槐令吏謹守之令犯槐者刑傷槐者死有不聞令過而犯之者將加罪焉晏子諌曰嬰聞窮人財力以從􅄝欲謂之暴崇玩好威嚴謂之逆形煞不稱謂之賊三者守國之大殃也君饗國德行未見於民而三辟著於國嬰恐其不可以莅國子人也公曰善岀犯槐之囚君臣望晏子曰景公畋於署梁十有八日而不返晏子伯自徃見公比至衣冠不正不革衣冠望游而馳公望見晏子曰何其遽國家得無故乎晏子對曰國人皆以君安於野不安於國好獸而惡民公曰寡人之有子猶心之有四支也心有四支故心得佚焉豈不可哉晏子對曰嬰聞之與君言異乃􅀂心之有四支而心得佚焉則可今四支無心也十有八日矣不亦乆乎公于是罷田歸又曰楚巫徴道􅒨欵以見景公侍坐三日景公說之楚巫曰公明神之主帝王之君也公即位十有七年矣事未大濟者神明未至也請致五帝以明君德景公再拜稽首楚巫曰請廵國郊以觀帝位至於牛山而不敢登曰五帝之位在於國南請齊具而後登之公命百官供齊具􅒨欵視事晏子聞之而見於公曰古者不慢行而繁􅀕不輕身而恃巫今政亂而行辟弃賢而用巫帝王之在身也而求帝王不亦難乎又曰景公射鳥野人駭之公怒令吏誅之晏子曰野人不知也臣聞之賞無功謂之亂罪不知謂之虐兩者先王之禁也公曰善自尒以來未有鳥獸之禁又曰景公曰爲巨冠長衣以聽朝日晏不罷晏子進曰日晏矣君脫服就晏公曰諾寡人受令退朝遂去衣冠不復服也蕭方等三十國春秋曰􅁗王符堅懸珠簾於正殿以朝羣臣宫宇服御物極珍飾之竒尚書金部郎裴元略諌曰願陛下遵采椽之不斵鄙瓊室而不居堅􅀏曰非卿之忠朕何由聞過乎趙曄呉越春秋曰呉王旣煞子胥問太宰曰子胥數以越諌遂以䘮身從死以來􅀂有所亡今欲祠之何日可也曰三月癸未可也及夫差出國祠子胥江水之濵乃言曰寡人昔日不聽相國之言至令相國逺投江海自亡司馬彪九州春秋曰曹公征孫權叅軍傳幹諌曰今未承王命者呉與蜀也唯明公思虞舜舞干戚之義全威養德以道制勝公不從軍遂無功太平御覽卷第四百五十六
