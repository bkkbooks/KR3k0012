body:
  text: 飲食部十四茹菹瓮茹史記曰公儀休食茹而美㧞其園葵後漢書曰孔奮爲姑臧長時毎居縣者不盈數月輙致豊積奮在職四年財産無所増事母孝謹雖自儉約而奉養極求珎膳躬率妻子同甘菜茹沈約宋書曰文帝爲王􅀇謨作四時茹詩云堇茹供春膳粟飱充夏飡傳􅀇詩曰厨人進藿茹有酒不盈柸枚乗七發曰白露之茹菹周禮曰朝事之豆其實韭菹昌本菁菹􅈋菹昌本昌蒲祖也切之四寸爲之菁菹韭菹鄭大夫讀􅈋爲茅或曰􅈋水草杜子春讀􅈋爲夘􅀇謂菁蔓菁也􅈋鳬葵也饋食之豆其實葵菹加豆之實芹菹深蒲菭菹筍菹芹楚葵也鄭司農云深蒲弱入水深故曰􅀷蒲或曰深蒲桒耳菭水中魚衣也􅀇謂􅀷蒲蒲始生水中子也菭箭葫荀竹萌王舉則共七􅉁韭菁􅈋葵芹菭筍菹凢醯醢所和細切爲韲今物􅀂䐑爲菹韲菹之稱菜􅁏通稱矣記曰麋鹿爲菹野豕爲軒皆而不切􅍪爲辟雞菟爲宛脾皆而切之切葱􅀂薤實之醯以柔之此軒辟雞宛脾皆菹􅀋也其作之狀以醯與薫菜淹之殺􅁏及醒氣也又曰水草之菹陸産之醯小物備矣三牲之爼八簋之實美物備矣昆蟲之異草木之實隂陽之物備矣水草之菹芹􅈋属陸産之醯蚳蝝之属天子之􅀕八簋昆蟲謂温生寒死之蟲也内則可食之物有蜩范草木之實菱茨榛栗之属傳曰王使周公閱來聘饗有昌歜昌菹毛詩曰中田有廬疆􅂣有􅀲是剥是菹剥􅀲爲菹也箋云中田土也農人作廬焉以便其田事於畔上種􅀲􅀲成又入其稅天子剥削淹漬以爲菹貴四時之異物毛詩義䟽曰蒲周禮以爲菹謂蒲始生取其中心入地蒻大如指白生噉之甘脆又煑以苦酒受之如食筍法大美今呉人以爲菹廣雅曰韲墜䖆䔯菹也墜大内切䔯口故切蒼頡解詁曰䔯酢菹也􅀃文曰菹菜酢也蘫􅀲菹也蘫力甘切釋名曰菹阻也生釀之遂使阻於寒温之間不得爛也吕氏春秋曰文王好菹孔子聞之䠞頞而食之三年然後美之賈􅁩新書曰楚惠王食寒菹而得蛭因遂吞之腹有病而不能食之令尹入問曰王安得此疾王曰我食寒菹而得蛭念譴之而不得其罪乎是法廢而威不立非所以使國聞也譴而行其誅乎則庖宰監者皆當死心又弗忍也故吾恐蛭之見也因遂呑之令尹避席再拜而賀曰臣聞天道無親唯德是輔王有仁德天之所奉也是昔也惠王之後而蛭岀其夕病心腹之積皆愈晉書曰呉隱之年十餘歳丁父母憂食鹹􅉁以其味甘掇而弃之盧諶􅀕法曰秋祠有菹消食經有此法也范汪祠制曰孟冬不鹹菹瓮釋名曰生葱薤曰瓮言柔滑兊兊然也太平御覽卷第八百五十六
