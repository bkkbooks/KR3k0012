front:
  text: 太平御覽卷第二百六十二職官部六十
  hash: sha256:bbf7877490d2de3ac0bd6ad71ebd9d0d14e985d27e827db2cf5c58dd40505562
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_262-1a}
body:
  text: 良太守下酷太守良太守下北史曰西魏裴俠除河北郡守俠躬履儉素愛人如子所食唯菽麦塩菜而巳吏人莫不懷之此郡舊制有漁獵夫三十人以供郡守俠曰以口腹役人吾所不爲也乃悉罷之又有丁三十人供郡守役俠亦不私並収庸直爲市官馬􅀊時旣積馬遂成群去職之日一無所取人歌之曰肥鮮不食丁庸不取裴公貞惠爲丗䂓矩北史曰宋丗良爲清河太守才識閑明尤善政術在郡未幾聲問甚髙陽平郡移治刼盗三十餘人丗良訊其情􅃺惟送十二人餘皆放之陽平太守魏明㓪大怒云輙放吾賊及推問送者皆實放皆非明㓪大服郡東南有曲堤成公一姓阻而居之群盗多萃於此人爲之語曰寧度東呉㑹稽不歷成公曲堤良施八條制盗奔他境人又謡曰曲堤雖險賊何益但有宋公自屏跡是冬醴泉出於界内及代至傾城祖道有老人丁金剛者泣而前謝曰老人年九十記三十五政府君非唯善政清亦徹底今失賢者人何以濟莫不攀援涕泣北齊書曰赫連子恱除林慮太守文襄徃晉陽由郡境問不便恱云臨水武安去郡遥逺山嶺重疊􅀂東屬魏郡則地平路近文襄􅀏曰卿徒知便人不覺損幹恱荅曰所言者又所疾苦不敢以私潤􅀒公心文襄善之乃勑依事施行自是人屬近便行路北齊書曰崔伯謙字士遜愽陵安平人也除濟北太守恩信大行又改鞭用熟皮爲之示恥而巳北齊書曰蘇瓊字珎芝長樂武強人也除南清河太守性清慎不發私書陳書曰孔奐字休文除晉陵太守自宋齊巳來爲大郡雖經寇擾猶爲全實前後二千石多行侵􅁀奐清白自守妻子並不之官唯以單舡臨郡所得秩俸隨即分贍􅀌寡郡中號曰神君曲阿冨人殷綺見奐居處儉素乃餉以衣氊一具奐曰太守身居美禄何爲不能辦此但百姓未周不容獨享温飽勞卿厚意幸勿爲煩隋書曰于義遷安武太守專崇德教不尚威刑有郡民張善安王叔兒争財相訟義曰太守德薄不勝任之所致非其罪也於是取財倍與二人諭而遣去善安等各懷恥愧移語他州於是風敎大洽其以德化人皆此􅀋也又曰于仲文遷安固太守有任杜兩家各失牛後得一牛兩家俱認州郡乆不能决益州長史韓伯儁曰于安固少善聽察可令決之仲文曰此易解耳於是令二家各驅牛羣至乃放所認者遂向任氏群中又隂使人微傷其牛任氏嗟惋杜家自􅀂仲文於是訶詰杜氏杜氏服罪而去又曰栁儉􅌆帝特授朝散大夫拜弘化太守賜物一百叚而遣之儉清節愈厲大業五年入朝郡國畢集帝謂納言􅂫威吏部尚書牛弘曰其中清名天下第一者爲誰威等以儉對又問其次威以􅃰郡丞郭絢潁川郡丞敬肅等二人對帝賜儉帛二百疋令天下朝集使送至郡邸以旌異焉又曰車駕西廵還謂武威太守樊子盖曰人道公清定如此不子盖謝曰臣安敢言清止是小心不敢納賄耳由此賜之口味百餘斛唐書曰顔眞卿爲平原太守安禄山逆節頗著眞卿以霖雨爲託修城浚濠隂科丁壯儲廪實乃陽㑹多士泛舟於池飲酒賦詩或䜛於禄山亦宻偵之以爲書生不足虞也無幾禄山果反河朔盡䧟獨平原城守具備乃使司兵叅軍李平馳奏之玄宗􅀄聞禄山之變歎曰河北二十四郡豈無一忠臣乎得平原大喜頋左右曰朕不識顔眞卿形狀何如所爲得如此五代史晉史曰郭延魯清㤗中遷復州守延魯臨任忽驚歎曰先人曽爲沁牧九年不移我得不遵其家法而使政有紕繆者乎由是正俸之外未嘗歛貸庻事致理一郡頼焉及秩滿百姓上章舉留將離境攀卧􅃒圍者不能去朝廷聞而嘉之華陽國志曰張翕字子陽巴郡人爲隂平郡守布衣􅂼食儉以化民自乗二馬之官乆之一馬死一馬病翕曰吾將歩行矣夷漢甚安其惠愛在官十九年卒百姓號慕送葬以千數天子嗟歎賜錢十万爲立祠堂後太守數煩擾夷人叛亂翕子端方察孝廉天子起家拜越嶲太守迎者如雲又曰華陽國志曰孝順帝永建中太山吴資爲巴郡太守民歌之曰習習晨風動澍雨潤乎苗群后恤時務我民以優饒及資遷去民人思資又歌曰望逺忽不見惆悵當徘徊恩澤實難忘悠悠心永懷益部􅂄舊傳曰張霸字伯饒爲㑹稽太守舉賢士勸教講授一郡慕化但聞誦聲又野無遺冦民語曰城上烏嗚哺父母府中諸吏皆孝子鍾岏良吏傳曰王堂字敬伯廣漢郪人也爲汝南太守屬城多闇弱堂簡選四部督郵奏免四十餘人以陳蕃爲功曹應嗣爲主簿教曰簡覈衆職委功曹拾遺􅀘闕仰恃明俊古人有言勞於求賢逸於得士太守不敢妄有符教崔氏家傳曰崔寔除五原太守郡處邊陲不知耕桒之業民多飢寒之患於是乃勸人農種教其織絍以賑貧窮民用􅀗濟號曰神惠焉桓階別傳曰上巳平荆州引爲主簿毎有深謀疑事嘗與君籌之或日􅉴忘食或夜坐徹旦擢爲趙郡太守㑹郡寮送之上曰北邊未清以卿威能震敵德懷逺人故用相煩是亦寇恂河内之舉階在郡時俸盡食醬酻上聞之數戯之曰卿家醬頗得成不耶詔曰昔子文清儉朝不謀夕而有脯粮之秩宣子守約簞食魚飱而有加梁之賜豈况光光大魏冨有四海棟宇大臣而有􅂼食非吾所以禮賢之意也其賜射鹿師二人并給媒齊人謂麴孽爲媒江祚別傳曰祚爲安南太守民思其德生子多以江名子孟宗別傳曰宗爲豫章太守人思其惠路有行歌故時人之生子以孟爲名邵氏家傳曰邵訓字伯春爲陳留太守以君性多􅀪怒追詔勉厲之曰陳留太守講授省中六年于兹經術明篤有匡生解頥之風賜錢三十萬及刀劒衣服居家之具宣城記曰涇縣洪短吴時爲盧江太守清稱徴還舡輕皆載土時􅀊暮逐除者就乞所􅀗甚少洪乃語之逐除人見土而去􅁗子曰孔文舉爲北海相有遭父喪哭泣墓側色無憔悴文舉殺之有母病差思食新夌家無乃盗隣人熟夌而進之文舉聞特賞之盗而不罪者以爲勤飬於母也哭而見殺者以爲哀而不實也世􅀃曰周顗罷臨川郡還都未及上泊青溪渚王丞相徃看之時是夏月􅁀雨卒至舫旣狹小而又漏殆無復可坐處王曰胡威之清何以遇此即啓用焉吴興太守論衡曰淮陽鑄爲偽錢吏不能禁汲黯爲太守不壞一鑪不刑一人髙枕安卧淮陽政清風俗通曰􅁗昭王使李氷爲蜀郡太守開成都兩江漑田万頃江神􅀊取童女二人以爲婦冰自以其女與神爲㛰徑至神祠勸神酒杯但澹淡冰厲聲責之因忽不見良乆有兩倉牛闘於岸旁有間冰還流汗謂官屬曰吾闘大極不勝當相助南向􅆎中正白者我綬也主簿刺殺北面者江神遂死蜀人慕其氣决抗壯徤者因名子曰冰兒酷太守漢書曰王温舒爲廣平都尉擇郡中豪敢徃吏十餘人爲爪牙使督盗賊道不拾遺遷河内太守素居廣平時皆知河内豪姦之家以九月至郡令具私馬五十疋驛自河内至長安部吏如廣平時方略捕郡中豪滑相連坐千餘家上書請大者至族小者乃死家盡没入􅂍奏行不過二日得可事論報至流血十餘里河内皆恠其奏以爲神速盡十二月郡無犬吠之盗其頗不得失之旁郡追求㑹春温舒頓足歎曰嗟乎令冬月益展一月足吾事矣又曰嚴延年字次卿東海人爲􅃰郡太守大姓西髙氏東髙氏自郡吏巳下皆畏避之莫敢與牾咸曰寧􅀒二千石無負豪太家賔客放爲盗賊發輙入髙氏吏不敢追延年至遣􅁺蠡吾趙繡案髙氏得其死罪繍見延年爲兩劾欲先白其輕者觀延年意延年巳先知之趙􅁺至白其輕者延年索懷中得重劾即収送獄夜入晨殺吏分栲兩髙窮竟其姦誅殺各數人郡中震恐道不拾遺三􅀊遷河内太守東觀漢記曰樊曄爲天水郡其政嚴猛好申韓之術不假下以權道路不敢相盗啇人行旅以錢物於大道旁曰以付樊父後還其物如故道不拾遺凉州爲之語曰遊子常苦貧力子天所富寧見乳虎穴不入兾城寺嗟我樊府君安可再遭值晉陽秋曰廬陵太守羊冉疑郡人簡良等爲賊殺一百九十人徒讁百有餘人有司奏舟罪死以景獻皇后有屬八議帝曰此古人所無何八議之有乎未忍肆之市朝其賜命獄所琅邪王太妃山氏冉之甥也詣闕請命丞相以太妃爲言於是减死罪旣出有疾見簡良爲祟旬日而卒三國典略曰齊廣陵太守敬長瑜多受財賄刺史陸駿將啓劾之長瑜以貨求於散􅀐常侍和士開以􅀞屏風詐爲長瑜之獻齊王大恱駿啓㝷至遂不問焉梁書曰南淮侯蕭推字智進梁王第安城康王秀之子姿貌豊恱舉動可觀歷淮南宣城晉安吴郡四太守所臨之郡必赤地大旱吴人號爲旱母又曰臧厥爲晉安太守郡居山海常結聚逋逃前二千石雖募討捕而寇盗不止厥下車宣風化凢諸㓙黨皆繦􅀒而出居民復業啇旅流通然爲政嚴酷少恩吏民小事必加杖罰百姓謂之臧獸唐書曰李邕天寳􅀄爲汲郡北海二太守邕性豪侈不護細行所在縱求財貨馳獵自恣五載姦􅂍事發又嘗與左驍衛兵曹栁勣馬一疋及勣下獄􅁻温令勣引邕談及休各厚相賂遺詞􅃺連引勑刑部貟外祁順之􅁥察御史羅希奭馳徃就郡决殺之時年七十餘卷第二百六十二
