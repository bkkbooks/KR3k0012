front:
  text: 太平御覽卷第二百一十八
  hash: sha256:fd5d94ae4f062ad2148710b54d950d24e62d13f55f8e6aec8dcfd3cbbc7a44e0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_218-1a}
body:
  text: 職官部十六刑部尚書刑部侍郎刑部四司郎中貟外禮部尚書禮部侍郎禮部四司郎中貟外工部尚書工部侍郎工部四司郎中貟外刑部尚書六典曰刑部尚書侍郎之職掌天下刑法及徒􅀠勾覆􅀜禁之政令其屬有四一曰刑部二曰都官三曰比部四曰司門揔其職務而行其制命凡中外百司之事由於所屬咸質正焉唐書曰栁公綽爲刑部尚書京兆人有姑鞭婦致死者府斷以償死公綽議曰尊毆卑非􅃲且其子在以妻而戮其母非敎也竟減死又曰李適之拜刑部尚書適之雅好賔友飲酒一斗不亂夜則宴賞晝决公務庭無留事刑部侍郎唐書曰太宗謂侍臣曰張亮有義兒五百畜養此輩將何爲也正欲反耳命百寮議其獄多言亮當誅唯將作少匠李道􅁉言亮反形未具明其無罪太宗旣盛怒竟斬于市籍没其家歳餘刑部侍郎有闕令執政者妙擇其人累奏皆不可太宗曰朕得其人也徃者李道􅁉議張亮云反形未具此言當矣當時雖不即從至今追悔遂授道􅁉刑部侍郎又曰劉瑑轉刑部侍郎瑑精於法律選大中已前二百四十四年制勑可行用者二千八百六十五條分爲六百四十六門議其輕重別成一家法書號大中統􅀋奏行用之刑部郎中刑部貟外郎六典曰刑部郎中貟外郎各二貟掌舉其典憲而辨其輕重凡文法之名有四一曰律二曰令三曰格四曰式凡律一十有二章一曰名例二曰衛禁三曰職制四曰戸婚五曰廏庫六曰擅興七曰盗賊八曰􅃲訟九曰詐僞十曰􅄂律十一曰捕亡十二曰斷獄而大凡五百條焉唐書曰長慶中刑部貟外郎孫革奏准京兆府雲陽縣人力張蒞欠羽林官􅀐康憲錢米憲徴之蒞乗醉拉憲氣息將絶憲男買徳年十四將救其父以蒞角觝力人不敢撝解遂持木鍤擊蒞之首見血後三日致死者准律文爲人所毆人徃救擊其人折傷減凡􅃲三等至死依常律即買德救父難是性孝非􅁀擊張蒞是功非兇以髫丱之歳正父子之親􅀂非聖化所加童子安能及此王制稱五刑之理必原父子之親以權之測淺深之量以別之春秋之義原心定罪周書訓諸罰有權今買徳生􅀍皇風㓜符至孝哀矜之宥伏在聖慈職當讞刑合分善惡先具事由陳奏伏兾賜下中書門下啇量勑旨康買德尚在童年得知子道雖殺人當死而爲父可哀􅀂從沉命之科是失原情之義冝付法司減死罪一等處分都官尚書南史曰徐孝克爲都官尚書自晉巳來尚書官僚皆擕家屬居省省在臺城内下舎門中有閣道東西跨路通干朝堂其第一即都官省西抵閣道年代乆逺多有􅀑怪每夜昏之際無故有聲光或見人着衣冠從井中出湏􅁷復没或門閣自然開閉居者多死云尚書周確卒於此省孝克代確便即居之經兩載祅變皆息時人咸以爲貞正所致梁書曰羊侃遷都官尚書時尚書令何敬容用事與之並居未甞遊造有宦者張僧㣧候侃曰我牀非閹人所坐竟不前之時論美其貞正後周書曰梁元帝以沈重領江陵遷都官尚書領羽林監察又令重於合歡殿講周禮比部郎中比部貟外郎六典曰比部郎中貟外郎掌勾諸司百寮俸料公廨贓贖調歛徒役課程逋懸數物以周知内外之經費而揔勾之凡内官料俸以品第髙下爲差外官以州縣府之上中下爲差魏志曰何貞奏許都賦明帝竒之擢爲比部郎中李綽尚書故實曰杜牧甞於宰執求小儀不遂請小秋又不遂甞夢人謂曰辭春不及秋昆脚與皆頭後果得比部貟外司門郎中司門貟外郎六典曰司門郎中貟外掌天下諸門及􅀜出入徃來之籍賦而審其政凡􅀜二十有六而爲上中下之差所以限中外隔華夷設險作固閑邪正禁者周禮司徒職司門下大夫掌授管鍵以啓閉國門幾出入不物者正其賄貨凡財物犯禁者舉之以財養死政之老與其􅀌禮部尚書六典曰禮部尚書侍郎之職掌天下禮儀􅀕饗貢舉之政令其屬有四一曰禮部二曰祠部三曰膳部四曰主客揔其職務而行其制命凡中外百司之事由於所屬皆質正焉尚書堯典帝曰咨四岳有能典朕三禮僉曰伯夷帝曰俞伯夷汝作秩宗家語曰父子不親長㓜失序君臣上下乖離異志曰不和不和則飭宗伯飭謂整攝後魏書曰孝文車駕征馬圈留宋弁以夲官兼祠部尚書攝七兵事及行執其手曰國之大事在祀與戎故令卿綰攝二曹弁頓首辭謝東晉始置祠部尚書宋齊梁陳後還北齊皆同東晉至隋乃更爲禮部尚書禮部侍郎唐書曰韋陟爲禮部侍郎陟好引接後輩尤鑒于文雖詞人後生靡不諳練曩者主司取與皆以一場之善登其科目不盡其才陟先責舊乃令舉人自通所工詩筆先試一日知其所長然後依常式考覆片善無遺美聲盈路又曰賈至轉禮部侍郎是歳至以時艱歳歉舉人赴省者奏請兩都分試從之兩都試舉人自此始也又曰髙郢拜禮部侍郎時應進士舉者多務朋游馳聲名每歳冬州府薦送後唯追奉讌集罕􅀠其業郢性剛正尤嫉其風旣領職拒絶請託雖同列通熟無敢言者志在經藝專考程試凢掌貢部三歳進幽獨抑浮華朋濫之風翕然一變又曰貶劉太眞爲信州刺史太眞爲禮部侍郎性愜懦詭隨其掌貢舉宰臣姻族方鎭子弟先收擢之又甞叙陳少遊勲勣擬之桓文大招物議因斯貶禮部郎中六典曰禮部郎中貟外郎掌二尚書侍郎舉其儀制而辨其名數梁書曰武帝謂徐勉云今帝業􅀄構湏一人有學藝解朝儀者爲尚書儀曹郎勉曰孔休源識見清通詳練故事自晉宋起居注略誦上口遂拜爲儀曹郎禮部貟外郎唐書曰韋叔夏授春官貟外郎則天將拜洛及享明堂皆别受制共當時大儒祝欽明郭山惲撰定儀注凡所立議衆咸推服之祠部郎中祠部貟外郎六典曰祠部郎中貟外郎掌祠祀享􅀕天文漏刻國忌廟諱卜筮醫藥僧尼之事凡􅀕祀之名有四一曰祀天神二曰􅀕地祇三曰享人􅀑四曰釋奠于先聖先師其差有三􅀂昊天上帝五方帝皇地祇神州宗廟爲大祀日月星辰社稷先代帝王岳鎭海瀆帝社先蠶孔宣父齊太公諸太子廟爲中祀司中司命風師􅀨師衆星山林川澤五龍祠等及州縣社稷釋奠爲小祀梁書曰賀德基少遊學都下積年不歸衣資罄乏又車服故弊盛冬止衣裌􅃭袴甞於白馬寺前逢一婦人容服甚盛呼德基入寺門脫白綸巾以贈之仍謂曰君方爲重器不乆貧寒故以此相遺耳問姓名不荅而去德基於禮記稱爲精明位尚書祠部郎雖不至大官而三丗儒學俱爲祠部郎時論美其不墜主客郎中主客貟外郎六典曰主客郎中貟外郎掌二王後及諸蕃朝聘之事後漢書何逺少有美望公府中十辟一無所就由是名重華夏起家爲尚書主客郎膳部郎中膳部貟外郎六典曰膳部郎中貟外掌􅀖之牲豆酒膳辨其品數凡郊祀天地日月星辰岳瀆享祀宗廟百神在京都者用牛羊豕滌養之數省閱之儀皆載於廪犧之職焉五代史後唐書曰膳部郎中鄭兟先奏諸司諸使職掌人吏乗暖坐帶銀魚席帽輕衣肥馬叅􅄂庭臣尊卑無别汙染時風請下禁止上嘉其事促行之中書覆爲不可趙鳯亟言於執政曰此禮誡人不可不切爲權吏所庇竟寢其事工部尚書工部侍郎六典曰工部尚書侍郎之職掌天下百工屯田山澤之政令其屬有四一曰工部二曰屯田三曰虞部四曰水部揔其職務而行其制命凡中外百司之事由於所屬咸質正焉隋書曰長孫平爲工部尚書名爲稱職時有人告大都督邴紹非毀朝廷爲憒憒者上怒將斬之平進諫曰川澤納汙所以成其深山嶽藏疾所以就其大臣不勝至願願陛下􅀪山海之量茂寛􅁉之德鄙諺曰不癡不聾未堪作大家翁此言雖小可以喻大邴紹之言不應聞奏陛下又復誅之臣恐百代之後有虧聖德上於是赦紹唐書曰閻立夲代兄立德爲工部尚書兄弟相代爲八座時論榮之五代史晉書曰裴皥知貢舉擢桑維翰進士第後維翰居相位徴拜皥工部尚書舎於相國寺維翰謁之不迎不送或問之荅曰皥見維翰於中書則庶寮也維翰見皥於館則門生也何送迎之有人重其耿介五代史周書曰盧文紀嗣業之子爲工部尚書時新除工部郎中于鄴公叅文紀文紀以父名同音不見或謂鄴曰南宫故事郎中入省如夲行尚書侍郎不容叅何以省上鄴憂畏太過一夕醉歸遂經于室其甥鄭鐐以事聞謫文紀爲石州司馬工部郎中工部貟外郎六典曰工部郎中貟外掌經營興造之衆務凡城池之脩濬土木之繕葺工匠之程式咸經度之凡興建修築材木二匠則下少府將作以奉其事屯田郎中屯田貟外郎六典曰屯田郎中貟外郎掌天下屯田之政令凡軍州邊防鎭守轉運不給則設屯田以益軍儲其水陸􅃾瘠播植地冝功庸煩省收率等咸取決焉諸屯田役力各有程數三國典略曰裴讓之十七舉秀才爲屯田郎中與祖班俱聘宋邢劭省中語曰多竒多能祖孝徴能賦能詩裴讓之讓之弟讞之謀之訥之謁之並清立楊愔曰河東士族京官不少裴讓兄弟都無郷音裴文季爲不亡也隋書曰栁彧爲屯田郎時三品以上門皆列㦸左僕射髙頴子􅀪德封應國公申牒請㦸彧判曰僕射之子更不異居父之㦸槊已列外門尊有厭卑之義子有避父之禮豈有外門旣設内閤又施事竟不行頴聞而歎伏唐書曰沈扶字雲翔太和初爲屯田郎中五年充山南道宣撫使至鄧州奏内郷縣行市黄澗兩場倉督鄧琬等先主掌湖南江西運到糙米至浙川縣於荒野中囤貯除支用外六千九百四十五石裛爛成􅁅塵度支牒徴元掌所由自貞元二年鄧琬父子兄弟至􅀇孫相承繫二十八年前後禁死九人今琬孫及􅀇孫見在枷禁者勑曰如聞鹽鐵度支兩使此􅀋極多其鄧琬等四人資産全巳賣納禁繫三代瘐音􅁃死獄中實傷和氣鄧琬等並䟽放天下州府監院如有此􅀋不得禁經三年巳上速便䟽理以聞物議嘉扶有宣撫之才虞部郎中虞部貟外郎六典曰虞部郎中貟外郎掌天下虞衡山澤之事辨其時禁凡採捕畋獵必以其時水部郎中水部貟外郎六典曰水部郎中貟外掌天下川瀆陂池之政令以導逹溝洫堰坎河渠凡舟檝漑灌之利咸揔而舉梁書劉孝綽兼尚書水部郎奉啓陳謝手勑荅曰美錦未可便製簿領亦冝稍習頃之即眞太平御覽卷第二百一十八
