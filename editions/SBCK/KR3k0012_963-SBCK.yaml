front:
  text: 太平御覽卷第九百六十三
  hash: sha256:936b662b14bb4cf6283a13961c881f9beb51123f2a6d14e4bf3d8659c5679bb5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_963-1a}
body:
  text: 竹部二竹下筍附桂竹箭竹桃枝竹篁竹䈥竹鈎端竹笻竹種龍竹雲母竹㰚竹􅓁竹狗竹篃竹由梧竹班皮竹篔簹竹苦竹射同竹沙麻竹石麻竹笣竹雞頸竹籚􅓁竹䈄竹莽竹㔂竹簢竹仲竹􅤈竹漢竹利竹林於竹晉竹沛竹棘竹䈏竹弓竹簜竹筍桂竹山海經曰雲山有桂竹甚毒傷人必死郭璞曰始興小桂縣出桂竹也箭竹爾雅曰東南之美者有㑹稽之竹箭焉禮記曰禮之於人也如竹箭之有筠也事具禮部􅀃文曰箭矢竹也戴凱之竹譜曰箭竹髙者一丈節間三尺堅勁中爲矢桃枝竹爾雅曰桃枝四寸有節今桃枝節間相去多四寸竹譜曰桃枝竹皮滑而黄可以爲席山海經曰嶓冢之山􅅝水之上多桃枝竹裴氏廣州記曰有桃竹魏志曰倭國有桃枝竹篁竹竹譜曰篁竹似桂而槪節䈥竹竹譜曰䈥竹長二丈許圍數寸至堅利出日南九真􅀯方以爲矛其筍未成竹時堪爲弩絃見徐􅂨南中奏劉淵林云夷人以史篻音瓢竹爲矛即是䈥竹一物而二名者也永嘉郡記曰陽興去安固江口六十五里有仙石山頂上有平石辟方十餘丈名爲仙壇壇陬有一䈥竹凡有風來動音自成宫啇周景式廬山記曰康皇溪道士種松及䈥竹竿笁法真登羅山䟽曰嶺南道無䈥竹唯羅山有之其大尺圍細者色如黄金堅貞踈節異苑曰東陽留道先元嘉四年䈥竹林忽生連理野人無知謂爲楇祟斫殺之鈎端竹山海經曰嶓冢之山􅅝水之北多鈎端竹笻竹漢書曰張騫至大夏見笻竹杖問之云賈人市之身毒國山海經曰􅀛山多狹竹郭璞曰即笻竹竹譜曰笻竹髙節實中狀􅀂人剡俗謂之扶老竹廣志云出南廣卭都縣羅浮山記曰卭竹本出卭山張騫西至大夏所見也而此山左右時有之郷老多以爲杖種龍竹廣志曰種龍竹任作笛吕氏春秋曰昔黄帝命伶倫爲律伶倫自大夏之西沅渝之隂取竹之嶰谷斷兩節間長六寸九分而吹之以爲黄鍾之宫律之本也竹譜曰種龍竹伶倫所伐雲母竹廣志曰雲母竹大竹也㰚竹廣志曰㰚竹細而多㓨􅓁竹廣志曰􅓁竹任作笛嶺表録異曰􅓁簩竹皮薄而空多大者俓不逾二寸皮上有麤澁文可爲錯子錯甲利勝於鐵􅀂鈍以漿水洗之還復快利廣州記云石麻之竹勁而利削爲刀割象皮如切竿狗竹竹譜曰狗竹節間有毛出臨海篃竹竹譜曰篃竹江漢間謂之箭竿一尺數節葉大如扇可以衣蓬江漢之間謂之􅞴竹音蒯由梧竹南方草木狀曰由梧竹吏民家種之長三四丈圍一尺八九寸作屋柱出交阯林邑記曰由梧堪爲屋梁柱左思吴都賦曰由梧有篁班皮竹愽物志曰洞庭虞帝之二女啼以涕揮竹竹盡班今下雋有班皮竹篔簹音芸當顧微廣州記曰箄竹一名篔簹節長一丈呉録曰始興曲江縣有篔簹竹圍尺五寸節相去六七尺夷人以爲布葛異苑曰建安有篔簹竹節中有人長尺許頭足皆具竹譜曰篔簹竹大者中作甑苦竹永嘉郡記曰樂成縣民張廌者隱居頥志不應辟命家有苦竹數十頃在竹中爲屋恒居其中王右軍聞而造之廌逃避竹中不與相見一郡號爲髙士射筒竹竹譜曰射筒竹薄肌而長中着箭因以爲名沙麻竹南越志曰沙麻竹人削以爲弓弓似弩淮南所謂溪子弩也或曰􅂫麻竹或曰麤麻竹嶺表録異曰沙摩竹廣桂皆植大如茶盌竹厚而空小一人止擎一莖堪爲茅屋之椽梁也其種者即釤其竿毎截二尺許釘入土不逾月而生根葉明年長牙笋不三載而爲林盖土地所冝也南人俺以塩爲笋笴石麻竹裴淵廣州記曰石麻竹勁利削爲刀切象皮如截芋笣竹頋微廣州記曰平鄉縣有笣竹堪作布吴都賦曰笣筍抽節徃徃縈結雞頸竹竹譜曰雞頸竹篁之􅀋纎細大者不過如指踈葉黄皮強脆無所堪施筍美青班色緑江山崗所饒也籚􅓁竹竹譜曰此竹當是蘆出楊州東垂諸郡浙江以東可以爲箎䈄竹竹譜曰䈄墮竹大如脚指蟲食其筍皮􅀋綉甚可愛莽竹爾雅曰莽數節節間促也㔂竹爾雅曰㔂音􅈔堅中竹􅀋其中實也簢竹爾雅曰簢音閔筡音徒中其中空也仲竹爾雅曰仲無笐亦竹􅀋未詳音航􅤈竹禮斗威儀曰君乗水而王其政太平􅤈紫脫爲常生壬子年拾遺記曰岑華山在西海之西有􅤈竹爲簫管吹之􅀂群鳯之鳴漢竹廣志曰永昌有漢竹圍三尺餘利竹廣志曰西南出利竹林於竹竹譜曰林於竹葉薄而廣晉竹吴越春秋曰吴王聞越王盡心自守賜之以書増之以封越王乃使大夫賫葛布十萬狐皮五􅀟晉竹十􅁃以荅封禮沛竹東方朔神異經曰南方荒中有沛竹其長百丈圍二丈五六尺厚八九寸可以爲舡其子美食之可以巳瘡癘張茂先曰子笋也􅁄竹竹譜曰􅁄竹生交州諸郡藂生􅀄有數十莖大者二尺圍肉至厚幾於實中夷人破以爲弓枝節皆有㓨彼人種以爲城卒不可攻萬震異物志所謂種爲藩落阻過曽墉者也或卒倒根岀大如十石物從横相承􅃺如繰車一名笆竹見三倉筍味落人􅁂髪沈懷逺南越志曰宋昌縣有􅁄竹長十㝷大如甕其間短者輙六七丈也爲竹藂薄葉下有鈎刺或有條末如芒針南州異物志曰􅁄竹節有􅁄刺嶺表録異曰南土有刺竹即枝上有刺南人呼刺爲刺勒自根橫生枝條展轉如織雖野火焚燒只燎細枝嫰葉春藂生轉復牢宻邕州舊以刺竹爲墻蠻蜒來侵竟不能入䈏竹竹譜曰䈏與由衙厥體俱洪圍或累尺䈏實衙空南越之居梁柱是供異物志曰有竹曰䈏其大數圍節間相去局促中實滿堅強以爲屋榱断截便以爲棟梁不復加斤斧也弓竹竹譜曰弓竹出東垂諸山簜竹尚書禹貢曰篠簜旣敷爾雅曰簜竹竹别名也儀禮曰蕩竹在建鼓之間謂筲管之属筍爾雅曰筍竹萌􅀄生者毛詩韓弈曰其蔌維何維筍及蒲筍竹萌也周禮天官醢人曰加豆之實箈菹筍菹箈箭萌也筍竹萌也東觀漢記曰馬援至荔浦見冬筍名笣筍上言禹貢厥笣橘柚疑謂是也其味羙於春夏筍續晉安帝紀曰豫州刺史司馬尚之爲桓玄將馮該所攻倉儲稍竭外白戰士多飢悉未付食是時蘆筍時也尚之指筍曰且噉此足解三日將士離心遂敗吕氏春秋曰味之美者越駱之髙誘曰筍也華陽國志曰何隨字季葉有竹園人盗其筍者隨行見之恐驚乃挈履而歸荆州圖曰茿陽薤山上有􅀌竹三年而生一笋笋成代謝常一楚國先賢傳曰孟宗字恭武至孝母好食竹笋宗入林中哀號方冬筍爲之出因以供養時人皆以爲孝感所致南史曰沈道䖍有人㧞其屋後笋令人止之曰惜此笋欲令成林更有佳者相與乃令人買大笋送與盗者慙不取道䖍使置其門内而還笋譜曰笋者竹之蒻也竹之醜節種凡草木有白蒻嫰而堪食者皆曰白蒻世同蔗属厥性弱於木而強於草實草木中別􅀋也陸􅀛􅂪笋賦曰洪纎靡定方圎不均南方有方竹太平御覽卷第九百六十三
