front:
  text: 太平御覽卷第七百四
  hash: sha256:af8bcc619470f7116c0c4229e3c54460dd2f6400db9ff6d68574f2cf17c40462
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_704-1a}
body:
  text: 服用部囊帊幞囊說文曰囊謂橐也橐車上大囊也方言曰自􅀜而西食囊謂之掩囊周易坤卦六四曰括囊無咎象曰括囊無咎愼不害也焦贛易林歸妹之損曰争鷄失羊亡其金囊利得不長毛詩公劉曰廼裏餱糧于橐于囊公羊傳哀公曰齊景公死舎立陳乞迎陽生使力士舉巨大也囊而至開之則公子陽生也乞曰此君也諸大夫皆再拜稽首自是往殺舎史記曰韓信巳定臨淄楚使龍且救齊夾睢水陣韓信乃夜令人爲萬餘囊盛沙以壅水上流引軍半渡擊龍且佯不勝遂走龍沮追信信渡水使人决壅水大至急擊殺龍且戰國䇿曰荆軻逐秦王時侍醫夏無且以樂囊提軻提擊也漢書曰陸賈使尉佗佗賜賈囊中裝直千金又曰東方朔曰侏儒長三尺奉一囊粟錢二百四十朔長九尺餘亦一囊粟錢二百四十侏儒飽欲死臣朔飢欲死又曰楊王孫病且終先令其子曰吾欲臝葬以反吾真死則爲布囊盛入地七尺旣下從兄脫其囊以身親士又東方朔傳曰文帝集上書囊以爲殿帷又曰張安丗持囊簪筆事孝武數十年見謂忠謹囊挈橐也近臣􅀒也又曰邴􅁻馭吏嘗知邊塞吏岀適見驛持赤白囊邊郡發犇命書馳來至虜入雲中代郡遽歸府見􅁻白狀又曰成帝許美人乳詔使婢嚴持乳醫及藥篋至美人所後詔使嚴持緑囊書與許美人告嚴曰美人當有以予女受來置飾室中美人葦篋一合盛所生兒死緘封及緑囊報書予嚴又曰王陽好車馬衣服鮮明而遷徙轉移所載不過囊槖時人怪其奢伏其儉故俗傳王陽能作黄金東觀漢記曰岑彭與呉漢圍隗􅅝壅谷水以縑囊盛土爲堤灌西城後漢書張湛傳曰光武嘗召見諸郡計吏問前後守令能否蜀郡計􅁺樊顯曰漁陽太守張堪昔在蜀仁以惠下威能討姦前公孫述破時珎寳山積捲握之物足冨十丗而堪去職之日乗折轅車布􅀍囊而巳范曄後漢書曰楊琁爲零陵太守以緋囊盛石􅁅於車上繫布索於馬尾㑹戰從風鼓􅁅賊不得視因以火燒布布燒馬驚奔突賊陣又曰和熹鄧后臨朝杜根以安帝長冝親政事乃上書直諌太后怒収根盛以縑囊撲殺之執法者以根知名私語行事人使不加力而載出城外根得􅂫典略曰馬略爲司􅊢督軍從事討郭援爲飛矢所中乃以囊褁其足而戰斬援首詔拜徐州刺史魏略曰大􅁗國王有五宫相去各十里王一旦至一宫聽事止􅀫明旦復至一宫遍而還出行常以一韋囊自隨有上言者収辭囊中還宫乃省之呉録曰歩騭表言北降王潜等􅀃北箱部伍圖以東向多作布囊欲以盛沙塞江孫權見吕範諸􅁑恪云毎讀騭表輙獨失􅀏此江與開闢俱生寧有可囊塞埋乎王隱晉書曰􅀥嵩用事於王浚時謡曰十囊五囊入􅀥郎晉中興書曰孫恩敗以囊簏盛嬰兒投之於外而告之曰賀汝先登仙堂我㝷而後就汝晉書曰郭公居河東精卜筮郭璞從而受業公以青囊中書九卷與之璞由是洞曉其術宋書曰呉郡人陳遺少爲郡吏母好食鐺底飯遺在役恒帶一囊毎煑食輙録其燋以貽母陳書曰後主怠於政事每啓奏後主􅀝隱囊置張貴妃於膝上共决之隋書曰張䖍威嘗在塗見一遺囊恐其主求失因令左右負之而行後數日物主來認悉以付之莊子曰人而不學命之曰視皮學而不行命之曰輙囊輙囊又曰將爲胠篋探囊發匱之盗而爲守備則必攝緘縢固扄鐍此丗俗所謂智也然巨盗至則􅀒匱掲篋擔囊而趨唯恐緘縢之不固也淮南萬畢術曰鴻毛囊之可以渡江盛鴻毛滿囊可渡江不溺也東宫舊事曰太子納妃有絳石綺絹裏􅀍囊一丹羅長命綺絹裏椀囊一紫綦文綺絳絹裹椀囊二晉中經簿曰盛書皁縹囊書函中皆有香囊二丗說曰謝玄年少時好着紫羅香囊垂覆手太􅀓患之而而不欲傷其意乃鐍與戲賭得即燒之語林曰劉承胤少有淹雅之度王􅁃温公皆素與周旋聞其至共載㸔之劉􅀝􅀍囊了不與王公言神味亦不相酬俄頃賔退王􅁃甚怪此意未能解温曰承胤好賄􅀍下必有珍寳當有市井事令人視之果見向囊皆珍玩焉與胡父諧賈諧賈賛鬻又曰石崇厠内兩婢持錦囊是籌也俗說曰何承天顔延年俱爲郎何問顔曰藿囊是何物顔荅曰此當復何解耶藿囊將是卿言腹中無所有純是藿此是丗俗相調之辭也西京雜記曰惠帝與趙王同寢處后殺之不得後帝早獵后命力士於􅀍中搤殺之乃死吕后不信以緑囊盛之載以小軿車入見厚賜之力士東都門外官奴帝後知􅆎斬之拾遺録曰􅂫􅁗張儀二人假食於路剥樹皮爲囊以盛天下良書又曰燕昭王夢西方羽人從雲中來曰大王精智未開求恒生乆視之觀不可得也以指畫王心應手而裂王乃驚悟血濕於􅁭王復見所夢人曰本欲易王之心乃出方寸緑囊囊中有續脉石名丸􅀘血精散摩主之臆俄而即愈又曰石虎爲浴臺皆用鍮石珷玞爲隄岸或以虎魄車渠爲缾杓夏則自渠水以内池池中皆紗縠爲囊盛百雜香漬於水裏王肅䘮服要記曰昔魯哀公祖載其父孔子問曰寧設五穀囊乎哀公曰五􅂖囊者起伯夷叔齊讓國不食周粟而餓首陽之山恐魂乏飢故作五􅂖囊吾父食味含哺而死何以此爲國語曰呉王殺申胥盛以鳲鴺而投之於江鳲鴺革囊春秋後語曰趙王使平原君入楚求其從約其客有文武者二十人偕得十九人未有可以備二十者毛遂請行平原君曰賢士處丗譬如錐之處囊其鋒立見今先生處勝門下三年無所聞是先生無所能也遂曰臣乃今日請處囊中耳若早處囊中乃頴脫而出非特末見也平原乃許與偕江表傳曰魏太祖與馬超單馬㑹語超􅀒其多力嘗置六斛米囊東西走馬輙製米囊以量太祖輕重太祖尋知之曰幾爲狡虜所欺漢武内傳曰帝見三母有一卷書盛以紫錦之囊母曰此吾真形圖也曹暪傳曰操性佻易自佩小鞶囊盛手巾細物益部耆舊傳曰閻憲字孟度爲綿竹令男子杜成行於路得遺裝囊開視有錦帛二十五疋明送詣吏汝南先賢傳曰范滂􅀍詰受幾許􅂍賕滂曰曽爲北部督郵汝陽令有記囊表裹六尺若以此爲􅂍􅂍直六十耳郭文舉别傳曰文舉河内人也懷帝未濟江至餘杭市賣箭箬易塩米以樹皮作囊得米塩以内囊中裴淵廣州記曰州㕔事梁上􅀞五羊象又作五榖囊隨象懸之云昔髙固爲楚相五年衘穀萃於楚庭因是圖其象荆楚歳時記八月民俗以錦綵爲眼明囊記曰赤松子此日以囊承栢樹下露以爲相貽或以金薄爲之遞相餉遺幽明録曰習鑿齒爲荆州主簿從桓宣武出獵見黄物射之即死是老雄狐臂帶絳綾香囊又曰廣陵韓略將下馬􅁴鞭重見有緑錦囊中有短卷書着鞭鞘皆不知所從來開視之故榖􅁓祝經乃丗之常聞也異苑曰信安鄭微年少時見人遺一囊云中有物欲碎便爲凶兆微宻開看乃是一挺炭意甚祕之年八十病篤語子弟云吾齒老矣可試啓此囊見炭悉碎折於是遂死趙一􅁗客詩曰文籍雖滿腹不如一囊錢宋劉義㳟啓曰垂賜金虎魄茱茰囊七寳校裝玉眼明囊帊幞通俗文曰帛三幅曰帊帊衣曰幞職官曰尚書郎入直中宫供青縑曰綾幞晉中興書曰陸納爲呉興太守徴拜左右尚書臨發止留􅀍幞餘悉還官梁書曰張譏㓜䘮母有錯綵絲經帕即母之遺製及有所識家人具以告之毎歳時輙對帕哽咽不能自勝南史曰􅀜康之寓居南平昌特進顔延之等當時名士十許人入山候之見其散髮􅀍黄布帊而卧了不相眄延之等咨嗟而退不敢干也北史曰後魏元文旣專政於禁中自作別庫掌握之珎寳充牣其中又曽卧婦人於食輿以帊覆之令人輿入禁内出亦如之直衛雖知無敢言者東宫舊事曰皇太子納妃有絳綾裹幞帊五具絹裹帊五太平御覽卷第七百四
