body:
  text: 樂部十五琴上􅀃文曰琴禁也神農所作洞越練朱五絃周加二絃毛詩關睢曰窈宨淑女琴瑟友之注曰冝以琴瑟友樂之箋云賢女乃與琴瑟之志同也又鄘栢舟定之方中曰樹之榛栗椅桐梓􅃮爰伐琴瑟又甫田車轄曰四牡騑騑六轡如琴箋云御群臣使之有禮如御四馬騑騑然使之均調緩急和也又緇衣雞鳴曰琴瑟在御莫不静好禮記曲禮曰先生之書篋琴瑟在前坐而遷之戒勿越也又曲禮下曰士無故不去琴瑟又明堂位曰拊􅅮玉磬揩擊大琴中琴四代之樂器也又檀弓上曰子夏旣除䘮而見於孔子與之琴和之而不和彈之而不成聲樂由人心作而曰哀未忘也子張旣除䘮而見與之琴和之而和彈之而成聲作而曰先王制禮不敢不至也又檀弓上曰顔淵之䘮饋祥肉孔子出受之入彈琴而後食之彈琴以徹哀也又曰􅁝聲哀哀以立㢘㢘以立志君子聽琴瑟之聲則思志義之臣又雜記曰下大功至辟琴瑟周禮曰雲和之琴冬至日於地上圎丘奏之空桑之琴夏至日於澤中萬丘奏之龍門之琴於宗廟奏之左傳曰􅀄穆姜使擇羙檟自以爲櫬與頌琴又曰晉侯觀于軍府見鍾儀問其族曰伶人也與之琴操南音公曰君子也言稱先職不背夲也樂操土風不忘舊也又曰􅀄衛侯有嬖妾使師曹誨之琴師曹鞭之公怒鞭師曹三百爾雅云大琴曰離二十絃或傳此是伏羲所制周書曰鄒忌以皷琴見齊威王威王恱之舎之右室須􅁷王自皷琴鄒忌推户久曰善哉皷琴也王悖然不恱去琴按劒曰夫子見之未察何以知其善忌曰大絃濁以温小絃廉折以淸推之􅀷而釋之舒均諧以鳴大小相盖回邪而不相害是知其善忌復曰不獨語音夫治國家弭人民皆在其中王又悖然不恱曰􅀂語五音紀信未有如夫子者也􅀂治國家弭人民皆在其中又何爲􅁝桐之間忌曰大絃急以温者君也小絃㢘折以清者相也推之􅀷釋之舒者刑罰審也均諧之鳴者政令一也大小相盖回邪不相害者上下和鳴吏民相親也夫復而不亂者所以治昌連而徑者所以存亡故曰琴音調而天下治治國家弭人民無􅀂乎五音者矣王曰善忌見三月而受相印淳于髠謂忌曰髠有愚志願陳諸前忌曰謹受教髠曰得人者昌失人者亡忌曰謹受命請無觀髠曰狢膏􅁄軸所以爲猾然而不能運方穿忌曰謹受命請事左右髠曰弓膠腊幹所以爲勢然而不能􅀓合踈逺忌曰謹受命請謹自撫附萬民髠曰狐裘雖􅁦不可􅀘以黄犬之皮忌曰謹受命謹請擇君子無親小人髠曰大車無轂不能載常任琴瑟無軫不能成五音忌曰謹受命請謹修法律而督姦吏髠􅀃畢趍出至門而眄其僕曰是人者吾語之微言其應我如響之應聲是人封不乆矣居朞年封於下邳号曰成侯史記曰箕子諌紂不聽而􅀍髮佯狂爲奴隠而皷琴以自悲又曰司馬相如素與臨卭令王􅁻相善臨卭冨人卓王孫有女文君新寡好音相如謬與令相重而以琴心挑之相如始之臨卭車􅀐雍容閑雅甚都及飲卓氏弄琴文君􅀼從户窺之心恱恐不得當也又曰荆軻左把􅁗王右揕其胷王乞聽琴而死召􅁎人皷琴聲曰羅縠單衣可裂而絶八尺屏風可超而越鹿盧之劒可􅀒而拔王奮而去又曰黄帝使素女皷五十絃琴帝悲不能自禁破爲二十五絃又曰萬石君奮年十五爲小吏侍髙祖與語愛其恭敬問曰􅀂何有對曰獨有母不幸失明有姉能皷琴髙祖乃召其姉爲美人以奮爲中㳙徙其家長安中戚里東觀漢記曰上甞問宋弘道通之士弘薦桓譚譚善皷琴喜鄭聲上數聽恱之弘聞坐府上遣吏召譚責問之譚叩頭良乆乃遣後上令譚皷琴譚爲之失次上問之弘言其故故不復令譚給事後漢書曰􅀄蔡邕在陳留鄰人有以酒食召邕者比徃而酒巳酣客有彈琴於屏邕至門潜聽之曰以樂召我而有殺心何也遂返將命者告主人曰蔡君至門而去邕素爲􅀖郷所宗主人遂自追問其故邕具以告莫不憮然彈琴者曰我向見螳蜋方向鳴蟬蟬將去而未飛螳蜋爲之一前一却吾心聳然唯恐螳蜋之失蟬也此豈爲殺心而形於聲乎邕歎曰此足以當之矣又曰蔡邕字伯喈陳留人性沉審志好琴道以嘉平元年入清溪訪􅀑谷先生所居山五曲曲有幽居靈跡每一曲制一弄三年曲成出呈馬融王元董卓等異之晉書曰王敬伯㑹稽餘姚人洲渚中昇亭而􅀫是夜月華露輕敬伯皷琴感劉惠明亡女之靈告敬伯就體如平生從婢二人敬伯撫琴而歌曰低露下􅀷幕垂月照􅀌琴空絃益霄淚誰憐此夜心女乃和之曰歌宛轉情復哀願爲煙與霧氛氲同共懷晉書曰阮瞻善彈琴人聞其能多徃來聽不問貴賤長㓜皆爲彈之神氣冲和不知向人所在内兄潘岳每令皷琴終日逹夜無忤色晉中興書曰戴逵字安道少有文藝善皷琴太宰武陵王晞聞其能琴使人召焉逵對使者破琴曰戴安道不爲王門伶人晞怒乃更引其兄􅄒􅄒亦能樂聞命忻然操琴而徃逵不樂當丗以琴書爲娱不逺千里宋書曰蕭思話領左衛將軍甞從太祖登鍾山北領中道有盤石清泉上使於石上彈琴因賜以銀鍾酒謂曰相賞有松石間意又曰衡陽王義季鎮京口長史張邵與戴顒姻通近來止黄鵠山林澗甚美顒憩於澗義季亟從之遊顒衣野服爲義季皷琴並新聲變曲皆與丗異也又曰衡陽王義季鎮京口戴顒爲義季皷琴並新聲曲其三調遊絃廣陵止息之流皆與丗異太祖毎􅁒見之甞謂黄門侍郎張敷曰當讌戴公山也以其好音長給正聲􅇊一部顒合何當白鵠二聲以爲一調号爲清曠又曰陶潜不解音聲而畜素琴一張毎有酒適輙撫弄以􅀉其意蕭子顯齊書曰王仲雄善彈琴當時妙絶江左有蔡邕焦尾琴在王衣庫上勑五日一給仲雄又曰尚書令柳丗隆少立功名晚專以談義自業善彈琴丗稱柳公􅀟璅爲十品第一常自云馬矟第一清談第二彈琴第三在朝不取丗務垂簾皷琴風韻清逺甚􅀗丗譽家語曰孔子學琴於師襄子襄子曰吾雖以擊磬爲官然能於琴子琴巳習可以益矣孔子曰丘未得其爲志也又問曰巳習其志可以益矣孔子曰丘未得其爲人也又問曰子有所􅓎然􅀷思焉繆然􅀷思皃也有所皇然髙望而逺眺眺見曰丘殆得其爲人矣始近黮然黒黮黒皃也頎然長頎長皃也曠然如望羊曠然用志曠逺也望逺也望羊視逺奄有四方奄同也文王時三分天下有其二後周有四方文王之功上也非文王其孰能爲此師襄子避席攝拱而對曰攝拱兩手薄心君聖人也其傳曰文王操又曰子路皷琴孔子聞之謂冉有曰甚矣由之不才也夫先王之制音也奏中聲以爲節流入於南不歸於北夫南者生育之郷北者殺伐之域也故君子之音温和居中以飬生育之氣憂愁之感不加乎心􅁀厲之動不存乎禮夫然者乃所以爲治安之風也小人之音則不然亢厲微末以象殺伐之義中和之感不載乎心温和之動不存於躰夫然者乃所以爲乱亡之風家語曰伯牙皷琴鍾子期聽之方皷而志在太山鍾子期曰善哉乎皷琴巍巍乎􅀂太山少選之期而志在流水鍾子期復曰善哉乎皷琴湯湯乎􅀂流水鍾子期死伯牙破琴絶絃終身不復皷琴以爲丗無足爲皷琴者莊子曰孔子窮於陳蔡七日不食絃歌皷琴又曰孔子遊於緇帷之林休坐杏壇之上弟子讀書孔子絃歌皷琴奏曲未半有父者下􅂳而來孔子推琴而起曰其聖欤列子曰瓠巴皷琴鳥舞魚躍鄭師文聞之從師襄三年不成無幾見師襄曰乆得之矣於是當春而叩啇絃以召南吕凉風惣至草木成實秋而叩角温風徐廻草木發榮夏而叩羽霜雪交下川池􅁀涸冬其叩徴陽光熾烈堅冰立散將終而四景風翔慶雲浮甘露降醴泉湧前􅁗録曰符堅末年好色寵幸鮮卑有趙整者援琴歌曰昔聞盟津河千里作一曲此水夲清白是誰乱使濁又曰北園有􅀥樹布葉垂重隂外雖多􅁄刺内實有赤心丗􅀃曰王子猷病篤而子敬先亡猷問左右曰何以都不聞消息此以䘮矣語時了不悲便索轝臨殯子敬好琴故以置棺中因大慟曰所謂人琴俱亡於是乃絶風俗通曰今琴長四尺五寸者法四時五行七絃者法七星大絃爲君小絃爲臣文王武王加二絃以合君臣之恩劉向列仙傳曰子主者不知何許人也言寗先生雇我一百餘年不還直詣江都王陳辭先生居龍首彈琴是我隣家九代孫琴操曰伏羲作琴長三尺六寸六分象三百六十日也廣六寸象六合也文上曰池下曰宕池水平也前廣後狹象尊卑也上圎下方法天地五絃官也大絃君也寛和而温小絃臣也清廉不亂文王加二絃合君臣恩也宮爲君啇爲臣角爲民徴爲事羽爲物傳玄琴賦叙曰齊桓有鳴琴曰號鍾楚㽵王有琴曰繞梁司馬相如有緑綺蔡邕有焦尾皆名器也蔡邕焦尾有證甚多相如政取古名目琴耳無其事也不異号鍾丗􅀃曰頋彦先平生好琴死後置琴床上張翰直上床彈琴不與孝子語而去語林曰嵇中散夜燈下彈琴忽有一人面甚小斯湏轉大遂長丈餘單衣革帶嵇視之旣熟乃吹燈滅之曰耻與魑魅争光阮籍樂論曰漢桓帝聞楚琴悽愴傷心􅀝户而悲慷􅁣長息曰善哉爲琴􅀂此而足矣􅀃苑曰應侯與賈子坐聞皷琴聲應侯曰今日琴一何悲也賈子曰夫張急調下故使之悲耳因張者良材也調下者官卑也取夫良材而卑之官安能無悲乎應侯曰善楊雄琴清英曰晉王謂孫息曰子皷琴能令寡人悲乎息曰今處髙䑓邃宇連屋重户藿肉漿酒倡樂在前難可使悲者乃謂少失父母長無兄嫂當道獨坐暮無所止如此者乃可悲耳乃援琴而皷之晉王酸心哀涕曰何子來遟也蔡邕女訓曰舅姑􅀂命之皷琴必正坐操琴而奏曲􅀂問曲名則捨琴興對曰某曲坐􅀂近則琴聲必聞􅀂逺左右必有賛其言者凢皷小曲五終則止大曲三終則止無數變曲無多少尊者之聽未猒不敢早止􅀂頋望視也則曲終而後止亦無中曲而息也琴必常調尊者之前不更調張􅀻室􅀂近舅姑則不敢皷獨􅀂絶逺聲音不聞皷之可也皷琴之夜有姉妹之宴則可也通禮纂曰堯使無勾作琴五絃江表傳曰頋雍少從蔡伯喈學皷琴伯喈貴異之謂曰卿成必早故以名與卿雍伯喈同名由此蔡邕月令章句曰凢絃急則清慢則濁白虎通曰琴禁也以禁止􅁋邪正人心也韓詩外傳曰孔子南遊適楚至於阿谷之隧有處女珮横而浣孔子曰彼婦人可與言矣抽琴去其軫以援子貢曰善爲之辝以觀其辝子貢曰於此有琴而無軫願借子以調其音婦人對曰吾野鄙之人也僻陋而無心五音不知安能調琴子貢致其辝孔子曰丘知之矣山海經曰帝俊生晏龍始爲琴瑟又曰東海之外大壑少昊孺帝顓頊於此棄其琴瑟郭璞曰孺義末詳也蔡琰別傳曰琰字文􅁎陳留人漢左中郎將蔡邕之女少聦惠秀異年六歳邕夜皷琴絃絶琰曰第二絃邕故断一絃而問之琰曰第四絃邕曰偶得之耳琰曰吴札觀化知興亡之國師曠吹律識南風之不競由此言之何不足知也馬明生別傳曰明生隨神女入石室金床玉几時自彈琴有絃五音普奏聞於數里幽明録曰劉琮善琴忽得困病許遜曰近蔣家女􅀑相録在山石間專使彈琴作樂恐欲致灾也琮曰吾常夢見女子將吾宴戯恐必不免遜􅀏曰蔣姑相愛重恐不能相放耳以爲誄之今去當無患也琮漸差文士傳曰嵇康臨死顔色不變謂其兄曰向以琴來不兄曰巳至康取調之爲太平引曲成歎息曰太平引絶於今日耶捜神記曰吴人有燒桐以㸑者蔡邕聞其爆聲曰此良桐也因請之削以爲琴而燒不盡因名燋尾琴有聲也楊雄琴清英曰昔者神農造琴以定神齊媱僻去邪欲反其天眞者也舜彈五絃之琴而天下治堯加二絃以合君臣之恩也太平御覽卷第五百七十七
