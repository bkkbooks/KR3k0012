front:
  text: 太平御覽卷第五百一十三
  hash: sha256:68147407150b8419dd85aae8aea25c5f480d1a27f830b3bab5052308ea61789d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_513-1a}
body:
  text: 宗親部三伯叔母從伯叔族父姑伯叔母爾雅曰父之兄妻爲丗母父之弟妻爲叔母禮記曽子問曰婚禮吉旣納幣有􅁻日女之父母死則如之何孔子曰壻使人吊如壻之父母死則女之家亦使人弔父䘮稱母父母不在則稱伯父之丗母又􅄂記曰孔子曰伯母叔母䟽衰踊不絶地姑姉妹之大功踊絶於地如知此者由文矣哉家語曰孔子之舊人曰原壤其叔母死夫子將助之以木子路曰由也昔聞諸夫子母友不如巳者過則勿憚改姑巳如何姑且巳止孔子曰凡人有䘮匍匐救之况舊故非友同志乃爲友故友非舊友吾其徃及之爲槨原壤登木曰乆矣予之不託於音也遂歌曰狸首之班然執女手之卷然夫子爲之隱陽不聞以過之子路曰夫子屈節而極於此失其舉矣豈未可巳乎孔子曰吾聞之親者未失其爲親也故者未失其故也禮記亦載稱原壤之母也蜀志曰許靖字文休汝南平輿人也靖與曹公書曰丗路威夷禍亂遂爾駑怯偷生自竄蠻貊成闊十年􅁻凶禮廢涉南海循岸渚五千餘里復遇疫疾伯母殞命并及群從自諸妻子一時略盡復相扶持前到此郡追計爲兵害及病亡者十遺一二生民之艱辛苦之甚晉書曰羅含字君章桂陽人也含㓜􅀌爲叔母朱氏所飬少有志尚晝卧夢一鳥文彩異常飛入口中因驚起􅀃之朱氏曰鳥有文彩汝後必有才章自後藻思日新又曰餘杭婦人經年荒賣其子以活夫之兄子吴興太守孔褒薦之又曰皇甫謐字士安㓜名静安定朝郍人漢太尉嵩之曽孫也出後叔父徙居新安年二十不好學遊蕩無度甞得􅀲果輙進叔母任氏任氏日孝經云二牲之飬猶爲不孝汝今年餘二十目不存教心不入道無以慰我因歎曰昔孟母三徙以成仁曽父烹豕以存教豈我居不卜鄰教有所闕何爾魯鈍之甚也修身篤學自汝得之於我何有因對泣涕謐乃感激就卿人席坦受書勤力不殆居貧躬自稼穡帶經而農遂􅀶綜典籍百家之言自號玄晏先生又曰羊耽妻辛氏字憲英隴西人鍾㑹爲鎮西將軍憲英謂躭從子祐曰鍾士季何故西岀祜曰將爲滅蜀也憲英曰㑹所在縱恣非持乆處下之道吾畏其他志也㑹果反祜甞送錦􅀍憲英嫌其華反而覆之又曰杜有道妻嚴氏字憲京兆人貞淑有識量生子植植從兄預爲􅁗州刺史􅀍巫徴還憲與預書戒之曰諺曰忍辱至三公卿今可謂辱矣能忍之三公是卿座預後果爲儀同三司三十國春秋曰羊祐年十五而􅀌事伯母蔡氏以孝聞蔡氏毎歎曰羊叔子可謂能飬也其諸􅁑孔明之亞乎宋書曰謝瞻字宣逺陳郡陽下人衛將軍晦弟三兄㓜􅀌叔母劉氏撫育有恩同於至親從伯叔爾雅曰父之從父昆弟爲從祖父吴志曰朱異字季文爲陽武將軍孫權與論攻戰問對稱意權謂異從父驃􅀐將軍據曰夲知季文懀烏外切定見之復過所聞臧榮緒晉書曰王沉字處道少􅀌爲從叔司空昶所飬沉事昶如父虞預晉書曰王渾從子浚字彭祖司空王沉賤孽也少時不爲親黨所知渾謂弟深等曰卿等莫輕彭祖此兒平丗不減方州牧伯亂丗可爲都督三公懷􅉖之丗果爲幽兾都督位至鼎輔如渾所􅀃晉書曰王彪之字叔虎從伯導曰選曹欲以汝爲尚書郎汝幸可作諸王佐耶彪曰多少旣不足計自當任之於時至於超遷是所不願又曰王羲之字逸少司徒導之從子也深爲伯敦導所器重又曰魏舒字陽元任城人也身長八尺二寸姿望秀偉飲酒石餘而遟鈍質䃼不爲郷親所重從叔父吏部衡有名當丗亦不之知使守水碓毎歎曰舒堪數百戸長願畢矣舒亦不介意後遷至司徒劇陽子又曰檀慿之字慶子髙平人少有志力閨門邕肅爲丗所稱􅀌從兄子歆兄弟五人皆稚弱慿之撫飬􅀂巳所生又曰荀崧從弟馗早亡二息序廞許金切年各數􅀊崧迎與其共居恩同其子太尉臨淮公荀顓廢絶朝廷以崧属近欲以崧子襲封崧哀序􅀌微乃讓封與序論者稱焉宋書曰謝景仁陳郡陽夏人也衛將軍晦從叔父也祖據太􅀓安弟父兄宣城内史景仁􅀶聞強識玄每與之言不倦也又曰王誕字茂丗琅瑘臨沂人也少有才藻晉孝武崩從叔尚書令珣爲哀䇿文乆而未就謂誕曰猶少序節物一句因出夲示誕誕攬筆便益之接其冬秋代變後云霜繁廣除風廻髙殿珣嗟歎清㧞因而用之拜秘書郎宋齊語録曰梁特進沈約撰史王希􅡭甞問約曰從叔太常何故無傳約戯之曰賢從叔者何可載荅曰從叔唯忠與孝君當不以忠孝爲羙約有慙色􅀶物志曰蔡邕有書近萬卷末年載數車與王粲粲亡後粲子預魏諷反􅀍誅邕所與粲書悉入粲從子景字長緒崔鴻前凉録曰范績字弘基績㓜有名稱族叔上洛太守毗拊其首曰汝吾宗千里駒也歴仕三朝士友服其清亮舉秀才爲郎中遷中都謁者族父爾雅曰釋親曰父之從祖昆弟爲族父後漢書曰侯覇字君房河南宻人族父淵以官宦有才辯任職元帝丗佐石顯等領中書號曰太常侍蜀志曰費禕字文偉江下鄲人也鄲音盲少􅀌依族父伯仁姑益州牧劉璋母也晉書曰顧和字君孝侍中衆族子也曽祖容吴荆州刺史祖相臨海太守和二歳䘮父㧾角便有志操族叔榮雅重之曰此吾家騏􅂹興吾宗者必此子也時宗人球亦有令問爲州別駕榮謂之曰卿速歩君孝超卿矣陳留志曰阮武字文業魏末爲清河太守族子籍方惣角未知名武見而偉之以爲勝巳明於知人皆此􅀋也姑釋名父之姉妹曰姑姑故也言於巳爲乆故之人也廣雅曰姑謂之威威故也􅀃文曰威姑也爾雅曰父之姉妹爲姑王父之姉妹爲王姑曽祖王父之姉妹爲曽祖王姑髙祖王父之姉妹爲髙祖王姑父之從父姉妹爲從祖姑父之從祖姉妹爲族祖姑毛詩曰泉水衛女思歸也問我諸姑遂及伯姉父之姉妹稱姑先生曰姉箋云寜則又問姑及姉親其􅀋也先姑後姉尊姑也禮記曲禮曰姑姉妹女子子巳嫁而返兄弟不與同席而坐不與同噐而食又檀弓曰姑姉妹之薄也盖有受我而厚之者也左傳僖上曰􅀄晉獻公筮嫁伯􅁎於􅁗遇歸妹之睽史􅂫占之曰不􅁻歸妹睽􅀌冦張之弧姪其從姑六年其逋逃歸其國而棄其家明年其死於髙梁之虚震爲木離爲火火從木生離爲震妹於火爲姑謂我姪者吾謂之姑謂子圉質於􅁗也漢書曰成帝班婕妤彪之姑也後漢書曰􅁊曄字文林姑爲楊賜夫人父鸞卒姑赴哀將至止於傳舎整飾從者而後入曄心非之及姑勞問終無所言號􅂘而巳賜遣吏祠因縣發取祠具曄拒不受後毎至京師未甞舎楊氏晉書曰阮孚母祖姑家胡婢也父咸通之生孚咸遺姑書曰不意今日遂生胡兒姑荅曰靈光殿賦云胡人遥集於上楹便可以遥集爲字咸從之列女傳曰魯義姑者魯野人之婦也齊攻魯至郊遥見一人携一兒抱一兒及軍至乃棄抱者而抱携者將欲射之遂止而問曰所抱者誰之子對曰兄之子所棄者誰之子日巳子也妾見大軍至不能兩全遂棄所生之子軍曰子之於母甚痛於心何棄所生而抱兄子對曰子之於母私愛也姪之於姑公義也夫背公而向私者妾不爲也於是齊軍遂止曰魯郊有婦人猶持節行况於朝廷乎遂廻軍不伐魯君聞之賜束帛號曰義姑又曰梁宣節姑者梁之婦人也其室失火兄子與巳子三人在内入取兄子輙得其子及火盛不復得入婦人將赴火其友曰夲取兄子卒誤得巳子至於中心亦巳足矣何至赴火婦曰梁國豈可以戸告人暁也􅀍不義之名何面見弟兄吾欲復投吾子又失母子之情誓不生遂赴火而死君子曰可謂節姑也先賢行狀曰蔡伯喈母􅀽曜卿之姑也又曰鍾元皓妻李膺之姑也生子覲與膺齊名太平衘覽卷第五百十三
