front:
  text: 太平御覽卷第三百六十八
  hash: sha256:ec0f4516712841f7f2e0fe37bc323ac849b147e3d4ddfc1b82a280adba03fd56
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_368-1a}
body:
  text: 人事部九脣吻齒牙喉咽頤頷承漿脣吻􅀃文曰脣口端也釋名曰脣縁也口之縁也吻免也入則碎止則免也又取枚也吹唾所出恒加枚栻因以爲名也傳曰晉欲伐虢假道於虞虞君許之宫之竒諌曰諺有之輔車相依脣亡齒寒其虞虢之謂乎又曰吴將伐魯王問於子􅂥對曰諸侯將救之未可以得老焉夫魯齊晉之脣脣亡齒寒君所知也不救何爲春秋元命苞曰脣者齒之垣所以扶神設端􅀂有列星與外有限故曰脣亡齒寒春秋孔演圖曰八政不中則人無脣人恃脣乃語命無隂不制孝經鈎命决曰仲尼斗脣吐教陳機授度史記曰越王勾踐曰􅀌常不料力與吴戰困於㑹稽日夜焦脣乾舌徒欲與吴王接踵而死漢書曰張湯與顔異有􅂩人有告異以他議事下湯治異云異與客語客云􅀄令下有不便者異不應徴反脣湯奏異九卿見令不便不入言而腹非論死自是後有腹非之法又薛宣􅀓曰􅀶士申咸毀丞相宣家行不足宣子况賕音求客楊明斫咸宫門外申斷鼻脣況坐從宣免爲庻人王隱晉書曰寒儁傳曰劉升龍須昌人赤色文脣少言語有大志自縣小吏至雍州刺史梁書曰侯景僭位入登太極殿其徒數萬吹脣唱吼而上莊子曰孔子謂盗跖曰將軍脣如激丹淮南子􅀃山曰孕見兎而子缺脣見麋而四目物固有然不然也賈􅁩曰沸脣投塞垣之下匈奴號也通俗文曰脣不覆齒謂之齖音牙䶥祖家切廣志曰赤口濮嶃其脣以丹飾之瀬郷記李母碑曰老君厚脣趙志自叙曰志長七尺四寸㓗白黒髮明眉赤脣髭􅁂不多燉煌實録曰王棽音參又丑林切卒有盗開棽冢者見棽與人樗蒲舉杯酒賜盗者惶怖旣飲見牽銅馬出其夜有神告城門我王孟曽使也人發孟曽冢以酒黒其脣明日入城有黒脣者是也須􅁷馬還流汗盗明詣城門不􅁴脣黒爲吏所􅅞孟曽棽之字也宋玉神女賦朱脣􅀂丹曹植洛神賦曰丹脣外朗皓齒内鮮又曰啓朱脣以徐言崔駰七依曰紫脣素齒雪白玉暉廣雅曰咡謂之吻咡音餌淮南子曰決吻治齲君子不與齲丘主切齒􅀃文曰齓毀齒也男生八月生齒八歳而齓女七月生齒七歳而齓音引釋名曰齒始也少長之別始乎此也以齒食多者長食少者㓜也禮曰母刺齒口口容止也又曰濡肉齒決決猶斷也乾􅁏不齒决壑冝用乎又曰髙子皐之執親之喪也泣血三年未甞見齒言􅀏之微君子以爲難左傳曰陳僖子使召公子陽生立之將盟遂誣鮑子曰之命也鮑子曰汝忘君之爲孺子牛而折其齒乎孺子荼也景公常銜繩爲牛使荼牽之荼頓地折其齒也詩碩人曰齒如瓠犀又閟宫曰旣受多祉黄髪兒齒公羊傳莊公曰仇牧聞閔公弑趨而至遇之于門手劒而叱之宋萬臂榝仇牧碎其首齒著乎門闔側手曰假􅀽葛切春秋元命苞曰武王駢齒是謂剛強取象叅房誅害以從天心宋均注曰房爲明堂主布政參爲大辰主斬刈兼此二者故重者爲表孝經鈎命決曰夫子駢齒象鈎星也史記曰顔回年二十九髮盡白齒早落又曰范睢事魏中大夫湏賈賈使齊睢從齊襄王聞睢辯賜金及牛酒賈以爲睢持魏事告齊故得饋以告魏相魏齊大怒使人笞擊睢折脇摺齒睢佯死漢書曰張蒼無齒唯飲乳百有餘歳而卒謝承後漢書曰豫章項誦字叔和爲郡主簿太守爲屬縣所誣章誦詣獄證要引自􅁺音斷血出滂流齒皆墮地太守獲免晉書曰温嶠先有齒疾疾因拔齒中風而卒又曰成帝杜皇右少有姿色長猶無齒有求昏者輙中止及帝納采一夜齒盡生又曰謝鯤隣家有美女鯤調之女以梭投鯤折其兩齒丗俗爲之謡曰任逹不巳㓜輿折齒㓜輿鯤字也山海經曰黒齒國爲人黒齒河圖矩起曰帝嚳駢齒宋均曰所以駢齒齒星位白虎通曰帝嚳駢齒上法曰叅秉度成紀以理隂陽抱朴子内篇曰或問堅齒之道荅曰養以華池漱以濃液永不動次則服靈非散旣脫更生楊泉物理論曰夫齒者年也身之寳也藏之斧鑿所以調諧五味以安性氣者也神仙傳曰老君䟽齒神仙服經曰服神丹三百歳齒化爲石王閎本事曰閎爲琅瑘太守張歩欲誅之閎出東武城門馬奔墮車折齒閎心惡移病歸府遂得免字林曰䶜牛於切齒不相值也齼􅀄舉切齒傷酢也齩午校切齧噬也齨老人齒如臼也齨音舅叚國沙州記曰國人年五十以上四齒皆落將由地寒多障氣也異物志曰屠移在海外以草染齒因號黒齒􅀽子正書曰山梁氏泥於西屠而染其齒丗􅀃曰孫子荆少時欲隠語王武子曰吾當枕石漱流誤云漱石枕流王曰流非可枕石非可漱孫曰所以枕流欲洗其耳所以漱石欲礪其齒又曰王子猷詣謝玄林公先在坐王曰􅀂林公髮􅁂並全神情當復勝此不謝曰脣齒相須不可偏亡琴操曰聶政父爲韓王冶劒過期不成王殺之時政未生及長入太山遇仙人學鼓琴􅃮身爲厲吞炭變音七年琴成入韓逢其妻從買櫛對妻而􅀏妻泣曰君何以似政齒政乃入山援石擊落其齒楚辭曰美人皓齒嫮以姱臨海水土志曰夷州人俗女曰巳嫁皆缺去前上一齒宋玉登徒子賦曰腰如束素齒如含貝司馬相如上林賦曰皓齒粲爛張恊禊賦曰清哇發於素齒牙釋名曰牙植牙也隨形言之也干寳晉紀曰賈庻人未害慜懷太子時有謡曰南風烈烈吹白沙千歳髑髏生齒牙南風庻人名􅉖懷小名沙門三國典略曰齊太上主生齻音顚牙問於尚藥典御鄧宣以對太上主怒而撻之中書􅁥徐之才拜賀曰此智牙生者聦明長壽太上恱而賞之喉咽􅀃文曰咽嗌也喉嚨也釋名曰咽咽物也青徐謂之脰音豆物投其中受而下之也又謂之嗌音益氣所通流阨要之處也傳曰敗狄于鹹獲長狄僑如冨父終生舂其喉以戈殺之孝經鈎命決曰夫子輔喉史記曰孫子曰夫救􅃲者不􅅮撠音㦸批亢擣虚形格勢禁則自爲解耳亢音剛又音抗人喉也又曰貫髙聞赦張王乃曰所以不死者白張王不反今王巳出吾責巳塞死不恨矣且人臣有不簒弑之名何面目復事上哉縱上不殺我不媿心乎乃仰絶亢而死韋昭曰亢咽也漢書曰人有上書言息夫躬懷怨恨非􅀏朝廷所進候星􅀫視天子吉凶與巫共祝詛上遣侍御史廷尉􅁥逮躬繫雒陽詔獄欲掠問躬仰天大謼火故反因僵仆吏就問云咽已絶師古曰咽喉嚨也音一千反後漢書曰霍諿音緝爲舅宋光􅀍誣上書曰譬猶療飢於附子止渇於酖毒未入膓胃巳絶喉咽豈可爲哉又曰王青字公然靑父隆建武􅀄爲都尉功曹青爲小吏與父俱從都尉行縣道遇賊隆以身衛全都尉遂死於難青亦􅀍矢貫咽音聲流喝又曰李固對詔曰陛下有尚書猶天之有北斗北斗天之喉舌尚書陛下之喉舌魏志曰樂陵王茂兄東平王薨茂稱咽病不肯發哀詔削户蜀志曰彭與􅁑亮書曰先民有言左手據天下之圖右手扼其喉愚夫不爲也僕頗別菽麥哉唐書曰幽州朱融鎮州王庭湊叛東川節度王涯獻書曰臣聞用兵􅀂􅃲先扼其喉今瀛莫易定兩賊之咽喉也誠冝假之威柄戍以重兵俾其死生不相知間諜無所入而以大軍先進兾趙次臨井陘此一舉萬全之勢也抱朴子曰焦喉之渇遥指滄海列女傳曰齊鍾離春者宣王后也極醜卭鼻結喉益部􅂄舊傳曰犍爲楊鳯珪者其妻陳􅁎珪早亡兄弟欲嫁之􅁎於是列刀割咽流血幾死九族驚異乃從其節又曰蜀郡史賢妻張昭儀賢旣犯罪􅀍誅儀取刀自割咽喉而死物理論曰咽喉生之要孔黄帝素問曰喉主天氣咽主地氣頥頷釋名曰頥或曰輔車其骨強所以輔持其口或曰牙車牙所載也或曰頷車頷含也韓詩曰有美一人碩大且㜝薛君曰㜝重頥也五檢切周易噬嗑卦曰頥中有物曰噬嗑又頥卦曰頥貞􅁻觀頥自求口實春秋元命苞曰后稷歧頥自求是謂好農盖象角元載土食榖宋均注曰面皮有二象也頥面爲下部下部爲地巧於利也戰國䇿曰静郭君善昆辨昆辯多疵門下不恱孟嘗君以諌静郭君大怒舎之上舎令長子御旦暮進食威王薨宣王立太子不善静郭君辭之薛昆辯至齊見宣王王曰子静郭君所聽愛者乎曰愛即有之聽即無有王之爲太子辯謂静郭君曰太子相不仁過頥豕眎􅀂是法背父不􅀂廢太子更立衛􅁎子嬰兒郭師静郭君泣而曰不可吾弗忍爲聽辨而爲之必無今患矣宣王曰寡人殊不知此乃迎静郭君史記曰黄歇上書秦王曰本國殘社稷壞刳腹結膓折頸摺頥摺盧合切又曰蔡澤顩頥顩五撿切漢書曰王莽蹙頥范曄後漢書曰班超字仲升爲人大志不脩小節甞行詣相者相者曰􅀕酒布衣諸生而當封侯萬里之外超問其􅃺相者曰生䴏頷虎頭飛而肉食此萬里侯相也江表傳曰孫權方頥大口三國略曰徐之才年十三劉孝綽見之言曰徐郎鷰頷班超之相也帝系曰帝嚳方頥莊子曰支疏頥隠於齊又曰孔子遊緇惟之林弦歌鼓琴奏曲未半有漁父下舡而來􅂡眉交白􅀍髮揄􅃑行原而上距陸而止左手據膝右手持頥以聽之韓子喻老曰白公勝慮亂罷朝到杖䇿錣貫頥而血流至地而弗知鄭人聞之曰頥之忘何不忘哉䇿馬箠也有針似馬謂之音竹劣陟衛二切河圖曰黃帝兊頥􅀃苑曰田單攻翟三月不克嬰兒謡曰大冠如箕長劒柱頥西京雜記曰匡衡字稚圭勤學能􅀃詩時人爲之語曰無􅀃詩匡鼎來匡􅀃詩解人頥鼎衡小字也王粲七釋曰揚蛾眉而頥指汝南先賢傳曰周爕顩頥折頞其貌甚醜也談藪曰北齊李恕無􅂡崔諶玩之曰何不錐刺頥作數百孔拔左右好􅂡者栽之承漿釋名曰口下曰承漿承水漿也針灸經曰承漿一名懸漿也太平御覽卷第三百六十八
