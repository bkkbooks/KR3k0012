body:
  text: 人事部二十二羙婦人下莊子曰西施毛嬙人之所羙也魚見之􅀷入鳥見之髙飛尹文子曰齊有黄公者好謙卑有二女皆國色常謙辤毁之以爲醜惡醜惡之名逺布年過而一國無敢聘者衛有鰥夫失時冐娶之果國色闞子曰西施自窺於井不恃其羙猶佐湯沐堯舜自窺於世不恃其賢猶湏才德況中庸而距諌嫫母自窺於井以爲媚於西施桀紂自窺於丗以爲賢於堯舜韓子曰魏王遺楚王羙女王甚恱之慎子曰毛嬙西施天下之至姣也衣以皮􅄄則見者皆走昜以玄錫則行者皆止淮南子曰曼顔皓齒形姱骨佳不待脂粉芳澤而羙者西施陽文也許慎注曰陽文楚好女也又曰蔡之㓜女衛之稚質纂組竒綵抑黒質楊赤文慕組織紀也如今之綬也没黒見赤其工也湯禹之智不能逮也言不能及二國女之行也神仙傳曰介象字元則㑹稽人入山求仙見谷上有石皆紫色如雞子象取二枚見一羙人􅀍五綵象向之叩頭乞長生女曰汝急送手中物還著故處汝未應取此象乃送石還女授丹方一首穆天子傳曰赤烏之人獻二女于天子女聦女列赤烏氏羙人之地也劉向列傳曰蕭史者􅁗穆公時人善吹簫能致孔雀白鶴穆公女弄玉好之公以妻焉一朝隨鳯飛去漢武内傳曰西王母乗紫雲之輦履玄瓊之舄下輦上殿呼帝共坐命侍女許飛瓊皷雲和之簧續列女傳曰曹節弟破石爲越騎校尉越􅀐營伍伯妻有羙色破石從求之伍伯不敢違妻執意不肯行遂自殺襄陽􅂄舊記曰楚襄王遊雲夢望朝雲之餘上有雲氣宋玉曰昔先王遊髙唐怠而晝寢夢一婦人曖乎􅀂雲皦乎􅀂星將行未至如浮如傾對曰我帝季女名曰瑶􅁎未行而喪封乎巫山之臺精䰟爲草實爲靈芝西京雜記曰卓文君好眉色如望逺山臉際常􅀂芙蓉肌膚柔如脂十七而寡爲人放誕風流故恱長卿之才而越禮焉長卿作羙人賦以自刺王子年拾遺記曰魏文帝所愛羙人姓薛名靈芸常山人也靈芸年十七容皃絶丗時明帝選良家子入宫靈芸別父母戯欷累曰淚下沾衣至􅂛車就路之時玉唾壷承淚壺即如紅色及至京師壼中之淚凝如血矣又曰蜀先主甘后沛人生微賤里中相者云此後後貴位極宫掖及后長體貌特異年十八玉質柔肥態媚容冶先主置后白綃帳中户外望者如月下聚雪河南獻玉人髙三尺乃取玉人置后側常稱玉人之所貴比德君子况爲人形而不可說乎后與玉人㓗白齊色觀者殆相亂惑嬖者非唯嫉於后亦妬在玉人后欲毀之乃誡上曰昔子罕不以玉爲寳春秋羙之今吴魏未㓕安以妖玩經懷勿復進也上乃徹玉人衆嬖皆退當時以甘后爲神智婦人又曰吴王潘夫人父坐法夫人輸入織室容態少儔江東絶色同幽者百餘人謂夫人曰神女敬而逺之有司陳於吴主使圖其容夫人憂戚不食减瘦改形工人冩之以進吴主主見喜以虎魄如意撫案嗟曰此神女也愁皃尚能感人况在懽樂乃納于後宫又曰孫亮作縁瑠璃屏風毎於月下淸夜舒之常愛寵四􅁎皆振古絶色一名朝姝二名儷居三名㓗華四名洛寳又曰周成王時有因祗國去王都九萬里獻女工一人善於工巧體皃輕㓗􅀍纎羅雜繡之衣長䄂脩􅅂風至則結其􅁭帶恐飄颻不能自止善織以五色絲引而結之則成文錦吴㑹分地記曰土城者勾踐時索美女欲以獻吴於羅山得西施鄭旦作土城貯之使近道習見人令賢􅀓母教之三年叚􅀛龍涼州記曰隠王美人張氏色豔出家爲道乃自投門樓􅀟股頻折口誦經顔色自􅀂俄而死鄴中記曰廣陵公陳逵妹才色甚美髮長七尺石虎以爲夫人三國典略曰崔孝芬取貧家子賈氏以爲養女有姿色騰納之請以邑號又曰齊武成曽有疾自云􅀄見空中有五色物稍近變成一美婦人去地數丈亭亭而立徐之才云此至靈所致即進湯服一劑便覺稍逺又服還變成五色物數劑疾平帝王丗紀曰紂以􅀑侯爲三公􅀑侯有女美而進之於紂恱之妲巳乃泣而譛之紂怒􅀑侯女遂殺之而醢􅀑侯何集續帝王丗紀曰張天錫疾篤閻薛二􅁎並有國色天錫謂曰吾死之後汝二人豈可更爲他妻皆曰尊􅀂不諱請効死尊前誓無他志二人自殺天錫有瘳追悼二􅁎葬以夫人禮􅀃苑曰齊王起九重之臺募國中有􅀞者賜之錢狂卒敬君居常飢寒妻端正敬君工􅀞貪賜􅀞臺去家曰乆思念其妻像向之憘􅀏旁人瞻見之以白王王即設酒與敬君相樂謂敬君曰國中獻女無好者以錢百萬謂妻可乎不者殺汝敬君慞惶聽許又曰太祖下鄴文帝先入􅀽尚府有婦女􅀍髮垢靣立紹妻後文帝問之荅曰是熈妻顧􅄃髮以䄂拭靣姿貌絶倫遂納之丗􅀃曰漢元帝宫人旣多乃令􅀞工圖之欲有呼者輙披圖召焉其中皆行貨賂王昭君姿容甚麗志不可苟求工遂毁爲甚醜終身不召後匈奴來和求美女於帝以昭君充行旣召見而嘆之又曰桓宣武平蜀以李勢妹爲妾主始不知旣聞與數十婢拔白刃襲之温尚明帝女南康長公主正值梳頭髮籍地膚色玉曜不爲動容徐曰國破家亡以至今日􅀂能見殺乃其本懷主慙而退俗說曰宋禕是石崇妓緑珠弟子有色善吹笛後在晉明帝處帝􅐄患篤羣臣進諌請出宋禕帝曰卿諸人誰欲得之阮遥集時爲吏部尚書對曰願以賜臣即與之典說曰司􅀠馮方女國色也避地楊州􅀽術登城見而遂納焉諸婦害其寵給言將軍以貴人有志節但見時示憂色必長見敬重馮氏如其言術益哀之諸婦因絞懸之厠言自殺術誠以爲不得志而死乃厚葬之方言曰娥㜲音盈好也秦曰娥言娥娥也宋謂之㜲言㜲㜲也秦晉之間凡好而輕者謂之娥自關而東河淆之間謂之媌今􅀜西人亦呼好爲媌吾交切或謂之姣言姣㓗也音姣趙魏燕岱之間曰姝音姝亦四方通語耳或曰妦言妦容也音蜂自􅀜而西秦晉之間故都曰秦舊都今扶風雍縣也晉舊都今太原晉陽縣也其俗通呼好爲忓五干切又曰釥錯􅆌切嫽夭切好也青徐海岱之間曰釥或謂嫽今通呼小姣㓗喜好者爲嫽眇好凡通語也朦巳紅切庬鴟鴻豐也自關而西秦晉之間凡大貌謂之朦或謂之庬豐其通語也娃烏佳切媠諾過切窕途了切艷羙也吴楚衡淮之間曰娃南楚之外曰媠言婑媠也宋衛晉鄭之間曰艷陳楚周南之間曰窕自關而西􅁗西之間凡羙色或謂之好或謂之窕故吴有館娃之宫􅁗有枈娥之臺㭍音七􅁗晉之間羙貌謂之娥羙􅃺爲窕羙色爲艷羙心爲窈弈偞容也自關而西凡羙容謂之弈或謂之媟弈弈媟媟皆輕麗之皃也書紀年曰桀伐岷山獻女于桀二女曰琬曰琰桀受女刻其名于苕華之玉苕是琬華是琰楚辭曰姱容脩態絙洞房娥眉慢睃目騰光又曰粉白黛黒施芳澤又曰羙人旣醉朱顔􅋳又曰室中之觀多珍怪蘭膏燭明華容備山海經曰丹山西即巫山也帝女居焉宋玉所謂我帝之季女名曰瑶􅁎其間首尾一百六十里謂之巫峽盖因山爲名也崔豹古今注曰魏文帝宫人有莫瓊樹薛夜來陳回夜陳巧􅀏瓊樹始製蟬􅁂望之縹緲如蟬翼故號曰蟬􅁂桓譚新論曰或曰陳平爲髙帝解平城圍隠而不傳子能知乎曰陳平說閼氏言漢有羙女其容貌天下無有今急馳使歸迎欲進單于單于見必愛之則閼氏言之單于而得免也六韜曰紂囚文王於羑里散冝生受命而行宛懷條塗之山有玉女三人冝生得之因費仲而獻之於紂以免文王何承天纂文云孚瑜羙色也服䖍通俗文云容麗曰媌莫豹切形羙曰媠湯火切容媚曰婠烏活切南楚以好爲娃烏佳切肥骨柔弱曰婐烏果切折奴果切頰妍羙曰嫵七府切媚容茂曰㜰羊灼切越絶書曰越王勾踐得採薪二女西施鄭旦以獻吴王崔駰七依曰閭娵之孕旣麗且閑紫脣素齒雪白玉睴迴眸百萬一􅀏千金孔子傾於阿谷浮屠忘其桑門彭祖飛而溶集王喬忽而墮雲司馬相如上林賦曰􅀂夫青琴宓妃之徒皆古神女名也絶殊離俗妖冶閑都靚粧刻飾又羙人賦曰臣之東隣有一女子玄髮豐艶蛾眉皓齒顔盛色茂景曜光起離宫閑館寂寞重虚門閣晝掩曖􅀂仙居芳香郁烈黼帳髙張有女獨處婉然在牀竒葩􅇣麗素質艷光辭不具載蔡邕恊􅀄賦曰其在近也􅀂神龍彩鱗翼將舉其旣逺也􅀂披雲掃漢見織女陳思王洛神賦曰其形也翩􅀂驚鴻蜿􅀂㳺龍榮輝秋菊華茂春松髣髴兮􅀂輕雲之蔽月飄飄兮􅀂流風之迴雪逺而望之皎􅀂太陽昇朝霞迫而察之灼􅀂芙蕖出渌波醲纎得中脩短合度肩􅀂削成腰如約素延頸秀項晧質呈露芳澤無加鈆華弗御丹脣外㓪皓齒内鮮明眸善睞靨輔承權辤不具載曹植扇賦曰情駘蕩而外得心恱豫而内安増吴氏之姣好發西子之玉顔阮籍清思賦曰靨白玉以爲面披丹霞以爲衣襲九英之曜精佩瑶光以發輝􅀽宏夜酣賦曰開金扇坐瓊筵衛􅁎進鄭女前形窈窕以纎弱艶妖冶而清妍似春蘭之齊秀象明月之􅀟懸宋玉神女賦曰楚襄王逰於雲夢之浦使宋玉賦髙唐之事王夢神女其􅃺甚麗王異之明日以白玉玉曰其夢􅀂何王曰見一婦人狀甚異撫心定氣復有所夢其始來也耀乎􅀂日􅀄出照屋梁其少進也皎乎􅀂明月舒其光穠不短纎不長歩􅒨􅒨兮曜殿堂忽兮改容蜿􅀂逰龍乗雲翔王曰此盛矣試爲寡人賦之玉曰夫何神人妖麗兮含隂陽之渥飾􅀍華藻之可好兮􅀂翡翠之􅁬翼其象無􅀟其極毛嬙又登徒子賦曰夫天下之佳人莫􅀂楚國楚國之麗者莫􅀂臣里臣里之羙者莫􅀂臣東家之子増之一分則太長減之一分則太短著粉太白施朱太赤眉如翠羽肌如白雪腰如束素齒如含貝又髙唐賦曰昔者先王甞逰髙唐怠而晝寢夢一婦人曰妾巫山之女也爲髙唐之客辭曰妾在巫山之陽髙唐之岨朝爲行雲暮爲行雨朝朝暮暮陽臺之下王曰朝雲始出􅃺􅀂何玉對曰其始出也㬣兮若松榯其少進也晣兮􅀂姣􅁎楊􅃑障日而望所思忽兮改容偈兮􅀂駕駟馬建羽旌湫兮如風淒兮如雨風止雨霽雲無處所王粲神女賦曰髮似􅀇鑒􅁂類刻成質素純皓粉黛不加朱顔熈曜曄若春華口譬含丹目若瀾波羙姿巧􅀏靨輔竒牙􅀓毅舞賦曰鄭女出進二八飾侍眉連姢以増繞目流睇而撗波劉楨魯都賦曰衆媛侍側鱗附􅄹房娥眉青眸顔若濡霜含丹吮素巧􅀏妍詳掖耀日之珍笄珥明月之珠璫圭衣紛裶振佩鳴璜應瑒神女賦曰騰􅀇眸而俄青陽離朱脣而耀􅀟輔紅顔曄而和妍時調聲以􅀏語張衡舞賦曰􅅂􅀂飛煙䄂如廻雪窣􅀂霆震瞥􅀂電滅於是粉黛施兮玉質粲朱􅆪挺兮緇􅄠亂謝靈運江妃賦曰小腰微骨朱顔皓齒綿視騰采靡膚膩理天台二娥宫庭􅀟媛青袿晨接紫衣形見或飄翰凌烟或潜泳浮海萬里俄頃寸隂未改辭不具載魏文帝與繁欽書曰今之妙舞莫巧於絳樹清歌莫激於宋臘古詩曰青青河畔草鬰鬰園中栁􅄹􅄹樓上女皎皎當䆫牖娥娥紅粉粧纎纎出素手又曰燕趙多佳人羙者顔如玉􅀍服羅衣裳當户理清曲音響一何悲絃急知柱促願爲􅀟飛燕㗸泥巢君屋梁簡文帝晚景出行詩曰細樹含殘影春閨散晚香輕花􅁂邊墮微汗粉中光梁徐悱妻詩曰東家挺竒麗南國檀容暉夜月方神女朝霞喻洛妃西阮籍詩曰妖冶閑都子英曜何芬葩􅀇􅁂發朱顔睇盻有光華又曰西方有佳人皎􅀂白素光􅀍服織羅衣左右佩􅀟璜又詩曰二妃㳺江濵逍遥順風翔交甫懷玉珮婉孌有芬芳左思嬌女詩曰吾家有嬌女嬌女皦白晢小字爲紈素口齒自清歴髻髪覆廣額􅀟耳似連璧明朝弄梳臺黛眉􅀋掃跡五言傳􅀇歌曰有女懷芬芳媞媞歩東廂蛾眉􅀟翠羽明眸發清光丹脣翳皓齒秀顔若珪璋巧􅀏露靨輔衆媚不可詳令儀希丗出無乃古毛嬙首戴金歩摇耳繫明月璫李延年歌曰北方有佳人絶丗而獨立一顧傾人城再顧傾人國豈不言傾城國佳人難再得陸機艷歌行曰羙目楊玉澤蛾眉象翠翰古樂府陌上桑行曰日出東南隅照我􅁗氏樓􅁗氐有好女自言名羅敷羅敷善􅁞桑採桑城南隅青絲爲籠繩桂枝爲籠鈎頭上髪墮髺耳中明月珠鮑昭堂上行曰暉暉朱顔􅋳紛紛織女梭滿堂皆羙女目我對湘娥箏笛更彈吹髙唱好相和曹植羙女篇曰羙女妖且閑採桑􅄮路間桑條芬苒苒落葉何翩翩攘䄂見素手皓腕約金鐶頭上金雀􅁫腰佩翠琅玕太平御覽卷第三百八十一
