front:
  text: 太平御覽卷第七百一十二服用部十四
  hash: sha256:de1f2a683f968e3ea637da1d1d62a4f5a9f57d5eacebd6cbee33ef150b5d30ce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_712-1a}
body:
  text: 熨斗澡盤澡灌伏虎熨斗通俗文曰火斗曰熨帝王丗紀曰紂欲重刑乃先作大熨斗以火􅅡之使人舉不能勝輙爛手與妲己爲戯􅀏魏末傳曰優人欲使㓜帝取大將軍昭昌熨斗柄帝不敢發晉書曰韓康伯年數歳殷氏髙明時大寒母方爲作袴令康伯捉熨斗而謂之曰且着􅃭尋當作􅃨袴康伯曰火在斗中而柄尚熱今旣着􅃭下亦當煖又張蕪别傳曰蕪小時母謂其寒且作袴蕪曰且作􅃭如熨斗着火柄亦􅀬隋書曰尉遲逈反於鄴時李穆在并州髙祖獻慮其爲逈所誘遣使往布腹心穆遽奉熨斗於髙祖曰願以此慰安天下也高祖大恱三輔故事曰董卓壞銅人十枚爲小錢熨斗淮南子曰糟丘生於象箸炮烙始於熱斗許愼曰􅀬斗熨斗也爛人手遂作炮格之刑也晉東宫舊事曰皇太子納妃有金塗熨斗三枚魏武帝集上騰所得順帝賜物銅熨斗二枚澡盤魏武上雜物䟽曰御物有純銀盤又有容五石銅澡盤也杜預奏事曰澡盤熨斗民間要用丗說曰大將軍王敦至石崇家如厠還有數十婢曳羅縠擎金澡盤盛水琉璃盛澡豆因令著水調而飲之謂是乾飯群婢莫不大􅀏也述征記云長安逍遥宫門裏有澡盤靣徑丈二也異苑曰中朝有人畜銅澡盤旦夕恒鳴張華曰與洛鍾宫啇相諧故聲相應錯鑢之乃止􅀓􅀇澡盤銘曰與其澡於水寕澡於德水之清猶可穢也徳之興不可塵也澡灌四王起事曰惠帝征成都軍敗帝渇帳下齎五升銅灌就民家取水就灌飲之齊書曰劉悛少與齊武欵好帝常至悛宅晝卧覺悛自奉金澡灌受四􅂛水以沃􅏕因以與帝前後所納稱此東宫舊事曰皇太子􅀄拜有金塗澡灌一枚青絲三合繩一枚長二丈五尺又曰皇太子納妃有金澡灌二枚西域諸國志曰月支國有佛澡灌受二􅂛許青石名羅勒色碧玉班白受水無定隨其多少惠逺法師澡灌銘序曰得摩羅偷石澡灌一枚故以此銘荅之伏虎周禮天官曰大尉掌王燕衣服凢䙝器鄭司農云䙝器溺器虎子也春秋後語曰智伯圍趙襄子於晉陽襄子大敗智伯軍殺智伯􅃮其頭以爲飲器穢器虎子也史記曰凶奴破月氏王以其頭爲飲器魏略曰􅂫則爲侍中舊侍中親省起居故俗因謂執虎子始􅂫則同隱􅁻茂後見嘲之曰仕䆠不巳執虎子録異傳曰呉時嘉興倪彦思忽有􅀑魅其家能與人語飲食如人唯不見形思乃延道士逐之酒肴旣設道士便擊鼔召請諸神魅乃取伏虎於神坐吹作角聲以亂音頃道士忽覺背中冷驚起解衣乃伏虎也馬融遺令曰穿中不得下銅虎况它銅物太平御覽卷第七百一十二
