body:
  text: 皇王部二十九後魏敬宗孝莊皇帝節閔皇帝廢帝安定王孝武皇帝文皇帝廢帝恭皇帝東魏孝静皇帝敬宗孝莊皇帝後魏書曰孝莊皇帝諱子攸彭城王勰音恊之第三子母曰李妃肅宗􅀄以勰有魯陽翼衛之功封帝武城縣開國公幼侍肅宗書於禁内及長風神秀慧姿兒甚美拜中書侍郎城門校尉兼給事黄門侍郎雅爲肅宗所親待長直禁中遷散􅀐常侍御史中尉孝昌二年八月進封長樂王轉侍中中軍將軍及武太元年春二月肅宗崩大都督爾朱榮將兵向京師謀欲廢立以帝家有忠勲且兼人望隂與帝通榮乃帥衆來赴夏四月帝與兄弟夜北渡河㑹榮於河陽南濟河即帝位以兄彭城王紹爲無上王弟霸成公子正爲始平王榮爲侍中都督中外諸軍事大將軍尚書令領軍將軍領左右衛封太原王百僚相率有司奉璽綬備法駕奉迎於河梁車駕廵河西至淘渚榮以兵權在巳遂有異志乃害靈太后及幼主次害無上王紹始平王子正公卿巳下二千餘人列􅀐衛帝迁於便幕車駕入宫御太極殿大赦天下改武太爲建義元年是月汝南王恱北海王顥臨淮王彧前後奔蕭衍郢州刺史元願逹據城叛五月加大將軍尓朱榮北道大行臺以尚書右僕射元榮爲東道大使征東將軍光禄勲元欣副之循方黜陟先行後聞大將軍尓朱榮還晉陽帝餞於邙隂六月通直散􅀐常侍髙乾邕及弟帥合流民起兵於齊州之太原頻破州軍詔東道大使元欣喻􅈲乃降是月葛榮飢使其僕射任襃帥車三萬餘乗南宼至沁水幽州平北府主簿河開邢果帥河北流民十餘萬户反於青州之北海自署濮王年號天統詔諸有司馬伏從戎者職人優兩大階詔當親御六戎掃清燕代大將軍太原王尓朱榮帥精銳十萬爲左軍上黨王天穆㹅衆八萬爲前軍司徒公楊椿勒兵十萬爲右軍司空公穆紹統卒八萬爲後軍是月葛榮衆退屯相州之北七月齊獻武王於鄴西北招慰葛榮別帥稱王者七人衆萬餘降之加大將軍尓朱榮柱國大將軍録尚書事光州人劉舉聚衆數千反於濮陽自稱皇武大將軍是月髙平鎮人万俟墨其二音醜奴僣大位署置百官八月葛榮帥衆圍相州九月詔太尉公上黨王天穆討􅁑榮次於朝歌以征東將軍齊州刺史元欣爲沛郡王柱國大將軍尓朱榮率􅀐七千討􅁑榮於􅇭口破擒之餘衆帥降兾定滄瀛殷五州平大赦天下巳改爲永安元年以柱國大將軍太原王尓朱榮爲大丞相都督河北畿外諸軍事冬十月蕭衍以北海王顥爲魏主年號孝基入據南兖之銍音質城二年夏四月上黨王天穆齊獻武王大破邢果於齊州之濟南果降送京師五月元顥尅梁國内外戒嚴癸酉元顥䧟滎陽甲戌夜車駕北廵幸河内景子元顥入洛戊寅太原王尓朱榮㑹車駕於長子即日反斾上黨王天穆北渡河㑹車駕於河内秋七月都督尓朱兆賀抜勝從硤石夜濟破顥子冠受及安豐王延明軍元顥敗走車駕入居華林園昇大夏門大赦天下宴勞天柱大將軍尓朱榮上黨王天穆及北平來督於都亭出宫人三百繒錦􅄂綵數萬疋班賜有差三年春三月雍州刺史尓朱天光討醜奴蕭寳寅於安定破擒之囚送京師六月嚈噠國獻師子九月天柱大將軍尓朱榮上黨王天穆自晉陽来朝帝殺榮及天穆於明光殿大赦天下遣武衛將軍奚毅前燕州刺史侯淵帥衆鎮北中是夜左僕射尓朱丗隆榮妻郷郡長公主帥榮部曲焚西陽門出屯河隂攻河橋擒毅等屠害之據北中城南逼京邑十月通直散􅀐常侍假平西將軍都督李苗以火舡焚河橋尓朱丗隆退走壬寅尓朱丗隆停建興之髙都尓朱兆自晉陽來㑹之共推太原太守行并州刺史長廣王曄爲主大赦所部號年建明十二月尓朱兆宼丹谷都督崔伯鳯戰殁都督羊文義史五龍降兆大都督源子恭奔退尓朱兆尓朱度律自富平津上率􅀐渉渡以襲京城事出倉卒禁衛不守帝歩出雲龍門兆逼帝幸永寕之佛寺殺皇子亂兵殺司徒公臨淮王彧僕射范陽王誨戊申元曄大赦天下尓朱度律自鎮京師尓朱兆遷帝於晉陽崩於城内三級佛寺時年二十四中興二年謚爲武懐皇帝太昌元年又謚孝莊皇帝廟號敬宗葬靜陵節閔皇帝後魏書曰節閔皇帝諱恭自脩業廣惠王之子也母曰王氏王少端謹有志度長而好學事祖母嫡母以孝聞正始中襲爵延昌中拜通直散􅀐常侍正光三年加散􅀐常侍領給事黄門侍郎以元乂擅權遂稱疾不起乆之因託瘖病五年就除金紫光禄大夫建義元年除儀同三司旣絶言垂將一紀居於龍華佛寺無所交通永安末有白莊帝者言王不語將有異圖民間遊聲又云有天子之氣王懼禍逃匿上洛㝷見追躡執送京師拘執多日以無狀獲免及莊帝崩尓朱丗隆等以元曄踈逺又非人望所推以王潜嘿晦身有過人量將謀廢立恐實不語乃令王所親申其意􅈲且兼迫䝱王遂荅曰天何言哉丗隆等大恱春三月曄迫至邙南丗隆等奉王東郭之外行禪讓之禮太尉公尓朱度律進璽綬衮冕之服及就輅車百官侍衛入自建春雲龍門昇太極殿前羣臣拜禮畢遂登閶闔門詔大赦天下以魏爲大魏改建明二年爲普㤗是月幽州刺史劉靈助起兵於薊撫軍將軍金紫光禄大夫兼侍中河北大使髙乾邕及弟平北將軍通直散􅀐常侍髙敖曹率衆夜襲兾州執刺史元嶷魚力切共推前河内太守封隆之行州事三月封長廣王爲東海王潁川王尓朱兆爲天柱將軍晉州刺史平陽郡開國公髙歡封勃海信都王夏四月詔有司不得復稱僞梁罷細作之條無禁鄰國還往髙歡以尓朱逆亂始興義兵於信都西定殷州斬其刺史尓朱羽生命南趙郡太守李元忠爲刺史鎮廣阿八月追尊皇考爲先帝皇妣爲先太妃封皇弟永業爲髙宻王皇子子恕爲青州渤海王旣而髙歡推立安定王爲帝於信都二年三月髙歡敗尓朱天光等於韓陵夏四月髙歡使魏蘭根慰喻洛邑且觀帝之爲人蘭根忌帝雅德還致毀謗竟從崔㥄音陵議廢帝於崇訓佛寺而立平陽王脩是爲孝武帝五月帝殂於門下外省時年三十孝武帝詔百司赴㑹大鴻臚􅁥護事葬用王禮加以九旒鑾輅黄屋左纛班劒百二十人後西魏追謚莭閔皇帝後廢帝安定王後魏書曰後廢帝諱朗字仲哲章武王融第三子也母曰程氏少稱明悟永安二年爲肆州魯郡王後軍府司馬元曄之建明二年正月爲兾州渤海太守及髙歡起義兵􅀅誅􅁀逆乃推載之冬十月即皇帝位於信都城西升壇柴燎大赦稱中興元年以髙歡爲侍中丞相都督中外諸軍事大將軍録尚書大行臺増邑三萬户以兼侍中撫河北大使髙乾邕爲侍中司空以前平北將軍通直散􅀐常侍髙敖曹爲驃􅀐大將軍儀同三司兾州刺史以終其身十一月髙歡率師攻鄴城二年春正月抜鄴擒刺史劉誕二月以髙歡爲大丞相柱國大將軍太師増封三萬户并前爲六萬户三月以齊文襄王起家爲驃􅀐大將軍儀同三司車駕幸鄴閏月尓朱天光兆度律仲逺等屯於洹水之南髙歡出頓紫陌尓朱兆率輕􅀐三千夜襲鄴城叩西門不尅退走髙歡大破尔朱天光等四胡於韓陵前廢帝鎮軍將軍賀抜勝徐州刺史杜德於陣降尓朱兆走并州仲逺奔東郡天光度律將赴洛陽大都督斛斯椿賈顯智倍道先還夏四月椿等據河橋懼罪自効㝷擒天光度律於河橋西北大行臺長孫稚都督賈顯智等率􅀐入京師執尓朱丗隆彦伯斬於都街口送天光度律於髙歡尓朱仲逺奔蕭衍車駕至河陽仍遜於別邸太昌元年五月封安定郡王邑一萬户後以罪殂於門下外省時年二十永熙二年葬鄴西南野馬崗孝武皇帝後魏書曰孝武皇帝諱脩字孝則廣平武穆王懷之第三子母曰李氏性沉厚少言好武治封汝陽縣公拜通直散􅀐侍郎轉中書侍郎建義􅀄除散􅀐常侍㝷遷平東將軍兼太常卿又爲鎭東將軍宗正卿永安三年封平陽王普㤗􅀄轉侍中鎭東將軍儀同三司兼尚書左僕射又加侍中尚書右僕射中興二年夏四月安定王自以踈逺未允四海之心請遜大位齊獻武王髙歡與百竂㑹謂僉謂髙祖不可無後乃共奉王即帝位於東郭之外自來陽雲龍門御太極前殿群臣朝賀禮畢升閶闔門大赦天下改中興二年爲太昌元年帝以丗昜除復齊獻武王爲大丞相大將軍還鄴車駕餞別於乾脯山殺大司馬汝南王恱大赦天下改太昌爲永興以同太宗時號㝷改爲永熈二年春正月車駕幸崧髙石窟靈巖寺十二月車駕狩於嵩陽遂幸温湯車駕還宫三年春二月壬子大赦壬午封左衛將軍元斌之爲頴川王夏四月癸􅐫日有蝕之五月丙戌直勲府庶子箱別六百人􅀐官箱別二百人閤内部曲數千人帝内圖髙歡乃以斛斯椿爲領軍使興王思玫等統之以爲心膂軍謀朝政咸决於椿分置督將及河南關西諸刺史辛夘下詔戒嚴楊聲伐梁實謀北討秋七月巳􅐫帝親惣六軍率南陽王寳炬清河王亶廣陽王湛斛斯椿以五千􅀐􅀫於􅈆西陽王別舎沙門都維郍惠臻􅀒璽持千牛刀以從有牛百頭盡殺以食軍士衆知帝將出其夜亡者過半清河廣陽二王亦逃歸略陽公宇文㤗遣都督駱超李賢和各領數百􅀐赴駱超先至甲戍賢和㑹帝於崤中巳酉髙歡入洛遣疋屢昭及河南尹元子思領左右侍官追帝請廻駕髙昻率勁卒及帝於陜西帝楊鞭長騖至湖城飢渇甚有王思村人以麥飯壷漿獻帝甘之復一村十年帝至稠桑潼􅀜大都督毛洪賔迎獻食八月宇文㤗遣大都督趙貴梁禦甲􅀐二千來赴乃奉迎帝過河謂禦曰此水東流而朕西上􅀂得重謁洛陽廟是卿等功也帝及左右皆流涕宇文㤗迎於東陽帝勞之將士皆呼萬歳遂入長安以雍州公廨爲宫大赦甲寅髙歡推司徒清河王亶爲大司馬承制惣萬機居尚書省歡追車駕至潼􅀜九月巳酉歡東還洛陽帝親督衆攻潼􅀜斬其行臺華長瑜冬十月髙歡推清河王亶子善見爲主徙都鄴是爲東魏魏於此始分爲二十二月帝崩時年二十五謚曰孝武葬雲陵文皇帝後魏書曰文皇帝諱寳炬孝文皇帝之孫京兆王愉之子也母曰楊氏帝正始􅀄坐父愉罪兄弟皆幽宗正寺及宣武崩乃得雪正光中拜直閣將軍時胡太后嬖寵帝與明帝謀誅之事泄免官武㤗中封劭縣侯永安三年進封南陽王孝武即位拜太尉加侍中永熈二年進位太保開府尚書令三年孝武與髙歡構難以帝中軍四面大都督及從入􅀜拜太􅌠録尚書事孝武崩丞相略陽公宇文㤗率群公卿士奉表勸進三讓乃許焉大統元年春三月戊申帝即位於城西大赦改元追尊皇考爲文景皇妣楊氏爲后己酉進丞相略陽公宇文㤗都督中外諸軍録尚書事大行臺改封安定郡公以尚書令斛斯椿爲太保廣平王賛爲司徒乙夘立妃乙氏爲皇后二年春正月辛亥祀南郊改以神元皇帝配東魏攻陷夏州三年冬十月安定公宇文㤗大破東魏軍於沙􅁐拜㤗柱國大將軍四年春正月辛酉拜天於清暉室終帝丗遂爲常二月東魏攻䧟南汾頴豫廣四州廢皇后乙氏三月立蠕蠕而蠢切女都九閭氏爲皇后大赦秋七月東魏將侯景等圍洛陽帝與安定公宇文㤗東伐九月車駕至東伐五年冬十月於陽武門外懸鼔置􅁓筆以求得失六年春正月庚戌朝群臣自西遷至此禮樂始備七年十二月御憑雲觀引見諸王叙家人之禮手詔爲宗誡十條以賜之八年春正月􅀄置六軍十六年五月東魏静帝遜位於齊秋七月安定公宇文㤗東伐至􅁪農齊師不出乃還九月大赦十七年春正月庚戍帝崩于乾安殿時年四十五葬於永陵謚曰文皇帝廢帝後魏書曰廢帝名欽文皇帝之長子也母曰乙皇后大統元年正月乙夘立爲皇太子十七年三月即皇帝位二年秋八月大將軍尉遟逈尅成都剱南平冬十一月安定公宇文㤗殺尚書元烈三年正月安定公宇文㤗廢而立齊王廓帝自元烈之誅有怨言淮安王育廣平王賛等並垂泣諌帝不聽故及於辱恭皇帝後魏書曰恭皇帝諱廓文帝之第四子也大統十四年封爲齊王廢帝三年正月即皇帝位改元十一月師㓕梁戕土良切梁元帝梁太尉王僧辨奉元帝子方智爲王承制居建業三年春正月丁􅐫􅀄行周禮建六官以安定公宇文㤗爲太師􅃁􅌠以柱國李弼爲大司徒以趙貴爲太保大宗伯以尚書令獨狐信爲大司馬以于謹爲大司宼以侯莫陳榮爲司空冬十月乙亥安定公宇文㤗薨十二月庚子帝遜位於周閔帝元年正月東魏封帝爲宋公㝷殂東魏孝静皇帝後魏書曰孝静皇帝諱善見清河文宣王亶之丗子也母曰胡妃永熙二年拜通直散􅀐侍郎秋八月爲驃􅀐大將軍開府儀同三司孝武旣入􅀜渤海王髙歡奉迎不克乃與百僚㑹議推帝以奉肅宗之後時年十一月冬十月即位大赦天下改永熈三年爲天平元年有事於太廟詔曰安安能遷自古之明典所居靡定徃昔之成䂓是以殷遷八城周卜三地􅁻凶有數隆替無􅁪事由於通變理出於不得巳故也髙祖孝文皇帝式觀乾象俯恊人誅發自武州來幸嵩縣魏雖舊國其命惟新及正光之季國歩孔􅁄喪亂不巳宼賊相侵俾我生民無所措手今逺遵古式深驗時事考􅀛襲􅁻遷澤漳􅇭庶克隆洪基再昌寳暦主者明爲條格及時發邁車駕北遷詔渤海三髙歡留後部分以衛軍大將軍尚書令元弼爲驃騎大將軍儀同三司洛州刺史鎮洛陽十一月車駕幸鄴是冬蕭衍以元慶和爲鎮北將軍魏王入據平瀬郷孝武崩於長安二年春正月渤海王髙歡襲擊山胡劉蠡升大破之詔以髙歡爲相國假黄􅃏劒履上殿入朝不趨王固讓不受三月髙歡討劉蠡升斬之蠡升子南海王復僣帝號髙歡進擊破擒之及其第西海王皇后夫人王公巳下四百餘人并獲逋逃之民二萬餘户八月發七萬六千人營新宫十二月車駕狩於鄴是􅀊西魏文帝大統元年三月春正月詔加渤海王高歡九􅃬之禮遣侍中元子思敦喻固讓乃止二月詔加渤海王丗子澄使持節尚書令大行臺大都督秋七月大赦天下四年夏四月遷七帝神主入新廟大赦天下先是蕭衍因益州刺史傅和請好遣李諧等使於蕭衍冬十月西魏遣其大行臺元季海大都督獨􅀌如願逼洛州行軍事廣陽王湛弃城退還季海如願遂據金墉頴川長史賀􅀂徽執刺史田迅西叛引西魏都督梁廽據城西魏又遣其都督趙繼宗右丞韋孝寛等攻䧟豫州大象元年春正月巨象至自碭郡陂中南兖州􅀗送大赦改年大都督賀抜仁攻西魏南汾州拔之率豫州刺史堯雄等與大行臺侯景司徒髙敖曹大都督万俟受洛于等於北豫相㑹俱討頴州梁廻等棄城遁走頴川平秋七月行臺侯景司徒髙敖曹圍西魏將獨􅀌如願於金墉城八月大敗西魏於河隂司徒髙敖曹儀同三司大都督李猛宗顯並戰殁西魏留其長孫子彦守金墉渤海王髙歡濟河子彦棄城走興和元年五月立皇后髙氏大赦天下秋七月詔渤海王髙歡爲相國録尚書事大行臺固辝相國九月發畿内民夫十萬人城鄴城四十日罷十一月以新宫成大赦改元二年春正月徙新宫大赦天下三年冬十月詔羣官於麟趾閣議新定制令頒於天下發夫五萬人築漳濵堰四年夏五月渤海王髙歡請令百官月一靣敷政事明揚仄陋納諌屏邪親理獄訟武定元年春正月大赦改年車駕蒐於邯鄲之西山三月渤海王高歡討宇文黒􅆩於邙山大破之擒西魏臨洮王森蜀郡王榮宗江夏王昇鉅鹿王闡譙郡王亮追奔至􅁪農而還豫洛二州平二年春正月渤海王髙歡請在并州置晉陽宫以處配没之口三月渤海王丗子髙澄爲大將軍五年春正月渤海王髙歡薨於晉陽司徒侯景反頴州刺史司馬丗雲以城附之景入據頴城誘執豫州刺史髙元成廣州刺史􅁀顯等司空韓􅁤驃􅀐大將軍儀同三司賀拔仁驃􅀐大將軍儀同三司可朱渾道元左衛將軍劉豐等率衆討之景乃遣使降於西魏請師救援西魏遣其將李景和王思政帥􅀐赴之思政䓁入據頴川景乃出走豫州侯景復背西魏歸於蕭衍衍置景爲河南王大將軍承制六月司徒韓􅁤司空可朱渾道元等自頴川班師大將軍髙澄迎勞於石濟髙澄還晉陽秋七月以大將軍髙澄爲使持節大丞相都督中外諸軍事録尚書事大行臺渤海王九月蕭衍遣其兄子貞陽侯淵明率衆宼徐州堰泗州於寒山以灌彭城冬十月以尚書左僕射慕容紹宗爲東南道行臺與驃􅀐大將軍儀同三司大都督髙岳潘相樂討淵明十一月大破之擒淵明及其二子六年正月大都督髙岳等戰於渦陽大破侯景俘斬五萬餘人溺於渦水水爲之不流景走淮南冬十月侯景濟江推蕭衍弟子臨賀也王正德爲主以攻建業蕭衍弟子北徐州刺史封山侯蕭正表以鍾離内属三月侯景尅建業還以蕭衍爲主衍第子北衮州刺史定襄侯蕭祇湘潭侯蕭退來降夏四月詔渤海王髙澄緑綬紱譛拜不名入朝不趨劒履上殿是月侯景殺蕭衍立子綱爲主六月尅頴州擒西魏大將軍尚書左僕射東道大行臺太原郡開國公王思政頴州刺史皇甫僧顯及戰士男女數萬口八月盗殺渤海王髙澄甲午太原公髙洋如晉陽八年春正月帝爲渤海王髙澄舉哀於東堂詔太原公髙洋嗣事三月進爵爲齊王夏五月詔齊王爲相國揔百揆備九錫之禮以齊國太妃爲王太后王妃爲王太后詔歸帝位於齊國即日遜於別宫齊天保元年封中山王二年冬十二月殂時年二十八謚曰孝静皇帝葬於漳西山岡太平御覽卷第一百四
