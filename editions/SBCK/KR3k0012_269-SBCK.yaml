front:
  text: 太平御覽卷第二百六十九
  hash: sha256:132c922730439074cb13d79faf685bdcf452df403fc706c1b441799b74713054
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_269-1a}
body:
  text: 職官部六十七酷令長縣丞主簿縣尉酷令長漢書曰何並字子廉爲長陵令道不拾遺成太后外家王氏貴而侍中王林卿坐法免歸長陵上冢因留飲連日並恐其犯法乃自造門上謁謂林卿曰冢間單外君冝以時歸林卿曰諾林卿素驕慙於賔客林卿旣去北渡涇橋令􅀐奴還至寺門拔劒剥其建鼓並自從吏兵追林卿行數十里林卿迫窘乃令奴冠􅀍其䄡䄖自代乗從車􅀐身變服從間徑馳去㑹日暮追至收縛冠奴奴曰我非侍中奴耳並心知巳失林卿乃曰君因自稱奴得脫死即叱吏斷頭持還縣所剥鼓置都亭下署曰故侍中王林卿東觀漢記曰董宣爲洛陽令擊持豪強在縣五年七十四卒官詔遣使者臨視唯布􅀍覆屍妻子對哭家無餘財上歎曰董宣死乃知貧耳晉書曰何曽孫機爲鄒平令性亦矜傲責郷里謝鯤等拜或戒之曰禮敬年爵以德爲主今鯤畏勢懼傷風俗機不以爲慙羡爲離狐令旣驕且􅈔陵駕人物郷閭疾之如讎永嘉之末何氏滅亡無遺焉梁書曰沈瑀爲餘姚令冨吏鮮衣美服以自彰別瑀怒曰汝等下縣吏何自擬貴人耶悉使著芒屫麄布侍立終日足有蹉跌輙加榜捶瑀微時甞自至此鬻瓦器爲冨人所辱故因以報焉由是士庻駭怨縣丞史記曰詔捕淮南太子淮南相怒壽春丞留太子建不遣如淳注曰丞主刑獄囚徒故責之漢書曰黄霸爲潁川太守務在成就全安長吏許老丞病聲督郵白欲逐之霸曰許丞廉吏雖老尚能拜起送迎止頗重聽何傷且善助之母失賢者意如淳曰許縣丞也後漢書曰張􅀇宗君夏河陽人也少習春秋顔氏兼通數家法建武􅀄舉明經􅀘引農文學遷陳倉縣丞清浄無欲專心經書方其講問乃不食終日及有難者輙爲張數家之􅀃令擇從所安諸儒皆伏其多通者録千餘人􅀇􅀄爲縣丞甞以職事對府不知官曹處吏白門下責之時扶風琅耶徐業亦大儒也聞􅀇諸生試引見之與語大驚曰今日相遭真解矇矣遭逢也遂請上堂難問極日吴志曰㑹稽妖賊許昌起於句章自稱陽明皇帝扇動諸縣衆以萬數孫堅以郡司馬募召精勇得千餘人與州郡合討破之刺史臧旻列上功狀詔書除堅鹽績丞數歳從盱眙丞又徙下邳丞又曰孫堅爲下邳丞歴佐三縣所在有稱吏民親附郷里知舊好争少年往來者常數百人堅接撫待養有􅀂子弟也唐書曰武德元年詔京令五品丞一人七品正六人八品畿令六品丞一人七品正四人八品上縣令六品丞一人八品正四人九品中下縣各有差後改爲尉主簿後漢書曰繆肜音融字孺公仕縣爲主簿時縣令􅀍章見考史皆畏懼自誣而肜獨證據掠考苦毒乃至體生虫蛆因轉換五獄踰渉四年令卒以自免又曰寧陽主簿詣闕訴其縣令之枉積六七歳不省乃復上書曰臣聞陛下爲臣父臣爲陛下子臣章百上終不見省臣豈可北詣單于以告􅁈乎帝大怒尚書劾以大逆虞詡駮之曰主簿所訟乃君父之怨百上不逹乃有司之過又曰仇覽字季和一名香􅀄爲蒲亭長有陳元者母告其不孝覽爲陳慈孝之道卒成孝子考城令王渙政尚嚴猛聞覽以德化人署爲主簿謂覽曰主簿聞陳元之過而不罪得無少鷹鸇之志耶覽曰以爲鷹鸇不􅀂鸞鳯渙謝遣曰枳􅁄非鸞鳯所棲百里非大賢之路乃以月俸資遣令入太學其名大振唐書曰􅂫弁爲奉天主簿朱泚之亂徳宗倉卒出幸縣令杜正元上府計事聞大駕至官吏惶恐皆欲奔􅇡山谷弁諭之曰君上避狄臣下當伏難死節昔肅宗幸靈武至新平安定二太守皆潜遁帝命斬之以徇諸君知其事乎衆心乃安及車駕至迎扈儲峙無闕德宗嘉之就加試大理司直汝南先賢傳曰李宣之子名表宋公令冦端召表爲主簿表不樂爲吏於寺門中焚燒衣幘端怒收表欲殺之陳仲舉聞之至宋公欲請表先過宣宣問何故來曰欲見冦令請足下兒宣曰吾子犯罪罪當死如有明君豈妄殺人冝從此還端追問仲舉仲舉具以語之端乃歎曰李宣烈士也即原之􅂫林廣舊傳曰仇香字季和爲書生性謙恭勤恪威矜莊皃不爲晝夜易容言不爲喜怒變聲雖同儕群居必正色後言終身無泄狎之交以是見憚學通三經然無知名之援郷里之舉年四十召爲縣主簿唐職貟令曰主簿掌付事勾稽省署抄目糾正縣内非違􅁥印給紙筆之事縣尉春秋元命苞曰天尉主甲卒設武備今時尉官亦准此義也史記曰張湯給事内史爲寗成􅁺以湯爲無害言大府調爲茂陵尉治方中漢書音義曰方中陵上土作方也湯主治之也􅂫林曰天子即位豫作陵諱之故言方中如淳曰大府幕府也茂陵尉主作陵之尉也韋昭曰大府公府也漢書曰李廣出鴈門匈奴兵多破廣廣亡失多當斬贖爲庻人屏居藍田南山射獵甞夜一􅀐出從人田間飲還至亭霸陵尉醉呵止廣廣􅀐曰故李將軍尉曰今將軍尚不得夜行何故也􅀫廣亭下居無何匈奴入隴西殺太守於是上乃召廣拜爲右北平太守廣請霸陵尉與俱因斬之又曰梅福字子真九江壽春人也少學長安明尚書榖梁春秋爲郡文學􅀘南昌尉後去官東觀漢記曰光武起兵入冦綘衣􅀐牛殺新野尉乃得馬又曰逢萌字子康北海人少有大節志意抗厲家貧給事爲縣亭長尉過迎拜問事微乆尉去舉拳撾地嘆曰大丈夫安能爲人役耶遂去學問後漢書曰橋􅀇案梁兾客陳助羊昌罪由是著名舉孝廉􅀘洛陽左部尉時梁不疑爲河南尹以公事當詣府受對􅀇恥爲所辱乃弃官還郷里又曰令長國相亦皆有尉大縣二人小縣一人主盗賊案察姦􅁤應劭漢官儀曰大縣丞左右尉所謂命卿二人小縣一人一尉命二人續漢書百官志曰邊縣有鄣塞尉掌禁備羗夷犯塞秩比二百石魏志曰太祖除洛陽北部尉􅀄入尉􅅟繕治四門造五色棒懸門左右各十餘枚有犯禁者不避豪強皆棒殺之後數月愛幸小黄門蹇石叔父夜行則殺之賊師歛迹莫敢犯者近習寵臣咸共疾之而不能傷蜀志曰劉備率其屬從校尉鄒靖討黄巾有功除安喜尉督郵以公事到縣先主求謁不通直入縛督郵杖二百解綬係其頸弃官亡命唐書曰顔師古隋仁壽中授安養尉尚書左僕射楊素見師古年弱皃嬴因謂曰安養劇縣何以克當師古曰割雞焉用牛刀素竒其對到官果以幹理聞又曰貟半千晉州臨汾人上元􅀄應八科舉授武陟尉屬頻歳旱飢勸縣令殷子良開倉以賑貧餒子良不從㑹子良赴州半千便發倉粟以給飢人懷州刺史郭齊宗大驚因而按之時黄門侍郎薛元超爲河北道存撫使謂齊宗曰公之百姓不能救之而使惠歸一尉豈不愧也遽令釋之又曰王無競字仲烈其先琅耶人因官徙居東萊宋太尉弘之十一代孫無競有文學􅀄應舉下筆成章舉及第解􅄄授趙州欒城縣尉又曰李勉爲開封尉外平日乆且汴水陸所湊邑居厖雜號難治勉與聮尉盧城軌等並有擒姦擿伏之名又曰栁公綽爲渭南尉公綽性謹重動循禮法屬歳饑其家雖給而毎飯不過一器歳稔復􅀄又曰包佶授藍田尉時有詔命畿内諸縣城奉天時嚴郢爲京兆政尚峻􅁀加以朝旨甚迫尹正之命急如風霆本曹尉韋重規其室方娠而疾畏郢之􅁀不敢以事故免佶因請代役無愆素當時義之又曰竇叅強直果斷少以門䕃積官至万年尉時同僚有直官曹者將夕聞親疾叅請代之㑹獄囚亡走京兆尹按直部將奏叅遽請曰彼以不及狀謁叅實代之冝當罪坐貶江夏尉人多義之唐新語曰盧莊道年十六授長安尉太宗將録囚徒京宰以莊道㓜年懼不舉欲以他尉代之莊道不從但閑暇不之省也時繫囚四百餘人令丞深以爲懼翌日太宗召囚莊道乃徐書􅃺以進引諸囚人莊道評其輕重留繫日月應對如神太宗驚歎又曰魏奉古爲雍丘尉時姚珽蒞汴州群寮畢謁珽覽刺召奉古前持廐牧令示奉古奉古一覽便諷千餘言珽驚起曰仕宦且四十年未甞見此又曰朱履霜好學明法理􅀘山隂尉廵察使委以推按故人或遺以數兩黄連固辭不受曰不辭受此歸恐母妻詰問從何而得不知所以對也又曰楊再思爲􅀇武尉使于京舎於客院盗者􅀼其裝囊邂逅遇之盗者謝罪再思曰足下有遺行勿復聲惡恐傍人害足下可留公文餘並仰遺不形容色時人莫測其量又曰􅀇宗聽政之暇從禽自娱又於蓬萊宫側立教坊以習倡優曼衍之戯酸􅀥尉􅀽楚客以爲天子春秋方壯冝節之以雅恐從禽好鄭將蕩上心乃引由余太康義上䟽以諷􅀇宗納之又曰鄭蜀賔頗善五言竟不聞達年老方授江左一尉親朋餞别於上門蜀賔賦詩留別曰畏途方萬里生涯近百年不知將白首何處入黄泉酒酣詠聲調哀感滿坐爲之流涕竟卒於官魯國先賢傳曰二世時山東盗賊起二世問諸臣曰於公何如愽士諸生三十餘人前曰人臣無將則反罪至死無赦願陛下急發兵擊之二世怒叔孫通前曰諸生言皆非明主在上四方輻湊安有反者此乃䑕􅀼狗盗守尉今捕誅之何足可憂二世喜乃賜通衣帛拜爲愽士諸生或譏通之䛕通曰我幾不免虎口乃亡去之薛薛已降楚遂從項梁梁死從項羽先賢行狀曰程堅字諶甫爲北陽尉貧無車馬每出追遊常歩行郡間給事焉搜神記曰蔣子文者廣陵人􅄝酒好色挑撻無度常自言巳青骨死當爲神當漢末爲秣陵尉遂死及吴先主之􅀄其故吏見子文於道乗白馬執白羽扇侍從如平生吏見驚走子丈進馬追之謂曰我當爲此土地之神以福尓下民尓可宣告百姓爲我立祠不尓將有大咎荆州圖記曰澧陽縣西百三十里澧水之南岸有白石􅀟立狀􅀋人形髙各三十丈周廻等四十丈古之相傳昔有充縣左尉與零陵尉共論疆因相傷害化爲此石即以爲二縣界首東摽零陵西碣充縣充縣廢省今臨澧縣則其地也墨子曰備城法百歩一亭亭一尉焉宋武帝詔曰百里之任揔歸官長縣尉實効甚微其費不少二品縣可置一尉而巳餘悉停省太平御覽卷第二百六十九
