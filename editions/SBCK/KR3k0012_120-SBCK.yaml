body:
  text: 偏霸部四後趙石勒石弘石虎石閔後趙石勒崔鴻十六國春秋後趙録曰石勒字丗龍上黨武郷羯人父周易朱勒生時赤光滿室白氣自天屬于庭中長而壯健有膽力雄武好􅀐射幼而力耕毎聞鞞鐸之聲或在前後懼以告父母曰勞耳鳴無不祥也㑹并州刺史司馬騰執諸胡山東賣充軍實將詣兾州兩胡一枷勒亦在中東至平原賣荏平人師懽爲奴毎夜於野嘗聞鼔角之聲諸奴亦聞歸以白灌懽竒而免之隣於馬牧率汲桑往來勒以能馬自託於桑而傭武安臨水爲遊軍所囚㑹有羣鹿傍過軍人競逐之勒乃獲免俄而見一老父謂勒曰羣鹿者我也君應爲中州主故相救耳勒拜而受命遂招集王陽䕫安等十八􅀐復東如赤龍􅀐諸􅁐中乗􅁐馬逺掠繒寳以賂汲桑永興元年􅀜東所在兵起二年陽平人公師蕃等自稱將軍起兵趙魏衆至數萬勒與汲桑率牧人乗􅁐馬數百􅀐以赴之桑始命勒以石爲姓以勒爲名永嘉元年勒歸劉淵淵拜爲輔漢將軍平晉王淵薨聦襲位劉曜王弥圍洛陽勒帥精􅀐三萬㑹之王弥旣平洛陽將先誅勒請弥讌于巳營手斬弥并其衆將軍郭黙獲沙門笁浮圖澄以其有道術進之於勒試澄有効甚尊重之前趙嘉平二年張賔說勒曰邯戰襄國趙之舊都依山慿險形􅀔之國可擇此二邑而都之然後命將四岀授以竒略王業可圖勒於是進據襄國聦授勒都督幽兾并營四州諸軍事兾州牧進封本郡上黨公邑萬户三年以征虜將軍爲魏郡太守鎭業三臺基謀之萌逃於此矣前趙麟嘉元年劉琨遣姬澹帥衆來討勒與戰澹軍大敗琨長史李􅀪以并州來降七月劉聦疾甚以勒爲大將軍録尚書事受遺輔政勒固辭乃止劉曜稱尊號將授勒太宰大將軍加九錫增封十郡并前二十郡出入警蹕如曹公輔故事曜聞曹平樂之言停太宰之授勒大怒曰趙王趙帝􅀌自取之名號大小豈尓所呼耶征虜虎與左右長史張敬張賔等上䟽曰大司馬雖位􅃣九台非霸者之號請改稱大將軍大單于領兾州牧趙王依魏王在鄴故事以二十四郡户十九萬爲趙國十一月勒即位改光􅀄二年爲趙王元年建社稷宗廟主書司典胡人出内重其禁法不聽侮易衣􅃣華族號胡爲國人二年令曰國人不聽執㛐在喪婚娶至於燒葬令如本俗八月繕軒懸儛八佾作金根大輅黄屋左纛天子禮樂於斯備矣三年􅀺陽民陳武妻産三男一女上書自陳令曰昔周之興也四乳八子今武妻乳四子可謂慶過􅁎祥羙加曩日其賜乳婢一人榖百石雜繒四十疋庶以肅迎嘉祥冬十月勒與郷親齒坐語及平生勒曰李陽壯士也􅀌方任之何以不來父老歸語令速來漚麻麻之忿是布衣之恨􅀌方崇信于天下寜讎疋夫乎令曰武郷吾之豐沛也其復之三丗十一月李陽至引入懽酣宣楊臂笑視之曰卿雖老臂中猶有力頗復與人闘不􅀌住曰厭卿老拳卿亦飽􅀌毒手賜甲第一拜爲都尉陽與勒隣居歳常爭漚麻池迭相敺擊四年二月拜子􅀪爲丗子勒雅好文學雖在軍旅之中常令儒生讀春秋史漢諸傳而聽之聞酈食其勸立六國後大驚曰此法當失何以得成天下至留侯諫乃曰頼有此侯耳其天資英逹如此八年八月脩三臺十月以丗子衛將軍􅀪鎮鄴太和十年劉曜圍洛陽襄國大震勒統歩􅀐四萬趙金墉濟河先是流澌風猛軍至氷冸清和濟畢流澌大至以爲神靈之助命曰靈昌津戰于西陽門曜軍大潰石堪執曜送之二年曜子熈等去長安奔于上邽車􅀐虎尅上封遣主簿趙封奉傳國玉璽送之秦隴悉平建元元年二月車􅀐虎等上尊號勒不許固請勒以趙天王行皇帝事大赦八月羣臣又固請以名位不正宜即尊號九月僣即皇帝位大赦改年正月勒南郊有白氣自壇属天勒大恱四月勒如鄴議營新宫廷尉續咸諌曰臣聞唐虞之治採􅁺茅茨土堦三尺羙彰于詩書漢文惜百金不營露臺稱之於千古迨夏啇之瓊臺瑶室楚秦章華阿房資財内竭華夷外叛詔曰且勑停作申吾直臣之氣九月以太尉中山王虎爲大司馬程遐開府儀同是月犬雨霖中山西北􅁀水流巨木萬餘根集于堂陽勒大恱謂公卿曰此非爲灾天意欲吾營鄴都耳於是營之勒以成周漢晉舊京欲有移都之意乃命洛陽爲南都置行臺治書侍御史于洛陽三年正月大饗于建德殿酒酣勒謂徐光曰朕方自古開基何等主也光對曰陛下神武籌略邁于髙皇雄藝卓犖超絶魏祖自三王巳來無可比也其軒轅之亞乎勒􅀏曰人豈不自知卿言亦巳太過朕􅀂逢髙皇當北面而事之然猶與韓彭競鞭而爭先耳脫遇光武者當並驅于中原未知鹿死誰手丈夫行事當礧礧落落如日月皎然終不能如曹孟德司馬仲逹父子欺他􅀌兒寡婦狐媚以取天下朕在二劉之間軒轅豈所擬乎羣臣皆稱萬歳四年雍州刺史石生上言西郷竹死虵䑕􅃲于安定府間二日虵死臨涇馬生角長安城中雞鳴音皆曰基兹安定㕔事前夜聞誦書聲求之不得七日乃止隕石于肥郷六月勒寢疾召中山王虎太子􅀪中常侍嚴震等侍疾禁中七月薨于西閤僞謚明皇帝廟號髙祖晉書曰勒年十四隨邑人行敗洛陽􅀝嘯上東門王衍見而異之頋謂左右曰向胡鶵吾觀其聲視有竒志恐將爲天下之患馳遣收之㑹勒巳去石􅀪崔鴻十六國春秋後趙録曰石􅀪字大雅第三子母程夫人右光禄遐之妹建平元年立爲太子虚衿受士好爲文詠其所親昵莫非儒素勒謂徐光曰大雅愔愔殊不似將家子光曰漢祖以馬上取天下孝文以􅀇黙治之聖人之後必丗勝殘天之道也勒大恱程遐言於勒曰中山怏怏不可以輔少主宜早除之以便大計勒不從勒薨虎執政臨軒召子兾州刺史遂帥兵入禁􅀫衞文武無不奔散􅀪大懼䇿拜中山王虎爲丞相以十三郡封爲魏王又加九錫虎僞讓後乃授之延熈元年七月改頓丘爲衛國分魏郡立􅀺陽十月􅀪賫璽綬親詣魏宫喻禪意虎曰􅀪昏昧愚暗處喪無禮不可以君臨萬國奉承宗廟便當廢之云何禪讓也十一月廢􅀪爲海陽王􅀪就車容色自􅀂幽􅀪及太后南陽王恢于崇訓宫煞之時年二十二石虎崔鴻十六國春秋後趙録曰石虎字季龍勒之從子勒父朱幼而子之故或謂之爲勒弟晉永興中與勒相之嘉平元年劉琨送勒母王及虎于􅁑陂時年十七殘忍好馳獵諠遊無紀度尤善彈人軍中毒患之勒白王曰此兒凶􅁀無使軍人煞之聲名可惜宜自除也王曰快牛犢子小時多能破車爲復小忍勿怯之至十八檢攝恭謹嚴重愛士弓馬迅健勇􅃣當時勒深嘉焉拜征虜將軍性酷虐無道軍中勇幹䇿略與已侔者輙因事害之至於降城䧟壘坑斬士女鮮有遺􅀋勒屢加責誨而行意自􅀂然御衆嚴而不頗莫敢犯者指授攻討所向無前故勒寵信弥隆杖以專征之任旣廢殺􅀪稱居攝趙大王建武元年正月大赦改年虎志荒内遊外躭營繕使太子邃省可尚書奏事選守牧祀郊廟征伐刑断乃親覽之三月南遊臨江而還江東大震是日鶴省臺成賜匠有􅏔九月遷都鄴宫二年徙洛陽鍾簴九龍等于鄴是歳大武殿東西宫皆就大武殿基二丈八尺穿爲伏室置衛士五百人於其中東西七十五歩南北六十五歩皆􅃮瓦金璫銀楹珠簾玉壁窮極伎巧起靈臺之殿于顯陽後採召百官州郡民女以充之後庭服綺榖珎竒者萬餘人内置宫女十八等教宫人星占及馬歩射置女太史靈臺仰􅀚災祥以考外太史虚實禁郡國不得􅀻知學星䜟左校令成公叚造庭燎于崇杠之末髙十餘丈上置繚下盤置人絙繳上下虎試而恱之三年太保安夔等文武五百九十人上皇帝尊號􅂆進方入而庭燎油灌下盤死者七人虎大怒腰斬成公叚于閶闔門即天王位南郊大赦親王貶爲郡公蕃王爲縣侯太子邃㹅百揆其後荒酒淫色驕恣無道或盤于遊畋懸管而入或夜百􅀐􅀫于宫臣家淫其妻妾裝飾宫人羙淑者斬首洗血置盤上傳首視之又内諸比丘尼有姿色者與其交䙝後煞之合牛羊􅁏煑而食亦賜左右所以識其味也虎荒躭内遊威怒違度􅃉以事可呈之怒曰此小事何足呈也時有所不聞復怒曰何以不呈誚責杖捶月至再三􅃉甚愠私謂中庶子李顔等曰官家難稱吾欲行冒頓之事卿從我乎顔等伏不敢對事發幽􅃉于東宫殺之及妃張氏男女二十六人盡賜死合一棺埋之誅其宫臣友黨二百餘人立河間公宣爲太子建武六年追尊號考樂平孝公爲太宗孝皇帝八年六月上黨孟門上有神人之像㘴于山上三日而去虎遣使以太牢祀之九年十二月武郷送雄虎變爲雌乳一狼子七日噬虎腦而殺之後三日狼子亦死佛圖澄聞之流涕十年虎起河橋於靈昌津採石爲中濟石無大小輙隨流用功五百餘萬不成虎如靈昌津沉壁告誠壁浮于渚上水波騰上津所殿􅀚莫不傾壞壓死者百餘人虎恚甚斬工匠而還十一年發雍梁十六萬人城長安未央宫又發司豫荆兖二十六萬人城洛陽宫十三年二月虎親耕籍田于桑梓􅁐十四年三月虎夢龍飛西南自天落地旦而問澄公公曰禍將至矣陛下冝父慈子和深以愼之四月秦公韜起宣光殿于太尉府梁長九丈太子宣視而惡之斬匠截梁而云韜怒増之十丈宣聞之恚甚謂楊柸牟成等曰韜凶竪勃逆敢違我如是汝等能殺之者吾入宫盡以韜之國邑分封汝等韜旣死主上必親臨喪因行大事無不濟矣柸等許諾八月煞韜宣奏之虎哀絶乆之乃􅂫召太子宣鏁繫於鄴北火焚殺之議立太子于東堂虎曰吾欲以純􅁅三㪷洗吾腹穢惡故生凶子兒年二十便欲煞父今丗方十歳比其二十吾巳老矣齊公丗爲皇丗子立昭儀劉氏爲皇后十一月饗羣臣于大武前殿佛圖澄殿上褰衣而行吟曰􅁄子成杯將壞人衣虎發石而視之有􅁄子生焉冉閔小字􅁄奴也十二月辛巳雷大􅀨霖虎問佛圖澄澄曰其爲我乎至戊子而澄卒大寜元年正月虎僣即皇帝位于南郊大赦改年二月有沙門從雍州來稱見佛圖澄西入􅀜虎掘之無屍唯有一石虎惡之曰石者朕也葬我而去吾將死矣因而寢疾四月薨于金華殿晉書曰季龍始咸康元年僣位至此太和六年凡在位十五歳子丗即位尊劉后爲太后彭城王遵先鎭􅀜右至是勒兵而還戎卒九萬次于湯隂石閔爲前鋒都督太后令授遵丞相加九錫増封十郡己丑至安陽亭庚申矅兵入自鳯陽門昇太武前殿盡哀退如東閤羣臣敦􅂆即位大赦封丗爲譙王邑萬戸廢太后劉氏爲昭儀㝷皆殺之丗立凡三十三日尊其母鄭氏爲皇太后立妃張氏爲皇后大司馬義陽王鑒爲太傅沛王冲爲太保石閔爲都督中外諸軍事録尚書事甲午太武殿災諸門􅀚閤蕩然服御燒者太半光炎照天月餘乃㓕乙未􅀨血周遍鄴城六月葬虎顯原陵僞謚武皇帝廟號太祖十二月石閔劫司空李農右衞王基等謀共廢遵閔使將軍蘇彦周成帥甲士三十人執于南臺如意􅀚遵時方與婦人彈碁問成等曰反者誰也成曰義陽王鑒當立遵曰我尚如是汝等立鑒復幾時遂殺之于琨華殿并誅鄭太后張皇后遵字太祗虎第九子凡在位百八十三日鑒即位大赦以石閔爲將軍封武德王李農爲大司馬鑒使中書令李松殿中將軍張才等夜誅閔農于琨華殿不克禁中擾亂鑒僞不知夜斬松才於西中華門龍驤將軍孫伏都劉誅等結羯士三千人伏于胡天亦欲誅閔等鑒在中臺伏都帥三十人將昇臺挾鑒以攻之鑒見問其故伏都曰閔農等反已在都掖門臣嚴帥衞士謹先啓知鑒曰卿好陳力勿憂無報也伏都等攻閔農不克閔農攻斬伏都等自鳯陽門至琨華撗尸相枕諸胡羯無少長斬之死者二十餘萬人于時髙鼻多鬚至有濫死者青龍􅀄元年正月石閔欲㓕二石之號議曰孔子曰死姓而王七月者七十有二國継趙李䜟書炳然且德星鎭衞宜改號大衛易姓李氏又大赦改元閏月廢鑒煞之誅虎孫三十八人盡殪石氏鑒在位一百三日鑒字太朗虎第三子也晉書曰季龍十三子五人爲冉閔所殺八人自殘害䜟言㓕石者陵㝷而徙封蘭陵公字龍惡之改蘭陵爲武興郡至是終爲閔所㓕石勒以成帝咸和三年僣立二主四子凡二十三年以穆帝永和五年㓕石閔崔鴻十六國春秋後趙録曰石閔字永曾虎之養孫也父瞻字􅀪武本姓冉名良魏郡内黄人也其先漢􅀺陽􅀐督累丗牙門勒破陳午於河内獲贍時年十二長而勇悍便弓馬臨陣不頋勒竒之曰此兒壯健可嘉命虎子之歴位左積射將軍封西華侯閔㓜而果銳虎撫之如孫及身長八尺善謀勇力絶人虎即位爲脩武侯歴北中郎將虎之敗昌􅀺閔軍獨全由此功名大顯永興元年閏月司徒申鍾司空郎闓等四十八人上尊號於閔僣皇帝位于南郊大赦改元號稱大魏復姓冉氏追尊祖隆元皇帝考贍烈祖皇帝母王氏爲皇太后妻董氏爲皇后子智爲皇太子以司馬李農爲太宰諸子皆爲縣公新興王祗聞石鍳之死稱尊號于襄國改年永寜石祗遣相國汝隂王石琨帥衆十萬伐鄴六月進據邯鄲閔盡衆拒之琨軍大敗二年三月閔改襄國百餘日祗懼乃去皇帝之號改稱趙王遣太尉張舉乞師于慕容㑺中軍張春請救于姚弋仲三月祗相國汝隂王琨自兾州救祗弋仲遣子襄帥􅀐三萬八千儁遣將軍恱綰帥甲士三萬勁卒十三萬四方攻之祗衛其後閔師大敗閔與十餘􅀐奔還鄴祗使劉顯師衆七萬追奔伐鄴閔盡衆岀戰大敗之追奔至于陽平顯懼宻使請降求煞石祗爲効四月劉顯煞祗及其丞相樂安王炳太保張舉等遣拜顯上大將軍大單于兾州牧祗炳皆虎之庶子也七月劉顯稱尊號襄國三年二月劉顯帥衆伐常山守􅂫彦告難閔率􅀐八千救彦敗顯于常山追奔及于襄國顯大將軍曹伏駒開門爲應遂入襄國誅顯及其公卿已下百餘人焚襄國宮室遷其民于鄴三月慕容儁已尅幽葪略地至于兾州閔帥􅀐擊之與慕容恪遇于廣臺恪方陣而前閔衆寡不敵所乗赤馬曰朱龍日行千里潰圍出東奔二十餘里馬無故而死遂爲恪所擒送之于薊儁立閔而問之曰汝奴僕下才何敢妄稱天子閔曰天下大亂􅈛曹夷狄人面獸心尚欲􅆲逆我一時英雄何爲不可作王耶儁怒鞭之三日遣慕容評帥衆圍鄴五月送閔龍城告廆而煞之鄴中餓人相食虎時宫人略盡冉智尚㓜蔣幹遣詹事劉猗奏表降晉八月長水校尉馬願龍驤將軍田香開門降評蔣幹懸而投岀于倉垣評送閔后董氏太子智太尉申鍾及諸王公卿于薊􅀄慕容儁斬閔于遏陘山山左右七里草木悉枯蝗虫大起自五月不􅀨至于十二月儁遣使者祀之謚曰武悼天王其曰大􅀨雪是歳太和八年也太平御覽卷第一百二十
