front:
  text: 太平御覽卷第九百三十六
  hash: sha256:b288a88c100f0215123c7b5565f2b6b55bbbd126a4a489c2ec7878c399d13068
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_936-1a}
body:
  text: 鱗介部八魚下鯉魚鰋魚鱣魚鮪魚䱎䲛魚魚下辛氏三秦記曰昆明池人釣魚綸絶而去夢於漢武求去其釣明日遊戲於池見大魚衘索帝曰昨所夢也取而去之帝後得明珠玄中記曰東方之東海有大魚焉行海者一日逢魚頭七日遇尾其産則三百里水爲血永嘉郡記曰青田溪冬天水􅀬如湯衆魚歸之名魚倉三齊記曰青城山始皇􅀕此山築石城入海三十里射魚水四里變赤如血于今猶爾盛弘之荆州記曰長沙湖郷連水邊有石魚形􅀂鯉相重沓如雲母炙之作魚腥林邑國記曰飛魚翼如蟬飛則凌雲沉泳海底王子年拾遺録曰􅌡洲一名魂洲亦曰環洲有洞淵廣千里有魚身長千丈鱗色蘭徧鼻有角時鼔舞戲或有逺而望者見水間有五色雲上就而視之此乃魚噴水爲雲也又曰夏鯀治水無功沉於羽淵化爲玄魚大千丈後遂死横於河海之間後世聖人以魚爲神化之物以玄字合於魚爲鮌字崔豹古今注曰水君狀如人乗馬衆魚導從一名魚伯大水有之漢末有人於河際見之人馬皆有鱗甲如大鯉魚但手足别耳目鼻與人不殊見人良乆入水而没􅀶物志曰呉王江行食膾有餘棄於江中流化而爲魚今江中有名吴王餘鱠魚者長四寸大者如箸猶作鱠形嶺南異物志曰南方嘗晴望海中二山如黛海人云去岸兩廂各六百里一旦暴風雷旦霧露皆腥雜以泥涎七日方巳屬有人從山來􅀃云大魚因鳴吼吹沬其一鰓掛山巔七日山爲之折不能去鳴聲爲雷氣爲風涎沬爲霧又曰海中所生魚唇置隂處有光初見之以爲恠異土人甞推其義盖鹹水所生海水中遇隂晦波如燃火滿海以物擊之迸散如星嶺表録異曰新瀧等州山田㨂荒平處以鋤鍬開爲町疃伺春雨丘中貯水即先買鯇魚子散於田内一二年後魚兒長大食草根並盡旣爲孰田又収魚利及種稻且無稗草乃齊民之上術也異􅁐曰永嘉有人斷水捕魚宰牲祈􅀕了無所獲將棄罷之其夕夢見老公云諸君何小停夜聞㹠聲驚起共看乃是大魚剉以爲鮓頓得百薄故因以百薄爲瀬水述異記曰桓冲爲江州遣人周行廬山見一湖中有赤鱗魚使者欲飲水魚張鬐向之乃不敢飲又曰􅀜中有金魚神云周平王二年十旬不雨遣􅀕天神俄而生湧泉魚躍出而降雨幽明録曰成彪兄䘮哀悼結氣晝夜哭泣後釣於澤經所共飲處釋綸悲感有大魚跳入舡中俯視諸小魚彪仰天號慟俛而見之悉放小魚大者便自出舡去搜神記曰宫亭湖􅀌石有估客下都經其下見二女子云可爲買兩量絲履自厚相報估客至都市好絲履并箱盛之自市一書刀亦在箱中旣還以箱置廟中而去忘取書刀湖中正㠶忽有鯉魚跳入舡破魚得書刀焉廣五行記曰唐儀鳯元年􅀶州僧正滿行同凢俗數頭於房作鱠食之至夜四更忽聞䆫外有􅁀風聲乃夢一佛二佛二金剛語滿云爾是何物小兒將穢汚伽藍金剛手執棒滿閉目因而兩目不開矣又曰曹宋二州西界大劑陂村人陳君少小爲捕魚業於後得患恒􅀍衆魚所食痛苦不能自持若以魚網蓋之其痛即止後爲村人盜其網去數日之間不勝痛苦而死樂府歌曰江南可採蓮蓮葉何田田魚戯蓮葉間魚戯蓮葉東魚戯蓮葉西宋玉對問曰夫鳥則有鳯魚則有鯨鯨魚朝發崑崙之墟􅁀鬐於碭石夕宿於孟諸夫尺澤之鯢豈能與量江海之大哉東方朔客難曰水至清則無魚人至察則無徒曹植荅崔文始書曰臨江以釣不獲一鱗非江魚之不食其所餌之者非也是以君子慎舉擢鯉魚河圖曰黄帝遊於洛見鯉魚長三尺青身無鱗赤文成字毛詩宛丘衡門曰豈其食魚必河之鯉又臣工潜曰鰷鰋鯉鰷音條東觀漢記曰姜詩字士遊性至孝母常飲江水兒取水溺死恐毋知詐云行學俄而涌泉出舎側并旦出鯉一􅀟謝承後漢書曰羊續好食生魚爲南陽太守丞侯儉貢鯉續受而懸之一歳儉復致一枚續乃以所懸枯魚以示儉終身不復食魚晉書曰王祥性至孝早䘮親繼母朱氏不慈數譛之由是失愛於母父有疾衣不解帶湯藥必親甞母欲生魚時天寒水凍祥解衣將剖氷求之氷忽自解􅀟鯉躍出持之而歸又曰劉聦將趙染爲索綝所敗殺其長史魯徽劉曜聞之曰蹄涔不容尺鯉染之謂也齊書曰崔祖思自相國從事中郎遷齊國内史髙帝旣爲齊王置酒爲樂羹膾既至祖思曰此味故爲南北所推侍中沈季文曰羮膾吴食非祖思所解祖思曰鼈鯉似非勾吴之詩文季曰千里蓴羮豈􅀜魯衛帝甚恱曰蓴羮故應還沈南史曰梁南郡太守劉之亨甞夢二人姓李詣之乞命未之解也其明日仲夏有遺生鯉魚二頭之亨曰必夢中所感也乃放之其夜又夢來謝恩云當令君延筭淮南子曰詹公之釣千歳之鯉詹公詹何古得道善釣者又曰牛蹄之踵無盈尺之鯉踵牛踐處符子曰務光自投盧盧川之伯以赤鯉送之金樓子曰五尺之鯉一寸之鯉但大小殊鱗之數等家語曰孔子娶于宋并官氏女一歳而生伯魚伯魚生三日魯昭公以鯉魚賜孔子孔子榮君之貺因名子曰鯉字伯魚曹植辨道論曰甘始言取鯉魚一􅀟令一者含藥俱投沸膏中有藥者奮尾皷鰭遊行沉浮有􅀂處淵其一者巳熟而可噉余時問言可試不言是藥去此踰萬里非自行不能得也慱物志同陶朱公養魚經曰威王聘朱公問之曰公住足千萬家累億金何術乎朱公曰夫治生之法有五水畜第一所謂水畜者魚也以六􅅿地爲池池中有九洲即求懷子鯉魚長三尺者二十頭壯鯉四頭以二月上旬庚日内池水中令英恠畏拜謝之魚言我迎汝耳上我背與汝俱去即大􅁀雨子英上騰去歳歳來歸故舎食飲見妻子魚復來迎之如此七年故吴中門戸作神魚子英祠續述征記曰梁孝王家中有數尺水有大鯉人謂有靈不敢犯宣城記曰臨城縣盖山有舒姑泉相傳云昔舒氏女未嫁與其父採薪此女坐處化爲清泉其母云此女好音樂乃往絃歌而泉涌有朱鯉一􅀟及命作樂泉故涌出河洛記曰諺云伊洛魴鯉天下最美洛口黃魚天下不如崔豹古今注曰兖州人謂赤鯉爲玄駒白鯉爲白驥黃鯉爲黃雉搜神記曰宫亭􅀌石有估客至都因市一刀置神廟中而忘取至湖中忽有一鯉跳入舡破之得刀具魚部中續捜神記曰謝允從武當山還在梪宣武座言及左元放爲曹公置鱸魚允便云此可得耳求大瓮盛水朱書符投水中俄有二鯉皷鬐在水中又曰㑹稽音懋縣有女子姓吴字望子爲蘓侯神所愛望子心有所欲輙空中下之望子甞思鱠一􅀟鮮鯉應心而至幽明録曰孫權時南方遣吏獻犀簪吏過宫亭廟請福神下教求簪而盛簪器便在神前神云臨入石頭當相還去逹石頭三尺鯉魚跳入舡吏破魚得之又曰平都縣南陂上有冢行人於陂取得鯉道逢􅃁中人來云何敢取吾魚奪着車上而去杜寳大業拾遺録曰四年梁郡有清冷淵水靣闊二里許即衛平得大􅀛之處清冷水南有横瀆東南至宕山縣西北入通濟渠是時大􅀨溝渠皆滿忽有大魚似鯉而頭一角長尺餘鱗正赤從清冷水岀頭長三尺許入横瀆逆流西北十餘里不没入通濟渠于時夾兩岸隨看者數百人皆謂赤龍大鯉從淵而出此亦唐柞將興之兆楊衒之洛陽伽藍記曰京師語曰伊洛鯉魴貴於牛羊廣五行記曰隋煬帝大業􅀄爲詩令宫人唱之曰三月三日向江頭正見鯉魚江上游意欲垂釣徃撩取恐是蛟龍還復休鯉魚即唐之國姓俄而唐有天下故歌辭曰客從逺方來贈我􅀟鯉魚呼兒烹鯉魚中有尺素書古歌寗戚辭曰中有鯉魚長尺半弊布衣裳不覆骭鰋爾雅曰鰋今鰋額白魚音偃毛詩鹿鳴魚麗曰魚麗于罶鰋鯉鰋鮎也謝承後漢書曰陳蕃爲郡法曹吏正月朝見太守王龔客有貢白魚於龔者龔曰汝南乃有此魚蕃曰魚大且明府之德晉書曰夏統字仲御母病詣洛市藥㑹三月上巳洛中王公巳下並至浮橋統並弗之顧太尉賈充恠而問之曰卿居海濵頗能水戲乎荅曰可乃操柂正櫓折旋中流於是風波振駭俄而白魚跳入舡中者有八九觀者皆悚遽酈善長水經注曰聖水岀上谷東南流經大坊嶺下嶺之東首山下有石穴東北洞開穴中有水􅂄舊傳言者有沙門釋惠珎者常㝷之旁水入穴三里有餘穴分爲二一穴漸小西北岀不知趣詣一穴西南岀入經五六日方還又不測短長其水夏冷冬温春秋有白魚岀穴數日及人有採食者美珎甞味蓋亦丙穴嘉魚之􅀋列仙傳曰陵陽子明釣於溪得白龍子明解釣謝之後數十年得白魚腹中有書教子明服食之法三年白龍來迎之鱣毛詩谷風四月曰匪鱣匪鮪潜逃于淵又詩義䟽曰鱣身似龍銳頭口在頷下背上腹下皆有甲大者千餘斤後漢書曰楊震常客居湖城衆人謂之晚貴震志愈篤後有冠雀銜三鱣魚飛集講堂前冠音貫即鸛雀也都講取魚進曰虵鱣者卿大夫服之象也數三者法三台先生自此􅂛矣淮南子曰牛蹄之涔不生鱣鯉抱朴子曰探鷰窠而求鳯􅆑搜井底而捕鱣魚雖加至勤其非所有也水經曰漢水又東爲鱣湍洪波奔盪崩浪雲頺􅂄舊言有鱣魚􅁬鰭遡流望濤直上至此則爆失濟故因名湍矣又曰鱣鮪鯉也出鞏穴三月則上渡龍門得渡爲龍矣否則􅀧額而還張衡西京賦曰鱣鮪鱮鮦郭璞江賦曰魚則叔鮪王鱣孫綽望海賦曰文鯉黃鱣鮪魚爾雅曰鮥音洛鮛音叔鮪鮪鱣属也大者名王鮪小者名鮛鮪今冝都郡自荆門以上江中通岀鱏鱣之魚有一魚狀似鱣而小建平人呼鮥子即此魚也鱏音尋毛詩淇澳碩人曰施􅅈濊濊鱣鮪撥撥毛詩義䟽曰鮪魚岀海三月從河上形似鯉而色青黒頭小而尖如鐵兠鍪口在頷下今東萊遼東人謂之尉魚或謂仲明魚仲明者樂浪尉溺死海中化爲此魚也禮記月令曰季春薦鮪於寢廟進時羹味淮南子曰夫牛蹄之涔不生鱣鮪又曰禹決江䟽河鑿龍門辟伊闕龍門本有水門鮪魚由其中上行得上過者便爲龍門禹辟而大之故言鑿抱朴子曰寸鮪汎濫啼水之中則謂天下無四海之廣也芒蝪宛轉菓㧡之内則謂八極之界盡於兹也􅀶物志曰河隂岫穴出鮪魚焉䱎公贈反䲛武亘反魏武四時食制曰䲛一名黃魚大數百斤骨軟可食出江陽犍爲淮南子曰季春天子始乗舟薦鮪於寢廟乃爲麥祈實鮪亘瞢魚也天子乗舟捕魚者以薦進廟也司馬相如上林賦曰䱎䲛漸離左思吴都賦曰筌䱎䲛太平御覽卷第九百三十六
