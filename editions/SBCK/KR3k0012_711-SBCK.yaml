front:
  text: 太平御覽卷第七百一十一服用部十三
  hash: sha256:21d6889abeec31714ed589203c1add53870257c9ade3cec8723d3ca6035a9899
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_711-1a}
body:
  text: 箱巾箱笥笈火籠箱東宫舊事曰皇太子􅀄拜有馬齒呈事箱四枚漢武帝内傳曰帝崩時遺詔以􅄂道書四十卷置棺中至延康二年河東功曹李及入上黨抱犢山採藥於岩室中得此書盛以金箱卷後題日月是武帝時河東太守張純以箱及書奏上之武帝時左右見之涕泣曰此是帝崩時殯殮物宣帝愴然以書付茂陵安合如故晉陸雲與兄機書曰一日行曹公器物有書箱五枚想兄識彦髙書箱甚似之巾箱漢武内傳曰武帝見西王母巾箱中有一卷書王母曰此五岳眞形圗昨青城諸仙就我求今當付之宋書曰元凶劭弑逆南陽公主見女巫嚴道育云天神當賜符應時主夕卧見流光相隨狀若螢火遂入巾箱化爲􅀟珠圎青可愛因是巫蠱而敗齊書曰衡陽王鈞常手自細書冩五經部爲一卷置于巾箱中以備遺忘侍讀賀玠問曰殿下家自有墳素復何須蠅頭細書別藏巾箱中荅曰巾箱中有五經於撿閱易且一更手冩則永不忘諸王聞而争効爲巾箱五經自此始也丗說曰威法濟者義興人其兒年二十得病經年有神來語言牀席不浄神何處得坐曰有􅃮内箱甚浄神何不入中因内新果於箱中􅁴有聲以箱蓋覆之於是便聞箱中動揺即以衣傳之可五􅂛米重而病愈異苑曰晉孝武太元末毎聞手巾箱中有鼓吹鞞角之音帝是歳崩天下大亂笥說文曰簞笥飯及衣之器也尚書曰惟衣裳在笥論語曰一簞食一瓢飲蕇笥也東觀漢記曰上問第五倫卿爲市掾人有遺卿母一笥餅卿從外來見之奪母笥探口中餅岀之倫對曰實無此衆人以臣愚蔽故爲生此語東觀漢記曰上聞王郎將軍至復驚去馮異進笥麥飯兎肩續漢書曰丗祖微時繫南鳴市獄市吏以一笥飯與之呉越春秋曰越以文笥七枚獻呉王西京雜記曰宣帝以虎魄笥盛身毒寳鏡風俗通曰孝靈帝建寕中京師長者皆以葦辟方笥爲粧具時有識者竊言葦方笥郡國讞篋也今珍用天下皆當有罪讞於理官也後黨錮皆讞廷尉人名悉入方葦笥中斯爲驗矣張衡綬笥銘曰南陽太守鮑德有詔所賜先公綬笥傳丗用之更治笥平子爲德主簿故爲之銘也笈說文作扱曰笈驢上􅀒也風俗記曰笈學士所以􅀒書箱如冠籍箱也謝承後漢書曰徐稚字孺子公車五徴皆不降志其有䘮􅀒笈赴弔行五里也又曰􅀽閎字夏甫汝南人也博覽群書常􅀒笈㝷師變易姓名又曰髙弘字伯武河内山陽人爲琅瑘相到官自負笈單歩入界聽採風俗又曰蘇章字士成北海人􅀒笈追師不逺万里又曰方儲字聖明􅀒笈到三輔無術不覽又曰郎宗􅀒笈賣卜給食諸公表上􅀶士徴宗宗􅀒笈遁去李固傳曰固父爲三公而固歩行􅀒笈千里從師拾遺録曰漢惠帝時有仙人韓稚東至泥離國遇其人洞室􅀒笈而問其年幾何漢武内傳曰上元夫人語武帝曰阿母令以瓊笈妙藴發紫臺之文賜汝火籠方言曰南楚江􅃆之間籠謂之篣或謂之笯陳楚宋魏之間謂之庸君今薰籠是也齊書曰卞彬性飲酒火籠什物多諸詭異自稱卞田居又曰范述曽爲永嘉太守有善政徴爲游擊將軍郡故舊送錢二十餘萬一無所受唯得白桐皮火籠朴十餘枚而巳梁書曰臨賀王正德爲呉郡太守正德自謂應居儲嫡心常怏怏後奔魏􅀄去之始爲詩一絶内火籠曰楨幹屈曲盡蘭麝氣氲銷欲知懷炭日正是履氷朝脩復山陵故事曰當梓宫中有象牙火籠東宫舊事曰太子納妃有􅃮􅀞手巾薰籠二條大􅀍薫籠三西京雜記曰漢制天子以象牙爲籠上皆散花文後宫則五色綾文劉向别録曰淮南王有薫籠賦齊謝朓詠竹火籠詩曰庭雪亂如花井氷粲成玉因炎入豹䄂懷温奉芳蓐體宻用冝通文斜性非曲梁范静妻沈詠五彩竹火籠詩曰可憐潤霜雪纎剖後毫分織作廻風莒製爲縈􅀐文含芳岀珠􅀍耀緑接緗裙徒嗟今麗飾豈念昔凌雲太平御覽卷第七百一十一
