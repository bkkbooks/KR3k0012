front:
  text: 太平御覽卷第九百四十一
  hash: sha256:6fb9bf9f14821cc82dbe2888856886287d042bc95b49799cf9239a82ca27342f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_941-1a}
body:
  text: 鱗介部十三貝螺􅑕貝尚書禹貢曰淮海惟揚州島夷卉服厥篚織貝又顧命曰大貝鼖鼔在西房大貝如車渠啇周傳寳之毛詩節巷伯曰萋􅀆菲􅀆成是貝錦貝如錦也又義䟽曰有紫貝質白如玉紫􅀧爲文皆行列相當大者徑一尺七寸今九眞交阯以爲杯盤實物也孝經援神契曰德至泉則江生大貝爾雅曰貝陸居贆方遥切在水者蜬水陸異名也貝中肉如科斗但有頭尾音含大者魧書大傳曰大貝如車渠車渠謂車輞即魧属魧户􅀰切小者鯖今細貝亦有紫色者岀日南青音青􅀇貝貽貝黒色貝也餘貾音池黄白文以黄爲質白爲文􅀧餘泉白黄丈以白爲質黄爲文􅀧今之紫貝以紫爲質黒爲文􅀧蚆音巴􅀶而者中央廣兩頭銳逵􅁤二音蜠音囷大而險險者汚薄􅜽小而即上小貝折謂狹而長此皆􅀃貝之形容他果切􅀃丈曰貝海介蟲也古者貨貝而寳􅀛也汲􅃁周書王㑹曰共人􅀇貝共人呉越之蠻􅀇貝昭貝也漢書曰文帝賜尉佗書佗因使者獻紫貝五百後周書曰歩落稽婦人多貫蜃貝以爲飾隋書曰流求國人用鳥羽爲冠飾以珠貝唐書曰吐渾國婦人辮髪縈後綴以珠貝又曰拂菻國有大貝車渠淮南子曰啇拘文王於姜里於是散冝生乃以千金求天下之珍怪得大貝百朋五百爲一朋也山海經曰􅉑山之尾其上多玉魚水出焉其中多文貝又曰邽山濛水出焉其中多貝貝甲中肉如科斗但有頭尾又曰赤水之東有蒼梧之野爰有文貝紫貝也南州異物志曰交阯以南海中有大文貝質白文紫天姿自然不假雕琢磨瑩而光煥爛六韜曰啇王拘周西伯昌於姜里太公與散冝生金千鎰求珎物以免君罪九江之浦有大貝百馮詩作朋也鹽鐵論曰教與俗改弊與丗易夏后氏以􅀇貝周人以紫石相貝經曰珪延得大貝於昌陽弱泉爲五帝瑶器也得拘􅈔何貝大如輪爲文王壽穆王大業貝懸其殻於昭陽觀以消惡霧又曰瀕水貝可以朗目南海貝如珠可以治水毒也浮貝投水則浮也醟貝使童子愚女子􅁋嶺表録異曰紫貝即砑螺也儋振夷􅀺海畔採以爲貨南越志曰土産明珠大貝即紫貝也螺易􅀃卦曰離爲蠃注曰剛在外也周官天官上鼈人曰􅀕祀供蠯蠃蚳以授􅊽人蠃螔蝓也鄭司農云蠯蛤也杜子春云蠯也蠯音陴國語曰大夫種謀呉曰今呉大荒其民必移就蒲蠡於東海之濵必可伐廣志曰海文蠡數種其大者受一􅂛南人以爲酒杯魏書曰漢末天下荒亂率乏糧榖􅀽術在江淮取給蒲蠃民相食州郡蕭條宋書曰元嘉末魏太武征彭城遣使求酒及甘橘張暢宣孝武帝命致螺杯雜粽南􅁟所珍北史曰隋劉臻性好噉蜆以音同父諱呼爲扁螺淮南子曰蠃􅫡愈燭睨蠃附螺也􅫡細長螺也燭睨目中疾此皆治目之藥也人無故而永此物者必有蔽其明也水經曰桂陽貞女峽峽西岸髙巖名貞女山山下際有石如人形髙七尺􅃺女子故名貞女峽古來相傳有數女取螺於此遇風雨晝晦忽化爲石山海經曰旬山洵水出焉南流注于閼澤其中茈蠃紫色螺也又曰邽山濛水出焉有螺魚身而鳥翼見則其邑大水搜神記曰謝端夏官人少􅀌爲郷人所養年十八㳟謹自守後於邑下得一大螺如三升盆耳將盍甕中每早至野還見有飲飯湯火處端疑之於籬外窺之見一少女從甕中出至竈下燃火便入問之女荅曰我天漢中白水素女天帝哀卿少􅀌使我權相爲守舎炊煑使卿後得婦當還去今無故相伺不冝留此忽有風􅀨而去徐􅂨南方記曰馬軻蠃大者圍九寸長四寸細者圍七寸長三寸南州異物志曰鸚螺􅃺如覆杯頭如鳥頭向其腹視似鸚鵡故以名肉離殻食唯以筯自係於殻飽則入殻中􅀂爲魚所食殻乃浮出爲人所得質白而文紫崔豹古今注曰蝸牛宛轉有草紋縳爲結似螺髻交州異物志曰􅀉居山蠃蟲而長如蠡而脚似蜘蛛大无殻入蠡殻中又曰螺大者如筥一邊重可爲酒器又曰吒螺着海邊樹上見人吒如人声可食又曰蒼螺江東人以爲椀假猪螺日南有之厭爲甲者鄧德明南康記曰平固水口下流數里有螺亭臨江昔一少女曽與伴俱乗小舩江漢採螺旣逼暮因停沙邊共􅀫忽聞騷騷如軍馬行湏􅁷乃見羣螺張口無數相與爲災來破舎噉此女子同侣諸嫗當時惶怖不敢作声悉走上岸至暁方還但見骨耳収斂喪骨薄埋林際歸報其家經四五日間近所埋處飜見石􅃁穹窿髙十餘丈頭可受二十人坐也今四面有階道髣髴人冢其頂上多螺殻新故相仍郷傳謂之螺亭丗語曰衛瓘大康永熈中家人炊飯墮地盡化爲螺出足而行瓘終見誅廣五行記曰晉武帝時裴楷家炊黍在甑或變爲螺其年楷卒又石崇家稻米化螺崇亦􅀍誅嶺表録異曰鸚鵡螺旋尖處屈而朱如鸚鵡觜故以此名殻上青緑斑大者可受二􅂛殻内光􅉷如雲母裝爲酒杯竒而可翫又紅螺大小亦􅀋鸚鵡螺殻薄而紅亦堪爲酒器刳小螺爲足綴以膠漆􅁑龔薦戴昱曰昱年六十二兄弟同居二十餘年及爲宗老分昱將妻子逃舊業入虞澤結茅爲室捃穫野豆拾掇蠃蚌以自振給蚌易通卦驗曰小雪雉入水爲蜄爾雅曰蜃小者珧珧玉珧也即小蚌珧音遥􅀃文曰􅪓歩梗切蜯也鮚巨栗切折音蚌也漢書曰漢律㑹稽獻鮚醬二􅂛蜯蜃之屬周書曰成三時具􅇌獻蜃鄭􅀇注曰蜃大蛤也大戴禮曰十月雉入淮爲蜃蜃者蒲蘆也春秋後語曰齊趙將伐燕􅂫代爲燕􅀃趙王曰今者臣來過小水見小蜯方出暴而鷸啄其肉蜯合而挾其啄啄口也上啄其肉音張角切下啄音許穢切鷸曰今日不􅀨明日不雨必見蜯脯蜯亦謂鷸曰今日不出明日不出必見死鷸兩不相捨漁父得而併擒之今趙且伐燕燕趙乆相支以弊其衆臣恐強􅁗之爲漁父也故願大王熟計之趙王於是乃止魏志曰孔融與韋康書云元將仲將不意􅀟珠近岀老蜯陳書曰武帝雅尚恭儉膳不過數品私饗曲宴皆用瓦器蚌盤唐書曰太宗謂侍臣曰蜃性含水待月而水生木性懐火因燧而􅆋發人性含靈待學而成美墨子曰申屠狄謂周公曰賤人何可薄􅁘周之靈珪岀於􅁟石楚之明月出於蚌蜃少家大豪出於汚澤天下諸侯皆以爲寳狄今請退也淮南子曰季秋爵入大水爲蛤爵依屋之萑也飛鳥也隨陽下藏故爲蛤又曰古者剡耜而耕摩蜃而耨剡利也耜臿屬也蜃大蛤摩令利用之耨耨除苗穢又曰孟冬水始冰地始凍雉入大水爲蜃雉陽鳥也三歳而死極陽切隂故隨隂氣入水爲蜃蜃大蛤也又曰明月之珠出於蛖音尨蜄珠有夜光之明月生於蛖中又曰毛羽者飛行之􅀋也故屬於隂日者陽之主也是以春夏則羣獸除日至而麋鹿解解角也月者隂之宗也是以月虧而魚腦減月死而螺蚌㾭㾭減蹴也又曰古者民茹草飲水採樹木之實食蠃蛖之肉時多疹病毒傷之害又曰明月之珠蜃蛖之病而我之利虎爪象牙禽獸之利而我之害栽猶人也又曰蛖象之病人之寳也蛖大蛤中有珠象牙還以自病故人得以爲寳人之病將有誰寳之者乎人以利欲爲病無人寳之故曰有將誰寳西京雜記曰長安始盛飾鞍馬競加雕鏤或一馬之飾直百金皆用白蜃爲珂紫金爲花以飾其上越地形記曰夏靖荅車茂弘論鄮縣書曰其蜯蛤之屬目所希見耳所未聞徐􅂨南方記曰白珠蜯殻長三寸半漲海中􅀷六七丈去岸四五十里永嘉郡記曰樂成縣木履山東帶採門凢海採者皆由其門故以爲名多香螺文蛤之屬􅀶物志曰東南之人食水之産西北之人食六畜産食水産者􅀛蛤螺蚌以爲珎味不覺其腥臊也食六畜産者狸兎䑕雀以爲珎味不覺其膻燋也杜寳大業拾遺録曰南方林邑有大蚌盈車明珠至寸不以爲貴國人不採交州異物志曰烏滸山居射翠取羽剖蜯􅊥珠任昉述異記曰淮水中黄雀至秋化爲蛤至春復爲黃雀五百年化爲蜃蛤嶺表録異曰珠池簾州邊海中有洲島島上有大池謂之珠池毎年脩貢珠户入池採珠皆採老蚌剖而取珠池在海上疑其底與海通珠如豌豆大常珠也如彈丸者亦時有得徑寸照室之珠卒不可遇也又取小􅑕肉貫之以篾曝乾謂之珠母容桂人率將脯燒之以薦酒肉也中有細珠如梁粟乃知珠池之􅑕隨其大小悉胎中有珠矣延篤與髙義方書曰今兹以五經爲鼎簠書傳爲爼籩祖􅄒堯舜憲章文武未暇蜯也冝勿以爲念郭璞江賦曰紫蚢如渠洪蚶專車瓊􅑕晞曜以瑩珠石􅎕應節而􅀭葩太平御覽卷第九百四十一
