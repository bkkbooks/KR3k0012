body:
  text: 皇王部二十八後魏顯宗獻文皇帝髙祖孝文皇帝丗宗宣武皇帝肅宗孝明皇帝顯宗獻文皇帝後魏書曰顯宗獻文皇帝諱弘髙宗文成皇帝之長子也母曰李貴人興光元年秋七月生於隂山之北太安二年二月立爲皇太子聦叡機悟㓜有濟民神武之䂓仁孝純至禮敬師友和平六年夏五月即皇帝位大赦天下秋七月太尉乙渾爲丞相事無大小皆决於渾是􅀊劉子業叔父彧殺子業僣立天安元年春正月大赦改元二月丞相太原王乙渾謀反伏誅皇興元年閏月劉彧青州刺史沈文秀兾州刺史崔道固並遣使請舉州内属二年夏四月髙麗庫莫奚契丹于闐波斯諸國各遣使朝獻四年三月詔宣告天下民有病者所在官司遣醫就家􅐷視所湏藥物任醫所湏量給之八月帝欲禪位於叔父京兆王子推羣臣固請帝乃止後下詔曰朕承洪業運属太平淮岱率從四海清晏是以希心􅀇古志存淡泊躬覽萬務則損頤神之和一日或曠政有滯淹之失且子有天下歸尊於父父有天下傳之於子今稽叶靈運考㑹羣心爰命儲宫踐曻大位朕方優逰恭巳栖心浩然社禝乂安克廣其業不亦善乎百官有司其祗奉元子以荅天休宣布㝢内咸使聞悉於是羣公奏曰三皇之丗􅌿泊無爲故稱皇是以漢髙旣稱皇帝尊其父爲太上皇明不統天下今皇明㓜冲萬機大政猶冝陛下惣之謹上尊號太上皇帝乃從之太上皇徙御崇光宫採椽不斵土堦而巳國之大事咸以聞承明元年二十三崩于永安殿在位六年謚曰獻文皇帝廟號顯祖葬雲中金陵髙祖孝文皇帝後魏書曰髙祖孝文皇帝諱宏顯祖獻文皇帝之長子母曰李夫人皇興元年八月生平城紫宫神光照室天地氤氲和氣充塞帝生而㓗白有異姿襁褓歧嶷長而淵􅁉仁孝卓然有君人之表顯祖尤愛異之三年夏六月立爲皇大子五年秋八月即皇帝位於太華前殿大赦改元延興元年冬十月沃野統萬二鎮叛詔太尉隴西王元賀追擊至枹音符罕㓕之斬首三萬餘級徙其遺逆於兾定相三州爲營户十二月詔訪舜後獲東萊郡民嬀茍之復其家畢丗以彰盛德之不杇二年春二月詔曰尼父禀逹聖之姿體生知之量窮理盡性道光四海頃者淮徐未賔廟隔非所致令祠典寢頓禮章殄㓕遂使女巫妖覡淫進非禮殺生鼓舞倡優媟音狎豈所以尊明神敬聖道者也自今巳後有􅀕孔子廟制用酒脯而巳不聽婦女雜合以祈非望之福犯者以違制論夏四月詔工啇􅄂􅀋盡聽赴農詔沙門不得去寺浮遊民間是月劉彧死子昱僣立秋七月詔州郡縣各遣二人才堪專對者赴九月講武當親問風俗詔縣令能静一縣刼盗者兼治二縣即食其禄能静二縣者兼治三縣三年遷爲郡守二千石能静二郡上至三郡亦如之三年遷爲刺史三月詔諸倉屯榖夌充積者出賜貧民夏四月詔以孔子二十八丗孫魯郡孔乗爲崇聖大夫給以十户供洒掃四年九月以留昱内相攻戰詔將軍元蘭將三萬􅀐及假東陽王丕爲後繼伐蜀漢承明元年六月太上皇帝崩大赦改年尊皇太后爲太皇太后臨朝稱制秋七月追尊皇妣李貴人爲思皇太后太和元年七月劉昱死弟准僣立二年夏四月京師旱祈天文於北苑親自禮焉减膳避正殿澍雨大洽曲赦京師九月􅀛兹國遣使獻龍馬三年四月吐谷渾國遣獻猫牛五十頭是年島夷蕭道成廢其主劉准而僣立自號曰齊四年春罷畜鷹鷂之所以其地爲報德佛寺五月詔㑹京師􅂄老賜錦綵衣服几杖稻米蜜麺復家人不傜役六年三月蕭道成死子􅞾僣立七年閏月皇子生大赦天下定州上言爲粥飢民所活九十四萬七千餘口八月詔曰帝業至重非廣詢無以至治今制百辟卿士工啇吏民各上便冝利民益治損化傷政直言極諌勿有所隠務令辭無煩華理從簡實朕將親覽以知丗要使言之者無罪聞之者足以戒九年春正月詔曰圖䜟之興起於三季旣非經國之典徒爲妖邪所憑自今圗䜟祕諱及名爲孔子閉房記者一切皆焚之留者以大辟論又諸巫覡假稱神鬼妄􅀃􅁻凶及委巷諸卜非墳典所載者嚴加禁斷大饗羣臣干大華殿班賜皇誥十年春正月帝始服衮冕饗方國二月􅀄立黨里鄰三長定民户籍夏四月始制五等公服帝服以法服御輦祀於西郊八月給尚書五等品爵巳上朱衣玉佩大小組綬九月詔起明堂辟雍冬十月有司議依故事配始祖於南郊十有一年春正月詔定樂章非雅者除之十有一月詔罷尚方錦繡綾羅之工四民欲造任之無禁其御府衣服金銀珠玉綾羅紬錦太官􅄂器太僕乗具内庫弓矢岀其太半班賚百官及京師民庶下至工啇皂􅀠逮於六鎮戍士各有差十二月詔祕書丞李彪著作郎崔光改析國記依紀傳之體十有二年春正月􅀄建五牛旌旗五月詔雲中河西及􅀜内六郡各脩水田通渠漑灌増置彛器於太廟九月起宣文堂經武殿十三年春正月車駕有事於圓丘於是􅀄備大駕七月幸靈泉池與羣臣御龍舟賦詩而罷立孔子廟於京師十有四年八月詔議國之行次九月皇太后馮氏崩冬十月葬文明太后於永固陵車駕謁永固陵羣臣固請公除帝不許帝居廬引見羣寮於大和殿東陽王丕等據權制固請帝引古禮徃復羣臣乃止十五年春正月帝始聽政於皇信東室􅀄分置左右史官夏四月帝始進􅂼食自正月不雨至于六月有司奏祈詔百神曰昔成湯遇旱齊景逢災並不由祈山川而致雨皆至誠發中澍潤千里萬方有罪在予一人今普天喪恃幽顯同哀神􅀂有靈猶應未息安饗何冝四氣未周便行祀事當考躬責巳以待天譴五月議改律令上於東明觀析疑獄八月議養老又議肆􅀋上帝禋于六宗之禮帝親臨决詔郡國有時物可以薦宗廟者貢之移道壇於桑乾之隂改曰崇靈寺詔諸州舉秀才先盡才學定親祫禘之禮議律令十有一月詔二千石考在上者假四品將軍賜乗黄馬一疋上中者五品將軍上下者賜衣一襲十有二月帝爲髙麗王璉舉哀於城東行宫車駕迎春於東郊十有六年春正月饗群臣於太華殿帝始爲王公興懸而不樂宗祀顯祖獻文皇帝於明堂以配上帝遂昇靈臺以觀雲物詔定行次以水承金制諸逺屬非太祖子孫及異姓爲王者皆降爲公公爲侯侯爲伯伯爲子子爲男二月詔祀唐尭於平陽祀虞舜於廣㝤夏禹於安邑周文王於洛陽改謚宣尼曰文聖尼父謚孔廟夏四月頒新律令大赦天下八月司徒尉元以老遜位以尉元爲三老㳺明根爲五更又飬國老庶老詔曰夫文武之道自古並行威福之施必也相籍故三五至仁尚有征伐之事夏殷明叡未捨兵甲之行今則訓文有典教然於習武之方猶未盡將於馬射之前先行講武之式可勑有司豫脩場埒其列陣之儀五戎之數別俟後勑冬十月太極殿成大饗羣臣十有七年夏四月立皇后馮氏六月帝將南伐詔造河橋立皇子恂爲皇太子秋七月以皇大子立詔賜民爲父後者爵一級是月蕭頥死孫昭業僣立八月車駕發京師南伐歩騎三十餘萬太尉丕奏請以宫人從詔曰臨戎不語内事宜停車駕至肆州幸并州親見髙年問疾苦車駕所經傷民秋稼􅅿給榖五斛戊辰濟河語洛懷并肆所過四州賜髙年爵百年以上假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級鰥寡􅀌獨不能自存者人粟五斛帛二疋幸洛陽周廵故宫基趾帝頋謂侍臣曰晉德不脩早傾宗祀荒毁至此用傷朕懷遂詠􅁰離之詩爲之流涕觀河橋幸太學觀石經詔六軍發軫帝戎服執鞭御馬而出羣臣稽顙於馬前請停南伐帝乃止仍定遷都之計冬十月幸金墉城詔徵司空穆亮與尚書李冲將作大匠董爵經始洛陽帝幸河南城幸豫州解嚴設壇於滑臺城東告行廟以遷都之意大赦天下還幸鄴十有八年春朝羣臣於鄴宫車駕南廵幸洛陽西宫二月行幸河陽䂓建方澤之所車駕北廵至平城宫臨朝堂部分遷留三月罷西郊􅀕天帝臨太極殿喻在代羣臣以遷移之略秋七月以宋玉劉昶爲大將軍是月㠀夷蕭鸞殺其主蕭昭業立業弟昭文冬十月親告太廟奉遷神主車駕發平城宫次於中山之唐湖是月蕭鸞廢殺其主蕭昭文而僣立車駕幸鄴經比干墓傷其忠而獲戾親爲吊文樹碑而刋之車駕至洛陽蕭鸞雍州刺史曹虎據襄陽降十有二月車駕至懸􅉚詔壽陽鍾離馬頭之師所􅀗男女之口皆放還南十有九年春正月饗羣臣於懸瓠講武於汝水之西大賚六軍車駕濟淮二月幸八公山路中雨甚詔去蓋見軍士病者親恤之車駕至鍾離軍士擒鸞三卒帝曰在君爲君其民何罪於是免歸之車駕發鍾離遣使臨江數蕭鸞罪惡幸小沛遣使以太牢􅀕漢髙祖廟行幸瑕丘以太牢祠岱岳詔選諸孔宗子一人封崇聖侯邑百户以奉孔子之祀又詔兖州爲孔子起圉栢脩飾墳壠更建碑銘褒楊聖德行幸滑臺次于石濟車駕至自南伐六月詔始爲漢語不得以北俗之語言於朝廷若有違者免所居官詔求天下遺書祕閣所無有禆時用者加以優償詔遷洛之民死葬河南不得還北於是代人南遷者悉爲河南洛陽人詔改長尺大升依周制度班之天下八月詔選天下武勇之士十五萬人爲羽林虎賁以充􅀫衛九月六宫及文武盡遷洛陽十有二月引見羣臣於光極堂宣示品令第大選之始二十年春正月詔改姓爲元氏二月詔介山之邑聽爲寒食自餘禁斷帝以旱咸秩羣臣自癸未不食至于乙酉是夜澍􅀨大洽十有二月開鹽池之禁與民共之置常平倉二十有一年春正月立皇子恪爲皇太子夏四月行幸長安遣使者以太牢􅀕周文王於豐􅀕武王於鎬六月車駕至自長安帝親爲羣臣講喪服於清徽堂八月車駕南討九月車駕至新野冬十月四面進攻不尅詔左右軍築長圍以守之二十有二年春正月拔新野三月大破蕭鸞平北將軍崔惠景黄門郎蕭衍軍於鄧城斬獲首虜二萬有餘秋七月詔曰朕以寡徳属兹䘮亂實頼群英凱清南夏宜約躬賞効以勸茂績后之私府便可損半六宫嬪御五服男女􅁪恤􅁪供亦令减半在我之親三分省一是月蕭鸞死子寳卷僣立九月當以蕭鸞死禮不伐喪乃詔反斾二十有三年春正月朝羣臣於鄴宫三月車駕南伐帝不豫司徒彭城王勰音協侍疾禁中攝百揆車駕至馬圈賊將蔡道福成公期率萬人弃順陽遁走帝疾甚車駕北次榖塘原詔司徒勰徴太子於魯陽踐祚夏四月帝崩於榖塘原之行宫在位二十九年時年三十三祕諱至魯陽發喪還京師上謚曰孝文皇帝廟曰髙祖葬長陵帝幼有至性寡􅁒寛慈毎垂矜捨進食者曽以􅀬羹傷帝手曽又於食中得蟲穢之物􅀏而恕之宦者譛帝於太后太后大怒杖帝數十帝黙而不自明太后崩後亦不以介意聽覽政事從善如流哀矜百姓􅁪思所以濟益天地五郊宗廟二分之禮常必躬親不以寒暑爲倦雅好讀書手不釋卷五經之義覽之便講學不師授探其精奥史傳百家無不該渉善談莊老尤明釋義才藻冨贍好爲文章詩賦銘頌有興而作有大文筆馬上口授及其成也不改一字自㤗和十年巳後詔􅁽皆常之文也自餘文章百有餘篇愛竒好士情如飢渴待納朝賢隨才輕重常􅀉以布素之意悠然􅀇邁不以丗務嬰心又少而善射有膂力年十餘􅀊能以指彈碎羊膊骨及射禽獸莫不隨志而斃之至年十五便不復殺生射獵之事悉止性儉素常服澣濯之衣鞍勒鐵木而巳帝之雅志皆此􅀋也丗宗宣武皇帝後魏書曰丗宗宣武皇帝諱恪髙祖孝文皇帝之弟二子也母曰髙夫人􅀄夢爲日所逐避之床下曰化爲龍繞夫人數匝寤而驚悸旣而有娠㤗和七年閏四月生帝於平城宫二十一年正月立爲皇太子二十三年夏四月即皇帝位于魯陽大赦天下帝居諒闇委政􅌠輔秋八月遵遺詔髙祖二夫人以下悉歸家景明元年春正月車駕謁長陵大赦改年丁未蕭寳卷豫州刺史裴叔業以壽春内屬二年春正月帝始親政三月詔曰治尚簡静任貴應事州府佐史除授稍多誠爲損弊無益政道又京師百司寮局殷雜官有閑長者亦同此例茍非精要悉從蠲省是月蕭衍立寳卷第南康王寳融爲主年號中興東赴建業九年發畿内夫五萬五千築京師三百二十三坊四旬而罷立皇后于氏十有一月築圎丘於伊水之陽仍有事焉是月寳卷直後張齊殺寳卷降蕭衍衍克建業三年三月寳卷第建安王寳寅來降是月蕭衍又廢其主寳融而僣立自稱曰梁九月車駕行幸鄴詔使者吊殷比干墓閱武於鄴南冬十月帝親射遠及一里五十歩羣臣勒銘於射所四年春正月車駕籍田於千􅅿三月皇后先蚕於北郊夏四月南天笁國獻辟支佛牙正始元年春正月大赦改年八月詔洛陽令有大事聽面敷奏元英攻義陽拔之擒送蕭衍􅃣車蔡靈恩等十餘將英又大破衍將仍清三􅀜冬十有一月勑有司依漢魏舊章營繕國學十二月以􅁐牧公田分賜代遷之户詔羣臣議定律令二年詔尚書李崇太府卿于忠散􅀐常侍㳺肇諌議大夫鄧羡俱爲大使糺斷畿内其守令之徒各失彰露者即便施决州鎮重職聽爲表聞三年春正月皇子生大赦天下十一月帝爲京兆王愉清河王懌廣平王懷汝南王恱講孝經於式乾殿十一月禁河南畜牝馬自碣石至於劒閣東西七千里置二十二都尉永平元年六月詔曰慎重獄刑著於徃誥朕御兹寳暦明鑒未逺斷决煩疑寔有攸愧可依洛陽舊國修聽訟􅀚農􅂩起功及冬令就當與王公卿士親臨録問八月兾州刺史京兆王愉據州反假尚書李平鎮北將軍行兾州刺史討之大赦改元年尅信都執愉羣臣請誅帝弗許詔送京兆二年春正月胡宻歩就磨切宻盤是悉萬斤卒豆􅄼越狀切諸國並遣使朝獻嚈噠薄知國遣使來朝貢白象髙昌國遣使朝貢冬十月郢州獻七寳牀詔不納十一月詔禁屠殺含孕以爲永制帝於式乾殿爲諸僧朝臣講維摩詰經三年冬十月詔曰朕乗乾暦年周一紀而道謝擊壤敎慙刑措至於下人之焭音瓊鰥疾苦心常愍之此而不恤豈爲民父母之意也可勑太常於閑敵之處嚴􅃙醫署分師療治考其能否而行賞罰雖齡數有期脩短分定然六疾不同或頼針石庶秦扁之言理驗今日矣又經方浩􅀶條流處廣應病投藥卒難窮究更令有司集諸醫士㝷篇推簡務有精要取三十餘卷以班九服郡縣備冩布下郷邑使知救患之術延昌元年三月京師榖貴出倉粟八十萬石以賑貧者夏四月詔曰肆州地震䧟死傷甚多言念毀没有酸懷抱亡者不可復追生病之徒冝加療救可遣太醫折傷醫并給所取之藥就治之大赦改元二年夏四月庚子以絹五十五萬疋賑恤河南郡飢民三年春三月詔曰肆州秀容郡敷城縣鴈門郡原平縣並自去年四月以来山鳴地震于今不已告譴彰咎朕甚懼馬祗畏兢兢􅀂臨深谷可恤瘼寛刑以荅災譴四年正月帝不豫丁巳崩于式乾殿時年三十三謚曰宣武皇帝廟號丗宗葬景陵帝㓜有大度喜怒不形於色雅性儉素􅀄髙祖欲觀諸子志尚乃大陳寳物任其所取京兆王愉等皆競取珎玩帝唯取骨如意而巳髙祖大竒之及庶人恂失徳髙祀謂彭城王勰音恊曰吾固疑此兒有非常志相今果然矣雅愛經史尤長釋氏之義毎至講論連夜忘疲善風儀美容貌臨朝淵嘿端嚴􅀂神有君人之量矣肅宗孝明皇帝後魏書曰肅宗孝朋皇帝諱翊丗宗宣武皇帝之第二子母曰胡充華永平三年三月帝生於宣光殿之東北有光照于庭中延昌元年十月立爲皇太子四年春正月丁巳夜即皇帝位大赦天下詔太保髙陽王雍入居西栢堂决庶政又詔任城王澄爲尚書令百官惣巳以聽於二王二月尊皇后髙氏爲皇太后三月皇太后出俗爲尼徙御金墉城八月尊皇太妃爲皇太后帝朝皇太后於宣光殿大赦天下羣臣奏請皇太后臨朝稱制九月皇太后親覽萬機熙平元年春正月大赦改年二年八月宴太祖巳來宗室年十五巳上於顯陽殿申家人之禮九月詔曰察訟理􅁈實惟政首躬親聽覽民信所由自今月望當暫岀城闉親决滯枉主者可宣諸近逺咸使聞知神􅀛元年二月詔以神􅀛表瑞大赦改年七月開􅁪州銀山之禁與人共之二年九月皇太后幸崧髙山正光元年秋七月侍中元又劉騰奉帝幸前殿矯皇太后詔曰丗祖宣武皇帝以叡明承業廓寜區夏而鴻功未半早年登遐乃車書弗同勍宼尚熾幼主稚弱夙纂寳暦曽定宗祏莫尅祗奉朕所以敬慎羣請臨朝惣政僶俛從事以迄于兹自此春來先􅐄屢發夏首及今數加動劇恐不堪日􅁵萬務巨細兼省帝齒周星紀識學逾躋日就月將人君道茂足以撫緝萬􅀖諧決百揆朕當率前志敬遜別宫乃幽皇太后於北宫殺太􅀓領太尉清河王懌乂等㹅勒禁旅决事殿中帝加元服大赦改年九月蠕蠕而蠢切主阿那瓌來奔以太師髙陽王雍爲丞相十月詔曰蠕蠕丗雄朔方擅制漠表隣通上國百有餘載冝且優以賔禮期之立功䟽爵胙土大啓河岳可封朔郡公蠕蠕王食邑一千户錫以衮冕加之輕蓋禄秩儀衛同於戚藩二年三月駕幸國子學講孝經祠孔子以顔淵配十有二月詔司徒崔光安豐王延明等議定服章三年春正月辛亥帝耕籍田十有一月車駕有事圎丘詔曰治暦明時前王茂􅁤孝成正律弈代通䂓去神􅀛中始命儒官改度昜憲如㑹旋衡今天正斯始陽煦將開品物􅀄萌宜變耳目所謂魏雖舊􅀖其暦惟新者也便可班宣内外號曰正光暦思與億兆共此惟新可大赦天下十二月以牧守妄立碑頌輙興寺塔第宅豐侈店肆商販詔中尉端衡肅厲威風以見事糺劾七品六品禄足代耕亦不聽錮店占肆争利城市也四年春二月蠕蠕主阿􅄼􅅛帥衆犯塞遣尚書左丞元孚兼尚書爲北道行臺持節喻之四月阿􅄼瓌執元孚驅掠畜牧北遁詔驃􅀐大將軍尚書令李崇中軍將軍兼尚書右僕射元纂帥􅀐十萬討蠕蠕岀塞三千餘里不及而還五年秦州城人莫折大提據城反自稱秦王殺刺史李彦詔雍州刺史元志討之南秦州城人孫獠張絞切長命韓祖香據城反殺刺史崔遊以應大提遣城人卜胡襲尅髙平殺鎮將赫連略行臺髙元榮大提㝷死子念生代立僣稱天子年號天建置立百官孝昌元年春正月徐州刺史元法僧據城反害行臺髙諒自稱宋王年號天啓遣其子景仲歸於蕭衍遣其將朝龍牙成景隽元略等帥衆赴彭城詔祕書􅁥安樂王鑒廻師以討之鑒於彭城南擊元略大破之盡俘其衆旣而不備爲元法僧所敗衍遣子豫章王綜入守彭城法僧擁其竂属守令兵武及郭邑士女萬餘口南入夏四月辛夘皇太后復臨朝攝政引羣臣面陳得失詔曰神􅀛之末權臣擅命元乂劉騰隂相影響遂使皇太后幽隔後宫爲有無君之心積習不臣之迹縁事弥彰蔽耳目之明專生殺之柄天下爲之不康四郊由兹多壘此而可忍孰不可懐騰身旣徃可追削爵乂之罪狀誠合徽纆但以宗枝舅戚特全弘貸之法可除名爲民秋八月詔斷逺近貢獻珎麗違者免官九月詔减天下租調之半十二月山胡劉蠡升反自稱天子置官寮二年春正月五原降户鮮于脩禮反於定州號魯興元年二月皇太后臨大夏門親覽􅁈訟六月詔曰自運属宼難歴載於兹烽驛交馳征鼓不息朕威徳不能遐􅀍經略無以及逺俾是蒼生罹此荼炭何以茍安黄屋無愧黔􅀺今便避居正殿􅂼飡素服當親自招慕收集忠勇有直言正諌之士敢决徇義之夫二十五日悉集華林東門人別引見共論得失班告内外咸使聞知八月賊元洪業斬鮮于脩禮請降爲賊黨葛榮所殺都督尓未榮於肆州執刺史尉慶賔令其從叔羽生統州事九月葛榮敗都廣陽王淵章武王融於􅀶野白牛邏去聲融殁於陣榮自稱天子號曰齊國年稱廣安冬十一月杜洛周攻䧟幽州執刺史王延年及行臺常景丙午稅京師田租􅅿五升借賃公田者􅅿一升閏月稅市人入者各一錢居店舎爲五等三年春正月葛榮䧟殷州刺史崔楷固執節死之三月詔金紫光禄大夫源子邕爲大都督討葛榮冬十月以衛將軍討虜大都督尓朱榮爲車􅀐將軍儀同三司雍州刺史蕭寳寅據州反自號曰齊年稱隆緒武太元年春正月定州爲杜洛周所䧟執刺史楊津是月皇女生祕言皇子大赦改元二月帝崩於顯陽殿年十九皇子即位大赦天下皇太后詔曰皇家握暦受圗年將二百祖宗累聖社稷載安朕以寡昧親臨萬􅀖識謝塗山德慙文母属妖逆逓興四郊多故實望穹靈降祐麟趾衆繁自潘充華有孕椒宫兾誕儲貳而熊羆無兆唯虺遂彰于時以國歩未康假稱統胤欲以厎定物情係仰宸極何圖一旦弓劒莫追國道中胤大行絶祀皇曽孫故臨洮王寳暉丗子釗體自髙祖天表卓異大行平日養愛特深義齊􅀂子事符當壁及翌日弗愈大漸彌留乃延清蒲受命玉几曁陳依在庭登䇿靡及允膺大寳即日踐祚朕是用惶懼忸怩心焉靡訴今喪君有君宗祏惟固宜議賞卿士爰及百辟凢厥在位並加陟叙幼主即位儀同三司大都督尓朱榮抗表請奔喪乃勒兵而入三月上尊謚曰孝明皇帝葬於定陵廟號肅宗夏四月尓朱榮濟河皇太后幼主皆崩太平御覽卷第一百三
