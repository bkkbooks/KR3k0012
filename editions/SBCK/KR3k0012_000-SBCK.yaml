front:
  text: 祖宗聖學其書之大者有二曰太平御覽曰資治通鑑通鑑載君臣治道之安危明天人庶證之休咎威福盛衰之本䂓模利害之端無一不備而其書公傳於天下乆矣太平御覽備天地萬物之理政教法度之原理亂廢興之由道德性命之奥而獨以載籍繁夥無復善本惟建寜所刋多磨滅舛誤漫不可考叔獻每爲三嘆焉洪惟太宗皇帝爲百聖立絶學爲萬丗開太平爲古今集斯文之大成爲天下括事理之至要四方旣平修文止戈収天下圖書典籍聚之昭文集賢等四庫太平興國二年三月戊寅詔李昉扈蒙等十有四人編集是書以便乙夜之覽越八年十有二月庚辰書成分爲千卷以太平御覽目之所以昭我皇度光闡大猷者也聖學宏博皆萃此書冝廣其傳以幸惠天下况吾蜀文籍巨細畢備而獨闕此書叔獻叨遇聖恩將漕西蜀因重加校正勒工鏤板以與斯丗君子共之以推見太宗聖學之所從明我宋歷聖相承之家法􅀘吾蜀文籍之闕而公萬丗之傳云慶元五年七月日朝請大夫成都府路轉運判官兼提舉學事蒲叔獻謹書
