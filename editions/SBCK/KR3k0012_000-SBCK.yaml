body:
  text: 古書逸者多矣遲任之言南陔之義已弗睹其全託詩書以傳者止此耳非幸歟太平御覽一書皆纂輯百氏要言凡可帙名者一千六百有九十而一篇一章間見特出者弗與皆承平縑素之盛多人間未見之書朌自寶儲出繇中祕書成始得流布丗間爰自南渡而來延閣竹帛已費網羅蒐采矣是故君子以爲捨是書則承平之大典百氏之古書亦無以窺梗槪而識彷彿部使者錦屏蒲公􅀍命將輸兼提蜀學簡􅁽之外澹無他營凡臺中彛常之餽弗可郤者姑外積焉一日大斥之募工鍥木以廣斯文之傳廷允􅀗與校讎凢金根亥豕皆釐正之字三萬八千有竒其義有弗可猝通而無所援据以爲質者則亦傳疑弗敢臆也書一千卷盖月琯六易而竣事蜀大夫士詫曰蓄眼未有猗歟盛哉迪功郎前閬州閬中縣尉􅀟流李廷􅁢謹跋金澤文庫謹按國朝㑹要曰太平興國二年三月詔翰林學士李昉扈蒙知制誥李穆太子詹事湯恱太子率更令徐鉉太子中允張洎左􅀘闕李克勤左拾遺宋白太子中舎陳鄂光禄寺丞徐用賔太府寺丞呉淑國子監丞舒雅少府監丞李文仲阮思道等同以羣書􅀋集之分門編爲千卷先是帝閱前代􅀋書門目紛􅄂失其倫次遂詔修此書以前代修文御覽藝文􅀋聚文思博要及諸書參詳條次分定門目八年十二月書成詔曰史館新纂太平緫􅀋包羅萬象緫括羣書紀歷代之興亡自我朝之編纂用垂永丗可改名爲太平御覽帝每聽政之暇日讀御覽三卷有故或闕即追之雖隆冬短景必及其數大臣請少息帝曰朕開卷有得不以爲勞也凡諸故事可資風教者悉記之及延見近臣必援引談論以示勸誡焉此集川蜀元未刋行東南惟建寕所刋壹本然其間舛誤甚多非特句讀脫略字畫訛謬而意義往往有不通貫者因以別夲參考併從經史及其它傳記校正凡三萬字有竒雖未能盡革其誤而所改正十巳八九庶便於觀覽焉太平御覽緫􅀋天部一卷至十五卷時序部十六卷至三十五卷地部三十六卷至七十五卷皇王部七十六卷至百一十六卷偏霸部百一十七卷至百三十四卷皇親部百三十五卷至百五十四卷州郡部百五十五卷至百七十二卷居處部百七十三卷至百九十七卷封建部百九十八卷至二百二卷職官部二百三卷至二百六十九卷兵部二百七十卷至三百五十九卷人事部三百六十卷至五百卷逸民部五百一卷至五百一十卷宗親部五百一十一卷至五百二十一卷禮儀部五百二十二卷至五百六十二卷樂部五百六十三卷至五百八十四卷文部五百八十五卷至六百六卷學部六百七卷至六百一十九卷治道部六百二十卷至六百三十四卷刑法部六百三十五卷至六百五十二卷釋部六百五十三卷至六百五十八卷道部六百五十九卷至六百七十九卷儀式部六百八十卷至六百八十三卷服章部六百八十四卷至六百九十八卷服用部六百九十九卷至七百一十九卷方術部七百二十卷至七百三十七卷疾病部七百三十八卷至七百四十三卷工藝部七百四十四卷至七百五十五卷器物部七百五十六卷至七百六十五卷雜物部七百六十六卷至七百六十七卷舟部七百六十八卷至七百七十一卷車部七百七十二卷至七百七十六卷奉使部七百七十七卷至七百七十九卷四夷部七百八十卷至八百一卷珎寳部八百二卷至八百一十三卷布帛部八百一十四卷至八百二十卷資産部八百二十一卷至八百三十六卷百榖部八百三十七卷至八百四十二卷飲食部八百四十三卷至八百六十七卷火部八百六十八卷至八百七十一卷休徴部八百七十二卷至八百七十三卷咎徴部八百七十四卷至八百八十卷神􅀑部八百八十一卷至八百八十四卷妖異部八百八十五卷至八百八十八卷獸部八百八十九卷至九百一十三卷羽族部九百一十四卷至九百二十八卷鱗介部九百二十九卷至九百四十三卷蟲豸部九百四十四卷至九百五十一卷木部九百五十二卷至九百六十一卷竹部九百六十二卷至九百六十三卷果部九百六十四卷至九百七十五卷菜部九百七十六卷至九百八十卷香部九百八十一卷至九百八十三卷藥部九百八十四卷至九百九十三卷百卉部九百九十四卷至一千卷右五十五部緫一千卷太平御覽經史圖書綱目周易周易正義周易文言京房易傳京房昜說易乾鑿度京房易飛候周易叅同契周昜緯焦贛昜林郭璞昜洞林管氏易林周易稽覽圖周易坤靈圖周易通統圖周易通卦驗張璠易注序周易是謀􅀋易林變占周易集林雜占楊雄易太􅀇經尚書尚書正義尚書大傳尚書􅀃書叙傳劉向洪範傳周書時訓逸書尚書中候尚書紀年韓書外傳尚書緯尚書考靈曜尚書帝命驗尚書帝驗期尚書旋璣鈐禹時鈎命訣汲冢周書毛詩毛詩正義毛詩義䟽毛詩傳毛萇詩注毛詩題綱韓詩内傳韓詩外傳韋曜毛詩問劉禎毛詩義問郭璞毛詩拾遺劉芳詩箋音義證詩含神霧詩推度災陸機詩草木蟲魚䟽詩記曆樞周禮大戴禮禮稽命徴圖禮稽命曜禮含文嘉禮斗威儀儀禮禮統禮記禮記正義禮記外傳小戴禮五經異義五經通義五經要義三禮義宗三禮正義許慎五經異􅀃楊方五經鈎沉邯鄲綽五經折疑邯鄲六經折疑駮春秋左傳公羊傳􅂖梁傳春秋正義春秋傳春秋􅀃春秋後傳春秋後語頴容春秋釋例春秋緯春秋内事春秋說題辭春秋考異郵春秋繁露春秋感精符春秋元命苞春秋演孔圖春秋合誠圖春秋保軋圖春秋握成圖春秋命曆序春秋潜潭巴春秋漢含孳春秋佐助期春秋文耀鈎春秋運斗樞國語立後土國語諷諌木國語論語論語隱義注論語撰考䜟逸論語論語摘輔象孟子孝經孝經注孝經􅀃孝經緯孝經内事孝經内記孝經河圖孝經左契孝經右契孝經援神契