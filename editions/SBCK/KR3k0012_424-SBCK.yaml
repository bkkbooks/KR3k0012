front:
  text: 太平御覽卷第四百二十四
  hash: sha256:88bddc51e288ab481337a9bc257abfa9e3b98464f4af07316ee96c9949cb944b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_424-1a}
body:
  text: 人事部六十五譲下東觀漢記曰承宫遭王莽簒天下擾攘盗賊並起宫遂避丗漢中建武四年將妻子之華隂山谷耕種禾􅁰臨熟人就認之宫悉推與而去由是顯名又曰光武封朱祐爲鬲侯祐自陳功薄而國大願受南陽五百户足矣上不許又曰竇融光武時數辭讓位不許因上䟽曰臣融年五十三有一子年十五質性頑鈍臣融朝夕教導以經藝不得令觀天文見䜟記誠欲令恭肅畏事恂恂循道不願其有才能何况乃當傳以連城廣土享諸侯國哉又曰鄧隲永􅀄元年封隲等以定䇿増三千户譲不獲遂逃避使者上䟽自陳又曰歐陽尚書博士缺上欲用桓榮叩頭讓曰臣經術淺薄不如同門生郎中彭閎楊州從事睪弘帝曰俞往女諧因拜榮爲􅀶士引閎爲議郎車駕幸太學㑹請愽士論難於前榮􅀍服儒衣温恭有藴藉明經義毎以禮義讓相厭不以辭長人儒者莫之及特爲加賞賜又詔諸生􅄂吹擊罄盡日乃罷榮卒子郁當襲爵上書譲於兄子沉顯宗不許不得巳受封而悉以租入與之帝以郁先師子有禮讓甚見親厚又曰上欲封樊興置印綬於前興固譲曰臣未有先登䧟陣之功而一家數人並蒙爵土令天下觖望誠不願帝嘉興之譲不奪其志又曰劉愷字伯豫以當襲父般爵譲與弟憲逃避封有司奏請絶國上美其義特優加之愷猶不出有司復奏之侍中賈逵上書曰孔子稱能以禮讓爲國於從政乎何有和帝納之詔下曰故居巢侯劉般嗣子愷當襲父般爵而稱父遺意致國弟憲遁亡七年所守弥固盖王法崇善成人之美其聽憲嗣爵乃徴愷拜爲郎稍遷侍中愷之入朝在位者莫不仰其風行又曰淳于恭以謙儉推譲爲節家有山田橡樹人有盗取之者恭助爲収拾載之歸乃知其恭橡盗者還橡恭不受人又有盗刈恭禾者恭見之念其愧因伏草中至去乃起續漢書曰張堪譲先人餘財數百萬與兄子謝承後漢書曰雷義舉茂才讓於陳重刺史不聽義遂佯狂不應命郷里爲之語曰膠漆自謂堅不如雷與陳又曰陳􅅝與郷人紀伯爲隣伯夜􅀼􅅝藩地自益􅅝見之伺伯去宻移其藩一丈地以益伯伯慙懼還所侵又􅁍一丈二尺相避凡廣三丈太守髙其義名其閭爲義里范曄後漢書曰馮緄字鴻卿巴郡宕渠人也長沙蠻寇益陽荆南皆没於是拜緄爲車􅀐將軍軍至長沙進擊武陵蠻夷荆州平定詔賜錢一億固譲不受振旅還京師推功於從事中郎魏志曰田疇字子㤗右北平人太祖北征烏丸軍次無終夏水路不通疇將其衆爲郷導出盧龍塞虜乃驚太祖與戰遂大斬獲軍還論功封疇爲亭侯疇上䟽陳誠以死自誓太祖不聽欲引拜之至于數四疇終不受又曰太祖署邴原爲丞相徴事崔琰爲東曹掾譲曰徴事邴原議郎張範皆秉德純壹志行忠敏清静足以厲事貞固足以幹事所謂龍翰鳯翼國之重貴舉而用之不仁者逺又曰王基字伯輿東萊人基拔壽春轉基爲征東將軍封東武侯基上䟽固譲歸功叅佐由是長史司馬等七人皆侯呉志曰魯肅卒孫權以嚴畯代前後固辭曰僕素書生不閑軍事非才而據殃咎必至發言慷􅁣至於流涕權乃聽焉嘉其能以實譲又曰薛綜爲選曹尚書固譲顧譚曰心精體宻貫道逹微才昭人物德服衆望誠非愚臣所可越先王隱晉書曰司徒魏舒遜位司空衛瓘與書曰毎與足下共論此事日日未果可謂瞻之在前忽然在後于時皆有欲遜者或先顯此意不能行或以歸家申喻復還唯舒知命内定於懷未甞形之於言論者以爲晉興以來能辭榮令終未有如舒者焉又曰杜夷字行齊廬江人王敦爲刺史舉方正顧榮等各薦夷於相府元帝曽欲省夷夷深譲帝荅曰吾與足下雖情在忘言然虚遲歴載正以足下羸病故欲相省寜論常敬以爲國子􅀕酒夷前後十餘表求解不聽明帝踐祚夷又頻表又曰上以羊祜爲開府儀同譲表曰今光禄李喜秉節髙亮在公正色光禄魯芝絜身寡欲和而不同光禄李胤清亮簡素正身在朝皆服事華髮以禮終始雖歴外内之寵不異寒賤之家而猶未蒙此選臣更越之何以塞天下之望又封南城郡侯祜曰昔張良請受留侯漢髙不奪其志請受鉅平薨遺令不得以南城侯入柩詔祜曰固譲歴年志不可奪身没譲存遺言益厲此夷叔所以稱賢季札所以全節重違其志今聽復夲封于寳晉紀曰鍾㑹鄧艾將伐蜀與劉寔別客謂寔曰二將當破蜀不寔曰必破蜀伹皆不還客問其故寔曰治道在於克譲因著崇讓論曰季丗不能譲賢虚謝見用之恩莫肯譲於勝巳晉中興書曰郗愔拜給事黃門侍郎愔苦求外出時呉郡缺朝議欲用愔愔以資輕而少年不冝超登大郡辭讓切至朝廷嘉之爲臨海太守在郡優游飬志不以事物縈心崔鴻前趙録曰張寔爲鉅鹿太守治任威強路不拾遺曽欲以寔爲司徒太保皆垂涕固辭身􅀐瘠馬妻乗敗車後魏書曰髙肇字首文文昭皇太后之兄也肇子植自中書侍郎出爲濟州刺史元愉之反也植率州軍出討破愉別將有功當蒙封賞朝廷論勲毎謙譲不受云其家荷重恩爲國致効是其常節何足以應進陟之報懇惻發於至誠又曰崔光韶爲司空行叅軍復請譲從叔和曰臣誠微賤未登譲品屬逢唐朝耻無譲德和亦謙退辭而不當髙祖善之遂以和爲廣陵王國常侍後周書曰􅂫祐字承先陳留圉人也有膂力便􅀐射從征伐常潰圍䧟陣還之日諸將爭功祐終無競太祖歎之常謂諸將曰承先口不言勲􅀌當代言其見知如此沈約齊紀曰朝係伯襄陽人也事母甚謹西土風俗田與隣畔者輙於畔上種桑以誌之係伯上種桑枝條䕃蔽他地毎開數尺以避焉隣者隨復侵之係伯輙伐樹更種侵畔者慙不敢犯也齊書曰謝朓遷尚書吏部郎上表三譲中書疑朓官未及譲以問國子􅀕酒沈約約曰宋嘉元中范曄譲吏部朱循之讓黃門蔡興宗讓中書並三表詔荅近代小官不譲遂成恒俗恐有乖譲意王藍田劉安西貴重􅀄自不讓今豈可慕此不讓􅁘孫興公孔覬並譲記室今豈可三署皆譲􅁘謝吏部今授超階別有意豈􅀜官之大小撝讓之美夲出人情􅀂大官必譲便與詣闕章表不異例旣如此謂都非疑朓讓優荅不許唐書曰温彦􅀶與兄大雅共掌機宻彦􅀶以昆季同在機務意不自安固請他職髙祖曰我虚心相待不以爲疑卿何自疑也彦􅀶雖應命然毎退譲逺避機權寮列以此多之又曰長孫無忌􅉺拜司空無忌固辭譲不許又曰臣幸居外戚恐招聖主私親之誚敢以死請太宗曰無忌聦明鑒悟且有武略公等並知所以委之台鼎無忌又上表切譲帝使謂之曰昔黃帝得力牧而爲五帝先夏禹得咎繇而爲三王祖齊桓得管仲而爲五伯長朕自在藩邸即任使公遂得廓清宇内君臨天下以公功績才望允稱具瞻故授此官無冝辭譲爲禮也又曰盧懷慎開元三年遷黃門􅁥懷慎與紫微令姚崇對掌樞宻懷慎自以爲吏道不及崇毎事皆推讓之周書曰湯放桀而歸於毫三年諸侯大㑹湯取天子之璽置之天子之坐再辭從諸侯之位湯曰此天子之位有道者可以處之三讓于諸侯諸侯莫敢即位然後湯即天子之位慎子曰堯讓許由舜讓善卷皆辭爲天子而退爲疋夫列子曰昔堯舜爲以天下譲許由善卷而不失天下伯夷叔齊實以􅀌竹譲而終亡其國晏子春秋曰晏子方食景公使至分食食之使者不飽嬰亦不飽公致千金以奉賔客晏子不受公曰先君桓公以書社百封管仲管仲不辭獨辭何也晏子曰嬰聞聖人千慮必有一失愚人千慮必有一得意以管仲失之嬰得之又曰景公使晏子爲阿宰三年而譽聞於國景公恱召而賞之辭而不受公問其故對曰昔嬰之治阿三邪毁於外三讒毀於内今則三邪譽於外三讒譽於内昔者嬰之當誅者當賞而今以當賞者當誅是故不敢受景公知晏子賢乃任以國政三年而齊大興莊子曰堯以天下讓許由由曰日月出矣而爝火不息其於光也不亦難乎時􅀨降矣而猶浸灌其於澤也不亦勞乎又譲於子州支父子州支父曰我適有幽憂之疾方且治之未暇治天下也又曰舜以天下讓於善卷善卷曰余逍遥於天地之間而心意自得吾何以天下爲哉遂不受又曰舜以天下譲其友北人無擇北人無擇曰異哉后之爲人居甽畒之中而遊於堯之門不􅀂是而巳又欲以其辱行汙漫我吾羞見之自投於清泠之淵又曰湯將伐桀因卞隨而謀卞隨曰非吾事也湯又因務光而謀務光曰非吾事也湯曰伊尹何如曰強力忍詬吾不知其他湯遂與伊尹謀伐桀尅之以譲卞隨卞隨曰君之伐桀謀乎我必以我爲賊也勝桀而譲乎我必以我爲貪也吾生乎亂丗而無道之人再來漫我吾不忍數聞也乃自投於桐水而死桐水今在頴川又譲務光曰智者謀之武者遂之仁者居之古之道也吾子胡不立乎務光辭曰廢上非義殺人非仁子犯其難我享其利非廉也吾聞之曰非其義不受其禄無道之丗不踐其􅁟况尊我乎吾不忍見也乃􅀒石自沉於盧水盧水在遼東也吕氏春秋曰沈尹筮遊於郢五年荆王欲以爲令尹辭期思之鄙人有孫叔敖彼聖人也王於是使人以王興迎叔敖以爲令尹而國治韓子曰舜耕於歴山農者譲畔漁於河濵漁者讓長符子曰禹讓天下於竒子竒子曰君之佐舜勞矣鑿山川通河漢首無髪股無毛故舜也以勞報子我生而逸不能爲君之勞矣又曰武王以天下讓歧封子歧封子曰孰勿勿然以天下爲事乎君往矣余不忍聞之又曰太伯將譲其國於季歴謂其傳曰大王欲以一國之事而以嗣我我其羞之吾聞至人也不居一丗而萬丗以之君不貴一代而萬代以之貴吾焉能貴乎一國而賤乎萬代哉山海經曰君子國民衣冠帶劒􅁟方千里多薫華之草好讓故爲君子國許遜別傳曰遜年七歳無父躬耕􅀒薪以飬母盡孝敬之道與寡㛐共田桑推讓好者取其荒者不營利母常隨之如此當乞食無處遜嘆應母曰但願母老壽耳郭翻別傳曰翻經河墜刀於水路人有爲取者翻因與之路人不取至於三四路人固辭翻曰爾向不取我豈能復得乎路人曰吾􅀂取此物爲天地􅀑神所責矣知其終不受乃沉刀於向所失處路人帳然乃復没爲取之翻於是不逆其意十倍刀價與之魏武令曰里諺曰譲禮一寸得禮一尺斯合經之要矣魏文􅄂事曰辭爵逃禄不以利累名不以位虧德之謂讓􅀶物志曰三讓一曰禮讓二曰固讓三曰終譲晉劉寔崇譲論曰古之聖王治天下所以貴譲者欲以出賢才而息爭競也夫人情莫不皆欲巳之賢以自明賢豈假讓而賢哉故讓道興賢能之人不求而自出矣至公之舉而自立矣一官鈌擇衆官所讓最多者而用之審才之道也在朝之人相譲於上草廬之人咸皆化之推能譲賢之風從此生矣爲一國所譲則一國士也爲天下所讓則天下才也推譲之風行賢不肖灼然殊矣晉孫盛周􅁗伯三讓論曰孔子曰㤗伯可謂至德也已矣三以天下讓民無得而一焉鄭􅀇以爲託採藥而行一讓也不奔喪二讓也斷髪文身三也三者之美皆蔽隱不著王肅曰其譲隱故民無得而稱焉咸謂􅀇旣失之而肅亦未爲暢也􅀇之所云三跡顯然天下所共見也何得云隱而未著乎三跡苟著則髙讓知亦復不得云其讓隱也盖㤗伯之出讓迹巳露不奔喪故一事耳斷髮之與左傳明文相背又不經也然則稱三讓者其在古公至文王乎周之王業顯於亶父受命於昌㤗伯􅀇覽棄周太子之位一讓也假託遜遁受不赴喪之譏潜推大美二讓也無胤嗣而飬仲雍之子以爲巳後是􅀷思逺防令周嗣在昌天人叶從四海悠悠無復纎介疑惑三譲也凡此三者帝王之業故孔子曰三以天下譲言非直常譲􅀂礼臧之倫者太平御覽卷第四百二十四
