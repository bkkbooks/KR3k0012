front:
  text: 太平御覽卷第二百一十四
  hash: sha256:ced0d2a4f5acf289df86b2b7fcdcc6385499b0e66926a037af4cc878d508da9a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_214-1a}
body:
  text: 職官部十二吏部尚書六典曰吏部尚書侍郎之職掌天下官吏選授勲封考課之政令其屬有四一曰吏部二曰司封三曰司勲四曰考功揔其職務而行其制命凡中外百司之事由於所屬皆質正焉後漢書曰光武改常侍曹爲吏部曹主舉選齋祀事魏志曰盧毓爲侍中在職三年多所駮易詔曰官人秩才聖帝所難必須良佐進可替否侍中毓禀性貞固心平體正可謂明試有功不懈于位者也其以毓爲吏部尚書使毓自選代曰得如卿者乃可毓舉常侍鄭冲帝曰文和吾自知之更舉吾所未聞者乃舉阮武孫邕帝於是用邕呉志曰李肅字偉㳟南陽人少以才聞善論議臧否得中甄竒録異薦述後進題目品藻曲有條貫以此服之權擢爲選曹尚書選舉號爲得才又曰曁艷字子休爲選曹尚書性峭厲好清議當時郎署混濁多非其人欲區別賢愚彈指百寮覈選三署皆貶髙就下降損數等其居位貪鄙志節汙卑者皆以爲軍吏置營府以處之故怨憤聲積競言艷用私情愛憎不由公理艷坐自殺又曰陸喜字文仲頗渉文籍好人倫孫皓時爲選曹尚書又曰薛綜爲選部尚書固讓顧譚曰譚心精體密貫道逹微才照人物德服衆望誠非臣所可越先後遂代綜晉書曰山濤爲吏部尚書濤用人皆先密啓然後公奏又曰鄧攸爲吏部尚書當時清靜内外肅然後牧馬於家庭妻􅒚素食不受一錢又曰嵇紹字延祖裴頠亦深器之每曰使延祖爲吏部尚書可使天下無復遺才矣又曰王戎爲左僕射領吏部尚書自戎居選未嘗進一寒素退一虚名理一􅁈枉殺一疽嫉隨其沉浮門調戸選好營生廣收八方園田水碓周遍天下聚歛積實不知紀極又曰呉隱之與太常韓康伯隣居康伯母殷浩之姊賢明婦人也每聞隱之哭聲輟飡投杼爲之悲泣旣而謂康伯曰􅀂居銓衡當舉此輩人及康伯爲吏部尚書隱之遂階清級又曰蔡克居選官苟進之徒望風畏憚􅀄克未仕時河内山簡嘗與瑯邪王􅄛書曰蔡子尼今之正人􅄛以書示衆曰山子以一字拔人然未易可稱後􅄛聞克在選官曰山子正人之言驗於今矣晉起居注曰太康四年八月詔曰選曹銓管人才冝得忠恪寡欲抑華崇夲者尚書朱整周愼廉敬以道素自居是其人也其以整爲吏部尚書虞預晉書曰盧欽字子􅀂少好學爲尚書僕射領吏部欽清實選舉稱爲廉平晉陽秋曰陳羣爲吏部尚書制九格登用皆由於中正考之簿丗然後授任晉書諸公賛曰李胤爲吏部尚書正身率職不撓故能行其所見遂刋定選例而著于今宋書曰顔竣爲吏部尚書留心選舉自強不息任遇旣隆奏無不可後謝莊代竣意多不行竣容貌嚴毅莊風姿甚美賔客喧訴常懽􅀏荅之時人語曰顔竣嗔而與人官謝莊􅀏而不與人官又曰蔡廓爲吏部尚書廓因􅀓隆問􅀓亮選事􅀂悉以見付不論不然不能拜亮以語録尚書徐羡之羡之曰黃門巳下悉以委蔡自此巳上冝共叅同異廓曰我不能爲徐干木署􅁓尾遂不拜干木羡之小字也選案録尚書與吏部尚書連名故廓云􅁓尾又曰王􅀪自領選將加榮禄於人者每先呵責譴辱之然後施行􅀂美相盻接語欣歡者必無所諧人問其故荅曰王爵旣加於人又相撫勞便成與主分功此所謂姧以事君者也􅀂求者絶官叙之分旣無以爲惠又不微借顔色即大成怨府亦鄙薄所不任問者恱伏又曰江湛爲吏部尚書家甚貧不營財利餉饋盈門一無所受無兼衣餘食嘗爲上所召遇澣衣稱疾經日衣成然後赴又曰􅁃仲文性好㓗爲吏部尚書用少府卿劉道錫爲廣州刺史道錫至鎭餉白檀牽車常自乗焉或以白文帝帝見問曰道錫餉卿小車裝飾甚麗有之乎仲文懼起謝又曰􅁃炳之爲吏部尚書通貨賄吏部令史錢泰能彈琵琶王客令史周伯齊善歌詣炳之宅諮事因留􅀫尚書舊制令史諮事不得􅀫停外雖有八座命亦不許爲所司奏免官也又曰少帝即位以蔡廓爲吏部尚書不肯拜乃以王惠代焉惠􅀍召即拜未嘗接客人有與書永官者得轉聚置閣上及去職其封如􅀄時談者以廓之不拜惠之即拜雖事異而意同也齊書曰禇彦回遷吏部尚書有人求官密䄂中將一鉼金因求清閑出金示之曰人無知者彦回曰卿自應得官無假此物􅀂必見與不得不相啓此人大懼􅀵金而去彦回叙其事而不言其名時人莫之知也又曰禇炫爲吏部尚書炫居身清立非弔問不􅄂交遊論者以爲美及在選部門庭蕭索賔客罕至出行左右常捧一黃􅁓帽風吹􅁓剥殆盡南史曰􅀄謝朓告王敬則敬則女爲朓妻常懷刀欲報朓朓不敢相見及當拜吏部謙挹尤甚尚書郎范縝嘲之曰卿人才無慙小選但恨不可刑于寡妻朓有愧色南史曰蔡徴拜吏部尚書啓後主借鼓吹後主謂所司曰鼓吹軍樂有功乃授蔡徴不自量揆紊我朝章然其父景歷旣有締搆之功冝且如啓拜訖即追還梁書曰蕭子明爲吏部尚書性凝簡􅀒才氣見九流賔客不與交言但舉扇一撝而巳衣冠竊恨之又曰謝覽字景滌朏之弟瀹之子也自祖至孫三代居選部時以爲榮又曰王泰字仲通爲都官尚書能接人士士皆願其居選官頃之爲吏部尚書衣冠傾屬又曰謝舉字言揚遷掌吏部舉祖莊宋代再典選至舉又三爲此職前代未有也崔鴻十六國春秋曰永寜伯郭撫字仲安金城人也􅀄爲吏部尚書與郎姚範清心虚求搜揚俊乂内外稱之以擬魏之崔毛後魏書曰崔玄伯遷吏部尚書命有司制官爵撰朝儀恊音樂定律令申科禁玄伯揔而裁之以爲永式及置八部大夫擬八座玄伯通署三十六曹如令僕統事又曰崔亮遷吏部尚書時羽楚新害張尋之後靈太后令武官得依資入選官貟旣少應選者多前尚書李韶循常擢人百姓大爲嗟怨亮乃奏爲格制不問士之賢愚專以停解日月爲斷雖復官須此人停日後者終於不得庸才下品年月乆者灼然先用沉滯者皆稱其能又曰郭祚爲吏部祚持身㓗清重惜官位至於銓授假令得人必徘徊乆之然後下筆即云此人便以貴矣由是頗勞滯當時每招怨言然所用者皆量才稱職時人以此歸之又曰元順爲吏部尚書時三公曹令史朱暉素事録尚書髙陽王雍雍欲以爲廷尉評頻頻託順順不爲用雍遂下命用之順投於地雍聞之大怒昧爽坐都㕔召尚書及丞郎畢集欲待順至於衆挫之順日髙方至雍攘􅃑撫几而言曰天子之子天子之弟天子之叔天子之相四海之內親尊莫二元順何人以身成命投弃於地順􅂡眉俱張仰面㸔屋憤氣奔湧長歔而不言乆之摇一白羽扇徐而謂雍曰髙祖遷宅中土剏定九流官方清濁軌儀万古而朱暉小人身爲省史何令爲廷尉清官殿下旣先皇同氣冝遵成旨自有短垣而復踰之雍曰身爲丞相録尚書如何不用一人爲官順曰庖人雖不理庖尸祝不得越樽俎而代之未聞有別㫖令殿下叅選事順又厲聲曰殿下必如是順當依事聞雍遂􅀏而言曰豈可以朱暉小人便相忿恨遂起呼順入室與之極飲順之亢毅不撓皆此􅀋也又曰元脩義遷吏部尚書及在銓衡唯事貨賄授官大小皆有定價時中散大夫髙居者有旨先叙上黨郡缺遂求之脩義私已許人抑居不與居大言不遜脩義命左右臺曵之居對衆大呼天唱賊人問居曰白日公庭安得有賊居指脩義曰此座上者違天子明詔物多者得官京師白刼此非大賊乎脩義失色居行罵而出三國典略曰東魏以楊愔典選嘗六十人爲一甲愔令其自叙訖不省文簿便次第呼之呼誤以慕容爲長孫一人而巳有職人魯澷漢自言微賤不蒙記愔曰卿前在元子思坊乗驢遥見我不下以方麹障面我何不識卿耶澷漢驚服愔又謂之曰名以定體果自不虚令史唱名誤以盧士􅀷爲士琛深自言其名愔曰盧郎朗潤所以加玉北齊書曰叚孝言爲吏部尚書孝言旣無深鑒又待物不平抽擢之徒非賄則舊有將作丞崔成忽於衆中抗言曰尚書天下尚書豈獨叚家尚書也孝言無辭以荅唯厲色遣下而巳又曰陳孔奐爲吏部尚書太子叔寳欲以江揔爲太子詹事令管記陸瑜言之於奐奐謂瑜曰江有潘陸之才而無園綺之實輔弼儲后竊有所難瑜具以白太子太子深以爲恨乃自言於陳主將許之奐乃啓曰江揔文章之人今太子文藻不少無藉於揔如臣愚見願選敦重之才以居輔導陳主曰即如卿言誰當居此奐曰尚書王廊丗有懿德識性敦敏可以居之太子時亦在側乃曰廊王泰之子不可爲太子詹事奐又啓曰宋朝范蔚宗即范泰之子亦爲太子詹事前丗不疑太子固爭之陳主卒以揔果共太子爲長夜之飲養良娣陳氏爲女太子微行遊揔家陳主怒而免之隋書曰牛􅀪爲吏部尚書其選舉先德行而後文才所進用多稱職吏部侍郎髙丗夲鑒賞機晤清愼絶倫然爽俊有餘迹以輕薄時宰多以此疑之唯􅀪深識其眞推心委任隋之選舉於斯爲最又曰牛􅀪拜吏部尚書時髙祖又令􅀪與楊素􅂫威薛道衡許善心虞丗基崔子發等并召諸儒論新禮降殺輕重􅀪所立議衆咸推服之仁壽二年獻皇后崩王公已下不能定其儀注楊素謂􅀪曰公舊學時賢所仰今日之事決在於公􅀪了不辭讓斯須之間儀注悉備皆有故實素歎曰衣冠禮樂盡在此矣非吾所及也又曰韋丗康拜吏部尚書前後十餘年間多所進拔朝廷稱爲廉平嘗因休暇而謂子弟曰吾聞功遂身退古人常道今年將耳順志在懸車汝輩以爲云何子福嗣荅曰大人澡身浴德名立宦成盈滿之誡先哲所重欲追蹤二踈㐲奉尊命唐書曰韋思謙弱冠舉進士累􅀘應城令歳餘調選思謙在官坐公事微殿舊制多不進官吏部尚書髙季輔曰自居選部今始得此一人豈以小疵而弃大德特進超授監察御史由是知名又曰李巽爲吏部尚書病極郎官相率省疾巽􅀄不言其病與之考校程課啇搉公利至其夕而終唐新語曰裴光廷爲吏部始制循資格以一賢愚遵平轍者喜其循常􅀒材用者受其抑屈宋璟固爭不得及光廷卒有司定謚以其用循資格非奬勸之道謚爲克平先賢行狀曰崔琰委授銓衡揔齊清議十有餘年文武羣才多所明抜朝廷歸美天下稱平􅀽子曰魏家置吏部尚書專選天下百官夫用人人君之所司不可以假人者也使治亂之柄制在一人之手權重而人才難居此職稱此才者未有一也丗􅀃曰王濬冲裴叔則二人揔角詣鍾士季須􅁷去後客問鍾曰二童是誰鍾曰裴楷清通王戎簡要後二十年此二賢爲吏部尚書當尓時天下無滯才丗語曰安定梁鵠善八分書􅀄爲吏部尚書太祖求爲洛陽令鵠以爲北部尉鵠避地荆州太祖定荆州太祖求鵠鵠乞以書贖死乃令書信幡宫門題語林曰􅀽眞爲監運范􅀇平作吏部尚書大坐語􅀽卿此選還不失護軍􅀽曰卿何事人中作市井魏名臣奏曰羽林右監朱遺言天下之任非吏部尚書所能獨辦令長以下可專付吏部守以上八座舉􅀓咸集表曰昔毛玠爲吏部尚書無敢好衣美食者魏武歎曰􅀌之法不如毛尚書令使吏部用心如毛玠風俗之易在不難矣太平御覽卷第二百一十四
