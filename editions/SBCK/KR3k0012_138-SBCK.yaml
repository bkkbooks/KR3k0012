body:
  text: 皇親部四魏武宣卞皇后文甄皇后文郭皇后明毛皇后明郭皇后晉宣穆張皇后景懷夏侯皇后文明王皇后武元楊皇后武悼楊皇后惠賈皇后惠羊皇后謝夫人懷王太后懷梁太后元帝夏侯太妃虞皇后荀氏附明帝􅁃皇后成恭杜皇后康帝褚皇后簡文鄭皇后孝武李皇后王皇后安帝陳太后恭帝禇皇后魏武宣卞皇后魏志曰武宣卞皇后琅邪人文帝母也夲倡家年二十太祖於譙納后爲妾後隨太祖至洛及董卓爲亂太祖微服東出避難􅀽術傳太祖凶問時太祖左右在洛者皆歸后止之曰曹君吉凶未定未可知今日還家明日􅀂在何面目復相見也正使禍至共死何苦遂從后言太祖聞而善之建安初丁夫人廢遂以后爲繼室諸子無母者太祖皆命后養之文帝爲太子左右長御賀后曰將軍拜太子天下莫不忻喜后當傾府藏賞賜后曰王自以丕年大故用爲嗣我但當以免無教導之過爲幸甚耳亦何當賜遺乎長御還見以語太祖祖恱曰怒不變容喜不改節是最爲難二十四年拜爲王皇后文帝踐祚尊后曰太后稱永壽宫魏書曰后以漢延熹三年生齊郡白亭有黄氣滿室移日父敬侯怪之以問卜者王旦且曰此吉祥也爲太后見外親不假以顔色常言居處當務節儉不當妄賞賜念自勉也帝爲太后弟秉起第及成太后幸弟請諸家外親設下厨無異膳太后左右菜食粟飯無魚肉其儉如此文甄皇后魏志曰文昭甄皇后中山無極人明帝母父逸上蔡令后三歳失父後天下兵亂加以饑饉百姓皆賣金銀珠玉寶物時后家大有儲榖頗以買之后年十餘歳白母曰世今亂多買寶物匹夫無罪懐璧爲罪又左右皆飢乏不如以􅂖賑給親族鄰里廣爲恩惠也舉家稱善即從后言建安中􅀽紹爲中子熈納后冀州平文帝納后於鄴有寵生明帝郭后李隂貴人並愛幸后愈失意有怨言帝大怒遣使賜死葬干鄴明帝即位有司奏請追謚又别立寢廟太和元年追封謚曰敬侯適孫像襲爵􅀄營宗廟掘地得玉璽方一寸九分其文曰天子羡思慈親明帝爲之改容以太牢告廟又嘗夢見后於是舅氏親踈髙下叙用各有差賞賜累巨萬魏書曰甄后每寢寐家中髣髴見人持玉衣覆其上者常共怪之相工劉良相后曰此女貴乃不可言后自少至長不好戯弄年八歳外有立􅀐戲馬者家人諸姊皆上閣觀之后獨不行年九歳喜書視字􅂺識數用諸兄筆硯兄謂后言汝當作女􅀶士耶后荅言聞古者賢女未有不覽前丗成敗以爲巳誡不知書何由見之及爲皇后寵愈隆而彌挹損每因閑宴常言昔黃帝子孫蕃育蓋由妾媵衆多獲斯可願廣求淑媛以豐繼嗣帝心喜焉文郭皇后魏志曰文德郭皇后安平廣宗人也祖丗長吏后少而父永竒之曰此乃吾女中王也遂以女王爲字早失二親喪亂流離没在銅鞮侯家太祖爲魏公時得入東宫后有智數時有所獻納文帝定爲嗣后有謀焉太子即王位后爲夫人及踐祚爲貴嬪甄后之死由后之寵也遂立爲后黃初五年帝東征后留許昌永始臺時霖雨百餘日城樓多壞有司奏請移止后曰昔楚昭王出遊貞姜留漸臺江水至使者迎而無符不去卒没今帝在逺吾幸未有是患而便移止柰何明帝即位尊后爲皇太后稱永安宫明帝毛皇后魏志曰明帝悼毛皇后河内人以選入東宫明帝時爲平原王進御有寵出入與同輦及即位立爲皇后初明帝爲王始納河内虞氏爲妃帝即位虞氏不得立卞太后慰勉焉虞氏曰曹氏好立賤未有能以義舉者也嘉夲典車工卒􅁀富貴舉動甚􅃖駭侯楷切語輒自稱侯身人以爲笑帝之幸郭皇后也后愛寵日衰景初元年帝遊後園召才人以上宴樂左右宜延皇后帝不許乃禁左右使不得宣后知之明日帝見后后曰昨日遊宴北園樂乎帝以左右泄之所殺十餘人賜后死然猶加謚葬愍陵明帝郭皇后魏志曰明帝郭皇后西平人也丗河右大族黃􅀄中夲部反叛遂没入宫明帝即位甚見愛幸拜爲夫人帝疾因遂立爲皇后齊王即位尊后曰皇太后稱永寜宫值三主㓜弱宰輔親政與奪大事皆先啓太后然後施行母丘儉鍾㑹等假其命以爲亂焉景元四年崩晉宣穆張皇后晉書曰宣穆皇后張氏諱春華髙祖同郡人也母河内山氏司徒濤之從祖姑也后少有德行智識􅀄髙祖辭仕以風痺不能起居曝書遇雨髙起収書家唯一婢見之后懼言語泄漏乃手殺之而自執爨焉帝由是重之其後栢夫人有寵后罕得進見帝嘗卧疾后徃省病帝曰老物可憎何煩出也后慙恚不食將自殺諸子亦不食帝驚而致謝后乃止退而謂人曰老物不足惜慮困我好兒耳魏正始八年崩武帝受禪追尊爲太后景懷夏侯皇后晉書曰景懷夏侯皇后沛國譙人也父尚魏征南大將軍母曹氏魏德陽郷主后雅有識度帝每有所爲必預籌畫魏丗宣帝居上將之重諸子並有雄才大略后知帝非魏之純臣而后旣魏氏之甥帝􅀷忌之青龍三年以鴆崩武帝登祚始加號謚文明王皇后王隱晉書曰文明皇后王肅女秉德清貞體行純和八歳誦詩論特精喪服苟有文義過目則識祖司徒㓪異之曰興吾家者必此女矣惜不爲男每居大喪常身不勝衣及鍾㑹見任言於文帝曰㑹好爲事端寵過必􅁦太始元年尊曰皇后宫曰崇禮自即尊位眷戀素業忽弃華麗四年薨晉書曰后諱元􅁎年十二祖㓪薨后哀慼哭泣發於自然其父益加敬異旣笄歸于文帝生武帝武元楊皇后晉書曰楊元后父炳言后相貴故文帝爲武帝娶之生惠帝武帝疑惠帝不堪奉大統宻以語后后曰立嫡以長不以賢豈可動乎帝採諸􅁑冲等五十人入殿呈露靣常衣令后選取后不取端正唯取長白時卞藩女有羙色帝舉扇鄣靣語后曰藩女可后曰藩三丗皇后不宜枉以卑位其中者以絳紗繫臂遂取胡芳芳啼哭左右曰陛下聞聲芳曰死且不畏何畏陛下帝壯其言父奮聞女中亦哭曰老奴不死唯有二兒男在九地之下女在九天之上帝拜芳爲貴嬪元后疾甚見上素敬胡夫人恐立之又慮太子不安臨終枕帝􅂰曰從妺男㳙有德色不足復娶異姓帝許之崩于光明殿武悼楊皇后晉氏后妃列傳曰后諱芷字季蘭小字男㳙武帝繼室也太傅楊駿女咸寧二年即后位婉嫕音翳才色映椒房寵禮尤隆后無子賈庶人爲太子妃時數以肆情忌嫉失帝意帝慮始終之事欲廢焉后爲妃陳請曰賈公有勲於王府猶將數丗宥之況賈妃親則其子夫妬忌亦婦人之常事不足以一眚而忘大德帝納焉晏駕尊曰皇太后賈庶人五日一朝后旣喪所天常有慼容庶人謂不恱在巳愈自嫌及星辰有變占於母家不利殿中典兵中郎孟觀等遂進勸庶人有先唱者有福後發者受禍庶人遂䧟誅后父駿三族及内外新屬遷后於永寧宫賈庶人尋諷百僚奏太后廢爲庶人母龐付廷尉行刑詔􅀄欲宥之卒不可事奏太后截髮稽顙稱以請母於賈庶人而龐遂見刑后不勝憂哀崩於幽宫春秋三十有四謚曰武悼皇后晉後略曰賈后旣殺楊庶人於金墉城又信妖巫謂人旣死必訴怨於先帝乃覆而殯之施諸厭劾符書藥物以合瘞之惠帝賈皇后王隱晉書曰后諱南風武帝謀太子㛰乆不決上欲娶衛瓘女元后欲娶賈充女上曰衛女有五可賈女有五不可衛家種賢而多子端正長白賈女種妬少子醜而短黒郭槐多輸寶物於后遂娶南風八年將納妃帝知太子不慧故試之盡召東宫官屬作飲食而宻封詔使太子決停信待之賈妃大懼召人荅詔草給使張泓曰太子不學而荅詔引義必責草主更益譴􅀒不如直以意荅妃大喜語泓便爲我好荅得富貴與汝共之泓素有小才具草令太子自冩武帝大喜賈妃酷妬手擊數人或以刀㦸擲孕妾子乃墮地上大怒治金墉城將殺之趙粲荀朂􅀷救之故得不廢洛陽尉部小吏忽有好物尉疑爲盗召詰之賈后踈親欲求盗物徃聽對辭云先行逢一老嫗說家有疾師卜當得城南年少厭塞蹔相煩尋重報小吏從之上車下帷内着簾箱中行十餘里過六七門限開簾忽見樓閣好屋問此何處云天上即以香湯見浴好衣羙食將入見一婦人年三十五六短小青黒色眉後有疵見留數日共宿得此衆物賈氏親踈聞其形􅃺如是賈后慙而去尉亦解意云時他人多殺之不出唯此小吏以愛得出賈后詐有身内藁物爲産遂取妹夫韓壽兒託之諒闇所生故弗顯賈庶人臨廢遥喚帝曰陛下有婦使人廢之亦當自廢詔賜死沈約宋書曰齊王囧入廢后后驚曰卿何爲來囧曰有詔収后后曰詔當從我出何詔也又問曰誰起事囧曰梁趙后歎曰繫狗當繫其頸今反繫其尾何得不然晉後略曰載賈后以廉車出承明東掖東門詣金墉城食金屑而死惠羊皇后臧氏晉書曰惠羊皇后諱獻容太山南城人也父􅀇之字弘猷永康元年立爲皇后將入宫衣中有火永興元年河間王顒使將張方廢后於金墉城七月陳旿等唱伐成都王復后位八月張方又廢后十一月張方逼遷大駕幸長安留臺復后位永興二年張方又廢后河間王顒矯詔賜后死劉暾他昆切等上表后得免帝還洛迎復后位後洛陽令何喬又廢后懷帝即位尊后爲惠皇后居弘訓宫洛陽敗没于劉曜曜僣位以爲皇后因問曰朕何如司馬家兒后曰胡可並焉陛下開基之聖主彼亡國之暗夫有一婦一子及身三耳不能庇之貴爲帝王而妻子辱於凡庶之手妾尓時實不思生何圖復有今日妾生於髙門甞謂世間男子皆然自奉巾櫛巳來始知天下有丈夫耳曜甚愛寵之生二子而死僞謚獻文皇后謝夫人附晉書曰謝夫人名􅅼夲貧賤父以屠羊爲業􅅼清惠貞正而有淑姿選入後庭爲才人惠帝在東宫將納妃武帝慮太子未知帷房之事乃遣􅅼徃東宫侍寢由是得幸有身賈后忌之求還西宫遂生愍懷乃立爲大子拜􅅼爲淑媛及愍懷遇酖􅅼亦􅀍害焉永康􅀄詔改葬太子因贈􅅼夫人印綬葬顯平陵懷王太后臧氏晉書曰懷王皇太后諱􅁎初入武帝宫拜中才人早崩懷帝即位追尊曰皇太后梁皇后臧氏晉書曰梁皇后諱蘭壁安定人也祖鴻季儀同三司父芬司徒后初爲䂊章王妃懷帝即位爲皇后永嘉中没胡賊元帝夏侯太妃晉書曰夏侯太妃名光􅁎沛國譙人也父莊淮南太守妃生自華宗㓜而明慧琅耶武王爲丗子覲納焉生元帝元帝立稱王妃永嘉元年薨于江左葬琅耶國初有䜟云銅馬入海建業期太妃小字銅環而元帝中興於江左矣元敬虞皇后荀氏附晉書元敬虞皇后諱孟母濟陽外黃人父豫元帝爲琅耶王納后爲妃無子永嘉六年薨太興三年􅁽贈皇后璽綬祔于太廟晉書曰豫章君荀氏元帝宫人也初有寵生明帝及琅邪王伷音宙由是虞后所忌漸見踈薄明帝即位封建安君别立第宅太寧元年帝迎還臺内供奉隆厚及成帝立尊同於太后咸康元年薨詔曰朕少遭憫凶慈訓無禀撫育之勤建安君之仁也一旦薨殂實思報復永懷平昔感痛哀摧其贈豫章郡君别立廟于京都明帝􅁃皇后晉中興書曰明穆皇后􅁃氏諱文君左將軍琛第三女也后少以珪璋特異令儀淑羙故中宗爲肅祖納焉􅀄爲丗子妃仁和有禮􅀷見敬重后生顯宗成皇帝顯宗即位尊后曰皇太后羣臣奏天子㓜冲宜依漢和熹皇后故事后辭讓數四不得已遂臨朝攝萬機􅂫峻作逆王師敗績后以憂逼崩時年三十三成恭杜皇后晉書曰成恭杜皇后諱陵陽鎮南將軍預之曽孫也成帝以后弈丗名德咸康二年備禮拜爲后后少有姿色然長猶無齒有來求昬者輙中止及納采之日一夜齒盡生七年三月后崩年二十一后在位六年無子先是三呉女子相與簪白花望之如素㮏傳言天公織女死爲之著服至是而后崩康帝褚皇后晉中興書曰康獻皇后褚氏字􅂫子太傅襃之女也后聦明有器識以名家女入爲琅邪王妃生孝宗穆皇帝孝宗即位尊后曰皇太后泰元元年太后詔曰皇帝㛰冠禮備遐邇宅心宜當陽親覽緝熈惟始今歸政事率由舊典於是復稱崇德太后九年崩于顯陽殿簡文鄭皇后晉中興書曰簡文宣太后鄭氏諱阿春滎陽人先適田氏生一男夫又亡后依於舅呉氏中宗爲丞相敬后先崩將納呉氏女爲夫人后及呉氏女並遊後園有見之者言於中宗曰鄭氏女雖􅊔居賢於呉氏逺矣遂以德色納爲夫人甚有寵后雖貴幸而恒有憂色中宗問其故對曰妾有妹中者適長沙王襃餘二妹未出恐姉旣爲人妾無復求者中宗從容謂劉隗曰鄭氏有二妹卿可求佳對使不失舊隗舉其從子傭娶第三者以小者適漢中李氏皆得舊門帝稱尊號后雖爲夫人詔太子及東海武陵王皆母事之帝崩后稱建平園夫人咸和元年薨孝武李太后晉書曰孝武李太后諱陵容本出微賤始簡文帝爲會稽王有三子廢黜早夭其後諸姬絶孕將十年帝令卜者扈謙筮之曰後房中有一女當育二貴男其一終盛晉室乃令善相者召諸愛妾而示之皆云非其人又悉以諸婢媵示焉時后爲宫人在織坊中形長而色黒宫人皆謂之崑崙旣至相者驚云此其人也帝以大計召之侍寢后數夢兩龍枕膝日月入懷帝聞異焉遂生孝武帝王皇后晉中興書曰孝武定皇后王氏字法惠寧康三年中軍將軍栢冲侍中臣康奏晉陵太守王藴女天性柔順惠心塞淵儀度旣同四業允備且盛德之兆羙善先積參議可以配德乾元恭承宗廟貞進六宫母儀天下故烈宗納焉后性􅄝酒驕妬帝􅀷患之乃召藴於東堂具􅀃后過狀令加訓誡藴免冠謝焉后於是少自改飾太元五年崩安帝陳太后晉中興書曰安德太后陳氏松滋人也諱歸女父廣以倡進仕至平昌太守后以羙色能歌彈入宫初爲淑媛生安恭二帝太元十五年薨贈夫人追崇曰皇太后恭帝禇皇后晉書曰恭思禇皇后諱靈媛河南陽翟人義興太守爽之女也后初爲琅邪王妃元熈元年立爲皇后生海鹽冨陽公主及帝禪位于宋降爲零陵王妃宋元嘉十三年崩祔葬冲平陵太平御覽卷第一百三十八
