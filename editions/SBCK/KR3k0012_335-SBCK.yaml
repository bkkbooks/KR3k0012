front:
  text: 太平御覽卷第三百三十五
  hash: sha256:4f0e8c175afd2da2482940e6804d0a13eb050cf7a2066d732950d9dca237e36c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_335-1a}
body:
  text: 兵部六十六營壘烽燧京觀營壘孫子曰絶斥澤唯亟去無留斥鹹鹵之地水草惡浸洳不可處軍也亟紀力切爲交軍於斥岸之中必依水草而背衆樹不得巳與敵戰而會斥澤之中當昔稠樹以爲固守也此處斥澤之軍也平陸處昜車之利也而右背髙前死後生戰便也此處平陸軍也禮記曰四郊多壘卿大夫士之辱也左傳曰許伯致師御靡旌摩壘而還史記曰黄帝脩徳振兵與神農戰于阪泉之野以師兵爲營衛漢書曰周亞夫軍於細柳天子入壁門而不得進上曰此眞將軍又曰李陵浚稽山與單于相值可三萬陵軍居兩山間以大車爲營陵引士出營外爲陣前行持弓弩令曰聞金聲而止虜還見漢軍少直前就營陵搏戰攻之知淳曰手對戰也千弩俱發應絃而倒虜還走上山漢軍追擊殺數千人單于大驚後漢書曰岑彭伐蜀所營地名彭士聞而惡之欲徙㑹日暮蜀刺客詐爲士奴降夜刺殺彭又曰樊宏王莽末與宗家親属作營壍自守老弱歸之者千餘家時亦眉賊欲前攻宏營宏遣人持牛酒米粟勞遺赤眉赤眉長老聞宏仁厚皆稱曰樊君素善旦今見待如此何必攻之引兵而去遂免㓂難又曰弟五倫少介烈有義行王莽末盗賊起宗族閭里争徃附之倫乃依險固築營壁有賊輙􅁬厲其衆引疆持滿以拒之又曰呉漢自將步􅀐二萬餘人進逼成都去城十餘里咀江北爲營作浮橋使副將武威將軍劉尚將萬餘人屯於江南東觀漢記曰龐萌攻蓋延延與戰破之詔書勞延曰龐萌一夜反叛相去不逺營壁不堅殆令人齒欲相擊而將軍有不可動之節吾甚羙之魏志曰鄧艾毎見髙山大澤輙規謀度指畫軍營處所時人皆􅀏之又曰諸􅁑亮死軍退司馬宣王幸其營壘曰天下竒才也又曰曹公征馬超於關中軍于渭南爲賊衝突營不得立地又純沙不勝版築其將婁伯􅀃公曰今天寒可起沙爲城以水灌之湏􅁷冰堅如鐵石功不逹曙百堵所立雖金湯之固未能過也公從之比明已就又曰蜀先主劉備東下伐呉魏文帝聞備樹柵連營七百餘里謂群臣曰備不曉兵豈有七百里營可以拒敵者乎包原隰險阻而爲軍者爲敵所擒此兵忌也緩急不相救一軍潰則衆心恐矣數日果有備敗書至􅀳書曰沮渠蒙遜載記曰改業築西安城以其將􅆇莫孩爲太守蒙遜曰莫孩勇而無謀知進忘退所謂爲之築􅃁非築城也地業不從俄而爲吕纂所滅又曰姚萇破魏􅄄飛於杏城萇命其將當城於營處一柵孔中蒔樹一根以旌戰功􅀊餘問之城曰營所至小巳廣之矣萇曰少來􅋐戰無如此快以一千六百人破三萬衆國之事業田此尅舉小乃爲竒大何足貴又曰成都王潁憚長沙王乂在内遂與河間王顒表請誅后父羊玄之左將軍皇甫啇等撽乂使就第乃與顒將張方伐京都以平原内史陸機爲前將軍假節潁至朝歌毎夜矛㦸有光􅀂火其壘井中皆有龍像進軍屯河南阻清水爲壘造浮橋以通河北以大木凾盛石沉之以擊橋名曰石鼈崔鴻後趙録曰河瑞元年石勒下兾州郡縣保壁百餘衆至十餘萬其衣冠人物集爲君子營宋書曰宗越善營立陣毎數萬人正頓自􅀐馬前行使軍人隨其後馬止營合未甞叅差梁書曰王僧辯陳霸先之破侯景也耀軍于張公洲髙旗巨艦遏江蔽日乘潮順流景登石頭城而覩之不恱曰彼軍上有如是之氣不可易也因率鐵􅀐萬人聲皷而進霸先謂僧辨曰善用兵者如常山之虵首尾相應賊今送死欲爲一戰我衆彼寡冝分其勢僧辨然之乃以強弩攻其前輕銳蹂其後徑衝其中景遂大潰弃城而遁後周書曰楊猛鎭潼關封郃陽伯邑七百户俄而潼關不守猛於善渚谷立柵収集義徒授征東將軍楊州刺史大都督武衛將軍仍鎭善渚大統三年爲竇泰新襲猛脫身得免太祖以衆寡不敵弗之責也仍配兵千人守牛尾堡唐書曰德宗幸奉天李晟赴難李懷光以朔方軍屯咸陽不欲晟獨當一面以分功乃奏請晟兵詔令晟將兵合懷光軍晟引兵至陳陶斜軍壘未周賊出兵來攻晟乃出陣且言於懷光曰賊堅保宫苑攻之未必克今出穴而欲一戰此殆天以賊賜明公也懷光恐晟有功乃曰馬未銜秣土不素飽不飽不􅀂歛兵俟時而發晟乃収軍入壘又曰髙宗遣將軍裴行儉討突厥軍至單干都護府之北際晩下營壕壍方周遽令移就崇崗將士云衆巳就安堵不可勞擾行儉不從更令徙之此夜風雨􅁀至前設營所水深丈餘將吏驚服問行儉曰何以知風雨也行儉􅀏曰自今但依我節制何須問我所由知也三國典略曰蕭紀兵次西陵艫舳旌戈翳川曜日護軍陸法和於硤兩岸築二壘運石填江䥫鏁斷之梁主令法和壘北斷白鴈城道別立小柵孟子曰天時不如地利地利不如人和三里之城七里之郭環而攻之而不勝夫環而攻之必有得天時者矣然而不勝者是天時不如地利也城非不髙也池非不深也兵革非不堅利也米粟非不多也委而去之是地利不如人和也􅀶物志曰處士東里愧責禹亂天下事禹退作三城強者攻弱者守敵者戰城盖禹始也太公兵法曰張軍處將必避七舎七殃武王曰何謂七舎七殃太公曰張軍勿居天社勿居地社勿居虚器勿居􅀫死勿居吞害勿居蜚􅄡勿居湖泉武王曰何謂天社太公曰地髙而仰者也何謂地社卑而下者也何謂虚器故敗邑人莫居之者也何謂􅀫死􅃁墓丘陵間也何謂湖泉枯澤無水者也何謂吞害即人所聚五􅂖處也何謂蜚􅄡地斥鹵秃不生草木也所謂七舎七殃不張軍處將也太白隂經曰偃月營形象偃月皆背山崗面陂澤輪逐山勢弦隨面直地窄山狹之所營又曰偃月外營右置上弦門中置偃月門左置下弦門丈選曰夜薄休屠營盧思道從軍行曰平明偃月屯右地薄暮魚麗逐左賢烽燧􅀃文曰烽燧候表也邊有警則舉火也漢書音義曰髙臺上作桔橰頭置兠零以薪草置其中常懸之有㓂則火然舉之曰烽下多積薪㓂至則燔之望其煙曰燧晝則燔燧夜乃舉烽廣雅曰兠零籠也史記曰周幽王后褒姒好舉烽火叩賊皷方喜王欲后喜輙詐爲之後犬戎兵至舉烽火叩賊鼓群臣不救皆曰王欲后喜耳遂殺幽王及褒姒又曰魏王與信陵君􅀶北境舉烽火言㓂入界信陵君曰臣有客能知趙王隂事言趙王獵非㓂也漢書曰單于立四歳匈奴復絶和親大入上郡雲中烽火通於甘泉東觀漢記曰郭伋爲并州伋知盧芳賊難卒以力制常嚴烽候明購賞以結㓂心又曰馬成繕治障塞自西河至渭橋河上至安邑於原至井陘中山至鄴皆築保壁起烽燧十里一候後漢書曰廉范爲雲中太守㑹匈奴入塞烽火日通故事虜入度五千人乃移書傍郡求助吏自今虜兵度出五千人請移檄范不聽遂選精兵自率士卒拒之又曰遣驃􅀐大將軍杜茂屯北邊築亭候脩烽燧後周書曰宇文貴性聦敏過目輙記甞道逢二人謂其左右曰此人是縣黨何因輙行左右不識貴便􅀃其姓名莫不嗟伏白㦸烽師爲啇人所燒烽師納貨不言其罪他日北師隨例來叅貴乃問云啇人烽何因􅀻放烽師愕然遂自首伏明察如比隨書曰突厥染干爲隣部戰敗與長孫晟獨以五􅀐逼夜南走至旦行百餘里収得數百􅀐乃相與謀曰今兵敗入朝一降人耳大隋天子豈禮我乎玿厥雖來本無􅁈􅂩􅀂徃投之必相存濟晟知其懷貳乃宻遣從者入伏逺鎮令速舉烽染于見四烽俱發問晟曰城上然烽何也晟紿之曰城髙地逈必遥見賊來我國家法􅀂賊少舉二烽來多舉三烽大逼舉四烽使見賊多而又近耳染于大懼謂其衆曰追兵巳逼且可投城旣入鎮晟留其逹官執室以領其衆自將染干馳驛入朝唐書曰元和中京兆尹李􅅠奏三原髙陵涇陽興平等四縣共管烽二十八所毎年差烽子烽師九百七十五人今逺近無虞畿内烽燧請停從之􅀇女戰經曰諸見舉烽火傳言虜且起欲知審來不以言者時所加之得陽者不得隂者爲來法晉令曰誤舉烽燧罰金一斤八兩故不舉者弃市甘氏天文占曰權舉烽逺近沉浮權四星在轅尾西邊地驚備烽候相望虜至則舉烽火十丈如今之井桔橰大錘其頭􅀂警急燃火放之權重本低則末仰人見烽火呉時縁江戍圖曰毎刺姦屯有五兵賊曹一人皆作烽火有急以光傳之黄帝出軍决法曰行軍行兵兩敵相要地形不便望見烽火不得爲客衛公兵法曰烽臺於髙山四顧險絶處置之無山亦於􅀌逈道平地置下築羊馬城髙下任便常以三五爲准臺髙五丈下闊一丈形圎又曰諸軍馬擬停三五日即湏去軍一二百里以來安置爟烽如有動静舉相報其烽並於賊路左側逐要置毎三十里置一烽應接令遣到軍其遊弈馬騎晝日遊弈候視至暮速即作食契即移十里外止􅀫慮防賊徒暮間見􅃄火夜間掩襲捉將其賊路左右草中着人􅀫止以聽賊徒如覺來報烽家舉烽逓報軍司如􅁴十􅀐以上五􅀐以下即放火炬火前鋒應訖即滅火􅀂百􅀐以上二百巳下即放兩炬火准前應滅賊􅀂五百􅀐以上五千􅀐以下即同放三拒火准前應滅前鋒應訖即赴軍􅀂虜走不到軍即且投山谷逐空方可赴軍如以次烽候視不覺其舉火之烽即湏差人急走告知旣置爟烽軍内即湏應接又置一都烽應接四山諸烽其都烽如見􅃄火急報大揔管云某道烟火起大揔管當湏嚴備収拾畜生遣人逺拓毎烽令別奏一人押一道烽令折衝果毅一人都押􅁃闡楊都賦注曰烽火以置於􅀌山頭縁江相望或百里或五十里或三十里㓂至則舉以相告一夕可行萬里孫權時合暮舉火於西陵鼓三竟逹呉郡南徐敬業古意曰甘泉警烽候上谷抵樓蘭北門行曰羽檄起邊庭烽火入咸陽張景陽雜詩曰長鋏鳴鞘中烽火烈邊庭蔡邕徙朔方上書曰旣到徙所乗塞守烽職在候望憂怖燋灼無心復能操筆成草致章闕庭蔡謨與弟書曰軍之耳目當用烽鼓烽可遥見鼓可遥聞湏􅁷百里京觀左傳曰丙辰楚軍於邲遂次于衡雍潘黨曰君盍築武軍築武軍營以章武功而収晉屍以爲京觀臣聞尅敵必視子孫以無志武功楚子曰非尓所知也夫文止戈爲武武王克啇作頌曰載戢干戈載櫜弓矢我求懿徳肆干時夏古者明王伐不敬取其鯨鯢而封之以爲大戮於是乎有京觀以懲淫慝大魚喻不我吞食小國也積屍封土其上謂之京觀又曰齊侯伐晉取朝歌爲二隊入孟門登太行張武軍於滎庭戍郫邵封少水封晉屍於少水以爲京觀以報平隂之役乃還又曰􅁗伯伐晉濟河焚舟封殽尸而還遂霸西戎崔鴻夏録曰赫連勃勃大破南凉殺衆數萬以人頭爲京觀號曰髑髏臺梁書曰天殱醜􅀋冝為京觀用旌武功太平御覽卷第三百三十五
