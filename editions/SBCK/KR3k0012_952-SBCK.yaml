front:
  text: 太平御覽九百五十二
  hash: sha256:6cdc5c9442aea51612e26e0fec64fbe13b105c941d2490d2f8d119c10376585e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_952-1a}
body:
  text: 木部一木上昜曰巽爲木坎其於木也爲堅多心艮其於木也爲堅多節離其於木也爲科上槁堅多心爲剛中也山木堅心也多其節令隂氣故曰科空也爲日所乾故上槁也又􅂛卦曰地中生木􅂛君子以順德積小以髙大書曰兖州厥木惟喬厥貢惟木孔安國曰喬髙又洪範五行三曰木木曰曲直曲直作酸又􅀃命曰木從繩則正后從諌則聖詩曰黄鳥于飛集于灌木其鳴喈二灌木藂木也又曰荏苒柔木君子樹之往來行言心焉數之荏苒寛柔貌也木椅桐梓也又曰南有喬木不可休息漢有遊女不可求思興也南方之木美喬上竦者思辝也漢上遊女無求思者也又曰后妃逮下而無嫉妬之心焉南有樛木􅁑藟纍之木下曲曰謬周禮曰仲冬斬隂木仲夏斬陽木陽木生南山隂木生北山禮記月令曰孟春之月盛德在木孟夏之月母伐大樹樂記曰土敝則草木不長水煩則魚鼈不大稽命微曰出号施令合民心作樂制禮得天心則草木有益於人長以養民也王者得禮之制則澤谷之中生赤木北斗威儀曰君乗木而王者其政􅂛平則草木豐茂左傳曰山有木工則度之又曰鳥能擇木木豈能擇鳥春秋元命苞曰木者陽精生於隂故水者木之母也木之爲言觸也氣動躍也其字八推十爲木八者隂合十者陽數春秋運斗樞曰黒精用事百木共一根百枝木共一根天下共一主之徴也春秋繁露曰木有變春凋冬榮傜貞剛精銳無以治之又曰崔亮爲雍州刺史城北渭水淺不通舡行人艱阻亮謂僚佐曰昔杜預乃造橋况此有異長河且魏晉之日亦自有橋吾今決欲營之咸曰水淺不可爲浮橋泛長無常又不可施柱恐難成立亮曰昔􅁗居咸陽横渡渭以像閣道此即以柱爲橋今唯慮長柱不可得耳㑹天大􅀨山水􅁀至浮山長木數百根藉此爲用橋遂成立百姓利之至今猶名崔公橋後周書曰沙俊齊神武夜遁追至河上復大克􅀗前後虜其卒七萬献俘長安還軍渭南於是所徴諸州兵始至乃於戰所准當時兵士人種樹一株以旌武功又曰王羆以功授右將軍西河内史辝不拜時人謂之曰西河大拜俸禄殷厚何爲致辝羆曰京洛材木盡出西河朝貴營第宅者有永假如其私辦即力所不堪􅀂科發民間又違法憲以此辝耳唐書曰貞觀中山南獻木連理交錯玲瓏有同羅木一丈之􅆬并枝者二十餘所又曰代宗大暦十二年成都府人郭逺因樵㸑獲瑞木一莖有文曰天下太平献之以示百官宰臣奏賀曰至德之化先賁草木太平之符遂形文字伏望藏於祕閣宣付史館又曰貞元􅀄陳留􅀨木皆大如指長寸餘毎木有孔通中所下其立如植管子曰栢公問民飢寒室屋不治墻垣壞不築爲之柰何管子曰休塗樹之枝公令左右休塗樹枝其年民治室屋築墻垣公問之管子曰一樹而息百乗丁壯彈其下終日不歸父老拊樹而論終日不歸今吾休之日中無尺隂行者疾走父老歸而治室孝子曰天下之至柔馳騁天下之至剛人之生也柔弱其死也堅強草木之生也柔脆其死也枯槁柔弱生之徒剛強死之徒合抱之樹生於毫末莊子曰南伯子綦遊乎啇之丘見木焉其大也然必有異材從而視其細枝則拳曲而不可以爲㨂俯而視其大根不可以爲棺椁䑛其葉則舌爛嗅之則使人狂酲子綦曰此果不材之木以至其大矣又曰莊子行於山中見大木枝葉盛茂採木者止其旁而不取也問其故曰無所可用莊子曰此木以不材得終其天年矣孟子曰孟子謂齊宣王曰所謂故國者非謂有喬木之謂也有丗臣之謂也孫卿子曰山下望十􅅿之木􅀂著而求著者不止折也又曰林木茂斧斤至又曰玉在山而木潤孔藂子曰夫子墓方一里諸弟子各以四方竒木來殖之尸子曰木之精氣爲畢方愼子曰廊廟之中材蓋非一木之枝吕氏春秋曰今夫爚蟬者務在乎明其火振其樹而已火不明雖振其樹何益雖振其權蟬其飛去不能得故曰何益明不燭在乎火在於闇闇无所見火乃光耳故曰在於闇中當今之時世暗甚矣人主有能明其徳者天下之士歸之也􅀂蟬之赴明火也又曰子之於父母也一躰而兩分同氣而異息􅀂草莽之有華實也樹木之有根心也又曰樹木盛則飛鳥歸之芻草美則禽獸歸之人主賢則豪桀歸之韓子曰待自直之箭則百丗無矢矣待自圎之木則千歳無輪矣又曰君者壤地臣者草木啇子曰蠹衆則木拆􅂩大則墻壞文子曰葉落者風揺之水濁者物撓之也又曰甘泉必竭良木必伐符子曰木生蝎蝎盛而木枯石生金金矅而石流又曰水生於石未有居石而溺火生於木未有抱木而燋淮南子曰草木洪者爲夲而殺者爲末禽獸之性大者爲首而小者爲尾末大於夲則折尾大於腰則不掉故食其口而百節肥灌其夲而枝葉美又曰夫樹木灌以潦水疇以肥壤千人養之一人技之則必無餘孽况以一國同伐之雖欲乆豈可得哉又曰山生金反自刻木生蠧反自食人生事反自賊賊敗也又曰今夫徙樹者失其隂陽之性則莫不枯槁失猶易也故橘之江北則化而爲枳鸜鵒不過濟洛度汶而死又曰馮生陽閼自馮之先也陽閼生鱗鮐音台鱗鮐生幹木幹木生庶木凢根枝者生庶木根枝木名也又曰髙山􅀷林非爲虎豹也大木茂枝非爲飛鳥也又曰天有明不憂民之晦也百姓穿户鑿牗自取炤焉地有財不憂民之貧也百姓伐木艾草自取冨焉又曰郢人有買屋棟者求大三圍之木而人予車轂跪而度之巨雖可而長不足巨大云長不足言其短也又曰食木者多力而惡熊犀之屬是也食草者善走而愚麋鹿之屬是也又曰良匠不能斷金巧冶不能鑠木金之􅀔不可斷而木之性不可鑠也又曰髙陽魋或曰髙陽楚時王魋宋大夫也將爲室問匠人匠人對曰未可也木尚生加塗其上必將撓以生材任重塗今雖善後必敗髙陽應曰不然夫木枯則益重塗乾則益輕塗今雖惡後必善匠人窮於辭以對卒爲室其始成均然善也而後果敗此直於辭而不可用者也又曰捨茂木而集于枯不弋鵠而鳥難與有圖圖謀也言其愚也耳又曰質的張而弓矢集林木茂而斧斤入非或召之形􅀔所致也又曰冬水可析夏木可結時難得而易失木方茂盛終日採而不知秋風下霜一夕而殫殫盡也又曰佐􅀕者得嘗救􅃲者得傷䕃不祥之木爲電所撲薜木也撲擊也又曰金勝木者非以刀殘林也土勝水者非以璞音朴土塊也塞江也又曰剖劂銷音削鋸非良匠不能以制木鑪橐音朶坊設鑪槖皆冶坊之形也非巧冶不能以治金又曰羽翼美者傷骨骸枝葉美者害根莖能兩美者天下無之也又曰凢見葉落而知歳故葉落而長年悲風俗通曰桂陽太守江夏張遼字叔髙田中有樹遣客伐之六七十下血出客驚怖歸以其事白叔髙叔髙大怒曰樹木汁出此何言血因自嚴行復斫之血大流叔髙使先斫其枝葉有一空處白頭公可長四尺忽出往赴叔髙叔髙乃逆格之如此凡殺四頭左右皆怖伏地而叔髙恬如也徐熟視非人也遂伐此木其年召辟侍御史後爲兖州刺史以二千石尊過鄕里白日衣綉榮美如此抱朴子曰山中大樹能語者非樹語也其精名曰靈陽山夜見火者皆古枯所致勿怪也甲子日稱仙人者樹也孫綽子曰海上人與山客辨其山物海人曰魚額若華山之頂一吸萬頃之波山客曰鄧林有木圍三萬尋直上千里旁蔭數國有人曰東極有大人斬木爲策短不可支鈎魚爲鮮不足充飢金樓子曰利内有水材元嘉中大水有千餘段木流出斧迹未滅俗云漢將將攻越築城浮木于利水未運之前一夜中忽失數千段時或見之今所見木豈非昔􅄦匿之木乎山海經曰少室山木名帝休黃花黒實服之不怒陰符經曰火生於木禍發必尅仙序曰王須少年入學最逺往來常先流輩恠之常見如提木三尺餘至則柱屋閒流輩知之取看後不見正論曰師曠曰人骨法猶木有曲直曲者爲輪直者爲輿檀冝作輻榆冝作轂􅀇中記曰千歲樹之枝中央下四邊高百歲之樹其汁赤如血又曰大樹之山西有採華之樹服之則通萬國之言愽物志曰圎丘山有不死樹食之壽十洲記曰聚窟洲中申未地上有大樹與楓木相似而華葉香聞數百里名爲返魂樹於玉釜中煑取汁如黒粘名之爲返生香香氣聞數百里死尸在地聞氣乃活太平御覽卷第九百五十二
