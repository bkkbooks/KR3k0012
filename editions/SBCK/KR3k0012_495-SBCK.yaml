front:
  text: 太平御覽卷第四百九十五
  hash: sha256:1640ffa34bd70e79cc755343f256be8d6d19e9b4217c398a7d38bcfbd1cf3763
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_495-1a}
body:
  text: 人事部一百三十六諺上􅀃文曰諺傳言也俗言曰諺禮記大學曰故諺有之人莫知其子之惡莫知其苗之碩此謂身不脩不可以齊其家左傳隱公曰􅅬侯薛侯來朝爭長公使羽父請於薛侯曰周諺有之山有木工則度之賔有禮主則擇之周之宗盟異姓爲後寡人􅀂朝于薛不敢與諸任齒又曰虞叔有玉虞公求旃弗獻旣而悔之曰周諺有之疋夫無罪懷璧其罪吾焉用此其以賈禍也乃獻之又曰楚子爲陳夏氏亂故伐陳殺夏徴舒滅陳爲縣申叔時使於齊復命不賀王使讓之對曰人有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰巳重矣又曰公孫歸父㑹楚子于宋宋人使樂嬰齊告急于􅀳􅀳侯欲救之伯宗曰不可古人有言曰雖鞭之長不及馬腹天方授楚未可與爭雖􅀳之強能違天乎諺曰髙下在心髙下猶屈申也川澤納汙山藪藏疾瑾瑜匿瑕國君含垢含忍也垢耻也天之道也又曰韓厥曰古人有言曰殺老牛莫之敢尸而况君乎又曰梗陽人有獄魏戊不能斷以獄上其大宗賂以女樂魏子將受之閻没女寛退朝待於庭饋入召之比置三歎魏子曰吾聞諸諺曰唯食忘憂吾子置食之間三歎何也同辭而對曰食畢願以小人之腹而爲君子之心属厭而巳又曰晉侯假道於虞以伐􅉑宫之竒諌曰􅉑虞之表也􅉑亡虞必從之諺所謂輔車相依脣亡齒寒者其虞􅉑之謂乎論語曰孔子曰周任有言曰陳力就列不能者止家語孔子曰里語云相馬以車相士以君弗可廢也國語曰晉重耳過鄭鄭文公無禮叔詹曰􅀂不禮則殺之諺曰黍稷無成不能爲榮􅁰不能蕃蕪稷不能蕃殖所生不疑維德之基公不聽又曰景王將鑄無射之大林無射鍾名也其律中林鍾也鍾成伶人告和景王謂泠州鳩曰鍾果和矣對曰未可知也諺曰衆心成城衆口鑠金戰國䇿曰昔者茱莒好謀陳蔡好詐莒恃越而滅蔡信晉而亡語曰騏􅂹之衰也駑馬先之孟賁之倦也女子勝之又曰莊辛謂楚王曰鄙諺云見􅇠而顧犬未爲晚也亡羊而􅀘牢未爲遲也史記曰鄙諺曰寧爲雞口無爲牛後又曰李將軍悛悛如鄙人口不能道辭及死知與不知皆爲盡哀彼其忠實心誠信於士大夫也諺曰桃李不言下自成蹊此言雖小可以諭大又曰諺曰千金之子不死於市非空言也又曰樗里子滑稽多智號曰智囊秦人諺云力則任鄙智則樗里又曰司馬相如諫武帝故鄙諺曰家累千金者坐不垂堂此言雖小可以喻大漢書曰季布爲任俠有名楚人諺曰得黄金百斤不如季布一諾又曰韋賢少子􅀇成復以明經歷位至丞相故鄒魯諺曰遺子黄金滿嬴不如一經又曰于定國决疑平法罪疑從輕加審慎之心朝廷稱之曰張釋之爲廷尉天下無􅁈人于定國爲廷尉人自以不􅁈又曰王莽􅆲立後復上符命者莽盡誅之時楊雄校書天禄閣使者欲收雄雄恐乃從閣自投幾死京師爲之語曰惟寂惟寞自投于閣爰清爰静無作符命又曰范増往􅀃項梁曰夫秦滅六國楚最無罪自懷王入秦不反楚人憐之至今故南公稱楚雖三户亡􅁗必楚又曰樓護字君卿與谷永俱爲五侯上客長安號之曰谷子雲筆札樓君卿唇舌又曰成帝時王吉子駿爲京兆尹試以政事先是京兆有趙廣漢張敞王尊王章至駿皆有能名故京師稱曰前有趙張後有三王又曰匡衡好學諸儒爲之語曰無􅀃詩匡鼎來匡􅀃詩解人頥又曰少府五鹿充宗貴幸爲梁丘易元帝好之欲考其異同令與諸易家論充宗辯口諸儒莫能抗有薦朱雲者召入攝齋登堂抗首而請音動左右故諸儒爲之語曰五鹿嶽嶽朱雲折其角又曰文帝從灞陵欲馳下峻阪􅀽盎攬轡上曰將軍怯耶盎曰臣聞千金子不垂堂百金子不􅀝衡服䖍曰惜身不􅀝衡也如淳曰衡樓殿邊欄楯又曰杜欽字子夏少好經書家冨而目偏盲故不好爲吏茂陵杜業與欽同姓字俱以才能稱於京師故衣冠謂欽爲盲杜子夏以相别欽惡以疾見詆爲小冠髙廣材二寸由是京師更謂欽爲小冠杜子夏而業爲大冠杜子夏又曰劉輔諌成帝立趙后曰里語云腐木不以爲柱卑人不可以爲主又曰蕭育少與陳咸朱愽爲友著聞當丗往者有王陽貢公故長安語云蕭朱結綬王貢彈冠言其相薦逹也育與愽後有􅂩不能終丗以友爲難又曰成帝爲太子及即位以張禹論語爲師以上難數對巳問經爲論語章句獻之諸儒爲之語曰不欲爲論念張文由是學者多從張氏餘家浸微又曰諸􅁑豐元帝擢為司􅀠校尉刺舉無所避京師語曰間何闊逢諸􅁑又曰王􅁻少時居長安其東家有􅀥樹臨􅁻庭中􅁻婦取以啖之􅁻知而去婦東家聞而欲伐樹隣里止之因請吉還婦爲之語曰東家有樹王陽婦去東家􅀥完去婦復還東觀漢記曰陳忠上䟽稱語曰迎新千里送故不出門又曰更始在長安中爲之語曰竈下養中郎將爛羊胄􅀐都尉爛羊頭􅀜内侯又曰楊震少學受歐陽尚書於太常桓郁經明愽覽無不窮究諸儒爲之語曰􅀜西孔子楊伯起又曰明德馬后時上欲封諸舅外間白太后曰吾自念親屬皆無柱石之功俗語曰時無赭澆黄土又曰黄香字文疆京師号曰天下無􅀟江夏黄童又曰戴馮爲侍中京師語曰􅀃不窮戴侍中續漢書曰皇甫規歸安定郷人有以貨買鴈門太守者亦還家書刺謁規規卧不迎有頃曰王符在門規驚遽而起屣履出迎時人爲之語曰徒見二千石不如一縫掖又曰荀爽字慈明㓜而好學躭思經書慶弔不行徴命不應潁川爲之語曰荀氏八龍慈明無雙又曰陳蕃字仲舉諌桓帝曰鄙諺言盗不過五女門以貧家也今後宫之女豈不貧國乎又曰楊政字子行少好學京師語曰說經鏗鏗楊子行范曄後漢書曰井丹字太春通五經善談論京師語曰五經紛綸井太春又曰李固遺黄瓊書曰自生人以來平代少而亂俗多必待堯舜之君此爲治終無時矣常聞語曰嶢嶢者易缺皦皦者易汙陽春之曲和者必寡謝承後漢書曰宋􅀪宴見上令主坐屏風後上謂􅀪曰諺言貴易交冨易妻人情乎􅀪曰臣聞貧賤之知不可忘糟糠之妻不下堂上顧謂主曰事不諧矣又曰許愼字叔重性淳篤少愽學經籍馬融常推敬之時人爲之語曰五經無􅀟許叔重又曰馬后履行節儉事從簡約馬廖慮以美業難終上䟽長樂宫以勸成德政長安語曰城中好髙髺四方且一尺城中好廣眉四方􅀞半額城中好大䄂四方全疋帛斯言如戯有切事實又曰胡廣字伯始一爲司空再作司徒三在太尉京師諺曰萬事不理詣胡伯始􅀽山松後漢書曰桓帝時京師稱曰李元禮巖巖如玉山陳仲舉軒軒如千里􅂹又曰桓帝時南陽語曰朱公叔肅肅如松栢下風又曰公沙穆有六子時人號曰公沙六龍天下無􅀟蜀志曰馬良字季常襄陽冝城人兄弟五人並有才名郷里爲之諺曰馬氏五常白眉㝡良良眉中有白毛故以稱之晉書曰歐陽建字堅石丗爲兾方碩族雅有理思才藻美贍擅名北州人爲之語曰渤海赫赫歐陽堅石又曰王珉字季琰少有才藝善行書名出其兄時人爲之語曰法護非不佳僧珎難爲兄僧珎珉小字也又曰石苞字仲容渤海南皮人也雅曠有智局容儀偉麗不脩小節故時人爲之語曰石仲容姣無􅀟又曰衛玠瑯邪王澄有髙名少所推服每聞玠言輙歎息絶倒故時人爲之語曰衛玠談道乎子絶倒又曰阮瞻見司徒王戎戎問曰聖人貴名教老莊明自然其旨同異瞻曰將無同戎咨嗟良乆即命辟之時人謂之三語􅁺又曰劉惔字真長沛國相人也祖宏字終嘏光禄勲宏兄粹字純嘏侍中弟潢字冲嘏吏部尚書並有名中朝時人語曰洛中雅雅有三嘏又曰劉與字慶孫俊㓪有才局與琨並尚書郎弈之甥名著當時京師爲之語曰洛中弈弈慶孫越石又曰裴秀少好學有風操時人語曰後進領䄂有裴秀又曰荀闓字道明亦有名稱京都爲之語曰洛中英英荀道明又曰羊祜傳曰王衍甞詣祜陳事辭甚俊辯祜不然之衍拂衣而起祜顧謂賔客曰王夷甫方以盛名處大位然敗俗傷化必此人也步闡之役祜以軍法將斬王戎故戎衍並憾之每言論多毁祜時人爲之語曰二王當國羊公無德又曰趙王偷傳云張林等諸黨皆登卿將並列大封其餘同謀者咸超階越次不可勝紀至於奴卒厮役亦加以爵位每朝㑹貂蟬盈坐時爲之諺曰貂不足狗尾續又曰王坦之字文度弱冠與郄超俱有重名時人爲之語曰盛德絶倫郄嘉賔江東獨步王文度嘉賔超小字也魏書曰夏侯淵爲將赴急疾常出敵不意故軍中語曰典軍校尉夏侯淵三日五百六十千魏略曰韓曁韓宣爲大鴻臚稱職語曰大鴻臚小鴻臚前後履行相曷如又曰賈洪字叔業好學有材特精於春秋左傳與馮翊敬危材學最髙故衆人爲之語曰州中曄曄賈叔業辯論洶洶敬丈通又曰成都王穎伐長沙王乂募免奴爲軍自稱四部司馬市郭人素謬語奴爲尚故里語曰三部司馬階下兵四部司馬尚長明欲知太平湏石鼈鳴又曰太祖使盧洪趙逹撫軍主刺舉軍中語曰不畏曹公但畏盧洪曹公尚可趙逹殺我晉中興書曰禇齊字季野桓彛目之季野皮裏陽秋又曰薜兼紀瞻閔鴻顧榮賀循同志友善号曰五儁又曰中宗渡江王導群從同心翼戴時人語曰王與馬共天下又曰杜預在内七年損益不可勝數朝野稱之号曰杜武庫言無所不有宋書曰顔竣字士遜爲吏部尚書賔客喧訴常懽􅀏荅之時人爲之語曰顔竣瞋而與人官謝莊􅀏而不與人官又曰髙祖壯士丁旿有氣力時人語曰勿跋扈付丁旿又曰王玄謨御下少恩將士爲之語曰寧作年徒不逐玄謨齊書曰長沙威王晃代兄映爲寧朔將軍淮南宣成二郡太守􅀄沈攸之事起晃便弓馬多從武客燻赫都街時人爲之語曰煥煥蕭四繖崔鴻前􅁗録曰梁讜字伯言愽學有雋才與弟熈俱以文藻清麗見重一時時人爲之語曰􅀜東堂堂二申兩房未􅀂二梁瓌文綺章崔鴻前凉録曰辛攀字懷逺隴西狄道人父奭尚書郎兄鑒曠弟寳迅皆以才識知名􅁗雄爲之語曰五龍一門金友玉昆後魏書曰濟南王元彧與從兄安豐王中山王齊名時人爲之語曰三王楚楚盡琳瑯未􅀂濟南備圎方又曰靈太后幸左藏賜諸臣儀同陳留公李崇章武王融並以所􅀒多㒹仆於地崇乃傷腰融至損脚時人爲人語曰陳留章武傷腰折股貪人敗􅀋穢我明主矣又曰􅀄廣平人李波爲逋逃之藪公私咸患百姓爲之語曰李波小妹字雍容褰裙逐馬如卷蓬左射右射必疊雙婦女尚如此男子郍可逢刺史李安丗設方略誘波諸子姪三十餘人斬于鄴市又曰祖瑩與陳郡􅀽飜齊名秀出時人爲之語曰京師楚楚􅀽與祖洛中翩翩祖與􅀽又曰李謐字永和􅀄師事小學愽士孔璠數年之後璠還就謐請業同門生爲之語曰青青成藍藍謝青師何甞在明經陳書張種少恬静居處雅正不妄交遊傍無造請時人爲之語曰宋稱敷演梁則卷充清處學尚種有其風隋書崔儦與頓丘李􅀂俱見稱重時人爲之語曰京師灼灼崔儦李􅀂齊亡歸郷里仕郡爲功曹又曰何妥少聦明時蘭陵蕭眘亦雋才住青陽巷妥住白楊頭時人爲之語曰丗有兩儁白楊何妥青陽蕭眘其見美如此太平御覽卷第四百九十五
