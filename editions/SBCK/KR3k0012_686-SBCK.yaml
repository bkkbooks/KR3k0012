front:
  text: 太平御覽卷第六百八十六
  hash: sha256:9cafdab114b4c23b0c10d407d34cc7dae08162fd88c6cbe1273561e9e51acb4c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_686-1a}
body:
  text: 服章部三冕纓弁冕􅀃文曰冕大夫以上冠邃延垂旒紞纊昔者黄帝􅀄作冕釋名曰􅀕服曰冕冕猶俛俛平直皃也玄上纁下前後垂珠有文飾也白虎通曰麻冕者何周宗廟之冠也十一月之時陽氣俛仰黄泉之下萬物被施如冕前俛而後仰故謂之冕也所以用麻爲之者女功之始示不志夲不以皮反太古未有禮文之服也又曰冕所以前後邃延者何示進賢退不能也垂旒者示不視邪纊塞耳示不聽讒故水清無魚人察無徒明不尚極知下故禮曰天子玉藻十有二旒前後邃延也世夲曰黄帝作旃冕宋均曰通帛爲旃冕冠之有旒應劭云周始垂旒也又三禮圖曰黄帝戴黄冕周禮曰弁師掌王之五冕朱裏延紐冕綖之覆也紐小鼻貫所貫五采繅十有二就繅合五色􅁝爲之垂之延之前後各十有二所謂邃延也就成也繩之每一匝而貫五采土十二斿則十二王也又曰司服掌王之服祀昊天上帝則大裘而冕祀五帝亦如之六服同冕享先王則衮冕享先公射享則鷩冕祀四望山川則毳冕􅀕社稷五祀則絺冕􅀕羣小五祀則玄冕禮曰有虞氏皇而􅀕周人冕而􅀕皇冕屬􅀞羽飾之又曰諸侯冕而舞大武諸侯之僣禮也又曰王戴冕璪十有二旒則天數也又曰玄冕齋戒􅀑神隂陽也隂陽夫婦又曰天子之冕朱緑藻十有二諸侯九上大夫七下大夫五士三此以文爲貴也又曰魏文侯問於子夏曰吾端冕而聽古樂則唯恐卧鄭玄曰端玄衣又曰君子端冕則有敬色大戴禮曰古者冕而前旒所以蔽明主黃纊塞耳所以揜聽也書曰王麻冕黼裳由賔階隮鄭玄曰三十升布冠也卿士􅀖君麻冕蟻裳入即位蟻謂色玄也太保太史太宗皆麻冕􅊮裳左傳曰晉士㑹帥師滅赤狄晉侯請于王以冠冕命士㑹將中軍且爲太傅又曰公還及方城季武子使公冶問問公起居公冶季氏屬大夫公與公冶冕服以卿玄冕賞之固讓而後受公冶疾聚其臣曰我死必無以冕服歛非德賞也言公畏季氏而賞其使非以我有徳又曰王使詹桓伯辭於晉曰我在伯父猶衣服之有冠冕木土之有夲源民人之有謀主伯父若裂冠毀冕抜夲塞源專弃謀主雖戎狄其何有余一人論語曰子曰禹吾無間然矣菲飲食而致孝乎􅀑神惡衣服而致美乎黼冕又曰子曰行夏之時乗殷之輅服周之冕又曰麻冕禮也今也純儉吾從衆國語曰周襄王賜晉文公命晉侯端委而入大宰以王命命之冕服内史賛之三命而後即冕服家語曰子路問於孔子曰有人於此􅀍􅄄而懷玉如何子曰國無道隱者可也國有道則衮冕而執玉五經通義曰冕制柰何禮器曰冕冠長六寸廣八寸貟前冕緇布在上五采組十二旒夏殷之冕如周制矣其旒色異夏冕黒白赤組旒殷冕黒黄青組旒應劭漢官儀曰周冕與古冕畧等周加垂旒天子前後垂真白珠各十二蔡邕獨斷曰漢明帝採尚書臯繇及周官禮記以定冕制皆廣七寸長尺二寸係白珠于其端十二旒三公及諸侯九旒卿七旒又曰祀天地明堂平冕崔豹古今注云牛亨問曰冕旒如繁露何也荅曰綴而下垂如露之繁多故曰繁露摰氏決疑要注曰秦除六冕之制明帝漢明帝也永平中使諸儒案古文始復造衮冕符子曰龍逢諌桀曰臣觀君之冕非冕冕危石觀君之履非履履春冰未有冠危石而不壓蹈春氷而不䧟也陳壽益部􅂄舊傳曰郭賀拜荆州刺史明帝廵狩到南陽特見嗟嘆賜以三公之服黼黻旒冕勑去幨露冕使百姓見此衣服以彰其德何法盛晉中興曰􅀄中興儀服不備又冕旒飾以翡翠珊瑚雜珠顧和奏舊冕十二旒皆用玉今不能得玉可用白琁珠於是始下太常治改王智􅀷宋記曰明帝詔曰朕以大冕郊祀天宗祀明堂以法冕祀太廟元正大㑹朝諸侯以絺冕小㑹宴饗餞送諸侯臨軒命王公以繡冕征伐不賔講武校獵隋書曰六等之冕皆有黈纊黄綿爲之其大如橘自皇太子以下並犀導青纓纓􅀃文曰纓冠系也緌系冠纓也釋名曰纓頸也自上而下繫於頸也禮曰玄冠丹組纓諸侯之齋冠也玄冠綦組纓士之齋冠也又曰玄冠紫纓自魯桓公始也傳曰石乞盂黶敵子路以戈擊之斷纓子路曰君子死冠不免不使冠在地結纓而死漢書曰冠髙山之冠飛羽之纓又曰終軍字子雲濟南人上書請受長纓必羇南越王而致之闕下乃使使越越王舉國内屬又曰江充召見犬臺宮晉灼日黄圖上林有犬臺宮也冠蟬纚歩摇冠飛翮之纓張晏曰冠蟬纓小歩則揺纓隨冠而動若鳥翮然晉書曰石季龍子義陽公鑒時鎮􅀜中􅃥煩賦重失􅀜右之和其女官李松勸鑒文武有長髮者㧞爲冠纓餘以給宫人季龍聞之大怒以其右僕射張離爲雍州刺史以察之信然徴鑒還鄴収松下廷尉後魏書曰李彪嘗使齊着大頭纓纓􅅂至􅆎張融􅀏之曰北國士大夫帽􅅂亦有等級不彪曰上士至􅆎中士至頸下士之徒盖髮而巳山海經曰拘纓之國一手把纓管子曰桓公親郊管仲詘纓捷祍孟子曰孺子歌曰滄浪之水清兮可以濯我纓楚詞亦同莊子曰昔趙惠文王喜劒太子患之募左右孰能􅀃王左右曰莊子當能太子乃使人以千金奉莊予莊子不受與使者俱徃太子曰吾王所見唯劒士蓬頭突􅁂冠曼胡之纓短後之衣瞋目而語難王乃􅀃之今大夫必儒服而見王事必大逆莊子曰請爲劒服又曰原子居衛正冠而纓絶歛衿而肘見言貧也淮南子曰聖人見鳥獸髯胡之制作緌纓之首飾韓子曰鄒君好服長纓左右皆作長纓纓甚貴鄒君患之問左右左右對曰君服之百姓亦多服是故貴鄒君因先自斷其纓而出國中皆不服長纓􅀃苑曰楚莊王賜群臣酒日暮燭滅乃有人引美人之衣者美人援絶其冠纓告王趣火來視絶纓者王曰賜人酒使醉失禮柰何欲顯婦人之節而辱士乎乃命皆絶去其冠纓尉繚子曰天子玄冠玄纓諸侯素冠素纓自大夫以下皆皂冠皂纓後漢崔駰達指曰有事則褰裳濡足無事則攝纓整衿魏徐幹齊都賦曰纎纚細纓輕配蟬翼自尊及卑湏我元服晉陸機詩曰冠冕無醜士長纓皆雋民晉成公綏七唱曰瓊弁曜首玉纓照目宋謝靈運七濟曰翠緌媚眉朱裳妍形劉梁七舉曰華組之纓從風紛紜弁釋名曰弁如兩手相合拚時也以爵韋爲之謂之爵弁以鹿皮爲之謂之皮弁以韎韋爲之謂之韋弁也系本曰魯昭公作弁宋均日作素弁也五經通義曰皮弁冠前後玉飾白虎通曰皮弁者何謂也所以法古至質冠之名也弁之爲言攀也所以持髮也上古先賢服鹿皮取其文章也故禮曰三王共皮弁素績爵弁何謂也其色如爵頭周人宗廟士之冠也周尚赤所以不純赤但如爵頭也三禮圖曰爵弁士助君􅀕之服以􅀕其廟無旒韋弁王及諸侯兵服也三禮冠弁圖曰皮弁以鹿皮淺毛黄白色者爲之髙尺二寸春三月習大射冠之行事輿服志曰皮弁與委貌同制長七寸髙四寸制似覆杯前髙廣後卑銳所謂夏之母追上音牟下音堆殷之章甫者也行大射禮辟雍公卿諸侯大夫行禮者冠委貌執事者冠皮弁衣都麻衣董巴輿服志曰爵弁一名冕廣八寸長二寸如爵形前小後大其上似爵頭色有収持笄所謂夏収殷􅒐况羽切者也祠天地五郊明堂雲翹舞樂人服之詩曰淑人君子其帶伊􅁝其帶伊􅁝其弁伊騏毛萇日騏其文也弁皮弁也又曰有匪君子充耳琇瑩㑹弁如星弁皮弁所以㑹髪也又曰有頍丘弭切者弁實維伊何又曰側弁峩峩屢儛傞傞禮曰三王共皮弁素服又曰􅀕之日王皮弁以聽􅀕報又曰太學始教皮弁􅀕菜示敬道也又曰古者天子諸侯必有公桑大昕之朝君皮弁素積卜三宫夫人桑于公桑左傳曰楚子玉自爲瓊弁玉纓未之服也先戰夢河神謂巳曰􅂌予予賜汝孟諸之麋又曰天王使劉定公勞趙孟於頴館於洛汭劉子曰美哉禹功明德逺矣微禹吾其魚乎吾與子弁冕端委以治民臨諸侯禹之力也周禮曰司服掌王之􅁻㐫衣服凢兵事韋弁服鄭玄曰以韎韋爲弁也春秋傳曰晉郄至衣韎韋之跗注是也眡朝則皮弁服鄭玄日視朝視内外之事也皮弁之服十五􅂛白布衣積素以爲裳也凢甸冠弁服鄭玄曰甸獵也冠弁委貌也其服緇布衣亦積素以爲裳諸侯以爲視朝之服凡㐫事服弁服弁服䘮冠也其服斬衰齊衰凢弔事弁絰服弁絰者如爵弁而素加環絰又曰弁師掌王之皮弁㑹五采玉􅋒象邸玉笄􅋒結也皮弁之縫中貫結五采玉以爲飾邸下秪也以象骨爲之諸侯及􅀌卿大夫之冕韋弁皮弁弁絰各以其等爲之儀禮曰士冠服爵弁服鄭玄曰此與君􅀕之服同也榖梁曰弁冠雖舊必加於首周室雖衰必先諸侯家語曰諸侯皮弁以告朔于太廟卒朔然後服之以視朝漢書曰韓延壽爲潁川太守令文學校官諸生弁執爼豆又曰王莽􅀄獻新樂於明堂太廟羣臣始冠麟韋之弁魏志曰帝以楊彪故漢太尉使着鹿皮冠彪辭讓不聽竟著布單衣皮弁以見隋書曰新羅嘗遣使朝貢李子雄至朝堂與語因問其冠制所由其使者曰皮弁遺象安有大國君子而不識皮弁也子雄因曰中國無禮求諸四夷使者曰自至巳來此言之外未見無禮憲司以子雄失詞奏劾其事竟坐免又曰何稠叅㑹今古多所改創魏晉以來皮弁有纓而無笄導稠曰此古田獵之服也今服以入朝冝變其制故弁施象牙簮導自稠始也鄴中記曰石季龍宫婢數十盡著皂褠頭著神弁如今之禮先冠也太平御覽卷第六百八十六
