front:
  text: 太平御覽卷第一百四十四
  hash: sha256:6f8ddbc0dc1c0baf80e796adeddb714e361d22cf8bedd5284c15e76ab12bd7f1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_144-1a}
body:
  text: 皇親部十昭儀夫人貴人婕妤昭儀漢書外戚傳曰武帝制婕妤娙娥容華充衣各有爵位而元帝加昭儀之號位次丞相爵比諸侯王婕妤視上卿比列侯漢書曰孝元􅀓昭儀哀帝祖母也河内人少爲上官太后才人元帝進幸有寵爲人才略善事人下至宫人左右飲酒酹地皆祝延之産一男一女女爲平都公主男爲定陶恭王漢書曰孝元馮昭儀平帝祖母父奉丗爲執金吾上幸虎圈􅃲獸後宫皆坐熊佚出圈攀檻欲上殿左右貴人昭儀等皆驚走馮婕妤直前當熊而立左右殺熊上問人情驚懼何故前當婕妤曰猛獸得人而止妾恐熊至御座故身當之元帝嗟嘆以此倍敬重焉男立爲信都王尊婕妤爲昭儀元帝崩爲信都太后與王俱居儲元宫宫名在長安城西又曰孝成趙皇后夲長安宫人生時父母不舉三日不死乃收養及壯屬陽阿主家學歌舞號曰飛鷰帝微行過陽阿主作樂見飛鷰而恱之召入宫大幸有女弟復召入俱爲婕妤貴傾後宫許后廢立爲皇后後寵小衰而弟更幸爲昭儀居昭陽舎其中庭彤朱殿上髹􅃮砌皆銅呇金塗白玉堦璧帶徃徃爲黃金紅鈆藍田璧明珠翠羽飾之後宫未甞有焉魏志序曰魏因漢法母后之號皆如舊制自夫人以下丗有増損太祖建國始命王后其下五等有夫人昭儀婕妤容華美人明帝又置淑妃昭華後魏書曰丗祖左昭儀文明皇后馮氏之姑父㓪坐事誅后遂入宫昭儀雅有母德鞠養教誨年十四髙宗踐極選后爲貴人皆是昭儀撫訓之力又曰孝文馮昭儀廢后馮氏姊也髙祖還洛后恩遇甚厚昭儀先以疾病文明太后遣還家爲尼太后崩服終髙祖重引爲左昭儀至洛稍有寵后禮愛漸衰昭儀自以年長且前入宫掖素見待厚規爲内主􅉲構百端帝遂廢后爲庶人昭儀寵愛過夲專寢當夕宫人稀復進見後遂立爲皇后沈約宋書曰漢元帝制昭儀丗祖省之晉泰始二年又置昭華昭儀等以備九嬪也崔鴻三十國春秋前趙録曰嘉平二年立司空王育女爲左昭儀尚書令任顗女爲右昭儀晉書載記曰石勒定昭儀夫人位視上公貴嬪貴人視列侯貟各一人三英九華視伯淑媛儀視子容華美人視男務簡賢淑不限貟數西京雜記曰趙后腰體弱善行歩進止女弟昭儀不能及弱骨豐肌尤工􅀏語爲當時第一皆擅寵後宫西京賦曰增昭儀於婕妤賢旣公而復侯唐書曰髙宗六年將立昭儀武氏爲皇后長孫無忌屢言不可帝後召于志寜等謂曰武昭儀有令德朕欲立爲皇后卿等以爲如何志寜曰自貞觀二十三年後先朝付託遂良望陛下問其可否竟不從無忌等言而立昭儀爲皇后夫人周禮注曰三夫人之於后猶三公之於王坐而論婦禮無官職者矣禮記婚義曰古者天子后立六宫三夫人九嬪二十七丗婦八十一御妻以聽天下之内治以明章順故天下内和而家理五經要義曰古者后夫人必有女史彤管之法后妃羣妾以禮御于君所女史書其日月授其環以進退之生子月娠則以金環退之當御者以銀環進之着于左手旣御着于右手左手陽也以當就男故着右手隂也旣御而復故此女史之職也史記曰武帝時幸夫人尹婕妤邢夫人號娙徐廣曰五耕反妭秩比中二千石尹夫人邢夫人同時並幸有詔不得相見尹夫人自請武帝許之即令他夫人飾徒御者數十人來前尹夫人見之曰非邢夫人身也帝曰何以言之對曰視其形貌體狀不足以當人主於是有詔使邢夫人衣故衣獨身來前尹夫人望見之曰眞是矣於是乃低頭俛而泣自痛其不如也諺曰美女入室惡女之仇漢書曰漢興因􅁗之稱號妾皆稱夫人有美人良人八子七子長使之號焉又曰漢王得定陶戚􅁎愛幸生趙隱王如意髙祖崩惠帝立吕后爲皇太后乃令永巷囚戚夫人髠鉗衣赭衣令舂戚夫人舂歌曰子爲王母爲虜終日舂薄暮常與死爲伍相離三千里當誰使告汝太后遂斷戚夫人手足去眼熏耳飲以瘖藥使居鞠域中名曰人彘又曰髙帝薄􅁎文帝母也少時與管夫人趙子兒相愛約曰先貴無相忘也而管先幸漢王四年坐河南成臯靈臺此兩美人相與􅀏問其故兩人俱以實告王心悽然憐薄􅁎是日召而幸之又曰孝武李夫人夲以倡進􅀄夫人兄延年性知音善歌舞武帝愛之毎爲新聲變曲聞者莫不感動延年侍上起舞歌曰北方有隹人絶丗而獨立一顧傾人城再顧傾人國寜不知傾城與傾國佳人不可得上嘆息曰善丗豈有此人乎平陽主因言延年有女弟上乃召見之實妙麗善舞由是幸生一男是爲昌邑哀王李夫人少而蚤卒上憐閔焉圖􅀞其形甘泉宫齊人少翁能致其神迺夜張燈燭帷帳陳酒肉而令上居他帳望見好女如李夫人之貌不得就視上愈益悲感爲作詩曰是耶非耶立而望之偏何姍姍其來何遟令樂府諸音家􅃶歌之上自爲作賦以傷悼夫人又曰孝武鈎弋趙婕妤昭帝母也家在河間武帝廵狩過河間望氣者言此室有竒女天子氣使召之旣至女兩手皆拳上自披之手即時伸是得幸號曰拳夫人後漢書曰陳夫人者家夲魏郡少以聲􅇊入孝王宫得幸生質帝亦以梁氏故榮寵不及焉魏志曰魏因漢法母后之號皆如舊制自夫人以下丗有増損太祖建國始命王后其下五等有夫人有昭儀有婕妤有容華有美人明帝増淑妃昭華脩儀太和中始復命夫人登其位於淑妃之上自夫人以下爵凢十二等貴嬪夫人位次皇后魏志曰文德郭皇后有智數時有所獻納文帝之爲嗣后有謀焉太子即位后爲夫人王隱晉書曰胡芳以選入宫父奮哭曰老奴不死唯有二兒男入九地之下女上九天之上後拜芳夫人元后臨終有命先來臨者有賞胡夫人自排人徑前辭訣咸寜二年立皇后楊氏封父駿臨晉侯駿漸驕慢奮語駿卿恃女更豪也與天家作婚者未有不滅門駿曰卿女不在天家也奮曰我女與卿女作婢耳何能増損後魏書曰明元昭哀皇后姚興之女太宗以后禮納之後爲夫人后以鑄金人不成未昇尊位然帝寵幸出入居處禮如后焉晉中興書曰簡文宣皇后鄭氏字阿春榮陽人也先過渤海田氏生一男夫亡后依舅濮陽吴氏中宗爲丞相敬后先崩將納吴氏女爲夫人后及吴氏女並遊後園有見之者言於中宗曰鄭氏雖􅊔居賢於吴氏逺矣遂以德色納爲夫人甚有寵沈約宋書曰晉武採漢魏之制置貴嬪夫人貴人是爲三夫人位視三公晉起居注曰有司奏今月九日當拜鄭夫人后婕妤桉儀注應服雀􅁫袿􅙦列仙傳曰鈎弋夫人右手拳姿色甚偉帝披其手得一鈎而手㝷伸生昭帝旣而帝害之殯尸不臰而香數月昭帝旣即位更葬之棺空但有系履故名其宫曰鈎翼後避諱改爲弋廟有神祠焉西京雜記曰髙帝戚夫人善鼓瑟擊筑帝擁夫人􅀝瑟而􅃶歌畢泣下流連夫人善爲翹䄂折腰之舞歌出塞望歸之曲侍婢數百人皆爲之後宫齊唱常入雲霄又曰戚夫人以百煉金爲彄環照見指骨上惡之以賜侍兒鳴王曜􅊍等各四枚又曰戚夫人侍兒賈佩蘭後出爲扶風人叚儒妻􅀃在内時戚夫人侍髙祖常以趙王如意爲言髙祖思之或半日不言歎息悽愴而未知其術輙􅀝夫人夫人擊筑髙祖自歌大風詩以和之又曰武帝以象牙爲簟賜李夫人又曰武帝過李夫人就取玉􅆪搔頭自此宫人搔頭皆用玉貴人東觀漢記曰光烈隂皇后上即位立爲貴人上以后性賢仁冝母天下欲授以尊位后􅂺追讓自陳不足以當大位又曰章帝宋貴人時竇皇后内寵方盛以貴人名族節操髙妙心内害之欲爲萬丗長計隂設方略䜛毀貴人由是母子見踈數月誣奏貴人使婢爲蠱道祝詛七年遂􅀍􅉲暴卒又曰孝和隂皇后聦慧敏逹有才能善史書永元二年選入掖庭爲貴人託以先后近屬故有寵後漢書曰順烈梁后永建三年與姑俱入掖庭時年十三太史卜兆得封房又筮得坤之比遂以爲貴人常時􅀍引御從容辭曰願陛下思雲􅀨之均澤識貫魚之次序使小妾得免罪謗之累由是帝加敬焉又曰桓思竇后延熹八年選入掖庭爲貴人其冬立爲皇后而御見甚稀帝所寵唯采女田聖等永康元年冬帝寢疾遂以聖等九女皆爲貴人東觀漢記曰申貴人生孝穆皇帝趙夫人爲穆皇后匽夫人生桓帝帝旣立追謚趙夫人爲穆皇后匽夫人爲􅀶園貴人和平元年桓帝詔曰􅀶園匽貴人履髙明之懿德咨淑美之嘉㑹與天合靈篤生朕躬欲報之德詩所感歎今以貴人爲孝崇皇后又曰孝桓帝鄧后字猛父香早死猛母宣改嫁爲掖庭民梁紀妻紀者襄城君孫壽之男也壽引進令入掖庭得寵爲貴人故冒姓爲梁氏續漢書曰光武郭皇后聖通丗祖至眞定納聖通有寵丗祖即位以爲貴人魏志曰文帝納甄后於鄴有寵生明帝郭后李貴人並愛幸后愈失意有怨言王隱晉書曰武帝臨軒拜諸葛婉爲夫人李曄爲貴人後魏書曰文成馮后生有神光之異髙祖踐極以選爲貴人又曰文成光皇后李氏梁國蒙縣人也頓丘王峻妹后之生也有異於常父方叔常言此女當大貴及長姿質美麗永昌王仁得后後遇事誅后與其家人送平城宫髙祖登白樓望見之謂左右曰此婦人佳乎乃下臺后得幸於齋庫中遂有娠守庫者亦私書壁記之後驗問皆相符同生顯祖拜貴人沈約宋書曰貴嬪文帝所制貴人漢光武制泰始二年又省貴人置貴􅁎婕妤漢書曰婕妤視上卿比列侯又曰孝宣皇帝之爲曾孫也暴室嗇夫許廣漢有女平君年十四五配曾孫數月曾孫立爲帝平君爲婕妤是時霍將軍有小女與皇太后公卿議更立皇后皆心議霍將軍女亦未有言上乃詔求微時故劒大臣知旨白立許婕妤爲皇后又曰孝宣王皇后父奉光少時􅃲雞宣帝在民間數與奉光㑹相識奉光有女年十餘歳毎當適人所當適者輙死故乆不行及宣帝即位召入後宫爲婕妤是時館陶公主母婕妤及淮陽憲王母張婕妤楚孝王母衛婕妤皆愛幸皇后廢後上憐許太子早失母幾爲霍氏所害於是乃選後宫素謹愼而無子者遂立王婕妤爲皇后令母養太子又曰孝成班婕妤成帝􅀄即位選入後宫俄而大幸爲婕妤居增城合歡宫再就館有男數月失之成帝遊於後庭嘗欲婕妤同輦載婕妤辭曰觀古圖書賢聖之君皆有名臣在側三代末主迺有嬖女今欲同輦得無近似之乎上善其言而止太后聞之喜曰古有樊􅁎今有班􅁎丗􅀃曰漢成帝幸趙飛鷰讒班婕妤呪詛帝乃考問婕妤對曰妾聞死生有命冨貴在天修善尚不蒙福爲邪欲以何望􅀂􅀑神有知不受邪佞之訴如其無知訴之何益故不爲也漢書曰成帝隆於内寵班婕妤進侍者李平得幸立爲婕妤上曰始衛皇后亦從微起乃賜平姓曰衛所謂衛婕妤又曰中山衛􅁎平帝母也父子豪中山盧奴人官至衛尉子豪女弟爲宣帝婕妤生楚孝王長女又爲元帝婕妤生平陽公主成帝時中山孝王無子以衛氏􅁻祥以子蒙少女配孝王元延四年生平帝魏志曰太祖建國始命王后其下有婕妤五等晉服制令曰婕妤銀印青綬佩朱瓄玉婦人集曰漢元帝賜婕妤書曰問飛鷰趙婕妤夫上有誠必應以實憤懣充中必形於色詩云皷鍾于宫聲聞于外猶此言之眞僞之效難以欺矣夫君子貴素文足通殷勤而巳亦何必華辭哉自以親婕妤異於他人故不能無言亦不以􅀷相過望前數以顔色不平應對舒遟爲譴卒不能自改婕妤方見親幸之時老母在堂兩弟皆􅆪金貂並侍於側同列比舎豈不謂婕妤妹弟尊幸哉今過蒙譴獨謂老親兩弟何班婕妤報諸姪曰記言屬見元帝所賜趙婕妤書以相比元帝􅀍病無悰但鍜錬後宫貴人書也􅀋多華辭至如成帝則推誠冩實􅀂家人夫婦相與書矣何可比也故略陳其長短今汝曹自評之後魏書曰御史中尉李彪有女㓜而聦令彪每竒之教書學讀誦經傳曾謂所親曰此女當興我家卿曹各得其力彪亡後丗宗聞名納爲婕妤在宫常教帝妺書誦授經史丗宗崩婕妤爲比丘尼通習經義法座講􅀃諸僧歎重之太平御覽卷第一百四十四
