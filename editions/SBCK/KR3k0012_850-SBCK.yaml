body:
  text: 飲食部八飯飱􅁰飯周禮曰黄帝始蒸榖爲飯周禮天官食醫曰食齊眡春時飯冝温也禮記曰飯曰諸飯也􅁰稷稻梁白􅁰黃梁稰樵熟獲曰稰生獲曰穛􅁰黄􅁰也又曰文王有疾武王不晚冠帶而養言常在側文王一飯亦一飯文王再飯亦再飯欲知氣力箴藥所勝又曰燕侍食於君子則先飯而後巳所以勸也母放飯母流歠小飯而亟之亟疾也備噦噎若見問也數噍母爲口容口容弄口論語曰子曰飯􅂼食飲水曲肱而枕之樂亦在其中矣爾雅曰饙餾稔也今呼折飯爲饙熟爲餾稔或作餁也饙音甫云切餾力又切音脩食饙謂之餲飯穢􅆨博者謂之􅶊􅶊飯相着也米者謂之檗飯中有未熟者春秋運斗樞曰粟五變而以陽化生爲苗秀爲禾三變而􅀕謂之粟四變入臼米出甲五變而蒸飯可食􅀃文曰饙脩食飯也餾飯氣蒸也饡音賛以羹澆飯也饖一月切飯傷熟也一􅋩切飯傷濕也釋名曰飯分也使其粒各自分也乾飯而􅁀乾之也史記曰廉頗之奔魏也魏不能用也而趙數困於秦趙人思復得廉頗㢘頗亦思復爲趙用趙王因使使魏視頗尚可用不郭開怨頗郭開頗之仇也不欲令還多與使者金令毀之使者視頗爲之一飯一斗米十斤肉􅀍甲上馬以示可用使者還報曰廉將軍年雖老尚善飯然與臣少頃三遺尿矣王以爲老遂不召又曰孟甞君待客夜食有人蔽火光客怒以爲飯不等輟食辭去孟甞君起自持其飯比之客慙自刎漢書曰公孫弘爲丞相食脫粟之飯又曰王莽使中黄門王葉領長安莽聞城中飢饉以問葉葉取市所賣梁飯肉羮持入視莽曰民食咸如此莽信之續漢書曰羊陟拜河南尹常食乾飯後漢書曰王郎起光武至南宫遇大風雨引車入道傍空舎溤異抱薪鄧禹􅋹火光武對竈燎衣異進麥飯兎肩謝丞後漢書曰左雄爲兾州刺史長食乾飯司馬苞爲太尉常食漉飯李固爲太尉常食麥飯王暢爲南陽太守作飯塩豉菜茹羊茂爲東郡太守常食乾飯胡劭爲淮南太守使鈐下閣外炊曝作乾飯漢舊儀曰齊法二人施案陳三十六肉食九榖飯魏書曰卞太后左右食菜粟飯魏畧曰王朗㑹稽敗太祖盛㑹啁之曰不能効君昔在㑹稽折粳米飯朗曰冝適難值如朗者未可折而折明公今日可折而不折也呉書曰􅀽術在壽春百姓飢窮以桑椹蝗蟲爲乾飯又曰是儀服不精細食不重膳家無儲稸孫權聞之幸儀舎求視􅂼飯親嘗之歎息即増俸賜晉書曰石崇家稻米飯在地經􅀫皆化爲螺時人以爲族滅之應又曰衛瓘家人炊飯墮地盡化爲螺歳餘而及禍也又曰殷仲堪自在荆州連年水旱百姓飢饉仲堪食常五椀盤餘肴飯粒落席間輙拾以噉之雖欲率物亦縁其性真素也宋書曰衡陽王義季都督荆州甞大蒐於郊者野老帶苫而耕命左右斥之老人擁來對曰昔有楚子盤遊受譏令尹今陽和扇氣播厥之始一日不作人失其時大王馳騁爲樂驅斥老夫非勸農之意義季止馬曰此賢者也命賜之食老人曰吁願大王均其賜也茍不奪人時則一時皆享王賜老人不偏其私矣斯飯也弗敢當問其名不言而退南史曰宋􅀄呉郡人陳遺少爲郡吏母好食鐺底飯遺在役恒帶一囊毎煑食輙録其焦以貽母後孫息亂聚得數斗恒帶自隨及敗逃竄多有餓死遺因此得活母晝夜泣涕目爲失明耳無所聞遺還入户再拜號咽母豁然即明梁書曰謝蘭五歳時父亡未食乳媪欲令飯蘭終不進舅阮孝緒聞之歎曰此兒在家則曽子之流事君則藺生之疋因名曰藺稍授以經史過日便能諷誦孝緒毎曰吾家陽元也􅀽淑家陽元又曰齊荀兒之役臨汝侯嘲羅研之曰卿蜀人樂禍貪亂一至於此對曰蜀中積弊實非一朝百家爲村不過數家有食窮迫之人十有八九􅅞束之使旬有二三貪亂樂禍無足多恠􅀂令家畜五母之雞一母之豕牀上有百錢布􅀍甑中有數􅂛麥飲雖􅂫張巧􅀃於前韓白按劒於後將不能使一夫爲盗况貪亂乎又曰魚私爲湘東王鎮西司馬述職西上道中乏食縁路採麥米飯給所部弘度之所後人覔一麥不得又於窮洲之上捕得數百猕猴以爲脯以供酒食又曰􅀓翽代劉􅀇明爲山隂令問􅀇明曰願以舊政造新令尹荅曰我有竒術卿家譜所不載臨別當相示旣而曰作縣唯日食一􅂛飯而莫飲酒此第一䇿也又曰裴元禮爲西豫州刺史母憂居喪唯食麥飯又曰沈衆永定二年兼兵部尚書監起太極殿恒衣布􅂁芒屩以麻繩爲帶又囊麥飯䬳以噉之朝士咸共誚其所爲陳書曰孔奐爲武康令武帝尅日决戰乃令奐多營麥飯以荷葉褁之一宿之間得數萬褁軍人食訖盡弃其餘崔鴻前􅁗録曰符堅以乞活夏􅀧爲左鎮郎胡人護磨那爲右鎮郎奄人申香爲拂蓋郎􅀧等身長一丈八尺並多力善射三人每食飯一石肉三十斤後魏書曰楊播兄弟雍睦播毎出或日斜不至不先飯待還然後食又曰盧義僖爲都官尚書性清儉不營財利雖居顯位毎至困乏麥飯􅂼食然亦甘之也又曰闞因甚貧弊不免飢寒性能多食一飯至三㪷乃飽卒無後唐書曰太宗謂侍臣曰朕自皇太子立也遇物必誨見其將飯告稼穡艱難不奪農時乃可常有又曰蔣沅乾元後授陸渾􅉦厔咸陽髙陵西令當軍旋之後瘡痍未平沅竭心撫勞所至安輯副元帥郭子儀毎統兵由其縣必誡軍吏曰蔣令清嚴幹辦供億固當有素士衆得􅂼飯見饋則已無撓清政其爲時人所知如此墨子守備曰乾飯人二􅂛以備隂雨晏子春秋曰晏子相齊食脫粟之飯尹文子曰晉國俗奢文公儉以矯之因食脫粟之飯莊子曰子輿與子桑友而霖􅀨十日子輿曰子桑殆病矣裹飯而徃食之又曰宋鈃尹文其爲人太多其自爲太少日請置五升之飯足矣斯明自爲之大少也列子曰楚靈王好細􅆎臣皆以三飯爲節朞年有黧黒之色孟子曰齊人有一妻一妾其良人出行則饜酒􅁏而後返欺其妻云冨貴人共飲食也其後妻向其所之乃就郊外乞人􅀕飯韓子曰堯糲蒸之飯又曰孫叔敖爲令尹糲飯菜羮枯魚之膳又曰嬰兒之相與戯以塵爲飯以水爲飲以􅅺爲羮以木爲胾淮南子曰爲客治飯而自食䔧藿名尊於實仁義之名重於治飯之實也六韜曰堯王天下滋味重累弗食温飯煖羹不酸餒不易也家語曰孔子厄於陳蔡從者七日不食飯子貢以所齎貨竊犯圍出告糴於野人得米一石焉顔回仲由炊之于壞屋之下有埃塵墮飯中顔回取而食之吕氏春秋曰飯之美者􅀇山之禾不周之粟陽山之穄南海之稻呉越春狄曰勾踐載飯與羮以遊國中行子戯之遇􅀌􅀌即脯而啜之神異經曰東南有人名黄父以􅀑爲飯以霧爲漿􅀃苑曰吕望行年五十賣飯􅁄津也論衡曰䑕渉飯中􅂢而不食風俗通曰俗􅀃不大餓不在車飯謂正得一車飯不復活也或曰輔車上飯小小不足濟也案呉郡名酒杯爲􅦝音章言大餓人得一􅦝飯無所益也寕相六不守熟案蒸飯更泥謂之餾音與六相似也潜夫論曰夫梁飯食􅁏有好於面目不􅀂糲粢䔧蒸之可食於口也物理論曰忿㸑之未熟覆甑而弃之所害亦多矣西京雜記曰公孫弘起家徒歩爲丞相故人齊賀從之弘食以脫粟覆以布􅀍賀怨曰何用故人冨貴乎脫粟布􅀍我自有之弘大慙賀乃告人曰公孫弘内服貂蟬外衣麻枲内厨五鼎外膳二肴豈可以示天下哉於是朝廷自此疑矯焉弘聞之歎曰寧逢惡賔不逢故人風土記曰精浙米十取七八浙使香蒸而飯色乃紫紺於東流水飯食而洗除不祥通俗文曰飯臭曰沙入飯曰􅃤録異傳曰􅀽公路年十八常飯乳食蜜飯異苑曰衛士度苦行居士也其母常誦經曽出自齋空中下大鉢滿中香飯母分賦齊人皆七日不飢祢衡別傳曰劉表甞作上事極以爲快衡見之便滅投地曰作此筆者爲食飯不孟宗別傳曰宗爲光禄勲大㑹醉吐麥飯察者以聞詔問食麥飯意宗荅臣家足有米麥飯直愚臣所安是以食之孔衍在窮記曰彭城王送飯十斛􅁑仙公傳曰仙公與客對食吐口中飯盡成飛蜂良乆乃張口蜂皆飛還入口中成飯安成記曰安成郡毛亭二十里田疇膏􅃾厥稻馨香飯􅀂凝脂四王起事曰惠帝還洛陽路中作飲食宫人有持􅂛餘米飯者澆以供至尊丗􅀃曰葛公曽在武帝坐上食進飯曰此是勞薪炊也帝宻遣問外云實是故車脚時鏡新書曰歳暮家家具有肴蔌謂爲􅀫歳之儲以入新年也相聚酣歌名爲送歳留宿飯至新年十二則弃於街衢以爲去故取新除貧取冨陶朱公猗頓此事無輟又留此飯湏驚蟄雷鳴擲之屋上令雷聲逺焦贛易林曰南箕無舌飯多沙糖離騷曰精瓊靡以爲飯精鑿玉屑以爲飯也宋玉風賦曰主人之女爲臣炊彫胡之飯潘尼釣賦曰紅麵之飯精以菰梁五味道洽餘氣芬芳枚乗七發曰楚苗之食安胡之飯搏之不解一啜而散􅁊麟七􅀃曰香箕爲飯􅄂以粳菰散如細蚳􅅮似凝膚應璩薪詩曰竈下炊牛矢甑中莊豆飯孫子楚祀介子推祝文曰􅀥飯一盤王􅀕七釋曰西旅遊梁御􅀫素􅀕􅀲州紅麹叅糅相半軟滑膏潤入口流散傅選七誨曰孟冬香秔上秋膏梁彫胡菰子丹貝東牆濡潤細滑流澤芬芳飱釋名曰飱散也投飯於水中各散也通俗文曰水澆飯曰飱音孫春秋左氏傳曰晉公子重耳及曹曹共公聞其駢脅欲觀其祼薄而觀之薄迫也駢䝱合幹僖􅀒羈之妻曰吾觀晉公子之從者皆足以相國􅀂以相􅀂遂以爲傅相夫子必反其國反其國必得志於諸侯得志於諸侯而誅無禮曹其首也子盍早自貳焉自貳自別異於曹乃饋盤飱寘璧焉臣無境外之交故用盤藏壁飱中不欲令人見也公子受飱反璧又曰晉侯問原守於寺人勃鞮對曰昔趙衰以壷飱從徑餧而不食遂使處原韓子曰晉文岀亡箕鄭挈壷飱而從迷失道與公相失飢而道泣不敢食及公反國克原而使爲原之守曰夫經飢餧之患而必全壷飱是將不以原畔也渾軒聞而非日以不動壷飱之故其不以原畔不亦無術乎夫明主不恃其不我畔吾不可畔也不恃其不我畔恃吾不可欺也戰國䇿曰中山君走有二人隨其後曰臣父甞戯君下壷飱餔臣父故來死君也國語曰越王召范蠡而問焉曰諺有之諺俗之善語曰觥飯不及壷飱觥大也大飯盛饌也盛饌未具不能以虚待之不及壷飱之救飢疾也巳欲滅呉取快意得之而巳不能待有餘力又曰敵國賔至􅀜尹以告膳宰致飱熟食日飱廪人獻餼沈約宋書曰文帝爲王􅀇謨作四時詩曰粟飱充夏飡頋和與蔡謨書曰夏侯家言食漿酪飱猶勝於羹飯耳黍釋名曰􅁰汝也相黏汝也禮記曲禮上曰飯􅁰無以箸又曲禮下曰􅀕宗廟􅁰曰薌合論語微子曰文人止子路􅀫殺雞爲􅁰食之家語曰孔子侍坐於哀公賜之桃與􅁰孔子先食􅁰而後食桃左右皆掩口而􅀏公曰􅁰者所以雪桃非爲食之也孔子對曰丘知之矣夫黍者五榖之長也郊祀宗廟以爲上盛果属有六而桃爲其下􅀕祀不登郊廟丘聞之也君子以賤雪貴不聞以貴雪賤今以五􅂖之長雪果之下者是從上雪下也臣以爲妨於教害於義故不敢公曰善謝承後漢書曰范式與張元伯爲友春別京師以秋爲期至九月十五日殺雞爲􅁰言未絶而巨卿至魏畧曰沐並字德信名有志介嘗過姉姉爲殺雞爲􅁰而不留北齊書曰李士謙自以少􅀌未嘗飲酒食肉口無殺害之言親賔至輙陳罇爼對之危坐終日不倦李氏宗族豪盛毎春秋二社必髙㑹極宴無不沉醉􅁩亂甞集士謙所盛饌盈前而先爲設黍謂群從曰孔子稱黍爲五榖之長荀卿亦云食先黍稷古人所尚寕可違乎少長肅然無敢㢮惰退而相謂曰旣見君子方覺吾徒之不徳也又曰盧道䖍爲尚書㑹同寮於草屋下設雞黍之膳談者以爲髙幽明録曰漢武帝與近臣宴于未央殿噉黍臛也襄陽記曰司馬德操甞造龐德公值其渡􅃆上先人墓徑入上堂呼德公妻子使速作黍祢衡別傳曰黄祖在蒙衝舟賔客作黍臛衡得便自飽食不頋左右復􅅮弄以戯竹林七賢論曰阮咸兄子簡亦曠逹自居大䘮行過大雪寒凍遂詣浚儀令令爲他賔設黍臛簡又食之以致清議廢頓三十年孟子曰葛伯率其民要其有酒肉黍稻者而奪之有一童子以黍􅁏餉又殺而奪之淮南万畢術曰取冡墓黍啖兒不思母取新冢前祠黍用啖兒則不思母也風俗通曰今宴飲大㑹皆先黍臛盧諶􅀕法曰祠用白黍黄黍太平御覽卷第八百五十
