  text: 太平御覽卷第三百二十六
  hash: sha256:938604c29963b2b01be08226c7968098b2aec6bcf6a005feed511bb9de20966b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_326-1a}
body:
  text: 兵部五十七擒􅀗下虜掠擒􅀗下晉書載記曰劉曜光禄大夫游子逺與氐羗伊餘戰伊餘有驕色子逺候其無備夜誓衆蓐食晨大風震霧子逺曰天賛我也躬先士卒掃壁而出遲明覆之生擒伊餘悉俘其衆二石僞事曰劉曜躬領將士二十七萬衆大舉征勒勒飬子生爲衛將軍領三千人鎭洛金墉城曜攻生城不能下不覺勒軍卒至天曉曜軍當攻金城勒軍入正與曜軍相遇即交戰曜軍大破登時生擒曜身三十六國春秋曰丁亥中軍劉􅁉悉衆攻燕衆咸諌曰今徃亡日兵家所忌􅁉曰我徃􅀍亡吉孰大焉乃命悉登遂尅之燕王慕容超走追獲焉􅁉責之不降之罪超神色自􅀂無餘言唯以母託劉敬宣而巳蕭方等曰羙哉其言也以言必已親終不忘孝可謂人之將死其言也善信乎三國典略曰侯景晝息夜行追軍漸逼使謂慕容紹宗曰景􅀂􅀍擒公復何所用紹宗乃緩之又曰北齊平任城王湝音諧據兾州與廣寜王孝珩召募得四万餘人以拒我軍齊王憲率衆討之仍令太上主手書與湝曰朝廷遇緯甚厚諸王無恙叔􅀂釋甲則無所憂湝不納及大開賞募多出金帛沙門求爲戰者亦數千人候􅀐執湝間諜二人以白于憲乃集齊之舊將遍示之曰吾所争者大不在汝等今放還可即充我使乃與湝書曰一木不維大厦三諌可以逃身微子去啇侯服周代項伯背楚賜姓漢朝兵交命使古今通典不俟終日所望知機湝得書沉之于井憲至信都湝陣於城南憲登張耳冢以望之俄而湝領軍尉相願遂以衆降湝大怒殺其妻子明曰復戰憲遂破之俘斬三萬人湝􅀍擒見憲不拜呼之爲弟北史曰後魏元遥遷左光禄大夫仍領護軍時兾州沙門法慶旣爲妖幻遂􅀃㴾海人李歸伯合家從之歸伯招率郷人推法慶爲王法慶以歸伯爲十住菩薩平魔軍司定漢王自号大乗殺一人者爲一住菩薩殺十人者爲十住菩薩又合狂藥令人服之父子兄弟不相知識唯以殺害爲事於是聚衆殺阜城令破渤海郡殺害吏人刺史蕭寳京遣兼長史崔伯驎討之敗於煑􅀥城伯驎戰没㐫衆遂盛所在屠滅寺舎斬戮尼僧樊燒經像云新佛出丗除去衆魔詔以遥爲使持節督北征諸軍事率歩􅀐十万以討之法慶相率攻遥遥並擊破之遥遣輔國將軍張虬等擒法慶并尼惠暉等斬之傳首京師後擒歸伯戮於都市後周書曰裴寛與東魏將彭樂恂戰於新城因傷􅀍擒至河隂見齊文襄寛舉止詳於占對文襄甚賞異之謂寛司卿三河冠盖材識如此我必使卿富貴􅀜中貧狹何足可依勿懷異圖也因解鎻付館厚加其禮寛乃裁所卧氊夜縱縋而出因得遁還見於太祖太祖頋謂諸公曰􅀍堅執銳或有其人疾風勁草歳寒方驗裴寛爲髙澄如此厚遇乃能冒死歸我雖古之竹帛所載何以加之又曰太祖時梁元帝遣使請舊圖以定疆界又連結於齊言辭悖慢太祖曰古人有言天之所弃誰能興之其蕭繹之謂乎冬十月壬戍遣柱國于謹中山公護大將軍楊忠韋孝寛等歩􅀐五萬討之十一月癸未師濟於漢中公護與楊忠率銳􅀐先屯其城下據江津以備其逸甲申謹至江陵列營圍守辛亥進攻城其日克之擒梁元帝殺之并虜其百官及士民以歸没爲奴婢者十餘萬其免者二百餘􅃁立蕭􅊫爲梁主居江陵爲魏附庸又曰侯莫陳崇隨賀拔岳征討以功除建威將軍從岳入􅀜破萬俟醜奴崇與輕􅀐逐北至涇長坈及之賊未成列崇單􅀐入賊中於馬上生擒醜奴於是大呼衆悉披靡莫敢當之後􅀐集遂破之岳以醜奴所乗馬及寳劒金帶賞之又曰李廣㑹稽人早事􅊫以敢勇聞汑口之役先􅊫力戰及華皎軍敗爲呉明徹所擒將降之廣辭色不屈遂􅀍害又曰柳檜除魏興華陽二郡守安康人黄衆寳謀反連結黨與將圍州城乃相謂曰常聞柳君勇悍其鋒不可當今旣在外方爲吾徒膓心之病也不如先擊之遂圍檜郡郡城卑下士衆寡弱人無守御之備連戰積十餘日士卒僅有存者於是力屈城䧟身􅀍十數瘡遂爲賊所獲旣而衆寳等進圍東梁州乃􅅞檜置城下欲令誘􅀃城中檜乃大呼曰群賊烏合粮食巳罄行即退散各冝勉之衆寳大怒乃臨檜以兵曰速更汝辭不尓便就戮矣檜守節不變遂害之弃屍水中人皆爲之流涕隋書曰漢王諒之作亂也煬帝將發幽州兵以討之時竇杭爲幽州惣管帝恐其有貳心問可任者於楊素素進李子雄授上大將軍拜廣州刺史馳至幽州止傳舎召募得千餘人杭恃素貴不時相見子雄遣人諭之後二日抗從鐵􅀐二千來詣子雄所子雄伏甲請與相見因擒抗遂發幽州兵歩􅀐三万自陘以討諒時諒遣大將軍劉建略地燕趙正攻井陘相遇於抱犢山下力戰破之遷幽州惣管又曰獨􅀌揩字脩則不知何許人也夲姓李氏父屯從齊神武帝與周師戰于沙苑齊師敗績因爲柱國獨􅀌信所擒配爲士伍給使信家漸得親近因賜姓獨􅀌氏揩少謹厚便弄馬槊爲宇文護執刀累轉車􅀐將軍其後數從征伐賜爵廣阿縣公邑千戸唐書曰長平王叔良遣驃􅀐劉感擊薛仁果却爲所敗感殁於賊感不知何許人初以夲官鎭涇州爲仁果所圍感拒戰乆之城中糧盡無可食感殺馬以分士卒感一無所噉唯煑馬骨取汁和木屑而自食之城垂䧟者數矣㑹長平王叔良援兵至仁果解去感與叔良復出戰因爲賊所擒又曰王行敏鎭潞州劉黒闥來攻行敏自歷亭出兵拒戰擊賊破之旣而憇於野不設備賊知而掩之左右皆遁因爲黒闥所擒竟不拜黒闥怒斬之臨死西向而言曰行敏大唐忠臣也願陛下知之髙祖聞而痛惜焉又曰劉丗讓檢校并州惣管時突厥可汗遣俱儉特勤以所部千人居我并州甚爲民患前惣管李仲文不能制丗讓到官以計擒之馳使以聞髙祖大恱嘉歎乆之又曰姜寳􅁩武德初拜武衛大將軍㝷爲井􅃏將軍劉武周將黃子英住來崔䑕谷髙祖令寳􅁩擊之子英數以輕兵挑戰寳􅁩兵􅂊接子英輕遁如此者再三寳􅁩悉衆以逐之伏兵發軍遂大敗寳􅁩爲賊所擒後得逃歸至是與斐寂拒宋金對戰始合寂弃軍而走兵遂大潰寳􅁩復爲賊所擒髙祖􅀄聞其没也泣曰寳􅁩烈士必不生降賜其家物千叚米三百石寳􅁩後謀背賊事􅂥遇害臨死西向大言曰臣無狀􅀒陛下􅀍屠潰是所甘心但敗軍䘮師九泉所恨及賊退髙祖遣使迎其柩謚曰剛又曰􅁪州節度李寳臣使人謂朱滔曰吾聞未公皃如神安得而識之願因繢事以觀可乎滔乃圖其形以示之錦衣金鈎甚偉寳臣懸於射堂命諸將熟視之曰朱公信神人也他日滔出獵寳臣宻選精卒劫之戒其將曰取彼貌如射堂所懸者是時二軍方共事不相虞而卒變􅁀至滔駭然與戰於瓦橋適衣他服以不識免又曰蔡州賊將呉秀琳以文城柵兵三千降李愬愬從秀琳於新興柵遂以琳之衆攻呉房夏四月庚寅朔辛夘李愬奏師至嵖岈山擒賊將柳丗于李湊等二人李光顔敗元濟之衆三萬於郾城其將張伯良奔于蔡州殺其卒十二三􅀗馬千餘疋器甲三萬其甲上悉􅀞作雷公符北斗星文又云速破城北軍急急如律令周史曰皇甫暉正陽敗入保滁州太祖皇帝麾兵渉水踰城而入盡戮其黨生擒暉及其僞命都監姚鳯等送于行在丗宗召見之暉曰臣力備矣欲暫坐及坐又曰臣欲暫卧不俟命而卧神色自􅀂丗宗亦復容之乃言曰臣非不盡忠於本國實以甲兵勇怯不敵臣早事晉朝累將兵與契丹相持未如大朝此日甲馬之盛昨者退守滁州不謂天兵便能踰城攻取如履平地臣力所不加故就擒耳因盛稱太祖之武勇丗宗命釋之賜衣服帶鞍馬後數日暉以金瘡㝷卒于洛陽暉本驍將唐莊宗之基業因暉而敗焉故暉有名於天下虜掠左傳曰鄭􅀕足帥師取温之麥秋又取成周之禾後漢書曰馮異謂苗萌曰今諸將皆壯士屈起多􅁀横獨有劉將軍所到不虜掠觀其言語舉止非庸人也可以歸身苗萌曰死生同命敬從子計又曰郅惲至廬江因遇積弩將軍􅀓俊東徇楊州俊素聞惲名乃禮請上之上爲將兵長史授以軍政惲乃誓衆曰無掩人不備窮人於厄不得斷人支體祼人形骸放􅁋婦女俊軍士猶發冢陳户掠奪百姓惲諌俊曰昔文王不忍露白骨武王不以天下易一人之命吕氏春秋曰武王伐紂至鮪水紂使膠鬲候周問武王曰何日至武王曰將以甲子日至膠鬲行天大雨曰夜不休武王疾行不輟軍吏諌之武王曰吾疾行以救膠鬲之死也故能獲天地之應尅啇如林之旅天地之應謂夜雨止畢陳白魚入舟之􅀋尅勝也啇殷號也於旅衆也如林言衆多尚書曰武王伐紂紨率其旅􅀂林㑹於牧野將軍如何不師法文王而犯逆天地之禁多傷人害物虐及枯尸取罪神明今不謝天改政無以全命願將軍親率士卒収傷葬死哭所殘􅁀以明非將軍本意也從之百姓恱服所向皆下􅀳書曰官人孟􅅼弟超並爲成都王頴所嬖寵超領萬人爲小都督未戰縱兵大掠陸機録其主者超將鐵􅀐百餘人直入機麾下奪之頋謂機曰貉奴能作督不機司馬孫極勸機殺之機不能用超宣言於衆曰陸機將反又曰惠帝末妖賊劉栢根起於東萊王弥率家僮從之栢根死亡入長廣山爲群盗弥多權略凡有所掠必預圗成敗舉無遺䇿弓馬迅捷膂力過人青土號爲飛豹十六國春秋曰南凉秃髮傉檀伐北涼沮渠􅂪遜於姑臧至畨禾苕藋苕徙聊切藋徒弔切掠五千餘户其將窟古進曰陛下轉戰千里前無完陣徙户資財盈溢衢路冝倍道遊師早度峻嶮􅂪遊善於用兵士衆習戰􅀂輕軍卒至出吾不慮大敵外逼徙户内攻危道也衛尉伊力延曰我軍勢方盛將士勇氣自倍彼徒我􅀐勢不相及􅀂倍道遊師必􅂢棄資財示人以弱非計也俄而昬霧風雨􅂪遊軍大至傉檀大敗而還三國典略曰齊主以契丹犯塞親征至于平州取其西道直指長漸司徒潘相樂率精􅀐五千自東道趣青山向白狼城安德王韓䡄率精􅀐四千断其走路追奔至于遼水齊主露髮􅃝身晝夜不息行千餘里唯食􅁏飲水壯氣弥厲親踰山嶺爲士卒先指揮􅁬擊大破之虜獲十萬餘口後魏書曰濟隂王新城頗有武略庫莫奚侵擾詔新城率衆討之新城乃多爲毒酒賊漸逼便弃營而去賊至喜而競飲聊無所備遂簡輕􅀐因醉縱擊俘馘甚多又曰天水梁㑹守東城謀欲逃遁先是封勑文掘重塹於東城之外斷賊走路夜中㑹乃陣飛梯騰塹而走勑文先嚴兵於塹外拒􅋐從夜至旦勑文謀於衆曰困獸猶􅋐而況於人賊衆知無生路人自致死必傷士衆未易可平􅀂開其生路賊必上下離心尅之易矣衆咸以爲然勑文以白虎幡宣告賊衆曰􅀂能歸降原其生命應時降者六百餘人㑹知人心沮壞於是分遁勑文縱􅀐騰躡死者太半俘獲四千五百餘口後周書曰賀㧞岳副尓朱天光討万侯醜奴時醜奴自率大衆圍歧州遣行臺尉遟菩薩等向武功南渡渭水天光望岳率􅀐赴之岳身先率擊之退走岳号令部賊下馬者皆不聽殺賊頋見之便悉投馬俄而虜獲三千餘人人馬無遺遂擒菩薩降卒万餘並収其輜重醜奴弃歧州走安定平亭隋書曰南寜夷㸑翫來降拜昆州刺史旣而復叛遂以史萬歳爲行軍惣管率衆擊之入自蜻音精蛉音靈川經弄㨂次小勃弄大勃弄至于南中賊前猿屯據要害万歳皆擊破之行數百里見諸葛亮紀功碑銘其皆曰万歳之後勝我者過此万歳令左右倒其碑而進渡西二河入渠濫川行千餘里破其三十餘部虜獲男女二万餘口諸夷大懼遣使請降獻明珠徑寸於是勒羙隨德万歳遣使馳奏請將翫入朝詔許之又曰逹奚長儒與鳥九􅁤圍陳將呉明徹於吕梁陳遣驍將劉景率勁勇七千來爲聲援􅁤令長儒逆拒之長儒於是取車輪數百擊以大石沉之清水連轂相次以待景軍至舡艦礙輪不得進長儒乃縱竒兵水陸俱發大取之俘數千人又曰周法尚初仕陳背陳歸周陳將樊猛濟江討之法尚遣部曲督韓㓪詐爲背已奔于陳僞告猛曰法尚部兵不願降人皆􅀼議盡欲叛還􅀂得來軍必無􅋐者自當於陣倒戈耳猛以爲然引師急進法尚乃佯爲畏懼自保於江曲猛陳兵挑戰法尚先伏輕舸於浦中又伏精銳於古村之北自張旗幟迎流拒之戰數合僞退登岸投古村猛捨舟逐之法尚又疾走行數里與村北軍合復前擊猛猛退走舡旣而浦中伏舸取其舟擑建周旗幟猛於是大敗僅以身免虜八千人太平御覽卷第三百二十六
