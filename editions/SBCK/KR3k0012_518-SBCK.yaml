front:
  text: 太平御覽卷第五百一十八
  hash: sha256:7f267c4e49f98c746f2c8b3a31b41d7a77d6234cd2557409afc70513f01ae878
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_518-1a}
body:
  text: 宗親部八子易蠱卦曰幹父之蠱有子考無咎厲終吉又家人卦曰家人嗃嗃悔厲􅁻父子嘻嘻終吝儀禮曰父爲長子服三年何也正禮乎上又所重也禮記内則曰由命士以上父子皆異宫又􅀕義曰身也者父母之遺體也行父母之遺體敢不敬乎左傳隱公曰衛莊公之子州吁有寵而好兵公弗禁石碏諌曰臣聞愛子教之以義方不納於邪又宣上曰楚司馬子良生子越椒子文曰必殺之是子也熊虎之狀而豺狼之聲不殺必㓕􅀂敖氏矣論語曰陳亢問於伯魚曰子亦有異聞乎對曰甞獨立鯉趍而過庭曰學詩乎對曰未也曰不學詩無以言他曰又獨立鯉趍而過庭曰學禮乎對曰未也不學禮無以立鯉退而學禮陳亢退而喜曰問一得三聞詩聞禮又聞君子之逺其子也孝經曰父子之道天性也周書曰周公三撻伯禽徃見啇子啇子曰南山有橋父道也北山有梓子道也盍徃觀之而伯禽徃視橋梓明日朝伯禽俯而趍周公迎而撫之曰汝安見君子哉史記曰吴起衛人好用兵甞學於曽子事魯君出衛郭門與其母決囓臂而盟曰起不爲卿相不復入衛也又曰司馬談爲太史天子建漢家之封而太史公留滯周南不得從事發憤而卒子遷適見父於河洛之間太史公執遷手下泣曰其先即周之太吏後丗中衰絶於余乎汝後爲太史則續吾祖矣漢書曰張湯杜陵人父爲長安丞父出湯爲兒守舎遭䑕盗肉父還怒之笞湯湯掘地薫䑕得餘肉劾䑕掠治訊鞠鞫論報取䑕磔堂下父忽視其文辭如老吏大驚異遂使書獄焉又曰王遵字子貢􅃰人遷益州刺史先是王陽爲益州至卭崍九折坂歎曰奉先人遺體奈何數乗此險後以疾去及遵至此坂問吏曰此非王陽所畏道耶吏曰是遵叱其馭曰駈之王陽爲孝子王遵爲忠臣又曰曹參代蕭何爲相國日夜飲酒子窋爲中大夫惠帝怪之令窋言曰無以請事何以憂夭下窋洗沐歸具言參怒之乃笞二百曰趣入侍天下事非汝所當言又曰路温舒字長君鉅鹿人父爲里門􅁥使温舒牧羊因取澤中蒲截爲牒編之冩書又曰楊雄蜀人自楊季至雄五代一子也又曰韋賢字長孺魯人質朴少欲篤志於學通詩書易以教授號鄒魯大儒爲丞相薨少子玄成字少翁以明經歴位丞相故鄒魯諺曰遺子黄金滿籯不如教之一經又曰張禹字子文河内軹人父徙家蓮勺禹爲小兒數至市卜相者竒其面貌謂禹父曰此兒多智可令經學矣又曰踈廣字仲翁東海蘭陵人也明春秋爲太子太傳知止足與兄子受上䟽乞骸骨上賜黄金二十斤太子贈五十斤歸郷里請故舊賔客爲樂歳餘子孫􅀼謂昆弟老人勸􅀃買田宅廣曰吾豈不念子孫哉顧有田廬足供衣食令更増益以爲盈餘教子孫怠惰耳賢而多財損其志愚而多財益以爲其過冨者衆人怨也吾旣無教化於子孫不欲益生於怨也又曰朱邑字仲卿廬江人少時爲桐郷嗇夫病且死嘱其子曰我爲桐郷吏其民愛我死必葬之後丗子孫奉祀我不如桐郷死且葬之民爲起􅃁祠又曰石􅁬從髙祖至景帝時爲九卿子等四人官至二千石景帝尊寵號爲萬石君以上大夫禄歸老子家子孫有過不誚讓便對按不食後漢書曰馮勤字偉伯魏郡人曽祖楊宣帝時爲弘農太守有子八人皆爲二千石魏趙間號爲萬石君又曰周華字宣光汝南人子勰字巨勝自曽祖楊至勰孫恂六代一子皆知名又曰吴祐字季英陳留人父恢爲南海太守祐年十二隨父到官恢欲殺青簡竹以冩書祐諌曰今大人踰越五嶺逺在海濱其俗誠陋舊多珍怪上爲國家所疑下爲權威所望此書􅀂成即載之而歸昔馬援以薏苡興謗王陽以衣囊徼名嫌疑之間先賢所慎恢竒之乃撫其首曰吴氏丗不乏季子矣又曰崔烈􅃰郡人靈帝開鴻都門牓賣官爵烈入錢五百萬得爲司徒及拜曰天子臨軒百寮畢㑹帝欣謂親幸曰悔不至三公後聲譽日滅烈不自安問子鈞曰吾爲三公於議何如鈞曰嫌大人銅臭烈舉杖擊之鈞時爲虎賁中郎服虎并載鶡尾狼狽而走烈罵曰死卒父撾而走豈孝乎鈞曰舜之事父也小杖受大杖走此恐䧟父於不義非不孝也烈慙而讓官魏志曰張廣字嗣宗魯第二子也魯雅爲魏武所寵諸子未勝纓並遣中使拜授官爵南鄭城碑曰位尊上將體極人臣五子十室榮並爵均童年嬰稚抱拜王人命婚帝族或尚或嬪又曰胡威字伯庸父質操厲清白爲荆州太守威至荆州省之十餘日歸質賜絹一疋威跪問曰大人清髙何得此物質曰俸禄之餘耳武帝問威曰卿清何如父清威曰臣不如父逺矣帝曰何對曰父清畏人知臣清畏人不知是以不如也又曰賈充字公閭父逵晚生充言充後當有充閭之度故名充字公閭又曰羊祜字叔子年數歲令乳母取所棄金鐶乳母曰汝先無此物祜即指隣人李氏東垣桑樹中探得之主人驚曰此吾亡兒所失物色時人謂祜前身爲李氏之子又曰華嶠字叔駿才學深􅀶爲祕書􅁥性􅄝酒率常沉醉撰漢記九十七卷其十典未成而終祕書􅁥何邵奏嶠子徹爲佐著作續成之亦未竟而卒又曰王隱字處叔陳人丗寒素父銓歴陽令有著述志每私録晉事及功臣行􅃺未就而卒隱儒素自守不交權貴􅀶學多聞受遺業爲著作郎令撰晉史又曰孫盛字安國次子放字齊莊㓜稱令惠年七八􅀊在荆州與父俱從􅁃亮出獵亮謂曰君亦來耶放應聲荅曰無小無大從公于邁亮曰欲齊何莊放曰齊莊周亮曰不慕仲尼耶放曰仲尼生而知之者非所企及亮大竒之曰王輔嗣不過也又曰􅁃翼字稚㳟孫盛字安國翼子愛客常候孫盛盛不在見盛子放謂之曰安國何在放曰徃􅁃稚恭家愛客曰孫氏大盛有兒如此放曰不如諸􅁃之翼翼旣而語人曰我固得重呼奴公字又曰􅀽宏爲東征賦並列過江諸名德獨不載桓彛其子温怒焉宏一時之文宗爲文不欲令人顯問時並遊青山飲歸温命宏同載因問曰君作東征賦何獨不及家君宏對曰尊公稱謂非下官敢專旣未遑啓不敢顯之温疑其不實乃曰欲謂何宏曰風􅁥散朗或捜或引身雖可亡道則不殞宣城之節信而爲允也温泫然而止又不及陶侃子胡奴甞於曲室抽刀逼問宏曰家君勲績如此云何相志宏急荅曰精明百錬在割能断功以濟時職以静亂長沙之勲爲史所讃胡奴乃止又曰謝尚字祖仁豫章太守鯤之子也八歳神晤夙成鯤嘗携之或曰此兒一座顔回也尚應聲曰座無尼父誰識顔回一席之賔莫不驚異又曰王述字懷祖遷尚書僕射􅄒毎受職不爲虚讓其子坦之諌曰故事應讓􅄒曰汝爲我不堪也坦之曰非也克讓自美耳述曰旣云堪何爲復譲也坦之爲􅁊温府長史温子欲求婚于王因坦之言其父坦之乃還家省父而􅄒愛坦之雖長大猶抱之於膝上坦之乃言婚事於􅄒大怒遽推坦之於􅂰下曰汝竟癡也詎可視面以妻兵乃止又曰阮籍謂王渾曰濬仲清賞非卿倫也共卿言不如共阿戎談及戎子邁有美名少而肥大戎曰令食糠轉益肥也又曰王祥二子烈芬並知名爲祥所重愛同時而病將士遺嘱烈欲還葬舊􅁟芬欲留葬京邑祥涕泣曰不忘郷仁也不戀夲逹也唯仁與逹二子有焉又曰王衍䘮㓜子山簡弟之衍悲不自勝簡曰孩抱中物何至於此衍曰聖人忘情下人不及情情之所鍾正在吾輩也簡服其言更爲之慟又曰魏舒字陽元爲司徒子混字延廣有才行爲太子舎人年二十七卒朝野咸爲舒惜舒每哀慟退而歎曰吾不及莊生逺矣豈以無益自損更不復哭又曰胡母輔之字彦國􅄝酒子謙之字子光才學不及父而傲縱過之至酣醉時甞自呼其父字輔之不以介意丗以爲狂又曰石崇字季倫渤海南皮人苞之少子也生於青州故小名齊奴少敏惠勇而有謀父苞臨終分財與諸子獨不及倫其母爲言之苞曰此兒雖小後自能致又曰郄超字景興一字嘉賔父愔爲司徒愔事道超奉佛愔又好聚積錢數千萬甞開庫任超所取超性好施一日之中散與親故都盡桓温辟爲征西大將軍􅁺温懷不軌超爲之謀轉司徒左長史而卒􅀄雖黨桓氏以愔忠於王室不䡄之事不令愔知將亡出一箱書付門生曰夲欲焚之恐公年老老必傷􅉖爲􅁦我亡後􅀂大損寢食可呈此箱不爾即便焚之愔後果哀悼成病門生依旨呈之則悉與温徃反宻計悉見愔於是大怒曰小子死恨晚矣更不復哭又曰􅁃冰字季堅都督江荆七郡軍事子襲常貸官絹一疋冰怒捶之市絹十疋還官又曰王濛字仲祖父汭字文開爲淦令美容姿甞覽鏡自照稱其父字曰王文開生如此兒又曰王導字茂弘子恱字長豫弱冠有髙名事親色飬導甚愛之常與恱弈碁争道導􅀏曰想與有􅀲􅁑郍得爾耶導性儉悵下甘果爛敗令棄之云勿使大郎知恱爲中書郎先導卒導先夢人以百萬錢買恱潜爲祈禱者備矣㝷掘地得錢百萬意甚􅁖之一一皆藏閉及恱疾篤導憂念時至不食積日忽見一人形狀甚偉􅀍甲持刀導問是何人曰僕蔣侯也公兒不佳欲爲請命故來耳導因求之食至數斗食畢謂導曰中書命盡非可救也言訖不見恱亦殞絶又曰劉殷字長盛新興人有子七人五人各授一經其一子授太史公記一子授漢書一門之内七業俱興北州之學殷㝡爲盛門又曰索靖子琳字巨秀少有逸群之才靖每曰琳宗廟之器非簡札之用州縣之任不足汚吾兒也又曰戴􅀂思廣陵人父昌㑹稽太守􅀂思徃武陵時郡人潘京素有理筌識鍳父遣􅀂思與語潘稱􅀂思有公輔之才又曰王獻之字子敬羲之子也謝安甚欽之請爲長史因問獻之曰君書何如家君荅曰固不同安曰外論不爾對曰人郍得知獻之甞書羲之自後掣其筆不得歎曰此兒當有大名又以掃箒霑􅅺書大字方一丈甚以爲工宋書曰戴顒字仲􅀂淮南人父逵喜琴顒及兄勃並受琴於父父殁所傳之聲不忍復奏各造新弄五部顒又製長弄一部並傳於丗齊書曰丗祖常問王儉當今誰能作五言詩對曰謝朏得父之膏􅃾梁書曰謝朏祖弘微宋太常卿父莊齊光禄朏十􅀊能属文莊多遊山水賦詩使朏命篇覽筆便就王京文謂莊曰賢子足稱神童莊􅀏曰眞吾家千金又曰王僧孺父延年加爲常侍孺五歳父友饋延年柰者先與僧孺孺曰大人未見不敢先甞不受之又曰栁惲字文暢父丗隆善彈琴爲士流第一惲毎奏其聲甞感傷憂思後因之變體冩古曲家語曰吴延陵季子聘于上國其長子死葬於嬴􅀶之間歛以時服其坎深不至泉其髙可隱孔子曰延陵季子之合於禮者也列子曰魏人有東門吴者年四十有一子䘮之而不憂其相室曰公之愛子也天下無有今子死不憂何也東門吴曰吾甞無子之時不憂今子死乃與向無子同又奚憂焉吕氏春秋曰晉平公問祈黄羊曰國無尉其誰可乃云其子年君子聞之曰祁黄羊可謂至公矣三輔要録曰韋康字元將京兆人孔融與康父端書曰前見元將來淵才亮茂雅度弘毅偉丗之器也昨曰又見仲將來懿性貞實文敏志篤誠保家之主也不意􅀟珠出于老蚌郭子曰楊脩字德祖九歳聦惠孔文舉詣其父父不在乃呼脩脩爲設果果有楊梅融指示兒曰此君之家果耶脩應聲曰未聞孔雀是夫子之家禽獸姓氏英賢録曰宋顔竣字士遜少有令名太祖問其父延之曰諸子誰有卿風延之曰峻得臣筆測得臣文夐得臣義濯得臣酒丗􅀃曰豫章太守顧邵雍之子也在郡卒雍時盛集賔客自與客碁而信至無兒書雖神色不變而心了其故以􅀲搯掌流血沾􅁭客散方歎巳無延陵之髙豈有䘮明之痛於是豁然神氣自􅀂又曰客有問陳季方曰足下家君有何功德而荷天下重名季方曰吾家君譬如桂􅀣生於太山之阿上有萬仞之髙下有不測之淵上爲甘露所沾下有淵泉所潤當此之時焉知太山之髙淵泉之深不知有功德與無也太平御覽卷第五百一十八
