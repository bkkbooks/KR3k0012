front:
  text: 太平御覽卷第九百八十八
  hash: sha256:f2d4c4bdf460f965fb3c44b437adc23349d8718f0384b21fabe6b278a8acd2b9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_988-1a}
body:
  text: 藥部五石藥下禽獸藥附餘粮消石芒消朴消雄黄雌黄磁石石膏滑石礬石曽青空青白青扁青長石冷石石宻玉泉水銀决明赭代赭附白堊鹵鹹龍骨角齒附牛黄阿膠海蛤犀角靈羊角鹿茸鹿脂鴈肪䳒頭并尾餘粮列仙傳曰赤斧者巴戎人爲碧祠主簿能錬丹與消石服之三十年身反童子髮毛皆赤數十年上華山取禹餘粮餌之手中長有赤斧􅀶物志曰扶海洲上有草焉名曰蒒音師草其實食之如大麦從七月稔熟民歛至冬乃訖名自然穀或曰禹餘粮今藥中有禹餘粮者丗傳昔禹治水弃其所餘食於江中而爲藥也􅀶物志曰地有蓼名則禹餘粮生亦有蓼名無者矣范子計然曰禹餘粮出河東本草經曰太一禹餘粮一名石腦味甘平生山谷治欬逆上氣癓瘕血閇漏下除邪乆服能忍寒暑不飢輕身飛行千里神仙生太山又曰禹餘粮味甘寒生池澤治欬逆寒熱煩滿下利赤白血閇癓􅛎大熱乆服輕身生東海吴氏本草經曰太一禹餘粮一名禹哀神農歧伯雷公甘平季氏小寒扁鵲甘無毒生太山上有甲甲中有白白中有黄如鷄子黄色九月採或無時消石吴氏本草經曰消石神農苦扁鵲甘范子計然曰消石出隴道芒消本草經曰消石一名芒消味酸苦寒生山谷治五藏積􅀬生益州朴消本草經曰朴消味苦寒生山谷治百病除寒􅀬邪氣除六府積聚結癖山谷之隂有鹹苦之水􅃺如芒消而麄能化七十二種石練餌服之輕身神仙生益州吴氏本草曰朴消石神農歧伯雷公無毒生益州或山隂入土千歳不變練之不成不可服雄黄玄中記曰貟丘之上多大蛇以雄黄精厭之水經曰黄水出零陽縣西北連巫山溪出雄黄頗有神異採常以冬月􅀕祀鑿石深數丈方得故溪水取名焉淮南萬畢術曰夜焼雄黄水虫成列水虫聞燒雄黄臰氣皆趣火吴氏本草曰雄黄神農苦山隂有丹雄黄生山之陽故曰雄是丹之雄所以名雄黄也雌黄吴越春秋曰太官舎春由君所造殿後殿名逃夏宫春申子假君宫也數失火因塗雌黄故曰黄堂臨海水土物志曰丹山草木赫然盡彤雌黄所産煒煌内含竒寳外發英光昔􅀠交部今則南康典術曰天地之寳藏於中極命曰雌黃雌黃千年化爲雄黄雄黄千年化爲黄金本草經曰雌黄石金味辛平生山谷治身癢諸毒磁石王隱晉書曰馬隆擊凉州以磁石累道側賊􅀒䥫鎧不得過以爲神吕氏春秋曰磁石召䥫或引之也石䥫之母也石之不慈者亦不能引之也抱朴子曰五石者丹沙雄黄白礬石曽青磁石也一石轉五轉而各成五色五石合爲二十五色南州異物志曰漲海﨑頭水淺而多磁石外徼人乗大舶皆以䥫鐷鐷之至此􅀜以磁石不得過淮南萬畢術曰磁石拒碁取雞血與作針折磨鐵擣之以和磁石日塗碁頭曝乾之置局上即相拒不休又曰磁石懸入井亡人自歸取亡人衣帶褁碰石懸井中亡人自歸本草經曰磁石一名􅀇石味辛寒生川谷吴氏本草曰磁石一名磁君石膏廣州記曰彰平縣有石膏山望之皎若霜雪本草經曰石膏味辛微寒生山谷治心下逆驚喘口乾焦不能息滑石南越志曰膋音寮城縣是出膋石膋石即滑石也土人以爲燒器以用烹魚本草經曰滑石味苦寒生山谷治身熱泄癖生􅁄陽范子計然曰滑石白滑者善礬石本草經曰礬石一名羽砠􅅺結切味鹹酸寒生山谷治寒􅀬泄痢惡瘡目痛堅骨錬餌乆服輕身不老生河西盛弘之荆州記曰建平出礬石范子計然曰礬石出武都吴氏本草曰礬石一名羽砠一名羽澤神農歧伯酸扁鵲鹹雷公酸無毒生河西或隴西或武都石門採無時歧伯乆服傷人骨曽青衡山記曰衡山有曽青崗曽青可合仙藥淮南萬畢術曰取曽青十斤燒之以水灌其地雲起如山雲矣曽青爲藥令人不老本草經曰曽青生蜀郡名山其山有銅者曽青出其陽青者銅之精能化金銅空青江乗地記曰樵採者甞於山上得空青此山三朝出雲􅀨必降民以爲常占范子計然曰空青曽青岀巴都白青又出巴郡盧青出弘農豫章本草經曰空青味甘寒生山谷明目乆服輕身延年能化銅鈆作金生益州吴氏本草曰空青神農甘一經酸乆服有神仙玉女來侍使人志髙白青本草經曰白青味甘平生山谷明目利九竅耳聾殺諸毒之蟲乆服通神明輕身延年岀豫章范子計然曰白青出白郡吴氏本草曰神農甘平雷公鹹無毒生豫章可消爲銅淮南萬畢術曰白青得鐡即化爲銅取折石白青分等治台鐵即成銅矣扁青本草經曰扁青味甘平生山谷治目痛明目辟毒利精神乆服輕身不老生朱崖吴氏本草經曰扁青神農雷公小寒無毒生蜀郡治明目癕腫風痺丈夫内絶令人有子乆服輕身長石本草經曰長石一名方石味辛治身熱吴氏本草曰長石一名方石一名直石生長子山理如馬齒潤澤玉色長服不飢冷石吴録地理志曰鬰林布山縣多虺其毒殺人有冷石可以解之石色赤黒味苦屑此石著創并以切齒立􅂫一名􅀼齒石見大康地記也石􅁡神仙傳曰羡門止中岳飡石􅁡紫梁西京􅄂記曰閩越王獻髙祖石􅁡二斛本草經曰石􅁡一名石飴味甘平生山谷治心邪安五藏益氣􅀘中止痛解毒乆服輕身不老生武都吴氏本草曰石􅁡神農雷公甘氣平生河原或河梁玉泉本草經曰玉泉一名玉澧味甘平生山谷治藏百病柔筋強骨安魂長肌􅁏乆服能忍寒暑不飢渴不老神仙人臨死服五斤死三年色不變生藍田吴氏本草曰玉泉一名玉屑神農歧伯雷公甘季氏平畏冬華惡青竹水銀廣雅曰水銀之􅜐音紅董切淮南萬畢術曰朱沙爲􅜐本草經曰水銀味辛寒無毒决明本草經曰石决明味酸草决明味鹹理自珠精吴氏本草曰决明子一名草决明一名羊明赭代赭附􅀃文曰赭赤土也山海經曰胞山灌水之中有流赭以塗牛馬無病郭璞注曰赭赤土也今多以朱塗牛角云辟惡又曰少陽山之中多美赭南方草物狀曰赤土岀踊山下在石中採好色赤者雜丹中朱􅃮器范子計然曰石赭岀齊郡赤色者善蜀赭岀蜀郡本草經曰代赭一名血師好者􅃺如雞肝白堊音􅁖山海經曰慈聾之山其中有太谷是多白堊黒青黄堊范子計然曰青堊岀三輔本草經曰白堊即白善土也生邯鄲鹵鹹本草經曰鹵鹹一名寒石味苦治大熱消渴狂煩戎塩主明目益氣去毒蟲大鹽一名胡鹽令人吐主膓胃結熱禽獸藥附龍骨角齒附史記曰穿渠自微引洛水至啇顔服䖍曰顔音崖應劭曰微在馮翊或曰啇顔山名穿梁得龍骨故名龍首渠盛弘之荆州記曰始安駭鹿山室鑿室内輙得龍骨下有伏滔范子計然曰龍骨出河東本草經曰龍骨味甘平山谷治心腹鬼疰生晉地華陽國志曰蜀五城縣其上值天門天門龍升天不逹死墜此地故掘取龍骨冬夏無已吴氏本草經曰龍骨生晉地山谷隂大水所過處是死龍骨色青白者善十二月採或無時龍角畏乾􅃮蜀椒理石龍齒神農季氏大寒龍齒治驚癎乆服輕身牛黄文士傳曰延篤爲京兆尹桓帝時梁兾專政時皇太子疾詔書發京兆出牛黄兾遣諸生齎書持牛黄詣篤賣篤以爲詐論殺之本草經曰牛黄味苦生隴西平澤特牛膽中治驚寒熱生晉地吴氏本草經曰牛黄牛出入鳴吼者有之夜視有光走牛角中死其膽中如雞予黄阿膠東水經曰東阿膠縣有大井其巨􅀂輪深六十丈􅀊常煑􅑟以貢天府本草所謂阿膠也故丗俗有阿井之名􅁃信哀江南賦云阿膠不能止黄河之濁海蛤􅀶物志曰東海有蛤鳥甞啖之􅁏消盡殻起岀浮泊在沙岸潮水徃來揩蕩白如雪入藥最良勝取自死者本草經曰海蛤味苦平生池澤治欬逆上氣喘煩􅅐痛寒熱文蛤主惡瘡蝕五痔生東海吴氏本草經曰海蛤神農苦歧伯甘扁鵲鹹大節頭有文文如磨齒採無時犀角本草經曰犀牛角味鹹治百毒靈羊角本草經曰靈羊角安心氣不猒音掩鹿茸本草經曰鹿茸強志不老鹿脂本草經曰麋脂近隂令人隂痿鴈昉本草經曰鴈昉一名䳱昉味甘平生池澤治風緊拘急偏枯氣不通乆服長髮益氣不肌不能老輕身生南海吴氏本草經曰鴈昉神農歧伯雷公甘無毒採無時鶩昉殺諸石藥毒䳒頭并尾本草經曰䳒辟不祥生淮南吴氏本草曰䳒尾治蠱毒太平御覽卷第九百八十八
