front:
  text: 太平御覽卷第九百八十七藥部四
  hash: sha256:8767081c53da661b2bfeabd9805af90c6d22396041fe4dc7457f2169975d7005
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_987-1a}
body:
  text: 石藥上紫石英白石英青石英赤石英黄石英黒石英石流黄石流青石龍赤石膽石肺石碑青石脂赤石脂黄石脂白石脂黒石脂凝水石陽起石石鍾乳孔公孽譽石紫石英山海經曰單􅀌之山蓬水岀焉其中多紫石英魏氏春秋曰黄􅀄元年明帝愈崇宫殿彫飾觀閣取白石英及紫石英五色文石於太行榖城之山宋書曰謝瞻字宣逺六歳能屬文爲紫石英賛爲當時才士歎異隋書曰梁彦光少歧嶷有至性七歳時父遇篤疾醫云餌五石可愈時求紫石英五色文石於太行不得彦光憂瘁不知所爲於園中見一物彦光所不識怪而持歸即紫石英也親屬咸異之抱朴子内篇曰或問不寒之道荅曰以立冬之日或服六丙六壬符或服太陽酒或服紫石英東筦縣西北二十里有襮山出紫石英舊以貢獻永嘉記曰固陶朴有小山岀紫石英人甞於山下得一紫石英王府君聞遣人縁山掘得數升芒角甚好色小薄孫府君亦掘得數升也從征記曰自太峴至太山皆有紫石英太山所出時復􅅛殊吴興記曰烏程縣北壟山有紫石英甚光明但小黒􅀶物志曰平氏陽山縣紫石英特好其他者色淺紫石英舊岀胡陽縣嶺表録異曰隴州山中多紫石英其色淡紫其質瑩徹隨其大小皆五稜兩頭如箭鏃煑水飲之暖而無毒比北中白石英其力倍矣本草經曰紫石英味甘温生太山山谷治心腹嘔逆邪氣􅀘不足女子風寒在子宫絶孕十年無子乆服温中輕身延年吴氏本草曰紫石英神農扁鵲甘氣平季氏太寒雷公太温歧伯甘無毒生太山或㑹稽採無時欲令如削紫色頭如摴蒱者白石英本草經曰白石英味甘微温生山谷主治消渴隂痿不足嘔逆益氣除濕痺鬲間乆寒益氣除乆服輕身長年生華隂永嘉記曰安固老山岀白石英吴氏本草曰白石英神農甘歧伯黄帝雷公扁鵲無毒生太山形如紫石英白澤長者二三寸採無時乆服通日月光青石英本草經曰青石英形如白石英青端赤後者是赤石英本草經曰赤石英形如白石英􅄱赤端故赤澤有光味苦􅀘心氣黄石英本草經曰黄石英形如白石英黄色如金在端者是黒石英本草經曰黒石英形如白石英黒澤有光石流黄後魏書曰恱盤國有火山山傍石皆燋鎔流數千里迺凝堅人取以爲藥即石流黄也淮南子曰夏至流黄澤抱朴子曰石流黄五岳皆有而箕山爲多其方言許由就此服之長生故不復以冨貴累意范子計然曰石流出漢中神仙傳曰劉馮餌石流黄老而更少愽物志曰西域使至王暢􅀃石流黄出且彌山去髙昌八百里有石流黄髙數十丈縱廣五六畒有取流黄孔穴晝視其孔上􅃺如青煙常髙數尺夜視皆如燃燈光明髙尺餘暢所親視見也且彌人言是時氣不和皆徃保此山毒氣自㓕本草經曰石流黄味酸生谷中治婦人隂蝕疽痔能作金銀物生東海吴氏本草經曰流黄一名石流黄神農黄帝雷公鹹有毒醫和扁鵲無毒或生易陽或河西或五色黃是潘水石液也燒令有紫炎者八月九月採治婦人結隂能化金銀銅䥫石流黄本草經曰石流黄青白色主益肝氣明目石流赤神仙傳曰許由巢父服箕山石流丹抱子曰石流丹者山之赤精盖石流黄之􅀋也皆浸溢於涯岸之間其濡濕者可丸服其已堅者可散服如此者有百二十種皆石芝本草經曰石流赤生羗道山谷石膽孝子王􅁽曰虎魄又名爲石膽十洲記曰滄浪海島上有石膽服之神仙仇池記曰石膽川平池出石膽􅀶物志曰皇􅀄三年武都西部都尉王褒獻石膽二十斤范子計然曰石膽岀隴西羌道本草經曰石膽一名畢石一名君石生􅁗州羗道山谷大石間或出句青山其爲石也青色多白文易破􅃺似空青能化鐵爲銅合成金銀練餌食之不老吴氏本草經曰石膽一名黒石一名銅勒神農酸小寒季氏大寒桐君辛有毒扁鵲苦無毒生羗道或句青山二月庚子辛丑採石肺本草經曰石肺一名石肝黒澤有赤文如覆肝置水中即乾濡主益氣明目生水中石脾本草經曰石脾一名胃口一名腎石赤文主治胃中寒􅀬青石脂本草經曰青石脂味酸平無毒主養肝膽氣赤石脂越絶書曰田鍾穹隆山赤松子所取赤石脂也永嘉記曰赤石脂出永寧赤石山荆州記曰義陽有赤石脂山本草經曰赤石脂味酸無毒養心氣范子計然曰赤石脂出河東色赤者黄石脂本草經曰黄石脂味平無毒主飬脾氣白石脂本草經曰白石脂味甘無毒主養肺氣黒石脂本草經曰黒石脂味甘無毒主餋腎氣強隂陽蝕腸泄利吴氏本草曰五石脂一名青赤黄白黒符神農甘雷公酸無毒桐君辛無毒季氏小寒生南山或海涯採無時赤符神農雷公甘黄帝扁鵲無毒季氏小寒或生少室或生太山色絳滑如脂黄符季氏小寒雷公苦或生嵩山色如肫腦鴈鶵採無時白符一名隨歧伯雷公酸無毒季氏小寒桐君甘無毒扁鵲辛或生少室天婁山或太山黒符一名石泥桐君甘無毒生洛西山空地凝水石本草經曰凝水石味辛寒生山谷治身􅀬腹中積聚邪氣煩滿飲之不飢生常山范子計然曰凝水石出河東色澤者善吴氏本草曰凝水石一名白水石一名寒水石神農辛歧伯毉和甘無毒扁鵲甘無毒季氏大寒或生邯鄲採無時如雲母也陽起石本草經曰陽起石一名白石味酸微温生山谷治崩中􅀘足内攣藏中血結氣寒􅀬腹痛漏下無子隂陽不合生齊地吴氏本草曰陽起石或作羊字神農扁鵲酸無毒桐君雷公歧伯無毒季氏小寒或生太山或陽起山採無時石鍾乳吴録地理志曰始安始陽有洞山山有穴如洞庭其中生石鍾乳唐書曰髙季輔爲太子右庻子上䟽切陳得失特賜鍾乳一劑曰卿進藥石之言故以藥石相報列仙傳曰卭䟽煑石髓而服之謂之石鍾乳水經曰大洪山巖嶂皆數百許仞入石門得穴穴上素崖壁立非人跡所及穴中多鍾乳凝膏下垂望􅀂氷雪微津細液滴􅄋不断幽穴潜逺行者不極又曰易水東經孔山山下有鍾乳穴穴出佳乳採者揭水尋沙入穴里許太山記曰山有鍾乳但不好耳湘川記曰湘東隂山縣有黄坑山出鍾乳長沙湘郷縣出鍾乳季秋入穴六七里乃得盛弘之荆州記曰天門郡出石鍾乳永嘉記曰安固縣東山石穴岀鍾乳東陽記曰北山崖有洞穴有人甞於此穴採鍾乳八十餘日粮盡而穴不窮劉道真錢塘記曰靈隱山北有穴旁入行數歩有清流水黄丈餘昔有人採鍾乳水際見異跡或云是龍跡聞穴裏隆隆有聲便岀不測所採近逺范子計然曰石鍾乳出武都黄白者善本草經曰石鐘乳一名留公乳味甘温生山谷明目益精治欬逆上氣安五藏百節通利九竅下乳汁生少室吴氏本草曰鍾乳一名季氏大寒或生太山山谷隂處岸下聚溜汁所成如乳汁黄白色空中相通二月三月採隂乾孔公蘗本草經曰孔公蘗一名通石味辛温生山谷治食化氣利九竅下乳汁治􅁖瘡疽瘻生梁山吴氏本草曰孔公蘗神農辛歧伯鹹扁鵲鹹無毒色青黄礜石音預􅀃文曰礜毒石也山海經曰皐塗之山有白石焉名曰礜可以毒䑕今礜石殺䑕蚕食之而􅏂范子計然曰礜石出漢中色白者善湘州記曰湘東山多礜石愽物志曰鸛伏夘時取礜石周遶夘以助暖氣方術家取鸛巢中礜石爲真荆州記曰湖縣鹿山舎傍多礜石毎至嚴冬其上不得停霜雪盛弘之荆州記曰魚復縣岸崩特出礜石吴興記曰長城縣有白石山出白礜石極精好本草經曰礜石一名青分石一名立制石一名固羊石味辛生山谷治寒􅀬䑕瘻蝕瘡除􅀬殺百獸生漢中氣吴氏本草曰白礜石一名䑕卿一名太白一名澤乳一名食鹽神農歧伯辛有毒桐君有毒黄帝甘有毒季氏大寒主温􅀬生漢中或生魏興或生少室十二月採太平御覽卷第九百八十七
