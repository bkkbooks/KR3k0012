front:
  text: 太平御覽卷第三百四十兵部七十一
  hash: sha256:d45672dc0df6a5b5aaf9a65c8d414775ecb413e4b62c006fb90a737e8642b34a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_340-1a}
body:
  text: 常旂旃物旗􅒅旐旞旌常釋名曰九旗之名日月爲常􅀞日月於其端天子所建言常名也尚書君牙曰惟乃祖乃父丗篤忠貞服勞王家厥有成績紀于太常周禮曰日月爲常十二旒河圗曰風后曰予告汝帝之五旗東方法青龍曰旗南方法赤鳥曰鼠西方法白虎曰典北方法玄蛇曰旂中央法黄龍曰常國語曰呉王㑹晉於黄池呉王白常白旂赤常赤旗文選曰建辰旒之太常又曰建太常􅀆裶裶旂釋名曰交龍爲旂旂􅀝也􅀞作兩龍相依􅀝也通以一赤色爲之無文采諸侯所建也爾雅曰有鈴曰旂郭璞注曰懸鈴竿頭􅀞交龍於旒詩曰王錫韓侯淑旗綏章龍旂陽陽和鈴央央又曰旂旐央央禮記月令曰天子春載青旂夏載赤旂秋載白旂冬載􅀇旂周禮曰交龍爲九旂諸侯所建左傳曰周分魯大路大旂又曰三辰旂旗昭其明也三辰日月星也旃釋名曰旃戰也戰戰恭巳而巳三􅀌所建象無事也􅀃文曰旃曲柄也所以招士衆也丗本曰黄帝作旃爾雅曰因章曰旃郭璞曰以白練爲疏因其文章不復畫也周禮曰通帛爲旃大赤也周正赤無斿飾􅀌所建也左傳曰城濮之戰亡大斾之左旃旃旗名繫旐曰旃祁暪奸命當此之事而不治為奸軍令也司馬殺之以殉于諸侯漢書曰田蚡音憤前堂羅鍾鼓立曲旃如淳曰通白爲旃蘇休曰柄上曲也孟子曰招庶人以旃田也西京賦曰虹旃蜺旄又曰樹脩旃上林賦曰立歴天之旂曳梢星之旃物釋名曰雜帛爲物以雜色綴其邊爲翅尾也將帥之所建也禮含文嘉曰制度爲科物應以冝明物以􅀋感其方也左傳曰蔿敖爲􅌠擇楚之令典軍行右轅左追蓐右者侠爲軍備左者追草爲􅀫備前茅慮無如今斥候持綘及白幡見騎賊舉綘幡見歩賊舉白幡備不虞有無茅明也或以云楚以茅爲旌熾也中權後勁中軍制謀後以精兵爲殿耳百官象物而動軍政不戒而備能用兵矣旗釋名曰熊虎爲旗期也將軍所建象其猛如熊虎與衆期其下也禮記曰龍旂九旒天子之旍也又曰行前朱鳥而後玄武左青龍而右白虎招揺在上急勁其怒注曰以此四獸爲軍陣象天也􅀞招摇星於旌旗上以起居堅勁軍之威怒周禮曰司常掌九旗之物名各有属以侍國事日月爲常交龍爲旂通帛爲旃雜帛爲物熊虎爲旗鳥隼爲旟􅀛虵爲旐金羽爲禭析羽爲旌物名日所􅀞異物則異名也又曰龍旂九斿以象大火也交龍爲旗諸侯所建也大火倉龍􅀫之心也其属箕尾九星也鳥􅒅七斿以象鶉火也鳥隼爲􅒅州里之所建也鶉火朱鳥宿之柳也其属有七星也熊旗六斿以象叅伐熊虎爲旗師都之所建也伐属白虎􅀫與叅連體而六星也􅀛虵四斿以象營室也􅀛虵爲旐縣鄙之所建營室玄武􅀫也與東壁連體而四星也旒旌枉矢以象弧勤禮曰侯氏載龍旂弧韣則旌旗之属皆有弧弧以張縿之幅有衣謂之韣又爲設矢象弧星有矢象妖星有枉矢枉矢者虵行有尾田此云枉矢盖盡之也韣音得左傳曰服振振取􅉑之旗袀音均又曰三辰旂旗昭其明也注日月星也又曰狄人伐衛衛懿公戰于滎澤衛師敗績㓕衛衛侯不去旗是以甚敗又曰越伐呉王孫弥庸見姑篾之旗曰吾父之旗也不可以見讎而勿殺又曰鄭人擊簡子中肩斃于車中獲其蜂旗蜂旗旗名又曰公孫庬以徒五百人宵攻鄭師取蜂旗於子姚之幕下又曰鄭伐許頴考叔取鄭伯之旗蝥狐以先登子都自下射之顚史記曰李斯上書云今陛下建翠鳯之旗樹靈鼉之鼓漢書郊祀志曰武帝將伐南越以班荆􅀞幡日月北斗登龍以象太一東觀漢記曰耿弇追張歩歩奔平壽乃肉􅃝負斧鑕於軍門而弇勒兵入據其城樹下二郡旗鼓令歩兵各以部人詣旗下衆向十餘萬輜重七千餘而皆罷歸郷里沈約宋書輿服志曰五旗者五色各一旗以木牛承其下盖取􅀒重而安隱也五旗纒竿即禮記德車結旌不􅀞飭也戎事乃散之又武車綏旌垂舒之也北史曰廬賁嘗事隋文乃受禪命賁清宮因典􅀫衛賁乃奏改周伐旗幟更爲嘉名其青龍騶虞朱雀玄武千秋萬歳之旗皆賁所創也隋書曰凢旗太常畫三辰日月五星旂􅀞青龍皇帝升龍諸侯交龍􅒅􅀞朱鳥旌􅀞黄麟旗􅀞白獸旐畫玄武皆加雲氣其旜物在軍亦􅀞其事號加之以雲氣徽幟亦如通帛爲旜雜帛爲物在軍亦􅀞其人官與姓名之事號徽幟亦書之盡其所書之例旌節又􅀞白獸而折羽於其上又曰司常掌旗物之藏通帛之旗六以供郊丘之祀一曰蒼旗二曰青旗三曰朱旗四曰黄旗五曰白旗六曰玄旗􅀞繢之旗六以充玉路之等一曰三辰之常二曰青龍之旗三曰朱鳥之旟四曰黄麟之旌五曰白獸之旗六曰􅀇武之旐皆左建旗而右建榻㦸榻它臘切又曰有繼旗四以施軍旅一曰麾以供軍將二曰旞以供師帥三曰旐以供旅師四曰斾以供倅長唐書曰元和中淮南節度使馬揔進呉元濟旌旗七百三十九事家語曰子路言志云願得旌旗􅌭紛下蟠于地詩推度災曰上出號令而化天下震雷起而驚蟄暏旗鼓動三軍駭觀其前動化而天情可見矣戰國䇿曰建七星之旗天子之位也穆天子傳曰日月之旗七星之文今旒上盡日月及北斗星也周遷車服雜記曰晉元皇始制五牛之旗設青在左黄在中六韜曰武王伐紂懸紂之首於白旗古司馬兵法曰夏后氏􅀇首人之執也殷曰白天之義也周曰黄地之道也旌首有鈴曰旂三王所以立不失天地人之道也章夏以日月上明也殷以虎上威也周以龍上文也章􅀞飾也三王􅀞各有所法也郝萌占曰旗上有光人主大喜延年益壽黄石公三略曰欲知敵形色可勝之符先戰以二十八􅀐角人青衣赤旗東方七人徴人赤衣黄旗南方七人啇人白衣黒旗西方七人羽人黒衣青旗北方七人凢二十八􅀐象二十八􅀫軍令曰聞雷鼓音舉白幢絳旗大小􅂳皆進戰不進者斬聞金音舉青旗舡皆止不止者斬王孫子曰桀紂或放南巢或頭懸赤旗斯無它不節財而􅁀人也孫子曰言不相聞故爲鼓鐸視不相見故爲旌旗夫金鼓旌旗所以一民之耳目也又曰無要正正之旗無擊堂堂之陣列子曰皇帝與炎帝戰以雕鶡鷹鳶爲旗幟隋巢子曰天賜武王黄鳥之旗以代殷淮南子曰凢國有難君自宫召將詔之曰社稷之命在將軍身今國有難願子將而應之將軍受命乃令祝史太卜齋三日之太廟鑚靈􅀛卜􅁻日以受鼓旗楚辭曰駕龍輈􅀆乗雷斬車轅也載雲旗􅀆逶迤又曰乗廻風􅀆載雲旗又曰楊彗星以爲旗又曰乗赤豹􅀆狐從文狸新夷車􅀆結旌桂旗宋玉髙唐賦曰眄􅀆􅀂妖姫楊􅃑鄣日而望所思忽􅀆􅀂駕駟馬建羽旗相如上林賦曰靡魚須之撓旃以魚須爲旃柄駈馳逐戰也曳明月之珠旗以明珠綴飾旃王沉餞行賦曰曵招揺之脩旗􅀂蜿虹之垂天崔駰東廵頌曰升九龍之華旗文選曰雲旗拂霓又曰牙紛繽又曰旌旗拂天又曰掲竿爲旗又曰曳彗星之飛旗又曰朱旗所拂九土破攘又曰朱旗降天又曰建祝姑祝姑旗名又曰青霞雜桂旗旟釋名曰鳥隼爲旟旟譽也軍吏所建也急疾趨事則有稱譽也爾雅曰錯革鳥曰旟郭璞注曰此謂全剥鳥皮毛置之竿頭也舊􅀃刻革烏置竿首也孫叔敖云革急也言􅀞急疾之鳥於旒也周官鳥隼爲旟也按禮記鄭􅀇云載之以示衆即此􅀋也書云鳥戰目革詩云如載鳴鳶鳥斯革旌首鳥者自是鳥之皮毛明矣詩曰子子干旟在浚之都又曰彼旟旐斯胡不斾斾斾旒垂也周禮曰鳥隼爲旟州里所建也州長之属旐釋名曰􅀛虵爲旐兆也􅀛知氣兆之􅁻凶建之於後察度事冝之形兆也爾雅曰績廣充幅長㝷曰旐郭璞注曰帛全愊長八尺者也詩曰設此旐矣又曰建旐設旄薄獸干敖周宣王也周禮曰􅀛虵爲旐四斿縣鄙之所建也旞釋名曰全羽爲旞旞猶也順滑貌也一作旞􅀃文曰旞者導車所載全羽允允而進也周禮曰全羽爲旞道車所進車象路也王以朝夕燕出入也旌釋名曰折羽爲旌旌精光也綏有虞氏之旌也注旄竿首其形蘂蘂然也綏夏后氏之旌也其形襄也白斾殷旌也以帛繼旐末也翿陶也其皃陶陶下垂也爾雅曰旄首曰旌郭璞注曰戴旌於竿頭如令之幢亦有旄也廣雅曰天子之旌髙九仞諸侯七仞丈夫五仞士三仞詩曰孑孑干旌在浚之城又曰悠悠斾旌禮記曰前有水則載青旌鄭􅀇注曰載所謂舉於旌首所以警衆者也鄭記王賛問曰舉旌於首當皆以皮邪􅀞之也鄭荅曰皆俱舉皮置於首不􅀞羽爲旌也周禮曰折羽爲旌游車所建游車木路也王以田也全羽折羽皆五色文也又曰掌舎爲帷宮設旌門樹旌以表門左傳曰鄢陵之役欒鍼見子重之旌謂晉侯曰楚人謂夫旌子重之旌也又曰范宣子假羽毛於齊而弗歸折羽爲旌王者游車所建齊私有之因謂之羽毛又曰楚靈王之爲令尹也爲王旌芋尹無字斷之曰一國兩君其誰堪之又曰衛宣公烝夷姜與朔搆急子公使諸齊使盗待諸莘而殺之壽子載其旌旗以先盗殺之急子後往盗又殺焉又曰許伯曰吾聞致師者御靡旌摩壘而還靡旌驅疾也摩近也公羊曰楚莊王伐鄭鄭伯肉􅃝左執茅旌右執鸞刀以逆何休曰茅旌宗廟所用也爲宗廟所用求以宗廟歸首也史記曰􅁗併天下以水德之始旌旄節皆尚黒漢書文帝詔曰朝有進善之旌應邵注堯設五逹之道令人進善也又曰髙祖使韓信與楚戰信潜伏人於楚軍之側方戰兵遂僞走楚軍逐之乃令拔楚旌立漢旌楚師望見奔走遂敗楚矣後漢書曰丗祖進師臨河連旌㳂河千餘里戰國䇿曰􅂫􅁗爲趙合從於楚威王曰寡人西接秦􅁗虎狼之國卧不安席食不甘味心揺揺然如懸旌漢武故事曰欒大有方術常於殿前樹旌數百人因令自相擊庭中去地十餘丈觀者大駭孟子曰齊景公招虞人以旌不至將殺之非其招也夫招虞人以皮冠庶人以旃士以旂大夫以旌况以不賢招賢人乎管子曰舜有告善之旌示不蔽也莊子曰楚昭王使延屠羊􅀃以三旌之位萬鍾之禄也抱朴子軍術曰軍始出而旌旗繞竿者急住更待善時而出軍天文要集曰翼星明旌旗用趙氏兵書曰有鳥集將軍旌上將軍増秩禄文選曰蔽引髙旌又曰旌旗拂天又曰蜺爲旌翠爲盖又曰筌撓􅀆蘭旌筌此縁切撓音繞又曰建虹旍􅀆威夷太平御覽卷第三百四十
