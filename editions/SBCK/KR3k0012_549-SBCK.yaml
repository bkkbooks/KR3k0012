front:
  text: 太平御覽卷第五百四十九禮儀部二十八
  hash: sha256:c72cc74826e3cb03598e7ac29bbeb52d74ab41d071fda69b8e971e7b10130a41
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_549-1a}
body:
  text: 屍復魂唅絞紟衾冒屍禮記曲禮下曰在牀曰屍左傳哀下曰陳侯使公孫貞子聘呉未至而卒將以屍入呉人使太宰嚭營勞且辭上介芉尹盖對曰寡君聞楚爲不道荐伐呉國滅厥民人寡君使盖備使弔君之下吏無禄使人逢天之慼大命殞墜今君命逆使人曰無以屍造千門是我寡君之命委于草莽也且臣聞之事死如生禮也於是乎有朝聘而終以屍將事之禮又有朝聘而遭䘮之禮􅀂不以屍將命是遭䘮而還也無乃不可乎以禮防民猶或踰之今大夫曰死而棄之是棄禮也苟我寡君之命逹于君所雖殞于深淵則天命也吴人內之禮統曰屍之言矢也陳也家語曰史魚將卒命其子曰吾在朝不能進蘧伯玉退彌子瑕是吾爲臣不能正君生而不能正君死不可以成禮我死汝其陳屍牖下靈公弔焉怪而問之其子以父言告公公曰寡人過也命殯於客位進蘧伯玉退彌子瑕孔子曰史魚死而屍諌可謂直乎史記曰崔杼殺莊公晏嬰立崔杼門外曰君爲社稷死死之爲社稷亡亡􅀂爲巳死非其私暱誰敢任之門開而入枕公屍而哭三踴而出人謂崔杼殺之杼曰民之望也舎之得民又曰吳兵入郢伍子胥求昭王旣不得乃掘楚平王墓出屍鞭之三百又曰呉王取子胥屍盛以䲻夷􅀿劭曰取馬皮以爲䲻夷形也浮之江呉人憐之爲立祠於江上因命曰胥山魏志曰宣王討王陵乃窮治其事發陵及令狐思冡剖棺􅁀屍於所近市三日王隱晉書曰王浚在幽州謡曰幽州城門似藏户中有伏屍王彭祖又曰趙王倫害張華之時洛中震悚唯閻纉敢獨詣東市號哭弔屍而撫之曰早語君遜位而不肯去今果不免禍車頻奏書曰􅀄慕容暐在鄴居石虎宫夢虎齧其臂募人求虎殯所在女子李葂告暐在東明觀下掘得之屍僵不毀暐祼而罵之曰死胡敢夢生天子鞭撻毀辱投之漳河河流迅疾終不移轉暐後爲臣虎所執乃悟而悔焉符堅以李葂無􅃺無少長悉坑之李固別傳梁冀誅固而露屍於四衢命有敢臨者加其罪固弟子汝南郭況年始成童遊學洛陽乃左提章􅃏右秉鈇鑕詣闕上書乞収固屍不許往臨哭陳辭於前遂守䘮不去白虎通曰屍者何謂也屍之爲言陳也失氣亡神形體獨陳釋名曰死曰屍屍舒也骨節解舒不能復自勝歛捜神記曰􅀄鈎弋夫人有罪以譴死殯屍不臰而香及昭帝即位改葬之棺空無屍獨􅁝履存焉異苑曰河內荀儒字君林乗冰省舅氏䧟河死兄倫求屍積日不得設􅀕水側又箋與河伯投箋一􅀫岸側冰開屍手執箋浮出倫又箋謝又曰㝷陽周處字孟威寧康中鎮于巳西爲符堅所摧守節不屈堅使使者請通虓躬治逵陌謂使者云煩君語賊符堅何至耳煩國士如此又潜圖襲堅聞之曰小人正欲覔死殺之􅃴足成名耳乃􅀂考楚不食而卒歛巳經旬堅怒猶未歇剖棺臨視虓屍欻廻眸􅁂髭張烈精瞳明亮􅅆盻矚堅覩而嘉稱乃厚加贈􅉠又曰元嘉中豫章胡家奴開昌邑王􅃁青州人開齊衰公􅃁並得金鈎而屍骸露在巖中儼然兹亦未必有慿而然也京房屍至義熈中猶完具僵屍人肉堪爲藥軍士分割之列女傳曰齊人􅂎梁襲莒戰而死其妻無所歸乃就夫屍於城下而哭之七日而城崩妻遂投於淄水而死􅀶物志曰靈帝光和元年元遼西太守黄翻言海邊有流靈冠絳衣屍體完令感夢曰我伯夷弟􅀌竹君也海水壞吾棺求見掩藏呉㑹稽分地曰重山者大夫種所葬也在西郷郭外後潮水穴山漂去其屍俗云伍子胥乗漸水取以去今山脇有缺處臨邑國記曰有靈鷲能知人􅁻凶覘人將死食屍肉盡乃去晏子春秋曰景公操玉加於晏子屍上涕下沾衿盡哀而去又曰景公伏晏子屍而號曰今天降禍不加寡人而加夫子社稷危矣論衡曰孟賁之屍人不刃者氣絶也死炭百斛人不沃者光㓕也又曰淮陽都尉尹齊爲吏酷虐及死怨家欲取其屍屍亡歸復魂周禮天官夏采曰掌大喪以冕服復于太祖以乗車建綏復于四郊復招魂也建綏者去其旒又春官司服曰大䘮共復衣服衣服今座上魂衣也禮記檀弓曰復盡愛之道也有禱祠之心焉復謂招魂且分禱五祀庶幾其精氣之反望反諸幽求諸􅀑神之道也􅀑神處幽闇望其從􅀑神所來北靣求諸幽之義也郷其所從來也禮復者􅂛屋北靣又檀弓曰邾婁復之以矢也盖自戰於􅂛陘始也時師雖勝死傷亦甚無衣可以招魂又曰曽子問曰爲君使而卒於舎禮曰公館復􅀻館不復凡所使之國有司所授舎則公館巳何謂􅀻館子曰善乎問也自卿大夫家曰􅀻館公與公所爲曰公館公館復此之謂也又禮運曰及其死也升屋而號告曰臯某復招之於天又禮運曰復諸侯以褒衣冕服爵弁服復招魂復魄也冕服者上公五侯伯四子男三褒衣亦始命爲諸侯及朝覲見加賜之衣也褒猶進也夫人稅衣榆狄狄稅素沙言其招魂用稅衣上至䄖狄也狄稅素伙言皆以白紗縠爲褒復西上北面而西上賜長左也復者多少各如其命之數又􅄂記上曰大夫士死於道則􅂛其乗車之左轂以其綏復如於館死則其復如於其家又喪大記曰復有林麓則虞人設階無林麓則狄人設階復招魂復魄也階所乘以􅂛屋者虞人主林麓之官也狄人樂吏之賤者階弟也簨虞之􅀋小臣復復者朝服君以卷夫人以屈狄大夫以􅀇頳世婦以䄠衣士以爵弁士妻以稅衣皆􅂛自東榮中屋履危北靣三號捲衣投于前司服受之降自西北榮其爲賔則公館復􅀻館不復其在野則􅂛其乗車之左轂而復􅀻館卿大夫之家也不於之復爲主人之惡也復衣不以衣尸不以斂不以衣尸謂不襲也復者庶其生也􅀂以其衣襲歛是用生施死於義相友䘮禮云以衣衣尸俗而去之婦人復不以袡袡嫁時上服而非事􅄦神之衣凡復男子稱名婦人稱字婦人不以名行唯哭先復復而後行死事氣絶則哭哭而復復而不􅂫可以爲死事諸侯行而死於館則其復如於其國如於道則􅂛其乗車之左轂以其綏復館主所致舎綏旌旗又䘮服小記曰復與書銘自天子逹於士其辭一也男子稱名婦人書姓與伯仲如不知姓則書氏此謂殷禮也殷質不重名復則臣得名君周之禮天子崩則同復曰臯夭子復諸侯薨復曰臯某甫復其餘及書銘禮記外傳曰人之精氣曰魂魂陽也云云而動形體謂之魄魄隂也漠然不動合隂陽二氣而生也精氣聚而爲一物形勞則神逝謂正而魂遊散死則難復生也孝子之心不能忍也故升屋而招其魂神也神智無涯也􅀑者復於土也人皆食土之物養成形體也氣絶而収其魂使反復於體也齊書曰張融建武四年病卒遺令白旐無旒不設􅀕令人捉塵尾登屋復魂曰吾生平所善自當陵雲一􅀏三千買棺無製新衾左手執孝經老子右手執小品法華經妾二人事哀畢各遣還家含周禮天官􅃁宰曰太宰之職大䘮賛贈玊含玉助王爲之也贈玉旣􅉎所以送先王含玉死者實也天子以玉􅄂記曰唅者執璧將命曰寡君使某唅則諸侯唅以璧小宰䘮荒受其唅禭幣玉之事春秋傳曰口實曰唅衣服曰禭凶荒有幣玊者賔客所賙委之禮又天官玉府曰大喪共含玉又春官典瑞曰大䘮共飯玉含玉贈玉飯玉砕玉以􅄂米也禮記檀弓下曰邾婁考公之䘮考公益之曽孫也考公或爲定公也徐君使容居來弔含弔且唅非之也曰寡君使容居坐含進侯玉其使容居以唅欲親唅非禮也唅不使賤者君行則親唅耳言侯玉者徐僣稱王自比天子有司曰諸侯之來辱弊邑者易則易于則于易于􅄂者未之有也易謂臣禮于謂君禮也容居以臣欲行君禮于徐自比天子使大夫敵諸侯有司固拒之是也容居對曰容居聞之事君不敢志其君亦不敢遺其祖昔我先君駒王西討濟於河無所不用斯言也容居魯人也不敢忘其祖言我祖與今君於諸侯􅀄如是不聞義則服也駒王徐先君謂僣號者容居其孫也濟渡也言西討渡於河廣大其國也魯魯鈍也言魯鈍者欲自明不妄又檀弓下曰飯用米貝弗忍虚也不以食道用羙焉爾尊之也食道米見美也又􅄂記上曰唅者執璧將命曰寡君使某唅相者入告出曰􅀌某須矣唅玉爲璧制其分寸之大小未聞唅者入􅂛堂致命于拜稽顙含者委于殯東南又曰天子飯九具諸侯七大夫五士三此盖夏時也周禮天子飯唅用玉左傳曰叔孫豹㑹晉士丐于柯盟于督陽荀偃癉疽生􅅑於頭癉疽堊瘡二月卒而視不可唅目開口噤宣子與撫之曰事呉敢不如事主猶視欒懷子曰其爲未卒事於齊故也懷子欒盈乃復撫之曰主茍終所不嗣事于齊有如河乃暝受唅也又曰公㑹呉子伐齊將戰公孫夏命其徒歌虞殯虞殯送終歌典示必死也陳子行命其徒且唅玉亦示必死春秋􅀃題辭曰口實曰唅縁生象食孝子不忍虚其欲不忍虚故欲實其口天子以珠諸侯以玉大夫以璧士以貝唅之爲言含也生常食故死亦有所含􅀃文曰含送終口中玉也釋名曰唅以米貝含其口中也莊子曰青青之麥生於陵阪生不布施死何唅珠爲吕氏春秋曰含珠鱗施今葬皆用之注云含珠口實鱗施施玉匣於死者之體如魚鱗絞紟衾冒儀禮士䘮禮曰死於適室撫用歛衾撫覆也歛衾大歛所用之衾也衾􅀍也奉屍于室撫用夷衾夷衾覆屍柩之衾也又曰冒緇質長與手齊頳殺掩足冒韜尸者也制如直囊上曰質下曰殺殺韜足而上質韜首而下齊手上衣尢下赤象地也又曰厥明陳衣于房南頭西上綪紟撗三縮一廣終幅拆其末綪屈也紟所以束衣服爲堅急也以布爲之縮從撗者三幅從者一幅折其未令可結之也禮記雜記曰唯絞紟衾冒死而後製又䘮大記曰君錦冒黼殺綴旁七大夫􅀇冒黼殺綴旁五士緇冒頳殺綴房三又䘮大記曰小歛布絞縮者一撗者三大歛布絞縮者三撗者五布紟二衾君大夫士一也禮記外傳曰絞紟衾帽死而後製絞者交束之名也紟者堅急之稱也衾者單􅀍也帽者小歛衣故設帽以揜形也小歛用一衾大用二衾一以覆之一者將歛之時先鋪衾於紟之下用以舉尸入棺者也釋名曰絞交也交結之也紟禁也禁繫之也太平御覽卷第五百四十九
