front:
  text: 太平御覽卷第七百一十九
  hash: sha256:81f59bce6a83f0c5c9d3284d167f1e6660dc7ced9d0ff5afcdb38ed74214fbab
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_719-1a}
body:
  text: 服用部二十一粉黛脂澤燕支的花勝粉釋名曰粉分也研米使分散也䞓勑貞切粉者赤也染粉使赤以着頰也墨子曰禹造粉博物志曰紂燒鈆錫作粉漢書曰廣川王去疾幸􅁎陶望卿去疾后昭信謂去疾曰前􅀞工􅀞望卿􅃝禓􅀓粉疑有姦又曰惠帝侍中皆􅀓脂粉續漢書曰順帝時所除官多不次李固奏免百餘人此等旣怨共作飛章誣固曰大行在殯路人掩涕固獨胡粉飾貌搔頭弄姿盤旋偃仰曽無􅃤怛之心魏書曰何晏自喜動静粉白不去手行歩頋影魏略曰邯鄲淳詣臨淄侯植時天暑植取水浴以粉自傅科頭胡舞擊劒誦小說頋謂淳曰邯鄲生何如也韓子曰若毛嬙西施之羙麗無益吾靣用脂澤粉黛則倍其􅀄言先王仁義無益於治明法度必賞罰則國之脂澤粉黛淮南子曰漆不厭墨粉不厭白􅂁朴子曰或問渉海之法荅曰先於川次破雞子一枚以少粉雜香末合攪水中則不畏風波又曰民不信黄丹及胡粉是化鈆所作神仙傳曰眞人南極子能含粉成雞子吐之數十枚煑之雞子黄中皆有少粉也華陽國志曰巳郡江西縣有清水穴巴人以此水爲粉則皜曜鮮芳嘗貢京師名爲粉水扶南傳曰頓遜國有磨夷花末之爲粉大香夢書曰婦人夢粉飾爲懷姙神農夲草曰粉錫一名鮮錫語林曰石崇厠置甲煎粉沉香汁之屬漢官儀曰省中以胡粉塗壁鄴中記云石虎以胡粉和椒塗壁曰椒房宋玉登徒子賦曰着粉太白施朱太赤蔡邕女誡曰弘粉則思其心之鮮曹植樂府曰御巾粉於君傍中有藿納都梁􅀓長虞感凉賦曰珠汗隕於王躬粉附身而沽凝黛􅀃文作黱􅀞眉也黱與黛同釋名曰黛代也滅去眉毛以此代其處也通俗文云染青石謂之􅀧黛後漢書曰明德馬后眉不施黛獨左眉角小缺􅀘之如粟宋起居注曰河西王沮渠䝉遜獻青雀頭黛百斤楚詞曰粉白黛黒施芳澤長􅃑拂靣善留客脂澤釋名曰澤人髮恒枯瘁以此濡澤之脣脂以丹作象脣赤也廣志曰靣脂魏興巳來始有之漢書曰翁伯販脂而傾縣邑又曰孔奮爲姑臧長清儉人或譏之以身處脂膏不能自潤北史后妃傳曰晉舊儀典櫛三人掌宫中櫛膏沐丗􅀃曰江淮以北謂靣脂爲靣澤蔡邕女誡曰􅀓脂則思其心之和澤髪則思其心之潤馮􅄛集曰􅄛與婦弟任武逹書曰惟一婢武所見頭無􅁫澤靣無脂粉燕脂博物志曰作燕支法取藍蘤違委切擣以水洮去黄汁作十餅如手掌着濕草卧一􅀫便隂乾欲用燕支以水浸之三四日以水洮赤黄汁盡得赤汁而止也西河舊事曰祁連山焉支山冝畜養匈奴失此二山乃歌曰失我祁連山使我六畜不蕃息失我焉支山使我婦女無顔色崔豹古今注曰燕支葉似蒯花似菖蒲出西方土人以染名爲燕支中國人謂紅藍以染紛爲婦人面色謂爲燕支粉也習鑿齒與燕王書曰此下有紅藍足下先知之不北方人採取其花染緋黄接其止英者作燕支婦人用爲顔色可愛班固曰匈奴名妻作閼氏言可愛如燕支的釋名曰以丹注靣曰的的灼也此夲天子諸侯有羣妾者以次進御有月事者止不御重不口說故注此於面灼然而識也王粲神女賦曰施華的結羽􅁫􅀓玄鏡賦曰珥明璫之迢迢􅀧􅀟的以發姿花勝釋名曰花勝草化也言人形容正等着之則勝續漢書輿服志曰皇后入廟爲花勝上爲鳯皇以翡翠爲毛羽下有白珠垂金綺鑷横簮之山海經曰西王母梯凢戴勝符瑞圗曰金勝者仁寳也不斷自成光若明月晉中興書曰一名金稱援神契曰神靈滋液百珎寳用有金勝晉孝武時陽􅂖氏得金勝一枚長五寸形如織勝太平御覽卷第七百十九
