front:
  text: 太平御覽卷第八百四十二
  hash: sha256:e6dafee88289138c460beaf932f5583adf5b3258b80f3d26bb342c8a1050d268
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_842-1a}
body:
  text: 百榖部六􅁰稌􅆝東薔􅁰尚書君陳曰我聞曰至冶馨香感于神明􅁰稷非馨明德惟馨又盤庚曰􅀂農不服田畒㒺有􅁰稷尚書大傳曰夏昏火中可以種􅁰韓詩外傳􅁰離曰彼􅁰離離彼稷之苗薛君注曰詩人求巳凡不得憂不識物視彼􅁰乃以爲稷毛詩曰􅁰離閔宗周也彼黍離離彼稷之苗行邁靡靡中心揺摇又甫田曰今適南畒或秐或黍稷薿薿薿薿盛皃也又魚藻􅁰苗曰芃芃黍苗隂雨膏之儀禮㛰禮曰賛設􅁰于醬東又特牲饋食禮曰佐食􅅮􅁰授祝祝以授尸禮記月令曰仲夏之月農乃登黍又曲禮曰黍曰薌合又内則曰羊冝􅁰豕冝稷左傳昭公曰其藏冰也黒牡秬􅁰以享司寒杜預注曰黑牲秬黍也司寒北方􅀇冥之神也故物皆用黒有事於冰故􅀕其神以上黍春秋佐助期曰􅁰神名侜侫蘭郝春秋􅀃題辭曰精移火轉生黍夏出秋改杜預注曰云春之夏故移也農書曰黍之言暑也必湏暑改得隂乃成也􅁰者緒也故其立字禾入米爲􅁰爲酒以扶老爲酒以序尊卑且禾爲柔物亦冝養老也爾雅曰秬黒黍杯一稃二米郭璞注曰秠亦黒黍但中興􅁰米異耳漢和帝時任城生黑黍或三四實一黍二米得黍三斛八㪷是也史記封禪書曰管仲􅀃桓公曰古者封禪鄗上􅁰所以爲盛應劭注曰鄗上山也音曜漢書曰兾州民五男三女畜冝牛羊榖冝􅁰稷後漢書曰承宫遭天下䘮亂遂將諸生避地漢中後與妻子之蒙隂山肆力耕種禾􅁰將熟人有認之者宫不與計推之而去由是顯名晉書曰劉聦時河東大蝗唯不食􅁰豆靳准率部人収而埋之哭聲聞於十餘里後乃鑚􅁟飛出復食􅁰豆平陽飢甚崔鴻十六國春秋前秦録曰符堅讌羣臣于釣臺祕書侍郎趙整以堅頗好酒因爲酒德之歌曰穫􅁰西秦採麥東齊春封夏發鼻納心迷隋書曰李士謙隱居有牛犯其田者士謙牽置凉處飼之過於夲主望見盗刈其禾􅁰者黙而避之其家僮嘗執盗粟者士謙慰諭之曰窮困所致義無相責遽令放之又曰李士謙自以少􅀌未甞飲酒食肉口無殺害之言至於親賔來萃輙陳罇爼對之危坐終日不倦李氏宗黨豪盛毎至春秋二社必髙㑹極歡無不沉醉諠亂嘗集士謙所盛饌盈前而先爲設􅁰謂群從曰孔子稱􅁰爲五榖之長荀卿亦云食先􅁰稷古人所尚容可違乎少長肅然不敢㢮惰退而相謂曰旣見君子方覽吾徒之不德也士謙聞而自責曰何乃爲人所踈頓至於此唐書曰德宗以中和節令文武百辟進農書獻穜稑種及是百寮始進兆人夲業三卷司農献粟及􅁰各一斗韓子曰韓昭侯之時􅁰種嘗貴甚昭侯令人覆廪廪吏果竊􅁰種而粜之山海經曰廣都之野后稷葬焉爰有膏黍膏稷又曰魚山有人一目是少昊子食􅁰韓子曰呉起攻􅁗小亭􅀝一車轅北門外令曰能徙此於南門外者賜上田上宅及有徙者賜如令俄又置一石赤􅁰東門外令曰能徙此於西門外者賜如􅀄民争徙之乃下令曰攻亭能先登者仕之大夫賜之上田上宅於是攻之一朝而拔淮南子曰冬三月天子衣黒衣乗􅀇駱􅀇馬黒馬白䭷食黍與􅇾黍􅇾水􅀋時冝也又曰三代積徳而王齊桓繼絶而覇故樹黍者無不獲稷樹恩者無不報德又曰渭水多力而冝黍淮南万畢術曰取麦門冬赤黍漬以狐血隂乾之欲飲酒取一丸置舌下酒吞之令人不醉麦門冬赤􅁰薏苡爲丸令婦人不妬白虎通曰清明風至則黍稷滋閶闔風至則種􅀫麥􅁰抱朴子曰張子和丹法用鈆朱砂曽青水合封之蒸之於赤􅁰米中也紀年書曰惠成王八年雨黍國語曰子餘使公子賦􅁰苗黍苗小雅其詩曰芃黍苗隂雨膏之子餘曰重耳之仰君也􅀂􅁰苗之仰隂雨也􅀂君實庇癊膏澤之使能成嘉榖薦在宗廟君之力也在宗廟爲􅀕主家語曰孔子侍坐於哀公賜之桃與􅁰焉哀公請用之孔子先食􅁰而後食桃左右皆掩口而􅀏之公曰􅁰者所以雪桃非爲食也孔子對曰丘知之矣然􅁰者五榖之長郊社宗廟以爲上盛果屬有六而桃爲下􅀕祀不用不登郊廟丘聞之君子以賤雪貴不以貴雪賤也今以五榖之長雪五果之下者從上雪下也臣以爲妨於教害於義故不敢公曰善吕氏春秋曰得時之黍芒莖而徼下穗芒以長摶采而薄糠舂之易而食之不噮北縣切而香如此者不餲音遏先時者大夲而華莖殺而不遂遂長葉髙短穗後時者小莖而麻長短穗而厚糠小米今而不香仐新也又曰今以百金與􅅮黍以示兒子兒子必取􅅮􅁰也以和氏之璧與百金以示鄙人鄙人必取百金矣又曰飯之美者南海之秬秬黒黍楊泉物理論曰梁者􅁰稷之揔名崔寔四民月令曰四月可種黍謂之上時汜勝之書曰􅁰者暑也種必侍暑先夏至二十日此時有雨強土可種黍􅅿三􅂛􅁰心未生雨灌其心心傷無實凢種􅁰皆如禾欲䟽於禾祢衡別傳曰十月朝黄祖在艨衝舟上㑹設􅁰臛衡年少在坐􅁰臛至先自飽食畢􅅮以弄戯其輕慢如此劉向别録曰傳言鄒衍在燕有谷地羙而寒不生五􅂖鄒子居之吹律而温至生黍到今名􅁰谷焉列女後傳曰東平衡農師太尉薨農欲奔赴無粮自致妻願從行行止紡績庶以自資行到聚亭遇天霖雨留獨􅀌母舎母舎後有空園農曰此園可以種黍從求分種之獨孤母曰此乆廢園唯恐生力劣手不多耳何分之有乎農遂與妻斬荆􅁄種之􅁰將熟獨孤母乃更曰􅁰當分農欲委去妻曰不如收歛以遺之安其意然後乃去農遂從之後還獨孤母以昔􅁰歸農遂不肯取􅀃文曰秬黒􅁰也一稃二米所以醸鬯也黍禾屬黏者以大暑而種故謂之􅁰孔子曰􅁰可以爲酒廣雅曰粢􅁰也􅁰穰謂之䅀音例崔豹古今注曰宣帝元康四年長安雨黒􅁰粟如禾和帝元興元年黒􅁰穗一禾二實或三四實生任城得粟三斛八斗以薦宗廟廣志曰有牛􅁰有稻尾秀成赤􅁰有馬革大黒􅁰或云秬􅁰有温屯黄􅁰有嫗亡䴏􅟀之名呉氏本草曰􅁰神農甘無毒七月取隂乾益中􅀘氣京房易妖占曰天雨黍粟大人出走荆楚歳時記曰十月一日􅁰臛俗謂之秦之歳首未祥􅁰臛之義今北人此日設麻羮豆飯當爲其始熟嘗新耳博物志曰地三年種蜀􅁰其後七年多虵稌范曄後漢書曰烏丸國其地冝稌穆天子傳曰天子至赤烏赤烏獻稌麥百載廣志曰有赤稌有白黒青黃鷰頷凢五種吕氏春秋曰飯之美者有陽山之稌􅀃文曰稌穈也音麋崔豹古今注曰麻稌也梁禮記曲禮曰􅀕宗廟之禮梁曰薌箕又郊特牲曰飯􅁰稷稻梁白黍黄梁爾雅曰釁赤苗􅉮白苗郭璞注曰釁赤梁粟􅉮白梁粟皆好榖也犍為含人曰别米赤白苗也又曰是伯夷所食首陽草也廣雅曰藋梁木稷也續漢志曰桓帝之􅀄京都童謡曰城上烏尾畢逋公爲吏子爲徒一徒死百乗車車班班入河間河間奼女工數錢以錢爲室金爲堂石上慊慊舂黄梁下有懸鼓我欲擊之丞相卿怒城上烏者處髙獨食不與下共謂人主多聚歛也公爲吏子爲徒者言蠻夷叛逆父旣爲軍吏子弟又爲卒徒徃擊之也一徒死百乗車者言前一人討胡旣死矣後又遣百乗車徃也車班班者言乗輿班班入河間迎靈帝也奼女工數錢言帝旣立其母永樂太后好聚金錢以爲堂室也石上慊慊者言太后雖積金錢猶慊慊常苦不足使人舂黄梁而食之也我欲擊之者言太后教帝使賣官授錢天下忠篤之士怨望欲擊鼔求見卿懸鼔者復怒而止我也唐書曰凉州都督計欽明嘗岀按部有吐蕃數萬奄至城下欽明拒戰乆之力屈􅀍執賊將欽明至靈州城下欽明大呼曰賊中都無飲城内有美醬乞二􅂛梁米乞二􅂛墨乞一挺是時賊營中四面阻泥河唯有一路得入欽明詐乞此物以喻城中兾有簡兵練將􅀱夜掩襲城中無晤其旨者尋遇害淮南子曰不能耕而欲􅁰梁不能織而憙衣裳無事而求其功難矣又曰珎怪竒味人之所美也而堯糲􅆝之飯藜藿之羮糲麄也文繡狐白人所好也而堯布衣揜形鹿裘禦寒國語曰欒伯謂公族大夫公曰夫膏􅆝之性難正吕氏春秋曰呉起爲鄴令民歌之曰終古斥鹵生稻􅆝楊泉物理論曰􅆝者􅁰稷之㹅名也神仙傳曰呉孫權時有一人種􅆝在山中患猿猴食之聞介象有道聊從乞辟猿猴法象告之無他法也汝明日徃梁所望見羣猴方徃時便大喚語之言以白介君使猿猴莫復來食梁此人倉卒直謂象欺弄之明日視􅆝遇羣猴適欲下樹試承象語語猴即各還山去遂便絶跡廣志曰有具􅆝解􅆝遼東赤􅆝魏武帝以爲粥夲草曰白􅆝味甘微寒無毒主除熱益氣有襄陽竹根者最佳黄􅆝岀青兾楚辭招䰟曰稻􅆝穱麥挐黄􅆝挐糅也以黄􅆝和而糅且香滑傅休弈雉賦曰飲以華泉之水食以􅀇山之􅆝左思魏都賦曰雍丘之􅆝東薔魏書曰烏丸地冝東薔東薔似蓬草實如葵子二十月熟也廣志曰東薔色青黒粒如葵子幽凉并皆有之西河語曰貸我東薔償我田􅆝上林賦曰東薔彫胡太平御覽卷第八百四十二
