body:
  text: 皇王部三十二隋恭皇帝李宻折王丗充折竇建德附隋恭皇帝隋書曰恭皇帝諱侑元德太子之子也母曰韋妃性聦敏有器度大業三年立爲陳王後數載徙爲代王邑万户及焬帝親征遼東令於京師惣留事十一年從幸晉陽拜太原太守尋鎮京師義兵入長安尊焬帝爲太上皇奉帝纂業大業十三年十一月壬戌上即皇帝位於大興殿詔大赦天下改義寜元年大辟罪巳下咸赦除之甲子以光禄大夫大將軍太尉唐公爲假黄􅃏使持節大都督内外諸軍事尚書令大丞相進封唐王二年三月丙辰右屯衛將軍宇文化及弑太上皇於江都宫立􅁗王浩爲帝戊辰詔唐王俻九錫之禮加璽紱逺遊􅃣緑綟緩位在諸侯王上唐國置丞相以下一依舊式五月戊午詔曰天禍隋國大行太上皇遇盗江都酷甚望夷釁深驪北憫子小子奄逮不諐哀號永感心情麋潰仰惟荼毒仇復靡申形影相吊罔知啓處相國唐王膺期命丗扶危拯溺自北徂南東征西怨惣九合於一匡决百勝於千里紏率夷夏大庇氓􅀺保乂朕躬繄王是頼德侔造化工格蒼旻兆庶㱕心暦數斯在屈爲人臣載違天命在昔虞夏揖讓相推苟非重華誰堪命禹當今九服崩離三靈改卜大運去矣請避賢路兆謀布德頋已莫能私僮命駕湏歸蕃國予夲代王及予而代天之所廢豈其如是庶慿稽古之聖以誅四凶幸值惟新之㤙預充三恪雪􅁈耻於皇祖守禋祀於孝孫朝聞夕殞及泉无恨今遵故事遜于舊邸庶官群辟改事唐朝冝依前典趣上尊号􅀂釋重􅀒感㤗兼懷假手真人俾除醜逆濟濟多士明知朕意仍􅃙有司凡有表奏皆不得以聞是日上遜位于大唐唐以上爲􅈶國公武徳二年夏五月崩時年十五史臣曰恭帝年在㓜冲遭家多難一人失德四海土崩羣盗蜂起犲狼塞路南巢遂徃流彘不歸旣鍾百六之期躬踐數終之運謳歌有屬笙鏞變響雖欲不遵尭舜之迹其庸可得乎李宻唐書曰李宻字􅀇䆳夲遼東襄平人也父寛隋上柱國蒲山公宻以父䕃爲左親侍常在仗下焬帝頋見之退謂許公宇文述曰向者左仗下黒色小兒爲誰許公對曰故蒲山公李寛子宻也帝曰箇小兒視瞻異常勿令􅀫衛他日述謂宻曰弟聦今如此當以才學取官三衛叢脞非飬賢之所宻大喜因謝病專以讀書爲事時人希見其面甞欲尋包愷乗一黄牛􅀍以蒲韉仍將漢書一帙掛於角上一手捉牛靷一手翻卷書讀之尚書令越國公楊素見於道從後按轡躡之旣及問曰何處書生躭學􅀂此宻識越公乃下再拜自言姓名又問所讀書荅曰項羽傳越公竒之與語大恱謂其子玄感等曰吾觀李宻識度汝等不及於是玄感傾心結託大業九年焬帝伐髙麗使玄感於麗陽監運時天下騷動玄感將謀舉兵潜遣人入関迎宻以爲謀主密至謂玄感曰今天子出征逺在遼外今公擁兵出其不意長驅入薊直扼其喉前有髙麗退無歸路不過旬朔賫粮必盡舉麾一召其衆自降不戰而擒此計之上也関中四塞天府之國􅀂西入長安掩其無備天子雖還失其􅁭帶據險臨之故當必尅万全之勢此計之中也􅀂隨近逐便先向東都頓堅城之下勝􅀒殊未可知此計之下也玄感曰公之下計乃上䇿也宻計遂不行及玄感敗宻乃間行入関爲捕者所獲時焬帝在髙麗宻與其黨俱送帝所及出関外防禁漸㢮宻請通市酒食每夜醼飲喧譁竟夕使者不以爲意行至邯鄲宻等七人夜穿牆而遁詣淮陽隠姓名自稱劉智逺聚徒教授經數月蜜鬱鬱不得志爲詩曰金風蕩􅀄節玉露凋晚林此夕窮塗士鬱陶傷寸心野平葭葦合村落藿䔧深眺聽良多感徙􅀝獨霑􅁭霑􅁭何所爲悵然懷古意􅁗俗猶未平漢道將何兾樊噲市井屠蕭何刀筆吏一朝時運㑹万古傳名謚􅀉言丗上英虚生眞可愧詩成而泣下數行㑹東郡賊帥翟讓聚黨万餘人宻往㱕之宻因王伯當以䇿干讓曰當今主昏於上人怨於下銳兵盡於遼東和親絶於突厥方乃廵逰楊越委弃京都此亦劉項􅁬起之㑹以足下雄才大略席卷二京誅滅􅁀虐則隋氏之不足亡也讓深加敬異遣􅀃諸小賊所至皆降宻又􅀃讓曰今兵衆旣多粮無所出􅀂直取滎陽休兵館榖待士馬肥充然可與人爭利讓以爲然於是破金堤関掠滎陽諸縣城堡多下之滎陽太守楊慶及通守張湏陁以兵討讓讓大懼將逺避之宻曰湏陁勇而無謀兵又驟勝旣驕且佷可一戰而擒之公但列陣以待爲公破之將戰宻分兵千餘人於林木間設伏讓與戰不利稍却宻發伏自後掩之湏陁衆潰與讓合擊大破之遂斬湏陁於陣讓於是令宻別統所部宻尋復􅀃讓曰昏主蒙塵播蕩吴越群兵竟起海内飢荒明公以英傑之才統驍雄之旅冝當廓清天下誅剪羣凶豈可求食草間常爲小盗而巳今東都士庶中外離心留守諸官政令不一明公親率大衆直掩興洛倉發粟以賑窮乏逺近孰不歸附百万之衆一朝可集先發制人此機不可失也讓曰請君先發僕領諸軍便爲後殿得倉之日當別議之大業十三年春宻與讓領精兵七千人出陽城北踰方山自羅口襲興洛倉破之開倉恣人所取老弱襁􅀒道路不絶衆至數千万隋越王侗遣虎賁郎將劉長恭率歩􅀐二万五千討宻宻一戰破之長㳟僅以身免讓於是推宻爲主号爲魏公二月於鞏南設壇埸即位稱元年其文書行下稱行軍元帥魏公府拜翟讓爲司徒封東郡公於是城洛口以居之隋虎賁郎將裴仁基率其子行儼以武牢歸宻因遣仁基與孟讓率兵二万餘人襲興洛倉破之入東都郛郭掠居人燒天津橋東都出兵乗之仁基等大敗宻復親率兵三万逼東都將軍叚逹等出兵七万拒之戰於故都城隋軍敗走宻復下興洛倉而據之大修營塹以逼東都仍作書數煬帝十罪以移郡縣宻兵鋒甚銳每入苑與隋軍連戰會宻爲流矢所中卧於營内東都復出兵乗之宻衆大潰弃興洛倉歸于洛口煬帝遣王丗充率勁卒五万擊之宻與戰不利丗充營於洛西與宻相拒百餘日大小六十餘戰武陽郡丞元寳藏􅀺陽賊帥李文相平原賊帥郝孝德等並歸於宻共襲破􅀺陽倉據之翟讓部將王儒信勸讓爲大􅃁􅌠㹅統衆務以奪宻之權讓兄寛復謂讓曰天子止可自作安得與人若汝不能作我當爲之宻聞其言隂有圖讓之計會丗充列陣而至讓出拒之爲丗充所擊讓軍少失利宻率精銳赴之丗充敗走明日讓至宻所欲爲宴樂具饌以待之宻引讓而坐以良弓示讓讓方引滿宻遣壯士自後斬之并殺其兄寛及王儒信讓部將徐丗勣單雄信等頓首求哀宻並釋而慰諭之乃命徐丗勣單雄信王伯當分統其衆末幾丗充襲倉城宻復破之丗充復移營洛北造浮橋悉衆以擊宻宻與千餘􅀐拒之不利而退丗充因薄其城下宻簡銳卒數百人以邀之丗充大潰乗勝䧟偃師於是修金墉城居之有衆三十餘萬將作大匠宇文愷叛東都降于宻東至海岱南至江淮郡縣莫不遣使歸宻竇建德朱粲楊士林孟海公徐圖㓪盧祖尚周法明等並隨使通表於宻勸進於是宻下官屬咸勸宻即尊號宻曰東都未平不可議此及義旗建宻􅀒其強盛欲自爲盟主乃致書于髙祖爲請兄合從以滅隋髙祖覽書􅀏曰李宻陸梁於肆不可以折簡致之吾方安輯京師末遑東討即相阻絶便是更生一秦宻今適所以爲吾南幸恐同永嘉之勢顧此中原鞠爲茂草興言感歎實疚于懷脫知動靜遟數貽報未面虚􅁭用増勞􅎮名利之地鋒鏑縱横深慎垂堂勉兹鴻業宻得書甚恱示其部下曰唐公見推天下不足可定於是不虞義師而專意於丗充俄而宇文化及率衆自江都北指􅀺陽兵十餘萬宻乃自將歩􅀐二萬拒之隋越王侗稱尊號遣使者授宻太尉尚書令東南道大行臺行軍元帥魏國公令先平化及然後入朝輔政宻將與化反相抗恐前後授敵因卑辭以報謝焉化及至􅀺陽與宻相遇宻遣徐丗勣守倉城化及攻之不能下宻知化及糧且盡因僞與和以弊其衆化及弗之悟大喜恣其兵食兾宻饋之後知其計化及怒與宻大戰于衞州之童山下宻爲流矢所中頓於汲縣化及力竭糧盡衆多叛之掠汲縣北趣魏縣宻引兵而西遣使朝于東都執弑焬帝者于弘逹以獻越王侗侗召宻入朝至温縣聞丗充作難而止乃歸金墉城宻雖據倉而無府庫兵數戰皆不獲賞又厚撫􅀄附之兵由是衆心漸怨武德元年九月丗充以其衆五千來决戰宻留王伯當守金墉自引精兵就偃師北阻邙山以待之丗充軍至宻遂敗績於萬餘人馳向洛宻將入洛口倉城邴元真以遣人潜引丗充宻隂知之不發其事欲待丗充兵半渡洛水然後擊之及丗充軍至宻候􅀐不時覺比將出戰丗充軍巳濟矣宻自度不能支引􅀐而遁徑赴武牢元眞以城降於丗充宻將如􅀺陽或謂宻曰殺翟讓之際徐丗勣幾至於死今向其所安可保乎時王伯當弃金墉保河陽宻以輕􅀐自武牢歸之謂伯當曰兵敗矣乆苦諸君我今自刎請以謝衆伯當抱宻號叫慟絶衆皆泣莫能仰視宻復曰諸軍幸不相弃當共歸􅀜中宻身雖媿無功諸君必保冨貴於是從入􅀜者尚二萬人髙祖遣使迎勞相望於道宻大喜謂其徒曰我有衆百萬一朝至此命也今事敗歸國幸蒙殊遇當思竭忠以事所奉耳且山東連城數百知吾至此遣使招之盡當歸國比於竇融勲亦不細豈不以一台司見處乎及至京師禮數益薄尋拜光禄卿封邢國公未幾聞其所部將帥皆不附丗充髙祖使宻領夲兵徃黎陽招集故時將仕經略丗充時王伯當爲左武衛將軍亦令爲副宻行至桃林髙祖復徴之宻大懼謀將叛伯當頗止之宻不從因謂宻曰義士之立志也不以存亡易心伯當荷公恩禮期以性命相報乃簡驍勇數十人着婦人衣戴􅇈䍦藏刀裙下詐爲妻妾自率之入桃林縣舎湏􅁷変服突出因據縣城驅掠畜産直趣南山時右翊衛將軍史万寳留鎮熊州遣副將盛産師率歩􅀐數千追躡至陸渾縣南七十里與宻相及彦師伏兵山谷宻軍半渡横出擊敗之遂斬宻時年三十七王丗充附又曰王丗充字行滿夲姓支西域胡人也丗充頗渉經史尤好兵法及􅀛筴推歩之術開皇中以軍功拜儀同善敷奏明習法律然舞弄文法髙下其心或有駮難之者丗充利口飾非辭議鋒起衆雖知其不可而莫能屈大業中累遷江都郡丞兼領江都宫􅁥時煬帝數幸江都丗充善候人主顔色阿䛕順旨每入言事帝必稱善乃雕飾池臺隂奏逺方珎物以媚於帝由是益昵之十年齊郡賊帥孟讓自長白山宼掠諸郡至旴􅇇有衆十餘萬丗充以兵拒大破之煬帝以丗充有將帥才略復遣領兵討諸小盗所向盡平十一年突厥圍煬帝於鴈門丗充盡發江都人將徃赴難在軍中蓬首垢面悲泣無度暁夜不解甲藉草而卧煬帝聞之以爲忠益信任之十二年遷江都通守及李宻攻䧟洛口倉進逼東都焬帝特詔丗充大發兵於洛口以拒宻又遣就軍拜丗充爲將軍趣令破賊丗充引軍渡洛氷與李宻戰丗充軍敗績乃率餘衆歸河陽時天寒大雪北至河陽􅂊以千數丗充自繫獄請罪越王侗遣使赦之徴還洛陽置營於含嘉倉城収合亡散復得萬餘人俄而宇文化及作難越王侗嗣位於東都拜丗充爲吏部尚書封鄭國公進拜尚書左僕射揔督内外諸軍事丗充去含嘉城移居尚書省專􅌠朝政以其兄丗惲爲内史令入居禁中子弟咸擁兵馬鎮諸城邑未幾李宻破宇文化及還其勁兵良馬多戰死士卒疲倦丗充欲乗其弊而擊之恐人心不一乃假託􅀑神言夢見周公乃立祠於洛水遣巫宣言周公欲令僕射急討李宻當有大功不音否則兵皆疫死充兵多楚人俗信妖言衆皆請戰丗充簡練精勇得二萬餘人馬二千餘疋軍於洛水南宻軍偃師北山上丗充令軍人秣馬蓐食遟明而薄宻宻軍潰以數十􅀐走河陽率餘衆入朝丗充盡収其衆振旅而還侗進丗充太尉以尚書省爲府備置官属丗充嘗於侗前賜食還家遂大嘔吐疑遇毒所致自是不復朝請與侗絶矣遣雲定興叚逹入奏於侗請加九錫之禮二年三月遂䇿授相國揔百揆封鄭王加九錫備物叚逹雲定興等入見於侗曰天命不常鄭王功德甚盛願陸下揖讓告禪遵唐虞之迹侗怒四月假爲侗詔䇿禪位遣兄丗惲廢侗於含涼殿僣即皇帝位建元曰開明國號鄭立子玄應爲皇太子丗充每聽朝必殷勤誨諭言詞重􅃨千端萬緒或輕􅀐遊歴街衢亦不請道百姓但避路而巳按轡徐行謂百姓曰昔時天子深㘴九重下情無由聞徹丗充非貪寳位夲欲救時今當如一州刺史每事親覽當與士庻共評朝政今止於順天門外置座聽朝又令西朝當受抑屈東朝堂受直諌於是獻書上事日有數百條流旣煩省覽難遍數日後不復更出丗充遣其姪行夲鴆殺侗謚曰恭皇帝十月丗充率東衆徇地至于滑州仍以兵臨􅀺陽丗充屯兵不散倉粟日盡城中人相食七月􅁗王率兵攻之陳兵於青城宫丗充悉兵來拒隔澗而言曰隋末䘮乱天下分崩長安洛陽各有分地丗充唯願自守不敢西侵王乃盛相侵軼逺入吾地三崤之道千里饋糧以此出師未見其可太宗謂曰四海之内皆承正朔唯公執迷獨阻聲敎東都士庻亟請王師􅀜中義勇咸思致力至尊重違衆願有斯吊伐􅀂轉禍來降則冨貴可保如欲相抗無假多言丗充無以報太宗分遣諸將攻其城鎮所至輙下九月王君廓攻拔丗充之轘轅縣於是河南州縣相次降附十一月竇建德遣人結好井陳救援之意丗充乃遣其兄子琬及内史令長孫安丗報聘且乞師四年二月丗充率兵出方諸門與王師相抗丗充軍敗因乗勝追之屯其城門丗充不復敢出但嬰城自守以待建德之援三月秦王擒建德并王琬長孫安丗等于武牢廻至東都城下以示之且遣安丗入城使言敗狀丗充惶惑不知所爲將潰圍而出南走㐮陽問於諸將皆不荅乃率其將吏詣軍門請降秦王以丗充至長安髙祖數其罪丗充對曰計臣之罪誠不容誅但陛下愛子秦王許臣不死髙祖乃釋之與兄芮妻子同徒于蜀將行爲讎人獨孤修徳所殺丗充自篡位凡三􅀊而㓕竇建德附又曰竇建德貝州漳南人也少時頗以然諾爲事􅀄里長犯法亡去㑹赦得歸父卒送葬者千餘人有所贈皆讓而不受大業七年募人討髙麗夲郡遂􅀘建德爲二百長時山東大水人多流散同縣有孫安祖家爲水所漂妻子餒死縣以安祖驍勇亦選在行中安祖辭貧自言于漳南令令怒笞之安祖刺殺令亡投建德建德舎之是􅀊山東大饑建德謂安祖曰丈夫不死當立大功豈可爲逃亡之虜也我知髙鷄泊中廣大數百里莞蒲阻深可以逃難承間而出虜掠足以自資旣得聚人且觀時變必有大功於天下矣安祖然其計建德招誘逃兵及無産者得數百人令安祖率之入泊中爲羣盗安祖自稱將軍時鄃人張金稱亦結聚得万人在河阻中蓨人髙士逹又起兵得千餘人在清河界中時諸盗徃來漳南者所過皆殺掠居人焚燒舎宅獨不入建德之閭由是郡縣意建德與賊徒交結収繫家属無少長皆殺之建德聞其家􅀍屠㓕率麾下二百人亡歸士逹士逹自稱東海公以建德爲司兵後安祖爲張金稱所殺其兵數千人又盡歸于建德自此漸盛兵至萬餘人猶徃來髙雞泊中十二年􅃰郡通守郭絢卒兵萬餘人來討士逹士逹自以智略不及建德乃推爲軍司馬咸以兵受焉建德旣􅀄統衆欲立竒功以威羣賊請士逹守輜重自簡精兵七千人以拒絢大破絢軍絢以數十􅀐遁走遣將追及於平原斬其首以獻士逹由是建德之􅀔益振隋遣太僕卿楊義臣率兵萬餘人討張金稱破之於清河所􅀗賊衆皆屠㓕餘散在草澤間者復相聚而投建德義臣乗勝至平原欲入髙雞泊建德謂士逹曰歴觀隋將善用兵者唯義臣耳新破金稱逺來襲我其鋒不可當請引兵避之令其欲戰不得空延歳月必將疲倦乗便襲擊可有大功今與争鋒恐公不能敵也士逹不從其言因留建德守壁自率精兵逆擊義臣義臣果大破士逹於陣前斬之乗勢追奔將圍建德守兵旣少聞士逹敗衆皆潰散建德率百餘􅀐亡去義臣既殺士逹以爲建德不足憂建德復還平原招集亡卒得數千人軍復大振始自稱將軍此後隋郡縣長吏稍以城降之軍容益盛勝兵十餘萬人十三年正月築壇塲於河間樂壽界中自稱長樂王年號丁丑署官属於是建德進攻河間頻戰不下其後城中食盡又聞煬帝􅀍殺郡丞王琮率士吏發䘮建德遣使吊之琮因使者請降始都樂壽號曰金城宫自是郡縣多下之武德二年宇文化及僣號於魏縣建德即日引兵討化及連戰大破之化及保聊城建德四面攻城䧟之建德入城先謁隋蕭皇后與語稱臣悉収弑煬帝元謀者斬之梟首轅門之外囚化及并其二子同攻以檻車至大陸縣斬之攻䧟洺州虜刺史􅀽子幹遷都于洺州號萬春宫又與王丗充結好遣使朝隋越王侗於洛陽後丗充廢侗自立乃絶之始自尊大建天子旌旗出入警蹕下書言詔追謚隋煬帝爲閔帝然猶依􅀝突厥隋義城公主先嫁突厥又傳化及首以獻公主旣與突厥相連兵鋒益盛南侵相州河北大使淮安王神通不能拒退奔􅀺陽相州䧟又進攻衛州䧟􅀺陽九月建德自帥師圍幽州羅藝出與戰大破之斬首千二百級先是曹州濟隂人孟海公擁精兵三萬據周橋城以掠河南之地其年十一月建德自率兵渡河以擊之四年二月建德尅周橋虜海公留其將范願守曹州悉發海公及徐圎㓪之衆來救丗充軍至滑州丗充行臺僕射韓洪開城納之遂進逼元州梁州管州皆䧟之屯于滎陽三月春􅁗王入武牢進薄其營多所傷殺并擒其將殷秋石瓉時丗充弟丗辯爲徐州行臺遣其將郭士衡領兵千人從之合衆十餘萬號爲三十萬次城臯築宫于板堵以示必戰又遣間使約丗充共爲表裏􅁗王遣將軍王君廓領輕􅀐千餘抄其糧運􅀗其大將張青特虜獲其衆建德數不利人情危駭將帥已下破孟海公皆有所􅀗思歸洺州凌敬進􅀃曰宜悉兵濟河攻取懷州河陽使重將居守更率衆鳴鼓建旗踰太行入上黨先聲後實傳檄而定漸趨壷口稍駭蒲津收河東之地此䇿之上也行此必有三利一則入無人之境師有萬全二則拓土得兵三則鄭圍自解建德將從之而丗充之使長孫安丗隂賫金玉㗖其諸將以亂其謀衆咸進諌曰凌敬書生耳豈可與言戰乎建德從之敬固争建德怒扶出焉於是悉衆進逼武牢官軍按甲挫其銳建德結陣於汜水􅁗王遣􅀐挑之建德進軍而戰竇抗當之建德少却􅁗王馳􅀐深入大破之建德中瘡竄於牛口渚車􅀐將軍白士讓楊武威生􅀗之建德所領兵衆一時奔潰妻曹氏及其左僕射齊善行將數百􅀐遁于洛州餘黨欲立建德養子爲主善行曰夏王平定河朔士馬精強一朝旣􅀍擒如此豈非天命有所㱕也不如委心清命無爲塗炭生人遂以府庫財物悉分與故將各令散去善行乃與建德右僕射裴矩行臺曹旦及建德妻率僞官属舉山東之地奉傳國八璽來降七月􅁗王俘建德至京師斬于長安市年四十九自起軍至㓕凡六歳河北悉平太平御覽卷第一百七
