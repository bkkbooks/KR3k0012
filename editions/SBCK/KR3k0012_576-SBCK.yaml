front:
  text: 太乎御覽卷第五百七十六
  hash: sha256:eff0e84348083e7f48af9fba7ae3fe8e95c8140b308faf8e3a8b54da11c16c34
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_576-1a}
body:
  text: 樂部十四磬瑟筝筑準磬􅀃文曰磬樂石也古者母句氏作磬爾雅曰大磬謂之毊徒皷磬謂之蹇郭璞曰毊音􅅝以玉飾之禮記明堂位曰垂之和鍾叔之離磬又曰諸侯之宫懸􅀕以白壯擊玉磬諸侯之僣禮也周禮春官胝膫掌擊頌聲笙磬磬在東方曰笙生也在西方曰頌或在庸功也磬師掌教擊磬又曰鳬氏爲磬也毛詩即頌曰旣和且平依我磬聲左傳曰晉師從齊師入自丘輿擊馬陘齊侯使賔媚人賂以紀甗玉磬尚書曰徐州泗濵浮磬孔安國注曰泗水涯水中見石可以爲磬論語曰擊磬襄入于海又曰子擊磬於衛有荷蕢而過孔氏之門者曰有心哉擊磬乎子擊磬者樂也蕢草噐也荷此噐賢人避丗也有心哉善其音有所病於丗國語曰魯餓臧文仲以玉磬如齊以糴東觀漢記曰王阜爲重泉令鸞集學宫阜擊磬鸞應磬而舞焉魏志曰武帝至漢中得杜䕫􅀃舊法始復設擊軒懸磬于今用之受之於杜夔也陳書曰吴明徹自壽陽入朝輿駕幸其第賜鍾磬一部三禮圖曰胶廣長三寸長尺三寸半十六枚同一筍簴謂之編磬在東方曰笙磬在四方曰頌磬山海經曰鳥危之山其陽多磬又曰小華之山其隂多磬石髙山涇水岀焉其中多磬白虎通曰磬者夷則之氣萬物之成其氣磬故曰磬有貴賤焉有親踈焉有長㓜焉此三者行然後王道得王道得然後萬物成天下樂之故樂用磬也王子年拾遺記曰浮瀛即瀛洲也上有青石可爲磬長一丈而輕􅀂鴻毛洞􅁳記曰漢武帝起招仙靈閣於甘泉宫西其上懸浮金輕至之磬也王韶之始興記曰縣下流有石室内有懸石扣之聲􅀂磬響十餘里淮南子曰孟冬之月北宫御女黒衣綵擊磬石又曰禹以五音聽政懸鍾皷磬鐸置鞀以待四方之士爲號曰教寡人以道者擊皷喻寡人以義者擊鍾告寡人以事者振鐸語寡人以憂者擊磬五經要義曰磬立秋之樂也吕氏春秋曰堯命夔拊石擊石以象上帝玉磬之音以舞百獸代夲云叔所造不知何代人又曰無句作磬古史考曰堯時人周禮冬官考工記磬氏爲磬倨句一矩有半必先度一矩爲句一矩爲股而求其絃旣而以一矩有半觸其弦則磬之倨句也磬之制有大小此假矩以定倨句非用其度也其􅀶爲一􅀶謂服􅀶􅀶廣也股爲二皷爲三三分其股􅀶去一以爲皷􅀶三分其皷􅀶以其一爲之厚郑衆云股磬之上者也皷其下小者所當擊也郑玄謂股外面皷内面也假令磬股廣四寸半者股長九寸股廣三寸長尺三半厚一寸巳上則摩其旁鄭玄云磬声太上則摩鑢其旁也郑玄謂太上声清也薄而廣則濁也巳下則摩其端太下声濁也矩而厚則清又曰磬師掌教擊磬教教視瞭磬亦編於鍾也教縵樂讌樂之鍾磬郑玄云縵謂雜声之和樂者斈記曰不斈操縵不能安絃宴謂房中之樂所謂隂声二樂皆敎其鍾磬通禮義纂曰晉賀脩奏登歌之簴采玉造小磬宗廟殿用玉郊丘用石夲法堂上樂以歌爲故名歌鍾歌磬唐制設磬於壇上之西歌鍾於東近南北向至匏竹立於壇下又曰黄帝使伶倫造磬又曰天地尚質用石磬宗廟及殿庭尚文用玉磬必用之者聲清正者隂陽之察主於金石也又曰唐禮皇后享先蚕設十二磬於辰位隂陽之察主於清濁是以用磬而不用鍾也瑟白虎通曰瑟者閑也所以懲忿窒欲正人之徳也故曰瑟有君父之節臣子法啇角則君父有節臣子有義然後四時和然後萬物生故謂之瑟大瑟謂之灑長八尺一寸廣一尺八寸二十七絃爾雅曰徒皷瑟謂之歩三禮圖曰雅瑟長八尺一寸廣二尺八寸二十三絃其常用者十九絃其餘四絃謂之蕃羸也頌瑟七尺二寸廣尺八寸二十五絃盡用也蔡邕月令章句曰瑟前其柱則清却其柱則濁毛詩鹿鳴篇曰􅊯􅊯鹿鳴食野之苹我有嘉賔皷瑟吹笙又車鄰曰旣見君子並坐皷瑟禮記曰清廟之瑟朱絃而䟽越一唱而三歎有遺音者也此雅淡之樂也言至和不在於音故不湏絙絃促柱以慆人心也論語曰由之瑟奚爲於丘之門陽貨曰孺悲欲見孔子孔子辝之以疾將命者岀户取瑟而歌使之聞之又曰仲尼問曽哲曰􅀧尓何如皷瑟希鏗尓捨瑟而作曰暮春者春服旣成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸周書曰師曠見太子晉師曠束躅其足曰善哉善哉王子曰太師乎何舉足驟師曠曰天寒之躅是以數舉也王子曰請入坐遂敷席注瑟師曠曰歌無射曰國誠寕矣逺人來觀脩義經矣好樂無荒乃注瑟於王子漢書曰萬石君石􅁬其父趙人姉能鼓瑟髙祖曰􅀂能從我乎曰願盡力於是髙祖召其姉爲美人又楊惲報孫㑹宗書曰惲本􅁗人能爲􅁗聲婦趙女也雅善鼓瑟又曰莽何羅及走趍卧内頋入行觸寳瑟僵仆金日磾得抱何羅因呼曰何羅反吕氏春秋曰古朱襄氏之治天下多風陽氣畜積果實不成故王建作爲五絃之瑟以來隂以定群瞽瞍制五絃之瑟作十五之絃舞益以八絃爲二十三絃髙誘曰王建朱襄之臣慎子曰公輸子巧用材也不能以檀爲瑟韓詩外傳曰趙王使人於楚鼓瑟遣之曰無失吾言使者受命伏而不起曰大王鼓瑟未甞􅀂今日之悲也王日然鼓瑟者固方調也使者曰調則可記其柱王曰不可天有燥濕􅁝有緩急柱有推移不可記也使者曰臣請此以諭楚之去趙千有餘里亦有􅁻凶之變凶則弔之􅁻則賀之猶柱之有推移不可記典略曰百里奚虞大夫晉君以女爲􅁗穆夫人用奚爲媵奚亡走宛楚人執之􅁗穆公知其賢欲厚貨以求之恐楚不與乃以羖羊皮贖之號五羖大夫􅁗遂以覇奚相􅁗其妻傭浣入宫見琴者之自言能鼓瑟歌曰百里奚母已死葬南溪墳巳覆以紫春莫􅀺搤伏雞西入秦五羖皮今日冨貴􅂢我爲百里奚乃識之尸子曰夫瑟二十五絃其僕人鼓之則爲􅀏賢者以其義鼓之欲樂則樂欲悲則悲雖有暴君爲之立變丗夲曰庖羲氏作瑟瑟㓗也一使人精㓗於心淳一於行也王子年拾遺録白圎山其形圎也有木林疾風震地而林木不動以其木爲瑟故曰静瑟也黄帝使素女鼓庖羲氏之瑟滿席悲不能已後破爲七尺二寸二十五絃韓子曰齊宣王問巨倩曰儒者鼓瑟乎對曰不也瑟者也以小絃爲大聲以大絃爲小聲是細大以易序貴賤易位儒者爲害義故不能宣王曰善筝􅀃文曰筝皷絃筑身樂也風俗通曰謹按樂記筝五絃筑身也今并涼州筝形如瑟不知誰作也按京房制五音唯加瑟十三絃此乃筝也今雅樂筝十二絃他樂皆十三絃如筝稍小曰雲和樂府不用史記曰􅁗逐客李斯上書曰夫擊甕缶彈筝􅅮髀而歌嗚嗚使快耳者真􅁗之聲晉書曰謝安壻王國寳專利無檢行安􅁖其人每抑之武帝末年􅄝酒而㑹稽王道子昏醟尤甚於是國寳䜛䛕之計稍行於王相之間而好利險陂之徒以安功名盛極構之嫌􅂩遂成帝召桓伊飲讌謝安侍坐帝令伊吹笛伊神色無迕即吹爲一弄乃放笛云臣於筝分乃不及笛然自以韻合歌管請筝歌并請吹笛人帝善其調逹乃勑御府對曰御府於臣必自不合臣有一奴善相便串帝弥賞其放率乃許召之奴旣吹笛伊便撫筝而歌曰爲君旣不易爲臣良獨難忠信事不顯乃有見疑患周旦佐文武金縢功不刋推心輔王政二叔反流言其聲慷􅁣俯仰可觀安泣下沾衿乃越席而就之捋其􅂡曰使君於此不凢帝甚有愧色梁書曰羊偘字祖忻身長七尺八寸雅愛文史及孫吴兵法􅁎妾列侍窮極奢靡有彈筝人陸大喜著鹿角􅀲長七寸舞人張浄琬􅆎圍一尺六寸時人咸云能掌上舞俗􅀃曰謝仁祖爲豫州主簿在桓温閣下聞其善彈筝便呼之旣至取筝與令彈謝即理絃撫筝因歌曰秋風意殊道桓大以此知之取謝引詣府襄􅃆記曰辛居士名宣仲隴西人大明末寓居襄陽縣西六里多植松竹栖遟其下静嘿不交塵俗林中起一草廬容􅂰而已善彈筝與淮南胡陶京兆駱惠度同志爲友常共讌集此林陶能吹笛惠度工歌拾林下絃管道韻時人謂之三公樂宋邵陵王休􅀂爲南雍州刺史躬徃浩焉宣仲正在林中彈筝了不廻顧逡廵致筝於席延邵陵與語􅂊􅄒寒温而巳時邵陵客有述其旨者授筝令彈再三固請荅曰幸非王門伶人何事見逼所勝於君者正舉止自由若聞君鞫躬復與君何異占對詳雅衆不能屈齊文惠臨州吴興沈約奉教聘引並不降志約乃共論文章宣仲輙言莊老旣各言其志不能相屈建武中遇疾卒惠度及陶並不知所終英雄記曰吕布詣􅀽紹紹患之布不自安因求還洛陽紹聽之丞制使領司􅊢校尉遣壯士送布而隂殺之布疑其圗巳乃使人鼓筝於悵中潜自遁出夜中兵起而布己亡紹聞懼爲患募追之皆莫敢近遂復歸燉煌實録曰索丞宗伯夷成善鼓筝悲歌能使喜者墮淚改調易謳能使戚者起舞時人号曰雍門周魏畧曰游楚好音樂乃畜琵琶筝每行將以自隨吴質別傳曰魏文帝與吴質書曰斬泗濱之梓以爲筝傳子曰郝素善彈筝雖伯牙妙手吴􅁎竒聲何以加之􅀓玄筝賦序曰以爲䝉恬所造今觀其器上崇似天下圎似地中空准六合絃柱擬十二月設之則四象在皷之則五音發斯乃智仁之器豈蒙恬亡國之臣所能閞思哉合清樂筝並十有二絃他樂皆十三絃軋筝以行竹潤其端而軋之彈筝以骨􅀲長寸餘以代指也筑樂書曰筑者形如頌琴施十三絃頂細肩圎品聲按柱鼓法以左手扼之右手以竹尺擊之隨調應律唐代編入雅樂也釋名曰筑以竹鼓之也如筝細項案今制身長四尺二寸項長三寸圍四寸五分項七寸五分闊七寸五分下闊六寸五分史記曰髙漸離善擊筑與荆軻友見軻刺􅁗王不中而死乃變姓名入􅁗欲爲軻報讎市中擊筑而乞人觀而美奏之􅁗王聞召之於前擊之王恱猶以疑焉熏其兩目置於帳中王躭之親近於漸離漸離望􅁗王歎息之聲舉筑以擊中王􅂰王怒之又曰髙祖過沛大享故人父老酒酣髙祖擊筑而歌曰大風起兮雲飛揚威加海内兮歸故郷又曰荆軻之燕與屠狗髙漸離飲於燕市酒酣髙漸離擊筑荆軻和而於市中相樂也己而相泣旁􅀂無人準京房曰準竹聲不可以度調故作準以定數準之狀如瑟長一丈而十三絃隠間九尺以應黄鍾之九寸中央一絃下有書分寸以爲六十律清濁之節矣太平御覽卷第五百七十六
