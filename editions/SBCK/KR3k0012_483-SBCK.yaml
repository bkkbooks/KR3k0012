body:
  text: 人事部一百二十四怒怨怒􅀃文曰怒恚也易曰君子懲忿窒慾尚書曰今商王受弗敬上天降災下民皇天震怒命我文考肅將天威毛詩曰君子如怒亂庻遄沮又曰王赫斯怒爰整其旅又曰薄言徃愬逢彼之怒又曰如震如怒闞如虓虎禮記曰父母怒不恱而撻之流血不敢疾怨起敬起孝左傳曰公孫閼與頴考叔争車頴考叔挾輈以走輈車轅也子都拔􅁄以逐之子都公孫閼也及大逵弗及子都怒又曰齊侯遊于姑焚遂田于貝丘姑焚具丘皆齊地也見大豕從者曰公子彭生也怒曰彭生敢見射之豕人立而啼公懼墜于車傷足䘮屨又曰齊侯蔡􅁎乗舟于囿蕩公公懼變色禁之不可公怒歸之未之絶也蔡人嫁之齊侯以諸侯之師侵蔡蔡潰又曰先軫朝問􅁗囚公曰夫人請之吾舎之矣先軫怒曰武夫力而拘諸原婦人暫而免諸國隳軍實而長宼讎亡無日矣不顧而唾公使陽處父追之及諸河則在舟中矣又曰楚子使申舟聘于齊曰無假道於宋及宋華元曰過我而不假道鄙我也鄙我亡也殺其使者必伐我伐我必亡亡一也乃殺之楚子聞之投􅃑而起屨及於窒皇劒及於寢門之外車及於蒲胥之市秋九月楚子圍宋又曰衆怒不可犯又曰衛獻公戒孫文子寗惠子食皆服而朝日肝不召而射鴻於囿二子從之不釋皮冠而與之言二子怒而逐獻公又曰邾莊公與夷射姑飲酒私岀閽乞肉焉奪之杖以敲之公在門臺臨庭閽以缾水沃庭邾子望見之怒閽曰夷射姑旋焉旋小便也命執之弗得滋怒自􅄬于牀論語曰哀公問弟子孰爲好學孔子對曰有顔囬者好學不遷怒不貳過不幸短命死矣今也則亡國語曰􅀳郄獻子如齊聘齊傾公使婦人觀而􅀏之獻子怒歸請伐齊范武子退自朝曰郄子之怒甚矣不逞於齊必發諸􅀳國逞觧不得政何以逞怒余將致政焉以成其怒也史記曰孟甞君客于趙平原君趙人聞孟嘗賢出觀皆􅀏曰始以薛公爲魁梧也今視之乃眇小丈夫耳孟甞聞之怒客與俱者下斫撃數百人遂滅一縣以去又曰韓信使人言漢王曰齊反覆之國南邊呉楚不爲假王鎮之其􅀔不定漢王大怒罵曰吾困於此旦暮望若佐我張良陳平躡漢王足因附耳曰漢方不利寕能禁信乎不如因而立之漢王復罵曰大丈夫定諸侯即爲真王何以假爲又曰趙使藺相如賚璧西入􅁗􅁗王坐章臺見相如相如奉璧􅁗王大喜傳璧以示美人及左右左右皆呼萬歳相如視􅁗王無意償趙城乃前曰璧有瑕請指示王王授璧相如因持璧却立􅀝柱怒髪衝冠謂􅁗王曰趙王齋戒五日使臣奉璧拜送於庭何者嚴大國之威以脩好也今臣至大王見臣列觀禮節甚倨得璧傳之以示美人以戯弄臣臣觀大王無償城意故臣復取璧大王必撃臣臣頭今與璧俱碎於柱矣持璧睨柱􅁗王恐其破乃辭謝固請又曰鄒陽上書於梁王曰蘇􅁗相燕燕人惡之於王王按劒而怒食以駃騠漢書音義曰駃騠馬也生七日而超其母漢書曰項羽令壯士出挑戰漢有善􅀐射曰樓煩應劭曰樓煩胡也今有樓煩縣楚戰三合樓煩輙射殺之羽大怒自􅀍甲持㦸挑戰樓煩欲射羽羽瞋目叱之樓煩目不能視手不能發走還璧中不敢復岀又曰沛公從百餘􅀐見項羽於鴻門沛公起如厠招樊噲出獨􅀐噲與靳強滕公紀成晉灼曰紀通父歩從間道赴軍使良留謝羽羽問沛公安在良曰聞將軍有意督過之脫身去至軍矣故使臣獻璧羽受又獻玉斗於范増范増怒撞其斗起曰吾属今爲沛公虜矣又曰黥布反上自征望布軍置陣如項籍軍上惡之與布相見謂布何苦而反曰欲爲帝耳怒罵之遂戰破布軍又曰文帝曰吾獨不得廉頗李牧爲將豈憂匈奴哉馮唐曰陛下雖得廉頗李牧不能用也上怒起入禁中又曰上獵上林中車駕未行先使韓嫣乗副車從數百􅀐馳視獸江都王望見以爲天子辟從者伏謁道旁嫣驅而不見旣過江都王怒爲皇太后泣請得歸國入􅀫衛比韓嫣太后比銜嫣嫣侍出入永巷不禁以姧聞皇太后怒使使賜嫣死上爲謝終不得嫣遂死東觀漢記曰更始韓夫人尤􅄝酒毎侍飲見常侍奏事輙怒曰帝方對我用此時事來􅁘起手抵破書案又曰龐萌爲平狄將軍與盖延共擊董憲昭詔書獨下延而不及萌萌以爲延譛巳自疑遂反上聞之大怒乃自將兵討萌與諸將書曰吾常以龐萌爲社稷臣將軍得無􅀏其言乎又曰鄧晨南陽人與上起兵新野吏乃燒晨先祖祠堂汚池室宅焚其􅃁墓宗族皆怒曰家自冨足何故隨婦家入湯鑊中晨終無恨色又曰有詔㑹議靈臺所上謂桓譚曰天下事吾欲䜟决之何如譚黙然良乆曰臣不讀䜟上問其故譚復極言䜟之非經上大怒曰桓譚非聖無法將下斬之譚叩頭流血良乆得解出爲六安郡丞又曰戴慿爲侍中數進見門得失上謂慿曰侍中當輔國政勿有隱情慿曰太尉西曹􅁺蔣遵清亮忠孝學通古今陛下納膚受之譛遂禁錮丗以是爲嚴上怒曰子復欲黨乎慿出自繫廷尉詔出引見慿謝曰臣無謇諤之節而有狂瞽之言上即勑尚書解遵禁錮又曰韓歆字翁君南陽人以從征伐有功封扶陽侯好直言爲司徒甞因朝㑹帝讀隗􅅝公孫述相與書歆曰亡國之君皆有才桀紂亦有才上大怒以爲激發免歸田里上猶不釋復詔就責歆及子嬰皆自殺又曰竇憲恃宫掖聲􅀔遂以賤直奪沁園公主不敢訴後肅宗駕出過園指以問憲憲隂嗚不得對發覺帝大怒召憲切責曰今貴主尚見枉奪何况小臣乎又曰杜根和熹鄧后臨朝根以安帝年長冝親政事乃上書直諌太后大怒收根嚢盛撲殺之執法者私語行事人使不加力旣而載出城外根詐死三日目中生蛆因逃竄及鄧氏誅根方歸徴拜侍御史魏志曰太祖討張魯東還時有將軍許遊擁部曲不附太祖大怒先欲討之羣臣多諌可招懷遊共討強敵太祖橫刀於􅂰作色不聽繆襲欲諌太祖逆謂之曰吾計巳定卿勿復言襲曰若殿下計是耶臣方助殿下成之􅀂殿下計非􅁘雖成冝敗之殿下逆令臣勿言何待下之不闡乎方今豺狼當路而狐狸是先人將謂殿下避強攻弱進不爲勇退不爲仁臣聞千石之弩不爲鼷䑕發機萬鈞之鍾不以筳橦起音今區區之遊何足以勞神哉太祖曰善遂厚撫遊遊即歸服又曰夏侯惇從征吕布爲流矢所中傷左目時夏侯淵與悙俱爲將軍軍中號悙爲盲夏侯悙惡之每覧照恚怒輙撲照着地又曰諸􅁑亮旣屢遣使交書於司馬宣王又致巾幗婦人之飾以怒宣王將出戰辛毗仗節勒軍吏以下乃止呉志曰吕蒙字子明少依姉夫鄧當當爲孫䇿將數討山越蒙年十五六隨當擊賊顧見呵不能禁歸告其母恚怒欲罰之蒙曰貧賊難居設有功冨貴可致且不探虎穴安得虎子母哀而舎之又曰孫權爲呉王忻宴之未自起酒虞翻伏地佯醉不持權去翻起坐權大怒手劒欲擊之侍坐者莫不惶遽唯大農劉基起抱權諌曰大王以三爵後殺善士翻雖有罪天下孰知之權曰曹孟德殺孔文舉􅀌於虞翻何有哉蜀志曰姜維爲鄧艾所摧還隂平㝷􅀍後主勑命乃投甲詣㑹於涪軍將士咸怒拔刀斫石􅀳書曰王導妻曹氏妬導憚之乃宻營别館以處衆妾曹氏知而將徃焉導恐遲之以所執麈尾柄驅牛而進司徒蔡謨聞之戯導曰朝廷欲加公九錫導弗之覺但謙退而巳謨曰不聞餘物唯有短轅犢車長柄塵尾導大怒謂人曰吾徃與群賢共遊洛邑日何曽聞有蔡克死又曰郗超實黨栢氏以父愔忠於王室不令知之將亡出一箱書付門生曰夲欲焚之恐公年尊必以傷􅉖爲􅁦我亡後可呈此箱不尔便燒之愔後果哀悼成疾門生依旨呈之則悉與温徃反宻計愔於是大怒曰小子死恨晚矣又曰周訪爲荆州王敦以訪名將勲業隆重有疑色其從事中郎郭舒􅀃敦曰荆州雖遇宼難荒􅁦實爲用武之國􅀂以假人將有尾大之患公冝自領以爲梁州足矣敦從之訪大怒敦手書譬釋并遺玉環玉椀以申厚意訪投椀於地曰吾豈賈竪可以寳恱乎又曰陶侃甞出遊見人持一把未熟稻問用此何爲人云行道所見聊取之耳侃大怒曰汝旣不佃而戯賊人稻執而鞭之齊書曰􅀽􅂏性剛甞以微言忤丗祖又與王晏不恊丗祖在便殿用金柄刀子治爪晏在側曰外聞有金刀之言恐不冝用此物丗祖愕然窮問所以晏曰􅀽􅂏爲臣􅀃之上銜怒良乆􅂏到郡坐逆用禄錢免官崔鴻後趙録曰冉閔爲慕容恪所擒慕容雋立問閔曰汝奴僕下才何自妄稱天子閔曰尔曹人靣獸心欲􅆲逆我一時英雄何爲不作帝王耶雋怒鞭之三百後魏書曰李彪之入京也􅀌微寡援而自立不群以李沖好士傾心宗附冲亦重其噐學禮而納焉毎言之髙祖公􅀻共相援益及彪爲中尉兼尚書爲髙祖知待便謂非復籍冲而更相輕背唯公歛􅃑而巳冲時震怒數責彪前􅄽瞋目大呼投折几案詈辱肆口冲素温柔而一旦暴急遂發病荒悸言語亂錯猶扼腕叫詈稱李彪小人然醫藥所不能療或謂肝藏傷裂旬有餘日而卒列子曰宋有蘭子能以伎干宋元君􅀟杖屬其腦弄七劒而躡之元君立賜金帛又有蘭子能䴏戯聞之復以干元君元君大怒曰昔有異􅇊􅃴值寡人有忻心故賜金帛彼必聞此復望吾賜拘而戮之莊子曰孔子徃見盗跖下車而前謁者通之盗跖聞之忿怒目如明星髪上指冠孔子趍而進避席反走再拜盗跖大怒而展其足按劒嗔目其聲如吼虎韓子曰孟孫獵得麑使􅁗巴持之其母隨而呼􅁗巴不忍而與其母孟孫適至求麑不得大怒逐之居三月復召使爲子􅀓燕丹子曰田光荅太子曰􅀼觀太子客皆無可用者夏扶血勇之人怒而面赤宋意脉勇之人怒而色青武陽骨勇之人怒而色白荆軻神勇之人怒而色不變呉越春秋曰呉王伐齊請公孫聖告之聖諌願大王勿伐齊王大怒曰吾天之所生神之所助使力士石畨撃以鐵槌身絶爲五呉越春秋曰子胥諌呉王王怒賜以钃鏤之劒盛以鴟夷之噐投之于江􅀃􅁐曰􅁗王以五十里封􅋣陵君􅋣陵君辭不受使唐且謝􅁗王􅁗王怒曰甞見天子之怒乎一怒伏尸百萬流血千里唐且曰大王甞聞布衣韋帶之士怒乎伏尸二人流血五歩即按其匕首起視􅁗王曰今將是矣王變色長跪曰先生就坐寡人諭矣列士傳曰􅁗召魏公子無忌無忌不行使朱亥奉璧一􅀟􅁗王大怒將朱亥著虎圏中亥瞋目視虎眥裂血出濺虎虎不敢動怨尚書曰商王受自絶于天結怨于民崇信姧回放黜師保又曰怨豈在明不見是圗毛詩曰亂丗之音怨以怒其政乖又曰角弓父兄刺幽王也不親九族而好讒佞骨肉相怨故作是詩又曰民之無良相怨一方左傳曰宋華元將與楚戰殺羊食士其御羊斟不與及戰曰疇昔之羊子爲政今日之事我爲政與入鄭師故敗君子謂羊斟非人也以其私怨敗國殄民又曰晉侯賞從亡者介之推不言禄禄亦弗及其母曰盍亦求之以死誰懟對曰尤而効之罪又甚焉且出怨言不食其食又曰季郈之雞􅋐季平子郈昭伯季氏芥其雞郈氏爲之金距平子怒益室於郈且譲之故郈昭伯怨平子又曰晉郗至獻楚捷于周與單襄公語驟稱其伐單子語諸大夫曰温季其亡乎位於七人之下而求掩其上怨之所聚亂之本也多怨而階亂何以在位又曰呉公子札來聘請觀於周樂爲歌周南召南曰美哉始基之矣猶未也然勤而不怨矣爲之歌小雅曰美哉思而不貳怨而不害其周德之衰乎又曰子産曰我聞忠恕以積怨不聞作威以防怨又曰君子之言信而有徴故怨逺於其身小人之言僣而無徴故怨咎及之論語曰放於利而行多怨又曰貧而無怨難冨而無驕易國語曰夫事君者險而不懟怨而不怒戰國䇿曰趙襄子怨智伯􅃮其頭爲飲器漢書曰汲黯列九卿而公孫洪張湯爲小吏及弘湯稍與黯同位而尊用過之黯心􅄶不能無怨望見上言曰陛下用群臣如積薪耳後來者居上東觀漢記曰長水校尉耿恭坐將兵不憂軍事肆心縱欲飛鷹走狗遊戲道上虜至不敢出得詔書怨懟徴下獄續漢􅀕祀志曰建武二十年二月群臣上言即位三十年冝封禪太山詔書曰即位三十年百姓怨氣满腹吾誰敢欺欺天乎􅀳書曰趙王倫謟事賈后裴頠甚惡之倫數求官頠與張華復固執不許由是深爲倫所怨玉韶之晉紀曰桓玄問衆曰朕其敗乎曹靖之對曰神怒民怨臣實憂懼玄曰民怨有之神何爲怒對曰移􅀳宗廟所以怒也管子曰凡禍亂之所生各在於非理故曰閑禍在除怨晏子春秋曰景公籍重而獄多拘者滿圄怨者滿朝文子曰人有三怨爵髙者人妬之官大者王惡之禄厚者怨處之夫爵益髙者意益下官益大者心益小禄益厚者意益薄淮南子曰和氏之璧夏氏之璜揖譲而進之則忻暮夜以􅄬人則爲怨時與不時也楚辭曰怨靈脩之浩兮終察夫民心衆女妬余之娥眉兮譛䛹謂余善淫譛毁也䛹譛也琴操曰王昭君者齊國襄王之女也昭君年十七時顔色皎㓗聞於國中襄王見昭君端正閑麗於孝元帝旣不幸納備後宫積五六年王昭君心有怨曠不飾其形容元帝毎歷後宫踈略不過其處後單于遣使者朝賀元帝陳設倡樂乃令後宫莊出昭君怨恚乆不得侍列乃更脩飾盛服形容光輝帝令後宫欲至單于者起於是昭君喟然越席而前曰妾幸得備在後宫麄醜卑陋不合陛下之心誠願得元帝見昭君便驚悔不得復止遂以與之王昭君雖去漢至單于心思不樂乃作怨曠思惟歌曰秋木萋萋其葉萎黄我獨伊何改徃變常翩翩之䴏逺集西羌髙山峨峨河水泱泱父母妻子道里悠長嗚呼哀哉憂心惻傷太平御覽卷第四百八十三
