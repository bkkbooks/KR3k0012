front:
  text: 太平御覽卷第九百七十二果木部九
  hash: sha256:6e20532397024b4d760558fd8f472f7c0bbbe859de6aba08bba3cc86db4a695c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_972-1a}
body:
  text: 蒲萄橄攬椰楊梅沙棠枸櫞益智桶子檖蒲萄史記曰大宛以蒲萄爲酒冨人藏酒至萬餘石乆者數十歳不敗漢使取其實來於是離宮別觀傍盡種蒲萄漢書曰李廣利爲二師將軍破大宛得蒲萄種歸漢續漢書曰扶風孟他以蒲萄酒一斛遺張讓即以爲凉州刺史三輔決録又載魏文帝詔羣臣曰中國珎果甚多且復爲􅀃蒲萄當其朱夏渉秋尚有餘暑醉酒􅀫醒掩露而食甘而不䬼爲縣切脆而不酸冷而不寒味長汁多除煩解䬼又釀以爲酒甘於麴蘖善醉而易醒道之固以流㵪音羡咽唾况親食之即他方之果寜有疋者崔鴻十六國春秋前凉録曰張賦文字洪茂燉煌人也作蒲萄酒賦文致甚羙又後凉録曰建元二十年吕光入􅀛兹城胡人奢侈冨於生養家有蒲萄酒或至干斛經十年不敗北齊書曰李元忠曽貢丗宗蒲萄一盤丗宗報以百練縑遺其書曰儀同位亞台鉉識懷貞素岀藩入侍備經要重而猶家無擔石室若懸罄豈輕財重義奉時愛巳故也乆相嘉尚嗟詠無極􅁪思標賞有意無由忽辱蒲萄良深佩戴聊用絹百疋以酬清徳唐書曰髙祖賜群臣食於御前果有蒲萄侍中陳叔逹執而不食髙祖問其故對曰臣母患口乾求之不能得髙祖曰卿有母可遺乎遂流涕嗚咽乆之乃止因賜物百叚又曰蒲萄酒西域有之前代或有貢獻人皆不識及破髙昌收馬乳蒲萄實於菀中種之并得其酒法太宗自損益造酒爲凡有八色芳辛酷烈味兼醍益旣頒賜群臣京師始識其味又曰太宗時葉護獻馬乳蒲萄一房長二丈餘子亦稍大其色紫又曰李直方常第果實若貢士者以緑李爲首芳梨爲副櫻桃爲三甘橘爲四蒲萄爲五或薦荔支曰􅀉舉之首也又曰􅄢賔在䓗嶺南踰縣度經􅀬坂其地暑濕人皆乗馬士冝秔稻多甘蔗蒲萄草木凌寒不死金樓子曰大月氏國善爲蒲萄花葉酒或以根及汁醖之其花似香而緑榮碧􅂡夏春之時萬頃競發如鸞翼八月中風至吹葉上傷裂有似綾紈故人呼風爲蒲萄風亦名爲裂葉風漢武帝内傳曰西王母甞下帝設蒲萄酒杜篤邊論曰漢征匈奴取其胡麻稗麥苜蓿蒲亦廣地也廣志曰蒲萄有黄白黒三種雲南記曰雲南多乾蒲萄楊衒之洛陽伽藍記曰白馬寺浮圖前荼林蒲萄異於餘處枝葉䌓衍子實甚大荼林實重七斤蒲萄實偉於􅀥味並殊羙冠於中京帝至熟時常詣取之或復賜官人得之轉餉親戚以爲竒異得者不敢輙食乃歷數家京師語曰白馬甜榴一實直牛唐景龍文館記曰四月上巳日上幸司農少卿王光輔㽵駕還頓後中書侍郎南陽岑羲設茗飲蒲萄漿與學士等討論經史又曰大學士李嶠入東都祔廟學士等祖送城東上令中官賜御饌及蒲萄酒􅀶物志曰西域有蒲萄酒積年不敗彼俗傳云可至十年飲之醉彌日不解又曰張騫使西域還得蒲萄晉宫閣名曰華林園蒲萄百七八十株􅁗州記曰􅁗野多蒲萄夲草經曰蒲萄生五原隴西燉煌益氣強志令人肥健延年輕身王逸荔支賦曰西旅獻崐山之蒲萄鍾㑹蒲萄賦曰余植蒲萄於堂前嘉而賦之命荀朂並作應禎蒲萄賦曰結繁子之礧落兮英籠揔而彌房傳玄蒲萄賦曰踰龍堆之險越懸度之阻渉乎三光之阪歴乎身􅀬之野橄欖金樓子曰有樹名獨分爲二枝其東向一枝是木威樹南向一枝是橄欖樹南越志曰愽羅縣有合成樹十圍去地二丈分爲三衢東向一衢木葉似練子如橄欖而硬削去皮南人以爲糝南向一衢橄欖西向一衢橄欖裴淵廣州記曰橄欖澁酒廣志曰橄欖大如鷄子交州以飲酒南州草木􅃺曰橄槄子大如􅀥二月華八九月熟生食味酢􅁡藏乃甜羙交阯武平興古九真有之臨海異物志曰餘甘子梭形􅀄入口舌澁酸飲水乃甘又如梅實核兩頭銳呼爲餘甘橄欖同一物異名耳嶺表録異曰橄欖樹身聳枝皆髙數尺其子深秋方熟閩中尤重味云咀之香口勝含鷄舌香生喫及煑飲悉解酒毒有野生者子繁樹峻不可梯縁但刻其根下方寸許内塩於其中一夕子皆自落樹枝節上生脂膏如桃膠南人採之知其皮葉煎之調如黒􅃬謂之橄欖糖用泥舡損乾後牢於膠􅃮着水益乾堅耳左思吴都賦曰龍眼橄欖椰隋書曰林邑國人深目髙鼻髮拳色黒俗皆徒跣以幅布􅆞身冬月衣􅂁婦人椎髻施椰葉蓆唐書曰訶陵國俗以椰樹花爲酒其樹生花長三尺餘實大如人脛割之取汁以成酒味甘飲之亦醉南夷志曰荔支㯽榔訶梨勒椰子桄榔等諸樹永昌麗水諸山皆有之雲南記曰南詔遣使致南國諸果有椰子􅃺如大牛心破一重麄皮刮盡又有一重硬殻有小孔以筯穿之内有漿二合餘味甘色白又曰雲南多椰子亦以􅁡漬之爲糝廣志曰椰樹髙六七丈無枝條有葉如束蒲乃在樹末實如大瓠􅀲懸在樹頭實外有皮中有核皮裏有汁􅂛餘清如水羙如􅁡可飲核中膚白如雪厚半寸味如胡桃而羙可食岀交阯家家種之南方草木狀曰椰二月花花仍蓮着實房連相累房三十或二十七八子十一月十二月熟其樹黄俗名爲丹横破之可作椀子長如䄆樓子交州記曰椰子有漿截花以竹䇶承取汁作酒飲之亦醉神異經曰東南荒中有椰木椰髙二三丈或十餘丈圍丈餘或七八尺葉三百歳盡落而華華如甘􅀲華華盡落而生蕚蕚下生子三歳而熟熟後不長不減形如寒􅀲長七八寸徑四五寸南州異物志曰椰􅀣大三四圍長六丈通身無枝至百餘年有葉葉􅃺如蒲長四五尺直竦指天實生葉間皮苞之如蓮􅃺皮肉硬過於核中肉白如鷄子着皮而腹内空含汁大者含升餘實形􅇛􅇛然或如􅋎樓横破之可爲爵並堪器用南人珎之異物志曰椰樹髙六七丈無枝條葉如束蒲在上其實如瓠繫之巔實外皮如胡蘆膚中有汁升餘清如水味羙於􅁡食其膚則不飢食其汁則増渴又有如兩眼處俗號椰子爲越王頭嶺表録異曰椰子樹亦􅀋海㯶實号椰子大如甌盂外有麄皮如火腹次有硬殻圎而且堅厚二三分有圎如􅆑者即截開一頭砂石摩之去其皴皮其爛斑錦文以白金裝之以爲水鑵子珎竒可愛殻中有液數合如乳亦可飲之冷而動氣左思吴都賦曰椰葉無䕃俞益期牋曰有清漿數斗懸於長木之端終不乾故爲小異楊梅金樓子曰楊周年七歳甚聦惠孔君平詣其父父不在乃呼兒出爲設果有楊梅孔公指以示兒曰此真君家果兒􅀿聲荅曰未聞孔雀是夫子家禽􅀶物志曰地有章名則生楊梅南越志曰熈安縣白蜀里多楊梅張公以爲名章則多楊梅此偶以所聞而命書後好事改地就之耳求之白蜀去之逺矣裴淵廣州記曰盧山頂有湖楊梅繞其際人登者止得於山飽食不得持下吴興記曰故章縣縣北有石槨山出楊梅常以貢御張華所謂地名章必生楊梅蓋謂此也食經曰藏楊梅法取完者一斛塩漬之曝乾别取杭皮二斤煑汁塩漬之不加􅁡漬梅色如􅀄羙好可留數月臨海異物志曰楊梅其子如彈丸正赤五月中熟熟時似梅味甘甜酸梁江淹楊梅頌曰懷蘂挺實涵黄橘丹鏡日繡壑照霞綺巒沙棠山海經曰崑崙之山有木焉狀如棠棠梨黄華赤實味如李而無核名曰沙棠可以却水吕氏春秋曰伊尹􅀃曰果之羙者沙棠之實南越志曰寜郷果多沙棠笁法真登羅浮山䟽曰羅浮山有沙棠華黄實赤味甘如李枸櫞裴淵廣州記曰枸櫞樹似橘如柚大而倍長味竒酢皮以􅁡煑爲劉欣期交州記曰拘櫞如柚核細異物志曰枸櫞實橘大如飯筥皮不香味不羙可以浣治􅁑紵􅀂酸漿嶺表録異曰枸櫞子形如􅀲皮以橙而金色故人重之愛其香氣京輦豪貴家釘盤筵憐其逺方異果肉甚厚白如蘿蔔南中女工競取其肉雕鏤花鳥浸之蜂􅁡􅀧以燕脂擅其妙巧亦不譲湘中人鏤木􅀲也益智十三國春秋曰安帝元年盧脩爲廣州刺史脩遺劉􅁉益智粽􅁉乃荅以續命湯顧徽廣州記曰益智葉如蘘荷莖如竹箭子從心中岀一枝有十子子内白滑四破去之取外皮􅁡煑爲粽子味辛周景式廬山記曰山果有益智蒲萄廣志曰益智葉以襄荷長丈餘其根上有小枝髙八九寸无葉蕚其子藂生之如􅀥中辨黒皮白核小者曰益智含之隔涎濊岀壽萬亦生交阯南方草物狀曰益智如筆毫長七八分二月華五月六月熟味辛中芬香岀交阯合浦陳祁暢異物志曰益智􅀋薏苡長寸許如枳椇子味辛刺飲酒食之佳惠逺法師荅盧循書曰損餉深抱情至益智乃是一方異味即於僧中行之桶子廣志曰桶子似木􅀲樹木南方草物狀曰桶子木如鷄夘三月華八月九月熟味酸酢或以􅁡藏滋味甜美岀交阯劉欣期交州記曰如桃陳祁暢異物志曰䅽子之􅀣枝葉四布技葉滿蘇如車盖也名同種異味實甜酢與作􅁓榖同名而實大異也果而無核裏靣如素析酒止酲更爲遺賂檖毛詩秦車轔晨風曰隰有樹檖毛云赤羅或云山梨今人謂之楊檖樹實如梨但小耳一名庶梨一名䑕梨陸機毛詩䟽義曰樹檖一名赤羅一名山梨今人謂之楊檖樹及實如梨伹實竒小耳一名鹿䑕一名䑕梨齊郡廣縣堯山魯國河内共北中有今人亦種之極有美者赤梨之脆美者爾雅曰檖羅也郭氏曰今楊檖也實似梨而酢可食也廣志曰陽檖子似梨大如杏可食晉宫閣名曰華林園陽檖二株太平御覽卷第九百七十二
