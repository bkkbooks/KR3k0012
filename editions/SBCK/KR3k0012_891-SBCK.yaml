front:
  text: 太平御覽卷第八百九十一
  hash: sha256:2b6a03193af03cb404026679e420331620fdbb533f4257df07866fc583b3f9f1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_891-1a}
body:
  text: 獸部三虎上􅀃文曰虎山獸之君也春秋運斗樞曰樞星散而爲虎易履卦曰履虎尾不咥人亨又頥卦曰虎視耽耽其欲逐逐易革卦九五象曰大人虎變其文炳也易通卦驗曰立秋虎始嘯月令曰仲冬虎始交禮記曰孔子過太山側有婦人􅂘於墓者而哀夫子式而聽之使子貢問之曰子之哭也一似重有憂者而曰然昔吾舅死於虎吾夫又死焉今吾子又死焉夫子曰何爲不去曰無苛政子曰小子識之苛政猛於虎也左傳宣四年曰若敖娶於䢵生􅃲伯比若敖卒從其母畜於䢵淫於䢵子之女生子文焉䢵夫人使弃諸夢中夢澤虎乳之䢵子田見之懼而歸夫人以告告女私通所生遂使收之楚人謂乳爲榖謂虎爲於莬故命之曰􅃲榖於莬春秋考異郵曰三九二十七七者陽氣成故虎七月而生陽立於七故虎首尾長七尺般般文者隂陽􅄂也春秋演孔圖曰天命湯白虎戲朝其終白虎在野爾雅曰甝白虎漢宣帝時南郡􅀗白儵虎獻其皮骨爪牙也虎里虎虪音叔甝胡甘切漢書曰猛虎之猶與不如蜂蠆之致蠚又曰宣帝元狩南郡獲白虎以爲寳又曰李廣北平郡出獵見草中石以爲虎而射之中石没羽視之石也明日射之終不能入矣又曰馬遷書曰猛虎在山中百獸震恐及陷檻穽揺尾而求食積威納之漸也又曰李敢子禹有寵於太子禹有勇上召禹使刾虎懸下圏中未至地有詔引出之禹以劒斫絶纍欲刾虎上壯之遂放焉後漢書曰劉昆字桓公光武時爲􅀪農太守先是崤澠驛道多虎灾行旅不通昆爲政三年仁化大行虎皆􅀒子渡河帝聞而異之後徴爲光禄勲詔問昆曰前在江陵返風滅火後守􅀪農虎北渡河行何徳政而致是事昆對曰偶然耳左右皆􅀏其質訥帝歎曰此乃長者之言也顧命書諸䇿又曰宋均遷九江太守郡多虎􅁀數爲人患常募設㩜穽而猶多傷害㩜爲機以捕獸穽謂穿地䧟之均到下記屬縣曰夫虎豹在山黿鼉在水各有所託且江淮之有猛獸猶北土之有雞豚也今爲人害咎在殘吏而勞勤張捕非憂恤之夲也其務退姧貪思進忠善可一去㩜穽除削課制其後傳言虎相與東遊渡江又曰法雄爲南郡太守郡濵帶江􅃆又有雲夢藪澤雲夢澤今在安州永􅀄中多虎狼之暴前太守賞募張捕反爲所害者甚衆雄乃移書屬縣曰凡虎狼之在山林猶人之居城市古者至化之代猛獸不擾皆由恩信寛澤仁及飛走太守雖不德敢忘其義記到其毀壞㩜穽不得妄捕山林是後虎害稍息人以獲安在郡數歳歲常豐稔又曰童恢字漢宗爲不其令户人甞爲虎所害乃設檻捕之生獲二虎恢呪虎曰天生萬物唯人爲貴虎狼當食六畜而殘暴於人王法殺人者死傷人則論法若是殺人者當垂頭服罪自知非者當號呼稱􅁈一虎低頭閉目狀如震懼即時殺之一乃踊躍自奮遂放之謝承後漢書曰豫章劉陵字孟髙爲長沙安成長先時多虎百姓患之皆從他縣陵之官脩德政踰月虎悉岀界去民皆還漢皇德傳曰丗祖遣鄧禹西征送之於道旣返因於野王獵路見二老翁即禽丗祖問曰禽何向並舉首西指言此中多虎臣每即禽虎亦即臣大王勿徃也方言曰虎陳魏宋楚之間或謂之李父江淮南楚之間謂之李耳虎食物值耳即止以觸其諱故或謂之於䖘於音今江􅀯山夷呼虎爲䖘自関東西或謂之伯都也風俗通曰呼虎爲李耳俗􅀃虎夲南郡中廬李氏公所化爲呼李耳因喜呼班便怒龍魚河圖曰懸文虎鼻門上冝官子孫帶印綬懸虎鼻門中周一年取燒作屑與婦飲之二月中便有兒生貴子勿令人知之泄則不驗也亦勿令婦人見之春秋後語曰楚黃歇􅀃􅁗昭王曰天下強國莫過於􅁗楚今聞大王欲伐楚此猶兩虎相與􅃲而駑犬受其弊不如善楚也又曰􅁗惠王謂陳􅎮曰今韓魏相攻朞年不解或謂寡人救之便或曰勿救便寡人不能自爲決願子爲寡人計之􅎮曰亦甞有以卞莊子之刾虎聞於王者乎王曰不聞􅎮曰卞莊子方刾虎而卞竪子止之曰兩虎方食牛牛甘必爭爭必􅋐闘則大者傷小者死從傷而刾之一舉必有􅀟虎之名卞莊子以爲然立而頋之有頃兩虎果􅋐大者傷小者死一舉果有􅀟虎之功今韓魏相攻朞年不解是必大國傷小國亡從傷而伐之一舉必有二實此猶卞莊子㓨虎之􅀋也惠王曰善卒不救待其敗而攻之果大剋也吴越春秋曰吴王塟昌門外金玉精上爲白虎列士傳曰􅁗召公子無忌無忌不行使朱亥奉璧一􅀟􅁗王大怒將朱亥着虎圈中亥瞋目視虎眥裂血出濺虎終不敢動穆天子傳曰有虎在於葭中葭葦七萃之士曰髙奔戎乃生捕虎而獻之天子命爲押押㩜而畜之東虞是曰虎牢因名其地今滎陽成臯縣是也山海經曰孟山鳥䑕同穴之山其上多白虎也又曰狄山爰有熊文虎幽都之山黒水上有􅀇虎尸子曰虎豹之駒未成文而有食牛之氣又曰中黃伯曰余左執太天行之夔而右摶雕虎韓子曰龐共與太子質於邯鄲謂魏王曰今一人言市有虎王信乎王曰不二人言王信乎王曰不三人言王信乎曰寡人信之龐共曰夫市無虎明矣然而三人言成市虎今邯鄲去魏逺於市議臣者過三人願王察之龐共從邯鄲還竟不得入又曰夫虎之所以能伏狗者爪牙也使虎釋其爪牙而使狗用之則虎反服於狗矣人主者以刑德制臣今君失其刑德而使臣用之則君反制於臣矣管子曰桀之時女樂三萬人放虎於市觀其驚駭列子曰梁鴦曰養虎之法凢順之則喜逆之則怒此血氣者性也夫食虎物不敢以生物與之爲其殺之恐怒也不敢以全物與之爲其决之之怒也莊子同孟子曰晉人有馮婦者善摶虎有衆逐虎望見馮婦趍而迎之孫卿子曰見寢木以爲伏虎吕氏春秋曰衣人在寒食人在飢陳思稱投虎千金不如一豚肩淮􅀯子曰中行繆伯手摶虎而不能生也中行繆伯晉臣也力能摶虎而能伏之也又曰虵不可使爲足虎不可使縁木淮南萬畢術曰燒角入山則虎豹自逺惡其􅆨也又曰昔者牛哀病七日化而爲虎其兄啓户而入虎摶而殺之方其爲虎不知其甞爲人也方其爲人不知其且爲虎也且猶將也又曰虎嘯則谷風生􅀃苑曰孔鳥愛羽虎豹愛􅀲所以輔其身也抱朴子曰虎及鹿兎皆壽千歳滿五百歳者其色皆白又曰或問爲道者多在山林山林虎狼之室何以避之抱朴子曰古之入山者佩黄神越章其廣四寸其字百二十以封泥着所住之四方各百歩則虎狼不敢近其内也又曰山中寅日稱虞史者虎也又曰蔡誕入山還其家云􅀍謫到崑崙崑崙山下白虎蜲虵長百餘里其口中牙皆如三百斛舡大風俗通曰虎者陽物百獸之長也能噬食􅀑魅今人卒得病焼皮飲之繫其衣服亦辟惡此甚驗又曰桃梗葦茭􅀞虎謹案黃帝書上古之時有神荼與鬱壘兄弟二人性能執􅀑度朔山上桃樹下簡閲百􅀑􅀑無道理妄與人禍荼與􅊊壘縳以葦索執以食虎於是官常以臘餘文飾桃人􅀞虎於門皆是追效前事兾以禦凶也又曰宋均爲九江太守虎􅀒子渡江按虎毛婆娑豈犯陽侯波里語云狐欲渡河無奈尾何舟人尚有懼况虎耶若德􅀍四海虎亦能至􅀑方也璅語曰周王欲殺王子冝咎立伯服釋虎將執冝咎叱之虎弭耳而服蔣濟萬機論曰猛虎不處卑勢鷙鳥不立垂枝也西京􅄂記曰李廣與兄弟獵於􅁳山之北見卧虎焉射一矢斃斷其髑髏以爲枕示服猛也鑄銅象其形爲溲器示厭服之也又曰余所知有鞠道龍善爲幻術甞向余􅀃曰東海人黃公少時爲幻􅁗末有白虎見東海詔遣黃公以赤刀徃厭之術旣不行遂爲虎所殺三輔人俗用以爲戲漢朝亦取之爲角抵戲焉王子年拾遺録曰始皇二年謇㳙國􅀞工者名烈􅒨刻白王兩虎削玉爲毛有如眞矣不􅀧兩目睛始皇使餘工夜徃􅀧之爲睛旦徃虎即飛去明年南郡有獻白虎二頭始皇使視之乃是先刻玉始皇命去目睛二虎不能復去太平御覽卷第八百九十一
