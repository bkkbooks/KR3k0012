front:
  text: 太平御覽卷第四百八十二
  hash: sha256:9da0eba402c5aed6c6c11ec47f849087d57063d0174d763434aba7e591b0acbc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_482-1a}
body:
  text: 人事部一百二十三仇讎下太公六韜云武王伐殷乗舟濟河兵車出壞舡於河中太公曰太子爲父報仇令死無生所過津梁皆悉燒之列子曰魏黒夘以暱嫌殺丘邴章其子來丹謀復讎丹氣甚猛形甚露計粒而食之順風而趨雖怒不能稱兵耻假力於人誓手劒以屠黒夘黒夘悍志絶衆力抗百夫筋骨皮肉非人􅀋也延頸承刃披􅇩受矢鋩鍔摧屈而體無㾗負材力視來丹猶鶵􅑹也來丹之友申抱曰子怨黒夘至矣黒夘之易子過矣將奚謀焉丹垂涕曰願爲我謀申抱曰吾聞衛孔周其祖得殷帝之寳劒童子服之却三軍之衆奚不請焉巳下具劒部淮南子曰魯人有爲其父報讎於齊者刳其腹而見其心坐而拭冠起而更衣徐出門上車而歩顔色不變其御欲驅撫而止之曰爲父報讎以岀死非爲生也今事巳成矣有何去之追者曰此有節行之士不可殺也解圍而去之琴操曰樗里牧恭爲父報怨而亡林岳之下有馬夜降圍其室而鳴於是覺而聞走馬聲以爲吏追之乃奔而亡明視天馬迹也乃曰吾以義殺人而天馬來降以驚動吾處不安以告吾耶乃感懼入沂澤之中作走馬引後果讎家候之不得也又曰聶政父爲韓王治劒過期不成王殺之時政未生及壯問母知之乃入山遇仙人學鼔琴􅃮身吞炭七年琴成入韓逢妻從買櫛對而􅀏妻泣曰君似政齒政曰天下人齒盡相似耳乃入山援石擊落其齒以刀内琴中刺韓王國語曰呉敗越於㑹稽勾踐􅀃國人曰寡人不知其力之不足也與大國報仇以􅁀露百姓之骨於中原此則寡人之罪也親爲夫差洗馬而歸乃致其衆而誓之寡人聞古之賢君不患其衆之不足也而患其志行不之少耻今夫差衣水犀之甲者億有三千人水犀如牛其甲有朱鑿以爲甲士不患其志行之少耻而患其衆之不足也韓詩外傳曰魏文侯問解狐曰寡人將定西河之守誰可用對曰荆伯柳賢人殆可文侯曰是非子之讎也對曰君問可非問讎也於是將以伯栁爲西河守伯栁見解狐而謝之解狐曰言子者公也怨子者私也虞􅄎江表傳曰孫䇿殺許貢貢客爲貢報讎射䇿中頰陸胤廣州先賢傳曰尹牙字猛德太守南陽寵下車牙以德進幹任喉舌寵雖當國厚禄而懷愧戚見於顔色牙常用恠焉曰伏見明府四節悲歎有􅃤瘁之思何也寵謂牙曰父爲豪周張所害重仇未報並與戴天非孝子雖官尊禄重而塵耻未判是以長愧而無耻也聞好馬牙與校圉交通遂充騶馬之職乃先醉張近侍以夜解縱諸馬令之亂駭知張必將驚起伏側階下張果出問其故牙因手刃張首而還孝子傳曰魏湯少失其母獨與父居邑飬蒸蒸盡於孝道父有所服刀㦸市南少年欲得之湯曰此老父所愛不敢相許於是少年歐撾湯父湯叩頭拜謝之不止行路書生牽止之僅而得免後父壽終湯乃殺少年斷其頭以謝父墓焉師覺授孝子傳曰仲子崔者仲由之子也􅀄子路仕衛赴蒯聵之亂衛人狐黶時守門殺子路子崔旣長告孔子欲報父讎夫子曰行矣子崔即行黶知之於城西決戰其日黶持蒲弓木㦸與子崔戰而死皇甫謐列女後傳曰衛義􅁎者其夫有先人之讎讎家來報壻避之仇家得義􅁎問壻所在乃積薪燎之遂不言而燒死又曰郃陽友娣者郃陽邑任延壽之妻也字季兒有三子季兒兄弟季宗與延壽争葬父之事延壽與其友隂殺季宗季兒曰殺夫不義事兄之讎亦不義何面目以生而戴天履地乎遂以繩自縊死馮翊王譲聞之大其義令縣復其三子而表其墓也又曰京師節女者長安大昌里人之妻也其夫有仇仇家欲報夫而無道聞其妻孝義乃刼其妻父使要其女爲中間父呼其女而告之計念不聽則殺父不孝聽之則殺夫不義不孝不義雖生不可以行於代欲以身當之且曰諾夜在樓上新沐頭東首卧則是矣妾請開户而夜半仇家果至斷頭持去明視之乃其妻之頭也仇家痛以爲義遂釋不殺其父越統書曰伍子胥入呉居三年闔閭將爲之報讎子胥曰不可臣聞諸侯不爲匹夫興師於是止其後荆將伐蔡子胥言之闔閭即使子胥救蔡而伐荆十五戰十五勝荆平王巳死子胥捶笞平王之墓而數之曰昔者吾先人無罪而子殺之今以此報子也趙曄呉越春秋曰越王念呉欲復怨非一旦也冬寒則抱氷夏􅀬則握火愁心苦思懸膽於户出入甞之不絶於口乃中夜抱柱而哭􅂘訖復承之以嘯於是群臣聞之咸曰夫復讎謀敵非君王之憂自臣下之急務也二十一年興師滅呉檀道鸞續晉陽春秋曰王談年十許歲父爲隣人竇度所殺談隂有復讎之志年十八宻買市利挿刃陽􅀂以耕耘者度常乗舡出入經一橋下談伺度行還於橋上以挿斬之應手而死旣而歸罪有司太守孔巖義其孝勇列上宥之搜神記曰丁蘭河内野王人年十五喪母乃刻木作母事之供飬如生隣人有所借木母顔和則與不和不與後隣人忿蘭盗斫木母應刀血出蘭乃殯殮報讎漢宣帝嘉之拜中大夫幽明録曰項縣民姚牛年十餘父爲郷人所殺牛常賣衣物市刀㦸圖欲報讎後在縣署前手刃之於衆中吏捕得官長深矜孝節爲推遷其事㑹赦得免後令岀獵逐鹿入草草有古深穽數處馬將趍之忽見一公舉杖擊馬馬驚僻不得及鹿令怒引弓將射之曰此中有穽恐君墯耳令曰汝爲何人公爲跪曰民姚牛父也感君活牛故來謝恩因滅不見令身感其事在官數年多惠於民㑹稽典録曰魏㓪字少英上虞人少爲縣吏兄爲郷人所殺㓪白日操刀報讎於縣中遂亡命到陳國從􅀶士郄仲信學春秋圖緯又詣太學受五經京師長者李膺之徒争從之解系􅀓曰張華裴頠之􅀍誅也趙王倫孫秀以􅀫讎収系兄弟將殺之梁王彤救之倫等怒曰我見水中蟹尚欲殺之况此人兄弟輕我也遂并戮其妻子崔鴻前燕録曰吐谷渾子吐延年少有大志身長七尺八寸雄姿魁桀羗虜憚之號曰項羽性俶儻不群慷􅁣謂群下曰大丈夫生不在中國當髙皇光武之代與韓彭呉鄧並驅中原定天下决雌雄使名垂竹帛而潜竄窮山隔閉殊俗不聞聖教於上宗不得䇿名於天府生與麋鹿同群死作氈裘之􅀑雖偷觀日月獨不愧於心乎􅀒其智勇猜忍不恤下爲帛城羌酋姜聦所刺殺長子業年十歳常􅅞草人號曰姜聦哭而射之大號而泣不中瞋目大呼要中乃止其母謂之曰姜聦諸將巳屠膾之矣汝何如此業泣曰誠知射草人無益於先公所以申罔極之心耳陳留志曰韓卓父甞爲吏所辱卓執兵伏道欲候殺之而長子􅁀病將死卓乃歎曰道家有信報讎不欲過今長子病豈爲是乎於是乃投刃援杖復耻而止常璩華陽國志曰陳網字仲卿少與同郡張宗受學南陽以母䘮歸宗爲安衆至元所殺網終䘮徃復之自拘有司㑹赦免應劭風俗通曰汝南陳公思爲五官􅁺王子祐爲兵曹行㑹食下亭子祐曽以縣官事考殺公思叔父斌斌無子父思欲爲報仇不能得卒見子祐不勝憤怒便格殺之還府歸死時大守太􅀓胡廣以爲公思追念叔父仁勇憤發手刃仇敵自歸司敗便原遣之梁祚魏國統曰崔周平者漢太尉烈之孫也兄曰元平爲議郎以忠直稱董卓之亂烈爲卓所害元平常思有報復之心㑹病卒魏文帝􅄂詔曰䘮亂以來兵革從横天下之人多相殺害昔賈復宼恂私相怨憾至懷手劒之忿光武召而和之卒共同輿而載崔鴻後燕録曰􅁗滅燕慕容桓阻兵遼東爲􅁗所殺子鳯泣血不言年十一告其母曰昔張良養士以擊􅁗王復君之仇也先王之事豈可一日忘之虞預㑹稽典録曰朱㓪字恭明父爲道士淫祀不法遊在諸縣爲烏傷長陳頵所殺㓪隂圖報怨而未有便㑹頵以病亡㓪乃刺殺頵子事發亡命奔魏魏聞其孝勇擢以爲將又曰董黯字孝治家貧採薪供養母甚肥恱憐人家冨有子不孝母甚瘦不孝子疾黯母肥甞苦之黯不報及母終􅀒土成墳竟殺不孝子置􅃁前以􅀕詣獄自繫㑹赦免廣德神異録曰賈氏女不知何許人年十五父爲宗人所害其弟強仁年㓜賈氏撫育之及強仁長乃共殺讎者自列其罪髙祖嘉之又曰王君操父大業中爲郷人李君則歐死貞觀􅀄君則以運代遷革不懼憲網又以君操􅀌微謂無復讎之志遂仕州府操宻䄂白刃刺殺之刳其心肝咀食立盡詣州自陳刺史以其擅殺問之曰殺人當死律有明文何方自理以求生路君操對曰亡父􅀍殺二十餘載聞諸典禮父讎不可同天早願圖之乆而未遂常懼滅亡不展􅁈情今大耻旣雪甘從刑憲太宗特原之又曰張琇蒲州解縣人父審素爲嶲州都督在邊累載有糺其軍中贓罪勑監察御史楊汪馳傳就軍按之汪在路爲審素黨與所刧對汪殺告事者脅汪令審素無罪俄曰州人翻殺審素之黨汪始得還至益州奏稱審素謀反因深按審素構成其罪斬之籍没其家琇與兄瑝以年㓜坐徙嶺外㝷各逃歸累年隱匿汪後累遷殿中侍御史改名萬頃是年瑝琇􅃸萬頃於東都城挺刀殺之瑝雖年長其發意及手刃皆琇爲之旣殺萬頃繫表於斧刃自言報讎之狀便逃奔就江外殺萬頃同謀搆父罪者行至汜水爲捕者所􅀗時都城士女皆矜琇等㓜稚義烈能復父讎多言其合矜恕者中書令張九齡又欲活之裴耀卿李林甫固言國法不可縱讎上以爲然因謂九齡等曰復讎雖禮法所許殺人亦格律具存孝子之情義不顧命國家設法焉得容斯殺人成復讎之志赦之虧格律之條然道路諠議故湏告示乃下勑曰張琇等兄弟同殺推問疑承律有正條湏合至死近聞士庶頗有諠詞矜其爲父報讎或言本罪􅁈濫但國家設法事存經乆蓋以濟人期於止殺各申爲子之志誰非徇孝之夫展轉相讎殺傷何限咎陶作士法在必行曽參殺人亦不可恕不能加以刑戮肆諸市朝冝付河南府決殺瑝琇旣死士庶咸傷憫之爲作哀誅牓於衢路中市人歛錢於死所造義井并葬瑝琇於北邙又恐萬頃家人發之并作疑􅃁數所其爲時人所傷如此唐新語曰杜并父審言善五言尤攻書翰恃才蹇傲深爲時輩所嫉自洛陽丞貶􅁻州司户又與群寮不叶司馬周季重與司户郭􅀂訥共構之審言繋獄將因事殺之并年十三伺季重等酣醼宻刃刺季仲而死并亦見害季重臨死歎曰吾不料審言有此孝子邪􅀂訥誤我至此審言由是免官歸東都自爲􅀕文以􅀕并士友咸哀并孝烈􅂫頲爲墓誌劉充濟爲􅀕文則天召見審言甚嘉歎之又曰衢州人余長安父與叔共二人爲同郡衣金所殺長安八歳自誓十七乃復讎大理斷死刺史元錫奏言臣見余氏一家橫遭死者實二平人蒙顯戮者乃一孝子引公羊傳父不受誅子復讎之義請下百僚集議時裴垍當國李􅅠爲有司事竟不行老儒薛伯臯與錫書曰大司宼是俗吏執人柄老小生余氏子冝其死矣太平御覽卷第四百八十二
