front:
  text: 太平御覽卷第九十五
  hash: sha256:ed092c76d71db4b3c9c809e694df123aaafe4af599cfc91489bc20e2aa1d0fbd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_095-1a}
body:
  text: 皇王部二十西􅀳宣帝􅀳書曰宣帝諱懿字仲逹河内温縣孝敬里人姓司馬氏其先出自帝髙陽之子重黎爲夏官祝融歴唐虞夏啇世序其職及周以夏官爲司馬其後程伯休父周宣王時以世官尅平徐方􅃬以官族因而爲氏楚漢間司馬昂爲趙將與諸侯伐􅁗􅁗亡立爲殷王都河内漢以其地爲郡子孫遂家焉自昂八世生征西將軍鈞字叔平鈞生豫章太守量字公度量生潁川太守儁字元異儁生京兆尹防字建公帝即防之弟二子也少有竒節聦眀多大略愽學洽聞伏膺儒教漢末大亂常􅁣然有憂天下心南郡太守同郡楊俊有知人鑒見帝未弱冠以爲非常之器尚書清河崔琰與帝兄㓪善亦謂㓪曰君弟聦亮明允剛斷英特非子所及也漢建安六年郡舉上計遂魏武帝爲司空聞而辟之帝知漢運方微不欲屈節曹氏辤以風痺不能起居魏武使人夜往宻刺之帝堅卧不動及魏武爲丞相又辟爲文學􅁺勑行者曰􅀂復盤桓便収之帝懼而就職於是使與太子遊處遷黄門侍郎轉議郎丞相東曹屬㝷轉主簿魏國旣建遷太子中庶子每與大謀輙有竒䇿爲太子所信重與陳群呉質朱鑠號爲四友遷爲軍司馬言於魏武曰昔箕子陳謀以食爲首今天下不耕而食者蓋二十餘萬非經國逺籌也雖戎甲未卷自冝且耕且守魏武納之於是務農積榖國用豐贍及魏武薨於洛陽朝野危懼帝綱紀䘮事内外肅然乃奉梓宫還鄴魏文帝即位封河津亭侯轉丞相長史魏文受漢禪以帝爲尚書頃之轉督軍御史中丞封安國郷侯黄􅀄二年督軍官罷遷侍中尚書右僕射五年天子南廵觀兵吳疆帝留鎮許昌改封向縣侯轉撫軍大將軍假節領兵五千加給事中録尚書事帝固辭天子曰吾於庶事以夜繼晝無須􅁷寜息此非以爲榮乃爲分憂耳六年天子復大興舟師征呉命帝居守臨行詔曰吾􅀷以後事爲念故以委卿曹叅雖有戰功而蕭何爲重使吾無西頋之憂不亦可乎天子自廣陵還洛陽詔帝曰吾東撫軍當㹅西事吾西撫軍當㹅東事於是留帝鎭許昌及天子疾篤帝與曹眞陳群等見於崇華殿之南堂並受頋命輔政詔太子曰有聞此三公者慎勿疑之明帝即位改封舞陽侯及孫權圍江夏遣其將諸􅁑瑾張覇并攻襄陽帝督諸軍討權走之進擊敗瑾斬張霸并首級千餘遷驃將軍太和元年六月天子詔帝屯于宛加督荆豫二州諸軍事􅀄蜀將孟逹之降也魏朝遇之甚厚帝以逹言行傾巧不可任驟諫不見聽乃以逹領新城太守封侯假節逹於是連吴固蜀潜圖中國帝以書諭之逹得書大喜猶與不决帝乃潜軍進討上庸城三面阻水逹於城外爲木柵自固帝渡水破其柵直造城下八道攻之旬有六日逹甥鄧賢將李輔等開門岀降斬逹首傳京師俘􅀗萬餘人振旅還于宛乃勸農桑禁浮費南土恱附焉時邊郡新附民無名户魏朝欲知隠實屬帝朝于京師天子訪於帝帝對曰賊以密網束下故下弃之冝􅀪以大綱則自然安樂又問二虜冝討何者爲先對曰吴以中國不習水戰故敢散居東關凡攻敵必先扼其喉而㫪其心夏口東關賊之心喉􅀂爲陸軍以向皖音患城引權東下爲水戰軍向夏口乗其虛而擊之此神兵從天而墮破之必矣天子並然之復命帝屯于宛四年遷大將軍加大都督假黄􅃏與曹真伐蜀軍次丹口遇雨班師明年諸􅁑亮㓂天水圍將軍賈嗣魏平於祁山天子曰西方有事非君莫可付者乃使帝西屯長安都督雍梁二州諸軍事統車􅀐將軍張郃後將軍費曜征蜀護軍戴凌雍州刺史郭淮等討亮遂進軍隃式朱切麋亮聞大軍直至乃自帥衆將芟音衫上邽音圭之麥諸將皆懼帝曰亮慮多決少必安營自固然後芟麥吾得二日兼行足矣於是卷甲晨夜赴之亮望塵而遁進次漢陽與亮相遇帝列陣以待之使將牛金輕􅀐誘之兵纔接而亮退追至祁山亮屯鹵城據南北二山斷水爲重圍帝攻之拔其圍亮霄遁追擊破之俘斬萬計天子使使勞軍増封邑二年亮又帥衆十餘萬出斜谷壘于郿音眉之渭水南原天子憂之遣征蜀將軍秦㓪督歩􅀐二萬受帝節度諸將欲住渭北待之帝曰百姓積聚皆在渭南此必爭之地也遂引軍而濟背水爲壘因謂諸將曰亮􅀂勇者當出武功依山而東􅀂西上五丈原則諸軍無事矣亮果上原將北渡渭帝遣將軍周當屯陽遂以餌之數日亮不勤遂遣將軍胡遵雍州刺史郭淮共備陽遂與亮㑹于積石臨原而戰亮不得進還于五丈原㑹有長星墜亮之壘帝知其必敗遣竒兵椅音巳亮之後斬五百餘級􅀗生口千餘降者六千餘人三年遷太尉累増封邑蜀將馬岱入㓂帝遣將軍牛金擊走之斬千餘級四年遼東太守公孫文懿反徴帝詣京師天子曰此不足以勞君事欲必尅故以相煩耳君度其作何計對曰棄城預走上計也據遼水以拒大軍次計也坐守襄平此成擒耳天子曰其計將安出對曰唯明者能􅀷度彼我乃能豫有所割棄此非其所及也今懸軍逺征將謂不能持乆必先拒遼水而後守此中下計也天子曰徃還幾時對曰徃百日還百日攻百日以六十日爲休息一年足矣景􅀄二年帥牛金明遵等歩􅀐四萬發自京都車駕送出西明門詔弟孚子師送過温賜以榖帛牛酒勑郡守典農已下皆往㑹焉見父老故舊讌飲累日帝歎息悵然有感爲歌曰天地開闢日月重光遭遇際㑹畢力遐方將掃群穢還過故郷肅清萬里揔齊八荒告成歸老待罪舞陽遂進師經􅀌竹越碣石次于遼水文懿果遣歩騎數萬阻遼隧堅壁而守南北六七十里以拒帝帝盛兵多張旗幟出其南賊盡銳赴之乃汎舟濽濟以出其北與賊營相逼沉舟焚梁傍遼水作長圍棄賊而向襄平賊見兵出其後果邀之乃縱兵逆擊大破之三戰皆捷賊保襄平進軍攻之􅀄文懿聞魏師之出也請救於孫權權亦出兵遥爲之聲援遺文懿書曰司馬公善用兵變化􅀂神所向無前􅀷爲弟憂之㑹霖潦大水平地數尺賊恃水樵採自􅀂朝廷聞師遇雨咸謂召還天子曰司馬公臨危制變計日擒之矣旣而雨止遂合圍起土山地道楯櫓釣橦發矢石雨下晝夜攻之文懿大懼乃使其所署相國王建御史大夫栁甫乞降請解圍面縛不許執建等皆斬之文懿復遣侍中衛演乞尅日送而守者日軍事大要有五能戰當戰不能戰當守不能守當走餘二事唯有降與死耳汝不肯面縛此爲决就死也不須送任文懿攻南圍突出帝縱兵擊敗斬于梁又作沮水上時有兵士寒凍乞􅃭帝弗之與或曰幸多故􅃭可以賜之帝曰􅃭者官物人臣無􅀻施也遂班師天子遣使者勞軍于薊増封食昆陽并前三縣齊王即位遷侍中持節都督中外諸軍録尚書事與曹爽各統兵三千人共執朝政更直殿中乗輿入殿爽欲使尚書奏事先由巳乃言於天子徙帝爲大司馬朝議以爲前後大司馬累薨於位乃以帝爲太傅入殿不趨賛拜不名劒履上殿如蕭何故事八年夏四月曹爽用何晏鄧颺丁謐之謀遷太后於永寜宫專檀朝政兄弟並典禁兵多樹親黨屢改制度帝不能禁於是與爽有􅂩五月帝稱疾不與政事九年春三月黄門張當私出掖庭才人石英等一十一人與曹爽爲􅇊人爽晏謂帝疾篤有無君之心與當密謀圖危社稷期有日矣帝亦潜爲之備爽之徒屬亦頗疑帝㑹河南尹李勝將莅荆州來􅀱帝帝詐疾篤使兩侍婢持衣衣落指口言渇婢進粥帝不能持柸飲粥皆流岀霑胷勝曰衆情謂明公舊風發動何意尊體乃尓帝使聲氣􅂊屬說年老抱疾死在旦夕君當屈并州并州近胡善爲之備恐不􅀗相見以子師昭弟兄爲託勝曰當還忝本州非并州也帝乃錯亂其辭曰君方到并州勝復曰當忝荆州帝曰年老意荒不解君言今還本州盛徳壯烈好建功勲勝退告爽曰司馬公尸居餘氣形神已離不足慮矣他日又言曰太傅不可復濟令人愴然故爽等不復設備嘉平元年春正月甲午天子謁髙平陵爽兄弟皆從是日太白襲月帝於是表奏永寜太后廢爽兄弟時景帝爲中護軍將兵屯司馬門帝列陣闕下經爽門爽帳不督嚴世上樓引弩將射帝孫謙止之曰事未可知三注三止皆引其肘不得發大司農桓範岀赴爽蔣濟言於帝曰智囊往矣帝曰爽與範内踈而智不及駑馬戀短豆必不能用也於是假司徒髙柔節行大將軍事領爽營謂柔曰君爲周勃矣命太僕王觀行中領軍攝羲營帝親帥太尉蔣濟等勒兵出迎天子屯于洛水浮橋上奏曰先帝詔陛下齊王及臣升于御床握臣臂曰􅀷以後事爲念今大將軍爽背弃頋命敗亂國典内則僣擬外專威權群官要職皆置所親􅀫衛舊人並見斥黜根據槃牙縱恣日甚又以黄門張當爲都監專共交関伺候神器天下洶洶人懷危懼陛下便爲􅀉坐豈得乆安此非先帝詔陛下及臣升御床之本意也臣雖朽邁敢忘前言昔趙髙極意􅁗是以亡吕霍早斷漢祚永延此乃陛下之殷鑒臣授命之秋也公卿群臣皆以爽有無君之心兄弟不冝典兵􅀫衛表皇太后勑如奏施行臣輙勑主者及黄門令罷爽羲訓吏兵各以本官侯就第􅀂稽留車駕以軍法從事臣輙力疾將兵詣洛水浮橋伺察非常爽不通奏留車駕􅀫伊水南伐樹爲鹿角發屯兵數千人以守桓範果勸爽奉天子幸許昌傳徼徴天下兵爽不能用而夜遣侍中許允尚書陳泰詣帝以觀望風旨帝數其過失事止免官泰還以報爽勸之通奏帝又遣爽所信殿中校尉尹大目諭爽指洛水爲誓爽意信之桓範等援引今古諌說萬端終不能從乃曰司馬公正當欲奪吾權耳吾得以侯還弟不失爲冨家翁範拊膺曰坐卿滅吾族矣遂通帝奏旣而有司劾黄門張當并發爽與何晏等反事乃収爽兄弟及其黨與何晏丁謐鄧颺畢䡄李勝桓範等誅之二月天子以帝爲丞相増封八縣邑二萬户奏事不名固讓丞相冬十二月加九錫之禮朝㑹不拜固讓九􅃬二年春正月天子命帝立廟于洛陽帝以乆疾不任朝請毎有大事天子親幸弟以諮訪焉三年天子使兼大鴻臚太僕􅁃嶷持節􅁽命爲相國封安平郡公固讓不受六月帝寢疾八月崩于京師時年七十三武帝受禪上尊號曰宣皇帝陵曰髙原廟稱髙祖虞預晉書曰上雖服膺文藝以儒素立徳而雅有雄霸之量值魏氏短祚内外多難謀而鮮過舉必獨克知人拔善顯外反陋王基鄧艾周􅁗賈越之徒皆起自寒門而著績於朝經略之才可謂遠矣異苑曰晉宣帝誅王陵後寢疾曰見陵逼帝呼曰彦雲彦雲陵之字也緩我身上便有打處賈逵亦爲祟少日遂薨􅀄陵旣􅀍執過賈逵廟呼曰賈梁道王陵魏之忠臣唯爾有神知之故逵助焉及永嘉之亂有覡見帝涕泗云家國傾覆是曹爽夏侯􅀇訴怨得伸故也爽以勢族致誅玄以時望􅀍戮太平御覽卷第九十五
