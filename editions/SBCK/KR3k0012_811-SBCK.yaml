body:
  text: 珎寳部十金下國語曰范蠡乗輕舟以浮於五湖莫知其所終王令工以良金冩范蠡之狀而朝禮之穆天子傳曰觀天子寳黄金之膏金膏亦猶玉膏皆其精液也春秋後語曰尉繚來說王曰以􅁗之強諸侯譬如郡縣其君臣俱怨􅀂或合從醮而出不意醮謂􅀕盟誓之義也此智伯夫差湣王所以亡也願大王無愛財物賂其豪臣以亂其謀􅁗不過亡三十萬金則諸侯可盡王大善之又曰邯鄲旣存平原君欲封魯仲連仲連辭謝者三終不肯受平原君乃置酒酒酣起前以千金爲仲連壽仲連􅀏曰所貴於天下之士者爲人排患釋難解紛而無取也即有取者乃商賈之人仲連不忍爲也遂辝平原君而去終身不復見也又曰邯鄲之北有蘇人侯􅂫􅁗徃􅀃之􅂫人侯送以黄金百溢其家丞諌曰君侯之與客無故舊而送之百金其􅀃可得聞耶􅂫人侯曰客天下辯士立談之間再奪我地而復歸之吾地雖小豈其百金韓詩外傳曰田子爲相三年㱕休以金百鎰奉其母母曰不義之物不入於館爲人臣不忠是爲人子不孝子其去曰子慙愧走出自㱕於王還金請退就獄王赦田子罪以金賜其母又曰楚襄王遣使者持金千斤白璧百􅀟聘莊子欲以爲相莊子固辭又曰延陵季子遊於齊見遺金於路呼牧者取之牧者曰何子居之高而視之下也􅀋君子而言野也有君不臣有友不友當暑衣裘吾豈取金者乎延陵季子知其賢者請問姓字牧者曰子乃皮相之士也何足語姓字哉遂去周易參同契曰黄土金之父流水珠之母英雄記曰董卓塢有金二三萬斤漢武故事曰帝年數歳長公主遍指侍者與作婦好否皆不用後指陳后帝曰􅀂得阿嬌作婦當以金屋貯之漢武内傳曰帝受西王母眞形經盛以黄金之几又曰西王母有丸丹金液金漿漢東園祕記曰亡人以黄金塞九竅則尸終不朽陸賈新語曰舜藏金於嶄巖之山損珠玉於五湖之淵杜媱邪絶覬媚之情也東方朔神異經曰北荒中有二金闕髙百丈金銀盤圍五十丈又曰西方白宫之外有金山上有人長五丈餘名曰金犀守之蜀王夲紀曰􅁗王以金一笥遺蜀王蜀以禮物荅而盡化爲土􅁗王怒羣臣拜賀曰土者地也􅁗當得蜀矣􅀃苑曰申鳴者孝聞於楚王授之相辝不受其父曰使汝有禄於國立義於庭吾無憂矣申鳴從父命爲楚相及白公亂申鳴曰今不得爲孝子矣遂援皷殺白公其父亦死王賜金百斤申鳴曰何靣目見天下遂自殺新序曰齊桓公見麥丘邑人問之曰年幾何對曰八十矣曰以子之壽祝寡人乎曰使主君甚壽金玉是賤以人爲寳又曰公孫敖問伯象先生曰今先生収天下之術愽觀四方之乆矣未能禆丗主之治明君臣之義是則未有異於府庫之藏金玉筐篋之囊間有書又曰郭隗語燕昭王曰古之人君有以千金求千里馬已死買骨五百金不能朞年千里馬至者二論衡曰盧江民小男曰陳爵陳挺相與浴於湖崖有酒樽色正黄没水中爵以爲銅渉水取之重不能舉挺徃助之樽更爲沉盤動入深淵中挺爵留顧見如錢等正黄數百千枚即共棳樚各得滿手㱕示其家乃黄金也論衡曰衆口鑠金者五行二曰火五事二曰言言與火冝故云鑠金風俗通曰衆口鑠金俗􅀃有美金此衆人咸共詆訿言其不純賣金者欲其售因取鍜燒以見眞此爲衆口鑠金又曰漢書􅀃王陽好車馬衣服及遷徙所載不過囊衣俗傳王陽能作黄金語曰金不可作丗不可度王陽居食禄雖爲潔白車馬衣服亦能幾何何足推之乃傳俗語白虎通曰金在西方西方者隂始起萬物禁止金之爲言禁也西京􅄂記曰韓嫣好彈常以金爲丸一日所失者十餘長安爲之語曰􅀂飢寒逐金丸京師兒僮毎聞嫣出輙隨之望丸所落而拾之樂􅀃稽熠嘉曰君臣之義生於金􅁑洪神仙傳曰容成公服三黄得仙所謂雄黄雌黄黄金搜神記曰魏郡張巨賣宅與程應應舉家疾賣何文文獨持大刀暮入北堂梁上一更中有一人丈餘髙冠赤幘呼曰細􅆎應諾何以有人氣荅曰無文問曰髙冠者誰荅曰金也在西屋壁下文掘得金三百斤又曰漢文微服懷金過魯少年少年柱金杖出應門王子年拾遺記曰少昊時金鳴於山銀涌於地或如􅀛虵之􅀋乍似人􅀑之形又曰方丈山有池泥色金而味辛以泥爲器可作丹矣百錬可爲金矣金色青照鬼魅猶如照面不得藏形也異􅁐曰汝南殷陶市同縣張南宅掘地得錢百萬金二斤即以還南南曰君至德感寳爲君出終不肯受陶送付縣令河南張摽表上尚書又曰新野黄舒義熈中耕田得一船金卜者云三年勿用長守冨也舒不能從遂成土壤又曰永康王曠井上有一洗浣石時見赤氣後有胡人􅀉􅀫忽求買之曠恠所以求及度錢子婦孫氏覩二黄鳥闘於浣石上疾徃掩取變成黄金胡人不知索市逾急旣得撞破石内正有二鳥處又曰即墨有古冡發之有金牛塞埏門不動犯之則大垧述異記曰南康雩都縣㳂江西出去縣三里名夢口穴􅃺如石室舊傳常有神鷄色如好金出此穴中􅁬翼廻翔長鳴響徹見人輙飛入穴因號此石爲鷄石昔有人耕此山側望見鷄出遊戯有一長人操彈彈之鷄遥見便飛入穴彈丸正着穴上丸徑六尺許下垂蔽穴猶有門􅂩不復容人又有人乗船從下流還縣未至此崖數里一人通身黄衣檐兩籠黄􅁓求􅀉載因載之黄衣人乞食􅂳主與之食訖􅂳適至崖下􅂳主乞􅀲此人不與仍唾盤上徑下崖直入石中􅂳主􅀄甚忿之見其入石始知神異取食器視之見盤上唾悉是黄金又曰先儒說禹時天下雨金三日古詩曰安得天雨金使金賤如土周成王時咸陽雨金今咸陽有雨金原􅁗二丗元年宫中雨金旣而化爲石漢惠帝二年宫中雨黄金黒錫又翁仲孺家貧力作居渭川一旦天雨金十斛於其家由是與王侯争冨今􅁗中有雨金翁丗丗冨録異傳曰隗炤者汝南隂鴻壽亭民善於易臨終書板授其妻曰吾死當大荒窮雖尔愼莫賣宅後到五年春當有詔使頓來此亭姓龔此人􅀒吾金卿以此板徃責之亡後果大困欲賣宅者數矣憶夫言輙止到期日有龔使者果至亭妻遂賫板徃責使者使者執板不知所言曰我生平不踐此處何縁尓也沈吟良乆謂曰賢夫何能妻曰夫善易而未曽爲人卜使者曰可矣乃顧命侍者取􅆱而筮之卦成謂炤妻曰吾不相􅀒金賢夫自有金乃知亡後暫窮故藏金以待太平所以不告婦兒者恐金盡而困無巳也知吾善易故書板以􅀉意耳金有五百斤盛以青缾覆以銅拌埋在堂屋東頭去壁一丈入在九尺妻還掘之皆如卜焉異物志曰狼㬻民與漢人交􅀜甞夜市以鼻齅金知其好惡幽明録曰淮牛渚津水深無可筭計人見一金牛形甚魁壯以金鏁絆也又曰巴丘縣百金崗以上二十里名黄金潭上有瀬亦名黄金瀬古有釣於此潭獲一金鏁引之遂滿一船而有金牛出聲貌奔壯釣人波駭牛因奮躍還潭又云􅀳南頓王平新營一宅始移夢見一人云平輿令黄欲以一器金賂􅁀勝之爲􅁀所戮埋金在吾上見鎭迮甚􅀂君復築室無復入金明旦即鑿壁下入五尺果得金又曰譙縣城東因城爲臺方二十丈髙八尺一曰古之冢也魏武帝即築以爲臺東面墻崩金玉流出取者多死因築復之又曰海中有金臺臺内有金几玄記紀金之精爲牛又曰長安有張氏者晝獨處室有鳩自入止于對床張惡之披懷祝曰鳩爾來爲我禍耶止承塵爲福耶入我懷鳩翻飛入懐以手探之不知所在而得一金帶鈎焉遂寳之自是之後子孫昌盛丗說曰劉曄譛陳矯明帝以金五餅授矯曰君明朕心顧君妻子未知也又曰管寧華歆共園中鋤菜見地有斤金管揮鋤與瓦石不異華捉而擲去曹操別傳曰操引兵入峴發梁孝王冡破棺収金寳數萬斤天子聞之立泣益部􅂄舊傳曰王忳字少林詣京師於客舎見諸生病甚因謂忳曰􅆎下有金十斤願以相與乞収藏骸骨未問姓名因絶忳賣金一斤以給絮棺九斤置生􅆎下魯國先賢志曰叔孫通草創朝儀拜通爲奉常賜金五百斤通悉以金賜諸生諸生乃喜曰叔孫生聖人也知當丗務廬江七賢傳曰陳翼字子􅀄到覽郷見馬旁有一人病呼曰我長安魏少公聞卿廬江樂來遊今病不能前翼迎歸養之有金十餅素二十疋旣死翼賣素買棺衣衾以金置棺下􅀐馬出入後其兄長公見馬告之吏捕翼翼具言棺下得金長公叩頭謝以金十餅投其門翼送長安還之邴原別傳曰邴原字根矩以䘮亂方熾遂徃遼東時同郡劉舉亦在遼太守公孫度度掩捕其家而舉得免窘逼歸原東萊太守太史子義素有義原以舉付之舉臨去以其手所杖劒金三餅與原原受金辭劒還謂度曰將軍平日與舉無郄而欲殺之者但恐其爲􅉕蠆耳令舉以去􅀂以拘􅐬其家毒螫必滋甚矣度即出舉家原以金還之茅君内傳曰漢帝及王莽獻金鍾之屬今埋在小茅山上又曰取鈆十斤着鐵器中猛火燒之三沸投九轉之華一銖於鈆中攬之湏􅁷立成黄金九斤呉時外國傳曰斯調國作金床扶南傳曰毗騫國食器皆以金爲之金如此間之石露出山邊無有限呉越春秋曰伍子胥伐楚還漂陽瀬水上欲報自殺婦人百金不知其家投金瀬水中而去湏􅁷有一姥􅂘而來自言是女母取金而去蜀李書曰武帝諸將進金銀或以得官者楊襃諫曰陛下爲天下主何有以官買金耶帝謝之列女傳曰樂羊子出學其妻貞義截髮供其費後羊子得遺金一餅以與妻貞義曰君子不以利汚行羊子慙而去之又曰廣漢汝婦者汝敦妻也敦以所受田地奴婢三百餘萬悉讓與兄裁留園地數十畒起舎耕作土中得金一器敦以示妻妻曰夲言讓先祖所有此獨非其有耶敦曰固吾意也俱擔金送與兄嫂郡國誌曰蘇􅁗宅在洛陽利仁里後魏髙顯業毎夜見赤光於光處掘得金百斤銘曰􅂫家金業爲之造寺􅁗州記曰金城郡應劭云􅀄築城得金城臨海記曰白石山去縣邑三十里望之如雪上有淵相傳云金鵝之所集鄭緝之東陳記曰金㹠山之康縣南三里故老傳云有人得金㹠於此故名山劉欣期交州記曰趙嫗者九眞人乳長數尺入山聚盗遂攻郡常着金擒提􅄚又曰金有華出珠崖謂金華采者也雪山在新昌南人曽於山中得金塊如􅂛迷失道還置夲處乃得出錢塘記曰縣東南有峴山長老相傳採金於此羅浮山記曰州南十里有牛潭漁人見金牛自水出義熈中縣民張安躡得金鏁大如指遂數十㝷㝷㝷不巳俄有物從水引之掘不能禁以刀斷得數尺安遂致冨其後義興周雲甫掩此牛掣斷其鏁得二丈遂以財雄林邑記曰從林邑徃金山三十日至逺望金山嵯峨如赤城照耀似天光澗壑谷中亦有生金形如䖝豸細者似蒼蠅大者􅀂􅉕蟬夜行燿熠光如瑩火地鏡圖曰黄金之氣赤黄千萬斤以上光大如鏡盤白澤圖曰黄金之精石名唐狀如豚居人家使人不冝妻白䑕以昏時見於丘陵之間視所出入中有金􅀜令内傳曰老子與尹喜登崑崙上金臺玉樓七寳宫殿晝夜光明乃天帝四王之所遊處有珠玉七寳之牀宗躬孝子傳曰郭巨河内温人也妻生男謀曰養子則不得營業妨於供養當殺而埋焉鍤入地有黄金一釡上有鐵劵曰黄金一釡賜孝子郭巨揚雄集曰單于上書願朝哀帝以問公卿公卿虚費府帑可且勿許單于使辭去未發雄上書諫天子召還匈奴使者更報單于書而許之賜雄黄金十斤孔融聖人優劣論曰金之優者名曰紫磨猶人之有聖也陳思王辯道論曰甘陵始其語余曰夲師姓韓字丗雄始常與師於南流作金前後數四投數萬斤金於海嶺表異録曰五嶺内冨州賔州澄州江溪間皆産金側近居人以木箕陶金爲業自旦多暮有不􅀗一星者鄭玘傷淘者詩云披沙辛苦見傷懷徃徃分毫望亦乖力盡半年深水裏難全爲一鳯凰􅁫就中澄州者最爲良金余頃年使于上囯親友不欲書其姓字附澄州金二十兩與當時權臣余訝其單鮮友人曰金雖少貴其夜眀有異於常金耳遂留􅀫驗之信然也太平御覽卷第八百一十一
