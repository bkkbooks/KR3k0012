body:
  text: 資産部八屠酤盧肆店附賣買駔㑹屠周禮地官下曰凡屠歛其皮角筋骨入于王府以當稅給作噐物也史記曰魏公子母忌請朱亥奪晉鄙軍亥􅀏曰臣乃市井鼓刀屠者公子親數存之所以不報謝者小禮無所用今乃臣効命之秋也又曰淮隂屠中少年有侮韓信者曰汝雖長大好帶刀劒中情怯耳又曰樊噲少以屠狗爲事東觀漢記曰閔仲叔客居安邑者老病家貧不能買肉日買一片猪肝屠者不肯爲斷王隱晉書曰愍懷太子令人屠肉自巳分齊手揣輕重斤兩不差公曰其母本屠家女齊書曰王敬則少時屠狗啇販遍於三呉後爲呉興太守入烏程從市過見屠肉枅歎是我少時在此作也召故人飲酒􅀃平生不以屑也蕭子顯齊書曰帝於芳樂􅁐立市太官毎旦進酒肉雜肴使宫人屠酤周書曰太祖常遊上黨有市屠壯徤衆多畏憚太祖氣凌之嘗醉命屠進几割肉小不如意叱之屠坦其腹謂太祖曰尓豪則刺我太祖即剚其腹市人駭觀執之屬吏李繼韜惜而逸之孔叢子曰子髙謂齊王曰昔臣甞行臨淄市見屠啇焉身脩八尺鬚髯如㦸市易之男女未有敬之者無徳故也莊子曰楚昭王謂司馬子綦曰屠羊􅀃居處卑賤陳義甚髙子爲我延之以三旌之位􅀃曰夫三旌之位吾知其貴於屠羊之肆萬鍾之禄吾知其冨於屠羊之利然豈可貪爵禄使吾君有妄施之名願復反吾屠羊之肆遂不受也又曰朱泙漫學屠龍於支離益單千金之家技成而無所用尉繚子曰太公望行年七十屠牛朝歌尸子曰屠者割肉則知牛長少又曰宋人有公歛皮者適市反呼曰公歛皮屠者遽収其皮燕丹子曰荆軻與武陽入􅁗過陽翟軻買肉爭輕重者屠辱軻武陽欲擊軻止之淮南子曰命屠而享其肉或以酸或以甘齊和萬方其本一牛之躰也又曰屠牛坦一朝解九牛而刃可以剃毛庖丁爲刀十九年刃如新砥硎庖丁宋人砥磨也何則遊乎衆虚之門賈􅁩書曰屠牛坦朝解十二牛而芒刃不頓剥割皆中理􅐭鐵論曰騏驥輓塩車垂頭於太行之坂屠者脫之桓譚新論曰関東鄙語曰人聞長安樂出門西向􅀏知肉味美則對屠門而嚼媿文帝與呉質書亦云也三輔舊事曰太上皇不樂関中思慕郷里髙祖徙豐沛屠兒酤酒賣餅商人立爲新豐縣故一縣多小人又曰更始遣將軍李松攻王莽屠兒賣餅者皆從之屠兒杜虞手殺莽涼州異物志曰大􅁗之國斷首去軀操刀屠人杜夷幽求曰齊宣王見屠牽羊哀其無罪以豕代之傳咸集曰屠牛酤酒鑿錢作錫皆有損害酤毛詩鹿鳴伐木曰有酒湑我無酒酤我論語郷黨曰酤酒市脯不食漢書曰武帝天漢三年􅀄榷酒酤應劭曰縣官自搉賣酒小民不復得酤後漢書曰瑯瑘海曲吕母家素豐資産數百萬乃益釀醇酒買刀劒衣服少年來酤者皆賖與之視其乏者輙假衣裳不問多少又曰劉寛嘗坐客遣蒼頭市酒迂乆大醉而還迂乆猶良乆也客不堪之罵曰畜産寛湏􅁷遣人視奴疑必自殺顧左右曰此人也罵言畜産辱孰甚焉故吾懼其死也又曰崔寔􅀄父卒剽賣田宅起家􅉷立碑頌廣雅曰剽削也音疋妙反葬訖資産竭盡因窮困以酤釀販鬻爲業時人多以此譏之寔終不改亦取足而巳不致盈餘呉志曰潘璋字文章性􅀶蕩􅄝酒居貧好賒酤債家至門輙言後豪當相還宋書曰吏部尚書􅁃仲文尚書中令奴酤酒利其百十後魏書曰鄭羲爲西兖州刺史多所受納政以賄成性又嗇恡人有禮餉者不與盃酒臠肉西門受羊酒東門酤賣之唐書曰建中三年􅀄㩁酒天下悉令官釀斛収直三千米雖賤不得减二千委州縣綜領醨薄私醸罪有差以京師王者都特免其㩁又曰和元十四年湖州刺史李應奏先是官酤酒代百姓納搉歳月旣乆爲弊滋􅀷伏望許令百姓自酤取登舊額仍許入兩稅隨貫均出依舊例折納輕貨送上都許搉酒錢舊皆隨兩稅徴衆戸自貞元已來有土者競爲進奉故上言百姓困弊納輸不充請置官坊酤酒以代之旣得請則嚴設酒法閭閻之人舉手觸禁而官収厚利以濟其私爲害之日乆矣及李應奏罷議者謂宰臣能因一州之請推爲天下之法則其弊革矣韓子曰宋有酤酒者升概甚平遇客甚謹爲酒甚美懸旗甚髙然而酒酸不售恠其故問所知閭長者楊青青曰汝狗猛也曰狗猛也何故不售曰人畏焉或令孺子懷錢挈有壷徃酤而狗迎齕之酒所以酸而不售夫國亦有狗猛欲道之士懷其術而徃欲以明萬乗之主臣爲狗猛迎而齕之如此則主所以蔽賢士所以不用也賈􅁩新書曰鄒穆公視民如子及死酤家不售酒童子不謳歌列仙傳曰酒客者梁市上酒家客也作酒常美曰售萬錢有過主人逐之主人酒更酸敗遂至貧窮又曰女凡者陳留酤酒婦也作酒甚美遇仙人過飲以素書五卷爲質乆開書乃養性交接之術閇房與諸少年飲酒與􅀫止行文書法顔色更好如二十時仙人後過之􅀏曰盗道無師有翅不飛遂追仙人去曹植樂府歌曰市肉取肥酤酒取醇交觴接盃以致殷勤盧漢書曰司馬相如與卓文君馳歸成都家徒四壁立文君乆之不樂謂長卿曰弟俱如臨卭弟旦也從昆弟假貸猶足以爲生何至自苦如此相如與俱之臨卭盡賣車􅀐買酒舎乃令文君當盧郭璞曰盧酒也師古日賣酒之處累土爲盧以居酒瓮四邊隆起其一靣髙形如鍜盧故名盧耳又曰霍光秉政趙廣漢事光及薨後廣漢爲京兆尹心知微指發長安吏自將與俱至光子禹弟直突入其門捜索私屠酤椎破盧罌又曰魯匡曰今絶天下之酒則無以行禮相養放而亡限費財傷民請法古令官作酒以千五百石爲一率開一盧以賣如淳日酒家開肆得客設酒盧故以盧名肆臣瓉案盧酒瓮丗􅀃曰阮公邑家婦有美色當盧酤酒阮與王安豐常從婦飲酒旣醉便眠其婦側夫始殊疑之伺察終無他意又曰王濬冲爲尚書令着公服乗軺車經黄公酒盧下迴頋謂後車客曰吾與􅄞叔夜阮嗣宗共酣飲於盧竹林之遊亦預其末自􅄞生阮公亡以來便爲時所羈紲今日視此雖近邈􅀂山河南史曰齊謝幾卿性通脫㑹意便行不拘朝憲嘗預樂遊􅁐宴不得醉而還因詣道邊酒盧停車褰幔與車前三騶對飲時觀者如堵幾卿處之自􅀂肆周禮天官内宰之職曰凡建國佐后立市設其次置其叙正其肆又地官下曰肆長各掌其肆之政令陳其貨賄名相近者相逺也實相近者相邇也而平正之爾亦近也俱是物也使惡者逺善善自相近鄭司農云謂􅀂殊王之屬俱名爲珠俱名爲王而賈或百萬或數萬恐農夫愚民見欺故别異令相逺使賈人不得雜亂以欺人左傳襄三十年曰伯有死於羊肆羊肆市列子産禭之枕之股而􅂘之歛而殯諸伯有之臣在市側者旣而葬諸斗城論語曰百工居肆以成其事君子學以致其道包子曰言百工処其肆則事成猶君子學以致其道續漢書曰孝靈皇帝於後宮與人列肆販賣使偷盗爭闘上視以爲樂謝承後漢書曰郭􅁗㧞申屠子龍於􅃮工之中嘉許偉康於屠酤之肆􅀽山松後漢書曰丗祖怜盆子賞甚厚以爲趙王郎中後疾失明賜滎陽均輸官地以爲列肆使食稅終其身晉中興徴祥記曰烈宗丗㑹稽王輔政於府内園中穿池築山山池之間處處有肆使婢酤賣肉於其中道子將見幸乗舡至酒肆輙携入肆買酒肉狀如市􅝬以爲􅀏樂梁書曰吕僧珎爲南兖州刺史從父兄子先以販䓗爲業僧珎至乃棄業求州官僧珎曰吾荷國恩重無以報効汝等自有常分豈可妄求叨越當速反䓗肆耳皇甫謐髙士傳曰許邵名知人歴客舎則知虞求賢人幘肆則㧞楚子昭晉令曰坐盧肆者皆不得􅀫肆上殷氏丗傳曰盖寛字元祚河南鄭廉始岀寒賤未知名君見而友之廉父常居肆乃就拜其父於市衆皆驚由是顯名位至司徒楚辭曰連蕙􅀂以爲佩過鮑肆而失香張衡西京賦曰彼肆人之男女麗靡奢于許史繁欽嘲應德璉文曰應温德云昔與季叔才俱到富波飲於酒肆日暮留􅀫主人有養女年十五肥頭赤面形似鮮卑偶恱之夜與姦通便生足下莊子曰曽不如早索我於枯魚之肆楊子法言曰好書不能要諸仲尼書肆也李􅁤注曰賣書市也書不經非書也語林曰王仲祖少有三逹覽鏡自翫曰王開山郍生此兒又酷貧帽敗自以形美乃入帽肆就帽嫗戯乃得新帽店丗􅀃曰阮脩字宣子常歩行以一百錢桂杖頭至酒店上便獨酣暢崔豹古今注曰店置也以置貨鬻之物賣買周禮地官下曰泉府掌以市之征布歛市之不售貨之滯於民用者以其賈買之物揭而書之以待不時而買者各從其抵都鄙從其主國人郊人從其有司然後予之又曰司市掌市之治教以量度成賈而徴儥償買也物有定賈則買者來也以質劑結信而止訟質劑謂兩書一礼而别之也以賈民禁僞而除詐以賈民爲之者知物之情僞與實詐以刑罰禁虣而去盗以泉府同貨而曰死馬尚市况生馬乎朞年千里馬至者二漢書曰漢興接秦之弊諸侯並起民失作業而大飢饉米石五千人相食死者過半髙祖令人無得賣子就食蜀漢天下旣定民無盖藏蘇林曰无物可盖藏又曰衛青比年學擊胡賦稅旣不足以奉戰士有司請令民得買爵及贖禁錮免罪請買賞官名曰武功爵級七十萬又曰桑弘羊置平准於京師當天下委輸王官治車諸器比市給大農大農諸官盡籠天下之貨物貴則賣之賤則買之如冨啇大賈亡所牟大利牟取又曰禹貢尚書欲令近臣自諸曹侍中以上家無得私販賣者又曰中平元年􅀄賣官自􅀜内侯以下至虎賁羽林入錢各有差公千萬卿五百萬東觀漢記曰光武嘗與朱祐昔買蜜合藥上追念之即賜祐白密一石問今憶與朕長安時共買􅁡乎又曰郭舟從師長買繻入函谷􅀜乃􅁣然歎曰丹不乗使者車終不出􅀜又曰司空宋弘常受俸得盬䜴千斛遣諸生迎取上河令糶之盬賤諸生不糶弘怒便遣及其賤悉糶賣不與民爭利謝承後漢書曰靈帝數遊戯於西園令後宫綵女爲客主身爲啇賈謝承後漢書曰張揩字公超治嚴氏春秋家貧無以爲業嘗乗驢車至縣賣藥足給食者輙還郷王隱晉書曰劉寔字子眞平原人少貧苦糠飯繩索作牛衣賣手繩口誦齊書曰朱文濟字敬逹呉興人自賣以葬母太守謝􅊪命爲儒林不就又曰呉逹之義興人也嫂亡無以葬自賣爲十夫客以營冢椁從祖弟敬夫妻荒年􅀍略賣江北逹之有田十􅅿貨以贖之南史曰㑹稽寒人陳氏有三女無男祖父母年八九十老無所知又篤癃病毎不安其室遇寒飢三女相率於西湖採菱蓴更日至市貨賣未嘗虧怠郷里稱爲義門北史曰齊常景躭好經史愛翫文詞􅀂遇新異之書殷勤求訪或復貨買不問價之貴賤必以得爲期晏子春秋曰靈公好婦人丈夫飾者國盡服之公使禁之曰女子以男飾者裂其衣斷其帶裂衣斷帶相望不止公問晏子晏子曰公服之於内而禁之於外猶懸牛首於門鬻馬􅁏於市公曰善使内勿服不環月而國人莫服韓子曰楚人賣珠於鄭爲木蘭之櫝薫以桂椒綴以珠玉飾以玫瑰緝以翡翠鄭人買其櫝還其珠可謂善賣櫝不可謂善鬻珠又曰宋之富賈有監止子者與人爭買百金之璞因佯失而毁之􅀒其百金而理其毀得千溢焉又曰諺所謂傭自賣哀而不售士自譽辨而不信者也又曰田脩教其子田章曰主賣官爵臣賣知力故曰自恃無恃人淮南子曰郢人有鬻其母者爲請於買者曰此母老矣幸善食之而無多苦也此行大不義而欲爲小義也三輔決録曰五門子孫凡民之五門今在河南西四十里馬氏兄弟五人共居此地作五門客舎因以爲名主養猪賣猪故民爲之語曰􅁐中三公鉅下二卿五門藿藿但聞豚聲三輔黄圗曰元始四年起明堂辟雍長安城南北爲㑹市但列槐樹數百行爲隊無牆屋諸生朔望㑹此市各持其郡所出貨物及經書傳記笙磬器物相與賣買雍容揖讓或論議槐下董卓別傳曰吕布殺卓百姓相對欣喜抃舞皆賣家中珠環衣服床榻以買酒食自相慶賀長安酒肉爲之踊貴漢武内傳曰帝先有玉板一枝杖是西胡王所献帝甚愛之崩後故以入槨其年有人於扶風郿市中買得者帝時左右侍人識之以告有司詰問云見市中一人於巷賣之責三十疋即雇交直實不識賣主姓名皇甫謐髙士傳曰毛公薛公皆趙人也遭戰國之亂二人俱以處士隱於邯鄲市毛公隱爲􅀶徒薛公隱於賣膠又曰韓康字伯休京兆覇陵人常採藥名山賣於長安市口不二價三十餘年時女子從買藥康守價不與女子怒曰是韓伯休􅁘乃不二價康歎曰我本避名今小女子皆知有何用藥爲乃遁覇陵山中捜神記曰南陽宗定伯少年夜行逢􅀑􅀑問爲誰定伯欺云我亦􅀑遂共爲侣赴宛行極困相檐問鬼曰畏何物曰唯不喜人唾欲至宛便擔􅀑著酒瓮上徑詣宛市􅀑化爲羊恐其變並唾之賣得錢千五百晉後記曰成都王圍京邑城中魚肉無出營巷賣死驢馬肉雜死人肉賣之車頻􅁗書曰王猛攻鄴慕容評拒猛而恒賣水與軍人衆思爲亂猛因得敗之周景式廬山記曰山有康皇廟廟有銅馬一枚道士丁􅀇眞取擲置澗中經􅀫復還丁乃賣與逺村人買者盡病即送還悉愈列仙傳曰安期生瑯瑘阜郷人賣藥海邊􅁗始皇請見與語三日三夜賜金璧數千萬風俗通曰夜䊮俗􅀃市買者當清旦而行日中交易所有夕時便罷無人也今乃夜䊮榖明癡騃不足也凡靳不敏惠者曰夜䊮傳子曰靈帝牓門賣官崔烈入錢五百萬取司徒語林曰蘇峻新平帑藏空猶餘數千端分麁練王公謂諸公曰國家凋弊貢御不至但恐賣練不售吾當與諸賢各製練服之月日間賣遂大售端至一金應璩新詩曰太官有餘厨大小無不賣豈徒脯與糗醯醢及塩豉劉超讓表曰臣家理應用一純色牛連市素不如意外厩猥牛中牛色有任用者臣有正陌三萬錢五疋布乞以買此牛詔曰􅁥此不足賣與冝便賜之然義與前後辭讓不妄受一賜令亦必復不受可聽如所啓駔儈􅀃文曰駔馬儈也漢書曰子貸金錢千貫節駔儈孟康曰節節物貴賤也謂除估儈其節利比於千乗之家師古曰儈者合㑹二家易折者駔者其首辛也駔音子郎切儈音貢外切後漢書曰呉漢字子顔家貧給事縣爲亭長王莽末以賔客犯法乃亡命至漁陽資用乏以販馬爲業續漢書曰平原王君公以明道􅀷曉隂陽懷德㓕行和光同塵不爲皎皎之操王葬丗退身儈牛自給有似蜀之嚴君平捜神記曰羊公字雍伯雒陽人本以儈賣爲業性篤孝父母終葬無終山遂家焉晉令曰儈賣者皆當着巾白帖額題所儈賣者及姓名一足着白履一足着黒履淮南子曰叚于木晉國之大駔許愼注曰駔市儈也而爲文侯師太平御覽卷第八百二十八
