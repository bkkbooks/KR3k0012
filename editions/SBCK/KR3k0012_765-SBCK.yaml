front:
  text: 太平御覽卷第七百六十五
  hash: sha256:8f6eb1c19099c53189260cbf99be053bb75dce4fcff94a1141bd18630f316df2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_765-1a}
body:
  text: 器物部十箕帚畚斛量附斗升蓑笠桔橰椸枷梯􅂎朳箕帚世本曰少康作箕帚詩曰維南有箕不可以簸揚維南有箕載翁其舌禮曰凢爲長者糞之禮必加帚於箕上以􅃑拘而退其塵不及長者以箕自向而扱之又曰汜埽曰埽埽席前曰㭓㭓弗運切席不以鬛執箕膺擖鬛謂帚也恒埽地不㓗清也膺親也擖舌也持箕將去糞者以舌自卿擖以渉切又曰良弓之子必學爲箕史記曰張儀􅀃楚王曰大王誠能聽臣臣請使􅁗太子入質於楚楚太子質於􅁗請以􅁗女爲大王箕箒之妾効萬室之都以爲湯沐之邑又曰鄒子如燕昭王擁篲先驅請列子之坐而受業漢書曰􅁗爲亂政虐刑殘滅天下比爲長城之役南有五嶺之戍外内搔動百姓罷音皮弊頭㑹箕歛計人頭數出榖以箕歛之以供軍費又曰上歸櫟陽五日一朝太公家令􅀃曰天無二日土無二王帝雖子人主也太公雖父人臣也奈何令人主拜人臣如此則威重不行後上朝太公太公擁篲迎門却行上大驚下扶太公太公曰帝人主也奈何以我亂天下法也又曰魏勃欲見齊相曹叅無因常早掃叅之門又曰賈􅁩上書曰􅁗人借父櫌鋤而有得色母取箕帚立而誶語晉書曰王獻之善􅈻書有父風以掃帚沾泥書大字方丈甚善王隱晉書曰􅁃衮􅀌兄女曰芳將嫁羙其服矣衮刈荆苕爲箕帚焉召諸子于堂男女以班而謂芳曰汝少􅀌今汝適人將事舅姑洒埽庭内婦人之道故賜汝此匪器之羙欲汝之温恭朝夕雖休勿休也齊書曰劉休妻王氏妬帝聞賜休妾勑與王氏杖二十令休於宅後開小店使王氏賣掃帚皂莢以辱之國語曰越王勾踐行成於吴曰一介適女執箕帚於王宫淮南子曰周鼎不㸑而不可賤掃帚日用而不足貴南越志曰鮑靚爲南海太守嘗夕飛徃羅浮山曉還有小吏晨洒掃忽見兩鵲飛入小齊吏帚擲之墜於地視乃靚之履也西域志曰佛帚在月支國長三尺許似孔雀尾也異苑曰北海徐寔婢蘭義熈中忽患羸黄而自拂拭有異於常家共伺察見竹掃帚從壁角來趣婢取而焚之婢即平復雜五行書曰常以正月三日買箕四枚懸堂上四壁令人治生大得治田􅁞萬倍錢財自入李尤箕銘曰神農殖榖以養蒸民箕主簸􅀭糠粃乃陳畚左傳曰晉靈公不君失君道宰夫臑音而熊蹯不熟殺之寘諸畚使婦人載以過朝又曰宋災樂喜爲司城以爲政陳畚梮具綆􅇲畚籠也􅀳中興書曰王猛少貧賤鬻畚爲事常至洛陽貨畚有一人於市貴買其畚云家近在此可隨我取直猛隨去忽至深山中此人語猛且住樹下當先啓道君湏􅁷猛進見一老公踞牀髭鬢悉白侍從十許人引猛云大司馬公可進猛因拜老公曰王公何縁拜即十倍雇畚直遣人送猛岀山旣頋視乃是嵩髙山也淮南子曰禹之時天下大水禹身執畚鍤以爲民先韓詩外傳曰鮑焦衣弊膚見挈畚持􅂼遇子貢曰吾子何以至於此鮑焦曰天下之遺徳教者衆矣吾何以不至此子貢曰吾聞非其世者不至其利汚其君者不履其土今子非其世而持其􅂼乎鮑焦曰吾聞賢者易進而輕退廉士易愧而輕死乃􅂢其􅂼立枯於洛水之上斛量附廣雅曰斛謂之鼔方斛謂之角書曰恊時月正日同律度量衡合四時之氣節月之大小月之甲乙齊一也律法制及尺丈斛斗斤兩皆均同周禮曰㮚氏俗作爲量改煎金賜則不耗不耗然後權之權之然後凖之凖之然後量之其銘曰時文思索允臻其極喜量旣成以觀四國永啓厥後兹噐維則漢書曰量者龠合升斗斛也所以量多少也本起於黄鍾之龠以子榖秬􅁰中者千有二百實其龠二龠爲斛而五量嘉矣其法用銅方合十合爲一升十升爲斗十斗爲斛而五量嘉矣其法用銅方尺而圍其外旁有音祧焉其上爲斛下爲斗左耳爲升右耳爲合爲合龠之量也升者登合之量也斗者聚升之量也斛者角斗平多少之量也夫量者躍於龠合於合登於升聚於斗角於斛也職在太倉太司農掌之後漢書曰第伍倫爲京兆主簿倫平銓衡正斗斛市無阿枉百姓恱服之魏志曰太祖常討賊廪穀不足私謂主者主者曰可小斛以是之太祖曰善後軍中言太祖欺衆太祖謂主者曰特當借汝死以厭衆不然事不解遂斬之題屍曰用小斛盗軍榖故斬之崔鴻十六國春秋後凉録曰吕光與􅀛兹王戰大敗之故大奢侈冨於養家有蒲桃酒或千斛經十年不敗士卒淪没酒藏者相繼荀氏别傳曰荀遂字仲陽隱居不仕時歳飢荒來糴者遂妻常叩其斛糴者歸量輙過其本時人號爲㭬斛夫人莊子曰聖人不死大盗不止爲之斗斛以量之則并與斗斛而竊之權衡以稱之則并與權衡而竊之雖有軒冕之賞弗能勸斧􅃏之威弗能禁剖斗折衡而民不爭天文要集曰斗星卬則天下斗斛不平覆則歳稔雜令曰諸量以秬􅁰中者容一千二百爲籥二籥爲合十合爲升十外爲斗三斗爲大一斗十斗爲解楚辭曰世並舉而好朋一升斛而相量言今之人皆好朋黨並相薦舉將其貪佞之心以量清絜之士衆比周而肩隨賢者逺害而隱藏㪷史記曰鴻門之㑹沛公使張良以㪷一􅃗予亞父亞父受玉斗撞而破之又田乞仕齊景公爲大夫其收賦稅於民以小斗受之其􅅒予民以大斗行隂徳於民而景公弗禁由此田氏得衆心宗族益強人思田氏漢書曰王莽攝政鑄作威斗威斗者以五石銅爲之形􅀂北斗長二尺五寸欲以厭勝衆兵旣成命有司􅀒之莽岀在前入則御旁說苑曰合升斗之微以滿倉廪王逸子曰自幽厲禮壞樂崩天綱㢮絶諸侯力政轉相吞㓕徳不能懷威不能制至於王􅎼遂䘮玉斗升漢書律暦志曰嘉量法用銅方尺而圜其外左耳爲升右耳爲合左傳曰齊舊四量豆區釜鍾四升爲豆各自其四以登於釜釡十則鍾鍾乃大矣陳氏三量皆登一焉􅁑洪神仙􅀓曰王方平語蔡經家人曰吾欲賜汝等酒此乃出天厨其味醲非俗人所冝飲之或能爛人膓今當以水和之汝輩勿恠也乃以一升酒以一斛水攪之以賜經家家人飲之一升許皆醉良乆蓑笠廣雅曰草謂之蓑簦音登謂之笠詩曰爾牧來思荷蓑荷笠蓑所以備􅀨笠所以御暑又曰􅀍都人士臺笠緇撮臺所以御暑笠所以禦􅀨也禮曰大羅氏天子之掌鳥獸者也諸侯貢屬焉草笠而至尊野服也諸侯於折使使者戴草笠貢鳥獸也國語曰越王勾踐栖於㑹稽乃令三軍求退矣王謀臣大夫種曰譬如蓑笠時􅀨至必求之令君旣棲於㑹稽之上而求謀臣無乃後乎又曰吴夫差使王使孫苟告勞于周曰齊人爲不道不供承王事夫差不忍􅀍甲帶劒簦笠相望於女陵簦笠備雨器也天舎其裏齊師還言敗而還夫差豈敢自多又曰管仲曰今夫農羣萃而州處察其四時時雨旣至梜其槍刈耨鏄以旦暮從事於田野脫衣就㓛首戴茅蒲身衣裰襫音撥襫茅蒲簦笠也襏襫蓑也沾體塗足以從事於田野史記曰瞽瞍使舜上廪從下焚廪舜乃以􅀨笠自杆而下得不死之又曰虞卿觧其相印與魏齊間行走大梁欲因信陵君以走楚信陵君未肯見曰卿何人齊曰虞卿躡履檐簦一見趙王賜白璧一􅀟黄金百鎰再見拜爲上卿聞君急士之窮而歸公子吴志曰吕蒙汝南人代鄧當爲將定南郊約軍中不得于人家有所求取蒙麾下士是汝南人取民家一笠以覆官鎧蒙以爲犯軍令不可以郷里故廢法遂斬之晏子曰景公出遊曰嗚呼使古而無死何如晏子曰􅀂使古而無死丁公太公將有齊國吾將戴笠衣􅄄以行畎􅅿之中也風土記曰越人結交約曰卿雖乗車我戴笠後日相逢下車揖盛弘之荆州記曰冝都有風穴樵人有冬過者置笠穴口風吹吸之經日還渉長陽溪而得其笠則知溪穴潜通矣馮敬通詣鄧禹牋曰今日裘與蓑孰急見􅀨則裘不用上堂則蓑不御此更爲適者也今敬通逢堂蓑之不御也本草曰敗天公主􅀑注精魅此竹笠之敗也曹植九詠曰越江兮刈蘭暮秋兮薄寒􅀍蓑兮戴笠置露兮踐雚王褒撞約曰􅀨墮如注瓮板薜戴子公薜蓑衣也子公笠也桔橰通俗文曰機汲曰桔橰禮曰棒席如橋衡鄭玄曰井上桔橰衡在上低仰者也莊子曰子貢南逰楚漢隂見一丈人爲圃畦於漢隂鑿隧而入井抱甕而灌用力多而見功寡子貢曰鑿木爲機後重前輕挈水􅀂流其名桔橰圃者曰聞有機事必有機心吾非不知羞不爲也又曰獨不見夫桔橰者乎引之則俯舎之則仰彼人之所引非引人者也故俯仰而不得罪於人汝南先賢傳曰蔡君仲井桔橰壤在母年命上憂不敢治而扶老生繞之扶老藤也生繞桔橰不湏治孝之感也揓枷青移架禮曰男女不同揓枷又曰不敢懸於夫之揮音揮揓竿謂之揓爾雅曰日竿謂之揓郭璞注曰衣架也古詩曰甖中無升米架上無懸衣梯􅀃文曰梯木階也禮曰復有林麓則虞人誤階無林麓則狄人設階蜀志曰劉􅄾問自安之計於諸􅁑亮亮不荅􅄾遊後園登樓去梯謂亮曰可以言未謂劉曰君不見申生在内而危重耳居外而安乎崔鴻十六國春秋後凉録曰竇荀洛陽人也以壯勇知名從吕光攻􅀛兹登雲梯入地道或時墮落􅂫而復上光深竒之孟子曰瞽瞍使舜完􅅒􅂢階搜神記曰和憙鄧后夢登梯以椚天體蕩蕩正青􅀂鍾乳者后仰漱之石虎鄴中記曰石虎太子宣與母弟蔡公韜迭秉政事宣嫌終有代巳之􅀔八月社日韜登東明觀遊暮還酣宴作女妓罷宣遣力士鉅鹿楊杯等十餘人夜縁梯入韜弟斫殺之鹽鐵論曰防塞利門而民猶爲非况上之爲利乎傳曰諸侯好利則大夫鄙大夫鄙則士貪士貪則庶人盗是開利室内民罪梯也丗􅀃曰韋仲將能書魏明帝起殿欲安牓使仲將登梯題之旣下頭􅁂皓然因是勑戒兒孫勿復學書嵇含雞賦曰余庭有栖雞而一雄㝡武常慿梯升栖守時告晨未常有殆郭璞遊仙詩曰靈溪可潜盤安事登雲梯杷朳方言曰杷無齒爲朳宋魏之間謂之渠拏今江東名亦然或謂之渠䟽周生烈曰夫忠謇朝之杷朳正人國之掃篲也秉把執篲除凶掃穢國之福主之利也太平御覽卷第七百六十五
