front:
  text: 大平御覽卷第三百四
  hash: sha256:da9678ddb3b091a7c4cb492741243b86acc2b867fdaaad30c140a8693b9c7c6c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_304-1a}
body:
  text: 兵部三十五征伐中史記曰􅁗􅓎公令内史廖以女樂二八遺戎王􅓎公又數使人間要由余遂去降􅁗􅁗􅓎公以客禮禮之問伐戎之利又曰趙四戰之國其人習兵不可伐也又曰魯君問柳下惠伐齊下惠歸而有憂色曰吾聞伐國不問仁人此言何至於我哉又曰軒轅之時神農氏丗衰諸侯相侵伐暴虐百姓而神農氏弗能正於是轅轅乃集用干戈以征不享諸侯或來賔從而􅃖􅀹最爲􅁀莫能伐又曰賜弓矢斧􅃏使得征伐爲西伯又曰西伯旣卒周武王東伐至孟津諸侯叛殷㑹周者八百諸侯皆曰紂可伐又曰武王爲文王木主載車中武王自稱太子發言奉文王以伐不敢自專又曰武王偏告諸侯曰殷有重罰不可不畢罰徐廣注云伐一作滅漢書郊祀志曰昔齊􅁊公欲封禪謂管仲曰寡人北伐山戎過􅀌竹西伐束馬縣車上卑耳之山南伐召陵登熊耳山以望江漢兵車之㑹三而乗車之㑹六遂九合諸侯一匡天下昔三代受命亦何以異乎又李廣利傳曰天子爲萬里而伐不録其過又匈奴傳曰東胡強聞冒頓殺父自立乃使使謂冒頓欲得單于閼氏冒頓問左右左右皆怒曰東胡無道乃求閼氏請擊之冒頓曰奈何與人憐愛一女子乎遂取所愛閼氏與之東胡愈驕冒頓遂東集襲擊東胡東胡􅀄輕冒頓不爲備及冒頓以兵至大破滅東胡王後漢書曰帝以􅀜中未定而鄧禹乆不進兵下勑曰司徒堯也亡賊桀也長安吏人遑遑無所依歸冝以時進討鎭慰西京繫百姓之心禹猶執前意乃分遣將軍別攻上郡諸縣更徵兵引穀歸至大要大要縣名魏志曰太祖父嵩去官後還譙以董卓之亂避難琅邪爲陶謙所害故太祖志在復讎東伐又曰景元四年鄧艾伐蜀自隂平行無人之地七百餘里鑿山通道作橋閣山髙谷深至有艱嶮艾以旃自褁推轉而下將士皆攀木縁崖魚貫而進王隱􅀳書曰太康元年龍驤將軍王濬等攻建平丹陽城尅之東擊西陵以下盡㧞其城虜其將帥於是上下諸軍同時並進呉人降者以萬計呉丞相張悌及護軍孫震與楊州刺史周浚等戰于板橋破之臨陣斬悌震首濬遂汎舟東下所歴皆平軍至秣陵晧面縛與舁襯將其太子詣濬降乃收其圖籍皆因呉所置除其虐政示以簡易百姓大悅乃赦天下改元爲太康天下大酺五日􅀳書曰宣王破張魯請魏武便討劉備魏武曰人􅀂無足旣得隴復欲得蜀也又曰王羲之與㑹稽王牋陳殷浩不冝北伐并論時事又宣紀曰鎭東大將軍諸葛誕殺楊州刺史樂綝以淮南作亂議者請速伐之帝曰吾當與四方同力全勝制之乃表曰昔黥布叛逆漢祖親征隗嚻違戾光武西伐皆所以奮楊赫斯震曜威武也又天文志曰參十星一曰參伐主斬刈又爲天獄主殺又馮紞傳曰􅀄謀伐呉紞與賈充荀勗同共苦諌不可呉平紞内懷慙懼又載記曰慕容垂議征長子諸將咸諌以慕容永未有舋連歳征役士卒疲怠請俟他年垂將從之及聞慕容德之䇿􅀏曰吾計决矣不復留賊以累子孫也乃發歩􅀐七萬遣其丹陽王慕容瓉龍驤張崇攻求弟支于晉陽北史曰慕容紹宗討侯景於渦陽時景軍甚盛􅀄聞韓䡄徃討之曰噉猪膓小兒聞髙岳往曰此岳精凢人耳諸將􅀍輕及聞紹宗至扣案曰誰敎鮮卑小兒解遣紹宗來􅀂然髙王未死耶及與景戰諸將頻敗無肯先者紹宗麾兵徑進諸將從之因大捷三國典略曰周伐梁于謹大軍次于樊鄧岳陽王率軍㑹之傳檄于梁曰告梁文武衆官夫作國者罔弗以禮信爲夲惟尓今主徃遭侯景逆亂之始實結我國家以隣援今揔背德黨賊髙洋引厥使人置之堂宇傲我王命擾我邊人我皇帝襲天之意弗敢以寧分命衆軍奉揚廟略凡衆十萬直指江陵丁卯梁主停講内外誡嚴是朝昬霧巳時方歇梁主親戎百官並甲胄從於褉飲堂間公私馬仗是日大風㧞木王琛旣至石梵未見我軍乃馳書報黄羅漢曰吾至梵境上怗然前曰所言皆兒戯耳羅漢入啓梁主疑之庚午續講百官以戎服聽後周書曰建德五年冬十月帝謂羣臣曰朕去歳属有􅐄疾遂不得克平逋㓂前賊入境備見敵情觀彼行師殆同兒戯又聞其朝政昬亂政由羣小百姓嗷然朝不謀夕天與不取恐貽後悔􅀂復同徃年出軍河外直爲撫背末扼其喉然􅀳州本髙歡所起之地鎭攝要重今徃攻之彼必來援吾嚴軍以待擊之必克然後乗破竹之勢鼔行而東足以窮其窟穴混同文䡄諸將多不願行帝曰機者事之微不可失矣􅀂有沮吾軍者朕當以軍法裁之巳酉帝揔戎東伐以越王盛爲右一軍揔管􅂎國公亮爲右二軍揔管隨國公楊堅爲右三軍揔管譙王儉爲左一軍緫管大將軍竇恭爲左二軍緫管齊王憲陳王純爲前軍又曰保定中命宇文護統衆伐齊於是徵二十四軍及左右廂散􅈻及􅁗隴巴蜀之兵諸蕃國之衆二十萬人十月帝於廟廷授護斧􅃏出軍至潼關乃遣柱國尉遲逈率精兵十萬爲前鋒大將軍權景宣攻克䂊州尋以洛陽圍解亦引軍退楊檦於軹關戰護於是班師以無功與諸將稽首請罪帝弗之責也又曰建德四年秋七月武帝召大將軍以上於文德殿帝曰太祖神武膺運創造王基兵威所臨有征無戰唯彼僞齊猶懷䟦扈雖復戎車屢駕而大勲未集朕以寡昧纂承鴻緒徃以政出權宰無所措懷自親覽萬機便圖東討惡衣菲食繕甲治兵數年巳來戰備稍足而僞主昬虐恣行無道伐􅁀除亂斯實其時今欲數道岀兵水陸兼進北拒太行之路東扼􅀺陽之險􅀂攻㧞河隂兖豫則馳檄可定然後養銳享士以待其至但得一戰則破之必矣王公以爲何如羣臣咸稱善丁􅐫詔曰髙氏因時放命據有汾漳檀假名器歷年永乆朕以亭毒爲心遵養時晦遂敦聘好務息􅀺元而彼懷惡不悛㝷事侵軼背言􅀒信竊邑藏姦徃者軍下冝陽舋由彼始兵興汾曲事非我先此獲俘囚禮送相繼彼所拘執曾無一反加以淫刑妄逞毒賦繁興齊魯軫殄悴之哀幽并企來􅂫之望旣禍盈惡稔衆叛親離不可一戎何以大定今白藏在辰凉風戒節厲兵詰暴時事惟冝朕當親御六師龔行天罰庶慿祖宗之靈資將士之力風馳九有電掃八紘可分命衆軍指期進發以柱國陳王純爲前一軍緫管滎陽公司馬消難爲前二軍緫管鄭國公逹奚震爲前三軍緫管越王盛爲後一軍緫管周昌公侯莫陳瓊爲後二軍緫管趙王招爲後三軍緫管齊王憲率衆二萬趣􅀺陽隨國公楊堅廣寜侯薛廻舟師三萬自渭入河柱國梁國公侯莫陳苪率衆一萬守太行道申國公李穆衆三萬守河陽道常山公于翼衆二萬岀陳汝壬午上親率六軍衆六萬直指河隂八月癸卯入于齊境禁伐樹踐苗稼犯者以軍法從事隋書曰崔仲方爲􅉑州刺史上書論取陳之䇿曰臣謹案􅀳太康元年歳在庚子􅀳武平呉至今開皇六年􅀊次景午合三百七載春秋寳乾圖云王者三百年一蠲法合三百之期可謂備矣陳氏草竊起於景子至今景午爲衝隂陽之忌昔史趙有言曰陳顓頊之族爲水故􅀊在鶉火以滅又云周武王克商封胡公滿於陳至魯昭九年陳災禆竈曰歳五及鶉火而後陳亡楚􅂶之楚祝融之後也爲火正故復滅陳陳承舜後舜承顓頊雖太嵗左行􅀊星又轉鶉火之歳陳族再亡戊午之年嬀虞運盡語迹雖殊考事無別皇朝五運相承感火德而王國號爲隨與楚同分楚是火正午爲鶉火未爲鶉首申爲實沉酉爲大梁旣當周􅁗􅀳趙之分􅀂當此分發兵得􅀊之助以今量古滅不疑也臣謂午未申酉並是數極蓋聞天時不如地利地利不如人和況主聖臣良兵強國冨動植迴心人神叶契陳旣主昬於上民讟於下險無百二之固衆非九國之師夏癸殷辛尚不能立獨此島夷而稽天討伏度朝廷自有宏謀但蒭蕘所見兾申營爛爝今唯須武昌巳下蘄和滁方呉海等州更怗精兵宻營渡計益信襄荆基郢等州速造舟艥多張勢爲水戰之具蜀漢二江是其上流水路要衝必爭之所賊雖於流頭荆門延洲公安巴陵隱機夏首蘄口盆城置船然終聚漢口峽口以水戰大決􅀂賊必以上流有軍令精兵赴援者下流諸將即湏擇便横渡如擁衆自衛上江水軍鼓行以前雖恃九江五湖之險非德無以爲固徒有三呉百越之兵無恩不能自立上覽而大悅轉基州刺史徵入朝仲方因面陳經略上善之賜以御袍袴并􅄂綵五百叚進位開府而遣之及大舉伐陳以仲方爲行軍緫管率兵與􅁗㑹又曰開皇九年大舉伐陳􅀂賀􅀂弼爲行軍揔管將渡江酹酒而呪曰弼親承廟略逺振國威伐罪吊民除兇剪暴上天長江鑒其􅀂此如使福善禍滛大軍利渉如事有乖違得葬江魚腹中且不恨又曰李德林自隋有天下毎賛平陳之計八年車駕幸同州德林以疾不從勑書追之書後御筆注云伐陳事意冝自隋也時髙潁因使入京上語頴曰德林􅀂患未堪行冝自至宅取其方略髙祖以之付􅀳王後駕還在塗中髙祖以馬鞭南指云待平陳訖㑹以七寳裝嚴公使自山東無及之者唐書曰武德􅀄􅁗王東討王丗充連年未下􅀫師于野髙祖以兵乆在外議欲班師中書令封德彛奏曰丗充得地雖多而羇縻相属其所用命者唯洛陽一城而巳計盡力窮破在旦夕今􅀂還兵賊勢必振更相連結後必難圖未􅀂乗其巳衰破之必矣髙祖從其議及平世充髙祖顧謂侍臣曰朕􅀄發兵東討衆議多有不同唯􅁗王請行德彜賛成此計張華叶同􅀳武亦無以加之又曰髙崇文伐蜀領兵馬取鳯翔邪谷路李元奕領兵馬取駱谷路同赴梓州應接當􅁗惠王時用司馬錯之䇿以伐蜀漢光武使呉漢伐公孫述魏司馬文王使鄧艾伐劉禪􅀳穆帝使􅁊温伐李子仁宋武帝使朱齡石伐譙縱梁武帝使鄧元起伐劉季連周太祖使尉遲逈平蕭紀隋文帝使梁睿平王謙憲宗命髙崇文平劉闢自􅁗至元和九度伐蜀四爲水軍泝江而上唯􅁗與鄧艾尉遲逈梁睿及崇文五在斜谷駱谷岀師南討不廷古司馬兵法曰王霸之所以治諸侯者以土地刑諸侯列相也相諸侯優劣地而封之以德受土廣德受土小也以正命平諸侯王者以道德善政敎訓諸侯平均之以禮信結諸侯謙㳟愛惠接待諸侯官命誠信以治民心以材力􅀃諸侯材能也力者任重理煩能堪物理事位髙力大故諸侯悦來各修其職任以謀人維諸侯維持也諸侯逺方來不奉制令驕佚自專故立牧伯維持督御之同患同利以合諸侯明約有功賞之奢淫不從罰之所以合諸侯也比小大以和諸侯比次也使小國事大國不失尊卑之序以恊諸侯也㑹之所以發禁三者恐禁命不行以亂風化故發丸伐三禁以申勑之凌弱犯寡則沮之侮弱侵寡則四靣削其地賊傷人則伐之暴内簡外則壃之言諸侯内外與臣下無禮而􅁀虐之外輕慢小人不恤折禁則置之空壃無人之地野荒民散則削之􅀒固不伏則侵之賊殺其親則正之悖逆人倫則攻殺也放殺其君則殘之盡殘滅其首惡輩􅀋也犯命凌正則杜之侮王者法則土塞不命與鄰國交通外内亂禽獸行則滅之諸侯淫亂失人倫内外不别與禽獸同行不可以示百姓則誅滅盡矣孫子曰夫伐大國則其兵衆不得聚威加於敵家則交不得合皆失之矣是故不事天下之交不養天下之權霸主者不結威天下諸侯之交權交者也伸巳之􅀻絶天下之交奪天下之􅁠已威得伸巳私也威加於敵家故其國可㧞而其城可隳也無法之懸無功之令言軍法令不應預施懸也司馬法曰見敵作誓瞻功作賞此之謂也犯三軍之衆􅀂使一人犯者用也言明罰雖用衆若使一人也又曰安能動之攻其所愛故我欲戰敵雖髙壘深溝不得不與我戰者攻其所必救也絶糧道守歸路攻其君主上兵伐謀敵始有設謀伐之易其次伐交不令合春秋􅀃題辭曰伐者渉入國内行威有所斬壞伐之爲言敗也白虎通曰王者受命質家先伐文家先改正朔何質家言天命巳使民誅無道故先伐文家天命巳成爲王者故先改正朔也文者先其文質者先其質也故論語曰予小子履改昭告于皇天上帝此謂湯伐桀告天也詩云命此文王言誅伐也禮記曰湯放桀武王伐紂時也尚書曰今予惟恭行天之罰此言開自出伐有扈也王制曰賜之弓矢乃得專征伐犯王誅者也大夫將兵出必不御者欲盛其威使士卒一意繫心故但聞將軍令不聞君命也明進退在大夫也又曰誅者何謂也誅猶責也誅其人責其罪極其過惡春秋曰楚子䖍誘蔡侯班弑之于申傳曰誅君之子不立討者何謂也討猶除也欲言臣當掃除君之賊也春秋曰衛侯殺州吁于濮傳曰其稱人何討賊之辭也伐者何謂伐于也言欲伐擊之也尚書叙曰武王伐紂征者何謂也征猶正也欲言其正輕重縱辭誕以示東征誅禄甫也戰者何謂也尚書大傳曰戰者憚驚之也又曰諸侯之義非天子之命不得動衆起兵誅不義者所以強幹弱枝尊天子卑諸侯也論語曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯岀也太平御覽卷第三百四
