body:
  text: 禮儀部四十一謚諱忌日謚釋名曰古者諸侯薨時天子論行以賜謚唯王者無上故於南郊稱天以謚之當春秋時周室卑微臣謚其父故諸侯之謚多不以實也周禮曰太師凢大喪師其瞽而廞作柩謚鄭玄注曰欽興也興言王之行陳其生時行迹爲作謚又曰太史掌卿大夫之喪賜謚讀誄其讀謚誄亦以太史賜謚禮曰巳􅀌暴貴不爲父作謚鄭􅀇注日子事父母无貴賤等也又曰公叔文子卒其子戍請於其君曰日月有時將葬矣請所以易其名者謚者行之迹也君曰昔者衛國㓙飢夫子爲粥與國之餓者是不亦惠乎君靈公也昔者衛國有難夫子以其死衛寡人不亦貞乎夫子聽衛國之政修其班制以與四隣交衛國社稷不辱不亦文乎故謂夫子貞惠文子又曰㓜名冠字五十以伯仲死謚周道也又曰死而謚今也昔者生無爵死無謚古謂殷以前也大夫以上乃謂之爵死有謚也又曰子曰先王謚以尊名節以壹惠耻名之浮於行也名爲声譽也先王論行爲謚以尊名者使声譽可得而尊言也惠猶善也言声譽雖衆節以其行一大善者爲謚也傳曰無駭卒無駭始爲卿未賜族也羽父請謚與族公問於衆仲對曰天子建德因生以賜姓祚之􅁟而命之氏諸侯以字爲謚因以爲族官有丗功則有官族又曰鄭人討幽公之亂斵子家之棺而逐其族改葬幽公謚之曰靈又曰楚㳟王卒子囊謀謚大夫曰君有命矣子囊曰君命以爲㳟􅀂之何毀之赫赫楚國而君臨之撫有蠻夷奄征南海以属諸夏而知其過可不得謂之恭乎請謚之恭大夫從之又曰衛侯賜北宫喜謚曰貞子賜析朱鉏諸曰成子論語曰子貢問曰孔文子何以謂之文也子曰敏而好學不耻下問是以謂之文也漢書曰景令諸侯薨列侯􅀄封及之國大鴻臚奏誄䇿列侯薨及諸侯太傅􅀄除之官大行謚奏誄䇿又曰賈山奏事曰聖王作謚三四十丗耳雖堯舜禹湯文武累丗廣德以爲子孫基業無過三四十丗也秦始皇帝曰死而以謚法是父子名號有時相襲者以一至萬則丗丗不相復也故死而號曰始皇帝其次曰二丗皇帝欲以一至萬也張璠漢書曰范丹卒三府各遣令史奔弔累行論謚曰冝爲貞節先生又曰蔡雍甞至朱穆家冩其書及穆卒雍及門人共謚穆曰忠文論曰夫謚者上之所贈非丁之所造故顔冉至德不聞有謚蔡朱二子各以衰代藏否不立故私議也范曄後漢書曰夏侯㳟善爲文章諸儒共謚曰宣明子牙少習家業著賦頌讃凢四十篇舉孝廉早卒郷人號曰文德先生魏書曰有司議謚以爲鍾繇昔爲廷尉辨理刑獄决嫌明疑民無怨者猶于張之在漢也詔曰太傳功髙德茂位爲師傳論行賜謚當先依此兼叙廷尉于張之德耳乃榮謚曰成侯于寳晉記曰何曽卒下禮官謚􅀶士􅁗秀議曰曽資性驕奢不脩軌則弈丗以來宰臣輔相未有受詬辱之聲􅀍有司之劾父子塵累而蒙恩貸􅀂曽者也謹按謚法名與實爽曰繆怙威肆行曰醜曽冝謚爲繆醜又曰太尉魯公賈充薨􅀄充用韓謚爲賈氏嗣上特許之及議謚愽士秦秀曰充位冠群后惟民之望而悖禮溺情以乱大倫案謚法昏乱紀度日荒充冝謚曰荒上弗從賜謚曰武晉書曰太康八年太常上謚故太常平陽男郭弈爲景侯有司奏云晉受命以來祖宗號謚群下未有同者故郭弈與景皇同不可聽冝謚曰穆晉中興書曰中宗即尊號也時賜謚多由封爵不考徳行王遵上䟽曰臣聞大行受大名小行受小名名則實稱不誣而巳近代以來惟爵得謚武官牙門有爵必謚卿校常伯無爵悉不賜謚甚失制謚之夲今中興肇建勲徳兼􅀍冝􅀷體前訓使行以謚彰豈可限以有爵中宗納焉自後公卿無爵而謚自遵始也沈約宋書曰江智淵出爲北中郎長史􅀄上寵􅁎宣貴妃殷氏卒使群臣議謚智淵上謚曰懷上以不盡嘉號甚銜之後車駕幸南山乗馬至殷氏墓群臣皆􅀐從上以馬鞭指石柱謂智淵曰此柱上不容有懷字智淵益懼宋書曰劉康祖出軍至壽陽數十里㑹魏永昌王以長安之衆八萬􅀐與康祖相及於尉康祖有八千人乃結車營而進魏軍四靣來攻衆分爲三且休且戰康祖率厲士將無不一當百魏軍死者太半流血没踝矢中頭而死於是大敗舉軍淪覆免者􅂊數十人魏人傳康祖首示彭城百姓王贈益州刺史謚曰壯又曰蕭音􅎮素爲諸曁令到縣十餘日掛衣冠於縣門而去獨居屏事非親戚不得至其籬門妻齊太尉王儉女乆與別居遂無子卒親故迹其事行謚曰貞文先生又曰曇首卒文帝臨慟歎曰王􅉟事所疾不救國之衰也中書舎人周赴侍側曰王家欲衰賢者先殯上曰直是我家衰耳以預誅羡之等謀追封預寧縣侯謚曰文又曰王晏爲吏部尚書令王儉雖貴而踈晏旣領選權行臺閣與儉頗不平儉卒禮官欲依王遵謚爲文獻晏啓上曰遵乃得此謚但宋來不加素族出謂人曰平頭憲事巳行矣後魏書曰孝文太和十六年改謚宣尼曰大聖尼父告謚孔廟齊書曰長沙威王晃武帝嘗幸鍾山晃從駕以馬矟刺道邊枯蘖上令左右數人引之銀􅆞皆卷聚而矟不出乃令晃復馳馬抜之應手便去毎逺州獻駿馬上輙令晃於華林中調試之髙帝常曰此我家任城也武帝縁此意故謚曰威任城即魏任城王彰也梁書曰蕭子顯卒請謚手勑曰恃才傲物冝謚曰驕又曰徐勉卒武帝聞而流涕即車駕臨殯皇太后亦舉哀朝堂有司奏謚居敬行簡曰簡執心決斷曰肅因謚簡肅公又曰蕭機字智通位湘州刺史美姿容善吐納家旣多書􅀶學強記然而好弄尚力逺士子近小人爲州專意聚歛無政績頻􅀍案劾將葬有司請謚詔曰王好内怠政冝謚曰􅌆又曰蕭曄爲晉陵太守曄􅀄至郡屬旱躬自祈禱果􅀗甘潤郡多猛獸爲害曄在政六年此􅁀遂息卒于郡􅀄曄􅃦疾歴年官曹擁滯有司案謚法言行相違曰僣乃謚曰僣侯陳書曰􅀽泌爲司徒左長史卒于官臨終戒其子芳華曰吾於朝廷素無功績暝目之後斂手足旋葬無得受贈謚其子述泌遺意朝廷不許謚曰質唐書曰開元中贈左丞相程行諶謚曰貞歧王府長史裴子餘謚曰孝同時列上中書令張􅀃省之曰程裴二謚可謂謚之無愧也又曰貞元中太常奏馬燧謚景武上改爲莊武以避太祖謚又曰元和中賜太子賔客于頔謚曰思􅀄有司謚曰厲至是特易之右丞張正甫封其勑請還夲謚􅀘闕髙􅃏上䟽曰夫謚者所以懲􅁖勸善激濁􅀭清使忠臣義士知勸亂臣賊子畏罪孔子修春秋乱臣賊子懼盖爲此也垂範如此尚不能救况又隳其典法乎大戴禮曰周公旦爲太師相嗣王作謚法者行之迹也號者功之狀也服者位之章也是以大行受大名細行受小名行出於巳名出於人謚愼也以人行之始終悉愼録之以爲名也禮記外傳曰古者生無爵死無謚古謂夏殷之前謚法周公所爲也堯舜禹湯皆後追議其功耳謚者行之迹也累積平生所行事善􅁖而定其名也有大行受大名謂之景行景大也有大善􅀂禹湯文武者小善受小名􅀂宣若成其德狹也文經天地其德慱也武定禍亂其功大也五經通義曰謚者死後之稱累生時之行而謚之生有善行死有善謚所以勸善戒􅁖也謚之言列其所行身雖死名常存故謚也白虎通曰謚者何謂也謚之爲言引也引列行之跡也所以進勸威德使上務禮節死乃謚之詩云靡不有􅀄鮮克有終始終不能􅀂一故據其終後可知也今丗所以臨葬而謚之何因衆㑹欲顯􅀭之也謚或一言或兩言何文者一言爲謚質者兩言爲謚故湯死後稱成湯是明二言爲謚也謚七十二品禮謚法曰翼善傳聖曰堯仁聖盛明日舜慈惠愛民曰文剛德理直曰武天子崩大臣至郊謚之者何以爲臣子之義莫不欲褒稱其君掩􅁖􅀭美者故之郊明不得欺天也又曰卿大夫老歸死有謚何謚者別尊卑彰有德卿大夫歸無過猶有禄位故有謚也夫人無謚者何無爵故無謚或曰夫人有謚夫人國之母修閨門之内即下亦化之故設謚以彰其善惡春秋傳曰葬宋㳟􅁎傳曰其稱謚何賢也傳曰哀者何莊公夫人也卿大夫妻無謚者何賤也八妾所以無謚何卑賤無所能豫猶士畢小不得有謚太子夫人無謚何夲婦人隨夫太子無謚則夫人不得有謚天子太子元士也士無謚知太子亦無謚也附庸所以無謚何卑小無爵也王制曰古者之制爵禄凢五等附庸不在其中明附庸無爵也號謚何法生稱火死稱􅁅也抱朴子曰上古無謚始於周家耳黄帝謚盖後人追爲之謚取其治丗時行迹而巳非黄帝群臣之作也俗人通自不信仙寕肯追以仙謚黄帝乎穆天子傳曰爲盛􅁎謚曰哀俶人荀氏家傳曰荀爽對象䇿日臣聞火生於木故其徳孝漢之謚帝稱孝者其義取此故漢制使天下皆誦孝經選吏則舉孝廉以孝爲務也列女傳曰魯黔婁先生死曽子與門人徃弔焉曰何以爲謚其妻曰以康爲謚昔先君甞賜之粟三十鍾先生辭而不受是其餘冨也君嘗欲授之以國相先生辭而弗爲是其餘貴也彼先生者甘天下之淡味安天下之卑位不戚戚於貧賤不汲汲於冨貴求仁而得仁求義而得義其謚爲康不亦冝乎崔駰章帝謚議曰臣聞號者功之表謚者行之迹據徳録功各當其實孝經曰天地明察神明章矣唐書數堯之德曰平章百姓言天之常德也詩曰追琢其章金玉其相亹亹文王綱紀四方又曰倬彼雲漢爲章於天喻文王聖徳有金玉之質猶雲漢之在天也舉表拆義四方德附矣易曰先天而天弗違後天而奉天時臣愚以冝上尊号曰章唐獨􅀌及謚吕諲曰肅嚴郢駮曰國家故事宰臣之謚有二字以彰善旌徳焉夫以吕公文能無害武能禁暴貞則幹事忠則利人盛烈宏規不可備舉傳叙八元之德曰忠肅㳟懿􅀂以美謚擬於形容請曰忠肅及重議曰謚法在懲􅁖勸善不在字多必稱其大而畧其細故言文不言武言武不言文三代以下朴散禮壞乃有二字之謚非古也其源生於衰周漢興簫何張良霍去病霍光俱以文武大畧佐漢致太平其事業不一謂一文不足以紀其善於是有文成景􅁊成之謚雖黷禮甚矣然猶褒不失人唐興叅用周􅁗之制以魏徴爲文貞簫瑀爲貞􅄶其杜如晦封彛陳叔逹温彦慱岑文夲唐休璟魏知古崔日用並當時赫赫以功名居宰相者謚不過一字不聞子孫佐吏有以字火稱屈由此言之二字不必爲褒一字不必爲貶􅀂褒貶果在乎字數則是堯舜禹湯文武成康不如周威烈愼靖也齊桓晉文不如趙武靈魏安釐也杜如晦王珪以下或成或明或懿或憲不如蕭瑀之貞􅄶也然肅者威德克就之名以諲之從政威能閑邪德可濟衆故以肅易名而忠在其中矣亦猶隨㑹寗俞之不稱文豈必因而重之然後爲美魏晉巳來賈許之籌筭賈逵之忠莊張旣之政能程普之智勇顧雍之宻重王渾之噐量劉恢之鑒裁􅁃翼之志畧彼八君子者方之東平冝無慙德死之日並謚曰肅當代不以爲貶何嘗徴一字二字以爲之升降乎諱周禮曰小史掌􅀖國之志奠繫丗辨昭穆􅀂有事則詔王之忌諱志謂記也先王死爲忌名爲諱禮曰禮不諱嫌名二名不偏諱逮事父母則諱王父母不逮事父母則不諱王父母逺不及也謂㓜孤不及識父母不至於祖名也孝子聞名心瞿諱之由心也此謂庶人也適士以廣事祖雖不建父母猶諱祖也大夫之所有公諱避君諱也詩書不諱臨文不諱廟中不諱謂有事於髙祖則不諱曽祖以下尊無二也大夫之諱雖質君之前臣不諱也臣於夫人之家恩逺也質獨對也婦諱不不出門婦親近於宮中言避之耳大功小功不諱入境而問禁入國而問俗入門而問諱又曰二名不偏諱夫子之母名徴在言在不稱徴言徴不稱在稱舉也又曰過而舉君之諱則起舉猶言也起立者失言而變自新與君之諱同則稱字謂諸臣之名也又曰卒􅂘而諱自此而􅀑神事之尊而諱其名王父母兄弟丗父叔父姑姉妹子與父母諱父爲其親諱則子不敢不從諱也諸王父母以不之親諱是謂士也天子諸侯諱群祖母之諱宫中諱妻之諱不舉諸其側與從祖昆弟同名則諱之傳曰周人以諱事神名終將諱之君父之臣固非臣子所斥然禮旣辛􅂘以大澤徇曰舎故而諱新曰舎親盡乏祖而諱新死者故言以本諱事神名􅁝將諱之自父至髙祖皆不敢斥言蕭子顯齊書曰始安貞王道生字孝伯太祖次兄也子鳯字景慈卒於宋明帝贈始安靖王改華林鳯莊門爲望賢門太極東堂􅀞鳯鳥題爲神鳥而鸞鳥爲神雀南史曰王琨避諱過甚父名懌母名㳟心不得犯焉時咸謂矯枉過正又曰王亮王攸之子爲晉陵太守在職清公有美政時有晉陵令沈瓉之性麄踈好犯亮諱亮不堪遂啓代之瓉之怏怏乃造坐云下官以犯諱􅀍代未知明府諱􅀂爲攸字當作酋傍安大猶爲大傍安酋猷􅀂有心悠無心攸乞告示亮不及履下牀跣而走瓉之拊掌大􅀏而去唐書曰賈曽除中書舎人固辝以父忠同音識者以爲中書是曹司名又與曽父音同字異於禮無嫌曽乃就職顔氏家訓曰近丗謝舉甚有聲譽聞諱必􅂘爲丗所譏丗􅀃曰􅁊􅀇呼人温酒自道其父名旣而曰英雄正自麄踈語林曰王藍田作㑹稽令人問諱荅曰惟祖惟考四海所知過無復諱徐邈表不諱太子名議興太守禇爽上表稱皇太子名尚書下之禮官以時議其可否禮官議疑無適準正聊率所見以論之曰禮記曰夫人之諱雖質君之前臣不諱也案夫人國之小君君之一體太子之母也而尚不諱則太子何嫌乎又禮君前臣名又周公告文王皆稱武王名可益明矣忌日禮曰君子有終身之喪忌日之謂也忌日不用非不祥也言夫忌日志有所至而不敢盡私忌日親亡之日忌日者不用舉他事如有時日之禁也祥善也志有所至至於親以此日忘其哀心如喪時續漢書曰申徒與屠字同蟠字子龍父母卒蟠思慕不飲酒食肉十餘年忌日哀戚輙三日不食晉書曰穆帝納后欲用九月九日是忌月范汪問王彪之荅云禮無忌月不敢以所不見便謂無之􅀶士曹耽荀訥等並謂無忌月之文不應有妨王洽曰􅀂有忌月當復有忌􅀊唐書曰萬􅀊通天中建安王攸冝平契丹凱旋欲詣闕獻俘内史王及善以爲將軍將入城例有軍樂今属孝明髙皇帝忌月請備而不奏鸞臺侍郎王方慶奏案禮經但有忌日而無忌月晉穆帝納后用九月九日是康帝忌月于疑不定下太常禮官荀納議稱禮只有忌日無忌月語􅀂有忌月即有忌時忌􅀊軍樂是軍容與常不同請振作於事無嫌孔䕺子曰季節見於子順子順賜之酒辝問其故對曰今家之忌日也故子順曰飲也禮雖衰麻見於君先生君及先生與之梁肉無辝所以敬尊長而不敢遂其私也忌日方於有服􅁿矣蕭廣濟孝子傳王脩字叔治北海人年十􅀊喪母母以社日亡來年社日脩哀感悲號隣人爲之罷社丗􅀃曰前軰人忌日唯不飲酒作樂王丗將以忌日送客至新亭主人湏􅁷欲作音聲王便去時單往衛洗馬墓下彈馬語林曰􅁊􅀇不立忌日政有忌時每至日絃觴無廢太平御覽卷第五百六十二
