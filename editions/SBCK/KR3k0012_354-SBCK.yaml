front:
  text: 太平御覽卷第三百五十四兵部八十五
  hash: sha256:9ed6367ce7f8c47790f9bdab7cdd15150c789e70cb98f3e0c57468216b4749f3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_354-1a}
body:
  text: 槊槍鋋鈎鑲槊通俗文曰矛丈八者謂之矟晉書曰劉邁毅之兄也邁字伯羣少有才幹爲殷仲堪中兵􅂙軍桓玄之在江陵甚豪橫士庶畏之過於仲堪玄曾於仲堪㕔事前戲馬以矟擬仲堪邁時在坐謂玄曰馬矟有餘精理不足玄自以才雄冠丗而心知外物不許之仲堪爲之失色齊書曰長沙王晃武帝常幸鍾山晃從駕以馬矟刺道邊枯蘗上令左右數人引之銀纒皆卷聚而矟不出乃令晃復馳馬拔之應手便去每逺州獻駿馬上輙令晃於華林中調試之髙帝常曰此我家任城也後魏書曰宋大千驍果善􅀐射遷中散至於朝賀之日大千常着御鎧盤馬殿庭莫不歎異甞從太宗獵見虎在髙巖上大千持矟直前刺之應手而死又曰于栗磾音低代人也從太祖田於白登山見熊將數子顧謂栗磾曰卿勇幹如此寧能􅅮之乎對曰天地之性人爲貴􅀂􅅮之不勝豈不虚斃壯士也自可駈致御前坐而制之尋皆擒獲劉􅁉之伐姚泓也栗磾慮其北擾遂築壘河上親自守焉􅁉甚憚之不敢前進􅁉遺栗磾書逺引孫權求討關羽之事假道西上題書曰黒矟公麾下栗磾以狀表聞太宗許之因授黒矟將軍栗磾好持黒矟以自摽衛􅁉望而異之故有是號累遷豫州刺史續晉陽秋曰太尉伐羗於濟口入河索虜遣將鵞青歩􅀐十萬於河北聲云救羗太尉遣隊主丁旿音五以車百乗五北岸爲却月陣相去一歩車置七人授以長白毦槊毦音餌三國典略曰文育小字猛奴到都見太子詹事周捨捨命兄子弘讓教之書計文育謂弘讓曰誰能學取此冨貴但有大槊耳弘讓壯之教之􅀐射文育大恱又曰羊侃字祖忻甞從梁主宴樂遊􅁐時少府啓兩刄矟成長二丈四尺三寸梁主因賜侃河南國紫騮馬令試之侃執矟上馬左右擊刺特盡其妙勸者登樹梁主曰此樹必爲侍中折矣俄而果折因號此矟爲折樹矟又曰北齊安州刺史盧胄入海島得一人脛可長二丈以爲矟獻於神武諸將咸莫能用唯彭樂舉之胄未幾遇疾痛聲聞外巫言海神爲祟因此而卒鄴城故事曰紫陌浮橋在城西北五里案鄴中記云趙王虎時於此濟置紫陌宫曁齊時因修爲濟口帝廵幸又向并州百官相餞莫不至此而訣別迄今猶以爲渡口齊文宣時西廵百官辭於紫陌使矟􅀐圍之曰我舉鞭一時刺殺淹留半日文宣醉不能起黃門郎連子暢進曰陛下如此諸臣恐怖文宣曰大怖耶􅀂然不湏殺乃命解圍又曰北齊文宣於臺上以矟刺都督尉子輝應手而死靈􅀑志曰河間王顒旣敗於􅀜中有給使陳安甚壯徤常乗一赤馬儁快非常􅀟持二刀皆長七尺馳馬運刀所向披靡關西爲之歌曰壟上徤兒字陳安頭小靣狹腹中寛丈八長槊左右盤語林曰桓宣武與殷劉談不如甚喚左右取黃皮袴褶音十上馬持矟數廻或向劉或擬殷意氣始得雄王􅀓玄歌詩曰彎我繁弱弓弄我丈八矟一舉覆三軍再舉殄戎貃梁簡文帝馬槊譜序曰馬槊爲用雖非逺法近代相傳稍巳成藝鄧蔗縈魏后之庭武而猶質桓馬入丹陽之寺雄而未巧􅂓以餘暇復撰斯法搜採抑掦斟酌煩簡至如春亭落景秋臯晚淨青霜旦盡宻雨􅀄晴纎驪沃􅀂天馬半漢盼金精而轉態交流汗血愛連乾而息影不畏衣春鏤衢與白刄爭暉翆眊與紅塵俱動足使武夫憤氣觀者衝冠巴童留玩不待輕舟之檝越女踟蹰無假如皐之箭槍風俗通曰刻葦傷盗爲槍宋元嘉起居注曰謝靈運自理表云及經山隂防禦彰赫彭排馬槍斷截衢巷衛公兵法曰聽角聲第一聲絶諸隊即一時散立第二聲絶諸隊一時捺槍卷幡張弓抜刀第三聲絶諸隊一時舉槍第四聲絶諸隊一時籠槍跪􅂰坐唐書曰郯國公羅士信容皃短小而驍勇絶倫隋末賊起士信始年十四爲通守張湏陁執衣遇翟讓來冦士信請自効湏陁小之曰汝形容未勝衣甲何可入陣士信怒重著二甲左右􅀟鞬躍而上馬湏陁壯之遂將其衆擊賊于澭水之上陣􅂊列士信執長槍立於馬上馳至賊所刺倒數人斬一人首擲於空中用槍承之戴以略陣賊衆愕然莫敢逼者士信乃弃筴馳馬爲十下而還湏陁因而􅁬擊兵始接賊師大潰士信逐北每殺一人輙劓其鼻而懷之每歸而數其鼻以表殺賊之多少也湏陁大恱之引置左右每戰湏陁居前士信爲副賊無敢當者又曰太宗每當大陣望賊中驍將銳士炫曜人馬出入來去者意頗怒之輙命􅁗叔寳徃取焉叔寳應命躍馬􅀒槍而進必刺之萬衆之中人馬俱倒太宗因以是重之叔寳亦以此頗自矜尚貞觀巳後􅁪多疾病每謂人曰吾少長戎馬所經二百餘陣屢中重瘡計吾前後出血亦數斛矣何能不病乎及卒太宗甚傷惜乆之贈徐州都督陪葬于昭陵令所司於其􅉷内立石人馬以旌戰之功焉又曰哥舒翰爲別將時吐蕃大冦邊翰拒之于苦海吐蕃之衆三道從山相續而下翰持半叚槍當其鋒逆擊之無不摧靡又擊其次軍復走之又擊其後軍皆大破由是知名天寳六載擢受右武衛將軍仍充隴右節度使副都知􅀜西兵馬使河源軍使先是吐蕃每歳候夌秋即大掠積石軍前後不能禦至是翰使將王難德楊景暉等潜領兵候蕃兵至設伏以待之吐蕃五千􅀐旣至放馬脫甲翰以城中率驍勇合伏兵馳擊之殺略盡百餘􅀐奔突得走王難德追擊之疋馬不還翰常逐馬驚墜于河立於水中􅄍蕃三人擬槍方刺之翰大叱之賊驚駭俱廢失槍而走救􅀐至賊便解散翰有家臣曰左車年十五每隨翰入陣翰善使槍追賊及以槍搭其肩而遏之賊驚頋翰從而刺其喉皆剔髙三五丈而墜左車輙下馬斬其首率以爲常又曰王難得有膽力善􅀐射天寳元年正月吐蕃大冦河源軍難得以􅀐將爲軍鋒賛普有子曰琅支都恃其趫悍乗諳真馬寳鈿裝鞍軍前求較􅋐者難得横槍突徃刺殺之斬其首以其馬歸虜衆無敢追者軍使以聞玄宗召至御殿問之因令馳突作殺琅支都狀壯之衣以錦􅂁拜左金吾衛羽林將軍五代晉史曰梁將有王彦章者勇力過人常執鐵槍僅百斤所向辟易莊宗畏之鋋釋名曰鋋延也逹也去此至彼之言也方言曰矛吴楊江淮南楚五湖之間謂之鋋音蟬或謂之鏦漢書曰鏦殺吴王也其柄謂之矝東都賦曰戈鋋彗雲注鋋小矛也鈎鑲音穰又音襄又音孃戎噐也釋名曰鈎鑲兩頭曰鈎中央曰鑲或推鈎推鑲或鈎引用之冝也東觀漢記曰詔令賜鄧遵金􅃖尤辟兵鈎一又曰桓帝永興二年光禄勲府吏舎夜壁下忽有氣掘之得玉玦各有鈎長七寸三分玦周五寸四分身中皆有雕鏤漢名臣奏曰丞相薛宣奏漢興以來深考古義惟萬變之備於是制宫室出入之儀正輕重之冠故司馬殿省門闥至五六重周衛擊刁斗近臣侍側尚不得着鈎帶入房梁書曰吉士瞻􅀄爲荆府城局叅軍浚池得一金革帶鈎隱起鏤甚精巧􅂐文曰錫尓金鈎且公且侯士瞻取夏侯洋兄之女女竊以與洋洋喜佩之及是革命洋果封侯而士瞻不錫茅􅁟列仙傳曰鈎戈夫人姓趙病卧左手拳望氣者云東北有貴人氣推而得夫人武帝發手得玉鈎手亦舒遂幸而生昭帝後􅀍害殯之尸不臰而香一月三􅁗記曰藏鈎因鈎弋夫人丗人法之也瑞應圖曰湯都于亳有神人牽白狼口衘銅鈎入湯庭搜神記曰京兆長安有張氏者晝獨處室有鳩自外入張氏惡之披懷而祝曰鳩介來爲我禍耶飛上受塵爲我福耶來入我懷鳩飜入懷以手探則不知鳩之所在而得一金帶鈎焉遂寳之自是之後子孫昌盛有爲必偶貲財萬倍蜀客賈至長安中聞之乃厚賂内婢婢􅀼鈎以與蜀客張氏失鈎漸漸耗而蜀客數罹難厄不爲已利或告之曰天命也不可以力求於是以鈎反張氏復昌故􅀜西稱張氏傳鈎云陳留風俗傳曰浚儀周時梁伯所居國都多池沼時池中出神帶鈎到今其民象而作之號曰大梁氏鈎焉吴越春秋曰闔閭作金鈎令曰能爲善鈎者賞之百金而有人貪賞之重殺其兩子以血釁金遂成二鈎獻之闔閭而詣宮門求賞王曰爲鈎者多而子獨求賞何以異於衆人之鈎乎作者曰吾之作鈎者貪王之賞殺吾二子以成兩鈎以示之曰何者是也時王鈎甚衆形體相􅀋不知所在於是鈎師向鈎而哭呼其兩子名曰吴鴻泥稽我在此王不知汝之神也聲未絶於口兩鈎俱飛着於父之胷吴王大驚乃賞之百金夢書曰夢得鈎帶憂約束也鈎帶着身約勑已也持鈎帶脫事决已也莊子曰曲者中鈎吴都賦曰吴鈎越􅁄魏文帝與王朗書曰丕白不愛江漢之珠而愛巴蜀之鈎此言難得之貴寳不􅀂易有賤物魏文帝荅劉備書曰獲累􅁓之命兼美之貺他旣備善􅀟鈎尤妙前後之惠非賢兄之貢則執事之貽也來􅀂川流聚成山積其充匱笥填府藏者固已無數矣太平御覽卷第三百五十四
