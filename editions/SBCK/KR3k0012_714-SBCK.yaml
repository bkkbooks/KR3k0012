front:
  text: 太平御覽卷第七百一十四服用部十六
  hash: sha256:62dc1cc60b1a367819e4c65782436b038e66fb7902c82bffe60dfd00632c22f2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_714-1a}
body:
  text: 梳箆刷鑷觹剔齒纎梳箆說文曰櫛梳枇惣名也釋名曰梳言其齒䟽也枇言其細相枇也禮記曲禮上曰男女不同巾櫛又玉藻曰櫛用樿櫛髮晞用象櫛左傳僖公中曰晉太子圉爲質於秦將逃歸謂羸氏曰與子歸乎對曰寡君之使婢子侍執巾櫛以固子也從子而歸弃君命也不敢從亦不敢言漢書曰孝文帝遺匈奴􅃭􅂁梳枇各一也續漢書曰季文德素善延篤謂公卿曰延篤有王佐之才欲引進之篤聞爲書止文德曰吾常昧爽櫛梳坐於客堂朝則誦虞夏之書歴公旦之典禮覽仲尼之春秋當此之時不知天之爲蓋地之爲輿愼勿迷其夲棄其生也魏志曰徐季龍取十三種物著大篋中使管輅占之輅先􅀃雞子後道􅁞蛹遂一一名之唯以梳爲枇耳脩復山陵故事曰梓宫用象牙梳五枚后梓宫物象牙梳六枚瑇􅈘梳六枚東宫舊事曰太子納妃有瑇􅈘梳三枚盛弘之荆州記曰臨賀興安縣東邊有平石其上有櫛履各一具俗云越王渡溪脫履墜櫛於此崔寔政論曰無賞罰而欲丗之治是猶不畜梳枇而欲髮之治物理論曰威行法明漏吞舟之魚法之不明則數於細櫛細櫛則苛慝生也夢書曰夢梳枇爲憂解也虱盡去百病愈傳咸櫛賦叙曰夫才之治丗猶櫛之理髮涂岑詩曰思見君巾櫛以弭我勞慙蔡邕女誡曰用櫛則思其心之理髙文惠與婦書曰今致瑇􅈘梳一枚陸雲與兄機書曰按行視曹公器物梳枇皆在四愁詩曰美人遺我旃檀梳晉傳咸櫛賦曰我嘉兹櫛惡亂好理一髮不順實以爲耻雖日用而匪懈不告勞而自巳苟以理而委任期竭力以没齒刷􅀃文曰荔草似蒲而小根可作刷通俗文曰所以理髪謂之刷釋名曰刷帥也帥髪長短皆令上從也東宫舊事曰太子納妃有七猪􅈊刷嵇康養生論曰勁刷理髮僅乃得之陸雲與機書曰按行視曹公器物刷􅂍處尚識鑷釋名曰鑷攝也攝取髮也通俗文曰披減􅂡􅁂謂之鑷􅀃文曰作籋曰籋箱也洞林曰卷縣令施安上懷鑷令郭璞射之璞曰此是鏡物有兩歧沈約宋書曰彭城王義康餉沈熈光銅鑷脩復山陵故事曰梓宫中用鐵鏤鑷五枚臨海水􅁟記曰鑷魚長七寸頭如鑷齊書曰高祖恒令左右抜白髪隆昌王高祖之孫年五歳戲於牀前帝曰兒言我是誰荅曰太翁帝曰豈有爲人曾祖抜白髪乎即擲去鏡鑷觹說文曰觹角銳端可以解結毛詩淇澳曰芄蘭之支童子佩觹芄蘭草觹所以解結禮記内則曰子事父母左佩小觹金燧右佩大觹木燧剔齒纎陸雲與兄機書曰一日行曹公器物有剔齒纎今以一枚􅀉兄太平御覽卷第七百一十四
