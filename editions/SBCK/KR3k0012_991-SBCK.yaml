front:
  text: 太平御覽卷第九百九十一
  hash: sha256:d514dd1136463ea82f54ca445ea977002130418ddd8043622b2e4349e429bdd3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_991-1a}
body:
  text: 藥部八人參丹參玄參沙參紫參苦參茱茰山茱茰占斯杜仲黄􅂄黄連防巳王不留行徐長卿奄閭閭茹漏盧委萎離南白莵藿旋復爵麻小華女􅁐丹草􅀑督郵白鮮薇蓹翹根藎盧精屈草陸英㯏菜木香杜衡䗍實華䑕李人參􅀃文曰人薓音參岀上黨春秋運斗樞曰揺光星散爲人參癈江淮山瀆之利則揺光不明人參不生禮斗威儀曰君乗木而王有人參生廣雅曰薓地精人參也梁書曰阮孝緒母王氏忽有疾合藥湏得生人參舊傳鍾山所岀孝緒躬歴幽險累日不逢忽見一鹿前行孝緒感而隨後至一所遂㓕就視果􅀗此草毋得服之遂愈異苑曰人參一名土精生上黨者佳人􅄱皆具能作兒啼昔有人掘之始下數鏵音華便聞土中有呻聲㝷音而取果得一頭長二尺許四體畢備而髪有損􅆙處將是掘傷所以呻也石勒別傳曰初勒家園中生人參葩茂甚盛于時父老相者皆云此胡體竒貌異有大志量其終不可知勸邑人厚遇之潜夫論曰夫理世不得真賢譬猶疾不得真藥也疾當得真人參反得蘿菔已不識真而飲之病浸以劇不知爲人所欺也傅子曰先王之制九州異賦天不生地不飬君子不以爲禮若河内諸縣去北山絶逺而各調出御上黨真人參上者十斤下者五十斤所調非所生民以爲患范子計然曰人參出上黨狀􅀋人者善廣五行記曰隋文帝時上黨有人宅後毎夜有人呼聲求之不得去宅一里但一人參枝苗掘之入地五尺得人參一如人體狀去之後呼聲遂絶本草曰人參味甘微寒生山谷主􅀘五藏安定精神魂魄除邪止驚明目開心益智乆服輕身延年生上黨廬山記曰山中藥多人參吴氏夲草曰人參一名土精一名神草一名黄參一名血參一名乆微一名玉精神農甘小寒桐君雷公苦歧伯黄帝甘無毒扁鵲有毒或生邯鄲三月生葉小兊核黒莖有毛三月九月採根根有頭足手面目如人慕容晃與顧和書曰今致人參十斤丹參吴氏本草曰丹參一名赤參一名木羊乳一名郗蟬草神農桐君黄帝雷公扁鵲苦無毒季氏大寒歧伯醎生桐栢或生太山山陵隂莖華小方如荏毛根赤四月華紫三月五月採根隂乾治心腹痛玄參廣雅曰鹿陽主玄參也建康記曰建康出玄參范子計然曰玄參岀三輔青色者善本草經曰玄參一名重臺味苦微寒生川谷治腹中寒􅀬女子乳􅀘腎氣令人目明生河間吴氏本草曰玄參一名鬼藏一名正馬一名重臺一名鹿膓一名端一名玄臺神農桐君黄帝雷公扁鵲苦無毒歧伯鹹李氏寒或生􅁈句山陽二月生葉如梅毛四四相值以芍藥黒莖莖方髙四五尺華赤生枝間四月實黒沙參廣雅曰苦心沙參也建康記曰建康岀沙參范子計然曰白沙參出雒陽白者善一本草經曰沙參一名知母味苦微寒生川谷治血積驚氣除寒熱􅀘中益肺氣生河内吴氏本草曰白沙參一名苦心一名識羙一名虎湏一名白參一名志取一名文虎神農黄帝扁鵲無毒歧伯鹹李氏大寒生河内川谷或般陽瀆山三月生如葵葉青實白如芥根大白如蕪菁三月採紫參本草經曰紫參一名壯􅂪苦寒無毒治心腹積聚寒熱邪氣利大便通九竅生河西及􅁈句治牛病生林陽建康記曰建康縣岀紫參范子計然曰紫參出三輔赤青色者善苦參本草經曰苦參一名水槐茱茰西京雜記曰漢武帝宫人賈佩蘭云在宫時九月九日佩茱茰飲菊花酒令人長壽地理志曰九月九日爲絲茱茰嚢戴之臂上風土記曰俗上九月九日謂爲上九茱茰到此日氣烈熟色赤可折茱茰囊以挿頭云辟惡氣禦冬續齊諧記曰汝南桓景隨費長房遊學累年房謂之曰九月九日汝家有災厄冝令急去家人各作絳囊盛茱茰以繫臂上登髙飲菊花酒此禍可消景如言舉家登髙山夕還見鷄犬牛羊一時暴死房聞之曰此代矣今世人毎至此日登髙山飲酒戴茱茰囊是也唐廣古今五行記曰晉懷帝時無錫縣有四株茱茰樹生狀􅀂連理郭璞卜云延陵有鼴䑕後當有㧞樹儻有此東南數百里有作逆者及樹生而徐馥作亂本草經曰茱茰一名藙音毅味辛温生川谷間湊理根去三蟲乆服輕身生上谷晉宫閣名曰華林園茱茰三十六株范子計然曰茱茰岀三輔山茱茰本草經曰山茱茰一名蜀酸􅀥平生山谷治心下邪氣寒熱温中逐寒濕去三蟲乆服輕身生漢中建康記曰建康出山茱茰范子計然曰山茱茰出三輔吴氏本草曰山茱茰一名鬾音􅇊實一名䑕矢一名雞足神農黄帝雷公扁鵲酸無毒歧伯辛一經酸或生􅁈句琅邪或東海承縣葉如梅有刺毛二月華如杏四月實如酸􅀥赤五月採實占斯本草經曰占斯一名虞及味苦杜仲吴氏本草曰杜仲一名木綿一名思仲黄􅂄秦州記曰隴西襄武縣出黄􅂄本草經曰黄􅂄味甘微温生山谷黄連廣雅曰王連黄連也范子計然曰黄連出蜀都黄肥堅者善神仙傳曰封君逹服黄連五十餘年入鳥䑕山服練水銀百餘􅀊常􅀐青牛行民間有疾病者不問識與不識皆與藥即差又曰黒穴公服黄連得仙名山記曰扶容石草多黄連湘州記曰邵陵夫夷縣衡山岀黄連永嘉記曰松陽縣草有黄連覆地土人取者必禱祠􅀂失神意則化爲異物本草經曰黄連一名王連味苦寒生川谷治􅀬氣目痛皆傷泣岀明目生巫陽吴氏本草曰黄連神農歧伯黄帝雷公苦無毒李氏小寒或生蜀郡太山之陽防巳范子計然曰防巳岀漢中旬陽本草經曰防巳一名石解味辛平無毒治風寒温瘧熱氣通湊理利九竅生漢中呉氏本草經曰木防巳一名解離一名解燕神農辛黄帝歧伯桐君苦無毒李氏大寒如葛莖蔓延如芃白根外黄似桔梗内黒文如車輻解二月八月十月採葉根王不留行本草經曰王不留行味苦平生山谷乆服輕身能老生太山崔寔四民月令曰八月采王不留行丗􅀃曰衛江州在尋陽劉孝標注云衛展爲江州刺史有知舊人投之都不料理唯餉王不留行一斤此人得餉命駕呉氏本草經曰王不留行一名王不流行神農苦平歧伯雷公甘三月八月採徐長卿本草經曰徐長卿一名􅀑督郵味辛温生山谷治鬼物百精蠱毒疾疫邪氣温􅀑乆服強悍輕身生太山吴氏本草曰徐長卿一名石下長卿神農雷公辛或生隴西三月採奄閭本草經曰奄閭味苦微寒生川谷治風寒濕痺身體諸痛乆服輕身不老生雍州呉氏本草經曰奄閭神農雷公桐君歧伯苦小温無毒李氏温或生上黨葉青厚兩兩相當七月花白九月實黒七月九月十月採驢馬食仙去閭茹建康記曰建康出草盧茹范子計然曰閭茹出武都黄色者善本草經曰閭茹味辛寒生川谷治蝕惡􅁏敗瘡死肌仍殺疥蟲除大風生代郡吴氏本草經曰閭茹一名離樓一名屈居神農辛歧伯酸鹹有毒季氏大寒二月採葉貟黄高四五尺葉四四相當四月華黄五月實黒根黄有汁亦同黄三月五月採根黒頭者良漏盧本草經曰漏盧一名野蘭委萎爾雅曰熒委萎郭璞注曰藥草也葉似竹大者如箭竿有葉狹而長表自裏青根大如指長一二尺可啖吴氏本草經曰委萎一名葳㽔一名王馬一名節地一名蟲蟬一名烏萎一名熒一名玉竹神農苦一經甘桐君雷公扁鵲甘無毒黄帝辛生太山山谷葉青黄相值如薑二月七月採治中風暴􅀬乆服輕身離南爾雅曰離南活莌也草生江南高丈許大葉莖中有瓤正白莌音脫山海經曰升山草多冠脫郭璞注曰草生南方髙丈許葉似荷葉白莵藿吴氏本草經曰白菟藿一名白葛穀旋復爾雅曰蕧盗庚族復似菊本草經曰旋復花一名金沸草爵麻本草經曰爵麻生漢中吴氏夲草經曰爵麻一名爵卿小華吴氏本草曰小華一名結草女苑吴氏本草曰女苑一名白苑一名織女苑廣雅曰女腹一名女苑也丹草本草經曰石長生一名丹沙草味鹹微寒生山谷治寒熱惡瘡火熱辟惡氣不祥􅀑毒生咸陽吴氏本草曰石長生神農苦雷公辛一經甘生咸陽或同陽􅀑督郵本草經曰􅀑督郵一名赤箭一名離母味辛温生川谷殺􅀑精物治蟲毒惡氣乆服輕身益力長隂肥徤生雍州建康記曰建康出􅀑督郵吴氏本草曰􅀑督郵一名神草一名閻狗或生太山或少室莖如箭赤無葉根如芋子三月四月八月採根用乾治㿈腫白鮮本草經曰白鮮治酒風薇䕔吴氏本草曰薇䕔一名縻䕔一名無願一名承膏一名承醜一名無心􅀑翹根本草經曰翹根味苦生平澤治下􅀬氣益隂精令人面恱好明目乆服輕身能老生嵩髙吴氏本草曰翹根神農雷公甘有毒二月八月採以作蒸飲酒病人藎余恡切本草經曰藎草味苦盧精本草經曰盧精治蠱毒味辛平生益州屈草本草經曰屈草實根味苦微寒生川澤治胷脅下痛邪氣腹間寒隂痺乆服輕身􅀘益能老生漢中陸英本草經曰陸英生熊耳山㯏菜本草經曰㯏菜一名白英味甘寒生山谷治寒􅀬乆服輕身延年生益州木香本草經曰木香一名木􅁡香味辛温無毒治邪氣辟毒疫温􅀑強志主氣不足乆服不夣窹魘􅄰輕身致神仙生永昌山谷陶隠居云此即青木香也永昌不復貢今皆從外國舶上來云大􅁗國以療毒腫消惡氣有驗今皆用之杜衡􅀶物志曰杜衡亂細辛蟸實華吳氏本草曰蟸實一名劇草一名三堅一名劇荔華䑕李吴氏本草曰䑕李一名牛李太平御覽卷第九百九十一
