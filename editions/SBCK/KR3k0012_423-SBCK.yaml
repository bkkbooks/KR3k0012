front:
  text: 太平御覽卷第四百二十三
  hash: sha256:11889f70174bfbbfa4eea3bd839a29ac85c5965e7631c2c327fd9c99a11ef17a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_423-1a}
body:
  text: 人事部六十四謙讓上謙易謙卦曰謙亨君子有終􅁻􅂏曰天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙􅀑神害􅄹而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也象曰地中有山謙君子以裒多益寡稱物平施􅀄六謙謙君子用渉大川吉六二鳴謙貞吉九三勞謙君子有終吉六四無不利撝謙上六鳴謙利用行師征􅁻易下繫曰謙德之柄也尚書曰滿招損謙受益左傳莊公曰齊侯使敬仲爲卿辭曰羇旅之臣敢辱髙位以速官謗敢以死告又成上曰晉與齊戰而勝歸范文子後入武子曰無爲吾望尓也武子士㑹丈子之父對曰師有大功國人喜以逆也先入必屬耳目是代帥受名故不敢武子曰吾知免矣知其不益巳禍漢書曰張安丗兄賀爲掖庭令而宣帝以皇曽孫収飬掖庭賀視飬拊循恩甚宻焉上追思賀恩欲封其塚爲恩徳侯置守塚户二百家安丗􅀷辭賀封又求損守塚户上曰吾自爲掖庭令非爲將軍安丗乃止又曰于定國爲人謙恭尤重經術士雖卑賤徒歩定國皆與均禮又曰元帝即位徴孔霸爲師賜爵􅀜内侯霸爲人謙退不好權􅀔常爵位泰過何德以堪之霸讓位自陳上深知其志誠乃弗用東觀漢記曰北海靖王睦顯宗之在東宫尤見幸而睦性謙㳟好士名儒􅀫徳莫不造門永平中法憲頗峻睦乃謝絶賔客放心音樂歳終遣中大夫奉璧朝賀召而謂曰朝廷設問寡人大夫將何辭對使者曰大王忠孝慈仁敬賢樂士臣雖螻蟻敢不以實睦曰吁子危我哉此乃􅀌㓜時進趨之行也大夫其對以􅀌襲爵巳來志意衰惰聲色是娯犬馬是好使者受命而行又曰李通娶寜平公主爲大司空通性謙恭常避權􅀔謝病不視事又曰馮異字公孫爲人謙退與諸將相逢輙引車避道毎止頓諸將共論功伐異常屏止樹下軍中號大樹將軍又曰鄧騭兄常居禁中騭謙退不欲乆在内連求還第太后乃許又曰樊宏爲人謙愼常誡其子曰冨貴盈溢未有能終者及病困車駕臨問其所欲言宏頓首自陳無功享食大國願還壽張食小郷亭上悲傷其言而不許又曰梁商朝廷敬憚其委任自前丗外戚見禮過尊顯所未曽有商門無駐馬請謁之賔謙虚挹損九命弥恭漢興巳來妃后之家亦無商比晉書曰羊祜開府累年謙譲不辟士始有所命㑹卒不得除署宋書曰劉懷愼武帝北伐以爲中領軍􅀫衛輦轂雖名位優重而恭恪愈至毎所之造位任不踰巳者皆束帶門外下車其謹退􅀋如此又曰蒯恩字道恩以戰功封新寧縣男武帝北伐留恩侍衛丗子命朝士與之交恩益自謙損與人語常呼官位自稱鄙人撫士卒甚有恩紀又曰臨川王義慶爲平西將軍荆州刺史荆州居上流之重資實兵士居朝廷之半義慶以宗室令美故特有此授性謙虚始至及去迎送物並不受又曰彭城王義康與王弘共輔朝政弘旣多疾且毎事推謙自省内外衆務一斷之義康又曰建平王宏爲人謙儉周愼禮賢接士明逹政事上甚信仗之轉尚書令唐書曰李藩以張建封在徐州辟爲從事居幕中謙謙未甞論細微㑹稽典録曰陳瑞字文象丗爲縣卒瑞謙恭敬譲及其居二千石九卿位少年童竪拜者皆正朝服與之抗禮􅀂疾病不能荅拜輙拊頰以謝之新序曰晉人伐楚楚大夫請擊之莊王曰先君在時晉不伐楚及􅀌之身而晉伐楚是􅀌之過如何其辱諸大夫大夫曰是臣之罪請擊之莊王俛泣起拜諸大夫晉人聞之曰君臣爭以過爲在已上下一心三軍同力未可攻也還師而歸􅀽彦伯明謙曰賢人君子推誠以存禮非降巳以應丗率心以成謙非匿情以同物故侯王以􅀌寡饗天下江海以卑下朝百川易曰天道下濟而光明地道卑而上行老子曰髙以下爲基貴以賤爲夲此之謂乎譲上尚書舜典曰咨四岳有能奮庸熈帝之載使宅百揆亮采惠疇僉曰伯禹作司空帝曰俞咨禹汝平水土惟時懋哉禹拜稽首譲于稷契曁臯陶帝曰疇􅀂予工工百工也僉曰垂哉垂臣名也帝曰俞咨垂汝作共工垂拜稽首譲于殳斨曁伯與帝曰俞往哉汝諧帝曰疇􅀂予上下草木鳥獸僉曰益哉帝曰俞咨益汝作朕虞虞掌山澤官名益拜稽首讓于朱虎熊羆朱虎熊羆二臣也帝曰俞往哉汝諧帝曰咨四岳有能典朕三禮僉曰伯夷伯夷臣名帝曰俞咨伯汝作秩宗秋宗主郊庿之官伯拜稽首譲于夔龍毛詩魚藻角弓曰民之無良相怨一方受爵不讓至于巳斯亡周禮地官上大司徒曰以陽禮教譲則民不爭禮記曲禮曰博聞強識而讓尊善行而不怠謂之君子又曲禮曰君子恭敬樽節退讓以明禮又坊記曰故貴賤有等衣服有別朝廷有位則民有所讓子云君子辭貴不辭賤辭富不辭貧則亂益亡子云觴酒豆肉讓而受惡民猶犯齒祍席之上譲而坐下民猶犯貴朝廷之位譲而就賤民猶犯君子云君子貴人而賤巳先人而後已則民作譲又􅀕義曰天子有善譲德於天諸侯有善歸諸天子卿大夫有善薦於諸侯士庶人有善夲諸父母又儒行曰儒有衣冠中動作愼其大譲如慢小譲如僞又郷飲酒曰三揖至于階三譲以賔升月者三日則成魄三月則成時是禮有三讓左傳隱公曰宋穆公疾召大司馬孔父而屬殤公焉曰先君舎與夷而立寡人先君穆公兄宣公也與夷宣公子即所屬殤公也􅀂以大夫之靈得保首領以殁先君􅀂問與夷其將何辭以對請子奉之以主社稷對曰群臣願奉馮也馮穆公子莊公公曰不可先君以寡人賢使主社稷􅀂弃德不譲是廢先君之舉也又僖上曰齊侯使管夷吾平戎于王使隰朋平戎于晉王以上卿之禮饗管仲管仲辭曰臣賤有司也有天子之二守國髙在若節春秋來承王命何以禮焉陪臣敢辭王曰舅氏余嘉乃勲應乃懿德謂督不忘徃踐乃職管仲卒受下卿之禮而還君子曰管氏之丗祀也冝哉譲不忘其上又曰宋桓公疾太子兹父固請曰目夷長且仁君其立之兹父㐮公也目夷兹父庶兄子魚也公命子魚子魚辭曰能以國讓仁孰大焉臣不及也且又不順立庶不順禮遂走而退又文上曰穆伯如齊始聘禮也凡君即位卿出並聘踐修舊好要結外援好事隣國以衛社稷忠信卑譲之道忠信德之固也卑譲德之基也又宣上曰鄭人立子良辭曰以賢則去疾不足去疾子良之名以順則公子堅長乃立襄公又成下曰諸侯將見子臧於王而立之子臧曰前志有之曰聖逹節次守節下失節爲君非吾節也雖不能聖敢失守乎遂逃奔宋又襄上曰晉韓獻子告老公族穆子有廢疾將立之辭曰詩曰豈不夙夜謂行多露無忌不才讓其可乎請立起也無忌穆子名起無忌弟宣子也又襄二曰晉侯使士丐將中軍辭曰伯游長伯游荀偃昔臣習於智伯是以佐之非能賢也請從伯游使荀偃將中軍士丐佐之使韓起將上軍辭以趙武又使欒黶辭曰臣不如韓起願上趙武君其聽之使趙武將上軍韓起佐之欒黶將下軍魏絳佐之晉國之民是以大和諸侯遂睦君子曰譲禮之主也范宣子譲其下皆譲欒黶爲汱弗敢違也又襄二曰呉子諸樊旣除喪將立季札札諸樊少弟季札辭曰曹宣公之卒也諸侯與曹人不義曹君將立子臧子臧去之遂弗爲也札雖不才願附於子臧以無失節固立之弃其室而耕乃舎之傳言季札之讓月明呉兄弟相傳又襄五年曰鄭伯賞入陳之功饗子展賜之先輅三命之服先輅次輅皆王所賜車侯伯之上卿三命先八邑賜子産次輅再命之服先六邑子産辭邑曰自上巳下降殺以兩禮也臣之位在四且子展之功也臣不敢及賞請辭邑公固與之乃受三邑公孫揮曰子産其將知政矣譲不失禮也論語曰能以禮譲爲國乎何有不能以禮讓爲國如禮何又曰子曰太伯其可謂至德也巳矣三以天下讓民無得而稱焉孝經曰先之以敬譲而民不爭國語曰狐毛卒使趙衰代之辭曰城濮之役先且居之佐軍也善先且居晉大夫先子也軍伐有賞善君有賞能其官有賞且居有三賞不可廢也且臣之倫箕鄭胥臣先都在倫軰也三子皆晉大夫也乃使先且居佐上軍公曰趙衰三讓其所譲皆社稷之衛也廢譲是廢德也以趙衰之故蒐于清原作五軍清原之蒐在魯僖三十年也使趙衰將新上軍箕鄭佐之胥臣將新下軍先都佐之又曰君子急病讓夷又曰齊桓公自莒反於齊使鮑叔牙爲宰辭曰臣不􅀂夷吾者有五寛惠愛民臣不􅀂也治國家不失其柄臣不􅀂也忠信可結於百姓臣不􅀂也制禮義可法於四方臣不􅀂也執枹鼔立於軍門使百姓皆加勇臣不􅀂也又曰晉悼公使張老爲卿辭曰臣不如魏絳乃使魏絳佐新軍家語曰虞芮二國爭田而訟連年不决相謂曰西伯仁人文王盖往質焉入其境則耕者讓畔行者讓路入其朝則士譲於大夫大夫譲於卿虞芮之君曰吾儕小人不可以入君子之朝遂自相與成以其所争爲閑田史記曰呉太伯弟仲雍皆大王之子季歴之兄也季歴賢又生聖子曰太王欲立季歴以及昌於是太伯仲雍二人奔荆蠻文身斷髮示不可用以避季歴又曰太尉周勃立代王代王曰奉髙帝宗廟重事寡人不足以稱寡人不敢當群臣皆伏固請代王西向讓者三南向讓者再又曰魯連旣􅀃􅁗軍􅁗軍爲却平原君欲封魯連魯連辭謝者三終不肯受平原君乃置酒酒酣起前以千金爲魯連壽連嘆曰所貴天下之士者爲人排難解紛而無取也即有取者是啇賈之事連不忍爲也遂辭而去終身不復見又曰董偃在舘陶主家兒戲􅀶殿下主伏檻觀之偃􅀒則饒人勝則有譲主益竒之又曰伯夷叔齊􅀌竹君之子也父欲立叔齊乃譲伯夷伯夷曰父命也遂逃去漢書曰文帝􅀄立以陳平爲相太尉勃親以兵誅吕氏功多平欲譲勃位廼謝病文帝恠平病問之平曰髙帝時勃功不如臣及誅諸吕臣切亦不如勃願以相譲勃又曰􅀽盎謂文帝曰陛下至代邸西郷讓天子者三東譲天子者再夫許由一譲而陛下五以天下譲過許由四矣又曰龔遂爲渤海太守數年上遣使者徴遂議曹王生願從太守㑹遂引入宫王生醉從呼曰願有所白遂問其故王生曰天子即問君何以治渤海君不可有所陳冝曰皆聖主之德非小臣之力也上果問以治狀遂對如王生言天子恠其有讓嘆曰君安得長者之言而稱之遂因前曰臣非知此乃臣議曹教臣也又曰武帝屬霍光以輔少主光譲金日磾日磾曰臣外國人且使匈奴輕漢於是遂爲光副又曰韋賢薨子􅀇成當爲嗣􅀇成心知其兄非賢雅意欲譲即佯狂丞相御史遂以􅀇成實不病劾奏之有詔勿劾引拜􅀇成不得巳受侯爵太平御覽卷第四百二十三
