body:
  text: 職官部二十一諌議大夫􅀘闕拾遺諌議大夫六典曰諌議大夫掌侍從賛相規諌諷諭凢諌有五一曰風諌二曰順諌三曰規諌四曰致諌五曰直諌漢書曰韋玄成字少翁以父任爲郎少好修文業尤謙遜其接人貧賤者益加由是名譽曰廣以明經擢爲諌議大夫又曰劉輔以美才擢爲諌議大夫成帝欲立趙婕妤爲皇后輔上書曰陛下乃觸情縱欲以卑賤之女母天下乎里語曰腐木不可以爲柱卑人不可以爲主臣辱諌諍之官不敢不盡死言又曰貢禹字少翁元帝徴禺爲諌議大夫數虚巳問以政事是時年榖不登禹奏言宫室制度冝從儉省天子納其善言又曰夏侯勝字長公明洪範五行爲諌議大夫爲人簡易無威儀見時謂上爲君誤相字於上前上以此親信之又曰王褒字子淵蜀人也益州刺史王襄欲宣風化於衆庶聞褒有俊材請與相見使褒作中和樂職如淳曰言王政中和在官者樂其職也宣布詩如淳曰國語所謂宣布哲人之令徳也蘇林日歌之名也選好事者令依鹿鳴之聲習而歌之時何武爲童子選在歌中武歌於太學宣帝召見曰此盛徳之事吾何足以當之益州刺史因奏言襃有軼材上乃徴襃旣至詔襃爲聖主得賢臣頌擢爲諌議大夫又曰楊雄字子雲以􅂄老乆次轉爲諌議大夫疾免復召爲諌議大夫家至貧􅄝酒人稀至其門時有好事者載肴酒以從遊學又曰孔光字子夏經學尤明舉止方正爲諌議大夫東觀漢記曰郭丹字少卿從師長安買符入函谷􅀜乃􅁣然而歎曰丹不乗使者車不出此􅀜旣至京師嘗爲都講更始二年爲諌議大夫持節歸南陽自去家十三年果乗髙車出􅀜後漢書曰陳禪字紀山爲諌議大夫西南禪國王獻樂及幻人能吐火自支解易牛馬頭大㑹作之於庭禪離席舉手曰帝王之庭不冝作夷狄之樂又曰韋彪字孟逹上䟽曰諌議之職應用公直之士通才謇正有􅀘益於朝者今或從徴試軰爲大夫動舉州郡並冝清選其任責以言績其二千石視事雖乆而爲吏人所便安者冝增秩重賞勿妄遷徙惟留聖心又曰江革轉諌議大夫賜告歸天子思革篤行詔齊相曰諌議大夫江革前以病歸今起居何如夫孝者百行之冠衆善之始也縣以見􅂖千斛賜巨孝常以八月長吏存問致羊酒以終厥身又曰劉陶字子竒拜諌議大夫靈帝世天下日危陶上䟽言天下亂皆由於宦竪宦竪見事急共䜛陶詔収黄門北寺獄陶自知必死對使者曰䜛邪相求考掠日深臣恨不列稷卨伊周之蹤而與比干龍逢爲儔事敗乃悔復何可及閉氣而死續漢書曰周舉字宣光梁啇表爲從事中郎啇疾甚帝問遺言對曰臣從事中郎周舉清愼髙亮可任諌議大夫謝承後漢書曰􅀓翻字君成轉諌議大夫天性諒直數陳讜言武帝嘉之又曰虞承字叔明拜諌議大夫雅性忠謇在朝堂犯顔諌争終不曲撓散禄賑給諸生言徳無比魏志曰賈逵字梁道河東襄陵人也自爲兒童戯常設部伍祖父習異之曰汝大必爲將帥口授兵法數萬言爲丞相主簿太祖善之拜諌議大夫與夏侯尚並掌軍計又曰賈逵字梁道太祖征劉備先遣逵至斜谷觀形􅀔道逢水衡載囚數十逵以軍事急輙竟重者一人皆放其餘太祖善之拜諌議大夫蜀志曰尹黙字思潜以左氏傳教授後主踐阼拜諌議大夫晉書曰李尤字伯仁侍中賈逵薦尤有揚雄之才明帝召作東壁雍徳陽諸觀銘拜諌議大夫後魏書曰張普惠字洪賑常山九門人爲諌議大夫任城王澄謂普惠曰不喜得諌議唯喜諌議得君唐書曰髙祖嘗嘲􅂫世長曰名長意短口正心邪棄忠貞於鄭國忘信義於吾家世長對曰名長意短實如聖㫖口正心邪未敢奉詔昔竇融以河西降漢十世封侯臣以山南歸國唯􅂪屯􅁥於是拜爲諌議大夫又曰􅂫世長擢拜諌議大夫從幸涇陽校獵大􅀗禽獸於旌門髙祖入御營頋謂朝臣曰今日畋樂乎世長進曰陛下遊獵薄廢萬機不滿十旬未爲大樂髙祖色變旣而􅀏曰狂態發耶世長曰爲臣私計則狂爲陛下國計則忠矣又曰王珪爲諌議大夫嘗有論諌太宗稱善遂詔每宰相入内平章大計必使諌官隨入與聞政事又曰太宗問諌議大夫禇遂良曰舜造漆器禹雕其爼當時諌舜十有餘人食器之間苦諌何也遂良對曰雕􅅣害農事綦組傷女工首創奢滛危亡之漸漆器不已必金爲之金器不已必玉爲之所以諌臣必諌其漸及其滿盈無所復諌上然之又曰蕭鈞遷諌議大夫時有左武候引駕盧文操踰垣盗左藏庫物髙宗以引駕職在糺繩身行盗竊命有司殺之鈞進諌曰文操所犯情實難原然恐天下聞之必謂陛下輕法律賤人命任喜怒貴財物臣之所職以諌爲名愚􅂨所懷不敢不奏帝謂曰卿職在司諌能盡忠規遂特免其死罪頋謂侍臣曰此乃眞諌議也又曰武后臨朝置匭四區共爲一室列於朝堂東方春色青有能告以養人及勸農可投書於青匭銘之曰延恩南方夏色赤有能正諌論時政之得失可投書於丹匭銘之曰招諌西方秋色白有能自陳抑屈可投書於素匭銘之曰申􅁈北方水色􅀇有謀智者可投書於􅀇匭銘之曰通玄冝令正諌大夫􅀘闕拾遺等一人充使知匭事每日所有投書至暮即進天寳九載三月改匭爲獻納又曰李景伯遷諌議大夫中宗嘗宴侍臣及朝集使酒酣令各爲廻波詞衆皆爲謟佞之詞及自要榮位次至景伯曰廻波尓時酒巵微臣職在箴規侍宴旣過三爵諠譁竊恐非儀中宗不恱中書令蕭至忠稱之曰此眞諌官也又曰至徳元年制諌議大夫論事自今巳後不湏令宰相先知又曰乾元二年四月兩省諌官十日一上封事直論得失無假文言旣成殿最用存沮勸又曰陽城爲諌議大夫裴延齡䜛譖陸贄等坐貶黜徳宗怒不解在朝無救者城聞而起曰吾諌官也不可天子煞無罪人而信用姦臣即率拾遺王仲舒等數人守延英門上䟽論延齡姦佞贄等無罪􅃺徳宗大怒召宰相入語將加城等罪良乆乃解令宰相諭遣之於是金吾將軍張萬福聞諌官伏閤諌趍往至延英門大言賀曰朝廷有直臣天下必太平矣遂遍拜城及王仲舒等曰諸諌議能如此言事天下安得不太平巳而連呼太平太平萬福武人時年八十餘自此名重天下又曰崔郾遷諌議大夫穆宗即位荒於禽酒坐朝􅁪晚郾與同列鄭覃等延英切諌穆宗甚喜之畋遊稍簡又曰文宗嘗於便殿召柳公權周墀對公權論事切直忤旨周墀爲之惴慓公權詞氣益堅上徐謂公權曰朕知舎人不合却作諌議以卿論事有争臣之風今授卿諌議大夫又曰孔戣爲諌議上䟽以事四條陳諷後有李渉投匭上言吐突承璀公忠戣爲匭使覽副􅃺大怒逐之因上䟽苦諌遂貶渉倖臣聞之側目人皆爲危之髙歩公卿間以方嚴見憚又曰馮定爲諌議大夫李訓事敗伏誅衣冠撗罹其禍中外危疑及改元御殿中尉仇士良請用神䇿仗衛在殿門定抗䟽論罷人情危之又請許左右史隨宰臣入延英記事又曰㑹昌元年中書門下奏據六典隋置諌議大夫七人從四品上大曆二年昇門下侍郎爲正三品兩省遂闕四品建官之道有所未周詩云衮職有闕仲山甫􅀘之周漢大臣願入禁闥􅀘過拾遺張衡爲侍中常居帷幄從容諷諌此皆大臣之任故其秩峻其任重則君敬其言而行其道况謇諤之地冝有老成之人秩未優崇則難用􅂄徳其諌議大夫望依隋書舊制昇爲從四品分爲左右以備兩省四品之闕向後與丞郎出入迭用以重其選從之五代史周書曰顯徳五年勑諌議大夫冝依舊正五品上仍班位在給事中之下按唐六典諌議大夫四貟正五品上皆􅈻門下省班在給事中之下㑹昌二年十一月中書門下奏升爲正四品下仍分爲左右以備兩省四品之闕故其班亦升在給事中之上近朝自諌議大夫拜給事中者官雖序遷位則降等至是以其遷次不倫故改正焉三輔决録曰第五頡字子陵爲諌議大夫洛陽無主人郷里無田宅􅀉止靈臺中或十日不炊􅀘闕六典曰􅀘闕唐垂拱中創立四貟左右各二天授年初左右各加三貟通前爲十貟其或才職相當不待闕而授言國家有過闕而􅀘正之故以名官焉又曰左右􅀘闕掌供奉諷諌扈從乗輿凢發令舉事有不便於時不合於道大則廷議小則上封􅀂賢良之遺滯於下忠孝之不聞於上則條其事􅃺而薦言之唐書曰王源中字正蒙早以文學知名升進士第宏詞科累遷至左􅀘闕時典禁軍者不循法度至有臺府人吏皆爲追擒源中上䟽其略曰夫臺憲者紀綱之地府縣者責成之所設有罪犯冝歸司存安有北軍􅀔重於南衙輦下權傾於仗内乞還法司庶守職分憲宗可其請又曰裴垍在中書有獨􅀌郁李正辭嚴休復自拾遺轉􅀘闕及叅謝之際垍廷語之曰獨􅀌與李二􅀘闕孜孜獻納今之遷轉可謂酬勞無愧矣嚴􅀘闕宫業或異於斯昨者進擬不無疑緩休復悚恧而退又曰文宗以魏謩爲􅀘闕上嘗言於宰臣曰太宗皇帝得魏徴採拾闕失弼成聖政今我得魏謩於疑似之間必極匡諌雖不敢希及貞觀之政庶幾處於無過之地命授謩左􅀘闕於内􅃺備述諌䟽激切詔申書善爲之詞唐書曰貞元中韋渠牟爲右􅀘闕内供奉僚列􅀄輕之上在延英旣對宰相多使中貴人召渠牟於官次同軰始注目矣歳中遷左諌議大夫時延英對秉政財賦之臣晝漏率下二三刻爲常渠牟奏御率下五六刻上􅀏語欵洽往往外聞又曰韋温爲右􅀘闕忠鯁救時宋申錫􅀍誣温昌言曰宋公履行有素身居台輔不當有此是姦人䧟害也吾軰諌官豈避一時之雷電而致聖君賢相䝉蔽惑之咎􅁘因率同列伏閤切争之由是知名拾遺六典曰拾遺唐垂拱中創立四貟左右各二天授􅀄左右各加二貟通前爲十貟才可則登不拘階叙言國家有遺事拾而論之故以名官焉又曰左右拾遺掌供奉諷諌扈從乗輿凢發令舉事有不便於時不合於道大則廷議小則上封􅀂賢良之遺滯於下忠孝之不聞於上則條其事􅃺而薦言之唐書曰李邕少知名長安􅀄内史李嶠及監察御史張廷珪並薦邕詞髙行直堪爲諌諍之官由是召拜左拾遺又曰李邕爲左拾遺御史中丞宋璟奏侍臣張昌宗兄弟有不順之言請付法推斷則天􅀄不應邕在陛下進曰臣觀宋璟之言事􅀜社稷望陛下可其奏則天色稍解始允宋璟所請旣出或謂邕曰吾子名位尚卑􅀂不稱旨禍將不測何爲造次如是邕曰不顚不狂其名不彰􅀂不如此後代何以稱也又曰李邕爲左拾遺及中宗即位以沃人鄭普思爲祕書􅁥邕上書諌曰盖人感一飱之恵殞七尺之身况臣爲陛下官受陛下禄而得目有所見口不言之是􅀒恩矣自陛下親政日近復在九重所以未聞在外羣下竊議道路籍籍皆云普思多行詭惑妄􅀃妖祥唯陛下不知尚見驅使此道􅀂行必撓亂朝政臣至愚至賤不敢以胷臆對揚天庭請以古事明證孔丘云詩三百一言以蔽之曰思無邪陛下今􅀂以普思有竒術可致長生乆視之道則爽鳩氏乆應得之永有天下非陛下今日可得而求􅀂以普思可致仙方則􅁗皇漢武乆應得之永有天下亦非陛下今日可得而求􅀂以普思可致佛法則漢明梁武乆應得之永有天下亦非陛下今日可得而求􅀂以普思可致􅀑道則墨翟于寳各獻於至尊矣而二王得之永爲天下亦非陛下今日可得而求此皆事渉虚妄歷代無効臣愚不願陛下復行之於明時唯堯舜二帝自古稱聖臣觀所行故在人事敦睦九族平章百姓不聞以􅀑神之道聽理天下伏願陛下察之則天下幸甚䟽奏不納又曰許景先常州義興人後徙家洛陽少舉進士授夏陽尉神龍􅀄東都起聖善寺報慈閣景先詣闕獻大像閣賦詞甚美麗擢拜左拾遺又曰蕭昕爲左拾遺昕常與布衣張鎬爲友館而禮之表薦曰如鎬者用之爲王者師不用則幽谷一叟尔􅀇宗擢鎬拾遺不數年出入將相又曰元和中以左拾遺杜從郁爲祕書丞從郁司徒佑之子也􅀄自司議郎爲左􅀘闕崔群韋貫之左拾遺獨孤郁等上䟽以爲宰相之子不合爲諌諍之官於是降爲左拾遺群等又奏云拾遺與􅀘闕雖資品不同而皆是諌官父爲宰相而子爲諌官若政有得失不可使子論父於是改授之又曰元和中延英宰臣對訖左拾遺楊歸厚次請對時上坐乆宣令後坐日對來歸厚堅詞固請宰相諭之不退上乃召見歸厚首論中官許遂振次歷詆宰輔皆過激切然而自衒求試其詞甚繁逾刻而罷又曰元稹除左拾遺稹性鋒銳見事風生旣居諌垣不欲碌碌自滯事無不言即日上䟽論諌職又曰寳曆中左拾遺李漢右拾遺舒元褒薛廷老等五人於閤内諌曰臣伏見近日除授往往不由中書進擬或是宣出臣恐自此紀綱䆮壞姦邪恣行伏乞聖恩詳察上厲聲曰更有何事舒元褒進曰陛下近日修造亦太多上色變曰何處修造元褒俛首不能對薛廷老奏曰臣等是諌臣有所聞即合論奏亦豈知陛下修造之所但見般輦瓦木絶多即知修造不已伏乞稍留聖慮上曰所奏知然後各復位議者以爲不廢其職又曰大和三年左拾遺舒元褒等論中丞温造凌供奉官事今月四日左􅀘闕李虞與温造街中相逢造怒不廻避遂捉李虞祗承人禁身一􅀫决春杖十下者臣等謹案國朝政故事供奉官街中除宰相外無所廻避今温造蔑朝廷典故凌陛下近臣恣行胷臆曾無畏忌伏以事有雖小而􅀜分理者即不可失也分理一失亂由之生遺􅀘官秩雖卑乃陛下侍臣也中丞雖髙乃法吏也侍臣見凌是不廣敬法吏壞法何以持䋲前時中書舎人李虞仲與造相逢造乃曵去引馬知制誥崔咸與造相逢又捉其從人當時縁不上聞所以強􅁀益甚臣等又聞元和長慶中中丞行李不過半坊今乃逺至兩坊謂之籠街喝道但以尊崇自處不思僣擬之嫌陛下若不因此特有懲革伏恐從此供奉官軰便湏廻避中丞累朝制度失自陛下臣等官忝諌列實爲陛下惜之奉勑憲官之職在指佞觸邪不在行李自大侍臣之職在獻可替否不在道途相髙並列通班合知名分如聞喧競亦以再三旣招人言甚損朝體其臺官與供奉官同道聽先後而行道途任祗揖而過其叅從人則各隨夲官之後少相僻避勿信衝突又聞近日巳來應合有導從官手力多者街衢之中行李太過自今傳呼前後不過三百歩書書曰歸登爲右拾遺裴延齡以姦佞有恩欲爲相諌議大夫陽城上䟽切直徳宗赫怒右􅀘闕熊執易等亦以危言忤旨􅀄執易草䟽成示登登􅃤然曰願􅀉一名雷電之下安忍令足下獨當自是同列切諌登每聮署其奏無所廻避時人稱重又曰王仲舒字􅀪中貞元十年䇿試賢良方正能直言極諌等科仲舒登乙第超拜右拾遺裴延齡領度支矯誕大言中傷良善仲舒上䟽極論之又曰趙宗儒拜右拾遺翰林學士父驊改祕書少監與父並命出於中旨當時榮之太平御覽卷第二百二十三
