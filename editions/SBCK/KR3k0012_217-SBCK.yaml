front:
  text: 太平御覽卷第二百一十七
  hash: sha256:b1461a136c3056279c31062339c013546cdf27b8bcb9e73b8b3ca36680bb127c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_217-1a}
body:
  text: 職官部十五兵部尚書兵部侍郎兵部四司郎中貟外户部尚書户部侍郎户部四司郎中貟外兵部尚書六典曰兵部尚書侍郎之職掌天下武官選授及地圖輿馬甲仗之政令其屬有四一曰兵部二曰職方三曰駕部四曰庫部揔其職務而行其制命凡中外百司之事由於所屬咸質正焉五代史晉史曰王權轉兵部尚書髙祖德契丹屈節以事之馳馹乗軺道路交織一日勑權爲使權以前丗累爲將相未嘗有􅁛臣於戎虜者謂人曰我雖不才年今耄矣豈能稽顙於穹廬之長乎違詔得罪亦所甘心由是停任兵部侍郎唐書曰太宗以楊􅀪禮有文武材擢拜兵部侍郎專典兵機之務􅀪禮每入叅謀議出則統衆攻戰駐蹕之陣領馬歩二十四軍出其不意以擊之所向摧破太宗自山下見􅀪禮所統之衆人皆盡力殺獲居多甚壯之謂許敬宗等曰越公兒郎故有家風矣又曰崔湜遷兵部侍郎父挹爲禮部侍郎父子同爲南省副貳有唐已來未有其事兵部郎中兵部貟外郎六典曰兵部郎中二人一人掌判帳及天下武官之階品衛府之名數一人掌判簿以揔軍戎差遣之名數貟外郎二人職方郎中職方貟外郎六典曰職方郎中貟外郎掌天下之地圖及城隍鎭戍烽候之數辨其􅀖國都鄙之逺近及四夷之歸化者外夷每有蕃客至委鴻臚訊其人本國山川風土修圖以進周禮曰夏官職方氏中大夫之職掌天下地圖主四方之職貢駕部郎中駕部貟外郎六典曰駕部郎中貟外郎掌􅀖國輿輦車乗傳驛厩牧官私馬牛􅄂畜簿籍辨其出入司其名數北史曰馮子琮爲尚書駕部郎中攝庫部孝昭曽閱簿領試令口陳子琮闇對無有遺失隋書曰辛公義爲駕部郎勾撿馬牧所獲十餘萬疋帝喜曰唯我公義奉國竭心庫部郎中庫部貟外郎六典曰庫部郎中貟外郎掌􅀖國軍州戎器儀仗凡元正冬至陳設并祠􅀕喪葬所供之物皆辦其出入之數量其繕造之功以分給焉宋書曰文帝宴㑹有荒外歸化人帝問尚書庫部顧琮曰庫中仗有幾許琛跪對曰有十萬人仗舊武庫仗多祕不言帝旣問失言及琛跪對甚善之又曰江智泉除尚書庫部郎時髙流官序不爲臺郎智泉問􅀌援寡獨有此選意甚不恱固辭不拜唐書曰孔􅀂思遷庫部郎中􅀂思常謂人仕至郎中足矣至是持一石止水滿於座右以示有止足之意戸部尚書六典曰戸部尚書侍郎之職掌天下田戸均輸錢榖之政令其屬有四一曰户部二曰度支三曰金部四曰倉部揔其職務而行其制命凡中外百司之事由於所屬皆質正焉漢書曰成帝置尚書五人其三曰民曹主人吏上尚書事呉志曰孫休􅀄即位戸部尚書階下讀奏梁書曰到漑爲左民尚書漑身長八尺美風儀善容止所蒞以清白自脩性又率儉不好聲色虚室單牀傍無􅁎侍自外車服不事鮮華冠履十年一易朝服或至穿􅀘傳呼清露示有朝章而巳又曰何㣧字子季爲左人尚書後辭官隱於􅀂邪山雲門寺勑給白衣尚書禄胤固辭又曰到洽爲御史中丞兄漑爲左人尚書舊中丞不得入尚書下舎洽引服親不應有礙刺省詳決乃許入漑省亦以其兄弟素篤不能相別也又曰周􅀪正爲左民尚書夏月著犢鼻禈衣朱衣爲有司所彈其放逹如此户部侍郎唐書曰李林甫引蕭炅爲戸部侍郎甞與何挺之同行慶弔客次有禮記一卷炅讀之曰蒸甞伏臘炅早從宦無學術不識伏臘之意誤讀之挺之戲問炅對如􅀄挺之白張九齡曰省中豈得有伏獵侍郎由是出爲歧州刺史又曰李絳爲戸部侍郎甞因次對憲宗曰戸部比有進獻至卿獨無何也絳曰將户部錢獻入内藏是用官物以結私恩上聳然益嘉其直又曰長慶中孟簡代崔羣爲戸部侍郎是官有二貟其判使案者別居一署謂之左戸元和以還號爲清重之最宰輔登用多由此而去又曰張平叔長慶中爲户部侍郎平叔狡險大言囚王播以進旣掌財用常屈公利以便嬖倖多狎之旣有寵於上進退便僻􅄂以優諧或自稱老奴無復大臣之體甞奏事畢降階復昇又有論奏佻盪輕脫上每爲􅀏容之在班列間玩狎郎吏譁肆無忌請變榷鹽法請宰相爲之使因以自求樞機之任每有内制出輙疑授巳整衣冠以俟後人多􅀏之又曰􅁃敬休字順之爲戸部侍郎奏兩川米價騰踊百姓流亡請糶兩川闕官職田禄米以救貧人從之户部郎中六典曰戸部郎中貟外郎掌分理戸口井田之事凡天下十道任土所出而爲貢賦之差隋書曰髙構徴拜比部郎尋轉民部時内史侍郎晉平東與兄子長茂爭嫡尚書省不能断朝臣三議不決構斷而合理上以爲能召入内殿勞之曰我聞尚書郎上應列􅀫觀卿才識方知古人之言信矣嫡庶者禮敬之所重我讀卿判數過詞理愜當意所不能及也賜米百石由是知名唐書曰韋維少習儒業􅀶渉文史舉進士自大理丞累至户部郎中善於剖判時貟外郎宋之問工於詩時人以爲户部有二妙戸部貟外郎唐新語曰吕太一遷户部貟外戸部與吏部隣司吏部移牒戸部令牆宇悉竪􅁄以防令史交通太一報牒曰眷彼吏部銓綜之司當湏簡要清通何必竪籬挿􅁄省中賞其俊抜度支尚書晉書曰􅀄魏文帝置度支尚書專掌軍國支計朝議以征討未息動湏節量及明帝嗣位欲用安平王孚問左右曰有兄風不荅曰似兄帝曰吾得司馬懿二人復何憂哉轉爲度支尚書又曰當陽侯杜元凱爲度支尚書內以利人外以救邊備物致用以濟當時之益者五十餘條朱鳯晉書曰文帝立度支尚書軍糧計校一由之以司馬孚爲之晉起居注曰咸寧五年詔曰一年不收使公私俱匱不唯天時乃人事有不盡也故揔要者正在度支尚書也其以散􅀐常侍中書令張華爲度支尚書後魏書曰陽平王子匡除度支尚書匡與尚書令髙肇不平常無降下之色時丗宗委政於肇朝廷傾憚惟匡與肇抗衡先自造棺置於㕔事意欲輿棺詣闕論肇罪惡隋書曰長孫平開皇三年徴拜度支尚書平見天下州縣多罹水旱百姓不給奏令民間每秋家出粟麥一石巳下貧富爲差等儲之閭里以備凶年名曰義倉度支郎中唐書曰崔仁師爲度支郎中甞奏度支財物數千言手不執夲太宗怪之令黃門侍郎杜正倫齎夲仁師對唱一無差殊太宗大竒之六典曰度支郎中貟外掌判天下租賦少多之數物産豐約之冝水陸道路之利每歳計其所出而支其所用凡物之精與地之近者以供國物之固與地之逺者以供軍皆料其逺近時月衆寡好惡而節制之度支貟外郎唐書曰張濬爲度支貟外郎黃巢將逼􅀜輔濬託疾請告侍其母挈族避亂啇州賊犯京師僖宗出幸途無供湏衛軍不得食漢隂令李康獻糗餌數百騾綱軍士始得食僖宗召康問之曰卿爲縣令安操心及此康對曰臣爲塵吏安敢有此進獻張濬貟外教臣也帝異之金部郎中金部貟外郎隋書曰盧昌衡字子均爲僕射祖孝徴所薦遷尚書金部郎孝徴每曰吾用盧子均爲尚書郎自謂無愧幽明矣六典曰金部郎中貟外郎掌判天下庫藏錢帛出納之事頒其節制而司其簿録倉部郎中六典曰倉部郎中貟外郎掌判天下倉儲受納租稅出給禄廪之事凢中外文武官品秩有差歳再給之唐書曰畢諴歷駕部貟外郎倉部郎中故事勢門子弟鄙倉駕二曹居之者不恱惟諴受命恬然㳟遜口無異言執政多之倉部貟外郎唐書曰長慶中孟簡遷倉部貟外郎屬順宗登極王叔文竊政驟爲户部侍郎簡爲其屬中立正色挺然不附叔文心忌而不敢退黜言於宰相韋執􅁩換刑部貟外郎太平御覽卷第二百一十七
