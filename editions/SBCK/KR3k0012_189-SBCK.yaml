  text: 太平御覽卷第一百八十九
  hash: sha256:b4e2c3fba82cc11bdbcf05d86c2e0d125a4a8f729a6fc39bf1a5b3d218a1dedb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_189-1a}
body:
  text: 居處部十七井釋名井清也泉之清㓗者也風俗通云井者法也節也言法制居人令節其飲食無窮禍也乆不滯渫滌爲井泥易云井泥不食不停汚曰井渫易云井渫不食滌井曰浚井水清曰洌井易云井洌寒泉甃聚塼修井也易云井甃無咎易傳曰井通也物所通用也禮記曰井與門户竈中霤爲五祀世夲曰伯益作井周書云黄帝作井說文云八家一井易曰改邑不改井無䘮無得往來井井又曰井洌寒泉周禮曰挈壷氏掌挈壷以令軍井左傳曰楚伐蕭還無社謂申叔展日目於眢井而拯之若爲茅絰􅂘井則已又曰鄭公子歸生受命于楚伐宋戰于大􅁄宋師敗績囚華元􅀗樂吕狂狡輅鄭人入於井狂狡宋大夫輅迎也倒㦸而出之􅀗狂狡君子曰失禮違命冝其爲擒也戎昭果毅以聽之之謂禮聽謂常在於耳著於心想聞其政令殺敵爲果致果爲毅易之戮也史記曰瞽叟使舜穿井穿井匿空旁出舜旣入􅀷瞽叟與弟象共下土實井從匿空出去漢書曰蜀多鹽井羅襃以鹽井致冨又曰陳遵每大飲㑹賔客滿堂輙閉門取客車轄投井中漢書曰元帝時謡曰井水溢滅竈烟灌玉堂流金門至成帝北宫井水溢王莽之徴也又曰朱愽爲御史大夫府吏舎百餘區井水俱竭長老異之後果廢焉又曰王莽時井得白石上圎下方有丹書著文曰告安漢公莽爲皇帝符命之興自此始矣莽使羣公白太后太后曰此誣罔天下不可施行宗廣劉京上書言七月中齊郡臨淄縣昌興亭長辛當歹暮數夢曰吾天公使也公使我告亭長曰攝皇帝當爲眞即不信我此亭中當有新井亭長晨起視亭中有新井入地且百尺也後漢書曰琅邪有冰井冰厚尺餘又曰耿恭之攻匈奴以䟽勒城傍有澗水可固五月引兵據之七月匈奴復攻恭恭募先登數千人直馳之胡􅀐散走匈奴遂於城下擁絶澗水恭於中穿井十五丈不得水吏士渴乏笮馬糞汁而飲之恭仰天歎曰聞昔貳師將軍㧞佩刀刺山飛泉涌岀今漢徳神明豈有窮哉乃整衣服向井再拜爲吏士禱有頃水泉奔出衆皆稱万歳乃令士揚水以示虜東觀記曰恭親自挽籠於是令士且勿飲先和泥塗城并揚示之虜岀不意以爲神明遂引去又曰淳于恭門側有井郷里小兒爭飲牛恭惡之名置水器汲水滿之又曰張讓刧天子至河掌璽者投璽井中後孫堅討董卓至􅂎國見井有五色光後浚井得璽呉書曰孫䇿功曹魏滕有罪譴欲殺之左右憂恐計無所出夫人乃􅀝大井召䇿謂曰汝新造江南其事未集方當優賢禮士闡過録功功曹在公盡規汝今殺之他人明日皆叛汝矣吾不忍見汝禍及當先投此中䇿大驚遽釋滕罪晉書曰阮瞻甞羣行冒􅀬渴甚逆旅有井衆人競趣之瞻獨逡巡在後須􅁷飲者畢乃進其夷退無競如此又曰元帝爲晉王使郭璞筮遇豫之睽璞曰會㮷當岀鍾以告成功上有勒銘應在人家井􅅺中得之繇所謂先王以作樂崇徳殷薦之上帝也及帝即位太興􅀄㑹稽剡縣人果於井中得一鍾長七寸二分口徑四寸半上有古文竒書十八字云會稽岳命餘字時人莫識之璞曰蓋王者之作必有靈符塞天人之心與神物合契然後可以言受命矣梁書曰巴郡忽有地自開成井方六丈深三十二丈帝王丗紀曰堯時老人擊壤於路而歌曰鑿井而飲耕田而食帝力於我何有哉南史曰延陵縣季子廟沸井之北忽聞金石聲疑有異鑿深三尺得沸井奔涌若浪其地又響即復鑿之復得一井涌沸亦然井中得一木簡長一尺廣二分上有􅀮起字曰廬山道人張陵再拜謁簡大堅白字色乃黄魚豢魏略曰明帝九龍殿前爲玉井綺欄髙士傳曰管寜所居井會汲者或男女􅄂錯或爭井􅃲寧乃多買器分置井旁汲以待之唐書曰長慶中長安主簿鄭翦主役太清宫御院忽於院前西序見一白衣老人云此下有井正直皇帝過路汝速實之不然罪在不測翦惶恐遽領役人視之其處巳䧟數尺發之則一古井宛然驚頋之際巳失老人所在翦以聞上旣至宫羣臣及供奉官於馬前蹈舞賀有詔命翰林學士韋處厚紀述以表其異孟子曰有爲者譬若掘井九軔而不及泉猶爲弃井也有爲仁義也軔八尺也雖􅀷不及泉喻有爲者中道而盡弃前行也莊子曰公孫龍問於魏牟曰龍困百家之智窮衆口之辯以爲至逹今吾聞莊子之言茫然異之無所開吾喙公子牟􅀏曰子獨不聞塪井之鼃謂東海之鼈曰吾跳梁乎井幹之上入休乎缺甃之岸赴水則接掖持頥蹶泥則滅足没跗還虷蠏與科斗莫吾能若也且夫擅一壑之水而跱塪井之樂亦至矣夫子奚不時來入觀乎東海之鼈左足未入而右􅂰已墊矣於是逡廵而却告之海若曰夫万里之逺不足舉其大千仞之髙不足極其􅀷禹之時十年九潦而水不爲加益湯之時八年七旱而崖不爲加損夫不爲頃乆之推移者此亦東海之大樂於是塪井之鼃聞之適適然驚規規然自失墨子云備城五十歩一井范子曰直木先伐甘井先竭孫子兵法曰地多䧟曲曰天井墨子云二舎共一井抱朴子内篇曰臨沅縣有寮氏家世老壽後子孫輙夭賤折他人居其故宅復丗夀乃知是宅所爲不知何故疑井中赤乃掘井左右得古人埋丹砂數十斛丹汁入井是以飲其水而得壽吕氏春秋曰天下之羙者崑崙之井又曰宋丁氏無井常一人漑汲於外及自穿井喜而告人吾穿井得一人人傳之者聞於宋君召問其故對曰得一人之使非得一人於井中也說􅁐曰季桓子穿井得土􅇲中有羊以問孔子言得狗孔子曰以吾所聞非狗乃羊也木之怪夔罔兩水之怪龍罔象土之怪棼羊也非狗也桓子曰善哉管子曰桓公將與管仲飲十日齋戒掘新井而柴焉注新井以柴蓋覆之取其清㓗示敬也葛仙公傳曰仙公取數十錢使一人投井水公從井上呼錢又一一飛從井中出入公器中也桂陽列仙傳曰􅂫躭啓母曰有賔客來㑹躭受性當仙今招耽去違於供養今年多疫竊有此井水飲之可得無恙賣此水過於供養使賔客隨去焉水經注曰華林園䟽圃中有古井悉珉玉爲之以繢石爲口玉作精密獨不變古粲焉如新異􅁐曰蘭陵昌慮縣郳城有華山山上有井鳥巢其中金喙黒色而團翅此禽見則大水井又不可窺窺者􅄹歳輙死又曰廣陵郡東界有黄公􅊘髙墳二所前有一井面廣數尺每旱不竭有於其中得銅釡及鑵各一又曰謝晦字宣明宅南路上有古井以元嘉二年汲者忽見三龍甚分明行道住觀莫不嗟異有人入井始知是塼􅀮起作龍形又曰潯陽曇椿丗居長沙宅有古井每夜輙聞有如炮竹聲相承謂爲龍吒風俗通曰龐儉父先逃走隨母流宕後居郷里鑿井得銅生遂温冨後買奴曰堂上者我婦也問其故奴曰我婦姓艾字阿宏足下有黒子腋下有赤志母曰我翁也遂爲夫妻時人曰鑿井得銅買奴得翁又曰龐儉鑿井得錢數万又曰郄子路行飲馬投錢井中續漢禮儀志曰夏至日浚井改水冬至日鑚燧改火淮南子曰伯益作井而黄龍登異物志曰盧陵城中有一井井中有二色半青半黄黄者似炭汁作麋粥皆金色因名之金井幽明録曰山隂縣九侯神山上有靈壇壇前有古井常無水及請告神即水涌出供用足乃復漸止潯陽記曰盆城漢灌嬰所築孫權經此城自立摽井令人掘得井銘曰潁隂侯所開三百年當塞不滿百年爲當運者所開權忻以爲瑞井江中風浪井水輙動豫章記曰厭源山西北余侔村五六里有洪井說云洪崖先生之井蜀都賦曰火井炤熒於幽泉注蜀都有火井欲出其火先將家火投之隆隆如雷聲須􅁷火出光耀十里以竹筩盛之其光不滅􅀶物志曰臨卭有火井縱廣五尺􅀷二三丈在縣南百里昔時有竹木投之以取火諸葛丞相徃視之後火轉盛􅀬以盆着井煑鹽得鹽後以燭火投井中即滅迄今不復也盛􅀪之荆州記隨郡北界有廟郷村南有重山山下有一村父老相傳云是神農所生村西有重塹内周廻一頃二十􅅿地中有九井相傳神農旣育九井自穿又云汲一井則衆井水動則以地爲神農社年常祀之㝷陽記龍窟有􅀷泉泉側常見龍曽有人於水邊洗銅椀忽浪起水漲便失椀此人没水逐取旣出復失去後人見龍衘椀在城裏井邊幽明録曰襄邑縣南有瀬郷老子廟廟中有九井㓗齋入者温清隨人意念瀨郷記老子廟中有九井汲一井餘井水並動廣志曰臨卭有粉井得其水汰粉則益光嵩山記少室山有雲母井出雲母洛陽記宫牆西有兩銅井連御溝名曰濛汜羊頭山記衛青破月支月支有井色如酒因名曰酒井又曰東阿城北門有大井深七尺煑之得膠貢之又曰雍丘縣有神井興霧雹享祀不輟又曰盤固山有大井銅人甞守之五十年一踊水起數十丈銅人每以手掩之即止又曰零浦有鹽井二十四其一岀火筩取密閇万里不滅又曰金龍井西京太極殿上有之金龍負山於上兼金鹿盧山海經曰崑崙山墟在西北帝之下都髙百仞面有九井以玉爲檻洞􅁳記珠甜水去虞淵八千里有甜溪水如蜜東方朔遊此水還將數斛以獻帝帝投隂井井裏遂􅁪甜而寒洗肉肌理柔滑瑤琨去玉門九万里有碧草如麥剉之以釀則味如酒而驗烈看之則顔色如醉飲一合則三旬不醒啜甜水則隨飲隨醒又曰長安東七百里有雲山山頭有井雲從中岀若土徳王則黄雲出火徳王則赤雲岀水德王則黒雲出金徳王則白雲岀木徳王則青雲岀荆州記風井夏則風岀冬則風入又曰益陽縣有岡岡上有金井數百尺傳云昔有金人以杖撞地而輙成井王子年拾遺記峻鍰山石下有金井白氣􅃣其上井中金桑弱可緘縢又曰范蠡相越致千金僮者万人收四海難得之貨􅄹於越都以爲兵器銅鐵之􅀋知山阜者或藏之井壍謂之寳井竒容麗色溢於閨房謂之遊宫自歴古已來未之有也又曰頻思之國人皆多力拳頸不食五榖日中無影飲桂漿雲露羽毛爲衣髮大如縷堅韌如筋申之裁至一丈置則自縮如螺績此人髪以爲繩以汲丹井之水至乆方得􅂛合之水水中有白蛙兩翅去來常在井上仙者食之至周王子晉臨井而窺有青雀衘土杓以授子晉取而飲之乃有雪飛子晉以衣䄂撝雪則雪自止白蛙化爲􅀟白鳩入雲又曰王􅀓先時家貧穿井得鐵印銘曰傭力得冨至億庚一土三田軍門主果大冨永􅀄中以錢買官至中壘校尉三田一土乃壘字也郡國誌曰姑衍州有湯井風穴深不可測常有微風雖三伏盛暑猶須衣裘又曰􅁪州常穿井得白玉方四尺下有石石有􅀛長二尺許又曰連渾府姑衍州遥火山西有火井深不可見底炎氣上昇常若微電以草㸑之則煙騰火發其山似火從地發故名熒臺又曰濮州姚墟有二井是舜井也以物投一井即二井水皆動耕於歴山漁於雷澤即此也又曰硤州冝陽山有風井穴大如甕夏岀冬入有樵人置笠穴口風翕之入後於長溪口得笠則知潜通也又曰朔州有神泉人歌曰紇眞山頭有神井入地千尺絶骨冷又曰貴州有司命井半甘半淡潜涌江波虚􅄹如勢又曰衡山侯曇山山有溪豪神祠壇壇傍有石井常無水人祀之即水岀事了即乾又曰柳州昔相嶺西麓下有潮井廣半􅅿一日三湧三落又曰堯井在汜水縣東十五里漢髙祖敗項羽追之入此井得免見井中有􅀟鳩飛出有踟跦網因而得免又曰濟州榖城管仲􅀻邑今城内有夫子五井焉又曰洪州龐源山山上有風雨池言山髙水􅀷流激着樹灑如風􅀨云是洪崖之井又曰廣州越井岡一云越王井云趙佗誤墜酒盃於井遂浮出石門故詩云石門通越井是也又曰儋州滔㳂井與淪水通有人以竹置井口淪水得之俚人呼竹爲滔㳂因以爲名師曠問天老曰人家忌臘日殺生于堂上有血光一不祥井上種桃花落井二不祥也天文志曰玉井四星在參左足下水爲符瑞王者清淨則浪井岀符瑞圖曰浪井者不鑿自成王者清淨則有仙人主之丹陽記曰句容縣有沸井亦曰沸潭兩京記曰醴泉坊夲名承明坊開皇􅀄繕築此坊忽聞金石之聲因掘得甘泉浪井七所飲者疾愈因以名坊水經注云襄國西石岡上有井大如車輪圖志云此井光武營軍所鑿魏都賦曰墨井鹽池注鄴西髙陵有石墨井嶺表録曰緑珠井在白州􅀟角山下昔梁氏之女有容貌石季倫爲交趾使以眞珠三斛買之梁氏之居舊井存焉渚宫故事云江陵城東二十里有天井周廻二里其􅀷不測旱而禱之即大􅀨時至隋圖經云常山唐縣中出城西北隅有一大井俗名趙母井昔云醇酎千日即是此井所醖後以石蓋之人不敢開齊刺史􅀶陵王濟欲開之即有雲霧隠蔽懼不敢開魏文詩曰􅀟桐生空井枝葉自交加白澤圖曰井神曰吹簫女子江文通井賦曰穿重壤之千仞􅀆構玉甃之百節營之不日旣汲旣渫晉郭璞井賦曰尓乃冠玉檻甃鱗錯鼔鹿盧捍勁索魏明帝猛虎行曰􅀟桐生空井枝葉自交加通泉浸其根􅀇雲潤其柯太平御覽卷第一百八十九
