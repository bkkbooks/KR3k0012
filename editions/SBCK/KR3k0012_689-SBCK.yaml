body:
  text: 服章部六衣白虎通曰衣者隱也裳者鄣也所以隱形自鄣蔽也釋名曰衣者依也人所依以疪寒暑也爾雅曰衣裗音旒謂之䘽音霓衣䄛也齊人謂之褗或曰袿衣之飾也黼領謂之襮繡刺黼文以褗領也襮音博之縁謂之純衣縁飾也袕謂之褮衣開孔也孔袕音穴褮音褮衣皆謂之􅁭交領衱居業切謂之􅅂衣後􅅂也衿謂之袸辭見切衣小帶也佩衿謂之禐佩玉之帶上屬執衽謂之結持衣上祍扱衽謂之襭音襭扱衣上衽於帶衣蔽前謂之䄡今黻膝也婦人之禕謂之縭緌也即今之香纓也禕邪交絡帶繫於體因名爲禕緌繫也裳削幅謂之纀蒲木切削殺其幅深衣衣裳世夲曰胡曹作衣宗􅇆注曰黄帝臣也易曰黄帝堯舜垂衣裳而天下治盖取諸乾坤上衣下裳乾坤之象又曰訟卦上九或錫之鞶帶終朝三禠之象曰以訟受服亦不足敬也書曰予欲觀古人之象日月星辰山龍華蟲作㑹宗彞藻火粉米黼黻絺繡以五采彰施于五色作服汝明又􅀃命曰唯衣裳在笥禮曰夫爲人子者父母存衣冠不純素􅀌子當室衣冠不純采純縁又曰季康之母死陳褻衣褻衣非上服敬姜曰婦人不飾不敢見舅姑將有四方之賔來褻衣何爲陳於斯命撤之又曰孔子曰昔先王未有火化食草木之實鳥獸之􅁏飲其血茹其毛未有絲麻衣其羽皮後聖有作治其􅁝麻以爲布帛又曰朝玄端夕深衣􅀷衣三祛謂大夫士也祛尺二寸􅒌齊倍要祍當旁袂可以回肘長中繼揜尺祫二寸祛尺二寸縁廣寸半以帛裏布非禮也士不衣織無君者不貳采衣正色裳閒色非列采不入公門振絺􅗽不入公門振裘不入公門襲裘不入公門纊爲繭緼爲􅂁禪爲網帛爲褶又緇衣曰子曰長民者衣服不貳從容有常以齊其民則民德歸一左傳曰衮冕黻珽黻韋􅔖以敝膝也珽丑笏也帶裳幅舄帶革帶也衣下曰裳幅今之行􅂰者舃􅃨履衡紞紘綖衡持冠者紞冠之垂者紘纓從下而上者綖冠上覆昭其度也藻率鞞鞛藻率以韋爲之所以籍王鞞佩刀削上飾鞛下飾鞶厲游纓鞶紳帶也一名大帶厲大􅅁之垂者游旌旗之游纓在馬膺前昭其文也又曰狄人伐衛衛懿公與石祁子玦與寗莊子矢使守曰以此賛國擇利而爲之與夫人繡衣曰聽於二子取其文章順序又曰欒武子曰􅀂敖蚡冐篳路藍縷以啓山林若敖蚡冒皆楚之先君蓽路柴車一藍縷􅁦衣也又曰呉季札聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉詩曰碩人其頎衣錦褧衣褧單也尚以禪衣謂其文之大著又曰縞衣綦巾􅂓樂我貟又曰蜉蝣之羽衣裳楚楚蜉蝣之翼采采衣服蜉蝣掘閲麻衣如雪又曰靑青子衿悠悠我心青衿青領也學子之所服又曰山有樞隰有榆子有衣裳弗曵弗婁又曰緇衣美鄭武公也緇衣之冝兮敝予又改爲兮緇衣之好兮敝予又改造兮緇衣之蓆兮敝予又改作兮蓆大也又曰衣錦褧衣裳錦褧裳又豈曰無衣七兮不如子之衣安且􅁻兮豈曰無衣六兮不如子之衣安且燠兮又豈曰無衣與子同袍豈曰無衣與子同澤澤褻衣豈曰無衣與子同裳又曰君子至止黻衣繡裳又曰七月流火九月授衣一之日觱發二之日栗烈無衣無􅄄何以卒歳史記曰文帝衣弋綈所幸愼夫人令衣不得曵地漢書曰齊國有三服之官奉獻冠幘縱爲首服紈素爲冬服輕綃爲夏服又曰韓信旣平齊項羽使武渉􅀃信背漢歸楚信曰臣事項王官不過郎中位不過執㦸漢王予我上將軍印授我兵數萬解衣衣我推食食我夫人深親信我我背之不祥雖死不易幸爲信謝項王又曰武帝末郡國賊盗羣起􅁀勝之爲直指使者衣繡衣持斧捕之又曰朱􅀶爲琅瑘太守勑官屬多作衣褒大祒音紹祒袴也不中節度自令􅁺吏令去地三寸又曰帝賜南粵王他上禇五十衣中禇三十衣下禇二十衣以綿裝衣曰禇上中下者綿之多少厚薄差又曰江充􅀄召見犬臺宫自請願以所常􅀍服冠見上上許之充衣紗􅜄單衣曲􅅂後垂交輸如淳曰交輸割正幅使一頭狹􅃺若燕尾垂之兩旁見於後也冠禪纚歩揺冠飛翮之纓服䖍曰冠禪纚故行則摇以鳥羽作纓也步容貌甚壯帝望而異之謂左右曰燕趙固多竒士又曰雋不疑佩環玦襃衣􅀶帶盛服至門下謁􅁀勝之又曰王􅁻字子陽好車馬衣服自奉養極爲鮮明而遷徙所載不過囊衣天下服其廉而怪其奢丗傳子陽能作黄金後漢書曰更始時授官爵皆群小賈竪膳夫庖人多著繡而衣錦袴䄡䄖諸于罵詈道中時智者見之以爲服之不中身之災也漢書音義曰諸于大掖衣也如婦人之袿衣楊雄方言曰襜䄖其短者自􅀜之西謂之裗䘿郭璞注曰俗名䘿䘸據此即是諸子上加繡䘿如今之半臂也䘪音充䘿音屈又曰光武見來歙大歡即解衣以衣之又曰􅀕遵爲人廉約家無􅀻財常衣韋袴寢布􅀍夫人裳不加縁又曰􅀕彤在遼東幾三十年衣無兼副顯宗美其清約賜之衣􅀍什物無不悉備又曰耿恭自䟽勒廻衣屨穿决形容枯槁又曰東平憲王蒼侍肅宗饗衛士於南宫因從皇太后周行掖庭池閲隂太后舊時器服愴然動容乃命留五時衣各一襲五時衣謂春青夏朱季夏黄秋白冬黒也衣單􅃨其曰襲及常所御衣合五十篋餘悉分布諸王公主及子孫在京師者各有差特賜蒼及琅邪王京書曰間饗衛士於南宮因閲視舊時衣物惟王有孝友之德今送光烈皇后假髻帛各一及衣一篋可時奉瞻以慰凱風寒泉之思又欲令後生子孫得見先后衣服之製又曰明德馬后身長七尺二寸方口美髮能誦易好讀春秋常衣大練􅅂不加縁大練大帛也杜預注左傳曰大帛厚繒也朔望諸􅁎主朝請望見后􅂁衣踈麄反以爲綺􅜄就視乃􅀏后辭曰此繒特冝􅀷色故用之耳六宫莫不歎息謝承後漢書曰􅀽忠乗舡戴笠詣王㓪見㓪左右僮從皆著青絳采衣非其奢麗即辭疾發而退也又曰郭賀拜荆州刺史有殊政顯宗廵狩到南陽特見嗟嘆賜以三公之服黼黻冕旒勑行部去幨幃令百姓見其容服以彰有德魏志曰文帝詔曰三丗長者知􅀍服五丗長者知飲食此言􅀍服飲食難曉也又曰明帝徴管寧爲光禄勲辭不就詔問青州刺史程喜寧守節髙子審疾尫頓耶喜上言寧􅁪著皂帽布􅃭袴布裙時單􅃨出入閨庭能自柱杖不須扶持四時􅀕祀輙自力強改加衣服著絮巾故在遼東所有白布單衣親薦饋饌跪拜成禮魏略曰文昭甄后以漢光和五年十二月丁酉生毎寢寐家中髣髴見有人持玉衣覆其上者常共怪之魏氏春秋曰王允爲吏部郎中選郡守明帝疑其所用非次召入將加罪允妻阮出謂曰明主可以理奪難以情求允頷之而入帝怒詰之允對曰某郡太守雖限滿文書先至年限在後月限在前帝取事視之乃釋遣出望其衣敗曰清吏也呉書曰孫權毎賜周瑜衣寒暑皆白領諸將皆不及晉書曰石崇以奢豪矜物厠常有十餘婢列侍置香粉有客如厠皆易新衣而出客多羞脫故而王敦脫故著新意氣無怍婢相謂曰此必能作賊又曰髙士郭文字文舉河内軹人也洛陽䧟奔呉居大辟山􅁪著鹿裘􅁑巾餘杭令顧颺與􅁑洪造之颺使致韋衣不納使置室中乃爛於内竟不服用王隱晉書曰董威輦不知何許人忽見洛陽止宿白社於市得殘繒輙結以爲衣號曰百結衣宋書曰沈慶之領隊防東掖門劉湛􅀍収之夕上開門召慶之慶之戎服履韎縳袴入上見而驚曰卿何意乃爾急裝慶之曰夜半喚隊主不容換服又曰明帝體肥憎風夏月常著小皮衣又曰明帝疾召禇彦回入帝坐帳中流涕曰吾近危篤故召卿欲使著黄羅來可切耳指牀頭大凾曰文書皆凾得不復開彦回亦悲不自勝黄羅乳母服也又曰范曄性精微有思致觸􅀋多善衣裳器服莫不増損制度丗人皆法學之又曰江湛字微􅀷爲吏部尚書家甚貧不營財利餉饋盈門一無所受無兼衣餘食嘗爲上所召遇澣衣稱疾經日衣成然後起又曰謝超宗爲義興太守昇明二年公事免詣東府門自通其日風寒髙帝謂四座曰此客至使人不衣自暖矣齊書曰宋元嘉制諸主入齋閤得自服􅅂㡌見人主唯出太極西廟乃備朝衣車駕幸其第乃白服烏紗㡌以侍宴焉至於衣服制度動皆陳啓事無專制又曰髙帝即位後手詔賜張融衣曰見卿衣服麄故誠乃素懷有本交爾藍縷亦虧朝望今送一通故衣意謂雖故乃勝新也是吾所著巳令裁减稱卿之體并履一量又曰陶弘景永明十年脫朝服挂神武門上表辭禄詔許之又曰王思逺立身簡㓗諸客詣巳者覘知衣服垢穢不前形儀新楚乃與促膝雖然及去之後猶令二人交帚拂其坐處又曰王琨性儉約景和中討義陽王昶六軍誡嚴應湏紫服左右欲營辦琨曰元嘉􅀄征謝晦有紫服在匣不湏更製檢取果得焉梁書曰到漑性率儉不好聲色庭室單牀傍無􅁎侍冠履十年一易朝服或至穿􅀘又曰波斯國婚姻法一聘財訖女壻將數十人迎婦壻着金綖錦袴戴天冠婦亦如之又曰新羅呼其冠曰遺子禮􅃭曰尉解袴曰柯半靴曰洗百濟呼㡌曰冠􅃭曰􅃨衫袴曰禈又曰張􅌘音盛稷之子也稷􅀄爲剡令至嵊亭生之因名􅌘字四山少敦孝行年三十餘猶班衣受稷杖動至數百収淚歡然又曰胡緭胡貴切隨陳伯之入魏時元㑹緭戯爲詩曰㡌上着籠冠袴上着朱衣不知是今是不知非昔非又曰何敬容爲吏部尚書侍中領太子中庶子敬容身長八尺白晳美鬚眉性矜莊衣冠鮮麗武帝衣而左右衣必湏潔嘗有侍臣衣帶卷摺帝怒曰卿衣帶如繩欲何所縳敬容希旨故益鮮明常以膠清刷􅂡衣裳不整伏牀熨之或暑月背爲之燋又曰任昉有子東里西華南容北􅅱西華冬月著􅁑帔練裙事具交友部又曰任昉爲義興太守友人彭城到漑弟洽從昉共爲山澤遊及􅀍代登舟止有絹七疋米五石至都無衣鎭軍將軍沈約遺􅅂衫迎之後魏書曰樂浪王万壽孫忠明帝時位太常少卿孝武帝汎舟天泉池命宗室諸王陪宴忠愚而無智性好衣服着紅羅􅃭繡作領碧納袴錦爲縁帝謂曰朝廷衣冠應有常式何爲着百戯衣忠曰臣少來所愛情存綺羅歌衣儛服是臣所願帝曰人之無良乃至此乎又曰胡􅅱於髙允館見中書侍郞李璨􅀍服華靡􅅱貧老衣􅄄璨頗忽之􅅱謂曰老子今􅀂相脫體上袴褶衣㡌君欲作何許也譏其唯假盛服璨惕然失色又曰文宣囚元韶幽於京畿地牢絶食㗖衣䄂而死北齊書曰爾朱敞字乾羅彦伯之誅敞小隨母養於宫中年十二敞自竇走至大街見童兒群戲敞解所着綺羅金翠服易衣而遁追􅀐至不識敞便執綺衣兒比䆒問知非㑹日巳暮由是免陳書曰徐陵爲吏部尚書精簡人物搢紳之士皆嚮慕焉陳暄以玉㡌􅆪挿髻紅絲布裹頭􅂁拂踝靴至膝不陳爵里直上陵坐陵不知識命吏持下暄徐歩而出舉止自􅀂竟無怍容作書謗陵陵甚病之隋書曰齊後主於􅁐内作貧兒村親衣藍縷之服而行乞其間以爲􅀏樂多令人服烏衣以相執縳後主果爲周所敗􅀍虜困至以賣燭爲業唐書曰太宗詔冠冕制度巳備令文㝷常服飾未爲差等於是三品巳上服紫四品巳上服緋六品七品以緑八品九品以青婦人從夫之色仍通服黄又曰楊妃寵愛特甚宫中主貴妃刺繡者七百人楊益及諸戚里每歲進衣服布之於庭光奪人目又曰肅宗性節儉嘗出衣䄂示近臣曰此衣巳三浣矣又曰貞元六年德宗􅀄賜節度觀察使新製時服尚方織作呈閱所冝上曰頃來賜衣文綵不􅁪非制也朕今思之節度使以鵰銜綬帶取武毅以靖封内觀察使以鴈銜威儀委威儀委瑞草也取其行列有序牧人有威儀也又曰文宗朝淮南節度使李德􅁉奏比以婦人長􅅂大䄂朝廷制度尚未頒行微臣之分合副天心比聞閭閻之間䄂闊四尺今令闊一尺五寸裙曵四尺今曵五寸􅀄延安公主以衣服踰制駙馬竇澣得罪德􅁉因而奏之六韜曰武王伐紂蒙寶衣投火而死國語曰晉獻公使太子申生伐東山衣之偏裻音督之衣又魯語曰季文子相宣成無衣帛之妾無食粟之馬仲孫它諫曰仲孫它孟獻子之子子服也子爲上卿妾不衣帛馬不食粟人其以子爲愛且不華國乎愛􅈔也文子以告孟獻子獻子囚之七日囚子服也自是子服之妾衣不過七􅂛之布春秋後語曰田文謂其父靖郭君曰君下宫蹈綺縠之衣而士不得短􅄄又曰趙襄子旣滅智伯智伯之臣䂊讓變姓名入宮塗厠以刺襄子襄子覺而赦之後讓伏於橋下襄子至橋馬驚使視之復得讓襄子歎曰嗟乎䂊讓之爲智伯名旣成矣寡人赦子名亦足矣子自爲計寡人不釋子矣讓曰臣固伏誅願得君之衣而擊之於是襄子義之脫付身之衣以與之讓抜劒三躍呼而擊之曰吾可以下報智伯矣遂伏劒而死漢雜事曰髙祖時大謁者臣章受詔長樂宫令群臣議天子所衣服以安天下謁者趙堯舉春李舜舉夏倪湯舉秋貢禹舉冬四人各職一時制曰可舉者以各舉一時之事白之五服衣始於此董巴漢輿服志曰上古穴居衣毛未有制度後丗聖人易之以􅁝麻觀翬翟之文榮華之色乃染帛以効之始作五采成以爲服凢十二章莊子曰莊子衣大布之衣而過魏王魏王曰何先生之憊且温夏則絺綌清且涼所以適身體和肌膚也又曰晉文公好士之惡衣故文公之臣皆䍧羊之裳韋以爲帶吕氏春秋曰戎夷違齊如魯天大寒而後與門弟子一人宿於郭外寒逾急謂其弟子曰子與我衣我活我與子衣子活我國士也爲天子惜死子不肖也不足愛子與我衣弟子曰夫不肖之人安能與國士衣哉戎夷解衣與弟子夜半而死弟子遂活淮南子曰林􅀋榮啓期衣若懸蓑說􅁐曰齊林旣者衣葦朝景公公曰何忽服小人衣耶林旣曰衣狗裘者不必羊鳴今君衣狐裘音能不狐乎又曰魏文侯封太子擊於中山三年使不徃來舎人趙倉唐奉使文侯問子之君長大孰與寡人倉唐曰君賜之外府之衣則能勝之文侯遣倉唐賜太子衣一襲令倉唐雞鳴時至太子迎拜賜發篋衣盡顚倒太子趣具駕曰賜之衣非以爲寒也欲召擊知無誰與謀故遣子以衣詩曰東方未明顚倒衣裳顚之倒之自公召之事具奉使門鹽鐵論曰古者庶人老耋而後衣絲其餘則麻枲而已拾遺録曰宋景公之時懸四時衣春夏以珠玉爲飾秋冬以翡翠爲温又曰禮敬國其俗人年三百歳而織芳茅以爲衣盖尚書云島夷卉服之􅀋也又曰任未年十四好學觀書有合意䖏則題其衣裳及掌裏以記其事門徒恱其勤學更以靜衣易之又曰太始元年魏帝以陳留王之歳有頻斯國人來朝以五色玉爲衣如今之鎧又曰天漢三渠捜國之西有折淪國其俗淳和人壽三百歳有大木一樹千㝷􅀂經此木下皆不死不病或有泛海繩山來㑹其國綴草毛爲繩網其衣如今之羅紈也至元狩六年獻網衣一襲帝焚於九逵之道恐後人徴求此物故燒之煙如金石之氣又曰貟嶠山南有池移國人長三尺壽萬歳茅爲衣衣服皆長􅅂大䄂因風以昇烟霞若鳥用羽毛也鍾㑹母傳曰夫人㓜少衣不過青紺世說曰齊王冏爲大司馬輔政嵇紹爲侍中詣冏諮事冏召􅁑旟董艾等共論時冝旟等白冏曰嵇侍中善於􅁝竹公可能操之遂進樂器紹推却不受冏曰今共爲歡何爲却耶紹曰公恊輔皇室令作事可法紹雖職卑忝備常伯豈可以先王之服爲伶人之業今逼髙命不敢有辭當釋冠冕襲􅀻服此紹之心旟等不自得而退又曰桓車􅀐不好着新衣浴訖婦故送新衣車􅀐大怒催使將去婦便持還冲妻王恬女也傳語云衣不經新何由而故桓大􅀏而著之又阮宣子論􅀑神有無或以人死有􅀑阮子獨以爲無曰今見者云著生時衣服若人死有􅀑衣服亦有􅀑乎孝子傳曰老萊子年七十父母猶在萊子常服班襴衣爲嬰兒戲曹肇傳曰明帝寵愛肇與帝戲賭衣物有所獲輙入御帳服之遥出親狎如此襄陽􅂄舊記曰王昌字公伯爲東平相散􅀐常侍早卒婦是任城王曹子大女昌弟式字公儀爲渡遼將軍長史婦是尚書令桓階女昌母聦明有典教二婦入門皆令變服下車不得踰侈後階子嘉尚魏主欲金縷衣見式婦嘉止之曰其嫗嚴固不聽善耳不湏持徃犯人家法列仙傳曰道士徐延年平陽人也見人持新黄羅衣云延年五百夜半夜明如晝從五億萬人登仙也古艶歌曰焭焭白兎東走西顧衣不如新人不如故離騷屈原曰新沐者必彈冠新浴者必振衣太平御覽卷第六百八十九
