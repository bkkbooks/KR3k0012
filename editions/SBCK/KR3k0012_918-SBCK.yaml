body:
  text: 羽族部五雞春秋運斗樞曰玉衡星散爲雞周禮春官上大宗伯曰工啇執雞郭􅀇曰取其守時而動也禮記曲禮下曰􅀕宗廟之雞曰翰音又月令曰季冬之月雉雊雞乳又内則曰子事父母雞􅀄鳴咸盥漱左傳宣下曰楚子爲乗廣三十乗分爲左右廣雞鳴而駕日中而􅀃又成下曰晉與楚旦而戰見星未已子反命軍吏察夷傷􅀘卒乗繕甲兵展車馬雞鳴而食唯命是聽又襄二荀偃令曰雞鳴而駕塞井夷竈唯余馬首是瞻又襄三齊莊公朝指殖綽郭最曰是寡人之雄也州綽曰君以爲雄誰敢不雄然臣不敏平隂之役先二子鳴晉伐齊及平隂州綽獲殖綽折郭最故自比於難闘勝而先鳴又襄五曰公膳日􅀟雞又昭五曰賔孟適郊見雄雞自斷其尾問之侍者曰自憚其犧也又昭六曰季郈之雞闘季平子郈昭伯二家相近故闘雞季氏芥其雞以芥子播其羽郈氏爲之金距平子怒毛詩曰女曰雞鳴刺不􅀃德也陳古義以刺今不􅀃德而好色也女曰雞鳴士曰昧旦子興視夜明星有爛又曰君子于役不知其期􅂚其至哉雞捿于塒日之夕矣又緇衣曰風􅀨思君子也亂丗則思君子不改其度風􅀨凄凄雞鳴喈喈旣見君子云胡不夷風􅀨蕭蕭雞鳴膠膠旣見君子云何不瘳風􅀨如晦雞鳴不巳旣見君子云胡不喜又雞鳴思賢妃也雞旣鳴矣朝旣盈矣匪雞則鳴蒼蠅之聲尚書牧誓曰古人有言曰牝雞無晨牝雞之晨惟家之索論語曰子路遇丈人以杖荷蓧止子路􅀫殺雞爲􅁰而食之又曰子之武城聞􅃶歌之聲夫子莞爾而􅀏曰割雞焉用牛刀爾雅曰雞大者蜀蜀子稚未成雞曰僆絶有力奮雞三尺爲鶤棲於杙爲桀鑿垣而棲爲塒郭璞注曰蜀雞也稚鶵子各也今江東呼雞少者爲健古之雞春秋􅀃解辭曰雞爲積陽南方之象火陽精物炎上故陽出雞鳴以􅀋感也雞之爲言佳也隹而起爲人期莫寳也善爲人制晏早之期春秋考異郵曰雞應旦鳴詩記曆樞曰􅀱及東次氣發雞泄三號氷始冸卒于丑以成歳及東及於寅也承丑之季故謂之次氣也雞爲畜陽也丑之季向晨鳴雞得其氣感之而喜故鳴也周書曰大寒之日雞始乳易通卦驗曰萬民聞雞鳴皆翹首結帶正衣裳史記曰子路性鄙好勇力冠雄雞佩假豚陵􅁀孔子孔子乃設禮義稍誘之子路乃委質請爲弟子又曰孟甞君至􅀜􅀜法雞鳴出客孟甞君客之居下坐者有能爲雞鳴遂發傳岀又曰越巫立越祀而以雞卜上信之漢書曰徴昌邑王賀到濟陽求長鳴雞又曰昌邑王之立爲皇太子私置雞豚以食又曰龔遂爲渤海太守使人家養五雞又曰王奉先好闘雞宣帝微時數與奉先㑹後即位以其女爲婕妤立爲皇后奉先封侯又曰方士曰益州有金馬碧雞之寳可祭祀致也宣帝使王褒徃祀焉范曄後漢書曰河南樂羊子妻不知何氏女嘗有他舎雞謬入垣内姑盗殺食之妻對不食而泣怪問之妻曰自傷居貧使食他肉姑竟棄之後漢書曰范式字巨卿與汝南張元伯爲友二人春到京以暮秋爲期元伯以九月十五日殺雞炊􅁰以待巨卿母謂元伯曰相去千里汝何信之審也言末畢而巨卿至相隨升堂再拜母極恱九州春秋曰魏王入漢中討劉備不得進欲守復難意欲弃之乃發令云雞肋官属不知主簿楊脩曰夫雞肋弃之則可惜噉之無所得以比之漢中王欲去也白戒嚴王遂還吴録曰魏文帝遣使於吴求長鳴短鳴雞群臣以非禮欲不與孫權勑付使江表傳曰南郡獻長鳴承露雞南越志曰雞冠四間如蓮花鳴清聲澈也魏志曰馬韓國出細尾雞其尾皆五尺餘郭頒魏晉丗語曰劉放孫資共典樞要夏侯獻曹肇心内不平殿中有雞棲樹二人相謂此亦乆矣其能復幾指謂中書􅁥劉放中書令孫資王隱晉書曰郄詵母病􅀂車及亡不欲車葬而貧無以得馬乃養雞種蒜竭其方術喪過三年得馬八匹舉棺至冢晉書曰祖逖與劉琨俱爲司州主簿情好綢繆共􅀍同寢中夜聞雞鳴蹴琨􅁴曰此非惡聲因起舞又曰桓􅀇旣􅀍殺安帝反正其餘擁衆假号皆平桓氏遂滅元興中衡陽有雌鷄化爲雄八十日而冠萎及􅀇建國於楚衡陽属焉自篡至敗凡八旬矣晉中興書曰殷浩北伐江逌爲長史及丁零反叛浩令逌伐之乃取數百雞以長繩連之脚皆繫火一時駈放群雞駭散飛過壍集羌營皆燃因其驚亂縱兵擊之晉書􅁃征西翼書少時與右軍齊名右軍後進􅁃猶不分在荆州與都下人書云小兒輩賤家雞愛野雉皆學逸少書須吾下當比之又載記曰符朗善知味㑹稽王道子殺雞以食之旣進朗曰此雞栖􅁪半露檢之驗焉晉書武帝甞幸琅邪城宮人常從早發至湖北埭雞始鳴今呼爲雞鳴埭南史曰齊鬱林王好闘雞密買雞至數千價又曰􅀓琰字季珪爲山隂令二野父争雞琰問雞何食一云粟一云豆琰使破雞得粟罪言豆者魏收後魏書曰崔光字長仁東清河鄃人也正始元年夏有典事史元顯獻四足四翼雞詔散􅀐侍郎趙邕以問光光表曰翅足衆多亦羣下相扇動之象離而未足大脚弱差小亦其􅀔尚微易制御也武帝覽之恱後數日而茹晧等並以罪失伏法於是禮光逾重又曰傅乾受􅄝雞肉葵菜食􅀓靈越乃爲作之下以毒藥乾愛飯還而卒北史曰宋丗良爲清河太守發姦擿伏有􅀂神明甞有一吏休滿還郡食人雞豚又有一幹受人一帽又食二雞丗良叱而語之吏幹叩頭伏罪於是上下震悚莫敢犯禁又曰齊彭城王浟爲滄州刺史有隰沃縣主簿張逹甞詣州夜投人舎食雞羮浟察知之守令畢集浟對衆曰食雞羮何不償價直也逹即伏罪合境号爲神明三國典略曰齊長廣王湛即皇帝位於南宮大赦改元其日將赦庫令於殿門外建金雞宋孝王不識其義問於光禄大夫司馬膺之赦建金雞其義何也膺之曰案海中星占曰天雞星動當有赦由是帝王以雞爲􅀱唐書曰劉武周父匡徙家馬邑匡甞與其妻趙氏夜坐庭中忽見一物􅃺如雄雞流光燭地飛入趙懷振衣無所見因而娠遂生武周爲人驍勇善􅀐射莊子曰莊子謂惠子曰年溝之雞司馬彪注曰年溝闘鷄處三歳爲秣秣魁帥也相者視之則非良雞也然而數以勝人者以狸膏塗其頭也雞畏狸故又曰越雞不能伏鵠夘魯雞固能矣司馬彪曰越雞小雞也魯雞大雞今蜀雞也列子曰紀渻子爲周宣王養闘雞十日而問雞可闘乎曰未也方虚驕而恃氣十日又問之曰未也猶疾視而盛氣十日又問之曰幾矣雞雖有鳴者巳無變望之似木雞矣其德全矣異雞無敢應者燕丹子曰燕太子丹質於秦逃歸到關丹爲雞鳴遂得逃歸尸子曰戰如闘雞勝者先鳴韓子曰使雞司夜令狸執䑕皆用其能淮南子曰雄雞夜啼庫兵動而戎馬驚淮南萬畢術曰􅀌桃之象令雞夜鳴取􅀌桃南北行枝長三尺折以爲象塗以三歳雄血夜居拪下戰國䇿曰秦惠王謂寒泉子曰􅂫秦欺􅁦邑欲以一人智反覆山東之君夫諸使之不可一猶連雞之不能俱止於栖也吕氏春秋曰善學者􅀂齊王之食雞也食其距數千而後足又曰白圭謂魏王曰市丘之鼎以烹雞多洎之則淡而不可食市丘魏邑肉汁曰洎少洎之則焦而不熟然而視之蝺焉羮無所可用蠕者齲韓詩外傳曰田饒爲魯哀公曰夫雞平頭戴冠者文也足傅距者武也敵在前敢闘者勇也見食相告者仁也守夜不失時者信也雖有五德猶日瀹而食之者何也以其所從來近也神異經曰東方有人長七丈頭戴雞朝吞惡􅀑三千暮吞三百名黄父又名食邪以􅀑爲飯以霧爲漿也西京雜記曰成帝時交阯越嶲獻長鳴雞即下漏驗之晷刻無差長鳴雞一鳴一食時不絶長距善闘崔豹古今注曰雞一名燭夜列仙傳曰祝雞翁者雒陽人也居尸郷北山下養雞皆有名字千餘頭暮栖樹晝放散食欲取呼名即至販雞及子得千萬錢輙置錢去論衡曰傳書言淮南王得道畜皆仙犬吠天上雞鳴雲中陳子要言弃晨雞犬俟鳯警亦猶弃當丗之實才湏故人之執政也太元經曰雌雞鳴晨雄雞宛頸隋侯墮井河伯除川風俗通曰呼雞朱朱俗􅀃雞本朱公化而爲之今呼雞者朱朱也謹桉􅀃文解喌喌二口爲讙州其聲也讀􅀂祝祝者誘致禽畜和順之意喌與朱音相似耳又曰臘除夕以雄雞着門上以和隂陽按今人卒病皆殺雄雞傅其心病風者雞散治之東門雞頭治蠱信善也異苑曰朱文繡與羅子鍾爲友俱仕於梁繡旣死羅鍾􅂘之其夜俱亡梁南七里有雞山葬繡於其中北九里有雉澗埋鍾於其内繡神靈變爲雞鍾魂魄化爲雉清鳴哀響來往不絶故詩曰雞山別飛響雉澗和清音荀恱申鑒曰覩孺子之駈雞而見御民之術孺子之駈雞急則驚緩則滯馴而安之然入門􅄞康宅無􅁻凶論曰天同栖之雞一攔之羊賔至而有死者豈異之哉幽明録曰晉兖州刺史沛國宋處宗甞買得一長鳴雞愛養甚至栖籠着䆫間雞遂作人語與宗談語極有言致終日不輟處宗因此言功大進越絶書曰雞山勾踐以畜雞將伐吴以食死士也吴越春秋曰婁門外雞陂墟者吴王牧雞處西河記曰涼州罪人於市將刑忽有一白雄雞飛於人邊請命引頸長鳴伏地向吏駈之去輒來刺史張義免其坐王子年拾遺記曰太􅀄二年月氏貢􅀟頭雞四足一尾鳴則俱鳴又曰含塗國去王都七萬里人善服鳥獸雞犬皆使能言郭子撗洞􅄀記曰有逺飛雞夕則還依人曉則絶飛四海外朝往夕還裴􅀇新言曰正朝縣官殺羊懸其頭於門又磔雞以副之俗􅀃以厭厲或以問河南任君任君曰是月土氣上升草木萌動羊齧百草雞啄五榖故殺之以􅂇生氣崔寔四民月令曰十二月東門磔白雞頭可以合藥本草經曰丹雞一名載丹又曰烏雄雞主􅀘中其血治踒折骨凡雞肉不食小兒令生蚘蟲又令消髓葛洪方曰五月七日深井深冢多有毒氣不可入也冝先以雞毛試投井中直下無毒毛廽四邊不可入也師曠占曰長吏乗車出入行歩道上有雞飛集車上者雄遷雌去雜五行書曰欲求婦取雄雞兩毛燒著酒中飲之所求必得用戊子日此是天地合日必得三往不得女當死龍魚河圖曰􅀇雞白頭食病人雞有六指亦殺人雞有五色殺人焦贑易林旅之爻曰十雉百鶵常與母俱抱雞捕虎誰者爲怙又歸妹之無妄曰雞方啄粟爲狐所逐走不得息惶懼喘息又歸妹之損曰争雞失羊亡其金囊利得不長又巽之遯曰三雞啄粟十鶵從養飢鵝卒擊亡其兩寂廣志曰雞有胡溝五指金骹及翹之種大者蜀小者荆白雞金體者美舊并州所獻吴中送長鳴雞長倍於常雞永昌郡無雞異物記曰伺潮雞潮水上則鳴􅀶物志神農本草經曰雞􅆑可以作虎魄法取茯苓雞㱭􅆑黄白渾雜者熟煑之及尚軟隨意刻作物形以苦酒漬數􅀫旣堅内着粉中假者乃亂真此丗所􅁪用作無不成也于寳搜神記曰安陽城南有亭􅀫者輒死書生明術數入亭􅀫端坐誦書夜半有人着皁衣來户外呼亭主此有􅀫客耶應曰然喑嗟而去湏􅁷有赤衣問如前生問曰向黑衣者誰荅曰北舎母猪赤幘者誰荅曰西舎老雄雞也汝是誰荅曰我是老蝎也明旦掘之得蝎大如琵琶身長四尺并及猪雞亭遂安静劉欣期交州記曰長鳴雞岀日南南州異物志曰狼盲之雞特禀異聲狼盲地名白澤圖曰老雞能呼人姓名殺之則止又曰雞有四距重翼者龍也殺之震死夢書曰雞爲武吏有冠距也夢見雄雞憂武吏也衆雞入門吏所捕也群闘舎中驚兵怖也論墓書曰養白雞令識其主聲形以五月五日九月九日任意用五色綵長五寸係雞頸將雞於名山放雞著山仰頭呪曰必存鳴晨雞心開悟沈懷逺南越志曰雞冠四開如蓮花鳴聲清徹也荆楚歳時記曰正月一日三元之日雞鳴而起先於庭中爆竹帖􅀞雞或斵鏤五彩及雞於户上風土記曰乃有雞子五薫練形正旦皆㑹生吞雞子一个謂之練形又晨噉五辛以助五藏氣吴録曰合浦朱虚縣有山雞黒色樹栖魏志曰平原太守劉邠印囊及山雞毛着器中使管輅筮輅曰内方外圎五色成文含寳寸信出則有章此即囊也髙岳巖巖有鳥朱身羽翼􅀇黄鳴不失晨此山雞毛也異苑曰山雞愛其毛羽映水則儛魏武時南方獻之帝欲其鳴舞而無由公子蒼舒令人取大鏡著其前雞鑑形而儛不知止遂至死韋仲將爲之賦甚美􅀶物志曰山雞有美毛自愛其毛終日映水目眩則溺臨海異物志曰山雞狀如人家雞安陽諸山中多此雞恃距好􅃲當時以家雞置其處取即可得南越志曰曽城縣多鵔䴊鵔䴊山雞也利距善闘丗以家雞闘之可禽也光色鮮明五采􅋑燿辛氏三秦記曰陳倉山在太白之西去長安八百里上有石雞與山雞各別趙髙使燒山山雞飛去石雞不去晨鳴山頭聲聞三十里或云是玉雞陳倉城上有神雞人取不得雄者王雌者覇穆公得雌故覇山海經曰鷩雉一名山雞養之穰火左思吴都賦曰山雞歸飛而來栖顧愷湘中賦曰陽鸞山雞陸機與弟書曰天淵池養山雞甚可嬉周書曰成王時蜀人獻文翰者􅀂皇雞鳥有文采者皇雞似鳬兾州謂之澤時爾雅曰翰天雞也郭璞曰翰雞赤羽見周書􅀃文曰翰天雞也一名晨風􅀇中記曰東南有桃都山上有大樹名曰桃都枝相去三千里上有天雞日􅀄出照此木天雞即鳴天下雞皆隨之鳴臨海異物志曰杉雞黃冠青綏常在杉樹下頭上有長黃毛頭及頰正青如垂緌南越志曰新夷縣鳥多杉雞尹子曰楊州之雞祼無毛南越志曰髙興縣多容雞如家雞五采至則年穰孫綽望海賦曰石雞清響以應潮慧軀輕近以逺㓗石雞形似家雞而􅁅色在海中山上毎潮水將至輙鳴相應若家雞司晨也啇人欲知水道往來以至此爲􅀱也周景式廬山記曰白水南行十餘里有雞山傍有大山竦立上有石雞冠距如生道士李鎮於此下住常寳玩之雞一旦忽摧毀鎮告人曰雞卒如此吾其終乎因與親知訣別後月餘果卒似知命云太平御覽卷第九百一十八
