front:
  text: 太平御覽卷第八百四十一百榖部五
  hash: sha256:8cf678e326abea78350487ef6b4bb4ad22c1fb3637a0056bf2610ce2342a6d4d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_841-1a}
body:
  text: 豆麻豆焦贑易林漸之乹曰旦種菽豆暮成藿葉心之所願志快意惬毛詩豳雅曰七月烹葵及菽又魚藻采菽曰采菽采菽筐之筥之又后稷曰蓺之荏菽荏菽斾斾左傳成公曰晉周子有兄而無惠不能辯菽麥春秋佐助期曰豆神名靈殖姓樂春秋􅀃題辭曰菽者属也春生秋熟理通體屬也菽赤黒隂生陽大體應節小變赤象陽色也宋均注曰隂陽而春夏也大體謂多黒也小變謂時之然也孝經援神契曰赤土冝菽爾雅曰戎菽謂之荏菽郭璞注曰孫叔然以為大豆按春秋齊侯獻戎捷榖傳曰戎菽也管子亦云北戎山戎岀冬葱及戒菽布之天下今之胡豆是也龍魚河圗曰歳暮夕四更取二十豆子二十七麻子家人頭髮少合麻豆著井中呪勑井吏其家竟年不遭傷寒辟五温􅀑史記曰張儀􅀃韓王曰韓地險􅁖山居五榖所生非菽而麥民之食大抵飯菽藿羹一歳不収民不饜糟糠又曰棄爲兒時好種樹麻菽麻菽美東觀漢記曰閔仲叔太原人也與周黨相友黨毎過仲叔共唅菽飲水無菜茹又曰赤眉平後百姓飢餓人相食黄金一斤易豆五升又曰光武二年㓂恂爲潁川郡大生旅豆収得一萬餘斛以應給諸營又曰鄧禹攻赤眉陽敗弃輜重走車皆載土以豆覆其上兵士飢争取之又曰劉平甞爲餓賊所得平叩頭曰老母飢少氣待平爲命願得還飯母馳來就死賊即遣去母己食平曰向與賊期義不可欺乃復徃賊驚怪其信義曰不忍食汝平旣免脫乃摭莢得三􅂛豆以謝賊恩又曰倪萌字子明齊國臨淄人兄爲赤眉賊所得賊欲殺啖之萌詣賊叩頭言兄年老羸瘠不肥徤願代兄賊義而不啖命歸求豆來贖兄萌歸不能得豆復自􅅞詣賊賊遂放之後漢書曰丗祖自薊東南至饒陽蕪蔞亭馮異獻豆粥一又曰馮異破延岑時百姓飢餓人相食黄金一斤易豆五斗道路斷隔委輸不至軍士悉以果實爲粮又曰獻帝在長安榖貴豆一斛二十餘萬又曰汝南有舊鴻郄陂成帝時丞相翟方進毀之時人歌曰敗我陂者翟子威飴我大豆烹我芋魁方進宇子威芋魁芋根也漢名臣奏曰丞相薛宣曰陛下八月酎祠嘉美上昇皇天報應茂陵寢廟上食日􅀇鳥來至集吐所含大豆紫黒色食物之象也蜀志曰彭羕與諸葛亮書先民有言左手據天下之圖右手刎咽喉愚夫不爲况僕頗別菽魏志曰華佗還家太祖累書呼佗佗恃能饜事猶不上道託妻疾太祖大怒使徃視􅀂妻信疾賜小豆四十斛吴志曰孫權北征使陸遜與諸葛瑾攻襄陽陸遜遣親人韓扁賫表報遇敵於江中羅得扁瑾聞之甚懼書與遜云大駕以旋賊得韓扁具知吾闊狹且當急去遜未荅方催人種豆與諸將弈棊射戲如常又曰趙逹善笇使人取小豆數􅂛播之席上立處其數驗覆果信計飛蝗射隱伏無不中王隱晉書曰時王浚稱制邊陲潜使人問霍原原不荅浚旣衘之又有遼東内徒三百餘人依山爲賊意欲刼原爲主亦未能行時有謡曰天子在何許近在豆田中浚以爲豆者霍也浚遂害原懸其首諸生悲哭其中宋書曰廢帝子業景和􅀄人種紫花草及豆皆化爲白花俄而帝見廢之應南史曰傳琰爲山隂令有二野父争雞琰各問雞所食一人云粟一人云豆乃破得粟罪言豆者縣内稱神明北齊書曰庫狄伏連之家口百數盛夏之日料以倉米二􅂛不給塩菜常有飢色冬至之日親表稱賀其妻爲設豆餅伏連問此豆何因而得妻對向於食馬豆中分减充用伏連大怒典馬掌食之人並加杖罰唐書曰裴諝爲河東道租庸等使時大旱諝請入計代宗召見問搉酤之利一歳幾何諝乆之不對帝復問之對曰臣有所思帝曰何思對曰臣自河東來其間三百里見農夫愁歎榖菽未種誠爲陛下憂之而乃責臣以利故臣未敢即對又曰貞元中李元諒爲隴右節度使開部下荒田數十里勸軍士樹藝歳収菽粟數十萬斛山海經曰廣都之野爰有膏菽菽豆也管子曰桓公伐山戎得戎菽以布天下鶡冠子曰兩葉蔽目不見太山兩豆塞耳不聞雷霆孟子曰易其田疇薄其賦稅民可使冨也民非水火不生聖人治天下使菽粟如水火淮南子曰河水中調而冝菽又曰孟夏仲夏天子衣紫衣乗赤騮赤馬黒髦也食菽與雞􅀃菀曰齊景公嘗賞賜及後宫文繡􅀍臺榭菽粟食鳬鴈出而見殣謂晏子曰此何爲死晏子曰此餒而死公曰嘻寡人之無德也何甚矣對曰君之德著而彰何爲無德也景公曰何爲也對曰君之德及後宫與臺榭君之玩物衣以文繡君之鳬鴈食以菽粟君之營内自樂延及後宫之族何謂其仁徳也頃臣願有請於君之意自樂之心推而與百姓同之則何殣之有君不推此而苟營内好私使財貨偏有所聚菽粟幣帛腐於囷府惠不遍加于百姓公心不周乎萬國則桀紂之所以亡也夫士民之所以叛由偏之也君如察臣嬰之言推君之盛徳公布之於天下則湯武可爲也一殣何足恤哉吕氏春秋曰得時之菽長莖而短足其莢二七以爲族多枝數節競葉嗇實二七十四實也大菽則圎小菽則􅅮以芳稱之重食之息以香如此者不蟲先時者必長以蔓浮葉䟽節小美不實後時者短莖䟽節夲虚不實丗􅀃曰魏文帝使東阿王七歩作詩不成當行大法王應聲曰箕在釡下燃豆在釡中泣夲自同根生相煎何乃急又曰石崇爲客作豆粥咄嗟便辦恒冬天得韮以萍菹汜勝之書曰大豆保􅀊易爲冝古所以備凶年也種大豆率人五畒大豆忌申夘三月榆莢時雨髙田可種大豆夏至後二十日尚可種小豆不保歳難得宜椹黒時種畒五􅂛豆生布葉鋤之生五六葉又鋤之治養美田􅅿可得十石一斗大豆有萬千粒又曰夏至二十日可種豆帶甲而生不用深耕豆花憎見曰則黄爛而根焦矣知歳所冝以囊盛種平量理隂地冬至後五十日以發取量之最多者種焉􅀃文曰小豆菽也箕豆莖也藿菽之小也物理論曰菽者衆豆之揔名嵇康養生論曰豆令人重榆令人􅉂􅄂五行書曰常以正月旦亦用月半以麻子七枚赤豆二七枚著井中辟温病甚神効與龍魚河圗語卜異故重出又曰正月七日男吞赤豆七枚女吞十四枚竟年無病益部􅂄舊傳曰朱倉字卿雲之蜀從處士張寧受春秋糴小豆十斛屑之爲粮閉户精誦寧矜之歛得米二十石倉不受一粒陳留􅂄舊傳曰小黄恒牧爲都尉功曹與郎君共歸郷里爲赤眉所得欲殺啖之牧求先死賊義釋之送營豆一斛又曰八月雨爲豆花雨廣雅曰大豆菽也小豆荅都合切也豍丘迷切豆豌豆留豆也胡豆䜶爻尨􅀟音切豆􅀟也豆角謂之莢其葉謂之藿也巴菽巴豆也廣雅曰重小豆一歳三熟味甘白豆麤大可食刺豆亦可食梪豆苗似小豆紫華可爲􅋗生朱提建寧胡豆有青有黄者鄴中記曰石虎諱胡胡物皆改名胡豆曰國豆古今注曰宣帝元康四年南陽雨豆光武建武三年春縑一疋易一斗豆夏野生旅豆民収取之明帝永平十八年下邳雨大豆似槐實王子年拾遺記曰東極之東有湏離豆見日即傾葉食者歷歳不飢豆莖皆大􅀂指而縁一莖爛澷數畒􅀶物志曰左元放度荒年法擇大豆麤細調均種之必生者熟挼令有光使煖氣徹豆心先一日不食以冷水頓服三􅂛服訖其魚􅁏菜果酒醬鹹酢甘苦之物一不得復經口渴則飲水愼不可煖飲􅀄小困極數十日後體力更壯徤不復思食大較法服三􅂛爲劑亦當隨人先食多少増損之歳豊欲還食者煑葵子及脂􅂫肥􅁏羮漸漸飲之湏豆下乃可食豆未下盡而食實物膓塞則殺人此未試於理或可尔又曰人食豆三斗則身重行止動難恒食小豆令人肌燥麤理夲草經曰大豆黃卷味甘平生平澤治濕痺䈥挛􅂰痛生大豆張騫使外國得胡麻豆或曰戎菽塗癕腫煑汁飲之殺􅀑毒止痛赤小豆下水排癕腫血生太山吴氏夲草曰大豆黃卷神農黄帝雷公無毒採無時去面䵟得前胡烏喙杏子牡厲天雄䑕屎共􅁡和佳不欲海藻龍膽此法大豆􅀄岀􅁟黄牙是也生大豆神農歧伯生熟寒九月採殺烏頭毒並不用􅀇參赤小豆神農黃帝醎雷公甘九月採小豆花一名應累一名付月神農甘無毒七月採隂乾四十日治頭痛止渴魏王花木志曰交州記木豆岀徐僮間子美似烏頭大葉似栁一年種數年采唐明皇􅄂録曰盧懷慎清身素不營産業常器重宋璟及盧從愿見之甚喜留連永日命設食有蒸豆兩甌菜數爼而已此外脩然無辨孔融教髙宻令曰志士鄧子然告困焉得愛釡􅁃之間以傷烈士之心今與豆三斛後乏復言曺子建鷂雀賦曰言雀者但食牛矢中豆馬矢中粟葛龔薦戴昱曰兄弟同居二十餘年及爲宗老所分昱持妻子逃舊業入虞澤裙穫野豆以自賑給麻毛詩􅁰離丘中有麻曰丘中有麻彼留子嗟禮記月令曰仲秋之月天子乃以犬甞麻先薦寢廟鄭􅀇注曰麻新黂爾雅曰黂枲實孫炎注曰黂麻子音汾吕氏春秋曰得時之麻必以長䟽節而危陽小本而莖堅厚枲以均後熟多榮日夜分復生如此者不蝗蝗虫不食麻節也東觀漢記曰周黨遺閔仲叔生麻叔歎曰我欲省煩耳受而不食齊書曰宣帝陳皇后生髙帝髙帝年二歳乳人乏乳后夢人以兩甌麻粥與之􅁴而乳驚因此豊足淮南子曰三秋之月天子衣白衣乗白輅食麻與大又曰汾水濛濁而冝麻王子年拾遺記曰有飛明麻葉黒實如玉風吹之如塵亦名明塵麻又曰東極之東有紫麻粒如粟色紫迮爲油則汁如清水食之目視􅀑魅又有倒葉麻葉如倒巨色紅紫亦名紅冰麻言水麻乃有實食之顔色白㓗塩鐡論曰大夫李斯與鮑丘子俱事孫卿鮑丘飯麻蓬藜脩道白屋之下李斯爲秦丞相終致五刑本草經曰麻子味甘無毒主􅀘中益氣令人肥徤養生要集曰麻子味甘無毒主􅀘中益氣服之令人肥徤麻子一名蕡一名麻㪍太平御覽卷第八百四十一
