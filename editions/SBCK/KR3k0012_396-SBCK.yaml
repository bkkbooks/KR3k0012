front:
  text: 太平御覽卷第三百九十六
  hash: sha256:6cdd9b1272f3aa612c44027f24299c1692db213f79f0aa4ab92a563a0ab0db83
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_396-1a}
body:
  text: 人事部三十七溺相似偶像溺大戴禮曰武王踐祚曰盥盤之銘與其溺於水寜溺於人不可救禮記檀弓上曰死而不吊者三謂輕身志孝畏人或時以非罪攻巳不有以􅀃之死之者孔子畏於臣是也壓行止危險之下溺不乗橋舡又緇衣曰子曰小人溺於水君子溺於口大人溺於人皆在其所䙝也夫水近於人而溺人德易狎而難親也易以溺人左傳哀下曰越圍吴晉趙孟使楚隆問吴王王曰勾踐將生憂寡人寡人死之不得矣王曰溺人必􅀏吾將有問也史黯何以得爲君子對曰黯也進不見惡退無謗言王曰冝哉東觀漢記曰鄧訓字平叔永平中治滹沲石曰河從都盧至羊腸倉欲令通漕太原吏民苦轉運所經三百八十九隘前後没溺死者不可勝筭建􅀄三年拜訓謁者使􅁥領其事更用驢輦歳省億萬計活徒士數千人後漢書曰廉范西迎父䘮至葭萌載舩觸石破没范抱持棺柩遂俱沉溺衆傷其義鉤求得之僅免於死魏志曰管輅族兄孝國居在斥丘輅徃從之與二客㑹客去後輅謂國曰此二人天庭及口耳之間同有凶氣累變俱起􅀟宅流魄于海骨歸于家少許時並當死也復數十日二人飲酒醉夜共載牛渴下道入漳河中皆即溺死也又曰帝幸許昌杜畿居守受詔作御樓舡於陶河試舡遇風没帝爲之流涕詔曰昔􅄀勤其官而水死稷勤百榖而山死故尚書僕射杜畿於孟津試舩遂至覆没忠之至也朕甚􅉖焉追贈太僕謚曰戴侯吴録曰孫䇿討黄祖表曰臣討黄祖斬首二萬餘級其赴水溺死二萬餘口舩六十餘艘財物山積唐書曰封德彛隋開皇末江南作亂内史令楊素徃征之署爲行軍記室泊舩海曲素夜召之德彛墜於水中人救免溺乃易衣以見竟􅃦不言素後知問其故荅曰私事也所以不白素甚嗟異之莊子曰至德者火弗能熱水弗能溺寒暑弗能害禽獸弗能賊孟子曰淳于髠曰嫂溺則援之以手乎孟子曰嫂溺不援是犲狼也吕氏春秋曰洧水大有冨人溺死有人得冨者尸請贖而求金甚多冨人黨以告鄧析曰但安之必無買此者得尸者患其不贖又告鄧析鄧析曰但安之必無人更賣又曰子路拯溺者其人拜之以牛子路受之孔子曰魯人必極溺矣又曰荆人欲襲宋使人先表灌水灌水􅁀溢荆人不知循表而夜渉溺死者千有餘人淮南子曰與溺者金玉不如與之一尋常之纒又曰父溺則􅄃父髮而整之非敢憍侮以救死也􅀃苑曰梁相死惠子欲之梁渡河而遽墮水中舩人救之曰居舩檝之間而溺無我則子死矣子何能相梁乎惠子曰居廣艘長檝之間則不如子至安國家全社稷子之比我䝉䝉如未視之駒曹毗神女杜蘭香傳曰神女姓杜字蘭香自云家昔在青草湖風溺大小盡没香時年三歳西王母接而養之於崑崙之山於今千歳矣異苑曰蜀郡張貞行舡覆溺死貞婦黄因投江就之積十四曰執夫手俱浮出又曰河内荀儒字君林乗􅖅省舅氏䧟河而死兄倫求尸積日不得設􅀕冰側牋與河伯投牋一􅀫岸側冰開尸首執牋浮出倫又牋謝又曰頴川荀茂逺景平中至南康夜夢一人頭有一角爲逺筮云君􅀂至都必得官問是何職荅曰官生于林於是而寤未解所况因復􅄰又夢部伍至楊州水門墮水而死作棺旣成逺入中自試恨小即見殯瘞葬渚次悵然驚覺以告母兄舩至水門過果落江而殞䘮儀一如其夢幽明錄曰蔡廓作䂊章郡未發大兒始迎婦在渚次兒欲渡婦舡衣挂舡頭遂墮水即没徐羡之作楊州登勑兩岸厚賞漁人及昆崙共尋覔至二更不得婦哀泣之間髣髴如夢聞聲告之曰吾今在卿舡下以告婢婢白之令水工没覔果見坐在舡下􅀄出水顔色如平生三輔決録曰文帝竇后名猗清河觀津人也父遭􅁗之亂隱身漁釣墜淵而卒景帝即位后登尊號遣使者更填父所墜淵而築起大墳觀津城南青山是也益部􅂄舊傳曰孝女叔光雄者犍爲人也父泥和永建􅀄爲縣功曹乗舡墮水物故尸䘮不歸號泣晝夜心不圖存所生男女二人並數歳雄乃各爲囊盛珠環以繫兒數爲訣別之辭家人毎防閑之後稍懈因乗小舡於父堕處慟􅂘遂自投水死弟賢其夕夢雄告之却後六日當共父同出至期伺之果與父相持江上郡縣表上爲雄立碑圖像其形焉愽物志曰澹臺子羽渡水子溺死將葬之㓕明日此命也吾豈與螻蟻爲親戚魚鼈爲仇讎遂以葬之又曰南郡冝城王子山到太山從鮑子真學筭到魯賦靈光殿歸渡湘水溺死時年二十許其弟子玉親見之樂府解曰公無渡河朝鮮津卒霍里子髙妻麗玉所作子髙晨起刺舡有一白首狂夫􅀍髮提壷亂流而渡其妻呼而止之乃遂溺死於是援箜篌而歌曰公無渡河相似春秋暦命序洛書曰人皇岀於提地之日九男九兄弟相似別長九國家語曰孔子適鄭與弟子相失獨立東郭門或謂子貢曰東門有一人焉其形長九尺有六寸河目而隆顙其頭似尭其項似臯陶其肩似子産而腰已下不及禹三寸孔叢子曰萇弘語周文公曰吾觀仲尼有聖人之表其􅃺河目而隆顙是黄帝之形也脩肱而􅀛背其長九尺有六寸是成湯之容體也然言稱先王躬履謙讓洽聞強記􅀶物不羣抑亦聖人之興者也史記曰孔子旣没弟子思慕有􅀂􅃺似孔子相與共立爲師如夫子時又曰楚相孫叔敖臨死屬其子貧困徃見優孟乃爲叔敖衣冠振掌談語歳餘像叔敖王與左右不能別欲以爲相優孟曰孫叔敖盡忠爲楚令尹死其子􅀒薪楚相不足爲也王乃封敖子漢書曰夏陽人姓成名方遂居湖以卜筮爲事有故太子舎人甞從方遂卜謂曰子􅃺貌甚似衛太子方遂心利其言幾得以富貴即詐自稱詣闕廷尉建召郷里識知者張宗禄等遂坐誣罔不道要斬東市又曰馮立字聖卿遷西河上郡守立居職公廉治行略與兄野王相似而多知有恩貸好爲條教吏民嘉羙野王與立相代爲太守歌之曰大馮君小馮君兄弟継踵相因循聦明賢智惠吏民政如魯衛德化鈞周公康叔猶二君漢獻帝春秋曰孝靈皇帝王羙人生皇子恊恊生十餘日何皇后妬殺羙人靈帝母永樂董太后攝養恊號曰董侯董侯八􅀊能讀詩書魏志曰􅀄髙勾麗王生能開目視國人惡之及長果凶虐數冠鈔曽孫位生亦能開目視國人惡之勾麗呼相似爲位以似其曽祖故名曰位晉書曰桓玄聞義軍起憂懼曰何無忌劉牢之外生酷似其舅共舉大事何慮不成又曰蜀人王冨作亂郡縣討平之􅀄諸葛孔明有盛德于蜀土子瞻又身死王事蜀人思之爲瞻不死故將謂王冨曰君狀貌甚似諸葛亮君因此思尅復以覇巴蜀晉中興書曰王允之字淵猷年在揔角從伯敦知之謂爲似已入則共寢檀道鸞晉陽秋曰􅀄議以吴隱之爲黄門郎而隱之皃似太宗上不忍見故攻焉齊書曰謝弘微性嚴正舉止必脩禮度時有蔡湛之者及見謝安兄弟謂人曰弘微皃􅀋中郎而性似文靖梁書曰王筠字元禮琅瑘人年十六爲芍藥賦沈約曰王郎非唯額似􅀽公見人輙矜王郎見人必悮􅀏唯此條不能酷似耳􅀽粲即筠外祖也唐書曰王孝傑雍州新豐人髙宗末西討吐蕃戰於大非川爲賊所獲吐蕃賛普見孝傑垂泣曰貌􅀋吾父厚加敬禮孟子曰昔者孔子殁子夏子游子張以有􅀂似聖人欲以所事孔子事之強曽子曽子曰不可江漢以濯之秋陽以􅁀之皜皜乎不可尚已劉昭㓜童傳曰漢孝昭帝諱弗陵武帝少子也年五六歳壯大武帝云􅀋我甚竒之江表傳曰孫皓夫人死皓哀􅉖葬於苑中皓治喪於内半年不出國人見葬太奢麗皆謂皓巳死所葬者是也皓舅子何都顔狀似皓云都代立也孔融別傳曰融爲太中大夫虎賁士皃似蔡邕每酒酣輒引與同坐曰雖無老成人尚有典刑續搜神記曰吴興施續爲吴尋陽督能言論有門生亦有意理常秉無􅀑論門生後渡江忽有一單衣白帢客來因共言語遂及􅀑神客辞屈乃語曰僕便是􅀑何以云無受使來取君門生請乞酸苦􅀑問有似君者不云施續下都督與僕相似􅀑許之便與俱歸與都督對坐􅀑手中出一鐡鑿可長尺餘正自打之放鑿便去頋語門生慎勿道俄而都督云頭痛還所住至食時便亡􅀃苑曰孔子之匡簡子將殺陽虎孔子似之甲士以圍孔子之舎子路怒􅁬㦸將下闘孔子止之曰夫歌予和汝子路歌孔子和之三終而甲罷風俗通曰陳國張伯喈弟仲喈婦炊於竈下至井上謂喈曰我今日粧好不伯喈曰我伯喈也婦大慙愧其夕時伯喈到更衣婦復逐牽其背曰今旦大誤謂伯喈爲卿荅曰我故伯喈也蓋親宻無過夫婦然尚如此况於􅀄未相見而責先識之乎丗􅀃曰桓豹奴是王混外生形似舅桓甚諱之宣武云不􅁪似時似耳􅁪似則形時似是神桓愈不恱又曰魏黃􅀄末吴人發長沙王吴芮冢容皃如故吴卒發者見淮南吴綱曰君何􅀋長沙王綱曰先祖也去綱近五百年語林曰張衡死蔡邕母始懷孕此二子才皃甚相􅀋時人云邕是衡之後身又曰桓温自以雄姿風氣是司馬宣王劉越石一軰器有以叱王大􅀅軍者意大不平征符徤還於北方得一巧作老婢乃是劉越石妓女一見温入澘然而泣温問其故荅曰官家甚似劉司空温大恱即出外脩整衣冠又入呼問我何處似司空婢荅曰眼甚似恨小面甚似恨薄䰅甚似恨赤形甚似恨短聲甚似恨雌宣武於是㢮冠解帶不覺惛然而睡不怡者數日偶像􅀃文曰偶人也尚書􅀃命曰髙宗夢得􅀃使百工營求諸野得諸􅀓巖王庸作書以誥曰以台正于四方台恐德弗類兹故弗言恭黙思道夢帝頼子良弼其代子言乃審厥像俾以形旁求于天下孔安國注曰審所夢之人刻其形像以旁求之旅於民間􅀃築􅀓巖之野惟肖􅀓氏之巖在虞虢之界肖似所夢之形也史記曰孟甞君將入􅁗賔客諌不聽蘇代謂曰今旦代從外來見木偶人與土偶人相與語木偶人曰天雨子􅀅敗矣土偶人曰我生於土敗即歸土今天雨流子而行未知所止息也今􅁗虎狼國也而君欲徃如有不得還無乃爲土偶人所􅀏乎孟常君乃止國語曰越㓕吴范蠡遂乗輕舟而浮於五湖莫知其終極越王命工以良金冩范蠡之狀朝禮之環㑹稽三百里以爲范蠡地春秋後語曰􅁗欲攻安邑恐齊救之則以宋委於齊曰宋王無道爲木人以像寡人射其靣寡人地絶兵逺不能攻也王苟能破宋有之寡人如自得之戰國䇿曰孟甞君將入􅁗􅂫􅁗謂曰今臣經緇上有土偶人與桃梗人相與語桃梗謂􅁟偶人曰子西岸土也八月雨降淄水至則子殘矣曰吾殘則復西岸子東園梗也刻削爲人淄水至而去漂然將何所之矣孟甞乃止漢書曰匈奴畏郅都之威刻木像都之狀交弓射之莫能中魏志曰鮑信與太祖擊黄巾信乃闘死太祖購求信䘮不得乃刻木如信形􅀕而哭之魏略曰時苗字德胄鉅鹿人少清白爲人疾惡出爲壽春令令行風靡楊州治在其縣時蔣濟爲治中苗以􅀄至任欲謁濟濟素好酒適㑹其醉不能見苗苗怨恨還刻木爲人署曰酒徒蔣濟立之於壇旦夕射之江表傳曰孫權使朱雋徃喻關羽令降羽乃作像人於城上而潜遁又曰孫皓以張布女爲羙人棒殺之後思其顔色使工巧刻作羙人形􅁪置坐側隋書曰栁誓字頋言夲河東人也拜祕書􅁥封漢南縣公帝退朝之後命入閣言宴諷讀終日而罷恩􅀂朋友帝猶恨不能夜召於是命匠刻木偶人施機􅀜能坐起拜伏似於誓帝每在月下對酒輙令宫人運之於坐與相酬酢而爲歡􅀏唐書曰丘行恭從太宗討王丗充㑹戰於印山之上太宗與諸􅀐相失唯行恭獨從尋有􅀐數人追及太宗矢中御馬行恭乃迴􅀐射之賊不敢復前然後下馬柭箭以其所乗馬進太宗貞觀中有詔刻石爲人馬以像行恭抜箭之􅃺立於昭陵闕前又曰侯君集滅髙昌國拜麹智盛爲左武衛將軍及太宗崩刋石像智盛之形列於昭陵玄闕之下又曰天寳中天下州郡皆鑄銅爲玄宗真容擬佛像之制又曰天寳五年於太清宫刻石爲李林甫陳希烈像侍於聖容之側孝子傳曰丁蘭早􅀌不識其母乃刻木作母而事之車頻􅁗書曰姚萇爲符堅神像戰求有利軍中士衆出入並驚恐皆云畏符主像萇嚴鼓斬之以首送符登抱朴子曰張華作􅀶物志曰黄帝仙去其臣左徹者削木爲黄帝像帥諸侯奉之亦見汲􅃁書太平御覽卷第三百九十六
