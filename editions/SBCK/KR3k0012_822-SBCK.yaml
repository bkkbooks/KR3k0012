front:
  text: 太平御覽卷第八百二十二資産部二
  hash: sha256:db7dd99fbcf9795722fc30d375c190b73cc33089b7919ae6493eb054f4a56942
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_822-1a}
body:
  text: 農耕農周禮地官下曰凡任民任農以耕事貢九穀禮記月令孟春曰乃命有司布農事舎東郊修封疆審端徑術善相丘陵阪險原隰土地所冝五榖所殖以教導人必躬親之田事旣飭先定凖直農乃不惑又仲春曰無作大事以妨農事大事兵役之屬又孟夏曰無起土功無發大衆無伐大樹爲妨蚕農之事是月也命有司廵行田原勸農勉人無或失時勸農人以及時又孟秋曰是月也築􅂣圃農乃登穀天子嘗新先薦寢廟又季秋曰乃命有司農事備収舉五榖之要又孟冬曰是月也勞農以休息之又仲冬曰是月也農有不収藏積聚者馬牛禽獸有放逸者取之不詰又季冬曰氷巳入令告人出五種命農計耦耕事修耒耜具田器命有司出土牛以示農耕之早晚又王制曰制農田百􅅿百􅅿之分上農夫食九人其次食八人其次食七人其次食六人下農夫食五人庶人在官者其禄以是爲差也農夫皆受曰於公田肥折有五等収入不同也庶人在官謂府史之屬官長所除命於天子國君者諸侯之下士視上農天禄足以代其耕也左傳閔公曰衛文公務材訓農通啇惠工又昭元曰譬如農夫是藨是蓘藨折擁夲曰蓘雖有饑饉必有豐年春秋元命苞曰周先姜原履大人跡生后稷扶桑推種生故稷好農神始行從道道必有跡而姜原履之意感遂生后稷於扶桑之所出之野長而推演種生之法而好農知爲倉神所命明也尚書盤庚上曰􅀂農服田力穡乃亦有秋農勤穡則有秋下承上則有福乃不畏戎毒于逺邇惰農自安不昏作勞不服田􅅿越其罔有􅁰稷又洪範三曰農用八政農厚也厚用之政乃成一曰食勸農業又梓材惟曰􅀂稽田旣勤敷菑惟其陳修爲厥疆畎言爲君監民惟􅀂農夫之考田己勞力布發之惟其陳列修治爲其疆畔畎壟然後功成以喻教化論語子路曰樊遲請學稼子曰吾不如老農漢書曰喭曰以貧求冨農不如工工不如啇亦出史記又曰楊季官至廬江太守有田一㕓宅一區丗丗以農桑爲業後漢書曰王丹家累千金隱居養志好施周急毎歳農時輙載酒肴於田間􅀱勤者而勞之東觀漢記曰載酒肴便於田頭大樹下飲食勸勉之因留其餘酒肴而去其墮孏者恥不致丹皆兼功自厲孏與􅈸同音力亶反邑聚相率以致殷冨其輕黠游蕩廢業爲患者輙曉其父兄使黜責之没則膊給親自將護其有遭䘮憂者輙待丹爲辦郷鄰以爲常行之十餘年其化大洽風俗以篤又曰崔恢字行遜遷鄢陵令毎至春農身到廬陌觀民耕桑農無廢業東觀漢記曰樊重字君雲丗善農稼好貨植南史曰梁張興丗爲方伯父仲子由興丗致位給事中興丗欲將徃襄陽愛郷里不肯去嘗謂興丗曰我雖田舎老公樂聞皷角汝可送一部行田時吹之管子曰一農之事必有一耜一鎌一耨一雅一銍然後成爲農也又曰北澤燒火照堂下管子入賀桓公曰吾田野辟農夫必有百倍之利也又曰善爲國者使農寒耕而􅀬耘力歸于上又曰夫國富多粟生於農故先王貴之民事農則田墾田墾則粟多粟多則國富國富則兵強兵強則戰勝戰勝者地廣農夫終歳之作不足以自食也故農者月不足而歳有餘也又曰先王者善爲民興利除害故天下歸之所謂興利者利農事也所謂除害者禁害農事也又曰一農之量襃百􅅿也又曰上農挾五中農挾四下農挾三農有常業女有常事一農不耕民有饑者一女不織民有寒者孟子曰不違農時榖不可勝食者也孫卿子曰農精於田不可爲農師賈精於市不以爲市師又曰良農不爲水旱不耕韓子曰歷山農者侵畔舜徃耕其年讓畔國語管仲曰昔者先王處農就田野令農夫羣萃而州處察其四時四時樹藝各有冝權節其用耒耜耞芟權平之節其器用小大倨勾之冝耞拂也所以擊草芟大鎌所以芟草及寒擊槁除田寒季冬大寒之時槁枯草也以時時耕時耕立春之後及耕深耕而疾耰之以待時雨疾速耰磨時􅀨至當種時􅀨旣至挾其搶刈耨鎛在掖曰挾搶摏也刈鎌耨兹其鏄鋤也以旦暮從事於田野脫衣就功首戴茅蒲身衣襏襫茅脱解茅蒲簦笠也襏襫蓑蘗也茅或作萌竹萌之皮所以爲笠沾體塗足沾濡暴其髮膚盡其四支之敏以從事於田野少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故農之子􅁪爲農野處而不暱暱近吕氏春秋曰匡章謂惠子於魏王之前曰蝗螟者農夫得而殺之奚故爲其害稼也汜勝之書曰農士惰勤其功力相什倍又曰衛尉前上蠶法今上農法民事人所忽略衛尉懃之可謂忠國愛民之至風俗通曰古者使人如借故曰籍田孫盛作南昌令教曰且欲先婚配境内然後督其農桑梁州記曰黒水村有魚池池上立美䑓下四周有水左右官良田數十頃故以美農爲名耕周禮天官上曰甸師掌帥其屬而耕耨王籍以時入之以共齍盛其屬府史胥徒也耨耕耘耔也王以孟春躬耕帝籍天子三推三公五推卿諸侯九推庶人終於千􅅿庶人謂徒三百人籍之言借也王一耕之而使庶人耘耔終之齍盛􅀕祀所用榖也禮記月令曰正月天子率三公九卿諸侯大夫躬耕帝籍天子三推公五推諸侯九推鄭玄注曰帝籍爲天伸借人力所治之田也蔡邕章句曰禮成於三故天子三推卑者勞故三公五推也又曰王制曰三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色又少儀曰問士之子長㓜長則曰能耕矣又表記曰天子親耕粢盛秬鬯以事上帝故諸侯勤以輔事於天子言無事而居位食􅀄是不義而富且貴左傳襄公七年曰夏四月三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也郊祀后稷以配天后稷周始祖能播植者是故啓蟄而郊郊而後耕今就耕而卜郊宜其不從也啓蟄夏正建寅之月耕謂春分又襄公十三年曰呉子諸樊旣除䘮諸樊呉子桑之長子也桑卒至比舂十七月旣葬而除䘮將立季札札諸樊少弟季札辭曰曹宣公之卒也諸侯與曹人不義曹人將立子臧子臧去之遂弗爲也以戌曹君君子曰能守節君義嗣也誰敢奸君有國非吾節札雖不才願附於子臧以無失節固立之弃其室而耕乃舎之傳言季礼之讓且明呉兄弟相傳又昭公五曰伍貟如呉言伐楚之利於州于州于呉王僚公子光曰是宗爲戮而欲反其讎不可從也光呉公子闔閭也反復也貟曰彼將有他志光欲殺僚不利貟用事故破其議而貟亦知之余姑爲之求士而鄙以待之計未得用故進勇士以求入於光退居邊鄙乃見專諸焉專諸勇土而耕於鄙穀梁傳成公曰郄克曰反魯衛之侵地使耕者皆東􅅿欲以利其戎車論語衛靈公曰君子謀道不謀食耕也餒在其中矣學也禄在其中矣又微子曰長沮桀溺耦而耕論語比考䜟曰叔孫武叔毀孔子譬􅀂堯民曰我耕田而食穿井而飲堯何力功周書曰神農之時天雨粟神農耕而種之韓詩曰三之日于耜四之日舉趾至於四月始可舉足而耕又曰齊人青將討公孫無知辭其友其友曰耕田刈草農之力也討君之賊大夫職也史記曰趙肅侯遊大陵出於鹿門大夫扣馬曰耕事方急一日不作百日不食肅侯下車而謝之又曰伍子胥進專諸於公子光退而與故太子建之􅀌子勝耕於野又曰陳渉少時與人傭耕輟耕壠上曰富貴無相忘傭者􅀏而應曰子爲人傭耕何冨貴耶渉曰嗟乎燕雀安知鴻鵠之志哉又曰髙后立諸吕爲王擅權用事朱虚侯年二十有氣力忿劉氏不得􅀔常入侍髙后醼飲曰請爲太后歌田太后曰試爲我言田意曰深耕穊種立苗欲踈非其種者鋤而去之吕后黙然戰國䇿曰主父欲代中山使李疵觀之疵曰舉士即民務名不好本朝上賢即耕者隋而戰士懦􅀂此不亡者未之有也漢昭紀曰上耕于鈎盾弄田應劭曰昭帝九年未能親耕帝籍鈎盾有田近署故徃試耕爲戯弄也又曰江南之地火耕水耨應劭日燒草下水種稻又曰夏侯勝毎授書謂諸生曰學經不明不如歸耕後漢書曰王莽末盗賊起人皆憂移徙遁逃莫事農桑淳于恭遂獨耕郷人止之曰世方散亂死生未分何空自苦爲恭曰正我不得食他人食之何傷柰何不耕東觀漢記曰梁鴻乃將妻之覇陵山中耕耘織作以供衣食彈琴誦書以娯其志又曰承宫將妻之華隂山谷耕種禾黍臨熟人就認之宫悉推與去由是顯名又曰第五倫爲㑹稽太守免官歸田里身自耕種不交通人物魏略曰常林少單貧自非手力不取之於人性好學漢末爲諸生帶經耕鋤其妻常自擔餉餽之林雖在田野其相敬如賔呉録曰徴崇字子知遭亂遂隱於㑹稽躬耕以求其志好尚者從學所教不過數人輙止欲令其業必有成也呉志曰薛綜上䟽云任延爲九眞太守迺教其耕犂使之冠履􅀳書曰朱冲字巨容少有志行閑静寡欲好學而貧常以耕藝爲事又曰趙至字景眞代郡人也寓居洛陽維氏令初到官至年十三與母同觀母曰汝先世夲非微賤世亂流離遂爲士伍耳爾後能如此不至感母言詣師受業聞父耕叱牛聲投書而泣師怪問之至曰我小未榮養使老父不免勤苦師甚異之宋書曰王韶之家貧好學嘗三日絶糧而執卷不輟家人請之曰囷窮如此何不耕荅曰我自耕耳齊書曰戴僧靜爲北徐州刺史買牛給貧人令耕種梁書曰孔子祛㑹稽山隂人也少􅀌貧好學耕耘樵採常懷書自隨投閑則誦讀勤苦自勵遂通經術趙書曰東耕儀直殿中􅁥鋪席於侍臣之南北靣解出御表跽受黄門侍中侍中釋劒擎跽以頴授尊太常讃曰皇帝親耕籍田一推一反三推三反成禮侍中跽取耒以授侍郎以授殿中􅁥􅁥復韜管子曰庶人好耕農而惡飲食於是財用足又曰行其㳺野視其耕耘計其農事而饑飽之國可以知也又曰耕者出入不應於父兄用力不農農不事賢行此三者有罪無赦又曰地大而不耕非其地也文子曰其耕不強者無以養生晏子春秋曰有納書景公者云吾不知晏子之忠臣也公以爲然晏子入朝公色恱晏子退而窮處東耕于海濵墨子曰魯南鄭人呉憲者冬陶夏耕自比於舜又曰墨子之齊遇故人曰今天下莫爲不􅀂巳墨子曰今小人一人耕九人處耕者不可以不急何食者衆而耕者寡也今天下莫爲義子冝勸我何以止我何以樂曰使丈夫爲之廢丈夫耕稼樹藝之時使婦人爲之廢婦人紡織之事莊子曰堯治天下伯成子髙立爲侯堯授舜舜授禹伯成子高辭而耕禹徃見之則在野又曰堯以天下讓許由許由不受退而耕於潁水之陽終身不見尸子曰有虞氏身有􅀯􅅿妻有桑田神農耕而王所以觀耕啇子曰今一人耕而百人食之此爲螟􅭈蚵胡多切蠋之欲切亦大矣雖有詩書猶無益於治孟子曰伊尹耕於有莘之野湯躬詣之伊尹囂然弗顧又曰耕者助而不稅則天下之農皆恱而願耕於其野也孫卿子曰子路問孔子曰有耕耘樹藝手足胼胝以養其親而無孝名何也子曰但使入則篤行出則友賢何患無孝名也韓子曰宋人有耕者田中有株兎走觸林而死因釋耕而守株冀更得兎宋人􅀏之淮􅀯子曰夫織者日以進耕者日以却事相反成功一也楊子法言曰谷口鄭子眞不屈其志而耕乎嵒石之下名振京師􅀓子曰耕根車天子親耕乗之蹋猪車畋獵乗之山海經曰后稷播百􅂖始作耕六韜曰昔帝堯之王天下不以􅀻曲之故留耕績之時國語曰古者天子籍田后稷􅁥之􅁥察太史賛玉賛導王敬從之王耕墢一墢耜之墢也王無耦以一耜耕也班三之班三次也三之下各三其上也王一墢公三􅀸九大夫二十七庶人終于千􅅿終盡耕之又曰管仲對齊桓公曰深耕而疾耰之以待時雨吕氏春秋曰匡章謂魏王曰今君行多者數百人皆不耕而食此害稼亦甚矣又曰人臣孝則事君忠臨難死士民孝則耕耘疾守戰固又曰舜耕於歷山昌草生於是始耕董生書曰禹見耕者五耦而軾賈􅁩書曰王者之法民三年耕而餘一年之食九年耕而餘三年之食三十歳民有十年之蓄說􅁐曰曽子衣弊衣而耕魯君使人致邑曽子不受曰受人者畏人與人者驕人終不受太元經曰神農冬耕被服純青崔元始正論曰宣帝使蔡登校民耕相三犂共一牛一人持之下種挽摟皆取備焉一日種頃也拾遺録曰而而支夫善耕婦人善織以五色絲稍内口中兩手引而結之則成文錦丈夫多力勤稼一日耡十頃之地董正則傳曰劉恭嗣少有異才聞司馬操􅀶物多通故徃見焉遇其方耕執耒耜於壠􅅿之上於是釋耒下袵相就而言任嘏別傳曰嘏字昭先樂安人有比居者擅耕嘏地數十􅅿種之人以語嘏嘏曰我自以借之耶耕者聞之慙謝還也襄陽􅂄舊傳曰龐公襄陽人居􅃆水上至老不入襄陽城躬自耕耔其妻相待如賔休息則整巾端坐以琴書自娯覩其貌者肅如也桓階别傳曰階爲趙郡太守朞月之間増戸萬餘路有遺一囊耕者見之舉以繫樹數日其主還取石勒别傳曰石勒元康中流宕山東􅀉旅平原茬平界與師欣家傭耕耳􅁪聞鼔角鞞鐸之音勒私異之琴操曰曽子㓜小慈仁居貧無業以事父母躬耕力作隨五土之利四時惟冝以進甘脆嘗耕於太山之下遭雨雪寒凍旬月不得歸乃作憂思歌太平御覽卷第八百二十二
