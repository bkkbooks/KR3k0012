front:
  text: 太平御覽卷第六百六十八
  hash: sha256:8a2c6743945d08ede0bbcbe3fa973d24597f4547936ce9e8d80fbe59e5f2dbc5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_668-1a}
body:
  text: 道部十養生太平經曰養生之道安身養氣不欲喜怒也人無憂故自壽也又曰一者數之始也生之道也元氣所起也天之大綱也故守而思一也子欲養老守一最夀平氣徐卧與一相守氣􅀂泉源其身何各是謂眞寳老襄自去又曰古者三皇之時人皆氣清深知天地之至情故悉學眞道乃復得天地之公求道之法静爲基先心神巳明與道爲一開蒙洞白􅀋如晝日不學其道􅀂處暗室而迷方也故聖賢遑駭太上經曰守一則諦定心源守静則存神忘形定氣通無道成眞降三元眞一經曰體百神者耳爲帝君之牎門目者太一之日月鼻者三元之丘山口者絳宫之朱淵眉者白元之華盖髮者明堂之林精舌者元英之龍轅齒者胃宮之威力手者膽神之外援足者腎元之靈関隂極者洞房之真機也又曰㳙子授蘇林守三眞一之道後林復詣㳙子寢静之室無復之矣留一􅁓書置卧内以與林也其文曰五斗三一大帝所秘精思十二年三一見相授子書矣但有三一長生不滅況復守之乎能守三一名刋玉札况與三一相見乎加存洞房爲上清公加知三元爲五帝君後金闕帝君所以乗景迅雲周行十天者寔由洞房三元眞一之道也世之學者皆尊守一當令心朴神凝體專誠感所以百念不生精意不散但有三月内視注心一神繫念不散專氣致和由朴之至也得之速也自朴散眞離華僞互起争競亂生故一不卒感神不即應非不欲徃存之者不專思之者不審故起積年之功絶有髣髴耳三一之法上清眞書之首篇髙上之玉道神仙之津途衆眞之妙訣子能守一一亦守子子能見一一亦見子一湏身而立身湏一而生守一之戒戒於不專專復不乆乆不能精精不能固固而不恒則三一去矣身爲空宅五符經曰知一者無一不知也不知一者無一能知也一者至貴無偶之號必欲長生三一當明思一至飢一與之粮思一至渴一與之漿一能成隂生陽推行寒暑其大不可以六合隱其小不可以毫芒兆能暇能豫一乃不去存一至勤一能通神少飲約食一乃留息知一不難難在於終知眞不爲與不知同求之不巳登彼玉清又曰養其氣所以全其身又曰食氣者常有少容老子曰道言微深子未能別撮其樞畧愼戒勿失先損諸欲莫令意􅇣閑居静處精細齋室丹書萬卷不如守一當制念以定志静身以安神寳氣以存血思慮兼忘冝想内視則身神並一静思期眞則衆妙感㑹專精積神不與物􅄂謂之清反神服氣安而不動謂之道又曰善攝生者陸行不遇兕虎入軍不􅀍甲兵兕無所投其角虎無所措其􅀲兵無所容其刃太上眞經曰一乃無像求之難得守之易失易失由識劣貪欲滯心廓然無爲惟在守一積而未極皆由漸􅂛當在三元諦識神氣狀皃名字出入有無生鎭三宫尸毒自去聖眞仙經隨因授之八素經曰凢學至道諦定其心除患清身知變革慮正身清然後心定心定則道成道成則眞降凢存一守神要在正化正化由定心心定則識清識清則㑹于道又太極眞人曰古人爲道也玄寂静神念眞存元示漸引末歸識源神知而能見見而能從從而能習習而能堅堅而能成成而不居善人在於天下如橐籥乎非與萬物交争其德常歸焉以其謙虚無欲也欲者㐫害之根也無者天地之元也莫知其根莫知其源聖人者去欲入無以輔其身也太一洞眞經曰兩耳名爲六合之髙牎也又云齊中名曰受命之宫也又曰養生之道耳目爲主􅄂視則目闇廣聽則耳􅐬裴君内傳曰夫求道者要先令目清耳聦爲主也且耳目是尋眞之梯級綜靈之門户得失繫之仙經曰養生以不傷爲夲此要言也太清眞經曰一切含氣莫不貴生生爲天地之大德德莫過於長生長生者必其外身也不以身害物非惟不害而巳乃濟物忘其身忘其身而身不忘是爲善攝生者也眞道養神神能飛化太上三元經曰養生之道必愛氣存神不可􅇵語大呼使神勞氣損是以眞人道士常吐納以和六液􅀇示經曰夫形體者特生之具也非所以生生也生生乃以素朴爲體以氣爲元以神爲形此乃生之宫庭也以無爲育其神舒釋玄妙之門徃來無形之間休息於無隣此所謂得玄明之生源又云外想冝絶内注􅀇真然後長生可保妙眞經曰道人謀生不謀於名􅎍中絶白意無所傾志􅀂流水居􅀂空城積守無爲乃能長生衆眞戒曰性躁􅁀者一身之劇賊求道之散梯也用之者眞去改之者道來每事觸􅀋皆當柔遟而盡精㓗之理如此幾乎道也神者天地之所馳也頥神養性行生道氣以度難也此乃上聖眞人逹識也夫爲道者當行此以載其身太一帝君經曰􅀂能常行九晨照洞房􅅺丸之法者檢䰟魄制萬邪清浄行之以致靈仙之氣降于寢室所謂引三光九星以照百神者也上清列紀曰胎閉静息内保百神吞景咽液飲食自然身必壽考可得陸仙矣太上眞人祕要曰夫氣者神明之器清濁之宗處􅀇則天清在人則身存夫生死虧盈蓋順乎攝御之間也太洞玉經日食玄根之氣者使人體中清朗神明八聦身有日映面有玉澤服餌朝夜懸粮絶粒道要於金醴事妙於水玉所謂吐納自然之太和御九精之靈氣者也抱朴子曰長生之要在乎還年之道也延年除病其次焉有不以自伐􅀂年尚少壯而知還年隂丹以􅀘腦采七益於長谷者不服餌藥亦不失一二百歳凢傷之道有數焉才所不逹而困思之力所不勝而張舉之深憂重怨悲哀喜樂汲汲所欲戚戚所患寢息失時沉醉吐嘔飽食即卧跳走喘息歡呼􅂘泣隂陽不交積傷至盡乖養性之方耳不極聽目不乆視坐不至疲先寒而衣先􅀬而解不欲極飢而食食不過飽極渴而飲飲不過多不欲甚勞不欲多汗及多唾奔車走馬極目逺望多食生冷冬不欲極温夏不欲極凉大寒大􅀬大風大霧不欲昌之五味不可偏多凡言傷者亦不便覺乆則損壽耳是以善攝生者卧起有四時之早晚興居有至和之常制調利筋骨有偃仰之方杜疾閑邪有吞吐之術流衝營胃有􅀘㵼之法節宣勞􅇣有與奪之要忍怒以全隂抑喜以養陽然後先將服草木以救虧鈌後服金丹以定無窮長生之理盡於此矣􅀂有欲决意任懷自謂逹識知命不􅅺異端極情不營乆生者安可告養生之言哉登眞隱訣曰方諸青童云人學道亦苦不學亦苦二苦之始乃同爲苦之終則異爲道者縁苦得樂不爲道者從辛苦而已矣惟人自生至老自老至病􅀗身至死其苦甚矣心腦積罪生死不絶其苦難說况復不終其天之年老哉此不爲道之苦也爲道亦苦者清浮存真守玄思靈尋師勞苦歴試數百用志不墮亦苦之至也此爲道之苦數十年中爲苦之理乃有甚於彼得道之日乃頓忘此苦猶百日之飢一朝而飽豈復􅁴向者之餒乏耶非道則不可右英真人曰夫内接家業以自羈外綜王事以雜役此亦道之不專也夫抱道不行猶無道也握寳不用猶無寳也紫微元君曰疾之所生生乎念多邪之所兆兆於心散念多則事廣事廣則累繁浮泛莫撿紛竟不息内煎萬慮外勞百役形神弊矣衆病安得不興髙墉重関猶􅂲冦至况闢扉去防自我致冦也智以無涯傷性心以爲惡蕩真形來在眼聲發入聽其爲閞意属想實有増羡魂者正神神貴明信魄者邪􅀑􅀑尚狂悖飛仙之想觸見必念慈護之情遇物斯極以此爲心心即道矣九華經曰眼者身之鏡耳者躰之牖視多則鏡昏聽衆則牖􅐬磨鏡决牖則能徹洞萬靈眇察絶響靣者神之庭髪者腦之華心悲則面焦腦减則髮素所以精氣内䘮丹津損竭精者躰之神明者身之寳勞多則精散營竟則明消所以老隨氣落耄巳及之眞誥曰冨貴者破骨之斧鋸載罪之舟車適足誨愆要辱爲伐命之兵非佳事也是故古之髙人覽罪咎之難豫知冨貴之不可享矣遂肥遯長林栖景名山欲逺此迹自求多福保全至素者也裴君曰三関常調是長生之道也口爲天関手爲人関足爲地関調則五藏安安則無病又存五神於躰謂兩手兩足頭也頭想􅁪青兩手俱赤二足常白者則去仙近矣昔徐季道學仙於鵠鳴山中亦時時出市道間忽見一人着皮袴褶柱桃杖季道乃拜之因語季道曰欲學道者當巾天青詠大暦踏􅀟白佪二赤此五神之事其語隱也大暦三皇文也此即太素五神事別有經品黄老經曰士能遺物乃可議生生夲無邪爲物所嬰乆乆易志志欲外無能守以道爲貴生太上太真科曰一在人身鎮定三處能守三一動止不忘三尸自去九虫自消不假藥餌不湏禁防乆視之要守一爲先次行師教授職隨才依功進位積德居尊宣楊妙氣開導後生三皇經曰天能守一覆而不舉地能守一靜而能處岳能守一不避寒暑海能守一流而不還人能守一必得真仙昇玄經曰道有大法得之立得是謂三一之道當有將軍吏兵斷絶惡道上清玉皇日三眞者兆一身之帝君百神之内始變化離合與眞洞靈微哉難言非仙不傳太上素靈經曰三一者一身之靈宗百神之命根津液之山源魂精之玉室是以胃池體方而受物腦宫圓靈而適眞太上曰眞人所以貴一爲眞者一而巳一之所契元氣造化一之變通天地􅁳合是以上一爲身之天帝中一爲絳宫之丹皇下一爲黄庭之元主而三之一眞並統身内二十四氣以授生生立一於身上應太微二十四氣眞眞氣􅆦和品物流形􅀇神渾分紫房杳􅁳上一眞帝之極也中一眞皇之主也下一眞王之砂也天皇得極故上成皇極地皇得主故上成正一人皇得妙故上成衆妙三皇體眞而守一其眞極也得一而巳集仙籙曰凢動作視息飲食語言好惡是非人各有歳月日時隨其所屬以定其分此物理之常數也身有應敗之患神有應散之期命有必盡之􅀔夫神在則人神去則尸蓋由􅄝慾亂心不能忘色味之適夫修其道者在適而無累和而常通善惡各在報應之理毫􅁵無失長生之夲惟善爲基人生天地間各成其性夫氣清者聦明賢逹氣濁者㓙虐癡戅氣剛者髙嚴壯烈氣柔者慈仁淳䔍夫明者伏其性以延命暗者恣其欲而傷性性者命之原命者生之根勉而修之所以營生以養其性守神以養其命人之生也皆由於神神鎭則生神斷則死所以積氣爲精積精爲神故仙者内求内宻則道來眞者修寂修静則合眞神者湏積感則靈通常能守一則仙近矣則與天地共􅀉於太無中矣又能洞靈體無則太無共􅀉於寂寥中矣能洞寂則聽視不聞見與道􅁳矣道者靈通之至眞也術者變化之􅇊􅀇也道無形因術以濟人人之有靈因修而契道道之要者在深簡易功術之祕者惟藥與氣也上士服之􅂛爲仙官中士服之栖集崑崙下士服之長生人間於是太一元君述還丹金液之要行於世又曰木公金母者二氣之祖宗隂陽之原夲仙眞之主宰造化之元先凝氣成眞與道合體且氣之弥綸天地經營動植在人爲人在物爲物發大藴散無窮性發乎天而命成乎人立之者天行之者道􅀇老云致虚極守静篤萬物將自復復謂歸于道而常存也長乆之要者天保其􅀇地守其物人養其氣又曰啇王聞彭祖有道拜爲大夫毎稱疾閑居不預政事服雲母粉麋鹿角水挂常有少容性深静不自言有道王詣問莫之告王於掖庭立華屋紫閣使祖居之問延年益夀之道荅曰欲登天上􅀘仙官者當服元君太一金丹此道至大其次當愛精養神服食草藥可以長生其次陰陽運氣導養屈伸使百節氣行関機無滯此可以無使病所侵思神念眞坐忌錬液皆可以令人長壽苦泝流􅀘腦之要此甚難行有懷􅁄履刃之危又非王之所爲也吾所聞淺薄道止於此不足宣􅀓人生於丗伹養之得冝可至百餘歳不及此者是皆傷之也大醉大喜大怒大温大寒大勞大極皆傷也至樂至憂至畏至怖至撓至躁至奢至淫皆傷也甚飢甚渴甚思甚慮皆傷也乆坐乆立乆卧乆行皆傷也寒温得節飢飽適冝無思無爲惟清惟静此可與言修身耳巳得其夀復養之得冝則冝長壽但要莫傷也冬温夏凉不失四時之和者所以適身也美色曼態不至思欲之感者所以通神也車服威儀知足不求者所以一其志也八音五色不至躭溺者所以導心也凢此之物本以養人人之不能斟酌得中反以爲患故聖賢垂戒懼下才溺之流遁忘返用之失所故修道之士皆令禁之欲以檢制之易也亦由水火用之過當反爲害耳人不知經脉損血氣不足内理空踈髓腦不實體已先病故爲外物所犯因風寒酒慾以發之􅀂本充實豈有病耶凢逺思羡願傷人也憂恚悲哀人情過樂忿怒不解汲汲所愛戚戚所患寒温失節隂陽不交皆所傷也男女相成猶天地相生也所以導養神氣使人不失其和天地晝離而夜合一歳三百六十交故四時均而萬物生生成不知窮極所以天不失其動地不失其和物不失其生而能長乆也人不能法天地而有常减衣絶食自取死病愚之甚也去此修攝節宣之外則有服元和之氣得其道則邪不能入此理身之本也其餘含景思神歴藏導引吞餌服御之事千七百餘條及四時首月責巳謝過卧起早晏之法可以教􅀄學之士引進向善之門漸正其心而徐息其罪咎非便能致人得道也􅀂血脉枯竭神氣凋敗豈􅀑神念眞而能守之固未知其益矣此由凢人爲道而求其末不務其本也又曰内不養神外勞其形元精漸虚神氣困竭而晝夜服勤讀誦經訣此亦無益也諸經萬三千首皆示以始渉之門庭耳啇王具受諸要行彭祖之亦夀但不能戒其淫慾耳集仙籙曰女凢者陳市上酒婦也作酒美有仙人過其家飲酒即以素書五卷貰酒凢開視之乃仙方養性長生之術也凢私冩其要訣依而修之三年顔色更少數歳貰酒仙人復來􅀏謂之曰盗道無師有翅不飛女凢隨仙人去不知所之又日太陽女朱翼得吐納之道事絶洞子李脩脩著書四十篇名曰道源常行之道以柔勝剛弱制強如臨深履危御奔乗朽差之毫􅈊䘮尓之䇿勤而行之可以長壽又曰太隂女盧金學道未成當道沽酒宻訪其師㑹客過使問客􅁟數爲歳但南三北五東九西北中耳一還報曰客大賢者至得道人也我始問一知五矣遂問長生之道得􅀘導之要蒸丹之方又曰太玄女顓和常曰人之處丗一失不可復得一死不可復生况壽限之促非修道不可延也遂洗心求道而得其術太平御覽卷第六百六十八
