front:
  text: 太平御覽卷第五百一十九宗親部九
  hash: sha256:1f4f601f956e8fb8b0a7fde24792f26b991b118a1596a85b70c2b97c05a03425
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_519-1a}
body:
  text: 孫女子壻孫爾雅曰子之子爲孫孫之子爲曽孫曽孫之子爲玄孫􅀇孫之子爲來孫言有徃來之親來孫之子爲昆孫昆後也昆孫之子爲仍孫仍重也仍孫之子爲雲孫言輕逺􅀂浮雲毛詩文王有聲曰貽厥孫謀以燕翼子禮記曲記曰君子抱孫不抱子此言孫可以爲王父尸以孫與祖昭穆同也子不可以爲王父尸又􅄂記曰􅀕稱孝子孝孫䘮稱哀子哀孫史記曰張蒼父不滿五尺蒼長八尺蒼子復長八尺餘孫􅀋長六尺後漢書曰龐叅字仲連緱氏人拜漢陽太守郡民任棠有竒節隱教叅到先候之棠不與言但拔薤一大本水一盆致于屏前自抱孫兒伏于户下見逸民部又曰虞詡字􅂛卿陳國人孝飬祖母縣舉爲順孫又曰馮氏兄弟形皆偉壯唯馮勤祖父偃長不滿七尺常耻短陋恐子孫似之乃爲子伉娶長妻生勤勤長八尺三寸魏志曰王粲字仲宣山陽人蔡邕見而竒之時邕顯貴車馬填門粲在門邕倒屣迎之粲年㓜皃弱短小座皆驚邕曰此王公之孫有異才吾不如也吾家所有書籍當悉與之晉書曰張慿字長宗祖鎮蒼梧太守慿年數歳鎮謂其父曰我不如汝汝有佳兒慿曰阿翁詎冝以子戯父乎又曰李宻字令伯父早亡母改醮祖母劉氏躬撫飬宻奉事以孝謹聞有暇即講學志疲師事譙周周門人方之游夏太始􅀄徴爲洗馬宻以祖母年老上表自陳曰母孫二人更相爲命巳具祖門中又曰李胤字伯祖敏爲公孫度所迫浮海莫知所終子娶妻生㣧遂絶房内以憂卒㣧以祖不知所亡設木主以事之由是顯名宋齊語録曰虞愿字士恭㑹稽人祖爲給事中中庭有橘􅀣冬熟子孫争取愿獨不取祖及家人並異之又曰張元字孝始祖䘮明三年元每憂涕讀佛書以求福祐後見藥師經云盲者得視遂請七僧燃燈七日七夜轉藥師經行道毎自責曰爲孫不孝使祖䘮明今以燈施普照法界願祖目見明元求代暗其夜夢一老人以金鎞治其祖目謂之曰勿悲三日之後必差元于夢中喜躍驚覺乃遍告家人居三日祖目果漸見明從此遂差後周書曰薛登字景猷汾隂人早䘮父家貧以飬祖母暇則覽文籍躬耕以孝見稱列子曰北山愚公者年且九十面山而居懲山北之寒出入之迂也遂率子孫荷檐叩石墾壌箕畚運於北海之尾河曲智叟􅀏而止之愚公長息曰雖我之死有子在焉子又生孫孫又生子子又生孫孫孫子子無窮匱也而山不加増何苦不平河曲智叟無以應之又曰舜問乎丞曰道可得而有夫道性命非汝有也是天地之委順也子孫非汝有也是天地之委蛻也陳留志曰范喬字伯孫年二歲祖父馨臨終執其手曰恨不見汝成人因以所用硯留與之後家人告喬喬執其硯涕泣孝子傳曰原榖者不知何許人祖年老父母厭患之意欲棄之榖年十五涕泣苦諌父母不從乃作輿舁棄之榖乃隨収輿歸父謂之曰爾焉用此㐫具榖云後父老不能更作得是以取之耳父感悟愧懼乃載祖歸侍飬尅巳自責更成純孝榖爲純孫又曰吴郡陸仲元者晋太尉玩曽孫自玩至仲四丗爲侍郎時人方之全張二族幽明録曰許遜少􅀌不識祖墓傾心所感忽見祖語曰我死三十餘年於今得正葬是汝孝悌之至因舉標牓曰可以此下求我於是迎䘮葬者曰此墓中當出一侯及小縣長女禮記内則曰女子出門必擁蔽其面夜行以燭無燭則止又曰女子十年不出􅁪居内也姆教婉娩聽從婉謂言語也言語婉之言媚也媚謂容㒵也執麻枲治􅁝繭織紝組紃學女事以共衣服觀於􅀕祀納酒漿籩豆􅉁醢醴相助奠當乃女時而知十有五年而笄二十而嫁凡女拜上右手右隂也左傳襄五曰􅀄宋芮司徒生女子赤而毛棄諸堤下恭􅁎之妾取以入長而美名之曰棄榖梁傳曰禮送女父不下堂母不出門父誡之曰謹慎從汝舅之言母誡之曰謹愼從汝姑之言諸母鞶紳誡之曰謹愼從汝父母之言無違宫事史記曰齊太倉令淳于公有罪當刑詔徙繫長安獄公無男有女五人將行罵曰生子不生男緩急非有益小女緹縈隨父至長安上書曰妾父爲吏齊中皆稱其廉平今坐法當刑妾願入官没爲婢贖父之罪書奏天子悲憐其意遂爲除肉刑漢書曰王章爲京兆尹爲大將軍王鳯所䧟下廷尉獄妻子皆收章小女年十二夜起號􅂘曰每旦獄上呼囚常至九今八而止我家君素剛烈先死者必我君也及明問之果章死矣東觀漢記曰孝女郁字叔異五歳母不能食郁亦不肯食故字曰異也後漢書曰孔融􅀍誅女年七歳㓜弱遂得全􅀉住佗舎王人有遺肉汁男飲之女曰今日之禍豈得乆活何賴肉味乎或有言於曹操収之將殺女謂兄曰􅀂死而有知得見父母豈非志願乃延頸就刑􅀳書曰周顗母李氏名絡秀汝南人少時在室顗父俊爲安東將軍時甞出獵遇雨至絡秀之家㑹秀父兄不在絡秀見周俊至與一婢於内宰猪具數十人饌甚精而不聞人聲俊怪使覘之獨見一女甚美因求爲妾其父兄不許絡秀曰門户殄瘁何惜一女􅀂連貴族將來庻有大益父兄遂許之生顗嵩謨而顗等才長絡秀謂之曰我屈節爲汝家妾門户計耳汝不與我家爲親吾亦何惜餘年顗等從命由此李氏遂得爲方雅之族又曰胡奮字玄威安定人爲護軍太始末武帝怠於政事而躭於顔色大採公卿女以爲六宫奮女選爲貴人唯有一男爲南陽王友早亡及聞女爲貴人哭曰老奴不死唯有二子男入九地之下女升九天之上甞謂后父楊駿曰卿恃女更豪耶見前代與帝家婚末有不滅門者見君所措益速禍耳駿曰卿女不在天子家乎奮曰我女爲卿作妾耳又曰羊躭妻辛氏字憲英魏侍中辛毗之女也聦明有才鍳􅀄文帝爲太子抱毗項曰知我喜否毗以告憲英英曰太子代君主社稷者也代君不可以不慼主國不可以不懼今冝慼而反喜何以能乆魏其不昌乎又曰􅉖懷太子妃太尉王衍之女字惠風太子廢衍請絶婚而歸惠風號泣行路流涕後劉曜䧟洛陽以惠風賜其下將妻之惠風抜劒拒曰吾太尉之女太子之妃誓不爲逆胡所辱遂害之又曰韋逞母宗氏家丗儒學母早䘮父躬飬之及長授以周官音義謂曰丗傳儒業無男可傳汝冝授之勿令絶丗又曰吴隱之字處黙濮陽人謝石請爲將軍主簿隱之將嫁女石知其儉素令移厨帳就其家經營使者至方見賣犬此外蕭然無辦又曰靳康女不知何許人美姿容有志操劉曜誅靳氏訖將納其女爲妾女曰陛下旣誅其父母焉用妾爲妾聞逆人之誅也尚汚宫伐樹况其子女乎號泣請死曜慙乃固免之晏子春秋曰齊景公有所愛槐樹令吏守之犯槐者刑傷槐者死有不聞令而犯之者吏收之將加罪犯者之女􅀃晏子曰妾聞明君不爲禽獸以殺人今君以樹木之故殺妾父􅀌妾身恐害明君之政損明君之義晏子早朝而復其言於君公乃令吏罷守槐之役出犯槐之囚華陽國志曰荀崧小女灌㓜有竒節崧爲襄城太守爲杜曽所圍力弱食盡欲投於故吏平南將軍石覽計無所出灌時年十三乃率勇士數十人踰城突圍夜出賊追甚急灌督厲將士且戰且前後得入曽陽山􅀗免得向覧乞師又爲崧書與南中郎將周訪仍結弟兄訪即遣子撫率三千人㑹石覽俱救崧賊聞兵至散走灌之力也又曰王廣女美姿容性慷􅁣有丈夫之節廣仕劉聦爲西楊州刺史蠻梅芳攻䧟楊州廣􅀍殺王年十五芳納之於闇室中擊芳不中芳曰何故反王曰蠻畜我誅父賊吾聞之父讎不同天母讎不同地汝逆害人父母復以無禮凌人吾所以不死者欲誅汝爾所恨不得梟汝首於通逹以塞大耻乃自殺又曰楊􅁎生自寒素父坐獄楊渙爲尚書郎告歸􅁎乃邀道扣渙馬訟父罪言詞慷􅁣涕泣摧感渙􅉖之語郡縣令爲出其父因竒其才爲子文方以禮聘之汝南先賢傳曰戴良字叔鸞嫁五女皆布裙無縁蔡琰別傳曰琰邕之女年六歲邕夜中鼓琴絃絶琰曰第二絃邕乃故絶一絃琰曰第四絃邕曰汝偶得中之琰曰昔吴季礼觀樂知國之興亡師曠吹律識南風之不競由此言之何得不知邕竒之異苑曰順陽南郷楊豊爲虎所噬女香年十四手無寸刄直搤虎頭父遂得免子壻爾雅曰子之夫爲壻壻之父爲姻兩壻相謂爲亞儀禮曰壻女子之夫傳曰何以服緦布之也左傳桓公曰􅀕仲專使其壻雍糾殺之雍􅁎知之謂其母曰父與夫孰親其母曰人盡夫也父一而巳胡可比焉遂告􅀕仲曰雍氏舎其室而將享子于郊吾惑之以告􅀕仲殺雍紏尸諸周氏之汪公載以出曰謀及婦人冝其死也又文下曰趙穿􅀳君之壻也論語曰子謂公治長可妻也雖在縲紲之中非其罪也以其子妻之南容三復白圭孔子以其兄之子妻之史記曰陳餘者大梁人好儒術數遊趙冨人公乗氏以其女妻之知餘非庸人漢書曰京房字君明東郡人習易淮陽憲王舅張􅀶從京房受學以女妻房房與相親後漢書曰馬融扶風人爲人美辝貌有俊才􅀄京兆摯恂以儒術教授隠于南山不應徴聘從其逰學通經籍恂遂竒融才以女妻之晉書曰韓謐字長深母賈氏賈充少女也父壽自德眞南陽人美貌充辟爲司空􅁺充讌賔僚女從青璅中窺見壽恱焉感想發於寤寐有婢徃壽家􅀃其光彩艶逸壽聞動心令通慇懃壽勁捷過人至夕踰垣而入家人莫知唯充覺女悅暢異於常日時西域有貢香毎着人衣一月不歇帝甚貴之唯以賜充女宻盗以遺壽僚佐與充宴聞香芬馥自此充意女與壽通乃夜半佯有盗驚起行之唯東北角有狐狸行處充考問女左右知之充遂因妻焉又曰郄鍳使門生求女壻於王導導令自東廂徧觀諸子門生歸謂鍳曰王氏諸少年並佳然聞信至咸自矜待唯一人在東床坦腹食獨􅀂不聞鍳曰此正佳壻也訪之乃羲之也宋書曰劉秀十餘歳時與諸兄戲忽有一大蛇來勢甚猛莫不驚怖秀知獨不動衆共異焉東海何承天雅相知器以女妻之齊書曰謝眺爲王敬則壻曽告敬則其女常懷刀欲報眺眺不敢相見及當拜吏部謙挹尤甚尚書郎范縝嘲曰卿人才無慙小選俱恨不可刑于寡妻眺有愧色及臨誅歎曰天道其不可昧乎我不殺王公因我而死三十國春秋曰前趙殷州刺史杜廣􅀄爲劉景廐卒以馬肥良引爲直士侍立通夜末曽休倦景因問之廣流涕申曲有章條景執其手曰吾罪人也乆􅀒賢者謂妻曰爲女求夫三年不􅁴厩中有麒麟於是妻之捜神記曰陽公字雍伯洛陽人至情篤孝父母終殁葬無終山陽公常爲人􅀘履終不取價無終山上無水陽公乃行車汲水作義漿居三年有一人就陽公飲出一􅂛石子與之使向有平好地有石處種之玉當生其中并得好婦陽公後種其石數年時徃看玉子生焉北平徐氏有女甚有名行人多求不許陽公有佚氣試求焉徐氏以爲狂乃戲媒人曰雍伯能得白璧一􅀟來當聽爲婚致命雍伯於種石中索得五􅀟白璧以至徐氏大驚遂以女妻之太平御覽卷第五百一十九
