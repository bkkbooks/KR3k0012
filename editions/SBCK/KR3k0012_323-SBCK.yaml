  text: 太平御覽卷第三百二十三
  hash: sha256:f1bd32197ff1fe47c3683ec7f69cccf294882c818ebabe36258157bf1292417b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_323-1a}
body:
  text: 兵部五十四敗易曰投戈散地六親不相能保禮記曰謀人之軍販則死之又曰魯莊公及宋人戰于乗丘馬驚敗績左傳曰凡師敵未陣曰敗某師皆陣曰戰大崩曰敗績得儁曰尅覆而敗之曰取某師京師敗績曰王師敗績于某又曰夫其敗也如日月之蝕何損於明又曰及齊師戰于乾時我師敗績又曰公及邾師戰于井陘我師敗績又曰鄭伯侵陳大獲徃歳鄭伯請成於陳五父諌曰親仁善鄴國之寳也陳侯不從故敗又曰晉侯及􅁗師戰于彭衙􅁗師敗績又曰宋師及齊師戰于獻齊師敗績又曰息侯伐鄭鄭伯與戰于境息師大敗而還君子是以知息之將亡也不度德鄭莊賢也不量力息國弱也不親親鄭息同姓之國不徴辭不察有罪言語相恨當明徴其辭以審曲直不宜輕闘犯五不韙韙是也而以伐人其䘮師也不亦冝乎又曰鄭師伐宋將戰華元殺羊食士食音嗣其御羊斟不與及戰斟曰疇昔之羊子爲政疇昔猶前日也今日之事我爲政與入鄭師故敗又曰狄人伐衛戰于滎澤衛師敗績衛侯不去其旗是以甚敗遂㓕衛史記曰管仲曰吾甞三戰三北鮑叔不以我爲怯知我有老母也又曰曹沬者魯人也以勇力事魯莊公爲魯將與齊戰敗三北魯莊公猶復以爲將又曰齊桓公許與魯㑹于柯而盟於壇上曹沬埶匕首刼齊桓公問曰子將何欲曹沬曰齊強魯弱大國侵魯亦以甚矣今魯城壞即壓齊境君其圖之桓公乃許盡還魯之侵地曹沬三戰所亡盡復于魯案魯連與燕將書曰曹子爲將三敗三北亡地五百里向使曹子計不及顧義不旋踵刎頸而死則亦不免爲敗軍擒將矣曹子棄三北之恥而退與魯君討桓公朝天下㑹諸侯三戰之所亡一朝而復之天下震動諸侯驚駭威加呉越又晉丗家曰襄公墨經四月敗􅁗師于殽虜􅁗王將孟明視西乞術白乙丙以歸遂墨以葬文公夫人􅁗女謂襄公曰􅁗欲得其三將戮之公許遣之先􅎮聞之謂襄公曰患生矣􅎮追􅁗將渡河巳在舡中頓首謝卒不及後三年􅁗果使孟明等伐晉報殽之敗也後漢書曰建武三年春正月甲子以偏將軍馮異爲征西大將軍杜茂爲驃􅀐大將軍大司徒鄧禹及馮異與赤眉戰于回谿禹敗績後閏九月乙巳馮異與赤眉戰於崤底大破之又曰鄧禹與赤眉戰敗帝徴禹還勑曰赤眉無􅂖自當來東吾折捶笞之非諸將憂也無得進兵禹慙於受任而功不遂數以飢卒徼戰輙不利徼古堯切又曰鄧禹與車􅀐將軍鄧弘擊赤眉遂爲所敗衆皆死散禹獨與二十四􅀐還詣冝陽謝上大司徒梁侯印綬有詔歸侯印綬數月拜右將軍又曰鄧弘與赤眉大戰移日赤眉佯敗棄輜重走車皆載土以豆覆其上兵士飢争取之赤眉引兵還擊弘􅀪軍潰亂馮異與禹合兵救之赤眉小却異以士卒飢倦可且休禹不聽復戰大爲所敗又曰龐萌反攻殺楚郡太守引軍襲敗盖延延走北渡泗水破舟擑壞津梁僅而得免又曰公孫瓉爲􅀽紹所圍遣子續求救于黒山賊張燕燕率兵十萬三道來救瓉未及至瓉乃宻使行人齎書告續曰昔周末䘮亂僵屍蔽地以意而推猶爲否也不圗今日親當其鋒􅀽氏之攻􅃺􅀂􅀑神梯衡舞於樓上鼔角鳴於地中日窮月急不遑啓處汝當碎首於張燕馳以告急父子天性不言而動言相感也且厲五千鐵􅀐於北隰之中下隰曰隰起火爲應吾當自内出􅁬揚威武决命於斯不然吾亡之後天下雖廣汝欲求安足之地其可得乎紹􅀱得其書獻帝春秋候者得書紹使陳琳昜其詞即此書如期舉火瓉以爲救至遂便出戰紹設伏瓉遂大敗復還保小城自計必無全乃悉縊其姉妹妻子然後引火自焚魏志曰太祖在長安使曹仁討􅀜羽於樊又遣于禁助仁秋大霖􅀨漢水溢平地水數丈禁等七軍皆没禁與諸將登髙望水無所廽避羽乗大舟就攻禁遂降㑹孫權擒羽獲其衆禁復在呉文帝踐祚權稱藩遣之帝引見禁􅂡髮皓白形容憔悴泣涕頓首帝慰喻以荀林父孟明視之事魏書詔曰昔荀林父敗績於邲孟明喪師於郩晉秦不替使復其位後晉獲狄士􅁗覇西戒區區小國猶尚􅀂斯而况萬乗乎樊城之敗水災􅁀至非戰之咎也其復禁等官拜安逺將軍晉書曰陸機河橋之戰始臨戎而牙旗折意甚惡之列軍自朝歌至于河橋鼓聲聞數百里􅗛魏以來出師之盛未甞有也長沙王乂奉天子與機戰於鹿苑軍大敗赴七里澗而死者如積焉又曰張駿爲凉州牧西域長史李栢請討叛將趙真爲真所敗議者以栢造謀致敗請誅之駿曰吾每念漢丗宗之殺王恢不如􅁗穆之赦孟明竟以减死論群心咸恱又曰孫恩爲劉􅁉所擊窮蹙乃赴海自沉妖黨及妓妾謂之水仙投水從死者百數餘衆以恩妹夫盧循爲主又曰盧循旣敗走召妓妾問曰我今將自殺誰能同者多云雀䑕貪生就死實難有云官尚當死某豈願生於是悉配諸辭死者因投于水同黨盡誅又曰符堅敗走劉牢之進屯鄄城討諸未服河南諸城堡承風歸順者甚衆符堅子丕據鄴爲慕容垂所逼請降牢之引兵救之垂聞軍至出新興城北走牢之與沛郡太守田次追之行二里至五橋澤中急取輜重軍稍亂爲垂所擊牢之敗績士卒殱焉牢之䇿馬跳五丈澗得脫㑹丕救至因入臨濟集亡散兵復少振牢之以軍敗徴而還又曰符堅敗壽春單􅀐遁還於淮北飢甚人有進壷食豚髀者堅食之大恱曰昔公孫豆粥何以加也命賜帛十疋又曰母丘儉文欽反司馬景王遣鄧艾督太山諸軍屯樂嘉欽將攻艾景王䘖枚徑造樂嘉欽子鴦年十八勇冠三軍謂欽曰及其未定請登城鼓譟擊之可破也旣謀而行三譟而欽不能應鴦退相與引而東景王謂諸將曰欽走矣發銳軍以追之諸將曰欽舊將鴦小而銳引軍内入未有失利必不走也王曰一鼓作氣再而衰三而竭鴦三鼓而欽不應其勢已屈不走何待欽將遁謂鴦曰不先折其勢不得去也乃與􅀐十餘摧鋒䧟陣所向皆披靡遂引去王遣驍􅀐八千翼而追之欽父子與麾下走保項儉聞欽敗棄衆霄遁淮南安風津都尉追儉斬之又曰符堅率衆百萬屯壽陽列陣淝水謝􅀇謂符融曰臨水爲陣是不欲速戰請君稍却堅遂麾使陣退衆因亂不能止􅀇以精銳决戰堅衆奔潰聞風聲鶴唳皆以爲王師至草行露􅀫飢凍以死獲堅乗輿雲母車軍資山積又曰符堅望八公山上草木皆􅀋人形又見王師部陣謂融曰此亦勍敵也憮然有懼色及敗軍􅀐遁于淮北飢甚人有進壷飱者曰臣聞白龍厭天地之樂而見困豫且今蒙塵之難豈自天乎晉中興書曰謝琰爲㑹稽内史督五郡事隆安四年孫恩攻上虞進及刑浦上黨太守張䖍碩戰敗于刑浦人情震懼群賊銳進咸以冝持重嚴備且列水軍於南湖又應分軍設伏以待之琰不聽外白賊至時尚未食琰曰要先滅此宼而後食耳跨馬而出廣武將軍桓寳爲前鋒果敢能戰殺賊甚多而塘路迮狹魚貫不聚賊於艦中傍射前後断絶琰至千秋亭與二子肇峻俱􅀍害寳亦死之又曰劉道規及下邳太守孟懷玉等與桓􅀇戰於峥嶸洲義軍乗風縱火盡銳争先􅀇衆大潰燒輜重夜遯􅀇故將劉統馮雅等聚黨四百人掩没潯陽城建威將軍劉懷肅討平之其黨自相斬以降􅀇入江陵太守馮談􅂆使更下戰􅀇欲歩出漢川投梁州而人情崩阻不可復合益州刺史毛璩弟璠卒璩使其從孫祐之叅軍費恬送璠喪葬江陵璩弟子脩之爲􅀇屯􅀐校尉􅀇計窮欲走漢中脩之誘以入蜀遂與石康等乗艦泝江數十里恬與祐之迎擊􅀇益州督護馮遷斫􅀇􅀇曰是何人耶敢殺天子遷曰欲殺天子之賊耳遂斬􅀇首并石康等五級庚頥之及殿中監萬盖丁仙期皆死之􅀇年六十息昇六歳云我是豫章王諸軍勿見殺遂送至江陵市斬之三十國春秋曰後燕慕容垂遣其子寳歩􅀐七萬伐後魏戰於叅合陂大敗寳以數千􅀐奔免士衆還者十一二寳恨叅合之敗屢言魏有可乗之機由是自率大衆伐魏至叅合見徃年戰處積骸如山設吊􅀕之禮死者父兄一時號哭軍中皆慟垂慙憤嘔血因而寢疾却還道卒宋書曰晉安王子勛舉兵潯陽宋將殷孝祖討之時賊據赭析赭音者孝祖將進攻之與賊合戰常以鼔盖自隨軍中人相謂曰殷統軍可謂死將矣今與賊交鋒而以羽儀自摽顯􅀂此射者十手攅射欲不斃得乎是日於陣中流矢死又曰王􅀇謨北圍滑臺爲魏軍所追大破之流矢中臂二十八年正月還至歷城義恭與􅀇謨書曰聞因敗爲成臂上瘡將非金印之徴邪梁後略曰丙午軍帥蕭方等至于長沙河東王譽率左右七千人置陣登髙以禦之方等兵精衆盛暗江水滿争來赴戰俄尔之間方等衆潰譽軍以􅀐汩之悉皆透水方等與左右二百餘人馳徃赴舟舟中之指可掬方等溺于江中通典曰東魏大將齊神武與西魏大將周文帝戰印山時周文見齊神武出旗鼓識之乃暮敢勇士三千令賀抜勝㹅之犯其軍適與齊神武相遇時募士皆用短兵接戰勝逐齊神武數里刃垂及之㑹勝馬爲流矢所中死比副􅀐至齊神武已逸去隋書曰髙麗之役之使宇文述進軍東濟薩水去平壤城三十里因山爲營乙支文德復遣使僞降請述曰􅀂旋師者當奉髙元朝行在所述見士卒疲弊不可復戰又平壤嶮困卒難致力遂因其詐而還衆半濟賊擊後軍於是大潰不可禁止九軍敗績一日一夜還至鴨渌水行四百五十里初渡遼九軍三十萬五千人及還至遼東城唯二千七百人帝怒以􅄒等屬吏至東都除名爲民唐書曰屈突通將自武􅀜趍藍田以赴長安軍過潼􅀜爲劉文静所遏不得進相持月餘通又令顯和以歩􅀐萬人夜襲文静詰朝大戰義軍不利顯和縱兵入我二柵而戰者徃復數焉文静爲流矢所中義軍氣奪垂至於敗而文静遊軍數百􅀐自南山而來擊其背顯和大販疋馬而歸通勢弥蹙自摩其頸曰要當爲國家受人一刀耳勞勉將士未嘗不流涕人亦以此懷之又曰安禄山之亂哥舒翰領兵馬歩十五萬賊將崔乾祐㑹戰初哥舒翰造氊車以氊􅂪其車以馬駕之􅀞以龍虎之􅃺五色相宣以金銀飾其􅀞獸之目及􅀲將衝戰焉因其驚駭擬從而椅角攅戈矢而逐之賊知其計積薪蒭於隘路􅀱氊車至順風縱火焚之駕馬奔駭燒氊車薪蒭煙焰昬黒兩軍不相辯我師謂賊軍在煙熖中遂集弓弩併力射之賊軍抽退盡日矢盡方覺無賊我師衆從􅀜門六七十里路狹北抵黄河南是古岸排蹴進不得賊抽軍從南山設疑曵柴楊塵以同羅詣直習險直透黄河古岸撗截我師我師敗績沉河而死十有二三又曰潼􅀜之戰哥舒翰在河北髙阜上觀軍陣進退之勢于時有般粮舡在河北岸左右言取舡渡兵可得遂令將舡百餘􅃗到南岸渡人舟中之指可掬登舡争渡者不可勝數毎備即沉如是登舡沉者數十渡餘軍盡散走還入􅀜三國典略曰齊師旣敗軍士奔至江者􅅞荻爲筏多􅀍没溺浮屍翳江至于京先是童謡曰虜馬萬疋入南湖城南酒家使虜奴至是梁軍士以齊兵質酒一人􅂊得一醉又曰周武伐齊齊主亦於壍北列陣謂髙阿郍肱曰戰是耶不戰是耶郍肱曰不如勿戰却守髙梁橋安吐根曰一把子賊馬上刺取擲著汾陽中諸内叅曰彼亦天子我亦天子彼能懸軍逺來我何爲守壍示弱齊主曰此言是也使讓郍肱曰尓富貴足惜性命􅁘乃填壍南引帝大喜齊主親戰東偏頗有退者淑妃怖曰軍敗矣穆提婆進曰大家去大家去齊主以淑妃奔髙梁􅀜奚長樂諌曰半進半退戰家常體今兵衆全整未有傷敗陛下捨比安之御馬一動人情驚擾願速還安撫齊主將從之穆提婆引其肘月曰言何可信齊衆大潰軍資甲仗數百里間委棄山積在陣死者八千餘人齊主夜走至洪洞戍又曰周遣大將軍王􅁤破陳於吕梁擒其司空南平郡公呉明徹北徐州刺史董安公程文季等俘斬三萬餘人􅀄䡄潜於清水入淮口多堅大木以鐵鎻貫車輪撗截水流遏斷舡蕭摩訶謂明徹曰聞王䡄正鏁下流其兩邊築城今尚未立􅀂見遣擊之彼必不敢相拒彼城􅀂立則吾屬且爲虜矣明徹乃􅁬髯曰搴旗䧟陣將軍事也長筭逺略老夫事也摩訶失色而退一旬之間我兵益至摩訶又請明徹曰今求不得進退無路􅀂潜軍突圍未足爲耻願公率歩乗車輿徐行摩訶領鐵􅀐數千􅀐前後必當使公安逹京邑明徹曰弟之此計乃良圖也然老夫受脤專征不能戰勝攻取今􅀍圍逼慙寡無地且歩軍旣多吾爲惣督必湏身居其後相率兼行遂欲破堰大軍以舫載馬北譙州刺史裴子烈議曰􅀂決堰下舡舡必順倒不如前遣馬出於事爲允㑹明徹疾篤知事不濟遂從之乃遣摩訶率馬數千前還明徹决堰乗水而退至清口水勢漸微舡礙車輪並不得度䡄圍而蹙之明徹力窮就執陳之銳卒於是殱焉衛公兵法曰或􅀂軍有賢智而不能用者敗上下相親而各述己長者敗賞罰不當而衆多怨言者敗知而不敢擊不知而擊之者敗利地利不得而卒多戰阨者敗勞逸無别不曉車􅀐之用者敗覘􅃸不審而輕敵懈怠者敗行於險道而不知􅀷溝絶澗者敗陣無選鋒而竒正不分者敗凢此十敗非天之殃將之過也夫兵者乍千日而不使不可一時而不勝故白起對秦王曰明王愛其國忠臣愛其名寜伏其重誅不忍爲辱軍之將又嚴顔謂張飛曰卿等無􅃺侵奪我州有斷頭將軍無降將軍也故二將咸重其名節寜就死而不求生者盖知敗衂之恥斯誠甚矣􅀃苑曰晉荆戰於邲晉師敗績荀林父將歸請死景公將許之士貞伯曰不可城濮之役晉勝于荆夫文公猶有憂色曰子玉猶存憂未歇也困獸猶􅋐况國相乎及荆殺子玉乃憙今天或者大警晉也林父之事君進思盡忠退思􅀘過社稷之衛也今殺之是重荆勝也景公曰善乃使復將潘安仁汧馬督誄序曰昔乗兵之戰縣賁父御魯莊公馬驚敗績賁父曰他日未甞敗績今而敗績是無勇也遂死又曰偏師禆將殞首覆軍者蓋以十數太平御覽卷第三百二十三
