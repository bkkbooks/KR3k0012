  text: 太平御覽卷第五百九十六
  hash: sha256:e77af0a408c56154c0bf304fe111ed230c368c7ebf820418dc3eacfd4a8b65ff
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_596-1a}
body:
  text: 文部十二誄弔文哀辭哀䇿誄釋名曰誄累也累列其事而稱之也􅀃文曰誄謚也周禮春官下曰太史掌建􅀖之六典大䘮執灋以涖勸防鄭司農云勸防引六紼遣之曰讀誄累其行而讀之而之謚也凢䘮事孜焉爲有得失小䘮賜謚小喪卿大夫也禮記檀弓曰魯哀公誄孔丘曰天不慭遺一老莫相予位焉嗚呼哀哉尼父曾子問曰賤不誄貴㓜不誄長禮也唯天子稱天以誄之諸侯相誄非禮也又檀弓上曰魯莊公及宋人戰于乗丘縣賁父御卜國爲右馬驚敗績公墜佐車授綏公曰末之卜也縣賁父曰它日不敗績而今敗績是無勇也遂死之三人赴敵而死圉人浴馬有流矢在白肉公曰非其罪也流矢中馬非御與右之罪遂誄之士之有誄自此始也傳曰誄者累其行迹而爲之謚也漢書曰景帝中二年春二月令諸侯王薨列侯􅀄封及之國大鴻臚奏謚䇿應劭曰諸侯王皆屬大鴻臚故薨奏其行亦賜與謚及哀䇿誄文也列侯薨及諸侯太傅􅀄除之官大行謚奏誄䇿師古曰大鴻臚本名典容行大令即典客之屬其行也官後政曰大行令如淳曰三公薨以䇿書誄其行東觀漢記曰杜篤字季雅客居羙陽與羙陽令遊數從之請託不諧頗相恨令怒收篤送京師㑹大司馬呉漢薨丗祖詔諸儒誄之篤於獄中爲誄辭最髙帝羙之賜帛免刑魏志明帝詔曹植曰吾旣薄才至於賦誄特不閑從兒陵上還哀懷未散作兒誄爲田家公語耳荅曰奉詔并見聖思所作故平原公主誄文義相扶章章殊興句句感切哀動聖明痛貫天地楚王臣彪等聞臣爲讀莫不揮涕晉中興書郗超死之日貴賤操筆爲誄者四十餘人其爲物所宗如此齊書曰謝超宗有名譽善屬文爲新安王子鸞國常侍王母殷淑儀卒超宗作誄奏帝大嗟賞謂謝莊曰超宗殊有鳯毛文章流别傳曰詩頌箴銘之篇皆有徃古成文可放依而作惟誄無定制故作者多異焉見於典籍者左傳有魯哀公爲孔子誄文心雕龍曰周丗盛德有銘誄之文士大夫之才臨䘮能誄誄者累其德行旌之不朽也夏啇以前其詳靡聞周雖有誄未􅀍於士又賤不誄貴㓜而不誄長其萬乗則稱天以誄之讀誄定謚其節文大矣自魯莊戰乗丘始及於士迨尼父之卒哀公作誄觀其慭遺之辭嗚呼之歎雖非叡作古式存焉至栁妻之誄惠子則辭哀而韻長矣曁于漢丗承流而作楊雄之誄元后文實煩穢沙鹿撮其要而執疑成篇安有誄德述遵而闊略四句乎杜篤之誄德有譽前代呉誄雖工而結篇頗踈豈以見稱光武而頋眄千金哉傅毅所製文體倫序孝山崔瑗辦㓗相叅觀其序事如傳辭靡律調固誄之才也潘岳搆意專師孝山巧於叙悲易入新麗所以隔代相望能徴厥聲者也至如崔駰誄趙劉陶誄黃並得憲章貴在簡要陳思功名而體實繁緩文皇誄末百言自陳其乖甚矣􅀂夫殷臣誄湯追褒玄鳥之祚周史歌文上闡后稷之烈誄述祖宗盖詩之則也至於序述哀情觸􅀋而長􅀓毅之誄北海云白日幽光雰霞杳􅁳始序致感遂爲後式影而效者弥取於切矣詳夫誄之爲制盖遐言以録行傳體而頌文榮始而哀終論其人也瞬乎􅀂可覿送其哀也悽焉如可傷此其旨也文心雕龍曰陳思之文群才之儁也而武帝誄云尊靈永蟄明帝頌云聖體浮輕輕浮有似於蝴蝶永蟄頗擬於昆蟲施之尊極不其􅃖乎南史宋謝莊作宣貴妃誄曰賛堯門方之漢釣弋也及廢帝即位下莊于獄曰卿作此誄時知有東宫否列女傳曰栁下惠死門下將誄之妻曰將述夫子德耶二三子不􅀂妾之知之乃爲誄曰夫子之信誠與人無害兮嗚呼哀哉魂神泄兮夫子之謚冝爲惠兮門人從之丗􅀃曰孫長樂作王長史誄云余與夫子交非勢利心猶淡水同此玄昧孝伯見云才士不遜亡祖何至與此人周旋又曰謝太傅問主簿陸退張慿何以作母誄陸荅曰故當是丈夫之德表於事行婦人之美非誄不顯弔文文心雕龍曰弔者至也詩云神之吊矣言神至也君子令終定謚事極理哀故賔之慰主亦以至到爲言也壓溺乖道所以不弔矣又宋水鄭火行人奉辭國災人亡故同弔也及􅀳築虎臺齊襲燕城史趙􅂫􅁗翻賀爲弔害民構怨亦亡之道凢斯之例弔之所設也或驕貴以殞身或狷介以乖道或有志而無時或行羙而兼累追而慰之並名爲弔自賈􅁩浮湘發憤而弔屈體周而事覈辭清而理哀盖首出之作也及相如之弔二世全爲賦體桓譚以爲其言惻愴讀者歎息及卒章意要切斷而能悲也楊雄序屈思積功寡意深文略故辭韻沉膇班彪蔡邕並敏於致詰然影附賈氏難爲並驅耳故胡阮之弔夷齊褒䘮而無文仲宣所製譏呵實工然則胡阮嘉其清王子傷其隘各其志也祢衡之弔平子縟麗而輕清陸機之弔魏武詞巧而文繁降斯巳下未有可稱者矣夫弔雖古義而華辭未造華過韻緩則化而爲賦固冝正義以繩理昭德而塞違析割褒貶哀而有正則無奪倫矣左傳莊十一年曰秋宋大水公使弔焉曰天作􅁋雨害於粢盛􅀂之何不弔對曰􅀌實不敬天降之災又以爲君憂拜命之辱臧文仲曰宋其興乎禹湯罪巳其興也㪍焉桀紂罪人其亡也忽焉且列國有凶稱􅀌禮也言懼而名禮其庶乎史記曰相如從上至長楊還過冝春宫奏賦以哀二世行失也其辭曰東馳工山兮北揭石瀬弭節容與兮歴弔二世持身不謹兮亡國失勢信䜛不寤兮宗廟滅絶墳墓蕪穢而不修䰟無歸而不食漢書曰楊雄怪屈原文過相如至不容作離騷自投江而死悲其文未嘗不流涕也君子遇不遇命也何必沉身哉迺作書徃徃撫離騷文而反之自岷山投諸江流以弔屈原名曰反騷祢衡别傳曰南陽㓂栢松記劉景􅂛當蹔小岀屬守長胡政令給視之栢松父子􅀫與政不佳景􅂛不在栢松子在後羅人盗迹胡政無狀便尔殺之景升還慙悼無巳即治殺胡政爲作三牲醊焉正平爲作板書弔之時當行在焉上駐馬授筆􅀝柱而作之祢衡弔張衡其辭曰南岳有精君誕其姿清和有理君逹其機故能下筆繡亂揚手文飛昔伊尹值湯吕尚遇旦嗟矣君生而獨植漢倉蠅爭飛鳯凰巳散元􅀛可羈河龍可絆石堅而朽星華而滅唯道與隆悠悠永絶靡滯君音與浮河水有竭君聲永流周旦先没發夣孔丘余生雖後身亦存遊士貴知巳君其勿憂糜元弔比干曰余旣詰紂之後又感比干亢辭進諌不顧其身而受刳屠之戮殺身之後紂不悔寤􅃴足快凶君之心而無益於世故復責而弔之糜元弔夷齊曰少承洪烈從戎子王側聞先生餓於首陽敢不敬弔􅀉之山岡嗚呼哀哉夫五德更運天秩靡常如有絶代之主必有受命之王故堯終于虞舜禹殄於成湯且夏后氏之末祀亦殷氏之所亡􅀂周武爲有失則帝乙亦有傷子不棄殷而餓死何獨背周而深藏所行誰路而子渉之首陽誰山而子匿之彼薇誰菜而子食之行周之道藏周之林讀周之書彈周之琴飲周之水食周之茶而謗周之主謂周之淫是誦聖之文聽聖之音居聖之世而異聖之心束晢弔蕭孟恩文曰東海蕭惠孟恩者父昔爲御史與晢先君同僚孟恩及晢旦夕同遊分義早著孟恩夫婦皆亡門無立胤時有伯母從兄之憂未􅀗自徃致文一篇以弔其魂并修薄奠其文曰舊友人陽平束晢謹請同業生李察奉腵脩一束麥糒一器以致詞于處士蕭生之墓曰嗚呼哀哉精爽遐登形骸幽匿有耶亡耶莫之能測敬薦薄饋魂兮來食孟恩孟恩豈猶我識束晢弔衛巨山曰元康元年楚王瑋矯詔舉兵害太保衛公及公四子三孫公丗子黃門郎巨山與晢有交好時自本郡來赴其䘮作弔文一篇以告其柩曰同志舊友陽平束晢頃聞飛虎肆􅁀竊矯皇制禍集于子宗祊幾滅越自兾方來赴來􅀕遥望子弟銘旌藂立旣闚子庭其殯盈十徘􅆦感慟載號載泣歛􅃑升階子不我楫引􅃑授祛子不我執魂兮魂兮於焉栖集李充弔嵇中散曰先生挺邈世之風資髙明之質神蕭蕭以宏逺志落落以遐逸忘尊榮於華堂括卑静於蓬室寜􅃮園之逍遥安柱下之得一􅀉欣孤松取樂竹林尚想榮莊聊與抽簮味孫觴之濁醪鳴七􅁌之清琴慕義人於􅀇旨詠千載之徽音凌晨風而長嘯託歸流而永吟乃自足於丘壑孰有愠乎陸沉馬樂厚而翹足􅀛恱塗而曵尾疇廟堂之是榮豈和鈴之足視乆先生之所期差玄逹於遐旨尚遺大以岀生何殉小而入死嗟乎先生逢時命之不丁兾後凋於􅀊寒遭繁霜而夏零滅皎皎之玉質絶琅琅之金聲投明珠以彈雀􅂢所重而爲輕諒心不爽非大雅之所營􅀽宏友李氏弔嵇中散曰宣尼有言曰唯仁者能好人能惡人自非賢智之流不可以褒貶明德擬議英哲矣故彼􅄞中散之爲人可謂命丗之傑矣觀其德竒偉風韻劭邈有似明月之暎幽夜清風之過松林也􅀂夫吕安者􅄞子之良友也鍾㑹者天下之惡人也良友不可以不明明之而理全惡人不可以不拒拒之而道顯然夜光匪與魚目比暎三秀難與朝華争榮故布皷自嫌於雷門礫石有忌於琳琅矣嗟乎道之䘮也雖智周萬物不能遣絶糧之困識逹去留不能違顚沛之艱故存其心者不以一􅌌累懷檢乎跡者必以纎芥爲事逹人之獲譏懼髙範之莫全凌清風以三歎予撫兹而悵焉聞先􅁴之髙唱理極滯其必宣候千載之大聖期百五之明賢聊􅀉憤於斯章思慷􅁣男兒而􅊄然哀辭文章流別傳曰哀辭者誄之流也崔瑗􅂫順馬融等爲之率以施於童殤夭折不以壽終者建安中文帝臨菑侯各失稚子命徐幹劉禎等爲之哀辭哀辭之體以哀痛爲主縁以歎息之辭文心雕龍曰哀者依也悲實依心故曰哀也以辭遣哀盖下流之悼故不在黃髮必施夭昬昔三良殉􅁗百夫莫贖事均夭枉黃鳥賦哀抑亦詩人之哀辭乎漢武封禪而霍嬗暴亡哀傷而作詩亦哀辭之􅀋也降及後漢汝陽主亡崔瑗哀辭始變前式然腹穾􅀑門恠而不辭駕龍乗雲僊而不哀又卒章五言頗似歌謡亦髣髴乎漢武也至於顯順張􅂛並述哀文雖發其華而未極心實建安哀辭唯偉長差善行女篇時有惻怛及潘岳繼作實鍾其羙觀其慮瞻辭變情洞悲苦叙事如􅀓結言摹詩促節四言鮮有緩句故能義直而文婉體舊而趣新金鹿澤蘭莫之或繼也原夫哀辭大體情主於痛傷而辭窮乎愛惜㓜未成性故興言止於察惠弱不勝務故悼惜加乎容色隱心而結文則事愜觀文而屬心則體奢體奢爲辭則雖麗不哀必使情徃㑹悲文來引泣乃其貴耳班固馬仲都哀辭曰車騎將軍順文侯馬仲都明帝舅也從車駕於洛水浮橋馬驚入水溺死帝謂侍御史班固爲馬上三十歩哀辭南史曰劉孝綽三妹一適東海徐悱文尤清壯所謂劉三娘者也悱爲晉安郡卒䘮還建業妻爲􅀕文詞甚悽愴悱父勉欲爲哀辭見之乃閣筆三國典略曰齊文宣崩楊愔選其挽歌令樂署歌之其魏收四首陽休之祖珽劉逖各二首盧思道八首入用於是晉陽人謂思道爲八采盧郎北營刺史李愔戯謂逖曰盧八問誶劉二逖每衘之至是愔上感思賦自陳文宣之丗遭遇䜛譛逖爲帝奏其文誹謗先帝齊主怒令鞭之逖喜曰髙搥三十熟鞭之百何如喚劉二時哀䇿文章流別傳論曰今所哀䇿者古誄之義丗􅀃曰王東亭夢人以大筆與之如椽子大􅁴曰當有大手筆事少日烈宗崩哀䇿謚議皆王所作國朝傳記曰禇遂良爲太宗哀䇿文自朝還馬誤入人家而不􅁴也又曰崔融司業作武后哀文因發疾而卒時人以爲三二百年來無此文太平御覽卷第五百九十六
