front:
  text: 太平御覽卷第四百七十三
  hash: sha256:39f0995c3a9bc490d386ba185160e7e8e2c03d8963a0548c1e57f7251bb540dd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_473-1a}
body:
  text: 人事部一百七十三遊俠漢書曰意氣髙作威於丗謂之遊俠又曰背公死黨之義成守節奉上之義廢又曰朱家魯人魯皆儒教而朱家用俠聞諸所嘗施唯恐見之賑人不贍先從貧賤專趍人之急自􅀜而東莫不延頸願交焉又曰楚田仲以俠聞父事朱家田仲死而有雒陽劇孟以任俠顯呉楚反時條侯爲太尉乗傳東至河南得劇喜曰呉楚舉大事而不求孟吾知其無能爲也天下騷動􅌠相得之若一敵國而劇孟行大􅀋朱家孟母死自逺方送䘮車盖千乗又曰郭解河内軹人字伯翁善相者許􅀒外孫也解父以任俠孝文時誅死解爲人短小精悍不飲酒少時隂賊感槩不快意身所役甚衆以軀借支報仇藏亡令作姦剽刼不休及鑄錢掘􅃁不可勝數年長更折節爲儉以德報怨厚施薄望然其自喜爲俠益甚解姉子􅀒解之􅀔與人飲之嚼徐廣曰盡酒也音子妙反非其任強灌之人怒抜刀刺殺解使人徵之賊窘自歸且以實告解解曰公殺人當吾兒不直遂去諸公聞之皆多解之義益隱焉戰國策曰韓傫相韓嚴遂重於君二人相害也嚴遂正議直指舉韓傫之過韓叱之於朝嚴遂拔劒趍之於是懼亡去求人可以報韓傫者至齊人言聶政勇敢士也避仇隱於屠肆之間嚴遂隂交於政以意厚之政母死旣䘮除政曰嗟乎政乃市井之人鼓刀以屠而嚴仲子乃諸侯之卿相也不逺千里枉車騎而交臣舉百金爲親壽我雖不受然是深知政也至濮陽見嚴仲子曰前日所以不許子曰徒以親也親今不幸死仲子所欲報者爲誰仲子具告之政獨行拔劒至韓韓適有東孟之㑹韓王及相皆在焉持兵㦸而衛者甚衆政直入上階刺韓傫傫走而抱哀侯聶政刺之兼中哀侯左右大亂又曰大史公曰吾嘗過薛其俗閭里多􅁀桀子弟與鄒魯殊問其政曰孟常君招致天下任俠姦人薛中盖六萬家矣又曰鄭衛俗與趙伯􅀋濮上之邑徙衛野王縣也王好氣任俠衛之風也又曰寗成抵罪得脫乃詐刻傳岀􅀜歸家稱曰仕不至二千后賈不至千萬安可比人乎乃貫貸買陂田千餘頃役使數千家數年産至千金爲任俠其役民重於郡守又曰列國時魏有信陵趙有平原齊有孟嘗楚有春申皆藉王公之􅀔悉爲遊俠鷄鳴狗盗無不賔禮而趙相虞卿弃國􅂢君以周窮支魏齊之厄信陵無忌竊符矯命殺將專師以赴平原之急皆以取重諸侯顯名天下搤腕而遊談者以四豪爲稱首又曰季布爲人任俠有名項籍滅髙祖購求布千金敢舎匿罪三族布匿濮陽周氏周氏曰漢求將軍急且至能聽臣敢進計布許之迺髠鉗布衣􅄄置廣柳車中而共其家僮數十人之魯朱家所賣之朱家心知其季布也置田舎乃之雒陽見汝隂侯􅅬公說曰季布何罪臣各爲其主項氏臣豈可盡誅耶今上始得天下而以私怒求一人何示不廣且以季布之賢漢求之急如此不北走胡則南走越耳夫忌壯士資敵國此伍子胥所以鞭平王之墓也君何不從容爲上言之滕公心知朱家大俠意布匿其所迺許諾侍間果言如朱家指上乃赦布又曰布弟季心氣盖􅀜中遇人恭謹爲任俠方數千里士争爲死又曰孝文時鄭當時以任俠自喜孝景時爲太子舎人每五日洗沐常置驛馬長安郊請謝賔客夜以􅁇日常恐不遍當時好黄老其知友皆天下有名之士又曰􅀽盎爲楚相免家居與閭里闘雞走狗雒陽劇孟嘗過盎盎善待之安陵冨人有謂盎曰吾聞劇孟愽徒將軍何自通之盎曰孟雖愽徒然母死客送䘮車千餘乗此亦有過人者又曰灌夫爲人剛直使酒不好靣䛕貴戚權􅀔在巳之右欲必凌之在巳之左尤益禮待稠人廣衆薦寵下士士亦以此多之不好文學喜任俠重然諾所與交通無非豪傑大猾也又曰公孫賀子聲以皇后姉子嬌奢不奉法征和中擅用北軍錢千九百萬發覺下獄是時捕陽陵朱安丗不能得求之賀請逐捕安丗以贖聲罪上許之安丗者京師大俠也聞賀欲以贖子􅀏曰丞相禍及宗矣從獄中上書告聲與陽石公主私通及使巫􅀕祠上幸甘泉當馳道埋偶人祝詛有惡言下有司案驗賀窮所犯遂父子死獄中又曰睦弘字孟嘗國畨人少時遊俠闘鷄走狗長乃變節從羸公受春秋羸公姓字以明經爲議郎至符節令又曰朱愽字子元杜陵人家貧少時給事縣爲亭長稍遷功曹任俠好交從士大夫不避風雨又曰萬章字子夏長安熾盛街閭各有豪俠章在城西柳京號曰城西萬子夏爲京兆尹門下督從至殿中諸侯貴人争欲揖章莫與京兆言者又曰婁護字君卿是時王氏方盛賔客滿門兄弟争其客各有所厚唯誰盡入其門咸得其懽心結士大夫無不傾心交長者尤見親禮爲人短小精辯論議常依名節聽之者皆竦㑹母死送葬致車千兩又曰陳遵字孟公杜陵人身長八尺餘容皃甚偉性善書與人尺牘主皆藏去以爲榮時列侯有子與遵同姓字者每至人門曰陳孟公坐中莫不震動旣至而非因號曰陳驚坐又曰原渉爲谷口令時年二十餘谷口聞其名不言而治人甞置酒請渉入里門客有道渉所知母病避疾在里宅者渉即往􅀱叩門哭因問以䘮事家無所有渉乃削牘爲䟽具記衣􅀍飯含之物分付市買日跌皆㑹其周急待人如此後人有毁渉者乃姧人之雄䘮家子即時刺殺又曰卭成太后外家王氏貴而侍中王林卿通輕俠傾京師後坐法免賔客愈盛又曰漢興禁網踈闊外戚大臣魏其武安之屬競逐於京師遊俠劇孟郭解之徒馳騖於閭閻荀恱漢記曰立氣􅀔作威福結私交以力強於時者謂之遊俠又曰俗有三遊德之賊也一曰遊俠二曰遊說三曰遊行亂之所由生也傷道害德敗法惑時先王之所慎也東觀漢記曰郅惲之友董子張父及叔爲郷里盛氏一時所殘害子張病困將終惲往􅀱張張視惲歔郗惲曰吾知子不悲天命長短而痛二父讎不復也惲即將客遮仇人取其頭以示張張憙氣因絶惲見令以狀首令應之遟趍出詣獄令跣追之不及即自入獄謝惲抜刃自嚮以要惲曰子不從我岀敢不以死明心乎惲遂岀魏志曰典韋陳留人已皃魁梧力過人好豪俠襄邑劉氏與睢陽李禮爲讎韋報之禮故冨春長備怨其謹韋乗車載鷄酒僞􅀱者開懷匕首入殺禮并妻徐出取車上刀㦸歩去禮居近市一市盡追莫敢近者又曰楊阿若後名豊字伯陽少遊俠常以報仇解怨爲事故時人爲之號曰東市相斫楊阿􅀂西市相斫楊阿􅀂魚豢典略曰徐福字元直好任俠擊劒未嘗爲人報讎爲吏所得問其姓字閉口不言呉志曰甘寕字興覇少有氣力好遊俠招合輕薄少年爲之渠帥群聚相挾持弓弩􅀒眊帶鈐聲即知是寕裴子野宋畧曰寕朔將軍何邁素豪俠好聚歛士出入遊從者塞路孫盛晉陽秋曰祖逖字士稚好俠毎之田舎輙稱兄命散榖帛以贈貧者唐書丘和河南洛陽人也父壽魏鎮東將軍和少便弓馬重氣任俠及長始折節與物無忤無貴賤皆愛之列子曰虞氏者梁之冨人也家旣充盛錢金無量財貨無訾登髙樓臨大路設樂陳酒擊愽樓上俠客相隨而行樓上慱者大􅀏鳶飛適墜其腐䑕而中之俠客曰虞氏冨樂之日乆矣常有輕易人之志乃辱我以腐䑕率徒屬而滅其家韓子曰儒以文亂法而俠以武犯禁裴啓語林曰李陽大俠士庶無不傾心爲幽州刺史當之職盛暑一日詣數百家別賔客常填門張衡西京賦曰都邑游俠張趙之倫輕死重氣結黨連群寔蕃有徒其從如雲劉邵趙都賦曰遊俠之徒晞風擬􅀋貴交尚信輕命重氣義激毫毛節成感槩張華慱陵王宫俠曲曰俠客樂幽險築室窮山隂轑獵野獸盡施網川無禽又曰雄兒任氣俠聲蓋少年塲借友行報怨殺人都市旁􅆎間义素戟手持白頭鑲古詩曰失意杯酒間白刃起相讎曹子建詩曰借問誰家子幽并遊俠兒太平御覽卷第四百七十三
