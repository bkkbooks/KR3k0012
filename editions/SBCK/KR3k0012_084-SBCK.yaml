body:
  text: 皇王部九周文王武王成王周文王史記曰周后稷名棄其母有邰氏女曰姜嫄姜嫄爲帝嚳元妃姜嫄出野見巨人跡心忻然恱之遂踐之而孕居期而生子以爲不祥棄之隘巷牛羊過者皆避不踐徙置林中適㑹山林中多人遷而棄渠中氷上飛鳥以翼覆薦之姜嫄以爲神遂收養之因名爲棄棄爲兒時遊戯好種樹麻菽麻菽溢羙及成人遂好耕農相地之冝親稼穡堯聞之舉爲農師天下得其利封之於邰音胎號曰后稷别姓􅁎氏后稷之興在唐虞之際皆曰有令德后稷卒子不窋陟律反立不窋末年夏后氏政衰去稷不務不窋失其官而奔戎狄之間不窋卒子鞠立鞠卒子公劉立公劉雖在戎狄之間復修后稷之業務耕種行地冝百姓懷之多從而保歸焉周道興蓋自此也公劉卒子慶節立國於邠九世至古公亶父復修后稷公劉之業積德行義國人皆戴之獯音勲鬻音育戎狄攻之欲得地與民民皆怒欲戰古公曰有民立君將以利之今戎狄所攻戰以吾地與民民之在我與在彼何異以我故戰殺人父子而君之子不忍爲乃以私屬去邠渡漆沮踰梁山止於歧下邠人舉國老弱盡歸歧下及他旁國聞古公仁亦多歸之於是古公貶戎狄之俗營築城郭室屋而邑別居之民皆歌頌其德古公有長子曰太伯次曰虞仲太姜生少子季歷季歷娶大任皆賢婦人生昌有聖瑞古公曰我世當有興者其在昌乎長子太伯虞仲知父欲立季歷古公卒季歷立是爲王季王季修古公之道篤於行義諸侯順之王季卒子昌立是爲西伯西伯曰文王遵后稷公劉之業則古公王季之法篤仁敬老慈少禮下賢者日中不暇食以待士伯夷叔齊太顛閎夭散冝生鬻子辛甲之徒皆歸之崇侯虎譛於紂曰西伯積德諸侯嚮之將不利於帝紂囚西伯於姜里閎夭之徒乃求有莘氏羙女驪戎文馬因殷嬖臣費仲獻之紂乃赦之紂喜賜之弓矢斧􅃏使得征伐謂西伯曰愬汝者崇侯虎也西伯乃獻洛西之地以請除炮烙之刑西伯遂爲諸侯决平虞芮人有訟不能决詣周入其界見耕者皆讓畔未見西伯而慙相謂曰吾所爭者周所恥也遂還明年伐犬夷又明年伐宻湏又明年伐崇侯虎而徙都於酆諸侯多歸之都酆明年而薨太子發立尚書帝命驗曰季秋之月甲子赤雀銜丹書入酆止昌户拜稽首稽首頭至地也至于磻谿之水吕尚釣涯吕氏尚名王下趣拜急見也曰公望七年日公乎我相望七年言乆也乃今見光景于斯尊之辭斯此也荅曰望釣得玉璜半壁曰璜釣得魚中有璜刻曰􅁎受命吕佐旌受天命爲天子吕佐旌理之也遂置車左王躬執驅下賢也車尊曰左王身執轡而驅焉號曰師尚父周書曰文王昌曰吾聞之無變古無易常無隂謀無擅制無更創爲此則不祥太公曰夫天下非常一人之天下也天下之國非常一人之國也莫常有之唯有道者取之古之王者未使民民化未賞民民勸不知怒不知喜愉愉然其如赤子此古善爲政也又曰文王在鎬召太子發曰嗚呼我身老矣吾語汝我所保與我所守傳之子孫吾厚德而廣惠忠信而志愛吾不爲驕侈不爲太靡不滛於羙吾栝柱而茅茨吾爲民愛費也春夏育山林不昇以成草木之長而慎天時水澤不内舟檝以成魚鱉之長不麛不卵以成鳥獸之長畋獵唯時不殺童羊不夭胎童牛不服童馬不馳不騖澤不行害士不失其冝萬物不失其性天下不失其時又曰文王獨坐屏去左右深念逺慮召太公望曰帝王猛暴無文強梁好武侵凌諸侯苦勞天下百姓之怨心生矣其灾予奚行而得免於無道乎太公曰因其所爲且興其化上知天道中知人事下知地理乃可以有國焉帝王世紀曰文王昌龍顔虎肩身長十尺胷有四乳晏朝不食以延四方之士文王合六州之諸侯以朝紂紂以崇侯之䜛而怒諸侯請送文王棄于程十年正月文王自商至程太姒夢見啇庭生􅁄太子發取周庭之梓樹之于闕間梓化爲松栢柞棫覺而驚以告文王文王不敢占召太子發命祝以幣吿于宗廟群神然後占之于明堂及發並拜吉夢遂作程寤始文王繼父爲西伯都於雍州之地及受命復兼梁荆二州化􅀍于江漢之域於是諸侯歸附之者六州而文王不失臣節先是文王夢日月之光著身又鸑鷟嗚於􅄮作武象之樂神農氏始作五􅃶之琴以具宫商角微羽之音歷九代至文王復増其二􅃶曰少宫少商文王嗣位五十年即周書所謂文王受命享國五十年是也雒書靈准聽曰蒼帝􅁎昌日角鳥鼻身長八尺二寸詩曰文王在上於昭于天周雖舊􅀖其命惟新又曰維此文王小心翼翼昭事上帝聿懐多福又曰文王曰咨咨汝殷商匪上帝不時殷不用舊詩含神霧曰大任夢長人感巳生文王春秋元命苞曰文王龍顔柔肩望羊柔肩言象龍膺曲起又曰伐殷者爲􅁎昌􅁎昌之言基始也昌两日重見言明象生於岐立於豐􅄮雍州之山最大者也豐亦大精翼日爲日精所月翼故遂以爲名也衣青光木神以其方色表衣遷造而十刻消遷造西蓋文王爲西伯時西方造意東入討紂十刻之間則消滅之言聖人所向無前也又曰文王四乳是謂含良蓋法酒旗布恩舒惠酒者乳也乳天下之謂春秋感精符曰孔子案録書含觀五常英人知􅁎昌爲蒼帝精孟子曰昔者文王之治岐也耕者九一仕者世禄􅀜市譏而不征澤梁無禁罪人不拏言往者文王爲西伯時始行王政使岐民修并田入家耕八百􅅿其百畒以爲公田及廬井故曰九一也紂時稅重文王復行古法也仕者丗禄賢者子孫必有土地關以難非常不征稅也拏妻子也詩云樂尓妻孥罪人之子不孥惡惡止其身不反妻子也陂澤魚梁不設禁與民共也老而無妻曰鰥老而無夫曰寡老而無子曰獨㓜而無父曰􅀌此四者天民之窮而無吿者也文王發政施仁必先斯四者墨子曰赤雀銜珪之岐社曰命周文王伐於殷韓子曰周有玉板紂令戾索之王與也吕氏春秋曰文王立八年歳六月文王寢疾五曰而地動東西南北不岀周郊百吏皆請曰臣聞地之動也爲人主也今王寢疾五日而地動四面不岀周郊群臣皆恐請移之文王曰若何移對曰興事動衆以増國城王曰是重吾罪也不可昌也請改行重善以移之其可以免之乎於是謹其禮秩皮革以文諸侯飾其辭令幣帛以禮豪士頌其爵列等級田疇以賞群臣無㡬何疾乃止准南子曰文王歸自商乃爲玉門築靈臺相女童鍾皷玉門玉飾門爲柱樞也相女童視之也以待紂之失也紂聞之曰周伯昌改道易行吾無憂矣乃爲炮烙剖比干剔孕婦殺諌者文王乃遂其謀又曰文王之時紂爲天子賦歛無度殺無止康梁流湎宫中成市康梁酖樂流湎酒也成市言集者多作爲炮烙之刑刳諌者剔孕婦天下同心而苦之文王四世累善大王王季文王武王凡四世也修徳行義處岐周之間地方不過百里天下二分歸之文王欲以卑弱制強暴以爲天下去殘除賊而成王道故太公之謀主也太公爲周陳隂符兵謀也賈􅁩書曰文王晝卧夢人登城而呼巳曰我東北陬之腐骨也速以人君葬我文王曰諾􅁴召吏視之信有焉文王曰速以人君葬之吏曰此無主請以五大夫文王曰吾夢中巳許之矣奈何其背也士民聞之曰我君不以夢之故背腐骨况於生人乎桓子新論曰文王操者文王之時紂無道爛金爲格溢酒爲池宫中相殘骨􅁏成泥琁室瑶臺藹雲翳風鍾聲雷起疾動天地文王躬􅀍法度隂行仁義援琴作操故其聲紛以擾駭角震商琴操曰受命者謂文王受天命文王以紂時爲岐侯躬修道德執行仁義百姓附親是時紂爲無道刳胎斬渉廢壤三仁天統易運諸侯瓦解皆歸文王其後有鳯凰銜書於郊文王曰殷帝無道虐亂天下皇命巳移不得復乆乃作鳯凰之歌曰翼翼翔翔鸞皇􅀆銜書來遊以命昌􅀆瞻天案圗殷將亡􅀆蒼蒼皓天始有萌􅀆五神連精合謀房􅀆又曰文王修德百姓親附是時崇侯虎與文王列爲諸侯德不能及文王常嫉妬之乃譛文王於紂曰西伯昌聖人也長子發中子旦皆聖合謀君其慮之乃囚文王於姜里吕氏春秋曰周文王使人扣地得人之骸吏以聞文王文王令葬之吏曰此無主矣文王曰有天下者天下之主有一國者一國之主今我非其主耶遂令以衣棺葬之天下聞之曰澤及枯骨又况於人乎哉或得寳以危其國文王得朽骨以喻其意故聖人之於物也無不􅀍也又曰文王處岐事紂􅁈侮雅孫朝夕必時雅正孫順紂雖􅁈柱而侮慢之而文王猶正順諸侯之禮而不失其時也止貢必適􅀕祀必敬紂喜命文王稱西伯賜之千里之地文王再拜稽首而辭曰願爲民請去炮烙之刑紂見熨斗爛人手因作銅柱布火於其下令人走其上墮火而死以之爲樂以之爲方之􅞷炮故名爲炮烙也文王非惡千里之地也以爲民請去炮烙之刑必得民心得民心則賢於千里之地矣吕氏春秋曰文王修德百姓親附是時崇侯虎與文王同列爲諸侯德不能及文王常嫉妬之乃譛文王於紂曰西伯昌聖人也長子發中子旦皆聖合謀君其慮之紂乃囚文王於姜里將欲殺之於是文王四臣散冝生等乃周流海内經歷豊土得羙女二人水中文貝白馬朱鬛以獻於紂陳於中庭紂立出西伯文王在羑里時演易八卦爲六十四作鬱厄之辭困于石據于蒺蔾乃申憤以作歌曰殷道溷溷浸濁煩􅀆朱紫相合不別分􅀆迷亂聲色信䜛言􅀆閻閻之虐使我愆􅀆幽􅐬牢穽由其言􅀆遘我四人憂勤勤􅀆論衡曰文王飲酒千鍾聖人能以德將酒也帝王丗紀曰文王晏朝不食以延四方之士是以太顛閎夭散冝生南宫适之屬咸至是爲四臣文王雖在諸侯之位襲爲西伯紂旣囚文王文王之長子曰伯邑老質於殷爲紂御紂以爲羮賜文王曰聖人當不食其子羹文王得而食之紂曰誰爲西伯聖者食其子羹尚不知也魏陳思王曹植文王賛曰於赫聖德寔惟文王三分有二猶復事商化加虞芮傍曁四方王業克昭武嗣遂光又文王赤雀賛曰西伯積德天命攸頋赤雀銜書爰集昌户瑞爲天使和氣所致嗟爾後王昌期而至周􅁃信文王見吕尚賛曰言歸養老垂釣西川岸上盤石溪惟小􅂳風􅀨未感意氣怡然有此相望于今㡬年武王書曰武王戎車三百乗兵車一乗步卒七十三人凢二禹一千全數也虎賁三百人虎賁善戰言其猛也與紂戰于牧野作牧誓尚書中􅀱曰太子發以紂存三仁附三仁箕子比干微子也即位不稱王渡于盟津中流受文命待天謀白魚躍入王舟王俯取魚長三尺赤文有字題目下名授右右助也天吿以伐紂之意是其助也有火自天出于王屋流爲赤烏五至以榖俱來流行也五至猶五來赤烏成文雀書之福文王得赤雀丹書今武王致赤烏俱應周尚赤故言成文也詩曰考卜維王宅是鎬京維􅀛正之武王成之禮曰武王纉太王王季文王之緒一戎衣而有天下身不失天下之顯名尊爲天子冨有四海之内宗廟饗之子孫保之儧繼也折業也戎兵也衣讀爲殷聲之誤一者一伐殷也又曰昔殷紂亂天下脯􅄦侯以饗諸侯是以周公相武王以伐紂樂稽耀嘉曰武王承命興師誅于商萬國咸喜軍渡盟津前歌後舞後乃大安家給人足酌酒鬱揺鬱摇喜皃也春秋元命苞曰武王駢齒是謂剛強承命誅害以順天心史記曰武王即位太公望爲師周公旦爲輔召公畢公之徒左右脩文王業九年東觀兵盟津爲文王木主載以居中軍自稱太子發言奉文王以伐不敢自專乃告司馬司徒司空遂興師渡河時諸侯不期而㑹盟津者八百諸侯皆曰紂可伐矣武王曰未可乃還師居二年聞紂昏亂滋甚剖比干囚箕子大師疪少師彊抱其樂器而奔周於是武王乃渡盟以卒馳紂紂師皆倒兵戰紂軍潰叛走登鹿臺之上蒙衣其珠玉自燔于火而死王遂入至紂死所自射紂三發而後下車以黄鉞斷紂頭懸大白之旗紂嬖妾妲己二女皆自殺王又射三發斬以􅀇􅃏懸其頭小白之旗出復于軍其眀日遂除紂宫誓殷民即帝位帝王丗紀曰武王自盟津還返于周見暍人王自在擁而右扇之四年起師至鮪水甲子至于商郊牧野王韈係解五人侍於前莫肯爲王係韈皆曰臣所以事君王非爲係韈也王乃釋旄而係之與紂戰紂師敗績擒費仲惡來紂赴于京自燔于宣室而死乃以大旗麾諸侯入殷都百姓咸行于郊王使告曰上天降休商人皆拜王亦荅拜以兵人造紂及妲己王親射射之三發然後下車以劒擊之周公爲司徒使以黄􅃏斬紂頭召公爲司空又使以􅀇鉞斬妲己明日天雨王命除道脩社入商宫朝成湯之廟登堂見羙玉入室見羙女王皆取而歸之諸侯天下聞之以廉于財色矣置旌於商容之閭釋箕子之囚散鹿臺之財發鉅橋之粟以賑貧民命南宫括伯逹史佚遷九鼎于洛邑命閎夭封比干之墓殷民咸喜十年冬王崩于鎬殯于岐時年九十三歳矣太子誦立爲成王越書曰八百諸侯皆一旦會於盟津之上不言同辭不呼自來盡知武王忠信欲從伐紂墨子曰天錫武王黄鳥之旗淮南子曰武王伐紂渡於盟津陽侯之波逆流而擊疾風晦暝人馬不見於是武王左操黄􅃏右執白旄瞋目而麾之曰余在天下誰敢害吾意者於是風濟而波罷又曰武王克殷欲築宫於五行之山五行山今太行山也河內野王縣北上黨間周公曰不可夫五行之山固塞險阻之地也使我德能覆之則天下納其貢職者迴也迴迃難也使我有暴亂之行則天下之伐我難周公言我有暴乱之行則天下當來伐我無爲於五行之山使天下來伐我者難也言其依徳不恃嶮也此所以三十六世而不奪也􅀃苑曰武王伐紂過墜斬山過水拆舟過谷發梁過山焚萊示民無返志成王史記曰成王少周公攝政管叔蔡叔群弟疑周公與武庚作亂叛周周公奉成王命伐誅武庚殺管叔蔡叔以微子開伐殷後國於宋周公行政七年成王長周公反政成王北面就群臣之位成王在酆使召公復營洛邑如武王之意周公復卜申視卒營築居九鼎焉曰此天下之中四方入貢道理均作周官興正禮樂制度於是改而民和睦頌聲興帝王世紀曰周公居􅃁􅌠攝政成王年少未能治事故號曰孺子八年王始躬親王事以周公爲太師封伯禽于魯父子並命周公拜于前魯公拜于後王以周公有勲勞於天下故加魯以四等之上兼二十四附庸地方七百里革車千乗王旣營都洛邑復居酆鎬淮夷徐戎及商奄又叛王乃大蒐於岐陽東伐淮夷七年王崩年十六矣太子釗代立淮南子曰成王問政於尹逸曰吾何德之行尹佚史佚也而民親其上對曰使之時而敬順之王曰其度安至曰如臨深淵如履薄氷王曰懼哉王人乎尹逸曰天地之間四海之内善之則吾蓄也不善則吾讎也吕氏春秋曰旦所朝窮巷之中甕牗之士者七十人文王造之而未遂武王遂而未成周公且抱少主而成之故曰成王賈􅁩書曰周成王問鬻子曰寡人聞聖王在上位使民冨且壽夫冨則可爲也夀則不在天乎鬻子對曰聖王在上位則天下無軍兵之事故諸侯不相攻而民不私闘不相殺也則民免於一死而得一生矣聖王在上君積於道而吏積於徳民積於用故婦人爲其所依丈夫爲其所食民免二死得二生矣聖王在上則君積於仁而吏積於愛而民積於順則刑罰廢無夭遏之誅則民免於三死得三生矣聖王在上則使民以時而用之有節則民無厲疾矣則民免於四死得四生矣琴操曰周金滕者周公作金縢書也武王薨太子誦襲武王之業年七歳不能統理海内周公爲攝政是時周公囚誅管蔡之後有謗公於王者言公專國之權詐䇿謀將危社稷不可置之成王聞之勃然大怒欲囚周公周公乃奔千魯而死成王聞公死且怒之且傷之以公禮葬之天乃大暴風疾雨禾稼皆偃木折傷成王懼發金縢之書見周公所爲武王禱命以身贖之書成王執書而泣曰誰言周公欲危社稷者取所䜛公者而誅之戮於國天乃反風霽􅀨禾稼復起成王作思慕之歌太平御覽卷第八十四按本卷有錯簡五處玆據日本學訓堂倣宋聚珍版曁鮑崇城本訂正並於銜接處加爲識其原式如左今第一葉後十一行次曰虞仲止次行原爲今第二葉前十三行尙書帝命驗曰今第二葉前十二行太子發立止次行原爲今第三葉前九行帝王世紀曰今第三葉前一行山林不昇下原接今第一葉後十一行太姜生少子季歷今第三葉前八行乃可以有國焉止次行原爲今同葉後十行詩曰文王在上今第三葉後九行身長八尺二寸下原接今同葉前一行以成草木之長但今第三葉前一行山林不昇句聚珍版鮑刻昇均作升下有斧斤二字今檢逸周書皆同併記
