front:
  text: 太平御覽卷第七百五十六
  hash: sha256:b24abb81e179de5f18499660a3086c9c8ca8c84ff6f703dd87c863fa72ecbd51
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_756-1a}
body:
  text: 器物部一器皿鼎器皿􅀃文曰皿飲食之用器也盛􅁰稷在器中也齊􅁰稷之器以祀者盧飯器也鐈巨招反似鼎而長足鏖一刀切温器也方言曰器破而不殊其音謂之音西聲也器破而未離謂之璺音問南楚之間謂之􆀅文正比刀凡以器盛而滿謂之涌與恐切言涌出也通俗文曰金銀鏤飾器謂之錯鏤竹器謂之笭箵笭郎鼎切箵桑鼎切竹器邊縁曰先管切書曰遟任有言曰人惟求舊器非求舊惟新言人貴舊器貴新又曰武王旣勝殷􅀖諸侯班宗彛作分器賦宗廟彛器酒罇賜諸侯禮曰孟春之月其器䟽以逹孟夏之月其器髙以粗孟秋之月其器廉以深孟冬之月其器閎以掩又曰侍食於君君賜餘器之漑者不冩陶淬之器其餘皆冩雚行之器又曰作竒巧之器以疑衆殺宗廟之器不鬻於市錦文珠玉成器不鬻於市又曰玉不琢不成器人不學不知道論語曰工欲善其事必先利其器史記曰舜陶於河濵器不苦窳以主切舜作什器於壽丘又曰通邑大都木器髹者千伏徐廣折曰髹音休􅃮也漢書日木器千伏銅器千鈞素木鐵器千石此亦千乗之家也又曰武帝有故銅器李少君曰此器齊桓公十年陳於柏寢案其刻果然漢書曰賈􅁩言夫天下大器也今人之置器置諸安處則安置諸危處則危天下之情與器無以異在天子之所置之又曰里諺曰欲投䑕而忌器此善諭也䑕近於器尚憚不投恐傷其器况於臣之近主乎又曰􅄢賔國以金銀銅錫爲器續漢書曰桓帝祠老子於濯龍用淳金釭器魏氏春秋曰武王過故人吕伯奢家聞其動食器之聲疑其圖巳是夜手劒殺八人後魏書曰獠鑄銅爲器大口寛腹名曰銅㸑旣薄且輕易於熟食晉令曰欲作􅃮器物賣者各先移主吏者名乃得作皆當淳􅃮著布器器成以朱題年月姓名車頻秦書曰符堅建元十八年新平縣民耕地獲玉器􅀄有金彫者頗知圖記王猛以爲左道勸堅誅之彫臨死表堅曰新平地古顓頊墟其故有白鷄閭記言此里應出古帝王寳至是果得之家語曰孔子觀於魯桓公之廟有欹器焉孔子問於守廟者曰此爲何器曰此蓋宥坐之器孔子曰吾聞宥坐之器者虚則欹中則正滿則覆顧謂弟子曰試注水焉即挹水而注之中而正滿而覆虚而欹孔子喟然而歎曰嗚呼物焉有滿而不覆者乎老子曰埏埴以爲器當其無有器之用韓子曰堯有天下飯於土軌飲於􅁟鉶舜作食器斬山木而材之削踞脩其迹流􅃮墨其上諸侯以爲益侈國之下伏者十三禹作爲􅀕器黒􅃮其外朱􅀞其内觴酌有采而樽俎有飾殷人食器彫􅅣觴酌刻鏤淮南子曰崐崘旁有九井玉横横或作彭器名也受不死藥丗􅀃曰晉武帝嘗際王武子供饌悉用琉璃器涼州異物志曰方外殊珎車渠馬碯器無常形爲時之寳隨其大小以作孟枕杯褩也視之目眩希丗之巧羅刹所作非人所造羅利􅀑逺外國巧成器物與人交帝非人能所造地鏡圖曰銅器之屬見其狀如望馬煇煇然齊器之見爲牛楚器之見爲馬越器之見爲蝦蟇宋器之見爲白狗秦器之見爲豚燕器之見爲豕揚雄蜀都賦曰彫鐫釦器百􅇊千工魏武内誡令曰􅀌有逆氣病常儲水卧頭以銅器盛臭惡前以銀作小方器人不解謂􅀌喜銀物令以木作鼎爾雅曰鼎絶大謂之鼐圎弇上謂之鼎附耳外謂之才鼎􅀃文曰鼎三足兩耳和五味之寳器也昔禹貢九牧之金鑄鼎荆山之下民入山林川澤魑魅蝄蜽莫能逢之易曰鼎元吉亨􅂏曰鼎象也九四鼎折足覆公餗六五鼎黄耳金鉉利貞上九鼎玉鉉大吉無不利詩曰鼐鼎及鼒大鼎謂之鼐小鼎謂之鼒周禮曰王一日三舉鼎十有二物皆有爼牢鼎九陪鼎三禮曰故衛孔悝乏鼎銘曰六月丁亥公假于太廟公曰叔舅乃祖莊叔左右成公成公乃命莊叔隨難于漢陽即宫于宗周奔走無射啓右獻公獻公乃命成叔纂乃祖服乃考文叔興舊嗜欲作率慶士躬恤衛國其勤公家夙夜不解民咸曰休哉公曰叔舅子女銘􅀂纂乃服悝拜稽首曰對揚以辟之勤大命施于烝彛鼎施猶著也言我將行君之命又刻著於烝􅀕之彛鼎也又曰崇鼎貫鼎夫子之器崇貫皆國名左傳曰宋華父督殺殤公召莊公于鄭而立之以郜大鼎賂公郜國所造器也四月取郜大鼎于宋納于太廟非禮也臧哀伯諫曰武王克啇遷九鼎于洛邑義士猶或非之而况將昭違亂之賂器於太廟其􅀂之何公弗聽又曰楚子伐陸渾之戎遂至于雒定王使王孫滿勞楚子楚子使問鼎之大小輕重焉對曰在鼎不在鼎昔夏之方有德也逺方圖物貢金九牧鑄鼎象物桀有昏德鼎遷于啇啇紂􅁀虐鼎遷于周德之休明雖小重也其姦固昏亂雖大輕也天祚明德有所底止成王定鼎干郟鄏卜丗三十卜年七百天所命也周德雖衰天命未改鼎之輕重未可問也又曰魯襄公享晉六卿賄荀偃束錦加壁乗馬先呉壽夢之鼎壽夢呉子也獻鼎於魯因以爲名又曰晉叔向謂晏子曰然雖吾公室今亦季丗也君日不悛以樂慆憂公室之卑其何日之有䜛鼎之銘曰昧旦丕顯後丗猶怠讒鼎鼎銘也况日不悛其能乆乎又曰楚薳啓彊曰是以聖王朝聘有珪享覜他弔切有璋宴有好貨飱有陪鼎飱饔飱也熟食爲飱陪加也加鼎所以厚殷勤之又曰鄭人鑄刑書鑄刑書於鼎以爲國之常法又曰宋正考父佐戴武宣三命兹益恭故其鼎銘云鼎正考父之廟鼎也一命而僂再命而傴三命而俯循墻而走亦莫余敢侮饘於是粥於是以餬余口又曰鄭子産聘于晉晉侯有疾韓宣子逆客私焉曰寡君寢疾於今三日矣並走羣望有加而無瘳今夢黄熊入於寢門其何厲􅀑也對曰昔堯殛鯀于羽山其神化爲黄熊以入羽淵實爲夏郊三代祀之晉爲盟主其或未之祀也乎韓子祀夏郊晉侯有間賜子産莒之二方鼎方鼎莒所貢又曰楚子次於乾谿僕析父從右尹子革夕王語曰昔我先王熊繹與吕仍王孫牟爕父禽父並事康王四國皆有分器我獨無有今吾使人於周求鼎以爲分器王其與我乎對曰與君王哉今周與四國服事君王將唯命是聽豈其愛鼎又曰齊侯伐徐徐人行成賂以甲父之鼎甲父古國名也又曰晉趙鞅荀寅率師城汝濵遂賦晉國一鼔䥫以鑄刑鼎刑書之鼎著范宣子所爲刑書焉穀梁傳曰桓公二年夏四月取郜大鼎于宋戊申納于太廟郜鼎者郜之所爲也孔子曰器從邑名從主人故曰郜大鼎史記曰黄帝採首山銅鑄鼎於荆山下鼎旣成有龍垂胡髯下迎黄帝又曰伊尹欲干湯而無由乃爲有莘氏媵臣􅀒鼎俎以滋味􅀃湯致於王道又曰周末有九鼎徙秦氏曰太丘社亡而鼎没予泗水彭城下其後百一十五年而秦兼天下始皇二十八年過彭城齋戒禱祀欲岀周鼎使千人没水求之不得又曰秦武王與孟􅀃舉龍文之鼎絶臏而死又曰孝文帝時新垣平言周鼎亡在泗水中今河溢通泗臣望東北汾隂直有金寳氣意周鼎其岀乎兆見不迎則不至於是上使使治廟汾隂南臨河欲祠出周鼎漢書曰項羽身長八尺二寸目重瞳力能扛鼎又曰漢得汾隂寳鼎武帝嘉之藏於甘泉羣臣上壽賀陛下得周鼎廬丘壽王曰非周鼎上怒對曰周德始乎后稷成於文武上天報應鼎爲周出名曰周鼎今漢自髙祖繼周至陛下功德愈盛天瑞並是至昔􅁗始皇欲出鼎於彭城而不得天祚有德而寳鼎自出此天之所以與漢是漢鼎非周鼎也上曰善又曰主父偃曰丈夫生不五鼎食死則五鼎烹又曰宣帝時美陽得鼎獻之京兆尹張敞上議曰案鼎有刻書曰王命尸臣官此㧦邑賜尓旂鸞黼黻琱弋李竒曰琱鏤也尸臣拜稽首曰敢對揚天子丕顯休命此鼎殆周之所以襃賜子孫刻銘其先功藏之于宫廟也又曰質氏以洒削而鼎食東觀漢記曰廬江獻鼎詔召鄭衆問齊桓公之鼎在栢寢臺見何書春秋左氏有鼎事幾衆對狀除爲郎中後漢書曰孝明帝永平六年二月王雒山出寳鼎廬江太守獻之詔曰祥瑞之降以應有德方今政化多僻何以致兹易曰鼎象三日豈公卿奉職得其理耶太常其以􅀄􅀕之日陳鼎於祖廟以備器用賜三公帛五十疋九卿二千石半之晉中興書曰成帝咸和元年宣城春􅂖山崩得古鼎重三百斤容可三斛餘郡官畢賀又曰神鼎見神鼎者仁器也能輕能重能息能行不炊而沸不汲自盈烟煴之氣自然所生也亂則藏於深山文明應運而至故禹鑄鼎以擬之晉陽秋曰榖城人劉珪夜見門有光取得玉鼎沈約宋書曰秦始七年義陽獲銅鼎受一斛并蓋並隱起鏤戰國䇿曰􅁗興師於周求九鼎顔率謂齊王曰周之君臣内自畫計與􅁗不􅀂歸之大國願大王圖之齊王發師救周秦兵罷率至齊曰願獻九鼎不識大國何塗之從而致之齊王曰寡人將􅀉塗於梁對曰不可梁之君臣欲得九鼎謀之潬徒旱切臺之下少海之上其曰乆矣州是西北太平御覽卷第七百五十六
