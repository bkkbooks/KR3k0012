body:
  text: 刑法部十一象刑誅轘烹象刑尚書大傳曰唐虞象刑而民不敢犯苗民用刑而民興相漸唐虞之象刑上刑赭衣不純純縁者時人尚德義犯刑者但易衣服自爲大耻中刑雜屨屨履也下刑墨幪幪巾也使以下得冠飾幪音蒙以居州里而民耻之漢書刑法志曰孫卿之論刑也曰丗俗之爲􅀃者以爲治古無􅁏刑治古謂上古至治之時也有象刑墨黥之屬非屨赭衣而不純菲草也屨履也純縁衣也不加縁示有耻也是不然矣以爲治古則人莫觸罪非獨無􅁏刑哉亦不待象刑矣人不犯法即象刑無所施也以爲人或觸罪矣而直輕其刑是殺人者不死而傷人者不刑也罪至重而刑至輕民無所畏亂莫大焉故象刑非生於治古方起於亂今也如淳曰古無象刑也所以有象利之言者近起於今人􅁖刑之重故遂推言古之聖君但以象刑天下自治白虎通曰聖人治天下必有刑罰何所以助治順天之度也故懸爵賞者示有所勸也設刑罰者明有所懼也傳曰三王内刑應丗以立刑者五帝之鞭䇿刑所以五何法五行也五帝􅀞其衣象五行也誅書曰昏迷于天象以干先王之誅又曰商罪貫盈天命誅之予不順天厥罪惟均禮曰振書端書於君前有誅倒筴側􅀛於君前有誅臣不豫事不敬也振去塵也端正也倒顛倒也側反也皆謂甫省視之也又曰以足蹙路馬芻有誅齒路馬有誅皆廣敬也路馬君之馬誅罰也周禮秋官下曰布憲掌憲􅀖之刑禁傷人見血而不以告者攘獄者遏訟者故以告而誅之謂吏民相殺傷見血者攘獄者距却不受也遏訟者上遏公羊傳曰君親無將將而必誅傳曰見無禮於君者誅之如鷹鸇之逐鳥雀也家語曰孔子爲魯司㓂七日而誅亂政大夫少正夘戮之于兩觀之下子貢曰少正夘魯之聞人也今夫子爲政而始誅之或者爲失乎孔子曰天下有大惡者五而竊盗不與焉一曰心逆而險二曰行僻而堅三曰言僞而辯四曰記醜而􅀶五曰順非而澤此五者有一於人則不免君子之誅而少正夘皆兼有之居處足以撮徒成黨談􅀃足以褒飾榮衆強禦足以反是獨立此乃人之姦雄不可不除夫湯誅尹諧文王誅潘正周公誅管蔡太公誅華士管仲誅付乙子産誅史何此七子皆異丗而同誅者七子異丗而同惡故不可赦也吾始誅之不亦可乎史記曰二丗遵用趙髙之法乃隂與謀曰大臣不服官吏尚強及諸公子必與我争柰何髙曰臣固願言而未敢也先帝之大臣皆天下累丗名貴人也人積功勞丗以相傳乆矣今髙素小賤陛下幸稱舉令在上位管中事大臣鞅鞅特以貌從臣其心實不服今上出不因此時案郡縣守尉有罪者誅之上以振威天下下以除去上生平所不可者願陛下遂從時無疑二丗曰善乃行誅大臣及諸公子漢書曰誅彭越盛其醢以偏賜諸侯又曰公孫弘年八十終丞相位其後李蔡嚴青翟趙周石慶公孫賀劉屈􅁵踵爲丞相自蔡至慶丞相府客館丘墟而已至賀屈􅁵壞爲馬厩車庫奴婢室矣唯慶以惇謹終丞相位其餘盡伏誅又曰上遣公孫敖將兵深入匈奴迎李陵敖軍無功還言陵教單于爲兵以備漢軍故臣無所得上聞於是族陵家母弟妻子皆伏誅後漢書曰梁兾誅李固而露尸於衢令有敢臨者加其罪又曰梁兾專權其同巳者榮顯違迕者劒死同僚側目臺閤機事先以聞兾乃得奏御内外恐懼上下鉗口天子恭巳而巳不有所親任上旣不平之矣兾以私憾專殺議郎邴遵上愈益忿八月癸酉上問小黄門唐衡曰左右誰與梁氏不相得者衡荅曰單超左悺音管上呼超悺入室上曰梁將軍兄弟專朝逼脅内外公卿巳下從其風旨今欲誅之於常侍意如何皆對曰誠國賊當誅之日乆臣等弱少未知聖意如何上曰審然者常侍宻圗之對曰圗之易耳但恐陛下腹中狐疑上曰姦臣脅國當㐲其罪復何狐疑於是命衡呼超等曰陛下今計已决勿得數言恐爲人疑丁􅐫兾心疑超等使中黄門張惲入省􅀫以防其變瑗勑吏収惲自外謀圗不軌於是帝幸殿召公卿勒兵使者収兾大將軍印綬更封比景部郷侯黄門令瑗將虎賁劒士卒千人司􅀠與共捕兾宗親送雒陽獄無少長皆誅之兾自殺坐兾所連及公卿列侯校尉刺史二千石死者數十人兾故吏賔客免絀者二百餘人朝廷爲之一空又曰鍾離意爲瑕丘令史有擅建者盗􅀼縣内意屏人問狀建叩頭伏罪不忍加刑遣令長休建父聞之爲建設酒謂曰吾聞無道之君以刃殘人有道之君以義行誅子罪命也遂令建進藥而死漢雜事曰上自擊鄧奉破之於長安奉降上以舊功臣不誅耿弇曰奉背恩反叛曝師連年上旣至奉親在陳兵敗乃降不誅無以懲惡於是誅之又曰􅁗豐田戎連兵􅀺丘距漢上遣朱祐守豐議者以爲豐已連年勢必困上自徃豐必降上徃招豐出惡言後數月豊降祐檻車傳及母妻子送洛陽大司馬呉漢劾奏祐知豐狡猾圍守連年上親至城下而遂悖逆天下所聞當伏夷滅之誅不時斬截而聽受降無將帥任大不敬上乃誅豐召祐王隱晉書曰解結與孫秀不恊秀誅張華并欲誅結弟梁王肜救之秀曰我於水中蟹尚惡之况其兄弟耶晉書曰孟􅅼譛陸機於成都王潁言其有異心將軍王闡郝昌公師蕃等皆􅅼所用與牽秀等共證之頴大怒使秀宻収機其夕機夢黒幔繞車手决不開天明而秀兵至機釋戎服着白祫與秀相見神色自􅀂謂秀曰自呉朝傾覆吾兄弟宗族蒙國重恩入侍幃幄出剖符竹成都命吾以重任辭不獲巳今日受誅豈非命也因與頴牋詞甚悽惻旣而歎曰華亭鶴唳豈可復聞乎遂遇害於軍中又載記曰昌黎尹孫伯仁護弟北支支弟乙㧞等俱有才力以驍勇聞馮跋之立也並兾開府而跋未知所欲由是有怨言每於朝享之際常㧞劒擊柱曰興建大業有功力焉而滯於散將豈是漢祖山河之義乎跋怒誅之趙書曰臨沅侯崔約字道恭與太子詹事羯孫珎㑹朝珎患目痛問約用何方治爲佳約戯言唯溺取愈珎曰目何可溺約曰卿目腕腕正可溺中珎入奏天子怒約父子伏誅晉書曰劉􅁉誅諸葛長民士庻咸恨正刑之晚􅀂釋桎梏焉宋書曰謝眺􅀄告王敬則反眺臨誅歎曰天道其不可昧乎我不殺王公王公因我而死莊子曰爲不善乎顯明之中者人得而誅之爲不善乎幽闇之中者􅀑得而誅之明乎人明乎􅀑者然後能獨行也列子曰鄧析操兩可之說設無窮之辭當子産執政作竹刑鄭國用之數難子産之治子産俄而誅之慎子曰有虞之誅以幪巾當墨以草纓當劓以菲履當刖以艾韡當宫布衣無領當大辟此有虞之誅也斬人支體鑿其肌膚謂之刑􅀞衣冠異章服謂之戮上丗用戮而民不犯也當丗用刑而民不從韓子曰堯欲傳天下於舜諌曰不祥哉孰以天下傳之疋夫堯不聽舉兵誅之於郊共工又諌流於幽都天下莫敢言又曰太公東封齊齊東海上有居士曰狂獝華士昆弟二人立議曰上不臣天子下不事諸侯耕作而食掘井而飲吾無求於上太公至營丘使執而殺之周公聞發急傳問之太公荅曰今有馬如􅂹之狀天下至良也驅之不前引之不至左之不左右之不右賢士而不爲主用􅂹之不可以左右是以誅之㑹稽典録曰孟嘗仕郡户曹史上虞有寡婦􅀟飬姑至孝姑卒病亡其女言縣以􅀟煞其母縣不理斷結竟言郡郡報治罪嘗諌以爲此婦素名孝謹此必見誣固諌不聽遂抱其獄文書哭於府門後郡遭大旱三年上虞尤甚太守殷丹下車訪問嘗具陳􅀟不當死誅姑之女改葬孝婦丹如其言天應雨注襄陽耆舊記曰李衡聞王衜音道有人物往干之衜曰多士丗尚書劇曹郎才也後數年校書郞吕壹操弄權柄大臣逼畏莫敢言或問衜衜曰非李衡無能困之者遂共薦衡爲郎衡一引見口奏壹數千語孫權有愧色劉助復告壹壹即伏誅丗􅀃曰桓宣武之誅􅀽眞也未當其罪丗以爲􅁈焉􅀽眞在壽春甞與宣武一妾姙焉生玄及􅆲亦覆桓族識者以爲天理之所至轘釋名曰車裂曰轘轘也者散也支體分散傳曰齊人殺子亹而轘髙渠彌車裂曰轘又曰楚子爲陳夏氏亂故伐陳謂陳人無動將討於少西氏遂入陳煞夏徴舒轘之栗門又曰楚觀起有寵於令尹子南未益禄而有馬數十乗楚人患之王煞子南於朝轘起於四境孔藂子曰齊王行車裂之刑群臣諌不聽子髙見齊王曰聞君行車裂之刑夫車裂之刑無道之刑也而君行之臣切以爲下吏之過也王曰寡人耳民多犯法爲法之輕也子髙曰然此誠君之盛意也夫人含五常之性有哀樂喜怒無不過其節節過則毀於義多犯法以法之重無所措手足故也今天下悠悠士無定處有德則徃無德則去欲䂓覇王之業與衆大國爲難而行酷刑以懼逺近國内之民將畔四方之士不至此乃士國之道君之下吏不得以聞是爲自居於中正之地而闇推之君王使同於桀紂也且夫爲人臣見主非而不爭以䧟主於危亡罪之大者也人主疾臣之弼已而惡之資臣以箕子比干之忠惑之大者也齊王曰謹聞命遂除車裂之法焉史記曰秦發兵攻商君殺之於鄭澠池秦惠王車裂商君徇曰莫如鞅反滅商君之家又曰張儀西􅀃趙王曰􅂫秦熒惑諸侯以是爲非以非爲是欲反之不可一亦以明矣漢書曰陳勝􅀄令銍人宋留將兵定􅀯陽入武􅀜留巳徇􅀯陽聞勝死􅀯陽復爲秦宋留不能入武􅀜乃東至新蔡遇秦軍宋留以軍降秦傳留至咸陽車裂留以徇續漢書曰張角别黨馬元義爲山陽所捕得鎻送京師車裂於市崔鴻前涼録曰武威姑臧氏名白興以女爲妻其妻妬之興怒以妻爲婢爲女給使郡縣以聞張駿大驚曰自古所未聞也將爲恠乎於姑臧市轘煞之是月沉隂昏霧䨪四塞又曰前秦録曰池陽民惑其婦言而欲煞母遂車載母辭詣親家入南山母曰汝詣親家何至是也児曰老婢何言遂下母於嵠谷之間脫衣將殺之􅀄婦謂其夫曰不可不得中衣來也児不欲手脫背坐厲聲令母自脫母泣曰我生汝飬汝至於今日汝信婦言枉煞我不可不乞我此衣児怒曰老婢復何言母呼曰天神山神當見此不言未卒聲見所持刀忽貫其項而煞投於山穴母乗車却歸昏而反家婦謂其夫還逆問曰得中衣來不母馳告隣里収其婦送官郡縣以聞堅驚曰宇宙之内乃有此事將非恠乎於是轘而煞之崔鴻􅀯燕録曰慕容超即位太后告超曰左僕射封嵩數遣黄門令牟裳說吾云帝非太后所生依如故法冝勒兵廢帝立鍾爲主超命執嵩斬之嵩請與母别超曰汝尚知有母何意問人之親以五車裂之又前秦録曰有司奏人有盗其母之錢而逃者請投之四裔太后聞而怒曰三千之罪莫大於不孝當弃之市朝柰何投之方外乎方外豈有無父母之郷乎於是轘而殺之淮􅀯子曰萇弘周宣之執數者也天地之氣日月之行風雨之變律暦之數無所不通也然不自知車裂而死劉向􅀃苑曰􅁗始皇太后不謹幸郎繆毒封爲信侯專國事驕奢與侍中左右貴臣俱博飲酒醉爭言而闘與闘者走白皇帝大怒毒因作亂咸陽宫始皇取毒四支車裂之取皇后遷之長樂宫桓寛塩䥫論曰李斯相秦藉天下之􅀔志小萬乗及其囚於囹圄車裂於雲陽之市願􅀒薪入東門行上蔡徑不可得也烹釋名曰煑之於鑊曰烹􅀂烹禽獸之肉也傳曰寒浞伯明氏之䜛子弟也伯明后寒弃之夷羿収之夷氏也信而使之以爲巳相浞行媚于内内宫人信施賂于外愚弄其民欺罔也而虞羿于田樂之以㳺田樹之詐慝以取其國家樹立也外内咸服信足詐羿猶不悛悛改也將歸自田羿獵還家衆殺而烹之以食其子食羿子其子不忍食諸死于窮門殺之於國門又曰楚客聘於晉過宋太子知之請野烹之公使徃伊戾請從之公曰夫不惡汝乎對曰小人之事君也惡之不敢逺好之不敢近敬以待命敢有二心乎縱有供其内莫供其外臣請往也遣之至則欿用牲加書徴之詐作盟處爲太子反徵驗也而騁告公曰太子將爲亂旣與楚客盟矣公囚太子乃縊而死公徐聞其無罪也乃烹伊戾又曰楚白公爲亂旣死其徒徴之生拘石乞而問白公之死焉乞白此事也克則卿不克則烹何害固其所也乃烹石乞史記曰齊威王召阿大夫語曰自子之守阿譽言日聞然使使視阿田野不辟民貧苦昔者趙攻甄子弗能救衛取薛陵子弗知是子以幣厚吾左右以求譽也是日烹阿大夫及左右嘗譽者并烹之又曰主父偃曰丈夫生不五鼎食死則五鼎烹漢書曰韓信聞酈食其慿軾下齊七十餘城廼夜渡兵平原襲齊齊王田廣聞漢兵至以爲食其賣巳言其與韓信同謀廼烹食其又曰韓信以罪廢爲淮䕃侯謀反誅臨死歎曰悔不用蒯通之言髙帝曰是齊辯士蒯通廼詔蒯通通至上欲烹之曰􅀂教韓信反何也通曰狗各吠非其主當彼時臣獨知齊王韓信非知陛下也且􅁗失其鹿天下共逐之髙材者先得天下匈匈争欲爲陛下所爲頋力不能可殫誅邪上乃赦之晉中興書曰劉寅於厭次縣築壘拒石勒勒後虜執寅以鑊湯煑之韓子曰樂羊爲魏將攻中山其子在中山中山之君烹其子而遺之樂羊坐於幕下而饗之吕氏春秋曰齊王疾痛使人迎文摯至視王疾謂太子曰非怒王則疾不可活王怒則摯必死太子頓首強請曰苟巳王疾臣與母以死事之願先生勿患也摯曰諾與太子期而至將徃不當者三齊王固已怒矣摯至不解履登牀問疾王怒不與言摯因出固辤以重怒王吐而起疾乃遂已王大怒不恱將烹摯太子與王左右急争之不得果以鼎烹摯㸑之三日三夜顔色不變摯曰誠欲殺我則胡不覆之以絶隂陽之氣王使覆之乃死新序曰田卑處中牟佛肹以中牟叛置鼎於庭致士大夫曰與我者受邑不吾與者烹大夫從之至於田卑曰義士死不避斧􅃏之罪窮不受軒冕之服無義而生不仁而冨不􅀂死褰衣將入鼎佛肹􅀃乃止趙氏攻取之聞田卑不肯與也求而賞之卑曰不可也一人舉而萬夫俛首智者不爲賞一人而慙萬夫義者不取我受賞使中牟之士皆耻不義吾去耳遂之南楚英雄記曰董卓攻得李昊張安畢圭􅁐中生烹之二人臨入鼎相謂曰不同日生而同日烹太平御覽卷第六百四十五
