front:
  text: 太平御覽卷第五
  hash: sha256:b20845bd96f6a2db6bb92f77f442ed85f60422a0f53832b94da7287dd46c7bdf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_005-1a}
body:
  text: 天部五星上釋名曰星散也列位布散也􅀫􅀫也星各止􅀫其所也說文曰萬物之精上爲列星三五曆記曰星者元氣之英水之精也易曰日中見斗幽不明也又曰在天成象在地成形象况日月星辰形况山川草木書曰堯乃命羲和欽􅀂昊天曆象日月星辰敬授人時又曰日中星鳥以殷仲春又曰庶民惟星星有好風星有好雨星民象故庶民惟若星箕星好風畢星好雨亦民所好也月之從星則以風雨月經於箕則多風離於畢則多雨政教失常以從民欲亦所以乱也詩曰晥彼牽牛不以服箱注晥明星貌河鼔謂之牽牛也又曰維南有箕不可以簸􅀭維北有斗不可以挹酒漿又曰東有啓明西有長庚日旦岀謂明星爲啓明日旣入謂明星爲長庚庚續也又曰嘒彼小星三五在東三心也五噣也嘒微明皃蜀音晝柳也又曰子興視夜明星有爛又曰三星在户又曰月離于畢俾滂沲矣又曰定之方中作于楚宫定營室星也又曰維南有箕載翕其舌維北有斗西柄之掲又曰昏以爲期明星煌煌禮曰八月中氣是月也命有司享壽星於南郊又曰十二月是月也日窮于次月窮于紀星回于天又曰幽禜􅀕星也又曰天秉陽垂日星又曰宿離不忒無失經紀注二十八􅀫爲經七曜爲紀周禮曰保章氏掌天星以志星辰日月之變動以觀天下之遷辨其􅁻凶以星土辨九州之地所封封域皆有分星以觀祅祥左傳曰魯莊公七年夏四月辛夘夜􅁪星不見夜中星隕如雨與雨偕也又曰魯僖公五年晉侯復假道於虞以伐號問於卜偃曰吾其濟乎對曰克之童謡云丙子之晨龍尾伏辰杜預曰龍尾是尾星也又曰十六年春隕石于宋五隕星也又曰魯襄公二十八年春無氷梓愼曰今兹宋鄭其饑乎􅀊在星紀星紀在田而􅁋於􅀇枵􅀇枵在子虚危之次星紀斗牛之次以有時災隂不堪陽虵乗龍龍歲星木也木爲青龍虵爲􅀇武龍失次也龍宋鄭之星也宋鄭必飢􅀇枵虚中也枵耗名也土虚而民耗不飢何爲又曰昔髙辛氏有二子長曰閼伯季曰實沉居于曠林不相能也日尋干戈以相征討后帝不臧后帝堯也臧善遷閼伯于啇丘主辰啇丘宋地也主祀辰星辰大火也啇人是因故辰爲啇星啇人湯先祖封啇丘因閼伯故國祀辰星遷實沉于大夏主參大夏今晉陽縣也唐人是因故參爲晉星又曰火中寒暑乃退心以季夏昏中而暑退季冬旦中而寒退又曰昭三十二年呉伐越史􅇘曰不及四十年越其有呉乎越得歳而吳伐之必受其凶榖梁傳曰列星曰􅁪星亦曰經星􅁪經皆常也爾雅曰星紀斗牽牛也􅀇枵虚也又曰􅀕星曰布布散食於地上又曰西陸昴也郭璞曰昴西方之宿别名旄頭論語曰爲政以德譬如北辰居其所而衆星拱之易是􅀋謀曰五星合狼張晝視無日光虹蜺煌煌太山失金雞西岳亡玉羊太山失金雞者箕星亡也箕者風也風動雞鳴今箕候亡故雞亦亡也西岳亡玉羊者羊星在未未爲羊雞失羊亡臣縱恣萬人愁不祥京房對災異曰人君不行仁恩破胎傷孕春殺無辜則歳星失度尚書考靈耀曰􅀊星木精熒惑火精鎮星土精大白金精辰星水精也又曰􅀊星得度五榖滋熒惑順行甘雨時鎮星得度地無災太白出入當五榖成熟人民昌又曰心火星天王也其前星太子後星庶子也詩紀曆樞曰箕爲天口主出氣尾爲逃臣賢者叛十二諸侯列於廷元命苞曰五諸侯此云十二則兼他星爲數也禮稽命圖曰作樂制禮得天心則景星見也禮斗威儀曰鎭星黄時則祥風至春秋􅀃題辭曰星之爲言精也榮也陽之精也陽精爲日日分爲星故其字日生爲星春秋元命苞曰直􅓡北有一大星爲老人星見則治平主壽亡則君危主亡常以秋分候之又曰啇紂之時五星聚於房房者蒼神之精周據而興又曰玉衡北兩星爲玉繩玉之爲言溝刻也瑕而不掩折而不傷宋均注曰繩能直物故名玉繩溝謂作器又曰心三星五度有天子明堂布政之宫又曰尾九星箕四星爲後宫之場列爲南宫其庭太微又曰蟾蠩隂精流生織女立地侯宋均注曰地侯鎭星别名也又曰三台星色齊君臣和不齊大乖春秋合誠圖曰天文地理各有所主北斗有七星天子有七政也又曰軒轅主雷雨之神旁有一星􅀇戈名曰貴人旁側郎位主􅀫衛尚書春秋運斗樞曰北斗七星第一天樞第二璇第三機第四權第五玉衡第六開陽第七摇光廣雅又云樞爲雍州璇爲兾州機爲青兖州􅁠爲徐揚州衡爲荆州開陽爲梁州摇光爲豫州第一至第四爲魁第五至第七爲扚合爲斗居隂布陽故稱北又曰五帝所行同道異位皆循斗樞機衡之分遵七政之紀九星之法又曰天樞得則景星見衡星得則麒麟生萬人夀春秋佐助期曰蕭何禀昴星而生春秋後傳曰魏人唐睢對秦王曰專諸之刺王僚彗星籠月色春秋文耀鈎曰老人星見則主安不見則兵起論語䜟曰仲尼曰吾聞堯率舜等遊首山觀河渚有五老遊河渚一老曰河圖將來告帝期二老曰河圖將來告帝謀三老曰河圖將來告帝書四老曰河圖將來告帝圖五老曰河圖將來告帝符龍衘玉苞金泥玉撿封盛書五老飛爲流星上入昴孝經援神契曰歳星守心則年榖豐廣雅曰太白謂之長庚或謂之太􅅝又曰熒惑謂之罰星或謂之執法又曰天宫謂之參旗紫宫參伐謂之大辰太微謂之明堂史記天官書曰星者金之散氣又曰漢中四星曰天駟旁一星玉良王良䇿馬車􅀐滿野又曰星墮至地則石也河濟之間時有墜星又曰畢爲罕車爲邊兵主戈獵其大星傍小星爲附耳附耳動有䜛臣在側又曰四鎭星所出四隅􅀂月始出也又曰咸池曰天五潢五帝車舎又曰中端門門左右掖門門内六星諸侯其内五星五帝坐又曰漢武帝以正月上辛祠太一甘泉夜祠到明怱有流星至於祠壇上使童男女七十人俱歌又曰魁下六星兩兩相比者曰三能蘇林曰能音台又曰東宫蒼龍房心心爲明堂爲天府又曰國皇星大而赤狀􅀋南極徐廣注曰南極老人星也又曰五星皆大其事亦大皆小其事亦小早出爲盈盈者爲客晚出爲縮縮者爲主同舎爲合相陵爲闘漢書曰皇甫嵩爲太尉以流星免官又曰武帝時中星盡揺占曰民勞也後征伐四夷又曰北斗七星所謂琁璣玉衡以齊七政杓擕龍角孟康曰杓斗杓也龍角東方宿也擕連也又曰營室爲淸廟亦曰離宫又曰河鼔太星上將其北織女織女天女孫也又曰髙帝七年月暈圍參畢七重占曰畢昴間天街也街北胡也街南中國也後有平成之圍又曰太微之十二星東相西將又曰戴主六星曰文昌宫一曰上將二曰次將三曰貴相四曰司命五曰司禄六曰司灾又曰危東六星兩兩而比曰司宼又曰古人有言曰天下太平五星循度又曰革命創制三章是紀應天順人五星同軌又郊祀志曰漢祖詔御史令天下立靈星祠常􅀊時祠以牛又曰天文志曰金木水火土五星天之五佐爲經緯伏見有時􅀊星東方春於人五常仁也五事貌也仁􅃜皃失逆春令傷木氣罰見􅀊星熒惑南方夏禮也視也禮􅃜視失逆夏令傷火氣罰見熒惑太白西方秋義也言也義􅃜言失逆秋令傷金氣罰見太白太白經天孟康注曰謂出東入西出西入東也太白隂星出東當伏西過午爲經天􅀳灼曰星盡見午爲經天天下兵革民更主是謂亂紀人民流亡晝見與日爭明強國弱小國強女主昌辰星北方冬智也聽出智虧聽失逆冬令傷水氣罰見辰星鎭星中央土主季夏信也思心也仁義禮智以信爲主貌言視聽以心爲正四星皆失鎭星乃爲之動又曰凡五星色皆白爲䘮爲兵爲旱青爲憂爲水黑爲疾多死黃吉五星同色天下偃兵百姓安寧歌舞以行不見災疾五榖蕃昌又曰天星皆有州圖分野角亢氐房心豫州之分尾箕幽州之分牽牛婺女揚州之分虚危青州之分營室東壁并州之分胃徐州之分畢昴兾州之分觜參益州之分東井輿􅀑雍州之分栁七星張三河之分翼軫荆州之分折木之津燕之分大火宋之分夀星鄭之分鶉尾楚之分鶉火周之分鶉首秦之分實沉魏之分大梁趙之分降婁魯之分訾即移反娵于下反衛之分􅀇枵齊之分星紀呉之分太史掌之以觀祅祥又曰􅁗地於天官東井輿􅀑之分野周地栁七星張之分野韓地角亢氐之分野趙地昴畢之分野燕地箕之分野齊地虚危之分野魯地奎之分野宋地房心之分野衛地營室東壁之分野楚地翼軫之分野呉地斗牛之分野漢武故事曰西王母使者至東方朔死上問使者對曰朔是木帝精爲􅀊星下逰人中以觀天下非陛下臣也漢書音義曰瑞星曰景星亦曰德星妖星曰孛星彗星長星亦曰􅍴搶絶跡而去曰飛星光跡相連曰流星亦曰奔星星光曰芒後漢書曰嚴光字子陵與光武爲友後光武登阼忘之光怨帝是時太史云天上有客星恨帝帝曰豈非朕故人嚴子􅁜乎遽命徴之夜與子陵共卧光以脚加帝腹太史奏客星侵御座子陵縮脚客星尋退竟不仕又曰李固對詔陛下有尚書猶天之有北斗北斗天之喉舌尚書陛下之喉舌斟酌元氣運乎四時出納王命所爲制氣之臣也又曰和帝分遣使者二人各至州郡觀採風謡二人當到益州投􅃸館吏李郃舎郃問曰二君發京師時知朝廷遣二使耶問何以知之郃指星云前有二星向益州分野謝承後漢書曰呉郡周敞師事京房房爲石顯所譛繫獄謂敞曰吾死後四十日客星必入天市即吾無辜之驗也房死後果如房言東觀漢書記曰光武破聖公與伯叔書曰交鋒之日神星晝見太白清明蜀志曰漢安二十五年劉豹向舉上言於先主曰乃年太白熒惑鎭從􅀊漢􅀄興五星聚􅀊星主義漢位在西義之上方故漢法常以􅀊星􅀱人主當有聖主起於此以致中興頃者熒惑復追􅀊見在胃昴爲天維經曰帝星處之衆邪消亡於是先主即位續晉陽秋曰桓􅀇庶母馬氏本􅀽眞之妓也與同列薛氏郭氏夏夜同出月下有銅甕水在其側見一流星墮瓮中驚喜共視見星如二寸火珠於水厎冏然明淨乃相謂曰此吉祥也誰當應之於是薛郭更以瓢接取並不得馬最後取星正入瓢中便飲之旣而􅀂有感焉俄而懷􅀇􅀇雖簒位不終而數年之中榮貴極矣太平御覽卷第五
