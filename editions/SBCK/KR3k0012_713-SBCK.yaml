front:
  text: 太平御覽卷第七百一十三服用部十五
  hash: sha256:d375e0cef45e6f799ea0fc3d33b5693ef847dc75a18782cca07b88ed964a3556
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_713-1a}
body:
  text: 匣匱厨匣說文曰匣匱也論語季氏曰孔子謂冉求曰虎兕出於匣拾遺録曰含塗國人善服鳥獸雞犬皆使之能言雞犬牛豕死者以玉爲匣埋海上其主遊戲海上於地中聞犬豕雞之聲主者猶識掘而取之還養如昔焉唯毛羽秃落乆更恱弈魏武帝上雜物䟽曰銀鏤􅃮匣四枚古歌曰流塵生玉匣匱說文曰匱櫝也匣也論語子罕云韞櫝而藏諸求善價而沽諸櫝匱也論語季氏曰􅀛玉毀於櫝中左傳曰昭七年傳曰燕人歸燕􅁎以瑶甕玉櫝國語曰夏之衰也褒人之神化爲二龍而言曰余褒之二君也夏后布幣而䇿告之龍亡而漦在櫝而藏之漦俟淄切龍涎也王隱晉書曰甘卓家金匱鳴聲似槌鏡清而悲師言金匱將離是以悲鳴尋而卓下將軍周慮等承望敦意害卓唐書曰王伾下劣闒茸不能如叔父有大志唯務金帛寳玩爲無門大櫃上開一孔使足以受物夫妻寢止其上韓子曰楚人賣其珠於鄭者爲木蘭之櫝薫以桂椒綴以珠玉飾以玫瑰緝以翡翠鄭人買櫝而還珠未可謂善鬻珠也李尤匱匣銘曰國有都邑家有匣匱貨賄之用我之利器厨魏略曰扈累字伯重京兆人常隨青牛先生先生字方正曉知星暦風角鳥情累得其術有婦無子後亦䘮婦獨居道側以塼爲障施一厨牀食􅀫其中晉陽秋曰顧愷之尤好丹青嘗以一厨􅀞􅀉桓玄悉糊題其前玄乃發厨後而取之封題如舊以還之愷之見封題如􅀄但失其􅀞直云妙􅀞通靈變化而去猶人登仙也沈約宋書曰収范曄家樂器服玩並皆珎麗妓妾亦盛飾母住止單陋唯有一厨盛撨薪齊書曰衡陽王鈞母區貴人卒鈞哀毀甚先是貴人花􅁫厨子賜鈞以爲玩弄貴人亡後每歳時及朔望輒開禮再拜鯁咽見者皆爲之悲又曰陸澄當丗稱爲碩學讀易三年不解文義欲撰宋書竟不成王儉戯之曰陸公書厨也南史記謝弘微臨終語左右曰有二厨書湏劉領軍至可於前燒之愼勿開也拾遺録曰郭况家冨以玉器盛食故東京謂郭家爲瓊厨金屈東宫舊事曰皇太子拜有栢書厨一梓書厨一范寗教曰籍官之大信而比散在衆曹此不可也可令作十五籍厨一縣一厨太平御覽卷第七百一十三
