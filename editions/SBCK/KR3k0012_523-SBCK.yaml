front:
  text: 太平御覽卷第五百二十三禮儀部二
  hash: sha256:2fd08810be428ece47517fa262c5ffe0f0b0f7a348a6773338fbad4f012042a5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_523-1a}
body:
  text: 叙禮二禮記外傳曰􅁻凶賔軍嘉即五禮之目也􅁻禮者􅀕祀郊廟宗社之事是也􅁸自神農氏始教民種􅂖禮始於飲食吹葦籥擊士鼓以迎田祖致敬􅀑神祭皆用樂此伊􅂄氏即神農别號凶禮者䘮紀之􅀃年榖不登大夫去國之事也皇帝始養生送死也賔禮者貢獻朝聘之事是也軍禮者始黄帝與􅃖尢戰於􅃰鹿之野嘉禮者好㑹之事起自伏羲以儷皮爲幣始制嫁娶亨通者嘉㑹之事也其後有冠冠者代父之事者婚有継丗之道物有代謝之期悲發於裏乃非純􅁻故爲喜尉之事也郷飲酒郷射食􅂄老王燕族人之事是也四者亦嘉㑹也但前代象天其禮質而略後代法地其事煩而文唐虞之際五禮明備周公所制文物極矣左傳文下曰齊侯侵我西鄙遂伐曹入其郛討其來朝也季文子曰齊侯其不免乎巳則無禮執王使而伐其罪而討於有禮者曰女何故行禮禮以順天天之道也巳則反天而又以討人難以免矣又文公曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失隊曰見有禮於其君者事之如孝子之養父母也見無禮於其君者誅之如鷹鸇之逐鳥雀也又宣十六年晉侯使士㑹平王室定王享之原襄公相禮原襄公周大夫相佐也殽烝烝升也升殽於俎武子私問其故享當體薦而殽烝怪故問之士㑹謚季其字王聞之召武子曰季氏而弗聞乎王享有體薦享則半解其體而薦之所示以共儉宴有折爼體解節折升之於爼物皆可食所以示慈惠也公當享卿當宴王室之禮也公謂諸侯武子歸而講求典禮以脩晉國之法又昭二年曰晉侯使韓宣子來聘公即位故且告爲政而來見禮也代趙武爲政雖盟主而脩好同盟故曰禮觀書於太史氏見易象與魯春秋曰周禮盡在魯矣昜象上下經之象辝魯春秋史記之䇿書春秋遵周公之典以序事故曰周禮盡在魯也吾乃今知周公之德與周之所以王也昜象春秋文王周公之制當此情儒道廢諸國多門唯魯備故宣子適魯而􅀃之也又昭二曰楚靈王使問禮於左師與子産左師曰小國習之大國用之敢不薦聞言所聞謙示所未行獻公合諸侯之禮六其禮六儀也宋爵公故獻公禮子産曰小國共職敢不薦守獻伯子男㑹公之禮六鄭伯爵故獻伯子男㑹公之禮又昭二曰公如晉自郊勞至于贈賄徃有郊勞去有贈賄無失禮揖讓之禮晉侯謂女叔齊曰魯侯不亦善於禮乎對曰魯侯焉知禮公曰何爲自郊勞至于贈賄禮無違者何故不知對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也又昭二曰孟僖子病不能相禮不能相儀荅郊勞以此爲巳疾乃講學之講習也苟能禮者從之及其將死也二十四年孟僖子卒傳終言之召其大夫曰禮人之幹也無禮無以立吾聞將有逹者曰孔丘僖子卒時孔丘年三十五聖人之後也我􅀂􅀗没得以壽終必屬􅀃與何忌於夫子使事之􅀃南宫敬叔何忌孟懿子皆僖子之子也而學禮焉以定其位知禮則位安又昭六曰鄭子大叔見趙簡子簡子問揖讓周旋之禮焉對曰是儀也非禮也簡子曰敢問何謂禮對曰􅁻也聞諸先大夫子産曰夫禮天之經也經者道之常地之義也義者利之冝也民之行也行者人所履天地之經而民實則之簡子曰甚哉禮之大也對曰禮上下之紀天地之經緯也緯經錯居以相成者民之所以生也是以先王尚之又昭六曰齊景公曰善哉吾仐而後知禮之可以爲國也對曰禮之可以爲國也乆矣與天地並有天地則禮義興君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣共而不貳父慈而教子孝而箴箴諌也兄愛而友弟敬而順夫和而義妻柔而正姑慈而從從不自專婦聽而婉婉順也禮之善物也又定下曰公㑹齊侯于祝其實夾谷夾谷即祝其地孔丘相相㑹儀也犂彌言於齊侯曰孔丘知禮而無勇􅀂使萊人以兵刧魯侯必得志焉又定下曰邾隱公來朝邾子益也子貢觀焉邾子執玉髙其容仰公受玉卑其容俯王朝者之贄子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之禮也將左右周旋進退俯仰於是乎觀之今正月相朝而皆不度不合法度心巳亡矣又哀上曰太􅌠嚭召季康子嚭吴大夫康子使子貢辭太宰嚭曰國君道長大言君長於道路而大夫不出門此何禮也對曰豈以爲禮畏大國也畏大國不敢虚國盡行大國不以禮命於諸侯苟不以禮豈可量也寡君旣共命焉其老豈敢弃其國太伯端委以治周禮仲雍嗣之斷髮文身臝以爲飾豈禮也哉春秋􅀃題辭曰禮者所以設容明天地之體也論語曰有子曰禮之用和爲貴先王之道斯爲美小大由之有所不行知和而和不以禮節之亦不可行也又曰子曰導之以政齊之以刑民免而無耻導之以德齊之以禮有耻且格又曰子曰夏禮吾能言之􅂎不足徴也殷禮吾能言之宋不足徴也徴成也杞宋二國夏殷之後夏殷之禮吾能􅀃之􅂎宋之君不足以成也又曰子張問十丗可知也丗謂易姓之丗也問其制度變易如何子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也所損益可知也者據時篇目皆在可校數其或繼周者雖百丗可知也自周之後以爲變易損益之極極於三王亦不是過也又曰顔淵問仁子曰克巳復禮爲仁一日克巳復禮天下歸仁焉爲仁由巳而由人乎哉顔淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顔淵曰回雖不敏請事斯語矣又曰子曰禮云禮云玉帛云乎哉言禮非但崇此玉帛而巳所貴者乃貴其安上治民漢書曰漢王巳并天下諸侯共尊爲皇帝於定陶叔孫通就其儀號髙帝悉去秦儀法爲簡易羣臣飲争功醉或妄呼抜劒擊柱上患之通知上益饜之􅀃上曰夫儒者難與進取可與守成臣願徴魯諸生與臣弟子共起朝儀上曰可試爲之令易知度吾所能行爲之七年長樂宫成諸侯群臣朝十月大行設九賔臚句傳上傳語告下爲臚下告上爲句於是皇帝輦岀房百官執㦸傳警引諸侯王以下至吏六百石以次奉賀自諸侯王以下莫不震恐肅敬至禮畢盡伏置法酒文頴曰作酒令法也􅂫林曰常㑹湏天子中起更衣然後入置酒諸侍坐殿上皆伏抑首如淳曰抑屈以尊卑次起上壽觴九行謁者言罷酒御史執法舉不如儀者輙引去竟朝置酒無敢讙譁失禮者於是髙帝曰吾乃今日知爲皇帝之貴也拜通爲太常賜金五百斤通出皆以五百金賜諸生諸生乃喜曰叔孫生聖人知當丗務也又曰王者必因前王之禮而順時施冝有所損益節人之心稍稍制作又曰宣帝時諌議大夫王吉上䟽願􅄒舊禮明王制驅一代之人躋之仁壽之域范曄後漢書曹襃傳曰詔召玄武司馬班固問改定禮制之冝固曰京師諸儒多能􅀃禮冝廣招集共議失得帝曰諺言作舎道邊三年不成㑹禮之家名爲聚訟牙生疑異筆不得下昔尭作大章一夔足矣章和元年正月乃召褒詣嘉德門令小黄門持班固所上叔孫通漢儀十二篇勑襃曰此制散略多不合經今冝依禮條正使可施行於南宮東觀盡心集作典略曰孔子過宋與弟子集禮於大樹下宋司馬桓魋使抜其樹去適鄭六韜曰太公對文王曰禮者治之粉澤也管子曰禮者因人之情縁義之理爲之節文者也孟子曰惻隠之心仁之端也辭讓之心禮之端也孫卿子曰禮者人主以爲群臣尺寸㝷文檢式也禮有三夲天地生之夲先祖􅀋之夲君師治之夲國之夲在禮也又曰人生有欲欲則求求則爭爭則亂亂則窮先王惡其亂也故制禮義以養之禮者養也稻梁五味所以養口也椒蘭芬馨所以養􅈹也雕􅅣刻鏤黼黻文章所以養自也䟽房越席沐浴机筵所以養體也莊子曰三王五帝之禮儀法度不矜於同而矜於治故譬三王五帝之禮儀法度其猶柤橘柚菓􅀲之屬耶其味反而皆可於口文予曰老子云爲禮者雕􅅣人性矯拂其情目雖欲之禁以法心雖樂之節以禮趍翔周旋屈節異儀肉凝而弗食酒敗而不飲外束其形中愁其意汨隂陽之和而迫生命之情慎子曰禮從俗政上國有貴賤之禮無賢不肖之禮有長㓜之禮無勇怯之禮有親踈之禮無愛惡之禮也淮南子曰禮者體情而制文者也又曰夫水積則生相食之􅆉言大魚食小魚士積則生食􅁏之獸禮飾則生僞慝之儒僞詐慝姦夫吹􅁅而欲無眯渉水而欲無濡不可得也􅀃苑曰齊景公登酎晏子脩食禮以待公曰禮寡人饜之矣吾欲得天下勇士與之圗國晏子對曰君子無禮是庶人也庶人無禮是禽獸也禮而治國所以御民也轡者所以馭馬也無禮而治國家者嬰未甞聞也景公曰善乃飾酎更席以爲上客尸子曰秋爲禮西方爲秋秋肅也萬物莫不肅敬禮之至也韓詩外􅀓曰晏子聘魯下堂則趍授立則跪子貢怪之問孔子孔子問晏子晏子對曰夫上堂之禮君行一臣行二也今君之受幣也畢臣敢不跪乎孔子曰善禮中又有禮董生書曰禮者天所爲也文者人所爲謂之禮禮者因人情以爲節文以救其亂也夫隄者水之防也禮者人之防也刑防其末禮防其本也白虎通曰夫禮者隂陽之際也百事之㑹也所以尊天地賔􅀑神序上下之道也􅀽淮書曰禮者縁人情而爲之節度者也􅃊父愛親之情也尊親敬長之義耳物理論云禮者履也律也義同而名異孫卿禮賦曰爰有大物非􅁝非帛文理成章非日非月爲天下明生者以壽死者以葬城郭以固三軍以強粹而王駮而霸無一焉而亡也太平御覽卷第五百二十三
