body:
  text: 人事部十二胷膈乳腹背脊脅肋臍腰胷􅀃文曰膺􅇩也臆胷骨也廣雅曰臆膺胷也釋名曰胷猶啌啌氣所衝啌許江切左傳僖下曰魏犨􅅡僖􅀒羈氏魏犨傷於胷公欲殺之而愛其材使問且視之病將殺之魏犨束胷見使者曰以君之靈不有寧也距躍三百曲踊三百乃舎之論語摘輔象曰孔子胷應矩是謂儀古春秋演孔圖曰孔胷文曰制作定世符運春秋後語曰荆軻謂樊於期曰願得將軍之首以獻秦王秦王必喜而見臣臣左手把其䄂右手揕其胷漢書曰髙祖與項羽對軍數羽十罪羽伏弩射漢王中胷髙祖詐捫足曰虜中吾指又曰王莽好反膺髙視京房易妖占曰人生子有二胷民謀其主帝王世紀曰禹母吞神珠胷坼而生禹淮南子曰文王洿膺許慎注曰洿盧也南州異物志曰獠民亦謂文身國刻其胷前作華文以爲飾山海經曰結胷國爲人結胷郭璞注曰臆前出如人結喉貫胷國爲人胷有竅世􅀃曰王孝伯問王大忱阮籍何如司馬相如王大忱曰阮籍胷中壘塊故湏酒澆之言同相如唯有酒異大忱小字録異傳曰漢武帝時蒼梧賈雍爲豫章太守有神術出界計賊爲賊所殺失頭雍上馬還營營中咸走來視雍雍胷語曰有頭爲佳吏涕泣曰有頭佳雍曰無亦佳言畢遂死志怪集曰石季倫母䘮洛下豪俊赴殯者傾都王戎亦入臨殯便見􅀑攘臂打搥鑿甚惶惶有一人當棺立此􅀑披胷䧟之此人即應鑿而倒人便舁去得病半日死故世間相傳不冝當棺由戎所見膈􅀃文曰胷心上膈也釋名曰膈塞也膈塞上下使不與􅂖氣相亂世􅀃曰桓公有主簿善別酒輙令先甞好者謂青州從事惡者謂平原督郵青州有齊郡平原有膈縣從事言至臍督郵言至膈上住乳廣雅曰湩謂之乳􅀃文曰湩乳汁也湩音凍又竹仲切通俗文曰乳病曰丁故切河圖曰蒼帝井乳宋均日法房星也春秋元命苞曰文王四乳是爲含良蓋法酒旗布恩舒明宋均曰乳酒也漢書曰張蒼免相後口中無齒食乳以女子爲乳母也謝承後漢書曰南陽李善夲濟陽李元家奴元遭病死唯有􅀌孫續有貲千萬奴婢欲謀殺續分其財産善夜抱續逃瑕丘界親自哺養乳爲生湩遂至成長吴書曰潁川馮熈使魏辭意不屈魏留之熈懼見迫乃引刀刺中乳房上聞嘉之賜鹽米復其門後魏書曰朱循之爲劉義隆司徒從事中郎守滑臺安頡圍之其母在家乳汁忽出母號慟告家人曰我年老非復有乳汁之時今忽如此兒必没矣果以其日爲頡所擒又曰昭成皇帝諱什翼卧則乳至席齊書曰太祖母陳皇后生太祖二年乳人乏乳后夢人以兩甌麻粥與之􅁴乳遂大出淮南子曰文王四乳是謂太仁天下所歸百姓所親山海經曰形夭與帝爭神帝斷其首罪葬之常羊山乃以乳爲目齊爲口益部􅂄舊傳曰蜀郡張寛字叔文漢武帝時爲侍中從祀甘泉至渭橋有女子浴於渭水乳長七尺上怪問之女曰帝後第七車者知我所來時寛在第七車對曰天星主祭祀者齋戒不嚴時則女人見劉欣期交州記曰趙嫗者九眞軍安縣女子也乳長數尺不嫁入山聚羣盗遂攻郡常着金㩉蹤屐戰退輙張帷幙與少男通數十侍側刺史吴郡陸胤平之王子年拾遺録曰無老國其人皆千歳百歳一老齒落髮秃又年少嫗者乳養還復􅀂㓜稚神仙服食經曰仙藥有陽丹隂丹隂丹婦人乳汁也婦人十五巳上下爲月客有身月客絶上爲乳汁養性經曰乳者意之府也世􅀃曰王武子蒸肫肥美異常味武帝怪問何由乃尔云以人乳飲之武帝色甚不平所以飲食未畢便去異苑曰賈充妻郭氏爲人凶妬生兒􅀺民年始二歳充外入就乳母抱中嗚撮郭遥見謂充愛乳嫗即殺之兒􅁪啼泣不飲他乳經日遂死郭於是終身無子唐新語曰韓思彦以侍御史廵察于蜀成都有冨啇兄弟三人分資不平爭訴累年不决思彦推案數日令厨者奉乳自飲以其餘賜爭者􅀼相語遂號􅂘攀援不解俱言曰侍御豈不以兄弟同乳母耶悲號不自勝請同居如􅀄相書許􅀒曰乳間闊尺冨貴足壽乳黒如墨公侯之相腹􅀃文曰腹厚也釋名曰腹􅃨也冨也腹胃之屬已自裹盛復於外􅃨之其中多品似冨者也自齊巳下曰水腹水汋所聚也又曰少腹少小也比齊巳上爲小也易􅀃卦曰坤爲腹離其於人也爲大腹尚書盤庚曰今予其敷心腹腎膓歴告爾百姓于朕志左傳宣十三年傳曰楚子圍蕭司馬卯言號申叔展曰有麥麴乎曰無有山芎藭乎曰無河魚腹疾柰何曰目於眢井而出之國語曰叔魚牛腹其母歎曰必以賄死史記曰薄􅁎曰昨夜夢蒼龍據妾腹帝曰此貴徴也吾爲汝成之一幸生男是爲代王史記曰范睢􅀃秦昭王曰伍子胥橐載而出昭門夜行晝伏至於陵水無以餬其口膝行匍匐稽首肉􅃝鼓腹吹簫乞食於吴市卒興吴國闔閭爲伯東觀漢記曰光武降銅馬諸將未能信賊賊亦兩心上勑賊各歸勒兵上輕􅀐入賊營賊曰蕭王推赤心置人腹中安得不投死又曰帝問東平王蒼在家何等最樂對曰爲善最樂後詔與諸國述之曰王言甚大副其腰腹矣謝承後漢書曰濟隂戎良字子恭年十八爲郡門下幹良儀容佳麗太守諸􅁑禮使冩書從者誣良與婢通良刳腹引出肝膓示禮赤心後漢書曰邊韶字孝先教授數百人韶口辯曽晝眠卧弟子嘲曰邊孝先腹便便􅈸讀書但欲眠韶潜聞之應之曰吾以邊爲姓先爲字腹便便五經笥但欲眠思經義寐與周公通夢静與孔子同意師而可嘲出何典記嘲者大慙魏志曰管輅弟展謂輅曰大將軍待君意厚兾當冨貴輅長歎曰天與我明才不與我年壽恐四十七八間不見女嫁男娶吾背無三甲腹無三壬此皆不壽之驗明年四十八卒吴録曰丁固夢腹上生松趙逹謂之曰松字十八公後果然夢門巳具齊書曰髙帝爲領軍蒼梧王深相猜忌屢欲害帝常帥數十人直入領軍府時暑熱帝晝卧祼􅃝蒼梧立帝於室内􅀞腹爲射的自引滿將射之帝神色不動歛􅃑曰老臣無罪蒼梧左右王天恩諌曰領軍腹大是佳射堋而一箭便死後無可復射不如􅐴射之乃取􅐴箭一發即中帝臍蒼梧投弓於地大􅀏曰此手如何崔鴻十六國春秋後趙録曰佛圖澄腹傍有一孔常以絮塞之每夜書則拔絮孔中出光照于一室又當齋時平旦至流水側復腹傍孔中引出五藏六腑洗之訖還内腹中老子曰虚其心實其腹又曰聖人爲腹不爲目莊子曰夫赫胥氏之時民含餔而熈鼓腹而遊唐子曰人君以江海爲腹山爲面如此則下不知其量畏而懷之帝王世紀曰紂刳孕婦之腹中以觀其胎吴越春秋曰子胥鞭平王尸三百右手决其目左手踐其腹京房易占曰人生有二腹其國分王子年拾遺録曰孫䇿母夢膓出委地有神女夜來爲其收内腹裏云必生才雄之子方興吴國神女􅀒䇿母繞吴昌門三匝曰當錫尓此土鼎足於天下談藪曰楊玠娶􅀶陵崔季讓女崔家冨圖籍殆將萬卷成婚之後頗亦遊其書齋旣而告人曰崔氏書􅀍人盗盡曽不之􅁴崔遽令檢之玠捫腹曰巳藏之經笥矣世􅀃曰郝隆七月七日出日中仰卧人問其故荅曰我曬腹中書耳又曰張華旣貴有少時賔客來候之華與共飲九醖爲酣暢其夜醉眠張常飲此酒眠輙使人左右轉倒其夜客卧忘勑左右而左右依常爲張公轉側至明起友人猶不起視之酒果穿腹流牀下滂沲又曰劉眞長始見王丞相時盛暑之月丞相以腹熨彈碁局曰何乃訋吴人以冷爲訋或作渹音與鄭相近劉旣出人問見王公如何劉曰未見他異唯作吴語耳又曰郄太尉在京日遣門生與王丞相書求女壻丞相語郄信曰君徃東廊下任意選之門生歸白郄云王家諸郎皆可喜聞某來覔女壻咸自矜持唯有一郎在東床坦腹而食如不聞郄云正好比訪之乃是逸少因嫁女與之俗􅀃曰有人指周伯仁腹曰此中何有荅此中洪洞容卿等數百人背􅀃文曰背脊也釋名曰背陪也在後稱也廣雅曰背謂之骶音帝背北也左傳莊公曰齊襄公田于貝丘見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼墜于車傷足喪屨反誅屨於徒人費弗得鞭之見血走出遇賊于門刧而束之費曰我奚御哉祖而示之背信之費請先入伏公而出􅃲死于門中史記曰婁敬􅀃髙祖曰夫與人闘不搤其亢張晏曰亢喉嚨也拊其背未能全勝也今陛下入􅀜而都􅁗之故地此亦搤天下之亢而拊其背又曰蒯通知天下權在韓信􅀃之曰相君之面不過封侯相君之背貴乃不可言漢書曰吴王濞髙帝兄仲之子上患吴㑹輕悍無壯王鎮之乃立濞爲吴王王三郡五十二城髙祖召濞相之曰尓狀有反相因拊其背曰漢帝後五十年東南有亂豈非若耶天下一家愼無反濞頓首曰不敢又曰武帝過平陽主旣飲謳者進帝起更衣子夫侍尚衣軒中得幸還坐忻甚賜平陽主金千斤主因奉子夫送入宫子夫上車主拊其背曰行矣強飰勉之即貴願無相志元朔元年生男據遂立爲皇后後漢書曰越􅀐校尉伍子孚怒董卓兇毒乃朝服懷刃見卓語畢辭去卓送至閤以手撫其背孚因出刀刺之不中卓自􅁬得免呼左右執殺孚魏略曰孟逹降文帝乗小輦執手拊其背戯之曰卿得無爲劉備刺客耶又曰太祖丁夫人養劉夫人子脩脩士於穰下常言將我兒殺之遂􅂘泣無節太祖忿之遣歸家後太祖就見之夫人方織踞機如故太祖拊其背曰顧我共載歸乎夫人不應太祖却行户外遂不應太祖曰眞決矣遂與之絶吴志曰魯肅代周瑜之當陸口過吕蒙屯下肅常輕蒙蒙問肅君受重任與關羽爲鄰將何計略以備不虞肅造次應曰臨時施冝􅀩曰今東西雖一家而􅀜羽實熊虎因爲畫五䇿肅於是越席就之拊其背曰吕子明吾不知卿才略所及於此子明蒙之字也車頻􅁗書曰苻堅生肩背赤色隠起狀􅀂􅂐文付因爲苻氏又曰堅背文曰草付之祥因爲苻氏唐書曰貞觀四年制决罪人不得鞭背以明堂孔穴針灸之所又曰吕温者以小吏事崔漢衡貞元􅀄吐蕃背盟漢衡爲􅄍蕃所虜將殺之温趨往以背受刃吐蕃義之由是與漢衡俱免尸子曰醫者􅁗之良醫爲宣王割痤爲惠王治痔皆愈張子之背腫謂曰背非吾背也子製焉醫竘善治疾張子委製焉夫爲身與國亦猶此必有所要製然後治矣音叩又音孔叢子曰仲尼􅀛背帝王世紀曰簡翟浴􅀇丘之水燕遺夘吞之剖背生契白虎通曰傳稱周公背僂是謂強後成就周道輔相㓜主又孫卿子曰周公傴背不伸也􅀶物志曰宋有田夫自曝背於日其妻曰􅀒日之暄今獻必蒙重賞田夫曰昔人有美戎菽甘芹子獻之郷豪甞苦於口􅀏而弃之論衡曰書言齊桓公􅀒婦人以朝諸侯管仲曰吾君背疽瘡不得婦人瘡不愈此虚也桓公設庭燎夜坐以致賢士豈反以白日􅀒婦人於背乎幽明録曰王子猷先有背疾子敬疾篤􅁪禁來往聞子敬亡撫心悲惋都不一聲背即潰裂脊􅀃文曰脊背􅡗也釋名曰脊積也積續骨節終上下也春秋元命苞曰陽立於三故人脊三寸而結宋均曰結節結也孝經鈎命決曰仲尼􅀛脊墨子曰周宣王殺其臣杜伯不辜後三年王田於圃田車徒滿野杜伯乗白馬素車衣朱衣朱冠弓矢射王車上中心折脊王殪車中伏韔而死韔音暢脅􅀃文曰骿并脅也膀兩脅旁也從内脅聲通俗文曰腋下謂之脅釋名曰脅挾也在兩旁臂所挾也春秋元命苞曰隂極於八故人旁八幹長八寸又曰顓頊駢幹上法月叅集成紀以理隂陽左傳僖中曰晉公子重耳及曹曹共公聞其駢脅欲觀其躶浴薄而觀之公羊傳曰齊公子彭生送魯莊公拉幹而殺之也史記曰范睢先事魏中大夫湏賈賈使齊雎從齊王聞雎辯賜金及牛湏賈以爲雎持隂事告齊旣歸以告魏相魏大怒使人笞擊雎折脇摺齒雎佯死弃於厠吴志曰曹仁攻圍甘寧周瑜救寧圍解乃渡屯北岸剋期大戰瑜跨馬略陣㑹流矢中右脅瘡甚便還後仁聞瑜卧瘡未起勒兵就陣瑜乃自輿按行激揚吏士仁遂退晉書曰周顗在中朝時能飲一石及過江雖醉每稱無對偶有舊對從北來顗亦出二石酒共飲各大醉及顗醒使視客巳腐脅而死世本曰陸終娶于􅀑方氏之妹謂之女嬇音蒯生六子孕而不育三年啓其左脅三人出焉啓其右脅三人出焉王充論衡曰張儀駢脅卒相秦魏外國圖曰大秦國人長脅肋釋名曰肋勒也檢肋五藏也廣雅曰幹謂之肋竹林七賢論曰劉伶甞醉與俗人相忤其人攘􅃑而往必欲歐之伶顧而􅀏曰鷄肋不足以安尊拳臍􅀃文曰臍肚臍也釋名曰齊劑也膓端之所限劑也春秋元命苞曰齊者下流並㑹合爲齊腹宋均曰齊中也四方並湊者也左傳莊公曰楚文王過鄧鄧祁侯享之三甥曰亡鄧國者必此人也􅀂不早圖後君噬臍􅀂齧腹齊喻不可及後漢書曰董卓旣誅乃尸於市天時始熱卓充肥脂流於地守尸吏燃火置卓臍中光明達曙如是積日漢晉陽秋曰齊王冏之方盛也有婦人詣大司馬門求􅀉産吏詰之婦人曰我截齊罷便去耳有識者聞而惡其言南燕録曰慕容德其母夢日入臍中晝寑而生德莊子曰支離䟽頥隠於臍􅀏林曰趙伯翁肥大夏日醉卧孫兒縁其肚上戲因以李八九枚内臍中至後日李大爛汁出乃泣謂家人曰我膓爛將死明日李核出乃知孫兒所内李子也腰􅀃文曰腰身中也釋名曰腰約也在體之中約繼大而小也春秋元命苞曰腰而上者爲天尊髙陽之狀腰而下者爲隂豐厚地之重數合於四故腰周四尺後漢書曰東平憲王蒼腰帶八圍顯宗甚重之詔曰日者問東平王處家何等最樂王曰爲善最樂其言甚大副是腰腹矣又曰梁兾妻能作折􅆎歩晉書曰陶潜曰不能爲五斗米折腰於郷里小人干寳晉紀曰中書令李豐謀廢大將軍世宗使舎人王羡請之豐來辭不遜左右以刀環築腰死南史曰羊偘有妓張静琬腰一尺六寸能掌中舞孫荆玉能反腰帖地衘得地上簮二石僞事曰石虎攻中山得鄭略之妹生二男更娶崔爲妻至相敬待無兒鄭復生男崔求養鄭不許一月卒病死鄭䜛崔謂妾多養胡子虎時踞胡牀於庭中大怒索弓箭崔聞欲殺之徒跣至虎前曰公勿枉殺妾乞聽妾言虎不聽但言促還坐無預卿崔便去未至虎於後射之中腰而覆墨子曰楚靈王好士細腰故其臣皆三飯爲節脇息然後帶扶墻然後起韓子曰楚靈王好細􅆎國有餓死人尹子曰楚莊王好細􅆎一國皆有飢色西京雜記曰趙后體腰柔弱善行歩進止女弟昭儀不能及也太平御覽卷第三百七十一
