body:
  text: 資産部五蠶繰繀車籰絡車柅機杼梭蠶周禮天官下内宰曰中春詔后帥外内命婦始蠶于北郊以爲􅀕服蚕于北郊婦人以純隂爲尊郊必有公桑蚕室焉又夏官馬質曰馬質掌質馬禁原􅁞者原􅄪也天文辰爲馬蚕書蚕爲龍精月直大火則浴其種是蚕與馬同氣也物莫能兩大禁􅄪蚕者爲傷馬也禮記月令季春曰是月也命有司無伐桑柘愛蚕食有司謂主山林之官乃修蠶器蚕器謂簿槌鈳筐之􅁼后妃齊戒享先蠶而躬桑以􅂆蠶事季春􅁻祀皇后享先蚕先蚕天駟享先蚕而後躬桑示率先天下也又孟夏曰是月也蠶事旣登后妃獻繭乃収繭稅以桑爲均貴賤長㓜如一以給郊廟之服后妃献繭進其成功也乃収繭税十而取一以桑爲均者謂用桑多則繭多桑少則繭少貴賤長㓜如一各自以桑爲不得以人貴賤長㓜爲差又檀弓曰成人有其兄死而不爲衰者聞子臯將爲成宰遂爲衰成人曰蠶則績而蟹有匡范則冠而蟬有緌兄則死而子臯爲之衰􅃖兄死者言其衰之不爲兄死如蟹有匡蟬有緌不爲蚕之績范之冠也范蜂也蟬蜩也緌謂蜩啄長在腹下又􅀕義曰古者天子諸侯必有公桑􅁞室近川而爲之築宫仞有三尺􅁄牆而外閉之及大昕之朝君皮弁素積卜三宫之夫人丗婦之􅁻者使入􅁞室奉種浴于川桑于公桑風戾以食之大盺季春朔月之朝也諸侯夫人三宫半王后也風戾之者及早凉脆采之風戾之使露氣燥乃以倉蚕蚕性惡濕歳旣單矣丗婦卒􅁞奉繭以示于君遂献繭于夫人又􅀕統曰是故天子親耕于南郊以共齊盛王后蠶于北郊以共純音緇服諸侯耕於東郊以共齊盛夫人蚕於北郊以共冕服天子諸侯非莫耕也王后夫人非莫􅁞也春秋文耀鈎曰啇絃絶蠶合絲絃將絶蚕含絲以待用也春秋考異郵曰􅁞陽者大火惡水故食不飲桑者土之液木生火故􅁞以三月葉􅀋㑹精合相食爾雅曰蛾羅蚕蛾螝蛹音􅀛蚕蛹蟓桑繭食桑葉作繭即今蚕也雔由樗繭食樗葉􅁄繭食􅁄葉欒繭食欒葉蚢蕭繭食蕭葉者皆蚕􅀋史記天官書曰正月上甲風從東方來冝􅁞續漢書曰光武建武二年野蠶成繭民収其絮又輿服志曰貴人助蠶瑇瑁􅁫簪珥東觀漢記曰明徳馬后置織室􅁞於濯龍中徃來觀内以爲娯樂謝承後漢書曰南陽范充爲呉桂陽太守教民植桑絺紵之属養蠶織履民得利益呉録曰南陽郡一歳蠶八績後魏書曰丗宗正始年徐州蠶蛾喫人尫殘者一百一十餘人死者二十二人時髙肇專政聚歛不息隋書曰江湖之南一年􅁞四五熟唐書曰武德中梁州言野蠶成繭百姓採而用之又曰文德太后率内外命婦有事於親􅁞又曰開元中上命官中食蠶親自臨視欲使嬪御巳下知女工之事及蠶罷􅀗絲甚多因以賜焉又曰天寳中益州獻三熟蠶緊厚白浄與常蠶不殊又曰大暦中太原府清河縣人韓景暉養冬蠶成繭詔給復終身韓子曰鱓似虵􅁞似蠋人見虵驚駭見蠋則毛起而漁者持鱓婦人㭘􅁞利之所在皆賁育也淮南子曰季春后妃齋戒東郷就桑省婦使觀蠶事又曰蠶食而不飲三十日而化又曰食桑者有絲而蛾又曰蠶食礜而不飲又曰蠶餌絲而啇􅃶絶啇絃金聲也春蚕吐絲金死故絶星墜而渤海决星流星也勃海水之勃怒也又曰原蠶一􅀊再登非不利也然王法禁之者以其殘桑淮南方畢術曰白芳七結浴蠶又曰僵蠶使馬不食欲愈之以桑拭口􅈹即食矣馬喜齧人亦以僵蠶眉拭脣即不齧也抱朴子曰甘始以藥粉桑長蠶蠶得十月不老金樓子曰楊泉蠶賦序曰古人作賦者多矣而獨不賦􅅙乃爲蠶賦是何言歟楚蘭陵荀如有蠶賦德淵近不見之有文不如無􅄒也東方朔別傳曰武帝求神仙朔言能上天取藥上知其謾欲極其言即遣方士與朔上天朔曰當有神來迎我後方士晝卧朔遽口呼􅀂極眞者吾從天上還方士遽以聞上以爲靣欺下朔獄朔泣曰臣幾死者再天公問臣下方何衣朔曰衣􅁞蠶何􅀂曰啄呥呥仁廉切􅀋馬色班班􅀋虎天公大怒以臣爲謾繫臣司空使使下問還報有之乃出臣今陛下以臣爲詐願使使上問之上曰齊人多詐欲以喻我我止方士也罷方士東方朔占曰正月旦竟日不風清明冝蠶列仙傳曰園客濟陽人姿皃好而良邑人多欲以女妻之客終不娶種五色香草積數十年服食其實一旦五色蛾止其香末客収而薦之以布生桑蠶焉蠶時有女夜至自稱客妻客與俱蠶得繭大如盆郭子横洞冝記曰寒青之國其國人皆以鳥爲衣其地多霜雪隂翳忽見日從南方出則百獸皆鳴國俗以爲祥異有蠶色青長一丈亦曰青􅁞績其絲大如指一絲可羈絆牛馬國人常以十丈充黄門之厩以拘馬也巨象師子帝令以此一絲繫之古今注曰元帝永元四年東萊郡東弁山有野蠶爲繭収得萬餘石民人以爲絲絮司馬徽別傳曰人有臨􅁞求徽蔟者徽便以與之自弃其蠶搜神記曰舊說太后古時有人逺征家唯有一女并馬一疋女思父戲馬曰尔能爲我迎得父吾將嫁汝馬乃絶韁而去至父所父疑家中有故乘之而還馬後見女輒怒而􅁬繫父恠之宻問女女具以荅父乃射殺馬曝皮於庭女至皮所足蹙之曰尔馬而欲人爲婦自取屠剥何如言未竟皮蹷然起卷女而行父還失女後大樹枝得女及皮乃盡化爲蠶績於樹上其繭厚大異於常蠶隣婦取養之其収二倍今丗或謂􅁞爲女兒古之遺語也拾遺録曰貟嶠之山名環丘有冰􅁞長七寸黒色有角有鱗以霜雪覆之然後作繭長一尺其色五綵織爲文錦入水而不濡投火則經􅀫不燎海人獻堯以爲黼黻顔氏家訓曰胡人見錦不信有虫食樹吐絲所成昔在江南不信有千人氈帳及來河北不信有萬石舟舡皆實驗也齊諧記曰正月半有神降陳氏之宅云我是􅁞神能見􅀕當令蠶百倍今人正月半作餻糜像此也一云呉郡張誠皇后親蠶儀注曰皇后躬桑始將一條執筐受桑將三條女尚書跪白曰可止執筐者以桑授蠶母蠶母以桑適金室也先􅁞儀注曰親蠶前三日太祝令質明以太牢祠先蠶也周遷古今輿服雜事曰蠶始生后食之三灑而止三輔故事曰始皇后葬用金蚕二十箔􅀇中記曰大月支有牛名爲日及今日割取其肉三四斤明日瘡愈漢人入此國以牛示之以爲珍異漢人曰吾國有虫大小如指名爲蠶食桑葉爲人吐絲外國人不復信有蠶也又曰化民食桑三七年化能以自裹如􅁞績九年生翼七年而死去琅耶四萬里神異經同林邑記曰九眞郡蠶年八熟繭小輕薄絲弱綿細永嘉郡記曰永嘉有八軰􅅙􅮤珍􅅙三月績柘􅅙四月􅀄績􅮤􅅙四月􅀄績愛珍五月績愛􅅙六月未績寒珍七月未績四出􅅙九月􅀄績寒􅅙十月績凡􅅙再養者前軰皆謂之珍少飬之愛􅅙者故􅮤蠶種也􅮤珍三月旣績出蛾取􅆑七月八月便割􅁞生多養之是爲􅮤􅅙欲作愛者取􅮤珍之􅆑藏内瓮器中隨器大小亦可十􅁓百􅁓盖覆器口安冷水使冷氣折其出􅀔僅得三七日然後劄生養之謂爲愛珍亦愛子績成繭蛾生􅆑􅆑七日又剖成􅅙多養之此則愛􅅙也頋微廣州記曰呉黄武三年遣交州治中吕瑜發趙嬰齊􅃁得金􅁞曰珠各數斛廣志曰有原􅁞有冬􅅙有野􅅙有柞􅅙食柞葉可以作綿崔贑易林兊之坎曰飢􅅙作室緒多亂纒端不可得又震之說曰秋􅅙不成冬種不生龍魚河圖曰􅅙沙宅亥地大富得􅁞絲吉利仲長子昌言曰北方寒其人壽南方暑其人夭此寒暑之方驗於人也約之􅅙也寒而餓之則引日多温而飽之則用日少此寒温飢飽之爲脩短驗於物者也物理論曰使人主養民如􅅙母之養􅅙則其用豈徒絲􅅙而已哉雜五行書曰含南種􅀥九株辟縣官冝蠶桑又曰二月上壬取土泥屋四角冝􅁞􅁻吕氏夲草曰石􅁞一名沙蜯神農雷公醎無毒生漢中治五淋破隨肉解結氣利水道除􅀬孫卿􅅙賦曰食桑而吐絲前亂而後治夏生而惡暑疾温而惡雨蛹以爲母蛾以爲父三俯三起事乃大巳是謂􅅙理閔鴻􅅙賦曰體龍頸而驥喙邁皦素於羔羊左思呉都賦曰國稅再熟之稻郷貢八􅅙之綿古艶歌曰日出東方隅照我􅁗氏樓􅁗氏有好女自名爲羅敷羅敷善蠶桑採桑城南隅陸機詩曰老􅅙晚績縮老女晚嫁辱曽不如老䑕飜飛成蝙蝠蔡邕書曰家祖君常言客有三當死夜半蚕時至人室家也今者一行而犯其兩嵇康養生論曰火􅁞十八日寒􅅙三十餘日裴頠崇有論曰鳥無􅠛肺蛤無五藏蛭以空中而生􅅙以無􅠛而育也繰禮記􅀕義曰古之獻繭者其率用此與問者之辭及良日夫人繅三盆手遂布于三宫夫人丗婦之􅁻者使繅遂朱緑之玄黄之以爲黼黻文章服旣成君服以祀先王先公敬之至也三盆手者三淹也凡繅每淹大揔而手振之以出緒也說文曰繰繭爲絲也尸子曰夫繭合而弗治則腐蠧而弃使女工繰之以爲美錦列仙傳曰園客􅁞得繭大如盆繰一繭數十日繰訖俱去莫知所如濟陽今有革蠶祠巳備於前故此小略繀車通俗文曰織纎謂之繀音碎受緯曰孚繀車方言曰繀車趙魏之間謂之歴鹿車東齊海岱之間謂之道􅁤孫德施繀車賦曰惟工藝之多門偉英麗乎創形擬老氏之一轂􅀆應天運以廻行秉轉屈以成規􅀆不辭勞以自傾故其用同造物功叅天地軒轅垂衣因其以濟衮冕龍旂用康上帝勲存王室惠流皂􅀠􅀚其微風興於輪端霧雨散于輻制以靈木絡以竒竹危朝日以投貟􅀆准暈月以造象􅀂洪輪之在雄􅀆似蜘蛛之結網尓乃才藝妻妾工巧是嘉或織綿組或匠綾羅舒皓腕於輕輪􅀆煥擬景乎鏡華絲成妙於指端號􅀆幽而相和象蟋蟀之鳴户􅀆􅀋寒蟬之吟家籰方言曰籰援也音爰兖䂊河濟之間謂之轅郭璞注曰所以絡絲說文曰籰収絲者也或作從角間聲絡車方言曰河濟之間絡謂之格郭璞注日所以轉籰紿事也柅易姤卦曰繫于金柅金者堅剛之物柅者制動之至通俗文曰張絲曰柅也說文曰擟絡絲檷從木爾聲讀􅀂柅機杼毛詩谷風大東曰小東大東杼軸其空字林曰􅛨女涉切機下所履史記曰公儀休相魯見布好出家婦燔其機也列女傳曰河南貞義者樂羊子之妻也羊子出學後得遺金一餅以與貞義曰妾聞君子不以利洿行反裘負薪古人知其害夲羊子慙而弃之學一年復歸貞義引刀趣機曰此織生於􅁞桑治於絲繭加之機杼一絲而累以至丈尺今􅀂断之損弃成功稽廢日月夫子積學當日知所無中而廢歸何異斷機哉羊子大慙復出七年不歸列子曰紀昌者學射於飛衛曰尔先學不瞚而後可言射矣紀昌歸偃坐其妻之機下以目承牽挺牽挺機躡二年之後雖錐末到眥而不瞚也淮南子曰伯余之􅀄作衣也伯余黄帝臣也緂麻索縷手經指挂後丗爲之機杼勝復以便其用傳子曰舊機五十綜者五十躡六十綜者六十躡馬生者天下之名巧也患其遺日喪功乃皆易以十二躡其竒文異變因感而作王逸機賦曰舟車㨂㝢麄工也杵臼碓磑直巧也槃材縷小用也至於織機功用大矣上自太始下訖羲皇帝軒龍躍􅁃業是創俯系聖思仰􅄃三光悟彼織女終日七襄爰制布帛始垂衣裳於是取衡山之􅀌桐南岳之洪樟勝復廻轉刻象乾形大庭淡泊擬則川平先爲日月盖取昭明三轉列布上法台星兩驥齊首儼􅀂將征方圓綺錯極妙窮竒兔耳跧伏􅀂安􅀂危猛犬相守竄身匿蹄髙樓􅀟峙以臨清池遊魚衘餌瀺灂其陂鹿盧並趍纎繳俱垂宛􅀂星圖屈􅂰推移尔乃垂輕杼㰖床帷動摇多容俯仰生姿古詩曰纎纎擢素手扎扎弄機杼又曰皎皎白素絲織爲寒女衣寒女雖巧妙不得秉機杼梭通俗文曰梭織具也所以行緯之䕴戈鄧粲晉書曰謝鯤隣家有美女鯤挑之女以梭投之折其兩齒異苑曰陶偘甞捕魚得一梭還挿着壁有頃雷􅀨梭變成赤龍從屋而躍太平御覽卷第八百二十五
