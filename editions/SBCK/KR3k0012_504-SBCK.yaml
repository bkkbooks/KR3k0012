front:
  text: 太平御覽卷第五百四
  hash: sha256:f4808d948e506081e3bbd8d1f8306ca7a9fa6616d9933355a2528546d4d80995
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_504-1a}
body:
  text: 逸民部四逸民四晉中興書曰孟陋字少􅀌少而貞㓗清操絶倫口不言丗事時或漁弋雖家人亦不知所之太宗輔政以爲叅軍不起桓温躬往造焉或謂温冝引在府温歎曰㑹稽王不能屈非敢擬議也陋聞之曰億兆之人無官者十居其九豈皆髙士哉我病疾不堪恭相王之命非敢爲髙也又曰劉驎之字子􅂹一字道民好逰于山澤志在存道常採藥至名山深入忘返見有一澗水南有二石囷一囷開一囷閉或􅀃囷中皆仙方秘藥驎之欲更尋索終不能知桓冲請爲長史固辝居于陽􅄮人士徃來無不􅄬止驎之自供給人人豐足凡人致贈一無所受又曰龔􅀇之字道􅀇潜處陋巷未常出入公門人有致餉一無所受武陵太守孫放薦􅀇之詔以爲散􅀐常待郡縣逼苦辝不行前後四徴一皆不降又曰戴逵字安道少愽學能鼓琴㹅角時以雞子汁溲瓦屑作鄭􅀇碑又爲碑文文旣綺藻器亦妙絶武陵王晞聞其善琴使人召之逵於使者前打破琴曰戴安道不能爲王門伶人累徴散􅀐常侍郡縣逼乃逃去呉國内史王珣有别館在虎丘山乃潜住珣山中謝玄王珣並表逵烈宗備禮徴不至沈約宋書曰陶潜字淵明或云淵明字元亮曽祖􅋲晉大司馬潜少有髙趣常著五柳先生傳以自况曰先生不知何許人不詳姓字宅邊有五栁樹因以爲號焉閑静少言不慕榮利好讀書不求甚解性􅄝酒而家貧不能􅁪得親舊知其如此或置酒招之造飲輙盡期在必醉常著文自娯頗示巳志忘懷得失以此自終其自序如此時人謂之實録又曰孔淳之字彦深魯郡魯人茅室蓬户庭草無徑唯牀上有數帙書元嘉􅀄徴爲散􅀐常侍乃逃于上虞縣界家人莫知所之又曰周續之字道祖鴈門廣武人也終身不娶妻布衣􅂼食常以稽康髙士傳得山林之羙因爲之注髙祖北討丗子居守迎續之館于安樂寺延入講禮月餘復還山又曰朱百年㑹稽山隂人以伐樵採箬爲業毎以樵箬置道頭輙爲行人所取明旦巳復如此人稍恠之積乆方知是朱隱士所賣湏􅁷行者隨其所堪多少留銭取樵而去又曰王素字休業琅邪人也少有志行乃往東陽隱居不仕屢􅀍徴辟聲譽甚髙山中有蚿虫聲清長而形醜素乃爲蚿賦以自况又曰戴顒字仲􅀂譙郡銍人也父逵兄㪍並隱遁有髙名顒年六十遭父憂幾於毁滅因此長抱羸患又不仕復修其業父善琴書顒並傳之凢諸音律皆能揮手㑹稽剡縣多名山故丗居剡下顒及兄㪍並受琴於父父没所傳之聲不忍復奏各造新弄桐廬縣又多名山兄弟復共逰之因留居止以桐廬僻逺難以飬疾乃出居呉下呉下士人共爲築室乃􅄒莊周大旨著逍遥論太祖元嘉􅀄徴散􅀐常侍並不就太祖毎欲見之常謂黄門侍郎張敷曰吾東廵之日當讌戴公山也以其好音長給正聲􅇊一部卒年六十四後景陽山成上歎曰恨不使戴顒觀又曰宗炳字少文南陽人髙祖領荆州辟爲主簿不起問其故荅曰栖丘飲谷三十餘年豈可於王門折腰爲趍走吏乎髙祖善其對妙善琴書精於言理每逰山水往輒忘歸征西長史王弘每從之逰未常不彌日也乃下入廬山就釋惠逺考尋文義兄臧爲南平太守逼與俱還乃於江陵三湖立宅閑居無事髙祖召爲太尉參軍不就二兄早卒􅀌累甚多家貧無以相贍頗營稼穡髙祖數致餼賚宋受禪徴爲太子舎人元嘉􅀄又數徴庶子並不應衡陽王在荆州親至炳室與之歡讌命爲諮議不起好山水愛逺逰西陟荆巫南登衡岳因而結宇衡山欲懷尚平之志有疾還江陵歎曰老疾俱至名山恐難逰遍唯當澄懷觀道卧以逰理皆圖之於室謂人曰撫琴操欲令衆山皆響古有金石弄唯炳傳焉太祖遣樂師就炳受之元嘉二十年炳卒又曰王弘之字方平琅邪臨沂人家貧而性好山水桓􅀇輔晉桓謙以爲衛軍參軍時殷仲文還姑孰祖送傾朝謙要弘之同行荅曰凢祖離送别必在有情下官與殷風馬不接無縁扈從謙貴其言隨兄敬弘之安成郡弘之解職同行家在㑹稽上虞敬弘常解貂裘與之即着以採藥性好釣上虞江有一處名三石頭弘之裳垂綸於此經過者不識之或問漁師得魚賣否弘之曰亦自不得得亦不賣日夕載魚入至上虞郭經親故門各以一兩頭置門内而去始寧沈州有佳山水弘之又依巖築室謝靈運顔延之並相欽重又曰劉凝之字志安小名長年慕老萊嚴子陵爲人推家財與弟及兄子立屋於野外非其力不食州里重其仁德禮辟並不受妻梁州刺史郭鈐女也遣送豐麗凝之悉散之親族妻亦能弃榮華共安儉苦徴爲祕書郎不就荆州年飢衡陽王慮凝之餒弊餉錢十萬凝之大喜將錢至市門觀有飢色者悉分與之性好山水一旦携妻子泛江湖隱居衡山之陽登髙山絶人迹爲小屋居之採藥服食妻子皆從其志又曰龔祈字道孟武陵漢壽人也父黎民及祈並不應徴辟祈風姿端雅容止可觀中書郎范述見而歎曰此荆楚仙人也時或賦詩不言及丗事又曰翟法賜尋陽柴桑人祖湯湯子莊莊子矯並髙尚不仕逃避徴辟矯生法賜少守家業立屋於廬山頂居後便不復還家不食五榖以獸皮結草爲辟著作郎不就後家人至石室尋求因復逺徙違避徴聘遁迹幽深後卒於巖石之間又曰沈道䖍呉興武康人少仁愛好老易縣北山石下爲精廬與諸􅀌兄子共釡􅁃之資困不改節受琴於戴逵辟府凢十二命皆不就太祖聞之遣使存問賜錢累丗事佛推父祖舊宅爲寺至四月八日毎請像請像之日輒舉家感動焉道䖍年老菜食􅁪無經日之資而琴書爲樂孜孜不倦又曰雷次宗字仲倫南昌人也少入廬山事沙門釋惠逺篤志好學尤明三禮毛詩隱退不交丗務以散􅀐侍郎徴並不就元嘉十五年徴至京師開館於雞籠山聚徒教授置生百餘人車駕數幸次宗學館資給甚厚又除給事中不就還廬山公卿巳下並設祖道後徴詣京邑爲築室於鍾山西巖下謂之招隱館使爲皇太子諸王講喪服經次宗不入公門乃使自華林東門入延賔堂就業後卒於鍾山又曰􅀜康之字伯愉河東楊人丗居京口寓居南昌少而篤學筭妙盡其能元嘉中太祖聞康之有學義詔徴之不起棄人事守志閑居弟􅀟之病卒迎喪因得虚勞病寢頓二十餘年時有間日輒卧論文義昇平􅀄卒後魏書曰馮亮字靈通南陽人愽覽諸書篤好佛理丗宗常召以爲羽林監領中書舎人將令侍講十地諸經固辤不拜父使衣幘入見亮求以幅巾就朝遂不就強逼還山數年與僧徒禮誦爲業有終焉之志旣雅愛山水兼有巧思結架巖林甚得逰放之適頗以此聞丗宗給其功力令與沙門統僧暹河南尹甄琛等周視嵩山形勝之處製閑居寺亮卒詔贈帛二百疋以供㓙事遺誡兄子綜殮以衣慆左手持板右手執孝經置屍盤石上積十餘日乃焚於山以􅁅燼處起佛塔􅀄亮以冬月亡時連驟雪窮山荒㵎鳥獸飢窘僵屍山野無所防護時有壽春道人惠需每旦徃看其屍拂去塵霰禽虫之迹交撗左右而􅀄無侵毀衣服如夲唯風吹幍落耳惠需又以大栗十枚開亮手置把中經􅀫乃爲虫爲盗食皮殻在地亦不傷肌體焚燎之日有素霧蓊鬱逥繞其旁自地属天彌朝不絶中山道俗營助者百餘人莫不異焉又曰李謐字永和趙郡人少而好學愽通諸經周覽百氏􅀄師事小學愽士孔璠數年之後璠還就謐業同門生爲之語曰青成藍藍謝青師何常在明經謐飲酒好音律愛樂山水髙尚之情長而彌固一遇其賞悠爾忘歸乃作神士賦又曰睦夸一名昶趙郡髙邑人年二十遭父喪􅂡􅁂致白每悲􅂘聞者爲之流涕髙尚不仕􅀉情丘壑少與崔浩爲莫逆之交及浩爲司徒奏徴夸爲其中郎辝疾不起州郡逼遣不得巳及入都與浩相見經留數日惟飲酒叙平生不及丗利浩每欲論屈之意不能發言見敬憚如此浩後遂􅄬詔書於夸懷夸曰桃簡卿巳爲司徒何足以此勞國亡挑簡浩小名浩慮夸即還夸時乗一騾更無兼􅀐浩乃以騾内之厩中兾相維縶夸遂託郷人輸租者謬爲御車乃得岀􅀜浩知而歎恨曰睦夸獨行之士夲不應以小職辱之又使其人杖䇿復路吾當何辝以謝也及浩誅後夸爲之素服受郷人弔喭乃歎曰崔公旣死誰能更容睦夸年七十五卒及葬之日赴㑹者如市續晉陽秋曰謝惠隱居㑹稽􅀄月犯少微一名處士星時戴逵名重於敷時人憂之俄而敷死故㑹稽士人嘲曰呉
