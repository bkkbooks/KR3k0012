front:
  text: 太平御覽卷第九百九十
  hash: sha256:fc32156e7c912f3a689c81e05998f46b56abedf66764d530d7cb6a516544ed26
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_990-1a}
body:
  text: 藥部七附子天雄烏頭提母五味雷丸䔧蘆虎掌貫衆冶葛芎藭澤㵼升麻芍藥澤蘭萆薢狗脊壯蒙白頭翁狗􅂎白及附子廣雅曰前進切奚附子也一歳爲萴子二歳爲烏喙三歳爲附子四歳爲烏頭五歳爲天雄春秋後語曰􅂫􅁗如齊見王拜而慶仰面吊齊王曰是何慶吊相隨而速速也􅂫􅁗曰臣聞飢人之所以不食烏喙者以爲蜼偷充腹而與死人同患也烏喙毒藥與烏頭附子同夲也飢人食之雖充腹而死也喙音許穢切今燕雖弱小􅁗王之女婿大王利其十城而長與強秦爲仇今使弱燕爲鴈行而強秦繼推其後是食烏喙之􅀋也漢書曰宣帝許皇后産霍顯使醫擣附子入與后后崩淮南子曰夫天下之物莫凶於奚毒奚毒附子然而良醫橐而藏之有所用也抱朴子曰療聾或以狼毒冶葛或以附子葱涕合内耳或蒸鯉魚腦灌之皆愈范子計然曰附子出蜀武都中白色者善楚國先賢傳曰孔休傷頰有王莾曰玉屑白附子香消乃以劒彘音滯并香與之荆州記曰冝都郡門生藥草有附子愽物志曰物有同􅀋而異用者烏頭天雄附子一物春夏秋冬采之各異大業拾遺記曰汾陽宫所甚出名藥數十種附子天雄並精好堪用本草經曰附子味辛温出山谷治風寒欬逆邪氣寒濕痺癖拘緩不起疼痛温中金瘡生牛犍爲百藥之長吴氏本草曰附子名莨神農辛歧伯雷公甘有毒季氏苦有毒大温或生廣漢八月採皮黒肌白天雄本草曰天雄味辛甘温大温有大毒主大風破積聚邪氣強筋骨輕身徤行長隂氣強志令人武勇力作不倦一名白幕生少室山谷淮南子曰天雄雄雞志氣益取天雄三枚內雄雞腹中搗生食之令人勇烏頭􅀃文曰萴阻力切烏頭也爾雅曰芨居及反堇草郭璞注曰即烏頭江東今呼爲堇梁兾傳曰兾迫殺大家母宣頭服丸而死後魏書曰匈奴秋収烏頭爲毒藥以射禽獸范子計然曰烏頭出三輔中白者善崔寔四民月令曰三月可採烏頭本草經曰烏頭一名烏喙一名葉毒一名萴味辛温生川谷主治風中惡洗出汗除寒温生朗陵吴氏本草曰烏頭一名莨一名千秋一名毒公一名果􅀒一名耿子神農雷公桐君黄帝甘有毒正月始生葉厚莖方中空葉四靣相當與嵩相似又曰烏喙神農雷公桐君黄帝有毒季氏小寒十月採形如烏頭有兩枝相合如烏之喙名曰烏喙也所畏惡使盡與烏頭同一名側子一名莨神農􅄮伯有大毒李氏大寒八月採隂乾是附子角之大者畏惡與附子同提母爾雅曰音潭莐音沉藩音煩生山上提如韭一曰提母范子計然曰提母出三輔黃白者善吴氏本草曰母一名提母神農桐君無毒􅀘不足益氣五味爾雅曰菋荎猪五味也蔓生子藂在莖頭也未遲除三音聖賢􅃁墓記曰孔子墓上五味樹抱朴子曰羡門子服五味十六年始降玉女能入水火本草經曰五味一名㑹及吴氏本草曰五味一名玄及典術曰五味者五行之精其子有五味淮南公美門子服五味十六年入水不濡入火不燋日行萬里雷丸范子計然曰雷丸岀漢中色白者善本草經曰雷公丸一名雷矢味苦寒生山谷吴氏本草曰雷丸一名雷實神農苦黄帝歧伯桐君甘有毒扁鵲甘無毒季氏大寒或生漢中八月採䔧蘆廣雅曰䔧蘆䓗苒也本草經曰䔧蘆一名䓗苒味辛寒生山谷主治蠱毒生太山范子計然曰䔧蘆出河東黄白者善吴氏本草曰䔧蘆一名䓗葵一名山䓗一名豐蘆一名蕙葵一名公再神農雷公辛有毒黄帝有毒歧伯醎有毒季氏大毒大寒扁鵲苦有毒大葉根小相連二月採根虎掌本草經曰虎掌味苦温生山谷治心痛寒熱吴氏本草曰虎掌神農雷公無毒歧伯桐君辛有毒或生太山或宛句立秋九月採貫衆爾雅曰貫衆孫炎曰一名貫渠郭墣注曰葉貟銳莖毛黑布地生冬不死也廣雅曰貫節衆也本草經曰貫衆一名貫節一名百頭一名貫渠一名虎卷一名扁符味苦微寒生山谷治腹中邪氣諸毒殺三蠱生􅀇山亦生宛句吴氏本草曰貫衆一名貫來一名貫中一名渠母一名貫鍾一名伯芹一名藥藻一名扁符一名黄鍾神農歧伯苦有毒桐君扁鵲苦一經甘有毒黄帝鹹酸一苦無毒葉青黄兩兩相對莖黒毛聚生冬夏不死四月華白七月實黒聚相連卷旁行生三月八月採根五月採葉冶葛周易叅同契曰冶葛巴豆一兩入喉雖周文兆著孔丘占相扁鵲操鍼巫咸叩鼓安能􅂫之唐書曰􅀽恕巳與敬暉等累􅀍貶黜流于環州尋周利用左右逼令飲野葛汁數升不死因擊殺之恕巳素服黄金故毒藥不發愽物志曰魏武習啖冶葛至一尺亦多飲酖近丗事相傳云又曰鉤吻草與堇菜相似南州異物志曰廣州俚賊􅀂郷里􅀒其家債不時還者子弟便取冶葛一名鉤肳數寸許到債家門食鉤肳而死其家稱怨誣債家殺之債家慙懼以財物辭謝多數十倍死家便収尸去不以爲恨述異記曰晉義熈中有劉遁者居江陵忽有􅀑来遁宅上遁貧無竈以升鎗煑飯飯欲熟輙失之㝷覔於籬下草中但得餘空遁宻市冶􅁑煑以作麋鬼復􅀼之於屋北得鎗仍聞吐聲從此寂絶桓譚新論曰余與劉子駿言飬性無益其兄子伯玉曰天生殺人藥必有生人藥也余曰鉤吻不與人相冝故食則死非爲殺人生也譬􅀂巴豆毒魚礜石賊䑕桂害􅆩杏核殺狗天非故爲作也論衡曰萬物含太陽者有毒在草爲巴豆冶􅁑抱朴子曰中經曰鉤吻狼毒太隂之精氣主殺故入口令人死葛洪方曰鉤吻與食芹相似而生處無他草其莖有毛誤食之殺人本草經曰鉤吻一名野葛味辛温生山谷主治金瘡中惡風欬逆上氣水腫殺蠱毒􅀑注吴氏本草曰􅁗鉤吻一名毒根一名野􅁑神農辛雷公有毒殺人生南越山或益州葉如􅁑赤莖大如箭方根黄或生㑹稽東治正月採嶺表録異曰野􅁑毒草也俗呼胡蔓草誤食之則用羊血漿解之或􅀃此草蔓生葉如蘭香光而厚寘毒多着於生葉中不得藥解半日輙死山羊食其苗則肥而大芎藭春秋左傳曰宣公下曰楚師伐蕭還無社與司馬夘言號申叔展曰有山芎藭乎杜預注芎藭所以禦濕欲使無杜逃泥水中􅀃文曰芎藭香草也山海經注曰號山洞庭之山其草多芎藭郭璞注曰芎一名江籬吴録地志曰臨海縣有江籬草海水中正青如亂髪乹獻之亦鹽藏其汁名爲濡酪楚辭所云籬是也范子計然曰芎藭生洽無枯者善遊名山志曰撗山諸小草多芎藭本草經曰芎藭味辛温治中風入頭腦痛寒痺生武功吴氏本草曰芎藭一名香果神農黄帝歧伯雷公辛無毒香扁鵲酸無毒季氏生温中熟寒或生胡無桃山隂或斜谷西嶺或太山葉香細青黒文赤如藁本冬夏藂生五月華赤七月實黒端兩葉三月採根根有節似如馬衘狀澤㵼典術曰食澤㵼身輕日行五百里走水上可遊無窮致玉女神仙一名澤之升麻廣雅曰周升麻􅂛麻也本草經曰升麻一名周升麻味甘辛生山谷治辟百毒殺百老殃􅀑辟温疾鄣稚毒蠱乆服不失生益州華陽國志曰牧麻縣岀好升麻吴氏本草曰升麻神農甘芍藥山海經曰條谷之草多芍藥洞庭之上多芍藥毛詩溱洧曰唯士與女伊其相謔贈之以芍藥毛詩香草也詩義䟽曰今芍藥子無香氣非是也未審今何草司馬相如賦云芍藥之和陽唯賦曰甘甜之和芍藥之羙然芍藥又入食也廣雅曰黒攣夷芍藥也晉宫閣名曰暉章殿前芍藥華六畦范子計然曰芍藥岀三輔建康記曰建康出芍藥極精好本草經曰芍藥味苦辛生川谷主治邪氣腹痛除血痺破堅積寒熱瘕止痛吴氏本草曰一名其積一名解倉一名誕一名餘容一名白术神農苦桐君甘無毒歧伯鹹李氏小雷公酸二月三月生澤蘭廣雅曰虎蘭澤蘭也建康記曰建康岀澤蘭本草經曰澤蘭一名虎蘭一名龍來味微温無毒生池澤治乳婦衂血生汝南又生大澤旁吴氏本草曰澤蘭一名水香神農黄帝歧伯桐君酸無毒季氏温生下地水旁葉如蘭二月生香赤節四葉相值支節間三月三日採萆薢􅀶物志曰菝蒲八切與萆薢相亂名狗脊吴氏本草曰萆薢一名百枝狗脊廣雅曰薜挈枸脊也本草經曰狗脊一名百丈味苦平生川谷治要背強開機緩急風痺寒濕􅂰痛利老人生常山建康記曰建康出狗脊吴氏本草曰狗脊一名狗青一名萆薢一名赤節一名強膂神農苦桐君黄帝歧伯雷公扁鵲甘無毒季氏温如萆薢莖節如竹有刺葉圎青赤根黄白亦如根毛有刺歧伯一經莖無節根黄白如竹根有刺根葉端圎赤皮白有赤脉二月採牡蒙吴氏本草曰壯蒙一名紫參一名衆戎一名音腹一名伏莵一名重傷神農黄帝苦季氏小寒生河西山谷或宛句商山圎聚生根黄赤有文皮黒中紫五月華紫赤實黒大如豆三月採根白頭翁本草經曰白頭翁一名野丈人一名胡王使者味苦温無毒生川谷治温瘧癭氣狂昜音羊生嵩山建康記曰建康出白頭翁范子計然曰野丈人出洛陽吴氏本草曰白頭翁一名野丈人一名奈何草神農扁鵲苦無毒生嵩山川谷治氣狂寒熱止痛枸􅂎黄雅曰地節枸􅂎抱朴子曰枸􅂎或名地骨或名却老或名西王母杖或名仙人杖本草經曰枸􅂎一名􅂎根一名地骨一名地輔服之堅筋骨輕身耐老吴氏本草曰枸􅂎一名􅂎芭一名羊乳白及本草經曰白及一名甘根一名連及草味苦辛治㿈腫惡瘡敗疽生北山晉宫閣名曰華林白及三株建康記曰建康岀白及吴氏本草曰白及一名臼根神農黄帝辛季氏大寒雷公辛無毒莖葉如生薑􅀺盧也十月華直上紫赤根白連二月八月九月採生宛句太平御覽卷第九百九十
