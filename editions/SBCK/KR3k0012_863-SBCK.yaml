front:
  text: 太平御覽卷第八百六十三
  hash: sha256:9c13125c86db9a0781d8576a1e8ddb3f8d60285ff92c8beb7cd8abf0b3818890
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_863-1a}
body:
  text: 飲食部二十一肉炙肉禮曰母反魚肉爲巳歴口人可穢也濡肉齒决乾􅁏不齒决又曰六十􅀫􅁏六十非􅁏不飽又曰觴酒豆􅁏讓而受惡傳曰公將如棠觀魚臧僖伯諌曰鳥獸之􅁏不登於俎則公不射古之制也又曰齊師伐我曹劌請見其郷人曰􅁏食者謀之􅁏食謂朝大夫劌曰􅁏食者鄙未能逺謀又曰公膳日􅀟雞卿大夫之膳食饔人竊更之以鶩御者知之則去其􅁏而以其泊饋進御食者饔人御者欲使諸大夫怨慶氏减其膳蓋盧蒲癸王何之謀也又曰有酒如淮有􅁏如坻有酒如澠有􅁏如陵亦具酒門榖梁傳曰公曰天王使石尚來歸脤脤也者何也俎實也􅀕􅁏也生曰脤熟曰俎論語曰子在齊聞韶三月不知􅁏味又郷黨曰魚餒而􅁏敗不食􅁏雖多不使勝食氣􅀕於君不􅀫􅁏助􅀕於君所得性體歸即以班賜不留神惠也􅀕􅁏不出三日出三日不食之矣自家其食􅁏也過三日不食之褻􅀑神之餘爾雅曰􅁏謂之敗臰懷又曰􅁏曰脫之剥其皮家柰􅁏束鹿之屬呼麋通又曰鮑宣上書柰何獨􅀻養外親與幸臣董賢使奴從賔爲􅁏史記曰廉頗奔魏趙王使者視頗尚可得用不趙使見頗頗爲之一飯㪷米􅁏十斤八曰公孫弘爲丞相食一􅁏帝王丗紀曰夏桀爲肉山脯林漢書曰黄覇頴川太守使吏出不敢舎郵亭食於道旁烏欔其􅁏民有欲詣府口言事者適見覇與語道此後日吏謁見覇迎勞之曰甚苦食於道旁乃爲烏所盗􅁏吏大驚又曰武帝爲酒池􅁏林令外國客遍觀又曰陳平爲里社分其􅁏均父老曰善陳􅐐子之爲宰平曰嗟乎使平宰天下亦當如此􅁏矣又曰張湯父爲長安丞出湯爲兒守舎父還䑕盗􅁏父怒笞湯湯掘室得䑕及餘􅁏劾䑕掠治又曰伏日賜從官􅁏大官丞日晏不來東方朔獨拔劒切􅁏即懷􅁏歸太官奏之朔入免冠謝上曰先生起自責也朔再拜曰朔來受賜不待詔何無禮也抜劒割􅁏一何壯也割之不多一何廉也歸遺細君又何仁也上􅀏曰使先生自責乃反自譽賜酒一石􅁏百斤歸遺細君客漿酒霍􅁏視酒如漿視􅁏如霍又曰成帝許后上䟽曰故時酒􅁏有所賜外家輙上表迺决東觀漢記曰太尉趙喜聞魯恭志行每歳時遣子送米􅁏辭讓不敢當又曰卓茂爲宻令民有言亭長受其米􅁏者茂問之亭長從汝求乎有事與之自以恩意遺人乎民曰自遺之茂曰人異於禽獸者以有仁愛也亭長素爲善吏歳時遺之禮也又曰賊經姜詩墓不敢驚孝子致米􅁏詩埋之後吏譴詩掘出示之又曰閔仲叔客居安邑老病家貧不能買􅁏日買猪肝一片謝承後漢書曰李萇家晝則躬耕夜則讀書日爲母市斤􅁏梁米作食後漢書曰桓任字儀遼後母生時不食猪羊􅁏故終身不以猪羊􅁏入口又曰李充延平年中詔公卿中二千石各舉隠士大儒務取髙行以勸後進特徴充爲愽士侍中大將軍鄧隲貴戚傾時無所下借下音假借音子夜反以充髙節毎卑敬之甞置酒請賔客滿堂酒酣隲跪曰幸託椒房位列上將幕府􅀄開欲辟天下竒偉以匡不逮惟諸君愽求其器充乃爲陳海内隠居懷道之士頗有不合隲欲絶其論以􅁏啖之充抵􅁏於地曰􅀃士猶甘於􅁏遂出徑去隲甚望之漢舊儀曰齊法食􅁏三十六兩英雄記曰兾州刺史韓馥問諸從事曰収有何長何短治中劉子曰前勞賜有餘􅁏百斤賣之一州調度奢儉不復在是猶可勞賜勤勞吏士賣之可示儉呉志曰趙逹甞過故知取盤中􅃗箸再縱横之乃言卿東壁下有羙酒一斛又有鹿􅁏三斤何以辭無王隠晉書曰􅉖懷太子令人屠􅁏巳自分齊手揣輕重斤兩不差云其母夲屠家之女也太康起居注曰尚書郭弈有疾日賜酒米各伍􅂛猪羊􅁏各一斤石崇崔亮母疾曰賜清酒粳米各伍􅂛猪羊􅁏各一斤半臧榮緒晉書曰趙髙爲丞相指鹿爲馬持蒲作􅁏晉中興書曰陸納爲呉興太守辭大司馬桓温因問桓公醉可飲幾酒􅁏食多少温曰温酒不過三􅂛便醉白􅁏不過十臠納後伺間求入自言外有徴禮温勑而受正有酒一斗鹿􅁏一盤一坐愕然納曰公近云飲三􅂛民正可二􅂛今有一斗似備餘􅄋温歎服晉書曰周訪郷人盗訪牛於家間殺之訪得之宻埋其􅁏不使人知宋書曰衡陽王儀季鎮荆州隊主續豊母老家貧無以充養遂不食􅁏儀季哀其志以錢米給豊母并制豊噉􅁏齊書曰髙帝雖從官而家業夲貧爲建康令時明帝等冬月猶無縑纊而奉瞻甚厚后母撤去兼􅁏曰於我過足矣梁書曰􅀓昭性尤篤愼予婦甞得家餉牛􅁏以進昭昭召其子曰食之則犯法告之則不可取而埋之隋書曰王邵篤好經史遺落世事用思旣專性頗怳忽至對食閉目疑思盤中之􅁏輙爲僕從所食邵弗之􅁴唯責􅁏少數罰厨人以情白依前閉目伺候而獲之厨人方免笞辱墨子曰孔子厄於陳蔡子路烹豚孔子不問􅁏所由來食之晏子春秋曰梁丘據見晏子中食而􅁏不足王孫子曰楚莊伐宋厨有臰􅁏將軍子重諌王以􅁏饋於賢公孫尼子曰殷紂爲􅁏圃孟子曰孔子爲魯司冦從而􅀕膰􅁏不至不稅冕而行不知者以爲􅁏也其知者以無禮也又曰庖有肥􅁏厩有肥馬民有飢色野有餓殍此率獸而食人也又曰雞豚狗􅇾之畜無失其時七十者可以食􅁏矣韓子曰夫百日不食以待梁􅁏餓者不育令待堯舜之賢乃治當世之民是猶待梁􅁏而救餓之􅀃也又曰晏子對景公曰田成子殺一牛取一豆􅁏餘以食士燕丹子曰荆軻入􅁗過陽翟買􅁏争輕重屠辱軻武陽欲擊軻止之淮南子曰今屠牛而烹其􅁏或以酸或以甘煎熬犢炙和有萬方其夲一牛之體吕氏春秋曰􅁏之羙者猩猩之脣貛貛之炙㑺燕之翠􅄒蕩之掔音牽獸名旄象之約旄象牛獸也族牛􅁏羮貴之也又曰甞一臠而知一鑊之味一鼎之調又曰肥􅁏厚酒務以相強命之曰爛膓之食劉向新序曰趙簡子使使者聘孔子於魯以胖牛􅁏迎於河上使者謂舡人曰孔子即上舡中河安流而殺之孔子至使者致命進胖牛之􅁏孔子仰天而歎曰羙哉水乎洋洋也使丘不濟此水者命也夫桓譚新論曰九江太守龐眞案縣令髙曾受社􅀕􅁵有生牛􅁏二十斤劾以主守盗上請逮捕詔􅁵不􅂍天下縁是諸府縣社臈祠􅀕竈不但進熟食皆復多􅁏米酒脯腊諸竒珎益盛是故諸郡府至殺牛數十頭又曰關東鄙語世人聞長安樂出門西向􅀏知􅁏味羙則對屠門而屑風俗通曰陳伯敬目有所見不食其􅁏王充論衡曰仲子兄禄萬鍾以兄之禄爲不義而不食之避兄離母處於陵他日歸有饋其兄生鵝者曰惡用是鶂鶂者他日其母殺是鵝與之食其兄自外來至曰鶂鶂之􅁏而仲子耻􅀒前言即吐而出之典略曰凢宗廟三歳大祫毎大牢分之左辯上帝右辯上后俎餘委􅁏積於前數千斤名堆俎􅀶物志曰食鷰􅁏不可入水爲蛟所呑龍􅁏以醢漬則文章生方言曰燕之北郊朝鮮洌水間凢異􅁏及披牛羊五臟謂之􅈩音慱􅀃文曰殽雜􅁏也腌漬􅁏也一刼反􅈩切􅁏也之䎡反廣志曰北方有牧草便於其畜故北方出羙􅁏異苑曰山隂有人甞食牛􅁏便作牛鳴菜食乃止廣州先賢傳曰丁宻不食有目之􅁏桂陽先賢􅀞讃曰程曽子孝孫七歳亡母號慕毀悴王母哀憐嚼食哺之知有􅁏味遂吐不食華陽國志曰孝子狼偶二親病時不能食􅁏遂終身不食􅁏董卓別傳曰吕布殺卓百姓欣慶相賀長安酒􅁏爲􅁀貴江氏家傳曰􅵿年七歳葬父有酒􅁏食之左右或戲曰郎爲孝何􅁏食􅵿瞿然歛容遂不食十洲記曰崑崙銅柱下有回屋焉壁方丈上有鳥名曰希有左翼覆東王公右翼覆西王母其􅁏􅀂醢仙人甘之􅀏林曰甲買􅁏過入都厠挂􅁏着外乙偷之未得去甲出覔􅁏因詐便口䘖􅁏曰挂著外門何得不失􅀂如我銜􅁏着口豈有失理世􅀃曰羅友作荆州從事桓宣武爲王車􅀐集別有永集坐良乆辭出宣武曰卿向以諮事今何以去荅曰友聞白羊白􅁏羙一生未甞得故來求食食了無事可諮魏文帝與呉質書曰舉太山以爲􅁏竭東海以爲酒陸凱表曰吕蒙凌統早亡先帝痛悼不巳子並㓜稚皆内省中稱􅁏食之客炙釋名曰炙炙也炙於火上也脯炙以脯餳􅁡豉汁淹之脯然也釡炙於釡中汁和熟之也衘炙細􅁺􅁏和以薑椒塩豉已乃以􅁏衘裏其表而炙之豹炙全體炙之各自方割出於胡貊之爲也禮曰膾炙處外母嘬炙嘬音切夬切詩曰執㸑踖踖爲爼孔碩或燔或炙又曰有兎斯首炮之燔之君子有酒酌言獻之毛曰炮加火曰燔傳曰欒寜將飲酒炙未熟聞亂使告季子季子子路也爲孔氏宰邑也召􅀗駕乗車召􅀗衛大夫駕乗車言不欲戰也行爵食炙奉衛侯輙來奔韓子曰晉平公時進炙而髪繞之平公使殺庖人庖人呼天曰嗟乎臣有三罪而死不自知乎平公曰何謂也對曰臣刀之利風靡骨断而髪不截是臣之一死桑􅁅炙之􅁏紅白而髪不燒是臣之二死也炙熟又重脻而視之髪繞炙而目不見是臣三死也意者堂下有憎臣乎殺臣不亦枉乎謝承後漢書曰陳正字叔方爲太官令與黄門侍郎有􅂩因進御食以髪内炙中光武見之怒將斬正正曰臣當萬死者三一山炭増冶吐炎燋膚爛􅁏而髮不銷臣罪一也匣出佩刀匠也砥礪而虧肌截骨曽不能断髪臣罪二也臣少事眼目書奏章表猶讀表五經具供御食與承反庖人六目齊視豈不如黄門兩目臣罪三也制赦之晉書曰王羲之年十三謁周顗顗異之時重牛心炙座客未噉顗割噉羲之於是始知名齊書曰桂揚之役詔檄乆之未就齊髙帝引江淹入中書省光賜酒食淹素能飲啖食鵝炙垂盡進酒數􅂛訖文誥亦辦隋書曰煬帝􅀄在藩魚俱羅弟賛以左右從累遷大都督及帝嗣位拜車􅀐將軍賛性㐫􅁀虐其部下令左右炙􅁏遇不中意以籖刺瞎其眼有温酒不適者立斷其舌孟子曰􅄝􅁗人之炙無以異於􅄝吾炙夫物則亦有然者也然則􅄝炙亦有外與又曰曽晳􅄝羊􅀥而曽子不忍食羊􅀥公孫􅐫問曰膾炙與羊􅀥孰羙孟子曰膾炙哉公孫􅐫曰然則何爲食膾炙而不食羊􅀥乎曰膾炙所同也羊􅀥所獨也孝子􅀓曰王祥後母病欲黄雀炙乃有黄雀數枚飛入其幕因以供母􅀃苑曰智伯以庖人忘炙而不知韓魏炙知小而不忘知大也世􅀃曰頋榮字彦先輟巳炙啖行炙者曰豈有終日執之而不知其味也耶明皇􅄂録曰杜甫後漂寓湘潭間覉旅鷦􅷑於衡州耒陽縣頗爲令長所厭甫投詩於宰宰遂致牛炙白酒以甫遺甫飲過多一夕而卒集中猶有贈聶耒陽詩也太平御覽卷第八百六十三
