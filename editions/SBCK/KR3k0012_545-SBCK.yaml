body:
  text: 曰也孔子曰壻使人弔􅀂壻之父母死則女之家亦使人弔父䘮稱父母䘮稱母各以其正嫡自相弔問禮之冝父母不在則稱伯父世母弔禮不廢也巳葬壻之伯父致命女氏曰某之子有父母之䘮不得嗣爲兄弟嗣継使某致命女氏許諾而不敢嫁禮也壻免䘮女之父母使人請壻弗娶而後嫁之禮也又曰大夫士有私䘮可以除之矣而有君服焉其除之也如之何孔子曰有君䘮服於身不敢􅀻服又何除焉於是乎有過時而弗除也君之䘮服除而後殷祭禮也謂主人也支子則否又曰君薨旣殯而臣有父母之䘮則如之何孔子曰歸居於家有殷事則之君所朝夕否曰君旣啓而臣有父母之䘮則如之何孔子曰歸哭而反送君曰君未殯而臣有父母之䘮則如之何孔子曰歸殯反于君所有殷事則歸朝夕否又曰君出疆以三年之戒以禆從君薨其入如之何孔子曰供殯服則子麻弁絰䟽衰菲杖棺柩未安不忍成服於外也布弁如爵弁而用布也杖者爲巳病入自闕􅂛自西階闕謂毀宗也柩毀宗而入異於生如小歛則子免而從柩入自門􅂛自阼階君大夫士一節也又􅄂記曰恤由之䘮哀公使孺悲之孔子學士䘮禮士䘮禮於是存乎書又曰士之子爲大夫父母弗能主也使其子主之無子則爲之置後凡主兄弟之喪雖䟽亦虞䘮事虞祔乃畢又􅄂記下曰姑姉妹其夫死而夫黨無兄弟使夫之族人主䘮妻之黨雖親不主此謂姑姉妹無子寡死而夫􅀂無族矣則前後家東西家無有則里尹主之又曰或問於曽子曰夫旣遣而包其餘猶旣食而裏其餘乎言遣旣鄭而又包之是與食於人巳而裏其餘將去何異君子寧爲是乎言傷廉也曽子曰吾子不見大饗乎夫大饗旣饗卷三牲之爼歸于賔館父母而賔客之所以爲哀也又䘮服小記曰大夫不主士之䘮土之䘮雖無主不敢攝大夫以爲主士不攝大夫唯宗子又䘮大記曰疾病外内皆掃爲賔客將來問疾也疾困曰病也君大夫徹懸士去琴瑟寢東首於北牖下謂君來視之時也病者居北牖下或爲北牖下廢床􅜂䙝衣加新衣體一人人始生在地去牀庶其氣生反也徹䙝衣則所加者朝服也男女改服屬纊以俟絶氣唯哭先復復而後行死事君設大槃造氷焉大夫設夷槃造氷焉士併瓦槃無氷設牀䄠第有枕唅一牀襲一牀遷尸于堂又一牀皆有枕席君大夫士一也始死遷尸于牀幠用歛衾去死衣小臣楔齒用角柶綴足用燕几君大夫士一也管人汲授御者御者差沐于堂上君沐梁大夫沐稷士沐梁甸人爲垼于西牆下陶人出重鬲管人受沐乃煑之甸人取所􅜂廟之西北匪薪用爨之管人授御者沐乃沐用瓦槃挋用巾如他日小臣爪手剪髮濡濯棄于坎又三年問曰三年之䘮何也曰稱情而立文因以飾羣别親䟽貴賤之節而弗可損益也故曰無易之道也稱其情而立文稱人之情輕重而制其禮也羣謂親之黨也無易猶不易也創鉅者其日乆痛甚者其愈遟三年者稱情而立文所以爲至痛極也又曰然則何以至期也言三年之義如此則何以有降至於期也期者謂爲人後者父在爲母也曰至親以期斷言服之正雖至親皆期而除也是何也問服斷於期之義也曰天地則巳易矣四時則巳變矣其在天地之中者莫不更始焉是以象之也法此變易可以期也然則何以三年也言法此變易可以期何以乃三年爲曰加隆焉爾也焉使倍之故再期也言於父母加隆其恩使倍期也下焉猶然田九月以下何也曰焉使弗及也言使其恩不􅀂父母故三年以爲隆緦小功以爲殺期九月爲間上取象於天下取法於地中取則於人人之所以羣居和壹之理盡矣取象於天地謂法其變易也自三年以至緦皆歳時之數也言旣象天地又足以盡人聚居純厚之恩也左傳哀下曰越圍呉趙孟降於䘮食趙孟襄子無恤時有父簡子䘮楚隆曰三年之䘮親暱之極也主又降之無乃有故乎楚隆襄子家臣趙孟曰黄池之役先主與呉王有質曰好惡同之今越圍呉嗣子不廢舊業而敵之嗣子襄子自謂欲敵越救呉非􅀳之所能及也吾是以爲降論語陽貨曰宰我問三年之䘮期巳乆矣君子三年不爲禮禮必壞三年不爲樂樂必崩舊榖旣没新榖旣􅂛鑚燧改火期可巳矣子曰食夫稻衣夫錦於女安乎曰安女安則爲之夫君子之居䘮食旨不甘聞樂不樂居處不安故不爲也今女安則爲之宰我出子曰予之不仁也子生三年然後免於父母之懷夫三年之䘮天下之通䘮也予也有三年之愛於其父母乎言子之於父母欲報之恩昊天罔極而予也有三年之愛乎孝經援神契曰䘮不過三年以期増倍五五二十五月義斷仁期十二月也再期二十五月也言期増倍則可矣復云二十五月者容有閏故曰期而後三十五月也春秋曰閏月葬齋景公看數閏也示民有終縁䘮絶情再期萬物再終䘮者弥逺逺追慕殺故因殺以絶家語曰孔子在衛司徒敬子卒夫子弔焉主人不哀夫子哭不盡聲而退蘧伯玉謂孔子曰衛國鄙俗不習䘮禮煩吾子辱相焉孔子許之掘中霤而浴中霤室中毀竈以綴足襲屍於牀及葬毀宗􅺺行明不復有事於此綴足欲令不解戾也毀宗廟之門西而山行神之位在廟門之外出于大門及墓男子西面婦人東面旣封而歸殷道也孔子行之子游問曰君子行禮不求變俗夫子變之矣孔子曰非此之謂也䘮事則從其質而巳矣又曰孔子之䘮公西赤掌葬焉唅以􅂼米三具􅂼米粳米也禮記曰嘉蔬襲衣十有一稱加朝服一冠章甫之冠佩象環徑五寸而綦組綬綦􅄂色也桐棺四寸栢椁五寸飾桐廧置翣設披周也設崇殷也綢練設旐夏也披柩行夾引棺者也崇牙旌旗節也綢練旌旗之扛葬乗東所建也旌旗之旒縿緇布廣充幅長尋日旐也兼用三王之禮所以尊師且備古也續漢書禮儀志曰登遐皇后詔三公典䘮事百官皆衣白單衣白幘冠閉城門宫門近臣中黃門持兵虎賁羽林郎中署皆嚴宿衛官府各警北軍五校繞宮屯兵黃門令尚書御史謁者晝夜行陳三公所手足色膚如禮皇后皇太子􅂘踴如禮沐浴如禮守宮令兼東園匠將女執事黃綿緹繒金縷玉押如故事飯含珠玉如禮氷槃如禮百官哭臨殿下是日夜下竹使符到皆伏哭盡哀小歛如禮東園匠考工今東園秘器表裏洞赤文盡日月烏􅀛龍虎連璧偃明如故事大歛于兩楹之間于寳晋紀曰大鴻臚鄭黙有母䘮旣葬有司依常使還攝職黙固陳執乆乃許之於是定令聽大臣得終䘮焉宋書禮志曰鄭玄䘮制二十七月而終學者多云得禮晉􅀄用王肅議祥橝共月遂以爲制江左以來唯􅀳朝施用縉紳之士猶多遵玄議齊書曰皇太子妃薨左衛將軍沈文季經爲宫臣未詳服不王儉議曰漢魏巳來官僚先備臣之節具體在三存旣盡敬亡豈無服昔􅁃翼䘮妻王允滕猶府吏冝有小君之服况臣節之重冝依舊君之妻齊衰三月而除後周書曰葬文宣后叱奴氏於永固陵帝􅃝跣至陵所詔曰齊斬之情經籍彛訓近代㳂革遂亡斯禮伏奉遺令旣葬便除攀慕几筵情實未忍三年之䘮達於天子古今無易之道王者之所常行但時有未諧不得全制軍國務重庶目聽朝縗麻之節苫廬之禮率遵前典以申罔極百寮以下冝依遺令公卿上表固請俯就權制過葬即􅁻帝不許引古禮荅之羣臣乃止於是遂申三年之制五服之内亦令依禮衝波傳曰宰我謂三年之䘮日月旣周星辰旣更衣裳旣造百鳥旣變萬物旣易黍稷旣生朽者旣枯於期可矣顔淵曰人知其一莫知其他俱知􅁀虎不知慿河鹿生三年其角乃墮子生三年而離父母之懷子雖美辯豈能破尭舜之法改禹湯之典更聖人之文除周公之禮改三年之䘮不亦難哉父母者天地天崩地壞三年不亦冝乎荀氏家傳曰荀爽對䇿曰臣聞火生於木故其德孝漢之謚帝稱孝其義取此也故漢制天下皆誦孝經選吏則舉孝廉盖以孝務也夫䘮親自盡孝之終也今二千石不得行三年䘮非所以崇孝道而稱火德也頃者漢嗣數乏枝葉不繁其咎未必不由此徃者文帝勞謙自約行過于儉故有遺詔以日易月此所謂夷惠激俗當身而巳貫萬丗爲後嗣法者也太平御覽卷第五百四十五
