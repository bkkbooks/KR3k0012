front:
  text: 太平御覽卷第三百八十
  hash: sha256:648e716e7f9a70647c43ab71dfbba4b526801abd864d01a92e6304a9694379c6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_380-1a}
body:
  text: 人事部二十一羙丈夫下羙婦人上羙丈夫下唐書曰張知謇蒲州河東人徙家于􅄮少與兄知立知晦弟知黙勵志讀書皆明經擢第儀質瓌偉眉目踈朗曉立理文而清介自守故公卿爭進之又曰崔湜羙姿儀有才名弟液滌及從兄涖並有文翰居清要毎宴私之際自比東晉王導謝安之家謂人曰吾之門及出身歴官未甞不爲第一丈夫當先據要路以制人豈能黙黙受制於人液尤善五言湜歎曰海子我家之神􅀛也海子即液小名官至殿中侍御史又曰盧承慶羙風儀􅀶學有才幹貞觀􅀄爲􅁗州都督府户曹叅軍因奏河西軍事太宗竒其明辯擢拜考功貟外郎遷民部侍郎太宗甞問歴代户口數承慶叙夏啇後迄于周隋皆有依據上嗟賞之令兼檢校兵部侍郎知五品選事莊子曰盗跖謂孔子曰長大羙好人見而恱者此吾父母遺徳丘雖不吾譽吾不自知耶傅􅀇子曰蒯躬字叔孝性方嚴有容儀人望而畏之有過其門者皆整衣改容郭子曰潘安仁夏侯湛並有羙容貌常同行人謂之連璧又曰謝哲字頴豫陳郡人也羙風儀舉止藴藉而􅁭情豁然爲士君子所重郭林宗別傳曰林宗遊洛陽見河南尹李膺膺大竒之於是名震京師復歸郷里衣冠諸儒送至河上車數千兩林宗唯與膺同舟而齊衆賔望之以爲神仙焉晉謝安別傳曰王珣以疾辭職歳餘卒桓玄與㑹稽王導子書曰珣神情朗悟經史明徹風流之羙公私所􅀉忽尓喪失歎悼之􅀷豈但風流相悼而巳荀氏家傳曰荀恱字仲豫儉之子儉早卒恱年十二能說春秋家貧無書毎之人間所見篇讀一覽多能誦記性靜羙姿容又曰荀羡字令則七歳隨父在石頭􅂫峻愛其姿神數喚之年十五擬國婚之選不欲連姻帝室乃遁長沙監司追尋不得巳遂尚潯陽公主風氣英秀明䰅眉俯仰眄睞容止可則皇甫謐􅇣士傳曰或問許子將荀靖與荀爽孰賢子將曰二人皆玉也慈明外朗叔慈内潤何晏別傳曰何晏南陽人大將軍進之孫遇害魏武納晏母晏小養於魏宫至七八歳惠心天悟形貌絶羙武帝欲以爲子毎扶將游觀令與諸子長㓜相次晏微􅁴之坐則專席止則獨立或問其故荅曰禮異姓不相貫管輅別傳曰諸􅁑原與管輅別戒二事言卿樂酒量温克然不可保寜當節之即卿有水鑒之才所見者妙仰觀如神禍如膏火不可不愼也呉地記曰陸閎字子春暢子也姿容如玉威儀秀異光武􅂛臺而見偉之􅀏曰南方故多佳人三國典略曰李繪儀貌端偉神情朗㑺舅河間邢晏毎與之言歎其髙逺稱之曰􅀂披煙霧如對珠玉宅相之竒良在此甥文襄嗣業晉代山東諸郡其特降書徴者唯繪清河太守辛術二人而巳又曰梁楊白花字長茂武都仇池人大眼之子也少有勇力容貌瓌偉又曰山公目嵆叔夜之爲人也巖巖􅀂􅀌松之獨立又曰嵇叔夜之爲人其醉也隗峩如玉山之將頽又曰衛玠從豫章下人乆聞其姿觀者如堵玠先有羸疾發遂死時人謂看殺衛玠又曰人歎王恭形茂者濯濯如春月栁又曰王右軍見杜洪理歎曰膚如凝脂眼如􅀧􅃮此神仙中人也又曰裴叔則有儁彩容儀脫冠麤服亂頭皆好有人見之曰裴叔則如玉山行光映照人也又曰時人目李宣國如玉山之將摧又曰衛伯玉爲尚書令見樂廣與朝中名士談義竒之曰自昔諸子弟造之曰此人水鑒也􅉷然􅀂披雲霧而覩青天又曰撫軍問孫興公劉眞長何如曰清簡令淑王仲祖何如曰温潤怡和又曰范豫章謂王荆州范寗王悅曰卿風流儁望真後來之秀王曰不有此舅焉有此甥王氏譜曰坦之娶陽范注女姉姉生悅又曰􅁃子嵩目和嶠森森如千丈之松雖磊砢有節目施之大厦有棟梁之用也楊松玠談藪曰張緒字思㬅少而閑雅風流吐納觀者忘疲永明主見靈和殿前栁條嫰弱披靡可愛嗟賞曰此楊栁風流可愛似張緒少年宋玉風賦曰楚襄王時宋玉休歸唐勒䜛之於王王謂玉曰體貌容冶口多微辭不亦薄乎王謂王曰身體容冶受之二親口多微辭聞之聖人陳沈烱長安少年行曰長安羙少年􅍡馬鐵連錢陳王裝腦勒晉帝鑄金鞭歩摇如飛鷰劒鍔似舒蓮去來新市北遨遊大道邊也羙婦人上周昜曰冶容誨淫毛詩曰窈窕淑女君子好逑又曰靜女其姝俟我於城隅匪女之爲羙羙人之貽妹羙色也又曰云誰之思羙孟姜矣又曰彼羙孟姜詢羙且都有女同行顔如舜英舜英不槿也又曰野有􅕃草零露漙兮有羙一人清揚婉兮又曰齊侯之子衛侯之妻東宫之妹邢侯之姨譚公惟􅀻手如柔荑膚如凝脂領如蝤蠐齒如瓠犀􅁗首娥眉巧􅀏倩兮羙目眄兮又曰彼羙淑􅁎可以晤歌又曰有女如玉又曰有女如雲又曰孌彼諸􅁎孌好貌左傳曰叔向欲娶申公巫臣氏其母曰吾聞甚羙必有甚惡而天鍾羙於是將必是以有敗也昔有仍氏生女鬒黒光可以鑑名曰玄妻樂正后􅇪娶之生伯封古諸侯髪羙曰鬒實有豕心䕫舜典樂夫有尤物足以移人苟非徳義必有禍尤異也又曰宋華父督見孔父之妻於路目逆而送之曰羙而艷色羙曰艷又曰衛侯自城上見巳氏之妻髪羙使髠之以爲吕姜髢又曰鄭有徐吾犯之妹甚羙公孫楚與公孫黒爭聘之公羊傳曰驪􅁎者國色也其顔色一囯之選又曰邾婁顔夫人者嫗􅄹女國色也爾雅曰羙女爲媛國語曰恭王遊於涇上密康公從三女奔之其母曰必致之於王夫獸三爲羣人三爲衆女三爲燦今以羙物歸汝而何徳以堪之康公弗獻一年王滅密賈逵注曰燦羙也戰國䇿曰晉文公得南威三日不朝遂推南威而逺之曰後代必有以色亡國者又曰隂􅁎與江􅁎爭爲后司馬喜爲隂􅁎乃謂趙王曰臣聞趙佳麗之所出也今至境入都邑殊無羙者臣未甞見人如中山隂􅁎者其眉目准額權衡偃月乃帝王之后非諸侯􅁎也趙王大恱欲請之司馬喜歸謂中山君曰趙王非賢主也乃欲請隂􅁎王冝立以爲后以絶趙王之意中山君遂立爲后又曰張儀之楚見楚王曰彼周鄭之女粉白黛黒立於衢閭之間非知而見之者以爲神王曰楚僻陋之國寡人未見中國之女如此之羙乃資以珠玉使行后鄭䄂聞之大恐令人謂張子曰聞君將之晉有千金斤請供蒭秣張子請王􅜠之王召鄭䄂而􅜠之張子再拜曰儀有死罪儀行天地遍矣未甞見人如此之羙也而儀言得羙人是欺王也王曰吾固知天下無兩人矣史記曰紂囚西伯而閎夭之徒以有莘氏美女獻紂紂大恱乃放西伯又曰漢武帝時尹夫人與邢夫人同時幸武帝有詔不得相見尹夫人自請武帝願見邢夫人帝令他夫人飾從者數十人來前尹夫人見之曰非邢夫人帝曰何以知之對曰觀其體貌形狀不足以當人主有詔邢夫人邢夫人故衣獨身來尹夫人望見曰眞是矣於是乃伭頭而泣自痛其不如也諺曰羙女入室惡女之仇漢書曰孝武李夫人夲以倡進􅀄夫人兄延年性知音律善歌舞侍上起舞歌曰北方有佳人絶丗而獨立一顧傾人城再顧傾人國寜不知傾城與傾國佳人不可得上歎息曰善丗豈有此人乎平陽主因言延年有女弟上乃召見之實妙麗善舞李夫人少而早卒上憐􅉖焉圖􅀞其形於甘泉宫華嶠後漢書曰梁兾妻孫壽色羙而善爲妖態作愁眉啼粧墮馬髻折􅆎歩齲齒􅀏以爲媚惑東觀漢記曰趙喜與友人韓仲伯欲出武關仲伯以其婦有色恐有強􅁀者而巳受其害欲棄之喜責怒仲伯以泥塗其婦面載以鹿車身自推毎逢賊輙爲求哀言其病遂脫又曰􅀄光武聞隂麗華羙心恱歎曰娶妻當得隂麗華後爲皇后漢武故事曰又起明光宫發燕趙羙女二千人充之率取十五以上二十以下年滿四十者出嫁凡諸宫羙人可七八千帝從行郡國載之後車與上同輦者十六人貟數􅁪使滿皆自然羙麗不使粉白黛黒侍衣軒者亦如之魏略曰􅀄􅀽紹子熈納甄后熈出奔幽州后留侍姑及鄴破紹妻及后坐堂皇上紹妻自􅅮文帝語􅀽夫人令新婦舉頭姑乃捧后令仰帝就視見其顔色非凢稱歎之太祖爲迎也呉志曰周瑜從孫䇿攻皖城得喬公兩女國色也䇿自納大喬瑜納小喬又曰孫權歩夫人以羙麗得幸寵冠後庭王隠晉書曰阮籍隣家處女有才色籍不與親生不相知未嫁而死籍徃哭盡哀乃去晉陽春秋曰荀燦字奉倩常曰婦人者才智不足論自冝以色爲主驃􅀐將軍曹洪女有羙色燦於是聘焉容服帷帳甚麗專房宴寢歴數年後婦偶病亡未殯傳嘏徃唁燦不哭神傷曰佳人難再得痛悼不巳歳餘亦亡鄧粲晉紀曰杜弢至長沙掠前始興太守尹虞二女皆國色也將妻之曰我父二千石終不爲賊作婦遂自殺焉又曰謝鯤隣家有羙女鯤挑之女織梭投之折其兩齒于寳晉紀曰石崇有妓曰緑珠羙如玉善舞孫秀使人求焉崇方登凉觀臨清水婦人侍側使者以吿崇崇盡出婦妾數十人以示之皆藴蘭麝而披羅縠使者曰君侯服御麗矣然本受命旨索緑珠崇勃然曰緑珠吾所愛不可得也使者曰願加三思崇曰不然使者還以告故秀勸趙王倫殺之崔鴻十六國春秋前趙録曰劉聦使大鴻臚李􅁪聘太保劉啇女謂􅁪曰此女軰皆姿色超丗且太保於朕實自不同􅁪曰太保􅒨自有周與聖源實別聦大恱賜金六十斤又曰崔後趙石虎鄭后名櫻桃晉冗從僕射鄭丗逹家妓也在中猥妓中虎數歎其貌於太妃太妃給之又曰前􅁗􅀄符堅滅燕慕容冲妺年十四有殊色堅納之車頻􅁗書曰符堅時新羅獻羙女國在百濟國東三十國春秋曰後梁吕超殺其君纂后楊氏國色超將妻焉謂其父􅁪曰后􅀂自殺禍必及宗􅁪以此言吿后后曰大人夲賣女與氐羌以圖冨貴一之以甚其可再乎􅁪不能彊乃自殺唐書曰喬知之尤稱俊才所作篇詠時人多諷誦之則天時累除右􅀘闕遷左司郎中知之有侍婢曰窈窕娘羙麗善歌舞爲武承嗣所奪知之怨惜因作緑珠篇以送與婢婢感憤自殺承嗣大怒因諷酷吏羅織知之下獄死南史恩倖傳曰阮佃夫見廬江何恢有妓張耀華羙爲廣州刺史將發要佃夫飲設樂見張氏恱之頻求比人恢曰不可佃夫拂衣出户曰惜指失掌邪遂諷有司以公事彈􅁅太平御覽卷第三百八十
