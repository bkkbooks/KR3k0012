front:
  text: 太平御覽卷第四百五十八
  hash: sha256:77ee04dc4d0bb34576bfcf4199b863b1acbad43726087d6ad9420cf2c234243e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_458-1a}
body:
  text: 人事部九十九鑒戒上易曰防患曰戒又曰君子終日乾乾夕􅅥􅀂厲無咎又曰見羣龍無首吉又曰履霜堅冰至又曰積善之家必有餘慶積不善之家必有餘殃又曰其亡其亡繋于包桑又曰當其憂悔吝之時其介不可慢也又曰言行者君子之樞機樞機之發榮辱之主也可不愼乎尚書曰兢兢業業一日二日萬機又曰無稽之言勿聽弗詢之謀勿庸又曰不矜細行終累大德又曰功崇惟志業廣惟勤位弗期驕禄弗期侈又曰先王克謹天戒又曰作德心逸日休作僞心勞日拙又曰戒愼無虞罔失法度又曰懔乎􅀂朽索之馭六馬又曰德惟一動罔弗吉德二三動罔弗凶毛詩曰惴惴小心如臨于谷又曰戰戰兢兢如臨深淵如履薄冰又曰無念爾祖聿脩厥德又曰白圭之玷尚可磨斯言之玷不可爲左傳曰晉入楚軍三日穀范宣子立於戎馬之前曰君㓜弱諸臣不佞何以及此天命不於常有德之謂也君其戒之又曰禍福無門唯人自召又曰臧孫云季孫之愛我疾疹也孟孫之惡我藥石也美疹不如惡石孟孫死吾亡無日矣又曰呉公子札來聘見叔孫穆子曰恱之謂穆子曰子其不得死乎好善不能擇人吾聞君子務在擇人吾子爲魯宗卿而任其大政不愼所舉何以堪之禍必及子聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉謂子産曰鄭之執政者侈難將至矣政必及子子爲政愼以禮不然鄭國將敗適晉􅀃叔向曰吾子免之君侈而多良大夫皆冨政將在家吾子直必思自免於難又曰正考父三命益㳟故鼎銘云一命而僂再命而傴三命而俯循牆而走亦莫予敢侮禮曰母不敬儼􅀂思安定辭又曰敖不可長欲不可縱志不可滿樂不可極又曰安安而能遷臨財無茍得臨難無苟免很母求勝分母求多又曰不登髙不臨深不茍訾不茍􅀏孝子不服闇不登危懼辱親也又曰管仲鏤簋朱紘山節藻梲君子以爲濫矣晏平仲祀其先人豚肩不揜豆澣衣濯冠以朝君子以爲隘矣是故君子之行禮也不可不愼也又曰莫見乎隱莫顯乎微故君子愼其獨也孝經曰在上不驕髙而不危制節謹度滿而不溢論語曰君子有三戒少之時戒之在色及其壯也戒之在􅃲及其老也戒之在得又曰如有周公之才之羙使驕且吝其餘不足觀也巳又曰三思而後行再思可矣家語曰孔子之周觀於太廟右階之前有金人焉三緘其口而銘其背曰古之愼言之人也戒之哉無多言多言多敗無多事多事多患安樂必戒無行所悔勿謂何傷其禍將長勿謂何害其禍將大勿謂莫聞神將伺人熒熒不滅炎炎奈何㳙㳙不壅終爲江河緜緜不絶將成網羅毫末不札將尋斧柯誠能愼之福之垠也口是何傷禍之門也彊梁者不得其死好勝者必遇其敵盗憎主人民怨其上君子知天下之不可上也故下之知衆之不可先也故後之温㳟愼德使人慕之執雌持下人莫踰之人皆趨彼我獨守此孔子顧謂弟子曰此言雖鄙而中事情又孔子觀於周廟而有欹器焉孔子問守廟者曰此謂何器對曰蓋謂右生之器孔子曰吾聞右坐之器滿則覆虚則欹中則正有之乎對曰然孔子使子路取水而試之滿則覆中則正虚則欹孔子喟然而歎曰嗚呼惡有满而不覆者哉子路曰敢問持滿有道乎孔子曰持滿之道挹而損之子路曰損之有道乎孔子曰髙而能下滿而能虚冨而能儉貴而能卑智而能愚勇而能怯辯而能訥􅀶而能淺明而能闇是謂損而不極能行此道唯至德者及之易曰不損而益之自損而終益故也家語曰孔子行遊中路聞哭者聲甚悲孔子驅之前有異人者少進見之吾丘子也擁鏁帶索而哭孔子辟車而下問曰夫子有喪也何􅂘之悲也吾丘子對曰吾有三失孔子曰願聞三失吾丘子曰吾少好學問周通天下還後吾親亡一失也事君驕奢諫不遂是二失也厚交友而後絶三失也樹欲静而風不止子欲飬而親不待徃而不來者年也不可得再見者親也請從此辭則自刎而死孔子曰弟子記之此足以爲戒矣於是弟子歸養親者十三人又曰曾子曰狎甚則簡莊甚則不親是故君子之狎足以交情莊足以成禮而巳孔子聞斯言也曰二三子志之孰爲參也而不知禮者乎又曰衛孫文子得罪於獻公居戚公卒未葬文子擊鐘焉延陵季子適晉過聞之曰異哉夫子之在此也猶鷰之巢于幕懼猶未也又何樂焉君又在殯可乎文子於是終身不聽琴瑟孔子聞之曰季子能以義正人文子能克巳復義可謂善譏善改矣國語曰智襄子爲室羙士窋夕焉智伯曰室羙夫對曰羙則美矣抑臣亦有懼也曰何懼對曰臣以秉筆事君記有之曰夫髙山峻原不生草木松栢之地其土不肥今土木勝臣懼其不安人也室成三年而智氏亡漢書張安丗曾孫勃嗣毎登閣殿常曰桑霍爲我誡豈不厚哉又曰雋不疑字曼倩渤海人也爲郡文學進退必以禮名聞州郡武帝末郡國盗賊羣起暴勝之爲直指使者繡衣持斧捕盗素聞不疑賢至渤海遣吏請與相見躧履迎之坐定不疑據地曰竊伏海瀕聞暴公子舊矣迺今承顔接辭凢爲吏太剛則折太軟則廢威行施之以恩然後樹功揚名永終天禄勝之納其誡深接以禮又曰楊惲失爵位居處治産業起室宅其友人安定守孫會宗與書誡之曰大臣廢退當闔門惶恐爲可憐之意不當通賔客有譽稱也惲内懷不服驕奢不悔坐􅆎斬望前列曰元帝時京房以言災異數召見又爲吏考課事奏之因問上曰幽厲之君何以危所任者何人也上曰主不明而任巧佞房曰知巧佞而任之邪將以爲賢而任之耶上曰賢之房曰然則何以知其不賢也曰以其時亂而君危知之房曰今治乎亂乎上曰亂房曰然則有所任乎上曰幸其未至於彼也房曰臣恐後丗之視今猶今之視古也元帝嘿然矣又曰韓延夀善爲政坐法弃市吏民數千人送至渭城老小扶持車轂爭奉酒炙延壽不忍拒逆爲飲酒石餘使􅁺吏分謝吏民百姓莫不流涕延壽三子皆爲郎吏臨死屬其子勿爲吏以巳爲戒子皆以父言去官東觀漢記曰馮勤遷司徒是時三公多見罪退上欲令以善自終乃因讌見從容戒之曰朱浮上不忠於君下陵轢同列終以中傷放逐受誅雖復追加賞賜不足以償不訾之身忠臣孝子鑒照前丗以爲鑒戒能盡忠於國事君無二則爵賞先乎當丗名列於不朽可不勉哉又曰樊宏爲人謙慎常戒其子曰冨貴盈溢未有能終者天道惡滿而好謙前丗貴戚明戒也保身全已豈不樂哉後列曰班超爲都護以任尚代超尚謂超曰君在外國三十餘年而小人猥承君後冝以誨之超曰塞外吏士夲非孝子順孫皆以罪過徒補邊而蠻夷懷鳥獸之心難養易敗今君情嚴急水清無大魚察政不得下冝陽爲簡易寛小過繩大罪而巳又曰馬援岀屯襄國詔百官祖道援謂黃門侍郎梁松竇固曰凢人貴冨當使可賤如卿等欲不可復賤居高自持勉思鄙言松後果貴滿致災固亦幾不免後列曰馬援兄子嚴敦並喜通輕俠援前在交趾遺書戒之曰吾欲汝曹聞人過失如聞父母之名耳可得聞而口不可得言也好論議人長短是非正法此吾所大惡也寜死不願聞子孫有此行又曰徐穉嘗爲太尉黄瓊所辟不就及瓊卒歸葬稺乃負糧徒歩到江夏赴之設鷄酒薄􅀕哭卒而不告姓名時㑹者四方名士郭林宗等數千人聞之疑其稺也乃選能言生茅容輕􅀐追之及於塗容爲設飯共言稼穡之事臨決去謂曰爲我謝郭林宗大厦將顚非一繩所維何爲栖栖不遑寕處也魏志曰傳嘏與鍾㑹從平母丘儉後㑹有自矜色嘏戒之曰子志大量小而勲業難爲也可不慎哉又曰吏部尚書何晏詣管輅問曰連夢青繩數頭來在鼻上驅之不肯去有何意故輅曰今君侯位重山岳勢􅀂雷霆而懷德者鮮畏威者衆殆非小心翼翼多福之人又鼻者艮此天中之山髙而不危所以長守冨也今有蠅而集焉位峻者顚輕豪者亡不可不愼又曰曹爽飲食衣服擬於乗輿擅取武庫禁兵曹羲深以爲憂數諫止之又著書三篇陳驕淫盈溢之致禍敗辭旨甚切不敢斥爽託戒諸子以示爽爽知其爲已發也甚不恱羲或時以諌喻不納涕泗而起吴志曰孫權每田獵常乗馬射虎虎甞突前攀持馬鞍張昭變色而前曰將軍何用不當尔夫爲人君謂能駕御英雄驅使羣賢豈謂馳逐於原野校勇於猛獸者乎江表傳曰孫權征合肥還爲張遼所襲幾至危殆賀齊時率三千兵在南津迎權權旣就大船㑹諸將飲宴齊下席涕泣而言曰至尊人主當特重今日之事幾致禍敗羣下震悕􅀂無天地願以此爲終身戒權自前拭其淚曰大慙謹以刻心非伹書紳也王隱晉書曰􅁃衮兄女芳將嫁羙服具矣衮刈荆苕爲箕箒焉召諸子集之于堂男女以班而命芳來汝少􅀌汝逸汝豫不汝疵瑕今汝將適人事舅姑灑掃庭内婦人道也故賜汝以匪器之羙欲汝之温㳟朝夕雖休勿休也晉書曰趙王倫􅆲位嵇紹爲侍中惠帝復祚紹居夲職上疏諌曰願陛下無志金傭大司馬無忘潁上大將無忘黃橋則禍亂之萌無由而兆隋書曰賀􅀂弼及敦以武烈知名仕周爲金州揔管宇文護忌而害之臨刑呼弼謂之曰吾必欲平江南然此心不果汝當成吾志且吾以舌死汝不可不思因引錐刺弼舌出血誡以愼口唐書曰太宗嘗謂長孫無忌等曰朕聞主賢則臣直人不自知公直面論攻朕得失無忌奏言陛下武功文德跨絶古今發號施令事皆利物孝經云將順其羙臣順之不暇實不見陛下有所愆失太宗曰朕兾聞巳過公乃妄相䛕恱朕今面談公等得失以爲鑒誡言之者無過聞之者可以自改因目無忌曰善避嫌疑應對敏速求之古人亦當無比而揔兵攻戰非所長也髙士廉渉獵古今心術聦悟臨難旣不改節爲官亦無朋黨所少者骨鯁規諌耳唐儉言辭俊利善和解人酒杯流行發言啓齒事朕三十載遂無一言論國家得失楊師道性行絶善自無愆過無情實怯懦未甚更事急緩不可得力岑文夲性過敦厚文章自其所長而持論􅁪據經逺自當不􅀒於物劉洎性最堅貞言多利益然其意尚然諾於朋友能自􅀘闕亦何以尚馬周見事敏速性甚貞正於論量人物直道而行朕比任使多所稱意禇遂良學問稍長性亦堅正旣冩忠誠甚親附於朕譬飛鳥依人自加憐愛又曰閻立本雖有應務之才而尢善圖􅀞工於冩眞􅁗府十八學士圖及貞觀中凌煙閣功臣圖並立夲之跡也時人咸稱其妙太宗嘗與侍臣學士泛舟於春􅁐池中有異鳥隨波容與太宗擊賞數賜詔座者爲詠召立本令冩焉時閣外傳呼云􅀞師閻立夲時以爲主爵郞中奔走流汗俛伏池側手揮丹粉瞻望座賔不勝媿􅎼退戒其子曰吾少好讀書幸免牆面縁情染翰頗及儕流唯以丹青見知躬厮役之務辱莫大焉汝宜深戒勿習此末􅇊立夲爲性所好欲罷不能也及爲右相與左相姜恪對掌樞密恪旣歷任將軍立功塞外立夲唯善於圖畫非宰輔之器故時人以千字文爲語曰左相宣威沙漠右相馳譽丹青唐書曰房玄齡嘗誡諸子以驕奢沉溺必不可以地望陵人集古今聖賢家戒書於屏風令各取一具謂曰􅀂能留意足以保身成名又云􅀽家累葉忠節是吾所向汝即冝師之太平御覽卷第四百五十八
