front:
  text: 太平御覽卷第六百二十八
  hash: sha256:23f3023bd66d6482467aa1659666a5955cc4bbc338db8457916b6ab1a305bdf2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_628-1a}
body:
  text: 治道部九貢舉上周禮地官郷大夫之職曰正月之吉受教灋于司徒退而頒之于其郷吏使各以教其所治以攷其德行察其道蓺以歳時登其夫家之衆寡辨其可任者以歳時入其書三年則大比攷其德行道蓺而興賢者能者郷老及郷大夫帥其吏與其衆寡以禮禮賔之賢者有德行者也能者有道蓺者也衆寡謂郷民之善者無多少也鄭司農云興賢者謂􅀂今之舉爲孝廉者興能者謂􅀂今之舉􅌗才也􅀇謂變舉言興者謂合衆而尊寵之厥明郷老及郷大夫群吏獻賢能之書于王王再拜受之登于天府内史貳之獻猶進也王拜受之重得賢也王上其書於天府天府掌祖廟之寳藏者内史副冩其書者當詔王爵禄之時也禮記王制曰命郷論秀士􅂛之司徒曰選士移名於司徒也秀士郷大夫所考有德行道蓺者司徒論選士之秀者而􅂛之學曰俊士可使習禮者學大學􅂛於司徒者不征於郷􅂛於學者不征於司徒曰造士不征不給其繇役造成也能習禮則爲成士大樂正論造士之秀者以告于王而􅂛諸司馬曰進士司馬夏官卿主􅀖政者進受爵禄者司馬辨論官材論進士之賢者以告於王而定其論各署其所長論定然後官之任官然後爵之命之位定然後禄之又曽子問曰凢語于郊者語謂論􅀃於郊學必取賢歛才焉或以德進或以事舉或以言楊大樂正論造士之秀者升諸司馬曰進士謂此矣又射義曰古者天子之制諸侯歳獻貢士於天子天子試之於射宫其容體比於禮其節比於樂而中多者得與於􅀕其容體不比於禮其節不比於樂而中少者不得與於􅀕數與於􅀕而君有慶數不與於􅀕而君有讓天子將􅀕必先習射於澤澤者所以擇士也巳射於澤而后射於射宫射中者得與於􅀕不中者不得與於􅀕漢書曰髙帝十一年詔曰賢士大夫旣與我定有天下而不與吾共安利之可乎有肯從我遊者吾能尊顯之以布告天下御史中執法下郡守其有意稱明法者必身勸爲之駕詣丞相府署其行義年有其人而不言者免官又曰惠帝四年詔舉人孝弟力田者復其身髙后元年􅀄置孝弟官二千石者一人特置此官而尊其秩欲以勸免天下各令敦行務本又景帝後元二年詔曰廉士寡欲易足今訾筭十以上廼得官廉士筭不必衆有市籍不得官無訾又不得官朕甚􅉖之訾筭四得官有市籍謂賈人有財不得爲吏貲万錢筭百二十也十万時疾吏之貪以爲衣食足知榮辱故限貲十万乃得爲吏廉士無貲减至四筭乃得官又曰武帝建元􅀄始詔天下舉賢良方正直言極諌之士其理申啇韓非􅂫􅁗張儀之言亂國政者皆罷之又曰元光元年舉董仲舒對䇿曰今郡守縣令民之師帥所使承流而宣化也故師帥不賢則王德不宣恩澤不流今吏旣亡教訓於下或不承用主上之法􅁀虐百姓與姦爲市言小吏有爲姦欺者守令不舉乃反與之交易末利也貧窮寡弱􅁈苦失職甚不稱陛下之意夫長吏多出於郎中中郎吏二千石子弟選郎吏又以冨貲未必賢也且古所謂功者以其任官稱職爲差非所謂積日累乆也故小材雖累日不離於小官賢材雖未乆不害爲輔佐是以有司竭力盡知務理其業而以赴功今則不然累日以取貴積乆以致官是以廉耻貿亂賢不肖混殽也諸侯列卿郡守二千石各擇其吏民之賢者歳貢各二人以給􅀫衛且以觀大臣之能所貢賢者有賞不肖者有罰夫如是諸侯吏二千石皆盡心於求賢天下之士可得而官使也授之以官以使其材無以日月爲功實試用賢能爲上量材而授官録德而定位錄德存視之也則廉耻殊路賢不肖異處矣帝因是令郡國舉孝廉各一人又限以四科至五年詔徴吏人有明當代之務習先聖之術者縣次給食令與計偕計者上計簿使也郡國每歳遣詣京師上之偕者俱也令所徵之人與計者俱來而縣次給之也又元朔元年詔曰夫本仁祖義褒德録賢勸善刑􅁀本仁祖義謂以仁義爲本始也五帝三王所繇昌也故詔執事興廉舉孝庻幾成風夫十室之邑必有忠信三人並行厥有我師今或至闔郡而不薦一人是化不下究而積行之君子壅於上聞也究竟也言見壅遏不得聞於天子也且進賢受上賞蔽賢蒙顯戮古之道也其與中二千石禮官愽士議不舉者罪是時天下愼法莫敢謬舉而貢士盖鮮故有斯詔有司奏議曰古者諸侯貢士壹適謂之好德再適謂之賢賢三適謂之有功迺加音吐各反㢮音式爾反亦在御之而巳其令州縣察吏人有茂材異等􅌗材異等者超等軼群不與凡同可爲將相及使絶國者絶逺之國􅀄公孫弘以儒術爲丞相天下之學靡然嚮風時太常孔臧等曰請太常愽士官置弟子五十人復其身太常擇人年十八以上儀􅃺端正者􅀘博士弟子郡國縣道邑有好文學敬長上肅政教順郷里出入不悖所聞者二千石謹察可者常以計偕詣太常得受業如弟子一歳皆輙通一藝以上􅀘文學掌故缺其髙第可以爲郎中者太常籍奏即有秀異等輙以名聞其不事學􅀂不材及不能通一蓺輙罷之而諸不稱者罰又曰孝昭始元􅀄遣故廷尉王平等五人前爲此官今不居皆謂之故持節行郡國行下更反舉賢良孝宣帝時諌大夫王􅁻上言曰今使吏得任子弟子弟以父兄任爲郎率多驕驁不通古今驁同音至於積功理人無益於人此伐檀所爲作也伐檀詩篇名刺不用賢也冝明選求賢除任子弟之令又曰孝元帝永光元年二月詔丞相御史舉質樸敦厚遜讓有行者光禄歳以此科第郎從官始令丞相御史舉其四科人以擢用之而見在郎及從官又令光禄每歳依此科考校定其第髙下用知其人賢否又詔列侯舉茂材諌大夫張勃舉太官獻丞陳湯献丞主贡献物湯有罪勃坐削戸二百㑹薨故賜謚曰繆侯以舉所舉不得人故加惡謚繆者妄也其勸勵也如是故官得其材位必乆安爲吏長子孫居官以爲姓號三代以降斯之爲盛漢書音義曰甲乙科謂作簡䇿難問列置案上在試者意投射取而荅之謂之射䇿上者爲甲次爲乙􅀂録政化得失顯而問之謂之對䇿也後漢書曰建武七年下詔曰此隂陽錯謬日月薄蝕百姓有過在予一人公卿司􅀠州牧舉賢良方正各一人遣詣公車朕將覽試焉又曰韋彪上議曰冝以才行爲先不可純以閥閱然其要歸在於選二千石二千石賢則貢舉皆得其人矣帝深納之又曰章帝建􅀄元年詔曰夫郷舉里選必累功勞今刺史相不明真僞􅌗才孝廉歳以百數旣非能顯而當授之政事甚無謂也毎尋前代舉人貢士或起畎􅅿不繫閥閱史記明其等曰閥積功曰閲言前代舉人務取賢才不拘問它敷奏以言則文章可採明試以功則政有異迹文質彬彬朕甚嘉之其令太傅三公中二千石二千石郡國守相舉賢良方正能直言極諌之士各一人又章帝建􅀄五年詔曰公卿巳下其舉直言極諌能指朕過失者各一人遣詣公車將親臨問焉其以巖穴爲先勿取浮華漢官儀曰建􅀄八年十二月巳未詔書辟士四科一曰德行髙妙志節清白二曰經明行脩能任博士三曰明曉法律足以决疑能案章覆問文任御史四曰剛毅多畧遭事不惑明足照姦勇足决斷才任三輔皆存孝悌清公之行自今已後審四科辟召及刺史二千石察舉茂才尤異者孝廉廉吏務實校試以職有非其人不習官事正舉者故舉不實爲法罪之後漢書和帝永元五年詔曰選舉賢良爲政之夲科別行能必由郷曲而郡國舉吏不加簡擇故先帝明勑在所令試之以職乃得充選又徳行􅀹異不湏經職者别署狀上而宣布以來出入九年二千石曽不承奉恣心從好司􅀠刺史訖無糾察今新􅀩赦令且復申勑後有犯者顯明其罰在位不以選舉爲憂督察不以發覺爲􅀒非獨州郡也是以庶官多非其人下人􅀍姦邪之傷由法不行故也又永元六年詔曰朕以眇末承奉鴻烈隂陽不和水旱違度濟河之域㓙饉流亡而未􅀗忠言至謀所以匡救之䇿寤寢永歎用思孔疚惟官人不得於上􅀺民不安於下有司不念寛和而競爲苛刻覆案不急以妨人事甚非所以上當天心以濟元元也思得忠良之士以輔朕之不逮其令三公中二千石二千石内郡守相舉賢良方正能直言極諌之士各一人昭巖穴披幽隱遣詣公車朕將親覽焉帝乃親臨䇿問選􅀘郎吏又永元七年詔曰元首不明化流無良政失於人謫見於天深惟庻事五教在寛是以舊典因孝廉之舉以求其人有司詳選郎官寛博有謀才任典城者三十人旣而悉以所選郎出􅀘長相又永平十三年詔曰幽并凉州户口率少邊役衆劇束脩良吏進仕路狹撫接夷狄以人爲夲其令縁邊郡户口十萬以上歳舉孝廉一人不滿十萬二歳舉一人五萬以下三􅀊舉一人又曰安帝永􅀄元年詔公卿内外衆官郡國守相舉賢良方正有道術之士明政術逹古今能直言極諫者各一人又永􅀄二年詔曰昔在帝王承天理人莫不據琁璣玉衡以齊七政朕以不德遵奉大業而隂陽差越變異並見間令公卿郡國舉賢良方正逺求博選開不諱之路兾得至謀以監不逮而所對皆循尚浮言無卓爾異聞其百僚及郡國吏人有道術明習災異隂陽之度琁璣之數者各使指變以聞二千石長吏明以詔書博衍幽隱朕將親覽待以不次兾􅀗嘉謀以承天誡又詔其經明任博士居郷里有廉清孝順之稱才任理人者國相歳移名與計偕上五年又詔曰爲政之本莫􅀂得人褒賢顯善聖制所先濟濟多王文王以寕思得忠良正直之臣以輔不逮其令三公特進侯中二千石郡守諸侯相舉賢良方正違於教化能直言極諌之士各一人及至孝與衆卓異者并遣詣公車朕將親覽焉又曰胡廣南郡人􅀄爲郡散吏太守法雄之子眞從家來省其父真頗知人㑹歳終應舉雄勑真助求其才雄因大㑹諸吏真自於牗間宻占察之乃指廣以白雄遂察孝廉旣到京師試以章奏安帝以廣爲天下第一旬月拜尚書郎五遷尚書僕射又陽嘉元年太學新成詔曰試明經者􅀘弟子増甲乙之科貟各十人除郡國耆儒九十人皆􅀘郎舎人時尚書令左雄議改察舉之制限年四十以上儒者試經學文吏試章奏如有顔囬子竒之􅀋不拘年齒尚書僕射胡廣尚書郭䖍等駮之曰選舉因才無拘定制六竒之䇿不出經學鄭産之政非必章奏甘竒著用年乖強仕終賈楊聲亦在弱冠漢承周􅁗兼覽殷夏祖德師經叅􅄂霸䡄聖主賢臣代以致理貢舉之制莫或迴革今以一臣之言不可剗戾舊章竟從雄義於是雄上言郡國孝廉古之貢士出則宰人宣恊風教􅀂其面牆則無所施用孔子曰四十不惑禮稱強仕請自今孝廉年不滿四十不得察舉皆先詣公府諸生試家法文吏課牋奏副之端門練其虚實以觀異能以美風俗有不承科令者正其罪法􅀂有茂才異行自不拘年齒帝從之乃班下郡國明年有廣陵孝廉徐淑年未及舉臺郎凝詰之對曰詔書有如顔回子竒不拘年齒是故本郡以臣充選郎不能屈雄詰之曰昔顔回問一知十孝廉聞一知幾􅁘淑無以對乃遣還郡於是濟隂太守胡廣等十餘人皆坐謬舉免黜唯汝南陳蕃潁川李膺下邳陳球等三十餘人得拜郎中自是牧守畏慄莫敢輕舉在尚書迄于永嘉十餘年間察選清平多得其人雄又奏徴海内名儒爲愽士使公卿子弟爲諸生有志操者加其俸禄及汝南謝廉河南趙建年始十二各能通經雄並奏拜童子郎自是負書來學雲集京師又桓帝詔曰孝廉廉吏皆當典城牧人禁姦舉善興化之本常必由之詔書連下分明懇惻而在所翫習遂至怠慢選舉乖錯害及元元頃雖頗䋲正猶未懲改方今淮夷未殄軍師屢出百姓疲瘁困於徴發庻望羣吏惠我勞人蠲滌貪穢以祈休祥其令秩滿百石十歳以上有殊才異行乃得忝選贓吏子孫不得察舉杜絶邪僞請託之源令廉白守道者得信其操信音申古字通又曰􅀄平四年試儒生四十餘人上第賜位郎中次太子舎人下第者罷之詔曰孔子歎學之不講則所識日忘今􅂄儒年踰六十去離夲土營求粮資不得專業結童入學白首空歸長委農野永絶榮望朕甚愍焉其依科罷者聽爲太子舎人齊書左僕射王儉請解領選謂禇彦回曰選曹之始近自漢末今􅀂反古使州郡貢計三府辟士與衆共之猶賢一人之意古者選衆今則不然竒材絶智所以見遺於草澤也梁書天監中沈約上䟽曰當今士子繁多略以万計常患官少才多無地以處秀才自别是一種仕官非􅀂漢代取人之例也假使秀才對五問可稱孝廉荅一䇿能過此乃雕蟲小道何􅀜理功得失以此求才徒虚語爾後魏書孝文時韓麒麟子明宗上言曰前代取士必先正名故有賢良方正之稱今州郡貢察徒有秀孝之名無秀孝之實而朝廷但撿其有門地不復彈坐如此則可別貢門地以叙士人何假置秀孝之名也夫門地者是其父祖之貴烈亦何益於皇家茍有竒才雖屠釣奴虜之賤亦可用之苟非其人雖三后之胄自墜於皂􅀠矣或云代無竒才不􅀂取士於門地此亦失矣豈可以丗無周邵便廢宰相而不置哉但當校其寸長銖重者即先叙之則賢才無遺矣北齊書曰課試之法中書䇿秀才集書䇿考貢士考功郎中䇿廉良天子常服乗輿出坐於朝堂中楹秀才各以班草對字有脫誤者呼起立席後書有濫劣者飲墨水一􅂛文理孟浪者奪席脫容刀後周書曰宣帝大成元年詔州舉髙才博學者爲秀才郡舉經明行脩者爲孝廉上州歳一人下州三歳一人隋書曰文帝開皇中制諸州貢士歳三人工啇不得入仕太平御覽卷第六百二十八
