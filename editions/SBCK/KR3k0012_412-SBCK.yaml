front:
  text: 太平御覽卷第四百一十二
  hash: sha256:8371a04e75768542e77801c03c4b8f3a088cb687f265c11f356452a96633cd47
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_412-1a}
body:
  text: 人事部五十三孝上爾雅曰善父母爲孝毛詩鄁栢舟曰凱風美孝子也凱風南風衛之􅁋風流行雖有七子之母猶不安其室故美七子能盡其孝道以慰其母心又曰陟岵孝子行役思念父母也國小而迫數侵削役于大國父子兄弟離散而作是詩也陟彼岵􅀆山有草木曰岵瞻望父􅀆又谷風􅖋莪刺幽王也民人勞苦孝子不得終養爾蓼蓼者莪匪莪伊蒿蓼蓼長大㒵也莪已蓼長大我視之以爲非莪反謂之蒿諭已憂思雖在役中心不精識其事哀哀父母生我劬勞尚書曰有鰥在下曰虞舜帝曰俞子聞如何岳曰瞽子父頑母嚚象傲克諧以孝烝烝乂不格姦大戴禮曰上敬老則下益孝禮記曲禮曰凡爲人子者冬温而夏凊昬定而晨省故州閭郷黨稱其孝也孝子不服闇不登危懼辱親也服事也不於闇􅁳之中從事謂卒有非常失禮也又􅀕義曰曽子曰孝有三大孝尊親其次不辱其下能養公明儀問於曽子曰夫子可以爲孝乎曽子曰是何言與是何言與君子之所謂孝者先意承志諭父母於道參直養者安能爲孝乎曽子曰身也者父母之遺體也行父母之遺體敢不敬乎居處不莊非孝也事君不忠非孝也莅官不敬非孝也朋友不信非孝也戰陣無勇非孝也五者不遂災及於親敢不敬乎烹熟羶薌甞而薦之非孝也養也夫孝置之而塞乎天地􅄎之而撗乎四海斷一􅀣殺一獸不以其時非孝也孝有三小孝用力中孝用勞大孝不匱慈愛忘勞可謂用力矣尊仁安義可謂用勞矣􅀶施備物可謂不匱矣父母愛之喜而弗忘父母惡之懼而無怨父母有過諌而不逆父母旣没必求仁者之粟以祀之此之謂終禮又曰先王之孝也色不忘乎目目常思父母之顔色声不絶乎耳心志嗜欲不忘乎心君子生則敬養死則敬享思終身弗辱也又曰子曰舜其大孝也歟德爲聖人尊爲天子冨有四海之内宗廟享之子孫保之故大德也必得其位必得其禄必得其名必得其壽又曰閔子騫旣除喪而見與之琴和之而不和彈之而不成声夫樂之和猶人心雖䘮以除而哀未巳作而曰哀未忘也先王制禮不敢過也又曰文王之爲世子朝於王季日三鷄􅀄鳴而衣服至於寢門外問内竪之御者曰今日安否何如内竪曰安文王乃喜及日中又至亦如之及暮亦如之其有不安節則内竪以告文王文王色憂行不能正履王季復膳然後亦復􅀄左傳曰鄭莊公即位姜氏愛共叔叚請京使居之叔叚襲鄭莊公伐京遂寘姜氏于城潁而誓之曰不及黃泉無相見也旣而悔之潁考叔曰君何患焉若闕地及泉遂而相見闕穿也􅎬埏也其誰曰不然公從之君子曰潁考叔純孝也孝經曰愛敬盡於事親而德教加於百姓刑於四海盖天子之孝也髙而不危所以長守貴也滿而不溢所以長守冨也盖諸侯之孝也言满天下無口過行滿天下無怨惡盖卿大夫之孝也以孝事君則忠以敬事長則順盖士之孝也謹身節用以養父母此庶人之孝也孝經援神契曰天子行孝四夷和平又曰孝悌之至通於神明病則致其憂顦顇消形求醫翼全宋均注曰翼羽翼親者也孝經􅀃曰孝畜也養也論語學而曰父在觀其志父没觀其行三年無改於父之道可謂孝矣孝子父在無所自專庶幾於其善道而已又爲政曰子路問孝子曰色難言和顔色恱爲難也家語曰子路見孔子曰􅀒重渉逺不擇地而遊家貧親老不擇禄而仕昔者由也事二親之時常食藜藿之實而爲親􅀒米百里之外親没之後南遊於楚從車百乗積粟萬鍾累茵而坐茵辱列鼎而食願欲食藜藿爲親􅀒米不可復得也枯魚衘索幾何不蠹二親之壽忽如過􅂩孔子曰由也事親可謂生事盡力死事盡思者也又曰曽參者武城人字子與志於孝道故孔子因之作孝經齊欲以爲卿而不就曰吾父母老食人禄則憂人事吾不忍逺親而爲人役也後母遇之無恩而供養不衰及其妻爲藜蒸不熟因岀之人曰非七岀也荅曰藜蒸小物耳吾欲使熟而不用吾命况大事乎遂遣之終身不娶其子請焉告子曰髙宗以後妻殺孝已尹􅁻甫以後妻放伯竒吾上不及髙宗下不比吉甫庸知其得免於非乎漢書曰梁孝王每聞太后病口不能食又曰金日磾母教誨兩子甚有法度上聞而嘉之母死詔圗􅀞於甘泉宫署日休屠王閼氏日磾毎見􅀞常拜向之涕泣東觀漢記曰汝郁字叔異陳國人年五歳母病不能飲食郁亦不肯飲食母憐之強爲飱飯欺言巳愈郁察母親色不平輙復不食宗親共竒異之因字曰異又曰蕭彪字伯文京兆杜陵人累官巴郡太守父老乞供養父有賔客輙立屏風後應受使命父􅄝䴵音餅毎自買進之又曰張霸字伯饒蜀郡成都人年數歳有所噉必先讓父母郷里號曰張曽子九歳通春秋復欲進業父母語汝小何能多曰覇饒爲之故字伯饒後作㑹稽太守児童歌曰城上烏哺父母府中諸吏皆孝子又曰趙咨字文楚東郡燕人大司農陳竒舉咨至孝躬率子孫耕農爲養盗甞夜徃刼之咨恐母驚懼乃先至門迎盗因設爲食謝曰老母八十疾病湏養居貧無儲乞少置衣糧妻子餘物一無所請盗皆慙奔走又曰黄香字文疆父兄舉孝廉貧無奴僕香躬勤苦盡心供養冬無􅀍袴而親極滋味暑即扇枕寒即以身温席又曰鮑永字君長上黨人少有志操事母至孝妻常於母前叱狗永即去之又曰樊鯈字長魚事母至孝母常病癕鯈晝夜匍伏不離左右至爲吮癕又曰張表字公儀奉之子也遭父䘮疾病曠年目無所見耳無所聞服闋醫藥救療歷􅀊乃瘳毎彈琴惻愴不能成聲見酒肉未甞不泣宗人親厚節㑹飲食宴爲其不復設樂又曰㢘范字叔度京兆人也父客死蜀漢范與客歩􅀒䘮歸至葭萌舡觸石破没範持棺柩遂俱沈溺衆傷其義鈎求得之僅免於死又曰李充兄弟六人出入更衣家貧親老充妻勸異居充使釀酒㑹親戚充啓其母曰此婦勸異居不可奉􅀕祀請去之遂叱出其婦吴志曰顧悌以孝悌廉直聞於郷黨毎得父書洒掃整衣服設几筵舒書其上拜跪讀書應諾畢復􅄪拜父終水漿不入於口五日孫權爲作布衣一襲強令悌釋服悌雖以公義自割猶以不見父喪常􅀞壁作棺柩設象神坐於下對之哭泣服未闋卒臧榮緒晉書曰長孫略字文度以冨春車道少動經江水父難於風波毎行乘藍車略常歩從逺者百里毎渡浦則親入水扶持藍車又曰嵇紹事母至孝和色柔聲常居不足謹身節儉朝夕孜孜親執刀爼非無使􅇊以他人不如已之至誠也又曰晉齊獻王司馬攸字文猷晉文少子太后崩執喪過哀動必盡禮左右或以稻米千飯九理中丸以進王對之涕泣不食經三年杖然後能起人有犯諱者常悲不自勝又曰王延九歳喪父母卜氏遇之無道延事之夏則扇枕席冬則以身温之盛寒體無全衣而親極滋味王隱晉書曰李胤字宣伯遼東人祖父敏漢末河内太守爲賊所迫逐不知所終其子追索歴年無所見比居與父同年者亡制服行䘮燕國徐邈與之州里勸令娉婦孕生胤遂絶房内常禮重之不堪其憂數年而卒胤母更適牽招胤不識父母又改行有識之後降食哀感亦如遭䘮之禮以祖不知存亡設木主以事之由是發名又曰郄詵對䇿上第拜朝議郎母憂去職母苦病亡不欲車載家貧無以市買乃於所住堂北壁假葬朝夕拜告養雞種蒜竭其力術過三年得馬八疋輿棺至家􅀒土成墳晉中興書曰吴隱之字處黙濮陽人遭母憂哀毀過禮時與太常韓康伯鄰居隱之每哭康伯母輙輟食流涕悲不自勝語康伯曰吾若居銓衡之職當用此輩人及康伯爲吏部尚書因進用之遂歴清顯又曰范宣八歳後園挑菜誤傷指大啼問痛邪荅曰非爲痛身體髮膚不敢毀傷是以啼也又曰後蜀李雄太子班雄寢疾班晝夜省侍衣不解帶雄自少攻戰大􅀍傷痍至是多膿潰班爲吮膿殊無難色班即雄兄之子也宋書曰孫法宗一名宗之吴興人也父隨孫恩入海噬􅀍害屍骸不收母兄並餓死法宗年小流迸至十六方得還單身勤苦霜行草􅀫營辨棺槨造立冢墓葬送母兄儉而有禮以父屍不測入海尋求聞丗間論是至親以血􅄋骨當悉凝􅃿乃操刀㳂海見枯骸則刻肉灌血如此十餘年臂脛無完皮血脉枯竭終不能逢縗絰終身常居墓所山禽野獸皆悉馴附毎逢鹿觸網必解放之又孝義傳曰崔懷順清河東武城人也父耶利魯郡太守宋元嘉中爲魏所􅀗懷順與妻房氏篤愛聞父見虜即日遣妻布衣􅂼食如喪禮歳時北向流涕耶利後仕魏書戒懷順不許如此懷順得書更號泣懷順從叔摸爲榮陽太守亦入魏摸子雖居處改節不廢婚宦宋大明中懷順宗人兾州刺史元孫北使魏魏人問之曰崔邪利摸並力屈來歸二家子姪出處不同義將安在元孫曰王尊叱馭王陽廽車欲令忠孝並弘臣子兩遂㤗始􅀄准北入魏懷順因此歸北至代都而邪利已卒懷順絶而後􅂫載喪還青州徒跣氷雪土氣寒酷而手足不凍時人以爲之孝感又曰華寳晋陵無錫人也父豪晋義熈末戍長安年八歳臨別謂寳曰湏我還當爲汝上頭長安䧟寳年七十不㛰冠或問之者輙號慟彌日不忍荅也又曰散􅀐常侍􅀽瑜薦㑹稽郭道事繼母至孝家貧産子憂不能字謂其妻曰傷慈以終孝吾無恨也遂瘞之又曰師覺援字覺授南陽温陽人也與外兄宗少文並有素業以琴書自娱於路忽見一人持書一凾題曰至孝師君苫前俄而不見捨車奔歸聞家哭聲一呌而絕良乆乃􅂫又曰謝㬭字宣鏡㓜有殊行年數歳所生母郭氏乆嬰痼疾㬭晨昏温凊甞藥捧膳不闕一時勤容戚顔未甞暫改恐僕役營疾懈倦躬自執勞母爲病畏驚而微賤過甚一家尊卑感㬭至性皆納履而行屏氣而語如此十年餘又曰蔡曇智郷里號蔡曽子廬江何伯璵兄弟里號爲何杖而後起悛爲黄門郞稍遷右衛􅃙明帝山陵不獲已從朱雀街過感慟而卒齊書曰王文殊字令章吴興故鄣人父入魏文殊思慕泣血終身􅂼食不衣帛服麻緼而已不婚不交人物吴興太守謝瀹聘爲功曹不就立小屋於縣西端揖拱其中歳時伏臘月十五未甞不北望長悲如此三十餘年太守孔琇之表其行欝林詔牓門改所居爲孝行里琇音秀又音酉蕭子顯齊書曰劉瓛胡官切有至性祖母病疽經年瓛手持膏藥漬指爛母孔氏甚嚴明謂親戚曰阿稱便是今丗曽子稱瓛小名也又曰宗頥字文德南陽人也丗居南陽父在家病亡頤忽思戀涕泣因假還中路果得父凶問頥便徒跣號咷出陶後渚遇啇人附載西上水漿不入口數日常遇病與母隔壁忍病不言齧􅀍至碎恐母哀已吏部􅁃果之嘗徃􅀱之設食枯魚莱􅉁􅁃云我不能食此母聞之自出常膳魚羮數種果之曰卿過於茅季偉我非郭林宗又曰傅琰字季珪北地靈州人也美姿儀除尚書左侍郎遷尚書左丞遂遭母喪居南岸鄰家失火延燒琰屋抱柩不動鄰人競求赴救乃得俱全琰肱髀之間已􅀍煙熖服闋除江夏王録事梁書曰沈崇傃字思整吴國武康人也父懷明宋兖州刺史崇傃六歳丁父憂􅂘踊過禮及長事所生母至孝家貧常傭書以養天􅁥二年太守柳惲辟爲主簿崇傃之從惲到郡還迎其母未至而母卒崇傃以不及侍疾將欲致死水漿不入口晝夜號􅂘旬日殆將絶氣兄弟謂曰殯葬未申遽自毀滅非全孝道也崇傃心悟乃稍進食母權瘞去家數里哀至輙之瘞所不避雨雪就墳哀慟飛鳥翔集夜常有猛獸來望之有聲􅃺如歎息者家貧無以遷暦乃行乞經年始􅀗葬焉旣而廬于墓側自以􅀄行喪禮不備復以葬後更行服三年乆進麦屑不噉鹽酢坐卧於單薦因虚腫不能起郡縣舉至孝梁武帝聞即遣中書舎人慰勉之乃詔令釋服推􅀘太子洗馬旌其門閭崇傃奉詔釋服而涕泣如居喪固辭不受官乃除永寧令自以禄不及養哀思不自堪未至縣卒又曰荀匠字文師潁隂人晉太保朂九丗孫也祖瓊年十五復父仇於成都市以孝聞宋元嘉末渡淮赴武陵王義爲元凶追殺贈貟外散騎侍郞父法超仕齊爲安復令卒官匠號慟氣絶身體皆冷至夜乃蘇旣而奔喪梁天􅁥元年其兄斐爲欝林太守征俚賊爲流矢所中死於陣喪還匠迎于豫章望舟投水傍人赴救僅而得全及至家貧不時葬居父憂并兄服歷四年不出廬户櫛括髮不復櫛沐髮皆秃落􅂘無時聲盡則係之以泣目眥皆爛形體枯悴皮骨裁連雖家人不復識郡縣以言武帝詔遣中書舎人爲其除服推爲豫章王國左常侍匠雖即官而毀悴逾甚外祖孫謙誡之曰主上以孝臨天下汝過古人故推汝爲此職非爲君父之命難拒故亦楊名後丗所顯豈獨汝身匠乃拜竟以毀卒太平御覽卷第四百一十二
