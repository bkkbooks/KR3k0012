body:
  text: 時序部十四元日書曰正月上日受終于文祖上日朔日也終謂堯終帝位之事文祖者堯文德之祖廟又曰正月元日受格于文祖月正正月元日上日也舜服堯喪三年畢將即政故復至文祖廟告又曰正月朔旦受命于神宗受舜終事之命神宗文祖之宗廟言神尊之也率百官􅀂帝之􅀄順舜􅀄攝帝位故事奉行之漢書曰正月朔歳首立春四時之首又曰哀帝時鮑宣以正旦日蝕地震宣上書曰陛下父事天母事地子養庶人今父􅃜明母震動子詠言三朝始小民正月朔日俗忌器破尚惡之况日之􅃜缺乎三朝日月歳也東觀漢記曰戴慿字次仲爲侍中正旦朝賀百僚畢㑹帝令群臣能􅀃經史更相難詰義有不通輙奪其席以益通者慿遂重坐五十餘席後漢書陳翔拜侍御史時正旦朝賀大將軍梁兾威儀不整翔奏兾恃貴不敬請收治罪時人竒之續漢書曰永平四年詔曰比來水旱飢饉加有軍旅正旦無陳朝賀之儀又曰歳正日爲大射朝受賀其儀夜漏未盡七刻鍾鳴受賀及䞇公侯璧中二千石羔千六百石鴈四百石巳下雉百官賀正曰二千石巳上上殿稱萬歳舉觴御食司空奉羮大司農奉飯奏食舉之樂百官奏畢宴飲作樂魏書曰建安中劉邵爲計吏詣許太史言正旦當日蝕邵時在荀彧所坐者數十人或云當廢或云冝却㑹邵曰梓愼禆竈古之良史猶占水火錯失天時然則聖人垂制不爲變豫廢朝禮者或災消異伏或推術謬誤也彧善其言勑朝㑹如故日亦不食臧榮緒晉書曰熊逺議曰履端元日正始之􅀄有識之士於是觀禮樂榮耳目之觀崇玩弄之好又曰晉元㑹設白獸樽於殿上樽盖上施白獸􅀂有能獻直言者則發此樽飲酒案禮白獸樽乃杜舉之遺式也爲白獸盖後代所爲示不忌憚也晉載記曰南燕慕容超末年正㑹群臣於正殿方奏樂超歎曲終不巳其年爲宋髙祖所擒沈約宋書曰舊時歳朔常設葦茭桃梗磔於宮及百寺之門以穰惡氣又曰孝武帝大明五年正月旦雪江夏至義恭以衣承雪作六出花進以爲瑞帝大恱又曰元嘉三十年正月旦上朝萬國平旦東南有青黒雲氣非常廣數丈過北覆暎宮上北齊書神武旣平并州尓朱兆北保秀容神武􅀭聲討兆旣出而止者數四兆意怠神武揣其歳首當宴㑹遣竇㤗以精􅀐襲之一日一夜行三百里神武繼至兆軍人因宴饗休息驚走遂破之兆自殺又曰張華原爲兖州刺史獄有繫囚時謂之曰三元之始念卿幽閉今給假五日足得展謁親親期盡當還也囚果應期而至梁書曰天􅁥四十年正月朔旦帝臨軒冠太子於太極殿舊制太子著逺遊冠金蟬翠緌纓至是別加昭明太子冠金􅀶山冠以太子美姿容善舉止故也唐書曰貞元六年正月戊戍朔先是有司奏元日太陽虧遂罷朝㑹至時不食百僚稱賀又曰天后朝王方慶議告朔儀曰今毎歳首元日通天宫受朝讀時令布政事京官九品以上諸州朝集使等咸列於庭此聽朔之禮畢又曰新羅俗以元日拜日月神易通卦驗曰正月五更人整衣冠於家庭中爆竹帖􅀞雞子或鏤五色土於户上厭不祥也尚書大傳曰正月上日受終于文祖在琁璣玉衡以齊七政琁璣者何也傳曰琁者還也機者幾也微也其變微微而所動者大謂之琔璣是故琁璣謂之北極受謂舜也上日元日又曰夏以孟春爲正殷以季冬爲正周以仲冬爲正夏以平旦爲朔殷以雞鳴爲朔周以夜半爲朔不以二三月後爲正者萬物不齊莫適所立故必以三微月之三正之相承􅀂連環也又曰周以至動殷以萌夏以牙謂三王之正也至動冬至日物動也物有三變故正色有三天有三生三死異時生者怕異時死是故周以日至爲正殷以日至三十日爲正夏以日至六十日爲正天有三統土有三正統木也統者所以序生也三正者所以統天也是故三統三正也􅀂循連環周則又始窮則反夲也夏以孟春爲正者貴形也春秋感精符曰人統月建寅物生之端謂之人統夏以爲正漢書云於律太蔟爲人統也白虎通曰正朔三何夫天有三微之月也三微者何言陽氣始施黄泉而未上也十一月陽氣始養黄泉之下万物皆赫赫然感陽之氣也故周爲天正色尚赤十二月之時萬物時牙而白故殷爲地正色尚白正月之時萬物始逹孚甲而出皆黒人得加力故夏爲人正色尚黒也後之人不以二三月爲正者以其萬物不齊莫有所立故必以三微月也漢官儀曰正月旦天子御德陽殿臨軒公卿大夫百官各陪位朝賀蠻貊胡羗朝貢必見属郡計吏皆陛覲又曰元日朝賀三公拜璧殿上獻壽觴又曰正月朔賀三公奉璧上殿嚮御西北太常賛曰皇帝爲王公興三公伏皇帝坐乃前進璧古語曰御坐則起此之謂也魏略曰正始元年南風大起數十日發屋折樹動太極殿東閣正旦大㑹又甚傾杯案曽休將誅之徴也典略曰魏明帝使􅀶士馬均作司南車水轉百戯正月朝造巨獸魚龍蔓延弄馬倒􅀐備如漢西京故事晉起居注曰太始元年詔曰朕遭憫凶奉承洪業追慕罔極正日雖當受朝其􅇊樂一切勿有所設又殿前反宇及武帳織成帷之屬皆不湏施又曰太始四年正月上臨軒朝群臣於太極殿前詔安平王載輿車昇殿上迎拜於阼階王坐上親奉觴上壽皆如家人之禮王拜上皆跪而止之又曰永和元年正月辛未朔􅀨不㑹甲戍皇太后登太極前殿施紗幃鄣與上臨嚮群臣又曰咸康四年尚書倉部奏下􅀭州調胡米一􅂛至五年正旦進御詔停又曰十二月丙子正旦㑹百僚増賜緑醽酒人二外又曰咸康七年十二月尚書樂謨奏八年正㑹儀注唯作鼓鍾其餘􅇊樂盡不作詔曰􅀂元日大嚮萬國朝宗庭廢鍾鼓之奏朕聞起居之節朝無磬折之音賔無蹈履之度其於事儀不亦闕乎卿諸人當准量輕重以制事中則情典並隨國無滯儀矣又曰永和中廷尉王處之與􅀭州刺史殷浩書曰太史上元日合朔談者或有疑應却㑹與否昔建元元年亦元日合朔􅁃車􅀐冩劉孔才所論爲不得禮苟令從之是勝人之一失何者禮云諸侯旅見天子入門不得終禮而廢者四太廟大饗曰蝕后之喪􅀨沾服失容㝷此四事之指自謂諸侯雖巳入門而卒􅁀有之則不得終禮非爲先存其事而僥倖史官推術錯謬故不豫廢朝禮也夫三辰有災莫大日蝕史官告譴而無懼容不修豫防之禮而廢消救之術方大饗華夷君臣相慶豈復是將䖍天災罪已之謂且檢之事實合朔之儀至尊静躬殿堂不聽政事冕服御坐門闥之制與元㑹禮異自不得兼行當權其事冝合朔之禮不輕於元㑹元㑹有可却之禮唯合朔無可廢之義謂應依建元故事却元㑹浩從之竟却㑹又曰咸和二年正月饗萬國有鷗鳥五集殿明年蘇峻反三齊略曰滎陽有免井漢沛公避項羽追逃於井中有􅀟鳩集其上人云沛公逃入井羽曰井中有人鳩不集其上遂下道沛公遂免難後漢世元日放鳩盖爲此也列子曰邯鄲之民以正月之旦獻鳩於簡子簡子大恱厚賞之客問其故簡子曰正旦放生示有恩也客曰民知君欲放之故竟而捕之死者衆矣君而欲生之不􅀂禁民勿捕捕而放之恩不過不相捕矣簡子曰善孔叢子曰邯鄲民以正月旦獻雀於趙王而綴以五綵王大恱申叔告子順子順曰王何以爲也對曰正旦放之求有生也子順曰此委巷之鄙事非先王之法且又不順夫雀者取其名則冝受之於上不冝取之於下一國之王受民雀將何恱焉淮南子曰以日冬至數至來歳正月朔日五十日者民食足不滿五十日日减一􅂛有餘日日益一斗四時纂要日此占最有據也世􅀃曰元帝正㑹引王丞相登御牀王公固辭中宗引之弥苦文獻曰文献王導謚太陽與萬物同輝臣下何以瞻仰乃止又曰陶公作荆州時勑舡官使鋸木屑不限多少悉藏之時咸不解此意後正㑹值積雪㑹日始晴㕔事前除雪地甚潤濕於是悉用木屑覆之都無所妨桂陽列仙傳曰成武丁正旦大㑹以酒沃庭中有司問其故對曰臨武縣失火以酒救之遣驗果然又曰永寧元年西南夷獻樂及幻人能吐火自支解易牛馬頭時元㑹作之於庭安帝與群臣觀木竒之唯陳禪獨離席曰帝王之庭不冝作夷狄􅇊荆楚歳時記曰元日庭前爆竹以辟山臊惡􅀑也山臊按神異經在西方深山中長尺餘犯人則病畏煨竹聲又俗爆竹燃草起於庭燎又曰元日至于月晦民並酺食之名又似之矣出錢爲醵出食爲酺竟分明擲摴名爲愽射蓺經爲擲慱又曰元日鏤懸葦炭桃捧户上却癘疫也又曰元日服桃湯桃者五行之精厭伏邪氣制百􅀑今人進屠􅂫酒膠牙餳盖其遺事也又曰正月一日三元之日也元始也雞鳴而起案周書緯通卦云雞陽鳥也以爲人􅀱四時人得以翹首結帶正衣常也注云案禮内則云子事父母婦事舅姑雞􅀄鳴咸盟潄櫛纚笄則惟其常非獨此日但元正之朝存亡慶弔官有朝賀私有􅀕享䖍恭冝早復位於餘辰所以標而異焉先於庭前爆竹帖􅀞雞或斵鏤五綵及土雞於户上莊周云有挂雞於户懸葦炭於其上樹桃其旁而􅀑畏之括地圖曰桃都山有大桃樹盤屈三千里上有金雞日照此則鳴下有二神一名鬱一名壘並執􅓗索以伺不祥之􅀑得則殺之又曰崔氏月令云過獵一日是謂小歳拜賀君親進椒酒從小起按成子安椒花銘曰肇惟歳首月正元日厥味惟新蠲除百疾是知小歳用之周處風土記曰元日造五辛盤正元日五熏鍊形注曰五辛所以發五藏氣莊子曰春月飲酒茹葱以通五藏又曰乃有雞子五熏練形正旦皆當生吞雞子一枚謂之練形又晨食五辛菜以􅂇發五藏氣又􅀇中記曰今人正朝作兩桃人立門旁以雄雞毛置索中盖遺勇也應劭風俗通曰有桃人葦炭􅀞虎鬱壘以此􅀑食虎今或􅀞虎於門此並其事猛獸之聲有如爆竹神異經云西方深山中有人焉其長尺餘性不畏人犯之令人寒熱名曰山臊以竹著火挂畢音必火扑也而山臊驚憚􅀇黄經云謂此􅀑是也俗人以爆竹起於庭燎不應濫於王者魏時人問議郎董勛云今正臈月門前作烟火桃人絞索松栢殺雞着門户逐疫禮也勛荅云禮十二月索室逐疫舋門户磔雞漢火行故作火助行氣桃􅀑所惡􅀞作人首可以有所收縳不死之祥勛又云正月一日爲雞二日爲狗三日爲羊四日爲猪五日爲牛六日爲馬七日爲人正旦􅀞雞於門七日帖人於帳當爲此日今一日不殺雞二日不殺狗三日不殺羊四日不殺猪五日不殺牛大日不殺馬七日不行刑亦此義但古乃磔雞令畏􅀑今則不殺未知孰是北間人於此日向辰至門前呼牛馬雜畜令來乃置粟豆於􅁅散之宅内云以招牛馬未知所出也於是長㓜悉正衣冠以次拜賀進椒酒飲桃湯及柏故以桃湯柏葉爲酒董勛云俗以歳首用椒酒椒性芬香人中爲藥㕨而飲之亦一時之禮故於此日採椒花以貢尊者晉海西令又問董勛曰俗人正日飲酒先飲小者何也勛云俗人小者得歳先酒賀之老者失歳故後與酒然則從小起義在於斯乎其敷子散出葛洪練化篇方用柏子人麻人細辛乾薑附子等分爲散井花水服之又方江夏劉次卿受彈􅀑九方武都雄黄丹沙二兩五物合禱洋五兩䗶和令謂如彈九正月旦令男左女右帶之又云敷子散出胡洽方於是下五辛菜膠牙糖各進一雞子梁有天下不食葷荆自此不復食雞子以從常則周處風土記云正旦當生吞雞子一枚謂之練形又啖五辛菜以助發五藏氣則行之乆矣膠牙者盖以使其牢固不動今北人亦如之熬麻子大豆兼糖散之案練化篇云正月旦吞雞子赤豆各七枚辟温氣又肘後方云且及七日吞麻子小豆各二七枚消疾疫張仲景方云歳有惡氣中人不幸便死取大豆二七枚雞子白麻井酒吞之然麻豆之設當起於此今則熬之未知所據也又以錢貫繫牀脚廻以投糞掃上云令如願一録異記云有啇人區明者過彭澤湖有車馬自稱青洪君要明過厚禮之問何所湏有人教之但乞如願及問以此言荅之青洪君甚惜如願不得以許之乃其婢也旣而送出自尓啇人或有所求如願並爲即得後至正旦如願起晚乃打如願如願走入糞中啇人以杖打糞掃喚如願竟不還也如此願遺事今北人正月十五日夜立於糞掃籩令人執杖打糞堆上云以治􅆎痛意者亦爲如願故事耳鄧德明南康記曰昔有盧躭仕州爲治中少學仙術身能􅁬飛毎夕輒凌虚歸家曉則還州嘗赴元㑹至曉不及預朝列化爲白鵠至閣前廻翔欲下威儀以箒擲之得一􅃗履躭乃驚還就列内外左右莫不駭異時歩隲爲廣州刺史意甚惡之便以狀聞遂至誅滅王子年拾遺記曰堯在位七年有鸞鳯而來集麒麟遊於藪澤鴟梟逃於絶漠有祇友之國献重明之鳥一名重精􅀟晴在目􅃺如雞鳴似鳯時解落毛羽以􅁏翮而飛能􅅮逐猛虎使妖惡不能爲害食以瓊膏或一歳數來或數歳不至國人莫不掃洒門户以望重精之集其來至之時國人或刻鑄金寳爲此鳥之􅃺置於户牖之間則魑魅􅀑􅀋自然退伏今人毎歳元日刻􅀞爲雞於户牖之上者蓋重精之遺像也西京雜記曰漢置宗廟飲酎用九十大牢皇帝侍祠以正月旦作酒八月成名曰酎一曰醖鄴中記曰石虎正㑹虎於正殿南面臨軒施流蘇帳皆竊擬禮制整法服冠通天珮王璽􅀇衣纁裳􅀞日月火龍黼黻華虫粉米㝷改車服著逺遊冠前安金􅀶山蟬翼丹紗裏服太學行禮公執珪卿執羔大夫執鴈士執雉一如舊禮充庭車馬金銀王賂革輅數千董勛荅問曰歳首祝椒酒而飲之以椒性芬香又堪爲藥又折松枝男七女二七亦同此義又雜修養書曰正月一日取五木煑作湯以浴令人至老􅂡髮黒案道家謂青木香爲五木香亦云五木道家多以此浴是其義也雜五行書曰常以正月旦及正月半以麻子赤豆二七顆置井中辟温病甚効萬歳暦曰漢成帝詔除正旦殺雞與雀可謂仁於用心謂非正旦則禁殺崔寔四人月令曰元日進椒柏酒椒是王衡星精服之令人身輕能音柰老柏是仙藥又云進酒次第當從小起以年少者爲先又曰正月之朔是謂正月躬率妻孥絜祀祖祢及祀日進酒降神畢乃室家尊卑無大無小以次列于先祖之前子婦曽孫各上椒酒於家長稱觴舉壽欣欣如也玉燭寳典曰正月爲端春秋傳曰履端於始也其一日爲元日元者善之長也先王躰元以居正又元者元也始也一也首也亦云上曰亦云正朝亦云三元歳之元時之元日之元亦云三朔尚書大傳曰夏以平明爲朔殷以雞鳴爲朔周以夜半爲朔又曰元日造桃板着户謂之仙木像鬱壘山桃樹百􅀑畏之王羲之月儀書曰日往月來元正首祚大簇告辰微陽始布罄無不冝和神養素李膺家録曰膺坐黨事與杜宻荀翊同繫新汲縣獄時歳日翊引杯曰正朝從小起膺謂翊云死者人情所惡今子無􅈔色者何翊曰求仁得仁又誰恨也膺乃歎曰漢其亡矣漢其亡矣善人天地之紀而多害之何以存國裴􅀇新言曰正旦縣官殺羊懸其頭於門又磔雞以覆之俗􅀃厭癘氣今以問河南伏君伏君曰是日也土氣上昇草木萌動羊囓百草雞啄五漀故殺之助生氣古史考曰元日太史乃占氣象以知水旱吉㓙隨分野書之王渾集曰詔問明正旦㑹四方計吏入見臨朝當何所冝渾奏舊正㑹前計吏軒下侍中讀詔書計吏詭奏臣以詔常文相承陛下留心訪問之意可令中書􅁪詔問方土所有士人賢才隠伏未達風俗好尚禮教之冝勸農務本以盡懇殖之利刑獄清理無枉濫之失郡守長吏勤心治政爲民興利除害訓化之續授以􅁓筆盡意陳聞以明聖旨垂心四逺劉臻妻正旦獻椒花頌曰昊穹周廽三朝肇建青陽散暉澄景載煥美此靈莖爰採爰獻聖容暎之永壽於萬後漢張衡東京賦曰於是孟春元日羣后旁戾百寮師師于斯胥洎孟春元日正旦也旁四方也戻至也蕃國奉聘要荒來質音致時惟帝臣獻琛執贄當覲于殿下者盖數萬以計尓乃九賔重謂朝公至侯卿二千石以上六百石以下及郎吏匈奴侍子凢九等臚人列鴻臚所主羗胡之人皆雞列也崇牙張鏞鼓設郎將司階席㦸交煞虎賁中郎將主夾階而立虎賁或軌㦸殺相對立也晉傳􅀇元日朝㑹賦曰前三朝之夜中夜燎晃以舒光華燈􅀂乎火樹熾百枝之煌煌六鍾隠其駭􅁬鼓吹作乎雲中晉􅁃闡楊都賦曰歳惟元辰隂陽代紀履端歸餘三朝告始皇帝廼坐露寢御組帷冠去聲華冕戴翠㽔襲日月珮王緌懷六璽紉文􅀛魏曹植正㑹詩曰􅀄歳元祚􅁻日惟良乃爲嘉㑹讌此髙堂尊卑列叙典而有章衣裳鮮㓗黼黻􅀇黄清酤盈爵中坐騰光珎膳雜遝充溢圎方笙磬旣設筝瑟俱張悲歌厲響咀爵清啇俯視文軒仰瞻華梁願保兹善千載爲常歡􅀏盡娱樂哉未央家室榮貴壽􅀂東王太平御覽卷第二十九
