front:
  text: 太平御覽卷第二十五
  hash: sha256:81dcee9ee0f589feec7ef115b5e19356c326e111df2fbb78e60d26a9a6e6ef73
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_025-1a}
body:
  text: 時序部十秋下立秋秋分秋下蔡邕月令章句曰仲秋白露節盲風至􅁗人謂蓼風爲盲風崔寔政論曰秋風厲而賞武臣顔氏家訓曰或問何故名治獄參軍爲長流乎荅曰帝王代紀云帝少昊崩其神降于長流之山事出山海經於祀主秋按周禮秋官司冦主刑罰長流之職也漢魏捕賊椽耳晉宋巳來始爲參軍上屬司冦故取秋帝所居爲嘉名焉夏小正曰八月丹鳥羞白鳥羞進也白鳥蚊蚋辰則伏辰房星鴽爲䑕也九月内火漢舊儀曰八月飲酎車駕夕牲以繡衣之皇帝暮視牲以隂燧取水於月以陽燧取火於日爲明水火左􅃝以水沃牛右肩手執鸞刀以切牛毛血薦之而即更衣李彫四部曰弔鳥山俗傳曰鳯死其上毎至七月九日晦望群鳥常來集其上鳴呼也應劭風俗通曰周秦常以八月輶軒使采異俗方言藏之祕府劉歆鍾律書曰春宮秋律百卉必凋秋宫春律萬物必榮魏丁儀刑禮論曰上天垂象聖人則之歳先春而後秋宫之爲理先禮而後刑論衡曰秋氣繫殺􅂖草不任凋傷而死此言失實夫物以春生夏榮秋而熟老適自枯死隂氣適盛與之㑹遇何以驗之物有秋不死者生性未極也陸機要覽曰秋樹名成秋􅀨名愁地鏡經曰八月中草木獨有葉枝下垂者必有美玉又云八月後草木死者亦有玉梁元帝纂要曰秋曰白藏氣白而収藏万物亦曰收成万物成而收歛亦曰三秋九秋素秋素啇髙啇天曰旻天旻􅉖也􅉖万物之彫零風曰啇風素風淒風髙風涼風激風悲風景曰㓪景澄景清景時曰凄辰霜辰霜辰可施九月節曰素節啇節草曰衰草木曰踈木衰林霜柯霜條七月孟秋亦曰􅀄秋首秋上秋肇秋蘭秋八月仲秋亦曰仲啇九月季秋亦曰暮秋末暮啇季啇抄秋亦曰授衣此時婦功畢始授衣亦曰􅀇月盧公範饋餉儀曰凢八月旦上承露盤赤松子栢上露爲囊以膏靣皮古人用􅀧炙枝以梨枝爲之反銀盞中有朱砂銀枝子也盧公範者盧懷慎之家臨海異物志曰黄雀常以八月入海化爲魚􅀶物志曰舊􅀃天河與海通近丗有人居海渚者年年至八月浮查來至甚大往返不失期其人乃至查上賫粮食乗查而去至天河世􅀃曰張季鷹辟齊王東曹􅁺在洛見秋風起因思吴中蓴菜羮鱸魚鱠曰人生貴適志耳何能從宦數千里以要名爵遂命駕便歸俄而齊王敗人皆謂見機而作又曰王子敬云從山隂道士行山川自相映發使人應接不暇􅀂值秋冬之時尤難爲懷隂陽五行暦曰一時皆三月一月爲一秋三月爲三秋又以十月爲一秋故三月有九秋之名也明堂之制曰秋治以矩矩之爲度也肅而不勃剛而不匱取而無怨内而無害威厲而不懾令行而不廢殺伐旣得仇敵乃克矩正不失百誅乃服乙巳占曰太白主秋人君當秋之時順太白以施政則􅁻逆則凶秋時行冬令則辰星之氣干於大白色黒而有芒角隂氣大勝戎兵乃來風災數起國多盗賊邊境不寧亡地震坼而國有大喪重獄秋時行春令則歳星之氣干於太白色青昧小則國旱君有大憂陽氣陵遲五􅂖不實秋雨不降草木生榮非時矣以秋時行夏令則熒惑之氣干於大白色赤而怒國多火寒熱不節人多瘧疾蟄虫不藏矣大衍星分圖曰八月酉日月㑹于壽星天文録曰胃􅄧趙之分野自胃七度止畢十二度於辰在酉大梁之疆也八月之時白露始降萬物堅成而疆大故曰大梁漢李陵與蘇武書曰窮秋九月塞外草衰夜不能寐側耳逺聽胡笳牙動牧馬悲鳴吟嘯成群邊聲四起晨坐聽之不覺流淚楚詞曰嫋嫋􅀆秋風洞庭􅀆木葉下言秋風疾則草木摇湖水波而樹葉落矣又曰悲哉秋之爲氣也蕭瑟􅀆草木揺落而變衰憀慄􅀆􅀂在逺行登山臨水􅀆送將歸泬寥􅀆天髙而氣清寂寥􅀆收潦而水清􅉃悽増欷􅀆薄寒之中人愴恍曠浪􅀆去故而就新坎􅇄􅀆貧士失職而志不平廓落􅀆羈旅而無友生惆悵􅀆而私自憐䴏鶣鶣其辭歸蟬寂寞而無聲鴈嗈嗈而南遊鵾雞啁哳上張流下陟轄切鳥鳴聲也而悲鳴獨申旦而不寐哀蟋蟀之霄征又曰皇天平分四時􅀆竊獨悲此凛秋白露旣下降百草􅀆􅍕離􅀍梧楸去白日之昭昭􅀆襲長夜之悠悠魏曹植秋思賦曰四節更王􅀆秋氣悲遥思惝恍􅀆􅀂有遺雲髙氣静露凝衣野草變色莖葉稀鳴蜩抱木鴈南飛西風悽悷郎計切朝夕臻扇􅝍屏弃絺􅗽􅂢晉潘岳秋興賦曰嗟秋月之可哀良無愁而不盡野有歸鷰隰有翔隼遊氣朝興槁葉夕殞於時乃屏輕􅝍釋纎絺藉莞蒻御裌衣庭樹槭所責切殞落㒵以洒落勁風戾而吹帷蟬嘒嘒以寒吟鴈噰噰而南飛天晃朗而弥髙日游腸而􅪶微何微陽之短晷覺涼夜之方永月曈朧以􅍭光露凄清以凝冷熠燿熠燿螢也粲於階闥蟋蟀鳴于軒屏聽離鴻之晨吟望流火之餘景王諐期懷秋賦曰哀時來之慘悽悼秋氣之可悲古樂府􅁔詩曰秋風蕭蕭愁殺人出亦愁入亦愁胡地多颷風樹木何蕭蕭離家日􅃐逺衣帶日趣緩心思不能言膓中車輪轉魏應璩雜詩曰秋日苦促短遥夜邈綿綿貧士感此時慷􅁣不能眠晉陸機爲顧彦先作詩曰肅肅素秋節湛湛濃露凝太陽夙夜降少隂忽巳􅂛又悼亡詩曰皦皦牎中月照我室南端清啇應秋至溽暑隨節闌懔懔涼氣􅂛始覺夏衾單晉張載詩曰靈象運天機日月如激電秋風兼夜式微霜凄舊院嘉木殞蘭圃芳草悴芝菀嚶嚶南翔鴈翩翩辭歸䴏玉肌隨爪素嘘氣應口見歛􅁭思輕衣出入忘華扇覩物識時移頋巳知節變晉孫綽詩曰蕭瑟仲秋月飂戾風雲髙山居感時變逺詠興長謡踈林積涼氣虚岫結凝霄零露灑庭林宻葉辭榮條撫茵悲先落攀松羡後凋宋劉鑠詩曰旻天清旦髙秋氣發􅀄凉白露下微津明月流素光凝煙泛城闕凄風入軒房朱華先零落緑草就芸黄纎羅還笥篋輕紈改衣裳宋江逌詩曰祝融解炎轡蓐收起凉駕長林悲素秋茂草思朱夏鳴鴈薄雲嶺蟋蟀吟深榭寒蟬向夕號驚飈激中夜感物増人懷悽然無忻暇宋謝惠連懷秋詩曰平生懷苦心矧復值秋晏皎皎天月明弈弈河􅀫爛蕭瑟含風蟬嘹唳度雲鴈寒啇動清閨􅀌燈曖幽幔又曰擣衣詩曰衡紀無淹度晷運倐如催白露滋園菊秋風落庭槐肅肅莎雞羽烈烈寒螿啼夕隂結空幕霄月皓中閨美人式常服端􅅚相招携簮玉出北房鳴金歩南階􅉉髙砧響發楹長杵聲哀宋湯惠休白紵舞歌詩曰秋風嫋嫋入曲房羅帳含月思心傷蟋蟀夜鳴断人膓長夜思君心飛􅀭它人相思君相忘錦衾瑶席爲誰芳又古歌八變曰北風􅀄秋至吹我章華臺浮雲多暮色似從崦嵫來宋鮑昭荅湯惠休曰枯桑葉易零疲客心易驚今兹亦何早巳聞絡緯鳴回風滅且起卷蓬息復征愴愴簟上寒凄凄帳裏清物色延暮思霜露逼朝榮百物方蕭瑟長嘆從此生又和王護軍秋夕詩曰散澷秋雲逺蕭蕭霜月寒驚風西北起􅀌鴈夜往還金氣方勁殺降陽微且殫泉涸甘井竭節役芳草殘何瑾悲秋夜曰欣莫欣􅀆春日悲莫悲􅀆秋夜立秋易􅀃曰坤西南也主立秋京房易古曰立秋坤王主涼風用事易通卦驗曰立秋日凉風至白露下春秋考異郵曰立秋趣音促織鳴女功急趣之春秋元命苞曰瑶光星也散爲鷹立秋之日鷹鸇擊三禮義宗曰七月立秋秋之言揫音湫聚也縮之意隂氣出地始殺万物故以秋爲節名五經要義曰罄立秋之樂也白虎通曰罄者夷則之氣象万物之成月令占􅃸圖曰立秋坤卦用事其神攝提二宫荆州分也晡時申西􅀯涼風至黄雲如群羊冝粟􅂖􅀂晴㓪風雲不至万物不成望西南坤上有黄雲氣是正氣立秋應節万物皆榮豆􅂖熟赤氣出其右万物半死豆􅂖半收地動人民不安坤氣萬物不成地頻動牛馬多病應在十二月坤氣見於河水江湖乍存乍亡坤氣退則地裂泉涌申時西南有赤黄氣或白潤厚白澤者粟大熟又曰立秋日午時竪八尺竿影得四尺五寸二分半五榖熟立秋後四十五日内主去氣在坤不得修造動土及逺行出軍事凶漢書曰孫寳爲京兆尹請侯文爲椽進見如賔禮數月以立秋日署文東部郵且曰今日鷹隼始擊當順天氣取姦惡以成嚴霜之誅椽部詎有其人乎文曰無其人不敢受職寳曰誰也文曰覇陵杜穉季寳問其次文曰豺狼撗道不冝復問狐狸後漢書曰申屠建等與御史大夫隗嚻合欲以立秋日貙膢時共刼更始前書音義曰貙獸以其立秋日祭獸王者亦此日出獵用􅀕宗廟兾州北八月朝作飲食爲膢其俗謂曰膢獵杜伏貙音􅐫于反􅖮音婁續漢書曰立秋之日夜漏未盡五刻京都百官皆衣白絁皁領縁中衣迎氣於西郊又曰立秋之日西郊畢始有司斬牲於部東門以薦陵廟其儀乗輿御戎輅白馬朱鬛躬執弩射牲牲以鹿麛大宰令謁者令一人獲馳駟送陵廟還宫遣使者賫束帛以賜武官􅀠兵習戰陣之儀斬牲之禮名曰貙劉如淳曰膢漢儀注立秋貙膢許愼曰俗以二月祭飲食兾州北部或以八月作飲食爲膢也祠令曰立秋祀白帝於西郊帝少昊配蓐收從祠又曰立秋後辰祀靈星於國城東南登眞隠訣曰立秋之日日中五岳諸眞人諸黄老君於黄房靈庭山㑹仙官於日中定天下神圖靈藥符瑞圖曰立秋西方閶闔風至一名颷風白虎通曰涼風立秋至王者報地德禮西郊周書時訓曰立秋之日涼風至又五日白露降又五日寒蟬鳴涼風不至國無嚴政白露不降民多欬病寒蟬不鳴人臣力争白露之日鴻鴈來又五日􅀇鳥歸又五日群鳥養羞鴻鴈不來逺人背叛􅀇鳥不歸室家離散群鳥不羞臣下驕慢秋分之日雷始收聲又五日蟄虫附户又五日水始涸雷不収諸侯􅁋汰蟄虫不附民靡有頼水不始涸介䖝爲害五行休王論曰立秋坤王兊相乾胎坎没艮死震困巽廢离休陸機要覽曰列子遇風常以立春歸乎八荒立秋遊乎風穴是風至草木皆生去則摇落謂之離合風秋分􅀃文曰龍春分而登天秋分而入淵易􅀃曰秋分閶闔風至雷始收聲鷙鳥擊􅀇鳥歸又曰兊西方也主秋分孝經􅀃曰斗指酉爲秋分又曰秋分日在内衡文子曰隂陽調日夜分故万物春分而生秋分而成生與成必得和之精故積隂不生積陽不化隂陽交接乃能成和此天地之氣和平故万物得以生成故也京房易􅀱曰虹八月出西方粟貴又京房易占曰秋分而人君釋鍾鼓之懸孔安國尚書注曰虚玄武之中星皆以秋分日見以正三秋天文録曰仲秋秋分暮出角亢氏房東四舎爲漢中周書時訓曰秋分八月中雷乃收聲不收聲即人民不安又云諸侯驕逸放蕩於上蟄虫坯户不坯户即邊方不寧又云人靡有頼水始涸水不涸即人多痼疾暦日䟽曰秋分八月之中氣也秋分之時日出於夘入於酉分天之中隂陽氣等晝五十刻夜五十刻一晝一夜二氣中分故謂之秋分也太平御覽卷第二十五
