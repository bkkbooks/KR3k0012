front:
  text: 太平御覽卷第一百六十二
  hash: sha256:2f4b9a44c8bc4f5f224c0004e3d0efc3f0ab389df15f3e83aae9612e5dbba0b8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_162-1a}
body:
  text: 州郡部八河北道中魏􅀶莫深昜幽順歸順􅃰薊燕檀嬀平營德棣滄貝魏州元和郡縣圖志曰魏州魏郡禹貢兖冀二州之域在夏即觀扈之國春秋時爲晉地戰國時爲衛魏二國之地秦滅魏置東郡滅趙置邯鄲郡漢以秦邯鄲之南部東郡之邊縣置魏郡後漢封曹操爲魏王治鄴史記曰邯鄲亦漳河之間一都㑹也北通燕􅃰南有鄭衛俗與趙相􅀋然近梁魯重義而務節漢書曰邯鄲土廣俗新大率精急髙氣􅀔輕爲姦漢􅀄分邯鄲之南部置魏郡漢志曰魏郡王莽曰魏成領鄴館陶等十八縣又曰元城屬魏郡魏武侯公子元食邑於此因而氏焉後漢書曰曹操爲魏公操分魏郡爲東西部置都尉元和郡縣志曰元城縣有沙麓山即春秋經所書沙麓崩後爲漢元后興之象也愽州元和郡縣志曰愽州􅀶平郡禹貢兖州之域春秋時齊之西界聊攝地也戰國時爲齊地秦漢爲東郡地左傳齊晏子對景公曰聊攝以東其爲人也多矣史記曰齊田單攻聊城歳餘士卒多死而聊不下魯仲連爲書約之矢以遺城中燕將得魯連書泣三日猶與不能决乃自殺史記曰齊威王伐晉至愽陵徐廣注曰東郡之􅀶平也莫州十道志曰莫州大安郡其地歷代所屬與瀛州同唐景雲二年分瀛州置漢志曰鄚縣屬􅃰郡王莽曰言符郡國志曰鄚縣有昜京城後漢末公孫瓉築京以自固圍壍十重以䥫爲門諸將家家作樓以千計並髙五六丈爲􅀽紹所攻城樓皆䧟没圖經曰清苑縣本漢樂郷縣也漢志曰樂郷屬信都王莽曰樂丘史記曰漢髙祖過趙問樂毅有後乎對曰有樂臣叔遂封樂叔於此後漢書曰獻帝􅀄公孫瓉據幽州先是有童謡曰燕南垂趙北際中間不合大如礪唯有此中可避丗瓉以易地當之乃築京以自固也深州元和郡縣圖曰深州饒陽郡禹貢冀州之域七國時爲趙地秦爲鉅鹿郡地漢爲饒陽縣隋置深州以州西故深城爲名也漢志曰饒陽屬􅃰郡在饒河之陽故名之又曰安平屬􅃰郡王莽曰廣望亭漢書髙帝六年封鄂千秋爲安平侯後漢書曰王郎起光武自薊東南馳晨夜草舎舎上􅀫也至饒陽無蔞力朱切亭時天寒烈衆皆飢疲馮異上豆粥明旦光武謂諸將曰昨作公孫豆粥飢寒俱解公孫異字易州十道志曰易州上谷郡禹貢冀州之域虞舜分冀州立并州則爲并州之地春秋時燕趙之分􅁗併天下爲上谷郡地漢置􅃰郡今州即􅃰郡之故安地也又曰易縣本漢故安縣也漢志曰故安屬􅃰郡漢書曰文帝封申屠嘉爲故安侯九州記曰易縣西南三十里有送荆陘即荆軻入秦之路也河北記曰易縣前有五公城王潭不從王莽潭子興生五子避隱於此丗祖並封爲侯十道志曰淶水縣本漢遒縣也漢志曰道屬􅃰郡莽曰遒屏漢書年表曰景帝封匈奴降王隱強爲遒侯又曰容城屬􅃰郡莽曰深澤十道志曰遂城戰國時武遂縣漢之北新城史記曰趙悼襄王二年李牧將攻燕拔武遂漢志曰北新城屬中山國莽曰朔平土地十三州志曰河間有新城故此加北幽州十道志曰幽州范陽郡禹貢冀州之域虞舜十二州爲幽州夏殷省併冀周復置幽州秦爲漁陽上谷等五郡漢髙分上谷置􅃰郡武帝開東夷又置玄莬樂浪二郡釋名曰幽州北幽昧之地故曰幽州晉地道記曰幽州因幽都以爲名山海經曰北荒有幽都之山爾雅曰北方之美者幽都之䈥角焉晉地道記曰舜以冀州南北廣大分燕北地爲幽州漢志曰漁惕郡屬幽州莽曰通路史記曰顓頊都於帝丘其地北至幽陵又曰周武王之滅紂封召公於北燕世本曰居北燕宋忠曰有南燕故曰北郡國志曰箕星散爲幽州分爲燕國其氣躁急通齊趙渤海之間一都㑹也史記曰燕秦千樹栗與封侯等士馬所生有魚鹽桑􅀥之利後漢書曰公孫瓉破劉虞盡有幽州之地三國典略曰東魏薛琡甞夢山上掛􅁝以告所善張亮曰山上􅁝幽字也君必爲幽州後果如之禮記曰武王克商封黄帝之後於薊史記曰鄒子之燕昭王擁篲前驅請爲弟子受業築碣石宫以處鄒子親徃師之又曰昭王謂郭隗曰願得賢士以身事之隗曰王必欲致士先從隗始况賢於隗者豈逺千里哉於是昭王爲隗改築宮而師事之樂毅自魏徃鄒衍自齊徃劇辛自趙徃士争歸燕漢志曰安次縣屬渤海郡又續漢志曰安次屬漁陽郡圖經曰武清縣本漢之雍奴縣也酈元注水經曰雍奴藪澤之名四面有水曰雍不流曰奴魏志曰張郃傳曰從擊譚於渤海別將圍雍奴大破之順州方輿志曰順州順義郡在范陽郡唐天寳􅀄置又改爲順義歸化二郡亦曰思順州歸順州方輿志曰歸順州其地乃燕之北境燕太子丹使荆軻獻地圖即謂此也即元順州之北境唐天寳􅀄以置歸化順義二郡同領懷柔一縣復又立歸順州以理焉􅃰州圖經曰􅃰州􅃰郡古􅃰鹿之地舜十二州爲幽州地禹貢爲冀州之域春秋戰國爲燕國之􅃰邑漢髙帝置􅃰郡史記曰黄帝與􅃖尤戰於􅃰鹿之野漢志曰􅃰郡髙帝置莽曰垣輸屬幽州領縣二十九薊州圖經曰薊州漁陽郡禹貢冀州之域春秋及戰國時屬燕秦時於此置漁陽郡二漢因之又曰漁陽縣本北無終子國也有無終山城春秋左氏傳曰莊十三年齊人伐山戎杜預注曰山戎北狄無終三名其實一也漢志曰無終屬右北平故無終子國也燕州釋名曰燕宛也在􅃰鹿山南宛宛然因以名之春秋􅀃題辭曰箕尾爲燕隂氣侵生故俗云貪利地冝栗史記􅂫􅁗􅀃燕文侯曰燕東有朝鮮遼東北有林胡樓煩西有雲中九原南有呼沲易水地方二千里帶甲數十萬南有碣石鴈門之饒北有􅀥栗之利民不佃作而足於􅀥栗矣此所謂天府也又貨殖傳曰燕秦千樹栗以比封侯檀州十道志曰檀州宻雲郡禹貢冀州之域春秋戰國時並爲燕地秦爲漁陽郡在漢領白檀等十二縣又曰夲漢虒奚縣漁陽屬郡漢志曰虒奚屬漁陽郡莽曰敦德虒音題又曰燕東有漁陽郡漢書曰漢李廣弭節白檀魏書曰曹公越北塞歷白檀破烏丸於柳城續漢書曰白檀縣即右北平嬀州十道志曰嬀州嬀川郡禹貢冀州之域舜曁周爲幽州之域春秋戰國並屬燕國秦併天下爲上谷郡爲潘縣也漢志曰燕西有上谷郡又曰上谷郡秦置莽曰朔調属幽州領縣十五又曰潘縣屬上谷郡莽曰樹武潘曰普半反晉太康地里志曰潘縣更屬廣􅇞郡史記曰軒轅黄帝戰於阪泉之野十道志曰阪泉在懷戎縣周書曰黄帝殺􅃖尤於中冀名曰絶轡之野亦其地史記曰燕築長城自造陽至襄平造陽即嬀州之地名也平州十道志曰平州北平郡禹貢冀州之域舜十二州爲營州之境周爲幽州之地春秋時爲山戎􅀌竹白狄肥子二國地秦兼天下爲遼西郡肥如縣地漢志曰肥如屬遼西郡肥子奔燕燕封於此史記曰齊桓公北征山戎至􅀌竹至卑耳之溪見一人長八尺具衣冠右祛衣走馬前桓公問於管仲對曰山之神有俞兒霸王之君興則前導祛衣示前有水右祛衣從右方渉至卑耳之溪從左方渉其深至􅂰巳渉桓公拜曰仲父之聖至此魏志曰曹公北征烏丸田疇自盧龍道引軍出盧龍塞塹山堙谷五百餘里經白檀歷平岡登白狼望栁城道今在盧龍縣營州十道志曰營州栁城郡禹貢冀州之域其在十二州爲營州地周爲幽州春秋爲山戎之地戰國時屬燕秦漢爲遼西郡郡國志曰地當營室故曰營州漢志曰遼西郡秦置屬幽州領縣十四後漢書曰遼西郡即烏丸鮮卑蹋頓所居十六國春秋慕容皝傳曰栁城之北龍山之南所爲福德之地也可營制䂓模築龍城構宮室改栁城爲龍城縣遂都之改曰和龍宫後漢輿地記曰舜分齊營州之域燕西置營丘郡於其城内今栁城縣有營丘城德州元和郡縣志曰德州平原郡禹貢兖州之域春秋戰國時齊地秦兼天下爲齊郡地漢分齊郡置平原郡漢志曰平原郡髙帝置王莽曰河平領縣十九十道志曰蓨縣本漢條縣也景帝封周亞夫爲條侯後改爲蓨漢志曰脩縣屬信都莽曰脩治元和郡縣志曰安德縣有鬲津枯河禹貢九河之一漢志曰鬲縣屬平原王莽曰河平棣州元和郡縣志曰棣州樂安郡禹貢青州之域又曰兖州之域春秋時爲齊地秦併天下爲齊郡漢爲平原渤海千乗三郡地左氏傳曰錫我先君履東至于海西至于河南至于穆陵北至于無棣十道志曰厭次本漢冨平縣漢志曰冨平侯國屬平原郡王莽曰樂安亭後漢明帝改爲厭次漢書東方朔傳曰朔平原厭次人也十道志曰滴河縣本漢朸縣也朸音力漢志曰朸屬平原郡莽曰張郷十道志曰蒲臺本漢濕沃縣也漢志曰濕沃屬千乗郡莽曰近亭三齊記曰蒲臺髙十八尺始皇所頓處臺下縈蒲繫馬今蒲猶縈也滄州十道志曰滄州景城郡禹貢兖州之域虞舜及周爲幽州之域春秋時屬齊晉七國時屬齊趙􅁗併天下以齊地置齊郡以趙地置鉅鹿郡漢髙帝分鉅鹿置渤海郡分齊郡置平原郡漢志曰渤海郡髙帝置莽曰迎河在渤海之濵因以爲名圗經曰渤海實滄州之地屬趙分居多漢書曰趙分地薄人衆丈夫相遇游戲悲歌慷􅁣起則椎剽掘塚作姦巧多弄物爲倡優十三州志曰渤海風俗􅋧戾髙氣力輕姦兇十道志曰清池縣漢之浮陽縣也漢志曰浮陽屬渤海郡莽曰浮成十三州志曰浮陽浮水所出東入海漢書曰宣帝時渤海飢盗賊起龔遂單車入境平之後勸叛者賣劒買牛民皆知勸漢志曰平童縣靈帝改曰饒安屬渤海郡又曰樂陵縣屬平原郡莽曰美陽貝州元和郡縣志曰貝州清河郡禹貢兖州之域春秋時屬晉七國時屬趙􅁗兼天下以爲鉅鹿郡漢又分置清河郡十道志曰周武建德六年北齊於此置貝州以貝丘爲名左氏傳曰齊襄公田于貝丘漢志曰清河郡髙帝置王莽曰平河屬冀州領縣十四圖經曰清河縣秦爲厝縣厝音翅亦反漢爲信成縣漢志曰厝屬清河郡王莽曰厝治安帝以孝德皇帝葬于厝改曰甘陵十道志曰武城趙邑東武城也史記曰趙平原君勝封東武城元和郡縣志曰夏津縣夲漢鄃音戍縣也漢志曰鄃縣屬清河郡王莽曰善陸漢書曰髙后封吕他爲鄃侯太平御覽卷第一百六十二
