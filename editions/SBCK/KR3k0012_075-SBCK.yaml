front:
  text: 太平御覽卷第七十五
  hash: sha256:992d5bac907a301ade533071b119590e933190b3b6d7a18b2782518e23331432
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_075-1a}
body:
  text: 地部四十溝瀆渠甽澮汎灣浦溝釋名曰田間之水曰溝溝者構也從横相交構也爾雅曰谿注谷曰溝周禮曰匠人爲溝洫九夫爲井間廣四尺􅀷四尺謂之溝方十里爲城城間廣八尺􅀷八尺謂之洫風俗通又載也傳曰梁伯好土功乃溝公宫又曰魯將與齊戰師不踰溝樊遲曰請三刻而踰之衆從之如樊遲約乃踰溝又哀元年吴城邘溝通江淮杜預曰於邘江築城穿溝東北通謝陽湖西北至末口入淮通糧道也今廣陵邘江是國語曰吴王夫差旣殺申胥不稔於歳稔熟􅁛歳也乃起師北征開爲􅀷溝通於商魯之間開掘地商宋也北属之沂西属之濟以㑹晉定公于黃池論語曰禹盡力於溝洫史記曰漢王四年王軍廣武􅀜中兵益出當此時彭越將兵居梁地徃來弱楚兵絶其糧道齊王信又進擊楚項羽恐乃與漢王約中分天下割鴻溝而西者爲漢鴻溝而東者爲楚項羽歸漢王父母妻子軍皆呼萬歳羽􅄙而東漢王欲引而西用張良陳平計乃進兵追項羽􅀶物志曰徐偃王治其國仁義著聞欲周行上國乃通溝陳蔡之間得朱弓朱矢又曰酒泉延壽縣南有山石水出處如莒地爲溝酈善長水經注曰髙唐縣有甘􅀥溝水側多􅀥故俗取名溝焉殷氏世傳曰殷襃爲榮陽令先多􅁋􅀨百姓饑饉君乃穿渠入河四十餘里䟽導原隰用致豐年民頼其利號曰殷溝而頌之莊子曰㝷常之溝洫巨魚無所還其體而鯢鰌爲之制孟子曰思天下之民匹夫匹婦有不􅀍堯舜之澤􅀂巳推内之溝中楊子圗經曰六合縣東三十里從岱石湖入四里至溝中心與陵分界案後漢書張綱爲廣陵太守濟惠於百姓勸課農桑於東陵村東開此溝引湖水灌田以此號爲張綱溝阮勝之記曰吴王濞開茱茰溝通運至海陵倉北有茱茰村以村立名故史記云邘溝即吴王夫差所開漕運以通上國崔豹古今注曰羊溝者言羊喜牴觸垣牆故爲溝以隔之一曰植髙楊於其上故謂之楊溝古詩曰今日斗酒別明日溝水頭蹀􅞃御溝上溝水東西流瀆禮記月令曰季春之月道逹溝瀆開通道路爾雅曰溝注澮曰瀆水流不絶曰瀆漢舊儀曰􅀕四瀆用牲崔鴻十六國春秋前􅁗録曰建元十二年堅以􅀜中水旱不時議依鄭白故事發王侯以下及豪強冨民僮􅀠三萬人開涇水上源鑿山起堤通渠引瀆以漑田民頼其利伏滔北征記曰姑熟西北有甘寜墓孫皓時占者云墓有王氣皓鑿其後十許里曰直瀆越絶書曰銅沽瀆長一百五十歩去縣二十里渠史記河渠書曰禹以爲河所從來者髙難以行平地數敗乃釃二渠漢書音義曰釃分也以引其河載之髙地過降水至于大陸播爲九河也鄭國間􅀃􅁗令鑿涇自中山南西交瓠口爲渠漑斥鹵之地四萬餘頃收皆􅅿一鐘於是􅀜中爲沃野無凶年􅁗以爲冨強卒併諸侯因命曰鄭國渠漢書曰禹作二渠以引河武帝時穿渠水岸􅀂崩乃鑿井􅀷四十丈井下相通井渠自此始得龍骨名龍首渠起谷口入櫟陽注渭中因名渠民得其饒歌曰田於何所池陽谷口鄭國在前白公起後舉鍤爲雲决渠爲􅀨又曰張掖郡有千金渠范曄後漢書曰樊宻所起廬舎皆有􅀷堂髙閣陂渠灌注又池魚牧畜有求必給魏志曰遼西單于蹋頓尤強公將征之鑿渠自滹沲入􅂀水名平虜渠又從泃河口鑿入潞河名泉州渠以通海又曰建安十八年九月鑿渠引漳水入白溝以通河又曰賈逵爲䂊州刺史通運渠二百餘里所謂賈侯渠北史曰郭衍爲開漕渠大監部率水工鑿渠引渭水經大與城北東至于潼􅀜漕運四百餘里􅀜中頼之名曰冨人渠隋書薛胄爲兖州刺史先是兖州城東沂泗二水合而南流汎濫大澤中胄遂積石堰之使决令西注陂澤盡爲良田又通轉運利盡淮海百姓頼之號爲薛公豐兖渠唐書曰温造爲㓪州刺史在任開後郷渠九十七里漑田二千頃郡人獲利乃名爲右史造自起居舎人出郡水經注曰漢司空漁陽王梁之爲河南也將引􅂖水以漑京師渠成而水不流故以坐免後張純堰洛以通漕洛中公􅀻懷贍是以渠今引􅂖水盖純之創也又曰漢明帝之世司徒伏恭薦王景善能治水顯宗詔與謁者王吴始作浚儀渠吴用景法水乃不害此即景作所脩故瀆也渠流東注浚儀故復謂之浚儀渠也明帝十五年東廵狩至無塩帝嘉景功拜河隄謁者又曰魏武帝又堰漳水廽流東注世號天井堰二十里中作十二墱墱相去三百歩令互相灌注一原分爲十二流皆懸水門自城西東入逕銅爵臺下伏流入城東流謂之長明渠戴延之西流記曰洛陽城外四面有陽渠水周公所制池建春門外二橋最大一從一横續述征記曰案河渠書溝洫志引河爲洪溝一􅀃􅁗至魏鑿渠引河灌大梁名曰洪溝焉崔寔政論曰戰國海内十二分魏州有史起引漳水灌鄴民以興歌蜀郡李氷鑿離堆通二江益部至今頼之秦開鄭國漢作白渠而􅀜中號爲陸海郡國志􅌡州平舒縣古五渠水魏延興􅀄文安縣人孫願等捕魚此水先􅀕忽有群魚從西而來有一人謂願曰􅀂得大魚勿殺及下網魚果得大魚乃殺之腹中盡得其􅀕食群魚並飛遂不復得因名此處爲飛魚口鄴城故事曰西門豹爲令造十二渠决漳水以漑民田因是户口豐饒今渠一名安澤陂是也内黃圗經曰前漢倪寛遷内黃令吏民大信表開六輔渠以大漑灌民極獲利因曰倪公渠甽􅀃文曰甽水流也周禮曰倍洫曰甽稽康養生論曰或益之以甽澮澮􅀃文曰澮水流澮澮也廣二㝷􅀷二仞書曰予决九川岠四海濬畎澮爾雅曰谷注溝曰澮釋名曰澮㑹也小溝之所㑹也汎續述征記曰齊人謂湖爲汎汎中有九十九臺皆生結蒲因此蒲生自結風俗通曰汎莾也言其平望汎莽無崖際也灣酈善長注水經曰沅水又東歷臨沅縣西爲明月池白壁灣灣狀半月清潭鏡澈上則風􅄜空傳下則泉響不斷行者莫不擁檝嬉游徘徊愛翫江夏記曰敗舶灣在縣西北七里案吴志云孫權與群臣泛觴於大舩江中西上逢􅁖風權遣柂上張頡取􅚒洲谷利拔劒擬柂工急取樊口未及至口灣中􅂳破因名敗舶灣權至岸謂谷利曰何怯於水也谷利曰大王萬乗之主欲渉不測之淵一旦傾危社禝何􅀉因登陸路而歸㝷陽記曰蠡湖西灣夏秋水渺漲商徒縈紆牽舟循繞人力疲勞號爲西疲灣亦云西灣又有白溝灣亦在湖西汎漲驚波似雪汹涌溝澮因是名焉又有落星灣灣内有落星石周廻百歩許又有神林下有廟祈福而􅀗前進由是名焉又有女兒廟禱祈亦有靈應即不許所置永嘉郡記曰樂城縣三原亭去郡百二十里溪水清如鏡曩昔有得一死鮎者鬐大五六圍一輙得數十斛鮓此灣無所不容有大能食者常自譬腹如三原灣無所不容水經注曰渭水東南與神澗水合開山圖所謂靈泉池也俗名之爲萬石灣泉􅀷不測實爲靈異先後慢遊者多罹其斃鄱陽記曰清灣在縣東南七里隋開皇中太守梁文謙莅官清絜取此灣水以自供人思其徳號爲清灣浦􅀃文曰浦水濵也詩曰率彼淮浦省此徐土郡國志曰夏曰浦有龍魚昔禹南濟黃龍夾舟之處楚詞曰望涔陽之極浦述異記曰上虞縣有石駞歩水際謂之歩也􅀲歩在吴中吴人賣􅀲於江畔因以名也江中有魚歩􅀛歩湘中有靈妃歩按吴楚間謂浦爲歩盖語訛耳吴録曰冨陽浦漢末爲吴縣於津吴大帝時有浦通浙江至廬溪及桐溪故曰桐廬縣東有大溪注廬口渌波青巖昔晉徴士散􅀐侍郎戴勃遊此自言山水之極致也郡國志曰金陵西浦亦云項口即張碩捕魚遇杜蘭香處也江夏記曰南浦在縣南三里離騷曰送美人􅀆南浦其源岀京首山流入大江春冬涸竭秋夏泛漲商旅從來皆於浦停泊以其在郭之南故􅁛南浦續搜神記曰廬江筝笛浦浦中昔有大舶覆水内漁人宿旁聞筝笛之聲及香氣氤氲云是曹公載妓舡覆於此太平御覽卷第七十五
