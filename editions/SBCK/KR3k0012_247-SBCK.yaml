front:
  text: 太平御覽卷第二百四十七
  hash: sha256:0f661da55619e0e22d06d489ad010b2366cea7947eaf98482e444e16b05a90f6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_247-1a}
body:
  text: 職官部四十五太子率更令太子家令太子僕典膳丞侍讀門大夫左衛率右衛率前衛率後衛率左右内率府長史太子率更令六典曰率更令之職掌宗族次序禮樂刑罰及刻漏之政令凢皇太子釋奠於先聖先師講學齒胄皆揔其儀注而爲之導引􅀂皇太子備禮出入乗軺車位亞家令焉漢書曰顔師古注曰掌知漏刻曰率更續漢書百官志曰率更令秩千石與庶子舎人更直職似光禄勲掌宫殿門户之禁郎將屯衛之士晉起居注曰武帝太康八年詔曰太子率更僕東宫之逹官也其進品第五秩與中庶子左右衛率同職擬光禄勲也隋書曰明克讓轉率更令進爵爲侯太子以師道處之恩禮甚厚有四方珎味輙以賜之于時東宫盛徴天下才學之士至於􅀶物洽聞皆出其下唐書官品志曰率更令掌􅇊樂漏刻也物理論曰今有吕子義清賢士也爲太子率更令太子家令六典曰家令之職掌皇太子之飲膳食儲庫藏之政令揔食官典倉司藏三署之官屬皇太子備禮出入則乗軺車威儀先諸臣以導引􅀂􅀕祀賔客則供酒食以爲獻王漢書曰文帝以晁錯爲太子家令多所獻替稱爲智囊漢書曰踈受字公子爲太子家令恭謹敏而有辤宣帝置酒太子宫受奉觴上壽辝禮閑雅上甚􅂬愜續漢書百官志曰太子家令秩千石主倉榖物職如司農少府擬廷尉也蜀志曰譙周字尹南後主爲太子以周爲家令後主時頗出遊觀増廣聲樂周上諌曰昔王莽之敗豪桀並起跨州據郡欲併神器於是賢才智士思望所㱕未必以其􅀔之廣狹唯其德之薄厚也宋書曰太子家令主内茵蓐床机諸供中之物又知官奴婢月用錢内庫米塩車牛刑獄唐書官品志曰家令掌刑法食膳倉庫什物奴婢等事太子僕六典曰太子僕之職掌車輿乗􅀐儀仗之政令及䘮葬之禮物卞其次叙與其出入而供給之皇太子之車輅三一曰金輅二曰軺輅車三曰四望凢皇太子備禮而出則率廐牧令進輅僕親馭焉後漢書太子少傅屬官有太子僕一人秩千石主車馬職如太僕太子五日一朝非入朝日遣僕及中允朝朝入請問起居沈約宋書曰太子僕􅁗官也宋起居注曰元嘉中以散􅀐常侍荀伯子爲太子僕隋書曰柳粛迁太子僕太子廢坐除名爲民大業中帝與叚逹語及庶人罪惡之狀逹云柳粛在宫大見踈斥帝問其故荅曰學士劉臻甞進章仇太翼於宫中爲巫蠱事粛知而諌曰殿下帝之冢子位當儲二誡在不孝無患見疑劉臻書生皷揺脣舌適足以相誑誤願陛下勿納之庶人不懌他日謂臻曰汝何故漏洩使栁肅知之令面折我唐書官品志曰僕掌宗族親踈車輿􅀐乗也太子典膳丞六典曰典膳郎掌進膳甞食之事丞爲之貳每夕􅈰官於厨更直北齊書曰門下妨始別置典膳􅈰有監丞各二人唐書曰邢文偉滁州全椒人也迁太子典膳丞時孝敬在東宫罕與宫臣接見文偉輙減膳上書曰臣竊見禮戴記曰太子旣冠成人免於保傅之嚴則有司過之史徹膳之宰史之義不得不司過宰之義不得不徹膳今皇帝式稽前典妙簡英俊自庶子巳下至諮議舎人及學士侍讀等使翼佐殿下以成聖德近者以來未甚延納談議不狎謁見尚稀三朝之後但與内人獨居何由發揮聖智使睿哲文明者乎今史雖闕官宰當奉職忝備所司不敢逃死謹守禮經輙申減膳太子荅書曰頋以庸虚早尚墳典毎欲研精政術極意書林但徃在㓜年未閑將衛竭誠躭誦因即損心比日以來風虚更積中奉恩旨不許重勞加以趨侍含元温清朝夕承親無自專之道遵禮以色養爲先所以屢闕坐朝時乖學緒公潜申雅朂式薦忠䂓敬㝷來請良符􅀫志自非情思審諭義均弼諧豈能進此藥言形於簡墨撫躬三省感愧兼深文偉自此益知名太子侍讀唐書曰玄宗在東宫張說與國子司業禇無量俱爲侍讀深見親敬又曰元和十二年諌議大夫韋綬罷皇太子侍讀綬好諧戯兼通小說太子因侍上或以綬所能言之上謂宰臣曰侍讀者當以經術輔導太子使深知君臣父子之教令或聞綬之談論有異於是豈所以導太子者因命罷其職又曰吕元膺爲同州刺史及中謝上問時政得失元膺論奏辭氣激切上嘉之翌日謂宰臣曰吕元􅈾有讜言直氣冝留在左右使言得失卿等以爲何如李藩裴垍賀曰陛下納諌超冠百王乃宗社無疆之休臣等不能廣求端士又不能數進忠言孤􅀒聖心合當罪戾請留元􅈾給事左右㝷兼皇太子侍讀五代史後唐史曰倉部郎中何澤上䟽請置太子侍讀勑旨何澤早處班行深明典制固根夲而別彰憂國上封章而足表匡君其所敷陳實爲􅁢當特議施行太子門大夫六典曰宫門郎掌内外宫門管籥之事凢宫殿門夜漏盡擊漏皷門夜漏上水一刻擊漏皷􅐬毎歳終行儺應經所由門並先一刻早開􅀂皇太子不在則閉東宫正門其宫城使􅀫衛人應入宫殿者各於左右廂便門出入至皇太子還仗乃開續漢書百官志曰門大夫貟二人秩六百石職比郎將漢書曰文帝晁錯爲太子舎人轉太子門大夫晉書曰太子門大夫􅈰准公車令班同中書舎人主通逺近牋表宫門禁防唐書曰龍朔二年改門大夫爲宫門郎職比城門郎三輔決録曰桓帝以平陵魯寛爲太子門大夫太子左衛率六典曰左右衛率掌東宫兵仗羽衛之政令揔諸曹之事凡親勲翊府及廣濟等五府屬焉副率爲之貳凢元正冬至皇太子朝宫臣及諸方使則率衛府之屬以儀仗爲左右廂以衛之􅀂皇太子備禮出入則如鹵簿之法以從續漢書百官志曰衛率四百石主門衛晉志曰凢太子出前衛率導在前廣麾外左右二率從夾導輿車後衛率從在烏皮外並帶㦸執刀其服並視左右衛將軍晉書曰劉卞爲􅉖懐太子左率知賈后必害太子乃問張華華曰君欲如何卞曰東宫儁乂如林四率精兵万人公居阿衡之任􅀂得公命皇太子因朝使録尚書事廢賈后金墉兩黄門力耳華曰廢立大事又非所能賈后微聞迁卞爲雍州刺史卞恐終露乃服藥卒晉中興書曰禇翼字謀逺少失父以才藝堪幹立名粛祖即位徴拜屯􅀐校尉迁太子左衛率隋書曰宇文述毎與晉王謀事及晉王爲皇太子以述爲左衛率舊令率官第四品上以述素貴遂進率品爲第三其見重如此唐書官品志曰左右衛率各一人位視御史中丞各有丞左率領果毅統逺立忠建寜凌鋒夷冠祚德等七營右率領崇榮永􅁻崇和細射等四營二率各置尉山公啓事曰太子左率鈌侍威重冝得其才無疾患者城陽太守石崇忠讜有文武河東太守焦勝清貞有信義皆其選也右衛率晉中興書曰郄恢字道弲爲太子右衛率恢八尺美􅂡髯風神魁梧烈宗異之又曰吴隱字處黙太元中以國子愽士爲太子右衛率沈約宋書曰元嘉中以王琳謝弘徴並爲太子右衛率隋書曰髙祖以太子勇知時政欲重宫官之資故以大臣領其職蘇孝慈自兵部尚書拜右衛率尚書如故上􅀅廢太子憚其在東宫乃出爲浙州刺史荀綽冀州記曰裴康字仲預與弟揩爲名士仕至太子右衛率荀氏家傳曰車􅀐將軍悝字茂中山濤舉之爲太子右衛率稱君清和理正從容頋問動可觀採真侍衛之美者前衛率晉中興書曰徐邈字仙民建元中爲太子前衛率後衛率晉起居注曰建元十四年以太子中舎人郄儉爲太子後衛率宋起居注曰永􅀄元年以徐佩爲太子後衛率左右内率府長史六典曰左右内率府長史掌判諸曹官吏及千牛備身之二唐書曰永淳中以雍人元讓爲太子右内率府長史旌孝行也讓弱冠明經擢第以母疾遂不求仕躬親藥膳蒸蒸致養不出閭里十餘年及母終廬於墓側蓬髮不櫛沐菜食飲水而巳咸亨中孝敬監國下令表其門閭至是廵察使奏讓孝悌殊異由是拜職太平御覽卷第二百四十七
