front:
  text: 太平御覽卷第十二
  hash: sha256:355fb0be0d2a182a707b70eeace452420614e5c30cc1e595a00a00992dd2c7bc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_012-1a}
body:
  text: 天部十二雪霰露雪釋名曰雪綏也水下遇寒凝綏綏然下也詩曰北風其凉雨雪其滂又曰上天同雲雨雪雰雰雰雰雪皃也豐年之冬必有積雪又曰文王以天子之命命將帥歌采薇以遣之昔我往矣楊柳依依今我來思雨雪霏霏又曰蜉蝣掘閱麻衣如雪鄭􅀇注曰喻曹昭公君臣朝夕變易衣服麻衣􅀷衣也禮曰孟春行冬令則水潦爲敗雪霜大摯傳曰隱公九年三月庚辰大雪凡平地尺三月今正月也大雪失時也又曰楚子次于乾谿􅀨雪王皮冠秦復陶秦所遺羽衣也翠􅀍豹舄執鞭以出易通卦驗曰乾得坎之蹇則當夏雨雪詩推度灾曰逆天地絶人倫當夏雨雪大戴禮曰天地積隂温則爲雨寒則爲雪春秋元命苞曰隂陽凝而爲雪史記曰東郭先生乆待詔公車貧困飢寒衣弊履不完行雪中履有上無下足盡踐地道中人􅀏之漢書曰漢女者居東海養姑姑女䜛之於姑姑經太守訴而殺之五月下雪又曰􅂫武使於單于單于幽武置大窖中絶不與飲食天雨雪武卧齧雪與氊毛并咽之數日不死匈奴因以爲神又曰壷廣鞮單于自將領萬􅀐擊烏孫㑹天大雪一日􅀷文餘人民畜産凍死續漢書曰赤眉入安定北地逢大雪坑谷皆滿多凍死晉書曰王恭衣鶴􅌁雪中行時人謂之神仙中人又曰太􅀓謝安雪驟降公欣然曰白雪紛紛何所似兄子客兒曰散鹽空中差可擬兄女道韞曰未􅀂柳絮因風起又曰東瀛公騰公姓司馬名騰伐石勒於常山屯營時天大雪有一處方數丈融液恠而掘之得一玉馬髙尺許以爲晉家之瑞晉朝雜事曰太康七年河隂雨赤雪二頃宋書曰大明中元日雪花降殿庭右將軍謝莊下殿雪集衣白上以爲嘉瑞羣臣皆作雪花詩崔鴻北凉録曰先酒泉南有銅駞出大雨雪沮渠蒙遜遣工取之得銅數萬斤宋齊語曰孫康家貧常映雪讀書唐書曰郭元振爲安西大都護時西突厥首領烏質勒部落強盛欵塞通和元振就其牙帳計㑹軍事時天大雪元振立於帳前與烏質勒言議須􅁷雪􅀷風凍元振未嘗移足烏質勒年老不勝寒苦㑹罷而死録異傳曰漢時大雪積地丈餘洛陽令自岀案行見民家皆除雪出有乞食者至􅀽安門無有行路謂安巳死令人除雪入户見安僵卧問何不出安曰大雪人皆餓不冝干人令以爲賢舉爲孝廉韓詩外傳曰凡草木花多五出雪花獨六出雪花曰霙音英皇甫謐髙士傳曰世莫知焦先所出野火燒其廬先因露寢冬雪大至先袒卧不移人以爲死就視如故穆天子傳曰日中大雪北風雨雪有凍死人天子作黃竹詩三章以哀民曰我徂黃竹􅀒閟寒閟閇也音祕又曰􅀨雪天子獵于鈃山之西河漢武内傳曰西主母曰仙之上藥有􅀇霜絳雪列士傳曰羊角哀左伯桃相與爲死友聞楚王欲徃仕之道遇􅀨雪計不俱全乃併衣粮與角哀入樹而死陸機別傳曰機誅日平地尺雪時人以爲􅁈曹攄別傳曰攄爲洛陽令于時大雪而宫門夜忽失行馬攄曰此非他竊理可保明必是門士以療寒驗之而具服王子年拾遺記曰穆王東至大㩬音竒之谷西王母來進嵰丘儼反州甜雪嵰州去玉門三十萬里地多寒雪霜露著木石之上皆融而甘可以爲菓也又曰周靈王起昆明之臺召諸方士有二人乗飛遊之輦上席酣酯天赤旱地裂其一人先唱能爲霜雪王乃請焉於是引氣一吸則雲起雪飛又曰廣延之國去燕七萬里在扶桑東其地寒盛夏之日氷厚至丈常􅀨青雪氷霜之色皆如紺碧沙州記曰自龍涸至大浸川一千九百里晝夜蕭蕭常有風寒七月􅀨便是雪遥望四山皓然皆白西京雜記曰董仲舒曰太平之世雪不封條凌弭毒害而巳莊子藐姑射之山有神人居焉肌膚􅀂氷雪綽約􅀂處子曽子曰隂氣勝則凝爲雪孟子曰滕文公卒葬有日矣天大􅀨雪至牛目羣臣請㢮期太子不許惠公諌曰昔王季葬渦山之尾欒水齧其墓見棺文王曰先君欲見羣臣百姓矣乃出爲帳三日而後葬今太子亦冝曰先王欲少留而撫社稷故使雪甚㢮期而更爲日比文王義也太子曰善又曰齊宣王見孟子於雪宫王曰賢者亦有此樂乎孟子曰爲人上而不與民同樂者非也晏子春秋曰景公時􅀨雪三日公􅀍狐白之裘見晏子公曰恠哉􅀨雪三日不寒晏子曰古之賢君飽而知人飢温而知人寒公曰善乃脫裘發粟以與飢寒者秦子曰今欲馳光日下顯白雪中不可得也孫子曰昔衛君重裘累茵而坐見路有􅀒薪而􅂘之者問何故也對曰雪下衣薄是以􅂘之於是衛君懼見於顔色曰爲君而不知民熟以我爲君於是開府金出倉粟以賑貧淮南子曰欲滅迹而走雪中金匱曰武王伐紂都洛邑隂寒􅀨雪十餘日􅀷丈餘甲子平旦不知何五大夫乗馬車從兩􅀐止門外王使太師尚父謝五大夫賔幸臨之失不先門方脩法服太師尚父使人持一器粥出進五車兩􅀐曰先生大夫在內方對天子寒故進熱粥却寒粥皆畢使者具以告尚父尚父問武王曰客可見矣五車兩􅀐四海之神與河伯􅀨師耳王曰不知有名乎曰南海神曰祝融東海曰勾芒北海曰􅀇冥西海曰蓐收河伯􅀨師請使謁者於殿下門內引祝融五神皆驚相視而歎語林曰王子猷居山隂大雪夜開室命酌四望皎然因詠招隱詩忽憶戴安道時在剡乗興棹舟經􅀫方至旣造門而返或問之對曰乗興而來興盡而返何必見戴安道汜勝之書曰取雪汁漬原蠶屎五六日待釋手挼之和榖種之能御旱故謂雪爲五榖精也山海經曰由首之山小咸之山空桑之山並冬夏有雪論衡曰雲霧雨之徴也夏則爲露冬則爲霜温則爲雨寒則爲霜雨露凍凝者其由地發不從天降琴操曰曽子耕太山下雨雪不得歸思父母作梁山操廣志曰雲南郡四五月猶積雪皓代郡以五月山隂猶􅀫雪八月末復雪宋玉對問曰客有歌於郢中始曰下俚巴人國中屬而和者數千人其爲陽春白雲國中屬而和者不過數十人是其曲彌髙而和彌寡宋謝惠連雪賦曰嵗將暮時旣昏寒風積愁雲繁梁王不恱遊於兎園乃置旨酒命賔友召鄒生延枚􅅱相如末至居客之右俄而微霰零宻雪下王乃歌北風於衛詩詠南山於周雅相如於是避席而起逡廵而揖曰臣聞雪宫建於東國雪山峙於西域岐昌發詠於來思姬滿申歌於黄竹曹風以麻衣比色楚謡以幽蘭儷曲􅄹尺則呈瑞於豐年袤丈則表沴於隂德其爲狀也散漫交錯氛氲蕭索藹藹浮浮瀌瀌弈弈連翩飛灑徘􅆦委積始縁甍而冒㨂終開簾而入􅂩旣因方而爲圭亦遇圎而成璧眄隰則萬頃同縞瞻山則千巖俱白於是臺如重璧逵如蓮璐庭列瑶階林挺瓊樹皓鶴奪鮮白鷼失素楚辭九辯曰雪霰紛揉女救反又曰䰟來歸􅀆北方不可止増氷峨峨飛雪千里些蘇笴反又曰霰雪紛其無恨些雲霏霏而承宇些司馬相如羙人賦曰時旣西夕􅀇隂晦冥凉風蕭然素雪飄零伏系之雪賦序曰結隂凝雪皎如帔素謝靈運詩曰明月照積雪朔風勁旦哀樂府歌詩曰皓如山上雪皎如雲間月聞君有兩意故來相決絶􅁃肅之雪讃曰皓若天漢色踰玉粲李顒悲四時曰雲黮徒敢反䨴徒對反以時興雪聮翩而驟宻枯林皦如瓊幹空岫㓪若玉室王韶之詠雪離合曰霰先集􅀆雪霏霏散輝素􅀆被詹庭曲室寒􅀆朔風厲川陸涸􅀆百􅄜鳴霰釋名曰霰星也氷雪相搏􅀘各反如星而散􅀃文曰霰積雪也從􅀨散聲詩曰如彼􅀨雪先集維霰霰􅁀雪也箋云雪自上遇温氣而摶謂之霰爾雅曰􅀨霰爲消雪郭璞注云霰水雪雜下故謂消雪又曰􅀨雪相和爲霰尚書洪範五行傳曰盛隂􅀨雪凝滯而氷寒陽氣薄之不相入則散而爲霰故沸湯之在閉器而湛於寒泉則爲氷及雪之銷亦氷解而散此驗也韓詩薛君注曰霰霙也曽子曰隂之專氣爲霰露釋名曰露慮也覆慮物也許愼􅀃文曰露潤澤也從􅀨路聲詩曰厭於接反浥行露豈不夙夜謂行多露又曰蒹葭蒼蒼白露爲霜又曰湛露天子燕諸侯也湛湛露斯匪陽不晞又曰野有蔓草零露摶徒官反􅀆又曰野有蔓草零露瀼瀼如章反禮曰立秋後五日白露降又曰季冬行秋令則白露早降又曰天不愛其道故天降甘露又曰春􅀨露旣濡君子履之必有怵􅅥之心焉如將見之感時念親也又曰王所以爲順而弗悖也天降甘露易通卦驗曰立秋白露下尚書中候曰堯時甘露降詩含神霧曰陽氣終白露爲霜宋均曰白露行露也陽終隂用事故曰白露凝爲霜也大戴禮曰露隂陽之氣也夫隂氣勝則凝爲霜雪陽氣勝則散爲􅀨露禮斗威儀曰君治政則軒轅之精散爲甘露春秋繁露曰恩及於物順於人而甘露降春秋序曰桀無道露冬下春秋元命包曰霜以殺木露以潤草又曰隂陽散爲露五經通義曰和氣津液凝爲露露從地出呉越春秋曰子胥諌呉王王怒暮歸舉衣出宫宫中群臣皆曰天無霖􅀨宫中無泥露相君舉衣行高何爲子胥曰吾以越諌王王心迷不聽吾言宫中生草􅁄霧露沾吾衣群臣聞之莫不悲傷漢書曰宣帝元康元年甘露降未央宫大赦天下又曰平帝永平十七年自春迄夏多甘露降謁元陵太常丞上言陵樹葉上有甘露令百官採之又曰成帝幸河東祠后土甘露降京師又曰宣帝詔曰迺者鳯風集太山陳留甘露降未央宫冝赦天下後漢書曰桓帝永康元年秋八月魏郡言嘉禾生甘露降范曄後漢書曰明帝永平十七年甘露降于原陵謝承後漢書曰呉郡沈豐爲零陵太守至官一年甘露降膏潤草木東觀漢記曰光武帝時甘露降四十五里又曰明帝永平十七年夢見先帝光烈皇后夢中喜覺悲不能寐明旦上陵其日甘露降於陵樹帝令百官採之帝伏御床流涕也魏志曰明帝鑄承露盤莖長一十二丈銅龍繞其根立於芳林園甘露乃降又曰明帝與東阿王詔曰昔先帝時甘露屢降於仁壽殿前靈芝生芳林園中自吾建承露盤巳來甘露復降芳林園仁夀殿前􅀳書曰皇甫謐糿時有甘露降其柳樹謐毎以食之謂􅁡也􅀳中興書曰王者敬養􅂄老則甘露降於松栢尊賢容衆則竹葦受之甘露者仁澤也其凝如脂其羙如飴宋書曰文帝元嘉中甘露頻降狀如細雪隋書曰李德饒趙郡栢人人也性至孝丁父憂單縗徒跣後甘露降其樹白鳩巢其廬豫章􅂄舊傳曰太守陳蕃臨郡二年甘露降汝南先賢傳曰新蔡鄭敬都尉髙懿㕔前有槐樹有白露􅀋甘露懿問椽屬皆言是甘露敬曰明府德政未致甘露但樹汁耳懿不恱稱疾而去洞冥記曰勒畢國人長三寸有翼善言語戯􅀏因名語國飲丹露爲漿丹露者日􅀄出有露汁如朱也又曰東方朔遊吉雲之地漢武帝問朔曰何名吉雲曰其國俗常以雲氣占吉凶􅀂吉樂之事則滿室雲起五色照著於草樹皆成五色露露味甘帝曰吉雲五色露可得以甞不朔乃東走至夕而還得􅀇黃青露盛之琉璃器以授帝帝遍賜羣臣得露甞者老者皆少疾病皆愈又曰元封二年數過國獻能言􅀛一頭長一尺二寸東方朔曰唯承樹露以飲之王子年拾遺記曰崑崙山有甘露望之色如丹着木石則皎然如霜雪寳器承之如飴人君聖德則下周處風土記曰白鶴性警至八月露降流於草上滴滴有聲則鳴述仙記曰八月一日作五明囊盛取百草頭露以之洗眼眼明也老子曰天地相合以降甘露莊子曰姑射之山有神人焉不食五榖吸風飲露鶡冠子曰聖徳上及太清下及太寧中及萬靈則膏露下􅂫子曰夫人一代􅀂朝露之託桐葉耳其與幾何吕氏春秋日伊尹􅀃湯曰水之美者有三危之露三危西極山名和之美者掲雩之露掲雩之露其色紫淮南子曰方諸取露於月高誘曰方諸隂燧也東方朔神異經曰西北海有人長二千里兩脚中間相去千里腹圍一千六百里但日飲天酒五斗張華云天酒甘露也又曰黄父以霧露爲漿古史考曰太古之􅀄民吮露精食草木實劉向􅀃苑曰呉欲伐荆王令曰敢有諌者死舎人有少孺子者欲諌懷彈於後園露霑其衣者三朝王曰子求何苦露霑衣如是對曰園中有樹其端有蟬蟬髙居悲鳴飲風噏露不知螗蜋在其後曲跗方無反欲取其蟬而螗蜋又不知黃雀居其後延頸欲啄之然黃雀又不知臣操彈丸在其下臣但捕其黄雀不覺露隰衣此者爲窺其利而不思後患王聞之遂不伐荆又曰騰虵遊於霧露千里不止漢武帝故事曰帝作金莖擎玉杯以承雲表之露擬和玉屑服之以求仙又曰作銅承露槃上有仙人掌以承露也蔡邕月令章句曰露者隂液也釋爲露凝爲霜白虎通曰甘露者美露也降則物無不盛又曰露者霜之始寒即變爲霜論衡曰甘露味如飴王者太平之應則降地鏡圖曰視山川多露無霜其下有美玉徐整長曆曰北斗當崑崙山氣運注天下春夏爲露崔豹古今注曰薤露䘮歌也言人命如薤上露易晞滅也其一章曰薤上露何易晞明朝更復落人死何時歸瑞應圖曰露色濃甘者爲之甘露王者施德惠則甘露降其甘草木又曰甘露者美露也神靈之精仁瑞之澤其凝如脂其甘如飴一名膏露一名天酒又曰王者德至於天和氣感則甘露降於松栢山海經曰仙丘降甘露人常飲之又曰諸沃之野揺山之民甘露是飲不壽者八百􅀊列星圖曰天乳一星在氏北主甘露占􅀂明而􅃳則甘露降不然則否也楚辭曰朝飲木蘭之墜露夕採秋菊之落英張衡奏事曰飛塵増山霧露増海曹植魏德論曰􅀇徳洞幽飛化上蒸甘露以降􅁡淳氷凝覩陽弗晞瓊爵是承獻之帝朝以明聖徴曹植承露盤銘叙曰夫形能見者莫如髙物不朽者莫如金氣之清者莫如露盛之安者莫如盤乃詔有司鑄銅建承露盤于芳林園東晢集曰薄氷凝池非宗廟之寳零露垂林非綴冕之飾張載羽扇賦曰濯以雲精拂以芝露太平御覽卷第十二
