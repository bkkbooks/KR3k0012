front:
  text: 太平御覽卷第二百四十五
  hash: sha256:50d6a8fb95504ffc7e3bd4102d57256c3d84ce6f9ebeb322cd6304af3274f5d5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_245-1a}
body:
  text: 職官部四十三太子賔客太子詹事太子少詹事太子中庶子太子左右庶子太子賔客六典曰太子賔客掌侍從䂓諌賛相禮儀而先後焉凡皇太子有賔客宴㑹則爲之上齒漢書曰髙祖欲廢太子吕后用張良計致啇山四皓以爲賔客又孝武帝爲太子立􅀶望苑以使通賔客則其義也太子詹事六典曰太子詹事之職掌統東宫三寺十率府之政令辨其綱紀而修其職務少詹事爲之貳凡太子六官之典制皆視其事而承受焉俗說曰江夷爲右僕射主上欲用其領詹事語王淮卿可覔比例淮對曰臣當出外㝷訪淮後見主上問近所道事卿巳得比例未淮曰唯謝琰右僕射領詹事琰即謝公之子恐夷非其例事遂不行應劭漢官儀曰詹事􅁗官詹省也給也秩比二千石漢書曰竇嬰字王孫孝景即位爲詹事帝弟梁孝王母竇太后愛之孝王朝酒酣上從容曰千秋萬歳後傳王太后歡嬰引巵酒進上曰天下者髙帝天下父子相傳漢之約也上何以得傳梁王太后由是憎嬰又曰孔光父覇字次孺宣帝時以授太子經爲詹事又曰詹事掌皇后太子家有丞屬諸官皆屬焉成帝鴻嘉三年帝省詹事属大長秋晉書曰卞壼爲詹事丗稱卞壼裁斷切直敦實忠於事上也晉起居注曰武帝以王㳟丹陽尹領詹事㳟讓表曰今皇儲始建四方是式捴司之任崇替所由冝妙簡才賢盡一時之勝豈臣最庸所可叨忝晉公卿禮秩曰太始中立詹事掌宫事沈約宋書曰詹事一人􅀄領官属成帝時悉属少傅魏氏置詹事揔衆職晉􅀄又属二􅀓咸寕復置詹事齊職儀曰詹事品第三茂陵書秩二千石銀章青綬􅈰擬尚書令位視領護將軍陳書曰後主欲以江揔爲太子詹事令管記陸瑜言之於孔奐奐謂瑜曰江有潘陸之華而無園綺之實輔弼儲宫竊有所難瑜具以白後主後深以爲恨乃自言於髙宗髙宗將許之奂乃奏曰江揔文華之人今皇太子文華不少無藉於揔如臣愚見頋􅃟敦重之才以居輔導帝曰即如卿言誰當居此奐曰都官尚書王廊丗有懿德識性敦敏可以居太子詹事奐又奏曰宋朝范瞱即范㤗之子亦爲太子詹事前代不疑後主固争之帝卒以揔爲詹事唐書曰蘇弁改太子詹事弁􅀄入朝班位失序殿中侍御史鄒儒立對仗彈之弁於金吾待罪數刻特釋放舊制太子詹事班次太常宗正卿之下貞元三年御史中丞竇叅叙定班位移詹事在河南太原尹之下弁乃引舊班制立臺官詰之仍紿云巳白宰相請依舊故爲儒立彈之又曰龍朔二年改詹事爲端尹詹事府爲端尹府王珉荅徐邈書曰詹事彈一官如尚書左丞矣太子少詹事唐書曰張行成轉太子少詹事太宗東征皇太子於定州監國即行成夲邑也太子謂行成曰今者送公衣錦還郷於是令有司祀其先人墓太子中庶子漢書百官表曰太子中庶子職侍中漢書曰王啇字子威􅃰郡蠡吾人啇少爲太子中庶子以肅敬見稱又曰歐陽地餘字長賔爲中庶子授皇太子經又曰馮野王通詩以父任爲太子中庶子魏志曰鮑勛字叔業清白有髙節知名當丗爲中庶子在東宫正色不撓蜀志曰後主立太子璿以霍弋爲中庶子璿好馳射出入無度弋援引古事盡言䂓諌甚得切磋之體吴志曰孫登爲太子時太􅀓張温言於權曰夫中庶子官㝡親密切問近對冝用俊彦於是乃用陳表等爲中庶子後又以庶子禮拘復令勑中侍坐又曰羊衜音道􅀄爲中庶子年二十時廷尉監隱蕃結交豪傑自衛將軍全琮等皆傾心敬待惟衜及宣詔郎楊迪拒絶不與通時人怪之而蕃後叛逆衆乃服之晉書曰安平王孚􅀄爲魏太子中庶子魏武帝崩太子號哭過甚孚諌曰大行晏駕天下恃殿下爲命當上爲宗廟下爲萬國奈何効疋夫之孝太子良乆乃止曰卿言是也時群臣􅀄聞帝崩相聚號􅂘無復行列孚厲聲於朝曰今大行晏駕天下震動當早拜嗣君以鎮海内而但哭􅁘孚與尚書和洽奉太子以即位是爲文帝又曰温嶠爲中庶子獻侍臣箴甚見􅀘益又曰王恂啓以桓謙爲中庶子曰東宫之選中庶子管揔門下尤不可不得其才也晉起居注曰武帝咸寕元年詔曰男子皇甫謐沉静履素守學好古與流俗異趣其以謐爲太子中庶子晉中興書曰殷仲堪少好學能清言善属文人士咸欽愛之以孝行稱烈宗聞其名召爲太子中庶子甚相知恱又曰温嶠拜太子中庶子嶠在東宫特見嘉寵僚属莫與爲比嶠與阮放等共勸太子遊談老㽵不教以經史太子甚愛之數䂓諌諷議又曰肅宗之在東宫孔演領太子中庶子于時中興肇構庶事草創演經學淵博該識舊典朝儀軌制多取正焉由是元明二帝並親愛之沈約宋書曰中庶子漢置古者丗禄卿大夫之子即爲副倅謂之國子天子諸侯丗子必有庶子官以掌教之齊書曰􅀽粲言於帝曰臣觀張緒有正始遺風冝爲宫職復轉中庶子陳書曰王瑒父冲甞爲瑒辭領中庶子丗祖顧謂冲曰所以乆留瑒於承華正欲使太子微有瑒風法耳唐書官品志曰中庶子四人功髙者一人爲􅀕酒行則􅀒璽前後部護駕陶氏家傳曰侃遷太子中庶子君少而好學善談玄理尤明詩易以孝行聞于時儲􅃟殊難其人特召君焉山公啓事曰中庶子鈌冝得俊茂者以濟隂太守留儼城陽太守石崇叅選晉齊王攸與山濤書曰太子中庶子東宫顯職加侍接左右誠冝得篤粹有行檢之人必允衆望太子左右庶子六典曰左庶子之職掌侍從賛相駮正啓奏中允爲之二凡皇太子從祀朝㑹則版奏外辦中嚴入則解嚴焉凡令書下左春坊則與中允司議郎等覆啓以畫諾右庶子之職掌侍從左右献納啓奏中舎人爲之二凡皇太子監國於宫内下令書太子親畫日至春坊則宣􅀓之禮記曰古者天子有庶子之官職諸侯卿大夫之庶子掌其戒令與其教理別其等正其位國有大事則帥國子而致於太子唯所用之􅀂有甲兵事則授之車甲合其卒伍置于有司漢書曰成帝以􅀓喜有志行爲太子庶子魏志曰鮑勛字叔業爲庶子在東宫正色不撓魏氏春秋曰阮渾字長威籍之子也少知名爲太子庶子吴志曰華融字德􅵿廣陵江都人祖父避亂居山隂時皇象亦寓居山隂吴郡張温來就象學欲得所舎或告温曰有華徳蕤者雖年少美有令志可舎也温遂止融家朝夕談講俄而温爲選部尚書乃推擢融爲太子庶子遂知名顯逹晉書曰鄭黙武帝時太原郭弈俱爲庶子朝廷以太子官屬冝􅁛陪臣黙上言皇太子體皇極之尊無私於天下宫臣皆受命天朝不同藩國事遂不施行晉起居注曰太康十年詔尚書郎王琛每所陳論意在忠讜其以爲太子庶子隋書曰劉行夲爲太子左庶子時左衛率長史夏侯福爲太子所昵甞於閤内與太子戲福大􅀏声聞於外行夲時在閤下聞之待其出行夲數之曰殿下寛容賜汝顔色汝何物小人敢爲褻慢付執法者治之數日太子為福致請乃釋之隋書曰劉行夲爲左庶子太子甞得良馬令夏侯福乗而觀之太子甚恱因欲令行夲乗行夲不從正色而進曰至尊置臣於庶子之位者欲令輔導殿下以正道非爲殿下作弄臣也太子慙而止又曰劉行夲拜太子左庶子領治書如故皇太子虚􅁭敬憚時唐令則亦爲左庶子太子昵狎之每令以絃歌教内人行夲責之曰庶子當匡太子以正道何有嬖昵房帷之間哉令則甚慙而不能改又曰劉行夲爲左庶子卒後而太子勇廢文帝曰􅀂使劉行夲在勇當不及於此唐書官品志曰庶子四人掌侍從左右献納得失髙功者一人與舎人共掌其坊之禁令又曰貞觀中詔曰皇太子與百官書䟽未有制式近代巳來例皆名白無以別貴賤今凡處分論事之書皇太子並畫令右庶冝巳下署名宣奉行書案畫日其餘與諸子親及師傅等書不在此限又曰于志寧爲太子右庶子撰諌􅁐二十卷以進於太子承乹也又曰杜正倫爲太子左庶子太宗謂曰國之儲副自古所重必擇善人爲之輔佐今太子年在㓜冲志意未定朕􅀂朝夕見之可得隨事誡約今旣委以監國不在目前知卿志懷貞慤能執直道故輟卿於朕以匡太子冝知委任輕重也又曰太宗謂太子左庶子于志寧曰古者太子旣生卜士􅀒之即置輔弼昔成王㓜小周邵爲􅀓日聞正道習以成性今皇太子旣㓜卿當輔之正道無使邪僻開其心勉之無怠當􅁛所委官賞可不次而得也又曰李百藥授太子右庶子時太子頗留意典墳然閑讌之後嬉戲過度百藥作賛道賦以諷焉詞多不載太宗見而遣使謂百藥曰朕於皇太子處見卿所献賦悉述古來儲二事以誡太子甚是典要朕􅃟卿以輔弼太子正爲此事大稱所委但湏善始令終耳因賜綵物三百叚又曰李義琰爲太子右庶子同中書門下三品義琰􅀶學多識典故上毎有顧問言多切直章懷太子之廢也上慰勉官寮盡捨罪令復其位薛元超等皆舞􅌃謝恩義琰獨引罪涕泣時論美之山濤啓事曰東宫官属冝得髙茂者庶子賈模􅆙冝􅀘劉粹周蔚惟加所裁詔用粹環濟要略曰庶子主宫中并諸吏之適子及支庶在版籍者也行其秩序作其徒役授八次八舎之職以徼候太平御覽卷第二百四十五
