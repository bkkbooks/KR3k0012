front:
  text: 太平御覽卷第三十三
  hash: sha256:87260bf45f07666f1cea108bd28b381a0ab06b3ce2b94db8f882e4ed61b06d7f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_033-1a}
body:
  text: 時序部十八臘小歳膢臘許慎􅀃文曰臘冬至後壬戌臘􅀕百神也禮記月令曰孟冬是月也天子乃祈來年于天宗大割牲祠于公社及門閭臘先祖五祀此周禮所謂蜡􅀕也天宗日月星辰也大殺群牲割之也臘謂以畋獵所得禽􅀕也五祀門户霤井竈也或曰祈年或曰大割或曰臘牙其文也勞農休息之黨正屬民飲酒正齒位也天子乃命將帥講武習射御角力講武角力校武士材力所以備田獵之禮又曰郊特牲天子大蜡八伊􅂄氏始爲蜡伊􅂄氏古天子號也蜡也者索也謂永索也歳十二月合聚萬物而索饗之也歳十二月周之正􅁆謂建亥之月饗者􅀕其神也萬物有功民者神使爲之也􅀕之以報焉蜡之􅀕也主先嗇也先嗇苦神農者司嗇后稷神也又曰昔者仲尼與於蜡賔蜡者索也歳十二月索合聚萬物而索饗之亦祭宗廟孔子仕魯在助祭之中事畢出遊於觀之上喟然而嘆觀闕也子見魯君於祭禮有不備於此文覩象魏舊章之處感而嘆之仲尼之歎盖歎魯也又曰子貢觀於蜡蜡索也歳十二月索群神而祀之臘也孔子曰賜也樂乎對曰一國之人皆􅀂狂賜未知其爲樂也孔子曰百日之勞一日之澤非爾所知言民皆勤豫穡百日之勞喻乆也今一日使之飲酒宴樂是君之恩澤也周禮曰國􅀕蜡則吹􅃎頌擊土鼓以息老鄭玄曰十二月礼謂建亥之月也索萬物而􅀕之者萬物天成歳事至此爲其老而勞其禮而息之也豳頌七月又有穫稻作酒觥觴萬壽無疆之事是亦歌其􅀋也謂之頌也以其言歳終又功成也周以今之十一月爲正月以今十月爲臘月也傳曰晉侯復假道於虞以伐虢宫之竒諌弗聽以其族行曰虞不臘矣獵祭名也日月㑹於龍尾百物備合國於是祭群神也史記曰􅁗惠文王十二年􅀄臘始皇三十一年十二月更名臘曰嘉平太原眞人茅君内記曰始皇三十一年九月庚子君魯祖父濛乃於華山之中乗雲駕龍白日昇天先是其邑歌謡曰神仙得者茅􅀄成駕龍上昇八太清時下􅀇虚戲山赤城繼世而徃在我羸帝􅀂學之臘嘉平始皇聞謡歌而間其故父老具對此仙人之謡􅂆帝求長生之志也於是始皇欣然乃有尋仙之志因改臘日嘉平也又曰張良見老父出一編書曰讀是書爲王者師後十三年濟北城山下黄石即我也良後得黄石取寳而祠之及死葬黄石每上塚伏臘祠黄石焉漢書曰髙祖十年春有司奏令縣道常以春二月及臘祠社稷以羊􅇾又曰嚴延年爲河南太守􅀄延年母從東海來從延年臘到洛陽適見報囚報行决也母大驚便止都亭不肯入府延年出至都亭謁母母閉閤不見延年免冠頓首閤下良乆乃見之因數責延年曰幸得備郡守專治千里不聞人愛多刑殺人欲以立威豈爲民父母意哉延年重謝自爲母御歸府舎母畢正臘巳謂延年曰天道神明人不可獨殺我不自意當老見壯子􅀍刑戮也行矣汝南東歸掃除墓地耳後延年遂敗司馬彪續漢書曰季冬之月星逥歳終隂陽已交勞農夫享臘已送故焉又禮儀志先臘一日大儺謂之逐疫又舊儀曰臘者報諸􅀑即古聖賢有功於民者皆享之􅀽山松後漢書韓卓字子助陳留人臘日奴竊食􅀕其母卓義其心即日免之免從良也謝承後漢書曰弟五倫母老不能之官至臘日常悲戀垂涕又曰沛國陳咸爲廷尉監至官王莽篡位還家杜門不出莽改易漢法令及臘日咸常言我先祖何知王氏之臘乎又東夷列傳曰三韓俗以臘日家家􅀕祀俗云臘鼔鳴春草生也東觀漢記曰甄宇字長文北海人建武中自青州從事徴拜博士毎臘詔書賜博士所在京師因以號之髙堂隆魏臺訪議曰詔問何以用未祖丑臘臣隆對曰按月令孟冬十月臘先祖五祀謂薦田臘所得禽獸謂之臘左傳曰虞不臘矣唯見此二者而皆不書曰聞先師􅀃曰王者各以其行之盛祖以其終臘水始生於申盛於子終於辰故水行之君以子祖辰臘火始生於寅盛於午終於戍故火行之君以午祖戍臘木始生於亥盛於夘終於未故木行之君以夘祖未臘金始生於巳盛於酉終於丑故金行之君以酉祖丑臘􅁟始生於未盛於戍終於辰故􅁟行之君以戍祖辰臘今魏據􅁟德冝以戍祖辰臘也又曰華歆常以臘日宴子弟王朗慕之盖其家法由來漸矣杜公瞻云蜡者息民之祭故孔子云百日之勞一日之懌其所祭八神者皆報其成功則於十月農􅂩是也後世臘有新故交接之義遂移於夏正月十二月晉博士張亮説蜡聚饗臘者􅀕廟􅀄云蜡則黄服蜡臘不同惣非也臘冝在新故交接二祭月同而名異􅀕但而服殊今推諸經傳無正說蜡臘之文月令云蜡臘此則同日􅀕但牙名耳據田臘取獸之名爲臘因索饗百神號之曰折其曰上􅀕先祖旁饗百神下息萬民無别􅀕也即鄭玄云旣蜡臘先祖五祀於是勞農者也近日蜡臈兼設蜡在十月臘在歳終隋開皇四年始停建元之蜡直爲建丑之臘依五行火衰於戍而用戍日故也晉書范喬字伯孫喬邑人臘夕盗斫其樹有告者喬佯不聞邑人愧而還喬曰節日取柴欲與父母相歡耳何以愧乎遂不取又曰陳􅎮問方士戴洋曰江南有貴人頋彦先周宣珮是否洋曰顧不及臘周不及明年八月其年十二月十九日頋卒明日臘宣珮以明年七月晦亡又晉起居注曰安帝安隆四年十二月辛丑臘祠作樂又博士張亮議曰臘接也登冝在新故交接也俗謂之臘之明日爲􅀄歳秦漢以來有賀此古之遺語晉宋舊事曰魏帝遜位祖以酉日臘以丑日魏名臣奏曰大司農董遇議曰土行之君故冝以未祖以丑臘爲得盛終之節不可以戍祖辰臘梁書曰何鳯爲建安太守物不敢忤伏臘毎放囚還家依期而返唐㑹要曰貞元九年十一月上比日來京兆府毎年及臘日府縣捕養狐兎以充進獻自今巳後冝停又曰貞元十一年十二月臘日畋於苑中止多殺行三驅之禮軍士無不知感鄭玄列傳曰玄年十二隨母還家正臘讌㑹同列十餘人皆美服盛飾語言閑適君獨漠然如不及母私督數乃曰此非我志不在此願列女傳曰魯之母師者魯九子之寡母也臘日休家作悉召諸子謂曰婦人之義非有大故不出夫家然吾父母家􅀄歳時祀不理吾從汝謁謁告諸子欲徃徃監之慎房户之守吾夕而反於是天隂還失早至閭外而止待夕而入魯大夫從臺上見而怪之使人問對妾歸視私家諸奴孺子期夕而反妾恐其酺歠醉飽人情公有也妾反早故止閭外盡期而入大夫美之言於穆公公賜母尊號曰母師捜神記曰宣帝時隂子方者當臘日晨炊而竈神形見子方再拜受慶家有黄羊因以祠之自是以後暴至巨冨故後常以臘日祠竈風土記曰醇以吿蜡竭㳟敬於明祀乃有藏彄盖因婦人所作金鐶以錔指而􅆞者彄音鈎臘日之後􅅱嫗􅅱嫗皆男子婦人之老稱各隨其儕爲藏彄分二曹以効勝􅀒荆楚歳時記曰又爲藏彄之戯辛氏以爲鈎弋夫人所起周處成公綏並作彄字藝經庾闡則作鈎字其事同也俗云戯令人生離有禁忌之家廢不修也辛氏三秦記曰漢昭帝母鈎弋夫人手拳有國色丗人藏鈎因此安漢鈎弋夫人姓趙爲武帝婕妤生昭帝漢武故事云上巡狩河間見靑氣自地屬天望氣云下有貴子上求之莫舒上自披即舒號拳夫人善素女術大有寵即鈎弋夫人也周處風土記云呼爲行彄盖婦人所用銀作環以錔指而縫者臘日􅀕後叟嫗兒意皆藏彄戯分爲二曹以効勝􅀒爲一籌爲一都􅀒者起拜謝勝者又曰孔子所以預於蜡賔一歳之中盛於此節又曰俗又以此月爲臘月案史記陳勝傳有臘月之言是謂此也諺云臘鼓鳴春草生村人並擊細􅆎鼓戴明頭及作金剛力士以逐大疫華陽國志曰王長文字徳雋元康􅀄守江源令縣收得盗馬賊及發冢賊長文引見誘慰時適臘晦皆遣歸家獄先有擊囚亦遣之謂曰教化不厚使汝等如此長吏之過也蜡節慶祚肆汝就上下善相歡樂過節來還當爲汝思他理群吏惶怖争請不許㝷有赦無不感恩三十國春秋曰江州刺史胤自武昌以一疾􅀍徴爲右將軍而王舒未至猶在盆口後將軍郭黙旋而過胤胤不禮之臘日遺黙酒五􅂛一頭黙大怒􅄬之於江遂與故將張丑宋侯孟純等矯詔入城門莫有禦者胤獨與其妾寢黙至斬于床下及其司馬張滿叅荀揩李纂慠黙故也王肅議禮曰季冬大儺旁磔鷄出土牛以送寒氣節令之臘除逐疫磔鷄葦絞桃梗之屬風俗通曰夏曰清祀殷曰嘉平周曰大蜡漢曰臘臘者臘也因獵取獸以􅀕先祖或曰臘接也新故交接狎臘大􅀕以報功也漢火行衰於戍故以戍爲臘也又曰兎􅩋俗􅀃臘正旦食得兎􅩋者名也曰幸賞以寒酒幸者善祥令人􅁻利也􅩋毗忍切􅩋膝盖又曰上古之時有神荼與鬱壘昆弟二人性能伏􅀑度朔山桃樹下簡閱百􅀑􅀑無道理妄爲人禍者神荼與鬱壘縳以葦索執以食虎於是縣官常以臘除文飾桃人垂葦終絞􅀞於門皆追効前事兾以禦凶也㑹稽典錄曰陳脩字奉遷烏陽人家貧爲吏常歩擔上下􅁪食乾糒音備乾飵也每至正臘僵卧不起同僚以飲食請不往其志操如此丗􅀃曰王朗中年以識度推伏華歆歆蜡日嘗乃集子姪宴飲王亦斆之有人向張茂先稱此事張曰王之學華皆是形骸之外去之所以更逺玉燭寳典曰臘者􅀕先祖蜡者報百神同日異􅀕也蔡邕獨断曰臘者歳終大􅀕縱吏民宴飲非迎氣故但送不迎也崔寔四民月令曰十月上辛命典饋清麹釀冬酒以供臘祀又曰臘明日謂小歳進酒尊長修刺賀君師又曰十二月臘時祠祝炙蓬樹􅀲田四角去甘䖝􅀲中䖝謂之甘䖝蔡邕王喬録曰漢永和元年十二月腋夜王喬墓上哭聲王伯聞但徃視之天大雪見大鳥跡并􅀕祀處採薪者尹秃見人冠衣曰我王喬也汝莫取吾墓樹忽不見徐爰家儀曰蜡夲施􅀕故不賀其明日爲小歳賀稱􅀄歳福始罄無不冝正旦賀稱元正首慶百物惟新小歳之賀旣非大慶禮止門内西域諸國志曰天笁國以十二月十六日爲臘臘則麥熟盧公家範曰九臘日上澡豆帒及頭膏靣脂口脂淮南萬畢術曰歳暮臘埋圎石於宅隅雜以桃弧七枚則無􅀑疫養生要術云臘夜持椒卧井旁勿與人言投于井中除温疫盛翁子藏鈎賦叙曰以臘之後因􅀕祀餘胙要命中外以行鈎爲戯嵆含蜡賦序曰大蜡之夕雖天地同有至携金蘭以齊聲利得意以遺榮􅀔孰尚我裴秀大蜡詩曰有􅁏如丘有酒如淵有肴如林有貨如山小歳􅀃文曰膢楚十二月􅀕飲食也一日嘗新馨食新日貙膢貙勑俱切漢書曰武帝太􅀄二年令天下酺五日膢五日祠門户北臘如淳曰折者折漢儀注立社貙膢許慎日俗以十二月祭飲食兾州北部或以八月朝作飲爲膢其俗語曰膢臘社伏蔡邕曰􅓔獸常以立秋日還食其母猛䖝摶鷙時王者亦以此臘還以祭廟膢劉劉殺也言擊殺之時者也續漢書禮儀志曰立秋之日郊禮畢始楊威武斬牲於郊東門以薦陵廟其儀乗輿御戎輅白馬朱鬛躬執弩射牲薦廟太宰令謁者各一人載􅀗車馳駟送廟還宮遣使者齎束帛以賜武官肆兵習戰陣之儀斬牲之禮名曰􅓔劉風俗通曰謹案韓子書曰山居谷汲者膢臘寡水楚俗常以十二月􅀕飲也又曰嘗新始殺也食新曰貙膢也又曰謹案自郊貙膢春秋饗射天子射麑掩雉獻諸宗廟扶陽發滯養老致敬化之至也太平御覽卷第三十三
