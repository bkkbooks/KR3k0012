front:
  text: 太平御覽卷第三十六
  hash: sha256:cb12b059dcb322dc68f88fcb2d8ec85bbebbfd2da56db247590409810c13615f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_036-1a}
body:
  text: 地部一地上釋名曰地底也言其底下載萬物也亦言諦也五土所生莫不審諦也亦謂之坤坤順乾也說文曰元氣初分重濁爲地萬物所陳列也易曰坤元亨利牝馬之貞馬在下而居者也而必牝者順之至也至順而後乃亨又曰至哉坤元萬物資始乃順承天坤厚載物德合無疆含弘光大品物咸亨牝馬地􅀋行地無疆象曰地􅀔坤她形不順其􅀔順也君子以厚徳載物文言曰坤至柔而動也剛至靜而德方後得主而有常含萬物而化光坤道其順乎承天而時行又云隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也又曰夫􅀇黃者天地之雜色也天玄而地黃又曰立地之道曰柔與剛又曰坤地也故稱乎母陸績注曰取含養也又曰夲乎地者親下又曰在地成形鄭􅀇注形謂草木鳥獸王廣注􅄱謂山川等禮記曰人道敏政地道敏樹鄭􅀇注云樹謂植草木又曰今夫地一撮土之多及其廣厚載華岳而不重振河海而不泄萬物載焉此言地之博厚夲由撮土山之廣大夲由拳石水之不測皆由一勺皆合少成多自少致大至誠者亦如此乎又曰地載物天垂象取財於地取法於天是以尊天而親地又曰博厚所以載物也髙明所以覆物也􅀶厚配地髙明配天又曰成子髙謂慶遺曰生無益於人死不害於人我死則擇不食之地而葬我焉又曰燔柴於泰壇􅀕天也瘞埋於泰折􅀕地也又曰天地不合萬物不生又曰子夏曰三王之德叅於天地敢問如何斯可謂叅天地矣孔子曰奉三無私以勞天下子夏曰敢問何謂三無私子曰天無私覆地無私載日月無私照又曰凢四海之内斷長􅀘短方三千里爲田八十萬億一萬億畒九州之大計方百里者爲田九十億畒山陵林麓川澤溝瀆城郭宫室塗巷三分去一其餘六十億􅅿周禮曰土訓掌道地圖以詔地事道􅀃也說地圖九州形􅀔山川所冝告王以施其事出又曰以天産作隂德以中禮防之以地産作陽德以和樂防之以禮樂合天地之化百物之産又曰大司徒掌天下土地之圖周知九州之地域廣輪之數東西爲廣南北爲輪辯五地之生物一曰山林其動物宜毛其植物冝皁二曰川澤動物冝鱗植物冝膏三曰丘陵動物冝羽植物冝覈四曰墳衍動物冝介植物冝莢五曰原隰動物冝羸植物冝藂爾雅曰東至泰逺西至邠國南至濮鈆北至祝栗謂之四極觚竹北户西王母日下謂之四荒九夷八狄七戎六蠻謂之四海距齊州以南戴日爲丹穴北戴斗極爲空桐東至日所出爲太平西至日所入爲太蒙郭璞注曰極四方極逺國也觚竹在北北户在南西王母在西日下在東皆四方昬荒之地次四極者九夷在東入狄在北七戎在北六蠻在南次四荒者距去也齊中也折爲含人注曰晦􅁳無識不可教晦故曰四海自中州以南日光所照故曰丹穴尚書考靈異曰地有四遊冬至地上北而西三萬里夏至地下南而東復三萬里春秋分則其中矣地􅁪動不止人不知譬如人在大舟中閉牖而坐舟行不覺也詩含神霧曰天地相去億里春秋感精符曰冬至成天文夏至成地理春秋元命苞曰神農丗恠義生白阜恠義白阜之母名也圖地形脉道白阜爲神農圖盡地形通水道之脉使不擁塞也又曰土無位而道在故太一不興化人主不任部地出雲起􅀨以合從天下勤勞出於地功名歸於主土以謙自正以卑自㰸終不自伐生養之苦乃興雲􅀨不以爲功一歸於天中又曰地所以右轉者氣濁精少含隂而起遟故轉迎天佐其道地生於離旣而不敢當陽動退居少陰則亦冝右行而迎陽者受其施育而成陽故曰佐其道也又曰地不足東南隂右動終而入靈門地不足東故言立子午以相明之子午者隂陽之衆所見處也故以二辰廻轉所不同以爲門也右動動而東也靈門巳也隂藏於以也又曰地者易也言養物懷任交易變化含吐應節故其立字土力於一者爲地地加土以力又加一者言奉大一也春秋􅀃題辭曰地之爲言婉也承天行其義也居下以山爲位道之經也山陵之大非地不制含功以牧生故其立字土力於一者爲地力勤也即天也春秋内事曰地有十三分王侯之所居也孝經援神契曰地順受澤謙虚開張開張九覈受流灑潤是其謙虚也又曰計校九州之别土壤山陵之大川澤所注萊沛所生鳥獸所聚凢九百一十萬八千二十四頃磽埆不懇者千五百萬二千頃家語曰子夏曰啇聞山書曰地東西爲緯南北爲經山爲積德川爲積刑髙者爲生下者爲死丘陵爲牡川谷爲牝蚌蛤􅀛珠與月盈虚是故堅土之人剛弱土之人肥虚土之人妙實土之人細息土之人美磽土之人醜史記曰顓頊養材以任地載時以象天漢書曰天道貴信地道貴貞不信不貞萬物不生又曰秦地於天官東井輿􅀑之分野周地栁七星張之分野韓地角亢氐之分野趙地昴畢之分野燕地尾箕之分野齊地虚危之分野魯地奎婁之分野宋地房心之分野衛地營室東壁之分野楚地翼軫之分野呉地斗牛之分野晉書曰裴秀禹貢九州地域圖論曰圖書之設由來尚矣自古垂象立制而頼其用三代置其官國史掌其職曁漢祖屠咸陽丞相蕭何盡収秦之圖籍今秘書旣無古之地圖又無蕭何所得秦之圖籍唯有漢氏輿地及括地諸雜圖各不設分率又不考正准望亦不備載名山大川其所載列雖有麤形皆不精審不可依據或稱外荒迂誕之言不合事實於義無取今制地圖之體有六一曰分率所以辯廣輪之度也二曰准望所以正彼此之體也三曰道里所以定所由之數也四曰髙下五曰方雅六曰迂直此三者各因地而制以校夷險之數也有圖象而無分率則無以審逺近之差有分率而無准望雖得之於一隅必失之於佗方有准望而無道里則施於山海絶隔之地不能以相通有道里而無髙下方斜迂直之校則徑路之數必與逺近之實相違失准望之正矣故必以此六者叅而考之然後逺近之實定於髙下方邪迂直之筭故雖有峻山巨海之隔絶域殊方之過登降詭曲之回皆可得舉而定者准望之法旣正則曲直逺近無所隱其形也抱朴子云太極􅀄構清濁始分故天先成而地後定河圖括地象曰八極之廣東西二億三萬三千里南北二億三萬一千五百里夏禹所治四海内地東西二萬八千里南北二萬六千里又曰天有五行地有五岳天有七星地有七表天有四維地有四瀆天有八氣地有八風天有九道地有九州又曰崑崙山爲柱氣上通天崑崙者地之中也下有八柱柱廣十萬里有三千六百軸互相牽制名山大川孔穴相通又曰地廣東西二萬八千南北二萬六千有君長之州有九阻中土之文德及而不治河圖挺佐輔曰百世之後地髙天下不風不􅀨不寒不暑民復食土皆知其母不如其父知此千歳之後而天可􅀝杵匈匈隆隆莫知始終河圖曰元氣無形匈匈蒙蒙偃者爲地伏者爲天黃帝素問曰積隂爲地故地者濁隂也洪範五行傳曰地者成萬物者也周髀筭經曰天不可階而􅂛地不可尺寸而度楚辭曰地方九則何以墳之王逸注曰墳分也謂九州之地凢九品禹何以能分别之也康廽馮怒地何以東南傾康逥共工也昔共工與顓頊争爲帝怒而觸不周山天柱折地維絶故傾也見淮南天道篇也鹽鐡論曰古者制地足以養民民以承其上千乗之國百里之地公侯伯子男各充其欲秦兼萬國之地有四海之冨而意不贍者􅄝欲多而下不堪其求也太􅀇經曰天以不見爲􅀇地以不形爲􅀇人以心腹爲􅀇天奥西北􅊊化精也地奥黃泉隱魄榮也人奥思慮含至精也又曰九地一爲沙泥二澤浼三征崖四下田五中田六上田七下山八中山九上山蔡邕月令章句曰揔丘陵原隰阪險曰地范子計然曰夫地有五土之冝各有髙下鄭􅀇注孝經曰分别五土視其髙下􅀂髙田冝􅁰稷下田冝稲麥丘陵坂險冝種􅀥栗楊泉物理論曰凢居地有大利而無小害者上地也山海經曰帝令竪亥歩自東極至于西極五億十選郭璞注曰竪亥徤行人選萬物也九千八百八十歩竪亥左手抱筭右手指青丘北又曰天地之東西二萬八千里南北二萬六千里出水者八千里受水者八千里物理論曰地者底也底之言著也隂體下著也其神曰祇祇成也育生萬物備成也其卦爲坤其徳曰母地形有髙下氣有剛柔物有巨細味有甘苦鎭之以五岳積之以丘陵播之以四瀆流之以四川盖氣自然之體也地發黄泉周伏廽轉以生萬物地天之根夲也形西北髙而東南下東西長南北短其盡四海者也又曰地者其卦曰坤其德曰母其神曰祇亦曰媪大而名之曰黄地祇小而名之曰神州亦名后土黄地祗舉八極之内地神州王畿方千里内地神也后土祇也社地主也所在皆得言之詩推度灾曰上清下濁號曰天地􅀶物志曰地氏之位起形於崑崙從廣萬里髙萬一千里神物之所生聖人仙人之所集崑崙之東北地轉下三千六百里有八􅀇幽都方二十餘萬里下有四柱柱廣十萬里地有三千六百軸互相牽制也又曰地以名山爲之輔佐石爲之骨川爲之脉草木爲其毛土爲其肉三尺以上爲糞三尺以下爲地重隂之性也又曰中國之域左濵海右通流沙方而言之萬五千里面二千五百里東至蓬萊山西至隴右後跨荆北前及衡岳􅀂計共四隅有三億之餘降朝鮮岷山東治可西也隴川以南及北海之國此是堯舜土及萬里湯時七千里此後亦無常隨德優劣也論衡曰地户在東南人曰地之最下者有楊兖二川洪水之時此二土最􅀍水害又曰山川陵谷爲之地里又曰地性生草山性生水白虎通曰地者元氣所生萬物之祖也地之言施也諦也應施變化審諦不誤敬始重終故謂之地也老子曰地得一以寧地無以寜將恐發莊子曰天地非不廣且大也人所容足耳又曰海水三歳一周流波相薄故地動列子曰共工與顓頊争爲帝怒而觸不周之山天柱折地維絶地不滿東南故百川歸焉又曰地積塊耳充塞四虚無處無塊文子曰地承天故定寧地定寧萬物形地廣厚萬物聚定寧無不載廣厚無不容又白地方而無涯故莫能闚其門管子曰地或維之地莫之維地亡必矣又曰地者政之夲也是地可以正地不均平和調則政不可正也桓公問管子曰地數可得聞乎曰東西二萬六千里出水者八千里受水者八千里出銅山四百六十七出鐵山三千六百九處封禪之王七十二家墨子曰禽子問天與地孰仁墨子曰翟以地爲仁民衣焉食焉死焉家焉地終不責德焉故翟以地爲仁淮南子曰禹使大章歩自東極至于西極二億三萬三千五百七十里使竪亥歩自北極至于南極二億三萬三千五百七十里又曰重濁者淹滯而爲地又曰天有九部八紀地有九州八柱九州之外有八埏東方曰沙海東南方曰沅澤南方曰浩澤西南方曰丹澤西方曰泉澤西北方曰海澤北方曰塞澤東北方曰無通澤又曰扶桑之上衆帝所自上下日中無景呼而無嚮蓋天地之中也弱水在東建木在西末有十日其華照地九州之大純純縁邊也方千里九州之外乃有八寅一曰不温曰寅澤亦方千里自東北方曰大澤無漸茄曰澤也曰無通東方曰大渚曰少海東南曰其區曰厄澤南方曰大夢曰浩澤西南方曰注資曰丹澤西方曰九甌曰泉澤西北方曰大夏曰海澤北方曰大􅄀曰寒澤凡八寅八澤之雲是雨九州八寅之外乃有八紘紘維紘也亦方千里自東北方曰和丘曰荒􅁟東方曰􅁄林曰桑野東南方曰大窮曰衆女民少男多女也南方曰都廣曰反户在日之南爲北嚮户西南方曰焦僥曰炎土焦僥人長三尺衣冠帶劒西方曰金丘曰沃野金丘金所出也西北方曰一目曰少所其人一目北方曰積冰曰委羽積氷至寒也委羽山名委羽之北蓋不見日也凡八紘之氣是出寒暑以合八正必以風雨八紘之外乃有八極自東北方曰方土之山曰蒼門東方曰東極之山曰開明之門東南方曰波海之山曰陽門南方曰南極之山曰暑門西南方曰南極編駒之山曰白門西方曰西極之山曰閶闔之門西北方曰不周之山曰幽都之門北方曰北極之山曰寒門凡八極之雲是雨天下八門之風是節寒暑八紘之雲以雨九州而和中土東方之美者有醫無閭之珣玗琪焉醫無閭東夷之山也珣玗其玉名也東方之美者有㑹稽之竹箭焉南方之美者有梁山之犀象焉西南之美者有華山之金石焉西方之美者有霍山之珠玉焉西北方之美者有崑崙虚之璆琳瑯玕焉璆琳瑯玕珠名也北方之美者有幽都之䈥角焉東北方之美者有徒格山之文皮焉文皮虎豹之皮也太平御覽卷第三十六
