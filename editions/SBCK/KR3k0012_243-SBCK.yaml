  text: 太平御覽卷第二百四十三
  hash: sha256:d093feb9c83c6bb6e807e1c82261d5822403fe16619700f74d20ca84059d71b0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_243-1a}
body:
  text: 職官部四十一儀同特進揔叙大夫金紫光禄大夫光禄大夫太中大夫中大夫中散大夫柱國奉朝請致仕儀同東觀漢記曰鄧騭字昭伯延平元年拜爲車􅀐將軍儀同三司儀同三司始自騭也蜀志曰黄權降魏文帝善之景􅀄三年拜車􅀐將軍儀同三司王隱晉書曰太始七年以鄭袤爲司馬天子臨軒遣使就第拜授袤遣息稱疾上送印綬至于十數乆之見許其侯就第拜儀同三司置舎人官􅀐賜床帳簟褥錢五十萬又曰華廙爲太子少傅甚得輔導之義河南尹韓夀賈后之妹夫欲以女配廙不許由是有恨故不正三司疾篤乃拜儀同三司晉起居注曰太始八年詔曰衛將軍羊祜歷文武有佐命之勲其爲車􅀐將軍開府如三司之儀又曰元年詔曰中書監光禄大夫張華歷丗腹心情所慿頼故疇其勲績使儀同三司而虚冲挹損難違髙尚其以光禄大夫儀同三司夲職如故又給親信满百人又曰元康元年詔曰光禄大夫王戎光禄大夫裴楷開府辟召儀同三司晉中興書曰郗愔咸安元年拜都督浙江東五都諸軍事進位鎮軍開府儀同三司辭不受又曰蔡謨免皇太后詔以謨爲左光禄大夫開府儀同三司遣謁者孟洪就加􅁽命謨上䟽陳謝遂以疾篤不朝賜机杖門施行馬齊書曰徐孝嗣加開府儀同三司孝嗣聞有詔歛容謂左右曰吾德慙古人位登衮職將何以堪之明君可以理奪必當死請􅀂不􅀗命正當角巾丘園待罪家巷耳故讓不受齊職儀曰開府儀同三司置舎人官􅀐建􅀄三年馬防爲車􅀐將軍儀同三司魏以黄權爲車􅀐開府此後甚衆將軍開府依大司馬朱服光禄大夫開府依司徒皂服北史曰裴文舉武成二年就加使持節驃􅀐大將軍儀同三司蜀土沃饒啇販百倍或有勸文舉規利文舉荅之曰利之爲貴莫􅀂安身身安道隆非貨之謂是以不爲非惡財也後周書曰李賢遷驃􅀐大將軍開府儀同三司太祖之奉魏太子西廵也至原州遂幸賢第讓齒而坐行郷飲酒禮焉其後太祖又至原州令賢乗輅俻儀服以諸侯㑹遇禮相見然後幸賢弟歡宴終日凡是親族頒賜有差陳書章昭逹以平留異功授鎮前將軍開府儀同三司􅀄文帝甞夢昭逹􅂛台鉉及旦以夢吿之至是侍宴酒酣頋昭逹曰卿憶夢不何以償夢昭逹對曰當效犬馬之用以盡臣節自餘無以奉償隋書曰何稠安集嶺南有欽州刺史寗猛力帥衆迎軍􅀄猛力掘山洞欲圖爲逆至是惶懼請身入朝稠以其疾篤因示無猜貳遂放還州與之約曰八九月間可詣京師相見稠還奏狀上意不懌其年十月猛力卒上謂稠曰汝前不將猛力來今竟死矣稠曰猛力共臣爲約假令身死當遣子入侍越人性直其子必來􅀄猛力臨終誡其子長真曰我與大使爲約不可失信於國士汝葬我訖即冝上路長真如言入朝上大恱曰何稠著信蠻夷乃至於此以勲授開府齊王儉拜儀同三司章曰臣聞日中則昊盈虚之定分器满必傾往覆之常理遂乃班同衮章爕和台曜外叅論道内揔百司物議惟塵自識非據梁􅁃肩吾爲武陵王拜儀同章曰臣宅慶紫霄聮休皇極地均西月旣無跡而成髙仕􅀂乗風故不行而自逺今者四郊無壘天下同文都尉春田猶居塞外單于冬獵不入漁陽臣坐牧三邊非勞七戰豈能屯兵大夏封萬里之侯飛箭聊城受千金之夀論其才望有懼茂弘先佩印綬常羞叔度隋江揔太保蕭公謝儀同三司表曰阪泉野戰曽無汗馬之勞代邸運籌又闕前驅之勇薄伐專征早遊邊外執玉奉酎又􅃜朝則王人降止朝􅁽逺臨奉述勑書曲停表奏滄波阻夐旣杜敬仲之辭􅀜路攸長致絶趙衰之讓心馳紫路登文石而莫由目送白雲拜承明之未果特進東觀漢記曰鄧禹右將軍官罷以特進奉朝請漢雜事曰諸侯公德優盛朝廷所敬異者賜位特進在三公上無秩後漢書曰梁啇以女立爲皇后妹爲貴人加啇位特進更増國士賜安車駟馬謝承後漢書曰趙典道懿尊爲國師位特進七爲列卿寢布􅀍瓦器食也晉書百官表曰特進官品第二漢制皇后之父率爲此官傅咸奏曰公品第一執珪坐侍臣之上特進品第二執皮帛坐侍臣之下今啓特進冝執壁繼公沈約宋書曰特進魏丗驃􅀐將軍劉放衛將軍孫資等遜位以侯就第並位特進其諸官加特進者從夲官供給特進但爲班位而巳不别有吏卒車服也齊職儀曰特進以功德特進見之後魏書曰刀雍拜特進皇興中雍與隴西王源賀及中書監髙充等並以􅂄年特見優禮錫雍几杖劒履上殿日致珎羞焉北史曰穆紹加特進時侍中元順與紹同官順常因醉入寢所紹擁被而起正色讓順曰老身二十年侍中與卿先君亟連職事縱卿後進何置相排突也遂謝事還家詔諭乃起唐書官品志曰特進左右光禄金紫銀靑等光禄大夫用人俱以舊徳就閑者居之揔叙大夫白虎通曰大夫爲言大扶進人也毛詩衛淇澳碩人曰大夫夙退無使君勞大夫未退君聽朝於路寢夫人聽内事於正寢大夫退然後罷也箋云莊姜始來時衛諸大夫朝夕者皆早退無使我君之勞倦以君夫人新爲配偶冝親親之也毛詩節南山雨無正曰大夫離居莫知我則勞也箋云正長也官長之大夫厲王流于􅇾而皆散處無復知我民之見疲勞也三事大夫莫肯夙夜􅀖君諸侯莫肯朝夕箋云王流在外三公及諸侯隨而行者皆無君臣之禮不肯晨夜朝暮省王也周禮秋官下朝大夫曰掌􅀖家之國治􅀖家王子弟公卿及大夫之菜地也凡􅀖家之治於國者必因其朝大夫然後聽之禮記曲禮上曰大夫七十而致事􅀂不得謝謝去也君貪其德而留之則必賜之几杖行役以婦人適四方乗安車自稱曰老夫於其國則稱名越國而問焉必告之以其制他國問其老者必以制度告之金紫光禄大夫于寳晉紀曰尚書僕射季胤母䘮拜金紫光禄大夫給吏卒門施行馬三國典略曰房謨夲姓屋氏髙勃海王入洛授金紫光禄大夫累賜奴婢率多放免王後賜生口黥靣爲房字而付之光禄大夫漢書百官表曰光禄勲属官有大夫掌議論漢書曰谷永旣爲大將軍王鳯擢爲光禄大夫永奏書謝鳯曰永斗筲之材質薄學杇無一日之雅左右之方將軍恱其狂言擢之皂衣之吏厠之争臣之未又曰金日磾爲光禄大夫親近未甞有過上信愛之又曰貢禹上書云貧老家貲不满萬錢拜光禄大夫賜益多家益冨伏自念無報厚德日夜慙愧又曰杜陵王仲翁霍光以爲光禄大夫仲翁出入蒼頭廬兒傳呼甚尊寵又曰蔡義上書云臣山東草萊之人行能無所比容貌不及衆然而不弃人倫者以聞道於先師願賜清間之讌得舒精思於前上即見說詩甚恱擢爲光禄大夫東觀漢記曰張堪字子孝爲光禄大夫數諌堪常乗白馬光武毎有異政輙曰白馬生且復諌矣又曰樊宏字靡卿爲光禄大夫爲人謙素畏慎每朝㑹迎期先到俯伏待事時至乃起帝聞之勑臨朝乃告勿令䂊到後漢書曰鄧太后從樊准議悉以公田賦與貧人即擢准與議郎吕倉並守光禄大夫准使兾州倉使兖州准到部開倉廩食􅅒給慰安生業流人咸得蘇息又曰魏文帝受禪欲以楊彪爲太尉先遣使示旨彪辝曰彪俻漢三公遭代傾亂不能有所􅀘益耄年􅀍病豈可賛惟新之朝遂固辭乃授光禄大夫賜几杖衣􅂁因朝㑹引見令彪着布單衣鹿皮冠而入待以賔客之禮華矯後漢書曰鄧彪遭後母憂毀瘠過禮因疾乞身以光禄大夫行服漢書解詁曰武帝以中大夫爲光禄大夫與博士俱以儒雅之選異官通職周官所謂官聮者也温故知新率由舊章皆能明古今辨章舊聞者也漢書百官表注曰光禄大夫古官也銀章青綬漢官儀曰光禄大夫秩比二千石不言属光禄大夫勲門外特施行馬以旌別之魏志曰常林字伯槐河内温人也時論林節操清峻欲致之公輔而林遂稱疾篤拜光禄大夫又曰黄􅀄四年詔給光禄大夫楊彪吏卒門施行馬吴志曰八月遣光禄大夫周弈石偉廵行風俗察將吏清濁民所疾苦爲黜陟之詔王隱晉書曰劉毅字仲雄年七十告老以光禄大夫致仕門施行馬賜錢百三十萬晉書曰王覽爲宗正卿致仕詔遣殿中醫療疾給藥後轉光禄大夫門施行馬又曰鄭襃魏景元􅀄疾病失明屢乞骸骨不許拜光禄大夫又曰華表字偉容歆子也太始中爲太中大夫禄賜與卿同門施行馬晉陽秋曰李喜乞老以爲光禄大夫門施行馬晉中興書曰王藴字仁修烈宗將納后訪于公卿僕射安曰王藴地望可與國㛰定后旣立徵拜金紫光禄大夫又曰祖納字士言少持操行能言名理遷右光禄大夫又曰荀組字太章頴川人也弱冠太尉王夷甫見而稱之爲光禄大夫又曰荀松字景猷組族子也弱冠大原王濟甚相器重拜右光禄大夫又曰賀循字彦士㑹稽人也節操髙厲童齓不群言行舉動必以禮讓行有餘力則精書學由是愽覽群書尤明三禮爲江表儒宗拜右光禄大夫又曰頋和字君季榮族子也和二歳失父揔角便有清操弱冠知名族父榮雅器之曰此吾家千里駒也興吾宗者必此子矣康帝即位爲尚書僕射更拜銀青光禄大夫又遷左光禄大夫晉諸公賛衛尉􅀓祇以風疾遜位加光禄大夫門施行馬齊書云周盤龍丗祖講武令盤龍領軍校尉騁矟以疾爲光禄大夫後魏書曰李茂字中宗爲光禄大夫茂性謙愼以弟仲寵盛懼於盈滿遂託以老疾固請遜位髙祖從之聽食大夫禄還私第汝南先賢傳曰郭憲爲光禄大夫上欲到三輔憲諌曰天下􅀄定車駕未可以廵上遂行憲當車拔佩刀以斷車靷上不止到弘農兵起頴川上曰恨不用光禄之言於是乃還樊英別傳曰詔書告南陽太守五官中郎將樊英委榮辝禄不降其節志不可奪今以英爲光禄賜還家在所縣給榖千斛常以八月存髙年給羊一頭酒三斛荀氏家傳曰闓字道明性清静善談論遷光禄大夫以君面似胡明帝謂爲神明胡子太中大夫韋昭辨釋名曰太中大夫大夫之中最髙大也漢書曰陸賈楚人也以客從髙祖定天下以口辨居左右常使諸侯中國􅀄定尉佗平南越因王之髙祖使賈賜佗印爲南越王賈說佗令稱臣奉漢約歸報高帝太悅拜賈爲太中大夫又曰東方朔字曼倩平原厭次人也拜太中大夫觀察顔色直言切諌上常用之東觀漢記曰來歙字君叔南陽新野人也歙有大志慷􅁣治春秋左氏東詣洛陽見上大喜曰君叔獨勞苦即􅄙􅀍䄡􅃭以衣歙拜太中大夫後漢書徴郭伋太中大夫賜宅一區及帷帳錢榖以充其家伋輙散與宗親九族無所遺餘司馬彪續漢書曰張湛拜太中大夫病居東門􅀱舎故時人号之爲中東門君上數存問賞賜魏志曰管寧字㓜安北海朱虚人也年十六䘮父中表􅉖其􅀌貧咸共贈賻悉辝不受長八尺美􅂡眉與平原華歆同縣邴原相友黄􅀄四年詔公卿舉獨行君子司徒華歆薦寧文帝以寧爲太中大夫固辭不受又曰韓曁字公至明帝詔曰太中大夫曁澡身浴德志節髙潔年逾七十守道弥固可謂純篤老而益劭者也其以曁爲司徒呉志曰裴􅀇字彦黄下邳人也少有學行官至太中大夫梁書曰頋憲之字士思風疾求還吴天監二年授太中大夫雖累年宰郡資無擔石及歸環堵不免飢寒中大夫漢書曰晁錯對䇿書百餘人唯錯爲髙最乃遷爲中大夫又曰倪寛以侍御史見上語經學從問尚書一篇擢爲中大夫中散大夫東觀漢記曰牟長字君髙少篤學治歐陽尚書諸生着緑前後萬人建武十四年徵爲中散大夫後漢書曰魯丕字叔陵遷中散大夫時賈逵薦丕道藝深明冝見任用因和帝朝㑹召見諸儒丕與侍中賈逵尚書令黄香等相難數事帝善丕說罷朝特賜冠㥽履襪衣一襲續漢書曰譙玄字君黄能說春秋遷中散大夫柱國北史曰李敏美姿容善􅀐射開皇􅀄周宣后樂平公主有女娥英妙擇婚對勑貴公子弟集弘聖宫者日以百數公主選取敏禮儀如帝女後將侍宴公主謂敏曰我以天下與至尊唯一女夫當爲汝求柱國􅀂授餘官慎無謝及進見上親御琵琶敏舞大恱爲公主曰敏何官對曰一白丁耳上謂敏可授儀同敏不荅上曰不满尓意耶令授開府又不謝上曰公主有大功於我敏迺拜蹈舞遂於坐發詔授柱國五代史後唐天成三年五月詔曰開府儀同三司階之極太師官之極封王爵之極上柱國勲之極近代巳來文臣官階稍髙便授柱國歳月未深便轉上柱國武資不計何人􅀄官便授上柱國官爵非無次第階勲俻有等差冝自此時重修舊制今後凡是加勲先自武􅀐尉經十二轉乃授上柱國永作成䂓不令踰越雖有是命竟不革前例奉朝請漢書曰王陵爲太傅杜門謝疾竟不朝請續漢書曰前漢列侯奉朝請在長安位次三公漢武時宣帝爲皇曽孫令奉朝請東觀漢記曰建武中鄧禹失司徒特進奉朝請漢官解詁曰三輔職如郡守獨奉朝請成帝丞相張禹遜位特進奉朝請又以開内侯蕭望之奉朝請奉朝請之號則非爲官如淳曰諸侯春朝天子曰朝秋曰請雖國戚及勲門子弟爲之但預朝請㑹而巳晉起居注曰孝武寕康三年詔隴西王丗子越駙馬都尉楊邈並可奉朝請侍從左右與太子遊處沈約宋書曰奉朝請無貟外夲不爲官漢東京罷省三公外戚宗室多奉朝請奉朝請者奉㑹朝請召而巳又曰王敬弘子恢之􅀍召爲祕書郎敬弘求爲奉朝請與恢之書曰秘書有隄故有競朝請無限故無競吾欲使汝處於不競之地太祖嘉而許之北齊書曰祖鴻勲爲州主簿僕射臨淮王彧表薦鴻勲有文學冝試以一官勑除奉朝請人謂之曰臨淮舉卿便以得調竟不相謝恐非鴻勲曰爲國舉才臨淮之務祖鴻勲何事從而謝之彧聞而喜曰吾得其人矣後魏書曰崔光韶事親以孝聞􅀄除奉朝請光韶與弟光伯雙生操業相侔特相友愛遂經吏部尚書李冲讓官於光伯辝色懇至冲爲奏聞髙祖嘉而許之又曰裴詢字敬叔美儀皃多藝能音律􅀶弈咸所開解起家奉朝請又曰梁景伯生於桑乾少䘮父以孝聞家貧傭書自給養母甚謹尚書盧淵稱之於李冲冲時典選㧞爲奉朝請致仕官晉書曰王祥致仕詔賜几杖床帳簟蓐以舎人六人爲睢陵公舎人又曰鄭冲致仕詔賜安車駟馬床帳簟蓐五代史曰鄭韜以户部尚書致仕自襁褓迨於懸車事真僞十一君凡七十載所任無官謗無私過三持使節不辱君命士無賢不肖皆㳟巳接納晚年背傴時人咸曰鄭傴不迃平生交友之中無􅂩怨親族之間無愛憎恬和自如性尚閑簡及致政歸洛甚愜終焉之旨太平御覽卷第二百四十三
