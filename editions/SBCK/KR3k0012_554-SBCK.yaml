front:
  text: 太平御覽卷第五百五十四禮儀部三十三
  hash: sha256:984aaa96f31a886771caee916398f7a50b2798155d19c15fd48162ff382cdfd3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_554-1a}
body:
  text: 葬送二東觀漢記曰鄧弘薨有司復請加謚曰昭成君發五校輕車􅀐士爲陳至葬所所施皆如霍光故事皇太后皆曰門生輓送謝承後漢書曰鄧晨尚丗祖姊新野公主主爲王莽兵所害及薨詔備主官屬法駕招迎主魂與晨合葬於北邙謝承後漢書曰馬援卒後有人上書譛之者援妻孥惶怖不敢以䘮還舊塋裁買城西數􅅿地槀葬而巳賔客故人莫敢弔㑹援妻子草索相連詣闕請罪帝乃出訟書以示之方知所坐上書訢􅁈前後六上辭甚哀灱然後得葬謝承後漢書曰崔瑗爲濟北相光禄大夫杜喬爲八使徇行郡國以贓奏瑗徴詣廷尉瑗上書自訟得理岀㑹病卒臨終顧命子實曰人禀天地之氣以生及其終也歸精於天還骨於地何地不可藏形骸勿歸郷里實奉遺令遂留葬洛陽􅀄崔實父卒摽賣田宅起冢塋立碑頌葬訖資産竭盡因窮困以搉酤鬻爲業時人多以此譏之實終不改亦取足而巳不致盈餘謝承後漢書曰陳寵爲廣漢太守先是洛縣城南每隂雨常有哭聲聞於府中積數十年寵問而疑其故使吏桉行還言衰亂時此下多死亡者而骨骸不得葬償儻在於是寵愴然矜之即勑縣盡収斂葬之自是哭遂絶華嶠後漢書曰楊震爲太尉中常侍樊豐等驕恣震常灱諌由是共構譛震䇿罷遣歸夲郡遂仰鴆薨薨日有大鳥來止樹上須􅁷下地安行到柩前正立伭頭旁人共更撫抱終不驚駭鳥蒼色頸去地五六尺舒翅廣一文三尺莫有能名者葬畢飛去范曄後漢書曰范冉一名丹臨命遺勑其子曰吾生於昬闇之世值乎􅁋侈之俗生得在世濟時死則何忍自同於世氣絶便歛歛以時服衣足蔽形棺足周身歛畢便穿穿畢便埋其明堂之奠盂飲寒水飲食之物勿有所下墳封髙下令足自隱知我心者李子堅王子炳也今皆不在制之在爾勿令郷人宗親有所加也范曄後漢書曰趙咨以病自乞徴拜議郎沉疾京師將終告其故吏朱祇蕭建等薄斂素棺藉以黄壤欲令速朽早歸后土不聽子孫改之朱祇蕭建送䘮到家子㣧不忍父體與土并合欲更改殯祇建譬以顧命於是奉行世稱明哲後漢書曰董宣爲洛陽令卒於官詔遣使者臨視唯見布􅀍覆屍妻子對哭有大麥數斛弊車一乗帝傷之曰董宣廉潔死乃知之以宣綬爲二千石賜艾綬葬以大夫禮後漢書曰樊宏卒遺勑薄葬一無所用以爲棺椁一藏不冝復見如有腐敗傷孝子之心使與夫人同墳異藏帝善其令以書示百官因曰令不順壽張侯意無以彰其德具吾萬歳之後欲以爲式後漢書曰􅀽安父没母使安訪求葬地道逢三書生問安何之安爲言其故生乃指一處云葬此地當代爲上公須􅁷不見安異之於是遂葬其所占之地故累代隆盛焉後漢書桓榮每疾病帝輒遣使者存問太官太毉相望於道及篤上䟽謝恩讓還爵土帝親幸其家問起居下車擁經而前撫榮垂涕賜以牀茵帷帳刀劒衣􅀍良乆乃去自是諸侯將大夫問疾者不敢復乗車到問皆拜床下榮卒帝親自變服臨䘮送葬賜􅃁塋于首山之陽後漢書曰李傕重葬董卓於郿并董氏所焚尸之􅁅合斂一棺而葬之葬日大風雨霆震卓墓流水而藏漂其棺木後漢書曰王忳字少林忳音純廣漢新都人也忳嘗詣京師於空舎中一書生疾困愍而視之書生謂忳曰我當到洛而􅀍病命在湏􅁷腰下有金十斤願以相贈死後乞藏骸骨未及問姓名而命絶忳即鬻金一斤營殯葬餘金悉置棺下人無知者後歸數年縣署忳大度亭初到之日有馬馳入亭中而止其日大風飄一繡􅀍復墮忳前即言之於縣縣以歸忳忳後乗馬到雒縣馬遂奔走牽忳入他舎主人見之喜曰今禽盗矣問忳所由得馬忳具􅀃其狀并及繡被主人悵然良乆乃曰􅀍隨旋風與馬俱亡卿何隂德而致此二物忳自念有葬書生事因􅀃之并道書生形皃及埋金之處主人大驚號曰是我子也姓金名彦前徃京師不知所在何意卿乃葬之大恩矣乆不報以彰卿德耳忳悉以被馬還之彦父不取又厚遺忳忳辭讓而去後漢書曰范式字巨卿與張元伯爲友元伯窮疾篤同郡郅君章殷子微晨夜省疾視之元伯臨盡歎曰恨不見吾死友㝷而卒式或夢見元伯玄冕垂纓復屣而呼曰巨卿吾以其日死當以爾時葬永歸黄泉子未我忘豈能相及式怳然覺寤悲歎泣下具告太守請徃奔䘮投其葬日馳徃赴之式末及到而䘮巳發引旣至壙將窆而柩不肯進其母撫之曰元伯豈有望耶遂停柩移時乃見有素車白馬號哭而來其母望之曰是必范巨卿也即至叩䘮言曰行矣元伯死生路異永從此辭㑹葬者千人咸爲揮涕式因執紼而引柩於是乃前式遂留止􅃁次爲脩墳樹後漢書曰繆肜汝南召陵人也太守隴西梁湛召爲決曹史安帝初湛病卒官肜送䘮還隴西始葬㑹西羗反叛湛妻子悉避亂他郡肜獨留不去爲起墳塜乃潜穿并傍以爲窟室晝則隱􅇡夜則􅀒土及賊平而墳巳立其妻子意肜巳死還見大驚􅀜西咸稱傳之共給車馬衣資肜不受而歸後漢書曰張霸蜀郡成都人也爲㑹稽太守後徴四遷爲侍中卒年七十遺詔諸子曰昔延州使齊子死嬴􅀶因坎路側遂以葬焉今蜀道阻逺不且歸塋可止此葬足藏齒髮而巳務遵速朽副我夲心人生一代但當畏敬於人􅀂不善加巳直爲受之諸子承命葬於河南梁縣因遂家焉後漢晝曰士孫瑞理王充等事曰興平二年秋朝廷以九月九日引見公卿近臣飲宴離席前􅀃故司徒王允故司􅀠黄琬並有功於國可聽允恭等葬魏略曰田豫病亡戒其妻子曰葬我必西門豹邊妻子難之曰西門豹古之神人郍可葬其所豫曰豹所履行正與我等耳使死而有靈必與我善妻子從之魏略曰郝昭字伯通病亡遺令戒其子凱曰吾爲將知將不可爲也吾數發􅃁取其木以爲攻戰具又知厚葬無益於死者也没必歛以時服死復何在耶令去夲墓逺東西南北在汝而巳矣魏略曰沐徳信年六十餘自慮無常豫作終制誡其子以儉葬至嘉平中病甚臨困又勑豫掘塪誡氣絶令二人舉户即塪絶哭泣之聲止婦女送又誡後亡者不得入藏不得封樹妻子皆遵之魏志曰征東將軍王基母卒詔秘凶問迎其父豹䘮合葬洛陽追賜豹北海太守魏志曰邴原字根矩北海人太祖辟司空椽原女早亡時太祖愛子倉舒亦没太祖欲令合葬原辭曰合葬非禮也原之所以自容明公公之所以待原者以能守訓典而不昜也􅀂聽明公之命則是凡庸也明公焉以爲哉太祖乃止魏志曰任城王章葬賜鸞路龍旂虎賁百人如漢東平王故事魏志曰徐邈爲光禄大夫數歳即拜司空固辭不受以大夫薨于家用公禮葬謚曰穆侯魏志裴潜薨贈太常子秀翩遺令葬中唯置一坐瓦器數枝其餘一無所設也王隱􅀳書曰魏舒字陽元爲冀州刺史入代山濤爲侍中舒三取妻皆先亡是歳自表乞假還本郡葬妻上曰舒當左右朝政不冝逺還郷里舒素清貧不營財産頓舉衆䘮必無以自供其賜葬地一頃錢伍拾萬王隱􅀳書曰皇甫謐篤終論曰氣絶之後便時服幅巾以遽蒢褁尸覆卷三重麻䋲約二頭置屍靈床上擇不毛之地穿坈十尺長一丈二尺廣六尺坈訖去床下屍平生之物皆無自隨唯賫孝經一卷示不忘孝道王隱􅀳書曰杜頒薨遺令曰吾徃爲公使過宻縣邢山之上有塜問耕者云是鄭大夫祭仲或子産之冡也遂師從者登而觀焉其造􅃁居山之嶺四望周達連山體南北之正而耶東北向新鄭城意不忘夲也藏無珎寳不取於重深居子尚其儉小人無利可動歷千載無毀儉之致也吾去春入朝因自營洛陽城東首陽之南爲將來兆域而所得地中有小山上無舊塜其髙顯雖未足比邢山然東奉二陵西瞻宫闕南觀伊洛北望夷叔曠然逺覽情之所安也故遂表樹開道爲一定之制取法鄭大夫欲以儉自完耳棺器小歛之事皆當稱比王隱􅀳書曰馬隆字孝興東平人也少有智勇門寒無仕路兖州刺史令狐愚坐事死舉州無敢送䘮者唯隆以武吏託稱家客殯送䘮葬種栢三年禮畢乃還舉州皆慙王隱􅀳書曰徐苗以永寧三年春亡遺令濯巾澣衣榆棺雜塼露車載柩葦席瓦器而葬矣􅀳陽秋曰荀粲亡時年二十九性簡實不能與常人交接所交者一時俊傑至葬夕赴者裁十餘人皆同時知名士也哭之感動路人漢􅀳陽秋曰司馬師葬曹髦於洛陽西北三十里屈澗之濵下車數乗不設旒旐百姓相聚而觀之曰前所殺天子也或掩靣而泣􅀳諸公讃賈后女宣華公主葬用羽葆鼓吹熊渠佽飛爲鹵簿􅀳書曰石苞以泰始八年薨預爲終制曰延陵薄葬孔子以爲達禮華元厚葬春秋以爲不臣古之明義也自今死亡者皆斂以時服不得兼重又不設床帳明器窆後復土滿坎不得起墳種樹王隱􅀳書曰庚峻遺勑子珉曰朝卒暮殯幅巾布衣葬不擇日珉奉遺命殮以時服􅀳中興書曰劉驎之少有信義去家百餘里有一獨嫗病將死歎息謂人曰誰當埋我唯有劉長史耳何由令知驎之先聞有病故徃􅀱之值其命終乃身爲治棺殯送其仁愛惻隱􅀂此也王隱􅀳書曰􅂫韶安平人也爲中牟令第九子名節畫日見韶入乗馬介黄練衣曰吾欲改葬乃授節爲書曰吾性好愛京洛每徃來瞻覩芒山上樂哉乎此萬代之基也背孟津洋洋之河南望天邑濟濟之盛此志雖未言銘之於心不啚奄忽所懷未果前至十月可速改葬買數􅅿地便自足矣􅀳書曰成都王頴死其後没桑害東羸公騰稱爲頴報讎遂出頴棺載之於軍中毎事啓靈以行軍令桑敗棄棺於故井中頴故臣収之改葬於洛陽􅀳中興書曰王導薨詔給九旒輼輬車黄屋左纛前後羽葆鼔吹挽歌兩部虎賁班劒百人中興名臣莫與爲比也􅀳中興書曰􅀄温嶠葬豫章朝議以嶠首受顧命功濟社稷宜還陪陵官爲起冡太尉偘上䟽停其移葬詔從之至嶠後妻何氏卒便載嶠䘮還都詔令葬建平陵北并贈嶠二妻王氏何氏始安夫人印綬云太平御覽卷第五百五十四
