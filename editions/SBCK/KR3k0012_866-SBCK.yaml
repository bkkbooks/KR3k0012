body:
  text: 飲食部二十四醯醢醯釋名曰苦酒淳毒甚者酢且苦也周禮曰醯人掌共五齊七菹凢醯物以共􅀕祀之齊菹凢醯醬之物賔客亦如之齊菹醬屬醯人者皆酒醯成味王舉則共齊菹醯物六十罋共后及世子之醬齊菹賔客之禮共醯五十罋凢事共醯儀禮曰醯醢百罋夾碑十以爲列禮曰宋襄公葬其大人醯醢百甕又曰大功之䘮不食醯醬父母之䘮又朞而大祥有醯醬論語曰子曰孰謂微生髙直或乞醯焉乞諸其隣而與之史記曰通邑大都酤千釀醯漢武内傳曰西王母仙上藥有鳯林鳴酢魏名臣奏曰劉放奏云今官販苦酒與百姓争錐刀之末冝者息絶呉録地理志曰呉王築城以貯醯醢今俗人呼苦酒城晏子春秋曰蘭夲三年而成湛之苦酒則君子不近庶人不佩風俗通曰酢如蓂莢按蓂味酸工者取以調味􅀶物志曰酒􅁀熟者酢醢酸者易臰又曰龍􅁏以醯漬則文章生葛洪肘後方曰治齒痛用三年醶酢唐書曰􅀄薛仁果抜􅁗州召冨人磔於猛火之上或以醯灌鼻求其金寳又曰任迪簡萬年人舉進士􅀄爲天德軍使李景略判官性重厚常有宴行酒者誤以醯進迪簡知誤以景略性嚴慮坐主酒者乃勉強飲盡之而爲容其過以酒薄景畧請換之於是軍中感恱醢周禮曰醢人掌四豆之實朝事之豆其實韭菹醓醢昌菹麋臡菁菹鹿臡􅈋菹麇臡饋食之豆其實葵菹蠃脾析蠯醢蜃蚳醢豚拍魚醢加豆之實芹菹兎醢􅀷蒲醓醢箈菹鴈醢筍菹魚醢又曰醢人爲王及后世子共其内羞王舉則共醢六十罋以五齊七􅊽七菹三臡實之齊當爲韲五韲昌夲脾析蜃豚柏深蒲也十醢醘嬴蠯蚳魚兎鴈􅊽七菹韭菁􅈋葵芹箈筍菹三臡麋鹿麋臡也凢􅊽醬所和細切爲韲全物􅀂䐑爲菹也賔客之禮共􅊽五十罋致罋時凢事共醢禮曰孔子􅂘子路於中庭寢中庭也與􅂘師同親之有人吊者夫子拜之爲之主也旣哭進使者而問故使者自衛來計者故謂死之意􅃺使者曰醢之矣時衛世子蒯瞶纂輒而立子路死之醢之者尓欲㗖食以悕衆遂命覆醢覆弃之不忍食禮記外傳曰􅀕祀賔客菹醢之用醢􅁏醬之通名醢汁也湆亦汁也此等皆在豆以其濕故也籩竹器何盛乾也豆木也皆跌足取其去地髙絜醢有陸産畜之所生在陸者有水物天地隂陽之炁所生水草之品非人力所種自然絜臡者骨􅁏相􅄂爲之有麋鹿􅍪之臡麕大麞也字或作麏兎醢蚔醢皆陸産也砥蟻夘也有魚鴈蠃蠯之醢蜃蛤之􅀋也蜃似蚌而長也五者水物崔寔四民月令曰五月一日可作醢弘君舉食檄曰東里獨姥之醢太平御覽卷第八百六十六
