body:
  text: 兵部八十八楯下彭排銜枚棓椎楯下春秋元命苞曰帝俈戴干是謂清明發節移度蓋象招摇宋均曰干楯也招揺爲天戈戈楯相副戴之者象見天中以爲表者也史記曰項羽在戯下欲攻沛公沛公從百餘􅀐因項伯面見羽謝無有閉􅀜事羽旣饗軍士中酒亞父謀欲殺沛公令項莊拔劒舞坐中欲擊沛公樊噲在營外聞事急乃持劒楯入營衛士止噲噲直橦音撞入立帳下羽目之問爲誰良曰沛公叅乗樊噲羽曰壯士賜之巵酒􅇾肩噲旣飲酒拔劒切而㗖之羽曰能復飲乎曰臣死且不辭豈特巵酒乎漢書曰周亞夫子爲父買尚方甲楯五百􅀍張晏曰􅀍具也可以葬者取傭苦之不與錢傭知其盗買縣官怨而上變告子事連于亞夫亞夫歐血死又曰晁錯上言曰曲道相伏險阨相薄此劒楯之地也弓弩三不當一謝承後漢書曰孟政字子節地皇六年爲府丞虞卿書佐時太守缺丞視事毗陵有賊丞討之未到縣道路逢賊吏卒迸散政操刀楯與賊相擊丞得免難政遂死於路又曰江漢字山甫遷丹陽太守是時太江劇賊余來等刼擊牛渚丹陽邊水諸縣居民歐略良善經歳爲害漢到郡㑹集勁士脩整戰具鈎鑲刀楯大㦸長弓弩勁兵轉送承接余來亟戰失利遂見梟獲孝順帝喜其功賜以劒珮後漢書曰􅀽紹爲髙櫓起土山射曹操營中皆蒙楯而行東觀漢記曰逢萌字子康北海人少有大節家貧給事爲縣亭長尉過迎拜問事尉去舉楯擿地歎曰大丈夫安能爲人後耶遂去學問魏志曰建安五年太祖軍於官渡􅀽紹進保武陽稍前依沙塠爲屯合戰不利紹射營中雨下行者皆蒙楯衆大懼又曰太祖與吕布戰太祖募䧟陣典韋先將應募者數十人皆衣兩鎧棄楯但持長矛撩㦸魚豢魏略曰鮑出字文才京兆新豐人也逰俠興平中三輔亂出母爲賊所略出攘臂結袵獨持楯追之行數里及賊殺十餘人賊乃解還出母韋昭呉書曰魯肅欲渡江衆􅀐追肅肅植楯引弓射之矢貫洞􅀐度不制乃相率還呉録曰交阯朱鳶縣有㯽榔正直髙六七丈葉大如盾王隱􅀳書曰朱伺字仲文小爲牙門將内渉江夏便鞍馬弓弩刀楯射獵于寳􅀳記曰呉軍師張悌帥衆三萬濟江與討吴護軍張翰楊州刺史周凌成陣相對沈瑩領丹陽銳卒刀楯五千號青巾兵屢䧟堅陣沈休文宋書曰宗越南陽葉人也爲隊主蠻有爲冦盗者常使越討伐徃輙有功家貧無以市馬刀楯歩出單身挺戰衆莫能當每一捷郡將輙賞錢五千因此得買馬宋略曰寧朔將軍益州刺史劉豪少工刀楯勇冠三軍及在漢中忽脩長生之術使道士合金丹餌之咽而死及就殮屍如生宋元嘉起居注曰御史中丞劉損奏風聞前廣州刺史韋朗莅任虐法􅁀濁是彰於州所造牙楯三十幡朱􅀞青綾楯三十五幡請以見事追免朗前所居官南史王洪軓隨齊鎭新亭常以身捍矢髙帝曰我自有楯卿可防荅曰天下無洪䡄何防蒼生方亂豈可一日無公帝甚賞之齊書曰王冝興吴興人也形􅃺短小而果勁有膽力少年時爲刼不湏伴郡縣討逐圍繞數十重終莫能禽甞舞刀楯使十餘人以水交灑不能着北史曰後魏蠕蠕而兖切犯塞以任城王雲爲中軍大都督從獻文討之過大磧雲曰夷狄馬􅀄不見虎頭楯􅀂令舞楯在前破之必矣帝從之於是相率而歌方駕而前大破之獲其兇酋英雄記曰公孫伯圭追討叛胡丘力居等于管子城伯圭力戰兵乏食馬盡煑弩楯啖食之又曰􅀽紹討公孫瓉先令麴義領精兵八百強弩千張以爲前登瓉輕其兵少縱􅀐騰之義兵伏楯下一時同發瓉軍大敗蔡邕月令章句曰洪範經云兵革並起兵謂金刃革謂甲楯又曰審五庫之量金鐵皮革注曰去毛曰革犀兕水牛之属以爲甲楯鼔鞸張敞􅀳東宫舊事曰東宮外崇福門門各羗楯十幡鷄鳴㦸十張陶公故事曰臣侃奉獻金華大羗楯五十幡青綾金華楯五十幡王琰􅁳祥記曰東海何敬叔少而奉佛至㤗始中隨湘州刺史劉韞監營浦縣敬叔時遇有旃檀製以爲像像將就而未有光材敬叔意願甚懃而營索無處慿几微睡見沙門語敬叔云縣後何家有一桐楯甚堪像光其人極惜之苦求可得也敬叔寤問縣後果有何家因求買楯何氏云實有此楯甚愛惜之明府何以得知敬叔具􅀃所夢何氏驚奉以製先山海經曰羿與鑿齒戰于壽華之野羿射殺之羿持弓矢鑿齒持㦸盾郭璞曰鑿齒人類齒如鑿長五六尺又曰開明北有鳯鳥鸞鳥背戴􅚛􅚛音伐盾也張華􅀶物志曰朝廷都許時上先人刀劒楯物及銅犬盆殿上四角鼎皆先侯所賜得也劉義慶丗􅀃曰魏武征􅀽夲􅀄治裝餘有數十斛竹片咸長數寸衆並謂不堪用正合燒除太祖意甚惜思所以用之謂可以爲竹甲楯而未顯其言馳使以問楊主簿徳祖應聲荅與帝正同衆伏其辯悟異苑曰河南禇襃字季野將北伐軍士忽同時唱言可各持兩楯復相謂曰一人焉用兩爲及敗悉􅀒樐而退國語曰桓公問曰齊國寡甲兵爲之􅀂何管子曰輕過而移諸甲兵賈逵曰輕過輕罪也移諸甲兵以甲兵贖罪也桓公曰爲之􅀂何管子對曰輕罪贖一楯一㦸潜夫論曰虜或持銅鏡以象兵或􅀒板案以􅀋楯遑遽擾攘未能相一誠易制也淮南子曰夫栝淇衛箘簬音路髙誘曰栝翦栝也淇衛箘簬箭所出也載以銀錫戴飾也飾翦以銀錫雖有薄縞之䄡腐荷之櫓荷蓮草也櫓大楯也然猶不能獨穿也􅀂假之䈥角之力弓弩之勢則貫兕甲而經革楯矣經猶逹也楊泉物理論曰古有阮師之刀􅂫家之楯皆爲良工利噐時所寳貴也夫刀者身之寳也楯者身之衛也禦難之藩牆守之城池也夢書曰夢得鑲楯憂相􅀒也漢書楊雄校獵賦曰賁育之倫蒙楯􅀒羽杖鏌鎁而羅者以萬計呉都賦曰杭神龍之華殿施榮盾而捷獵勾踐將伐呉作榮盾嬰以白壁鏤以黄金􅃺􅀂龍蛇以獻呉王呉王受之施於姑蘇臺捷獵例次皃也言今起神龍殿亦施此物也又曰于鹵殳鋋暘夷㪍盧之施又曰家有鶴膝户有犀渠鶴膝矛也犀渠楯也一曰鎧犀革爲之李􅀹楯銘曰吴旂魯戎兵特湏也張奐與崔子真書曰㒒以元年到任有見兵二百馬如牿古督切羊矛如錐錟楯如榆葉錟徒甘切長牟也陶侃荅慕容瓌書曰當今楊淮銳勇飛廉超􅂹収屈盧必䧟之集鮫犀不入之楯􅁃闡責伍貟文曰自我來思踰歴中春淒風跨月芒雨積旬地藉濕蓐室無完幕負楯傳時伏櫓擊柝謝尚餉楊征南書曰五尺金斵頭刀一口碧綾車中楯一畨又與張涼州書曰今致碧綾車中楯一彭排釋名曰彭排旁也在旁排敵禦攻也晉安帝紀曰劉􅁉大破孫恩於䔉山思以彭排自載僅得還舩諸􅁑亮軍令曰帳下及右陣各持彭排銜枚詩曰我東曰歸我心西悲制彼裳衣勿士銜枚鄭玄曰勿猶無也無制彼裳衣而來謂兵服也示􅀄無行陳銜枚之事也禮記曰升正柩諸侯執綍五百人皆銜枚周禮曰銜枚氏下士二人徒八人鄭玄曰枚狀如箸横銜之銜枚氏掌司囂察囂讙者爲其聒亂國之大􅀕祀令禁母囂軍旅田􅃥令銜枚爲其言語以相誤也國語曰呉王起師軍于江北越王軍于江南越王乃令左軍銜枚泝江五里以湏亦令右軍銜枚踰江五里以湏賈逵曰逆流而上曰泝徑渡曰踰湏待也夜中乃令渉江鳴皷中水以湏越王以其中軍私率六千人銜枚以襲攻之呉師大北史記曰項梁率師攻􅁗􅁗使章邯距梁章邯夜銜枚擊楚殺項梁陸賈楚漢春秋曰髙祖向咸陽南趣宛宛堅守不下乃匿其旌旗人銜枚馬束口龍舉而翼奮雞未鳴圍宛城三匝宛城降漢書曰􅁗將章邯圍魏王咎於臨濟田儋都甘切將兵救魏章邯夜銜枚擊大破齊軍煞儋於臨濟下又曰趙充國擊西羗至金城湏兵滿萬􅀐欲渡河恐爲虜所􅃒即夜遣三校銜枚先渡渡輙營陣㑹明畢東觀漢記曰呉漢伐蜀分營於水南水北北營戰不利乃銜枚引兵徃合水南營大破公孫述梁祚國統曰孫權甞賜甘寧酒米寧以米賜帳下乃以銀椀酌酒自飲次與其郡督次酌其次命銜杖出斫敵王隱晉書曰母丘儉文欽反遣鄧艾進屯樂嘉欽果夜銜枚襲艾等昧爽至于城下又曰王浚都督幽州諸軍事成都王使和演發兵殺浚單于以演謀告浚州府逼近銜枚宻嚴夜與單于圍演演持白幡請降孫嚴宋書曰栁元景揔軍北討元景至弘農營於開方口衆軍並造陜下元景遣軍副柳元怙簡歩􅀐二千一􅀫而至遂合戰元怙悉偃旗皷士馬皆銜枚潜師伏甲而進旣出賊不意虜衆大駭王智深宋書曰劉誕作亂孝武帝使沈攸等伐之於是龍驤將軍卜天生推車塞壍率敢死數百人銜枚先登習鑿齒漢晉陽秋曰􅀄魏軍始入蜀劉禪分二千人付羅獻留守呉聞蜀敗遂起兵遣盛憲謝詢等水陸並到􅀃獻以合從之計獻謂諸將曰今處􅀌城百姓無主呉人因釁公敢西過冝一决戰以示衆心遂銜枚夜岀擊破憲盧綝􅀳四王起事曰天子自鄴至洛右將軍張方逼帝幸長安河間王率叅佐到覇水上迎人兵去路百餘歩銜枚屯列崔鴻後秦録曰永和二年遣武衛姚鸞營于大路晉將沈林子簡其軍中精銳朱逺等銜枚夜襲鸞營鸞死之又前凉録曰張璩字元琰年十四拜奉車都尉從梁肅征隴右與王擢遇於邢崗相拒十日璩銜枚宻擊大破之由是顯名又蜀録曰李特使弟驤屯軍毗橋以備羅尚尚遣將張興僞降於驤以觀虚實興夜歸白尚尚遣精勇萬人銜枚隨興夜襲驤營驤及將士奔于流柵越絶書曰呉王闔閭問伍子胥軍法子胥曰王身將即疑舡旌麾兵㦸與王舡等者七艘將軍疑舡兵㦸與將軍舡等三舡皆居於大陣之左右有敵即出就陣吏卒皆銜枚敖歌擊皷者斬曹瞞傳曰公將襲􅀽紹軍乃選精銳歩􅀐皆銜枚􅅞馬口夜從問道出人抱束薪至紹圍屯大放火營中驚亂大破之太公六韜曰以少擊衆必以日之暮人操炬火合則滅之或皷呼而行或銜枚而止呉孫子三十二壘經靈輔曰移車移旗以順其意銜枚而陳分師而伏後至先擊以戰則克魏文帝兵書要略曰銜枚母讙譁唯令之從左思呉都賦曰銜枚無聲悠悠斾旌棓棓與棒通用服䖍通俗文曰大杖曰棓歩項切魏志曰鍾㑹反囚將軍胡烈等與子䟽云㑹帳下督丘建宻􅀃消息㑹以作大坈白棓數千欲呼外兵入以次棓殺投置坑中外兵聞乃殺㑹曹暪傳曰操爲洛陽北部尉繕治四門造五色棒懸門左右各數十枚有犯禁者不避豪強輙棒殺之虞浦江表傳曰孫皓以張布女爲羙人皓先報布後問羙人曰尓父何在荅曰賊巳殺之皓大怒即棒殺美人沈約宋書曰後廢帝昱或有忤意者輙加以虐刑有白棒數十枚各有名號鍼鑿錐鋸之徒不離左右甞以鐵錐椎人隂破六韜曰方胥鐵棓重十二斤柄長五尺千二百枚一名天棓許慎注曰大杖以桃爲之擊殺羿是以􅀑畏挑人也枹朴子呉遣賀將軍討山賊中有善禁者每交戰官軍刀劒皆不得拔將軍乃多作勁木白棓擊之禁不復行因而尅賊又曰余願世人改其無檢之行除其驕簡之失則趙勝之門無去客黄祖之棓無所用矣晉宣帝敎曰當教諸圍上守土皆作棓人一枚輕重長短者各各可守皆當頭施紉挂臂賊破死在旦夕邂逅衝突圍當以棓棓之髙堂隆陳灾異表曰石氏星占曰天棓五五星天之杖也主檛棓亂兵客星彗茀干犯棓兵大起二年消復之冝罷省百􅃥勿使士卒怨於勤苦而爲亂足其廪食度可勞然後用之則士卒安而無亂兵矣椎史記曰張良爲韓報讎得力士爲鐵椎重一百二十斤擊始皇博浪沙中誤中副車又曰朱亥䄂四十斤鐵椎椎􅀳鄙漢書曰淮南厲王長髙帝少子也有才力力扛鼎乃徃請辟陽侯出見之即自䄂金椎推之命從者刑之太平御覽卷第三百五十七
