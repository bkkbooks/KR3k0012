front:
  text: 太平御覽卷第二百五十
  hash: sha256:f1912911920eb70db28e8612d94bd8b0938e33fb9c5ecb59f25303b0c8ae6acc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_250-1a}
body:
  text: 職官部四十八司􅀠校尉州牧司􅀠校尉通典曰司􅀠周官也掌五􅀠之法辨其物而掌其政令五􅀠謂罪􅀠蠻􅀠閩􅀠夷􅀠貉􅀠也物謂衣服兵器之属帥其民而捕其盗賊漢書曰諸􅁑豐爲司􅀠無所廽避京師爲之語曰間何闊逢諸􅁑言間者何乆闊不相見以逢諸􅁑故也侍中許章以外属貴幸賔客犯法與章相連豐欲劾奏適逢章出豐駐車舉節招章曰下欲収之章馳去豐奔車逐之章突入殿得免由此成帝遂収豐節也又曰鮑宣字子都明經爲司􅀠丞相孔光行園陵官属行馳道中宣使鈎止丞相􅁺史没入其車馬以摧辱宰相事下御史中丞官欲捕從事閉門不内宣坐閉拒使者大不敬下獄愽士弟子王咸舉幡太學下曰欲救鮑司􅀠者㑹此下諸生㑹者千餘人朝日遮丞相孔光自言丞相車不得行宣罪减死一等又曰蓋寛饒字次公爲司􅀠校尉子常歩行好直言犯上無所廻避又曰王駿爲司􅀠校尉奏免丞相匡衡東觀漢記曰鮑永爲司􅀠校尉時趙王良從上送中郎將來歙䘮還入夏城門中與五官將軍相逢道迫良怒召門􅀱岑尊叩頭馬前永劾奏良曰今月二十七日車駕臨故中郎將來歙䘮還車駕過湏􅁷趙王良從後到與右中郎將張邯相逢城門中道迫狹叱邯旋車又召門􅀱岑尊詰責使前走數十歩按良諸侯藩臣蒙恩入侍知尊帝城門使􅀱吏六百石而肆意加怒令叩頭都道走馬頭前無藩臣之禮大不敬也後漢書曰鮑昱爲􅀠在職奉法守正有父風永平五年坐救火遟免又曰鮑永爲司􅀠鮑恢爲都官從事並不避強禦詔䇿曰貴戚且當歛手以避二鮑其見憚如此永子昱復爲司􅀠􅀄拜使封胡降檄丗祖遣問昱曰有所恠否對曰臣聞故事通官文書不著姓名又當司徒露布怪使司􅀠下書而著姓也上曰吾故欲令天下知忠臣之子復爲司􅀠又曰李􅈾字元禮拜司􅀠校尉張讓弟朔爲野王令貪殘無道畏膺而逃藏讓舎柱中􅈾率將吏破柱取朔付獄殺之讓訴􅁈於帝帝詔詰􅈾􅈾曰昔仲尼爲魯司㓂七日而誅少正夘今臣到官巳積旬懼以淹留爲諐不意獲速疾之罪乞留五日克殄元惡帝謂讓曰汝弟之罪也自是宦官屏氣休沐不敢復出帝問其故並叩頭泣曰畏李司􅀠也又曰司􅀠校尉下邳趙興亦不䘏諱忌䘏憂也毎入官舎輙更繕脩館宇移穿改築故犯妖禁而家人爵禄益用豐熾官至頴川太守子峻太傅以才器􅁛孫安代魯相三葉皆爲司􅀠時􅁛其盛又曰江馮上言冝令司􅀠校尉督察三公陳元議以爲不冝使有司省察公輔乃止續漢書曰陽球字方正漁陽人也少有勇氣尚書令中常侍王甫曹節等秉權􅀔球常唾手拊髀曰陽球作司􅀠此曹子何得尓􅁘㝷爲司􅀠明日詣闕謝恩甫時休下在舎恩表甫罪収送洛陽詔獄自臨栲之甫子萌亦見収又曰牟融拜司􅀠校尉典司京都執憲持平多所舉正百僚莫不敬憚又曰百官志曰司􅀠校尉一人比千石孝武持節常察舉百僚以下及京師近都犯法者謝承後漢書曰華松擢爲司􅀠校尉是時貴戚專勢有司軟弱莫敢糺罰松下車閉閤不通私書不與豪右相見姦慝犯者輙死奏馬氏三侯群豪歛手應劭漢官儀曰司􅀠校尉糺皇太子三公以下及旁州郡國無不統陛坐見諸卿皆獨席魏志曰徐宣遷司􅀠校尉從至廣陵大軍乗舟風浪􅁀起帝舩廽到宣舩在後凌波而前群竂無至者帝壯之又曰鍾㑹爲司􅀠校尉雖在外司時政損益當丗與奪無不畢綜晉書曰傅玄轉司􅀠校尉獻皇后崩於弘訓宫設䘮位舊制司􅀠於端明外坐在諸卿上絶席而入殿按夲品秩在諸卿下以次坐不絶席而謁者以弘訓宫爲殿内制玄位在卿下玄恚怒厲聲色而責謁者妄稱尚書所處玄對百寮而罵尚書以下御史中丞􅁃純奏玄不敬玄又自表不以實坐免官然玄天性峻急不能有所容每有奏劾或值日暮捧白簡整簮帶竦踊不寐坐而待旦於是貴㳺懾㐲臺閣生風臧榮緒晉書曰􅀓咸以議郎長兼司􅀠校尉咸前後固辭辭旨懇切上不聽切勑使者逼就拜授咸悲鯁傷咽以身無兄弟職無假到官之日䘮􅀕無主重自陳乞遂不見聽聽於官舎設靈坐朔望􅁗􅀕咸卧病治職時朝廷寛㢮豪右放恣郡縣容縱㓂盗充仞攻篡囚徒掠奪市道交私情託朝野溷淆咸於是奏免河南尹京都肅然貴戚憚之數月之間三奏免選官奏按謇諤終無曲撓雖不見從有司肅然晉志曰漢武帝􅀄置十三州刺史各一人又置司􅀠校尉察三輔三河弘農七郡晉諸公賛曰劉毅字仲雄爲司􅀠奏太尉何曽尚書劉寔父子及羊琇張他等所犯狼藉司部守令事相連及覩風投印綬者甚衆皆以爲毅能継諸􅁑豐蓋寛饒也崔鴻十六國春秋前秦録曰王猛望燕師之衆惡之謂鄧羗曰今日之事非將軍莫可以捷也成敗之機在斯一舉將軍其勉之羗曰􅀂以司􅀠見與者公無以爲憂唐書官品志曰司􅀠臺大夫一人正四品掌諸廵察其所掌六條一察品官以上理政能不二察官人貪殘害政三察豪強姧猾侵害下人及田宅踰制官司不能禁止者四察水旱蟲災不以實言枉徴賦役及無災妄蠲免者五察部内賊盗不能窮逐隱而不申者六察德行孝悌茂才異行隱而不貢者毎年二月乗軺廵郡縣十月入奏英雄記曰董卓謂王允曰欲得一快司􅀠校尉誰可作者允曰唯有蓋勲元周京兆耳卓曰此明智有餘不可假以雄職列異傳曰故司􅀠校尉上黨鮑子都少時上計􅁺於道中遇一書生獨行時無伴卒得心痛子都下車爲按摩奄忽而亡不知姓名有素書一卷銀十鉼即賣一鉼以殯其餘銀及素書着腹上呪之曰􅀂子魂靈有知當令子家知子在此今使命不􅀗乆留遂辝而去至京師有􅍡馬隨之人莫能得近唯子都得近子都歸行失道遇一􅀜内侯家日暮住􅀫見主人呼奴通刺奴出見馬入白侯曰外客盗􅀐昔所失􅍡馬侯曰鮑子都上黨髙士必應有語侯曰􅀂此乃吾馬昔年無故失之子都曰昔年上計遇一書生卒死道中具述其事侯乃驚愕曰此吾兒也侯迎䘮開椁視銀書如言侯乃舉家詣闕上薦子都聲名遂顯至子永孫昱並爲司􅀠及其爲公皆乗騘馬故京師歌曰鮑氏騘三入司􅀠再入公馬雖疲行歩轉工􅀓咸集教曰司􅀠校尉舊號卧虎誠以舉綱而萬目理提領而衆毛順州牧漢書曰何武與翟方進奏曰古選諸侯賢者以爲州伯今部刺史居牧伯之位選第大吏所爲位髙至九卿所惡立退任重職大春秋之義用貴治賤不以卑臨尊刺史位下大夫而臨二千石輕重不相凖請罷刺史更置州牧以應古制奏可續漢書曰皇甫嵩領冀州牧奏請一年租以賑飢民民歌曰天下亂􅀆市爲墟母不保子􅀆妻失夫頼有皇甫􅀆復安居吴志曰吕範拜楊州牧性好威儀州民如陸遜全琮及貴公子皆脩敬䖍肅不敢輕脫也其居家服飾於時奢靡然勤事奉法故懽恱其忠不怪其侈又曰吕岱􅀓廖式作亂圍城邑零陵蒼梧􅊊林諸郡騷擾岱自表輙行星夜兼路權遣使追拜岱交州牧晉書曰張茂爲凉州牧武公軌之子也築靈鈞臺周輪八十餘堵其髙九仞武陵人閻曽夜叩門呼曰武公遣我來曰何故勞百姓而築臺乎姑臧令辛巖以曽妖妄請殺之茂曰吾信勞人曽稱先君之令何爲妖乎太府主簿馬魴諌曰今丗難未夷唯當弘道業不冝勞役崇師臺榭比年已來轉覺衆務日奢於徃毎所經營輕違雅度實非士女所望於明公也茂曰吾過也命止作役又曰張駿爲涼州牧刑清國冨群寮勸進􅁛涼王領􅁗凉二州牧置公卿百官如魏武晉文故事駿曰此非人臣所冝言也敢有言此者罪在不赦然境内皆􅁛之爲王北史曰裴俠甞與諸牧守俱謁周文文命俠別立謂諸牧守曰裴俠清慎奉公爲天下之㝡令衆中有如俠者可與之俱立衆皆黙然無敢應者周文乃厚賜俠朝野歡服焉號爲獨立使君北史曰後魏廣陽王嘉遷司州牧嘉表請於京四面築坊三百二十三各周一千二百歩乞發三正復丁以充兹役雖有暫勞姧盗永止詔從之後周書曰蘇綽爲六條詔書奏施行之太祖甚重之常置諸座右又令百司習誦之其牧守令長非通六條計帳者不得居守太平御覽卷第二百五十
