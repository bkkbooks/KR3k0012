front:
  text: 太平御覽卷第一百八十四
  hash: sha256:b6a78d27248c7ffd5d27a81d6e0b2e9de77d776ef7c2711ef45538175d33ec95
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_184-1a}
body:
  text: 居處部十二户樞􅀜鑰闈閨閤閣簃闥户釋名曰户護也所以謹護閉塞也說文曰半門曰户易豐卦窺其户閴其無人毛詩鴻鴈斯干曰築室百堵西南其户大戴禮曰隋武子户之銘曰夫難得而易失又夏小正曰七月漢案户漢天漢也案户者直户也言正南北也禮記曲禮上曰户外有二屨言聞則入言不聞則不入將入户視必下入户奉扄視瞻母囬不于掩人之私户開亦開户闔亦闔有後入者闔而勿遂又禮運曰大道之行外户而不閇是謂大同又王藻曰君子之居􅁪當户自明又月令曰孟春其祀户􅀕先脾陽氣出祀之於户也論語曰子曰誰能岀不由户者何莫由斯道也史記田嬰賤妾有子名文五月五日生嬰告其母勿令舉妾竊舉之及嬰見文怒曰五月之子長與户齊不利其父母文頓首曰人生受命于天乎受命于户乎如受命于户則髙其户誰能至者嬰歎曰子休矣後漢龐叅爲漢陽太守郡人任棠者有竒節隠居教授叅到先􅀱之棠不與言但以薤一大夲水一盞致於屏前自抱孫兒伏於户下主簿白以爲琚叅思其微意良乆曰棠是欲曉太守也水者欲吾清也拔大薤夲欲吾擊強宗也抱兒當户欲吾開門恤􅀌也於是歎息而還叅在職果能抑強扶弱以惠政得人又曰魏應字君伯任城人也少好學建武􅀄詣博士受業習魯詩閇户誦習不交僚友京師稱之又曰魯恭十五及弟丕俱居大學習魯詩魯申公詩􅐬户講誦絶人間事兄弟俱爲諸儒所稱學士爭歸之􅀳書羊祐􅀓襄陽百姓於峴山祜平生遊憇之所建碑立廟歳時饗􅀕焉望其碑者莫不流涕杜預因名爲墯淚碑荆州人爲祜諱名屋室皆以門爲稱改户曹爲詞曹也老子曰不出户知天下莊子曰原憲居魯蓬户不完桑以爲樞也慎子曰天明不憂人之闇雖不憂闇也闕户牖必取以明焉淮南子曰使􅀑神􅀇化則不待户牖而行若循虚而出入則亦無履也夫户牖者風氣所從往來也而風氣者隂陽之户牖者也離者必病離遭故託􅀑神以戒之又曰百星之明不若一月之光十牖畢開不若一户之明楊子法言曰山徑之蹊不可勝由矣向牆之户不可勝入矣曰惡由入曰孔氏曰孔氏者户也曰子户乎曰我户哉吾獨有不户者矣惡大不由聖人之道者也三輔黄圖曰明堂有三十六户法極隂之變數束晢發蒙記曰治户傷孕婦楚國先賢傳曰孫敬入學閉户牖精力過人太學號曰閉户先生語林曰大將軍丞相諸人在此時閉户共爲謀身之計王曠世􅀪來在户外諸人不容之曠乃剔壁闚之曰天下大亂諸君欲何所圖謀將欲告官遽而内之遂建江左之䇿神異經曰東南有石井焉上二石闕東南面上有榜着闕題曰地户列士傳曰吴王闔閭畏王僚之子慶忌作石室銅户以備之太公金匱户之書曰出畏之入懼之也解道虎齊記曰巢父城北十五里石户聖人去轉欲閇今裁廣數寸窺屋裏方二丈論衡曰燕王生明光宫所卧處三户盡閉使二十人開不得越地傳曰勾踐宫有百户列仙傳曰方回堯時􅀮人食雲母夏桀時爲人所閉於宫中從求道因化得去印封其户時人曰得方回一丸泥閇户不可開樞爾雅曰樞謂之椳郭璞注曰門户屝樞也孫炎曰門户扇樞開可依蔽爲提也說文曰門樞謂之椳魏志華佗曰户樞不朽潜夫論曰貴戚懼家之不􅁻而聚爲令名懼之不堅而爲作鐵樞卒其所敗者非禁忌少門樞朽也苦崇貨財而行驕僣失民心耳事具門部􅀓子曰漢武世王侯觀殿重階金樞紫墀李陵詩曰明月照户樞想見餘光輝文選詩曰􅁗地天下樞八方溱賢才尚書顧命曰四人綦弁執戈上刃夾兩階戺孔安國曰綦文鹿子皮弁亦土也堂廉曰戺土所立處爾雅曰樞逹北方謂之落時落時謂之戺郭璞曰門特樞者或達北􅀮以爲固三秦記曰明光殿以金爲戺關易復卦曰先王以至日閇關啇旅不行后不省方焦貢易林曰大畜之乾金柱鐵關堅固衛災君子居之居當憂居左傳襄四年季孫攻臧紇斬鹿門之關以出奔邾杜預曰魯南城東門方言曰關而東陳楚之間户籥老子曰善閉無關史記曰侯嬴謂魏公子曰嬴乃夷門抱關者又漢書王仲翁謂蕭望之曰不肯録録反抱關爲錄疑循常也魯連子曰魯連先生見孟甞君於杏堂之門孟甞君曰吾聞先生有勢數可得聞乎連曰勢數者譬若門關舉之而便則可以一指持中而舉之非便則兩手不關非益加重兩手非加罷也彼所起者非舉勢也彼可舉然後舉之所謂勢數鑰周禮地官曰司門掌授管鍵以啓閉國門鄭司農云鍵爲壯也方言曰關西謂之鑰何承天纂文曰壯出鑰者也人作鑰子鑰母非也東宫舊事曰守鑰四人對畨上下東宮門鑰在中庶子坊太公金匱鑰之書曰昏慎守深察訛也風俗通曰鑰施懸魚翳伏淵源欲令揵閉如此闈爾雅曰宫中門謂之闈周禮考工記曰闈門容小扃蔡邕明堂月令語曰明堂之門北門稱闈閨爾雅曰闈小者謂之閨說文曰閨持主户也上圎下方有似於圭文選曰閨中風暖閤說文曰閤門傍户也爾雅曰小閨謂之閤史記曰汲黯爲東海太守以清静爲政黯多病卧閤内不出歳餘東海大治漢書曰公孫􅀪爲丞相起客館開東閤以延賢人又曰田延年盗三千萬即閉閤獨居偏􅃝持刀東西歩數使者召延年詣廷尉聞鼔聲自刎死漢書曰左馮翊韓延壽行縣之髙陵有昆弟相與訟田延夀耻不能明教化因入傳舎閉閤思過訟者自髠肉􅃝謝之宋書曰孝武宴朝賢張暢何偃並在坐偃因醉曰張暢固是竒才同義宣作賊亦能無咎非才何以致此暢乃厲聲曰太􅀄之時誰黄其閤帝曰何事相苦􅀄元凶時偃父尚之爲元凶司空義師至新林門生皆逃尚之父子與婢妾共洗黄閤故暢譏之晉宫閤名曰洛陽宫有金光閤清陽閤朱明閤承休閤安樂閤白藏閤顯仁閤崇明閤章徳閤飛雲閤安世閤長安閤長安有東明閤西華閤紫闥閤傳􅀇歌詩曰我家近宮掖易知復難忘黄金爲閤門白玉爲殿堂􅀳宫閤名曰洛陽有金光閤文成閤明度閤飛雲閤安世閤長安有東明閤西華閤紫闥閤宋志三公黄閤前史無其義按禮記士韠與天子同公侯大夫則異鄭注云賤與君同不嫌也夫朱門洞開當陽之正色也三公與天子禮秩相亞故黄其閤以示嫌不敢近天子也且漢制云爾閣周書作雒曰凡五宫堂咸有􅀷閣韓詩外傳曰黄帝時鳯皇集東園止於阿閣棲梧桐食竹實終身不去禮記内則曰大夫七十而閣天子之閣左逹五右逹五鄭􅀇注曰閣以板爲之藏食物也王者三牲􅁏及魚腊廣雅曰棧閣也漢書曰甘露中五經諸儒雜論於石渠閣又楊雄傳曰王莽時雄校書天禄閣上治獄使者來欲収雄雄恐不免乃從閣上自投幾死莽聞之曰雄素不與事何故在此間請問其故廼劉愔子棻甞從雄學作竒字雄不知情有詔勿問然京師爲語曰惟寂惟寞自投于閣後漢楊級上言宣帝博徴群儒論定五經於石渠閣方今天下少事學者得成其業而章句之徒破壞大體冝如石渠故事永爲後世法於是詔諸儒於白虎觀論考同異焉陳書曰至德二年後主於光昭殿起臨春結綺望仙等三閣長數丈並數十間其䆫牖户壁皆以懸柏欄檻之􅀋並以沉檀香木爲之又飾以金玉間以珠翆外施珠簾内有寳帳其服玩之屬瑰寳珎異皆近古所未有每微風暫動香聞數里朝日􅀄照光映後庭其下積石爲山引水爲池植以竒樹雜以花藥後主自居臨春閣貴妃居結綺閣龔孔二貴嬪居望仙閣並􅃨道交相往來五代史朱梁傳曰宰相柳璨奏西京舊有凌煙閣圖􅀞國􅀄功臣今遷幸東都比未崇建四鎮副元帥梁王勲業冠古請近新凌煙閣別創一閣圖􅀞梁王以旌徳業詔曰魏賞彭陽之功別創紀勲之觀齊旌泗水之績乃崇嘉德之樓式示新䂓爰從舊典冝令所同於皇城内擇善地别造凌煙閣圖冩賜名曰天祐旌功之閣戰國筞曰田單棧道木閣以迎齊襄王及后於城陽山反之國楚漢春秋曰項王爲髙閣置太公於上告漢王曰今不急下吾烹太公漢王曰吾與項王約爲兄弟吾翁即汝翁若烹汝翁幸分我一杯羮三輔舊事曰􅁗二世欲起凌雲閣與南山齊漢宫殿䟽曰天禄閣騏驎閣蕭何造以藏袐書􅀞賢臣凌雲閣􅁗二世造洛陽宫殿簿曰髙平觀南行至淸覽觀髙閣六十四間脩齡觀南行至臨啇觀髙閣五十五間太極殿前南行仰閣三百二十八間南上惣章觀閣十三間東上凌雲臺閣十一間永寜宫連閣二百八十六間十二間連閣上下數見親觀差閣九間洛陽地記曰雲臺髙閣十四間乗風觀髙閣十二間丹陽記曰漢魏殿觀多以􅃨道相通故洛宫之閣七百餘間三輔故事曰天禄閣石渠閣在大殿北以閣祕書又􅀞賢臣象凡十一人霍光第一蘇武第十二尸子曰泰山之中有神房阿閣物理論曰故人之任孕者惣其名籍上之天府天子立金匱玉閣命司録以監省之西京記曰西京大明正中含元殿殿東西翔鸞棲鳯閣下肺石登聞皷左右龍尾道東京記曰紫微宫有臨波閣閶闔閣班固西都賦曰周廬千列徼道綺錯輦輅經營蘭除飛閣張衡西京賦曰鈎陳之外閣道穹隆屬長樂與明光徑北通乎桂宫􅁑龔反遂􅀄賦曰考天文於蘭閣覽羣言於石渠古詩曰交䟽結綺䆫阿閣三重階陸機樂府詩曰昌門何峨峨飛閣跨通波崔􅄾七蠲曰紫閣青宫綺錯相連東京賦曰飛閣神行南都賦曰連閣煥其相輝上林賦曰重座曲閣陸機表云登三閣注三閣謂祕書郎掌内外三閣經書鮑昭詩觀霞登綵閣蜀都賦曰行陽城之延閣注延長也江淹表云府之延閣注延閣書府也天台賦曰朱閣玲瓏於雲間陸機詩曰飛閣纓虹帶張景陽七命翆觀岑青彫閣霞連謝􅀇暉詩曰㝷雲陟累樹隨山望茵閣楚辭曰蘭閣􅀆黄樓古詩曰層閣肅天居簃音馳又音移爾雅曰連閣謂之簃郭璞注曰堂樓閣連小屋今呼之簃蹰連觀也通俗文連閣曰簃闥東觀漢記曰帝詔馬嚴留仁壽闥與校書杜撫班固定建武注記晉宫閣名曰洛陽宫有崇陽闥延明闥通明闥脩雲闥通福闥徴音闥承休闥􅀇明闥􅀇暉闥崇禮闥白藏闥太平御覽卷第一百八十四
