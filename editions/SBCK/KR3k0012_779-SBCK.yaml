front:
  text: 太平御覽卷第七百七十九
  hash: sha256:d23d82c8582592883d4e32f9b33e60f7048d7c81bdca642f09c87f2c578488bc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_779-1a}
body:
  text: 奉使部三奉使下三輔故事曰婁敬曰臣願爲髙車使者持節往至匈奴庭與其分土定界敬至曰汝夲處北海之濵􅁗亂汝侵其界居中國地今婚姻己成當還汝夲牧還我中國地作舟書鐵劵曰自海以南􅃣盖之士處焉自海以北控弦之士處焉割土盟誓然後求還華陽李郃別傳曰郃字孟君漢中人和帝即位分遣使者循州郡觀風俗皆微服單行使者二人當到益州􅄬公舎􅀫時夏月露坐爲出酒與談公仰視問曰二君發京師時寧知二使者何日發耶二人驚相視而曰不聞問公何以知之公指星有二使星向益部二人知其深明遂共談甚嘉異焉風俗通曰周􅁗常以􅀊八月遣輶車之使采異代方言還奏之事藏祕室晏子春秋曰晏子使呉呉稱曰天子請見晏子蹵然曰臣受命弊邑使於呉王臣迷惑入于天子之朝敢問呉王惡存呉王夫差請見以諸侯之禮又曰晏子使楚楚王進橘置削晏子不剖而并食王曰橘去剖對曰臣聞之賜人主者􅀲桃不削橘柚不剖臣故不敢剖臣非不知又曰晏子使楚楚人爲小門而延晏子晏子不入曰使狗國者從狗門入今臣使楚不當狗門入也王曰齊無人耶對曰齊之臨淄三萬户張􅃑成帷揮汗成雨何爲無人齊以賢者使賢主不肖者使不肖主嬰不肖是故使王耳又曰晏子聘楚楚王知其賢智欲辱之使人縛一人從殿前過佯問之此何罪也左右荅曰此齊人也今犯盗王謂晏子曰齊國善盗也晏子荅曰臣聞江南生橘江北爲枳土地使其然也臣察此人在齊不爲盗今來楚而盗亦土地使然也楚王大慙漢雜事曰呉楚七國反齊孝王城守膠西濟南三國圍齊齊使路中大夫告於天子還報曰堅守此至三國圍齊已數重矣無從入三國將與路中大夫盟􅀂反言漢已破大夫許之至城下望見齊王曰漢已發兵百萬使太尉周亞夫擊破呉楚引兵救齊齊必堅守三國將誅路中大夫韓詩外傳曰越王勾踐使廉稽獻民於荆使者越夷狄之國也臣請欺其使者荆王越曰王賢人也其使者亦賢子慎之使者出見廉稽曰冠則得以見廉稽曰夫越亦周室之列封也不得處中國則處江海之陂與黿鱣魚鼈爲伍文身剪髮而後處焉今來至上國必曰􅃣乃得見不􅃣不得如此則大國使適越亦將劓墨文身剪髮而後得見乎荆王披衣出謝又曰魏文侯有子曰擊次曰訢訢少而立以爲嗣封太子擊於中山三年不徃來其􅀓趙倉唐諌曰父忘子子不可忘父何不遣使乎擊曰願之乆矣未有所使倉唐對曰爲之使則臣請使擊曰諾於是乃問君何所好與所嗜曰君嗜晨鳬好北大遂求晨鳬北大齎行倉唐至曰北藩中山之君有北大晨鳬使倉唐再拜獻之文侯曰嘻擊知吾好北大晨鳬也即見使者文侯曰擊無恙乎倉唐唯唯三問而不對文侯曰不對何也倉唐曰臣聞諸侯下名君旣己賜弊邑使得小侯國不敢對也文侯曰中山君無恙乎倉唐曰今者之來拜送於郊文侯曰中山君長短􅀂何矣倉唐曰聞諸侯比諸侯不朝則側者皆人臣也臣無所比之然則所賜之裘幾能勝之矣文侯曰中山之君亦何好乎對曰好詩文侯曰於詩何好曰好􅁰離與晨風文侯曰􅁰離詩何哉對曰彼􅁰離離彼稷之苗行邁靡靡中心揺揺知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉文侯曰怨乎曰非敢怨也時思也文侯曰晨風謂何對曰詩云鴆彼晨風鬰彼北林未見君子憂心欽欽如何如何忘我實多此以忘我者也於是大恱曰欲知其子視其母欲知其君視其使中山君􅀂不賢惡能使其使賢遂廢太子訢而召中山君以爲嗣􅀃􅁐曰􅁗王以五百里地封􅋣陵君君不受使虞且謝􅁗王忿然作色謂且曰亦嘗見天子之怒乎曰臣未嘗見也王曰天子之怒伏尸百萬流血千里且曰大王亦嘗見布衣韋帶之士怒乎王曰布衣韋帶之士怒則解冠徒跣以頭槍地耳何難知者且曰此乃庸夫之怒耳布衣之士怒伏尸二人流血五歩即持其匕首起視􅁗王曰今將是矣􅁗王變色長跪曰先生就坐寡人諭矣又曰趙王遣使者之楚方鼓瑟而送之誡之曰必如吾言注事具瑟門又曰齊使淳于髠聘楚髠爲人形兒短小楚王薄賤之曰謂之齊無人耶而使子來乎何長也髠對曰臣無所長要中七尺之劒欲斬無狀王王曰止吾但戯子耳與髠共飲酒又曰晉楚之君爲好㑹􅁐丘之上宋使人臣晋楚大夫曰趣以天子禮見吾我將見子使者曰冠雖弊義居上履雖新義居下周室微諸侯未之能易也師雖昇未城臣猶不更臣之服也遂以諸侯禮見之又曰楚使者聘齊齊王享之梧宫使者曰大哉梧乎王曰江海之魚吞舟國之樹臣公使者王曰昔燕攻齊遵雄路渡濟橋楚雍問擊齊左而虚其右王鼎絶頭乎杜山公孫羌格死于龍門飲馬乎淄澠宣獲乎瑯瑘王與太后奔乎莒逃城陽之山此時梧之大小何如矣力渤對曰使者問梧之年即昔荆州王爲無道加諸申氏殺子胥父與兄子胥􅀍髮食於呉闔廬以爲相三年將兵復讎于楚戰勝舉級頭百萬囊瓦奔鄭王保於隨師入郢胥行郢都親射宫臨于王􅃁笞其墓􅀂此則梧可爲拊也又曰明君之使人也任之以事不制之以辭王逸子曰或問張騫可謂名使者歟曰周流斷城東西數萬里其中胡貊皆如其習俗得始大䔉蒲萄首蓿等語林曰魏武將見匈奴使自以形陋不足雄逺國使崔季珪代當坐自捉刀床頭座旣畢令人問魏王何如使荅曰魏王信曰雅望非常然床頭捉刀人此乃英雄也魏王聞馳遣殺此使天文要集曰天節星主奉使小而明則使中正也梁元帝鄭衆論曰漢丗銜命匈奴困而不食者二人而己子卿手持漢節卧伏氷霜仲師固無下拜陽絶太水况復風生稽落日隱龍堆翰海飛沙臯蘭走霰豈不酸鼻痛心憶雒陽之宫陛屑泣撗悲想長安之城闕直以爲臣之道義不爲生事君之節生爲義盡豈望拔幽泉出重仞經長樂抵未央及還望塞亭來依候火傍觀上郡側眺雲中雖在己之自隆而於時之報未重梁劉孝儀北使還與永豐侯書曰足踐寒地身犯朔風暮􅀫客亭晨炊謁舎飄颻辛苦迄屇氈郷雜種覃化頗幕中國兵傳李緒之法樓擬衛律所治而毳幕難淹酪漿易厭王程有限時反玉關射鹿胡奴乃共歸國刻龍漢節還待入塞馬衘苜蓿嘶逗故墟人獲蒲萄歸種舊里稚子出迎善隣相勞倦握蟹螯亟覆蝦椀毎取朱顔略多自醉用此終日亦自娯太平御覽卷第七百七十九
