  text: 太平御覽卷第四百五十
  hash: sha256:2fce603498505dfe0df51a214cc11926966d137c8a211fa4dd37c13d8ddbd6cf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_450-1a}
body:
  text: 人事部九十一權謀下尚書大傳曰周公先謀於同姓同姓從然後謀於朋友朋友從然後謀於天下天下從然後加之蓍􅀛是以君子聖人謀義不謀不義故謀必成卜義不卜不義故卜必􅁻以義擊不義故戰必勝是以君子聖人謀則成戰則勝戰國䇿曰􅁗攻趙長平大破之而歸因使人索六城於趙講計未定婁緩新從􅁗來趙王與緩計曰與􅁗地何如勿與緩曰此非臣所能知也王曰雖然試言之緩曰緩新從􅁗來言勿與則非計也言與之則恐以臣之爲􅁗也故不敢對使臣得爲王計焉不如與之王曰諾虞卿見王王以緩言告之虞卿曰􅁗索六城於王王以五城以賂齊齊􅁗深讎也得王五城并力西擊􅁗是王一舉結二國之親而與􅁗易道也趙王曰善因發虞卿東見齊王與之謀􅁗婁緩聞之逃去又曰楚圍雍氏五月韓令使者求救於􅁗冠蓋相望􅁗師不下殽韓令靳尚使􅁗謂王曰韓之於􅁗也居爲隱蔽岀爲鴈行今韓已病矣􅁗師不下殽臣聞之脣亡者其齒寒願大王熟計之太后乃謂尚子曰妾事先王以其體加妾之身妾困弗支也盡置其身妾不重何也以其少有利焉今救韓日費千金獨不可使妾少有利耶靳尚歸報王王遣張翠張翠稱病日行一縣張翠至甘茂曰韓急矣先生病而來張翠曰韓未急也甘茂曰韓之急緩人莫弗知今先生言不急可乎翠曰韓急則折而入楚矣臣安敢來甘茂曰先生勿復言也乃入言於王曰公叔且以國南合於楚楚韓爲一魏氏不敢不聽是楚以三國謀􅁗也如此則伐􅁗之形成矣不識坐而待伐孰與伐人之利􅁗王曰善果下師於殽以救韓又曰中山隂姬與江姬爭爲后司馬喜請見隂姬公爲畫計公稽首曰誠如君言喜即奉書詣中山王曰臣聞趙强即中山弱臣能弱趙而強中山中山王恱而見之喜曰臣願乞之趙觀其地形險阻人民貧富君臣賢不肖啇搉爲資未可豫陳也乃見趙王曰臣聞趙天下善爲音容佳麗之所岀也今來至境入都邑人民謡俗容貌顔色殊無佳麗好美者以臣所見多矣周流無所不至未嘗見人如中山隂姬者不知者將以爲神其容貌顔色過絶人矣乃其眉准頞權衡犀角偃月彼乃帝王之后非諸侯之姬趙王大恱曰吾願請之何如對曰非臣所敢議願王無泄喜歸報中山君曰趙王非賢王也不好道德而好聲色不好仁義而好勇力聞其乃欲請隂姬中山君作色不恱喜曰趙強國也請之必矣王不與之即社稷危與之即爲諸侯􅀏王立爲后以絶趙王意可也遂立爲后趙王亦無請也又曰􅁗王使人之楚楚王賢之恐其爲楚用以危􅁗也昭子曰以王之德與王之賢因以遺之楚王必爲有外心去楚矣從其計果如其言又曰安陵緾以顔色美壯得幸於楚恭王江乙徃見安陵緾曰子之先人豈有矢石之功於王乎曰無有江乙曰子之身豈亦有乎曰無有江乙曰子之貴何以至於此乎曰㒒不知所以江乙曰吾聞之以財事人者財盡而交踈以色事人者華落而愛衰今子之華有時而落子何以長幸無解於王乎安陵緾曰臣年少愚陋願委質於先王江乙曰獨從爲殉可耳安陵緾曰敬聞命矣江乙去君居朞年逢安陵緾謂曰前諭子者通之於王乎曰未可也居朞年江乙復見安陵緾曰子豈諭王乎安陵緾曰臣未得王之閒也江乙曰子出與王同車入與王同坐居三年言未得王之間子以吾之􅀃未可耳不恱而去其年共王獵江渚之野野火之起􅀂雲蜺虎狼之嘷􅀂雷霆有狂兕從南方來正觸王左􅆖王舉旌旄而使善射者射之一發兕死車下王大喜拊手而􅀏顧謂安陵緾曰吾萬歳之後子將誰與此樂乎安陵緾乃逡巡而却泣下沾衿曰萬歳之後臣將從爲殉安知樂此誰於是共王乃封安陵緾於車下三百戸故曰江乙善謀安陵緾知時也又曰智伯欲襲衛故遺之乗馬先之一璧衛君大恱酌酒諸大夫皆喜南文子獨不喜有憂色衛君曰大國禮寡人寡人故酌諸大夫酒諸大夫皆喜而子獨不喜有憂色者何也南文子曰無方之禮無功之賞禍之先也我未有徃彼有以來是憂也於是衛君乃修梁津而擬邊城智伯聞衛兵在境上乃還又曰智伯欲襲衛乃佯亡其太子顔使奔衛南文子曰太子顏之爲其君子也甚愛非有大罪也而亡之有故然人亡而不受不祥使吏逆之曰車過五乗愼勿内也智伯聞之乃止又曰趙簡子使人以明白之乗六先以一璧爲遺於衞衛叔文子曰先不意可以生故以小之所以事大也今我未以徃而簡子先以來必有故於是斬林除園聚歛蓄積而後遣使者簡子曰吾舉也爲不可知也今旣巳知之矣乃輟圍衛也又曰鄭桓公將欲襲鄶先問鄶之辯智果敢之士書其名姓擇鄶之良臣而與之爲官爵之名而書之因爲設壇於門外而埋之釁之以猳􅀂盟狀鄶君以爲内難也盡殺其臣桓公因襲之遂取鄶又曰鄭桓公東會封於鄭暮舎於宋東之逆旅逆旅之叟從外來曰客將焉之曰㑹封爲鄭逆旅之叟曰吾聞之時難得而易失今客之􅃦安殆非封也鄭桓公援轡自駕其僕接御而載之行十日十夜而至至􅁵何與之爭封故以鄭桓公之賢微旅之叟幾不會封也又曰趙簡子使成何渉他與衛靈公盟於專澤靈公未􅱷盟成何涉他捘靈公之手而撙之靈公怒欲反趙王孫啇曰君欲反趙不如與百姓同惡之公曰􅀂何對曰請命臣令於國曰有姑姊女者家一人質於趙百姓必怨君因反之矣君曰善乃令之三日遂徴之五日而令畢國人巷哭君乃召國大夫而謀曰趙爲無道反之可乎大夫皆曰可乃岀西門閉東門趙氏聞之􅅞渉他而斬之以謝於衛成何走燕子貢曰王孫啇可謂善謀矣憎人而能害之有患而能處之欲用民而能附之一舉而三物俱至可謂善謀矣又曰吴闔閭夫人姜氏齊景公以其子妻闔閭送諸郊泣曰余死不汝見矣髙夢子曰齊􅀒海而縣山縱不能全收天下誰干我君愛則勿行公曰余有齊國之固不能以令諸侯又不能聽是生亂也寡人聞之不能令則莫􅀂從且夫吴蜂蠆然不弃毒於人則不静余恐弃毒於我也遂遣之又曰晉文公與荆人戰於城濮君問於咎犯咎犯對曰服義之君不足於信服戰之君不足於詐君愼之詐而已矣君問於雍季對曰焚林而畋得獸雖多而明年無復也乾澤而漁得魚雖多而明年無復也詐猶可以偷利而無報遂與荆軍戰大敗之乃賞先雍季而後咎犯侍者曰城濮之戰咎犯之謀也君曰雍季之言百丗之謀也咎犯之言一時之權也寡人旣巳行之矣又曰智伯圍晉陽絺疵謂智伯曰韓魏之君必反矣智伯曰何以知之對曰夫勝趙而三分其地今城未没者三板臼竈生鼃人馬相食城降有日矣而韓魏之君無喜志而有憂色是非反何也明日智伯謂韓魏之君曰疵言君之反也韓魏之君曰必勝趙而三分其地今城將勝矣二家雖愚不弃羙利而佩約爲難不可成之事其勢可見也是疵必爲趙􅀃君且使君疑二主之心而不解於攻趙也今君聽䜛臣之言而離二主之交爲君惜之智伯岀欲殺絺疵絺疵逃韓魏之君果反又曰白圭之中山中山欲留之固辭而去又之齊齊王亦欲留之又辭去人問其辭白圭曰二國將亡矣所學者國有五盡故莫之必忠則言盡矣莫之必譽則名盡矣莫之必愛則親盡矣行者無糧居者無食則財盡矣不能用人又不能自用則功盡矣國有此五者無辜必亡中山與齊皆當此􅀂使中山之與齊也聞五盡而更之則必不亡也其患在不聞也雖聞又不信也然則人主之務在乎善聽而巳矣又曰下蔡威公閉門而哭三日三夜泣盡而繼之以血旁隣窺牆而問之曰子何故而哭悲􅀂此乎對曰吾國且亡曰何以知也應之曰吾聞病之將死不可爲良醫國之將亡不可爲計謀吾數諌吾君吾君不用是以知國之將亡也於是窺牆者聞其言則舉宗而去之於楚居數年楚王果舉兵伐蔡窺牆者爲司馬將兵而徃束虜其衆問曰得無有昆弟故人乎見威公􅅞在虜中問曰􅀂何以至於此應曰吾何以不至於此且吾聞之也言之者行之役也行之者言之主也汝能行我能言汝爲主我爲役吾亦何以不至於此哉窺牆者乃言之於楚王遂解其􅅞與俱之楚故曰能言者未必能行能行者未必能言也又曰石乞侍坐屈建曰白公其爲亂乎石乞曰是何言也白公至於室無榮所下士者三人與巳相君臣者五人所與同衣食者千人白公之行􅀂此何故爲亂屈建曰此建之所謂亂也以君子行則可於國家行過禮則國家疑之且苟不難下其臣必不難髙其君矣建是以知夫子將爲亂也處十月白公果亂也又曰韓昭侯作髙門屈冝咎曰昭侯不出此門曰何也曰不時吾所謂不時者非時日也人固有利不利昭侯嘗利矣不作髙門徃年􅁗抜冝陽明年大旱民饑不以此時恤民之急也而頋反益以奢此謂福不重至禍不重來者也髙門成昭侯卒竟不出此門矣又曰田子顔自大術至乎平陵城下見人子問其父見人父問其子田子方曰其以平陵反乎吾聞行於内然後施於外子顔欲使其衆甚矣後果以平陵叛又曰晉人巳勝智氏歸而繕甲治兵楚王恐召梁公弘曰晉人勝智氏矣歸而繕甲兵其以我爲事乎梁公曰不患害其在吴乎夫吴君恤民而同其勞使其民重上之令而人輕死以從上使如慮之戰臣登山以望之見其用百姓之信必也勿巳乎其備之􅀂何不聽明年闔廬襲郢又曰楚莊王欲伐陳使人視之使者曰陳不可伐也莊王曰何故對曰其城郭髙溝壑􅀷畜積多其國寜也王曰陳可伐也夫陳小國也而蓄多是賦歛重則民怨上矣城郭髙溝壑深則民力罷矣興兵伐之遂取陳又曰齊桓公將伐山戎􅀌竹使人請助於魯君進羣臣而謀皆曰師行數千里入蠻夷之地必不反矣於是魯許助之而不行齊巳伐山戎􅀌竹而欲移兵於魯管仲曰不可諸侯未親今有伐逺而還誅近隣隣國不親非霸王之道君之所得山戎之寳器者中國之所鮮也不可以不進周公之廟乎桓公乃分山戎之寳獻之周公之廟明年起兵伐莒魯下令丁男悉發五尺童子皆至孔子曰聖人轉禍爲福報怨以德此之謂也又曰智伯請地於魏宣子宣子不與任增曰何爲不與宣子曰彼無故而請地也吾是以不與任增曰彼無故而請地者無故而與之是重欲無厭也彼喜必又請地於諸侯不與必怒而伐之宣子曰善遂與地智伯喜又請地於趙趙不與智伯怒圍晉陽韓魏合趙而反智氏智氏遂㓕又曰楚莊王與晉戰勝之懼諸侯之畏巳也乃築爲五仞之臺成而觴諸侯諸侯請爲觴皆仰而曰將將之臺窅窅其謀我言而不當諸侯伐之於是逺者來朝近者入賔又曰呉王夫差破越又將伐陳楚大夫皆懼曰昔闔閭能用其衆故伐我於栢舉今聞夫差又甚焉子西曰二三子胡不相睦也無患吴矣昔闔閭食不二味處不重席擇不取費在國天有災親戚乏困而供之在軍食熟者半而後食其所甞者卒乗必與焉是以民不罷勞今夫差次有臺榭陂池焉􅀫有妃嬙嬪御焉一日之行所欲必具玩好必集珍異是聚夫差元自敗巳焉能敗我又曰呉請師於楚以伐晉楚王與大夫皆懼將許之左史􅀝相曰此恐吾攻已故示我不病請爲長轂千乗卒三萬與分呉地也莊王聽之遂取東國又曰陽虎爲難於魯走之齊請師攻魯齊侯許之鮑文子曰不可也陽虎欲破齊師齊師破大臣必多死於是欲􅁬其詐謀夫虎有寵於季氏而將季孫以不利魯國而容其求焉今君冨於季氏而大於魯滋陽虎所欲傾覆也魯免其疾而君收之無乃害乎齊君乃執之免而奔晉又曰湯欲伐桀伊尹曰請阻之貢職以觀其動桀怒起九夷之師以伐之伊尹曰未可彼尚猶能起九夷之師是罪我也湯乃謝罪請服後入貢職明年又不貢職桀怒起九夷之師九夷之師不起伊尹曰可矣湯乃興師伐而殘之遷桀南巢焉孔藂子曰趙聞魏將以來親於􅁗子順謂趙王曰此君之下吏計過也比目之魚不見得於人者偶視近而俱走也今􅁗兼吞天下之志不忘側息也趙魏與之隣接而強弱不敵所以不敢圖并趙魏者徒以二國併力周旋無故自離以資強􅁗天下拙謀無過此者夫連雞不能氐栖二國搆難不能自免於􅁗也願王熟慮之趙王曰敬受教又曰韓與魏有􅂩子順謂韓王曰昭􅁵侯一丗之明君也申不害一丗之賢相也韓與魏仇敵之國而􅁵侯執珪見梁君者非好卑而惡尊慮過而計失與嚴敵爲隣動有滅亡之變獨勁不能支二難故降心以相從屈巳以求存也申不害慮事而言忠臣也昭􅁵侯聽而行之明君也今之韓弱於始之韓今之􅁗強於始之􅁗而背先人之舊好以區區之衆居二敵之間非良䇿也齊楚逺而難恃􅁗魏呼吸而至舎近而求逺是虚名自累而不知近敵之困者也爲王計者莫如除小忿全大恕也呉越之人同舟濟江中流遇風波其相救如左右手所患同也今不恤所同之患是不如呉越之舟人也韓王曰善太平御覽卷第四百五十
