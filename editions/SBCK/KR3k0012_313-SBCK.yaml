body:
  text: 决戰下隋書曰文帝遣將賀􅀂弼伐陳後主令軍魯廣逹陳兵白土崗居衆軍之南偏鎭東大將軍任忠次之護軍樊毅都官尚書孔範又次之侍中車􅀐大將軍蕭摩訶軍最居北衆南北亘二十里首尾進退各不相知賀􅀂弼􅀄謂未戰將輕􅀐登山觀視形􅀔及見衆因馳下置陣廣逹首率所部進薄弼軍屢􅁍俄而復振更分軍趣地突諸將孔範出戰於交而走諸將支離陣猶未合􅀐卒㑹散駐之弗止因而大敗又曰楊義臣拜朔州㹅管漢王諒作亂并州時代州㹅管李景爲漢王將喬鍾葵所圍詔義臣救之義臣率馬歩二萬夜出西陘遲明行數十里鍾葵覘見義臣兵少悉衆拒之鍾葵亞將王㧞驍勇善用矟射之者不能中將軍楊思恩請當之義臣見思恩氣貌雄勇顧之曰壯士也賜以巵酒思恩望見㧞立於陣後投觴於地䇿馬赴之再往不克義臣後選􅀐士十餘人從之思恩遂突擊殺數人直至㧞麾下短兵方接所從􅀐士退思恩爲㧞所殺㧞遂乗之義臣軍北者十餘里又曰煬帝征髙麗隋大將宇文􅄒與九軍過鴨緑水又東注薩水去髙麗平壤城三十里因山爲營髙麗國相乙支文德遣使僞降請􅄒曰遂旋師者奉其主髙元朝行在所􅄒見士卒疲弊不可復戰又平壤嶮固卒難致力遂因其詐而還半濟賊擊後軍於是大潰不可禁止九軍敗績一日一夜還至鴨緑水行四五十里􅀄度遼九軍三十萬人還至遼東城唯二千七百人唐書曰太宗嘗謂群臣曰朕自興兵毎執金鼓必自指揮習觀其陣即知強弱常以吾弱對其強以吾強對其弱敵犯吾弱追奔不踰百數十歩吾擊其弱必突過其陣自背而反擊之不無潰多用此而制勝思得其理深也又曰武德中李靖隨河間王孝恭討蕭銑於江陵不從靖謀致敗委舟大掠人皆􅀒重靖見其兵亂進兵擊之賊大敗又乗勝進入其郛郭攻其水城克之悉取其舟檝散於江中賊救兵見之謂城以䧟莫敢輕進銑内外阻絶城中携貳由是懼而出降又曰光宅􅀄武太后臨朝稱制徐敬業於楊州起兵以匡復皇家爲辭月餘致精卒數萬太后遣將軍李孝逸領兵討之敬業率軍拒於下呵溪方成列敬業謂其徒曰自知衣甲非厚者居後衆乃爭退孝逸之師因其動譟而奔擊乃大破焉又曰建中􅀄田恱反以兵圍臨淄洺邢州詔以李晟爲神䇿先鋒都知兵馬使與河東節度使馬燧昭義軍節度使李抱真合兵救臨淄㝷加兼御史中丞河東昭義軍攻楊朝光於臨淄南晟與河東􅀐將李自良奉國擊悅於􅀟崗恱兵却遂斬朝光戰于臨淄諸軍皆却晟引軍渡淄水乗兵而濟横擊恱諸軍復振擊恱大破悅於洹水以功加檢校左散􅀐常侍實封百户又曰德宗以李晟兼魏府左司馬居無何朱滔王武俊皆反聮兵救田悅悅深壁不戰以老王師時武俊遣兵圍康曰知於趙州晟乃獻􅃺請解趙州圍因合義武節度使張孝忠以軍圗范陽上大壯之乃加御史大夫俾禁兵將莫仁擢趙光銑杜季玼皆􅈻焉晟乃自魏州直趨趙州賊解圍而去晟留趙州三日與義武合軍而北略􅁪州圍朱滔將鄭景濟於清􅁐決水灌之田恱朱滔王武俊皆遣兵來救戰於白樓賊犯義武義武軍却晟引歩􅀐數百擊破之景濟所乗馬連中流矢踰月城中益急滔武俊大懼乃自魏縣悉兵來救復圍晟軍晟内圍景濟外與滔等拒戰日數合自正月至于五月㑹晟病甚不知人數焉軍使合謀乃以馬與晟引軍還定州賊不敢逼三國典略曰後周軍圍晉陽齊人望之如黒雲四合髙延宗勝兵四萬人嬰城布陣躬與齊王憲交兵自申至酉死者甚衆帝逐北入城當天門頓營焚佛寺光燭天地延宗率衆排車向前我軍遂却人相蹂死者頗衆齊人欲閉門以閫下積屍扉不得闔帝從數􅀐﨑嶇危嶮僅得出門侍臣殱焉唯左仕上士庫狄嶔侍從時四更也延宗以帝辰鬚使於積尸之下求之不得士卒旣勝乃入坊飲延宗不復能整頓之帝出城飢甚將謀遁免開府宇文忻進曰陛下乗勝至此今者破竹其勢巳成奈何棄之而去㑹延宗使開府叚暢以千人擊帝暢以衆降盛言城内空虚更無繼援帝乃駐馬召兵旗鼔復振攻三門剋之延宗率衆苦戰尸骸塞路辰時力屈輕􅀐走出城北於人家擒之延宗見帝自投於地帝欲執其手固辭曰死人手也恐逼至尊帝強執之曰兩國天子有何怨惡直爲百姓而來耳勿怖終不殺又曰齊師伐梁大至于鐘山龍尾周文育請戰陳霸先曰兵不逆風文育曰事急矣當決之何用古法抽槊上馬殺傷數百人齊軍乃移營于莫府山又曰侯景次于渦陽有車數千兩馬數千疋甲士四萬人慕容紹宗戎卒十萬旗甲耀日方䡄長駈鳴鼓並進景使謂之曰公等爲欲送客爲欲定雄雌紹宗對曰當欲公決勝􅀒遂順風以陣景閇其壘風止乃出紹宗曰侯景多詭詐好掩人背咸冝備之景果令入陣者背短兵但斫人脛及馬足東魏軍大敗紹宗墜馬又曰陳霸先衆軍自覆舟東移頓郊壇北齊人相對侯安都謂蕭摩訶曰卿驍勇有名千聞不如一見摩訶對曰今日令公見矣命衆軍秣馬蓐食遲明攻之侯安都墜馬􅀍圍蕭摩訶獨􅀐大呼直衝齊軍齊軍披靡安都乃免霸先自率帳内麾下出莫府山南呉明徹沈泰等衆軍首尾擊之齊人大潰自相蹂藉壅川塞谷莊子曰惠子見戴晉人戴晉人曰有所謂蝸者君知之乎曰然有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏時相與爭地而戰伏尸數萬逐北旬有五日而後返誠知所爭者􅀂此之細則天下無爭矣文子曰廟戰者帝神化者王廟戰者法天道也神化者明四時也列子曰黄帝與炎帝戰于阪泉之野率熊羆狼豹貙虎而前駈鵰鶡鷹鳶爲旗幟此以力使禽獸也孟子曰爭地以戰殺人􅄹野爭城以戰殺人􅄹城此所爲率土地而食人􅁏罪不容於死也六韜曰以少擊衆必以日之暮以衆擊衆必以日之早穰苴兵法曰以戰去戰戰雖戰可也戰春不東秋不西月食還師所以止戰也古司馬兵法曰凡軍使法在巳曰專與下畏法曰法軍無小聽戰無小利小聽謂輕弱敵人稱其虚弱危敗昜勝以喜士衆沮備預也小利謂小敵擊誘於鉺數爲小戰也又曰凡五兵長以衛短短救長迭戰則乆皆戰則強迭更也言更息則可堪乆悉舉兵戰衆多者強孫子曰兵以詐立以利動以分合變者也兵一分合以敵爲變兵法詭詐以利動敵心或合離爲變化之術也故其疾如風言進退應機其徐如林不見利不前也如風吹林木小動而其大不移侵掠如火疾也抄掠財物如炎火之猛烈不動如山守也不信敵之誑惑安固如山難知如隂莫測如天之隂雲不見列􅀫之象動如雷霆盛猛速疾不及應也故太公曰疾雷不及掩耳疾電不及瞋目也指嚮分衆因敵而制勝也旌旗之所指向則往分離其師衆也先知迃直之計者勝此軍爭之法也又曰我專而敵分我專一而敵分散也我專爲一敵分爲十是以十共其一也我料見敵形審其虚實故所備者少專爲屯以我之專擊彼之散卒爲十共擊一也則我衆而敵寡我專爲一故衆敵分爲十故寡能以衆敵寡者則吾所與戰者約矣言約少而易勝吾所與戰之地不可知也言舉動㣲密情不可使彼知吾所舉不知吾所集也不可知則敵所備者多敵所備者多則吾所與戰者寡矣形藏敵疑則分離其衆備我也言少而易擊故也故備前則後寡備後則前寡備左則右寡備右則左寡無不備者無不寡言敵之所備者多則士卒無不分散而少寡者備人者也敵分散而少者皆先備人也衆者使人備已者也敵所以備多已者由我專而衆散故也故知戰之地知戰之日則千里而㑹戰以度量知空虚先知戰地之形又必戰之日則可千里期㑹先徃以待之若敵以先至不往可以勞之不知戰地不知戰日則左不能救右右不能救左前不能救後後不能救前而况逺者數十里近者數里乎敵以先居形勢之地已方趨利欲戰則左右前後惑疑進退不能相救況數十里之間也故善用兵者譬如帥然帥然者常山之虵也擊其首則尾至擊其尾則首至擊其中則首尾俱至夫善戰也必知戰之日知戰之地度道設期分軍離卒逺者先進近者後發千里之㑹同時而合若㑹都市其㑹地之日無令敵知知之則所備處少知所備處多備寡則專備多則分分則力散專則力并也又曰夜戰多火鼓晝戰多旌旗所以變民之耳目也故三軍可奪氣將軍可奪心左氏傳言一鼓而作氣再而衰三而竭也是故朝氣鋭晝氣墮暮氣歸故善用兵者避其銳氣擊其墮歸也又曰勝者之兵先勝而後求戰敗者之兵先戰而後求勝又曰圍地則謀死地則戰疾戰則存不疾戰則亡者爲死地呉子曰用兵之道先明四輕二重使地輕馬使馬輕車使車輕人使人輕戰鋒銳甲堅則人輕戰吕氏春秋曰趙氏攻中山中山之多力者五兵鳩衣鐵甲操鐵杖以戰所擊無不碎所衝無不䧟以車投車以人投人又曰趙簡子攻衛自將兵及戰且逺立又居於犀櫓之下鼓之而士不起簡子投桴而歎曰嗚呼士之弊一􅀂此乎行人燭過免胄横戈而進曰君不能耳士何弊之有簡子艴然作色曰寡人之無使而身自將是衆也子親謂寡人無能有􅀃則可無􅀃則死對曰昔吾先君獻公即位五年兼國十九用此士也惠公即位二年􅁋色􅁀嫚身好玉女􅁗人襲我去絳七十用此士也文公即位二年厎之以勇三年而士盡果敢城濮之戰五敗荆人圍衛取曹㧞石社定天子之位成尊名於天下用此士也亦有君不敢耳士何弊之有簡子乃去犀蔽屏櫓而立矢石之所及一鼓而士畢乗之簡子曰與吾得革車千乗也不如聞行人燭過之一言行人燭過可謂能諌其君矣又曰昔荆恭王與晉厲公戰於鄢陵荆師敗共王傷臨戰司馬子反渇而求飲竪陽榖操參酒而進之酒器受三升曰參子反曰訾退酒也竪陽􅂖曰非酒也子反曰訾退却竪陽􅂖又曰非酒也子反受而飲之子反之爲人也嗜酒甘而不能絶於口醉戰旣罷共王欲復戰而謀使召司馬子反子反辭以心疾共王駕而徃視之入幄中聞酒􅆨而還曰今日之戰不􅂖親侍所恃者司馬也而司馬又􅀂此是忘荆國之社稷而不恤吾衆不􅂖無與傷戰矣於是罷師去之斬司馬子反以爲戰故竪陽􅂖之進酒也非以醉子反也其心以忠也而適足殺之故曰小忠大忠之敗也又曰齊晉與戰平阿之餘子亡㦸得矛平阿齊邑餘子官氏退而去不自快謂路之人曰亡㦸得矛可以歸乎路之人曰㦸亦兵也矛亦兵也亡兵何爲不可以歸心猶不自快也遇髙堂之􅀌叔無孫􅀌特位尊也叔姓無孫名餘子當其馬前曰今者戰亡㦸得矛可以歸乎叔孫曰矛非㦸也㦸非矛也亡㦸得矛豈亢責也哉亢當平阿餘子曰嘻還反戰趨尚及之遂戰而死又曰呉起謂啇文曰馬與人敵在前援桴一鼔三軍之士樂死􅀂生子與我孰賢啇文曰吾不如子淮南子曰昔晉文公將與楚戰城濮問於咎犯曰爲之奈何咎犯曰仁義之軍不厭忠信戰陣之戎不厭詐僞君其詐之而巳問雍季雍季對曰焚林而獵偷多獸必無獸以詐僞愚人雖偷利厚亦無復利其正之而巳矣於是不聽雍季之計而用咎犯之謀與楚人戰大破還賞有功者先季雍左右曰城濮之戰咎犯之謀也賞先季雍者何也文公言曰咎犯之言一時之權也季雍之言萬丗之利吾豈可以一時之權而先萬丗之利哉又曰敵潰而走後必可移適迫而不動名之曰奄遲擊之如雷霆斬之􅀂草木燿之􅀂火電欲疾以速人不及歩車不及以轉轂兵如植木弩如羊角人雖衆多􅀔莫敢格春秋感精符曰強傑並侵兵雷合龍門溺驂宋均曰龍門魯門也時與宋齊戰敗相殺血溺驂馬者也賈􅁩新書曰黄帝行道炎帝不聽故戰􅃰鹿之野血流漂杵三輔舊事曰武帝發兵攻衛太子連闘五日白虎門前溝中血流没足列女傳曰湯受命而伐桀戰于鳴條鳴條南夷地名桀師不戰湯遂放桀與末嬉嬖妾同舟浮海死於南巢之山諸􅁑亮兵法曰山陵之戰不仰其髙水上之戰不逆其流草上之戰不渉其深平地之戰不逆其虚此兵之利也故戰闘之利唯氣其形也衛公兵法曰凡事有形同而􅀔異者亦有勢同而形别者􅀂順其可則一舉而功濟如從未可則蹔動而必敗故孫臏曰計者因其􅀔而利導之兵法曰百里趨利則蹶上將五十里而趨利者半至善動敵者形之而敵從之與之而敵取之以竒動之以夲待之此戰􅀔之要術也􅀂我士卒以齊法令以行竒正以設置陣以定誓衆以畢上下巳怒天時巳應地利也據鼔角以震風􅀔巳順敵人雖衆其奈我哉譬虎之有牙兕之有角身不蔽捍手無寸刃而欲􅅮之􅀔不可觸其亦明矣故兵有三􅀔一曰氣􅀔二曰地􅀔三曰因􅀔􅀂將勇輕敵士卒樂戰三軍之衆志厲青雲氣等飄風聲如雷霆此所謂氣􅀔也􅀂􅀜山狹路大阜深澗龍虵蟠隂羊膓拘門一夫守險千人不過此所謂地􅀔也􅀂因敵怠慢勞役飢渇風波驚擾將吏縱横前營未舎後軍半濟此謂因􅀔也􅀂遇此􅀔當潜我形出其不意用竒設伏乗􅀔取勝是以良將用兵審於機􅀔而用兵仍湏鼔而怒之感而勇之賞而勸之激而􅀭之􅀂鷙之玃獸之􅅮必修其牙距度力而下逺則氣衰而不及近則形見而不得故良將之戰必整其三軍礪其鋒甲設其竒伏量其形􅀔遥則力疲而不及近則敵知而不應􅀂不通此機乃智不及於鳥獸亦何能取勝於勍㓂乎仍須怒士勵衆使之􅁬勇故能無強陣於前無堅城於外以弱勝強必因􅀔也楊子雲長楊賦曰髙祖奉命順斗極運天􅀜横巨海漂崑崙提劒而叱之所過麾城摲邑下將降旗一日之戰不可殫紀潘安仁西征賦曰追皇駕而驟戰望玉輅而縱鏑潘安仁射雉賦曰􅀂夫多疑少決膽劣心􅂢内無固守出不交戰謝􅀇暉詩曰炎靈劒遺璽當塗駭龍戰
