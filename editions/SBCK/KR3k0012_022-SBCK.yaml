front:
  text: 太平御覽卷第二十二
  hash: sha256:3b92a385b334b5526e74e619d665e1705ec5301b8c52ce4efcc9d79cfbb99593
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_022-1a}
body:
  text: 時序部七夏中莊子曰井魚不可以語海夏䖝不可以語冰文子曰政失於夏熒惑逆行夏政不失則降時􅀨列子曰鄭師文學琴於師襄當夏而叩羽􅃶以召黄鍾霜雪交下川池暴管子曰夏日不煬非愛火也冬日不盥非愛水也爲不適於身不便於體也夫明王不美宮室非喜小也爲傷本也又曰􅀯方其時曰夏夏氣陽陽生火其德施舎是謂曰德又曰春不收枯骨杇胔伐枯木而去之則夏旱至矣鄒子曰季夏取桑柘之火尸子曰夏爲樂􅀯方爲夏夏興也􅀯任也是故萬物莫不任興蕃殖充盈樂之至也韓子曰季孫相魯令五月掘長溝子路私秩飲之孔子覆其飲曰魯有民焉汝輙擾之何也淮􅀯子曰明庶風後四十五日清明風至則出幣帛使諸侯立夏長養布恩惠故聘問諸侯巽卦之風抱朴子曰洪從祖仙公每大醉夏輙入源泉底一日許乃出能閉氣胎息故耳又曰謂夏必長而蒜麥枯謂冬必凋而竹栢茂日盛陽冝暑夏天未必無凉日極隂冝寒隆冬未必無暫温也又曰丗之豪士暑夏之日露首􅃝身唯在樗蒲彈碁不離綺紈之側也又曰或問不熱之道荅曰或以立夏日服六壬六癸之符或服􅀇冰之丸或服飛霜之散幽求子曰扇翣微動凉風夏生范子計然曰德取象於春夏刑取象於秋冬周書時訓曰六月節温風至温風不至即時無緩政蟋蟀居壁􅀂不居壁即􅁪急之􅁀又云門户不通鷹乃學習􅀂不學習即㓂戎不備又曰六月中氣後五日腐草化爲螢􅀂不化螢即榖實鮮落土潤溽暑􅀂不溽暑即急應之罰大􅀨時行􅀂不時行即恩不及下又曰夏取􅀥杏之火符瑞圖曰麟夏鳴曰養綏隱訣曰四月戍天地㓙門日不可入山建創四月十一日地破日不可開山動土又曰立夏之日日中五帝㑹諸仙人於紫微宫見四眞人論求道之功罪董勛問禮俗曰五月俗稱惡月俗多六齋放生案月令仲夏隂陽交死生分君子齋戒止聲色節􅄝慾素問曰歧伯曰夏三月此謂蕭秀天地氣交萬物華實夜卧蚤起母厭於日使志母怒使英華成秀使氣得泄􅀂所愛在外此夏氣之應也飬生之道也逆之則傷心秋爲㾬瘧冬至重疾夏三月天地隂陽之氣交合者万物華實故言夏生長於万物成實者也夜卧早起是貪於夏氣不厭於日者也是晚卧早起明於陽氣之盛者也人志氣母怒陽氣成結秀實以成其氣得陽者也万物成結於夏受之因此夏陽氣之所􅀿也能合其氣則是養生之道也逆之則傷損於心心者夏王也故言傷心心傷則秋必病㾬瘧故言夏傷於暑秋病㾬瘧者不從其氣則火爲逆也是故傷逆深背損於陽氣故冬至隂盛必重病大衍星分圖曰五月午日日月㑹于鶉首又曰六月日月㑹于鶉火嶺表録異云枹木其輕如通草夏月着之隔卑濕地氣如杉木今廣州諸郡牧守􅀄到任下檐皆有油􅀞枹履又曰南中夏秋多惡風彼人謂之􅄓南越志云風起則人心恐懼或云風來則四面具足二義皆有理也壞屋折樹不足喻也甚則吹屋瓦如飛蝶或三二年不一風或二年兩三風亦繫廉帥政德之否臧者然發則自午及酉夜半必止此乃飄風不終朝之義也南荒録曰新州男子婦人皆縝髮如雲每沐以􅁅投水中遂就水而沭之以彘膏􅂗其髮五六月秔秫未獲時民飢盡髠取髮鬻於市旣髮即復以彘膏􅂗之至來年五六月又可鬻矣投荒録曰嶺南方盛夏率一日十餘隂十餘霽雖大􅀨傾注頃即赫日巳復驟􅀨大凢嶺表夏之炎熱甚於北土且以時熱多又蒸鬱此爲甚惡自三月至九月皆蒸熱梁元帝纂要曰夏日朱明氣赤而光明亦曰長嬴以征切朱夏炎夏三夏九夏天日昊天言氣浩汗風曰炎風節曰炎節草曰茂草雜草木曰蔚林茂林宻樹茂樹孟夏亦曰維夏首夏季夏亦曰徂暑徂往也言暑始往四時􅛞要曰四月也是謂乏月冬榖旣盡􅀫麥未登冝賑乏絶救飢窮九族不能自活者救之無固藴蓄而忍人之貧貪貨殖之冝忌種福之利君子弗取也陸機纂要曰夏樹名連隂夏􅀨名綿􅀨攝生月令曰四月爲乾生氣夘死氣酉是月也萬物以成天地化生勿冐極熱勿大汗後當風勿􅁀露星􅀫皆成惡病勿食大䔉勿含生薤勿食雞􅁏勿食虵鱓是月肝藏以病神氣不行火氣漸臨水力漸衰稍􅀘腎􅂇肺調和元氣無失其時是月八日不逺行冝安心静念沭浴齋戒必得福慶齊人月令曰四月八日不冝殺草木始服生衣冝進温酒服温藥是月也無壞麛夘無伐大樹是月也冝以夙興如酉陽雜爼曰俗忌五月上屋言人五月蛻精神如上屋即自見其形魂魄則不安矣窮神祕苑幽明録曰漢武帝與群臣宴於未央殿方食􅀥帝見梁上有一老翁長八九寸仰觀屋宇俯視帝脚東方朔曰此水木之精其名藻兼夏乃巢林冬即居河此來訴爾所視殿名未央下視脚者足於此也上乃悉罷諸役徐整長暦曰北斗當崑崙氣注天下春夏爲露秋冬爲霜兵書曰夏出兵赤旗在前執前行地鏡經曰五月中草木葉有專厚而無汁枝下垂者其地有玉師曠占曰春夏一日有霜雪者君父治政大殿都甸切大殺天以示之何以言之霜威殺萬草坐大殺也見變如此冝損威殺重人之命也焦贛易林曰仲春孟夏和氣所在生我嘉福國無殘賊又曰六月採􅉮征伐無道張仲方叔尅勝飲酒又曰六月種􅁰歳晚不􅀨秋不縮酒神失其所趙自勉造化權輿云潮者隂陽氣所激五月無潮隂氣微也八月最大則隂盛也陸機要覽曰昔羽山有神人焉逍遥於中岳與左元放共遊子訓所坐欲起子訓應欲留之一日之中三􅀨今呼五月三時雨亦爲留客􅀨桓譚新論曰漢中送王仲都時夏大暑使曝日坐又環以十鑪火不言熱而身不汗出五行大義論曰未者昧也隂氣巳長萬物稍衰其體薆昧於未又時物向成皆有氣味也五行體性論云土在四時之中處季夏之末陽衰隂長居位之中揔於四德謂金木水火積塵成實積則有間有間故水火成實所能持也故土以含散持實爲體稼穡爲性又曰土苞四德故其體能兼虚實也論衡曰夫虎出有時猶龍見有期也隂物以冬見陽䖝以夏出出應其氣氣動其􅀋參伐以冬出心尾以夏見參伐則虎象星心尾則龍象星出而物見氣至而􅀋動天地之性也又曰盛夏之時當風而立隆冬之月嚮日而坐其夏欲得寒冬欲得温也或當風鼓翣嚮日燃爐然而天終不爲冬夏易氣者寒暑有節不爲人變改也又曰陽燧取火於五月丙午日中之時消錬五石鑄以爲氣摩勵生光仰以嚮日則火來至此真取火之道也又曰陽燧取火於天消錬五石五月盛夏鑄以爲器乃能得火今又但取刀劒銅鈎之属摩以嚮日亦得火焉又曰以夏進爐以冬奏奏亦進也扇此無益人君不遇災患幸矣又曰方今盛夏雷􅀨時至龍多登雲雲􅀨與龍相應乗雲􅀨而行物􅀋相致非有爲也又曰夏末蜻蛚蟋蟀也鳴寒螿啼感隂氣也雷動而雉驚啓蟄而虵出感陽氣也又曰丗俗之事亦有縁也夫正月歳始五月陽盛子以此月生精盛熾熱烈厭勝父母父母不堪將受其患相倣俲莫謂不然有空諱之言無實㓙之効世俗惑之誤非之甚也諱舉正月五月子以爲正月五月子殺父與母不得舉也以舉之父母偶死則信而謂之真矣夫正月五月子何故殺父與母人之含氣在膓腹之内其生十月而産共元氣也正月與二月何殊五月與六月何異而謂之㓙世傳此言乆矣又曰實說雷者太陽之微氣也何以明之正月始雷五月陽盛故五月雷迅冬乃雷潜盛夏之時太陽用事隂氣乗之隂陽分争則相激射爲毒毒中人輒死中木木折中屋屋壞諸葛亮出軍表曰五月渡瀘深入不毛之地陶潜集曰潜常言五月六月中北牎下卧凉風暫至自謂羲皇上人穆天子傳曰季夏丁夘天子北斗升于舂山之上以望四野曰舂山是惟天下之髙山也孳木華不畏雪天子乃取孳木華之實持歸種之又曰天子四月休于濩澤今平陽􅇴澤縣是也濩音􅀗於是射鳥獲獸宋躬孝子傳曰何子平事母至孝母喪年六十有孺子之慕夏避清涼永昌郡傳曰朱提郡有堂狼山山多毒草盛夏之月飛鳥過之不能得去􅄞康髙士傳曰􅀍裘公者吴人延陵季子出遊見道中有遺金顧而謂公曰取彼金公投鎌瞋目拂手而言曰何子之髙而視之卑五月􅀍裘而􅀒薪豈取金者哉季子大驚旣謝而問姓名公曰吾子皮相之士而安足語姓名也襄陽􅂄舊傳曰黄穆字伯開􅀶學爲山陽守有德政弟奐字仲開爲武陵太守貪穢無行武陵人諺曰天有冬夏人有二黄言不同也周處風土記曰仲夏􅀨濯枝盪川注云此節常有大􅀨名濯枝又曰梅熟時􅀨謂之梅􅀨又曰仲夏長風扇暑注云此節東南常有風至俗名黄雀長風盛引之荆州記曰冝都銀山縣有風穴穴口大數尺名爲風井夏則風出冬則風入樵人有冬過者置笠穴口風吸之經日還渉長陽溪而得其笠又曰橘洲在郡南四里對南津常看如下及至夏水懷山諸洲皆没橘洲獨在荆楚嵗時記曰四月也有鳥名穫􅂖其鳴自呼農人候此鳥鳴則云梨根岸爾雅云鳴鳩鴶鶵郭璞云今布榖也江東呼獲榖崔寔正論云夏扈􅃐耘鋤即竊脂􅀇鳥呼穫􅂖則其夏扈也又曰俗忌五月曝牀薦席異苑云新野􅁃寔甞以五月曝席忽見一小兒死在席上俄失之其後寔子遂亡或起於此或問董勛曰俗五月不上屋云五月人脫上屋見影䰟便士勛荅云盖秦時王自爲之禁夏不得行漢魏未改案月令仲夏可以居髙明可以逺眺望可以升山陵可以處臺榭鄭􅀇云順陽在上也今云不得上屋正與禮及敬升云見死小兒而禁曝収席何以與於此乎俗人月諱何代無之但當矯之歸於正洞􅁳記曰東方朔母田氏寡夢太白星臨其上因有娠田氏歎曰無夫而孕人得棄我乃移向代郡之東方里五月生朔仍以所居爲姓搜神記曰夫金錫之姓一也以五月丙午日中鑄爲陽燧以十一月壬子夜半鑄爲隂燧言丙午日鑄爲陽燧可取火壬子日鑄爲隂燧可取水又曰吴猛性至孝小兒時在父母邊卧時夏月多蚊䖟而不揺扇懼蚊䖟去我及父母王子年拾遺記曰洞庭之山浮於水上其下有金堂數百間帝女居之四時聞金石絲竹之音徹於山頂楚懷王時舉群才賦詩於水湄故云瀟湘洞庭之樂聽者令人難去雖咸池簫韶不能比焉毎四仲之節王常繞山以遊宴各舉四仲之氣以爲樂章推仲夏律中夾鍾乃作輕風流水之詩讌於山南時中㽔賔乃作皓露秋霜之曲武昌記曰樊山東有小溪盛夏時凛然常有寒氣故謂之寒溪洽聞記云驩州安逺縣西百六十里有温山其山冬夏常雨山傍有水冬夏常熱水氣醒􅆨至寒野獸依集水邊取其暖氣西京雜記曰天子夏設羽扇宋玉􅀇謨壽陽記曰明義樓南有明義井夏有冷漿甜飲米飯羅扇羽扇有三浴室上以清王侯宰吏中以涼君子士流下以涼庶􅀋也楚詞曰滔滔孟夏􅀆草木莾莽滔滔孟夏四月純陽用事煦然蒸萬物草木之􅀋莫不莽莽然盛茂傷懷永哀􅀆汨徂南土汨行貌徂往也太平御覽卷第二十二
