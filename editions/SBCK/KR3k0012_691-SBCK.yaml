front:
  text: 太平御覽卷第六百九十一章服部八
  hash: sha256:14d212a603f86161f1910fb30538aaca80c69f46bc65472107110b68661d37f4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_691-1a}
body:
  text: 單衣中衣曲領方領附袿䙱圭屬二音折音弗鞶囊單衣衣釋名曰單衣言無裏也方言曰單衣江淮南楚之間謂之毛音疊牒􅀜之東西謂之單趙魏之間謂之左衣古謂之深衣是也禮王制曰有虞氏􅀷衣而養老又深衣曰古者深衣盖有制度以應規矩繩權衡短母見膚長母􅀍土帶下母厭髀上母厭脅制十有二幅以應十二月􅃑圎以應規曲祫如矩以應方􅀒繩及踝以應直下齊如權衡以應平齊縃故䂓者行舉手以爲容􅀒繩抱方者以直其政方其義也故易曰坤六二之動直以方也下齊如權衡者以安其志而平其心也五法以施故聖人服之故規矩取其無私繩取其直權衡取其平故先王貴之故可以爲文可以爲武可以擯相可以治軍旅又儒行曰丘少居魯衣縫掖之衣鄭玄曰縫猶大也大掖衣大袂單衣君子有道藝者所衣也漢書曰江充召見上衣紗􅜄單衣曲􅅂後垂交輸張晏曰曲􅅂者人衣也後垂覆帶半之也又曰趙王彭祖爲人巧佞持詭辯以中人毎二千石至彭祖衣皁布單衣自行迎多設疑事以詐動之得二千石失言中忌諱輙書之又曰盖寛饒左遷爲衛司馬未出殿門斷其單衣短令離地躬按行士卒廬室後漢書曰馬援爲隗嚚使公孫述述盛陳陛衛以延援入交拜禮畢使出就館更爲援制都布單衣東觀記曰都作荅史記曰荅布千疋前書音義曰荅布白疊也謝承後漢書曰陸閎建武中爲尚書令美姿皃喜著越布單衣上見而好之自是常勑㑹稽郡獻越布又曰陳留尹苞字延􅀶與同郡范史雲善二人俱貧出入共一單衣到人門外苞年長常先着單衣前入湏􅁷出解與史雲魏志曰管寜四時􅀕祀在遼東時布單衣親薦饌王隱晉書曰梁孝王彤宣帝子將單衣􅀘車㦥以爲清叅軍王銓曰晏嬰大官稱清者以爲御食七百家也公無此費冝美衣服使内外相稱晉書曰桓温廢東海王王着白帢單衣步下西堂群臣拜辭莫不歔欷又曰簡文初立於朝堂服着平巾幘單衣東向拜受璽綬又曰王導傳􅂫峻平後帑藏空竭庫中唯有練數十萬疋賣之不售而國用不足導患之與朝賢俱制練布單衣於是士庶翕然競服之練逐貴端至一金晉令曰朝服皁縁中單衣趙書曰勒叅軍周承爲館陶令斷官絹數百疋獄以八坐議宥之後毎讌大㑹使徘兒著介幘黄絹單衣優問曰汝何官荅我夲爲館陶令斗藪單衣曰正坐取是故入汝軰以爲大􅀏事具樂部梁書曰劉曇靜母亡時天寒曇靜身衣單布衣廬於􅄟所晝夜哭臨不絶聲又曰張稷爲呉郡太守就僕射徴道由呉郷人候稷者滿水陸稷單衣裝徑還都下人莫之識其率素如此董巴輿服志曰羽林左監虎賁冠鶡着紗縠單衣又曰虎賁武􅀐皆衣虎文單衣襄邑歳獻織成虎文應劭漢官儀曰謁者皆著緗幘大冠白絹單衣徐野民車服雜注曰元帝召陳郡王隱待詔著作單衣幘朝望於著作之省又曰天子郊禮釋奠中單衣絳縁其領袖其朝服皂縁也燕丹子曰荆軻抱秦王乞聽琴聲而死召姬人鼓琴聲曰羅縠單衣可製而絶八尺屏風可超而越齊桓公夜出迎客寗戚叩牛角而歌曰短布單衣適至骭終朝飲牛至夜半仲長統昌言曰薊子訓不知何郡人到陳公舎自云今日當死陳公與之一著單衣於是入室寢日中果死傅子曰梁兾作火浣布衣㑹賔客行酒失盃而汚之僞怒解衣而燒之垢盡火滅粲然㓗白世􅀃曰王戎性儉爲其從子婚與一單衣後更責償之陳留􅂄舊傳曰呉祐爲膠東相嗇夫孫性盗冨民錢五百爲父市單衣父恐便以單衣詣門自謝祐以單衣遺其父梁兾別傳曰兾作狐尾單衣上短下長邊讓别傳曰讓才辯俊逸孔融薦讓於武帝曰邊讓爲九州之􅀍則不足爲單衣䄡䄖則有餘楊彪别傳曰魏文帝令彪著布單衣待以賔客之禮拾遺記曰漢末羽山之民獻赤布梁兾製爲衣謂之丹衣而史家云單衣則今縫掖也字異聲同末知孰是也神仙傳曰曹公欲殺左慈將出市忽失慈所在乃閉市索之傳曰一目耿著􅁑巾幘單衣正爾視之一市中數萬人皆眇一目􅁑巾幘單衣竟不知所取搜神記曰永嘉以來士大夫競服生單衣識者恠之曰此古練縗之布諸大夫所以服天子其後􅉖懷晏駕馬融遺令曰穿中除五時衣但得施絳絹單衣中衣禮郊特牲曰繡黼丹朱中衣士大夫僣襀鄭玄注曰繡讀爲綃綃繒名也衣制即今中單也董巴漢輿服志曰祀宗廟􅀄玄絳領䄂爲中衣絳袴祙示其赤心奉神五郊各從其色徐廣輿服􅄂注曰天子郊禮釋奠中衣以絳縁其領䄂其朝皁縁魏官儀曰皁縁領䄂中單衣㑹稽典録曰鄭弘爲縣嗇夫民有弟斥兄錢者未還之㛐領詣弘賣中單爲叔還錢兄聞之慙遣婦賫錢還弘不受曲領釋名曰曲領上横壅頸其狀曲也禮深衣曰曲祫如矩以應方祫曲領也古者方領後漢書曰朱勃字叔陽年十二能誦詩書甞候馬援兄况勃衣方領能短歩前書音義曰頸下施領正方學者之服也袿䙱廣雅曰䙱長􅃭也釋名曰婦人上服曰袿其下垂者上廣下狹如刀圭也䙱屬也衣裳上下相連屬也徐廣輿服􅄂注曰今皇后謁廟服袿䙱大衣後漢書曰和憙鄧后性儉約毎有讌㑹諸􅁎貴人競自脩整簮珥光采袿裳鮮明説文曰簮竿也珥瑱也以玉充耳后獨省素無飾其衣有與隂后同色即時解易南史曰南岳鄧先生名郁隱居不仕魏夫人忽來臨降乗雲而至從少嫗三十並著絳紫羅繡袿䙱年皆可十七八許傅毅舞賦曰珠翠的皪而炤耀華袿飛䘯而雜纎羅婦人集張君平與妹憲書曰念諸里舎皆冨財賄袿䙱襲蔽紛華照曜於是之際想汝懷愧韍釋名曰韍􅔖所以蔽前也婦人蔽􅂰亦如之齊人謂之巨巾田家婦女出至田野以覆其頭故因以爲名也又曰跪䄡跪時䄡然張也爾雅曰衣蔽前謂之䄡今蔽膝也易困卦曰朱韍方來詩曰赤芾在股邪在下帶大古蔽膝之象也冕服謂之帶其他服謂之􅔖以韋爲之禮曰一命緼韍衡再命赤韍䓤衡韍之言蔽也緼赤黄之色所謂韍也又曰韠君朱大夫索士爵韋韠以言蔽也以爲之象裳也圜殺直曰韠制天子直公侯前後方大夫前方後剉角士前後正韠下廣二尺上廣一尺長三尺又明堂位曰有虞氏服韍夏后氏山殷火周龍章鄭玄曰韍韠也舜始作之以尊􅀕服禹湯至周增以盡文後王彌飾也漢書東方朔傳曰館陶公主迎武帝蔽膝登階也又曰王莽妻著布蔽􅂰見客魏志曰武帝内誡令云今貴人位爲貴人金印藍紱女人爵位之極又文帝與于禁詔曰昔漢髙祖脫衣以衣韓信光武解綬以帶李忠誠皆人主當時貴敬功勞勤心之至也封賜將軍以魏王時自所佩朱韍及逺遊冠呉志曰孫權潘夫人有娠夢人以龍頭授巳以蔽膝受之生亮五經要義曰韠者舜所制也又云天子朱紱諸侯赤紱赤盛色也又曰太古之時未有布帛人食禽獸􅁏而衣其皮知蔽前未知蔽後至舜冕服旣備故復制之示不忘古韠名有三朝廷則謂之韠宗廟謂之韍韐上音昧下音閤五經異義曰韍者大帶之飾非韠也董巴漢輿服志曰五霸遞興戰兵不息韍非兵飾於是去韍白虎通曰紼有何謂也紼者蔽也行蔽前者示有事因以别尊卑彰有德也徐廣輿服儀注曰蔽膝古之韍也戰國連兵以韍非兵飾去之漢明帝復制紱環濟要畧曰凢韍以韋爲之以象裳色湯至周増以􅀞文夏山取仁可依殷火取其明周龍章取其變化莊子曰祝牧謂其妻曰天下有道我韍子佩天下無道我􅀒子戴當隱藏也拾遺録曰孔子生有麟吐玉書於闕里人家文云水精之子繼啇周而素王出故蒼龍繞室五星降庭徴在賢明知爲神異乃以繡紱繫麟角而去夫子係殷湯水德而素王至敬王之末魯定公二十四年魯人鉏啇田於大澤得麟以示夫子知命之終乃抱麟解紱而涕泗焉鞶囊禮曰男鞶革女鞶􅁝鞶小囊盛帨巾者男用韋女用繒禮曰鞶厲游纓杜預曰鞶紳帶一名大帶厲大帶之垂也白虎通曰男子有鞶者示有金革之事東觀漢記曰鄧遵破諸羗詔賜遵金剛鮮卑緄帶一具虎頭鞶囊一晉書曰鄧攸祖殷亮直強正爲淮南太守夢行水邊見一女子猛獸自後斷其鞶囊占者以爲水邊有女汝字也斷鞶囊新虎頭代故虎頭也若不作汝隂當作汝南後爲汝南太守曹暪傳曰太祖爲人坦易無威重身佩小鞶囊以盛手巾細物鄴中記曰石虎改虎頭鞶囊爲龍頭鞶囊楊子法言曰今之學也非獨爲之華藻文也從而繡其鞶帨班固與弟超貢曰遺仲叔虎頭旁囊金銀鈎謝承與歩騭書曰所在近北無它異物裁奉織成虎頭綬囊可以服之孔珠與王佐長史書朝不着鞶囊不知爲何不荅曰㝷此鞶囊是内則施鞶之遺象此爲箴線之屬非朝服所冝著太平御覽卷第六百九十一
