front:
  text: 太平御覽卷第三百九十九
  hash: sha256:30aadf78e6f277c234f90c3aed8e135cd23f123bb9c54f83e7956cf6117bc6ef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_399-1a}
body:
  text: 人事部四十應夢禮記文王丗子曰文王謂武王曰汝何夢矣武王對曰夢帝與我九齡帝天也文王曰汝以爲何也武王曰西方有九國君王其終撫諸文王曰非也古者謂年爲齡齒亦齡也我百爾九十吾與爾三焉九齡九十年之祥也文王以憂勤損夀武王以安樂延年與汝三者明傳業於汝汝受而成之文王九十七而終武王九十三而終左傳僖公下曰楚子玉自爲瓊弁玉纓未之服也先戰夢河神謂巳曰􅂌余余賜汝孟諸之麋又成公上曰鞍之戰晉韓厥夢子與厥父謂巳曰避左右故中御而從齊侯邴夏曰射其御者君子也公曰謂之君子而射之非禮也射其左越于車下射其右斃于車中又昭二曰鄭子産聘于晉晉侯有疾韓宣子曰寡君寢疾於今三月矣並走羣望有加而無􅪜今夢黄熊入於寢門其何厲􅀑也對曰以君之明子爲大政其何厲之有昔堯殛鯀于羽山其神化爲黄熊以入于羽淵實爲夏郊三代祀之晉爲盟主其或者未之祀乎韓子祀夏郊晉侯有間間愈也又昭二曰鑄刑書之歳二月或夢伯有介而行介甲也曰壬子餘殺帶也明年壬寅餘又將殺叚也及壬子駟帶卒國人益懼齊燕平之月壬寅公孫叚卒國人愈懼又昭四曰晉荀吴帥師滅陸渾韓宣子夢文公携荀吴而授之陸渾宣子韓起文公晉文公荀吴仲行穆子也故使穆子帥師獻俘於文宮欲以應夢又昭七曰十二月辛亥朔日有蝕之是夜也趙簡子夢童子羸而轉以歌轉婉轉也旦占諸史墨子曰吾夢如是今而日蝕何也對曰六年及此月也吴其入郢乎終亦弗克漢書曰孝文帝嘗夢欲上天不能進有一黄頭郎推之上天頋見其衣後穿覺而之漸臺見郞鄧通衣後穿即夢中所見也因而寵之又曰衛太子爲江充所譛敗乆之田千秋上急變訟太子􅁈曰子弄父兵罪當笞天子之子過誤殺人當何罪哉臣甞夢見一白頭翁教臣言是時上頗知太子惶恐無他意乃大感寤召見千秋謂曰父子之間人所難言也公獨明其不然此髙廟神靈使公教我公當遂爲吾輔佐立拜千秋爲大鴻臚又曰韋玄成爲丞相言孝文太后寢園冝如禮勿復修奏可後􅀊餘上寢疾夢祖宗譴罷郡國廟上少弟楚孝王亦夢焉上召問匡衡議欲復之衡深言不可東觀漢記曰桓帝時張奐爲武威太守其妻懷孕夢帶奐印綬登樓而歌占曰必生男復臨此郡命終此樓旣而生子猛建安中爲武威太守前郡守邯鄲啇爲猛所殺據郡反爲韓遂所攻自知必死乃登樓自燒而終魏志曰武帝問周宣曰我昨夜夢有青氣自地属天宣曰天下當有貴女子死死時帝巳遣賜甄后璽書文帝復問周宣曰吾夢摩錢文欲令㓕而更明何曰此陛下家事而太后不聽故更明耳時治弟植罪逼於太后也晉書曰明帝時張茂夢得一大象問人曰何祥對曰君爲大郡然而不善或問其故曰象者大獸獸者守也故當爲大郡然象以齒見焚必爲人害後爲吴國内史沈充所害又曰明帝太寧元年王敦謀逆帝與王導温嶠等决計征之敦屯於湖隂帝欲察其營壘乃乗駿馬微行至湖隂敦方晝寢夢日環其城驚起曰此必黄􅂡鮮卑奴來何以不􅅞之又曰簡文見䜟云晉氏祚盡昌明及孝武之在孕也李太后夢神人謂之曰汝生男以昌明爲字及生東方始明因以名焉簡文后後悟爲之流涕後魏書曰髙祖遷洛謂任城王澄曰朕昨夜夢一老公頭􅁂皓白正理冠服拜立路左朕恠而問之自云晉侍中􅄞紹故此奉迎神爽卑懼似有求焉澄對曰晉丗之亂紹以身衛主殞命御側亦是晉之忠臣於是求其兆域遣使吊􅀕焉又曰莊帝在藩任城王順夢一叚黒雲從西北直來觸東南上日月俱破復翳諸星天地晝闇俄雲消霧解日岀莊帝復閶闔門入登太極殿呼萬􅀊者三百官咸加朝服旣􅁴占之曰黒雲氣之惡者北方之色必有北敵亂京師日君象月后象星百官象以此言之京邑其當禍乎後如其夢又曰盧元明爲中書侍郎友人王由寓居潁川忽夢見由携酒就之言別因賦詩贈乃覺元明憶其十字云自兹一去後朝市不復遊元明歎曰必有他故經三日果聞爲亂兵所殺尋其曰乃是發夢之夜又曰酈範字丗則范陽􅃰人範甞夜夢隂毛拂踝他日􅀃之時齊人有占夢者曰史進云豪盛於齊下矣使君臨撫東􅁗道光海岱必當重牧全齊再禄營丘矣範􅀏而荅曰吾將爲卿必驗此夢果如其言爲青州刺史又曰裴安祖閑居養志不岀城邑曽行值天􅀬舎於樹下有鷙鳥逐雉雉急投之遂觸樹而死安祖􅉖之乃取置隂地徐徐護視良乆得蘇安祖喜而放之後夜夢一丈夫衣冠甚偉着曲領向安祖再拜安祖恠而問之此人云感君前日見放故來謝德聞者異焉北齊書曰張亮字伯德西河隰城人也拜太中大夫薛琡常夢於山上挂絲以告亮且占之曰山上絲幽字也君其爲幽州乎數月出爲幽州刺史又曰宋潁爲凉州刺史潁前妻鄧氏亡後十年夢見白潁拜曰新婦今􅀍處分爲髙崇妻故來辭別頴見崇言之祟數日而卒梁書曰􅁻士瞻少時夢得一積鹿皮而數之有十一領及覺喜曰鹿者禄也吾當居十一禄乎自其後仕進所莅者九及除二郡心惡之遇疾不肯療普通七年卒於郡梁後略曰􅀄賀革之徃江陵也意甚不恱過別御史中丞江革以情告之荅曰吾甞夢主上遍見諸子唯至湘東王所手脫帽以與之此人後必當辟卿其行乎革因頷之遂徃荆州三國典略曰江陵平梁御史中丞沈炯遷長安太祖授儀同三司甚禮待之炯恐太祖愛其文才桓閉門却掃無所交遊時有文草隨即毀弃不令流布甞獨行經漢武通天䑓爲表奏之陳已思歸之意奏訖其夜炯夢見有宫禁之所兵衛甚嚴炯便以情事陳訴聞有人言甚不惜放卿幾日可至􅀂一月内見􅀜岀此恐不復由我寤而異之當時以爲怳忽十餘日便有命放還遂與王克等並得東歸又曰隂子春甞爲東莞太守時青州刺史三神念毁壊臨海神廟當座㨂上有一大蛇役夫下擒入於海水爾夜子春夢見一人詣其府云有人見苦􅀍壞宅舎旣無所託欲憇此境子春心宻記之經二日方知神念毀廟因辦牲醑立宇祠之數日夢一朱衣人謝曰得君厚惠當以州相報經月餘魏軍欲襲朐山子春預知設伏摧破梁武以爲南青州刺史陳書曰武帝􅀄受襌之日其夜有㑹稽人􅀓史普直省夢人自天而下着朱衣武冠導從數十手持板板上有字􅀓視之其文曰陳氏五主三十四年遂凌空而上旦白黄門侍郎孔宗範歎曰吾事去矣其爲子孫憂乎自武帝已後并廢帝五主自永定􅀄迄禎明末共三十四年晏子春秋曰景公舉兵將伐宋過太山公夢見二丈夫意怒甚盛公問占夢曰師過太山不用事太山神怒也公問晏子晏子曰非太山之神也宋之先湯與伊尹也湯修以長髯兊上而豐下倨身髙聲伊尹黑短蓬頭而髯豐上兊下僂身下聲公曰然又曰景公田於梧宫夜猶早公坐睡夢有五丈夫北面稱無罪公覺召晏子告所夢公曰我其甞殺無罪歟晏子對曰昔先君靈公田五丈夫駭獸故并斷其頭葬之命曰五丈夫之丘豈此耶命人掘其葬處求之則五頭同穴而存焉公嘉之命吏葬之莊子曰宋元君夜半夢人披髮而窺阿門曰子自􅌠之淵爲清江使河北之所漁者豫且得子元君覺召占夢者占之占夢者曰此神􅀛也君乃刳􅀛以卜七十鑚而無遺䇿又曰匠石之齊至于曲轅曲轅之道見櫟社樹其大蔽千牛曰是不材之木也故能􅀂是之壽匠石歸櫟社見夢曰汝將比予於丈木耶柤梨橘柚果蓏之屬耶實熟則剥剥擊也剥則辱大枝折小枝泄泄亦折也此以其能􅀂生者也子求年所可用乆矣乃今得之吕氏春秋曰尹儒學御三年而無得焉夜夢受秋駕於其師時日徃朝其師而謂之曰吾非愛道也恐子之未可教也今日將教子以秋駕秋駕御法尹儒反走北面再拜曰今昔臣夢受之先爲其師言所夢因授秋駕也賈􅁩書曰文王晝卧夢人登城而呼巳曰我東北陬之腐骨也速以人君葬我文王曰諾覺召吏使視之信有焉文王曰速以人君葬之吏曰此無主請以大夫禮王曰吾夢中已許之矣奈何背之也桓譚新論曰楊子雲亦言成帝時上甘泉召使作賦子雲爲之卒暴倦卧夢其五藏岀在地以手収内及覺大少氣病一歳卒丗􅀃曰王東亭嘗夢人以大筆與之管如􅁺子大旣􅁴語人云他日當有大手筆事少日烈宗晏駕哀䇿謚議王所作辛氏三􅁗記曰昆明池漢武停舡立之習水戰也中有靈沼神池云堯時治水訖停舡池通白鹿源人釣魚於此綸絕而去夢於漢武求去其鈎明日帝戯於池見大魚􅋦索帝曰豈非昔時所夢也取而去其鈎放之􅀶物志曰靈帝時遼西太守黄翻上言海邊有流屍露冠綘衣感翻夢曰我伯夷弟􅀌竹君也求見掩藏吏民有嗤者皆死虞翻別傳曰翻注易奏上曰臣都吏陳挑夢臣與道士相遇放髮􅀍鹿裘布易六爻燒其三以飲臣臣乞盡吞之道士曰易在天三爻足矣豈臣受命應當知經皇甫謐髙士傳曰桓帝好老子之書夜夢見老子乃詔於陳爲老子立祠三輔决録曰子以去冬脩夜思而未之得也忽然而寢夢此黄髮之􅅱姓爲玄明字曰子眞與寐言言必有中夢中指言褒貶之事子授其人子眞評之析微通理善否之間無所依違因命操筆者書之謂之决録襄陽􅂄舊記曰楚襄王與宋玉遊於雲夢之野將使宋玉賦髙唐之事望朝雲之館上有雲氣崪乎直上忽而改容湏􅁷之間變化無窮王問宋玉曰此何氣也對曰昔者先王遊於髙唐怠而晝寐夢一婦人曖乎􅀂雲煥乎􅀂星將行未至如浮如停詳而視之西施之形王恱而問焉曰我帝之季女也名曰瑶􅁎未行而亡封巫山之臺精魂依草寔爲莖之媚而服焉則與夢期所謂巫山之女髙唐之􅁎聞君遊於髙唐願薦枕席王因而幸之漢武故事曰上自封禪後夢髙祖坐明堂羣臣亦夢於是祀髙祖於明堂列異傳曰吴選曹令史長沙劉卓得病夢一人以白越單衫與之語曰汝着此衫汗即火燒便㓗也覺果有衫在側後汗便火燒之捜神記曰有周擥力感切嘖音責者貧而好道夫婦夜耕息卧夢天公過而哀之勑有以給與司命案録籍此人相貧限不過此唯有張車子應賜錢千萬車子未生請以借之天公曰善曙覺言之於是所爲輙得貲至千萬先時有張嫗者常徃擥嘖家傭賃合有身月滿當孕便遣出生車屋下産得兒主人徃視間言當名汝兒作何嫗曰今在車下夢天告之名爲車子擥嘖乃悟自是居日衰减車子長大冨於周家續捜神記曰承儉者東莞人葬後十年忽夜與其縣令夢云没故民承儉今見劫明府急見救令便􅃙外内裝束往冢上日巳向出天忽大霧對面不相見但聞􅃁中㕳㕳破棺聲有二人墳上望但霧􅁳不見人徃令旣至収得冡内三人墳上二人遂得逸走棺未壊令即使人脩復之即其夜又夢儉云二人雖得走民悉誌之一人面上有青誌如藿葉一人㧻其前兩齒折明府但案此尋覔自得也令從其言追捕皆擒獲又曰宗淵字叔林南陽人􅀳太元中爲尋陽太守有數十頭􅀛付厨􅃙旦且以二頭作臛便着潘汁甕中飬之其暮夢有十丈夫並着烏布袴褶自反􅅞向宗淵叩頭􅀂求哀明日厨人􅌠二􅀛其暮復夢八人求哀如􅀄宗淵方悟令勿殺明夜還夢見昨八人來跪謝恩於是驚覺明朝自入廬山放之遂不復食􅀛又曰荆州刺史殷仲堪布衣時在丹徒忽夢見一人自􅀃巳是㑹稽上虞人死亡浮喪飄江中明日當至君有濟物之仁豈能見移着髙燥處則恩及枯骨殷明日與諸人共江上看果見一棺逐水流下飄飄至殷坐處令人牽取題如夢所即移着崗上酹以酒飯其夕又夢此人來謝恩又曰嘉興徐㤗㓜喪父母叔又隗養之甚於所生隗病侍甚謹三更中夢二人乗舡持箱上㤗床頭發箱出簿書示曰汝叔應死㤗即於夢中下地叩頭良乆曰汝縣有同姓名人不㤗思得語􅀑云有張隗不姓徐此人云亦可強逼念汝能事叔父當爲汝受之遂不復見異苑曰髙平檀茂崇以義熙中䘮亡其母沛郡劉氏畫眠夢見崇手捉􅇛扇云崇年命未盡撗􅀍災厲方永違離今以此扇奉別母涕驚覺果於屏風門得扇上皆如踟跦網絡撫執悲慟又曰海陵如睪縣東城村邊海岸崩見一古墓有方頭􅃮棺以朱題云七百年墮水元熹二十年墜於縣巘和蓋從潮漂沉輒泝流還依夲處村人朱護等異而啓之見老姥年可七十許璠頭着袿古携切􅁂髮皓白不殊生人􅁫髻衣服粲然􅀂新送終噐物枕屨悉存護乃齎酒酺施于柩側爾夜護婦夢見姥云向獲名貺感至無已但我墻屋毀廢骸形飄露今以直一千託爲治護也置錢便去明覺果得即用改殮移于髙阜焉述異記曰陳留周氏婢民與入山取樵忽夢見一女子曰吾目中有刺煩爲抜之當有厚報此婢乃見朽棺髑髏草生眼中便爲抜草即於某處得一􅀟金指環靈䰟志曰濡湏口有一大舶舩覆在水中水小時便出見甞有漁人夜􅀫其傍以舩繫之但聞筝笛絃管之音夢人驅遣云勿近官妓此人驚􅁴即移舩去傳云是曹公載妓舡覆于此于今存在智瓊傳曰弦超字義超夢神女從之自稱天上玉女姓成字智瓊早喪父母天帝􅉖之遣令得下嫁如此三四旦覺寤欽想顯然來遊乃駕輜軿車從八婢自言我天帝玉女遂爲夫婦贈詩二百餘言又著易七卷超皆能通其旨太平御覽卷第三百九十九
