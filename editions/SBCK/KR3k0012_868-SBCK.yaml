front:
  text: 太平御覧卷第八百六十八
  hash: sha256:90b82bb05de0c3450f41b4401c79051a6bfbd9bfc5dedef26b280368032f335b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_868-1a}
body:
  text: 火部一火上釋名曰火化物也亦言燬也物入即皆毀壞也易曰水流濕火就燥又曰風自火出家人由内以相成熾也又曰天與火同人君子以􅀋族辨物君子小人各得所同又曰火在天上大有君子以遏惡揚善順天休命大有包容之象也故遏惡揚善成物之羙順夫天徳休物之命又曰燥萬物者莫熯呼旱切乎火書曰火炎崐崗玉石俱焚又曰惟女含德不惕予一人予若觀火惕懼也觀執也我觀火者喻刑罰可畏之也又曰􅀂火之燎于原弗可嚮迩火之燎于原其炎熾之明不可嚮近也又曰五行二曰火火曰炎上炎上作苦詩曰叔在藪火烈具舉禮曰孟夏之月盛徳在火又曰季春出火爲焚也謂焚菜也凢出火以火出建辰之月火始出又曰火之於民也尊而不親左傳曰人火曰火天火曰災又曰兵猶火也不戢將自焚也又曰火龍黼黻火􅀞爲龍又曰古之火正或食於心或食於咮以出内火是故味爲鶉火心爲大火謂火正之官配食於火星也建辰之月鶉火星昬在南方則令民放火建戍之月大火星伏在日下夜不得見則令民内火禁放火也陶唐氏之火正閼伯居啇丘閼伯髙辛氏之子也傳曰遷閼伯於啇丘主辰大火也今爲宋星然則啇丘在宋地也祀大火而火紀時焉謂岀内火時也相土因之故啇主大火相土契孫啇之租也始代閼伯之後居啇丘祀大火也又曰郯子云炎帝以火紀故爲火師而火名又曰昭公十七年冬有星孛于火辰西及漢夏之八月辰星見在天漢西今孛星出辰西光芒東及天漢申湏曰彗所以除舊布新也申須魯大夫天事􅁪象天道􅁪以象頴告示人今除於火火出必布焉諸侯其有火災乎今火向伏故知當湏火乃布散爲災周禮曰春秋以木鐸脩火禁火星以春出以秋入因天時而以成又曰亨人掌供鼎鑊以給水火之齊鑊所以煑􅁏及魚腊之器旣熟乃脀于鼎齊多少之量齊音劑又曰卜師掌開􅀛揚火以作􅀛致其墨揚火猶熾也致其墨者熟灼之明其兆又曰司爟掌行火之政令四時變國火以救時疾行猶用也变猶易也鄭司農􅀃以鄹子曰春取榆柳之火夏取􅀥杏之火季夏取桑拓之火秋取柞梄之火冬取槐檀之火季所觸輙死壯士擊之城上大譟燕師大駭又曰龐㳙追孫臏量其行暮當至馬陵乃斫大樹白而書之曰龐㳙死此下於是令齊軍万弩夾道而伏日暮見火舉而俱發龐㳙夜至見白書乃鑚火讀之未畢万弩俱發龐㳙大敗又曰􅂫代謂魏王曰夫以地事􅁗猶抱薪救火薪不盡火不滅也又曰顔叔子獨居室夜雨比舎屋角有女子投之叔子令秉燭燭盡乃徹屋草續之至明不亂又曰武王旣渡河有火自上復於王屋流爲烏其色赤漢書曰項羽西屠咸陽燒其宫室火三月不㓕又曰孝平后王莽女有節操及漢兵誅莽燔燒未央宫后曰何面目見漢家因自投火而死又曰漢兵圍王莽城中少年房朱張魚等恐見虜掠􅀻燒作室門呼曰反虜王莽何不出降火及掖庭莽避火宣室前殿火輙隨之又日陳勝吴廣夜構火狐鳴呼曰大楚興陳勝王又郡國志曰連渾府遥火山而有火井􅀷不可見底炎氣上昇常􅀂微電以草㸑之則煙騰大發其山似火從地而發故名熒臺東觀漢記曰梁鴻牧豕長安上林􅁐中失火延及人家問所燒財物悉推豕償之其主言少鴻願以身作躬執其勤又曰長沙有義士古􅀄遭父䘮未葬隣人火起及􅀄舎棺不可移冒火伏棺上火乃滅又曰廉范字叔度爲蜀郡太守成都地迫屋狹百姓夜作以供衣食又禁火民覆蔽之失火者日屬范放令夜作但使儲水百姓皆恱歌曰廉叔度來何暮不禁火民安堵昔日無􅃭今五袴魏略曰􅁗伯出獵至於咸陽有火流下化爲白雀衘緑丹書集於公車呉志曰張昭字子布孫權以公孫淵稱藩遣張珎許晏至遼東拜淵爲燕王昭諌權權不從昭忿稱疾不朝權恨之土塞其門昭又於内以土封之淵果殺珎晏權數慰謝昭固不起權因出過其門呼昭昭辭病篤權燒其門欲以恐之昭更閉户孫權使人滅火徃問良乆昭諸子扶昭起權載以還宫晉書曰􅉖懷太子遹字熈祖惠帝長子也宫中甞夜失火武帝登樓望之太子時年五歳牽帝􅅂入闇中帝問其故太子曰暮夜倉卒冝備非常不冝令照見人也由是竒之又曰張華字茂先武庫火華懼因此變作列兵固守然後救之果累代之寳及漢髙斬虵劒王莽頭孔子履等盡焚焉又曰韓康伯家貧窶伯年數歳至大寒母方爲作􅃭令伯投熨斗而謂之曰且著􅃭尋當作複禈伯曰不復湏母問其故對曰火在斗中而柄尚熱今旣著􅃭下亦當煖母甚異之又曰王獻之常與兄徽之共在一室忽然火發徽之遽走岀不遑取履獻之神色恬然徐呼左右扶出又曰郭璞字景純門人趙載甞竊青囊書未及讀而爲火所焚又曰􅁃亮鎮武昌夜半望見城内有數炬火從城上岀如火車􅃺白布慢覆與火俱出城東北行至江乃滅又曰佛圖澄甞與石季龍􅂛中臺澄忽驚曰幽州當火災仍取酒噀之乆而􅀏曰救巳得矣季龍遣驗幽州云是曰火從四門起西南有黒雲來驟雨㓕之雨亦頗有酒氣又曰􅄞康從孫登遊三年康問其所終不荅康毎歎息將別謂曰先生竟無言乎登乃曰子識火乎生而有光不用其光而果在於用光人而有才不用其才而果在於用才故用光在乎得薪所以保其曜用才在於識眞所以全其年今子才多識寡難乎免於仐之丗矣子無求乎康不能用果遭非命鄧粲晋紀曰胡母輔之過河南尹門下將飲酒使門卒王子􅀶取火子􅀶曰卒也唯不乏吾事安能爲人使輔之與語歎曰吾不及也因言於河南尹以爲功曹晉中興書曰殷浩北伐江逌爲長史逌取數百雞以長䋲連脚皆繫火一時驅放過壍集營皆燃焉宋書曰周朗爲廬陵内史郡後荒蕪頗多野獸母薛氏欲見獵朗乃合圍縱火令母觀之火逸燒廨朗悉以秩米起屋償所燒之限梁書曰阮孝緒家貧無以爨僮妾竊隣人樵以継父孝緒知之乃不食更令撤屋而炊後魏書曰祖􅉷好學以晝継夜父母恐其成疾禁之後燃火讀書以衣􅀍蔽塞䆫户恐爲人家所覺蕭鵉遣魯康祚侵太倉口傅永以賊若夜來必應於渡淮之守以火記其淺處永旣設伏乃宻令人以瓠盛火渡淮南岸當􅀷處置之教之云􅀂有火起即亦燃之其夜康祚等果親率領來斫永營東西二伏夾擊之康祚等奔趣淮水火旣競起不能記其夲濟之處遂望永所置之火而争渡焉水􅀷溺死斬首者數千級北齊書曰神武西征登鳯陵命中外府司馬李義􅀷相府城局李士畧共作檄文皆辭請以孫搴代神武乃引塞入帳自爲吹火催促之搴神色安然授筆立䟽又曰文宣曽近出令張曜居守帝夜還曜不時開門勒兵嚴備駐蹕門外乆之催迫甚急曜以夜􅀷湏火至面識門乃可開於是獨出見帝帝使曜前開門然後入又曰張亮守河州周文帝於上流放火舡欲燒河橋亮乃備小艇百餘皆載長鏁鏁頭施釘火舡將至即馳小艇以釘釘之引鏁向岸火舡不得及橋全亮之功也尚書大傳曰燧人爲燧皇以火紀物火陽尊故託燧皇於天春秋元命苞曰火之爲言委隨也故其字人散二者爲火也韓詩外傳曰晉平公藏寳之臺燒救火三日三夜乃勝之公子晏束帛而賀曰臣聞王者藏於天下諸侯藏於百姓農夫藏於囷􅁃啇賈藏於篋匱今百姓乏於外而賦歛無已昔桀紂殘賊爲天下戮今皇天降災於皇臺是君之福也戰國䇿曰楚王遊雲夢野火之起也􅀂雲蜺呉越春秋曰越王思報呉冬則抱氷夏則握火後趙録曰石勒禁火百鼔之後燃火者鞭之一百延火燒一家斬五部都督汝南先賢傳曰郭憲從南郊含酒東北三噀云齊失火以厭之後齊果上火事又曰蔡君仲有至孝之心母終棺在堂西舎失火火將至君仲伏屍號哭火越向東家陳留􅂄舊傳曰劉昆爲江陵令民有火災昆向火叩頭即霈然下雨詔問反風滅火虎北渡河何以致此昆曰偶然耳帝曰此長者之言也鄭玄別傳曰玄年十七在家見大風起詣縣曰某時當有火災冝􅀕爟禳廣設禁備時火果起而不爲害樊英別傳曰英隠於􅁐山甞有黒風從西方起英謂學者曰成都市火甚盛因含水西向漱之乃令記其日後有客從蜀來者云是日有大火有黒雲平旦從東起湏􅁷大雨火遂得滅􅁑仙公别傳曰公與客談話時天寒公謂客曰居貧不能得爐火請作一大火公遂吐氣火赫然從口而出湏􅁷火滿室坐客皆􅀬而脫衣也列仙傳曰陶安公六合冶師也數行火火一旦散上紫色衝天湏􅁷朱雀止冶上曰安公安公冶與天通七日迎汝以赤龍龍至安公􅀐之東南而上又曰欒巴爲尚書王㑹得酒西向嗽云成都失火嗽而作兩驛至果如其言又曰寗封子黄帝陶正掌火能作五色烟列女傳曰梁節姑其室失火兄子與巳子在内欲取兄子輙得巳子火盛不復得入婦人曰梁國豈可户告人曉耶􅀍不義之名何面目以見兄弟家人哉遂赴火而死捜神記曰麋笁甞從洛歸未至家數十里見路次有好新婦從求􅀉載行二十餘里新婦謝笁我天使也當徃燒東海麋家感君見載故以相語笁因請之曰不得不燒君快去我緩行行日中必火發笁乃急行逹家使出財物日中而火大發玄中記曰南方有炎火山焉在扶南國之東加營國之北諸薄國之西從四月而火生十二月火滅正月二月三月火不燃山上但岀雲氣而草木生枝條至四月火燃草木葉落如中國寒時草木葉落也行人以正月二月三月行過此山下取此木爲薪燃之無盡時取其皮績之爲火浣布十洲記曰炎洲在南海中地方二千里去岸九萬里上有風生獸似豹青色大如鯉張取之積薪數車以燒之薪盡而此獸在火中不燃以鐵椎鍜其頭十數下乃死以其口向風湏􅁷便活而起以石上菖蒲塞即死取腦以花服之盡十斤得壽五百歳又有火林山山中有火獸大如䑕毛長三四寸或赤或白山可二百許里晦望見山林及此獸光火照人乃取其獸毛績以爲布名曰火浣布國人服之此中布垢汚唯以火燒布兩食許出振之其垢即去㓗白如雪述征記曰北征有張母墓舊􅀃張母是王氏妻王家葬經數百載後開墓而香火猶燃其家奉之稱清火道英雄記曰周瑜鎮江夏曹操欲從赤壁渡江南無舡乗􅑉步皆反㳂漢水下至浦口未即渡瑜夜宻使輕舡走舸百余艘艘有五十人拖掉人持炬火持火者數千人立於舡上以萃於􅑉至乃放火火燃即回舡走去湏􅁷燒數千􅑉火起光上照天操乃夜去齊地記曰東武有火生木燒之不死亦不損也太平御覽卷第八百六十八
