front:
  text: 太平御覽卷第三百一十九
  hash: sha256:b2d6c62958d4dd90beb131ede54de3faf97c6a6a7fc1e840f9edfa151bb433f3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_319-1a}
body:
  text: 兵部五十拒守上孫子曰昔之善戰者先爲不可勝先諮之廟堂虜其危難然後髙壘􅀷溝使兵士練習故敵不得勝以待敵之可勝以此守備之固待敵之闕則可勝也不可勝在己言守備之固制敵在外也可勝在敵守備之固自脩理以􅀱敵之虗解巳見敵敵有闕漏之形然後可勝也故善戰者能爲不可勝不能使敵必不可勝巳􅀂敵曉練兵事䇿與道合􅀷爲已備者亦不可強勝故曰勝可知見成形也而不可爲也敵有備也已料見形者則勝􅀒可知􅀂敵宻而無形亦不可強使爲敗故范蠡曰時不至不可強生事不究不可強成不可勝者守也形藏也􅀂未見其形彼衆我寡則自守也可勝者攻也敵攻巳乃可勝也己見其形彼寡我衆則可攻故善守者藏於九地之下善守備者務因其山川之阻丘􅁜之固使不知所攻言其􅀷宻藏於九地之下又曰城有所不攻固而多重易曰利用禦㓂不利爲㓂左傳曰晉侯伐齊齊侯禦諸平隂壍防門而守之廣里夙沙衛曰不能戰莫如守險􅀳將范宣子告齊大夫折文子曰吾知子敢匿情乎魯人莒人皆請以車千乗自其郷入旣許之矣􅀂入君必失國子盍圖之子家以告公公恐晏嬰間之曰君固無勇而又聞是弗能乆矣不能乆敵齊師夜遁又曰倍則攻敵則戰少則守後漢書曰涼州賊王國圍陳倉左將軍皇甫嵩督前軍董卓救之卓欲進赴陳倉嵩不聽卓曰智者不後時勇者不留決速救則城全不救則城滅全滅之􅀔在於此也嵩曰不然百戰百勝不如不戰而屈人之兵是以先爲不可勝以待敵之可勝不可勝在我可勝在彼彼守不足我攻有餘有餘者動於九天之上不足者䧟於九地之下今陳倉雖小城守固備非九地之䧟也王國雖強而攻我之所不救非九天之􅀔夫􅀔非九天攻者受害䧟非九地守者不㧞國今巳䧟受害之地而陳倉保不􅂢之地我可不煩兵動衆而取全勝之功將何救焉遂不聽王國陳倉自冬迄春八十餘日城堅守固竟不能㧞賊衆疲弊果自解去又曰來歙與征虜將軍􅀕遵襲略陽遵道病還分遣精兵隨歙合二千餘人伐山開道從畨湏迴中畨湏廻中並地名也畨音盤武帝元封四年幸雍通囬中道前書音義曰回中在汧汧今隴州汧元縣也徑至略陽徑直也斬􅅝守將金梁因其保城􅅝大驚曰何其神也東􅀚漢記曰上聞得略陽甚恱左右怪上數破大敵今得小城何足以喜然上以略陽􅅝所依阻心腹巳壞制則其支躰也乃悉兵數萬人圍略陽斬山築堤激水灌城歙與將士固死堅守矢盡乃發屋斷木以爲兵􅅝盡銳攻之自春至秋其士卒疲弊帝乃大發􅀜東兵自將上隴􅅝衆潰走圍解於是置酒髙㑹勞賜歙班坐絶席在諸將之右賜歙妻縑千疋詔使留屯長安悉􅁥護諸將又曰大司徒鄧禹西征定河東張宗詣禹自歸禹聞宗素多􅁠謀乃表爲偏將軍禹軍到徇邑赤眉大衆且至禹以徇邑不足守欲引師進就堅城而衆人多畏賊追憚爲後拒禹乃書諸將名於竹簡署其前後亂着笥中令各􅊥之笥以竹爲之鄭玄注禮記云圎曰簞方曰笥宗獨不肯􅊥曰死生有命張宗豈辭難就逸乎禹歎息謂曰將軍有親弱在營奈何不顧宗曰愚聞一卒畢力百人不當萬夫致死可以横行宗今擁兵數千以承大威何遽其必敗乎遂留爲後拒諸營旣引宗方勒厲軍士堅壘壁以死當之禹到前縣議曰以張將軍之衆當百萬之師猶以小雪投沸湯雖欲勠力其􅀔不全也乃遣歩􅀐二千人反還迎宗宗引兵始發而赤眉至宗與戰却之乃得歸營於是諸將服其勇又曰隗􅅝大將王捷別在戎丘登城呼漢軍曰爲隗王城守者皆必死無二心願諸軍亟罷亟紀力切請自殺以明之遂自刎頸死又曰丗祖即位遣宗正劉延攻天井􅀜與田邑連戰十餘合延不得進邑迎母弟妻子爲延所獲東觀漢記曰鄧禹使積弩將軍馮愔將兵擊邑愔悉得邑母弟妻子後邑聞更始敗乃遣使詣洛陽獻璧馬即拜爲上黨太守晉書曰陶􅋲使􅁊宣李陽平襄陽侃使宣鎭之以其淮南部曲立義成郡宣招懷初附勸課農桑簡刑罰略威儀或載鉏耒於軺軒或親芸穫於壠畒十餘年間石季龍再遣􅀐攻之宣能得衆心以寡弱拒守議者以爲次於祖逖周訪又曰呉彦爲呉建平太守時王濬將伐呉造舡於蜀彦覺之請増矣爲備皓不從彦乃輙爲鐡鎻撗断江路及師臨境縁江諸城皆望風降附或見攻而㧞唯彦堅守大衆攻之不能剋退舎禮之梁書曰侯景反兵逼建業衆皆兇懼梁將羊侃爲守城督侃僞稱得外射書云邵陵王西昌侯兵巳至路衆乃少安賊爲尖頭木驢攻城矢石所不能制􅋲作雉尾炬施鐡鏃以油灌之擲驢上燒之俄盡賊又東西四面起土山以臨城城中震駭侃命爲地道潛引其土山不能立賊又作登城樓車髙十餘丈欲臨射城内侃曰車髙塹虗彼來必倒可卧而觀之不勞設備及車動果倒衆皆服焉賊頻攻不捷㑹侃病死城方䧟又曰蔡道恭爲司州刺史魏圍司州時城中衆不滿五千人食􅂊半歳魏軍攻之晝夜不息乃作大車載􅁟四面俱前欲以填塹刺史蔡道恭塹内作蒙艟􅋐艦以待之魏人不得進又潛作伏道以決壍水道恭載土填塞之相持百餘日前後斬獲不可勝計魏大造梯衝攻圍日急道恭用四石烏􅃮大弓射所中皆洞甲飲羽一發或貫兩人敵人望弓皆靡又於城内作土山多作大矟長二丈五尺施長刃使壯士執以刺魏人魏軍甚憚之陳書曰冝黄侯慧紀鎭荆州隨師濟江慧紀率將士三萬人舡艦千餘乗㳂江而下欲趣臺城遣南康太守吕肅將兵據巫峽以五條鐡鎻横江肅竭其􅀻財以充軍用隋將楊素􅁬兵擊之四十餘戰爭馬鞍山及磨刀澗守險隋軍死者五千人陳人盡取其鼻以求功賞旣而隋軍屢捷獲陳之士三縱之肅乃遁後周書曰李遷哲天和三年進位大將軍詔遷哲率金上等諸州兵鎭襄陽五年陳將章昭逹攻逼江陵梁主蕭告急於襄州衛公直令遷哲徃救焉遷哲率其所部守江陵外城與陳將程文季交戰兵稍却遷哲乃親自䧟陣手殺數人㑹江陵㹅管陸騰出兵助之陳人又因水汎長壞龍川寜朔堤引水灌城城中驚擾遷哲乃先塞水又募驍勇出擊之頻有斬獲衆心稍定俄而敵人郭内焚燒人家遷哲自率􅀐出南門又令歩兵自北門出兩軍合勢首尾邀之陳人復敗多投水而死是夜陳人又竊於城西堞以梯登者巳百數人遷哲又率驍勇扞之陳人復潰俄而大風􅁀起遷哲乗闇出兵擊其營陳人大亂殺傷甚衆陸騰復破之於西堤陳人乃遁又曰太祖以王羆爲荆州刺史進號撫軍將軍梁復遣曹義宗衆數萬國荆州堰水灌城不没者數板時旣内外多虞未遑救援乃遺羆鐡劵云城全當授夲州刺史城中糧盡羆煑粥與將士均分而食之每出戰嘗不擐甲胄大呼曰荆州城孝文皇帝所置天􅀂不祐國家使賊箭中王羆不爾王羆湏破賊屢經戰陣亦不􅀍傷彌歴三年義宗方退進封霸城縣公㝷遷車􅀐大將軍又曰王羆華州刺史沙苑之役齊神武士馬甚盛太祖以華州衝要遣使勞羆令加守備羆語使人曰老羆當道卧驩子安得過太祖聞而壯之及齊神武至城下謂羆曰何不早降羆乃大呼曰此城是王羆家生死在此欲死者來齊神武遂不敢攻又曰王思政守頴川兼河南諸軍事東魏太尉髙岳行臺慕容紹宗儀同劉豐生等率􅀐十萬來攻頴川城内卧鼓偃旗􅀂無人者岳恃其衆謂一戰可屠乃四面鼓噪而上思政選城中驍勇開門出入岳衆不能當引軍亂退思政登城遥見岳陣不整乃率歩􅀐三千出邀擊之殺傷甚衆然後還城設守禦之備岳知不可卒攻乃多修營壘又隨地􅀔髙處築土山以臨城中飛梯大車晝夜盡攻擊之法思政亦作火鑚子筭切因迅風便投之土山又以火箭射之燒其攻具仍募勇士縋而出戰岳衆披靡其守土山人亦弃山而走思政即命據其兩土山置折堞以助防守岳等於是奪氣不敢復攻齊文襄更益岳兵堰於建反洧水以灌城城中水泉湧溢不可防止懸釡更炊糧力俱竭慕容紹宗劉豐生及其將慕容永珍共乗樓􅂳以望城内令善射者俯射城中俄而大風􅁀起􅂳乃飄至城下城上人以長鈎牽船弓弩亂發紹宗窮急透水而死豐生向土山復中矢而斃生擒永珎思政謂之曰僕之破亡在於晷漏誠知殺卿無益然人臣之節守之以死乃流涕斬之并収紹宗等尸以禮埋􅄟又曰將賀􅀂敦率歩􅀐六千渡江取陳湘川陳將侯瑱討之江路遂斷糧援旣絶人懷危懼敦於是分兵抄掠以充資費恐瑱等知其糧少乃於營内聚土覆之以米集諸營軍士人各持囊遣官司部分􅀂給糧者因召側近村民佯有所訪問令於營外遥見隨即遣之瑱等聞之良以爲實乃據守要險欲曠日老敦敦又増脩營壘造廬舎示以持乆敦軍數有叛人乗馬投瑱者遂納之敦又別取一馬趣􅂳􅂳中逆以鞭鞭之如是者再三馬便畏􅂳不上後伏兵於江岸遣人乗畏􅂳馬以招瑱軍詐稱降附瑱遣兵迎接竟來牽馬馬旣畏􅂳不上敦發伏掩之盡殪又湘之人乗輕􅂳載米粟乃籠鷄鴨以餉瑱軍敦患之乃爲土人裝􅂳伏甲士於中瑱兵見之謂餉舡至逆來爭之敦甲士出而擒之此後實有饋餉乃亡命奔瑱者猶謂敦之設詐逆遣扞擊並不敢受相持歳餘瑱不能制北史曰西魏將韋孝寛守玉壁東魏大將齊神武命攻之連營數十里至於城下乃於城南起土山欲乗之以入當其山處城上先有兩髙樓孝寛更􅅞木接之令極峻多積戰具以禦之敵人以樓髙不得入遂於城南鑿地道又於城北起土山且作且攻晝夜不息孝寛復掘長塹截其道乃置戰士屯於塹上城外每穿至塹戰士即擒殺之又於塹外積柴貯火敵人有在地道内者便下柴火以皮吹之蒲拜切火氣一衝咸即灼爛城外又作攻車車之所及莫不摧毀雖有排楯莫之能抗孝寛乃縫布爲幔隨其所向則張設之布旣懸於空中其車竟不能壞城外又􅅞松麻於竿灌油加火規以燒布并欲焚樓孝寛復長作鐡鉤利其鋒刃火竿亦來以鉤遥割之松麻俱落城外又於城西面穿地作二十一道分爲四路於其中各施梁柱作訖以油灌柱放火燒之柱折城並崩壞孝寛又隨壊處堅木柵以扞之敵不得入城外盡其攻擊之術孝寛咸拒破之竟以全隋書曰梁士彦遷熊州刺史後從武帝㧞晉州進位柱國除使持節晉絳二州諸軍事晉州刺史及帝還後齊後主親緫六軍而圍之獨守􅀌城外無聲援衆皆震懼士彦慷􅁣目􅀂賊盡銳攻之樓楪皆盡城雉所存㝷仞而巳或短兵相接或交馬出入士彦謂將士曰死在今日吾爲尓先於是勇烈齊􅁬呼聲動地無一不當百齊師必却乃令妻妾軍民子女晝夜脩城三日而就帝率六軍亦至齊師解圍營於城東十餘里士彦見帝持帝􅂡而泣曰臣幾不見陛下帝亦爲之流涕時帝以將士疲倦意欲班師士庻叩馬而諌曰今齊師遁衆心皆動因其懼也而攻之其􅀔必舉帝從之大軍遂進帝執其手曰余之有晉州爲平齊之基􅀂不固守則事不諧矣朕無前慮惟恐後變善爲我守之又曰郭榮宇文護擢中外府水曹叅軍時齊㓂屢侵護令榮於汾州觀賊形􅀔時汾州與姚襄鎭相去懸逺榮以爲二城􅀌逈􅀔不相救請於州鎭之間更築一城以相控攝護從之俄而齊將祖孝先攻䧟姚襄汾州二城唯榮所立者獨能自守護作浮橋出兵渡河與孝先戰孝先於上流縱火筏以擊浮橋護令榮督便水者引取其筏以功授大都督護又曰劉弘字仲逺拜泉州刺史㑹髙智慧作亂以兵攻州弘城中守百餘日救兵不至前後出戰死亡太半糧盡無所食與士卒數百人煑犀角腰帶及剥樹皮而食之一無離叛賊知其飢餓欲降之弘抗節彌厲賊悉衆來攻城䧟爲所害上聞而嘉歎者乆之賜物二千叚又曰李景檢校代州揔管漢王諒作亂并州景發兵拒之諒遣劉嵩襲景戰於東城昇樓射之無不應弦而倒選壯士擊之斬獲略盡諒復遣嵐州刺史喬鍾葵率勁勇三萬攻之景戰士不過數千加以城池不固爲賊衝擊崩毀相繼景且戰且築士卒皆殊死闘屢挫賊鋒司馬馮孝慈司法叅軍吕玉並驍勇善戰儀同三司侯莫陳又多謀畫上拒守之術景知將士可用其後推誠於此三人無所關預唯在閤持重時出撫循而巳月餘朔州緫管楊義臣以兵來
