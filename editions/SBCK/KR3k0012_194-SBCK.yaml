front:
  text: 太平御覽卷第一百九十四
  hash: sha256:37fb86c9e879aff38a76d808eafa100d6c23fcf083cebff911abd9748af5c15f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_194-1a}
body:
  text: 居處部二十二館驛傳舎亭館驛說文云館客舎也從食官聲周禮曰五十里有市市有館館有積以待朝聘之客廣雅釋宫云館舎也桂􅁐云客舎也待賔之舎曰館開元文字云凡事之賔客館焉舎也館有積以待朝聘之官是也客舎逆旅名􅀱館也公館者公宫與公所爲也私館者自卿大夫以下之家禮記曰舊館人之喪脫驂而􅐠左傳曰敢辱大館又莊公曰楚令尹子元欲蠱文夫人爲館於其宫側而振萬焉萬儛又僖上曰改館晉侯饋七牢焉詩國風鄭緇衣曰適子之館兮還子授子之粲􅀆又大雅云篤公劉于􅃎斯館周禮地官司徒下云國野之道十里有廬廬有飲食三十里有􅀫􅀫有路室路室有委五十里有市市有􅀱館館有積注云􅀱樓館可以􅀚望也又秋官司宼下云凡諸侯入王則逆勞于畿及郊勞視館注云視館致館也又司儀云主君郊勞交擯三辭車送拜三揖三辭受拜車送三辭再拜致館亦如之注云館舎也使大夫授之君又以禮親致之儀禮聘禮云卿致館注云致至也至此館主人以禮致之所以安之也又環人云掌送迎􅀖國之通賔客以路節逹諸四方舎則授館又云至于國賔入館次于舎門注云次待事于客儀禮公食大夫禮云有司卷三牲之爼歸于賔館注云牲之爼正饌尤尊盡以歸尊賔之至也又聘禮云厥明訝迎于館注云此訝下大夫以君命迎賔謂之訝迎亦皮弁也禮記曲禮上云問疾弗能遺不問其所欲見人弗能館不問其所舎又檀弓上云賔客至無所館夫子曰生於我乎館死於我乎殯又云子貢曰於門人之喪未有所說驂於舊館無乃以重乎又曽子問云卿大夫之家曰私館公館與公所爲曰公館注云公館若今縣官舎也左傳莊元年經云夏單伯送王􅁎秋築王􅁎之館于外注云公在諒闇慮齊侯當親迎不忍便以禮接於廟又不敢逆王命故改築舎於外也又僖三十年傳云晉分曹衛之田公使臧文仲徃􅀫於重館重館人告曰晉新得諸侯必親其㳟不速行將無及也又襄三十一年傳云子産相鄭鄭伯如晉晉侯以我喪故未之見也子産使壞其館之垣而納車馬士文伯讓之曰􅁦邑以政刑之不脩宼盗充斥是以令吏人完客所館今吾子壞之其若異客何子産曰僑聞之文公之爲盟主也宫室無􅀚卑庳臺榭以崇大諸侯之館今銅鞮之宫數里而諸侯舎於􅀠人門不容車不可踰越士文伯不能對晉侯見鄭伯有加禮厚其宴好而歸之乃築諸侯之館又昭十三年傳云宣子謂叔向曰子能歸季孫乎對曰不能鮒也能乃使叔魚見季孫曰鮒聞諸吏將爲子除館於西河其若之何且泣又曰叔孫所館雖一日必葺其牆屋去之如始至漢書薛宣子惠爲彭城令宣過之橋梁郵驛不脩宣知其不能又郊祀志曰孫卿曰仙人可見上徃常遽以故不見今陛下可爲館如維氏城置脯酒神人可致且仙人好樓居於是上令長安作飛廉桂館甘泉作延夀館又曰鄭莊置驛以延賔客又曰公孫弘起徒歩數年至宰相封侯於是起客館開東閤以延賢人與叅謀議又元后傳曰王莽又知太后婦人饜居深宫中莽欲娱樂以示其􅁠迺令太后四時車駕廵狩四郊存見􅀌寡婦人春幸蠒館率皇后列侯夫人桑遵霸水而祓除又外戚傳曰成帝許美人在上林鹿館數召入飾室中元延二年懷子漢書叙傳述元紀云宫不新館陵不崇墓又揚雄傳長楊賦云張網置罘捕熊豪猪狖玃狐兎麋鹿載以檻車輸長楊射熊館又羽獵賦云於是禽彈中衰相與集於靖􅁳之館魏志曰文昭甄宣后明帝母也后已早廢父逸上蔡令早卒及明帝即位追封逸爲上蔡侯謚敬侯適孫蒙襲爵薨子暢嗣上爲暢起大第車駕自臨之故丗說曰魏明帝爲外祖母築館于甄氏自行視謂左右曰館當以何爲名侍中繆襲對曰陛下聖恩齊于哲王罔極過于曽閔此館之興情鍾舅氏冝以渭陽爲名魏書曰帝於後園爲母起觀及宫名其里曰渭陽里晉書天文志云傳舎九星在莖善上近河賔客之館主胡人入中國客星守之備姧使亦曰胡兵起宋書文帝夲紀云帝臨􅀇武館閱武又隱逸雷次宗傳云徴詣京邑爲築室於鍾山西巖下謂之招隱館齊書禇伯玉傳云髙帝即位手詔呉㑹二郡以禮迎伯玉伯玉辭疾上不欲違其志勑於剡白石山立太平館以居之梁書髙祖紀云大統七年幸於宫城西立士林館延集學徒置集雅館以招逺學冲虚真經黄帝云黄帝於是放萬機舎寢室去直待徹鍾縣減厨膳退而閑居大庭之館齋心服形三月不親政事漢武帝故事云上自封禪後夢髙祖坐明堂羣臣亦夢於是祀髙祖於明堂以配天還作髙陵館郡國誌台州仙石山有館土人謂之黄公客堂堂兩邊有石歩廊觸石雲起崇朝必有雨有四竿筋竹風吹自成隂拂石皆淨即王方平遊處荆州圖記云襄陽縣南水行四十里陸道六十里有桃林館建康地記云顯仁館在江寧縣東南五里青溪中橋東湘宫巷下古髙麗使處西京􅄂記云公孫弘自以布衣爲􅌠相乃開東閤營客館以招天下之士其外曰欽賢館以待大賢翹材館以待大材接士館以待國士又曰梁孝王遊於忘憂之館進諸游士各使爲賦隱訣易遷館含眞臺有女眞二人爲主一曰張微子二曰􅀓禮和晉宮閤名云華林舘有繁昌館建康館顯昌館延祚館壽安館干禄館班孟堅西都賦云於是天子乃登屬玉之館歷長楊之榭子生夏五月余之長安壬寅于新安之千秋亭甲辰而弱子失越翌旦乙巳瘞于亭髙允塞上公亭詩序曰延和三年余赴京師發石門北行失道夜寓􅀫代之快馬亭其俗云古塞上公所貴之邑也曰公有良馬因以命之此其所貴也負長城而面南山皐澤帶其側涌波灌其前停騑䇿以流目抱遺風以依然仰德音於在昔遂揮毫以􅀉言代人云塞上公姓李代之李氏並其後也張平子西京賦曰頋徃昔之遺舘􅀗林光於秦餘又云郡國宫舘百四十五右極􅉦厔并卷酆鄠又云豫樟珍館揭焉中峙班婕妤自傷賦曰痛陽禄與柘館皆宫名生二子處此二館皆失也仍襁褓而罹災豈妾人之殃咎􅀆將天命之不可求也張衡西京賦曰旣新作於迎風增露寒與儲胥託髙基於山岡直摕霓以髙居薛綜注曰此二皆館名張衡東京賦曰其西則有平樂都場示逺之館龍省盤蜿天馬半漢劉邵趙都賦曰置酒乎黄華之館左思魏都賦曰營密館以周坊飾賔侣之所集潘尼東都館賦曰東館者蓋東武陽侯之館也我而遷居謂余曰吾將老焉故有終焉之心而無移易之意子且爲我賦之傳舎釋名曰傳傳也人所止息而去後人復來轉相傳無常人也史記相如爲趙王奉璧使􅁗王舎之廣成傳舎古縣也或云􅁗始皇因爲望海臺傳載曰鄭審開元中爲殿中侍御史充館驛使令每傳舎立十二辰候自審始也亭釋名曰亭停也人所停集也風俗通曰謹案春秋國語有寓望謂金亭也民所安定也亭有樓從髙省丁聲也漢家因􅁗大率十里一亭亭留也今語有亭留亭待蓋行旅􅀫食之所館也亭亦平也民有訟諍吏留辯處勿失其正也漢書項羽傳曰烏江亭長艤舡待羽又曰武帝元封元年幸緱氏登太室上聞万歳聲者三故立万歳亭又韓信傳曰信從下郷南昌亭長食張晏曰下郷屬淮隂亭長妻苦之乃晨炊蓐食又曰李廣甞夜從一􅀐至霸陵亭覇陵尉酢呵止廣􅀫亭下續漢書曰靈帝到夏門亭使竇武持節以王青蓋迎入殿中又曰蔡邕避難在呉告人曰吾昔至㑹稽髙遷亭見竹椽從東間數第十六可以爲籥取用果有異聲東觀漢記曰王郎起光武自薊東南馳晨夜至饒陽無蔞亭時天寒衆皆飢馮異上豆粥又曰趙孝父爲田禾將軍孝甞從長安來欲止亭亭長難之言有貴客過掃灑不欲穢汙地良乆乃聽止吏因問曰田將軍子從長安來何時發幾日至孝曰㝷到矣張璠漢記曰楚曄爲天水太守之官與故太守䘮會於隴亭堂吏移䘮避曄曄讓䘮於正堂􅀜西稱之謝承後漢書曰倉梧廣信女子􅂫娥行􅀫􅍎巢亭爲亭長龔壽所殺及婢致富取財物埋置樓下交阯刺史周敞行部􅀫亭覺夀姧罪奏之殺夀列異傳云鵠奔亭漢官典職曰洛陽二十四街街一亭十二城門門一亭魏略曰從長安至大􅁗人民連屬十里一亭魏書曰元皇后以漢延熹三年二月生齊郡白亭有黄氣滿室移日不散呉志曰孫權將如呉親乗馬射虎庱亭馬爲虎所傷權投以雙㦸虎即斃又曰大史慈與劉繇住縣立屯府大爲山越所附孫䇿躬自攻討遂見囚執䇿即解􅅞捉其手曰寜識神亭戰時􅁘若卿尓得我云何慈曰未可量也䇿大􅀏王隱晉書曰徐苗字叔胄髙密淳于人也曾祖至行感靈夜有神人告亭欲崩苗岀亭崩得免又曰王羲之􅀄渡江會稽有佳山水名士多居之與孫綽許詢謝尚支遁等宴集於山隂之蘭亭崔鴻十六國春秋曰慕容垂請入鄴城拜廟符不許乃潛服而入亭吏禁之垂怒斬吏燒亭而去沈約宋書曰孔􅇞子與王華並有富貴之願自徐羡之等秉權日夜構之於太祖寗子甞東歸至金昌亭左右欲泊船􅇞子命去之曰此弑君亭不可泊也又曰徐湛之爲廣陵郡守善爲政威惠並行廣陵城舊有髙樓湛之更加脩整更起風亭月觀吹臺琴室果竹繁茂花藥成行帝王丗紀曰桀敗於鳴條之野案孟子舜卒鳴條乃在東夷之地或言陳留平丘今有鳴條亭在安邑之西丗說曰過江諸人每至暇日輙相要出新亭藉卉飲宴周侯在坐而歎風景不殊舉目有江河之異皆相視流淚唯丞相愀然變色曰當共勠力王室尅復神州何至作楚囚相對泣􅁘夢書曰亭爲積功民所成也夢築亭者功積成也夢亭壞敗恩澤傷也韋耀雲陽賦曰八郷九市亭􅀱三六列樹表塗路有廬􅀫丹陽記曰京師三亭新亭呉舊亭也故基淪毁隆安中有丹陽尹司馬恢移創今地謝石創征虜亭三呉搢紳創治亭並太元中㝷陽記曰稽亭北瞰大江南望髙岳淹留逺客因以爲名焉劉楨京口記曰劫亭湖亭通阿湖陵郡治丹徒縣八縣來徃經過此湖中多劫於邊立亭因以爲名裴淵明廣州記曰尉佗築臺以朔望􅂛拜號爲朝拜臺傍江構起華館以送陸賈因稱朝亭永嘉記曰樂城縣三京亭此亭是祖送行人之所王韶之始興記曰淘水源有堯山長嶺衡亘逺望如陣雲山下有平陵陵上有古大堂基十餘處雖已夷澷而猶可識謂曰堯故亭父老相傳堯南廵登此山故亭即其行宫三齊略記曰曲城齊城東有万歳水永北有万歳亭漢武帝所造伏琛齊地記曰平壽城西北有平望亭亦古縣也或云􅁗始皇因爲望海䑓莊子曰仁義者先王之蘧廬也注傳舎也華延雋洛陽記曰城内都亭華林奉常廣丗昌益廣莫定陽遮要暴室廣陽西明万歳文陽東明視中東因建奉止姧德宫東陽千秋安衆孝敬清明二十四亭河隂界東岀户郷亭南泉亭街郵亭孔蹕㑹稽記云江夏太守宋輔於重山南白樓亭立學敎授又郡國志云沛國桓儼避地至㑹稽聞陳業賢而徃􅀱之不見臨去入交州留書繫白樓亭柱而别翻陽記曰白雲亭在縣西南旁對干越亭而峙焉跨古城之危瞰長江之深隋州刺史劉長卿題詩曰􅀌城上與白雲齊因以白雲爲名豫章記曰徐孺子墓在郡南十四里曰白杜亭呉嘉禾中太守長沙徐熈於墓􅎬種松太守南陽謝景於墓側立碑永安中太守梁郡夏侯嵩於碑邊立思賢亭松碑亭今並在松大合抱亭丗丗脩治至今謂之謝君亭越絶書曰女陽亭者勾踐入宦於呉夫人從道産女於亭養於雋李謂之語兒郷郡國志皇甫謐云鳴條之野立鳴條亭又曰涼州􅀱馬亭貳師伐大宛得天馬感西風頓羈而逸至燉煌北塞下鳴而去貳師􅀱於此遂名之又曰韶州潼溪里有三楓亭又曰濟州周首亭即埋長狄喬如首於山西是也又曰兾州華陽亭即嵇叔夜學琴於此又曰幽州督亢亭即荆軻以地圖獻􅁗處又曰郴州武丁岡有欒亭即太守欒巴所建也又曰柯亭一名千秋亭又名髙遷亭㑹稽記云漢議郎蔡邕避難􅀫於此亭仰觀榱竹知有竒響因取爲笛果有異聲又曰潤州覆舟山有閬風亭襄江記峴山亭在襄陽縣東一十里今基跡尚存兩京新記曰西京􅁐内有望雲亭鞠塲亭栁園亭眞興亭神臯亭園桃亭臨渭亭永泰亭南昌園園北昌國亭流杯亭青門亭邵平種􅀲之所也又曰東亰上陽宮有曜掌亭九洲亭又曰東都􅁐内有金谷亭凝碧池建安記曰止馬亭在飛
