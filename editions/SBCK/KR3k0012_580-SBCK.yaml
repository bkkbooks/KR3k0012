front:
  text: 太平御覽卷第五百八十
  hash: sha256:1a34ca5a96b5519e1d823e84f4de55e9e659132a0a2793881da680c84f3da19d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_580-1a}
body:
  text: 樂部十八笛箎管籥笛釋名曰笛滌滌然也史記曰黄帝使伶倫伐竹於昆谿斬而作笛吹之作鳯鳴風俗通曰笛漢武帝時工人丘仲所造也夲出羗中笛滌也所以滌邪􅁾納之雅正也長尺四寸七孔樂書曰􅅇者滌也丘仲所作可以滌蕩邪氣出楊正聲是故列和善吹裁十二之音應律荀勗樞問依三尺二調成均剪雲夢之霜筠法龍吟之異韻三孔爲籥文舞執之邠人吹也五孔爲篴祴樂用周師掌之六孔爲笛羗人吹之七孔下調漢部用也今之七星古之長笛一定爲調合鍾磬之均各有短長應律吕之度雅樂部内咸用之也馬融自叙曰融性好音能皷琴吹笛爲督郵獨卧郿平陽塢中有洛客舎逆旅吹笛相和融去京師踰年蹔聞甚悲而樂之逆慕簫琴皆有頌而笛獨無乃作笛賦晉書曰桓伊字叔夏善音樂有蔡邕柯亭笛甞吹之王徽之越京泊舟青溪側伊素不相識於岸上過徽之便使人謂之曰聞君善吹笛試爲我一奏伊時巳貴顯素聞徽之名便下車踞胡床爲作三調之弄便上車去客主不交一言晉書向秀作思舊賦曰鄰家有吹笛發聲􅋁亮追想疇昔遊宴之好晉中興書曰帝舅王愷甞置酒王遵王敦俱徃女妓吹笛小失聲愷意便令黄門歐殺之一坐改容敦神色自􅀂沈約宋書曰晉太始十年中書􅁥荀勗中書令張華令郝生皷琴宋同吹笛以爲新引相和唐書曰文宗時雲朝霞以善吹笛進上爲新聲雅樂朝霞能承意變聲頗符上旨猶是有寵丗􅀃曰謝仁祖妾何紀有國色善吹笛仁祖死阿紀誓死不嫁郗曇時爲北中郎設權計遂得阿紀爲妾阿紀終身不與曇言幽明記曰永嘉中泰山巢氏先爲相縣令居在晉陵家婢採薪忽有一人隨追尋隨婢還家不使人見見形者唯婢而巳毎與婢飲宴輙吹笛而歌歌曰閑夜寂以清長笛亮且鳴􅀂欲知我者姓郭名長生又曰代郡界有一亭常有恠不可詣止有諸生壯勇行歌正􅀫􅀑吹五孔笛有一手都不能得攝笛諸生不耐忽便􅀏謂汝止有一手郍得遍笛我爲汝吹來􅀑云爲我少指耶乃數十指出諸生知其可擊㧞劒斫之得一老雄雞從者並雞鶵文士傳曰蔡邕告吴人曰吾昔常經㑹稽髙遷亭見屋㭬竹東間第十六可爲笛取用果有異聲古歌辝曰長笛續矩笛長願陛下保壽無極傳子曰列和善吹笛吴􅁎之聲無以加也西京雜記曰髙祖􅀄入咸陽宫周行府庫金玉珍寳不可稱言其􅀹驚異者玉笛長二尺三寸六孔銘曰昭華之琯樂纂曰唐玄宗時樂人孫處秀善吹􅅇好作犯聲當時皆以爲新意流羙樂人皆效之其聲變態日増因有犯調犯調即今之所尚也又曰太和十年中書􅁥荀勗中書令張華出御府銅竹律二十五具命太樂郎劉秀等校試其三具與杜夔及左延年法律同其二十二具視其銘題尺寸是笛律也問恊律中郎將列和辝昔魏明帝時令和永受笛聲以作此律欲使學者別居一坊歌詠講習依此律調伹識其尺寸之名則竹􅁝歌詠皆得均含歌聲濁者用長笛長律歌聲清者用短笛短律凢絃歌調張清濁之制不依笛尺寸名之則不可知也又曰黄鍾笛晉時三尺八寸元嘉九年太樂令鍾宗之减爲三尺七寸十四年治書令史奚縱又减五分爲三尺六寸五分劉和之東箱長笛四尺二寸又曰蕤賔箱􅅇晉時二尺九寸宗之减爲二尺六寸縱又减二分爲二尺五寸八分又曰姑洗箱笛晉時三尺五寸宗之减爲二尺九寸七分縱又减五分爲二尺九寸二分又曰司馬法軍中之樂皷笛爲上使聞之者壯勇而樂和細􅁝髙竹不可用也慮悲聲感人士卒思歸之故也又曰横笛小箎也漢靈帝好胡笛有胡笛箎出於胡吹即此也梁胡歌云快馬不湏鞭拗折楊柳枝下馬吹横笛愁殺路傍児此歌辝元出北國知撗笛是北國名今撗笛皆去義觜其有觜者謂之義觜笛國史􅀘曰李舟好事甞得村舎煙竹截以爲笛堅如鐵石以遺李牟牟吹􅅇天下第一月夜泛江與舟吹之溜亮逸發俄有客立於岸呼舡請載旣至請笛而吹其爲精壯山石可裂牟平生未甞見及人破呼吸盤辟應指粉碎客散不知所之舟著記疑其蛟龍也又曰李牟秋夜吹笛於􅀲州舟艥甚隘􅀄發調群動皆息及數奏微風䬃然而至俄頃舟人賈客有怨嗟悲泣之聲箎釋名曰箎啼也聲從孔出如嬰兒啼聲也毛詩曰彼何人斯伯氏吹塤仲氏吹箎周官曰笙師掌教吹箎尓雅曰大箎謂之沂郭璞曰箎以竹爲之長一尺四寸圍三寸一孔上出寸三分名翹横吹之小者尺二犍爲舎人曰大箎其聲悲沂鏘然也詩云仲氏吹箎也廣雅曰箎以竹爲之長大四寸有八孔前有一孔後有四孔頭有一孔月令仲夏之月命樂師調箎詩節南山云伯氏吹塤仲氏吹箎土曰塤竹曰箎箋云伯仲諭兄弟也我爲汝思如兄如弟其相應和如塤箎言俱爲王臣冝相親愛之史記曰伍子胥至於江上無以糊其口行蒲伏􅁏袒吹箎乞食於吴市東􅀚漢記曰明帝幸南陽舊宅召校宮子弟作雅樂奏鹿鳴上御塤箎和之以娯嘉賔齊書曰丗祖於南康郡内作􅇊有􅁝無管空中聞有箎聲調節相應丗夲曰􅂫成公造箎吹孔有觜如酸􅀥􅂫成公平王時諸侯也古史考曰古有箎尚矣􅂫成公善箎而記者因以爲作謬也又曰􅁀新公所造舊志曰一曰管史臣案非也雖不知􅁀新公何代人而非舜前人明矣舜時西王母獻管則是巳有器新公安得造箎洞􅁳記曰建元二年帝幸騰充䑓以望四逺於臺上撞磬玉鍾懸􅀺之磬吹霜條之箎唱來雲依日之曲洛陽伽藍記曰後魏河間王琛有婢朝雲善吹箎能爲團扇歌隴上聲琛爲􅁗州刺史羗叛屢討不勝琛令朝雲假爲貧女吹箎而乞羗聞之皆流涕相謂曰何故捨墳井在山谷爲㓂耶即相率而降秦民語曰快馬徤兒不如老嫗吹箎管蔡邕章句曰管者形長一尺圍寸有孔無底其器今亡風俗通曰管􅃮竹長一尺六孔十二月之音象物貫地而牙故謂之管尓雅曰大管謂之簫其中謂之䈌小者謂之篎郭璞注曰管長尺圍寸併􅃮之有底賈氏爲之如箎六孔犍爲舎人曰大管者聲髙大故曰篙者髙也中者聲精密故曰䈌宻也小者聲音清妙也廣雅曰管象箎長尺圍寸有六孔無底班固曰黄帝作律以玉爲管長尺六孔爲十二月音至舜時西王母獻白玉管漢章十二年零陵營道舜祠下得笙一白玉管則古者又以玉爲管矣班氏用銅之言外然之義未爲得也求律所生大極之數起於一在子以三乗之得三在丑以次至酉得一萬九千六百八十三篇黄鍾之母以爲法周十二辰得十七萬七千一百四十七黄鍾之子以爲實實始法而一得則九寸則諸律也大戴禮曰舜時西王母獻白玉琯􅀃文管如箎六孔十二月之音物􅀜地而牙故謂之管從竹管聲琯者古者有玉管焉樂法圗曰次主東律東律主黄鍾聖人承天樂用管宋均注曰管黄鍾九寸管也吹管者以知律管音調則律暦正周禮春官少師曰小師掌教簫管鄭司農曰管如箎六孔玄謂管如􅐟而小併兩而吹之又曰􅀌竹之管於圎丘奏之孫竹之管於方丘奏之隂竹之管於宗廟奏之鄭玄云􅀌竹竹特生者也孫竹竹枝根未生者也隂竹生山北籥釋名曰籥躍也氣躍出也尓雅曰大籥謂之産中者曰仲小者曰箹郭璞曰籥也笛三孔而短犍爲舎人曰仲其聲適仲吕也小者形聲細小曰筠也禮記曰葦籥伊祁氏之樂也籥春分之音萬物振躍而出也周官笙師掌教吹籥籥師教國子舞羽吹籥籥章掌幽籥鄭玄曰卯地之竹也又曰籥師掌教國子秋冬教吹籥歴代文舞之樂所執羽
