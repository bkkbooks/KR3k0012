front:
  text: 太平御覽卷第五百七十二
  hash: sha256:83487681ea50a82fb5051f4386b9bcd94f787d041a945d5cff7196ba74f8c108
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_572-1a}
body:
  text: 樂部十歌三山海經曰夏后開上三嬪于天得九辨與九歌以下焉開始歌九招招於大穆之野上美人於天帝得天樂下也帝俊八子是始爲歌帝俊即帝舜也太元真經茅􅄹内紀曰􅁗始皇三十年九月庚子􅄹曽祖於華山之中乗雲駕龍白日􅂛天是時其邑謡歌曰神仙得者茅􅀄成駕龍上昇入泰清時下亥洲􅃧赤城繼丗而徃在我􅄹帝􅀂學之臘嘉平始皇聞謡歌乃有尋仙之志因改臘曰嘉平楚詞曰九歌者屈原之所作昔楚南郢之邑沅湘之澗其俗敬􅀑神於夜必作樂鼓舞以樂諸神屈原放逐竄伏其域見俗人􅀕祀之禮其辭鄙陋爲作九歌之曲風俗通曰張仲春武帝時人也善雅歌與李延年並侍毎奏新歌莫不稱善然不知休息終至於敗亡以論人之進退當有節奏又曰百里奚爲􅁗相堂上作樂所賃澣婦自言知音呼之援琴撫絃而歌曰百里奚􅀄娶我時五羊皮臨當別行烹乳雞今適冨貴忘我爲因尋問之乃其妻丗􅀃曰王曇孫年十四五便歌諸妓向謝公稱數王郎能歌謝公甚欲聞之而王旣名家年少無由得聞諸妓又具向王􅀃謝公意後出東府􅁟山上作􅇊王時作兩丸髺著袴褶􅀐馬住􅁟山下􅁃家墓林中作一曲歌于時秋月王因舉頭看北林卒曲便去􅁟山上妓白謝公曰此是王郎歌也􅀃苑曰襄成君始封之日衣翠衣帶玉􅇾劒履矯舄立乎流水上楚大夫莊辛過而􅀃之曰臣願把君之手其可乎襄成君忿然作色而不言莊辛遷延而稱曰君獨不聞夫鄂君方乗青翰之舟張翠盖㑹鍾鼓之音越人擁檝而歌曰今夕兮搴洲中流何日兮得與王子同舟山有樹木兮木有枝心􅀃君兮君不知於是鄂君乃舉綉􅀍而覆之三輔决録曰梁鴻東出􅀜過京師作五噫之歌曰陟彼北邙兮噫顧瞻帝京兮噫宫闕崔嵬兮噫民之劬勞兮噫遼遼未央兮噫肅宗聞而悲之求鴻不得劉向別録曰漢興己來善歌者魯人虞公發聲清哀盖動梁塵受學者莫能及也石崇楚妃歌辭序曰楚妃歎莫知所由楚之賢妃能立德著勲垂名於後者唯楚􅁎焉故爲歌辭襄陽􅂄舊傳曰宋玉識音而善文襄王好樂而愛賦旣美其才而憎其似屈原也乃謂之曰子盍從楚之俗使楚人貴子之德乎對曰昔楚有善歌者王其聞歟始而曰下俚巴人國中唱而和之者數萬人中而曰陽阿採菱國中唱而和之者數百人旣而曰陽春白雪朝日魚離含啇吐角絶節赴曲國中唱而和之者不過數人盖其曲弥髙其和弥寡穆天子傳曰宴西王母于瑶池之上西王母爲天子歌日白雲在天山陵自出道里悠逺山川間之將子無死尚能復來天子荅曰予歸東􅁟和治諸夏萬民平均吾顧見汝比及三年將復而野又曰天子東遊於黄澤􅀫于曲洛洛水之曲也使宫樂謡曰黄之池其馬歕沙音普悶反黄之澤其馬歕玉漢武内傳曰西王母降命侍女安法嬰歌玄雲曲曰大象雖云寥我把天地户披雲汎靈輿鯈忽適下􅁟泰真靈中唱始知風塵􅀂頥神三田中約精六闕下上元夫人自彈雲林之璈鳴絃駭洞清音零㓪乃奏歩玄曲其辭曰黄陟眞道騰歩玄登天霞􅀒笈造天􅀜借問太上家忽遇紫微圃真人列如麻流景清颷起雲盖映朱葩蘭房闢林闕碧室啓瓊沙丹䑓結空構曄曄生露華誰言終有終扶桑不爲查王母命侍女田四非荅歌其辭曰晨登太霞宫挹此玉水蘭夕入玄圃闕採蘂掇琅玕濯足瓠􅀲河織女立津盤􅄍納抱景雲味之當一飡朝發漫汗府暮􅀫鈎陳垣莫與丗人􅀃行尸言此難列女傳曰趙簡子南擊楚津吏醉卧不能渡召欲殺之津吏女姢持檝而前曰昔父聞君東渡不測之水恐風波之起故禱九江三淮之神不勝巫祝杯酒飲沉醉至於此矣妾願鄙􅥟易父之死簡子將渡用檝少一人姢願備貟用檝遂與渡中流奏河激之歌歌曰昇彼河兮西觀清水揚波兮杳􅁳禱求福兮醉不醒誅將加兮妾心驚蛟龍助兮主將歸呼來掉兮行勿疑簡子大恱立爲夫人文士傳曰太祖雅聞阮瑀辟之不應連見逼乃逃入山中使人焚山得瑀送至召入太祖時征長安大延賔客怒瑀不與言使就􅇊入列瑀善解音能鼓琴撫絃而歌曰弈弈天門開大魏應期運青盖廵九州在東西人怨士爲知已死女爲恱者玩恩義苟潜暢他人焉能亂爲曲旣捷音声殊妙太祖大恱淮南子曰歌採菱發陽阿鄙人聽之不􅀂延露陵陽非歌拙也聽各異也又曰寗戚欲干齊桓公困窮無以自逹爲啇旅將任車任載也毛詩日我任我輦也以啇於齊暮􅀫於郭門之外桓公郊迎客夜開門寗戚飯牛車下望見桓公而悲擊牛角而疾啇歌歌曰南山粲白石爛短􅄄單衣長止骭生不逢堯與舜禪終日飼牛至夜半長夜漫漫何時旦桓公聞之撫其僕之手曰異哉歌者非常人也命後車載之又曰易道良馬使人欲馳飲酒而樂使人欲歌燕丹子曰荆軻入􅁗不擇日而發太子與知謀者皆素衣冠送之於易水之上荆軻起爲壽歌曰風蕭蕭兮易水寒壯士一去兮不復還髙漸離擊筑宋意和之孟子曰有孺子歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足孔子曰小子聽之哉韓子曰宋玉築武宮謳倡行者心歡築者不倦王召賜之對曰臣師射暓之謳賢於臣召使之謳行者不止築者甚倦王恠問對曰王試度其功美四板射瞀八板甚堅美五寸射瞀二寸列子曰林􅀋年且百歳拾遺穂於故畦並歌進孔子適衛望之於野頋謂弟子曰彼可與言者試徃評之子貢請行逆之壠端面而歌曰先生曽不悔乎行歌行歌拾穗林􅀋行不留歌不輟逸士傳曰堯時有八九十老人擊壤而歌曰日出而作日入而息鑿井而飲耕田而食帝何力於我哉列女傳曰魯陶嬰妻者夫死守志不二作歌詩曰悲夫黄鵠之早寡七年不􅀟宛勁獨􅀫不與衆同夜半悲鳴想其故雄天命早寡獨􅀫何傷寡婦念此泣下數行鳴呼悲哉死者不可忘飛鳴尚然况於貞良雖有賢雄終不可重行韋昭洞暦記日紂無道比干知極諌必死作秣馬金闕之歌西京􅄂記曰髙帝令戚夫人歌岀塞望歸之曲侍婢數百皆爲之後宮齊唱聲入雲霄又曰賈佩蘭􅀃在宫中時常以絃管歌舞相娱竟爲妖服以趍良時十月十五共入靈女廟吹笛擊筑歌上雲之曲而相連臂踏地爲節歌赤鳯來也洞􅁳記曰漢武帝使董謁乗浪霞之輦以昇壇候王母王母至與宴歌奏春歸之樂謁乃聞王母歌聲而不見其形歌聲繞梁三匝乃上旁梁草樹枝葉皆動歌之感也張華愽物志曰薛談學謳於􅁗青未窮青之技而辭歸青餞於郊乃撫節悲歌聲振林木響遏行雲談乃謝求返歸辛氏三􅁗記曰隴右西開其阪九迴不知髙幾里欲上者七日越髙處可容百餘家下處數十萬户上有清水四注流下俗歌曰隴頭流水鳴聲幽噎遥望􅁗川心肝斷絶黄閞武陵記曰有緑羅山側岩垂水懸蘿百里許得明月池碧潭鏡澈百尺見厎素岸􅀂雪松如挿翠流風叩阿有􅁝桐之韻􅁟人爲之歌曰仰兹山兮迢迢層石構兮峩峩朝日麗兮陽岩落景梁兮隂阿鄣壑兮生音吟籟兮相和敷芳兮縁林恬淡兮潤波樂兹潭兮安流緩􅈛櫂兮詠歌冝都山川記曰峽中猨鳴清山谷傳其響冷冷不絶行者歌之曰巴東三峽猨鳴悲猨鳴三聲淚沾衣鄭緝之東陽記曰歌山在吴寕縣故老相傳云昔有乗舡從下過見一女子汲乃登此山􅀒水行歌甚妍而莫之所由故名歌山劉欣期交州記曰俗好鼓琴牧竪於野澤乗牛唱遼遼之歌歌曲􅀃牛力強弱耕具輕重也僮􅀠於月下撫掌發烈謡以令美歌魏太山􅁗州記曰隴西郡隴山其上懸􅄍溜於中嶺泉亭因名萬石泉泉溢漫散而下㳙澮皆注有人昇此而歌紀義宣城記曰臨城縣南三十里有盖山登百許歩有舒姑泉俗傳去有舒氏女未適人與其父析薪於此女坐泉處牽挽不動遽告家比還唯見清泉湛然母云女好音樂乃作絃歌泉湧廻流􅀟鯉赴節盛弘之荆州記曰臨賀馮乗縣有歌父山傳云有老人不娶室而善歌聞者莫不灑泣年八十餘而聲逾妙及病將困命郷里六七人與上山穴中隣人辭歸老人歌而送之聲振林木響遏行雲餘音傳林數日不絶太平御覽卷第五百七十二
