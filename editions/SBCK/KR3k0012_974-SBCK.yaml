front:
  text: 太平御覽卷第九百七十四果部十一
  hash: sha256:6905db7fcf408ce7c46a47ef6ec77fc02f9a4e43560b693ff501cc7e1f08f915
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_974-1a}
body:
  text: 枳梖探蒳木威榞木朹楊桃楊榣冬熟猴闥􅀜桃土翁狗槽雞橘猴惣多南王壇三廉􅀑目甘蔗甘藷燕薁廉薑枳椇音只短毛詩嘉魚南山有䑓曰南山有枸北山有楰枸枳枸詩義䟽曰枳枸樹髙大如白楊所在皆有子著支端支柯不直噉之甘羙如飴八九月熟江南特羙今官園種之謂之木􅁡能令酒味薄若以爲屋柱則一屋酒可薄禮記曲禮下曰婦人之贄椇榛脯脩鄭玄曰祖枳椇也廣志曰枳椇葉似柳子似􅃢瑚其味如􅁡十一月熟樹乾者益羙岀南方大如指頭崔豹古今注曰枳椇子一名樹􅁡一名木錫實形拳曲核在實外味甜羙如餳蜜一名白石一名木石一名枳椇也探音蟾南越志果名似柰而酸薛瑩荆楊以南異物志曰探子樹産山中實似梨冬熟味酸丹陽諸郡有之蒳音納異物志曰蒳草樹果如栟櫚而小三月採其葉細破乾之味近苦雞舌香食之益善也顧徽廣州記曰山㯽榔大於蒳子蒳子土人亦呼爲㯽榔左思吴都賦曰藿蒳荳䓻木威顧徽廣州記曰餘甘甘蕉木威黄皮其味殊苦顧徽廣州記曰木威髙丈餘子如橄欖而堅削去皮以爲粽榞木吴録地理志曰廬陵南部雩都縣有榞樹其實如甘蕉而核味亦如之朹音求爾雅曰檕音計梅也郭璞注曰朹樹似梅子如指頭可食赤色似小㮈也棪爾雅曰棪音琰㯈音速折郭璞注曰棪實似榛赤可食山海經曰庭之山其上多棪木郭璞注曰即㯈也曹毗魏都賦曰果則谷棪山楟音亭楊桃臨海異物志曰楊桃似南方橄欖子其味甜常五月十月熟謔言楊桃無蹙一歳三熟其色靑黄核如棗核臨海異物志曰楊桃子生晉安候官縣一小樹得數十石實大三寸可􅁡藏之􅁃仲􅀄楊都賦曰楊桃枇杷楊榣臨海異物志曰楊榣有七脊子生樹皮中其躰雖異味則無竒長四五寸色青黄味甘也冬熟臨海異物志曰冬熟如指大正赤其味甘勝梅猴闥臨海異物志曰猴闥子如指頭大其味小苦可食􅀜桃臨海異物志曰􅀜桃子其味酸土翁臨海異物志曰土翁子如漆子大熟時甜酸其色青黒狗槽臨海異物志曰狗槽子如指頭大正赤其味甘雞橘臨海異物志曰鷄橘子如指頭大味甘永寜南界中有之猴惣臨海異物志曰猴惣子如指頭大與柿相似其味不減於柿多南臨海異物志曰多南子如指大其色紫味甘與梅子相似晉安候宫界中有王壇臨海異物志曰王壇子如􅀥大其味甘晉安候官越王􅀕壇邊有此果無知其名因見生處遂名王壇其形小於龍眼有似木􅀲七月熟甘羙也王彪之閩中賦曰王壇侯栗楊都賦曰草則龍目荔支王壇丹橘三廉出熈安郡雲母山見南趙志陳祈暢異物志曰三廉大實實不但三雖名三㢘或有四五六枝食之多汁味酸且甘藏之尤好與衆果相叅􅀑目亦名几目爾雅曰符􅀑目郭景純曰今江東有􅄦目草莖似􅁑葉圎而毛子如耳璫赤色叢生廣志曰􅄦目似梅南人以飲酒南方草木狀曰􅀑目樹大者如木子小者如鴨子二月花色仍連着實七月八月熟其色黄其味酸以􅁡煑之滋味柔嘉交阯武平興古九真有之裴淵廣州記曰􅀑目益智直爾不敢噉可爲漿也交州記曰􅀑目樹似棠梨葉似楮皮白樹髙大如木􅀲而小邪傾不周正味酢九月熟又有草眯子亦如之亦可爲糁周其草似􅀑目甘蔗􅀃文曰藷蔗也漢書禮樂志郊祀歌曰百味旨酒布蘭生泰尊柘漿㭊朝酲應劭曰柘漿取柘汁以爲飲也吴録地理志曰交阯句屚音漏縣干蔗大數寸其味醇羙異於他處笮以爲餳嚗之凝如氷破如􅀶碁入口消釋江表傳曰孫亮使黄門以銀盌并蓋就中藏吏取交州所獻甘蔗􅃬黄門先恨藏吏以䑕矢投餳中啓言吏不謹亮呼吏持餳器入門曰此器旣蓋之且有油覆無縁有此也黄門將有恨汝耶叩頭曰常從臣求官莞蓆有數不敢與亮曰必是此也問具服即於前加髠鞭斥外付晉書曰顧愷之每食蔗自尾至夲人或問之曰漸入佳境宋書曰􅁃仲文好貨劉雍自謂得其􅂇力事之如父夏中送甘蔗又曰元嘉末魏太武征彭城遣使至小市門致意求甘蔗及酒孝武遣人送酒二器甘蔗百挺齊書曰冝都王鏗善射常以堋的太闊曰終日射侯何難之有乃取甘蔗挿地百歩射之十發十中又曰范雲永明十年使魏魏人李彪宣命至雲所甚見稱羙彪爲設甘蔗黄粽隨尽復益彪􅀏謂曰范散􅀐小驗之一盡不能復得梁書曰􅁃沙弥性至孝母劉亡好噉甘蔗沙弥遂不食焉三國典略曰陸納反湘州分其衆二千人夜襲巴陵晨至城下冝豊候脩出壘門座胡牀以望之納衆乗水來攻矢下如雨脩方食甘蔗曽無懼色部分軍旅鼔而進之遂獲其一艦生擒六千人納遂㱕保長沙又曰侯景至朱雀街南建康令􅁃信守朱雀門俄而景至信衆撤桁始除一舶見景軍皆着鐵靣退隱于門自言口􅏫屢求甘蔗俄而飛箭中其門柱信手中甘蔗應弦而落隋書曰赤土國物産多同於交阯以甘蔗作酒雜以紫􅀲根酒色黄赤味亦香羙永嘉郡記曰樂城縣三州府江有三洲因以爲名對岸有浦名爲菰子出好甘蔗盧諶􅀕法曰冬祀用甘蔗范汪祠制曰孟春祠用甘蔗扶南傳曰安息國岀甘蔗廣志曰甘蔗其餳爲石宻雲南記曰唐韋齊休聘雲南㑹川都督劉寛使使致甘蔗蔗節希似竹許削去後亦有甜味神異經曰南方荒内􅦠林其髙百丈圍三丈促節多汁甜如􅁡􅦠音干音柘異物志曰甘蔗逺近皆有交阯所産特醇好夲末無薄厚其味甘圍數寸長丈餘頗似竹断而食之旣甘生取汁爲飴餳益珎煎而􅁀之凝如氷甄異傳曰隆安中吴縣張牧字君林忽有􅀑來無他湏􅁷唯欲噉甘蔗自称髙褐主人因呼阿楬牧母見之是小女靣青黒色通身青衣魏文帝典論曰甞與平虜將軍劉勲奮威鄧展等共飲􅀫聞展有手臂曉三兵余與論劒酒酣耳􅀬方食干蔗便以爲杖下殿數交三中其臂􅀽子正書曰歳比不登凡不給之物􅀂干蔗之屬皆可權禁楚辭曰臑奴到切鼈炮羔有柘漿柘蔗也司馬相如子虚賦曰諸柘巴苴諸柘甘柘張恊都蔗賦曰􅀂乃九秋良朝玄酎􅀄岀黄華浮觴酣飲累曰挫斯柘而療渴􅀂漱醴而含􅁡清滋津於紫梨流液豊於朱橘曹植詩曰都蔗雖甘杖之必折巧言雖羙用之必滅張載詩曰江南都蔗釀液澧沛三巴黄甘􅀲州素㮏凡此數品殊羙絶快渴者所思銘之裳帶李伯仁七欵曰副以甘柘豊弘誕節纎液玉津旨於飴􅁡虞飜與弟書曰有數頭男皆如奴僕伯安雖癡諸兒不及觀我所生有兒無子伯安三男阿思似父思其兩弟有似人也去日南逺恐如甘蔗近抄即薄應璩與尚書諸郎書曰檀氏園葵菜繁茂諸蔗􅀲芋亦离尚萌未知三生復何種植馮衍杖銘曰杖必取材不必用味相必取賢不必所愛都蔗雖甘猶不可杖佞人恱巳亦不可相甘藷南方草物狀曰甘藷民家常以二月種之至十月乃成􅆑大者如鵝小者如鴨掘食其味甜經乆得風乃淡泊耳岀交阯武平九真興古陳祈暢異物志曰甘藷似芋亦有臣魁剥去皮肌肉正白如昉南方人專食之以當米榖蒸炙皆香羙賔客酒食亦施設有如果實也燕薁音郁毛詩􅃎七月曰六月食欎及薁薁蘡薁也毛詩題綱曰􅁑藟一名燕薁藤好生河滸邊得水􅃳而長喻王九族蒙王恩惠以育子孫今王無澤於族人不如􅁑藟生河滸邊也廣雅曰燕薁嬰舌也廣志曰燕薁似梨早熟魏王花木志曰燕薁實大如龍眼黒色􅀃文謂之嬰薁詩䟽一名車鞅藤􅃎詩七月食欎及薁此名燕薁潘岳閑居賦曰梅香薁棣之屬繁榮藻麗之飾曹毗魏都賦曰英梅楊李􅀂留郁棣郁俗謂炶郁廉薑廣雅曰蔟葰相維切廉薑也湘州記曰始安縣空龍山精了山出廉薑食經曰廉薑法􅁡煑烏梅去滓以滓廉薑再三􅀫色黄赤如琥珀劉楨清慮賦曰仰秤木韮俯㧞廉薑太平御覽卷第九百七十四
