front:
  text: 太平御覽卷第三百五十二
  hash: sha256:8226d27739504faea9559506c6db20b058fcf5827a6f47704c9274d0984329d4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_352-1a}
body:
  text: 兵部八十三㦸上釋名曰㦸格也旁有枝格也戈勾矛㦸也戈過也所刺則决過所勾引制之不得過也車㦸曰常長丈六尺車上所持也八尺曰尋倍尋曰常故稱常也手㦸手所持擿之㦸也􅀃文曰戈平頭㦸也從戈一横之象形也㦸有枝兵也㦸讀􅀂􅁄鏌鎁大㦸也方言曰㦸楚謂之孑鄭璞曰取名於鈎孑也凡㦸而無刃􅁗晉之間謂之子或謂之鏔音寅吴楊之間謂之戈東齊􅁗晉之間謂其大者曰鏝莫干切胡其典者謂之句孑鏝胡即今鷄鳴句孑㦸也南楚宛郢謂之匽音匽㦸其柄自􅀜而西謂之秘音秘或謂之殳音殊廣雅曰匽謂之雄㦸太公兵法曰㦸之神名大將趙氏兵書曰㦸叅星主之周禮曰掌舎爲壇壝音遺宫􅁄門鄭司農云􅁄門以㦸爲門也左傳曰鄭伯將伐許授兵於太宫公孫閼與頴考叔爭車考叔挾輈以走輈車轅也子都技􅁄以逐之􅁄㦸也及大逵不及子都怒都閼字也又曰莊公四年楚武王荆尸授師孑焉以伐隨尸陳也子者㦸然則楚始於此叅用㦸爲陳也又曰鄭公子歸生受命于楚伐宋宋華元禦之戰于大􅁄宋師敗績囚華元狂狡輅鄭人鄭人入於井狂狡宋大夫輅迎也倒㦸而出之獲狂狡君子曰失禮違命冝其爲禽也又曰晉侯飲趙盾酒伏甲將攻之遂跣以下公族夫􅆈犬焉靈輙倒㦸以禦公徒而免之問何故曰翳桑之餓人也又曰諸侯伐偪陽狄虒弥建大軍之輪蒙之以甲爲櫓左執之右拔㦸成一隊又曰欒氏乗公門范宣子謂鞅曰矢及君屋死之鞅用劒以帥卒用劒短兵接欲致死也欒氏退攝車從之遇欒樂樂􅄹之族曰樂射之不中又注注属矢於弦則乗槐本而覆或以㦸鉤之斷肘而死周書曰年飢上用輿曲輈不漆矛㦸縷纒羽旄不擇鳥史記曰平原君與楚合從言其利害日出而言之日中不决毛遂按劒而前曰今楚地方五千里持㦸百萬此霸王之資也又曰蘇􅁗􅀃韓王曰韓之劒㦸皆出於􅁳山棠谿漢書曰項羽令壯士挑戰漢有善􅀐射曰樓煩應劭曰樓須今樓煩縣是也楚戰三合樓煩輙射殺之羽大怒自􅀍甲持㦸挑戰樓煩欲射羽瞋目叱之樓煩目不能視手不能發走還入壁不復敢出又曰田肯賀上曰􅁗形勝之國也帶河阻山懸隔千里持㦸百萬懸隔千里之外秦得百二馬齊地方二千里持㦸百萬齊得十二焉非親子弟莫可使王齊者也又曰奉天子法駕迎皇帝代邸皇帝入未央宫有謁者十人持㦸衛端門曰天子在足下何爲者不得入又曰漢七年長樂宫成於是皇帝輦出房百官執㦸傳警引諸侯王以下至吏六百石以次奉賀又曰息夫躬云諸曹以下僕遫音速不足數卒有強弩圍城長㦸指闕陛下誰與備之又曰晁錯上言曰兩陣相近平地淺草可前可後此長㦸之地也劒楯三不當一又曰灌夫字仲􅐐父孟死吴軍夫􅁬曰願取吴王􅀂將軍頭以報父仇於是夫􅀍甲持㦸募軍中壯士所善願從數十人及岀壁門莫敢前獨兩人及從奴十餘􅀐馳入吴軍至戲音麾下所殺傷數十人又曰揚雄位不過執㦸又曰八月飲酎行祠孝昭廟是時霍氏外孫代郡太守任宣坐謀反誅宣子章爲公車丞亡在渭城界中夜􅕼服入廟執㦸立廟門待上至欲爲逆發覺伏誅後漢書曰光武署銚期爲賊曹􅁺上略地向北期從徇薊時王郎檄書到薊中起兵應郎光武趍駕出百姓聚觀諠呼滿道􅃒路不得行期􅀐馬􅁬㦸嗔目大呼左右曰䟆周禮􅈻僕掌䟆宫中之事鄭衆曰止行清道也􅀂今警蹕􅀃文䟆與蹕同衆皆披靡東觀漢記曰吴漢與蘇茂周建戰漢躬􅀍甲持㦸告令諸部將曰聞皷聲皆大呼俱進後至者斬遂皷而進賊兵大破又曰建武四年隗囂遣馬援奏課京師因曰臣與公孫述同縣少小相善臣前徃蜀述陛㦸乃見臣今臣逺從異方來陛下何以知臣非刺客姧人而簡易􅀂是上大􅀏又曰田邑字伯玉爲上黨太守時更始遣鮑永馮衍屯太原永衍恐其先降􅀃之曰晏嬰臨盟擬以曲㦸不易其辭又曰楊政字子行師事愽士范升建武中范升爲太常丞爲去妻所誣告坐事繫獄當伏重罪政以車駕出時伏道邊抱升子持車叩頭武􅀐虎賁恐驚馬引弓射之不去旄頭以㦸义政傷􅅐前政遂涕泣求哀上即尺一出升又曰孫程與王康等斬江京等迎立濟隂王是爲順帝閻顯弟景爲衛尉從省中還外府收兵至盛德門尚書郭鎮率直􅀫羽林出逢景景因斫鎮不中鎮劒擊景墮車左右以㦸义其􅅐禽之送廷尉謝承後漢書曰彭循字子陽太守祕君聞循義勇多謀請循以守呉令民歌之曰時歳倉卒盗賊縱横大㦸強弩不可當賴遇賢令彭子陽司馬彪續漢書曰楊仁字文義巴郡人顯宗特詔􅀘北宫衛士及帝崩時諸馬貴盛各爭欲入宫仁􅀍甲持㦸嚴勒門衛莫敢輕進者肅宗旣立諸馬共譛仁上知其忠愈善之張瀅漢南記曰陳蕃等欲除諸黃門謀泄閽寺之黨於宫中詐稱驚云外有反者蕃奔入宫小黃門朱寓逆以㦸刺蕃魏志曰董卓恐人謀巳常以吕布自衛嘗失意拔手㦸擿布布拳捷之由是隂怨卓英雄記又載吕布詣董卓卓嘗抜㦸擲之言布亂其私室又曰􅀽術遣將紀靈等歩􅀐三萬攻劉備備求救於吕布嚴歩兵千􅀐二百馳徃赴備布謂靈等曰布性不憙合􅋐但憙解􅋐耳布令門候於營門中舉一􅃗㦸布言諸君觀布射㦸小支一發中者諸君當解去不中可留􅋐布舉弓射㦸正中小支諸將皆驚言將軍天威也明日歡會然後各罷又曰張繡反襲太祖營太祖出戰不利典韋以長㦸左右擊之一义輙十餘音矛摧左右死傷者略盡韋􅀍數十創短兵接戰賊前搏之韋􅀟挾兩㦸擊殺之餘賊不敢前又曰典韋好持大􅀟㦸與長刀軍中爲之語曰帳下壯士有典軍持一􅀟㦸八十斤王沈魏書曰太祖討吕布於濮陽布有别屯在濮西相持太祖募隱陳典韋先占但持長矛撩㦸時西面又急韋左手持十餘㦸大呼起所抵無不應手倒者魚豢魏略曰徐庶字元直少好任俠爲人報讎白琧烏各切突面􅀍髮而走爲吏所得乃感激弃其刀㦸更絹巾單衣折節學問吴志曰孫權拜諸葛恪丹陽太守授􅙶㦸武􅀐作皷吹導引歸家又曰孫權乗馬射虎庱亭庱懅陵切馬爲虎所傷權投以􅀟㦸虎遂却又曰太史慈劉繇使循􅀐卒遇孫䇿慈便前􅋐正與䇿對刺慈馬以攬慈項上手㦸慈亦得䇿兠鍪又曰孫綝遣中書郎李崇奪孫亮璽綬徵立琅邪王休奉書於休曰綝以薄才見授大任不能輔導陛下頃月以來多所造立親近劉承恱於美色敗壞藏中矛㦸五千餘枚以爲戲具韋昭吴書曰凌統怨甘寜殺其父操嘗於吕蒙舎會酒酣統乃以刀舞寧起曰能􅀟㦸舞蒙曰寧雖能未􅀂蒙之巧也因操刀持楯以身分之張勃吴録曰嚴白虎使弟輿詣長沙桓王請和許之輿請與王獨會面約旣㑹王引白削斫席輿體動王知其無能以手㦸投之立死蜀志曰兩鑲音孃是謂閇木户持􅀟㦸是謂坐鐵室也常璩華陽國志曰荆邯記公孫述曰昔漢祖敗而復征故能禽􅁗亡楚以弱爲強况今地方數千杖㦸百萬晉書曰賈后字南風􅀄爲太子妃性酷虐嘗手殺數人或以㦸擲孕妾子隨刃墮地帝聞之大怒欲廢之又曰楊駿字文長爲賈后所誅􅀄温縣有人如狂造書曰光光文長大㦸爲牆毒藥雖行㦸還自傷及駿居內府以㦸爲衛至兵入駿府逃于馬廐以㦸殺之又曰裴楷有知人之鑒謂鍾㑹如觀武庫森森見矛㦸在前王隱晉書曰上聞賈妃酷妬㦸擿諸孕子者皆墮巳治金墉城當廢之趙粲救於內荀勗請於外故不廢焉又曰祖逖軍大飢進據食犬丘城樊雅遣六十餘人入逖營拔㦸楯大呼向逖逖軍人夜不知何賊多少皆欲散走崔鴻前趙録曰杜育字子光濮陽人少爲賊其母毎怒育曰天下將亂且以習膽如意望封侯不如意伹不使他斫人頭曽爲賊圍衣甲三重持㦸蓬轉而岀又曰劉聦獵上林以􅉖帝行車􅀐將軍戎服執㦸前導觀者指曰此故長安天子崔鴻後趙録曰冉閔所乗赤馬曰朱龍日行千里左杖􅀟刃矛右執鈎㦸斬鮮卑三百餘級齊書曰宋升平三年尤里封人於官髙湖際得瑞靸􅂫合切㦸三杖旁有古字隋書曰柳彧爲屯田侍郎固讓弗許時制三品已上門皆列㦸左僕射髙熲子弘德封應國公申牒請㦸彧判曰僕射之子更不異居父之㦸槊已列門外尊有厭卑之義子有避父之禮豈容外門旣設內閣又施事竟不行熲聞而歎伏家語曰孔子北遊登于農山之上子路子貢顔回侍側孔子曰二三子各言尓志吾將擇焉顔回曰回願得明王聖主而相之敷其五教導之禮樂使城郭不脩溝池不越鑄劒㦸爲農器放馬牛於原藪室家無離曠之思千載無戰􅋐之患夫子懔然曰美哉德也陸賈楚漢春秋曰沛公脫身鴻門從間道至軍張良韓信乃謁項王軍門曰沛公使臣奉白璧一􅃗獻大王足下玉斗一􅃗獻大將軍足下亞父受玉斗置地㦸撞破之樂資春秋後傳曰聶政拔劒至韓韓相方坐府上持兵㦸而衛侍者甚衆聶政直入上陛刺殺俠累戰國䇿曰蘇􅁗􅀃惠王曰夫徒處而致利安坐而廣地雖古五帝三王五伯明主賢君常欲坐而致之其􅀔不能故以戰續之寛則兩軍相守迫則杖㦸相撞又曰齊王建入朝於􅁗雍門司馬横㦸當馬前曰所爲立王者爲社稷王何以去社稷而入􅁗王不聽遂入􅁗英雄記曰吕布白陳登使詣曹操求徐州牧不得登還布怒拔㦸斫机曰不惟吾所求無獲但爲卿父子所賣耳登不爲動容徐對曰登見曹公言飬將軍譬如飬虎當飽其肉不飽則將噬人公曰不如卿言譬如養鷹飢則爲用飽則颺去其言如此布意乃解王隆漢官解詁曰衛尉宫闕周廬殿掖屯陳夾道當兵交㦸胡伯始曰謂諸門郎閣陳屯士夾其道旁當兵以示威武交㦸以遮妄出入者也應劭漢官儀曰舊制太子食湯沐十縣家令領主自有宫置周衛交㦸五日一朝因坐東廂省視膳食東方朔傳曰武帝坐未央前殿天雨新止朔執㦸在殿陛遥指獨語上見呼問之朔對曰殿後栢樹上有鵲立枯枝上東向鳴上遣侍中視之如朔言上問何以知之朔曰風從東來鵲尾旁風則傾背風則蹷必當順風而立故知東向鳴也新雨生枝滑故枝澁故立枯枝上上大􅀏賜帛十疋又曰孝武元封三年作栢梁臺召群臣有能爲七言者乃得上坐衛尉口周衛交㦸禁不時陳壽益部􅂄舊傳曰張霸遷㑹稽太守是後盗賊衰少野無遺冦童謡曰弃􅀂㦸弃􅀂矛盗賊盡吏皆休蕭廣濟孝子傳曰魏陽不知何處人獨與父居父有刀㦸市南少年求之陽曰老父所服不敢相許少年怒道逢陽父打傷叩頭請罪父没陽斷少年頭以謝父􅃁前師覺授孝子傳曰仲子崔者仲由之子也子路仕衛赴蒯聵之亂衛人于黶遂殺之子崔旣長欲報父讎黶知之曰夫君子不掩人之不備湏後日於城西决戰其日黶持蒲弓木㦸與崔戰而死張敞晉東宫舊事曰東列崇福門門各羗楯十幡雞鳴㦸十張太平御覽卷第三百五十二
