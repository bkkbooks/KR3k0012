body:
  text: 時序部一律曆律吕氏春秋曰黃帝命伶倫作爲律伶倫自大夏之西乃之阮隃之隂山取竹於嶰谷以生空竅厚均者斷兩節間長三寸九分而吹之以爲十二筒聽鳳鳴以别十二律其雄鳴爲六雌鳴亦六故曰黃鍾之宫律之本也鳯有雌雄故律有隂陽書曰肆覲東后恊時月正日同律度量衡又曰帝曰􅇪命汝典樂教胄子詩言志歌永言聲依永律和聲聲謂五聲宫啇角徴羽律謂六律六吕十二月之音氣言當依聲律以和樂八音克諧無相奪倫倫理也八音能諧理不錯奪則神人咸和命􅇪使勉之又曰予欲聞六律五聲八音在治忽以岀納五言汝聽孔昏言欲以六律和聲音察天下治理及忽折者又以出納仁義礼智信五徳之言汝當聽審之也禮曰孟春之月律中太蔟蔟湊也言萬物始大而湊也周禮曰大司樂以六律六吕五聲八音六舞六代舞大合樂致􅀑神又注曰律吕相生者上生者三分益一下生者三分減一黃鍾律長九寸下生林鍾六寸律也左傳曰六律七音八風九歌以相成也清濁大小長短疾徐哀樂遲速髙下出入周流以相濟也君子聽之以平其心爾雅曰律謂之分郭璞注曰律管可以分氣者也易是􅀋謀曰聖人興起不知姓名當吹律聽聲以别其姓律者六律也春秋元命包曰律之爲言率也所以率氣令逹也率猶導也春秋孔演圖曰孔子曰丘援律吹命隂得羽之宫孝經援神契曰聖王吹律有姓漢書張蒼傳曰蒼乃自秦時爲柱下御史明習天下圖書計籍又善用笇律曆故令蒼以列侯居相府領王郡國上計又曰張蒼代灌嬰爲丞相漢興二十餘年天下定公卿皆軍吏蒼爲計吏時正緒律曆故漢家言律曆者法張蒼蒼好書無所不通而尤􅃉律曆􅃉深又京房傳曰房字君明東都頓丘人好鍾律知音聲房夲姓李推律自定爲京氏又曰夫五音生於夲姓分爲十二律轉生六十二律皆所以紀升氣効物􅀋也天効以影地効以響響即律也隂陽和則影至以律氣應則􅁅除是故天子常以冬夏至御前殿合八能之士陳八音聽樂均度晷影候鍾律權土􅁅校隂陽冬至陽氣應則均清景長極黃鍾通土􅁅輕而衡仰夏至隂氣應則均濁景短極㽔賔通土􅁅重而衡低進退於先後五日之中八音能各以候狀聞大史合封上效則和否則占􅀱氣之法爲室三重户開塗舋必周宻布緹㦥室中以木爲案毎律各一内庫外髙從其加律其上以葭莩􅁅抑其内端案曆而􅀱之氣至者􅁅去其爲氣所動者其􅁅散風所動者其􅁅聚殿中􅀱用玉律十二唯二至乃􅀱靈臺用竹律六十又曰凡律度量衡用銅銅爲物也精不爲燥濕寒暑變其節不爲風雨曝露改其形介然常似於士君子之行是以用銅也用竹爲引者事之冝也又曰至治之丗天地之氣合以生風天地之風氣定十二律王隱晉書曰荀朂以魏杜􅇪所制律吕撿校太樂揔章鼓吹八音與律吕乖錯始知後漢至魏度漸長於古四分餘而􅇪依爲律吕故致不韻不和部佐著作劉㳟依周禮制尺所謂古尺也依古尺作新律吕以調聲韻以律量􅁰以尺度古器皆與本銘尺寸無差又故􅃁得古玉律鍾聲亦與新律闇合遂班下太常使太樂㹅章鼓吹清啇施用朂遂典知樂事晉諸公讃曰丗祖時以荀朂所造律班示朝臣散􅀐侍郎阮咸唱議謂朂所造聲髙必由古今尺有長短所致然朂亦依案經典笇而制之又求古器得周時玉律比校正同荀朂奏曰中所出御府銅竹律二十五具部太常樂郎正劉秀等校試其三具與杜􅇪左延年法同其二十二具視其銘題尺寸是笛律也問恊律中郎將列和云昔魏明帝時令和丞受笛聲以作此律欲使學者別居一坊歌詠講習依此律調至於都合樂時但識其尺寸之名則絲竹歌皆得均合歌聲濁者用長笛長律歌聲清者用短笛短律凡􅁌歌調張清濁之制不依笛寸尺名之則不可知也趙書曰劉矅築建德殿取土城西南墎内得圓石狀􅀂水碓其銘曰律推石重四鈞同律度量衡有辛氏造議者未之詳或以爲瑞參軍事續咸曰王莽時物東方朔十洲記曰武帝時有西胡月氏國遣使曰臣國去此三十萬里國有常占東風入律百旬不休青雲干吕連月不散者閻浮國將有好道之君矣孟子曰師曠之聦不以六律不能正五音淮南子曰􅇪合六律調五音通八風又曰天文曰帝張四維帝天帝也運之以斗運提月徙一辰復反其所正月指寅十一月指子一嵗而匝終而復始寅則萬物螾螾也螾虫也律受太蔟蔟者湊而未出也太蔟正月律指卯卯則茂茂然律受夾鍾夾鍾者鍾始夾也夾鍾二月律指辰辰則振振之也律受沽洗沽洗者陳去而新來也沽洗三月律指巳巳則生巳定也律受中吕中吕者中充大也中吕四月也指午午者忤也律受㽔賓㽔賔者安而服也蕤賔五月律指未未者味也律受林鍾林鍾者引而止之也林鍾六月律指申申者呻也律受夷則夷則易其則也德去矣夷則七月律也德以去生氣尽也指酉酉者飽也律受南吕南吕者任苞大也南吕八月律指戍戍者滅也律受無射無射者人之無厭也無射九月律指亥亥者閡也律受應鍾應鍾者應其鍾也應鍾十月律指子子者兹也律受黃鍾黃鍾者巳鍾也黄鍾十一月律指丑丑者紐也律受大吕大吕者旅旅而去也大吕十二月律也又曰一律而生五音十二律而爲六十音因而六之六六三十六故三百六十音以當一歳之日故律曆之數天地之道國語曰天王將鑄無射王景王也問律於伶州鳩律鍾律也對曰律所以立均出度也律謂六吕六律也均鍾木長七尺有􅁌擊之以均鍾者度鍾大小清濁也漢大予樂官有之也紀之以三三天地人也平之以六平之以六律成以十二十二律吕也天之道也天之大數不過十二夫六中之色也故名之曰黃鍾六者天地之中天有六氣降生五味天有六甲地有五子十一而天地畢矣而六爲中故六律六吕而成天道也所以宣養六氣九德也宣徧也六氣隂陽風雨晦明也九德九功之徳水火金木土榖政德利用厚生之者也由是第之由從也弟次也次其日也二曰太蔟所以金奏賛陽出滯也三曰沽洗所以脩潔百物考神納賔也四曰㽔賔所以安靖神人獻酬交酢也五曰夷則所以詠歌九則平民無二也六曰無射所以宣布哲人之令徳示民軌儀也爲之六間以楊沉伏而黜散越也六間六吕在陽律之間沉滯也黜去也越楊也吕隂律所以吕間陽成其功發楊滯伏之氣而去越散者也元間大吕􅂇宣物也二間夾鍾出隟之細也四時之間氣微細三間中吕宣中氣也四間林鍾和展百事㑭莫不任肅純恪也五間南吕賛陽季也六間應鍾均利器用俾應復也律吕不易無姦物也蔡邕月令曰律率也聲之管也中應也太蔟鍾名上古本隂陽別風聲審清濁別風聲不可以文載口傳也故鑄金作鍾以正十二月之聲然後以効升降之氣而鍾不可用乃截竹爲管曰律爲清濁之率也以律長短爲制正月之律與太蔟相中也言出於鍾乃置􅀷室葭莩爲􅁅以實其端其月氣旣至則􅁅飛管通古以鍾律齊其聲後人不能則數以正其度度正則音亦正矣仲春中夾鍾仲春夾鍾也管長七寸四分強夾鍾􅀋分也季春中姑洗管長七寸一分強故鮮也言萬物去故就新莫不鮮明也孟夏中仲吕長六寸二分陽氣將極後中難仲夏中蕤賔六寸一分小二分陽氣上極隂始起故賔敬之㽔下也季夏中林鍾長六寸九分物成熟鍾􅀋也林鍾衆也孟秋中夷則長五寸六分二分夷傷則法也萬物始傷仲秋中南吕長四寸三分小三分南任也言陽氣尚有任也生孶長也季秋中無射長四寸八分小三分射終也言万物隨陽終也孟冬中應鍾長四寸八分言万物􅀿陽而動下藏仲冬中黃鍾長九寸律之始言陽於黄泉下動也鍾動也季冬中大吕長八寸吕距也言陽氣欲出隂不許也京氏律術曰律難以度調故作准以代之准之狀如瑟長丈而十三􅁌隱間九尺中共一􅁌下盡分寸均中其􅁌使應黃鍾之聲然案分寸以求諸律則稍皆如盡而應矣然則上古有鍾其次有律近古有准皆稍簡易之意其相生也黃鍾下生林鍾林鍾上生太蔟太蔟下生南吕南吕上生沽洗沽洗下生應鍾應鍾上生㽔賔蕤賔下生大吕大吕下生夷則夷則上生夾鍾夾鍾下生無射無射上生中吕中吕上生黃鍾上下相生終六十執始以下四十八律文多不載孟春之月則太蔟爲宫沽洗爲啇蕤賔爲角南吕爲徴應鍾爲羽大吕爲變宫夷則爲變徴他月効此也六韜曰武王問太公曰聽律之音聲何以知三軍之消息勝􅀒之决乎公曰􅀷哉王之問也夫律管十二其要以五宫啇角徴羽此其正聲也萬物不易五行之神道之常也可以知敵金木水火各以其勝攻之其法以天清静無霧􅀨風雲夜遣輕􅀐徃至敵人之壘九百歩偏持律管横管當耳大呼驚之有聲應管其來甚微角管聲應當以白虎徴管聲應當以朱雀羽管聲應當以勾陳五管盡不應無有應聲當以青龍此五行之符佐勝之徴成敗之機也白虎通曰十一月律謂之黃鍾何黃中和之氣鍾者動也言陽於黃泉之下動養萬物也十二月律謂之大吕何大者太也吕者距也言陽氣欲出隂不許也正月謂之太蔟何太者大也蔟者湊也言萬物始大湊地而出也二月謂之夾鍾何夾者物孚夾言萬物孚夾種􅀋分也三月謂之沽洗何沽者故也洗者鮮也言萬物去故就新莫不鮮明也四月謂之中吕何言陽氣將極故復中難之也五月謂之蕤賔何蕤者下也賔者敬也言陽氣上極隂氣始起故賔敬之六月謂之林鍾何林者衆也萬物成熟其􅀋衆多也七月謂之夷則何夷傷則法也言萬物始傷􅀍刑法也八月謂之南吕何吕任也言陽氣尚有任也生孳長也故隂之也九月謂之無射何射終也言萬物隨陽而終也當復隨隂起無有終也十月謂之應鍾何應者動也言萬物應陽而動下藏也蔡邕月令章句曰鍾以斤兩尺寸中所容受升之數爲法律亦以寸分大小長短爲法故也黃鍾之管長九寸孔徑三分圍九分其餘皆稍短唯大小圍數無増減以度量者可以文載口傳與衆共知然不如耳决之明也周官曰太師掌六律六吕文以五聲播以五教以六詩六德爲之本以六律爲之音也劉向別録曰鄒子在燕燕有􅁰谷地美而寒不生五榖鄒子居之吹律而温氣至今名􅁰谷論衡曰孔子推律自知殷之苗裔楊泉物理論曰聽清濁五聲之和然後制爲鍾律取􅀪農冝陽縣金門山竹爲管夏侯􅀇辯樂論曰阮生云律吕恊則隂陽和音聲適則萬物􅀋天下無樂而欲隂陽和調灾害不生亦以難矣此言律吕音聲非徒化治人物乃可以調和隂陽蕩除灾害也夫天地定位剛弱相摩盈虚有時堯遭九年之水憂民阻飢湯遭七年之旱欲遷其社豈律吕不和音聲不通哉此乃天然之數非人道所招也楊雄太􅀇經曰調律者度竹爲管蘆莩爲􅁅列之九閉之中漠然無動寂然無聲微風不起纎塵不形冬至夜半黃鍾以應矣曆丗本曰容成作暦容成黃帝之臣易曰君子以治暦明時書曰乃命羲和欽􅀂昊天曆象日月星辰敬授民時又曰天之曆數在爾躬又曰叶用五紀其五曰曆數易乾鑿度曰堯以甲子天元爲推術注云甲子爲蔀首起十月朔又曰曆原名握先紀曰甲子握先爲曆始之名始言無前者也七十六歳爲一紀二十紀而一蔀首易是􅀋謀曰其觸耀而出師曠曆推音筭以度知旦觸耀而出謂師曠得聖人之一體故觸耀而生其人能曆數樞機之事又能推五音知將來之事漢書律曆志曰曆數之起上矣傳述顓頊命木正重司天火正􅀺司地其後三苗亂德二官咸廢而閏餘乖次孟陬殄滅攝提失方攝提星名隨斗柄所指建十二月􅀂曆誤春三月當指辰乃指巳是爲失方也堯復育重􅀺之後使纂其業後以授舜舜亦以命禹至周武王訪箕子箕子言大法九章而五紀明曆法歳月日星辰爲五紀也五伯之末史官喪記疇人子弟分散如淳曰家業丗相傳爲疇律年三十三傳之疇官各從父學或在夷狄故其所記有黃帝顓頊夏殷周及魯曆戰國擾攘􅁗兼天下未遑暇也亦頗推五勝五行相勝秦以周爲火周水勝之也而自以爲􅀗水德迺以十月爲正色尚黒漢興方綱紀大基庶事草創襲􅁗正朔以北平侯張蒼言用顓頊曆比於六曆踈闊中最爲微近然正朔服色未暏其眞而朔晦􅁌望多虧矣至武帝元封七年漢興百二歳矣太中大夫公孫卿壷遂太史令司馬遷等言曆紀壞廢冝改正朔遂詔卿遂遷與侍郎尊大典星射姓等師古曰姓射名姓也議造漢曆迺定東西立晷儀下漏刻以進二十八􅀫相距於四方舉終以定朔晦分至􅾳離􅁌望應劭􅾳俓也離逺臣瓉案籬曆也日月之曆也姓等奏不能爲筭願募治歷者更造宻度各自増減以造漢太􅀄歷迺選治歷鄧平及長樂司馬可酒泉侯冝君侍郎尊及與民間治歷者凡二十餘人方士唐都巴郡洛下閎與焉晉灼日史記曆書云唐部分天部而巴郡洛下閎運笇推歷也都分天部謂分部二十八􅀫爲距度也而閎運筭轉曆與鄧平所造八十一分律歷律昏明踈逺者十七家使校歷律昏明官者淳于陵渠復覆太􅀄歷晦朔􅁌望皆最宻日月如合璧五星如連珠謂太􅀄上元甲子夜半朔旦冬至時七曜皆會聚斗牽牛中如合璧連珠也陵渠奏狀遂用鄧平歷以平爲太史丞後二十七年元鳯三年太史令張壽王上書言曆者天地之大紀上帝所爲傳黃帝調律歷漢元年以來用之今隂陽不調冝更歷之過也詔下主歷使者鮮干妄人請與治歷大司農中丞麻光等二十餘人雜候日月晦朔􅁌望八節二十四氣鈞校諸歷用狀奏可詔與丞相御史大將軍右將軍史各一人雜候上林青臺諸曆踈宻凡十一家以元鳯三年十一月朔旦冬至盡五年十二月各有第壽王課踈逺案漢元年不用黃帝調歷壽王非漢歷逆天道非所冝言大不敬有詔勿劾復􅀱盡六年太􅀄歷第一即墨徐萬旦長安徐禹治太􅀄歷亦第一壽王及待詔李信治黃帝調歷課皆踈闊壽王歷迺太史官殷歷也定至孝成世劉向緫六歷列是非作五紀論向子歆究其微眇作三統歷及譜又曰路温舒從祖父受曆數天文以爲漢阨三七之間張宴曰三七二百一十歳也自漢􅀄至哀帝元年二百一年也至平帝崩二百一十一歳也上封事以豫戒成帝時谷永亦言如此又王莽傳曰莽見盗賊多乃令太史推三萬六千歳曆紀布天下書曰紫閣圖昌太一萬帝皆仙而上天張樂崑崙處山之上後丗聖主得瑞者當張樂􅁗終南山上長安南山詩所謂終南南故􅁗地故言􅁗予之不敏奉行未明乃今諭矣又孝武紀曰夏五月正歷以正月爲嵗首鄭􅀇曰先是以十月爲􅀊首色上黃數用五張晏曰漢據土德土數五定官名恊音律又曰曆譜有序四時之位正分至之節以㑹日月五星之辰以考寒暑殺生之實故聖王必正曆以􅀷知五星日月之㑹凶阨之患其術皆出焉此聖人知命之術也續漢律曆志曰自太􅀄元年始用三統曆施行百餘年曆稍後天朔先於曆朔或在晦月或朔見建武八年中太僕朱浮太中大夫許叔等數上書言朔曆不正冝當改更時分度覺差尚微上以天下􅀄定未遑考正至永平五年官曆署七月十六日日蝕待詔楊岑見時月食多先曆即縮用筭因上言月當十五日食官曆不中詔書令岑普􅀱與官曆課起七月盡十一月􅁌望凡五官曆皆失岑皆中庚寅詔書令岑署􅁌望月食官復令待詔張盛景防鮑業等六四分法與岑課歳餘盛等所中多岑六事又曰黃帝造曆元起辛卯而顓頊用乙卯虞用戊午夏用丙寅殷用甲寅周用丁巳魯用庚子漢􅀄用乙卯至武帝元年以丁丑王莽之際劉歆作三統追太􅀄前世一九得五星㑹庚戌之嵗以爲上元太􅀄曆到章帝元和施復踈闊徴能術者課効諸曆定朔稽元追漢四十五年庚辰之歳退朔一日乃與天合以爲四分曆又曰昔者聖人之作曆觀璿璣之運三光之行道之發軔景之長短斗綱所建青龍所踵參五以變錯綜其數而制術焉日月相推日舒月速當其同所謂之合朔舒速先後近一逺三謂之􅁌相與爲衡分天之中謂之望以逺及舒光盡體伏謂之晦朔合離斗建移辰謂之朔魏略曰太史上言漢曆不及天時因更推歩􅁌望朔晦爲太和曆帝以髙堂隆學問優􅀷於天文又精乃詔使隆與尚書郎楊偉太史待詔駱禄叅共推校更相刻奏紛紜數嵗禄得日蝕而月晦不盡隆不得日蝕而晦盡詔從太史隆所争雖不得而逺近猶知其精微又曰景􅀄元年山茬音在狸切縣言黃龍見有司奏以爲魏得地冝以建丑之月爲正乃定曆年改太和曆爲景初曆吴志曰孫權黃武二年改四分曆用乾象曆王隱晉書曰張載弟前烏程令亢依蔡邕注明堂月令中台要綴諸說曆數而爲曆讃祕書􅁥荀崧見讃異之亦信該羅曆義唐書曰王勃聦警絶衆於推歩曆笇尤精嘗作大唐千歳曆言唐德靈長千年合承周漢運曆不合承周隨短祚其論大旨云以土王者五十代而一千年金王者四十九代而九百年水王者二十代而六百年木王者三十代而八百年火王者二十代而七百年此天地之常期符曆之大數也自黃帝至漢並是五運眞主五行之匝土運復歸唐德承之冝矣魏晉至于周隨咸非正統五行之沴氣也故不可承之大率如此鴻範五行傳曰聖人所以揆天行而紀萬國也孔子作春秋正春正秋所以重曆也五家之曆多踈闊唯顓頊曆爲微近故張蒼用顓頊曆元封中立太􅀄曆測􅁌望皆㝡宻益部􅂄舊傳曰巴郡落下閎漢武帝時改顓頊曆更作太􅀄曆曰後八百嵗此曆差一日當有聖人定之風土記曰自黃帝瑞顓下逮三王治曆十有一家考課損益各有變衰非運之錯考察意異故也尸子曰造曆者羲和之子也楊泉物理論曰疇昔神農始治農功正節氣審寒温以爲早晚之期故立曆日董巴議曰武王作周曆周公作魯曆蔡邕議曰邕以爲曆數精微去聖人乆逺得失更迭術無常是漢丞􅁗正曆用顓頊元用乙卯百有二嵗孝武皇帝始改正朔曆用太初元用丁丑行之百八十九嵗孝章皇帝用清河李梵之言改從四合元用庚辰今馮光陳晃各以庚申爲非甲寅爲是案曆法黃帝顓頊夏殷周魯凡六家各自有元先晃所據則殷暦元也他元雖不明圖䜟各自一家之術皆當有効於當時昔太􅀄始用丁丑之後六家紛錯争訟是非太史令張壽王挾甲寅元以非漢曆雜􅀱清臺課在下第卒以踈闊連見剥奏太􅀄効驗無所漏失是則非圖䜟之元而有効於前者也及用四分以來考之行度宻於太􅀄是知新元有効於今者也延光元年中謁者擅誦亦非四分庚申上言當用命曆序甲寅元公卿百寮參議正處竟不施行且三光之行遲遲進退不必􅀂一術家以笇追而求之取合於當時而巳故有古今之而行不能上通於古猶古術不能下通於今也由此言之有文於䜟無驗於今未必爲是有驗於今無文於䜟未必爲非太平御覽卷第十六
