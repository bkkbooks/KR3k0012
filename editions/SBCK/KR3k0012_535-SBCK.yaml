front:
  text: 太平御覽卷第五百三十五
  hash: sha256:4b25f3510b9655670f986679cef91719538f1119f3479e6ccb0d1ab2bcb918b1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_535-1a}
body:
  text: 禮儀部十四庠序釋奠立廟附養老庠序禮記王制曰有虞氏飬國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於左學養庶老於右學周人養國老於東膠養庶老於虞庠又學記曰古之教者家有塾黨有庠術有序國有學術當爲遂萬二千五百家爲遂也五經通義曰三王教化之宫揔名爲學夏爲學校校之言教也殷爲庠周爲序周家又兼用之故郷爲庠里爲序家爲塾白虎通曰郷曰庠里曰序庠者禮義也序者序長㓜也漢書曰郷序庠置孝經師一人又儒林傳曰三代之道郷里有教夏曰校殷曰庠周曰序所以勸善懲惡也南史曰梁武帝脩建庠序別開五館其一館在􅀽憲宅西憲常招引諸生與之談論新義出人意表同軰咸嗟服焉釋奠立廟附禮記月令仲春曰是月也命樂正習舞爲將釋奠上丁釋奠於國學釋謂置也謂置牲幣之奠於文宣王天子及公卿諸侯大夫親徃視之觀其禮也命有司上戊釋奠於太公廟亦用牲幣之奠又月令仲秋曰是月也命樂正習吹春夏尚舞秋冬尚吹習之爲將釋奠上丁釋奠於國學天子乃率公卿諸侯大夫親徃視之禮儀同仲春是月也命有司上戊釋奠於太公廟禮儀同仲春又文王丗子曰凡始立學必先釋奠于先聖先師及行事必用幣天子親學大昕鼓懲所以警衆也晉書禮志曰昔武王入殷而封先代之後蓋追思其德也孔子大聖終於陪臣未有封爵至漢元帝時孔霸以帝師號襃成侯奉孔子後魏黄􅀄三年以議郎孔羡爲宗聖侯奉孔子祀魏齊王正始二年使太常釋奠以太牢祀孔子於辟雍以顔回配宋書禮志曰魏齊王正始中每講經使太常釋奠先聖先師於辟雍晉惠帝明帝之爲太子及􅉖懷太子講經竟並親釋奠於太學太子進爵於先師中庶子進爵於顔淵成穆孝武三帝亦皆親釋奠又禮志曰元嘉二十二年太子釋奠採晉故事官有其注祭畢太祖親臨學宴㑹太子以下悉預唐六典曰仲春上丁釋奠于孔宣父以顔回配焉其七十二弟子及先儒並從祀仲秋之月亦如之仲春上戊釋奠于齊太公以留侯張良配焉仲秋之月亦如之凡州縣皆置孔宣父廟以顔回配仲春上丁州縣官行釋奠之禮仲秋上丁亦如之唐書曰開元七年十一月以貢舉人將謁先師質問疑義敕曰皇太子及諸子雖年未志學而道在尊師冝行齒胄禮又曰開元七年皇太子入國學行齒胄禮謁先聖皇太子􅀄献其亞献終献並以胄子常侍禇无量開講孝經及禮記文王太子篇又曰歸崇敬議春秋釋奠文宣王祝板御署北面揖以爲其禮太重按大戴禮師尚父授周武王丹書武王東面而立今置祝板請准武王東面之禮輕重庶得其中晉愽士成洽議曰釋奠奉先師唯皇太子業終乃禮不然則廢晉尚書大事曰尚書符太常曰按洛陽圖宫南自有太學國子辟雍不相預也捨辟雍以太學辟雍便爲無事虚誕漢魏舊事皆言釋奠祠先聖於辟雍未有言太學者又咸和中成皇帝釋奠於中堂之前臺中故事亦曰辟雍是爲漢魏之丗初自兩立至釋奠便在辟雍猶存今廢辟雍而立二學中興以來相違太常王彪之荅魏帝齊王使有司釋奠於辟雍此是魏之大事非晉書舊典太始元康釋奠太學不在辟雍太始五年元康五年二行饗禮皆於辟雍不在太學是則釋奠於太學行饗於辟雍有晉巳行之准也中朝有辟雍猶在太學况無辟雍唯有太學更當不在太學乎宰相從太常所荅晉范堅書問馮懷曰漢氏以來釋奠先師唯仲尼不及公且何也馮荅曰􅀂如來談亦當憲章堯舜文武豈唯周旦乎摯虞釋奠頌曰如彼泉流不盈不運講業旣終禮師釋奠升觴折爼上下惟善邕邕其來肅肅其見立廟附鍾離意别傳曰意爲魯相脩孔子廟孔子教授堂下牀首有懸甕意召守廟孔訢問曰此何等甕訢曰夫子甕背有丹書自夫子亡後無敢發者意乃發索得書焉宋書禮志曰晉清河人李遼表曰亡父先臣回綏集􅀖邑歸誠夲朝以太元十年遣臣奉表路經闕里過覲孔廟庭宇傾頽䡄式頽圯萬丗宗匠忽焉淪廢仰瞻俯􅁣不覺涕流旣逵京輦表求興復聖祀脩建講學至十四年奉􅀍明詔採臣鄙議勑兖州魯郡准舊營飾北齊書曰天保元年詔封崇聖侯邑一百户以奉孔子之祀并下魯郡以時脩治廟宇務盡襃崇之至唐書曰武德中制祠典釋奠於太學以周公爲先聖孔丘配饗房􅀇齡及朱子奢議云公旦尼父俱是聖人庠序置奠夲縁夫子故魯宋至於梁陳爰及隋大業故事皆以孔丘爲先聖顔回爲先師歷代所行古今通允請停祭周公升夫子爲先聖以顔回配饗又曰上元中制曰定禍亂者必先於武德極生靈者諒在於師貞周武創業克寜區夏惟師尚父實佐興王况德有可師義當禁􅁀稽諸古昔爰崇典禮太公望可追封爲武成王有司依文宣王置廟擇古今名將置亞聖及十哲享祭之典一同文宣又曰開元十九年始於兩京置齊太公廟以張良配上元􅀄特加封太公爲武成王以歷代名將從其祀然有其制而未之行祠宇日荒至是宰臣盧􅂎京兆尹盧甚以盧者齊之裔乃鳩其裔孫􅀂盧崔丁吕之族合錢以崇飾之請復舊典兼擇自古名將如孔門十哲皆配饗詔下史官乃定張良穰苴孫武吴起樂毅白起韓信諸葛亮李靖李勣配焉養老禮記祭義曰食三老五更於太學天子祖而割牲執醬而饋執爵而酳所以教諸侯之悌也蔡邕月令章句曰五更當爲五􅅱􅅱長老之稱也其字似更書有轉誤嫂字女傍叟今皆以爲更矣孝經援神契曰天子親臨辟雍尊事三老兄事五更三者道成於三五者訓於五品言其能以善道改巳也三老五更皆取有妻男女完具者續漢書曰三老五更玉杖長九尺端以鳩爲飾鳩者不噎之鳥欲老人之不噎也華嶠後漢書曰熈平中天子引􅀽逢爲三老賜玉杖應劭漢書曰天子父事三老兄事五更天子親割三公設几九卿正履魏志髙貴郷公詔曰夫養老興教三代所以􅀣風化垂不朽也必有三老五更以崇至敬乞言納誨着在惇史然後六合承流下觀而化冝妙㨂德行以充其選關内侯王祥履仁秉義雅志淳固􅀜内侯鄭小同温恭孝友師禮不忒其以祥爲三老小同爲五更車駕親率群司躬行古禮焉王隠晉書曰王祥字休徴魏帝髙貴郷公入學命祥爲三老祥南面几杖以師道自居帝北面乞言祥於是陳明王聖帝之䡄君臣政化之要俯以訓帝于時百辟卿士聞其格言莫不砥礪後魏書曰孝文帝以前司徒尉元爲三老前鴻臚卿游明根爲五更皇帝再拜肅拜五更乞言畢乃賜歩輓一乗詔曰三老可給上公之禄五更可食九卿之俸後周書曰髙祖保定三年乃下詔集太保燕公爲三老又曰武帝以太傅燕國公于謹爲三老賜延年杖太師宇文護設几司㓂豆盧寧正舄又曰孝閔踐祚于謹以年老乞骸骨詔報不許有司冝斷表啓遂詔謹爲三老有司具禮擇日又賜延年杖髙祖幸太學以食之三老入門皇帝迎拜門屏之間三老荅拜有司設三老席於中楹南向太師晉公護升階設几於席三老升席南面憑几而坐以師道自居大司㓂楚公寜升階正舄皇帝升立於斧扆之前西面有可進饌皇帝跪設醬豆親祖割三老食訖皇帝又親跪受爵以酳有司徹訖皇帝北面立訪道三老乃起立於席後皇帝曰猥當天下重任自惟不才不知政治之要公其誨之三老荅曰木受繩則正后從諌則聖自古明王聖主皆虗心納諌以知得失天下乃安惟陛下念之又曰爲國之夲在守忠信是以古人云去食去兵信不可失國家興廢莫不由之願陛下守而勿失又曰治國之道必湏有法法者國之綱紀綱紀不可不正在於賞罰􅀂有功必賞有罪必罰則爲善者日益爲惡者日止􅀂有功不賞有罪不罰則天下善惡不分人無所措手足矣三老言畢皇帝再拜受之三老荅拜焉禮成而出隋書曰後齊仲春令辰陳養老禮先一日三老五更齊於國學皇帝進賢冠􅀇紗􅂁至辟雍入揔章堂列宫懸王公巳下及國老名定位司徒以羽儀武賁安車迎三老五更于國學並進賢冠玄服黑舄素帶國子生黒介幘青衿單衣乗馬從之至皇帝釋劒執班迎於門内三老至門五更去門十步則降車以入皇帝拜三老五更攝齋荅拜皇帝揖進三老在前五更在後升自右階就筵三老坐五更立皇帝升堂北面公卿升自左階北面三公授几杖卿正履國老庶老各就位皇帝拜三老羣臣皆拜不拜五更乃坐皇帝西向肅拜五更進珍羞酒食親祖割執醬以饋執爵以酳以次進五更又設酒醴於國老庶老皇帝升御坐三老乃論五孝六順典訓大綱皇帝虚躬請受禮畢而還又都下及外州人年七十巳上賜鳩杖黄帽太平御覽卷第五百三十五
