front:
  text: 太平御覽卷第八百二十四資産部四
  hash: sha256:8dd6708d2b219cafb8bf0b8063d69b51d0f7f14b03820efa439ef02eec3596e7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_824-1a}
body:
  text: 穫穡架園圃穫說文曰穫刈禾也毛詩小雅曰􅀊聿云暮采蕭穫菽又周頌良耜曰穫之桎桎積之栗栗桎桎穫聲也栗栗衆多也尚書金縢曰秋大熟禾未穫天大雷電以風禾盡偃大木斯拔􅀖人大恐又大誥曰厥父菑厥子乃弗肯播矧肯穫其父巳菑耕其田其子乃不肯播種况肯収穫乎爾雅曰桎桎穫也郭璞注曰穫刈禾也南史曰齊文惠太子常幸東田觀穫稻范雲時從文惠顧雲曰此刈甚快雲曰三時之務亦甚勤勞願殿下知稼穡之艱難無徇一朝之宴逸也文惠改容謝之虞喜志林說晏子曰景公爲長府有風猶作不巳晏子歌日禾有穗􅀆不得穫秋風至􅀆盡零落歌終而流涕公乃止之穡說文曰穡榖可収嗇也愛澁也尚書大誥曰予永念曰天惟䘮殷􅀂穡夫予􅂚敢不終朕􅅿稼穡之夫除草養苗我長念天亡殷惡亦主猶是矣我何敢不順天終竟我壟􅅿乎又無逸周公曰嗚呼君子所其無逸先知稼穡之艱難乃逸則知小人之依稼穡農夫之艱難事先知之乃謀逸豫則知小人之所依怙相小人厥父母勤勞稼穡厥子乃不知稼穡之艱難乃逸乃諺旣誕否則侮厥父母曰昔之人無聞知小人之子旣不知父母之勞乃爲逸豫遊戯乃叛諺不恭巳欺誕父母不欺則輕侮其父母曰古老之人無所聞知物理論曰穡猶収也古今之言云尔稼農之末農夲輕而末重前緩而後急稼欲少苦耨欲熟収欲速此良農之務桾毛詩大田曰彼有不穫穉此有不歛穧彼有遺秉此有滯穗伊寡婦之利秉把也成王之時百榖旣多種同齊熟収刈促遽力皆不足而有不穫不歛遺秉滯穗故聽矜寡取之以爲利東觀漢記曰桓榮遭倉卒與族人元卿俱捃拾投閑輙講元卿謂曰卿但盡氣耳當復有施用時乎後榮爲太常諸子謂元卿曰平生􅀏吾盡氣今何如元卿曰我農家安能豫知此魏略曰焦先行不踐邪徑必循阡陌及其捃拾不失大穗飢不可食寒不可衣結草以爲蓑裳􅀍頭徒跣毎出見婦人則隠翳須去乃出王隠晉書曰􅁃衮字叔褒年飢捃者猶殷衮乃引其羣子以退曰待其間旣捃焉從者以爲徒捃也捃無傍掇晉書曰夏統字仲御㓜􅀌貧養親以孝聞毎探捃求食星行夜歸或至海邊拘蟛􅒹以資養宋書曰沈道䖍居武康北石山下常以捃拾自資同捃者或爭穟道䖍諌之不止悉以其所得與之爭者愧惡後毎事輒云勿令居士知􅁃異行別傳曰君妻樂氏生子澤􅀄君與妻捃而産於澤遂以命之架釋名曰架加也加杖於柄頭以撾穗而出榖也或曰羅架三文而用之或曰以杖轉於頭故名之也廣雅曰拂謂之架說文曰拂架也拂擊禾連架也國語曰權節其用耒耜耞芟耞拂也所以撃草方言曰僉宋魏之間謂攝殳或謂之度自􅀜而西謂之拂僉連架也所以打穀王褒僮約曰刻木爲架屈竹作把架擊禾也園說文曰園所樹菓也易賁卦曰賁于丘園束帛戔戔毛詩車隣駟驖曰駟驖美襄公也始命有田狩之事園囿之樂焉始命命爲諸侯也􅁗始附庸也遊于北園四馬旣閑閑習也又國風將仲子􅀆曰將仲子􅀆無踰我園無折我樹檀園所以樹木也檀強刄之木又小雅鶴鳴曰樂彼之園爰有樹檀其下維蘀何楽於彼園之觀乎擇落也上其樹檀下其蘀周禮天宫太宰九職二曰園囿􅗱草木鄭注云園蕃也史記曰董仲舒廣川人以治春秋當孝景時爲愽士下帷講誦三年不觀於舎園漢書梁孝王傳曰王有罪入朝乗布車從兩􅀐入匿長公主園張晏日布車喪人乗之也又曰田蚡召客飲坐其兄盖侯北向自坐東向以爲漢相尊不可以兄私撓由此滋驕治宅第田園極膏􅃾市買郡縣器物相屬於道後漢書曰竇憲恃宫掖聲􅀔遂以賤直請奪沁水公主園田沁水公主明帝女主逼畏不敢計後肅宗駕出過園指以問憲憲隂喝不得對隂喝猶壹塞也隂音於禁反喝音一介反或作鳴故反後發􅁴帝大恕召憲切責曰􅀷思前過主田園時何用愈趙髙指鹿爲馬愈猶差也乆念使人驚怖昔永平中常令隂􅀶鄧疊二人更相糾察以隂鄧皆外戚恐其踰多故使更相糾察也􅀶隂興之子也故諸豪戚莫敢犯法者而詔書切切猶以舅氏田宅爲言切切猶勤勤今貴主尚見枉奪何况小人哉國家弃憲如􅀌雛腐䑕鳥子生而啄者日雛也憲大震懼皇后爲毀服􅀷謝良乆乃得解使以田還主雖不繩其罪然亦不授以重任續漢書百官志曰濯龍園在洛陽西北角謝承後漢書曰呉祐遷膠東侯相時戴宏父爲縣丞宏年十六從在承舎祐毎行園常聞諷讀之音竒而􅀱之亦與爲友宏卒成儒宗知名東夏爲河間相因自免歸家不復仕身灌園􅂼以經書教授年九十八卒又曰中平二年造萬金堂於西園獻帝春秋曰吕布問太祖明公何痩太祖曰君何以識孤布曰昔在洛㑹浸氏園太祖曰然􅀌忘之矣所以瘦者不早相得故也魏略曰顔斐爲京兆太守起菜園使民投閑灌治之魏志曰明帝之幸郭元后也毛皇后愛寵日衰景􅀄元年帝遊後園召才人以上曲宴極樂元后曰宜延皇后帝弗許乃禁左右使不得宣后知之明日見帝后曰昨遊宴北園樂乎帝以左右泄之所殺十餘人魏略曰青龍十二年起土山於芳林園西北陬使公卿羣寮皆負土成山樹松竹雜木善草於其上捕山禽雜獸置其中又曰馬鈞居京都城内有地可爲園患無水以灌之乃作飜車令童兒轉之而灌水自覆更入更出其巧百倍於常晉書曰華廙免官後栖遲家巷武帝登凌雲䑓望見廙苴蓿園阡陌甚整依然感舊太康􅀄大赦乃得襲封王隱晉書曰王衍字夷甫戎叔父也終於平北將軍送故甚豐親故借衍車馬帷帳器物者衍因與不復録資財盡出洛城西先人舊園田上又曰王戎爲荆州刺史坐遣吏修園宅應免官詔以贖論又曰孝宗欲於後園修立池􅁐江逌諌以強賊未滅宜旌軍備嘗存儉約以率羣下又曰汜騰字無忌應孝廉舉除郎中屬天下兵亂去官歎曰生於亂丗貴而能貧乃可以免散家財五十萬以施宗於柴門灌園琴書自適南史曰臧筞緒㓜􅀌躬自灌園以供􅀕祀宋書曰茹法亮於宅爲魚池釣䑓土山樓館長廊將一里竹林花藥之美公家園竹不能及又曰沈道䖍居武康北石山下有人􅀼園中菜道䖍自外還見之即自逃隱待􅀼者去後乃出齊書曰㑹稽孔珪家起園列植桐栁多構山泉殆窮眞趣衡陽王鈞徃遊之珪曰殿下處朱門遊紫闥詎得與山人交􅁘荅曰身處朱門而情遊江海形入紫闥而意在青雲珪大美之又曰豫章王嶷薨後嘗見形於第後園乗腰輿指麾處分呼直兵直兵無手板左右授一玉手板與之謂曰橘樹一株死可覔􅀘之因出後園梁書曰徐勉爲書式其子崧曰中年聊於東田間營小園者非存播藝以要利正欲穿池種樹少􅀉情賞尓又以郊除閑曠終可爲宅儻􅀗懸車致事實欲歌哭於斯又曰劉慧斐隱居東林寺又於山北構園一所號曰離垢園時人仍謂爲離垢先生燕書曰愍帝時有異爵素質緑首集于端門東園樹棲翔二旬而去夏以異爵故大赦名東園曰白爵園後魏書曰胡太后親覽萬機手筆斷決幸西林園法流堂命侍臣射不能者罰之又曰髙聦爲中尉所彈遂廢于家㫁絶人事唯修營園果丗稱髙聦棃以爲珎異又曰元欣好營産業多所樹藝京師名菓皆出其園又曰景穆季年頗親近左右營立田園以収其利北史曰齊盧景􅁉不營丗事居無二業唯在注解其叔父職居顯要而景俗止於園舎情均郊野謙㳟守道貞素自得由是丗號居士北齊書曰河南獻王孝瑜文襄於鄴東起山池遊觀時俗眩之孝瑜遂於第作水堂龍舟植幡矟於舟上數集諸弟宴射爲樂武成幸其第見而恱之故盛興後園之翫於是貴賤慕斆處處營造後周書曰後周文帝在天遊園以金巵置侯上令公卿射中者即以賜之宇文貴一發而中帝􅀏曰由基之妙正當耳唐書曰何潘仁西域胡人也家富於財潘仁厚自奉養引致賔客煬帝時嘗犯法懼罪遂亡入司竹園鳩集亡命衆至數萬及義兵起永得平陽公主而奉之以應義師莊子曰漢隂丈人爲園畦鑿隧而入井抱甕而灌一日浸百畦子貢教以爲桔橰列子曰楊朱見梁王曰王者詔天下如運諸掌梁王曰先生有一妻一妾不能治三􅅿之園不能耘言治天下何也韓子曰昔弥子瑕寵於衛君與遊於東園食桃而甘以其半啖君君曰愛我哉淮南子曰夫臨江之鄉其人汲水以漑其園江水弗減也又曰山有猛獸林木爲之不斬園有螫虫藜蓼爲之不採言人畏之說􅁐曰呉王欲伐荆告左右曰敢諫者死舎人有少孺子者欲諫不敢懷丸操彈於後園露沾其衣如是三旦王曰子來何苦沾衣如此對曰園中有榆其上有蟬蟬高居悲鳴飲露不知螳蜋在其後螳蜋委身曲附欲取蟬而不知黄崔在其傍黄雀方延頸欲啄螳蜋而不知彈丸在其下也此三者皆務得其前利不顧其後之有患也呉王曰善哉乃罷兵風俗通曰園援也從口􅀽聲四皓園公亦夲園者􅀇晏春秋曰又好桑農種藏之事且養雞鶩園圃之事懃不舎力焉王子年拾遺記曰漢明帝時常山獻巨桃核此桃霜下結花隆暑方熟亦云仙人所食常使植於霜園此園皆植寒果也又曰魏明帝起靈禽之園方國所獻異鳥獸皆畜此園也丗說曰王子敬入㑹稽經呉聞顧辟彊有名園先不識主人徑徃其家顧方集賔友酣宴園中而王遊歴旣畢指麾好惡傍􅀂無人又曰簡文幸華林園顧謂左右曰㑹心處不必在逺醫然林水便自有濠梁間想􅁴鳥獸自來親人又曰管寜華歆共園中鋤菜見地片金管不釋鋤與瓦石不異華投而擲之向秀別傳曰向秀常與􅄞康偶鍜於洛邑與吕安灌園於山陽収其餘利以供酒食之費桂陽先賢賛曰􅂫躭常聞夜有衆賔來躭告母曰人招躭去巳種藥着後園梅樹下治百病一葉愈一人賣此藥過足供養仇池記曰城東有首蓿園園中有三水碓三􅁗記曰漢武帝名園曰樊川一名御􅀫有大梨如五􅂛名含消又曰漢武帝菓園有大栗十五枚一􅂛華陽國志曰何隨家養竹園人盗其筍隨過行見恐盗者􅁴怖走竹傷其足挈履徐歩歸幽明録曰武宣程羈偏生未􅀍舉家常使種葱後連理樹生於園圃殷仲堪遊園賦曰尔乃杖䇿晨遊以詠以吟落葉掩蹊菓下成林曹植詩曰公子敬愛客終宴不知疲清夜遊西園飛盖相追隨劉䛑之天公牋曰昔申酉之際遭湯旱流烟今子􅀊值尭水滔天火延燒其廬水突壞其園謝玄與姊書曰比二日東行遊歩園中巳極有任家湖形摸也姊想瞩此亦小有所散圃說文曰種菜曰圃毛詩雞鳴曰東方未明折栁樊圃枉夫瞿瞿又七月曰九月築埸圃十月納禾稼周禮地官下曰埸人掌國之場圃而樹之果蓏珍異之物以時斂而藏之果􅀥李之属蓏瓜瓠之属珍異蒲桃枇杷之属禮記射義曰孔子射於矍相之圃觀者如堵牆左傳莊公曰子穨有寵蔿國爲之師及惠王即位取蔿國之圃以爲囿圃園也囿􅁐也遂奉子頽以代王又僖公下曰􅁗師襲鄭鄭使皇武子辭曰鄭之有原圃猶􅁗之有具圃也又哀公下曰衛侯爲虎幄於籍圃於籍田之圃新造幄幕皆以虎獸爲飾也論語曰樊遲請學爲圃子曰吾不如老圃莊子曰古之人假道於仁託􅀫於義於遊逍遥之廬食於荀簡之田立於不貸之圃逍遥無爲也茍簡易養也不貸無出也古謂是采眞之遊韓子曰景公欲移晏子家於豫章之圃晏子辭孟子曰今有場師舎其梧檟養其樲􅁄則爲賤􅂣師也場師治圃者梧檟皆大名樲棘折􅀥言此以喻人捨大養小始賤場師也淮南子曰崑崙山有䟽圃之地滿之潢水三周山海經曰淮江之山實惟帝之平圃風俗通曰圃􅀘也從口甫聲拾遺録曰崑崙山第二層下有芝田蕙圃皆數萬頃羣仙種耨焉曹植籍田賦曰夫凢人之爲圃各植其所好焉好甘者植乎薺好苦者食乎荼好香者植乎蘭好辛者植乎蓼至於寡人之圃無不植也太平御覽卷第八百二十四
