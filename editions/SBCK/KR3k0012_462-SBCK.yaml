front:
  text: 太平御覽卷第四百六十二
  hash: sha256:d0465f1fe28230bf01f5b893f5bba8028cf6fa4a6fcd0a8c3e3571ec60afda75
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_462-1a}
body:
  text: 人事部一百三游􅀃下魏志曰􅀽紹領兾州牧從事沮授􅀃紹曰將軍屬廢立之際忠義奮發雖黄巾猾亂黒山跋扈舉軍東向則青州可定還討黒山則張燕可㓕迎大駕於西京復宗廟於洛邑號令天下以討未服以此争鋒誰敵之紹喜王沉魏書曰桓階字伯緒天下亂太祖興義兵􅀽紹強盛劉表舉州應之階􅀃其守張羡曰夫舉事而不夲於義未有不敗者也曹公雖弱扶義而起奉王命以討有罪羡曰善矣魚豢魏典畧曰蘇􅁗四􅀃􅁗惠王書十上而􅀃不行蜀志曰曹公追先主與諸葛亮至于夏口亮曰事急矣請求救於孫將軍亮􅀃權曰曹操之衆逺來疲弊聞追豫州􅀐一日一夜行三百里此所謂強弩之末不能穿魯縞者今將軍誠與豫州恊規同力破操軍必矣權大恱即并力拒曹公敗于赤壁又曰曹公追先主至於夏口諸葛亮曰事急矣請奉命求救於孫將軍時權軍柴桑觀望成敗亮􅀃權曰海内大亂將軍起兵江東劉表豫州牧衆漢南與曹操並争天下今操芟荑大難畧已平矣逺破荆州威震四海英雄無所用武故豫州牧遁逃至此將軍量力而處之􅀂能以呉越之衆與中國抗衡不如與之絶􅀂不能當何不按兵束甲北面而事之今將軍外託服從之名而内懷猶豫之計事急而不斷禍至無日矣晉中興書曰􅂫峻反温嶠推陶􅋲爲盟主􅋲欲西歸嶠􅀃􅋲曰天子幽逼社稷危殆四海臣子肝腦塗地嶠等與公致命之秋事􅀂尅濟則臣主同休如其不然身雖􅁅㓕足以謝責於先帝今之事􅀔義無旋踵􅀐虎之􅀔可得下平公􅀂違衆獨反衆心必沮沮衆以敗事義旗將廻指於公矣􅋲無以對遂留不去又曰建興􅀄祖逖進􅀃曰晉室之亂非上無道而逃民怨叛也由藩王争權自相誅滅遂使戎狄乗隙毒流中原今天下旣􅀍殘酷遺􅀺思夲人有奮擊之心但悉無所慿􅀝大王誠能命將帥使􅀂逖等執殳前驅上爲國家雪耻下爲百姓請命則郡國豪傑必因風嚮起沉溺之民欣於來蘇也掃灑中原清復寰宇此千載之一時願大王圖之中宗於是始欲疆理神州又曰劉牢之屯洌州桓􅀇至于湖熟遣牢之族舅何睦說曰今君戰敗則傾宗戰勝亦覆族欲以是安歸乎孰􅀂翻然改圖唯理是宅則與金石等固名與天壤俱窮哉牢之得􅀃詣玄請降也范亨燕書曰晉室大亂高祖方經略江東髙翔說髙祖曰自王公政錯士人失望繦􅀒歸公者動有萬數今王氏敗没而福􅀫見尾箕其兆可見也今晉室雖衰人心未變冝遣貢使江東亦有所尊然後仗義聲以掃不庭可以有辭於天下髙祖􅀷納焉宋書曰二㓙搆逆王憎逹廻感不知所從有客說之曰爲君計莫􅀂承義師之撽移告傍郡使工言之士明示禍福也唐書曰李懷光屯軍咸陽反狀始萌李景略時􅀃懷光請復宫闕迎大駕懷光不從景畧岀軍門慟哭曰誰知此軍一日䧟於不義軍士相顧甚義之因退歸私家又曰柏􅂄者將軍良器之子素負志畧學縱横家流㑹王承宗以常山叛朝廷厭兵欲以恩澤撫之􅂄於蔡州行營以畫干裴度請以朝旨奉使鎮州乃自處士受左拾遺旣見承宗以大義陳􅀃承宗泣下請質二男獻兩郡由是知名韋昭呉書曰將軍曹仁在公安拒守吕蒙令虞飜􅀃之飜至城門仁不肯相見乃爲書曰將軍獨守縈帶之城而不降死戰則毀宗滅祀爲天下􅀏幸熟思焉仁得書流涕而降之太公六韜曰文王齋戒三日乗田車田馬田于渭之陽吕尚以竿以漁曰今臣言至情不諱君其惡之乎緡微餌明小魚食之緡調餌多大魚食之夫魚食於餌乃牽於緡人食其禄而服於君故以餌取魚魚可殺以禄取人人可竭也春秋後􅀓曰梁以張儀爲齊相楚怒約而攻梁雍沮曰請令解攻雍沮謂齊楚之王曰王亦聞張儀之約􅁗王乎曰王􅀂相儀於梁齊楚惡儀必攻魏魏戰而勝是齊楚之兵折而儀固得梁矣􅀂不勝梁必事􅁗以持其國必割地以賂王若欲復攻其弊不足以應􅁗此儀之所以與􅁗王隂相約也齊楚王曰善乃遽解兵又曰魏加問春申君聞欲將臨武君有之乎曰有矣加曰臣少之時好射臣願以射譬可乎春申君曰可曰更嬴與魏王處廪下更嬴謂魏王曰臣能爲王虚發而下鳥有間鴈來更嬴虚發而烏下魏王曰然則射可至此乎更嬴曰此孽也王曰何以知之對曰其飛徐而嗚悲者故創痛也嗚悲者乆失羣也今臨武君甞爲􅁗孽不可爲距􅁗之將也又曰皇甫嵩旣破黄巾威震天下故信都令漢陽閻忠􅀃嵩曰難得易失者時也時至不旋踵者機也故聖人常順時而動智者必因機以發今將軍遭難得之時蹈機而不發將何以權大名乎又曰劉備救徐州刺史陶謙㑹謙病死伏波將軍陳登􅀃備曰今欲爲使君合衆十萬上可以匡主濟人成五覇之業下可以割地守境書名竹帛􅀂使君不聽登亦未聽使君得發備遂領徐州孔演漢魏春秋曰興平元年曹公復征陶謙陳宮􅀃張邈曰雄傑並起君以千里之衆當四戰之地撫劒頋盻亦足以爲人豪而反制於人不以鄙乎魏氏春秋曰鍾㑹隂懐異圖姜維見而知其心謂可構成擾亂以圖克復乃詭􅀃之曰君自淮南巳來筭無遺䇿晉道克昌皆君爲之今復定蜀威德大震其民髙其功而主畏其謀欲以此安歸乎夫韓信不背漢於擾攘而見疑於旣平大夫種不從范蠡於五湖卒伏劒而亡彼豈闇主愚臣哉利害使之然也今君大功旣立大德巳著何不法陶朱公汎舟絶迹全功保身登娥媚之嶺而從赤松遊乎㑹曰君言逺我不能行且爲全身之道或未盡於此也維曰其他則君智力之所能無煩於老夫矣由是情好欣甚周載曰薄疑者衛之居士也疑進說衛嗣君以王道嗣君恱延之以相辭曰疑之母以疑爲賢然與疑議家事旣定則又决之所幸蔡嫗故事多不就母子之間猶不免乎蔡嫗之議今人主皆有蔡嫗而於臣非骨􅁏之親安得不敗君曰寡人聞命遂相之委以從事江表傳曰曹公聞周瑜年少有俊才謂可遊􅀃動也宻下楊州遣九江蔣幹有儀容以才辯見稱獨歩江淮之間莫與爲對乃布衣􅁑巾自託􅀻行詣瑜瑜出迎之立謂幹曰子翼卿苦逺江湖爲曹氏作􅀃客耶幹曰吾與足下州里中間别隔遥聞芳烈故來叙闊并觀雅頌而云說客無乃逆詐乎瑜曰吾雖不及夔曠聞弦賞音足知曲也因延幹入爲設酒食後三日瑜請幹與周觀營中行視倉庫軍資器仗言訖還飲宴示之侍者服飾珍玩之物因謂幹曰丈夫處世一遇知巳外守君臣之義内結骨􅁏之恩言行計從禍福共之假使􅂫張更生酈叟復在吾猶拊其背而折其辭豈足下㓜生所能移乎幹但􅀏終無所言幹還稱瑜雅量非言辭所間中州之士亦此多之王充論衡曰􅀓稱􅂫􅁗張儀縱横之術於􅀑谷先生掘地爲坎曰能下􅀃令我泣岀則能分人主之地蘇􅁗說􅀑谷先生泣沾衿張儀下􅀃􅀑谷先生泣亦沾衿劉向􅀃苑曰孫卿曰夫談􅀃之術端盛以處之堅強以持之莊子曰昔趙文王喜劒劒士日夜相擊於前太子悝患之乃使以千金奉莊子莊子不受請持劒服劒服成乃見王曰臣有三劒有天子劒有諸侯劒有庻人劒天子之劒包以四夷褁以四時一用天下服此天子之劒於是文王不出宫三月劒士皆伏弊之也列子曰鄧析操兩可之􅀃設無窮之弊韓子􅀃難篇曰不可不察愛増之主而後􅀃焉又􅀃難篇曰凢事以密成亦以􅂥禍未必其身􅂥也而語及所匿之事如此者身危矣又􅀃難篇曰龍喉下有逆鱗有嬰之則必煞人人主亦有逆鱗􅀃者能無嬰人主之逆鱗則幾死矣又􅀃難篇曰大意無所拂悟辭言無所擊排然後極聘智辯焉又􅀃難篇曰略事陳意則曰怯懦而不盡慮事廣肆則曰草野而倨侮此􅀃之難也又􅀃難篇曰凢􅀃得親近不疑而得盡其辭也􅀑谷子曰抵􅇖音熈篇云巇者始有朕可抵而塞可抵而却聖人知之獨保其用因作􅀃事又曰量權篇云與智者言依於􅀶與􅀶者言依於辯與辯者言依於要此其􅀃也又曰午合篇云伊尹五就桀五就湯然後合於湯吕尚三入殷朝三就文王然後合於文王此天知之至歸之不疑注云伊尹吕尚各以至知􅀃聖王因澤釣行其術䇿又曰摩意篇云摩者揣之也􅀃莫難於悉行事莫難於必成注曰摩不失其情故能建功又曰量權篇云言有通者從其所長言有塞者避其所短注曰人辭􅀃條通理逹即叙述從其長者以昭其德人言壅滯即避其短稱宣其善以顯其行言􅀃之樞機事物之志務者也又曰反覆篇云其和也􅀂比目魚其司言也􅀂聲與響注曰和荅問也因問而言申叙其解如比目魚相須而行候察言辭徃來若影隨形響之應聲又曰量權篇云介虫之捍必以甲而後動螫虫之動必先螫毒故禽獸知其所長而談者不知用也注云虫以甲自覆鄣而言􅀃者不知其長又曰揣情篇云􅀃王公君長則審情以􅀃王公避所短從所長又曰謀慮篇云乃立三儀曰上中下曰叅以立焉變生事事生謀謀生計計生儀儀生􅀃說生進注曰三儀有上有下有中㑹同異曰儀决是非曰􅀃吕氏春秋曰伍子胥將見呉王而不得客有言之於王子光者王子光見之而惡其皃不聽其說而辭之客請之王子光曰其皃吾所甚惡也客以告子胥子胥曰此易改也願令王子光居於堂上重帷而見其衣子光許之胥􅀃之半王子光舉帷􅅮其手而與之坐􅀃畢王子光大恱子胥以爲有呉國者必王子光也退而耕于野十年子光爲王任子胥子胥爲法制下賢良選陣士習戰闘六年然後大勝楚于栢舉九戰九勝逐北千里昭王出奔又曰韓氏城新城期十五日而成叚橋爲司空有一縣後二日叚橋執其吏而囚之囚者之子走告封人子髙曰唯先生能活臣父封人子髙曰諾乃見叚橋自扶而上城封人子髙左右望曰羙哉城壹大功矣子必有厚賞矣自古及今功􅀂此其大也而能無有罪戮者未曽有也封人予髙出叚橋使人夜解其吏之束縳之者而出之􅀃之行􅀂此其精也封人子髙可謂善􅀃矣又曰孟甞君爲從公孫弘謂孟甞曰不􅀂西觀􅁗王之意弘見昭王曰薛之地小大弘曰百里昭王曰寡人之國地數千里猶未敢以有難也今薛百里之地而欲難寡人乎公孫弘曰孟甞君好士大王不好士昭王􅀏而謝之又曰善􅀃者􅀂巧士因人之力以自為力因其來而與來因其徃而與徃所因便也尸子曰公輸般爲蒙天之階階成將以攻宋墨子聞之赴於楚行十曰十夜而至於郢見王曰今有人於此舎其文軒鄰有弊輿而欲􅀼之舎其錦繡鄰有短􅄄而欲竊之舎其梁􅁏鄰有糟糠而欲竊之此爲何􅀂人王曰必􅀼疾矣墨子曰荆之地方五千里宋方五百里此猶文軒之與弊輿也荆有雲夢犀兒麋鹿􅄹溢江漢之魚鼈黿鼉爲天下饒宋所謂無雉兎鮒魚者也猶梁􅁏之與糠糟也荆有長松文栢梓柟豫章宋無長木猶錦繡之與短􅄄也臣以王之攻宋也爲與此同􅀋王曰善哉請無攻宋孔藂曰齊攻趙國禀立趙使孔青擊之克齊軍尸三萬趙王詔勿歸其尸將以困之子愼聘齊曰以臣愚計貧齊之術乃冝歸尸使其家逺來迎尸不得事農一費歸而葬之二費也一年之中䘮三萬費欲無困貧弗可得也王曰善又曰五國約而誅􅁗未入􅁗境而留兵於成臯子愼謂市丘君曰此師楚爲之主今兵不散殆有異意君其備之市丘君曰先生幸而教之子慎許諾遂見楚王曰王約五國而伐􅁗事旣不集王胡不卜交乎楚王曰柰何子慎曰王今出令使五國勿攻市丘五國重王則聽王之令矣不重王且反王令而攻市丘以此卜爲國交王之輕重必明矣楚王敬諾而五國散楊雄解嘲曰婁敬委輅脫輓棹三寸之舌案漢書曰婁敬􅀃髙祖西都又曰上􅀃人主下談公卿一從一横論者莫當班固荅賔戲曰遊說之徒風颺電激太平御覽卷第四百六十二
