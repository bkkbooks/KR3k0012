front:
  text: 太平御覽卷第七百五十八
  hash: sha256:fc6ed937b72b56a0f20b0f3c1742571b889495ea4dbce96e1bd5360fbe052212
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_758-1a}
body:
  text: 器物部三盆􅇲附甕罃坩缾甒魁槃盆爾雅曰盎謂之􅇲盆也易曰􅀄六有孚盈􅇲王肅曰􅇲者下民質素之器又曰九三日呉之離不鼔􅇲而歌則大耋之嗟凶詩曰坎其擊􅇲宛丘之道盎謂之􅇲周禮曰盆實二鬴厚半寸禮曰夫奥者老婦之􅀕也盛於盆尊於瓶盆瓶炊器也又曰丗婦卒􅁞遂獻繭于夫人及良日夫人繅三盆手三盆手者三淹也史記曰􅁗趙㑹澠池藺相如曰趙王竊聞􅁗王善爲􅁗聲請奏盆缻音􅇲皆瓦器竹以盛酒秦人鼔之以節歌於是􅁗王不懌爲一擊缻趙御書曰某年某月􅁗王爲趙王擊缻又曰王惲書云醉後仰天撫􅇲而歌又曰司馬遷書云僕以爲戴盆何以望天續晉陽秋曰桓宣武與妻妾坐月下流星墜下銅盆水中光如二寸珠熲然妾酌飲之生玄晏子春秋曰景公飲酒自鼔盆甕也莊子曰莊子妻死惠子吊之莊子箕踞鼔盆而歌淮南子曰今夫窮鄙之社也扣盆拊瓴相和而歌自以爲樂矣嘗試爲之擊建鼔撞巨鍾然知其盆瓴之足羞藏詩書修文學而不知至論之旨則拊盆扣瓴之徒也又曰屠者藿羮車者步行陶人用缺盆匠人處狹廬又曰今盆水在庭清之終日未能見目睫濁之不用一橈而不能察方圎人神易濁而難清猶盆水之􅀋乎學同又曰日冬至則盆水溢丗􅀃曰阮仲容至宗人聞共集以大盆盛酒王韶之始興記曰林源山有石室室盤石上行羅十甕皆蓋以青盆中悉是缾銀交州􅄂記曰夷俗以銅盆甕贖罪潘岳笙賦曰傾縹盆以酌酃甕􅀃文曰罌於耕切甀直爲切􅀃文亦作垂也甀小口甖也􅒤下江切以甖與罌字同長頸受十甕甖也通俗文曰甕下孔曰瓹姑縣切方言曰酃音剛折都貪切一音沈甒音武䍃音由㽀音鄭㼻士􅀟切甕瓿甊瓿音部甊郎口切㽈魚記切甖也酃桂之郊謂之㼚今江東通名大瓮爲㼚也其小者謂之周魏之間謂之甒今江東亦呼甖甒子􅁗之舊都謂之㽀江淮之問謂之䍃江湖之間謂之㼻自􅀜而西晉之舊都河汾之間其大者謂之甀其中者謂之瓿數自􅀜而東趙魏之間謂之甕或謂之甖東齊海岱之間謂之㽈甖其通語也爾雅曰甌瓿謂之瓵瓿小甖也長沙曰瓴瓴音也易曰井谷射鮒甕弊漏禮曰宋襄公葬其夫人䤈醢百甕又曰儒有蓬户甕牖易衣而出併日而食左傳曰齊侯伐燕燕人歸燕􅁎賂以瑤甕玉櫝斚耳不克而還王甕也孝經援神契曰銀甕也不汲自隨不盛自盈瑞應圖同漢書曰陳平家貧居甕牖家語原憲同東觀漢記曰王渙爲洛陽令盗賊發不得逺走或藏溝渠或伏甕下渙以方略取之皆稱神明王隱晉書曰太孫臧外祖蔣迪呉興人後迪作酪當釀未成大瓮自行迪打酪甕破問景養養曰當生太子儲副又曰畢卓爲吏部郞性􅄝酒比舎郞酒熟卓因醉夜至其甕間盗飲之爲掌酒者所􅅞旦視之乃畢吏部也墨子曰備城百歩一井井十甕莊子曰子貢過漢隂見一丈夫方將爲圃畦鑿隧而入井抱甕而出灌志恠曰建康小史曹著爲廬山府君所迎見門有一丈甕可受數百斛但見風雲岀其中鍾離意别傳曰意爲魯相孔子堂有甕皆有丹書自夫子亡後無敢發者意乃發甕得素書爲學華陽國志曰趙琰青州刺史㕔置水甕得貴要之書投於其中淮南萬畢術曰銅甕雷鳴取沸湯著銅甕中堅密塞内之井中則雷鳴聞數十里語林曰羊稚舒冬月釀酒令人抱甕爲暖羊琇字稚舒丗說曰胡廣本姓黄五月五日生父母惡之乃置甕投於江胡公見甕流下聞兒啼取兒養之遂七登三司廣不持本親服云於本親以我爲死人深譏之罃烏行切與嬰同切􅀃文曰罃備火長頸缾也方言曰罃陳魏宋楚之間謂之瓦音俞􅁷或謂之㼡音殊燕之東北朝鮮冽水之間謂之瓺音折亦音腸齊之東北海岱之間謂之儋所謂家無儋石之儲者也音擔或作甔周洛韓鄭之間謂之甀或謂之罃罃謂之㼰音鼙史記曰韓信擊魏從夏陽以木罌渡軍襲安邑服䖍曰以木押縛罌􅇲以爲渡異􅁐曰月支國有佛髪盛以琉璃甖幽明録曰清河崔茂伯女結婚裴氏尅期未至女􅁀亡提一金甖受二升許徑到裴牀前立以甖贈裴甄異傳曰晉隆安中呉縣張君才忽有􅀑來令才取一白甖盛水半以絹覆頭明日視之錢滿甖才家先貧因此遂富墨子守備曰用瓦大甖容十升以上者歩而十盛水旦用之蔡謨與何驃􅀐書曰昔墨翟以瓦甖濟國也淮南子萬畢術曰馬蹄破甖取馬蹄燒如炭置甖中有頃破矣坩音龕纂文曰大坩爲坊音塤東宫舊事曰白坩五枚丗􅀃曰陶侃少時作魚梁吏甞以一坩鮓餉母母責侃曰汝爲吏以官物見餉非唯不能益吾乃以増吾憂裴淵廣州記曰董奉至晉興五里封一白坩置髙崖中而去人欲取不能得今猶在缾說文曰缾甕也甕壅也汲缾也瓴形似缾易曰汔至亦未繘井羸其缾凶詩曰缾之罄矣傳曰衛孫蒯田于曹隧飲馬於重丘毀其缾重丘人􅐬門而訽之親逐其君尔父爲厲衛石買孫蒯伐曹取重丘又曰晉人來治􅂎田季孫將以成與之盛孟氏邑本􅂎曰謝息爲孟孫守不可曰人有言曰雖有挈缾之知守不假器禮也又曰邾子在門臺閽以缾水沃廷事具鑪門中史記曰田肯􅀃髙祖曰秦形勝之國也地勢便利其以下兵於諸侯譬猶居髙屋之上建瓴水也如淳曰瓴盛水缾也建音蹇漢書曰􅀭雄作酒賦以諷諌成帝其文爲酒客難法度士譬之於物曰子猶缾矣觀缾之居居井之湄處髙臨深動常近危酒醪不入藏水滿懷不得左右牽於􅆞徽一旦擊礙爲党所櫑音雷身投黄泉骨肉爲泥自用如此不如鴟夷前凉録曰張軌時西胡致金胡缾皆拂䔉力禁切作竒狀並人髙二杖魯子曰一井五缾泄之可待分流者衆也吕氏春秋曰見缾水之冰而知天下之寒魚鼈之藏也淮南子曰古者抱缾而汲唐子曰猛將之發觀于虎而覽于鷹故攻如擊電避如收霧閇之如在缾開之如散星西域記曰踈勒王致魏文帝金胡缾二枚銀胡缾二枚􅄂五行書曰懸缾井中除邪􅀑楚辭曰缾甌登於明堂缾甌瓦器也周鼎濳乎深泉古樂府詞曰淮南王自言尊百尺髙樓與天連後園鑿井銀作牀金缾素綆汲寒漿甒方言曰甒瓮甖也禮曰君尊瓦甒此以小爲貴也瓦甒五斗儀禮曰東方之饌兩瓦甒三禮圖曰醴甒以瓦爲之受五斗口髙二寸徑一尺六寸中身瓮下平有蓋魁易洞林曰太子洗馬荀子􅂹家中以龍銅魁作食歘鳴東宫舊事曰一升銅魁一􅃮二升魁三􅃮注醤五升魁二李尤羮魁銘曰羊羮不徧駟馬長驅槃􅀃文曰槃承槃也椃音竒盤也周禮曰􅀂合諸侯則共珠槃玉敦合諸侯者必割牛耳取其血歃之以盟珠槃以盛牛耳大戴禮曰隨武子槃之銘曰與其溺於人也寕溺於淵禮曰湯之槃銘曰苟日新日日新又日新左傳曰晉文公及曹僖􅀒羈之妻曰吾觀晉公子之從者皆足以相國􅀂以相國公子必反其國反其國必得志於諸侯得志於諸侯而誅無禮曹其首也子盍蚤音早與早同自貳焉乃饋槃飱寘璧焉又曰莒人伐我東鄙圍台季武子救台遂入鄆取其鍾以爲公槃史記曰平原君與楚王合從音蹤言利害毛遂謂楚王之左右曰取鷄狗馬之血來毛遂捧銅槃血跪進曰當啑血盟而定之又曰武帝作栢梁銅柱承露槃仙人掌蘇林曰仙人以手掌檠槃承甘露也後漢書曰左慈有術於銅槃鈞鯔魚漢官儀曰封禪壇南有玉槃槃中有玉􅀛焉晉陽秋曰武帝時御府令蕭譚承徐循儀䟽作􅃮畫銀槃詔殺之晉四王起事曰惠帝還洛陽道中有老公蒸雞素木槃中盛以奉帝沈約宋書曰髙祖儉諸子食不過五醆槃後魏書曰太武帝作黄金槃十二具鏤以白銀鈿以玫瑰珠玉隋書曰上賜王公巳下射楊素箭爲第一上以外國所獻金精槃價直鉅萬賜之荀卿子曰君者槃也水者民也槃圎則水圎槃方則水方燕丹子曰太子出美人能琴者荆軻曰好手太子即斷手以玉槃奉之淮南子曰窺面於槃水則圎於杯水則脩面形不變其故有所圓脩者皆所自窺之異也抱朴子曰以丹金爲槃盌食其中令人長生郭子曰王光禄曰正得殘槃冷炙脩復山陵故事曰武帝悼后玄宫􅃮烏瓦槃一枚東宫舊事曰長槃五􅃮尺槃三十􅃮柏炙拌二拌音與槃同漢武内傳曰西王母以玉槃盛桃神異經曰西北荒有金山上有金銀槃廣五十丈搜神記曰髙辛氏有老婦人得耳疾醫爲挑治得􅆑大如蠒盛以瓠離覆之以槃俄而􅆑化犬因名槃瓠王子年拾遺録曰董偃以玉精爲槃承冰而進則冰玉等色侍者謂冰無柈必融濕席上乃拂之玉盤落於階上冰玉皆碎偃更以爲樂玉精干塗國獻也武帝以此器賜董偃又曰漢明帝夜讌羣臣於華昭園詔太官進櫻桃以赤瑕瑛爲槃賜羣臣而去其葉月下視槃與櫻桃共一色衆臣皆􅀏云是空槃時帝夜坐於庭中欲以承露詔使舉燭復照衆坐乃知槃中不空也皆起拜謝爲樂風土記曰越俗飲燕即懿槃爲樂取大素圜槃抱以著腹上以右手五指彈之以爲節舞者應槃節而作舞鄴中記曰石虎正㑹御食遊槃兩重皆金銀叅帶百二十醆彫飾並同其叅帶之間茱茰盡微如破髮近㸔乃得見動遊槃則圎轉也又曰石虎皇后浴室中􅀟長生樹又安玉槃受十斛於二樹之間交州雜事曰太康四年刺史陶璜表送林邑王范熊所獻縹紺水精槃各一枚述征記曰逍遥宫門裏有銅浴槃面徑丈二尺魏景􅀄中所鑄妬記曰武歷陽女嫁阮宣子無道妬忌禁婢甌覆槃蓋不得相合神仙傳曰沈義爲人所迎見老君以金案玉槃賜之俗􅀃曰桓􅀇寵丁牛期食畢便廻槃與之母丘儉承露槃賦曰偉神槃之殊異邈迢逓以秀峙古樂府曰琉璃琥珀象牙槃張衡四愁詩曰美人贈我翠琅玕何以報之􅀟玉槃李尤槃銘曰或以承觴或以受物旣與清觴又盛口食蔡邕槃銘曰華槃就用以享嘉賔内丹其實外􅀂􅀇眞陳思王集曰明帝承露槃在芳林園中上槃徑四尺九寸下槃徑五尺銅龍繞其根劉義恭啓事曰恩旨以犀鏤金厠酒杯槃垂賜太平御覽卷第七百五十八
