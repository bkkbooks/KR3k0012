front:
  text: 太平御覽卷第四百二十六
  hash: sha256:ea84a6b8dc15a9e1c85c7abe05155f2a9125b58545188bbf1cf233a60ed7c2c8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_426-1a}
body:
  text: 人事部六十七清廉下蕭子顯齊書曰王秀之字伯奮琅琊臨沂人也爲晉平太守至郡期年謂人曰此郡豐壤禄俸常盈吾生資巳足豈可乆留以妨賢路上表請代時人爲王晉平恐冨求歸齊春秋曰何敬叔爲東海令在縣清廉不受饋夏節忽牓門受餉數日中得米二千餘斛他物稱是悉以代貧民輸租梁書曰范岫毎所居官􅁪以廉㓗著稱爲長城令時有梓材巾箱至數十年經貴遂不改易在晉陵唯作牙管一􅀟猶以爲費又曰沈顗字處嘿呉興武康人也顗不治家産值齊未兵荒家人并日而食或饋其梁肉者閉門不受陳書曰姚察字伯審呉興武康人察自居顯要其勵清節甞有私門生送南布一端花練一疋察謂之曰吾所衣着止於麻布蒲練幸不煩此人遜請猶兾受納察勵色駈出自此伏事者莫敢饋也隋書曰狄士文甞入朝遇上賜公卿入左藏任取多少人極重士文口銜絹一疋兩手各持一疋上問其故士文曰臣口手俱滿餘無所湏上異之別賞物勞遣之唐書曰屈突通從太宗平薛舉時珎物山積諸將皆争取之通獨無所犯髙祖聞而謂曰公清正奉國著自終始名下定不虚也又曰賈敦頥曹州􅁈句人也貞觀中歴遷滄州刺史在職清㓗毎入朝盡室而行唯弊車一乗羸馬數疋銜勒有闕以繩爲之見者不知其刺史也又曰􅀽承序陳尚書僕射憲之子也武徳中累轉建昌令在任清㓗士吏懷之髙宗在藩太宗選學行之士爲其僚属謂岑文夲曰梁陳名臣有誰可稱復有子弟堪招引否文夲言隋師入陳百司奔散唯􅀽憲獨在其主之傍王丗充將受隋禪群僚勸進憲子給事中承家託疾不署名此之父子足稱忠烈承家第承序清貞雅操寔繼先風由是召守晉王友又曰􅂫頲性廉儉所得俸禄盡推與諸弟或散之親族家無餘資又曰盧懷愼清儉不營産業噐玩服飾無金玉綺文之麗所得俸禄皆隨時分散而家無餘蓄妻子匱乏又曰馮履謙􅀘河北尉有部人張懷道任江陽尉與謙疇舊銄鏡一靣謙集寮吏遍視之曰此張公所致也吾與之有舊吾効官以俸禄自守豈私受遺哉昌言曰清水見底明鏡照心余之効官必至於此復書於使者乃歸之又曰李懷逺乆居榮位而好尚清廉宅舎屋無所增改甞乗􅅃叚馬豆盧欽望謂之曰榮貴如此何不買駿馬乗之荅曰此馬幸免驚蹶無假別求聞者莫不歎伏又曰裴玢爲鄜州刺史三年改授山南西道節度使玢歴二鎮頗以公清苦節爲政不交權倖不務貢獻􅂼食弊衣居處纔避風􅀨而廪庫饒實百姓安業又曰杜暹在家孝友撫異母弟昱甚厚常以公清勤儉爲巳任弱冠便自誓不受親友贈遺以終其身􅀄爲㜈州叅軍秩滿將歸州吏以􅁓萬餘張以贈之暹唯受一百餘悉還之時州寮別者見而歎曰昔清吏受一大錢復何異也家語曰曽子弊衣而耕於魯君聞之而賜邑焉曽子固辭曰吾聞受人者常畏人與人者常驕人縱君不我驕也吾能勿畏乎孔子聞之曰參之言足以全其節􅀃苑同又曰子路問於孔子曰仁人廉士窮則改節乎子曰改節則何以稱仁廉哉孔叢子曰子思居貧其友饋之粟者受三車焉或獻罇酒束脩子思弗當也或曰子取人粟而辭吾酒是辭少而取多也義則無名介則不全子思曰然伋不幸而貧於財至乃困乏將絶先人之祀夫所以受粟爲賙之酒脯則所飲讌也方乏於食而乃飲讌非義也吾豈以爲介哉或擔其酒脯以歸韓詩外傳曰鮑焦衣弊膚見挈畚採􅂼遇子貢於道子貢問曰吾子何以至於此乎鮑焦曰天下之道德敎者衆矣吾何以不至於此吾聞之丗不已知而行之不巳者是華行也上不已用而干之不正者是毁廉也行華廉毁然且弗舎惑於利者也子貢曰吾聞之非其丗者不生其利汙其君者不食其􅁟非其丗而採其􅂼詩曰􅄎天之下莫非王􅁟此誰之有哉鮑焦曰於戲吾聞賢者重進而輕退廉者易愧而輕死則棄其􅂼而立槁於洛水之上列子曰東方有人焉曰爰旌目將有適也而餓於道􅀌父之盗曰丘見而下一飱以餔之旌目三餔而後能視曰子何爲者也曰我􅀌父盗人爰旌目曰譆汝非盗􅁘吾義不食也兩手據地而歐之不出喀喀而死孟子萬章曰陳仲子豈不誠廉士哉居於陵三日不食耳無聞目無見井上有李螬食實者過半矣匍匐往將食之三咽然後耳有聞目有見也李實有虫食之過半避兄離母居於陵又曰伯夷叔齊聖人之清者也聞伯夷叔齊之風貪夫廉懦夫有立志晏子春秋曰景公以五十乗魚賜􅁌章章歸魚車塞塗撫其御之手曰昔者晏子辭賞以正君故過失不掩今諸臣謟䛕以干利吾若受魚是反晏子之義而順謟䛕之欲固辭魚不受君子曰􅁌章之廉晏子之遺行也又曰有工女託於晏子之家者曰婢子東郭之野人願得入身比數於下陳焉晏子曰乃今而後自知吾不肖也古之爲政者士農工商異居男女有別而士無邪行女無􅁋事今僕託國主民而僕必行無清也遂不見韓子曰晉文公出亡箕鄭挈一壷食而從迷而失道與文公相失餓而不敢食及文公反國伐原以爲原令呂氏春秋曰古之人非無寳也所寳者異孫叔敖將死属其子曰我死王必封汝汝母受利地荆楚之間有寢丘其利少而甚惡可長有也其子受之至今不失淮南子曰曽子立廉不飲盗泉所謂養志者也又曰君子不入市爲其挫廉􅀃苑曰孔子見景公景公致廪丘以爲養孔子辭不受出謂弟子曰吾聞君子當功以受禄今􅀃景公未之行而賜我廪丘其不知丘亦甚矣遂辭而行又曰子思居於衛緼袍無裏二旬九食田子方使人遺白裘恐其不受因謂之曰吾假人遂忘之吾予人也如弃之子思辭曰伋聞忘予不如遺弃物於溝壑伋雖貧不忍以身爲溝壑楊子法言曰楚兩龔之㓗其清矣兩龔龔勝龔舍三輔決録曰安陵清者有頃仲山飲馬渭水曰與三錢以償之風俗通曰頴川黃子廉者毎飲馬投錢於水中又曰鮑焦耕田而食穿井而飲非妻所織不衣餓於山中食􅀥或問之此􅀥子所種也遂強嘔立枯而死又曰郝子廉飢不可得食寒不可得衣一分不取諸人曾過姉家飲留十五錢置席下去列女傳曰河南樂羊子妻不知何氏羊子甞行路得遺金一餅還以與妻妻曰妾聞志士不飲盗泉之水廉者不受嗟來之食况拾遺求利以汙其行乎羊子大慙􅂢金於里逺㝷師學又曰凡爲名者必廉廉斯貧爲名者必讓讓斯賤長沙􅂄舊傳曰徐偉奴善叛知識欲爲偉售之偉曰不得奴徃當復逃亡豈可虚受其價廉平義正􅀂此廣州先賢傳曰踈源字元流南海人出給郡役爲戸曹佐源性廉㓗家貧餉晏不至同第人餉先到呼之共食源未甞聽又曰丁宻字靖公蒼梧人少以清介爲節非家織布物不衣非巳種耕菜菓不食毫􅁵之餽不受於人汝南先賢傳曰周爕字彦祖好潜靜養志唯典籍是樂有先人草廬廬于東坑其下有陵田魚蛤生焉非身所耕漁則不食又曰胡定頴川人也至行絶人在䘮雉兎遊其庭雪覆其室縣令遣戸曹排雪問定定以絶榖妻子皆卧在床令遣􅁺以乾粮就遺之定乃受半録異傳曰漢時大雪積地丈餘洛陽令身出案行至􅀽安門無行路謂安巳死除雪入見安僵卧問何以不出安曰大雪人皆餓不冝干人令以安爲賢舉爲孝廉郭縁生武昌先賢傳曰郭翻字長翔爲人非巳耕不食非妻自織不衣漢皇德傳曰盖􅀳燉煌人天性皎㓗自小不甞過人飯貧爲官書得錢足供而巳不取其餘任嘏別傳曰嘏字紹先㓜以至性見稱遇荒亂家貧賣魚官發魚價貴數倍嘏即取直如常陳留􅂄舊傳曰洛陽令董宣死詔使視之闌轝一乗白馬一疋帝曰董宣之清死乃知之益部􅂄舊傳曰朱倉字雲卿之蜀從處士張寕受春秋糴小豆十斛屑之爲糧閉户精誦寕矜之歛得米二十斛倉不受一粒鍾離意別傳曰意爲尚書交阯太守張悝居官貪亂􅂍踰千金珠璣玩寳乃有石數收􅂍薄入司農詔悉以珠賜諸尚書尚書皆拜受意獨委珠璣於地不拜受明帝問委珠何也對曰愚聞孔子忍渴不飲盗泉之水曾子還車不入勝母之閭惡其名也今陛下以􅂍珠賜忠臣以故臣不拜受耳羊祜別傳曰昔有攘羊遺叔向母母埋之後事發檢羊肉盡唯舌存遂以羊舌爲氏族祜其後也華陽國志曰何隨字季業除安漢令蜀亡去官時巴􅁟飢荒所在無􅂖送吏行乏輙取道側民羊隨以綿繫其處使足所取直民視羊見綿相語曰聞何安漢清廉行過從者無糧必能爾耳持綿追還之終不受人爲語曰安漢吏取糧令爲之償范亭燕書曰皇甫眞字楚季安定朝郍人也從輔國恪討檎冉閔即南圍拔鄴石氏舊都城内珎玩寳貨充溢眞無所取唯存恤人物収歛圖籍眞上䟽曰臣輙以家奴婢五十口馬七疋牛四十頭以􅂇軍資物理論曰有吕子義當丗清賢士也有舊人徃存省嫌其設酒食懷乾糒而往主人榮其降巳乃盛爲饌義出懷中乾糒求一柸冷水而食之語林曰何公爲楊州親親有葬者乞數萬錢而帳下無有楊州常有㮧胡㤙切米以賑􅀌寡乃有千餘萬斛虞存爲治中靣見道帳下空索求粜此米付帳下何公曰次道義不與其􅀌寡爭粒丗􅀃曰范宣㓗行廉約韓豫章遺百疋絹不受稍减遂至一疋旣終不肯受韓後與范同載就車中手裂二丈與范云人寕可使婦無禈􅁘范􅀏而受之郭子曰􅁃公爲護軍属桓廷尉爲索一柱吏桓後遇見徐寜而知之寧字安期東海人致與􅁃而稱云是海内清士顔延之廷語曰清者人之正路劉弘敎曰録事巫衛忠清厲節衣食不充賜單復衣各一旦恒令厨食給其家榖三百斛諸吏冝見賢思齊太平御覽卷第四百二十六
