body:
  text: 嶺南道廣韶岡循潮恩春賀端藤康封瀧髙義新勤竇桂昭蒙冨梧潯龔鬰林平琴賔澄繡象栁融邕貴黨撗田嚴山淳羅潘容辯白牢欽安南都護府武峩粤芝愛福禄長驩峯陸廉巖雷禺湯瀼籠環古崖儋振瓊萬安廣州十道志曰廣州南海郡􅁗置南海郡二漢因之兼置交州吴因之分置廣州宋齊皆因之梁陳並置都督府隋平陳又置畨州􅌆帝初復置南海郡唐爲廣州又曰南海縣本漢畨禺縣地山海經曰桂林八樹在賁禺東注云賁禺即畨禺也吴録曰畨禺縣有禺山尉佗所葬南越志曰肅連山西十里有靈州山焉其山平原弥望曽野極目郭景純云南海之間有衣冠之氣者斯其地也又曰􅁗占氣者以南方有黄氣紫雲之異使繡衣使者鑿之二十餘文乃流血數日以爲鑿龍之効今所鑿之處形似馬鞍謂之馬鞍崗又曰石門之水舊曰貪泉俗云經大􅁃則清穢之氣分飲石門則淄素之質變廣州記曰尉佗築朝臺以朝天子南越志曰朝臺下有趙佗城朝臺西三十里即崗旁江構越華館以送陸賈因稱朝亭十道志曰畨禺北津水今名廉平水韶州十道志曰韶州始興郡禹貢楊州之域春秋戰國皆楚地􅁗屬南海郡二漢屬桂陽郡吴置始興郡晉因之宋改爲廣興齊復爲始興隋平陳爲韶州以韶石爲名郡國志曰韶州科斗勞水間有韶石二􅃺若􅀟闕永和二年有飛仙衣冠遊二石上昔舜遊登此石奏韶樂因以名之岡州十道志曰岡州義寕郡禹貢楊州之域􅁗漢並屬南海郡東晉末分置新㑹郡宋齊梁並因之隋平陳置封州後改爲亢州後改爲岡州郡國志曰岡州地邊大海晴少雨多時遇甚風林宇悉拔俗織竹爲釡以蠣殻屑泥之煑鹽轉乆弥密循州十道志曰循州海豊郡春秋時爲百越之地戰國屬楚􅁗二漢南海郡地晉亦然隋平陳置循州南越志曰郡東水道一千里趙佗昔爲龍川尉所蒞於此潮州十道志曰潮州潮陽郡亦古閩越地􅁗屬南海郡􅁗末屬尉佗漢􅀄屬南越後亦屬南海郡後漢因之晉置東官郡隋平陳置潮州郡國志曰稻得再熟蠶亦五収煑海爲鹽十道志曰海陽縣本漢掲陽縣地南越志曰潮陽縣窮海之北故曰潮陽恩州十道志曰恩州恩平郡􅁗屬南海郡二漢爲合浦郡唐貞觀中置恩州春州十道志曰春州南陵郡古越地􅁗屬南海象郡漢合浦郡之髙凉縣地晉分置恩平縣唐武徳四年討平蕭銑置春州賀州十道志曰賀州臨賀郡􅁗屬南海郡二漢屬蒼梧郡吴置臨賀郡晉因之宋爲臨慶國齊復爲臨賀郡陳因之隋平陳置賀州因賀水爲名端州十道志曰端州髙要郡􅁗屬南海郡兩漢並屬蒼梧郡晉亦然宋齊並屬南海郡陳置髙要郡隋平陳置端州南越志曰石室山傍洞雲霧自生風煙有二石門以爲仙之下都藤州十道志曰藤州感義郡􅁗屬南海郡二漢並屬蒼梧郡晉屬永平郡隋平陳置藤州􅌆帝􅀄州廢置永平郡唐復爲藤州郡國志曰俗以青石爲刀劔如銅鐵法婦人亦爲環玦代珠玉也夷人徃徃化爲􅓔貙小虎也康州十道志曰康州晉康郡􅁗屬南海郡二漢屬蒼梧郡晉分置晉康郡宋齊因之隋平陳廢晉康併入信安郡今髙要郡也唐復置康州封州十道志曰封州臨封郡土地所屬自􅁗巳上與康州同今州即漢蒼梧郡之廣信縣也梁置信郡兼置成州隋平陳廢郡改成州爲封州瀧州十道志曰瀧州開陽郡瀧數江切土地所屬自漢巳上與康州同晉分端溪置龍郷縣今州即其地南越志龍郷縣屬廣熈郡梁分廣熈置建州又分建州之􅀟頭洞立􅀟州即此是髙州十道志曰髙州髙涼郡􅁗以前土地與晉康郡同二漢屬合浦郡吴置髙涼郡晉因之梁置髙州隋平陳郡廢而髙州如故唐爲髙州南越志曰髙涼本合浦縣也吴建安十六年衡毅錢博拒歩騭於髙安峽毅投水死博與其屬亡于髙涼吕岱爲刺史博旣請降制以博爲髙涼都尉於是置郡焉義州十道志曰義州連城郡土地所屬􅁗巳上與潘州同漢置蒼梧郡今州即蒼梧郡之孟陵縣唐武徳四年江表厎定於此置南義州貞觀二年於此置義州新州十道志曰新州新興郡古越地􅁗始皇略取陸梁地置象郡今州即其地也漢爲合浦縣之臨元縣晉穆永和七年分蒼梧郡於此置新寜郡梁隋唐爲新州勤州十道志曰勤州銅陵郡􅁗屬南海郡二漢屬合浦郡隋屬信安郡唐置勤州或爲銅陵郡竇州十道志曰竇州懷徳郡禹貢楊州之分古越地漢蒼梧郡之端溪縣先管羅竇洞因爲名唐武徳五年置南扶州貞觀八年改爲竇州郡國志曰竇州悉以髙欄爲居號曰千蘭三日一市又曰特亮縣在河洞水北昔有白牛夜出光影照村村人見此牛光號爲特亮也桂州十道志曰桂州始安郡禹貢荆州之域春秋時越地七國時爲楚越之交始皇二十三年甞發逋亡人贅㛰賈人略取陸梁地是爲桂林郡焉二漢屬零陵蒼梧二郡吴分置始安郡晉孝武改爲始建齊復爲始安梁天監六年立桂州於蒼梧鬰林之境無定理處大同六年移桂州於今理隋大業三年罷州唐武徳四年復置桂州始安記曰吴越之境其人好劔輕死易生火耕水耨人食魚稻無千金之家好巫􅀑重􅁋祀十道志曰臨桂縣荔水水源多生桂桂生處不生􅄂樹昭州十道志曰昭州平樂郡􅁗桂林郡地二漢屬蒼梧郡宋屬始建國齊屬始安郡隋亦然唐武徳四年置樂州貞觀八年改爲昭州取昭潭爲名盛弘之荆州記曰平樂縣西南數十里有山間有兩目如人眼極大瞳子白黒分明􅂪州十道志曰􅂪州􅂪山郡漢武平南越置蒼梧郡今州即蒼梧之荔浦縣也隋置隋化縣唐置蒙州州有山號曰蒙山山下人皆姓蒙因爲州名冨州十道志曰冨州開江郡􅁗桂林郡地二漢屬蒼梧郡梁爲開江武城二郡地陳置静州改開江武城二郡爲逍遥郡隋平陳並廢唐又置静州貞觀八年改爲冨州因冨水爲名梧州十道志曰梧州蒼梧郡􅁗屬桂林郡二漢爲蒼梧晉以後並因之梁屬成州隋平陳改爲封州唐爲梧州漢書曰武帝元始六年開蒼梧郡禮記曰舜葬蒼梧之野潯州十道志曰潯州潯江郡􅁗屬桂林郡二漢以後並屬鬰林郡隋屬永平鬰林二郡地唐置潯州郡國志曰大賔縣漢布山縣地有糖牛與虵同穴牛􅄝􅐭俚人以皮褁手塗鹽入穴探之牛舐之出外則不得入取其角爲器一曰糖牛龔州十道志曰龔州臨江郡􅁗屬桂林郡漢平南越置蒼梧郡今州即郡之孟陵縣地也唐置龔州鬰林州十道志曰鬰林州鬰林郡􅁗爲桂林郡漢改爲鬰林郡後漢亦同梁置定州後改爲南定州隋平陳改爲尹州􅌆帝􅀄爲鬰林州唐爲鬰林州平琴州十道志曰平琴州平琴郡舊鬰林郡地唐置平琴州或爲平琴郡賔州十道志曰賔州安城郡古越地􅁗桂林郡地漢爲鬰林郡又爲鬰林郡之嶺方縣自漢迄隋並爲嶺方縣地唐貞觀五年置賔州澄州十道志曰澄州賀水郡古越地􅁗爲桂林郡漢爲鬰林郡之嶺方縣唐武德四年置澄州繡州十道志曰繡州常林郡􅁗屬桂林郡二漢屬鬰林郡晉以後因之唐平蕭銑置繡州象州十道志曰象州象郡􅁗屬桂林郡二漢爲鬰林郡吴又分置桂林郡晉宋齊因之隋平陳置象州因象山以爲名􅁗之象郡今合浦郡非此象州也栁州十道志曰栁州龍城郡􅁗漢􅁟地與象州同晉以後屬桂林郡隋屬始安郡唐平蕭銑置昆州貞觀八年改爲栁融州十道志曰融州融水郡歷代􅁟地與栁州同唐置融州邕州十道志曰邕州㓪寜郡古越地􅁗爲桂林郡漢鬱林郡之嶺方縣地晉置晉興郡于此隋爲鬱林郡之宣化縣武德四年置南晉州貞觀六年改爲邕州圖經曰人俗恡嗇澆薄内險外憃椎髻跣足尚雞卜􅆑卜貴州十道志曰貴州懷澤郡虞舜曁周並爲荒裔秦爲桂林郡自漢以下與鬱林郡同唐置貴州黨州十道志曰黨州寜仁郡􅁗桂林郡地唐置黨州南越志曰黨州隆仁縣有京觀即古征黨洞殺俘虜處撗州十道志曰撗州寧浦郡古越地􅁗象郡地漢爲合浦郡之髙涼縣地隋於此置簡州又改爲縁州唐改爲撗州田州十道志曰田州撗山郡􅁟地與㓪寧郡同唐爲田州嚴州十道志曰嚴州脩徳郡禹貢荆州之域漢武平南越即象郡地唐乾封二年置嚴州地在嚴崗之側因爲名圖經曰州門有長河水深八十丈從䍧牱流下山州方輿志曰山州龍池郡􅁟地與嚴州同唐爲山州或爲龍池郡淳州方輿志曰淳州永定縣􅁗屬桂林郡地唐武德四年置至永貞以犯憲宗廟諱改爲巒州以巒山爲名羅州十道志曰羅州招義郡禹貢楊州之地是爲南越宋元嘉三年鎭南將軍檀道濟廵撫於陵羅口築城因以名之屬髙涼郡唐武徳五年因其地復置州南越志曰招義縣昔流人營也潘州十道志曰潘州南潘郡古甌駱越地􅁗平百越爲桂林郡地漢爲合浦縣地屬合浦郡唐武徳四年置南宕州八年改爲潘州嶺表記曰潘州昔有方士潘茂於此昇仙遂以名郡容州方輿志曰容州普寜郡古越地􅁗屬象郡二漢屬合浦郡宋太始七年分合浦縣於此立南流郡齊梁陳不改隋廢唐武德四年置銅州貞觀八年改爲容州因容山爲名十道志曰􅀑門􅀜在北流縣南三十里兩石相對狀􅀂􅀜形闊三十餘歩昔馬援討林邑經此立碑石碣尚存昔時趨交趾皆由此􅀜巳南尤多瘴癘去者罕得生還故諺曰􅀑門􅀜十人去九人還郡國志曰斯地瘴氣春謂青草瘴秋謂黄􅈋瘴有瘴江水辯州十道志曰辯州陵水郡古越地􅁗象郡地二漢屬合浦郡唐置辯州郡國志曰辯州在陵羅二水之間白州十道志曰白州南昌郡古越地􅁗象郡地漢爲合浦郡唐武徳四年置南州六年改爲白州嶺表録曰州有一􅂀水出自􅀟角山合容州江呼爲緑珠江又緑珠井在􅀟角山下昔梁氏之女有容皃石季倫爲交趾採訪使以眞珠三斛買之梁氏之居舊井存焉牢州十道志曰牢州定川郡本巴蜀西南徼外夷秦屬象郡漢屬牂牁郡唐置義州改爲智州貞觀十一年改爲牢州以牢石爲名欽州十道志曰欽州寧越郡歷代土地與白州同宋齊巳來置宋壽郡梁又置安州隋平陳改爲欽州安南都護府方輿志曰安南府今理宋平縣古越地禹貢楊州之地號爲百越在周爲越裳重譯之地􅁗屬象郡漢爲交阯日南二郡界後漢因之唐爲交州又曰人俗􅄂蠻夷之風其人皆服布如單􅀍穿中央以貫其首男子耕農女子織絍兵則矛楯長刀木弓竹矢或骨爲鏃交州記曰南定縣人足骨無節身有毛卧者更扶始得起故山海經云交脛人國脚脛曲戾相交所以謂之交趾南越志曰龍編縣州之始有蛟龍編於津之間因以爲瑞而名邑武峩州方輿志曰武峩州武峩郡土地與安南府同唐置武峩州粤州方輿志曰粤州龍水郡土地與安南府同唐爲粤州或爲龍水郡芝州方輿志曰芝州忻城郡土地與安南府同唐爲芝州或爲忻城郡愛州方輿志曰愛州九眞郡􅁗象郡地漢武置九眞郡後漢亦同晉亦屬九眞郡宋齊因之梁置愛州隋爲九眞郡唐又爲愛州福禄州方輿志曰福禄州福禄郡土地與九眞郡同唐爲福禄州長州方輿志曰長州文陽郡􅁟地與九眞同唐爲長州驩州方輿志曰驩州日南郡古越裳氐國九譯所通者也秦屬象郡二漢屬九眞郡吴分置九徳郡晉宋齊因之隋置驩州後爲日南郡唐爲驩州郡國志曰龐山洞人去其兩齒爲飾刻􅎍作花文中山立市十日一㑹鑄銅爲器大如盤名旁旁以爲財市峯州方輿志曰峯州承化郡古文郎國有文郎水亦陸梁地􅁗屬象郡二漢屬交趾郡吴分置新興郡晉改爲新昌陳置興州隋平陳改爲峯州焬帝初廢唐復置峯州林邑記曰蒼梧以南有文郎野人居無室宅依樹止宿食生􅁏採香爲業與人交易􅀂上皇之人陸州方輿志曰陸州玉山郡􅁗象郡地漢以來屬交趾郡梁分置黄州及寧海郡隋平陳郡廢改黄州爲玉州煬帝􅀄州廢唐復置玉州上元二年改爲陸州州有陸水廉州方輿志曰廉州合浦郡􅁗象郡地漢置合浦郡後漢同吴改爲珠官晉又爲合浦郡宋因之兼置臨瘴郡及越州齊又因之隋改爲禄州㝷又改爲合州置廉州後漢書曰孟甞字伯周㑹稽上虞人爲合浦太守先時太守多貪珠遂徙向交趾甞到革理前弊珠遂還稱爲神明桓帝徴之巖州方輿志曰巖州安樂郡土地與合浦郡同唐爲巖州或爲安樂郡雷州方輿志曰雷州海康郡秦象郡地二漢以後並屬合浦郡梁分置合州大同末爲南合州隋􅌆帝􅀄廢唐爲雷州投荒録云雷州南濵大海多雷雷之聲近在􅉉宇之上雷州之北髙州之南數郷亦多雷雷聲似在㝷常之外俗俟雷時具酒肴設奠畏雷法甚嚴謹有以􅇾􅁏與雞􅁏食者霹靂即至禺州十道志曰禺州温水郡古百越地㜈女之分野􅁗屬象郡本宕昌之邊邑唐置宕州又改爲禺州以南方畨禺之地因名州湯州方輿志曰湯州湯泉縣􅁗屬象郡唐置湯州或爲湯泉州瀼州十道志曰瀼州臨潭郡禹貢荆州之分春秋屬楚在鬰林之西南交趾之北隋大將軍劉方始開此路爲鎮守㝷又不通唐貞觀二年清平公李弘節遣欽州首領􅇞師宗招慰開拓㝷劉方舊路得逹交州爲州在瀼水之東故以爲名瀼音而章反籠州十道志曰籠州扶南郡古越地在南越之西界唐貞觀十二年大使清平公李弘節招降獠置籠州以籠洞爲名環州十道志曰環州正平郡禹貢荆州之分州􅈻桂州貞觀二年李弘節招尉欵附環落洞故以名州州在遊盧水南整水北古州方輿志曰古州樂古郡􅁟地同臨潭郡唐置古州或爲樂古郡崖州方輿志曰崖州朱崖郡郡地海中之洲也洲方千里與今海康郡之徐聞縣對自徐聞徑度便風揚帆一日一夕即至梁置崖州漢書曰武帝元鼎六年開南海地置朱崖儋耳二郡元帝罷朱崖郡以其阻絶數反故罷之郡國志曰崖州婦人着緦緶以􅁟爲釡器用瓠瓢無水人飲唯石汁又有椒以安石榴花着瓮中經旬即成酒其味香美仍醉人交州記曰朱崖在大海中南極之外儋州十道志曰儋州昌化郡􅁟地所屬與朱崖同漢元鼎六年定越地置儋耳郡唐武德四年置儋州漢書張晏注曰儋耳其俗鏤其頰皮上連耳匡分爲數支狀似雞膓因名焉山海經海内南經曰有離耳郭景純注曰鎪其耳分令下垂爲飾即儋耳也振州方輿志曰振州延德郡􅁟地與朱崖郡同隋置臨振郡唐置振州瓊州方輿志曰瓊州瓊山郡土地與朱崖郡同唐貞觀六年割崖州置瓊州萬安州方輿志曰萬安州萬安郡􅁟地與朱崖郡同唐置萬安州或爲萬安郡太平御覽卷第一百七十二
