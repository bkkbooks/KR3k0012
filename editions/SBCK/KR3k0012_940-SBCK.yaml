front:
  text: 太平御覽卷第九百四十
  hash: sha256:d5d2c3590479988479a599ff01e7cc8c4ce0cfa79205f7c8d70ef032050d6fd1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_940-1a}
body:
  text: 鱗介部十二瓊魚横公魚髮魚蒱魚印魚黃魚􅀉魚君魚琵琶魚䟽齒魚班魚黄雀魚鷰魚鳶魚赤魚玄魚邵魚鱬鰗魚井魚鏡魚含光魚􅬻魚􅰛魚吹沙魚伏念魚金石魚婢屣魚奴屩魚魚銅哾魚陶魚石班魚戴星魚􅲭魚魿魚織杼魚䱦鯺魚土奴魚新婦魚海稀魚鯤炮魚鈆刀魚蝦蟇魚黿魚䑕魚弓魚􅵧􅲮魚􅁰魚䱽魚饋尾魚􅁟拌魚髙魚蘆䱐魚鼉風魚鯤魚海鯤魚鮞魚細赤魚鰥魚真魚雞子魚竹魚乳穴魚􅸓魚瓊魚漢武内傳曰西王母曰仙人上藥有流淵瓊魚横公魚神異經曰北方荒外有石湖其中有横公魚長七八尺形􅃺如鱧而目赤晝則在湖中夜化爲人刺之不入煑之不死以烏梅二七煑之乃熟食之可以止邪病玄黄經曰横公魚不可殺唯加烏梅其氣乃滅髮魚魏武四時食制曰髪魚帶髪如婦人白肥無鱗出滇池蒲魚魏武四時食制曰蒲魚其鱗如粥出郫縣印魚臨海異物志曰印魚無鱗形似䱜形音錯額上四方如印有文章諸大魚應死者印魚先封之郭延之述征記曰城陽縣􅀯六里堯母慶都墓廟前一池魚額間有印文名頰魚非告祠者捕不可得左思吴都賦曰印􅀛鱕音藩䱜黄魚吴書曰薛綜上䟽交州刺史朱符多以郷人分作長史強賦民黄魚一枚稻一斛劉欣期交州記曰武寜縣秋九月黄魚上化作鶉鳥南方草物􅃺曰短細黃魚九月中因秋風而變成鶉上􅇛吏捕取炙食滋味肥羙南中八郡志曰江岀黄魚魚形頗似鱣骨如葱可食郭義恭廣志曰揵爲郡􅈎道縣出臑骨黃魚􅀉魚沈懐逺􅀯越志曰􅀉魚長三寸似白魚常附海舩以濟洪波一曰􅀉載魚臨海水􅁟記曰􅀉度魚長三寸似白魚君魚沈懷逺南越志曰君魚長三寸背上骨如筆管大者似矛逢諸細魚及黿腹皆斷之琵琶魚臨海異物志曰琵琶魚無鱗形如琵琶沈懷逺南越志曰琵琶魚無鱗長二尺形似琵琶故因以爲名任昉述異記曰海魚千歳爲劒魚樂魚一名琵琶魚形似琵琶而喜鳴因以爲名左思吴都賦曰鮫鯔琵琶曹毗掦都賦曰魚則琵琶烏賊䟽齒魚魏武四時食制曰䟽齒魚味如猪魚出東海潘岳滄海賦曰比目䟽齒班魚魏武四時食制曰班魚頭中有石如珠出北郭義恭廣志曰班魚頭中有玉石如珠璣黄雀魚臨海異物志曰黄雀魚常以八月化爲黃雀到十月入海爲魚風􅁟記曰六月東南長風俗名黃雀風時海魚化爲黄雀因爲名也鷰魚臨海異物志曰鷰魚長五寸隂􅀨起飛髙丈餘鳶魚臨海異物志曰鳶魚􅃺如鳶唯無尾足隂雨日亦飛髙數丈赤魚魚豢魏略曰文帝欲受禪赤魚逰於露鑊玄魚王子年拾遺録曰夏鮌理水無功沉於羽川化爲玄魚大千尺後遂死横於河海之間後世聖人以玄魚爲神化之物以玄字合於魚字爲鮌字邵魚臨海水􅁟記曰邵魚狀如鳶魚鱬而朱切鰗魚臨海水􅁟記曰鱬鰗魚狀如鳶魚形井魚臨海異物志曰井魚頭有兩角鏡魚臨海異物志曰鏡魚如鏡形體薄少􅁏含光魚臨海異物志曰含光魚一名臈魚黃而羙故謂之臈有光照燭沈懐逺南越志曰含光謂臈魚正黄而羙故謂爲臈魚夜則有光嶺表録異曰黃臈魚即江湖之横魚頭觜長而鱗背金色南人臠爲炙雖羙而毒或煎􅘤或乾夜即有光如燭􅬻魚臨海異物志曰􅬻魚如指長七八寸但有脊骨好作羹大者如竹竿曝作燭極有光明􅰛魚臨海異物志曰􅰛魚三月生溪中裁長一寸至十月中東還死於海香氣聞於水上到時月輙復更生永嘉地記曰石堂水口多􅰛魚吹沙魚臨海異物志曰吹沙長三寸背上有刺犯之螫人伏念魚臨海水土記曰伏念魚似吹沙魚金石魚南越記曰金石魚形貟如七寸柈婢屣魚臨海異物志曰婢屣魚口近腹下形似婦人屣奴屩魚臨海水土記曰奴屩魚長一尺如屩形魚音沃臨海水土記曰魚似蒲魚長三尺銅哾魚臨海異物志曰銅哾魚長五寸似鯈魚陶魚臨海水土記曰陶魚長三尺似鱦音䋲魚石班魚臨海水土記曰石班魚媱蟲六蟲爲一又曰石班魚媱蟲蝘蝥也折魚長尺餘其折如虎文俗言蝘蝥於水邊呼之因走上岸合牝其子不可食也戴星魚臨海水土記曰戴星魚狀如鳶魚背上有兩白璫如指大因名之云􅲭魚沈懐逺南越志曰􅲭魚似􅱈音畢尾上有刺如欓樹刺也魿魚音零臨海水土記曰魿魚似䰸魚異物志曰南方魚多不肥美唯魿魚爲上大者長二尺作膾炙尤香而美嶺表録異曰魿魚如白魚而身稍短尾不偃清逺江多此魚盖不産於海也廣人得之多爲膾不腥而美諸魚無以過也織柕魚臨海水土記曰織杼魚狀似􅰛魚味美於諸魚沈懷逺南越志曰織杼魚如真魚背上正青䱦鯺魚臨海水土記曰䱦鯺形似䱦魚戯於重川靡有定所土奴魚臨海水土記曰土奴魚頭如虎有刺螫人新婦魚臨海水土記曰新婦魚似䱦魚長一丈海狶魚臨海水土記曰海狶魚豕頭身長九尺郭璞江賦曰魚則江豚海狶曹毗楊都賦曰海狶鯨鱘鯤鮑魚臨海水土記曰鯤鮑魚似海印魚鈆刀魚臨海水土記曰鈆刀魚似鈆刀魚名似折魚蝦蟇魚臨海水土記曰蝦蟇魚色如䳒魚頭似蝦蟇尾又似鳶黿魚音元臨海水土記曰黿魚長五寸䑕魚沈懷逺南越志曰䑕魚頭如䑕臨海異物記曰䑕魚長七寸頭如䑕弓魚臨海水土記曰弓魚長三寸似鯢魚􅵧􅲮魚臨海水土記曰􅵧􅲮魚長一尺􅁰魚臨海水土記曰􅁰魚長三尺似􅛈䱽魚音倉臨海水土記曰䱽魚兩肋下有大􅁏如炙臠大嶺表録異曰䱽魚形似鯿魚而腔上突起連背而圎身􅁏甚厚􅁏白如只有一脊骨治之以薑葱缹音􅇲也之粳米其骨亦軟飱者無所棄鄙俚謂之狗磕睡魚以其犬在盤下難伺其骨故云狗磕睡魚也饋尾魚南越記曰饋尾魚有毒一名鼈魚土拌魚臨海水土記曰土拌魚長七寸白黒班文髙魚異物志曰髙魚與鱒相似與蜥蜴於水上相合常以三二月中有雌而無雄食其胎殺人蘆䱐音孚魚異物志曰蘆䱐似鰌蝥而有細文多膏肥美大如蘆管夲出地中隨泉浮岀俗名蘆䱐沈懷逺南越志曰蘆䱐魚生山曲之間穴地爲窟泉源踊則此魚出今盧陵以南至于南州有焉俗以爲醬鼉風魚異物志曰冬天此魚數千萬頭共處大窟中藏上有白氣或在鼉穴中皮黒如􅃮能潜知數里中空木所在因風而入空木化爲蝙蝠其􅁏甚美鯤魚毛詩鷄鳴曰弊笱在梁其魚魴鯤爾雅曰鯤魚子凡魚之子緫名鯤又曰鱦小魚音䋲又孕今江東呼魚子未成者爲䋲也海鯤魚王子年拾遺録曰黒河北極也其水濃黒不流上有黒雲生焉有黒鯤千尺􅃺如鯨常飛逰徃於南海莊子曰北溟有魚其名爲鯤其大不知幾千里江逌詩曰巨鼇戴蓬萊大鯤運天池倐忽雲􅀨興俯仰三洲移孫放詠莊子詩曰巨細同一馬物化無常歸脩鯤解長鱗鵬起片雲飛撫翼摶積風仰凌垂天翬􅀽宏北征賦曰魚託水而成鯤木在山而有松鮞魚音而吕氏春秋曰魚之美者東海之鮞張衡西京賦曰巢鯤鮞鯤魚子也鮞細魚􅀋也細赤魚劉義慶幽􅁳録曰始興雲水源有湯泉毎至霜雪其上蒸氣高數十丈泉中常有細赤魚出遊莫有獲者鰥魚毛詩曰弊笱在梁其魚魴鰥鰥夫魚也孔叢曰衛人釣於河得鰥其大盈車曰吾下一魴之餌鰥過而不視又以豚之半則呑矣子思曰鰥貪以餌死士貪以禄死真魚沈懐逺南越志曰真魚如織紵魚臨海水土記曰魚俗謂之猶魚鷄子魚嶺表録異曰鷄子魚口有觜如鷂􅁏翅無鱗尾尖而長有風濤即乗風飛於海上舩稍􅀋鮐鯣魚竹魚嶺表録異曰竹魚産江溪間形如鱧魚大而少骨青黒色鱗下間以朱􅀧鬛可翫或烹以爲羮臛而羙乳穴魚嶺表録異曰全義嶺之西南有盤龍山山有乳洞斜貫一溪號爲靈水溪今桂州靈川縣也溪内有魚皆脩尾四足丹其腹游泳自􅀂漁人不敢捕之爾雅云鯢似鮉四足聲如小兒今啇州山溪内亦有此魚謂之納魚􅸓魚臨海水􅁟記曰􅸓魚似鱦魚長二尺太平御覽卷第九百四十
