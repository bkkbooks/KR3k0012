front:
  text: 太平御覽卷第二百八十二
  hash: sha256:1331be8c194897a3600fb140b6ef3458f7e148a8cd04d7bae45ff0aeaaafb5c6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_282-1a}
body:
  text: 兵部十三機略一孫子曰凢戰者以正合以竒勝正者當敵竒兵從旁擊其不備故善竒者無窮如天地不竭如江海終而復始日月是也死而更生四時是也故聲不過五五聲之變不可勝聞色不過五五色之變不可勝觀味不過五五味之變不可勝嘗以喻竒正無窮也戰數不過竒正竒正之變不可勝窮也竒正相生如循環之無端孰能窮之哉故水之疾至於漂石者􅀔也鷙鳥之擊至於毀折者節也發起討擊敵之是以善戰者其􅀔險險猶疾也其節短短近勢如彍弩節如發機在疾不遠發則中也紛紛紜紜􅃲亂而不可亂旌旗亂也示敵者若亂以金鼓齊之渾渾沌沌形圎而不可敗也車騎轉形圓者出入有道齊整左傳曰齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而䟽陣之使乘車者左實右僞以斾先輿曳柴而從之以揚塵齊侯見之畏其衆也乃脫歸齊師夜遁師曠告晉侯曰鳥烏之聲樂齊師其遁邢伯告中行伯曰有班馬之聲齊師其遁邢伯楚中行伯也又曰呉從楚師及清發將擊之夫槩謂王曰困獸猶􅃲况人乎若知不免而致死必敗我使先濟者知免後者慕之蔑有鬬心半濟而後可擊也從之又敗之楚人爲食呉人及之奔食而從之又曰鄭人侵衛牧以報東門之役衛人以燕師伐鄭鄭將􅀕足原繁泄駕以三軍軍其前使曼伯子元潜軍軍其後燕人畏鄭三軍而不虞制人鄭二公子以制人敗燕師于北制君子曰不備不虞不可以師又曰宋襄公及楚人戰于泓宋人旣成列楚人未旣齊未盡度弘水也司馬子魚曰彼衆我寡及其未旣濟也請擊之公曰不可旣濟而未成列又以告公曰未可旣陣而後擊之宋師敗績公傷股門官殱焉國人皆咎公公曰君子不重傷不擒二毛二毛頭白有二色者也古之爲軍也不以阻隘也不因阻隘以求勝寡人雖亡國之餘宋啇紂之後也不鼓不成列子魚曰君未知戰勍敵之人隘而不成列天賛我也勍强也言楚在險隘不得陳列天所以佐宋也阻而鼔之不亦可乎猶有懼焉雖因阻擊之猶恐不勝也且今之勍者皆吾敵也雖及胡耇􅀗則取之何有於二毛今之勍者謂與吾竸者也胡耇元老之稱也耇音苟明恥教戰求殺敵也明設刑戮以恥不果也傷未及死如何勿重言尚能害已也􅀂愛重傷則如勿傷愛其二毛則如服焉言苟不欲傷殺敵人則本可不湏鬬也三軍以利用也爲利興也金鼓以聲氣也鼓以佐士衆之聲􅂔也利而用之阻隘可也聲盛致志鼔儳可也儳巖未整陣也儳音䜛通典曰宋公違之而敗也又曰越伐呉呉子禦于笠澤夾水而陣越爲左右勾卒勾卒伍伍相著别爲左右屯也勾音鈎使夜或左或右鼔譟而進呉師分以禦之越以三軍潜渉當呉中軍而鼓之呉師大亂遂敗之左右勾卒爲聲勢以分呉而三軍精卒并力擊其中軍故得勝呉越春秋越伐呉起軍於江南乃分兵爲左右軍將有私卒六千人爲中軍日昏乃令左軍銜枚泝江五里右軍銜枝㳂江五里夜半鳴鼓呉師聞之大駭曰越人來攻我乎因分其軍爲二陣拒越越王乃以其中軍銜枚潜涉不鼓不譟以襲攻之呉師大敗此與左氏傳事同小異故附于此又曰呉子闔廬問於伍貟曰􅀄而言伐楚余知其可也而恐其使余徃也又惡人之有余之功也今余將自有之矣伐楚何如對曰楚執政衆而乖莫適任患適音的􅀂爲三師以􅀠焉􅀠猶勞也一師至彼必皆出彼出則歸彼歸則出楚必道弊罷弊於道亟􅀠以罷之亟數也音器􅀠音羊至切多方以誤之旣罷音疲而後以三軍繼之必大克之闔廬從之楚於是乎始病終於呉師入郢郢楚都也又曰呉伐越越子勾踐禦之陣于擕李擕將遂切勾踐患呉之整也使死士再擒焉不動使敢死之士往輙爲呉師所擒欲使呉師亂取之而呉不動使罪人三行屬劒於頸以劒注頸行户郎切而辭曰二君有理理軍旅也臣于旗鼓犯軍令也不敏於君之行前不敢逃刑將歸死遂自剄也師屬之目越子因而伐之大敗呉師又曰楚子圍宋晉侯將救之大夫先􅎮曰報施救患取威定霸於是乎在矣狐偃曰楚始得曹而新婚於衛若伐曹衛楚必救之則宋免矣從之而斛又曰晉楚戰于城濮楚將子玉從晉師晉師陣于莘北胥臣以下軍之佐當陳蔡子玉以若敖之六卒將中軍曰今日必無晉矣􅃲冝申將左􅃲勃將右晉禆將胥臣蒙馬以虎皮先犯陳蔡陳蔡奔楚右師潰陳蔡屬楚右師狐毛設二斾而退之斾大斾也又建一斾而退使若大將稍却也欒枝使輿曳柴而僞遁曳柴起塵詐爲衆走楚師馳之原􅎮郄溱以中軍公族横擊之公族公所師之軍狐偃以上軍夾攻楚左師潰楚師敗績子玉収其卒而止故不敗晉師三日館􅂖館舎也食楚軍穀三日也又曰楚將􅃲廉帥師及巴師圍鄾音憂鄧養甥􅡭甥音男帥師救鄾三逐巴師不克􅃲廉衡陣其師於巴師之中以戰而北衡横也分巴師爲二部鬭廉横陣於其間以與鄧師戰而僞北北走鄧人逐之背巴師而夾攻之楚師僞走鄧師逐之背巴師巴師攻之楚師自前與戰也鄧師大敗鄾人宵潰宵夜又曰晉師伐秦秦人毒涇上流師人多死又曰楚師伐呉鍼音針尹固與王同舟王使執燧象以奔呉師燒火燧繫象尾使赴呉師驚之鍼軄深切又曰時邾人城翼翼邾邑也還將自離姑離姑邾邑也從離姑則道經魯之武城也大夫公孫鉏曰魯將禦我欲自武城還循山而南至武城而還依山南行不欲過武城鉏助魚切大夫徐鉏丘弱茅地二子邾大夫曰道下遇􅀨而將不出是不歸也謂此道下山濕遂自離姑遂過武城武城人塞其前以兵塞其前道斷其後之木而弗殊邾師過之乃推而蹷之遂取邾師推士追切蹷其月切又曰晋將陽處父侵蔡父音甫楚將子上救之與晉師夾泜而軍泜直利切處父患之使謂子上曰吾聞之文不犯順武不違敵子若欲戰則吾退舎子濟而陣欲避楚使度成陣而後戰遲速唯命不然紓我紓緩老師費財亦無益也乃駕以待子上欲渉大孫伯曰不可晉人無信半渉而薄我悔敗何及不如紓之乃退舎楚退欲使晉度陽子宣言曰楚師遁矣遂歸楚師亦歸太子啇臣譛子上曰受晉賂而避之楚之恥也罪莫大焉王殺子上戰國䇿曰􅁗伐趙趙以趙奢之子代廉頗爲將拒􅁗將王齕於長平齕音恨勿切􅁗王聞之乃隂使武安君白起爲上將軍而王齕爲禆將軍令軍中有敢泄武安君者斬馬服子至則岀兵擊􅁗軍􅁗軍佯敗而走張二竒兵以劫之趙軍逐勝追造􅁗壁􅁗壁堅距不得入而􅁗竒兵貳萬五千人絶趙軍又一軍五千騎絶趙壁間趙軍分而爲二糧道絶而􅁗出輕兵擊之趙戰不利因築壁堅守以待救至􅁗王聞趙食道絶王自之河内賜民爵各一級發年十五以上悉詣長平遮絶趙救及糧食至九月趙卒不得食四十六日皆内隂相殺食來攻􅁗壘欲出爲四隊四五復之不能出其時馬服子卒自相搏戰􅁗軍射殺之軍大敗卒二十餘萬人降皆坑之又曰燕軍大破齊國齊將田單守即墨知士卒可用乃身操板挿與士卒分功妻妾編行伍之間盡散飯食饗士令甲卒皆伏使老弱女子乗城遣約降於燕燕軍皆呼萬歳田單又牧人金得千鎰令即墨冨豪遺燕將書曰即墨即降願無掠虜吾族家妻妾令安堵燕將大喜許之燕軍由此益懈田單出軍擊大敗之又曰燕師伐齊巳下七十餘城圍即墨未下齊將田單乃收城中得千餘牛爲縫繒衣􅀞以五綵龍文束兵刃於其中角而灌脂束葦於尾燒其端鑿城數十穴夜縱牛壯士五千人隨其後牛尾熱怒而奔燕軍燕軍夜大驚牛尾炬火光明炫燿燕軍視之皆龍文所觸盡死傷五千人因銜枚擊之而城中鼓譟從之老弱者皆擊銅器爲聲聲動天地燕軍大駭敗走而齊七十餘城皆復爲齊又曰燕將􅀐刼攻齊即墨齊將田單拒守乃宣言曰吾唯懼燕軍之劓所得齊卒置之前行與我戰即墨敗矣燕人聞之如其言城中人見齊降者盡劓皆怒堅守唯恐見得田單又縱反間曰吾懼燕人掘吾城外冢墓戮先人可爲寒心燕軍盡掘壟墓燒死人即墨人從城上遥見皆涕泣其欲出戰怒皆十倍因大敗燕又曰魏趙相攻齊將田忌引兵救趙孫臏曰夫解雜亂紛糺者不控捲丘貟切救􅃲者不搏撠音㦸批亢擣虚形格􅀔禁則自爲解耳今魏趙相攻輕兵銳卒必竭於外老弱罷於内君不􅀂引兵疾走大梁據其街路衝其方虚彼必釋趙而自収弊於魏也田忌從之直走大梁魏師遂退又曰齊孫臏謂齊王曰凢伐國之道攻心爲上務先伏其心今􅁗之所恃爲心者燕趙也當收燕趙之權今􅀃燕趙之君勿虚言空辭必將以實利以回其心所謂攻其心者也史記曰秦伐韓軍於閼與趙王召趙奢而問可救不對曰道逺險狹譬兩䑕􅃲於穴中將勇者勝王乃命救之秦軍武安西鼔譟勒兵武安屋瓦盡震趙奢堅壁留二十八日不行秦間來入奢善食而遣之間還報曰去國三十里而不行秦將大喜秦間去趙奢卷甲而趨之軍士許歴曰秦人不意趙師至此其來氣盛將軍必厚集陣以待之先據北山上者勝奢許諾即以万人趨之秦兵後至爭山不得上奢縱兵大破秦軍解閼與之圍又曰李廣軍敗爲匈奴生得佯死騰上胡兒善馬抱兒南馳以故得脫太平御覽卷第二百八十二
