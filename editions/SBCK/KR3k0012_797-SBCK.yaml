front:
  text: 太平御覽卷第七百九十七
  hash: sha256:28892c4ff9ab8375329230a509fe3b92cb29130fe6739a755aa933945d147388
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_797-1a}
body:
  text: 四夷部十八西戎六蒲􅀋小宛精絶渠勒依耐無雷難兠􅀌胡山國烏貪卑陸郁立師却國烏弋山離拘弥德􅀂髙附東離移支者舌拔豆烏利者至抜朱居權烏摩伽色尼薄知牟知阿弗太汗呼似宻諾色波羅畢伽至伽不單伽倍折薛莫孫鉗敦弗敵沙臨兒貲虜盤越鹽長竒恒石尖扶伏可蘭鵠國無不逹無継民録民無首民納民拘夷波羅秦斯䑕王摩訶頼波麗越雞城和訶條播􅀺曰舎衛維耶離迦維羅越郍訶維碓國拘郍含波羅柰拘宋婆􅄢宻拘私郍竭摩竭提蒲􅀋漢書曰蒲􅀋王治天山西䟽榆谷去長安八千三百六十餘里後漢書曰蒲􅀋國王居天山西䟽榆谷廬帳而居逐水草頗知田作有牛馬駱駞羊畜能作弓矢國出名馬蒲􅀋本大國也前西域屬匈奴時蒲􅀋王得罪單于單于怒徙蒲國人民六千餘口内之匈奴右部阿惡地号曰阿惡國􅀄徙居時甚貧羸不能者逃亡在山谷間故得留爲蒲􅀋國云小宛漢書曰小宛國王治扞零城去長安七千二百一十里東與婼􅆧接精絶漢書曰精絶城國王治精絶城去長安八千八百二十里地阨狹西通扞弥四百六十里渠勒漢書曰渠勒國王治鞬都城去長安九千九百五十里東與戎盧接依耐漢書曰依耐國王治去長安萬一百五十里北至䟽勒六百五十里少􅂖􅀉田莎車䟽勒無雷漢書曰無雷國王治無雷城去長安九千九百五十里衣服􅀋烏孫難兠漢書曰難兠國王治難兠城去長安一萬五千一百五十里西與大月氐接種五􅂖有金銀銅䥫作兵􅀌胡漢書曰􅀌胡國王治車栁谷長安八千餘里山國漢書曰山國王治去長安七千一百七十里出鐵民山居􅀉田糴􅂖於焉􅂄烏貪漢書曰烏貪訾離國王治于婁谷去長安萬三百三十里卑陸漢書曰卑陸國王治天山乾當谷去長安八千六百八十里郁立師漢書曰郁立師國王治内咄谷去長安八千八百三十里却國漢書曰却國王治天山東丹渠谷去長安八千五百七十里烏弋山離漢書曰烏弋山離國王去長安萬二千二百里不属都護烏弋地暑熱其草木畜産五􅂖菓菜飲食宫室市列錢貨兵器金珠之屬與􅄢賔同有桃枝桃枝似鹿或名天禄師子犀牛俗重妄殺錢文爲人頭幕爲􅀐馬拘弥後漢書曰拘弥王治寧弥城去洛陽萬二千八十里靈帝熹平四年于闐王安國攻寧弥殺其王死者甚衆戊巳校尉西域長史各發兵輔立寧弥侍子定興爲王德􅀂後漢書曰德􅀂國王東去洛陽一萬二千一百五十里與子合相接其俗皆同髙附後漢書曰髙附國在大月氐西南其俗似天笁而弱易服善賈販内冨於財所属無常天笁􅄢賔安息三國強則得之弱則失之東籬後漢書曰東離國王治沙竒城在天笁東南三千餘里其地暑熱風氣物􅀋與天竺同有城十數其人民男女皆長大可八尺乗象往來隣國有㓂乗象以戰移支後漢書曰移支國王居蒲􅀋地其民勇猛敢戰以㓂鈔爲事皆􅀍髮隨畜逐水草不田作者舌後魏書曰者舌國故康居國也在破洛郍西北去代一萬五千四百五十里大武延平三年遣使朝貢㧞豆後漢書曰㧞豆國去代五萬一千里國中出金銀雜寳白象水牛􅏚牛蒲桃五菓土冝五􅂖烏利後魏書曰烏利國去代二萬五百里國中出金玉良馬白疊土冝五􅂖者至拔後魏書曰者至㧞國都城在踈勒西去代一萬一千六百二十里其國東有藩賀郍山出美鐵師子等朱居後魏書曰朱居國在于闐西其民山居有麦多林果咸事佛與于闐相􅀋役屬嚈噠權烏摩後魏略曰權烏摩國故烏耗國也其王治烏耗城西接悉居半國西南去代一萬二千九百七十里伽色尼後魏書曰伽色尼國治伽色城在万斤􅀯去代一萬二千九百里出赤鹽多五菓薄知後魏書曰薄知國治城在伽色尼南去代一萬三千三百二十里牟知後漢書曰牟知國都牟知城在忸宻西南去代二萬二千九百二十里土平禽獸草木􅀋中國阿弗太汗後漢書曰阿弗太汗國治阿弗太汗城在忸宻西去代二萬三千七百二十里土平多五菓呼似宻後魏書曰呼似宻國治呼似宻城在阿弗太汗西去代二萬七百里土平出金銀琥珀有師子多五菓諾色波羅後魏書曰諾色波羅國治諾色波羅城在忸宻􅀯去代二萬三千四百二十八里土平冝稻麥多五菓卑伽至後魏書曰卑伽至國治卑伽至城東接忸宻國去代二萬三千七百二十八里土平少少田殖取稻麦於隣國有五菓伽不單後魏書曰伽不單國治伽不單城在悉万斤西北去代一萬二千七百八十里土冝稻麥有五菓伽倍後魏書曰伽倍國故休宻翎侯所治和墨城也在莎車西去代萬三千里民居山谷間折薛莫孫後魏書曰折薛莫孫國故􅀟靡翎侯所治􅀟靡城也在伽倍西去代一萬三千五百里居山谷間鉗敦後魏書曰鉗敦國古之貴霜翎侯所治護藻城也在折薛莫孫西去代一萬三千五百六十里居山谷之間弗敵沙後魏書曰弗敵沙國古盻頓翎侯所治薄芳城也在鉗敦西去代一萬三千六百里居山谷間臨兒魏略曰臨兒國浮屠經云其國王生浮屠太子也父曰屑頭耶母曰莫耶浮屠身服黄色髮青乳有青毛冬青始莫耶夢白象而孕及生從母右脅出墮地能行七歩漢哀帝元壽元年慱士景庸從月氐王使伊存口授浮屠經其所載與老子經相出入蓋以老子西出􅀜教胡爲浮屠也貲虜魏略曰貲虜本匈奴之奴也匈奴名奴婢爲貲始建武時匈奴衰分其奴婢亡匿在金城武威酒泉此黒水東畜牧逐水草抄盗凉州不與東部鮮卑同也其種非一有大胡丁零羗雜處並本亡奴婢也盤越魏書曰盤越國一名漢越王在天竺東南數千里與益部相近其人小大與中國人同鹽長山海經曰西海中有鹽長國其人烏首亦名鳥民竒􅁪括地圖曰竒􅁪民善爲機巧設百禽爲車飛從風逺行湯時西風多竒􅁪車至於豫州湯破其車十年西風倒乃令復作車遣歸去玉門四萬里石尖􅀇中記曰玉門之西南羗之東有一國五六百户無他事役國中有山山上有祠廟國人每歳出石尖數千枚輸于廟中名霹靂尖以給霹靂所用從春雷出而尖日减至秋尖盡扶伏􅀇中記曰扶伏民者黄帝軒轅之臣曰茄豊有罪刑而放之扶伏而去後是爲扶伏民去玉門􅀜二萬五千里可蘭沙州記曰大白蘭西北千二百里有可蘭虜風俗卑陋從開闢後口不知􅂖味目不識五色耳不聞六律五聲是四夷中不臧者土無所出直大飬群畜而巳戸落萬餘然其人頑弱不􅃲戰忽見異人舉國便走鵠國神異經曰西海之中有鵠國男女皆長七寸爲人自然有禮好經論跪拜其人歳壽三百行如飛日行千里百物不敢犯之唯畏海鵠鵠遇吞之亦壽三百歳人在鵠腹中不死而鵠一舉千里無不達神異經曰西南大荒中有人烏長一丈腹圍九尺􅀛虵戴朱烏左手慿青龍右手慿白虎知河海􅂛斛識山石多少知鳥獸言語知百􅂖可食識草木鹹苦名曰聖一名哲一名仙一名通一名無不逹凢人見拜者令人神知無継民外國圖曰無継民穴居食土無夫婦死則埋之心不朽百年復生去玉門四萬六千里録民外國圖曰録民穴居食土無夫婦死則埋之肺不朽百二十年復生去玉門萬一千里無首民外國圖曰無首民乃與帝爭神帝斬其首勑之此野以乳爲目臍爲口去玉門三萬里納民外國圖曰納民陛居食土無夫婦死埋之其肝不朽八年復生去玉門五萬里拘夷釋道安西域志曰拘夷國北去城數百里山上有石駱駞溺水滴下以金銅鐡及木器手掌承之皆漏唯瓢瓠不漏服之令人身臭毛皮盡脫得止其國掌有婆羅門守視波羅秦斯釋道安西域志曰波羅秦斯國佛轉法輪調逹入地獄土䧟處皆在其國䑕王釋道安西域志曰于闐道中有䑕王國大者如㺃小者如菟着金袈裟沙門過不禮白衣不禮輒害人摩訶頼釋道安西域志曰摩訶頼國又南得訶頼國有阿耨逹山王舎城在耨逹山東南角竹園精舎在城西佛六年􅀂行貝多樹去城五十里波麗越釋道安西域志曰羅衛國東西四百里至波麗越國波麗越國即佛外祖國也鷄城釋道安西域志曰胡國北有鷄城北有人皆冠象鷄也和訶條支僧載外國事曰和訶條國在大海中地方二萬里大山名三漫屈有石井井中生千葉白蓮花數種井邊石上有四佛足迹毎月六齋日弥勒菩薩常以諸天神禮佛迹畢便飛去國王長者常作金樹銀花銀樹金花以供奉佛播􅀺曰支僧載外國事曰播􅀺曰國者昔是小國耳今是外國之大都流沙之外悉稱臣妾􅃕衛支僧載外國事曰舎衛國今無復王盡屬播􅀺曰國王遣小兒注國人不奉佛法維耶離支僧載外國事曰維耶離國去合衛五十由旬者晉言三十里維摩詰家在城内國人不復奉佛悉事水火餘外道也迦維羅越支僧載外國事曰迦維羅越國令今無復王也國人亦屬播􅀺曰國今尚精進昔太子生時有二龍一吐水一吐火一冷一暖今有二池尚一冷一煖郍訶維支僧載外國事曰郍訶維國土豐樂多民物在迦維越南相去三十里碓國支僧載外國事曰迦葉佛生碓國今無復此國故處在舎衛國西相去三十里拘郍舎支僧載外國事曰拘郍舍國牟尼佛所生也亦名拘郍舎在迦維羅越西相去復三十里波羅奈國支僧載外國事曰弥勒佛當生波羅奈國是屈陁羅經所說在迦羅越南拘宋婆支僧載外國事曰拘宋婆國今見過去佛四所住處四屋迦葉佛住中教化四十年釋迦文佛住五年二佛不說􅄢宻支僧載外國事曰􅄢宻小國耳在舎衛之西國王民人悉奉佛土地寒羅漢道人及沙門到冬月日未中前飲少酒過中後不復飲酒食果國屬大秦拘私郍竭支僧載外國事曰佛在拘私郍竭國佛欲入􅄺槃時自然有寳床從地出有八萬四千國王爭將佛歸神妙天人曰佛應就此士郍竭王乃作金棺枬檀車送佛䘮積薪不燒自燃王將舎利歸宫八萬四千國興兵爭舎利婆羅門分之乃用金外量舎利得八斛四㪷諸國各得少許還國各立浮屠摩竭提支僧載外國事曰摩竭提國在迦維羅城之南相去三十里由旬有貝多樹佛在此樹下坐六年卷終
