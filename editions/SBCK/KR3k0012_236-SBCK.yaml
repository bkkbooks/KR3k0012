body:
  text: 職官部三十四國子􅀕酒司業􅀶士少府監將作監􅀦子􅀕酒六典曰國子􅀕酒司業之職掌􅀖􅀦儒學訓導政令有六焉一曰國子二曰大學三曰四門四曰律學五曰書學六曰筭學韋昭辯釋名曰􅀕酒者謂􅀕六神以酒醊之也辨云凢㑹同饗讌必尊長先用酒以􅀕先故曰􅀕酒漢時呉王年長以爲劉氏􅀕酒是也徐廣釋􅀕酒云古主人具饌則賔中長者一人舉酒􅀕地是則長者爲􅀕酒也漢書自呉王賜號爲劉氏􅀕酒應劭曰禮飲酒必􅀕示有先也故稱􅀕酒飲時唯尊長者以酒沃酹也又曰張安丗薦蘇武明習故事奉使不辱君命宣帝以武壯節老臣令朝朔望號稱􅀕酒甚優寵之續漢書百官表曰建武􅀄置五經􅀶士太常差次有聦明威重者一人爲􅀕酒揔領綱紀漢書百官表注􅀶士􅀕酒一人掌􅀦子學毎朝服進賢兩梁冠佩水蒼玉蜀志曰先主旣定益州廣漢太守夏纂請秦宓爲師友􅀕酒晉書曰􅀽瓌字山甫爲􅀦子􅀕酒時屬經喪亂禮教陵遲瓌上䟽求立學徒帝從之國學之興自瓌始也又曰裴頠爲􅀕酒奏立太學講堂築門闕刻石冩五經晉中興書曰杜夷字行齊以儒學稱中宗以夷爲丞相􅀕酒中興􅀄皇太子凢三至夷舎執經問義沈約宋書曰􅀶士秦官也掌通古今貟多至數十人有僕射光武増爲十五人盖一經有數家之學故也皆教弟子光武改僕射曰􅀕酒􅀕酒者一位之元長也齊書曰張緒竟陵王子良領國子􅀕酒武帝勑王晏曰吾欲令司徒辭􅀕酒以授張緒物議以爲云何子良竟不拜以緒領國子􅀕酒齊職儀曰晉令􅀶士􅀕酒掌􅀦子學而國子生師事􅀕酒執經􅁑巾單衣終身致敬梁書令曰王丞字安期爲國子􅀕酒丞祖儉父􅌔並居此職三代爲國師前代未有當時以爲榮􅌔音簡崔鴻十六國春秋前秦録曰建元七年髙平蘇通長樂劉祥並以碩學􅂄儒尢精二禮堅以通爲禮記􅀕酒居于東庠祥爲儀禮􅀕酒處于西序堅毎月朔旦率百僚親臨講論後魏書曰韓子熈累遷國子􅀕酒子熈儉素安貧常好退静遷鄴之始百司並給兵力時以􅀕酒閑豫止給二人或有令其陳謁者子熈曰朝廷不與􅀕酒兵何􅀜韓子熈事論者稱之後周書曰盧誕夲名恭祖拜給事黄門侍郎魏帝詔曰經師易求人師難得朕諸兒稍長欲命卿爲師於是親幸晉王第勑晉王以下皆拜之於帝前因賜名曰誕又以誕儒宗學府爲當世所推乃拜國子􅀕酒隋書曰楊汪字元度拜國子􅀕酒帝令百寮就學與汪講論天下通儒碩學多萃焉論難鋒起皆不能屈帝令御史書其問荅奏之省而大恱賜良馬一匹又曰元善遷國子􅀕酒上嘗親臨釋奠命善講孝經於是敷陳義理兼之以諷諌上大恱曰聞江陽之說更起朕心賚絹百匹衣一襲唐書曰許後胤嘗侍太宗講後爲睦州刺史因入朝乞骸骨太宗召問曰朕與卿刺史資以自養何謂即求致仕後胤對曰年老筯力不逮望得私第時見闕庭太宗曰卿氣力猶強欲何官也後胤陳謝不敢太宗曰朕昔從卿讀書卿今日從朕求官但言所欲不相違也時國子􅀕酒缺後胤奏言之因授國子􅀕酒風俗通曰孫卿有秀才善爲詩禮易春秋至齊襄王時而孫卿最老師三爲􅀕酒齊王融爲王儉讓國子􅀕酒表曰竊以成均義重振古所崇資師道尊有來攸尚匪由蘭芷疇變入室之情不自朱藍何遷素􅁝之質司業唐書曰韋叔夏遷成均司業乆視年特下制曰吉㓙禮儀國家所重司禮􅀶士未甚詳明成均司業韋叔夏太子率更令祝欽明等􅀶渉禮經多所該練委以叅掌兾􅀪典式自今司禮所脩儀注並委叔夏等刋定訖然後進奏又曰歸崇敬上言司業者義在禮記云樂正司業正長也言樂官之長司主此業爾雅云大板謂之業按詩周頌設業設虡崇牙樹羽則業是懸鍾磬之簨虡也今大學旣不教樂於義則無所取請改司業一爲左師一爲右師位正四品上􅀶士六典曰􅀶士掌教文武官三品巳上及國公子孫應劭漢官儀曰􅀶士秦官也􅀶者通􅀶古今士者辯於然否孝武帝建元五年􅀄置五經􅀶士秩六百石太常差次有聦明威重者一人爲􅀕酒揔領綱紀漢舊儀曰武帝􅀄置􅀶士取學通行脩􅀶識多藝䁱古文爾雅能屬文章者爲之朝賀位次中都官吏稱先生不得言君其弟子稱門人也漢書曰賈􅁩文帝召爲􅀶士時年二十許最爲少每詔令議下諸老生未能言􅁩盡爲之對人人各如其意所出又曰韋賢字長􅐐爲人質朴少欲篤志於學兼通禮尚書以時教授時人號稱鄒魯大儒徴爲􅀶士又曰公孫􅀪對䇿時百餘人太常奏第居下天子擢之對爲第一召入見容皃甚嚴拜爲􅀶士待詔金馬門也又曰元鼎中徐偃爲􅀶士使行風俗偃矯制使膠東魯􅀦鼓鑄鹽鐵還奏事張湯劾偃矯制法死偃以爲春秋之義大夫出疆有可以安社稷利万人專之可也湯不能詘東觀漢記曰甄宇拜􅀶士毎臈詔賜􅀶士羊人一羊有大小肥瘦時議欲殺羊分肉又欲投鈎宇因取瘦者自是不復爭後召㑹詔問瘦羊􅀶士所在京師因以爲號又曰歐陽歙其先和伯從伏生受尚書至于歙七世皆爲􅀶士敦於經學恭儉好禮後漢書曰光武毎朝㑹輙令桓榮於公卿前說經書帝稱善曰得生幾晚㑹􅀶士缺帝欲用榮榮叩頭讓曰臣經術淺薄不如同門生郎中彭閎楊州從事臯􅀪帝曰俞徃汝諧因拜榮爲􅀶士又曰董鈞永平􅀄爲􅀶士時草創五郊􅀕祀及宗廟禮樂威儀章服輙令鈞叅議多見從用當丗稱通儒華嶠後漢書曰􅀄欲立左氏傳􅀶士范叔以爲左氏淺末不冝立陳元聞之乃詣闕上䟽爭之更相辯對凢十餘上帝卒立左氏學也漢舊儀曰孝文皇帝時􅀶士七十餘人朝服立端章甫冠魏志曰樂祗字文載少好學黃􅀄中徵拜愽士于時太學􅀄立􅀶士十餘人學多偏僻不敢親教俻貟而巳唯文載五葉並授又曰文帝黃􅀄五年太學制五經課試之法置春秋榖梁􅀶士又曰明帝太和二年詔曰尊儒貴學王教之夲也自頃儒官或非其人將何以宣明聖道其髙選􅀶士才任中常侍者呉志詔曰古者建國教學爲先所以道丗治性爲時養噐也自建興巳來時事多故吏民頗以目前趍務去夲就末不循古道夫所尚不淳則傷化敗俗其案古置學官立五經􅀶士核取應選加其寵禄科見吏之中及將吏子弟有志好者各令就業一歳課試差其品第加以位賞使見之者樂其榮聞之者羡其譽以敦王化以隆風俗晉令曰􅀶士皆取履行清淳通明典義􅀂散􅀐中書侍郎太子中庶子以上乃得召試諸生有法度者及白衣試在髙第拜郎中晉書載記曰姚泓受經於博士淳于􅄮􅄮病親詣省病拜于牀下自是公侯見師傅皆拜焉後魏書曰崔逸字景雋好古􅀶渉爲國子􅀶士毎因公事逸常􅀍詔獨進􅀶士特命自逸始也後周書曰盧辯字景宣爲太學􅀶士以大戴禮未有解詁辯乃注之其兄景􅁉爲當時碩儒謂辯曰昔侍中注小戴今爾注大戴庶纂前脩矣隋書曰馬光開皇􅀄髙祖徴山東義學之士光與張仲讓孔籠竇士榮張黒奴劉祖仁等俱至並授太學􅀶士時人號爲六儒又曰馬光爲太學􅀶士嘗因釋奠髙祖親幸國子學王公以下畢集光􅂛座講禮啓發章門巳而諸儒生以次論難者十餘人皆當時碩學光剖析疑滯雖辭非俊辯而理義􅀪贍論者莫測其淺深咸共推服上嘉而勞焉又曰王頗授著作佐郎㝷令於國子講授㑹髙祖親臨釋奠國子􅀕酒元善講孝經頗與相論難詞義鋒起善徃徃見屈髙祖大竒之超授􅀦子􅀶士又曰何妥授太學􅀶士帝􅀄欲立五后以問儒者辛彦之對曰后與天子匹體齊尊不冝有五妥駮曰帝嚳四妃舜又二妃亦何常數由是封襄城縣伯又曰房暉逺爲國子􅀶士㑹上令國子生通一經者並悉薦舉將擢用之旣䇿問訖􅀶士不能時定臧否􅀕酒元善恠問之暉逺曰江南河北義例不同􅀶士不能遍渉學生皆持其所短稱巳所長􅀶士各各自疑所以乆而不决也􅀕酒因令暉逺考定之暉逺覽筆便下􅀄無疑滯或有不服者暉逺問其所傳義䟽輙爲始末誦之然後出其所短自是無敢飾非者所試四五百人數日便决諸儒莫不推其通􅀶魯國先賢傳曰漢文帝時聞申公爲詩最精以爲􅀶士申公爲詩傳號曰魯詩李郃別傳曰郈上書太后數陳忠言其辭雖不能盡施用輙有䇿詔襃賛焉􅀶士著兩梁冠朝㑹冝隨士大夫例時賤經學􅀶士乃在市長下公奏以爲非所以敬儒徳明􅀦體也上善公言正月大朝引􅀶士公府長史前殷氏世傳曰殷亮建武中徴拜􅀶士遷講學大夫諸儒講論勝者賜席亮重席至八九帝嘉之曰講學不當如是耶典略曰公儀休者魯􅀶士也爲魯相無所變更百官自正使食禄者不得與下民爭利論衡曰王莽之時省五經章句博士弟子郭略夜定舊說死於燭下少府􅁥六典曰少府􅁥之職掌百工􅇊巧之政令惣中書尚左尚右尚職治掌治五署之官屬正其工徒謹其繕作少監爲之貳漢官宰尹下曰少府言别爲小藏故曰少府漢書曰少府秦官掌山海地澤之稅以給供養又曰歐陽地餘字長賔爲少府誡其子曰我死官屬送汝財物愼無受汝九卿儒者子孫以廉㓗著可以自成及卒少府官屬送數百万其子不受天子聞而嘉焉賜錢百萬後漢書曰東平王蒼爲驃􅀐正月朔朝蒼當入賀故事少府給璧時隂就爲少府貴傲不奉法漏將盡求璧不得蒼􅁺朱暉遥見少府主簿持璧乃徃紿曰試請觀之旣得而馳奉之就復以他璧朝張璠漢紀曰太常种拂與李儒戰而死子劭徴爲少府鴻臚皆不受曰我父盡忠於朝而爲時所妬父以身殉國爲賊臣所害爲臣子不能除賊何靣目復覲明主三輔聞之爲之感動應劭漢官儀曰少府掌山澤陂池之稅名曰禁錢以給私養自别爲藏少者小也故稱少府魏志曰王觀徙少府大將軍曹爽使材官張逹斫屋材及諸私用之物觀聞之皆録奪以没官少府統三尚方御府内藏珎玩之寳爽等奢放多有干求憚觀守法乃徙爲太僕又曰楊阜字義山爲少府卿然以天下爲巳任呉志曰先主遣少府徐詳至魏魏太祖謂詳曰孤比者若越橫江之津與孫將軍遊姑􅂫之臺獵長洲之菀吾志足矣詳對曰大王欲奉至尊以合諸侯􅀂越横江而遊姑􅂫是踵亡秦而蹈夫差恐天下事去矣太祖曰徐生得無逆詐􅁘臧榮緒晉書曰陳眕字國鎭過江爲少府卿時大旱經乆大興四年四月始雨有司奏應報賽宗廟山川中宗詔曰祈廟云報賽非奉尊上辭也吾意有疑眕以爲舊山川有祈報故雨應賽非大事不應告廟子無要君親之道讀􅀕稱賽於義有違從之唐書官品志曰少府卿位視尚書左丞置材官將軍左中尚方甄官平水中署南塘邸稅庫東西冶中黃細作炭庫􅁓官柴署等令丞將作監六典曰將作大匠之職掌供􅀖國修建土木工匠之政惣四署三􅁥百工之官屬以供其職事少匠貳焉漢書曰將作少府秦官掌治宫室范曄後漢書曰魏覇徵拜將作大匠明年和帝崩典作順陵時盛冬地凍中使督促數罰􅁺吏以厲覇覇撫循而巳􅀄不切責而反勞之曰今諸卿􅀍辱大匠過也吏皆懷恩力作功倍續漢書曰曹裒字叔通遷將作大匠時有疾疫廵行病徒自省醫藥糜粥死者减少又百官志曰將作秩二千石掌作宗廟路寢宫室丞一人六百石左右校令左右工徒掌木工之功并樹桐梓之􅀋列于道側又曰李固字子堅遷大匠常推賢士孔融以將作大匠遷少府也華嶠後漢書曰應順字仲華爲將作大匠發擿衆姦皆極其刑豪猾之吏累迹視事五年省費以億万應劭漢官儀曰丗祖中興以謁者領其官章帝建初元年乃置眞位次河南尹永元七年大匠應愼上言百郡計吏觀國之光而舎逆旅﨑嶇私舘貢篚之物朽濕曝露昔晉覇之盟主耳舎諸侯於􅈻人鄭子産以爲大譏况今四海之大而可無乎和帝嘉納之魏志曰楊阜字義山爲將作大匠明帝時初治宫室發美女充後庭阜上䟽欲省宫人諸不見幸者乃召御府吏問後宫人數吏守舊令對曰禁宻不得宣露阜怒杖吏一百數之曰國家不與九卿爲宻反與小吏爲宻乎帝聞之而愈驚憚晉書曰將作大匠陳勰掘地得古文尚書奏今文長於古文冝以古爲正潘岳以爲習用巳乆不冝復改唐書官品志曰大匠卿位視太僕掌土木之工統左右校諸署汝南先賢傳曰應仲華遷大匠除藻飾之無用割有損之浮費凢所省息七億餘萬太平御覽卷第二百三十六
