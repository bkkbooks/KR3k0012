front:
  text: 太平御覽卷第六百五十
  hash: sha256:e9e3939d4d2c0ce44f7c88b1c22e32a4e4d6550a935c5cbcad6730994db586dd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_650-1a}
body:
  text: 刑法部十六杖督流徒杖尚書堯典曰朴作教刑撲檟楚也不勤道業則撻之禮記學記曰檟楚二物収其威也家語曰舜之事父小杖則受大杖則走後漢記曰明帝時政事嚴峻九卿皆鞭杖左雄上言九卿位次三事班在大臣行有佩玉之節動有庠序之儀加以鞭杖誠非古典上即除之魏志曰楊阜字義山爲大匠卿上䟽欲省宫人諸不見幸者乃召卿府史問後宮人數吏崔令對曰禁宻不得宣露阜怒杖百數之曰國家不與九卿爲宻乃與小吏爲宻乎帝聞而愈敬禪之又曰周宣字孔和樂安人爲郡吏太守楊沛夢八月一日曹公當至必與君杖飲以藥酒使宣占之對曰夫杖起弱藥治人病八月一日賊必除滅至期賊果破蜀志曰劉琰妻胡入賀太后太后令特留胡經日乃歸胡有羙色琰疑其與後主有私呼卒伍撾胡至於以杖傳面而後棄遣胡具以告琰坐下獄有司議卒非撾妻之人面非受杖之地琰竟棄市王隱晉書曰武帝以山濤爲司徒頻讓不許出而徑歸家左丞白褒又奏濤違詔杖褒五十晉陽秋曰諸葛武侯杖十以上親决宣王聞之喜曰吾無患矣後周書曰宣帝自公卿巳下皆􅀍楚撻其間誅戮黜免者不可勝言每笞箠人以百二十爲度名曰天杖宫人内職亦如之后妃嬪御雖􅀍寵嬖亦多􅀍杖背於是内外恐懼人不自安北史曰盧潜爲黄門鄭子黙奏潜從清河王岳南討岳令潜􅀃梁將侯瑱大納瑱賂遺還不奏聞文宣杖潜一百仍截其􅁂潜顔色不變三國典略曰齊義寧太守荀仲舉字士髙潁川汝䕃人也在郡清簡亦工詩詠嘗與長樂王尉粲劇飲齧粲指至骨齊文宣知之賜杖一百或問其故云我郍許當時正疑是鹿尾耳又曰齊馮翊王潤字子澤神武第十四子也廉慎方雅習於吏職神武嘗稱之曰此是吾家千里駒也􅀄爲定州刺史開府王廻洛潤督獨􅀌㧞侵竊官田受納贈賂潤案舉其事二人上言潤出送臺使登魏文舊壇南望歎息不測其意武成宣命於州曰馮翊王少小謹慎内外所知不爲非法朕信之矣登髙逺望人之常情何足可道䑕軰輕相間搆理應從斬猶以舊人未忍致法廻洛决鞭二百㧞冝决杖一百隋書曰髙祖性猜忌素不恱學旣任智而獲大位因以文法自矜明察臨下恒令左右覘視内外有小過失則加以重罪又患令史􅂍汚因私使人以錢帛遺之得犯立斬每於殿庭打人一日之中或至數四嘗怒門事揮楚不甚即命斬之十年尚書左僕射髙熲治書侍御史柳或等諌以爲朝堂非殺人之所殿庭非决罰之地帝不納熲等乃盡詣朝堂請罪曰陛下子育群生務在去弊而百姓無知犯者不息致陛下决罰過嚴皆臣等不能有所禆益請自退屏以避賢路帝於是顧謂領左右都督田元曰吾杖重乎元曰重帝問其狀元舉手曰陛下杖大如指捶楚人三十者比常杖數百故多致死帝不懌乃令殿内去杖欲有决罰各付所由又曰庫狄士文拜具州刺史性清苦不受公料家無餘財其子嘗噉官厨餅士文枷之於獄累曰杖一百歩送還京僮􅈻無敢出門又曰燕榮爲幽州緫管按部道次見藂荆堪爲笞捶命取之輒以試人人或自陳無咎榮曰後􅀂有罪當免尓及後犯細過將撾之人曰前日􅀍杖使君許有罪宥之榮曰無過尚尔况有過耶搒捶如舊唐書曰開元二年監察御史蔣挺有所犯勑朝堂杖之黄門侍郎張廷珪曰御史憲司清望耳目之官有犯當殺即殺當流即流不可决杖可殺不可辱也又曰開元中前廣州都督裴伷先下獄中書令張嘉貞奏請决杖兵部尚書張􅀃進曰臣聞刑不上大夫以其近於君也故曰士可殺不可辱臣今秋廵邊中途聞姜皎朝堂决杖流皎是三品亦有微功不冝决廷辱以卒伍待之且律有八議勲貴在焉今伷先不可輕行决罰上然其言嘉貞不恱退而謂恱曰何言事之深也􅀃曰宰相者時來即爲豈能長據􅀂貴臣盡當可杖但恐吾等行當及之此言非爲伷先乃爲天下士君子也又曰王遂爲浙西觀察使毎有笞撻其杖率過常制旣遇禍監軍使封其杖來獻命中人出示於朝以作誡丗祖曰桓宣武在荆州欲以德􅀍江漢耻以威刑肅物令史受正從朱衣上過桓室年少從外來云向從門下過令史受杖上稍雲根下拂地足意機其不着宣武云我猶患其重傳集曰咸爲左丞楊濟與咸書曰昨遣人相視受罰云大重以爲恒然相念杖痕不耐風寒冝深慎護不可輕也當飲酒令體中常煖爲佳蘇治瘡上急痛故􅀉徃之咸荅違距上命稽停詔罰退思此罪在於不測􅂊加罰黜退用戰悸何復以杖重爲劇小人不德所好唯酒冝於飬瘡可數致也襄陽耆舊記曰羅尚爲右丞是時左丞處事失武帝意大怒欲案入重罪事連尚於是尚爲坐受杖一百時論美之益部耆舊傳曰常播字文平蜀郡江源人仕縣主簿縣長廣都朱淑以官榖割没當論重罪播争獄訟身受杖數千披肌割膚更歴三獄幽閑二年每將掠拷吏先驗問伏不播荅言忽得罰無所多問辭終不撓事遂見明也三輔决録曰丁邯字叔春正直不撓舉孝廉爲郎以令史次􅀘也丗祖改用孝廉選邯􅀘爲郎邯稱疾不就詔問實病羞爲郎乎對曰臣實不病以孝廉爲令史職尓丗祖怒使虎賁杖之數千詔問欲爲郎不邯曰能殺臣者陛下不能爲郞者臣也詔出不爲郎督晉書曰魏明帝改士庶罰金之令婦人加笞還從鞭督之例以其刑體祼露故也晉律曰諸有所督罰五十以下鞭如令平心無私而以辜死者二嵗刑晉令曰應受杖而體有瘡者督之也束晢勸農賦曰乃有老閑舊猥欺狡難覺時雖􅀍考不過挍督歌對囹圄􅀏向桎梏流徒書曰五流有宅五宅三居謂不忍加刑則流放之􅀂四㐫者五刑之流各有所居大罪四裔次九州之外次千里之外也又曰流宥五刑流共工於幽州放驩兠于崇山竄三苗于三危殛鮌于羽山四罪而天下咸服後魏書曰髙聦有罪怒死徙平州爲民届瀛州屬刺史王質獲白􅇠將獻託聦爲表髙祖見表顧謂王肅曰在下郍得復有此才而今朕不知也肅曰此髙聦北徒此文或其所製髙祖悟曰必應然也隋書曰王伽開皇末爲齊州行參軍􅀄無足稱後􅀍州使送流囚李叅等七十餘人詣京師時制流人並枷鏁傳送伽行次滎陽哀其辛苦悉呼而謂之曰汝等雖犯憲法枷鏁亦大辛苦吾欲與汝等脫去行至京師惣集能不違期不皆拜謝曰必不敢違伽於是悉脫其枷停援卒與期曰某日當至京師如致前却吾當爲汝受死舎之而去流人感恱依期而至一無離叛上聞而異之於是悉召流人并令携􅀒妻子俱入賜宴於殿庭而赦之擢伽爲雍令太平御覽卷第六百五十
