front:
  text: 太平御覽卷第二百八十五
  hash: sha256:f64cfb649850a975e096fef551ce2b855c2ac1c9ff9936e0943f1a70030ef0bb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_285-1a}
body:
  text: 兵部十六機略四後漢書曰曹公西征馬超與超夾關爲軍公急持之而潜遣徐晃朱靈等夜度蒲坂津據河西爲營公自潼􅀜北度未濟超赴舡急戰公放馬牛以餌賊賊亂取牛馬公得度循河爲甬道而南賊退距渭口公乃多設疑兵潜以舟載兵入渭爲浮橋夜分兵結營於渭南賊夜攻營伏兵擊破之又曰曹公與􅀽紹相持官渡曹公循河而西紹於是渡河追公軍至延津南公勒兵駐營南坂下使登壘視之曰可五六百騎有頃復白􅀐稍多歩兵不勝數公曰勿復白乃令騎放馬解鞅是時白馬輜重就道諸將以爲敵􅀐多不如還保營荀攸曰此所以餌敵也如何去之紹􅀐將文醜與劉備將五六千􅀐前後至諸將復白可上馬公曰未也有頃􅀐至稍多或分輜重公曰可矣乃皆上馬時􅀐不滿六百遂縱兵擊之大破又曰曹公旣尅鄴􅀽尚熈遂奔遼東衆有數千􅀄遼東太守公孫康恃逺不服曹公破烏丸或􅀃公遂征之尚熈可擒公曰吾方使康斬送其首不煩兵矣公引兵還康果斬送尚熈傳其首諸將或問曰公選而康斬尚熈何也公曰彼素畏尚熈其急之則并力緩之則相圖其􅀔然也又曰曹公討鮮卑出盧龍塞外道絶不通乃塹山堙谷五百餘里經白擅歴㓻平渉鮮卑庭東䧟柳城未至二百里虜乃知之將數萬􅀐逆軍登白狼山卒與虜遇衆甚盛公登髙觀虜陣不整縱兵擊之使張遼爲先鋒虜大敗又曰黄巾賊起命將朱儁率兵討之賊帥韓忠據宛拒儁儁兵少不敵乃長圍結壘起土以臨城内因鳴鼓攻其西南賊悉衆赴之儁自將精卒五千掩其東北乗城而入忠乃退保小城惶懼乞降又曰曹公與􅀽紹相持官渡紹遣將郭圖淳于瓊顔良等攻東郡太守劉延於白馬紹引兵至􅀺陽將度河曹公北救延荀攸􅀃曰今兵少不敵分其􅀔乃可公到延津若將度兵向其後紹必西應之然輕兵襲白馬掩其不備顔良可擒也公從之紹聞兵度即留分兵西􅀿之乃引軍兼行趣白馬未至十餘里良大驚來逆戰使張遼關羽前登擊破斬良遂解白馬圍又曰曹公擊破馬超超走涼州􅀜中平諸將或問曹公曰􅀄賊守潼􅀜渭北道􅆙不從河東擊馮而反守潼􅀜引曰而後北度何也公曰賊守潼􅀜􅀂吾入河東賊必引守諸津則西河未可度也吾欲盛兵向潼關賊悉衆南守西河之備虚故徐晃等得擅取西河然後引軍北度賊不能與吾爭西河者以有二將之軍也連車樹柵爲甬道而南旣爲不可勝且以示弱度渭爲堅壘虜至不出所以驕之也故賊不爲營壘而永割地吾順僞言許之所以縱逸其意使自安而不爲備因蓄士卒之力一朝擊之所謂疾雷不及掩耳兵之變化固非一道也又曰蜀將􅀜羽圍曹公將曹仁於樊又圍將軍吕布於襄陽曹公遣將徐晃救仁以羽難與爭鋒遂前至偃城晃詭道作都壍示欲截其後賊燒屯走晃得偃城兩靣連營稍前去賊圍三丈所未攻賊圍頭有屯又別屯四􅃁晃揚聲當攻圍頭屯而密攻四冢羽見四冢欲壞自將歩兵五千出戰晃擊之退走遂追蹈與俱入圍破之或自投􅃆水死曹公令曰賊圍塹鹿角十重將軍致戰勝今䧟賊圍多斬首虜吾用兵三十餘年及所聞古之善用兵未有長驅徑入敵圍者又曰曹公征􅀜中進軍度渭馬超及韓遂數請戰不許因請割地公用賈詡計僞許之韓遂請與公相見公與遂交馬語移時不及軍事但􅀃京都故舊拊手懽􅀏旣罷超等問遂公何言遂曰無所言也超等疑之他日公又與遂書多所點竄如遂改定者超等愈疑遂公乃與剋日㑹戰先以輕兵挑之戰良乆乃縱驍􅀐夾擊大破之遂超走涼州魏志曰司馬宣王征公孫文懿次于遼水文懿遣將軍畢衍楊祚等歩􅀐數萬阻遼隧以距之圍塹二十餘里宣王令其軍穿圍盛兵多張旗幟出其東南賊盡銳赴之乃沉舟潜濟急於東北斜趣之襄平衍等恐襄平無守夜遁又曰郭淮討叛羗師其羗師屯河關白土故城據河拒官軍淮見形上流密於下度兵據白土故城擊大破之又曰李典與程昱等以舩運軍糧㑹􅀽尚遣將髙藩將兵屯河上絶水道典與諸將議曰藩軍少甲而恃水有懈怠之心擊之必尅冝亟擊之昱爲然遂北渡河攻藩破之水道得通又曰司馬宣王征公孫文懿沉舟潜濟遼水作長圍忽弃賊而向襄平諸將言曰不攻賊而作圍非所以示衆也宣王曰賊堅營髙壘欲以老吾兵也攻之正入其計此王邑所以恥過昆陽也古人云敵雖髙壘不得不與我戰者攻其所必救也賊大衆在此則賊窟虚矣我直指襄平必懷内懼懼而求戰破之必矣遂整陣而過賊見兵出其後果邀之宣王謂諸將曰所以不攻其營正欲致此不可失也乃縱兵逆擊大破之三戰皆捷又曰田豫字國讓率擊鮮卑軻比能單將銳卒􅀷入虜庭胡人衆多鈔軍前後斷截歸路國讓乃進軍去虜十餘里結屯營多聚牛馬糞燃之從他道引去胡見煙火不絶以爲尚在去行數十里乃知之又曰諸葛誕文欽反據壽春司馬景王揔兵討之謂諸將曰彼當突圍決一朝之命或謂大軍不能乆省食減口兾有他變料賊之情不出此二者今當多方以亂之備其越逸此勝計也因命合圍分遣羸疾就糓淮北廪軍士大豆人三勝欽聞之果喜景王愈羸形以示之多縱反間揚言呉救方至誕等益寛恣食俄而城中乏糧諸將並請攻之景王曰誕聚糧完守外結呉人自謂足據淮南必不便走今􅀂急之損逰軍之力外宼卒至表裏受敵此危道也且堅守三靣􅀂賊陸道而來軍糧必少吾以逰兵輕􅀐絶其轉輸可不戰而破外賊欽等必爲擒矣誕欽等出攻長圍諸軍逆擊走之􅀄誕欽内不相恊乃至窮蹙轉相疑貳誕殺欽子鴦踰城以爲將軍封侯使廵城而呼景王見城上持弓者不發因令攻而抜之又曰諸􅁑誕據壽春反命將王基討之呉遣朱異來救誕於安城詔王基引諸軍轉據北山基謂諸將曰今圍壘轉固兵馬向集但當精脩守備以待越逸而更移兵守險使得放縱雖有智者不能善其後矣遂守便冝上䟽曰今與賊交利對敵當不動如山􅀂遷移依險人心揺蕩於􅀔大損諸軍並據深溝髙壘衆心皆定不可傾動此御兵之要地也書奏報聽之壽春竟破司馬文王與基書曰􅀄議者云云求移者甚衆時未臨履亦謂冝然將軍􅀷笇利害獨秉固志上違詔命下距衆議終至制敵擒㓂雖古人所􅄒不足過也又曰郭淮在漢中蜀主劉備欲度漢水來攻諸將議衆寡不敵依水爲陳以距之淮曰此示弱而不足挫敵非筭也不如逺水爲陣引而致之半濟而後擊備可破也旣陣備疑不敢度通典曰蜀主悟之不敢又曰文帝􅀄北狄強盛侵擾邊塞乃使田豫持節護烏丸校尉時鮮卑數十部比能弥如素利等割地統御各有分界乃共要盟不得以馬與中國市豫以戎狄爲一非中國之利乃先搆離之使自爲讎敵牙相攻伐素利違盟出馬千疋與官爲比能所擊求救於豫豫􅀷入虜廷胡圍豫於馬邑城十重豫密使司馬建旌旗鳴鼓吹從南門岀胡人皆往赴之豫將精銳自北門出鼓譟而赴兩頭俱發岀虜不意虜衆亂弃馬歩走追討二十餘里僵屍蔽地胡人破膽威振沙漠又曰諸葛亮岀斜谷司馬宣王屯北原亮盛兵西行諸將皆欲攻西圍郭淮獨以爲此見形於西欲使官兵重應之必攻陽遂耳其夜果攻陽遂有備不得上呉志曰曹公入荆州劉備爲曹公所破與魯肅遇於當陽遂共圖計遣諸葛亮詣孫權權遣周瑜程普與備并力逆曹公遇於赤壁瑜部將黄盖曰今㓂衆我寡難與持乆觀操舩艦相接可燒而走也乃取蒙衝數十實以薪草上建牙旗盖乃先報書欺以欲降曹公軍延頸指言盖降盖收諸舡同時發火時風盛猛悉延燒岸上營落頃之熛炎張天人馬燒溺死者甚衆軍遂敗退又曰周瑜使甘寜據夷陵魏將曹仁圍寧吕蒙往救之仍分遣三百人柴斷嶮道賊走可得其馬軍到夷陵即日交戰所殺過半敵夜遁去行過此道騎皆捨馬歩走蒙兵追蹙􅀗馬三百疋方舡載還又曰賀齊討黟歙賊帥黟音伊切歙音攝陳㒒祖山等二萬户屯歴林山四靣壁立髙數十丈逕路危狹下容方楯賊臨髙下石不可得攻軍住經日將吏患之齊身出周行觀視形便隂募輕捷士爲作鐡戈密於隱嶮賊所不備處以戈柘山爲縁道道成夜令潜上乃多懸布以受不人得上百數十人四靣流布俱鳴鼓角齊勒兵待之賊夜聞鼔聲四合謂大軍悉巳得上驚懼惑亂不知所爲守路備險者皆走還依衆大軍因是得上其中有善禁術呉師刀劔不得拔弓弩射矢皆還自向輙致不利齊曰吾聞之雄黄勝五兵還丹能威敵夫金有刃䖝有毒者皆可禁之以無刄之兵不毒之䖝彼必無能爲也遂伐木爲棓列陣四靣羅布俱鳴鼔角勒兵待􅍼賊惶遽無依禁術不效遂大破而降之蜀志曰諸葛孔明率衆定南夷擒夷師孟􅀗七縱七擒􅀗曰公天威也南人不復反矣揚雄蜀王記云􅁗王石牛置金於後蜀人以爲牛便金蜀王發卒開道令五丁拖牛置成都蜀道乃通太平御覽卷第二百八十五
