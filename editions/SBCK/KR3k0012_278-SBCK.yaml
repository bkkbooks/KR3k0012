body:
  text: 兵部九邊將史記曰李牧爲趙將居鴈門備匈奴日擊牛饗士謹烽火多間諜敢有捕虜者斬王以爲怯代之匈奴數來復使牧將牧曰如前乃敢奉令王許諾數嵗終無所得後進百金之士五万彀􅁌者十万大破匈奴又曰文帝時匈奴大入朝郍殺北地都尉印音昂帝以問馮唐安得廉頗李牧爲將也唐對曰臣聞上古王者之遣將跪而推轂曰閫以内者寡人制之閫以外者將軍制之軍功爵賞皆决於外歸而奏之此非虚言也臣大父言李牧之爲趙將居邊軍市之租皆自用饗士賞賜决於外不從中御也委任而責成功故李牧乃能得盡智能選車千三百乘彀􅀐万三千疋百金之士十万是以北逐單于東破胡滅澹林西抑強􅁗南支韓魏當是之時趙幾覇㑹趙王遷其母倡也王遷立乃用郭開䜛卒誅李牧令顔聚代之是以兵破士北爲􅁗所滅今臣竊聞魏尚爲雲中守其軍市租盡以給士卒出私養錢五日一殺牛饗賔客軍吏舎人是以匈奴逺避不近雲中之塞虜嘗一入尚率車􅀐擊之所殺甚衆夫士卒盡家人子起田中從軍安知尺籍伍符終日力戰斬首捕虜上功莫府一言不相應文吏以法繩之其賞不行而吏奉法必用臣愚以爲陛下法太明賞太輕罰太重且雲中守魏尚坐上功首虜差六級陛下下之吏削其爵罰之由此言之陛下雖得廉頗李牧不能用文帝􅀃是日令馮唐持節赦魏尚復以爲雲中守而受唐爲車􅀐都尉又曰武帝以李廣爲未央衛尉而程不識亦爲長樂衛尉不識故與廣俱甞屯邊而廣行無部伍行陣就善水草屯舎止人人自便不擊刀斗以自衛莫府省約束文籍事然亦逺斥候未甞遇害程不識正部曲行伍營陣擊刀斗士吏理軍簿至明軍不得休息然亦未嘗遇害不識曰李廣軍極簡易然虜卒犯之無以禁也而其士卒亦佚樂咸樂爲之死我軍雖煩擾然虜亦不得犯我是時漢邊郡李廣程不識皆爲名將然匈奴畏廣士卒亦多樂從廣而苦程不識漢書曰晁錯上言兵事曰自髙后以來隴西三困於匈奴非隴西之民有勇怯迺將吏之製巧拙異也故兵法曰有必勝之將無必勝之民繇此觀之安邊境立功名在於良將不可擇也又曰趙充國奏曰從今盡三月虜馬羸瘦必不敢􅂢妻子他種中渉河而來爲宼是臣之愚計所度虜且必瓦解其處不戰而自破之䇿也又曰張安丗長子千秋爲中郎將兵隨度遼將軍范明友撃烏桓還謁大將軍光問千秋戰陣方略山川形􅀔千秋口對兵事畫地成圖無所忘失後漢書曰竇憲懼誅自求擊匈奴以贖死㑹南單于請兵北伐乃拜憲車􅀐將軍金印紫綬官屬依司空依淮也長一人千石掾屬二十九令史及御屬三十二人見續漢志以執金吾耿秉爲副發北軍五校漢有􅀯北軍北軍中候一人六百石掌臨五營􅀺陽雍營縁邊十二郡􅀐士漢官儀曰光武中興以幽兾并州兵􅀐克定天下故於􅀺陽五營以謁者監之又曰扶風郡尉部在雍縣以凉州近羗數犯三輔將兵衛護故俗稱雍營及羗胡兵出塞明年憲與秉各將四千騎及南匈奴左谷蠡王師子師子其名也万􅀐出朔方鷄鹿塞南單于屯屠河屯屠河單于名將万餘􅀐出滿夷谷度遼將軍鄧鴻鄧禹少子及縁邊義從羗胡八千􅀐與左賢王安􅀦万􅀐出棝陽塞棝陽在五原郡棝音固皆㑹􅃰郡山憲分遣副校尉閻盤司馬耿䕫耿譚將左谷蠡王師子右呼衍王湏訾等呼衍其號因以爲姓匈奴貴種也今呼延姓是其後須訾各精􅀐万餘與北單于戰於稽落山大破之虜衆崩潰單于遁走追擊諸部遂臨私渠比鞭鞮海匈奴中海各斬名王巳下方三千級􅀗生口馬牛羊櫜駞百餘万頭於是温犢須日逐温吾夫渠王抑鞮等八十一部率降者前後二十餘万人憲秉遂登燕然山去塞三千餘里刻石勒功紀漢威徳令班固作銘又曰馬援討五溪蠻軍次下雋下雋縣名屬長沙國故城今辰州沅陵縣雋音字兖反有兩道可入從壷頭則路近而水嶮壺頭山名也今在辰州沅陵東武陵記曰此山頭與東海方壺山相似神仙多所遊集固名壺頭山也從充則􅂗夷而運逺充縣名屬武陵郡充音昌容反帝􅀄以爲疑及軍至耿舒欲充道援以爲棄日費粮不如進壷頭搤其喉咽搤持也充賊自破以事上之帝從援䇿三月進營壷頭賊乗髙守隘水疾舡不得上㑹暑甚士卒多疾死援亦中病遂困乃穿岸爲室以避炎氣武陵記曰壺頭山邊有石窟即援所室也室内有地如百斛舡大云是援之餘靈也賊每升險鼔譟援輙曳足以觀之左右哀其壯意莫不爲之流涕又曰􅀄馬援軍還將至故人多迎勞之平陵人孟兾名有計謀於坐賀援謂之曰吾望子有善言及同衆人􅁘昔伏波將軍路􅀶徳開置七郡裁封數百户漢書曰平南越以爲南海蒼梧鬰林合浦交阯九真日南朱崖儋耳九郡今此言七郡則與前書不同也今我微勞猥饗大縣功薄賞厚何以能長乆乎先生奚用相濟兾曰愚不及援曰方今匈奴烏桓尚擾北邊欲自請擊之男兒要當死於邊野以馬革裹屍還葬耳何能卧牀上在兒女子手中􅁘兾曰諒爲列士當如此矣又曰鄧訓卒官吏人羗胡愛惜旦夕臨者日數千人戎俗父母死耻悲泣皆􅀐馬歌呼至聞訓卒莫不吼號或以刀自割又殺其犬馬牛羊曰鄧使君巳死我曹亦俱死耳前烏桓吏士皆奔走道路訓往烏桓校尉時吏士也至空城郭吏執不聽以狀白校尉徐傿傿歎息曰此義也傿音於建反乃釋之遂家家爲訓立祠每有疾病輙請禱求福又曰竇固復出玉門擊西域詔耿秉及􅀐尉劉張皆去符傳以屬固專將兵者並有符傳擬合之取信今去符皆受固之節度也固遂破曰山降車師又曰􅀕彤使招呼鮮卑示以財利其大都護偏何鮮卑名也遣使奉獻願得歸化彤慰納賞賜稍復親附其異種滿離髙句驪之屬遂駱驛欵塞上貂裘好馬帝輙倍其賞賜其後偏何邑落諸豪並歸義願自效彤曰審欲立功當歸擊匈奴斬送頭首乃信耳偏何等皆仰天指心曰必自效即擊匈奴左伊祑訾部斬首二千餘級持頭詣郡其後嵗􅀊相攻輙送首級又曰烏桓鮮卑追思􅀕彤無巳每朝賀京師常過冢拜謁仰天號泣乃去遼東吏人爲立祠四時奉􅀕焉又曰耿恭以踈勒城傍有澗水可固五月乃引兵據之七月匈奴復攻恭慕先登數千人直馳之朝騎散走匈奴遂於城下擁絶澗水恭於城中穿井十五丈不得水吏士渇乏笮馬糞汁而飲之笮謂壓笮也恭仰歎曰聞昔貳師將軍㧞佩刀刺山飛泉涌出貳師大宛中城名昔武帝時使李廣利代大宛至貳師城因以爲號今漢徳神明豈有窮哉乃整衣服向井再拜爲吏士禱有頃水泉奔出衆皆稱万歲乃令吏士揚水以示虜又曰光武至薊聞邯鄆兵方到光武將欲南歸召官屬計議耿弇曰今兵從南來不可南行漁陽太守彭寵公之邑人寵南陽宛人也上谷太守即弇公也發此兩都控􅁌万􅀐邯鄆不足慮也光武官屬腹心皆不肯曰死尚南首奈何北行入囊中漁陽上谷北接塞垣至彼路窮如入囊也光武指弇曰是我北道主人也又曰耿䕫爲大將軍左校尉將􅀐八百出居延塞直奔北單于庭於金微山斬閼氏名王已下五千餘級單于與數􅀐脫亡盡􅀗其匈奴珎寳財畜去塞五千餘里而還自漢出師所未甞至也又曰班超在䟽勒將還中國䟽勒舉國憂恐其都尉􅀺弇日漢使棄我我必復爲􅀛兹所滅耳誠不忍見漢去因以刀自剄超還至于寘王侯以下皆號泣曰依漢使如父母誠不可去㸦抱超馬脚不得所行超恐于寘終不聽其東又欲遂夲忘乃更還䟽勒䟽勒兩城自超去後復降􅀛兹而與尉頭連兵尉頭國居尉頭谷去長安八千六百五十里南與䟽勒接衣服類烏孫也超捕斬反者擊破尉頭又曰叚頴破羗窮山􅀷谷之中斬其渠師以下万九千級􅀗牛馬騾驢氊裘廬帳什物不可勝數又曰郭凉字公文氣力壯猛雖武將然通經書多智略尤暁邊事有名北方又曰張奐前度遼與叚頴争擊羗意不相平及頴爲司􅀠欲逐奐歸燉煌將害之奐憂懼奏記謝曰小人不明得過州將千里委命以情相歸又曰劉焉傳曰拜張魯鎮夷中郎將領漢寜太守通其貢獻謝承後漢書曰臧旻有幹事才逹於從政討賊功拜議郎還京師見太尉袁逢問其西域諸國􅁟地風俗人物種數旻具荅悉陳其狀手􅀞地形逢竒其才歎息言雖班固作西域傳何以過此東觀漢記曰黃香爲尚書曉習邊事毎行軍調度動得事中上知其勤數加賞賜魏志曰母丘儉字仲恭有幹䇿爲幽州刺史渡遼將軍儉以髙句驪數叛帥軍出􅀇莬討之句驪王宫將歩􅀐三万逆軍隨流水上大戰宮連販走遂束馬懸車登九都山斬􅀗首虜以千數􅀇菟太守王頎過汶沮千餘里至肅慎界刻石記功刋九都之山呉志曰孫歆字公禮爲邊將數十年善食士卒得其死力將帥姓名盡具識之所問咸對身長八尺儀兒都雅恱曰吾乆不見公禮不圖進益乃此後魏書曰韋珎髙祖􅀄蠻首桓誕歸欵以爲東荆州刺史令珍爲使與誕招慰諸蠻珎自懸瓠西入三百餘里至桐栢山窮臨淮源宣揚恩澤莫不附降淮源舊有祠堂變俗􅁪用人􅀕之珎乃曉告曰天地明靈即是民之父母豈有父母甘子肉味自今巳後悉宜以酒脯代用群蠻從約至今行之凢所招降七万餘户置郡縣而還以奉使稱旨除左將軍樂陵鎮將賜爵覇城子又曰李崇行梁州刺史時巴丘擾動詔崇以將軍荆州刺史鎮上洛勑發陜􅁗二州兵送崇至辭曰邊人失和夲怨刺史奉詔代之自然易帖但湏一宣詔旨而巳不勞發兵自防懷懼也髙祖從之又曰宇文測行綏州事每􅀊河氷合後突厥即來㓂掠於是常預遣居人入城堡以避之測至皆令安堵如舊乃於要路數百處並多積柴仍逺斥候知其動静是年十二月突厥從連谷入宼至界數十里測命積柴之處一時縱火突厥謂有大軍至懼而遁走自相蹂踐委棄雜畜及輜重不可勝數測徐率所部収之分給百姓自是突厥不敢復至測因請置戍兵以備之隋書白帝以薛丗雄爲玉門道行軍大將軍與突厥啓民可汗連兵擊伊吾師次玉門啓民可汗背約兵不至丗雄􅀌軍度磧伊吾􅀄謂隋軍不能至皆不設備及聞丗雄度磧大懼請降詣軍門上牛酒丗雄遂於漢舊伊吾城東築城號新伊吾因留銀青光禄大夫王威以甲卒千餘人戌之而還天子大恱進位正議大夫賜物二千叚唐書曰馬揔爲安南郡都護揔管經畧使㹅敦儒學長於政術在南海累年清廉不撓夷獠便之於漢所立銅柱之處以銅一千五百斤特鑄二柱刻書唐德以継伏波之迹又曰范希朝鎮振武蕃落之俗有長帥至必効竒駞名馬雖廉者猶曰當從以致其歡希朝一無所受積十四年皆保塞而不爲横又曰柳公綽爲太原尹北都留守河東節度觀察等使是歳北虜遣梅禄將軍李暢以馬万疋來市託云入貢所經州府守帥假之禮分嚴其兵備留館則戒卒於外懼其襲奪太原故事出兵逆之暢及界上公綽使牙將祖孝恭單馬勞問待以修好之意暢感義出涕徐驅道中不妄馳獵及至闢牙門令譯引謁宴以常禮及市馬而還不敢侵犯陘北有沙陁部落自九姓六州皆畏避之公綽至鎮召其酋朱􅁘執冝直枑雲朔塞下治廢柵十一所募兵三千付之留屯塞上以禦匈奴其妻母來太原者請梁國夫人對酒食問遺之沙陁感之􅀷得其効梁呉均邊城將詩曰僕夲邊城將馳射靈關下箭御鴈門石氣振武安瓦玉摽丹霞歛金絡􅃩光馬髙旗入漢飛長鞭歴地冩太平御覽卷第二百七十八
