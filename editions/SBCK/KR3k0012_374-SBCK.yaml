front:
  text: 太平御覽卷第三百七十四
  hash: sha256:b9dc030a1cd43839b0449ebc172e4789d06a1ed53c6056e20f222a9a79e26276
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_374-1a}
body:
  text: 人事部十五髭􅂡髯睫觸髏髭釋名曰口上曰髭髭姿也爲姿容之羙色說文曰髭口上􅂡也左傳昭六年曰王子朝使告諸侯曰在定王六年􅁗人降妖曰周其有髭王亦克能脩其職至于靈王生而有髭王甚神聖無惡於諸侯班固幽通賦注曰衛蒯聵亂子羔滅髭􅁂衣婦人衣逃得出曰父子争國吾何爲其間乎􅂡髯釋名曰頥下曰􅂡􅂡秀也物成乃秀人成而􅂡生也亦取須體長而後生也在頰耳旁曰髯隨口動揺髯髯然也􅀃文曰􅂡面上毛也春秋元命苞曰髮精散爲􅂡髯左傳宣二年傳曰宋城華元爲植廵功植將主也城者謳曰于思音顋于思棄甲復來于思多髯之貌左傳昭二年曰楚子享公于新臺使長鬛者相鬛􅂡也欲光夸魯侯左傳昭四年曰呉伐楚戰于長岸大敗呉師􅀗其乗舟餘皇餘皇舟名呉公子光請於衆曰喪先王之乗舟豈唯光之罪衆亦有焉請藉取之以救死藉衆之力以取舟也使長鬛者三人長鬛者多髯與吴異形狀詐爲楚人也濳伏於舟側曰我呼餘皇則對師夜從之三呼皆迭對楚人從而殺之楚師亂呉人大敗之取餘皇以歸言光有謀也史記曰􅁗太后抜嫪毒􅂡眉爲宦者又曰漢髙祖爲人隆凖而龍顔羙􅂡髯漢書曰霍光長七尺三寸白晢䟽眉目羙􅂡又曰朱􅀶爲琅邪太守曹􅁺吏皆移病卧􅀶問其故對曰故事二千石新到遣致意乃敢就職􅀶奮髯抵几曰觀齊兒欲以此爲俗耶乃行罷諸病吏白巾走出府門郡中大驚又王莽傳曰莽聞漢兵起愈恐欲外示自安染其􅂡髮進天下所徴淑女備嬪御東觀漢記曰呉良爲東平王所薦詔曰前見良頭􅂡皎然衣冠甚偉求賢助國宰相之職今以良爲義郎後漢書曰岑彭呉漢圍隗囂於西城公孫述將李育守上邽帝留盖延耿弇圍之車駕東歸勑彭書曰兩城􅀂下便可將兵南擊蜀虜人苦不知足即平隴復望蜀毎一發兵頭􅂡爲白又曰温序拜謁者遷護羌校尉序行郡至襄武爲隗􅅝將苟宇所拘劫宇謂序曰子􅀂與我并慮同力天下可圖也序大怒叱宇因以節撾殺人宇曰此義士死節可賜以劒序受劒銜􅂡於口顧左右曰旣爲賊所逼殺無令􅂡汚土遂伏劒死續漢書曰司馬直字叔異㓗白羙􅂡髯容貌儼然郷閭奉之如神魏志曰􅀄􅂫則及臨淄侯植聞魏氏代漢皆發服悲哭文帝聞植如此常從容曰吾應天受禪而聞有哭者何也則謂爲見問髯悉張欲正論以對侍中傅選搯則曰不謂卿也乃止又曰崔琰聲姿髙暢眉目踈㓪􅂡長四尺甚有威重朝士瞻望而太祖亦嚴憚焉後有曰琰怨謗者罰爲徒􅀠使視之辝色無撓太祖令曰琰雖見刑而通賔客虬􅂡直視􅀂有所忽遂賜死又曰任城王章爲北中郎將討烏桓有功歸太祖喜捋章􅂡曰黄􅂡兒定大竒魏略曰劉雄鳴詣太祖太祖執其手謂曰􅀌方入關夢得一神人即汝耶乃厚賜之後亡太祖平漢中來降太祖捉其􅂡曰老賊眞得汝矣又曰任城王性剛勇而黄􅂡北伐烏丸王聞之曰我黄􅂡定可使劉備使劉封挑戰王罵曰賣履舎長而使假子拒汝公乎我黄􅂡來擊之呉録曰朱桓還屯濡須權祖之桓奉觴曰臣當逺去願一捋陛下􅂡無復恨權慿几前席桓進捋􅂡曰臣今日眞謂捋虎􅂡也獻帝春秋曰張遼問呉降人曰向有紫髯將軍長上短下大便馬善射是誰降人荅曰是孫㑹稽也蜀志曰張􅁉爲劉璋從事侍坐其人饒􅂡先主嘲之曰昔吾爲涿縣特多毛姓東西南北皆諸毛也涿令稱曰諸毛繞涿居乎􅁉荅曰昔有作上黨潞長遷爲涿令者去官還家時人與書欲署潞則失􅃰署􅃰則失潞乃署曰涿君先主無湏故􅁉以此及之也先主常銜其不遜後誅之又曰馬超來降關羽護前書問諸􅁑亮亮荅書曰孟超當與益德争先未􅀂髯羽之絶倫羽多􅂡故亮謂之髯晉書曰羊祜旣卒武帝素服哭之甚哀是日大寒帝涕淚霑􅂡皆爲冰焉鄧粲晉紀曰湞陽令羊嗣貪而不治縣功曹吏共逐嗣嗣饒􅂡乃以嗣内羊䦨中始興太守尹虞聞大怒手劒功曹虞字王卿長沙人也又曰王彪之字叔武年二十􅂡􅁂皓白時人謂之王白􅂡又曰張華多􅂡常以帛􅆞之陸雲見之􅀏不能止又曰桓温少與沛國劉惔善惔常稱之曰温眼如紫石稜􅂡似蝟毛磔孫仲謀晉宣王之流晉中興書曰冉閔殺石鑒及羯胡數萬人于時人有髙鼻多􅂡者無不濫死崔鴻前趙録曰劉聦以讒慝故誅詹事曹光光臨刑舉止自􅀂謂刑者曰取席敷之無令土汚吾􅂡又曰劉元海姿儀魁偉身長八尺四寸􅂡長三尺餘當心有赤毫三根長三尺六寸又前􅁗録曰符堅每日自王丞相薨後􅂡髮中白王丞相猛也宋書曰山隂公主淫恣見禇彦回恱之以白帝帝令就之彦回不從主曰君髭􅂡如㦸何無丈夫意南史曰宋武帝狎侮群臣各有稱目多􅂡者謂之羊三國典略曰齊許惇長􅂡垂至帶省中號爲長鬛公文宣甞因酒酣握惇湏稱羙遂以刀截之唯留一握惇不敢復長人號爲齊髯公又曰侯景使宋子仙等執梁湘東王丗子方諸及中撫軍長史鮑泉司馬虞預于郢州是日子仙等至百姓奔告方諸以五色􅄂綵編鮑泉白􅂡對之􅀟六弗之信也告者旣衆方命闔門縣門未下子仙巳入方諸等膜拜而鮑泉遁于牀下子仙窺見泉素髯間綵疑愕憚之及其􅀍執莫不驚􅀏又曰李庶􅀺陽人魏大司農諧之子也以清卞毎接梁客徐陵謂其徒曰江北唯有李庶可語耳庶無􅂡髯人謂天閹崔諶甞翫庶曰教弟種􅂡取錐刺而爲竅以馬尾揷之丗傳諸崔多惡疾以呼沲爲墓田故庶荅之曰先以方廻施貴族藝眉有效然後樹􅂡邢邵􅀏謂諶曰卿不諳李庶何故犯之又曰周太子贇有失徳柱國王􅁤因内宴上壽捋武帝􅂡曰可愛好老公恨後嗣弱耳唐書曰太宗幸翠微宫授司農卿李緯爲民部尚書房􅀇齡時在京城留守㑹有自京師來者太宗問曰􅀇齡聞李緯拜尚書如何對曰􅀇齡但云李緯大好髭􅂡更無他語太宗遽改授緯洛州刺史又曰李勣病驗方􅂡􅁅可以療之太宗乃自剪􅂡爲其和藥勣頓首見血泣以陳謝帝曰吾爲社稷計耳不煩􅀷謝又曰李光弼母有􅂡數十莖長五六寸晏子曰湯長頭而髯伊尹蓬頭而髯孫卿子曰傅說之狀秃無􅂡眉莊子曰孔子徃見盗跖歸到東門外適遇柳下季曰不見車馬有行色得微徃見跖耶孔子曰然吾所謂無病而自炙疾走料虎頭編虎􅂡幾不免虎口哉孔叢曰子髙曰臣見臨屠啇焉身脩八尺􅂡髯如㦸面正紅白㓜女不敬之無徳故也又曰子思如齊齊之嬖臣羙􅂡眉立乎側君指而言曰貌可相易寡人不惜此􅂡眉於先生也子思荅曰非所願也但欲君修禮義冨百姓使伋得􅀉孥於君之境内則其庸多矣吕氏春秋曰豫讓欲報趙襄子滅􅂡去眉自刑以變容抱朴子曰有古疆者自言四千歳敢爲虛言云見堯爲人長大羙􅂡髮風俗通曰不舉生􅁂􅂡子俗說人十四五乃當生􅁂􅂡今生而有妨害父母也謹按周書靈王生而有髭王甚神聖亦克脩其職諸侯服享二丗休和安在其有害乎丗說曰鍾毓兄弟警悟過人毎有嘲語未甞屈躓毓語㑹聞安陵能作調試共視之於是與弟盛飾共載從東門至西門一女子􅀏曰車中央殊髙二鍾都不覺車後一門生云向已􅀍嘲鍾愕然門生曰中央髙者兩頭羝毓兄弟多􅂡故以此調之又曰郄超爲桓温記室叅軍有竒才多髭髯荆州爲之稱髯叅軍語林曰􅁃公道王尼子非唯事事勝人布置􅂡眉亦勝人我軰皆出其轅下俗􅀃曰有人詣謝益夀云向在劉丹陽坐見一客殊毛謝曰正是我家阿曕瞻多􅂡故云尓廣陵列士傳曰劉瑜字季節舉方正對䇿髙第人呼爲長􅂡方正列仙傳曰丁次卿漢順帝時人至娶婦家未見禮異婦出謁客􅂡髯􅊊然其家謝之次卿舉手向婦􅂡髯即去郭璞洞林曰東中郎叅軍周稚琰封􅁞蛾蛓蟲使璞射之璞曰射覆得此大落度必是􅁞蛾及毛蠹稚琰饒􅂡故因以調之也睫說文曰睫映目旁毛也釋名曰睫接也捶於匡而相接也漢書曰􅀽盎曰陛下居代時太后甞病二年陛下不交睫解衣謝承後漢書曰趙昱字元逹年十三母病二月昱慘慼消瘦眼不交睫列子曰晉國苦盗有郄雍者能察盗於眉睫之間而得其情晉使視盗千百無遺趙文子曰周諺有言見淵中魚不祥郄雍必死俄而羣盗殺之裴玄新語曰尹氏之鏡數睫照形蒸食曽不如三錢竹箄髑髏􅀃文曰髑髏頭也廣雅曰髑髏謂之顙顱也魏略曰王忠先因飢噉人五官將戲因從駕出行過冢間無何令俳取道邊死人髑髏繫着忠馬戯􅀏莊子曰列子行食於道見百歳髑髏搴蓬而指之曰唯予與汝未甞死未甞生也又曰莊子之于楚見空髑髏髐然有形擊之以馬捶因而問之曰夫子貪生理而爲此乎將子有亡國之事斧􅃏之誅而爲此乎將子有不善之行愧遺父母妻子之醜而爲此乎將子凍餒之患而爲此乎於是語卒援髑髏枕而卧夜半髑髏見夢曰子之談者似辯人也諸子所言皆生之累也死則無此矣子欲聞死之說乎莊子曰然髑髏曰死無君於上無臣於下亦無四時之事泛然以天地爲春秋雖南面王樂不能過也莊子不信曰吾使司命復生子形爲子骨肉肌膚反子父母妻子閭里知識子欲之乎髑髏􅀷矉蹙頞曰吾安能弃南面王樂而復爲人之勞乎南州異物志曰烏滸人得髑髏破之以飲酒盛弘之荆州記曰長沙浦坼縣有吕蒙冡中有髑髏極大蒙形旣長偉疑即蒙髑髏也裴淵之廣州記曰盧循襲廣州風火夜發奔逸者數千而巳循除燒骨數得髑髏三萬餘於江南洲上作大坈葬之今名爲共冡續搜神記曰永嘉五年髙榮爲髙平戍邏王時曹嶷賊冦離乱人民皆塢壘自固見山中火起飛埃絶爓十餘丈􅀣巔火焱響動山谷又聞人馬鎧甲聲謂嶷賊上人皆怕懼並嚴出欲擊之引􅀐到山下無有人但見碎火來灑人􅂁鎧馬毛鬛皆燒於是軍人走還明徃視山中無燃火處唯有髑髏百頭布散山中張衡髑髏賦曰張平子將逰目於九野觀化乎八方顧見髑髏委於路旁下據朽壤上􅀒玄霜平子悵然而問之子將并粮推命以夭逝乎奔喪此土流迁來乎爲是上智爲是下愚荅曰吾宋人也姓莊名周逰心方外不能自修公子何以問之對曰我欲告之於五嶽禱之於神祇起子素骨反子四支髑髏曰死爲休息生爲役勞冬冰之疑何如春水之消況我巳化與道逍遥與隂陽同其流元氣全其朴雲漢爲川池星􅀫爲珠玉雷電爲鼔扇日月爲燈燭合躰自然無情無欲不行而至不疾而速太平御覽卷第三百七十四
