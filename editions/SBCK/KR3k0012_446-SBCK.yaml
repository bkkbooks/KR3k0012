body:
  text: 人事部八十七品藻中晉書曰韋忠傳云裴頠爲僕射數言忠於司空張華華辟之辭病不赴人問其故忠曰吾茨簷賤士本無官情且茂先華而不實裴頠慾而無厭弃典禮而附賊后此豈大丈夫之所冝行耶又曰王戎有人倫鑒識嘗目山濤如璞玉渾金人皆欽其寳莫知名其器王衍神姿髙徹如瑶林瓊樹自然是風塵外物謂裴頠拙於用長荀朂工於用短陳道寜如束長竿又曰禇陶呉平召􅀘尚書郎張華見之謂陸機曰君兄弟龍躍雲津願彦先鳯鳴朝陽謂東南之寳巳盡不意復見禇生機曰公但未覩不鳴不躍者耳華曰故知延門之德不􅀌川岳之寳不匱矣又曰樂廣尚書令衛瓘朝之􅂄舊逮與魏正始中諸名士談論見廣而竒之曰自昔諸賢旣殁常恐微言將絶而今乃復聞斯言於君矣命諸子造焉曰此人之水鏡見之瑩然􅀂披雲而覩青天也又曰嵇紹始入或謂王戎曰昨於稠人中始見􅄞紹昂昂然􅀂野鶴之在雞羣戎曰君復未見其父耳又曰王戎㓜而頴悟神彩秀徹視日不昡裴楷見而目之曰戎眼爛爛如巖下電又曰張翰有清才善屬文而縱任不拘時人號爲江東歩兵又曰劉毅轉司頴校尉紏正豪右京師肅然司部守令望風投印綬者甚衆時人以毅方之諸葛豐蓋寛饒又曰樂廣少與􅀪農􅀭准相善准之二子曰喬曰髦皆知名於丗准使先詣裴頠頠性􅀪方愛喬有髙韻謂准曰喬當及卿髦少减也又使詣廣廣性清淳愛髦有神撿謂准曰喬自及卿然髦亦清出准歎曰我二兒之優劣乃裴樂之優劣也論者以爲喬雖有髙韻而神檢不足樂爲得之矣又曰劉頌守廷尉時尚書令史扈寅非罪下獄詔使考竟頌執據無罪寅遂得免時人以頌比張釋之乎又曰和嶠遷頴川太守爲政清簡甚得百姓懽心太􅀓從事中朗廋敳見而歎曰嶠森森如千丈松雖磥砢多節目施之大厦有棟梁之用又曰郗鑒傳云王敦嘗謂曰樂彦輔短才耳後生流宕言違名檢考之以實豈勝武秋耶鑒曰擬人必於其倫彦輔道韻平淡體識冲粹處傾危之朝不可得而親踈及愍懷太子之廢柔而有正武秋失節之士何可同日而言敦曰愍懷廢徙之際交有危機之急人何能以死守之乎以此相方其不减明矣又曰孫登傳云􅄞康從之遊三年問其所圖終不荅康毎歎息將别謂曰先生竟無言乎登乃曰子識火乎火生而有光而不用其光果在於用光人生而有才不用其才而果在於用才故用光在乎得薪所以保其曜用才在於識眞所以全其年今子才多識寡難乎免於今之丗去矣子無求手康不能用果遭非命又曰王湛傳云武帝亦以湛爲癡毎見濟輙調之曰卿家癡叔死未濟常無以荅及是帝又問如􅀄濟曰臣叔殊不癡因稱其羙帝曰誰比濟曰山濤以下魏舒以上時人謂湛上方山濤不足下比魏舒有餘湛聞曰欲處我季孟之間乎又曰陸機天才秀逸辭藻宏麗張華嘗謂之曰人常恨才少而子更患其多又曰陸雲刺史周浚召爲從事謂人曰陸士龍當今顔子也又曰王衍雋秀有令望虚心􅀇逺未嘗語利王敦過江常稱之曰夷甫處衆中如珠玉在瓦石間顧愷之作􅀞賛亦稱衍巖巖清峙壁立千仭又曰杜乂性純和羙姿容有盛名於江左王羲之見而目之曰膚􅀂凝脂眼如􅀧􅃮此神仙中人也桓彛亦曰衛玠神清杜乂形清又曰郭文傳温嶠嘗稱曰文有賢人之性而無賢人之才柳下惠梁􅄾之亞乎又曰羅含謝尚與含爲方外之好乃稱曰羅君章可謂湘中之琳琅又曰羅含桓温嘗與寮屬讌㑹含後至温問衆座曰此何如人或曰可謂荆楚之􅂎梓桓曰此自江左之秀豈唯荆楚而巳又曰薛兼少與同郡紀瞻廣陵閔鴻呉郡顧榮㑹稽賀循齊名號爲五儁􅀄入洛司空張華見而竒之曰皆南金也又曰郄超傳云沙門支遁以清談著名于時風流勝貴莫不崇敬以爲造微之功足參諸正始而遁常重超以爲一時之儁又曰郄超爲桓温參軍謝安與王坦之常詣温論事温令超帳中卧聽之風動帳開安􅀏曰郄生可謂入幕之賔矣又曰周顗傳曰􅁃亮嘗謂顗曰諸人咸以君方樂廣顗曰何乃刻􅀞無鹽唐突西施也又曰應詹弱冠知名性質素􅀪雅雖犯而弗之校以學藝文章稱司徒何邵見之曰君子哉􅀂人又曰桓温豪爽有風槩姿貌甚偉面有七星少與沛國劉惔善帝稱之曰温眼如紫石稜􅁂作蝟毛磔張格孫仲謀晉宣王之流亞也又曰劉惔寓居京口家貧織芒履以爲養雖蓽門陋巷晏如也人未之識唯王導􅀷器之後稍知名論者比之􅀽羊惔憙還吿其母其母聦明婦人也謂之曰此非汝比勿受之又有方之范汪者惔復憙母又不聽及惔年德轉昇論者遂比之荀粲又曰荀崧弱冠太原王濟甚相器重以方其外祖陳郡􅀽偘謂偘弟奥曰近見荀監子清虚名理當不及父德性純粹是賢兄軰人也又曰成公簡字宗舒東郡人也丗二千石性清素不求榮利潛心味道罔有干其志者黙識過人張茂先毎言公簡清静比楊子雲黙識擬張安丗又曰謝安揔角神識沉敏風宇脩暢善行書弱冠詣王濛清言良乆旣去濛子脩曰向客何如大人濛曰此亹亹而來逼人王導亦􅀷器之由是有重名又曰謝萬善屬文叙漁父屈原季王賈􅁩楚老龔勝孫登􅄞康四隱四顯爲八賢論其旨以處者爲優出者爲劣以示孫綽綽與徃反以體公識逺者則出處同歸又曰韓康伯傳云􅁃龢名重一時少所推服常稱康伯及王坦之曰思理倫和我敬韓康伯志力彊正吾愧王文度又曰王獻之嘗與兄徽之俱詣謝安徽之多言俗事獻之寒温而巳旣出客問安王氏兄弟優劣安曰小者佳客問其故安曰吉人之辭寡又曰禇裒與杜乂俱有盛名冠于中興譙國桓彛見而目之曰季冶有皮裏陽秋言其外無臧否而內有所褒貶也又曰王恭羙姿儀人多愛恱或目云濯濯如春月柳甞􅀍鶴氅裘渉雪而行孟永窺見之歎曰此真神仙中人也又曰王恭字孝伯少有羙譽清辯過人自􅀒才地髙華􅁪有宰輔之望與王忱齊名友善慕劉惔之爲人謝安常曰王恭才地可以爲將相宋書曰謝􅀪微叔父混特所敬貴號爲微子常云何逺剛躁􅀒氣阿容􅀶而無檢曜恃才而持操不篤晦自知而納善不周設復功濟三才終亦以此爲恨至如微子吾無間然又云微子異不傷物同不害正􅀂年造六十必至公輔又曰龔祈不應徴辟祈風姿端雅容止可觀中書郎范述見而歎曰此荆楚仙人也蕭子顯齊書曰王僧祐父逺爲光禄勲宋丗爲之語曰王逺如屏風屈曲能蔽風露陳書周􅀪正叔父捨毎與談論輙異之日觀汝神情頴晤清理警發後丗知名當出吾右又曰髙祖在京城嘗與諸將讌杜僧明周文育侯安都爲壽各稱功伐髙祖曰卿等悉良將也然而並有所短杜公志大而識闇狎下而嬌尊矜功不収其拙周侯交不擇人而推心過差居危履險猜防不設侯郎慠誕而無猒輕佻而肆志並非全身之道耳卒皆如其言隋書曰元善以髙頴有宰相之具嘗言於上曰楊素麤踈蘇威怯愞元胃元旻正似鴨耳可以付社稷者唯獨髙頴又曰蘇威治書侍御史梁毗以威領五職安繁戀劇無舉賢自代之心抗表劾威上曰蘇威朝夕孜孜志有逺大舉賢不闕何遽迫之顧謂威曰用之則行舎之則藏唯我與爾有是夫因謂朝臣曰蘇威不值我無以措其言我不得蘇威何以行其道楊素才辯無􅀟至􅀂斟酌古今助我宣化非威之匹也􅂫威􅀂逢乱丗南山四皓豈易屈哉又曰楊逹爲人􅀪厚有局度楊素毎言曰有君子之貌兼君子之心者唯逹耳唐書曰王珪嘗侍宴太宗謂珪曰郷識鑒清通尤善談論自房􅀇齡等咸冝品藻又可自量孰與諸子􅀇對曰孜孜奉國知無不爲臣不如􅀇齡才兼文武出將入相臣不如李靖敷奏詳明出納惟允臣不如彦􅀶處繁理劇衆務必舉臣不如戴胃以諌諍爲心恥君不及於堯舜臣不如魏徴至如激濁楊清嫉惡好善臣於數子亦有一日之長太宗􅀷然其言羣公亦各以爲盡巳所懷謂之磪論又曰馬周有機辯能敷奏􅀷識事端動無不中太宗甞曰我於馬周暫時不見則便思之中書侍郎岑文本謂所親曰吾見馬君論事多矣援引事􅀋楊摧古今舉要刪蕪㑹文切理一字不可加一言不可減聽之靡靡令人忘倦昔之蘇張終賈正應此耳然鳶肩火色騰上必速恐不能免耳又曰韋述時趙冬㬢孫逖王翰常遊其門趙冬㬢兄冬曰弟和璧居貞安貞頥貞等六人逖弟迪逌逈􅙝音起巡亦六人並詞學登科張􅀃曰趙韋昆季今之􅂎梓也又曰馮定字介夫􅀫之弟也儀貌壯偉與􅀫俱有文學而定過之貞元中皆舉進士時人比之漢朝二馮君呂氏春秋曰管仲有病桓公徃問之曰仲父之病病矣將何以敎寡人管仲對曰願君之逺易牙竪刀常之巫衛公子啓方也公曰昜牙烹其子以慊寡人慊快也猶尚可疑邪管仲對曰人之情非不愛其子子之忍將何有於君公又曰竪刀自害以近寡人猶尚可疑耶管仲對曰人之情非不愛其身其身之忍又將何有於君公又曰常之巫審於死生能去病病猶尚可疑耶管仲對曰死生命也痾病夲也君不用其命守其本而待常之巫彼將以此無不爲也公又曰衛公子啓方事寡人十五年其父死不敢歸􅂘猶尚可疑耶管仲對曰人之情無不愛其父父之忍將何有於君公曰諾管仲死盡逐之食不甘官不治病不起朝不肅居三年公曰仲父不亦過乎復召而反之明年公有病常之巫從中曰公將以某日薨昜牙竪刀相與作乱公令衛公子啓方以書社四十人衛公􅁣焉歎涕曰管子聖人之所見豈不逺哉􅀂死者有知我何面目以見仲父乎蒙衣􅃑而死絶于壽宫又曰呉起謂啇文曰事君果有命矣啇文曰何謂也呉起曰治四境之內成訓敎變習俗使君臣有義父子有序子與我孰賢啇文曰吾不􅀂子曰今日置質爲臣其主安重今日釋璽辭官其主安輕子與我孰賢啇又曰吾不􅀂子曰援捊一鼓敵人在前使三軍之士樂死􅀂生子與我孰賢啇文曰吾不􅀂子呉起曰三者子皆不吾􅀂也位在吾上命矣夫啇文曰善子問我我亦問子變丗主少羣臣相疑黔首不定當此之時屬之我乎屬之子乎呉起黙然不對少間曰然啇文曰是吾所以加於子之上也崔鴻前凉録曰張茂謂馬岌曰劉曜自古可誰等輩也岌謂曰曹孟德之流茂黙然岌曰孟德公族也劉曜戎狄難昜不同曜殆過之茂曰曜可方吕布關羽而云孟德不及豈不過哉岌曰孟德挾天子令諸侯仗大義討不庭曜一卒胡人用烏合之衆而能建威成大逆天下莫之當其不優歟茂曰天生胡以滅中國殆不可以人事論也􅁗記曰姚萇大破符登置酒髙㑹諸將各曰􅀂值魏武王㝷破此賊陛下將軍大過上嘆曰吾不如亡兄者四也長八尺五寸垂臂過􅂰人望而畏之一也當十万之衆與天下爭衡望麾直突前無横陣二也突覽古今講論道藝駕御羣賢収羅㑺異三也揔領大衆經履嶮難大小恱稱人盡死力四不如也又曰魏武王姚襄禮待楊亮亮奔桓温温問亮曰襄何如人荅曰天下傑也神明器度故是孫䇿之疇而雄武過之越絶書曰或問曰子胥范蠡何人也曰子胥勇而智范蠡智而明皆賢人也問曰子胥死范蠡去二人行違皆稱賢何也荅曰論語曰陳力就列不能者止事君以道言耳范蠡單身入越致主於霸有所不合故去也問曰不合何不死曰止去事之義也義無死子胥死者受恩􅀷也傳曰孔子去魯燔俎無肉曽子去妻藜蒸不熟微子去比干死孔子並稱仁行雖違其義同死與生敗與成其同奈何論語曰有殺身以成仁子胥重其信范蠡貴其義信從中出義從外入微子去者痛殷道也比干死者忠於紂也箕子亡者絶也忠信之至相爲表裏耳問二子孰逾乎曰以爲同耳華陽國志曰廣陵太守下邳陳登字元龍太尉球孫也有㑺才較天下士謂功曹陳喬曰閨門雍穆有德有行吾敬陳元方父子冰清玉㓗有德有言吾敬華子魚􅀶聞強識竒逸卓犖吾敬孔文舉雄姿傑出有王霸之略吾敬劉􅀇德零陵先賢傳曰劉備曰子􅀄即劉巴字也才智絶人如􅀌可用非􅀌者難獨任也亮亦曰運籌䇿於帷幄之中不如子􅀄逺矣􅀂提桴鼓㑹於軍門使百姓喜勇當與議之可陳武别傳曰武時人無察者頓丘閭遐薦之於軍府或問武當今可與誰爲輩遐曰方謝道堅不足比徐丗璋有餘道堅丗璋皆同時知名士也武聞之􅀏曰乃處我季孟之間乎衛玠别傳曰永和中舟陽尹劉眞長鎮西將軍謝仁祖啇略中朝士人遂及於玠或問杜􅀪治得方衛洗馬不謝曰安得相比其間可容數人丗􅀃曰􅄞中散語趙景眞卿瞳子白黒分明有白起之風限量小狹趙荅曰尺表能審琁衡之度寸管能測徃復之晷何必在大伹問識何如耳又曰諸名士共洛水上戯還樂令問王夷甫曰今日共㸔樂不王曰裴僕射善談名理混有雅具張茂先論史漢殊靡可聽我王安豐􅀃延陵子房亦超然者又曰劉萬安即道眞之子􅁃公所謂灼然王舉又云千人亦見百人亦見王右軍少時丞相云逸少何縁復減萬安又曰諸葛瑾弟亮及從弟誕並有盛名各在一國于時以爲蜀得其龍呉得其虎魏得其狗誕在魏與夏侯􅀇齊名瑾在呉呉朝服其􅀪雅又曰卞望之云郄公體中有三反方於事上好下接巳一反治身清貞而大脩計校二反自好讀書憎人學問三反也又曰王敦爲大將軍鎭䂊章衛玠避亂從洛投敦相見欣然談話弥日于時謝鯤爲長史敦謂鯤曰不意永嘉之末復聞正始之音阿平􅀂在當復絶倒時人以玠爲玉人語林曰謝碣絶重其婦張􅀇常稱其婦欲以敵之有濟尼者並遊張謝二家人問其二嫗優劣荅曰􅀇夫人神情散朗故有林下之風碣家婦清心玉映自是閨房之秀也三輔決録曰弭生字仲叔其父賤故張伯英與李㓜才書曰弭仲􅂛髙德羙名命丗之才非弭氏小族所有新豐瘠土所當出也郭㤗別傳曰㤗字林宗少遊汝南先過􅀽閬不􅀫而退徃從黄憲累日方還或問林宗林宗曰奉髙之器譬諸泛濫雖清而易挹叔度汪汪君子若千頃陂澄之不清撓之不濁不可量也太平御覽卷第四百四十六
