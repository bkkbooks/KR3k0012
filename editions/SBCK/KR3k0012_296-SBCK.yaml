  text: 太平御覽卷第二百九十六
  hash: sha256:5f04b8889e2dd15fc5bfc3dfbad8d32c800686a88a4b2e92463527cb16b14fb4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_296-1a}
body:
  text: 兵部二十七法令孫子曰法者曲制官道主用也曲制者部曲幡幟金鼓之制也官者百官之分用也道者糧路也主用者主軍費用卒未專親而罰之則不服不服則難用也卒巳親附而罰不行者則不可用也故合之以文齊之以武文仁武法是謂少取文恩武罰令素行以教其人也令素行則人服令素不行則人不服令素信著者與衆相得也厚而不能使愛而不能令亂而不能理譬如驕子不可用也言恩不可純任還爲巳害左傳曰晉侯之弟楊干亂行於曲梁行軍次也魏絳戮其僕僕御也晉侯怒謂羊舌赤曰合諸侯以爲榮也楊干爲戮何辱如之必殺魏絳無失也夫對曰絳無二志事君不避難有罪不避刑其將來辝何辱命焉言終魏絳至授僕人書僕人晉候御僕也將伏劒士魴張老止之公讀其書曰君乏使使臣斯司馬斯此臣聞師衆以順爲武順莫敢違軍事有死無犯爲敬守官行法雖死不敢有違君合諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及楊干無所逃罪懼自犯不武不敬不能致訓至於用􅃏用􅃏斬楊干之僕臣之罪重敢有不從以怒君心言不敢不從戮也請歸死於司宼致尸於司宼使戮也公跣而出曰寡人之言親愛也吾子之討軍禮也寡人有弟不能敎訓使干大命寡人之過也子無重寡人之過聽絳死爲重過敢以爲請請使无死晉侯以魏絳爲能以刑佐民矣反役與之禮食使佐新軍令欲顯絳故特爲設礼食史記曰齊景公時晉伐阿鄄阿今濟陽郡東阿縣鄄音絹今濮陽郡鄄城縣而燕侵河上齊師敗績嬰乃薦司馬穰苴文能附衆武能威敵齊景公召穰苴與語兵事大􅀃之以爲將軍將兵扞燕晉之師穰苴曰臣素卑賤君擢之閭伍之中加之大夫之上士卒未附百姓弗信人微權輕願得君之寵臣國之所尊者以監軍乃可於是景公許之使莊賈徃穰苴旣辝與賈約曰旦日日中㑹於軍門穰苴先馳至軍立表下漏待賈賈素驕貴不甚急親戚送之留飲日中而賈不至苴仆表決漏入行軍勒兵申明約束約束旣定夕時莊賈至穰苴曰何後期爲賈謝曰不佞大夫親戚送之故留穰苴曰將受命之日則忘其家臨軍約束則忘其親援桴鼓之急則忘其身今敵國深侵􅀖内騷動士卒􅁀露於境君不安席百姓之命皆懸於君何謂相送乎召軍正問曰軍法後期者云何對曰當斬遂斬莊賈以徇三軍三軍之士皆震慓燕晉之師聞之悉引而歸皆復所侵之地又曰孫武以兵法見於呉王闔閭闔閭曰子之十三篇吾尽觀之可以小試勒兵乎對曰可闔閭曰可試以婦人乎曰可於是許之出宫中羙人得百八十人孫子分爲二隊以王之寵􅁎二人各爲隊長皆令持㦸令曰汝知而心與左右手背乎婦人曰知武曰前則視心左視左手右視右手後即視背婦人曰諾約束旣畢乃設鈇􅃏即三令五申之於是鼓之右婦人大􅀏武曰約束不明申令不熟將之罪也復三令五申而鼔之左婦人復大􅀏孫子曰約束不明申令不熟將之罪也旣巳明而不如法者吏士之罪也乃欲斬左右隊長呉王從臺上觀見且斬愛􅁎大駭趣使下令曰寡人巳知將軍能用兵矣寡人非此二􅁎食不甘味願勿斬也武曰臣巳受命爲將將在軍君命有所不受遂斬隊長二人以徇用其次爲隊長於是復鼓之婦人左右前後跪起皆介者不拜也天子爲動容軾車使人稱皇帝敬勞將軍成禮而去旣出軍門群臣皆驚文帝曰嗟乎此眞將軍矣曩者灞上􅁄門軍􅀂兒戯耳其將固可襲而虜也至於亞夫可得而犯耶稱善者乆之後漢書曰􅀕遵從征河北爲軍市令舎中兒犯法遵格殺之光武怒命收遵時主簿陳副諌曰明公常欲衆軍整齊今導奉法不避是敎令所行也光武乃貰之貰猶赦也以爲刺姧將軍謂諸將曰當備􅀕遵吾舎中兒犯法尚殺之必不私諸卿謝承後漢書曰張温以司空加車􅀐將軍征韓遂丙辰引温見於崇德殿温以軍禮長揖不拜魏志曰曹仁字子孝少時不脩行撿及長爲將嚴整奉法常置科於左右案以從事呉志曰吕蒙圖􅀜羽定南郡盡得羽及將士家屬蒙撫慰約令軍中不得干歴人家有所求取蒙麾下士是汝南民取民家一笠以覆官鎧鎧雖公物蒙猶以爲犯軍令不可以郷里故廢遂垂涕斬之晉書李特載記曰益州刺史趙廞以李庠爲威宼將軍使斷北道庠素東羌良將曉軍法不用麾幟舉矛爲行伍斬部下不用命者三人部陣肅然蕭子顯齊書曰李安民爲徐州城局叅軍王廻素爲安民所親盗絹二疋安民流涕於門斬之厚爲殮􅀕軍府皆震服焉北史曰後魏孝文車駕南征以宋弁爲司徒東道副將軍人有盗馬靽者斬而徇於是三軍震懼莫敢犯法又曰後魏安定王休車駕南伐領大司馬孝文親行諸軍遇休以三盗人徇六軍將斬之有詔赦之休執曰不斬何以息盗詔日王者之體亦有非常之澤雖違軍法可特原之休乃奉詔帝謂司徒馮誕曰大司馬嚴而執法諸君不可不愼於是六軍肅然唐書曰闞稜容貌魁岸勇而多力每臨陣手持大刀長一丈一舉輙斃數人前無當者及杜伏威據有江淮之地兵皆出自群賊􅀋多放縱有相侵奪者稜必殺之雖親故無所捨令行禁止路不拾遺後從伏威入朝拜左領軍將軍輔公祏之反也稜從軍討之及與陳正通相遇方接戰稜脫兠鍪謂賊衆曰汝不識我邪何敢來戰其衆多稜舊之所部由是各無􅃲志或有遥拜者賊師遂潰又曰竇􅁤􅀄入蜀將其甥從軍以爲心腹嘗夜出呼之不以時至因斬之將吏重足而立見之者莫不股慓又曰哥舒翰好讀左氏春秋及漢書踈財重氣士多歸之河西節度王忠嗣以爲大計軍副使安思順爲大使翰常怏怏不能下之忠嗣遂使翰別爲將討吐蕃于新城以同對副使爲副副使不爲翰用頗沮之翰怒甚脫甲撾殺之投其屍於坑中軍中股慓又曰馬燧討李懷光於河中帥歩􅀐三萬次于絳乃分兵收下縣略禝山拔龍門降其將馮萬興任象王燧以兵圍攻絳州拔其外城其夜僞刺史王尅同與大將逹奚小進弃城走降其衆四千人又遣大將李自良谷秀分兵略定聞喜夏縣萬泉虞郷永樂猗氏六縣降其將辛兟音詵及兵五千人谷秀以犯令虜士女斬之以徇又曰德宗幸奉天詔以李晟爲神䇿行營節度使晟軍令嚴肅所過樵採無犯自河中由蒲津而軍渭北壁東渭橋以逼朱泚時劉德信將神䇿兵救襄城敗於扈澗聞難率餘軍前次渭南與晟合軍軍無統一晟不能制德信因至晟軍晟乃斬之復以數􅀐入德信軍中撫勞軍士無敢動者晟旣并德信軍軍益振又曰李晟收復都城朱泚乃與妻子及姚令言張芝等數千􅀐西走涇原餘兵麋散晟乃入􅔰丹鳯門舎軍於外朝晟處於右金吾仗舎下令曰軍中五日不得通家問違者斬之遣京兆尹李齊運告諭於衆百姓安堵秋毫無犯尚可􅀌軍人有擅取馬者晟大將髙明矅虜賊女妓一人司馬伷音胄取賊馬二疋晟立斬之軍士皆脅息莫敢仰視翌日晟以露布聞上覽之感泣百官皆岀涕因上壽稱萬歳曰李晟䖍奉聖謨盪滌凶慝然古之樹勲力復都邑者徃徃有之至於不驚宗廟不易市肆長安人不識旗鼔安堵如􅀄三代巳來未之有也上􅀏曰天生李晟爲社稷萬人不爲朕也百官再拜而退又曰永貞元年冬劉闢阻兵朝議討伐宰臣杜黄裳以爲獨任髙崇文可以成功元和元年春拜撿校工部尚書兼御史大夫充左神䇿行營節度使兼統左右神䇿奉天麟遊諸鎭兵討闢時􅀫將專征者甚衆人人自謂當選及詔出大驚崇文在長武練卒五千常若㓂至及是中使至長武夘時宣命而辰時岀師五千器用無闕者軍至興元軍中有折逆旅之匕箸者斬之以徇從閬中入遂却劒門之師解梓潼之圍又曰髙崇文平劉闢王師入成都介士屯于大造軍令嚴肅珎貨山積市井不移無秋毫之犯又曰郗士美爲昭義節度使朝廷討王承宗士美遣兵馬使王獻領卒一萬爲前鋒獻兇惡恃亂逗撓不進遽令召至數其罪斬之下令曰敢後出者斬士美親鼓之兵旣合而賊軍大敗下三營環柏郷屢以捷聞上大恱曰吾固知士美之能辦吾事于時四靣七八鎮兵共十餘萬以環鎮兾未有首功多犯法士美兵士勇敢畏法聲甚振承宗大懼指期有破亡之􅀔㑹詔班師至今兩河間稱之又曰李師道攻徐徐將王智興敗賊壁獲美妾智興懼軍士爭之乃曰軍中有女子安得不販此雖無罪違軍法也即斬之以徇韓子曰呉起爲魏武侯西河之守奏有小亭臨境呉起欲攻之乃􅀝車轅於北門外而令之曰有能徙此南門之外賜之上田上宅民莫之徙也或有徙之者遂賜之如令俄又置一石赤􅁰於東門之外而令之曰有能徙之於西門之外者賜之如􅀄民則爭徙之乃下令曰明日攻亭有能先登者仕之國大夫賜之上田上宅民爭上於是攻亭一朝而拔之尉繚子曰古之善用兵者能殺卒之半其次殺其十三其下殺其十一殺其半者威立海内殺其十三者力加諸侯殺其十一者令行士卒故曰百萬之衆不鬭不如萬人之尸萬人不死不如百人之賊賞明如日月信比如四時令嚴如斧􅃏而出卒有不死者未嘗聞也六韜曰武王問將何爲威太公曰殺一人萬人懼者冝殺之殺一人三軍不知雖多殺其將不重也淮南子曰勾踐決一獄不辜援龍淵而切其股血流至足故戰武士必死魏武軍令曰兵欲作陣對敵營先白表乃引兵就表而陣皆無讙譁明聽鼓音旗幡麾前則前麾後則後麾左則左麾右則右不聞令而擅前後左右者斬伍中有不進者伍長殺之伍長不進什長殺之什長不進都伯殺之督戰部曲將拔刃在後察違令不進者斬之一部受敵餘部有不進救者斬之武侯兵法曰軍有七禁一曰輕二曰慢三曰盗四曰欺五曰背六曰亂七曰誤此治軍之禁也􅀂朝㑹不到聞鼔不行乗寛自留迴避務止􅀄近而後逺喚名而不應軍甲不具兵器不備此謂輕軍有此者斬之受令不傳傳之不審以惑吏士金鼓不聞旌旗不覩此謂慢軍有此者斬之食不廪糧軍不部兵賦賜不均阿私所親取非其物借貸不還奪人頭首以獲功名此謂盗軍有此者斬之􅀂變易姓名衣服不鮮金鼓不具兵刃不磨器仗不堅矢不着羽弓弩無􅃶主者吏士法令不從此謂欺軍有此者斬之聞鼓不行叩金不止按旗不伏舉旗不起指麾不隨避前在後縱發亂行折兵弩之􅀔却退不􅃲或左或右扶傷舉死因託歸還此謂背軍有此者斬之出軍行將士卒爭先紛紛擾擾軍􅀐相連咽塞道路後不得前呼喚喧譁無所聽聞失行亂次兵刃中傷長將不理上下縱横此謂亂軍有此者斬之屯營所止問其郷里親近相隨共食相保呼召不得越入他位干誤次第不可呵止度營岀入不由門户不自啓白姧邪所起知者不吿罪同一等合人飲食阿私所受大言驚語疑惑吏士此謂誤軍有此者斬之衛公兵法曰古之善爲將者必能十卒而殺其三次者十殺其一三者威振於敵國一者令行於三軍是知畏我者不畏敵畏敵者不畏我如曰盡忠益時輕生重節者雖讎必賞犯法怠情敗事貪財者雖親必罰服罪輸情質直敦素者雖重必捨遊辭巧飾虛僞狡詐者雖輕必戮善無微而不賛惡無纎而不貶斯乃勵衆勸功之要術也昔馬謖音縮軍敗葛亮對泣而行誅郷人盗笠吕蒙先涕而後斬馬逸犯麥曹公割髮而自刑兩􅁺辭屈黄蓋詰問而俱戮故知威克其愛雖少必濟如愛勝其威雖多必敗盖賞罰不在重在必行不在數在必當故尉繚子曰呉起與􅁗人戰戰而未合有一夫不勝勇乃怒而前獲首而返呉起斬之吏曰此壯士也不可斬呉子曰雖壯士不從令者必斬之又曰褰旗斬將䧟陳摧鋒上賞破敵所得資物僕馬等並給戰士毎收陣之後禆將虞􅃸軰收歛對揔管均分之與敵􅃲旗頭􅀍傷救得者重賞漏泄軍事斬之背軍逃走斬之後期斬之有故不坐行列不齊旌旗不正金革不鳴斬之與敵私交通斬之言語書䟽並同或􅀃道釋祈禱􅀑神隂陽卜筮灾祥訛言以動衆心并與其人徃還言議斬之無故驚軍叫呼奔走謬言煙塵斬之凡令覘􅀱或更相推託謬􅀃事冝兼復漏泄者斬之吏士所經歷侵掠者斬之姧人妻女及將婦女入營斬之不戰而降敵没其家凡有私讎須先言令其避仇􅀂不言因戰陣報復者斬之布陣旗亂吏士驚惶罪在旗頭斬之陣定或輙進退或對敵亂行者前後左右所平之行便斬之或有弓弩巳注失而􅅆頋者或干行失位者後行斬之前行不動行斬干失之行守圍不固一火及主吏並斬之遇敵攻圍危急􅀂前後左右部隊不救致䧟者全部隊皆斬之設竒伏掩襲務應機速捷前將先合後將即副進退應接乖者並斬之爲敵所乗失旗鼔節􅃏罪全陣斬之戰敵旗頭􅀍敵殺爭得屍首免坐不得者一旗並斬之凡戰敵失主將隨從者皆斬之一將禦敵禆將巳下等􅏔主率不齊力同戰更相救助者任便斬之吏士雖破敵濫行戮殺發􅃁焚廬踐稼穡伐樹木者斬之禽獲敵人或有來降者直領見揔帥不得輙訪問敵中事􅀂違因而漏泄者斬之破敵先虜掠者斬之入敵境同凡隱欺破虜所收獲及吏士身死有欺隱其資物兼違令不收恤者斬之違揔率一時之令斬之太平御覽卷第二百九十六
