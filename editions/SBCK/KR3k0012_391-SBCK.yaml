front:
  text: 太平御覽卷第三百九十一
  hash: sha256:c18183355726e04225d333422847787af87f4e88901c9166d199e6cbde9561a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_391-1a}
body:
  text: 人事部三十二􅀏說文曰啞􅀏也咥大􅀏听􅀏貌也忻􅀏喜也易同人卦曰先號咷而後􅀏又震卦曰震來虩虩􅀏言啞啞又旅卦曰鳥焚其巢旅人先􅀏後號咷毛詩鄁栢舟終風曰終風且􅁀頋我則􅀏謔浪􅀏傲中心是悼又碩人曰巧􅀏倩􅀆美目盻􅀆又氓曰兄弟不知咥其􅀏矣咥咥然􅀏緫角之宴言􅀏晏晏信誓旦旦晏晏和柔也又􅖋蕭曰燕􅀏語􅀆禮記檀弓曰魯人有朝祥而暮歌者子路􅀏之􅀏其爲樂速也夫子曰由爾責於人終無巳夫三年之喪亦巳乆矣禮斗威儀曰君乗土而王其民好大􅀏樂動聲儀曰人情喜則􅀏左傳宣下曰晉侯使郄克徵㑹于齊齊頃公帷婦人使觀之郄子將登婦人􅀏於房又昭四曰晉韓起聘于鄭鄭伯享之子産戒曰苟有位於朝無有不共恪孔張後至立於客間執政禦之適客後又禦之適縣間客從而􅀏之事畢冨子諌曰夫大國之人不可不慎也幾爲之􅀏而不陵我言數見􅀏則心陵侮我也又昭六曰晉士弥牟逆叔孫于箕叔孫使梁其踁待于門内曰餘左頋而欬乃殺之右顧而􅀏乃止又昭七曰昔賈大夫貌惡娶妻而羙三年不言不􅀏御以如臯射雉􅀗之其妻始􅀏而言賈大夫曰才之不可以巳我不能射女遂不言不􅀏榖梁傳曰成公曰季孫行父秃晉郄克􅆌衛孫良夫跛曹公子首傴同聘於齊齊使秃者御秃者􅆌者御􅆌者跛者御跛者傴者御傴者蕭同叔子處臺􅀏之客不悅相與立胥閭而語移日不解齊有知者曰齊患必在此始也又昭公曰楚靈王圍吴朱方執齊慶封將殺之使人令於軍中曰有若齊慶封殺其君者乎封曰子一息我亦且一言曰有若楚公子圍殺其兄之子麏而代之爲君者乎軍人粲然皆􅀏論語憲問耻曰子問公叔文子於公明賈曰信乎夫子不言不􅀏不取乎公明賈對曰以吿者過也夫子時然後言人不厭其言樂然後􅀏人不厭其􅀏義然後取人不厭其取又陽貨曰子之武城聞弦歌之聲夫子莞爾而􅀏曰割雞焉用牛刀莞爾小􅀏皃史記曰吴王問孫子兵法孫子曰願得大王寵􅁎二人以爲軍陣長吴王曰諾使二夫人爲軍隊長各將一隊令宫女三百􅀍甲而立告以兵法令隨鼓進退令曰聞一皷皆莊二鼓操兵三鼓皆爲戰形於是宫女皆掩口而􅀏孫子操枹擊鼓三令五申其􅀏如故孫子怒目如明星聲如駭䖍髪上衝冠􅁂旁絶纓頋謂執法曰取鈇鑕引夫人斬之又曰有躄者盤散行汲趙平原君羙人居樓上臨見大􅀏之明日躄者到門曰臣不幸􅜡病而君之後宫臨而􅀏臣臣願得􅀏臣者頭應曰諸居歳餘賔客門下舎人稍稍引去者過半平原怪之一人前對曰以君之不殺􅀏躄者君爲愛色而賤士即去耳平原乃斬羙人頭自造門進躄者因謝焉其後門下乃復稍稍來又曰髙祖奉玉巵爲太上皇夀曰始大人常以臣無頼不能治産業不如仲力今某之業所就孰與仲多殿上羣臣皆呼萬歳大􅀏爲樂又曰孟嘗君之趙趙平原君客之趙人聞孟嘗君賢皆出觀之皆􅀏曰始以薛公爲魁然也今視之􅆌小丈夫耳漢書曰公孫弘爲人談􅀏多聞師古曰善於談􅀏而又多聞也又曰匡衡字稚圭好學諸儒爲之語曰無說詩匡鼎來匡􅀃詩解人頥如淳曰使人􅀏不能止東觀漢記曰光武微時與鄧晨觀䜟云劉秀當爲天子或言國師公劉秀當之光武曰安知非僕乎建武三年上徴鄧晨還京師數讌見說故舊平生爲忻樂晨從容謂帝曰僕竟辨之帝大􅀏又曰􅀄桓榮遭倉卒困厄時嘗與族人桓元卿俱捃拾投閑輙誦詩元卿謂榮曰卿但盡氣爾當空復施用時乎榮􅀏而不應後榮爲太常元卿來􅀱榮諸子謂曰平生􅀏君盡氣今何如元卿曰我農民安能預知此又曰桓榮爲􅀶士入㑹庭中詔賜竒菓受者皆懐之榮獨舉手奉以拜帝􅀏止之曰此真儒生也愈見敬厚魏志曰賈詡字文和文帝爲五官將而臨淄侯植才名方盛各有黨有奪宗之議太祖又問詡嘿然不對太祖曰與卿言而不荅何也曰思􅀽夲􅀄劉景昇父子也太祖大􅀏於是太子遂定又曰明悼毛皇后父嘉夲典虞車工卒􅁀富貴明帝令朝臣㑹其家飲宴其容止舉動甚癡騃語輒自謂侯身時人以爲􅀏蜀志曰馬忠爲人寛濟有度量伹談啁張流切大􅀏忿怒不形於顔色王隱晉書曰杜預伐吴軍入城至都督孫歆帳下生將歆詣預王濬先列得歆頭而預生送歆洛中大􅀏晉中興書曰石勒與李陽相近陽性剛愎毎􅀊與爭漚麻池共相打撲互有勝負勒貴召陽引入言及平生酒醋宣陽肘曰卿年老臂中故有力不頗復與人􅋐耶孤徃昔數􅀍卿尊拳卿亦數遭􅀌毒手因大􅀏賞賜甚厚即日拜陽奉車都尉除始興太守時有酔胡乗馬徑入府門勒問門吏馮翥向走馬入門爲是何人而不彈白翥見問惶遽誤對忘諱向有醉胡乘馬馳來即以呵問胡人難與語非小吏所制勒􅀏曰胡正自難與言其後章武太守樊坦入辭居貧衣服甚陋曰樊章武貧耶朝服何以壞惡坦性踈謬對曰頃遇羯胡姿財蕩盡是以窮弊勒大􅀏曰羯胡賊乃爾大惡取君物盡坦汗流而不敢謝勒賜坦衣恕而不問蕭子顯齊書曰徵張敬児爲護軍將軍常侍如故敬兒武將不習朝儀聞當内遷乃於宻室中屏人學揖讓荅對空中俯仰如此竟日妾待􅀼窺􅀏焉崔鴻十六國春秋後趙録曰桃豹字安歩范陽人少時以膽勇騎射稱甞攘臂大言曰大丈夫遭遇魏太祖不封萬户侯位上將者非丈夫也時􅀋􅀏之豹罵言爾䑕子軰安知君子豹變之志乎後起中原豹爲十八􅀐之雄事勒甚㳟又南燕録曰慕容德建平四年妖賦王始聚衆於太山萊蕪谷自稱太平皇帝置署公卿父固爲太上皇兄林爲征東弟􅁗爲征西討擒之將刑焉市人皆罵之曰何爲妖妄自貽族㓕父兄今並何在始曰太上皇蒙塵於外征東征西爲亂兵所害朕躬雖有復何聊賴其妻趙氏怒之曰君正坐口過以至於此如何臨死猶有狂言始曰皇后何不逹天命自古及今豈有不亡之國行刑者以刀鐶築之始曰朕當崩終不改號德聞而􅀏謂左右曰熒惑之人死由狂語何可不殺南史曰宋司徒禇彦回送相州刺史王僧虔閣道壊墜水僕射王儉馬驚跣下車謝超宗撫掌􅀏曰落水三公墮車僕射唐書曰馬周䟽曰人主每見前代之亡則知其政敎之所由喪而皆不知其身之失是知殷紂􅀏夏桀之亡而幽厲亦􅀏殷紂之滅隋煬帝大業之􅀄又􅀏齊魏之失國今之視煬帝亦猶煬帝之視齊魏不可不誡又曰李義府貌狀温恭與人語必嬉怡微􅀏而􅄶忌隂賊旣處權要欲人附巳微忓意者輙加傾䧟故時人言義府􅀏中有刀戰國䇿曰楚王遊于雲夢有狂兕觸車徑輪彎弓而射應發而殪仰天而􅀏曰樂矣今日之遊萬歳千秋之後誰與此同樂乎安陵君泣涕數行而進曰臣入則侍綸席出則陪萬乗萬歳千秋之後願得身滅黄泉先辱螻蟻王大恱晏子曰景公置酒太山之上酒酣公四靣望喟然歎曰寡人將去此堂堂國而死耶左右泣者三人曰臣細人也猶將難死而况公乎晏子搏髀仰天大􅀏曰樂哉今日之飲也公怒曰􅀏何也對曰臣見怯君一䛕臣三是以大􅀏公慙而更辭老子曰下士聞道大􅀏之不􅀏不足以爲道列子曰晉文公出㑹欲伐衛公子鉏仰而􅀏公問何􅀏曰臣之隣人有送其妻適私家者道見桑婦悅而與言然頋視其妻亦有招之者臣􅀼􅀏之公悟其言乃引師還未至而有伐其北鄙者矣莊子曰齊桓公田於澤見􅀑焉公反誒昔熈詒音怡爲病數日不出齊士有皇子告敖者曰臣聞野有委虵惡聞雷車之聲則捧其首而立見者殆乎霸公輾然􅀏曰此寡人所見也不終日而病去又曰造適不及􅀏獻􅀏不及排所造皆適則忘適矣故不及􅀏排者推移之謂也夫禮􅂘必哀獻􅀏必樂哀樂存懷則不能與適推移矣又曰盗跖謂孔子曰人上壽百􅀊中壽八十下壽六十除病瘦死䘮憂患其中開口而􅀏者一月之中不過四五日而巳矣鄧析子曰故體痛者口不能不呼心悅者顔不能不􅀏孟子曰曽子曰脇肩謟􅀏病乎夏畦脇肩踈體也謟􅀏強􅀏也此言其言勞苦甚於仲夏之月治畦灌園者勤也吕氏春秋曰戎甞冦周幽王擊鼓諸侯皆至褒姒大恱而􅀏王欲褒姒之􅀏數數擊鼓諸侯至無冦及真冦至擊鼔而諸侯不來遂爲戎所㓕又曰強令之􅀏則不樂強令之哭則不悲不由中心也淮南子曰強哭者雖疾不哀強歡者雖􅀏不樂戴哀者見歌而泣戴樂者見􅂘而􅀏說苑曰楚魏㑹於晉陽將以伐齊齊王患之使人召淳于髠曰楚魏謀欲伐齊願先生與寡人共之淳于髠大􅀏而不應王怫然作色曰先生以寡人國爲戲乎淳于髠對曰臣不敢以王國爲戲也臣憐之祠田也以篋飲與一鮒魚其祝曰下田洿耶得榖百車洿耶下田也雞堁者冝禾雞堁雞肝黒土臣􅀏其所以祠者少而所求者多王曰善賜之千金革車百乗立爲上卿又曰趙簡子舉兵伐齊有􅀍甲而􅀏者簡子曰子何􅀏對曰臣乃有􅀫􅀏簡子曰有以說之則可無則死對曰當桑之時臣隣家父與妻俱之田見桑中女因追之不能及其妻怒而去之臣􅀏其曠也簡子曰今吾伐國失國是吾曠也還師而歸論衡曰天怒則隆隆雷聲天喜應啞啞而􅀏郍不聞􅀏也桓子新論曰􅀜東語曰人聞長安樂則出門西向􅀏知肉羙味則對屠門而大嚼郭子曰王淳與婦鍾氏共坐見武子從庭前過淳謂婦曰生兒如是足慰人意婦􅀏曰若使新婦得配叅軍生兒故可不翅如此叅軍是渾中弟名淪字太冲爲晉文王大將軍從征壽春遇疾亡時人惜焉丗說曰二陸入洛而士龍不詣張公公問士衡雲何以不來機曰有疾􅂲公不悉故未敢自見俄而雲詣華華爲人多姿質又好帛􅆞䰅雲見而大􅀏不能自巳士龍甞着縗幘上舡因水中自見其影便大􅀏不能巳幾落水中又曰王大將軍尚主如厠見􅃮箱中盛乾􅀥以塞鼻王言厠上菓食遂爲之盡旣還婢擎金􅃮盤盛水琉璃椀盛澡豆王因倒豆着水中飮之謂是乾飯羣婢莫不􅀏又曰殷荆州有所識作賦示之殷甚以爲有才語王恭適見新文甚可觀便於手中亟出之王旣讀殷􅀏不自勝王看竟旣不􅀏亦不言好惡但以如意􅀧之而巳殷悵然自失語林曰吊王武子客正􅂘見孫子荆驢鳴變聲成􅀏又曰董昭失􅀔乆爲衛尉昭乃厚加意於侏儒正朝大㑹侏儒作董衞尉啼面叙太祖時事舉坐大􅀏明帝悵然不怡月中以爲司徒曹暪別傳曰太祖爲人佻易無威儀毎與人談論戯弄言确盡無所隱及歡恱大􅀏至以頭投諸案中肴膳皆沾汚巾幘璅語曰師曠御晉平公鼓瑟輟而􅀏曰齊君與其嬖人戲墜於牀而傷其臂平公命人書之曰某年某月齊君戲而傷問之於齊侯􅀏曰然有之東方朔別傳曰朔於上前射覆中之郭舎人亟屈􅀍榜上輙大􅀏又曰南山有木名曰柘良工材之可以射射中人情如掩兔舎人數窮何不早謝上乃搏髀大􅀏也荀朂別傳曰司徒鈌帝問其人朂曰魏文用賈詡爲公孫權􅀏之神異經曰東方有人不妄語恒􅀏倉卒見之如癡張華注曰今人癡好􅀏李此捜神記曰孫琳殺徐光而無血後綝上蔣陵有大風盪綝車頋見光在松樹上附手􅀏之俄而綝誅蜀記曰譙周字允南巴西人體皃素朴無造次辯論之才諸葛亮領益州牧命周爲勸學從事􅀄見左右皆􅀏旣出有司請推􅀏者亮曰􅀌猶不能忍况左右乎黄義仲父廣記曰合浦尹牙爲郡主簿太守到官三年不􅀏牙問其故曰父爲太尉所殺牙乃辭至洛爲大尉養馬三年断其頭而還南正論曰搔癬之爲悅先􅀏而後愁養生要訣曰人語􅀏欲令至少不欲令聲髙􅀂過誤􅀏損肺膓精神不足楚詞九歌曰􅀂有人􅀆山之阿披薜荔􅀆帶女蘿旣含睇􅀆又冝􅀏宋玉登徒子賦曰腰如豹素齒如含貝嫣然一􅀏惑陽城迷下蔡太平御覽卷第三百九十一
