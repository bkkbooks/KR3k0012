front:
  text: 太平御覽卷第五百九十八
  hash: sha256:1e777da306a11d461934b7ed1d059de6731befd6da0aec4beffa8e8b46cd540a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_598-1a}
body:
  text: 文部十四符契劵鐵劵過所零丁符􅀃文曰符信也漢制以竹長六寸分而相合釋名曰符付也書所勑命於上付使傳行之文心雕龍曰符者孚也徴召防僞事資中孚三代玉瑞漢丗金竹末代從省代以書翰矣史記曰􅁗昭王破趙長平又進圍邯鄲魏昭王之子無忌號信陵君其姉爲趙惠文王弟平原君夫人平原君數遺公子書請救於魏魏王使將軍晉鄙將十萬衆救趙實持兩端以觀望平原君使者相屬謂公子曰今邯鄲旦暮降􅁗魏救不至獨不憐公子姉也公子患之過侯嬴問屏人語曰嬴聞晉鄙兵符常在王卧内而如􅁎最幸力能竊之嬴聞如􅁎父爲人所殺公子使客斬其仇頭敬進如􅁎􅁎爲公子死無所辭公子誠一開口以請如􅁎􅁎必許諾公子從其計如􅁎果盗晉鄙兵符與公子遂矯魏王令奪晉鄙兵進擊􅁗􅁗軍遂解又曰吕不韋􅀃華陽夫人請立子楚夫人然之承太子問從容言子楚質於趙者絶賢來往者皆稱譽之乃涕泣曰妾幸得充後宫不幸無子願得子楚亡以爲嫡嗣以託妾身安國君許之乃與夫人刻玉符約以爲嫡漢書曰文帝二年九月􅀄與郡守相爲銅虎竹使符應邵曰銀虎符第一至第五國家當發兵遣使者郡合符符合及聽之竹使以箭五枚長五寸鐫刻􅂐書第一至第五張晏曰符以代古之圭璋從簡易終軍從濟南嘗詣􅀶士歩入􅀜􅀜吏與軍繻張晏曰繻音湏繻符書帛裂而分之臣瓉以爲漢岀入關用傳猶今之過所軍弃繻而去後爲使建節岀􅀜􅀜吏識之曰此使者迺前弃繻生也後漢書曰􅀄禁網尚簡但以璽書發兵未有虎符之信杜詩上䟽曰臣聞兵者國之凶器聖人所愼舊制發兵以虎符其餘徴調竹使而巳符竹未合㑹取爲大信所以明著國命歛持威重也間者發兵但用璽書或以詔令如有姦人詐僞無由知􅁴愚以爲軍旅尚興賊虜未殄徴兵郡國冝有重愼可立虎符以絶姦端昔魏之公子威傾鄰國猶假兵符以解趙圍􅀂無如􅁎之仇則其功不顯事有煩而不可省費而不得已盖謂此也書奏從之漢記曰延嘉五年長沙賊起攻没蒼梧取銅虎符太守甘定刺史侯輔各奔出城又曰郭丹字少卿􅀄之長安買符以入函谷關歎曰丹不水大遣使者迎夫人忘持符使者至請夫人曰王召宫人皆以符令使者不持符妾不敢從使者而行使者反取反取符未還到大水至臺弛壞夫人流而死王曰嗟乎夫守義死不爲苟處約持信以成其貞乃號曰貞姜契劵釋名曰劵綣也相約束綣綣爲限以別也大書中央破別之契刻也刻識其數也􅀃文曰劵契也別之書以刀刻其旁也故曰契也漢書曰髙祖微時好酒及色從王媪武􅀒貰酒時飲醉卧武􅀒王媪見其上有怪髙祖毎酤留飲酒讎數倍及見怪歳竟兩家常折劵弃責以簡牘爲契劵旣不徴索故折毁之弃其所􅀒也楚漢春秋曰髙帝􅀄侯者皆書劵曰使黄河如帶㤗山如礪漢有宗廟無絶丗也東觀漢記曰樊重字君雲南陽人家素冨外孫何氏兄弟争財重耻之以田二頃解其忿縣中稱美推爲三老年八十餘終其所假貸人間數百萬遣令焚削文契債家聞者皆慙争往償之諸子從勑竟不肯受晉書曰諸王官司徒吏應給職使者毎􅀊先計偕文書上道五十日宣勑使使各手書書定見破劵諸送迎者所受郡別校數冩朱劵爲簿集上宋書曰頋綽覬之子也有私財甚豐郷里士庻多􅀒債覬之禁不能止及覬之爲呉郡太守出文劵一大厨悉令焚之宣言逺近皆不湏還綽懊歎弥日唐書曰太宗時東謝渠帥來朝東謝者南蠻之别種也在黔安之東地方千里其俗無文書刻木爲約又曰羅譲爲福建觀察使兼御史中丞甚著仁惠有以女奴遺譲者譲問其所因者曰本某處家人兄姉九人皆爲官所賣其留者唯老母耳譲􅃤然焚其劵書以女奴歸其母夣書曰劵契爲有信夣得劵契有信士也文心雕龍曰契者結也上古純質結繩執契今羌胡徴數􅀒販其遺風也又曰劵者束也明白約束約束以備情僞自形半分故周稱判書古有鐵劵以堅信誓王褒髯奴則劵之諧也戰國䇿曰孟嘗君使馮驩収責於薛曰責畢市吾家所寡者馮驩召民畢集以責賜民因燒其劵還見孟嘗君曰君家所寡者義也臣竊矯命舎責以賜民此爲君市義也魏子曰仲尼無劵契於天下而德著於古今善惡明也王褒約僮曰蜀郡王子淵以事到湔上寡婦楊惠舎惠有夫時奴名便子淵倩奴行酤酒便拽大杖上家顛曰大夫買便時但要守􅃁不要爲它人男子酤酒子淵大怒曰奴寕欲賣邪惠曰奴父訝人人無欲者子淵即决買劵之奴復曰欲使皆上劵不上劵便不能爲也子淵曰諾劵文曰神爵三年正月十五日資中男子王子淵從成都安志里女子楊惠買亡夫時户下髯奴便决賈萬五千奴當從百役使不得有二言晨起早掃食了洗滌浚渠縛落鉏園研陌杜髀諀地刻犬枷屈竹作杷削治鹿盧居當穿臼􅅞帚栽芋鑿斗織履作鹿黏雀張烏結網捕魚種薑養羊長育豚駒二月春分披椶種􅀲作折瓠別茄披䓗焚槎發芋鷄鳴起春魚落三重調治馬臚滌柸整案園中柭䔉斵蘇切脯飲酒裁得染脣漬口不得傾盃覆斗用錢推紡堊敗㯶索綿席買席往來都洛當爲婦女求脂澤轉出旁蹉牽犬販鵝武都買茶楊氏池中掘荷入市不得夷蹲旁卧惡言醜罵㯶栟橺也皮可爲繩作也音鑿蜀土收芋皆窖藏之至春乃發馬户水門也蜀每落流水養魚欲食乃取之訪堊白墡地蹉市名武都縣岀名茶楊氏池岀好多作刀矛持入益州貨易羊牛自教精慧不得癡愚持斧入山斷輮裁轅􅀂有餘殘當作俎几木履及彘槃焚薪作炭石礨薄岸治舎盖屋書削代牘日暮欲歸當送乾薪兩三束四月當披九月當穫十月拔豆掄夌窖芋南安拾栗採橘持車載輳多取蒲茅盖作繩索兩墮所無爲當編蔣織薄植種桃李梨柿柘桑三丈一樹八尺爲行果􅀋相從從横相當果熟収歛不得吮嘗犬吠當起驚告鄰里棖門柱户上樓擊鼔持楯曵矛還落三周勤心疾作不得遨遊奴老力索種莞織席事訖休息當春一石夜半無事浣衣當白􅀂私錢主給賔客奴不得有姧私事當關白奴不聽教當笞一百讀劵文適訖辭窮詐索仡仡叩頭兩手自縛目淚下落􅈹涕長一尺審如王大夫言不如早歸黄土陌丘蚓鑚額早知當􅈛王大夫酤酒真不敢作惡也輮車輞也疊石竹籠盛石以薄岸也豕槃猪槽也南安縣出摽掄麥種麥也十月民輸租載輳有利也漢時官不禁報怨民家皆作髙樓致其上有急則上樓擊以告邑里令救助也石崇奴劵曰余元康之際至在滎陽東住聞主人公言聲大髙湏􅁷出趣吾車曰公府當怪吾家嘵嘵邪中買得一惡羝奴名冝勤身長九尺餘力舉五千斤挽五石力弓百歩射錢孔言讀書欲使便病日食三斗米不能柰何吾聞公賣不公喜便下絹百疋聞請吾曰吾胡王子性好讀書公府事一不上劵則不爲公府作劵文曰取東海巨塩東齊羝羊朝歌浦薦八板㸠牀眞之安邑梨栗之郷常山細縑趙國之編許昌緫沙房之綿作車當取髙平英榆之轂無尾髑髏之狀太良白槐之輻茱茰之輞河東亂櫛桑轅太山桑光長安􅀟入白烏釘鏁巧手岀於上方見好弓朴可斫千張山隂青烏嘷柘桑張金好墨過市數之蠡开市豪筆備郎冩書皥角道金案玉椀冝勒供筆更作多辭乃歛吾絹而歸邵氏家傳曰邵仲金好賑施年八十一臨卒取其貸錢物書劵自於目前焚之曰吾不能以德教子孫不欲復以賄利累之及貸者還錢子孫不受曰不能光顯先人豈可傷其義乎鐵劵東觀漢記曰桓帝延熹八年妖賊盖登稱太皇帝有壁二十珪五鐵劵十一後伏誅晉中興書曰􅀄閔帝在關中與氐羗破鐡劵約不役使又曰應詹督天門等郡天門武陵谿蠻並反詹誅其魁帥餘皆當降自元康巳來政令不洽谿蠻懷化數郡無憂其後州郡所有敗唯詹獨保之一境三國典畧曰梁任果降同果字静鸞南安人也丗爲方隅豪族仕於江左志在立功太祖嘉其逺來待以優禮後除始州刺史封樂安公賜以鐡劵聽丗傳襲又曰侯景圍臺城陳昕􅀃范桃捧令率所領二千人襲殺王偉宋子仙帶甲歸降挑捧許之使昕夜入官城宻啓梁主梁主大恱命使納之并鐫銀劵賜桃捧曰事定日當封汝爲河南王即有景衆并給金帛女樂以報元功而太子恐其詭許猶預不决隋書曰李穆累以軍功進爵爲伯從太祖擊齊師於郎山太祖臨陣墜馬穆突圍而進以馬䇿擊太祖而詈之授以從􅀝潰圍俱出賊見其輕侮謂太祖非貴人遂緩之以故得免旣而與穆相對泣顧謂左右曰成事我者其此人乎即令撫慰關中所至尅定擢授武衛將軍賜以鐵劵恕其十死又曰越王侗立以叚逹爲納言右翊衛大將軍攝禮部尚書王丗充亦納言左翊衛大將軍攝吏部尚書元文都内史令左驍衛大將軍盧楚亦内史令皇甫無逸兵部尚書右武衛大將軍郭文懿内史侍郎長文黄門侍郎委以機務爲金書鐡劵藏之宮掖于時洛陽稱叚逹等爲七貴唐書曰李懷光旣解奉天之圍不獲朝見因大怒德宗遣中使諭旨加太尉賜鐡劵懷光怒甚投劵於地曰人臣反則賜鐵劵今賜懷光是使反也上遂幸也梁洋過所釋名曰過所至關津以示之或曰傳傳也轉移所在識以爲信也史記曰寗成爲右内史外戚多毁成之短抵罪髠鉗是時丸卿罪死即死少􅀍刑而成極刑自以不復収於是解脫詐刻􅀓岀關歸家漢書曰文帝十三年詔除關無用傳張晏注曰傳信也􅀂今過所李竒曰傳棨也顔師古曰或用棨或用譜帛棨者刻木爲合符魏略曰倉慈爲燉煌太守胡欲詣國家爲封過所廷尉决事曰廷尉上廣平趙禮詣雒治病博士弟子張䇿門人李臧賫過所詣洛還責禮冒名渡津平裴諒議禮一歳半刑䇿半歲刑晉令曰諸渡關及乗舡筏上下經津者皆有所冩一通付關吏零丁齊諧記曰國歩山有廟又一亭吕思與少婦投􅀫失婦思逐覔見天城㕔事一人紗帽馮几左右競來擊之思以刀斫計當殺百餘人餘者便乃大走向人盡成死狸看向㕔事乃是古始大􅃁冢上穿下甚明見一群女子在􅃁裏見其婦如失性人因抱出冢口又入抱取於先女子有數十中有通身巳生毛者亦有毛脚靣成狸者湏􅁷天曉將婦還亭亭吏問之具如此荅前後有失兒女者零丁有數十吏便歛此零丁至冢口迎此群女隨家逺近而報之各迎取於此後一二年廟無復靈戴良字文讓失父零丁曰敬白諸君行路者敢吿重罪自爲積惡致災交天困我今月七日失阿爹念此酷毒可痛傷當以重幣繒用相賞請爲諸君􅀃事狀我父軀體與衆異脊背傴僂捲如胾脣吻參差不相值此其庶形何能備請復重陳其靣目䲻頭鵠頸獦狗眼涙􅈹涕相追逐吻中含納無牙齒食不能嚼左右蹉似西域駱駞請復重陳其形骸爲人雖長甚細材靣目芒蒼如死􅁅眼眶􅍫䧟如米羮柸太平御覽卷第五百九十八
