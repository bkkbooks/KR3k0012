body:
  text: 飲食部二十三塩醬塩書曰青州厥貢塩絺周禮天官籩人曰朝事之籩其實形塩案塩謂為虎形謂之形塩又曰掌塩之政令以共百事之塩􅀕祀共其苦塩散塩杜子春讀􅀂爲塩謂出塩直用不凍治也鄭司農云散塩凍治者玄謂散塩煑水為塩也賔客共其形塩散塩王之膳羞共飴塩飴塩之怡者今戎塩有也凢齊事鬻塩以待戒令齊事和五味之事鬻塩凍治之鬻音煑也記曰􅀕宗廟塩曰鹹鹺大鹹日鹺又曰醯醢之羙而煎塩之尚貴天産也又曰桃諸􅆑塩大塩又曰功衰食菜果飲水漿無塩酪不能食食塩酪可也功衰齊斬之未也酩酢酨左傳曰王使周公閱來聘饗有昌歜白黒形塩辭曰國君文足昭也武可畏也則有備物之饗以象其德薦五味羞嘉榖塩虎形塩五味之醬故刻尽虎形以象其武以獻者功吾何以堪之又曰晉人謀去故綘諸大夫皆曰必居邭瑕氏之地沃饒而近塩塩狩氏縣有塩池是也又曰齊晏子曰山木如市弗加於山魚塩蜃蛤弗加於海􅀃文曰塩鹹也塩池河東塩池袤五十里廣六里周一百十四里戴延之西京記曰塩生水中夕取朝復千車万馿適意多少鹵西方鹹也東方謂之斥西方謂之鹵鹺鹹也河内謂之鹹廣雅曰䴛音消折七豆切折音温􅴴歩典切塩也史記曰募民月給費用官器作煑塩官牢盆如淳日牢廩食也盆煑塩漢書王莽詔曰塩食者之將又曰呉東海水爲塩國用饒足呉録地里志曰呉王煑海水為塩今海塩縣是也續漢書曰虞翊爲武都太守始到郡榖石千五百塩石八千視事三歳榖石八千塩百又曰天笁國出黒塩東􅀚漢記曰賈復爲縣􅁺迎塩河東㑹盗賊起等軰放散其塩復獨完還致縣中後漢書曰第五倫自以乆爲官不逹遂將家属客河東変名姓自稱王伯齊載塩徃來又太原上黨所過輙爲糞除而去又王符論曰且攻玉以石洗金以塩詩小雅曰他山之石可以攻玉今之金工發金色者皆淬之塩水也魏志曰衛覬與荀彧書曰夫塩國之大寳也自亂以來放散冝如舊置使者監賣以其直益市犁牛􅀂有歸民以供給之又曰鄧艾平蜀後言於司馬文王留隴右兵二萬人蜀兵二萬人煑塩興冶爲軍農要用魏略曰漢令哀牢民家出塩一斛以爲賦呉志曰朱桓卒家無餘財孫􅁠賜塩五千斛以周䘮事蜀志曰先主定益州置塩府校尉較塩鐵之利晉書曰肅愼國無塩鐵燒木作􅁅取汁而食之又曰郭文字文舉隠居呉興餘杭大辟山中􅁪着鹿裘葛巾不飲酒食􅁏區種菽麥採草葉木寳貿塩以自供人或酬下價者亦即與之宋書曰豫章王大㑹賔僚張融食炙始畢行炙人便去融欲求塩䔉口終不言方食捶指半日乃息又曰張融作海賦文辭詭激獨與衆異後以示鎮軍將軍頋顗之曰卿此賦實超􅀇虚但恨不道塩耳融即永筆注曰漉沙搆白􅆈波出素積雪中春飛霜暑路齊書曰崔慰祖父䘮不食塩母曰汝旣無兄弟又未有子息毀不滅性故當不進肴羞耳如何絶塩吾今亦不食矣慰祖不得已從之梁書曰侯景䧟臺城宴集其黨又召僧通僧通取􅁏揾塩以進景問曰好不景荅所恨大鹹僧通曰不鹹則爛及景死王僧辨截其二手送齊宣又傳首徃江陵果以塩五斛置腹中送于建康􅁀之于市百姓爭取屠膾羹食皆盡後魏書曰丗祖南伐遺李伯賜劉義㳟等塩各九種并胡䜴孝伯日有後詔凢此諸塩各有所冝白塩食塩主上自所食黒塩治腹脹氣滿末之六銖以酒下胡塩治目痛戎塩治諸瘡赤塩駮塩臰塩馬齒塩四種並非食塩又曰忽􅁻國水氣鹹凝塩生樹上又曰沮渠􅀩遜平酒泉於宋繇室得書數千卷塩米數十斛而巳􅀩遜歎曰􅀌不喜尅李氏欣得宋繇耳北齊書曰房景伯母亡居䘮不食塩菜因此遂爲水病積年不愈又曰崔暹奏請海沂煑塩有利軍國文襄以問崔􅄧􅄧曰亦旣官煑断之竈官力雖多不及人廣諸淮開市薄爲竈稅􅀻館給彼此有冝朝廷從之唐書曰武德中長安古城塩渠水生塩色紅白味甘狀如方印又曰左右神䇿塩州行營節度使胡堅昌皆表奏􅀄城塩州鹵中獲壤土又置烽堡水路廻逺即時有雨廢塩井悉生塩事扶聖德可謂天讃請宣付史館制可又曰代宗時河中府塩池生瑞塩韓滉奏曰土德之瑞又曰李晟薨後徳宗以􅀄城塩州復塩池上賜宰相新塩惻然思之命置塩於靈座又曰流􅀑國去京師萬五千里邊於北海多沮澤有魚塩之利又曰􅀄搉塩起於苐五􅄾及劉晏代其任法術精宻官無遺利􅀄歳入錢六十萬貫季歳十倍而人無厭苦大暦末通計一歳征賦所入而塩醝當天下太半之賦管子曰齊有渠之塩燕有遼東之煑十口之家十人舐塩百口之家百人舐塩凢食塩之數一月丈夫五􅂛少半婦人三􅂛少半嬰兒二􅂛少半塩之重􅂛加分耗而釡百􅂛加什耗而釡千君伐沮薪煑浦水爲塩正而積之三萬鍾至陽春農事方作令民無得築垣墙母得繕冢墓大夫無得治宫室臺榭北海之衆無得聚庸而煑塩然塩之價必四什倍君以四什之賈循河濟之流南輸梁趙宋衛濮陽􅁖食無塩則腫守圉之本其用塩獨重君伐菹薪煑沛水以籍於天下然則天下不减矣又曰桓公成塩三萬六千鍾令吏糴之得成金萬一千餘斤尸子曰南海之輦北海之塩魯連子曰連􅀫沙瞿子善煑塩使煑潰沙雖十􅀫不能得也抱朴子曰作赤塩法用寒塩一斤雨泥一斤内鐵器中以爲水燒皆消而赤也金樓子曰白塩小小峯洞激如有水精及其映日光似琥珀胡人扣之以供國厨名爲君王塩亦名玉華塩又曰有清池塩正四方廣半寸其形挾踈似有人耕池旁地取池水波種之去勿廻頋即生此塩國語曰桓公通齊國之魚塩干東萊言通者先時禁人東莱齊之東莱夷也山海經曰景山􅀯望塩皈或無皈字敗之池北望少澤其草多藷藇􅁗菽其隂多頳其陽多玉郭景純云塩敗澤即解縣塩池也吕氏春秋曰和之羙者大夏之塩髙誘曰大夏澤名或山名春秋後語曰張儀􅀃趙王曰今日楚與􅁗爲兄弟之國而韓魏稱爲藩臣齊獻魚塩之地断趙之右臂齊􅀒海有魚塩之利今云献魚塩之地矯辞以脅趙也淮南萬畢術曰塩能累􅆑取戎監塗􅆑取他夘置其上即累也塩鐵論曰古者豪強大家得煑海爲塩民皆依爲姦之業也世􅀃曰􅁗繆公使賈人載塩百里奚使將軍風俗通曰鹹如炭俗􅀃鹹亦與熱正等炭火不可以入口人食得大鹹亦吐之謹案東海昫人曉知塩法者云攪塩木多日毎燋黒如炭非謂竈中火炭也呉時外國傳曰漲海州有湾湾中常出自然白塩嶧嶧如細石子天笁國有新陶水水甘羙下有石塩白如水精南州異物志云塩如石英晉令曰凢民不得􅀻煑塩犯者四歳刑主吏二歳刑蜀王本紀曰宣帝地節中始穿塩井數十所世本曰􅀫沙作煑塩宋志曰􅀫沙衛齊靈公臣齊濵海故衛爲漁塩之利晉太康地記曰梓潼縣出傘子塩廣志曰鹽體因於水故或水且生于水故或與土􅄂産于地多側于海濵但未必千里相比耳煑鹽與海同河東有印成鹽西方有石子鹽皆生於水北海胡中有青鹽五原有紫鹽波斯國有白鹽如細石子玄晏春秋曰故侍中劉子楊食餅知鹽生精味之至􅁗記曰㑹稽王道子爲符郎設盛饌郎云塩味小生􅀶物志曰臨卭火井諸葛亮徃視之後火益盛以盆貯水煑之則鹽後人以火投井中火即滅至今不然梁四公子記曰髙昌國遣使貢鹽二顆顆大如斗狀白似玉帝以其自萬里絶域而來獻數年方逹命杰音竭公迓之謂其使曰鹽一顆是南燒羊山月望收之者一是北燒羊山非月望收之者使者具陳鹽奉王急命故非時尓因問紫鹽磬碧珀云中路遭北涼所奪不敢言之帝問杰曰公羣物之異對曰南燒羊山鹽文理粗北燒羊山鹽文理密月望收之者明徹如氷以氊槖煑之可驗交河之間平磧中掘􅀷數尺有末鹽如紅如紫色鮮味甘食之止痛更􅀷一丈下有碧珀黒逾純漆或大如車輪末而食之攻婦人小腹癥瘕諸疾彼國珎異必當致貢是以知之凉州異物志曰姜賴之墟今稱龍城恒溪無道以感天庭上帝赫怒溢海盪傾姜賴胡國名也恒溪其王字也矜貪無厭上帝化爲沙門遊于􅀚其政遂從溪乞之以塩與帝帝乃震怒使蒲昌溢以盪覆也㓻鹵千里蒺䔧之形其下有鹽累棊而生其地化爲鹵而㓻堅嶷如蒺䔧撥發其厎塩方大如棊以次相累也坐以鹽乞天帝故使此地化生塩也又曰鹽山二岳三色爲質赤者如丹黒者如􅃮小大從意鏤之冩物赤與黒者皆小惟白大或如篋箱從人所爲形也作獸辟惡佩之爲􅁻或治爲鳥獸以佩之戎鹽可以療疾四方皆用白者作散以除頭風以其出胡國故言戎塩也凉州記曰有青塩池出塩正方半寸其形似石甚甜羙益州記曰汶山越嶲煑塩法名異汶山有鹹石先以水漬旣而煎之越嶲先燒炭以塩井水沃炭刮取塩荆州記曰塩水自凝生傘子塩方寸中央隆起形如張傘夲草經曰鹵塩一名寒石味苦戎塩主明目大塩一名胡塩吕氏春秋日本草云戎塩一名胡塩崔駰􅀶徒論曰江陽六塩􅀏林曰姚彪至武昌遇風與沈浙江渚守風粮用盡遣人從彪貸鹽百斛彪得書不荅勑左右倒鹽百斛着江水中曰明吾不惜惜所與耳嶺表異録曰野煎塩廣南煑海其無限啇人納攉計價極微數内有恩州􅂣石橋􅂣俯迩滄溟去府最逺啇人於所司給一百石搉課止銷􅄂貨三二千及徃本􅂣塩並無官者給遣啇人但將人力收聚鹹沙掘地爲坈坈口稀布竹木鋪蓬簟於其上堆沙潮來投沙鹹鹵淋在坈内伺候潮退以火炬照之氣衝火滅則取鹵計用竹盤煎之頃尅而就竹盤者以􅑪細織竹鑊表裏以壯礪􅁅泥之自収海水煎塩謂之野煎易得如此也江淮試鹵濃淡昻置飯粒於鹵中粒浮者即是純鹵也醬禮記曰膾炙處外醯醬處内又曰獻熟食者操醬齊又曰濡雞醢醬實􅖋濡魚􅆑醬實􅖋濡鼈醢醬實􅖋魚膾芥醬麋腥醢醬論語曰不得其醬不食漢書曰劉歆謂楊雄云今學有禄利然尚不能明易又如玄何吾恐後人覆醬􅹏也􅹏音部甖名也風俗通曰醬成於塩而鹹於塩夫物之變有時而重又曰雷不作醬俗􅀃令人腹内雷聲桉子路感雷精而生尚十罡好勇死衛人醢之孔子覆醢毎聞雷心惻怛耳桓譚新論曰鄙人得鯅音羶醬而羙與人共食少唾其中因弃之俱不得食論衡曰作豆醬惡聞雷此欲使人急作不欲積乆世􅀃曰陸機入洛欲爲三都賦聞左司作之撫掌而􅀏與弟雲書云此間有傖父欲作三都賦湏其成當以覆醬瓮耳宋書曰孝武甞爲王玄謨作四時書云匏醬調秋菜白醝解冬寒又曰阮孝緒外兄王晏貴顯屢至其門孝緒度之必至顚覆聞其笳管穿籬逃匿不與相見曽㑹醬羙問之云是王家所得便吐餐覆醬及晏誅親戚咸爲之懼孝緒曰親而不黨唯坐之及竟􅀗免梁劉孝儀謝智安王賚蝦醬啓曰龍醬傳甘退成可陋蚿醢稱貴追覺失言上聖聞雷未之能覆嘉賔流歠差以無辭太平御覽卷第八百六十五
