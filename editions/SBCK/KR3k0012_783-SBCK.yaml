front:
  text: 太平御覽卷第七百八十三四夷部四
  hash: sha256:26ffc9d3e72a9e36bc1ecf901608255c1f1e0885a8703de371e2f82d31d53162
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_783-1a}
body:
  text: 東夷四髙句驪范曄後漢書曰髙句驪國節於飲食而好治宫室其俗淫皆㓗淨自喜夜輒男女群聚爲倡樂魏略曰髙句驪國在遼東之東千里其王都於九都之下地方二千里户三萬多山林無源澤其國貧儉土着爲宫室宗廟祠靈星社稷其俗􅁻凶喜㓂抄其國置官有相如軍盧沛者古鄒加尊卑各有等夲􅂢奴部爲王稍微弱今桂婁部代之大家不田作下户給賦稅如奴客好歌舞其人自喜跪拜申一脚與夫餘異行歩皆走又以十月㑹􅀕天名曰東盟有軍事亦􅀕天殺牛觀蹄以占吉凶加着幘如幘無後其小加着折風形如弁無牢獄有罪者即㑹加評議便殺之沒入妻子為奴婢盗一責十二婚姻之法女家作小屋於大屋之後名爲壻屋壻暮至女家户外自名跪拜乞得就女􅀫女家聽之至生子乃將婦歸其俗淫多相奔誘其死葬有槨無棺停喪百日好厚葬積石爲封列種松栢兄死亦報㛐俗有氣力便弓矢刀矛有鎧習戰又有小水㹮俗出好弓其馬小便登山夫餘不能臣也沃沮東􅁾皆屬之其國都依大水而居王莽時發句驪以伐胡不欲行亡出塞爲㓂害奔更名爲下句驪後魏書曰髙句驪者出於夫餘自言光祖朱蒙母河伯母夫餘王􅐬於室中爲日所照引身避之日影又逐旣而有孕生一􅆑大如五􅂛夫餘王弃之與豕豕不食弃之於路牛馬避之又弃之野衆鳥以毛茹之夫餘王剖之不能破遂還其母其母以物裏之置於暖處有一男破殻而出及其長也字之曰朱蒙其俗言朱蒙者善射也夫餘國人以朱蒙非人所生將有異志請除之王不聽命之飬馬朱蒙每私試知其善惡駿者減食令瘦駑者善養令肥夫餘王以肥者自乗以痩者給朱蒙後狩于田以朱蒙善射射給以一矢朱蒙雖一矢殪獸甚多夫餘之臣又謀殺之朱蒙母隂知以告朱蒙朱蒙與烏餘二人弃夫餘東南走中道遇一大水欲濟無梁夫餘人追之甚急朱蒙告水曰我是日子河伯外孫今日逃走追兵垂及如何得濟於是魚鱉並浮爲之成橋朱蒙得度魚鱉乃解追􅀐不得度朱蒙至普􅄒水遇見三人其一人衣着麻一人着納衣一人着水藻衣與朱蒙至紇􅂛骨城遂居焉號曰髙句驪因以髙爲氏焉北史曰朱蒙在夫餘時其妻懷孕朱蒙逃後生子及長知朱蒙爲國王即與母亡歸之名曰閭逹委之國事朱蒙死至孫莫來立乃并夫餘漢武帝元封四年滅朝鮮置玄莵郡以高句驪爲孫以屬之漢時賜之衣幘朝服皷吹常從玄莵郡受之後稍驕不復詣郡但於東界築小城受之遂名此城爲憤溝婁者句麗城名也又曰公孫度之雄海東也高句麗伯固與之通好伯固死伊夷摸五伊夷摸數㓂遼東建安中公孫康出軍擊之大破其國焚燒邑落伊夷摸更作新國於九都山下又曰髙句麗伊夷摸死其子位宫立始位宫曽祖宫生而目開能視國人惡之及長凶虐國以破殘及位宫生亦能視人髙麗呼相似爲位以爲似其曽祖宫故名位宫亦有勇力便鞭馬善射獵魏正始中位宫㓂西安平五年幽州刺史母丘儉將萬人出􅀇莵討位宫大戰於沸流敗走儉追至頳峴懸車束馬登丸都山屠其所都位宫單將妻子逺竄六年儉復討之位宫輕將諸加奔伏沷沮儉使將軍王頎追之絶沷沮千餘里到肅愼南界刻石紀功又刋丸都山銘不耐城而還又曰後魏太武帝時髙麗王釗曽孫璉始遣使者詣安東奉表貢方物并請國諱太武嘉其􅀃􅅃詔下帝系名諱於其國使貟外散􅀐侍郎李敖拜璉爲都督遼海諸軍事髙句麗王敖至其所居平壤城訪其事云去遼東一千餘里至柵城南至小海北至舊夫餘人户三倍於前魏時後貢使相尋􅀊致黃金二百斤白銀四百斤又曰後魏文明太后以獻文六宫未備勑璉令薦其女璉奉表云女己以岀求以弟女應􅈲朝廷許焉㑹獻文崩乃止又曰後魏太和十五年璉死其孫雲立復賜以衣冠服物車旗之飾自比􅀊常貢獻至大統十年其王成遣使至西魏朝貢及齊受東魏之禪又朝于齊文宣加成使持節侍中驃􅀐大將軍髙麗王如故又曰北齊天保三年文宣至營州使􅀶陵崔栁使于髙麗求魏末流人勑栁曰􅀂不從者以便冝從事及至不見許栁張目叱之拳擊成墜於牀下成左右雀息不敢動乃謝服柳以五千户反命又曰髙句麗東至新羅西度遼二千里南接百濟北隣靺鞨一千餘里人皆􅁟着隨山谷而居衣布帛及皮土田薄塉􅅙農不足以自供故其人節飲食其王好脩宫室都平壤城亦曰長安城其城隨山屈曲南臨浿水城内唯積倉儲器備㓂至方入固守王別爲宅於其側不常居之其外復有國内城及漢城亦別都也其國中呼爲三京有遼東􅀇莬等數十城皆置官司以相統攝焉其置官有大對盧已下凡十二等分掌内外事復有内評五部褥薩人皆頭着折風形如弁􅁟人加挿二鳥羽貴者其冠曰􅂫骨多用紫羅爲之飾以金銀服大䄂衫大口袴素皮帶黄革履婦人裙􅃭加􅙦書有五經三史三國志晉陽秋兵器與中國略同及春秋校獵王親臨之稅布五疋榖五石遊人則三年一稅十人共細布一疋其刑法峻罕有犯者樂有五􅃶琴箏篳篥横吹蕭鼓之屬吹蘆以和曲每年􅀄聚戯浿水上王乗腰轝列羽儀觀之事畢王以衣入水分爲左右二部以水石相濺擲諠呼馳逐再三而止性多詭伏言辭鄙􅁾不簡親踈父子同川浴共室寢好歌舞常以十月􅀕天其公㑹衣服皆錦繡金銀以爲飾好蹲踞食用俎豆出三尺馬云本朱蒙所乗馬種即果下也風俗尚滛不以爲愧俗多遊女夫無常人夜則男女群聚而戯無有貴賤之節有婚嫁取男女相恱即爲之男家送猪酒而已無財娉之禮或有受財者人共耻之以爲賣婢死者殯在屋内殯三年擇吉日而葬居父母及夫喪皆三年兄弟三月􅀄終哭泣葬則皷舞作樂以送之埋訖取死者生時翫好車馬置墓側㑹葬者爭取而去又曰隋開皇中髙麗王元率靺鞨萬餘􅀐㓂遼東西營州揔管韋丗冲擊走之帝大怒命漢王諒爲元帥揔水陸討之下詔黜其爵位元亦惶懼遣使謝罪上表稱遼東糞土臣元云云上於是罷兵待之如􅀄元亦􅀊遣朝貢煬帝嗣位天下全盛髙昌王突厥啓人可汗並親詣闕貢獻於是徴元入朝元懼蕃禮頗闕大業七年帝將討元罪車駕度遼水止營於遼東又勑諸將髙麗􅀂降即冝撫納不得縱兵入城䧟賊輒言降諸將奉旨不敢赴機毎先馳奏比報賊守禦亦備復出拒戰如此者三帝不悟由是食盡師老轉輸不繼諸軍多敗績於是班師又曰隋大業九年煬帝復親征髙麗勑諸軍以便冝從事諸將分道攻城賊􅀔日蹙㑹楊玄感作亂帝大懼即日六軍並還十年發天下兵㑹賊盗蜂起所在阻絶軍多失期至遼水髙麗亦困弊遣使乞降帝許之頓懷逺鎭受其降仍以俘囚軍實歸至京師南史曰髙麗本有五族有消奴部絶奴部慎奴部灌奴部桂婁部夲消奴部爲王微弱桂婁部代之其置官有對盧則不置沛者有沛者則不置對盧焉晉安帝義熈九年髙翼奉表獻赭白馬宋元嘉十五年馮弘爲魏所攻敗奔髙麗北豐城表求迎接文帝遣使王白駒趙次興迎之并令髙麗資遣璉不欲弘南乃遣將孫漱髙仇等襲殺之白駒等率所領七千餘人生擒漱殺仇等二人十六年文帝欲侵魏詔璉獻馬八百疋大明二年又獻肅慎矢及楛矢石砮歷齊梁並授爵位遣使奉表獻方物不絶唐書曰髙麗者岀自扶餘之别種其國都於平壤城即漢樂浪郡之故地在京師東五千一百里其官大者號大對盧比一品揔知國事三年一代􅀂稱職者不拘年限交替之日或不相祗服皆勒兵相攻勝者爲之其王但閉宫自守不能制禦次曰太大兄比正二品對盧以下官揔十二級外置州縣六十餘城大城置傉薩一人比都督諸城置道使比刺史其下各有僚佐分掌曹事衣裳服食唯王五綵以白羅爲冠白皮小帶其冠及帶咸以金飾官之貴者則青羅爲冠次以緋羅挣二鳥羽及金銀爲飾衫簡䄂袴大口白韋帶黄革履國人衣褐戴弁婦人首加巾幗好圍碁􅄬壺之戲人能蹵鞠食用籩豆簠簋罇爼罍洗頗有箕子之遺風其所居必依山谷皆以茅草葺舎唯佛寺神廟及王宫官府乃用瓦其俗貧窶者多冬月皆作長坑下燃火煴以取煖種田養蚕略同中國城東有大穴名隧神皆以十月王自􅀕之俗愛書籍至於衡門厮養之家各於街衢造大屋謂之局堂子弟未婚之前晝夜於此讀書習射又曰武德二年髙麗王建武遣使來朝四年又遣使朝貢髙祖感隋末戰士多䧟其地五年賜建書云在此所有髙麗人等己令追括尋即遣送彼處有此國人者立可放還務盡綏育之方共弘仁恕之道於是建武悉搜括華人以禮賔送前後至者萬數髙祖大喜七年遣使徃􅁽建武爲上柱國遼東郡王髙麗王仍將天尊像及道士彼爲之講老子其王及道俗等觀聽者數千人貞觀二年破突厥頡利可汗建武遣使奉賀并上封域圗五年詔遣廣州都督府司馬長孫師往収瘞隋時戰亡骸骨毀髙麗所立京觀又曰貞觀十六年髙麗西部大人盖蘇文有罪其王建武議欲誅之􅂫文乃召部兵於城南云將校閱諸大臣皆來臨視蘇文勒兵盡殺之因馳入王宫殺建武立其弟大陽子臧爲王自立爲莫離支猶中國兵部尚書兼中書令之職也自是專國政蘇文姓泉氏鬚靣甚偉形體魁傑身佩五刀左右莫敢仰視恒令其屬官俯伏於地踐之上馬下亦如之出必先布隊仗導者長呼以辟行人百姓畏避皆自􅄬坈谷太宗聞之遂出師弔伐十九年命刑部尚書張亮為平壤道行軍大揔管領將常何等率江淮嶺硤勁卒四萬戰舩五百艘自菜州汎海趨平壤又以英國公李勣爲遼東道行軍大揔管江夏王道宗爲副率歩􅀐六萬趨遼東兩軍合􅀔太宗親御六軍以㑹之夏四月李勣軍渡遼進攻盖牟城拔之以其城置盖州五月渡遼水詔徹橋梁以堅士卒志帝旣至遼東城下見七卒􅀒檐以填壍者帝分其尤重者於馬上載之從官悚動爭賷以送城下髙麗聞我有抛車飛三百斤石於一里之外者甚懼之乃於城上積木爲戰樓以拒飛石勣列車發石以擊其城所遇盡潰又推撞車撞其樓閣無不傾倒抜其城爲遼州􅀄帝自定州命每十里置一烽屬于遼城與太子約剋遼東當舉烽是日帝命舉烽師次白崖城右衛太將軍李思摩中弩矢帝親爲吮血將士聞之莫不感勵城主孫戊音遂乞降以其城置巖州授伐音爲刺史我軍之渡遼也莫離支遣加户城七百人戍盖牟城李勣盡虜之其人並請隨軍自効太宗謂曰詎不欲爾之力爾家悉在加尸爾爲吾戰彼􅀅爲戮矣破一家之妻子取一人之力用吾不忍也悉令放還車駕進次安市城髙麗北部耨薩髙延壽南部髙惠眞率髙麗靺鞨之衆十五萬來救引軍直進太宗夜召諸將躬自指麾因令所司張受降幕於朝堂之側曰明日午時納降虜於此矣遂率軍而進至時果敗二帥之衆太宗因按轡觀城營壘謂侍臣曰髙麗傾國而來存亡所繫一麾而敗天祐我也因下馬再拜以謝天名所幸山爲駐蹕山令中書侍郎許敬宗爲文勒石以紀其功八月移營安市城東李勣等攻之不拔乃詔班師􅀄攻䧟遼東城其中應􅃿爲奴婢者一萬四千人並遣集没爲將分賞將士太宗􅉖其父母妻子一朝分散令有司准其直以布帛贖之赦爲百姓其衆歡叫之聲三日不息又曰貞觀二十年髙麗遣使來謝罪并獻二羙女太宗謂其使曰歸謂爾主羙色者人之所重爾之所獻信爲羙麗憫其離父母兄弟於夲國留其身而忘其親愛其色而傷其心我不取也並還之又曰乹封元年髙麗遣其子入朝陪位於太山之下其年蓋􅂫文死其子男生代爲莫離支與弟建不睦爲其所逐走據國内城使其子獻城詣闕求哀十一月命英國公李勣率郭侍封等以征之二年二月勣至新城謂諸將曰新城是髙麗西境鎮城最爲要害􅀂不先圗餘未易可下遂引兵於城西南據山築柵且攻且守城中窘急數有降者自此所向克捷髙藏及男建將首領九十八人持帛幡出降請使入朝勣以禮延接男建猶􅐬門固守十一月拔平壤城虜髙藏男建等至京師獻浮于含元宫乃分其地置都督府九州四十二縣一百又置安東都護府以統之擢其酋渠有功者授都督刺史及縣令與華人叅理仍遣左武衛將軍薛仁貴揔兵鎮之自是髙氏君長遂絶太平御覽卷第七百八十三
