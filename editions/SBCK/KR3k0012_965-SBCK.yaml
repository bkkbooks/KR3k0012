front:
  text: 太平御覽卷第九百六十五果部二
  hash: sha256:5725ddee5e1da4e7b35a09133916ea2b51207dcd4e8bbd624fe495cb9e45a21a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_965-1a}
body:
  text: 􅀥爾雅曰􅀥壷􅀥也郭璞注曰今江東呼􅀥大而銳上者爲壷壷猶􅉚也邊要􅀥細要􅀥也今謂之鹿盧􅀥櫅音齊白􅀥即今􅀥子曰熟樲酸􅀥樹小實酢孟子曰養其樲􅀥遵羊􅀥實小而貟紫黑色今俗呼爲羊矢􅀥孟子曰曽晳嗜羊􅀥洗大􅀥今河東猗氏岀大􅀥子如雞夘泄苦􅀥子味苦也音歳也晳無實􅀥不着子也還味稔􅀥還味短味也稔音荏還音旋又曰􅀥李曰㚄之孫炎曰㚄去其抵㚄音帝京房易妖占曰天雨􅀥小民流亡也焦贑易林師之豫曰北山有􅀥使叔壽考􅀃文曰樲酸􅀥也毛詩豳七月曰八月剥􅀥周禮天官籩人曰饋食之籩其實􅀥大戴禮夏小正曰八月剥􅀥剥者取也禮記曲禮下曰婦人之贄脯脩􅀥栗又内則曰􅀥曰新之又曰􅀥栗飴宻以甘之春秋繁露曰握􅀥與錯金以示嬰兒必取􅀥而不取金故物之於人小者易知史記曰楚莊王之時有所愛馬㗖以􅀥脯又曰李少君以却老方見上少君言上曰臣曽遊海上見安期生食巨􅀥大如􅀲漢書曰廣陵厲王胥宫園中􅀥樹乃生十餘莖莖正赤葉白如素王㘴祝咀自殺又曰王􅁻少時學問居長安其東家有􅀥樹垂􅁻庭中􅁻婦取􅀥以啖􅁻後知之乃去婦東家聞而欲伐其樹鄰里共止之因固請􅁻令還婦里中爲之語曰東家有樹王陽婦去東家􅀥完去婦復還又曰安邑千樹􅀥此其人皆與千户侯等東觀漢記曰自馮愔反後鄧禹威稍損又乏食敗走至髙陵軍士飢餓皆食􅀥葉又曰中黄門孫程謀誅江京後程於盛化門外與馬國等相見詐謂國曰天子與我􅀥脯與􅀂􅀥者早成之乃與國等共爲謀立順帝謝承後漢書曰河南陶碩郷曲餉之碩無所受但食􅀥飲水美談而巳又曰孟節能含􅀥核不食可至五年應劭漢官儀曰光武封太山上壇見酢梨酸􅀥上問其故主者曰百官上者所置上曰封禪大禮千歳一㑹衣冠士大夫何故爾也魏志曰杜恕上䟽曰冀州户口最大又有桑􅀥之饒國家徴求之府丗􅀃曰魏文帝忌弟任城王饒壯因在卞太后側共圍棊並啖􅀥文帝以毒置諸􅀥蔕中自選可食者而王弗悟遂􅄂進之旣中毒太后索水救之帝預勑毀器太后徒跣赴井無器可汲湏􅁷遂卒又曰王大將軍甞至石崇家如厠見􅃮箱中盛乾􅀥夲以塞􅈹王遂食盡羣婢莫不􅀏晉書曰賈后將廢太子詐稱上不和呼太子入朝旣至后不見置于別室遣婢陳舞賜以酒􅀥逼飲醉之晉史曰光禄卿李郁因晝寢夢食巨􅀥覺而有疾謂其親友曰甞聞􅀥字重來呼魂之象今子神氣逼抑將不免乎未幾而卒孟子曰曽晳其嗜羊􅀥而曽子不忍食公孫丑問曰鱠炙與羊􅀥孰羙曰膾炙哉曰曽子何爲食膾炙孟子曰膾炙同也羊􅀥獨也韓子曰􅁗飢應侯謂王曰五苑之果蔬橡􅀥栗足以活民請發之又曰子産治鄭桃􅀥之䕃於衛者莫援也鄒子曰夏取􅀥杏之火淮南子曰十一月官都尉其樹􅀥晏子春秋曰景公謂晏子曰東海之中有水而赤水中有􅀥花而不實何也晏子曰昔者􅁗穆公乗龍治天下以黄布裏蒸􅀥至海而投其布故水赤蒸􅀥故花而不實公曰吾佯問子對曰嬰聞佯問者佯對之盧毓冀州論曰安平好􅀥地産不爲無珎杜氏新書曰杜畿爲河東太守平虎將軍劉勲爲太祖所親貴震朝􅋝常從畿求大􅀥畿拒以他故後勲伏法太祖得其書歎曰杜畿可謂不媚竈也英雄記曰孔文舉爲東萊賊所攻城欲破其治中左承祖以官􅀥賦與戰士蔡邕奏事曰程末年十四時祖父叔病物故末抱伏叔尸號泣悲哀舅哀其羸劣嚼􅀥肉以哺之末見食歔欷不能呑咽漢武内傳曰七月七日西王母當下爲帝設玉門之􅀥東方朔傳曰武帝時上林献􅀥上以所持杖擊未央前殿檻呼朔曰叱叱先生來來先生知此筐中何等物也朔曰上林献􅀥四十九枚上曰何以知之朔曰呼朔者上也以杖擊檻兩木兩木林也來來者􅀥也叱叱者四十九枚上大􅀏賜帛十疋王子年拾遺記曰北極有􅄮峯之隂多􅀥樹百㝷其枝莖皆空其實長尺核細而柔百歳一實真人􅀜令尹喜内傳曰老子西遊省太真王母共食玉文之􅀥其實如瓶神仙傳曰吴郡沈羲爲仙人所迎上天云天上見老君老君賜義􅀥二枚大如雞子又曰李意期於成都角中作一土窟居其中冬夏單衣長髮剪去之但使長五寸許多飲酒食脯及􅀥栗或百日二百日不岀窟是時無可所食也魯女生别傳曰李少君曰􅁳海之􅀥大如􅀲鍾山之李大如瓶臣巳食之遂有竒光劉根别傳曰有道之士不可識徃者有陳孜如癡人江夏􅀽仲陽知事之孜謂仲陽曰今年春當有疾可服􅀥核中仁二十七枚後果大病又曰能常服􅀥核中仁百邪病不復干也仲陽服之有效馮明生別傳曰明生爲縣吏捕賊爲賊所傷殆死道間見女人年可十六七姿容絶丗以肘後管中一丸如小豆與服即愈隨神女還岱宗見安期生曰共與女郎遊於安息西母之際食􅀥異羙此間􅀥小不及憶此􅀥未乆巳二千年矣神女云昔與君共食一枚乃不盡此間小􅀥郍可相比也髙士傳曰胡昭字孔明晉宣帝爲麻衣時與昭有舊昭同郡周士等謀帝昭聞而歩險邀士於肴澠之間止士士不肯昭泣以示誠士感其義乃止昭斫􅀥樹共士盟而別昭雖有隂徳於帝口終不言時人莫知風俗通曰鮑焦耕田而食穿井而飲於山中食􅀥或曰此􅀥子所植也遂強吐立枯死水經注曰酸􅀥縣故城南古韓國昔天子建國名都或以山林故豫章以樹氏都酸􅀥以􅁄名􅀖故曰酸􅀥也水經曰髙唐縣大河右溢丗謂之甘􅀥溝水側多􅀥故俗取名焉廣志曰東郡榖城紫􅀥長二寸西王母􅀥大如李核三月熟衆果之先熟者也種洛陽宮後園河内伋郡􅀥一名墟􅀥一名安邑􅀥東海蒸􅀥洛陽夏白􅀥安平信都大􅀥單父􅀥梁園國夫人􅀥大白􅀥一名曰慼咨小核多肌三星􅀥駢白􅀥灌􅀥此四者官園所種􅀥有狗雞心牛頭羊矢彌猴細􅆎之名又有玄􅀥大􅀥﨑廉􅀥桂􅀥鄴中記曰石虎園中有西王母􅀥冬夏有葉九月生花十二月乃熟三子一尺又有羊角􅀥亦三子一尺東陽記曰信安縣有懸室坂晉中朝時有民王質伐木至石室中見童子四人彈琴而歌質因留􅀝柯聽之童子以一物如􅀥核與質含之便不復飢俄頃童子令其歸質承聲而去斧柯漼然盡爛旣歸質去家巳數十年親舊凋落無復此時矣楊衒之洛陽伽藍記曰景陽山南有百果園果别作一林林名有一堂有仙人􅀥長五寸把之兩頭俱出核細如針霜降乃熟食之甚美俗傳云岀崑崙山一曰西王母􅀥晉宫閣名曰華林園􅀥六十二株王母􅀥十四株盧諶􅀕法曰春祠用􅀥油夲草曰凡􅀥九月採日乾􅀘中益氣乆服神仙郭子横洞􅁳記曰􅝜嵣細􅀥岀􅝜嵣之山山臨碧海萬年一實子如今軟􅀥笮之有膏膏可燃燈西王母握核以献帝因名曰握核􅀥杜寳大業拾遺録曰二年八月信都献仲思􅀥四百枚􅀥長四寸五寸圍紫色細文文縐核肥有味勝於青州􅀥北齊時有仙人仲思得此􅀥種之亦名仙􅀥時海内唯有數樹西京雜記曰􅀄脩上林苑羣臣各献名果樹亦有製有羙名弱枝􅀥西王母􅀥出崑崙山棠􅀥王門􅀥青華􅀥梬音程􅀥赤心􅀥神異經曰北方荒中有􅀥林焉其髙五尺子長六七寸圍過其長熟赤如朱乾之不縮氣味甘潤殊於常􅀥食之可以安軀體益氣力異苑曰鄭鮮之女脚患攣癖就王濮陽請水澆之餘灌庭中枯􅀥樹􅀥樹旣生女脚亦差又曰沙門笁慧献太元二年夜夢讀詩五首其一篇後曰陌南酸􅀥樹名爲六竒木遣人以伐取載還柱馬屋又曰太元中南郡忻陵縣有􅀥樹一年忽生桃李􅀥三種花子幽明録曰太原王仲徳年少時遭亂避胡賊絶粒三日草中卧忽有人扶其頭呼云可起㗖􅀥王便寤瞥見一小兒長四尺即隱乃有一囊乾􅀥在前噉之小有氣力便起任昉􅄒異記曰魏丗河内冬雨􅀥􅂄舊􅀃周􅁗時河南雨酸􅀥遂生野酸􅀥今酸􅀥縣是也􅀥之甚小者謂之酸􅀥廣五行記曰馮宣上黨人仕爲北平護軍䘮於官時年三十八還家郷里服始畢婢在外聞叫喚聲開門見宣婢驚入白宣妻韓韓悲愕良乆見宣宣曰生必有死恨早別恩情宣外甥嚴翊至宣曰當有兵亂継以飢疫并土不可復居侯宅東􅀥樹死便走可免翊受􅈲宣告别湏􅁷而没後二百日􅀥樹死翊與宣家東投漁陽發後四旬而上黨遭㓂􅁀兵人死荒乱塗炭存者尠矣嶺表録異曰波斯􅀥廣州郭内見其樹樹身無閑枝直聳三四十尺及樹頂四向共生十餘枝葉如海㯶亦呼爲海㯶廣州所種者或三五年一畨結子亦似此中青􅀥但小耳自青及黄撲巳盡又朶着子每朶約三二十顆劉珣曽於畨酋家食夲國將來者色􅀋沙榶皮肉軟爛餌之乃永樂天蒸之味也其核與北中􅀥殊異兩頭不尖􅀟卷而圎如小塊紫礦珣亦収而種之乆無萌芽疑是蒸熟也魏文帝詔羣臣曰南方龍眼荔枝寧比西國蒲陶石􅁡乎酢且不如中國凡􅀥味莫言安邑御􅀥也曹植鷂雀賦曰雀得鷂言意甚不移依一􅀥樹藂蕽多刺潘岳笙賦曰􅀥下纂纂朱實離離宛其落矣化爲枯枝潘岳閑居賦曰周文弱枝之􅀥防陵朱仲之李傳玄􅀥賦曰素華離朱實甚脆色如霜雪甘如含蜜左思魏都賦曰淇園之筍信都之􅀥古詩曰甘􅀲抱苦蔕美􅀥生刺􅁄郭璞􅀥讃曰赤心鯁直傅玄歌詞曰黄葉離髙柯丹􅀥坐自零不惜􅀥自零念我少弟兄太平御覽卷第九百六十五
