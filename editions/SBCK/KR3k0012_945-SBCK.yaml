front:
  text: 太平御覽卷第九百四十五
  hash: sha256:b6c04bb9007581842e8b359d896f29c7fc26cbd455987b1a8db24d7dff3b35e4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_945-1a}
body:
  text: 蟲豸部二蚊䖟蚋蜉蝣蠛蠓蝴蝶螢􅑺蛉蠮螉蚊􅀃文曰􅁗謂之蚋楚謂之蚊大戴禮夏小正曰丹鳥羞白鳥白鳥蚊也漢書曰中山靖王朝天子置酒聞樂聲而泣問其故靖王對曰臣聞衆喣漂山聚蚊成雷後漢書曰趙炳有道術人服從者如歸章安令惡其惑衆収殺之人爲立祠室於永康至今蚊蚋不敢入也晉書曰道安曰猛虎當道食不覺蚊䖟來唐史曰江東有吐蚊鳥夏夜鳴吐紋於蘆荻中湖湘尤甚晏子曰東海有蟲巢蚊睫乳而不飛蚊不驚名曰焦􅁳列子曰江浦之間生麽蟲麽細也名曰焦􅑺羣飛而集於蚊睫弗相觸也又曰焦􅑺生於蚊睫離珠子羽拭眼而望弗能見也莊子曰夫愛馬者以筐盛屎以蜄盛溺適有蚊䖟撲縁而拊之不時則鈌御毀首碎􅅐又曰肩吾見狂接輿狂接輿曰日中始何以語汝肩吾曰告我君人者以已出經式義度民孰敢不聽而化接輿曰是欺德也其於治天下也猶渉海鑿河而使蚊􅀒山也又曰孔子見老􅆅而語仁義老聃曰夫播糠眯目則天地四方易位矣蚊䖟噆音匝膚則通宵不寐矣淮南子曰夫貴賤之於身也猶條風之時麗也時麗忽一過也毀譽之於巳也猶蚊䖟之一過也又曰蜂蠆螫指而神不能掞音淡蟁音文䖟噆膚噆齧也而性不能平今憂患之來嬰人心也非直蜂蠆之螫毒而蟁䖟之㦧音惨怛也而欲静漠虚無奈何哉牟子曰昔公明儀爲牛彈清角之操伏食如故轉爲蟁䖟聲則翹尾而躡蹀夏侯子曰一螘之行一蚊之飛聖人皆知之金樓子曰荆州髙齊盛夏之月無白鳥余亟寢處於其中及移餘齋則聚蚊之聲如雷矣數丈之間如此之異吁可恠哉又曰白鳥蚊也齊􅁊公卧於柏寢謂仲父曰吾國冨民殷無餘憂矣一物失所寡人猶爲之於邑白鳥營飢而求飽寡人因之開翠紗之帳進蚊子焉其蚊有知禮者不食公毎熟即拆裂蚊子羣飛唯皮殻而巳士人謂之蚊子樹嶺表録異曰蚊母鳥形如青鷁觜大而長於池塘捕魚而食毎呌一聲則有蚊蚋飛出其口俗云採其翎爲扇可辟蚊子亦呼為吐蚊鳥䖟晉書曰惠帝時洛陽南山有䖟作聲曰韓屍識者以爲韓氏􅀅屍戮俄而韓謐􅀍誅淮南子曰䖟戢精血以􅀋推之也許慎曰䖟食血又曰䖟與􅂹致千里而不飛無糗糧之資而不飢又曰上古之時冬日則不勝霜雪霧露夏日則不勝暑􅀬蟁䖟蚋梁書曰梁武丁貴嬪諱令光譙國人也􅀄貴嬪少時與鄰女月下紡績諸女並患蚊蚋而貴嬪弗之􅁴也又曰孫謙居身儉素牀施蘧蒢屏風冬則布􅀍莞席夏日無幬帳而夜卧未甞有蚊蚋人多異焉列子曰目􅀅眇者先睹秋毫耳􅀅聾者先聞蚋飛淮南子曰􅉼牛之鼎沸而蝇蚋弗敢入􅉼牛受一牛之鼎也崑山之玉瑱崑山崑崙也瑱式也而塵垢弗能汙也又曰羊肉不慕蟻蟻慕於羊肉羶也醯酸不慕蚋蚋慕於醯酸也吕氏春秋曰􅇲黄蚋聚之有酸也美羮徒水則必不可以狸致䑕以冰致蠅雖上聖不能以茹魚致蠅蠅愈至茹女居反臭也以致之之道不去也蜉蝣毛詩曹蜉蝣曰刺奢也蜉蝣之羽衣裳楚楚蜉蝣渠略也朝生夕死猶有羽翼以自脩飾楚楚鮮明貌爾雅曰蜉蝣渠略似蛣蜣身狹而長角黄黑色叢生糞土中朝生暮死猪好啖之􅀃文曰􅁗晉之間謂蜉蝣爲渠略郭璞注曰似天牛而小有甲也又曰音略蟲也一名蜉蝣朝生暮死陸機毛詩䟽義曰蜉蝣方土通謂之渠略似甲蟲有角大如指長三四寸甲下有翅能飛夏月隂􅀨時地中出令人􅏫炙噉之美於蟬也樊光曰是糞中蝎蟲隨􅀨而出朝生而夕死淮南子曰􅀛三千歳蜉蝣不飲食三日而死以蜉蝣爲􅀛憂養生之具必失之廣志曰蜉蝣可燒啖美於蟬蜉蝣在水中翕上㝷死隨流而去傅咸蜉蝣賦曰讀詩至蜉蝣感其雖朝生夕死而能修其翼可以有興遂賦之王襃聖主得賢臣頌曰蟋蟀􅀱秋吟蜉蝣出以隂蠛蠓爾雅曰蠛蠓小蟲似蚋喜亂飛漢實録曰周太祖軍至北郊時慕容彦超自􅀒沉勇謂上曰北來都􅀅臣盡諳知以臣觀之蜉蝣蠛蠓耳列子曰朽壤之土春夏之月蠛蠓者因􅀨而生見陽而死莊子曰孔子聞老聃之言出吿顔回曰丘之於道也其猶醯雞歟醯雞者甕中之蠛蠓也淮南子曰衰丗則聚虫滿野許愼曰飛虫蠛蠓抱朴子曰蠓蟈之育於醢酢芝檽之産於木石蛣􅔒之滋於洿游翠蘿之老於松枝非彼四物所創造也字書曰蠛蠓小虫三風舂􅀨磑者也蝴蝶北齊書曰魏収甞在洛京輕薄尤甚人號云魏収驚蛺蝶文襄曽遊東山令給事黃門侍郎等宴文襄曰魏収􅀶才無冝適湏出其短徃復數畨収忽大唱曰楊遵彦理屈巳倒遵彦從容曰我綽有餘暇山立不動􅀂遇當塗恐翩翩遂逝當塗者魏翩翩者蝶也文襄先知之大􅀏稱善梁書曰沈麟士年過八十耳目猶聦明反故抄冩火下細書復成二三千卷满數十篋時人以爲養身静嘿所致仍製黒蝶賦以􅀉意漢實録曰右􅁥門衛大􅀅軍許遷言臣奉命􅀶州至􅀶平縣戴村有蝝弥亘數里一夕言並化蝶飛去列子曰烏足以其根爲蠐螬其葉爲蝴蝶莊子曰昔周夢爲胡蝶林林然胡蝶也不知周也俄覺則瞿瞿然周也不知周之夢爲胡蝶與胡蝶之夢爲周與周與胡蝶則必有分矣此謂物化抱朴子曰髻孺背千金而逐蛺蝶越人弃八珎而甘􅀛蛇金樓子曰陳思之文羣才之俊也而武帝誅之尊靈永蟄明帝頌云聖體浮輕浮輕有似於胡蝶永蟄頗擬於昆虫施之尊極不其􅃖乎崔豹古今注曰蛺蝶一名野蛾一名風蝶東人謂爲撻末色白背青者是也其大有如蝙蝠者或黒色或亦斑名曰鳯子一名鳯車一曰鬼車生江南甘橘園中廣五行記曰晉安帝義熈中烏傷人葛輝在妻家􅀫三更有兩人把火逕至堦前疑是惡人便打之欲下杖悉化爲蝶蠙紛飛散有一物衝輝腋下便打倒地輝少時而死嶺南異物志曰甞有人浮南海泊於􅀌岸忽有物如蒲帆飛過海􅀅到舟􅔡以物擊之如㠶者盡破碎墜地視之乃蛺蝶也海人去其翅足秤之得肉八十斤噉之極肥美嶺表録異曰鶴子草􅟵上春生􅀟虫只食其葉越女收於粧奩中養之如蠶摘其葉飼之虫老不食而蜕爲蝶蝶赤黄色婦女收而帶之謂媚蝶螢毛詩􅃎七月曰町畽鹿場熠耀宵行螢火也大戴禮夏小正曰丹鳥羞白鳥丹鳥也者謂丹良也白鳥也者謂蛟蚋也其謂之鳥者重其養也凡有翼者爲鳥羞也者進也禮記月令曰季夏之月腐草爲螢爾雅曰螢火即炤夜飛腹下有火音照廣雅曰景天螢火燐也續晉陽春秋曰車㣧字武子好學不倦家貧不常得油夏月則練囊盛數十螢火以夜継日焉後漢書曰光熹元年秋張讓叚珪劫少帝及陳留王恊走小平津帝與王夜歩逐螢火光行數里得民家露車共乗還宫隋書曰大業十二年煬帝幸景華宫徴求螢火得數斛夜出遊山而放之光遍巖谷崔豹古今注曰螢一名輝夜一名景輝天一名熠燿一名燐一名丹良一名夜光一名宵燭腐草爲之食蚊蚋焉月令曰丹鳥羞白鳥白鳥即蚊也丹鳥螢也􅀃文云􅁗人謂蚊曰蚋淮南萬畢術曰螢火却馬注云取螢火裹以羊皮置土中馬見之鳴却不敢行祖台之志怪曰昔懷帝永嘉中譙國丁祚渡江至隂陵界時天昏霧在道北有社見一物如人到立兩眼垂血從額下聚地兩處各有升餘祚與從弟齊喝之滅而不見立處聚血皆化爲螢火數千枚縱橫飛起夲草經曰螢一夕夜光一名即照一名熠燿潘岳螢火賦曰爛􅀂飛景之霄遊音衛如移星之雲流動集飄揚灼如隨珠熠爚􅀂丹蘂之􅀄葩彯頴􅀂流金之在沙傳咸螢火賦曰余曽獨處夜不能寐顧見螢火意遂有感於是執以自炤而爲之賦其辭曰感詩人之攸懷􅀆覽熠耀於前庭不以姿質之鄙薄􅀆欲増輝乎太清雖無􅀘於日月期自竭於陋形􅑺蛉毛詩節小宛曰􅑺蛉有子蜾蠃􅀒之螟蛉桑蟲也蜾蠃蒲盧也負持也箋云蒲盧取桑蟲之子􅀒持而云煦嫗餋之以成子毛詩義䟽曰􅑺蛉似歩屈其色青細小或在草葉上土蜂取之置木穴中或書卷間筆筒中七日而成其子里語曰呪云象我象我陸機毛詩義䟽曰􅑺蛉犍爲文學舎人曰桑上小青蟲也似歩屈郭璞注方言曰尺蠖又呼歩屈其色青而細小或在草木葉上今蜾蠃所􅀒爲子者爾雅曰􅑺蛉桑蟲也俗亦謂桑蟃亦曰戎支蠮螉爾雅曰蜾蠃蒲盧也郭璞注曰細腰蜂也俗呼爲蠮螉音咽翁陸機毛詩䟽義曰蜾蠃土蜂一名蒲盧似蜂而小腰故許愼云細􅆎也取桑蟲負之於木空中筆筒中七日而化其子里語曰呪云象我象我也禮記中庸曰哀公問政於孔子孔子對曰文武之政布在方䇿其人存則其政舉其人亡則其政息人道敏政地道敏樹夫政也者蒲盧也蒲盧蜾蠃土蟲也取螟蛉而化之以爲子為政化百姓亦如蒲盧也故爲政在人揚子法言曰􅑺蛉之子殪而逢蜾蠃祝曰􅀋我乆則肖之矣速哉七十子之肖仲尼也肖􅀋也太平御覽卷第九百四十五
