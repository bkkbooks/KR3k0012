front:
  text: 太平御覽卷第五百四十
  hash: sha256:f451f072725594f64770a20da291b09e24457239e0fb60016b89b3dca4ac6c51
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_540-1a}
body:
  text: 禮儀部十九冠婚姻上冠儀禮曰士冠禮筮于廟門鄭玄注云筮者告於廟重成人之禮主人玄冠朝服緇帶素韠即位于門東西面筮人即席坐西靣卦者在左卒筮書卦執以示主人筮人還東而疾占卒進告吉前期三日筮賔如求日之儀筮賔筮可使冠子者乃賔􅀫賔許厥明夕爲期于廟門之外主人立于門東兄弟在其南擯者請期宰告曰質明行事夙興設洗陳服于房中西墉下爵弁服纁裳純衣緇帶韐皮弁服素積緇帶素韠􅀇裳黄裳􅄂裳緇帶爵韠緇布冠主人立于阼階下兄弟立于洗東將冠者出房南面賛者奠纚笄櫛于筵南端􅜂皮弁冠櫛筵入于房筵于戸西南面冠者就筵西拜受觶冠者奠觶于薦東筵北面坐取脯降自西適東壁北面見于母時母在闈門之内婦人入廟内闈門母拜受子拜送母又拜賔降直西序東面主人降復􅀄位冠者立于西階東南面賔字之冠者對賔出主人送于廟門外請醴賔就次此醴當作禮禮賔者謝其自勤勞冠者見於兄弟兄弟再拜冠者荅拜入見姑姉如見其母如見母者亦北面姑姉不拜也不見妹妹卑也乃易服服玄冠玄端爵韠奠贄見于君遂以贄見于大夫郷先生􅀂􅀌子則父兄戒􅀫􅀂庶子則冠于房外南面遂醮焉加始祝曰令月吉日始加元服弃尒㓜志順􅈛成德壽考惟祺介尒景福再加曰吉月令辰乃申尒服敬尒威儀淑愼􅈛德眉壽萬年永受斯福三加曰以歲之正以月之令咸加􅈛服兄弟具在以成厥德黄耇無疆受天之慶醴辭曰甘醴惟厚嘉薦令芳拜受􅀕之以定爾祥承天之休壽考不忘醮辭曰㫖酒旣清嘉薦既時始加元服兄弟具來孝友時格永乃保之􅄪醮曰㫖酒旣湒嘉薦伊脯乃中爾服禮儀有序􅀕此嘉爵承天之祐三醮曰旨酒令芳籩豆有楚咸加􅈛服肴􅂛折俎承天之慶受福無疆字辭曰禮儀旣備令月􅁻曰昭告􅈛字爰字孔嘉髦士攸冝冝之于嘏永受保之大戴禮逸禮曰太子旣冠成人免於師傳則有司過之史有虧膳之宰太子有過史必書之禮記郊特牲曰始冠緇布之冠也大吉冠布齊則緇之嫡子冠於阼以著代也醮於客位加有成也三加弥尊喻其志也冠而字之敬其名也無大夫冠禮而有其婚禮古者十五而后爵何大夫冠禮之有諸侯之有冠禮也夏之未造言下􅀄以上諸侯雖有㓜而即位者猶以士禮冠五十而爵命又曰始冠緇布自諸侯下達冠而幣之可也本古耳非時王之法服也又曰曽子問曰將冠子冠者至揖譲而入聞齊衰大功之喪如之何冠者賔及賛者孔子曰内喪則廢外喪則冠而不醴􅜂饌而歸即位而􅂘如冠者未至則廢内喪同也不醴不醴子也其廢者喪成服因喪不冠如將冠子而未及期日而有齊衰大功小功之喪則因喪服而冠廢告禮而因喪冠俱成人之服及至也除喪不改冠乎孔子曰天子賜諸侯大夫冕弁服於太廟歸設奠服賜於斯乎有冠醮無冠醮酒爲醮冠禮醴重而醮輕此服賜服酌用酒尊賜也不醴明不爲改冠改冠當醴之父没而冠則巳冠掃地而􅀕於禰巳􅀕而見伯父叔父而后饗冠者饗謂之禮又冠義曰冠而后服備服備而后容體正顔色齊辭令順言報未備者未可求以三始也童子之服采衣紒故曰冠者禮之始也是故古者聖王重冠古者冠禮筮賔所以敬冠事敬冠事所以重禮重禮所以爲國本也國以禮爲夲故冠於阼以著代也醮於客位三加彌尊加有成也阼謂主人之北也適子冠於阼者不醮則醮用酒於客位敬而成之也户西爲客位庶子冠於房户外又因醮焉不代父也冠者􅀄加緇布冠次加受弁次弃次加爵弁毎加益尊所以益成也又曰冠者禮之始也嘉事之重者也是故古者重冠故行之於廟行之於廟者所以尊重事尊重事而不敢擅重事不敢擅重事所以自卑而尊先祖也嘉事嘉禮也宗伯掌五禮有􅁻禮有凶禮有賔禮有軍禮有嘉禮而冠屬嘉禮周禮曰以昏冠之禮親成男女也左傳襄公曰晉侯以公宴于河上問公年季武子對曰㑹于沙隨之歳寡君以生晉侯曰十二年矣是謂一終一星終也國君十五而生子冠而生子禮也冠成人之服故冠而生子君可以冠矣大夫盍爲冠具武子對曰君冠必以祼享之禮行之祼謂祼鬯酒也享􅀕先君以金石之樂節之以先君之祧處之今寡君在行未可具也請及兄弟之國而假備焉晉侯曰諾公還及衛冠于成公之廟假鍾罄焉禮也家語曰邾隱公旣即位將冠使大夫因孟懿子問禮於孔子孔子曰其禮如丗子之禮懿子曰天子未冠即位長亦冠乎孔子曰古者王丗子雖㓜而即位則尊爲人君尊爲人君治爲成人之事者也何冠之有懿子曰然然則諸侯之冠異天子與孔子曰君薨而丗子主喪是亦冠也與人君無殊也懿子曰今邾君之冠非禮乎孔子曰諸侯之有冠禮也夏之末造也有自來矣今無譏焉又曰成王年十有二而嗣立明年六月冠成王而朝于祖廟以見諸侯周公命祝雍作頌曰祝王辭逹而勿多也祝雍辭曰使王近於民逺於年嗇於時惠於財親賢而任能其頌曰令月吉日王始加元服去王㓜志乃心衮職欽􅀂昊天六合是式率爾祖考烝烝無極國語曰趙文子冠謂以士禮始冠也見韓獻子獻子曰戒之此謂成人成人在始與善始與善進不善蔑由至矣蔑無也始與不善進善亦蔑由至矣如草木之産也各以其物人之有冠猶宫室之有牆屋也糞除而巳又何加焉糞除喻自脩㓗漢書曰惠帝元年冠赦天下除挾書律又曰宣帝五鳯元年皇太子冠太后賜丞相以下帛赦徒作杜陵者續漢書曰安帝靈帝加元服並大赦賜公卿金帛東觀漢記曰馬防子鉅爲常從小侯六年正月齊宫中上欲冠鉅夜拜爲黄門郎御章臺下殿陳鼎爼自臨冠之晉書禮志曰江左諸帝將冠金石􅀫設百僚陪位豫於殿上鋪大床御府令奉冕幘簮導衮服以授侍中常侍太尉加幘太保加冕太尉跪讀祝文曰今月吉日始加元服皇帝穆穆思弘衮職欽􅀂昊天六合是式率遵祖考永永無極眉壽惟祺介兹景福譙周喪服圖曰男子㓜娶必冠女子㓜嫁必笄禮之則從成人不爲殤禮論曰王彪之以爲禮冠自卜日不必以三元也又禮夏冠用葛屨冬冠用皮屨明無定時也後漢應亨贈四王冠詩曰永平四年外弟王景系兄弟四人並冠故貽之詩曰濟濟四令弟妙年踐二九今月惟吉日成服加元首雖無兕觥爵杯醮傳㫖酒後漢黄香天子冠頌曰以三載之孟春建寅月之上旬皇帝將加玄冕簡甲子之元辰厥日王於太皥厥時叶於百神旣臻廟而成禮乃迴軨而反宫正朝服以享宴撞太蔟之庭鍾祚蕃屏而鼎輔曁夷裔之君王咸進酌于金罍獻萬年之玉觴蕭子冠子箴曰是月惟令敬擇良辰式遵又國風曰谷風刺夫婦失道也衛人化其上􅁋於新婚而弃其舊室夫婦離絶國俗傷敗焉習習谷風以隂以雨僶俛同心不冝有怒德音莫違及爾同死又曰綢繆刺晋亂也國亂則婚姻不得其時焉不得其時謂不及中春之月又曰東門之楊刺時也婚姻失時男女多違親迎女猶有不至者也東門之楊其葉牂牂興也牂牂然盛貌言男女失時不速秋冬箋云楊葉牂牂三月中也興者言時晚也失仲春之月婚以爲期明星煌煌期而不至也箋云親迎之禮以婚時女留他色不肯時行乃至大星煌煌也又曰有狐刺時也衛之男女失時喪其妃耦焉古者國有凶荒則殺禮而多婚㑹男女之無夫家者所以育人民也育生長也又小雅曰我行其野刺宣王也刺其不正嫁取之數而有荒政多􅁋婚之俗我行其野蔽芾其樗婚姻之故言就爾居樗惡木也箋云樗之蔽取芾始生謂仲春之時嫁取之月婦之父壻之父相謂婚姻言我也我乃以此二父之命故我就女居我豈其無禮來乎責之也我行其野言采其遂婚姻之故言就爾􅀫又文王大明曰贄仲氏任自􅀍殷啇來嫁于周曰嬪于京贄國任姓也贄國之中女也王季大王之子文王父也太任從殷啇之畿内嫁爲婦於周之京配王季共行仁義之德同志意也大戴禮逸禮曰子孫娶妻嫁女必擇孝悌丗丗有行義者是則其子孫慈悌孝愛不敢􅁋􅁀黨無不善三族輔之故鳯皇生而有仁義之意虎狼生而有貪戾之心嗚呼戒之哉無飬乳虎將傷天下儀禮曰記士婚禮凡行事必用昏昕受諸一禰廟辭無不腆無辱摯不用死皮帛必可制腊必用鮮魚用鮒必殽全禮記曲禮上曰男女非有行媒不相知名見媒徃來傳婚姻之言乃相知姓名非受幣不交不親故書日月以告君齋戒以告􅀑神爲酒食以召郷黨寮友以厚其别也娶妻不娶同姓故買妾不知其姓則卜之又曲禮下曰納女於天子曰備百姓於國君曰備酒漿於大夫曰備灑掃納女猶致女也又曽子問曰孔子曰嫁女之家三夜不息燭思相離也親骨肉也娶婦之家三日不舉樂思嗣親也重丗變也又郊特牲曰夫婚禮萬丗之始也娶於異姓所以附逺厚別幣必誠辭無不腆誠信也腆猶善也告之以直信直正也二者所以殺婦正直也信事人也信婦德也一與之齊終身不改故夫死不嫁男子親迎男先於女剛柔之義也天先乎地君先乎臣其義一也執贄以相見敬章别也男女別然後父子親父子親然後義生義生然後禮作然後萬物安無別無義禽獸之道也壻親迎授綏親之也親之也者敬之也敬而親之先王之所以得天下也出乎大門而先男帥女女從男夫婦之義由此始婦人從人者也㓜從父兄嫁從夫夫死又雜記下曰納幣一束束五兩兩五尋納幣謂婚禮納也十箇爲束貴成數也兩者合其卷是謂五兩八尺曰尋則每卷二束也合之謂四十尺謂之疋由匹偶之云也又􅀕統曰國君娶夫人之辭曰請君之玉女與寡人共有幣邑事宗廟社稷此求助之夲也又經解曰婚姻之禮廢則夫妻之道苦而􅁋僻之罪多矣又哀公問曰哀公問於孔子曰敢問爲政如之何孔子對曰古之爲政愛人爲大所以治愛人禮爲大所以治禮敬爲大敬之至矣大婚爲大大婚旣至冕而親迎親之也公曰冕而親迎不巳重乎巳猶大也怪親迎乃服􅀕服也對曰合二姓之好以継先聖之後以爲天地宗廟社稷之主君何謂巳重乎天地不合萬物不生大婚萬丗之嗣也君何謂巳重焉又婚禮曰婚禮者將合二姓之好上以事宗廟而下以継後丗也故君子重之是以婚禮納采問名吉納􅁻納徴致禮幣爲徴信也請期求請迎之吉也皆主人筵几於廟而拜迎於門外入揖讓而􅂛聽命於廟所以敬慎重正婚禮也父親醮子而命之迎男先於女也子丞命以迎主人筵几於廟而拜迎於門外壻執鴈而入揖譲外再拜奠鴈蓋親授之於父母也又外傳曰古者謂婚姻爲兄弟因成兄弟之義也壻曰婚以昏時徃婦曰姻因壻之來則從之而去又壻之父曰姻婦之父曰婚爾雅取其内外父黨之新者壻者陽也婦者隂也日徃而隂氣至也昏時曰徃則月來陽徃隂来之義又曰夏殷五丗之後則通婚姻周公制禮百丗不通所以别禽獸也左傳文公上曰逆婦姜於齊卿不行非禮也又成下曰晉侯使吕相絶􅁗曰昔逮我先君獻公及穆公相好戮力同心申之以盟誓重之以婚姻天禍晉國文公如齊惠公如􅁗又晉侯使吕相絶􅁗曰白狄及君同州君之仇讎而我之婚姻也君來賜命曰吾與汝伐狄寡君不敢顧婚姻畏君之威而受命于吏又成下曰聲伯之母不聘不聘無媒禮穆姜曰吾不以妾爲姒生聲伯而出之嫁於齊又定上曰楚昭王敗鍾建􅀒季芉以逃王將嫁季芉辭曰所以爲女子逺丈夫也鍾建負我矣以妻鍾建又哀上曰劉氏范氏丗爲婚姻劉氏周卿士范氏晋大夫太平御覽卷第五百四十
