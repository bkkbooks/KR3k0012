  text: 太平御覽卷第三百一十六兵部四十七
  hash: sha256:7d9a630dac8ef3657fb1a492e331dafca091e277eddcef64bef4d5aff3ae57ac
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_316-1a}
body:
  text: 掩襲下晉書曰石勒僞推奉晉幽州刺史王浚浚不疑勒於是輕􅀐襲幽州以火霄行至易水浚督護孫緯馳遣白浚引軍拒勒浚將佐咸請出軍擊勒浚怒曰石公來正欲奉戴我也敢言擊者斬乃命設饗以待之勒晨至薊北門者開門疑有伏兵先驅牛羊數千頭聲言上禮實欲塡諸街巷使兵不得發浚乃懼或坐或起勒入城􅂛其㕔事命甲士執浚立之於前數其罪惡而誅之遂䧟幽州又曰劉􅁉秉政劉毅爲荆州刺史每多異同之議􅁉帥兵討之遣禆將王鎭惡先襲至豫章口豫章口去江陵城二十里自鎭惡進路楊聲劉蕃上先是毅稱病表請從弟兖州刺史蕃爲副毅謂信然不知見襲鎭惡自豫章口捨􅂳歩上小將蒯思軍在前鎭惡次之舸留一乙士卒之次也對舸岸上竪六七旗每旗下安一鼔語所留人計我將至城便長嚴令如後有大軍􅃺又分隊在後令燒江津􅂳艦鎭惡逕前襲城語前軍􅀂有問者但云劉兖州至津戍及百姓皆言劉蕃實上晏然不疑未至城五六里逢毅親將朱顯之將千餘􅀐從者數十欲出江津問是何人荅曰劉兖州至顯之􅀐前問蕃在所荅云在後顯之旣至後不見蕃而見軍人擔鼓排戰具又遥見江津􅂳艦巳􅀍焚燒煙熖張天而鼓嚴之聲甚盛如其非蕃上便躍馬馳去告毅外有大軍似從下上垂已至城江津􅂳悉􅀍火燒矣行命閇諸城門鎭惡亦馳進軍人縁城得入門猶未及下􅀜因得開大城東門入城内毅凡有八隊餘已得戒嚴蒯思入東門便北廽擊射堂前軍攻金城東門鎭惡入東門便直西擊金城西門軍分攻金城南門毅金城内東從舊將士猶有六隊千餘人食時就􅀜中晡西入退散及歸降略盡鎭惡入城便因風放火燒大城􅀯門及東門又遣人以詔及文并髙祖手書凢三篋示毅皆燒不視金城内亦未信􅁉自來鎭惡至軍門人與毅東來將士或有是父兄子弟中表親者鎭惡命因闘且共語衆並知劉􅁉自來人情離懈一更許聽事前陣散潰毅左右兵猶閇東西閣拒戰鎭惡恐慮夜暗自相傷犯乃引軍出繞金城開其南面以退毅慮􅀯有伏兵三更中率左右三百許人開北門突出城於佛寺自縊梁書曰侯景反䧟建業髙州刺史李遷仕據大臯圗逆召髙梁太守馮寳寳欲徃其妻沈氏止之曰刺史無故不合召太守此詐君欲爲反耳頃者京師危逼羽檄徴兵遍于郡縣刺史稱疾不赴繕甲治兵今巳備矣而更召君徃必見留追君兵衆此意可知矣魚不可脫於泉願且勿行遣使譎之曰身病篤謹遣妻傳意并送土物以省之彼聞喜必無防爲君取之如反掌矣寳從之於是沈氏自將千人皆藏短兵歩檐雜物唱言賝貨賝音琛先書報遷仕曰太守馮寳疾篤謹令妻沈氏傳啓并奉土貢以資軍費遷仕大恱出迎沈氏因釋檐出刃大破之遷仕脫身而遁沈氏入據其城盡収其衆後魏書曰晉王伏羅督髙平源州諸軍討吐谷渾慕利延軍至樂都謂諸將曰􅀂從大道恐軍聲先振必當逺遁􅀂潜軍出其非意此鄧艾擒蜀之計也諸將咸難之伏羅曰夫將軍制勝萬里擇利專之可也遂間道行至大母橋利延衆驚奔白蘭慕利延兄子拾寅走河曲降其一萬餘落又曰陸俟代人也長安盧永劉超等聚黨以叛丗祖詔俟以夲官鎭長安使以方略定之於是俟單馬之鎭超聞之欣然以爲無能爲也旣申􅀭威信示以成敗誘納超女外􅀂姻親超猶自驚􅀄無降意俟乃率其帳下徃見超觀其舉措超使人逆曰三百人以外適當以弓馬相待三百以内當以酒食相供乃將三百􅀐詣超超設備甚嚴俟遂縱酒以盡醉而返後謂將士曰超可取乃宻選精兵五百人激厲之言至懇切士卒荅曰以死從公必無二也遂僞獵詣超與士卒約曰今㑹發機以當醉爲限俟於是詐醉上馬大呼手斬超將士皆應聲縱擊遂平之丗祖大恱徴還轉外都大官又曰魏使蕭寳寅伐梁堰淮水濫溢將爲楊徐之患寅於堰上流鑿新渠引注淮澤乃遣將士千餘夜渡淮燒其營聚破賊斬其將軍而還又曰慕容白曜南征宋以酈範爲副帥次無鹽宋將申纂慿城拒守議者僉以攻具未周不冝便進範曰今輕軍逺襲深入敵境無冝淹留乆稽機候且纂必以我軍來速不在攻守謂方城可慿弱卒可恃今􅀂外潜威形内整戎旅宻厲將士出其不意可一攻而尅之白曜遂潜軍僞退示以不攻纂果不設備於是即夜部分晨便騰城崇朝而剋又曰幽州刺史劉靈助以莊帝􅀍爾朱兆所弑遂舉兵唱義諸州豪右咸相通結靈助屯於定州之安固兆遣將叱列延慶討之諸將謂延慶曰靈助善於卜占百姓信惑所在響應未易可圗􅀂万一戰有利鈍則大事去矣􅀂未還師西入據􅀜拒嶮以待其變延慶曰劉靈助庸人也天道深逺豈其所識大兵一臨彼皆恃其妖術坐看符猒寜肯勠力致死與吾爭勝􅀒哉如吾計者欲出城營外詭言西歸靈助聞之必信而自寛潜軍徃襲可一舉而擒乃出頓城西聲云將還簡精􅀐一千夜發詰朝造靈助壘戰於城北遂破􅀍擒之又曰宕昌羌獠甘作亂逐其王彌定魏遣將史寧討破之甘將百􅀐走投生羌鞏㢘王彌定遂得復位寧以未獲獠甘宻欲圖之乃􅀭聲欲還獠甘聞之復招引叛羌依山起柵欲攻彌定寧謂諸將曰此羌人入吾術中當進兵擒之耳諸將思歸咸曰羌之聚散無常依據山谷今􅀂追討恐引日無成且彌定還得守藩將軍功巳立矣獠甘􅀔弱定能制之此還軍䇿之上者寧曰一日縱敵數丗之患豈可捨垂滅之㓂更煩再舉人臣之禮知無不爲此觀諸軍不足與計事也如更沮衆寧豈不能斬諸將遂進軍獠甘衆亦至與戰大破之生擒獠甘并鞏廉王後周書曰劉亮􅀄從賀㧞岳西征常先鋒䧟陣以功拜大都督及岳􅀍害亮與諸將謀迎太祖􅃎州刺史孫定兒據州不下涇􅁗諸州悉相與應衆至數萬推定兒爲主以拒義師太祖令亮襲之定兒以義兵猶逺未爲之備亮輕將二十􅀐先竪一纛於近城髙嶺即馳入城中定兒方致酒髙㑹卒見亮衆皆駭􅕎莫知所爲亮乃麾兵斬定兒首懸首號令賊黨仍遥指城外纛命二􅀐曰出追大軍賊黨大懼一時降附於是諸州皆歸欵伏太祖置十二軍諸將將之亮領一軍毎征討與怡峯俱爲􅀐將又曰賀㧞岳從爾朱天光討万俟醜奴宣言逺近曰今氣􅀱漸􅀬非征討之時待至秋凉更圗進取醜奴聞之遂以爲實分遣諸軍散農營於歧州之北百里綱州岳與天光諸軍盡發掩之醜奴乃弃平亭而走岳輕􅀐急追明日及醜奴於平涼之長坈一戰擒之隋書曰遂州獠反命將周法尚討之軍將至賊弃州城走散山谷間法尚捕不能得於是遣使慰諭以官號僞班師自行二十里軍再舎潜遣人覘之知其首領盡歸柵聚飲相賀法尚選歩􅀐數千人襲擊破之又曰李徹從元帥衛王爽擊突厥行軍㹅管李充言於爽曰周齊之丗有戰國中夏力分其來乆矣突厥毎侵邊諸將輙以全軍爲計莫能死戰由是突厥勝多敗少所以毎輕中國之師今者沙鉢略悉國内之衆屯據要險必輕我而無備精兵襲之可破也爽從之諸將多以爲疑唯徹􅅄成其計請以同行遂與充率精􅀐五千出其不意掩擊大破之沙鉢略弃所服金甲潜草中而遁以功加上大將軍又曰李安爲尚書右丞黄門侍郎下陳之役以爲楊素司馬仍領行軍揔管率蜀兵順流東平時陳人屯白沙安謂諸將曰水戰非北人所長今陳人依險泊􅂳必輕我而無備以夜襲之賊可破也諸將以爲然安率衆先鋒大破陳師髙祖嘉之詔書勞曰陳賊之意自言水戰爲長險隘之間彌謂官軍所憚開府親將所部夜動舟師摧破賊徒生擒虜衆益官軍之氣破賊人之膽副朕所委聞以欣然進位上大將軍又曰李宻擊宇文化及精兵良將多有死傷王世充在東都乗其弊而擊之率歩􅀐二萬營於洛南李宻軍於偃師北世充潜遣二百􅀐夜伏於邙山自統其衆遲明渡水人奔馬馳以襲宻營遽出兵以拒之陣未成列兩軍已合伏兵於北山中乗髙而下馳入宻營燒其廬舎宻見營中火發因而遁走又曰煬帝末年群盗起遣將張須陁擊盧明月於下邳賊連營十餘萬須陁􅂊萬人力勢不敵去賊六七里立柵相持經十餘日糧盡欲退謂將士曰賊見兵却必輕來追我其衆􅀂出營内即虚欲以千人襲營可有大利此乗危險誰能去者人皆莫對唯秦叔寳與羅士信皆曰願行於是須陁委柵而遁使二人分領千兵潜伏於草莾旣而明月悉兵追之叔寳士信馳至其柵柵門閉不得入二人超昇其樓抜賊幟各殺數人營中大亂叔寳斬􅀜而納外兵因散縱火焚其三十餘柵煙熖漲天明月奔還須陁却逐之大破賊衆明月以數百􅀐遁去餘皆虜之又曰李宻起兵于雍丘是時河南山東大水死者將半宻將李勣言於宻曰今人多阻飢􅀂據得􅀺陽倉大事濟矣宻乃遣勣領麾下五千人自原武濟河掩襲即日剋之開倉恣食一旬之間勝兵二十餘萬人唐書曰髙宗遣將薛仁貴郭待封等伐吐蕃大非川將赴烏海仁貴謂待封曰烏海險逺車行艱澁􅀂引輜重將失事機又破賊即廻不煩轉運彼多瘴癘無冝乆留大非川嶺上寛平足堪置柵可留二萬人作兩柵輜重並留柵内吾等輕銳倍道掩其未整即撲滅之矣仁貴遂率衆先行至河口遇賊擊破斬之所獲甚衆収其牛羊萬餘頭又曰貞觀􅀄突厥頡利可汗牙於定襄時諸部離散代州道行軍揔管李靖選驍􅀐三千徑赴惡陽嶺出其不意擊之突利驚走靖遂収定襄之地頡利可汗懼退寳鐵山遣使入朝謝罪請舉國内附又命靖徃迎之頡利雖外請入朝猶持兩端待草青馬肥將踰沙磧其年太宗遣唐儉安脩仁徃頡利牙慰撫之靖揣知其意謂副將張公謹曰詔使到彼虜必自寛􅀂選精􅀐一萬賷二十日糧引兵自白道襲之破虜必矣公謹曰詔許其降行人在彼未冝置討靖曰此兵機也時不可失韓信所以破齊如唐儉等輩何足可惜督軍疾進師至隂山遇其斥候千餘帳皆俘以隨軍頡利見詔使大恱不虞官兵之卒至靖軍將逼其牙十五里虜始􅁴頡利乃走靖俘斬萬餘級獲口十餘萬得可汗婦隨義城公主殺之頡利奔吐谷渾西道行軍張寳相擒之以獻俄而突利可汗來降靖始復定襄􅁪安故地開拓北境自隂山巳北至於大漠太宗􅀄聞突厥國滅謂侍臣曰朕聞主憂臣辱主辱臣死昔國家草創太上皇以百姓之故稱臣於突厥朕未嘗不痛心疾首志滅凶奴坐不安席食不甘味今暫舉偏師無徃不捷單于欵塞恥其雪乎因大赦天下大酺五日又曰李愬將襲蔡州先七日使判官鄭澥告師期於裴度乃以李祐帥突將三千爲先鋒李忠義副之愬自帥中軍三千田進誠以後軍三千殿而行􅀄出文城柵衆請所向愬曰東六十里而止至賊境曰張柴圍入之而盡殺其衆令軍士少息分食繕羈勒兵甲胄發刃彀弓復建斾而出是日隂晦雨雪大風裂旗斾馬慄而不能躍士卒苦寒抱戈僵仆者道路相望其川澤梁徑險夷張柴以東師人未嘗蹈其境皆謂投身不測􅀄張柴諸將請所止愬曰入蔡州取元濟也諸將矢色監軍使駐馬哭曰果落祜計中矣愬不聽促進師其下皆謂其必不還然以從愬之令無敢爲身計者愬道分五百人斷洄曲路橋其夜凍死者十二三又分五百人斷㓪山路自張柴行七十里北至縣瓠城夜半雪愈甚城傍有鵝鴨池愬令驚擊之以雜其聲賊恃吴房㓪山之固晏然無一人知者李祐李忠義持钁坎城而先登敢銳者從之盡殺守門卒而發其門留柝者以安之及鷄鳴雪亦止愬以衆入止元濟外宅田進誠續至乃合衆攻其子城子城防卒及雜役者尚千餘人乗城拒戰􅀄有告元濟不信又告城䧟矣元濟曰是洄曲子弟歸求寒衣耳及出聽聞愬號令云常侍傳語乃曰何常侍乃得至此遂操弓挾矢麾其左右奴僕盡乗城而自督戰愬計元濟猶望董質來救乃訪質家安恤之使其子持書禮召質質見子言城巳䧟及元濟􅀌窘之􅃺又見李祐軰巳立竒功乃􅁣然以單􅀐歸愬白衣叩伏愬前愬揖登堦以賔禮與之食時田進誠旣毀其城外門得甲仗庫易其器甲明日後薄城焚其南門百姓爭􅀒薪蒿以委之元濟城上以請罪進誠授梯而下之愬得元濟檻送京師其申光二州城鎭兵尚二萬餘人相次來降自元濟就執愬不戮一人其爲元濟執事帳下及厨厩之間者使復其職使之不疑乃屯軍鞠塲以􅀱裴度也又曰石雄爲劉􅃆禆將㑹昌􅀄回鶻㓂天德詔命劉􅃆爲招撫迴鶻使三年廻鶻大掠雲朔北邊牙於五原􅃆以太原之師屯于雲州􅃆謂雄曰􅃛虜離散不足駈除國家以公主之故不欲急攻今觀其所爲氣凌我輩􅀂禀朝旨或恐依違我輩捍邊但能除患專之可也公乃選驍徤乗其不意徑趍虜帳彼以疾雷之􅀔不睱枝梧必弃公主亡竄事苟不捷吾自繼進亦無患也雄受教自選勁􅀐得沙陁李國昌三部落兼契苾拓㧞雜虜三千􅀐月暗夜發馬邑徑趍烏介之牙時虜帳逼振武雄旣入城登堞視其衆寡見氊車從十從者皆衣朱碧􅀋華人服飾雄令諜者訊之此何大人虜曰此公主帳也雄喻其人曰國家兵馬欲取可汗公主至此國家也須謀歸路俟其兵合時不得動帳幕雄乃大率城内牛馬雜畜及大鼓夜穴城爲十餘門遲明城上立旗張炬火乃於諸門縱其牛畜鼓譟從之直犯烏介牙帳炬火燭天鼓譟動地可汗惶駭莫測率􅀐而奔雄率勁􅀐追之至殺胡山急擊之斬首萬級生擒五千羊馬車帳皆委之而去遂迎公主還又曰黄巢旣䧟長安時鄭畋帳下小校竇􅅼者驍敢無敵毎夜率敢死之士百人直入京師放火燔諸門斬級而還賊人悚駭吕氏春秋曰齊令章子將攻荆荆令唐篾將拒之與荆人夾泚水而軍章子令人視水可絶者荆人射之水不可得近有芻水旁者告齊侯者曰水淺深甚易知荆人所盛守盡其淺者也所簡守皆其深者也使載芻者與見章子因夜奄荆人所盛守果殺唐篾也太公隂謀書武王伐殷兵至牧野晨舉脂燭推掩不備太平御覽卷第三百一十六
