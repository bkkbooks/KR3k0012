front:
  text: 太平御覽卷第八百八十七妖異部三
  hash: sha256:62eeca6fa31597ef6108c0a9218c4ed18ae46f871fba12f0167dbf50a099680f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_887-1a}
body:
  text: 重生變化上重生左傳宣上曰􅀳人獲􅁗諜殺諸絳市六日而蘇續漢書曰献帝􅀄平中長沙人姓桓死月餘其母聞棺中有聲發之遂生至隂爲陽下人爲上其後曹公由匹庶起又曰武安四年武陵女子李娥年六十餘病物故􅄟於城外數里巳四十日行人聞其􅊘中有人聲便語其家家徃視聞娥聲出之遂活呉志曰孫休永安四年吴民陳焦死埋之六日更生穿土中出前趙録曰麟嘉元年大將軍東平王豹卒一指猶暖遂不殯殮至甲戍乃􅂫言見淵於不周山經五日遂復從至崑崙山三日而復返唐書曰貞元中翰林待詔戴少平死十六日復生建康實録曰晉方士戴洋字國流吴興長城人也年十二遇病死五日而􅂫言執麾將士將徃蓬萊崑崙積石太室􅁪廬衡等諸山旣而遣歸葛洪神仙傳曰士爕嘗病死巳三日仙人董奉以一丸藥與服以水灌之捧其頭揺消之食頃即開目動手顔色如故漸復半日能起坐四日後能語遂復常搜神記曰晉武帝丗河間郡有男女相恱許相配適旣而男從軍積年父母以女適人無幾而憂死男還悲痛乃至冢所欲􅂘之叙哀而巳不勝其情遂發冢開棺即時􅂫活因􅀒還家將養數日平復其夫往求之其人還曰卿婦巳死天下豈聞死人復活耶此天賜我非卿婦也於是相訟郡縣不能决以讞廷尉奏以精誠之至感於天地故死而更生常理之外非禮之所處刑之所裁斷以還開冢者又曰漢平帝元始元年二月朔方廣收女子趙春病死旣棺歛六日出棺外自言見死人及父曰年二十七不當死太守譚以聞􅀃曰至隂爲陽下人爲上其後王莽􅆲位又曰􅀳咸寕中琅邪顔畿得病就醫張嗟自治死於嗟家家人迎喪旐毎繞樹木不可解送喪者或爲之傷乃言曰我壽命未應死但服藥太多傷我五臓耳今當復活愼無葬我也父拊而祝之曰􅀂爾有命復當更生豈非骨􅁏所願今但欲還家不葬爾也旐乃解還家乃開棺形骸如故微有人色而手爪所刮摩棺材皆傷於是漸漸氣息以緜飲􅄋口能咽遂乃出之日乆飲食稍多能開目視瞻屈伸手足然不與人相當不能言語飲食猶常人如此者十餘年家疲相供護不復得操事其弟弘都絶棄人事躬侍養以知名後氣力稍更衰劣卒後還死又曰建安中南陽賈偶字文合得病卒亡死時有吏將詣太山同名男女十人司命閱呈謂行吏曰當召某郡文合來何以召此人促遣令去時日暮治下有禁不得舎遂至郭門外大樹下􅀫有好女獨行無伴文合問之曰子似衣冠家何爲歩行姓字爲誰女曰我三河人也父見爲易陽令昨錯召來今得遣去遂逼日暮懼獲􅀲田李下之譏望君之容似􅀋賢者是以停留依慿左右文合曰恱子之心願交歡於今夕女曰聞之諸姑婦人以貞專爲德㓗白爲稱文合與相反覆終無動志天明別去文合死巳再􅀫停當歛視其靣有色摸心温半日間􅂫文合將驗其事遂至易陽問其令則女父也從之因問令某月某日君女寕卒亡而生耶具􅀃女姿顔服色言語相反覆本末令入問女與文合同大驚乃以女配文合又曰臨海松陽人栁榮從張悌拒􅀳軍病死舩中二日時軍巳上岸無埋之者忽然大呼言人􅅞軍帥聲激􅀭遂活人問之言上天北斗門下卒見人􅅞張軍帥門下人怒榮叱逐使去榮懼怖口餘聲發􅀭其日悌戰死續捜神記曰武都太守李仲文在郡喪女年十八權假葬郡城北後有張丗之代爲郡丗之男子長年二十侍從在郡中夢一女年可十七八顔色不常自言前府君女不幸早亡㑹今當更生心相愛樂故來相就如此五六夕忽然晝見解衣服薫香殊絶遂爲夫妻寢息衣皆有汚如處女焉後仲文婦遣婢視女墓因過丗之婦相聞入室中見此女一􅃗履在子長牀下取之啼泣呼言發冢持履歸以示仲文仲文驚愕遣問丗之君兒何由得亡女履耶丗之呼兒具陳本末李張並謂可恠發棺視之女體生􅁏顔姿如故右脚有履左脚無也自後遂死􅁏爛不復得生後夕女來曰夫婦情至謂偕老而無狀忘履以致􅁴露不復得生萬恨之心當復何言泣涕而別又曰東平馮孝將爲廣陵太守兒名馬子年二十餘獨卧殿中夜夢見女子年十八九言我是前太守徐玄方女北海人不幸早亡來至今四年爲􅀑所枉殺案録當年八十餘聽我更生要當有所依慿乃得生活又應爲君妻能從所陳免活不馬子荅曰可遂與馬子剋期當出至期日牀前地髣髴如人正與地平令人埽去愈分明始悟是所夢見者遂屏除左右人便漸覺額出次復面出一炊頃形體盡出馬子便令前坐對榻上陳􅀃語言竒妙非常遂與馬子􅀫息毎戒云我尚虚君當自節問何可得出荅曰出當得本生日生日尚未至遂徃殿中言語聲音人皆聞女計生日至女具教馬子出巳養之法語畢拜去馬子從其言至日以丹雄雞一􅃗􅁰飯一盤清酒一􅂛酹其喪前去殿十餘歩􅀕訖掘出開視女身完全如故徐徐抱出着氈帳中唯心下微暖口有氣令婢四人守養之常以青羊乳汁􅄋其兩眼開口能咽粥漸漸能語二百日中杖起一朞之後顔色肌膚氣力悉復乃遣報徐氏上下盡來選􅁻日下禮娉爲三日遂爲夫婦生二男一女長子字元度永嘉􅀄爲祕書郎小男敬度太傅􅁺女適濟南劉子彦徵士延丗之孫也又曰襄陽李除病死中時其婦守尸至夜三更中崛然起坐脫婦臂上金釧甚遽急婦因助脫得手執之還卧伺察之至曉心下更暖遂漸漸得􅂫旣活云吏將某去比伴甚多見有行貨得免歸者即許吏金訓吏令還取故歸取以與吏吏得釧便放令還幽明録曰琅邪人姓王名志居錢塘妻朱氏以太元九年病亡有二􅀌兒王復以其年四月􅁀死下三日而心猶暖經七日方􅂫􅀃􅀄死時有二十餘人皆烏衣見録録去到朱門白壁􅃺如宮殿吏朱衣素帶玄冠介幘或所􅀍着悉珠玉相連結非丗中儀服復前見一人長大所着衣􅃺如雲氣王向叩頭自􅀃歸巳亡餘􅀌兒尚小無奈何便流涕此人爲之動容云汝命自應來以汝􅀌兒特與三年之期王又曰三年不足活兒左右有一人語云俗尸何癡此間三年是丗中三十年因便送出又三十年王果卒又曰桓玄時牛大疫有一人食死牛􅁏因得病亡玄死時見人執録將至天上有一貴人問云此人何罪對曰此人坐食疫牛􅁏貴人云湏牛以轉輸􅁏以充百姓食何故復殺之催令還旣更生具􅀃其事於是食牛􅁏者无復有患又曰于慶無病卒吴猛語慶子曰于侯筭未窮方爲請命未可殯殮尸卧淨舎唯心下尚暖七日時盛暑慶形體向壞猛敎令屬纊候氣續爲作水令以與洗并飲漱如此便退日中許慶􅂫但開眼張口不得發聲時合門欣喜以向水洗唅吐腐血數􅂛能言語三日平復如常􅀃􅀄見十數人來執縛挃梏到獄同軰十餘人以次語對未至俄而見吴君北面陳釋聽斷之王勑脫械歸所經官府莫不迎接請謁吴君皆與抗禮不知悉何神耳􅀶物志曰漢末大亂有發前漢時宫人冢者宫人猶活旣出平復如舊魏郭后愛念之録著宫中常置左右問漢時宫中事􅀃之了了皆有次緒及郭后崩􅂘泣過遂死又曰魏大司馬曹休所統中郎將謝漳部曲義兵奚儂息女年四歳病死故埋藏五日復生太和三年七月詔令休使父母持送女來視之其年四月三日病死四日埋藏至八日同墟人採桑聞兒啼聲即語儂妻往發視兒生活今能飲食如常陸氏異林曰鍾繇嘗數月不朝㑹意性異常或問其故云常有好婦來羙麗非凡問者曰必是􅀑物可殺之婦人後往不即前止户外繇問何以曰公有相殺意繇曰無此勤勤呼之乃曰繇意恨恨有不忍心然斫之傷髀婦人即出以新緜拭血竟路明使人尋跡之至一大冢木中有好婦人形體如生人衣青絹衫丹繡裲襠傷一髀以裲襠中綿拭血變化禮記月令曰仲春鷹化爲鳩季春田䑕化爲鴽季夏腐草爲螢季秋雀入大水爲蛤孟冬野雞入大水爲蜃左傳昭二曰昔堯殛鯀于羽山其神化爲黄熊以入于羽淵春秋潛潭巴曰女子化爲丈夫賢人去位君獨居丈夫化爲女子隂氣淖小人聚漢書曰哀帝建平中豫章男子化爲女子嫁爲人婦生一子長安陳鳯言此陽變爲隂將亡繼嗣自相生之象一日嫁爲人婦生一子者將復一丗乃絶續漢書曰靈帝時江夏黄氏之母浴而化爲黿入于深淵其後時時出見􅀄簮一銀􅁫及見猶在其首又曰建安二十年越嶲有男子化爲女子時周群言哀帝時亦有此將有易代之事至二十五年献帝封于山陽國語曰趙簡子歎曰雀入海化爲蛤雉入于淮化爲蜃黿鼉魚鼈莫不能化唯人不能悲夫鴻範五行傳曰魏襄王十三年張儀詐得罪於􅁗而去相魏將爲􅁗而欺奪魏君是歳魏有女子化爲丈夫者天􅀂語魏曰勿用張儀隂變爲陽臣將爲君是時魏王亦􅁴之不用張儀儀免去歸秦魏無害紀年曰周宣王時馬化爲狐山海經曰姑媱之山音遥帝女死焉其名曰女尸化爲瑶草其葉成言葉相重亦音遥其華黄其實如莵丘莵免絲服者媚於人爲人所媚愛一名荒夫草又曰炎帝之女娃惡住切遊于東海溺而死化爲精衛其狀如烏常銜西山之木石以堙東海又曰夸父與日競走渴飲河河涸不足北飲大澤未至道死棄其杖化爲鄧林又曰鍾山其子鼓北神名鍾山之子耳其狀人靣龍身是與欽音邳殺葆江于崑崙之陽帝乃戮之鍾山之東日􅳿岸音遥欽化爲鶚鶚鵰屬也鼓亦化爲駿音俊鳥又曰刑夭與帝爭神帝斷其首葬之常羊之山乃以乳爲目以齊爲口操干戚以舞是爲無首民又曰太室嵩髙成陽西啓母化爲石在焉莊子曰北溟有魚其名爲鯤鯤之大不知其幾千里也化而爲鳥其名曰鵬又曰列子行食於道仄見百歳髑髏攓蓬而指曰唯余與女知而未嘗死而未嘗生也種有幾得水則爲繼得水土之際則爲蠅蠙之衣生於陵屯則爲陵舄陵則爲鬰棲鬰棲則爲烏足烏足之根爲蠐螬其葉爲蝴蝶蝴蝶胥也化而爲蟲生於竈下其狀􅀂脫其名爲駒掇駒掇千日而化爲鳥其名爲乾餘胥乾餘胥之沫爲斯彌斯彌爲食䤈頥輅生乎食䤈黄軦食䤈黄軦生乎九猷九猷生乎瞀芮瞀芮生乎腐蠸腐蠸生乎羊奚羊奚比乎不乆竹不乆竹生於青寧青寜生程程生馬馬生人人又返入於機萬物皆出於機皆入於機此言一氣而萬形有變化而無死生也又曰萇弘死于蜀藏其血三年而化爲碧石又曰馬血之爲燐也人血之爲野火也鷂之爲鸇鸇之爲布􅂖布􅂖之復爲鷂也鷰之爲蛤也田䑕之爲鶉也老韮之爲芫也老羭之爲猨也鴹狀羊魚􅆑之爲蟲也此皆物之變者太平御覽卷第八百八十七
