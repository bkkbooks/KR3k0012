body:
  text: 皇親部一揔序后妃人皇后庖羲母神農母黃帝母黄帝四妃顓頊母顓頊妃帝嚳四妃堯妃舜母舜二妃夏禹母禹妃帝相后桀妃殷湯母湯妃帝乙妃紂妃周大王妃王季妃文王妃武王妃宣王后幽王襃后秦始皇太后揔序后妃尚書大傳曰古者后夫人將侍君前息燭後舉燭至于房中釋朝服襲燕服然后入御史奏雞鳴于階下奏猶白階陛也然後夫人鳴佩玉于房中告去也然後應門擊柝告闢也應門朝門也闢啓也然後少師奏質明于陛下質正然後夫人入庭立君出朝毛詩曰􅀜睢后妃之德也風之始也所以風天下而正夫婦也􅀜􅀜睢鳩在河之洲窈窕淑女君子好俅又曰􅁑覃后妃之本也后妃在父母家則志在於女功之事躬儉節用服澣濯之衣尊敬師傅則可以歸安父母化天下以成婦道也又曰卷耳后妃之志也又當輔佐君子求賢審官知臣下之勤勞内有進賢之志而無險詖私謁之心朝夕思念至於憂勤也采采卷耳不盈頃筐嗟我懷人寘彼周行又曰樛木后妃逮下也言能逮下而無嫉妬之心焉南有樛木􅁑藟虆之樂只君子福履綏之又曰螽斯后妃子孫衆多也言􅀂螽斯不妬忌則子孫衆多也螽斯羽詵詵􅀆冝爾子孫振振􅀆又曰桃夭后妃之所致也不妬忌則男女以正婚姻以時國無鰥民也桃之夭夭灼灼其華之子于歸宜其室家又曰兔􅆯后妃之化也􅀜雎之化行則莫不好德賢人衆多也肅肅兔􅆯㭬之丁丁赳赳武夫公侯干城又曰芣苢后妃之羙也天下和平則婦人樂有子矣采采芣苢薄言采之又曰雞鳴思賢妃也哀公荒淫怠慢故陳賢妃貞女夙夜警戒相成之道焉禮記曰天子之妃曰后鄭玄注曰后之言後也又㛰義曰古者天子后立六宫三夫人九嬪二十七丗婦八十一御妻以德天下之内治以明章天下之婦順故内和而家理天子立六官三公九卿二十七大夫八十一元士以聽天下之外治以明章天下之男教故外和而國治故曰天子聽男教后聽女順天子理陽道后治陰德天子聽外治后聽内職教順成俗外内和順國家治理此之謂盛德白虎通曰天子之妃謂之后何后者君也天子妃至尊故謂君也明海内之小君也史記曰自古受命帝王及繼體守文之君非獨内德茂也蓋亦有外戚之助焉夏興也以塗山而桀放也用妹喜殷之興也以有娀及有新女而紂之滅也嬖妲巳周之興也以姜嫄及大任大姒而幽王之擒也淫襃姒故易基乾坤詩首􅀜雎書羙􅁵降春秋譏不親迎夫婦之際人道之大倫也漢書曰漢興因􅁗之稱號帝母稱皇太后祖母稱太皇太后正嫡稱皇后妾皆稱夫人有美人良人八子七子長使少使之號焉至武帝制婕妤娙娥傛華充衣各有爵位而元帝加昭儀之號凡十四等云昭儀位視丞相爵比諸侯王婕妤視上卿比列侯娙娥視中二千石比􅀜内侯傛華視眞二千石比大上造美人視二千石比少上造八子視千石比中更充衣視千石比左更七子視八百石比右庶長良人視八百石比左庶長長使視六百石比五大夫少使視四百石比公乗五官視三百石順常視二百石無㳙共和娯靈保林良使夜者皆視百石上家人子中家人子視有秩斗食云五官以下葬司馬門外陵上司馬門外應劭漢官曰皇后稱椒房詩云椒聊之實蔓衍盈升美其繁興以椒塗室亦取温煖除惡氣也猶天子赤泥殿上曰丹墀漢舊儀曰皇后婕妤乗輦餘皆以茵四人輿以行又曰皇后玉璽文與帝同皇后之璽金螭虎紐又曰皇后太子各食三十縣曰湯沐邑五經要義曰古者后夫人必有女史彤管之法后妃羣妾以禮御于君所女史書其日授其環以進退之法生子月娠則以金環退之當御者以銀環進者著于左手旣御著于右手左者陽也以當就男故著左手右手陰也旣御而復故此女史之職也後漢書曰夏殷以上后妃之制其文略矣周禮王者立后三夫人九嬪二十七丗婦八十一御女以備内職焉后正位宫闈同體天王夫人坐論婦禮九嬪掌教四德丗婦主䘮􅀕賔客女御序于王之燕寢頒官分務各有典司女史彤管記功書過居有保阿之訓動有環珮之響進賢才以輔佐君子哀窈窕而不淫其色所以能述宣陰化脩成内則閨房肅雍險謁不行也故康王晚朝􅀜睢作諷宣王晏起姜氏請愆及周室東遷禮序凋缺諸侯僣縱軌制無章齊桓有如夫人者六人晉獻􅂛戎女爲元妃終於五子作亂家嗣遘屯爰逮戰國風憲偷薄適情任欲顚倒衣裳以至破國亡身不可勝數斯固輕禮㢮防先色後德者也􅁗并天下多自驕大官備七國爵列八品漢興因循其號而婦制莫􅁵髙祖帷薄不脩孝文祍席無辯然而選納尚簡飾玩少華自武元之後丗増淫費至乃掖庭三千増級十四妖倖毀政之符外姻亂􅀖之迹前史載之詳矣及光武明德中興斵琱爲璞六宮稱號唯皇后貴人貴人金印紫綬俸不過粟數十斛又置美人宫人采女三等並無爵秩􅀊時賞賜充給而已漢法常因八月筭人遣中大夫與掖庭丞及相工於洛陽郷中閱視良家童女年十三已上二十已下姿色端麗合法相者載還後宫擇視可否乃用登御所以明愼娉納詳求淑哲明帝聿遵先旨宫教頗修登建嬪后必先令德内無出閫之言權無私溺之授可謂矯其􅁦矣向使因設外戚之禁編著甲令改正后妃之制貽厥方來豈不休哉雖御巳有度而防閑未篤故孝章以下漸用色授恩隆好合遂志淄蠹自古雖主㓜時艱王家多舋必委成冢宰簡求忠賢未有專任婦人斷割重器唯􅁗芊太后始攝政事故穰侯權重於昭王家冨於嬴國漢仍其謬知患莫改東京皇統屢絶權歸女主外立者四帝臨朝者六后莫不定䇿帷帟委事父兄貪孩童以乆其政抑明賢以專其威任重道悠利深禍速身犯霧露於靈臺之上家嬰縲絏於圄犴之下湮滅連踵傾輈繼路而赴蹈不息燋爛爲期終於陵夷大運淪亡神寳詩書所歎略同一揆魏志曰魏因漢法母后之號皆如舊制自夫人以下丗有増損太祖建國始命王后其下五等有夫人有昭儀有婕妤有華容有羙人文帝増貴嬪淑媛脩容順成良人明帝増淑妃昭華脩儀除順成官太和中始復命夫人登其位於淑妃之上自夫人以下爵凡十二等又曰黄􅀄三年詔曰婦人與政亂之本也自今已後羣臣不得奏事太后后族之家不得當輔政之任又不得撗授茅土之爵以此詔傳後丗􅀂有背違天下共誅之殷融議后父不應拜后曰天性之至父子之道人倫之序君臣之義性至因親故情禮無二義序縁敬故尊嚴無上易曰有父子然後有君臣有君臣然後禮義生焉故資父事君教之至也君不以貴而臣其所尊故子爵不加於父也夫以帝王之尊猶無臣妾父母之義況后從尊於帝而令母執臣妾邪而鄭􅀇復云公朝典歸寧别有二制尊卑迭用拜謁更牙亦未詳斯議爲何所據晉張華女史箴曰茫茫造化二儀始分散氣流形旣陶旣甄在帝庖犠肇經天人爰始夫婦以及君臣家道以正而王猷有倫婦德尚柔含章貞吉嬺婉淑愼正位居室施衿結䄜䖍㳟中饋肅慎爾儀式瞻清懿樊􅁎感莊不食鮮禽衛女矯桓耳忘知音志厲義髙而二主易心玄熊攀檻馮媛趨進夫豈無畏知死不恡班妾有辟割歡同輦夫豈不懷防微慮逺道罔隆而不殺物無盛而不衰日中則􅉴月滿則微崇猶塵積替􅀂駭機人咸知飾其容而莫知飾其性性之不飾或愆禮正斧之藻之克念作聖出其言善千里應之苟違斯義則同衾以疑夫出言如微而榮辱由兹勿謂幽昧靈鑒無象勿謂􅀇漠神聽無響無矜爾榮天道惡盈無恃爾貴隆隆者墜鑒于小星戒彼攸遂比心螽斯則繁爾􅀋歡不可以黷寵不可以專專實生慢愛極則遷致盈必損理有固然羙者自羙翩以取尤冶容求好君子所讎結恩而絶職此之由故曰翼翼矜矜福所以興靖恭自思榮顯所期女史司箴敢告庶􅁎後魏書曰魏氏王業之兆雖始於神元至於昭成丗崇儉質妃嬙嬪御率多闕焉唯以次第爲稱而章平思昭穆惠焬列八帝妃后無聞道武追尊祖妣皆從帝謚爲皇后始立中宫餘妾或稱夫人多少無限然皆品次太武始増左右昭儀及貴人椒房後魏書曰後魏故事將立皇后必令手鑄金人以成者爲吉不成則不得立也又太武文成保母劬勞之恩並極尊崇之義雖事乖典禮而觀過知仁北史曰周氏率由􅁎制内職有序文帝創基修祍席以儉約武皇嗣歴節情慾於矯枉宫闈有貫魚之羙戚里無私溺之尤可謂得君人之體也宣皇外行其志内逞其欲溪壑難滿採擇無厭恩之所加莫限厮皁榮之所及無隔險詖於是升蘭殿以正位踐椒庭而齊體者非一人焉階房帷而拖青紫縁恩倖而擁玉帛非一族焉雖辛癸之荒淫趙李之傾城曽未足比其髣髴也人厭苛政其事實多文帝之祀忽諸特由於此隋文思革前􅁦大矯其違唯皇后當室旁無私寵婦官位號未詳備焉開皇二年著内官之式略依周禮省減其數焬帝時后妃嬪御無􅁵婦職唯端容麗飾陪從醼遊而已帝又參詳典故自製嘉名著之於令人皇后春秋命暦序洛書擿亡辟曰人皇兄弟九人别長九州離艮地精女出爲之后離艮卦所推也包犧母河圖曰燧人之丗大跡出雷澤華胥履之生伏羲帝系譜曰㐲羲十月四日人定生母華胥孝經河圖云伏羲在亥得人定之時神農母春秋元命苞曰女登生神子人靣龍顔始爲天子孝經鉤命決曰佳姒感龍生帝嵬魁嵬魁神農名帝王丗紀曰炎帝神農母曰佳姒有嬌氏女名登少典妃遊華陽有龍首感之生神農於裳羊山娶奔水氏女曰聽訞音妖生帝臨女子黃帝母河圖曰黃軒母曰地祇之子名附寳之郊野大霓繞北斗樞星耀感附寳生軒轅帝王丗紀曰黃帝有熊氏少典之子母曰附寳其先即炎帝母有嬌氏之女少典氏婚及神農之末少典氏又娶附寳見大霓光繞北斗樞星照郊野附寳孕二十五月生黃帝於壽丘肝宝云二十五而生餘同黃帝四妃史記曰黃帝娶西陵氏女是爲累祖爲黃帝正妃生二子其後皆有天下漢書古今表曰黄帝妃方雷氏生玄囂爲青陽妃累祖生昌意妃彤魚氏生夷鼔妃嫫母生蒼林帝王丗紀曰黄帝四妃生二十五子元妃西陵氏累祖次妃方雷氏曰女節次曰彤魚氏次曰嫫母列女傳曰黄帝妃曰嫫母於四妃之班居下貌甚醜而最賢心每自退餘同吕氏顓頊母河圖曰揺光之星如虹貫月正白感女樞於幽房之宫生帝顓頊史記曰昌意娶蜀山女昌樸生髙陽髙陽有聖德黄帝崩髙陽立是爲顓頊帝王丗紀曰昌意生妃謂之女樞金天氏末生顓頊於弱水搜神記同顓頊妃丗本曰顓頊娶于勝墳氏宋忠注曰國名之子謂女禄是生老童帝系云勝奔氏餘同帝嚳四妃河圖曰慶都與赤龍合生帝於伊堯丗記云從母姓毛詩曰天命玄鳥降而生商宅殷土茫茫春秋元命苞曰周夲姜嫄遊閉宫其地扶桑履大跡生后稷春秋合誠圖曰堯母慶都有名於丗蓋太常之女生於斗維之野常在三河之東南天大雷電有血流潤大石之中生慶都長大常有黄雲覆蓋之夢食不飢天帝以氣食年二十􅀉伊長孺家無夫出觀三河之首常􅀂有神隨之有赤龍􅀒圖至署曰赤帝起成天寳即慶都之翼之野奄然隂風􅀨龍與慶都合有身龍消不見乳堯漢書云尭母十四月生尭帝王丗紀搜神記同史記曰嚳娶陳豐生放勲又曰后稷棄母有邰氏女曰姜嫄爲帝嚳元妃出野見巨人跡心欣然􅀃欲踐之身重如孕者居期而生子以爲不祥棄之隘巷以爲神収飬之􅀄欲棄之因名棄毛詩生民曰厥􅀄生民時維姜嫄生民夲后稷也姜姓也后稷之母配高辛氏帝焉史記曰殷契母曰簡狄有娀氏女爲帝嚳次妃三人行浴見玄鳥遺其􅆑簡狄取而吞之因孕生契丗夲曰帝嚳卜其四妃四妃之子而皆有天下元妃有邰國之女曰姜嫄是産后稷次妃有娀氏之女簡狄是産契次妃曰陳豐是生帝堯次妃曰娵訾産帝摯帝王丗紀曰娵訾班在四人下生摯最長故登帝位堯妃丗夲曰堯娶散冝氏子謂之女皇宋忠曰是生丹朱帝系漢書同帝王丗紀曰女瑩生丹朱漢書亦云女瑩舜母河圖著命曰女登見大虹意感生舜於姚墟史記曰舜母早死瞽瞍更娶後妻生象傲舜二妃尚書曰師錫帝曰有鰥在下曰虞舜岳曰瞽子父頑母嚚象傲克諧以孝烝烝乂不格姦帝曰我其試哉女于時觀厥刑于二女􅁵降二女于嬀汭嬪于虞禮記曰舜葬蒼梧蓋二妃未之從也山海經曰大荒之中有不庭之山帝俊妻娥皇生焉帝系曰舜娶于帝堯謂之曰女偃列女傳曰有虞二妃帝堯之二女也長曰娥皇次曰女英堯舉舜爲相攝行王政每事常謀於二女舜旣受禪升爲天子娥皇爲后女英爲妃事瞽瞍猶􅀂􅀄焉天子稱二妃聦明貞仁舜陟方死蒼梧二妃死於江湘之間謂之湘君尸子曰堯妻舜以娥媵之以皇娥皇衆之女英離騷九歌湘夫人曰帝子降􅀆北渚目眇眇􅀆愁予帝子謂堯二女娥皇女英隨舜不反墮於湘水渚因爲湘夫人也嫋嫋􅀆秋風洞庭波􅀆木葉下夏禹母河圖著命曰脩紀見流星意感生帝文命我禹與周禮含文嘉曰夏姒氏祖以薏苡生孝經鉤命決曰命星貫􅄧紀夢接生禹父命使之謂流行星丗夲曰鯀娶華氏曰女志是生髙密禹帝系云産文命餘同禹妃尚書咎繇謨禹曰予娶于塗山辛壬癸甲辛日娶妻至于甲日復往治水啓􅈱􅈱而泣予弗子􅂗山女史記同山海經曰太室嵩髙成陽西啓母化爲石在焉帝王丗紀曰禹始納塗山氏女曰女媧合婚於台桑有白狐九尾之瑞至是爲攸女故連山易曰禹娶塗山之子名曰攸女生余是也列女傳曰啓母塗山者夏禹之妃塗山之女也禹娶四日而去治水啓旣生呱􅈱而泣禹三過其門不入吕氏春秋曰禹行功見塗山之女禹未之遇南音南土遇以禮成之塗山之女乃令其妾往候禹于塗山之陽女作歌曰候人實始作南音也帝相后少康二妃附見左傳曰伍貟曰昔有過澆滅夏后相后緍方娠逃出自竇后緡相妻歸于有仍㛰有仍氏女也生少康焉澆求之逃奔有虞虞思妻之以二姚楚辭曰迨少康之未家留有虞之二姚桀妃洛書録運法孔子曰逢氏抱小女末喜觀帝孔甲恱之以爲太子履癸妃國語曰桀伐蒙山而得末嬉紀年曰后桀伐岷山岷山女于桀二人曰琬曰琰桀受二女無子刻其名于苕華之玉苕是琬華是琰而弃其元妃于洛曰末喜氏末喜氏以與伊尹交遂以聞夏帝王丗紀曰末喜好聞裂繒之聲而􅀏桀爲發繒裂之以順適其意列女傳曰夏桀末喜者夏桀之妃也桀伐有施有施女以末喜以女妻人曰女殷湯母河圖著命曰扶都見白氣貫月意感生黒帝子湯湯妃帝王丗紀曰湯娶有莘爲正妃列女傳曰湯妃有莘之女也德髙而伊尹爲之勝臣佐湯致王訓正後宫嬪御有序咸無嫉妬逆理之人生三子太丁外丙仲壬教誨有成太丁早卒丙壬嗣登太位帝乙妃史記曰帝乙長子曰微子啓賤不得立立少子辛辛母正后嗣帝王丗紀曰帝乙二妃生四子長曰微子啓中曰微仲少曰受德辛庶妃生箕子􅀄啓母之生啓及仲尚爲妾及立爲后乃生紂紂妃史記曰紂伐有􅂫有蘇人以妲已女焉紂愛妲已妲已之言是從武王殺之斬以玄戈懸之小白旗丗本又載列女傳曰妲已者殷紂之妃也紂伐有􅂫有􅂫女以妲已羙而辯用心邪僻夸比於體戚施於貌紂好酒淫樂不離姐已所譽者貴之所憎者誅之周大王妃毛詩曰古公亶父來朝走馬率西水滸至于岐下爰及姜女聿來胥宇又曰摰仲氏任自彼殷商來嫁于周曰嬪于京乃及王季維德之行摯國任姓史記曰古公太姜生少子季歴季歴娶大姙皆賢婦人生子曰昌列女傳曰太姜者太王之妃有台之女曰賢而有色生太伯仲雍王季化導三子皆成賢德太王有事必諮謀焉王季妃河圖著命曰太姙夢長人感已生文王毛詩曰思齊太姙文王之母思媚周姜京室之婦列女傳曰太姙者王季之妃摰任之女也端懿誠莊維德之行及其有娠也目不視惡色耳不聽淫聲口不放言溲于豕牢而生文王文王生而明聖太姙教以一而知其百卒爲周宗君子謂太姙爲能胎教文王妃毛詩曰天監在下有命旣集文王􅀄載天作之合在洽之陽在渭之涘纉女維莘長子維行纉繼也莘大姒國也長子長女篤生武王箋云大姒厚生聖子武王又曰大姒嗣徽音則百斯男論語泰伯曰武王曰予有亂臣十人馬融曰亂理也十人謂周公旦召公奭太公望畢公榮􅉑叔閎夭散宣生太顚􅀯宫括其一人謂文母也孔子曰才難不其然乎唐虞之際於斯爲盛有婦人焉九人而已列女傳曰大姒者文王之妃莘姒之女也號曰文母武王妃左傳曰子産曰當武王邑姜方娠太叔杜預曰邑姜武王后齊太公之女也懷胎爲娠太叔成王之弟叔虞者夢帝謂巳余命而子曰虞帝天也虞唐君之名將與之唐屬諸參而蕃育其子孫及生有文在手曰虞遂以命之帝王丗紀曰武王納太公之女曰邑姜脩教于内生太子誦宣王后璅語曰元妃獻后生子不􅁪其月而生后弗敢舉王召羣吏問將弃之仲山甫曰天將以是棄周棄之何益且卜筮言何必從乃弗棄列女傳曰周宣姜后者齊侯之女也宣王嘗夜卧而晏起后夫人不出於房姜后旣出乃脫簮珥待罪於巷使其􅀓母通言於王曰妾不才妾之淫心見矣至使君王失禮而晏朝以見君王之樂色而志德也王曰寡人不德實自生過非夫人之罪也幽王襃后毛詩曰白華周人刺幽后也幽王取申女以爲后又得襃姒而黜申后故下國化之以妾爲妻以孽代宗幽后褒姒也又曰正月刺幽王也燎之方陽寧或滅之赫赫宗周襃姒烕之國語曰夏之衰也二龍止於夏庭而曰余襃之二君夏帝卜請其漦而藏之乃􅁻韋昭曰龍吐沫龍之精氣也龍亡而漦在櫝而藏之三代莫敢發至厲王之末發而觀之漦流于庭不可除王使婦人倮而譟之􅁵化爲玄􅀛入王後宫童妾旣齓而遭之旣笄而孕無夫而生子懼而弃之宣王之時童謡曰厭弧箕服實亡周國有夫婦賣是器者見後宫童妾所弃妖子聞其啼哀而収之夫婦亡奔襃襃人有罪請入所弃女是爲襃姒幽王愛之生伯服廢申后而以襃姒爲后襃姒不好􅀏幽王欲其笑萬方不􅀏烽火大鼓譟諸侯悉至至而無宼襃姒乃大笑幽王數爲舉烽申侯怒與西夷犬戎攻殺王虜襃姒史記列女傳丗紀並同也列女傳曰幽王出入與襃姒同乗弋獵不時以適襃姒意􅁗始皇太后史記曰吕不韋所幸􅁎有娠而進之于楚生􅁗始皇是爲太后􅀃苑曰秦始皇太后不謹幸郎嫪毒封爲長信侯長信侯生兩子毒專國事驕奢與侍中左右貴人俱博飲酒醉爭言而􅃲瞋目大呼曰吾乃􅁗皇之假父也窶人子何敢與我亢􅃲者走行白始皇始皇大怒毒因作亂戰棫陽宫始皇取毒四支車裂之取兩弟嚢樸殺之皇太后置之棫陽宫下令曰敢以太后事諌者戮而殺之闕下諫而死者二十七人茅焦乃上謁于王遂以千乗萬􅀐自迎太后歸咸陽太后喜大置酒待茅焦及飲太后稱曰抗枉令直使敗更成安秦社稷使妾母子復得相㑹茅君之力也太平御覽卷第一百三十五
