front:
  text: 太平御覽卷第六百四十二
  hash: sha256:44ad520ce6e920b30854304ad020eb5a599f80a6cd5aef15a4e0d38eae5c78ff
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_642-1a}
body:
  text: 刑法部八囚徒徒作年數附囚易坎卦曰上六係用徽纆寘于叢􅁄三􅀊不得凶險陗之極不可外也嚴法峻整難可犯也冝其囚執寘于思過之地書武成曰釋箕子囚封比于墓又㤗誓曰屏弃典刑囚奴正士屏弃常法而不顧箕子正諫而以爲囚奴又康誥曰要囚服念五六日至于旬時丕蔽要囚要囚謂察其要囚辝以断獄旣得其辝服應思念五六日至於十日至于三月乃大断之言必反覆思念重刑之至也詩泮水曰矯矯虎臣在泮獻馘淑問如臯陶在泮獻囚囚拘也僖公旣伐淮夷而反在泮宫使武臣獻馘又使善聽獄之吏如臯陶者獻囚言伐之有功所以任者得其人也周禮秋官上曰掌囚掌守盗賊凡囚者凡囚者謂非盗賊自以他罪拘者也禮月令仲夏小暑至挻重囚出輕繫挻猶寛也重囚寛之至秋方决輕輕繫岀而舎之也傳荘公曰乗丘之􅃥公以金僕姑射南宫長萬公右歂孫生搏之宋人請之宋公靳之曰始吾敬子今子魯囚也吾不敬子矣又曰晉襄公縛秦囚使莱駒以戈斬之囚呼菜駒失戈狼瞫音審取戈以斬囚遂以爲右又曰鄭公子歸生受命于楚伐宋宋華元樂吕禦之戰于大􅁄宋師敗績囚華元獲樂吕又曰晉侯觀于軍府見鍾儀問之曰南冠而縶者誰也南冠楚冠也繫拘繫也有司對曰鄭人所獻楚囚也使稅之召而弔之再拜稽首問其族對曰伶人也公曰能樂乎對曰先父之職官也敢有二事使與之琴操南音公曰君王何如對曰非小人之所得知也固問之對曰其爲太子也師保奉之以朝于嬰齊而夕于側也嬰子齊令尹子重也側司馬子反也言其尊卿敬老也不知其他公語范文子文子曰楚囚君子也君盍歸之使合晉楚之成公從之又曰楚子侵鄭鄭皇頡戍之出與楚師戰敗穿封戍囚皇頡公子圍與之爭之公子圍共王子靈王也正於伯州犂正典直也伯州犁曰請問於囚乃立囚伯州犁曰所争君子也其何不知上其手曰夫子爲王子圍寡君之貴介弟也介大也下其手曰此子爲穿封戍方城外之縣尹也誰獲子上下手以道囚意囚曰頡遇王子弱焉弱敗也言爲王子所得也戍怒抽戈逐王子圍又曰衛侯如晉晉人執而囚之于士弱氏士弱晉主獄大夫也又曰紂囚文王七年諸侯皆從之囚紂於是乎懼而歸史記曰孟嘗君入􅁗􅁗王欲留之人或說􅁗必先齊而後􅁗􅁗其危矣於是􅁗昭王乃囚孟嘗君漢書曰雋不疑爲京非尹每行縣録囚徒不疑多有所平反音翻母喜􅀏爲飲食語言異於他時或無所出母怒爲之不食故不疑爲吏嚴而不殘又曰吕后爲皇太后乃令永巷囚戚夫人又天文志曰有勾圜十五星屬杓曰賊人之牢牢中星實則囚多虚則囚出又曰王章下廷尉獄妻子皆繫小女年十二起號􅂘曰平常獄上夜呼囚數常至九今八而止我君素剛先死者必君果死又曰蕭育當繫乃欲弃官按佩刀曰蕭育杜陵男子何詣曹也東觀漢記曰和熹鄧后京師旱自三月至五月太后幸洛陽寺省庻獄舉􅁈囚徒杜洽不殺人自誣􅀍掠羸困便舉見畏吏不敢白吏將去舉頭􅀂有言太后察視􅁴之即呼還問狀遂得申列即時收令下獄抵罪尹左遷行未還宫澍雨大降又曰和帝永元六年七月京師旱幸洛陽寺録囚徒舉􅁈獄未還宫而澍雨又曰馬援爲郡督郵送囚至府囚有重罪援哀而縱之亡命北地遇赦留後漢書曰陸續字智􅀄㑹稽呉人也太守尹興辟爲郡門下􅁺是時楚王英謀反隂䟽天下善士及楚事覺顯宗得其録有尹興名興詣廷尉獄續與主簿梁宏及􅁺史五百餘人詣洛陽詔獄續母逺至京師覘􅀱消息獄事持急無縁與續相聞母但作饋食付門卒以進之對食悲泣不能自勝使者恠而問其故續曰母來不得相見故但使泣耳使者大怒以爲門吏通傳意氣􅀅召案之續曰因食餉羹識母所自調和故知來耳非人告也母嘗截肉未嘗不方斷䓗以寸爲度是以知之魏志曰太祖征劉備先遣賈逵至斜谷視形勢道逢水衡載囚數十車逵以運急輒載重者一人皆放其餘太祖善之晉書曰曹攄爲臨淄令獄有死囚嵗夕攄行獄􅉖之曰卿等不幸至此非所如何新􅀊人情所重豈欲暫見家耶衆囚皆泣曰􅀂得暫歸死無恨也攄悉開獄出之剋日令還􅁺史固争咸謂不可攄曰此雖小人義不見􅀒自爲諸君任之至日相率而還並無違者一縣歎服号曰聖君北史曰後魏元麗拜雍州刺史爲政嚴酷吏人惡之其妻崔氏誕一男麗遂出州獄囚死及徒流案未由臺者一時放免宋書曰王志累遷宣城内史清謹有恩惠郡人張倪呉慶争囚經年不决志到官父老相謂曰王府君有德政吾郷里乃有如此争倪慶因相携請罪所訟地遂成閑田後爲東陽太守郡獄有重囚十餘冬至日悉遣還家過節皆反唯一人失期志曰此自太守事主者勿憂明旦果至以婦孕吏人又益歎服之又曰謝方明爲驃􅀐長史理南郡年終江陵縣獄囚事無輕重悉放歸家使過正三日還到罪重者二十餘人綱紀巳下莫不疑懼時晉陵郡送故主簿弘季咸徐夀之並隨在西固諌以爲昔人雖有事或是記籍過言且當今人情薄不可以古義相許方明不納一時遣之囚及父兄並驚喜涕泣以爲就死無恨至期有重罪二人其一醉不能歸逮二日反餘一囚十日不來五官朱千期請見自討之方明知爲囚事使左右謝五官不湏入囚當自反囚逡廵墟里不能自歸郷村責讓率領􅀅送意逃者逺近歎服焉北齊書曰梁湘東王繹遣丗子方諸出鎮郢州顔之推常管記室值侯景䧟郢之推􅀍執頻欲殺之頼其行臺郎中王則屢護救免囚送建鄴北史曰蕭撝入周爲上州刺史爲政以禮讓爲本嘗至元日獄中囚繫悉放歸家聽三日然後赴獄主者争之撝曰昔王長虞廷見稱前史吾雖寡德􅀼懷景行以之獲罪弥所甘心諸囚荷恩並依限而至吏人稱其惠化陳書曰張種以外戚賜無錫嘉興縣秩嘗於無􅃬見有重囚在獄天寒呼囚曝日遂失之陳文帝聞之􅀏而不責南史曰􅁻翰遷豫州梁郡諸軍時有死罪囚典籖意欲活之因翰入閤齋呈事翰省說語令且去明可更呈典籖不敢復入呼之乃來取昨所呈事視訖謂曰卿意當欲宥此囚死命昨於齋坐見其事亦有心活之但此囚罪重不可全貸旣欲加恩卿便當代任其罪因命左右収典籖付獄殺之原此囚生命唐書曰韋仁壽隋大業末爲蜀郡法司書佐獄無􅁈囚其有得罪者臨將就戮猶西向爲仁壽禮佛而死又曰太宗親録囚徒多所原宥見死罪者憫之放歸于家限至來秋即戮乃勑天下死囚皆放令入京並依期而集於是天下死罪囚三百九十人皆釋禁自至朝堂不勞督領一無逃散太宗感其奉法竟盡赦之又曰髙宗遵貞觀故事務在恤刑嘗問大理卿唐臨在獄繫囚之數臨對曰見囚五十餘人唯二人合死上以囚數少甚喜又曰吕元膺爲蘄州刺史頗著恩信甞􅀊終閱郡囚囚有自告者曰某有父母在明日元正不得相見因泣下元膺憫焉盡脫其械縱之與爲期守吏曰賊不可縱元膺曰吾以忠信待之及期無後到者由是群盗感義相引而去韓子曰温人入周周不内問之曰客耶對曰主人也問其巷而不知也史曰囚之君使人問之曰子非周人也而自謂非客何也對曰臣少也誦詩云普天之下莫非王􅁟率􅁟之濵莫非王臣今君天下則我天子臣也淮南子曰拘囹圄者以日爲脩當市死者以日爲短呉越春秋曰呉王拘越王勾踐與大夫范蠡於石室呉王疾越王謂太宰嚭曰囚臣請一見問疾太宰入言呉王乃見越王也列女傳曰嚴延年爲河南太守河南號曰屠伯以其刑殺爲主􅀂屠者也其母嘗從東海來欲就延年臈到洛陽適見執囚所執決刑戮之囚也母大驚便止都亭不肯入府㑹稽典録曰盛􅁻拜廷尉􅁻性多仁恩務在哀矜每至冬月罪囚當斷夜省刑狀其妻執燭􅁻持筆夫妻相向垂泣妻常謂􅁻曰君爲天下執法不可使一人濫罪太公金匱曰文王問太公曰天下失道忠諌者死予子伯邑考爲王僕御無故烹之囚予於羑里以其羮歠予風俗通曰囚遒也言辭窮得罪誅遒也禮罪人寘諸圜土故囚字爲口中人此其象也陳留耆舊傳曰虞延除細陽令每至􅀊時伏臘輒什遣囚各歸家囚並感其恩應期而還韓陽天文要集曰流星入昴貴人有繫囚也論衡曰李子長爲政欲知囚情以梧桐爲人象囚之形鑿地爲塪卧木囚其中罪正者木囚不動􅁈侵奪者木囚動出不知囚之精神着木人耶將天神之氣動木囚也徒史記曰􅁗始皇至湘山逢大風不得渡上問愽士曰湘君何神對曰堯女舜妻也死而葬此始皇大怒使刑徒三千伐湘山樹赭其山上又曰髙祖以亭長爲縣送徒驪山徒多道亡自度比至多亡之到豐西澤中止飲夜乃解縱所送徒曰公等皆去吾亦從此逝矣徒中壯士願從者十餘人漢書曰匈奴侵㓂王莽大募天下囚徒乃名曰猪突狶勇服䖍曰突者逐也惟觸突人故􅂑以爲喻也范曄後漢書曰尚書郎張俊自獄中上書訟罪而俊獄巳報廷尉將出榖門臨行刑鄧太后詔馳􅀐以減死論俊上書謝曰􅀌恩􅀒義自䧟重刑請斷竟訖無所復望廷尉鞠遣刀斧在前棺䋈在後魂魄飛􅀭形容巳枯陛下聖澤以臣嘗在近宻識其狀兒復其眼目留心曲慮特加偏覆䘮車復還白骨更肉披棺發槨起見白日天地父母能生臣俊不能使臣俊當死復生陛下德過天地恩重父母誠非臣俊破碎骸骨舉宗腐爛所報萬一臣俊徒也不得上書不勝去死就生驚死踊躍冒昧拜章丗皆哀其文魏略曰人得崔琰書以褁情籠持其籠行都道中時有與琰􅀫不平者遥見琰名着㥽籠從而視之遂白太祖以爲琰腹誹心謗乃収付獄髡刑輸徒前所白琰者又白云琰爲徒虬􅂡直視心似不平太祖亦以爲然遂殺之又曰王陵字彦雲太原人陵爲發干長遇事髡刑五年當道掃除時太祖下車過問此何徒左右以狀對太祖曰此所坐亦公耳於是選爲驍騎主簿三國典略曰太原公洋之赴晉陽也陽休之勸崔季舒曰一日不朝其間容刀季舒性好聲色心在閑放遂不請行欲恣其􅁋樂司馬子如等縁􅀫憾乃奏暹及季舒過狀各鞭二百徒於馬城晝則供役夜置地牢璅語曰晉治氏女徒病弃之舞嚚之馬僮飲馬而見之病徒曰吾良夢馬僮曰汝奚夢乎曰吾夢乗水如河汾三馬當以告舞僮舞嚚自徃視之曰尚可活吾買汝荅曰旣弃之矣猶未死乎舞嚚曰未遂買之至舞嚚氏而疾有間而生荀林父神異記又載之鍾離意别傳曰司徒侯覇辟意署議曹􅁺以詔書送囚徒三百餘人到河北連隂冬盛寒徒皆貫連械不復能行到弘農縣使令出見錢爲徒作􅃭袴各有􅂛數令對曰􅀍詔書不敢妄出錢意曰使者奉詔命寧私行耶出錢便上尚書使者亦當上之光武皇帝得上狀見司徒侯覇曰所使吏何乃仁怒用心乎誠良吏也􅃭袴旣且悉到前縣給賜糜粥後謂徒曰使者不忍善人嬰刑飢寒感惻於心今以得衣矣欲悉解善人械桎得逃去耶皆曰明使君哀徒恩過慈父身成􅁅土不敢逃亡意復曰徒中無欲歸􅀱親者耶其有節義名者五六十人悉解械桎先遣之與期日㑹作所徒皆先期至也劉楨京口記曰有龍目湖􅁗始皇東逰觀地勢曰有天子氣使赭衣徒三千人鑿此中間長堽使斷因改名爲丹徒風俗通曰徒不上墓說新遭刑罪原解者不可以上墓祠祀令人死亡謹案孝經身體髪膚受之父母曽子病困啓手足以歸全也今遭刑者髡首剔髮身􅀍加笞新出狴犴臭􅁾不㓗凡􅀕祀者孝子致齋貴馨香如親存也時見子􅀍刑心有惻愴縁生事死恐明不歆承當不上墓耳郭子曰劉道真嘗爲徒扶風王司馬駿以五疋布贖之旣而用爲從事中郎當時以爲羙談孔融肉刑論曰今之洛陽道橋作徒囚於厮役十死一生故國家常遣三府請詔月一案行又置南甄官使者主養病徒僅能存之語所謂洛陽豪徒韓伯宻加笞三百不中一髡頭至耳髮詣膝此自爲刑非國法之意徒作年數周禮秋官上大司㓂曰以嘉石平罷民凢萬民之有罪過而未麗於法而害於州里者桎梏而坐諸嘉石􅃥諸司空重罪旬有三日坐朞􅃥其次九日坐九月􅃥其次七日坐七月􅃥其次五日坐五月􅃥其下罪三日坐三月役使州里任之則宥而舎之又秋官上曰司圜掌收教罷民凢害人者弗使冠飾而加明刑焉任之以事而収教之能改者上罪三年而舎中罪二年而舎下罪一年而舎其不能改出圜􅁟者殺漢書曰罪人獄巳决完爲城旦舂滿三􅀊爲􅀑薪白粲應劭注曰鬼薪爲宗廟取薪白粲澤米使正白􅀑薪白粲一􅀊爲􅀠臣妾􅀠臣妄一嵗免爲庻人晉律曰髠鉗五􅀊刑笞二百若諸亡詐僞􅀅吏越武庫垣兵守逃歸家兄弟保人之属並五􅀊刑也四􅀊刑􅀂復上闕入殿門上變事漏露泄選舉事發密事歐兄姊之属並四歳刑三􅀊刑若傷人上而謗僞造官印不憂軍事戲殺人之属並三嵗刑也二􅀊刑二􅀊刑減一等入罰金二嵗以至五嵗刑皆耐罪􅀂越城作穽走馬衆中有挾天文啚䜟之属並爲二嵗刑張斐律序曰徒加不過六囚加不過五罪巳定爲徒未定爲囚累作不過十一嵗五嵗徒犯一等加六嵗犯六等加爲十一歳作累笞不過千二百五􅀊徒加六等笞一千二百太平御覽卷第六百四十二
