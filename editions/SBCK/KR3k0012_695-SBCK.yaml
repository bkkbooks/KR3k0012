front:
  text: 太平御覽卷第六百九十五
  hash: sha256:104091018d39f3c1d2354cda43430d57bc90ad53add8b17c87a1179deb389acf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_695-1a}
body:
  text: 服章部十二􅃭袴袴褶􅃭􅀃文曰􅃭短衣也一日衣温也奴案反釋名曰􅃭煗也言温煗也單􅃭如􅃭而無絮也反閇􅃭之小者也却向着之領含於項反於背後開其衿漢書曰班伯爲侍中與王許子弟爲群在於綺􅃭紈袴之間非其好也又曰昌邑王􅀍廢太后􅀍珠􅃭如淳曰以珠飾􅃭晉書曰貫珠爲􅃭盛服坐武帳中王前聽詔又曰哀帝以東園祕器珠􅃭玉押皆䂊以賜董賢東觀漢記曰廉范字叔度爲蜀郡太守舊禁制民夜作范毀削先令百姓爲便歌之曰廉叔度來何暮不禁火民安作平生無􅃭今有五袴又曰來歙詣雒見上上大喜解所􅀍䄡􅃭衣賜歙又曰第五倫性節儉爲二千石常衣布􅃭又曰梁鴻妻孟氏女布􅃭袴裙鴻曰此真梁鴻妻也魏志曰管寜常着皂帽布􅃭隨時單複晉令曰旄頭羽林着韋􅆎􅃭齊書曰武陵昭王曄過竟陵王子良宅冬月道逢乞人脫􅃭與之子良見曄衣單進􅃭於曄曄曰我與向人亦復何異梁書曰頋恊少清介有志操􅀄爲廷尉正冬服單薄寺卿蔡法度欲解􅃭與之憚其清嚴不敢發口謂人曰我願解身上􅃭與頋郎難衣食者竟不敢以遺之又曰郭祖深清儉常服故布􅃭又曰索君正爲豫章内史性不信巫邪有師丗榮稱道術爲一郡巫長君正在郡小疾主簿熊丘問巫師云須疾者衣爲信命君正以所着􅃭與之事竟取􅃭云神將送與北斗君君正使檢諸身於衣裹􅀗之以爲亂政即刑於市而焚神一郡無敢行巫後魏書曰髙祖復至鄴見公卿曰朕昨日入城見車上婦人冠帽而着小􅃭襖者尚書何爲不察任城王澄曰着者猶少帝曰任城意欲全着乎一言可以喪􅀖其斯之謂可命史官書之東宫舊事曰太子納妃有紫􅜄􅃭綘紗繡􅜄􅃭呉越春秋曰勾踐與妻入臣呉夫人衣無縁之裳左開之􅃭以飬馬又曰呉王闔閭葬女以珠􅃭之寳鍾離意别傳曰意爲司徒侯覇府議曹􅁺詔送三百人到河北遇隆冬到弘農意􅂺使屬縣令出錢與徒作􅃭袴光武謂侯霸曰君所使吏仁恕用心乎列仙傳曰細伯子者冬着單衣盛暑􅃭袴列異傳曰東海君以織成青􅃭遺陳節方述異記曰乾羅者慕容廆之十一丗祖也着金銀􅃭鎧乗白馬金銀鞍勒自天而墜鮮卑神之推爲君長西京雜記曰趙飛鷰爲皇后其弟在昭陽殿上遺織成上􅃭吕氏春秋曰子産治鄭鄧析務難之約民大獄一衣小獄􅃭袴鄭國大亂子産殺鄧析而民服桓譚新論曰待詔景子春素善占坐事繫其婦朱君至獄門通言遺􅃭袴子春驚曰朱君來言與朱爲珠袴而􅃭中絶者也我當誅斷也後遂腰斬丗􅀃曰司馬宣王從遼東還有六十假士寒凍于車乞一􅃭公乞之酒左右曰官不少􅃭可賜之公乞之酒曰􅃭官中物臣無私施語林曰謝鎮西着紫羅􅃭據胡牀彈琵琶作大道曲夢書曰上􅃭爲大夫婦人夢之得賢夫也束晢近遊賦曰繫明􅃭以御冬古詩曰羅敷好蠶桑採桑城南隅紺綺爲下裳紫綺爲上􅃭又曰妾有繡腰􅃭葳㽔金縷光陸機與長沙夫人書曰士璜亡恨一􅃭少便以機新􅃭衣與之袴說文曰袴脛衣也釋名曰袴跨也兩股各跨別也留冀州所名大禢下至膝者也留牢也幕絡在衣表方言曰齊魯之間袴謂之褰或謂之襱音襱関西謂之袴大袴謂之倒頓小袴謂之芙蓉衫楚通語也史記曰屠岸賈攻趙務朔等妻晉成公姊有遺腹公宫匿之生男屠岸賈索於宫中夫人置兒袴中祝曰趙宗􅀂滅即號若不滅即無聲乃索兒竟無聲又後魏書云平文皇后王氏年十三因事入宫得幸於平文生昭成平文崩昭成在襁褓時國有内難將害帝子后匿帝於袴中呪曰若天祚未終者汝無聲遂良乆不啼得免於難又曰淮隂屠中少年有侮韓信者衆辱之曰信能死刺我不能出我袴徐廣曰袴服也袴亦作跨於是視之俛出袴下蒲伏一市皆􅀏信以爲怯又曰周仁爲人隂重不泄甞衣􅁦􅀘衣溺袴張晏曰隂重不泄下不潔故溺袴甚爲不㓗清以是得幸景帝漢書曰昌邑王賀衣短衣大袴又曰朱愽瑯瑘郡功曹官屬多褒衣大祒孟康曰祒音紹謂大袴也又曰昭帝上官后霍光外孫光欲后擅寵有子帝體不安左右及醫皆阿意言冝内宫人使令皆爲窮袴多其帶後宫無進者張晏曰窮袴前後有襠使不得交通東觀漢記曰更始所爵多群小􅀍服威儀不以衣冠或繡面衣錦袴後漢書曰馬援田牧至有牛馬羊數千頭盡散昆弟故舊身衣羊裘皮袴又曰􅀕遵賞賜與士共之家無私財身衣韋袴又曰呉良字大儀齊國臨淄人以清白守正正稱爲郡議曹􅁺正旦􅁺吏入賀門下􅁺王望舉觴上壽曰齊郡遭離盗賊今明府視事五年家給人足良跪曰門下􅁺佞謟明府勿受其觴盗賊未盡人庶困乏今良曹􅁺尚無袴望曰議曹惰窳自無袴寧足爲不家給人足耶太守曰此生言是賜良鰒魚百枚謝承後漢書曰􅁗護清廉不受禮賂家貧衣服單露郷人歌之曰冬無袴有􅁗護魏略曰賈逵居貧無袴過其妻兄栁孚家􅀫其明無何着孚袴去時人謂爲通逹又曰許允聞李豐等􅀍収欲徃見大將軍巳出門迴遑不定中道還取袴豐等巳収訖大將軍聞允前遽怪之曰我自収豐等不知士大夫何爲怱怱乎又曰趙跋避難至北海着布袴絮巾在市中賣餅宋書曰劉穆之壞布裳爲袴徃見武帝帝謂曰我始舉大義湏一軍中甚急誰堪其選穆之曰無見踰者帝􅀏曰卿能自屈吾事濟矣梁書曰周劉顯將之㝷陽朝賢畢祖道顯懸帛十疋約曰儉衣來者以賞之衆人競􅌈常服不過短長之間顯曰將有甚於此矣旣而周弘正緑􅁝布袴軒昻而至折摽取帛又曰元帝􅉖懷太子眤狎群下好着微服常入朝公服中着碧絲布袴摳衣元帝見之帝大恠遣尚書周弘正責之又曰安成王秀爲郢州冬月常作􅃭以賜凍者又曰王􅁉之常使二老婦女戴五條辮着青絞羅袴飾以朱彩又曰何􅀧永元中崔惠景圍城人間無薪􅀧悉伐園樹以贍親黨惠景性好俠義慕交􅀧􅀧不頋之至是乃逼召􅀧􅀧裂裙衣爲袴徃赴其軍終日談􅀃不及軍事其語黙之迹如此北齊書曰承相司馬任胄主簿李丗林都督鄭仲禮房子逺等潜謀害神武自魏氏舊俗以正月十五日夜爲打蔟戲能中者即時賞帛胄令仲禮藏刀於袴中因神武臨觀謀􅀼發後敗韓子曰鄭人卜子使妻爲袴曰冩吾故袴妻因鑿新袴爲孔效之又曰韓昭侯使人藏弊袴侍者曰君上不以賜左右而藏之昭侯曰吾聞明主之愛一嚬一􅀏有爲嚬而嚬有爲􅀏而􅀏今袴豈特嚬􅀏哉嚬􅀏不妄爲袴豈可無㓜而與之吾必侍有功者故藏之事具賞賜門塩鐵論曰古者鹿裘皮帽及其後大夫士狐狢庶人則毛袴髙士論曰孫略冬日見貧士脱袴遺之列士傳曰孟嘗君食客三千人上客食􅁏中客食魚下客食菜馮援經冬無袴面有飢色郭子曰孫興公道曹輔佐才云白地明光錦裁爲􅀒板袴非文綵然酷無裁製俗􅀃曰謝仁祖年少時喜着刺文袴出郊郭外其叔父誚責之仁祖於是自改遂爲名流董巴輿服志曰祀宗廟絳袴示赤心奉神也搜神記曰晉中興作袴者直幅爲口無殺不大夫裁也王敦之徴東宫舊事曰皇太子納妃有絳直文羅袴七綵杯文綺袴鄴中記曰石虎獵着金縷合歡袴廣州先賢傳曰申朔字元遊蒼梧人爲九真都尉布襦布袴郷邑歎慕之蔡廓彈事曰兼司徒貟外散􅀐常侍謝粲應着絳袴而粲披袴不以貫足有􅃜常體應邵漢官儀曰司空􅀐吏以下皂袴因􅁗水行今漢家火行冝絳袴又曰虎賁中郎將衣紗􅜄單衣虎紋錦袴魏舊事曰楊平善裁袴以官絹百疋作小袴百枚丗􅀃曰武帝嘗降玉武子婢子百餘人皆綾羅袴裙手擎飲食袴褶釋名曰褶襲也覆上之言也晉書曰楊濟字文通歷位鎮南征北將軍遷太子太傅濟有才蓺嘗從武帝校獵北邙下與侍中王濟俱著布袴褶􅀐馬執角弓在輦前晉中興書曰郭文舉上餘杭大辟山令頋颺以文山行與韋袴褶一具文不納使者置衣室中而去文亦無言袴褶爛于户内趙書曰中書令徐光奏耕服介幘青縑袴褶宋書曰元㐫邵弑逆􅀽淑止之劭因起賜淑等袴褶又就主衣取錦裁三尺爲一叚又中裂之與淑及左右使以縛袴褶又曰張暢爲南譙王義宣司空長史南郡太守元㐫弑逆義宣發哀之日即便兵暢爲元佐位居僚首哀容俯仰䕃映當時舉哀改服着黄韋袴褶出射堂簡人音姿容止莫不曯目見者皆願爲盡命蕭子顯齊書曰東昏侯拜愛􅁎潘氏爲貴妃乗卧與侯􅀐馬爲從着織成袴褶後魏書曰傳靈根及弟靈越南走靈根叔乾愛先在南遣舡迎之得免靈根差期不得俱渡臨濟人知剉斬殺之乾愛出郡迎靈越問靈根愆期狀靈越殘不應荅乾愛不以爲惡勑左右取匣中烏皮袴褶令靈越代所常服虚越言不湏乾愛云汝可着體上衣服見桓公耶桓公護之爲刺史靈越竟不肯着唐書曰􅀇宗時御史大夫李適之􅁗毎大禮六品官並服朱衣自是以下許通着袴褶如有慘故不合着朱衣袴褶者聽不入自餘應着而不着者請奪俸以懲不恪西河記曰西河無蚕桑婦女以外國異色錦爲袴褶魏百官名曰三公朔賜青杯文綺長䄂袴褶一方道盛此北疆記曰盧主南郊著皇班褶繡袴江表傳曰吕範願暫領督出釋褠著袴褶執鞭詣闕下啓事語林曰夏少明在東不知名聞裴逸民知人乃褁粮􅀉載入洛從之未至家少許見一人着黄皮袴褶乗馬將獵夏問曰裴逸民家近逺荅曰君何以問夏曰聞其名知人故從㑹稽來投之裴曰身是逸民君明可更來明徃逸民果知之乃用爲西門侯於此遂知名傅暢自序曰余年五歳散􅀐常侍魯叔虎與先公甚友善每來徃喜與余戯嘗解余衣褶披其背脫余金環與侍者謂余恡惜而余􅀏與之經數日不索太平御覽卷第六百九十五
