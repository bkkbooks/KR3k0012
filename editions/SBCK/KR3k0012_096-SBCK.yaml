front:
  text: 太平御覽卷第九十六
  hash: sha256:77db748dfda26365af5c25c09c3f4b16e6d3cd013ecdcd3aa9e76d97c386fafb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_096-1a}
body:
  text: 皇王部二十一西晉景帝文皇帝世祖武皇帝景帝晉書曰景皇帝諱師字子元宣帝長子也雅有風彩沉毅多大略少流羙譽與夏侯􅀇何晏齊名晏常稱曰惟幾也能成天下之務司馬子元是也魏景􅀄中拜散􅀐常侍累遷中護軍爲選用之法舉不越功吏無􅀻焉宣帝之將誅曹爽􅀷謀祕䇿獨與帝潜畫文帝弗知之也將夕乃告之旣而使人覘之帝􅃦如常而文帝不能安席晨㑹兵司馬門鎮静内外置陣甚整宣帝曰此子竟可也􅀄帝隂養死士三千散在人間至是一朝而集衆莫知其所出也事平以功封長平郷侯食邑千户㝷加衛將軍正元元年春正月天子與中書令李豐后父光禄大夫張緝七入反黄門監蘇鑠音藥又書藥切等謀以太常夏侯􅀇代帝輔政帝宻知之使舎人王羡以車迎豐見迫隨羡而至帝數之豐知禍及因肆惡言帝怒遣勇士以刀鐶築殺之逮捕􅀇緝等皆夷三族三月乃諷天子廢皇后張氏因下詔曰姧臣李豐等靖譛庸回隂搆凶慝大將軍糺䖍天刑致之誅辟周勃之剋吕氏霍光之擒上官􅂚以過之其増邑九千户并前四萬帝讓不受天子以􅀇緝之誅􅀷不自安而亦慮難作潜謀廢立乃宻諷魏永寜太后秋九月甲戌太后下令遣使迎髙貴郷公於元城而立之改元曰正元天子受璽情惰舉趾髙帝聞而憂之及將大㑹帝訓於天子曰夫聖王重始正本敬􅀄古人所慎也明當大㑹萬衆瞻穆穆之容公卿聽玉振之音詩云示人不佻是則是効易曰出其言善則千里之外應之雖禮儀周備猶冝加之以祗恪以副四海顒顒式仰癸巳天子詔登位相國進號大都督假黄􅃏入朝不趍奏事不名劒履上殿帝固辤相國二年春正月有彗星見于呉楚之分西北竟天鎮東大將軍母丘儉楊州刺史文欽舉兵作亂矯太后令移檄郡國爲壇盟於西門之外各遣子四人質于呉以請救二月儉欽帥衆六萬渡淮而西帝㑹公卿謀征討計朝議多謂可遣諸將擊之王肅及尚書傅嘏中書侍郎鍾㑹勸帝自行戊午帝統中軍歩􅀐十餘萬以征之倍道兼行召三萬兵大㑹于陳許之郊甲申次于隠橋儉將史招李績相次來降儉欽移入項城帝遣荆州刺史王基進據南頓以逼之帝􅀷壁髙壘以待東軍之集諸將請進軍攻其城帝曰淮南將士夲無反志且儉欽欲蹈縱横之跡習􅁗儀之􅀃謂逺近必應而事起之日淮北不從史招李績前後瓦解内乖外叛自知必敗困獸思闘速戰便合其志雖云必剋傷人亦多且儉等欺誑將士詭變萬端少與持乆詐情自露此不戰而尅之也乃遣諸􅁑誕督豫州諸軍自安風向壽春征東將軍胡遵督青徐諸軍出譙宋之間絶其歸路帝屯汝陽遣兖州刺史鄧艾督太山諸軍進屯樂嘉示弱以誘之欽進軍將攻艾帝潜軍銜枚徑進樂嘉與欽相遇欽子鴦年十八勇冠三軍謂欽曰及其未定請登城鼔譟擊之可破也旣謀而行三譟而欽不能應鴦退相與引而東帝謂諸將曰欽走矣三鼓而欽不應其􅀔巳屈不走何侍欽將遁鴦曰不先折其􅀔不得去也乃與驍􅀐十餘摧鋒䧟陣所向皆披靡遂引去帝遣左長史司馬璉督騎驍八千翼而追之欽父子與麾下走保項城儉聞欽敗棄衆霄遁淮南安風津都尉儉斬之傳首京都欽遂奔呉淮南平􅀄帝目有瘤疾使醫割之鴦之來攻也驚而目出六軍大恐蒙之以􅀍痛甚齧􅀍敗而左右莫知焉閏月疾篤使文帝㹅統諸軍辛亥崩于許昌時年四十八武帝受禪上尊號曰景皇帝廟稱世宗文皇帝􅀳書曰文皇帝諱昭字子上景皇帝母弟魏景􅀄三年封新城郷侯正元􅀄爲洛陽典農中郎將值魏明奢侈之後帝蠲除苛碎不奪農時百姓大恱轉散􅀐常侍大將軍曹爽之伐蜀也以帝爲征蜀將軍副夏侯􅀇出駱谷次于興勢蜀將王林夜襲帝營帝堅卧不動林退帝謂􅀇曰費禕以據險拒守進不􅀗戰攻之不可冝亟旋軍以爲後圖爽等引還禕果馳兵趣三嶺争險刀得過還拜議郎及誅曹爽帥衆衛二宫以功増邑千户髙貴郷公之立也以叅定䇿進封髙都侯邑二千户母丘儉文欽之亂大軍東征帝兼中領軍留鎮洛陽及景帝疾篤帝自京都省疾拜衛將軍景帝崩天子命帝鎮許昌尚書傅嘏帥六軍還京師帝用嘏及鍾㑹䇿自帥軍而還至洛陽進位大將軍加侍中都督中外諸軍録尚書事輔政劒履上殿固辭不受甘露元年春加大都督奏事不名夏六月進封髙都公地方七百里加九錫假斧􅃏進號大都督劒履上殿又不受秋八月庚申加假黄􅃏増封三縣二年夏六月辛未鎮東大將軍諸􅁑誕殺楊州刺史樂琳以淮南作亂遣子靚音浄爲質於呉以請救議者請速伐之帝曰誕以母丘儉輕疾傾覆今必外連呉㓂此爲變大而遟吾當與四方同力以全勝制之秋七月奉天子及皇太后東征徴兵青徐荆豫分取􅀜中遊軍皆㑹淮北師次于項城假廷尉何禎節度淮南宣慰將士申明逆順示以誅賞甲戌帝進軍丘頭因命合圍三年春正月諸􅁑誕文欽等出攻長圍諸軍逆擊走之􅀄誕欽内不相恊及至窮蹙轉相疑貳欽計事於誕忤誕手刃殺欽欽子鴦攻誕不克踰城降以爲將軍封侯使鴦廵城市而呼帝見城上持弓者不發謂諸將曰可攻矣二月乙酉攻而拔之斬誕夷三族四月歸于京師魏帝令改丘頭爲武丘以旌武功五月天子以并州太原上黨西河樂平新興鴈門司洲之河東平陽八郡地方七百里封帝爲􅀳公加九錫進位相國九讓乃止景元元年夏四月天子旣以帝三世宰輔政非巳出情不能安又慮廢辱將臨軒召百僚而行放黜五月戊子夜使冗從僕射李昭等發甲於陵雲臺召侍中王沉散􅀐常侍王業尚書王經出懷中黄素詔示之戒嚴俟旦沉業馳告于帝召護軍賈充等爲之備天子知事泄帥左右攻相府稱有所討敢有動者族誅相府兵將止不敢戰賈充叱諸將曰公畜養汝軰正爲今日耳太子舎人成濟抽戈犯蹕天子崩于車中帝召百僚謀故僕射陳泰不至帝遣其舅荀顗輿致之定于曲室謂曰􅀇伯天下其如我何泰曰唯􅆎斬賈充徴以謝天下帝曰卿更思其次泰曰但見其上不見其次於是歸罪成濟而斬之與公卿議立燕王宇之子常道郷公璜音黄爲帝二年秋八月甲寅天子使太尉髙柔授帝相國印綬司鄭冲致晉公茅土九􅃬固辭三年夏四月肅慎來獻楛矢石砮弓甲貂皮等天子命歸大將軍府四年夏帝將伐蜀徴四方之兵十八萬使鄧艾自秋道攻姜維於沓中雍州刺史諸􅁑緒自祁山軍于武街絶維歸路鎮西將軍鍾㑹帥前將軍李輔征蜀護軍胡烈等自駱谷襲漢中秋八月軍發洛陽大賚將士陳師誓衆將軍鄧敦謂蜀未可討帝斬以徇九月使天水太守王頎攻維營隴西太守牽􅒮邀其前金城太守楊欣趣其後鍾㑹分爲二隊入自斜谷使李輔圍王含於樂城又使部將易愷攻蔣斌於漢城㑹直指陽安護軍胡烈攻䧟􅀜城姜維聞之引還王頎追敗維於強川維與張翼廖化合軍守劒閣鍾㑹攻之冬十月天子以諸侯獻捷交至詔加九錫帝乃受命十一月鄧艾帥萬餘人自隂平踰絶險至于江由破蜀將􅁑贍於綿竹斬贍首􅀓道進軍雒縣劉禪降天子命􅀳公以相國㹅百揆於是上節􅀓去侍中大都督録尚書之號焉咸熈元年春正月乙丑帝奉天子西征至于長安遣護軍賈充持節督諸軍據漢中鍾㑹遂反於蜀􅁥軍衛瓘右將軍胡烈攻㑹斬之景辰帝至自長安三月巳夘進爵爲王増封并前二十郡冬十月景午天子命中撫軍新昌郷侯炎爲􅀳世子二年五月天子命冕十有二旒建天子旌旗岀警入蹕乗金根車駕六馬備五畤副車置旄頭雲罕樂儛八佾設鍾虡音巨宫懸位在燕王上進王妃爲王后世子爲太子王女王孫爵命之號皆如帝者之儀秋八月辛卯帝崩于露寢時年五十五葬崇陽陵武帝受禪追尊號曰文皇帝廟稱太祖世祖武皇帝晉書曰武皇帝諱炎字安世文帝長子也寛惠仁厚沉􅀷有度量魏嘉平中封北平亭侯歴給事中奉車都尉中壘將軍加散􅀐常侍累遷中護軍假節迎常道郷公於東武陽遷中撫軍進封新昌郷侯及􅀳國建立爲世子拜撫軍大將軍開府副貳相國􅀄文帝以景帝旣宣皇之嫡早世無後以帝弟攸爲嗣特加愛異自謂攝居相位百年之後大業冝歸攸毎曰此景帝之天下也吾何與焉將議立世子屬意於攸何曽等固爭曰中撫軍聦明神武有超世之才髮委地手過􅂰此非人臣之相也由是遂定咸熈二年五月立爲晉王太子八月辛夘文帝崩太子嗣相國晉王位十一月乙未令諸郡中正以六條舉淹滯是時晋徳旣洽四海宅心於是天子知歴數有在乃使太保鄭冲奉䇿曰咨爾晉王我皇祖有虞氏誕膺靈運受終于陶唐亦以命于有夏惟三后陟配于天而咸用光敷聖徳自兹厥後天又輯音集大命于漢火徳旣衰乃眷命我髙祖方軌虞夏四代之明顯我弗敢知惟王乃祖乃父服膺昭哲輔弼我皇家勲徳光于四海格于上下神祗罔不尅順地平天成萬􅀖以乂應受上帝之命恊皇極之中肆予一人祗承天序以敬授爾位暦數實在爾躬允執其中天禄永終於戯王其欽順天命率修訓典厎綏四國公卿及何曽王沉等固請乃從之太始元年冬十二月景寅設壇于南郊百寮在位及匈奴南單于四夷㑹者數萬人柴燎告􅀋于上帝於是大赦改元賜天下爵人五級三年春正月癸丑白龍二見于弘農澠池丁卯立皇子􅂨爲皇太子九月甲申詔曰古者以徳詔爵以庸制禄雖爲下士猶食上農外足以奉公忘􅀻内足以養親施惠今在位者禄不代耕非所以崇化之本也其議増吏俸四年十一月巳未詔王公卿尹及郡國守相舉賢良方正直言之士十二月班五條詔書於郡國一曰正身二曰勤百姓三曰撫􅀌寡四曰敦本息末五曰去人事庚寅帝臨聽訟觀録廷尉洛陽獄囚親平决焉八年春正月癸亥帝耕于籍田二月乙亥禁雕文綺組非禮法之物詔内外群官舉任邊郡者三人帝與右將軍皇甫陶論事陶與帝爭言散􅀐常侍鄭徽表請罪之帝曰謹言謇諤所望於左右也人主常以阿媚爲患豈以爭臣爲損哉徽越職妄奏豈朕之意遂免徽官咸寜四年十一月太醫司馬程據獻雉頭裘帝以竒􅇊異服非典禮焚之于殿前五年大舉伐呉遣鎮東將軍瑯瑘王伷出徐中安東將軍王渾出江西建威將軍王戎岀武昌平南將軍胡􅁬出夏口鎮南大將軍杜預岀江陵龍驤將軍王濬廣武將軍唐彬率巴蜀之卒浮江而下東西凡二十餘萬以太尉賈充爲大都督行冠軍楊濟爲副㹅統衆軍十萬太康元年春正月巳丑朔五色氣貫日癸巳王渾尅呉㝷陽頼卿諸城獲呉武威將軍周興二月戊午王濬唐彬等尅丹陽城庚申又尅西陵壬戍濬又尅夷道樂郷城甲戍杜預尅江陵三月壬申王濬以舟師至于建業之石頭孫皓大懼面縛輿櫬降于軍門濬杖節解縛焚櫬送于京師收其圖籍尅州四郡四十三縣三百一十三户五十二萬三千吏三萬二千兵二十三萬男女二百三十萬其收守以下皆因吴所置除其苛政示之簡昜呉人大恱乙酉大赦改元賜酺五日恤􅀌老困窮九月羣臣以天下一統屢請封禪帝謙謙弗許泰熈元年春正月辛酉改元夏四月巳酉帝崩于含章殿時年五十五在位二十五年葬峻陽陵廟號丗祖謝靈運諭曰丗徂受命禎祥屢臻苛慝不作萬國欣戴逺至迩安徳足以彰天啓其運民樂其功矣反古之道當以羙事爲先今五等罔刑并田王制凡諸禮律未能是正而採擇嬪媛不拘華門者昔武王伐紂歸傾宫之女不以助紂爲虐而世祖平皓納呉妓五千是同皓之􅁦婦人之封六國亂政如追贈外曽祖母違古之道凡此非事並見前書誠有􅀧於徽猷史氏所不敢蔽也唐太宗􅀳武帝紀論曰武皇承基誕膺天命握圖御㝢敷化􅀪道民以佚而代勞世以治而昜亂絶縑綸之貢去雕􅅣之飾制奢俗以變約俾澆風而反淳雅好直言留心採擢劉毅裴楷以質直而見容嵇紹許竒雖􅄷讎而不棄仁以御物寛而得衆宏略大度有帝王之量焉于時民和俗静家給民足聿脩武用思啓封疆次神筭於􅀷􅂨斷雄圖於議表馬隆西伐王濬南征師不延時獯虜削跡兵無血刃􅀭越爲墟通近代之不通服前王之不服禎祥顯應風教肅清天地之功成矣霸王之業大矣雖登封之禮讓而不爲而驕泰之心因斯以起見土地之廣謂萬葉而無虞都天下之安謂千年而永治不知處廣以思狹則廣可長存居治而忘危則治無常治加之建立非所委􅀉失才志欲就于升平行先迎於禍亂是猶將適越者指沙漠而遵途欲登山者渉舟航而覔路所趣逾逺所向轉難南北倍殊髙下相反求其至也不亦難乎況以新習易動之基而無乆安難拔之慮故賈充兇堅懷姧志而擁􅁠楊駿豺狼包禍心以專輔及乎宫車晚出諒闇未周藩翰變親以成踈連兵競滅其本棟梁廻忠而起僞擁衆各舉其威曽未數年綱紀大亂以至海内版蕩宗廟播遷帝道王猷反居文身之俗神州赤縣翻成􅀍髮之郷弃所大以資人掩其小而自託爲天下􅀏其故何哉良由失愼於前所以貽患於後且知子者賢父知臣者明君子不肖則家亡臣不忠則國亂亂國不可以安也亡家不可以全也是以君子防其始聖人閉其端而世祖惑荀朂之姧謀迷王渾之僞䇿心屢移於衆口事不定於巳圖元海當除而不除卒令擾亂區夏惠帝可廢而不廢終使傾覆洪基夫全一人者徳之輕極天下者功之重棄一子者忍之小安社稷者孝之大况乎資二丗而成業延三孽以喪身所謂取輕徳而捨重功畏小忍而忘大孝聖賢之道豈􅀂斯乎雖則善始於􅀄而乖令終於末所以殷勤史䇿不能無慷􅁣焉太平御覽卷第九十六
