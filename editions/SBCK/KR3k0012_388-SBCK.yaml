  text: 太平御覽卷第三百八十八
  hash: sha256:90603502206833e15f43fc19e811c5c3fe1200a7277064a861236633af4996ca
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_388-1a}
body:
  text: 人事部二十九聲色影跡聲周書曰師曠見周太子􅀳太子曰吾聞汝知人年壽幸以告我師曠曰汝色赤白聲火聲不壽太子曰余後三年上賔於帝汝慎無言殃將及汝三年而死毛詩關雎序曰情發於中故形於聲聲成文謂之音左傳宣上曰􅀄楚司馬子良生越椒子文曰必殺之是子也熊虎之狀而犲狼之聲弗殺必滅􅀂敖氏諺曰狼子野心是乃狼也其可畜乎又襄三曰􅀳人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競􅁔詠八風南風音微故曰不兢唯歌南北風者聴晉楚也多死聲楚必無功後楚師敗又昭上曰伯石始生子容之母走謁諸姑曰長叔姒生男姑視之及堂聞其聲而還曰是犲狼之聲也狼子野心非是莫喪羊舌氏矣遂不視春秋演孔圖曰伊尹大而短赤色而髯好俛而下聲家語曰孔子在衛昧旦晨興顔回侍側聞哭者聲甚哀子曰回汝知此何所哭對曰非但爲生離别也子曰何以知之對曰回聞恒山之鳥生四羽翼旣成將分于四海其母悲鳴送之哀聲有似於此孔子使問哭者果曰父死家貧賣子以葬與之長訣子曰回也善於識矣史記曰􅀄楚成王將以商臣爲太子語令尹子上子上曰商臣蜂目犲聲忍人也不可立之王弗聽又􅁗始皇丗家曰大梁人尉繚曰􅁗王爲人隆準長目鳥喙鷹呼犲聲少恩而虎狼心戰國䇿曰楚襄王爲太子之時爲質於齊懷王薨太子辤於齊王齊王曰與我地五百里則歸子太子曰臣今有􅀓請問􅀓􅀓曰獻之齊歸太子太子歸即位齊使來求地上柱國子良曰王身出聲許萬乗之齊而弗與則不信後不可以結約諸侯矣後漢書曰盧植字子幹身長八尺二寸音聲如鍾東觀漢記曰更始納趙萌女爲后有寵遂委政於萌日夜與婦人飲讌後庭群臣欲言事輒醉不能見時不得巳乃令侍中坐帷内與語諸將識非更始聲出皆怨之華嶠後漢書曰何熈字孟孫少有大志身長八尺五寸體皃魁梧善儀容舉孝廉爲謁者賛拜殿中音動左右江表傳曰􅀜羽欲襲魯肅甘寧與羽俱㑹益陽瀬淺將渡寧有所約令羽遥聞之曰此甘寧聲也遂不敢渡王隱晉書曰王褒少立操尚非禮不動音聲清髙辤氣雅正漢晉春秋曰王敦爲楊州刺史潘滔曰處冲蜂目巳露但犲聲未發今樹之江外是見賊也梁書曰吕僧珎字元瑜東平范人也始童児時從師學有相工歴觀諸生指僧珎謂􅀶士曰此人有竒聲封侯相也梁大清實録曰中宗諱繹字丗諴髙祖第七子也旣長而壯聦明􅀶渉殆謂生知聲􅀂撞鍾辯如河㵼越絶書曰越栖㑹稽行成於呉引兵而去勾踐將降呉呉王許之子胥大怒聲􅀂哮虎曰此越未戰而服天以賜吳其可逆天乎臣唯君王急制之呉王不聽莊子曰曽子居衛緼􅂁無表三日不舉火十年不制衣正冠而纓絶捉衿而肘見納履而踵決曵屣而􅁔商頌聲若出金石賈􅁩書曰豫讓釁靣變容吞炭變聲必執襄子一夕而五易處風俗通曰聲所以五者繫五行也音以八者繫八風也新序曰原憲見子貢曵杖行歌聲􅀂金石郭林宗别傳曰林宗儀皃魁梧身長八尺音聲如鍾當時以爲准的裴楷别傳曰賈充等治法律揩亦叅典其事事畢詔專讀奏平章當否揩善能諷誦音聲解執刑書穆􅀂清詠焉異􅁐曰陳思王嘗登魚山臨東阿忽聞巖岫裏有誦經聲清道深亮逺谷流響肅然有靈氣不􅁴歛􅁭祗敬便有終焉之志即俲而則之今梵唱皆植依擬所造項氏始學篇注曰有龍淵者桓靈時善相人也於聽音聲尤妙二千石相者龍淵下床賛之令長起侍賛之自六百石以下皆坐而言之先相張濟當以財得三公濟常依淵以觀視有相者輒徃求之㑹解瀆侯徃相至門問當有至相何憂貧乎侯去淵謂濟曰可厚事之濟遂徃盡爲償債别數百萬脩居業桓帝崩無嗣解瀆侯入爲天子而濟遂至司空丗說曰蔡司徒說在洛陽見陸機兄弟住叅佐廨中三間瓦屋士龍住東頭士衡住西頭龍爲人文弱可愛士衡長七尺餘聲作鍾聲言多慷􅁣又曰杜預爲荆州刺史鎭襄陽時有讌集大醉輒閑齋獨眠不聽人前後常醉聞齋中嘔吐其聲甚苦莫不側足悚懆有一小吏便開户看之正見床上有大虵垂頭床邊吐都不見人語林曰胡廣夲姓黄五月生父母置甕中投之于江流下聞有小児啼聲徃取因以爲子遂登三司廣後不治本親服丗以爲譏又曰王武子葬夕孫子荆哭之甚悲賔客莫不垂涕􅂘畢向靈坐曰卿好我作驢鳴今爲卿作驢鳴因作驢鳴似真聲賔客莫不􅀏孫聞哭頋謂曰諸君不死令王武子死賔客莫不皆怒又曰董仲道常在客􅀫與王孫隔共語同行人曰此人行必爲亂後果爲亂階色說文曰晢人色白也皤老人色也韓詩外􅀓曰閔子始見夫子有菜色後有蒭豢之色子賈問其故閔子曰吾出蒹葭之中入夫子之門聞夫子切磋之敎􅀼樂之出見羽盍龍旂又樂之二者相攻􅇩中是以有菜色今􅀍夫子之文出見羽盖龍旂視如糞土是以有蒭豢之色尚書大傳曰撞鍾蕤賔在外者皆金聲在内者皆玉色禮記表記曰是故君子縗絰則有哀色端冕則有敬色甲胄則有不可辱之色又曰君子不失色於人不失口於人又曰玉藻曰立容德色容莊又曰盛氣闐實陽休玉色言身中氣盛闐滿􅀂陽氣之休物玉色言不變也又文王丗子曰文王之爲丗子也朝於王季日三其有不安節則内竪以告文王文王色憂行不能正履也左傳僖上曰齊桓公與蔡􅁎乗舟於囿蕩舟公懼變色又定上曰衛太子蒯聵謂戲陽速曰從我而朝少君少君見我我頋乃殺之速曰諾乃朝夫人夫人見太子太子三頋速不進夫人見其色啼而走曰蒯聵將殺余見太子色變知其欲殺巳又哀上曰肉食者無墨墨氣色下公羊傳桓公曰宋督殺其君與夷及其大夫孔父孔父存則殤公不可得殺於是先攻孔父殺之皆死孔父正色立于朝則人莫敢過而致難于其君孔父可謂義形于色矣論語公冶長曰巧言令色足恭左丘明耻之丘亦耻之又陽貨曰巧言令色鮮矣仁又曰子張問令尹子文三仕爲令尹無喜色三巳之無愠色何如子曰忠矣又鄉黨曰立不中門行不履閾過位色勃如也屏氣似不息者出降一等逞顔色怡怡如也上如揖下如授勃如戰色足縮縮如有循享禮有容色私覿愉愉如也愉愉顔色和又曰色思温貌思恭又曰車中不内頋不疾言不親指色斯舉矣顔色不善則失之又陽貨曰色厲而内荏譬諸小人其猶穿窬之盗也與又顔淵曰子張問士何如斯可謂之逹矣子曰何哉爾所謂逹者子張對曰在􅀖必聞在家必聞子曰是聞也非達也夫達也者質直而好義察言而觀色慮以下人夫聞也者色取仁而行違居之不疑又憲問曰賢者辟丗丗主莫得而臣其次辟地去亂國適理􅀖其次辟色色斯舉矣其次辟言有惡言乃去漢書曰李廣出右北平胡急擊矢下如雨漢兵死者過半㑹暮吏士無人色言懼甚也又曰李陵降邊塞以聞上欲陵戰死召陵母及婦使相者視之無死喪色又曰汲黯好游俠任氣節行脩㓗其諌犯主之顔色常慕􅀽盎之爲人上方招文學儒者黯曰陛下内多欲而外施仁義奈何欲効唐虞之治乎上怒變色而罷朝公卿皆爲黯懼魏氏春秋曰􅄞康寓居河内與之遊者未嘗見其喜愠之色丗說同魏志曰夏侯􅀇格量弘濟臨斬顔色不變舉動自􅀂續晉陽秋曰劉毅至黒時人謂之鐵色又曰􅀄太宗諸子繼夭乃令扈謙卜云後房有一女當誕二男帝乃召相者示諸寵妾皆曰非其人又示諸婦時織坊中有一人形長色黒宫人謂之崑崙至相者驚曰此其人也帝以大計幸之生烈宗也前􅁗録曰符堅舉國伐晉登城而望晉軍見部仵齊整八公山上草木皆􅀋人形憮然有懼色後趙録曰延熙元年石虎遣丞相郭殷持節入廢弘爲海陽王弘安歩就車容色自􅀂百官莫不流涕春秋後語曰魏文侯謀事而當群臣莫之逮者逮及也朝而喜色吴起進曰昔楚莊王朝而有憂色申公巫臣問曰君有憂色何也莊王曰吾聞諸侯擇師王者擇友霸者自足而群臣莫之􅀂者亡今以不榖之不肖而議於朝群臣莫能逮吾國其幾於亡乎幾近吾是以憂色山海經曰不死民爲人黒色壽考不死郭子別傳曰林宗秀立髙跱詹然淵渟蔡伯喈告盧子幹馬日磾曰爲天下作碑銘多矣未嘗不有慙色唯郭先生碑頌無愧色耳列仙傳曰桂父象林人色時白時黄時赤竹林七賢論曰王戎女適裴氏用匱女爲貸錢一萬乆而不還女歸戎色不恱遽還錢乃懌瀬郷記曰老子爲人黄色羙眉孫卿子曰臯陶之色如削􅀲燕丹子曰荆軻入􅁗􅁗王陛㦸而見燕使鍾鼓並發群臣皆呼萬􅀊􅁗武陽大怒靣如死􅁅色郭子曰盧志於衆中問陸士衡陸抗是卿何物荅曰如卿於盧􅗱士龍失色旣出户謂兄曰何至於此彼或有不知士衡正色曰我父祖名播海内寧有不知識者疑兩陸優劣謝安以此定之丗說曰石崇要王敦入學戲見顔淵像石歎曰􅀂與之同昇孔子堂去人何必有間王曰子貢去卿差近石正色曰士處丗當令身名俱㤗何至以甕牖語人影尚書大禹謨曰惠迪􅁻從逆凶唯影響東觀漢記曰西羗祖爰劒爲􅁗所奴􅀠而亡藏巖穴中見焚有影象如虎爲蔽火得不死諸羗以爲神推以爲豪魏略曰何晏性自喜行歩頋影山海經曰壽麻之國正立無影疾呼無響郭璞注曰言其形氣有異於人又曰長流山神白帝少昊居之主司反影日西入則反影東照言司察之也孫卿子曰夏首之南有人曰㳙蜀梁其人愚宵行俯見其影以爲伏􅀑仰見其髪以爲立魅倍道而走比至其家失氣而卒莊子曰有畏影惡跡而去之走者足舉逾數而跡愈多走逾疾而影不離自以爲尚遟疾走不休絶力而死不知處隂以休影處静以息跡愚亦甚矣又曰㒺兩問影曰曩子行今子止曩子坐今子起何其無特操與影曰吾有待而然者耶罔兩影外之微隂也太􅀇經曰老子行則滅跡立則隱影風俗通曰陳留有富室公年九十無子取田家爲婦一交接而死後生男其女誣其淫佚有児爭財數年不能决丞相邴􅁻曰吾聞老公子不耐寒又無影時􅀊八月取同􅀊小児解衣祼之此児獨言寒又曰中獨無影大小歎息因與其財抱朴子曰韓終丹乆服立日中無影列仙傳曰河間王家老舎人自言父丗見􅀇俗􅀇俗無影王呼着日中實無影地鏡圖曰人行日月中無影者神仙人也與虛合體故居日月中無影履霜無跡火中無影也跡史記曰姜嫄爲帝嚳元妃出野見巨人跡心欣然踐之而身動如孕朞月而生后稷故詩曰履帝武敏歆武跡也王子年拾遺曰石崇篩沉水之香如麋末布置席上使所愛者踐之無跡者即賜真珠百琲􅀂有跡者便節其飲食令體輕弱故中國相戲曰爾非細骨輕軀那得百琲真珠又曰燕王時廣延之國獻善舞者二人王設麟文之席散荃蕪之香使二人舞其上弥日無跡體輕故也述征記曰齊有龍盤山上有大脚姜嫄所履跡盛􅀪之荆州記曰零陜縣上石有夸父跡又曰湘東隂山縣北數十里有武陽龍靡二山上悉生松栢羙木龍靡山有盤石石上有仙人跡及龍跡傳云昔仙人遊此二山常稅駕此石又於其所得仙人遺詠太平御覽卷第三百八十八
