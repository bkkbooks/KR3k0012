front:
  text: 太平御覽卷第一百八十二
  hash: sha256:b747b4afd6105b3e21f2666ab4bebc0a0d237e01cf94b89e56ad41ab870127f4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_182-1a}
body:
  text: 居處部十門上說文曰門捫也在外爲人所捫摸也從二户象形也閶闔天門也闔門扉也門􅐬也䦳門嚮也闤闠市門也閽門堅也閽昏也門常昏閉故曰閽即守門􅀠人也閻里中之門也易說卦曰艮爲門爾雅曰閍謂之門注詩曰祝􅀕於祊是也又曰正門謂之應門宫中之門謂之闈謂相通小門也韓楊天文要集角天門也風俗通曰閈城外郭内里門也禮記注云天子五門臯門雉門庫門應門路門魯有庫雉路三門則諸侯三門也漢制内至禁省爲殿門外出大道爲掖門應劭注漢書曰掖者言在司馬門之旁掖王者行幸設車宫轅門帷宫旌門無宫則供人門鄭注周官云次車爲藩則仰車轅以表門張帷爲宮則樹旌以表門陳列周衛則立長人以表門周禮曰掌舎掌王㑹同之舎設陛枑再重設車宫轅門爲壇㙺宫􅁄門爲帷宫設旌門無宫則供人門轅門謂次以爲藩卽車以爲門人門謂以人爲衛立長人以爲門又曰師氏掌詔王媺居虎門之左司王朝注云虎門路寢門也王曰視朝於路寢門外也􅀞虎焉以明勇猛於守冝也尚書曰舜賔于四門四門穆穆又曰闢四門詩曰迺立臯門臯門有伉迺立應門應門鏘鏘又曰北門篇名刺士不得其志也言衛之忠臣不得其志耳出自北門憂心殷殷又曰髙門有閌又曰衡門篇名誘僖公也愿而無立志故作是詩以誘掖其君也衡門之下可以棲遟詩義問曰横一木作門而上無屋謂之衡門易曰重門撃柝以待暴客又曰出門同人無咎又曰不出户庭無咎禮記曰凡與客入者每門讓於客客至於寢門則主人請入爲席然後出迎客主人入門而右客入門而左又曰生男懸􅓡於門左又曰立不中門行不履閾又曰婦人送迎不出門見兄弟不踰閾又曰兩君相見揖讓而入門入門而懸興作樂又曰大夫士出入公門由闑右不踐閾又曰入門而問諱又曰孔子􅀒手曵杖逍遥於門又曰天子諸侯臺門此以髙爲貴者又月令曰孟秋其祀門􅀕先肺隂氣出祀之於門外順隂也又曰孟冬戒門閭修閉左傳啓塞從時門户橋道謂之啓城郭牆塹爲之塞皆啓閇之急不可一日而闕也又襄二年王叔宰曰蓽門圭竇之人而皆陵其上難爲上矣蓽門柴門閨竇小户穿壁上銳下方狀如圭又曰新作南門書不時也注本名稷門公吏高之改高門也又曰鄭大水龍􅃲于時門之外洧淵又曰公及邾師戰敗績邾人􅀗公胄懸諸魚門杜預曰魚門邾城門又曰楚子嚢圍宋門于桐門又曰楚子爲陳夏氏亂遂入陳殺夏徴舒轘諸栗門轘車裂也栗門陳城門也論語憲問曰子擊磬於衛有荷蕢而過孔氏之門者曰有心哉擊磬乎又曰􅀖君樹塞門管氏亦樹塞門又郷黨曰入公門鞠躬如也史記曰金馬門者宦者署門也門旁有銅馬故謂之曰金馬門又曰太史公曰余過大梁求所謂夷門者大梁城東門也又曰夫以汲鄭之賢有勢則賔客十倍無勢則否况衆人乎下邽翟公有言始翟公爲廷尉賔客闐門及廢也門外可設爵羅翟公復爲廷尉客欲往翟公乃大署門曰一死一生乃知交情一貧一冨乃知交態一貴一賤交情乃見又曰萬石君子慶爲内史慶歸入門不下車萬石君聞之不食慶恐肉􅃝請罪不許舉宗及兄建肉􅃝萬石君讓曰内史貴人入閭里里中長老皆走匿而内史坐車中自如固當乃謝罷慶慶及諸子入里門趨至家又曰吕不韋說子楚曰吾能大子之門子楚􅀏曰盍自大子之門顧乃大吾門不韋曰吾門待子門而大耳漢書曰太液池有壁門又曰陳平家貧􅀒郭窮巷以席爲門然門外多長者車轍又曰魏勃家貧欲見齊相曹叅無以自逹常早起掃其門人問故勃曰欲見相君無因故爲子掃門乃見叅叅用爲舎人又曰梅福居家常以讀書養性爲事至元始中王莽顓政師古曰顓與專同福一朝棄妻子去九江至今傳以爲仙其後人有見福於會稽者變名姓爲吴市門卒云又曰于定國父于公其閭門壞父老方共治之于公謂曰以髙大閭門令容駟馬髙盖車我治獄多隂徳未曽有􅁈子孫必有興者至定國爲丞相永爲御史大夫封侯丗傳云又曰張釋之爲公車令頃之太子與梁王共車入朝不下司馬門如淳曰官衛令諸岀入殿門公車司門者皆下不如令罰金四兩於是釋之追止太子梁王母入殿門遂劾不下公門不敬奏之薄太后聞之文帝免冠謝曰教兒不謹薄太后使丞詔赦太子梁王然後得入文帝繇是竒釋之拜爲中大夫又曰鄭崇爲尚書上謂曰君門如市何以欲禁切主上師古曰言請求者多交通賔客者也崇對曰臣門如市臣心如水又曰鄒陽諌吴王曰今臣盡智畢義易精極慮則無國不可姧飾固陋之資則何王之門不可曵長􅅂乎又曰王尊爲東平相是時東平王以至親驕不奉法度傳相連坐師古曰前任傅相者頻坐王得罪及尊視事奉璽書至庭中王未及出受詔尊持璽書歸舎食巳及還致詔尊持後謁者王傅在前說相䑕之詩師古曰鼠􅅠風篇名刺無禮之詩也其辝曰相鼠有皮人而無儀人而無儀不死何爲相視也言視鼠有皮雖處髙顯之地偷食苟得不知廉耻人無禮儀亦與䑕同不如速无也尊曰母持布鼔過雷門師古曰雷門會稽城門也有大鼔越摯此鼔聲聞洛陽故尊引之也布鼔謂以布爲鼔故無聲王怒起入後宫尊亦直趨岀就舎又曰蓋寛饒字次公爲諌議大夫行郎中户將軍師古曰百官公卿表郎中令屬官有郎中事户􅀐三將盖各以所主爲名也將者主户衛也劾奏衛將軍張安世子侍中陽都侯彭祖不下殿門師古曰過殿門不下車也并連及安世居位無􅀘彭祖時實下門寛饒坐舉奏大臣非是左遷爲衛司馬又曰蕭望之署小苑東門􅀱時王仲翁出入從倉頭盧兒顧謂望之不肯録録反抱關爲師古曰録錄謂循常也言望之不能隨例捜索以忤執政不得大官而守門望之曰各從其志又曰鉤弋夫人大有寵有娠十四月乃産是爲昭帝武帝曰昔堯十四月而生今鉤弋亦然乃命其門曰堯母門范曄後漢書曰孔融云鄭君里門四方所由觀禮其廣令容髙車結駟名爲通徳之門又曰郅惲字君章爲上東門􅀱帝常獵夜還惲拒門不開帝乃逥從中東門入賜惲布貶中東門候又曰李膺傳曰是時朝廷日亂綱紀頽弛膺獨持風裁以聲名自髙士有􅀍其容接者名爲登龍門以魚爲喻龍門河水所下之口在今絳州龍門縣辛氏三􅁗記曰河津一名龍門水陸不通魚鱉之屬莫能上江海大魚薄集龍門下數千不得上上則爲龍表宏漢紀曰建􅀄二年有司依舊典奏封諸舅太后詔曰前過濯龍門上見外家車如流水馬如龍吾不譴怒之但絶其歳用後漢書馬援傳曰孝武皇帝時善相馬者東門京鑄作銅馬法獻之有詔立馬於魯班門外更名魯班門爲金馬門又曰赤眉入長安更始單􅀐走從厨城門出三輔黄圖曰洛城門王莽故曰建于門其内有長安厨官俗名之爲厨城門今長安故城北面之中門是也諸婦女從後連呼曰陛下當下謝城更始即下拜復上馬去又郭祚傳曰祚遷尚書右僕射故事令僕中丞騶唱而入宫門至於馬道及祚爲僕射以爲非盡敬之冝言於丗宗帝約之詔御在太極唱至止車門御在朝堂至司馬門騶唱不入宫自此始也又曰張湛建武􅀄爲左馮翊在郡修典禮設條教政化大行後告歸平陵望寺門而歩告請也告歸謂請假歸寺門即平陵縣門也主簿進曰明府位尊徳重不冝自輕湛曰禮下公門軾輅馬輅大也君所居曰寢車馬曰輅馬軾車前横來也乘車曰必正之有所敬則撫軾爲小俛也禮記曰大夫士下公門式輅馬孔子於郷黨恂恂如也父母之國所冝盡禮何謂輕哉又曰虞延爲陳留督郵勑延一人從駕到魯還經封丘城門門下小不容羽蓋帝怒使撻侍御史延因引咎以爲罪在督郵言辭激揚有感上意乃制詔曰以陳留督郵虞延故侍御史罪冝放魏書曰文帝􅀄在東宫集諸儒於肅城門内講論大義􅋲􅋲無倦吴志曰張昭諌孫權不從稱疾不朝權自出過其門呼昭辭疾篤權使燒其門欲恐之昭更閇户權使滅火住門良乆昭諸子共扶昭起權載以還宫又曰􅀄平中謡曰黄金車班蘭耳閶闔門岀天子閶闔吴西郭門夫差所作又曰諸􅁑恪有遷都意更起武昌宫是月武昌門災改作端門􅀳書曰王衍旣有盛才羙貌明悟若神常自比子貢聲名藉甚傾動當世妙善􅀇理唯談莊老每捉玉柄塵尾與手同色義理有所不安隨即改更世號口中雌黄朝野翕然謂之一世龍門又曰賀循時廷尉張闓住在小市將奪左右近宅以廣其居乃􅀻作都門早閇晏開人多患之訟於州府皆不見省會循出至破崗連名詣循質之循曰見張廷尉當爲及之闓聞而遽毀其門詣循致謝其爲世所敬服如此又曰陳頵字延思陳國若人也少好學有文義父訢立宅起門頵曰當使容駟馬車訢􅀏而從之又曰稽含自號即丘子門曰歸厚之門崔鴻十六國春秋夏録曰赫連勃勃宫殿大成乃刻石都南頌其功徳其南門曰宋朝門東門曰招魏門西門曰平朔門又起冲天臺于南山欲登之望長安又後趙録曰建武十年白虹出自大杜經鳯陽門東南連天十餘刻乃滅於是閉鳯陽門唯元日乃開又後􅁗録曰姚興從朝門遊于文武苑及昏而還將自平朔門入前駈旣至城門校尉王滿聦􅀍甲持杖閉門拒之乃廻從朝門而入旦而召聦謂之曰卿社稷之臣也朕有嘉焉於是進位二等隋書曰髙祖􅀄爲定州㹅管先是定州城西門乆閇不行齊文宣帝時或請開之以便行路帝不許曰當有聖人來啓之及髙祖至而開焉莫不驚異陳書曰髙宗七年改作雲龍神虎二門案宫殿簿曰雲龍門第二重宫牆東西門晉本名中東華門夲晉東掖門也梁改之西對第三重牆萬春門神虎門第二重宫牆西門􅀳夲名中西華門夲􅀳西掖門宋改名西華東入對第三重牆千秌門水經注曰長安城惠帝元年築六年成即咸陽也本離宫無城故城之十二門東出北頭第一門宣平門王莽更名春正門正月亭民曰東城門其郭門曰東都門逢萌桂冠處也第二清明門一曰凱門王莽更曰宣徳門布思亭内有籍田倉亦曰籍田門第三霸門王莽更名仁壽門無疆亭民見門色青又名青城門亦曰青綺門邵平種􅀲處也南出東頭第一門覆盎門王莽更曰永春門長茂亭其南有下杜城應劭曰故杜陵之下聚落也故曰下杜門又曰端門北對長樂宫第二門安門亦曰鼎路門王莽改曰光禮門顯樂亭第三西安門北對未央宫夲名平門王莽更名信平門城正亭西岀南頭第一章門王莽更名萬秋門億年亭亦曰故光畢門也又曰便門第二直門王莽改曰直道門端路亭故龍樓門也第三西城門亦曰雍門王莽更名章義門著􅁩亭其水北有函里民名曰函里門又曰光門亦曰突門北出西頭第一門横門王莽更名朔都門
