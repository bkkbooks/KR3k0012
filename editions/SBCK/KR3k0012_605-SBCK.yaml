front:
  text: 太平御覽卷第六百五文部二十一
  hash: sha256:39c1967d1973c711c9d1f2a07b8cbcc3df78b452b54d22a0128cba7798e7d7cf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_605-1a}
body:
  text: 筆墨硯􅁓筆􅀃文曰楚謂聿呉謂之不律燕謂之弗􅁗謂之筆釋名曰筆述也述而書之􅀶物志曰蒙恬造筆崔豹古今注曰牛亨問曰古有書契巳來便應有筆也丗稱蒙恬造筆何也荅曰自蒙恬始作􅁗筆耳以柘木爲管以鹿毛爲柱羊毛爲皮所謂鹿毫竹管也非謂古筆也又問曰筆有彤管何也荅曰彤赤􅃮耳使史官載筆故是赤管言以赤心事也毛詩柏舟静女曰静女其孌貽我彤管古者后夫人有女史彤管之法后妃羣妾以禮御于君所女史書其日月授之環以進退也箋云􅊮笔赤筆也􅊮管有煒恱懌女美曲禮曰史載筆士載言也漢書曰張安丗持橐簮筆橐挈橐也近臣􅀒橐簮筆從備顧問或有所記事孝武帝數十年見謂忠謹東觀漢記曰班超字仲升家貧爲官傭冩書嘗輟書投筆歎曰大丈夫當效􅀓介子張騫立功異域以取封侯安能乆事筆硯乎呉志曰曹公聞孫權以荆州資劉備大懼方作書不􅁴落筆於地齊書曰江淹嘗􅀫於冶亭夢一丈夫自稱郭璞謂淹曰吾有筆在卿處多年可以見還淹乃探懷中得五色筆一以授之尓後爲詩絶無美句時人謂之才盡梁書曰紀少瑜嘗夢陸倕以一束青鏤管筆授之云我以此筆猶可用卿自擇其善者其文因此遒進又曰鄭灼家貧好學抄義䟽以日繼夜筆毫盡每削用之隋書曰髙祖復鄭譯官爵令内史令李德林立作詔書髙潁戯謂曰筆乾譯荅曰出爲方岳杖䇿言歸不得一錢何以潤筆上大􅀏又曰劉行本累遷掌朝下大夫周代故事天子臨軒掌朝典筆硯持至御座則承御大夫取以進之及行本爲掌朝將進筆於帝承御復欲取之行本抗聲謂承御曰筆不可得帝驚視問之行本言於帝曰臣聞設官分職各有司存臣旣不得佩承御刀承御亦焉得取臣筆帝曰然因令二司各行所職國朝傳記曰虞監草行本師於釋智永智永常樓上學業成方下其棄筆頭至盈瓮唐書曰柳公權爲司封貟外郎穆宗政僻嘗問公權筆何盡善對曰用筆在心心正則筆正上改容知其筆諌也五代史周史曰和凝年十七舉明經至京師忽夢人以五色筆一束以與之謂曰子才可以舉進士自是才思敏贍十九登進士第又曰馬裔孫􅀄爲河中從事因事赴闕􅀫於邏店其地有上邏神祠夜夢神見召待以優禮手授以筆一大一小覺而異焉及爲翰林學士旋知貢舉私自謂曰比二筆之應也洎入中書吏奉二筆熟視大小如昔時夢中所授者漢官儀曰尚書令僕丞郎月給赤管大筆一􅀟􅂐題曰北宮二作西京雜記曰漢制天子筆以錯寳爲跗毛皆秋兎之毫官師路扈爲之又以雜寳爲匣厠以玉壁翠羽皆直百金楊子法言曰槌提仁義絶滅禮學吾無取焉五帝者三王之筆舌寕有書不用筆言不由舌耶刀不利筆不銛冝加砥削之論衡曰知能之人湏三寸之舌一尺之筆然後能自通神仙傳曰李仲甫潁川人漢桓帝時賣筆遼東市一筆三錢如無錢亦與筆魏末傳曰司馬宣王欲誅曹爽呼何晏作奏曰冝上君名晏失筆於地丗􅀃曰王東亭嘗夢有人與大筆其管如椽旣􅁴􅀃人云當有大手筆事不日烈宗晏駕哀䇿謚議並王所作也傳子曰漢末一筆之匣雕以黄金飾以和壁綴以隋珠文以翡翠此筆非文犀之楨必象齒之管豐狐之柱秋􅇠之翰用之者必􅀍珠繡之衣踐雕玉之履矣王羲之筆經曰漢時諸郡獻兎毫出鴻都惟有趙國毫中用時人咸言􅇠毫無優劣管手有巧拙又曰有人以緑沉􅃮竹管及鏤管見遺録之多年斯亦可愛玩詎以金寳雕􅅣然爲貴也又曰昔人或以瑠璃象牙爲筆管麗飾則有之然筆湏輕便重則躓矣筆墨法曰作筆當以鑯梳梳兎毫毛及羊青毛去其穢毛使不髯茹羊青爲心名曰筆柱或曰墨池東宫舊事曰皇太子􅀄拜給􅃮筆四枚銅􅀶山筆床副捜神記曰王祐病有􅀑至其家留赤筆十餘枚在薦下曰可使人簮之出入辟惡凢舉事者皆無恙荆楚歳時記曰陸士衡云魏武帝劉婕妤以七月七日折璃琉筆嶺表録異曰畨禺地無狐兎多用鹿毛野狸毛爲筆又昭冨春勤等州則擇鷄毛爲筆其用也亦與兎毫無異又曰嶺南無兎嘗有郡収得其皮使工人削筆者醉失之大懼因剪􅁂䰅爲筆筆甚善更使爲之工者辭焉詰其由以實對遂下令使一户輸人􅂡或不能致輙責其直墨釋名曰墨晦也言以物晦墨也漢書王莽傳曰漢兵起莽以墨汚渭陵延陵周垣東觀漢記曰和熹鄧后即位万國貢獻悉禁絶惟歳供紙墨而己范子計然曰墨出三輔上價石百六十中三十下十韋仲將筆墨方曰合墨法好醇煙擣訖以細絹簁於缸中簁去草芥􅀂細沙以細絹簁塵埃此物至輕微不冝露簁慮失飛去不可不慎墨一斤以好膠五兩浸梣皮汁中梣江南樊鷄木皮也其皮入水緑色解膠又益墨色可下鷄子白去黄五枚亦以眞朱一兩麝香一兩皆別治細簁都合調下鐵臼中寕剛不冝澤擣三万杵杵多益善合墨不得過二月九月温時敗臭寒則難乾湩溶見風日碎破重不得過二兩蔡質漢官曰尚書令僕丞郎月賜渝糜大墨一枚小墨一枚東宫舊事曰皇太子􅀄拜給香墨四丸脩復山陵故事曰玄宫物有墨五丸神仙傳曰漢桓帝徴仙人王逺逺乃題宫門四百餘字皆􅀃方來帝惡之削之外字去内字復見墨入材裏􅁑龔與梁相書曰復惠善墨下士所無摧骸骨碎肝膽不足明報曹植樂府詩曰墨出青松煙筆出狡兎翰古人感鳥跡文字有改刋􅁑洪神仙傳曰班孟不知何許人也舒􅁓於前嚼墨一噴皆成字竟􅁓各有意義趙壹非草書曰後丗慕崔杜張子專欲草書爲務十日一筆月數丸墨領䄂如皂脣齒常黒屈指􅀞地爪折䚡出亦効嚬之増醜也陸雲與兄機書曰一日上三臺曹公藏石墨數十萬斤云燒此消復可用然不知兄頗見之不今送二螺鄭氐㛰禮謁文讃曰九子之墨藏于松煙盛弘之荆州記曰筑陽縣有墨山山石悉如墨顧微廣州記曰懷化郡掘壍得石墨甚多精好可冩書戴延之西征記曰石墨山北五十里山多墨可以書㝷陽記曰廬山有石墨可書災祥集曰天雨墨君臣無道䜛人進李尤研墨銘曰書契旣造研墨乃陳煙石相附筆䟽以申顧野王輿地志曰漢時王朗爲㑹稽太守子肅隨在郡住東齋中夜有女從地出稱越王女與肅語曉別贈一丸墨肅方注周易因此便􅁴才思開悟硯釋名曰硯研也研墨使和濡也晉書懷帝䧟於平陽劉聦引帝入醼謂帝曰卿爲豫章王時朕與王武子俱造卿武子稱朕於卿卿言聞名乆矣卿以所作樂府文示朕曰聞君善詞賦試爲看也朕與武子俱爲盛德頌卿稱善者乆之又引朕射于皇堂朕得十二籌卿與武子俱得九籌卿又贈朕柘弓銀硯卿頗憶否帝曰安敢忘之恨尓日不得早識龍顔唐書曰栁公權常寳惜筆硯圖􅀞自扄鐍之常評硯以青州石末爲第一言墨易冷絳州黒硯次之太公金匱曰研之書曰石墨相著邪心䜛言無得汙白伍緝之從征記曰夫子牀前有石硯一枚作甚古朴盖孔子平生時物也西京雜記曰天子以玉爲硯取其不凍拾遺記曰張華撰博物志奏武帝帝賜青鐵硯鐵是于闐國所獻鑄以爲硯魏武帝上雜物䟽曰御物有純銀叅帶臺硯一枚鈍銀叅帶貟硯大小各一枚陳留志曰范喬年二歳祖父馨卒臨終撫其首曰恨不見汝成人以吾所用硯與之至五歳祖母以此言告喬便執硯啼􅂘東宫舊事曰皇太子􅀄拜給漆石硯一枚崔寔四民月令曰正月硯凍釋令童㓜入小學學篇章十一月硯凍命童㓜讀孝經論語丗語曰曹爽與明帝少同硯書晉傅􅀇硯賦採隂山之潜璞簡衆材之脩冝節方貟以定形鍜金鐵而爲池設上下之剖判配法象乎二儀木貴其能軟石美其潤堅加采漆之膠固含冲德之清􅀇永嘉中記曰硯溪一源中多石硯劉澄之宋永􅀄山川古今記曰興平石穴深二百許大石青色堪爲硯􅁓釋名曰􅁓砥也平滑如砥石也服䖍通俗文曰方絮曰􅁓東觀漢記曰黄門蔡倫典作尚方作􅁓所謂蔡侯􅁓也董巴記曰東京有蔡侯􅁓即倫也用故麻名麻􅁓木皮名榖􅁓用故魚網作􅁓名網􅁓也王隱晉書曰魏太和六年博士河間張揖上古今字詰其巾部􅁓今也其字從巾古之素帛依舊長短隨事截絹枚數重沓即名幡􅁓字從系此形聲也後和帝元興中中常侍蔡倫以故布擣剉作􅁓故字從巾是其聲雖同系巾爲殊不得言古􅁓爲今􅁓崔鴻前燕録曰慕容儁三年廣義將軍岷山公黄􅁓上表儁曰吾名號未異於前何冝便尓自今但可白紙稱䟽沈約宋書曰張永善􅀠書又有巧思紙及墨皆自營造上毎得永表啓輙執玩咨嗟自嘆供御者不之及也唐書曰杜暹爲婺州叅軍秩滿將歸州吏以􅁓万餘張贈之暹唯受一百時人嘆曰昔清吏受一大錢復何異也語林曰王右軍爲㑹稽謝公乞牋紙庫中唯有九萬枚悉與之桓帝云逸少不節拾遺記曰張華獻博物志賜側理􅁓萬畨南越所獻也漢人言陟貍與側理相亂南人以海苔爲􅁓其理縱撗袤側因以爲名丗􅀃曰戴安道就范宣學所爲范宣讀書亦讀書范宣抄􅁓亦抄􅁓桓玄僞事曰古無􅁓故用簡非主於敬也今諸用簡者皆以黄紙代之又曰􅀇令平淮作青赤縹緑桃花􅁓使惣精令速作之石虎鄴中記曰石虎詔書以五色􅁓着鳯鶵口中范寗教曰土􅁓不可以作文書皆令用藤角􅁓盛弘之荆州記曰􅀥陽縣一百許歩蔡倫宅其中具存其傍有池即名蔡子池倫漢順帝時人始以魚網造􅁓縣人今猶多能作􅁓蓋倫之遺業也異苑曰張仲舒在廣陵晨夕輙見行側有赤氣後空中忽􅀨絳羅於其庭周廣七八分長五六寸皆箋􅁓繼之廣長亦與羅等紛紛甚快經􅀫仲舒暴疾死孫放西寺銘曰長沙西寺層搆傾頽謀欲建立其日有童子持紙花挿地故寺東西相去十餘丈於是建刹正當花處専咸􅁓賦日旣作契以代繩又造􅁓以當䇿劉孝威謝官􅁓啓曰雖復鄴殿鳯銜漢朝魚網平凖桃花中宫榖樹固以慙兹靡滑謝此鮮華東宫舊事曰皇太子􅀄拜給赤􅁓縹紅麻􅁓勑􅁓法各一百太平御覽卷第六百五
