  text: 太平御覽卷第一百一十一
  hash: sha256:04e718fce05d83918abfe9197fd1c6d483730c042932ba796f13c3ee7426acdd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_111-1a}
body:
  text: 皇王部三十六􅀇宗明皇帝安禄山附唐書曰􅀇宗明皇帝諱隆基睿宗第三子也母曰昭成順聖皇后竇氏垂拱元年秋八月戊寅生於東都性英斷多藝尤知音律善八分書儀範偉麗有非常之表三年閏七月丁夘封楚王天授二年十月戊戍出閤開府置官屬年始七歳朔望車􅀐至朝堂金吾將軍武懿宗忌上嚴整訶排儀仗因欲折之上叱之曰吾家朝堂干汝何事敢迫吾􅀐從則天聞而特加寵異尋却入閤長壽二年臘月丁夘改封臨淄郡王聖暦元年出閤賜第於東都積善坊乆視元年從幸西京賜宅於興慶坊長安中歴右衛郎將尚輦奉御神龍元年遷衛尉少卿景龍二年四月兼潞州別駕十二月州境有黄龍白日昇天甞出畋有紫雲在其上後從者望而得之前後符瑞凢一十九事四年中宗將祀南郊來朝京師將行使術士韓禮筮之􅆱一莖孑然獨立禮驚曰蓍立竒瑞非常也不可言屬中宗末年王室多故上常隂引材力之士以自助上所居宅外有水池浸溢頃餘望氣者以爲龍氣四月中宗幸其第因遊其池結綵爲樓舡令巨象踏之至六月中宗暴崩韋后臨朝稱制韋温宗楚客紀處訥等謀傾宗社以睿宗介弟之重先謀不利道士馮道力處士劉承祖皆善占兆詣上布誠欵上所居里名隆慶時人語訛云隆爲龍韋庻人稱制改元又爲唐隆皆符御名上益自􅀒乃與太平公主謀之公主喜以子崇簡從上乃與崇簡朝邑尉劉幽求長上折衝麻嗣宗押萬􅀐果毅􅁑福順李仙鳬寳昌寺僧普潤等定䇿誅之或曰先啓大王上曰我拯社稷之危赴君父之急事成福歸於宗社不成身死於忠孝安可先請憂怖大王乎􅀂請而從是王與危事請而不從則吾計失矣遂以庚子夜率幽求等數十人自苑南入㹅􅁥鍾紹京又率丁匠百餘人以從分遣萬􅀐往􅀇武門殺羽林將軍韋璿韋播髙嵩持首而至衆驩叫大集攻白獸􅀇德等門斬􅀜而進左萬􅀐自左入右萬􅀐自右入合於凌煙閣前時太極殿前有􅀫衛梓宫萬􅀐聞譟聲皆􅀍甲應之韋庻人惶惑走入飛􅀐營爲亂兵所害於是分遣誅韋氏之黨比明内外討捕皆斬之乃馳謁睿宗謝不先啓請之罪睿宗遽前抱上而泣曰宗社禍難由汝安定神祗萬姓頼汝之力也拜殿中􅁥同中書門下三品兼押左右萬􅀐進封平王睿宗即位與侍臣議立皇太子僉曰除天下之禍者享天下之福拯天下之危者受天下之安平王有聖德定天下又聞成器已下咸有推讓冝膺主鬯以副群心睿宗從之景午制立爲皇太子延和元年凶黨因術人間睿宗曰據􅀇象帝座及前星有灾皇太子合作天子不合更居東宫矣睿宗曰傳德避灾吾意決矣七月壬午下制曰皇太子某有大功於天地定阽危於社稷温文旣習聖敬克躋委之􅁥撫已移年歳時政益明庻工惟序服之知子庻不􅀒時暦數在躬冝陟元后可令即皇帝位有司擇日授􅁽朕方比迹洪古希風太皇神與化遊思與道合無爲無事豈不美歟王公百寮冝識朕意上惶懼遽馳見叩頭請所以傳位之旨睿宗曰吾因汝功業得宗社今帝座有眚思欲遜避唯盛德大勲始轉禍爲福易位於汝吾知免矣上始居武德殿視事三品已下除授及徒罪皆决之先天二年七月三日尚書左僕射竇懷貞侍中岑羲中書令蕭至忠崔湜雍州長史李晉左羽林大將軍常元揩知羽林將軍李慈等與太平公主同謀期以其月四日以羽林兵作亂上宻知之因以中旨告歧王範薛王業兵部尚書郭元振將軍王毛仲殿中􅁥姜皎中書侍郎王琚吏部侍郎崔日用等定計因毛仲取閑廐馬及家人三百餘人率太僕少卿李令問王守一内侍髙力士果毅李守德等親信十數人出武德殿入䖍化門梟常元揩李慈於北闕擒賈膺福李猷於内客省以出執蕭至忠岑羲於朝堂皆斬之睿宗明日下詔曰朕將髙居無爲自今軍國刑政一事巳上並取皇帝處分上御承天門樓下制大赦天下冬十一月甲申幸新豐之温湯癸夘講武於驪山兵部尚書代國公郭元振坐􅃜失軍容配流新州給事中攝太常少卿唐紹以軍禮有失斬於纛下甲辰畋獵于渭川同州刺史梁國公姚元崇爲兵部尚書同中書門下三品十一月戊子上加尊號爲開元神武皇帝十二月庚寅朔大赦天下改元爲開元四年六月癸亥太上皇崩九年四月甲戍上親䇿試應制舉人於含元殿謂曰古有三道今減二䇿近無甲科朕將存其上第務收賢俊十三年冬十月辛酉東封㤗山發自東都十一月丙戍至兖州岱宗頓丁亥致齋於行宫巳丑日南至備法駕登山仗衛羅列嶽下百餘里詔行從留於谷口上與宰臣禮官昇山庚寅祀昊天上帝於上壇有司祀五帝百神于下壇禮畢藏玉􅁽於封祀壇之石䃭然後燔柴燎發群臣稱萬歳傳呼自山頂至嶽下震動山谷上還齋宫慶雲見日抱戴辛夘祀皇地祇于社首藏玉􅁽於石䃭如封祀壇之禮壬辰御帳殿受朝賀大赦天下封太山神爲天齊王禮秩加三公一等環山十里禁其樵採賜酺七日甲午發岱嶽景申幸孔子宅親設奠祭十二月己巳至東都時累歳豐稔東都米㪷十錢青齊米㪷五錢是冬分吏部爲銓勑禮部尚書􅂫頲刑部尚書韋抗工部尚書盧從愿等分掌選事十四年五月癸夘户部進計帳今年管户七百六萬九千五百六十五管口四千一百四十一萬九千七百一十二二十二年五月􅀜中大風拔木同州尤甚是夏上自於苑中種麥率皇太子巳下躬自收穫謂太子等曰此將薦宗廟是以躬親亦欲令汝等知稼穡之難也因分賜侍臣謂曰此歳令人廵檢苗稼所對多不實故自種植以觀其成且春秋書麥禾豈非古人所重也二十五年春正月壬午制曰朕猥集休運多謝哲王然而哀矜之情小大必愼自臨寰宇子育蒸􅀺未甞行極刑起大獄上􅀇降鑒應以祥和思叶平􅀖之典致之仁壽之域自今有犯死刑除十惡罪冝令中書門下與法官詳所犯輕重具狀奏聞秋七月己夘大理少卿徐岵奏天下今歳斷死刑五十八幾致刑措二十七年八月甲申制追贈孔宣父爲文宣王顔回爲兖國公餘十哲皆爲侯夾坐後嗣襃聖侯改封爲文宣公二十九年正月制兩京諸州各置􅀇元皇帝廟并置崇􅀇學天寳元年春正月丁未朔大赦天下改元常赦不原咸赦除之百姓有欠􅀒租稅及諸色並免之前資官及白身人有儒學愽通文詞秀逸及軍謀武藝者所在具以名薦京文武官才堪爲刺史者各令封狀自舉改黄􅃏爲金􅃏内外官各賜勲兩轉甲寅陳王府參軍田同秀上言􅀇元皇帝降見于丹鳯門之通衢告錫靈符在尹喜之故宅上遣使就函谷故􅀜尹喜臺西發得之乃置􅀇元廟於大寜坊二月丁亥上加尊號爲開元天寳聖文神武皇帝辛夘親享􅀇元皇帝于新廟甲午親享太廟景申合祭天地于南郊制天下囚徒罪無輕重並釋放三載正月景辰朔改年爲載四載秋八月甲辰􅁽太眞妃楊氏爲貴妃七載三月乙酉大同殿柱産玉芝有神光照殿羣臣請加皇帝尊號曰開元天寳聖文神武應道許之夏五月壬午上御興慶宫受􅁽徽號大赦天下六月范陽節度使安禄山賜實封及鐵劵十一載十一月庚申御史大夫兼蜀郡長史楊國忠爲右相兼文部尚書十三載二月禄山奏前後討奚契丹立功將士跳盪等請超三資於是超授將軍者五百餘人中郎將者二千餘人十四載冬十月壬辰幸華清宫景寅范陽節度使安禄山率蕃漢之兵十餘萬自幽州南向指闕以誅楊國忠爲名先殺太原尹楊光􅔘於􅀶陵郡壬申聞於行在所癸酉以郭子儀爲靈武太守朔方節度使封常清自安西入奏至行在甲戍以常清爲范陽平盧節度使令募兵三萬以禦逆胡戊寅還京十二月景戍朔禄山於靈昌郡渡河辛夘䧟陳留郡殺張介然甲午䧟滎陽郡殺太守崔無詖景申封常清與賊戰于成皐甖子谷官軍敗績常清奔于陜郡丁酉禄山䧟東京殺留守李憕中丞盧弈判官蔣清時髙仙芝鎮陜郡棄城西保潼􅀜常山太守顔杲卿與長史􅀽履謙賈深等殺賊將李欽湊執賊將何千年髙邈送京師辛丑詔皇太子統兵東討十五年春正月乙夘御宣政殿受朝其日禄山僣號於東京六月庚寅哥舒翰將兵八萬與賊將崔乾祐戰于靈寳西原官軍大敗死者十六七甲午將謀幸蜀乃下詔親征仗下後士庻恐駭奔走于路乙未凌晨自延秋門出微雨霑濕扈從唯宰相楊國忠韋見素内侍髙力士太子親王妃主皇孫已下多從之不及平明渡便橋國忠欲斷橋上曰後來者何以能濟命緩之辰時至咸陽望賢驛置頓官吏駭散無復儲擬上憩於宫門之樹下亭午未進食俄有老父獻麨上謂之曰爾可進飰於是百姓獻食相繼俄又尚食持御膳至上頒給從官而後食是夕次金城縣官吏巳遁令魏方進男允招誘俄得智藏寺僧進蒭粟行從方給景辰次馬嵬驛諸衛頓軍不進龍武大將軍陳􅀇禮奏曰逆胡指闕以誅國忠爲名然中外羣情不無嫌怨今國歩艱阻乗輿震蕩陛下冝徇羣情爲社稷大計國忠之徒可致之於法㑹吐蕃使二十一人􅃒國忠告訴於驛門衆即呼曰楊國忠連蕃人謀逆兵士圍驛四合及誅楊國忠魏方進一族兵猶未解上令髙力士詰之廻奏曰諸將旣誅國忠以貴妃在宫人情恐懼上即命力士賜貴妃自盡􅀇禮等見上請罪命􅇚之丁酉將發馬嵬驛朝臣唯見韋素一人乃命素子京兆府司録諤爲御史中丞充置頓使議其所向軍士或言河隴或言靈武太原或言還京爲便韋諤曰還京湏有捍賊之備兵馬未集恐非萬全不如且幸扶風徐圖所向上詢于衆衆以爲然及行百姓􅃒路乞留皇太子願戮力破賊收復京城即日留太子戊戍次扶風縣巳亥次扶風郡軍士各懷去就咸出醜言陳􅀇禮不能制㑹益州貢春綵十萬疋上悉命置于庭召諸將諭之曰卿等國家功臣陳力乆矣朕之優􅅄常亦不輕逆胡背恩事湏廻避甚知卿等不得別父母妻子朕亦不及親辭九廟言發涕流又曰朕湏幸蜀路險狹人􅀂多往恐難供承今有此綵卿等即冝分取各圖去就朕自有子弟中官相隨便與卿等訣別衆咸俯伏涕泣曰死生願從陛下上曰去住任卿自是悖亂之言稍息庚子以司勲郎中劒南節度留後崔圎爲蜀郡長史劒南節度副大使以頴王璬爲劒南節度大使以􅁥察御史宋􅀂思爲御史中丞充置頓使韋諤充廵閣道使並令先發辛丑發扶風郡是夕次陳倉壬寅次散􅀜分部下爲六軍頴王璬先行壽王瑁等分統六軍前後左右相次景午次河池郡崔圎奏劒南歳稔民安儲供無闕上恱授圎中書侍郎同中書門下平章事蜀郡長史劒南節度如故以前華州刺史魏仲犀爲梁州長史秋七月壬戍次益昌縣渡􅁻栢江有􅀟魚夾舟而躍議者以爲龍甲子次普安郡憲部侍郎房琯自後至上與語甚恱即日拜爲吏部尚書同中書門下平章事丁夘詔以皇太子諱充天下兵馬元帥都統朔方河東河北平盧等節度兵馬收復兩京庚午次巴西郡庚辰車駕至蜀郡扈從官吏軍士到者一千三百人宫女二十四人而巳八月癸未朔御蜀郡府衙宣詔大赦天下癸已靈武使至始知皇太子即位丁酉上用靈武􅁽稱上皇詔稱誥巳亥上皇臨軒降􅁽􅁽肅宗命宰臣韋見素房琯使靈武􅁽命曰朕稱太上皇軍國大事先取皇帝處分後奏朕知俟克復兩京朕當怡神姑射偃息大庭明年九月郭子儀收復西京十月肅宗遣中使啖廷瑶入蜀奉迎丁夘上皇發蜀郡十一月景申次鳯翔郡肅宗遣精􅀐三千至扶風迎衛十二月景午肅宗具法駕至咸陽望賢驛迎奉上皇御宫之南樓肅宗拜慶樓下嗚咽流涕不自勝爲上皇徒歩控轡上皇撫背止之即􅀐馬前導丁未至京師文武百寮京城士庻夾道歡呼靡不流涕即日御大明宫之含元殿見百寮上皇親自撫問人人感咽上皇謁廟請罪遂幸興慶宫三載二月肅宗與群臣奉上皇尊號曰太上至道聖皇帝乾元三年七月丁未移幸西内之甘露殿時閹官李輔國離間肅宗故移居西内髙力士陳􅀇禮等遷謫上皇䆮不懌上元二年四月甲寅崩于神龍殿時年七十八謚曰至道大聖大明孝皇帝廟號􅀇宗􅀄上皇親拜五陵至橋陵見金栗山崗有龍盤鳯翥之勢復近先塋謂侍臣曰吾千秋後冝葬此地得奉先陵不志孝敬矣至是追奉先旨以創􅃦園廣德元年三月辛酉葬㤗陵安禄山附唐書安禄山營州栁城雜種胡人也本無姓氏名軋􅕸山母阿史德氏亦突厥巫師以卜爲業開元􅀄與將軍安道買男俱逃出突厥中安道買次男貞節爲嵐州别駕收獲之年十餘歳矣冒姓爲安及長解六蕃語二十年張守珪爲幽州節度禄山盗羊事覺守珪剥坐欲捧殺之大呼曰大夫不欲㓕兩蕃耶何爲打殺禄山守珪見其肥白壯其言而釋之令與郷人史思明同捉生行必尅獲拔爲偏將以驍勇聞遂養爲子二十八年爲平盧兵馬使性巧宻人多譽之授營州都督平盧軍使厚賂往來者乞爲好言􅀇宗益信嚮之天寳元年以平盧爲節度以禄山攝中丞爲使入朝奏事􅀇宗益寵之三載代裴寛爲范陽節度河北採訪平盧軍等使如故採訪使張利貞甞受其賂及李林甫並言其美􅀇宗意益堅後請爲貴妃養兒入對皆先拜太眞􅀇宗恠問之對曰臣是蕃人先母而後父􅀇宗大恱遂命楊銛巳下並約爲兄弟姊妹晚年益肥壯垂手過􅂰重三百三十斤每行以肩􅈩左右擡挽其身方能移歩至􅀇宗前作胡旋舞疾如風焉爲置第宇窮極壯麗上御勤政樓於御坐東爲設一大金雞障前置一榻坐之十載入朝又求爲河東節度因拜之長子慶宗大僕卿少子慶緒鴻臚卿慶宗又尚郡主禄山隂有逆謀於范陽北築雄武城外示禦㓂内貯兵器積榖爲保守之計戰馬萬五千疋牛羊稱是秉三節度進奏無不尤每月進奉生口駞馬鷹犬不絶人無􅂓生矣禄山旣肥大不任戰十一載八月禄山併率河東等軍十五萬以討契丹去平盧千餘里至土護真河即北黄河也倍程奄至契丹牙帳属乆雨弓箭皆漲濕將士困極奚又夾攻之殺傷畧盡禄山􅀍射以麾下奚小兒二十餘人走上山墜坑中其男慶緒等扶之㑹夜解走投平盧城楊國忠屢奏禄山必反􅀇宗使中官輔璆琳覘之得其賄賂盛言其忠十三載正月謁於華清宫因涕泣言臣蕃人不識字陛下擢臣不次􅀍楊國忠欲得殺臣􅀇宗益親厚之遂以爲左僕射却廻又請爲閑廐隴右群牧等都使又請知揔􅁥事旣爲閑廐羣牧等使上䈥脚馬皆隂選擇之三月歸范陽疾行出􅀜日三四百里至范陽人言反者􅀇宗必大怒􅅞送與之十四載十一月反於范陽矯稱奉恩命以兵討逆賊楊國忠以諸蕃馬歩十五萬以髙尚嚴莊爲謀主孫孝哲髙邈何千年爲腹心天下承平日乆人不知戰聞其兵起朝廷震驚禁衛皆市井啇販之人乃以髙仙芝封常清等擊之禄山又嚴肅得士死力無不一當百遇之必敗十二月渡河遂入陳留郡太守郭納出降至滎陽太守崔無詖拒戰城䧟死之次于汜水甖子谷乃取谷南而過東京留守李憕中丞盧弈使採訪判官蔣清燒絶河陽橋禄山入東京殺李憕盧弈蔣清召河南尹逹奚珣使之蒞事十五年正月賊竊號燕國年號聖武逹奚珣已下署爲將相五月南陽節度魯炅率荆襄黔中嶺南子弟十萬與賊將武令珣戰于葉縣城北滍河王師盡没六月李光弼郭子儀出土門路大破賊衆於常山郡東嘉山河北諸郡歸順者十餘禄山窘急圖欲却投范陽㑹哥舒翰自潼􅀜領馬歩八萬與賊將崔乾祐戰于靈寳西爲賊覆敗翰西奔潼􅀜爲其帳下執送于賊􅀜門不守􅀇宗幸蜀十一月遣阿史那承慶攻䧟頴川屠之禄山以體肥及造逆後而眼漸暗至是不見物又着疽疾至德二年正月朔受朝瘡甚而中罷尤躁急動用斧􅃏嚴莊亦􅀍捶撻莊謀立慶緒領竪李猪兒同入禄山帳中猪兒以大刀斫其腹禄山眼無所見捫床頭刀不得但撼幄帳中大呼曰是我家賊膓巳數㪷流在床上言訖氣絶莊即宣言於外言禄山傳位於晉王慶緒縱樂飲酒無度呼莊爲兄事之小大必咨之慶緒爲僞主素懦精神言詞無序二月肅宗南幸鳯翔郡始知禄山死使僕固懷恩使于廻紇結婚請兵討逆九月廣平王領蕃漢之衆收西京走安守忠賊之死者積如山阜王師乗勝至陜郡賊懼令嚴莊傾其驍勇而來拒廣平王遣副元帥郭子儀等與賊戰于陜西曲沃大破之斬首十餘萬嚴莊奔至東京告慶緒慶緒率其餘衆奔河北保鄴郡嚴莊至河内南來歸順賊將阿史那承慶等麾下三萬餘衆悉奔􅁪趙范陽從慶緒者唯疲卒一千􅀐三百而巳乾元元年九月肅宗遣郭子儀等九節度率歩􅀐二十萬以攻之子儀使善射者三千人伏於壘垣内明日接戰子儀麾其屬僞奔慶緒逐之伏者齊發賊軍大潰使薛髙求救於史思明言禪讓之禮思明先遣李歸仁以歩􅀐一萬馬軍三千先往􅇭陽以應之及至􅇭陽子儀之圍巳固築城穿壕各三重引水以灌城下思明南攻魏州節度使崔光逺南走思明據其城乾元二年正月思明僞稱燕王慶緒自十月􅀍圍至二月城中人相食思明引衆來救三月子儀等戰敗遂解圍而南斷河陽橋以守榖水思明領其衆營於鄴縣南慶緒使收子儀等營中粮尚六七萬石張通儒髙尚平列謂慶緒曰史王逺來臣等皆合迎謝對曰任公蹔往見思明思明與之涕泗厚其禮復令歸城經三日慶緒以三百􅀐詣思明思明引入令三軍擐甲執兵待之及諸弟領至于庭再拜稽首曰臣不克􅀒荷弃失兩都乆䧟重圍不意大王以太上皇之故將兵逺救思明曰弃失兩都用兵不利亦何事也爾爲人子殺汝父以求位庸非大逆乎吾爲太上皇討賊即牽出并其四弟及髙尚孫孝哲崔乾祐皆縊殺之禄山父子僣逆三年而滅太平御覽卷第一百一十一
