body:
  text: 兵部六十五輜重戎車戰艦亭障輜重釋名曰輜厠也謂軍糧什物雜厠載之以其累重故稱輜重後漢書注曰輜車名也孫子曰使敵不得至者險害之地功其所必救能守其險害之要路敵不得自致故王子曰一犬當穴萬䑕不敢出一虎當溪萬鹿不敢過言守之上也故飽能飢之絶其粮也委軍而争利則輜重􅂢委置庫藏輕師而行􅀂敵乗虚而來抄絶其後則巳輜重皆悉􅂢弃是以軍無輜重則亡無粮食則亡無委積則亡此三者亡之道也委積芻草之處史記曰漢王遣將韓信以兵數萬欲東下井陘擊趙趙王陳餘聚兵井陘口號稱二十萬李左車説陳餘曰韓信渉西河虜魏王擒夏説欲以下趙此乗勝而去國逺􅋐其鋒不可當臣聞千里餽粮士有飢色樵􅂫後㸑樵取薪也蘇草也師不􅀫飽今井陘之道車不得方䡄􅀐不得成列行數百里其勢粮食必在其後願足下假臣竒兵三萬人從間路絶其輜重足下􅀷溝髙壘堅營勿與戰使前不得􅋐退不得還吾竒兵絶其後使野無所掠不至十日而韓信之頭可致於戯音麾下不然必爲所擒矣陳餘儒者常稱義兵不用詐謀竒計曰吾聞兵法十則圍之倍則戰今韓信兵號數萬千里而襲我亦巳罷極今如避不擊後有大者何以加之則諸侯謂吾怯而輕來伐我不聽韓信使人間視知不用大喜乃敢引兵遂進竟破趙軍後漢書曰董訴許邯與更始諸將各擁兵據南陽諸城帝遣呉漢伐之漢軍所過多侵􅁀時破虜將軍鄧奉謁歸東野怒呉漢掠其郷里遂返擊破漢軍獲其輜重屯據淯陽與諸將合從又曰鄧禹自箕關將入河東箕關在今王屋縣東河東都尉守關不開禹攻十日破之獲輜重千餘乗又曰耿弇追張歩平壽乃􅁏􅃝􅀒斧鑕於軍門鑕鍖也示必死鍖所林切弇􅀓歩詣行在所而勒兵入據其城樹十二郡旗鼔東觀記曰弇凢平城陽瑯瑘髙宻膠東東萊北海齊千乘濟南平源泰山臨淄等令部兵各以郡人詣旗下衆向十餘萬輜重七千餘兩皆罷遣歸郷里晉書曰劉毅追桓玄於峥嶸州毅乘風縱火盡銳争先玄衆大潰燒輜重夜走崔鴻十六國春秋曰前􅁗符堅遣將王猛伐前燕慕容暐師次潞川燕將慕容評率兵十萬禦之以待乆制之猛乃遣其將郭度率􅀐五千夜從間遂起火於髙山因燒評輜重火見鄴中評性貪鄙障固山泉賣樵鬻水積錢絹如丘陵三軍莫有􅋐志因而大敗唐書曰髙宗遣將薛仁貴郭待封伐􅄍蕃仁貴留三萬人作兩柵輜重並留柵内倍道掩之待封不從仁貴之䇿領輜重継進未至烏海􅄍蕃二十餘萬悉衆救其前軍迎擊待封敗之待封趍山軍粮及輜重並爲賊所掠仁貴遂退軍戎車書曰武王戎車三百兩車一乘歩卒七十二人虎賁三百人與紂戰于牧野詩曰戎車旣駕四壯業業又曰元戎十乗以先啓行禮記曰兵車不式武軍綏旌前有水則載青旌前有塵埃則載嗚鳶前有車􅀐則載飛鴻前有士師則載虎皮前有摰獸則載􅆛貅行前朱鳥而後玄武左青龍而右白虎招揺在上急繕音勁其怒進退有度左右有局各司其局左傳曰晉車七百乗韅靷鞅絆遂伐其木以益其兵也又曰叔向曰寡君有甲車四千乗在行之必可畏也牛雖􅇤僨於豚上其畏不死乎又曰楚子㑹諸侯伐隨軍於漢淮之間少師謂隨侯曰楚人上左君必左君楚君也無與王遇且攻其右右無良焉弗從戰于速􅂎隋師敗績􅋐丹獲其戎車􅂖梁曰趙盾長轂五百綿地千里古司馬兵法曰戎車夏曰鈎車先正也鈎設淮望逺近計車量地以立壘正者什伍之例也殷曰寅車先疾也寅敬也前有旌旗幟所以知變化示應而不失周曰元戎先良也前立代􅁖立善之旗所以知善罪之所在先齊良善而後代之文選曰輕車霆激驍􅀐雷驚戰艦墨子曰公輸般自魯之楚爲舟戰之具謂之鈎拒退則鈎之進則拒之也後漢書曰公孫述遣其將任滿田戎程汎將數萬人乗枋箄下江關榜箄以木竹爲之浮於江水上爾雅曰舫附也郭景純曰水中箄筏也華陽國志曰巴楚相攻故置江開舊在京赤甲城後移在江南岸對白帝城故基在今夔州魚復縣南枋即舫字古用通箄音歩隹切附音疋沮切擊破馮駿及田鴻季玄等遂抜夷道夷陵據荆門虎牙撗江水起浮橋闘樓立攅柱絶水道結營山上以拒漢兵彭攻之不利於是裝直進樓舡冐突露撓數千艘並舡名樓舡之上施樓撓檝也爾雅曰檝謂之橈又謂露橈在外人在舡中冐突取其觸冐而唐突也晉書曰周訪與諸軍共征杜弢弢作結臯打官軍舡艦訪作長岐棖以拒之結臯不爲害又曰劉􅁉北征廣固嶺南賊將徐道覆謂其帥盧循曰令日之機萬不可失旣尅都邑劉􅁉雖還無能爲也循從之􅀄道覆密欲裝舟艫乃使人伐舡材於南康山僞云􅀅下都貨之稱力少不能得致即賤賣之價减數倍居人貪賤賣衣物而市之贛石水急贛古暗切出舡甚難皆儲之如是者數四故板大積而百姓弗之疑及道覆舉兵案賈劵而取無得隠匿者乃并裝之旬日而辨遂舉衆㓂南康廬陵豫章郡諸守相皆委任奔走梁書曰陸納反叛造大艦一名曰三王艦者邵陵王河東王桂陽嗣王三人並爲元帝所害故立其像於艦􅀕以太牢加其節盖羽儀鼓吹毎戰輙􅀕之以求福又曰王琳大營樓艦將啚義舉琳將張平宅乗一艦毎將戰勝艦則有聲如野猪故琳戰艦以千數以野猪爲名南史曰梁徐丗譜從陸法和與景戰於赤亭湖景軍甚盛丗譜乃別造樓舡拍艦火舫水軍以益軍勢將戰又乗大艦居前大敗景軍禽景將任約景退走因隨王僧辨攻郢州丗譜復乗大艦臨其倉間賊將宋子仙據城降以功徐信州刺史封魚復縣侯周書􅁃信傳曰信常有郷􅀜之思作哀江南賦以致其意云麾兵金匱校戰王堂蒼鷹赤雀䥫軸牙檣隋書曰楊素數進取陳之計未幾拜信州惣管賜錢百萬錦千叚馬二百疋而遣之素居永安造大艦名曰五牙上起樓五層髙百餘尺左右前後置六柏竿並髙五十尺容戰士八百人旗幟加於上次曰黄龍置兵百人自餘平乗舴艦等各有差唐書曰曹王臯性多巧思常爲戰艦挾以二輪令蹈之愬風皷浪其疾如掛㠶席凢造物必省昜而爲乆不可販性纎悉毎遺人粮肉必令自持衡秤量以致之官署布帛令縱書其幅而印之絶吏之􅀻易三國典略曰梁陸法和多聚兵艦欲襲襄陽㓂武關梁王使止之法和謂使者曰法和是求道之人常不希釋􅆊天王坐處豈規人主之位但於空王佛所與主上香火因縁見主上應有報至故救援耳今旣􅀍疑是業不可改也又曰梁陸納叛湘州時造二艦衣以牛皮髙十五丈一曰青龍一曰白虎選其驍勇者乗之以戰魏武軍令舡戰令曰雷皷一通吏士皆嚴再通士伍皆就舡整持櫓棹戰士各持兵器就舡各當其所幡皷各隨將所載舡皷三通大小戰舡以次發左不得至右右不得至左前後不得易處違令者斬通典曰水戰舡闊狹長短隨用大小勝人多少皆以米爲卒一人重米二石其擑掉篙櫓㠶席絙素沉石調度與常舡不殊又曰樓舡舡上建樓三重列女牆戰格樹幡幟開弩牎矛穴置抛軍壘石鐵汁􅃺如城壘忽遇􅁀風人力不能制此亦非便於事然爲水軍不可不設以成形勢又曰蒙衝以生牛皮蒙舡覆背兩廂開掣棹孔前後左右有弩牎予穴敵不得近矢石不能敗此不用大舡務於速進乗人之不及非戰之舡也又曰􅋐艦舡上設女牆可髙尺牆下開製掉孔舷内五尺又建柵與女牆齊棚上又建女牆重列戰敵上無覆背前後左右樹牙旗幡幟金皷此戰舡也又田走舸舷上立女牆棹夫多戰卒少皆選勇力精銳者徃返如飛鷗乗人之不及金皷旗幟列之於上此戰舡也又曰遊艇無女牆舷上置槳牀槳音槳左右隨大小長短四尺一牀計牀計㑹進止逥軍轉陣其疾如風虞候居之非戰舡也又曰海鶻頭低尾髙前大後小如鶻之狀舷下左右置浮版形如鶻翅翼以助其舡雖風濤漲天免有傾側覆背上左右張生牛皮爲城牙旗金皷如常法江海之中戰舡也􅀓玄正都賦曰飛雲鷁首龍舟餘皇艨艟水城蜀艇呉航萬艘俱興雲㠶齊張懸斾光天征鐸琳琅凌波泝流星列鴈行呉都賦曰戎車􅄹於石城戈舡掩於江湖亭障後漢書曰馬成伐驃􅀐大將軍杜茂繕治障塞自西河至渭橋西河今勝州冨昌縣也謂橋本名横橋在今咸陽縣東南河上至安邑前漢書曰河上地名故􅁗内史帝二年改爲河上郡武帝分爲左馮翊太原至井陘太原今并州也井陘今属常山郡常山今􅁪州也中山至鄴皆築保壁起十里一候在事五六年帝以成勤徴還京師又曰盧芳與匈奴烏桓連兵㓂盗尤數縁邊愁苦詔王霸將㢮刑徒六千餘人與茂治飛狐道飛狐道在今蔚州飛狐縣北通嬀州懷戎縣即古之飛狐口也推石布土築起亭障自代至平城三百餘里晉書曰梁武昭王暠脩燉煌舊塞東西二國以防北虜之患築燉煌舊塞西南二國以威南虜唐書曰竇静檢校并州大惣管以突厥頻來入㓂請断石嶺以爲障塞詔從之又曰馬燧奏隴州刺史兼御史中丞州西有通道二百餘歩上連峻山與吐蕃相直虜毎入㓂皆出於此燧乃按險易立石種樹以塞之下置二門上設譙櫓八日而功畢㑹抱玉入覲燧與俱來留京師乆之代宗知其能召見拜啇州刺史又曰李朝晟爲邠州刺史奏方渠合道水波皆賊路也請城其地以備之詔問須兵幾何朝晟奏臣部下兵自可集事不煩外助復問前築塩州凢興師七萬今何其易也朝晟曰塩州之役咸集諸蕃戎盡知之今臣境近虜􅀂大興兵即蕃戎入㓂㓂則戰戰則無暇城矣今請宻發軍士不十日至塞下未三旬而功畢蕃人始知巳無可柰何上從之巳事軍還至馬嶺吐蕃始乗障數日而退又曰貞元九年二月將城塩州詔曰設險守國易象垂文有備無患先王令典況脩復舊制安固封疆按甲息人必在於此塩州地當衝要逺介朔陲東逹銀夏西援靈武宻迩延慶保捍王畿乃者城池失守制備無據千里亭障烽燧不接三隅要害役戍其勤􅀂非興集師徒繕脩壁壘設攻守之具務耕戰之方則封内多虞諸華屢驚由中及外皆靡寕居􅀷帷永圗豈忘終食顧以薄徳至化未孚旣不能復前古之封致四夷之守與其臨事而重擾豈􅀂先備而安是用弘逺之謀脩五原之壘使邊城有守中夏克寕不有蹔勞敦能永逸冝令左右神䇿軍及朔方河中絳邠寕慶兵馬副元帥渾瑊朔方靈塩豊綏銀節度都統杜希全邠寕節度使張献甫左神䇿行營節度使邢君牙夏綏銀節度使韓潭鄜坊丹延節度使王拪曜振武麟勝節度使范希朝各於所部簡擇馬歩􅀅士合三萬五千人同赴塩州左神䇿將軍張昌冝充右神䇿將軍塩州行營節度使權知塩州刺史杜彦光充塩州刺史應所板築及縁脩城雜役等冝共取六人千充其餘將士皆列布營陣戒嚴設備明加斥候以警不虞其脩城板築功役將士各賜絹布有差其塩州防秋將士三年滿與代更加給賜仍委杜彦光具名聞奏悉與改轉其防遏將士等畢事便合放歸仍賜布帛有􅆧其諸軍吏士都賜帛七千疋朕情非爲巳悉在靖人咨尓將相之臣忠良之士輸誠奉國陳力忘勞勉茂功勲永安疆􅂣必集兵事實惟衆心各相率勵以副朕意􅀄貞元三年塩州爲吐蕃所䧟毀其城而去自是塞外無保障靈武勢隔西逼鄜坊其爲邊患故命城之二旬而畢又詔兼御史大夫叱干遂統兵五千與兼御史中丞史履澄杜彦光之衆戍之是役也上念將士之勞厚令度支供給又詔涇原劒南山南諸軍􅀷討吐蕃以分其力由是板築之際虜無犯塞者及畢中外咸稱賀焉又曰范希朝爲振武節度使振武有党項室韋交居川阜凌犯爲盗日入慝作謂之刮城門居人怪駭鮮有寕日希朝周知要害置堡柵斥候嚴宻人遂􅀗安異藩雖䑕竊狗盗必殺無赦戎虜甚憚之又曰元和中城臨涇從涇原節度使叚祐之請也臨涇城直涇州西北九十里實險要之鎮從前因循不脩常爲犬戎所保其界有青石嶺嶺多美􅁟軍人耕􅀗屢爲藩㓂掠奪祐請脩築議者是非相半祐决城之功畢時方以爲大利三國典略曰齊司從斛律光築吞周平隴定誇三城於境上太平御覽卷第三百三十四
