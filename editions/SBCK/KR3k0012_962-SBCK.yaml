front:
  text: 太平御覽卷第九百六十二
  hash: sha256:f1cb0ea864069b0367e5b1f0d1fb5002a0fa65aa5a383a05571c5752d8552ac0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_962-1a}
body:
  text: 竹部一竹上易曰震爲蒼琅竹尚書禹貢曰荆州厥貢惟箘簵楛箘簵羙竹又禹貢楊州曰篠簜旣敷篠竹箭簜大竹禹治水敷布也厥貢瑶琨篠簜毛詩斯干曰如竹苞矣如松茂矣又竹竿曰竹竿衛女思歸也適異國而不見荅思而能以禮者也籊籊竹竿以釣于淇韓詩外傳曰黄帝時鳯皇栖帝梧桐食帝竹實周禮春官曰􅀌竹之管孫竹之管隂竹之管鄭玄注曰􅀌竹竹特生孫竹杖根之未生者隂竹生山北者禮記月令曰仲冬日長至則伐木取竹箭左傳文下曰賊殺齊懿公於申池納諸竹中又襄三曰晉伐齊劉難士弱率諸侯之師焚申池之竹木二子晉大夫也又曰東南之羙者有㑹稽之竹箭焉會稽山名今在山隂縣竹箭篠也孝經河圖曰少室之山大竹堪爲釡甑此竹亦㸑器也安思縣多苦竹竹之醜有四有青苦有白苦有紫苦有黄苦汲冢周書王㑹曰成王時路人獻大竹史記曰智伯率韓魏攻趙襄子襄子奔晉陽原過後至見三人自帶以上可見自帶以下不可見與原過竹三節莫通曰我以是遺趙无卹襄子自割竹有朱書又貨殖傳曰渭川千畒竹其人與千戸侯等漢書曰髙祖爲亭長乃以竹皮爲冠應劭注曰以竹始生皮作冠今鵲尾冠也又曰上使發卒數萬人塞瓠子河下淇園之竹以爲楗又曰竹大者一節受一斛小者數斗以爲柙音匣榼又曰梁孝王脩兎園多植竹又地理志曰􅁗地有鄠杜竹林南山檀柘号陸海後漢書曰郭伋爲并州刺史出行郡童子乗竹馬相待又曰冦恂爲河内太守移書屬縣講兵肆射伐淇園之竹爲矢百餘萬前書音義曰淇園衛之苑多竹篠也養馬二千疋収租四百萬斛轉以給軍晉書曰杜預討吴州郡多望風歸命衆軍㑹議或曰百年之冦未可盡剋今向暑水潦方降疾疫將起候來冬更爲大舉預曰昔樂毅籍濟西一戰以併強齊今兵威巳振譬如破竹數節之後皆迎刃而解無復著手豦也又曰武帝平呉之後復納孫皓宫人數千自此掖庭殆將萬餘人而並寵者甚衆帝莫知所適乗羊車恣其所之至便宴寢宫人乃取竹葉挿户以塩汁灑地而引帝車又曰王徽之常居空宅中便令種竹聞其聲徽之嘯詠指竹曰不可一日無此君謝靈運􅀳書曰元康二年巴西界竹花紫色結實如麥晉書載記曰長安謡曰鳯皇鳯皇止阿房符堅以鳯皇非梧桐不棲非竹實不食乃植桐竹數十萬株于阿房宫城以待之慕容冲小字鳯皇至是終爲堅賊入止阿城焉宋書曰卜天興弟天生少爲隊將十人同火屋後有一坑廣二丈餘十人共跳之皆度唯天生墜天生乃取實中苦竹削其端使利交横布坑内更呼等􅀋共跳並懼不敢天生乃復跳之徃反十餘曽無留礙衆並歎服齊書曰南海王子罕字雲華武帝第十一子也頗有學問母尚容華有寵故武帝留心母常寢疾子罕晝夜祈禱于時以竹爲燈纉照夜北纉􅀫昔枝葉大茂母病亦愈咸以爲孝感所致又曰徐伯珎少􅀌貧學書無􅁓常以竹華箭箬音􅀂甘庻及地上學書南史隱逸傳曰沈麟士字雲禎居貧織簾誦書郷里号爲織簾先生甞爲人作竹誤傷手便流淚而還同作者謂曰此不足損何至涕零荅曰此本不痛但遺體毀傷感而悲耳梁書曰武帝臨雍州命吕僧珎爲中兵叅軍委以心膂僧珎隂養死士歸之者甚衆武帝頗招武猛士庻饗從㑹者萬餘人因命按行城西空地將起數千間屋爲止舎多伐林竹沉於檀溪積茅蓋􅀂山阜皆未之用僧珎獨悟其㫖因私具櫓數百張及兵起悉取檀溪林竹裝爲舡艦葺之以茅並立辦衆軍將發患諸將須櫓甚多僧珎乃出先所具毎舡付二張爭者乃息隋書曰明克讓字弘道平原鬲人也父山賔梁侍中克讓少好儒善談論愽渉書史所覽將萬卷三禮禮論尤所研精􅀛筴曆象咸得其妙年十四釋􅄄湘東王法曹叅軍時舎人朱异在儀賢堂講老子克讓預焉堂邊有脩竹异令克讓詠之克讓􅄃筆􅂺成其卒章曰非君多愛賞誰貴此貞心异甚竒之唐書曰南詔理無刑名桎梏之其罪以竹五夲束之伏犯者撻其背又曰開成四年襄陽三縣山竹結實成米百姓採食莊子曰鵷鶵非練實而不食練實竹實也􅂑其㓗白淮南子曰太清之治也鳯麟降􅆱􅀛兆甘露下竹實盈竹實鳯皇食又曰瓦以火成不可以得火竹以水生不可以得水瓦得火則破竹得水浸則死也又曰槁竹有火弗鑚不㸐音然土中有水弗掘無泉掘猶窮也梅子曰弘農冝陽縣金門山竹爲律管河内葭莩以爲􅁅可以候氣取􅁅實管端置之􅀷宫覆以緹幕勿令見風日節至則􅁅飛管通矣唐子曰希見食笋歸煑竹根家語曰子路見孔子孔子曰君子不可學子路曰南山有竹不揉自直斬而爲用射逹於犀革以此言之何學之爲孔子曰括而羽之鏃而礪之其入不益􅀷乎吕氏春秋曰昔黄帝命伶倫作爲律伶倫自大厦之西西方山名乃之沅渝之隂山名取竹谿之谷以生空竅厚釣者斷兩節間竹生谿谷者取其釣厚以爲律谿或作嶰其長三寸九分而吹之山海經曰長石之山西有共谷其中多竹衛丘山南帝俊郭璞曰俊舜字假借音竹林在焉大可爲舟言舜林中竹一節則可以爲舡又曰竹生花其年便枯竹六十年一易根易根必經結實而枯死實落土復生六年還成丁田穆天子傳曰天子西征至于玄池天子休于玄池之上乃奏廣樂三日而終是曰樂池乃樹之竹是曰竹林吴越春秋曰越王問范蠡用兵對曰越有處女願君王問之處女北見於王道逢老人自稱􅀽公跪披林杪竹末折墮地處女即捷其末公操其本而刺處女處女舉杖擊之飛上樹變爲白猿具猿部三輔舊事曰武帝作延陵及廟竇將軍有青竹田在廟南恐犯蹈之言作陵不便丗􅀃曰魏武征􅀽本􅀄治餘有數十斛竹片咸長數寸衆並謂不堪用正合燒除太祖意甚惜思所以用之謂可爲竹甲而未顯其言馳使以問楊主簿德祖德祖意懸同風俗通曰殺青按殺青作簡書之新竹有汁後加於火上故作簡者於火上炙乾之水經曰東陽定縣夾岸縁溪悉生支竹及芳枳木連􅄂以霜菊金橙􅀃文曰竹冬生草也華陽國志曰有竹王者興於遯水有一女浣於水濵有三節大竹流入女足間推之不去聞有兒聲持歸破竹得男長飬有武才遂雄夷狄氏竹爲姓所破竹於野成林今王祠竹林是也又曰何隨家養竹園人盗其竹何隨遇行見恐盗者覺怖走竹傷其足挈履徐歩而歸文士傳曰蔡邕經㑹稽髙遷亭見屋椽竹從東間數第十六可以爲籥取用果有異聲神仙傳曰離婁公服竹汁餌桂得仙又曰壷公欲與費長房俱去長房畏家人覺公乃書一青竹戒曰卿以此竹歸家便稱病以此置卿卧處黙便來還長房如言家人見此竹云是屍哭泣行䘮荆楚歳時記曰夏至節日食糉周豦謂爲角􅁰人並以新竹爲筒糉練葉揷五絲繫臂謂爲長命縷王子年拾遺記曰蓬山有浮筠之簳葉青莖紫子如大珠有青鸞集其上下有砂礰細如粉􅁀風至竹條飜起拂細砂如雪霰仙者來觀戯焉風吹竹折聲如鍾磬之音南越志曰羅浮山生竹皆七八圍節長一二尺謂之鍾龍湘州記曰邵陵髙平縣有文竹山上有石牀四面緑竹扶踈常隨風委拂此牀永嘉記曰陽嶼仙山有平石方十餘丈名仙壇有一䈥竹垂壇旁風來輙掃拂壇上東陽記曰崑山去蕪城山十里峯嶺髙峻故老傳云嶺上有圎池魚鼈具有池邊有竹極大風至垂屈掃地􅁪㓗如人掃之丹陽記曰江寜縣南二十里慈姥山積石臨江生筲管竹王子淵洞蕭賦所稱即此也其竹圎緻音稚異於他處自伶倫採竹嶰谷其後唯此簳見珎故歴代常給樂府而俗呼曰皷吹山風􅁟記曰陽羡縣有􅀽君冢壇邊有數枚大竹髙二三丈枝皆兩兩枝下垂如有塵穢則掃拂壇上􅁪浄㓗􅀽山松冝都山川記曰佷山縣方山上有靈祠祠中有特生一竹擅美髙危其妙下垂忽有塵穢起風動竹拂蕩如掃荆州記曰臨賀謝休縣東山有小竹生其旁皆四五寸圍下有盤石俓四五丈極髙方正青滑如彈碁􅈰兩竹屈垂掃其上􅀄無塵穢未至數十里聞風吹此竹如簘管之音武昌記曰陽新縣有朔山山有兩大竹長十餘丈圍數尺有聲如風雨爲官長凶候縣人占之有驗雲南記曰雲南有實心竹文采班駮殊好可爲器物其土以爲槍簳交床述征記曰仙陽縣城東北二十里有中散大夫嵆康宅今悉爲田墟而父老猶種竹木崔豹古今注曰牛亨問曰籍者何也荅曰籍者尺二竹牒記人之年名字物色懸之宫門按省相應乃得入也劉敬叔異苑曰吴郡桐廬人甞伐竹見一竹竿雉頭虵身猶未變此亦竹爲虵虵爲雉也任昉述異記曰湘水去岸三十許里有相思宫望帝䑓舜南廵不返殁葬於蒼梧之野堯之二女娥皇女英追之不及相思慟哭淚下沾竹文悉爲之班班然又曰衛有淇園出竹在淇水之上詩云瞻彼淇澳緑竹猗猗又曰南中生子母竹今慈竹是也漢章帝三年子母竹笋生白虎殿前謂之孝竹羣臣作孝竹頌又曰東海畔􅀌竹生焉斬而復生中爲管周武王時􅀌竹人獻笋一株楊泉物理論曰冝陽金門竹爲律管河内葭爲􅁅可謂同氣冝陽洛州西北故縣名夲草曰竹花一名華草夢書曰竹爲處士田居夢見竹者憂處士也楚詞七諌曰便姢之竹􅀉生江潭上葳㽔而防露下泠泠而來風江逌竹賦曰含虚中以象道體圎質以儀天古詩曰種竹􅀷井中三年乃成竿太平御覽卷第九百六十二
