body:
  text: 羽族部四鴈五色鴈白鴈雉白雉射雉鴈禮記曰孟春之月鴻鴈來季秋之月鴻鴈來賔季冬之月鴈北郷儀禮婚禮曰下逹納采用鴈又士相見曰大夫相見以鴈飾以布維之以索如執雉鴈知時飛翔有別也飾之以布謂裁縫之其身也維謂繫聮其足又聘禮曰私覿岀如舒鴈威儀自然而有行列舒鴈鵝左傳曰鄭徐吾犯之妺美公孫楚聘之矣公孫黒又使強委禽焉禽鴈也納采用鴈毛詩曰雍雍鳴鴈旭日始旦尚書舜典曰修五禮五玉三帛二牲一死贄孔傳曰大夫執鴈爾雅曰鳬鴈醜其足蹼郭璞曰脚指間有幕蹼属相著春秋􅀃題辭曰鴈之言鴈鴈起聖以招期知晚蚤故鴈南北以陽動也鴈鴈音聲皃也聖王聞鴈鴈有音聲知爲府節鴈鳥隨日南以常動春秋繁露曰凡贄大夫用鴈有􅀋長者在民上必有先後鴈有行列故以爲贄廣雅曰􅕯鵝㑹􅕯鴈也周書曰白露之日鴻鴈來鴻鴈不來逺人背畔小寒之日鴈北郷鴈不北郷民不懷至史記曰􅂫武在匈奴中昭帝遣使通和常惠夜見漢使使謂單于曰天子射上林中得鴈足有係帛書言武等在某澤中使者如其言單于大驚乃使武還漢書曰梁孝王於睢陽園中作鳬鴈池又曰武帝太始三年幸東海獲赤鴈作朱鴈之歌後漢書曰度遼將軍皇甫䂓解官歸安定郷人有以貨買鴈門太守者亦去職還家書刺謁卧不迎旣入而問卿前在郡食鴈美乎北史曰齊斛律光從文襄出野見􅀟鴈飛來文襄使明月馳射之以二矢俱落焉又曰尉遟逈之亂也隋將史万歳從梁士彦擊之軍次馮翊見羣鴈飛來万歳謂士彦曰請射行中第三者射之應􅁌而落三軍莫不恱服三國典略曰徐思王壽陽人家夲寒微以捕鴈爲業晉史曰朱漢賔少時善射甞因與同軰出獵指一飛鴈隨矢而落其鏃正中其臆臆上貫一金錢有􅂐文示其郡之碩學皆無識者人甚異之由是人皆号之朱落鴈莊子曰莊子行於山中見大木伐木者止其傍而不取問其故曰無所用莊子曰此木以不材得終其天年出於山及邑舎故人家故人喜具酒肉令竪子殺鴈烹之竪子請曰其一鴈能鳴其一不能鳴奚殺主人公曰殺不能鳴者明日弟子問曰昨日山中之木以不材得終其天年主人之鴈以不材而死先生何處焉莊子嘆曰周將處夫材與不材之間淮南子曰夫鴈從風飛以愛氣力衘蘆而翔以備弋􅗤山海經曰鴈門山鴈出其間在髙栁北家語曰孔子之衛衛公與孔子語見飛鴈過而仰視之色不在孔子孔子乃逝賈􅁩書曰鄒穆公令食邊鴈必以秕無敢以粟􅀃苑曰􅁗穆公得百里奚公孫友歸取鴈以賀曰吾得社稷之臣敢賀社稷之福公不辭再拜而受又曰齊晏子對景公曰君之鳬鴈食以菽粟又曰大夫以鴈爲贄鴈者有長㓜之禮士以雉雉者取其不可狎服庻人以䳱䳱以其無他心也白虎通曰贄用鴈者取隨時南北不失其節明不奪女子之時楊雄方言曰自􅀜而東謂鴈􅕯鵝南楚之外謂之鵝或謂之倉􅕯􅀶物志曰鴈食粟則翼重不能飛㑹稽典録曰虞固字季鴻少有孝行爲日南太守常有􅀟鴈止􅀫㕔事上毎出行縣輒飛逐車卒官鴈遂哀鳴還至餘姚住墓前歴二年乃去梁州記曰梁州縣界有鴈塞山傳云此山有大池水鴈樓集之固因名曰鴈塞盛􅀪之荆州記曰鴈塞北接梁州汶陽郡其間東西嶺属天無際雲飛風翥望崖廽翼鴈逹塞矯翼裁度故名鴈塞同於鴈門也鄧德明南康記曰平固縣有覆笥山上有湖周廻十里有一石鴈浮岀湖中毎至秋天石鴈飛鳴如􅀱時也十三州記曰上虞縣有鴈爲民田春衘抜草根秋喙除其穢是以縣官禁民不得妄害此鳥犯則有刑無赦荆州圖記曰沮陽縣西北有鴈浮山是山經所謂景山也髙三十餘里周迴三百里脩巖遐亘擢幹干霄鴈南翔北歸偏經其上士人由兹改山名焉五色鴈漢書郊祀志宣帝於西河築丗宗廟告祀有五色鴈集殿前唐書曰貞元十年同州獻五色鴈白鴈左傳曰哀上曹伯陽即位好田弋曹鄙人公孫疆好弋獲白鴈獻之且言田弋之􅀃因訪政事大􅀃之有寵使爲司城以聽政新語曰梁君出獵見白鴈而欲自射之道上有驚鴈飛者梁王怒命以射此人其御公孫龍諌曰昔衛文公時大旱三年卜云必湏人祀文公曰求􅀨者爲民也今殺之不仁吾自當之言未卒􅀨下今君重鴈殺人何異虎狼梁君引龍登車入郭呼萬歳曰善哉今曰獵得善言晉書曰載記建元􅀄石季龍饗群臣于太武殿前有白鴈百餘集于馬道南季龍命射之無所獲雉春秋運斗樞曰機星散爲雉周禮春官太宗伯曰士執雉鄭􅀇注曰取其守介不失節儀禮士相見曰士相見之贄各用雉士䞇用雉者取其耿介交有時别其倫也禮記曲禮下曰􅀕宗廟雉曰䟽趾又月令曰孟冬雉入水爲蜃又曰季冬之月雉雊雞乳左傳昭四曰郯子云丹鳥氏司閉五雉爲五工正杜預注曰丹鳥鷩雉者立秋來立冬去入水爲蜃五雉雉有五種也又曰叔孫豹奔齊齊􅁃宗婦人献以雉問其姓曰予子長矣能捧雉而從我矣毛詩邶柏舟曰雄雉刺衛宣公也􅁋亂不恤國政雄雉于飛泄泄其羽我之懷矣自貽伊阻雄雉于飛下上其音展矣君子實勞我心又曰有㳽濟盈有鷕雉鳴鷕雌雉聲又曰如翬斯飛君子攸躋又節小弁曰雉之朝雊尚求其雌又甫田車轄曰瞻彼中林有集惟鷮毛詩義䟽曰林應山下人語曰四足之美有鹿兩足之美有鷮周易鼎卦九三曰鼎耳革其行塞雉膏不食方􅀨􅃜悔終􅁻又旅卦六五曰射雉一矢亡終以譽命又曰離爲雉尚書曰日月星辰山龍華蟲華虫鷩雉也五色故謂華也又曰髙宗祭成湯有飛雉升鼎耳而雊論語曰山梁雌雉時哉時哉子路拱之三嗅而作爾雅曰鸕諸雉命雉鷂雉責質五色鷮雉長尾走且鳴鳴雉黄色鳴自呼鷩雉似山雞而小冠背毛黄腹赤頂縁色鮮明秩秩海雉如雉而黒出海中山鸐山雉尾長者也翰雉鵫雉今白鵫江東呼白翰亦名白雉伊洛而南素質五采皆備成章曰翬翬亦雉属言其毛色光鮮江淮而南青質五采皆備成章曰鷂即鷂雉也南方曰􅔧句東方曰緇音緇衣之緇北方曰鵗音希西方曰鷷􅀃四方雉之名也音所旬切雉之暮子爲鷚晚生者也今呼少鷄爲鷚尚書大傳曰武丁􅀕成湯有雉飛升鼎耳而雊問諸祖巳祖巳曰雉者野鳥也不當升鼎今升鼎者欲爲用也逺方將有來朝者乎武丁思先王之道編髪重譯至者六國周書曰立冬之日水始氷後五日雉入大水爲蜃小暑後十日雉始雊史記曰秦文公獲􅀂石于陳倉北阪城祠之蘇林注曰白質其實其神或歳不至或歳數來來常以夜光若流星從東南集於祠城則􅀂雄雞如淳注曰野雞雉也吕后名雉故曰野雞漢書曰成帝鴻嘉二年有飛雉集于殿庭歴階升堂而雊東觀漢記曰魯恭字仲康爲中牟令蛉螟不入中牟河南尹􅀽安疑其不實遣仁恕􅁺肥親驗之恭隨親行阡陌坐樹下雉過止其側旁有小兒親曰兒何不捕之兒言雉將鶵親嘿然有頃與恭訣曰本來考君界有無蟲耳今蟲不犯境一異也化及鳥獸二異也竪子有仁心三異也府􅁺乆留但擾賢者因還府以狀白安魏志曰管輅至王􅀪直許有雄雉飛來登直内柱頭大不安令輅作卦輅曰五月必遷時三月也至期果爲渤海太守晉咸寜起居注曰太醫司馬程據上雉頭裘一領詔於殿前燒之晉書曰武庫封閉甚宻其中忽聞雉雊張華曰此必虵化也開視之雉側有虵蛻焉又曰涼武昭王暠卒子歆嗣立春有􅀟雉飛出宫内北史曰後魏裴安祖閑居養志不出城邑曽天􅀬舎於樹下有鷙鳥逐雉雉急投之遂觸樹而死安祖愍之乃取置隂地徐徐護視良乆得􅂫憘而放之後夜忽夢一丈夫衣冠甚偉着繡曲領向安祖再拜安祖怪問之此人云感君前日見放故來謝德聞者異焉三國典略曰齊髙緯如晉陽穆后將從辭胡太后于北宫有雉集于御牀有司獲之不敢以聞又曰梁臨賀王正德其妹長樂公主太子家令謝禧之妻也姿容國色恱而報之生子二人乃燒主第投婢於火唱言主死黄門郎張準有一雉媒正德見而奪之準於重雲殿法㑹所罵之曰張準雉媒非長樂公主何可略奪太子綱恐梁主聞遣武陵王紀急相解喻凖罵乃止正德旣出以雉還之山海經曰小華之山其鳥多赤鷩可以禦火其山中多白雉莊子曰澤雉十歩一啄百歩一飲不畜於樊中尹文子曰楚人擔山雉者路人問焉何鳥也欺之曰鳯皇也路人曰我聞鳯皇今始見矣汝販之乎請買十金弗與請加倍乃與之方欲獻楚王經􅀫鳥死路人不遑惜其金唯恨不得獻王王聞之感其欲獻巳召厚賜之過買鳥之金十倍抱朴子曰鷄有專栖之雄雉有擅澤之鷮蟻有兼弱之智蜂有攻窠之計相役衘亦猶是耳廣雅曰野雞雉洪範五行傳曰正月雷微動而雉雊雷通氣也楚辭曰彭鏗斟雉帝何饗鏗彭祖也好和滋味斟白雉羮以事堯堯美而饗食之列異傳曰秦穆公時陳倉人掘地得物􅀂羊非羊􅀂猪非猪牽以獻諸公道逢二童子童子曰此名爲媪常在地食死人腦􅀂欲殺之以栢捶其首媪復曰彼二童名爲陳寳得雄者王得雌者霸陳倉人捨媪逐二童子童化爲雉飛入乎林陳倉人告穆公穆公發徒大獵果得其雉又化爲石置之汧渭之間至文公爲立祠名陳寳今南陽雉縣其地也􅁗欲表其符故以名縣毎陳寳祠時有赤光長十餘丈從雉縣來入陳祠中有聲如雄雉楊雄琴清英曰雉朝飛操者衛女傅母所作也衛侯女嫁於齊太子中道太子死問傅母曰何如傳母曰且往當喪喪畢不肯歸終之以死傅母悔之取女所自操琴於􅃁上鼓之忽有二雉俱出墓中傳母撫雌雉曰女果爲雉耶言未卒俱飛而起忽然不見傳母悲痛援琴作操故曰雉朝飛琴操曰齊獨沐子年七十無妻出見飛雉雌雄相隨感之撫琴而歌曰雉朝飛鳴相和雌雄羣遊於山阿蕭廣濟孝子傳曰蕭芝忠孝除尚書郎有雉數十頭飲啄􅀫止當上直送至歧路下直及門飛鳴車側璅語曰有鳥從飛西方來白質五色皆備集平公之庭相見如讓公召叔嚮問之叔嚮曰吾聞師曠曰西方有白質鳥五色皆備其名曰翬南方赤質五色備其名曰揺其來爲吾君臣其祥先至矣􅀶物志曰翟雉長􅀨雪惜其毛栖髙樹之上不敢下食往往餓死徐廣車服注曰天子金根車馬上挿以翟毛皇后法駕乗重翟羽盖崔豹古今注云有雉尾扇宣驗記曰野火焚山林中有一雉入水漬羽飛以滅火往來疲乏不以爲苦白雉春秋感精符曰王者徳流四表則白雉見孝經援神契曰王者德至鳥獸故雉白首妃房不徧故白雉應又曰周成王時越裳獻白雉去京師三萬里王者􅀕祀不相踰宴食衣服有節則至抱朴子曰白雉自有種􅀯越尤多案地域圖今之九德則古之越裳也盖白雉之所出周成王所以爲瑞者貴其所自來之逺明其德化所􅀍廣非謂此爲竒楚辭曰昭后成遊南土爰厎爰於也厎至也言昭王背成王之制而出逰􅀯至楚楚人沉之南遂不返之厥利惟何逢彼白雉厥其也逢迎也言昭王南遊何利於楚乎也爲越裳氏献白雉昭王徳不能致親往迎也漢書曰平帝元始元年春越裳重譯獻白雉一黒雉二詔使三公以薦宗廟魏略曰文帝欲受禪郡國奏白雉十九見魏志文紀曰延康元年四月饒安縣言白雉見北史曰後魏南安王禎孝文時爲雍州刺史性忠謹其母疾篤憂毀異常遂有白雉遊其庭前帝聞其致感賜帛千疋以褒美之三國典略曰渤海王髙歡攻鄴時瑞物無歳不有令史焚連里木煑白雉而食之射雉左傳曰賈大夫賈大夫大夫也娶妻而美三年不言不􅀏衘以如臯爲妻御也之臯澤也射雉而獲之其妻始􅀏而言魏書曰太祖才力絶人於南皮一日射雉獲六十三頭江表傳曰孫權數射雉潘濬諌權權曰時時暫出耳不復如往日濬曰天下未定萬機務多射雉非急􅁌絶括破皆能爲害濬乃手自徹壞雉翳權由是遂絶不復射雉吴志曰孫休銳意於典籍欲畢覽百家之言大好射雉春夏之間常晨出夜還唯此時捨書宋書曰孝武帝常岀射雉值雨侍中沈懷文諌曰非止千乘失容亦乃聖躬櫛沐沈約宋書曰明帝與晉平王休祐於岩山射雉有一雉不肯入埸日暮將反留休祐射之語云不得雉勿歸因遣壽寂之等諸壯士追之日巳欲闇與休祐相及遂拉殺之又曰到撝與蕭道成同從宋明帝射雉郊野渴倦撝得早青􅀲與上對割食之齊書曰武帝好射雉竟陵王子良啓諌先是左衛殿中將軍邯鄲超諌射雉武帝爲止乆之永明末上將射雉子良復諌又曰蕭景先轉中領軍車駕躬射雉郊外景先常申仗從廉察左右又曰蕭敏爲新安太守好射雉未甞在郡辭􅀃者遷於畋焉後張弩損􅆎而卒又曰桓僖伯少􅀒氣豪俠妙解射雉尤爲武帝所重又日張欣㤗爲河東内史召還都屏居家巷置宅南岡下面接松山欣㤗􅀒弩射雉姿情閑放又曰􅀽􅂏爲侍中形皃充肥異衆毎從射雉郊野數人持扶乃能從歩又曰禇􅋑從宋明帝射雉帝至日中無所得甚羞召問侍臣吾且來如臯遂從空行可􅀏座者莫荅􅋑獨曰今節候雖適而雲霧尚凝故斯翬之禽驕心未驚伹得神駕猶豫羣情便可載懽帝意解乃於雉埸置酒南史曰齊東昬侯在位置射雉􅂣二百九十六處翳中惟帳及歩障皆祫以縁紅金銀鏤弩牙瑇琩帖箭毎出輙以鷹犬隊主徐令孫媒翳隊主俞靈韻齊馬而走左右爭逐之又曰武帝親拜陵蔡興宗􅀒璽陪乗及還上欲因以射雉興宗正色曰今致䖍園陵情敬兼重從禽猶有餘日請待他辰陳書曰新安王伯固性好射雉叔陵好發冢出遊田野必與偕行太平御覽卷第九百一十七
