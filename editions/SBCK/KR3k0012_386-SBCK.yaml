front:
  text: 太平御覽卷第三百八十六
  hash: sha256:1d94a8ff746becf30b7c7dcb0adbbc5ce5773f973037a8d23d63ccb7caa90028
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_386-1a}
body:
  text: 人事部二十七徤羸徤釋名曰徤建也能有所建爲也左傳莊公曰宋萬弑閔公于蒙澤曹師伐之南宫長萬奔陳以乗車輦其母一日而至乗車非兵車也駕人曰輦宋去陳二百六十里言萬之多力宋人請南宫長萬於陳陳人使婦人飲之酒而以犀革褁之比及宋手足皆見又曰􅀄雩講于梁氏女公子觀之圉人犖自墻外與之戯子般怒使鞭之公曰不如殺之是不可鞭犖有力焉能投盖于稷門盖覆地稷門魯􅀯城門走而自投接其屋之桷反覆門上又宣公下曰晉魏顆見老人結草以抗杜回杜回􅁗之力人也又成公上曰髙固入晉師磔石以投人禽之而乘其車繫桑夲焉以徇齊壘又成公下曰晉楚交戰叔山冉搏人以投中車折軾晉師乃止又襄公二曰晉荀偃士丐請伐偪陽偪陽人啓門諸侯之士門焉見門開故攻之懸門發鄹人紇抉之以出門者紇鄹邑大夫仲尼父叔梁紇也狄虒弥建大車之輪而蒙之以甲以爲櫓狄虒弥魯人蒙覆也櫓大楯也左執之右拔㦸以成一隊百人曰隊孟獻子曰詩所謂有力如虎者也主人縣布堇父登之及堞而絶之墜則又縣之􅂫而復上者三主人辭焉乃退又哀公下曰楚白公作亂劫惠王子西以􅃑掩靣而死子期曰昔者吾以力事君不可以弗終抉豫章以殺人而後死以効其多力豫章大木史記曰秦王有力好戯士任鄙烏獲孟說皆至大官王與說舉龍文赤鼎絶臏而死又曰范雎說􅁗昭王曰烏獲任鄙之力成荆孟賁慶忌夏育之勇又曰張良常學淮陽東見滄海君得力士爲鐵椎重百二十斤􅁗皇東遊良與客俱擊􅁗皇􅀶浪沙中悞中副車􅁗皇大怒大索天下求賊甚急張良乃更姓名亡匿於下邳漢書曰項羽在鴻門沛公與張良在坐樊噲聞事急乃抜楯入􅀄入營營衛止噲噲直橦入立帳下羽見之問爲誰良曰沛公叅乗樊噲也羽曰壯士賜之巵酒􅇾肩噲旣飲酒抜劒切肉食之羽曰能復飲乎曰臣死且不辭豈特巵酒也又曰甘延夀字君况北地郁郅人少以良家子善􅀐射爲羽林投石拔距絶於等倫常超踰羽林亭樓由是遷爲郎又曰淮南王長力能扛鼎廣陵王􅇧空手􅅮熊羆又曰上官桀從武帝上甘泉天大風車不得行解盍授桀桀奉蓋雖風常屬車兩下蓋御上竒其才力遷未央廐令又曰彭城王翌身長八尺七寸驍幹過人能手舉殿梁超過平陽楚漢春秋曰項梁甞隂養士最髙者多力拔樹以擊地東觀漢記曰蓋延字巨卿身長八尺彎弓三百斤以氣􅀔聞又曰隂興字君陵爲期門僕射從上出入常操小蓋疾風􅁀雨屏翳左右泥塗隘狹自投車下脫袴解履渉淖至膝又曰􅀕彤字次孫力貫弓三百斤入爲太僕從至魯帝指子路室曰此太僕室也范曄後漢書曰虞延字子太陳留人延生時有物如疋練直曻天長八尺六寸力能扛鼎又曰董卓膂力過人􅀟帶兩鞬左右馳射爲羗胡所畏魏志曰許禇字仲康長八尺餘大十圍容皃雄毅勇力絶人漢末聚宗族堅壁以禦寇賊賊攻壁禇令男女聚石如蓋者禇飛石擲之所值皆碎以牛與賊易食牛奔還禇一手逆曵牛尾行百歩賊遂不敢取牛禇後事太祖以力如虎而癡號曰癡虎又曰典韋陳留人形皃魁梧膂力過人又曰吕布字奉先五原人也以驍武給并州刺史丁原爲􅀐都尉便弓馬膂力過人號爲飛將英雄記曰􅀽紹父成字文開名壯徤貴戚權豪自大將軍梁兾以下皆與交結恩好言無不從故京師諺曰事不諧詣文開江表傳曰太祖與馬超單馬㑹語超負其多力常置六斛米嚢東西走馬輒掣米囊以量太祖輕重許禇瞋目瞪盻超瞪直玉切曰聞君有徤將虎侯郍在太祖指禇超乃止太祖尋知之歎息良乆曰幾爲狡虜所欺王隱晉書曰呉彦字士則呉郡人有文武材幹長八尺餘膂力如虎晉中興書曰􅁃闡父東以勇力聞丗祖時西域遣一使胡趫䟁音巢勇果自謂無敵晉人不敢與校丗祖募求勇敢之士唯東應選遂懪殺胡勇聞殊俗晉令曰選三部司馬皆限力舉千二百斤以上前驅司馬取便大㦸由基司馬取能挽一石七㪷以上弓沈約宋書曰丁旿驍勇有氣力時人爲之語曰勿䟦扈付丁旿蕭子顯齊書曰張敬兒爲持節督雍梁二州刺史部仵泊􅃆口敬児舴艋過江詣晉熈王爕中江遇舡覆左右丁壯者各走餘二小吏没䑳下呼叫張敬児兩掖挾之隨舡覆仰常得在水上如此飜覆行數十里方得迎接又曰東昏侯有膂力能檐白虎幢自製雜色錦􅇊衣綴以金花玉鏡衆寳逞諸意態崔鴻十六國春秋􅁗録曰姚興將軍王奚仲驍悍有膂力去其弓矟持短兵出堡與赫連勃勃力戰衆多傷勃勃乃羈縻圍之斷其水路堡民執奚仲出降勃謂奚仲曰卿忠臣也朕方與卿共平天下奚曰􅀂蒙大恩速死爲惠乃與所親數十人自刎而死又前趙録曰郭黙字􅀇雄河内懷人丗以屠沽爲業黙壯勇拳捷能貫甲跳三丈壍時人咸異之曰此児必興郭氏河内陸允丗之豪民望見以女妻之又曰陳安字虎侯家丗農民安少慷􅁣曰大丈夫當乗軒杖節安能乆執犁鋤乎遂東遊京師頗學書笇讀魏書見許禇而慕之乃自字虎侯遇晉室喪亂遂慿結司馬賔驍壯果毅武幹過人多力善射持七尺刀貫甲奔及馳馬又前􅁗録曰張蚝音刺夲姓弓上黨泫氏人也泫􅀇字膂力過人能却曵牛走張平愛而子之媱於平妾知而責之蚝慙割隂以自誓遂爲閹人堅甚寵之常侍左右終爲名將所在有殊功稱鄧羗張蚝萬人敵也又後趙録曰張珎字巨􅁗汲郡人晉永嘉中與梁臣戍武德城石勒攻之城潰弥隨例當坑大呼曰官當活徤児何以殺也曰有何捷事而求活也弥曰武德西城上大聲督時警備嚴設使賊不入正是張弥勒􅀏曰降児能尓正自竒徤乃赦之趙書曰汲桑清河貝丘人年二十餘力扛百鈞呼聞數里時人服之又曰劉靈陽平人年二十餘常期役於縣力制奔牛走及馳馬後魏書曰孝文帝有膂力年十餘􅀊能以指彈碎羊髀骨又曰元淑字買仁有膂力彎弓三百斤善􅀐射又曰陳留王䖍姿氣魁傑膂力絶人毎以常矛短乃大作之猶患其輕後綴銅鈴於刃下其弓力倍如常人以其殊異於丗䖍常臨陣以矟刺人遂貫胷髙舉以示於衆又嘗以一手頓矟於地􅀐馬僞退敵人争取引不能出䖍引弓射之一箭殺其二人揺矟之徒亡魄奔散徐乃命人取矟而反毎從征伐乃率偏將先登䧟陣勇冠當時又曰衛王儀長七尺五寸容皃甚偉羙􅁂髯有笇略少能舞劒􅀐射膂力過人弓將十石陳留公䖍矟大見称異時人云衛王弓桓王矟也又曰韓茂字元輿嘗從太宗征丁零時大風旍旗皆偃仆茂於馬上持幢􅀄不傾倒太宗訝其膂力又曰伊馥代人也善射多力曵牛却行三國典略曰周賀􅀂敦嘗從太祖校獵於甘泉宫圍人不齊獸多越􅇣太祖大怒圍内唯有一鹿俄亦突圍而走敦躍馬馳之鹿上東山敦弃馬歩逐山半掣之而下太祖大恱周書曰韓雄河東垣人也少敢勇魁岸膂力絶人工騎射有將帥才略又曰竇熾字光成性寛明有偉略羙􅁂髯身長八尺二寸善􅀐射膂力過人隋書曰魚俱羅馮翊下邽人也身長八尺膂氣雄壯言聞數百歩墨子曰紂有勇力之人生捕兕虎指畫殺人晏子曰昔夏之衰也有推侈大戯殷之衰也有費仲惡來足走千里手制兕虎子思子曰中行穆伯手捕虎列子曰公儀伯以力聞諸侯周宣王備禮聘之公儀伯至觀形懦夫也宣王心惑曰汝之力何以對曰臣之力能折春螽之服勝秋蟬之翼王作色曰吾之力者能分犀兕之革曵九牛之尾猶憾其弱公儀伯曰臣之師有南丘子者力無敵於天下而六親弗知未嘗用其力故也又曰魏黒夘殺丘邴章邴章之子來丹謀復仇丹氣甚猛形甚露計粒而食從風而趨誓手劒以屠黒夘黒夘悍志絶衆力抗百夫筋骨皮肉非人􅀋也延頸承刃披􅅐受矢鋩鍔摧屈而體無痕負其才力視來丹猶鶵鷇也孟子曰有馮婦善􅅮虎尸子曰中黄伯余左執太行之獶音猱右搏雕虎唯象未與吾試願爲牛與象􅋐以自試又曰飛廉惡來力角犀兕勇􅅮熊虎也孔叢子曰孔鮒謂陳王曰梁人有陽由者其力扛鼎􅇊巧過人骨騰肉飛淮南子曰孔子勇復孟諸足蹀狡兎不以力聞六韜曰紂之卒握炭流湯者十八人崇侯虎等舉五百石重沙二十四人山海經曰中曲之山有懷木食之多力穆天子傳曰有虎在於葭中七萃之士曰髙奔戎生捕以獻天子乃命爲㭱而畜之東虞是曰虎牢吕氏春秋曰孔子之勁能招國門之􅀜招舉也淮南子同也又曰趙氏中山之多力者曰吾兵衣鐵甲操䥫杖以戰所擊無不碎所衝無不䧟以車投車以人投人春秋外傳曰少室爲簡子右聞牛談有力請與之戲不勝致右焉簡子許之使少室爲宰曰知賢而讓可以訓矣蜀王夲紀曰􅁗王知蜀王好色乃獻女五人蜀王遣五丁迎女還梓潼見大虵入山穴一丁引其尾不出五丁共引虵山乃崩說􅁐曰勇士孟賁氷行不避蛟龍陸行不避虎狼發怒吐氣聲響動於天王充論衡曰語稱紂力能索鐵伸鈎撫梁易柱言其多力也風俗通曰頴川張欽字孟孝呉楚反與亞夫常爲前鋒䧟陣潰圍傍人􅀚曰壯哉此君欽聞自矜遂死軍方言曰蹶膂力也東齊曰䠇宋魯曰膂膂力也郭璞曰律多力皃通俗大曰強徤曰馶音翅曹肇別傳曰肇之弟繤字德思力舉千鈞明帝寵之􅃦止恒同嘗與戯賭衣物有所􅀗輙入御帳取而出之石虎別傳曰虎字季龍勒從弟年十七八身長七尺五寸好弓馬射獵迅徤有勇力同時等􅀋多畏憚之異􅁐曰荆州上明浦常有蛟殺人死者不脫􅀊昇平中鄧遐爲太守素勇徤入水覔蛟曳出斬之至今不復有患􅀶物志曰石蕃衛臣也有勇力背負千二百斤沙西京􅄂記曰江都王勁捷能超七尺屏風任豫益州記曰元帝爲丞相有力士鍾齊夲呉人百斛米分爲三擔擔從渚入市五六里丗說曰周處年少時凶強使氣爲郷里所患時義興水中有鮫山中有虎並皆犯􅁀百姓議與人爲三撗而處尤極或說處使殺蛟虎遂入擊蛟或没或出行數十里經三日夜郷里皆謂死更相慶處竟殺蛟而出始知爲人情所患處遂自改勵終爲忠臣孝子楚辭曰魂􅀆來歸無上天一夫九首抜木九千言有一丈夫身有九段強梁多力從朝至暮能抜木九千也張衡西京賦曰烏獲扛鼎都盧尋橦羸說文曰羸痿也釋名曰羸累也恒累於人也東觀漢記曰和喜太后遭新野君喪悲傷思慕骨立不能自勝王隱晉書曰皇甫謐表從武帝借書上送一車書與謐謐羸病手不釋書歴􅀚今古無不皆綜又曰尚書令􅀓朂乆羸瘦上令太官給乳酪呉越春秋曰子胥與要離見於呉王要離對曰臣吴國之東阡陌人細微無力迎風則偃背風則仆大王有命臣不敢盡死吕氏春秋曰吴王欲殺王子慶忌而莫之能殺吴王患之吴王之友曰要離謂王曰臣請殺之吴王曰汝抜劒不能舉臂上車不能登足汝能殺之要離曰請必能吴王曰諾丗說曰何晏自平叔體弱不勝重服又曰李欽是茂曽弟六子清貞有逺操而少羸病不肯㛰宫居住臨海常徃兄侍中慕下旣有髙名王丞相辟爲公府􅁺欽得板命􅀏曰茂弘乃復以一爵假人又曰丞相見衛洗馬居然有羸形雖復終日調暢猶􅀂不堪羅綺太平御覽卷第三百八十六
