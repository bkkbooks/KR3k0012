front:
  text: 太平御覽卷第七十三地部三十八
  hash: sha256:47053c4cff89b8520d5b07ba009a4c4ee5b44418625b793430911d542061aaf3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_073-1a}
body:
  text: 橋堰埭橋􅀃文曰橋水梁也榷音角水上橫木所以度也亦曰約音灼今謂之略灼東楚謂橋爲圯詩曰維鵜音題在梁不濡其翼又曰造舟維梁又曰有狐綏綏在彼淇梁爾雅曰梁莫大於溴梁郭璞注梁即橋也或曰梁石橋也石杠音江謂之􅀝音寄亦曰石橋也史記曰張良曽間從容出遊下邳圯上楚人謂橋爲圯圯音怡之有老父衣􅄄至良所直墮其履圯下頋謂良曰孺子下取良下爲取履因長跪授之父足受􅀏而去又曰文帝行出中渭橋有一人從橋下走乗輿馬驚吏􅀐捕屬之廷尉張釋之治問曰縣人來如淳曰長安縣人聞蹕匿橋下乆以爲行過即出見車􅀐即走耳廷尉奏犯蹕當罰金又曰西門豹發民鑿十二渠引水灌民田到漢丗而長吏以爲渠水且至馳道不可也遂欲合三渠爲一橋鄴人父老不肯聽長吏以爲西門君所爲賢君之法式不可更終不聽置之漢書曰薛廣德爲諌議大夫上酎􅀕宗廟出便門欲御樓舡廣德當乗輿免冠頓首曰冝從橋詔曰大夫冠廣德曰陛下不聽臣臣自刎以血汙車輪陛下不得入廟矣上不恱光禄大夫張猛進曰乗舡危就橋安上曰暁人不當如是耶乃從橋束觀漢記曰班超討焉􅂄王廣廣遣其左將比鞬友奉迎超賜而遣焉􅂄國有葦橋之險廣乃絶橋不欲令漢軍入國超更從他道渡魏略曰驢分國取大􅁗渡河橋長三百四十里又曰洛陽城西橋洛水浮橋三處三柱三公象也魏志曰鍾繇甞與族父瑜至洛陽道遇相者曰此童有貴相然當厄水行未十里渡橋馬驚墮水幾死而後至太傅又曰景元四年伐蜀鐘㑹領十餘萬衆分從斜谷入先遣牙門將許儀在前治道㑹在後行而橋穿馬足䧟於是斬儀蜀志曰先主爲曹公所追張飛距後據水断橋無敢近者吴志曰凌統字公續從征合淝爲右部都督時權徹軍還前部巳發魏將張遼等奄至津北權使追還前兵兵巳逺勢不相及也統率親近三百人扶杆權出敵巳毀橋之兩板䇿權馬駈統復還戰王隱晉書曰杜預啓建河橋于富平津衆論以爲殷周所都經聖賢而不作者必不可作故也預曰昔造舟爲梁則河橋之謂也遂作橋成上從百官臨㑹舉杯勸預曰非君此橋不立也預曰非陛下之明臣亦不􅀗奉成聖制也衆咸稱善後魏書曰崔亮爲雍州刺史城北渭水淺不通舡行人艱阻㑹天大雨山水􅁀至浮出長木數百根藉此爲用橋遂成立百姓利之至今猶名崔公橋又曰于栗磾音低從太宗南臨孟津渭栗磾曰可作橋乎磾曰杜預造橋􅔪事可想乃編次大舡搆橋於野坂六軍旣濟太宗乃深歎焉北齊書曰張亮守河州文帝於上流放火舡欲焼河橋亮乃備小艇百餘皆載長鏁鏁頭施釘火舡將至即馳小艇以釘釘之引鏁向岸火舡不得及橋全亮之計也唐書曰韋景駿神龍中累轉肥郷令縣北界漳水連年泛溢舊堤迫近水漕雖脩築不息而漂流相継景駿審其地勢拓南數里因髙築堤􅁀水至堤南以無患水去而堤北稱􅃾田漳水舊有架柱長橋毎年修葺駿又改造爲浮橋自是無復水患至今頼焉戰國䇿曰䂊讓欲爲知伯報讎􅃮身吞炭襄子當出伏於橋下至橋馬驚曰是必䂊讓也求之果是述征記曰方興縣􅀑橋忽一夜聞人呼喚聲車行雷駭暁而石橋自成家家牛皆喘息未定齊地記曰秦始皇作石橋欲渡海觀日出處舊􅀃始皇以術召石石自行至今皆東首隱軫似鞭撻瘢言似馳逐英雄記曰公孫瓉擊青州黄巾賊大破之還屯廣宗􅀽夲􅀄自徃征瓉合戰于界橋南二十里紹將鞠義破瓉於界城橋斬瓉兾州刺史綱嚴又破瓉殿兵於橋上即此梁也㝷陽記曰廬山上有三石梁長數十丈廣不盈尺者然無底吴猛將弟子登山過此梁見一翁坐桂樹下以玉杯承甘露漿與猛又至一處見數人爲猛設玉膏猛弟子􅀼一寳欲以來示世人梁即化如指猛使還寳其梁復如故三輔故事曰漢丞相夏侯嬰墓在飲馬橋東大道南人謂之馬冢三輔黃圖曰秦始皇併天下都咸陽營殿端門四逹以則紫宫渭水貫都以象天漢橫橋南渡以法牽牛襄陽􅂄舊傳曰木蘭橋今之猪蘭橋是也劉季和以此橋東大養猪襄陽太守曰此猪屎臭當易名猪蘭橋􅀄如戯言而百姓遂易其名郡國志曰漳水建武十一年造紫陌浮橋於水上有天井堰魏文帝時西門豹爲鄴令沉巫處也又曰通門内有臯橋即漢臯伯通居此橋以得名梁鴻賃舂之所常璩華陽國志曰李冰造七橋上應七星故光武謂吴漢曰安軍冝在七星橋間也又曰􅂛遷橋在成都縣北十里即司馬相如題橋柱曰不乗駟馬髙車不過此橋又曰萬里橋在成都縣南八十里蜀使費禕使吴諸葛亮送之於此嘆曰萬里之路始於此橋因名萬里橋地理志曰漳水出上黨鄴中趙武帝於漳水造浮橋接紫陌故號曰紫陌橋祖台之志恠曰義興郡溪渚長橋下有蒼蛟吞噉人周處執劒橋側伺乆之遇出於是自橋上􅄬下蛟背而㓨焉蛟數創流血丹溪自郡渚至太湖句蒲乃死水經注曰上虞縣亦名虞賔舜避丹朱於此故以名縣百官從之故縣北有百官橋亦云禹與諸侯㑹事訖因相虞樂故曰上虞二􅀃不同未詳孰是國語曰天根見而水涸水涸而成梁故夏令曰十月而成梁不使民患渉也紀年曰周穆王七年大起師東至于九江架黿鼉以爲梁崔鴻國春秋後燕録曰慕容垂與劉牢之戰于五丈橋津晉大敗車􅀐將軍慕容德等引兵要牢之五丈橋牢之馳馬跳五丈澗㑹符丕救至而免孟子曰子産爲政以其乗車濟人於溱洧故孟子曰可爲惠而不知爲政抱朴子曰尾生與婦人期橋下水至不去以至溺死雖有信不如無也王充論衡曰髙麗國侍婢有氣如鷄子來下之有娠生子名東明東明善射王恐其害國欲殺之東明走至掩水以弓繫水魚鼈爲梁旣度而魚鼈解散諸葛亮集曰亮上事曰臣先進孟琰據武功水東司馬懿因水以二十日出􅀐萬人來攻琰􅩌臣作東橋賊見橋垂成便引兵退堰埭吴録曰句容縣大皇時使陳勲鑿開水道立十二埭以通吴㑹諸郡故舡行不復由京口晉中興書曰兖州旣平謝􅀇患水道險澁糧運艱難壅吕梁水立七埭以利運漕又曰謝安築埭於新城北百姓頼之故名召伯埭述征記曰􅁗梁埭到召伯埭二十里召伯埭到三枚埭十五里三枚埭到鏡梁埭十五里晉書曰李矩與汝南太守􅀽孚率衆修洛陽千金堰以利運漕梁典曰天監十三年魏降人王足陳計求堰淮水以灌壽陽引北方童謡曰荆山爲上格浮山爲下格潼泡爲激溝并灌鉅野澤武帝遂發徐揚築之令太子右衛率康絢護堰作􅃥人及戰士二十萬於鐘離南起浮山北抵巉石依岸以築土合􅆃於中流十四年四月堰將合淮水漂疾輙復决潰衆㑹之或謂江淮之間多有蛟能乗風雨決壞崖岸其性􅁖䥫因是引東西二冶故䥫器大則釡鬲小則钁鋤數千萬斤沉於堰所謂不能合乃伐樹爲井幹填以巨石加土其上縁淮百里内岡陵木石無巨細必盡􅀒擔者肩背穿夏日疾疫死者相枕蠅䖟晝合是冬又寒甚淮泗盡凍士死者十七八至十五年四月堰乃成其長九里下闊百四十丈上廣四十五尺髙二十丈軍人安堵列居于上其水清㓗俯視居人墳墓了然皆在其下其壽陽戍因移置八公山上夾淮數百里皆水之所淹人謂絢曰四瀆天所以節宣其氣不可乆塞旣而昏霧霧解而堰决殺萬人其聲􅀂雷聞三百里水中恠物隨流而下或人頭魚身龍形鳥首殊􅀋詭狀不可勝名今號其處爲荆山堰今渦口東岸是後周書曰賀蘭祥太祖以涇渭漑灌之處渠堰廢毀乃命祥修造冨平堰開渠引水東注於洛功用旣畢民􅀗其利唐書張守珪爲都督􅀲州也地多沙磧不冝稼穡毎年少雨以雪水漑田至是渠堰盡爲賊所毀旣地少林木難爲修葺守珪設􅀕祈禱經􅀫而山水􅁀至大漂材木塞澗而流直至城下守珪使取充堰於是水道復舊晉後略曰張方圍京邑决千金堰水溝渠枯涸井多無泉鄴中記曰當魏文侯時西門豹爲鄴令堰引漳水激鄴以冨魏之河南後史起爲鄴令引漳水十二渠灌漑於魏田數百頃魏益豊實後廢堰田荒魏時更修通天井堰鄴城西靣漳水十八里中細流東注鄴城南二十里中作二十堰語林曰陳恊數曰輙進阮歩兵酒一壷後晉文王修九龍堰阮舉恊文王用之掘地得古承水銅龍六枚堰遂成也魏郡圖經曰愜山古堰也今謂之愜山即漢成帝時河決金堤盖於此運土以塞河頗愜當時人心故謂之爲愜山在今魏縣西戴延之西征記曰金􅈆谷三水合處有千金堨音曷即魏陳思王所立引水東灌民今頼之又九州要記洛陽千金堨傍有九龍祠存又地理書曰􅂖水出爲湖溝置千金堰以堰之太平御覽卷第七十三
