front:
  text: 太平御覽卷第七百一十七
  hash: sha256:9a2bfdeb0af0a178ee3560271ba93c4eeea840926e778af848605c56ff5fe5c6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_717-1a}
body:
  text: 服用部一十九鏡鏡臺奩合多羅嚴器鏡釋名曰鏡景也有光景也廣雅曰鍳謂之鏡玄中記曰尹壽作鏡大戴禮曰武王踐祚鏡之銘曰見尔前必慮尔後尚書帝命期曰桀失其玉鏡用之噬虎鄭玄注曰鏡喻清明之道虎喻􅁀也尚書考靈耀曰􅁗失金鏡魚目入珠金鏡喻明道也始皇不韋子言乱真也詩鄘栢舟曰我心匪鍳不可以茹鍳所以察形茹度也漢書東方朔傳曰郭舎人曰四銖籕文章皆有組索兩人相見朔能知之爲上客朔曰此玉之塋石之精表如日光裹如衆星兩人相覩見相知情此名爲鏡魏略曰夏侯惇從征吕布爲流矢所中傷左目時夏侯淵俱爲將軍軍中號惇爲肓夏惇􅁖之毎照鏡恚發􅂺撲鏡着地蜀志曰張􅁉曉相術毎舉鏡視靣自知刑死未甞不撲之于地沈約宋書曰劉敬宣八歳䘮母四月八日敬宣見衆人􅈅佛乃抜頭上金鏡以爲母􅈅因悲泣不勝又曰殷仲文在東陽照鏡而不見其頭靣旬日而戮又蕭方等三十國春秋曰甘卓將􅀍誅引鏡不見其頭又曰慕容垂攻鄴符丕遣其從弟龍請救乃遺謝玄青銅鏡黄金宛轉䋲等以爲之信齊書曰綦母珎之有一銅鏡背有三公字常語人云徴祥如此何患三公不至又曰陸慧暁遷太子洗馬廬江何􅀧常稱慧暁心如照鏡遇形觸物無不朗然梁書曰王珎國武帝起兵東昏召珎國以衆還都使岀屯朱雀門爲王茂所敗及入城宻遣郄纂奉明鏡獻成於梁帝帝断金以報之後侍宴帝曰卿明鏡尚存昔金何在珎國曰黄金謹在臣不敢失墜又曰到漑子鏡字圎照􅀄在孕其母夢懐鏡及生因以名焉隋書曰文帝委任髙頻後右衛將軍龐晃及將軍盧賁等前後短熲於上上怒之皆􅀍踈黜因謂頻曰獨􅀌公猶鏡也毎􅀍磨瑩皎然益明唐書曰太宗謂群臣曰夫以銅爲鏡可以正衣冠以古爲鏡可以知興替以人爲鏡可以明得失朕常保此三鏡以防巳過今魏徴殂猶一鏡亡矣莊于曰至人之用心也若鏡不將不迎應而不藏故勝物而無傷符子曰心能善知人如明鏡善自知者如淵蚌鏡以曜明故鍳人蚌以含珠故内照韓子曰古之人目短於自見故以鏡􅀚靣智短於自知故以道正巳鏡無見庇之罪道無明過之惡靣失鏡則無以正􅁂眉身失道則無以知迷惑吕氏春秋曰人之阿甚矣而無所鏡其殘亡無日矣孰當可鏡其唯士人乎鏡明巳也細士明巳也大淮南子曰明鏡之始矇然未見形容也及拭之以玄錫磨之以白氊則􅁂眉微毛可得而察又曰鏡便於照形承食不如竹簟又曰聖人若鏡不將不迎將送也應而不倡故萬化無傷其得之乃失之也又曰髙懸大鏡坐見四隣取大鏡髙懸盆中水晃見四隣又曰人莫鍳於沬雨而鍳於止水者以其静也沬需潦上沬起言其濁也莫窺形於生鏡而窺形於明鏡者以其易也抱朴子内篇曰或問知將來􅁻凶爲有道乎荅曰用鏡九寸自照有所思存七月則神仙千里事也明鏡用一或二謂之日月或用四謂之四規鏡又曰萬物之老者其精皆能假託人形以炫人於鏡中不能易其眞形是以入山道士以明鏡徑九寸懸於背有老魅未敢近或後來者視鏡中其是仙人及山中好神者鏡中故如人形蜀王本紀曰武都大夫化爲女子蜀王娶以爲夫人無幾物故葬於武都以石作鏡一枚表其墓魏名臣髙堂隆奏曰陽符一名陽燧取火於日隂符一名隂燧取水於月並八銅作鏡名曰水火之鏡東宫舊事曰皇太子納妃有着衣大鏡尺八寸銀花小鏡尺二寸􅃮匣盛蓋銀華金薄鏡三枚銀龍頭受福蓮華鈎鏁四副魏武帝上􅄂物䟽曰御物有尺二寸金錯鏡一枚皇太子􅄂純銀錯七寸䥫鏡四枚貴人至公主九寸䥫鏡四十枚鄴中記曰石虎三人臺及内宫中鏡有徑二三尺者純金蟠龍雕飾丗說曰晉孝武將軍講孝經謝公凡弟與諸人私相講習車武子苦問謝謂􅀽羊曰不問則德音有遺多問則重勞二謝􅀽曰何嘗見明鏡疲於屢照益部􅂄舊傳曰杜眞孟宗周覧求師經歷齊魯資用將乏磨鏡自給南蛮獠人俗曰諸婚姻以奴婢一人爲娉無奴婢以銅鏡當人婢呉興郡記曰臨安縣東石鏡山山東有石鏡一徑二尺四寸甚清亮山謙之尋陽記曰廬山東靣有一石若鏡懸崖明净照見人形海内士品曰徐孺子甞事江夏黄公黄公薨往㑹其葬家貧無以自致賫磨鏡具自隨賃磨取資然後得前旣至􅀕而退荀恱申鍳曰君子三鍳鍳乎前鍳乎下鍳乎鏡前惟人訓人惟明啇德之衰不鍳於湯禹也周秦之弊不鍳於羣下也側弁垢顔不鍳於明鏡也古今注曰平帝元始三年延陵西園神寢内御户座前大鏡皆清液如汗水岀􅃺西京雜記曰髙祖入咸陽宫周行府庫有方鏡九寸表裏明人直來照之影則側見以手掩心而來即腸胃五藏歷然無礙人有病在内則掩心而照之即知病之所在女子有邪心則膽張心動􅁗始皇帝以照宫人膽張心動者則殺之又曰宣帝􅀍収繫郡邸獄臂上猶帶史良娣合綵婉轉䋲繫身毒寳鏡一枚如八銖錢舊傳此鏡照見妖魅佩之者爲天神所福宣帝從危獲濟及紹大位每持此鏡感咽移辰帝崩鏡不知所在拾遺録曰周穆王時渠國貢火齊鏡廣三尺六寸闇中視物如晝人向鏡語鏡中則響應之也又曰周穆王時有如石之鏡此石色白如月照面如雪謂之月鏡又曰方丈山池泥百錬成金鏡色青可照魑魅洞􅁳記曰望蟾閣上有青金鏡廣四尺元光年中祗國獻此鏡照見魑魅百鬼不能隱形列仙傳曰􅀒局先生􅀒石磨鏡局徇呉中衒摩鏡得一錢因磨之神仙傳曰河東孫愽能引鏡爲刀屈刀爲鏡劉根別傳曰思形􅃺可以長生以九寸明鏡照靣熟視之令自識巳身形常令不忘乆則身神不散疾患不入搜神記曰孫䇿旣殺于􅁻每獨自􅿂髴見在其左右引鏡自照見在鏡中因掊大呌瘡皆裂湏􅁷而死又呉曆曰䇿爲許貢客所傷引鏡自照曰靣如此當可復建功立事乎因椎几大呌瘡裂而卒續搜神記曰文獻文獻王道謚曽令郭璞筮巳一年中􅁻凶璞曰當有小不􅁻利可取廣州二大甖盛水置床帳二角名曰鏡耗以厭之某時撤甖去水如此其災可消至日忘之尋失銅鏡不知所在後撤去水乃見所失鏡在於甖中甖口數寸鏡大尺餘王公後令筮鏡甖之意璞云撤甖違期故致此妖邪魅所爲無他故也使燒車轄以擬鏡立出又曰林慮山下有一亭人過􅀫者或病或死常云十許男女各雜衣或白或黒輙來爲害有郅伯夷者過􅀫於此獨坐誦經忽有十餘人來與伯夷並坐因共蒲􅀶於是伯夷宻以鏡照之乃是一群犬因執燭而起佯誤以燭燒其衣毛乃樵伯夷懷刀投一人中之遂死成犬餘悉走去神異經曰昔有夫婦將別破鏡人執半以爲信其妻與人通其鏡化鵲飛至夫前其夫乃知之後人因鑄鏡爲鵲安背上自此始也幽明録曰宫亭湖邊傍山門有石數枚形圎若鏡明可以鑑人謂之石鏡後有行人過以火燎一枚至不復明其人眼乃失明地鏡圗曰欲知寳所在地以大鏡夜照見影若光在鏡中者物在下也風角要占曰厭盗賊法三月以小形銅鏡七枚埋於申地秤七百斤􅁟覆之坎深二尺五寸廣二尺五寸築令堅固孟逹與劉封書曰天地􅀄生如鏡陸機與弟雲書曰仁壽殿前有大方銅鏡高五尺餘廣三尺二寸立着庭中向之便冩人形體了了亦怪也􅁗嘉與婦徐淑書曰頃得此鏡旣明且好形觀文藻丗所希有意甚愛之故以相與明鏡可以鑒形淑荅書曰今君征未旋鏡將何施行明鏡鑒形當待君至􅀓咸鏡賦曰從隂位於清啇採秋金之剛精醮祝融以致度命歐冶而是營晞日月之光烈儀厥象乎曜靈鏡臺丗說曰温嶠爲劉越石長史北討劉聦得玉鏡臺嶠從姑劉氏有女羙嶠有意自媒數日乃下玉鏡臺姑喜既婚交禮女曰我固疑是老奴果如所卜也三國典略曰胡太后使沙門靈昭造七寳鏡臺合有三十六戸每室别有一婦人手各執鏁才下一􅀜三十六户一時自閉若抽此􅀜諸門皆啓婦人各出戸前魏武雜物䟽曰鏡臺出魏宫中有純銀叅帶鏡臺一純銀七貴人公主鏡臺四晉東宫舊事曰皇太子納妃有玳􅈘鈿鏤鏡臺一宋起居注曰元嘉中韋朗爲廣州刺史作銅鏡臺一具御史中丞劉禎請以事追免朗官謝眺詩曰玲瓏􅀋丹檻􅀌髙似玄闕對鳯臨清水乗龍掛明月照粉拂紅粧挿花理雲髮玉顔徒自見畏見君情歇古詩曰􅃢瑚掛鏡爛生光奩後漢書曰隂太后崩明帝性孝愛追慕無巳謁原陵帝從席前伏御牀視太后鏡奩中物感慟悲涕令易脂澤裝具左右皆泣莫能仰視焉拾遺記曰隂貴人食􅀲羙帝使求之時有燉煌獻異􅀲云是空峒靈􅀲又常山獻巨桃及后崩侍者見鏡奩中有瓜桃之核視之涕零也列仙傳曰朱崖令死當還法内珠於􅀜者死其繼母弃其繫臂珠其男年九歳好之置鏡奩中皆不知也至海􅀜吏収得十枚乃母子争死吏遂弃而遣之事具義門語林曰范汪至能噉梅人致一斛奩噉湏􅁷盡也蔡邕表曰賜鏡奩等前後重疊父母於子無以加此魏武上雜物䟽曰純銀藻豆奩純銀括摟奩孫仲􅀉妹臨亡書曰鏡與粉盤與郎香奩與若欲令其行身如明鏡純如粉譽如香合宋元嘉起居泣曰廣州刺史韋朗􅀍彈事有金鏤合二枚銀鏤合二枚劉向别傳曰向有合賦祖台之志怪曰呉中有王大夫行至曲阿回塘上有一女子便留住􅀫解臂上金合繫其肘下令暮更來遂不至更使尋求都無女人過猪欄邊見猪鉀有合多羅纂文曰多羅粉噐扶南傳曰扶南國王以純金多羅遺毗騫王嚴器魏武内嚴器誡令曰􅀌不好鮮飾嚴具用新皮葦笥以黄葦縁中遇亂丗無葦笥乃更作方竹嚴具以皂韋衣之麁布裹此􅀌平常之用者也内中婦曾置嚴具于時爲之推壞今方竹嚴具縁􅃮甚華好魏武上雜物䟽曰油􅃮􅀞嚴器一純金叅帶􅀞方嚴器一齊書曰冝都王鏗鎭姑熟于時人發桓温女冢得金巾箱織金篾爲嚴器條以啓聞鬱林勑以賜之鏗曰今取徃物後取今物如此循環尓豈可不熟念使長史蔡約自徃脩復纎毫不犯北史后妃傳曰舊儀司飾三人掌簮珥花嚴脩復山陵故事曰梓宫用嚴器五具馬齒嚴器五具汝南先賢傳曰戴良嫁女以笥爲嚴器􅁗嘉婦與嘉書曰今奉嚴器中物幾具陸雲與兄機書曰按行視曹公器物嚴器方六七寸髙四寸太平御覽卷第七百一十七
