front:
  text: 太平御覽卷第三百八十七
  hash: sha256:31a007cb7155b1d5ca82e18b35be55c447f2cb6af97954ef922ecb7fdc940dae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_387-1a}
body:
  text: 人事部二十八黒子汗唾洟淚欠啑黒子漢書曰髙祖左股有七十二黒子又賈􅁩傳曰今淮陽之北大諸侯僅如黒子之著靣不足以有所禁禦范曄後漢書曰黃昌字聖眞遷蜀郡太守昌􅀄爲州書佐其婦寧於家遇賊􅀍獲遂流轉入蜀爲民妻其子犯事乃詣昌訟昌疑母不􅀋蜀人因問所由云夲㑹稽黃昌妻也嘗爲賊所掠至此昌驚曰何以識黃昌邪曰昌左足心有黒子常自言當至二千石昌乃出足示之因相持泣還爲夫妻楚國先賢傳曰來陽頋紹字伯蕃年十八爲郡門下幹迎太守許荆視荆蹠下而􅀏荆怒問之紹曰見明府蹠下有黒子紹足亦有之欣而故􅀏汗說文曰汗身液也釋名曰汗􅗭也出其衣􅗭􅗭然易渙卦曰渙汗其大號史記曰蘇􅁗說齊王曰臨淄舉􅃑成帷揮汗成雨東觀漢記曰光武詔曰平陽丞李善稱故令范遷於張堪令人靣熱汗出其賜堪家雜繒百疋以表廉吏獻帝傳曰舊儀三公領兵見令虎賁執刃扶之曹操頋左右汗流背自後不敢復朝請江表傳曰孫權即尊位請㑹百官歸功周瑜張昭舉笏欲褒賛功德未及言權曰如張公計今巳乞食矣昭大慙伏地汗出魏志曰􅀄太和中中護軍蔣濟上䟽宜遵古封禪詔曰聞濟斯言使吾汗出流足王隱晉書曰華表字偉容平原髙唐人侍中石苞朝出表問國家何如苞曰武帝更生也表聞汗出沾背晉書曰大司馬桓温來朝頓丘新亭召侍中王坦之吏部尚書謝安石將害之坦之恐將欲出奔謝安止之曰晉祚存亡在此一行君何所逃旣見温坦之前大懼蒼惶倒執手板汗流沾衣安石後至從容髙視良乆坐定謂温曰安聞諸侯有道守在四方明公何湏壁後置人温􅀏曰不能不尓遂却兵歡語移日而罷續晉陽秋曰桓玄甞詣㑹稽王道子道子巳醉對􅀇張眼屬四㘴云桓温作賊玄見此辭􅀔難測伏席流汗長史謝重歛板正色曰故大司馬公廢昏立明功全社稷風塵之論宜絶聖聽唐書曰張又新等搆李紳貶端州司馬朝臣表賀又至中書賀宰相及門門者止之曰請少留縁張􅀘闕在齋内與相公談俄而又新揮汗而出旅揖羣臣曰端溪之事又新不敢多讓人皆辟易憚之淮南子曰今夫傜者揭钁鍤負籠土傜役也籠受土籠也鹽汗交流喘息薄喉白汗鹹如鹽故曰鹽風俗通曰傳曰后稷觸冬墾田流汗而種田不生者人力非不至天時不與丗說曰鍾毓鍾㑹少有令譽年十三魏文帝聞之召見問毓曰卿何汗曰戰戰惶惶汗出如漿復問㑹卿何不汗對曰戰戰慄慄汗不敢出又曰桓公旣廢太宰父子仍上表欲除之簡文手荅書云所不忍言况過於言桓又重表簡文復手荅云􅀂使晉祚靈長明公便應奉行此詔􅀂大運去矣請避賢路桓公讀詔手戰汗流於此而止語林曰何晏羙姿容明帝見之謂其􅀓粉賜之湯餅晏食之汗出流靣以巾拭之色轉皎然揚雄長楊賦曰髙祖鞮鍪生蟣虱甲胄􅀍沾汗左思齊都賦序曰連祍有雲覆之隂揮汗有雨洒之濡又呉都賦曰流汗霡霂則中逵泥濘司馬遷書曰毎念斯耻汗未嘗不發背沾衣唾說文曰唾口液也左傳文下曰晉文公獲􅁗三師文羸請之先軫朝問􅁗囚公曰夫人請之吾舎之矣先軫怒曰武夫力而拘諸原婦人蹔而免諸國隳軍實而長寇讎亡無日矣不顧而唾史記曰孟嘗旣廢而復用馮驩迎之未到孟甞君太息曰文嘗好客遇客無所敢失文一日廢皆背文而莫顧文者如復見靣文必唾靣戰國䇿曰趙太后新用事􅁗急攻之求於齊曰必以長安君爲質兵乃出大臣強諌太后謂左右曰復言長安君爲質者老婦必唾其靣沈約宋書曰僕射謝景仁性矜嚴整㓗居宇清麗每唾左右人衣事畢即聽澣濯毎欲唾左右爭來受之趙書曰石虎娉崔氏爲夫人無寵所愛鄭夫人有百日女病謂崔與藥以告後石虎作威問之崔言外舎見小子以少唾其容作實非藥也後石乃射之一箭通中而死􅁗記曰符㓪渡江嘗與朝士宴集時賢並机蓐壷席㓪欲誇之唾則令小児跪而張口就唾而含出坐者爲不及之逺矣吕氏春秋曰齊莊公之時有士曰賔卑聚夢有壯士白縞之􅃣練布之衣素屨黒劒從而叱之唾其面􅅥然而寤徒夢也終坐不決明日召其友而告之曰吾少好勇無所挫辱今夜辱吾將索之得之則可不得將死每朝立于衢三日不得退而自刎又曰伍貟出奔過鄭問許公許公東向唾貟知所歸矣乃奔呉莊子曰蚿謂虵曰子見夫唾者乎噴則大者如珠小者如霧􅄂而下者不可勝數也風俗通曰彭祖壽年八百􅀊猶恨唾逺周生列子曰人君其尊重矣音聲振於金玉咳唾甘於醴泉九州春秋曰公孫瓉曰始天下兵起吾謂其唾掌可决樊英别傳曰樊英旣見陳畢西南向唾天子問其故對曰成都今日失火後蜀郡太守上火災言時雲雨從東北來故火不爲害列仙傳曰丁次卿欲還峨眉山語主人云當相爲作􅃮以甖十枚盛水覆口從唾之一日日乃發皆成􅃮神仙傳曰樊夫人者劉綱妻也俱行道術各自言勝綱唾盤中水即成鯉魚夫人唾盤中水成􅆩食魚與試術事事不如述異記曰有人乗舡從下流還縣有一人通身黃衣擔兩籠黃􅀲求􅀉載之黃衣人乞食舡主與之舡適至岸下仍唾盤上徑上岸直入去舡主取向食器視之見盤上唾悉是黄金列異傳曰南陽宗定伯年少時夜行逢􅀑問􅀑所忌􅄦荅云唯不喜人唾伯便擔􅀑着頭上急持行之徑至市中下着地化爲一羊賣之􅂲其變化唾之得錢五千幽明録曰漢武帝在甘泉宫有玉女降嘗與武帝圍碁相娯女風姿端正帝宻恱乃欲逼之玉女唾帝靣而去遂病瘡經年故漢書云避暑甘泉宫此其時也趙壹嫉邪賦曰􅀔家多所宜欬唾自成珠披􅄄懷金玉蘭蕙化爲蒭洟淚淚事巳多見在泣篇說文曰洟鼻液也周易離卦曰六五出涕沱􅀂戚嗟􅀂􅁻毛詩鄁栢舟曰之子于歸逺送于野瞻望弗及泣涕如雨又谷風大東曰眷言頋之潜焉出涕禮記檀弓上曰孔子合葬於防封之崇四尺孔子先反門人後雨甚至孔子問曰尓來何遟也曰防墓崩孔子􅊄然流涕曰吾聞之古不脩墓又曰孔子至衛遇舊館人之喪入而哭之哀出使子貢脫􅆖而賻之子貢曰脫􅆖於舊館無乃巳重乎夫子曰予嚮者入而􅂘之遇一哀而出涕予惡夫涕之無從也小子行之又曰將軍文子之喪旣除喪而後越人來吊主人衣練􅃣待于廟垂涕淚又内則曰父母唾洟不見輒刷去之左傳襄四曰孟孫卒臧孫入哭甚哀多涕出其御曰孟孫之惡子也而哀如是季孫􅀂死其􅀂之何公羊傳哀公曰西狩獲麟孔子曰孰爲來哉孰爲來哉反􅃑拭靣涕沾􅂁何休注曰􅃑衣􅁭史記曰蘇􅁗說􅄦谷先生淚下沾􅁭東觀漢記曰來歙蓋延攻公孫述蜀人大懼使客刺歙未死馳告蓋延延見歙悲哀不能仰視歙叱曰欲屬以軍事而乃効兒女之涕泣乎又曰更始害齊武王光武飲食語􅀏如平常獨居輒不御酒肉枕蓆有涕泣處蕭子顯齊書曰魚復侯子嚮字雲音丗祖第四子也死時年二十二上隣子嚮死後遊華林見猨對樹跳子鳴上留目乆之因嗚咽流涕崔鴻後燕録曰􅁗宦人光祚先入晉晉以祚爲河北郡至是來歸慕容垂見祚流涕曰秦主知我理深吾事之亦盡淮南之敗吾効忠節每思疇昔之頋未嘗不中霄忘寢祚亦歔欷又曰慕容熈符后卒制百寮於宫内設位哭令沙門素服使有司按檢哭者有淚以爲忠孝無則罪之於是羣臣振懼莫不含辛以爲淚焉尸子曰曽子每讀喪禮淚下沾􅁭又曰費子陽謂子思曰吾念周室將滅涕泣不可禁也子思曰然今一人之身憂丗之不治而涕泣不禁是憂河水濁而泣清也邴原傳曰原五㓜􅀌過學舎而泣師曰何泣原曰􅀌者易感夫學者皆有父母也一則􅂋其不􅀌二則􅂋其學故惻然涕零師哀原曰欲書取書不湏費也管寜别傳曰寜身長八尺龍顔秀目每􅀕未嘗不伏地流涕三齊略曰鄭司農常居其城南山中教受黄巾亂乃遣生徒崔琰諸賢於此揮涕而散所居山下草如薤葉長尺餘許堅紐異常時人各爲康成書帶丗說曰晉元帝過江飲酒王茂弘與帝有舊流涕諌之帝許之從是遂斷語林曰王太保作荆州有二兒亡一兒還葬舊塋一兒留葬太保垂涕曰不忘故郷仁也不戀夲土逹也唯仁與逹吾二子有焉素問曰肝液爲淚欠釋名曰欠嶔也開張其口脣嶔嶔然說文曰欠張口出氣也禮記曲禮曰侍坐於君子君子欠伸撰杖屨視日之蚤暮侍坐者請出矣又内則曰在父母舅姑之所不敢欠伸跛􅀝睇視宋元嘉起居注曰尚書僕射孟顗於後堂勑見亢聲大欠有違儀禮􅀍劾詔無所問􅅉音帝釋名曰嚏聲乍嚏而出也毛詩衛風曰窹言不寐願言則嚏禮記月令曰季秋行夏令則人多齀嚏又内則曰在父母舅姑之所不敢􅎪噫􅅉咳也􅎪於越切噫於界切咳開代切太平御覽卷第三百八十七
