front:
  text: 太平御覽卷第三十四
  hash: sha256:3ec86e3fded085e2938f6b41bfbc4a592439ee49e60dafb30e4f1f03a7399fec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_034-1a}
body:
  text: 時序部十九熱寒􅀬釋名曰􅀬爇也如火之燒􅅡也或曰暑煑也如煑物也􅀃文曰溽濕暑也易曰暑往則寒來書曰哲時燠􅀂又曰豫􅁪燠􅀂君行逸豫常暖順之詩曰誰能執􅀬逝不以濯禮曰季夏之月土潤溽暑鄭􅀇注曰潤溽塗漏又曰仲春行夏令則國乃大旱煖氣早來又曰仲秋行夏令則其國火災寒􅀬不節漢書曰􅄢賔國武帝時剽殺漢使成帝時復遣使奉獻謝罪杜欽􅀃大將軍王鳯不令使上聲使去聲向􅄢賔國曰此國道經大小頭痛之山赤􅁟身􅀬之坂令人頭痛歐吐唐書曰代宗時有迎凉草鳯首木迎凉草幹如竹葉細於杉乾枯而未嘗凋落盛暑而刺之䆫户間則凉風自至易稽覽圖曰夏至之後三十日極温京房易飛􅀱曰有雲大如車蓋十餘此陽水之氣必暑有暍者暍音謁禮斗威儀曰君喜怒無常時則常熱五經通義曰冬至陽動於下推隂而上之故大寒於上夏至隂動於下推陽上之故大􅀬於上故易云日月運行一寒一暑日在牽牛則寒在東井則暑牽牛外宿逺人故寒東井内宿近人故温也白虎通曰夏至隂始起反大􅀬何隂起陽氣推而上故大􅀬也又曰至人神矣入大澤不濡焚而不能􅀬也又曰暍者反凍於冷風管子曰善爲國者使農寒耕而􅀬耘淮南子曰􅀬焦沙寒凝水抱扑子曰洪從祖仙公毎大醉及夏天盛熱輙入深淵之底一日許乃出以能閉氣胎息故耳又曰或問不􅀬之道或服玄冰丸或服飛雪散㓜子伯王仲都用此方也桓子新論曰元帝􅀍病廣求方士漢中送道人王仲都者詔問所能對曰但能忍寒暑耳因爲待詔至夏大暑日使暴坐又環以十鑪鑄火不言熱而身不汗出益州記曰瀘水即武侯渡處水有熱氣暑不敢行廣志曰南方炎洲炎氣薫數萬里爲寒瘴又曰南方地暑􅀬交阯麥不成秀䔉不生蕪菁無根括地圖曰天毒國最大暑􅀬夏草木皆乾死民善没水以避時暑常入寒泉之水語林曰劉眞長見王丞相時盛夏王公以腹熨彈棊局曰何乃渹吴人以冷爲渹渹音楚敬切劉旣出人問見王公如何對曰未見他異唯作吴語耳山海經曰壽林之國爰有大暑不可以徃丗􅀃曰荀奉倩與婦至篤冬月婦病􅀬倩乃出庭中自取冷還以身熨之黄帝素問曰黄帝問歧伯曰人傷於寒而轉爲􅀬何也曰夫寒盛則生於􅀬也楚招魂辭曰東方不可託些些語􅂇蘇賀切十日代出流金鑠石些鑠銷也言東方有扶桑之木十日並在其上其熱酷烈金石堅剛皆爲銷鑠也彼皆集之魂往必釋些釋解也魂徃必解爛宋鮑昭苦熱行曰赤坂撗西阻火山燃南威身􅀬頭且痛鳥墮魂未歸湯泉發雲澤燋煙起石沂日月有􅁪昬􅀨霧未嘗晞丹虵踰百尺􅀇蜂盈十圍含沙射流影吹蠱病行暉瘴氣晝燋體露夜沾衣飢猿莫暇食晨禽不敢飛毒􅁋尚多死渡瀘寜具㫵病也生軀蹈死地昌志登禍機魏王粲大暑賦曰或赫㸍以癉炎或鬱術而燠蒸獸狼望以􅀝喘鳥垂翼而弗翔根生苑而焦炙豈含血而能當仰庭槐而嘯風風旣生其如湯氣呼吸以祛短汗􅀨下而沾裳就清泉以自沃猶淟涊而不凉體煩茹以於悒心憤悶而窘惶又曹植大暑賦曰大暑赫其遂蒸元服革而尚黄虵拒鱗於靈窟龍解角於皓蒼遂乃温風赫㸍草木垂幹山拆海沸沙融礫爛飛魚躍渚潜黿浮岸鳥張翼以逺栖獸交逝而雲散晉傳咸感凉賦曰踐朱明之中月暑􅊊隆以肇興赫融融以彌熾乃沸海而焦陵稽含困􅀬賦序曰夫閏於夏則崇暑在冬則増寒永熈元年閏在仲夏三伏之節始奏啇秋之辰未期余以下里貧生居室卑陋小巷不來清風短廡不足增䕃外困流汗内懷煩暵歎彼夏屋之士口饜珎味體逸髙廊並天而寒暑殊同丗而憂樂異卞伯玉大暑賦曰體沸灼乎如燎汗流瀾􅀆珠連程曉詩曰平生三伏時道路無行車閉門避暑卧出入不相過今丗能襶能音柰襶音戴子觸􅀬到人家主人聞客來頻就子六切柰此何謂當行起去安坐止跘跨跘音盤跨音誇所說了無急􅊱吟一何多疲倦向之以甫問居極郍摇扇臂中疼流汗正澇沲莫謂此小事亦是人一瑕傳戒諸髙明􅀬行冝見呵晉傳􅀇詩曰朱明運將極溽暑晝夜興裁動四支廢舉身􅀂山陵珠汗洽玉體呼吸氣鬱蒸塵垢自成􅅺素粉隨手凝魏曹植九詠曰温風翕􅀆煎沙石翕􅀬皃也鳥罔竄􅀆獸無蹠蹠之石切足履踐也言天煖石焦地熱鳥無所逃獸無所蹈履也寒釋名曰寒捍也捍格也􅀃文曰寒也從雨執聲􅏮清寒也丁念切書曰休徴謀時寒􅀂咎徴急􅁪寒􅀂孔安囯曰君能謀則時寒順之君行急則常寒順之又曰冬祁寒小民亦惟曰怨咨詩曰一之日觱發風寒也二之日栗列寒氣也又曰北風刺虐也衛國並爲威虐百姓不親莫不相携持而去焉北風其凉􅀨雪其滂北風寒凉之風也滂盛貌也箋云寒凉之風病害萬物諭君政教酷􅁀使民散亂而去禮記曰天地嚴凝之氣始於西南而盛於西北此天地之義氣也又月令曰仲春行秋令則寒氣惣至又曰季冬之月命有司大儺旁磔以送寒氣鄭􅀇曰丑爲牛言歲正者也送猶畢也又曰九月中氣是月也霜始降則百工休謂膠􅃮作停乃命有司曰寒氣惣至人力不堪其皆入室霜降後清風戒寒所以令人入室又曰孟冬行夏令則國多􅁀風巽爲風立夏巽用事故行夏令則多暴風方冬不寒夏氣干時方冬而温蟄虫復出虫以寒蟄温而復出又曰大寒之日雞始乳鴈北嚮又曰是月也乃命有司曰寒氣緫至民力不堪其皆入室又曰季春行冬令則寒氣時發草木皆肅又曰孟冬行夏令則國多􅁀風方冬不寒蟄虫復出傳曰楚莊王圍蕭申公巫臣曰師人多寒王廵三軍拊而勉之三軍之士皆如挾纊史記曰須賈見范睢曰今叔何事范睢曰臣爲人傭賃須賈意哀之留與坐飲食曰范叔寒如此哉乃取一綈􅂁以賜之漢書曰上聞韓王信降匈奴上將擊之連戰乗勝逐北至樓煩㑹大寒士卒墮指者十二三又曰邴􅁻爲廷尉時有老人年八十餘無子妻死娶後妻生一子而翁老死其子年數歳有前妻女曰非我父之胤遂上聞􅁻曰吾聞老人之子而不耐寒日中無影遂令驗之皆如其言又曰晁錯上書曰夫胡貉之地積隂之處也木皮三寸文潁曰土地寒故也冰厚六尺食肉而飲酪其人宻理鳥獸毳毛其性能音耐寒又曰王莽天鳯四年八月莽親之南郊鑄作威斗鑄日大寒百官人馬有凍死者又曰雲南郡有熊倉山特寒四月五月中猶積雪皓然謝承後漢書曰盛夏多寒韋彪上䟽諌曰臣聞治政之夲必順隂陽伏見立夏以來當暑而寒迨刑罰刻急郡國不時令之所致也東觀漢記曰王郎起兵上自東南馳夜至無蔞亭時天寒冽衆皆飢疲馮異上豆粥明旦上謂諸將曰昨得公孫馮異字公孫豆粥飢寒俱解續漢書五行志曰獻帝􅀄平四年六月寒風如冬時又曰和光六年冬大寒北海東萊瑯邪井中冰厚尺餘大有年又窮谷之地固隂冴寒趙書曰汲桑六月盛暑重裘累茵使人扇之患無清凉斬扇者軍中謂之謡曰奴爲將軍何可羞六月累茵披貂裘不識寒暑斬人頭易稽覽圖曰冬至之後三十日極寒京房易妖占曰春夏寒政教急又京房傳曰有德遭險兹謂逆命厥異春寒秋運斗樞日行失則雖當燠反寒春秋考異郵曰繆公即位仲夏大寒冰錯亂甚也老子曰躁勝寒靜勝􅀬文子曰婦人當年不織天下有受其寒者尸子曰雨雪楚莊王􅀍裘當户曰我猶寒彼百姓賔客甚矣乃使廵國中求百姓賔客之無居􅀫絶粮者賑之國人大恱又曰朔方之寒冰厚六尺木皮三寸北極左右有不釋之冰晏子曰景公時雪三日公􅀍狐白裘晏子入公曰恠哉雨雪三日不寒晏子曰古之賢君飽而知人飢暖而知人寒公曰善出裘發粟以與飢寒者又曰景公起火臺歳寒􅃥人凍餒者有焉管子曰大寒大暑大風大雨其至不時此謂四刑淮南子曰北方有北極之山曰寒門積寒所在故曰寒門又曰夏䖝不可與語寒蜩蟬不知寒雪又曰青女天神青女玉女仲春二月之夕乃閉其寒吕氏春秋曰衛靈公天寒鑿池宛春曰天寒恐傷民公曰寒哉春曰君衣狐裘坐熊席取火是故不寒民衣弊不苴君則不寒民則寒矣公曰善命罷􅃥左右曰是德必歸於春不可公曰春而有之善乃寡人之善也衛人恱當時謂公得君道矣又曰冬之德寒又曰見瓶水之冰而知天下之寒淮南子又載也國語曰火見而清風戒寒火心星青風寒風也清風至而脩城郭戰國䇿曰田單爲齊相過淄水有老人渉淄而寒不能行單乃解裘衣與之襄王曰單之厚施欲取我國乎有貫珠者聞之曰不知因以爲巳下令曰寡人憂民之寒單解裘衣與之稱寡人意於是閭里相與語曰單之愛人乃王之教也周書時訓曰小寒之日鴈不北嚮民不懷主鵲不始巢國家不寧雉不始雊國乃大水大寒之日雞不乳淫女亂男鷙鳥不厲國不除兵水澤不堅言乃不從􅀃苑曰國有五寒而水凍不與焉一曰政外二曰女廣三曰謀泄四曰不敬卿士而國敗五曰不能治内而務外此五者一見惟禍無福桓譚新論曰元帝時漢中送道人王仲都能忍寒乃於盛寒日令􅃝衣載以駟馬於昆明池上環水而走御者厚衣狐裘甚寒而仲都獨無變色此耐寒也方言曰􅕼寒也論衡曰􅀃寒温者曰人君喜則温怒則寒又曰河東項曼都好道學仙去家三年而反曰去時有數仙人將上天離月數里而上月之旁其寒凄凄穆天子傳曰天子遊黄室之丘日中大寒􅀨雪有凍死人天子作黄竹詩以􅉖之􅁑仙公別傳曰公與客談語時天大寒仙公謂客曰居貧不能人人得鑪火作請一大火共致暖者仙公因吐氣火赫然從口出湏􅁷火滿屋客皆􅀬脫衣孝子傳曰閔子騫事後母絮騫衣以蘆花御車寒失紖父怒笞之後撫背之衣單父乃去其妻騫啓父曰母在一子寒母去三子單石虎别傳曰十三年春二月虎率三公九卿躬耕籍田后率二夫人命婦先蠶近郊是歳八月雨雪大寒行旅凍死鐘離意别傳曰嚴遵昔與光武俱爲諸生暮夜宿息二人寒不得寢卧更相謂曰後日豪貴憶此勿相忘別後數年光武有天下徴遵不至也西京雜記曰淮南王好方士士皆以術見嘘吸爲寒暑劉向别録曰燕地寒谷不生五榖鄒衍吹律以暖之乃生禾􅁰因名􅁰谷廣志曰挹樓國城寒人多穴居也又曰北方寒冰厚三尺地凍入一丈氣出口爲凌馬首常創洪範五行傳曰秦始皇九年四月寒凍民有死者又曰聽不聦事不謀厥罰􅁪寒晉朝􅄂事曰永寧二年十二月大寒凌破河橋又曰大興四年大寒傷民冰厚時王敦肆亂殺戮忠良神異經曰北方有増冰萬里厚百丈下有鼷䑕在冰下􅁟中其形如䑕食冰草肉重萬斤作脯食之巳􅀬其毛長八尺可以爲褥卧之可以却寒又曰東南方海中烜興逺切洲上有湖其中唯有鯽魚長八尺食之冝暑而辟風寒㝷陽有林湖鯽魚大二尺餘食之肥美可以巳寒黄帝素問曰地氣上爲寒太公金匱曰武王伐紂紂駐洛邑天隂寒雨雪十餘日漢張奐與延篤書曰太隂之地冰厚三尺木皮三寸風寒冽肌傷骨但以非老憊者所堪而復加之以師旅因之以飢饉衆艱罄集不可一二而言也後漢張衡思􅀇賦曰逼區中之隘陋􅀆將北度而宣遊宣遍也行積冰之皚皚􅀆清泉泫而不流冴凍也寒風凄其永至􅀆拂穹岫之騷騷􅀇武縮於殻中􅀆騰虵􅁈而自糾􅀛與虵交曰􅀇武也魚矝鱗而并凌􅀆鳥登木而失條凌氷也晉潘岳寡婦賦曰夜漫漫以悠悠􅀆寒凄凄以凛凛魏應璩新詩曰嵐山寒折骨面目盡生瘡嵐山􅆧中山名傳玄詩曰季冬時􅃤烈猛寒不可勝嚴風截人耳素雪隨地凝牀上飛霜起波中自生冰未夕結重衾崇朝不敢興又陸機樂府苦寒行曰北遊幽朔城凉野多嶮難俯入穹谷底仰陟髙山盤凝冰結重澗積雪􅀍長巒隂雲與巖側悲風鳴樹端不覩白日景但聞寒鳥喧猛虎慿林嘯􅀇猿臨岸歎平聲夕宿喬木下􅃤愴􅁪尠歎渇飲堅冰漿飢噉零露飡又連珠曰沉寒凝海不能結風琴操曰曽子嘗耕於泰山之下遭天􅀨雪寒凍旬日不得歸乃作憂思歌也宋􅀽淑七言詠寒雪曰渚幽寒􅀆石烟聚日華收􅀆山氣深邊亭哀􅀆夜燧滅孫松振􅀆空岫吟魚戢鱗􅀆鳥矝翰虹蟄火􅀆龍藏金太平御覽卷第三十四
