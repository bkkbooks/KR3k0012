front:
  text: 太平御覽卷第五百四十六禮儀部二十五
  hash: sha256:d4a17840b41364a2a7400b0fa419cf2255293470a31b5ff309cd597548900593
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_546-1a}
body:
  text: 居䘮奔䘮訃告奪情居䘮禮記曲禮曰居䘮未葬讀䘮禮旣葬讀􅀕禮䘮復常讀樂章爲礼各於其時居䘮不言樂又曲禮曰居䘮之禮頭有瘡則沐身有瘍則浴有疾則飲酒食肉疾止復􅀄不勝䘮乃比於不慈不孝勝任也又檀弓上曰穆公之母卒使人問於曽子曰如之何對曰申也聞諸申之父曰哭泣之哀齊斬之情麋粥之食自天子逹又曰始死充充如有窮旣殯瞿瞿如有求而弗得旣葬皇皇如有望而弗至練而􅁣然祥而廓然子路有姉之䘮可以除之矣而弗除也孔子曰何弗除也子路曰吾寡兄弟而不忍也孔子曰先王制禮行道之人皆弗忍也子路聞之遂除之子思哭㛐也爲位礼雖無服為位而哭夫子善之曽子曰小功不稅追服爲稅則是逺兄弟終無服也而可乎曽子曰䘮有疾食肉飲酒必有草木之滋焉以爲薑桂之謂曽子曰所云草木之滋者薑桂也又檀弓下曰子張問曰書云髙宗三年不言言乃歡有諸時人君無行三年之䘮礼者􅂬喜恱也言乃喜恱則民臣望其言乆也仲尼曰胡爲其不然也古者天子崩王世子聽於􅃁宰三年􅃁宰大官又曰顔丁善居䘮顔丁魯人始死皇皇焉如有求而弗得及殯望望焉如有從而弗及旣葬􅁣焉如不及其返而息此三者孝子哀慕之情也又檀弓曰孔子在衛有送葬者而夫子觀之曰善哉爲䘮乎足以爲法矣小子識之子貢曰夫子何善爾也曰其徃也如慕其反也如疑慕謂小兒隨父母啼呼疑者哀親之在後如不欲還然又檀弓上曰孔子旣祥五日彈琴而不成聲哀未忘也十日而成笙歌踰月且異旬也祥者凶事用逺曰五日彈琴十日笙歌除由外也彈琴以手笙歌以氣也孔子與門人立拱而尚右二三亦皆尚右効孔子也孔子曰二三子之嗜學也我則有姉之䘮故也二三子皆尚左又曰孟獻子禫縣而不樂比御而不入可以御婦人矣尚未復寑孟献子魯大夫仲孫蔑也夫子曰獻子加於人一等矣加猶踰也又檀弓下曰樂正子春之母死五日而食曰吾悔之勉強過禮子春曽子弟子自吾母死不得吾情我惡乎用吾情惡乎猶於何也又王制曰三年之䘮自天子逹下通庶人父母同也天子諸侯降其也於庶人䘮從死者􅀕從生者又曽子問曰父母之䘮弗除可乎以其有終身之憂也孔子曰先王制禮過時不舉非禮也非不能勿除也患其過制也故君子過時不􅀕禮也又􅄂記曰凡䘮服未畢有弔者則爲位而哭拜踊客始來主人不可以殺礼待之大夫之哭大夫弁絰大夫與殯亦弁絰弁絰者大夫錫衰相弔之服也如爵弁而素加環絰曰弁絰大夫有􅀻䘮之葛則於其兄弟之輕䘮亦弁絰又曰有父之䘮如未没䘮而母死其除父之䘮也服卒事反䘮服􅃿猶竟也除服謂詳􅀕之服也卒事旣􅀕反䘮服服後死者之服雖諸父昆弟之䘮如當父母之䘮其除諸父昆弟之䘮也皆服其除䘮之服卒事反䘮服雖有視之大䘮猶爲輕服者除骨肉之恩也唯君之䘮不除􅀻服言當者期大功之䘮或終始皆在三年之中小功緦麻則不除殤長中乃除又曰子貢問䘮子曰敬爲上哀次之瘠爲下顔色稱其情戚容稱其服問䘮問居父母之䘮也折䘮常哀言敬爲上者疾時尚不能敬也容威儀也孝經曰容止可觀請問兄弟之䘮子曰兄弟之䘮則存乎書䇿矣言䟽者如禮行之未有加也齊斬之䘮哀容之躰經不能載矣君子不奪人之䘮重䘮禮也亦不可奪䘮也不可以輕之於巳也孔子曰少連大連善居䘮三日不怠三月不懈其悲哀三年憂東夷之子也言其生於夷狄而知禮也怠惰也解倦也又曰三年之䘮言而不語對而不問廬堊室之中不與人坐焉在堊室之中非時見乎母也不入門言巳事也爲人􅀃爲語在堊室之中以時事見乎母乃後入門則居廬時不入門䟽哀皆居堊室不廬廬嚴者也言廬哀敬之處非有其實則不居又􅄂記曰懸子曰三年之䘮如斬朞之䘮如剡言其痛之惻怛有淺􅀷也期之䘮十一月而練十三月而祥十五月而禫曽申問於曽子曰哭父母有常聲乎曰中路嬰兒失其母焉何常聲之有又間傳曰斬衰何以服苴惡貌也所以首其内而見諸外也斬衰貌􅀂苴齊衰貌􅀂枲大功貌􅀂止小功緦麻容貌可也此哀之發於容體者也有大憂者面必黎黒止謂不動於喜樂之事也枲或爲似斬衰之哭􅀂徃而不反齊衰之哭􅀂徃而反大功之哭三曲而偯小功緦麻哀容可也此哀之發於聲音者也三曲聲而二折斬衰唯而不對齊衰對而不言大功言而不議小功緦麻議而不及樂此哀之發於言語者也議謂陳􅀃非時事也斬衰三日不食齊衰二日不食大功三不食小功緦麻再不食三不食爲明旦朝也再不食謂如死一不食始歛時一不食也故父母之喪旣殯食粥朝一溢米暮一溢米齊衰之䘮􅂼食水飲不食菜果大功之䘮不食醯醬小功緦麻不飲醴酒此哀之發於飲食者也父母之䘮旣虞卒哭􅂼食水飲不食菜果期而小祥食菜果又朞而大祥有醯醬中月而禫禫而飲酒始飲酒者先飲醴酒始食􅁏者先食乾肉父母之䘮居􅀝廬寢苫枕塊不脫經帯齊衰之䘮居堊室苄翦不納大功之䘮寢有席小功緦麻牀可也此哀之發於居處者也又奔䘮曰聞逺兄弟之䘮旣除䘮而后聞䘮免􅃝成踊拜賔則尚左手小功緦麻下稅者也雖不服猶免祖尚左手􅁻拜也又問䘮曰親始死雞斯徒跣扱上袵交手哭惻怛之心痛疾之意傷腎乾肝焦胰水漿不入口三日不舉火故鄰里爲之糜粥以飲食之親父母也雞斯當爲笄纚聲之謨也親始死去冠二日乃去笄括髪也今時始䘮者邪巾貊頭䈂纚之存象也又䘮服四制曰父母之䘮衰冠繩纓菅屨三日而食粥三月而沐期十三月而練冠三年而祥比終兹三節者仁者可以觀其愛焉知者可以觀其理焉強者可以觀其志焉又三年問曰三年之䘮何也稱情而立文因以飾羣别親踈貴賤之節而弗可損益也故曰無易之道稱情而立文者稱人情輕重而制其禮也創鉅者其日乆痛甚者其愈遟三年者稱情而立文所以爲至痛極也斬衰苴杖居􅀝廬食粥寢苫枕塊所以爲至痛飾也三年之䘮二十五月而畢哀痛未盡思慕未忘然而服以是斷之者豈不送死有巳復生有節也哉凡生天地之間者有血氣之屬必有知有知之屬莫不知愛其􅀋今是大鳥獸則失䘮其羣匹越月踰時則必返廵過其故郷廻翔焉鳴號焉躑䠱焉踟蹰焉然後乃能去之小者至於鷰雀猶有啁噍之頃焉然後乃能去之故有血氣之屬者莫知於人於其親也至死不窮則三年之喪二十五月而畢􅀂駟之過􅂩然而遂之則是無窮也故先王爲之立中制節壹使足以成文理則釋之矣立中制節謂服紀使有年月之限者也然則何以至朞也言三年之義如此則何以有降至於朞者父在父在爲母服朞上曰至親以期斷是何也曰天地則巳易矣四時則巳廢矣其在天地之中者莫不更始焉以是象之也然則何以三年也曰加隆焉􅈛也焉使倍之故再朞也䘮三年以爲隆緦麻小功以爲殺雖情不至制以此服所以立法期九月以爲間間之在三年之下緦麻小功上也隨情輕重處之上取象於天下取法於地中取則於人人之所以羣居和壹之理盡矣取象於天地所謂法其變易也自三年以至緦麻皆歳時之數左氏傳襄上曰晏桓子卒晏纓麤縗斬斬不緝也麄三升布苴經帶杖菅屨苴麻之有子者菅草履也食粥居􅀝廬寢苫枕草此禮與士禮略同此異唯枕草其老曰非大夫之禮時之所行士及大夫縗服各有不同晏子時爲大夫行士禮其家臣不解故機曰唯卿爲大夫家語曰子夏問曰居君子之母與妻之䘮如之何孔子曰居處言語飲食􅋲􅈛於䘮所則稱其服而巳敢問伯叔母如之何曰伯母叔母䟽衰朞踊不絶地姑姊妹之功踊絶於地􅀂知此者由文矣哉由文矣哉言知禮之意也南史曰王秀字伯􅁬㓜時祖父敬弘愛其風采仕宋爲太子舎人父卒廬於墓側服闋復職梁書曰到漑遭母憂居䘮盡禮所處廬開方四尺毀瘠過人服闋猶􅂼食布衣者累載又曰孔奐爲儀曹侍郎遭母憂時天下䘮亂皆不能終三年䘮唯奐及呉國張種在冦亂中守法度並以孝聞奔䘮禮記奔䘮曰奔䘮之禮始聞親䘮以哭荅使者盡哀問故又哭盡哀遂行日行百里不以夜行唯父母之䘮見星而行見星而舎侵晨冒昏行者盖欲從速􅀂未得行則成服而後行過國至境哭盡哀而止哭避市朝望其國境哭至於家入門左􅂛自西階殯東西靣坐哭盡哀括髪祖奔母之䘮西靣哭盡哀括髮祖降堂東即位西卿哭皆如奔父之禮下堂東至孝子堂所住處婦人奔䘮􅂛自東階殯東西靣坐􅂘盡哀東髽即位與主人拾踊拾更也主人與之更踊盡哀而􅂘者賔客待之也又曰奔䘮者不及殯先之墓北靣哭盡哀主人之待之也即位於墓左婦人墓右成踊盡哀括髪東即主人位絰絞帶哭成踊拜賔反位成踊又曰􅀂所爲位家逺則成服而徃齊衰望郷而哭大功望門而哭小功至門而哭緦麻即位而哭奔䘮哭親䟽逺近之差也訃告禮記􅄂記上曰凡訃於其君曰君之臣某死訃或作赴赴至也臣死其子使人至君所告也父母妻長子曰君之臣某之某死此臣於其家䘮所主者君訃於他國之君曰寡君不禄敢告於執事夫人曰寡小君不禄太子之䘮曰寡君之􅃴子某死君夫人不稱薨告也國君譁也大夫訃於同國敵者曰某不禄訃於士亦曰某不禄訃於他國之君子曰君之外臣寡大夫某死訃於敵者曰吾子之外􅀻寡大夫某不禄使某實敵謂有爵者實當爲至也士訃於同國大夫曰某死訃於士亦曰某死訃於他國之君曰君之外臣某死訃於大夫曰吾子之外􅀻某死於士亦曰吾子之外􅀻某死白虎通曰天子崩訃告諸侯者何縁臣子哀痛憤滿無能不告諸人者也諸侯欲聞之當持土地所出以供䘮事故禮曰天子崩遣使者訃告諸侯又曰諸侯薨使臣歸瑞珪於天子者何諸侯以瑞珪爲信今死矣嗣子諒闇歸之者讓之義也天子聞諸侯薨哭之何􅃤怛發中哀痛之至也使大夫弔之追逺重終之義又曰臣死亦訃告君何此君哀痛於臣子也君欲聞之當加􅉠賵之禮故春秋曰蔡侯考父卒卒訃而葬不告諸侯薨訃告鄰國何縁鄰國欲有禮也奪情禮記曽子問曰子夏問三年之䘮卒哭金革之事無避也禮與􅀄有司與疑有司使之然孔子曰夏后氏三年之䘮旣殯而致事殷人旣葬而致事致事還其職位於君記曰君子不奪人之親亦不可奪親也此之謂乎子夏曰金革之事無避也者非與孔子曰吾聞諸老聃曰昔魯公伯禽則有爲爲之今以三年之䘮從其利者吾不知也東觀漢記曰桓焉爲大傅以母憂自乞聽以大夫行踰年詔賜牛酒奪服即拜光禄大夫遷太常後漢書曰耿恭征踈勒時母卒及還追行䘮制有詔使五官中郎將齎牛酒釋服奪情不令追服又曰趙喜代虞延行太尉事遭母憂上䟽乞身行䘮禮顯宗不許遣使者爲釋服賞賜思寵甚渥漢􅄂事曰翟方進爲丞相遭後母䘮行服三十六日起視事曰不敢踰國家也呉志曰孫權詔曰夫三年之䘮天下達制人情之極痛也賢者制哀以從禮不肖勉而致之也治道巳㤗上下無事君子不奪人情故三年逮孝子之間至於有事則殺禮以從冝要絰而處事故聖人制法有禮無時不行䘮不奔非古也蓋隨時之冝以義斷恩也前故設科長吏在官當須交代而故犯之雖隨糺坐猶以廢曠方事之殷國家多難凡在官司冝各盡節先公後􅀻而不恭承甚非謂也中外羣僚其更平議務令得中節度丞相顧雍奏從大辟其後呉令孟宗䘮母奔赴巳而自拘於武昌以聽刑戮陸遜陳其素行因爲之請減宗等後不得以爲比自此遂絶風俗通曰謹案禮臣有大䘮三年不呼其門太平御覽卷第五百四十六
