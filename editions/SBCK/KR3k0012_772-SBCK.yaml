body:
  text: 車部一叙車上釋名曰古者車聲如居言所以居人也今曰車車舎也行者所處􅀂居舎也又曰黄帝造車故號軒轅氏說文曰車輿輪惣名象形也軒曲周璠車也軿車輅小車也輊車也輈兵車也輊䧟陣車也輦一輪也輿車軨前横木也䡝於􅀽切大車後掩也輦大車駕馬也䡝引車轟車聲易曰大車以載積中不敗又曰賁其趾舎車而徒又曰上九􅢦􅀌見豕􅀒塗載􅀑一車書曰五載一廵狩羣后四朝敷奏以言明試以功車服以庸又曰武王戎車三百兩虎賁三百人與受戰于牧野作牧誓至牧地至誓衆又曰酒誥妹土嗣爾股肱純其藝􅁰稷奔走事厥考厥長肇牽車牛逺服賈用孝養厥父母農功旣畢始牽車牛載其所有易求所無逺行賈賣用其所得異珍孝養其父母又蔡仲之命曰惟周公位冢宰正百工百工百官羣叔流言乃致辟管叔于啇囚蔡叔于郭鄰以車七乗詩曰我送舅氏曰至渭陽何以贈之路車乗黄乗黄白馬􅁗康公作是詩送重耳歸晉又曰何彼穠矣棠棣之華曷不肅雍王姬之車又曰公車于乗朱英緑縢又曰戎車孔愽徒御無斁又曰君子之車旣庶且多又曰子有車馬弗馳弗驅又曰役車其休又曰有棧之車行彼周道又曰命彼後車謂之載之又曰我任我輦我車我牛又曰擇有車馬以居徂向鄭箋云擇民之在車馬者徃居于向又曰其車旣載乃弃爾輔又曰旣岀我車旣挾我侯又曰脩爾車馬謹爾戎兵又曰間􅀜之車牽兮牽音轄又曰戎車旣飾徒御無繹又曰戎車旣安如輊如軒輕陟利灱車前重軒後重也禮曰乃擇元辰天子親載耒耜置之車右率公卿諸侯大夫躬耕籍田又曰乃教田獵以習五戎班馬政命僕夫七騶咸駕載旌旐授車以級整設于屏外有司搢朴北靣以誓之又曰大夫七十而致仕􅀂不得謝則必賜之几杖行役以婦人適四方乗安車自稱曰老夫又曰夫爲人子者三賜不及車馬又曰獻車馬者執䇿綏旌武車綏旌徳車結旌又曰前有車􅀐則載飛鴻又曰車驅而騶至于大門君撫僕之手而顧命車右就車門閭溝渠必歩又曰君車將駕則僕執䇿立於馬前君岀就車則僕并轡授綏又曰客車不入大門又曰祥車曠左又曰乗君之乗車不敢曠左右必式又曰國君不乗竒車又曰車上不廣欬不妄指又曰問士之冨以車數對問庶人之冨數畜以對也又曰君之適長殤車三乗公之庶長殤車一乗大夫之適長殤車一乗又曰五十無車者不越疆而弔人又曰有􅀂曰晏子一狐裘三十年遣車一乗及墓而反國君七介遣車七乗大夫五介遣車五乗晏子焉爲知禮又曰赴車不戢櫜丘不戢示當報以告䘮之辭言之謂還吿於國櫜甲衣韔弓衣又曰大夫殺則止佐佐䡛止則百姓田獵佐車䡱送之車也又曰有發則命大司徒教士以車甲乗兵專衣甲之儀有發謂有軍師之發卒又曰有圭璧金璋不鬻於市命服命車不鬻於市宗廟之器不鬻於市犠牲不鬻於市戎器不鬻於市用器不中度不鬻於市兵車不中度不鬻於市鬻賣也又曰曽子問曰古者師行必以遷廟主行乎孔子曰天子廵狩以遷廟主行載于齊車言必有尊也今也取七廟之主以行則失之矣齊車金路也又曰曽子問曰古者師行無遷主則何主孔子曰主命問曰何謂也孔子曰天子諸侯將出必以幣帛皮圭告于祖禰遂奉以岀載于齊車以行毎舎奠焉而后就舎以脯􅊽禮神乃敢即安所告而不以岀即埋之又曰苟有車必見其軾茍有衣必見其敝又曰其爲賔則公舘復私館不復其在野則升其乗車之左轂以其綏而復私館則卿大夫之家也不私之復爲主人之惡又曰武王克殷反啇未及下車而封黄帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於􅂎封殷之後於宋封王子比干之墓釋箕子囚使之行啇容而復其位庶民㢮禁庶士倍禄濟河而西馬散之華山之陽而弗復乗牛散之桃林之野而弗復服車甲衅音釁而藏之府庫而弗復用又曰大夫以布爲輤音舊而行至於家而說輤載以輲車入自門至於阼階下而說車舉自阼階升適所殯又曰國主待客出入三積餼客於舎五牢之具陳於内米三十車禾三十車周禮春官下曰巾車掌公車之政令又考工記曰輿人爲車輪圜者中規方者中矩立者中縣衡者中水直者如生焉繼者如附焉治材也如生如木從地生附如木之附􅀍也輈人爲輈輈車轅也國馬之輈深四尺七寸田馬之輈深四尺駑馬之般輈深三尺有三寸軫方象地蓋圎象天輪輻三十象日月蓋弓二十有八以象星行澤欲短轂短轂則利行山欲長轂長轂則安又曰巾車云服車五乗􅀌乗下􅂐以五綵􅀞轂約也卿乗夏縵五綵􅀞無􅂐也大夫乗墨車不􅀞者也士乗棧車不革輓而􅃮之也庶人乗役車方箱可載任器以供役自􅀌巳下之妻亦各得乗其夫之車也又曰王后五輅一曰重翟錫靣朱緫二曰厭翟勒靣繢緫三曰安車彫靣鷖緫四曰翟車具靣組緫有握五曰輦車組輓有翣羽蓋王之䘮車五乗一曰木車始遭喪乗也二曰素車卒􅂘所乗三曰薻車旣練所乗四曰駹車旣祥所乗五曰􅃮車既禫所乗其卿大夫士􅀄喪三年者乗堊齊衰素車大功藻車小功駹車緦麻􅃮車又曰王后有安車翟車五乗木車素車藻車駹車服車五乗􅀌乗夏􅂐卿乗夏縵大夫乗墨車士乗棧車庶人乗役車散車其用無常又考工記曰一器而工聚者車爲多傳曰太叔將襲鄭夫人將啓之公聞其期曰可矣命子封帥車三百乗以伐京又曰鄭伯之車僨于濟又曰北戎侵鄭鄭伯禦之患戎師曰彼徒我車懼其侵軼我也又曰公孫閼與潁考叔爭車潁考叔挾輈以走子都拔􅁄以逐之子都公孫閼也又曰秋大閲簡車馬也又曰􅋐丹獲其戎車與其戎右少師又曰天王使家父來求車非禮也諸侯不貢車服天子不􅀻求財諸侯自常職貢又曰使公子彭生乗公公薨于車公魯桓公也又曰公怒公齊襄公也曰彭生敢見射之豕人立而啼公懼墜于車傷足喪屨反誅屨於徒人費又曰南宫長萬奔陳以乗車輦其母一日而至又曰衆車入自純門及逵市又曰齊侯使公子無􅃜帥車三百乗甲士三千人以戍曹又曰元年革車三十乗季年乃三百乗又曰車說音脫其輹火焚其旗不利行師敗于宗丘又曰戒爾車乗敬爾君事又曰晉車七百乗韅靷鞅靽又曰及甲車四百六十乗俘二百五十人又曰兵車百乗文馬百駟又曰趙盾爲旄車之族又曰鄭人卜行成不􅁻卜臨于大宫且巷出車􅁻又曰趙旃弃車而走林屈蕩􅅮之又曰晉人懼二于魏錡趙㫋之怒楚師也使軘車逆之又曰遂疾進師車馳卒奔又曰登諸樓車使呼宋人而告之又曰禽之而乗其車旣􅀗其人因釋巳車而載所􅀗者車又曰張侯曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事又曰邴夏曰射其御者君子也公曰謂之君子而射之非禮也射其左越于車下射其右斃于車中又曰綦母張喪車從韓厥曰請寓乗又曰丑父使公下如華泉取飲鄭周父御佐車宛茂爲石載齊侯以免又曰茍有險余必下推車子豈識之乎然子病矣又曰楚子登巢車以望􅀳軍巢車車上爲櫓又曰叔山冉謂養由基曰雖君有命爲國故子必射乃射再發盡殪叔山冉􅅮人以投中車折軾􅀳師乃止又曰狄虒彌建大車之輪而䝉之以甲以爲櫓狄虒彌櫓人也蒙覆也櫓大楯又曰巳酉師于牛首鄭地􅀄子駟與尉上有爭將禦諸侯之師黜其車禦牛首師也黜減損遂弗使獻不使獻所􅀗又曰子西聞盗不儆而岀子西公孫夏子駟子尸而追盗先折尸而逐賊盗入於北宫乃歸授甲臣妾多逃噐用多喪子産聞盗子國子爲門者置守門庀羣司閉府庫完守備成列而後岀兵車十七乗尸而攻盗於北宫子蟜帥國人助之殺尉止子師僕盗衆盡死又曰鄭人賂晉侯以師悝師觸師蠲皆樂師名廣車軘車淳十五乗甲兵備廣車軘車皆兵車名淳禺也凡兵車百乗他兵車及廣軋共百乗又曰魯人莒人皆請以車千乗自其郷入又曰齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而䟽陳之斥候也䟽建旄旗以陳爲陳民衆也又曰使乗車者左實右僞以斾先輿曳柴而從之以陽塵齊侯見之畏其衆也乃脫歸又曰旣食之使御廣車而行廣車兵車巳皆乗乗車乗車安車又曰丁亥葬諸士孫之里士孫人姓因名其里四翣不􅵖下車七乗不以兵甲下車送葬之車齊舊依上公禮九乗又有甲兵今皆降損又曰六月鄭子展子産帥車七百乗伐陳霄突陳城又曰賦車籍馬賦車兵車也兵甲士也又曰大夫逆於境者逆迎也迎衛侯執其手而與之言道逆者自車揖之逆於門者領之而巳領摇其頭言衎驕心易生又曰齊慶封來聘其車羙孟孫謂叔孫曰慶季之車不亦羙乎季慶封之字叔孫曰豹聞之肥羙不稱必以惡終羙車何爲又曰獻車於季武子羙澤可以鑑展莊叔見之曰車甚澤人必瘁冝其亡也又曰王聞羣公子之死也王楚靈也自投于車下曰人之愛其子也亦如余乎侍者曰甚焉小人老而無子知擠干溝壑矣擠墜也又曰治兵于郝南甲車四千乗三十萬人又曰叔向曰寡君有甲車四千乗在雖以無道行之必可畏也况其率道其可敵之公羊傳曰夏四月公㑹紀侯于郕秋八月壬午大閲大閱者何簡車徒也大簡閲兵車使可任用而習之又曰宋公與楚子期以乗車之會公子目夷諫曰楚夷國也彊而無義請君以兵車之㑹徃宋公曰不可吾與之約以乗車㑹自我爲之自我墮之曰不可終以成乗車以㑹徃楚人果伏兵車執宋公以伐宋又曰晉卻缺帥師革車八百乗以納接菑于邾婁力沛􅀂有餘沛有餘貌七􅆖乗有車右有御者又曰秋蒐于紅蒐者何簡車徒也楚衆也穀梁傳曰兵車之會四未嘗有大戰也愛民也以兵車㑹而不用兵伐也論語曰􅂛車必正立執綏車中不内顧不疾言不親指大戴禮曰王􅂛車則聞和鸞之聲是以非僻之心無自入也在衡爲鸞在軾爲和馬動而鸞鳴鸞鳴而和應其聲曰和則敬此仰之節也上車以和鸞爲節下車以珮玉爲度禮斗威儀曰山車垂勾福草生宗廟中松栢爲常山車者自然之車句者曲也不揉治而自貟曲故言垂孝經援神契曰徳至山陵則山岀根車根車應載養萬物也家語曰孔子適衛子矯僕靈公與夫人小子同車岀令䆠者雍渠􅆖乗使孔子爲次連遊過市孔子耻之又曰孔子曰自南宫敬叔之乗我車也而道加行又曰三尺之限空車不能登峻故天子郊乗乗車貴其質也車則有左右車而無左右則亂於車矣史記曰孝文帝岀趙同參乗􅀽盎伏車前曰臣聞天子所與共六尺輿者皆天下英豪今漢雖乏人獨奈何與刀鋸人載於是上􅀏下同同泣而下車又曰封禪爲蒲輸車惡傷土石草木又曰􅁗王収穰侯之印使歸陶自使縣官給車牛以從千乗有餘到􅀜閱其寳器􅈿恠多於王室漢書曰田千秋年老上令朝見得乗小車入宫殿中故目號車丞相又曰王莽造四輪車駕六馬力士三百人黄衣赤幘軛音厄上人擊鼓輓音晚者呼登倦莽岀令在前百官竊言此似轜車非僊物也後漢書曰􅀽閎二弟忠弘節操皆亞於閎忠字正甫與同郡范滂爲友俱證黨事得釋􅀄平中爲沛相乗葦車到官以清亮稱及天下亂忠弃官客㑹稽上虞縣也又曰江革字次翁齊國臨菑人少失父獨與母居遭天下亂賊盗並起革􅀒母逃難備經阻險常採拾以爲養數遇賊或刧欲將去革輙涕泣求哀言有老母辭有足感動人者賊以是不忍犯之或乃指示避兵之方遂得俱全于難轉客下邳窮貧祼跣行傭以供母革以母老不欲摇動自在轅中輓車不用牛馬由是郷里稱之曰江巨孝又曰井丹字大春建武末沛王輔等五王皆好亮賔客請丹不能致信陽侯隂就光烈皇后弟也令左右進輦丹􅀏曰吾聞桀駕人輦豈非此邪帝王丗紀曰桀以人駕車坐中皆失色就不得己而仐去輦自是隱蔽不閞人事以壽終又曰􅀶士張佚帝稱善曰欲置傳者以輔太子也今􅀶士不難正朕况太子乎即拜佚爲太子傅而以桓榮爲少保賜以輜車乗馬榮大㑹諸生陳其車馬印綬曰今日所䝉賜稽古之力也可不勉乎又曰馬援平南越封爲新息侯援乃擊牛釃所綺切酒勞饗軍士從容謂官屬曰吾從弟少游常哀吾慷􅁣多大志曰士生一代但取衣食裁足乗下澤車太平御覽卷第七百七十二
