body:
  text: 文部六銘銘志附七辭連珠銘釋名曰銘者述其功羙可稱名也禮記􅀕統曰銘者論譔其先祖之有德善功烈勲勞慶賞聲名列於天下而酌之􅀕器自成其名焉以祀其先祖者也顯楊先祖所以崇孝也身比爲順也明示後丗教也夫銘者一稱而上下皆得焉耳矣是故君子之觀於銘也旣羙其所稱又羙其所爲爲之者明足以見之仁足以與之智足以利之可謂賢矣賢而勿伐可謂㳟矣故衛孔悝之鼎銘曰六月丁亥公假於太廟公曰叔舅乃祖莊叔左右成公成公乃命莊叔隨難於漢陽即宫于宗周奔走無射啓右獻公獻公乃命成叔纂乃祖服乃考文叔興舊􅄝欲作率慶士躬恤衛國其勤公家夙夜不解民咸曰休哉公曰叙舅子汝銘􅀂纂乃考服悝拜稽首曰對􅀭以辟之勤大命施于蒸彛鼎此衛孔悝之鼎銘也古之君子論撰其先祖之羙而明著之後丗者也以比其身以重其國家如此子孫之守宗廟社稷者其先祖無羙而稱之是誣也有善而弗知不明也知而弗傳不仁也此三者君子之所恥也周禮夏官上司勲職曰司勲掌六卿賞地之法以等其功賞地賞田也在逺郊之内屬六卿馬等由羌也以功大小爲差王功曰勲成王業若周公者也國功曰功保全國家􅀂伊尹也民功曰庸施法於民􅀂后稷也事功曰勞以勞定國􅀂禹者也民功曰力制法成治􅀂咎繇也戰功曰多克敵出竒􅀂韓信陳平者也司馬法曰上多前虜也凢有功者銘於王之太常􅀕於大烝司勲詔之銘之言名也生則書於王旌以識其人與其功也死則於烝先王􅀕之詔謂告其神以辭也般庚告其卿大夫曰兹予大享于先王爾祖其從與饗之是也今漢􅀕功臣於廟庭周禮冬官考工記曰鬴銘曰時文思索允臻其極銘刻之也時是也允信也瑧至也極中也言是文德之君思求可以爲民立法者而作此量信至於道之中嘉量旣成以觀四國以觀示四方使放象之永啓厥後兹器維則永長也厥其也兹此也又長啓道其子孫使法則此器長用之王隱晋書曰張載字孟陽隨父牧在蜀作劒閣銘刺史張敏表之天子命刻石於劒閣崔鴻十六國春秋後趙録曰勒徙洛陽晷影於褒國銘佐命功臣三十九人于函置于建德前殿劉璠梁典曰天監六年帝以舊國漏刻乖舛乃勑貟外郎祖暅治漏成命太子舎人陸倕爲文其序曰乃詔臣爲銘按倕集曰銘一字至尊所改也唐書太宗幸河北觀砥柱因勒銘於其上以陳盛德穆天子傳曰天子觀舂山之上乃爲銘䟽於􅀇圃之上以貽後丗謂勒石銘功德大戴禮曰武王踐祚三日召士大夫而問焉曰惡有藏之約行之萬丗可以爲子孫者乎師尚父曰在丹書王欲聞之則齋矣三日端冕師尚父端冕奉書而入則􅀒屏而立王下堂南面而立父曰先王之道不北面王行西折而東面而立師尚父西面道書之言曰敬勝怠者􅁻怠勝敬者滅義勝欲者從欲勝義者凶以仁得之以仁守之其量百丗以不仁得之以仁守之其量十丗以不仁得之以不仁守之必及其丗王聞書之言􅅥然􅀂恐懼而爲誡書於席之四端爲銘焉太公金匱曰武王曰吾隨師尚父之言因爲愼書銘隨身自誡其冠銘曰寵以着首將身不正遺爲德咎書履曰行必慮正無懷僥倖書劒曰常以服兵而行道德行則福廢則覆書鏡曰以鏡自昭則知􅁻凶書車曰自致者急載人者緩取欲無度自致而反皇覽記隂謀黄帝金人器銘曰武王問尚父曰五帝之誡可得聞乎尚父曰黄帝之戒曰吾之居民上也揺揺恐夕不至朝故爲金人三封其口曰古之愼言堯之居民上也振振如臨􅀷淵舜之居民上也慄慄恐夕不見旦武王曰吾并殷民居其上也翼翼懼不敢息尚父曰德盛者守之以謙威彊者守之以恭武王曰欲如尚父言吾因是爲誡隨之身孔子家語曰孔子觀周遂入太祖后稷之廟廟當右階之前有金人焉三緘其口而銘其背曰古之愼言人也誡之哉無多言無多事多言多敗多事多害安樂必誡無所行悔勿謂何傷其禍將長勿謂何害其禍將大勿謂不聞神將伺人熖熖弗滅炎炎􅀂何㳙㳙不壅終爲江河綿綿不絶或成網羅綿綿微細􅀂不絶則有成網羅者也豪末不札如豪之未言微者札拔也將㝷斧柯誠能愼之福之垠也口是何傷禍之門也強梁者不得其死好勝者必遇其敵盗憎主人民怨其上君子知天下之不可上也故下之知衆人之不可先也故後之温㳟愼德使人慕之執雌持下人莫踰之人皆趨彼我獨守此人皆惑之我獨不徙内藏乃智不示人技我雖尊髙人弗我害唯能於此也江海雖左長於百川以其卑也天道無親甞與善人誡之哉戒之哉孔子旣讀斯文也頋謂弟子曰小子志之此言實而中情而信詩云戰戰兢兢戰戰恐也兢兢戒也如臨深淵恐墮如履薄冰恐䧟行身如此豈口過患哉孫卿子􅀃苑又載也又孫楚反金人銘曰昔太廟左階之前有石人焉大張其口而書其胷曰我古之多言人也無少言無少事少言少事後生何述焉我頌三墳五典八索九丘賾罔深而不探理無奥而不鈎故言滿天下而無口尢夫唯言立乃可長乆胡不愧然生鍼其口自拘廣庭終身义手孔子家語曰孔子觀於魯桓公之廟見欹器焉欹傾孔子問於守廟者曰此何器也對曰宥坐之器子曰吾聞宥坐之器虚則欹中則正滿則覆明君以爲至誡常置於坐側也子路進曰敢問持滿有道乎子曰聦明叡智守之以愚功􅀍天下守之以讓勇力振丗守之以怯冨有四海守之以謙後之君子感誡之至追而作銘楊子法言曰或問銘曰銘哉銘哉有意於愼也文心雕龍曰昔軒轅帝刻輿以弼違太禹勒筍􅒶以招諌成湯盤盂著日新之規武王户席題必誡之訓周公愼言於金人仲尼革容於欹器列聖鑒戒其來乆矣故銘者名也觀器必也正名審用貴乎愼德盖臧武仲之論銘也曰天子令德諸侯計功大夫稱伐夏鑄九牧之金周勒肅愼之楛令德之事也吕望銘功於昆吾仲山鏤績於庸器計功之義也魏顆紀勳於景鍾孔悝表勤於衛鼎稱伐之􅀋也􅀂乃飛廉有石槨之錫雲公有奪里之謚銘發幽石噫可恠也趙靈勒跡於潘吾􅁗昭刻傳於華山夸誕示後吁可􅀏也詳觀衆例銘義見矣至於始皇勒岳政暴而文澤亦有踈通之羙焉􅀂乃班固燕然之勒張旭華隂之碣序亦成矣蔡邕之銘思燭古全橘公之鍼則吐納典譽朱穆之鼎全成碑文溺所長也至如敬通新器矱淮武銘而事非其物繁略違中崔駰品物讃多戒少李尤積篇義儉辭碎􅆱􅀛神物而居􅀶弈之下衡斛嘉量而在杵臼之末曾名品之未暇何事理之能閑哉魏文九寳器利辭鈍惟張載劒閣其才清彩迅足駸駸後發前至銘勒㟭漢得其冝矣文章流別傳曰夫古之銘至約今之銘至煩亦有由也質文時異則旣論之矣且上古之銘銘於宗廟之碑蔡邕爲楊公作碑其文典正末丗之羙者也後世以來器銘之佳者有王莽鼎銘崔瑗机銘朱公叔鼎銘王粲硯銘咸以表顯功德天子銘嘉量諸侯大夫銘太常勒鍾鼎之義所言雖殊而令德一也李尤爲銘自山河都邑至于刀筆符契無不有銘而文多􅁾病討而潤色言可采録三輔决録曰何敞字文髙爲汝南太守帝南廵過郡郡有刻鏤屏風帝命侍中黃香銘之曰古典務農彫鏤傷民忠在竭節義在脩身事見黃香集銘志附西京雜記杜子夏葬長安北四里臨終作文曰魏郡杜鄴立志忠欵犬馬未陳奄先朝露骨肉歸於后􅁟魂氣無所不之何必古丘然後即化封於北郭山焉晏然處死乃命刋名埋於墓前種松栢五株至今茂盛西京雜記滕公駕至陳都門馬鳴跪不肯前以足跑地乆之滕公懼使卒掘其所跪之地深二尺得石槨滕公以燭照之有銘乃以水洗之其文字古異左右莫能知問叔孫通通曰科斗書也以今文冩之曰佳城鬰鬰三千年見白日呼嗟滕公居此室滕公曰嗟乎天也吾死其葬此乎於是終葬此焉􅀶物志曰魯閹里蔡伯公死求葬庭中有二人行頃還葬二人復出掘􅁟得石槨有銘曰四體不勤孰爲作生不遭遇長附託頼得二人發吾宅閭里祠之又曰衛靈公葬得石槨銘云不逢箕子靈公奪之我里七辭傳􅀇七謨序曰昔枚乗作七發而屬文之士􅀂􅀓毅劉廣崔駰李尤桓麟崔􅄾劉梁桓彬之徒承其流而作之者紛焉七激七依七􅀃七觸七舉七誤之篇於通儒大才馬季長張平子亦引其源而廣之馬作七廣張造七辨或以恢大道而導幽滯或以􅀧瑰麥而託調咏楊暉播烈垂於後丗者凢十有餘篇自大魏英賢迭作有陳王七啓王氏七釋楊氏七訓劉氏七華從父侍中七誨並陵前而邈後􅀭清風於儒林亦數篇焉丗之賢明多稱七激工余以爲未盡善也七辨似也非張氏至思比之七激未爲劣也七釋僉曰妙焉吾無間矣􅀂七依之卓轢一致七辨之纒綿精巧七啓之奔逸壯麗七釋之精宻閑理亦近代之所希也摯虞文章流別論曰七發造於枚乗借呉楚以爲客主先言出輿入輦蹙痿之損深宫洞房寒暑之疾靡漫羙色宴安之毒厚味暖服􅁋曜之害冝聽世之君子要言妙道以䟽神導體蠲淹滯之累旣設此辭以顯明去就之路而後􅀃以聲色逸遊之樂其􅀃不入乃陳聖人辨士講論之娛而霍然疾瘳此因膏梁之常疾以爲匡勸雖有甚泰之辭而不没其諷喻之義也其流遂廣其義遂變率辭人淫麗之尤矣崔駰旣作七依而假非有先生之言嗚呼楊雄有言童子雕蟲􅂐刻俄而曰壯夫不爲也孔子疾小言破道斯文之族豈不謂義不足而辨有餘者乎賦者將以諷吾恐其不免於勸也傳子集古今七篇而論品之署曰七林文心雕龍曰枚乗擒艶首製七發􅃾辭雲構夸麗風駭盖七覆所發發乎􅄝欲始邪末正所以戒膏梁之子也自七發以下作者繼踵觀枚氏首唱信獨拔而偉麗矣及􅀓毅七激㑹清要之工崔駰七依入􅀶雅之巧張衡七辨結采綿靡崔瑗七厲植義純正陳思七啓取羙於宏壯仲宣七釋致辨於事理觀其大抵所歸莫不髙談宫舘壯語田獵窮瓌竒之服饌極蠱媚之聲色甘意揺骨髓艶辭洞魂識雖始之以􅁋侈終之以居正然諷一勸百勢不自反子雲所謂聘鄭聲曲終而奏雅樂者也七厲叙賢歸以儒道雖文非抜羣而意實卓尔矣連珠傅玄文叙曰連珠者興於漢章帝之丗班固賈逵􅀓毅三才子受詔作之而蔡邕張華之徒又廣焉其文體辭麗而言約不指􅀃事情必假喻以逹其旨而賢者微悟合於古詩諷興之義欲使歴歴如貫珠易覩而可恱故謂之連珠也班固喻羙辭壯文體弘麗最得其體蔡邕言質辭碎然其旨篤矣賈逵儒而不􅃩傅毅文而不典文心雕龍曰楊雄雖小而明􅃳矣此文章之枝流暇預之末造也自此巳後擬者間出杜篤賈逵之曹劉珎潘朂之軰欲穿明珠多貫魚目可謂壽陵匍匐非復邯鄲之歩里醜捧心不關西子之嚬矣惟士衡運思理新文敏而裁意致句廣於舊篇豈慕朱仲四寸之璠乎夫文小易周思閑可贍足使義明而辭浄事圎而音澤磊磊自轉可稱珠耳宋書劉祥著連珠十五首以􅀉其懷其譏議云希丗之寳違時必賤偉俗之器無聖則淪是以明玉黜於楚岫章甫窮於越人有以祥連珠啓上上令御史中丞任遐奏其過惡付廷尉上別遣勑祥曰我當原卿性命令卿萬里思􅄽卿􅀂能改革當令卿得還乃徙廣州不意終日縱酒少時卒三國典略曰梁簡文爲侯景所幽作連殊曰吾聞言可覆也人能育物是以欲輕其禮有德必昌兵賤於義無思不服又曰吾聞道行則五福俱湊運閇則六極所鍾是以麟出而悲豈唯孔子途窮則慟寜止嗣宗太平御覽卷第五百九十
