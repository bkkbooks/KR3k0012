body:
  text: 方術部七卜下諸雜卜附晉書日郭公者客居河東精於卜筮郭璞從之受業公以靑囊中書九卷與之由是遂洞五行天文卜筮之術禳災轉禍通致無方雖京房管輅不能過也璞門人趙載嘗竊靑囊書未及讀而爲火所焚又日宣城邊洪以四月中就韓友卜家中安否友日􅀸家有兵殃其禍甚重可伐七十束柴積於庚地至七月丁酉放火燒之咎可消也不尒其凶難言洪卽聚柴至日大風不敢發火洪後爲廣陽領校遭母喪歸家友來投之時日巳暮吿從者速裝束吾當夜去從者日今日已暝數十里何急復去友日非汝所知也此閒血覆地寧可復住洪苦留之不待食而去其夜洪欻發狂絞殺兩子并殺婦人斫父妾二人皆被創因出亡走明日其族往收殯亡者尋索洪數日於宅前林中得之已自經死宣城太守殷祐病友筮之日七月晦日將有太鸜鳥來集廳事上冝勤伺取若獲者爲善不獲將成禍祐乃謹爲其備至日果有大鸜束尾九尺來集廳事上掩捕得祐仍遷石頭督護後爲吴郡太守友卜占神効甚多而消殃轉禍無不皆驗王隱晉書日歩熊字叔羆陽平人少好卜筮術數門徒甚盛熊學舎側有燒死人吏疑是熊諸生失火持諸生急熊日吾巳爲卜得其人矣使從道南行當有一人來問得火主來者便縛之吏如熊言果是耕人自言草惡難耕故燒之忽風起延燒實不知草中有人又鄰人兒遠行或告已死其父母號哭制服熊爲卜尅日當還如期果至宋書曰蔡興宗初爲郢府參軍彭城顔敬以式卜曰亥年當作某官有大字者不可受也及有開府之授而太歲在亥果薨於光禄大夫又曰荀伯玉為晉安王子勛鎭軍行參軍泰始初還都賣卜自業齊書曰王敬則少時於草中射獵有蟲如烏豆集其身摘去乃脫其處皆流血敬則惡之詣道士卜道士曰此封侯瑞也敬則聞之喜故出都自効又曰柳世隆善卜別􅀛甲價至萬永明初世隆曰永明九年我亡後三年丘山崩齊亦於此季矣屏人命典籤李黨取筆及高齒屐題簾箔旌日永明十一年因流涕謂黨日汝當見吾不見也梁書曰吉士瞻年逾四十忽忽不得志乃就江陵卜者王先生計禄命王生日君擁旄仗節非一州後一年當得戎馬大郡三國典略曰梁武昌太守朱賈臣聞元帝議遷都入勸梁主云建鄴舊都塋陵攸在荊鎭邊􅆠非王者宅願陛下勿疑致後悔也臣家在荊州豈不願陛下但恐是臣富貴非陛下富貴耳乃召卜者杜景豪決去留遇兆不吉荅云未去景豪退而言曰此兆爲􅀑賊所留也事具京都部又曰周文育隨盧安興征俚獠有功除南海令監州王勵深委任之勵􅀍代文育與俱下至大􅁃嶺詣卜者卜者曰君北下不過作令辰南入則爲公侯文育日足錢便可誰望公侯之事卜人日君須􅁷當暴得銀至二千兩若不見信以此為驗其夕宿逆旅有賈人求與文育博文育勝之得銀二千兩旦辭勵勵問其故文育以吿勵乃遣之又曰東魏相齊王澄以舟師還次於小平津北岸古􅊘崩骨見銘曰今卜高原千秋之後化爲下泉當逢霸主必爲改遷王日古人之卜其何至也令更葬之又日齊害其廢主濟南王也長廣王湛懼高元海爲畫三策湛不能斷令鄭道謙吳導世等卜以決之道謙等曰不利舉事靜則吉又曰初鄴有賣卜者相趙隱當大貴及隱自黃門侍郎遷祕書監崔肇師呼卜者而問已焉卜者對曰公令望雖髙爵位難進肈師不恱終如其言隋書曰獻皇后崩上令蕭吉卜擇葬所吉厯筮山原至一處云卜年二千卜世二百具圗而奏之上曰吉凶由人不在於地髙緯父葬豈不卜乎國尋滅亡正如家墓田若不吉朕不當爲天子若云不凶我弟不當戰沒然竟從吉言唐書日王遠知事梁貞白先生陶􅀪景隱居茅山盡傳其符籙隋煬帝爲晉王出鎭揚州遣人迎致及卽位於東都起玉淸觀以處之太宗之爲秦王也旣平王世充與記室房􅀇齡往詣之立枚以問其吉凶遠知指秦王之枚日此當上應天命下濟蒼生者又指􅀇齡之枚云聖之輔也及太宗踐祚恩禮甚厚又日城陽公主初適杜如晦之子荷荷貞觀中爲尙衣奉御坐承乾事伏誅公主改適饒州刺史薛昱之子瓘將成婚太宗使卜之卜人日兩火俱食始則同榮末亦􅀟悴若晝日行合􅈟之禮則終吉太宗將從之馬周諌日臣聞朝謁以朝思相戒也講習以晝思相成也讌飲以昃思相歡也婚合以夜思相親也是以上下有威内外有規動息有時吉凶有儀先王之教不可黷也今陛下欲謀其始而亂其終不可爲也夫卜筮者所以定猶豫決嫌疑若黷禮亂常先王所不用也太宗又從其言而止又曰憲宗嘗謂李絳曰卜筮之事習者罕精或中或否近日風俗尢更崇尙何也對日臣聞古先哲王畏天命示不敢專􅀖國有大事可疑者故謀於􅀸士庶人決於卜筮俱吉則行之末俗浮僞辜以徼福正行慮危邪謀覬安持疑昏惑謂小數能決之而愚夫愚婦假時日鬼神者欲利欺詐參之見聞用以刺射小近其事神而異之近者風尚卜筮此誠弊俗聖旨所及實辨邪源但存而不論弊斯息矣六韜曰文王卜田史偏日卜田渭陽將大得焉非熊非羆非虎非狼兆曰得公侯天遺汝師以之佐昌施及三王大吉又日文王問散冝生卜代殷吉乎鐕􅀛􅀛不兆祖行之日雨轖至􅎮行之日幟折爲三散冝生日此凶四不祥不可舉事太公進日非子之所知也􅀛不兆聖人生天地之閒承衰亂而起􅀛者枯骨蓍者朽草不足以辨吉凶祖行之日雨轖至􅎮是洗濯甲兵也行之日幟折爲三此軍分爲三如此斬紂首之象國語日晉獻公卜伐驪戎史蘇占之曰勝不吉公曰何謂也遇兆挾以銜骨齒牙爲猾遇見也挾㑹也骨所以鯁刺人猾弄也齒牙謂兆端左右折有似齒牙中有從畫故曰銜骨骨在口中齒牙弄之以象讒口之爲害也禮太卜掌􅀛大夫占色史占墨戎夏交捽兆有二畫外象戎内象諸夏夏謂晉也兆端會齒牙交有似捽捽交對也交捽是交勝也臣故云言晉勝戎戎復勝晉且懼有口齒牙銜骨皆在口也攜人國移心焉攜離公日何口之有口在寡人寡人弗受誰敢興之對日苟可以攜其入也必甘逞而不知故胡可壅也期何逞快壅防也甘言人耳心以爲快而不知其惡何可止也公不聽遂伐尅之克勝獲驪姬以歸有寵立爲夫人春秋後語曰二世夢白虎齧其左驂殺之心惡怪之􅁲云涇水爲祟鬼物爲災曰祟音思醉切又曰鄒忌與田忌不相善公孫閔謂鄒忌曰何不詐令人操千金卜於市日我田忌之人也吾三戰而三勝聲威天下欲爲大事亦吉乎卜者岀因令人捕焉卜者驗其辭於王之所鄒忌從之田忌懼無以自白遂率其徒攻臨菑欲殺鄒忌不勝而奔說苑曰成王卜洛事曰昔有周成王之卜居成周也其命􅀛曰予一人兼有天下辟就百姓敢無中土乎使予有罪則四方伐之無難得也周公卜居曲阜其命龜日作邑乎山之陽賢則茂昌不賢則速亡季孫行父戒其子也日吾欲室之夾於兩社之閒也使吾後世有不能事上者使其朁之益速如是則日賢則茂昌不賢則速亡安有擇地而封哉示有天固也又曰孔子問漆雕馬人曰子事臧文仲武仲孺子容三大夫者孰爲賢馬人對曰藏文氏家有􅀛焉名曰蔡文仲立三年爲一兆焉武仲立三年為二兆焉孺子容立三年爲三兆焉馬人見之矣若夫三大夫之賢不賢馬人不識也孔子曰君子哉漆雕氏之子其言人美也隱而顯其言人之過也又微而著故智不能及眀不能見得無數卜乎楚辭卜居曰屈原旣放三年不得復見竭智盡忠而蔽障於讒心煩慮亂不知所從往見太卜鄭詹尹曰余有所疑願因先生決之詹尹乃端策拂􅀛日君何以教之原日吾寧梱梱欵欵朴以忠乎將送往勞來斯無窮乎寧誅鋤草茅以力耕乎將遊大人以成名乎寧正言不諱以危身乎將從俗富貴以偷生乎寧超然高舉以保真乎將哫音足柴粟斯喔吚嚅唲以事婦人乎寧廉潔正直以自淸乎將突梯滑稽如脂如韋以潔楹乎寧昂昴若干里之駒乎將泛泛若水中之鳬隨波上下偷以全吾軀乎寧與騏驎杭軛乎將隨駑馬之迹乎寧與黄鵠比翼平將與雞鶩爭食乎此孰吉孰凶何去何從世溷濁而不淸蟬翼爲重千鈞爲輕黃鍾毁弃瓦釡雷鳴讒人高張賢士無名吁嗟默默兮誰知吾之廉貞詹尹乃釋策而謝日夫尺有所短寸有所長物有所不足知有所不明數有所不逮神有所不通用君之心行君之意􅀛策誠不能知此事司馬遷與任安書日僕先人非有丹書剖符之功依倚卜祝之閒人主以排優遇之白虎通日乾草槁骨衆多獨以蓍􅀛何􅀛之言乆也蓍之言耆也尚書􅇝範五行傳日此禽獸草木之乆而能知吉凶也蔡邕月令章句日太卜官各以牲祠􅀛策塗以牲血謂之釁者􅀛甲所以卜也蓍草所以筮也三禮圗日􅀛以春灼後左夏灼前左秋灼前右冬灼後右楚焞他昆切以荆爲然以灼􅀛正以荆者凡木心皆圜而荆心方是以用之抱朴子日卜者小數飾福者謂知來之妙異苑日㑹稽餘姚錢祐以元嘉四年五月二日夜岀屋後爲虎所取十八日乃自還說虎初取之時至一官府人重門見一人憑机而坐形貎偉壯左右侍者三十余人謂祐日吾欲使汝知術數之法故令虎迎汝無懼也留十五日晝夜語諸要術盡敎道之方祐受法畢便遣令還而不知道卽使人送出門仍見歸路旣得還家大知卜占無幽不驗經年乃卒又日北海任詡字彦期從軍遠征十年乃歸臨還握粟岀卜師云非屋莫宿非時莫沐詡結伴數十共行遇雷雨不可蒙冒相與庇於巖下想非屋莫宿之戒遂􅀒擔櫛沐於是巖崩壓伴死至家妻先與外人通謀共殺之請以濕髪為認婦宵則勸詡令沐復憶非時莫沐之忌收髪而止婦心慙􅀒詐乃自沐髲而同寢通者夜來不知婦也斬首而去述異記日宋車騎將軍南譙王劉義宣鎭荆州府吏蔡鑯音尖善卜能悉驗時有妙見精究如神公嘗在内齋見一白鼠縁屋命左右射之内置函中時侍者六人悉驅入齋後小小戸内别呼人召鑯鑯至使卜函中物謂日中則厚賞僻加重罰鑯卜兆成笑日知之矣公日何鑯日兊色之鼠背明向戸彎弧射之絶其左股孕五子三雄二雌若謂不信剖腹立知公使剖鼠腹皆如鑯言卽賜錢一萬蠡卜春秋後語日蘇秦事鬼谷子學終辭歸道乏困行以燕人蠡卜傳說自給燕人用蠡卜秦記此以取資自給傅會事以爲詞説各解臧獲之裘臧獲役人解其衣裘以賞其怪説之言也虎卜博物志虎知衝破又能畫地卜今人有畫物上下者推其奇偶謂虎卜雞卜史記日越巫立越祀而以雞卜鳥卜隋書日女國在葱嶺之南其國俗事何脩羅神及樹神歲初以人祭或用猕猴祭畢入山祝之有一鳥如雌雉來集掌上破其腹而視之有粟則年豐沙石則有災謂之鳥卜開皇六年遣使朝貢其後遂絕樗蒲卜博物志日老子入西戎造樗蒲樗蒲五木也或云胡人亦爲樗蒲卜後傳樓陰善其功十二棊卜異苑日十二棊􅁲岀自張文成受法於黄石公行師用兵萬不失一逮至東方朔密以占衆事自此以後祕而不傳晉寧康初襄城寺法味道人忽見一老公着黃皮衣竹筒盛此書以授法味無何失所在遂復流於世齊書日江謐岀爲鎮北長史東海太守未發憂甚乃以靈碁經占卦云有客南來金椀玉杯上使御史太夫沈沖奏謐前後罪收付廷尉賜死果以金甖盛藥鴆之竹卜荆楚歲時記日秋分以牲祠社其供帳盛於仲春之月社之餘胙悉貢饋鄉里周於族社餘之㑹其在兹乎此其㑹也擲教於社神以占來歲豐儉或折竹以卜楚詞日索瓊茅以筳篿楚人折竹結草以卜謂爲籌也牛蹄卜晉書日夫餘國若有軍事殺牛祭天以其蹄占吉凶蹄解者為凶合者爲吉楊方五經鈎沉日東夷之人以牛骨占事呈吉示凶無往不中牛非智之物骨者若此之效太平御覽卷第七百二十六
