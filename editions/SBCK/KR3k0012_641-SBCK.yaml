front:
  text: 太平御覽卷第六百四十一刑法部七
  hash: sha256:f0f2357719594144256eb0d0e7422162d3497a3e7013760eabf1ba1d60e928c5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_641-1a}
body:
  text: 􅂍貨罪􅂍貨書吕刑曰獄貨非寳惟府辜功報以庻尤受獄菲家寳也惟聚罪之事其報則以衆人見罪也尚書大傳曰獄貨非可寳也然後寳之者未能行其法者也貪人之寳受人之財未有不受命以矯其上者也親下以欺上者未有能成其功者也又曰太公之姜里見文王散冝生遂之犬戎氏取美馬駮身朱鬛雞目之西海濵取白狐青翰之於氏取恠獸之有叅女取姜女之江淮之浦取大貝如車渠陳於紂庭紂曰非子罪也崇侯也遂遣西伯伐崇傳曰晉邢侯與雍子争鄐田邢侯楚臣公巫臣之子也雍子亦楚人也乆而無成士景伯如楚士景伯晉理官叔魚攝理韓宣子命断舊獄罪在雍子雍子納其女於叔魚叔魚蔽罪於邢蔽断也巳具决獄門左傳昭六曰叔孫婼如晉晉人執之范獻子求貨於叔孫使請冠焉以求冠爲辭取其冠法而與之兩冠曰盡矣旣送作冠摸法又進二冠以與之僞􅀂不解其意也爲叔孫故申豐以貨如晉欲行貨免孫叔孫也叔孫曰見我吾告汝所行貨見而不岀留申豊不使得出不欲以貨免又昭六曰梗陽人有獄魏戊不能断以獄上上魏子其大宗賂以女樂訟者之大宗魏子將受之魏戊謂閻没女寛二人魏子之属大夫曰主以不賄聞於諸侯􅀂受梗陽人賄莫甚焉吾子必諌皆許諾退朝待於庭饋入召比置三歎旣食使坐魏子曰吾聞諸侯叔彦曰當食忘憂吾子置食之間三歎何也同辭而對曰或賜二小人酒不飲食饋之始至恐其不足是以歎中置自咎曰豈將軍食之而有不足是以再歎及饋之畢願以小人之腹爲君子之心属厭而已獻子辭梗陽人孔藂子曰子思言苟爕於衛君曰其才然爕甞爲吏賦於民而食人二雞子故弗用也子思曰聖人官人如大匠之用木取所長弃其短君以二􅆑弃扞城之將乎漢書曰薛宣爲馮翊太守池陽令舉廉吏獄􅁺王立府未及召聞立受囚家錢宣責讓縣縣案驗獄􅁺其妻獨受繫者錢萬六千受之再􅀫立實不知慙恐自殺宣聞之移書池陽曰縣所舉吏獄􅁺王立家私受賕而立不知殺身以自明誠廉士甚可閔惜其以府决曹􅁺書書立之柩以顯其魂又曰王温舒爲右輔行中尉歳餘㑹宛軍發發兵伐大宛也詔徴豪吏温舒匿其吏華成及人有變告温舒受貟􅀐錢他姦利事罪至族自殺其時兩弟及婚家亦各自坐他罪而族光禄徐自爲曰悲夫古者有三族而王温舒罪至同時而五族乎温舒與弟同三族而兩妻家各一故爲五也温舒死家累千金謝承後漢書曰种暠爲益州刺史時永昌大守鑄黄金爲文蛇以獻梁兾暠糺發逮捕馳傳止言而三府畏懦不敢案之兾由是衘怒於暠華嶠後漢書曰曹嵩靈帝時賂中官及輸西園錢一億萬故位至太尉􅀽山松後漢書曰皇甫嵩字義真安定朝郍人善用兵飲食必先將士然後乃安兵曹有受賂者嵩曰公素㢘必資乏也乃岀錢賜之吏慙而自殺由是衆皆樂爲致死范曄後漢書曰歐陽歙字正思樂安千乗人爲大司徒坐在汝南􅂍罪千餘萬發覺下獄諸生守闕爲歙求哀者千餘人至有髠剃者子年十七聞獄當斷馳之京行到河内􅀗嘉縣自繫上書求代歙死書奏而歙巳死獄中又曰李膺遷河南尹時宛陵大姓羊元群罷北海郡􅂍罪狼籍郡舎溷軒有奇巧乃載之以歸膺表欲治其罪元群行賂官豎膺反坐輸作左校又曰蔡衍字孟喜汝南南頓人也遷兾州刺史劾河間相曹鼎􅂍罪千萬鼎者中常侍騰之弟也騰使大將軍梁兾爲書請之衍不荅鼎竟坐輸作左校後魏書曰鄭義爲兖州性貪恡政以賄成有餉羊西門受入東門賣之又曰崔光韶遷廷尉卿時祕書􅁥祖瑩以􅂍罪􅀍劾光韶欲置之重法太尉城陽王徽吏部尚書李神雋皆爲瑩求寛光韶正色曰朝賢執事於舜之功未聞有一如何反爲罪人言乎北史曰後魏就德於營州反使尚書盧同徃討之敗而還属侍中穆紹與元順侍坐因論之同先有近宅與紹紹頗欲爲言順勃然曰盧同終將無罪太后曰何得如侍中之言順曰同好宅與要勢侍中豈有罪也紹慙不敢復言唐書曰太宗即位務止姧忒風聞諸曹案典多不受賂乃遣左右試以財物遺之有司門下令吏受饋絹一疋太宗怒將殺之裴矩進諌曰此人受賂誠合重誅但陛下試之即行極法所謂䧟其入罪恐非導德齊禮之義也太宗納之又曰開元十年武強令裴景仙犯乞取􅂍積絹五千疋事發景仙逃走吏捕得之玄宗怒命集衆决殺大理卿李朝隱奏曰裴景仙縁是乞􅂍犯不至死又景仙曽祖故司空寂徃属締構首豫元勲載􅀄年中家䧟非罪凡有兄弟皆􅀍誅夷唯景仙獨存今見承嫡據􅂍未當死坐有犯猶入議條十代宥賢功多冝録一門絶祀情或可哀詔不許朝隱復奏曰有斷自天處之極法生殺之柄人主合專輕重有條臣下當守枉法者枉理而取十五疋便抵死刑乞取者因乞爲贓數千疋止當流坐今以乞取得罪處斬刑後枉法當科欲何罪臣所以爲國惜法期律文詔令减死一等杖一百流于嶺南又曰牛僧孺爲御史長慶元年􅀫州刺史李直臣坐􅂍當死直臣賂中貴人爲之伸理僧孺堅執不廻穆宗面喻之曰直臣事雖失此人有經度才可委之邊任朕欲貸其法僧孺對曰凢人之才止於持禄取容耳帝王立法束縛姦雄正爲才多者禄山朱泚以才過人濁乱天下况直臣小才又何屈法哉又曰山南東道節度使栁公綽自京赴鎮行部過鄧縣縣吏二人犯法在獄一人納賄一吏舞文縣令以公綽持法犯贓者必不免及過欵公綽斷曰贓吏犯法法在姦吏壞法法亡遂殺舞文未下車而襄漢大治又曰李石用金部貟外郎韓益判度支案益坐􅂍繫䑓石奏曰臣以李益暁錢榖録用之不謂貪猥如此帝曰􅌠相但知人則用有過則懲卿所用人且不掩其􅁖可謂至公三輔决録曰馬融爲南郡太守三府以融在郡貪濁受王記􅁺歧肅錢四十萬融子强又受吏白向錢六十萬布三百疋以肅爲孝廉向爲主簿又坐失大將軍梁兾竟髠徒朔自刺不死得赦還拜議郎鍾離意別傳曰顯宗以意爲尚書時交趾太守坐􅂍千金徴還伏法以資物簿入大司農詔班賜群臣意得珠璣悉以委地不拜賜帝怪而問其故對曰臣聞孔子忍渴於盗泉之水曽參廻車於聖母之閭􅁖其名也此􅂍􅁾之寳誠不敢拜受帝嗟歎曰清乎尚書之言乃更以庫錢三十萬賜意罪書舜典曰流共工于幽州放驩兠于崇山竄三苗于三危殛鯀于羽山四罪而天下咸服又湯誓曰有夏多罪天命殛之殛誅也又㤗誓曰予克受非予武惟朕文考無罪受克予非朕文考有罪惟予小子無良韓詩外傳曰齊景公之時民有得罪於景公者景公大怒縛置之殿下召左右支解之晏子左手持頭右手磨刀仰面而問曰古者明王毎支解人不審從何支始也景公離席曰縱之罪在寡人禮曰子夏䘮其子而䘮其明曽子弔之曰吾聞之朋友䘮明則􅂘曽子􅂘子夏亦􅂘曰天乎予之無罪也曽子怒曰啇汝何無罪吾與汝事夫子於洙泗之間退而老於西河之上使西河之民疑汝於夫子尓罪一也䘮尓親使民未有聞焉尓罪二也䘮尔子而䘮尓明尓罪三也汝何無罪與子夏投其杖而拜之曰吾過矣吾過矣傳曰􅁗伯素服郊次向師而􅂘曰􅀌違蹇叔以辱二三子􅀌之罪也不替孟明􅀌之過也又曰潞子嬰兒之夫人晉景公之姊也鄷舒爲政而殺之又傷潞子之目晉侯將伐之大夫皆曰不可鄷舒有三儁才儁絶異言有藝勝人者三也伯宗曰必伐之狄有五罪不祀一也􅄝酒二也弃仲章而奪􅀺氏地三也仲章路賢人􅀺氏黎侯也虐我伯􅁎四也傷其君目五也怙其雋才而不以茂德滋益罪也又曰衛獻公使祝宗告亡且告無罪告宗廣也定姜曰有罪􅀂何告無罪舎大臣而與小臣謀一罪也先君有冢卿以爲師保而蔑之二罪也余以巾櫛先君而􅁀妾使余三罪也告亡而巳無告無罪又曰吴公子札自衛過晉將􅀫於戚聞鍾聲焉曰異哉吾聞之辯而不德必加於戮矣夫子􅀗罪於君是以在此懼猶不足而又何樂又曰鄭公孫黒將作乱子産使吏數之曰伯有之乱以大國之事而未尓討也爾有乱心無厭國不汝堪專伐伯有而罪一也昆弟争室而罪二也董隧之盟汝矯君位而罪三也有死罪三何以堪之又曰陳侯之弟招殺太子偃師罪在招也楚人執陳行人于徵師殺之罪不在行人也論語曰公冶長曰子謂公冶長可妻也雖在縲絏之中非其罪也以其兄之子妻之又堯曰曰朕躬有罪無以萬方萬方有罪罪在朕躬孝經曰五刑之屬三千而罪莫大於不孝家語曰孔子曰大罪有五而殺人爲下逆天地者罪及五丗誣文武者罪及四丗逆人倫者罪及三丗誣􅀑神者罪及二丗手殺人者罪止其身又曰孔子曰大夫之罪在五刑之域者聞有譴發譴讓也發始發露也則白冠􅈊纓盤水加劒造于闕而自請罪君不使有司執􅅞牽掣而加之也其有大罪者聞命則北面再拜跪而自裁君不使人捽引而刑殺之也大夫自取之耳吾遇子有禮矣史記曰范睢盛帷帳侍者甚衆湏賈賈頓首言死罪曰賈不意君能致於青雲之上惟君死生之范睢曰汝罪有幾曰擢賈之髮以續賈之罪尚未足也漢書曰惠帝二年制曰今法有誹謗訞言之罪是使衆臣不敢盡情而上無由聞過失也將何以來逺方賢良其除之又曰南越反上復欲使楊㒒將爲其伐前勞以書勑責之􅀅軍非有斬將搴旗之實也焉足以驕太哉前破番禺捕降者以爲虜掘死人以爲􅀗是一過也建德吕嘉建德他孫也吕嘉他相也逆罪不容於天􅀅軍擁精兵不窮追超然以東越爲援是二過也士卒􅁀露連歳朕爲朝㑹不置酒將軍不審其勲勞而造侫巧請乗傳行塞因用歸家懷銀黄垂三組夸郷里三過也失其内頋以道􅁖爲解失尊之序是四過也後漢書曰荆州刺史趙凱誣奏楊旋實非身破賊而妄有其功遂檻車徴琁防禁嚴宻無由自訟乃臂出血書衣爲章具陳破賊形勢及言凱所誣狀潜令親属詣闕通詔書原琁拜議郎凱反受誣人之罪宋書曰孔琳之爲御史中丞明憲直法無所屈撓奏尚書令徐羡之􅃜違憲典時羡之領楊州刺史琳之弟璩之爲中從事羡之使璩之解釋琳之使寢其事琳之不許曰我觸忤宰相正當罪止一身汝必不應從坐何湏勤勤耶自是百寮震肅莫敢犯禁北史曰賀􅀂弼有罪在禁所詠詩自􅀂上數之曰人有性善行􅁖者公之爲􅁖乃與行俱有三太猛嫉妬心太猛自是非人心太猛無上心太猛昔在周朝巳教他兒子反此心終不能改唐書曰髙祖詔曰朕自起義晉陽遂登皇極經綸天下實仗群才尚書令􅁗王尚書右僕射寂或契合元謀或同心運始並蹈義輕生􅂢家殉節艱辛備履金石不移論此忠勤禮冝優異官爵之榮抑惟舊典勲賢之義冝有别恩其罪非叛逆可聽恕一死說苑曰禹岀見罪人下車問而泣左右曰王何爲痛之至於此禹曰尭舜之民皆以尭舜之心爲心今寡人爲君百姓各以其心爲心是以痛之也風俗通曰辠字爲自辛令爲辛苦憂之也􅁗皇以爲字似皇故改爲罪語林曰王子敬疾篤兄弟􅂆令首罪荅曰無所應首唯遣郗家女以爲恨雜五行書曰臯陶以壬辰日死不可劾罪人成罪也太平御覽卷第六百四十一
