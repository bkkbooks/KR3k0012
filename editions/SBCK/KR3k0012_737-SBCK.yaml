front:
  text: 太平御覽卷第七百三十七
  hash: sha256:97a35f4048917501bb351e17ba2a02437070d578cdc79fd4d17246f30bcf54d2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_737-1a}
body:
  text: 方術部十八禁幻禁後漢書曰章帝時有壽光侯者壽姓風俗通云壽於姚呉太夫能劾百􅀑衆魅令自縛見形其鄉人有婦爲魅病侯爲劾之得大虵數丈死於門外又有神樹人止者輒死鳥過者必墜侯復劾之樹盛夏枯落見大虵長七八尺懸死其閒帝聞而徵之謂曰吾殿下夜半復常有數人絳衣被髮持杖相隨豈能劾之乎侯曰此小恠易消耳帝僞使三人爲之侯劾三人登時仆他無氣帝大驚曰非魅也朕相試耳解之而蘇又曰徐登萬者閩中人也本女子化爲丈夫善爲巫術又日趙炳字公阿東陽人能爲越方時遭兵亂疾疫大起二人遇於烏溪水之上酈元長注水經曰吳寧溪岀吳寧縣烏傷之烏傷溪在今婺州義烏縣東也遂結言約共以其術療病各相謂曰今旣同志旦可試各所能登乃禁溪水水爲不流炳復次禁枯樹樹卽生荑易曰枯楊生荑王弼注云荑者楊之秀也二人相視而􅀏共行其道焉登年長炳師事之貴尚清儉禮神唯以東流水爲酌削桑皮爲晡但行禁架所療皆除禁架卽禁術也後登物故炳東入章安百姓未之知也炳乃故升第屋捂鼎而爨主人見之驚懅捂支也懅忙也炳􅀏不應旣而爨熟屋無損異又嘗臨水求渡船人不和之和猶許也俗本作者知誤也炳乃張蓋坐其中長􅀏呼風亂流而濟吳志曰賀齊討山賊中有善禁者每當交戰官軍刀劒皆不得拔弓弩射矢皆還自向輒致不利齊有長思乃曰吾聞金有刃者可禁蟲有毒者可禁其無刃毒則不可禁彼必能禁吾兵也必不能禁無刃物矣乃多作勁木棓選勇力精卒五千人爲先登盡捉棓彼山賊恃其善禁不嚴備於是官軍以白棒擊之彼禁不復行打殺者萬計蕭子顯齊書曰陳顯達南彭城人顯達岀杜姥宅大戰被賊矢中左眼拔箭而鏃不岀地黃村潘嫗善禁先以釘釘柱中嫗禹步作氣釘卽時出乃禁顯達目中鏃出之又曰顧歡弟子鮑靈綬門前有一株樹本十餘圍上有精魅數見影動印樹即枯死山陰白石村多邪病村人吿訴求哀歡住村人爲講老子規地作獄有頃見狐狸黿鼉自入獄中者甚多卽命殺之病者皆愈又有病邪者問歡歡曰家有書否曰唯有孝經歡曰可取置病人枕邊恭敬之自差病者果愈人問其故荅曰善禳惡正勝邪此病者所以瘳北齊書曰崔子武季舒之族孫也幼時宿於外祖揚州刺史趙郡李憲家一夜夢一女姿色甚麗自云封龍王女願與崔郞私通子武悅之牽其衣裙微有裂綻未曉告辭結帶而別至明訪問乃是山神遂往祠中觀之傍畫女容狀卽夢中見者裂裙尙存結帶猶在子武自是通夢忽恍成疾後逢醫禁之乃絕隋書曰張文詡常有腰疾㑹醫者自言善禁文詡令禁之遂爲刃所傷至於頓伏牀枕醫者叩頭請罪文詡遽遣之唐書曰葉法善嘗於東都凌空觀設壇醮祭城中士女競往觀之俄頃數十人自投於火中觀者大驚救之而免法善曰此皆魅病於吾法所攝耳問之果然法善悉爲禁劾其病遂愈六韜曰武王代殷丁侯不朝太公乃畫丁侯於筞三箭射之丁侯病困卜者占云祟在周恐懼乃請舉國為臣太公使人甲乙日拔丁侯着頭箭丙丁日拔着口箭戊己日拔着腹箭丁侯病稍愈四夷聞各以來貢異苑曰永嘉陽童孫權時俗師也嘗獨乘船往建寧泊在渚次宵中忽有一􅀑來欲擊童因起謂曰誰敢近楊童者鬼卽稽顙云實不知是楊使者童便勑使乘船飛迅駃有過猛帆至縣乃遣之又曰趙侯少好諸術姿形悴陋長不滿數尺以盆盛水􅐬目作禁魚龍立見侯有白米爲兒所盜乃把刀畫地作獄四面開門向東嘯羣鼠俱到呪曰凡非噉者過去有止者十餘剖腹看藏有米在焉曾徒跣須履因仰頭微吟􅀟屐自至有􅀏其形容者便佯説以酒杯向口中卽掩鼻不脫仍稽顙謝過著地不舉永康有騎石山山上有石人騎石馬侯仰指之人馬一時落首今猶在山下神仙傳日嚴靑常從弟子家夜歸都督夜行逢靑呵問何人夜行靑亦厲聲問日汝是何人而夜行都督怒應對不知是青因叱從兵使録夜行人靑亦復叱其從神曰皆縛夜行人靑便去而都督及從者數十人人馬皆不復得去明旦行人見都督問何爲在此都督曰事狀如此行人曰必是嚴公也都督曰我不能得動可報余家家人知之往叩頭啓謝青自説昨宵不知是先生乞得放遣青乃大聲曰解遣昨宵所録夜行人還去都督乃得去其後夜行每見行人先逆問非嚴公乎又曰王方平降蔡經家北舎有姓陳者失其字嘗罷尉也聞經家有人乃詣門叩頭求乞拜見方平遣人引前與語此人便乞得隨從驅使比於蔡經方平日君旦起向日方平從後視之言日噫君心敘不正終不可教以仙道也當授君以地上主者之職臨去以符併一傳着小箱中以與陳尉告言此不令君度世也能令君本壽自出百餘歲也可穰災治病者命未終及無罪過者君以符到其家便愈矣若有邪鬼血食作禍崇者君便以符帶此傳以勑社吏當收送其􅀑心中亦當知其輕重臨時以意治之陳尉以此符治病有効事之者數百家壽一百一十歳而死後弟子行其符不効也抱朴子日治金創以氣吹之卽斷痛登山蛇虺毒蟲中人在近者就以氣禁之其相遠者或數十里便延治之呯其姓名而呪之男也吹我右手記識其時後校問之皆卽時愈也又有介象者能以氣禁一里中愈居人炊之不得蒸以氣禁樹上羣鳥卽墮地又於茅屋上爨火煑雞熟而茅不燋又禁刀矛以刺人腹以椎打之刃曲而不復入又燒釡正赤而立下乆之不知􅀬以錢投於沸釡湯中亦探取錢而手不灼能令一市人皆坐不得起幻説文曰幻相詐幻惑幻人從反子周書云無或譸張爲幻後漢書曰永寧元年西南夷撣國王詣闕獻樂及幻人能變化吐火自支解易牛馬頭元㑹在庭作安帝與群臣共觀大奇之又日安帝時作九賔樂有含和賔利之獸從西方來戲于庭入前殿激水化成魚嗽木作霧化成黃龍長八丈岀水遨戲千庭􅋑熠日光又日解奴辜張貂者亦不知是何郡國人也皆能隱淪出入不由門戸奴辜能變易物形以誑幻人晉書日郭璞將促裝去愛主人婢無由而得乃取小豆三斗繞主人宅散之主人晨起見赤衣人數千圍其家就視則滅甚惡之請郭璞曰君家不冝畜此婢可於東南二十里賣之愼勿爭價則此妖可除也主從之璞陰令人賤買此婢復爲符投井中數千赤衣人皆反縛一一自投于井主人大恱璞攜婢而去後魏書曰恱般國眞君九年遣使朝貢并送幻人稱能割人喉脉令斷擊人頭令碎陷皆血出淋落數升或盈斗以草藥令嚼咽之須􅁷血止世祖恐言是虛乃取死囚試之皆驗崔鴻北涼録曰􅀇始十四年七月西域貢吞刀吐火秘幻奇伎北齊書曰由吾道榮琅琊人也初晉陽有人甚明法術爲人傭力無識知者道榮聞之訪得其人以道榮好尚將法授之謂道榮曰我本􅁪山仙人有罪爲天官所謫今限滿將歸鄉里􅀸且送吾至于汾水及至汾河值水暴至其人乃臨水禹歩以一符投水中流便絶徐自沙石上渡河而去道榮嘗至遼陽山中夜逢猛獸以杖畫地成大坑猛獸逐走唐書曰顯慶元年上御安福門樓觀大酺胡人欲持刀自刺以爲幻戲上不許之乃下詔曰如聞在外有婆羅門胡等每於戲處乃將劒刺肚以刀割舌幻惑百姓極非道理冝並遣發還蕃勿令乆住仍約束邊州若更有此色並不須遣入朝金樓子曰周穆王時西極有化人入水火貫石及山川移城邑秉虛不墜觸實不礙千變萬化不可窮極穆王爲起中天之臺鄭衛奉承雲之樂日日獻玉衣月月薦玉食幻人猶不肯舎乃攜玉至幻人宫稱以金銀絡以珠玉鼻口所納皆非常人閒物也由是王心厭宫室幻人曰易之耳王恱遂肆志遠遊西京雜記曰余所知有鞠道龍善爲幻術向余說古事有東海人黃公少時爲幻能刺虵御虎佩赤金爲刀以絳繒束髪立興雲霧坐成山河及衰老氣力羸憊飲酒過度不能復行其術又日淮南王好方土皆以術見遂後畫地爲江河攝土爲山嶽􅐵呼爲寒暑噴嗽爲雨露王亦卒與諸方士俱去異苑曰髙陽新城叟晉咸寧中爲淫祠妖幻署置百官又以木自鑒輒見所署置之人衣冠麗然百姓信惑京都翕習收而斬之又日上虞孫湲奴多諸幻伎元嘉初叛建安中復岀民閒治人頭風流血滂沲嘘之便斷創又即歛虎傷虵噬煩毒乘死禁護皆差向空長嘯則群雀來萃夜呪蚊虻悉皆死於側至三十年於長山爲本主所得知有術慮必亡叛約縛枷鏁極爲重􅃨明日已失所在搜神記日永嘉中有天竺胡人來渡江南其人有數術能斷舌復續之吐火所在人士聚觀試其斷時先以舌示賔客然後刀截血流覆地乃取置器中傳以示人視之舌頭半舌猶在旣而選取續之坐有頃坐人見舌則如故不知其實斷否其續斷取絹布與人各執一頭對剪一斷之已而兩叚合將視之則復還連絹無異故體時人多疑以爲幻隂乃試之眞斷絹也其吐火先有藥在器中取一片與黍餹合之再三吹呼已而張口火滿口中因就􅅡取以爨則火也又取書􅁓及繩縷之屬投火中衆共視之見其燒燃消糜乃盡及舉而岀之故向物也靈􅀑志曰太元十二年有道人外國來解吞刀吐火珠玉金銀􅀃其所受術師曰衣非沙門也行見一人擔擔上有小籠子可受升餘語擔人云吾步行疲極欲寄君擔擔人甚恠之慮是狂人便語之云自可爾君欲何許自厝耶其人荅云若見許正欲入籠子中籠不便擔人逾恠之乃下擔入龍中籠更不大其人亦不更小擔之亦不覺重於先旣行數里樹下住食擔人呼共食云我自有食不肯岀止住籠中飲食器物羅列肴饍豐腆亦辨乃呼擔人來食未半語擔人我欲婦共食腹中吐出一女子年二十許衣裳容皃甚美二人共食食欲竟其夫便卧嬌語擔人云我有外夫欲來共食夫覺君勿道之婦便口中出一年少丈夫食籠中便有三人寬急之事亦復不異有頃其夫動如欲覺婦便以外夫內口中夫起語擔人曰可去卽以婦內口中次及食器物此人旣至國中有一家大富資財巨萬而性慳悋語擔人云試爲君破慳卽至其家有好馬甚珍之繫在柱上忽失去尋索不得明日見馬在五升甖中終不可破便語君作百人㕑以周一窮乏馬得岀耳主人即作之畢馬還在柱下明早其父母在堂上忽然不見舉家惶怖不知所在開裝器忽然見父母在澤壺中不知何由復往請之其人云君當更作千人飲食以飴百姓窮者當時便作父母在床也幽明録曰安城人俗巫也善於幻術每至祠神時擊鼔宰三牲積薪燃火盛熾束帶入火中章􅁓燒盡而開形體衣服猶如初時王凝之為江祠王當酒行爲王刷頭簪荷葉爲帽與王亦當不覺有異到坐之後荷葉乃見一坐篤駭􅁊譚新論曰方士董仲君犯事繫獄佯死目陷虫爛故知幻術靡所不有又能鼻吹口歌聳眉動目荆州有鼻飲之蠻南城有頭飛之夷非爲幻也孔偉七引曰弄幻之士因時而作殖􅋎種菜立起尋尺投芳送􅆨賣黃售白麾天興雲霧畫地成江海太平御覽卷第七百三十七
