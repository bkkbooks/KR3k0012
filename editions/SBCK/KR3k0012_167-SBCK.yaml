front:
  text: 太平御覽卷第一百六十七
  hash: sha256:3adc8f40f7151b9c0797affc1afd32c6cc05e961b1bafff15c20460c497d4285
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_167-1a}
body:
  text: 州郡部十三山南道上荆峽歸復郢鳯成武興宕扶文利䕫開合忠萬閬果荆州十道志曰荆州江陵郡漢舊縣屬南郡禹貢曰荆及衡陽惟荆州北據荆山南及衡山之陽江漢朝宗于海二水經此州而入海有似於朝厥土惟塗泥厥田惟下中春秋元命苞曰􅎮散爲荆州分爲楚國荆之爲言強也陽盛物堅其氣急悍爾雅曰漢南曰荆州周官職方氏曰正南曰荆州其鎮曰衡山其藪澤曰雲夢其川江漢其浸潁湛其利丹銀齒革晉元康地記曰荆州於古蠻服之地漢書曰臨江閔王榮坐侵廟壖地爲宫上徴榮榮行祖於江陵北門旣上車軸折車廢江陵父老流涕言曰吾王不返矣王至詣中尉府郅都責訊王王恐自殺漢書地理志曰今之南郡江夏零陵桂陽武陵長沙及漢中汝南郡盡楚分也史記曰蘇􅁗􅀃威王曰楚西有黔中巫郡東有夏州海陵南有洞庭蒼梧北有陘塞郇陽地方五千里帶甲百萬車千乗􅀐萬疋粟支十年此霸王之資也淮南子曰楚地南卷沅湘北繞潁泗西苞巴蜀東裏郯邳潁汝以爲泗江漢以爲池垣之以鄧林緑之以方城山髙㝷雲霓􅀷谿肆無景十三州志曰漢章帝建􅀄二年徙鉅鹿王恭爲江陵王三公上言江陵在京師正南不可以封乃徙爲安六王盛弘之荆州記曰元嘉中以京師根本之所􅀉荆楚爲重鎮上流之所揔擬周之分陜晉宋以降此爲西陜釋名曰荆州取名於荆山又曰荆驚也南蠻數㓂常置警備左傳曰楚子西㳂漢泝江將入郢王在渚宫下見之十道志曰當陽縣舊縣屬南郡廣陽王子益之所封荆州記曰當陽本楚之舊邑左氏傳云楚潘崇伐麏至于錫穴潁容釋例云麏在當陽十道志曰公安縣漢孱陵縣地吴之南郡荆州記曰劉備敗於襄陽南奔荆州吴大帝封爲左將軍荆州牧城北而鎮之時人號備爲左公故名其城曰公安古今地名曰松滋縣古鳩兹地漢屬廬江郡峽州十道志曰夷陵郡春秋戰國時並楚地􅁗置三十六郡屬南郡魏武於此置臨江郡梁置冝州周武帝以州居三峽之口改爲峽州史記曰􅁗昭王二十九年􅁗將白起攻楚燒夷陵吴録曰蜀昭烈皇帝立冝都郡於西陵冝都記曰郡城即陸抗攻歩闡於此荆渚記曰夷陵郡居大江之上即西通全蜀故夷陵有安蜀古城吴志曰陸遜上䟽夷陵要害實國家之􅀜限􅀂失之非損一郡荆州亦可憂也十道志曰冝都縣本漢夷縣屬南郡􅀽山松冝都山川記南崔有山名荆門北對崖有山名虎牙故曰荆門虎牙即楚之西塞歸州十道志曰歸州巴東郡在周爲䕫子國屬楚􅁗併天下爲南郡之地漢置秭歸縣唐武德二年割䕫州之秭歸巴東二縣置歸州􅀽崧記曰屈原此縣人旣􅀍流放忽然暫歸其姉亦來因名其地爲秭歸稀與姊同三國志曰吴置建平郡即冝都之西部也晉王濬自蜀江㳂流伐吴守將吾彦表晧曰請増建平兵􅀂建平不下晉師終不敢過皓不從復州十道志曰復州竟陵郡禹貢荆州之域春秋戰國時屬楚􅁗兼天下屬南郡漢中十三州在州部即江夏之竟陵縣地唐武德五年爲復州郡國志曰􅃆陽縣即楚王地也圖經曰􅁥利縣漢華容縣乾溪章華臺在焉郢州十道志曰郢州冨水郡歷代所屬與竟陵郡同二漢屬江夏郡晉宋以來爲竟陵郡地西魏屬安州後周武帝置郢州隨廢唐武德六年爲郢州郡國志曰長壽縣武陵山春秋謂楚平王卒於樠木之下即此山也鳯州十道志曰鳯州河池郡土地所屬與金州同在􅁗隴西郡地漢爲故道縣地故道今兩當縣是漢武改雍爲凉後爲凉州之地水經曰兩當縣水出陳倉縣之大散嶺西南流入故道川謂之故道水縣因水取名或云縣西有兩山相當故名之華陽國志曰河池一名仇池郭仲産􅁗州記云仇池山一名仇維山上有池似覆壷前志云是縣以山得名水經曰大散水流入黄花川黄花縣因水得名成州十道志曰成州同谷郡禹貢梁州之域古西戎地周省梁入雍爲白馬氐國史記西南夷傳曰自莋以東北君長數十冉駹爲大自冉駹以西北君長數十白馬最大皆氐􅀋後漢書曰河池一名仇池地方百頃左右悉白馬氐武州十道志曰武州武都郡土地所屬與成州同亦白馬氐之地漢書曰西南夷傳曰漢誅且蘭卭君并殺莋侯冉駹等皆震懼請臣置吏以爲廣西部至元鼎六年以白馬氐地爲武都郡隴右記曰武都紫水有泥其色紫而粘貢之用封璽書故詔誥有紫泥之美郡國志曰武都沮水之西有角弩谷即蜀將姜維勦五部溪蠻之所魚豢魏略曰文帝黄􅀄元年徙武都於美陽在今雍州好畤縣界武都故城是也興州十道志曰興州順政郡戰國時白馬氐之東境􅁗併天下爲蜀郡地漢元鼎六年置武都郡晉書曰懷帝永嘉中氐之人楊茂搜據武都郡子孫丞嗣爲氐王周地圖記曰郡有丙山山有穴即丙穴其口向丙因以爲名毎春三月上旬有魚長八九寸或二三日聮綿從穴出躍相傳名爲嘉魚左太冲蜀都賦曰嘉魚出於丙穴宕州十道志曰宕州懷道郡禹貢梁州之域古羗地周爲雍州之境􅁗漢魏晉諸羗據之後魏書曰梁弥忩者宕昌羗也其先常爲羌豪祖勤自稱宕昌王弥忩丗祖􅀄求内附遂拜弥忩爲宕昌王因封其地爲宕昌蕃即今宕州扶州十道志曰扶州同昌郡禹貢梁州之域實西戎之地周省梁入雍爲雍州地􅁗漢魏晉並屬蕃夷後魏書曰廢帝前元年西逐吐谷渾定隂平於此置鄧州及鄧寜郡取前羗部落所居爲之名時又置怗夷縣屬封統郡以戎夷寜怗爲義也周地圖記曰後魏廢帝置同昌縣屬封統郡文州十道志曰文州隂平郡禹貢梁州之域周爲雍州之境戰國時氐羗據焉漢武時開西南夷置隂平道以統其衆蜀志曰鄧艾自隂平景谷歩道懸兵束馬經油江出綿竹華陽國志曰晉永平之後羗虜數叛遂立爲郡以遏之輿地志曰晉永嘉之末太守王鑒以郡降李雄晉人因是悉流移於蜀漢其氐羌並屬楊茂捜此後不復爲正朔所頒利州十道志曰利州益昌郡土地所屬與金州同春秋戰國時並屬蜀侯漢葭萌縣地華陽國志曰昔蜀王封其弟於漢中號曰苴侯因命其地曰葭萌苴侯與巴王通好巴與蜀爲讎故蜀王怒伐苴苴奔巴求救於􅁗􅁗乃伐蜀遂滅蜀及巴苴置巴蜀二郡水經曰益昌有小劔城去大劔城三十里連山絶險飛閣通衢故謂之劔閣也蜀志曰先主使陳戒絶馬鳴閣魏武聞之喜曰此閣過漢中之平隂乃咽喉之要路馬鳴閣在益昌縣夔州十道志曰夔州雲安郡春秋時爲魚國􅁗併天下爲巴郡地漢爲魚復縣左傳曰庸蠻叛楚楚莊王伐之七遇皆北唯禆儵魚人實逐之杜曰禆儵魚三巴今魚復縣也漢志曰江􅀜都尉理魚復橘官郡國記曰白帝城即公孫述至魚復有白龍出井中因號魚復爲白帝城劉備因改魚復爲永安又後漢書公孫述自以承漢土德故號曰白帝城蜀志曰羅憲爲領軍守永安聞魏軍平蜀三日􅂘於都亭荆州圖副曰永安宫南一里渚下平磧上有諸􅁑孔明八陣圖聚細石爲之各髙五丈皆棊布相當中間相去九尺正中開南北巷悉廣五尺或爲人散亂及爲夏水所没至冬水退依然如故荆州記曰壘西聚石爲八行行八聚謂之八陣圖因曰八陣旣成自今行師不復敗後見莫能了之桓宣武伐蜀見之曰此常山虵􅀔也開州十道志曰開州盛山郡本漢朐䏰縣之地合州圖經曰合州巴川郡􅁗漢屬巴郡宋置東宕渠郡西魏置合州忠州十道志曰忠州南賔郡􅁟地所屬與􅇪州同譙周巴記曰後漢獻帝􅀄平六年臨江縣屬永寜郡建安中改永寜爲巴東郡臨江仍屬焉續漢志曰和帝永元中分枳縣置平都縣平者即今豊都縣也史記􅂫代曰楚得枳而國亡萬州十道志曰萬州南浦郡􅁟地所屬與通州同漢爲巴郡胊䏰縣地續漢志曰朐䏰屬巴郡朐音蠢䏰如尹切㝷江源記曰梁山東西數千里望之􅀂長雲垂天劔閣銘曰巖巖梁山積石峨峨又曰景穴有嘉魚其味甚美景穴在梁山縣栢枝山閬州圖經曰閬州閬中郡禹貢梁州之域春秋爲巴國之地秦漢爲巴郡華陽國志曰巴子後理閬中地形志曰閬中居蜀漢之半當東道要衝今郡城即士之閬中城後謂之隆城是也後魏典略曰此州古有隆城堅險因置隆州㝷又立盤龍郡以郡中有盤龍山爲名三巴記曰閬中有渝水賨民銳氣喜舞故髙祖樂其猛銳數觀其舞使樂人習之故樂府中有巴渝舞果州十道志曰果州南充郡禹貢梁州之域春秋戰國並屬巴子國􅁗惠王滅巴蜀是爲巴郡地自漢至晉爲安漢縣華陽國志曰漢獻帝􅀄平元年劉璋分墊江上爲巴郡理此縣周地圖記曰相如縣有相如坪相如故宅因以名縣郡國志曰馮緄爲車􅀐將軍於此鐫崖十有餘處今果山有車􅀐崖益州記曰南充縣西有大昆井即古之塩井也唐書曰貞元中謝眞人於郡紫極宫上昇萬目所覩郡郭是夕處處有虹霓雲氣太平御覽卷第一百六十七
