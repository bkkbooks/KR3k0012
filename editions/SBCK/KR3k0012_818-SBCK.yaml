front:
  text: 太平御覽卷第八百一十八
  hash: sha256:c84deab006b754b330a6ee13b2f2180837ad633fe420934dc1d9fcee6da0b717
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_818-1a}
body:
  text: 布帛部五縑帛縑􅀃文曰縑并絲繒也釋名曰縑兼也其􅁝細緻數兼於絹染縑五色細且緻不漏水也續漢書曰張奐少立志節董卓慕之使其兄遺縑百疋奐惡卓爲人絶而不受東觀漢記曰王丹資性清白疾惡豪強時河南太守同郡陳遵􅀜西之大俠也其友人䘮親遵爲護䘮事賻助甚豐丹乃懷縑一疋陳之於主人前曰如丹此縑出自機杼遵聞而有慙色又曰王丹子有同門生䘮親家在中山白丹欲徃奔慰結侶將行丹怒而撻之令􅀉縑以祠焉或問其故丹曰交道之難未易言也又曰上大發􅀜東兵自將上隴隗􅅝衆潰走圍解於是置酒髙㑹勞賜來歙班坐絶席在諸將之右賜歙縑千疋又曰馬援行亭鄣到右北平詔書賜援鉅鹿縑三百疋又曰蔡彤爲襄賁令是時盗賊尚未悉平而襄賁清靜詔書増秩一等賜縑百疋䇿書勉勵後漢書曰趙熹避赤眉難入丹水遇更始親屬皆祼跣塗炭飢困不能前塗炭者􅀂䧟泥墜火喻窮困之極也熹見之悲感所裝縑帛資糧悉以與之將護歸郷里東觀漢記曰顯宗時詔賜降胡縑尚書案事誤以十爲百上見司農上簿大怒召郎將笞之鍾離意因叩頭曰過誤之失常人所容􅀂以懈慢爲愆則臣位大罪重郎位小罪輕咎皆在臣臣當先坐乃解衣就笞帝意乃解謝承後漢書曰汝南周躬爲櫟陽令功曹萬良爲父報讎自械詣獄躬解械放良後良賷縑五百餉躬􅐬門不受華矯後漢書曰孝獻伏后興平二年立爲皇后李􅔸郭汜等敗乗輿於曹陽帝乃潜夜渡河走六宫皆歩行出營后手持縑數疋董承使孫微以刃脅奪之殺傍侍者血濺后衣􅀽山松後漢書曰天鳯五年樊崇起兵於莒號曰赤眉圍莒數月或􅀃樊崇曰豈有父母之國而攻之乎莒中人出縑數千疋以自贖乃引去范曄後漢書曰永平十五年幸偃師詔命自殊死以下贖死罪縑三十疋右趾至髠鉗城旦春十疋完城且至司冦五疋又曰戴封常遇賊財物悉􅀍略奪唯餘縑七疋賊不知處封乃追以與之曰知諸君乏故送相遺賊驚曰此賢人也盡還其器物後舉孝廉又曰期門郎程偉妻能通神變化偉當從出無衣甚愁妻即爲致兩縑得以爲衣漢官典職儀曰尚書郎直供青縑白綾􅀍魏志曰漢桓帝末董卓爲軍司馬從中郎張奐征并涼州有功賜縑九千疋卓悉以分與吏士南史曰孫謙齊􅀄爲錢塘令御煩以簡獄無繫囚及去官百姓以謙在職不受餉遺追載縑帛以送謙辭不受梁書曰何逺輕財好義周人之急言不虚妄盖天性也毎戲語人云卿能得我一妄語則謝卿以一縑衆共伺之不能記也趙書曰中書令徐光奏議以東郊親耕改服青縑袴褶後魏書曰劉芳􅀄入魏雖處窮窘之中而業尚貞固聦敏過人篤志墳典晝則傭書以自資給夜則誦經不寢至有易衣併日之弊而澹然自守不汲汲於榮利不戚戚於貧賤乃著窮通論以自慰常爲諸儒傭冩經論筆迹􅁛善卷直一縑歳中能入百餘疋如此數年頼以頗振又曰楊津除侍御中尉孝文㓜冲文明太后臨朝津曾入侍左右忽欬逆失聲遂吐數􅂛藏之衣䄂太后聞聲閱而不見問其故具以實言遂以敬愼見稱而賜縑百疋遷符璽郎又曰李元忠嘗貢齊文襄王蒲桃一盤文襄報以百縑其見賞重如此又曰髙遵性不廉清在中書時毎假歸山東必借備騾馬將從百餘屯逼人家不得絲縑滿意則詬詈不去旬月之間縑布千數郡邑苦之又曰薛琡字曇珎正光中行洛陽令部内肅然時以乆旱京師見囚悉召集都亭理􅁈滯洛陽獄有三人孝明嘉之賜縑百疋北齊書曰賈思伯遷南青州刺史􅀄思伯與弟思休師事北海隂鳯授業竟無資酬之鳯遂質其衣服時人爲之語曰隂生讀書不免癡不識􅀟鳯脫人衣及思伯之部送縑百疋遺鳯因具車馬迎之鳯慙不徃時人稱歎焉隋書曰田德懋丁父艱哀毀骨立廬於墓側􅀒土成墳上聞而嘉之遣散􅀐侍郎元志就吊焉復降璽書并賜縑二百疋米百石復下詔表其門閭又曰文帝幸并州留髙頴居守及上還京賜縑五千疋風俗通曰臨淮有一人持一縑到市賣之遂還值雨因共披戴後有人求庇䕃一頭之地雨霽因共爭之各云我縑丞相薜宣决曰縑直數百錢何足紛紛呼騎吏中断縑各與半後人曰受恩矣前撮之縑主稱怨不巳宣考乃歎服􅀓子曰漢宋魏太祖以天下凶荒資財乏匱擬古皮弁裁縑帛以爲帙何晏九州論曰清河縑房綿荀朂爲􅀳文王與孫皓書曰餉細縑十疋帛尚書堯典曰舜脩五禮五玉三帛周禮地官曰媒氏凡嫁子娶妻入幣純帛無過五兩又春官曰肆師之職常立國祀之禮以佐太宗伯佐助也立大祀用玉帛牲牷又春官典命曰凡諸侯之適子誓於天子攝其君則下其君之禮一等未誓則以皮帛繼子男又夏官下職方氏曰并州其利布帛又冬官考工記曰繼子男執皮帛謂公之􅀌也見禮次子男贄用束帛而以豹皮表之爲飾又曰涷帛以欄爲􅁅渥淳其帛實諸澤器􅁋之以􅜹渥讀如繒人渥管之渥以欄木之􅁅漸釋其帛出鄭司農云澤器謂滑澤之器􅜹謂炭也士冠礼曰素積白屨以魁柎之􅀃曰魁蛤也周官亦有白盛之􅜹􅜹蛤也玄謂􅁋薄粉之令帛白蛤今海旁有焉清其􅁅而盝之而擇之清澄也於􅁅澄而出盝晞之晞而揮去其􅜹而沃之而盝之而塗之而􅀫之更渥淳之眀日沃而盝之朝更沃至夕盝之又更沃至旦盝之亦七日如漚絲也晝􅁀諸日夜􅀫諸井七日七夜是謂水涷禮記月令曰季春之月開府庫出幣帛周天下勉諸侯聘名士禮賢者又檀弓上曰伯高之䘮孔氏之使者未至冉子攝束帛乗馬而將之孔子曰異哉徒使我不得成禮於伯髙又王制曰布帛精麤不中數廣狹不中量不鬻於市又曰七十非帛不暖又禮運曰後聖有作治其絲麻以爲布帛又内則曰國君丗子生三日卜士􅀒之告者􅀫齋朝服寢門外保受乃􅀒之宰禮􅀒子賜之束帛又曰婦人或賜之飲食衣服布帛則受而獻諸舅姑又坊記曰子云禮之先幣帛也欲民之先事而後禄也此禮謂所執之贄以見者也旣相見乃奉幣帛以脩好也或云禮之光辭而後幣帛左傳襄上曰季文子卒大夫入歛公在位宰庀家器爲葬備無衣帛之妾無粟食之馬無藏金玉無重器備又哀上曰邾茅夷鴻以束帛乗韋自請救於呉無君命故言自毛詩鹿鳴曰鹿鳴醼羣臣嘉賔也旣飲食之又實幣帛筐篚以將其厚意周易賁卦曰賁于丘園束帛戔戔春秋元命苞曰須女四星十二度主布帛史記曰武帝使使束帛加璧安車駟馬迎申公又曰子貢結駟連􅀐束帛之幣以聘享諸侯所至國君無不界迎與抗禮者夫使孔子名布􅀭於天下者子貢先後之也又曰帛千鈞比千乗家又曰陳勝乃多書帛言陳勝王置人所􅊻魚腹中卒買魚得書恠之漢書曰武帝使東方朔射中上曰善賜帛十疋郭舎人曰朔齊人多變更致他物射之中則臣榜百不中賜臣帛朔又中乃榜舎人又曰舘陶公主乃命私府曰董君所發一日金蒲百斤錢蒲百萬帛蒲千疋乃白之又曰婁護爲諌議大夫使郡國護假貸多持幣帛過齊上書求上先人冡因㑹宗族故人各以親䟽遺以束帛一日散百金之費東觀漢記曰耿純於邯鄲見上遂自結納獻馬及縑帛數百疋又曰長安語云城中好廣䄂四方用疋帛范曄後漢書曰明帝出諸貴人當徙居南宫馬太后感析別之懷賜越帛三千端雜帛二千疋又曰永平六年雒山出寳鼎廬江太守獻之於廟賜三公帛五十疋九卿二千石半之續漢書曰宋秉字巨公拜御史中丞布􅀍瓦器居不粟馬出無從車車駕幸其府舎歎曰雖楚國二龔不如雲陽宣巨公賜布帛帳帷什器後漢書曰公孫述造十層赤樓帛蘭船蓋以帛飾其欄檻也魏略曰陳留邯鄲淳奏投壷賦文帝以爲尚書郎賜帛十疋魏志曰張伯英專精於書凡家之衣帛必書而後練􅀳陽秋曰董威常􅀫社中時乞於市得殘碎繒結以自覆金帛桂綿則不肯受沉約宋書曰文帝􅀽皇后毎就上求錢帛贍家上性節儉所得不過錢三五萬帛三五十疋南史曰宋鮑昭嘗謁臨川王義慶未見知欲貢詩言志人止之曰卿位尚卑不可輕忤大王昭勃然曰千載上有英才異士沉没而不聞者安可數哉大丈夫豈可遂藴智能使蘭艾不辯終日碌碌與鷰雀相隨乎於是奏詩義變竒之賜帛二十疋齊書曰劉顯將之㝷陽顯懸帛十疋約曰衣來者以賞之衆人竟改常服不過長短之間顯曰將有甚於此矣旣而周弘正緑絲布袴繡軒昂而至折標取帛梁書曰郭祖深清儉常服故布􅃭素木按食不過一􅁏有姥餉一早青􅀲祖深報以疋帛後有冨人効之以貨鞭而徇衆朝野憚之後魏書曰髙允拜中書令帝幸允第唯草屋數間布􅀍緼􅂁厨中塩菜而巳帝歎息曰古人之清貧豈有此乎即賜帛五百疋粟千斛又曰韋珎字靈智累遷顯武將軍郢州刺史所在有聲績朝廷嘉之遷龍騎將軍賜驊騮二疋帛五十疋􅂖三百斛珎乃召集州内􅀌貧者謂曰天子謂我能撫綏卿等故賜以􅂖帛吾何敢獨當遂以所賜悉分與之隋書曰文帝嘗遣髙頴大閱於龍臺澤諸軍部伍多不齊整唯閻毗一軍法制肅然頴言之於上時蒙賜帛又曰張定和􅀄爲侍官㑹平陳之役定和當從征無以自給其妻有嫁時衣服定和將鬻之妻靳固不與定和於是遂行以功拜儀同賜帛千疋遂弃其妻唐書曰髙祖傾府藏以賜勲人而又患國計不足劉義節進計曰令義師數十萬並在長安樵薪貴而布帛賤􅀂伐街衢及􅁐中之樹爲樵易布帛歳取數十萬立可致也又藏内繒絹疋皆有餘軸之使申截剰物以供􅄂費動盈千餘萬疋髙祖並從之大収其利又曰太宗召太子舎人陸敦信勞之曰爾所録古先太子善惡之事多所規諷誠有可嘉因賜帛五十叚又曰貞觀中皇后所生長樂公主將出降勑資送倍於長公主魏徴諌以漢眀帝以朕子安得同於先帝子后聞之以爲難可謂正直社稷之臣也固請遣中使賫帛五百疋賜徴又曰貞觀十一年賜遭水之家帛十五疋半毀者八疋又曰王君廓少􅀌貧無行以剽刼爲業亡命聚徒以逆􅁂竹器籠人頭而奪其繒帛又曰開成中以諌議大夫蕭俶爲楚州刺史俶故相俛之弟將赴任延英候辤上曰蕭俛是先朝賢相筋力未衰即湏一來京國朕今賜手詔及賜帛三百疋以備山谷所乏戰國䇿曰公子魏牟過趙趙王㘴前有尺帛且令工以爲冠趙王曰公子臨寡人願聞所以爲天下魏牟曰王能重王之國􅀂是尺帛則王之國大治矣王有此尺帛何不令郎中以爲冠爲冠而敗之奚虧王國而王必待工乃使之今社稷爲丘墟先人不血食王不以與工乃與㓜艾也事具冠門河圖玉板曰崑崙以東得大秦之國人長十丈皆衣帛韓詩外傳曰孔子之齊遇程丕子於譚郯之間傾蓋而語終日孔子曰取束帛十疋以贈先生又曰孔子顔淵登魯東山望呉昌門淵曰見一疋練前有生藍子曰白馬蘆蒭也東方朔別傳曰武帝幸甘泉長平阪道中有虫覆地如赤肝朔曰必秦獄處也夫愁者得酒而解乃取虫置酒中立消麋賜帛百疋後屬車上盛酒爲此故也法言曰禽獸食人之食土木衣人之帛􅂖人不足於晝絲人不足於夜此謂惡政也風俗通曰諸侯相贈乗馬束帛束爲帛與馬相疋崔寔四民月令曰八月清風戒寒趣絹縑帛荀卿禮賦曰爰有大物非絲非帛文采成章邯鄲淳上受命述詔曰淳作此甚典雅斯亦美矣朕何以堪之哉其賜帛四十疋太平御覽卷第八百一十八
