body:
  text: 資産部十一獵上周禮地官曰郷師凡四時之田前期出田法于州里簡其鼔鐸旗物兵器脩其卒伍田法人徒及所當有及期以司徒之大旗致衆庶而陳之以旗物辨郷邑而治其政刑禁巡其前後之屯而戮其犯命前者斷其爭禽之訟又曰迹人掌􅀖田之地政爲之厲禁而守之凡田獵者受令焉又曰小司徒凡起徒役母過家一人以其餘爲羡唯田與追胥竭作鄭司農云羡饒也田謂獵也追宼賊也竭作盡行又夏官大司馬之職曰中春遂以蒐田有司表貉誓民鼓遂圍禁火弊獻禽以􅀕社春田爲蒐有司大司徒也掌大田役治徒庶之政令表貉立表而貉􅀕也誓氏誓以犯田法之罰也中夏遂以苗田如蒐之灋車弊獻禽以享礿夏田爲苗釋取不孕任者􅀂治苗去不秀實者云車弊驅獸之車止中秋遂以獮田如蒐田之法羅弊致禽以祀祊秋田爲獮獮殺也羅弊罔止也秋田主用罔中殺者多也皆殺而罔止中冬遂以狩田以旌爲左右和之門羣吏各帥其車徒以叙和出左右陳車徒有司平之旗車卒間以分地前後有屯百歩有司廵其前後險野人爲主易野車爲主冬田爲野言守取之無所擇也軍門曰和今謂之壘門立兩旌以爲之叙和出用次第出和門也旗軍吏所載分地調其部曲踈數前後有屯百歩車徒異羣相去之數也險野人爲主人居前易野車爲主車居前旣陳乃設驅逆之車有司表貉于陳前驅驅出禽獸使趨田者也逆逆要不得令走設此車者田僕也中軍以鼙令鼓人皆三鼔羣司馬振鐸車徒皆作遂鼓行徒衘枚而進大獸公之小禽私之􅀗者取左耳又曰田僕掌馭田路以田以鄙田路木路也田田獵也鄙循行縣鄙掌佐車之政佐亦副設驅逆之車驅驅禽使前趨􅀗逆衘還之使不出圍令􅀗者植旌以告􅀗也植樹也及獻比禽田弊􅀗者各獻其禽比種物相從次數之禮記月令仲冬曰山林藪澤有能取􅂼食田獵禽獸者有司敎導之又季冬曰乃敎田獵以習五戎又曲禮曰國君春田不圍澤大夫不掩羣士不取麛􅆑生乳之時重傷其􅀋又王制曰天子諸侯無事則歳三田一爲乾豆二爲賔客三爲充君之庖三田夏不用無事而不田曰不敬田不以禮曰暴天物天子不合圍諸侯不掩羣天子殺則下大綏諸侯殺則下小綏綏當爲綏綏有虞氏之旌旗也大夫殺則止佐車佐車止則百姓田獵佐車驅送之車􅆩􅀕魚然後虞人入澤梁豺􅀕獸然後田獵鳩化爲鷹然後設罻羅草木零落然後入山林昆虫未蟄不以火田取物必順時候不麛􅆑不殺胎不殃夭不覆巢覆敗左傳文公上曰宋華御事逆楚子勞且聽命時楚欲誘呼宋共戰御事華元父遂道以田孟諸孟諸宋大藪也在梁國睢陽縣東北宋公爲右盂鄭伯爲右盂孟田獵陳名期思公復遂爲右司馬復遂楚期思邑公今弋陽期思縣子朱及文之無畏爲左司馬將獵張兩甄故置二左司馬然則右司馬一人當中央命夙駕載燧燧取火然者也又襄四年曰昔周辛甲之爲太史也命百官官箴王闕辛甲周武王大史闕過也使百官各爲箴辭戒王過於虞人之箴虞人掌田獵曰芒芒禹迹畫爲九州芒芒逺貌畫分也經啓九道啓開九州之道民有􅃦廟獸有茂草各有攸處德用不擾人神各有所歸故得不亂在帝后羿冒于原獸冒貪也忘其國恤而思其麀牡言但念獸武不可重重猶數也用不恢于夏家羿以好武雖有家而不能恢大之獸臣司原敢告僕夫獸臣虞人僕夫不取斥守虞箴如是可不懲乎於是晉侯好田故魏絳及之及后羿事又襄十七年曰衛孫蒯田于曹隧越竟而獵孫蒯林父之子飲馬于重丘重丘曹邑毀其瓶重丘人閉門而訽之訽罵也曰親逐其君爾父爲厲厲惡􅀑林父逐君在十四年是之不憂而何以田爲又襄三十年曰鄭豊卷將􅀕請田焉弗許田獵也田唯君用鮮鮮野獸衆給而巳衆臣􅀕以芻豢爲足又昭公曰齊侯田于沛言疾愈行獵沛澤名招虞人以弓不進虞人掌山澤之官公使執之辭曰昔我先君之田旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舎之仲尼曰守道不如守官君招當徃道之常也非物不進官之制也君子韙之韙見也又定公上曰魏獻役於韓簡子及原壽過簡子韓起孫不信也原壽過周大夫而田於大陸焚焉禹貢大陸在鉅鹿地嫌絶逺疑此田在汲郡呉澤荒蕪之地大田并見燒也爾雅廣平日陸還卒於􅇞􅇞今修武縣近澤范獻子去其柏椁以其未復命而田也范獻子代魏子爲政去其柏椁示貶之又哀公下曰西狩於大野叔孫氏之車子鉏啇􅀗麟大野在髙平鉅野縣東北大澤是也車子微者鉏啇之名以爲不祥以賜虞人時所未嘗見故怪虞人掌山澤之官仲尼觀之曰麟也然後取之言魯史所以得書􅀗麟之也榖梁傳昭公曰秋獀于鴻正也獀狩以習用戎事禮之大者也艾蘭以爲防置旃以爲轅門禽雖多天子取三十焉其餘射於宫射而中田不得禽則得禽田得禽射而不中則不淂禽以是知貴仁義而賤勇力也毛詩鵲巢曰騶虞鵲巢之應也鵲巢之化行人倫旣正朝廷旣治天下純􅀍文王之化則庶􅀋蕃殖蒐田以時仁如騶虞則王道成也彼茁者葭茁出也葭蘆也記蘆始出者著春田之早晚也一發五豝虞人翼五豝以待公之發于嗟乎騶虞騶虞義獸有至信之徳則應彼茁者蓬蓬草一發五豵豕一歳曰從于嗟乎騶虞又緇衣叔于田曰叔于田巷無居人不如叔也洵美且仁又雞鳴曰還刺荒也襄公好田獵從禽獸而無厭國人化之遂成風俗習於田獵謂之賢閑於馳遂謂之好焉子之還􅀆遭我乎峱之間􅀆並驅從兩肩􅀆揖我謂我儇􅀆從逐也獸三歳曰肩儇利也又雞鳴盧令曰盧令刺荒也襄公好田獵罼弋不脩民事百姓苦之故陳古以風焉盧令令其人美且仁又嘉魚曰􅁻日美宣王田也􅁻日維戊旣伯旣禱田車旣好四牡孔阜升彼大阜從其羣醜􅁻日庚午旣差我馬獸之所同麀鹿麌麌􅃮沮之從天子之所周易曰比卦王用三驅失前禽也尚書五子之歌曰太康尸位以逸豫滅厥德􅀺民咸貳乃盤遊無度畋于有洛之表十旬弗反尚書歸藏曰穆王獵于戈之墅韓詩内傳曰春曰畋夏曰獀秋曰獮冬曰狩天子抗大綏諸侯小綏辟小獻禽其下天子親射之旍門夫田獵因以講道習武簡兵也爾雅曰春獵爲蒐郭璞注曰搜索取不任者夏獵爲苗爲苗稼除害也秋獵爲獮鮮少者從殺氣也冬獵爲狩得獸取之無所擇宵田爲獠管子曰獠獵畢弋今江東亦呼獵爲獠音爲遼或曰即今夜獵載鑪照也火田爲狩放火燒草獵亦爲狩史記曰西伯將畋卜之曰所獲非熊非羆霸王之輔西伯果遇吕望釣于渭濵遂載歸號太公望又曰任安字少卿邑中人民俱岀獵安常爲人分麋鹿雉兔部署老小劇易衆人皆喜又曰今上爲膠東王時韓嫣與上學書相愛及上爲太子愈益親嫣善􅀐射上即位欲事代匈奴而嫣先習胡兵以故益尊貴嫣常與上卧起江都王入朝有詔得從入獵上林中天子車駕馬未行而先使嫣乗副車從數十百􅀐馳騖視獸江都王望見以爲天子避從者伏謁道旁嫣驅不見旣過江都王怒爲皇太后泣請得歸國入􅀫衛比韓嫣太后由此嫌嫣戰國䇿曰魏文侯與虞人期獵是日飲酒樂天􅀨文侯將出左右曰今日飲酒樂天又雨君焉出文侯曰吾與虞人期獵雖樂豈可不壹㑹期哉乃往漢書曰李廣􅀍黜與故頴隂侯屏居藍田南山中射獵嘗夜從一􅀐出從人田間飲還至亭霸陵尉醉呵止廣廣􅀐曰故李將軍也尉曰今將軍尚不得夜行何故也􅀫廣亭下魏志曰夏侯淵之子稱年十六淵與之畋見奔虎執楯驅馬逐之禁之不可一箭而中名聞太祖太祖把其手喜曰我得將矣又曰文帝將出遊獵鮑勛停車上䟽曰五帝三王靡不明本立教以孝治天下柰何在諒闇之中脩馳騁之事乎毀其表而竟行獵中道頓息問侍臣獵之與樂何樂八音也侍中劉曄對曰獵勝於樂勛抗辭曰夫樂上通神明下和人理故移風易俗莫善於樂況獵暴華盖於原野因奏劉曄倿䛕不忠又曰􅂫則從文帝獵蹉跮失鹿帝大怒踞胡床㧞刀悉収督吏將斬之則稽首曰臣聞古之聖王不以禽獸害人今陛下方隆唐堯之化而以獵戲多殺羣吏愚臣以爲不可敢以死請帝曰卿直臣也遂皆赦之又曰清河令徐季龍使人行獵令管輅筮其所得輅曰當􅀗小獸復非食禽雖有􅀲牙微而不彊雖有文章蔚而不明非虎非雉其名曰貍獵人暮歸果如輅言魏末傳曰􅀄帝以母廢未立爲嗣文帝與俱獵見子母鹿文帝彎弓射其母令帝復射其子帝置弓泣曰陛下巳殺其母臣不忍殺其子帝曰汝語動人心遂定爲嗣也呉志曰孫權毎日獵常乗馬射虎虎嘗突前攀持馬鞍張昭變色而前曰將軍何有當尓夫爲人君者謂能駕御英雄驅使羣賢豈謂馳逐於原野校勇於猛獸者乎如有一旦之患柰天下􅀏何權詔曰年少慮事不過逺以此慙君然猶不能巳江表傳曰曹公與孫權書曰兵者奉辭伐罪旍麾南指劉琮束手今水軍八十萬衆與將軍㑹獵於呉王隱晉書曰魏舒字陽元少工射着韋衣入山澤毎獵大獲南史曰宋衡陽王義季鎮荆州嘗大蒐於郊有野老帶苫而耕命左右斥之老人擁耒對曰昔楚子盤遊受譏令尹今陽和扇氣播厥之始一日不作人失其時大王馳騁爲樂驅斥老夫非勸農之意義季止馬曰此賢者也命賜之食齊書曰王僧逹爲宣城太守性好遊獵而山郡無事僧逹肆意馳騁或三五日不歸受辤辯訟多在獵所人或逢不識問府君所在僧逹報曰在近梁書曰曹景宗㓜善􅀐射好畋獵常與少年數十人澤中逐麞鹿毎衆􅀐趂鹿馬相亂景宗於衆中射之人皆懼中馬足應􅁌輒斃以此爲樂後景宗爲楊州刺史出行常欲褰車帷幔左右輒諌以位望隆重人所重瞻不冝然景宗謂所親曰我昔在郷里􅀐快馬如龍與年少軰數十􅀐拍弓􅁌作霹􅆮聲箭如餓鴟叫平澤中逐麞數助射之渴飲其血饑食其􅠛甜如甘露漿覺耳後風生鼻頭出火此樂使人忘死不知老之將至今來楊州作貴人動轉不得路行開車幔小人輙言不可閇置車中如三日新婦此邑邑使人無氣南史曰宋臧熹常與溧陽令阮崇獵遇猛獸突圍獵徒並散熹射之應􅁌而倒崔鴻十六國春秋後趙録曰石虎遣司農中郎將費霸帥工匠四千於東平罡山造獵車千乗轅長三丈髙丈八尺格虎車四十乗立級行樓二層於其上自靈昌津南至滎陽東極陽都而還使御史􅁥司其中禽獸有犯者罪至大辟又曰石虎命太子宣行祈山川遊獵藪澤乗大輅羽葆華蓋建天子旌旂十有六軍戎卒八萬出金明馳逐終夕所在陳列行宫四靣各以百里爲度驅圍禽獸皆暮集行宫文武跪立圍守重行􅇏炬星羅光燭如晝勁􅀐百餘馳射其中宣與顯德美人乗輦觀之嬉娯忘反獸殫乃止禽獸奔逸當之者坐有爵者奪又􅁗録曰姚興性好遊田頗損農要京兆杜延以左僕射齊難無匡輔之益著豊草詩以箴之難具以聞馮翊相靈作德獵賦以風焉興皆覽而善之賜以金帛然終不能改也後魏書曰于栗磾隨新安公道武田於白登山見熊將數子頋栗磾曰能􅅮之乎對曰􅀂􅅮之不勝豈不虚斃一壯士自可驅致御前而制之尋皆擒獲帝頋而謝之又曰􅀫石常從獵文成親欲射猛獸石叩馬諌引帝至髙原上後猛獸騰躍殺人詔褒美其忠許後有犯罪宥而勿坐又曰來大千常從明元校獵見獸在巖上持矟直刺之應手而死帝嘉其勇壯北史曰齊元恒字集和自言寧三日不食不能一日不獵又曰齊崔子植位冀州別駕走馬從禽髪掛木而死後周書曰逹奚震武之子也少驍勇便􅀐射太祖嘗於渭北校獵時兎過太祖前震與諸將競射之馬倒而墜震足不傾躓因歩走射之矢發中兎頋馬纔趨遂廻身騰上太祖喜曰非此父不生此子乃賜震雜綵百叚唐書曰武德七年十二月庚辰臘上曰臘者獵也膢臘以供宗廟朕當躬親其事以申孝享之誠於是岀狩於鳴犢泉又曰􅂫丗長拜諌議大夫嘗從幸涇陽校獵至髙陵合圍是日大獲陳禽獸於旌門上入御營頋謂朝臣田畋樂乎丗長進曰陛下游獵薄廢萬機不滿十旬未爲大樂上色變旣而􅀏曰狂態發也又對曰爲臣私計則狂爲陛下國計則忠矣又曰唐儉授民部尚書從太宗於洛陽苑射猛獸儉見羣豕突出林中太宗引弓四發殪四豕有一雄彘及馬鐙儉懼將􅅮之太宗拔劒斷豕頭􅀏曰天䇿長史不見上將擊賊􅁘何懼之甚儉對曰漢髙祖以馬上得之不可以馬上理之陛下以神武定四方豈復逞雄心於一豕太宗納之因罷獵又曰貞觀十四年太宗欲親幸同州遊獵櫟陽縣丞劉仁􅁤上䟽曰四時蒐狩前王恒典事有㳂革未必因循今年甘雨應時秋稼甚盛盡力収穫月半猶未畢功貧家無力禾下始擬種麥直據㝷常料喚田家以有所妨今旣祗供頓事兼之修理橋道縱謂大簡動費一二萬工百姓収歛實爲狼狽臣願陛下少留萬乗之尊垂聽一介之􅀃退延旬日収刈揔了則盡閑暇家得康寧鑾駕徐動公私交泰上降璽書勞之又曰太宗謂髙昌王麴文㤗曰丈夫在生樂事有三天下太平家給人足一樂也草淺獸肥以禮田狩弓不虚發箭不妄中二樂也六合大同萬方咸慶張樂髙宴上下歡洽三樂也今日王可從禽明日當飲讌耳又曰髙宗狩于陸渾縣六日止飛山㒹髙宗親御弧矢獵四鹿及兎數十頭晚次御營望見太官烹宰欲供百官之膳因問侍中許圉師曰朕目擊彼羊在於格下見其無罪就戮非無憫惻之情今欲以死獸易之可乎圉師對曰昔者宋文侯見人欲將牛釁鍾因曰吾觀此牛觳觫似無罪而就死也乃不釁鍾陛下取巳死之鹿代欲刲之羊則堯舜之用心地遂釋其羊不殺九日又於山南布圍大順府果毅王萬興以輒先促圍集衆欲斬之上謂侍臣曰軍令有犯罪在不赦恐外人謂我翫好畋獵輕斷人命又以其從征遼有功特令放免又曰髙宗出獵在路遇􅀨因問諌議大夫谷郍律曰油衣􅀂爲不漏對曰能瓦爲之必不漏矣上大恱因此不復出獵又曰髙宗駕幸自九成宫還宫仍西狩校習自麟遊西北遶歧梁歴普潤止雍爲兩圍殿中侍御史杜易簡賈言忠􅁥圍山阜懸危杖䇿不得蹔停凡五日而合劾奏將軍劉􅀇意黄河上等斷圍玄意抵罪黄河上圍曰軍容齊整詔特原之又曰呉王恪好畋獵損居人田苗侍御史栁範奏彈之上因謂侍御臣曰權萬紀事我兒不能匡正其罪合死範進曰房􅀇齡事陛下猶不能諌止畋獵豈可獨非萬紀太平御覽卷第八百三十一
