front:
  text: 太平御覽卷第一百一十七
  hash: sha256:310ace8d79ddfb7bd670f26c42040d7bc23de0a38657eed92ee0edebdc8ba7ed
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_117-1a}
body:
  text: 偏霸部一蜀劉備劉禪劉備蜀志曰先主姓劉韋備字􅀇德涿郡人漢景帝子中山靖王勝之後也勝子貞元狩六年封􅃰縣陸城亭侯坐酎金失侯因家焉典畧云備夲臨邑侯枝属先主祖雄父􅀪丗仕州郡雄舉孝廉官至東郡􅁐令先主少􅀌母販履織席爲業舎東南角籬上有桑樹上髙五尺餘遥望重重如小車蓋往來者皆恠此樹非凢或謂當出貴人漢􅀳春秋曰􅃰人李定云此家必出貴人也先主少時與宗中諸兒於樹下戯言吾必當乗此羽葆蓋車叔父子敬謂曰汝勿妄語滅吾門矣年十五母使斈同宗劉德然遼西公孫瓉俱事故九江太守同郡盧植德然父元起常資給先主與德然等元起妻曰各自一家何能常尓耶起曰吾宗中有此兒非常人也瓉深與先主相友瓉年長先主以兄事之先主不甚樂讀書喜狗馬音樂美衣服身長七尺五寸垂臂下膝頋自見其耳少語言善下人喜怒不形於色好交結豪俠年少爭附之中山大啇張丗平􅂫􅀟等貲累千金販馬周旋於􅃰郡見而異之乃多與之金先主由是得用合徒衆靈帝末黃巾起州郡各舉義兵先主率其属從校尉鄒靖討賊有功除安喜尉大將軍何進遣都尉詣丹陽募兵先主與俱行至下邳遇賊力􅀾有功除下密丞復去官後爲髙唐尉遷爲令爲賊所破往奔公孫瓉表爲別部司馬使与青州刺史田楷拒兾州收􅀽紹数有功守平原令後領平原相郡民劉平素輕先主恥爲之下使客刺之客不忍刺語之而去其得人心如此􅀽紹攻公孫瓉先主與楷東屯齊曹公征徐州徐州牧陶勾遣使告急於楷楷与先主俱救之時先主有兵千餘人謙以丹陽兵四千人益先主遂去揩㱕謙謙表先主爲豫州刺史屯小沛謙病謂别駕縻笁曰非劉備不能安此州謙死笁帥州人迎先主先主未敢當下邳陳登謂先主曰今漢室陵遟海内傾覆立功立事在於今日彼州殷富户口百万欲屈使君抚臨州事北海相孔融謂先主曰今日之事百姓与能天与不取悔不可追先主遂領徐州􅀽術來攻先主拒之於盱眙淮隂曹公表先主爲鎭東將軍封冝城亭侯是歳建安元年也先主与術相持經月吕布乗虚襲下邳守將曹豹反間迎布布虜先主妻子先主求和於布布還其妻子遣先主還小沛復合兵得万餘人布惡之自出攻先主先主敗走歸曹公曹公厚遇之以爲豫州牧曹公助先主圍布於下邳生擒布先主復得妻子從曹公還許表先主爲左將軍礼之逾重出則同輿入則同席衮術欲經徐州北就􅀽紹曹公遣先主督朱靈路招要等術未至術病死曹公從容謂先主曰天下英雄唯使君與操耳夲􅀄之徒不足数也先主方食失匕箸先主據下邳乃殺操徐州刺史曹胄留􅀜羽守下邳身還小沛曹公東征先主敗績曹公盡收其衆虜先主妻子并擒􅀜羽以歸先主走青州青州刺史􅀽譚先主故茂才也將歩􅀐迎先主先主隨譚到平原譚馳使白紹紹遣將道路奉迎身去鄴二百里與先主相見􅀜羽亡歸先主曹公遣曹仁將􅀐擊先主先主還紹軍隂欲離紹乃􅀃紹南連荆州收劉表紹遣先主將本兵至汝南遣麋笁孫乾與劉表相聞表自郊迎以上賔待之先主在荆州數年甞於表坐起至厠見髀裏肉生􅁣然䟽悌還坐表恠問備曰平常身不離鞍髀肉皆消今不復􅀐髀裏肉生日月若馳老將至矣而功業不建是以悲耳一日徐庶謂先主曰諸􅁑孔明卧龍也將軍豈不欲見乎先主曰可以俱来庶曰此人可就見不可屈致也宜枉駕頋之由是先主遂詣亮廬凢三見之因屏人曰漢室傾頽姧臣竊命􅀌不度德量力欲仗大義於天下而智術淺短遂用猖蹶然志由未巳君爲計將安出亮曰自董卓巳來豪傑並起跨州連郡者不可勝計曹操比於􅀽紹則名微而衆寡操遂能克紹以弱爲強非唯天時抑亦人事今操巳擁百万之衆挾天子而令諸侯此誠不可与爭鋒也孫權據有江東巳歷三代國險而民附賢能爲之用此可與爲援而不可圖也荆州北據漢江利盡南海東連呉㑹西通巴蜀此用武之國也而其主不能守殆天所以資將軍也益州隘塞沃野千里天府之土髙祖因之以成帝業劉璋暗弱張魯在北人殷國富而不知恤智能之士思得明君將軍旣帝室之胄信義著於四海㹅􅄃英雄思賢如渇若跨有荆益保其巖阻西和諸戎南撫夷越結好孫權内修政事天下有變則命上將將荆州之軍以向宛洛將軍身率益州之衆出於秦川百姓孰不簞食壼漿以迎將軍者乎誠如是則霸業可成漢室可興矣先主曰善於是與亮情好日宻􅀜羽張飛不恱先主解之曰􅀌之有孔明如魚之有水也願諸君勿復言十二年曹公北征烏丸先主􅀃表襲許表不能用及曹公南征㑹表死子琮代立遣使請降先主屯樊城遂將其衆去過襄陽諸􅁑亮􅀃攻琮荆州可有先主曰荆州臨亡訟我以􅀌背信自濟死何靣目見劉荆州乎吾不忍也琮左右及荆州人多歸先主比到當陽衆且十萬輜重数千􅀨日行十餘里或謂先主曰宜速行保江陵今雖擁大衆􅀍甲者少若曹公兵至何以拒之先主曰夫濟大事者以人爲夲今人歸吾何忍弃去是時曹么又以江陵有軍實恐先主據之乃釋輜重輕軍到襄陽聞先主巳過曹公將精􅀐五千急追之一日一夜行三百餘里及於當陽之長坂先主弃妻子與諸􅁑亮張飛趙雲等数十􅀐走遣諸􅁑亮自結於孫權權遣周瑜等助之與曹公􅀾於赤壁大破之焚其舟舩羣下推先主爲荆州牧治公安益州牧劉璋内懷恐懼遣法正迎先主先主留諸􅁑亮􅀜羽等據荆州將歩卒数万人入益州璋推先主行大司馬領司􅀠校尉先主推璋行鎭西大將軍益州牧璋􅃙􅀜戍諸將文書勿復關通先主先主大怒進圍成都数十日璋出降蜀中殷盛豐樂先主置酒大饗士卒蜀城中金銀分與將士還其榖帛先主復領益州牧羣下尊先主爲漢中王還治成都魏文帝稱尊號傳聞漢帝見害先主乃發喪制服追謚曰孝􅉖皇帝是後建立礼儀上尊號即皇帝位於成都章武元年夏四月大赦改年永安三年先主病篤託􅀌於丞相亮夏四月先主殂于永安宮時年六十三五月梓宮自永安還成都謚昭烈皇帝秋八月葬惠陵華陽國志曰漢末大乱雄傑並起若董卓呂布二􅀽韓馬張楊劉表之徒兼州董郡衆動万計叱咤之間皆自謂漢祖可踵桓文易邁而魏武神武肆略戡屠盪盡于時先主名微衆鮮而能龍興鳯舉假翼荆楚畨飛梁益建元㣧漢與之鼎跱非英才命丗孰克如是劉禪蜀志曰後主諱禪字公嗣先主子也建安二十四年先主爲漢中王立爲王太子即尊號爲皇太子先主殂于永安宮後主襲位於成都時年十七是歳魏黄􅀄四年也景耀六年夏魏大興徒衆命征西將軍鄧艾數道並攻用光禄大夫譙周䇿奉書於艾後主輿襯自􅅞詣壘門艾解􅅞焚櫬延請相見因承制拜後主爲驃􅀐將軍諸圍守悉􅀍後主􅃙然後降下艾使後主止其故宫身往造焉後主乃舉家東遷在位凢四十年旣至洛陽䇿命爲安樂縣公食邑萬户賜絹萬疋奴婢百人後司馬文王與後主宴爲之作樂故蜀妓傍人皆爲感愴而後主喜􅀏自􅀂王謂賈充曰人之無情乃至於是雖使諸􅁑亮在亦不能輔之况姜維邪充曰不如是殿下何由并之他日王問禪曰頗思蜀否禪曰此間樂不思蜀也蜀故秘書令郄正聞之求見語禪曰王復問可言先人墳墓逺在隴蜀乃心西悲無日不思因閉其目㑹王復問禪以此荅王曰何乃似郄正之語也禪驚曰此實如尊命左右皆大􅀏後薨於洛陽魏略曰始備在小沛不意曹公卒至迫遽棄家属奔荆州禪時年數歳匿竄隨人西入漢中爲人所賣及建安十六年􅀜中破亂扶風人劉括避亂入漢中買得禪問知其良家子遂養爲子與娶婦生一子始禪與父相失時識其父字玄德比舎人有姓簡者及備得益州而簡爲將軍備遣簡到漢中舎都邸禪乃詣簡簡相驗訊事皆符驗簡喜以語張魯魯乃洗沐送詣益州備乃立爲太子始備以諸􅁑亮爲太子太傅及禪位以亮爲丞相委以諸爲請亮曰政由葛氏祭則寡人亮亦以禪未閑於政遂揔内外太平御覽卷第一百一十七
