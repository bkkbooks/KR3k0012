front:
  text: 太平御覽卷第七百五十九
  hash: sha256:bd584bd0bf4ef3c77a321df14a918bdb05047b122f2d8574c7d34d15bc8342db
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_759-1a}
body:
  text: 器物部四簠簋瑚璉敦牟爼豆登附籩樏鉶鉢窪甌杯棬欓簠簋三禮圖曰簠受一升下足髙一寸中方外圎􅃮丹中蓋􅀛形諸侯飾以象天子玉飾盛􅁰稷簋受一升足髙一寸中圎外方挫其四角􅃮赤中蓋亦􅀛形其飾如簠盛稻􅆝易曰樽酒簋貳用􅇲鄭􅀇曰唯北有斗不可以挹酒漿斗上有建星建星形似簋貳副也建星上星又似􅇲也納約自牖無咎詩曰權輿刺康公與賢人有始無終也於我乎毎食四簋今也每食不飽于嗟乎不承權輿又曰於粲洒掃陳饋八簋周禮曰瓬音放人爲簋實一觳音夫崇尺厚半寸脣寸儀禮曰佐食分簋士用敦言簋者客同姓之士得從周制禮曰管仲鏤簋而朱絃鄭玄日刻而飾之大夫刻之爲􅀛諸侯飾之以象天子飾之以王君子以爲濫矣又曰周之八簋􅁰稷器也傳曰衛孔文子之攻太叔也訪於仲尼仲尼曰簠簋之事則嘗聞之矣甲兵之事未之學也孝經曰陳其簠簋鄭􅀇曰方曰簠圎曰簋而哀慼之墨子曰堯飯土簋啜土鉶賈􅁩書曰古者大臣有坐不廉而廢者不謂不廉曰簠簋不飾瑚璉三禮圖曰瑚受一升形制未聞制度云如簋而平下璉受一升􅃮赤中蓋亦􅀛形大夫飾口以白金制度云如簋而兊下禮曰夏后氏之四璉殷之六瑚皆􅁰稷器論語曰子貢問賜也何如曰汝器也曰何器也曰瑚璉也盛􅁰稷之器夏曰瑚殷日璉敦牟上音堆三禮圖曰敦有足其形如今酒罇法牟受一斗如敦形古牟受一升平下􅃮赤中飾口以白金蓋亦􅀛形周禮曰􅀂合諸侯則共珠盤玉敦敦盤􅀋也珠玉以爲飾也古以盤盛血以敦盛食也禮曰敦牟危匜音移非餕莫敢用敦牟􅁰稷器也又曰有虞氏之雨敦􅁰稷器儀禮曰主婦設雨敦􅁰稷于爼南爼豆􅀃文曰豆古食肉器也爾雅曰木豆謂之豆豆禮器也瓦豆謂之登即髙登也三禮圖曰豆以木爲之受四升髙尺二寸􅃮赤中大夫以上亦雲􅀞諸侯加象飾口之天子玉飾登以几盛湆音泣受斗二升口徑尺二寸足徑八寸髙二尺四寸小身有蓋似豆狀詩曰卯盛于豆于豆于登又曰邊豆大房大房飾俎周禮曰上公豆四十侯伯豆三十有二子男豆十有四儀禮曰宰夫自東房薦豆六設千醬東又曰大羹湆不加實于登也大戴禮曰武王踐祚於觴豆爲銘焉禮曰魯季夏六月以禘禮祀周公於太廟爼用梡嶡梡音丸嶡居衛切又曰爼有虞氏以梡夏后氏以嶡殷以椇音矩周以房爼鄭玄曰梡斷木爲之四足而巳嶡之言蹶也謂中足爲横距之象周禮謂之距相之言枳椇也謂曲橈之也房謂足下跗也上下兩間有似於堂房魯頌曰邊豆大房也夏后氏以楬苦戞切豆殷玉豆周獻息列切豆掲無異物之飾也獻䟽剖之又曰禮有以多爲貴者天子之豆二十有六諸公十有六諸侯十有二上大夫八下大夫六又曰子云觴酒豆肉讓而受惡民猶犯齒傳曰鳥獸之肉不登於爼皮革齒牙骨角毛羽不登於器則公不射古之制也論語曰衛靈公問陳音陣於孔子孔子曰爼豆之事則嘗聞之矣軍旅之事未之學也史記曰孔子爲小兒時常陳爼豆以爲戯國語曰晉侯使聘周王召士季曰汝今我王室之一二兄弟以相見將和恊典禮以示民訓奉其犧息竒切象出其尊彛陳其爼豆漢書曰韓延夀爲潁川太守令文學諸生皮弁執爼豆爲吏民行喪娶之禮又曰劉向􅀃上曰有司定法筆削救時務也至於禮樂則曰不敢是敢於殺人不敢於養人爲其爼豆管絃之間小不備因絶不爲是去小不備而就大不備東觀漢記曰劉昆教授弟子􅁪五百餘人毎春秋饗射常備列典儀以素木瓠葉爲爼豆莊子曰祝宗人􅀃彘曰汝奚惡死吾將加汝肩尻乎彫爼之上賈誼新書曰昔周文王使太公望傅太子發􅄝鮑歩巧切魚而公弗與文王曰發􅄝鮑魚何爲弗與太公曰禮鮑魚不登乎爼豆豈有非禮而可以養太子乎籩􅀃文曰籩竹豆也爾雅曰竹豆謂之籩禮器也書曰祀於周廟􅀖甸侯衛駿奔走執豆籩詩曰儐尓籩豆飲酒之飫又曰籩豆有楚殽核維旅禮曰鼎爼竒而籩豆偶隂陽之義也左傳曰楚子入享於鄭加籩豆六品又曰鄭伯饗趙孟爲客具五獻籩豆幕下語曰籩豆之事則有司存焉韓子曰晉文公反國至河令籩豆􅂢之手足胼胝者後之咎犯聞之而哭公問之對曰籩豆所以食也而君􅂢之手足胼胝有功者也而君後之今臣與在後中不勝其哀故哭神異經曰西北荒中有玉饋之酒其上有玉樽玉籩樏音壘晉太康起居注曰齊王出蕃詔賜􅳘樽樏杯盤各有差東宫舊事曰􅃮三十五子方樏二沓蓋二枚枹朴子曰丗有使酒之客以杯樏相擲者有矣丗􅀃曰王夷甫嘗屬族之事族人大怒便舉樏擲其面陶偘表白曰鹽塞荒儉唯作方九子樏趨以供事謹上五十葉曹毗杜蘭香傳曰蘭香隆張碩賫方九子樏七子樏鉶音刑三禮圖曰鉶以盛羹受一升口徑六寸有足髙一寸有兩耳蓋士以鐵大夫以銅諸侯以白金飾天子以黄金飾周禮曰上公鉶四十有二侯伯鉶二十有八子男鉶十有八鉶羹器也禮曰實其簠簋籩豆鉶羮墨子曰堯飯土􅁤啜尺劣切土鉶如淳曰鉶器之屬以土爲之瓦器也鉢沈約宋書曰廬江王禕以銅鉢二枚餉宋祖珎齊書曰竟陵王子良與丘令楷江珙音拱等共打銅鉢立韻響滅則詩成可以觀覽北齊書曰元韶魏室竒寳多入韶家有三鉢相盛可轉而不可出二石僞事曰佛圖澄死以生所服金杖銀鉢送終後開棺視之唯見杖鉢存焉佛圖澄别傳曰澄以鉢盛水燒香呪之湏􅁷鉢中生青蓮花西域諸國志曰佛鉢在乹陁越國青玉也受三升許彼國寳之供養乞願終日花香不滿則如言也滿亦如言也交州􅄂事曰太康四年刺史陶璜表林邑王范熊所獻銀鉢一口白水精鉢一口異􅁐曰司州衛士度苦行居士也其母常誦經長齋堂衆僧未食俱望見空中有一物下旣落其前乃是大鉢滿中香飯度以􅀳惠懐之際得道齊王融謝安陸王賜銀鉢啓曰素金之貴有訪山經鐫刻可竒見符神鼎撤膳器於珎羞之席降寳玩於簞瓢之門窪烏􅀲切俗􅀃曰毛㤗買一玉窪八十八万甌方言曰甌甂音遍陳魏宋楚之間謂之㼵今河北人呼小盆爲題子杜啓切自􅀜而西謂之甂其大者謂之甌通俗文曰小甌曰㼵抱朴子曰取金液及水銀以黄土甌盛置之猛火上皆化爲丹以此丹金爲盤盌食其中令人長生諸􅁑恢集曰詔賜恢白甌二枚􅁃翼與燕王書曰今致白甌二枚􅀽彦伯羅山䟽曰善道開尸在石室北壁下形體朽壞止有白骨在昔在都識此道士聞之使人􅁣然其業行殊異當蟬蛻解骨耳石室中先有甌盛香得便掃除燒香梁皇太子謝勑賚廣州甌等啓曰淮南承月之杯豈均符彩西國浮雲之椀非謂瓌竒臣南珎靡究未讀奏曹之表方物罕逢不識議郞之􅀞杯􅀃文曰杯㔶小杯也㔶音貢盛二音通俗文曰醬杯曰盞或謂之䀀夫凡切又薄淹切方言曰㿿音雅椷音緘盞酒盞也䀀呼雅切楊音章歴音摩杯也􅁗晉之郊謂之㿿所謂伯㿿者也自􅀜而東趙魏之間曰椷或曰盞最小杯也或曰䀀其大者謂之聞呉越之間曰􅦝齊右平原以東或謂之􅡸杯其通語也杯落盛杯器籠也陳楚宋魏之間謂之杯落又謂之豆筥自􅀜而西謂之杯落禮曰母没而杯圏巨阮切不能飲焉口澤之氣存焉尓史記曰文帝十七年新垣平使人持玉杯闕下獻之刻曰人主延壽平所言詐下吏誅漢書曰項羽置太公於髙俎上曰不降烹汝翁髙祖曰吾翁即汝翁儻烹遺我一杯羹又曰元帝徴貢禹爲諌議大夫禹奏曰臣甞從之東宫見賜柸案盡文􅀞金銀飾非當所以食臣下也又曰朱博爲御史大夫爲人廉儉食不重味案上不過三杯又曰王嘉爲丞相數上言不冝封董賢上怒詔丞相詣廷尉詔獄吏和藥進嘉引藥杯以擊地謂官屬曰丞相幸得備位三公奉職􅀒國當伏刑都市以示衆豈兒女子耶何謂咀藥而死續漢書曰鄭􅀇飲三百餘杯不醉又禮儀志曰天子明器有瓦大杯十六容三升瓦小杯二十受二升謝承後漢書曰豫章宋叔平爲定陵令素杯食麥飲酒髙弘爲琅邪相桑杯盛漿唐書曰胡楚賔屬文敏速毎飲酒半酣而後操筆髙宗每令作文必以金銀杯盛酒令飲便以杯賜之呉越春秋曰闔閭女自殺以玉杯送之管子曰人君百杯而食又曰桓公管仲鮑叔牙􅇞戚四人飲叔牙奉杯而起曰願公無忘在莒時文子曰清之爲明杯水而見眸子濁之爲闇河水不見太山韓子曰智伯身死三國分其首以爲杯又曰紂爲象箸箕子怖以爲象箸必不加於土鉶必將犀玉之杯象著玉杯必不美菽藿則必薦豹胎又曰樂羊爲魏文侯攻中山其子在中山中山之君烹其子而遺之樂羊坐幕下而饗之盡一杯淮南子曰夫江河之腐胔音漬不可勝數也然􅀕者用之大也一杯酒蠅漬其中疋夫不嘗小也鹽鐵論曰古者汙樽杯飲蓋毎爵樽觴豆及其後庶人器用即竹柳陶匏而巳唯瑚璉觴豆而後彫文彤􅃮今冨者銀口黄耳金壘玉鍾中者野玉紵器金錯屬杯失一杯得銅杯十價錢而用不殊箕子之譏始在天子今在疋夫論衡曰項㬅都好道學仙去家三年而反曰有仙人將我上天離月數里而止月之旁甚寒飢欲食輙飲我流霞一杯王逸子曰顔淵之簞瓢則勝慶封之玉杯何者德行髙逺能絶殊也晉咸康起居注曰詔送遼東使叚遼等鸚鵡杯東宫舊事曰􅃮四升杯四十􅃮杯子三百漢武故事曰上崩後鄠縣有一人於市貨玉杯吏欲捕之因忽不見縣送其器推問茂陵中物霍光呼問􅀃市人形貌如先帝又曰武帝作承露盤仙人象擎玉杯以取雲表之露十洲記曰周穆王時西胡獻夜光常滿杯杯容三升是白玉之精光明照室夕以杯於庭中仰向天比明水便滿杯中水甘香異美斯實神靈之器葛仙公別傳曰仙公爲客設酒不令人傳之見杯自至人前􅀂不盡者則杯不去神仙傳曰左慈能分杯飲酒曹公聞試之慈拔􅆪以畫杯杯即斷飲畢以杯擲屋棟杯懸著屋棟動揺似飛鳥欲落不落良乆乃墮地又曰劉㓻未仙時姮娥降共語如人語不解其章又曰劉㓻未仙時姮娥降共向留一明月杯云以示丗人南州異物志曰鸚鵡螺狀以覆杯形如鳥頭向其腹視似鸚鵡故以爲名南越志曰南海以鰕頭爲長杯頭長數尺金銀鏤之晉廣州刺史嘗以杯獻簡文簡文用以盛藥未及飲無故酒躍於外時廬江太守曲安逺頗解術數即命筮之安逺曰却三旬後庭將有告慶者水嘉郡記曰君鄣山􅀽君廟神降於祝史以神前杯灌地以大羹杯覆之有頃發杯而菌芝生於杯下後漢馮敬通杯銘曰樂則思舊燕則思歡民之失德乾餱以愆束晳貧家賦曰持缺耳之破杯班彪上啓事曰官吏二千石布􅃭羊裘以白木杯飲酒飾虚欲以求名采譽魏武帝上􅄂物䟽曰有銀􅀞象牙杯盤五具陶􅋲故事曰􅋲上雜物䟽有上成帝螺杯一枚棬音卷方言曰孟海岱東齊北燕之間或謂之捲禮曰母没而杯圈不能飲焉口澤之氣存焉耳圈者屈木所以謂巵匜之屬孟子曰告子云性猶􅂎柳也義猶杯棬也孟子曰能順􅂎柳之性以爲杯棬乎欓呉越春秋曰越以甘蜜九欓報呉増封之禮太平御覽卷第七百五十九
