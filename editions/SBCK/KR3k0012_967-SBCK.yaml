front:
  text: 太平御覽卷第九百六十七果部四
  hash: sha256:82643135e21e7d0b6b7ea6373f2aae5c6552531b38ca2a6b692d71c2d3d45a14
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_967-1a}
body:
  text: 桃易通卦驗曰驚蟄大壯􅀄九候桃始華桃不華倉庫多火焦贛易林師之坤曰春挑生華季女冝家毛詩周南桃夭曰桃夭后妃之德也桃之夭夭灼灼其華又曰何彼穠矣華如挑李平王之孫齊候之子又曰投我以木挑報之以瓊瑶又曰投我以桃報之以李大戴禮夏小正曰六月煑桃以爲豆實釋名曰桃濫也鹽水漬而藏之味濫濫然崔寔四民月令曰三月桃花盛農人候時而種也禮記月令曰驚蟄之日桃始華春秋運斗樞曰玉衡星散爲桃爾雅曰桃李醜核桃曰膽之孫炎注曰桃李之􅀋實皆有核膽釋取其羙者又曰旄冬桃子冬熟椃桃山桃椃音斯實如桃而小不解核周禮曰夏食欎律桃李杏梅漢書曰文帝六年十月桃李華續漢書禮儀志曰仲夏之月隂氣萌作以朱索施門戸各以所尚爲飾周人木德以桃爲梗言氣相更也范曄後漢書曰杜林奏曰果桃菜茹之饋集以成􅂍小事無妨於義以爲大戮故國無廉士家無完行具菜門中唐書曰康國貞觀十一年獻金桃銀桃詔令植之於苑囿後唐史曰潞州長栁巷田家有桃樹伐巳經年舊坎仍在其仆木一朝屹然而起行數十歩復於舊坎其家駭異蒼黄散走又曰莊宗年邁多疾馮道因奏事言於帝曰臣願陛下寢膳之間動留調衛道因指御前果實曰如食桃不康翊日見桃而思戒可也如食李不康翊日見李而思戒可也陛下幸思而戒之矣管子曰五沃之􅁟其果冝桃韓子曰昔彌子瑕有竉於衛君與君遊於果園食桃而甘以其半啖君君曰愛我哉忘其口而啖寡人及彌子瑕色衰愛㢮得罪於君曰是固甞啖我以餘桃又曰孔子侍坐於魯哀公哀公賜之桃與􅁰仲尼先飯􅁰而後食桃公曰以􅁰雪桃也對曰􅁰五榖之長果六而桃爲下君子不以貴雪賤梅子曰王莽畏漢髙神靈乃令虎賁抜劒四面斫髙廟桃湯赤鞭灑屋淮南子曰王子慶忌死於劒羿死於桃棓棓大杖以桃木爲之以繫殺羿猶是巳來􅀑畏桃也抱朴子曰桃膠以桑木􅁅漬服之百病愈乆乆身有光在晦夜之地如月岀也多服之則可以斷榖矣又内篇曰五原蔡誕入山而還欺家云到崑崙山有玉桃形如丗間桃但光明洞徹而堅湏玉井水洗之便軟而可食金樓子曰東南有桃都山山上有􅀣樹上有雞日􅀄出照此桃天雞即鳴天下之雞感之而鳴樹下有兩􅀑對持葦索取不祥之􅀑食之今人正朝作兩桃人法乎此也􅀃􅁐曰公孫僑相鄭路不拾遺桃李垂街人不敢取又曰孟甞君將入西􅁗賔客諌之百通則不聽也曰以人事諌我我盡知之􅀂以􅀑道則殺之謁者入曰有客以􅀑道聞客曰臣之來也過於淄水之上見一土耦人方與木梗人語木梗謂土耦人曰子先土也持予以爲耦人遇天大雨水潦並至子必沮壞應曰我沮乃反吾真耳今子東園之挑也刻子以爲梗遇天大雨水潦並至必浮子泛泛乎不知所止今􅁗四塞之國也有虎狼之心恐其木梗之患於是孟甞君逡廵而退而以應卒不敢西嚮􅁗晏子春秋曰公孫接田開強古冶子事景公勇而無禮晏子言於公公餽之二桃曰三子計功而食公孫接田開強先言功援桃而起古冶子又言其功令三子反桃二子慙而自殺古冶子曰耻人以言夸其聲不義也亦反其桃契領而死山海經曰夸父山北有林名曰桃林廣圎三百里其中多馬桃林今在弘農閿郷南饒野馬塩鐵論曰夫桃李實多者來年爲之穰新序曰魏文侯見萁季從者食其園桃萁季禁之文侯曰萁季豈愛桃哉是教我下無犯上也典術曰桃者五木之精也故厭伏邪氣者也桃之精生在􅀑門制百􅀑故今作桃人梗著門以厭邪此仙木也夢書曰桃爲守禦辟不祥夢見桃者守禦官神農經曰玉桃服之長生不死􅀂不得早服之臨死日服之其尸畢天地不朽王粛䘮服要記曰昔者魯哀公祖載其父孔子問曰寕設三桃湯乎荅曰不也桃者起於衛靈公有女嫁楚乳母送新婦就夫家道聞夫死乳母欲將新婦還新婦曰女有三從今属於人死當卒哀因駕素車白馬進到夫家治三桃湯以沐死者出東北隅禮三終使死者不恨吾父無所恨何用三桃湯焉漢舊儀曰山海經稱東海之中度朔山山上有大桃屈蟠三千里東北間百􅀑所岀入也上有二神人一曰神荼二曰欎壘主領万􅄦􅁖害之􅀑執以葦索以食虎黄帝乃立大桃人於門户􅀞神荼欎壘與虎葦索以禦􅀑四王起事曰惠帝征成都王於安陽城北軍敗日巳向中而太官未暇進食左右有賫秋桃十枚便以獻帝帝食三枚石超使人擘手奪三枚漢武故事曰東郡獻短人帝呼東方朔朔至短人指朔謂上曰王母種三千年桃結子此兒不良巳三過偷之矣後西王母下岀桃七枚母自啖二以五枚與帝帝留核着前王母問曰用此何爲上曰此桃羙欲種之母歎曰此桃三千年一着子非下土所植也後上殺諸道士妖妄者百余人西王母遣使謂上曰求仙信邪欲見神人而殺戮吾與帝絶矣又致三桃曰食此可得極壽漢武内傳曰西王母以七月七日降於帝宫命侍女索桃湏􅁷以玉盤盛桃七枚大如雞􅆑形圎色青以呈王母王母以五枚與帝自食二枚西京􅄂記曰上林苑有􅁗桃櫻桃緗核桃霜桃霜下乃堪食金城桃胡桃綺葉挑含桃紫文桃妬記曰武陽女嫁阮宣武妬忌家有一株桃樹華葉灼耀宣歎羙之即便大怒使婢取刀斫樹摧折其華関令尹喜内傳曰喜從老子西遊省太真王母共食碧桃列仙傳曰師門者嘯父弟子也亦能使火食桃李葩夏孔甲爲不能順其心意殺而埋之外野一日風雨迎之訖則山木皆焚孔甲祠而禱之未還而道死又曰􅁑由蜀羗人周成王丗好刻木作羊賣之一旦􅀐羊入蜀中王侯貴人追之上綏山皆得仙故里諺曰得綏仙一桃雖不能得仙亦足以豪又曰陽都女隨犢子出種桃李一􅀫而返後數十年見在潘山下冬賣桃菓神仙傳曰樊夫人與夫劉綱俱有道術各自言勝中庭有兩大桃樹夫妻各呪其一桃便闘綱所呪桃走出籬外又曰張陵沛人也有天神降之遂服丹能變化有趙􅂛就陵受學陵以七事試者陵與諸弟子登雲臺山絶巖上有一桃樹大如臂旁生石壁下臨不測去上三四丈桃大有實陵謂諸弟子曰得此桃者當吿以道要弟子皆流汗無敢視者􅂛曰神人所護何險之有乃從上自擲正投桃樹取桃滿懷而石壁峻峭不得還乃擲桃上得二百枚陵分桃賜諸弟子餘二枚陵自食一留一以侍􅂛陵乃申手引􅂛􅂛忽見還以向一桃與􅂛又曰髙丘公服桃膠得仙鐘離意别傳曰周書言􅁗史趙覬以私恨告園民吴旦生盗食宗廟御桃旦生對曰民不敢食也王曰剖其腹出其桃史記惡而書之曰桃食之當有遺核王不知此而剖人腹以求桃非理也風俗通曰黄帝書稱上古之時兄弟二人曰荼與鬰律度朔山上桃樹下簡百􅀑􅀑妄榾音骨人則援以葦索執以食虎於是縣官以臘除夕飾桃人垂葦索交􅀞虎於門效前事也玄中記曰木子之大者有積石山之桃實焉大如十斛籠嵩髙山記曰魏文帝時嵇叔夜胡昭在此學桃樹見在王子年拾遺記曰漢明帝時常獻巨核桃此桃霜下結花隆暑方熟常使植於霜林園俗謂相陵故聲之誤也又磅磄山去扶桑五萬里日所不及其地寒有桃樹千圍其花青黒色萬歳一實陶潜桃源記曰晉太元中武陵人捕魚從溪而行忘路逺近忽逢桃花林夾兩岸芳華鮮羙落英􅌭紛林盡得山山有小口􅀄極狹行四五歩豁然開㓪邑屋連接雞犬相聞男女衣着悉如外人見漁父驚爲設酒食去先世避􅁗難率妻子家此遂與外隔問今是何代不知有漢不論魏晉旣出白太守遣人隨徃㝷之迷不復得晉宫闕記曰華林園桃七百三十株白桃三株侯桃三株鄭緝之東陽記曰太末龍丘山有一巖前外如䆫牖内有石章巖前一桃樹其實甚甘裴淵廣州記曰廬山頂上有山桃山桃大如㯽榔形亦似之色黒而味甘酌人時登採拾只得於上飽啖不得持下下􅂺迷不能返石虎鄴中記曰石虎苑中有勾􅈹桃重二斤南康記曰南康玉山上有石狗故老云古有寒桃生於嶺巔隱淪之士將犬取其實因変成石焉楊衒之洛陽伽藍記曰景陽山百菓園有仙人桃其色赤表裏照徹得霜乃熟亦岀崑崙山一曰西王母桃也杜寳大業拾遺録曰四年五月帝將北廵發自東都江東送百葉桃樹四株敕付西苑種其花似蓮花而小花有十余重重有七八葉大於㝷常桃花唐景龍文館記曰四年春上宴於桃花園羣臣畢從學士李嶠等各獻挑花詩上令宮女歌之辞旣清婉歌仍妙絶獻詩者舞蹈稱萬歳上􅃙太常簡二十篇入樂府號曰桃花行廣志曰桃有冬桃夏桃秋挑神異經曰東北有樹焉髙五十丈其葉長八尺廣四五尺名曰桃其子徑三尺二寸小狹核食之令人知壽核中人可以治嗽今之桃也甄異傳曰譙郡夏侯文規亡後見形還家經庭前桃樹邊過曰此桃我昔所種子乃羙好其婦曰人言亡者畏桃君不畏􅁘荅曰桃東南枝長二尺八寸向日者憎之異苑曰太元中南郡江陵郡有􅀥樹一年忽生桃李􅀥三種花子幽􅁳録曰剡縣劉晟音成阮肇共入天台山取榖皮迷不得返十三日粮食乏盡飢餧殆死望山上有一桃大有子實而絶巖􅃉澗永無登路扳音班縁藤􅁑然後得上各啖數桃而不飢下山一大溪邊有二女資質妙絶因要還家勑婢云劉阮二郎向雖得瓊實猶尚虛弊可速作食遂停半年懷土思歸女曰罪牽君如何便語大路任昉􅄒異記曰桃之大者謂之木桃詩云投我以木桃是也又曰􅂄舊􅀃桓靈之世汝潁間禾麻爲蒿莠桃李不實花而復落落而復花而官有朽粟嶺表録異曰偏核桃岀占卑國肉不堪食胡人多収其核遺漢宮以稱珎異其形薄而尖頭偏如雀觜破之食其桃仁味酷似新羅松子性􅀬入藥分與北地桃仁無異太清諸卉木方曰酒漬桃花而飲之除百病好容色本草經曰梟桃在樹不落殺􅀑楚辭曰斬伐橘柚列樹苦桃夏侯孝􅀂梁田賦曰沉朱李濫甘桃潘岳閑居賦曰三桃表櫻胡之別二柰耀丹白之色左思吴都賦曰洪桃屈盤丹桂灌叢曹毗魏都賦曰紫梨朱柿侯桃丹􅀥侯桃人山挑子如胡麻子古歌辭曰桃生露井上李樹生桃傍虫來食桃桃李樹代桃僵樹木身相代骨􅁏還相忘阮籍詩曰嘉樹下成蹊東園桃與李宋子侯董嬌饒詩曰洛陽城東路桃李生路傍花花自相對葉葉自相當春風南北起花葉自低昻太平御覧卷第九百六十七
