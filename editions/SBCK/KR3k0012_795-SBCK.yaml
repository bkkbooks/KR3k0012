body:
  text: 四夷部十六西戎西烏孫恱般迷􅁡党項焉􅂄小月氏佛菻吐火羅泥婆羅大食烏孫史記曰烏孫在大宛東北可二千里行國隨畜牧與匈奴同俗漢書曰烏孫國多馬冨人至四五千疋民貪狼無信多㓂盗最爲強國北史曰烏孫居赤谷城在􅀛兹西北去代一萬八百里其國數爲蠕蠕所侵西徙葱嶺山中無城郭隨畜牧水草後魏太延中遣使者董琬等使其國後毎來朝貢通典曰烏孫漢時國號大昆弥理赤谷城烏孫於西城諸戎其形㝡異青眼赤􅂡猕猴者本其種也其國謂王日昆弥亦曰昆莫去長安八千九百里内地五千里莽平多􅀨寒山多松樠音武凢切其心似松不田作種樹隨畜逐水草與匈奴同俗又曰烏孫昆莫弥皆王號也故烏孫國有塞種大月氐種始張騫言烏孫本與大月氐共在燉煌間今烏孫強大可厚賂招令東居故地妻以公主以制匈奴武帝即位令騫齎金幣往賜昆莫於是使獻馬願尚公主元封中遣江都王建女細君爲公主以妻焉公主別理宫室居歳時一再與昆莫㑹置酒飲食昆莫年老語言不通公主悲愁自作歌曰吾家嫁我􅀆天一方逺託異國􅀆烏孫王穹廬爲室􅀆氈爲墻以肉爲食􅀆酪爲漿天子聞而矜怜之又曰宣帝時都護鄭􅁻請分烏孫爲大昆弥小昆弥後叚㑹宗爲都護時爲烏孫兵圍􅀐上書願發城郭燉煌以自救丞相王啇大將軍王鳯及百寮議數日不决上召陳湯問對曰臣以爲此必無可憂夫胡兵五而當漢兵一刃札鈍弓弩不利今聞頗得漢工然而猶三當一又兵法曰客倍而主人半然後料敵今烏孫人衆不足以勝㑹宗惟陛下勿憂且兵輕行五十里重行三十里今㑹宗發城郭燉煌兵歴時而至所謂報讎之兵非救急之用也烏孫瓦合不能乆攻不過五日當有􅁻語聞居四日軍書至言已解恱般北史曰恱般國在烏孫西北去代一萬九百三十里其先匈奴北單于之部落也爲漢車􅀐將軍竇憲所逐北單于度金微山西走康居其羸弱不能去者住􅀛兹北地方數千里衆可二十餘萬凉州人猶謂之單于王其風俗言語與髙昌同而其人清㓗於胡俗剪髮齊眉以醍醐塗之昱昱然光澤日三澡漱然後飲食其國南界有大山山傍石皆燋鎔流地數十里乃凝堅人取以爲藥即石流黄也興蠕蠕結好其王甞將數千人入蠕蠕國欲與大檀相見入界百餘里見其部人不浣衣不絆髮不洗手婦人口䑛器物王謂其從臣曰汝曹誑我將我入此狗國中乃馳還大檀遣􅀐追之不及自是相仇讎數相征討後魏大武真君九年遣使朝獻并送幻人稱能割人喉脉令断擊人頭令骨䧟皆血出數􅂛或盈斗以草藥内其口中令嚼咽之湏􅁷血止養瘡一月復常又無痕丗疑其虚乃取死罪囚試之皆驗云中國諸名山皆有此草乃使人受其術而厚遇之又言其國有大術者蠕蠕凍死漂亡者十二三是􅀊再遣使朝貢求與官軍東西齊契討蠕蠕太武嘉其意命中外諸軍戒嚴以淮南王他爲前鋒襲蠕蠕仍詔有司以其鼓儛之節施於樂府自後毎使朝貢迷􅁡北史曰迷密國都迷密城在者至拔西去代萬二千一百里後魏正平元年遣使獻一峯黒橐駞其國東有山名都悉滿山出金玉多鐵党項隋書曰党項羗者三苗之後也其種有宕昌白狼皆自稱狝猴種東接臨洮西平西拒葉護南北數千里處山谷間毎姓別爲部落大者五千餘􅀐小者千餘􅀐織􅏚牛尾及􅗑䍽羊毛以爲屋服裘􅄄􅀍氈以爲上飾俗尚武力無法令各爲生業有戰則相屯聚無徭賦不相往來牧養􅏚牛猪以爲供食不知稼穡無文字但推草木以記年歳時三年一聚㑹殺牛羊以􅀕天人年八十巳上死者以爲令終親戚不􅂘少而死者則云夭枉共悲􅂘之有琵琶撗吹擊􅇲爲節唐書曰党項羗在古析支之地漢西羗之別種也魏晉之後西羗微弱或臣中國或竄山野自周氏滅宕昌鄧至之後党項始強其界東至松州西接葉護南雜舂桑迷桑等羗北連吐谷渾處山谷間延亘三千里其種毎姓別爲部落一姓之中復爲小部落大者萬􅀐小者千􅀐不相統一有細封氏費聽氏頗超氏野辝氏采擒氏拓拔氏最爲強族俗皆土著居有棟宇其屋織􅏚毛及羊毛覆之毎年一易俗尚武無法令賦役其人多壽年至百五六十歳不事産業好爲盗㸦相凌刼尤重復讎􅀂讎人未得必蓬頭垢面跣足􅂼食要斬讎人而後復常男女並衣裘􅄄仍披大氈養馿羊以供其食不知耕稼土無五􅂖氣􅀱多風寒五月草始生八月霜雪降求大麥於他界醖以爲酒妻其庻母及伯叔母嫂子弟之婦􅁋穢蒸報諸夷中㝡爲甚自周及隋或叛或朝常爲邊患貞觀三年南㑹州都督鄭元璹遣使招諭其酋長細封歩頼舉部内附太宗降璽書慰撫之歩頼因即來朝宴賜甚厚列其地爲􅁤州拜歩頼爲刺史仍請率所部封吐谷渾其後諸姓酋長相次率部落皆來内属請同編户太宗厚加撫慰列其地爲崌音居奉巖逺四州各拜其首領爲刺史又曰有黒党項在於赤水之西李靖之擊吐谷渾也渾主伏允奔于黒党項居以空閑之地及吐谷渾舉國内属黒党項酋長号敦善王因貢方物又有雪山之下及白狗舂乗白蘭等諸羗焉􅂄北史曰焉􅂄國在車師南都貟渠城白山南七十里漢時舊國也去代一萬二百里其王姓龍名鳩尸畢郍即前凉張􅁤所討龍熈之嗣所都城方二里國内凢有九城國小人貧無綱紀法令又曰其丈夫剪髮以爲首飾文字與婆羅門同俗事天神并崇信佛法尤重二月八日四月八日是日也其國咸依釋教齋戒行道焉又曰其國養蚕不以爲絲唯充綿纊俗尚蒲桃酒兼愛音樂南去海十餘里有魚鹽蒲葦之饒又曰後魏太武怒之詔成周公万度歸討之鳩尸畢郍以四五萬人岀城守險以距度歸募壯勇短兵直往衝鳩尸畢郍衆大潰進屠其城西鄙諸戎皆來降服獲其珎竒異翫殊方譎詭難識之物巨萬時太武幸隂山北宫度歸破焉􅂄露板至帝省訖賜司徒崔浩書曰万度歸以五千􅀐經五千里拔焉􅂄三城獲其珎竒異物及諸委積不可勝數自古帝王雖云西戎即序有如指注不能控引也朕今手把而有之如何浩書上稱美隋書曰焉􅂄國俗奉佛書􅀋婆羅門婚姻之禮有同華夏男子剪髮有魚鹽蒲葦之利唐書曰焉􅂄在京師西七千三百里其地良沃貞觀六年其王突􅀐支遣使貢方物復請開大磧路以便行李太宗許之自隋末離亂磧路遂閉西域朝貢者皆由髙昌及是髙昌大怒遂與焉􅂄結怨遣兵襲焉􅂄大掠而去又曰貞觀十四年侯君集討髙昌遣使與之相結焉􅂄王大喜請爲聲援乃破髙昌其王詣軍門稱謁焉耆人先爲髙昌所虜者悉歸之由是遣使謝恩并貢方物小月氏北史曰小月氏國都冨樓沙城其王本大月氏王􅀉多羅子也􅀉多羅爲匈奴所逐西徙後令其子守此城因號小月氏􅀍服頗與羗同其俗以金錢爲貨又曰其城東十里有佛塔周三百五十歩髙八十丈自佛塔􅀄建計至後魏武定八年八百四十二年所謂百丈佛圖也佛䔉唐書曰佛䔉國一名大秦在西海之上東南與波斯接地方萬餘里列城四百邑連屬其宫宇柱梲多以水精瑠璃爲之有貴臣十二人共理國政常使一人將囊隨王車百姓有事即以書投囊中王還宫省發理其枉直其王無常人簡賢者而立之國中災異及風雨不時輙廢而更立王冠形如烏舉翼冠及纓絡皆綴以珠寳著錦繡衣前不開􅁭坐金花床有一鳥似鵝其毛緑色常在王邊􅀝枕上坐毎進食有毒其鳥輙鳴其都城疊石爲之尤絶髙峻凡有十萬餘户南臨大海城東面有一大門其髙二十餘丈自上及下飾以黄金光輝昭爛連曜數里自外至王室凡有大門三重列異寳雕飾第三門之樓中懸一大金秤以金九十三枚属於衡端以􅀱日之十二時焉爲一金人其大如人立於側每至一時其金丸輙落鏗然發聲引唱以紀日時毫􅁵無失其殿以瑟瑟爲柱黄金爲地象牙爲門扇香木爲棟梁其俗無瓦擣白石爲末羅之塗握上其堅宻光潤還如玉石至於盛暑之節人厭􅅝熱乃引水潜流上遍於屋宇機制巧宻人莫之知觀者唯聞屋上泉鳴俄見四簷飛溜懸波如瀑布激氣成凉風其巧妙如此風俗男子剪髮披帔而右祖婦人不開衿錦爲頭巾家資滿億封以上位有羊羔生於土中其國人􅀱其欲萌乃築墻以院之防外獸所食也然其臍與地連割之則死唯人着甲走馬及擊鼓以駭之其羔驚鳴而臍絶便逐水草俗皆髠而衣繡乗輜軿白蓋小車出入擊鼓建旌旗幡幟土多金銀竒寳有夜光璧明月珠駭雞犀大貝車渠馬腦孔翠􅃢瑚虎魄凢西域諸珎異多岀其國又曰貞觀十七年佛䔉王波多力遣使獻赤頗􅀺緑頗􅀺石緑金精等物太宗降璽書荅慰賜以綾綺又曰開元七年正月其王遣吐火羅大首領獻師子零羊各二不數月又遣大德僧來朝貢吐火羅北史曰吐火羅國都葱嶺西五百里與挹怛雜居都城方二里勝兵十萬人皆善戰其俗奉佛兄弟同一妻迭寢焉每一人入房户外挂其衣以爲志生子属其長兄其山穴中有神馬毎歳牧牝馬於穴所必産名駒隋大業中遣使朝貢通典曰髙宗永徽􅀄遣使獻大鳥髙七尺其色􅀇足如駞鼓翼而行日三百里能噉錢夷謂之駞鳥又曰龍朔元年吐火羅置州縣使王名逺進西城圖記并請于圖以西波斯以東十六國分置都督府及州八十縣一百軍府百二十六仍於其國立碑以紀聖徳帝從之泥婆羅唐書曰泥婆羅在吐蕃西其俗剪髮與眉齊穿耳揎以竹筒牛角緩至肩者以爲姣麗食用手無匙筯其器皆銅多啇賈少田作以銅爲錢皆文爲馬牛不穿孔衣服以一幅布蔽身日數盥漱以板爲屋璧皆雕􅀞俗重􅀶戯好吹蠡擊鼓頗解推測盈虚兼通歴術事五天神䥴石爲像毎日清水浴神烹羊而􅀕其王郍陵提婆身着真珠頗􅀺車渠􅃢瑚琥珀纓絡耳垂金鈎玉璫佩寳裝服突坐師子床其堂内散花香大臣及諸左右並坐於地持兵數百列侍其側宫中有七層之樓覆以銅瓦欄檻楹柱皆飾珠寳樓之四角各懸銅槽下有金龍激水上樓注於槽中從龍口而出狀􅀂飛泉又曰貞觀中衛尉丞李義表往使天笁塗經其國郍陵提婆見之大喜與義表同出觀阿􅂄婆沴池周廻二十餘歩水常沸涌雖流潦􅁀集爍石焦金未甞増減以物投之即生煙熖懸釡而炊湏􅁷而熟大食唐書曰大食國本在波斯之西大業中有波斯胡人牧駞於俱紛摩地郍之山忽有師子人語謂之曰此山西有三穴穴中有大兵器汝可取之穴中并有異石白文讀之便作王位胡人依言果見穴中有石及矟刃甚多上有文教其反叛於是糺合亡命渡常􅂚水刼奪啇旅其衆漸盛遂割據波斯西境自立爲王永徽二年始遣使朝貢其王姓大食氏名音呼濫反宻莫未膩自云有國巳三十四年歴三主矣其國男夫黒色多􅂡鼻大而長似婆羅門婦人白晢亦有文字岀駞馬大於諸國兵刃勁利其俗勇於戰闘好事天神土多沙石不堪耕種唯食駞馬等肉國西隣於大海其王移穴中異石寳之於圖又曰其王常遣人乗船將衣粮入海經八年而未極西岸海中見一方石石上有樹幹赤葉青樹上揔生小兒長六七寸見人皆􅀏動其手脚頭着樹枝其使摘取一枝小兒便死收在大食王宫又曰龍朔中滅波斯拂䔉其國始有米􅔇之属又將兵􅀯侵婆羅門吞併諸胡勝兵四十餘萬長安中遣使獻良馬景雲二年又獻方物開元􅀄遣使來朝及進馬并寳鈿帶等方物其使謁見唯平立不拜憲司欲糺之中書令張說奏曰大食殊俗逺來慕義不可寘罪上特許之㝷又遣使朝獻自云在本國唯拜天神雖見王亦無致拜之法所司屢詰責之其使遂請依漢法致拜杜還經行記云一名亞俱羅其大食王号慕門都其士女瓌偉長大衣常鮮㓗容止閑麗女子岀必擁面無問貴賤一日五時禮天食肉作齋以殺生爲功德繫銀束佩銀刀断飲酒禁音樂人相爭者不至歐擊又曰其菓有偏桃千年􅀥其蔓菁根大如斗而圎味甚美蒲桃大者如鷄􅆑太平御覽卷第七百九十五
