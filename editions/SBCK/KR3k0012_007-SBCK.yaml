front:
  text: 大平御覽卷第七
  hash: sha256:9e8f2a45a2e9eb20864ebb01d694c83f44585bd9d7056a97c9c779806291f8fc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_007-1a}
body:
  text: 天部七星下瑞星祅星附星下河圖曰以德布精上爲衆星龍魚河圖曰太白之精下爲風伯之神主司非星辰之氣下爲靈星之神主得土河圖帝祕微篇曰帝􅁋泆政不平則奎有角異苑曰陳仲弓從諸子姪造荀季和父家于時德星聚太史奏五百里内有賢人聚􅄂兵書曰春斗爲天􅀜軫爲地梁夏角爲天􅀜參爲地梁又曰四箒星四向守之君有德天下豐熟古辯異曰仰觀天形如車蓋衆星累累如連珠張衡靈憲曰星者體生於地精成於天列居錯峙各有攸屬中外之官帶名者百有二十可名者三百二十爲星二千五百微星之數蓋一萬一千五百二十庶􅀋蠢蠢咸得係命不然何以惣而理諸徐整長曆曰大星俓百里中星五十小星三十北斗七星間相去九千里皆在日月下天文要集曰七公天之相也三公廷尉之象也上星上公也次星中公也星明則七輔強天官星占曰歳星其國齊其位東方蒼帝之子人主之象也其色明而内實天下安寧夫歳星所居國人主有福不可加以兵􅀊星一曰攝提一曰重華一曰應星一曰經星一曰脩人􅀊星動人主怒無光仁道失􅀊星順行仁德加也􅀊星農官也主五榖春不勸農則􅀊星盈縮所在之國不可以罰小則民多病大則喜又曰熒惑主夏位在南赤帝之子方伯之象也爲天候主􅀊成敗司察祅孽所徃有兵爲亂爲賊爲疾爲䘮爲飢爲兵蓋天下不理也東西南北無有常出則有兵入則散周旋止息乃爲死䘮又曰鎮星主德女主之象也所居國有德不可以軍加也又曰辰星北之位黒帝之子宰相之祥也一名安調一名態星一名釣星一名伺晨主德常行四仲當出不出天下旱色黃五榖熟色白中謀泄色靑大臣憂又曰太白位在西方白帝之子大將之象也一名天相一名大正一名大臣一名大皓一名明星又曰紫微者天之帝坐也一名天營一名長垣又曰北辰者一名天􅀜一名北極極者紫宫太一坐也太微者天闔也南端門間十星分爲左右掖太微之宫天子之庭五帝之坐也北斗爲帝車運於中央臨制四方北斗魁第一星少微一名處士星明大而黄澤即賢士舉忠臣用招揺者常陽也一名矛盾胡星也荆州星占曰五星天府一名天法主察姧謀又曰軒轅主雷􅀨之神旁側郎位主􅀫衛又曰河鼓一名三武一名天鼓又曰市天子旗幟也大明則糴賤又曰五車一名庫凡十四星五車中有三柱三星􅀂不見兵盡起又曰心爲天王其宿三星一名天司空又曰箕舌一星動則大風至不出三日又曰箕宿四星第二星一名風后又曰太白出東北爲觀星出東南爲明星岀西方爲太白楊泉物理論曰星者元氣之英水之精也又曰日月之精爲星辰星辰生於地又曰星元氣之英日精也二十八􅀫度數有常故謂􅁪星􅐭䥫論曰常星猶公卿也衆星猶萬民也列星正則衆星齊常星亂則衆星墜矣崔豹古今注曰漢明帝爲太子時令樂人作歌詩曰星重輝言太子比德故云重也􅁃闡詩曰􅀇景如映壁繁星如散錦瑞星易坤靈圖曰至德之萌五星􅀂貫珠尚書中􅀱曰帝堯即政景星出翼尚書考靈曜曰天地開闢元曆名月首甲子冬首日月五星俱起牽牛􅀄日月若懸璧五星􅀂編珠史記曰黃帝時景星見形如半月可以夜作又曰南極老人見則天下安漢書曰髙祖􅀄入􅀜五星聚於東井秦分野司馬遷天官書曰景星其􅃺無常常出有道之國朱宣帝王丗紀曰神農氏之末少昊氏娶附寳見大電光繞北斗樞星照郊感附寳孕二十月生黄帝於壽丘魏志曰桓帝時有黄星見楚宋之分殷馗言後五十􅀊當有真人起梁沛間其鋒不可當其後五十年曹公破􅀽紹天下莫敵矣晉中興書曰元帝渡江􅀊鎭辰太白等四星聚於牛女間禹時鈎命决曰星累累􅀂貫珠炳煥如連璧帝命驗曰有人雄起戴玉英履赤矛鄭玄注曰赤矛瑞星名河圖曰大星如虹下流華渚女節意感生白帝也孫氏瑞應圖曰景星者大星也狀如半月生於晦助月爲明王者不􅀻人則見又曰王者承天則老人星臨其國天文録星占甘氏曰五星同色天下偃兵百姓安寜歌舞以行不見疾疹五榖大昌文子曰精誠内形氣動於天則景星見列星圖曰流星貫昴脩紀感而生禹祅星劉向洪範傳曰彗者去􅁾布新者也此天所以去無道而建有德也鄭􅀇曰彗星主掃除又曰彗星者君臣失政濁亂三光五星逆錯變氣之所生也傳曰昭五年冬有星孛于大辰西及漢申湏曰彗所以除舊布新也又曰昭二十六年齊有彗星齊侯使禳之晏子曰無益也祗取誣焉天道不慆不貳其命􅀂之何禳之且天有彗也以除􅁾也君無穢德又何禳焉詩曰唯此文王小心翼翼昭事上帝聿懐多福厥徳不回以受方國君無違德方國將至何患於彗爾雅曰彗星爲􅍴搶春秋考異郵曰鯨魚死而彗星出淮南子亦云尚書帝命驗曰天鼔動玉弩發天下驚史記曰􅃖尤旗􅀋彗而後曲象旗見則王者征伐四方又曰齊景公三十二年彗出公坐柏寢歎曰堂乎堂乎誰有此乎羣臣皆泣晏子􅀏公怒晏子曰臣􅀏羣臣䛕甚景公曰彗星出東北當齊野寡人以憂晏子曰君髙臺􅀷池賦歛如弗得刑罰恐弗勝茀星將岀彗星何懼乎公曰可穰乎晏子曰使神可祝而來亦可禳而去也百姓􅀂怨以萬數而君令一人禳之安能勝衆口乎又天官書曰天狗狀如奔星有聲其下止地􅀋狗望之如火光炎炎衝天其下圎如數頃田處上兊則黄色千里破軍殺將又曰長庚如一疋布著天見則兵起漢書曰獻帝􅀄平四年有流星八九丈西北行有聲如雷望如火照地是曰天狗金門之山有赤犬其聲下者有兵也又曰哀帝建平二年彗出牽牛日月五星所從起曆數之元三正之始彗而岀之改更之象也其後王莾􅆲國又曰枉矢􅀋大流星虵行而蒼黒望如有毛又曰鄒陽上書曰衛先生爲秦畫長平之事太白食昴昭王疑之漢書天文志曰凡月蝕五星其國皆亡􅀊以飢熒惑以亂鎭以殺太白強國以戰辰以女亂又曰始皇之時十五年間彗星四見乆者八十日長或竟天後秦并六國外攘四夷死者如亂麻後漢書曰安帝永􅀄二年正月太白晝見占云爲強臣是時鄧氏方盛此其應也續漢書曰靈帝光和中國星見東南如炬十餘日其後黄巾張角起􅀽紹董卓亂西漢詞圃曰項籍之敗星孛大角呉志曰孫權時有長星從東南出羣星從之又曰司馬宣王圍公孫淵夜有大流星長數十丈墜襄平東及淵起當流星處斬之晉書曰張華爲司空中台星拆少子韙勸華遜位華云天道􅀇逺湏修德以應之孫氏晉陽秋曰有星赤而芒角自東比徃西南没于諸􅁑亮營俄而亮卒又曰㑹稽謝敷字慶緒隱􅀂耶山􅀄月犯少微星少微一名處士星時戴逵名著於敷時人憂之俄而敷死故㑹稽人士嘲曰呉中髙士求死不得死宋書曰吳孫休永安元年有諸子羣嬉中有異眼光芒爚爚外射諸兒問之曰我熒惑也將示爾三公歸于司馬言畢乃聳身而躍仰視之􅀂曵一疋練有頃而没後四年蜀亡六年魏廢二十一年呉平是歸司馬也又沈懷文傳曰時熒惑守南斗上乃廢西州舊館使西陽王子尚移居東城以厭之懷文曰天道示變冝應之以德今雖空西州恐無益也唐書曰有星孛于虚危歷于氐百餘日乃滅太宗謂羣臣曰天見彗星是何祅也虞丗南曰昔齊景公時有彗星見公問晏嬰對曰公穿池沼畏不􅀷起臺榭畏不髙行刑罰畏不重是以天見彗星爲公誡耳景公懼而脩德後十六日而星没臣聞天時不如地利地利不如人和若德義不脩雖獲麟鳯終是無􅀘但政事無闕雖有災何損於時然願陛下勿以功髙古人而自矜伐勿以太平漸乆而自驕怠愼終如始彗星雖見末足爲憂又曰元和八年太白犯上相歷執法占者言今之三相皆不利始輕末重月餘李絳以足疾免明年十月李􅁻甫以暴疾卒九年六月武元衡爲盗所害又曰李晟初屯渭橋時熒惑守􅀊乆之方退賔介或勸曰今熒惑已退皇家之利也可速用兵晟曰天子外次人臣但當死節垂象􅀇逺吾安知天道耶至是謂叅佐曰前者士大夫勸晟出兵非敢拒也且軍可用之不可使知之常聞五緯盈縮無准晟懼復來守􅀊則我軍不戰而自潰矣叅佐歎服皆曰非所及也又曰傳弈相州鄴人也尤暁天文曆數隋開皇中以儀曹事漢王諒舉兵謂奕曰今兹熒惑入井是何祥也弈對曰天上黃道經其中正是熒惑行路所渉不爲恠異􅀂熒惑入地上井是爲灾也郭子撗洞􅁳記曰武帝甞見彗星東方朔折指星之木以授帝帝以指彗彗遂没星出之夜野獸皆鳴或􅀃爲獸鳴星吕氏春秋曰宋景公時熒惑在心公召子韋問焉子韋曰禍當君可移於相公曰相所與理國家也曰可移於百姓曰百姓死寡人將誰爲君曰可移於􅀊公曰􅀊飢人餓必死焉爲人君而殺其人誰以我爲君乎子韋曰君有至德之言三天必三賞君熒惑必徙三舎後果三徙晏子春秋曰景公時熒惑守虚朞年去晏子曰虚齊之分野當強爲善公乃去􅁈聚之獄振􅀌敬老行之三日而熒惑遷尉繚子曰昔楚將軍子正與齊戰未合初夜彗星出柄在齊所在勝不可擊子正曰彗何知明日與齊戰大破之天文録曰積尸大陵之尸也石氏曰積尸明有大䘮死人如立丘山也又曰孛星者彗星之屬也偏指曰彗芒氣四出曰孛孛謂孛孛然也又曰五星反羽其下之國不可乆處反羽者光芒上大下小狀如反羽也又曰昴者天之耳也主西方故爾雅曰西陸昴也星讃曰昴主獄事典治囚也又胡星也一曰旄頭旄頭者天執罕畢前驅者之所罰也河圖稽耀鈎曰辰爲枉矢流射所誅又曰熒惑散爲􅃖尤旗主惑亂又曰太白散爲天狗主兵又曰􅀊星流爲國皇主内難太平御覽卷第七
