body:
  text: 人事部十九短中國人短絶域人肥瘦短中國人左傳襄上曰臧紇救鄫侵邾敗於狐駘􅆇紇武仲也鄫屬魯故救之狐駘邾也國人誦之曰我君小子朱儒是使朱儒朱儒使我敗於邾襄公㓜弱故曰小子臧紇短小故曰朱儒家語曰髙柴齊人字子羔長不過六尺狀貌甚惡爲人篤孝居魯見知史記曰秦倡朱儒優旃始皇時置酒天雨陛者寒旃矜之乃大呼曰汝雖長尚雨立我雖短故幸休始皇乃使皆代漢書曰嚴延年爲人短小精幹敏揵於事雖子貢冉有通於政事不能繼也又曰樓護爲人短小精辯論議常依名節與谷永俱爲五侯上客又曰東方朔待詔公車奉禄薄朱儒得省見乆之朔紿音迨騶朱儒師古曰朱儒短人也騶厩之御騶也曰上以􅀂曹無益於縣官耕田力作固不及人臨衆處官不能治民從軍擊虜不任事無益於國用徒索衣食今欲盡殺􅀂曹朱儒大恐啼泣朔教曰上即叩頭請罪居有頃聞上過朱儒皆號泣頓首上問何爲對曰東方朔言上欲盡誅臣等上知朔多端召問何恣朱儒爲對曰臣朔生亦言死亦言朱儒長三尺餘奉一囊粟錢二百四十朱儒飽欲死臣朔飢欲死上大􅀏因待詔金馬門又曰郭解爲人短小恭儉諸公以此重之又曰蔡義爲丞相時年八十餘短小常兩吏挾乃能行又曰張蒼不滿五尺蒼父八尺餘蒼子復長八尺及孫毅長六尺餘又曰宣帝時渤海盗賊起上以龔遂爲太守召見遂形貌短小帝見心内輕焉及對賜黄金乗傳去謝承後漢書曰汝南周滂字次彦丗祖到常山問可治兵者誰滂舅以滂對丗祖見滂短小以爲不能將帥滂對有詞理拜潁川府丞東觀漢記曰張重日南計吏形容短小明帝問云何郡小吏荅曰臣日南計吏非小吏也􅀽宏漢紀曰隂后短小舉止時有失儀左右掩口而􅀏魏志曰樂進字文謙容貌短小膽烈從髙祖爲帳下吏魏氏春秋曰魏武王姿貌短小神明英徹呉録曰張蕃字仲輔爲人短小顧譚以短戯之曰朱儒朱儒有何德令我思君罔極臧榮緒晉書曰山濤子淳元㒬疾不仕丗祖聞其短小而聦敏欲見之濤面荅淳元自謂形容冝絶人事不肯受詔論者竒之沈約宋書曰王敬弘形狀短小而坐起端方劉璠梁典曰徐摛起家太學􅀶士周捨舉曰臣外弟徐摛形質陋小􅀂不勝衣而堪此選乃爲晉安王侍讀崔鴻前凉録曰宗醜字仲業慷慨有大志淸素敦朴不好華競形􅃺短小體有鱗甲仕至西平太守三國典略曰齊孟業有盛名􅀄司州牧淸河王岳聞業名召爲法曹見其容貌短小􅀏而不言及尋斷决之處乃謂業曰卿决斷之明可謂有過軀之用晏子春秋曰晏子短小使楚楚人爲小門而迎晏子晏子曰使狗國者從狗門入今臣使楚不當狗門入王曰全齊無人耶使子爲使晏子曰齊之臨淄張􅃑成帷揮汗成雨何爲無人使賢者使於賢國使不肖者使於不肖之國以嬰爲不肖故使王耳孫卿子非相曰帝舜短周公短楚葉公子髙微小短瘠行􅀂不勝衣而定楚國說􅁐曰齊遣淳于髠到楚爲人短小楚王甚薄之謂曰齊無人而使子來何長也對曰臣無所長臣腰中七尺之劒欲斬無狀王王曰止吾但戯子耳即與髠共飲酒愽物志曰齊桓公獵得一鳴鵠宰之嗉中得一人長三寸三分着白圭之􅂁帶劒持車罵詈瞋目後又得一折齒方圓三尺問羣臣曰天下有此及小兒否陳章荅曰昔􅁗胡充一舉渡海與齊魯交戰傷折版齒昔李子敖於鳴鵠嗉中遊長三寸三分纂文曰漢光武時潁川張仲師長二尺二寸亦出王充論衡古文璅語曰齊景公伐宋至曲陵夢見有短丈夫賔於前晏子曰君所夢何如哉公曰其賔者甚短大上小下其言甚怒好俛晏子曰則如是伊尹也伊尹甚大而短大上小下赤色而髯其言好俛而下聲公曰是矣晏子曰是怒君師不如違之遂不果伐宋方言曰鮆矲蒱揩反短也江湘之㑹謂之鮆胙啓反又曰桂林之中謂短矲東􅀭之間謂之俯今俗呼小爲矲也俯言俯視因名云汝南先賢傳曰周舉字宣光姿貌短陋有晏子之風陸胤廣州先賢傳曰徐徴字君外爲人短小果敢劉彦明燉煌實録曰㲹洊字丗震慱學善屬文爲人短小弱冠屢陳損益續捜神記曰司徒蔡謨親親有王蒙者單獨常爲蔡公所收養蒙長􅂊及三尺似爲無骨登牀輙令人抱上桓譚新論曰諺云朱儒見一節而長短可知短絶域人詩含神霧曰東北極有人長九寸家語曰孔子曰僬僥氏長三尺短之至也國語同魏略西域傳曰短人國在康居西男女皆長三尺衆甚多康居長老傳曰常有啇行迷惑失道而到此國國中甚多珠夜光明啇度此國去康居可萬餘里魏志曰倭南有朱儒國人其長三四尺去女王國四千餘里列子曰從中州以東三十萬里得僬僥國人長一尺六寸東北極有人名竫音靖人長九寸山海經曰周饒國爲人短小着冠帶一曰僬僥國郭璞曰其人長三尺漢武故事曰東郡送一短人長七寸衣冠具足疑其山精常令在案上行召東方朔問朔至呼短人曰巨靈汝何忽叛來阿母還未短人不對因指朔謂上曰王母種桃三千年一作子此兒不良巳三過偷之矣遂失王母意故􅀍讁來此上大驚始知朔非丗中人短人謂上曰王母使臣來告陛下求道之法唯有清淨不冝躁擾復五年與帝㑹言終不見神異經曰西北荒中有小人焉長一寸圍如長朱衣玄冠乗軺車導引有威儀人遇其乗車並食之其味辛楚終不爲虫豸所咋並識萬物名字殺腹中三虫又曰西海之中有鵠國男女皆長七寸自然有禮好經論跪拜壽三百歳人行如飛日千里百物不敢犯之唯畏鵠鵠遇吞之上壽三百歳在鵠腹不死而鵠一舉千里張華注曰此陳章對齊桓公云西海之外鵠國男女皆七寸也廣志曰東方有人長三尺君長出行導衛威儀有􅀂中國人又有小人如螻蛄手撮之滿手得二十枚外國圖曰僬僥國人長一尺六寸迎風則偃背風則伏眉目具足但野􅀫一曰僬僥長三尺其國草木夏死而冬生去九疑三萬里王子年拾遺記曰貟嶠山有陁移國人長三尺夀萬歳廣延之國人長二尺郭璞山海經圖賛曰僬僥極麽門可反竫人唯小四體具足眉目才了肥􅀃文曰肥多肉也􅃾腹下肥也禮記禮運曰安之以樂而不逹於順猶食而弗肥也四體旣正膚革充􅄹人之肥也左傳哀下曰魯哀公至自越郭重僕孟武伯惡重曰何肥也公曰是食言多矣能無肥乎公與大夫始有惡公羊傳宣公曰楚莊王圍宋子反乘堞而窺宋城見華元曰何如華元曰昜子而食析骸而炊子反曰吾聞圍國者鉗馬而秣之使肥者應客是何子之情也華元曰吾聞君子見人之惡則矜之小人見人之惡則幸之吾見君子是以情也家語曰弱土之人肥漢書曰陳平少時家貧好讀書有田三十􅅿獨與兄伯居伯常耕縱平遊學平爲人長羙色人或謂平貧何食而肥􅀂是其㛐疾平不親家産曰亦食糠覈耳音紇京師人謂麄屑爲紇頭也有叔如此不如無有伯聞逐其婦又曰張蒼當斬解衣伏質長大肥白如瓠王陵見而怪其羙士乃言于沛公赦勿斬東觀漢記曰梁鴻妻同郡孟氏女􅃺醜而肥力舉石臼擇對不嫁願得如鴻者後因妻鴻謝承後漢書曰梁國車成字子威兄恩都爲赤眉賊所得欲臠之成叩頭曰兄瘦我肥欲得代之賊感其義俱放之後漢書曰虞延字子大陳留東昏人也􅆎帶十圍力能扛鼎又曰東平王蒼腰帶八圍顯宗甚重之詔曰日者問東平王處家何等最樂言爲善最樂其言甚大副是腰腹矣又曰尸董卓於市天時始􅀬卓素充肥脂流於地守尸吏燃火置卓臍中光明逹曙後漢典略曰馬騰字壽成扶風茂陵人馬援後也長八尺餘身體洪大面鼻雄異而性賢厚人多敬之魏志曰司馬懿奏免曹爽桓範踰城出爲爽畫二䇿爽不能用範怒爽曰肥奴曹子丹好人生卿五六頭肉今桓範隨卿滅門也晉書曰王戒子萬有羙名少而大肥戎令食糠而肥愈甚年十九卒晉中興書曰兖州旣有八伯之號其後更置四伯大鴻臚陳留江淵以能食爲榖伯豫章太守陳留史疇以大肥爲大伯散􅀐侍郎髙平張嶷以狡妄爲猾伯廬陵太守羊㬅以佷戾爲璅伯蓋擬古之四凶晉書曰孝武即位桓温入朝拜髙平陵問左右殷清形狀荅者言肥短温云向亦見在帝側後趙書曰王洛生石勒欲挫其權豪洛生在獄自刺腹􅀷五寸洛生肥盛不䧟中重以刀潰其腹出胃而死宋書曰前廢帝狂悖無道誅害羣公忌憚諸父並聚之殿内歐捶凌曵無復人理始興王休仁及太宗山陽王休祐形體並肥壯帝乃以竹籠盛而秤之以太宗尤肥號爲猪王又曰沈昭略性狂儁不事公卿甞至婁湖􅁐逢王景文子約張目視之曰汝是王約也何乃肥而癡約曰汝沈昭略耶何乃瘦而狂昭略撫掌大􅀏曰瘦巳勝肥狂又勝癡又曰范曄長不滿七尺肥黒秃眉􅁂善彈琵琶能爲新聲梁書曰安陵王大春字仁經少愽渉書傳性孝謹體貌瓌偉􅆎帶十圍隋書曰王丗續字闡熈容貌魁岸腰帶十圍風神爽抜有傑人之表尸子曰閔子騫肥子貢曰何肥也子騫曰吾出見其羙車馬則欲之入聞先王之言則又欲之兩心相與戰今先王之言勝故肥諱子曰子夏見曽子曰何肥也對曰戰勝故肥曽子曰何謂也子夏曰吾入見先王之義則榮之出見冨貴又榮之二者戰於􅅐臆今先王之義勝故肥淮南子曰繼子得食肥而不澤情不相徃來也適子懷於燕慈母喻於利情相徃來也呉質別傳曰詔特進以下㑹質間曹眞肥朱鑠臞質召俳優使說肥臞眞曰卿欲部曲將遇我耶遂爭而罷諸葛恪別傳曰孫權常問恪何以自娯而更肥澤恪對曰臣聞冨潤屋徳潤身臣非敢自娯脩巳而巳異􅁐曰晉司􅀠校尉髙平滿奮字武秋豐肥膚肉潰裂每至暑夏輙膏汗流溢其有愛妾夜取以燃照炎灼發于屋表奮大惡之悉盛而埋之曁永嘉之亂爲胡賊所燒皎􅀂燭光㑹稽典録曰董孝治勾章人家貧採薪供養得甘果奔走以獻母母甚肥恱隣人家冨有子不孝母甚瘦不孝子疾孝治母肥常苦辱之孝治不報及母終負土成墳鳥獸助其悲號喪竟殺不孝子置冢前以􅀕詣獄自繫㑹赦得免方言曰益梁之間凡諱其肥盛謂之䑋如掌切肥貌也􅀶物志曰京邑有一人失名姓食噉兼十許人遂肥不能動其父曽作逺方長吏彼縣令故義共傳食之一二年中一郷爲儉張顯誓曰古諺云堯舜至聖身如脯腊桀紂無道肥膚三尺語林曰孟業爲幽州其人甚肥或以爲千斤武帝爲稱之難其大臣乃作一大秤挂壁業入見武帝曰朕欲自稱有幾斤業荅曰陛下欲稱臣耳無煩復勞聖躬於是稱業果得千斤丗語曰太祖父嵩在太山太祖令太山太守應劭送家詣兖州陶謙密遣數十􅀐掩捕嵩家嵩懼穿後垣先出其妾肥不得出逃于厠與妾俱􅀍害又曰􅁃公造周伯仁曰君何所欣恱而忽肥􅁃曰君復何所憂慘而忽瘠伯仁曰吾無所憂直是清虚日來滓穢日去物理論曰榖氣勝元氣其人肥而不壽痩釋名曰省痩也臞省約少之言也說文曰羸委也瘠痩也周禮地官司徒曰墳􅄛之人晢而瘠下平衍也左傳襄三年曰楚子使逺子馮爲令尹訪於申叔豫豫曰國多寵王弱不可爲也遂以疾辭方暑闕地下冰大夫孝疾受水而牀焉重蠒衣裘禮記玉藻曰纊爲蠒緼爲􅂁也鮮食寢楚子使醫視之復曰瘠則甚矣血氣未動乃使子南爲令尹漢書曰張湯子安丗女孫敬爲霍氏外屬婦霍氏反當相坐安丗痩臞形於顔色宣帝赦敬以慰其意東觀漢記曰和熹鄧后自遭大憂及新野君仍喪諸兄嘗悲傷思慕羸痩骨立不能自勝又曰龐萌字明兄爲赤眉折得欲啖之萌詣賊叩頭言兄年老羸瘠不如萌肥健願代兄賊義而不啖謝承後漢書曰楊彪見漢祚將移遂稱脚攣不復行積十餘年後子脩爲曹操所殺操見彪問曰公何瘦甚對曰愧無日磾先見之明猶懷老牛䑛犢之愛操爲之改容獻帝春秋曰司空攻吕布於下邳吕布登西北白樓上城䧟士擒以詣司空布曰明公何瘦司空曰所以瘦不早相得故耳司空曹操也三輔决録注曰張氏得鈎何氏得筭故三輔舊語曰何氏筭張氏鈎何氏肥張氏瘦言何氏有肥人輙貴瘦人輙賤張氏瘦者輙貴肥者輙賤故二族以鈎筭知􅁻凶以肥瘦知貴賤文子曰神農形顇堯瘦將欲利萬人也韓子曰宓子賤治單父有子見之曰何瘁也曰官事急憂之故臞有子曰昔舜鼔五絃之琴歌南風之詩而天下治今單父細治之而憂治天下將奈何故無術御之雖瘁臞未有益也丗􅀃曰鄧竟陵免官後赴山陵過見大司馬桓公問曰卿何以更瘦徐廣晉記曰鄧遐勇力絶人氣盖當丗人方樊噲爲梪温叅軍數從征伐爲冠軍將軍竟陵太守枋頭之伇温旣懷恥忽且忌憚遐因免遐官遐曰有愧於叔逹不能不恨恨於破甑述異記曰甄法崇永􅀄中爲江陵令在任嚴明于時南平僇士爲江安令喪官至其年末崇在㕔事上忽見一人從門入云僇江安通法崇法崇知士巳亡因問卿貌何故瘦荅曰我生時所行善不􅀘惡今繫苦役窮劇理盡魏明帝手詔曹植曰王顔色瘦弱何意耶腹中調和不今者食幾許米又啖肉多少見王瘦吾甚驚冝當節水加飡荅詔表曰近得賜御食拜表謝恩尋奉手詔愍臣瘦弱奉詔之日泣涕橫流錐武文二帝所以愍憐於臣不復過於明詔太平御覽卷第三百七十八
