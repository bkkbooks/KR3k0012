front:
  text: 太平御覽卷第八百五十二
  hash: sha256:cc22bd331d74b66b6ae0542603670ed2799f5584cb327ec7ce7ab76d316f5f12
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_852-1a}
body:
  text: 飲食部十䴺􅲑甘脆安乾特􅄳飴􅄳同序䴺􅲑束晢餅賦曰䴺􅲑髓燭甘脆范汪祠制曰孟夏􅀕下甘脆安乾特束晳餅賦曰安乾粔籹之倫盧諶􅀕法曰四時祠皆用安乾特􅄳禮記内則曰􅀥栗飴􅁡以甘之方言曰􅄳謂之張皇即乾飴也飴謂之䬵音該􅄳謂之餹江東皆言餹也凢飴謂之􅄳自􅀜而東陳魏宋楚衛之間通語􅀃文曰飴米蘖煎也飴􅄳和饊也釋名曰􅄳洋也煑米消爛洋洋然也飴小弱於􅄳形怡怡然也哺餔也如􅄳而濁可哺也後漢書曰明德馬皇后報章帝曰吾但當含飴弄孫不能復􅀜政矣東觀漢記曰野王獻甘膠膏􅄳毎作大發吏以爲饒利樊閎知之臨薨奏焉四王起事曰惠帝到華隂河間王遣使上甘菓餔二百幡幽明録曰王胤祖安國張顯等以太元中乗舡見仙人賜糖飴三餅大如比輪錢厚二分淮􅀯子曰栁下惠見飴曰可以養老盗跖見飴可以粘牝見物同而用之異也壯門户籥壯也塩鐵論曰洗爵以盛水􅂛降而進糖禮雖備然非其貴也丗􅀃曰王君夫飴餔澳釡楚辭招魂曰粔籹蜜餌有張皇張皇賜也張衡七辨曰沙飴石蜜逺國貢儲崔寔四民月令曰十月先水凍作煑􅄳煑􅁀飴盧諶􅀕法曰冬祠用荆􅄳太平御覽卷第八百五十二
