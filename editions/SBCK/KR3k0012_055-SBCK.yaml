front:
  text: 太平御覽卷第五十五
  hash: sha256:4f4f92350497e7f66c08022047b729c46b8e2e823e9e4d34d6794318d278606f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_055-1a}
body:
  text: 地部二十窟野郊窟禮記曰古未有宫室冬居營窟夏居橧巢也左傳曰鄭伯有􅄝酒爲窟室而夜飲擊鍾焉朝至未巳朝者曰公焉在曰吾公在壑谷壑谷窟室也史記曰呉公子光之謀王僚也專諸謂曰王僚可殺也公子光乃伏士於窟室中而具酒請王僚使專諸置匕首魚炙之中專諸擘魚因以刺王僚王僚立死戰國䇿曰馮煖謂孟嘗君曰兎有三窟僅得免死君始一窟未得髙枕而卧也請爲君復鑿二窟乃西遊於梁謂梁惠王曰齊於其臣孟嘗君諸侯先迎者國富兵強梁王乃聘以爲相齊王聞之懼乃請反國馮煖使請先致􅀕器立宗廟於薛三窟巳就煖之力也晉書曰王衍用弟澄爲荆州從弟敦爲青州曰荆有漢江之固青有􅀒海之險吾留於此足爲三窟王隱晉書曰魏末有孫登字公和汲郡共人也無家屬時人於汲縣北山土窟中得之崔鴻十六國春秋前秦録曰張忠字巨和中山人也永嘉之亂隱於秦山端拱􅀂尸無琴書之適不脩經典勸教但以至道虚無爲宗其居也依崇巖幽谷鑿地爲窟室弟子亦窟居去忠六十餘歩五日一朝其教也以形不以言弟子受業觀形而退淮南子曰鳥飛反郷兎走歸窟典略曰􅂫秦與張儀始俱東學於齊􅀑谷先生皆通經藝百家之言􅀑谷弟子五百餘人爲作窟深二丈曰有能獨下在窟中􅀃使泣者則能分人主之地矣秦下􅀃之􅀑谷泣下沾衿秦與儀記一體也又曰董卓雖親愛吕布然時醉則罵以刀劒擊之不中而後止布恐終􅀍害乃私與司徒王允及尚書令士孫端謀養死士於窟室三年四月天子疾瘳卓詣宫賀布先置死士以邀之卓嚴駕岀馬躓不肯行心恠之欲還布􅂆使行到宫門入掖門死士交㦸刺卓墮車頋布所在布下馬曰有詔遂殺之列仙傳曰歷陽有彭祖仙窟請雨輙得也神仙傳曰李意其蜀人於成都角作一圡窟居之冬夏單衣髪長剪去之皆使長五寸或百日二百日三百日不岀窟郡國志曰相州隆慮山有一洞去地千仞俗謂聖人窟下有小山􅀌竦謂之玉女樓仙人臺亦曰香爐峯也又曰馬邑白道齊坂有土穴岀泉即琴操謂飲馬長城窟也秦州記曰河崖傍有二窟一曰唐術窟深四十餘丈髙四十餘丈中有三佛寺流泉浴池鑿石作丈六像三百餘區其西二里則曰時亮窟髙百丈廣二十丈深三十丈亦有泉水藏古書五卷唐術時亮皆古之孝行士也又曰州圖經曰唐術窟在郡西龍支谷彼人亦罕有至者其窟内有物􅀂似今書卷因謂之精巖巖内時見神人往還蓋古仙所居耳羗胡懼而莫敢近又謂􅀑爲唐術故指此爲唐術窟豫章記曰豐城縣有雷孔章掘神劒窟方廣七八丈王韶之南康記曰神源下流百里有峽兩岸皆髙山峽下數十里有蛟龍窟時時有霧氣􅂄􅀫云此通南康縣去此穴由百餘里甞有􅀫其口者夜遇暴雨水器物乃流出彼此如其然野􅀃文曰野郊外也周易曰龍戰于野其血􅀇黃又曰同人于野亨利渉大川乾行也王弼曰所以乃能同人于野亨利渉大川非二之所能也是乾之所行也又曰上古穴居而野處後世聖人易之以宫室書曰啓與有扈戰于甘之野作甘誓又曰大野旣瀦東原厎平又曰伊尹相湯伐桀升自陑遂與桀戰于鳴條之野孔安國曰地在安邑之西又曰髙宗夢得􅀃審厥象傍求于天下􅀃築􅀓巖之野惟肖又曰王曰來􅀃台小子舊學于甘盤旣乃遯于荒野入宅于河旣學而中廢業遯居田野河洲也又曰歸馬于華山之陽放牛于桃林之野示天下弗復用又曰武王伐紂至于牧野乃誓毛詩曰野有死􅍪惡無禮也林有撲樕野有死鹿白茅純束又曰燕燕于飛差池其羽之子于歸逺送于野又曰野有蔓草零露􅇛􅀆又曰􅁑生􅂪楚蘝蔓于野予美亡此誰與獨處毛萇曰喻婦人外成扵它家謂其君子從軍未還未知死生又曰蜎蜎者蜀烝在桑野敦彼獨宿亦在車下鄭􅀇曰蜀特行乆處桒野有似勞苦者詩曰鴻鴈于飛肅肅其羽之子于征劬勞于野又曰鶴鳴于九臯聲聞于野又曰我行其野蔽芾其樗㛰姻之故言就爾居又曰我征徂西至于艽野又曰殷啇之旅其㑹如林矢于牧野維予侯興又曰京師之野于時處處于時廬旅于時言言于時語語鄭􅀇曰京地衆民所居之野舎其賔旅言其所當言語也又曰駉駉牧馬在坰之野韓詩外傳曰孔子出遊少原之野有婦人哭甚哀問之婦人曰向刈薪亡吾􅆱簮是以哀也非傷亡簮其不忘故也禮記曰季春之月命司空曰時􅀨將降下水上騰循行國邑周視原野脩利堤防又曰舜勤衆事而野死鯀鄣洪水而殛死周禮曰大司徒之職掌建􅀖之土地之圖而辯其􅀖國都鄙之數制其畿疆而溝封之設其社稷之壝而樹之田主各以其野之所冝木遂以名其社與其野壝壇與堳埰也又曰惟王建國辨方正位體國經野又曰以九伐之法正􅀖國野荒民散則削之又曰甸師掌共野果蓏之薦又曰遂人掌􅀖之野凢事致野役而師田作野民帥而至掌其政治禁令凢國􅀕祀共野牲野職凢賔客令脩野道而委積委積於廬宿市經田野造縣鄙形體之法皆有地域溝樹之入野職野賦于王府又曰野廬氏掌達國道路至于四畿比國郊野之道路宿息井樹又曰大司寇之職以五刑糺萬民一曰野刑上功糺力刑亦法也功農功力勤力又曰縣士掌野合掌其縣之民數糺其戍令而聽其獄訟左傳曰辛有適伊川見􅀍髮􅀕於野者曰不及百年此其戎乎其禮先亡矣又曰鄭伯亨趙孟于垂隴伯有賦鶉之賁賁趙孟曰牀苐之言不踰閾況在野乎非使人之所得聞又曰崔氏之亂申鮮虞僕賃於野以䘮莊公楚人召之遂如楚爲右尹又曰子産之從政也擇能而使之禆諶能謀謀於野則獲謀於邑則否鄭國將有諸侯之事子産乃令禆諶乗以適野使謀可否而告馮簡子使断之又曰鸜鵒之羽公在外野往饋之焉又曰齊悼公使朱毛遷安孺子於駘不至殺諸野幕之下爾雅曰邑外謂之牧牧外謂之野春秋合成圖曰堯母慶都蓋大帝之女生於斗維之野常三河東南天大雷電有血流潤大石之中生慶都管子曰萬乘之國兵不可以無主地博大野不可以無吏野無吏則無蓄積野無田夫則人墮本業故無蓄積又曰行其田野視其耕耘計其農事而飢飽之國可知也其耕之不深耘之不謹地冝不任草田多穢耕者不必肥荒者不必墝其野草田多而闢田少者雖不水旱飢國之野淮南子曰孔子行於東野馬食農夫之稼野人怒取其馬而擊之使子貢往􅀃之畢辭而弗能得乃使馬圉往􅀃之野人大喜解馬而與之又曰上遊乎霄雿之野下岀乎無垠鄂之門髙誘曰霄雿髙峻之貌也垠鄂無形之貌也霄讀縓綃雿讀􅀂翟氏之翟也國語曰􅍫季使舎於兾野賈逵曰􅍫季晉臣兾野晉地兾缺耨其妻饁之敬相待如賔從而問之曰兾芮之子也與之歸家語曰叔孫氏之車士曰鉏啇車士將車者啇于姓也鉏啇名也採薪於大野􅀗麟焉折前左足載歸叔孫以爲不祥棄郭外告孔子曰而角者何也孔子往觀曰麟也孰爲來哉孰爲來哉吕氏春秋曰禹東至搏木之地青差之野高誘曰青差東方之野也帝王世紀曰黃帝與神農氏戰於阪泉之野又曰炎帝殺􅃖尤於中兾名其地曰絶轡之野又曰湯時大旱殷吏􅁲曰當以人禱湯曰吾所爲謂自當遂齋戒剪髮断爪巳爲牲禱於桒林之野告於上天巳而雨大至又曰棄恤民勤稼盖封地方百里廵教天下死於黒水之間潢渚之野又曰秦自非子受封至昭王滅周之歳在大梁前後七遷皆在禹貢雍州之域荆山終南敦物之野東井輿􅀑之分鶉火之次也焦贑易林曰舜升大禹石夷之野徴詣王庭拜治水土又曰多載重􅀒􅂢棄於野徒勞但苦頋無誰予水經注曰自朝歌以南墍清水圡地平衍據臯跨澤悉坶野矣郊􅀃文曰距國百里曰郊爾雅曰邑外曰郊易曰宻雲不雨自我西郊又曰同人于郊無祗悔詩曰子子干旄在浚之郊又曰逝將去汝適彼樂郊禮記月令曰立春之日天子親率公卿諸侯大夫以迎春於東郊又曰天子親耕於南郊以共粢盛王后􅅙於北郊以共純服諸侯耕於東郊亦以共粢盛夫人􅅙於北郊以共冕服又曰因􅁻土以饗帝于郊周禮曰閭師掌國中及四郊之民六畜之數以任其力以待其政令以時徴其賦又曰正歳帥其属而慮禁令于國及郊野去國百里爲郊郊外曰野又小宗伯之職掌建國之神位􅀂大甸則帥有司而饁獸于郊有司大司馬之属饁饋也以禽饋四方之神於郊漢書曰王莽天鳯四年八月莽親之南郊鑄作威斗其日大寒百官人馬有凍死者老子曰天下無道戎馬生於郊太平御覽卷第五十五
