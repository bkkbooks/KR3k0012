body:
  text: 兵部一叙兵上世夲曰􅃖尤作兵宋襄注曰􅃖尤神農臣也春秋元命苞曰􅃖尤虎捲威文立兵宋均注曰捲手也手文威字也書曰鴻範八政八曰師大戴禮曰魯哀公問孔子曰􅃖尤作兵與孔子曰􅃖尤庻人之人貪者也反利無義以喪厥身何兵之能作與民皆生也左傳曰武有七德禁􅁀戢兵保大定功安民和衆豊財者也又曰舉不失德賞不失勞老有加惠旅有施舎見可而進知難而退軍之善政也兼弱攻昧武之善經也又曰兵猶火也不戢將自焚又曰師直爲壯曲爲老又曰師尅在和不在衆榖梁傳曰善爲國者不師善師者不陣善陣者不戰善戰者不死國語曰穆王將征犬戎􅀕公謀父諌曰不可先王耀徳不觀兵夫兵戢而時動動則威觀則玩玩則無震注曰玩黷震懼也家語曰哀公問曰寡人欲吾國小則能守大則能攻其道􅀂何孔子曰使君朝廷有禮上下和親天下百姓皆君之民也將誰攻焉苟違此道民叛如歸皆君之讎將誰守焉公曰善哉於是廢澤梁之禁㢮􅀜市之稅以惠百姓史記曰范蠡云兵者凶器戰者逆德漢書曰兵家者蓋出古司馬之職王官之武備矣後世爍金爲刃割革爲甲器械甚備下及湯武受命次師克亂而濟百姓動之以仁義行之以禮讓司馬法是其遺事也自春秋出於戰國出竒設伏變詐之兵並作漢興張良韓信序次兵法凢一百八十二家刪取要用定著三十六家又刑法志曰自黄帝有涿鹿之戰以定火灾顓頊有共工之陣以定水災唐虞之際至治之極猶流共工放讙兠􅇡三苗殛鯀然後天下服夏有甘扈之誓殷周以兵定天下矣天下旣定戢藏干戈教以文德而猶立司馬之官設六軍之衆因井田而制軍賦焉天子畿方千里提封百萬井出軍賦六十四萬井戎馬四萬疋兵車萬乗故稱萬乗之主戎馬車徒干戈素具春振旅以蒐夏軷舎以苗秋治兵以獮冬大閱以狩皆以農􅂩以講武事焉連師比年簡車率正三年簡徒群牧五載大簡車徒此先王爲國立戰足兵之大略也又曰以仁義綏民者無敵於天下也至於齊桓晉文之兵可謂入其城而節制矣然猶未本仁義之大統也故魏秦之武銳不可以當桓文之節制桓文之節制不可以當湯武之仁義故曰善師者不陣善陣者不戰善戰者不敗善敗者不亡又曰夫文德者帝王之利器威武者文德之輔助也夫文之所加者深則武之所服者大德之所施者愽則威之所制者廣三代之盛至於刑措兵寢者以其本末有序帝王之所極功也又曰魏相曰救亂誅􅁀謂之義兵敵加於巳不得已而起謂之應兵争忿小故不勝憤怒者謂之忿兵利人土地貨寳者謂之貪兵恃國家之大矜人民之衆謂之驕兵又曰晁錯上書云丈五之溝壍車之水壍音子廉反陵阜﨑嶇積石相接此歩兵之地車􅀐五不當一平原廣澤漫衍相屬此車􅀐之地歩兵十不當一候視相及川谷分限此弓弩之地刀楯三不當一草木蒙蘢枝葉蔚茂此矛鋋之地長㦸三不當一穹崇險隘阻阨相視此刀楯之地弓弩二不當一老子曰師之所處荆􅁄生焉大軍之後必有凶年又曰兵者不祥之器非君子之器不得已而用之又曰是以君子居則貴左故􅁻事尚左喪事居右是以偏將軍處左上將軍處右戰勝以喪禮處之也又曰善爲士者不武善戰者不怒又曰天下有道却走馬以糞天下無道戎馬生於郊又曰以政治國以竒用兵六韜曰用兵之道使如疾雷令民不及掩耳卒電不暇瞑目古司馬兵法曰古者以義理之謂之正治民用兵止乱討􅁀必以義也正不獲意則權權出於戰不出於仁也分不均求不勝謂之不獲意權極也平輕重而爲之功以死易生以危爲寜反覆往來而以詐成故曰不出於仁也是故殺人殺之可也以殺止殺可以生也攻其國愛其民攻之可也除民乱去君害以戰去戰雖戰可恃也故仁見親義見恱智見恃勇見方信見信將有五材民親恱恃方而信之故内得愛焉所以守也外得威焉所以戰也利加於人則守固威加於敵人則戰勝又曰戰道不違時不歴民病所以愛吾民也春夏興師爲違時春興師虜五榖夏興師傷人民故役不踰時寒暑不易服飢疫不行所以愛民也不加喪不因凶所以愛夫其人也敵有喪飢疫不加兵愛彼民如巳民冬夏不興師所以兼愛彼民也大寒甚暑吏士懈倦故國雖大好戰必亡天下雖平忘戰必危又曰天下旣平天子大凱春蒐秋獮諸侯振旅秋治兵所以不忘戰也又曰古者逐奔不過百歩縱綏不過三舎是以明其禮也不窮不能而哀憐傷痛是以明其仁也成列而鼓是以明其信也争義不争利是以明其義也又能捨服是以明其勇也知始知終是以明其智也六德以時合散以爲民紀者古之道也自古之政也仁義勇智信民之本隨時而施爲民綱紀古之所傳政道也又曰先王之治順天之道設地之冝官民之德而正名治物正者正官名也名正則可治之立國辨職立國治民分守境界各任其職也以爵分禄以爵位尊卑職其禄秩也諸侯恱懷海外來服服從巳也獄弭而兵寢聖德之治也又曰有虞氏不賞不罰而民可用至德也夏后賞而不罰至教也殷罰而不賞至威也周以賞罰德衰也賞不踰時戰相爲輕重重兵主持堅固守輕兵主追兵取利相爲用也又曰民有勇心唯敵之視士卒勇銳進退前後離合左右見勝利之形唯敵所在輙得其便也民有畏心唯北之視士卒恐懼各有嫌疑不求便利懷其北心當安隠教道開示勝形以服習之兩心交支兩利􅀂一兩軍相當兵相支持各求便利共事一勝之勢在兩軍間有道者得之也兩爲之職惟權之視謂知己知彼稱輕重量多少度進退知彼巳虚實之所在也又曰軍旅以舒爲主舒則人力足雖交兵致刃徒人不趍車不馳也逐奔不踰列是以不亂軍旅之固不失行列之政不絶人馬之力遟速無過誡命軍旅政爲堅固也進退疾徐從金鼓之聲也又曰軍庸不入國國庸不入軍軍庸入國則民德廢國庸入軍則民德弱軍國異庸彊弱殊任故不相入入則乱也故在國言文而語温在朝恭以遜脩巳以待人不召不至不問不言難進易退此申叙國庸之冝在軍抗而立在行遂而果介者不拜兵車不軾城上不趍危事不齒此申致軍庸之冝抗者不待問也意者有慮於事而爲不湏令遂必也果勝也介者不拜車不軾􅀐不下所以逺屈而乱行也上趍爲驚衆也故禮與法表裏也文與武左右也古者賢王明民之德盡民之善故無廢德無簡民賞無可生罰無可殺也民有一善處一事故能盡民之善無損徳民能堪其事故賞罰無所施又曰凢從奔勿息敵或止於路則慮之追敵奔北無休懈則敵於路旁設伏當視察反覆慮之自驚戒也凢近敵都必有進路退必有反慮深入敵地必知進退便利道徑通塞利害所在避實從虚也又曰凡戰先則弊後則懾兵先舉則勞後起則士心不定而恐懼選良次兵是謂益民之強選良者墿取勁勇有材者爲前當什伍相以接之死地及見勝則心專強之棄任節食謂開民之意自古之政也任者畜積器物焚儲畜服御之具節餘粮戰之日不餘食示必死戰也開塞生意以專民心此五帝三王用兵之道也曹公孫子兵法序曰操聞上古弧矢之刋論語足食足兵易曰師貞傳云王赫斯怒黄帝湯武咸用干戈爲民也用武者滅用文者亡夫差偃王是也聖賢之於兵也戢而時動不得已而用之觀兵書戰䇿孫武深矣孫子者齊人也名武爲吴王闔閭作兵法一十三篇試之婦人卒以爲將西破強楚入郢北滅齊晉後百餘歳有孫臏是武之後也孫子曰兵者國之大事校之以計而索其情謂下五事彼我之情一曰道二曰天三曰地四曰將五曰法道者令人與上同意謂導以教令也故可與之死可與之生而人不畏危危疑也言上有仁化於下下則能致命也天者隂陽寒暑時利地者逺近險易廣狹死生言以九也形勢不同因時制度也將者智信仁勇嚴將冝五德備也法者曲幟制官道主用部曲幡幟金鼓之制官者道者粮路主用軍費用也凢此五者將莫不聞之者勝不知者不勝又曰兵者詭道故能而示之不能用而示之不用言已實能用師外示無法近而示之逺逺而示之近欲進而治去道􅀂韓信之襲安邑陳舟臨晉而度於夏陽是也故利而誘之亂而取之實而備之敵持實湏備之強而避之避其所長怒而撓之待其衰解卑而驕之引而勞之以利勞之規而離之佚而勞之以利勞之攻其無備出其不意擊其懈怠空虚也此兵之勝不可豫傳傳洩也又曰凢用兵之法全國爲上破國次之夫興兵深入長驅敵舉國來服爲上次兵擊破得之爲次全軍爲上破國次之軍四千人全卒爲上破卒次之上一千人下五百人全伍爲上破伍次之百人至五人也是故百戰百勝非善之善不戰而屈人之兵者善之善者也夫不戰而敵自屈服上兵伐謀敵始有謀伐之易也又曰故用兵之法十則圍之以十敵一則圍之是爲智等而兵利釣而客勁操所以倍兵圍下邳而生擒吕布也倍則分之以二敵一二則爲當一術爲竒敵則能戰已爲士衆等差者猶設竒伏以勝之也少則能逃髙壁壘勿與敵戰也不􅀂則能逃之引兵避之故小敵之堅大敵之擒也小不能當大也又曰凢治衆如治寡分數是也部曲爲分什伍爲數也􅋐衆如􅋐少形名是也旌旗曰形金鼓曰名三軍之衆可使必受敵而無敗者竒正是也先出合戰爲當後出爲竒也兵之所加如以瑕投夘者虚實是也以實擊虚也又曰故善動敵者形之敵必從之見羸形也與之敵必取之以利動之以卒待之以利害動敵也故善戰者求之於勢􅌹在權也不責於人故能擇人而任勢以勢者權變明也任勢者其戰人也如轉木石木石之性安則静危則動方則止貟則行任勢自然故善戰人之勢如轉貟石於萬仞之山者勢也又曰凢先據戰地而待敵者佚有餘力也後據戰地而趣戰者勞故善戰者致人而不致於人能使敵人自至者利之也誘之以利能使敵人不得至者害之也出兵所必趣攻兵所必救故敵佚能勞之以利煩之飽能飢之絶其粮道安能動之出其所必趍也使敵必救又曰兵形象水水之行避髙而就下兵之形避實而擊虚故水因地而制形兵因敵而制勝故兵無常勢水無常形能與敵變化而取勝者謂之神勢盛必衰形露必敗能因敵變化勝之􅀂神故五常無常勝四時無常位日有長短月有死生兵無常􅀔盈縮隨敵也又曰故不知諸侯之謀者不能豫交不知敵情謀者不能結交也不知山林險阻沮澤之形者則不能行軍髙而崇者爲山樹木所聚者爲林坑堆者爲險一高一下爲沮水草漸洳爲沮泉水所歸不流者爲澤也不用郷導者不能得地利故兵以詐立以利動以分合爲變者也兵一分一合此敵爲變故兵疾如風擊虚空也徐如林不見利也侵掠如火疾如火也不動如山守山難知如隂似天隂不見外􅀫也動如雷霆又曰夜戰多火鼓晝戰多旌旗所以變人之耳目也故三軍可奪氣將軍不可奪心左氏言一鼓作氣再而衰三而竭也是故朝氣銳晝氣惰暮氣歸故善用兵者避其銳氣擊其惰歸此治者也以治待亂以静待譩此治心者也以近待逺以佚待勞以飽待飢此治力者也無邀正正之旗無擊堂堂之陣此治齊人者也正正髙齊堂堂者大又曰用兵之法髙陵勿向倍兵勿迎丘阪勿迎佯北勿從銳卒勿攻餌兵勿食歸師勿遏懷歸故能死戰不可擊也圍師勿􅃲法曰兵三面開其一面示生路也􅀂敵􅌹陸地必空一面以示其虚欲使戰守不周也此用兵之法也又曰故善用兵譬如帥然帥然者常山之虵也擊其首則尾至擊其尾則首至擊其中則首尾俱至又曰踐墨循敵以决戰事行踐規矩無常者也是故始如處女敵人開户後如脫􅇠敵不及矩處女示弱􅇠往也吴子曰鼓鞞金鐸所以威耳旌麾旗章所以威目禁令刑罰所以威心三者不立雖有國必散於敵故曰心威於形不可不戰管子曰夫爲兵之數存乎聚財論工造軍器制器兵器選士政教軍中號令服習謂使習武藝徧知天下謂徧知其地形隘易主將二拙士卒勇怯明於機數此八者皆湏故兵未出境而無敵八者悉備然後能正天下又曰凢民之所以守戰而死而不德其上者或守或戰雖復至死不敢持之以德於上則有數存於其間以至此也曰古者親戚墳墓之所在也一變田宅冨厚足也一變不然則州黨與宗族足懷樂也三變不然則上之教訓習俗慈愛之於民也厚無所往得之也君之恩厚皆在於人無所他往故得人致死四變不然則山林澤谷之利足生也五變不然則地形險阻易守而難攻也六變不然則罰嚴而可畏也賞明而足勸也七變不然則有深怨於敵人也八變不然則有深於上也功厚則禄多故亦自爲戰而不得於君九變今恃不信之人而求以利用不守之民而欲以固將不戰之卒而幸以勝此兵之三闇也尉僚子曰凢兵者羊膓亦勝鋸齒亦勝兵重者如山林輕者如燔如炮如漏如潰如堵垣壓人也雲霓覆人也又曰故兵止如堵牆動如風􅀨車不結轍士不旋踵此本戰之道也所以養民也又曰城所以守戰戰所以守城也故務耕者其民不飢務守者其民不危務戰者其地不圍三者先王之本務也而兵最急太平御覽卷第二百七十
