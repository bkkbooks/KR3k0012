front:
  text: 太平御覽卷第四百八十四
  hash: sha256:361702874a395d23f96b7fc615f997234884246340d6956dee09599f5356681b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_484-1a}
body:
  text: 人事部一百二十五貧上􅀃文曰貧財分少也尚書六極四曰貧毛詩曰岀自北門憂心殷殷終窶且貧莫知我艱窶者無禮也貧者困於財又曰自我徂爾三歲食貧又曰大東小東杼軸其空禮記曰君子雖貧不鬻􅀕噐雖寒不衣􅀕服又曰子路曰傷哉貧也生無以養死無以爲禮子曰啜菽飲水盡其歡斯之爲孝歛手足形還葬而無槨稱其財斯之謂禮還猶疾謂不及其日月也又曰君子辭貴不辭賤辭冨不辭貧又曰儒有一畒之宫環堵之室蓽門圭竇蓬户甕牗易衣而出併日而食不隕穫於貧賤不充詘於冨貴左傳曰室如懸罄論語曰貧而無謟又曰貧與賤是人之所惡也不以其道得之不去也又曰衣敝緼袍與衣狐狢者立而不耻者其由也與緼絮也賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂又曰􅀖有道貧且賤焉耻也又曰君子憂道不憂貧家語曰端木賜駟馬連􅀐以從原憲居蓬蒿之中并日而食子貢曰甚矣子之病矣國語曰叔向見韓宣子憂貧叔向賀之宣子曰吾有卿名而無其實無以從二三子家貧則不及人也吾是以憂子賀我何故對曰昔欒武子無一卒之田武子晉正卿欒書也大夫一卒無者不及上大夫其官不備其宗噐噐􅀕噐也宣其德行愼其憲則諸侯親之戎翟懷之今吾子有欒武子之貧吾亦爲能其德也是以賀􅀂憂德之不脩而患貨之不足將弔不暇何賀之有也史記曰叔孫敖知優孟之賢病且死謂其子曰我死汝必貧困其子無立錐之地又曰寗戚衛人也欲仕齊家貧無以自資乃賃爲人推車至齊國桓公出戚望見車駕乃於車下飯牛扣牛角而歌桓公聞之撫手曰異哉此人乃非常人也命管仲迎之以爲上卿又曰馮驩齊人貧乏不能自存使人屬齊相孟甞君願􅀉食門下孟甞君曰客何能也對曰無能孟甞君􅀏而受之左右皆知君賤之食以草具居有頃驩􅀝柱彈其劒鋏而歌曰長鋏歸來乎食無魚左右以告孟甞君食之乃比門下諸客居有頃復歌曰長鋏歸來乎岀無車左右以告孟甞君爲之駕比門下客後有頃復歌曰長鋏歸來乎無以爲家左右皆惡之以其貪不知足也孟甞君問驩曰公有親乎對曰有母孟甞君令人給其食用無使乏驩乃不復歌後孟甞君出記事問門下諸客有能習計㑹能爲吾收債於薛乎驩獨署曰臣能孟甞君怪曰此誰乎左右曰歌夫長鋏歸來者也孟甞君􅀏曰客果有能吾􅀒之未之見也請而見之謝曰文倦於事憒於憂乆闕罪於先生先生不羞乃有意欲爲收債乎驩對曰願之於是約車治裝載劵契將行驩問曰收債畢市何物而返也孟甞君曰視吾家之寡有者驩遂驅而之薛使吏召諸民當償債者悉來合劵劵旣合驩乃矯君命以所債賜諸民因燒其劵民皆呼萬歲驩遂長驅而還見孟甞君君怪其疾也衣冠而見之曰債畢乎對曰畢向市而返對曰臣竊計宫中珎寳盈室車馬實於外廐美人充下陳君家所寡有者義耳􅀼爲君市義孟甞君曰市義若何對曰今君有區區之薛不附愛子其民因而賈利之臣􅀼矯君命盡以賜之而燒其劵民時稱萬歳此臣爲君市義也孟甞君不悅曰先生休矣於是朞年人或毀孟甞君於湣王曰孟甞君將亂及王出畋忽有刼王者意甚疑之孟甞君將出奔其舎人魏子􅀄爲君收邑三返而不敢入君問之對曰有賢者竊爲君教與之以故無入至是魏子所與賢者聞孟甞君出上書言其不亂請以身盟遂自刎於宫門湣王大驚乃復召孟甞君孟甞君謝病歸老於薛未至百里民扶老携㓜迎於道傍孟甞君頋謂驩曰先生所爲文市義者乃今見之矣驩對曰狡兎有三窟僅得免於死矣今君止有一窟未得髙枕而卧也請爲君復鑿二窟孟甞君與車五十乘金百斤西遊於梁􅀃魏王曰齊放其大臣孟甞諸侯先迎之者國冨兵強於是魏昭王以其故相爲上將軍而虚相位遣謁者賫黄金千斤車乗徃聘孟甞君固辭不徃魏使三返湣王聞之君臣恐懼遣太傅賫黄金千斤文馬二駟以謝孟甞君使返國驩又請曰願得先生􅀕噐立宗廟於薛廟旣成還報曰三窟以就君可髙會而樂矣孟甞君乃還爲齊相又曰顔無繇字路顔淵父也回死顔路貧請孔子車以葬孔安國曰賣車以作椁也孔子曰才不才亦各言其子鯉也死有棺而無槨吾不徒行以爲之槨以吾從大夫之後不可徒行也又曰魏悖少時欲求見齊相曹叅家貧無以自通乃常獨早夜掃齊相舎人門外舎人怪之以爲物而伺之獨得勃勃曰願見相君無因故爲子掃欲以求見於是舎人見之曹叅因以爲舎人又曰東郭先生拜爲都尉先生乆待詔公車貧困飢寒衣弊履不完行雪中履有上無下足盡踐地道人􅀏之又曰甘茂亡􅁗奔齊逢􅂫代爲齊使於􅁗茂曰臣得罪於􅁗懼而逃無所容跡臣聞冨人女會績貧人女曰我無以置燭而子之火光有餘子可分我餘光無損子明今臣困願以餘光振之漢書曰司馬相如字長卿成都人家貧甞於臨卭市與人沽酒傭爲洒掃身着牘鼻布裩於市中然少好讀書學擊劒小名犬子慕藺相如之爲人更名曰相如後遊梁數年歸素與臨卭令王吉善臨卭多冨人有卓王孫程鄭相謂曰今有貴客爲具召之并召令令旣至請長卿長卿謝不能臨臨卭令不敢甞食乃自起迎相如相如不得巳而強徃一坐盡歡酒酣令前奏琴曰竊聞長卿好之願以自娯相如爲鼔一弄卓王孫有女文君新寡好音竊窺之相如乃挑之文君夜奔相如相如與馳歸成都家徒四璧立卓王孫大怒女不才我不忍赦一錢不分文君乆之與相如俱至臨卭買酒舎乃令文君當壚相如與傭保􅄂作於市卓王孫耻之昆弟諸公謂王孫曰一女所不足者非財也今文君失身於相如相如雖貧其人才足依也柰何相辱如此王孫不得巳分與僮僕百人錢百萬文君與相如乃歸成都武帝立蜀人楊德意爲狗監侍上讀子虚賦而善之曰朕獨不得與此人同時意曰此臣之邑人司馬相如爲此賦上驚乃召問相如相如曰然此乃諸侯之事未足可觀乃作上林賦賦成奏之帝大恱以相如爲郎後拜中郎將建節使至蜀蜀太守郊迎縣令􅀒弩先驅於是郷閭故人及卓王孫諸公因門下獻牛酒以交歡王孫於是喟然歎曰老人所恨得使女事相如乃晚耳又曰晁錯奏曰古者稅民不過什一􅁗則不然用商鞅之法改帝王之制除井田民得賣買冨者連阡陌貧者亡立錐之地故貧民常衣馬牛之衣而食犬􅇾之食又曰陳平陽武戸牗郷人少時家貧有田三十􅅿與兄伯居常耕田縱平使遊學平爲人長大美色人或謂平貧何食而肥􅀂是其嫂疾平之不親家事曰食糠籺耳有叔如此不如無平好讀詩書家貧居窮巷以席爲户然門外多長者車轍又曰酈食其陳留髙陽人好讀書家貧落魄無衣食業爲里監門吏然縣中賢豪不敢役皆謂之狂生又曰韓信淮隂人家貧無行不得推擇爲吏不能治生爲商賈從常人􅀉食其母死無以葬乃行營髙燥地令傍可置萬家者又曰倪寛千乗人治尚書歐陽生貧無貲用帶經而鋤休息輙誦讀又曰嚴助侍讌從容上問所欲對曰家貧爲友壻冨人所辱願爲㑹稽太守於是拜之又曰王章字仲卿太山鉅平人爲諸生學長安獨與妻居章疾病無􅀍卧牛衣中與妻决涕泣其妻呵怒曰仲卿京師尊貴在朝廷人誰踰仲卿者今疾病困厄不自激卯廼反涕泣何鄙也又曰朱買臣字翁子吴人也家貧好書不治産業常刈薪樵以自賣給食擔束薪行且誦書其妻亦􅀒載相隨數止買臣無歌謳道中買臣愈益疾歌妻羞之求去買臣􅀏曰我年五十當冨貴今四十餘矣汝苦日乆待我冨貴報汝功力妻恚曰如公等終餓死溝中耳何能冨貴買臣不能留即聽去又曰蔡義河内温人以明經給事大將軍幕府家貧常歩行資禮不逮衆門下好事者相合爲義買犢車令乗之又曰主父偃齊國臨淄人學長短縱撗術晚廼學易春秋百家言遊齊諸子聞諸儒生相與排擯不容齊家貧假貸無所得北遊燕趙中皆莫能厚遇又曰陳湯字子公山陽瑕丘人少好學書慱逹善属文家貧取貸無節不爲州里所稱又曰貢禹上書曰臣禹年老貧窮家貲不满萬錢妻子糠豆不贍短􅄄不完有田百三十􅅿又曰楊雄以病免復召爲大夫家素貧􅄝酒人希至其門下有好事者載肴從遊學又曰張竦居貧無賔客時有好事者從之質疑問事論道經書而巳又曰匡衡字稚圭東海承人父丗農夫至衡好學家貧傭作以供資用尤精力過人范曄後漢書曰孫期字仲式濟隂人也少爲諸生家貧事母至孝牧豕於大澤中以奉焉逺人從其學者皆執經壟畔以追之里落化其譲又曰申屠蟠字子龍陳留外黄人也家貧傭爲􅃮工郭林宗見而竒之又曰李充字大遜陳留人家貧兄弟六人同衣逓食妻􅀼爲充曰今貧若此難以乆留妾有私財願思分異充僞許之曰當醖酒㑹内外共議旣而致酒宴客充前跪白母此婦無􅃺教充離間母兄今遣斥便叱去之謝承後漢書曰王充字仲任上虞人少孤郷里稱孝到京師受業太學􅀶覽而不守章句家貧無書常遊洛陽市肆閱所賣書目一見輙能誦憶遂慱通衆流又曰張楷字公超治嚴氏春秋古文尚書門徒皆造問焉車馬填門貴戚之家皆起舎巷以􅀱過客之利楷疾其如此輙徙避家貧無爲業常乗驢車至縣賣藥足給食輙還郷里東觀漢記曰符融妻亡貧無殯斂郷人欲爲具棺服融不肯受曰古之亡者弃之中野唯妻子可以行志但土埋藏而巳又曰桓榮字春卿沛郡龍亢人也少學長安治歐陽尚書事􅀶士朱普貧窶無常客傭以自給精力不倦十五年不闚家又曰閔仲叔居安邑老病家貧不能買肉日買一片猪肝屠者或不肯爲斷安邑令􅀱之問諸子何飯食對曰但食猪肝屠或不肯與之令出勑市吏後買輙得仲叔怪問其予道􅃺乃歎曰閔仲叔豈以口腹累安邑耶遂去之沛又曰周紆爲渤海太守赦令詔書到門不出夜遣吏到属縣書決罪行刑坐徴詣廷尉繫獄數曰免歸家貧無以自賑贍身築壍以給食章帝知憐之復以爲郎華嶠後漢書曰范式爲荆州刺史友人南陽孔嵩家貧親老乃變名姓傭爲新野河里街卒式行部到新野而縣選嵩爲導騶迎式式見而識之呼嵩把臂曰子非孔仲山耶對之歎息語及平生曰共與俱曳長􅅂遊集帝學吾蒙國恩致位牧伯而子懷道隱身處於卒伍不亦惜乎嵩曰昔侯嬴長守於賤業晨掃門肆志於抱關子居九夷不患其陋貧者士之冝豈爲鄙哉式勑縣代嵩嵩以爲先傭未竟不肯去續漢書曰范丹桓帝時以丹爲萊蕪長不到官後辟太尉府自以狷急不能從俗常佩韋於朝徒行􅁦服賣小於市遭黨人禁錮遂推鹿車載妻子捃拾自資或依􅀫樹䕃如此十餘年乃結草室内居焉閭里歌曰甑中生塵范史雲釡裏生魚范萊蕪又曰呉祐年二十䘮父居無擔石而不受贍遺常牧豕於長垣澤中行吟經書遇父故人謂之曰卿二千石子而自業賤事縱子無耻奈先君何祐辭謝而巳守志如􅀄也又曰王苑字仲安貧賤茅屋蓬户藜藿謝承後漢書曰施延字君子沛人家貧母老常鬻力供養種􅀲自給位至太尉又曰永平五年班超兄固􅀍召詣校書超與母隨至洛陽家貧常爲傭書以供養乆傭甞苦輟業投筆歎曰大丈夫無它志略獨當効􅀓介子張騫立功異域以取封侯安能乆事筆硯乎魏略曰常林少單貧雖貧自非手力不取之於人性好學漢末爲諸生帶經耕鋤其妻自擔餉餽之林雖在田野其相敬如賔又曰黄􅀄中儒雅並進而揚沛本以事服能見遂以議郎冗散里巷沛前後宰歷城守不以私計意故身退之後家無餘積治疾於家荒田二頃起蝸牛廬居止其中也典略曰程堅字謀甫南陽舞隂人仁孝清㓗居貧無資磨鏡自給不受人施諸嫗共􅞎更相呼食有或不食也相謂曰非程謀甫何爲不食人食耶又曰劉陶字子竒川人丗祖十八年徙六郡大族陶曽祖自齊來丗以儒學安貧樂道故仕不過孝廉又曰裴潜毎之官不將妻子妻子貧乏織荆芘以自供群弟之田廬常歩行家人小大或并日而食晉中興書曰王猛北海人居魏土少貧賤鬻畚爲業甞至洛陽貨畚有一人於市貴買畚而無直曰可隨我去取直猛隨行不覺逺忽至深山語猛且住樹下當先啓道君來須􅁷猛進見一公踞胡牀頭鬢悉白從十許人一人引猛云大司馬公可進猛因拜公公曰王公何縁拜即十倍酬畚直遣人送猛出頋視乃嵩山又曰劉寔字子真平原髙唐人少貧共糠飯繩索作衣賣手繩口誦又曰淳于智字叔平濟北人上黨鮑瑗家少䘮疾貧苦謂曰淳于叔平神人也何不試就卜瑗乃令智作卦卦成曰君謂宅東北有大桑樹君徑至市入門數十歩當有一人將新馬鞭者就請還買以懸此桑樹三年當􅁀得財也瑗承其言詣市果得馬鞭懸之正三年後浚井得錢千萬銅鐵􅄂噐復可二十餘萬於是家業用展病者亦愈太平御覽卷第四百八十四
