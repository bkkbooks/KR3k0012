front:
  text: 太平御覽卷第二百三十三職官部三十一
  hash: sha256:9626f6f78c6ea2b56de24bf6eae975650df3615d820f998f09b0313e683098eb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_233-1a}
body:
  text: 秘書􅁥秘書少􅁥秘書丞秘書郎秘書􅁥六典曰􅁥之職掌􅀖國經籍圖書之事有二局一曰著作二曰太史皆率其屬而修其職少􅁥爲之貳東觀漢記曰桓帝延嘉二年􅀄置秘書􅁥掌典圖書古今文字考合異同華嶠後漢書曰學者稱東觀爲老氏藏室道家蓬萊山王融曲水詩序曰記言事於仙室謂藏室也魏志曰王象字義伯散􅀐常侍領秘書􅁥撰皇覽魚豢魏略曰蘭臺臺也而秘書署耳王隠晉書曰王沉爲秘書􅁥著魏書多爲時諱而善序事又曰羊祐爲黃門郎陳留王立以少帝不願爲侍臣徙爲秘書􅁥又曰惠帝永平元年詔云秘書􅁥綜理經籍考校古今課試署吏領有四百人冝專其事鄧粲晉紀華譚爲秘書自􅀒宿名意毎怏怏嘗從容謂上曰臣老於秘閣矣汲黯之言復存今日上不恱晉諸公讃曰荀朂領秘書監太康二年汲郡􅃁中得竹書朂躬自撰次注冩以爲中經列於秘書經傳闕文多所證明又讃曰􅁃峻自司空長史遷秘書監幽讃符命天文地理因有述焉何法盛晉中興書曰孫盛字安國爲秘書監篤尚好學自少及長常手不釋卷旣居史官乃著三國陽秋沈約宋書百官志曰秘書監丞各一人郎四人魏武建國有秘書令左右丞黃􅀄中分秘書立中書而秘書之局不廢昔漢武帝建藏書之􅁽置寫書之官於是天下文籍皆在天禄石渠延閣廣内秘府之室謂之秘書至成哀世使劉向父子以夲官典其事至于後則圖籍在東觀有校書郎又有著作郎傳毅馬融之徒多爲校書郎又蔡邕從尚書選入東觀著作邕旣巳爲尚書郎而入東觀著作復拜議郎知是著作郎也又碩學逹官徃徃典校秘書如向歆故事或但校書東觀或有兼撰漢記也梁書曰任昉字彦昇爲秘書監自齊永元以來秘閣四部篇卷紛雜昉手自讎校由是篇目定焉後魏書伊馥世祖欲拜馥爲尚書郡公馥辭曰尚書務殷公爵至重非臣年少愚近所冝荷任請収過恩世祖問其所欲馥曰中秘二省多諸文士􅀂恩矝不巳請叅其次世祖賢之遂拜爲中護將軍秘書監隋書曰栁􅙒煬帝嗣位拜秘書監封漢南縣公帝退朝之後便命入閤言宴諷讀終日而罷帝毎與嬪后對酒時逢與㑹輙遣命之至與同榻共席恩􅀂友朋帝猶恨不能夜召於是命匠刻木偶人施機􅀜能坐起拜伏以像於􅙒帝毎在月下對酒輙令宫人置之於坐與相讎酢而爲懽􅀏唐書曰魏徵爲秘書監奏引學者校定四部書自是秘府圖籍粲然畢備劉歆七略曰武帝廣獻書之路百年之間書積如丘山故外有太常史愽士之藏内則延閣廣内秘室之府魚豢典略曰芸臺香辟􅁓魚蠧故藏書臺稱芸臺三輔黃圖曰未央宫東有麒麟殿臧秘書即楊雄校書之處也王充論衡曰蘭臺之官監國得失也通典曰秘書省但主書冩勘校而巳雖非要刺然好學君子亦多求爲之温嶠舉荀崧爲秘書監表曰夫國史之興將以明失得之跡謂之實録使一代之典煥然可觀散􅀐常侍崧文質彬彬思義通􅀶歷位先朝莅事以穆冝掌秘奥宣明史籍王肅表曰青龍之末主者啓選祕書監詔秘書騶吏以上三百餘人非但學問義理當聞有威嚴能檢下者詔肅以常侍領焉又王肅論秘書不應屬少府表曰魏之秘書即漢之東觀郡國稱敢言之上東觀且自大魏分秘書而爲中書以來傳緒相繼于今三監未有􅀠名於少府者也今欲使臣編名於騶􅝗言事於外府不亦􅈥朝章而辱國典乎大和中蘭臺秘書争議三府奏議秘書司先生之載籍掌制書之典謨與中書相亞冝與中書爲官聮華嶠集詔曰尚書嶠體素弘簡文雅該通經覽古今􅀶聞多識屬書實録有良史之志故轉爲秘書監其加散􅀐常侍使中書散􅀐著作及治禮者律天文數術南省文章門下撰集皆典領之嶠表伏見詔書以臣爲秘書監加位常伯昔劉向父子世典史籍馬融通􅀶三入東觀非臣膚淺所敢投跡唐書太宗正授顔師古秘書監制曰秘書望華史官任重􅃟衆而舉歷代攸難守秘書監顔師古體業淹和噐用詳敏學該流略詞兼典麗職司圖書亟經歳序朱紫旣辨著述有成冝正名噐允兹望實可秘書監秘書少監唐書周思茂者貝州漳南人少與弟思鈞俱早知名自右史轉太子舎人與范履冰在禁最蒙親遇至於政事損益多叅預焉累遷麟臺少監崇文舘學士垂拱四年下獄死又曰王紹宗楊州江都人也遷秘書少監仍侍皇太子讀書紹宗性澹雅以儒素見稱當時朝廷之士咸敬慕之張易之兄弟亦厚之易之伏誅紹宗坐以交徃見廢又曰德宗以左諌議大夫史舘修撰張薦爲秘書少監修撰如故時裴延齡貴欲異同宰府乃言於上曰諌議大夫論朝廷得失之官史館修撰書朝廷得失之事則領史職者不冝爲諌官故有斯命秘書丞魏志曰武帝置秘書左右丞以劉放爲秘書左丞孫資爲秘書右丞魏略曰薛夏字宣聲天水人也􅀶學有才華天水舊有姜任閻趙四姓常推於郡中而夏爲單家不爲降屈四姓欲治之夏乃遊逸東詣京師太祖宿聞其名甚禮遇之文帝又嘉其才黃􅀄中爲秘書丞帝常與夏推論書傳未嘗不終日也毎呼之不名而謂之薛君夏居甚貧帝又顧其衣薄解御􅂁賜之其後征東將軍曹休來朝時帝方與夏有所諮論而外啓休到帝引入坐定帝顧夏目之於休曰此君秘書丞天水薛宣聲也冝共談其見遇如此魚豢魏略曰薛夏爲秘書丞時秘書嘗公事移蘭臺蘭臺自以臺也秘書丞時爲署耳謂夏不得儀當有坐者夏報曰蘭臺爲外臺秘書爲内閣臺也閣也何不相移之有蘭臺無以折之又曰嚴苞以髙才黃􅀄中入爲秘書丞數奏文賦帝甚異之晉書􅄞紹以父得罪靖居私門山濤領選啓武帝曰康誥有言父子罪不相及􅄞紹賢侔郄缺冝加旌命請爲秘書郎帝謂濤曰如卿所言乃堪爲丞何但郎也乃發詔徴之起家爲秘書丞王隱晉書曰􅁃峻字山甫􅀶學有才爲秘書丞遍觀古今聞見益優虞預晉書曰何禎字元幹廬江人也爲尚書郎特詔叅祕書丞祕書夲有一丞時尚未轉遂以楨爲右丞右丞之置自楨始也檀道論晉陽秋曰太元十八年王謐爲秘書丞乃表前尚書殷允中書郎張敞太子後率郄儉之故太常桓石秀是多書之家請秘書郎分局採借齊書曰王儉字仲寳爲秘書丞上表求校墳籍依七略撰七志四十卷獻之又曰張率字士簡呉郡人遷秘書丞髙祖曰秘書丞天下清官東南胄緒未有爲之今以相處爲卿定名譽齊職儀云秘書丞銅印墨綬南史劉孝綽遷祕書丞武帝謂舎人周捨云第一官當用第一人故以孝綽居此職後魏書李彪字道固遷秘書丞分領著作事自文成帝己來至於大和崔浩髙允著述因書編年序録爲春秋之體遺落時事一二無存彪與秘書令髙祐始奏從遷固之體創爲紀傳表志之目焉又曰李輔子伯尚少有重名髙祖每云此李氏之千里駒勑撰太宗起居注㝷遷秘書丞後周書曰栁虬爲秘書丞時秘書雖領著作不叅吏事自虬爲丞始令監掌焉王肅論秘書表云青龍中議秘書丞郎與􅀶土議郎同職近日月冝在三臺上又曰秘書丞郎冝比尚書郎侍御史令侍御史乗犢車奏事用尺一秘書丞郎乘鹿車猶用尺奏恐非陛下崇儒之夲意也秘書郎六典曰秘書郎四人從六品上晉起居注云武帝遣秘書圖書分爲甲乙景丁四部使秘書郎各掌其一焉魏志曰王基字伯輿東萊人也時青土􅀄定刺史王凌特表請基爲别駕後召爲私書郎凌復請還之司徒王朗辟基凌又不遣朗書却州曰取宿衛之臣留秘閣之吏所希聞也凌猶不遣凌流稱青土盖亦由基恊和之輔也又曰鍾㑹字士季敏惠夙成時蔣濟著論謂觀其眸子可以知人㑹年五歳見濟濟大竒之正始中以賜官郎中爲秘書郎蜀志曰郄正字令先安貧好學􅀶渉墳籍弱冠能屬文入爲秘書史轉令史遷秘書郎性澹於榮利尢躭文章自司馬王楊班傳張蔡之儔遺文篇賦及當世美書善論益部有者則鑚鑿推求略皆寓目王隱晉書曰鄭黙字思元爲秘書郎刪省舊文除其浮穢時陳留虞松爲中書令謂黙曰而今而後朱紫别矣又曰左思專思三都賦杜絶人事自以所見不􅀶求爲秘書郎虞預晉書曰司馬彪少篤學不倦好色薄行不交人事專精學問大始中爲秘書郎後轉爲丞晉太康起居注曰秘書丞桓石綏啓校定四部書詔郎中四人各掌一部晉令云秘書郎掌外三閣經書覆省校閱正定脫誤沈約宋書曰秘書郎四人後漢校書郎也又曰蕭惠開雖貴戚而車服簡素􅀄爲秘書郎秘書著作並名家年少惠開意趣與之多不同比肩或三年不共語宋書曰王敬弘子恢之爲秘書郎使求爲奉朝請與恢之書曰秘書有限故有競朝請無限故無競吾欲使汝處無競之地文帝許之梁書曰張纉字伯緒爲秘書郎固求不遷欲遍觀閣内圖籍後魏書髙謐字安乎有文武才度天安中以功臣子召入禁中除秘書郎典秘閣謐以墳典殘􅆙奏廣訪郡邑大加繕冩由是代京圖籍莫不審正通典曰宋齊秘書郎皆四貟尤爲美職皆爲甲族起家之選待次入􅀘其居職例十月便遷又曰秘書郎自齊梁之末多以貴遊子弟爲之無其才實故當時諺曰上車不落則著作體中何如則秘書王肅表曰臣以爲秘書職於三臺爲近宻中書郎在尚書丞郎上秘書丞郎冝次尚書郎下不然則冝次侍御史下秘書丞郎俱四百石遷冝比尚書郎出亦冝爲郡此陛下崇儒術之盛旨也尚書郎侍御史皆乗犢車而秘書丞郎獨鹿車不得朝腵又恐非陛下轉臺郎以爲秘書丞郎之夲意也太平御覽卷第二百三十三
