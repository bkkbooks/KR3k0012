front:
  text: 太平御覽卷第五百五十禮儀部二十九
  hash: sha256:8156556a11cc8171089bf5df4a7ad5be30edebf3d2196c062425368908dce216
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_550-1a}
body:
  text: 殮柩殯賵􅉠禭殮周禮春官大宗伯曰大宗伯王崩及執事涖大歛小歛帥異族而佐執事太祝之属也又周禮春官司服曰大䘮共其歛衣服禮記檀弓上曰康子之母死陳䙝衣非上服也陳之將歛也敬姜曰婦人不飾不敢見舅姑將有四方之賔來䙝衣何爲陳於斯命撤之又䘮大記曰小歛於户内大歛於阼階君以簟席大夫以蒲席士以葦席小歛君錦衾大夫縞衾士緇衾皆一衣十有九稱大斂布紟二者大夫士一也簟細葦席也三者下皆有莞衣十有九稱法天地之終數也二衾者或覆之或薦之也又曽子問曰下殤士周葬于園遂輿機而徃途邇故也土周聖周也周人以夏后之聖周葬下殤於園中以其未成人逺不就墓也機舉尸之牀也䋲絙其中央又以绳從旁鈎之禮以機舉屍輿之以就園而歛葬焉途近故月輿機或爲餘機今墓逺則其葬也如之何今人歛下殤於宫中而葬之於墓與成人同墓途乃逺其葬當輿其棺乎載之也問禮之變孔子曰吾聞諸老聃曰昔使佚有子而死下殤也墓逺盖欲葬之墓如長殤從成人也長殤有送葬車者則棺載之矣史佚武王時史賢猶有所不知召公謂之曰何以不棺斂於宫中欲其斂於宫中如成人也斂於宫中則葬當載之也史佚曰吾敢哉畏知禮也召公言於周公爲史佚問周公曰豈不可言是豈於禮可不許也史佚行之佚失於以爲許也遂用召公之宫言也下殤用棺衣棺自史佚始也棺謂歛於棺也又問喪曰或問曰死三日而后斂者何也怪其遲也曰孝子親死悲哀志懣故匍匐而哭之􅀂將復生然安可得奪而斂之故曰三日而后斂者以俟其生也三日而不生亦不生矣孝子之心亦益衰矣家室之計衣服之具亦可以成矣親戚之逺者亦可以至矣是故聖人爲之斷决以三日爲之禮制也左傳僖下曰許穆公卒于師葬之以侯禮也男而以侯禮加一等凡諸侯薨於朝㑹加一等死王事加二等於是有以衮斂又襄公曰魯季文子卒大夫入斂公在位宰庀家器爲葬備無衣帛之妾無食粟之馬無藏金玉無重器備君子是以知季文子之忠於公室也相三君矣而無􅀻積可不謂忠乎又定上曰季平子行東野東野季氏邑還未至丙申卒于房陽虎將以璵璠斂璵璠美王君所佩忡梁懷弗與懷亦季氏家臣曰改歩改玉昭公之出季孫行君事佩璵璠􅀕宗廟今定公立復臣位改君歩則亦當去璵璠陽虎欲逐之告公山不狃不狃曰彼爲君也子何怨焉家語曰季平子卒將以君之璵璠斂孔子􅀄爲中都宰聞之歷級而救歷登階不聚足曰送死人而以寳玉猶曝屍於中原示民以姧利之端後漢書戴封年十五詣大學時同學石敬平温病卒封養視殯殮以所齎糧市小棺送䘮到家更殮見敬平生時書物皆在棺中乃異之呉志曰張昭卒遺令幅巾素棺歛以時服孫權素服臨弔又曰諸􅁑瑾年六十八卒遺令素棺斂以時服事從約省晉書曰安平王孚臨終遺令曰有魏貞士河内温司馬孚字叔逹不伊不周不夷不惠立身行道終始􅀂一當以素棺單椁歛以時服南史曰王奐爲雍州刺史􅀍誅舊人無敢至者汝南許明逹爲奐叅軍躬爲殯殮經理甚厚當時髙其節梁書曰王志天􅁥􅀄爲丹陽尹爲政清静都下有寡婦無子姑亡舉債以斂葬旣而無以還之志􅉖其義以俸償焉陳書曰周弘直卒遺䟽氣絶之後便買市中見材小形者斂以時服古人通制但見先人必湏備禮可着單衣裙衫故履旣應侍養冝備紛恱或逢善友又須香烟棺内唯安白布手巾麄香鑪而巳此外無所用釋名曰衣尸棺曰歛藏不復也風俗通曰禮天子斂以梓器宫者存時所居縁生事亡因以爲名凡人呼棺亦爲宫也宋韜遺教曰吾死斂以時服不得造新白祫單衣柩禮記曲禮下曰在棺曰柩柩之言究又檀弓下曰君遇柩於路必使人弔之又曰襄公朝于荆唐王卒在魯襄公二十八年康王楚子昭也荆人曰必請襲欲使襄公衣之魯人曰非禮也荆人強之巫先拂柩荆人悔之巫祝桃茢君臨臣䘮之禮記統曰柩之言也具書其謚置棺旁萬世乆藏也釋名曰柩究也送隨身之制皆究備也漢書曰薛宣守左馮翊多仁恕池陽令舉廉吏獄椽王立於府未及有聞正受囚家錢宣責讓縣縣案驗獄椽乃其妻受繫者錢萬六千受之而椽實不知椽慙恐自殺宣聞之移書池陽曰縣所舉廉吏獄椽王立家􅀻受財而立不知殺身以自明立誠廉士甚可閔惜其以府決曹􅁺書立之柩以顯其魂東觀漢記曰廉范字叔度京兆人也父客死蜀范乃岀􅀒䘮歸至葭萌舡觸石破没范持棺柩遂俱沈溺衆傷其義鈎求得之僅免於死晉書曰東海王越薨葬東海石勒追及於莒縣􅇞平城將軍錢端出兵拒勒戰死軍潰勒命焚越柩曰此人亂天下吾爲天下報之故燒其骨以告天地蕭子顯齊書曰􅀓琰字季珪北地靈州人也美姿儀爲尚書左民郎遭䘮居南岸隣家失火燒屋抱柩不動殯禮記曲禮上曰里有殯不巷歌助哀也又檀弓上曰孔子少􅀌不知其墓孔子之父鄒邑叔梁紇與顔氏之女徴在野合生孔子徴在耻耻而不告也殯於五父之衢欲有所就而問之孔子亦爲隠焉殯於家則知者無由怪尺欲發問端五父之衢二名也盖曼父之鄰人之見之者皆以爲葬也見相行於路也其慎也盖殯也愼當爲引禮家讀然聲之誤也殯引飾引飾棺以輤葬引飾棺以翣栁孔子是以殯引不以葬引時人見者謂不知禮又檀弓上曰天子之殯也攅塗龍輴以椁攅木以周龍輴猶如椁而塗之天子殯以輴車􅀞轅以龍加斧于椁上畢塗屋斧謂之黼白黒文也以刺繡於縿幕加椁以覆棺巳乃屋其上盡塗之矣天子之禮也又檀弓下曰惟殯非古也自敬姜之哭穆伯始也穆伯魯大夫秀悼子之子公甫靖叔敬姜穆伯妻文伯歜之母也禮朝多􅂘不惟又王制曰天子七日而殯七月而葬諸侯五日而殯五月而葬大夫士庶人三日而殯三月而葬尊者舒卑者速也春秋傳曰天子七月而葬同􅁤畢至諸侯五月同盟至大夫三月同位至士踰月外姻至也又䘮大記曰君殯用輴攅至于上畢塗屋大夫殯以幬攅置于西序塗不曁于棺士殯見椎塗上帷之攅猶叢也屋殯上覆如屋也幬覆也曁及也天子之殯居棺以龍輴櫕木題湊象椁上四注如屋以覆之諸侯輴不畫龍攅不題湊象椁其他亦如大夫之殯廢輴置棺墉下就攅三靣塗之不及棺者攅中狹小裁取客棺然則天子諸侯􅏔寛大夫矣士不櫕掘地下棺見小要耳帷之者􅀑神幽闇士逹乎天子皆然或作椁也又坊記曰子云賔禮每進以讓䘮禮每加以逺浴於中霤飯於牖下小斂於户內大斂於阼階殯於客位祖於庭葬於墓所以示逺也逺之所以崇敬左傳僖下曰􅀳文公卒庚辰將殯于曲沃殯􅉎棺也曲沃有舊宫焉出絳柩有聲如牛如牛呴聲卜偃使大夫拜曰君命大事將有西師過軼我擊之必大捷焉聲自柩出故曰君命大事戎事也偃聞奏宻謀故因柩聲以正衆心論語郷黨曰朋友死無所歸曰於我殯重朋友恩也無所殯無親後也續漢書曰和帝追封謚皇太后父梁竦爲襃親􅉖侯殯賜東園棺玉匣衣衾范曄後漢書曰蔡順䘮母停柩未殯東鄰失火燒順屋柩不可移乃伏柩上火乃越燒他舎餘見孝部宋書曰竟陵王誕據廣陵爲逆事平蔡興宗奉旨慰勞廣陵别駕范義與興宗素善在城内同誅興宗至躬自収殯致䘮還豫章舊墓上聞謂曰卿何敢故爾觸網興宗抗言荅曰陛下自殺賊臣自葬周旋旣犯嚴制正當甘於斧􅃏耳唐書曰嚴郢以舊怨與盧􅂎䧟楊炎趙惠伯構成其罪貶炎於崖州惠伯於費州郢旣報怨過當人頗不直郢後得罪至費州道左有柩殯問其主名或曰趙惠伯之殯也郢黙然慙恧歳餘而卒穆天子傳曰天子乃殯盛􅁎于榖兵之廟先王之廟有此者漢氏亦所在有廟也白虎通曰天子舟車殯爲水火也故棺在車在舟中臣子更執紼晝夜千二百人紼所以牽持棺者也釋名曰於西壁下塗之曰殯殯賔也賔遇之言稍逺子思子曰殯賔也􅈖禮記雜記曰介􅈖執圭將命曰寡君使某􅈖相者入告反命曰􅀌某須矣陳乗黃大路於中庭北圭將命客使自下由路西子拜稽顙坐委于殯東南隅宰舉以東轅也自率也下謂馬在路之下覲礼曰路下四亞之客給者入設乗黄於大路之西客入則致命矣左傳隱公曰天王使宰咺來歸惠公仲子之􅈖緩且子氏未薨故名惠公葬在春秋前故曰緩也子氏仲子也葬薨在二年􅈖助䘮之物贈死不及尸尸未葬之通稱弔生不及哀諸侯曰上旣葬則衰麻除無􅂘位諒闇終䘮豫凶事非禮也仲子在而求贈故曰豫凶事榖梁傳隱公曰乗馬曰􅈖公羊傳隱公曰車馬曰􅈖春秋􅀃題辭曰知生則􅉠知死則􅈖􅉠之爲言助也􅈖之爲言覆也輿馬曰􅈖貨財曰􅉠玩好曰贈決其意也衣􅀍曰禭養死具也贈稱也禭遺也􅉠周禮天官曰小宰凡􅀖之弔事掌其戒令與其弊器財用凡所共者弔事弔諸侯臣弊所用贈也器所致明器也凡䘮始無弔而含隧葬而􅈖贈其間加恩厚則有􅉠焉禮記曲禮下曰弔䘮不能􅉠不問其所費又檀弓上曰孔子之衛遇舊館人之䘮入而哭之哀出使子貢稅􅆖而􅉠之子貢曰於門人之䘮未有所稅􅆖稅􅆖於舊館無乃巳重乎言稅􅆖太重比於門人恩爲偏頗也夫子曰予嚮而􅂘之遇於一哀而出涕遇見也舊館人恩雖輕我入􅂘見主人爲我盡一哀是厚恩待我也我爲之出涕恩重冝施惠之也予惡夫涕之無從也小子行之客行無他物可以昜之者使遂以徃也又檀弓曰子栁之母死旣葬子碩欲以􅉠布之餘具􅀕器古者謂錢爲泉布所以通布貨財子栁曰不可吾聞之也君子不家於䘮惡恩死者以爲利請班諸兄弟之貧者又少儀曰􅈖馬入廟門以其主於死􅉠馬與其弊大白兵車不入廟門以其主於生人也兵車革車也雖爲死者來陳之於外戰伐田獵之服非盛者也周禮革路建大白以即戎也􅉠者旣致命坐委之擯者舉之主人無親受也公羊傳隱公曰貨財曰􅉠榖梁傳隱公曰錢財曰􅉠􅉠助歸生者􅉠漢書曰原渉父哀帝時爲南陽太守天下殷富大郡二千石官賦斂􅉠葬皆千萬巳上妻子適共受之以定産業時又少行三年䘮者及渉父死讓還南陽􅉠送行䘮􅃁墓三年由是顯名京師又曰何竝字子廉徙潁川太守疾病召丞椽作先令書曰告子恢吾生素飡日乆死雖得官􅉠勿受葬爲小椁但下棺恢如其言後漢書曰魯恭字仲康父期爲武陵太守卒官恭年十二晝夜號踊聲郡中􅉠無所受乃歸服䘮禮過成人後漢書曰羊續爲南陽太守徴爲太常未及行㑹病卒遺言薄歛不受􅈖遺舊典二千石卒官􅉠􅈖百萬府丞焦儉遵續先意一無所受詔書襃美勑太山太守以府􅉠錢賜續家丗􅀃曰王戎父渾官至梁州刺史渾所歷州郡義故懷其德惠相率致􅉠數百萬戎悉不受齊書曰張稷所生劉先假葬瑯瑘黄山建武中改申葬禮􅉠助委積於時雖不拒絶事畢隨以還之脱君􅀕服以禭臣親賢也又􅄂記曰諸侯相禭以後路與冕服先路與褒衣不以禭不以巳之正者施於人以彼不以爲正也後路貳車貳車行在後也又少儀曰臣致禭於君則曰致衣廢於賈人敵者曰禭言廢衣不必其以斂也賈人知物善惡也親者兄弟不以禭進不執將命左傳文公曰秦人來歸僖公成風之禭進禮也秦慕諸夏欲通敬於魯國有翟泉之盟故贈僖公并及成風本非魯方獄同無相赴弔之制故不譏其緩而以接好爲禮諸侯相弔賀也雖不當事茍有禮焉書之可也以無忘舊好送死不及尸故曰不當事書者書於典䇿垂示子孫使無忘過厚之好又襄公曰魯公朝于楚康王卒楚人使公親禭禭諸侯有遣使􅈖禭禮今楚欲依遣使之比矣公患之穆叔曰祅殯而禭則布幣也先使巫祅除殯之凶邪而行禭禮與朝而布弊無異乃使巫以桃茢先殯祅茢􅁰穰楚人弗禁旣而悔之又襄公曰鄭伯有死於羊肆羊肆市列子産禭之枕之股而哭之斂而殯諸伯有之臣在市側者旣而葬諸斗城斗城鄭地名春秋􅀃題辭曰衣􅀍曰禭禭之言遺也榖梁傳隱公曰衣衾曰禭􅀃文曰禭衣死人也太平御覽卷第五百五十
