  text: 太平御覽卷第八百五十七
  hash: sha256:af3d6fe11d8693d430c53aacd0b28740de3c374d89a04b8d78c830eeeedf4c16
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_857-1a}
body:
  text: 飲食部十五􅁡沙􅄳􅁡張璠易注序曰􅁡蜂以兼採爲味韻集曰􅁡蜂百草華所作也漢武帝故事曰西王母曰太上之藥有中華紫􅁡雲山朱􅁡續漢書曰天笁國出石􅁡東觀漢記曰丗祖甞與朱祐共買􅁡合藥後上追念之即賜祐白􅁡一石問何如在長安時共買􅁡乎吳書曰􅀽術爲雷薄等所距士衆絶粮時盛暑欲得蜜漿又無􅁡坐床歎息良乆乃大咤曰􅀽術至於此乎吴曆曰孫亮使黄門至中藏取􅁡漬梅􅁡中有䑕矢召問藏吏曰黄門從汝求􅁡耶吏曰向求􅁡實不敢與黄門不服亮曰此易知耳令破䑕矢矢裏燥亮曰􅀂乆在􅁡中中外當俱濕裏燥必是黄門所爲黄門首服晉令曰􅁡工収􅁡十斛有能増煎二􅂛者賞榖十斛晉太康起居注曰尚書令荀勗嬴毀賜石蜜伍斤齊書曰明帝元好􅢡姨以銀鉢盛􅁡漬之一食數鉢又曰陶弘景永明十年脫朝服掛神武門上表辭禄詔許之賜以束帛勑所在月給茯苓伍斤白􅁡貳斤以供服餌梁書曰任昉爲新安太守郡有􅁡嶺及楊梅舊爲太守所採昉以冒險多物故即時停絶又曰􅀓昭爲臨海大守郡有􅁡巖前後太守皆自封固專収其利昭以周文之囿與百姓共之大可喻小乃教勿封梁四公記曰髙昌國遣使貢刺􅁡帝命􅇐音竭公迓之謂其使曰刺􅁡是塩城所生非􅀯平城者使者曰其年風災刺􅁡不熟故尓帝問杰公何得知對曰南平城羊刺無葉其􅁡色明白而味甘塩城羊刺葉大其􅁡色青而味薄以是知􅁡之僞耳唐書曰蕃胡國出石􅁡中國貴之上遣使徃摩伽池國取者法令楊州煎諸蔗之汁於中厨自造焉色味逾於西域所出神仙傳曰飛黄子服中嶽石􅁡及紫梁得仙王孚安成記曰郡東有山百姓呼曰􅁡崗􅁡焉仙經云􅁡爲衆口芝荆州圖記曰赤馬山有􅁡房二百所羅綴相望因名曰百房異物志曰交阯草滋大者數寸煎之凝如氷破如􅀶棊謂之石􅁡凉州異物志曰石􅁡之兹甜於浮蓱非石之􅀋假石之名實出甘柘變而凝輕甘柘似竹味甘煑而曝之則凝如石而甚輕范子曰白􅁡出隴西天水夲草經曰石􅁡一名飴呉氏夲草曰食􅁡生武都谷劉根墨子枕中記鈔曰百花醴􅁡楚辭招魂曰瑶漿勺勺沙也實羽觴左思蜀都賦曰􅁡防郁毓􅀍其阜漢昌縣多野蜂􅁡䗶郭珎􅁡賦曰繁布金房疊稱王室咀爵滋液釀以爲􅁡散似甘露凝如割眆氷鮮玉􅃳髓滑蘭香魏文帝與孫權書曰今因趙咨奉石􅁡五餅又與朝臣詔曰南方龍眼荔支寕比西國蒱桃石􅁡又曰新城孟太守道蜀䐗肫鷄鶩味皆淡故蜀人作食喜着飴􅁡沙餳張衡七辯曰沙餳飴石􅁡逺國貢儲盛翁子與劉頌書曰沙餳西垂之産太平御覽卷第八百五十七
