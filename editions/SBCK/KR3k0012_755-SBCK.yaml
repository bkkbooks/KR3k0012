front:
  text: 太平御覽卷第七百五十五
  hash: sha256:4910b41027d0bab9ae1700f4e6e8383ce5b9f13d088384b53c55375f2cc0bbf0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_755-1a}
body:
  text: 工藝部十二彈碁儒棊擊壤角抵彈四維象戲夾食悁悶射數簸子抃擲塼彈碁東觀漢記晏帝詔曰樂成王居諒闇音隂衰服在身彈棊爲戯不肯謁陵沈約宋書曰晉平刺王休祐文帝第十三子也在荆州時左右范景達善彈棊上召之休祐留不遣上怒詰責之趙書曰冉閔収石遵遵方與女子彈棊兵至殺之梁兾別傳曰兾好彈棊抱朴子曰暑夏之月露首􅃝體唯在樗蒱彈綦不離綺繻紈袴之側丗􅀃曰劉眞長始見王丞相時暑之月丞相以腹熨彈棊局曰何如乃㵾呉人以冷爲㵾也音楚敬切劉旣出人問見王公何如劉曰未見他異唯作呉語耳王丞相遵也又曰彈棊始自魏文帝宫内裝器戲也文帝於此􅇊特妙用手巾拂之無不中者有客自云能帝使爲之客著􅁑巾拂棊妙逾於帝魏文帝典論曰余於他戲弄之事少所喜唯彈棊略盡其功乃爲之賦昔京師先工有馬合郷侯東方丗安張公子常恨不得與彼數子者對藝經曰彈棊二人對局黒白棊各六枚先列棊相當下呼上撃之彈棊經序曰彈棊者仙家之戲也昔漢武帝平西域得胡人善蹴鞠者蓋衒其便平聲㨗跳躍帝好而爲之羣臣不能諌侍臣東方朔因以此藝進之帝就捨蹴鞠而上彈棊焉習之者多在宫禁中故時人莫得而傳至王莽末赤眉凌亂西京傾覆此藝因宫人所傳故散落人間及章帝御宇好諸伎藝此戲乃盛於當時彈棊經後序曰自後漢冲質巳後此藝中絶至獻帝建安中曹公執政禁䦨幽密至於博弈之具皆不得妄寘宫中宫人因以金􅁫玉梳戯於粧奩之上即取􅀋於彈棊也及魏文帝受禪宫人所爲更習彈碁焉當時朝臣名士無不争能故帝與呉季量呉質字季量書曰彈碁間設者也又曰彈棊者雅戯也非同乎五白梟橛梟橛並樗蒲彩之數不游乎紛競詆欺之間淡薄自如固趨名近利之人多不尚焉蓋道家所爲欲習其偃亞導引之法擊博騰擲之妙自暢耳又曰唐順宗在春宫日甚好之時有􅁻逹髙釴崔同揚同愿之徒悉爲名手後有竇深崔長孺甄顒獨􅀌遼亦爲亞焉至于長慶之末好事之家猶見有局尚多解者後漢蔡邕彈棊賦曰夫張局陳棊取法式備因嬉戲以肄業託懽宴以講事設兹矢石其夷如砥采􅀂錦繢乎􅀂停水肌理光澤滑不可履乗色行巧據險用智魏文帝彈棊賦曰局則荆山妙璞滑如柔荑碁則􅀇木北幹桒樹西枝象籌列植下據􅀟螭王粲彈碁賦曰文石爲局金碧齊精隆中夷外理緻肌平晉傅􅀇彈碁賦序曰漢武帝好蹴鞠劉向以爲蹴鞠勞人體竭人力非至尊所冝乃因其體而作彈碁以解之儒碁後魏書曰侍中游肇性謙廉不競曽撰儒碁以表其志焉肇述儒碁曰儒碁者蓋博弈之流所以逰思於文亦猶投壷之習武也故聖人因物設敎有實有權情禮稱冝有張有㢮孔子云不有愽弈者乎爲之猶賢乎巳􅀂夫井公之對周穆叔卿之接許由此或示存恐非有待然則君子之處丗也豈遂躭於所適徒費時日者哉至於几杖盤鑑猶裁銘戒矧乃諧神之器而不加勸也但古之爲玩者莫不競進其功塞殺與樂殊途異勢並傳於時未有以謙退爲勝通生爲樂者故因暇隟聊復措意此即儒碁之一名蓋遊義之所統夲諸謙浄銓各撰徳略依儒行起捨遵道􅁤法中庸時然後玩人不厭其遊讓而後勝人逾愜其􅀒矜勇所以知殘冲遜以之弥隆豈唯崇謙止競而已諒亦階善全德之所因矣積名㑹理其殆庻幾致泥之戒寧不愧乎儒碁曰投二方二分六彩也智一禮二仁三義四信五各法生數所以記彩而行於道豈唯名義而巳籍數以爲差也謙行數無准名顯義耳進退之異唯在梟伏棊十生成之數亦不是過白黒半各用五分方五分長寸分寸所以記法善六敬七德八忠九順十各據成數所以記筭而兼名義名義雖異亦符五徳隂陽配合數盡也方局尺五周道四十其用三十六取捨途異四維之道通數而碁處惡其雅也謙退爲尚故髙彩者先投耻爲道也彼此二位謂之浄凈者謂仁義也左右二道謂之中中者謂禮智之道也其凈中四道彼此左右互有二不得相干干則􅃲也行碁之法始附凈起轉㸦相順終因凈出􅀄不凈岀必曲之者避相渉也通生爲務不存塞殺志仁恕也彩越凈中者休則立梟梟者不伏彩不會也㑹凈中者梟折爲伏伏者不梟行不越也􅀂彩雖㑹而于彼擬以過之有碁則不得擬非干彼者則自居矣居擬不同以于彼也行伏碁者得異彩依數而行兩彩同者唯行一常柔齊也一謙者停兩謙退一等貴重損也行梟碁者得異彩亦依數而行兩彩同者盡行其數鄙勇均也一謙行一道兩謙者停梟致異也行伏不得行梟行梟不得行伏殊謙競也折梟伏者皆從後定重行終也因綵而閱者屈而申之謂􅀄得謙信也縁行致累者越而通足皆不限道數進退皆尓梟伏兩閱者但行於梟先梟者進耻之義道尤多故也行碁之體不相凌觸所蹈皆靈行務靈凈唯焚觸􅀜􅀌明自在不以強弱生忻懼也絶於跪巧而順消息審理中也悉遇中道勝負乃分先梟後伏驗之於凈謙勇之辦實標先後處凈不安方顯其竟道梟􅀂促不盡二彩者則全行伏先後用永防其爲也自貽全進邊之義成也梟伏兩少者行於梟系不盡彩理無兼也彼旣出盡此有不岀者即許以爲勝者之筭以後退爲費也􅀂全未出則爲之虚投損巳益人謙者所崇次局負仍先梟勇故也得十筭立一爵三爵立則成勝矣既尚冲凈豈假務於多筭但謙並見跡故假以勝爲名也擊壤釋名曰擊壤野老之戯也􅀇晏皇甫謚號􅀇晏先生曰十七年與從姑子果柳等擊壤于路逸士傳曰堯時有壤父五十人撃壤於康衢或有觀者曰大哉堯之爲君壤父作色曰吾日出而作日入而息鑿井而飲耕田而食帝何力於我哉風􅁟記曰擊壤者以木作之前廣後銳長可尺三四寸其形如履臘節僮少以爲戲分部如擿博也藝經曰擊壤古戲也又曰壤以木爲之前廣後銳長尺四闊三寸其形如履將戲先側一壤於地遥於三四十歩以手中壤敲之中者爲上呉盛彦翁子擊壤賦曰論衆戯之爲樂獨擊壤之可娯因風託勢罪一殺兩角抵左傳曰晉侯夢與楚子􅅮搏手相􅅮楚子伏巳而盬其腦是以懼漢書曰武帝元封三年春作角觝戯應劭曰戰國之時稍增講之以爲戯樂用相誇亦至秦更名角抵者也武帝大復增廣之至元帝元􅀄五年罷三百里内皆觀王隱晉書曰潁川襄城二郡班宣相會累欲作樂襄城太守責功曹劉子篤曰卿郡人不如潁川人相撲篤曰相撲下􅇊不足以別兩國優劣請使二郡更對論經國大理人物得失唐書曰裴矩帝幸東都矩以蠻夷朝貢者多諷帝大徵四方竒技作魚龍㬅延角抵於洛邑以誇諸戎秋月而罷西京􅄂記曰三輔人俗用以赤刀爲戲漢朝亦取以爲角抵之戲焉漢武故事曰未央庭中設角抵戲角者六國所造也􅁗并天下兼而増廣之漢興雖罷然猶不都絶至上復採用之并四夷之樂􅄂以竒幻有􅀂􅀑神角抵者使角力相抵觸也彈廣雅曰彈行丸也左傳曰晉靈公臺上彈人觀其避丸者魏書曰齊王芳爲帝常喜以彈彈人齊書曰桓榮祖善彈登西樓見翔鵠謂左右曰當生取之乃彈其兩翅毛脫盡墮地無傷飬之毛生後飛去其妙如此隋書曰長孫晟洛陽人也有鳶羣飛上謂晟曰公善彈爲我取之十發俱中並應丸而落呉越春秋曰陳音百對越王曰弩生於弓弓生於彈彈生於古之孝子古者人死投之中野孝子不忍父母爲禽獸所食則作彈以守之故古人歌之曰斷竹屬木飛􅁟逐肉西京􅄂記曰韓嫣好彈常以金爲丸一日所失者十餘長安爲之語曰苦飢寒逐金丸京師兒童毎聞嫣出彈輙隨之望丸之所落而輙拾取莊子曰以隋侯珠彈千仞之雀必􅀏所用至重所取至輕又曰見􅆑而求時夜見彈而思鴞肉丗說曰潘岳少時挾彈洛陽道婦人見之無不連手縈之談藪曰齊蕭遥欣爲童子時見一小兒左右彈飛禽未有不應􅁌而落者遥欣謂之曰凡戲多端何急彈此鳥自雲中髙翔何􅀜人事小兒感之終身不捉時少年士庶競爲此戯欣之一說此戯遂廢之又曰梁王謂惠子曰先生直言無得引喻惠子曰今有人不識彈問彈􅃺如何荅曰彈狀如彈則能了否王曰不了又曰彈狀如弓以竹爲􅁌可知之乎王曰知矣惠子曰夫說者欲人知之無諭則不知也王曰善顧子義訓曰人有善於射而髙於顧子顧子曰子之射雖百中猶不􅀂我之一彈或曰何以爲然顧子曰子之所射老狸之皮耳我之所彈彈狐之心濳夫論曰懷丸挾彈携手遨遊外不足防宼盗内不足禁鼷䑕四維晉李秀四維賦序曰四維戯者衛尉贄侯所造也􅀞紙爲局截木爲棊取無一分而爲二准隂陽之位擬剛柔之棊而變動無爲生乎其中象戲周武帝造象戲王襃爲象經序曰一曰天文以觀其象天日月星辰是也二曰地理以法其形地水火木金土是也三曰隂陽以順其本陽數爲先本於天隂數爲先本於地是也四曰時以政其序東方之色青其餘三色例亦如之是也五曰筭數以通其變俯仰則爲天地日月星變通則爲水火金木土是也六曰律吕以宣其氣在子取未在午取􅐫是也七曰八卦以定其位至震取兊至离取坎是也八曰忠孝以惇其敎出則盡忠入則盡孝是也九曰君臣以事其禮不可以貴凌賤直而爲曲不可以卑畏尊隱而無犯是也十曰文武以率其務武修七德文表四敎是也十一曰禮像以制其居上不驕爲下盡敬進退有度可法是也十二曰以考其行定而後求求而後取時然後言樂然後􅀏是也或外遷以報言義存遷善或黜退以貶過事在懲惡或以沈審爲貴正其瞻視或以徇齊爲功明其糺察得失表於隆替在賤必申怠敬彰於觀沮處尊思屈片善崇於拱璧一言踰於華衮夾食藝經曰夾食者二人黄黒各十七其撗列於前第四道上甲乙迭推二棊夾一爲食棊不得食兩不得邊食不由道則不行碁入夾不取食一棊爲籌賭多少隨人所制悁於􅀇反悶藝經曰悁悶者先布本位以十二時相從文曰同有文章虎不如龍豕者何爲來入莬宫王孫晝卜乃造黄鍾大往就馬非􅀋相從羊奔蛇穴牛入鷄籠射數纂文曰詭億一曰射數梁兾別傳曰兾好意錢􅉫子藝經曰子之多少人之明數隨戲者制始十子爭先以落多爲不妙抃漢書曰甘延壽字君况以良家子善􅀐射試抃爲期門以材力愛幸又曰哀帝時覽抃射武戯孟康注曰手搏爲抃角力爲武左思呉都賦曰抃壷搏擲塼續搜神記曰夏侯綜爲􅁃安西叅軍說常見􅀑乗車􅀐馬滿道與人無異常與人載行忽牽人語指道上一小兒云此兒正􅈛大病湏􅁷此兒果病殆死其母聞之請綜綜云無他汝兒向於道中擲塗塗蓋塼也誤中一􅀑脚􅀑瞋故病汝兒耳但以酒飯貽􅀑即差母如言兒即愈藝經曰以塼二枚長七寸相去三十歩立爲摽各以塼一枚方圎一尺擲之主人持籌隨多少甲先擲破則得乙籌後破則奪先破者太平御覽卷第七百五十五
