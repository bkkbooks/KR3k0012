front:
  text: 太平御覽卷第六百七十六
  hash: sha256:4bb28e5b5e1c87993a37bbdbaf88414bbf3202ab27fb84c55d4e626e783b76d0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_676-1a}
body:
  text: 道部十八簡章玉帝七聖玄記曰七聖定簡五帝記名登眞隱訣曰小有天王太素清虚眞人登白空山詣紫虗太眞三元君受流金火鈴豁落七元八景飛晨䇿玉璽又曰太一有玉璽金丹虎符玉清隱書曰有太上飛行九晨玉􅀴金簡内文又曰玉璽鳯函金眞玉光紫文單章在其内九幽經曰帝尊在三元宫中惣校圗籙又曰善功注名黄籙金格王簡陳列三清四極明科經曰􅀂有玄名帝圗紫簡緑字千年得傳也又曰五老寳經青緑爲字以書其章又八素眞經太上之隱書也八色采筆金闕帝君自書之爲致貞之法以付太虚眞人南岳赤松子使下授學道􅀫有眞金玉字刻在金閣當爲眞人者不得越傳地仙又五符經一道通書以南和丹繒封以金英之凾印以玄都之章付震水洞室之君又靈寳眞一自然經衆眞佩此経者以黄錦爲地丹金書之永谷道眞享之無期也元始􅀃經中所言並是諸天上帝内名隱韻之音非丗之常辭也又曰雌一玉檢五寳經祕在九天之上大有之宫太玄靈寳臺玉房之中紫金爲素以撰其文青緑爲字以書其章又曰有妙經刻玉爲簡傳於天帝君太上八素眞經曰司命著藉玉簡丹書編以金縷􅆞以青絲千億万年無所復疑又曰太上吉日即以三元之章又印以太玄之章又印以髙皇之章又印以中黄之章又曰西華宫有琅簡蘂書也又曰太上以白玉爲簡丹玉書亦用青碧玄玉黄金爲之八素經曰八素眞經玄文生於太空之内見於西􅀛之山玄圃之上積石之隂髙玄羽章衆眞宴禮稱慶上清上清經曰三天玉童帶朱精禁天之章髙玉皇佩丹皇玉章又曰紫映九霄眞玉佩金鳯璽又曰太素三元君有雲瓊之板九變虎書又曰髙靈九帝帶元光紫綬流精飛瓊之章又曰三天玉童帶九天之章又曰髙上虚皇君佩丹皇玉章又曰玉眞九天丈人佩九元通眞之䇿又曰紫靈皇上元皇佩封靈召眞玉䇿帶流光鳯章又曰上皇玉虚君佩丹文紫綬又曰三元大明上皇君帶神虎紫章又曰皇上万始先生佩金虎鳯文帶丹皇紫章又曰皇上帝君帶神虎玉章又曰上極紫皇君佩六山玉帶神精交虵之章綬太霄琅書曰太微天帝君以紫簡結紫度經篇目也又曰有帝章之印又曰瓊文帝章當刻書􅀥心之木受於絶巖之中又曰太霄琅書乃九天飛霄之典瓊文帝章乃上文也並以元始生於自然空洞之中靈皇玉帝受於九玄鑄金爲簡刻玉結篇金鏤玉字以明寳文祕於九天之上洞神經曰有三都印三皇印九天印鉅天下又曰有三皇玉劵一名金契又曰受三皇法湏玉簡長一尺二寸廣一寸厚三分無者槿桐准也又曰通謁三皇之簡以青玉作之赤金爲字金根經曰金簡玉札出自大上靈都之宫書以朱文編以朱繩又曰有神華玉門眞人投金簡之處又曰領仙玉郞賫金簡紫籍來於東華青宫校定玉名又曰玉皇刻降丹精玉芝金璽鳯章也玉寳青宫之内有金章鳯璽又曰青宮北殿上有金章鳯璽眞人得之又曰青宫之内北殿上有仙格金架也格上有學仙簿籙及玄名年月􅀷淺金簡玉札有十萬篇領仙王郎之典也又曰青宫無金簡之籙玉格無玄編之名神經亦不可得披大洞玉經曰讀玄一洞經者神臺刋名於福連之簡太上金簡玉札名爲福連之書也又曰眞陽者上清之宫名福連之簡刋其内五符經曰眞一食五牙天文西母刻以黄金之札封以丹芝光草印以太上中章茅君内傳曰茅盈在􅁪山内夢太玄玉女把玉札携之又曰天上道君有玉輿鳯璽又曰太元眞人有一人帶録章囊又一人帶繡章囊一人帶錦囊書金眞玉光經曰有昭靈之章保生玉章又曰此經髙妙衆經之尊緫御萬眞匡御羣仙玄符流映洞明紫晨祕於九天之宫鑄金爲簡以撰靈文刻玉丹書八明其篇也又靈寳自然經曰太上諸仙眞以黄金爲簡丹玉書之又太眞科以玉牒金書七寳爲簡玉帝七聖玄紀曰刻以白銀之簡結以飛青之文又曰廣靈之堂廻天九霄白簡青籙刻其内太眞科曰丹簡者以朱漆簡明火立陽也墨籙者以墨書文明水主隂人學長生故名丹簡墨籙祕不安傳又曰天皇執飛仙玉䇿人皇執上皇保命王䇿地皇執元皇定籙之䇿三華寳曜内眞上經曰太帝靈都宫中有二十四万上眞仙人皆鑄金爲簡白銀結編紫華書文誦詠此篇三天正法曰三天九微玄都大眞靈籙者祕在太上靈都之宫刻以紫玉爲簡黄金爲文付五老上眞仙都左公封以紫蘂玉芨盛以雲錦之囊南岳夫人内傳曰白簡素籙以白玉爲簡以青玉爲字故謂之白簡青籙皆記得道之人名姓道學傳曰金簡有王元規之筆迹太上素經曰凢受太上黄素經者􅀓盟用玉札一枚長一尺五分廣一寸四分又云有三元秀簡眞誥曰清虚眞人詣三元君受玉璽金眞􅀛山元籙曰丹文紫章神虎玉章七元交光之章流金紫章太上命神之章夜光寳章九色離羅之章靈書紫文經曰靈書紫文上經刻以紫玉爲簡青金爲文黄籙簡文經曰投金龍一枚丹書玉札青絲􅆞之以􅀜靈五帝昇度之信封於絶巖之中一依舊法又曰丹書玉札一枚金龍一以青絲繫石沉三河以􅀜水帝昇度之信一依玉訣舊文太洞玉經曰太上經簡玉札名爲福連之書又曰太上書以彤玉之札則玉映之堂可見四明之門可入也後聖道君列紀曰刻以紫玉爲簡青金爲文􅀛母按筆眞童拂筵玉童結編名之曰靈書龍飛尺素隠訣曰太微天帝君命羽仙侍郎奉金按以請飛行羽章太一洞眞玄經曰白元司命五人朱衣綘巾各捧一白玉案上有所主簡紫度炎光經曰􅀛母捧筆太一拂筵天妃侍香玉筆結綸以白玉爲簡金書保仙上符仙都也左公封以玉笈雲錦之囊變化經曰金光立空之案雲錦之囊封九赤班符於玄元之中南極長生司命君得之玉佩金璫上經曰九老仙都捧金精立空之案上請寳文以授衆眞空洞靈章經曰白簡度品青籙定仙太元上上經曰非有瓊籙玉名刻簡三清者不得金虎内符靈書經曰東方九氣天中靈寳度命品章出自元始東華青童君封之青玉寳凾之中印以元始九氣之章神仙中經曰老子度􅀜時爲尹喜著五千言解五十五章是手所書也能行此道知元氣父母天地之先不知此者徒自苦耳太微天帝君以紫簡注紫度炎光經篇目金簡書其正文玄章在焉玉皇譜籙曰髙上衆眞結自然之章金玄羽章經曰玉清八景隱書金玄内文生於元始之先即天之書也以威百神諸天内音經曰天有飛玄自然之氣合和五音以成天中無量洞章赤書玉訣上曰無始靈寳告水帝削除罪簡上聞九天金龍驛傳在朱書銀木簡以投三河之淵􅀄用金鈕九􅀟連簡沉之於清泠之泉埋本命之岳三官九府書人功過其理甚明隱元内文經曰青童君延万帝於曲宇講寳訣之妙章洞眞經曰六層玉臺在九天圗之上臺上有金簡玉扎及紫鳯丹章十万篇太上眞文玉郎典之玉光八景經曰玉寳臺太空之章封其内飛行羽經曰上皇九轉之道絳簡紫書祕於紫天元臺二十四生圗曰披九光玉藴出金書紫字玉文丹章三部八景二十四生圗置白玉案上靈寳隠書曰玉誕者曇誓天十都名也上有大洞之章紫書玉字煥乎上清玉京山齋曰諸髙仙眞人人㑹太上玄都披空洞歌章靈書經曰東方九氣天中靈書度命品章出自天元始東華青宫青童君封之青玉寳亟之中印以元始九氣之章又南方三氣丹天靈書度命玉章出自元始朱陵上宫南極上元君封之赤玉寳凾之中印以太丹三氣之章又西方七氣天中靈書度命玉章出自元始西華宫中金母封之白玉寳凾之中印以太素七氣之章又云北方五氣天靈書度命玉章出自元始北上宫中玉晨君封之玄玉變之中印以太玄五氣之章三元布經曰髙上三元經者乃三清眞書也上眞玉撿飛空之篇上元檢天大籙中元撿仙眞書下元撿地玉文如是寳篇髙上皆刻金丹書盛以自然雲錦囊封以三元寳神之章藏於九天之上大有之宫金臺玉室九曲丹房靈寳赤書曰元始命太眞按筆玉妃拂筵鑄金爲簡刻書玉篇五老賞籙祕於九天靈都之宫迴天九霄經曰於是大一拂筵天妃持香玉華執巾丹書紫字刻於白金隠起靈顔結於玉篇題以青籙得道之名龍景九文紫鳯赤書經曰太上命太極眞人授以玉簡金書寳洞飛霄絶玄之章玉帝玄記曰中皇元年九月七日七聖齋靈清長宫記其得道之篇刻以白銀之簡藏於雲錦之囊封以啓命之章付以五老仙都左公掌籙瓊宫又曰古空洞之中有廻天上文四司所保五帝所詮七聖定簡舉形合先大有經曰太上玉章刻玉爲簡惣御万眞眞經曰東方歳星青帝勾芒佩通明之印南方熒惑赤帝太昊佩太陽之印西方太白白帝少昊佩通隂之印北方辰星黒帝顓頊佩通神之印中央鎭星大帝文昌佩方神之印夲際經曰有十二法印紫書金根經曰有青精玉璽金房上經曰大帝靈神都宫中有金房度命延年之訣鑄金爲簡刻白銀之編紫筆書文消魔經曰發九天之朱匱望上清之瓊扎玄書旣刻於玉章絳名始刋於靈闕大洞眞經曰八景玉籙藏於太素瑶臺玄雲羽室封以欝森之笈玉清三元之章簡扎品曰青童君曰無金簡者銀木亦可當也無玉扎者桐木亦可當但令精好也眞理無有闇節當取扎於雲錦之囊此上眞之至號玉帝之靈篇也上清九眞中經内訣有玄靈元君寳祕奔日月之玉章神州七變經曰大隂玉晨九天眞妃紫晨君受流精飛景寳章太清中經曰有天一八極璽􅀛山元籙曰有流金鳯璽又曰天皇太帝遣繡衣使者冷廣子期授茅盈以神璽玉章金闕聖君命太極眞人使正一上玄玉郎王忠鮑兵等與茅盈佩璽太上飛行羽經曰太眞丈人衣九色飛雲曜光羽章靈飛六甲經曰玉眞青君帶流金鳯章太上九赤班符五帝内眞經曰封靈制魔之章黄神中皇之章三皇經曰三皇自然之文皆以金玉爲用天皇所授玄玉爲簡青玉爲文地皇所授黄玉爲簡白玉爲文綴以金鈎聮以金鏁置以玉案覆以珠巾寳蓋珎床安之青宫閉之紫閣芬以五香侍以十華也神州七轉七變經曰流金鳯璽紫宸上皇先生所佩三皇序目曰九天印文以召九天校事也上清變化經曰髙上虗皇君佩丹皇玉章又云三元大明上皇君帶神虎紫章又有皇上帝君佩金虎鳯文帶神虎玉章又曰九霄眞王佩金鳯璽歷藏經曰天王侯帶紫綬金印五岳眞圗曰太山君佩通陽大明之印衡山君佩夜光天眞之印嵩山君佩神宗陽和之印華山君佩開天通眞之印􅁪山君佩長津悟眞之印青城丈人佩三庭之印後聖列紀曰紫微上眞天帝玉清君遣八景瓊輿來迎聖君以登上清宫賜蘂剛丹玉鳯璽後聖九玄道君列紀曰太隂法有死生有黒籙白簿眞青丹編簡受生先後之相次也後聖道君列紀曰玉清君賜道君玉鳯璽飛行三界經曰下有太一紫綬金印威喜天帝信璽修靈寳飛行三界之道眞人所佩五稱符上經曰五星通靈之印印五星靈符道學傳曰呉王闔閭得眞文不解封以黄金之檢印以玉皇之章以問魯大夫孔子又曰禹封五符以金英之凾檢以玄都之印神仙傳曰衛叔卿語其子度丗云可於室西北桂下取我仙方按而服之令人長生度丗握得玉凾封以飛仙之印取按之服五色靈母仙去北帝經曰鄷都祕印用救丗間攝制􅀑神集仙籙曰杜蘭香女仙也於洞庭包山降張碩家碩蓋修道者也授以飛化之道留玉簡玉唾盂又賫黄麟羽帔此上仙之所服非洞天之所有也太平御覽卷第六百七十六
