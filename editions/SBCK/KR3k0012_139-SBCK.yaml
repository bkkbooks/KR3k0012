body:
  text: 後魏叙后事魏神元竇皇后文封皇后桓維皇后平文王皇后昭成慕容皇后獻明賀皇后道武慕容皇后道武劉皇后明元姚皇后明元杜皇后太武赫連皇后太武賀皇后景穆閭皇后文成馮皇后文成李皇后獻文李皇后孝文林皇后孝文廢皇后馮氏孝文馮皇后孝文髙皇后叙后事後魏書魏故事將立皇后必令手鑄金人以成者爲􅁻不成則不得立也又丗祖髙宗縁報母劬勞之恩極尊崇之義雖事乖典禮而觀過知仁魏神元竇皇后後魏書曰神元竇皇后没鹿回部大人賔之女賔臨終誡其二子速侯回題令其善事帝及賔卒速侯等欲因帝㑹喪爲變語頗漏泄帝聞之知其終不奉順乃先圖之於是使勇士於中營晨起以佩刀殺后馳使告速侯等言曰后􅁀崩速侯等驚走赴因執而殺之文封皇后後魏書曰文帝皇后封氏生桓穆二帝後早崩桓帝立乃葬髙宗􅀄穿天淵池獲一石銘稱桓帝葬母氏逺近赴㑹二十餘萬人有司以聞命藏之太廟次妃蘭氏生二子長子曰藍早卒次子思帝也桓維皇后後魏書曰桓帝后維氏生三子長曰普根次惠帝次煬帝平文崩后攝國事時人謂之曰女國后性猛忌平文之崩后所爲也平文王皇后後魏書曰平文皇后王氏廣寗人平十三因事入宫得幸於平文生昭成平文崩昭成在襁褓時國有内難將害諸皇子后匿帝於袴中懼人知祝曰􅀂天祚未終者汝便無聲遂良乆不啼得免於難烈帝之崩國祚殆危興復大業后之力也十八年崩葬雲中金陵太祖即位配饗太廟昭成慕容皇后後魏書曰昭成皇后慕容氏慕容天眞之女也有寵生獻明帝及秦明王后性聦敏多智沉厚善決斷專理内每事多從建國二十三年崩太祖即位配饗太廟獻明賀皇后後魏書曰獻明皇后賀氏父野干東部大人后少以容儀選入東宫生太祖符洛之内侮也后與太祖及故臣民避難北徙俄而髙車奄來抄掠后乗車與太祖避賊而南輅失轄后懼仰天告曰國家㣧胄豈正爾絶滅也唯神靈扶􅂇遂馳輪正不傾而免難其後劉顯使人將害太祖帝姑爲顯弟亢埿妻知之宻以告后后乃令太祖去之后夜飲顯使醉之向晨故驚廐中羣馬使起視馬后泣而謂曰吾諸子始皆在此今盡亡失汝等誰殺之也故顯不使急追太祖至賀蘭部顯怒將害后后夜奔亢埿家匿神車中三日元埿舉室請救乃得免㑹劉顯部亂始得亡去皇始元年崩時年四十六祔葬于盛樂金陵追尊謚配饗焉道武慕容皇后後魏書曰道武皇后慕容寳之季女也中山平後入充掖庭得幸左丞相衛王儀等奏請立后帝從羣臣議后鑄金人成乃立之告於郊廟封后母孟爲溧陽君後崩道武劉皇后後魏書曰道武宣穆皇后劉眷女也登國􅀄納爲夫人生華隂公主後生明元后專理内事寵待有加鑄金人不成故不得登后位魏故事後宫産子將爲儲貳其母皆賜死太祖末年后以舊法薨太宗即位追尊謚號配饗太祖自此後宫子爲帝母加正位配饗焉明元姚皇后後魏書曰明元昭哀皇后姚興女也興封西平長公主太宗以后禮納之後爲夫人后以鑄金人不成未昇尊位然帝寵幸之出入居處如后焉是後猶欲正位而后謙讓不當五年薨帝追恨之贈皇后璽綬而加謚葬雲中金陵明元杜皇后後魏書曰明元密皇后杜氏魏郡鄴人陽平王超之妹也􅀄以良家子選入太子宫有寵生丗祖太宗即位拜爲貴嬪太常五年薨謚宻貴嬪葬雲中金陵丗祖即位追尊號謚配饗太廟又立后廟于鄴刺史四時薦祀後甘露降於后廟庭髙祖時相州刺史髙閎表修后廟詔婦人外成理無獨祀隂必配陽以成天地未聞有莘之國立太姒之饗使罷祀先是丗祖保母竇氏􅀄以夫家坐事誅與二女俱入宫操行純備進退以禮太宗命爲丗祖母性仁慈勤撫導丗祖感其恩訓奉養不異所生及即位尊爲保太后後尊爲皇太后眞君元年崩時年六十三謚曰惠葬崞音郭山從后意也􅀄后嘗謂左右曰吾於先朝夲無位次不可違禮以從園陵北山之上可以終託故葬焉别立后寢廟於崞山建碑頌德太武赫連皇后後魏書曰太武皇后赫連氏屈萬女也丗祖平統萬納后及二妹俱爲貴人後立爲皇后髙宗􅀄崩祔葬金陵太武賀皇后後魏書曰太武敬皇后賀氏代人也初爲夫人生恭宗神䴥音加元年薨追贈貴嬪葬雲中金陵後追加號謚配饗太廟景穆閭皇后後魏書曰景穆恭皇后郁乆閭氏河東王毗妹也少選以入東宫有寵眞君元年生髙宗丗祖末年薨髙宗即位追尊號謚葬於雲中金陵是時髙宗乳母常氏夲遼西人太延中以事入宫丗祖選乳髙宗慈和履順有劬勞保護之功髙宗即位爲保太后尋尊爲皇太后謁於郊廟和平元年崩謚曰昭葬於廣􅇞磨笄山俗謂之鳴雞山太后遺志也文成馮皇后後魏書曰文成文明皇后馮氏父㓪秦雍二州刺史西郡公母樂浪王氏生后於長安有神光之異㓪㘴事誅后遂入宫丗祖昭儀后之姑也雅有母德撫飬教訓年十四髙宗踐極以選爲貴人後立爲皇后髙宗崩故事國有大䘮三日之後御服器物一以燒焚百官及中宫號泣而臨之后悲呌自投火中左右救之良乆乃􅂫顯祖即位尊后爲皇太后丞相乙渾謀逆顯祖年十三居于諒闇太后宻定大䇿誅渾遂臨朝聽政及髙祖生太后躬親撫養是後罷令不聽政事太后行不正内寵李弈顯祖因事誅之太后不得意顯祖􅁀崩時言太后爲之也承明元年尊號曰太皇太后復臨朝聽政太后性聦逹自入宫掖粗學書計及登尊極省决萬機髙祖詔曰朕以虚寡㓜纂寳曆仰恃慈明緝寧四海欲報之德正覺是慿諸鷙音至傷生之􅀋宜放山林其以此地爲太皇太后經始靈塔是時罵鷹師曹以其地爲報德佛寺太后與髙祖遊于方山顧瞻川阜有終焉之志因謂羣臣曰舜葬蒼梧二妃不從豈必逺祔山陵然後爲貴哉吾百年之後神其安此髙祖乃詔有司營建壽陵於方山又起永固石室將終爲清廟焉刋石立碑頌太后功德太后以髙祖富於春秋乃作勸戒歌三百餘章又作皇誥十八篇太后又制内屬五廟之孫外戚夲親緦麻皆受復除素儉性不好華飾躬御縵繒而太后多智略猜忌能行大事是以威福兼作震動内外故王遇張祐符丞祖等拔自微閹􅀊中而至王公王叡出入卧内數年之間便爲宰輔賞賚財帛以千萬億計金書鐵劵許以不死之誓李冲雖以器能受任亦由見寵帷幄宻加賜賚不可勝數太后曽與髙祖幸靈泉池醼羣臣及蕃國使人諸方渠帥各令爲其方舞髙祖率羣臣上壽於太后忻然自歌髙祖亦和歌遂命羣官各言其志於是和歌者九十人太后外禮民望元丕游明根等頒賜金帛輿馬每至褒羙叡等皆引丕等而參之以示無􅀻也十四年崩於太和殿年四十九其日有雌雉集于太華殿髙祖酌飲不入口五日毀慕過禮謚曰文明太皇太后葬於永固陵髙祖毁瘠絶酒肉不肉御者三年初髙祖孝於太后乃於永固陵東北里餘營壽宫有終焉瞻望之志及遷洛陽乃自表􅈆西以爲山園之所而方山靈宫石室至今猶存號曰千年堂文成李皇后後魏書曰文成皇后李氏梁國蒙縣人也頓丘王峻之妹也后之生也有異於常父方叔恒云此女當大貴及長姿質美麗丗祖南征永昌王仁出壽春軍至后宅内得后及仁鎭長安遇事誅后與其家人送平城宮髙祖登白樓望見之謂左右曰此婦人佳乎左右咸曰然乃下臺后得􅄑於齋庫中遂有娠常侍太后後問后后云爲帝所幸仍有娠時守庫者亦􅀻書壁記之别加驗問皆相符同生顯祖拜貴人薨後謚曰元皇后葬金陵配饗太廟獻文李皇后後魏書曰獻文思皇后李氏中山安壽人南郡王惠之女也姿德婉淑年十八選入東宫顯祖即位爲夫人生髙祖皇興三年薨上下莫不悼惜葬金陵承明元年追崇號謚配饗大廟孝文林皇后後魏書曰孝文貞皇后林氏平涼人叔父金閭起自閹官有寵於帝太后位至尚書射平涼公金閭兄勝爲平涼太守金閭顯祖􅀄爲定州刺史未㡬爲乙渾所誅兄弟皆死勝無子有二女入掖庭后容色美麗得幸於髙祖生皇子恂音荀將爲儲貳太和七年后依舊制薨謚曰貞皇后葬金陵及恂以罪賜死有司奏廢后爲庶人孝文廢皇后後魏書曰孝文廢后馮氏太師熈之女太和十七年立爲后髙祖遵經典禮后及夫人嬪巳下接御皆以次進車駕南伐后留京師髙祖又南伐后率六宫遷洛陽及后父熈兄誕薨髙祖爲書慰以叙哀情及車駕還洛恩遇甚厚髙祖後重引后姉昭儀至洛稍有寵后禮愛漸衰昭儀自以年長且前入宫掖素見待念輕后而不率妾禮后雖性不妬忌時有愧恨之色昭儀規爲内主讃搆百端尋詔廢爲庶人后貞謹有德操遂爲練行尼孝文馮皇后後魏書曰孝文幽皇后亦馮熈女也母曰常氏本微賤得幸於熈元妃公主薨後遂主家事生后與北平公夙文明太皇太后欲家丗貴寵乃簡熈二女俱入掖庭時年十四其一早卒后有姿媚見愛幸未幾疾病文明太后乃遣還家爲尼髙祖猶留念焉歳餘而文明太后崩髙祖服終後頗存訪之又聞后素疾痊除遺璽書勞問遂迎赴洛陽及至寵愛過夲專寢當夕宫人稀復進見拜爲左昭儀後立爲皇后後髙祖頻歳南征后遂與閹官髙菩薩􅀻亂及髙祖在汝南不豫后便公然醜恣中常侍􅀟蒙等爲其心腹中常侍劇鵬諫而不從憤懼致死是時彭城公主宋王劉昶子婦也年少􅁵居北平公馮夙后之同母弟后求㛰於髙祖髙祖許之而公主志所不願后欲強㛰之有日矣公主宻與侍婢及家僮十餘人乗輕車冒霖雨赴懸瓠奉見髙祖自陳夲意因言后與菩薩亂狀髙祖聞因駭愕未之全信而袐匿之惟彭城王侍疾左右乃具言其事此後后漸憂懼與母常氏求託女巫禱厭無所不至願髙祖疾不起一旦得如文明太后輔少主稱令者許賞報不貲音髭乃取三牲宫中妖祠假言祈福專爲左道髙祖自豫州北幸鄴后慮還見治撿彌懷危怖驟令閹人託參起居皆賜之衣服慇懃託􅀉勿使漏泄亦令􅀟蒙充行皆其信者也唯小黃門􅂫興壽宻陳委曲髙祖問其本末勑以勿泄至洛執問菩薩􅀟蒙六人迭相證舉具得情狀髙祖卧含温室夜引后并列菩薩等於户外后臨入令閹人搜衣中稱有寸刄便斬后頓首泣謝乃賜坐東楹去御筵二丈餘髙祖令菩薩等陳狀讓后曰汝母妖術可具言之后乞屏左右有所宻啓髙祖勑中侍悉出唯令長秋卿白整在側后猶不言髙祖乃令以綿堅塞整耳小語呼整再三無所應乃命后言事隱人莫知之髙祖乃呼彭城北海二王令入㘴言昔是爾㛐今乃他人俱入勿避二王固辭不獲命及入髙祖云此老嫗乃欲白刄摇我肋汝可窮問夲末白有所難髙祖􅀷自引過致愧二王又云馮家女不能復相廢逐且使在宫中空坐有心乃能自死汝等勿謂吾猶有情也髙祖素至孝猶以文明太后故未便行廢良乆二王出乃賜后辭決再拜稽首泣涕欷歔令宿東房髙祖疾甚謂彭城王勰曰後宫乆乖陰政自絶于天􅀂不早爲之所恐成漢末故事吾死之後可賜自盡别宫可葬以后禮庶掩馮門之大過髙祖崩北海王祥奉宣遺旨長秋卿白整等入授后藥后走呼不肯引決執持強之乃含椒而盡殯以后禮謚曰幽后葬長陵營内孝文髙皇后後魏書曰孝文昭皇后髙氏司徒公肇妺也父颺母蓋氏凡四男三女皆生於東裔髙祖􅀄乃舉室西歸逹龍城鎭表后德色婉艷任充宫掖及至文明太后親幸北部見后姿貌竒之遂入掖庭年十三初后之㓜也曾夢在堂内立而日光自䆫中照之灼灼而􅀬后東西避之光猶斜照不已如是數夕后自怪之以白其父颺颺以問遼東人閔宗曰此竒徴也貴不可言颺曰何以知之宗曰夫日者君之德帝王之象也光照女身將被帝命誕育人君之象遂生丗宗後生廣平王懷次長樂公主及馮昭儀寵盛宻有母養丗宗之意后自代如洛陽􅁀薨於汲郡之共縣或云昭儀遣人賊后也丗祖之爲皇太子三日一朝幽后后遂撫念慈愛有加親視櫛沐母道隆備其後有司奏請加謚曰貴人髙祖從之丗宗踐􅍈追尊配饗肅宗詔曰文昭皇太后德恊坤儀美符大姒作合髙祖實誕英聖而夙丗淪暉孤􅉷弗祔先帝孝感自衷遷奉未遂永言哀恨義結幽明廢吕尊薄禮申漢代又詔曰文帝昭皇太后尊配髙祖廟定號促令遷奉自然及始太后當主可更上尊號稱太皇太后初開終寧陵數丈於梓宫上獲大蛇長丈餘黒色頭
