body:
  text: 樂部二十皷柷敔筍簴皷風俗通曰皷不知誰所造皷者郭也春分之音萬物皆郭皮甲而出故謂之皷爾雅曰大皷謂之鼖小者謂之應大鼗謂之麻小者謂之料徒擊皷謂之咢郭璞注曰詩云或歌或咢鼖長八尺應在大皷側也周易通卦驗曰冬至皷用馬革圎徑八尺一寸夏至皷用牛皮圎徑五尺七寸尚書曰周成王崩鼖皷在西方長八尺尚書益稷曰下管鞀皷禮記曰廟堂之上罍樽在阼犧樽在西廟堂之下懸皷在西應皷在東又曰懸皷周皷也其小者曰㣧先擊小皷爲大皷導引故曰㣧一名鞞又曰春官小師掌教皷朦播鞀眡瞭播鞀又曰王執路侯執鼖將軍執晉皷師帥執提旅師執􅎏又曰夏后尺皷殷人置皷置植也亦作樹周人皷懸又曰籥章氏掌出土皷杜子春曰以毛土爲匡以革爲面可擊者也又曰除水蟲以炮􅁟之皷皷之以焚石投之狐蜮之属也又曰地官皷人掌教六皷四金之音聲以節聲樂以和軍旅以正田役音五聲合和者也教爲皷而辯其聲用教爲皷皷擊皷者大小之數又别其聲所用事以雷皷皷神祀雷皷八面皷神祀皷天神以靈皷皷社􅀕靈皷六面皷社􅀕及地祗以路皷皷􅀑享路皷四面皷􅀑享享宗廟以鼖皷皷軍事大皷謂之鼖長八尺鼖音扶云切以鼛皷皷役事鼛皷長丈二尺鼛音古刀切以晉皷皷金奏晉皷長六尺六寸者是也金奏謂樂作擊編鍾又冬官考工記韗人爲臯陶鄭司農曰臯陶皷木鄭玄謂鞠者以臯陶名官陶從革耳韗音况萬切又音運􅕦音陶長六尺有六寸左右端廣六寸中尺厚三寸板中廣頭挾爲穹崇鄭衆云皷木一判者其兩端廣六寸而中央廣尺如此乃得有腹矣穹者三之一鄭衆云穹讀爲志無穹耶之穹謂皷木腹穹崇者居皷面三之一玄讀如穹蒼之穹穹崇者居皷面三之一則其皷四尺者板一尺三寸三分寸之一倍之爲二尺六寸三分寸之二加皷四尺穹之徑六尺六寸三分寸之二此皷合二十板上三正鄭玄云謂兩頭一半中央一平鄭玄讀三當爲參正言直也參直者穹上一直兩端又直名居二尺二寸不􅀌曲也此數兩以六皷差之賈侍中云晉皷大而短近晉皷也以晉皷鼓金奏也皷長八尺皷四尺中圍加三之一謂之鼖皷中圍加三之一者加於面之圍以三分一也面四尺其圍十二尺加以三分一四又則中圍十六尺徑五尺三寸三分寸之一今皷亦合二十扳則板徴穹六寸三分寸之二爾雅云皷謂之鼖皷以鼖皷皷軍事鄭衆云皷四尺謂革所象者廣四尺也爲臯陶長尋有四尺皷四尺倨勾磬折以臯皷皷役事磬折中曲之不參正中圍與鼖皷同以磬折爲異也凢冐皷必以啓蟄之日啓蟄孟春之中蟄蟲始聞雷聲而動皷所以取象爲象皷以革者也良皷瑕如積環革調急也皷大而短則其聲疾而短聞音問下同小而長則其聲舒而逺聞禮記明堂位曰土皷蕢桴葦籥伊􅂄氏之樂也蕢當爲㓙伊􅂄古天子號令有􅂄氏也左傳成上曰師之耳目在吾旗皷又僖中曰三軍以利用也金皷以聲氣也又昭三曰分唐叔以宻湏之皷注宻湏國名也毛詩曰鄁風擊皷其鏜踊躍用兵又采􅉮曰方叔率止鉦人伐皷陳師鞫旅顯允方叔伐皷淵淵振旅闐闐又靈臺曰鼉皷蓬蓬矇瞍奏公又執競曰鍾皷喤喤磬筦將將又山有樞曰子有鍾皷不擊不考宛其死矣他人是保又有􅎩曰有􅎩有􅎩在周之廷設業設簴崇牙樹羽應田懸皷又曰猗歟歟置我鞉皷奏皷簡簡衎我烈祖又甫田曰琴瑟擊皷以御田祖又有駜曰振振鷺鷺于飛皷咽咽醉言歸又宛丘曰坎其擊皷宛丘之下論語曰季氏冨於周公而求也爲之聚歛而附益之子曰非吾徒也小子鳴皷而攻之可也漢書曰李陵擊匈奴夜擊皷起士皷不鳴陵曰吾士氣少衰而皷不起何􅁘軍中豈有女子乎捜軍中得卒妻皆斬之又曰元帝疾不親政事留好音樂或置􅎏殿下天子自軒檻上隤銅丸以撾皷聲中嚴皷之節後宫及左右習知音者莫能爲之後漢書曰王喬爲葉令每當朝鄴門下皷不擊自鳴聞於京昭帝取置其都亭無復有聲又曰祢衡字正平孔融雅愛其才數稱賞於曹操操欲見之衡不肯徃操懷忿而以其才不欲殺之聞衡善皷召爲皷吏因㑹賔客閱試音節諸吏過者皆令脫其故衣更着岑牟單絞之服次至衡方操撾踊躍而前吏呵之曰皷吏何不改服而輕進衡於是先解褒衣次釋餘服祼身而立徐取岑牟單絞而着之復操撾顔色不怍操􅀏曰夲欲辱衡衡反辱􅀌衡對曰不敢以先王之法服爲伶倫之衣沈約宋書曰蕭思話年十許歳好􅀐屋棟打細􅆎皷也南史曰孫挹爲延陵縣令國子助教髙爽詣之挹了無故人懷爽出從閤下過取筆書皷面云徒有此大腹了自無肝膓面皮如許厚􅀍打未遽央唐書曰張􅀇素太子承乾又甞於宫中擊皷聲聞於外玄素叩閤請見極言切諌承乾乃出宫内皷對玄素毀之唐書鄭餘慶兼判太常卿事􅀄德宗自山南還宫􅀜輔有懷光吐蕃之虞都下驚擾遂詔太常習樂去大皷至是餘慶始奏復用大皷丗夲曰王大將軍年少時舊有田舎之名語音亦楚武帝喚時賢共言􅇊藝之事人人皆有所能唯王都無所解意色殊惡自言解打皷帝即令取皷令擊之於坐振䄂而起揚槌奮擊音節諧捷傍􅀂無人舉坐歎其雄爽春秋孔演圖曰有人金豊擊玉皷駕六龍皷喻所行清嚴人服其威勢也古今注曰漢有黄門皷吹一名樓車帝王丗紀曰黄帝殺夔以其皮爲皷聲聞五百後􅁗記曰姚泓永和元年天水兾石皷鳴聞數百里野雉皆雊神異經曰八方之荒有石皷焉蒙之以皮其音如雷韓子曰楚厲王有驚皷與百姓爲戒飲酒過之而擊民大驚使人止之曰吾醉戯而擊之民皆罷居數月警而擊皷民不起也穆天子傳曰天子讀書于梨丘奏廣樂遺其靈皷虞喜志林曰建武二十四年南郡男子獻銅皷有銘五經要義曰皷所以檢樂爲群音之長也異苑曰晉武帝時呉郡臨平岸崩出一石皷打之無聲問張華華曰可取蜀人桐材刻作魚形扣之則鳴矣於是如其言聲聞數十里劉道民詩云亦有逺而合蜀桐鳴呉石郭縁生述征記曰逢山在廣固南三十里有祠并石人石皷齊世將亂石人輙打皷聞數十里羅浮山記曰浮山東石樓下有兩石皷扣之清越所謂神鉦也盛弘之荆州記曰始興郡陽山縣有豫章木夲徑可二丈名爲聖木􅁗時伐此木爲皷䫙䫙成忽有奔逸北至桂陽又王韶之始興記云息於臨武遂之洛陽因名聖皷城今在臨武臨海記曰郡西有白鵠山山上有石皷元嘉中居人志􅀕祀山神乃推此皷數十里聞如金石之響相傳云此云有鵠飛入㑹稽郡雷門皷中打皷聲洛陽聞之後逆賊孫恩斫破此皷見一白鵠飛出去通禮義纂曰建皷大皷也少昊氏作焉爲衆樂之節夏加四足謂之節皷啇人挂而貫之謂之􅄹皷周人縣而擊之謂之懸皷近代相承植而建之謂之建皷夲出於啇制也唐禮設於四隅劉瓛定軍禮曰皷吹未知其始也漢以雄朔野而有之矣鳴笳以和簫聲非八音也騷人曰鳴箎笳竽皷吹樓車也昔蕭史吹簫於􅁗􅁗人爲之築鳯臺故皷吹陸則樓車水則樓舡其在庭也則以虡爲樓或曰鷺皷精也昔呉夫差啓虵門以厭越越人雷爲門以禳之擊大皷於雷門之下而虵門聞焉其後移皷建康宮之端門有􅀟鷺呪皷而飛乎雲末或曰皆非也詩曰振振鷺鷺于飛皷咽咽醉言歸古之君子仕於伶官悲周道之爲榛傷頌之棳音故飾皷以鷺欲其流風好焉今有龍頭大抗中皷獨掲小皷隨品秩焉短簫鐃歌軍樂也帝歧伯所作以建武揚德風韶勸土地古今樂録曰鏄師掌金奏之皷謂主擊晉皷以奏其鍾鎛又卒長執鐃奴交切兩司馬執鐸公司馬執鐲音蜀又金鐃止皷以金鐸通皷以金鐲節皷以鍾皷者前擊鍾次擊皷也大周正樂曰劉貺曰皷動也冬至之音萬物含陽氣而動雷皷八面以祀天靈皷六面以祀地路皷四面以祀􅀑神夏后加之以足謂之足皷殷人貫之以柱謂之柱皷周人懸之謂之懸皷後世復殷制建之謂之建皷皷髙六尺六寸金奏則皷之傍有小皷謂之應皷以和大皷小皷有柄曰鞉揺以和皷大曰􅎏也􅆎皷大者瓦小者木皆廣首而纎腹齊皷如􅃮桶大一頭設齊於皷面如麝齊故曰齊皷又曰馬上之皷曰提皷有木可提執施於朝則登聞之皷敢諌之皷是也施於府寺曰朝皷在村墅曰枹皷抱一作桴調擊皷物也在邊徼曰警皷又曰銅皷鑄銅爲之虚其一面覆而擊其上南蠻扶南天笁􅀋皆如此嶺南豪家則有之大者廣尺餘又曰節皷如􅀶局中開圎孔適容其皷擊之以節樂也又曰毛貟皷似都曇而稍大又曰有鼉皷節皷不知誰所造又曰檐皷如小甕先冐以革而􅃮之又曰羯皷正如􅃮桶兩手俱擊以其出羯中故號羯皷亦謂兩杖皷板又曰正皷和皷一以正而一以和皆􅆎皷也又曰都曇皷似􅆎皷而小以小槌擊之又曰荅臘皷制廣於羯皷而皷以指揩之其聲甚震俗謂之揩皷又曰鷄婁皷正而貟首尾可擊之處平可數寸又曰方皷大暦元年司馬滔進廣平樂兼此皷以應黄鍾一均聲樂書曰雷鞉者周禮􅎩矇掌播鞉鞉如皷而小以木貫之作柄柄各四枚爲八面也旁以結皮爲耳揺之還自擊禮書云掌之人左手播鞉右手擊皷之是也柷敔釋名曰柷如物始見柷柷然也敔止也所以止樂尚書夔曰戞擊鳴球下管鼗皷合止柷敔孔安國曰戞擊柷敔也下管堂下樂也上下合心樂名有柷敔也禮記德音之音控掲天子賜諸侯樂則以柷將之樂記曰聖人作控掲壎箎則所起矣柷衆也立夏之音萬物衆形皆成也方面各二尺傍開貟孔内手於孔擊之以舉衆樂也爾雅曰所以皷柷謂之止所以皷敔謂之甄郭璞注曰柷如漆筩方二尺四寸深尺八寸中有椎柄連底折之令左右擊止者其椎名也敔如伏虎皆上有二十七鉏鋙刻以木長尺甄者其也樂汁圖曰乾主立冬隂陽終始故聖人承天以制柷刑法使死者不恨生者不怨宋均曰柷圉從中發聲人情死恨亦從中起爾雅曰敔謂之甄音真注云敔如伏虎背上二十七鉏鋙刻以木長尺櫟之甄其名也筍簴爾雅曰木謂之簴郭璞注曰懸磬之本曰簴方言几其髙者謂之簴郭璞注曰筍簴也釋名曰所以懸鍾皷者撗曰簨簨峻也在上髙峻也縱曰簴簴舉也在旁舉簨者也毛詩曰設業設簴崇牙樹羽周禮冬官梓人爲筍簴嬴者羽者鮮者以爲筍簴外骨内骨却行仄行紆行連行以脰鳴以翼鳴以爲雕􅅣厚唇弇口出目短耳大胷耀後者以爲鍾簴銳喙决吻小體騫腹者以爲磬簴小首而長􅅮身而鴻者以爲筍注曰爲鍾簴者有力而不走冝於任重也爲磬簴者其聲清楊冝逺聞也外骨􅀛内骨鼈却行螾仄行蟹紆行虵連行魚脰鳴鼃黽翼鳴發皇也螾蚰蜒皆以刻晝彞器􅅮庶物貴野聲禮明堂位曰夏后氏之龍簨簨殷之崇牙周之壁翣注云龍上刻􅀞爲重才又盡繒爲翣載之以壁臿五羽於其下也賈􅁩眞簴賦曰櫻攣拳以蟉虬􅀒大鍾而欲飛楚詞曰簫皷兮瑶簴􅀃苑曰􅁗始皇建千石之鍾立萬石之簴三輔舊事曰􅁗始皇歛天下銅䥫皆著咸陽鑄作銅簴髙廟簴二枚魏明帝徙詣洛陽尚在太平御覽卷第五百八十二
