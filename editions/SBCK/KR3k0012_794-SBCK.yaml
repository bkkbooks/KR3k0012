body:
  text: 西戎三羗無弋湟中月氏胡氏車師髙昌吐谷渾波斯羗無弋後漢書曰羗無弋爰劒者􅁗厲公時爲􅁗所拘執以爲奴􅀠不知爰劒何戎之別也後得亡歸而秦人追之急藏於巖穴中得免羗人云爰劒􅀄藏穴中􅁗人焚之有影象如虎爲其蔽火得以免死旣出又與劓女遇於野遂成夫婦女耻其狀􅀍髪覆面羗人曰以爲俗遂俱亡入三河間諸羗見爰劒􅀍焚不死恠其神共畏事之推以爲豪河湟間少五榖多禽獸以射獵爲事爰劒教之田畜遂見尊信廬落種人依之者日益衆羗人謂奴爲無弋爰劒嘗爲奴􅀠故因名之其後丗丗爲豪也又曰爰劒曽孫忍時􅁗獻公􅀄立欲復穆公之迹兵臨渭首滅狄䝠戎忍季父卬畏􅁗之威將其種人附落南出賜支河曲西數千里與衆羗絶逺不復交通其後子孫分別各自爲種任隨所之或爲􅁵牛種越嶲羗是也或爲白馬種廣漢羗是也或爲叅狼種武都羗是也忍及弟舞獨留湟中並娶妻忍生九子爲九種舞生十七子爲十七種羗之興盛從此起矣又曰忍子研立時􅁗孝公雄強威服羗戎孝公使太子駟率戎狄九十二國朝周顯王研豪徤故羗中號其後爲研種及􅁗始皇時務并六國以諸侯爲事兵不西行故種人得以繁息又曰武帝征伐四夷開地廣境北却匈奴西逐諸羗及渡河湟築令居塞􅀄開河西別置四郡酒泉武威張掖敦煌通道玉門隔絶羗胡使南北不得交􅀜於是鄣塞亭燧出長城外數千里又曰建武九年隗􅅝死司徒􅁺班彪上言今凉州部皆有降羗羗胡􅀍髮左袵而與漢人􅄂處習俗旣異言語不通數爲小吏􅀧民所見侵奪窮恚無􅂓故致反叛夫蠻夷㓂亂皆爲此也舊制益州部置蠻夷􅀐都尉幽州部置領烏桓校尉凉州部置護羗校尉皆持節領護理其怨結歳時廵行問所疾苦又數遣使驛通導動静使塞外羗夷爲吏耳目州郡因此可得警備今冝復如舊以明威防丗祖從之即以牛邯爲護羗校尉又曰燒何豪有婦人銅鉗者年百餘歳多智筭爲種人所信向皆從取計䇿焉又曰龐叅以失期軍敗抵罪以馬賢代領校尉事後遣任尚爲中郎將羽林緹􅀐五營子弟三千五百人代班雄屯三輔尚臨行虞詡說尚曰使君頻奉國命討逐㓂賊三州屯兵二十餘萬民棄農桑疲苦徭役而未有功効勞費日滋􅀂此出不克誠爲使君危之尚曰憂惶乆矣不知所如詡曰兵法弱不攻強走不逐飛自然之勢今虜皆馬􅀐日行數百里來如風雨去如絶絃以歩追之勢不相及所以曠而無功也爲使君計者莫如罷諸郡兵各令出錢數千二人共市一馬如此可捨甲胄馳􅁿兵以万􅀐之衆逐數千之衆追尾掩截其道自窮便民利事大功立矣尚大喜即上言用其計乃遣輕􅀐鈔擊杜季貢於丁奚城斬首四百餘級獲牛馬羊數千頭又曰順帝永建元年隴西種羗反叛校尉馬賢將七千餘人擊之戰於臨洮斬首千餘級餘皆率種人降進封賢都郷侯自是凉州無事至四年尚書僕射虞翊上䟽曰臣聞子孫以奉祖爲孝君上以安民爲明此髙宗周宣所以上配湯武也禹貢雍州之域厥田惟上且沃野千里榖稼充積又有􅀛兹塩池以爲民利上郡􅀛兹縣有塩官即雍州之域也水草豐羙土冝産牧牛馬衘尾羣羊塞道北阻山河乗阨據險因渠以漑水舂河漕水春即水碓也用功省而軍粮饒足故孝武皇帝及丗祖築朔方西河置上郡皆爲此也而建元無妄之災衆羗内潰郡縣兵荒二十餘年棄沃壤之饒損自然之財不可謂利離河山之阻守無險之處難以爲固今三郡未復園陵單外園陵謂長安諸園陵也單外謂无守固也而公卿選懦容頭過身張解設難但計所費不圖其安冝開聖德考從所長書奏帝乃復三郡使謁者郭璜督促徙者各歸舊縣結城郭置􅃸釋旣而激河浚渠爲屯田省内郡費歳一億計遂令安定北地上郡及隴西金城常儲穀粟令周數年又曰順帝永和四年以宋機爲并州刺史劉康爲凉州刺史並當之職大將軍梁商謂機等曰戎狄荒服蠻夷要服言其荒忽無常而統領之道亦無常法臨事制冝略依其俗今二君性素疾惡欲分白明黒孔子曰人而不仁疾之巳甚亂也况戎狄乎其務安羗胡防其大故忍其小過機等天性虐刻遂不能從到州之日多所擾發五年夏雜種羗等遂反叛攻金城與西塞及湟中􅄂種羌大㓂三輔殺害長吏機康並坐徴又曰自爰劒後子孫支分凡百五十種其九種在賜支河首巳西及在蜀漢徼北唯叅狼在武都其五十二種衰少不能自立分散爲附落或絶滅無後或引而逺去其八十九種唯燒當種㝡強勝兵十餘萬其餘大者萬餘人小者數千人更相鈔盗盛衰無常湟中月氏胡後漢書曰湟中月氏胡其先大月氏之別也舊在張掖酒泉地月氏爲匈奴冒頓所殺餘種分散西踰葱嶺其羸弱者南入山阻依諸羌居止遂與共婚姻及驃􅀐將軍霍去病破匈奴取西河地開湟中於是月氏來降與漢民錯居雖依附縣官而首䑕兩端其後漢兵戰􅋐隨勢強弱􅀍服飲食言語略與羌同亦以父名母姓爲種其大種有七莊子曰羗人死燔而􅀭其􅁅風俗通曰羗本西戎卑賤者也主牧羊故羗字從羊人因以爲號無君臣上下徤者爲豪不能相一種别群分彊者凌弱轉相抄盗男子戰死以爲吉病終者謂之凶范曄西域論曰張奐盛稱戎狄一氣所生不冝誅盡流血汙野傷和致妖是何言之迂乎羗雖外患實􅀷内疾苦攻之不根是飬痾於心腹也根謂盡其根本又曰昔先王壃理九土判別畿荒知蠻貊殊性難以道御故斥逺諸華薄其貢職唯辤要而巳􅀂二漢御戎之方失其本矣氐支齊書曰氐楊氏與符氏同出略陽漢丗氐居仇池地号百頃建安中有百頃氐王是也又曰仇池四方壁立自然有樓櫓却敵􅃺髙並數文有二十二道可舉縁而􅂛東西二門盤道可七里上有岡阜泉源氐於上平地立宫室菓園食庫無貴賤皆爲板屋土牆所治處名洛谷又曰宋文帝元喜十九年龍驤將軍裴方明等伐氐尅仇池通典曰氐者西戎之別種則在廣漢西君長數十而白馬㝡大或号青氐或号白氐或稱蚺氐蚺而占切此盖中國人即其服色而名之也土地險阻有麻銅􅃮􅁡椒蠟等勇戅抵昌貪貨死利居於河地一名仇池方百頃四面斗絶數爲邊㓂郡縣討之則依固自守其俗語不與中國及羗胡同各自有姓如中國之姓其服尚青俗能織布善田種畜羊豕馬牛婚姻六禮知書䟽多知中國之語言與中國之姓其服尚青又曰漢武元封三年氐人反遣兵討破之分徙酒泉郡元鳯􅀄復叛遣大鴻臚田廣明討破之又曰魏武之􅀄諸氐戎叛乃令夏侯妙才討之因徙武都之種於秦川以御蜀虜風俗通曰氐言抵昌貪饕至死好利樂在山谿本西南夷之别種号曰白馬孝武帝遣中郎將郭昌等引兵征之降服以爲武都郡晉華隂令江統西戎論曰春秋之義内諸夏而外夷狄以其言論不通䞇幣不同種􅀋乖殊或居絶域之外山河嶇險阻之地與中國壤之表﨑断土隔不相侵渉賦役不及正朔不加故曰天子有道守在四夷又曰匈奴求守邊塞而俟應陳其不可單于屈􅂰未央蕭望之議以不臣是以有道之君不攻夷狄也車師北史曰車師國一名前部其王居交河城後魏大武真君十一年車師王車夷落遣使進薛直上書曰臣亡父僻處塞外仰慕天子威德遣使奉獻不空於歳天子降念賜遣甚厚及臣継立不闕常貢天子垂矜亦不異前丗敢縁至恩輙陳私懇臣國自無諱所攻擊經今八歳人庻飢荒無以存活賊今攻臣急甚不能自全遂捨國東奔三分免一即日巳到焉耆東界思歸天闕幸垂賑救於是下詔撫慰之開焉􅂄倉給之正平􅀄遣子入侍自後毎使朝貢髙昌北史曰髙昌者車師前王之故地東西二百里南北五百里四靣多大山以其地勢髙敞人庻昌盛因名髙昌亦云其地有漢時髙昌壘故以爲國號東去長安四千九百里漢西域長史及戊巳校尉並居於此晉以其地爲髙昌郡張􅁤吕光沮渠􅂪遜據河西皆置太守以統之又曰其國有八城地多磧石氣􅀱温暖厥土良沃􅂖麥一歳再熟冝蠶多五菓有草名羊刺其上生密而味佳出赤塩其味羙復有白塩其形如玉髙昌人取以爲枕貢之中國又曰後魏文成帝和平六年髙昌人立麴嘉爲王嘉宇靈鳯金城榆中人遣使獻珠象白黒貂裘名馬塩枕等宣武延昌中以嘉爲持節平西將軍􅀲州刺史又曰後魏孝明熈平􅀄遣使朝貢獻詔曰卿地隔関山境接荒漢頻請朝援徙國内遷雖來誠可嘉於理未恊何者彼之甿庻是漢魏遺􅀺自晉氏不綱因難播越成家立國丗積巳乆惡徙重遷人懷蠻舊今若動之恐異同之變爰在时腋不得便如來表也又曰後魏孝明正光元年遣使奉表自以邊遐不習典誥求借五經諸史并請國子助教劉爕以爲􅀶士明帝許之又曰其國至隋城周廽一千八百四十歩於坐室􅀞魯哀公問政於孔子之像又曰服飾丈夫從胡法婦人裙􅃭頭上作髻文字亦同華夏兼用胡書有毛詩論語孝經置學官弟子以相教授雖習讀之而皆爲胡語賦稅則計田輸銀錢無者輸布又曰隋大業四年遣使貢獻帝待其使甚厚明年伯雅來朝伯雅髙昌國王名也因從擊髙麗還宗室女華容公主八年冬歸蕃下令國中曰先者以國邊荒境􅀍髮左袵今大隋統衘宇宙平一􅀌旣沐浴和風庻均大化其庻人以上皆冝解辮削袵帝聞而善之下詔曰光禄大夫弁國公髙昌王伯雅本自諸華丗祚西壤昔因多難剪爲胡服自我皇隋平一宇宙伯雅踰沙重阻奉貢來庭削袵曵裾變夷從夏可賜衣冠仍頒製造之式唐書曰髙昌有草名白疊其實􅀋蠒國人採之織以爲布又曰武德七年其王文㤗又獻狗雌雄各一髙六寸長尺餘性甚惠云本岀拂䔉國中國有拂䔉狗自此始也又曰太宗嗣位復貢玄狐裘因賜其妻宇文氏花􅁫一具字文氏復貢玉盤也又曰貞觀四年冬宇文氏請預宗親詔賜姓李氏封長樂公主書慰諭之又曰貞觀十三年文㤗稱疾不朝太宗命侯君集爲交河道大惣管率左屯衛大將軍薛萬均及突厥契苾之衆歩􅀐數万衆以擊之攻㧞其城虜男女七千餘口文㤗惶懼病死子智盛嗣立出城降君集先是其國童謡云髙昌兵馬如霜雪漢家兵馬如日月日月照霜雪迴首自消滅文㤗使人捕其􅀄唱者不能得君集㝷遣使告捷太宗大恱宴百寮班賜各有差曲赦髙昌部内欲以髙昌爲州縣特進魏徴諌以爲不便太宗不從遂以其地置西州又置安西都護府留兵以鎮之吐谷渾後魏書曰吐谷渾慕容氏者本遼西鮮卑徙河歩歸有二子長曰吐谷渾少曰􅀂洛廆代統部落別爲慕容氏歩歸之存貧分户百以給吐谷渾渾與洛廆二部馬􅋐相傷洛廆怒謂渾曰何不分部令相逺渾曰馬是畜耳而何怒及求別甚易今當去汝萬里之外廆悔謝留之渾曰先公之丗卜筮當有二子亭福並流子孫我是卑庻理無並大今以馬致隔天所啓也試駈馬令東􅀂還我當有隨即命擁馬皆悲鳴西走遂西渡隴止于甘松之南廆追悔之作吐谷渾河干歌徙何以兄爲河干也逐水草廬帳而居以􅁏酪爲粮渾死其後以吐谷渾爲氏又曰豺立自号沙州刺史部内有黃沙周迴數百里不生草木因号沙州梁書曰武帝天監十三年其王休運籌遣使獻金裝馬腦鍾二口又表於益州立九層佛寺詔許焉十五年又遣使獻赤舞龍駒及方物隋書曰其王以皂爲帽妻戴金花其器械衣服略與中國同其王公貴人多戴羃䍦婦人裙􅃭辮髮綴以珠貝國無常稅殺人及盗馬者死餘坐則徴物以贖罪風俗頗同突厥有大夌粟豆青海周迴千餘里中有小山其俗至冬輙放牝馬於其上言得龍種吐谷渾嘗得波斯草馬放入海因生騘駒能日行千里故時稱青海騘馬又曰開皇十六年以光化公主妻吐名渾王伏允上表欲稱公主爲天后上不許唐書曰隋焬帝時其王伏允來犯塞焬帝親惣六軍以討之伏允以數千􅀐潜於泥嶺而遁其仙頭王率男女十餘萬口來降煬帝立其質子順爲王送之本國又曰貞觀九年詔特進李靖爲西海道大惣管時伏允太子順欲因此立功由是遂降乃詔曰吐谷渾擅相君長􅀼據荒裔志在凶德政出權門酋渠携貳種落怨憤長惡不悛野心弥熾莫頋蕃臣之禮曽無事上之節莫􅀼疆􅂣䖍劉兆庻積惡旣稔天亡有徴朕君臨四海含育万􅀋一物失所責􅀷在予所以爰命六軍申兹九伐義存活國情非黷武其子大寜王慕容順隋氏之甥志懷明悟長自中土幸慕華風爰見時機􅀷識逆順以其愎諌違衆獨䧟迷途遂誅邪臣存兹大計翻然改轍代父歸罪忠孝之美􅀷有可嘉子能立功足以􅀘過旣徃之釁持冝原免然其建國西鄙巳歷年代旣從廢絶情所未忍継其宗祀允歸令嗣可封順爲西平郡王仍授趉九物切胡吕鳥甘豆可汗又曰吐谷渾自晉永嘉之末始西疫洮水建國於群羌之故地至龍朔三年爲吐蕃所㓕波斯北史曰波斯國都􅀫利城在忸􅁡西古條支國也去代二萬四千二百二十八里城方十里户十餘万河經其城中南流土地平正岀金鍮石􅃢瑚琥珀車渠馬腦多大真珠頗梨瑠璃水精瑟瑟金剛火齊􅣱鐵銅錫朱砂水銀綾錦疊毼氍毹毾㲪赤麞皮及欎金􅂫合青木等香胡椒畢撥石蜜千年􅀥香附子訶􅀺勒無食子塩緑雌黄等風物氣􅀱暑熱家自藏氷地多沙磧引水漑灌其五榖及鳥獸等與中夏略同唯無稻及􅁰稷土出名馬大馿及駞徃徃有一日能行七百里冨室至有數千頭又出白象師子大鳥夘形如槖駞有兩翼飛而不能髙食草與􅁏亦能噉火其王姓波氏名斯坐金羊牀戴金花冠衣錦􅂁織成帔飾以真珠寳物其俗文夫剪髮戴白皮帽貫頭衫亦有巾帔縁以織或錦婦女服之飾以金銀仍貫五色珠絡之於􅈩王於其國内别有小牙十餘所猶中國之離宫也毎年四月出遊處之十月乃還王即位以後擇諸子内賢者宻書其名封之於庫諸子及大臣皆莫之知也王死衆乃共發書視之其封内有名者即立以爲王餘子出各就邊任兄弟更不相見也國人号王曰毉􅓐妃曰防歩率王之諸子曰殺野又曰其刑法重罪懸諸竿上射殺之次則繫獄新王立乃釋之賦稅則准地輸銀錢又曰其俗以六月爲歳首尤重七月七日十二月一日其日人庶以上各相命召設會作樂又曰後魏孝明神􅀛中其國遣使上書貢物云大國天子天之所生願日出處常爲漢中天子波斯國王居和多千萬禮拜朝廷嘉納之自此毎使朝獻唐書曰波斯伊嗣侯遣使獻一獸名活褥地形􅀋䑕而色青身長八九寸能入穴取䑕又曰龍朔元年詔遣隴州南田縣令王名逺充使西域分置州縣因列其地疾陵城爲波斯都督府授其王卑路斯爲都督是後數遣使貢獻咸亨中卑路斯自來入朝髙宗甚加恩賜拜右武衛將軍儀鳯三年令吏部侍郎裴行儉將兵􅁽送卑路斯還爲波斯主行儉以其路逺至安西碎葉而還卑路斯獨返不得入其國漸爲大食所侵客於吐火羅國二十餘年有部落數千人後漸離散至景龍二年又來入朝拜爲左威衛將軍無何病卒其國遂㓕而部衆猶存自開元七年至天寳六載凡十遣使來朝并獻馬腦床九載四月獻大毛繡舞筵長毛繡舞筵無孔真珠等太平御覽卷第七百九十四
