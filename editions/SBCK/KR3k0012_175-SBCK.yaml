front:
  text: 太平御覽卷第一百七十五
  hash: sha256:055c0a575addc94c7b02dd5a1ebc3a855c580fa9d862e9685d608005f5874743
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_175-1a}
body:
  text: 居處部三殿􅀃文曰殿堂之髙大者也釋名曰殿典也摯虞決疑要注曰凡太極殿乃有陛堂則有階無陛也右磩左平平者以文塼相亞次墄者爲陛級也九錫之禮納陛以登謂受此陛以上殿堂之正者爲路寢凡殿堂坐位以近尊爲上無尊者則巳東向者以北爲上南向者以西爲上西向者以南爲上北向者以東爲上也殿堂之上唯天子居牀其餘皆鋪幅席席前設筵凡天子之殿東西九筵南北七筵史記秦始皇以咸陽人多先王之宫迂小乃營作朝宫渭南禁苑中先作前殿阿房東西五百歩南北五十丈上可以坐萬人下可以建五丈之旗周旋爲閣自殿下直指南山之巔爲􅃨道渡渭屬之咸陽漢書曰宣帝幸河東之明年鳯皇集上林迺作鳯皇殿以荅嘉瑞事具祥瑞部鳯皇篇後漢書曰董卓傳云建安元年七月帝還至洛陽幸陽安殿張楊以爲巳功故因以楊爲名殿范曄後漢書曰中平三年復修玉堂殿東觀漢記曰明帝欲起北宫尚書僕射鍾離意上書諌出爲魯相後起徳陽殿殿成百官大㑹上謂公卿曰鍾離尚書􅀂在不得成此殿魏志明紀云青龍三年丁巳行還洛陽宫命有司復崇華殿改名九龍殿又髙堂隆傳云帝遂復崇華殿時郡國有龍九見故改曰九龍殿又張遼傳曰文帝引遼㑹建始殿親問破吴賊意􅃺帝歎息顧左右曰此亦古之邵虎也爲起殿舎又特爲遼母作殿晉書曰張駿覇西河於姑臧起謙光殿􅀞以五色飾以金玉窮盡珎巧四面各起一殿東方曰冝陽青殿南方曰朱陽赤殿西方曰政徳白殿北方曰􅀇武黒殿各同方色各以時居之晉載記曰石虎於襄國起太武殿於鄴造東西宫至是就太武殿基髙二丈八尺以文石綷之下穿伏室置衛土五百人於其中東西七十五歩南北六十五歩皆􅃮瓦金鐺銀楹金柱珠簾玉壁窮極􅇊巧又起靈臺于顯陽殿後選士庶之女以充之後庭服綺縠竒玩者萬餘人内置女官十有八等教宫人星占及馬歩射置女太史于靈臺仰觀災祥以考外太史之虚實魏略曰青龍三年起太極殿洛陽故諸宫有却非殿銅馬殿敬法殿清涼殿鳯皇殿嘉徳殿黄龍殿壽安殿竹殿晉中興書曰烈宗起清暑殿䜟者曰清暑反語楚聲也爲殿以酸楚之聲爲號非􅁻祥也有頃烈宗崩桓􅀇自號楚又孝武帝造太極殿郭璞筮云二百一十年此殿爲奴所壊後梁武帝毀之捨身爲奴落享燕書曰秋七月丁夘營新殿昌􅀺大􅁄城縣河岸崩岀鐵築頭一千一百七十四枚永樂民郭陵見之詣闕言狀以是日到詔曰經始崇殿而築具出人神允恊之應也趙書曰劉曜召構殿巧手三千人發陽平等十郡車牛五千乗運土築建徳殿臺基齊書武穆裴皇后傳云寵􅁎荀昭華居鳯華栢殿宫内御所居壽昌􅀞殿南閤置白鷺鼔吹二部又魏虜傳云虜主宏率衆至壽陽軍中黒氈行殿皆烏􅃮楯烏􅃮槊綴以黒蝦蟇幡登八公山賦詩而去又禮志云魏文脩洛陽宫室權都許昌殿狹小元日於城南立氈殿青帷以爲門又蕭赤斧子頴胄傳曰建武中荆州大風雨龍入栢齋中柱壁上有􅀲足處刺史蕭欣恐畏不敢居之頴胄改爲嘉福殿隋書宇文愷傳云時上北廵愷造觀風行殿上容侍衛者數百人離合爲之下施輪軸推移倐忽有􅀂神功戎狄見之莫不驚駭唐太宗謂侍臣曰今天下無事四夷賔服唯湏守此成功以養百姓因指殿而言曰安百姓者如造此舎經始斯畢安可改移􅀂易一榱増一瓦人足竟踐良工揮墨揺其梁棟所壞益多亦猶百姓旣安因而撫養若慕竒功變法制不􅁪其徳必致勞擾又曰太宗謂侍臣曰朕頃覽劉聦傳聦將爲劉后起䳨儀殿廷尉陳元逹諌聦大怒命斬之劉后手䟽啓請甚切聦怒解而甚媿之人之讀書欲廣聞見然非知之難也朕近於藍田市木將别爲一殿取制兩儀仍構重閣其木巳具逺想聦事斯作遂止又曰髙祖引蘇丗長宴於披香殿丗長酒酣奏曰此隋煬帝之所作耶何雕麗之􅀂此髙祖曰卿好諌以直其心實詐豈不知此殿是吾所造何湏姦詭疑煬帝乎對曰臣實不知但見傾宫鹿臺琉璃之瓦並非受命帝王愛民節用之所爲也􅀂是陛下作此誠非所冝臣昔在武功幸獲陪侍見陛下宅宇􅂊蔽風霜當彼時亦以爲足今目隋之侈民不堪命數歸有道而陛下得之實謂懲其奢􅁋不忘儉約今􅀄有天下而於隋宫之内又加雕飾欲撥其亂寜可得乎髙祖毎優容之又曰􅀇宗甞召張􅀃及禮官學士等賜宴於集仙殿上謂􅀃曰今與卿等賢才同宴於此冝改殿爲集賢殿因下制改麗正書院爲集賢殿書院又曰麗正殿髙宗降誕之所開元中繕冩圖籍貯之洛陽宫殿簿有明光殿三􅁗記云明光殿在桂宫中皆以金王珠璣爲簾晝夜光明太冲吴都賦云飾赤烏之暐暐是也三輔宫殿名曰未央宫有騏驎殿椒房殿又曰長樂宫前殿宣徳殿通光殿髙明殿漢宫殿名曰長安有臨華殿神仙殿髙門殿朱鳥殿曽城殿宣室殿承明殿鳯皇殿飛雲殿昭陽殿鴛鸞殿鈎臺殿合懽殿蕭何殿曹叅殿韓信殿成都記曰隋蜀王秀常造一殿飛鳥不止其上戴延之西征記曰太極殿上有金井䦨金􅅮山鹿盧山蛟龍山􅀒於井上又有金師子伏滔北征記曰梁城東有韓馮墓去城三里青蘭殿是宋王住殿山謙之丹陽記曰太極殿周制路􅃦也􅁗漢曰前殿今稱太極曰前殿洛宫之號始自魏案史記􅁗皇改命宫爲廟以擬太極魏號正殿爲太極蓋採其義而加以太亦猶漢夏門魏加曰大夏耳咸康中散􅀐侍郎􅁃闡議求改太爲泰蓋謬矣東西堂亦魏制於周小寢也皇后正殿曰顯陽東曰含章西曰徽音又洛宫之舊也含章名起後漢顯陽徽音亦起魏曰明陽晉避文帝諱改爲此周禮亦有路􅃦小寢又其制度也登真隱訣云􅋁陽殿太和殿皆云玉清宫中殿名二京雜記曰漢成帝設雲帳雲幄幕於甘泉紫殿謂之三雲殿漢官典職曰德陽殿周旋容萬人激洛水於殿下郡國志曰秦州上邽縣北十六里有無疆古殿基後魏太武築也王子年拾遺記曰漢成帝造飛行殿方丈如今之輦選期門羽林之士􅀒之而趨一名雲雷宫兩京記曰東京五殿壁厚五丈髙九十尺東西房廊皆五十餘間西院有厨東院有教坊内庫髙宗常御此殿又曰流盃殿東西廊殿南頭兩邊皆有亭子以間山池此殿上作􅃮渠九曲從陶光園引水入渠隋煬帝常於此爲曲水之飲在東都又曰含元殿陛上髙於平地四十餘丈南去丹鳯門四百歩王文考魯靈光殿賦序曰魯靈光殿者蓋漢景帝程􅁎之子恭王餘之所立也􅀄恭王始都下國好治宫室遂因魯僖基兆而營焉遭漢中微盗賊奔突自西京未央建章之殿皆見隳壞而靈光巋然獨存意者豈非神明依慿支持以保漢室者耶然其䂓矩制度上應星􅀫亦所以永安也晉宫閣名曰太極殿十二間徽行殿顯陽殿暉章殿含章殿建始殿仁壽殿百福殿清暑殿章華殿嘉福殿宣光殿修明殿嘉樂殿芙蓉殿崇光殿華光殿􅂼圃殿華德殿九華殿右五殿在華林園章陽殿百兒殿芳德殿靈殿承光殿永寜殿景福殿延休殿百子殿虞清殿淵􅁳殿安昌殿建康宫殿簿云林光殿在縣東北十里潮溝村覆舟山前晉以爲藥園又曰陳永􅀄中於臺城中起昭德嘉德壽安乾明有覺等殿又曰光嚴殿在縣東北六里景陽山東嶺南起重雲光嚴二殿前爲兩樓又云梁於臺城中立曽城觀觀歷四代修理更起重閣七間上名重雲殿下名光嚴殿又云太􅀄宫中有神龍殿去縣三里左太沖吴都賦云杭神龍之華殿是也又云臺城温德門内又起三善長春勝辯等殿又云鳯光殿在縣東北五里一百歩舊臺城内又云宋於臺城立正福清曜等殿又云臺城中有麗譙閣麗日殿飛香三重閣又云臺城温德門内有永貞温文文思壽安等殿輿地志云未央後宫有鴛鴦昭陽飛翔増地合歡蘭林披香鳯皇等八殿又云丹陽郡建康縣文德殿梁武帝移張衡渾儀置此殿又云洛陽有顯陽殿皇后正殿也魏明所建又云丹陽郡建康縣臺城華光殿梁武帝大通中毀施與草堂寺人洗取朱貨直百萬以其地起重閣七間又云丹陽郡建康縣臺城寳雲殿梁武帝以施佛事又云丹陽郡建康縣臺城惠輪殿梁武帝以供養佛又云洛陽昭陽殿魏明所治在太極之北鑄黄龍髙四丈鳯皇二丈置殿前又云新安郡新始縣西十里有大宰殿晉武陵王晞爲太宰桓温詐言其反徙新安立第於此葬第側後䘮還都今空冢在楊龍驤洛城記曰顯陽殿北有雲氣殿洛陽宫殿簿曰明光殿徽音殿式軋殿暉章殿含章殿建始殿仁壽殿嘉福殿百福殿芙蓉殿九華殿流圃殿華光殿崇光殿建康宫闕簿云赤烏殿在縣東北五里吴昭明宫内制度上應星宿亦所以永安也注水經曰孔子廟東南立百歩有􅀟石闕即靈光之南闕也闕北百餘歩即靈光殿基東西二十丈南北十二丈髙丈餘東西廊廡别舎中間方七百餘歩闕之東北有浴池池方四十餘歩池中有鉤臺方十歩池臺之基岸悉石也遺基尚整故王延壽賦曰周行數里仰不見日者也是漢景帝程􅁎子魯恭王之所造也殿之東南即泮宫也在髙門直北道西宫中有臺髙八十尺臺南水東西一百歩南北六十歩臺西水南北四百歩東西六十歩臺池咸結石爲之太平御覽卷第一百七十五
