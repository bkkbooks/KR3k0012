body:
  text: 兵部七十九弩釋名曰弩怒也有勢怒也其柄曰臂似人臂也鈎弦者曰牙似齒牙也牙外曰郭爲牙之䂓郭也下曰縣刀其形然也合名之曰機言如機之巧也亦言如門户樞機開闔有節也􅀃文曰洛陽名弩曰弲許縁切彀弩也彍滿弓也彍音霍古史考曰黃帝作弩廣雅曰鉅􅎟弓谿子弩太公兵法曰弩之神名逺望尚書曰􅀂虞機張徃省括于度則釋尚書帝命驗曰玉弩發驚天下􅁗有徃矢西流抂矢即弩星也兵精主天下見之而驚西流􅁗滅也賤􅀋出髙將下賊􅀋謂秦始皇也吕不韋之妻任身而􅁗襄王納之生始皇髙謂丞相趙髙也始皇出趙髙下言天生之也賤或爲賊史記曰龐㳙追孫臏音北臏量其行暮當至馬陵馬陵道狹而旁多阻險可伏兵乃大析樹白而書龐㳙死此下於是令齊軍善射者萬弩夾道而伏期曰暮見火舉而俱發龐㳙夜至析木下見白書乃鑚火燭之讀書未畢齊軍萬弩俱發魏軍大亂龐㳙自知智窮兵敗乃自剄曰遂成竪子之名又曰髙祖阨於冒頓平城天下歌曰平城之下亦誠苦七日不食不能彀弩彀張也音遘又曰始皇葬驪山令匠作機弩矢有所穿近輙射之又曰􅂫􅁗􅀃韓王曰谿子距􅁰射六百歩之外許愼曰南方谿子蠻之弩皆善射又曰􅂫代遺穰侯書曰以天下攻齊如以千鈞之弩决潰癰也又曰漢王臨廣武數項羽十罪項羽大怒令伏弩射中漢王漢王傷􅅐乃捫足曰虜中吾指漢書曰李廣傳曰廣爲匈奴所擊廣身自以大黃射其禆將服䖍曰大黃肩弩也又曰申屠嘉梁人也以材官蹶張如淳曰材官皆多能脚強弩張之故曰蹶張律有蹶張生從髙帝擊項籍又曰李陵至浚稽與單于相值􅀐二萬圍陵陵軍居兩山間以大車爲營陵引士出營外爲陣前行持㦸盾後行持弓弩虜見漢軍少直前就營陵􅅮戰攻之千弩俱發應弦而倒又曰司馬相如爲中郎建節卭笮至蜀太守以下郊迎縣令􅀒弩矢先驅蜀人榮之又曰霍去病爲驃􅀐將軍過河東河東太守郊迎􅀒弩先驅續漢書曰虞詡爲武都太守虜來攻城詡出戰使強弩射之三發而三中虜衆潰謝承後漢云羗攻城也東觀漢記曰耿恭在䟽勒城救兵不至恭食盡窮困士乃煑鎧弩食其䈥革恭與士推誠同死生故無貳心後漢書曰宋則子年十歲與蒼頭共弩射蒼頭弦斷矢激誤中之即死奴叩頭就誅則察而恕之頴川荀爽深以爲美時人亦服焉又曰中平中黃巾賊起郡縣皆弃城走陳愍王寵有強弩數千張出軍都亭置軍營於國之都亭也國人素聞王善射不敢反叛故陳獨得完百姓歸之者衆十餘萬人又曰陳愍王寵善弩射十發十中中皆同處華嶠後漢書曰陳愍王寵射善弩其秘法以天覆地載叅連爲竒又有三微三小三微爲經三小爲緯經緯相將萬勝之方然要在機牙其射至十發十中魏氏春秋曰諸葛亮損益連弩謂之元戎以鐵爲矢矢長八寸一弩十矢俱發吴志曰甘寧字興霸巴郡臨江人也吴書曰寕夲南陽人也招合輕薄少年爲之渠帥群聚相隨挾持弓弩􅀒眊音餌帶鈴民聞鈴聲即知是寧也吴録曰松梁山山石開處容數十丈髙竹弩不及其上在灃州晉書曰稽紹傳云齊王囧􅀍誅初兵交紹奔散赴宫有持弩在東閤下者將射之遇有殿中將兵蕭隆見紹姿容長者疑非凡人趣前拔箭於此得免又曰劉聦將趙染􅁈殺其長史魯徽染㓂北地夢魯徽大怒引弓䠶之染驚悸而寤旦將攻城中弩而死又曰孟幹爲吴人所獲將徙之臨海幹等志北歸慮東徙轉逺以吴人愛蜀側竹弩言能作之皓留付作部後幹逃至京都又曰崔洪薦郗詵自代詵後駮奏洪曰我舉郗詵而反奏我是挽弩自射晉陽秋曰􅀄髙祖勒兵闕下經曹爽門爽悵下督嚴丗引弩將射髙祖孫謙止之曰未可知三注三止髙祖車乃過丗􅀃又載又曰馬隆討凉州虜隆募限腰引弩四十六鈞弓限四鈞巳上隆捶􅋆音摽懸弓弩􅋆側閱試自旦至中得三千五百人唐書曰李希烈旣䧟汴州乗勝東侵連䧟陳留雍丘頓軍寜陵期下宋州會食浙西節度韓滉命王拪矅將強弩數千夜入寧陵希烈不之知晨朝弩矢及希烈坐悵希烈驚曰此江淮弩士今入矣遂不敢東希烈夜敗晉諸公讃曰都官從事程偉案􅃺羊琇音酉所犯狼籍琇即遣家人持銅弩牙首入重法時人皆謂琇有權智丗祖詔免琇官英雄記曰王匡字公節太山人以任俠聞辟大將軍何進府使匡於徐州發強弩五百西詣京師會進敗匡還郷又曰􅀽紹擊公孫瓉先令麴義領精兵八百強弩千張以爲前登又曰􅀽尚使審配守鄴城曹操進軍攻鄴生獲配謂曰吾近行圍弩何多也配曰猶恨其少日南傳曰南越王尉佗攻安陽安陽王有神人睪音髙通爲安陽王治神弩一張一發萬人死三發殺三萬人他退遣太子始降安陽安陽不知通神人遇無道理通去始有姿容端美安陽王女眉珠恱其貌而通之始與珠入庫盗鋸截神弩亡歸報佗佗出其非意安陽王弩折兵挫浮海奔竄華陽國志曰秦襄王時有一白虎常從羣遊巴蜀傷害千餘人昭王乃重募有能殺虎者賞邑萬家閬中夷廖中能作白的之弩乃登樓射殺白虎昭王嘉之以其夷不欲封刻石盟要曰秦犯夷輸黃龍一􅀟夷犯秦輸清酒一鍾夷人安之又曰鄧芝征涪陵見玄猿抱子在樹上引弩射之中猿母其子爲抜箭以木葉塞瘡芝乃歎息曰嘻吾違物之性其將死矣投弩水中芝後果死會稽典録曰鍾離牧謂朱育曰大皇帝以中國多􅀐欲以當之然吴神鋒弩射三里貫洞三四馬􅀐敢近之乎南越志曰龍川有營澗甞有銅弩牙流出水皆以銀黃雕鏤取之者祀而後得曾有取比牙逢風雨舉船淪没父老云越王弩營處也􅄂記曰事吴朝鴻臚卿張儼議郎張純鎮南將軍朱異三人共詣驃􅀐將軍朱據據曰三賢屈顧老鄙相聞含甘湏之明懷終賈之才相飢渇乆矣各爲賦一物然後乃坐乃各賦所見異賦弩曰南嶽之幹鍾山之銅應機命中射隼髙墉吴越春秋曰陳音對越王曰弩生於弓弓生於彈彈生於古之孝子臣聞楚琴氏以弓矢之勢不足以威天下遂乃撗弓着臂施機設郭加之以力郭爲方城守臣子也敖爲人君命所起也關爲守禦撿去止也錡音竒又音蟻爲侍從聽人主也辭爲道路通所使也弓爲將軍王重􅀒也弦爲軍師禦戰士也矢爲飛容主教使也金爲穿敵徃不止也衛爲副使正道里也驃爲都尉執左右也鳥不得飛獸不得走弩之所向無不恐者王曰善子之􅀃弩也願復聞正射之道陳音對曰臣聞射之道左足縱右足橫左手􅀂附枝右手􅀂抱兒右手發右手不知此正射持弩之道也戰國䇿曰􅂫􅁗爲楚合從􅀃韓王曰天下之良弓勁弩皆自韓出射六百歩之外文子曰狡􅇠得而獵犬烹髙鳥盡而強弩藏尉繚子曰兵如楤木弩如羊角慎子曰弩弱而矰髙者乗於風也身不肖而行合者得助於衆也淮南子曰烏號之弓谿子之弩南方谿子蠻夷柘弩皆善材也不能無弦而射越舼渠容切蜀艇舼小艇船大皆一木不能無水而浮又曰鈆不可以爲刀銅不可以爲弩鐵不可以爲弓木不可以爲釡又曰萬畢術云牛翁十四可以強弩取牛翁十四杖曲蟮白頸者二七以三尺新布褁之活塗布着之無令人見用之拭弩令温引之校半力也阮子曰丗多善弩而拙於弓弓無法准故任巧由意弩有法准故易有善抱朴子曰秋以弓弩在前太公六韜曰䧟堅陣敗強敵以大黃叅連弩大扶月車三十六乗才士強弩矛㦸爲翼太公兵法曰神后加四仲者以爲明堂宫時天一出遊八極之外行窈􅄀之中日照其前月照其後當此之時天一自持玉弩執法承相刻不道者崔寔政論曰永平建􅀄之際去戰未乆官兵勁利有蔡太僕之弩擅名天下風俗通曰汲令應郴一作余祖父郴夏至日請主簿杜宣賜酒時北壁上懸赤弩照於杯中見其形如虵宣惡之然不敢不飲因得胷腹病攻治不差郴後知之過宣家問疾之由以爲虵入腹中郴遶㕔事思惟良乆頋懸弩曰此是乎乃扶宣來於故處設酒杯中致復有虵因謂宣曰北壁上弩影耳非有他怪宣意解病即瘳又曰臧文仲家欲炊而失釡及弓弩自行十洲記曰續弦膠或各連金􅅺此膠能属連弓弩斷絃連刀劒斷折之金膠連使人挽製他處即斷此終不復脫天漢二年帝事北海祠􅁪山西國王使至獻膠四兩吉光毛裘武帝受以付庫不知膠裘二物之妙也以上貢不竒稽留使未遣之帝幸華林苑射虎而弩絃斷使者從駕因上膠一分使口濡以續絃帝驚乃使武士數人對掣終日不斷膠青色如碧玉吉光毛裘黃色盖神馬之􅀋也裘入水經月不沉入火不焦帝方重之厚賂使者而遣之趙公王琚音居教射經曰弩古有黃連百竹八檐􅀟弓之號今有絞車弩中七百歩攻城拔壘用之擘張弩中三百歩歩戰用之馬弩中二百歩馬戰用之弩張遟臨敵不過三發所以戰陣不便於弩非弩不利於戰而將不明於弩也不可􅄂於短兵當别爲隊攅箭注射則前無立兵對無橫陣復以陣中張陣外射畨次輪廻張而復出射而復入則弩不絶聲敵無簿我夫置弩必處其髙爭山奪水守隘塞口破驍䧟果非弩不尅殺法令曰張弩後左廂丁字立當弩八字立髙揎手揎音宣屈衫􅁭左手承橦右手迎上當心㸔張張有闊狹左䏶右􅈩還復當心安箭髙舉射敵逺擡弩頭敵近平身放敵在左右廻身放敵在髙上挈脚放放箭訖唱殺却製拗蝎尾覆弩還着地太白隂經發弩圖篇曰弩者怒也言其聲勢威嚮如怒故以名其弩也穿剛逹堅自近及逺守險塞口破驍䧟堅非弩不尅也後漢李尤弩銘曰粤自近古發意所覩前聖制弓後丗造弩機牙發矢執破醜虜克獲雖屢猶不可常忘戰者危極武者傷魏陳琳武軍賦曰弩則幽都䈥角􅁪山檿幹通肌暢骨直矢輕弦當鋒摧决貫遐洞堅陸機七導曰長角三倡武士棊布捺紫間之神機審心中而後射東觀漢記云朱勃理馬援表曰羗反殺吏唯狄道爲國堅守然民飢餓噉弩煑履援救倒懸之急存幾亡之城蔡邕幽州刺史議曰幽州突􅀐兾州強弩爲天下精兵國家瞻㧡四方有事未甞不取辦於二州曁艷集􅄂移曰角弩旣調射者又工多獲鶉鳥能無懇傷文選曰機不虚椅又曰虞機發留鵁鶄又曰良將勁弩守要害之處射雉賦曰擎牙低鏃心平望審又曰黃間機張鏃折毫芒俯貫魴鱮仰落􅀟鶬魚不及竄
