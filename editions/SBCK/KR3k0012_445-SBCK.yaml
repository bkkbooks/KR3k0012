body:
  text: 人事部八十六品藻上論語子曰管仲之器小哉又子貢問曰賜也何如子曰汝器也言女器用之人也曰何器也曰瑚璉也瑚璉􅁰稷之器夏曰瑚啇曰璉周曰簋簋宗廟之貴器又曰由也千乗之國可使治其賦也求也千乗之邑百乗之家可使爲之宰赤也束帶立於朝可使與賔客言也又曰子謂子産有君子之道四焉其行己也恭其事上也敬其飬民也惠其使民也義又曰子張問令尹子文三仕爲令尹無喜色三巳之無愠色舊令尹之政必以告新令尹何如子曰忠矣曰仁矣乎曰未知焉得仁崔子弑齊君陳文子有馬十乗弃而違之至於他􅀖則曰猶吾大夫崔子也違之何如子曰清矣曰仁矣乎曰未知焉得仁又曰子曰雍也可使南面仲弓問子桑伯子子曰可也簡仲弓曰居敬而行簡以臨其民不亦可乎居簡而行簡無乃太簡乎又曰季康子問仲由可使從政也與子曰由也果於從政乎何有曰賜也可使從政也與曰賜也逹於從政乎何有曰求也可使從政也與曰求也藝於從政乎何有家語曰子貢曰陳靈公君臣宣􅁋於朝泄冶諌而殺之是與比干同也可謂仁乎子曰比干於紂親則叔父官則少師忠疑之心在於宗廟而巳固必死爭之兾身死之後紂悔寤其夲志情在乎仁者也泄冶位下大夫無骨肉之親懷寵不去以區區之一身欲正一國之􅁋昬死而无益可謂懷矣詩曰民之多僻無自立辟其泄冶之謂也又曰孔子北遊農山顔回侍曰願得明王聖主而輔相之敷其五敎道之以禮樂使城郭不修溝渠不越鑄劔㦸爲農器放牛馬於原藪室家無怨曠之思千歳無􅋐戰之患子曰羙德也不傷財不害人不繁辭則顔氏之子有矣又曰顔回問於孔子曰臧文仲武仲孰賢孔子曰武仲賢哉回曰武仲丗稱聖人而身不免於罪是智不足稱好言兵計而挫銳於邾是勇不足名也夫文仲其身雖没而言不朽惡有未賢孔子曰身没言立所以爲文猶有不仁者三不智者三是則不及武仲也回曰可得聞乎孔子曰下展禽置六􅀜大關關名置之以稅行者妾織席三不仁也設虚器縱逆祀祀海鳥三不智也武仲在齊齊將有禍不受更其國以避其難是智難之也又曰澹臺子羽有君子之容而行不勝其貌宰我有文雅之辭而智不充其辯孔子曰以容取人則失之子羽以言取人則失之宰予又曰子夏三年之喪畢見於孔子孔子與之琴使之弦偘偘而樂子曰君子也閔子三年喪畢見孔子孔子與之琴使子之絃切切而悲子曰君子也子貢曰閔子哀未盡矣子曰君子也子夏哀巳盡矣子曰君子也二者殊情而俱君子賜也惑之敢問孔子曰閔子哀未盡能遊之以禮子夏哀已盡能引之及禮均之君子不亦可哉又曰孔子曰不遷怒不􅀷怨不録舊罪冉雍之行也不畏強禦不侮鰥寡才任治戎仲由之行也文勝其質好學􅀶藝省物而動是舟求之行也齊莊而能肅志通而好禮篤雅而有節是公西華之行也滿而不盈實而不虚其德敢言於人無所不信是曽參之行也送迎必敬上交下接是卜啇之行也先成其慮及事而行故動則非妄是言偃之行也三復白珪之玷是南容之行也執親之喪末嘗見齒是髙柴之行也不念舊惡蓋伯夷叔齊之行也畏天而敬人蓋趙文子之行也臨其難不愛其死謀其身不遺其友君􅀂用則進蓋隨武子之行也國家有道其言之足以治無道其黙之足以生蓋伯華之行也外寛而内亡直已而不直人以善自終蓋蘧伯玉之行也孝恭慈仁允德圖義終貧去怨輕財不道蓋柳下惠之行也君有道從命無道衡命蓋平仲之行也漢書曰髙帝置酒洛陽南宫上曰吾所以有天下者何項氏之所以失天下者何王陵對曰陛下嫚而侮人項羽仁而敬人然陛下使人攻城略地所降下者因以與之天下同利也項羽疾能妬賢有功者害之賢者疑之戰勝而不與人功得地而不與人利此所以失天下也上曰公知其一不知其二夫運籌䇿於帷幄之中决勝於千里之外吾不如張子房鎭國家撫百姓吾不如蕭何連百万之衆戰必勝攻必取吾不如韓信三者人傑也吾能用之此吾能以取天下也項羽有一范増而不能用之此其所以爲我擒也羣臣皆恱服又曰公孫􅀪傳賛云儒雅則公孫􅀪董仲舒倪寛篤行則石建石慶質直則汲黯卜式推賢則韓安國鄭當時律令則趙禹張湯文章則司馬遷相如滑稽則東方朔枚臯應對則嚴助朱買臣歷數則唐都洛下閎恊律則李延年運籌則桑􅀪羊奉使則張騫蘇武將師則衡青霍去病受遺則霍光金曰磾其餘不可勝記是以興造功業制度遺文後丗莫及孝宣承統纂循洪業招選茂異而蕭望之梁丘賀夏侯勝韋􅀇成嚴彭祖尹始以儒術進劉向王襃以文章顯將相則張安丗趙充國魏相邴吉于定國杜延年治民則黃霸王成龔遂鄭􅀪邵信臣韓延壽尹翁歸趙廣漢嚴延年張敞之屬皆有功迹見述於丗叅其名臣亦莫次也謝承後漢書曰桓帝徴徐稺等不至因問陳蕃曰徐稺􅀽閎韋著誰爲先後蕃對曰閎生公族聞道漸訓長於三輔仁義之俗所謂不扶自直不鏤自雕至於稺者爰自江南卑薄之城而角立傑出冝當爲先􅀽山松後漢書曰王允字子師太原人丗仕州郡郭林宗嘗見允而竒之曰王生一日千里王佐才也遂與友善允至司徒范曄後漢書曰許劭嘗到潁川多長者之遊唯不詣陳蕃蕃喪妻還葬郷人畢至而劭獨不徃或問其故劭曰太丘道廣廣則難周仲舉性峻峻則少通故不造其多所裁量􅀂此曹操微時常卑辭厚禮求爲巳助劭鄙其爲人而不肯對操乃伺􅂩脅劭不得巳曰君清平之姧賊亂丗之英雄操大恱而劭與從兄靖俱有髙名好共覈論郷黨人物毎月更其品題故汝南俗有月旦評焉魏志曰盧欽著書稱徐邈曰徐公志髙行㓗才綽氣猛聖人以清爲難而徐公之所易也或問欽徐公當武帝之時爲通自在凉州及還京都人以爲介何也欽荅曰徃者毛孝先崔季珪用事貴清素之士徐公不改其常故以爲通比來天下奢靡轉相放効而徐公雅尚自􅀂不與俗同故前日之通乃今日之介也又曰司馬文王與陳泰親友武陔亦與㤗善文王問陔曰􅀇伯何如其父陔曰通雅􅀶暢能以天下聲教爲巳任者不如也明統簡至立事過之又曰文帝問賈翊曰吾欲伐不從命以一天下呉蜀何先對曰攻取者先立權建夲者尚德化但用兵之道先勝後戰量敵論將故舉無遺䇿臣􅀫料羣臣無備權之對也雖以天威臨之未見万全之勢今冝先文後武文帝不納後興江陵之役士卒多死典略曰祢衡自荆州北遊許都書一卷懷之澷滅無所適或問之曰何不從陳長文司馬仲逹乎衡曰卿欲我從屠酤兒軰耶又問曰當今復誰可衡曰大兒孔文舉小兒楊德祖又問荀令君趙蕩㓂皆蓋丗乎衡見荀有儀容趙有腹尺因荅曰文􅀂可借面弔䘮稚長可監厨請客其意以爲荀但有貌趙但啖肉也又曰趙戩遭三輔亂客於荆州劉表以爲賔榮是時祢衡來遊京師詆訿朝士及南見戩歎之曰劔則于將莫耶本則椅桐梓􅃮人則顔冉仲弓也建安中丞相南取荆州執戩手曰何相見之晚魏氏春秋曰髙貴郷公即位神明爽㑺德音宣朗罷朝景王私曰上何如主也鍾㑹對曰才同陳思武􅀋太祖景王曰􅀂如卿言社稷之福也又曰髙貴郷公爲宴羣臣於泰極東堂與侍中荀顗崔賛􅀽亮鍾毓虞松等講􅄒因帝問顗等曰有夏旣衰后相殄滅少康収集夏衆復禹之績髙祖抜起壠畒驅帥豪㑺芟夷􅁗項苞舉宇内斯二主可謂殊才異略命丗大賢者也考其功德誰宜爲先顗等對曰造之與因難易不同少康功德雖羙至如髙祖臣等以爲優帝曰未必創業者皆優紹繼者咸劣少康中宗中興之羙論德覈實方諸漢祖吾見其優未聞其劣少康生於滅亡之後降爲諸侯能布其德而兆其謀卒滅過戈復禹之績非至德豈能濟斯漢祖因土崩之勢專任智力爲人子則數危其親爲人君則囚擊賢相爲人父則不能衛其子身没之後社稷幾傾􅀂與少康易時而處或未能復大禹之績推此言之冝髙夏康而下漢祖矣帝又曰夫太上立德其次立功漢祖功髙未􅀂少康武烈之威豈必降於漢祖哉但夏書淪士舊文殘缺故勲羙闕而罔載向今墳典俱存行事詳備亦豈有異同之論哉於是羣臣咸恱服也又曰胡綜論呉朝俊士英才卓越超踰倫疋則諸葛恪清識知機逵究幽微則頋譚淑辯宏逹言能釋結則謝景究學甄微游夏同科則范愼羊衜恪才而踈譚精而俱景辯而校後恪譚果以強呉人論綜言而有徴蜀志曰大鴻臚張徴作黙記諸葛亮與司馬宣王書曰漢朝傾覆天下分崩豪傑之士竟希神器魏氏跨中土劉氏據益州並稱兵海内爲丗霸王諸葛司馬二相遭值際㑹託身盟主或収功於蜀漢或聞名於伊洛丕備旣没後嗣即統各受保阿之任輔翼㓜生亦一國之守臣霸王之賢佐也歷前丗以觀近事二相優劣可得而詳也孔明起巴蜀之地蹈一州之士方之大國其戰士人民蓋有九分之一也提歩卒數萬長驅祁山􅁣然有飲馬河雒之志逹據天下十倍之地杖兼并之衆據牢城擁精銳無擒敵之意務自保而巳使彼孔明􅀂此而不亡則凉雍不解甲中國不解鞍勝􅀒之䇿亦决矣方之司馬不亦優乎呉志曰孫㩲與陸遜論周瑜魯肅及吕􅂪曰公瑾雄烈膽略兼人遂破孟德開拓荆州邈焉難繼君今繼之子敬東來􅀌與宴語便及大略帝主之䇿一決也後孟德率數十萬衆水歩俱下􅀌請諸將問其所冝子布文表俱言而遣迎之子敬即駮言不可勸􅀌呼公瑾付兵衆逆而擊之此二決也勸吾借􅀇德地是其一短不足以損二長也􅀌忘其短而不遺其長子明少果敢有膽而長大學問籌略可以次公瑾但言議不及耳又曰周昭著書稱歩騭及嚴畯等曰古今賢士大夫所以失名喪身者其由非一也大歸四者而巳急論議一也爭名勢二也重朋黨三也務欲速四也急論議則傷人爭名勢則敗友重朋黨則蔽主務欲速則失德此四者不除未有能全者也當丗君子能不然者亦比有之豈獨古人乎然論其絶異未􅀂顧豫章諸葛使君歩丞相嚴衛尉張􅁬威之爲羙也論語言夫子恂恂然善誘人又曰成人之羙不成人之惡豫章有之矣望之儼然即之也温聽其言也厲使君體之矣恭而不猛丞相嚴履之矣學不求禄心無苟得衛尉􅁬威蹈之矣此吾君雖德實有差輕重不同至於趨舎大檢不犯四者俱一揆也昔丁謂出於􅀌家呉粲由於牧竪䂊章楊其羙以並隆全之列是以人無幽滯而風俗厚焉使君丞相衛尉三君昔以布衣俱相友善論者因名叙其優劣初先衛尉次丞相而後使君也其後並事明主經營丗務出處之才儀有不同先後之名湏反其初比丗常人所决懃也至於三君分好卒無􅃜損豈非古哉又魯横江昔仗万兵屯據陸口當丗之羙業也能與不能孰不願焉而撗江旣亡衛尉應其選自以才非將帥􅀷辭固讓終於不就後徙九列遷典八座榮不足以自奉至於二君皆位爲上將窮富極貴衛尉旣無求欲二君又不稱薦各守所志保其名好孔子曰君子矜而不爭羣而不黨斯有風矣又􅁬威之名亦三君之次也當一方之戍受上將之任與使君丞相不異也然歷國事論功勞實有先後故爵位之榮殊焉而􅁬威將處此决能明其部分心無失道之欲事無充詘之求毎􅂛朝堂循禮而動辭氣蹇蹇㒺不惟忠叔嗣雖親貴言憂其敗蔡文雖踈賤談稱其賢女配太子受禮􅀂弔慷慨之趨唯篤人物成敗得失皆如所慮可謂守道見機好古之士也􅀂乃經國家當軍旅於馳鶩之際立霸王之功此五君者未爲過人至其純粹履道求不苟得􅂛降當丗保全名行邈然絶俗實有所師故粗論其事以示後之君子又曰薛瑩王蕃器量綽異􅀪􅀶多通樓􅀇清白節操文理條暢賀邵厲行貞㓗機理清要韋曜篤學好古􅀶見羣籍有記述之才胡冲以爲􅀇邵蕃一時清妙略無優劣必不得巳􅀇冝在先邵當次之華覈詩賦之才有過於曜典誥不及也王隱晉書曰河南郭象著文稱􅄞紹父死在非罪曽無耿介貪位死闇主義不足多曽以問郄公曰王襃之父亦非罪死襃猶辭徴紹不辭用誰爲多少郄公曰王勝於􅄞或曰魏晉所殺子皆仕官何以無非也荅曰殛鯀興禹禹不辭興者以鯀犯罪也􅀂以時君所殺爲當耶則同於禹以不當耶則同於􅄞又曰丗皆以􅄞見危授命荅曰紀信代漢髙之死可謂見危授命如􅄞偏善其一可也以備體論之則未得也又曰頋榮謂中宗曰陸士元貞正清貴金相玉質甘季思忠欵誠盡加以膽幹殊快殷慶元質略有明規文武可用榮族兄公讓明亮守節困不易操㑹楊彦明謝行言皆服膺儒敎足爲民望賀生沉潜青雲之士陶恭兄弟才力雖少實事極佳凡此諸人皆南金也中宗納之又曰衛玠妻父樂廣有海内重名議者以爲婦公氷清女壻玉􅃳又曰裴憲字景思陳郡謝鯤潁川􅁃鼔皆㑺朗士也見而竒之相謂曰裴憲鯁亮宏逹通機識命不知其何如父然至於􅀷􅀪保素不以丗物嬰心者其殆過之又曰裴楷嘗目夏侯􅀇云肅肅如入宗廟中但見禮樂器鍾㑹如觀武庫森森迫見矛㦸在前傅嘏汪翔靡所不見山濤􅀂登山臨下幽然􅀷逺又曰杜預在內七年損益万機不可勝數朝野稱羙號曰杜武庫言其無所不有也又曰杜預傳云時王濟解相馬又甚愛之而和嶠頗聚歛預常稱濟有馬癖嶠有錢癖武帝聞之謂預曰卿有何癖對曰臣有左傳癖又曰裴楷風神髙邁容儀俊爽􅀶渉羣書特精理義時人謂之玉人又曰見裴叔則如近玉山暎照于人也又曰裴楷傳云吏部郎缺文帝問其人於鍾㑹㑹曰裴揩清通王戎簡要皆其選也又曰阮􅁉除東陽太守㝷徴侍中不就還剡山有肥遁之志有以問王羲之羲之曰此公近不驚寵辱雖古之沉􅁳何以過此時人云􅁉骨氣不如逸少簡秀不如眞長韶潤不如仲祖思致不如殷浩而兼有諸人之羙又曰謝安義在輔導雖㑹稽王道子亦頼弼諧之益時彊敵㓂境邊書續至梁益不守樊鄧䧟没安每鎭以和靖御以長筭德政旣行文武用命不存小察􅀪以大綱威懷外著人皆比之王導而文雅過之太平御覽卷第四百四十五
