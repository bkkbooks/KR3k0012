  text: 太平御覽卷第八百五十一
  hash: sha256:9ab3ece7465f361d7a679192bb7482ff292a4b2ff2b547ad040e44459f35c9a7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_851-1a}
body:
  text: 飲食部九糭䉽讀與餅同䭔糭晉書曰廣州刺史盧循遣使遺劉􅁉益智糭子􅁉荅以續命湯宋書曰後魏太武至彭城求酒及甘橘張暢宣孝武帝旨致螺盃雜粽南􅁟所珎齊書曰范雲永明十年使魏魏人李彪宣命至雲所甚見稱美彪爲設甘蔗黄粽隨盡復益彪謂曰范散􅀐小儉之一盡不可復得梁書曰張纉􅀄徃雍州資産悉留江陵性旣貪婪南中貲賄填積及死湘東王皆使收之書二萬卷並摙還齊摙音珎寳財貨悉付庫以粽宻之屬還其家風􅁟記曰俗以菰葉褁􅁰米以淳濃􅁅汁煑之令爛熟於五月五日及夏至啖之一名糭一名角􅁰盖取隂陽尚相裏未分散之時像也續齊諧記曰屈原以五月五日投汨羅而死楚人哀之毎至此日取竹筒貯米投水以􅀕之漢建武中長沙區廻白日忽見士人自稱三閭大夫謂廻曰君常見􅀕甚誠但常年所遺俱爲蛟龍所竊今君惠可以練樹葉塞其上以綵絲􅆞縳之此二物蛟龍所憚也廻謹依旨今丗人五日作糭并帶練葉及五綵絲皆汨羅之遺風異苑云糭屈原婦所作也䉽宋書曰文帝崩郭原平號慟日食麦䬳一枚如此五日人曰誰非王臣何獨如此原平泣而荅曰吾家見異先朝蒙褒賛之賞不能報恩私心感慟耳齊書曰衡陽王鈞年五歳所生嫗貴人病便知􅃤悴左右依常以五色䬳飴之不肯食曰湏待姨差又曰虞悰少以孝聞父病不欲見人雖子弟亦不得前時悰年十二三晝夜伏戸外問内竪消息未知輙嗚咽流涕如此者百餘日及亡終䘮唯日食麥䬳二枚南史曰沈衆陳武帝時兼起部尚書監起太極殿恒卧布􅂁芒􅂂以麻繩爲帶又囊麥䬳以噉范汪祠制曰仲夏薦角􅁰䉽夏統別傳注曰蘝􅀄生合米擣作䉽䭔埤蒼曰䭔膏䭔也􅀏林曰南方人至京師者人戒之曰汝得物唯食愼勿問主人入門内見馬屎便食之覺臰乃止後詣貴官爲設䭔因視曰戒故昔且當勿食時鏡新書曰粔籹密餌即糖䭔龍山食有糖䭔菊酒太平御覽卷第八百五十一
