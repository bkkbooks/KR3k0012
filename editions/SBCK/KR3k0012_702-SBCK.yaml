front:
  text: 太平御覽卷第七百二
  hash: sha256:07926a82412d6ae59e88a3ec625a506dac3daff2250cc30233d61e5df879b5f9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_702-1a}
body:
  text: 服用部扇盖扇楊雄方言曰扇自􅀜而東謂之扇自􅀜而西謂之箑世夲曰武王作箑帝王丗紀曰武王自盟津還返于國見暍人王自左擁而以扇之續漢書曰梁兾輿服之制作擁身扇東觀漢記曰黄香至孝夏則以扇侍于親側魏畧曰韓宣字景然爲丞相軍謀􅁺歩入宫門内與臨淄侯相遇時新雨地有泥潦宣礙不得去以扇自障晉書曰武帝太始中􅀶選良家以充後宫先下書禁天下嫁娶使宦者馳傳州縣召充選者使楊后選所取后妬不取端正好唯取長白時卞蕃女有美色帝舉扇彰面語后云卞蕃女好后曰蕃三丗后族不冝枉以卑位帝乃止又曰何植字元幹常以􅅞筆織扇爲業以奉供養又曰􅁃亮出鎭於外以帝舅故執朝權王導不能平嘗遇西風起輙舉扇自蔽曰元規塵汚人又曰王羲之字逸少居蕺山見一老姥持六角扇賣之羲之書其扇各爲五字姥􅀄歎惋因謂姥曰无苦但言是王右軍書以求百金價姥如言人競買之後姥復將數扇來請書羲之不荅又顧榮傳曰廣陵相陳敏反渡江攻􅀭州刺史劉機阻兵據州郡有鼎峙之意遣頋榮歛舟於岸敏率萬人岀不􅀗濟榮自麾羽扇敏衆大潰也晉中興書曰安帝義熈元年禁絹扇及摴蒲續晉陽秋曰謝安賞􅀽宏機對辯速宏爲東陽郡時賢祖道治亭安起執宏手顧左右取一扇授云聊以贈行宏應聲曰輙當奉􅀭仁風慰彼􅀺庶合坐稱其率要又曰謝安郷人有罷中􅀫縣者還詣安問其歸貨荅曰嶺南彫􅁦唯有五萬蒲葵扇謂非時爲滯貨安乃取其一中者捉之於是京都士庶競而慕焉増價數倍旬日則無所賣宋書曰明帝王皇后上嘗宫内大集而祼婦人觀之以爲歡􅀏后以扇鄣面獨無所言又明㳟王后傳曰廢帝失德太后毎加勗譬始猶見順後狂慝稍甚太后嘗賜帝玉柄毛扇帝嫌毛柄不華因此欲加酖害令太醫煑藥左右止之乃止又曰范曄謀逆􅀍擊上有白團扇甚佳送曄令書詩賦美句曄受旨援筆而書曰去白日之炤炤襲長夜之悠悠上循覽悽然齊書曰竟陵王子良孫賁字文奐形不滿六尺神識耿介㓜好學有文才能書善􅀞於扇上圖山水咫尺之内便覺萬里爲遥又曰劉祥字顯徴輕言肆行不避髙下建元中爲正貟郎司徒禇彦回入朝以腰扇鄣日祥從側過曰作如此舉止羞面見人扇鄣何益彦回曰寒士不遜祥曰不能殺􅀽劉安得免寒士又曰蕭子顯頗􅀒才氣反掌選見九流賔客不與交言但舉扇一撝而巳衣冠竊恨梁書曰臨川王宏子正表糿不慧常執白團扇湘東王取題八字銘玩之正信不知嗤之終常摇握又曰栁惲早有令名少工篇什爲詩云亭皐木葉下隴首秋雲飛琅瑘王融見而嗟賞因書齋壁及所執白團扇南史張敷字景胤生而母亡年數􅀊問之雖童蒙便有感慕之色至十􅀊許求母遺物而散施巳盡唯得一􅀞扇乃緘録之毎至感思輙開笥流涕又曰羊欣字敬元㑹稽王丗子元顯每使書扇常不奉命元顯怒乃以爲後軍府舎人又曰何戢美容儀動止與禇彦回相慕時人呼爲小禇公家業富盛性又華侈衣􅀍服飾極爲奢麗出爲呉興太守頗好􅀞扇宋武賜戢蟬雀扇善􅀞者顧景秀所􅀞時呉郡陸􅊥微顧寳元皆能􅀞歎其巧絶戢因王晏獻之後魏書曰尓朱弼字輔伯節閔帝時封河間郡公尋爲青州刺史韓陵之敗欲奔梁數日與左右割扇爲約弼帳下都督馮紹隆爲弼信待說弼曰今方同契闊冝當心􅄋血示衆以爲信弼從之大集部下弼乃踞胡牀令紹隆持刀破心紹隆因推刃殺之唐書曰中宗爲皇太子天后以時熱令皇太子外朝用扇鄣日太子讓之詔不許太公六韜云將冬不衣裘將夏不操扇名禮將之也管子曰夏行五政三曰禁扇去笠淮南子曰失火而鑿池披裘而用扇不能救也又曰夫夏日不披裘非愛之也煖有餘於身也冬日不用箑者非簡之也清有餘也抱朴子曰風不輟則扇不用日不岀則燭不息春秋繁露曰以龍致雨以扇逐暑崔豹古今注曰雉尾扇起於殷髙宗有雊雉之祥服章多用翟羽周制以爲皇后夫人車服輦車有翣即緝雉羽爲之以障翳風塵也漢朝乗輿服之後以賜梁孝王魏晉以來以爲常准諸王皆得用之又曰鄣扇長柄扇也漢丗多豪俠爲雉尾而制長扇也又曰五明扇舜所作也旣受堯禪廣開視聽求賢人以自輔故作五明扇秦漢公卿大夫皆用之魏晉非乗輿不得用也東宫舊事曰皇太子􅀄拜供漆要弱青竹扇各一太子納妃同心扇三十單竹扇二十脩復山陵故事曰􅀇宫中用絹團扇六枚西京雜記曰朱買臣爲㑹稽太守懷章綬還至金堂而國人未知也所知錢榖見其墨露乃勞之曰得无罷乎遺以紈扇買臣至郡引爲上客又曰長安巧工丁緩作七輪扇連七輪大皆徑尺相連續一人運之則滿堂寒戰又曰趙飛燕爲皇后其弟上遺雲母扇五明扇七華扇翟扇蟬翼扇又曰天子夏則設羽扇冬則設繒扇晉中興徴祥說曰舊爲羽扇柄者刻木以象骨翮用十毛取全數也中興􅀄王敦始改用長柄使其下出可捉而減其羽用八識者以爲服妖也柄使可執者國柄之象毛減用八是羽翮損少而飛羽不終之應也鄴中記曰石虎作雲母五明金薄莫難扇此一扇之名也薄打純金如蟬翼二面彩漆􅀞列仙竒鳥異獸其五明方中辟方三寸或五寸隨扇大小雲母帖其中細縷縫爲其際唯􅀞而彩色明徹看之如謂可取故名莫難也虎出時以此扇挾乗輿亦用象牙桃枝扇其上竹或緑沉色或木蘭色或作紫紺色或作鬰金色異物志曰扶南國昔但知作大扇遣人持之不知人各自用也及今􅀬時各自用也拾遺録曰周昭王時􅂗脩國獻青鳯丹鵠各一雌一雄夏至取鵠翅爲扇一名施風一名條翮一名反影時有南歐獻二美女更摇此扇侍於王側丗說曰王大將軍在西朝時見周侯轉扇鄣靣而得住後度江左不能復尓王歎曰不知吾進伯仁退敦性强梁自少而長季倫斬妓曽無異色如斯傲恨惲於周顗斯不然之言又曰温嶠娶姑女旣婚交禮女以手披紗扇撫掌大􅀏我嫌是老奴果如所疑又曰羊孚作雪讃云資清以化乗氣以霏值象能鮮即㓗成暉桓胤遂以書扇語林曰諸􅁑武侯與宣王在渭濵將戰武侯乗素輿􅁑巾白羽扇指麾三軍三軍皆隨其進止又曰胡母彦國至湘州坐㕔事断官事􅈛時三伏中傍摇扇視事其兒子光從容顧謂曰彦國復何爲自貽伊戚又曰􅁃翼爲荆州都督以毛扇上城帝疑是故物侍中劉邵曰栢梁雲構匠者先居其下管弦繁奏夔牙光聆其音翼之止扇以好不以新季㳟聞之曰此人冝在帝左右俗說曰顧虎頭爲人􅀞扇作嵇阮而都不􅀧眼精主問之顧荅曰那可􅀧精􅀧精便語列仙傳曰介之推隨晉重耳去國後辭禄與母入介山從伯陽遊後丗見在東海王治賣扇搜神記曰魯少千山陽人漢文帝微服懷金欲問其道少千執象牙扇出應門續搜神記曰呉猛好道術嘗渡江以白羽扇畫水横流直過不用舟檝異苑曰髙平檀茂宗義熈中䘮亡其母劉氏夢見宗云方永違離今以此扇奉别母流涕􅁴於屏風間得扇上皆如蜘蛛網絡婦人集曰没太子妻季氏爲夫所遣婦與夫書并致安衆扇兩􅀟古詩曰綾扇如團月岀自機中素􅀞作􅁗女形乗鸞入煙露班婕妤扇詩曰新裂齊紈素鮮㓗如霜雪裁爲合歡扇團團似明月出入君懷䄂動揺微風發魏陳王曹植九華扇賦曰昔吾先君常侍得幸漢桓帝帝得賜尚方竹扇不方不貟其中結成文名曰九華其辭曰形五離而九折􅑪􅈊解而縷分放虬龍之蜿蟬法雲霓之烟煴因形致好不常厥儀方不應矩圎不中䂓隨皓腕以徐轉發惠風之微寒時氣清以芳厲紛飃動乎綺紈徐幹團扇賦曰於帷合歡之竒扇肇伊洛之纎素仰明月以取象規圎體之儀度傳咸狗脊扇賦曰盖卑以自居君子之經􅀌寡不穀王侯脩名尚不媿狗脊之爲號亦焉顧九華之妙形盖釋名曰盖在上覆盖人也通俗文曰張帛避雨謂之繖蓋禮檀弓下曰􅁦蓋不棄爲埋狗也左傳定曰齊侯伐晉夷儀􅁦無存死於霤下闘死於門霤下齊侯謂夷儀人曰得􅁦無存者以五家免給其五家命常不供役事乃得其尸公三禭之襚衣也殯三加遂深禮厚之與之犀軒直盖犀軒卿車直盖髙盖家語曰孔子將行命從者持盖旣而果􅀨聖人無所不通也又曰孔子將行雨無蓋門人曰啇也有焉孔子曰啇也之爲人也甚短於財吾聞與人交者推其長者違其短者故能以乆也史記曰五羖大夫相秦也勞不坐乗暑不張蓋漢書曰上官傑少時爲羽林郎從武帝上甘泉天大風車不得行解蓋投之傑奉蓋雖風常屬車􅀨下蓋輙御上竒其材力焉又曰黄覇爲揚州刺史三年宣帝詔賜車蓋特髙一尺以彰有德又王莽傳曰或言黄帝時建華蓋登仙莽乃造華蓋髙八丈一尺皆全瑵羽蓋載以秘機四輪車駕六馬輓者皆呼登山續漢書曰靈帝時講武平樂觀建十重五彩華蓋髙十丈建九重華蓋髙九丈又曰祠老子於濯龍中設華蓋八座東觀漢記曰隗囂破上歸過汧幸􅀕遵勞之時遵有疾詔賜重茵覆以御蓋後漢書曰光武東巡虞延從駕到魯還經封丘城門門小不容羽蓋封丘今東京縣也帝怒使撻御史延救之乃止事具門部呉志曰曹休入睆城陸遜破之權令左右以御蓋覆遜又曰周㤗字㓜平數戰有功孫權覆以御蓋江表傳曰青兼蓋也又曰劉基孫權愛敬之嘗從御樓舡上時􅀨甚權以蓋自覆又令覆基餘人不得也又曰賀齊爲將綺飾所乗舡青蓋絳幨晉安帝記曰桓􅀇遊於水南飄風飛其輗蓋後義兵起遂敗宋元嘉十年起居注曰御史中丞荀伯子奏左衛將軍何尚之公事每􅇁笠有虧體制建野笠於公門棄華繖而不御宋元嘉二十九年起居注曰訶羅單國奉孔雀盖一具齊書曰始安王遥光傳江祐􅀍誅東昬召遥光入殿告以祐罪遥光懼還省便陽狂號􅂘自此稱疾不復入臺先是遥光行還入風飄儀繖岀城外遥光後敗梁書曰王籍爲中散大夫彌日忽忌不樂乃至徒行市道不擇交遊有時途中見相識輙以笠傘覆靣南史曰殷孝祖與賊合戰毎常以鼔蓋自隨軍中人相謂曰殷統軍可謂死將至矣今與賊交鋒而以羽儀自摽顯若此射者十手攅射欲不斃得乎是日中流矢死又曰扶南其俗􅇁古具繖文子曰大丈夫恬然無思淡然無慮以天爲盖以地爲輿又宋玉大言賦曰圎天爲蓋方地爲輿淮南子曰蓋非撩不能蔽日輪非輻不能追疾然而撩蓋未足恃也撩盖骨也孔藂子曰夫子適郯郯子遇子於􅂗傾蓋而語終日而別命子路將束帛贈焉尉繚子曰呉起與􅁗人戰僕嗽之蓋足以蔽霜露􅀃苑曰田子方遇翟璜乗軒車戴華蓋疑以爲人君也崔豹古今注曰華蓋黄帝所作也與􅃖尤戰于􅃰鹿之野常有五色雲氣金枝玉葉於帝上有花蘤之象故因而作華蓋蘤韋委切又曰曲蓋太公所作武王伐紂大風折蓋太公因折蓋之形而制曲盖焉戰國常以賜將軍自漢朝乗輿用之因謂睥睨蓋有軍號者賜其一焉睥疋詣切睨五計切搜神記曰湖陂吏丁􅀄忽見少婦人姿容可愛青衣戴傘呼􅀄􅀄疑而待顧視婦自投波中是大蒼􅆩衣傘皆是蓮荷異苑曰義熈中烏陽小吏見女子戴青繖姿容甚麗遂要之女至多電光乃是大狸抽刀研殺其繖乃枯荷葉事具獸部眞人周君傳曰紫陽真人周義山子通合㑹仙人在金屋銅門之内以紫雲爲蓋眞人王君傳曰太上大道君授務成君繡羽蓋􅀟明珠俗􅀃曰徐干木年少時嘗夜夢見烏從天上飛銜繖樹其廷中如此凢三過銜來作惡聲而去徐後果得繖遂以惡終青烏子葬書曰作墓發土夕夢見􅇁繖入市者冨貴楚辭曰孔蓋􅀆翠旍言以孔雀翅爲車蓋翠羽爲旌旗也登九天􅀆撫彗星又曰乗水車􅀆荷蓋駕雨龍􅀆􅆖螭宋玉髙唐賦曰蜺爲旍翠爲蓋風起雨霽千里而逝司馬相如大人賦曰屯余車其萬乗􅀆綷雲而樹華旗綷于對切阮籍清思賦曰折丹木以蔽陽竦芝蓋之三重劉植魯都賦曰蓋如飛鵠馬如游魚宋玉大言賦曰圎天爲蓋方地爲輿太平御覽卷第七百二
