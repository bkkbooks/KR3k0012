front:
  text: 太平御覽卷第十九
  hash: sha256:aae33e4cb2490fb2221b00a42ff8fe9c5565608d7b87446c4bd0c8f8043205fa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_019-1a}
body:
  text: 時序部四春中史記曰孝惠帝曾春出遊離宫叔孫生曰古者有春甞果今方櫻桃熟願陛下因取櫻桃獻宗廟上乃許之諸果獻由此興也又曰正月爲端月端首也春秋左傳曰履端於始又天官書曰明庶風居東方明庶明衆物盡出也二月律中夾鍾者言萬物隂陽相夾厠也其於十二子爲卯卯之爲言萬物茂也其於十母爲甲乙甲者萬物割符甲而出也乙者言萬物生軋軋也南至於氐言萬物皆至也又曰漢丗帝以正月上辛祠太一甘泉以昏祠到明而終常有流星經於祠壇上使童子童女七十人俱歌春歌青陽夏歌朱明秋歌西皓西方少昊冬歌􅀇􅁳漢書曰孟春之月群居者將散行人振木鐸徇于路以采詩獻之太師比其音聲以聞于天子又曰王温舒事張湯爲酷吏及爲河内太守及春温舒頓足曰嗟呼令冬益展一月足了吾事矣其不愛人如此也又曰宣帝時魏相奏請明經通知隂陽者四人各主一時時至明言所職以和隂陽如髙祖時令謁者趙堯舉春李辭舉夏倪陽舉秋貢禹舉冬之􅀋宣帝從之東觀漢記曰章帝行幸勑御史司空道橋所過歷樹木方春月無得有所伐輅車可引避也後漢書曰張奐爲武威太守其俗多妖忌凡二月五日産子及與父母同月者悉殺之奐示以義方嚴加賞罰風俗遂改百姓爲立祠又曰章帝建初三年正月祀五帝於明堂遂登靈臺望雲物赦天下又曰元和二年春正月詔曰令人有産子者後無筭三嵗諸懷姙者賜月養榖復其夫勿筭一嵗著以爲令又詔三公曰方春生養萬物莩甲冝助萌牙以育時物其令有司罪非殊死且勿案驗又丙午詔曰畿内七十巳上暮春赴京師將行養老之禮又曰王莽下書曰夫三皇象春五帝象夏三王象秋五伯象冬皇王德運也伯者繼空續乏以成曆數故其道駮謝承後漢書曰鄭弘爲臨淮太守春行有兩白鹿隨車夾轂而行弘後爲太尉續漢書曰太守常以春行縣所至縣勸人農桑振救乏絶第五倫爲太守因春行見鄭弘竒之署督郵鄭弘時爲郷嗇夫又律曆志曰日行東陸謂之春魏略曰孟康爲弘農守清平領群吏二百餘人渉春遣休常四分遣一分無􅀫諾晉書曰郭黁奴郎反西平人也少明於易仕郡主簿張天錫末年苻氏毎有西伐之問太守趙凝使黁筮之黁曰􅀂郡内二月十五日失囚者東軍當至凉祚必終凝乃申條屬縣至十五日鮮卑折握送馬於凝凝怒其非駿幽之厩内鮮卑懼而夜遁凝以告黁黁曰是也國家將亡弗可復振春秋繁露曰春喜氣故生又曰春之猶言偆偆者音蠢又癡准反喜樂之貌也春秋元命包曰春者神明推移精華結紐神明猶隂陽也相推使物精華結成紐結要也又曰春含名出位東方動春明逹春之言蠢東之言動合此名以自明自達山六合俱生萬物應節雖於時爲春以其蠢動無節應此時節也五行並起各以名利自六合俱生以通五行各有隂陽交合故能然也其精青龍龍之言萌也獸之妙莫􅀂龍故青萌以名之隂中之陽也老子曰衆人熈熙􅀂享太牢如登春臺莊子曰夫春氣發而百草生正得秋而萬寳成夫春與秋豈無得而然哉天道巳行矣春秋主生成皆得自然之道故不爲又曰春夏先秋冬後四時之序也萬物化則萌區有壯盛衰之殺變化之流也又曰舜以天下讓善卷善卷曰予立於宇宙之中冬日衣皮毛夏日衣葛絺春耕夏種形足以勞動秋収冬歛身足以休食日出而作日入而息逍遥於天地之間而心意自得吾何以天下爲哉文子曰政失於春嵗星盈縮不居其常春政不失禾􅁰滋又曰因春而生因秋而殺所生不德所殺不怨則幾於道矣尸子曰翔風瑞風也一名景風一名惠風春爲發生夏爲長嬴秋爲収成冬爲安寜爾雅以爲四時之別名也又曰春爲忠也東方爲春春動也是故鳥獸孕榮華生萬物遂忠之志也鶡冠子曰斗柄指東天下皆春列子曰荆之南有冥靈者五百嵗爲春五百嵗爲秋上古有大椿者以八千嵗爲春八千嵗爲秋管子曰孟春之朝君自聽朝論爵賞管子曰隣人謂展禽曰魯聘夫子夫子三黜無憂色何展禽曰春風鼓百草敷蔚吾不知其茂秋霜降百草零落吾不知其枯枯茂非四時之悲欣榮辱非吾心之憂喜淮南子曰何謂五星東方木也其帝太昊太昊庖犧氏天下號也死託於東方帝也其佐勾芒執規而治春漢書魏相上書太昊乘震執規治春又曰日陽之主也是故春則羣獸除除冬毛微墮也又曰太隂治春則欲行柔惠温凉木衡人也故柔凉也又曰春爲規規之爲度也轉而不復圎而不規復遏也堄轉也復而不縱廣大以寛感動有理發通有紀優優簡簡百怨不起優優簡簡寛舒之皃也規度不失生氣乃理氣􅀋理逹又曰六合孟春與孟秋各合孟春始盈孟秋始縮盈長也縮短也故正月失政七月凉風不至又曰仲春始出仲秋始内出二月播種内八月始収歛又曰春肅秋榮冬雷夏霜皆賊氣之所生又曰四時者春生夏長秋収冬藏取與有節出入有時開闔張歙不失其序歙讀曰翕又曰春女悲秋士哀知物化矣周禮仲春之月令媒氏㑹男女女當外成於夫家骨􅁏相離故女悲秋金氣用事戰士執兵勝敗􅀂化故士哀也又曰孟春之月東宫御女青色衣青采鼓琴瑟春王東方故處東宫也琴瑟木也春木生故鼓其兵矛有鋒銳以萬物錢地如生也其畜羊羊木土之母故畜之也二月官倉其樹杏二月播種故官倉也杏有核在中象隂在内陽在外也故其樹杏也三月官郷其樹李三月折民户口故言郷也李亦有核說與杏同又曰季春三月豐隆乃出將其􅀨也豐隆雷也至秋三月地氣不藏乃収其殺百虫蟄伏静居閉户殺氣安靜青女乃出以降霜雪青女天神青天王女主霜雪也十二時之氣以至于仲春二月之夕乃布収其藏而閉其寒収歛其所藏而出布之其隂塞全不得發泚也女夷鼓歌以司天和以長百榖禽獸草木女夷主春夏養長之中也蔡邕月令章句曰季春戴鵀降於桑又曰仲春之月天子獻羔開氷又曰仲春􅀇鳥至􅀇鳥鷰也崔寔四人月令曰二月祠太社之日薦韭卯于祖禰五行志曰於易震在東方爲春爲木者也兊在西方爲秋爲金离在南方爲夏爲火坎在北方爲冬爲水春與秋日夜分寒暑平是以金木之氣易以相變故貌傷則致秋隂常􅀨言傷則致春陽常旱也至於冬夏日夜相反謂夏日長夜短冬日短夜長寒暑殊絶水火之氣不得相併故視傷常燠聽傷常寒者其氣然也又曰夾鍾言隂夾􅂇太蔟宣四方之氣而出鍾物也位於卯在二月東陽記曰山南有春草巖出龍鬚多藥物西京雜記曰賈佩蘭云在宮時正月上辰出池邊盥濯食蓬餌以去祅邪荆州記曰陸凱與路曄爲友在江南􅀉梅花一枝詣長安與曄并贈詩云折花奉􅁗使􅀉與隴頭人江南無所有聊􅀉一枝春荆楚嵗時記曰正月夜多􅀑鳥度家家槌床打户捩狗耳㓕燈燭以禳之􅀇中記云此鳥名姑􅀗一名天帝女一名隱飛鳥一名夜行逰女好取人女子養之有小兒之家即以血􅀧其衣以爲誌故丗人名爲􅀑鳥荆州彌多斯言信矣又曰正月未日夜蘆苣火照井厠中百􅀑走􅀶物志曰宋國有田夫常衣黂分衮反緼僅以過冬曁春東作自曝於日不知天下之有廣夏奥室綿纊狐貉頋謂其妻曰背日之暄人莫知者以獻吾君將有賞臨海異物志曰鵙鴂一名田䳌春三月鳴晝夜不止音聲自呼止俗言取母子塗其口兩邊皆赤上天自言乞恩至當陸子熟鳴乃得止耳又曰春風甘露生育萬物吕氏春秋曰天行不信不能成嵗地安不信草木不茂春之德風風不信其華不盛則果實不生又曰仲春之月􅀇鳥至之日以太牢祠于髙禖蔡邕曰髙禖神名也又曰仲春之月先雷三日奮鐸以令于兆民曰雷且發聲有不戒其容止者生子不備必有凶灾不戒容止謂以雷霆合房室之者生子必有瘖躄癡狂之疾矣耕者少舎皆耕在野少有舎於都邑者也晏子春秋曰齊景公夏遊獵又起大臺之役晏子諌曰春夏起役游獵奪民農時國家空虗不可景公曰吾聞相賢者國治臣忠者主逸吾年無幾矣言將老欲遂吾所樂卒即律反吾所好子其息矣晏子曰文王不敢盤于游田故國昌而民安楚靈不廢乾谿之役起章華之臺而民叛之今君不思將危社稷而爲諸侯􅀏臣聞忠不避死諌不違罪君不聽臣臣將逝矣景公曰唯唯唯唯從其諌也楊子法言曰或曰爲政先殺後教歟曰於乎天先秋而後春乎將先春而後秋乎梁元帝纂要曰春亦曰發生芳春青春陽春三春九春風曰陽風暄風柔風惠風景曰媚景和景韶景時曰良時嘉時辰曰良辰嘉辰芳辰節曰芳節嘉節韶節淑節草曰弱草芳卉木曰華木華樹芳林芳樹林曰茂林鳥曰陽鳥時鳥陽禽􅀱鳥時禽好禽夏書曰􅀛人之職凡攻􅀛用春時各以其物入于􅀛室六􅀛各異室也秋取􅀛及萬物成也攻治也治􅀛骨以春是時乾解不發傷也上春釁􅀛􅀕祀先卜釁者殺性以血塗之也鄭司農云􅀕祀先卜者卜其日與其牲􅀇謂先始用卜筮者言􅀕祀尊天地也丗夲作曰巫咸作筮卜未聞其人也是上春者夏正建寅之月月令孟冬云釁祀􅀛筞相㸦矣􅁗以十月建亥爲􅀊首則月令􅁗丗之書亦或欲以歳首釁􅀛耳筮人上春相筮相謂更選擇其􅆱􅀛嵗易者周書時訓曰驚蟄二月節桃始花時訓云桃􅀂不花是謂否塞又云倉庫灾鶬鶊鳴時訓云􅀂不鳴即下不從上鷹化爲鳩時訓云􅀂不化即㓂賊數起春分二月中􅀇鳥至時訓云􅀇鳥不至即婦人不振雷乃發聲時訓云雷不發聲即諸侯失民又云逺人不服始電時訓云電􅀂不見即人無威振太平御覽卷第十九
