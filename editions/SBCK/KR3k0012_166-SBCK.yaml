front:
  text: 太平御覽卷第一百六十六州郡部十二
  hash: sha256:2bfe9369f76c6f5e9a97718e2c68f412cec383463e9a9cdb61a73eaee10cb09a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_166-1a}
body:
  text: 劒南道劒緜梓遂益漢彭蜀卭普雅瀘茂翼當悉静拓恭維奉嶲姚􅀺龍松嘉簡陵眉榮資戎劒州圖經曰普安郡禹貢梁州之域􅁗之蜀郡漢屬廣漢郡之梓橦縣華陽國志曰諸􅁑亮相蜀鑿石架空爲飛閣道以通蜀漢即此郡三國志曰鄧艾伐蜀自隂平縣景谷歩劒閣道懸車束馬逕出油江而至大漢是此地也蜀記曰梓橦縣有五婦山一名五婦臺􅁗遺蜀美女五人蜀遣五丁迎女至梓橦五丁蹋地大呼驚五女並化爲石郡國志曰梓橦縣北有華容水則蜀都賦曰却背華容是也緜州十道志曰綿州巴西郡禹貢梁州之域周併梁入雍州地春秋戰國屬蜀侯國􅁗爲蜀郡漢廣漢郡地今州即廣漢郡之涪縣也九州記曰緜州之賔賨人旋人皆夷也郡國志曰勁勇銳氣而善舞故古有巴渝舞蜀記曰左緜緋紅三川所尚緜州左緜郡有小江所染緋紅於此水灌後益鮮人之所重宋書曰范栢年梓橦人明帝問卿郷土有貪泉不栢年曰臣梁益之地有廉泉讓水不聞有貪泉帝嘉之即以爲蜀郡太守廉讓水在昌期縣郡縣志曰神泉縣有泉十四甘香異常錮疾飲之即差故曰神泉漢書志曰涪屬廣漢郡有孱亭莽曰統眭劭曰涪水出廣漢南入漢梓州十道志曰梓州梓橦郡禹貢梁州之域漢武分置廣漢郡漢書曰文帝以蜀道銅山賜鄧通鑄錢即今銅山縣也蜀志曰先主入蜀攻劉璋遣諸􅁑亮等分定州郡略地至郪百姓以牛酒勞軍又曰姜維聞諸􅁑亮曕破乃引軍由廣漢郪道以審虚實十道記曰廣漢之地有塩井銅山之冨本禹南夷周末􅁗併爲郡有􅂼食果實之饒九州要記曰玄武山一名赤雀山一名冝君山山有鹿尾入貢又華陽國志曰玄武山一名三嵎山山出龍骨傳云龍昇不逹墜此民取以入藥用玄武縣因山得名遂州十道志曰遂州遂寜郡禹貢梁州之域漢分梁州置廣漢郡今州又爲廣漢縣九州要記曰青石縣有青石山天下青石無佳於此可爲鍾磬又郡國志曰昔巴蜀爭界歷􅀊不决漢髙八年山自裂如索所界巴蜀之民懼天戒乃息所爭益州十道志曰益州成都府古梁州巴濮庸蜀之地在􅁗爲漢中巴蜀三郡地釋名曰益扼也所在之地險阨應劭地里風俗記曰疆壤益廣故號益州史記曰周太王逾梁山之歧山一年成邑二年成都故有成都之名又曰􅁗惠王時苴蜀相攻各告急於􅁗􅁗欲先伐韓司馬錯曰不如先伐蜀夫蜀戎狄之長也有桀之亂以􅁗攻之譬使犲狼逐群羊也又有禁止暴亂之名今攻韓周自知失九鼎韓自知亡三川二國併力合謀而求解于楚魏臣竊危之王曰善遂滅蜀漢書曰宣帝時方士上言益州部有金馬碧雞神帝令王襃入蜀祀之揚雄蜀王本紀曰蜀之先稱王者有蠶叢折權魚易俾明是時椎髻左祍不曉文字未有禮樂從開明巳上至蠶叢凢四千歳次曰伯雍又次曰魚尾尾田於湔山得仙後有王曰杜宇出天墮山又有朱提氏女名曰利自江源而出爲宇妻乃自立爲蜀王號曰望帝移居郫邑十三州志曰當七國稱王獨杜宇稱帝於蜀以襃科爲前門熊耳靈􅀜爲後户玉壘峨眉爲池澤汶山爲畜牧中南爲園苑時有荆人是後荆地有一死者名鼈冷其尸亡至汶山却更生見望帝帝以爲蜀相時巫山壅江蜀地洪水望帝使鼈冷鑿巫山治水有功望帝自以德薄乃委國禪鼈冷號曰開明遂自亡去化爲子䂓故蜀人聞鳴曰我望帝也又云望帝使鼈冷治水而􅁋其妻冷還帝慙遂化爲子䂓杜宇死時適二月而子䂓鳴故蜀人憐之皆起自開明巳下五葉始立宗廟時蜀有五丁力士能徙山岳毎一王死五丁輙爲立大石以誌墓今石井是也號曰井里成都記曰郡城即􅁗惠王使張儀築以象咸陽沃野千里號曰陸海九州志曰益州城􅀄累築不立忽有大􅀛周行旋走因其行築之遂得堅固故曰􅀛城南史曰宋太始􅀄益州市橋忽生一州有道士栁石見之曰當有貴王臨州必王勝喜也及齊永明二年武帝遣始興王爲益州勝喜者即始興反語也續漢書郡國志曰益州部漢中巴廣漢蜀犍爲越嶲䍧牱益永昌凢九郡華陽國志曰成都夷里橋南岸道西有城即錦城一曰錦官又曰錦里又曰蜀􅀄少文教文翁爲蜀郡太守立精舎學堂以􅀠其俗因是文教聿興今有文翁堂在大城内漢州圗經曰漢州德陽縣土地同益州􅁗屬蜀郡漢屬廣漢郡後漢因之兼置益州領郡十二蜀記曰益州謂之三蜀廣漢其一也後漢書曰雒城南毎隂雨常有哭聲和帝時陳寵爲太守聞之有勑令收塟骸骨哭聲遂絶蜀記曰金堂縣古有金舡沉江之東岸民於水中徃徃見之彭州十道志曰彭州濛陽郡本漢繁縣宋置晉壽陽圖經曰唐垂拱二年以九隴縣置彭州取古天彭􅀜以爲名周地圖記曰宋元嘉九年有樵人逐麚所趨險絕進入石穴行數十步豁然平博問是何所人荅云小成都後更往求之不知所在地理志曰九隴縣晉置以縣有九曲山爲名蜀州十道志曰蜀州唐安郡本漢江源縣屬蜀郡莽曰卭原魏志曰蜀州鳴鶴山張陵客蜀學道于此山造作符書以惑百姓又益州記張陵登仙之所傳云陵爲蝮蛇所吸人以爲登仙蜀記曰靑州縣因山得名山上有黃帝授道壇又􅀇中記云山有穴潛行分爲三道各通一處卭州十道志曰卭州臨卭郡禹貢梁州之域漢武置十三州在益州之部周地圗記曰梁武陵王蕭紀於蒲水口改置卭州南郡卭來山因以爲名史記曰蜀卓氏之先趙人秦破趙卓氏獨夫妻推輦而行曰吾聞汶山之下沃野有蹲鴟乃求逺遷致之臨卭因銅山鑄錢此也蜀記曰漢張騫奉使尋河源得髙節竹植於卭山號曰卭竹今縁山皆是可爲杖蜀志曰臨卭有火井諸葛亮一窺更盛博物志曰後人以家火投之火卽滅至今不然普州十道志曰普州安岳郡禹貢梁州之域漢武十三州在益州之部今州境則漢之資中牛鞞墊江後漢之德陽等四縣雅州十道志曰雅州廬山郡禹貢梁州之域漢武十三州在益州之部即􅁗嚴道縣也蜀記曰􅁗滅楚徙楚嚴王之族於此故謂之嚴道漢志曰嚴道屬蜀郡卭來山卭水所出東入青衣王莽曰嚴治郡國志曰漢源縣有離崖即蜀守李冰所鑿離堆即古雅也嚴道縣有九折坂即王陽迴轡之所瀘州十道志曰瀘州瀘川郡禹貢梁州之域春秋戰國時爲郡子國􅁗蜀巴郡漢屬犍爲郡漢志曰江陽屬犍爲郡十道志曰瀘州本漢江陽縣地諸􅁑亮出師表曰五月渡瀘深入不毛茂州十道志曰茂州通化郡禹貢梁州之域夲冉駹國漢以爲郡史記曰南越破後冉駹等皆震懼請臣置吏以冉駹爲汶山郡守翼州圖經曰翼州臨翼郡􅁗之土地與益州同二漢屬蜀郡夲漢之蠶陵也漢志曰蠶陵屬蜀郡王莽曰歩昌當州十道志曰當州江源郡禹貢梁州之域周爲雍州之境後周書曰天和元年鴈門公紇干略於此討渾胡因置同昌郡悉州十道志曰悉州歸誠郡禹貢梁州之域古西羗地圖經曰唐顯慶三年割當州三十里左封縣界内有悉唐川因立爲悉州靜州圖經曰靜州静川郡土地與當州同唐永徽四年置靜州於唐縣以理夷落拓州圖經曰拓州蓬山郡土地與當州同唐顯慶三年於此置拓州取其開拓封疆爲郡之名恭州圖經曰恭州化郡北接土蕃土地與當州同唐顯慶中置恭州取恭慕王化爲名維州十道志曰維州維川郡蜀志曰姜維馬忠督將軍張嶷北討汶山叛羗即此也圖經曰武德中白苟羗首領以地内附因於姜維故城置維州以領之奉州圖經曰奉州雲山郡夲蠻夷之地南接􅁟蕃爲夷落之極塞武德中羗夷内附因立奉州取其順奉王命爲名嶲州十道志曰嶲州越嶲郡本益州西外夷漢􅀄爲卭都國史記曰西南夷滇以北居君長十數卭都最大漢志曰越嶲郡武帝元鼎六年開莽曰集嶲屬益州應劭曰故卭都國也有嶲水言越以此水彰休盛也九州要記曰嶲之西夷人身青而有文如龍鱗慱物志曰越嶲國有牛稍割取􅁏經日必復生如故又玄中記曰割而復生名曰及牛十道記曰越嶲有瀘水四時多瘴氣三四月間發人衝之立死非時中人多悶絶唯五月上伏即無害故諸􅁑亮征越嶲上䟽曰五月渡瀘深入不毛又地記曰今昆明道渡所見有武侯道在又十道記曰水浚而巉石􅁟人以牛皮爲舩方渉津涘九州要記曰臺登縣有奴諾川鸚鵡山黒水之間􅀂水出其下即黄帝子昌意降居􅀂水是此漢志曰旄牛屬蜀郡鮮水出徼外南入􅀂水􅀂水亦出徼外南至大莋旄牛即今臺登縣姚州十道志曰姚州雲南郡蓋夷越之地亦爲滇王國漢武開之置益州部有滇池澤後因爲益州之雲南弄㨂二縣也漢志曰益州郡武帝元封二年開王莽曰就新故滇王國也有滇池大澤又有弄㨂縣焉華陽國志曰滇漢勾町夜郎葉榆同師舊堂侯王國以十數編髮左袵隨畜遷徙莫能相禦楚項襄王遣將軍莊蹻泝沆水出苴蘭以伐夜郎而􅁗奪楚黔中地無路反遂留王之是爲莊王􅀺州圖經曰􅀺州洪源郡漢爲沉􅀺郡宋齊以來並爲沉􅀺郡後周破羗夷立􅀺州龍州十道志曰龍州江油郡􅁗漢及魏不置郡縣魏志曰景元四年諸軍征蜀鄧艾自隂平行無人之地七百餘里鑿山通道造作橋閣山髙谷深至爲險難艾以氊自裏轉推而下將士皆攀木縁崖魚貫而進先登至江油即此地也周地圖記曰江油帥楊李二姓各自稱蕃於梁至後魏武帝得其地置江油郡西魏於此立龍州松州十道志曰松州交川郡禹貢梁州之域又爲雍州之域􅁗漢諸羗居焉圖經曰郡有甘松嶺因以名郡山海經曰甘松嶺亦謂之松桑嶺江水發源於此江源記曰平康縣有羊膓嶺大江發源之所嘉州十道志曰嘉州犍爲郡禹貢梁州之域漢犍爲郡之南安縣史記曰漢武使唐蒙伐西戎得夜郎國遂立犍爲郡漢志曰青衣屬蜀郡順帝改名漢嘉十道志曰周武保定元年於此置青州遥取漢青衣縣爲名宣政二年改爲嘉州華陽國志曰青衣有沫水漢志蜀李冰鑿離塠避沫水之害又益州記曰青衣神號雷塠廟班固以爲離塠益州記曰峨眉山兩山相對望之如峨眉簡州十道志曰簡州陽安郡禹貢梁州之域漢犍爲之牛鞞縣地華陽國志曰牛鞞縣有陽明井今在郡北十里九州要記曰簡州在赤水之北今有絳水在州南周地圖記曰晉義熈末刺史朱齡石率建平人征蜀仍於東山立金戍後魏平蜀改爲金水郡陵州十道志曰陵州仁壽郡禹貢梁州之域漢犍爲郡之武陽縣東境也郡國志曰昔張陵於此得鹽井祠玉女於井内因謂之陵井郡因井得名益州記曰郡有東嵎三山相對去陵井百里郡國志曰有鼎鼻山周之九鼎淪一於此故後人徃徃見鼎耳因名之又曰郡有朝女山昔有朝祖女於此山得道今足跡尚存故名朝女山眉州十道志曰眉州通義郡禹貢梁州之域犍爲郡之武陽南境周地圖記曰梁武帝太清二年武陵王蕭紀開通外水立青州於通􅁩郡􅀯安縣北後魏二年平蜀三年改青州爲眉州用莪眉山爲名蜀記曰􅁗惠王使張儀司馬錯伐蜀蜀王開明拒之不利退至武陽見􅀗彭山縣即其地郡國志曰青神縣當羗蜀之要漢武使唐􅂪破西南夷即路始於此榮州十道志曰榮州和義郡禹貢梁州之域漢爲南安縣地屬犍爲郡九州要記曰和義郡古夜郎之地有成都市漢武時南中令使通􅈎道無功唐􅂪因殺之令曰恨不見成都市而死􅂪即立市如成都以殺之故曰成都市益州記曰旭川縣有馬鳴戌漢刺史韋枝夜過此地有神馬嘶漢中馬皆嘶以應之故以此名戍蜀記曰昔有女人於溪浣沙有大竹流水而觸之因有孕後生一子自立爲王因以竹爲姓漢武使唐􅂪伐䍧牱軒竹王因有此地人不忘其本立竹王廟祀之資州十道志曰資州資陽郡禹貢梁州之域漢爲犍爲郡之資中縣地周地圖記曰後魏廢帝二年於武康郡之陽安縣置資州陽安在今州北簡州界郡國志曰内江縣有水深百丈實郡川揔㑹之所戎州十道志曰戎州南溪郡春秋僰侯國􅁗惠王破滇池始通五尺道漢武得蜀故使唐􅂪理道於此而破䍧牱即此道也後爲僰道縣以屬犍爲郡郡國志曰南溪縣西三十里有魚津津南有鴛鴦坼益部耆舊傳曰僰道有張真者娶黄氏女名帛真因乗􅂳過江􅂳覆没帛求夫尸不得自沉於水積十四日乃抱夫屍岀於灘下故名鴛鴦坼卷第一百六十六終
