body:
  text: 妖異部二魂魄精魂魄易上繫曰精氣爲物遊魂爲變韓詩外傳曰溱與洧􅀃人也鄭國之俗二月上巳之日於兩水上招魂續魄祓除不祥故詩人願與所􅀃者俱徃觀也禮記檀弓下曰延陵季子適齊其反也其長子死葬於嬴􅀶之間旣封左􅃝右還其封且號者三曰骨􅁏歸復于土命也􅀂魂氣則無不之也無不之也而遂行又禮運曰體魄則降知氣在上死者北首生者南嚮又曰作其祝號玄酒以􅀕君與夫人交獻以嘉魂魄是謂合莫又郊特牲曰几􅀕愼諸此魂氣歸于天形魄歸于地故􅀕求諸隂陽之義也又􅀕義曰氣也者神之盛也魄也者􅀑之盛也左傳昭二曰子産適􅀳趙景子問焉曰伯有猶能爲􅀑乎子産曰能人生始化曰魄旣能隂陽曰魂用物精多則魂魄彊是以有精爽至於神明匹夫匹婦強死其魂魄猶能慿依於人以爲􅁋厲况良宵乎又昭公曰宋公宴飲使昭子右坐語相泣也樂祁佐退而告人曰今兹君與叔孫其皆死乎吾聞之哀樂可樂而哀而樂哀皆喪心也心之精爽是謂魂魄魂魄去之何以能乆孝經援神契田情者魂之使性者魄之使情生於隂以計念性生於陽以理契王肅喪服要記曰魯哀公葬其父孔子問曰寜設魂衣乎哀公曰魂衣起苑荆苑荆於山之下道逢寒死友人羊角哀徃迎其尸魂神之寒故作魂衣吾父生服錦繡死於衣􅀍何用魂衣爲史記曰髙祖謂沛父兄曰遊子悲故郷吾雖都關中万歳之後吾魂魄猶樂思沛也晉中興書曰東海王越妃裴痛越棺柩􅀍焚乃招魂葬越於丹徒中宗以爲非禮乃下詔曰夫􅃁以藏形廟以安神今丗招魂葬者是埋神也其禁之淮南子曰天氣爲魂地氣爲魄又曰魄問於魂曰道何以爲體曰以無有爲體魄曰無有無形也魄曰無有何得而問也魂曰吾直有所遇之耳視之無形聽之無聲謂之幽􅁳幽􅁳者所以喻道而非道也白虎通曰魂魄者何謂也魂猶伝伝行不休也少陽之氣故動不息人爲外魄者猶迫然着人也此少隂之氣象金石着人不移也魂者芸也情以除穢魄者迫也性以治内精神者何謂也精者静也太隂施化之氣也象水之化湏待任坐也神者恍惚大隂之氣出入無間抱朴子曰師言欲求長生當勤服大藥欲得通神當金水分形形分則自見其身三魂七魄而天靈地祇皆下接山川之神皆可役也又曰太一召魂魄丹法取五石封之以太一泥卒死三日以還者折齒内一丸以水送之入喉活活者皆見使者持節召之又曰人無賢愚皆知巳身之魂魄魂魄分去則人病盡去則死故分去術家有録之之法盡去則禮典有招魂之義此之爲物至近者也然與人俱生至於終身莫或自聞見之者豈可不聞見復言無乎又曰軫星逐􅀑張星拘魂東井還魄也異苑曰新野􅁃寔妻滎陽毛氏女義熈中五月曝曬席忽見女在席下薦上以驚怛便女真形在別牀如故不旬日而夭也仲夏忌舉牀第兹驗矣襄陽􅂄舊記曰羊公與鄒潤甫登峴山垂泣曰自有宇宙便有此山由來賢逹勝士登此逺望如我與卿者多矣皆湮滅無聞不可得知念此使人悲傷我百年後魂魄猶當登此山十洲記曰聚窟洲在西海中申未地洲上有大樹與楓木相似華葉香聞數百里名此爲反魂樹叩其樹樹亦能自聲聲如牛吼聞之者皆心震神駭伐其根心在玉釡中煑取汁更微火熟煎之如黒飴令可丸名驚精香或名之爲震靈丸或名之爲反生香或名之爲鳥精香或名之爲却死香一種五名斯靈物也香氣聞數百里死尸在地聞仍活􅀶物志曰援神契云五岳之神聖四瀆之精仁太山天帝孫也主召人魂東方萬物始故主人生命之長短王子年拾遺録曰融臯山上有飜魂稻言食者死更生楚辭曰招魂者宋王之所作也玉憐哀屈原忠而斥棄憂愁山澤魂魄放佚厥命將落故作招魂欲以復其精神延其年壽外陳四方之惡内崇楚國之羙以諷諌懷王兾其􅁴悟而還之也又招魂曰帝告巫陽曰有人在下我欲輔之魂魄離散汝筮與之使筮其所冝而與招其魂使復其精神精易上繫曰男女構精萬物化生禮記􅀕義曰衆生必死死必歸土此之謂􅀑骨􅁏斃于下隂爲野土其氣發􅀭于上爲昭明焄蒿悽愴此百物之精也神之著也唐書曰睿宗子申王撝之􅀄生則天嘗以示僧萬廻曰此兒是西域大樹之精養之冝兄弟則天甚恱始令列於兄弟之次管子曰故涸澤數百歳谷之不徙水之不絶者生慶忌慶忌者其􅃺􅀂人其長四寸衣黄衣冠黄冠戴黄盖乗小馬好疾馳以其名呼之可使千里外一日反報此涸澤之精也涸川水之精者生于蟡于蟡者一頭而兩身其􅃺如虵其長八尺以其名呼之可以取魚鼈此涸川水之精也列異傳曰桂陽太守張叔髙家居鄢陵里中有樹大十圍遣客斫之樹大血出客驚怖叔髙曰樹老汁赤耳斫之血大流出空處有一白頭翁出走髙以刀斫殺之所謂木石恠夔蝄蜽乎搜神記曰孔子厄於陳絃歌於館中夜有一人長九尺餘皂衣髙冠大咤聲動左右子路引出與戰于庭仆於地乃是大鯷魚也長九尺餘孔子歎曰此物也何爲來哉吾聞物老則群精依之因衰而至此其來也豈以吾遇厄絶糧從者病乎夫六畜之物及􅀛蛇魚鼈草木乆者神皆能爲妖恠故謂之五酉五酉五行之方皆有其物酉者老也故物老皆爲恠矣殺之則巳夫何患焉又曰吴先主時陸敬叔爲建安郡使人伐大樟樹下數斧有血出樹斷有物人靣狗身從樹中出敬叔曰此名彭侯乃烹食之味如狗又曰諸􅁑恪爲丹陽太守出獵兩山之間有物如小兒伸手引人恪令曳去故地死叅佐問之恪曰此事在白澤圖曰兩山之間有精如小兒名曰傒囊諸人未之見也異苑曰天門張某與村人共獵見大樹下有蓬菴似􅃦息處而無煙火湏􅁷一人形長七尺毛而不衣􅀒數頭猿與語不酬將歸閉之十餘日後送着先處孫皓時臨海得七精如人而有毛此將山精幽明録曰漢武帝與群臣宴未央殿方噉􅁰臛忽聞語云老臣尋覔不見梁上有一公長八九寸柱杖僂歩帝問之公下稽首不言目仰視屋俯指帝脚忽然不見問東方朔朔對曰其名爲藻兼水木之精也夏巢林冬潜河陛下興造宫室斬伐其居故來訴耳仰視屋者殿名未央也俯視脚者脚足也願止足於此也帝爲此暫止少時幸河者聞水底有絃歌之聲肴膳芬芳前梁上公及年少數人絳衣素帶皆長八九寸凌波而出或有挾樂噐者帝命坐於食案上老公曰老臣前昧死歸訴幸􅂪陛下即息斧斤全其居宅不勝欣躍故私相賀耳便治絃而歌聲小大無異於人而清婉繞梁帝欣恱勸酒乃獻帝一紫螺殻中有物􅃺如牛脂帝又曰可思以珍異見貽老公顧命取洞穴之寳一人下波淵底倐忽還得一大珠數寸明燿絶丗俄而公等忽然而去東方朔曰螺殻中是蛟髓以􅀓靣令人好顔色又女子在草中用之産易雷次宗豫章記曰永嘉末有大蛇長十餘丈斷道經過者蛇輙吸取吞噬巳百數道士吴猛與弟子殺蛇蛇死而蜀賊杜㢭滅􅀇中記曰千歳樹精爲青羊萬歳樹精爲青牛多出遊人間事具牛部又曰山精如人一足長三四尺食山蟹夜出晝藏人晝日不見夜聞其聲千歳蟾蜍食之又曰玉精爲白虎金精爲車馬銅精爲僮奴鈆精爲老婦􅀶物志曰山有夔其形如鼔一足澤有委虵􅃺如轂長轅見之者覇昔夏禹觀河見長人魚身出曰吾河精豈河伯也白澤圖曰厠之精名曰依􅀝青衣持白杖知其名呼之者除不知其名則死築室三年不居其中有小兒長三尺而無髪見人則掩鼻見之有福火之精名必方􅃺如鳥一足以其名呼之即去木之精名彭侯􅃺如黒狗無尾可烹之食之千載木其中有蟲名曰賈詘􅃺如豚食之如狗􅁏味又曰上有山林下有川泉地理之間生精名曰必方􅃺如鳥長尾此隂陽變化所生玉之精名岱委其狀如羙女衣青衣見之以桃戈刺之而呼其名則得金之精名倉􅃺如豚居人家使人不冝妻以其名呼之即去水之精名罔象其􅃺如小兒赤色大耳長爪以索􅅞之則可得烹之􅁻又曰故門之精名野􅃺如朱儒見人則拜以名呼之冝飲食又曰故宅之精名曰揮文又曰山冕其􅃺如虵一身兩頭五采文以其名呼之可使取金銀又曰故廢丘墓之精名曰元􅃺如老􅃥夫衣青衣而杵好春以其名呼之冝禾榖又曰故道徑之精名忌􅃺如野人以其名呼之使人不迷又曰道之精名作器􅃺如丈夫善眩人以其名呼之則去又曰故池之精名意􅃺如豚以其名呼之即去又曰故井之精名觀􅃺如羙女好吹簫以其名呼之即去又曰絶水有金者精名曰侯伯􅃺如人長五尺綵衣以其名呼之即去又曰故臺屋之精名兩貴􅃺如赤狗以其名呼之使人目明又曰左右有石水生其間水出流千歳不絶其精名曰喜􅃺如小兒黒色以名呼之可使取飲食又曰三軍所載精名曰賔滿􅃺如人頭無身赤目見人則轉以其名呼之即去又曰故水石者精名慶忌􅃺如人乗車盖日馳千里以其名呼之可使入水取魚又曰丘墓之精名狼􅀑善與人闘不休爲桃弓􅁄矢羽以鵄羽以射之狼􅀑爲飄風脫履投之不能化又曰故市精名曰毛門其􅃺如囷無手足以名呼之即去又曰室之精名徯龍如小兒長一尺四寸衣黒衣赤幘大冠帶劒持㦸以其名呼之即去又曰山之精名䕫􅃺如鼔一足而行以其名呼之可使取虎豹又曰故牧弊池之精名曰髠頓􅃺如牛無頭見人則逐人以其名呼之則去又曰夜見堂下有小兒􅀍髪走勿惡之名曰溝以其名呼之即無咎又曰百歳狼化爲女人名曰知女􅃺如羙女坐道旁告丈夫曰我無父母兄弟丈夫取爲妻三年而食人以其名呼之則逃去又曰故溷之精名曰卑􅃺如羙女而持鏡呼之使人知愧王子年拾遺録曰劉向校書天禄專精不倦假􅄰彌時有人植青藜之杖時夜巳暗乃吹其杖端烱然火出因以照向則户内如燈燭也向與言三代巳前帝王興亡之事如目見焉及􅀃隂陽運數起滅之兆向因受五行洪範之文向問其姓名對曰我太一之精主天地圖䜟聞子好學下而觀焉抱朴子曰萬物之老者其精悉能假託形以惑人唯不能於鏡中易形耳是以古人入山道士皆以明鏡懸於背後則老魅不敢近人又曰山之精形如小兒而獨足足向後喜來犯人人入山谷夜聞其音聲􅀏語其名曰蛟知而呼之即不敢犯人一名曰超空亦可兼呼之又曰有山精或如鼔色赤一足其名曰揮又或如人長九尺衣裘帶笠名曰金累又或如龍而五色未有名曰飛龍見之皆以其名呼之不敢爲害又曰山中大樹能語者非樹語也其精名曰雲陽以其名呼之即􅁻又曰山中夜見胡人者銅䥫精也見􅁗人者百歳木精也山水之間見吏者曰四激以其名呼之則􅁻又曰山中寅日有稱虞吏者虎也稱當路君者狼也稱令長者老俚也夘日稱丈夫者兎也稱東王父者䴢也稱西王母者鹿也辰日稱雨師者龍也稱河伯者魚也稱無膓公子者蟹也巳日稱寡人者社中也稱時君者􅀛也午日稱三公者馬也稱人者老樹也未日稱主人者羊也稱吏者麞也申日稱人君者猴也稱九卿者猨也酉日稱將軍者老雞也稱賊捕者雉也戍日稱人姓字者犬也稱咸陽公仲者狐也亥日稱臣君者猪也稱婦人者金玉也子日稱社者䑕也稱神人者㐲翼也􅐫日稱書生者牛也知其物則不能爲害又曰山川石木井竈洿池猶有精氣人身之中亦有魂魄况天地爲物物之至大者於理當有精神有精神則冝賞善罰惡但其體大綱䟽不必機發而應耳太平御覽卷第八百八十六
