front:
  text: 太平御覽卷第七百六十七雜物部二
  hash: sha256:c98d4b8fd873bee0bd1b215f8ff9869e2d9b44abb825fcb3a54ff42d47d43e59
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_767-1a}
body:
  text: 板瓦甎塹蒭茭堊竿鈎釘鐷礪板􅁑洪神仙傳曰王逺字太平東海人也􅀶學六經尤明天文圖䜟河洛之要逆知天人盛衰之期九州􅁻凶漢桓帝聞之連徴不岀使郡國逼載以詣京師低頭閉口不肯荅乃題宫門扇板四百餘字皆說方來帝甚怒之使人削之外字去内字復見黒皆徹入板裏續捜神記曰聶支豫章新􅇭古暗切人少時貧常夜照見一白鹿射中之明㝷蹤血旣盡不知所在且巳飢極便卧一梓樹下仰見箭着樹枝視之乃是昨射箭恠其如此於是還家賫粮命子姪持斧以伐之樹微有血遂裁截爲板二板牽着破塘中板常沉地然時復浮岀輙家有􅁻慶毎欲致賔客輙便此板於中流欲没客大懼聶君呵之還復浮岀仕宦大如意位至丹陽太守在郡經時外司白云濤入石頭聶然聶君以板破中板來耳視之果然聶君以板來必有意即觧職歸家下舡便閉户二板挾兩邊一日至豫章自爾之後板岀便反有凶禍家大轗軻幽明録曰義熈中江乗聶湖忽有一板廣數尺長二丈餘􅁪停在此川溪採菱及捕魚者資此以自濟後有數人共乗板入湖試以刀斫即有血岀板仍没數人溺死瓦古史考曰夏丗昆吾氏作屋瓦禮曰慕賢而容衆毀方而瓦合去巳之大圭角下與衆人小合也者史是曰􅁗攻韓軍於武安西􅁗軍鼔噪勒兵武安屋瓦盡震漢書曰霍禹弟卷端人見禹居堂屋上撤瓦投地就視亡有大恠之舉家憂愁未幾􅀍誅續漢書曰董卓作亂燒南北宫雒陽城無􅃗瓦尺木吴時外國傳曰大􅁗國以水精爲瓦􅀳起居注曰成都王討長沙王使陸機都督三十七萬衆圍洛陽四匝夜鼓譟京師屋瓦皆裂􅀳中興書曰㤗寧元年五月大廻風吹劉曜太廟瓦垣外數十歩其欒梁拱捂無離者瓦亦不毀曜素服五月繕治之淮南子曰以磁石之能連鐵也而求其引瓦則難矣漢武故事曰武帝起神明殿砌以文石用布爲瓦而淳􅃮其外四門並如之語林曰晉張載字孟陽甚醜毎出爲小兒擲瓦盈車葛洪神仙傳曰孫􅀶者河東人也有藏人亡奴在軍中者因以求之不得􅀶語奴主曰吾爲卿燒其營舎奴出走卿但諦伺取之於是􅀶以一赤瓦擲之湏􅁷火起張天奴果出走而得之􅀶乃以青瓦擲之火即㓕屋舎百物向巳燋燃者悉復如故靈􅀑志曰有士人姓鄒㘴齋中忽有一人通刺詣之題刺云舒甄仲旣去疑其非人㝷其刺曰吾知之矣是予舎西土瓦中人耳便徃令人將鏵掘之果於瓦器中得桐人長尺餘管子曰棟橈不勝任則屋覆而人不怨者其理然也弱子慈母之所愛也不以其理而下瓦則慈母笞之故其理動者雖覆屋不爲怨不以其理動者下瓦必笞莊子曰師曠爲􅀳平公作清角一奏有雲從西北起再奏大雨大風隨之裂帷幕破爼豆墮廊瓦平公懼伏于室内抱朴子曰土柈瓦胾不可救飢甎爾雅曰瓴謂之甓甎也今江東呼甓甓音蒲歴切古史考曰烏曹氏作甎魏略曰扈累獨居道側以㼾瓦甎爲障施一厨牀食􅀫其中􅀳書曰吴興吴陸經痑癘死者十三在青唯逵夫妻家貧冬無􅀍袴晝傭賃夜還燒甎伐木朞年中成七墓葬十二喪宋書曰范曄字蔚宗母如厠産之額爲塼所傷故以塼爲小字鄭緝之東陽記曰獨公冡在縣東八十里有冡臨溪其甎文曰筮言吉􅀛言凶三百年墮水中義熈中冡猶半在自後稍已崩盡續捜神記曰順陽范啓母喪當葬前母墓在順陽徃迎之旣至而墳壟沓難可識別不知何許􅀽彦仁時爲豫州徃看之因云間有一人見􅀑范即如言令物色覔之云此墓中一人衣服顔狀如之即開墓棺物皆爛塜中􅁅壤深尺餘意甚疑試令人以足撥􅁅中土兾得舊物果得一甎銘云順陽范堅之妻然後信之述異記曰豫章胡兹家在郡治宋㤗始四年空中忽有故冡墓甎青笞石􅁅着之礚然擲其母前其數或五三俱至舉家驚懼然終不中人旬日乃止語林曰陶太尉旣作廣州優遊無事常朝自運甓甎也於齋外暮運於齋内人問之陶曰吾方致力中原恐爲爾優遊不復堪事塹東觀漢記曰周紆字文通爲渤海太守坐事免家貧身築塹以自給食蒭茭書曰峙迺蒭茭亡敢弗多詩曰生蒭一束其人如玉禮曰以足蹙路馬蒭有誅聲􅀋曰茭乾蒭也老子曰天地不仁以萬物爲蒭狗聖人不仁以百姓爲蒭狗趙壹嫉邪賦曰􅀔家多所冝欬唾自成珠􅀍􅄄懷金玉蘭蕙化爲蒭堊音惡禮曰在堊室之中不與㘴焉山海經曰慈聾之山其中有大谷是多白墨青堊謂有􅄂色之堊太公六韜曰昔帝堯王天下上世謂賢君其治則宮恒室屋不堊也莊子曰郢人堊漫其鼻端若蠅翼使匠石斵之運斤成風盡堊而鼻不傷郢人立而不失容竿詩曰籊籊竹竿以釣于淇籊籊長而殺也􅀃文曰竿竹挺也漢書曰斬木爲兵揭竿爲旗掲音竭􅀒也續漢書曰髙鳯字文通南陽人妻將之田曝麦於庭令鳯護雞忽煞天􅁀風大雨鳯持竿誦經不覺潦水流麦妻還恠問鳯方悟􅀶物志曰詹何以獨蠒之絲爲綸芒針爲鈎荆篠息了切爲竿剖粒爲餌引盈車之魚於百仭之淵莊子曰楚王聘莊周於濮水之上莊子持竿不頋鈎史記曰桀有功能伸鈎索鐵搜神記曰京兆長安有張氏晝獨處室有鳩自外入止前牀張氏惡之披懷而祝曰鳩爾來爲我禍耶飛上承塵爲我福耶來入我懷鳩飜入懷以手探之則不知鳩之所在而得一金鈎焉遂寳之自是之後子孫昌盛資財萬倍蜀賈客至長安中聞之乃厚賂内婢婢竊鈎以與客張氏旣失鈎漸貧死喪而蜀客亦數罹窮厄不爲巳利或告之天命也不可以力求於是賫鈎以返張氏張氏復昌故􅀜西稱張氏鈎風俗通曰順帝時京師謡曰直如弦死道邊曲如鈎乃封侯張衡賦曰仰飛纎繳俯鈎長流觸矢而斃貪餌吞釣釘魏略曰晉宣王討王陵陵自知罪重試索棺釘以觀太􅀓意太􅀓給之陵夜呼􅁺属與訣曰行年八十身名並滅遂自殺盛弘之荆州記曰冠軍縣東有魏征南司馬張詹墓元嘉􅀄尚儼然六年民飢始􅀍發金銀朱􅃮之器爛然有二朱􅃮棺棺前垂竹薄簾以金釘釘之楊龍驤洛陽記曰石牛一頭在城西北九重里􅂄舊傳􅀃者云石虎當襄國石牛夜喚聲三十里事奏虎虎遣人打落牛兩耳及尾以䥫釘釘四脚今見存抱朴子曰吴有趙炳以大釘釘柱入尺許以氣刀吹之即釘躍岀如弩箭之發鐷廣雅曰鏶音集謂之鐷弋渉切􅀃文曰鏶鐷也礪詩曰周道如砥書曰楊州厥貢礪砥砥細於礪皆磨石也又曰若金用汝作礪史記曰封爵之誓曰黄河如帶太山如礪言河山如帶礪國乃絶耳蔡邕觀學曰木以繩直金以淬剛必湏砥礪就其鋒鋩魏志曰殺幽州牧劉虞有童謡曰燕南垂趙北際中央不合如礪唯有此中可避丗公孫瓉以巳當之乃築京固守積三萬斛廣志曰礪石岀首陽山有紫白彩色出南昌者最善今武庫有數枚治御刀山海經曰髙梁之山多砥礪尸子曰鐵使干越之工鑄之以爲劒而勿加砥礪則以刺不入擊不断磨之以礱礪加之以黄砥則刺也無前擊也無下自是觀之礪之與弗礪其相去逺矣今人皆礪其劒而弗知礪其身夫學身之砥礪也太平御覽卷第七百六十七
