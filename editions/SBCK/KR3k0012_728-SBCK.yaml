body:
  text: 方術部九筮下晉書日嚴􅀸會稽人也善卜筮鄉人魏序欲蹔東行荒年多抄盜令􅀸筮之􅀸筮日君慎不可東行必遭暴害之氣而非劫也序之不信卿日旣必不信冝有以禳之可索西郭外獨母家白雄狗繫着舩前求索正得駮狗無白􅀸日駮者亦足然猶恨其色不純當餘小毒正及六畜輩耳無所復憂序行半路狗忽作聲甚急有如人打之者比視已死吐黑血斗餘其夕序墅上白鵝數頭無故自死而序家無恙又日郭璞旣過江宣城太守殷祐引爲參軍時有物大如水牛􅁅色卑腳腳􅀋象胷前尾上皆白大力而遲鈍來到城下衆咸異焉祐使人伏而取之令璞作卦遇遯之蠱其卦日艮體連乾其物壯巨山潛之畜匪兕匪虎身與鬼幷精見二午法當爲禽兩靈不許遂􅀍一創還其本墅按卦是爲驢鼠卜適了伏者以戟刺之深尺餘遂去不復見巫云廟神不恱日此是䢼亭驢山君鼠使詣刑山暫來過我不須觸之其精妙如此又日王導深重郭璞引參已軍事導令作掛璞言公有震厄可命駕西出數十里得一柏樹截斷如身長置常寢處災當可消矣導從其言數日果震柏木粉碎碎時元帝初鎮建鄴導令璞筮之遇咸之井璞日東北郡縣有武名者當岀鐸以著受命之符西南郡縣有陽名者井當沸其後晉陵武進縣人於田中得銅鐸五枚厯陽縣中井沸經日乃止及帝爲晉王又使璞筮遇豫之睽璞日㑹稽當出鍾以告成功上有勒銘應在人家井沸泥中得之繇辭所謂先王以作樂崇德殷薦之上帝者也及帝卽位太興初㑹稽剡縣人果於井中得一鍾長七尺二分口徑四寸半上有古文奇書十八字云㑹稽嶽命餘字時人莫識之又日王敦之謀逆也温嶠􅁃亮使郭璞筮之璞對不決嶠亮復令占己之吉凶璞日元吉嶠等退相謂日璞對不了是不敢言或天奪敦魄令吾等與國家共舉大事而璞云元吉是爲舉事必有成也於是勸帝討敦初璞每言殺我者山宗至是果有姓崇者構璞於敦敦將舉兵又使璞筮璞日無成敦因疑璞之勸嶠亮又聞卦凶乃問璞日􅀸更筮吾壽幾何荅日思向卦明公起事必禍不乆若往武昌壽不可測敦大怒日􅀸壽幾何日命盡今日中敦怒收璞詣南崗而斬之璞臨出謂行刑者欲何之日南崗頭璞日必在雙柏樹下旣至果然復云此樹應有大鵲巢衆索云不見璞更令尋覓果於枝閒得一大巢密葉蔽之又日􅁃翼幼時嘗令璞筮公家及身卦成日立始之末丘山傾辰順之初子凋零及康帝卽位將改元爲建元或謂庾冰日子忘郭生之言邪立始建元也丘山上名此號不冝用冰撫心歎恨帝崩何充政元爲永和庾翼歎日天道精微乃當如是長順者永和也吾庸得免乎其年翼卒冰又令筮其後嗣卦成日􅀸諸子並當貴盛然有白龍者凶徵至矣若墓碑生金庾氏之大忌也後冰子藴爲廣州刺史妾房内忽有一新生白狗子莫知所由來其妾祕愛之不令藴知狗轉長大藴入見狗眉眼分明又身至長又弱異於常狗藴甚怪之將岀共視在衆人前忽失所在藴􅁣然日殆白龍乎􅁃氏之禍至矣又墓碑生金俄而爲􅁊温所滅終如其言璞之占驗皆此􅀋也撰前後筮驗六十餘事名爲洞林又抄京費諸家要最更撰新林十篇卜韻十篇載記日秦苻融爲司􅀠校尉京兆人董豐遊三年而返過宿妻家是夜妻爲賊所殺兄疑豐殺之送豐有司不堪楚掠誣引殺妻融察而疑之問日汝行徃還頗有恠異及卜筮以不豐日初將發夜夢乘馬南渡水返而北渡復自北而南馬停水中鞭策不去俯而視之見兩日在于水下左白而濕右黑而燥寤而心悸以爲不祥還之夕復夢如初問筮者筮者云憂獄訟遠三枕避三沐旣至妻爲具沐夜授豐枕豐記筮者之言皆不從之乃自沐枕枕而寢融日吾知之矣周易坎爲馬爲離三爻同變而成離離爲中女坎爲中男兩日二夫之象坎爲執法吏吏詰其夫婦人被流血而死坎二陰一陽離三陽一陰相承易位離下坎上旣濟文王遇之囚美里有禮而生無禮而死馬左而濕水也左永右馬馮字也兩日昌字也其馮昌殺之乎於是推驗獲昌詰之具首服日本與妻謀殺董豐期以沐新枕爲驗是以誤中婦人宋書日劉休善筮因尚書令吳喜事明帝遂見親賞長直殿内後宫孕者帝使筮其男女無不如占齊書日賀瑒伯祖導飬工卜筮經遇工歌女人病死爲筮之日此非死也天帝召之歌耳乃以土塊加其心上俄頃而蘇南史日梁大同中同泰寺災帝召太史令虞履筮之遇坤之履日無害其繇日西南得朋東北喪朋安貞吉文言日東北喪朋乃終有慶帝日斯魔也酉應見卯金來剋木卯爲陰賊􅀑而帶賊非魔孰爲致之酉爲口舌當就􅀃言乎兊故知善言乎冝前爲法事於是人人賛善莫不從風梁書曰鄧元起初爲益州刺史及巴東聞蜀亂使蔣光濟筮之遇蹇喟然歎曰吾豈鄧艾而及此乎後果如筮又阮孝緖傳曰孝緒見善筮者張有道曰見子隱迹而心難明自非考之􅀛蓍無以驗也及布卦旣揲五爻曰此將爲應感之法非嘉遁之兆孝緖日安知後爻不爲上九果成遁卦有道歎日此所謂肥遁無不利象實應德心迹并也孝緒曰雖獲遁卦而上九爻不發升遐之道便當髙謝又日阮孝緒自筮卦日吾壽與劉著作同年及劉著卒孝緒曰劉侯逝矣吾其幾何其年十月卒後魏書曰任城王澄髙祖外示南討意在謀遷齋於明堂左个詔太常􅀸王諶親令􅀛易筮南伐之事其兆遇革髙祖曰此是湯武革順之卦也羣臣莫敢言澄曰革者更也將欲應天順人革君臣之命湯武得之爲吉陛下帝有天下重光累葉今日卜征乃可伐叛不得云革命此非君人卦未可爲吉也高祖厲聲曰此象云大人虎變何云不吉也澄曰陛下龍興旣乆不冝方同虎變高祖勃然作色日社稷我社稷任城而欲沮衆也澄曰社稷誠知陛下之社稷然臣是社稷之臣也務參顧問敢盡愚衷髙祖乆之乃解曰各言其志亦復何傷車駕還宫便召澄未及昇陛遥謂曰向者之革今更欲論之明堂之忿懼衆人竟言沮我計故厲色怖文武耳想解朕意也又曰鄧淵博覽經書長於易筮太祖定中原擢爲吏部郎又曰許彦少􅀌貧好讀書後從沙門法叡受易世祖􅀍徵以卜筮頻驗遂在左右參與謀議北史曰後魏樂平王丕坐事以憂薨及日者董道秀之死也髙允遂箸筮論曰昔明元未起白臺其高二十餘丈樂平王嘗夢登其上四望無所見王以問日者董道秀筮之曰大吉王默而有熹色後事發王遂憂死而道秀棄市道秀善推六爻以對王曰易稱亢龍有悔窮髙曰亢髙而無人不爲善也夫如是則可上寧於王下保於己福禄方至豈有禍哉今舎於本而從其末咎釁之至不亦冝乎三國典略曰西魏孝武帝字孝則孝文皇帝之孫也性沉厚少言體有鱗文初封汝陽公夢人謂己日汝當大貴得二十五年將卽位使吳遵世筮之遇明夷之賁曰初登于天後入于地帝曰何謂也遵日初登于天當作天子也後入于地不得乆也又日淸河王岳神武從父弟也初家于洛邑神武奉使入洛常止岳舎母山氏嘗夜起見神武室中有光窺而無火移於東屋其光復存以爲恠也詣卜者筮之遇乾之大有占日吉易􅁛飛龍在天大人造也飛龍九五大人之卦當大貴主人蒙其福神武起兵於信都山氏聞之大喜謂岳日赤光之瑞今當驗矣可聞從之共圖大計岳至信都神武以爲散騎常侍封山氏爲郡君授女侍中入侍皇后又日齊趙輔和明易善筮後宫誕男女時日筮無不中有人父疾輔和筮之遇乾之晉吿之以吉退而謂人日乾爲天天變爲䰟而昇於天能無死乎果如其言又曰齊許遵髙陽新城人也明易善筮兼曉天文齊神武引爲館客自言禄命不富貴終必横死是以任情踈誕多所犯忤時齊主無道旣甚遵語人日多折筭來吾筮此狂夫何時當死於是布筭满床大言日不出首冬我乃不見又後周書日梁孝元凡諸伎術無所不該南平嗣王恪嘗以銅合盛金玉虎珀指環請孝元射覆卦遇姤之履林日上旣爲天其體則圎指環之象金玉在焉寅爻帶牛寅則爲虎琥珀生光在合中央合中之物凡有三種案卦而談或輕或重恪於是神服又以壬申日寅時筮南軍何時有信遇剥之艮孝元日使還已在門外遣人往看果如所􅀃賔客驚其妙而問之孝元日艮爲門時在寅與日辰幷故知之耳凡所占決萬不失一及我軍之伐援蓍爲卦取􅀛式驗之因抵於地日吾若死此下豈非命乎隋書日楊伯醜馮翊武鄕人也好讀易隱於華山開皇初被徵入朝見公􅀸不爲禮無貴賤皆汝之人不能測也高祖召與語竟無所荅上賜之衣服至朝堂捨之而去於是被髪陽狂遊行市里形體垢穢未嘗櫛沐時有張永樂者賣卜京師伯醜毎從之遊永樂爲卦有不能決者伯醜輒爲分折爻象尋幽人微永樂嗟服自以爲非及也伯醜亦開肆賣卜有人嘗失子就伯醜筮者卦成伯醜日汝子在懷遠坊南門道東北壁上有靑裙女子抱之可往取也如言果得或有金數兩夫妻共藏之於後失金其夫意妻有異志將逐之其妻稱􅁈以詣伯醜伯醜爲筮之日金在矣悉呼其家人指一人日可取金來其人赧然應聲而取之道士韋知常詣伯醜問吉凶伯醜日汝勿東北行必不得己當早還不然者楊素斬汝頭未幾上令知常事漢王諒俄而上崩諒舉兵反知常逃歸京師知常先與楊素有隙及素平并州先訪知常將斬之賴此獲免又有失馬來詣伯醜卜者時伯醜爲皇太子所召在塗遇之立爲作卦卦成日我不遑爲􅀸占之􅀸且向西市東壁門南第三店爲我買魚作膾當得馬矣其人如此言須臾有一人牽所失馬而至遂擒之崖州嘗獻徑寸珠其使者隂易之上疑焉召伯醜筮日有物出自水中質圎而色光是大珠也今爲人所隱具隱者姓名容狀上如言簿責之果得本珠上奇之賜帛二十疋唐書日太宗皇后長孫氏隋大業中歸寧於永興里后舅高士廉有姬張氏於后所宿舎側見一大馬二丈餘鞍勒備具士廉筮之遇坤􅂏日至哉坤元萬物資生乃順承天坤厚載物德合無疆象日牝馬地􅀋行地無􅆠也泰􅂏日内陽而外陰内健而外順則是天地交而萬物通也象日后以輔相天地之冝而左右人也卜人日龍乾之象也馬坤之象也變而爲泰天地交也繇恊於歸妹婦人兆也案王弼云婦人謂嫁日歸女處尊位履中居順也此女當大貴也其可盡言乎士廉志之而心獨喜親戚知者咸敬異焉又日衛大經篤學善易口無二言則天降詔徵之辭疾不起嘗預筮死日先鑿墓自爲誌文如筮而終又日􅀇宗之爲潞州别駕將入朝有軍人韓凝禮自謂知五兆上因以食箸試之旣布卦一箸無故自起凡三偃三起觀者以爲大吉徵旣而誅韋氏定天保因此行也凝禮起家五品家語日孔子嘗自爲筮而卦得賁愀然有不樂之狀子張進日師聞卜者得賁是吉卦也而夫子之色不平何也孔子日以其雜也在周易山下有火謂之賁非正色之卦也夫質也白冝正白黑冝正黑今而以賁非吉兆也吾聞丹漆不文白玉不雕何者質之有餘質有餘者不受飾故也說苑同古史考曰庖羲作卦始有筮衝波傳曰孔子使子貢往外而未來謂弟子占之遇鼎皆言無下足不來顔子掩口而􅀏曰無足者乘舟而來賜至矣淸朝也子貢果朝至國語曰晉公子在秦筮之曰尙有晉國得貞屯悔象皆八也内曰貞外曰悔震下坎上屯坤下震上豫得此兩卦震在屯爲貞在豫為悔八謂震兩陰爻在悔皆不動故曰皆八諸爻無爲也筮史占之皆曰不吉卦閇而不通爻無爲也司空季子曰吉是在周易皆利建侯不有晉國以輔王室安能建侯我命筮曰尚有晉國筮吿曰利建侯得國之務也吉孰大焉是二者得國之卦也二者屯豫又曰惠公卒秦伯納公子董困逆公於河公問焉曰吾其濟乎對曰歲在大梁集天行元年始受實沉之星也實沉之虛晉人是居所以興也今君當之無不濟矣君之行也歲在大火大火閼伯之星也是謂大辰臣筮之得泰之八乾下坤上泰遇泰無動爻筮爲侯也泰三至五震爲陰爻不動其數皆八故得泰之八與貞屯悔豫皆八義同日是謂天地配享小往大來今及之矣何不濟之有且以辰出而以參入皆晉祥也濟且秉成必伯諸侯秉執子孫頼之君無懼矣又曰晉孫談之子適周事單襄公襄公有疾召頃公而告之曰吾聞晉之筮之也遇乾之否曰配而不終君三出焉一旣往矣後之不知其次必此且吾聞之成公之生也其母夢神規其臋以黑曰使有晉國規畫臋凥三世而卑驩之孫故名之曰黒臋於今再矣襄公曰驩此其孫也此周子者晉襄公之孫也而令德孝恭非此其誰且其夢曰必驩之孫實有晉國其卦曰必三取君於周其德又可以君國三襲焉襲合也三合德夢卦也吾聞之泰誓曰朕夢恊于朕卜襲于休祥戎商必尅以三合襲晉仍無道而鮮胄其將失之矣早善晉子其當之晉子周子頃公許諾及厲公之亂召周子而立之是爲悼公亂謂殺之智瓊傳曰􅁌超爲神女所降論者以爲神仙或以爲􅀑魅不可得正也著作郎干寶以周易筮之遇頥之益以示同寮郎郭璞曰頥貞吉正以養身雷動山下氣性唯新變而之益延壽永年乘龍銜風乃升于天此仙人之卦也捜神記曰橋􅀇字公祖梁國人也初爲司徒長史五月末夜卧見東壁正白如門呼左右左右莫見因起自往手捫摸之壁如故還牀又見心大恐其旦應劭往候之􅀇吿劭曰鄕人有童彦興者許季山外孫也其探頥索隱窮神知化然天性褊狹羞於卜筮者􅀇聞往請之公祖虚禮盛饌下席行觴彦興辭公祖讓再三爾乃應之日府君恠見白光如門明者然不爲害也六月上旬雞鳴時聞南家哭即吉到秋節遷北行郡以金爲名位至將軍三公到六月九日太尉楊秉薧七月拜鉅鹿太守鉅邊有金焉復爲度遼將軍遂登三事續搜神記曰郭璞每自爲卦知其凶終嘗行建康柵塘逢一趨走少年便牽住脫絲布袍與之此人乃受及當死果此人行刑傍人皆爲求屬璞曰我託之乆矣此人爲之歔欷哽咽又曰郄超年二十餘得重病廬江杜不愆始學易卜屢有驗超令試筮之卦成不愆曰案卦言之􅀸所苦尋除然冝於東北三十里上宫姓家索其先養雄雉籠而絆之置東簷下却後九日辰加午必當有野雌雉飛來與交合旣畢􅀟飛去若如此不出二十日病都除又是休應年將八十位極人臣若但雌逝雄留者病一周方差年半八十名位亦失超依其言索雉果得至期日超卧南軒下觀之至日晏果有雌雉飛入籠與雄交而去雄雉不動超歎息日雖管郭之奇何以尙此超病弥年乃起至四十卒於中書郞録異傳日隗炤者汝隂鴻壽亭人也善於易臨死書板授其妻日吾亡後當大荒窮雖尔愼莫賣宅也却後五年春當有詔使來頓此亭姓龔此人􅀒吾金􅀸以此板往責之勿違吾言言訖而卒後果大困乏欲賣宅憶夫言輒止期日有龔使者至亭妻遂賫板往使者執板惘然不知所以乃言日我生不踐此何縁尓耶妻日夫臨亡手書板見命如此不敢妄也使者沉吟良乆而寤謂日賢夫何善妻日亡夫善於易而未曾為人卜也使者日噫可知矣乃命取蓍筮之卦成撫掌而歎日妙哉隗生含明隱迹可謂鏡窮達而洞吉凶者也於是告炤妻日吾不可相􅀒金也賢夫自有金耳知亡後蹔窮故藏金以待泰平所以不告婦兒者恐金盡而困無巳也知吾善易故書板以寄意耳金有五百斤盛以靑甖覆以銅柈埋在堂屋東頭去壁一丈入地九尺妻還掘之皆如其言金樓子自敘云初至荊州卜雨聊附見首末孟秋之月亢陽日乆月旦雖雨俄尒便晴有人云諺日雨月額千里赤蓋旱之徵也吾乃端筴拂蓍遇動不動旣而言日庚子爻爲世於金七月建申申子辰又三五合必在此月五日庚子果值甘雨余又以十七日筮何時雲卷金翹日耀合壁紅麈暗陌丹霞映峙謂亢陽之􅀔未霔膏澤筮遇坎之比於是輟蓍而歎日坎者水也子爻爲世其在金今夜三更平地上有水稱之爲比其方有甘雨乎欣然有自得之志又日桃文烈善􅀛卜謂余日此二十一日將雨其在虞淵之時余乃筮之遇謙之小過旣言日坤艮二象俱在土宫非直無雨乃應開霽俄而星如玉李月上金波霧生猶􅜄河垂似帶余乃欣然異苑日頴川庾嘉德善於蓍蔡之事有一人失婢庾卦云君可岀東陵口伺候有姓曹乘車者無問識否但就其載得與不得殆一理也旦出郭果有曹郎上墓逕便升車曹大駭呼牛驚奔入草刺一死屍下視乃其婢也博物志日􅀛三千歲遊於卷耳之上蓍千歲而三百莖同本以老故知吉凶又日筮必沐浴齋潔燒香毎朔望浴蓍必五浴之浴􅀛亦然
