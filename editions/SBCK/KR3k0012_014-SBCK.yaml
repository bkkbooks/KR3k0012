front:
  text: 太平御覽卷第十四
  hash: sha256:f549689b330604d1ff8ed5934aef7684e8b17d772c6b36074e896bfeee8ec24b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_014-1a}
body:
  text: 天部十四霜雹虹蜺霜釋名曰霜喪也其氣􅃤毒物皆喪也􅀃文曰竹入反早霜皚霜雪之白者易坤卦曰履霜堅氷至象曰履霜堅氷隂始凝也馴致其道至堅氷也詩曰糾糾葛屨可以履霜鄭􅀇注曰魏俗至冬猶謂􅁑屨可用履霜利其賤也又曰九月肅霜肅縮也霜降而収縮萬物也又曰蒹葭蒼蒼白露爲霜禮曰季秋之月霜始降則百工休鄭注曰謂膠漆之作停又曰孟冬行秋令則雪霜不時又曰孟春行冬令則雪霜大摯又曰霜露旣降君子履之必有悽愴之心非其寒之謂也鄭注云感時念親也又曰天子大社必受霜露以逹天地之氣也京房易傳曰誅不原情有霜附木不下地不教而誅其霜反在草下又曰興兵妄誅厥災夏霜賢聖遭害其霜附木不下也大戴禮曰霜是隂陽之氣也隂氣勝則凝而爲霜春秋元命苞曰隂陽凝爲霜又曰霜以殺木露以潤草春秋考異郵曰霜者隂精冬令也四時代謝以霜収殺霜之爲言亡也物以終也又曰僖公即位隕霜不殺草臣威強也春秋感精符曰霜殺伐之表季秋霜始降鷹隼擊王者順天行誅以成肅殺之威孝經援神契曰霜以挫物五經通義曰寒氣凝以爲霜霜從地升也五經鈎沉曰天霜樹落葉而鴻鴈南飛家語曰霜降而婦功成嫁娶者行焉季秋霜降娶者始也詩曰將子無怒秋以爲期國語曰駟見而霣于敏反霜霣霜而冬裘具賈逵曰駟房星也漢武内傳曰西王母云仙之上藥􅀇霜絳雪王子年拾遺記曰廣延國有霜色紺碧又曰嵰丘儼反州霜甘又曰貟嶠之山名環丘有氷􅁞以霜雪覆之然後作璽其色五采織爲文錦入水不濡以投火經􅀫不燎唐堯之代海人獻以爲黼黻莊子曰馬蹄可以踐霜雪毛可以禦風寒曽子曰隂氣勝則凝爲霜淮南子曰芝蘭以芳未甞見霜先霜刈之又曰聖人行於水無跡衆人行霜有跡又曰至秋三月青女乃出降以霜雪高誘注曰青女天神青天玉女主霜雪也又曰鄒衍事燕惠王盡忠左右譛之王王繫之獄仰天哭夏五月天爲之下霜地鏡圖曰視屋上瓦獨無霜者其下有寳山海經曰豐山有九鍾霜降其鍾即鳴命曆序曰桀無道夏隕霜師曠占曰春夏一日有霜雪者君治政大嚴刻太殺天以示之冝損威殺重人命崔豹古今注曰鷓鴣常向日而飛畏霜露夜棲則以樹葉覆其背上蔡邕月令章句曰露凝爲霜徐整長暦曰北斗當崑崙山氣運注天下秋冬爲霜雪唐書曰寜王憲疾時京城寒甚凝霜封樹時學者以爲春秋􅀨木氷即此是亦名樹介言其象介胄也憲見而歎曰此俗謂樹稼者也諺曰樹稼逹官怕必有大臣當之吾其死矣十一月薨琴操曰履霜者伯竒之所作也伯竒者􅁻甫之子也􅁻甫聽其後妻之言疑其孝子伯竒遂逐之伯竒編水荷而衣采楟音亭山棃木也花而食之清朝履霜自傷無罪見放逐乃援琴而鼓之楚辭曰秋旣戒之以白露冬又申之以嚴霜古艶歌辭曰秋霜白露下桑葉鬱爲黄何瑾悲秋夜曰霜凝條􅀆璀璀露霑葉􅀆泠泠雹釋名曰雹砲疋巧反又音雹也其所中物皆摧折如人所蹙砲也許愼􅀃文曰雹雨氷也從雨包聲禮曰仲夏行冬令則雹凍傷􅂖傳曰昭四年正月大􅀨雹季武問於申豐曰雹可禦乎對曰聖人在上無雹雖有不爲災古者日在北陸而藏氷西陸朝覿而出之其入也時今藏川池之氷棄而不用風不越而殺雷不發而震雹之災誰能禦之􅂖梁傳曰僖公二十九年秋大雨雹雹者隂脅陽臣侵君之象也京房易傳曰飛雹下盡樹木之枝害五􅂖者君賦歛刻民也焦貢易林曰隂􅀨泥寒常氷不温凌人惰怠大雹爲災尚書洪範五行傳曰隂陽相脅而雹霰盛隂而雪凝滯而氷寒陽氣薄之不相入則散而爲霰盛陽􅀨水温煖而湯熱隂氣脅之不相入則轉而爲雹霰者陽脅隂也雹者隂脅陽也又曰人君妬賢疾善在下謀上則日蝕而雹殺走獸春秋感精符曰大臣擅法則􅀨雹又曰九月十月日色青則寒有雪雹春秋考異郵曰隂陽專精凝合成雹雹之言合也春秋漢含孳曰專一精并氣凝爲雹宋均注曰謂􅀂魯僖公脅於齊以妾爲妻尊重齊勝無迴曲之心感隂水氣乃使結而不解散史記曰景帝二年秋􅀨雹大者五寸􅀷二尺又曰凡雹皆冬之愆陽夏之伏隂也漢書曰成帝河平二年四月楚國雨雹大如斧飛鳥皆死又曰宣帝地節四年五月山陽濟隂􅀨雹如雞子􅀷二尺五寸殺二十人蜚音飛與飛同鳥皆死又漢書五行志曰武帝元封三年雹大如馬頭范曄後漢書曰有青虵見於御坐軒前又大風雨雹霹靂拔樹張奐上䟽曰臣聞風爲號令動物通氣木生於火相須乃明虵能屈伸配龍騰蟄順至爲休徴逆來爲殃咎隂氣專用則精凝爲雹故大將軍竇武太傅陳蕃或志寕社稷或方直不回前以䜛勝並伏誅戮海内嘿嘿人懷震憤昔周公葬不如禮天乃動威今武蕃忠貞未􅀍明宥妖眚之來皆爲此也冝急爲改葬徙還家屬其從坐禁錮一切蠲除又皇太后雖居南宫而恩禮不接朝臣莫言逺近失望冝思大義頋復之報天子􅀷納奐言又曰時頻有地震隕雹蔡邕上封事曰臣聞天降災異縁象而至霹靂雹數發殆刑誅繁多之所生也又曰安帝延光元年夏京師及郡國三十雨雹又曰獻帝􅀄平二年五月雹如扇如斗東觀漢記曰和帝永元五年六月郡國大雨雹大如鴈子又曰韓稜字伯師除爲下邳令視事未朞吏民愛慕時隣縣皆雹傷稼稜縣界獨不雹晉書曰太元二十一年四月雨雹時道子專政姦佞競進烈宗不能禁終至大亂晉中興書曰太興二年海鹽雨雹大如鷄子崔鴻前趙録曰劉曜光􅀄三年夏四月長安雨雹大如雞子後魏書曰鮮卑兵投鹿侯從匈奴三年其妻在家有子恠欲殺之妻言常行仰天視而雹入口吞之而生子號擅石槐後遂爲鮮卑大人郭氏􅀇中記曰東方有柴都焉在齊國有山山有泉水如井狀􅀷不測至春夏時雹從井中出常敗五榖人常以柴塞之不柴塞則出也故號爲柴都陳留風俗記曰雍丘縣夏后公祠有神井能興霧雹伏琛齊地記曰安丘城南三十里有雹都淵其雹或出亦不爲災異西京雜記曰鮑敞問董仲舒曰雹何物也曰隂氣脅陽也凉州異物志曰有一大人生于北邊在丁零北千五百里偃卧於野其髙如山頓脚成谷撗身塞川長萬餘里頓脚之問乃似大谷近之有災銅雹擊之也唯可遥看不可到下則雷電流銅鐵之丸爲雹以擊殺人曾子曰陽之專氣爲雹雹者氣之化也淮南子曰北方之極有九澤有積雪雹孔叢子曰永􅀄二年夏河西縣大雨雹皆如棬杯大者或如斗殺畜生雉兔折樹木於是天子責躬省過風俗通曰成帝問劉向曰俗􅀃文帝時天下斷獄三人米一斗一錢有此事否對曰不然後元年雨雹如桃李􅀷三尺㝷景帝代之不可爲升平歷代記曰石遵襲位於鄴􅁀風雨震電雹如斗其太武殿及兩廂端門光􅃩照天金石皆消爲火月餘乃滅紀年曰夷王七年冬雨雹大如礪白虎通曰自上而下曰雨雹風角占曰徴動羽有雹霜陳陸瓊和張湖孰雹詩曰惟徴動羽惟隂脅陽雨氷作冷凝氣爲祥虹蜺釋名曰虹攻也純陽攻隂氣故也隂陽不和昬姻錯亂滛風流行男女㸦相奔隨則此氣盛霓齧也其體絶見於非時此災氣傷害物如有所食齧􅀃文曰霓屈虵青赤或白色隂氣者也河圖稽耀鈎曰鎮星散爲虹霓虹霓主内滛又霓者氣也起在日側其色青赤白黃周書曰清明後十日虹始見小雪日虹藏不見虹不収藏婦不專一詩曰螮蝀在東莫之敢指螮蝀虹也夫婦過禮則虹氣盛君子見戒而諱之莫之敢指禮曰小雪之日虹藏不見又曰玉氣如白虹天也又曰清明後十日虹始見爾雅曰螮蝀虹也蜺爲挈貳易通卦驗曰虹不時見女謁亂公虹者隂陽交接之氣陽唱隂和之象今失節不見似君心在房内不修外事廢禮失義夫人􅁋恣而不敢制故曰女謁亂公詩含神霧曰瑶光如蜺貫月感女樞生顓頊尚書考靈曜注曰日傍白者爲虹日旁青赤者爲霓春秋演孔圖曰霓者斗之亂精也斗失度則投霓見宋均注曰投應也春秋元命苞曰隂陽交爲虹蜺春秋運斗樞曰樞星散爲虹蜺蔡邕月令章句曰虹螮蝀也隂陽交接之氣着於形色者也雄曰虹雌曰霓虹常依隂雲晝見於日衝無雲不見大隂亦不見蜺常依蒙濁見日旁白而直曰白虹凡日旁者四時常有之唯雄虹起季春見至孟冬乃藏史記曰荆軻慕燕丹之義白虹貫日太子畏之如淳注曰虹臣象日君象烈士傳曰荆軻發後太子見虹貫日不徹曰吾事不成矣後聞軻死事不立曰吾知之矣漢書曰武帝逰東萊臨大海是􅀊虹氣蒼黃色􅀂飛鳥集城陽宫南又曰上官桀謀廢昭帝迎立燕王是時天􅀨虹下屬宫中飲井井水竭又天文志曰虹霓者隂陽之精光如淳注曰雄日虹雌曰霓張璠漢紀曰靈帝和光元年虹晝見御座殿庭前色青赤上引蔡邕問之對曰虹霓小女子之祥又名臣蔡邕奏詔曰有黒氣墮温殿東庭中如車蓋騰起􅁬迅五色有頭體長十餘丈形似龍占者以虹蜺對虹著於天而降於庭以臣之聞則天所投虹者也呉志曰諸葛恪圍新城不尅引軍出徃東興有虵見其􅂳還拜蔣陵白虹復繞其車呉録云恪曰虹何爲此来哉果爲孫峻所誅晉陽秋曰建武元年虹長彌天晉安帝紀曰義熈二年七月夜彩虹出西方蔽月前凉録曰張駿六年有彩虹五里隆隆如鍾鼓之聲沈約宋書曰劉義慶在廣陵有疾而白虹貫城野麕入府心甚惡之因自陳求還莊子曰陽炙隂爲虹文子曰天地二氣即成虹人二即生病淮南子曰昔者馮夷大丙之御也皆古得道能御隂陽乗雷車駕雲虹又曰太古二皇得道之柄立於中央二皇伏羲神農神與化遊以撫四方是故虹蜺不出賊星不行賊星妖星含德之所致也舍懷也又曰虹蜺者天之忌也孟子曰湯東面而征西夷怨南面而征北狄怨民之望湯也若大旱之望雲霓戰國䇿曰唐睢謂􅁗王曰聶政刺韓相白虹貫日搜神記曰孔子修春秋制孝經旣備孔子齊戒向北斗星而拜告備于天乃有赤氣如虹自上而下化爲玉璜上有刻文孔子跪而授之又曰廬陵巴丘民陳濟者作州吏其婦姓􅁗獨在家忽疾病恍惚發狂後漸差常有一丈夫長大儀貌端正着絳碧􅂁采色􅋑燿來從之常相期於一山澗至於寢處不覺有人道感接忽忽如眠耳如是積年春毎徃期㑹不復畏難比鄰人觀其所至輒有虹見􅁗云至水側丈夫金瓶引水共飲後遂有娠生兒如人多􅁏不覺有手足濟㝷假還􅁗懼見之乃内兒着瓮中因見此丈夫以金瓮與之令覆兒濟時醉眠在牖下聞人與􅁗語語聲至愴濟亦不疑也又丈夫語􅁗云兒小未可得將去不須作衣我自衣之即以絳囊與裹之令可時出與乳于時風􅀨晦冥鄰人見虹下其庭􅁗常能辨佳食肴饌豐美有異於常丈夫復少時將兒去亦風􅀨晦􅁳人見二虹出其家從此遂踈異苑曰古語有之曰古者有夫妻荒年菜食而死俱化成青虹故俗呼爲美人又曰晉陵薛願義熈􅀄有虹飲其釡煥吸響便竭願輦酒灌之隨投便竭吐金滿器於是災弊日祛而豐冨􅀊臻述異記曰有黒虹下樂輯營少日輯病卒紀年曰晉定公十八年青虹見瑞應圖曰大虹竟天握登見之意感生帝舜於姚􅇕太􅀇經曰紫霓圍日其疾不割雜兵書曰日暈有白虹貫内出外者從所止戰勝華陽國志曰李特生長子盪字仲平少子雄字仲雋􅀄特妻羅氏妊雄夢􅀟虹自地升天一虹中斷羅曰吾二兒有先亡者有貴者後雄王蜀黄帝占軍决曰攻城有虹從南方入飲城中者從虹攻之勝白虹繞城不匝從虹所在擊之勝謹守其鈌賊乃從其地破走文子曰父無喪子之憂兄無哭弟之哀童子不􅀌婦人不孀虹蜺不見盗賊不行含德之所致也楚辭曰青雲衣􅀆白蜺裳楚辭天問曰白蜺嬰茀胡爲此堂王逸注曰蜺雲之有色似龍者茀白雲逶迤􅀂虵者言有此蜺茀氣氣逶迤相嬰何爲於此堂乎蓋屈原所見祠堂也安得失夫良藥不能固臧臧善也崔文子學仙於王子喬子喬化爲白虹而如嬰茀持藥與崔文子文子驚恠引戈擊蜺中之因墮其藥俯而視之王子喬之履也故言得藥不善也楊雄甘泉賦曰曵虹彩之流離左思呉都賦曰虹蜺迴帶於雲館潘尼苦雨賦曰収絳霓於漢隂楊文雲賦曰浮素霓之逶迤太平御覽卷第十四
