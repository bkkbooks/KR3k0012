body:
  text: 人事部三十八叙夢吉夢上叙夢毛詩雞鳴曰蟲飛薨薨甘與子同夢箋云蟲飛薨薨東方旦明之時我猶樂與君子卧而同夢言親受之也又節正月曰召彼故老訊之占夢笺云君臣在朝侮元老召之不問政事但問占夢而已不尚道德而信徴祥也尚書㤗誓曰朕夢叶朕卜襲于休祥戎啇必克周禮春官下曰太卜掌三夢之法一曰致夢二曰觭夢三曰咸陟夢者人之精神所窹可占者也致夢言夢之所至也夏后氏作焉咸皆也陟之言得也周人作焉觭讀如諸戎掎之掎亦德也亦言夢所得殷人作焉又春官占夢曰掌其歳時觀天地之㑹辯隂陽之氣以日月星辰占六夢之􅁻凶一曰正夢無所感動平安自夢二曰噩夢謂驚愕而夢也三曰思夢􅁴時所思念之而夢四曰寤夢覺時道之而夢五曰喜夢喜恱而夢六曰懼夢恐懼而夢季冬聘王夢獻􅁻夢于王王拜受之聘問也夢者事之祥吉凶之占在日月星辰季冬日窮于次月窮于紀星迴于天數將幾終於是發弊而問焉若休慶之云尔因獻羣臣之吉夢於王歸羙焉左傳昭元曰鄭子産如晉晉侯有疾韓宣子曰寡君􅃦疾於今三月矣並走羣望晉望祀山川走徃祈禱有加而無瘳今夢黄熊入於寢門其何厲􅀑也對曰以君之明子爲大政其何厲之有昔堯殛鯀于羽山其神化爲黄熊入于羽淵實爲夏郊三代祀之晉爲盟主其或者未之祀也韓子祀夏郊晉侯有間間差也又昭二曰楚子成章華之䑓願與諸侯落之􅀕之爲落䑓今在華容城内太􅌠薳啓疆來召公公將徃夢襄公祖祖􅀕道神梓慎曰君不果行襄公之適楚也夢周公祖而行今襄公實祖君其不行子服惠伯曰行也先君未甞適楚故周公祖以道之襄公適楚矣而祖以道君不行何之三月公如楚論語曰孔子曰甚矣吾衰也乆矣吾不復夢見周公謝承後漢書曰范式字巨卿山陽金郷人仕郡爲功曹與汝南張邵字元伯爲友後元伯寢疾篤同郡郅君章殷子微省視之元伯臨終歎曰恨不見吾死友尋乃卒式忽夢見元伯玄冕垂纓屣履而呼曰吾以某日死某時葬永歸黃泉未有我忘豈能相及式覺而驚悲歎赴之魏志曰周宣字孔和爲太史甞有問宣者曰吾夜夢見芻狗其占何也宣荅曰君欲得羙食耳有頃出行果遇豐膳後又問昨夜復夢見芻狗何也宣曰欲墮車折脚冝戒慎之頃之果如宣言後又問曰昨夜夢見芻狗何也宣對曰君家欲失火當護之俄遂火起巳而語宣曰前後三時皆不夢也聊試君耳何以皆驗耶宣對曰此神靈動君使言故與真夢無異也又問三夢芻狗而其占不同何也宣曰芻狗者􅀕神之物故君始夢當得飲食也􅀕祀訖則芻狗爲車所轢故中夢當墮車脚也芻狗旣車轢之後必載以爲樵故後夢憂失火也宣之叙夢凡此類也後魏書曰莊帝永安中北海王顥入洛莊帝北廵城陽王徽投前洛陽令宼祖仁祖仁聞尔朱兆捕徽乃斬首送之兆夢徽曰我有金二百斤馬一百疋在祖仁家卿可取之兆於是懸祖仁首於樹以石墜足鞭之求金馬祖仁死時人以爲立報崔鴻十六國春秋前凉録曰索紞字叔徹善數術占夢孝廉令狐䇿夢立氷上與氷下人語紞曰氷上爲陽氷下爲隂隂陽事也士如歸妻迨氷未泮婚姻事也君在上與氷下人語爲隂陽介事君當爲人媒氷泮而婚成䇿曰老夫耄矣不爲媒也㑹太守田邈因䇿爲子求張公徴女仲春而婚郡主簿張宅夢走馬上山還舎三周但見松栢不知門處紞曰馬爲離離爲火禍也人上山爲凶字但見松栢墓門像也不知門處爲無門也三周三朞也後三年必有大禍宅果與賈摹等謀反伏誅馬興平問紞曰我昨夜夢舎馬舞數十人向馬拍手何也紞曰馬者火也舞爲火起向馬拍手救火人也平未歸而火起郡功曹張邈甞奉使詣州夜夢狼噉一脚紞曰脚肉􅀍噉爲却字㑹東虜反遂不行張斌當舉孝廉夢竪竿中天紞曰此未字也斌果停凡所占夢莫不中驗皇甫謐帝王丗紀曰黄帝夢大風吹天下之塵垢皆去又夢人執千鈞之弩驅羊數萬羣帝寤而歎曰風爲號令執政者垢去土解清治者天下豈有姓風名后者也哉夫千鈞之弩異力能逺者也驅羊數萬羣是能善牧者也天下豈有姓力名牧者也於是依二夢之占而求之得風后于海隅登以爲相得力牧于大澤進以爲將又曰湯思賢夢見有人􅀒鼎抗爼對已而􅀏寤而占曰鼎爲和味爼者割截天下豈有人爲吾宰者哉􅀄力牧之後曰伊摯耕於有莘之野湯聞以幣聘有莘之君留而不進湯乃求婚於有莘之君有莘之君遂嫁女於湯以摯爲媵臣至毫乃􅀒鼎抱爼見湯也列子曰覺有八徴夢有六􅀱奚謂六􅀱一曰正夢二曰噩夢三曰思夢四曰寤夢五曰喜夢六曰懼夢此六者神所交也一體之􅄹虚消息皆通於天地應於物􅀋故隂氣壯則夢渉大水而恐懼陽氣壯則夢涉大火而燔􅌊隂陽俱壯則夢生殺以浮虚爲疾者則夢􅀭以沉實爲疾者則夢溺藉帶而寢則夢蛇飛鳥衘髪則夢飛將隂夢火將疾夢食飲酒者憂歌舞者哭故神遇爲夢形接爲事古之眞人其覺自忘其寢不夢又曰西極之南隅有國名古莽隂陽之氣所不交寒暑亡辯日月之光所不照晝夜亡辯其民不食不衣而多眠五旬一覺以夢中所爲者實覺之所見者妄又曰周之尹氏大治産其下趣役者侵晨昏而弗息有老役夫筯力竭矣夜則昏憊而熟寐而昔昔夢爲國君遊醼宫觀恣意所欲其樂無比覺則復役人有慰喻其勤者役夫曰人生百年晝夜各分吾晝爲僕夫苦則苦矣夜爲人君其樂無比何所怨哉尹氏盧鍾家業心形俱疲昏憊而寐昔昔夢爲人僕趨走作役無不爲也數罵杖撻無不至也尹氏病之以訪其友其友曰􅀂夜夢爲僕夫苦逸之復數之常也􅀂欲覺夢兼之豈可得耶又曰黄帝十有五年晝夢遊於華胥氏之國其國在弇州西台州北不知距齊國幾千萬里也非舟車足力之所及彼中無師長無􅄝欲不知樂生不知惡死無夭殤不知親巳不知踈物帝寤怡然而召輔相而告之曰朕思有以養身治物之道弗􅀗疲而睡􅀂此知至道不可以情求朕得之矣莊子曰夢者隂陽之精也心所喜怒則精氣從之又曰夢飲酒者旦而􅂘泣夢􅂘泣者旦而田獵此寤寐之事变也方其夢也不知其夢夢之中又占其夢焉覺而後知其夢又曰昔者莊周夢爲胡蝶栩栩然胡蝶也自喻適志與不知周也俄然覺則蘧蘧然周也不知周之夢爲胡蝶與胡蝶之夢爲周與傳子曰夢攀日月覺而不上天庭夢入九泉寤而不及地下髙宗得􅀃偶中耳淮南子曰􅀂人萬化而末始有極也弊而復新其爲樂可勝計耶譬􅀂夢夢爲鳥而飛於天夢爲魚而没於淵方其夢也不知其夢也覺而後知其夢也今將有所大覺乃後知今此之爲大夢也􅀓物志曰太公爲灌壇令於時文王夢見一婦人􅂘於道因問其故荅曰吾是太嶽之女嫁爲西海之婦吾行徃来必以􅁀風疾雨今灌壇令當吾道吾不敢以􅁀風疾雨過也夢􅁴遂召太公三日果有􅁀風疾雨過其灌壇也始興記曰林水源裏有石室室前盤石上行羅十瓮中悉是鉼銀採伐過之不得取之取必迷悶晉孝武太元􅀄封驅之家奴竊三鉼歸發㸔有蛇螫之而死其夜驅之夢神語之曰君奴不謹盗銀三餅即日顯戮覺奴已死銀由在復還之矣論衡曰趙簡子夢見天帝也以夢占之知樓䑓山陵官位之象也人夢上樓􅂛山陵輙得官位實樓䑓山陵非官位也則知簡子夢見帝非天帝也丗􅀃曰衛玠惣角時甞問樂廣夢樂云是想衛曰神形所不接而夢豈是想樂曰因也衛思因不得遂成病樂聞故命駕爲剖折之衛病即小差樂歎曰此賢􅅐中當必無膏肓夢書曰夢者像也精氣動也䰟􅅎離身神來徃也隂陽感成吉凶驗也夢者語其人預見過失如其賢者知之自改革也夢者告也告其形也目無所見耳無所聞鼻不喘嗅口不言也魂出遊身獨在心所思念忘身也受天神戒還告人也受戒不精忘神言也名之爲寤告符臻也古有夢官丗相傳也又曰昔聖帝明王之時神氣炤然先見故尭夢乗龍上太山舜夢擊天鼓禹夢其手長湯夢布令天下後皆有天下桀夢疾風壤其宫紂夢大雷擊其手齊桓夢爲大禽所中􅁗二丗夢虎齧其馬王者夢之皆失天下黃帝鍼經曰歧伯曰正邪外襲内而未有定舎也反􅁋於藏榮衛俱行而與魂魄飛􅀭使人卧不得安而喜夢氣􅁋於府則有餘於外不足於内氣􅁋於藏則有餘於内不足於外隂氣盛則夢渉大水而恐懼陽氣盛則夢渉大火而燔灼隂陽俱盛則夢相殺毀傷上盛則夢飛下盛則夢堕甚飽則夢與甚飢則夢取肝氣盛則夢怒胏氣盛則夢恐懼心氣盛則夢喜􅀏脾氣盛則夢歌樂體重身不舉腎氣盛則夢脊兩解不属其氣客於心則夢見丘山爝火客於肺則夢飛􅀭見金鐡之竒物客於肝則夢山林樹木客於脾則夢見丘陵大澤壞屋風雨客於腎則夢臨淵没居水中客於膀則夢遊行客於胃則夢飲食客於大腸則夢田野客於小腸則夢聚邑街衢客於膽則夢闘訟自刳客於隂則夢接内客於頂則夢斬首客於足則夢行走而不能及居深穽内客於股肱則夢禮節拜跪王子年拾遺録曰融髙西有夢草莖似􅆱柯採之爲占則知吉凶懐之以占夢立知禍福吉夢上尚書􅀃命曰髙宗夢得􅀃盤庚弟小乙子名武丁德髙可尊故號高宗夢得賢相其名白說使百工營求諸野得諸􅀓巖使百官以所夢之形像經營求之於外野德之於􅀓巖之谿毛詩鴻鴈斯干曰吉夢維何維熊維羆維虺維虵大人占之維熊維羆男子之祥維虺維虵女子之祥又鴻鴈無羊曰牧人乃夢衆維魚矣旐維旟矣大人占之衆維魚矣實維豐年旐維旟矣室家溱溱溱溱衆也左傳僖下曰晉侯夢與楚子摶􅅮手􅅮也楚子伏巳而盬其腦􅐭啑也子犯曰我得天楚伏其罪吾且柔之矣晉侯上向故得天楚子下向地故伏其罪也腦所以柔物又宣上曰鄭文公有賤妾曰燕結夢天使與巳蘭曰余爲伯鯈余而祖也以是爲而子以蘭有國香人服媚之如是旣而文公見之與之蘭而御之生穆公名之曰蘭又昭元曰昔武王邑姜方震大叔邑姜武王后齊太公之女也懐胎爲震大叔成王之弟虞夢帝爲巳曰餘命而子曰虞帝天也將與之唐属諸叅而蕃育其子孫又哀下曰宋景公無子取公孫周之子得與啓畜諸公宮未有立焉公卒得夢啓北首而寢於盧門盧門宋東門也北首死處在門外失國之象也巳爲烏而集於上咮加於南門尾加於桐門桐門北至曰余夢羙必立乃立得春秋元命苞曰堯爲天子夢白帝遺吾馬喙子其母爲扶始􅂛丘睹白帝上有雲虎感巳生臯陶此盡夢所見告之辭也雲虎有雲􅃺如虎堯聘索􅃺如問之如尭言徴與語明於刑法周書曰文王去啇在程正月旣生魄大姒夢見啇之庭産􅁄小子發取周庭之梓樹乎闕間梓化爲松栢棫柞寤驚以告文王王及太子發並拜􅁻夢受啇之大命于皇天上帝史記曰􅁗文公夢黃虵自天下属地其口止於鄜衍李竒曰鄜昔乎山阪曰衍問史敦敦曰此上帝之徴君其祠之又曰王太后母曰臧兒嫁爲槐里王仲妻生兩女長女嫁爲金王孫婦臧兒卜女當貴乃奪金氏内之太子宫太子幸愛之生三女一男男方任身時王羙人夢日入懷太子曰此貴徴也孝景帝即位王夫人爲皇后其男爲太子景帝崩太子襲號爲武皇帝漢書曰髙祖薄􅁎内後宫􅀊餘不得幸始􅁎與管夫人趙子兒相愛約曰先貴無相忘巳而管夫人子兒先幸漢王漢王四年坐河南城四幸靈臺此兩羙人侍而薄􅁎不得見二人相與􅀏薄􅁎􅀄時約漢王問其故兩人俱以實告漢王心悽然憐薄􅁎是日召欲幸之對曰昨夢龍據胷㫖是貴徴也吾爲汝成之幸有身生文帝太平御覽卷第三百九十七
