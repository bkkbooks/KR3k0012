  text: 太平御覽卷第三百六十二
  hash: sha256:ebe777170050e244b111882d667edb8ae67bc45d63e7d16071e8c6680230f9c9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_362-1a}
body:
  text: 人事部三姓名姓􅀃文曰姓人所生也古之神聖人母感天而生子故稱天子因生以從女生生亦聲也易􅀋謀曰黄帝吹律以定姓左傳隱八年曰無駭卒羽父請謚與族公問族於衆仲衆仲對曰天子建德因生以賜姓因其所由生以賜姓謂􅀂舜由嬀汭故謂陳爲嬀姓胙之土而命之氏諸侯以字諸侯位卑不得賜姓故其臣因氏其王父字爲謚因以爲族官有丗功則有官族邑亦如之公命以字爲展氏無駭公子展之孫故爲展氏也又襄四年曰穆叔如晉范宣子逆之問焉曰古人有言曰死而不朽何謂也穆叔未對宣子曰昔匄之祖自虞以上爲陶唐氏在夏爲御龍氏在啇爲豕韋氏在周爲唐杜氏晉主夏盟爲范氏其是之謂乎穆叔曰以豹所聞此之謂丗禄非不朽也史記曰太公望吕尚者東海上人其先祖甞爲四嶽佐禹平水土甚有功虞夏之際封於吕本姓姜氏從其封姓故曰吕尚漢書曰夏侯嬰爲滕令故號滕公及曾孫頗尚主主隨外家姓號孫公故滕公子孫更爲孫氏又曰戍卒婁敬求見􅀃上曰陛下取天下與周異而都雒陽不便不如入關據􅁗之固上以問張良良因勸上是日車駕西都長安拜婁敬爲奉春君賜姓劉氏又曰灌夫潁隂人也父張孟甞爲潁隂侯灌嬰舎人因得幸進之至二千石故蒙灌氏姓爲灌孟師古曰蒙冒也又曰衛青字仲卿其父鄭季河東平陽人也以縣吏給事侯家平陽侯曹壽尚武帝姊陽信長公主季與主家僮衛嫗通生青青有同産兄衛長君及子夫子夫自平陽公主家得幸武帝故青冒姓衛氏漢書曰京房字君明東郡頓丘人也房夲姓李推律自定爲京氏後漢書曰第五倫字伯魚京兆人也其先齊諸田諸田徙園陵者多故以次第爲氏崔鴻三十國春秋夏録曰赫連勃勃下書朕之皇祖自北遷幽朔姓改姒氏音殊中國故從母氏爲劉子而從母之姓非禮也朕將以義易之帝王者係天爲子是爲徽實與天連今改姓曰赫連氏庶恊皇天之意其非正統皆以鐵伐爲氏庶朕宗族子孫剛銳如鐵皆堪伐人三國典略曰周蔡祐字承先陳留圉人齊安郡守襲之子也有膂力便􅀐射太祖以其戰功賜姓大利稽氏唐書曰康國即漢康居之國也其王姓温月氏先居張掖祁連山北昭武城爲突厥所破南依䓗嶺遂有其地枝庶皆以昭武爲姓示不忘本也又曰則天朝博州刺史琅邪王沖據博州起兵沖父豫州刺史越王貞又舉兵於豫州與相應討平之改姓爲虺氏又曰尚可􅀌東部鮮卑宇文之别種也代居松漠之間天寳末歸國􅈻安禄山後事史思明上元中歸順累授左右威衛二大將軍魚朝恩之統禁軍愛其勇力甚委遇之俾爲養子奏改姓魚氏又曰李全略者本姓王名簡爲鎭州小將事王武俊元和中節度使王承宗殁軍情不安自抜歸朝授代州刺史及長慶􅀄鎭州軍亂害田弘正穆宗爲之旰食以簡甞爲將召問其計簡遂極言利害願有以自效明年擢拜横海軍節度使賜姓李氏名全略以崇寵之白虎通曰人所以有姓者何所以崇恩愛厚親親逺禽獸别婚姻也故紀丗別􅀋使生相愛死相哀同姓不得相娶皆爲重人倫也姓者生也人禀天氣所以生者也詩云天生蒸民尚書曰平章百姓姓所以有百者何以爲古者聖人吹律定姓以記其族人含五常而生正聲有五宫商角徴羽轉而相雜五五二十五轉生四時異氣殊音悉備故姓有百也所以有氏者何所以貴功徳下􅇊力或氏其官或氏其事聞其氏即可知矣所以勉人爲善也或氏王父字者何所以別諸侯之後爲興滅國繼絶世也王者之子稱王子王者之孫稱王孫諸侯之子稱公子公子之子稱公孫公孫之子各以其王父字爲氏故春秋有王子瑕論語有王孫賈又有衛公子荆公孫朝魯有仲氏孟氏叔氏季氏楚有昭屈景氏齊有髙國崔盧氏以知其子孫也王者之子亦稱王子兄弟立而皆封也或曰王者之孫亦稱王孫刑徳放曰堯知命表稷契賜姓于􅁎臯陶典刑不表姓言天任徳逺刑禹姓姒祖昌意以薏苡生殷姓子氏祖以玄鳥子生也周姓􅁎氏祖以履大人跡生也風俗通曰萬􅀋之中唯人爲貴春秋左氏傳官有丗功即有官族邑亦如之公羊譏衛滅邢論語貶昭公娶於呉諱同姓也蓋姓有九或氏於號或氏於謚或氏於爵或氏於國或氏於官或氏於字或氏於居或氏於事或氏於職典號唐虞夏殷也以謚戴武宣穆也以爵王公侯伯也以國曹魯宋衛也以官司馬司徒司宼司空司城也以字伯仲叔季也以居城郭園池也以事巫卜陶丘也以職三馬五鹿青牛白馬也三輔舊事曰堯母字慶都配髙辛氏而生堯因主人伊長孺爲姓謂之伊陳留風俗傳曰侯氏氏侯爵周微官失其守故以侯爵爲姓又曰􅁗之先曰伯翳佐舜擾馴鳥獸錫姓曰嬴氏其後分封以國爲姓有徐氏郯氏黄氏江氏文士傳曰束晳字廣微踈廣後也王莽末廣曽孫孟造自東海避難歸蕪城改姓去踈之足爲束氏丗􅀃曰諸􅁑令恢與王丞相共争姓族前後王曰何不言􅁑王而言王葛諸􅁑曰譬言驢馬不言馬驢驢寕勝馬耶論衡曰孔子推律自知殷之苗也名禮記曲禮上曰名子者不以國不以日月不以隱疾不以山川此在常語之中爲後難諱也春秋􅀓曰名終將諱之又曰二名不偏諱孔子之母名徴在言徴不稱在言在不稱徴也又曲禮下曰君子已􅀌不更名重本也又大傳曰名者人治之大也可無慎乎人治行以正人左傳桓公曰􅀄晉穆侯之夫人姜氏以條之役生太子命之曰仇其弟以千􅅿之戰生命之曰成師師服曰異哉君之名子也夫名以制義義以出禮禮以體政政以正民是以政成而民聽易則生亂嘉耦曰妃怨耦曰仇古之命也自古有此言也今君命太子曰仇弟曰成師始兆亂矣兄其替乎又曰子同生以太子生之禮舉之公問名於申繻對曰夫名有五有信有義有象有假有􅀋以名生爲信􅀂唐叔虞魯公子友以德命爲義􅀂文王名昌武王名發也以􅀋爲象􅀂孔子首象尼丘山取於物爲假􅀂伯魚生人有饋之魚因名之曰鯉取於父爲􅀋若子同生有與父同者也不以國國君之子不自以本國爲名也不以官不以山川不以隱疾不以畜牲不以器幣周人以諱事神名終將諱之君父之名固非臣子所斥禮旣卒器以木鐸狥曰舍故而諱新謂舎親盡之祖而諱新死者故以國則廢名以官則廢職以山川則廢主以畜牲則廢祀以器幣則廢禮晉以僖侯廢司徒僖侯名司徒廢爲中軍也宋以武公廢司空武公名司空廢爲司城也先君獻武廢二山二山具敖也魯獻公名具武公名敖是以大物不可以命公曰是其生也與吾同物命之曰同物􅀋也謂同日也又閔公曰成季之將生也桓公使卜楚丘之父卜之曰男也其名曰友及生有文在其手曰友遂以命之遂以爲名又文下曰鄋瞞侵齊鄋瞞狄國名遂伐我公卜使叔孫得臣追之吉冬十月敗狄于鹹獲長狄僑如僑如鄋瞞國之君以命宣伯得臣待事而名其三三子因名宣伯曰僑如以旌其功也又宣上曰楚􅃲伯比淫於䢵子之女生子文弃諸夢中虎乳之䢵子畋見之使收之楚人謂乳爲榖謂虎爲於莵故命曰􅃲榖於莵又宣上曰鄭文公有賤妾曰燕姞夢天使與巳蘭曰予爲伯儵余爾祖也以是爲而子以蘭有國香人服媚之如是旣而文公見之與之蘭而御之辭曰妾不才幸而有子將不信敢徴蘭乎公曰諾生穆公名之曰蘭又定下曰魯苫越生子將待事而名之陽州之役獲焉名之曰陽州欲自比僑如漢書曰司馬相如小名犬子及長慕藺相如爲人更名相如後漢書曰趙歧字臺卿生於御史臺因字臺卿東觀漢記曰廉范爲蜀郡守令民不禁火百姓皆喜家得其願時生子皆以廉爲名者千魏志曰程昱本名立夢登太山捧日人或以夢告太祖太祖曰終爲吾腹心遂上加日又曰鄧艾字士載􅁄陽人年十二隨母至潁川讀故太丘長陳寔碑文言爲丗範行爲士則艾遂自名範字士則後宗族有與同者故改焉又曰王昶字文舒太原人其爲兄子及子作名字皆一依謙實以見其意故兄子黙字處静沉字處道其子渾字玄沖深字道遂書戒之曰夫人之道莫大於寳身全行以顯父母呉志曰立子􅓣爲太子注曰休制曰􅀌今爲四子作名字太子名􅓣音如湖水灣澳之灣字莔音如迄今之迄次子名音如兕觥之觥字音如玄㘋首之㘋音玄次子名音如草莽之莽字盥音如舉物之舉次子名音如襃衣下寛大之襃字寅音如有所推持之推此都不與丗所用者同故鈔舊文㑹合作之江表傳曰頋雍從蔡伯喈學專一清静敏而易教伯喈貴異之謂曰卿必成致今以吾名與卿故雍與伯喈同名由此也呉録曰雍字元歎言爲蔡雍之所歎也晉書曰謝玄破符堅於淮淝先有童謡云誰謂爾堅石打破故桓豁以石名子以邀其功晉中興書曰咸和元年當徴􅂫峻司徒導欲出王舒爲外授及更拜撫軍將軍㑹稽内史秩中三千石舒上䟽以父名㑹不得作㑹稽朝議以字同音異於禮無嫌舒陳音雖異而字同乞換他郡於是改㑹字爲鄶古㑹切舒不得巳親職崔鴻十六國春秋前涼録曰李弇字子隴西狄道人也弇夲名良又妻姓梁張駿戲之曰卿名良妻姓梁夫妻相同稱子孫將何以目其舅氏昔耿弇以少年立功立事吾今頼卿有同於耿氏乃賜名曰弇又曰陳安成紀平㽵人也少慷􅁣讀書見許禇而慕之乃自字虎侯後魏書曰游肇字伯始髙祖賜名尚書令髙肇丗宗之舅爲百寮懾憚以肇名與巳同欲令改易肇以髙祖所賜秉志不許髙肇甚銜之丗宗嘉其剛梗又曰太和􅀄宋弁爲殿中郎中髙祖甞因朝㑹之次歴訪風月景山水梁書曰張􅌘字四山􅀄􅌘父稷爲剡令至􅌘亭生之因名􅌘字四山少敦孝行年三十餘猶班衣受稷杖動至數百收淚歡然三國典略曰周陸逞字季明綏德郡公通之弟也􅀄名彦字丗雄魏文帝甞從容謂之曰爾旣温􅁉何乃字丗雄且爲丗之雄非所冝也於爾兄弟又復不􅀋遂改焉南史曰陳文帝甞謂宣帝曰我諸子皆以伯爲名汝諸子冝用叔爲稱宣帝因以訪毛喜喜即條自古名賢杜叔英虞叔卿等二十餘人以啓之文帝稱善白虎通曰人必有姓名何以吐情自紀尊事人者也論語曰名不正則言不順三月名之何天道一時物有其變人生三月目煦亦能咳􅀏與人相荅故因其始有知而名之故禮傳曰子生三月則父名之名之於祖廟者謂子之親廟也明當爲宗祖子也一􅀃名之於燕寢名者㓜小卑賤之稱也質略故於燕寢殷以日名子何殷家質直故以生日名也尚書言太甲帝乙武丁也於名臣亦得以甲乙生日名子不使亦不止也以尚書道殷臣有巫咸有祖巳也何以諸侯不象王者以生日名子也以大王名亶甫王季名歴此殷之諸侯也不以子丑爲名何曰甲乙者幹也子丑者枝也幹者夲夲貫故以甲乙爲名也名或兼或單何名子非一或聽其聲律定其名或依其事旁於形故或兼或單也依其事者􅀂后稷是也棄之因名爲棄旁其形者孔子首􅀋魯尼丘山故以爲之名也風俗通曰􅀽賀字元服祖父京爲侍中安帝始加元服京入賀而賀始生因名之曰賀而字元服鄭玄別傳曰玄一子名益字益思年二十三相國孔府君舉孝廉府君以多冦屯都昌爲賊管亥所圍乃令從家將兵奔救遇賊見害時年二十七也妻有遺體生男􅀇以太歳在丁夘生此男以丁夘日生生又手理與􅀇相似故名曰小同孟宗別傳曰孟宗爲豫章太守民思其惠路有行歌故時之生子者多以孟爲名江祚別傳曰祚爲南安太守民思其德生子多以爲名字蜀李書曰賈夷字景叔梓潼人也太始􅀄内移河東少仕晉臺爲倉部令史懷帝時爲安冨令中原䘮亂玉衡七年歸國武帝素聞夷名重之皇子雅生因名賈夷􅁗記曰後帝泓字元時東宫生邵弘言於父曰君之於臣先生之與其門人名之可也至於同官之於僚黨同姓之於昆弟同門之於朋友可以稱其字而不可斥其名故公羊傳曰名不如字者非謂其人之名不如其字尊乃謂爲人所字則近乎見尊爲人所名則近乎見卑也古之君子之名子也必以信義而擇淑令所以祥其名也不以官職所以殊其名也不以畜幣所以重其名也不以隱疾所以顯其名也遍告内外所以昭其名也書而藏之所以寳其名也賤者避焉所以貴其名也冠而有字所以尊其名也名成乎禮字依乎名名字之本字名之末也爲本故尊爲末故卑尊故其禮詳卑故其事略也且婦人無名故賤於丈夫野人無名故賤於學士名者巳之所以事尊尊者之所以命巳字則巳之所以接卑卑者之所以稱己未有用之於尊而爲卑用之於卑而爲尊者也搜神記曰齊惠之妾蕭桐子見御有身以其賤不敢言也取薪而生頃公於野又不敢舉也狸乳鸇覆之人見而􅀵之因名無野何槇玄壽賜名叙曰新婦荀氏所生女以歳在丁丑四月五日日始出時生此月斗建巳其日又巳其時加夘甲乙夘皆東南春夏天地動發萬物滋生今月吉月之善時也又於易卦震位在夘巽位在巳震爲長男巽爲長女而此女孫正用兹日斯時始瞻日月豈伊先祖之靈寔臨祐之玄髮素顔婦人之上姿也壽考無疆生民之至願也故賜名曰玄壽焉太平御覽卷第三百六十二
