front:
  text: 太平御覽卷第一百八十五
  hash: sha256:f20171923d11b7f560fd2acd1a4bf89a553275e6fc16cc5c370abf0348caa40f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_185-1a}
body:
  text: 居處部十三㕔事齋房庭階陛墀序廊塾壇屏扆宁㕔事郡國志曰廣州呉孫皓時以滕脩爲刺史未至州有五仙人􅀐五色羊􅀒五榖來迎而去今州㕔事梁上􅀞五仙人􅀐五色羊爲瑞裴淵廣州記曰州㕔事梁上􅀞五羊像又作五榖囊隨像懸之云昔髙固爲楚相五年衘榖莖于楚庭於是圖其像廣州則楚分野故因圖象其瑞焉臨海記曰章安縣南門有赤蘭橋世傳成公綏作縣此橋上製㕔縣令年常􅀕㕔事神用生鹿其年活得白鹿還於㕔事上生以􅀕神仍遂食之歳時用焉自是以後白鹿不可復得而必須生鹿歴代相承迄今不絶世說曰􅁃太尉兄弟􅀄渡江行路人有避􅀨者悉聚諸㕔事上征西車􅀐自譬遣之不肯去太尉新沐頭散髮髙詠從閤内出避􅀨者退莫有留者王㓪與許靖書曰武皇帝於江陵劉景􅂛㕔事上共論道足下至于通夜不寐忘倦飢渇無巳盧諶􅀕法曰凡􅀕法有廟者置之於座未遑立廟􅀕於㕔事可也兩京記曰考功貟外㕔有薛稷􅀞鶴宋之問爲讃工部尚書㕔有薛稷􅀞樹石並爲時所重齊王安成記曰大和中陳郡殷府君引水入城穿池殷仲堪又於池北立小屋讀書百姓于今呼曰讀書齋晉徴祥說曰桓􅀇鎮姑熟屋壁先􅀞作黄盤龍號盤龍齋俄而玄敗將軍劉毅居之毅小名盤襄􅃆記曰金城内刺史院有髙齋梁昭明太子於此齋造文選鮑至云簡文爲晉安王鎮襄陽日又引劉孝威􅁃肩吾徐防江伯操孔敬通惠子恱徐陵王囿孔鑠等於此齋綜覆詩集于時鮑至亦在數凡十人資給豐厚曰設肴饌于時號爲髙齋學士雍州記云髙齋其泥色甚鮮浄故此名焉南平丗子恪臨州有甘露降此齋前竹林昭明太子於齋營集道義以時相繼又曰白土齋南道有一齋以栗爲屋梁武帝臨州寢卧於此齋中常有五色雲廻轉􅃺如盤龍屋上恒紫雲騰起形似繖蓋逺近望者莫不異焉梁武帝于此龍飛又曰髙齋東北有一齋名曰下齋次於髙齋制度壯麗極爽塏刺史辯决獄訟舊出此齋國史􅀘曰梁武造寺令蕭子雲飛白大書一蕭字在焉李約自江淮竭産買歸洛中置於小亭號曰蕭齋房說文曰房室在旁也釋名曰房旁也室之兩旁也尚書大傳曰古后夫人將侍於君前息燭後舉燭至于房中釋朝服襲燕服然後入御于君毛詩黍離曰君子陽陽左執簧右招我由房漢書曰哀帝􅀄即位躬行儉約省減諸用政事由已出朝廷翕然望焉有詔問丞相大司空定陶恭王太后冝當何居孔光不欲令帝旦夕相近即議以爲定陶王太后冝改築宫大司空何武曰可居北宫有紫房􅃨道通未央宫太后果從􅃨道朝夕至帝所求欲稱尊号貴􅃂其屬使上以不得直道而行應劭漢官儀曰皇后稱椒房以椒􅂗室圭温暖除惡氣也酈善長注水經曰􅉮水出南山芒水谷北流遥玉女房水側山際有石室世謂之玉女房郡國誌曰葭萌縣玉女房昔有玉女入石穴空有竹數莖下有青石壇每因風􅁪自掃壇王子年拾遺記曰越欲滅吴蓄天下竒寳羙人異味以進於吴殺三牲以祈天地殺龍以祠川海以江南億万户民輸爲傭保越又有美女二人一名夷光一名脩明以貢於吴吴處之以椒華之房貫細珠爲簾熀愰内竊窺者莫不動心驚魂謂之神人吴王妖惑怠於國政及越兵入乃抱二女以逃吴苑晉宮閣名曰洛陽宫内有義和温房十洲記曰崐崘山有紫翆丹房拾遺録曰崐崘丹宻雲房東西千歩望之如丹霞尸子曰泰山之中有神房阿閣楚辭曰姱容脩態絙洞房又九歌曰桂棟􅀆蘭橑新夷楣􅀆葯房宋玉風賦曰主人女子乃更有蘭房奥室止臣其中庭說文曰庭朝中也尚書曰咸造勿褻在王庭周易曰揚于王庭孚號有厲造自邑不利即戎利有攸徃禮記曰諸侯之庭毛詩曰洒掃庭内又曰俟我于庭乎而又曰殖殖其庭又曰子有庭内弗洒弗掃又曰有瞽有瞽在周之庭左傳曰庭實旅百論語曰鯉趨而過庭曰學詩乎又曰孔子謂季氏八佾舞於庭是可忍也孰不可忍也周書曰成王四征不庭漢書曰王啇爲人多質有威重師古曰多質言不爲文飾長八尺餘身體鴻大容皃絶人河平四年單于來朝引見白虎殿丞相啇坐未央庭中單于前拜謁啇師古曰單子將見天子而經未央庭中過啇起離席與言單于仰視啇貌大畏之遷延却退天子聞而歎曰眞漢相矣晉書曰謝􅀇字㓜度少潁悟與從兄郎俱爲叔父安所器重安甞戒約子姪曰子弟亦何豫人事而正欲使其佳諸人莫有言者􅀇荅曰譬如芝蘭王樹欲使其生於庭階耳安恱說苑曰呉入楚申包胥告急於􅁗􅁗哀公曰諾固將圖之申包胥立哭於􅁗庭晝夜哭七日七夜不絶聲哀公曰有臣如此可不救乎興師救楚呉人引兵而還昭王反復欲封申包胥包胥辭曰救亡非爲名也功成受賜是賣勇也遂退而隠終身不見階釋名曰階梯也言有等差說文曰階陛也陛􅂛髙階也除殿陛也阼主階也尚書曰舞干羽于兩階七旬有苗格禮記曰季氏之葬在西階下又大傳曰天子阼階髙九尺又曰主人與客讓登主人先登客從之拾音渉級聚足連歩以上上於東階則先右足上於西階則先左足又曰夏后氏殯於東階之上則猶在阼也周人殯於西階之上則猶賔之也左傳曰石之紛如死于階下又曰衛孫子來聘公登亦登論語曰没階趨進翼如也史記曰堯舜土階三等堂髙三尺三􅁗記曰明光殿以玉爲階吕氏春秋曰周之明堂茅茨蒿柱土階三等以見儉節也文選詩曰紅藥當階翻蒼苔依砌上又曰阿閣三重階陛摯虞决要注云其制有陛右墄七則反左平平以文塼相亞次墄者爲陛級也九錫之禮納陛以登謂受此陛以上殿靈光殿賦曰飛陛縁雲以上征蔡邕獨斷曰天子陳兵於陛故呼陛下用卑逹尊之意也墀說文曰墀塗地也禮記曰天子赤墀漢書典職曰以丹􅃮地故曰丹墀漢書有白玉墀又曰曲陽侯王根僣作赤墀青璅司􅀠京兆奏根􅀒􅃏謝罪劉楨清慮賦曰駢雄黄以爲墀序爾雅曰東西廂謂之序郭璞曰所以序别外内也犍為舎人日殿東西堂序尊卑處廣雅曰反坫謂之序說文曰序東西牆也尚書顧命曰大訓在西序河圖在東序孔安國曰大訓唐虞書典謨也河圖八卦也王延壽魯靈光殿賦曰東序重深而奥祕廊周書作雒曰凢五宫明堂咸有重廊史記紂有䛕臣曰左強夸而目巧教紂爲象廊漢書曰武帝筞茂才曰盖聞虞舜之時逰巖廊之上文頴注曰殿下外屋也􅀳灼注曰堂邊曰巖峻之廊也鄭緝之東陽記曰石歩廊去歌山十里臨流虚構高可數丈長三十丈可容百人坐韓子曰師曠爲晉平公請角一奏有雲從西北方起再奏大風而隨之裂幃幕破俎豆墯廊瓦平公懼伏于廊室兩京記曰隋煬帝從東都至西京御道並作長廊枚乗七發曰連廊四注臺城増光陸機與弟雲書曰聽頌觀東作百丈許廊屋塾爾雅曰門側之堂謂之塾郭璞注曰東門堂尚書顧命曰先輅在左塾之前次輅在右塾之後禮記學記曰古之教者家有塾白虎通曰所以必有塾何以飾門因取其名也明臣下當見於君先孰思其事也東觀漢記曰趙孝爲郎每告歸往來常白衣歩檐過道上郵亭但稱書生􅀉止於亭門塾魏武制度奏曰三公列侯門施内外塾方三十􅅿壇左傳曰子産相鄭伯以如楚舎不爲壇漢書曰蕭何薦韓信於髙祖髙祖擇日齋戒設壇拜爲將軍莊子曰孔子遊乎緇帷之林休坐乎杏壇之上弟子讀書孔子􅃶歌皷琴奏曲未終有漁父者下船而來左手據膝右手柱頥以聽曲終而招子貢子路二人俱對客指孔子曰彼何爲者也子路曰魯之君子也徐靈期南岳記曰南岳山上有飛流壇懸水激石飛湍百仞即孫温伯所䘮身處也又有曲水壇水行石上成溝瀆如世人臨河壇也三月三日時來逍遥梁州記曰􅃆陽城先􅃆陽縣所治也在漢水南舊蕭何所築劉備爲漢王權住此城盟於城下今門外有盟壇猶存帝王世紀曰雍郊有五畤壇漢武􅀗麟處屏爾雅曰屏謂之樹郭璞曰小牆當門中者也犍爲舎人曰以垣當門敝爲樹廣雅曰復罳謂之屏說文曰屏蔽也釋名曰屏自鄣屏也蕭牆在門内蕭肅也臣將入於此自肅警之處也罘罳在門外罘復也臣將入請事於此復重思也禮記禮器曰康王䟽屏天子之廟飾也鄭玄注云屏樹也今謂之果罳論語八佾曰或問管氏知禮乎曰􅀖君樹塞門管氏亦樹塞門管氏而知禮孰不知禮鄭玄注曰樹屏也又季氏曰吾恐季孫之憂不在顓􅁷而在蕭牆之内蕭牆謂之屏也漢書佞幸傳曰哀帝令將作爲董賢起􅃁營義陵旁内爲便房剛栢題湊外徼道周垣數里門闢罘罳甚盛又曰王莽傳曰莽性好時日小數及事迫急但爲厭勝遣使壞渭陵園門罘罳曰無使民復思漢也漢官典職曰省閣下大屏稱曰丹屏尚書郎含雞舌香伏其下奏事晉書曰阮籍爲東平相􅜂去屏障使内外相對孫卿子曰天子外屏諸侯内屏禮也外屏不欲見於外内屏不欲見於内也風俗通曰屏卿大夫以帷士以簾稍有第以自障蔽也示臣臨見自整屏氣處也呉越春秋曰越將伐呉越王命於夫人王背屏夫人向屏而立王曰自今日之後内政無岀外政無入各守其職巳盡其信内中辱者則是子境外千里辱者則是予也吾見子於是巳明試矣王岀宫夫人送王不過屏因反闔其門填之以土白虎通曰所以設屏何所以自障也示極臣下之故也天子徳大故外屏諸侯徳小所照見近故内屏扆爾雅曰户牖之間謂之扆郭璞注曰牕東户西也礼云斧扆形如屏風畫爲斧文置扆地以其所名之耳尚書顧命曰設黼扆儀禮覲禮曰天子􅀒扆南面朝諸侯是􅂛致命也禮記明堂位曰天子􅀒斧扆南而立宁爾雅曰門屏之間謂之宁郭璞注曰人君視朝門宁立處也釋名曰宁佇也見君所佇立定氣之處也毛詩曰俟我於著乎而曲禮曰天子當宁而立諸公東面諸侯西面曰朝太平御覽卷第一百八十五
