  text: 太平御覽卷第八百三十九百榖部三
  hash: sha256:b5528892840787d0a8a9bfd959951cc96a1adf4831b3b0c54e79284dceee8acc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_839-1a}
body:
  text: 禾稻秔秫禾尚書微子之命曰唐叔得禾異􅅿同潁獻諸天子王命唐叔歸周公于東作歸禾又金縢曰周公居東秋大熟未穫天大雷電以風禾則盡偃王啓金縢得周公代武王之􅀃王出郊天乃反風禾盡起尚書大傳曰成王時有苗異莖而生同爲一穟大幾盈車長充箱人有上之者王召周公而問之公曰三苗爲一穟抑天下其和爲一乎果有越裳氏重譯而來毛詩甫田曰禾易長􅅿終善且有易治也長畒竟畒也禮記檀弓下曰季子皐葬其妻犯人之禾申祥以告曰請庚之子臯曰孟氏不以是罪子朋友不以是棄予以吾爲邑長於斯也買道而葬後難繼也左傳隱公曰夏四月鄭􅀕足帥師取温之麥温周地蘇氏邑也秋又取成周之禾春秋運斗樞曰旋星明則嘉禾液春秋感精符曰日下論於地則嘉禾興春秋􅀃題辭曰天文以七列精以五故嘉禾禾之滋莖長五尺五七三十五神盛故連莖三十五穗以成盛德禾之極也又曰禾者衘滋液衘滋液以生故以和軟為名也孝經援神契曰德下至地則嘉禾生春秋繁露曰禾實於野粟缺於倉皆竒恠非人所意乎此可畏也史記封禕書曰管仲􅀃桓公曰古之封禪北里禾所以爲盛蘇林注曰北里地名漢書曰武帝外事四夷四民去夲董仲舒􅀃上曰春秋他穀不書至於麥禾不成則書之以見聖人於五榖㝡重麥與禾又郊祀志曰王莽簒位興神仙事種五梁禾於殿中各順其色置其方靣煑二十餘物漬種計粟斛成一金言此黄帝榖仙之術又曰莽使中郎平憲誘羗還云天下太平一禾長文餘故乞内屬續漢書曰承宫字少子瑯耶人甞在蒙隂山中耕種禾􅁰臨熟人認之宫便推與而去由是發名也東觀漢記曰光武以建平元年生於濟陽縣是歳有嘉禾生一莖九穗大於凡禾縣界大熟因名上曰秀又曰淳于恭宇孟孫有盗刈禾恭見之恐其愧因伏草中盗去乃起後漢書王符論曰夫養稂莠者傷禾稼惠姧宄者賊良人又曰蔡茂􅀄在廣漢夢坐大殿殿極上有三穗禾茂跳取之得其中穗輙復失之屋之大者古通呼為殿也極殿梁也三輔間謂屋梁為極以問主簿郭賀賀離席慶曰大殿者官府形象也極而有禾人臣之上禄也取中穗是中台之位也於字禾失為秩曰失之所以得禄秩也衮職有闕君其􅀘之旬月而茂微焉昊志曰赤烏七年宛陵言嘉禾生㑹稽始平言嘉禾生改年爲嘉禾晉書曰􅁃衮居貧禾熟穫者己畢而採捃尚多衮乃引其羣子以退曰待其間及其捃也不曲行不旁掇跪而把之則亦大􅀗又與邑人入山拾橡分夷險序長㓜推易居難禮無違者臧榮緒晉書曰朱冲字巨容躬植禾蓻􅂼鄰牛侵犯持蒭送牛而無恨色晉起居注曰武帝丗嘉禾三生其七莖同穗晉中興徴祥􅀃曰王者德盛則嘉禾生嘉禾仁卉也義熈十三年鞏縣民宋曜於田中獲嘉禾九穗同夲九穗九州是時羌平六合寧後魏書曰許謙字元遜代人也子洛陽爲鴈門太守家田三生嘉禾皆異壟合穎丗祖善之進爵北地公也北史曰趙肅授原州揔管司馬在道夜行其左右馬逸入田中暴人禾輙駐馬待明訪禾主酬直而去唐書曰朔方節度郭子儀言寧朔縣界荒地廣十五里有黒禾榖岀遍地毎日側近百姓掃盡經􅀫還生前後可得五六千石其禾圎實味甘美臣以爲天啓興王先瑞百榖故漢稱兩粟周頌来麰豈若瑞禾自出家給人足蓋陛下富教安人務農敦本光復社稷康濟􅀺元之應也又曰代宗爲皇太子乾元􅀄上降誕䂊州奏百姓李氏有嘉禾生及是􅁽禮特詔改名䂊又曰永㤗元年秋京兆府上言鄠縣嘉禾生穗長一尺餘穗上粒重疊如連珠又曰馬燧大暦四年爲懷州刺史乗兵亂後其夏大旱人失耕種燧乃務教化將吏有父母者燧輙造之施敬収􅄟􅁀骨去其煩苛至秋田中生穭禾人頗便之穞音吕禾􅄪生也又曰元和中東川觀察使潘孟陽上言龍州武安川中嘉禾生有麟食之復生麟之來一鹿引之羣鹿隨焉光華不可正視􅀞工就圖之并嘉禾一函以獻淮南子曰后稷辟􅁟墾草以爲百姓力農然而不能使禾冬生又曰洛水輕利而冝禾又曰夫子見禾之三變夫子孔子也三變始於粟粟生於苗苗成於穗也滔滔然曰狐郷丘而死我其首禾乎禾穗垂而向根君子不忘夲也吕氏春秋曰飯之美也􅀇山之禾山海經曰崑崙墟上有禾禾長五尋郭璞注曰木禾榖頴也白虎通曰德至於地則嘉禾生嘉禾者大禾也􅀃文曰禾嘉榖也二月始生八月而熟得時之中故謂之禾木也木王而生金王而死稹早種也頴禾末也榖禾皮也稈禾莖也稾稈也㑹稽典録曰沈勲身自耕耘以供衣食人有盗穫其禾勲見而避之明日更収拾送致其家盗者愧懼齋還不受六韜曰人主好田獵則歳多大風禾榖不實鄭􅀇別傳曰􅀇年十六號曰神童民有獻嘉禾者欲表府文辭鄙略􅀇爲改作又著頌一篇侯相髙其才爲修㓂禮杜寳大業拾遺録曰七年九月太原郡有獻禾一夲三穗長八尺穗長三尺五寸大尺圍芒穗皆紫色鮮明受自禾己上二尺餘亦紫色有老人年八十餘以素木匣盛之賜物三十叚板授嘉禾縣令績搜神記曰盧陵巴丘人文晃者丗以田作爲業秋收以過穫刈都畢明旦至田禾悉復滿湛然如生即更穫所穫盈倉而巨冨廣五行記曰東魏孝静帝天保􅀄四月禾夜生於帝銅硯中及明而長數寸有穗其年帝爲髙洋所幽遇䲴而崩古今注曰和帝元年嘉禾生濟隂城陽一莖九穗安帝延光三年嘉禾生九眞百五十六本一百六十八穗汜勝之書曰種禾無期因地爲時三月榆莢雨時髙地強土可種禾薄田不能糞者以原􅁞矢􅄂禾種之則禾不崔寔四民月令曰三月二月可種稹米夢書曰禾稼爲財用之所夢見禾稼言財氣生廣志曰渠和蔓生實如葵子米粉白如麵可爲饘粥牛食之肥六月種九月熟感禾扶䟽生實似大麥楊禾似藋粒細也折右炊停即牙生此中國巴禾木稷也火禾髙丈餘子如小豆出粟特特國稻周禮夏官職方氏曰楊州冝稻青州冝稻麥禮記曲禮下曰􅀕示廟之禮稻曰嘉􅂼又月令曰季秋之月天子乃以大甞稻先薦寢廟又内則曰飲重醴清糟稻醴清糟􅁰醴清糟又内則曰取稻米舉糔息酒切溲所九切之小切狼臅昌録切膏以與稻米爲酏之然切左傳昭五曰鄅音禹人藉稻履行之也春秋􅀃題辭曰稻之爲言藉也稻冬舎水盛其德也故稻太隂精含水漸洳乃能化也江旁多稻固其宜也宋均注曰稻苞裏也稻非水不生故曰隂精也孝經援神契曰汚泉冝稻尓雅曰稌稻也今沛國呼稌也廣雅曰粢稻其穗謂之禾東觀漢記曰劉敞拜廬江都尉歳餘遭旱行縣人持稻皆枯吏強責租敞應曰太守事也載枯稻至太守所酒數行以語太守太守曰無有敞以枯稻示之太守曰都尉事也敞怒叱太守曰䑕何敢爾也後漢書曰鄧晨爲汝南太守興鴻郄陂數千頃田鴻郄陂名今在䂊州汝南縣東成帝時開東水陂溢爲害翟方進爲丞相奏罷水陂江表傳曰孫亮五鳯元年交阯稗草爲稻吴志曰鍾離牧字子􅂛㑹稽山隂人少居永興自墾田種稻二十餘畒臨熟而縣民認之牧曰夲自田荒故墾之耳遂以稻與縣民縣吏召民繫獄欲繩以法牧請之長曰君自行義事僕爲民主當以法率下牧曰此是郡界縁君意頋來暫住今以少稻殺此民何必復留又曰黄龍三年由卷縣野稻自生改爲禾興縣􅀳中興書曰孫略字文度吴人少田於野時年饑榖貴人有生刈其稻者略見而避之晉書曰杜預脩邵信臣遺跡激用滍淯諸水以浸稻田萬餘頃分疆刋石使有定分公私同利衆庶頼之號曰杜父舊水道又曰惠帝征成都王狼狽左脚三指折匐入稻苗中頼侍中􅄞紹以身趕之又曰郭翻字長翔武昌隱士也不交丗事唯以漁釣射獵爲娱貧無業欲墾荒田先立表題經年無主然後乃作稻將熟有認之者悉與之縣令聞而詰之以稻還翻翻遂不受又曰􅀽甫甞詣何朂自言能爲劇縣朂曰唯欲宰縣不爲䑓閣職何也甫曰人各有能有不能譬繒中之好莫過錦錦不可以爲􅷏音滔榖中之美莫過稻稻不可以爲糜是以聖王使人必先以器苟非周材何能悉長黄覇馳名於州郡而息譽於京邑􅋝尉之材不爲三公自昔然也朂善之除松滋令宋書曰頋歡好學年六七歳家貧父使田中驅雀歡作黄雀賦而歸雀食稻過半父怒欲撻之見賦乃止齊書曰范雲甞從文惠太子幸東田觀穫稻文惠頋謂雲曰刈此甚快雲曰三時之務亦甚勤勞願殿下知稼穡之艱難無徇一朝之宴逸也文惠改容謝之南史曰孔琇之有吏能仕齊爲吴令有小兒年十歳偷刈隣家稻一束琇之付獄案罪或諌之琇之曰十歳便爲盗長大何所不爲縣中皆震肅梁書曰鄧元起甞至其西洱田舎有沙門造之乞於元起有稻幾二千斛悉以施之時人稱其有大度又曰陳伯之濟隂睢陵人也年十三四好着􅆩皮冠帶刺刀􅀱鄰里稻熟輒偷刈之甞爲田主所見呵之曰楚子莫動伯之曰君稻幸多取一檐何􅀂田主將執之因援刀而進曰楚子定何如田主皆反走徐擔稻而歸隋書曰梁陳五壇􅀕法以三牲首餘以骨體薦粢盛爲六飯粳以敦音堆稻以牟黄􅆝以簠白􅆝以簋􅁰以瑚粢以璉又曰齊孝昭皇建中平州刺史嵆瞱建議開幽州督元舊陂長城左右營屯歳收稻粟數十萬石比境得以周贍唐書曰開元十九年楊州奏穭生稻二百一十五頃再熟稻一千八百頃其粒與常稻無異又曰孟元陽爲曲環軍中大將環使董作西華屯元陽盛夏芒履立稻田中須役者退而後就舎故其田歳無不稔軍中足食淮南子曰江水肥而冝稻又曰今稻生於水而不能生於湍瀬之流又曰離先稻熟而農夫耨之稻米隨而生者爲離與稻相似耨之爲其少實也不以小利傷大獲也戰國䇿曰東周欲爲稻西周不下水東周患之􅂫子徃見西周之君曰君之謀過矣今不下水所以冨東周也今其民皆種麥無他種矣君􅀂欲害之不􅀂一爲下水以病其所種下水東周必以種稻而復奪之􅀂是則東周之民可令一仰西周受命於君矣國語曰越敗吴王孫雄請和范蠡不聽雄曰范子先有言無助天爲虐助天爲虐不祥今吾稻蟹不遺種子將助天爲虐乎吕氏春秋曰得時之稻大夲而莖葆長秱䟽穖穗如馬尾大粒無芒􅅮米而薄糠舂之易而食之香如此者不䔉益息也先時者大夲而莖葉格對對等短秱短穗多粃厚糠薄米多芒後時者纎莖而不滋厚糠多粃辟米不得待定熟仰天而死又曰史起爲鄴令民大􅀍其利相與歌之曰鄴有聖令爲史公決漳水􅀆灌鄴旁終古斥鹵􅀆生稻􅆝呉越春秋曰越王勾踐復興師伐吴吴王敗晝夜馳走三日飢頋見生稻而取食之抱朴子曰南海􅀳安九熟之稲㑹稽典録曰夏香有盗刈其稻者香助爲收之盗者慙送以還香香不受風土記曰穰稻之紫莖稴稴衘二音稻之有青穟米皆青白者也水經曰任延爲九眞太守教民耕蓺法與華同名曰田種白榖七月大作十月登熟名赤田種赤榖十二月作四月登熟所謂兩熟之稻也丗􅀃曰晉簡文見田中稻苗不識問人是何草左右荅曰是稻簡文歸三日不出云寧有得其末不識其夲郭義恭廣志曰有虎掌稻紫芒稻赤穬稻南方有蟬鳴稻七月熟稻有蓋下曰正月種五月穫訖其莖根復生九月復熟青芋稻六月熟累子稻白漢稻七月熟此三稻大且長三枚長一寸益州稻之長者米長半寸熟􅀃文曰稻稌也䆏肥尾切稻紫莖不黏者也稴稴稻不黏者也耗稻屬也徐暢􅀕記曰舊稑稻熟常用九月九日薦稻汜勝之書曰稻種春凍解時耕反其土種稻區不欲大大則水深淺不遍冬至後百一十日可種稻地美者用種畒四㪷俞益期牋云交趾稻再熟而草深耕重收榖薄異物志曰交趾稻夏冬又熟農者一歳再種雲南記曰雅州榮經縣土田歳輸稻米畒五㪷其榖精好毎一㪷榖近得米一㪷炊之甚香滑微似糯味崔寔四民月令曰三月多種秔稻蔡邕月令曰十月穫稻九月熟者謂之半夏稻愽物志曰海陵縣扶江接海多糜獸千千爲羣掘食草根其處成泥名麋畯民人隨此畯種稻不耕而􅀗其收百倍任昉􅄒異記曰夏禹時天雨稻古詩云安得天雨稻飼我天下民物理論曰稻者漑種之㹅名養生要集曰秔稻屬也稻亦秔之㹅名也道家方藥有用稻米秔米此則是兩物也稻米粒白如霜味苦主温服之令人多痩無飢膚秔米味甘主利五藏長飢膚好顔色左思魏都賦曰清流之稻清流近鄴西出御稻又吴都賦曰國秔再熟之稻郷貢八䖝之綿盧毓冀州論曰河内好稻秔與粳通用􅀃文曰秔稻屬也宋書曰陶濳爲彭澤令公田悉令吏種秫妻子固請種粳乃使五十􅅿種粳陳書曰徐孝克所生母患欲粳米爲粥不能辦母亡後孝克遂常啖麥有遺粳米者孝克對而悲泣終身不復食焉後魏書曰安同遼東胡也太宗同與長孫嵩並理人訟丗祖即位除青冀二州刺史同長子居典太倉事盗官粳米數石以養同大怒奏求戮居自劾不能訓子請罪太宗嘉而恕遂詔長給同粳米神仙傳曰王烈字長休邯鄲人與􅄞叔夜入山遊戯烈後獨入太行山忽聞山東北如雷聲徃視見山破石中有孔俓尺中有青泥流出烈取摶之隨手堅凝氣味如粳米飯烈自食數丸因提歸以與叔夜而皆成青石楊􅃷之洛陽伽藍記曰西方佛沙伏國有皆尸毗王倉庫爲火所燒其粳米燋燃于今猶在􅀂伏一粒永無虐患彼國人民湏以爲藥廣志曰粳有烏粳黒穬有幽青白夏之名張衡南都賦曰其厨膳則華郷里秬滍矩音臯香秔左思蜀都賦曰黍稷油油秔稻漠漠魏文帝與朝臣書曰江表唯長沙名好米何時比新城粳稻也上風炊之五里聞香秫􅀃文曰秫稷之黏者尓雅曰衆秫也孫炎注曰秫稷粟也廣雅曰秫稷粳也禮記月令曰仲冬之月乃命大酋秫稻必齊酒熟曰酋大酋官之長齊熟成也又内則曰饘􅋳酒醴芼羮菽麥蕡稻􅁰􅆝秫唯所欲􅀳書曰陶潜字元亮爲彭澤令在縣公田悉令種秫榖曰令吾常醉於酒足矣妻子固請種秔乃使二頃五十畒種秫五十􅅿種秔管子曰黄墳冝􅁰秫崔豹古今注曰稻之黏者爲秫禾之黏者爲黍廣志曰秫有赤者有白者胡秫早熟及麥養生要集曰秫米味酸太平御覽卷第八百三十九
