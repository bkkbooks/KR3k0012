front:
  text: 太平御覽卷第五百三十一禮儀部十
  hash: sha256:90e6f574019b9ab192cf066cb54428b9c9fa70daeeb71407739bfb02951c3c76
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_531-1a}
body:
  text: 廟神主宗廟易萃卦曰王假有廟假至也王以聚至有廟也又渙卦曰風行水上渙先王以享于帝立廟尚書逸篇曰嗚呼七世之廟可以觀德天子立七廟有徳之主則爲祖宗其廟不毀故可觀徳毛詩文王綿曰乃召司空乃召司徒俾立家室其繩則直縮板以載作廟翼翼又閟宫曰新廟弈弈奚斯所作又清廟曰清廟祀文王也周公旣成洛邑朝諸侯率以祀文王焉清廟者􅀕有清明之徳者之宫也謂􅀕文王也天徳清明文王象焉故􅀕之而歌此詩也廟之言貌也死者精神不可得而見伹以生時之居立宫室家貌爲之耳成洛邑居攝五年時於穆清廟肅雝顯相於歎辭也穆肅敬雝和相助也箋云顯光也見也於乎美哉周公之􅀕清廟也其禮儀敬且和又諸侯有光明著見之徳者來助􅀕周禮春官上曰小宗伯之職掌建國之神位右社稷左宗廟禮記曲禮曰君子將營宫室宗廟爲先廐庫爲次居室爲後又曲禮曰問國君之年長曰能從宗廟社稷之事矣㓜曰未能從宗廟社稷之事也又王制曰天子七廟三昭三穆與太祖之廟而七諸侯五廟二昭二穆與太祖之廟而五大夫三廟一昭一穆與太祖之廟而三士一廟庶人􅀕於􅃦又禮器曰禮有以多爲貴者天子七廟諸侯五大夫三士一又文王丗子曰五廟之孫祖廟未毀雖及庶人冠娶必告死必赴不忘親也又明堂位曰山節藻梲􅃨廟重檐刮楹逹郷反玷出尊崇坫康珪䟽屏天子廟飾也山節刻欂櫨爲山也藻梲謂侏儒柱爲藻文􅃨廟重屋也檐承壁材也刮摩也郷牖屬謂夾户牎也每室爲八牎爲四逹反坫反爵之坫也出尊當尊南也唯兩君爲好旣獻反爵其上禮君尊於兩楹之間也嵩髙也康讀爲元龍之亢屏謂之樹今愚也刻之爲雲氣虫獸如今閻上爲之又雜記曰成廟則釁之其禮祝宗人宰夫雍人皆爵純衣雍人舉羊升屋中屋南面刲羊血流于前乃降門夾室皆用雞凡宗廟之器其名者成則釁之以猳豚宗廟名器謂罇彛之屬又􅀕法曰天下有王分地建國置都立邑設廟祧壇墠而􅀕之乃爲親䟽多少之數是故王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月􅀕之逺廟爲祧有二祧享甞乃止去祧爲壇去壇爲墠壇墠有禱焉􅀕之無禱乃止去墠曰􅀑諸侯立五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月􅀕之顯考廟祖考廟享甞乃止去祧爲壇去壇爲墠壇墠有禱焉􅀕之無禱乃止去墠爲􅀑大夫立三廟二壇曰考廟曰王考廟曰皇考廟享甞乃止顯考祖考無廟有禱焉爲壇􅀕之去壇爲􅀑適士二廟一壇曰考廟曰王考廟享甞乃止顯考無廟有禱焉爲壇􅀕之去壇爲􅀑官師一廟曰考廟王考無廟而􅀕之去王考爲􅀑庶士庶人無廟死曰􅀑廟之言貌也宗庿者先祖之尊貌也祧之言超也超上意也封士曰壇除地曰墠書曰三壇同墠又中庸曰武王纉大王王季文王之緒壹戎衣而有天下身不失天下之顯名尊爲天子冨有四海之内宗廟饗之子孫保之又􅀕法曰天下有王分地建國置都立邑設廟祧壇墠而􅀕之左傳桓公曰宋華父督巳殺孔父而殺殤公召莊公於鄭而立之以親鄭以郜大鼎賂公夏四月取郜大鼎于宋戊申納于太廟非禮也又桓公曰清廟茅屋以茅飾屋著儉也清廟肅然清静之稱又僖上曰震夷伯之廟罪之也於是展氏有隱慝焉又文公下曰太室之屋壞書不恭也又成公三年曰甲子新宫災三日哭宣公神主新入廟故謂之新宫書三日哭善得禮宗廟親之神靈所憑居而遇災故哀而􅂘之又襄二曰吴子壽夢卒臨於周廟禮也周廟文王廟也周公出文王故魯立其廟也凡諸侯之喪異姓臨於外同姓臨於廟是故魯爲諸􅁎臨於周廟公羊傳文公曰世室屋壞世室者何魯公之廟也周公稱太廟魯公稱世室群公稱宫榖梁傳成公曰新宫災三日􅂘新宫者禰宫也禰父也成公之父宣公之宫也孝經曰宗廟致敬不忘親也又曰爲之宗廟以􅀑享之宗者尊也廟者皃也先祖之尊皃所居中宫何以爲人死精䰟歸乎天形體不藏存之即存不存則亡明先祖神死依人也孝經援神契曰廟所以尊祖也論語八佾曰子入太廟毎事問或曰孰謂鄒人之子知禮乎入太廟毎事問子聞之曰是禮也家語曰孔子在齊景公造焉左右白曰周使至言先王廟災景公曰何王廟孔子曰此必􅁵王廟夫釐變文武之制而作玄黄華麗之飾故天殃其廟焉有頃左右報所災者釐王廟景公曰善哉聖人之智過人逺矣又曰孔子曰吾於甘棠見宗廟之敬也甚矣思其人猶愛其樹尊其人必敬其道也史記曰􅁗始皇廵隴西北地岀雞頭山過回中應劭曰回中在安定髙平孟康注曰回中在北地作信宫渭南更命信宫爲極廟象天極廟道通驪山作甘泉前殿築甬道應劭曰築垣墻如街巷又曰髙祖崩群臣皆曰髙祖起細撥亂令郡諸侯各立髙祖廟以歳時祠及孝惠五年思髙祖之悲樂沛宫爲髙祖原廟徐曰光武紀曰上幸豊相髙祖於原廟駰謂原再也先旣已立廟今又拜立故謂之原也漢書曰惠帝爲東朝長樂宫及問徃來數蹕煩民作􅃨道方築武庫南叔孫通奏事囙請問曰陛下何自築􅃨道髙帝寢衣冠月出遊髙廟應劭月出髙帝衣冠備法駕名遊衣冠子孫奈何乗宗廟道上行哉惠帝懼曰急壞之通曰人主無過舉今巳作百姓皆知之後願陛下爲原廟渭北衣冠月出遊之益廣宗廟大孝之本上乃詔有司立原廟惠帝甞出遊離宫通曰古者甞果方今櫻桃熟可獻願陛下出因取櫻桃獻宗廟上許之諸果獻由此興又曰文帝作顧城廟服䖍曰廟在長安城南文帝作還顧見城故名之􅀿劭日文帝自爲之制度􅂌狹􅀂顧望而成故曰顧城賈誼曰目頋城之廟爲天下太宗與漢無極或曰地名也如淳曰身存而爲廟􅀂尚書顧命也髙祖廟曰原廟文帝廟曰頋城廟景帝廟曰徳陽武帝廟曰龍淵昭帝廟曰徘徊宣帝號樂遊元帝廟曰長壽成帝廟曰成陽又曰梅福上書諫曰武王克殷未下車存五帝之後封殷於宋紹夏於􅂎明著三統示不獨有也是以􅁎姓半天下遷廟之主岀於戸所謂存人自立也又曰宣帝即位尊孝武廟爲世宗所行廵狩郡國皆立廟告祠世宗廟有白鶴集後庭以立世宗廟告祠孝昭寢有鴈五色集殿前西河築世宗廟神光興于殿旁有鳥曰鶴前赤後青神光又興於房中如燭狀廣川國世宗廟殿上有鍾音房戸大開夜有光殿上盡明又曰王莽以宗廟未脩張邯􅀃莽曰徳盛者文縟冝崇其制度宣示海内冝令萬世之後無以復加也莽乃􅀶徴天下工匠諸圖􅀞及吏民以義入錢榖助作者駱驛道路壞徹城西苑中建章永光苞陽大臺儲元宫及平樂當路陽禄館凡十餘所取其材瓦以起九廟帝王世紀曰漢景帝廟名德陽宣帝廟名長壽武帝廟名龍淵文帝廟名顧成昭帝廟名徘徊東觀漢記曰中元元年十月甲申使司空馮魴吿祠髙祖廟吕太后不冝配食以薄太后配遷吕太后于園四時止􅀕又曰永􅀄六年皇太后入宗廟於世祖廟與皇帝交獻薦如光烈皇后故事又曰建􅀄四年八月上以公卿所奏明徳皇后在世祖廟坐位駮議示東平憲王蒼蒼上言文武宣元祫食髙廟皆以后配先帝所制典法設張大雅曰昭哉來御從其祖武又曰不􅗅不忘率由舊章明徳皇后冝配孝明皇帝􅀽山松後漢書曰天子自雒陽遷都長安􅀄長安遭赤眉亂宫室焚盡唯有髙廟遂居之漢雜事曰光武弃天下以再受命復漢祚更起廟稱丗祖孝明臨崩遺詔遵儉無起寢廟藏王於世祖廟孝章不敢違是後遵奉藏世祖廟如孝明之禮而園陵皆自起寢孝明廟曰顯宗孝章曰肅宗是後踵前孝和爲穆宗孝安曰敬宗孝順曰恭宗孝桓曰威宗今雒陽諸陵皆晦望二十四氣伏社臘及四時上飯太官送用物園令食監典省其親陵一所宫人隨鼔漏理􅀍枕具盥水陳嚴具天子以正月五月供畢後上原陵以次周遍公卿百官皆從四姓小侯諸家婦凡與先君有􅀲􅁑者及諸侯王大夫郡國計吏匈奴朝者西國侍子皆㑹尚書官屬西除下在先帝神坐後大夫計吏皆當前下占其郡國榖價四方改異欲先帝䰟神具聞之也遂於親陵各賜計吏而遣之魏書曰辛酉有司奏造二廟立文皇帝廟與髙祖合􅀕親盡以次毀特立武皇帝廟四時享祀爲魏太祖萬載不毀吴録地理志曰㑹稽有禹廟始皇配食王朗爲太守黜之王隱書曰太康十年太廟成遷神主于新廟賜王公以下至司馬督子弟官賜作廟者帛帝王世紀曰漢景帝廟名徳陽宣帝廟名長壽武帝廟名龍淵文帝廟名頋成昭帝廟名徘徊漢晉陽秋曰武帝改營太廟南致荆山之木西採華山之石鑄銅柱十二塗以黄金鏤以百物塡以丹青綴以珠玉晉書禮志曰武帝太始三年有司奏置七廟冝權立一廟群臣議上古清廟一宫周制七廟舜承尭禪受終文祖則虞氏不改唐廟因仍舊宫可依有虞故事宋書禮志曰晉太始二年有司奏天子七廟冝如禮營建帝重其役設冝權立一廟於是群臣議奏上古清廟一宫尊逺神祇逮至周室制爲七廟以辯宗祧聖旨􅀷弘逺跡上丗後魏書曰武定六年二月將營齊獻武王廟議定室數形制兼度支尚書崔昂等議按禮諸侯五廟太祖親廟四今獻武王爲始封之君便是太祖旣通在親廟不容立五室且帝王親廟亦不過四今冝四室二間兩頭一頰室厦頭徘徊鴟尾又按禮圖諸侯廟止開南門而二王後附􅀕儀注云執事者列於廟東門之外旣有東門明非一門獻武禮數旣隆備物殊等唯據今廟冝開四門内院南靣開三門餘及外院四靣皆一門齊書禮志曰丗祖夢太祖曰宋氏諸帝嘗在太廟從我求食可别爲吾祠上乃勑豫章王妃􅁃氏四時還青溪宫舊宅處内舎堂奉祠二帝二后牲牢服章用家人禮晉起居注曰武帝太安中詔曰徃者仍魏氏舊廟處立廟旣壅翳不顯材木弱小至今中間有跌橈之患今當脩立不冝在故處太僕寺南臨甬道地形顯敞更於此營之主者依典禮施行晉書曰桓􅀇纂問衆曰朕其敗乎曹靖之對曰神怒人怨臣實懼焉玄曰人或可怨神何爲怒對曰移晉宗廟飄泊無所大楚之􅀕不及於祖此其所以怒也白虎通曰禮聖王所以制宗廟何曰生死殊路故敬􅀑神而逺之所以有屋何所以象生之居又曰臣侍放於郊君不絶其禄者以其禄三分之一與其妻長子使得􅀕其宗廟賜之環即還之玦則去又曰王者立宗廟何縁生以事死敬亡􅀂事存欲立宗廟而􅀕之此孝子之心所以追繼養也釋名曰廟貌也先祖形貌所在寢寢也所寢息也三輔故事曰光武至長安宫闕燒盡徙都洛陽取十二陵合爲髙廟作十二室太常卿一人别治長安主知齊祠事謂之髙廟漢武故事曰宣帝立孝武廟於河東告祠日見一人􅀐馬馬異於常馬持尺一札賜將作凾文曰汝績克成賜汝金一斤因忽不見札乃變爲金一斤蜀王本紀曰禹生於石紐禹母天珠孕禹坼副而生禹於塗山娶妻生子名啓於今塗山有禹廟亦爲其母立廟三輔黄圖曰王莽於長安城南作九廟又曰太上皇廟在長安香街南墨子曰昔三苗大亂天命殛之雨血三朝龍生於廟􅀃苑曰衛孫文子問王孫賈曰吾先君之廟小欲更之可乎對曰古之君子以儉爲禮今之君子以大易之桓譚新論曰王莽起九廟以銅爲柱甍帶金銀錯鏤其上王嬰古今通論曰夏曰丗室丗丗􅀕祀之也殷曰重屋重夏爲屋四霤周曰宗廟尊其生存之貌示不死之故致之於更楚辭天問序曰屈原放逐彷徨山澤仰天歎息楚有先王之廟及公卿祠堂圖畫天地山川神靈􅄾瑋譎詭及古賢聖怪物行事周流罷倦休息其下仰見圖􅀞因書其壁呵而問之晉諸公讃曰王淩字彭祖爲幽州刺史尋洛陽破後承制建行臺以宗廟焚毀設壇望祀七室及功臣配食神主禮記曲禮曰措之廟立之主曰帝又檀弓下曰愛之斯録之也敬之斯盡其道焉重主道也殷主綴重焉綴連也殷人作主而連其重懸諸廟也周主撤重焉周人作主撤重悝之又曰曽子問曰喪有二􅀌廟有二主禮也孔子曰天無二日國無二王甞禘郊社尊無二上未知其爲禮也昔者齊桓公亟舉兵作僞主以行及反藏諸祖廟廟有二主自桓公始禮記外傳曰人君旣葬之後日中虞􅀕即作木主以存神未葬以前縣重於庭以代主也廟主用木者木落歸本有始終之義人之生也無不死木生於亥又落於亥是歸本也天子廟主長尺二寸諸侯一尺四向孔穴午逹相通􅃮書謚號曰神主葬後孝子心目無所覩故用以主其神也公羊傳文公曰二年丁丑作僖公主虞主用桑練主用栗作僖公主不時也左傳莊公曰先君桓公命我先人典司宗祏􅁊公鄭始受封君也宗柘宗廟中藏主石室言巳丗爲宗廟守臣又文公曰葬僖公緩也作主非禮也凡君薨卒􅂘而祔祔而作主特祀於主户柩巳逺孝子思募故造木主立几筵焉丞甞禘於廟又昭五曰使祝史徙主祏於周廟告于先君祏廟主石凾周廟厲王廟也論語八佾曰哀公問社於宰我宰我對曰夏后氏以松殷人以栢周人以栗五經異義曰謹按大夫以石爲主禮無明文大夫士無昭穆不得有主今山陽民俗祀有石主又曰春秋左氏傳曰徙主石於周廟言宗廟有郊宗石室所以藏栗主也虞主所藏無明文也又曰今公羊􅀃卿大夫士非有􅁟子民之君不得禘祫序昭穆故無木主大夫束帛依神士結茅爲叢又曰論語哀公問社於宰我宰我荅夏后氏以松夏人都河東河東宜松也殷人以栢殷人都亳冝栢也周人以栗周人都灃鎬灃鎬冝栗也五經要義曰木主之狀四方穿中央以逹四方天子長尺二寸諸侯長尺皆刻謚於背也又曰主者神象也凡虞主用桑桑猶䘮也䘮禮取其名練王用栗栗者敬也􅀕禮取其恭五經通議曰諸侯㑹天子則以方明爲主覲禮云明木也其形四方六面上玄下黄東青南赤西白北黒方明者上下四方神明之象也謝承後漢書曰赤眉盆子去長安西入右扶風鄧禹至長安中昆明池率諸將齊戒擇􅁻日入城謁髙帝廟修禮祠􅀕勞賜吏士因收十二帝神主以故髙廟郎來輔守髙廟令行京兆尹承事桉行掃除諸園陵爲置卒史奉守焉遣輔奉主詣京師王隱晉書曰李裔字宣伯父敏爲公孫度所追浮海莫知所終裔以父母不知存亡設木主以奉之由是發名晉起居注曰孝武太元二十年簡文皇帝宣太后正號神主移廟戊寅口詔移神主可停前後鼔吹摯虞决疑要注曰廟主藏於户外西墉之中有石凾名曰宗祏古者帝王出征於車載遷廟之主及社主以行􅁗漢魏不載主也唐書曰祔順宗于廟遷中宗神主于夾室有司以中宗爲中興之君當百代不遷宰臣召史官蔣武問之武對曰中宗以弘道元年於髙宗柩前即位時春秋巳壯矣及母后􅆲奪神器潜移其後頼張柬之等同謀國祚再復此蓋同於反正恐不得號爲中興之君凢非我失之自我復之謂之中興漢光武晉元帝是也自我失之因人復之晉孝惠孝安是也今中宗與惠空二帝事同即不可爲不遷主矣白虎通曰􅀕所以尸主何本神無方孝子以主係心又曰所以虞而立主何孝子旣葬日中反虞念親巳没棺柩已去悵然失望彷徨哀痛故設桑主以虞所以慰孝子之心虞安其神所以用桑者始與神相接三王俱以桑􅀃文曰又祏宗廟主也禮郊宗石室一曰大夫以石爲主從示從石石亦聲也太平御覽卷第五百三十一
