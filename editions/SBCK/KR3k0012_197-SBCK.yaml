front:
  text: 太平御覽卷第一百九十七
  hash: sha256:bec9f011f054358037b819ca150b879c56458d2985b14e5b0202388fbca9eacb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_197-1a}
body:
  text: 居處部二十五園圃圈牢藩籬華表園圃說文曰園樹果圃樹菜也易曰賁于丘園束帛戔戔毛詩曰園有桃其實之肴又曰折柳樊圃周禮曰塲人掌國之場圃而樹之果蓏珎異之物以時歛而藏之凡􅀕祀賔客供其果蓏享亦如之注云果􅀥栗之屬蓏􅀲􅉚之屬珍異蒲桃枇杷之屬又曰大宰九職二曰園圃􅗱草木又曰園㕓二十而一注云以利少故二十而稅一也㕓城市中空地又曰圃以樹事貢草木謂果􅀲葵韮論語曰樊遟請學爲圃子曰吾不如老圃史記曰梁有􅃮園楚有橘柚園又曰王剪爲􅁗將伐楚請善田宅園池甚衆漢書曰始曹參微時與蕭何善及爲􅌠相有􅂩至何且死所推賢唯參參代何爲相國舉事無所變更一遵何之約束擇郡國吏長大訥於文辭謹厚長者即召爲丞相史史之刻深欲務聲名輙斥去之日夜飲酒卿大夫以下吏及賔客見參不事事來者皆欲有言至者參輙飲以醇酒度其欲有言復飲酒而後去終莫得開說以爲常相舎後園近吏舎吏舎日飲歌呼從吏患之無如何迺請參遊後園聞吏醉歌呼吏幸相怒召按之迺反取酒張坐飲大歌呼與相和參見人之有細過掩匿覆蓋之府中無事又曰董仲舒廣川人也以治春秋孝景時爲􅀶士下帷講誦弟子傳以九次相授業或莫見其靣蓋三年不窺園圃其精如此後漢書曰法眞隱大澤講論藝術歷年不窺園圃也又曰竇憲以賤直請奪沁水公主田園沁水明帝女主畏逼不敢言後肅宗駕出遊過園指以問憲憲隂喝不得對隂於禁反喝一介反猶噎塞也後發覺帝大怒責憲曰貴主尚見侵奪何况小人哉國家弃憲如􅀌雛腐䑕耳憲大震懼魏志曰顔裴字文林爲京兆守於府下起菜園使吏投簡鋤治也晉書曰范汪好學外氏家貧無以資給汪乃廬于園中布衣􅂼食然薪寫書寫畢誦讀亦遍遂􅀶學多通善談名理又曰華廙旣廢黜武帝後又登凌雲臺望見廙苜蓿園阡陌甚整依然感舊太康􅀄大赦乃得襲封乆之拜城門校尉遷左衛將軍數年以爲中書監又曰和嶠性至儉家有好李帝求之不過數十王濟􅀱其上直率少年詣園共啖畢伐樹而去王隱晉書曰涼州牧張駿增築四城相去各千歩東城殖園果命曰講武場北城殖園果命曰􅀇武圃皆有宫殿宋書曰柳元景多産業居南岸有數十畒菜園時有人求之或留錢元景曰夲立園自爲供喫豈求利耶齊書曰丗祖太子性頗奢麗宫内多雕飾精綺過於王宫開拓玄圃園與臺城北壍等其中起出池閣樓觀塔宇多聚竒石妙極山水慮上宫望見乃傍列脩竹内施髙鄣造游牆數百間施諸機巧冝湏鄣蔽以晉明帝爲太子時立西池乃啓丗祖引前例求於東田起小􅁐上許之窮極制度陳留耆舊傳曰范丹學通三經常自任灌園向秀別傳曰秀與吕安灌園於山陽收其餘利以供酒食之費莊子曰子貢過漢隂見一丈人爲圃畦鑿隧而入抱甕而岀灌子貢曰有機於此一日浸百畦用力甚寡而見功多夫子不欲乎爲圃者仰而視之曰奈何曰鑿木爲機後重前輕挈水若抽其名爲槹者圃者忿然作色而􅀏曰吾聞之吾師有機械者必有機事有機事者必有機心機心存於胷中則純白不備純白不備則神生不定神生不定者道之所不載也吾非不知羞不爲也子貢告孔子孔子曰假修渾沌之術者也􅄂記曰於陵子辤卿相而桔槹灌園又曰戴宏爲河間相自免歸而灌􅂼以經敎授也西京􅄂記曰茂陵富人􅀽廣藏鏹巨萬家僮八九百人於邙山下築園東西五里百歩激流水注其内構石爲山髙十餘丈連延數里養白鸚鵡紫鴛鴦旄牛青兕竒禽怪獸委積其間聚沙爲洲激水爲波潮其中江鷗海鵠乳雛産鷇延漫林池竒樹異草靡不具植屋皆徘徊連屬重閣脩廊行之移晷不能徧廣有罪誅没入爲園鳥獸草木僉移上林􅁐中又曰樂遊園自生玟珻樹樹下多苜蓿苜蓿亦名懷風時人或謂光風風在其間常肅肅然日照其花有光彩故名苜蓿曰懐風茂陵謂之連枝草又曰梁孝王兎園有落猨巖棲龍岫鴈池鶴洲鳬渚宫觀相屬隋圖經曰史記謂梁孝王築東􅁐方三百里是曰􅇠園王襃雲陽記曰車箱阪下有􅀺園一頃樹數百株青翠繁密望如車蓋水經注曰睢水東南流入于竹圃水次緑竹䕃渚青青實望丗人言梁王竹園也又曰玄􅉚灣中地數頃有栗園栗小殊不並固安之實也然歳貢三百石以充天府水渚即栗洲樹木髙茂望若屯雲中有栗堂甚閑敞牧宰英彦多所游薄魏志曰有芳林園桐園芳林後避少帝諱改爲華林晉宫閣名靈芝園鄴有鳴鶴園蒲陶園華林園司馬彪續漢書曰濯龍園在洛陽西北角也郭仲産仇池記城東有苜蓿園列女傳魯􅃮室之女曰昔有客繫馬園中馬逸踐葵使子終歳不飽葵淮南子曰園有螫毒葵藿爲之不採陳留志曰園􅁃襄邑人也􅁃始居園中故代謂之園公天文要集曰庖􅀲爲天子果園又天園主果實茹蓄儲又曰芙蓉園夲隋氏之離宮居地三十頃周廻十七里貞觀中賜魏王泰㤗死又賜東宫今屬家令寺園中廣厦脩廊連亘屈曲其地延袤爽塏跨帶原隰又有脩竹茂林縁􅀍岡阜東坂下有涼堂堂東有臨水亭按黄圖曲池漢武所造周廻五里池中遍生荷芰菰蒲冒間禽魚翔泳宣帝立廟曲池之北名曰樂遊廟即今昇平坊内基趾是也此在􅁗爲冝春􅁐在漢爲樂遊􅁐宇文愷營建京城以羅城東南地髙不便故􅆙此偶頭一坊餘地穿入芙蓉池以虚之郡國志云西夷有荔支園僰僮施夷中最賢者古所謂僰僮之富多以荔支爲業園植萬株樹收一百五十斛隋圖經曰司竹園在盩厔縣東十二里穆天子西征至􅀇池乃植竹即此是也史記曰渭川千畒竹漢謂鄠杜竹林故有司竹都尉西都賦所謂鄠杜濱其足竹林果園芳草甘木也圈史記曰竇太后好黄老書召袁固問老子書固曰此家人言耳太后怒曰安得司空城旦書乎乃使固入圈擊豕漢書曰孝武帝作建章宫度爲千門萬户其西則數十里虎圈又曰李禹有寵於太子然好利亦有勇甞與侍中貴人飲侵陵之莫敢應後愬之上上召禹使制虎懸下圈中未至地有詔引岀之禹從落中以劒斫絶纍欲刺虎師古曰落與絡同謂當時繦絡而下也纍索也上壯之遂救止焉三輔故事曰師子圈在建章宫西南列士傳曰􅁗召公子無忌無忌不行使朱亥奉璧􅁗王大怒將朱亥着虎圈中亥瞋目視虎虎不敢動郡國誌曰雍州虎圈在通化門東二十五里􅁗王置朱亥於其中亥瞋目虎不敢動漢文帝問上林尉處及馮婕妤當熊在此漢宫殿䟽曰有彘圈有師子圈武帝造􅁗故虎圈周匝三十五歩長二十歩西去長安十五里牢說文曰牢閑養牛馬園也詩曰乃造其曹執豕于牢注云曹羣也言􅅮豕於牢中以爲飲酒之殽穆天子傳曰髙奔戎獲虎畜于東虞命曰虎牢事且州郡曹子建求自試表曰如微才不試没丗無聞禽息鳥視終於白首此徒圈牢之養物非臣之所志也藩籬易曰羝羊觸藩羸其角詩曰折柳樊圃或云藩左傳曰宋向戍請弭諸侯之兵襄公二十七年諸侯之大夫㑹于宋以藩爲軍注云示不相忌也又哀十二年衛侯㑹兵于鄖呉人藩衛侯之舎子服景伯謂子貢曰夫諸侯之㑹事旣畢矣侯伯致禮地主歸餼以相辭也今呉不行禮於衛而藩其君舎以難之子盍見太宰乃請束錦以行乃免衛侯晉書曰􅁃衮字叔襃􅀄衮諸父並貴盛唯衮父獨安貧約躬耕稼穡以給供養而執事勤恪與弟子樹籬跪以授條或曰今在隱屏先生何恭之過也荅曰幽顯易操非君子意也宋書曰謝瞻字宣逺弟晦時爲宋臺右衛權遇巳重於彭城還都迎家賔客輻湊瞻在家驚駭謂晦曰吾家以逺退爲業汝遂􅀔傾朝野此豈門户福耶乃堅籬隔門庭曰吾不忍見此南朝宫􅁐記曰建康籬門舊南北兩岸籬門五十六所蓋京邑之郊門也如長安東都門亦周之郊門江左􅀄立並用籬爲之故曰籬門南籬門在國門西三橋籬門在今光宅寺側東籬門夲名肇建籬門在古肇建市之東北籬門今覆舟東頭􅀇武湖東南角今見有亭名籬門亭西籬門在石頭城東護軍府在西籬門外路北白楊籬門外有石井籬門莊子曰願遊其藩閑居賦曰芳枳堅籬宋玉對問曰藩籬之鷃鷦鷯賦曰鷦鷯長於藩籬之下華表崔豹古今注程雅問曰堯設誹謗之木何也荅曰今之華木以横木交柱頭狀如華形似桔槹大路交衢悉施焉或謂之表木以表王者納諫亦以表識衢路􅁗乃除之漢始復焉今西京謂之交午柱遼東華表見鶴門
