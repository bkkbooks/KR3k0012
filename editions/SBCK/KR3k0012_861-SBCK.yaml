body:
  text: 飲食部十九羮臛飲漿羮周禮天官亨人曰􅀕祀共大羮鉶羮賔客亦如之大羮􅁏湆者鄭司農云大羹不致五味也鉶羮加塩菜也涪音泣禮曰食居人之左羮居人之右母嚃羮亦嫌欲疾遲不爵菜也音勑荅切母絮羮爲其詳於味絮猶調也絮勑慮切客絮羮主人辭不能烹羮之有菜者用梜無菜者不用梜又曰雉羮雞羮兎羮芼羮食自諸侯巳下至於庶人無等羮食之主又曰子夘稷食菜羮忌日貶也夫人與君同庖不時殺也又曰不能粥食粥羮之以菜可也謂性不能者可食飯菜羮又曰大饗之禮尚玄酒而俎腥魚大羮不和有遺味者矣左傳曰頴考叔有獻於鄭莊公公賜之食食而捨􅁏公問其故對曰小人有母皆甞小人之食矣未甞君之羮請以遺之􅁏有汁曰羮又曰臧哀伯諌曰大羮不致大羮􅁏汁也不致五味礼不忌夲也又曰鄭侯伐宋將戰華元殺羊食士其御羊斟不與及鄭師與宋師戰曰疇昔之羊子爲政疇昔猶前日也今日之事我爲政與入鄭師故敗君子謂羊斟非人也以其􅀻憾敗國殄民憾恨也殄盡也於是刑孰大焉詩所謂人之無良者詩義取不良之人相怨以亡其羊斟之謂乎又曰楚獻黿於鄭靈公宋子公與子家將見宋子公也子家婦人子公之食􅃌動第二􅃌也以示子家曰他日我如此必甞異味及入宰夫將解黿相視而􅀏公問之問所􅀏子家以告及食大夫黿召子公而弗與也欲使指動無効也子公怒染指於鼎甞之而去又曰叔鮒永貨於衛淫蒭蕘者衛人使屠伯饋叔向羮與一篋錦叔向受羮反錦又曰和如羮焉水火醯醢塩梅以烹魚􅁏燀之以薪燀也宰夫和之齊之以味濟其不及以泄其過君子食之以平其心君臣亦然以水濟水誰能食之書曰􅀂作和羮尓唯塩梅塩鹹梅鮓羹湏鹹鮓以和之詩義䟽曰鴞􅁏甚羙可以爲羮臛語曰雖􅂼食菜羹􅀲􅀕必齊如也爾雅曰􅁏謂之羮郭􅒄注日􅁏臛也舊􅀃􅁏有汁日羮孫氏以爲􅁏作羮之物因以名云廣雅曰羮謂之湆􅀃文曰羮五味和粥也釋名曰羮注也汁汪郎也史記曰古者天子常以春秋解祠黄帝用一梟破鏡如淳日漢史東郡送梟五日作梟羮以賜百官也又曰項王爲髙祖置太公於机上告漢王曰吾與羽俱北面受命懷王約爲弟兄吾翁即􅀂翁必欲烹而翁幸分我一杯羮又曰髙祖少時與賔客過丘嫂食嫂厭叔與客來佯爲羮盡櫟釡邊客以故去已而視釡中尚有羮由此怨其嫂封其子頡羹侯戰國䇿曰樂羊爲魏將而攻中山其子在中山中山君烹其子而遺之羮樂羊啜之盡一杯文侯謂禇師賛曰樂羊以我故食其子􅁏對曰其子食之其誰不食羊下中山文侯賞其功而疑其心又曰中山君饗大司馬子期在焉羊羮不遍子期怒走楚􅀃王伐中山中山君亡有二人挈子隨後問之曰臣父甞餓且死之君下壷飡哺臣之父故來死君也中山君歎曰吾以一椀羊羮亡國之一壷飡得二士死後漢書曰太尉劉寛性仁恕不妄喜怒甞服朝侍婢奉􅁏羮翻汙其衣婢遽収之寛神色不異徐言羮爛汝手東觀漢記曰王渙爲洛陽令馬市正數從賣羮飯家乞貸不得輙歐罵之至忿煞正捕得渙問知事實便諷吏解遺謝承後漢書曰陸續詣詔獄其母至京師餉食續對餉泣曰續母來使者問其故荅曰續母作羮截􅁏未甞不方斷葱寸寸無不同是以知母來又曰陶碩字公超啖蕪菁羹無塩帝王丗紀曰文王長子曰伯邑考紂烹以爲羮以賜文王曰聖人不食其子羮文王得而食之紂曰誰謂西伯聖者與食其子羮而不知晉書曰桓温表王濬之孫曰濬今有三孫年出六十室如懸磬餬口江濵四節蒸甞菜羮不給宋書曰湘州刺史王僧䖍引樂頥之爲主簿以同僚非人弃官去吏部郎􅁃杲之甞徃候頥之爲設食唯枯魚菜􅉁杲之曰我不能食之母聞之自出甞膳魚羮數種杲之曰卿過於我非郭林宗又曰淳子孚有父風甞與侍中何朂共食孚羮盡朂云益殷蓴羮朂司空無忌子也孚徐輟筯曰何無忌諱又曰朱脩之爲荆州刺史姉在郷里飢寒不立脩之貴爲刺史未曽供贍徃姉家姉爲設菜羮麄飯以激之又曰毛脩之􅀍禽入魏敬事嵩山道士寇謙之謙之在魏太武帝信敬營護之故不死脩之甞爲羊羮薦魏尚書以爲絶味獻之武帝大恱以爲太官令􅀍寵遂爲尚書封南郡公太官令如故又曰宋末齊髙帝輔政劉彦節知運祚將遷宻懷異圗及沈攸之舉兵齊髙入屯朝堂􅀽粲鎮石頭潜與彦節及諸大將黄回等謀夜㑹石頭詰旦乃發彦節素怯搔擾不自安脯後便自丹陽郡車載婦女盡室奔石頭臨去婦蕭氏強勸令食彦節歠羮冩胷中手振不自禁齊書曰髙祖旣爲齊王置酒爲樂羮膾旣至崔祖思曰此味故爲南北所推侍中沈文季曰羮膾呉食非祖思所解祖思曰炰鼈鱠鯉似非勾呉之詩文季曰千里蓴羮豈􅀜魯衛之􅀃帝甚恱曰蓴羹故應還沈又曰朱緒無行母病積年忽思菰羮緒妻到市買菰爲羮欲奉母緒曰病復安能食先甞之遂併食盡母怒曰我病欲此羮汝何必併啖盡天􅀂有知當令汝哽怨緒聞心中介介然即吐血明日而死梁書曰蕭勵爲廣州刺史徴爲太子左衛率勵性率儉而器度寛􅁉左右甞將羮正胷前翻之顔色不異徐呼更衣後魏書曰趙琰字叔起甞送子兾州娉室過路旁主人設羊羮琰方知盗殺卒辭不食又曰彭城王浟爲滄州刺史有濕沃縣主簿張逹甞詣州投入舎食雞羮浟察知之守令畢集浟對衆謂逹曰食羹何不還價直也逹即伏罪合境號爲神明唐書曰魏元忠前後三坐弃市偶得不死武后甞問之對曰臣猶鹿耳羅織之徒苟湏臣􅁏作羹耳荀卿子曰孔子厄於陳蔡䔧羮不糝韓子曰堯有天下糲梁之食䔧藿之羮又曰昭僖侯之時宰人上食而羮中有生肝焉昭侯召宰人以次而誚之曰汝何爲置生肝羮中衆宰人曰竊以爲有欲去上食宰也淮南子曰皷造辟兵壽盡五月髙炎曰皷造謂梟今世人五月作梟羮亦作蝦蟇羮又曰楚人有烹猴者而召其隣人以爲狗羮也而甘之後聞其猴也據地而嘔之此不知味也又曰太宰子朱侍食於令尹子國子國伏羮而􅀬援漿以泛明日子朱辭官曰令尹輕行而簡禮其辱人不難明日伏節尹怒而笞之三百􅁗子曰五味者各稱一族之名合和一鼎名曰羮猶威重廉平恩合而爲信也郭子曰陸士衡詣王武子武子有數斛羊酪指以示陸曰卿東呉何以敵此陸云千里蓴羹未下塩䜴劉向新序曰紂王天下熊羮不熟而殺庖人又曰平公問叔向曰齊桓公九合諸侯一匡天下如是君不知臣力何也師曠侍曰臣請以喻五味管仲善斷割之隰明善煎熬之賔湏無善齊和之羮巳熟矣而進之又曰魏文侯見箕季子曰晏進糲飡􅀲瓠之羮日豈不能具五味教我無歛扵百姓以省飲食之養也風俗通曰昭帝時大官上食羮中有髪切中有土令承坐不謹敬皆論劉禎毛詩義問曰鉶羮有菜塩䜴其中菜爲其形象可食因以鉶爲名陸機毛詩草木䟽曰梅杏􅀋也其子赤而酢不可生噉煑而曝乾爲􅂫可着羮矐中廣志曰大渡蜂取其子得數􅂛爲羮亦可蒸食臨海水物志曰民皆好啖猴頭羮雖五􅁏矐不能及之其俗言寕􅀒千石之粟不願􅀒猴頭羮臛􅀏林曰人有和羮者以杓甞之少塩便益之後復甞之向杓中者故云塩不足如此數益􅂛許塩故不鹹因以爲怪食經曰有猪蹄酸羮法胡羮法雞羮法䉀笴鴨羮法楚辭天問曰縁鵠飾玉后帝食饗后帝殷湯也言伊尹始伏縁因烹鵠鳥之羮脩飾玉鼎以事以放湯賢之遂相也彭鏗斟雉堯帝饗何彭鏗彭祖也好和滋味斟羮事事堯堯而饗食之受壽永多夫何乆長言彭祖進雉羹於堯堯饗之以壽之也又九章曰懲於羮者而吹韲言人有歠而熟中懲艾之見韲則吹之又招䰟曰和酸􅀂苦陳呉羮呉人攻作又大招曰鮮甘雞和楚酪酪昨胾也言取生丈鼈烹之羮調賂宻復有肥雞􅁏和以酢酪其味清也又曰内鶬鴿鵠味豺羮鶬鶬鴿鶴似鳩而青鵠黄鵠也􅉘以豺言畢夫巧於調和先甘酸鶬鵠肉故羮羙也唐明皇雜録曰李林甫子鄭平爲户部貟外甞與林甫同處一日林甫就院省其女遇平櫛髪見林甫至處遽欲退蔵林甫固邀之見其􅁂髪皆白謂平曰上當賜甘露羮郎其食之縱當華皓必當鬒黒明日果有中使至賜林甫食中有甘露羮遂以與平平食訖一旦髪毛如䃜嶺表異録曰交阯之人重不禄羮羮以羊鹿鷄猪􅁏和骨同一釡煑之令極肥濃漉去􅁏進之葱薑調以五味貯以盆器置之盤中羮中有觜銀銀杓可受一􅂛即更相揖讓多自主人先舉即滿斟一杓内觜入􅈹仰首徐傾之飲盡傳杓如酒廵行之喫羮了然續以諸饌謂之不録㑹亦呼爲先腦也交阯人或經營事務弥􅂊縫推要但備此㑹無不諧者安南録異圖鑿穿心飛頭鼻飲者皆遺風也張翰豆羮賦曰乃有孟秋嘉菽垂枝挺莢是刈是穫充簞􅄹篋香鑠和調同疾赴急桓鱗七􅀃曰河黿之羮齊以蘭梅芬芳甘旨禾咽先滋衛洪七開曰馨羮芬臛凝色生華皇象書曰想必醉令作醴梅羮相待繆襲􅀕儀曰夏祀調和羮芼以葵秋祀羮芼以䓤春祀和羮芼以韭臛蒼頡解詁曰少年汁臛也臛多澤房文切􅀃文曰臛􅁏羮釋名曰臛曰蒿也香氣蒿髙也齊書曰虞悰家冨於財而善爲滋味豫章王嶷盛饌享賔謂悰曰肴羞有所遺否悰曰何曽食䟽有黄頷臛恨無之廣志曰晨鳬肥而耐寒冝爲臛劉欣期交州記曰九真太守陶璜立郡築城於土穴中得一白色形似蚕蛹無頭長數十丈大餘圍軟軟動莫能名剖腹有􅁏如猪昉遂以爲臛甚香羙璜啖一杯三軍盡食齊諧記曰江北華本者爲人好鼈臛食經曰有芋子酢臛法楚辭招魄曰臛鼈炮羔有柘漿言以飴宻臑鱉炮羔或日臑鱉魚羔和牛五臟羔臑也鴶鵠酸鳬小臛也煎鴻鶬鴻鳴鴶鶬鵠也言復以酸將烹鵠爲羮小鳬煎熬鴻鶬令肥羙羮也露雞臛露露栖鷄也有菜曰羮無菜曰臛大􅀛也厲而不爽厲列也爽敗也楚人名敗日爽言乃復烹露棲之肥鷄鷄臛鱉􅁏其味清列而不知貶也又大招曰煎􅠧臛爵言煎鮒魚臛黄雀也崔駰􅀶徒論曰鶩臛羊殘陳思王七啓曰臛江界之潜黿王粲七釋曰黿羮蠙臛飲周禮天官膳夫曰飲用六清六清水漿醴䣼􅬙酏也􅬙於羙切酏以支切又食醫曰飲齊眡冬時飲冝寒也又酒正曰酒正辨四飲之物一曰清二曰醷三曰醬四曰也清謂醴之折者也醷内則所謂或以配爲醴者酉凢醴濁釀馳爲之則少清矣醴者馳粥清也又曰漿人掌共王之六飲水醬醴涼醷馳入于酒府醴者清也鄭司農云涼以水酒也方謂涼今寒粥􅀂糗節雞水禮王制曰天子五飲上水醬酒醴酏上以水爲上又郊特牲曰飲養陽氣故有樂又内則曰飲曰諸飲也重醴稻醴清糟􅁰醴清糟梁醴清糟重陪也糟醇也清折也致飲有醇者有者陪設之也或以酏爲醴釀粥爲醴􅁰酏馳粥又外傳曰共王及后與世子食後所進之六飲水居其上其次曰漿三曰醴釀粥爲之浄而清四曰涼暑月以􅄂爲和水者五曰醴以乾梅乾木􅀲相和水一名濫涼六曰酏以黍爲粥之薄者左傳曰􅐫父使公下如華泉取飲鄭周父御佐車宛茷爲右載齊侯以免佐車副車又曰鄢陵之戰欒鍼見子重之旌請曰楚人謂夫旌子重之麾也彼其子重也日臣之使於楚也子重問晉國之勇臣對曰好以衆整曰又何如又問其餘臣對曰好以暇暇閑暇今兩國治戎行人不使不可謂整臨事而食言不可謂暇食好整之言請攝飲焉攝持也持飲往飲子重也公許之使行人執搕承飲造于子重承奉也日寡君乏使使使鹹御持也曰寡君乏使鍼御持矛是以不得犒從者使某攝飲子重曰夫子甞與吾言於楚必是故也不亦識乎知其以徃言好腵故致飲受而飲之免使者而復鼔免脫也又曰鄭師入陳子展執縶而見見陳侯再拜稽首承飲而進獻承飲奉觴示不失臣敬子羙入數俘而岀子羙子産也但數其所􅀗人數不將以歸也又曰呉入楚申包胥乞師於􅁗立依於庭牆而哭日夜不絶聲勺飲不入口七日論語曰一簞食一瓢飲穆天子傳曰天子渴于中求飲未至七萃之士曰髙奔戎割其左􅆖之頸取其清血以飲天子今西方之羌故刺馬咽取血飲之瘡示尋愈也天子羙之賜佩玉一􅃗神仙傳曰蔡經尸解去十餘年忽還家言七月七日王君當來過到其日可多作數百斛飲以供從官乃去到期假借甕器作飲數百斛羅列覆置庭中其日方平果來語林曰陸士衡在洛夏月忽思竹篠飲語劉實云吾郷曲之思轉􅀷今來東歸恐無復相見理言此巳復之生感漿詩曰或以其酒不以其漿或醉其酒者或不得漿者禮記曲禮曰酒漿處右又檀弓曰曽子謂子思曰伋吾執親之䘮也水漿不入於口者七日又内則曰漿酢胾也水清意梅新酉漿濫以諸和水也以周禮六飲校之則濫凉也紀莒之問名諸爲濫漢釋名曰桃濫水也水清而藏之其味濫濫然酢也史記曰漿千儋儋甖此亦比千乗之家又曰薛公藏於賣漿家漢書郊祀歌曰奉尊柘漿折朝醒應劭日取甘柘汁以爲飲也折解醒病酒言拓漿可以解朝醒也呉書曰􅀽術去壽春時方盛夏欲得􅁡漿又無􅁡遂歐血死後魏書曰游明根㓜年遭亂爲櫟陽王氏奴主使牧羊明根以漿倩人書字路邊書地學之又曰咸陽王禧謀逆􅀍禽送華林都亭着千斤錢格鏁格羽林掌衛之時􅀬甚禧渴悶垂死勑斷水漿侍中崔光令左右送酪漿􅂛餘禧一飲而盡管子曰左酒右漿蔡邕注曰事尚書左右酒近體也右漿上逺列子曰列子之齊中道而返遇伯昏瞀人瞀人曰奚方而反曰吾驚焉惡乎驚曰吾食於十漿而五漿先饋饋遺也伯昏瞀人曰􅀂是則汝何爲已驚遺汝之漿何故驚也曰夫内誠不解内無誠實外無解然形諜成光諜飾其形身之光也以外鎭人心外以諜形鎮人則其内不足也使人輕乎貴老重少輕老由乎形諜而察其所患形飾則心亂亂必患生故當察也夫漿人持爲食羮之貨多餘之嬴漿人之饋我者非貴我嬴也盖貨我以自􅄹耳其爲利也薄其爲權也輕而猶􅀂是食羮之利薄所利之􅁠輕相猶謀我况有國者効我以功事乎故我道中而反而况万乗之主身勞於國而智盡乎事彼將我任以事而効我以功吾是以驚也孟子曰書曰徯我后后來無罰其君子實玄黄于篚以迎其君子其小人簞食壷漿以迎其小人􅀽子正書曰歳在申酉乞漿得酒歳在辰巳嫁妻賣子頋子曰非其道壷漿不可受是其道雖天下不可讓山海經曰髙前之山上有水焉甚寒而清帝臺之漿也飲者不心痛漢武故事曰西王母曰太上之藥有玉津金漿其次藥有五雲之漿神異經曰東南有人名黄父以霧露爲漿廣志曰醶䣼漿也醶􅀄檻切穆天子傳曰盛􅁎病求飲天子命取漿而給得之速是日壷輲壷器名輲速也音遄焦贛易林曰登上橋堂飲萬歳漿華山記曰華山上有明星玉女持玉漿孝子傳曰洛陽陽公輦義漿以給過客世􅀃曰嵩山北有大穴晉􅀄有一人誤墮穴中縁行十許日有草屋區中有二人對坐圍碁局下有一杯白飲墮者告以飢渴碁者曰可飲此墜者飲之氣力十倍歸問張華華曰所飲者玉漿典術曰餌桃膠五十日後飲玉漿楚辭九歌曰奠桂酒兮椒漿以椒置漿中也援北斗兮酌桂漿也西京􅄂記枚乗栁賦曰樽􅄹縹玉之酒爵獻金漿之醪梁人作諸柘酒名日金漿張衡思玄賦曰斟白水以爲漿太平御覽卷第八百六十一
