body:
  text: 皇親部十一嬪丗婦御女美人才人保林女侍中女尚書女史嬪尚書堯典曰􅁵降二女于嬀汭嬪于虞降下嬪婦也舜爲匹夫能以義理下帝女之心於所居嬀水之汭使行婦道於虞氏詩推度灾曰􅀜睢知原兾得賢妃正八嬪嬪婦也八婦正於内則可以化四方矣周禮天官内宰曰以隂禮教九嬪不言教夫人丗婦舉中言省文也又曰九嬪掌婦學之法以教九御婦德婦言婦容婦功各帥其屬而以時御叙于王所嬪婦也婦德謂貞愼也婦言謂辭令也婦容謂婉娩也婦功謂􅁝枲也自九嬪以下而御各帥其屬者使亦九九相與從王所息之燕寢也羣妃御見之法卑者冝先尊者冝後御女八十一人當九夕也婦二十七常三夕嬪九人當一夕夫人三當一夕后當一夕亦十五日而遍云自望後足之凡􅀕祀賛玉齍賛后薦徹豆籩玉齍玉敦􅁰稷器也􅀂有賔客則從后當賛后事大喪則帥叙哭者亦如之亦從后也周禮冬官匠人曰内有九室九嬪居之外有九室九卿朝焉禮記曰仲春之月􅀇鳥至之日以太牢祀於髙禖天子親徃后妃親帥九嬪御乃禮天子所御帶以弓䪅授以弓矢于髙禖之前又曰古者天子后立六宫三夫人九嬪二十七丗婦八十一御妻國語曰齊襄公卑聖侮士而唯女是崇九妃六嬪陳妾數百漢書曰王莽備九嬪視九卿魏志曰文帝增貴嬪位次皇后又曰文德郭皇后文帝踐阼爲貴嬪甄后之死由后之寵也王隱晉書曰武帝采諸􅁑沖等女五十餘人入殿賜采女食皆憂不食帝使縵鄣楊后曰可但入鄣其中者以絳繫臂胡芳泣左右止之曰陛下聞之芳曰死不畏何畏陛下帝壯其言故遂敬之芳父奮聞女中亦哭曰老奴不死唯有二兒男在九地之下女在九天之上拜芳爲貴嬪晉書曰胡貴嬪名芳父奮㤗始九年簡良家子以充内職拜芳爲貴嬪毎有顧問不飾言詞率尓而荅進退方雅最蒙愛幸侍御服飾亞于皇后常與樗蒲傷上指帝怒曰此固將種也芳對曰北伐公孫西拒諸􅁑非將種而何芳生武安公主王隱晉書曰又採侍御史齊國左維女爲脩儀有文才晉書曰左貴嬪名芬兄思芬少好學善綴文名亞於思武帝聞而納之拜脩儀後爲貴嬪以才德見禮體羸多患常居薄室每遊華林􅂺廻輦過之語及文義辭對清華左右侍聽莫不稱美及楊皇后崩芬獻誄咸寜二年納悼后芬受詔作頌及帝女萬年公主薨帝痛悼不巳詔芬爲誄其文甚麗帝重芬辭藻毎有方物異寳必詔爲賦頌以是屢獲恩賜焉晉諸公讃曰舊制貴嬪夫人比三公假金紫淑媛淑儀脩容脩儀婕妤容華充華爲九嬪比九卿假銀青晉起居注曰㤗始三年使使持節兼五官中郎將宗正丞司馬恢拜崇陽園妾李琰爲脩華王宣爲脩容徐琰爲脩儀吴淑爲婕妤趙􅓨爲充華九年有司奏禮唯皇后聘以榖圭無妾媵設玉之制詔曰拜授可依魏氏故事十年上臨軒使持節兼太常洛陽令司馬啓拜采女胡芳爲貴嬪又使使持節兼御史中丞太子舎人司馬誕拜采女劉媛爲淑妃臧曜爲淑媛芳爲淑儀趙粲爲脩華陳琇爲脩容咸寜三年拜美人左嬪爲脩儀刑蘭爲婕妤朱姜爲容華又曰惠帝元康二年詔曰才人謝玫進爲淑妃有司奏當與三夫人以下同拜詔冝在後也永寕元年詔曰峻陽園淑妃公孫明識貞粹今進位爲貴人後魏書曰髙祖改定内官三嬪視三卿六嬪視六卿山海經曰鮒隅山顓頊塟于其陽九嬪塟其隂左貴嬪集有離思賦相風賦孔雀賦松栢賦泣漚頌賦納皇后頌楊皇后登祚讃芍藥花頌鬱金頌菊華頌神武頌四言詩四首武元皇后誄萬年公主誄丗婦周禮曰丗婦掌􅀕祀賔客喪紀之事帥女宫而濯槪爲齍盛及􅀕之日涖陳女宫之具凡内羞之物涖臨也內羞房中之羞周禮天官冢宰曰丗婦不言數者君子不茍於色有婦德者乃充之死則有闕周禮春官曰丗婦每宫二人女史二人丗婦居宫王者六宫女史有才智也禮記月令仲春之月后親帥九嬪御御謂從徃祀也禮天子有丗婦女御獨出帥九嬪者舉中言祠于髙禖之前太祝酌飲髙禖之庭又曰季春之月后齋戒親東嚮躬桑后妃親採桑示師先天下也東嚮者向時氣也是時明其不常留養􅁞者所卜夫人與丗婦及諸臣之妻也禮記婚義曰古者天子二十七丗婦以聽天下之内治以明章婦順故天下內和而家理蔡邕月令章句曰仲春之月以太牢祀于髙禖髙謀祀名髙猶尊也吉事先見之象盖謂之人見所以祈子孫之祀也􅀇鳥感陽而至故重至日因以用之簡娀以􅀇鳥至之日有事髙禖而生契焉故詩云天命􅀇鳥降而生商后妃率九嬪御后者天子􅃴妻也妃命也嬪婦也御妾也周禮天子一后三妃九嬪二十七丗婦八十一御妾以應外朝公卿大夫之數也丗婦不見卑者文略御妾皆行丗婦可知也后妃將九嬪女御皆㑹禖以祈孕姙也乃醴天子所御帶以弓韣天子所御謂后妃以下至妾任有萌牙者也韣弓衣也祝以髙禖之命飲以醴酒帶以弓韣尚使得男也授以弓矢于髙禖之前弓矢者男子之事也孕姙者於髙禖登位之前也又曰季春之月后妃齋戒親東嚮躬桑齊戒者事於先􅁞也東嚮盛德也躬桑者手三繰猶天子親耕三推也古者天子諸侯必有公桑􅁞室近川而爲之築宫仞有三尺􅁄牆而外閉之卜夫人丗婦之􅁻者使入􅁞室奉種浴于川公桑以食之􅁞事旣􅂛外成也分蠒稱􅁝􅁝以斤兩故曰稱知其多少所以旌其成功也在孟夏於此終言之也以供郊廟之服天子諸侯所服以􅀕者必后夫人所親􅁞也禮丗婦卒􅁞獻蠒于夫人受之親繰三盆手朱緑之􅀇黃之以爲黼黻文章君服之以祀先王先公敬之至也故曰無或敢怠又曰孟夏之月􅁞事旣畢后妃獻蠒於天子進其成功也乃脩蠒稅以桑爲均十而取一曰稅乃收丗婦以下所􅁞之稅也以桑爲平者用桑多則蠒多少則蠒少也貴賤長少如一貴謂丗婦賤謂妾御長謂力壯者也言無尊卑老壯各自以桑爲平不得以髙下爲差也史記曰中宫天極星後勾四星末星正妃餘三星後宫之屬也漢書曰軒轅前大星女主象旁小星御者後宫屬也范曄後漢書曰丗婦主知喪􅀕賔客後魏書曰髙祖改定內官丗婦視中大夫又曰宣武靈皇后胡氏􅀄召入掖庭爲承華丗婦生肅宗明皇帝後周書武帝建德中詔曰正位於中有聖通典質文相華損益不同五帝則四星之象三王立六宫之數劉曹巳降等級彌繁選擇遍於生民命秩方於庶職椒房丹地有衆如雲夲由嗜欲之情非關風化之義朕運當澆季思復古始無容廣集子女屯聚宫掖􅀪賛後庭事從約簡可置妃二人丗婦三人御妻三人自兹以外冝悉减省御女周禮天官家宰曰女御婚義所謂御妻御猶進也侍也范曄漢書曰八十一御女序于王之燕寢頒官分務各有典司後漢書曰髙祖改定內官御女視元士淮南子曰孟春之月東宫御女青色衣青綵皷琴孟夏之月南宫御女赤色衣赤綵吹笙竽孟秋之月西宫御女白色衣白彩撞白鍾孟冬之月北宫御女黒色衣黒彩擊磬石美人漢書曰漢興因􅁗之稱號正􅃴稱皇后妾皆稱夫人及有美人之號焉至武帝各有爵位美人視二千石又曰萬石君奮其父趙人也姓石氏趙亡徙居温過河内時奮年十五爲小吏侍髙祖髙祖與語愛其恭敬問曰􅀂何有對曰有姊能皷琴髙祖曰􅀂能從我乎曰願盡力於是髙祖詔其姊爲美人徙其家長安中戚里以姊爲美人故也又曰孝惠張皇后宣平侯敖女也吕太后欲爲重親以公主女配帝欲其生子萬方終無子迺使佯爲有娠取後宫美人子名之殺其母立所名子爲太子又曰孝成趙皇后弟絶幸爲昭儀謂成帝給我言從中宫來即從中宫許美人兒從何生許氏竟當復立耶令許美人有子竟􅀒􅀂約謂何帝曰約趙氏故不立許氏使天下無岀趙氏上者無憂也范瞱後漢書曰夏殷以上后妃之制其文略矣周禮王者備内職焉光武中興置美人無爵秩歳時賞賜充給而巳又曰虞美人者以良家子十三選入掖庭生舞陽長公主自漢興母氏莫不尊寵順帝旣未加美人爵號而冲帝早夭梁兾秉政忌惡他族虞氏抑而不登但稱大家而已又曰王美人趙國人也豐姿色聦敏有才能明書㑹計以良家子應法相選入掖庭爲何后所酖靈帝思美人作追德賦令儀頌魏志曰漢制內官十有四等魏因漢法皆如舊制自夫人以下丗有増損太祖建國始命王后其下五等有美人曁太和中自夫人以下爵凡十二等美人視二千石江表傳曰孫皓以張布女爲美人有寵後美人忤皓皓怒棒殺之沈約晉書曰夏殷以上內職無聞􅁎氏之隆婦官爲盛前漢列給十四丗祖受命又有美人以比職焉後魏書曰髙祖改定內官美人視三品沈約宋書曰晉武帝採漢魏前事之制置三夫人其餘有美人爵視千石太宗以美人爲散使蕭子顯齊書曰六宫位號漢魏以來因寵増置丗不同矣建元元年有司奏置美人爲散職才人范曄後漢書曰和帝數失皇子鄧后憂繼嗣不廣數選進才人以愽帝意魏志曰明帝遊後園召才人以上曲宴極樂明日帝見毛后后曰昨遊宴北園樂乎帝以左右泄之所殺十餘人魏略曰明帝青龍三年於別殿之北立八坊諸才人以上轉南附焉其秩石擬百官之數王隱晉書曰太康七年出後宫才人妓女巳下百七十人歸家又曰􅀄惠帝㓜丗祖遣才人謝􅅼給惠帝因是有娠臨娶賈妃迎􅅼西宫遂生愍懷臧榮緒晉書曰懷帝王太后諱媛􅁎􅀄入武帝拜中才人早卒懷帝即位追尊曰皇太后也晉中興書曰謝夫人名􅅼家夲貧賤又以屠羊爲業􅅼清惠貞正有淑姿選入後宫爲才人後魏書曰髙祖置女職中才人視五品沈約宋書曰晉武帝採漢魏之制置才人中才人爵視千石以下髙祖受命省二才人丗祖又置中才人以爲散位崔鴻三十國春秋後趙録曰石虎杜皇后名珠不知何許人平幽州在王浚妓中虎見而恱之因請於勒勒引見號曰才人以賜虎性恭惠柔婉寵幸亞於鄭后也保林漢書曰元帝加昭儀之號凡十四等保林視百石晉武帝起居注詔曰今出清啇掖庭及諸署才人妓女保林已下二百七十餘人還家女侍中後魏書曰髙祖置女侍中視三品又曰陸昕之容貌柔謹尚獻文女常山公主髙祖以其主壻特垂昵睠昕之亡公主奉姑有孝稱神􅀛􅀄與穆氏琅瑘公主並爲女侍中又曰于忠後妻中山王尼湏女微解書靈太后引爲女侍中又曰靈太后妹爲元乂妻封平君拜女侍中鄴中記曰石虎置女侍中皆貂蟬直侍皇后女尚書魏略曰明帝遊宴在内選女子知書可付信者爲女尚書省奏事當畫可魏書曰髙祖置女尚書視三品晉東宫舊事曰迎太子妃之日諸長御皆在幄帳左右侍宫人重行東面以准女尚書西面以准女尚書陸翽鄴中記曰石虎征計所得美女萬餘以爲宫人簡其有才藝者爲女尚書女史毛詩曰靜女刺時也衛君無道夫人無德也靜女其孌貽我彤管旣有静德又有美色又遺我以古人之法可以配人君者后夫人必有女史書其日月而以環進退之生于月娠則金環退之當御者以銀環進之著於左手旣御著于右手事無大小記以成法箋云彤管色赤貌彤管有煒恱懌女美煒赤貌彤管以赤心正人者箋云赤管然煒女史以恱懌妃妾之德美之也毛詩義䟽曰女史彤管法如國史主記后夫人之過人君有柱下史后有女史外内各有官也周禮曰女史八人女史女奴暁書也掌王后之禮掌内治之藏以詔后内治内政内治之法夲在内掌書而藏之送内宫考六宫之計書内治之藏以令后之命也凡后之事以禮從亦如太史之於王漢書曰班婕妤自傷賦曰陳女圖以鏡鑒頋女史而問詩范曄後漢書曰頒官分務各有典司女史彤管記功書過晉記曰元康中司空張華懼后族之盛乃作女史箴沈約宋書曰女史執䇿記言是司過身戒夕蠱國畏晨後魏書曰髙祖置女職女史賢人視三品沈約宋書曰太宗留心後房擬百官備置内職紫極房光興房各置女史一人崔鴻三十國春秋後趙録曰石虎置女太史於靈臺仰觀灾祥以考外太史驗察虚實太平御覽卷第一百四十五
