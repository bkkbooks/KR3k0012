front:
  text: 太平御覽卷第九百七十九菜茹部四
  hash: sha256:7e360c57fbaddba0cf25ebea3499290c2bd9b92d11e9d2472bc5de2904f608fc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_979-1a}
body:
  text: 瓠壷盧蓼葵蕪菁瓠詩碩人曰齒如瓠犀犀瓠中辨也又曰八月斷壷壷也瓠又曰匏有苦葉濟有深渉匏謂之瓠瓠葉苦不可食陸機毛詩䟽義曰匏有苦葉匏瓠也葉小可爲羹楊州人􅁪食至八月葉即苦故云苦葉論語曰吾豈瓠􅀲也哉焉能繫而不食爾雅曰瓠犀瓣瓠中辨也詩曰齒如瓠犀魏略曰髙辛氏有老婦人居王宫得耳疾醫爲挑之得物大如璽盛以瓠覆以盤化爲犬五色因名盤瓠􅀳書曰杜預病癭吴人憚其智計以瓠繫狗之頸毎大樹似癭斬使白乃題曰杜預頸及城平盡捕殺之又曰祖逖在河南百姓感恱甞置酒大㑹􅂄老坐中流涕曰吾等老矣更得父母死將何恨乃歌曰幸哉遺􅀺免俘虜三辰旣朗遇慈父􅀇酒忘勞甘瓠脯何以詠思歌且舞其得人心如此宋書曰徐文伯曽祖熈好黄老隱於􅁗望山有過求飲留一瓠瓢與之曰君子孫冝以道術救丗當得二千石熈開之乃扁鵲醫經一卷齊書曰卞彬性好飲酒瓠臺瓢勺坑皮爲肴着帛冠十二年不改易以大瓠爲籠什物多諸詭異自号卞田居後周書曰強練師不知何許人所至之處人皆敬而信之晉公護未誅之前曽手持一大瓠到護弟門外抵而破之乃大言曰瓠破子苦未幾而護誅諸子並伏法管子曰一年之計莫􅀂樹榖十年之計莫􅀂樹木終身之計莫􅀂樹人􅀲瓠葷菜不俻國之貧也莊子曰惠子曰魏王貽我大瓠之種我樹之而成實五石以盛水漿其堅不能自舉剖之以爲則廓落無所容非不大也吾爲其無用剖之莊子曰夫子固拙於用大也國語曰諸侯伐􅁗及涇莫濟叔向見叔孫穆子穆子曰豹之業業乃瓠有苦葉矣不知其他叔向退召舟虞與司馬曰夫苦瓠不材於人共濟而巳是行魯人與莒人先濟新序曰魏文侯見萁李墻壞不治問其故曰不時也又進瓠羮文侯曰墻壞不築教我無奪民農功飴我瓠羹教我無多歛百姓王充論衡曰千將之刃未磨􅀲瓠不能傷又曰婦人踈孕者子活乳數者子死譬􅀂瓠華多實少也風俗通曰燒穰殺瓠俗􅀃家人燒􅁰穰則使田中瓠枯死也水經曰今豫州汝南郡城西北汝水左出西北流又屈而東轉又西南㑹汝形􅀂垂瓠􅂄老云城取名焉太康地記曰朱崖儋耳無水唯種大瓠藤斷其汁用之亦足嶺南異物志曰儋崖種瓠成實率皆石餘壷盧蜀志曰張􅒨字君嗣如瓠壷外澤而内麤三國典略曰齊武成帝皇后胡氏安定人魏宁書令兖州刺史延之女也母盧氏懷孕廷之􅀄有胡僧來詣門曰此宅瓠盧中有月崔豹古今注曰匏壷盧也壷盧瓠之無柄者匏有柄者懸匏可作笙曲沃者尤善秋乃可用則􅃮其裏又曰瓢瓠也其揔曰匏瓠其别名丗􅀃曰陸士衡􅀄入洛諮張公所冝曰詣劉道眞是其一旣徃劉尚哀制中性􅄝酒禮畢􅀄無他言唯問東吴有長柄壷盧卿得種來否陸兄弟殊失望乃云悔去廣五行記曰西域夷國有石駱駞腹下出水以金䥫器取便即漏下唯匏盧盛之則不漏飲之令人體滑香浄其國神秘不可數遇嶺表録異曰胡盧笙交趾人多取無柄之瓠割而爲笙上安十三簧吹之音韻清響雅合律吕蓼爾雅曰薔虞蓼虞蓼澤蓼也薔音即力切詩曰閔子小子未堪家多難子又集于蓼言辛苦也禮曰膾秋用蓼鶉羮雞羮鴽釀之蓼醸謂切雜之也吴越春秋曰越王欲復怨非一旦也苦思勤心夜以接日卧則以蓼劉向别傳曰尹都尉書有種蓼篇魏子曰君以臣爲夲以民爲根猶室與柱梁相持也梁不強則上下俱亡故蓼虫在蓼則生在芥則死非蓼仁而芥賊也夲不可失也任昉述異記曰長沙定王故宫有蓼園云定王故園也菜之辛者謂之蓼吴氏夲草曰蓼實一名野蓼一名澤蓼葵廣雅曰蘬丘􅁤切葵也詩曰七月烹葵及菽爾雅曰莃音希莬葵似葵而小葉狀如藜有毛汋啖之滑菺音肩戎葵今蜀葵也似葵華如木槿華荍音翹蚍音毗阝房无切今荆葵也似葵紫色也韓詩外傳曰魯􅁥門女相從績中夜而泣其偶問其故曰宋司馬得罪於宋出於魯馬佚食吾園葵是歳吾園亡一半越攻吴諸侯畏其威魯徃獻女吾姉預焉兄徃視之道畏而死由此觀之禍福相及也陸機毛詩䟽義曰荍音翹一名比不一名楚葵似蕪菁英華紫緑色可食微苦也左傳曰齊慶克通于聲孟子鮑牽見之告國武子武子召慶克謂之夫人訴之乃刖鮑牽仲尼曰鮑莊子之智不如葵猶能衛其足葵葉葉向日以蔽其根也史記曰公儀休爲魯相食茹而美抜去園葵也􅀳書曰江統上太子書曰今西園賣葵菜藍子雞麫之属􅃜門敗國體貶損令北齊書曰王攸字子􅀷少􅀌獨種葵三􅅿數􅀍人盗之王攸宻令人書葵葉下明旦市中看之遂得偷者管子曰桓公北伐山戎出冬葵布之天下桓公憂北郭民貧管子請禁去市三百歩者不得樹葵菜此則空有以相給淮􅀯子曰聖人之於道猶葵之與日雖不能與終始其郷之誠也郷仰誠實也繆襲􅀕儀曰夏祀和羹芼以葵列仙傳曰丁次都不知何許人也爲遼東丁氏作人丁氏甞使買葵冬得生葵問冬何得有葵云從日􅀯買來列女傳曰魯􅃮室有女過時未適人􅀝柱而嘆鄰婦謂曰何悲也欲嫁乎女曰吾憂魯君老而太子少也婦曰此魯大夫憂焉女曰昔有晉客舎吾家繫馬於園馬佚踐吾園葵使吾終􅀊不猒葵味鄰女奔亡借吾兄追霧出以求溺流而死使吾終身無兄吾聞河潤九里漸洳三百歩今魯國微弱亂將及人三年魯果亂師曠占曰黄帝問師曠曰欲知牛馬貴賤秋葵下小葵生牛馬貴大葵不虫牛馬賤􅀶物志曰陳葵子微火炒令爆咤散着熟地中遍踏朝種暮生逺不過宿陳葵子秋種覆盖令經冬不死至春有子是也潘岳閑居賦曰緑葵含露白薤負霜鮑明逺葵賦曰別有鴨脚肫耳言葵似之古歌辭曰採葵莫傷根傷根葵不生結交莫羞貧羞貧交不成蕪菁爾雅曰湏葑蓯音揔也湏未聞江東呼蕪菁爲􅺁菘湏音相近故也湏即蕪菁也尚書曰荆州厥貢苞匭菁茅菁似爲􅉁也詩曰採葑採菲無以下體葑蕦也菲芴也下體根莖也箋云葑蔓菁與葍之􅀋皆上下可食然其根有羙時有惡時又曰爰采葑矣沫之東矣箋云葑蔓菁也又曰采苓好聽䜛也采葑采葑首陽之東人之爲言茍亦無從葑菜也陸機毛詩䟽義曰菜葑蕪菁也郭􅀇今菘菜也可食少味東觀漢記曰桓帝永興二年詔司􅈻蝗水爲灾五榖不登令所傷郡國皆種蕪菁以助民食吴暦曰劉備歸曹公曹公使親近覘視諸將有賔客酒食者輙因事害之俻時閉門將人種蕪菁公使人窺門即去俻謂張飛曰吾豈種菜者乎曹公必有疑意不可復留其夜輕馬而去吴録曰陸遜諸葛瑾攻襄陽遜遣親人韓扁抄掠瑾聞之欲急去遜方催人種豆菘與諸將圍碁以示閑暇齊書曰武陵王曄性清簡尚書令王儉詣曄留儉設食盤中菘菜鮑魚而巳儉重其眞率爲飽食盡歡而去又曰周顒清貧寡欲終日􅂼食雖有妻子獨處山舎甚機辨文惠太子問顒菜食何味㝡勝顒曰春􅀄早韭秋末晚菘梁書曰范元琰家貧唯以園􅂼爲業甞出行見人盗其菘元琰遽退走母問其故乃以實荅問盗者爲誰荅曰向所以退畏其愧耻今啓其名願不泄也於是母子祕之或有渉溝盗其筍者元琰因伐木爲橋以渡之自是盗大慙一郷無復草竊北史曰孟信爲趙郡太守政尚寛和權豪無犯山中老人曽以㹠酒饋之信和顔接引殷勤勞問乃自出酒以鐡鐺温之素木盤盛蕪菁􅉁而巳吕氏春秋曰菜之美者具區之菁浸淵之草名曰土英荆楚歳時記曰仲冬是月也菜結霜蕪菁葵等􅄂菜乾之並爲醎􅉁有得其和者並作金􅁫色今南人作醎􅉁以糯米熬搗爲末并研胡麻汁和釀之石笮音責令熟􅉁旣甛汁脆汁亦酸美呼其莖爲金􅁫股醒酒所冝也急就篇曰老菁蘘荷冬日藏並藏蓄之以禦冬也太平御覽卷第九百七十九
