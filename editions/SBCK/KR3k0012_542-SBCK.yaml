  text: 太平御覽卷第五百四十二
  hash: sha256:127f1534aaded3c5bcdb578438ee8645bf2d920c8d781c7a38456c9cfdc61598
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_542-1a}
body:
  text: 禮儀部二十一拜􅀃文曰拜首至地也尚書舜典曰帝曰俞咨垂汝作共工垂拜稽首讓千殳斨帝曰俞咨益汝作朕虞益拜稽首讓于朱虎熊羆帝曰俞咨伯汝作秩宗伯拜稽首讓于䕫龍又大禹謨曰帝曰禹官占惟先蔽志昆命于元􅀛朕志先定詢謀僉同􅀑神其依􅀛筮叶從卜不習吉禹拜稽首固辭又大禹謨曰益賛于禹曰惟德動天無逺弗届滿招損謙受益時乃天道禹拜昌言曰俞班師振旅又益稷曰臯陶拜手稽首颺言曰念哉周禮春官下大祝曰大祝辨九拜一曰稽首二曰頓首三曰空首四曰振動五曰吉拜六曰凶拜七曰竒拜八曰褒拜九曰肅拜以享右􅀕祀稽首拜頭至地也頓首頭叩地空首拜頭至手所謂拜手也古拜拜而後稽顙謂齊衰不杖以下者也言吉者此殷之凶拜周以其與頓首相近故謂之吉拜云凶拜稽顙而後拜謂三年服者也杜子春云竒讀爲竒偶之竒謂先屈一􅂰雅拜是也或云竒讀曰􅀝􅀝拜謂持節持㦸拜身􅀝之以拜也鄭大夫云動讀爲董書亦或爲董振董以兩手相擊也竒拜謂一拜也褒謂報報再拜是也鄭司農云折褒拜今時持節拜也肅拜但俯身下手今時揖是也介者不拜故曰爲事敢肅使者玄謂振動戰慄變動之拜也書曰王折色変一拜折荅臣下也再拜禮神與尸享獻也謂朝獻饋獻也右讀爲侑侑勸尸食而拜禮記曲禮曰侍食於長者主人親饋則拜而食主人不親饋則不拜而食以其禮於巳不隆也又曲禮曰君言至則主人出拜君言之辱使者歸則必拜送于門外又曲禮曰介者不拜爲其拜而莝拜莝則失容節莝猶詐也又曲禮下曰士有獻於國君問之曰安取彼再拜稽首而後對又檀弓上曰孔子曰拜而後稽顙頽乎其順也稽顙而後拜頎乎其至也頽頎懇至也此俱喪拜時人行之異禮又内則曰凡拜男尚右手女拜尚左手鄭玄注曰左陽右隂左傳僖公曰王使宰孔賜齊侯胙胙􅀕肉尊之此二王後曰天子有事于文武使孔賜伯舅胙天子謂異姓諸侯曰伯舅齊侯將下拜孔曰且有後命天子使孔曰以伯舅耊老加勞賜一級無下拜七十曰耊級等也對曰天威不違顔咫尺言天監察不逺威嚴常在顔靣之前八寸曰咫小白余敢貪天子之命無下拜小百齊侯名余身也恐隕越于下隕越顚墜也􅀭天王居上故言恐顚墜于下以遺天子羞敢不下拜下拜登受又僖中曰公賦河水公賦六月趙衰曰重耳拜賜公子降拜稽首公降一級而辝焉衰曰君稱所以佐天子者命重耳重耳敢不拜又文上曰公如晉及晉侯盟晉侯饗公賦菁菁者我菁菁者莪詩小雅取其旣見君子樂且有儀莊叔以公降拜日小國受命於大國敢不慎儀君貺之以大禮何樂如之抑小國之樂大國之惠也侯降辭登成拜公賦嘉樂嘉樂詩大雅取顯顯令德冝民冝人受禄于天又成公九年曰季文子如宋致女復命公享之賦韓弈之五章韓弈詩大雅篇名其五章言蹶父嫁女於韓後爲女相所居莫如韓樂文子喻魯侯有蹶父之德宋公如韓侯宋土如韓樂穆姜出于房再拜曰大夫勤辱不忘先君以及嗣君施及未亡人穆姜伯姫母聞文子言宋樂喜而出謝其行勞婦人夫死自稱未亡人先君猶有望也言先君亦望文子之􅀂此敢拜大夫之重勤又賦緑衣之卒章而入緑衣詩邶風也取其我思古人實􅀗我心喻文子言得已意又襄元曰穆叔如晉報智武子之聘也晉侯享之金奏肆夏之三不拜肆夏樂曲名工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子問之對曰三夏天子所以享元侯也使臣弗敢與聞文王兩君相見之樂也使臣不敢及鹿鳴君所以嘉寡君敢不拜嘉嘉者以叔孫爲嘉賔故歌鹿鳴之詩取其我有嘉賔也叔孫奉君命求嘉叔孫乃所以嘉魯君四牡君所以勞使臣也敢不重拜皇皇者華君教使臣曰必諮於周皇皇者華君遣使臣之詩也言中臣奉使能輝光君命如華之皇皇然又當諮於忠信以􅀘巳不及也臣聞之訪問於善爲諮諮親爲詢諮禮爲度諮事爲諏諮難爲謀臣獲五善敢不重拜五善謂諮詢度諏謀也又襄二曰公使厚成叔弔于衛曰寡君使瘠聞君不撫社稷而越在他境􅀂之何不弔衛人使太叔儀對曰羣臣不佞得罪于寡君寡君不以即刑而悼棄之君不忘先君之好辱弔羣臣敢拜君命之辱重拜大貺又昭四曰􅀄楚恭王無冢適有寵子五人無適立焉乃大有事于羣望而祈曰隨神擇於五人者使王社稷乃徧以璧見於羣望曰當璧而拜者神所立也誰敢違之旣乃與巴􅁎宻埋璧於大室之庭巴􅁎恭王妾太室祖廟使五人齊而長㓜入拜順長㓜以次拜也康王跨之靈王肘加焉子于子哲皆逺之平王弱抱而入再拜皆厭紐孝經右契曰制作孝經道備使七十人弟子向北辰星而聲折孔子絳單衣向星而拜論語子罕曰拜下禮也今拜乎上㤗也雖違衆吾從下臣􅀕於君酬酢授爵當拜於堂下時臣驕㤗故拜於堂上又郷黨曰康子饋藥拜而受之曰丘未逹不敢嘗饋進也拜受敬也未知其故故不敢嘗禮也家語曰子貢曰孔子爲大司冦國廐焚有違火來者則拜士一大夫再曰其來者亦相弔之道吾爲有司故拜之爾雅曰啓跪也郭璞注曰小跪也方言曰東齊青岱北燕之郊跪謂長鶩郭璞注曰今東郡人亦呼長跪爲長鶩釋名曰跪危也兩膝隠地體危倪他跽忌也見所敬者不敢自安也拜於丈夫爲趺跌然屈折下就地也於婦人爲扶自相扶而上下也漢書曰武帝幸不其如淳曰其音基不基山名因以爲縣祠神人於交門宫􅀿邵曰神人蓬萊仙人之屬也瑯瑘縣有交門宫武帝所造􅀂有嚮坐拜者作交門之歌又曰劉章巳殺吕産帝令謁者持節勞章章欲奪節謁者不肯章乃從與載因節信馳斬長樂衛尉吕更始還入北軍復報太尉勃起拜賀又曰大將軍衛青旣益尊姉爲皇后然汲黯與亢禮或􅀃黯曰自天子欲令羣臣下大將軍大將軍尊貴誠重君不可以不拜黯曰夫以大將軍有揖客反不重耶又曰何武徙京兆大尹二歳坐舉方正所舉者召見槃辟雅拜有司以爲詭衆虗僞武坐左遷楚内又曰朱􅀶爲瑯瑘太守門下􅁺貢遂􅂄老大儒敎授數百人拜起舒遲􅀶出教告主簿貢先生不習吏禮主簿且教拜起閑習乃止又曰張禹疾車駕自臨問之上親拜禹牀下禹小子未有官上臨􅃸禹禹數視其小子上即拜禹之小子爲黄門郎給事中東觀漢記曰耿恭於䟽勒城穿井十五丈不得水恭乃正衣服向井再拜爲吏士禱水身自率士輓籠有飛泉湧出大得水吏士驚喜皆稱萬歳又曰陳遵爲大司馬護軍使匈奴過辭於王丹臨訣丹謂遵曰俱遭丗反覆唯我二人爲天地所貴今子當之絶域無以相贈贈子以不拜遂揖而別遵甚恱之又曰司徒侯覆欲王丹者定交丹􅀍徴覇遣子昱徃昱道遇丹拜於車下丹荅之昱日家公欲與君投分何爲拜子孫耶丹曰君房有是言王丹未之許又曰魏覇爲光禄大夫霸妻死長兄伯爲霸娶妻送至官舎霸􅀏曰兒子備具何空養他家姥爲即自入拜其妻手奉案前因跪曰夫人視老夫復何中直而空失計義不敢相屈即拜而出妻慙求去遂送還之後漢書曰北匈奴遣使求和親顯宗遣鄭衆持節使匈奴衆至北庭虜欲令拜衆不爲屈單于大怒圍守閉之不與水火欲脇服衆衆㧞刀自誓單于恐而止乃更發使隨衆還京師華嶠後漢書曰鄭衆使匈奴欲令衆拜不爲屈相議復欲遣衆衆曰今徃匈奴必恐取勝於臣臣不忍持大漢節對氈裘跪拜明帝収繫廷尉獄獻帝春秋曰董卓自號太師御史中丞以下皆拜初皇甫嵩與卓爭雄後嵩爲中丞見卓拜車下卓曰可以服未嵩曰安知明公乃至於是卓曰鴻鵠固有逺志但鷰雀不知耳嵩曰昔與明公俱鴻鵠獨明公今爲鳯凰卓􅀏曰卿早服可得不拜也漢􅄂事曰韋玄成讓侯詔書不聽引拜之也又曰馬援與梁統友善統子虎賁中郎將松徃候援援小疾病松拜牀下援於牀上坐視不爲禮左右曰松貴不當禮耶曰我乃松父友雖貴奈何失禮典略曰太子嘗請文學酒酣坐忻命夫人甄氏出拜坐衆人皆伏而劉楨獨平視太祖聞之収楨減死胡沖呉曆曰孫䇿繫豫章先遣虞翻􅀃華歆歆葛巾迎䇿策謂歆府君德望逺近所歸䇿年㓜稚冝脩子弟之禮便向歆拜魏志曰魯國孔融髙才倨傲年在紀羣之間先與紀友後與羣交更爲紀拜由是顯名魏志曰常林年七歲有父黨造門問林曰伯先在不汝何不拜對曰對子字父何拜之有又曰晉宣王以常林郷邑􅂄德毎爲拜或謂林曰司馬公貴重君冝止之林曰司馬公自欲敦長㓜之序爲後生法貴非吾之所畏也拜非吾之所制也言者踧踖而退蜀志曰先主爲漢中王許靖爲太愽丞相諸葛亮皆爲之拜又曰伊籍隨元主入益州東使呉孫權聞其才辨欲逆折以辭籍適入拜權曰勞事無道之君籍即對曰一拜一起未足爲勞呉志曰朱冶領呉郡舉孫權爲孝廉後權歷位上將及爲呉王冶每見權常親迎執板交拜又曰人誣樓玄謗訕政事華覈上䟽乞玄自新孫皓疾玄名聲復徙玄及子男據付交趾將張並使以戰自効隂別勑並令殺之據到交趾病死一身隨並討賊持刀見並輙拜並未忍殺㑹並􅁀疾卒􅀇殯歛並於器中見勑書還便自殺耳王隱晉書曰何曽爲司徒與髙鄭二公將見文帝曽在中央獨先拜漢晉春秋曰晉公旣進爵爲王太尉王祥司徒何曽司空荀顗並請詣謁顗謂祥曰相王尊重何侯旣巳書敬今日便當相率而拜無所疑也祥曰相國位􅀔誠爲尊貴然要是魏之宰相吾等魏之三公公王相去一階而巳班例大同安有天子三司可輙拜人者損魏朝之望􅃜晉王之德君子愛人以禮吾不爲也及入顗遂拜而祥獨長揖帝曰今日方知君見顧之重矣晋書曰潘岳性輕躁趍丗利與石崇謟事賈謐毎候其出與崇輙望塵而拜晉中興書曰王猛少貧賤鬻畚爲事嘗至洛陽貨畚有一人於市買其畚云家近在此也隨我去取直猛隨去忽至深山中此人語且住樹下當先啓導湏􅁷猛進見一公踞胡牀髦悉白侍從十許人有一人引猛云大司馬公猛因拜老公公曰王公何縁拜即十倍酬畚直遣人送猛出山旣出嶺視乃嵩髙山晉中興書曰顯宗嘗使太常丞張放歸胙於王導詔無下拜導不敢當辭以疾􅀄顯宗㓜冲見導􅁪拜晋諸公讃曰司馬駿鎮西戎旣薨毎見其碑讀者無不拜之後魏書曰沈文秀爲慕容白曜攻之長圍數匝自夏至秋始剋文秀取所持節衣冠儼然坐齊内亂兵入文秀厲聲數四身見執而祼送于白曜曜左右令拜文秀曰各二國大臣無相拜之禮曹䐽別傳曰沛國桓邵亦輕太祖邵避難交州得出首拜謝於庭中太祖曰跪可解死耶遂殺之郭太別傳曰郷人見太皆於床下拜鄭􅀇別傳曰建安元年自徐州還髙宻道遇黄巾賊數萬人見玄皆再拜樊英別傳曰英嘗病卧便室中英妻遣婢拜問疾英下牀荅拜陳寔問英何荅婢拜英曰妻齊也共奉􅀕祀禮無徃而不反荀氏家傳曰魏文帝在東宫武帝謂曰荀公爲人之師表也汝當盡禮敬之荀曽病丗子問疾拜牀下三輔決録曰孟他字伯郎靈帝時中常侍張讓專朝譲監奴典任家計他殫家財賂監奴共結親厚積年衆奴心慙問他所欲他曰欲得汝曹拜奴等皆許諾時賔客求見譲者門車常數百乗或累曰不得過他最後徃眾奴以其至皆迎而拜之將他車􅀐入衆人大驚謂他與讓善爭以珎物遺他他得盡以賂讓讓大喜後以蒲陶酒遺讓即拜梁州刺史燕書曰皇甫眞字楚季鄴城失守􅁗主􅀄入臨前殿醼羣臣數百人皆集東掖門見待中王猛來眞等望馬首拜之明日更見眞乃卿猛猛曰昨拜朝卿何恭慢之相違眞荅曰卿昨爲賊朝是國士吾􅁳拜賊而卿國士亦何所怪也猛嘉之韓子曰禮者所以貌情也中心懷而不諭故疾趍卑拜以明之燕丹子曰田先生見太子太子側階而迎迎而再拜賈􅁩書曰受計之禮主所親拜者二聞生民之數則拜之聞登榖則拜之郭子曰陶公自上流來陶折字士衡也赴􅂫峻之難含怒於􅁃公􅁃公謂必戮巳進退無計温父乃勸詣陶公卿但俓拜必無他我爲卿保之􅁃殊未了而不得不徃乃從温言詣陶至便拜􅁃風姿雅潤陶見拜不覺自起止之曰􅁃元規何縁拜陶士衡江統作謁拜議曰以爲諸郡吏都無太守伯叔兄敬者近臣君服斯服然則朝幹佐以下左右者可從君而拜君所拜統士古者見賔主皆拜今自非君臣上下則不拜君之新親者唯幹佐小吏則可君拜斯拜矣君之諸父無道謂之事甲辰儀臣見諸王直恭敬而巳無鞭板拜揖雖於皇帝爲諸祖諸父其義皆同又河南河内諸郡吏前後亦爲太守伯叔兄謁拜者其比甚衆矣尚書逸令曰卞壼等奏三代以來記籍禮經無拜臣之制唯漢成帝拜張禹庸主凡臣不足爲􅁤先帝拜司徒導以元皇興自蕃國布衣之交拜在人臣之故師而不改以君拜臣大教有違事應改正太后又詔曰帝㓜少冝一遵先帝壼等又固争云云臣期不奉詔又反覆乃從外奏成帝拜王公時議曹疑於儀注􅀶士杜瑗及陳舒議禮無以君拜臣下也小㑹崇謙非臣下所知無在儀注之制張闈受侯不拜國太妃表云昔爲晉陵内史在東海國封内時丗孫㓜小太妃秉政前内史遷授除拜日及當之官皆上䟽拜閤執純臣之禮闓自以雖爵有五等然執珪受瑞俱爲列國無相臣之體又晉制拜列侯爲相内史於天朝不曰陪於蕃國不稱臣臣以從古則懼有行簡之譏隨俗又恐失君臣之訓經國垂範冝有定淮乞出臣表下八座叅詳荅報唐書曰田承嗣方跋扈佷傲無禮郭子儀嘗遣使至魏州承嗣輙望拜之指其膝謂使者曰兹膝不屈於人今爲公拜太平御覽卷第五百四十二
