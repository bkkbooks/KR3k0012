body:
  text: 居處部六臺下王子年拾遺記曰􅁗始皇起雲明臺窮四方之珎木捜天下之工南得煙丘碧桂酈水然沙賁都朱泥雲岡素竹東得䓗巒綿栢縹穟龍杉雲梓寒河星柘西得漏海浮金狼淵羽壁滌嶂霞素寘阜乾􅃮隂坂文杞褰流黒魄暗海香瓊瑶異是集有二人皆騰虚縁木揮斤斧於空中子時興功至午時巳畢􅁗人謂之子午臺又云二客於子午之地各起一臺又曰燕昭二年海人乗霞舟以雕壼盛數斗膏以獻王王坐通雲堂亦曰通霞之臺以龍膏爲燈光耀百里煙色丹紫國人望之咸言瑞光也遥拜之燈以火浣布爲􅆞山西有照石去石十里見人物之影如鏡焉碎石片片皆能照人而質方一丈則重一兩昭王舂此石爲泥泥於通霞之臺與西王母遊居此臺上常有鍾鼓琴瑟鳴神光照耀如日月之出臺左右種􅁪春之樹葉如蓮花芬芳似桂花隨四時之色又曰魏明帝即位五年起靈禽之園方國所獻異鳥殊獸皆畜此園也時昆明國貢嗽金鳥國人云其地去涼州九千里出此鳥形如雀色黄毛羽柔宻常翶翔海上羅者得之以爲至瑞聞大魏之德􅀍於荒逺故越山航海來獻大國帝得此鳥畜於靈禽之園飴以真珠飲以􅀛腦鳥常吐金屑如粟鑄之以爲器服昔漢武時有獻大雀此之􅀋也此鳥畏雪霜乃起小屋以處之名曰辟寒臺皆用水精爲户牖使內外通光而風露􅁪隔宫人爭以鳥所吐之金用飾􅁫珮謂之辟寒金宫人相嘲曰不服辟寒金郍得帝王心於是媚惑者亂争此寳以爲身飾及行卧皆懷挾以要寵也魏代䘮滅珎寳池臺鞠爲煨燼􅎳金之鳥亦自髙翔也又曰周靈王二十三年起昆昭之臺一名宣昭之臺聚天下異木神工得崿谷隂生之樹其質千尋文理盤錯以此一木臺用足矣其木有龍虵百獸之形篩水精爲泥臺髙百丈􅂛之以望雲色時有萇引能招致神異王登臺忽見二人乗空而至乗遊飛之輦駕以青螭其衣皆縫緝毛羽王即迎之上席時天下大旱地裂木然一人先唱能爲霜雪引氣一噴則雲起雪飛坐者皆口禁井池氷堅可琢又設狐腋素裘紫羆大褥褥是西域所獻施於臺上又一人以指彈席上而暄風入室裘褥皆弃臺下又曰魏文帝築臺基髙四十丈列燭置於臺下名曰燭臺逺望如列星之墜也以處美人薛靈芸焉又曰魏明帝起凌雲臺躬自掘土羣臣皆負畚鍤時隂寒役者多死髙堂隆等諌之不聽累年而畢又曰魏文帝時黄星炳夜乃起畢昻臺以祀星又曰吴主潘夫人之父坐法夫人輸入織室夫人容態少儔爲江東絶色同幽者百餘人有司聞於吴主使圖其容貌夫人憂慼不食減痩改形工人冩其眞狀以進吴主吴主見圖而嘉之以琥珀如意撫桉則折嗟曰此神女也愁貌尚能感人呪在懽樂乃命雕輪就織室納于後宫果以姿色獲寵毎與夫人遊昭宣之臺恣意幸適旣盡酣醉唾於玉壼中使侍婢冩於臺下得火齊指環即挂石榴枝上因其處起臺名曰環榴臺時有諌者云今吴蜀争雄還劉之名特爲妖乎權乃翻其名爲榴環臺也又與夫人遊釣得大魚吴王喜而夫人曰昔聞泣魚今乃爲喜有喜必憂以爲深誡至末年漸相譛毀稍見離退時人謂夫人知幾之神矣釣臺今猶基存漢武帝内傳曰鈎弋夫人謂帝曰妾相運正應爲陛下生一男男年七歳妾當死矣今年必不得歸願陛下自愛言終遂卒旣殯屍香聞十餘里因葬之雲凌帝甚哀悼又疑其非常人乃發塚開視空棺無屍唯衣履存焉乃起通靈臺於甘泉常有一青鳥集臺上徃來至宣帝時止矣又曰漸臺髙三十丈南有辟門三層内殿堦陛咸以玉爲之鑄銅鳯皇髙五丈飾以黄金於樓屋上洞􅁳記曰武帝起招仙之臺於明庭宫北明庭宫者甘泉之别名也於臺上撞碧玉之鍾掛懸􅀺之磬吹霜滌之箎唱來雲依日之曲使臺下聽而不聞管歌之聲又曰太􅀄二年起甘泉望風臺於臺上得珠望之如照且因名照月珠又曰建元二年帝起騰光臺以望四逺常有飛光如星集於臺上亦曰經星臺又曰帝初起神明臺時掘地入三十丈得泉水色黄傍有人居無日月光明晝夜以火照中有人食土飲水服赭布之衣漢人問汝何時居此荅曰啇王無道使兆民入地千丈求青堅之土以作瓦起瑶宫金堂二人皆以繩縋入地裏􅀒畚器取土多有壓䧟死者今猶二人在耳漢人問何得獨存荅曰我以玉爲衣玦金爲環身有金玉故心氣不滅漢人問汝欲更出爲人否荅曰食􅁟飲泉與螻蟻爲伍寧望日月乎乃引出三日自死骨肉靡靡成􅁅唯心如彈丸大堅如石以物扣之則是乾血耳述異記曰郭景純注爾雅臺今在夷陵郡又曲阜縣南十里有孔子春秋臺又曰吴王夫差築姑蘇臺三年乃成周環詰屈横亘五里崇飾土木殫耗人力宫妓數千人上别立春宵宫爲長夜飲造千石酒鍾又作大池池中造青龍舟舟陳妓日與西施爲水嬉又於宫中作靈館館娃閤銅溝玉檻宫之欄檻皆珠玉飾之吴旣敗越王勾踐於㑹稽山上地方千里勾踐得范蠡之謀躬教民以耕桑延四方之士作臺于外而館賢士㑹稽之上有越臺又曰晉永嘉之亂旣過江諸公主不得隨去安陽公主與平城公主等奔入兩河界悉爲民家妻常怏怏不恱故有思郷之志村人感之共築一臺以居之謂之公主望郷之館至今巋然王㓪懷舊賦云將軍出塞之臺公主望郷之館是也漢武帝遣將軍王濆戍邊及帝崩王莽􅆲逆濆與莽有􅂩遂留不敢歸因亡入胡中士卒相率築臺爲望郷之處又曰㑹稽山有虞舜廵狩臺臺下有望陵祠帝舜南廵葬於九疑山民思之故立祠中都郭門古宫存焉宫前有堯臺舜館銘記皆古又曰中山有韓夫人愁思臺望子陵也又曰燕昭王爲郭隗築臺今在幽州燕王故城中土人呼爲賢士臺亦謂之招賢臺郡國志曰濮州壁玉臺穆天子爲盛􅁎所造也今旁地猶多珉石又曰汝隂縣冨陂城即詩之汝墳也俗謂之女郎臺又曰魏硯子臺云是張儀冢似硯也又曰曹州麟城南有望麟臺園客祠庭種香草有五色神蛾得六大蠒􅁝六十日始盡處又曰洺州温明臺後漢世祖晝臥此殿耿弇入造床下齊勸即位處又曰滎陽縣有太武城髙祖與項氏各在一城東城有髙壇即項羽置太公於上處今名項羽堆亦呼爲太公臺又曰金河府青臺方山北五里文明太后􅁪於六宫遊戯因歌曰青臺雀青臺雀縁山採花額頸着其曲並在大樂部又曰金河府自平城遥登臺出渇鉢口梁元帝横吹詩曰朝登青陂道暮宿白登臺天女神即生後魏始祖神元也又曰衛州苑城北十四里沙丘臺也俗稱姐巳臺去二里有一臺南臨淇水俗稱爲上宫也又曰鄆州湏昌縣有犀丘城青陵臺宋王令韓憑築者又曰南頓縣有光武臺應璩宅在其側又曰洛陽陽子臺在陽城東三十里陽陵子隱處洛水昔王子晉與浮丘公同遊受玉鷄之瑞水亦宓妃之所在也又曰􅁈句縣昌都城吕后追尊父吕公爲宣王都此有吕后臺西有辟陽侯臺閤道相連基址見存又曰洛陽鷄臺有劉曜試弩棚夕陽亭賈充出鎮長安百僚餞送於此又曰鄭州故魏任城王臺下池内有漢時鐵鍾長六尺入地三尺頭自正爲晉氏重興之瑞今不知所在東南有空侯城鄭衛之音也又曰酸􅀥縣韓徙都於此有冰井臺五馬泉又曰衛州有鳯皇臺又曰荆州龍陂山有楚王臺又曰濮州羊角城陳思王愁臺基甚髙又曰夏州朔方郡赫連㪍㪍僣號築土起真珠樓沖天臺又曰兖州有娥皇女英臺又曰􅁪州野望臺趙武靈王以登髙望亦曰寒臺又曰荆州華容縣東六十里有章華臺楚靈王築臺東即荆臺縣也又曰并州榆次縣鑿臺即韓殺智伯於鑿臺之中又曰木客山吴王遣木客入山求木不得工人憂思作木客吟一旦神木自生長二十丈作姑􅂫臺又曰鄧州皇后城即迎隂后處城西張平子讀書堂又曰毫州城父縣老子祠頼郷曲仁里廟内有八公臺九柱樓􅀞東王母西王母又有静念樓又曰蒲州􅃖尤城鳴條野禹娶塗山女思戀本國築臺以望之謂之青臺上有禹祠下有青臺驛又曰汴城上有列仙吹臺西有牧澤甬道二百里漢梁孝王所造今謂之赤堤城東有繁臺本吹臺也云蒼頡師子野所造後有繁姓居側因名焉西有崇臺即顔率云蟬臺之下沙海之上是也又曰許州有丹書臺魏文帝受禪有黄鳥衘丹書集此臺又曰衛州鹿臺在預城内紂自投火處紀年曰武王檎紂於南單之臺蓋鹿臺之異名也糟丘酒池去城南一里基跡猶存水經注曰固安縣金臺陂東西六十里南北五十歩側陂西北有釣臺髙十丈方可四十歩陂北十餘歩有金臺金臺髙上東西八十許歩南北加减髙十餘丈昔慕容垂之爲范陽也戍之即斯臺也有小金臺臺北有簡馬臺並悉髙大秀峙相對翼臺左右水流經通長廡廣宇周旋波浦棟渚咸淪柱礎尚存是基構可得而尋訪諸􅂄舊咸言昭王禮賢廣延方士至如郭隗樂毅之徒鄒衍劇辛之儔宦遊歷􅀃之民自逺而届者多矣不欲令諸侯之客伺􅂩燕􅀖故脩建下都館之南垂言燕昭創之於前子丹踵之於後故彫牆敗館尚傳俊列之名雖無經紀可慿察其古跡似符宿傳矣又曰鳯谿水側有鳯皇止焉故謂之鳯皇臺又曰河水南至華隂又東北玉澗水注之南出玉溪北流經皇天固三靣壁立髙千許仞漢世􅀕天於其上因名之爲皇天固上有漢武帝思子臺及泉鳩里加兵仞於太子者上憐太子無辜乃作思子宫爲歸來望思之臺於湖師古曰言巳望而思之無太子之魂歸來也其在今湖城縣之西閿郷縣之東基阯猶存也天下聞而悲之又曰睢陽城故宫東即梁之舊池也周五六百歩水列鈞臺池東又有一臺世謂之清冷臺北城慿隅又結一池臺晉灼曰或􅀃平臺在城中東北角亦或言兎園在平臺側如淳曰平臺離宫所在今城東二十里有臺寛廣而不甚極髙俗謂之平臺余桉漢梁孝王傳稱王以功親爲大國築東苑方三百里廣睢陽城七十里大治宫室爲􅃨道自宫連屬於平臺三十餘里􅃨道自宫東出楊州之門左陽門即睢陽東門也連屬於平臺則近矣屬之城隅則不能是知平臺不在城中也又曰景􅂛臺劉表之所築也表性好鷹毎登此臺歌野鷹自來又曰睢陽城中有掠馬臺東有一臺謂之清冷臺又曰長平城在上黨郡南􅁗壘在城西􅁗抗趙衆收頭顱築臺於此崔嵬桀起今乃號曰白起臺山海經曰沃民國有軒轅臺又曰帝嚳堯丹朱帝舜各二臺臺四方在崐崘東北列仙傳曰蕭史者􅁗穆公時人善吹蕭能致孔雀白鵠穆公有女字弄玉好之公以妻焉遂教弄玉作鳯鳴居數十年吹似鳯聲鳯皇來止其屋爲作鳯臺夫婦止其上數年皆隨鳯飛去􅁗爲作鳯女祠於雍宫時有簫聲焉成都記曰望郷臺蜀王秀所築也又曰思妻臺在梓潼縣五丁於此山㧞虵山崩殺五丁并殺􅁗王女因名之三輔宫殿簿曰長樂宫有臨華臺神仙臺西征記曰揚州雷陂有臺髙二丈南兖州記即吴王濞之釣臺也地理志曰北地郡有之囬臺京西北四百里嵩髙山記曰山有玉女臺云漢武帝見三仙玉女因以名臺益州記曰鴈橋東有嚴君平卜處土臺髙數丈南雍州記曰髙齊之後有堂堂西有射堂五間射堂南有大池池上有臺名曰樂喜臺荆州記曰江陵縣東有天井臺飛軒􅀌暎背邑靣河實郊􅄤遊憇之佳處也襄􅃆記曰襄縣南五里鳯林山側宋隋王劉誕鎮北有龍兒見此池中於後雍州刺史韋叡於此立放生臺越絶書曰夫差起姑􅂫之臺三年聚材五年乃成髙見三百里太史公登之以望五湖伏琛齊地記曰平業城西北八十里有平望亭亦古縣也或云秦始皇爲望海臺述征記曰陵雲臺在明光殿西髙八丈累塼作道通至臺上登􅂞迥眺究觀洛邑曁南望少室亦山丘之秀極也又曰蠡臺梁孝王所築於兎園中廻道似蠡因名之太平御覽卷第一百七十八
