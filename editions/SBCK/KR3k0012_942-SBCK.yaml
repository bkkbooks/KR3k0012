front:
  text: 太平御覽卷第九百四十二
  hash: sha256:6fead565c4c345fda2f41a5969303a4f15a277319f985ddfc130db6c3dd7c026
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_942-1a}
body:
  text: 鱗介部十四蛤蛺變三蝬車螯移角姑勞羊蹄蛤蟍蘆雉蚶烏頭下來􅒕越王蠣蜆蟹蛤易進卦驗曰立冬鷰雀入水爲蛤禮記月令曰季秋之月雀入大水爲蛤汲冡周書王㑹曰東越海蛤東越則海際蛤文蛤三國典略曰周天和元年夏齊冀州人於蚌蛤中得瑶環一􅃗又曰徐之才􅀄遷豫章王綜國常侍隨綜入北有一人患足跟痛諸醫咸莫能識之才視之曰蛤精疾也得之當由乗船入海垂脚入水中疾者曰實曽如此之才爲剖之得蛤子二大如榆莢淮南子曰土龍致兩鷰鴈代飛鷰春南而鴈秋北也蛤䖴珠􅀛與月盛衰吕氏春秋曰月者羣隂之夲月望則蚌蛤實羣隂盈月晦則蚌蛤虚羣隂湫夫月形于天而羣隂化乎淵漢武帝内傳曰西王母云仙家之藥有白水靈蛤汝南先賢傳曰周爕字彦祖好潜靖養志唯典籍是樂有仙人草廬廬下有陂魚蛤生非身所耕則不食也南越志曰凢蛤之屬開口聞雷鳴不復閉雲南記曰新安蠻婦人於耳上懸金環子聮貫瑟瑟帖於髻側又繞􅆎以螺蛤聮穿繫之謂爲珂珮􅀶物志曰東海有蛤鳥常啖之其肉消盡殻起浮出更薄在沙中岸邊潮水往來碏薄蕩白如雪入藥最精勝􅊥取自死者崔豹古今注曰島鴈常在河邊沙上食沙石悉皆銷爛唯食蛤不銷隨其糞出用以爲藥倍勝常者夲草經曰文蛤表文味鹹無毒主際隂蝕惡創五痔大孔盡血生東海左思賦曰蚌蛤珠胎與月虧全蛺爕臨海水土物志曰蛺爕似蛤如大三蝬音宗臨海水􅁟物志曰三蝬似蛤車螯沈約宋書曰廬陵王義眞出爲南豫州刺史劉湛爲長史義眞出時居髙祖憂使帳下備膳湛禁之義眞乃於齋内別立厨帳會湛入煗酒炙車螯湛正色曰公當今不冝有此設義眞曰且甚寒一盃酒亦何傷酒旣至湛因起曰旣不能以禮自處又不能以禮處人謝靈運荅弟書曰前月十二日至永嘉郡蠣不如鄞縣車螯亦不如北海移角臨海水土物志曰移角似車螯角移不正名曰移角姑勞臨海水􅁟物志曰姑勞如車螯而殻薄羊蹄臨海水土物志曰羊蹄似蚌味似車螯羅江小盧有之蛤蟍宋書曰王融􅀄爲司徒法曹詣王僧祐因遇沈昭略未相識昭略屢顧眄謂主人曰是何年少融殊不平謂曰僕出於扶桑入於􅊙谷照曜天下誰云不知而卿此問何也昭略云不知許事且食蛤蟍融曰物以羣分方以􅀋聚君長東隅居然應嗜此族淮南子曰􅀂士方捲􅀛殻而食蛤蟍抱朴子曰􅀂士所食此必草也又海中自有蛤蟍螺蚌之􅀋未加煑凢人所不能噉况君子􅀂士乎蘆雉臨海水􅁟物志曰蘆雉似蛤蟍殻小薄耳蚶火甘切唐書曰元和中嶺南節度使崔詠卒宰臣奏擬皆不可上謂裴度曰甞有諌進海蚶淡菜者詞甚忠正卿可求此人與之度出以訪人或有言孔戣諌者度即日以聞乃命之廣志曰巨延州以蚶與行估􅐙昜臨海水􅁟物志曰蚶側徑四尺也盛弘之荆州記曰始安郡駭鹿山山上有石室鑿内輙得骨并􅀗蚶嶺表録異曰瓦屋子盖蚌蛤之􅀋也南中舊呼爲蚶音憨子頃因盧鈞尚書作鎮遂改爲瓦屋子以其殻上有稜如瓦壠故名焉殻中有肉紫色而滿腹廣人尤重之多燒以薦酒俗呼爲天臠炙喫多即壅氣背􅈩煩疼未測其本性也烏頭臨海水土物志曰烏頭似蚶下來􅒕許咸均似蛤出海中臨海水土物志曰下來􅒕雖似烏頭各自有種又曰􅒕蛤有似烏頭越王臨海水土物志曰越王形似􅒕殻赤尾如人爪形蠣梁書曰何㣧􅀄侈於味食必方丈後稍欲去其甚者猶食白魚䱉市漁切脯糖蟹以爲非見生物疑食蚶蠣使門人議之學生鍾玩曰䱉之就脯驟於屈中蟹之將糖躁擾彌甚仁人用意􅀷懐如怛至於車螯蚶蠣眉目内闕慙渾沌之竒獷殻外緘非金人之愼不悴不榮曽草木之不􅀂無香無􅆨與瓦礫其何筭故冝長充庖厨永爲口味竟陵王子良見玩議大怒汝南周顒與㣧書勸令食菜茅君内傳曰欲合九轉先作神金取東海左顧牡蠣凢六物令分等各擣三萬杵異物志曰古賁灰牡蠣殻臨海水土物志曰蠣長七尺南越志曰南上謂蠣爲蠔甲爲壯蠣合澗洲圎蠣土人重之語曰得合澗一蠣雖不足豪亦可以髙也永嘉郡記曰樂成縣新溪口有蠣嶼方圎數十􅅿四靣皆蠣其味偏好謝靈運遊名山志曰新溪蠣味偏甘有過紫溪者嶺表録異曰盧亭亭盧循遺􅀋也循昔據廣州旣敗餘言奔於海島野居唯食蠔蠣疊殻爲牆壁又曰蠔即牡蠣也其􅀄生海島邊如拳石四面漸長有髙一二丈者巉巖如山毎一房内蠔肉一片隨其所生前後大小不等毎潮來諸蠔皆開房伺蟻入即合之海夷盧亭亭者以斧揳取殻燒以烈火蠔即啓房挑取其􅁏貯以小竹筐趂虚市以易米盧亭好酒以蠔􅁏換酒也蠔􅁏大者爲灸小者炒食肉中有滋味食之即甚壅腸胃蜆戸典切爾雅曰蜃小者曰珧郭璞注曰新燕蛤也江東呼爲蜆也蟹廣雅曰蟹蚭音尼也其雄曰蜋螘其雌曰轉帶山海經曰大蟹在海中盖十里之蟹又女丑有大蟹廣千里汲􅃁周書王㑹曰成王時海陽獻蟹大戴禮曰蟹二螯八足非鱣之穴而無所􅀉托者心躁也孫卿子同禮記檀弓下曰成人者兄死而不爲衰者聞子皐將爲成宰遂爲之衰成人曰蠶則績而蟹有筐范則冠而蟬有緌兄則死子臯爲之衰孝經援神契曰蟹二螯兩端傍行螯猶兵也小蟲而欲兩端自衛故使傍行也晉書曰解系坐免官以白衣還第闔門自守及張華裴頠之􅀍誅也倫秀以􅀫憾収系兄弟梁王彤救系等倫怒曰我於水中蟹且惡之况此人兄弟輕我􅁘此而可忍孰不可忍彤苦爭之不得遂害之又曰劉聦左都水使者襄陵王攄坐魚蟹不供斬於東市三國典略曰周永定元年夏四月齊主禁取蟹蛤之􅀋唯許私家捕魚淮南子曰夫釋大道而任小數無以異於使蟹捕䑕蟾諸捕蚤不足以禁姧塞邪亂乃逾滋以艾灼蟹筐上内置穴中廼􅀬走窮穴適能擒一鼠又曰礠石引鐵蟹之敗漆置蟹􅃮中則漆敗也雖在明知弗能然也抱朴子曰􅀂蟹之化􅃮麻之壊酒此不可以理推者也又曰山中稱無腹公子者蟹也又曰兵地生蟹者冝急移軍太一在玉帳之中不可攻也郭子曰畢茂丗云一手持蟹螯一手持酒盃拍浮酒池中可了一生哉國語曰越王召范蠡而問焉曰與子謀呉子未可也今其稻蟹食不遺種其可乎范蠡對曰天應至矣謂稻蟹人事未也勤湏厲志丗􅀃曰蔡司徒渡江見蟛蜞大喜曰蟹有八足加以二螯令烹之旣食委頓吐下方知非蟹後向謝仁祖􅀃此事謝曰卿讀爾雅不熟幾爲勤學死劉孝標云大戴礼􅂆斈篇日蟹八足二螯非蛇蛆之穴無所􅀉托者用心躁也故爾雅云螖小者勞即彭螖也似蟹而小按今蜞小於蟹而大於螖爾雅所謂螖澤者也然此三物皆八足二螯狀甚相􅀋蔡謨不精其大小食而致􅁦故云讀爾雅不熟也永嘉郡記曰安國縣有山􅀑形體如人而一脚裁長一尺許好噉鹽伐木人鹽輙偷將去不甚畏人人亦不敢伐木犯之即不利也喜於山澗中取石蟹伺伐木人眠息便十十五五岀就火邊跂石灸噉之甞有伐木人見其如此未眠之前痛燃石使􅀬羅置火畔便佯眠看之湏􅁷魑出悉皆跂石石􅀬灼之跳梁叫呼罵詈而去此伐木人家後􅀍燒委頓慱物志曰南海有水蟲名剻蛤之􅀋也其中有小蟹大如揄莢蒯開甲食則蟹亦出食蒯合甲蟹亦還入爲蒯取以歸始終死不相離又曰蟹􅃮相合成水神仙服食方云又曰秋蟹毒者無藥可療目相向者尤甚􅀇中記曰天下之大物北海之蟹舉一螯能加於山身故在水中淮南万畢術曰燒蟹致䑕搜神記曰晉太康年中㑹稽郡蟛蜞及蟹皆化爲䑕甚衆覆野爲災食稻述異記曰出海口北行六十里至騰嶼之南溪有淡水清澈照底有蟹焉筐大如笠脚長三尺宋元嘉中章安縣民屠虎取此蟹食之肥美過常虎其夜夣一少嫗語之曰汝噉我知汝尋􅀍噉不屠氏明日出行爲虎所食餘家人殯􅄟之虎又發棺噉之肌躰無遺此水今猶有大蟹莫敢復犯廣五行記曰元嘉中冨陽人姓王於瀆中作蟹断且徃視之見一材頭長二尺許在断中而裂開蟹出都盡乃治断岀材岸上明旦徃視之見材復在断中而裂開如前王又治断出材明晨徃視所見如􅀄王疑此材妖異乃取籠中檐歸去家一二里聞籠中窣動聲王生顧見向材叚變成一物人面猴身一手一足語王生曰我性嗜蟹比實入破君斷食蟹以此相􅀒望君恕我我是山神當相祐助王曰汝犯暴人罪自應死何以多言此物曰君何姓名頻問不已王終不荅去家轉近曰旣不放我又不告我姓名當復何許王至家以火焚之土俗謂之山􅿙知人姓名則能爲傷人耳又曰軍行地無故生蟹者冝急移吉蟹魚之􅀋水失其性則有此孽嶺南異物志曰甞有行海得洲渚林木甚茂乃維舟登岸㸑於水傍半炊而林没於水遽断其䌫乃得去詳視之大蟹也嶺表録異曰水蟹螯殻内皆鹹水自有味廣人取之淡煑吸其鹹汁下酒黄膏蟹殻内有膏如黄􅂫加以五味和殻煿之食亦有味赤母蟹殻内黄赤膏如雞鴨子黄肉白以和膏實其殻中淋以五味蒙以細麵爲蟹饆饠珎美可尚紅蟹殻殷紅色巨者可以裝爲酒盃也虎蟹殻上有虎斑可裝爲酒器與紅蟹皆産瓊崖海邊夲草經曰蟹味鹹治胷中邪氣􅀬結痛張敞集曰朱登爲東海相遺敞蟹報書曰蘧伯玉受孔氏之賜必及郷敞謹分斯貺于三老尊行者曷敢獨烹之太平御覽卷第九百四十二
