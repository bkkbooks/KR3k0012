front:
  text: 太平御覽卷第六百九十三
  hash: sha256:34b4082b63c87b2f318386ccbe8493d027496a01262442a0e0e80b180540fc83
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_693-1a}
body:
  text: 服章部十􅂁􅄄衫䄡䄖􅂁􅀃文曰以絮曰繭繭以緼曰􅂁禮記玉藻曰纊爲繭緼爲􅂁緼舊絮纊綿也釋名曰􅂁丈夫着下至跗者􅂁苞也内衣也論語曰衣弊緼􅂁與衣狐貉者立而不耻者其由也與詩曰豈曰無衣與子同􅂁史記曰􅁗相范雎與魏人湏賈有􅂩及賈使􅁗雎自稱張禄先生見賈寒取一綈􅂁以賜之及數其罪曰尓得無死者將以綈􅂁有戀戀故人之意漢書曰文帝使遺單于繡祫長襦錦祫􅂁各一續漢書曰􅀽安爲光禄勲至清鹿􅂁糲食又曰三老五更皆服都禄大􅂁又曰輿服志曰公主貴人妃以上嫁娶得服錦繡羅􅜄十二色緑􅂁東觀漢記曰明德馬右􅂁極麄踈諸王朝望見反以爲綺華矯後漢書曰藥崧者家貧爲主無􅀍糟食自此詔給帷􅀍皂􅂁􅀽山松後漢書曰靈帝欲以羊續爲太尉時拜三公者皆輸東園禮錢千萬中使取之續乃舉緼􅂁以示之曰臣之所資惟斯而巳故不登公位古今善言曰續出黄􅁓􅀘􅂁以示使人時人謡曰天下清苦羊續祖又曰桓鸞字始春焉弟也少立志行緼􅂁糟食不求盈餘以濁丗耻不肯仕魏略曰薛夏字宣聲黄􅀄中爲祕書丞帝與夏推論書傳未甞不終日也帝見其衣薄解所御􅂁賜之蜀志曰彭羡字永年姿性驕慠多所輕忽唯敬同郡􅁗安薦之於太守許靖曰􅀼見處士綿竹􅁗安應山甫之德履雋生之直枕石漱流吟詠緼􅂁也王隱晉書曰江東賜凉州刺史張駿真金印大􅂁又曰鄭冲以儒雅爲德莅職無幹局之譽簞食緼􅂁不營資産丗以此重之又曰惠帝自鄴還洛陽賜中書􅁥盧士鸖綾􅂁一領又曰武帝賜桓伊錢百萬􅂁裹千端又曰慕容冲進逼符堅送一領錦􅂁遺冲詔曰古者交兵使在其間今送一􅂁以明夲懷齊書曰卞彬蚤虱賦序曰余居貧布衣十年不製一􅂁之緼有生所託資其寒暑無與易之爲之多病起居甚踈縈􅃦敗絮不能自釋梁書曰侯景將爲亂時謡曰青􅂁白馬壽陽來後景軍中悉着青􅂁景長乗白馬又曰臨賀王正德侯景之亂正德爲平北將軍屯朱雀航景王正德乃北向望闕三拜歔欷流涕引賊入宣陽門與景交揖馬上退據左衛府先是其軍普着絳􅂁􅂁裏皆碧至是悉反之賊以正德爲天子唐書曰武后出緋紫單羅銘􅁭背􅂁以賜文武臣其􅂁文各有炯戒諸王則飾以盤石及鹿宰相飾以鳯池尚書飾以對鴈左右衛將軍飾以麒麟左右武衛飾以對虎左右鷹對飾以鷹左右千牛餙以牛左右豹韜飾以師子左右金吾飾以象又銘其襟背作八字迴文焉又曰肅宗爲皇太子受􅁽當彼絳紗􅂁太子以爲與皇帝同稱辭不敢當下百官議帝手勑改爲米明服又曰薛平能守法度理身儉薄一緑􅂁十年不易恩加朱紱然始解去莊子曰曽子居衛緼􅂁無表十年不制衣墨子曰楚莊王鮮冠緼組纓絳衣􅀶􅂁以理其國政也􅀃苑曰子思居衞緼􅂁無裏田子方遺狐白之裘恐其不受謂之曰吾假人遂忘之子思竟不受鹽鐵論曰原憲之緼􅂁賢於季孫之狐狢又曰倪寛練袍衣􅀂僕妾食􅀂庸夫東宫舊事曰太子納妃有絳綾􅂁一領漢武内傳曰上元夫人降武帝服赤霜之􅂁雲綵亂色非錦非繡不可得名神仙傳曰太傅楊駿使人迎孫登共語不荅以􅃨布􅂁賜之受之出門從人借刀斷􅂁上下異處放駿門下又大讙斫刺當時人謂爲狂後乃知駿當誅斬其人王褒内傳曰真人將褒見太上文人着流霞羽􅂁芙蓉冠捜神記曰有談生者年四十無婦夜有女年十五六姿顔無􅀟來爲生妻經三年遂乃生一兒曰愼勿以火照我後三年可照耳生不能忍照之腰上肉如人腰以下但枯骨婦求去將生入華堂奥室以珠􅂁與之生至市賣􅂁睢陽王識是女􅂁収栲談生談生具對呼兒似玉女又曰郭璞每自爲卦知其㐫終嘗逢一趍走少年便脫青􅁝􅂁與之此人不解其意璞曰身命卒當在君手故逆相屬耳及當死果此人行刑傍人皆爲屬求利璞曰我常託之乆矣此人爲之歔欷哽咽行刑旣畢乃􅀃如此鄴中記曰石虎臨軒大㑹着丹紗􅂁鍾岏良吏傳曰􅀽彭字伯楚爲南陽太守政以清㓗糲食緼􅂁不改其操古樂府曰紵歌曰紵實如月輕如雲色似銀􅂁以光軀巾拂塵製以爲􅂁餘作巾古詩曰青􅂁似春草長條隨風舒魏武帝與楊彪書曰今遺足下貴室錯綵羅􅜄錦袍一領劉弘教曰將士寒窮者給一韋􅂁􅃨帽劉義㳟啓事曰詔旨以赦日所制綾紋綿布􅂁放生古具􅂁垂重賜劉謐之與天公牋曰體戰身噤脫衣凍坐頼詹公借􅂁南城送火􅄄􅀃文曰􅄄短衣也詩曰無衣無􅄄何以卒嵗􅄄毛布也左傳曰呉申叔儀乞食於公孫有山氏曰佩玉蘂􅀆余無繫之旨酒一盞􅀆余與􅄄之父睨之對曰梁則無矣麄則有之􅀂登首山以呼庚癸則乎諾軍中不得出粮牧爲私隠庚西方主殻癸北方主水傳言呉子不與士共飢渴所以亡韓詩外傳曰東郭書知宋之將亡故褰􅄄而過鬲其朝曰宋將有棘荆故褰􅄄而避之也居三年宋果亡史記曰五羖大夫鄙人也聞􅁗繆公之賢自粥􅁗客􅀍􅄄食牛朞年舉之牛口之下加之百姓之上又曰趙惠文王得楚和氏壁􅁗昭王遺趙王書願以十城易壁趙遣藺相如奉璧秦王無償城色相如使從者衣􅄄懷壁便道亡歸又曰婁敬齊人戍隴西過洛陽衣羊裘因齊人虞將軍求見上虞將軍欲爲易其衣不肯曰臣衣帛衣帛見衣􅄄衣􅄄見遂見上􅀃上西都長安漢書曰貢禹上書云年老貧窮家貲不滿萬錢妻子糠豆不贍短􅄄不完范曄後漢書曰張􅀇處徴有才畧以丗亂不仕司空張温數以禮辟不能致後温以車􅀐將軍出征凉州將行􅀇自廬􅀍􅄄帶索要說温不能用晉書曰皇甫謐字士安上䟽曰咎繇振􅄄不仁者逺矣陶潜五栁先生傳曰短􅄄穿結簞瓢屢空晏如也孝子曰聖人􅀍􅄄而懷玉墨子曰人不可衣短􅄄衣服不美身體從容不足觀也新序曰齊有婦人極醜無􅀟號無塩女行年四十無所容入衒嫁不售乃拂短􅄄自詣宣王曰願當君王盛顔符子曰有澤父者冠葭蘆之笠納蔍之屨莎裳􅄄衣裴淵記曰蠻夷取􅂖樹皮熟搥之以爲􅄄趙壹疾邪賦曰􅀔家多所冝欬唾自成珠􅀍􅄄懷金玉蘭蕙化爲芻古詩曰短􅄄中無絮帶斷續以䋲衫釋名曰衫芟也衫乗無䄂端也􅃭襠者當胷一當背也揚雄方言曰陳魏宋楚之間謂之䄡或謂之單􅃭沈約宋書曰徐湛之母㑹稽公主髙祖微時有納布衫襖等衣皆是武敬皇后手自作髙祖旣貴以此衣付公主曰後代􅀂驕奢不節者可以此示之又曰到漑爲建安太守任昉以詩贈之求二衫云䥫錢兩當一百代易名實爲惠當及時無待凉秋日漑荅云余衣本百結閩中徒八􅁞假令金如粟詎使廉夫貪宋書曰薛安都與魏戰魏多縱突􅀐衆軍患之安都怒甚乃脫兠鍪解所帶鎧唯着絳衲兩襠衫馬亦去具裝馳入賊陣猛氣咆􅣋所向無當其􅄡者又曰渴盤陁國土人翦髮着氊帽小䄂衣爲衫則開頸縫前齊書曰陽休之除散􅀐常侍􅁥修起居注頃之坐事左遷驍􅀐將軍衣兩襠文宣郊天百僚咸從休之爲驍􅀐將軍衣兩襠用手持白棓時魏収爲中書令嘲之曰義真服采休之曰我昔爲常伯首戴蟬冕今處驍游身􅀍衫甲允文允武何必減卿談􅀏晏然議曰服其夷曠唐書曰德宗在梁州地熱未給將士春衣上亦御夾服以視朝左右請御衫上曰從我者冬服未易我豈可獨衣衫乎將士聞之莫不流涕魏文帝别傳曰呉選曹令史長沙劉卓字德然病荒夢見一人以白越單衫與之言曰汝着衫汗火燒便㓗也卓覺果有衫在側汗輙火浣之晉惠帝起居注曰􅉖懷以體上白絹單衣一領􅀉與妃宋起居注曰太始二年御史丞羊希奏山隂令謝沉親憂未除常著青絳衲兩襠請免沈前所居官也晉東宫舊事曰太子納妃有白􅜄白紗白絹衫並紫玉緌祖台之志怪曰建康小吏曹著爲廬山使君所迎配以女婉著形意不安屢求諌退婉澘然流涕賦詩序別并贈織禈衫也劉敬叔異苑曰母丘儉征浟使王傾其東界父老云曽有破舡從漢海流得布衫身如中國人但兩䄂俱長三丈䄡䄖方言曰䄡䄖江淮之間謂之􅥗容常容反自􅀜而西謂之䄡䄖以布而無縁謂之藍縷漢書曰元始五年有一男子乗黄犢車建黄旐衣黄䄡䄖着黄慴詣北闕自謂衛太子又曰何並爲長陵令侍中王林卿通輕俠傾京師至寺拔刀刺其建鼓並追之卿迫窘乃令奴冠被其䄡䄖自代乗變服馳去東觀漢記曰耿純率宗族賔客二千人皆縑䄡䄖絺巾迎上又曰更始在長安自恣三輔苦之又所官爵多羣小或繡靣衣錦袴䄡䄖罵詈道路又曰王阜爲益州太守大將軍竇憲貴盛以絳􅄢䄡䄖與阜阜不受又曰叚潁滅羗詔賜潁錢十萬絳䄡䄖一領又曰延岑上光武皮䄡䄖􅀫下邑亭亭長白言睢陽賊衣絳􅄢檐今􅀫客疑是乃發卒來岑卧不動吏謝去邊讓别傳曰讓字文禮孔融薦讓於武帝曰邊譲爲九州衣􅀍則不足爲單衣䄡䄖則有餘恒譚新論曰余自長安歸道病􅂪絮􅀍􅄢䄡䄖􅀫下邑亭太平御覽卷第六百九十三
