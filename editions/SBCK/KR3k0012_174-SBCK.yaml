front:
  text: 太平御覽卷第一百七十四
  hash: sha256:26aeb34e877e40f31318d41e0a271ad3241c34dec97fe9b0d0ab17781f1a81b6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_174-1a}
body:
  text: 居處部二室􅀃文曰室實也釋名曰室實也物滿實其中也毛詩曰斯干宣王考室也築室百堵西南其户又曰如彼築室于道謀是用不潰于成鄭箋云如當路築室得人而與之謀所爲路人之意不同故不得成又曰彼姝者子在我室􅀆又曰宛其死矣他人入室尚書曰􅀂考作室旣厎法厥子乃不肯室矧肯構周禮冬官匠人曰內有九室九嬪居之外有九室九卿居之禮記檀弓下曰晉獻趙文子成室晉大夫發焉文子趙武也作室成晉君獻之謂賀之也諸大夫亦發禮以徃也長老曰美哉輪焉美哉奐焉歌於斯哭於斯聚國旋於斯文子曰武也得歌於斯哭於斯是全要領以從先大夫於九原也北面再拜稽首又曰室中不翔又曰儒有一􅅿之宫環堵之室左傳襄十五年宋向戍來聘見孟獻子尤其室曰子有令聞而美其室非所望也對曰我在晉吾兄爲之毀之重勞且不敢間又曰鄭伯有􅄝酒爲窟室而夜飲酒擊鍾焉朝至未巳朝者曰公焉在其人曰吾公在壑谷壑在窟室又曰吴公子光伏甲於窟室而享王掘地爲室又曰怒於室而色於市論語曰子游爲武城宰子曰汝得人焉耳乎曰有澹臺滅明者行不由徑非公事未甞至於偃之室也澹臺滅明者孔子弟子子游之同門也修身正行公事乃肯來我室得與之語耳非公事不肯來言無私謁國語曰智襄子爲室美智伯曰美則美矣抑臣亦有懼也襄子曰何懼對曰臣以秉筆事君記曰髙山峻原不生草木松栢之地其土不植臣懼其不安人也室成三年而智氏亡􅀃苑同又曰趙文子爲室斵其椽而礱之礱磨張老夕焉而見之不謁而歸文子駕而徃曰吾不善子亦告我何其速也對曰天子之室斵其椽而礱之加宻石焉諸侯礱之大夫斵之士首之首之斵其首也備其物也從其等禮也今子貧而忘義冨而忘禮吾懼不免何以敢告文子歸勿令礱也春秋繁露曰廣室多隂逺天地之和也故聖人弗爲漢書曰文帝徴賈􅁩入見上方受􅁵坐宣室因感􅀑神事與􅁩言之又曰武帝爲竇太主置酒宣室使謁者引內董君是時東方朔陛㦸殿下辟㦸而前曰董偃斬罪三安得入乎上曰何謂也朔曰偃以人臣私侍公主其罪一也敗男女之化而亂婚姻之禮傷王制其罪二也陛下冨於春秋積思於六經留神於王事馳騖於唐虞折節於三代偃不遵經勸學反以靡麗爲右奢侈爲務盡狗馬之樂極耳目之欲行邪狂之道經􅁋辟之路是乃國家之大賊人主之大蜮師古曰蜮魅也音或􅀃者以爲短狐非也短狐射工用於此不當其義今俗猶言魅蜮矣偃爲􅁋首其罪三也上黙然不應良乆曰吾業巳設飲後而自改朔曰不可夫宣室者先帝之正處也非法度之政不得入焉故􅁋亂之漸其變爲篡是以豎貂爲􅁋而易牙作患慶父死而魯國全管蔡誅而周室安上曰善有詔止更置酒北宫引董君從東司馬門入更名東交門蘇林曰以偃從北門入交㑹於内故以名之也賜朔黄金三十斤董君之寵由是日衰又霍光傳曰蓋主等奏廢光光聞止晝室中不敢入帝召入慰勉之注晝室近臣計晝之室師古曰雕晝之室也又曰孔光凡典樞機十餘年守法度修故事上有所問據經法以心所安而對不希旨苟合如或不從不敢強諌爭以是乆而安時有所言輙削草槀以爲章主之過以奸忠直人臣大罪也師古曰好求也好忠直之名也奸音干也有所薦舉唯恐其人之聞知沐日歸休兄弟妻子燕語終不及朝省政事或問光温室省中樹皆何木也晉灼曰長樂宫中有温文殿光嘿不應更荅以他語其不泄如是又曰京房所言屢中天子恱之數召見問房對曰古帝王以功舉賢即萬化成瑞應著末丗以毀譽取人故功業廢而致災異冝令百官各試其功災異可息詔使房作其事房奏考功課吏法上令公卿朝臣與房㑹議温室皆以房言煩碎上下相司不可許部刺史奏事京師上召見諸刺史令房曉以課事刺史復以爲不可行唯御史大夫鄭弘光禄大夫周堪初言不可後善之又漢三年魏王豹叛漢附楚漢使大將韓信擊虜豹薄􅁎内人傳詣雒陽織室漢王見薄􅁎内後宫幸之生文帝後漢書曰􅀕彤爲太僕從東廵狩過魯坐孔子講堂顧指子路室謂左右曰此太僕之室太僕吾之禦侮也又曰􅀽閎見時險亂而家門冨盛常對兄弟歎曰吾先公福祚後代不能以徳守之而􅔡爲驕奢與亂代爭權此即晉之三郤矣延熹末黨事將作遂散髮絶代欲投跡深林以母老不冝逺遁乃築土室四周於庭不爲户自牖納飲食東向拜母母思閎時徃就親母去便自掩閉兄弟妻子莫得見也及母殁不爲制服設位時莫能名或以狂生目之潜身十八年黄巾賊起攻没郡縣百姓驚散閎誦經不移賊相約語不入其閭郷人就閎避難皆得全免年五十七卒於土室又曰馬援之攻五溪蠻􅀄軍至下雋有兩道可入從壷頭側路近而水嶮壷頭山名也在今辰州沅陵縣東武陵記此山頭與東海方壷山相似因名壷頭從充則塗夷而運逺充縣属武陵郡帝􅀄以爲疑及軍至耿舒欲從充道援以爲費粮不如進壷頭搤其喉咽搤持蠻賊自破以事上之帝從援䇿三日進營壷頭賊乗髙守隘􅂳不得上㑹暑甚士卒多疫死援亦以中病遂困乃穿岸爲室以避炎氣武陵記曰壷頭山傍有石窟援所穿室也室内有蛇數百斛以大云是援之餘靈耳賊毎乗險鼔譟援曳足以觀之左右哀其壯意莫不爲流涕謝承後漢書曰陳蕃家居不好掃室賔客存之者或曰可一掃乎蕃曰丈夫當爲國家掃除天下豈徒室中晉書曰嵆含字君道祖嘉徐州刺史父蕃太子舎人含好學能屬文家在鞏縣毫丘自號毫丘子署其門曰歸厚之門室曰慎終之室宋書曰武帝六年五月初置隂室于覆舟山脩藏氷也唐書曰太子承乾盛農之時營造曲室累月不止左庶子于志寜切諌不從家語曰魯有獨處室者隣之􅊔婦亦獨處室夜􅁀風雨室壞趨而託之魯人閉户不受三輔黄圖曰明堂有十二室法十二月楊龍驤洛陽記曰顯陽殿北有避雷室西有禦龍室神異經曰西北荒有石室有百二十人同居齊壽千二百歳十洲記曰崐崘山上有瓊華之室淮南子曰西方有金室列仙傳曰彭祖殷大夫也歷夏至啇末號七百歳歷陽有彭祖仙室漢宫殿名曰神明臺武帝造髙五丈上有九室今人謂之九天臺武帝求神仙恒置九天道士百人洛陽宫室名曰洛陽有望舒涼室含章鞠室清暑涼室老子曰鑿户牖以爲室當其無有室之用管子曰堯有衢室之問者下聽於民也事具帝王部晏子曰景公謂晏子曰寡人欲朝夕相見爲夫子築室於閨内可乎對曰臣聞之隱而顯近而結唯至賢耳如臣者飾其容止待令猶恐罪戾也今君近之是逺之也又曰景公問晏子曰吾欲服聖王之服居聖王之室如此則諸侯其至乎對曰法其節儉則可法其服室無益也拾遺録曰老君居反景之室日與世人絶跡又曰燕昭王坐祇明之室􅂛於泉昭之館此館常有白鳯白鸞遞集其間列子曰虚室生白張湛注云夫視有􅀂虚者虚室而純白獨生莊子曰原憲居圜堵之室蓬户不完桑以爲樞瓮以爲牖上漏下濕匡坐而􅃶歌尸子曰厚積不登髙臺不處大室髙臺多傷大室多隂故皆不居吕氏春秋曰髙元作室又曰齊宣王爲大室大蓋百􅅿堂上三百戸三年而未成羣臣莫敢諌淮南子曰髙陽魋將爲室問匠人匠人對曰未可也木尚生加塗其木必將撓以生販任重塗今雖成後必將敗髙陽魋曰不然夫木枯則益勁塗乾則益輕以勁材任輕塗今雖惡後必善匠人窮辭無以對受命而爲之室其始成竘然善也而後果敗又曰崐崘有璿室又曰有石城金室又曰古者民澤處腹穴鑿崖岸之腹以爲宻室冬日則不勝雪霜霧露夏日則不勝暑􅀬蚊䖟聖人乃作爲之築土構木以爲室屋上棟下宇以蔽風雨以避寒暑百姓安之鹽鐵論曰匈奴織栁爲室旃席爲蓋􅀃范曰延陵季子遊于晉曰吾入其都新室惡故室羙故牆髙新牆庳是以知民力屈也又曰一室之中有王道焉父母之謂也故君正則百姓治父母平則子孫孝慈是以孔子家兒不知倨所以然者生而見善教也新序曰魯哀公爲室而大公儀子諌曰室大衆與人處則曄少與人處則悲願公適之也曰聞命矣築室者不輟明日又諌國小室大百姓必怨吾君諸侯聞之必輕吾國公曰聞命矣築室不輟明日又諌曰左昭右穆爲室而大以臨二先君無乃害於孝乎於是哀公毀室而止風俗通曰論語夫子宫牆數仭禮記季武子入宫不敢􅂘由是言之宫室一也􅁗以來尊者以爲常號乃避之耳室也實弟子職曰室中論語曰譬如牆由此言之宫其外室其内也楚辭曰砥室翠翹純曲瓊言卧内之室以砥爲壁干而滑澤以翠鳥之羽雕飾玉鈎以經衣曲瓊玉鈎也又曰鑿山楹而爲室下披衣於水渚霧濛濛其晨降兮雲裴斐而承宇又曰網戸朱綴刻方連冬有奥突奥復室夏大室夏有室寒事具居處部上又曰築室􅀆水中葺之以荷蓋又曰像設居室静閑安髙堂􅃉宇檻層軒潘岳狹室賦曰伊余舘之􅄶狹良窮弊而極微李尤室銘曰室以安寜􅃦息幽閑窒塞空隟遮遏風寒無曰寂寞屋漏昭然太平御覽卷第一百七十四
