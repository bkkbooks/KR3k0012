front:
  text: 太平御覽卷第六百七學部一
  hash: sha256:6c165b702f759511b24248f693610813929a9e55891eafc5a3cea3dd8525d109
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_607-1a}
body:
  text: 叙學易文言曰學以聚之問以辯之白虎通曰學之言􅁴也覺悟所不知也論語爲政云子曰學而不思則罔思而不學則殆又曰衛靈公曰君子謀道不謀食耕也餒在其中學也禄在其中又曰生而知之者上也學而知之者次也困而學之又其次也困而不學民斯爲下矣禮記學記曰君子之於學也藏焉脩焉息焉遊焉又曰善問者如攻堅木先其易者後其節目又曰學不學操縵不能安􅁌操縵雜弄不學􅀶依不能安詩􅀶依廣譬喻也又曰善學者師逸而功倍又從而庸之不善學者師勤而功半又從而怨之又曰凢學之道嚴師爲難師嚴然後道尊道尊然後民知敬學又曰善待問者如撞鍾叩之以小者則小鳴叩之以大者則大鳴又曰玉不􅅣不成器人不學不知道是故古之王者教學爲先也國語曰文公問元帥於趙襄曰郄縠可行年五十矣守學弥惇夫學先王之法義之府也又曰范獻子聘於魯問具敖山魯人以郷對獻子曰不爲具敖乎對曰先君獻武之諱也獻子歸徧戒其所知曰人不可以不學吾適魯而名其二諱爲􅀏焉唯不學也人之有學猶木之有枝葉猶庇䕃人而况君子乎家語曰子路見孔子孔子問曰何好曰好長劒子曰以子之能加之以學豈可及乎子路曰學豈有益哉子曰狂馬不釋䇿御狂馬者不得釋箠䇿也操弓不反檠弓不反檠然後可持木受繩則正人受諌則聖受學重問孰不順成子路曰南山有竹不揉自直斬而用之逹於犀革何學之爲孔子曰括而羽之鏃而厲之其入不益深乎子路拜曰敬受命又曰孔子謂伯魚曰吾聞可以與人而不倦者其唯學焉其容體不足觀也其勇力不足憚也其先祖不足稱也其族姓不足道也然而以顯聞四方流聲後丗者非學之効夫逺而有光者飾也近而愈明者學也譬之池也水潦注焉雚葦生焉雖觀之孰知其不源乎源衆流也言益者雖從外入及其用之誰知其非從巳出也又曰孔子兄子孔蔑者與宓子賤皆仕孔子問孔蔑曰女之仕何得何亡對曰所亡者三王事􅀂聾􅀂聾冝爲聾相因聾之也學焉得習是學不得明也奉禄少饘粥不及親戚是骨肉益䟽也公事多急不得弔死問疾是朋友道闕也孔子不恱往過子賤而問之對曰自來仕所得者三始誦之今得行之是學益明也奉禄􅀍親戚是骨肉益親也雖有公事兼之以弔死問疾是朋友信篤也孔子曰君子哉􅀂人魯無君子斯焉取斯大戴禮曰學不可以巳矣青取之於藍而青於藍氷水爲之而寒於水木直中繩其曲中規揉使之然也是故不登髙山不知天之髙不臨深淵不知地之厚不聞先王之道不知學問之大也孔子曰吾終日思之不如須􅁷之學吾甞􅉥而望矣不如升髙之􅀶見也升髙而招臂非加長而見者逺順風而呼聲非加疾而聞者速蓬生麻中不扶自直積土成山風雨興焉積水成川蛟龍生焉是故不積跬歩無以致千里不積小流無以成江海莊子曰人而不學謂之視􅁏學而不行命之撮囊撮繫者也又曰叔文相莒三年歸其母自績謂母曰文相莒三年有馬千駟今母猶績文之所得事皆將弃之已母曰吾聞君子不學詩書射御必有􅀶塞之心小人不好田作必有竊盗之心婦人不好紡績織絍必有􅁋泆之行好學爲福也猶飛鳥之有羽翼也又曰魯有兀者叔山無趾踵見仲尼仲尼曰子不謹前旣犯􅀂是矣雖今來何及矣無趾曰吾唯不知務而輕用吾生是以亡足今吾來也猶有尊足者存焉吾是以務全之也無趾出孔子曰弟子勉之無趾兀者也猶務學以復􅀘其前行之惡况全德之人乎韓子曰如脂粉則嫫母進御家不潔則西施弃野學之爲脂粉亦厚矣又桓範丗要云學者人之脂粉也又曰夫耕之用力也勞而民爲之者可得而冨之也戰之爲事也危而民爲之者可得以貴也今脩文學習談論則無耕之勞而有冨之實無戰之危而有貴之尊則人孰不爲也管子曰明主不厭人故能成其衆士不厭其學故能成其身也曽子曰君子愛人以學及時而行難者弗避易者弗從年四十無藝則無藝矣五十不以善聞則無聞矣墨子曰墨子謂門人曰汝何不學對曰吾族無學者墨子曰不然豈有好美者而曰吾族無此不欲耶冨貴者而曰吾族無此不用也新序曰齊王問墨子曰古之學者何如對曰古之學得一善言以附其身今之學得一善言務以􅀃人也尸子曰未有不因學而鑒道不假學而光身者也又曰今人皆知砥礪其劒而弗知砥礪其身夫學身之砥礪也又曰水積則生呑舟之魚土積則生楩楠豫樟學積亦有生焉愼子曰孔子曰丘少而好學晚而聞道此以􅀶矣孫卿子曰不登髙山不知天之髙不聞先王之遺言不知學問之大也又曰君子之學入乎耳著乎心布乎四支形乎動静小人之學出乎口入乎耳口耳之間四寸耳􅂚足以美七尺之軀又曰不學不成堯學於君疇舜學於務成昭禹學於西王國文子曰上學以神聽中學以心聽下學以耳聽耳聽者學在皮膚心聽者學在肌肉神聽者學在骨髓吕氏春秋曰善學者􅀂齊王善雞必食其跖數千而後足跖雞踵也喻舉者如食多而後方足也學不辯義如􅀍􅄄而出錦衣而入􅀍􅄄在外衣錦在内故不可也戎人生乎戎而戎言楚人生乎楚而楚言不知其所受也今使戎人長呼楚楚人長呼戎則楚人戎言戎人楚言也又曰聖人生於疾學而能爲魁士名人者未之聞也又曰善學者假人道之長以􅀘其短故假而又假遂有天下􅂫子曰不食八珎何以知味之竒不爲文學何以知丗之資孔叢子曰人之進退唯問其志取必以漸勤則得多山溜至軟石爲之穿蝎蟲至弱木爲之弊夫溜非石之鑿蝎非木之鑿然而能以微脆之形䧟堅剛之體非積漸之致乎故學者所以飾百行也􅀃苑曰晉平公問師曠曰吾年七十欲學恐巳暮矣對曰暮何不炳燭乎臣聞少而學者如日出之陽壯而學者如日中之光老而學者如炳燭之明炳燈之明孰與夜行公曰善哉又曰子貢謂子石曰汝不學詩子石曰父母求吾孝兄弟求吾悌朋友求吾信吾暇乎哉子貢曰請􅂢吾詩以學詩於子又曰公明宣學於曽子三年不學書曽子曰汝居參門三年不學何也對曰安敢不學乎見夫子居家庭親在叱吒之聲未至於犬馬宣􅀃之見夫子應賔客恭儉而不懈宣􅀃之見夫子居朝廷嚴臨下而不毀傷宣􅀃之此三者學之而未能安敢不學乎曽子避席謝之曰參不及宣其學也賈􅁩書曰湯曰學聖王之道譬其如日静居而獨思譬其􅀂火夫舎聖王之道而静居而獨思譬其去日之明於庭而就火之光於室也淮南子曰夫明鏡之始不形也曚然未見形容也及其杚以􅀇錫摩以砥旃􅁂眉微毛可得而察也夫學亦人之砥礪也又曰夫心闇於道而強學不巳者譬聾者之歌無以自樂又曰人莫不知學之有益於巳也然而不能者嬉戲害之也人皆多以無用害有用以弋獵􅀶弈之日誦詩讀書則識必􅀶矣故不學之與學猶瘖聾之比於人也法言曰學者所以脩性也視聽言貌思性所有也學則正否則邪又曰學者所以求爲君子也求而不得者有矣夫未有不求而得之者也又曰大人之學爲道小人之學爲利子爲道乎爲利乎或曰耕不穫獵不饗耕獵乎耕道而得道獵德而得德是穫饗也又曰百川學海而歸于海丘陵學山而不至乎山是故惡夫畫者也抱朴子曰人知藥理病不知學理身又曰夫學者所以清澄性理簸􅀭埃穢啓導聦明􅅚染質素察往知來􅀶渉勸戒仰觀俯察於是乎在雖云色白匪染不麗雖云味甘匪和弗美故瑶華不􅅣則耀夜之景不發青萍不治則純鈞之勁不就故質雖在我而成之由彼登閬風捫辰極然後知井谷之閉隘披七經玩百氏然後覺面墻之至困粉黛至則西施以加麗而􅀫瘤以􅅚醜經術深則髙才者洞逸而魯鈍者醒悟文梓干雲而不可名之爲臺樹者未知班輸之結搆也天倫爽朗而不可謂之爲君子者未識人倫之臧否也塩鐵論曰内無其質而外學其文雖有賢師良友􅀂􅀞脂鏤冰費日損功論衡曰人生懷五常之性好道樂學故别於物今飽食快飲腹爲飯坑膓爲酒囊是則物也與三百倮蟲何以異乎又曰手無錢而之市决貨貨主必不與也夫胷中無學亦猶手中無錢潜夫論曰天地之所貴者人也聖人之所尚者義也德義之所成者智也明智之所求者學問也雖有至聖不生而智雖有至材不生而能由待學問其智乃􅀶其德乃碩而况於凢人乎是以人之學也猶物之有治也夫瑚簋之器朝􅀕之服其始也乃山野之木蠶蠒之􅁝耳及正之以繩墨制之以機杼則皆成宗廟之器黼黻之章可羞於􅀑神可御於王公而君子以敦貞之質察敏之才攝之以良朋教之以明師文之以禮樂導之以詩書幽讃之以春秋其有不濟乎又曰人之情性未能相百其明智有相萬也此非其真性之材也必有假以致之夫道之於心猶火之於人目也深室幽黒無見乃設燎盛燭則百物彰矣此則火之耀也非目之光也而目假之則爲明矣天地之道神明之爲不可見也學問聖典心思道術則皆覩矣此則非心之明而人假之則爲已知風俗通曰武帝廣開獻書之路立五經􅀶士開弟子貟設科射䇿勸以官禄訖於元始百有餘年書積如丘山傳業浸衆枝葉䌓滋經􅀃百萬言盖禄利之路然也徐偉長中論曰學者踈神逹思治情理性也􅀄學則如夜在􅀇室所求不得白日照焉則群物斯辯矯首而徇飛不如脩翼之必獲􅀌居而願知不如務學之必逹蔣子萬機論曰諺曰學如牛毛成如麟角言其少也譙周法訓曰爲國者不患學之害農患治民者之不學􅀇晏春秋曰十七年予長七尺四寸未通史書與從姑子梁栁等或編荆爲楯執杖爲戈分陳相刺有􅀂習兵母數譴予予出得􅀲果歸以進母母投諸地曰孝經稱日用三牲之養猶爲不孝何孝者莫大於欣親今尓年近乎二十志不存教心不入道曽無􅇶惕小慰我心脩身篤學尓自得之於我何有因對予流涕子心少感遂伏書史王粲荆州文學官志曰有漢荆州牧劉君稽古若時將紹厥績乃曰先王之爲丗也則象天地䡄儀憲極設教導化叙經志業明逹雍冸作爲禮樂表陳載籍以持其德上知所以臨下下知所以事上官不失守民聽無悖然後太階平焉故曰物生而蒙事屯而養造昧利有攸適猶金之消鑪水之從器也是以聖人實之於文鑄之於學夫文學也者人倫之首大教之本也趙子聲書詣鄭康成學曰夫學之於人猶土地之有山川也珎寳於是乎出猶樹木之有枝葉也本根於是乎庇也虞􅀓厲學篇曰學之染人甚於丹青丹青吾見其乆而渝也不見乆而渝於學也􅀓子曰人之學者猶渇而飲河海也大飲則大盈小飲則小盈江表傳曰孫權謂吕蒙及蔣欽曰卿今並當途掌事冝學問以自開益蒙曰軍中常苦多務權曰􅀌豈欲卿治經爲􅀶士耶但令渉獵見往事耳如卿二人意性朗悟學必得之冝急讀孫子兵法六韜左傳國語及史孔子曰吾甞終日不食終夜不寢以思無益不如學也䝉等感悟遂學所􅀶覽儒者不勝魯肅見吕蒙謂曰今者見卿學識英􅀶非復吴下阿􅂪權常歎曰人長而進益如吕蒙蔣欽蓋不可及丗􅀃曰禇褒字季野語孫盛曰北人學問淵揔博瞻孫荅曰南人學問清通簡要支道林聞之曰余謂北人看書如顯處見月南人學聞如牖中窺日太平御覽卷第六百七
