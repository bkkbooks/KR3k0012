front:
  text: 太平御覽卷第九百十
  hash: sha256:1706223423b4aa13f7501f9fa76f3ea9d6dc2b68d1e2c46104c75ee85d4a0cfc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_910-1a}
body:
  text: 獸部二十二猨猴猱玃果然猨􅀃文曰猨善猨􅢈屬也􅢈扶沸切山海經曰堂庭之山其上多白猨淮南子曰五九四十五五主音音主猨猨故五月而生列子曰老韭爲莧老羭爲猿莊子曰夫不見騰猨乎其得柟音􅀯梓䂊章覽蔓枝而巳其間及得柘枳构之間危行仄視􅀔不便未足騁其能也又曰人木處則煗慄恂懼猿猱然乎哉又曰今取猨狙且余切而衣周公之服彼必齕囓梚裂盡去而後慊觀古今之異猶狙之異乎周公也又曰猿徧音編狙以爲雌司馬彪曰扁狙似猿而狗頭食弥猴好與雄狙接淮南子曰虎豹之文來射以虎豹有文章使人射取之猨豽女滑切之捷來乍豹㣪属乍暫疾以其㨗故使人疾擊之又曰楚王亡其猨於林木爲之殘宋王亡其珠於池中魚爲之殫又曰置猨檻中則與豚同非不巧捷也無所肆其能也呉越春秋曰趙王問范蠡手戰之術范蠡荅曰臣聞趙有處女國人稱之願王請問之手戰之道也於是王乃請女女將北見王道逢老人自稱􅀽公􅀽公問女曰聞子善爲劒願得一觀之處女曰妾不敢有所隱也惟公所試公即挽林抄之竹似桔橰末折墮地女接取其末􅀽公操其夲而㓨處女應節入之三入女因舉杖擊之􅀽公則飛上樹化爲白猨吕氏春秋曰荆王有白猨三射之則摶樹而熈使飬由基射之始調弓矯矢未發猨擁木而號漢書曰李廣猨臂善射春秋繁露曰猨似猴大而黒長前臂所以壽者好引其氣也抱朴子曰玉䇿記稱猨夀五百􅀊則變而爲玃居縳切千􅀊則變爲老人又曰周穆王南征一軍盡化君子爲猨爲鵠小人於千仞爲沙爲泥張載論曰白猨玄豹藏於櫺檻何以知其接垂條於千仞孝子傳曰猨􅢈屬也或黄或黑通胂音申輕勦子小切善縁妙吟雌爲人所得終不徒生華陽國志曰鄧芝見猨抱子在樹上引弩射之中猿母其子爲拔箭以葉塞瘡芝乃歎息􅄬弩水中冝都山川記曰峽中猿鳴至清山谷傳其響冷泠不絶行者歌之曰巴東三峽猨鳴悲猨鳴三聲淚沾衣荆州圗經曰冝都夷道縣西山頂上有古墓名曰女王冢不詳其人林則女貞戰則白猨范汪荆州記曰夷陵縣陜口山非日夜半不見日月多猿鳴至清逺山海經圗讃曰白猿肆巧由基撫弓數如循環其妙無窮猴漢書曰韓生勸項羽都􅀜中羽曰吾聞冨貴不還故郷如衣錦夜行乃燒宮室都彭城韓生曰人言楚人沐猴而冠果然又曰張信少府檀長卿爲沐猴與狗􅋐蓋寛饒奏免之張晏日沐猴猕猴也王隱晉書曰護軍張邵母病淳于筮之使西出市弥猴繫母臂令傍人抱之拍猴恒使作聲三日三夜放去猴出門即爲犬所殺母於此漸差郭頒魏晉丗語曰司馬宣王辟州泰爲新城太守尚書鍾毓謂泰曰君釋􅄄登宰府乞児乗小車一何駛泰曰君名公之子少有文彩故守吏職猕猴乘􅁟牛一何遲衆賔恱服莊子曰呉王浮于江登于狙且余切之山衆狙見之恂然弃而走有一狙焉委虵玃搔見巧乎王王射之敏給搏矢矢徃雖速而狙猶能將也王命相者趨射之狙死王頋謂其友顔不疑曰狙之伐巧恃其便以傲子以至此列子曰宋有狙公者飬之成群誑狙曰與􅀂茅朝三而暮四衆狙皆怒曰朝四而暮三衆狙皆喜韓子曰燕王微巧術人請以􅁄刺之端爲母猴母猴成巧人曰人主欲觀之必半􅀊不入宫不飲酒食􅁏􅀨霽日出視之晏隂之間而􅁄刺之母猴乃可見也燕王恩飬之不能觀也譙子法訓曰人之所以貴者以其禮節也人而無禮者猕猴乎雖人象而蟲質也淮南子曰楚有烹猴者而紿徒亥切其􅀖人􅀖人以爲狗羮而甘之後聞其猴也據地而吐之盡冩其所食此未爲知味者也抱朴子曰余友人騰永叔嘗養一大猕猴鏁着床間後忽齧殺人永叔使合鏁埋之後百許日有見􅀑者徃見猕猴走上永叔承塵上不悟見􅀑驚指之猕猴何以􅀍傷流血永叔曰始乃知皆有􅀑也又曰山中由曰稱人君者猴也猴壽八百􅀊王充論衡曰鹿之角足以觸大猴之手足以摶鼠然而鹿制於大猴服於䑕氣不利也神仙傳曰有人種􅁰山中正患猕猴食之聞介象有道聊從之乞辟猴之法象曰無他法也汝明日徃􅁰所望見群猴便大喚語之云巳白介君教莫復侵食􅁰此人明日視􅁰遇群猴適欲下樹承象語猕猴各自還山遂絶跡􅄒異記曰南康營氏伍考之伐舡材忽見太杜樹上有一猴懷孕考之便登木逐猴騰赴如飛樹旣􅀌逈下又有人猴知不脫因以左手抱樹枝右手撫腹考之禽得遥擺地殺之割其腹有一子形狀垂産尓夜夢見一人稱神以殺猴責讓之後考之病經旬􅀄如狂因漸化爲虎毛􅁂爪牙悉生音聲亦變遂逸走入山永失蹤跡周景式孝子傳曰余嘗至綏安縣逢徒逐猴猴母􅀒子􅃿水水雖深而清乃以㦸㓨之自恊以下中斷脊尚連抄着舡中子隨其傍以手捫子而死陸機與弟雲書曰監徒武庫建始殿諸房中見有兩足猴真恠物也異物志曰南方人以猕猴頭爲鮓􅀽淑排諧集常山王九命文曰及至圗身失所羈束人間馴纓服制惟意所牽登㨕而遨抱梁而眠拾摭遺餘恣口所便後漢王延壽王孫賦曰原夫天地之造化實神偉之屈竒道􅀇微以宻妙信無􅀄而弗爲王孫狡獸形陋觀而醜儀顔狀􅀋乎老公軀體似乎小児眼睚五皆切􆁱五構切以􅸵音血視職音戢睫側夾切以䀗乎恱切睳䆕烏决切髙匡而曲頞䁵音儇可切歴而隳離鼻􅪱許解切齁許侯切以䶋音吸􅦃許夾切耳聿役以䁤音䁤知口嗛呼忝切呥音冉以䶨則咸切齺音鄒脣􅃖渉切㗩而躡切以􅬯疋里切齒崖崖以齡音爵任音荏􅸎音染而囁入葉切兒儲粮食於兩頰稍委輸於胃脾腃兎蹲而狗聲歴鹿而啒咿或嗝嗝苦革切而􅢛􅢛音的嗅火歴切􅀂啼姿僣傔呼店切而㹅贛音貢豁盱䦧以頊生深山之茂林處嶃巖之嶔﨑性猗􅘀之㺕音煩疾熊峯出而横施猱􅀃文曰猱貪獸也一曰母猴似人毛詩草木蟲魚䟽曰猱猕猴也楚人謂之沐猴老者爲獑猢駿捷也其鳴噭噭而悲詩曰無教猱升木毛萇注曰猱猨屬也爾雅曰猱蝯善縁孫炎注曰猱母猴也江乗地記曰攝山有山猱赤足玃居縛切􅀃文曰玃母猴也爾雅曰玃父善頋郭璞日似猴而大倉黒也能玃持人好顧盻抱朴子曰猕猴及猿八百􅀊化爲玃古今注曰猴五百􅀊化爲玃吕氏春秋曰􅁏之美者玃猱之炙又曰聞言不可不察數傳白爲黒故狗似玃玃似母猴母猴似人人與狗則逺矣以毛詩草木蟲魚䟽曰猱猕猴也楚人謂之木玃老者爲玃大而黒長前辟玃之白􅆎者爲獑猢􅀶物志曰蜀中南髙山上有物似猕猴長七尺能行揵走名曰猴玃一名馬化或曰猳玃同行道婦人有好者輙盗之以去人不得知行者毎經過其旁皆以其長繩相引然故不兔此能別男女氣臭故取女不取男取玄而爲家室其無子者終身不得還十年之後形􅀋之意亦迷惑不復思歸有子者輒拘送還其家産子皆如人有不食飬者母輒死故無敢不飬也及長與人不異皆以􅀭爲姓故今蜀中西界多謂􅀭率皆猳玃馬化之子孫時時有玃􅀲者果然山海經曰果然獸似猕猴以名自呼聲蒼黒群行老者在前少者在後得果食輙與老者似有義焉交趾諸山有之獠人射之以其毛爲裘蓐甚温煖蜀地志曰涪陵南界搸險中有果然獸形如狗子頭似虎其尾柔滑白黒色皮可爲裘輕煖可珎南中八郡志曰交趾有果然白面黒身毛采班䦨呉録地理志曰九真咠浦縣有獸名果然猨狖􅀋也色青赤有文居樹上北郡及日南皆有之南方草物􅃺曰果然獸生在山林上民人以毒箭射之剥取皮皮文青赤白色縫相連作蓆出九真日南郡南州異物志曰交州以􅀯有果然獸以名自呼身如猨大面通有白色其體不過三尺而尾長四尺餘反尾度身過其頭視其鼻仍見兩孔仰向其毛長柔細滑澤色以白爲質黒文視如蒼頭鴨脇邊班文集十餘皮可得一蓐繁文麗好細厚温煖魏鐘毓果然賦曰果然似猴象猨黒頰青身􅁏非嘉肴唯皮爲珎太平御覽卷第九百一十
