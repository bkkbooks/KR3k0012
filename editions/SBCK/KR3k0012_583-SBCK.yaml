body:
  text: 樂部二十一琵琶羯皷琵琶釋名曰琵琶夲胡中馬上所皷推手前曰琵引手却曰琶因以爲名晉書曰石季倫善彈琵琶宋書曰􅁃仲文爲吏部尚書好貨先與劉德願殊惡德願自持琵琶甚精麗遺之便復欵然南史曰宋范曄善彈琵琶能爲新聲上欲聞之屢諷以微旨曄僞􅀂不肯爲上甞宴飲歡適謂曄曰我欲歌卿可彈曄乃奉旨上歌旣畢曄乃罷弦蕭子顯齊書曰太祖曲江宴群臣數人各使效􅇊藝禇淵彈琵琶王僧度彈琴沈文季歌張敬兒舞王敬則柏王儉曰臣無所解唯知誦書因跪上前誦相如封禪書上􅀏曰此盛德之事吾何以堪之遽止使陸澄誦孝經自仲尼居而起儉曰澄所謂􅀶而寡要臣請誦之乃誦君子之事上章上曰善張子布更􅁴非竒隋祕書􅁥牛弘修皇后房内之樂文帝龍潜時頗好音樂甞􅀝琵琶作歌二首名曰地厚天髙託言夫妻之義因即取之爲房内曲命婦人並登歌上壽並用之職在宫内之女人教習之樂府雜録曰貞元中有王芬曹保其子善才其孫曹綱及裴興奴善彈琵琶其曹綱善運撥聲􅀂風􅀨不事但弦其裴興奴善於攏撚不撥稍軟時人云曹綱有右手裴興奴有左手武宗朝朱崖李太尉有樂吏廉郊者師於曹綱精妙入神甞謂儕流曰教授人亦多矣未曽有此性靈弟子也甞因清夜携樂器於平泉别墅臨池彈蕤賔調芰荷聞有聲意其魚躍也及彈別調即寂然因復彈蕤賔乆之池中擲物跳上岸觀之乃一片方響蕤賔䥫盖以聲律諧和相應故也其妙􅀂此又曰貞元中有康崑崙彈琵琶第一手因長安大旱詔移兩市以祈雨及至天門街市人廣較勝􅀒及闘聲樂即街東有康崑崙琵琶最上必謂街西無以敵也遂請崑崙登綵樓彈一曲新翻羽調録要即緑􅆎是也夲因樂上進曲上令録出要者因以爲名自後來誤言緑􅆎也其街西亦建一樓東市大誚之及崑崙度曲西市樓上出一女郎抱樂器先云我亦彈此曲兼移在楓香調及下撥聲如雷其妙絶入神崑崙即驚駭乃拜請爲師女郎乃更衣而出及見即僧也盖西市内豪族厚賂莊嚴寺僧善夲善本名俗姓叚也以定東􅆵之勝也翌日德宗召入令陳夲藝異常佳奬因令教授崑崙奏曰且請崑崙彈一調子乃彈之師曰本領何雜也兼帶雅聲崑崙驚曰叚師神人也臣小年􅀄學琵琶偏於隣舎女巫處授一品絃調子後仍易數師叚精鑒玄妙如此叚師奏曰遣崑崙不近樂器十餘年使忘其夲領然後可教詔許之後盡叚師之蓺也又曰開元中有賀懷智善琵琶以石爲槽鵾鷄荕作絃用䥫撥彈之又曰琵琶始自烏孫公主造馬上彈之直項曲項者曲項盖使於急􅀜也古曲有陌上葉范曄石苞謝弈皆善此樂也風俗通曰琵琶近代樂家所作不知所起長三尺五寸法天地人與五行也四絃象四時也以手琵琶之因以爲名語林曰謝鎭西着紫羅􅃭據胡床在大市佛圖門樓上彈琵琶作大道曲異苑曰南平國兵在姑熟有􅀑附之毎占㓙輙先索琵琶隨彈而言事事有驗云是老䑕所作名曰靈侯王諐期絳幕祠儀曰琵琶出於弦鞉笙簧基於􅁝竹竹林七賢傳曰阮咸善琵琶荀朂雅解音律自以逺不及也文士傳曰孔輝善彈琵琶呉歸命􅁪使爲樂孫放別傳曰君性好音能操琴及琵琶以自散傅􅀇琵琶序曰聞之故老云漢遣焉烏孫公主念其行道思慕使工知音者戰琴筝筑箜篌之属作馬上之樂觀其器盤圎柄直隂陽序也四弦法四時也以方語目之故枇杷也取易傳於外國也杜摯以爲興􅁗之末盖苦長城之役百姓弦鼗而皷之二者各有所據以意斷之烏孫近焉石崇琵琶引曰王明君曰本爲昭君以觸文帝諱改匈奴請婚元帝以明君配焉昔公主嫁烏孫令琵琶馬上作樂以慰其思其送明君亦故然序之云耳􅀓子曰朱生善彈琵琶雖伯牙之妙無加也文士傳曰孔煒字正忠解音律彈琵琶異苑曰永嘉中李謙素善琵琶元嘉􅀄徃廣州夜集坐倦悉寢唯謙獨揮彈未輟便聞䆫外有唱佳聲毎至契㑹無不擊節謙恠語曰何不進􅁘對曰遺生以乆無冝干突始悟是􅀑幽明録曰晉司空桓豁在荆州有叅軍五月五日剪鸜鵒舌教令學語遂無不鳴與人相問頋叅軍善彈琵琶鸜鵒每立聽移時録異傳曰呉赤烏三年句章氏楊度至餘姚夜行有一年少持琵琶求􅀉載度受之皷琵琶作數十曲曲畢乃􅄍舌擘目以怖度而去復行二十里許又見一老父􅀉載自云姓王名戒因復載之謂曰􅀑工皷琵琶甚哀戒曰我亦能皷即是向􅀑復擘眼吐舌度怖幾死語林曰桓宣武外甥􅁪在坐皷琵琶宣武醉後指琵琶曰名士固亦操斯器三輔决録曰遊楚上表乞􅀫衛拜駙馬都尉楚無學問好遊遨音樂乃畜歌琵琶筝笛每行將以自隨樂府雜録曰唐文宗朝女弟子鄭中丞善於胡琴中丞即宫人之官也内庫有兩面琵琶號大忽雷鄭常彈小忽雷因匙頭脫送於崇仁坊南趙家修理大約造樂器多在此坊中南北二趙家最妙大和中有權相舊吏梁厚夲莊在渭南縣之西北臨渭水一日因垂釣忽見一物流過長五尺許悉以錦􅆞其上令家僮接得就岸乃祕器也及發棺視之乃一女郎也粧色儼然乆伺之口鼻間餘息未絶遂移於曲室中將養經旬漸能言詢之云是鄭中丞也昨以悞聖旨命内官縊殺投於渭河錦即諸弟子相贈耳及如故因垂涕感謝厚夲即納爲妻言其琵琶今尚在南趙家值鄭注之亂莫有知者梁乃潜賂樂匠贖得之毎至夜􅀷方敢輕彈後遇良晨美景飲於花下酒酣不􅁴郎彈數曲洎有黄門放鷂子過其門􅀻於牆外聽之曰此是鄭中丞琵琶聲也不日召入内乃捨厚本之罪仍加錫賜也明皇雜録曰天寳中上命宫女子數百人爲梨園弟子皆居冝春北院上素曉音律時有馬仙期李􅀛年賀懷智洞知律度安禄山自范陽入覲亦獻白玉簫管數百事皆陳於梨園自是音響殆不􅀋人間有中官白秀貞自蜀使廽得琵琶以獻其槽以邏逤檀爲之温潤如玉光輝可鑒有金縷紅文蹙成􅀟鳯貴妃毎抱是琵琶奏於梨園音韻淒清飄如雲外而諸王貴主洎􅉑國已下競爲貴妃琵琶弟子毎授曲畢皆廣有進獻其後􅀛年流落江南每遇良晨勝景常爲人歌數闋座客聞之莫不掩泣罷酒羯皷羯皷録曰羯皷出外夷以戎羯之皷故曰羯皷其音主太簇一均􅀛兹髙昌踈勒天笁諸部皆用之次在都曇荅獵皷之下都曇似􅆎皷而小荅獵即楷皷也鷄皷之上如􅃮桶山桒爲之下以小牙床承之擊用兩杖其音焦殺鳴烈尤冝急曲促破作戰杖連碎之聲又冝髙樓曉影明月清風破空透逺特異衆樂杖用黄檀狗骨花楸等木湏至乾緊絶濕氣而復柔􅕹乾取發越響亮􅕹取戰􅙂徤舉捲用鋼䥫䥫當精練捲湏至勻􅀂不以鋼則應絛髙下細捩不停不勻則皷面緩急􅀂琴徽之病玄宗洞曉音律由之天縱凢是管絃悉造其妙􅀂製作曲調隨意即成如不立章度取適長短應指發聲皆中􅀧拍至於清濁變轉律吕呼召君臣事物相制使雖古之夔曠無以過也尤愛羯皷横笛云八音之領䄂也諸樂不可爲比甞值二月詰旦巾櫛方畢時􅀫兩􅀄晴景色明麗小殿庭内栁杏將吐覩而歎曰對此景物豈可不與他判斷之左右相目將令備酒唯髙力士遣取羯皷上旋命之臨軒縱擊一曲名春光好上自掣神思自得及頋柳杏皆巳發拆指而􅀏曰此事不喚我作天公可乎左右皆稱萬歳又製秋風髙毎至秋空逈徹纎塵不起即奏之必逺風徐來庭葉墜落其妙絶入神也如此又曰汝陽王璡寕王長子也姿容妍羙秀出藩邸上特鍾愛焉自傳授之又以其聦悟敏惠妙逹其旨每隨遊幸頃刻不捨璡甞戴砑綃帽打曲上自樀槿花一朶置於帽上着處二物皆極滑乆之方安遂奏舞山花一曲花不墜本色所謂定頭項難在不動揺上大喜􅀏賜金器一厨因誇花奴璡小名也姿質明瑩肌膚光細非人間人必神仙謫墜也寕王謙讓隨而短之上􅀏曰大哥不在過慮阿暪自是相師上於諸親自稱此號夫帝王之相且湏英特越逸之氣不然則有深沉包育之候􅀂花奴但端秀過人悉無此犬固無猜也而又舉止淹雅更得公卿間令譽耳寕王又謝之曰如此則臣乃輸之上曰􅀂此則阿暪亦輸大哥矣寕王又謙謝上曰阿暪嬴處亦多大哥大用僞揖衆皆歡􅀏也上性儁邁酷不好琴甞聽彈正弄未及畢叱琴者曰待詔出去謂宦者曰速召花奴將羯皷來爲我解穢黄幡綽亦知音者上甞使人召之不時至上怒絡驛使尋捕之旣至及殿側聞上理皷固止謁者不令報俄頃上又問侍官奴來未曲罷改奏􅂊三數十聲綽即入上謂曰頼稍遲我向來怒意至必撾焉適方思之長入供奉巳五十餘日暫一日出外不可不許他東西過徃綽拜謝畢内官有偶而􅀏者上詰之具言綽尋至聽皷而候其時入上問之綽語其方及解怒之際皆無􅆧悟上竒之復厲聲謂之曰我心骨下事安有侍官奴聞皷聲能料之耶今且謂我何如綽遂走下堦面北鞠躬大聲曰有勑竪金鷄上大􅀏而止又曰宋開府雖耿介不倫亦􅀷好聲樂尤善羯皷􅀯山起雲北山起雨即開府所爲始承恩頋與上論皷事曰不是青州石即是魯山花歐然少年碧掌下雖有朋肯聲據此乃漢震第二皷也且用石花瓷固是􅆎皷掌下朋肯聲是以手拍非羯皷鳴矣又謂上曰頭如青山峯手似白雨􅀧按此即羯皷之能事山峯欲不動雨􅀧取碎急即上與開府兼善兩皷也而羯皷偏好以其比漢震稍雅細焉開府之家悉傳之東都留守鄭叔祖母即開府之女今尊賢里鄭氏第小樓即是夫人習皷之所也又曰嗣曹王臯有巧思精於器用爲荆南節度使有羇客懷二捲欲求通謁先啓於賔府府中觀者訝之曰豈足尚邪客曰但啓於尚書當解耳及見臯捧而歎曰不意今日􅀗逢至寳因指其鋼勻之狀賔但唯唯或復非之臯曰諸公或似未信乎命取食柈自選其極平者遂重二捲於柈心以油注之盤中捲滿而油不浸漏盖相契無際也臯曰此必開元中供御捲也不然無以至此問其客曰某先人在黔中得於髙力士衆方􅀷伏佐潜問其價冝償幾何客曰不過三百緍及臯遺之財帛器皿其直果稱焉又曰廣德中蜀客􅀟流縣丞李琬者亦能之調集至長安稅居務夲里夜聞羯皷聲曲頗妙於月下歩尋至一小宅門户極卑隘叩門請謁皷工曰君所擊者豈非耶婆色鷄乎一本作耶婆娑鷄也雖至精能然而無尾何也工大異之曰君固知音者此事無人知某太常工人也祖父傳此蓺尤能此曲進因張通儒而入長安某家流散父没西河此曲遂絶今但按舊譜數夲尋之竟無結尾聲故夜夜求之琬曰曲下意盡乎工曰盡琬曰意盡則曲盡又何索乎工曰柰何聲不盡也琬曰可言矣夫曲有如此當以他曲解之方可盡其聲矣夫􅁘婆色鷄當用掘拓急偏解之工如其所教果得諧叶聲意皆盡如柘枝用渾脫解甘州用絶了頭解之類是也工泣言而謝之即言於寺卿奏爲主簿累官至太常少卿爲宗正卿又曰永奏中杜鴻漸爲三川副元帥兼西川節度使亦能之成都有削杖者以二枚獻於鴻漸鴻漸得之示於衆曰此􅀹物也常衣􅁭下牧貯積時矣匠曰某於􅆃溝中養之二十年及鴻漸出蜀至利州西界望喜驛入漢川矣自西南來始至嘉陵江頗有山景致至夜月色又佳乃與從事楊崖州杜亞軰登驛樓望月行觴讌話曰今日出艱危脫猜逼外則不辱命於朝廷内則不中禍於微質皆諸賢之力也旣保此安歩又瞰於此殊境安得不自賀乎遂命家僮取羯皷笛以所得杖酣奏數曲四山猿鳥悉皆飛鳴從事頗異之曰昔夔之擊拊百獸舞庭此豈逺耶漸曰􅀂漸於此稍當致功猶未臻妙尚能及是况聖主御天賢臣考樂飛走之􅀋又何不感因言某有別墅近花嚴閣毎值風清月㓪時或登閤奏此􅀄見群羊於川下數舉頭躑躅不巳某謂以皷然也及皷止亦止某復皷之亦復然遂以疾徐髙下而節之無不相應旋有二犬自其家走而吠之及羊側逐漸止聲仰首􅀂有所聽少選即復宛頸揺尾亦從而變態是知率舞固無難矣某後不敢爲之近者士林間無習之者唯㒒射韓臯善不甚露焉鄂州節度使時聞黄鶴一兩集而已太平御覽卷第五百八十三
