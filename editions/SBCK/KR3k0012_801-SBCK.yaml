front:
  text: 太平御覽卷第八百一四夷部二十
  hash: sha256:4769e790d0cb293e31f7aaded0de6d598204afca396c6fdd4c0493c1583b157f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_801-1a}
body:
  text: 北狄三託跋氏稽胡慕容氏宇文莫槐髙車烏洛侯庫莫奚軻比能託䟦氏宋書曰託䟦氏其先漢將李陵之後也陵降匈奴單于妻之以女字託䟦其後因氏焉丗豪強分建種落也又曰索頭虜姓託䟦氏匈奴有數百千種各立名號索頭亦其一也晉􅀄索頭種有部落數萬家在雲中惠帝末并州刺史司馬騰於晉陽爲匈奴所圍索頭虜單于猗駞遣軍助騰懷帝永嘉三年駞弟盧率部落自雲中入鴈門就并州刺史劉琨求樓煩等五縣琨不能制且欲􅀝盧爲援乃上言盧兄駞有救騰之功冝請移五縣民於新興以其地處之􅉖帝進盧爲代王盧孫十翼鞬據隂山衆數十萬鞬死子開字渉圭即後魏道武皇帝又曰虜俗以四月祠火六月末率大衆至隂山謂之却霜隂山去平城六百里深逺饒樹木霜雪未甞釋盖欲以暖氣禦寒也後魏書曰黄帝子昌意少子受封北土國有大鮮卑山因以爲號其後丗爲君長統幽都之北黄帝以土德王北俗謂土爲托謂后爲䟦故以爲氏其裔始均仕堯丗逐女魃於弱水北民頼其勲帝舜嘉之命爲田祖歴三代至秦漢獯鬻獫狁山戎匈奴之屬累代殘􅁀作害中州而始均之裔不交南夏是以載籍無聞焉積六七十丗裔孫即成皇帝諱毛也毛統國三十六大姓九十九威振北方莫不率服至力微立即成元皇帝也諸部大人悉服控􅁌之士二十餘萬遷於定襄之盛樂也又曰禄官立始祖子也分國爲三部一居上谷北濡源之西東接宇文部自統之一居代郡之叅合陂北兄子猗㐌統之一居定襄之盛樂故城使猗㐌弟猗盧統之稽胡後周書曰稽胡一百歩部稽盖匈奴別種劉元海五部之苗裔也或云山戎赤狄之後離石以西安定以東方七八百里居山谷間種落繁熾其俗婦人多貫蜃貝以爲耳頸飾孝昌中有劉蠡􅂛者居雲陽谷分遣部衆抄掠居汾晉之間略無寧歳神武遷鄴後始密圖之僞許以女妻蠡􅂛之子蠡升信之遂遣其子詣鄴齊神武厚爲之禮緩以婚期蠡􅂛旣恃和親不爲之備大統元年三月齊神武潜師襲之又曰保定中離石生胡數㓂汾北勲州刺史韋孝寛於險要築城以遏其路又曰建德五年髙祖敗齊師於晉州乗勝逐北齊人所弃甲杖稽胡乗間􅀼出盗而有之慕容氏晉書載記曰慕容氏其先有熊氏之苗裔丗居北夷邑于紫蒙之野號曰東胡其後與匈奴並盛控􅁌之士二十餘萬風俗官號與匈奴略同秦漢之際爲匈奴所敗分保鮮卑山因以爲號通典慕容氏亦東胡之後别部鮮卑也魏􅀄渠帥有莫謨跋率諸部入居􅈙西後從司馬宣王討公孫淵有功拜率義王至孫渉歸魏封爲鮮卑單于渉歸有二子長日吐谷渾西遷河湟之間次曰廆有命代才略晉太康十年又遷于徒河之青山也又曰慕容廆字弈洛瓖昌􅀺􅁄城鮮卑人也曽祖莫護跋􅀄率諸部大人入居遼西從宣帝伐公孫氏有功拜率義王始建國於􅀥城之北時燕代多冠歩摇冠莫護䟦見而好之乃歛髮襲冠諸部因呼之爲歩揺其後音訛遂爲慕容焉或云慕二儀之德繼三光之容遂以慕容爲氏祖木延左賢王父渉歸以全栁城之功進拜鮮卑單于遷於遼東北於是漸慕諸夏之風矣又曰安北將軍張華有知人之鑒慕容廆童冠時往謁之華謂曰君至長必爲命丗之器因以所服􅆪幘遺廆又曰慕容廆謀於衆曰吾先公以來丗奉中國且華裔理殊強弱固别豈冝與晉國競乎何爲不和以害吾百姓耶乃遣使來降帝嘉之拜爲鮮卑都督廆致敬於東夷府巾衣詣門抗士大夫之禮何龕嚴兵引見廆乃改服戎衣而入人問其故廆曰主人不以禮賔復何爲哉龕聞而慙之廆以大􅁄城即帝顓頊之墟元康四年乃移居之教以農桑法制同於上國永嘉􅀄廆自稱鮮卑大單于建武􅀄元帝承制拜廆假節散􅀐常侍都督遼左雜夷流人諸軍事龍驤將軍大單于昌􅀺公廆刑政修明流亡者多歸之廆乃立郡以統流人兾州人爲兾陽郡豫州人爲成周郡青州人爲營丘郡并州人爲唐國郡廆卒皝嗣立皝雄毅多權略日強盛遂自稱燕王後遷都於栁城㑺暐即其子孫宇文莫槐後漢書曰宇文莫槐出於遼東塞外其先南單于之逺属莫槐之人皆剪髮而留其頂上以爲飾婦人􅀍長􅃭及足而無裳焉秋收烏頭爲毒藥以射禽獸北史曰莫廆呼罪切部衆彊盛自稱單于塞外諸部咸畏憚之莫廆即莫槐之姪孫莫槐父子丗雄漠北又先得玉璽三釰自言爲天所相毎自誇大莫廆之孫曰乞得􅀛爲慕容廆破之先是海出大􅀛枯死於平郭至是乞得􅀛敗也髙車北史曰髙車盖古赤狄之種也􅀄因號爲狄歴北方以爲勑勒諸夏以爲髙車丁零其語略與匈奴同而時有小異或云其先匈奴甥也其種有狄氏􅀽紇氏斛律氏解批氏護骨氏異竒斤氏其人好引聲長歌有似狼嘷本無都統大帥當種各有君長爲姓麄猛黨􅀋同心至於㓂難翕然相依闘無行陣其俗婚姻用牛馬納聘以多爲滎俗無􅂖不作酒迎婦之日男女相將持馬酪熟肉節解主人延賔亦無行位穿廬前藂坐飲宴終日又曰髙車俗不潔浄喜致震霆每震則呌呼射天而集之移去至來歳秋馬肥復相率集於震所理羖羊然火拔刀乞旃氏四曰大連氏五曰窟賀氏六曰逹薄氏七曰阿崙氏八曰莫允氏九曰俟分氏十曰副伏羅氏十一曰乞􅀽氏十二曰右叔沛氏又曰髙車昩利不顧後患又曰髙車斛律部帥倍侯利爲蠕蠕掩襲遂奔魏賜爵孟都公倍侯利質直勇徤過人北方之人畏之嬰兒啼者語曰倍侯利來便止處女歌謡云求良夫當如倍侯利其衆服如此善用五十􅆱筮􅁻凶毎中故得親幸倍侯利卒道武悼惜葬以魏禮謚曰忠壯王又曰太和十四年阿伏至羅遣使至京以二箭奉貢云蠕蠕爲天子賊臣當爲天子討除孝文賜繡袴褶一具雜綵百疋又曰髙車部衆分散或來奔附或投蠕蠕詔遣宣威將軍羽林監孟威撫納降人又曰髙車遣使貢金方一銀方一金杖二馬七疋駞十頭又曰髙車與蠕蠕戰於蒲􅀋海北割蠕蠕之髮送於羽林􅁥孟威又曰髙車遣使獻龍馬五疋金銀貂皮及諸方物詔賜樂器一部樂工八十人赤紬十疋􅄂綵六十疋又曰髙車王伊匐遣使朝貢因乞朱畫歩挽一乗并幔褥鞦䩛一副繖扇各一枚青曲蓋五枚赤􅃮扇五枚鼔角十枚詔給之烏洛侯北史曰烏洛侯國在地豆干北去代都四千五百餘里其地下濕多霧氣而寒國人尚勇不爲姧􅀼故慢藏野積而無㓂盗好射獵樂有箜篌木槽革面施九􅁌太武真君四年來朝稱其國西北有魏先帝舊虚石室南北九十歩東西四十歩髙七十尺室有神靈人多祈請太武遣中書侍郎敞吿􅀕刋祝文於石室之壁而還唐書曰烏羅渾國盖後魏之烏洛侯也今亦謂之烏羅護其國在京師東北六千三百里東與靺羯西與突厥南與契丹北與烏丸接風俗與靺羯同貞觀六年其君長遣使獻貂皮庫莫奚後魏書曰庫莫奚國之先東部字文別種也􅀄爲慕容元貞所破邑落竄匿於松漠之間後周書曰庫莫奚鮮卑之別種也先爲慕容晃所破竄於松漠之間後種漸多分爲五部一曰辱紇主二曰莫賀弗三曰契箇四曰木昆五曰室得毎部置俟斤一人有阿㑹氏者最爲豪帥五部皆受其節度北史曰登國三年道武親討庫莫奚至弱水南大破之又曰武成之丗庫莫奚歳致名馬文皮太和四年輙入塞内辭以畏豆地干抄掠詔書切責之軻比能魏志曰軻比能本小種鮮卑以勇徤断法平端不貪財物衆推以爲大人部落近塞自􅀽紹據河北中國人多叛歸之教作兵器鎧楯頗學文字故其勒御部衆擬於中國出入弋獵建立旄麾鼔節爲進退又曰建安中烏桓反軻比能動爲㓂害太祖以鄢陵侯彰爲驍􅀐將軍北征大破之又曰延康􅀄軻比能遣使貢馬文帝立比能爲附義王又曰黄􅀄二年軻比能出諸魏人在鮮卑者五百餘家還居代郡黄􅀄三年軻比能率部落與代郡烏丸等三十餘口交市遣魏人千餘家居上谷後與東部鮮卑大人素利及歩度根三部爭闘烏桓校尉田豫和之使不得相侵五年軻比能復擊鮮卑豫帥輕􅀐徑進椅其後比能使别小帥璅奴拒豫進討破之由是懷貳乃與輔國將軍鮮卑輔書曰夷狄不識文字故校尉閻柔保我於天子我與烏丸爲讎往年攻擊之而田校尉助素利烏丸也我臨陣使璅奴往聞使君來即引軍退歩度根數數鈔盗又殺我弟而誣我以鈔盗我夷狄雖不知禮義兄弟子孫受天子印綬牛馬尚知美水草况我有人心耶將軍當保明我於天子輔得書聞帝帝復使豫招納安慰軻比能衆遂強盛控􅁌十餘萬􅀐每鈔掠得財物均平分付一决目前終無所私故能得衆死力餘部大人皆憚之太平御覽卷第八百一
