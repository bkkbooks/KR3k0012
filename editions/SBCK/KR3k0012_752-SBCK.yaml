front:
  text: 太平御覽卷第七百五十二
  hash: sha256:75bb7a19369c76e3698c671db52d6069abaddc8cb360b5ce88eb21b49e1f138e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_752-1a}
body:
  text: 工藝部九巧釋名曰巧者合異􅀋共成一體也禮曰無作淫巧以蕩上心又曰季康子之母死公輸􅀂方小公輸若匠師方小言年尚㓜未知禮也歛般請以機封歛下棺於椁般若之族多技巧者見若掌歛事而年尚㓜請代之而欲甞其技巧將從之時人服般之巧公肩假曰不可般爾以人之母嘗巧則豈不得以以已字言寕有强使女者與借於禮作機巧非也以與巳字本同又曰目巧之室則有奥阼周禮曰國有六職百工與居一焉百工司空事官之屬於天地四時之職亦處其一也知者創物謂始闓端造器物􅀂丗本作者是也巧者述之守之丗謂之工父子丗以相教百工之事皆聖人之作也事無非聖人所爲也爍金以爲刄凝土以爲器作車以行陸作舟以行水此皆聖人所作也凝堅也天有時地有氣材有美工有巧合此四者然後可以爲良時寒温也氣剛柔也良善也續漢書曰張衡性精微有巧藝作地動儀以精銅鑄其器圜徑八尺形似傾樽其蓋穹隆飾以􅂐文外有八龍首銜銅丸下有蟾蜍承之其牙發機皆隱在樽中周密無際如一體焉地動機發龍即吐丸蟾蜍張口受丸聲乃振􅀭司者覺知即省龍機其餘七首不發則知地震所從起來也合契􅀂神觀之莫不服其竒麗自古所來未甞有也蜀志曰諸葛亮性巧損益連弩木牛流馬皆岀意焉亮集有其法也晉書曰嵇康性絶巧而好鍜宅中有一栁樹甚茂乃激水環之毎夏月居其下以鍜晉紀曰宋王圍慕容超張綱巧絶於人乃使綱大治攻具於是城上火石弓弩無所用之晉陽秋曰呉葛衡字思直明逹天官能爲機巧故作渾天儀又曰衡陽區紙者甚有巧思造作木室作一婦人居其中人扣其户婦人開户而出當户再拜還入户内閉户又作䑕市於中而四方丈餘四門門中有一木人縱四五䑕欲出門木人輙推木掩之門門如此䑕不得出又作指南車及木奴令舂穀作米中宗聞其巧詔􅀘尚方左校沈約宋書曰石虎使解飛姚興令狐生造指南車宋武帝平長安始得此車戎狄所制不甚至精雖有南多不審正廻曲頻聚猶須人力正之范陽人祖冲之甚有巧思常謂冝更構造順帝昇明末齊王爲相命冲之造焉其制甚精百屈千廻未甞移變北齊書曰髙隆之性小巧至於公家羽儀百戲服制時有改易不循舊典時論非之文士傳曰張衡甞作木鳥假以羽翮腹中施機能飛數里後趙録曰邴輔樂陵人也好學者才藝巧思機智妙於當時襄國宫殿臺榭皆輔所營也馬鈞別傳曰釣字徳衡扶風人巧思絶丗不自知其爲巧也居貧舊綾機五十綜者五十躡六十綜者六十躡鈞乃易以十二躡其竒文異變因感而作猶自然而成形隂陽之無窮葛洪神仙傳曰􅁑由者蜀人也刻木作羊能行一旦􅀐羊入山遂云得仙未知指實也鄴中記曰石虎有指南車及司里車又有舂車木人及作行碓於車上動則木人蹋碓行十里成米一斛又有磨車置石磨於車上行十里輙磨一斛凡此車皆以朱彩爲飾唯用將軍一人車行則衆巧並發車止則止中御史解飛尚方人魏猛變所造虎至性好佛衆巧奢靡不可紀也甞作擅車廣丈餘長二丈安四輪作金佛像坐於車上九龍吐水灌之又作一木道人􅁪以手摩佛心腹之間又十餘木道人長二尺餘皆披袈裟繞佛行當佛前輙揖禮佛又以手撮香投爐中與人無異車行則木人行龍吐水車止則止亦解飛所造也玄中記曰竒肱氏善竒巧能爲飛車從風逺行述異記曰魯班刻石爲禹九州圖今在格城石室山東北巖中西京􅄂記曰長安巧工人丁緩者爲􅁪蒲燈七龍五鳯􅄂以芙華蓮藕之竒又作卧褥香爐一名􅀍中香爐大出房風其法度至綬更始爲之環轉四固而爐體常平可致之􅀍褥故取􅀍褥爲名又作九層山鑪鏤爲竒禽恠獸諸靈皆自然運動又作七輪扇連以七輪大皆徑尺並相連續一人運之滿堂皆生風寒焉又曰昭陽殿椽桶皆刻作龍虵縈繞之狀匠人丁護李菊所作也其巧爲天下第一涼州記曰吕光時有任射者自匿爲王欣家奴發覺應死躬有竒巧王􅈛魯般之儔也故赦之涼風門及大殿歳乆傾敗躬運巧致思土木俱正王子年拾遺記曰嶿音湏支國去􅅺離國八萬里其國婦人善織以五色絲稍内口中兩手引之則成文錦似列燈燭也又曰始皇起遊雲臺窮極四方之珍材搜天下之巧工人皆能騰虚縁木揮斤斧於空中又曰始皇二年騫消國獻善􅀞之工名裂裔刻白玉爲兩虎削玉爲毛有如眞矣不􅀧兩目睛始皇􅀧之即飛去明年南郡有獻白虎二頭始皇使視之乃是先刻玉者始命去目睛二虎不復能去歴代名􅀞記曰呉王趙夫人丞相趙逹之妹善書􅀞巧妙無􅀟能於指間以綵織爲龍鳯之錦宫中號爲機絶孫權常歎巴蜀未平思得善􅀞者圖山川地形夫人乃進所冩江湖九州山岳之勢夫人又於方帛之上繡作五岳列國地形宫中號爲針絶又以膠續絲髮作爲輕慢宫中號爲絲絶又曰宋謝莊字希逸性多巧思制木方丈圖天下山川土地各有分理離之則州别郡殊合之則寓内爲一老子曰大巧􅀂拙又曰絶巧弃利盗賊無有荘子曰陶者云我善治埴圎者中規方者中矩範土曰陶陶化也埴黏土也匠人曰我善治木曲者中鈎直者應繩曲鈎也繩直也謂匠人機巧善能治木曲直必中鈎繩也夫埴木之性豈欲中規矩鈎繩哉土木之性禀之造物不求曲直豈慕方圎陶者匠人浪爲臧否又曰百工有器械之巧則壯又曰巧者勞而智者憂無能者無所求又曰無爲也而􅀏巧巧者有爲以傷神又曰覆載天地刻雕衆形而不爲巧巧者爲之妙耳物皆自爾故無所稱巧也此之謂天樂忘樂而樂足矣又曰以瓦注者巧以鈎注者憚以黄金注者昏所要愈重則其心愈肝膽心肺脾腎腸胃外則筋骨支節皮毛齒髮皆假物也無不畢具者合㑹復如􅀄王誠廢其心則口不能言廢其肝則目不能視廢其腎則足不能歩穆王曰人之巧乃與造化同功乎詔貳車載之以歸夫班輸之雲梯墨翟之飛鳶自謂能之極也弟子東賈會滑􅁵間以偃師之巧吿於二子二子終身不敢語藝而時執規矩焉又曰宋人有爲其君以玉爲楮葉者三年而後成亂之楮葉中而不可別也此人遂以巧食宋國列子聞之曰使天地生物三年而成一葉則物之有葉者寡矣故聖人持道化而不持智巧轉子云象爲楮葉又曰考成子學幻於尹文先生三年不告考成子請其過而求退尹文先生曰昔老聃之祖西也顧而告余曰有生之氣有形之􅃺盡幻也造化之所始隂陽之所變者謂之生謂之死窮數逹變因形移易者謂之化謂之幻造物者其巧妙其功深故難終難窮因形者其巧顯其功淺故隨起隨滅知幻化之不異生死也始可學夫幻矣吾與汝亦幻也奚須學哉墨子曰公輸子削竹木爲鵲成而飛之三日不下自以爲至巧墨子謂曰子之爲鵲也不如匠爲車轄也湏􅁷逝三寸之木而任五十石之重故利於人謂之巧不利於人謂之拙孟子曰公輸子之巧不以規矩不能成方圎也淮􅀯子曰昔者楚欲攻宋墨子聞而悼之墨子名翟宋大夫悼傷也自魯趨而徃十日十夜而不休息裂衣裳褁足至於郢見楚王自從趨走也郢楚都也今南郡江陵北里郢是也曰臣聞大王舉兵將攻宋計必得宋而後罷之乎志其苦衆勞民頓兵剉銳天下以不義之名而不得咫尺之地猶且攻之乎頓罷剉辱銳精攻無罪之宋故負天下以不義之名猶且必也王曰必不得宋又且爲不義曷爲攻之墨子曰臣見大王之必傷義而不得宋王曰公輸子天下之巧士作爲雲梯設以攻宋曷爲弗取公輸魯班號時在楚雲梯攻城具髙長上與雲齊故日雲梯設施也墨子曰今公輸設攻宋之械墨子設守之備公輸九攻而墨子九拒之終弗能入入猶下也於是乃偃兵輟不攻宋輟止也又曰神機隂閉剞劂無迹人巧之妙也而治丗不以爲民業又曰工人下漆而上丹則可下丹而上􅃮則不可萬事由此也又曰規矩鈎繩者乃巧之具也而非所以爲巧巧存於心也又曰神明之事不可以智巧爲也不可以筋力致也天地所包隂陽所嘔雨露所濡以生萬殊翡翠瑇瑁碧玉珠文采明朗澤􅀂濡摩而不玩乆而不渝奚仲不能旅魯般弗能造此之謂大巧又曰夫至巧不用劒巧在心手故不用劒又曰大匠不用斵又曰夫物有以自然而後人事有治也故良匠不能斵金巧冶不能鑠木金之勢不可斵而木之性不可鑠也埏埴而爲器刳木而爲舟爍鐡而爲刄鑄金而爲鍾因其可也尸子曰古者倕爲規矩凖繩使天下倣焉愼子曰百工之子不學而能者非生而巧也言有常事傅子曰馬先生鈞天下之巧也有二子謂古無指南車記言之虚也先生曰古有之二子以白明帝詔先生作之而指南車成此一異也從是天下服其巧矣居京都城内有地可爲園患無水以漑之先生乃作飜車令童兒轉之而灌水自覆其巧百倍於常此二異也後人有上百戲者能設而不能動帝以問先生可動否鈞曰可動帝曰其巧可益否對曰可益受詔作之以大木雕構使形􅀂輸平濳以水發焉設爲女樂舞象使木人擊鼓吹簫木跳丸擲自出自入百官行署變巧百端此三異也先生見諸􅁑亮連弩曰巧則巧矣未盡善也言作之可令加五倍甞試以車輪懸瓴甓數十飛之數百歩矣馬先生之巧雖古般輸墨翟王尓漢丗張平子不能過也又曰馬先生爲機器未成裴丗子疑而難之先生口屈不能對傅子謂裴子善乎言而不巧馬氏長於巧而短於言巧者天下之微事抱朴子曰善圍碁者丗謂之碁聖故嚴子卿馬綏明有碁聖之名書聖皇象胡昭是也􅀞聖衛恊張墨是也木聖張衡馬鈞是也孔藂子曰孔附謂陳玉曰梁人有楊田者􅇊巧過人骨勝肉飛􅀶物志曰近丗有田夫至巧而不自􅁴也其婦稱之猶不自知乃削木爲小麥試籴之無疑歸磨乃􅁴非麥論衡曰傳稱魯般墨子之巧刻木爲鳶飛之三日而不集下也夫言其以木爲鳶飛之可也言其三日不集増之也猶丗傳言魯般巧亡其母矣言其巧工爲母作木車馬木人御者機􅀜備具載母上臺去而不還失其母焉楊泉物理論曰夫蜘蛛之羅蜂之作巢其巧妙矣而况於人乎故工匠之方規圎矩出乎心巧成於手迹非睿敏精宻孰能著勲成形以周器用哉晉讃曰陳勰以工巧見知太平御覽卷第七百五十二
