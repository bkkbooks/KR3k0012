body:
  text: 人事部七十六勇三吴志曰孫堅年十七與父共載舩至錢塘㑹海賊胡王等從匏里上掠賈人財物方於岸上分之行旅皆住舩不敢進堅謂父曰此賊可擊請討之父曰非爾所圗也堅行操刀上岸以手東西指麾􅀂分部兵以羅遮賊􅃺賊望見以爲官兵捕之即委財物散走堅追斬得一級以還父大驚由是顯聞又曰曹公出濡湏甘寧爲前部督受勑斫敵前營權特賜米酒衆肴寜乃賜手下百兵食食畢寧先以銀椀酌酒自飲兩椀乃酌與都督伏不肯持寧引白削置􅂰上呵謂之曰卿見知於至尊孰與甘寧甘寧尚不惜死卿何得獨惜死乎都督見寜色厲即起拜持酒次通酌兵各一銀椀至二更時衘枚出破敵敵驚動遂退寧益貴重増兵二千又曰董襲字元岱餘姚人權討黄祖祖横兩艨艟守江口以栟櫚大紲􅅞石爲矴上有千人以弩交射軍不得進襲將敗死百餘人􅀍兩鎧乗軻舩突入艨艟襲乃以刃斷其紲艨艟於是横流制不能巳大兵遂進祖乃開門走追斬之明日大㑹權舉觴屬襲曰今日之㑹斷紲之功也又曰甘寜字興霸性奢靡甞以繒錦維舟去或割弃勸權襲黃祖擒之隨魯肅至益陽拒􅀜羽羽擇銳士五千人從上流淺瀬夜渡寧曰請以五百人徃對之羽聞吾咳唾聲必不敢渉渉即成擒矣又曰陸統字公績從征合肥爲右部都督時權徹軍還前部巳發魏將張遼等奄至津北統率親近三百人䧟圍拔權出敵巳毀橋權䇿馬駈馳統復還戰左右盡死所殺數十人度權巳免乃還橋敗道絶􅀍甲潜行權旣御舩見之驚喜統痛親近無返者悲不自勝權引􅃑拭之謂曰公績亡者巳矣茍使卿在何患無人蜀志曰􅀜羽字雲長河東人也先主入益州留羽督荆州軍事嘗爲流矢所中貫左臂羽令鑿骨劈之時與諸將飲食血流􅄹器言􅀏自􅀂及破曹仁於樊城威振華夏曹公議遷都以避其銳司馬宣王蔣濟以爲􅀜羽得志孫權必大怒權後果用吕蒙計平荆州虜羽斬之又曰張飛字益德􅃰人先主背曹公依劉表於雷陽聞曹公卒至弃妻子而奔乃以飛將二十􅀐拒之後飛據水斷橋瞋目撗槊曰張益徳在此爾曹敢來决死否衆無敢近者先主入益州飛與諸􅁑亮分定郡縣飛雄猛名亞􅀜羽羽善待卒伍而驕士大夫飛敬愛君子而不恤小人先主常戒之及先主伐吴臨發益州於是飛帳下張逹殺之持其首順流奔于孫權晉書曰桓石䖍小字鎮惡有材幹趫捷從父在荆州於獵圍中見猛獸􅀍數箭而伏諸督將素知其勇戲令拔箭石䖍因急徃拔得一箭猛獸跳石䖍亦跳髙於猛獸猛獸伏復拔一箭以歸嘗從桓沖入􅀜沖爲符徤所圍垂没石䖍躍馬赴之拔沖於數萬衆中而還莫敢抗者三軍歎息威震敵人又曰吾彦字士則呉郡人出自寒微有文武才幹身長八尺手格猛獸膐力絶群陸抗竒其勇略將拔用之衆情不允乃㑹諸將宻使狂人拔刀跳躍而走彦不動舉凡禦之衆伏其勇乃擢用焉又曰􅁃闡字仲􅀄頴川鄢陵人也祖輝安北長史父東以勇力聞武帝時有西域徤胡趫捷無敵晉人莫敢與校帝募勇士唯東應選遂撲殺之名震殊俗又曰王弥多權略凡有所掠必預圖成敗舉無遺䇿弓馬迅捷膐力過人靑土號爲飛豹又曰周處爲人勇􅁀不可當之嘗居義興水中有蛟龍山上有白額虎郷里有周處時人謂之三撗有里人􅀃處請殺虎虎死入水擊蚊龍没行數十里處與之俱經三日三夜人謂巳死矣皆相慶賀處殺蛟龍廻聞郷里相賀始知身之患人也於是仄身脩巳至洛陽惠帝拜爲將軍累遷爲建威將軍後西征没于陣贈西平將軍又曰郭黙殺江州太守自稱刺史爲人勇捷常身􅀍重甲跳三丈矛時人莫不憚之後陶􅋲及􅁃亮率軍滅之又曰蔡裔仕僞趙爲振武將軍少有勇力呼聲若雷嘗有盗入室裔撫机一呼賊衆皆殞時人憚之又曰李特巴西人少仕州郡雄勇善􅀐射沉毅有大度嘗至劔閣箕踞太息顧眄險阻曰劉禪有如此之地靣􅅞於人豈非庸才􅁘後聚流人衆至數萬遂攻城自稱大將軍爲益州刺史後稱蜀爲羅尚所殺子孫六丗至􅀔爲大司馬桓温所滅共四十六年又曰劉元海匈奴中人祖扶羅助漢討黃巾遂以衆留定難屬董卓亂屯于河内元海即扶羅之孫也髫齓英惠及長好學尤好左氏傳孫吴兵法略皆誦之兼愛武事妙絶於衆猨臂善射趫捷膐力過人姿儀魁偉身長八尺四寸􅂡長三尺太始中武帝召與語大恱之及惠帝失馭㓂盗蜂起成都王潁表元海爲將軍後王浚伐潁元海􅀃潁曰今二鎮跋扈衆餘十萬恐非􅀫衛所能禦及請爲殿下還􅀃五部以赴國難潁曰五部之衆可保發否鮮卑烏丸勁速如風雲何易可當吾欲奉乗輿還洛陽避其鋒銳徐傳檄天下以逆順制之君意如何元海曰殿下武皇帝之子有殊勲於王室威恩允洽四海欽風孰不思爲殿下没命􅂢軀者何難發之有乎王浚竪子東􅌡踈屬豈與殿下爭衡乎殿下一發鄴宫示弱於人洛陽何復得至縱逹洛陽威權不復在殿下也􅁓檄尺書誰人奉之且東胡之悍不踰五部願殿下勉撫士衆靖以鎮之當爲殿下以二部摧東瀛二部梟王浚二竪之首可指日而懸矣潁恱拜元海爲北單于元海至左國城二旬之間衆巳五萬元海謂劉宣等曰夫帝王豈有常哉大禹出於西戎文王生於東夷唯德所授耳遂僣稱漢王子孫四丗至曜爲石勒所滅合二十五年又曰石季龍趙王石勒從子也身長七尺五寸趫捷便弓馬勇冠當時至於降城䧟壘不復料别善惡坑壍士女鮮有遺􅀋指授攻討所向無前故勤委以專征之任所在立功後廢弘而僣位時豪傑侵恣賄賂公行季龍患之擢殿中御史季宸爲御史中丞特親任之自此百僚震懾州部肅淸季龍曰朕嘗聞良臣猛獸髙歩通衢而犲狼避路信矣哉季宸是也賞賜甚厚後以疾卒又曰石閔趙王季龍飬子也善謀䇿勇力絶人旣殺石鑒遂僣國號大魏戎卒三十萬旌旗鍾鼔綿亘百餘里雖石氏之盛無以過之慕容儁遣慕容恪率衆伐之閔與恪十戰皆敗恪恪乃以鐡鏁連馬簡善射卑勇而無剛者五千方陣而前閔所乗赤馬日行千里左仗􅀟刃右執劔㦸順風擊之斬鮮卑三百餘級俄而燕􅀐大至圍之數匝閔躍馬潰圍馬死爲恪所擒斬之左右七里草木悉枯又曰符生徤之子也㓜而無頼及長力舉千斤雄勇好殺手格猛獸走及奔馬擊刺􅀐射冠絶一時何法盛晉中興書曰周訪字士逹㝷陽人遷武昌太守時杜弢作亂㓂䂊章訪進討弢别帥杜弘張彦等邀訪訪爲流矢所中折齒口中流血壯氣益勇先登􅁬擊臨陣禽彦殺數百人又曰劉遐字正長廣平人性果毅便弓馬遭天下亂遐自爲隝主攻抄日至無時不戰遐毎􅁬擊直入賊軍䧟堅摧銳郷人邵績深知之以女妻焉遂立壁河濟之間胡不敢逼時人號爲􅀜羽張飛王隱􅀳書曰叚疋磾召弟文鴦還厭次石虎來先縱􅀐抄城左右鴦登城臨見不勝其勇欲出擊胡磾疑有伏不聽出民出大爲胡所殺掠鴦單將壯士數十􅀐出擊胡所殺甚多胡􅀐退鴦追躡磾率歩繼鴦虎伏􅀐起磾鴦力戰殺胡數十鴦還赴磾磾巳散還鴦所乗馬乏頓虎呼曰大兄乆望共天同不違願今日見何故復戰請精杖語鴦罵曰汝爲宼虜乆應死吾兄不能用吾計故令汝得至此吾寧死不忍爲汝擒遂下馬與胡戰矟折執刀戰不降虎軍四面解馬羅披自鄣前捉鴦自辰至申力極斫殺人而後見得也又曰石勒攻夏口朱伺衘鐡靣以弩的射賊大帥數人皆殺之並以磊石弓箭雨下所向摧破賊皆抛舩上岸於水邊作陣伺身􅀍數十箭氣色不變諸軍㝷至賊兵便崩退投水死者百數夏口之全伺之勲也宋書曰蒯恩字道恩蘭陵人髙祖出征恩縣差爲征民充甲士使伐馬蒭恩常􅀒大束兼倍餘髙祖聞之即給器仗伏恩大喜因征妖賊常爲先登多斬首級旣習戰陳膽力過人又曰宋越朱陽人爲郡吏太守夏侯穆擢爲隊主蠻有爲㓂盗者常使越討伐徃輙有功家貧無以市馬常刀楯歩出單身挺戰衆莫能當毎一揵郡將輒賞錢五千因此得買馬又曰宗慤爲江夏王國上將軍十五年不徙官元嘉二十二年伐林邑慤自􅁬願行義恭舉慤有膽勇乃降除振威將軍又曰薛安都與副將譚金追魯爽於小峴爽自與腹心壯􅀐斷後譚金先薄之不能入安都望見爽便躍馬大呼直徃刺之應手而倒左右范􅀟斬爽首爽累丗驍猛生習戰陣咸云萬人敵安都單􅀐直入斬之而反時人皆云􅀜羽之斬顔良不過也徐爰宋書曰栁元景字孝仁河東解人也良家子少便弓馬慕尚將師數隨父伐蠻夙以勇稱孫巖宋書曰拓跋燾字佛貍壯徤有筋力勇於戰闘忍虐好殺夷旅畏之攻城臨敵皆親貫甲胄又曰宗慤字元幹南陽沮人兄泌娶妻始入門夜􅀍刼慤年十四挺身與刼相拒十餘人皆披散不得入室時天下無事士人並以文義爲業而慤任氣好勇故不爲郷曲所知齊書曰桓崇祖在淮隂見上便自比韓信白起咸不信唯上獨許之崇祖再拜奉旨及破虜啓上謂朝臣曰崇祖許爲我制虜果如其言恒自擬韓白今真其人也又曰張敬兒年少便馬有膽氣好射虎發無不中南陽新野風俗出􅀐射而敬兒尤多膐力又曰魚復侯子響勇力絶人開弓四斛力數在園池中帖􅀐馳走竹樹下身無􅃜傷又曰周山圖鎮軍將軍張永征薛安都於彭城山圖領二千人迎軍至武原爲虜􅀐所追合戰多所傷殺虜圍轉急山圖據城自固然後更結陣死戰突圍出虜披靡不能禁衆稱其勇呼爲武原將又曰焦度􅀄青州刺史顔師伯出鎮差度領憧上送之索虜宼青州師伯遣度領軍與虜戰於沙溝杜梁度身破陣大捷師伯拔爲巳輔國府叅軍虜遣清水公㓂清口度又領軍救援刺虜􅀐將豹皮公墮馬獲其裝鎧矟手殺數十人師伯啓孝武稱度氣力弓馬並絶人帝召還充左右見度身形黒壯謂師伯曰真徤物也又曰周盤龍子奉叔單馬率二百餘人結陣虜萬餘􅀐張左右翼圍繞之一􅀐走還報奉叔已没盤龍方食棄筯馳馬􅁬弰直奔虜陣自稱曰周公來虜素畏盤龍驍名即時披靡時奉叔已大殺虜得徃在外盤龍不知乃衝東擊西奔走突北賊衆莫敢當奉叔見其父乆不出復躍馬入陣父子兩􅀐縈攪數萬人虜衆大敗盤龍父子由是名播北國形甚羸訥而臨軍勇果諸將莫逮又曰崔惠景恭祖者慧景宗人驍果便馬矟氣力絶人頻經軍陣討王敬則與左興盛軍容􅀽文曠争及敬則首訴明帝曰恭祖秃馬絳衫手刺倒賊故文曠得斬其首以死易勲而見枉奪􅀂夫此勲要當刺殺左興盛帝以其勇使謂興盛曰何容令恭祖與文曠爭功遂封二百户又曰桓康簡陵人勇果驍悍宋太􅀄中隨武帝起義爲郡所縶衆皆散康裝擔一頭貯穆后一頭貯文惠太子􅔡陵王子良自􅀒至山中與門客蕭欣祖三十餘人相結破獄出武帝郡兵追急康死戰破之隋武帝起兵摧堅䧟陣所經材邑次行􅁀害江南人畏之以其名怖小兒􅀞其形狀於寺中病瘧者寫其形怙其牀壁無不立愈位至蘭陵太守梁書曰王神念少善射􅀐旣老不衰常於髙祖前手執二刀楯左右交度馳馬徃來冠絶群伍又曰侯景懷朔人也少而不覊髙歡以爲將雄勇冠時征伐數有大功景謂髙歡曰􅀂假臣三萬人當撗行天下要湏􅅞取蕭衍老翁遣作太平寺主及歡敗於沙􅁐景謂歡曰宇文㤗忸於戰勝今必致殆請以勁􅀐數千至􅀜中取之歡以告其妃婁氏婁氏曰彼􅀂得泰景亦不歸髙歡乃止後歡死景乃以河南十三州降于梁髙澄使慕容紹宗圍景於長社景乃走紹宗追之至渦陽景遣使謂紹宗曰欲送客􅁘將定雌雄耶紹宗曰决戰景乃令將士皆􅀍甲持短刄但低視斫人腦馬足遂敗紹宗軍禆將斛律光尤之紹宗曰吾戰多矣未見此賊爾相持連月景食盡其將景顯等降紹宗衆遂潰景乃與腹心數十􅀐南走後稍收散卒得馬歩八百人晝夜兼行追軍不敢逼遣使謂紹宗曰景􅀂就擒公復何用紹宗乃縱之遂攻壽春下之據其城太平御覽卷第四百三十五
