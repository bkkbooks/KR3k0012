front:
  text: 太平御覽卷第五十一
  hash: sha256:1e457789bea391ba721cad33899da0f91601431d665c48963b6216e8fb492039
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_051-1a}
body:
  text: 地部十六石上釋名曰山體曰石石硌硌也硌音落堅捍硌也山多大石曰礜口學切礜學也大石之形學學然山多小石曰磝五交切磝堯也毎石堯堯獨處而岀也礫小石也磊雷罪切衆石也碭杜浪切文石也琅玕石似珠也出尚書注碔砆石似玉也出廣雅易曰困于石據于蒺䔧石在水中所以爲隂難又􅀃卦曰艮爲小石書曰青州厥貢鈆松怪石孔安國曰怪異好石似玉又曰泗濵浮磬孔安國注云泗水濱涯也水中見石可以爲磬也詩曰我心匪石不可轉也又曰漸漸之石維其髙矣又曰它山之石可以攻玉禮曰昔者夫子居於宋見桓司馬自爲石槨三年而不成桓司馬宋向戍孫也名魋也夫子曰若是其靡也死不如速朽之愈也又曰今夫山一拳石之多及其廣大草木生之禽獸居之寳藏興焉周禮曰王行洗乗石乗石王所登上居之石也又曰石有時而􅘧音勒石解散也又曰大司宼以嘉石平罷民有罪者坐諸嘉石以肺石達窮民凢焭獨老㓜欲復於上而未達者立於肺石注曰嘉石文石地肺石赤石也傳曰隕石于宋五隕星也注曰但直言星則嫌星使石隕故重言隕星又曰齊髙固入于晉師磔石以投人又曰昭三年石言於晋魏榆晉侯問於師曠曰石何故言對曰石不能言或慿焉不然民聽濫也抑臣又聞之曰作事不時怨讟動於民則有非言之物而言今宫室崇侈民力彫盡怨讟並作莫保其性石言不亦冝乎春秋􅀃題辭曰周易艮爲山爲小石石隂中之陽陽中之隂隂精輔陽故山合石石之爲言託立法也史記始皇二十年星墜于東郡至地爲石或刻其文曰始皇死而地分始皇盡誅石勞人燔銷其石又按􅀃􅁐云石隕東郡是也又曰王翦代李信擊荆州兵數挑戰終不岀乆之翦使人問軍中戯乎對曰方投石超距翦曰士卒可用矣又曰張良見老人出一篇書讀是則爲王者師後十三年見我濟北榖城山下黄石即我也良後果得黄石寳而祠之及死并葬黃石伏臈祠之又曰李廣岀獵見草中石以爲虎而射之中石没鏃視之石也因復更射之終不能復入石矣後漢書曰梁鴻妻孟光有力能舉石曰又趙歧曰吾死後置一圎石墓前刻曰漢有逸人姓趙名歧有志無時命也柰何謝承後漢書曰呉郡嬀皓父爲南郡太守坐事繫獄皓懷小石至公卿門輙出石叩頭流血覆面父遂得免東觀漢記曰􅃰郡太守張豐舉兵反􅀄豐好方術有道士言豐當爲天子以五綵囊盛石繫豐肘云石中有玉璽豐信之遂以反旣當斬猶曰肘有玉璽椎破之豐乃知􅀍詐仰天歎曰當死無所恨魏略曰梁州柳谷有石無故自崩石有丈如率馬之狀後司馬氏得天下之應又曰太秦國石爲城郭山出九色玉石魏志曰魏明帝増崇宫殿雕鏤觀閣鑿太行之石英採榖城之文石起景陽山於芳林園建昭陽殿於太極之北又曰辰韓在馬韓之東兒生便以石押頭欲其扁今辰韓人頭皆扁又曰公孫度爲遼東太守時生大石長丈餘下有三小石爲足魏武帝末年鄴中雨五色石王隱晋書曰永康元年襄陽郡上言得鳴石鍾聞七八里又石勒傳曰初勒郷里所居原上地中石生日長􅀋鐵之象又曰陳緫遷殿中侍御史詔遣詣終南山請石緫先除小石祠唯有大石一所而祁之上文曰峩峩大石佐岳通理合滋吐潤惠我四海又曰孫子荆謂王武子曰當枕流漱石曰石非可嗽流非可枕孫曰所以枕流洗其耳漱石礪其齒晉陽秋曰董威輦遁去莫知所之於其寢所得一石及竹子并詩二首齊書曰虞愿爲晉平太守海邊有越王石常隱雲霧相傳云清廉太守乃得見愿往觀視清澈無隱蔽南史曰到漑山池有竒礓石長一丈六尺梁武覩之輸焉即迎置華林宴居殿前移石之日都下傾城縱觀所謂到公石趙書曰劉耀築建德殿取土城西得圎石狀􅀂水碓其銘曰律推石重四釗同律度量衡有辛氏造議者未之詳或以爲瑞叅軍續咸曰王莽時物後周書曰髙琳母嘗祓禊泗濵遇見一石光彩朗潤遂持以歸是夜夢見一人衣冠有􅀂仙者謂其母曰夫人向所將來之石是浮磬之精能寳持必生令子其母驚寤便舉體流汗俄而有姙及生子因名琳字季珉也隋書曰帝令江都郡丞王世充發淮南兵擊劉元進有大流星墜於江都未及地而南逝磨拂竹木皆有聲至呉郡而落于地元進惡之令掘地入二丈得一石徑丈餘後數日失石所在唐書曰車騎將軍劉山濤上言祖龍潜時數往來落郊之莊舎嘗踐子石靴迹見於石中至今猶在髙祖令鑿之深寸餘其迹逾明乃止又曰則天時有人於洛水中得白石數􅀧赤詣闕輙進諸宰相詰之對曰此石赤心所以來進李昭徳叱曰此石赤心洛水中餘石豈能盡反􅁘左右皆􅀏又曰薛元超道衡孫也爲中書舎人省有盤石初道衡爲内史侍郎嘗踞而草制元超毎見此石未嘗不泫然流涕又曰甘露事敗王璠舉家無少長皆死初璠在浙西繕城壕役人掘得方石上有十二字云山有石石有玉玉有瑕即休璠視莫知其旨京口老人講之曰此石非尚書之吉兆也尚書祖名崟崟生礎是山有石也礎生尚書是石有玉也尚書之子名遐休休絶也庸非吉徴果赤族老子曰落落如石列子曰昔者女媧練五色之石以􅀘天淮南子又載又曰趙襄子率徒十萬狩於山中藉芿燔林煽赫百里有一人從石壁中岀隨烟燼上下衆謂鬼物察之人也孫卿子曰以桀詐桀猶有巧拙以桀詐堯􅀂􅆑投石又曰􅀒石而走赴河行之難爲者也而申徒狄能之闕子曰宋之愚人得燕石於梧臺之東歸西藏之以爲大寳周客聞而觀焉主人端冕玄服以發寳華匱十重緹巾十襲客見之盧胡而􅀏曰此燕石也與瓦甓不異主人大怒藏之愈固符子曰水生石未有居山而溺者火生木未有抱樹而焦者吕氏春秋曰石可破也而不可奪其堅淮南子曰禹娶塗山化爲石在嵩山下方生啓曰歸我子石破北方而生啓又畢萬術曰埋石四隅家無鬼取蒼石四枚及桃七枚以桃􅓡射之乃取併埋弓矢四隅故無鬼殃抱朴子曰白石似玉姦佞似賢又曰礠石引針又曰浮磬息音未別於衆石又曰燒泥爲瓦燔木爲炭蜂窠爲蠟水沬爲浮石隋巢子曰禹産於䃂石啓生於石王韶之云啓生即母化爲石六韜曰武王伐殷得二大夫而問之曰殷國將亡亦有妖乎其一人對曰殷國常雨血雨􅁅􅀨石小者如雞子大者如箕武王曰大哉妖也樂資春秋傳曰秦始皇使鄭容將入凾􅀜見華山上有素車白馬疑之􅀑神熟視稍近問鄭容曰安之荅曰之咸陽素車上人曰吾華山使願託一牘書致鎬池君所子之咸陽道過鎬池見一大梓樹有文石以欵樹當有應者即以書與之鄭容如其言以石欵梓樹果有人來取書呉越春秋曰禹案黄帝中經見聖人所記曰在乎九疑上東南號曰宛委承以文玉覆以盤石其書金簡玉字禹乃退齋三日發石取書荆楚歳時記曰張騫㝷河源得一石示東方朔朔曰此石是天上織女支機石何至於此神仙傳曰壷公内費長房於石室中頭上有大石方數丈以茅縄懸之諸虵競齧且斷長房不移公撫之曰子可教矣又曰介象字元則㑹稽人入山求神仙見谷有石子皆紫色大如雞子象取二枚見一美女􅀍服五采象叩頭乞長生女曰急送汝手中物還着故處象送石還女授以還丹方一首列異傳曰豫寧女子戴氏乆疾出見小石曰尓有神能差我疾者當事汝夜夢人告之吾將祐汝後漸差遂爲立祠名石侯祠益部􅂄舊傳曰公孫述時蜀武檐山石折任文公曰西州智士死我將死矣後三月果卒韓詩外傳曰楚渠子夜行見寢石以爲伏虎彎弓而射之没金飲羽下視知其石也因復射之矢摧無迹漢書載李廣亦如之文士傳曰魏文帝之在東宫也宴諸文學酒酣命甄后拜坐者坐者咸伏惟劉楨平仰觀之太祖以爲不敬送徙􅀠簿後太祖乗歩牽車乗城降閲簿作諸徒咸敬而楨坐磨石不動太祖曰此非劉楨也石如何性楨曰石出荆山􅀇巖之下外炳五色之章内秉堅貞之志彫之不増文磨之不加瑩氣質貞正禀性自然太祖曰名豈虚哉神仙傳曰白生者常煑白石爲粮就白石山居故號曰白石先生穆天子傳曰天子升于采石之山是取采石鑄以成器于黒水之山三齊略記曰始皇作石塘欲過海看日岀處時有神人驅石下海石去不速神輙鞭之皆流血至今石悉赤陽城山盡起立嶷嶷東傾狀如相隋行事具神部盛弘之荆州記曰興安縣水邊有平石其上有石櫛石履各一具俗云越王渡溪脫履墮櫛於此郭縁生述征記曰秦梁圯名也或云秦始皇東巡弗行舊道過此水率百官巳下人提一石以塡之俄而梁成今覩所累石無造之處也搜神記曰常山張顥爲梁相天新雨後有鳥如山鵲飛翔入市人擲之墯地人争取化爲圎石顥椎得一金印文曰忠孝侯印太平御覽卷第五十一
