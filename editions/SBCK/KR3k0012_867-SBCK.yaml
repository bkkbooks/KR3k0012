front:
  text: 太平御覽卷第八百六十七
  hash: sha256:6eb6501d0899afa7f53bda27abb061338cde071dd06edf86cafbe2c82f2a656f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_867-1a}
body:
  text: 飲食部二十五茗爾雅曰檟苦茶樹小似梔子冬至生葉可煑作羮飯今早採者爲茶晚採者爲茗一名􅈋蜀人名爲苦茶吴志曰孫皓每宴席無不能酒率以七􅂛爲限雖不悉入口澆灌取盡韋曜飲酒不過二􅂛􅀄見禮異宻賜茶茗以當酒晉中興書曰陸納爲呉興太守時衛將軍謝安甞欲詣納納兄子俶恠納無所備不敢問之乃􅀻蓄十數人饌安旣至納所設唯茶果而巳俶遂陳盛饌珎羞必具及安去納杖俶四十云汝旣不能光益叔父柰何穢吾素業晉書曰夏侯愷亡後形見就家人求茶又曰桓温爲楊州牧性儉素毎讌唯下􅃮萯扑茶果而巳宋録曰新安王子鸞豫章王子尚詣曇濟道人於八公山道人設茶茗尚味之曰此甘露也何言茶茗焉南齊書曰武帝遺詁靈坐勿以牲爲􅀕唯設餅果茶飯酒脯而巳唐史曰風俗貴茶之名品益衆劒南有􅀩頂石花或散牙號爲第一湖州顧渚之紫笋東川有神泉昌明硤州有碧澗明月房茱茰寮福州有方山之生牙䕫州有香山江陵有南木湖南有衡山岳州有㴩湖之舎膏常州有義興之紫笋婺州有東白睦州有鳩坈洪州有西山之白露壽州有霍山之黄芽蘄門之啇貨不在焉又曰竟陵僧有於水濵得嬰兒者育爲弟子稍長自筮遇蹇之漸繇曰鴻漸于陸羽可用爲儀乃姓陸氏字鴻漸名羽羽有文學多意思耻一物不盡其妙茶術最著鞏縣爲瓷偶人號陸鴻漸買十器得一鴻漸市人沽茗不利輙灌之羽於江湖稱竟陵人於南越稱桑苧翁貞元末卒又曰韓滉聞奉夭之難以采練囊緘茶末徤歩其以進也又曰貞元九年春􅀄稅茶先是諸道塩鐵使張滂奏曰伏以去秋水災詔令减稅今之國用湏有供備伏請出茶州縣及茶山外啇人要畧委所由定二等時估每十稅一價錢充所放兩稅其明年巳後所得稅外収貯􅀂諸州遭水旱賦稅不辦以此代之詔曰可仍委張滂具處置條奏自是每歳得錢四十萬貫茶之有稅自此始也然稅茶無虚歳遭水旱處未甞以茶稅錢拯贍又曰大和七年正月呉蜀貢新茶皆於冬中作法爲之上務恭儉不欲逆其物性詔所貢新茶冝於立春後造又曰大和九年十月王涯獻茶以涯爲搉茶使茶之有稅自涯始又曰大和九年十二月諸道塩鐵轉運搉茶使令狐楚奏搉茶不便於民請停從之又曰元和十四年歸光州茶園於百姓從刺史房克讓之請又曰􅀄常魯使西蕃烹茶帳中蕃人問曰何爲者魯曰滌煩療濁所謂茶也蕃人曰我此亦有命取以出指曰此壽州者此顧渚者此蘄門者晏子春秋曰嬰相齊景公時食脫粟之飯炙三弋五夘茗菜而巳廣雅曰荆巴間采茶作餅成以米膏出之􅀂飲先炙令色赤擣末置瓷器中以湯澆覆之用葱薑芼之其飲醒酒令人不眠􅀶物志曰飲真茶令少眠睡神農食經曰茶茗冝乆服令人有力恱志又曰茗苦茶味甘苦微寒無毒主瘻瘡利小便少睡去痰渇消􅀫食冬生益州川谷山陵道傍凌冬不死三月二月採乾華佗食論曰苦茶乆食益意思壷居士食志曰苦茶乆食羽化與菲同食令人身重陶弘景新録曰茗茶輕身換骨丹丘子黄山君服之王浮神異記曰餘姚人虞洪入山采茗遇一道士牽三青牛引洪至瀑布山曰吾丹丘子也聞子善具飯常思見惠山中有大茗可以相給祈子他日有甌蟻之餘不相遺也因立奠祀後令家人入山􅀗大茗焉廣陵􅂄老傳曰晉元帝時有老姥每旦擎一器茗徃市鬻之市人競買自旦至暮其器不减茗所得錢散路傍􅀌貧乞人人或異之執而繫之於獄夜擎所賣茗器自牖飛去廣志曰茶叢生直煑飲爲茗茶茱茰檄子之属膏煎之或以茱茰煑脯冐汁爲之曰茶有赤色者亦米和膏煎曰無酒茶晉書蓺術傳曰燉煌人單道開不畏寒暑常服小石子所服者有心氣兼服茶酥而巳續捜神記曰晉孝武世宣城人􅁗精入武昌山中採茗忽見一人身長一丈通體毛精見之大怖自謂必死毛人牽其臂將至山中大叢茗處放之便去精因留採滇􅁷復來乃採懷中橘與精精甚怖􅀒茗而歸又曰桓宣武有一督將因時行病後虚熱更能飲􅃨茗必一斛二斗乃飽裁减􅂛合便以爲大不足非復一日家貧後有客造之正遇其飲􅃨茗亦先聞世有此病仍令更進五􅂛乃大吐有一物出如􅂛大有口形質縮縐狀似牛肚客乃令置之於盆中以一斛二斗􅃨茗澆之此物噏之都盡而止覺小腹又増五􅂛便悉混然從口中涌出旣吐此物病遂差苦問之此何病荅云此病名斛茗瘕異􅁐曰剡縣陳矜妻少寡與二子同居奸飲茶家有古􅊘毎飲輙先祠之二子欲掘之母止之夜夢人云吾止此􅊘三百餘年今二子􅁪欲見毀頼相保護又享吾佳茗雖潜朽壤豈忘翳桑之報及曉於庭中獲錢十萬似乆埋者唯貫新母告二子禱祠愈切世􅀃曰任瞻少時有令名自過江失志旣不飲茗問人云此爲茶爲茗覺人有怪色乃自申明之曰向問飲爲熱爲冷又曰晉司徒長史王濛好飲茶人至輙命飲之士大夫皆患之毎欲徃候必云今日有水厄江氏􅀓曰統遷􅉖懷太子洗馬甞上䟽諌云今西園賣醯麺茶菜藍子之屬虧敗國體晉四王起事曰惠帝蒙塵洛陽黄門以瓦盂盛茶上至尊晉劉琨與兄子南兖州刺史演書曰前得安州乾茶二斤薑一斤桂一斤皆所湏也吾體中煩悶􅁪假􅀒茶汝可信信致之傳咸司􅈻教曰聞南方有蜀嫗作茶粥賣廉事歐其器具無爲又賣餅於市而禁茶粥以囷蜀姥何哉坤元録曰辰州溆浦縣山上多茶樹括地圖曰臨城縣東北一百四十里有茶山茶溪天台記曰丹丘出大茗服之生羽翼夷陵圖經曰黄木女觀望州等山茶茗出焉楊衒之洛陽伽籃記曰彭城王􅎰戲謂王肅曰卿不重齊魯大􅀖而愛邾莒小國肅對曰郷曲所羙不得不好􅎰復謂曰卿明日顧我爲卿設邾莒之飡亦有酪奴因此復號茗取飲爲酪奴時給事中劉縞慕肅之風専習茗飲彭城王謂縞曰卿不慕王侯八珎如好蒼頭水厄海上有逐臰之夫里内有學嚬之婦以卿言之是也其彭城王家有呉嫗以此言戲之自是朝貴讌㑹雖設茗飲皆耻不復食雖江表殘民逺來降者侍中元义欲爲之設茗先問卿於水厄多少蕭正德不暁人意荅下官雖生水郷立身巳來不遭陽侯之難舉坐􅀏焉桐君録曰西陽武昌晉陵皆出好茗巴東別有真香茗煎飲令人不眠又曰茶花狀如梔子其色稍白永嘉圖經曰縣東有白茶山呉興記曰烏程縣西有温山出御􅈋淮隂圖經曰山陽縣南二十里有茶坡茶陵縣圖經曰茶陵者謂陵谷生茶茗本草拾遺曰皐盧茗作飲止渇除疫不睡利水道明目生南海諸山中南人極重之廣州記曰酉平縣出臯盧茗之利茗葉大而澁南人以爲飲南越志曰茗苦澁亦謂之過羅陸羽茶經曰茶者南方嘉木自尺二尺至數十尺其巴川峽山有兩合抱者伐而掇之其樹如􅀲蘆葉如梔子花如白薔薇實如栟櫚蔕如丁香根如胡桃其名一曰茶二曰檟三曰蔎四曰茗五曰荈周公云檟苦茶楊執戟云蜀西􅀯人謂茶曰蔎郭弘農云早取爲茶晚取爲茗一曰荈蔎音設荈音昌兖切其上者生爛石中者生櫟壤下者生黄土凢藝而不茂法如種􅋎三歳可採陽岸隂林紫者上緑者次笋者上牙者次葉卷者上葉舒者次凢採茶在二月三月四月之間茶之笋者生爛石沃土長四五寸􅀂薇蕨始抽陵露采爲茶之牙發於藂薄之上有三枝四枝五枝者選中枝頴枝者采焉其日雨不採晴有雲不採蒸拍焙穿封乾矣有千􅀋萬狀鹵莽而言之如胡人鞾者蹙縮然犎牛臆者廉憺然浮雲出山者輪囷然輕颷拂水者􅉼澹然有如陶家之子羅膏土以水澄泚之又如新治田者過􅁀雨流潦之經此皆茶之精􅃾也有如竹籜者枝幹堅實難於蒸擣故其形籭篵上音離下音帥如霜荷者莖葉凋趄易其狀白故其萎萃然此皆茶之塉老也自采至于封曰七經自胡人至于霜荷八等唐新語曰右􅀘闕母景􅀶學有著述才性不飲茶著代茶飲序其畧曰釋滯消擁一日之利蹔佳瘠氣侵精終身之累斯大􅀗益則歸功茶力貽患則不謂茶災豈非福近易知福逺難見者乎雲南記曰名山縣出茶有山曰蒙山聮延數十里在縣西南按拾道志尚書所謂蔡蒙旅平者蒙山也在雅州凢蜀茶盡出此魏王花木志曰茶葉似梔子可煑爲飲其老葉謂之􅈋細葉謂之茗杜育荈賦曰調神和内倦懈康除張孟陽登成都樓詩云芳茶冠六清溢味播九區人生苟安樂兹土聊可娛左思嬌女詩曰吾家有好女皎皎常白晳小字爲紈素口齒自清歴其始字蕙芳眉目粲如畫馳鶩翔園林草木皆生摘貪走風雨中倐忽數百適心爲茶荈劇吹嘘對鼎䥶孫楚出歌曰茱茰出芳樹顚鯉魚出洛水泉白鹽出河東羙鼔出魯川薑桂茶荈出巴蜀椒橘木蘭出髙山蓼􅂫出溝渠秕出中田太平御覽卷第八百六十七
