body:
  text: 西􅁗乞伏國仁乞伏乾歸乞伏熾盤乞伏慕末北燕馮䟦馮文通夏赫連勃勃赫連昌赫連定西􅁗乞伏國仁崔鴻十六國春秋西􅁗録曰乞伏國仁隴西鮮卑人其先自漠北南出太隂山五丗祖拓隣晉太始􅀄率户五萬遷居髙平川隣卒子詰權立遷于牽屯權卒子利郍立郍卒弟祁泥立祁泥卒郍子述延立遷于苑川延卒祁泥子傉大寒立石勒之滅劉曜也懼而遷于麥田無􅀌山寒卒子司繁立􅁗始皇中遷于度堅山建元七年􅁗將王統來伐繁率􅀐三萬拒統于苑川統潜襲度堅山部民五萬餘落悉降于統繁乃詣統歸降符堅拜南單于留之長安後以爲鎭西將軍鎭勇士川甚有威惠之稱司繁卒國仁即位聞堅征晉奔敗仁収衆至十餘萬又聞堅爲姚萇所殺於是自稱大都督大將軍大單于領􅁗河二州牧改􅁗建元二十一年爲建義元年置武陵苑川等十一郡築勇士都城以都之三年符登遣使拜仁大將軍苑川王四年六月薨僞謚曰烈王廟號烈祖乞伏乾歸崔鴻十六國春秋西􅁗録曰乞伏乾歸國仁弟雄武有度略仁薨群寮以仁子公府㓜稚乃立乾歸爲將軍大單于河南王大赦改四年爲太􅀄元年立妻邊氏爲后以南川侯出連乞都爲丞相九月遷于金城二年正月符登遣使拜爲大將軍金城王六年立子熾盤爲太子七年登遣使授左丞相河南王假黄􅃏加九錫之禮十月氐王楊定歩􅀐四萬來伐歸勒衆而進大敗定軍斬定及首級萬有七千於是盡有隴西之地十二月􅆫稱􅁗王大赦八年吕光來伐歸乃稱蕃遣子勃勃爲質旣而悔之十三年􅁗征西大將軍姚碩德率衆來伐入自兩安峽歸次于隴西以拒碩德興潜師繼發歸聞興至自率輕􅀐數千候興俄與中軍相失爲興追􅀐所逼戰敗遁歸􅁐川乃率􅀐數百馳至允吾秃發利鹿􅀌迎歸處之於晉歸將叛謀泄懼爲利鹿􅀌所害謂其子熾盤曰姚興方盛吾將歸之令送汝兄弟及汝母爲質於是送熾盤兄弟於西平歸遂奔長安姚興大悅拜河南諸軍事河州刺史歸義侯十四年姚興遣歸還鎮苑川盡以部民配之十八年正月歸至自長安十九年五月苑川地震裂十一月又朝于長安二十年姚興慮歸終爲西州之患留拜主客尚書以其子熾盤爲西夷校尉行河州刺史二十一年盤以長安亂將始乃招結諸部築城于嵻㟍山以據之更始元年歸隨姚興如平流盤攻抱罕尅之遂遣使來告歸奔還苑川遂如抱罕留熾盤鎮之歸將衆二萬遷于度堅山諸將勸稱王七月僣稱􅁗王大赦改年置百官公卿以下皆復本位四年五月歸畋于五谿山有梟集于其手歸惡之六月爲兄子公府所殺公府岀奔盤遷于抱罕遣弟廣武將軍智逹追擒公府于嵻㟍山南轘裂之八月葬歸于抱罕元平陵僞謚武元王廟號髙祖乞伏熾盤崔鴻十六國春秋西􅁗録曰乞伏熾盤乾歸太子歸薨自稱大將軍河南王改年爲永康元年以尚書令翟就爲相國封拜各有差二年盤討吐谷渾別統屈逹于渇渾川大破之俘獲男女二萬三千三年正月有五色雲起於南山盤大恱謂群臣曰吾今年應有所定王業成矣於是繕甲整兵以待四方之􅂩五月聞傉擅西征率歩􅀐二萬襲樂都傉檀降遂并南涼兵強地廣十月􅆫即􅁗王位置百官立妻吐蕃氏爲王后四年盤子元基自長安逃歸拜尚書左僕射建弘元年立第二子慕末爲太子領撫軍改年大赦九年盤􅃦疾頋命太子慕末乃薨于外􅃦六月葬武平陵謚文昭王廟號太祖乞伏慕末崔鴻十六國春秋西􅁗録曰乞伏慕末字安石熾盤之太子㓜而好學有文才建弘年立爲太子盤薨􅆫即􅁗王位大赦改年爲永􅀪元年二月立子萬載爲太子三年九月部民多叛末焚城邑毀寳器率户五千東如上邽爲赫連定所拒遂國南安十一月魏遣尚書庫結率􅀐五千迎末衛軍吉毗固諌以爲不冝遂内徙從之庫結引還四年赫連定遣其叔北平公韋代率衆一萬攻南安城内大飢人相食􅀓侍中乞伏延祚吏部尚書乞伏䟦䟦踰城奔代末乃衘璧出降送于上邽及宗族五百餘人悉爲赫連定所誅自國仁建義元年乙酉􅀊至辛未四十七載晉書曰熾盤在位七年而宋氏受禪以宋元嘉四年死子慕末嗣在位三年爲赫連定所殺始國仁以孝武大元十年􅆫位至慕末四丗凡四十有六載而滅北燕馮䟦崔鴻十六國春秋北燕録曰馮䟦字文起長樂信都人其先畢萬之後也子孫食菜馮郷因以氏焉晉永嘉之亂祖父和避地上黨父安雄有器量爲慕容永將永滅䟦東徙和龍長樂中䟦夜見天門開神光赫然燭於庭中永康末拜中衛將軍建始元年與二弟結謀襲殺慕容熈立髙雲爲主正始元年以䟦爲中外都督開府儀同三司録尚書封武邑公太平元年雲爲離班桃仁所殺下督李垂等誅班及仁群臣推䟦爲主􅆫即天王位大赦令曰義貴適時不必改作故陳氏代姜不徙齊號即號燕國改爲太平元年追尊祖和爲元皇帝父安爲宣帝子永爲太子三年七月以太子永領大單于内置四輔七年建太學以長樂劉軒營丘張熾成周翟崇爲􅀶士簡二千石巳下子弟年十五巳上教之十四年􅀫軍地燃一旬乃滅十七年二月北部人趙壽女旣嫁化爲男娶妻而無子䟦問諸群臣曰此何祥乎尚書左丞􅀓權對曰漢丗雌雞爲雄隂變爲陽君㬱臣􅆫之象卒有婦人專寵王莾篡集今女爲男臣將爲君之徴䟦曰將何以禳之權曰桑榖生朝大戊脩徳而殷道中興熒惑守心宋景責躬延齡二紀唯脩身崇善可以轉禍十八年八月立子翼爲太子䟦戒之曰吾聞君人以學爲夲不學無以立尊敬師傅人倫之始汝其夙夜䖍䖍欽承明訓二十二年八月䟦寢疾召中書監申秀侍中陽哲於内寢謂之曰吾患當不濟卿等善相吾子參決萬機九月䟦疾甚輦而臨軒命太子翼勒兵聽政以備非常宋夫人規立其子受惡翼聽政謂之曰上疾將瘳柰何便欲代父臨天下乎翼性仁弱遂還東宫一日三省疾宋夫人矯絶内外遣􅕡寺傳問而巳翼及大臣皆不得見䟦弟弘於是舉壯士數十人裹甲入禁中􅀫衛皆不戰而散宋夫人命閇東閤弘家僮庫斗頭徑捷有勇力踰閤而入至于皇堂射殺女御一人䟦驚懼而薨弘遣脩城告曰天降凶禍大帝崩背太子不侍疾群公不奔喪疑有逆謀國危社稷吾備太弟之親遂攝大位以寧國家百官叩門入者進階二等太子翼率東宫兵出戰敗退兵皆奔散弘遣使賜死命宗正馮哲黄門盧昭典葬事于東宫葬䟦於長谷陵僞謚文成皇帝廟號太祖馮文通崔鴻十六國春秋北燕録曰馮弘字文通䟦之季弟髙雲篡位拜中領軍封汲郡公太平元年拜尚書右僕射改封中山公遷尚書令司徒録尚書事䟦薨􅆫即天王位大興元年正月壬午朔大赦改年二月立夫人慕容氏爲皇后二年正月立子少玉仁爲太子六月有䑕集城西盈數里地中西行至水前者銜馬尾後者迭相銜尾而渡識者以爲民遷之象七月魏師來伐神髙八月石城邊東營丘城周四郡並降魏九月魏師引還徙民四萬餘户而西三年六月魏永昌王徤來伐五年四月遣右衛孫徳乞師于宋十二月又遣尚書陽伊請迎于勾麗六年三月端門崩四月魏又遣侍中建興公虞弼東平公鵝青伐攻尅白狼句麗將􅁑居孟光率衆數萬隨陽伊來迎屯于臨川尚書令郭生因民之憚遷開門而引魏軍魏軍疑而不赴生遂勒衆攻弘弘引句麗兵入自東門與生戰于闕下生中流矢卒句麗軍旣入城取武庫甲以給其衆城内羙女皆句麗軍人所掠五月乙卯弘率龍城見戸東徙焚燒宫殿火一旬不絶令婦人􅀍甲居中陽伊等勤精兵於外􅁑居孟先率􅀐後殿方軌而進前後八十餘里魏軍追至遼水不擊而還遣使徴弘于句麗後二年爲句麗所殺僞謚昭成皇帝自馮䟦太平元年􅀊在巳酉至弘滅亡之􅀊丙子二十八載夏赫連勃勃崔鴻十六國春秋夏録曰赫連勃勃朔方人右賢王去卑之後劉元海之族也曽祖父劉虎前趙嘉平中以宗室封樓煩公拜安北將軍丁零中郎將祖父豹後趙建武中拜平北將軍左賢王父衛辰符堅以爲西單于督攝河西諸虜屯于伐來城因􅁗末兵亂遂有朔方之地控􅁌之士三萬八千姚萇拜辰大將軍河西王大單于魏師來伐辰遣子右地代率􅀐二萬拒戰河東爲魏所敗遂乗勝濟河攻尅伐來執辰殺之勃勃辰弟三子奔􅁗髙平公没弈于妻之以女姚興以勃勃爲持節安將軍五原公配以三交五部鮮卑及雜虜二萬餘落鎮朔方時河西鮮卑杜崘獻馬八千匹于􅁗濟河至大城勃勃留之召其衆二萬襲殺髙平公没弈于而并其衆至數萬自稱天王大單于大赦改弘始十年爲龍昇元年置百官以匈奴夏后氏之苗裔􅆫稱大夏以大兄右地代爲丞相代公發嶺北民夷十萬於朔方黒渠之南營起京城大赦改龍昇七年爲鳯翔元年令曰朕之皇祖北遷幽朔改姓姒氏後從母爲劉氏子從母姓非禮也古人氏族無常王者継天爲子是爲徽赫實與天連今改姓曰赫連氏庶恊皇天之意攴庶非正統者以鐵代爲氏庶朕宗子剛銳如鐵皆堪伐人二年立夫人梁氏爲后立子璝爲太子四年九月劉􅁉滅􅁗入于長安十二月􅁉留子義真鎮長安而還勃大恱遂圗進取之計遣太子璝率􅀐二萬南伐長安五年義真遣龍驤將軍沈田子率衆逆戰璝擊敗之退屯劉廻堡八月勃進據咸陽劉􅁉大懼乃召義真東鎮洛勃入長安正月群臣勸勃稱皇帝三月壇于霸上即皇帝位大赦改鳯翔六年爲昌武元年冬十月以太子璝領大將軍雍州牧録南臺尚書事鎮長安十一月勃勃還統萬統萬統萬勃勃所都之城名也宫殿大成大赦改昌武二年爲真興元年刻石都南頌紀功德四月追尊父衛辰曰桓皇帝廟號太祖母符氏爲桓文皇后父豹曰宣皇帝曽祖虎曰景皇帝祖訓兒曰元皇帝五月雨魚于統萬二年十月起冲天臺于統萬南山欲登之以望長安六年勃將廢太子璝爲􅁗王以酒泉公倫爲太子璝聞將廢巳率衆七萬北伐倫倫率􅀐三萬拒之戰於平爲璝所敗倫死之太原公昌率􅀐一萬襲殺璝率衆八萬五千歸于統萬勃大恱立昌爲太子七月勃寢疾八月疾甚輦昇永安殿召群臣屬以後事薨於永安殿年四十五謚武烈皇帝葬嘉平陵廟號丗祖赫連昌崔鴻十六國春秋夏録曰赫連昌一名折勃勃之第三子身長八尺魁岸羙姿貌勃薨即位于永安臺大赦改真興七年爲永光元年七月杏城劉睹川有青石大如馬頭浮在水上逆流而行人見而送之十月魏乗虚來伐三年五月戰于黒渠爲魏所敗昌與數千􅀐奔還魏追􅀐亦至昌留河内公費連烏提守髙平徙諸城民七萬户于安定以都之四年二月魏軍至安定三月城潰昌奔􅁗州魏東平公鵝青追擒之送于魏魏封昌􅁗王尚始平公主㝷爲魏所殺赫連定崔鴻十六國春秋夏録曰赫連定勃勃第五子鳯翔二年封平原公雍州牧鎮長安率衆赴安定進封平原王大將軍領司徒昌爲魏所擒定遂率遺衆數萬據平原僣稱皇帝大赦改承光四年爲勝光元年進征南大將軍白蘭王吐谷渾莫璝爲開府儀同三司河南王十月畋于隂磐登苛藍山而望統萬城泣曰先帝以朕承大業者豈有今日之事乎使天假朕年當與諸郷建王季之業俄而有群狐百數鳴於定傍命射之無所獲定惡之曰此大不善咄咄天道復何言三年八月魏軍來襲十月尅安定進攻平原十一月定遂掠民五萬户西奔上邽四年河南王莫璝因戎狄之衆東靣以争天下魏遣益州刺史没利延寧州刺史拾虎率􅀐三萬來伐遂擒定送于魏勃勃􅀄號龍昇元年􅀊在丁未至是􅀊在辛未二十五載也太平御覽卷第一百二十七
