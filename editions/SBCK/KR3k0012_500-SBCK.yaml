body:
  text: 人事部一百四十一傭保奴婢傭保史記曰荆軻死髙漸離乃變名姓爲人傭保作於宋子徐廣曰宋子縣名也今属鉅鹿乆之作苦聞其家堂上客擊筑仿徨不能去每出言曰彼有善不善從者以告其主曰彼傭乃知音召使擊筑一座稱善又曰欒布始與彭越爲家人時窮困賣傭於齊爲人酒保後漢書曰公沙穆來遊太學無資粮乃變服客傭爲吴祐賃舂祐與語大驚遂共定交於杵臼之間又曰杜根字伯堅永􅀄元年舉孝廉爲郎中時和熹鄧后臨朝權在外戚根以帝年長冝親政事乃與同時郎上書直諌太后大怒收執根等令盛以縑囊於殿上撲殺之執法者以根知名私語行事人使不加力旣而載岀城外根得􅂫因得迯􅇡爲冝城山中酒家保保使也言爲人傭力保任而使也積十五年酒家知其賢厚敬待之神仙傳曰仙人李八伯者欲授唐公房仙術乃爲作傭客身作惡瘡膿潰臰惡使公房夫人䑛之瘡愈乃授以丹經一卷奴婢􅀃文曰奴婢皆古之罪人也方言曰荆淮海岱雜齊之間俗不純爲雜罵奴曰臧罵婢曰獲齊之北鄙燕之北郊凢民男而婿婢謂之臧女而婦奴謂之獲亡奴謂之臧亡婢謂之獲皆異方罵奴婢之醜稱也周禮天官上酒人職曰女酒三十人奚三百人女酒女故曉酒者古者徒男女没入縣官曰奴其少才智者以爲奚今之侍史官奴是也又秋官上司厲職曰其奴男子入於罪􅀠女子入于舂槀鄭司農云謂坐爲盗賊而爲奴者輸於罪􅀠舂人槀人之官也由是觀之今之奴婢古之爲罪人也凢有爵者與七十者與未齓者皆不爲奴有爵謂命士以上也齓毁也男年八歳女七歳而毀齒左傳襄四年曰斐豹􅀠也著於丹書􅀠罪􅀠斐豹有罪没官爲奴丹書罪約也論語微子曰殷有三仁焉微子去之箕子爲之奴比干諫而死史記曰季布者楚人也項籍使將兵數窘漢王及項羽滅季布匿濮陽周氏周氏曰漢求將軍急且至臣家能聽臣臣敢進計季布許之乃髠鉗季布賣之朱家朱家心知是季布乃買而置之因誡其子曰田事聽此奴必與同食又曰欒布爲人所略賣爲奴於燕燕將臧茶舉以爲都尉又曰衛青爲侯家人少時歸其父使牧羊先母之子皆畜奴之不以爲兄弟有鉗徒相青官至封侯青􅀏曰人奴之生得無笞罵即足矣安得封侯又曰漢武帝時東置滄海郡人徙之費府庫並虚募民能入奴婢得以終身爲郎増秩又曰霍光愛幸監奴馮子都常與計事又曰薛宣奏張於驕縱奴者並乗勢爲􅁀至求吏妻不得殺其夫又曰原渉遣奴至市買肉奴秉渉氣與屠爭言斫傷屠者亡是時茂陵令尹翁歸新視事知渉名豪欲以厲俗遣兩使脅守渉至日中奴不岀吏欲殺渉渉肉􅃝自縛箭貫耳詣廷尉門謝罪又曰張安丗家徸七百人皆有手技又曰齊俗賤奴虜而刀間獨愛貴之桀黠奴人之所患唯刀間收取使之終得其力又曰王鳯群弟爭爲驕侈奴僮以千數又曰孝宣皇帝詔曰夫褒有德賞元功古今通議也大司馬大將軍霍光􅀫衛忠正宣德明恩守節秉義以安宗廟賞賜前後奴婢百七十人又曰王丹盡得父財家累千金奴僮數百又曰傅太后使謁者置諸官婢賤取之復取執金吾官婢八人東觀漢記曰彭寵奴子密等三人共謀刧寵寵時齋獨在便坐室中晝夜卧子密等三奴縛寵着床板告外吏大王解齋吏皆便休又用寵聲呼其妻入室見寵寵曰趍爲諸將軍辨裝兩奴將妻入取寵物一奴守寵寵謂奴曰􅀂小兒我素所愛今解我縛當以女珠妻􅀂小奴見子密聽其語遂不得解子密収金玉衣物使寵妻縫兩縑囊夜解寵手令作記告城門將軍云今遣子密等詣蘭卿子后所其開出勿稽留書成即断寵及妻頭置縑囊中西入上告又曰劉寛甞有客遣蒼頭市酒迂乆大醉而還罵曰畜生遣人視奴疑必自殺寛甞朝㑹莊嚴巳訖妻使婢奉羮飜汙朝衣婢遽收之寛徐曰羮爛汝手又曰司􅀠校尉梁松奏特進馬防兄廖廖子孫三家奴婢千人又曰鄧引字叔紀奴醉擊長壽亭長亭長將詣第白之引即見亭長賞錢五千異日奴復與宫中衛士忿爭衛士歐箠奴引問復賞五千又曰朱暉爲郡督郵太守阮况當嫁女欲買暉婢不與及况卒暉送金三斤人問其故暉曰前不與婢者恐以財貨汙府君耳今重送者以明巳心也又曰祝良爲洛陽令常侍樊豐妻殺侍婢置井中良收其妻殺之又曰韓卓臘日奴竊食􅀕其母卓義其心即日勉之魏志曰晉室踐阼下詔曰故司空王基著德立勲不營産業其以官奴二人賜其家又曰陳㤗護匈奴中郎京邑貴人多􅀉寳貨因㤗市奴婢㤗皆挂之於壁不發其封及徴爲尚書悉以還之蜀志曰劉琰侈靡侍婢能爲聲樂又教誦靈光殿賦又曰􅀄孫權以妹妻先主妹才捷剛猛有諸兄風侍婢百餘人執刀立先主每入心常懔懔晉書曰石崇有蒼頭八百餘又崇有婢緑珠美而艶善吹笛孫秀使人求之崇時在金谷別舘方登凉臺臨清流婦人侍側使者以告崇盡岀婢妾數十人以示之皆藴蘭麝􅀍羅􅜄曰在所擇使者曰君侯服御麗矣然夲受命止索緑珠不識孰是崇勃然曰緑珠吾所愛不可得也秀遂誅崇又曰郭璞愛主人婢無由而得乃取小豆三斗繞主人宅散之主人晨起見赤衣人數千圍其家就視則㓕甚惡之請璞爲卦璞曰君家不冝畜此婢可於東南二十里賣之慎勿爭價則此祓可除也主人從之璞隂令人賤買此婢復爲符投井中數千赤衣人皆反縛一一自投于井主人大恱璞携婢去又曰祖納少􅀌貧自炊㸑以養母平北將軍王敦聞之遺其二婢辟爲從事中郎有戲之曰奴價倍婢納曰百里奚何必輕於五羖皮又曰劉惔性簡貴與王羲之雅相友善郄愔有傖奴善知文章羲之愛之每稱奴于惔惔問何如方回耶羲之曰小人耳何比郄公惔曰􅀂不如方回故常奴耳又曰桓温自以雄姿風氣是宣帝劉琨之儔有以比王敦者意甚不平及是征還於北方得一巧作老婢訪之乃琨妓女也一見温便澘然而泣温問其故荅曰公甚似劉司空温大恱出外整理衣冠又呼婢問之婢云脣甚似恨薄眼甚似恨小􅁂甚似恨赤形甚似恨短聲甚似恨雌温於是禠冠解帶昏然而睡不怡者數日又曰幸靈周旋江州間謂其士人曰天地之於人物一也咸欲不失其性柰何制服人以爲奴婢乎諸君􅀂欲享多福以保姓命可悉免遣之又曰于寳父先有所寵侍婢母甚妬忌及父亡母乃生推婢於墓中寳兄弟年小不審之也後十餘年母喪開墓而婢伏棺如生載還經日乃􅂫言其父常取餘食與之息情如生家中􅁻凶輒語之考校悉驗地中亦不􅁴爲惡旣而嫁又生子又曰桓伊傳晉孝武帝召伊飲帝命伊吹笛伊即吹爲一弄乃放笛云臣於箏分乃不及笛然自足以韻合歌管請以筝歌并請一吹笛人帝善其調逹乃勑御妓奏笛伊又云御府人於臣自不合臣有一奴善相便串帝弥賞其放率乃許召之奴旣吹笛伊便撫筝而歌晉中興書曰祖約爲丞相從事中郎於府内爲婢所傷司真劉隗奏約患生婢僕身􅀍刑傷約甚慙耻遂解職還家齊書曰虞悰治家冨殖奴婢無㳺手雖在南土而㑹稽海味無不畢致焉又曰陸澄弟鮮揚州主簿顧測以兩奴就鮮質錢鮮死子晫誣爲買劵澄爲中丞測與書相往反後又牋與太守蕭緬云澄欲成子弟之非未近義方之訓此趍販所不爲况搢紳領䄂儒宗勝逹乎崔鴻十六國春秋前秦録曰慕容冲進逼長安堅登城觀之歎曰此虜何從出也其强􅀂斯大言責冲曰尔輩群奴正可牧牛羊何爲送死冲曰奴則奴矣旣猒奴苦復欲取尓見代唐書曰哥舒翰有家奴曰左車年十五六亦有膂力翰善使槍追賊及之以槍搭其肩而喝之賊驚顧翰從而刺其喉皆剔髙三丈而墮無不死者左車輙下馬斬首率以爲常又曰德宗􅀄即位詔曰邕府歳貢奴婢使其離父母之郷絶骨􅁏之戀非仁也罷之又曰羅讓累遷至福建觀察使兼御史中丞甚著仁惠有以女奴遺讓者讓訪其所自曰夲某寺家人兄姉九人皆爲官所鬻其留者唯老母耳讓慘然焚其丹書以歸其母又曰李􅀇道累遷給事中封姑臧縣男時王君廓爲幽州都督朝廷以其武將不習時事拜玄道幽州長史以維持府事廓在郡屢爲非法玄道數正議裁之甞又遺玄道一婢􅀇道問婢所由云夲良家子爲君廓所掠􅀇道因放遣之管子曰齊桓公使管仲求寗戚應之曰浩浩乎管仲不能知婢子問之仲曰非婢子所知也婢子曰詩有之浩浩之水㳺㳺之魚未有室家我將安居寗子其欲室乎仲以言告桓公風俗通曰南陽龐儉少失其父後居閭里鑿井得錢千餘萬行求老蒼頭使主牛馬耕種直錢二萬有賔婚大㑹奴在竈下竊言堂上母我婦也婢即白其母母使驗問曰是我公也因下堂抱其頸啼泣遂爲夫婦儉及子歴二千石刺史七八人時人爲之語曰廬里龐公鑿井得銅買奴得公又曰將作大匠陳國公孫志節有蒼頭地餘年十七情性聦惠儀狀端正工書䟽志節爲户曹史令地餘歸取資用因持車馬亡去到丹陽自云姓王名斌字文髙遂留爲諸曹史志節拜揚州刺史郡選曹史衣冠子弟皆出斌下乃用之斌乞屏左右叩頭涕洟曰斌即明使君地餘也斌後爲蒼梧太守三輔决録曰平陵孟他盡以家財賂張讓􅁥奴奴慙問所欲他曰欲得卿曹拜時賔客求見讓者車常數百乗累日不得通他後至諸奴迎拜徑將他車獨入衆謂他與讓善爭以物賂他他得以賂讓魏武遺令吾婢皆勤苦使着銅雀臺善待之石虎鄴中記曰石勒字丗龍上黨郭季子奴也勒未生之前襄國有䜟曰古在左月在右讓言退或入口襄國字也遂治襄國新序曰昌邑王冶側鑄冠十枚以冠賜之師及儒者後以冠冠奴龔遂免冠歸之曰王賜儒者冠下至臣今以餘冠冠奴是大王奴虜畜臣也郭子曰賈公問女恱韓壽問婢識不一婢云是其故主女内懷存想婢後往壽家􅀃如此壽乃令婢通巳意女大喜遂與通丗􅀃曰鄭玄家奴婢皆讀書􅀇甞使一婢不稱旨將撻之方自陳􅀃􅀇怒使人曵著􅅺中湏􅁷復一婢來問曰胡爲乎􅅺中荅曰薄言往訴逢彼之怒誥林曰裴秀年十八有令望母是婢而嫡母妬猶令秀母親役後大集客秀母下食衆賔見並起拜之荅曰微賤豈冝如此當爲小兒故耳於是大母乃不敢復使之又曰石崇厠有十餘婢侍列莫不畢備又與新衣出客多羞不能如厠王敦大將軍往脫故衣着新衣意慠然群婢謂曰此客必能作賊又曰宗岱爲青州刺史禁􅁋祀著無􅀑論甚精莫能屈後有書生詣岱岱與談論書生乃振衣而去曰絶我輩血食二十餘年君有青牛髯奴所以未得相困耳奴已叛牛巳死今日得相制矣言絶而失明日而岱亡搜神記曰諸􅁑恪已􅀍殺其妻在室問婢曰汝何故血臭婢蹷然起躍至于棟攘臂切齒而言曰諸􅁑恪公乃爲孫峻所殺又曰晉杜丗嘏家葬而婢誤不得出十餘年開墓而婢尚生云其始如眠有頃漸􅁴自謂一再􅀫􅀄婢之埋年十五六及開冢更生猶十五六也嫁之有子續搜神記曰勾章張然滯役在都有少婦遂與奴通然養一狗甚快後還奴欲謀殺然張弓拔刀當户然大唤曰烏龍狗遂咋奴頭然因取刀殺奴以婦付官梁兾別傳曰梁兾愛􅁥奴秦宫官至太倉令得出入妻所每見輙屏御者託以言事因通焉内外兼寵刺史二千石皆謁拜之扶風人士孫奮居冨兾從貸錢五千萬奮以三千萬與之兾大怒乃告郡縣認奮母爲守臧婢云盗白珠十斛紫磨金千斤以叛遂牧考奮兄弟死於獄中悉没貨財顧譚別傳曰譚爲太常録尚書事從交州家無私積奴婢不滿十人杜蘭香傳曰晉太康中蘭香降張碩爲詩贈碩云縱轡代摩奴湏􅁷就尹喜摩奴是香御車奴曽忤其旨是以自御碩􅀃如此異録傳曰廬陵歐明啇行經彭澤湖每以物投湖中爲禮後見湖中有吏着單衣乗馬云青洪君使要明過至一府舎吏曰青洪感君以禮必有重送者皆勿取但求如願明從之青洪君不得巳呼如願送明去如願者神婢也所願輙得數年大冨列女傳曰周室大夫仕於周妻媱於隣人恐主父還􅁴之爲毒藥使媵婢進之婢恐進之則殺主父言之則殺主母因僵仆覆酒主父怒而笞之妻恐婢言之因他過欲殺婢婢就杖將死而不言主父之弟聞之具以告主人殺其妻將納婢以爲妻婢辝欲自殺主父乃厚幣嫁之列女後傳曰㑹稽翟素者翟氏之女受娉未及配適遭賊欲犯之臨以刄曰不從者今即死矣素曰我可得而殺不可得而辱素婢名青青乞代素賊遂殺素復欲犯青青曰向欲代素者恐彼耻獲害耳今素巳死我豈有欲哉賊復殺之漢王褒僮約曰蜀郡王褒以事止寡婦楊惠舎有一奴名便倩行酤酒便曰大夫買便時但要守家不約爲他家男子酤酒也褒大怒曰寧欲賣耶奴復曰欲使便皆當上劵不上劵便不能爲也褒乃爲劵曰奴百役不得有二言晨起早掃飲食洗滌居當穿臼縛帚裁盂鑿斗出入不得􅀐馬載車踑坐大呶下床振頭垂鈎刈蒭織履作麤黏雀張鳥結網捕魚繳鴈彈鳬登山射鹿入水捕􅀛後園縱魚鴈鶩百餘驅逐䲻烏持梢牧猪種薑養羊長育豚駒糞除堂廡飲馬食牛鼓四起坐夜半益芻舎中有客提壷行酤汲水作餔滌杯整按奴但當飯豆飲水不得􅄝酒欲飲美酒唯得染脣口不得傾盂覆斗不得晨出夜入交􅀜伴偶多取蒲茅益作繩索雨墮無所爲當編蔣織植種桃李梨柿柘桑三丈一樹八尺爲行菓􅀋相從縱横相當果熟收歛不得吮甞犬吠當起驚告隣里槍門柱户上樓擊柝持楯曳矛還落三周勤心疾作不得遨逰奴老力索種莞織席事訖欲休當舂一石夜半無事浣衣當白􅀂有私錢主給賔客奴不得有姧私事當聞白奴不聽教當笞一百讀劵文訖辝窮咋索仡仡叩頭兩手自摶目涙下落鼻涕長尺審如王大夫言不如早歸黄土陌丘蚓鑚額早知當尓爲王大夫酤酒真不敢作惡太平御覽卷第五百
