front:
  text: 太平御覽卷第七百八十四四夷部五
  hash: sha256:1297b6f637fa450f9ddb2ab797bb57028c0d70b794cddf2a6d16dc978f928ba5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_784-1a}
body:
  text: 東夷五豆莫婁沃沮肅愼勿吉扶桑女國文身大漢流求豆莫婁後魏書曰豆莫婁國在勿吉囯北千里去洛陽六千里舊北夫餘也沃沮范曄後漢書曰東沃沮人性質直強勇便持矛歩戰魏志曰東沃沮在高句驪盖馬大山之東濵大海而居無大君王丗丗有邑長其言語與句麗大同時時小異漢􅀄燕亡人衛滿王朝鮮時沃沮皆屬焉元封二年伐朝鮮分其地爲四郡以沃沮爲玄莵郡後爲夷貊所侵還屬樂浪今諸邑落渠帥稱三老臣句驪置其中大人爲使又置文家以統之稅其貂布食物羙女婢妾其土肥羙背山向海冝五榖人性質直少牛馬便持刀矛其國俗制度大較似句驪其嫁娶之法女年十􅀊已相許男家迎之長飬以爲婦至成人更還女家責錢畢乃復還男其葬送之法大木槨長十餘丈開一頭作户新死皆假埋之湏肌肉盡聚置槨中舉家皆共一槨刻木如生隨死者爲數又爲瓦鬲置米其中編懸之於槨户邊後漢書曰北沃沮人言海中有女國無男人或傳其國有神并闚之輒生子云魏志曰北沃沮一名置溝婁去南沃沮八百里其俗南北皆同與挹婁接喜乗舩㓂抄沃沮畏之夏日垣在山上長深穴中爲守備冬月冰凍舩道不通乃下居村落其耆老言國人嘗乗舩捕魚遭風見吹數十日東得一島其上有人言語不可暁其俗常以七月取童女沈海又言一國亦在海中純女無男又得一布衣其兩䄂長二文又得一破舡在岸邊有一人項中復有面與語不相暁不食而死肅慎書曰成王旣伐東夷肅慎來賀海東諸夷武王克商皆通道焉成王即政而叛王服而服之故肅慎相來賀王俾榮伯作賄肅慎之命王使筞伯為命書以弊賄賜肅慎之夷亡後漢書曰挹婁古肅慎之國也在夫餘東北千餘里東濵大海南與北沃沮接不知其北所極土地多山險車馬不通人形似夫餘而言各異有五穀麻布出赤玉好貂所謂挹婁貂是無君長其邑各有大人處於山林之間土氣極寒常爲穴居以深爲貴大家至接九梯好飬豕食其肉衣皮冬以豕膏塗身厚數分以禦風寒夏則祼以尺布蔽其前後其人臭􅁾不㓗作厠於中圜之而居自漢興己後臣屬夫餘種衆雖少而多勇力處山嶮又善射發能入人自弓長四尺力如弩矢用楛長一尺八寸青石爲鏃鏇皆施毒中人即死便乗舡好㓂盗隣國畏患而卒不能服東夷夫餘飲食􅀋此皆用爼豆唯挹婁獨無法俗最無綱紀魏志所載同山海經曰不咸出在肅慎國有樹名雄先人代帝於此􅂑依其谷無衣中國有聖帝代立者則此木皮可衣家語曰孔子在陳惠公賔之於上館時有隼集於陳侯之庭而死楛矢貫之石砮楛木名砮箭鏃其長尺有咫惠公使以隼如孔子之館問焉子曰隼之來逺矣此肅慎氏之矢也事具慱物部肅愼國記曰肅慎氏其地在夫餘國北可六十日行東濵大海夏則巢居冬則穴處父子丗爲君長無文墨以言語爲約其畜有馬猪牛羊不知乗馬以爲財産而己猪放山谷中食其肉㘴其皮績猪毛以爲布無井竃人作瓦鬲四五􅂛以食㘴則箕踞足􅃑肉而啖之得凍肉㘴其上令煥土地無塩燒木作􅁅灌取汁食之俗皆編髮以布作褡俓尺餘以蔽前嫁娶之法男以毛羽挿女頭女和則持歸然後致禮娉之婦貞而女􅁋貴壯賤老寡居終身不嫁性凶悍以無憂喪相尚父母死男子不哭哭者謂之不壯相盗贓物無多少盡誅殺之雖野處而不相犯死者即日便葬於野交木作小槨殺猪積槨上冨室數百貧者數十以爲死者之粮以土覆之以繩繫於槨頭岀土上以酒灌纔繩腐而止無時􅀕祀也其檀弓三尺五寸括矢長尺有咫石砮皮骨申石山在國東北取之必先祈神石利入鐡勿􅁻後魏書曰勿􅁻國在髙句驪北舊肅慎國也去洛五千里國有大水闊三里餘名速木其地下濕無牛有車馬佃則偶耕車則歩推有粟及麥穄音􅀕菜則有葵水氣鹹凝塩生樹上亦有塩池多猪無羊嚼米醖酒飲之能醉婦人則布裙男子猪大皮裘婚之夕男就女家執女乳而罷便以爲定仍爲夫婦俗以人溺洗手面頭挣虎豹尾其父母春夏死立埋之􅃁上作屋不令雨濕􅀂秋冬死以其尸哺貂食其肉多得之國南有從太山魏言太皇有虎豹熊狼不害人其傍有大莫盧覆鍾國莫多廻國庫婁國素和國其伏弗國延犁小國拔大何國都羽陵國庫伏眞國魯婁國羽真俟國前陵各遣朝獻北史曰勿􅁻國在髙句麗北百鞂鞨也落各自有長不相㹅一其人勁捍於東夷冣強言語獨異常輕豆莫婁等國亦患之去洛陽五千里自和龍北二百餘里有善玉山山北行十三日至祁􅀺山又北行七日至洛懷水水廣里餘又北行十五日至太岳魯水又東北行十八日到其國其部􅀋凡有七種一號栗末部與髙麗接勝兵數千多驍武毎㓂高麗其二曰伯咄部在栗末北勝兵七千其三日安車骨部在伯咄東北其四曰拂􅄺部在伯咄東其五曰號室部在拂􅄺東其六曰黒水部在安車骨西比其七曰山部在栗末東南勝兵並不過三千而黒水部尤爲勁徤自拂􅄺以東矢皆石鏃即古肅慎氏也東夷中爲強國所居多依山水渠帥曰大莫弗瞞母官切咄國南有從太山者俗甚敬畏之人不得山上溲汙行經山者以物盛去地卑濕築土如堤鑿穴以居開口向上以梯出入其妻有外􅁋者人告其夫夫輒殺妻而後悔必殺告者由是姧􅁋事終不敢發人皆善射以射獵爲業角弓長三尺箭長尺二寸常以七八月造毒藥􅀓矢以射禽獸中者立死煑毒藥氣亦能殺人又曰延興中勿吉國遣乙力支朝獻大和􅀄又貢馬五百疋乙力支稱􅀄發其國乗舡溯難可西上至太沵河沉舩於水南出陸行度洛􅀌水從契丹西界逹和龍自云其國先破髙句麗十落密共百濟謀從水道并力取髙麗遣乙力支奉使大國謀其可否詔勑三國同是藩附冝共和順勿相侵擾乙力乃還從其來道取得夲舡汎逹其國隋書曰開皇􅀄勿􅁻國相率遣使貢獻文帝詔其使曰朕聞彼土人勇今來實副朕懷視尓等如子尓等冝敬朕如父對曰臣䓁僻處一方聞内國有聖人故來朝拜旣親奉聖顔願長爲奴僕其國西北與契丹接每相刼掠後因其使來文帝誡之使勿相攻擊使者謝罪帝因厚勞之令宴飲於前使者與其徒皆起舞其曲折多戰闘容上頋謂侍臣曰天地間乃有此物常得用兵意然其國與隋懸隔唯栗末白山爲近焬帝􅀄與髙麗戰頻敗其衆渠師突地稽率其部降拜右光禄大夫居之栁城與邊人來徃恱中國風俗請􅀍冠帶帝嘉之賜以錦綺而褒寵之及遼東之役突地稽率其徒以從每有戰功賞賜甚厚扶桒國南史曰扶桒國者齊永平元年其國有渉門慧深來至荆州􅀃云扶桒在大漢國東二萬餘里地在中國之東其土多扶桒木故以爲名扶桒葉似桐初生如笋國人食之實如梨而赤績其皮爲布以爲衣亦以爲錦作板屋無城郭有文字以扶桒皮爲紙無兵甲不攻戰其國法有南北獄􅀂有犯輕罪者入南獄重罪者入北獄有赦則放南獄不赦北獄在北獄者男女相配生男八歳爲奴生女九􅀊爲婢犯罪之身至死不出貴人有罪國人大㑹坐罪人於坑對之宴飲分訣􅀂死别焉以􅁅繞之其一重則一身屏退二重則及子孫三重者則及七丗名國王爲乙祁貴人第一者對盧第二者小對盧第三爲納咄沙國主行有鼓角導從其衣色隨年改易甲乙年青景丁年赤戊巳年黄庚辛年白壬癸年黒有牛角甚長以角載物至勝二十斛有馬車牛車鹿車國人飬鹿如中國畜牛以乳爲酪有赤梨經年不壞多蒲桃其地無鐵有銅不貴金銀市無租估其婚姻法壻徃女家門外竹屋晨夕灑掃經年而女不恱即駈之相恱乃成婚婚禮大抵與中國同親喪也日不食祖父母喪五日不食兄弟伯叔姑姉妹三日不食設坐爲神像朝夕拜奠不制衰絰嗣王立三年不親國事其俗舊無佛法宋大明二年􅄢賔國常有比丘五人游行其國始佛法經教焉女國南史曰沙門惠深云女國在扶桒東千餘其人容白端正色甚潔白身體存毛髮長委地至二三月􅔡入水妊娠六七月産子女人胷前無乳項後生毛根白毛中有汗似乳子百日能行三四年則成人矣兒見人驚避偏畏丈夫食醎草如禽獸醎草葉似邪蒿而氣味醎文身南史曰文身國在倿國東北七千餘里人體有文如獸其額上有三文大直貴文小曲者賤􅁟俗􅂬樂物豊而賤行客不齎粮有屋宇無城郭國王所居飾以金銀珎麗遶屋爲壍廣一丈實以水銀雨則流于小銀之上市用珎寳大漢南史曰漢國在文身國東五千餘里無兵戈不戰代鳯俗並與文貞國同而言語異流求隂書曰流求國居海島之間當見建安郡東水行五日而至閩川之東也􅁟多出銅其王性􅂬斯名渴刺兠不知其由來有國代數也彼􅁟人呼之爲可老羊妻曰多快茶所居曰波羅檀洞壍柵三重環以流水樹􅁄爲藩王所居舎其十人十六門彫刻禽獸多闘鏤樹以橘而葉􅁡條纎如髮紛然下垂國有四五師統諸洞洞有小王徃徃有村村有鳥了帥並以善戰者爲之自相樹立理一村之事男女皆以白紵纒髮從頭盤繞婦人以羅紋白布爲帽織闘鏤皮并雜色紵及􅄂花以爲衣製裁不一織藤爲苙飾以毛羽兵有刀矟弓箭劒鼓之屬編紵爲甲或以熊豹之皮王乗木獸令人舉之而行導從不過數十人國人好相攻擊人皆驍徤善走難死而耐創諸洞各爲部隊不相救助兩陣相當勇者三五人相擊射如其不勝一軍皆走遣人致謝即共和解収取􅋐死者共聚而食之食皆用手無賦歛有事則均稅俗無文字視月􅃜盈以紀時節􅀱草枯以爲年􅀊人􅀷目長鼻頗類於胡人縱年老髮多不白無君臣上下之節拜伏之禮父子同牀而寢婦人産乳必食子衣槽曝海水爲塩木汁爲醋醸米麴爲酒遇得異味先進尊者凢有宴會執酒者必待呼名而後飲上王者酒亦呼王名衘盃同飲頗同突厥歌呼蹋蹄一人唱衆皆和音韻哀怨其死者氣將絶舉至庭浴其屍以布帛纒之裏以葦草櫬土而殯上不起墳爲子者數月不食肉有熊羆犲狼尤多猪鷄無牛羊驢馬厥田良沃先以火燒而引水灌之持一挿以石爲刃長尺餘闊數寸而墾之冝播種樹木同江表氣􅀱與嶺南相類俗事山海之神祀以酒肴􅋐戰殺人便將所殺人􅀕其神煬帝大業􅀄海帥何蠻等每春秋二時天清風静東向依稀似有煙霧之氣亦不知幾千里三年帝令羽􅀐尉朱寛入海求訪異俗何蠻言之遂與蠻俱徃因到流求國言語不相通掠一人并取其甲而還時倭國使來朝貢見之曰此夷邪乆國人所用也帝遣武賁郎將陳稜朝請大夫張鎭同率兵自義安浮海擊之至流求􅀄稜將南方諸國人從軍有崑崙人頗解其語遣人慰諭之流求不從拒逆官軍稜擊走之進至其都頻戰皆敗毀其宫室虜其男女數千人而還太平御覽卷第七百八十四
