front:
  text: 太平御覽卷第七百六十一
  hash: sha256:5a6ec9f72edc711c3976a199070f92955c9dfd14c2ee3b0612e6bb313cd70fb8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_761-1a}
body:
  text: 器物部六觥觚巵􅓢􅊦斝鍾瓉鐏彛滑稽榼壷洗觥三禮圗曰觥受七升以兕角爲之詩曰我姑酌彼兕觥維以不永傷兕觥角爵也又曰躋彼公堂稱彼兕觥萬壽無疆公堂學校也觥所以誓衆也又曰兕觥其觩音虬旨酒思柔彼交匪敖萬福來求兕觥罰爵也言上丁無失禮者其罰爵徒觩然陳設而巳左傳曰晉趙孟叔孫豹曹大夫入于鄭鄭伯兼享之趙孟賦棠棣穆叔子皮及曹大夫興拜舉兕爵曰小國頼子知免於戾矣兕爵所以罰不敬言小國􅀩趙孟德自知此罰戮觚三禮圖曰觚受三升兊音銳下方足􅃮赤中青雲飾小其尾周禮曰梓人爲飲酒噐觚三升獻以爵而酬以觚語曰子曰觚不觚觚哉觚哉孔子曰削觚而志有所念觥不時成或曰觚哉觚哉觚小器耳心不專一尚不時成况於大事也周地圖記曰秦使蒙恬北築長城又於原上築城以觚尊酒而􅀕有鶉飛止觚上因名鶉觚縣劉伶酒德頌曰止則操巵執觚巵􅀃文曰巵圜器也小巵也圜音圎音伹禮曰父母舅姑之敦音推牟巵􅓢非餕莫敢用史記曰髙祖奉玉巵起爲太上皇壽也漢書曰沛公與項羽㑹鴻門樊噲居營外聞事急乃持楯直入帳下羽問爲誰張良曰沛公􅆖乗羽曰壯士哉賜巵酒彘肩噲飲酒拔劒切􅁏食之羽曰復能飲乎曰死且不辭豈憚巵酒韓子曰棠谿空見韓昭侯曰今有白玉巵而無當有瓦巵而有當君渇將何以飲君曰以瓦巵棠谿空曰白玉巵至貴君不以飲者以其無當耶君曰然空曰爲人君漏泄群臣之語猶玉巵無當也空毎見而出昭侯必獨卧惟恐夢言泄於妻妾戰國䇿曰昭陽爲楚伐魏覆軍殺將得八城移師而攻齊陳軫爲齊王使見昭陽再拜謝賀戰勝起而曰臣竊譬楚有詞者賜其舎人酒一巵舎人相謂曰數人飲不足一人飲有餘請􅀞地爲虵虵先成者飲酒一人虵先成引酒且飲之乃左手持巵右手􅀞虵曰吾能爲之足足未成一人虵成奪其巵曰虵固無足子安得爲之足遂飲酒今子伐齊爲虵􅀞足也淮南子曰霤水足以溢壷榼而江河不能實漏巵塩鐵論曰川源不能實漏巵魏文帝荅楊脩書曰重惠流離巵昭厚意晉􅀓咸汙巵賦曰人有遺余琉璃巵者小兒竊弄墮之不㓗意旣惜之又感寳物之汙辱乃喪其所以爲寳况君子行身而可以有玷乎􅓢音移􅀃文曰􅓢似羹魁柄中有道可以注水纂文曰􅓢水器也儀禮曰嫡入室媵御奉􅓢沃盥左傳曰晉公子過秦秦伯納女五人懷羸與焉奉􅓢沃盥旣而揮之􅓢沷盥噐揮湔也怒曰秦晉匹也何以卑我國語曰勾踐命諸稽郢行成於呉曰勾踐願請盟一介適女執箕帚以胲姓於王宫一介適男奉􅓢盤以隨諸御胲備也音該醆斚醆與盞同􅀃文曰斚玉爵也或􅀃斚受十六升詩曰或獻或酢洗爵奠斚禮曰醆斚及尸君非禮也是謂僣君醆斚先王之爵也又曰季夏六月魯以禘禮祀周公爵用玉琖仍雕左傳曰齊侯伐燕燕人賂以瑶甕玉櫝斚耳斚耳玉爵也不克而還又曰鄭火禆竈言於子産曰􅀂我用瓘斝玉瓉鄭必不火子産不許曰天道逺人道邇非所及也竈焉知天道鍾孔叢子曰平原君强子髙酒曰昔有遺諺堯舜千鍾孔子百觚子路嗑嗑音日飲百榼吾子何辤焉子髙曰以予所聞賢聖以道德兼人未聞以飲食也沈約宋書曰蕭思話常從太祖登鍾山中道有盤石清泉上使於石上彈琴因賜以銀鍾酒曰相賞有松石間意凉州記曰胡安據等發張駿􅃁得馬瑙鍾論衡曰文王飲千鍾孔子百觚􅀂酒用千鍾則􅁏宜百牛酒用百觚則肴冝用千羊則文王身如防風孔子躰如長狄乃能堪之瓉慈但切三禮圖曰主瓉受四升徑八寸形如盤其柄以圭有流前注書曰平王錫晉文侯秬鬯圭瓉孔安國日以圭爲枘柄謂之圭瓉也詩曰􅈛珪瓉秬鬯一卣音酉又曰瑟彼玉瓉黄流在中玉瓉圭瓉也圭瓉文狀以圭爲柄黄金爲勺青金爲外朱中央周禮曰裸音貫圭有瓉鄭司農云於圭頭爲器可以折鬯祼之􅀕謂之瓉也漢禮瓉盤大在三升口徑八寸下有盤口經一尺也又曰祼圭尺有二寸有珪以祀宗廟也禮曰賜珪瓉然後􅀕又曰祀周公於太廟灌用玉瓉大圭瓉形如盤容五升以大圭爲柄是謂圭瓉白虎通曰圭瓉者噐之名所以受灌之噐以圭瓉飭其柄樽彛􅀃文曰樽酒器也罍􅀛目酒尊也木刻爲雲象其施不窮爾雅曰彞卣罍器也皆酒尊彛其名也卣中尊也易曰樽酒簋二用􅇲納約自牖終无咎書曰用賚尓秬鬯一卣卣中尊也詩曰我姑酌彼金罍惟以不永懷周禮曰司尊彛掌六尊六彛之位春祠夏禴祼用雞彛鳥彛皆有舟其朝獻用兩獻音娑尊其再獻用兩象尊皆有罍秋甞冬蒸祼用斝彛黄彛皆有舟其朝獻用兩箸直略切尊其饋獻用兩壷尊皆有罍彛亦尊也彞法也言爲法之正也雞彛鳥彛謂刻而􅀞之爲雞鳳之形也皆有舟鄭司農云舟遵下䑓也􅀂今時氶盤也獻讀曰犧犧遵飾以翡翠象遵以象鳯皇或曰以象骨飾尊也斝讀爲嫁彛􅀞禾稼也黄彞黄目尊也著尊者著地無足壷尊者以壷爲尊禮曰五獻之尊門外􅇲門内壷君樽瓦甒音武此以小爲貴也壷大一石瓦甒􅇲大小未聞也易日樽酒貳用􅇲也犧樽䟽布􅇈音覔樿之善切勺此以素爲貴也又曰夫禮之􅀄始諸飲食其燔黍椑音伯豚汙音􅀲切尊而抔薄侯切飲鄭􅀇云汙樽鑿地爲撙也抔飲以手掬之也又曰黄目􅊊氣之上尊也黄者中目者氣之清明者也言酌於中而清明於外也黄目黄彛也又曰魯季夏六月以禘禮祀周公於太廟尊用犧象山罍􅊊尊用黄目犧尊以沙明爲􅀞象骨飾之􅊊􅊊鬯之噐黄目黄彛又曰泰有虞氏之尊也山罍夏后氏之尊也著殷之尊也犧象周之尊也㤗用瓦着地無足傳曰犧象不出門喜樂不野合漢書曰梁孝王有罍尊上刻雲雷象也直千金戒後代善寳之王任后聞而欲得之王讓大母李太后曰先王有命無得以樽予音與人他物雖百鉅萬猶自恣任后絶欲得之王讓直使人開府取樽賜任后天子下吏驗問公卿治奏以爲不孝讓誅也東觀漢記曰王覇擊賊作倡樂賊射營中覇前酒樽覇坐不動又曰章帝時美陽得銅酒樽采色青黄有古文後漢書曰章帝􅀄元七年槐里歧山得銅樽一枚晉起居注曰穆帝升平二年尚書左丞劉兖元㑹曰彭城計佐虞興發白虎樽而羣觀輻湊中蘭臺令史張􅀇不禁免􅀇令史沈約宋書曰正旦元㑹設白虎樽於殿庭樽盖上施白虎有能獻直言者則發此樽飲酒蓋杜舉之遺式也蓋爲白虎疑是後人所加欲令猛如虎無所忌憚也晏子春秋曰晉欲攻齊使范昭觀焉景公觴之范昭曰請君幸樽酌晏子命撤樽革具范昭歸曰齊不可伐也吾欲慙其君晏子知之孔子聞之曰不越於樽爼之間折衝千里也莊子曰市上之人有善戴尊者酒尊也累十尊而行人有與之更者行道未半而以其尊顛又曰百年之木破爲犧樽青黄而文之其一斷在溝中比犧樽於溝之斷則美惡有間矣其於失徃一也桀跖與魯史行義有間矣然其失性均也又曰純朴不殘孰爲犧樽白王不毀孰爲珪璋道徳不廢安取仁義淮南子曰百圍之木斬而爲犧樽龍虵虎豹曲成文章髙誘曰折爲蟠龍伏虎之狀也又曰夫聖人之道猶中衢而設樽􅁘過者斟酌多少不同各得其所冝又曰夫奉一爵酒不知於邑言其輕也挈石之樽則白汗交流言其重也又况羸天下之憂而任海内之事者乎重於樽亦逺矣風俗通曰坐不移樽俗􅀃几宴飲者移轉樽酒令人訟諍志林曰先代不識犧樽但云沙􅀞之飾以翠羽至魏明帝時魯郡於地中得齊大夫子尾送女噐有犧樽作犧牛形自尓乃知其定形呉越春秋曰闔閭女自殺以銀樽送之鄴中記曰石虎正㑹殿前有白龍樽作金龍於東箱西向龍口金樽受五十斛涼州記曰胡安據等發張駿陵得白玉樽受三升戴延之西征記曰太極殿中有銅龍長三丈銅樽容三十斛正旦大㑹龍從土中受酒口吐之於樽中傅􅀇朝㑹賦曰跱鳯虎之二樽清酤皆以淵停蔡邕論銘曰漢獲齊侯寳樽于槐里也孫綽陽燧樽銘曰詳觀兹噐妙巧竒絶酌焉則注受滿則閉􅀘結切吐冩適㑹未見其竭滑稽崔浩漢記音義曰滑稽酒噐也轉注吐酒終日不巳􅀂今之陽燧樽史記曰呉王夫差取子胥尸盛以鴟夷革而浮之江中應劭曰取馬革爲䲻夷鴟夷榼形漢書􅀭雄酒賦曰鴟夷滑稽腹大如壷晝日盛酒人復借酤常爲國噐託於屬車榼􅀃文曰榼酒噐也椑音鼙圜榼也左傳曰晉欒鍼使行人執榼承飲造于子童謝承後漢書曰陳茂爲豫州别駕與刺史周敞行部到頴川陽翟傅車有美酒一椑敞􅃙載酒以行茂取椑擊柱破之曰使君傅車榼載酒非冝王隱晉書曰宣帝旣㓕公孫淵還作榼兩口二種酒持着馬上先飲佳酒塞口而開毒酒與牛金金飲而死北齊書曰元韶字丗胄魏室竒寳多入韶家有馬瑙榼容三外玉縫之皆稱西域􅀑作也凉州記曰胡安據等發張駿陵得流離榼孔叢子曰子路嗑嗑飲百􅜵巳貝鍾門列異傳曰濟北􅁌起神女來遊車上有壷榼青白流璃五具續齊諧記曰王敬伯夜見一女命婢取酒提一渌沉􅃮榼曹毗杜蘭香傳曰蘭香降張實輒賫元榼馬融奏事曰楚將呉起或遺之一榼酒注之上流使士卒迎流飲其下明不獨也劉伶酒德頌曰止則操巵執觚動則挈榼提壷壷三禮圖曰洗壷受一斛口徑一尺頭髙五寸大中身兊音銳下赤􅃮中元上加青雲氣方壷受一斛腹圜足口方圜壷受一斛腹方足口圜詩曰顯甫餞之清酒百壷周禮曰挈壷氏以令軍井壷所以盛飲故以壷表井中凢軍事懸壷以序聚􅈀懸壷以爲漏也檮竟託禮曰其以乗壷酒賜人亦曰乗壷酒乗壷四壷尊壷者靣其鼻鼻在靣上言向人也左傳曰晉侯問原守於寺人㪍鞮對曰昔趙襄以壷飱從徑餒而弗食故處原漢書曰東方朔曰壷者所以盛也晏子春秋曰景公遊於紀得金壷發視之中有丹書韓子曰晉公子重耳過曹僖􅀒羈盛黄金於壷充之以食令人遺公子也􅀃苑曰五大夫願衛人也􅀒壷入井終日灌一區國語曰勾踐召范蠡而問焉曰諺有之曰觥飲不及壷飡言志在觥飲慮不至壷食喻巳德小不能逺啚今􅀊晚矣子將奈何曰臣聞追亡人也蹶而趣之唯恐不及王曰諾遂伐呉神仙傳曰壷公賣藥常懸一壷於坐上日入之後公輙跳入壷中捜神記曰呉王夫差女王恱童子韓重結氣死形見將重入􅃁取崑崙玉壷與之琴操曰伍貟奔呉過漂陽瀬溪見一女擊漂於水中旁有壷漿乃就乞飲飲畢謂女子曰掩夫人壷口女子知其意自投瀬溪而死洗三禮圖曰洗髙三尺口徑尺五寸足徑三尺士鐵大夫以上銅爲之諸侯白金飭天子黄金飭儀禮曰設洗于阼階東南禮曰其水在洗東祖天地之左海也魏武令曰臨􅀕就洗以手擬水而不盥以絜爲敬未聞擬向不敬之禮吾親受水而盥太平御覽卷第七百六十一
