body:
  text: 居處部五臺上爾雅曰觀四方而髙曰臺積土四方者有木曰榭釋名曰臺持也言築土堅髙能自勝持也尚書曰散鹿臺之財毛詩曰經始勿亟庶民子來謂文王之作靈臺也又曰新臺刺衛宣公也納伋之妻作新臺于河上而要之國人惡之而作是詩禮記月令五月可以居髙明可以處臺榭左傳曰夏啓有鈞臺之饗又曰宋平公築臺妨於農収子罕請俟農功之畢公弗許築者謳曰澤門之楯實興我役邑中之黔實慰我心子罕黒居邑中子罕聞之親執朴以行築而扶其不勉者曰吾儕小人皆有闔廬以避燥濕寒暑今君爲一臺而不速成何以爲役謳者乃止又曰晉靈公不君從臺上彈人觀其避丸者又曰楚子成章華之臺願與諸侯落之又曰有虵自泉臺出入于國如先君之數八月聲姜薨毀泉臺也史記曰􅁗皇作瑯瑘臺刋石頌德又曰晉靈公造九層之臺孫息曰臣能累十二棊加一鷄子於上公曰危哉息曰公造九層之臺三年不成實危於此公乃止又曰趙武靈王爲野臺以望齊中之山境徐廣注野一作望齊也又曰蜀寡婦清其先得丹穴徐廣曰涪陵出丹也而擅其利數世家亦不訾謂其多不可訾量清寡婦也能守其業用財自衛不見侵犯􅁗皇帝以爲貞婦而爲築女懷清臺又曰淮南王安立思仙臺又曰楚靈王爲章華之臺伍舉諌曰昔楚莊王爲匏居之臺髙不過望國氛大不過容宴豆又曰燕昭王置千金於臺上以延天下士謂之黄金臺又曰子路聞蒯聵入馳徃入城造蒯聵蒯聵與孔悝登臺子路曰君焉用孔悝請得而殺之蒯聵弗聽於是子路欲燔臺蒯聵懼乃下石乞壷黶攻子路斷纓子路曰君子死冠不免結纓而死又曰漢武帝起栢梁臺髙數十丈悉以香栢香聞數十里漢書郊祀志曰王莽篡位二年好神仙事以方士言起八風臺於宫中臺成作樂其上史記云漢武帝元封二年公孫卿言於帝曰仙人好樓居帝乃使卿持節候神作通天臺髙三十丈雷雨悉在其下去長安三百里望見長安城武帝􅀕天臺舞八歳童女三百人置祠具招仙人􅀕天巳令人􅂛通天臺以候天神天神旣下􅀕所若大流星乃舉烽火而就竹宫望拜上有承露盤仙人掌擎玉盃承雲表之露元鳯間臺自毀椽桷皆化爲龍鳯隨風􅀨飛去西京賦云通天眇而竦峙經百常而基擢上班華以交紛下刻峭而􅀂削也又藝文志曰曲臺記后倉記七篇如淳注曰行禮射曲臺后倉爲記故曰曲臺又曰趙武靈王建藂臺於邯鄲又曰文帝甞欲作露臺計之直百金曰百金中民十家之産也吾奉先帝宫室常恐羞之何以臺爲又曰貳師撃右賢王召李陵使爲貳師將軍輜重陵召見武臺師古日末央宫有武臺也叩頭自請曰臣所將屯邊者皆荆楚勇士竒材劒客也力扼虎射命中願得自當一隊到蘭于山南以分單于兵母令專郷貳師軍上曰將軍惡相屬邪吾發軍多無􅀐予女陵對曰無所事􅀐師古曰猶言不事復􅀐也臣願以少擊衆歩兵五千渉單于庭上壯而拜之後漢書曰永平􅀄馬援女立爲皇后顯宗圖􅀞建􅀄中名臣列將於雲臺雲臺在南宫以椒房故獨不及援東平王蒼觀圖言於帝曰何不􅀞伏波像帝􅀏而不言魏志曰武紀建安十五年作銅雀臺十八年作金虎臺又作冰井臺魏略云黄􅀄五年文帝東征留郭后於永始臺霖雨城樓多壞有司請移止后曰昔楚昭王出遊貞姜留漸臺江水至使迎而無符不去卒没今帝在逺未有急而便移止奈何也何晏景福殿賦曰鎮以崇臺實曰永始􅃨道重閣猖狂是俟吴志曰孫權於武昌臨釣臺飲酒大忻歡使人以水灑羣臣曰今日酣飲醉墮臺乃止張昭曰紂爲糟丘酒池長夜之飲當時亦以爲樂不以爲惡權有慙色而罷晉書曰汝南文成王亮太妃伏氏甞有小疾祓於落水亮兄弟三人侍從並持節鼔吹震耀洛濵武帝登凌雲臺望見曰伏妃洛可謂冨貴矣又曰范􅇞爲豫章太守大設庠序遣徃交州採磬石以供學用改革舊制不拘常憲逺近至者千餘人資給衆費一岀私禄并取郡四姓子弟皆充學生課讀五經又起學臺功用弥廣又曰凉張茂築靈釣臺周輪八十餘堵其髙九仞武陵人閻魯夜叩門呼曰武公遣我來曰何故勞百姓築臺乎姑臧令辛巖以魯妖妄請殺之茂曰吾信勞人魯稱先君之令何謂妖乎太府主簿馬魴曰今丗難未夷唯當􅀪尚道素不冝勞役崇飾臺榭比年巳來轉覺衆務日奢於往昔所經營輕違雅度實非士女所望於明公茂曰吾過也命止作役崔鴻十六國春秋夏録曰赫連勃勃大破南凉傉檀于百井殺衆數萬以人頭爲京觀號曰髑髏臺韓子曰景公與晏子游少海登栢寢之臺望其國曰羙哉煥乎後丗將孰有之晏子曰其田氏乎曰寡人有國如田氏有之爲之奈何對曰君􅀂欲奪之則近賢逺不肖治其煩亂綏其刑罰振貧窮恤􅀌寡行惠而好儉民將歸君雖十田氏其如君何又曰越王伐吴先宣言吾聞吴王築如皇之臺掘淵泉之池罷苦百姓剪財貨以盡民力余爲民誅之幽明録曰海中有金臺出水百丈結構巧麗窮極神功横巖雲渚竦曜星河也晏子春秋曰景公起大臺歳寒役者皆凍晏子遂如臺執扑鞭其不務者曰吾細人也皆有闔廬以避燥濕寒暑今君爲一臺而不速成國人皆以晏子助君虐也晏子歸而君令罷役仲尼曰古之善爲臣者羙名歸之君災禍歸之身陸賈新語曰楚靈王作乾溪之臺立百仭之髙欲登浮雲窺天上王孫子曰昔衛靈公坐重華之臺侍御數百隨珠照曰羅衣從風仲叔御諌曰昔桀行此而滅紂用此以亡今四境内侵諸侯加兵土地日削内寵無乃太盛歟公下席再拜曰寡人過矣於是岀宫女數百人百姓大恱子貢聞之曰所謂能受諫也賈子曰翟王使使之楚楚王誇之饗于章華之臺三休乃至南雍州記曰隆中諸葛亮故宅有舊井一今涸無水盛􅀪之記云宅西有三間屋基跡極髙云是孔明避水臺先有人姓董居之滅門後無復敢有住者齊建武中有人修井得一石枕髙一尺二寸長九寸獻晉安王習鑿齒又爲宅銘今宅院見在樓觀本記曰尹喜宅南山阜上先館舎即大夫觀望之臺也昔老君於此山騰空時人因號曰老子陵盖非墳墓也故爾雅云大陸曰阜大阜曰陵此之謂矣新序曰桀作瑶臺殫百姓之財伊尹諌之桀曰吾有天下猶天之有曰日亡吾亡矣又曰魏王將欲爲中天之臺曰敢諌者死許綰入曰聞大王將爲中天之臺願加一力王曰子何力能加曰臣聞天與地相去萬五千里今王因而半之當立七千五百里髙其趾當方八千里盡王之地不足以爲臺趾古者堯舜建諸侯五千里王必願爲臺必起兵伐諸侯盡有其地猶不足又伐四夷得方八千里乃足以爲臺趾材木之積人徒之衆食廪之輸以千萬億度八千里之外當盡農畒之地足以奉給王臺具者巳備乃可作王黙然而罷又曰紂爲鹿臺十年乃成大三里髙千尺臨望雲雨故天下叛沈懷逺南越志曰熈安縣東南有圎岡髙十丈四面爲羊膓道論者曰尉佗登此望漢而朝名曰朝臺也裴淵廣州記曰尉佗築臺以朝漢室圎基千歩直峭百丈螺道登進頂上三畒朔望􅂛拜號爲朝臺戴延之西征記曰許昌城本許由所居大城東北九里有許由臺髙六丈廣三十歩長六十歩由耻聞堯讓而登此山邑人慕徳故立此臺管子曰囷倉寡而臺榭繁者藏不足以供其費臺榭相望者其上下相怨也三輔故事曰未央宫前有東山臺釣臺倉池中漸臺轉詩外傳曰趙簡子有臣曰周舎立於門下抱筆執牘從之書過簡子與之居無幾而死後與諸大夫飲於洪波之臺酒酣泣曰千羊之皮不如一狐之腋衆人之唯唯不如周舎之諤諤今舎死吾亡無日矣􅀃苑楚莊王與晉戰勝之懼諸侯之畏巳也乃築爲五仭之臺臺成而觴諸侯諸侯請約莊王曰我薄徳之人也諸侯請爲觴皆仰而曰將將之臺窅窅其謀我言而不尚諸侯伐之於是逺者來朝近者入賔又曰齊景公爲露寢之臺成而不適焉栢常騫曰爲臺甚急臺成君何爲不適焉公曰然梟昔鳴昔鳴者其聲無不爲也吾惡之甚是以不適焉栢常騫曰臣請禳而去之公曰何其對曰築新室爲置白茅焉公使爲室置白茅焉栢常騫夜用事明問公曰今昔聞梟聲乎公曰一鳴而不復聞使人徃視之梟當陛布翼伏地而死家語曰楚王將游荆臺司馬子期諌王怒令尹子西駕於殿下曰今荆臺之觀不可失也王喜子西岀從十里還引轡而止曰夫子期忠臣也若臣䛕臣也願王賞忠而誅䛕也王乃還五經異義曰天子有三臺靈臺以觀天文時臺以觀四時施化囿臺以觀鳥獸魚鼈諸侯卑不得觀天文無靈臺但有時臺囿臺歸藏夏后曰啓筮享神於晉之靈臺作璿臺山海經曰享神於大陵而上釣臺老子曰九層之臺起於累土又曰衆人熈熈如春登臺伏滔地記曰瑯瑘城東南十里有郎山即古郎瑘臺也􅁗始皇二十八年至瑯瑘大樂之留三月作瑯瑘臺臺赤􅀌山也然髙顯出於衆山之上髙五里下周二十餘里山上壘石爲臺石形如塼長八尺廣四尺厚尺半三級而上級髙三丈上級平敞二百餘歩刋石立碑紀􅁗功徳漢武帝亦登此臺吴越春秋曰楚靈王立建章華之臺與羣臣登焉王曰臺美乎伍舉曰臣聞國君服寵以爲美安民以爲樂克聽以爲聦致逺以爲明不聞土水之崇髙蟲鏤之刻􅀞金石之清音􅁝竹之悽唳以之爲美昔先莊王爲匏居之臺髙不過望國氛大不過容宴豆士不妨守備用不煩官府民不敗時務官不易朝市今君爲此臺七年國人怨焉財用盡焉年􅂖敗焉百姓煩焉諸侯忿怨卿士訕譏豈前王之所盛人君之所美者乎臣之誠愚不知所謂也靈王納之即除工去飾不遊於臺又曰范蠡於東武山起遊臺其上東南爲司馬門立増樓冠其山巔以爲靈臺起離宫於淮陽中􅀫臺在於髙平駕臺在於成丘立苑於樂野燕臺在於石室齊臺在於襟山勾踐之岀遊也休息石臺食於冷厨又曰吴王闔閭治宫室立射臺於安里華池在平昌南城宫在長樂闔閭出逰卧秋冬治於城中春夏治於姑胥之臺且食䱉山晝逰胥臺射於鷗陂馳於遊臺興樂石城又曰越得神木一􅀟大二十圍長五十尋陽爲文梓隂爲楩柟巧工施校制以規繩雕治圎轉刻削磨礱分以丹青錯􅀞文章嬰以白壁鏤以黄金􅃺􅀋龍虵文彩生光乃使大夫種獻之於吴王曰東海役臣臣􅀌勾踐使臣種敢因下吏聞於左右頼大王之力竊爲小殿有餘材再拜獻之吴王大恱子胥諌曰王勿受昔者桀爲靈臺紂起鹿臺隂陽不和寒暑不時五榖不熟自取其灾民虚國變遂取滅亡大王受之後必爲越所戮吴王不聽遂受而起姑胥之臺三年聚材五年乃成髙見二百里行歩之人道死巷􅂘不輟嗟嘻之聲民疲士苦人不聊生帝王世紀曰周􅎼王雖居天子之位爲諸侯所侵逼與家人無異貰於民無以歸之乃上臺以避之故周人因名其臺曰逃債臺故洛陽南宫簃臺是也吕氏春秋曰有娥氏有二佚女爲九成臺飲食必以獻王孫子曰昔衛靈公坐重華之臺侍御數百隋珠照日羅衣從風戴延之西征記曰官度臺去青口澤六十里魏武造也破􅀽紹於此楊龍驤洛陽記曰凌雲臺髙二十三丈登之見孟津鄧徳明南康記曰􅟔都君山上有玉臺方廣數丈周廻盡是白石柱自然石覆如屋形也四面多松杉遥眺峨峨嚮像羽人之舘風雨之後景氣明浄頗聞山上有皷吹之聲山都木客爲儛唱之節􅄒征記曰廣陽門北魏明帝流柸池猶有處所池西平原懿公主第有皇女臺西南劉曜壘壘西曜試弩棚西北有􅋐雞臺太平御覽卷第一百七十七
