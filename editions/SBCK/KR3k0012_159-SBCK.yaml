front:
  text: 太平御覽卷第一百五十九
  hash: sha256:8c77ba8cc9cd8bc11065d9fc0d4e483ea7522aa6a581a22a6f0b549b394b53f8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_159-1a}
body:
  text: 州郡部五河南道中虢汝鄭宋曹亳單許陳頴蔡虢州十道志曰虢州弘農郡禹貢䂊州之域春秋爲虢地七國時秦韓之境秦併天下爲三川郡漢元鼎中置弘農郡左傳僖二年曰晉荀息以屈産之乗垂􅁄之璧以假道於虞以伐虢應劭漢官儀云弘大也所以廣大農業也漢志曰武帝置弘農縣於􅁗故函谷􅀜山嶺下戴延之西征記曰函者道形如函也孫卿子曰􅁗有松柏之塞是也帝王丗紀曰虢有三焉周興封虢仲於西虢此其地也封虢叔於東虢即成臯是也今陜郡平陸縣是北虢漢書曰楊僕爲樓舩將軍恥爲􅀜外人於是徙關新安割􅁗河南南陽二郡之西境於故函谷置弘農郡漢書郊祀志曰黄帝以首山之銅鑄鼎於荆山之下後名其地爲鼎湖今胡城縣也郡國縣道記曰盧氏西虢之別也遁甲開山圗曰盧氏山冝五榖可以避水災因山以名縣汝州十道志曰汝州臨汝郡禹貢豫州之域春秋時爲周王畿及鄭楚之地十三州志曰戰國時梁屬魏秦置三十六郡屬三川郡漢爲河南郡之梁縣也左傳昭二十九年傳曰陶唐氏旣衰其後有劉累學擾龍于豢龍氏以事孔甲能飲食之夏后嘉之賜氏曰御龍一雌死濳􅊽以食夏后夏后饗之而使求之懼而遷于魯縣即魯山縣也又曰楚白公之亂葉公率國人攻白公白公奔山縊死葉公遂邑焉即今葉縣也家語曰葉公好龍䆫壁皆􅀞龍形眞龍爲降葉公見而喪魄漢書曰漢王至成臯轅生􅀃漢王曰漢楚相拒滎陽數歳漢常困願君王岀武􅀜項王必引南走王深壁令滎陽成臯且休息使韓信等輯河北地連燕齊君王乃復走滎陽如此則楚所備者多漢得休息王從其計出兵宛葉間左傳曰邘晉應韓武之穆也注曰應城在襄城城父縣西南韓詩外傳曰周成王與弟戯以桐葉爲珪以封汝周公曰天子無戲言王應時而封曰應侯今應城是也鄭州十道志曰鄭州滎陽郡禹貢豫州之境秦兼天下爲三川郡帝王丗紀曰黄帝都於有熊今新鄭是也漢志曰新鄭夲髙辛氏火正祝融之墟國語曰鄭桓公爲司徒問於史伯曰王室多故余懼及焉何以逃死史伯對曰王室將卑戎翟必昌不可偪也當成周者南有荆蠻申呂應鄧陳蔡隋唐北有衛燕翟鮮虞路泉徐蒲鮮虞􅁎姓路泉徐蒲皆赤翟隗姓也西有虞虢晉隗霍楊魏芮八國􅁎姓也東有齊魯曹宋滕鄒莒是非王之友子母弟甥舅也皆則蠻夷戎狄之人也非親作頑不可入也其濟洛河頴之間乎言此四水之間可逃是其子男之國虢鄶爲大虢東虢仲之後鄶􅁎姓虢叔恃勢鄶仲恃險皆有淫侈怠慢之心加之以貪冒君􅀂以周難之故􅀉孥與賄焉不敢不許學妻子賄財也周亂而是驕而貪必將背君君􅀂以成周之衆奉辭伐罪無不克矣克二邑鄢弊􅀘舟依柔歷華君之土也言克虢鄶此八邑可得􅀂前華後河右洛左濟主芣騩而食溱洧芣醜山名主為神主也修典刑以守之可以少固公􅀃乃東孥與賄虢鄶受之十邑皆有􅀉也後桓公之子武公竟取十邑之地而居之今河南新鄭是十邑謂前八邑及虢鄶韓詩外傳曰鄭國俗以二月桃花水下時㑹于溱洧之上以自祓除也故詩曰溱與洧方渙渙􅀆漢書曰漢王數困滎陽成臯間計欲􅂢成臯以東屯鞏雒以距楚酈食其曰夫敖倉天下轉輸乆矣臣聞其下藏粟甚多楚人抜滎陽不能堅守敖倉此天所以資漢願足下急進兵攻滎陽據敖倉之粟即天下知所歸矣晉書曰阮籍甞登廣武見劉項戰處歎曰時無英主使竪子成名其地在滎陽地道記曰陽武滎陽有博浪沙張良爲韓擊􅁗始皇處宋州十道記曰宋州睢陽郡理宋城縣虞舜十二州爲豫州之境周爲青州之域武王封微子之邑後爲齊楚魏所滅三分其地魏得其梁陳留齊得濟隂東平楚得沛梁即今州地禮記曰武王克殷下車而封殷之後於宋禹貢曰導荷澤􅀍孟豬孟豬澤在今虞城縣明都澤是􅀶物志曰宋北至泗水南迄睢渦有孟豬之澤碭山之基元和郡國志曰秦併天下改爲碭郡後改爲梁國漢文帝封子武爲梁王自漢至晉爲梁國屬豫州宋改爲梁郡隋於睢陽置宋州唐書曰天寳末禄山亂兩河郡縣多所䧟没張巡許逺守睢陽賊將尹子竒併力攻圍踰年不下城中食盡竟爲賊所䧟巡等抗詞不撓遂􅀍害陳留風俗傳曰宋之地猶有先王遺風重厚多仁好稼穡惡衣食以致畜藏史記曰梁孝王築東􅁐三百里是曰兎園又爲􅃨道自宫屬諸平臺三十餘里圗經曰梁王有脩竹園園中竹木天下之選集諸方遊士各爲賦故館有鄒枚之號又有鴈鶩池周廻四里亦梁王所鑿又有淸冷池有釣臺謂之淸冷臺漢志曰寧陵屬陳留莽曰康善孟康曰故􅁑伯國今􅁑郷是也漢書曰梁孝王武以孝文十二年徙梁梁爲大國居天下膏􅃾地北界㤗山西至髙陽四十餘城多大縣於是孝王築東􅁐方三百餘里廣睢陽城七十里大治宮室爲􅃨道自宫連居於平臺四十餘里曹州十道志曰曹州濟隂郡置在濟隂縣禹貢豫州之域周爲曹國地後屬宋七國時屬齊漢爲濟隂郡地在濟水之南故以爲名曹詩曰薈􅀆蔚􅀆南山朝躋曹南山也左傳僖二十八年曰晉侯圍曹門焉多死曹人尸諸城上磔晉死人於城上人晉侯患之聽輿人之誦曰移舎於墓言將發冡曹人兇懼因其兇也而攻之入曹而分曹衛之田以賜宋人晉侯有疾曹伯之竪侯獳貨筮史使曰以曹爲解齊桓公爲㑹而封異姓今君爲㑹而滅同姓曹叔振鐸文之昭也先君唐叔武之穆也且合諸侯而滅兄弟非禮也公􅀃復曹伯尚書曰夏師敗績遂伐三鬷俘厥寳玉孔曰三鬷國名今定陶也水經曰荷水俗謂之五丈溝東經定陶漢書曰髙祖五年春二月甲午即皇帝位於定陶汜水之陽左傳曰衛孫蒯田于隧飲馬于重丘重丘人毀瓶因詬之重丘今乗氏縣亳州十道志曰亳州譙郡置在譙縣禹貢豫州之域春秋時陳國之譙邑六國時屬楚秦爲碭郡地漢爲譙縣屬沛郡左傳曰楚成得臣帥師伐陳遂取焦夷杜注焦今譙國史記曰周武王封神農之後於譙國漢書地理志曰王莽以譙爲延成亭魏志曰後漢熹平五年黄龍見譙太史令單颺以爲其國當有王者興不及五十年亦當復見及文帝即位果如其言以先人舊都立爲譙國與長安許昌鄴洛陽號爲五都元和郡縣志曰後魏立南兖州周武改爲亳州魏略曰太祖於譙東五十里澤中築起精舎讀書射獵閉絶賔客即謂之譙東史記曰老子苦縣人也告縣即今眞源縣單州五代史曰單州本單父縣梁爲輝州後唐同光二年復舊􅀠宋州周廣順中割􅀠曹州史記曰虙不齊字子賤爲單父宰反命於孔子曰國有賢者賢不齊者五人敎不齊所以治者孔子曰惜哉不齊所治者小所治者大則庶幾矣吕氏春秋曰宓子賤治單父彈鳴琴身不下堂而單父治許州十道志曰許州許昌郡禹貢豫州之域周爲許國左傳曰許太岳之㣧也􅀃文曰許炎帝之後也武王伐紂時封之漢志曰潁川許縣舊許國也魏略曰後漢建安元年太祖迎獻帝都於許即此邑也魏文帝即位改許昌縣焉左傳曰鄭伯請釋泰山之祀而祀周公以㤗山之祊易許田仐有魯故城在長社縣後漢書曰宋寵爲潁川太守問功曹鄭凱曰聞貴郡山川多産竒秀前賢往哲可得聞乎凱對曰鄙郡禀嵩髙之靈中岳之精是以聖賢龍蟠俊乂鳯集昔許由巢父恥受堯禪洗耳河濵重道輕帝邈丗髙蹈樊仲父者志㓗心遐恥山河之功賤天下之重抗節叅雲公儀許由俱出陽城留侯張良竒謀輔丗􅀇笇入微濟生民之命恢帝王之略功成而不居爵厚而不受岀于父城胡元安體曽參之至行履樂正之純業喪親泣血骨立形存精神通於神明雉兎集於左右出潁陽彪義山英姿秀偉逸才挺出究孔子之房隩存文武於將墜出於昆陽杜伯夷經學著於師門政事熈於國朝清身不茍有於陵之操損巳存公有公儀之節岀定陵又曰獻帝建安元年遷都許魏略曰黄􅀄五年文帝東征留郭后於永始臺霖􅀨百餘日城樓多壞有司請移后曰昔楚昭王出遊貞姜留漸臺江水至使者迎而無符不出卒没今帝在逺未有急奈何移也又景福殿賦曰鎭以崇臺寔曰永始臺在許昌縣魏志曰荀彧字文􅀂潁川潁隂人也董卓之亂彧謂父老曰潁川四戰之地天下有變當爲兵衝冝亟去無乆留郷人多懷􅁟猶豫㑹兾州牧韓馥迎彧獨將宗族至兾州後董卓遣李催等岀關東所過虜掠至潁川郷人留者多見殺略陳州十道志曰陳州淮陽郡置在菀丘縣元和郡國圖曰禹貢豫州之域夲太昊之墟周武王封嬀滿於陳春秋時楚滅之􅁗滅楚屬潁川郡漢髙分置淮陽國後漢改爲陳國毛詩陳風曰坎其擊鼓宛丘之下又曰東門之池可以漚麻注水經曰東門池水至清而不耗不生諸草爾雅曰陳有宛丘又曰丘上有丘爲宛丘漢書曰髙帝十一年立子友爲淮陽王罷潁川郡以益之七賢傳曰漢武出淮陽到監郷帝問陳翼曰此名爲何翼曰監郷上曰何欺乎翼曰臣言不欺􅀂不欺佩刀當生白毛􅀂欺則無毛視之刃果有毛監郷在盧江縣潁州十道志曰潁州汝隂郡置在汝隂縣元和郡縣圖曰禹貢豫州之域春秋胡子國楚滅之秦併天下爲潁川郡在漢州則汝南郡之汝隂縣也魏晉於此置汝隂郡後魏改置潁州毛詩曰遵彼汝墳伐其條枚史記曰蒙恬伐楚􅃦丘今汝隂縣有寢丘故城在焉吕氏春秋曰楚孫叔敖戒其子曰我死王必封汝無受利地荆楚之間有寢丘其地爲不利可長有也其子從之楚封功臣二葉而滅唯寢丘不奪一名沈丘蔡州十道志曰蔡州汝陽郡禹貢豫州也圖經曰春秋時爲沈蔡二國之地後爲楚魏二國之境秦兼天下以其地爲三川漢爲汝南郡地形志曰謂之懸瓠城亦名懸壷城又水經曰汝水周城形如懸瓠故取名焉史記曰周武王克殷封叔度於蔡挾武庚作亂周公殺管叔而放蔡叔與車七乗子改行率德周公聞之舉胡以爲魯卿士故魯國治復封胡于蔡是爲蔡仲輿地志曰新蔡縣蔡平侯自上蔡徙都之故曰新蔡漢志曰汝南郡髙帝置王莽曰汝汾又曰鮦陽屬汝南郡在銅水之陽也鮦音紂又曰呉房夲房子國也楚靈王遷房于楚呉王闔閭弟夫槩王犇楚楚封於此爲堂谿氏以封呉故曰呉房史記􅂫秦􅀃韓王曰韓之劒㦸出堂谿又曰李斯上蔡人也二丗二年七月具斯五刑論要斬咸陽市斯出獄與其中子俱執頋謂子曰吾欲與客復牽黄犬出上蔡東門逐校兎可得乎後漢書曰許劭字子將汝􅀯平輿人也兄䖍亦知名汝南人稱平輿淵有二龍焉平輿故城今蔡州汝陽縣東北有二龍郷月且里太平御覽卷第一百五十九
