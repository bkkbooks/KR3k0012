body:
  text: 資産部六織紡績漂淣織說文曰織作帛揔名也經織從絲也緯織橫也經緯綜機縷也縷績織餘也禮記内則曰女子十年不出執麻葈治絲繭織紝組紃學女事左傳文公上曰仲尼曰臧文仲妾織蒲三不仁毛詩國風大東曰􅉥彼織女終日七襄史記曰公儀休相魯去織婦㧞園葵戰國䇿曰甘茂謂􅁗武王曰曽子處屈人有與曽子同名族者而殺人人告曽子之母母曰吾子不殺人也織自􅀂有頃人又曰曽參殺人曽子母懼投杼踰墻魏略曰太祖始丁夫人又劉夫人生子循及清河長公主劉早終丁養子循子循亡於穰丁常言將我兒殺之都不復念遂􅂘泣無節太祖忿之遣歸家欲其意折後太祖就見之夫人方織外人傳公至夫人踞機如故公到撫其背曰頋我共載歸乎夫人不頋又不應太祖却行立於户外復云得無尚可􅁘遂不應太祖曰眞決矣遂與絶魏志曰中山㳟王衮徙封濮陽太和二年就國尚儉約勑妃妾紡績紝織習爲家人之事呉志曰陸凱上䟽云自昔先帝時後宫列女及諸織絡數不滿百米有畜積貨財有餘先帝崩後㓜景在位便改奢侈不蹈先跡伏聞織絡及諸徒坐乃有千數又曰華覈上䟽云今吏士之家少無子女多者三四少者一二通令户有一女十萬家則十萬人人人織績一歳一束則十萬束矣使四疆之内同心勠力數年之間布帛必積恣民五色唯所服用但禁綺繡無益之飾此救乏之上務冨國之夲業也南史曰齊宣孝陳皇后家貧少勤織作家人矜其勞或止之后終不改唐書曰盧坦爲壽安令時河南尹徴賦限窮而縣人訴以機織未就坦請延十日府不許令人就織而輸勿頋限也違之不過罰令俸耳旣成而輸坦亦坐罰由是知名墨子非樂曰使婦人爲之廢紡績織維之事莊子曰民有常性織而衣耕而食是謂同德又曰叔文相莒三年歸其母自織請其母曰文相莒三年有馬千駟今猶自績文之所得事皆將弃之母曰婦人不好紡績織絍必有􅁋泆之心韓子曰呉起示其妻以組曰爲我織組令如是組巳就而效之其組異善起曰非詔也使衣而歸其父請徃之起曰家無虚言又曰魯人身善織履妻善織縞而欲徙於越或謂之曰子必窮矣魯人曰何也曰履之也而越人舟行縞爲冠之也而越人􅀍髮以子之所長也游於不用之國欲使無窮其可得乎國語曰勾踐非其身之所種則不食非夫人之所織則不衣十年不収於國焦贑易林蒙之無妄曰織帛未成緯盡無名長子逐兎鹿起失路列女傳曰孟子之少也旣學而歸孟母方織問曰學何所至矣子曰自􅀂也言未能􅀶母以刀㫁其織子懼而問其故母曰子之廢學􅀂吾㫁斯織也夫君子學以立名問則廣知是以居則安寜動則逺害今而廢之則是不免於厮役而無以離於患禍何以異於織績而中道廢而不爲豈能衣其夫子而長不乏粮食哉孟子懼旦夕勤學不息又曰文伯相魯敬姜謂之曰吾語汝治國之要盡在經耳經者緫絲縷以成文采有經國治民之象夫幅者所以正枉也不可不強故幅可以爲將枉曲也幅強乃能正曲將強乃能除亂以幅喻將也晝者所以均不服也故晝可以爲正晝傍也正官長也緦縷得晝以喻徒庶得長而後齊物者所以治蕪與莫莫也故物可以爲都大夫物謂一文墨也不知丈尺多少使意丗與蕪而莫莫也都大夫主治民理衆也持交而不失出入不絶者悃也以爲大行人悃使縷交錯出入不失理也似大行人交好鄰國不離也大行人主使命者推而徃引而來者綜也綜可以爲関内之師綜惟縷令徃引之令來似􅀜内師収合人衆使令有節開内師主境内之師衆主多少之數者均也均可爲内史均謂一齒受一縷多少有數猶内史之治民也服重任行逺道正直而固者軸也可以爲相相當大任堅固不倦死而後巳有若軸舒而無窮者摘摘者可以爲三公摘謂勝也舒而不窮喻三公道德潔備無匱竭也文伯載拜受教孝子傳曰董永性至孝而家貧父死賣身以備棺斂旣葬即詣主人將償其直路逢一女子云能織願爲永妻永不得巳與同詣主人問其故永具以對主人曰必爾者但令爾婦爲我織縑百疋於是妻爲主人織十日百疋具焉主人大驚即遣永夫妻妻出門謂永曰我天之織女也卿篤孝賣身葬父故天使我爲卿償債耳言終忽然不見仇池記曰仇池縣庫下悉安織婢綾羅絹布數十張機崔元始正論曰僕前爲五原太守土地不知緝績冬至積草伏卧其中􅀂見吏以草􅆞身令人酸􅈹吾乃賣儲峙得二十餘萬詣鴈門廣武迎織師使巧手作機及紡以教民織具以上聞古艶歌曰孔雀東飛苦寒無衣爲君作妻中心惻悲夜夜織作不得下機三日載疋尚言吾遲古歌辭曰大婦織綺羅中婦織流黄小婦無所爲挾琴上髙堂大人且徐徐調絃遽未央古詩曰迢迢牽牛星皎皎河漢女纎纎擢素手扎扎弄機杼􅀍徒元書曰冝脩田農作園圃織絍紡績爲坐作之夲利常令供養之物有兼副紡續左傳昭公五曰􅀄莒有婦人莒子殺其夫以爲􅊔婦寡婦爲􅊔及老託於紀鄣紡焉以度而去之因紡纑連所紡以度城而藏之以待外攻者欲以報讎及師至則投諸外投城䋲外隨之而出毛詩國風東門之枌曰不績其麻市也婆娑箋云績麻絲婦人之事也疾今不爲又曰八月載績載􅀇載黄我朱孔陽爲公子裳載績折事畢而麻事起矣漢書曰張安丗尊爲公侯食邑萬户身衣戈綈夫人自紡績又曰冬民旣入婦人同巷相從夜織婦女一月得四十五曰必相從者所以省費燎火同巧拙而合習俗也三輔决録同晉書曰鄭袤妻曹氏事舅姑甚孝躬紡績之勤以充奉養南史曰宋􅀽㓜孤飢寒不足母琅邪王氏太尉長史延之女也躬事績紡以供朝夕又曰齊劉揩爲交州與垣曇􅀷同行曇􅀷未至交州而卒曇􅀷妻鄭字獻英筞陽人時年二十子文凝始生仍隨揩到鎭晝夜紡織居一年私裝了乃告揩求還又曰梁武丁貴嬪少時與隣女月下紡績諸女並患蚊蚋而貴嬪弗之覺也郷人魏益將娉之及成而武帝鎮樊城嘗登樓以望見漢濵五采如龍下有女子擘絖則貴嬪也又丁氏因人以聞之於帝帝贈以金環納之時年十四又曰諸曁東洿里屠氏女父失明痼疾親戚相弃郷里不容女移父母逺住紵舎晝採樵夜紡績以供養父母陳書曰陳靈洗爲公侯數妾無游手普督之紡績至於散用貲財亦不儉恡隋書曰孝婦覃氏者上郡鍾氏婦也與其夫相見未幾而夫死時年十八事後姑以孝聞數年之間姑及伯叔皆相繼而死覃氏躬自節儉晝夜紡績畜財十年而葬喪爲州里所敬上聞而賜米百石表其門閭又曰鄭善果母清河崔氏旣寡之後􅁪自紡績毎夜分􅄰善果曰兒封侯開國位居三品秩俸幸足母何自勤如是耶荅曰嗚呼汝年巳長成吾謂汝知天下之理今聞此言故猶未也至於公事何由濟乎今此秩俸乃是天子報尔先人之用命也當須散贍六姻爲君先之惠妻子柰何獨擅其利以爲富貴哉又絲枲紡績婦人之務上自王后下至大夫士妻各有所製􅀂墮業者是爲驕逸吾雖不知禮其可自敗名乎唐書曰永泰二年夏賜安南節度婦金氏兩丁侍養金氏夲賊帥陶齊亮之母以忠義訓齊亮齊亮不受遂與齊亮絶自績而衣自田而食州里稱之仍詔夲道使毎季給銀二兩充衣服以終其身國語曰魯公父文伯退朝朝其母母方績文伯曰以􅢴之家而主猶績言家有寵不當績也懼忓季孫之怒也季孫康子位尊又爲大宗其以歜爲不能事主乎其毋歎曰魯其亡乎使僮子備官而未之聞耶僮矇不達也言巳居官而未聞道春秋後語曰甘茂奔齊路逢􅂫代將爲齊使於􅁗甘茂曰臣得罪於􅁗逃遁至此遁潜也無所容跡容跡猶容足也吾聞貧人女與冨人㑹績貧人女曰我無錢以買燭而子燭幸有光子可以分我餘光無損子明而得一斯便焉斯在也言貧女子此一便也今臣困而子方使􅁗而當路矣茂之妻子在􅁗願君以餘光振之振整也又贍給之義􅂫代許諾列女傳曰齊女徐吾者東海上貧婦人也隣婦李吾之屬合燭相從夜績徐吾曰我無以買燭而子之火光有餘分我餘光無損子明而我爲斯便不亦可乎異苑曰昔有老姥雨夜紡績㫁失􅜒所在姥獨罵云何物􅀑擔去户外即有應言蹔􅀉避雨實不偷􅜒自執覔姥驚懼窺外無所見􅜒亦㝷􅀗王子年拾遺記曰魏文帝所愛美人薛靈芸常山人父業經爲鄭郷亭長母陳氏隨業舎於亭傍靈芸年十七生居貧賤至夜毎聚隣婦夜績以麻蒿自照漂說文曰漂水中擊絮也史記曰韓信從下郷城下釣有漂母見信飢飯信竟漂數十日越絶書曰伍子胥至漂陽見一女子擊絮於瀬水中子胥曰豈可得飡乎女曰諾即發其簞飯清其壷漿而與之子胥謂女子母令之露子胥行五歩還頋女子自投瀬水之中呉越春秋同莊子曰宋人有善爲不􅀛手之藥者丗丗以洴澼絖爲事郭象注曰其藥能令手不拘折故常漂絮於水中也澣禮記禮器曰晏平仲祀其先人豚肩不揜豆澣衣濯冠以朝君子以爲隘矣隘猶狹陋也祀不以少牢與無田者同不盈礼也大夫士有田則􅀕無田則薦澣衣濯冠儉不務新又内則曰父母舅姑冠帶垢和􅁅請漱衣裳垢和􅁅請澣手曰漱足曰澣和漬也又曰是日也妻以子見於父貴人則爲衣服由命士以皆漱澣貴人大夫以上也由自也又曰妾子生三月之未漱澣夙齊見於内寢毛詩葛覃曰薄汙我私薄澣我衣汙煩也私燕服也婦人有副禕盛飾以朝事舅姑接見于宗廟進見于君子其餘則私也澣謂濯之耳又栢舟曰心之憂矣如匪澣衣如衣之不澣矣箋云衣之不澣則憒辱無照察漢書曰石奮以上大夫禄歸老于家長子建爲郎中令少子慶爲内史建老白首萬石君尚無恙毎五日洗沐歸謁親入子舎􅀼問侍者取親中帬厠榆身自澣洒師古曰親謂父也中羣􅀂今言中衣也厠䄖者近身之小衫􅀂今小衫也復與侍者不敢令萬石君知之以爲常晉書曰王師敗績於湯隂百官侍衛莫不潰散唯􅄞紹以身捍衛遂􅀍害於帝側血濺御服天子􅀷哀歎之及事定左右欲澣衣帝曰此嵇侍中血勿去又曰鄭袤妻曹氏食無重味服澣濯之衣宋書曰左僕射謝景仁性嚴整潔居宇浄麗每坐輙唾左右人衣事畢即聽一日澣濯毎欲唾左右爭來受之又曰江湛爲吏部尚書家甚貧不營財利餉饋盈門無一所受無兼衣餘食甞爲上所召遇澣衣稱疾經日衣成然後起梁書曰武帝雖衣浣衣而左右衣必須㓗嘗有侍臣衣滯卷摺帝怒曰卿衣帶如繩欲何所􅅞又曰昭明太子統欲以已率物服御朴素身衣浣衣膳不兼肉南史曰陳王逡之衣裳不澣几案塵黒唐書曰肅宗性儉約衣服無綺繡嘗出衣䄂示韓擇木曰朕巳三浣矣淮南子曰楚莊王誅里史孫叔敖制冠澣衣仲長子昌言曰攻玉以石澣布以􅁅龍魚河圖曰婦人無以夫衣合集澣之使之不利韓詩外傳曰孔子南遊適楚至阿谷隧有處子佩璜而澣者孔子抽觴以受子貢曰以觀其辭子貢曰將南之楚逢天之暑欲乞一飲婦人曰阿谷之隧隱曲之汜其水載清流而趣海欲飲則飲何問婢子風俗通東海王景興議曰晏平仲以齊君奢故澣其朝冠振其鹿裘太平御覽卷第八百二十六
