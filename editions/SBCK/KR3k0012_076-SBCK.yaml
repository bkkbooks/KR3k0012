front:
  text: 太平御覽卷第七十六皇王部一
  hash: sha256:58d57c4b0ebdecbe30000d94ccb031f21176e335bc36564f304595007eaeb3a9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_076-1a}
body:
  text: 叙皇王上尚書緯曰帝者天號王者人稱天有五帝以立名人有三王以正度天子爵稱也皇者煌煌也洛書曰皇道􅆙故帝者興易坤靈圖曰在政不私公位稱之曰帝易緯曰帝者天號也徳配天地不私公位稱之曰帝天子者繼天治物改政一統各得其冝父天母地以養生人至尊之號也大君者君人之盛也易乹鑿度曰帝王興亡必察八部觀卦之符物之應動八部者八部之方候將興以孟月候將士以季月觀非卦之符如震則有龍巽則有雞之􅀋物謂雲物也又曰興於仁立於禮畢於義定於信成於智五者道徳之分天下之際聖王之所以通天意而明至道也又曰王者天下所歸天子者繼天理物改一統政大君者人君之盛稱大化行於萬人冝處王者施大化爲大君也周書曰三王之統􅀂循連環周則復始窮則反夲尚書大傳曰三王之治如環之無端如水之勝火又曰古者天子有四隣前曰疑後曰丞左曰輔右曰弼有問無以對責之疑可志而不志責之丞可正而不正責之輔􅀭而不􅀭責之弼韓詩外傳曰明王有三懼一曰處尊位而恐不聞其過二曰得志而恐驕三曰聞天下之至道而恐不能行又曰君者群也群天下萬民而除其害者謂之君王者徃也天下徃之善養生人者也故人尊之善辯治人者也故人安之善顯設人者也故人親之善粉飾人者也故人恱之四徳具而天下徃之四徳無一而天下去之徃之之謂王去之之謂亡故曰道存則國存道亡則國亡大戴禮曰古者天子常以季冬考德以􅀚治亂得失又曰昔堯取人以狀舜取人以言湯取人以聲文王取人以度禮曰君天下曰天子又曰天子以徳爲車以樂爲御又曰昔先王尚有徳尊有道任有能舉賢而置之聚衆以誓之是故因天事天因地事地又曰帝嚳能序星辰以著衆堯能賞均刑法以義終舜勤衆事而野死鯀鄣洪水而殛死禹能脩鯀之功黄帝正名百物以明民共財顓頊能脩之湯以寛治民而除其虐文王以文治武王以武功去人之災此皆有功烈於人者也又曰王天下有三重其寡過矣乎三重三王之禮也又曰孔子曰大道之行也與三代之英丘未之逮也而有志焉大道謂五帝時也大道之行也天下爲公選賢與能講信脩睦故人不獨親其親不獨子其子使老有所終壯有所用㓜有所長是故謀閉而不興盗􅀼亂賊而不作故外户而不閉是謂大同同猶和平也又曰故聖人作則必以天地爲夲以隂陽爲端以四時爲柄以日星爲紀以月爲量􅀑神以爲徒五行以爲質禮義以爲器人情以爲田四靈以爲畜又曰故聖王脩義之柄禮之序以治人情故人情者聖人之田也禮斗威儀曰帝者得其英華王者得其根核霸者得其附支故帝道不行不能王王道不行不能霸霸道不行不能守其身禮含文嘉曰山澤者三皇五帝之感應也春秋演孔圗曰正氣爲帝間氣爲臣宫商爲姓秀氣爲人正氣爲􅀂木則人得蒼龍之形靈威仰之氣史則得朱鳥之形赤熛怒之氣以生之又曰天子皆五帝精寳各有題序次運相據起必有神靈符紀諸神扶助使開階立遂遂當作燧燧道也又曰王者常置圖籙坐旁以自正春秋元命苞曰皇者煌煌也道爛然顯明帝者諦也春秋文耀鈎曰王者徃也神所向徃人所歸樂春秋運斗樞曰宓犧女媧神農是謂三皇也皇者合元履中開隂布綱指天畫地神化潜通春秋合誠圖曰大帝之精起三河之州中土之􅃾又曰大帝冠五彩衣青衣黒下裳抱日月日在上月在下黃色正方居曰間名曰五光正黄而名之曰五光者盖以黄爲質而衆彩就飾之故曰五色此大帝人象旁文也春秋保乹圖曰天子至尊也神精與天地通血氣含五帝精人愛天地氣而主故神精與天地通天愛之子之也春秋佐助期曰天子法斗諸侯應宿春秋潜潭巴曰天子有三寳謂璿璣玉衡得其度也春秋繁露曰徳侔天地者稱皇帝天佑而子之號稱天子孝經授神契曰王徳珎文備象連表萬精曲飾題􅀋設術脩經躬仁尚義祖禮行信握􅁠仁智順道形人俱在至徳孝經鈎命决曰三皇歩五帝驟三王馳五霸騖或稱帝王接上稱天子明以爵事天接下稱帝王明以號令臣下論語􅎥褰聖承進曰帝不先義任道徳王不先力尚仁義霸不先正尚武力論語撰考䜟曰考靈差徳知堯歩舜驟禹馳湯騖徳有優劣故曰行轉疾也家語曰孔子􅀚乎明堂覩四門之墉有堯舜桀紂之象又有周公相成王之圖孔子謂從者曰夫明鏡所以察形徃古所以知今又曰季康子問於孔子曰舊聞五帝之名而不知其實請問何謂孔子曰昔丘也聞諸老􅡭天有五行木金火水及􅁟分時化育以成萬物其神謂之五帝古之王者易代改號取法五行五行更王終始相生亦象其義也故其生爲明王者而死配五行白虎通曰帝王者號也號者古之表也所以表功明徳號令臣下徳合天者稱帝仁義合者稱王別優劣也又曰皇君也美也大也天人之揔美大之稱也時質惣稱之漢書曰堯舜禹稷與之爲善則行驩兠欲與爲􅁖則誅可與爲善不可與爲􅁖是謂上智桀紂龍逢比干欲與爲善則誅子華崇侯與之爲惡則行不可與爲善可與爲惡是爲下愚應劭漢官儀曰皇者大帝言其煌煌盛美帝者徳象天地言其能行天道舉措審諦父天母地爲天下主漢􅄂事曰漢有天下號曰皇帝自稱朕人臣稱之曰陛下其命令制詔衣冠車馬器械百物曰乗輿所在曰行在所至曰幸所居曰禁中所進曰御天子至尊不敢䙝瀆之故託於乗輿天子以天下爲家不以京師宫室爲常處則當乗輿以行天下猶調之車駕今雖在京師京師言行在所廵狩天下所奏事處皆爲宫在長安則曰長安宫在泰山則曰奉商宫唯當時所至帝王世紀曰天子至尊之定名也應神受命爲天所子故謂之天子故孔子曰天子之徳感天地洞八方是以功合神者稱皇徳合天地稱帝義名曰稱王韋曜洞紀曰自天地剖判君世宰人可得而言者唯庖犧畫卦神農作稼黃帝輿服最爲昭顯其餘非書記所述難可紀焉六韜曰王者之道如龍之首髙居而逺望􅀷視而審聽神其形而散其精􅀂天髙而不可極􅀂淵􅀷而不可測故可怒而不怒臣乃爲虎不可殺而不殺大賊乃發又曰昔栢皇氏栗陸氏驪連氏軒轅氏赫胥氏尊盧氏祝融氏此古之王者也未使民民化未賞民民勸此皆古之善爲政者也至於伏犧氏神農氏教民而不誅黄帝堯舜誅而不怒古之不變者有苗有之堯化而取之堯徳衰舜化而受之舜德禹化而取之太公伏符隂謀曰武王曰三皇之治母禮義而民利之何也太公曰三皇之時近之則利去之則病所謂上聖神德而治其次教而化之近聖賞罰之管子曰黃帝立明臺之議上觀於賢也堯有衢室之問下聽於人也舜有告善之旌而主不蔽也禹立建鼓於朝而備評謡也湯有緫街之庭觀人誹也武王有靈臺之復賢者進也古聖帝明王所以有而勿失得而勿亡也又曰明一者皇察道者帝通徳者王謀得兵勝者霸又曰桓子問曰三王者旣殺其君矣今言仁義則必以三王爲法度不識其故何也對曰昔者禹平治天下及桀而亂之湯放桀以定禹功也湯平治天下及紂而亂之武王伐紂以定湯功也善之伐不善自古至今未有改之君何疑焉又曰言室滿室言堂滿堂是謂聖王又曰昔者七十九代之君法制不一號令不同然俱王天下者何也必國冨而粟多也夫冨國多粟生於農故先王貴之晏子曰古者有紩衣攣領而王天下者有處層巢窟穴而王天下者老子曰聖人處無爲之事行不言之教萬物作而不辭生於不有爲而不恃功成而不居夫唯不居是以不去又曰不尚賢使民不爭不貴難得之貨使民不爲盗不見可欲使心不亂是以聖人之治虚其心實其腹弱其志強其骨常使民無知無欲使夫知者不敢爲也無爲則無不治也又曰道大天大地大王亦大域中有四大而王居其一又曰聖人無常心以百姓心爲心善者吾善之不善者吾亦善之得善矣信者吾信之不信者吾亦信之得信矣聖人在天下慃然爲天下渾其心百姓皆注其耳目聖人皆孩之又曰聖人之言云我無爲而民自化我無事而民自冨我好静而民自正我無欲而民自樸又曰聖人執左契而不責於人故有徳司契無徳司徹聖人之心與百姓心猶左右契耳契來則合故上下相親怨用不作後世不能執左契以應物而守常􅜂以軌民用此來和必有餘怨矣又曰江海所以能爲百谷王者以其善下之也是以聖人欲上人也必以其言下之欲先人也必以其身後之故處上弗害是以天下樂推而不厭也董子曰爲天子不可不承天意必順其道然後爲安又曰古之造文字者三畫而謂之王三畫者天地人也連其中者通其道也孟子曰人皆有不忍人之心言人人皆有不忍加惡於人之心也先王有不忍人之心斯有不忍人之政矣以不忍人之心行不忍人之政治天下可運之掌上也又曰五霸者三王之罪人也趙臺卿章句曰五霸大國康政以率諸侯也齊桓晉文秦襄楚莊是也三王夏禹啇湯周文王也今之諸侯五霸之罪人也天子討而不伐諸侯伐而不討孫卿子曰人君者隆禮尊賢而王重法愛人而霸好利多詐而危欲近四旁莫如中央故王者必居天下之中也又曰粹而王駮而霸無一焉而亡又曰國者天下之利用也人主者天下之利勢也得道以持之則大安大榮積善之源也不得道以持之則大危也義立而王信立而霸權謀立而亡行一不義殺一無罪而得天下仁者不爲也莊子曰盗跖曰古之禽獸多而人民少於是人皆巢居以避之晝拾橡栗暮栖木上故命之曰有巢氏之古者人不知衣服夏則多積薪冬則􅌆之故命之曰知生之人神農之代卧則居居起則于于知其母不知其父與麋鹿同處耕而食織而衣無有相害之心此至德之隆也又曰夫帝王之德以天地爲宗以道德爲主以無爲爲常無爲也則用天下而有餘又曰天道運而無所積故万物成帝道運而無所積故天下歸聖道運而無所積故海內服此三者恣物之性而無所牽滯明於天道於聖六通四辟帝王之德者夫靈静恬淡寂寞無爲者萬物之本以此處上帝王天子之德又曰廣成子曰得吾道者上爲皇而下爲王郭璞曰皇王之稱隨世之上下耳其於得通變之道以應無窮一也失吾道者上見光而下爲􅁟失無窮之道則自信於一變而不能均同上下矣故俯仰異心也又曰赫胥氏之時民居不知所爲行不知所之含哺而熈皷腹而遊民能以此矣又曰昔容成氏大庭氏柏皇氏中央氏栗陸氏驪連氏軒轅氏赫胥氏尊盧氏祝融氏伏犧神農氏當是時也民結繩而用之郭象曰足以紀要而已也甘其食美其服適故常甘當故常美􅀂思夫侈靡則無時慊矣樂其俗安其隣國相望雞狗之音相聞民至老死而相徃來無求之至也􅀂此時則至治也巳又曰古之王天下者知雖落天下不自慮也辯雖彫萬物不自􅀃也能雖窮海內不自爲也天不産而萬物化地不長而萬物育帝王無爲天下功故曰莫神於天莫冨於地莫大於帝王故曰帝王之德配天地此乗天地馳萬物而用人君之道也又曰至德之世不尚賢不使能民如野鹿正而不知以爲義相愛而不知以爲義實而不知以爲忠當而不知以爲信又曰聖人之静也非曰其静者善故静也萬物無足以橈心者故静也郭象曰撓亂也夫靈静恬淡寂寞無爲者天地之平而道德之至也故帝王聖人休焉唐子曰君人者秉南面之尊操殺生之柄威如秋霜恩如春養何求而不得何化而不從君人者當以江海爲腹山林爲面當使觀者不知江河藏山何有􅂫子曰天子坐九重之内樹塞其門旒以翳明衡以隱聽鸞以柳馳陸子曰三皇垂筞而五帝繁手唐虞按轡禹湯馳轅雖使周公御衡仲尼促節固不已也孫綽子曰道一者帝德充者王依仁仗義者霸無爲而治者道也爲能不恃者德也存三亡國仁也責貢不入義也慎子曰昔者天子手能依而宰夫設服足能行而相者導進口能言而行人稱辭故無失言失禮也又曰古者立天子貴之者非以利一人曰天下無一貴則理無由通通理爲天下也故立天子爲天下也非立天下爲天子也立國君以爲國也非立國以爲君也太平御覽卷第七十六
