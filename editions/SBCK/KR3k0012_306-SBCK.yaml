body:
  text: 兵部三十七請征伐出師軍行請征伐家語曰孔子北遊登於農山子路子貢顔回侍側孔子四望喟然而歎曰二三子各言爾志吾將擇焉子路進曰由願得白羽􅀂月赤羽􅀂日鍾鼔之音上震于天旌旍􅌭紛下蟠于地蟠委也由當一隊而敵之必也攘地千里攘却也搴取也旗執馘唯由能之使夫二子從我焉孔子曰勇哉史記曰終軍請願受長纓必覊南越王而致之闕下又曰單于爲書慢罵太后樊噲曰臣願得十萬衆横行匈奴中季布曰髙皇帝以三十萬困於平城噲亦在其中且􅁗以事胡陳勝等起後漢書曰劉尚擊武陵五溪蠻􅀷入軍􅃿援因復請行時年六十二帝恐其老未許之援自請曰臣尚能􅀍甲上馬帝令試之援據鞍顧盻以示可用􅀏曰矍鑠哉是翁也矍鑠勇皃也東􅀚記作矍哉是翁矍音許約反遂遣援援馬援也又曰更始郾王尹尊及諸大將在南方未降者尚多帝召諸將議兵事未有信言沉吟乆之乃以檄叩地曰郾最強宛爲次誰當擊之賈復率然對曰臣請擊郾帝􅀏曰執金吾擊郾吾復何憂唐書曰李晟以軍功授特進光禄卿㝷轉試太常卿大暦􅀄李抱玉鎭鳯翔署晟爲左軍都將四年吐蕃圍靈州抱玉遣晟將兵五千以擊􅄍蕃晟辭曰以衆則不足以謀則太多乃請將兵二千人疾出大霰闕至臨洮屠定􅁗堡焚其積聚虜堡師慕容谷鍾而還吐蕃因解靈州圍而去也又曰馬隧討李懷光師次於焦離堡其夜賊將呉冏棄太原堡走其下皆降燧率諸軍濟河兵凡八萬陣於城下是日賊將牛俊斬懷光首以降降者一萬六千斬賊將閻晏孟寳張清呉冏等七人以徇爲懷光所虜脅捨之燧自從京師至河中凡二十七日上乃下詔褒美遷光禄大夫兼侍中􅀄德宗欲罷兵燧不可請得一月蒭糧足以平河中至是果然矣又曰德宗幸奉天詔李晟與李懷光合軍拒朱泚時毎將出合戰晟必自異衣錦裘繡帽於前親自指導懷光望見之乃謂晟曰將師當持重豈冝自裘飾以㗖賊耶晟曰前乆在涇源軍士頗相畏服故欲令其先識以奪其心耳懷光益不恱隂有異志兵遷延不進晟因入􅀃懷光曰㓂賊偷據天子行在近縣兵柄廟略属在於公公冝以時速進晟願以所部得奉嚴令爲公前驅雖死不悔懷光益拒之又曰史敬奉靈武人少事本軍爲衙將元和十四年敬奉大破􅄍蕃於塩州城下賜實封五千户先是西戎頻歳犯邊敬奉白節度使杜叔良請兵三千人備一月糧深入蕃界叔良以二千五百人授之敬奉旣行十餘日人莫知其所向皆謂􅄍蕃盡殺之矣乃由他道深入突出蕃衆之後戎人驚潰敬奉率衆大破之殺戮不可勝紀驅其餘衆於蘆河獲羊馬駞牛萬數敬奉形甚短小􅀂不能勝衣至於野外馳逐能擒奔馬自執鞍勒隨鞍躍上然後羈帶矛失在手前無強敵甥姪及僮使僅二百人每以自隨臨入敵輙分其隊爲四五隨逐水草毎數日各不相知及相遇巳皆有獲虜矣三國典略曰北齊乎廣陵王孝珩曰奈何嗣君無獨見之明宰相非柱石之􅀉内叅羣竪離間骨肉恨不得握兵符受廟筭出萬死身先士卒展我力耳又曰齊主曰今日飲酒樂哉武衛將軍斛光進曰􅀜西未平人爲仇敵陛下亦何樂哉㑹當馬歩十萬三道渡由平道䧟玉璧拔長安自􅀲涼色來納在掌握使百官襲冠冕軍士釋介胄然後稱樂齊主謂羣臣曰明月常有此意憂國如家卿輩無及之者平原王叚韶出謂光曰卿勝先帝耶先帝以四十萬攻玉璧不利而還將兵如盤擎水誤即傾覆何容易而輕言之光􅀏曰非卿所知出師易曰師出以律失律凶也書曰張皇六師肅將天威兼弱攻昧推亡固存無作神羞詩曰維師尚父時維鷹揚禮記曰師出不踰時爲怨思也踰時即内有怨女外有曠夫又曰天子將出征􅀋于上帝冝乎社造乎禰禡於所征之地禡師􅀕也受命于祖吿􅃝受成於學定兵謀也出征執有罪反釋奠於學以訊馘告周禮曰牙璋以起軍旅又曰􅀋􅀕先出師告天􅀕也造􅀕將興兵造於先祖􅀕也􅂖梁曰甲午治兵出曰治兵習戰入曰振旅習戰也後漢書曰光武起王莽徴天下能爲兵法者六十三家數百人並以爲軍吏選練武衛招募猛士􅀃文云慕廣求也旌旗輜重千里不絶時有長人巨無霸王莽連率韓慱上言有竒士長一丈大十圍自謂巨無霸出於蓬萊東南五城西北昭如海濵軺車不能載三馬不能勝卧則枕鼔以鐵箸食見前書長一丈大十圍以爲壘尉鄭􅀇注周禮六軍壁三壘崔瑗中壘校尉箴曰堂堂皇帝設爲壘尉尉者主壘壁之事又驅諸猛獸猛或作獷獷猛貌音古猛反虎豹犀象之屬以助威武自奏漢出師之盛未甞有也又曰車駕東歸勑岑彭書曰兩城􅀂下便可將兵南擊蜀虜人􅀂不知足旣平隴復望蜀毎一發兵彭頭􅂡爲白又曰馬嚴拜將軍長史將北軍五校士羽林禁兵三千人屯西河美稷美稷縣名衛護南單于聽置司馬從事牧守謁敬同之將軍勑嚴過武庫􅀕􅃖尤武庫掌兵器令一人秩六百石前書音義曰􅃖尤古夫子好五兵故合􅀕之見髙祖紀過帝親御阿閣阿曲觀其士衆時人榮之又曰馬成拜楊武將軍督誅虜將軍劉隆振威將軍宋登射聲校尉王賞發㑹稽丹陽九江六安四郡兵擊李憲時帝幸夀春設壇􅂣祖禮遣之又曰涼部叛羌揺蕩四州朝廷憂之於是詔鄧騭將左右羽林北軍五校士及諸部兵擊之車駕幸平樂餞近又曰馬援出師詔百官祖道又曰光武籌赤眉必破長安欲乗舋并入關中而方自事山東未知所􅀉以鄧禹沉深有大度故授以西討之略乃拜爲前將軍持節中分麾下精兵二萬人遣西入􅀜令自選偏禆以下可與俱者晉書曰何曽正始中爲鎭北將軍都督河北諸軍事假節將之鎭文帝使武帝齊王攸辭送數千里曽盛爲賔主備太牢之饌侍從吏騶莫不醉飽又載記曰符堅以符融爲鎮東大將軍代王猛爲兾州牧融將發堅祖于霸東奏樂賦詩堅母苟氏以融少子甚愛之比發王至灞上其夕又竊如融所内外莫知是夜堅􅃦于前殿魏延上言天市南門屏内后妃星失明左右閣守不見后妃移動之象堅推問知之驚曰天道與人何其不逺遂重星官後魏書曰車駕南伐以劉藻爲征虜將軍督統軍髙聦等四軍爲東道別將辭於洛水之南孝文曰與卿石頭相見藻對曰臣雖才非古人度亦不留賊虜而陛下輙當釃曲阿之酒以待百官帝大􅀏曰今未及曲阿且以河東數石賜卿後周書曰武帝保定四年冬十月甲子詔大將軍大冢宰晉國公護率軍伐齊帝於太廟庭授以斧􅃏護緫大軍出潼􅀜大將軍權景宣率山南諸軍出豫州少師楊檦出枳關丁夘幸沙􅁐勞師三國典略曰侯景西逼梁湘東王遣􅀳州刺史蕭惠正率兵援于巴陵惠正辭以不堪舉天門郡守胡僧祐以自代王以爲武猛將軍令其進發僧祐謂其子玘曰汝可開兩髙門一朱一白吾當以死決之不捷不歸也王聞而壯之厚撫其家謂僧祐曰景便於陸道不閑水􅋐賊􅀂水戰但以大艦臨之自當必克􅀂其歩戰自可鼓棹直就巴丘不湏交鋒又曰周遣常山郡公子謹率中山公宇文護大將軍楊忠等歩􅀐五萬南伐太祖餞於青泥谷時􅁃信來聘未返太祖問之曰我遣此兵馬􅅞取湘東􅀜西作博士卿以爲得不信曰必得之後王勿以爲不忠太祖􅀏而頷之白虎通曰王者之伐所以皮弁素幘何服皮弁素幘也王者將出辭於禰還假禰祖言辭反之禮尊親之義王制曰王者將出􅀋于上帝冝于社造于禰尚書曰歸假于蓻祖出以告天至告祖也先告廟後告天者示不敢留尊者之命也吿天何示不敢專也非出辭反面道也與宗廟異義還不復吿天者天道質無内外故不復吿也尚書言歸假于祖社不見告天知不告也又曰遣將軍必於廟何示不敢自專獨於祖廟何制法度者祖也王制曰受命于祖受成于學此言於祖廟命遣之也摯虞決疑要注曰古者帝王出征以齊車載遷廟之主及社主以行故尚書甘誓曰用命賞于祖不用命戮于社􅁗漢及魏行不載王也衛公兵法曰諸大將出征且約授兵二萬人而即分爲七軍如或多或少臨時更定大率十分之中以三分爲竒兵太白隂經曰參七星伐三星連體十星爲十將西方白虎􅀫也主殺伐此星出而天下秋草木摇落有􅀂軍威故兵岀而法焉張平子南都賦曰爾其則有謀臣武將皆能獲戾執猛破堅摧剛虞子陽霍將軍北伐詩曰擁旄爲漢將汗馬出長城魏明帝善哉行曰我祖我征伐􅀍蠻虜練師簡卒爰整其旅輕舟竟川傍江依浦􅁊􅁊猛毅如熊如虎發桴􅀂雷吐氣成􅀨旌旄指麾進退合矩軍行禮記曰軍行在青龍而右白虎前朱雀而後􅀇武招摇在上急繕其怒前有水則載青旌前有車騎則載飛鴻前有塵埃則載鳴鳶左傳曰凡師出一􅀫爲舎再􅀫爲信過信爲次後魏書曰于栗磾太宗南臨孟津請衆磾曰可作橋乎對曰杜預造橋遺事可相乃編次大舡搆橋於野坂六軍旣濟太宗􅀷歎焉隋書曰煬帝征髙麗宇文述爲扶餘道將軍臨發帝謂述曰禮七十者行役以婦人從公冝以家累自隨古稱婦人不入軍臨戰時耳至於營壘之間無所傷也項籍虞􅁎即其故事唐書曰太宗率衆平汾􅀳趨龍門闕履冰而渡進屯柏璧白虎通曰王法年四十受兵法何重不絶人丗也師行不必反戰不必勝故湏其有丗也年六十歸者何不忍並門人父子也孫子曰凡用兵之法馳車千乗輕車也駕駟千乗也革車千乗重車也言萬􅀐之重也一車駕四卒十􅀐一重養一人主炊冡子一人主保國守衣裝厮二人主養馬凡五人歩兵十人重以大車駕牛養二人主炊冡子一人主保國裝凡三人也帶甲十萬士卒數也千里而饋糧境越千里則外内之費資費賔客之用􅑟􅃮之財車甲之奉曰千金然後十萬之衆舉矣又曰出其所必趣使敵不得徃相救也行千里而不勞者行於無人之地出空擊虚擊其不意又曰凡用兵之法將受命於君合軍聚衆聚因人結行位也交利而舎軍門爲利門左右門爲期門以軍營爲轅門以人爲營爲人門兩軍相當爲交利也莫難於軍争從始受命至於交利軍争難也又曰凡處軍相敵絶山依谷近水草也視生處髙向陽也處視謂目前生丗處軍當在髙戰降無登無迎髙也降下也謂山下也戰於山下敵引之上山無登遂也此處山谷之軍也絶水必逺水引敵使渡客絶水而來迎之於水内令之半渡而擊之利欲戰無附於水而迎於客也視在處髙水上亦當處其髙也無迎水流恐漑我也處水上之軍也絶斥澤唯亟去無流交軍於斥澤之中必依水草而倍衆樹不得巳與敵戰而㑹斥澤之中此處斥澤之軍也平陸處易車之利也而左右倍髙前死後生戰便此處平陸之軍也凡四軍之利黄帝所以勝四帝者也黄帝始立四方諸侯亦稱帝以此四地勝之也凡軍喜鬲而惡下貴陽而賤隂喜一作好山南曰陽山北曰隂養生處實是爲必勝軍無百疾丘陵隄防必處其髙陽而右背也堤者積土所背當處其陽而右之戰之便也此兵之利而地之助也故用兵之法髙陵勿向也敵若據山􅁜依附險阻陳待敵勿輕攻趣也旣地􅀔不便有損石之衝也背丘勿迎敵背丘陵爲陣無有後患則當引置平地勿迎而擊之又曰上雨水水沬至欲渡者待其定恐半渡而水便漲也絶磵過天井天牢天羅天䧟天郄去逆切大害必亟之勿近也山也深大爲絶澗四方高中央下爲天井深水所居朦朧者爲天牢四維絶人者爲天羅地形䧟者爲天䧟山澗夾地深數尺長數尺者謂之天郄也吾逺之敵近之吾迎之敵倍之也用兵常遠六害令敵近倍則利敵凶軍旁有險阻蔣潢井生葭葦小林翳薈烏㑹反者必謹覆索之此伏姦之所藏處也險者一髙一下之地阻者必水草也潢者池也井生葭葦者衆草所聚也小林者衆木所居也翳薈者所以屏蔽之處也衛公兵法曰軍馬行動湏知次第出先右虞􅃸馬軍爲首次右虞􅀱歩軍次右軍馬軍次右軍歩次前軍馬軍次前軍歩軍次右軍馬軍次中軍歩軍次右軍馬軍次右軍歩軍次左軍馬軍次左軍歩軍次左虞􅀱馬軍次左虞候歩軍其馬軍去歩軍一二里外行毎有髙處即令三五􅀐馬於上立顧以候不虞以後餘軍准前立馬四顧右虞候旣先發安營踏水道路脩理泥溺橋津檢行水草左虞􅃸排比隊仗整齊軍次使不交雜􅀂軍廻入先左虞􅃸馬軍次左虞􅃸歩軍次左馬軍次左歩軍其次第准前却轉其虞候軍職掌􅀄發交換諸軍營各量虞􅃸子並使排比依軍次行如此發引卒逢㓂賊部伍甚易􅀂零疊散行牽率難就萬一賊至並非所管又曰諸軍討伐例有數營發引逢賊首尾難救行引之時湏先爲方陣應行之兵分爲四輜重爲兩道引戰鋒等隊亦爲兩道引其第一分􅀄發輜重及戰鋒分爲四道行兩行戸郎切下同輜重在心􅀟引兩行戰鋒隊並合各在輜重外左右夾􅀟引其次一分戰鋒隊與前般左右行戰鋒隊相當輜重隊與前行輜重隊相當又其次一分准上最後一分亦准上􅀄發第一分別戰鋒輜重相當如其逢賊前分四行兩行輜重抽縮兩行戰鋒横列作前面甚易其次兩分先作四行長引其戰鋒旣在外便充兩面其後分亦先作四行其輜重進前其戰鋒隊横列相接使充後面亦易其方陣立即可成如此發引縱使狹路急緩亦得成陣每軍戰鋒等隊湏過夲軍輜重尾輜重稠行戰鋒等隊稠引常令輜重併近前頭戰鋒隊相去十歩下一隊輜重隊相去十歩下一隊輜重隊相去兩歩下一隊如此即湏相裏得􅀂逢川陸平坦彌加穏便其戰鋒輜重等隊分布使均又曰諸兵馬發行或逢泥溺或阻山河其路有湏填􅀘有湏開拓左右虞候軍兵先多於軍取充虞􅀱子右虞候先將此兵脩理橋梁泥濘開拓窄路左虞􅀱排窄路捍後収拾䦨遺諸兵士毎下營訖先令兩隊共掘一厠又曰軍行沙磧鹹鹵之中有野馬黄羊蹤尋之有水鳥烏所集處有水地生葭葦蘆菼吐敢反菰蒲之處下有伏泉地有蟻壤之處下有伏泉太白隂經濟水具篇曰軍行過大水河渠溝澗無津梁舟筏難以濟渡太公以天艎天舡皆質朴不便於用令隨事逐物變化而用之以濟巨川又曰木甖以木􅅞甕爲筏甕受二石力勝一人甕間闊五寸底以繩勾聮編槍於其上形長而方前置㧞頭後置梢左右置棹又曰槍茷槍十根爲一束力勝一人四千一百六十六根即爲一筏皆去鑚刃以束爲魚鱗以横栝而縳之可渡四百一十六人爲三筏計用槍一萬二千五百根率渡一千二百五十人十渡則一軍必濟又曰蒲筏以蒲九尺圍㒹倒爲束十道縳之似束鎗爲筏量長短多少隨蒲豐儉無蒲亦用葦筏量大小以濟人又曰挾縆以善水者継小繩先浮渡水次引大縆於兩岸立大橛急定縆使人挾縆浮渡大軍可爲數十道又曰浮囊以渾脫羊皮吹氣令滿擊其孔束於腋下而浮渡太平御覽卷第三百六
