front:
  text: 太平御覽卷第三
  hash: sha256:b37f04720946e76aaa5d7e4498574d86cf63c254e9a804b2fbc427622f3b9431
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_003-1a}
body:
  text: 天部三日上􅀃文云日者寳也太陽之精不􅃜字從口一象形也又君象也易曰离爲日又曰日中則􅉴又曰日以烜之又曰日月運行一寒一暑又曰隂陽之義配日月又曰懸象著明莫大乎日月又曰日月之道貞明者也又曰日中爲市致天下之民聚天下之貨又曰日徃則月來月往則日來日月相推而明生焉又曰日􅉴之離不鼓缶而歌則大耋之嗟凶又曰豐卦曰豐亨王假之勿憂冝日中宜照天下也以勿憂之德故冝照天下又曰日月麗乎天又曰日月得天而能乆照書曰寅賔出日平秩東作日中星鳥以殷仲春又曰日永星火以正仲夏日短星昴以正仲冬又曰寅餞納日平秩西成詩曰其雨其雨杲杲出日又曰謂予不信有如晈日又曰嗈嗈鳴鴈旭日始旦又曰日之夕矣羊牛下來又曰日居月諸胡迭而微又曰日出東方照臨下土又曰春日遲遲采蘩祁祁禮曰二月中氣祀朝日於東郊又曰􅀇端而朝日於東門之外又曰天無二日土無二王又曰季冬是月也日窮于次月窮于紀言運行周匝於故處次舎也紀猶㑹也又曰五月中氣是月也日長至十一月日短至周禮周官曰眂祲掌十輝之法以觀祅祥辨􅁻凶祅祥善惡之徴鄭司農云煇謂日光炁也一曰祲二曰象三曰䥴四曰􅁥五曰闇六曰瞢七曰彌八曰叙九曰隮十曰想祲隂陽氣相侵也象如赤鳥也鐫謂日旁氣四面反鄉如煇狀􅁥雲氣臨日也闇日月食也瞢瞢無光也弥者白虹弥天也叙者雲有次序如山在日上也隮者升氣也想者耀光者也又曰大司徒以土圭之法測土􅀷淺正日景以求地中日􅀯則景短多暑日北則景長多寒傳曰酆舒問於賈季曰趙衰趙盾孰賢對曰趙衰冬日之日也趙盾夏日之日也注曰冬日可愛夏日可畏又哀公六年楚有雲如衆赤烏夾日以飛三日楚子使問周太史曰其當王身􅀂禜之可移於令尹司馬王曰移腹心之疾置之肱股何益王弗禜而死孔子曰昭王其不失國也冝哉爾雅曰􅀌竹北户西王母日下謂之四荒也郭璞注曰日下在四方昬荒之國也又曰岠齊州以􅀯戴日爲丹穴岠去也齊中也東至日所出爲太平西至日所入爲太蒙即蒙汜也易坤靈圖曰至徳之萌日月若連璧易叅同契曰日爲流珠青龍之俱日爲陽陽精爲流珠青龍東方少陽也尚書考靈曜曰黒帝亡二日並照又曰仲春仲秋日出於夘入於酉仲夏日出於寅入於戍仲冬日岀於辰入於申又曰日光照四十萬六千里春秋感精符曰群臣恣則日黃無光羣臣爭則日裂人主排斥則日夜岀春秋元命包曰陽數起於一成於二故日中有三足烏又曰一歳三百六十五日四分度之一言陽布散立數合一故立字四合其一又曰日左行周天二十三萬里又曰七政度日月明春秋内事曰日者陽徳之母也禮統曰日者實也形躰光實人君之象禮斗威儀曰政太平則日五色政頌平則日黃中而赤暈政和平則日黄中而黒暈政象平則日黄中而白暈政升平則日黃中而青暈孝經援神契曰天地至貴精不兩明注天精爲日地精爲月又曰日中則光溢又曰日神五色明照四方又曰黃氣抱日輔臣忠德至於天日抱戴易傳曰聖王在上則日光明五色而備又曰日者衆陽之精内明􅀇黄五色無主以象人君精精似青翼翼似黒􅀇􅀇似赤縞縞似白煌煌似黃光照無主不可以一色名也劉向洪範傳曰日者照明之大表光景之大紀群陽之精衆貴之象也故曰日出而天下光明日入而天下􅁳晦此其効也故日者天之象君父夫兄之􅀋中國之應也明王之踐位群賢履職天下和平􅀺民康寜則日麗其精明揚其景耀抱珥重光以見􅁻祥君獲慶賀劉昭㓜童傳曰晉明帝諱紹元帝子􅀄元帝爲江東都督鎮揚州時中原䘮亂有人從長安來帝問洛下消息澘然流涕帝年數歳問泣故具以東渡意告之因問帝汝意謂長安何如日逺荅曰不聞人從日邊來只聞人從長安來居然可知帝異之明日集群臣宴㑹說以此荅明帝又以爲日近帝動容問何故異昨日之言荅曰舉頭不見長安只見日以是知近帝大恱搜神記曰呉孫堅夫人懷孫䇿夢日月入懷解道康齊地記曰齊有不夜城蓋古者有日夜中照於東境故萊子立此城以不夜爲名七聖紀曰鬰華赤文與日同居結鱗黃文與月同居鬱華日精結鱗月精也莊子曰陽燧見日則燃爲火金也摩拭令􅉯便置日中以艾就之火生又曰孔子圍於陳蔡太公吊之曰子其昭昭如掲日月而行故不免又曰日出東方入於西極有目有趾者待是而成功又曰至人神矣乗雲氣􅀐日月淮南子曰日出於陽谷浴於咸池拂於扶桑是謂晨明登於扶桑之上扶桑東方之野爰始將行是謂朏音斐明朏明將明也至于曲阿曲河山名是謂朝明臨于曽泉曽重也早食時在東方多水之地故曰曽泉是謂早食次于桑野是謂晏食臻于衡陽是謂禺中對于昆吾昆吾丘在南方是謂正中靡于鳥次鳥次西南方之山上是謂小遷至于悲谷悲谷西南方之大􅐿是謂晡時迴于女紀女紀西方隂地是謂大遷經于隅泉是謂髙春頓于連爛石是謂下春連石西北山名言將欲冥下蒙悉春故曰下春爰上羲和爰息六螭是謂懸車日乗車駕以六龍羲和衘之日至此而薄於虞泉羲和至此而廻六螭即六龍也薄於虞泉是謂黃昏淪于蒙谷是謂定昬日入崦音淹嵫音兹示日落甞山經細栁細栁西方之野入虞泉之池􅍼於蒙谷之浦蒙谷蒙汜之水日西垂景在樹端謂之桑榆言其光在桑榆樹上又曰日中有踆七論切烏踆者趾也謂三足烏又曰􅀂木在建木西末有十日其華照地髙誘注曰末端也􅀂木端有十日􅃺如連珠華光照其下地又曰日者陽之主是以春夏則群獸除角又曰堯時十日並出草木穛枯堯命羿仰射十日其九烏皆死墮羽翼又曰日積陽之􅀬氣生火火氣之精者爲日列子曰宋有田夫曝日於野羙之不識廣厦綿縞之屬謂其妻曰吾􅀒日之暄以獻吾君將獲重賞又曰穆王駕八駿之乗西觀日所入處又曰日積氣之中有光耀者又曰孔子晨遊見兩小兒争辯而􅃲孔丘問其故一兒曰我以日始出時去人近日中時去人逺一兒曰我以爲日􅀄出時逺而日中時近曰爾何以知曰日􅀄出大如車輪及中􅂊如盤蓋此不爲逺者小而近者大乎一兒曰日􅀄岀滄滄涼涼及其中如􅊥湯此不爲近者􅀬而逺者凉乎孔子不能决兩兒􅀏曰丘孰謂汝多知乎文子曰日出於地萬物蕃息尸子曰日五色至陽之精象君徳也五色照耀君乗土而王又曰少昊金天氐邑於窮桑日五色㸦照窮桑又曰聖人以日圎光􅄹尺光滿天下聖人居室而所燭彌綸六合又曰火在井中不能燭逺目在足下不可以視近君之於國也猶天之有日居不髙則不明視不尊則不逺又曰聖人身猶日也夫日圜尺光􅄹天地聖人之身小其所燭逺矣任子曰日月爲天下眼目人不知德山川爲天下衣食人不能謝符子曰盛魄重輪六合俱照非日月能乎吕氏春秋曰白人之南建木之下日中無影蓋天地中也賈􅁩書曰周文王問鬻子曰敢問君子將入其職則於其民何如對曰君子將入其職則於其民也旭旭然如日之始岀也旣入其職則於其民暵暵音漢然如日之正中也旣去其職於其民也暗暗然如日之巳入也故君子將入而旭旭者義先聞也旣入而暵暵者民保其福也旣去而暗暗者民失其教也文王曰受命矣又曰學聖王之道譬之如日静居而獨思譬其􅀂火夫捨學聖主之道而静居獨思譬其去日之明於庭而就火之光於室也然可以小見不可以大知山海經曰東海之外甘泉之間有羲和國有女子名羲和爲帝俊之妻是生十日常浴日於甘泉郭璞注羲和能生日也故曰爲羲和之子堯因是立羲和之官以主四時又曰日浴温源谷温源即湯谷也湯浴上於扶桑扶桑在上一日方至一日方出言交會相代也皆戴於烏日中有三足烏又曰明星山日月所出又曰􅂫門日月所出又曰湯谷上有扶木即扶桑十日所浴此浴水中有大木九日居上枝昔堯使羿仰射九日盡墜死汲􅃁書日本有十日迭次而出運照無窮堯時爲妖十日並出故爲射所死又曰夸父逐日扶飲河渭不足北飲大澤未至道渇而死棄其杖化爲鄧林又曰􅔩山神蓐収居之是山也西望日之所入其氣圎日形圎故其氣象亦然神經光之所司也太􅀇經曰日動而東天動而西天日錯行隂陽更巡錯違也巡行也又曰日一南而萬物死日一北而萬物生升北而萬物虚升南而萬物􅄹升之南也右行而左還升之北也左行而右還或左或右或死或生纂要云日光曰景星月之光通謂之景日影曰晷日氣曰睍乃見切詩見晛日消晛日氣日初出曰旭日昕曰晞大明曰昕詩曰匪陽不晞晞乾也言日昕乾濕物也日温曰煦在午曰亭午在未曰昳日晩曰旰日將落曰薄暮日西落光返照於東謂之反景景在下日倒景日有愛日畏日愛冬日也畏夏日也春秋左傳曰冬日可愛夏日可畏白虎通曰日行遲月行疾日行一度月行十三度十九分度之七日月經千里雜占書曰日冠者如半暈也法當在日上有冠又有兩珥尤􅁻廣雅曰日名耀靈一名朱明一名東君一名大明亦名陽烏日御曰羲和范子計然曰日者寸也月者尺也尺者紀度而成數也寸者制萬物隂陽之短長也又曰日者火精也火者外景主晝居晝而爲明處照而有光又曰日者行天日一度終而復始如環無端􅀃苑曰師曠對晉平公曰少而學者如日岀之光壯而學者如日中之光老而學者如秉燭夜行太平御覽卷第三
