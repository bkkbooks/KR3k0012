body:
  text: 錢下貲財錢下崔鴻十六國春秋後趙録曰趙王三年得一鼎容四􅂛中有大錢三十文曰當千當萬鼎銘十三字􅂐不可暁藏之於永豊倉因此令私行錢而民不樂乃重立禁制官賦至皆取錢􅁵肆故不行也北史曰後魏元誕累遷齊州刺史在州貪暴大爲人患有沙門爲誕採藥還見誕間外消息對曰唯聞王貪願王早代誕曰齊州七萬家吾至來一家未得三斗錢何得言貪也後魏書曰王昕爲汝南王恱􅀐兵叅軍恱數散錢於地令諸佐争拾之昕獨不拾恱又散銀錢以目盺乃取其一北齊書髙恭之字道穆時用錢稍薄道穆表曰百姓之業錢貨爲夲救弊改鑄王政所先自頃以來私鑄薄濫官司糺繩挂網非一在市銅價八十一文得銅一斤私鑄薄錢斤餘二百旣示之以深利又隨之以重刑得罪者雖多姧鑄者弥衆今錢徒有五銖之文而無二銖之實薄甚榆葉上貫便破置之水上殆欲不沉此乃因循有漸科防不切朝廷失之彼復何罪昔漢文帝以五分錢小改鑄四銖至武帝復改三銖爲半兩此皆以大易小以重代輕也論今據古冝改鑄大錢文載年號以記其始則一斤所成止七十六文銅價至錢五十有餘其中人工食料􅃬炭松抄縱復私營不能自潤直置無利自應息心無復嚴刑廣記也以臣測之必當錢貨永通公私􅀗允後遂用楊保計鑄永安五銖錢又曰王則元象􅀄除洛州刺史則性貪惏在州取受非舊京諸像毀以鑄錢于時丗號河陽錢皆岀其家後周書田大象元年􅀄鑄永通萬國錢以一當千與五行大布並行北史曰隋鄭譯自隆州徴還帝令内史李德林立作詔書復爵國公位上柱國髙頴戯謂曰筆乾荅曰岀爲方岳杖䇿言歸不得一錢何以潤筆上大􅀏唐書曰武德中置錢􅁥於洛并益等諸州今上齊王元􅁻賜三鑪鑄錢右僕射裴寂一鑪敢有盗鑄者身死家口配没又曰髙宗時詔復開元通寳錢其乾封所鑄錢令所司貯納􅀄開元錢之文給事中歐陽詢制詞及書時稱其工其字合八分及􅂐􅀠三體其詞先上後下次左後右讀之及上反左廻環其義皆通議者以乾封不通啇賈米帛翔踴以開元錢輕重大小近古㝡爲折衷百姓便之又曰乾元中李輔國奏内飛龍厩鑄銅投乾元新錢二文於鑪中而祈曰如聖躬萬福國祚無疆兇孽殄除四方寧謐則願不銷不鑠一隂一陽並見於外鍾成一如所祈又曰崔衍居宣州十年頗以勤儉府庫盈溢及穆賛代衍宣州􅀊饉賛遂以錢四十二萬貫代百姓之稅故宣州人不流散又曰元和中王鍔奏請於當管蔚州界加置鑪鑄銅錢漸廢􅃬錢詔河東道自用􅃬錢以來百姓不堪其弊其蔚州鼓鑄漸致銅錢則公私之間皆得充用冝委所司子細計料量借錢夲積漸加至五鑪又曰李希烈旣平淮西節度使陳仙竒進錢一文大小如開通之狀文曰天下太平云於希烈庭中得之命宰臣召百寮遍視之後唐書曰朱守殷奏於積善坊役所得古文錢四百五十六丈曰得一元寳四百四十文順天元寳守殷進納勑凡窺竒異盡繫休明所獲錢文式昭􅀇貺得一者佇歸於一統順天者式契於天心道煥一時事光千載殊休繼出信史必書冝付史館又曰劉仁恭在幽州以墐士爲錢令部人行使聚銅錢於山上鑿穴藏之爲無窮之計晉書曰右驍衛大將軍張籛始在雍州因春景舒和出遊近郊憇於大塚之上忽有黄雀衘一銅錢置之而去未幾復於衙院晝卧見二燕相闘畢各衘一錢落於錢首後所􅀗三錢甞秘於巾箱識者以爲大冨之徴又曰天福三年勑先許鑄錢仍令毎一錢重二銖四􅁰十錢重一兩者切慮逐處闕銅難依先定銖兩冝令天下無問公私應有銅欲鑄錢者一任取便酌量輕重鑄造因兹不得入􅃬并錢及令缺漏不堪乆逺行用仍委塩鐡司明行暁示誡約管子曰桓公請棧䑓之錢散諸城陽鹿䑓之布散諸濟隂啇子曰今臣之所言民無一日之繇官無數錢之費其弱晉而強􅁗有過三戰之勝韓子曰或令孺子懷錢挈壷瓮徃酤而狗齕之酒所以酸吕氏春秋曰趙桑子見翳桑之下有卧餓人不能起趙宣子命食之拜受而不食問其故曰臣有母請持以遺之宣子更賜之脯二束錢一百賈􅁩書曰銅不布下不得採銅不得鑄錢則民反耕田矣鹽鐡論曰教與俗改弊與丗易夏后以貝周人以紫石後丗或金錢刀布極而衰終始之運也又曰古者市朝而無刀弊各以所有易所無抱布貿絲而已後丗則有􅀛貝金錢又曰夫鑠金在爐盗蹠不頋錢刀在路疋婦撥之諭衡曰人文章豈徒調墨弄筭爲英麗哉載人行傳人名楊子法言蜀冨貴人賫錢十萬願載一名子雲不聽夫冨人無仁義正如圈中之鹿欄中之牛安得妄載又曰手中無錢而欲徃市决貨貨主問錢何在曰無錢貨主必不與也胷中無學猶手中無錢也又曰淮陽鑄僞錢吏不能禁汲黯爲太守不壞一爐不刑一人髙枕安卧淮陽政清郭子璜洞􅁳記曰帝􅂛望月䑓有三青鴨化爲三小童皆着青綺文􅃭各握鯨文大錢五枚以置帝几前身止而影動因名曰輕影錢潜夫論曰諺曰痛不着身言忍之錢不出家言與之猶見朝廷有宼而言不足憂也風俗通曰潁川黃子廉毎飲馬輙投錢於水又曰河南平隂龐儉夲魏郡鄴人遭倉卒之丗失亡其父時儉三四歲在鏹母抱轉流客居廬中鑿井得錢千餘萬遂巨冨行求老蒼頭堂上作樂奴在厨中􅀼言堂上老母我婦也婢以告母呼問事實復爲夫婦時人爲之語曰廬里龐公鑿井得銅買奴得翁又曰錢刀俗􅀃害中有利旁有刀言人治生卒多得錢財者必有刀劒之禍也案漢書曰王莽造大錢作契刀錯刀錯銖錢凡四品並行故稱錢刀也列仙傳曰祝雞公洛陽人户郷北山下養雞百餘年雞皆有名字千餘頭暮棲樹晝四散欲取呼名即至賣雞及子得千萬輒置錢去䂊章烈士傳曰施陽字季儒爲舒令經江夏遇賊刼奪陽物賊去後車上有五千錢遣人追與賊聞知陽悉還其物陽以付亭長邴原別傳曰原字根短避地遼東甞行得遺錢拾以繫樹枝此錢旣不見取而繫錢者多原問其故荅者謂之神樹原惡由巳而成􅁋祀乃辯之由是里中遂歛其錢以爲社供桓範丗論曰靈帝置西園之邸賣爵號曰禮錢錢積如屋封塗􅃮書杜恕體論曰可以使􅀑者錢也可以使神者誠也語林曰杜預道王武子有馬癖和長輿有錢癖竹林七賢傳曰王戎女適裴氏乏用遣女爲貸錢數萬文而未還女歸戎色不恱女遽還錢乃懌于寳搜神記曰南方有蟲其形􅀂蟬而大其子著草葉如􅁞種得子以歸則母飛來就之殺其母以塗錢以其子塗貫用錢貨市旋則自還故淮南子術以之還名曰青鳬丗􅀃曰王武子私第近北邙山于時人多地貴濟好馬射買地作埒編錢布地竟埒時人號爲金埓又曰郗公大聚歛數千萬嘉賔甚不同常朝旦問訊郗家法子弟不坐因􅀝語移時遂及錢貨事郗公曰汝政當得錢耳乃一日開庫任意用郗父始謂正損數百萬許嘉賔遂一日乞與人都盡郗公聞之大驚不能已巳俗􅀃曰王子敬學王夷甫呼錢爲阿堵物後旣詔岀赴謝公主簿過㑹下與共擲散當其夕手自抱錢戲竟明日巳後云何至須阿堵物葛仙公別傳曰取十錢使人一一投井中公井上以器呼錢人見從井中一一飛岀入公器中投人刻識之所呼皆得是所投者􅀜令内傳曰􅀜令尹喜周大夫也善於天文登樓四望見東極有紫氣喜曰應有聖人經過果有老子過喜設坐行弟子之禮老子時貧徐甲曰雇錢一百與約須逹安息國以黄金頓備錢還甲旣見老子方欲逺遊疑遂不還乃作辭詣􅀜令就老子求直􅀜令以辭呈老子老子語甲曰前與汝約至安息國頓以黄金相還云何不能忍辱便興辭訟乎汝隨我巳三百餘歳汝命早應死頼我太􅀇生符在汝身耳言畢見符從甲口岀甲巳成一聚白骨矣尹喜爲請老子以符投之甲立更生喜即以見錢二百萬與甲遣之汝南先賢傳曰平輿閻敞字張爲郡五官椽太守第五甞􅀍徴以奉錢三十萬􅀉敞敞埋置堂上後甞舉家病死唯見􅀌孫九歳甞未死語云吾有錢三十萬􅀉椽閻敞孫長大來求敞見之悲喜取錢盡還之孫白祖唯言三十萬今乃百三十誠不敢當敞曰府君固謬言耳郎君無疑之列異傳曰西河鮮子冀建武中爲清河太守言岀錢六百萬屋未成而死趙髙代之計功用錢凡二百萬耳五官黃秉功曹劉啇言是冀所自取便表没冀田宅奴婢妻子送曰南俄而白曰冀􅀑見入府與啇秉等共計校定餘錢二百萬皆啇等匿冀乃表自烈付啇上詔還冀田宅異苑曰桂楊臨武徐孫太元中江行見岸有錢溢岀即輦着船中須􅁷悉變成土異苑曰剡縣陳婺妻少寡與二兒爲居宅中先有古塜姥母作茗先以著墳上息患之曰枯墓何知欲掘除之母苦禁乃止夜即夣見一人息􅀃没丗以來三百餘載謬蒙惠澤賢二子怕欲見毀相頼保護雖潜壤朽骨敢忘翳桑之報姥霄竊􅄒焉明􅀒杖晨與於外屋得錢十萬似乆埋而貫皆新還告兒兒並有慙色自是設饌愈謹幽明録曰海陵民黃尋先居家單貧甞因大風雨散錢飛至其家來觸籬援誤落餘處拾而得之㝷後巨冨錢至數千萬遂擅名於江表三輔黃圗曰金寳一銀寳二􅀛寳三貝寳四布寳五泉寳六凡寳貨六種丗八品煩碎難行乃羅本貨五百枚爲重十二斤百姓安之闞駰十三州志曰青州平原國和帝延平九年以封子懷王勝風俗與舊齊同然吏姧倍於他民給衛士吏賦狐􅁏稍從假錢積至萬餘􅀊竟交代吏無償意衛士恨恚取狐􅁏沃以酒從而呪之曰狐􅁏狐􅁏尾斯尾斯身軀雖小錢多吏聞之恐乃償之錢盛弘之荆州記曰義熈十二年有童子羣浴南陽淯水忽岸邊有錢出如流沙因競取之手滿放地㝷復行去乃以衫衣裏􅅞各有所得王韶之始興記曰勞口東岸有石四方髙百餘仭其狀如䑓父老相傳此石昔有三人伐木以作橋於石頂戲見數甕錢共取半甕還劉道眞錢塘記曰防海大塘郡議曹華信象家冨乃議立此塘以防海水信始開募有致土石一斛即與錢一斗旬日之間來者雲集塘未成而誦云不復取於是載土者皆弃置而去塘以之成旣遏絶湖漁一竟蒙利縣遷治餘姚王莾時縣名泉亭於是改爲錢塘百姓懷德立碑塘所至今猶在地境圗曰錢銅之氣望之如有青雲又曰望錢千萬以上如車十萬之精如一素木萬錢精盖地如甕江津上便冝曰夫錢之爲物無益飢寒之用而儲之家利其不朽古今行之蓋亦由此又便交冝易小市之冝誠勝寸裂尺斷破爲大小也過此以徃無所一用軍國唯榖與帛錢雖可積未急寳也殷仲堪集太子令曰朝廷遂爲吾營宫室頋省不才而大興役費深用愧􅅥冬氣已應作者殊常寒苦可使􅁥殿舎人一月賫酒􅁏稱勞賜之吾蒙月俸錢上生塵無所用之可以供事􅀳魯褒錢神論曰大矣哉錢之爲體有乾坤之象其積如山其流如川動静有時行藏有節井便易不患耗折故親如兄弟字曰孔方失之則貧弱得之則冨昌無翼而飛無足而走解嚴毅之顔開難發之口錢多者居前錢少者居後綦母氏論錢曰黄銅中方叩頭對曰僕自西方庚辛分土諸國處處皆有長沙越儁僕之所守黄金爲父白銀爲母鈆爲長男􅃬爲少婦伊我􅀄生周末時也景王尹丗大鑄兹也貪人見我如病得醫飢饗太牢未之喻也成公綏錢神論曰路中紛紛行人悠悠載馳載驅唯錢是求朱衣素帶當塗之士愛我家兄皆無能巳執我之手分終始不計優劣不論能否賔客輻湊門常如市諺曰錢無耳何可闇使豈虚也哉趙壹疾邪賦曰文籍雖滿腹不如一囊錢曹植樂府歌曰巢許蔑四海啇賈争一錢鄭氏婚禮謁讃文曰金錢爲質所歷長乆金取和明錢用不止貲財周禮地官下司􅀜曰司􅀜司貨賄之岀入後漢書曰樊重宇君雲丗善農稼好貨殖重性温厚有法度三丗共財子孫朝夕禮敬常􅀂公家其營理産業物無所弃課役童􅀠各得其冝故能上下戮力財利􅀊倍管子曰倉廪實知禮節國足則逺者來衣食足則知榮辱矣不務天時則財不生不務地利則倉不盈又曰桀有天下而用不足湯有土七十里用有餘而非獨爲湯兩粟地非獨爲湯岀財物尸子曰農夫比粟啇賈比財烈士比義列子曰端木子貢之丗也籍其先貲家累萬金放意所好生民所無不爲也庖厨之下不絶烟火堂廡之上不絶聲樂行年六十乃棄其家事都散庫藏及其死也無埋瘞之資孫卿子曰仁義禮智之於人也譬􅀂財貨粟米之於家也多有者冨少有者貧至無有者窮文子曰使信士分財不如探籌使廉士守財不如閇户羽翼美傷其骨枝葉茂害其根憂河之涸泣以益也吕氏春秋曰白公愛財若梟之愛子梟養子長則食母白公得荆府庫不分人家語曰南宫敬叔以冨得罪於定公而奔衛夫子聞之曰􅀂其以貨䘮不􅀂速貧之愈也䘮亡位也又曰孔子曰自季孫賜我千鍾而交益親以賜於衆故益親自南宫敬叔之乗我以車也而道加行􅀃苑曰安陵􅆞得寵於楚恭王江乙謂􅆞曰吾聞以財事人者財盡而交踈以色事人者華落而寵衰予安得長􅀍幸乎鹽鐵論曰荆陽南有桂林之饒内有江湖之利左陵陽之金右蜀漢之材吴越之隋唐之林不可勝用江湖之魚菜黃之鮐不可勝食隴蜀丹沙毛羽荆陽皮革骨焉江南柟梓竹箭燕齊魚鹽旃裘兖豫􅃮絲絺紵養生奉終之具也待啇而通潜夫論曰冨貴人争附之貧賤人争去之冨貴而交者上有稱舉之用下有貲財之益與貧賤交者大有賑貸之費小有假貸之損故冨貴易爲交貧賤難得適又曰炎帝爲市聚天下之貨各得其所孫綽子曰命駕而遊五都之市天下之貨畢陳矣風俗通曰陳留有冨老年九十無男娶田家女爲妻一交即氣絶後生得男其女曰我父死時年尊何一夕便有子爭財數年不決丞相邴吉岀上殿决獄云老翁兒無影亦復畏寒于時八月取同􅀊小兒俱解衣祼之老翁兒獨呼寒復令並行日中無影因以財與男又曰沛中有冨豪家訾三千萬小婦子是男又早失母其大婦女甚不賢公病困恐死後必當争財男兒判不全得因呼族人爲遺令云悉以財屬女但以一劒與男年十五
