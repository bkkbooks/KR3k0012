front:
  text: 太平御覽卷第八百四十百榖部四
  hash: sha256:6d8ba6a34fefa8386d61ed4334cec5f274e3c50cd6d155fd30455b7ff0a6f35c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_840-1a}
body:
  text: 稷粟稷毛詩䮐頌閟宫曰有稷有􅁰有稻有秬禮記曲禮下曰凡􅀕宗廟稷曰明粢又内則曰豕冝稷國語曰稷爲稷不能蕃殖爾雅曰粢稷也郭璞注曰今江東呼粟爲粢也孫英曰稷粟也􅀃文曰稷五榖之長也山海經曰廣都之野爰有膏稷廣志曰破減稷逼麥稷此二者以四月熟夲草曰稷米甘而無毒益志氣􅀘不足鄭氏婚禮謁文讃曰稷爲天官盧毓冀州論曰眞定好稷地産不爲無珎也粟歸藏曰剥良人得其玉小人得其粟河圗􅀃微曰蒼帝起天雨粟也􅀃文曰粟嘉榖實也粟之爲言續也爾雅曰虋赤苗芭白苗虋赤􅆝粟也􅉮白􅆝粟也虋音門􅉮音起尚書仲虺之誥曰肇我􅀖于有夏􅀂苗之有莠􅀂粟之有粃孔安囯注曰始我啇家囯於夏世欲見剪除若莠生苗粃在粟恐被鋤治傷之也毛詩曰握粟岀卜自何能榖又小宛曰交交桑扈率􅂣啄粟周禮地官下曰倉人掌粟入之藏鄭玄注曰九榖盡藏以粟爲主禮記曲禮上曰獻粟者執右契契劵要古尊也禮記􅀕法曰父母旣殁必求仁者之粟以祀之謂禮終左傳僖上曰冬􅀳荐饑乞糴于秦􅁗輸粟于􅀳自雍及絳相繼命之曰汎舟之役又襄元曰季文子卒大夫入歛無衣帛之妾無食粟之馬又襄六曰鄭子皮即位於是鄭飢而未及麥民病子皮以子展之命餼國人粟户一鍾又昭六曰夏㑹于黄父謀王室也王室有子朝乱謀定之也趙簡子令諸侯之大夫輸王粟春秋佐􅂇期曰粟神名許給姓慶天又􅀃題辞曰髙而平者爲原平者和故冝粟又曰粟助陽扶性粟之爲言續也粟五變一變而以陽生爲苗二變而秀爲禾三變而粲然謂之粟四變入臼米岀甲五變而蒸飯可食宋均注曰粟受五行氣而五变故乃成可食陽以一立爲法故粟積大一分穗長一尺文以七烈精以五立故其字粟爲粟西者金所立米者陽精故西字合米而爲粟宋芍注曰續爲續陽生長也受五行氣故有変春秋潜潭巴曰天雨粟無德者興有德者不禄小人進大臣辱公羊傳僖上曰秋齊侯宋公江人黄人㑹於陽榖桓公無障谷無貯粟何休注曰有無相通榖梁傳莊公曰諸侯無粟諸侯相歸粟正也論語雍也曰子華使於齊冉有爲其母請粟子曰與之釡請益曰與之􅁃原思爲之宰與之粟九百辤子曰無以與尓隣里郷黨乎周書曰神農之時天雨粟神農耕而種之作陶冶斤斧破木爲耜鉏耨以墾草莽然後五榖興以助菓蓏之實史記曰武王平殷亂天下宗周伯夷叔齊恥之義不食周粟又曰宣曲任氏之先爲督道倉吏􅁗之敗豪傑皆争金玉而任氏獨害倉粟楚漢相拒滎陽民不得耕種米石至万金而豪傑金玉盡歸任氏任氏以此起冨又曰漢興七十餘年之間國家無事非遇水旱之災太倉之粟新陳相因充溢露積於外至腐敗不可食也又曰文帝徙淮南王道死民歌曰一斗粟尚可舂一尺帛尚可縫兄弟兩人不能相容又汲黯傳曰河内失火上使黯徃視之還報曰河内人或父子相食臣謹發河南倉粟以賑貧乏上賢而釋之史記曰大將軍青遂至窴顔山趙信城得匈奴積粟食軍軍留一月而還悉燒其城餘粟以歸漢書曰酈食其􅀃齊王曰漢英豪賢才皆樂爲之用諸侯之兵四靣而至蜀漢之粟方舩而下又曰公孫弘起家徒歩爲丞相故人髙賀從之食以脫粟米飯覆以布􅀍賀怨曰何用故人冨貴爲脫粟布􅀍我自有之乃退又曰主父偃諌伐匈奴曰􅁗皇使天下飛蒭輓粟起於東睡琅耶􅀒海之郡轉月北河率三十鍾而致一石又曰􅁗將王離渉河圍鉅鹿章邯軍其南築通道而輸之粟又曰神農之教曰有石城十仞湯池百歩帶甲百萬而亡粟弗能守汜勝之書又又東方朔傳曰侏儒長三尺俸一囊粟錢二百四十臣長九尺餘亦俸一囊粟錢二百四十侏儒飽欲死臣朔飢欲死又曰賈􅂢之上書曰武帝元狩六年太倉之粟紅腐不可食謝承後漢書曰丹昜方儲字聖明暁風角占􅀱爲章句長民田還置餘粟二石及刀鋤於田陌聖明曰求亡去疑其隣家儲曰此人非偷自呼縣功曹語曰君何取粟置家後積茭中功曹􅅃服後漢書王符潜夫論曰冨貴則背親􅂢舊䘮其本心朽貫千萬而不忍賜人一錢積粟腐倉不忍貸人一􅂛後魏書曰任城王雲爲兾州刺史雲留心政事甚得下情於是合城長吏請輸絹五尺粟五􅂛以報雲㤙髙祖嘉之又曰丗祖引髙允與論刑政言甚稱旨因問允曰萬機之務何者爲先是時多禁封良田又京師遊食者衆允因言曰地方一里則爲田三頃􅀂勤之則􅅿益三􅂛不勤則􅅿損三􅂛方百里損益數率爲粟二百二十二萬斛况以天下之廣乎􅀂公私有儲雖遇飢年復何憂哉丗祖善之遂除田禁又曰韋聉字尊顯少有志業年十八辟州主簿時屬歳儉聉以家粟造粥以飼飢人所活甚衆後周書曰王羆爲華州刺史時􅀜中大飢徴稅民間榖食以供軍費或隱匿者令遞相告多􅀍篣捶以是人有逃散唯羆信著於人莫有隱者得粟不少唐書曰始平人宗士眺􅀒粟一石委於大倉而去云願少益軍國髙祖嘉之賚物百段晉史曰髙祖明而難犯事多親决甞有店婦與軍士墾訴無以自明帝爲鞠吏曰雖屬官吾可市而代之兩訟未分何以爲断可殺馬刳膓而視其粟有則軍士誅無則婦人死遂殺馬馬膓無粟因戮其婦境内肅然莫敢以欺漢實録曰王周性寛恕不忤物情􅀄刺信都州城西橋敗覆民租車周曰橋梁不飾子之過也乃還其所沉粟出私財以修之孔叢子曰子思居貧其友饋之粟者受二車焉或獻樽酒束脩子思曰爲費而無當也或曰子取人粟而辭酒是辭少而受多也於義則無名於分則不全行之何也子思曰然伋不幸而貧於財及至困乏將絶先人之祀夫所以受粟爲周乏也酒酺則所以飲讌也方乏於食而乃飲讌非義也吾豈以爲介哉度義而行之又曰季桓子以粟十鍾餼夫子夫子受而班門人之無者子貢曰季孫以夫子貧故致粟今而施人無乃乖彼意乎子曰吾受而不辭爲季孫之惠受不爲冨惠於一人豈若數百人哉管子曰桓公觀於野曰何物可比君子之德隰朋曰粟可比君子之德管仲曰苗始岀生也㫬㫬音㫬乎以孺子安之則安不得則危故命之曰禾此可比君子桓公曰善晏子春秋曰北郭騷見晏子曰願託所以養母晏子分倉粟府金以遺之辭金受粟晏子見疑出奔北郭子遂造公庭曰晏子天下賢人去齊敵必來侵臣見國之侵不若死請以頭白晏子因自殺景公聞大駭自追晏子又曰寸之管無當天下不能足粟今齊國丈夫耕女子織夜以接日不足以奉上而君側雕文刻鏤之觀此無當之管也曽子曰曽子魯君饋之粟辭不受使者曰子無求於人人自致之曰與人者驕人受人者畏人縱子不以是驕我我能無畏乎與冨而畏人不􅀂貧而無屈墨子曰丗俗之君子視義士不􅀂視負粟者今有人於此負粟息於路側欲起而不能君子見之無長少貴賤必起之何重故也今爲義之君子奉承先王之道以語之縱不􅀃而行又從而非毀之則是丗俗之君子視義士不􅀂視負粟者莊子曰周家貧貸粟於監河侯侯曰待我得邑金將貸子周作色曰周昨來有呼周者視轍中有一鮒魚曰我東海之波臣也君豈有斗􅂛水活我哉周曰諾我且南遊呉越激西江之水迎子可乎鮒魚曰不如早索我於枯魚之肆吕氏春秋伍子胥諌吴王曰非吴䘮越越必䘮吴今將輸之粟是長吾讎而劵吾仇也又曰飯之美者􅀇山之禾不周之粟不周山在崑崙山北陽山之穄南海之秬崑崙之南故曰陽山穄関西爲之麋秬黒􅁰也啇君書曰金一兩生於境内粟十二石死於境外粟十二石生於境内金一兩死於境外國好生金於境内則金粟兩死倉府兩虚國弱好生粟於境内金粟兩生倉府兩實國強荀卿子曰仁義禮善之於人也譬之若貨財粟米之於家也多有之者冨少有之者貧至無有者窮淮南子曰䰞棺者欲民之疾疫畜粟者欲歳之飢荒也又曰黄帝治天下力牧太山稽輔之狗􅇾吐菽粟於道路而無分争之心又曰昔者蒼頡作書而天雨粟髙誘注曰蒼頡始視鳥跡之文而造書者也有書契則詐僞萌生去本走未弃耕作之業也務錐刀之利天知其將餓故雨粟也又曰量粟而舂數米而炊可以治家而不可以治國又曰馬不食脂桑扈不啄粟非廉也又曰未甞稼穡粟滿倉未甞桑虫絲滿囊得之不以道用之横横放也又曰粟得水而􅀬甑得火而液水中有火火中有水疾雷破石隂陽相薄自然之熱又曰闔盧伐楚五戰入郢燒髙府之粟六韜曰武王入殷發鉅橋之粟以與殷民􅀃苑曰十粟爲一分十分爲一寸又曰墨語禽滑􅁵曰今凶年與子隋侯珠又與子一鍾粟子將何擇􅈊曰粟可耳亦具珠部又曰髙平王遣使者從魏文侯貸粟文侯曰湏吾租収邑粟至乃得也使者曰臣􅀄來時見瀆中有魚張口謂臣曰吾窮水魚命在呼吸可得􅈅乎臣謂之曰待吾南見河堤之君决江河之水灌汝口魚曰謂命在湏􅁷乃湏決江淮之水比至君還必求吾於枯魚肆今髙平貧窮故遣從君貸速乃湏租收大王必求臣於死人之墓風俗通曰燕太子丹仰歎天爲雨粟賈􅁩書曰鄒穆公有令食鳬鴈者必以秕無敢以粟於是倉無秕而求易於民二石粟得一石秕民請曰秕食鳬鴈爲無費也今求秕於二石粟而易一石粃食鳬鴈則費甚矣請以粟食之穆公􅒘去非尔所知也夫百姓朐牛而耕􅁀背而芸勤而不敢隋者豈謂鳥獸哉粟米人之食也柰何以其食養鳥且汝知小計而不知大害晁錯書曰利民欲者莫如用爵致粟能以粟拜爵者皆民之有余者也汜勝之書曰欲知􅀊冝以布囊盛粟等量埋於隂地冬至後取量㝡多者多種之桓階別傳曰階爲趙郡太守路有遺粟一囊耕者得之舉以繫樹數日其主聞還取之桂陽先賢􅀞讃曰成子郴中人能逹鳥鳴爲郡主簿與衆人俱坐聞雀鳴而􅀏曰東市輦粟車覆雀相呼徃食之衆人遣視信然益部􅂄旧又載王子年拾遺記曰東極之東有龍枝之粟言其枝屈曲游龍食之善走又有鳯冠粟似鳯之冠食者令人多力有雲渠粟叢生葉似扶蕖食之益顔色粟莖赤黄皆長二丈千株叢生博物志曰鴈食粟則翼垂不能飛鄒子曰董仲舒三年不闚園甞乗馬不覺牝牡朱買臣貧賤之時孳孳脩藝不知雨之流粟志在經傳也京房易祅占曰天雨粟不肖者食禄與三公易位天雨稻黍者亡天雨稻大臣當誅古今注曰武帝建元四年天雨粟宣帝地節三年長安雨黒粟元帝竟寕元年南陽山郡縣雨粟色青黑味苦大者如豆小者如麻子赤黄味如麥建􅀄二年九江壽春雨粟光武建武二十年清河廣川雨粟大如莧實色黒吴氏夲草曰陳粟神農黄帝苦無毒治痺􅀬渴粟養腎氣杜寳大業拾遺録曰吏部侍郎楊㳟仁欲改葬學士舒綽曰此所擬之處掘深五尺之外亦有五穀􅀂得一榖即是福德之地公侯丗丗不絶恭仁即將綽向京令人掘深七尺得一穴如五石甕大有粟七八斗此地經爲粟田蟻運粟下於此穴當時朝野之士以綽爲聖任昉􅄒異記曰光武興洛陽斗粟万錢人死者相枕漢末大飢江淮間童謡曰大兵如市人死如林持金易粟粟貴於金洛中謡云雖有千黃金無如我斗粟斗粟自可飽千金何所直􅀽紹在冀州時滿市黄金而無斗粟餓者相食人爲之語虎豹之口不如飢人劉備在荆州粟與金同價永嘉之亂洛中飢荒懷帝遣人觀市珠玉金銀填委市門而無粟麥􅀽宏上表云田畒由是丘墟都市化爲珠玉又曰晉末荆州乆雨粟化爲蟲蟲害民春秋云榖之飛爲蟲是也中郎王義興表曰臣聞尭生神禾而晉有蟲粟陛下自以聖德何如也帝有慙色又曰宋髙祖之􅀄當晉末飢饉之後旣即位而江表二千餘里野粟生焉又曰淮南諸山石榖生石上生榖也􅀽安公云石穀藥名穗之尤小者是也應翊像讃序曰赤眉賊攻其所居城翊盡以私榖數十万賑城中于時粟斗數萬不稱其仁太平御覽卷第八百四十
