front:
  text: 太平御覽卷第七百四十二
  hash: sha256:eef21a602741a98bec39a532bfb053656dd0267d9fa6ff4b93a8813bfa8d2d3f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_742-1a}
body:
  text: 疾病部五瘡痱螫毒蠱癰疽瘻癬􅏿疥惡疾疫癘瘡周禮春官下曰瘍醫掌腫瘍潰瘍金瘍折瘍之祝祝當如注讀如注病之注禮記曲禮上曰頭有瘡則沐身有瘍則浴謝承後漢書曰嬀皓母炙瘡發膿皓祝而愈之魏書曰孫觀遷青州刺史從征孫權於濡湏口爲流矢所中穿左足力戰不顧太祖勞之曰將軍􅀍瘡深重而猛氣益奮及瘡甚遂卒吴歷曰孫䇿爲許貢客所傷旣􅀍瘡䇿引鏡自照曰面如此當可復建功立事乎椎几大呼瘡皆分裂其夜卒江表傳曰周泰爲濡湏督諸將以泰本岀於微賤咸輕傲之孫權乃入泰營於都巷中張幔大請官僚使泰脫衣幘見其瘡痍匝體指瘡而問何地戰傷泰具對權把其臂流涕沈約宋書曰劉邕所噉食毎異於人性嗜瘡痂以爲味似鰒魚詣孟靈休靈休先患炙瘡瘡痂落牀上邕因取食之靈休瘡痂未落者悉禠以飴邕靈休與何勗書曰劉邕向顧見噉舉體流血南康國吏二百人不問有罪無罪遞牙舉鞭取瘡常以給膳又曰張收甞爲猘大所傷醫云冝食蝦蟆膾收甚難之醫含􅀏先甞收因此乃食瘡亦即愈後魏書曰長孫子彦末年石發舉體生瘡雖親戚兄弟以爲惡疾如此難以自明丗無良醫悮其死矣甞聞惡疾蝮虵螫之不痛試爲求之當令兄弟知我乃於南山得虵以股觸之痛楚號呌俄而腫死抱朴子曰治金瘡以氣吹之血即斷痛立止論衡曰儒書言燕太子丹使客荆軻刺􅁗王不得誅死後髙漸離復以擊筑見秦王王知燕之客乃膠其眼使之擊筑漸離置鈆於筑中以爲重而擊􅁗王􅁗王病瘡三月而死夫言髙漸離以筑擊􅁗王實也言中􅁗王病瘡三月而死虚也􅄞康髙士傳曰孔休元甞􅀍人斫之至見王莽以其面有瘡瘢乃碎其王劒與治之華佗別傳曰瑯瑘有女子右股上有瘡癢而不痛愈巳復發佗曰當得稻糠色犬繫馬頓走出五十里斷頭向癢乃從之須􅁷有虵在皮中動以鐡横貫引岀長三尺許七日便愈異苑曰陳郡謝石少患面瘡諸治莫愈乃自匿逺山卧於巖下中霄有物䑛其瘡隨䑛除而䑛處悉白故丗呼爲謝白面又曰有田父耕值見傷一虵有一虵銜草着瘡上而傷者差田父收其餘葉治瘡皆驗又曰晉時長山趙宣母任身如常而髀上癢搔之成瘡二兒從瘡中岀母子平安幽明録曰漢武在甘泉宮有玉女降與帝圍棊女風姿端正帝乃欲通之女因唾帝面遂成瘡帝避跪謝神女爲出温水洗之事具温泉部西京雜記曰廣川王好發冢後發欒書冢是夕王夢一丈大􅁂眉盡白以杖扣王左脚王􅁴左脚腫痛因生瘡至死不差三輔故事曰衛太子嶽鼻武帝疾避暑甘泉宮江充謂太子曰陛下惡太子鼻當持􅁓蔽其鼻及入充言曰太子不欲聞陛下膿臰蔽鼻而入帝大怒痱􅀃文曰痱風病也漢書曰灌嬰矯先帝詔當弃市嬰陽病痱不食欲死或聞上無殺意嬰復食治病議定不死矣乃有飛語爲惡言聞上故以棄市東觀漢記曰明帝行幸諸國勑執金吾馮魴將緹􅀐􅀫玄嵇含遇蠆客賦曰元康二年七月七日中夜遇蠆客有􅃧余者曰諺云過滿百爲蠆所螫斯言信哉蠱周禮秋官曰庶氏掌除毒蠱以嘉草攻之左傳曰宣二晉里克有蠱疾沈約宋書曰沛郡相縣唐賜徃比村飲酒還因得病吐蠱䖝十枚臨死語妻張曰死後刳腹出病張手破之藏悉糜碎捜神記曰蠱有恠物􅀂􅀑其妖形變化雜􅀋殊種或爲狗豕或爲䖝虵其人皆自知其形􅃺常行之於百姓所中皆死續搜神記曰曇逰道人清苦沙門也剡縣有一家事蠱人噉其食飲無不吐血死遊詣之主人下食遊便呪焉一􅀟蜈蚣長丈餘於盤中走出飽食歸安然無他靈􅀑志曰滎陽郡有一家姓廖其家累丗爲蠱以致富子女豐恱後取新婦不以此語之家人悉行婦獨守家見屋中一大堽試發見一大蛇便作沸湯悉灌殺之家人還婦具􅀃焉舉家驚惋無幾其家疾病死亡略盡癰疽廣雅曰痤疽癰也說文曰癰腫也痤小腫也釋名曰癰壅也氣壅不通結裏而潰也左傳襄十九年傳曰晉荀偃癉疽生瘍於頭癉疽惡瘡濟河及著癰病自岀史記曰卒有病癰者吴起爲吮之卒母哭之曰徃年吴公吮其父父遂戰死今又吮此子妾不知其所死矣漢書曰項羽疑范増奪其權増怒曰天下且定而王自爲之願賜骸骨羽許之亞父未至彭城疽發背而死又曰僕射鄭崇數以職事見責發頸癰而死又曰文帝病癰鄧通常爲上吮之上問曰天下誰最愛我通曰莫􅀂太子太子入上使吮癰太子色難聞通吮之慙遂恨通東觀漢記曰樊儵事後母至孝母常病癰樊至吮􅎳典略曰趙戩病疽疾年六十餘聞魏王薨哭泣哀過瘡發而卒王隱晉書曰徐苗字叔胄弟亡臨殯口中癰大潰膿溢苗含去之宋書曰劉瑀與何偃俱發背癰瑀疾巳篤聞偃亡懽甚叫呼於是亦卒南史曰徐嗣伯春月出戲聞草屋中有呻吟聲嗣伯曰此病甚重更二日不療必死乃徃視見一老姥稱體痛而處處有􅗼黒無數嗣伯還煑斗餘湯送令服之訖痛􅀬愈甚跳投牀者無數湏􅁷所􅗼處皆拔岀長寸許乃以膏塗諸瘡口三日而復云此名釘疽也又曰薛伯宗善徙癰疽公孫泰患發背伯宗爲氣封之徙置齋前栁樹上明月而癰消樹邊使起一瘤如拳大稍稍長二十餘日瘤大膿爛出黄赤汁升餘樹爲之痿損唐書曰李洧正巳從父兄正巳死洧以徐州歸順封潮陽郡王無何背發疽稍平乃大具糜餅飯僧於市洧乗平肩輿自臨其塲市人讙呼洧驚疽㑹於背而卒孝子傳曰魏逹父苦疽痺逹吮嗽而愈山海經曰帶山有鳥狀如馬五采名鵸䳜食之不疽又曰半石之山合水出焉多鰧魚蒼文赤尾食之不癰譙明之山譙水注焉多阿羅魚一首十身食之巳癰辛氏三􅁗記曰大魚如羊在長池中丗人食之生癰瘡論衡曰儒書云齊桓公􅀒婦人朝諸侯管仲告諸侯曰吾君有疽瘡不得婦人瘡惡不愈諸侯信管仲故無叛者瘻說文曰瘻頸腫也山海經曰脫扈之山植猪之草可以巳䑕郭璞注曰䑕瘻也淮南子曰狸頭巳䑕鷄頭巳瘻洞林曰栁祖休婦病䑕瘻積年不差及困令兒就吾卦之語之曰當得賤師姓石者治之事具䑕部癬􅀃文曰癬乾瘡也山海經曰渠猪之山多豪魚赤喙赤尾食之可巳白癬又曰橐山槖水出焉脩郡之魚其音如鴟食之巳癬􅏿􅀃文曰􅏿中塞腫漢書曰趙充國討先零帝詔充國曰欲至冬擊虜將軍士寒手足􅏿豈有利哉皸坼裂也􅏿寒瘡也疥􅀃文曰疥瘙也周禮天官疾醫曰夏時有癢疥病禮記月令曰仲冬行春令民多疥癘左傳昭五曰齊侯疥遂痁朞而不瘳諸侯之賔問疾者多在焉國語吴語曰夫差旣許越成乃大戒師徒將以伐齊子胥諌曰越之在吴也猶人之有心腹之疾也今王非越是圖而齊魯以爲憂事夫齊譬諸疾疥癬也豈能涉江湖而與我争此地哉山海經曰石跪之山其草多條其狀如韭而白花黒實食之巳疥宋玉登徒子賦曰登徒子之妻旣疥且痔登徒恱之使有五子又曰竹山有草名曰黄藿枝如樗葉如麻白華赤實浴之巳疥惡疾韓詩外傳曰芣苢傷夫有惡疾也采采芣苢薄言捋之芣苢澤㵼也芣苢臭惡之菜猶捋之不巳君子雖有惡疾我猶不能去離也論語雍也曰伯牛有疾子問之自牖執其手包曰牛有惡疾不欲見人曰亡之命矣夫斯人也而有斯疾也斯人也而有斯疾也後魏書曰李庶生而天閹崔諶調之曰教弟種􅁂以錐遍刺作孔挣以馬尾庶曰先以此方廻施貴族藝眉有效然後樹􅁂丗傳諶門有惡疾以呼沲爲墓田故庶言及之列女傳曰蔡夫之妻者宋人之女也旣嫁於蔡夫有惡疾其母將改嫁之女曰夫之不幸乃妾之不幸將何去之終不聽其母而作芣苢之詩疫癘􅀃文曰疫皆民之疾也釋名曰疫役也言有􅀑行疾也禮記月令曰孟夏行秋令則民多大疫續漢書曰元􅀄中㑹稽大疫使光禄大夫將醫廵行魏書曰文帝在東宫氛癘大起時人彫傷帝深感歎與素所敬者大理王朗書言人生有七尺之形死爲一棺之土唯立德揚名可以不朽魏志曰司馬朗遷兖州刺史征呉到居巢軍中大疫朗躬親廵視致藥於疾卒焉王隱晉書曰郭文舉得疫病危困不肯服藥曰命在天不在藥鍾離意別傳曰黄讜爲㑹稽太守吴大疾疫黄君轉署意中部督郵意乃露車不冠身循行病者賜與醫藥其所臨護口十餘人劉根別傳曰頴川太守到官民大疫􅁺吏死者過半夫人郎君悉病府君從根求消除疫氣之術根曰寅戌歳泄氣在亥今年太歳在寅於聽事之亥地穿地深三尺方與深同取沙三斛着中以淳酒三升沃其上府君即從之病者即愈疫疾遂絶山海經曰復州之山有企踵之鳥如鴞一足彘毛見則其國中大疫三輔决録曰井丹舉室疫病梁松自將醫藥治丹盛弘之荆州記曰始安郡有烏焉其形似鵲白尾名爲青鳥常以三月自蒼梧而度羣飛不可勝數山人見其來多苦疫氣魏文帝與呉質書曰昔年疾疫親故多罹其灾徐陳應劉一時俱逝曹植􅀃疫氣曰建安二十二年厲氣流行家家有僵尸之痛室室有號泣之哀或闔門而殪或覆族而喪或以爲疫者􅀑神所作夫罹此者悉􅀍􅄄茹藿之子荆室蓬户之人耳􅀂夫殿處鼎食之家重貂累蓐之門􅀂是者鮮焉此乃
