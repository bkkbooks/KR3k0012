front:
  text: 太平御覽卷第八百五珎寳部四
  hash: sha256:b1618da2af789376b1a59fa7db8ac9303fa940f4fe6b87cafd6d33d6e7ca6656
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_805-1a}
body:
  text: 玉下唐書曰太宗甞謂魏徴曰玉雖有美質在於石間不值良工􅅣磨與瓦礫不別􅀂遇良工即爲萬代之寳朕雖無美質爲公所切磋勞公約朕以仁義弘朕以道德使朕功業至此公亦足爲良匠耳又曰髙宗朝封禪太嶽造玉􅁽三枚皆以金編每牒長一尺二寸廣一寸二分厚三分刻玉塡金爲字又爲玉匱一以藏正坐玉􅁽金匱二以藏配坐玉􅁽各一尺三寸并玉檢方五寸當繩􅆞處刻爲五道當璽處刻深二分方一寸二分爲黄金繩以􅆞金玉匱各五周爲金泥以泥之爲玉璽一枚方一寸二分文同受命至以封玉匱又天寳中詔曰禮神以王者蓋取其精絜表以温潤合德爲器有象正辭乃信以逹馨香其在壁頃來禮神六器及宗廟奠王自馮紹正奏後有司並皆用珉禮所謂君子貴玉而賤珉是珉不可用也朕精禋郊壇嚴敬宗廟奉惟新之祚庇太平之人則人力普存備物以享安可以珉代玉惜費事神況國家之冨有萬方之助􅀕闕典必脩無文咸祑豈於天地宗廟奠王有虧自今巳後禮神六器宗廟奠玉並用眞玉諸祀用珉如以玉難得大者寕小其制度以取其眞又曰憲宗時隰州刺史吳暈獻玉杯一頗珎竒云先使吐蕃所得又曰憲宗時㽵宅使許遂振得玉􅀋珽以進上恱命賜絹三百疋又曰貞元六年盧羣入拜侍御史有人誣告故尚父子儀嬖人張氏宅中有寳玉者張氏兄弟又與尚父子孫相告訐詔促其獄羣上奏言張氏以子儀在時分財子弟不合爭奪然張氏宅與親仁宅皆子儀家事子儀有大勲伏望陛下赦而勿問使私自引退上從之時人賞其識大體也又曰大和中文王命中使以白玉帶就幽州賜李載義亦殊恩也又曰開成中王起議今國家郊天報地祀神之玉常用守經據古禮神之玉則無臣等請詔下有司精求美玉創造蒼璧等九器􅀕訖具而藏之其餘燎王請依常制管子曰夫玉之所以貴者九德岀焉温潤以澤仁也鄰以理者智也堅而不蹙義也廉而不劌行也鮮而不垢㓗也折而不撓勇也瑕適皆見情也茂華光澤並通而不相陵容也叩之其音清專徹逺純而不殺辭也是以人主貴之藏以爲寳剖以爲符瑞文子曰鄭人謂玉未理者璞周人謂䑕未腊者璞周人懷璞問鄭賈日欲之乎出其璞視之乃䑕璞范子計然曰玉英出藍田列子曰穆王征西戎西戎獻昆吾之劒赤刀切玉如切泥又曰宋人有爲其君以玉爲楮葉者三年而成鋒鍜莖葉毫芒繁澤亂之楮葉中不可別也此人遂以巧食宋國尹文子曰魏田父有於野得玉徑尺弗知其玉也以告鄰人鄰人詐之曰此恠石也畜之弗利田父雖疑猶録置於廡下其夜玉明照一室其家大怖遽而弃之於野隣人盗之以獻魏玉魏王召玉工相之玉工望玉再拜却立曰敢賀大王得天下之寳臣所未常見王問價玉工日此無價以當之五城之都僅可一觀王立賜獻者千金長食上大夫禄也􅀑谷子曰鄭人之取玉也載司􅀯之車爲其不惑也尸子曰水方折者有玉圎折者有珠又曰玉者色不如雪澤不如􅀨潤不如膏光不如燭鄒子曰夫珠生於南海玉出於湏彌無足而至者人好之也士有足而不至者以人不好也韓子曰楚人卞和得玉璞於楚山獻厲王使王人相之曰石也王以和爲慢刖右足及武王即位又獻之復相曰石也次刖左足及文王即位和乃抱其璞而􅂘於楚山三日三夜泣盡繼之以血王使玉人治之得寳玉焉名曰和氏之璧又曰周有玉版紂令膠鬲索之文王不予費仲來求因予之是膠鬲賢而費仲無道也周惡賢者之得志也故子費仲文王舉太公於渭濵者貴之也而資仲玉版者愛之也故曰不貴其師不愛其資雖知大迷又曰堂谿空見昭侯曰今有白玉之巵而無當有瓦巵而有當君渴將何以飲君曰以瓦巵堂谿空曰白玉之巵美而君不以飲者以其無當􅁘君曰然堂谿空曰爲人主而漏泄其羣臣之語譬猶玉巵之無當也堂谿空每見而出昭侯必獨卧惟恐蔑言泄於妻妾淮南子曰琬琰之玉存汗泥之中雖廉者不釋也又曰崑崙山曽城九重有珠樹玉樹又曰鍾山之玉炊以爐炭三日三夜而色澤不変得天地之精又曰王璞不猒厚又曰白玉不雕美珠不文質有餘也又曰兩堅不能相加兩強不能相伏故梧桐斷馬角截梨玉言柔勝剛又曰玉待濫諸而成器濫諸珎玉之名也言物有待賤而貴隨巢子曰幽厲之時奚禄山壞天賜玉玦於羿遂以殘其身以此爲福而禍抱朴子曰吴時發廣陵大􅃁兵人共舉死人以􅀝璧有一玉長一尺形似冬􅀲從人懷中頽出墮地玉可以爲珠酒及地榆酒化之爲水亦可燒以爲粉服一年以上入水不沾入火不灼又曰玉脂生玉之山膏流出萬年以上則凝而成之鮮明如水精以無心草木和之湏􅁷成水服之一升得干歳玉服玄真者其命不極玄眞玉別名也服玉當得于闐白玉赤松子以玄虫而漬玉爲水服之故得乗烟霞上下也又曰中山諺曰稱人字者金玉也知其物則不爲害賈子曰德有天理曰道性神明命之所生而能象德者獨玉也符子曰荆山不貴玉鮫人不貴珠穆天子傳曰天子大朝黄之山披啚視典用觀天子之寳器玉果石以美玉謂女果者璿珠璿玉􅀋音又曰天子北征東還乃循黒水至於羣玉之山先王所謂䇿府天子於是取玉枝三乗玉器服物於是載玉萬􅃗也又曰赤烏氏美人之地寳玉之所在也山海經曰珏二王相合珏音角琩琉夷蠻係耳玉也稷契之山及鹿臺山其上多白玉瑜次之山多嬰垣之玉泰冒之山洛水岀焉其中多藻玉宻山之上丹水岀焉其中多王膏其源沸湯黄帝是食玉膏之所出五色乃清五味乃馨堅栗精宻澤而有光五色發作以和柔剛天地􅀑神是食是饗君子服之以禦不祥龍首之山弱水出焉其中多美玉放臯之山明水出焉其中多蒼玉平丘在三桑東爰有遺玉帝王丗紀曰有鷰飛而遺􅆑簡翟與妹競取覆以玉筐又曰周武王伐殷爲天子登臺見玉王曰誰之玉或曰諸侯之玉王不取反歸之天下聞之曰王廉於財矣又曰紂敗績登鹿臺蒙寳衣玉席投於火而死漢武故事曰上起神屋前庭植玉樹以􅃢瑚爲枝碧玉爲葉華子青赤以珠玉爲之空其中如小鈴鎗有聲也漢武内傳曰西王母云昌城王女夜山火玉又曰長州一名青丘仙草靈藥甘液玉英美所不有漢書儀曰􅀕天用玉几論衡曰玉變爲石珠變爲礫毁謗使然也採玉者破石㧞玉選士者弃惡取善又曰璆琳瑯璆玉也琳珠也琅玕珠之􅀋也鹽鐵論曰南越以孔雀珥門户崑山之旁以王抵鳥鵲桓譚新論曰雒陽季㓜賔有小玉撿衛謁者史子伯素好玉器見而竒之使予報以三萬錢請買焉㓜賔曰我與好事長者􅀶之已雇十萬非三萬錢主也余驚駭云我􅀂於路見此千錢亦不市也故知之與不知相去甚逺王逸正部論曰或問玉符曰赤如鷄冠黄如蒸栗白如脂肪黒如純􅃮玉之符也魏文帝與鍾書亦出也矯丗論曰白玉之肖牙者唯離婁能察之白虎通曰玉者象君子之德燥不輕濕不重是以人君寳之應劭漢官儀曰封禪壇有玉􅀛郭子横洞􅄀記曰元鼎元年起招靈閣有一神女留一玉􅁫以與帝帝以賜趙婕妤至昭帝元鳯中宫人猶見此􅁫共謀欲碎之明視􅁫匣唯見白鷰直􅂛天後宫人常作玉􅁫因名玉鷰􅁫言其吉祥西京􅄂記曰髙祖􅀄入咸陽宫周行庫藏金玉珎寳不可勝言其尤驚異者有青玉五枚燈髙七尺五寸下作蟠螭以口含燈然則鱗甲皆動煥爛盈室焉又曰髙祖􅀄入咸陽周行庫藏見玉笛長二尺二寸二十九孔吹之則見車馬山林嶾嶙相次吹息不復見銘曰昭華之管事具樂部五經通義曰玉有五德温潤而澤有似於智銳而不害有似於仁抑而不橈有似於義有瑕於内必見於外有似於信垂之如墜有似如禮瑞應圖曰玉甕者聖人之應也不汲自􅄹王者飲食有節則岀雒書曰王者不藏金玉則紫玉見于深山服飾不逾􅀕服則玉英岀胡綜別傳曰呉時掘得銅印以琉璃爲蓋􅀞布雲母於其上開之得白玉如意太皇帝以問君君曰􅁗皇以金陵有天子氣處處埋寳物以當王士之氣此抑是也文士傳曰劉楨字公幹少有才辯常豫魏文帝座見甄后不伏武帝甞怒配上方武帝輦至上方觀作署楨故匡坐正色磨石不仰武帝問曰石何如楨因得喻己自理跪對曰石出自荆山玄巖之巔外有五色之章内有含和之珎摩之不加瑩雕之不増羙禀氣堅貞受兹自然顧其理枉屈紆繞猶不得中武帝顧左右大􅀏即日還宫赦楨復署吏列山傳曰赤松子者神農時􅀨師也服水玉教神農能入火不燒神仙傳曰沈羲爲仙人所迎見老公以金案玉盤賜羲搜神記曰孔子作春秋制孝經旣成齊戒告天天降赤虹化爲黄玉長二尺上有文又曰羊公雍伯雒陽人性篤孝父母終葬無終山遂居焉山髙八十里上無水公汲水作義漿於坂頭行者皆飲之三年有一人就飲以石子一斗與之使至髙平好地有石處種之玉當生其中羊公未娶又語汝後當得好婦語畢不見後種其石數歳時時徃視玉子生人莫知有徐氏在北平著姓女甚有名時人求多不許公乃試求徐氏徐氏以爲狂乃戯云以白璧一􅀟來當聽爲㛰公至所種石中得一􅃗白璧以贄徐氏徐氏大驚遂以女妻公天子異之拜爲大夫於種玉處四角作大石柱各一文中央一頃地曰王田續搜神記曰樂安髙衛其孫雅之在廐中云有神來降自稱白頭公柱杖光耀照人也白頭公白王也搜神記曰呉王夫差女名玉童子韓重有道術女恱之結氣死葬于昌門之外重至􅃁前􅂘􅀕女見形將重入􅃁臨去取崑崙玉孟以送重燉煌髙納之郡府紀年曰桀伐岷山岷山女尼慮反千桀二女曰琬曰琰桀愛二女無子刻其名於苕華之玉苕是琬華是琰石虎鄴中記曰後宫別坊中有小形玉床又曰石虎以宫人爲女官用玉案文書涼州記曰盗發張駿陵得玉樽玉簫玉笛法顯記曰師子國有玉像齊諧記曰餘杭縣南卷中有一人姓沈名路入山得一玉肫從此以後所向如意家遂殷冨異􅁐曰􅀳東􅌡玉騰字元邁以永嘉元年鎭鄴天雪門前方數十歩融液不積騰恠掘之得玉馬髙一尺許口齒缺騰以馬者國姓爲􅁻瑞或謂馬無齒則不復食又曰弘農楊子陽太元􅀄聞土中聲掘得玉肫録異傳曰江巖常到呉採藥及冨春縣淸泉山􅀯遥見一美女紫衣獨踞石而歌聲有碣石之音巖徃未及數十步輙去女處唯見所踞石耳如此數日巖乃擊破石遂從石中得一紫玉廣長一尺後不復見女又曰邴浪者安樂人行到松滋縣九田山見一鳥形如雉而色正赤集山巖石上鳴聲如吹笙浪即射中之鳥仍入石穴中浪遂鑿石得一赤玉狀如鳥形十洲記曰周穆王時西胡獻玉杯是白玉之精光明照夕置杯於庭中皆明旦而水汁滿於杯中汁甘而香美斯靈器也又曰瀛州有玉膏如酒名曰玉酒飲之令人長生􅀶物志曰得好玉用合玉漿廣志曰白玉美可照而出交州青玉出樓國碧玉出夫餘梁四公記曰扶桑國使使貢觀日玉大如鏡方圎尺餘明澈如琉璃映日以觀見日中宫殿皎然分明地鏡圖曰二月中草木光生下垂者下有美玉又曰玉石之精也其在石中􅀂山中石潤而浸旁有水其居地氣青而浮其氣白而圎光轉其地中常潤白玉圖曰玉之精名曰柔􅃺如美女衣青衣見之以桃戈刺之而呼其名則可得也夜行見女子戴燭行者潜從其所亡則入石石中有玉丗􅀃曰長沙王徙封常山至國穿井入地四丈得白玉方三四尺又曰温嶠取姑女下玉鏡臺一枚是公爲劉越石長史征劉聦所得語林曰平子從荆州下王敦敦欲殺之平子􅁪持一王枕下牀去故不得發敦後矯平子左右而借其王枕持下宋去遂殺平子本草經曰玉泉一名玉醴臨死服五斤色不變呉氏本草曰白玉體如白頭公明皇􅄂録曰天后甞召諸皇孫坐於殿上觀其嬉戯因出西國所貢玉環釧盃盤列於前後縱令爭取以觀其志莫不奔竟厚有所􅀗獨上端坐略不爲動后大竒之撫其背曰此兒當爲太平天子因命取玉龍子以賜玉龍子太宗於晉陽宫得之文德皇后常置之衣箱中及大帝載誕之三日后以珠絡衣褓并玉龍子賜焉其後常藏之内府雖其廣不數寸而温潤精巧非人間所有及上即位毎京師􅄽雨必䖍誠祈禱將有霖􅍂逼而視之􅀂奮鱗鬛開元中三輔大旱上復祈禱而渉旬無􅀨上宻投南内之龍池俄而雲物􅁀起風雨隨作上幸西蜀車駕次渭水將渡駐蹕於水濵左右侍御或有臨流濯弄者於沙中得之上聞驚喜視之泫然流涕曰此吾昔時所寳玉龍子自後每夜中光彩輝燭一室上旣還京爲小黄門攘竊以遺李輔國常置於櫃中有聲輔國將敗夜中聞櫝中有聲開視亡其所太平御覽卷第八百五
