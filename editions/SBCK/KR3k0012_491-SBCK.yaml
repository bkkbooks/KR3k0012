front:
  text: 太平御覧卷第四百九十一
  hash: sha256:7d32c5fe3876be577383f22100744de2718e7148661d45a34cf55cb761585604
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_491-1a}
body:
  text: 人事部一百三十二慙愧尚書仲虺之誥曰成湯放桀于南巢惟有慙德又曰五子之歌曰萬姓仇予予將疇依鬰陶乎予心顔厚有忸怩鬱陶言哀思也顔厚色愧忸怩心慙也慙愧於仁人賢士也左傳曰呉公子扎請觀周樂見舞韶濩者殷湯樂也曰聖人之引也而猶有慙色聖人之難也家語曰孔子適衛顔刻衛靈公夫人南子同車出而令宦者雍渠驂乗使孔子次車游過市孔子耻之顔刻曰夫子何耻子曰詩云覯尓新婚以慰我心乃嘆曰吾未見好德如好色者也漢書曰項羽至烏江亭長艤舡待羽應劭曰艤止也孟康曰艤音蟻附舡着岸如淳曰南方謂整舡向岸曰艤謂羽曰江東雖小地方千里衆數十萬亦足王也願大王急渡今臣有舩漢軍至亡以渡羽歎曰廼天亡我何渡爲且籍與江東子弟八千人渡而西今亡一人還縱江東父兄憐而王我我何面目見之哉縱彼不言籍獨不愧於心乎又曰文帝甞病癰鄧通爲上嗽吮之上不樂從容問曰天下誰㝡愛我者乎通曰莫􅀂太子太子入問疾上使太子齰癰而難之已而聞通甞爲上齰之太子慙由是心恨通又曰直不疑南陽人也爲郎事文帝其同舎有告歸誤持其同舎郎金去已而同舎郎覺亡金意不疑不疑曰有之買金償後告歸者至而歸金亡金郎大慙又曰朱買臣字翁子㑹稽人家貧好讀書不治産業常刈薪樵􅀒戴相隨婦數止買臣無歌謳道中買臣逾益疾歌妻羞之求去又曰建始三年秋京師民無故相驚言大水至百姓奔走相蹂􅏳韋昭曰蹂踐􅏳轢也老弱號呼長安中大亂天子親御前殿召公卿議大將軍鳯以爲太后與上及後宮可御舟􅂳令吏民上長安城以避水群臣皆從鳯議左將軍王啇獨曰自古無道之國水猶不冒城郭今政治平丗無兵革上下相安何因當有大水一日􅁀至此必訛言也不冝令上城重驚百姓上乃止有頃長安中稍定問之果訛言上於是美壯啇之固守數稱其議而鳯大慙自恨失言東觀漢記曰王郎起上在薊郎移購上令王霸至市中募人將以擊郎市人皆大􅀏舉手耶榆之霸慙而去又曰汝南薛苞字孟甞喪母以至孝聞父娶後妻而憎苞分出日夜號泣不能去至􅀍歐杖不得巳廬於舎外旦入而洒掃父怒又逐之乃廬於里門晨昏不廢積歲餘父母慙而還之又曰王丹字仲固京兆人也時河南太守同郡陳遵關西之大俠也其友人喪親遵爲護喪事􅉠助甚厚丹乃懷縑一疋陳之於主人前曰如丹此縑岀自機杼遵聞而有慙色又曰樊重外孫何氏兄弟争財重耻之以田二頃解其忿訟縣中稱美推爲三老年八十餘臨終其素所假貸人間數百萬遺令焚削文契債家聞者皆慙争往償之諸子從勑竟不肯受又曰魏霸字延年仕爲光禄大夫霸妻死長兄伯爲霸取妻送至官舎霸􅀏曰年老兒子備具矣何空養他家老爲即自入辭其妻奉案前因跪曰夫人視老夫復何中而遂失計義不敢屈即拜而出妻慙求去又曰卓茂爲丞相史甞出道中人有認茂馬者茂問亡馬幾時乎曰月餘矣茂自知畜馬數年解馬與之挽車而去後日馬主自得其馬慙愧詣府叩頭謝歸焉又曰淳于恭字孟孫北海人以謙儉雅讓爲節家有山田橡樹有盗取之恭助爲收拾載之歸乃知其所盗載橡還之恭不受人有盗刈恭禾者恭見之念其愧自伏草中至去乃起謝承後漢書曰梁兾奏誅李固固臨命與胡廣趙戒書曰梁氏迷謬公等曲從以吉爲凶成事爲敗漢家衰微從此始矣公等受主厚禄傾覆大事後之良史豈有所私固身巳矣於義得矣夫復何言廣戒得書悲慙皆長歎􅀽山松後漢書曰皇甫嵩字義安定朝郍人善用兵飲食舎止必先將士然後乃安兵曹有受賂者嵩曰公素廉清必資用乏乃出錢賜之吏羞慙而自殺由是衆皆樂爲致死魏志曰曹仁討關羽於樊于禁助仁秋大霖雨漢水溢禁等七軍没禁遂降吴文帝踐祚權遣禁還引見禁髮皓白形容憔悴欲遣使吴先令謁髙陵帝豫於陵圖􅀞禁降服之狀禁見慙恚發病薨又曰陳矯爲尚書令明帝即位車駕常卒至尚書省門矯跪問曰陛下欲何之帝曰欲案行文書耳矯曰此自臣職分非陛下所冝臨也若臣不稱其職則請就黜退陛下冝還帝慙廻車而返晉書曰朱冲字巨容南安人也少有志行閑静寡欲好學而貧常以耕蓻爲事隣人失犢乃認冲犢以歸後得犢於冰下大慙以犢還冲又曰王羲之傳時劉琰之爲丹陽尹許詢甞就琰之􅀫牀帷新麗飲食豐甘詢曰􅀂此保全殊勝東山劉曰卿􅀂知吉凶由人吾安得保此羲之在坐曰令巢許遇稷契當必無此言二人並有愧色又曰􅄞紹甞詣齊王囧咨事遇囧燕㑹召董艾葛􅒅等共論時政艾言於囧曰􅄞侍中善於􅁝竹公可令操之左右進琴紹推不受囧曰今日爲歡卿何希此耶紹對曰公匡復社稷當􅁤物作則垂之於後紹虚鄙􅁰備常伯􅆎紱冠冕鳴玉殿省豈有操執􅁝竹以爲伶人之事􅀂釋公服從私宴所不敢辭也冏大慙又曰􅁃亮傳􅀄亮所乘馬有的顱殷浩以爲不利於主勸亮賣之亮曰􅂚有己之不安而移之於人浩慙而退又曰王羲之傳素與王述不恊先是王羲之常謂賔友曰懷祖正當作尚書耳投老可得僕射更求㑹稽便自邈然及述蒙顯授羲之耻爲其下遣使詣朝廷求分㑹稽爲越州行人失辭大爲時賢所􅀏旣而内懷愧歎謂其諸子曰吾不减懷祖而位遇懸邈當由汝等不及坦之晉中興書曰王恭甞宴于司馬道子室尚書謝石爲吴歌恭曰居端右之重集宰相之座而放妖俗之音乎並有慙色又曰熒惑守南斗經旬王導謂陶囬曰南斗􅀭州分而熒惑守之吾當遜位以厭此謫回荅曰公以明徳作相輔弼聖主冝親忠貞逺邪佞而與桓景造􅂰熒惑何由退舎導深愧之宋書曰王惠陳郡謝瞻才辯有風氣甞與兄弟群從造惠談論鋒起文史間發惠時相酬應言清理逺瞻等慙而退又曰謝誨爲荆州都督甚有自矜之色將之鎮詣從叔光禄大夫瞻別問晦年荅曰三十五瞻􅀏曰昔荀中郎年二十七爲北府都督卿比之巳爲老矣晦有慙色又曰何尚之在家常着鹿皮帽及拜開府天子臨軒百僚陪位沈慶之於殿廷戲之曰今何不着鹿皮冠慶之累辝爵命朝廷敦勸甚切尚之謂曰主上虚懷側席詎冝固辭慶之曰沈公不効何公去而復還也尚之有愧色又曰顧凱之爲尚書吏部郎甞於太祖坐論江左人言顧榮􅀽淑謂凱之曰卿南人性怯懦豈作賊凱之正色曰卿反以忠義􅀏人淑有慙色唐書婁師德􅀄狄仁傑未爲宰相時師德甞薦之及爲宰相不知師徳薦巳數排師德令充外使則天甞出師德書表示之仁傑大慙謂人曰吾爲婁公所含如此方知不逮婁公逺矣晏子春秋曰景公置酒太山之陽酒酣公四靣望喟然嘆泣數行曰寡人將去此堂堂國死耶左右泣者三人曰吾細人也猶將難死而况公乎晏子􅅮髀仰天而大􅀏曰樂哉今曰之飲也公怒曰子何􅀏也對曰怯君一䛕臣三是以大􅀏公慙而更辭吴越春秋曰季扎去徐而歸行於道逢男子五月􅀍裘採薪於道傍有委金一器季扎見之忽不入意顧爲薪者曰來取此金薪者曰君舉止何髙視何下也五月􅀍裘採薪寧是拾金者乎扎慚於斯言下車禮之曰何子衣之鄙而言之雅也子姓爲何薪者曰君皮相之士何足以告姓字乎季扎有慚色又曰吴師入郢闔閭旣妻昭王夫人又及於伯嬴伯嬴秦康公之女平王之夫人昭王之母也伯嬴操刃曰妾聞天子天下之表也公侯一國之儀也天子失制則天下亂諸侯失節則國危今夫婦之道固人倫之始王教之端也今吴去儀表之行從亂亡之欲犯誅絶之事何以行訓民乎妾聞生以辱者不如死以榮者使吴王弃儀表則無以生存一舉而兩儀辱妾以死守之不敢命也且凢欲近妾者爲樂也近妾而死何樂之有先殺妾又何益於君王於是吴王慙耻遂退還舎􅀶物志曰宋國有田夫謂其妻曰􅀒日之暄人莫知者以獻吾君將有重賞里之冨室告之曰昔人有美戎菽甘枲莖芹子者對郷豪稱之郷豪取而甞之哲於口懆於腹衆哂而怨之其人大慙而止列女傳曰河南羊子妻不知何氏女羊子甞行路得遺金一餅還以與妻妻曰妾聞志士不飲盗泉之水廉者不受嗟來之食况拾遺求利以汙其行乎羊子大慙鄭􅀇傳曰􅀇在􅀽紹坐汝南應邵因自賛曰故太山太守應仲逺北靣稱弟子何如玄􅀏曰仲尼之門考以四科囬賜之徒不稱官閥邵有慙色江表傳曰孫權旣即尊位請㑹百官歸功周瑜張昭舉笏欲襃讃功德未及言權曰如公計今巳乞食矣昭大慙伏地流汗㑹稽典録曰邵貟字德方餘姚人與同縣虞俊鄰居貟先不知俊十餘年俊至吴與張温朱據等㑹清談干雲温等敬服於是呉中盛爲俊談貟聞而愧曰吾與仲明遊居此屋曽不能甄其英秀播其風烈而令他􅀖稱我之傑又曰鄭􅀪守陽美郡郷民有弟用兄錢者爲嫂所責未還之㛐詣􅀪􅀪爲叔還錢兄聞之慙愧自繫於獄遂遣其婦賫錢還引􅀪不受也又曰沈勲身自耕耘以供衣食人有盗獲其禾勲見而避之明日更收拾送致其盗者愧懼賫還不受又曰陳􅅝與民紀伯爲鄰伯夜􅀼蕃􅅝地自益􅅝見之伺伯去後宻抜其蕃一丈以益伯伯覺之慙懼旣還所侵又却一丈桓子新論曰昔宣帝時公卿大夫朝㑹庭中丞相語次言聞梟生子子長食其母乃能飛寧然耶有德賢者應曰但聞烏子反哺耳丞相太尉自悔其言之非也群士皆少丞相而多彼賢人之言有益於德化是故君子掩惡揚善鳥獸尚爲之諱而况於人乎風俗通曰陳國有張伯階弟仲婦炊於竈下至井上謂伯階我今日粧寧好不曰我伯階婦大慙愧其夕時伯階到更衣婦復逐牽其背曰今且大誤謂伯階爲卿荅曰故伯階語林曰明帝凾封與王公開詔未云勿使治城公知旣視表荅曰伏讀明詔似不在臣臣開臣閉無有見者明帝甚愧數月不欲見王公孔藂子曰陳勝旣立爲王其妻之父兄往焉勝以衆賔待之長揖不拜無加禮其妻之父怒曰怙亂僣號而慠長者不能乆矣不辭而去陳王跪送不顧王心慚焉吴王春秋曰管仲病桓公問惡乎属國管仲曰使隰朋可盡逐易牙竪刁等管仲死盡逐之而食不甘官不治朝不肅三年公皆召而返之公病常之巫從中出曰公將以某日薨易牙竪刁相與作亂塞宫門築髙墻不通人有婦人踰垣入而至公所公曰我欲食婦人曰吾無所得曰何對曰帝之巫相與作亂塞宫門築髙墻不通人故無所得公􅁣然出涕曰嗟乎聖人所見豈不逺哉死者有知我將何靣目見仲父乎蒙衣􅃑而絶乎壽宫太平御覽卷第四百九十一
