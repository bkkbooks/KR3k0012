body:
  text: 兵部三將帥上開元文字曰將率也春秋元命苞曰上天一星爲郎將左傳曰楚子及諸侯圍宋宋公孫固如晉告急公孫固宋莊公孫先􅎮曰報施救患取威定霸於是乎在矣先􅎮下軍之佐原􅎮也報宋贈馬之施也狐偃曰楚始得曹而新㛰於衛􅀂伐曹衛楚必救之則齊宋免矣前年楚使申叔戌榖以逼齊於是乎蒐于􅀍廬晉常以蒐禮改政令敬其始也被廬晉地作三軍閔元年晉獻公作三軍令復大國之禮謀元帥中軍師趙衰曰郤縠可臣亟聞其言矣􅀃禮樂而敦詩書詩書義之府也禮樂德之則也德義利之本也夏書曰賦納以言明試以功車服以庸尚書虞夏書也賦納以言觀其志也明試以功考其事也車服以庸報其勞也賦猶取也庸功也君其試之乃使郤縠將中軍郄溱佐之使狐偃將上軍讓于狐毛而佐之毛狐偃之兄命趙衰爲卿讓於欒枝先􅎮欒枝貞子也欒賔之孫使欒枝將下軍先􅎮佐之荀林父御戎魏犨爲右荀林父中行桓子公羊傳曰君將使射姑將陽處父諌曰射姑民衆不􅀃不可使將於是廢將戰國䇿曰秦與趙兵相距長平趙孝成王使趙奢之子將藺相如曰王以名使括􅀂膠柱而鼓瑟耳此子徒能讀其父奢書傳而不知合變也趙王不聽奢子括少時學兵法言兵事以天下莫能當甞與其父言兵事奢不能難然不謂之善其母問其故奢曰兵死地也而乃易言之趙􅀂以爲將破軍者必是兒及是其母上書具言不可曰始妾事其父時爲將大王及宗室所賞者盡以與軍吏士大夫受命之日不問家事今此兒爲將東向而朝軍吏無敢仰視之者王所賜金帛歸藏家而日視便利田宅買之王以爲如其父父子異心願王母遣王曰吾巳决矣其母因曰即有如不稱妾得無隨罪乎王許之諾遂與秦軍戰死軍敗數十萬降秦秦悉坑之國語曰公使趙衰爲卿辭曰欒枝貞愼枝晉大夫欒共子之子也先􅎮有謀胥臣多聞皆可以爲輔臣弗􅀂也乃使欒枝將下軍先􅎮佐之前取五鹿先􅎮之謀也五鹿衛地郄縠使先􅎮代之從下軍之佐超將中軍傳曰尚德也代先􅎮之胥臣佐下軍又曰公使原季爲卿原季趙衰也文公二年爲原大夫卿次卿辭曰夫三德者偃之出也偃狐偃三徳謂勸文公納襄王以示民義伐原以示民信大蒐以示民禮故以三徳紀民三德紀之語在下以德紀民其章大矣不可廢也章著也使狐偃爲卿辭曰毛之智賢於臣其齒又長毛偃之兄也毛也不在位不敢聞命乃使狐毛將上軍狐偃佐之尚齒也傳曰使狐偃將上軍讓于狐毛而佐之是也狐毛卒使趙衰代之虞唐云代將新軍昭謂代將上軍辭曰城濮之役先且居之佐軍也善先且居先􅎮之子蒲城伯復受霍爲霍伯也軍伐有賞伐功也善君有賞能其官有賞且居有三賞不亦可廢也且臣之倫箕鄭胥嬰先都在倫疋三子晉大夫乃使先且居將上軍代狐毛也公曰趙衰三讓三使爲卿三讓之進欒枝等八人其所讓皆社稷之衛也廢讓是廢德也以趙衰之故蒐于淸源作五軍清源警地晉本三軍有中軍上下今有五益新上下使趙衰將新上軍箕鄭佐之胥嬰將新下軍先都佐之子犯卒蒲城伯清佐蒲城伯先且居公曰夫趙衰三讓不失義義冝也讓推賢也義廣德也廣德賢至有何患矣請令衰也從子從先且居乃使趙衰佐新上軍此有新字誤也趙衰從新上軍之將進佐上軍爲升一等新上軍之將位在上軍佐之下此章或在狐毛卒上非也當左下史記孟甞君傳曰文聞將門必有將相門必有相又項羽本紀曰項氏世世爲楚將封於項故姓項氏又曰章邯已破項梁軍則以爲楚兵不足憂乃渡河擊趙大破之當此之時趙歇爲王陳餘爲將張耳爲相又曰魏文侯問曰呉起何如人李克曰起貪而好色然其用兵司馬穰苴弗能過也於是魏文侯以爲將擊秦拔五城又王翦傳曰或曰王離秦之名將也今將彊秦之兵攻新造之趙舉之必矣客曰不然夫將三世者必敗何以其殺伐多矣其後受其不祥又淮隂侯傳曰韓信曰陛下非能將兵而善將將此迺信之所以爲陛下禽也漢書韓信傳曰漢王使酈生徃􅀃魏王豹不聽乃以信爲左丞相擊魏信問酈生魏得母用周叔爲大將乎曰栢直也信曰竪子耳遂進擊魏又陸賈傳曰賈謂陳平曰天下安注意相天下危注意將將相和則士豫附士豫附天下雖有變則權不分爲社稷計在兩君掌握耳又齊王傳曰祝干給琅邪王曰吕氏爲亂齊王發兵欲西誅之齊王自以兒子年少不習兵革之事願舉國委大王大王自髙帝將也言髙帝之時爲將也又髙紀曰帝置酒雒陽南宫曰通侯諸將母敢隠朕後漢書虞詡傳曰李循曰􅀜西出將􅀜東出相觀其習兵壯勇實過餘州又曰大將曹公每攻城破邑得靡麗之物則悉以賜有功者􅀂勲勞冝賞則不恡萬金無功兾施分毫不與魏志曰太祖旣破張繍東擒吕布定徐州遂與􅀽紹相距孔融謂荀彧曰紹地廣兵彊田豊許悠智計之士爲之謀審配逢紀盡忠之臣也任其事顔良文醜勇冠三軍統其兵殆難尅乎彧曰顔良文醜疋夫之勇可一戰而擒又曰太祖征荆南劉備奔吴論者以爲權必殺備程昱料之曰孫權新立未爲海内所憚曹公無敵於天下􅀄舉荆州不能獨當劉備英名􅀜羽張飛皆萬人敵權必資之禦我難解勢分備資以成又可得而殺也權果多與備兵以禦太祖晉書曰王導字茂引光禄大夫覽之孫也父裁鎮軍司馬導少有風鑒識量清逺年十四陳留髙士張公見而竒之謂其從兄敦曰此兒容貌志氣將相之器也又張華傳曰今之所要在軍師然議者舉將多推􅀫舊又慕容德載記曰昔韓信以禆將伐齊有征無戰耿弇以偏軍討張渉尅不移朔後周書曰王勱性忠果有才幹年七十從太祖入􅀜及太祖平秦隴定􅀜中勱常侍從太祖甞謂之曰爲將坐見成敗者上也􅀍堅執銳者次也勱曰意欲兼之太祖大􅀏隋書曰煬帝之在東宫甞謂弼曰楊素韓擒虎史万歳三人俱稱良將其間優劣何如弼曰楊素是猛將非謀將韓擒虎是􅃲將非領將史万歳是􅀐將非大將太子曰然則大􅀅誰也弼拜曰唯殿下所擇弼意自許爲大將弼賀若弼唐書曰太宗甞論將帥謂左右曰當今名將唯李勣任城王道宗薛万徹三人而已李勣道宗不能大勝亦不大敗万徹非大勝即夫破又曰太宗與長孫無忌薛万徹等宴於丹霄殿各賜膜皮而悮呼万徹爲万均因愴然曰万均朕之勲舊不幸早亡不􅁴呼名豈其魂靈欲朕之賜也因取膜皮呼万均以同賜而焚之於前侍坐者無不感泣潞公薛万均万徹兄也國􅀄立大功故太宗思之又曰賈言忠乾封中爲侍御史時朝廷有事遼東言忠奉使往支軍糧及還髙宗問以軍事言忠􅀞其山川地勢具陳遼東可平之狀髙宗大恱又問諸將優劣言忠曰李勣先朝舊臣聖鑒所悉龐同善雖非􅃲將而持軍嚴整薛仁貴勇冠三軍名可振敵髙偘儉素自處忠果有謀契苾何力沉毅持重有統御之才然頗有忌前之癖諸將夙夜小心忘身憂國莫逮於李勣者髙宗深然之又曰裴度使蔡州行營宣諭諸軍旣還帝問諸將之才度曰臣觀李光顔見義能勇終有所成不數日光顔奏大破賊軍於時曲帝尤歎度之知人又曰朱滔効順代宗臨軒勞問旣而曰卿自謂才孰與泚多滔曰各有長短統御士衆方略明辯臣不及泚臣年二十八獲謁龍顔泚長臣五歳未朝鳯闕泚不及臣代宗愈喜古司馬兵法曰上貴不伐之士上之器也茍不伐則無求無求則不争國中之聽必得其情軍旅之聽必得其冝此貴不伐之士也不伐之士治國必得其實在軍必得其冝故先貴而用之從命爲士上賞犯命爲士上戮故其勇力不相犯旣致教其民然後謹選而使之事極脩則百官給矣教極省則人興良矣又曰凢戰則與衆分善將雖有獨見之知戰勝不自取功常推與下分者也選良先無功者勇猛勁才戰不得功後戰必選爲前當以激致其銳氣也􅀂使不勝使過在巳戰有失利當爲吏士引其過咎今無慙愧使復可使又曰上同無獲將智與衆同等不能自用又不能用人隨衆取同故無功也上專不死將無明智耻求賢問智自專事爲衆所弊故戰多死也上生多疑將無義心茍求全免害避難則士多疑者也上死不勝將無善略茍以死當敵故不勝也凢民死愛死怒死威死義死利視下如子則民生愛志意激楊則民㤪怒使民以禮征伐以義則民死威賞賜分明則民死義賞爵重則民死利孫子曰將者智信仁勇嚴也故知兵之術人之司命國家安民之主也將者國輔輔周國必彊將周宻謀不泄也輔􅂩則國必弱又曰故君之所以患於軍者三三者何也曰不知軍之不可進而謂之進不知軍之不可退而謂之退是謂縻軍縻御不知軍中之事而同軍中之政則軍士惑也不知三軍之任權而欲同三軍之任則軍事覆疑不得其人也三軍旣惑旣疑則諸侯之難至矣是謂亂軍而引勝引奪也故知勝者五知可以戰與不可以戰者勝識衆寡之用者勝上下欲同者勝以虞時不虞者勝將能君不御者勝司馬法曰進退唯時無白寡人此五者知勝之道此上五事故曰知彼知己百戰不殆不知彼而知己一勝一􅀒不知彼不知己毎戰必殆又曰凢用兵之法將受命於君合軍聚衆汜地無舎無所依也衢地交舎結諸侯也絶地無留無乆止也圍地無謀發竒兵也死地則戰塗有所不由阨難之地所不當從也不得也軍有所不擊軍難可擊以地險難不留之失前利􅀂得之又利薄城有所不攻城小固粮饒不可攻也地有所不争皆與上同操所以置華費而深入徐州拔十四縣君命有所不受茍便於事不茍於君命也故將通於九變之利者則知用兵矣九事之變將不通於九變之利雖知地形不能得地之利矣又曰治人不知五變雖知五利不能得人用之矣下五事也是故智者之慮必雜於害在利思害在害思利雜於利而務可信計敵不能依五地爲我害信務爲可信也雜於害而患可解并計於害雖有患可解也害中雜利䧟之死地而後生也趣之以利令自來也故用兵之法無恃其不來恃吾有以待之安不忘危常備之也無恃其不攻吾也恃吾不可攻故將有五危必死可殺勇無疑也必生可虜見利不進將怯弱必生之意上下猶豫可急而取也忿速可侮忿疾之人可忿怒侮而致也廉潔可辱廉潔之人可汚辱而致必來戰愛人而煩出必所走愛人者必倍道兼行救之則煩勞也凢此五者將之過用兵之災覆軍救將必以五危不可不察也又曰吏彊卒弱曰䧟吏􅆠欲進卒弱輙䧟敗也大吏怒而不服遇敵懟而自戰將不知其能曰崩大吏小將也大將怒之不厭服忿而赴敵不量輕重則必崩壞也將弱而嚴教道不明吏卒無常陣兵縱橫曰亂爲將􅀂此亂之道也將不能料敵以少合衆以弱擊彊兵無避鋒曰北兵勢􅀂是必走也凢此六者勝敗之道將之至任也又曰明主慮之良將修之非利不起非得不用非危不戰不得已而用兵主不可以怒而興軍將不可以愠而合戰合於利而用不合於利而止不得以喜怒而用兵怒不可復喜愠不可復恱亡國不可復存死者不可復生故曰明主慮之良將警之此安國之道也呉子曰人有三不和不和於國不可以出軍不和於軍不可以出陣不和於陣不可以進戰又云將之所愼者五一曰理二曰備三曰果四曰戒五曰約戒者雖尅如始戰孔叢子曰子思居衛言荀變於衛君曰其才可將五百乗君任軍旅率得此人則無敵於天下矣衛君曰吾知其才可將變也甞爲吏賦於民而食人三雞子以故弗用也子思曰夫聖人官人猶大匠之用木也取長棄短故材連抱而有數尺朽者良工不棄以其所妨者細也卒成不訾之器今君處戰國之世選爪牙之士以三􅆑焉弃扞城之將此不可使聞于隣國也衛君再拜曰謹受詔矣太平御覽卷第二百七十二
