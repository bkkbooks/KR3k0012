body:
  text: 人事部二産毛詩鴻鴈斯干曰乃生男子載寢之牀載衣之裳載弄之璋乃生女子載寢之地載衣之禓載弄之瓦又生民曰厥􅀄生民時惟姜嫄誕彌厥月先生如逹后稷之在其母終人道十月而生生如達之生言易也不坼不疈無菑無害言易也凢人在母母則病生則坼疈菑害其母横逆人道以赫厥靈上帝不寧不康禋祀居然生子禮記内則曰妻將生子及月辰居側室側室謂夾之室次燕寢也夫使人日再問之至生子夫復使人日再問之子生男子設弧於門左女子設􅍤於門右弧者有事於武者也帨者婦人之佩巾三日始負子男射女否國君丗子生告干君接以太牢三日卜士負之射之以桑弧蓬矢六射天地四方左傳隱公元年曰􅀄鄭武公娶于申曰武姜生莊公及共叔叚莊公寤生驚姜氏故名寤生又襄五年曰􅀄宋芮司徒生女子赤而毛棄諸堤下共􅁎之妾取以入名之曰棄長而美又昭七年曰叔向娶申公巫臣氏生伯石伯石始生子容之母走謁諸姑子容母叔向嫂伯華妻也曰長叔姒生男姑視之及堂聞其聲而還曰是豺狼之聲也狼子野心非是莫喪羊舌氏矣遂弗視又昭七年曰公􅄛公爲之生也其母偕出出之三日産舎公􅄛先生公爲之母曰相與偕出請相與偕告留公􅄛母使待巳共白公三日公爲生其母先以告公爲爲兄公私喜於陽榖而思於魯曰務人爲此禍也務人公爲也始與公􅀂謀逐季氏且後生而爲兄其誣也乆矣乃黜之而以公衍爲太子家語曰子夏問曰商聞易之生人及萬物鳥獸昆蟲各有竒偶氣分不同而凢人莫知其情惟逹道德者能原其本焉天一地二人三三三爲九九九八十一一主日日數十故人十月而生八九七十二偶以承竒竒主辰辰爲月月主馬故馬十二月而生七九六十三三主斗斗主狗故狗三月而生六九五十四四主時時主豕故豕四月而生五九四十五五爲音音主猿故猿五月而生四九三十六六主律律主鹿故鹿六月而生三九二十七七主星星主虎故虎七月而生二九一十八八主風風主蟲故蟲八月而化其餘各從其􅀋矣鳥魚生於隂而屬於陽故皆􅆑生齕吞者八竅而􅆑生齟嚼者九竅而胎生晝生者􅀋父夜生者􅀋母敢問其皆然乎孔子曰然吾聞諸老聃亦如子之言也史記楚丗家曰呉回生陸終陸終生六子坼疈而生焉又曰田嬰有子四十餘人其賤妾有子名文以五月生嬰告其母勿舉也其母竊舉生之及長因其兄弟而見其子文於田嬰嬰怒其母曰吾令􅀂去此子而敢生之何也文頓首因曰君所不舉五月子者何故嬰曰五月子者長及户齊將不利其父母文曰人生受命於天乎受命於户耶嬰黙然文曰必受命於天君何憂焉必受命於户則可髙其户耳漢書曰髙祖七年春令民産子復勿事二歳勿事不使役也又曰盧綰與髙祖同里綰親與髙祖太上皇相愛及生男髙祖綰同日生里中持羊酒賀兩家及髙祖綰壯學書又相愛也又曰武帝征伐四夷重賦於民民産子三歳則出口分錢至於生子輙殺元帝議令民産子七歳乃出口分錢東觀漢記曰敬隱宋后以王莽末年生遭丗倉卒其母不舉棄之南山下時天寒冬十一月再宿不死外家岀過於道南聞有兒啼聲怜之因徃就視有飛鳥紆翼覆之沙石滿其口鼻能喘心恠偉之以有神靈遂取而持歸養長至年十三歳乃以歸宋氏後漢書曰竇武母産武并産一虵又曰虞延􅀄生上有物􅀂一疋練遂上升天占者以爲吉魏志曰黄􅀄六年三月魏郡太守孔羡表􅀺陽令程放書言􅁺汝南屈雍妻王以去年十月十二日在草生男兒從右腋生水腹下而出其母自􅀂無他異痛今瘡已愈母子安全無災無害也王隱晉書曰齊王囧輔政太安元年有婦人詣大司馬門􅀉産吏驅之婦人曰我截齊便去耳言畢不見識者聞而惡之至二年謀反誅又曰程咸字延休魏郡武安人也其母夜夢白頭公授之以藥曰服此當生貴子也生咸好學有才爲鍾毓主記毓弟㑹問有可與語吏否毓乃稱咸孫盛晉陽秋曰魏舒適主人妻産俄聞車馬之聲問曰男女從者入反曰男也年十五以兵死又問寢者誰曰魏公舒黙然謝之于寳晉紀曰愍帝建興三年抱罕伎人産一龍子色似錦文望之如見神光在牀上少有就視者後魏書曰太祖道武皇帝諱珪獻明皇帝之子也以建國三十四年七月七日生於叄合陂北明年有榆生於理胞之坎遂成林前趙録曰劉淵字元海父豹母呼延夢服日精十三月而生淵劉聦母曰張夫人十五月生聦焉三十國春秋曰前秦蒲洪父懷歸爲部落小帥其母姜氏因寤産洪驚悸而寤又曰後涼秃髮烏􅀌七丗祖壽闐之在孕也母夢一老父􅀍髮左袵乗白馬謂曰尓夫雖西移終當東返至京必生貴男長爲人主言終胎動而寤後因寢生壽闐􅀍中因以秃髮爲號壽闐爲名後趙書曰􅀺陽民妻産三男一女勒賜乳母榖帛以爲休祥崔鴻南燕録曰慕容德皝少子母公孫夫人晉咸康中晝寢生德左右以告方寤而起旣生似鄭莊公曰長必有大德遂以德爲名宋書曰王敬則母爲女巫常謂人云敬則生時胞衣紫色後應得鳴皷角人􅀏之曰汝子得爲人吹角可矣又曰王鎭惡之産也當五月五日家人欲棄之其祖猛曰昔孟甞君如是而相齊此兒必興吾族因以鎭惡爲名又曰范曄字蔚宗母如厠産之額爲塼所傷故以塼爲小字北齊書曰武明婁皇后諱昭君性寛厚不妬忌髙祖率衆將討西寇出師之夜后㝈生患切􅀟生子也生一男一女左右以危急請追告髙祖后弗聽曰王出統大兵何得以我故輕離大軍唐書曰幽州節度使劉濟怦之長子􅀄母難産旣産侍者􅀄見是一大蛇黒氣勃勃莫不驚走及長頗異常童所居室焚人皆驚救濟從容而出衆異之累歴牧宰及怦爲節度濟爲行軍司馬怦卒軍人習河朔舊事請濟代父爲帥朝廷從之莊子曰厲之人夜半生其子也遽取火而視之汲汲然恐其似巳也吕氏春秋曰夏后孔甲佃于東陽萯山大風晦迷入民室主人方乳或曰后來是良日也子必大吉或曰不勝必有殃咎乃取歸曰爲余子誰敢殃之子成人幕動析橑音老斧破斬其足遂爲守者孔子曰嗚呼有命矣西京􅄂記曰王鳯五月五日生其父欲勿舉其母曰田文五月五日生父嬰勑其母勿舉母竊舉之後爲孟甞君以占事推之非不祥遂舉之又曰霍將軍妻産二子疑所爲兄弟或曰前生爲兄後生爲弟今雖俱日亦冝以先生者爲兄或曰居上者冝爲兄居下者冝爲弟居下前生今冝以前生爲弟時霍光聞之曰昔殷王祖甲一産二子曰􅅝曰良以夘生􅅝以巳生良則以􅅝爲兄以良爲弟􅀂以在上爲兄􅅝亦當爲弟矣昔許􅁵公一産二女曰娥曰茂楚大夫唐勒生二子一男一女男曰貞夫女曰瓊華皆以先生者爲長近代鄭昌時文長倩並一生二男滕公一生二女季􅀺一生一男一女並以前生者爲長霍氏亦以前生爲兄焉玄中記曰朱梧縣其民服役依海際居産子以沙石自擁不食米止資魚以爲生氣又曰丈夫民殷帝大戊使王英採藥於西王母至此絶糧不能進乃食木實衣以木皮終身無妻産子二人從背脅間出其父則死是爲丈夫民去玉門二萬里外國圖曰長人國妖六年乃生而白首兒則長大乗雲而不還龍􅀋也崔玄山瀬郷記曰李母祠在老子祠北二里祠門左有碑文曰老子聖母李夫人碑老子者道君也始起乗白鹿下託於李氏胞中七十二年産於楚國淮陽苦縣瀬郷曲仁里老子名耳星精也字伯陽號曰聃孔演圖曰孔子母徴在遊大澤之陂睡夢黒帝使請已巳徃夢交語曰汝乳必於空桑之中􅁴則􅀂感生丘於空桑中廣志曰獠民皆七月生帝系曰陸終娶􅀑方國君之妹謂之女嬇生六子孕而不育三年啓其母左脅三人出右脅三人出風俗通曰生三子不舉俗􅀃生子至於三子似六畜言其妨父母故不舉之也謹按春秋國語越王勾踐令民生三子者與之乳母生二子者與之餼三子力不能獨養故與乳母所以人民繁息卒滅強呉雪㑹稽之恥行霸於中國者也古陸終氏娶于􅀑方謂之女嬇是生六子皆爲諸侯今人多生三子子悉成長父母完安豈有天所孕育而害其父母兄弟者哉又曰不舉寤生子俗􅀃兒墮地未能開目視者謂之寤生舉寤生子妨父母謹按春秋左氏傳鄭武公娶于申曰武姜生莊公及共叔叚莊公寤生驚姜氏因名寤生武公老終天年姜氏亦然安有妨其父母乎又曰汝南周霸字翁仲爲太尉􅁺婦於乳舎生女自毒無男時屠婦比卧得男因相與私貨易禆錢數萬後翁仲爲北海相吏周光能見􅀑署光爲主簿使還致敬於郡縣因告光曰事訖臈日與小兒俱上家去家經十三年不躬蒸甞主簿微察知相先君寧息㑹同飲食忻娱不巳徃到於家上郎君沃酹主簿俯伏在後但見屠者弊衣蠡結倨神坐持刀割肉有五時衣帶青黒綬數人彷徨隂堂東西廂不敢來前光恠其故還至引見問之乞屏左右起造於􅂰前白事狀如此翁仲曰主簿出勿言因持劒上堂謂嫗汝何故殺吾子嫗大怒曰卿常言兒聲氣喜學似我老公欲死欲作狂語翁仲曰祠􅀕如不具服子母立截嫗辭窮情竭泣涕具陳其故時子巳年十八呼與辭決曰凡有子者欲以承先祖先祖不享血食無可奈何自以衣裘僮㒒車馬送迎取其女女嫁爲賣䴵子婦後適西平李文思文思官至南陽太守翁仲更養從弟子熈爲髙邑令又曰潁川有冨室兄弟同居兩婦數月皆懷姙長婦胎傷因閉匿之産期至同到乳母舎弟婦生男夜因盗取之争訟三年州郡不能決丞相黄霸出坐殿前令卒抱兒取兩婦各十歩叱婦曰自徃取之長婦抱持甚急兒大啼呌弟婦恐傷害之因乃放與而止甚愴愴長婦甚喜霸曰此弟子也責問乃伏又曰不舉父同月子俗云妨父也按左傳桓公之子與父同月生因名子同漢明帝亦與光武同月生神仙傳曰老子母懷之七十歳乃生時割其左腋而生生而白首故謂之老子列仙傳曰木羽鉅鹿南祁郷人貧母王助産甞探兒兒生開眼視母大􅀏母乃驚怖仍夢見大冠赤幘者守見曰此司命君也當報汝使汝子木羽得仙後生兒字木羽所探兒年十五夜有車馬迎之過呼木羽木羽爲我御來遂相隨去列異傳曰華子魚爲諸生甞􅀫人門外生人婦夜主有兩吏來詣其門便相向僻易欲退相謂曰公在此因踟蹰良乆一吏曰籍當定奈何得住乃前向子魚拜相將入出共語曰當與幾歳一人曰當與三歳子魚後故徃視之兒果年三歳巳死乃自喜曰我固當公後果爲太尉續搜神記同益部耆舊傳曰哀牢夷者其先有婦人名沙壹居于牢山甞捕魚於水中觸沉木􅀂有感因懷姙十月産子男十人後沉木化而爲龍出水沙壹忽聞龍語曰􅀂生我子今悉何在九子見龍驚走獨小子不能走背龍而坐龍就而舐之其母鳥語謂背爲九謂坐爲隆因名小子曰九隆及後長大諸兄共推以爲王􅀶物志曰蜀郡諸山夷名曰獠子婦人姙身七月生時必湏臨水兒生便置水中浮即養之沉便遂棄也至長皆拔去其上齒後狗牙各一以爲身飾論衡曰黄帝二十月而生又曰唐文伯河東蒲坂人也其生亦以夜半時適生有人從門呼其父名父出應之不見人見一木杖植其門側好善異於衆其父杖入門以示人占曰吉文伯位至廣漢太守以杖當得子之力矣譙周法訓曰一産二子者當以後生者爲兄言其先胎也荅曰此野人之鑿語耳君子不測暗安知胎之先後也􅀓子曰昔燕趙之間有三男子共娶一女生四子後争訟廷尉延壽奏云禽獸生子逐母冝以四子還母尸三男子於市丗􅀃曰胡廣本姓黄五月生父母惡之乃置之甕投於江湖翁見甕流下聞有小兒啼聲徃取因長養之以爲子登三司流中庸之號廣後不治其本親服云我於本親巳爲死人也丗以此爲深譏焉搜神記曰陳仲舉微時甞􅀫黄申家而申婦方産有扣申門者家人咸不知乆乆方聞屋裏有言賔堂下有人不可進扣門者相告曰今當從後門往其一人便徃有頃還留者問之是何等名爲何當與幾歳徃者曰男也名爲奴當與十五歳後應以何死荅曰應以兵死仲舉告其家曰吾能相此兒當以兵死父母驚之寸刄不使得執也至年十五有置鑿於梁上者其末出奴以爲木也自下鈎之鑿從梁落䧟腦而死後仲舉爲豫章太守故遣吏往餉之申家并問奴所在其家以此具告仲舉仲舉歎此謂命矣幽明録同異苑曰魏郡徐逮字君及婦平昌孟氏生兒頭有一角一脚頭正仰向通身盡赤落地無聲乗虚而去又曰丹陽縣駱慶婦生一男一虎一貍貍虎毛色斑黒牙􅀲皆備即殺之兒經六日而死母不異又曰沛國武搮之妻林氏元嘉中懷身得病而死俗忌含胎入柩中要湏割出妻乳母傷痛之乃撫尸而呪曰􅀂天道有靈無令死􅀍擘裂湏􅁷尸面赩然上色於是呼婢共扶之俄頃兒墮而尸倒也嵩髙山記曰昔陽翟有婦人姙身三十月乃生子從母背上出五歳便入北山學道神明爲母立祠因號曰開母祠焉太平御覽卷第三百六十一
