front:
  text: 太平御覽卷第四百一十九
  hash: sha256:e24912b26c7c6a21f8b4e3c3c29556f5cf139a95e4e15b8cbfa728476cf3e3c9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_419-1a}
body:
  text: 人事部六十仁德仁惻仁德釋名曰仁忍也性惡殺好善含忍之也禮記經解曰上下相親謂之仁又中庸曰仁者人也親親爲大又表記曰子曰仁有三與仁同功而異情與仁同功其仁未可知也與仁同過然後其仁可知也仁者安仁知者利仁畏罪者弘仁子曰仁之爲器重其爲道逺舉者莫能勝也行者莫能致也取數多者仁也夫勉於仁者不亦難乎子曰中心安仁者天下一人而巳矣又緇衣曰子曰禹立三年百姓以仁遂焉豈必盡仁言百姓効禹爲仁非本性能仁也又大學曰一家仁一國興仁堯舜率天下以仁而民從之又曰仁者以財發身不仁者以身發財又儒行曰温良者仁之本敬愼者仁之地寛􅁉者仁之作遜接者仁之能禮節者仁之貌言談者仁之文歌樂者仁之和分散者仁之施儒皆兼此而有之猶且不敢言仁也又郷飲酒義曰天地温厚之氣始於東北盛於東南此天地之仁義也毛詩生民曰行葦忠厚也周家忠厚仁及草木尚書太甲曰民罔常懷懷于有仁民所歸無常以仁政爲常又泰誓曰雖有周親不如仁人論語里仁曰里仁爲美居仁者之里是爲美擇不處仁焉得智求善居而不處於仁者之里不得爲有智又曰君子無終食之間違仁造次必於是顚沛必於是又顔淵曰顔淵問仁子曰克巳復禮爲仁一日克巳復禮天下歸仁焉爲仁由巳而由人乎哉顔淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顔淵曰囬雖不敏請事斯語矣又顔淵曰仲弓問仁子曰出門如見大賔使民如承大􅀕巳所不欲勿施於人在􅀖無怨在家無怨仲弓曰雍雖不敏請事斯語矣又子路曰如有王者必丗而後仁聖人受命而王必父子相承然後天下之民能仁也又憲問耻曰子路曰桓公殺公子糾召忽死之管仲不死曰未仁乎子曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁重言如其仁者九合諸侯功濟天下此仁爲大代節仁小者也又衛靈公曰民之於仁甚於水火水火吾見蹈而死者未見蹈仁而死者也甚於水火於仁景急也又曰志士仁人無求生以害仁有殺身以成仁又陽貨曰子張問仁於孔子孔子曰能行五者於天下爲仁矣請問之曰㳟寛信敏惠㳟則不侮寛則得衆信則人任焉敏則有功惠則足以使人不敏人無侮慢之言又微子曰微子去之箕子爲之奴比干諌而死孔子曰殷有三仁焉此三人紂同姓人臣微子知紂惡而去之箕子比干不忍去故或見奴或見殺之家語曰或問孔子曰顔淵何人也曰仁人也丘弗如爾雅曰太平之人仁大戴禮曰君子執仁志先行後言千里之外皆兄弟也尚書考靈耀曰春行仁政順天之常尚書大傳曰子張曰仁者何樂於山也孔子曰夫山者􅠇然髙􅠇然髙則何樂焉夫山草木生焉鳥獸蕃焉財用殖焉生財用而無私爲四方皆伐焉毎無私予焉岀雲風以通乎天地之間隂陽和合雨露之澤萬物以成百姓以饗此仁者之所樂於山者也又曰周人以仁接民而天下莫不仁故曰文矣言文王仁故謂之文矣又曰舜不登而髙不行而逺拱揖于天下而天下稱仁又曰誓可以觀義五誥可以觀仁甫刑可以觀誡洪範可以觀度韓詩外傳曰仁道有四仁者有聖仁者有智仁者有德仁者有謙史記曰帝堯其仁如天其知如神又曰孔子適周問禮於老子辭去老子送之曰吾聞冨貴者送人以財仁人者送人以言吾不能冨貴􅀼仁人之號送子以言又曰髙祖仁而愛人喜施意豁如也漢書曰何武爲人仁厚後漢書曰王莽末虞延從女弟年在孩乳其母不能活之棄於溝中延聞其號聲哀而收之養至成人范瞱後漢書曰劉寛字文饒弘農人遷南陽太守温仁多恕吏人愆過但用蒲鞭罰之示辱而巳又曰宣秉所得俸禄輙以收養親族其􅀌弱者分與田地自無擔石之儲前漢書音義曰齊人名小􅑥爲擔今江淮人謂一石爲一擔擔音丁濫切齊書曰虞愿爲晉安太守郡岀蚺虵膽可用爲藥有人餉愿愿放之二十餘里一夜虵還歸床下復送四十里經還復故處愿令人更送遟明乃復歸如此􅄪三時以爲仁義之心所致又曰江泌字士清性行仁義衣􅁦虱多以緜褁致之食菜不食心以其有生意也崔鴻後燕録曰趙秋字子武汲郡朝歌人也輕財好施隣人李玄度母死家貧無以葬秋謂其兄曰赴死生救不足仁之本也家有二牛以與之玄度得以葬他年秋夜行見一老母遺秋金一餅曰子能葬我是以相報子五十巳後當冨貴不可言勿忘玄度也老子曰大道廢有仁義文子曰積惠重厚使萬物忻忻樂其性者仁也莊子曰仁義先王之蘧廬蘧廬猶􅀓舎也可以一􅀫而不可以乆處古人假道於仁託􅀫於義莊子曰義人利物之謂仁曾子曰伯夷叔齊仁者也鬻子曰除天下之害謂之仁孟子曰齊宣王問交隣國有道乎對曰唯仁者能以大事小故湯事葛伯文王事昆夷又曰君行仁政斯民親其上而死其長矣又曰當今之時萬乗之國行仁政民之恱之猶解倒懸也又曰夫仁天之尊爵人之安宅又曰爲冨不仁矣爲仁不富矣又曰爲天下得人謂之仁又曰三代之得天下也以仁其失天下也以不仁國之所以廢興存亡者亦然天子不仁不保四海諸侯不仁不報社稷卿大夫不仁不保宗廟士庶人不仁不保四體今惡死亡而樂不仁是猶恐醉而彊酒也又曰仁則榮不仁則辱今惡辱而居不仁是猶惡濕而居下又曰仁之勝不仁猶水之勝火荀卿子曰仁義禮善之於人譬之􅀂貨財粟米之於家也多有之者冨少有之者貧無有之者窮尸子曰仁則人親之義則人尊之智則人用之也又曰文王四乳是謂至仁六韜曰仁之所在者天下歸之吕氏春秋曰工尹他爲荆使於宋司城子罕觴之南家之牆犨於前不直猶犨岀西家之潦經其宫而不止工尹他問其故子罕曰南家二人也爲鞔鞔履一日靷也吾將徙之其父曰吾將鞔以食三丗矣今徙是宋國之求鞔者不可吾將不食也是弗徙也西家髙吾痺潦之經吾宫也利故弗禁也工尹他歸荆適攻宋工尹他諌於荆王曰宋不可攻其主賢其相仁故釋宋攻鄭新序曰魏文侯曰仁人者國之寳也國有仁人則羣臣不爭姚信士緯曰孟軻驅丗士於仁義之域行者歩中正之途抱朴子曰仁者爲政之脂粉刑者御丗之轡䇿符子曰春秋華林傳曰不知不言其所以仁延篤仁孝論曰夫仁之有孝猶四體之有心腹枝葉之有本根仁以枝葉扶䟽爲大孝猶心體充實爲先曹植仁孝論曰且禽獸悉知愛其母知其孝也唯白虎驎騏稱仁獸者以其明盛衰知治亂也孝者施近仁者及逺逸士傳曰髙鳯隣里有爭財􅋐者兵刃相加鳯脫衣巾爲叩頭曰仁義遜讓不可廢也㑹稽典録曰陳囂字子公山隂人也同縣車嫗年八十餘無子慕􅅝仁義欲求􅀉命􅅝以車嫗有財産未敢便許乃諮於長者長者僉曰其冝􅅝遂迎嫗朝夕定省如其所親出家財以供餚膳嫗以壽終囂殯斂畢皆勉其奴令守嫗墓財物付與嫗内外宗族衣國不入殯者以置椁中制服三月由是著名流稱上國矣仁惻周公曰文王在鄗召太子發日吾語汝童牛不服童馬不馳是謂大仁樂嘉耀稽曰仁者有惻隱之心夲生於木仁生於木故惻隱出於自然也禮記表記曰中心􅉃怛愛人之仁也左傳文下曰邾文公卜遷于繹史曰利於民而不利於君公曰苟利於民􅀌之利也天生民而樹之君以利之也民旣利􅀌必與焉左右曰命可長也君何弗爲邾子曰命在養民死之短長時也民茍利矣遷也􅁻莫如之遂遷於繹邾文公卒君子曰知命也家語曰孔子曰啓蟄不殺方長不折此髙柴之行漢書曰汲黯字長孺濮陽人河内失火燒千餘家上使黯徃視之還報曰家人失火燒比屋延燒不足憂臣過河内貧人傷水旱萬餘家父子相食臣謹以使持節發河内倉粟以賑貧氏請歸節伏矯制罪上賢而釋之東觀漢記曰曹褒在射聲營舎有停棺不葬百餘所褒親自履行問其意故吏對曰此等多是建武以來絶無後者褒愴然爲買空地悉葬其無主者設􅀕以祀之遷將作大匠時疾疫褒廵行病徒爲致醫藥經理饘粥多䝉濟活又曰鍾離意辟大司徒侯覇府詔部送徒詣河内時冬寒徒病不能行路過弘農意輙移属縣使作徒衣縣不得巳與之而上書言􅃺意亦具以聞上得奏以見霸曰君所使􅁺何乃仁於用心誠良吏也又曰趙喜爲赤眉所迫亡走遇更始親屬皆祼跣塗炭飢困不能前喜見之悲感所裝縑帛資糧悉以與之又曰吴祐字季英陳留人遷􅑟東侯相政唯仁簡以身率物民有相爭訴者輙閇閤自責然後斷其訟以道譬之或身對閭里重相和解自是之後争􅂩省息矣又曰崔􅂐爲建新大尹班春所至之縣狴獄填滿􅂐垂涕曰嗟乎刑罪不中乃䧟民於穽此皆何罪而至於是遂平理所出二千餘人􅁺吏叩頭諌曰誠仁者之心然獨爲君子將有悔乎􅂐曰殺一大尹贖二千人盖所願也遂稱疾去矣謝承後漢書曰韓韶字仲黄頴川人韶爲嬴長嬴隣境歳饑多􅀍㓂癈耕桑其民流入縣界求索衣糧者衆韶愍其饑困開倉賑之所􅮇贍萬餘户主者爭謂不可韶曰長活溝壑之民而以此伏罪可含􅀏入地也范曄後漢書曰史弼字公謙陳留人爲平原相時詔書下舉鈎黨郡所奏相連及者多至數百唯弼獨無所主詔書責曰青州六郡其五有黨平原弼何理而得獨無弼曰先王疆理天下畫界分境水土異齊風俗不同他郡自有平原自無胡可相比若望上司誣䧟良善􅁋刑濫罰以逞非理則平原之民户可爲黨相有死而巳所不能也從事大怒即􅀵郡僚械送獄遂奏弼㑹黨禁中解弼以奉贖罪免濟活者千餘人英雄記曰劉翊字子相潁川人遷陳留太守岀􅀜數百里見士大夫病亡道次翊以馬易棺脫衣殮之又逢知故困餓於路不忍委去因殺所駕牛以救之衆人止之翊曰視􅃿不救非志士遂俱餓死晉中興書曰劉驎之􅀯陽人少有信義去家百餘里有一獨媪病將死歎息謂人曰誰當埋我唯有劉長史耳何由令知驎之先聞其有患故徃候之值其命終乃身爲治棺殯送之其仁愛惻隱􅀂此㑹稽典録曰盛􅁻字君逹山隂人拜廷尉􅁻性多仁恩務在哀矜每至冬月罪當斷夜省刑􅃺其妻執燭􅁻手持丹筆夫妻相向垂泣所當平決􅀂無繼嗣􅁻令其妻妾得入經營使有遺􅀋視事十二年天下稱其有恩列女傳曰雋不疑母仁而善教不疑爲尹行縣録囚徒還其母輙問所平活幾何人即不疑多所平反平其事反死爲生也母喜􅀏爲飲食言語異於他時或無出母怒爲之不食由是故不疑爲吏嚴而不殘君子謂不疑母能以仁教子孟子曰君子之於禽獸也見其生不忍見其死聞其聲不忍食其􅁏是以君子逺庖厨也孟子曰惻隱之心仁之端羞惡之心義之端辭讓之心禮之端是非之心智之端人有四端猶有四體也莊子曰古公亶父居􅃎狄人攻之事之以皮帛而不受事之以珠玉而不受狄人所求者地古公亶父曰與人兄居而殺其弟與人父居而殺其子吾不忍也子皆免居矣爲吾臣與爲狄臣奚以異且吾聞之君子不以所用害所養因杖䇿而去民相連而從之遂成國於歧山之下也尸子曰駙馬共爲荆使於巴見擔酖者問之是何以曰所以酖人也於是請買之金不足又益之車馬巳得之盡注之於江韓子曰仁者謂其中心欣然愛人也其喜人之有福而惡人之有禍世􅀃曰桓車􅀐時有陳莊者爲府將性仁愛雖存行陣未甞殺戮太平御覽卷第四百一十九
