body:
  text: 方術部十一相中宋書髙帝紀日晉陵人韋􅅱善相術􅁊脩令相帝當得州不叟日當得邊州刺史退而私於帝日君相貴不可言帝􅀏日若相中當用爲司馬至是叟謂帝日成王不􅀒桐葉之信公亦應不忘司馬之言然不敢希鎮軍司馬願得領軍佐於是用焉又日初􅁊􅀇篡位遷晉帝於尋陽􅁊循入朝髙祖從至建業􅀇見高祖謂司徒王謐日昨見劉裕其風骨不􅁪蓋人傑也毎遊集贈賜甚厚􅀇妻劉氏尚書令躭之女也聦明有智鑒嘗見帝因謂􅀇日劉裕龍行虎步瞻視不凡恐不爲人下冝早爲之所􅀇日我方平蕩中原非􅁉莫可待關隴平定然後議之又日柳元景少時貪苦嘗至下都值大雷雨日暮寒甚頗有羇旅之歎岸側有一老父自􅁛善相謂元景日方大富貴位至三公元景日以爲幸甚豈望富貴老父日後當相憶及貴求之不知所在又日明帝大㑹新亭接㑹諸軍主摴蒲官賭李安人五擲皆盧帝大驚目安人日􅀸面方如田封侯狀也安人少時貧有一人從門過相之日君後當富貴與天子交手共戲至是安人尋此人不知所在孫嚴宋書日沈攸之字仲達少孤貧與吳郡孫超之全景文共乘小船岀京都三人共上引埭有一人止之而相日君三人皆當至方伯攸之日豈有三人俱有相相者日骨法如此若不驗便是相書誤耳後攸之爲荆郢二州超之廣州景文南豫州又日徐羨之年少時嘗有一人來謂日我是汝祖羨之拜此人汝日有貴相而有大厄冝以錢二十八文埋宅四􅊁可以免災過此可位極人臣後羨之隨親之縣内嘗暫出而賊自後破縣縣内人無免者雞犬亦盡唯羡之在外􅀗全齊書日太祖初爲建康令有能名少府蕭惠開雅有知人鍳謂人日昔魏武爲洛陽北部人服其英今看蕭建康但當過之耳又日張欣泰少時有人相當得三公而年纔三十後屋瓦墜傷額又問相者云無復公相年壽可更增亦可得方伯之任耳後爲刺史年三十六卒又日曹武雖武士頗有知人之鍳性儉嗇無所餉遺獨餉梁武謂日􅀸必大貴我當不及見今以弱子相託每密遺錢物并好馬時帝在戎多乏就武換借未嘗不得遂至十七萬又日明帝體上有赤誌常祕不言旣而江祐勸帝出以示人晉壽陽太守王洪􅁤罷任還上祖示之日皆謂此是日月相卿幸無泄軌日公日月在軀如何可隱輒當言之公􅀸上大恱梁書日梁武帝初爲衛軍王儉東閣祭酒儉一見深相器異請爲戸曹屬謂廬江何憲日此蕭郞三十内當作侍中出此則貴不可言又日梁武帝遷隋王鎭西諮議參軍行經牛渚逢風入泊龍瀆有一老人謂帝日君龍行虎步相不可言天下將亂安之者其在君乎問其名氏忽然不見又日梁武帝初為司州刺史有沙門自稱僧惲謂帝日君頂有伏龍非人臣也復求莫知所之又日武帝起兵時吕僧珍一夜忽頭痛壯􅀬及明而顙骨益大其骨法蓋有異焉又嘗語親舊日吾昔在蒙縣􅀬病發黃時必謂不濟主上見􅀸有富貴相必當不死俄而果愈又僧珍童兒時從學有相工厯觀諸生指僧珍日此有奇聲封侯相也後隨武帝起義平東昏封平固侯南兖州刺史後魏書日李訢字元盛訢母賤爲諸兄所輕父崇日此子相者言貴吾每觀察或未可知遂使入都爲中書學生世祖幸中書學見而異之謂從者日此小兒終効用於朕之子孫矣目識眄之世祖舅陽平王杜超有女將許貴戚世祖聞之謂超日李訢後必官達益人門戸可以女妻之遂勸成婚南人李哲嘗言訢必當貴逹杜超之死也世祖親哭三日訢以超婚得在喪位出入帝目而指之謂左右觀此人舉動豈不有異於衆必爲朕家幹事之臣又日寇讃字奉國上谷人嘗從相者唐文相日君額上黑子入幘位當方伯封公及爲上谷太守文以百姓禮拜謁文日明公憶疇昔言乎爾日伹知公當貴不知得爲州人讃日往時卿言社瓊不得官人咸謂不然後瓊得盭屋令􅀸猶言相中不見而瓊未拜果暴終昔魏舒見主皃死自知己必至三公吾􅁪以􅀸言瓊之驗亦復不息此望也又日盧淵岀鎮關右詔兼侍中初淵年十四嘗詣長安將還餞送者五十餘人別於渭北有相者扶風人王伯達日諸君皆不如此盧郞雖位不副實然德聲甚盛望踰公輔後二十餘年當制命關右願不相忘此行也相者年過八十詣軍門請見言敘平生南史日梁元帝初從劉景授相術因訊以年荅日未至五十當有小厄禳之可免帝日苟有期會禳之何益及四十七爲魏所滅崔鴻十六國春秋後趙録日石勒東至平原賣與荏平人師懽爲奴有一老父謂勒日君龍􅊁髪際上四道已成當貴爲人主甲戌之歲王彭祖可圗勒日若如公言不敢忘德忽然不見又日張秀字文伯羌渠部人也頗曉相法常謂石虎日明公之相非人臣骨虎掩其口日君勿妄言族吾父子又南燕録日慕容德年十八身長八尺二寸姿貌雄異額上有日月雨角足下有偃月重文太史公黃􅇦善相謂德日殿下相法當先爲人臣然後為人君但恐下官入地不見殿下昇天耳德拜范陽王建元年即帝位又前涼録日況瑗與同郡陳琠他典反宗配遇相者於路相者日三人皆二千石封然況瑗腹有逆毛當兵死無後北齊書日房豹遷侍御史王思敬入據頴川隨慕容紹宗出討乃爲紹宗開府主簿兼行臺郞中紹宗自云有水厄遂於戰艦中浴幷自投於水中兾以厭當之豹謂紹宗日夫命也在天豈人理所能延公若實有災厄非禳避所免若其實無何禳之有今三軍之事在於明公唯應達命任理以保之元吉末幾而紹宗遇溺死又日慕容顯時幼見一沙門指之日此郎子有好相表大必爲良將貴極人臣語終失僧莫知所在後累遷特進驃騎大將軍封定陽王又日尉瑾爲聘梁使人陳昭善相謂瑾日二十年後當爲宰相瑾岀昭謂人日此公爲宰相後不過三年當死昭後爲陳後主兼散騎常侍至齊瑾時兼右僕射鳴騶鐃吹昭復謂人日二年當死果如言焉又日廬潜陷陳時李騊駼將逃歸并要潛潜日我此頭面何可誑人吾少時相者云没在吳越死生已定弟其行也因寄書與弟士􅃉日吾夢汝以其日得患某月某日漸損皆如其言旣而歎日壽陽陷吾以頸血湔城而死佛敎不聽自殺故荏苒偷生今可死矣於是閇氣而絕其家購屍歸葬又日遼西段長太原龐倉鷹俱有先知之監長爲魏懷朔鎮將見髙祖甚異之謂髙祖云君有康世之才終不徒然也請以子孫爲託興和中啓贈司空公子寧相府從事中郎天禄初兼南中郎將倉鷹交遊豪俠厚待賔旅居於州城高祖客其舎初居處於蝸牛盧中倉鷹母數見廬上赤氣屬天倉鷹亦知髙祖有霸王之相毎私加敬割其宅半以奉髙祖由此遂蒙親識三國典略日髙澄嗣渤海王朝於鄴時有吳土目盲而妙於聲相王使試之聞劉桃桃板之聲日有所繫屬當大富貴王侯將相多死於其手譬如鷹犬爲人所使聞趙道德之聲日亦繫屬人聞太原公之聲日當爲人主聞王之聲崔暹私稱之謬日亦有國主也日我家羣奴猶當極貴況吾身也又日齊文宣字子進神武第二子也婁太后初孕文宣毎夜有赤光照室旣生數月后乃與親姻相對共憂寒餧文宣怱應日得活故名俟尼干鮮卑言有相子也及長黒色大顙兊下鱗身重踝瞻視審定不好戲弄深沈有大度晉陽有沙門乍愚乍智時人不測呼爲阿秃師婁后見其諸子􅍓問禄位至文宣再三舉手指天而己口無所言見者異之又日梁宣豐侯脩參軍陳晃善相人脩因法㑹將晃自隨令相􅂤文有天下否晃言簡文九州骨成必踐帝位而地部過弱非但王畿蹙侵兼恐不得善終又日東魏御史賈子儒善相太常􅀸崔暹私引子儒潛觀齊王儒日人有七尺之形不如一尺之面一尺之面不如一寸之眼大將軍臉薄顧速非帝王相也皇甫玉又竊觀王於道日此不作物㑹是垂洟者垂洟者謂太原公洋又日齊高歸彦嘗令皇甫玉相己玉日公位極人臣必可反歸彦日我爲何須反玉日公有反骨又日周王軌以隋公楊堅相表殊異因入侍讌陽醉撥去堅帽言日是何物頭額帝謂之雖大而却無所至也皇甫后見堅又舉手自拍其額帝謂堅日皇后道公額也帝乃密使來和相堅和詭對日堅相貌是守節忠臣冝作揔管大將作揔管則能靜肅一方作大將則能全軍破敵陳書日長沙王叔堅母本吳中酒家婢相者言當生貴子宜帝微時因飲通焉生叔堅及卽位召拜淑儀又日章昭達字伯通少時遇相者謂日卿容貌甚善須少虧則當富貴梁大司中昭達爲東宫直後因醉墮馬鬢角小傷昭逹喜之相者日未也侯景之亂昭達率鄉人援臺城爲流失所中眇其目相者見日􅀸相善矣不久當貴後還鄉里與陳文帝遊因結君臣之分以功進位司空後周書日太祖身長八尺方顙廣額美􅁂髯長至委地垂手過滕皆有黑子宛轉若龍盤之形面有紫光人望而敬畏之又日孝閔帝覺太祖第三子九歲封略陽郡公時有善相者史元華見帝退謂所親曰此公子有至貴之相但恨其壽不足以稱之耳隋書曰高祖生於馮翊波若寺紫氣充庭有尼來自河東謂皇妣曰此兒所從來甚異不可俗閒處之尼將高祖舎於别館躬自撫養皇妣嘗抱高祖忽見頭上角岀遍體鱗起皇妣大駭墜髙祖於地尼自外入見日巳驚我兒致令晩得天下爲人龍顔額有五柱八頂目光外射有文在手曰王長上短下沉深嚴重又髙曰祖在周明帝即位授右小宫伯進封大興郡公帝嘗遣善相者趙照視之照詭對曰不過作柱國耳旣而陰謂髙祖日公當爲天下君必大誅殺而後定善記鄙言也又日韋鼎仕梁爲太府􅀸初鼎之聘周也嘗與高祖相遇鼎謂高祖日觀公容貌故非常人而神監深遠亦非羣賢所逮也不乆必太貴貴則天下一家歲一周天老夫當委質願深自愛及陳平上馳召之授上儀同三司待遇甚厚又曰龐晃知髙祖非常人染自結納及高祖去官歸京師晃迎見高祖於襄邑髙祖甚歡晃因白高祖日公相貌非常名在圖籙九五之日希願不忘高祖􅀏曰何妄言也頃之有一雄雉鳴於庭高祖命晃射之日中則有賞然富貴之日特以爲驗晃旣射而中高祖撫掌大􅀏曰此是天意公能感之而中也又曰來和好相術髙祖微時來詣和相和待人去私謂高祖曰公當王有四海及爲丞相拜儀同旣受禪進爵爲子開皇末和上表自陳日臣早奉龍顔自周代天和三年己來數蒙陛下顧問當時具言至尊膺圖受命光宅區宇此乃天授非由人事所及臣無勞効坐致五品二十餘年臣是何人敢不慚懼愚臣不任區區之至謹録陛下龍濳之時臣有所言一得書之祕府死無所恨昔陛下在周嘗與永富公竇榮之語臣曰我聞有行聲卽識其人臣當時卽言公眼如曙星無所不照當王有天下願忍誅殺建德四年五月周武帝在雲陽宮謂臣日諸公皆汝所識隋公相禄何如臣報武帝日隋公止是守節人可鎭一方若爲將領陣無不破臣卽於宫東南奏聞陛下謂臣此語不忘明年烏丸􅁤言於武帝曰隋公非人臣帝尋以問臣臣知帝有疑臣詭報日是節臣更無異相于時王諠梁彦光等知臣此語大象二年五月至尊從永巷東門入臣在永巷東門北面陛下問臣日我得無災鄣不臣奏陛下日骨法氣色相應天命巳有付屬未幾遂揔百揆上覽之大悅進位開府賜物五百段米三百石地十頃又日煬帝在藩時好學善屬文沉深嚴重朝野屬望高祖密令善相者來和遍視諸子和日晉王眉上雙骨隆起貴不可言又日宇文述年十一時有相者謂述日公子善自愛後當位極人臣周武帝時以父軍功起家拜開府又日李景遼東之役爲馬軍揔管及還事漢王高祖奇其壯武使袒而觀之日􅀸相表當位極人臣又日帝嘗謂趙綽日朕於􅀸無所愛惜但􅀸骨相不當貴耳仁壽中卒又日文帝時蘭陵公主寡上爲之求夫選親衛柳述及蕭瑒等以示韋鼎鼎日瑒當封侯而無貴妻之相述亦通顯而守位不終上日位由我耳遂以主降又日來和善相術同郡韓則嘗詣和相謂之日後四五當大官人初不知所謂則至開皇十五年五月而終人間其故和日十五年爲三五加以五月爲四五大官槨也和言多此􅀋著相經四十卷北史日李賢幼有志節不妄舉動常岀遊逢一老人鬚眉皎白謂日我年八十觀士多矣未有如􅀸􅀸必爲台牧努力勉之九歲從師受業略觀大指而巳或義其不精荅日賢豈能領師徒授業至如忠孝之道實銘於心問者慙服又日牛弘初在繦褓有相者見之謂其父日此兒當貴善愛養之及長􅁂皃甚偉性寛裕好學博聞又日隋齊王暕妃早卒遂與妃姊元氏婦通生一女外人皆不得知陰引喬令則於第内宴召相工遍視後庭相工
