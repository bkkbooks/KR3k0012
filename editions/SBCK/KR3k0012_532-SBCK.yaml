  text: 太平御覽卷第五百三十二禮儀部十一
  hash: sha256:dad52dea0fb40532645f1a5e4e4e88712f132d6dd3000a17763bc92a6cf464e1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_532-1a}
body:
  text: 社稷先農靈星社稷尚書禹貢曰海岱及淮惟徐州厥貢惟􅁟五色王者封五色土爲社稷建諸侯則各割其方色土與之使立社又召誥曰越翌日戊午乃社于新邑牛羊豕各一尚書逸篇曰太稷唯松東社唯栢南社唯梓西社唯栗北社唯槐天子社廣五丈諸侯半之尚書曰湯旣勝夏欲遷其社不可作夏社言夏社不司迁之義周書曰諸侯受命于周乃建太社于國中其壝東青土南赤土西白土北驪土中霤以黄土將建諸侯取方一靣之土苴以白茅以土封之故曰列土毛詩閔予載芟曰春耕籍田而祈社稷也載芟載祚其耕澤澤又閔予曰良耜秋冬報社稷也畟畟良耜俶載南􅅿周禮地官曰大司徒之職設其社稷之壝而樹之田主各以其野之所冝木遂以名其社與其野又地官上曰小司徒掌凡建國立其社稷又地官上封人曰封人設王之社稷壝爲畿封而樹之又春官上大宗伯曰以血􅀕􅀕社稷鄭玄注曰隂祀曰血貴氣臰又春官上小宗小伯曰宗伯掌建國之神位右社稷又青官下喪祝曰喪祝掌勝國邑社稷之祝號以􅀕祀禱祠焉馬融曰所計國所封邑猶立其社稷士師􅀂􅀕勝國之社稷則爲之尸又冬官曰匠人營國左祖右社面朝後市五宫所居也祖宗廟面猶郷也王宫當中經之涂也禮記月令仲春擇元日命人社爲祀社稷也春事興故􅀕之祈農祥元日謂近春分前後戊日元􅁻也仲秋擇元日命人社賽秋成也元日謂近秋分前後戊日又曲禮曰問國君之年長曰能從宗廟社稷之事㓜曰未能從宗廟社稷之事又檀弓曰衛獻公岀奔反於衛及郊將班邑於從者而後入栁莊曰如皆守社稷則孰執羈靮而從如皆從則孰守社稷又郊特牲曰社􅀕而主隂氣也君南嚮於北墉下荅隂之義也墻謂之墉北墉社内日用甲用日之始也天子太社必受霜露風雨以逹天地氣也是故喪國之社屋之不受天陽也薄社北牖使隂明也絶其陽通其隂而巳薄社殷之社殷始都薄社所以神地之道也地載萬物天垂象取財於地取法於天是以尊天而親地也故教民美報焉家主中霤而國主社示夲也中霤亦士神也唯爲社事單出里唯爲社田國人畢作唯社兵乗共粢盛所以報夲反始也又􅀕法曰王爲群姓立社曰太社王自立社曰王社諸侯爲百姓立社曰國社諸侯自爲立社曰侯社大夫以下成羣立社曰置社羣衆也大夫以下至庶人也大夫不得特立社與民族居百家以上則共立一社之里社是也又􅀕義曰建國之神位右社稷而左宗廟周尚左也禮記外傳曰社者五土之神也稷者百榖之神也一云稷是原隰之神原隰冝種百榖天子爲天下之人立社曰太社壇方五丈諸侯爲境内之民立社曰國社又有王社侯社者天子諸侯别自立社私有禱求地之􅀔有禮生物各隨所冝九州之人各居其土食其利者各報􅀕之是謂神地之道者籍田之後則告爲將耕也五榖旣登又報功也國以民爲夲人以食爲天故建國君民先命立社地廣􅂖多不可徧􅀕故於國城之内立壇􅀕之親之也日用甲尊之也天有十日甲爲首也周公卜洛建王都戊申社于新邑自此皆用戊日唯天子􅀕天地諸侯􅀕社禝而巳又曰社樹各以其􅁟所冝之木河東冝松周地冝栗社主用石石􅁟中堅者天子親征則載社主行有罪者誅之於車前左傳僖公曰宋公使邾文公用鄫子於次雎之社欲以屬東夷此水有妖神東夷皆社祠之司馬子魚曰古者六畜不相爲用小事不用大牲而况敢用人乎􅀕祀以爲人也民神之主也用人其誰饗之又曰襄四君民者豈以陵民社稷是主臣君者豈爲其口實社稷是養故君爲社稷死則死之爲社稷亡則亡之又昭七曰魏憲子問於蔡墨曰社稷五祀誰氏之五官也對曰少暭氏有四叔賈逵注曰少暭黄帝之後金天氏也四叔四子皆叔曰重曰該曰脩曰熈實能金木水能順其成性也使重爲勾芒該爲蓐収脩及熈爲玄􅁳此其三祀也顓頊氏有子曰􅀺祝融黎水土官􅀺當髙辛氏之丗故外傳曰􅀺爲髙辛氏火正也共工氏有子曰勾龍爲后土共工大皡之後炎帝之前霸九有者也其􅒨子佐顓頊能平水土此其二祀也后土爲社稷田政也掌田之官長后稷也有烈山氏之子曰柱爲稷烈山炎帝之丗烈山氏也自夏以上祀之周棄亦爲稷周棄周祖后稷棄也爲唐虞夏后稷也自啇以來祀之啇殷也柱之功至湯浸祀周棄以爲稷也又定上曰且夫祝社稷之常􅀠也賤臣社稷不動祝不出境官之制也社稷動謂國迁公羊傳隱公曰宋宣公謂繆公曰以吾愛與夷則不􅀂愛汝以爲社稷宗廟主則與夷不若汝蓋終爲君矣又莊公曰日有蝕之鼔用牲于社求于隂之道也以朱􅁝縈社或曰脅之或曰爲闇恐犯故縈也又僖公曰邾婁人執鄫子用之社蓋叩其鼻以血社稷也又哀公曰毫社災毫社者何亡國之社毫社者先丗亡國在魯境社者封也爲封士祀社也其言災何亡國之社掩其上而柴其下故火得燒之春秋潜潭巴曰里社鳴此里有聖人生其呴百姓歸之宋均注曰鳴則教令行􅀂湯放桀也呴鳴之怒者也論語八佾曰哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗曰使民戰栗孔安國注曰凢建􅀖立社各以其土所冝之木宰我不夲其意妄爲之􅀃因周栗便云使民戰栗也孝經􅀃曰社土地之主也地廣不可盡敬故封土爲社以報功稷五榖之長也榖衆不可遍祀故立稷神􅀕之五經通義曰王社籍田中爲千􅅿報功也文家右社稷左宗廟何文家握地而王地道長右得事宗廟以有社稷故右之也質家左社稷右宗廟社皆有壇者飾也有木者土當生萬物莫善於木五經異義曰今民謂社神爲公社位上公非地祇也漢書郊祀志曰髙祖時天下巳定詔御史令於豐治枌揄社常春以羊彘祠之也又郊祀志曰稷者百榖之主所以奉宗廟供粢盛人所食以生活也王者莫不尊重親􅀕自爲之主禮如宗廟禮記曰唯􅀕宗廟社稷爲越紼而行事聖漢興禮儀稍定巳有官社未立官稷臣瓉按髙紀除􅁗社稷立漢社禮所謂大社也時人立官社配以夏禹所謂王社也見漢紀今未立官稷至此始立之也遂於官社後立官稷以夏禹配食官社后稷配食官稷稷種榖􅀣又曰陳平旣娶張氏女資用益饒遊道日廣里中社平爲宰分􅁏甚均里父老曰陳孺子能爲宰乎曰使平得宰天天下亦如此肉也又曰欒布吴軍時以功封爲鄃侯復爲燕相薺燕之間皆爲立社號曰欒公社續漢書曰每月朔旦太史上其月曆有司侍郎尚書見讀其令奉行其正朔前後各二日皆牽羊酒至於社下以􅀕日變割羊以祠社用救日變執事者冠長冠衣皂單衣絳領䄂縁中衣絳􅙋袴以行禮如故事又曰建武二年立太社稷於雒陽在宗廟之左社稷之右皆方壇無屋有墻門而巳二月八月及臘一歳三祠皆置社稷太守令長侍祠牲用羊豕唯州所治有社無稷古者師行有載社主不載稷也晉書禮志曰前漢但置官社而無官稷王莽置官稷故漢至魏但太社有稷故常二社一稷後魏書曰天平四年四月七帝神主旣遷於太廟太社石主將遷於社宫禮官云應用幣中書侍郎裴伯茂時爲祝文伯茂據故事太和中遷社髙祖用特不用幣遂以奏聞于時議者或引大戴禮遷廟用幣今遷社冝不殊伯茂據尚書召誥應用牲詔遂從之宋書禮志曰晉元帝建武元年又依洛京立二社一稷其太社之祝曰地徳普施惠存無疆乃建太社保佑萬􅀖悠悠四海咸頼嘉祥其社之祝曰坤徳厚載王畿是保乃建帝社以神地道明祀惟辰景福來造禮左宗廟右社稷歴代遵之故洛京社稷在廟之右而江左又然也又曰祠太社帝太稷常以歳二月八月二社日祠之唐書曰天寳中升社稷五星爲大祀詔曰􅀕之爲典以陳至敬名或不正是相奪倫况社稷孚祐百代蒙其福日月照臨五星叶其紀兆庶允殖下􅁟式瞻旣超言象之外湏極尊嚴之禮列爲中祀頗紊大猷自今巳後社稷及日月五星並升爲大祀仍以四時致􅀕六典曰仲春上戊􅀕太社以后􅁟氏配焉􅀕太稷以后稷氏配焉家語曰孔子曰古之平水土及播植百榖者衆矣然唯勾龍兼食於社而弃爲稷易代奉之無敢益者明不可與等也莊子曰㟪􅕲之民相與言曰􅁃桑之始來吾酒然異之今吾日計之而不足歳計之而有餘庶幾其聖人乎子胡不尸而祝之社而稷之也又曰匠石之齊至于曲轅見櫟社樹其大蔽千牛㓗㓗者匝也百圍其髙山臨千仭而後有枝其可以爲舟者旁十數觀者如市淮南子曰夫窮郷之社扣瓮拊缾相和而歌自以爲樂也甞試爲之擊建鼔橦巨鍾乃知夫瓮缻之足羞也又曰禹勞力天下死而爲社勞力謂治水功死託祀於后士之中周棄作穡死而爲稷種曰稼歛曰穡死託於祀稷官之神子房之智陳平之無忤絳侯勃之果霍將軍之勇終之以禮樂則可謂社稷之臣矣太公金匱曰武王問太公曰天下精神甚衆恐後復有試余者也何以待之師尚父曰請樹槐於王門内王路之右起國社築垣墻􅀕以酒脯食以犧牲尊之曰社客有非常先與之語客有益者入無益者距歳告以水旱與其風雨澤流悉行除民所苦白虎通曰王者所有社稷何爲天下求福報功人非土不立非榖不食土地廣愽不可遍敬五祀衆多不可一一而􅀕故封土立社祀而之示尊五榖之長立稷而祀之稷者得隂陽和氣而爲用又多故爲長歳再􅀕之又曰􅀕社稷有樂乎禮記曰金石之樂用之於宗廟社稷又曰王者諸侯必有戒社何示存亡也明爲善者得之爲惡者失之春秋公羊傳曰亡國之社奄其上柴其下郊特牲記曰喪國之社屋之示與天地絶也葵邕獨断云天子太社五色土爲壇皇子封爲王者授之太社之土以所封之方色藉以白茅歸國以立社故爲之茅社也陳留風俗傳曰東昬縣者衛地故陽武之户牖郷也漢相陳平家焉少爲社下宰今民祀其社邴原别傳曰原避也遼東以虎爲患自原之落獨無虎患甞行而得遺錢㭘以繫樹枝比錢不見取繫錢者逾多原問其故荅者謂之社樹原惡其由巳而成妄祀乃辯之於是里中遂歛其錢以爲社供里老爲之誦曰邴君行仁落邑無虎邴君行廉路樹成社列異傳曰大司馬河内陵㽔字聖卿少時病虐逃社中有人呼社邸社邸聖卿應曰諾起至户中人曰取此書去得素書一卷譴劾百􅀑法所劾輙効搜神記曰中興􅀄有應嫗者生四子而寡見神光照社試探之得黄金自是諸子官學並有才名至瑒七丗顯劉楨京口記曰虎社中村老故相傳云昔有虎於社中産因以爲名荆州記曰葉縣東百歩有縣故城西南四里名伍伯村有白榆連李􅀣異幹合條髙四丈餘士民奉以爲社丗􅀃曰阮宣子伐樹人有止之宣子曰􅀂樹而爲社伐樹則社移社而爲樹伐樹則社亡矣習鑿齒逸民髙士傳曰董威輦不知何許人忽見於洛陽白社中戴延之西征記曰洛陽建春門外道北有白社董威輦所住也去門二里有牛馬市嵇公臨刑處也愽物志曰子路與子貢過社社樹有鳥子路􅅮鳥社神牽子路子貢􅀃之乃止又曰周之正月受社牲之首以出種子帝籍蚕又受社雍及􅀕以沐蚕種上辛乃射黒牲于帝郊以祈來年之豐二月司空開冰射桃弧􅁄矢五發以御其災述異記曰􅁃邈與女子郭凝通詣社約不二心俱不㛰娉經二年凝忽􅁀亡邈出見凝云前北村還遇強梁抽刀見逼懼死從之不能守節爲社神所責心痛而絶人鬼異路因下泣矜之也蔡邕陳留東昬庫上里社碑曰惟斯庫上里古陽武之户牖郷也􅁗時有池子華爲丞相漢興陳平由此社宰遂相髙祖剋定天下爲右丞相孝平之丗虞延爲太尉延喜中平曽孫放爲尚書令以宰相継踵咸出斯里雖有積徳脩身之政亦斯社所相乃􅀣碑頌云魏公九錫文曰錫君玄土苴以白茅爰契爾􅀛用建冡社注言亦如天子社稷也曹植讃社文曰余前封鄄城侯轉雍丘皆遇荒土宅字􅀄造以府庫尚豊志在繕宫室務園圃而巳農桑一所無營經離十載塊然守空飢寒備甞聖朝􅉖之故封此縣田則一州之膏􅃾桑則天下之甲第故封此桑以爲田社乃作頌云應璩與隂夏書曰從田來見南野之中有徒歩之士恠而問之乃知郎君頃有微痾告祠社神將以祈福聞之悵然以増歎息靈社髙樹能有靈應哉張華朽社賦曰髙栢橋南大道傍有古社槐樹蓋數百年木也余少居近之後去行路過之則巳朽株意有􅃡然聊爲之言衰盛之理殷仲堪合社文曰夫社之爲祀逺哉故大夫以成羣斯禱里社之興由來尚矣自喪亂流遷舊俗隳廢今二三宗親思桑梓之遺風遵先聖之明誥㓗齊牲牢庶乎自祐以來一日之澤然三人之行必有其師故復選中正立三老者惟公理以御衆稽舊章以作憲卞敬宗櫟社序讃曰余門前有一社樹盤根䟽柯似非近丗所植抗秀路左流䕃庭宇莊周喻道於啇丘之木匠石辯才於曲轅之擽由斯而觀固可以悟微矣王廙春可樂曰􅁻辰兮上戊明靈兮唯社百室兮必集祈􅀕兮樹下濯夘兮􅉁韮齧䔉􅀆擗鮓縹醪􅀆浮蟻交觴兮並坐氣和兮體適心怡兮志可何承天社頌曰社實隂祇稷唯榖元率育萬􅀋恊賛乹坤先農禮記月令曰孟春乃擇元辰天子親載耒耜置之車右率公卿諸侯大夫躬耕籍田辰亥也謂郊後􅁻亥享先農於東郊先農神農也續漢書􅀕祀志曰光武即位於鄗爲壇營於鄗之陽營神五星及中宫星雷公先農風伯雨師四海四瀆名山大川之屬漢舊儀曰春始東耕於籍田官祠先農先農即神農炎帝矣祠以一牢百官皆從大賜三輔二百里孝悌力田三老布帛漢名臣奏曰黄瓊上言先王制典籍田有曰司徒咸戒司空除壇先時五日有恊風至即齋宫饗燕載耒誠重之也先農之禮所冝躬親以迎春和以致時風沈約宋書􅀕祀志曰元嘉二十一年帝親耕乃立先農壇於籍田髙四丈爲四出陛廣五尺外加埒方十丈車駕未到司空大司農率太祝及衆執事質明以一太牢祀􅀕􅀕器用社稷器祠畢頒餘胙於奉祠者舊典先農又都列於郊􅀕靈星周書作雒曰設兆于南郊以祀上帝配以后稷農星先王皆與食毛詩閔予曰􅁝衣繹賔尸也髙子曰靈星之尸也繹又􅀕也天子諸侯曰繹以􅀕之明曰卿大夫曰賔尸與􅀕同周曰繹啇曰彤也漢書郊祀志曰髙祖時或言周興而邰立后稷之祠至今血食天子於是制詔御史其令天下立靈星祠張晏曰龍星左角曰天田則農祥也星見而􅀕之常歳時祀以牢三輔舊事曰漢靈星祠在長安城東十里淮南子曰君人之道其猶靈星之尸儼然嘿端而受福也嵩髙山記曰漢孝武遊登五岳尊事靈星遂移祠置岳南脚上築作殿壇周廻立瓦屋行種松栢前五百歩臨大道立兩石闕極髙大太平御覽卷第五百三十二
