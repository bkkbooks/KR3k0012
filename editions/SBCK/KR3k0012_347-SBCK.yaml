body:
  text: 兵部七十八弓釋名曰弓穹也張之穹隆然也其未曰簫言簫邪也又謂之弭以骨爲之滑弭弭也中央曰弣孚主切一作拊跗撫也所撫持也簫跗之間曰淵淵宛也言宛曲也􅀃文曰弓近窮逺象形也弴音雕又音敦􅀞弓也弭弓無縁可以解􅆖觚也弲許縁切角弓也弧木弓也一曰徃體寡來體多曰􅀌弨尺招切又勑朝切弓反也音權弓曲也音遥弓便利也張施弓絃也彏烏郭切弓急張也弸拍生切又鄙矜切弓強貌也彎持弓關矢也㢨一弧切滿弓有所向也弘弓聲也又曰韣音獨韔音暢弓衣也又曰角􅗧音端獸􅃺似豕角善爲弓出胡尸國一曰出休尸國山海經曰少皡生般始爲弓矢郭璞注曰般音班丗本云牟夷作矢揮作弓弓矢一噐作者兩人於義有疑此言般作之是也帝後賜羿彤弓素矰以扶下國以射除患扶助下國也丗本曰揮作弓宋裏注曰揮黃帝臣也孫卿子曰倕作弓龍魚河圖曰弓之神名曰曲張太公兵法又曰弓神名曲張方言曰弓藏謂之韇音獨箭衣也墨子曰羿作弓爾雅曰弓有縁者謂之弓郭璞注曰即今宛轉弓也無縁者謂之弭今之角弓也以金者謂之銑以辱者謂之珧音遥以玉者謂之圭用金蚌玉飾弓兩頭因以爲名也易曰弦木爲弧剡木爲矢弧矢之利以威天下盖取諸睽又曰公用射隼于髙墉之上􅀗之無不利又曰先張之弧尚書曰和之弓在東房孔安國注曰和古之弓人又曰平王錫晉文侯彤弓一彤矢百玈音盧弓一玈矢千又曰備乃弓矢詩曰彤弓天子錫有功諸侯也彤弓弨兮受言藏之弨㢮也又曰騂騂角弓翩其反矣騂騂調利也又曰旣張我弓又曰弓矢斯張又曰四壯翼翼象弭魚服鄭玄注象弭弓反未彆者以象骨爲之以助御者彆必􅃑切禮記曰男子生桑弧蓬矢六射天地四方注云天地四方男子所有事也又曰凡遺人弓者張弓尚䈥㢮弓尚角弓有徃來躰皆欲其下曲隤然左手執簫右手承拊簫弭頭也尊卑垂􅍤􅍤佩巾也罄折則佩垂授之儀尊卑一也又曰越􅁄大弓天子之戎噐也又曰良弓之子必學爲箕又曰武王克商後干戈弓矢包之以虎皮周禮曰司弓矢掌六弓四弩八矢之法辯其名物而掌其守藏與其出入仲春獻弓弩仲秋獻矢箙弓弩成於和矢服成於堅也箙盛矢噐也以獸皮爲之及其頒之王弓弧弓以授射甲革椹音砧質者夾弓􅁃弓以授射豻音岸又俄塞切侯鳥獸者唐弓大弓以授學射者及使者勞者王􅓡夾􅁃唐大兵者弓異躰之名徃躰寡來躰多曰王弧徃躰多來躰寡曰夾􅁃天子之弓合九而成䂓諸侯合七而成規大夫合五而成䂓士合三而成䂓句者謂之敝弓凡􅀕祀共射牲之弓矢射牲者示親殺也國語曰郊之事天子必自射其牲澤共射椹質之弓矢鄭司農云澤澤宫也所以習射選士之處也射義曰天子將至必先習射於澤者所以擇土也大射燕射共弓矢如數又曰庭氏掌射國中之妖鳥馬融傳曰國中妖鳥梟鷄惡聲之鳥也􅀂不見其鳥獸則以救日之方與救月之矢夜射之獸虎狼㘁鳴也救日食則伐皷北靣射太隂救月蝕則伐皷南靣射太陽以此弓矢射之􅀂其神也則以太隂之弓與抂矢射之抂矢名也又曰弓長六尺謂之庇軹五尺謂之庇輪四尺謂之庇􅎮軹轂木也又曰弓人爲弓取六材必以其時六材旣聚巧者和之幹也者以爲逺也角也者以爲疾也筯也者以爲深也膠也者以爲和也􅁝也者以爲固也􅃮也者以爲受霜露也六材之力相得而足凡取幹之道七柘爲上檍音億次之檿枽次之山枽也橘次之木􅀲次之荆次之竹爲下凡相幹欲赤黒而陽聲赤黒則嚮心陽聲則逺根陽猶清也凡柝幹射逺者用勢射深者用直凡爲弓冬析幹而春液角夏治䈥秋合材冬定體爲弓長六尺有六寸謂之上制上士服之弓長六尺有三寸謂之中制中士服之弓長六尺謂之下制下士服之人各以其形皃大小用此弓也又曰弓力有三均謂之九和安弓危矢危弓安矢儀禮曰射告賔曰弓矢旣具有司請射賔與大夫弓􅀝于西序矢在弓下左傳曰王賜晉文公彤弓一彤矢百玈弓十玈矢千又曰武王克商作頌曰載櫜弓矢又曰楚子享公于新臺使長鬣者好以大屈宴好之賜也大屈弓名又曰舟堅射陳武子中手舟堅季氏之臣也失弓而罵武子罵也又曰周公相王室以尹天下於周爲睦分魯公以大路大旂夏后氏之璜封父之繁弱封父古之諸侯也繁弱大弓名也封之於少昊之墟又曰魯伐齊士皆坐列顔髙之弓六鈞皆分取傳而觀之顔髙魯人也三十斤爲鈞六鈞一百八十斤也故異之又曰子蕩以弓梏華弱于朝又曰楊虎稅甲如公宫取寳玉大弓以出又曰齊景公田于沛招虞人以弓不進公使執之辭曰旌以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進又曰晉楚戰於鄢陵郄至三遇楚子之卒見楚子必下免胃而趍風楚子使工尹襄問之以弓杜預注曰問遺之也又曰楚靈王次于乾谿左尹子革夕王與之語曰昔我先王熊繹僻在荆山唯是桃弧􅁄矢以供禦王事榖梁曰八年盗竊大弓大弓者武王之戎弓也周公受賜藏之魯崔贑易林曰桃弓葦㦸除殘去惡郭璞毛詩拾遺曰象弭魚服毛云弭弓反未彆者以象骨爲上蓋俗􅀃文誤也左傳曰左執鞭弭弭者弓之別名謂以象牙爲弓今西方有以犀角及鹿角爲弓者春秋佐助期曰天弓主司弓弩之張神名推亡史記曰上迎寳鼎於中山有路弓乗矢集獲壇下又曰黃帝􅀐龍上天小臣不得上悉持龍髯髯抜墮墮黃帝之弓百姓望帝抱其弓而號後丗因名其弓曰烏號又曰漢髙祖擒韓信信曰髙鳥盡良弓藏敵國滅謀臣亡天下巳定我固當烹又曰子貢􅀃越王以兵從吴伐齊越王乃使以􅁗屈盧之弓歩光之劒以賀續漢書曰鮮卑亦東胡之支也禽獸異於中國者有野馬原羊角端牛以角爲弓丗謂之角端弓者也東觀漢記曰􅀕彤爲遼東太守至則厲兵馬逺斥候彤有勇力能貫三百斤弓又曰盖延字巨卿漁陽要陽人以氣聞身長八尺彎弓三百斤謝承後漢書曰朱穆爲尚書歳初百官朝賀有虎賁當階置弓於地謂群僚曰此天子弓誰敢干越百僚皆避之穆呵之曰天子之弓當戴之於首上何敢置地大不敬即收虎賁付獄治罪皆肅然服之張璠漢記曰陳球爲零陵太守州兵朱盖等反與桂陽賊胡簡數萬人轉攻零陵球城守弦大木爲弓羽矛爲矢引機發之逺射千餘歩斬朱盖等魏志曰句驪別種居小水因名小水狟出好弓所謂狟弓也挹婁弓長四尺力如弩矢用楛長尺八寸青石爲鏃古肅愼國也魏要略曰北方有橐離之國其王侍婢有身王欲殺之婢云有氣如雞子來下我故有身後生子王􅂢之於溷中猪以喙嘘之徙馬閑馬以氣嘘之王疑以爲太子令其母收畜之名曰東明常令牧馬東明善射王怒奪其國殺之東明走南至奄水以弓擊水魚鱉浮爲橋東明得渡魚鱉解散追兵不得渡東明因都王夫餘之地王隱晉書曰劉琨與丞相牋曰不得進軍者實困無食殘民鳥散録召之曰皆披林而至衣服藍縷木弓一張荆矢十􅃗晉中興書曰符徤匈暴露刃張弓推鉗鋸鑿殺人之具備置左右晉令曰弓弩士習射者給竹弓角弓皆二人一張沈約宋書曰蕭思話爲梁州太祖賜以弓琴手勑曰丈人頃何所作事務之暇故以琴書爲娱耳并徃枽弓一張材理乃快先所常用旣乆廢射又多病略當不能制之便成老公令人歎息良材美器冝在盡用之地丈人真無所與讓也梁書曰羊侃膂力絶人所用弓至二十石馬上用六石弓三國典略曰齊綦連猛有勇力梁使來聘有武藝人求欲相角猛帶兩鞬左右馳射併取四弓疊而挽之梁人嗟服後魏書曰􅀓融性豪爽有三子靈慶靈根靈越並有才力融以此自􅀒謂足爲一時之雄甞謂人曰吾昨夜夢有一駿馬無堪乗者人曰何由得人乗之有一人曰唯有􅀓靈慶堪乗此馬又有弓一張亦無人堪引有一人曰唯有􅀓靈根可以彎此弓又有數􅁓文書人皆讀不能解此文有一人曰唯有􅀓靈越可以解之融意謂其三子文武材幹堪以駕馭當丗常宻謂郷人曰汝聞之不鬲䖝之子有三靈此圖䜟之文也好事者然之故豪勇之士多相歸附唐書曰太宗謂蕭瑀曰朕少好弓矢自爲能盡其妙近得良弓十數以示弓工乃曰非良材也朕問其故工曰木心不正脉理皆邪弓雖剛勁而遣箭不直非良弓也朕始悟焉朕以弧矢定四方使弓多矣有天下之日淺得爲治之意固未及於弓弓猶失之何况於治乎自是遂延耆老問之政術京官五品己上更􅀫中書内省上每延與語詢訪外事務知百姓疾苦政教之得失焉家語曰楚共王出遊亡其烏噑之弓烏㘁良弓名也左右請求之王曰止也楚人失弓楚人得之又何求焉孔子聞之曰惜乎其不大也冝曰人遺弓人得之而已何必楚也又曰弓調而後永勁焉國語曰周宣王時有童謡檿弧箕音期服實亡周國有夫婦鬻是器者王執而戮之乃奔褒賈逵注曰箕木名服矢筒得弃女子於野而飬之是爲褒姒卒以衰周又曰更盈侍魏王見一鴈過曰臣能遥弓而落鴈乃彎弓向鴈鴈即落又曰鄢之戰郄至三逐王卒王使工尹襄問之以弓郄至甲胃而見客免胄而聽命韓詩外傳曰齊景公使人爲弓弓人之妻曰此弓者泰山南烏號之祏燕牛之角荆麋之筋河魚之膠四物者天下之精材也戰國䇿曰楚人有好以弱弓微繳加歸鴈之上者頃襄王聞召而問之對曰見六􅀟王何不以聖人爲弓以勇士爲繳時張而射之此六雙者可得而囊載也越絶書曰麻林山勾踐欲伐呉種麻爲弓弦使齊人守之典略曰􅂫􅁗􅀃韓宣王曰今韓地方九百里帶甲數十萬強弓勁弩皆射六百歩之外劉尚􅀃苑曰齊攻魯子貢見哀公謂求救於吴公曰奚先君寳之用子貢曰使吾寳而與我師是不可恃也於是以楊幹麻䈥之弓六徃江表傳曰髙句王遣使貢孫權角弓吴時外國傳曰扶南之先女人爲主名栁葉有摸趺國人字混慎好事神一心不懈神感至意夜夢人賜神弓一張教載賈人舶入海混慎晨入廟於神樹下得弓便載大船入海神廻風令至扶南栁葉欲刦取之混慎舉神弓而射焉貫船通度栁葉懼伏混慎因至扶南鄴中託曰石虎女􅀐皆手持雌黃宛轉角弓遁甲開山圖曰河東有獨頭山多青檀可以爲良弓括地圖曰神弓在南山石泥渚中三禮圖曰彤弓天子所用玈弓卿巳下所用也崔豹輿服注曰兩漢京兆河南尹及執金吾司􅈻校尉皆使人導引傳呼行者止坐者起四人持角弓走者射之有乗髙闚者亦射之晉魏設弓而不用焉古史考曰烏號柘樹枝長而烏集將飛枝彈烏烏乃號呼以柘爲弓因名曰烏號風俗通曰烏號弓者柘枽之枝枝條暢茂烏登其上垂下着地烏􅃴飛去從後撥殺取以爲弓因名烏號耳又曰白鷴古弓名出邊崖􅀋聚沈懷逺南越志曰宋昌縣有􅁄竹長十尋俚人取以爲弓又曰沙麻竹人削以爲弓弓似弩淮南所謂浮子弩也南州異物志曰烏滸人􅁟有竹皮厚寸餘破以作弓長四尺名曰弧弓廣志曰縁沉古弓名􅀶物志曰徐偃王旣治其國仁義著聞欲舟行上國乃通溝陳蔡之間得朱弓矢以巳得天瑞遂因名爲號自稱徐偃王列女傳曰晉平公使工人爲弓三年乃成射不穿一扎公怒將殺工其妻繁人之女也見公曰妾之夫造此弓亦勞矣幹生太山之阿一日三覩隂三覩陽􅀓以燕牛之角纒以荆麋之䈥糊以河魚之膠此四者天下選也而不穿一扎是君不能射也而反欲殺妾之夫不亦謬乎妾聞射之道左手如拒右手如附枝右手發之左手不知此射之道也公以其言爲儀而穿七扎弓工立得出賜金三鎰綦母遽注曰繁人官名扎鎧扎也燕角善楚䈥何膠粘也管公明別傳曰信都令家中婦女盡驚更牙疾病使公明爲占之卦成語曰君北室床西頭當有兩死男人一􅀑持矛一􅀑持弓箭頭在壁中脚在壁外持矛者主刺頭故頭重痛不得舉持弓箭者主射􅇩腹故心中懸痛不得飲食晝則浮遊夜還病人故驚恐􅀂徙其屍柩便皆丁強於是令歸室中果得兩楸棺中有角弓及數箭物已乆逺木消爛徙骸埋之合家皆愈洞林曰曲阿令趙元瞻兒字虎舒從吾學卜自求蓍作卦見吾有盛艾小陵􅀛欲得之不與語之曰當作卦相爲致此物令自來復數曰果有一􅀛入廐虎舒後見吾言偶有一物試可占之􅀂得當再拜輸一好角弓即便作卦曰案卦之是爲􅀛虎舒奉弓起再拜老子曰天之道其猶張弓乎髙者抑之下者舉之列子曰紀昌學射於飛衛飛衛曰尓先學不瞚而後能又使學視小如大紀昌􅈊懸虱於牖南靣而望之三年之後如輪覩物皆丘山也乃以燕角之弧朔蓬之幹射之貫虱之心而懸不絶孟子曰不仁不智無禮無義人役也人役而耻爲役猶弓人而耻爲弓孔藂子曰楚王張繁弱之弓載忘歸之矢射蛟兕於雲夢胡非子曰一人曰吾弓良無所用矢一人曰吾矢善無所用弓羿聞之曰非弓何以徃矢非矢何以中的令合弓矢而教之射孫卿子曰繁弱鉅􅁰古之良弓也廣雅又云又曰天子雕弓諸侯􅊮弓大夫黒弓禮也魯連子曰楚王成章華臺酌諸侯酒魯君先至楚王恱之與大曲之弓闕子曰宋景公謂弓人曰爲弓亦遟矣對曰臣不得見公矣公曰何也臣之精盡於弓矣獻弓而歸三曰而死公張弓登虎圈之臺東面而射矢踰西霜之山集彭城之東其餘力逸勁飲羽於石梁夫盡精於一弓而身爲夭死况治天下奈何其獨也尸子曰鴻鶴在上扞弓鞟彏同弩待之􅀂發􅀂否問二五弗知非二五難計也欲鴻之心亂也抱朴子曰金弧王弦無激矢之能又曰農夫得彤弓以駈烏南成得衮衣以􅀒薪猶世人得仙丹而不貴淮南子曰射者扞烏號之弓彎綦御之箭杆張也彎引也綦美箭所出地名也衛利也烏號柘枽其材堅勁烏跱其上及飛至技必撓下勁能復起摷烏隨之烏不敢飛號呼其上伐其材以爲弓因曰烏號之弓也一􅀃黄帝鑄鼎鍾於湖得道而仙乗龍上天其臣援弓射龍欲下黄帝不能也烏於也號呼也於是抱弓而號也自以名其弓爲烏號之弓也重之羿逢蒙子之巧以要飛鳥猶不能與羅者竟多羿古諸侯有窮之君也逢蒙羿弟子皆攻射而百發百中故曰之巧要取竟逐也何則以所持之小也又曰淇衛箘路箘折箭竹也出於淇地衛箭羽也飾以銀雖有薄縞然獨猶不能穿也􅀂假之䈥角之力弓弩之􅀔則貫兕甲而經於革楯矣又曰曲張弓名也一名彷徨弓又曰宛轉弓今之弭弓是也吕氏春秋曰齊宣王好射􅀃人之謂巳能用強弓也其甞所用弓不過三石以示左右左右皆試引之中間而止至於一半而止皆曰此不下九石非王孰能用是宣王所用不過三石而終身自以爲用九石豈不悲哉非直士其孰能不阿主故亂國之主患存乎用三石爲九石又曰萬人操弓共射一招招無不中招謂的也杜夷幽求曰弓折由射者之數劒􅆙因用之者多新序曰楚熊渠子夜行見􅃦石闕弓射之滅矢飲羽下視知石也却復射之矢摧無迹譙子法訓曰善耕者足以謹地待時而動善射者調弓定凖見可而發君子善飬其人足用韓楊天子要集曰弧者天弓備盗賊楚辭曰帶長劒兮挾􅁗弓言身死帶劒弓示不舎武也劉邵趙郡賦曰其噐用則六弓四弩縁沉黃間堂溪魚腸丁令角端陳琳武庫賦曰弓則烏號越􅁄繁弱角端象弭繡質哲弣文身唐太宗詠弓詩曰上弦明月半激箭流星逺落鴈帶書驚啼猿映枝轉後梁宣帝詠弓詩曰虞人招不進繁氏乆彌工已悲軒主跡復挹楚王風楊師道奉和詠弓詩曰霜重麟􅑟勁風髙月影圎烏飛隨帝輦鴈落逐鳴絃齊王融謝武陵王賜弓啓曰殿下摛藻蕙樓暢藝蘭苑敷積玉於風筵疊連珠於月的兎園掩秀鄴水慙竒融揖讓未工濫陪升飲之賞操弧反正謬奉招賢之􅃬文韜鏤景逸幹梢雲玩溢百齡佩流千載晉稽合木弓銘曰烏號之撲豐條足理弦弧走栝截飛駭止射隼髙墻出必有擬旣用禦􅐥亦以招士李尤良弓銘曰弓矢之作爰自曩時郷射載禮招命在詩妙稱顔髙巧發由基不爭之美亦以辦儀太平御覽卷第三百四十七
