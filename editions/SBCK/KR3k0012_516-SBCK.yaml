front:
  text: 太平御覽卷第五百一十六
  hash: sha256:9b7fbf5b9a394d78bdf2f9f5c2c8b7ab33e375697b2138dcaf3e7526980a78ed
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_516-1a}
body:
  text: 宗親部六兄弟下晉書王覽字玄通母朱氏遇前妻子祥無道覽年數􅀊見祥􅀍楚撻輙涕泣抱持至于成童每諌其母母少止􅇯虐祥漸有譽時朱氏宻使鴆祥覽知之徑起取酒祥疑其有毒争而不與朱氏遽奪反之自後朱氏賜祥饌覽輙先甞又曰􅁃冰字季堅兄亮以名德流訓冰以雅素垂風諸弟相率莫不好禮爲丗論所重亮常以爲􅁃氏之寳又曰荀組字大章于時天下巳亂組兄弟貴盛懼不容於丗雖居大官並諷議而巳又曰謝安弟萬爲而中郎將揔藩任之重安雖處衡門其名猶出萬之右自然有公輔之望又曰華悝字道弘少失父事母至孝年十三值年飢榖貴悝􅂼食而母甘肥不絶又撫育􅀌弟友愛甚至稱爲慈兄由是少有聲譽又曰魏徐州刺史任城吕䖍有佩刀工相之以爲必三公可服此刀䖍謂別駕王祥曰苟非其人刀或爲害卿有公輔之量故以相與祥始辭之因強乃受及祥死之日以刀授弟覽曰吾兒凡汝後必興足稱此刀故以相與覽則導之祖王隱晉書曰祖逖字士稚范陽人與弟約將母詣洛交結人流逖舅程玄良良弟衛衛弟收並臺郎有􅀔於洛更共扶讃兩甥故命並階清塗逖􅀄爲司州主簿舉秀才爲大司馬齊王􅁺有將帥之風宋書曰謝弘微少孤事兄如父兄弟友睦之行丗莫能及口不言人長短兄曜好臧否人物毎言論常以他語亂之又曰蔡廓奉兄䡄如父家事小大皆諮而後行公禄賞賜一皆入䡄有所資湏悉就典者請焉從髙祖在彭城妻郗氏永夏服廓荅曰知湏夏服計給事自應相供無容別􅀉䡄時爲給事中又曰謝景仁愛其弟甝胡甘切而憎弟述甞設饌請髙祖命甝預坐而髙祖召述述知景仁夙意又慮非髙祖命之請急不從髙祖馳遣呼述湏至乃歡及景仁有疾述盡心視湯藥飲食必甞而後進不解帶不盥櫛者累旬景仁深懷悊愧也又曰張暢弟収爲猘音兾犬所傷醫言食蝦蟆鱠即愈収甚難之暢含􅀏先甞収因啖得差又曰􅁃登之字元龍頴川􅋣陵人也少以強濟自立爲吴郡太守坐事免官弟炳之爲臨川内史登之隨弟之郡優遊自適又曰江夷字茂逺濟陽考城人也夷少自操厲爲吴郡太守以兄疾去官後遷右僕射又曰陶潜與弟子書以言其志并爲訓戒曰汝軰稚小家貧無役柴水之勞何時可免念之在心􅀂何可言然雖不同生當思四海皆兄弟之義鮑叔敬仲分財無猜歸生伍舉班荆道舊遂能以敗爲成因䘮立功他人尚爾况共父之人哉頴川韓元長漢末名士身處郷佐八十而終兄弟同居至于没齒濟北汜稚春晉時操行人也七丗同財家無怨色詩曰髙山仰止景行行止汝其慎哉又曰孔顗字思逺不尚嬌飾服用麤敗終不改易時吴郡顧顗之亦尚儉素衣裘器服皆擇其陋者宋丗清約稱此二人顗弟道存從弟微頗營業二弟請假東還輜重十餘舫皆是絹􅁓席之属顗見之命上置岸側命左右取火燒之盡乃去道存代顗爲江夏内史時都邑米貴道存慮顗甚乏遣吏載伍百斛米餉之顗呼吏載米還彼吏曰都下米貴乞於此貨之不聽吏乃載米而去又曰蔡廓罷豫章郡還起二宅先成東宅與弟䡄又曰徐湛之年數􅀊時與弟淳之共車行牛奔車環左右人馳來赴之湛之先令取弟衆咸歎其㓜而有識又曰謝弘微寛重有雅量不以喜愠改色有蔡湛之者及見太􅀓兄弟謂人曰弘微㒵􅀋中郎而性似丈靖齊書曰衡陽元王道度太祖長兄也與太祖俱受學雷次宗宣帝問二兒學業次宗荅曰其兄外朗其弟内潤皆良璞也又曰劉璡兄瓛夜隔壁呼璡共語璡不荅方下牀着衣立然後應瓛問其乆璡曰向束帶未竟其操如此又曰張岱少與兄太子中舎人寅新安太守鏡征北將軍弟永廣州刺史辨俱知名謂之張氏五龍隋書曰盧昌衡小字龍子風神􅌿雅容止可法􅀶渉經史工草行書從弟思道小字釋奴宗中俱稱英妙故幽州爲之語曰盧家千里釋奴龍子唐書曰温大雅歷遷黄門侍郎弟彦􅀶爲中書侍郎對居近侍議者榮之髙祖從容謂曰我起義晉陽爲卿一門耳大雅將改葬其祖父筮者曰葬於此地害兄而福弟大雅曰􅀂得家弟永康我將含笑入地葬訖􅀊餘而卒又曰張嘉貞爲并州長史爲政嚴肅甚爲人吏所畏開元初因奏事至京師上聞其善政數賞慰嘉貞因奏曰臣少􅀌兄弟相依以至今日臣弟嘉祐今授鄯州別駕與臣各在一方同心離居魂絶萬里乞移就臣側近臣兄弟盡力報國死無所恨上嘉其友愛特改嘉祐爲忻州刺史又曰韋述弟逌學業亦亞於述尤精三禮與述對爲學士迪同爲禮官時人榮之又曰張道源族孫楚金少有志行事親以孝聞􅀄與兄越石同預郷貢進士州司將罷越石而薦楚金楚金辭曰以順則越石長以才則楚金不如固請俱退時李勣爲都督歎曰貢士夲求才行相推如此何嫌􅀟舉也乃俱薦擢第又曰李遜㓜􅀌寓居江陵與其弟建皆安貧苦易衣併食講習不倦遜兄造知二弟賢日爲營丐成其志業建先遜一年卒兄弟同致休顯士君子多之又曰楊汝士爲劒南東川節度使時宗人嗣復鎮西川兄弟對居節制時人榮之又曰薛膺友悌弟齊爲李絳山東西道從事絳遇害齊中飛矢墜於城下膺時爲左􅀘闕聞難不及請馳馬以赴齊殁膺與兄弟褒庠處䘮過禮朝之卿大夫曁搢紳者徃弔繼路聞其哀號弔者悲不能自持膺去左􅀘闕庠去河南縣尉直弘文館與褒皆屏居外野布巾終䘮蹈名教者推之續晉陽秋曰王岷有儁才與兄珣並有名而聲出珣右時人爲之語曰法護非不佳阿彌難爲兄韋昭吴書曰劉繇長子基遭家多難嬰丁困苦潜處味道不以爲慼與群弟居常夜卧早起妻妾稀見其靣諸弟敬憚事之猶父不妄交遊門無雜賔三十國春秋曰裴楷甞新爲別宅宅甚羙麗楷兄欲之楷便讓之爲性有大度皆斯􅀋也丗􅀃曰諸葛瑾弟亮及從弟誕並有盛名各在一國于時以爲蜀得其龍吴得其虎魏得其狗誕在魏與夏侯玄齊名瑾仕吴吴朝服其弘雅又曰謝弈作剡令有一老翁犯法謝以醇酒罰之乃至醉而猶未巳太􅀓時年七八歳着青布袴在兄􅂰邊坐諌曰阿兄老翁可奈何故取作此謝於是改容曰阿奴欲放去耶即遣之㑹稽典録曰謝淵字休德山隂人其先鉅鹿太守夷吾之後也丗漸微替仕進不繼至淵兄弟一時俱興兄咨字休度少以質行自立幹局見稱官至海昌都尉淵起於衰末兄弟脩德貧無慼容歴位建威將軍又曰鍾牧字子幹牧兄駰計吏少與同郡謝賛吴郡顧譚齊名牧童齓時號爲遟訥甞謂人曰牧必勝我不可輕也時人皆以爲不然三輔决録曰張宇穆之第二子也以父功當封自言兩目失明天子信之乃封弟恭其小弟好戯無度放散家財宇悉以所得千萬與之天子聞而嘉之又知其讓封徴拜議郎􅀃苑曰宋襄公兹父爲桓公太子桓公有後妻子曰公子目夷公愛之兹父爲公愛之也欲立之請於公曰請使目夷立臣爲之相以佐之公曰何故也對曰臣自知不足以處目夷之上公不許強以許公許之將立公子目夷目夷辭曰兄立而弟在下是其義也今弟立而兄在下不義而使目夷爲之目夷將逃之衛兹父從之三年桓公有疾使人召兹父曰􅀂不來是使我以憂死也兹父乃反公復立之以爲太子然後目夷召兹父歸楚國先賢傳曰隂興字君陵􅀯陽新野人也拜衛尉薨時封興長子慶爲嗣陽侯次子傳爲㶏強侯傳弟貟丹皆爲郎慶少修儒術推所居第宅奴婢財物悉分與貟丹但佩印綬而巳當丗稱之上以慶閨門孝悌行義敦宻褒顯朝廷以勵親戚擢爲羽林右􅁥劉向列女傳曰廣漢汝婦者汝敦之妻也居丗殷冨兄弟早􅀌而㛐貪恠敦以所受田宅奴婢三百餘萬悉讓與兄裁留園地數十􅅿起舎耕作􅁟中得金一器敦以示妻妻曰夲言讓先祖所有也此獨非其有耶敦曰固吾意也乃俱檐金與兄㛐㛐􅀄謂叔窮乏來欲假貸有不恱之色見金而喜兄乃惻然感悟弃妻還金海内先賢傳曰范丹字史雲讓財千萬與三弟風俗通曰陳留太守㤗山吴文章少與兄伯武相失二十年後相㑹下邳市中爭計共闘伯武毆之文章欲報心悽悵手不能興觀者􅀏之更相借問乃親兄也相持啼泣觀者復曰兄得校弟不得報兄向者所􅀏乃其義也典論曰劉表疾病其子􅄾還省疾􅄾性慈孝其弟恐􅄾見表父子相感更有託後之意謂曰將軍命君撫臨江夏爲國東藩其任至重今釋衆而歸必見譴怒傷歎以増其疾非孝敬也遂遏于戸外使不得見􅄾流涕而去江微陳留志曰李銓字玄機平丘人也少聦惠有志行銓兄全前母子後母甚不愛也而衣食皆使下銓銓始年五􅀊覺巳衣勝兄即脫不着湏兄得與巳同然後服之其母遂不得有偏及長銓内匡其母外奉其兄故閨門雍睦爲􅀖族所稱晉諸公讃曰髙柔長子雋大將軍􅁺次誕歴三州刺史放率不倫决烈過人次光字宣茂少習家業明練法治晉武帝丗爲廷尉兄誕與光異操謂光小節常輕侮之光事誕愈謹又曰和嶠爲少保散􅀐常侍性至儉恡嶠同母弟郁素無名稱嶠輕侮之以此爲損一太平御覽卷第五百一十六
