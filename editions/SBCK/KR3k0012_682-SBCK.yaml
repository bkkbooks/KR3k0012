  text: 太平御覽卷第六百八十二
  hash: sha256:4dc90e7f0459237c8f4050bcdd889ad9fda26c0d0b2df001f1d324a524d0ec79
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_682-1a}
body:
  text: 儀式部三璽綬璽說文曰璽王者印也以守􅁟故字從􅁟籕文從玉春秋後語曰􅁗破魏軍於華陽走我將軍孟夘王使叚干木子崇與􅁗南陽以千金和􅂫代謂王曰欲璽者叚干木子也欲地者􅁗也今王使欲地者制璽欲璽者制地魏地不盡則不和言叚子木子以地兊􅁗而求相印且夫以地事􅁗譬猶以薪救火薪不盡火不滅也王曰是則然矣雖然事始巳行不可更矣史記曰沛公先至覇上秦王子嬰係勁以組封皇帝璽符節降軹道旁又曰人有告絳侯周勃欲反下捕勃治之文帝曰絳侯綰皇帝璽將兵於北軍不以此時反今居一小縣頋欲反耶漢書曰􅀄髙祖入咸陽得􅁗璽及即天子位因御服其璽世世傳受號曰傳國璽以孺子未立璽藏長樂宫及莽即位請璽元后后不肯以授莽莽使安陽侯王舜諭旨太后怒罵之曰而屬父子宗族􅂪漢家力冨貴累丗旣無以報受人􅀌􅀉便奪取其國爲人如此者狗不食其餘若自以金匱符命爲新皇帝當自更作璽何以用此亡國不祥璽我爲漢家老寡婦旦暮且死欲與此璽俱葬終不可得也太后因涕泣舜曰莽必欲得傳國璽寧能終不與耶太后聞舜語切乃出璽投之地以授舜曰我老巳知而兄弟今族滅也又王莽傳曰梓橦人哀章素無行好爲大言見莽居攝即作銅匱爲兩檢署其一曰天帝行璽金匱其二署曰赤帝行璽莽至髙廟拜授又曰王閎王莽叔父哀帝丗爲中常侍時董賢爲大司馬帝臨崩以璽綬付賢曰無妄以與人時國無嗣主内外恐懼閎白元后請奪之即帶劒至宣德闥謂賢曰宫車晏駕國嗣未立君受恩􅀷重當俯伏號泣何事乆持璽綬以待禍至耶賢不敢拒乃跪授璽綬後漢書曰􅃰郡太守張豐執使者舉兵反自稱無上大將軍與彭寵連兵四年􅀕遵朱祐破之􅀄豐好方術有道士言豐當爲天子以五綵囊裹石繫豐肘云石中有玉璽豐信之遂反及執當斬猶曰肘石有王璽遵爲椎破之豐乃知􅀍詐仰天歎曰當死無所恨又曰延嘉八年渤海妖賊蓋登等稱太上皇帝有王印珪璧䥫劵相署置皆伏誅續漢書曰時登等有玊印五皆如白石文日皇帝信璽皇帝行璽其三無文字續漢書曰獻穆曹后曹操之女也魏受禪遣使求璽綬后怒以璽綬抵軒下因涕泣横流曰天不祚此璽魏志曰太祖崩洛陽時隠陵侯彰行越􅀐將軍從長安來赴問賈逵先王璽綬所在逵正色曰太子在鄴國有儲副先君璽綬非君所冝問也又曰太和元年以中山魏昌之安城郷追封甄逸謚曰敬侯孫豫襲爵􅀄營宗廟掘地得玉璽方一寸九分其文曰天子羡思慈親明帝爲之改容魏略曰司馬景王廢齊王芳使郭芝入白太后取璽綬太后取璽綬置坐側及迎髙貴郷公又請璽綬太后曰我見髙貴郷公小時識之明白我欲自以璽綬手付之呉書曰漢大亂天子北詣河上六璽不自隨掌璽者以投井孫堅討董卓頓軍洛南其井毎有五色氣從井中出堅使人浚之得漢傳國玉璽其文曰受命于天旣壽永昌方圎四寸上綏交蟠五龍龍上一角缺蜀志曰太傅許靖等上言先主曰前􅀜羽圍于禁襄陽襄陽子張嘉王休獻玉璽潜漢水伏於淵泉暉影燭耀靈光徹天夫漢者髙祖本所起定天下之國號也大王襲先帝􅁤迹興於漢中也今天子玉璽神光見璽出襄陽漢水之未明大王承其下流授與以天子位瑞命符應非人力所致鄧粲晉紀曰江寜民虞迪墾地得白玉驎璽一鈿以獻文曰長壽萬年晉書曰義陽王威無操行謟附趙王倫倫將簒使威與黄門郎駱休逼帝奪璽綬倫敗惠帝反正曰阿皮捩吾指奪吾璽綬不可不殺阿皮威小字也於是誅威又曰冉閔子智以鄴來降安西將軍謝尚使濮陽太守戴施應之進據枋頭㑹冉智行人劉猗至施乃止使猗求傳國璽猗歸以告智智猶豫不許施因遣叅軍何融率壯士百人入鄴登三臺助戍譎之曰今且出璽付我㐫㓂在外道路梗澁亦未敢即送當遣單使馳告天子天子聞璽已在吾邊知卿至誠當遣重兵相援智信之乃出璽付融融詣施施使賫璽馳還璽自秦傳漢漢入魏魏入西晉永嘉末洛京不守璽爲劉聦所得及石勒滅劉氏璽入僞趙冉閔誅石氏又入閔及是四十二年而璽復歸於晉晉中興書曰義熈十二年左衛兵陳陽於府前淮水中得璽王者不隱其過則玉壁見璽亦璧也崔鴻十六國春秋前趙録曰河瑞元年汾水中得玉璽髙一寸二分方四寸文曰有新保之盖王莽時璽也獻者因増􅀷海光三字淵以爲巳瑞大赦又前趙録曰光􅀄五年并州牧安定王䇿獻玉璽一文曰趙盛又前凉録曰張寔元年蘭池趙嬰上言於青澗水中得一玉璽鉗鈕光照水外文曰皇帝璽群寮上賀寔曰何怱有此言乃送之於京師晉書載記曰石季龍尅上邽遣主簿趙封送傳國玉璽太子玉璽各一于勒又曰符堅奔五將山姚萇遣將軍呉忠圍之堅衆奔散獨侍御十數人而巳神色自􅀂坐而待之召宰人進食俄而忠至執堅以歸新平幽之于別室萇求傳國璽於堅曰萇次膺符暦可以爲惠堅瞋目叱之曰小羗乃敢干逼天子豈以傳國璽授汝羗也圖緯符命何所依據五胡次序無汝羗名違天不祥其能乆乎璽巳送晉不可得也又曰冉閔殺石􅕼僣大號遣其使人常煒聘慕容㑺㑺使記室封􅁉詰之曰石􅕼去歲使張舉請援云璽在襄國其言信不煒曰誅胡之日在鄴者略無所遺璽何從而向襄國此求救之辭耳又曰冉閔敗蔣幹以傳國璽送于建鄴慕容㑺欲神其事業言暦運在巳乃詐云閔妻得之以獻賜號曰奉璽君因以永和八年僣即皇帝位大赦境内建元曰元璽宋書曰元凶劭旣敗時不見傳國璽問劭云在嚴道育處就取得之又曰蔡興宗拜侍中毎正言得失無所頋憚孝武新拜陵興宗􅀒璽陪乗齊書曰謝朏爲宋侍郞領祕書監及髙帝受禪朏當日在直百僚陪位侍中當解璽朏陽不知曰有何公事傳詔云解璽授齊王朏曰齊自應有侍中乃引枕卧傳詔懼乃使稱疾欲取兼人朏曰我無疾何所道遂朝服歩出東掖門乃得車仍還宅是日遂以王儉爲侍中解璽旣而武帝請誅朏髙帝曰殺之則成其名正應容之度外北史曰后妃􅀓典琮三人掌琮璽翫器北齊書曰辛術鎮廣陵獲傳國璽送鄴文宣以璽告於太廟此璽即􅁗所制方四寸上紐交盤龍其文曰受命于天旣壽永昌二漢相傳又應魏晉晉懷帝敗没於劉聦聦敗没於石氏石氏敗晉穆帝永和中濮陽太守戴僧施得之遣督護何融送于建鄴歷宋齊梁敗侯景得之景敗侍中趙思賢以璽投景南兖州刺史郭元建送于術故術以進焉又曰元暉業天保二年從駕至晉陽於宮門外罵元韶曰爾不及一老嫗背􅀒璽與人何不打碎之我出此言知即死然爾詎得幾時文宣聞而殺之後周書曰宇文氏其先曰普迴因狩得玉璽三鈕有文曰皇帝璽普迴異之以爲天授其俗謂天曰宇因號宇文國并以爲氏唐書曰貞元二年神䇿將温嘉順得白玉印其文曰天子之寳獻之即傳國八寳之一上幸奉天後失之及是方獲玉璽譜曰傳國璽是秦始皇所刻其玉出藍田山是丞相李斯所書其文曰受命于天旣壽永昌漢髙祖定三􅁗􅁗王子嬰獻此璽及漢髙即位仍佩之因以相傳故號曰傳國璽漢昭帝時殿中一夜相驚霍光即召持節郞取璽郎不與光欲奪之郞案剱曰頭可得璽不可得光善之明日遷郎秩二等光後廢昌邑王賀立宣帝光自手解取賀璽扶令下殿至漢平帝王莽簒位就元后求璽乃出璽投之於地璽上螭一角􅆙及莽敗時帶璽綬避火於漸臺啇人杜呉殺莽取綬不知取璽及莽頭公賔就見綬問綬主所在乃斬莽首并璽與王憲憲得無所送又自乗天子車輦李松入長安斬憲送璽詣宛上更始赤眉大司馬謝禄至髙陵更始奉璽赤眉赤眉立劉盆子建武三年盆子敗於冝陽璽還光武孫堅從桂陽入討董卓卓時巳焚燒洛邑徙都長安堅軍於城南見井中旦旦有光軍人莫敢汲堅乃􅊥得璽􅀄卓作亂掌璽者投于井中故堅得之􅀽紹有僣盗意乃拘堅妻逼求之紹得璽見魏舉以向肘魏武惡之紹敗得璽還漢以禪魏魏以禪晉趙王倫簒立使義陽王威就惠帝取璽帝不與強奪之晉懷帝永嘉五年王弥入洛陽執懷帝及傳國六璽詣劉曜後爲石勒所井璽復屬勒勒刻一邊云天命石氏此題今不復存勒爲冉閔所滅此璽屬閔閔敗璽存閔大將軍蔣幹晉鎮西將軍謝尚遣督護何融至購賞得之以晉穆帝永和八年還江南晉元帝東度歷數帝無玉璽北人皆云司馬家是白板天子又曰雍州璽者晉泰光十九年雍州刺史郗恢表慕容永稱藩奉璽方六寸厚七分上蟠螭爲鼻合髙四寸六分四邊􅀛文下有八字其文曰受天之命皇帝壽昌鳥􅂐隠起巧麗驚絶是慕容所制源其所由未詳厥始也吕氏春秋曰民之於上若璽於塗印方則方印圎則圎山陽公載記曰􅀽術將僣號聞孫堅得傳國璽乃拘堅夫人而奪之王璽譜云􅀽紹拘堅夫人奪之應劭漢官儀曰孔子稱封泰山禪梁父可得而數七十有二傳曰封者以金泥銀繩印之以璽璽施也信也古者尊卑共之月令曰固封璽春秋傳襄公在楚武子使季冶問璽書而與之是也􅁗漢以來尊者以爲名乃始避又曰天子有傳國璽文曰受命於天旣壽且康漢舊儀曰􅁗巳前民皆以金玉銀銅犀象爲方寸璽各服所好漢巳來天子獨稱璽又以玉群臣莫敢用也又曰皇帝六璽皆白玉螭虎劒文曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽凢六璽皇帝行璽賜諸侯王書信璽發兵徴大臣天子行璽外國事天子之璽事天地􅀑神璽皆以武都紫泥封青布囊白表裏兩端尺一櫃中約署崔浩漢紀音義曰傳國璽是和氏璧作之趙書曰劉曜於龍門河水中得玉璽文融尅昌􅋯以爲天錫神璽齋而受之石虎別傳曰武郷長城縣民韓強在長城西山巖石間得玄璽一方四寸厚二寸與璽同文曰受命于天旣壽永昌虎以爲瑞燕書曰元璽六年蔣幹遣太子􅉟事劉猗賷傳國璽詣晉求救猗􅀒璽行數里天黄霧四塞不得進易取行璽始得去叚􅀛龍凉州記曰吕光時州人陳冲得玉璽廣三寸長四寸直看無文字向曰視之字在腹裏言光當王王彪之議曰未詳傳國璽造創之始歷代以來揖讓禪位以兹相授故是傳國之守器也拾遺録曰武王㓕紂樵夫牧竪探鳥巢得赤玉璽文曰水德方㓕火祚方盛文皆大􅂐故三分天下而二分歸周又曰晉太康元年孫皓送六金璽云時無玉工故以金爲印璽漢武内傳曰西王母佩金剛靈璽鄧析書曰爲之符璽以信之則并與符璽而􅀼之綬爾雅曰繸綬也即佩玉之組也所以連繫瑞王者因通謂之繸也禮記玉藻曰天子佩白玉而玄組綬公侯佩山玄玉而朱組綬大夫佩水倉玉而純組綬世子佩瑜玉而綦組綬士佩瓀玟緼組綬􅀃文曰緺紫青色綬也應劭漢官儀云綬者有所受以别尊卑彰有德也又云綬長一丈二尺法十二月闊三尺法天地人董巴輿服志曰戰國解去紱珮留其􅁝禭以爲章表􅁗乃以采組連結於禭光明章表轉相結綬故謂之綬乗輿黄赤綬四采黄赤縹紺淳黄圭長二丈九尺五百首太皇太后皇太后皇后皆同又漢官儀云乗輿綬黄地骨白羽青絳縁五采四百首長二丈三尺王赤綬四采赤黄縹紺淳赤圭長二丈八尺三百首公主大貴人諸侯皆同又漢官儀云四采絳地骨白羽青黄赤縁二丈一尺二百六首諸國貴人相國緑綬三采緑紫白淳緑圭長二丈一尺百四十首將軍紫綬二采紫白淳紫圭長一丈七尺百八十首公主封君同又漢官儀云丞相御史大夫匈奴亦同九卿中二千石一云青緺綬緺紫青色緺音􅀲二千石青綬三采青白紅淳青圭長一丈八尺一百二十首又漢官儀綬羽青桃花縹長丈八尺自青綬已上縌音逆皆長三尺二寸與綬同采而首半之縌者古佩禭也佩禭相迎受故曰縌紫綬之間得施玉環玦千石六百黒綬三采青赤紺淳青圭長丈六尺八十首官儀云墨綬白羽青地絳二采長丈七尺四百丞尉三百長相二百石皆黄綬一采淳黄圭長丈五尺六十首又漢官儀云黄綬絲八十首長丈七尺自黒綬以下縌長三尺綬同采而首半之百石青紺綬一采宛轉繆織圭長丈二尺凢先合單紡爲一絲四絲爲一扶五扶爲一首五首成一文文采淳爲一圭首多者絲細少者麤皆廣六寸史記曰武帝召東郭先生出拜爲郡都尉先生乆待詔公車行雪中履有上無下及其拜爲二千石佩青緺之綬也漢書曰諸侯王髙帝􅀄置金璽盩綬如淳曰盭音戻縁也晉灼曰盭草也出琅耶平昌縣又曰朱買臣字翁子拜㑹稽太守上謂之曰冨貴不歸故郷如衣錦夜行買臣頓首謝乃微行懷其印綬歩歸郡邸邸吏方與群飲不視買臣買臣共飲醉飽少間守邸微見其綬而引之即㑹稽太守章也守邸驚出相語􅁺吏皆云妄誕守邸曰試觀之素輕買臣者入見皆驚走大呼曰實然乃推排庭中拜謁又曰蕭育字次君與朱􅀶友善人稱曰蕭朱結綬又曰南越反楊僕拜樓舩將軍東越反上復欲使爲將僕甚伐前勞勑責之曰士卒􅁀露連歳將軍不念其懃勞而造侫巧請乗傳行塞因用㱕家懷銀黄垂三組誇鄉里是三過也又曰金日磾兩子賞建俱侍中與昭帝同共卧起賞爲奉車都尉建附馬都尉及賞嗣侯佩侯綬上謂霍將軍曰金氏兄弟兩人不可使俱兩綬耶霍光曰賞自嗣爲侯耳上􅀏曰侯不在我與將軍乎光曰髙帝之約有功乃得封侯時年俱八九歳又曰莽上漸臺商人杜呉殺莽取其綬漢名臣奏云大司空朱浮奏曰車府承宏受詔乗輿綬五采何多黄也可更用赤絲爲地東觀漢記曰沛王楚王來朝就國明帝告諸王傳相王之子年五歲以上皆令帶列侯綬復送綬十九枚爲諸子在道欲急帶之也又曰李忠仲都發兵奉世祖封武固侯時無綬上自解所佩綬以賜忠又曰弟五倫諸王當㱕國詔書選三署郎􅀘王家長史除倫爲淮陽王醫工長時軰除者多綬盡但假印倫請於王王賜之綬又曰馬防爲車􅀐將軍城門校尉置􅁺史位在九卿上絶席詔封頴陽侯持以前叅醫藥懃勞省闥以襄城羙亭千二百五十户増防身帶三綬寵貴至盛又曰掠得羗侯君長紫綬十七艾綬二十八黄綬二枚皆入簿貴人相國緑綬三綵緑紫白純緑圭公侯將軍紫綬二彩紫白純紫圭公主封君同九卿中二千石靑綬三彩青白紅純青圭千石六百石黒綬二彩靑紺純青圭四百三百二百石黄綬純黄一彩百石青紺綬一彩宛轉繆織魏志曰太祖與吕布書國家無好金􅀌自取家好金更相爲作印國家無紫綬自取所帶綬以藉心又曰丁謚父斐字文侯建安末太祖征吴斐隨行自以家牛羸困􅀻易官牛􅀍収送獄奪宦後太祖啁斐曰文侯印綬何在斐亦知見戲也對曰以易餅晉輿服志曰諸假印綬而官不給鞶囊得自具作其但假印不假綬者不得佩綬也晉書曰衛瓘録尚書事加緑縁綬履上殿入朝不趍晉令曰皇太子及妃諸王纁朱綬郡公主朱綬郡侯青朱綬梁書曰張纉爲尚書僕射議南郊印綬官􅀂備朝服冝並着綬時並施行􅀶物志曰光武嫌二千石綬不青而細朱浮議更用青羽又曰太僕朱浮言詔書曰百官皆帶王莽時綬又不齊因前􅀽安故綬二李渉等六家所織綬不能具丙丁文能如組狀募能爲丙丁文謹圖􅀞一綬丙丁制度賜縑五十疋今王莽時六安都尉留應募能爲丙丁文謹処武庫給食留晝夜思念諷誦狂癡三十日病愈今文以成請賜縑五十疋西京雜記曰昭陽殿上設五色流􅂫帶以緑文紫綬又曰趙飛鷰爲皇后其弟上遺五色文綬蔡邕獨断曰皇后赤紱玉璽貴人緺綬金印五色也蔡邕􅄂章曰相國金印緑綬位在公上所以殊異休烈群臣莫得而齊新序曰昌邑王取侯王二千石黒綬黄綬與左右佩之龔遂諌曰髙皇帝造花綬五等陛下取之而與賤人臣以爲不可願陛下収之風俗通曰車􅀐將軍馮緄字鴻卿爲議郎發綬笥有二赤虵可長二尺分南北走大用憂怖季山孫字寜方得其先人秘要緄請使卜云君後三歳當爲邊將東北四五千里官以東爲名復五年爲大將軍南征此吉祥也居無幾拜遼東太守㑹武陵蠻夷黄髙攻燒南郡鴻卿以威名素著選登亞將奮虓虎之勢又曰􅁗昭王遣李冰爲蜀郡太守開成都兩江闢田萬頃江神每歳湏童女二人不然爲水災冰曰以女與神因責之良乆有蒼牛闘於岸上有間氷還謂官屬曰􅋐太極可相助也若欲知向南腰中正白者我綬也主簿㓨殺北向者神遂絶管氏易林曰遘䑕咋紫綬衣服皆迁之象新五行書曰懸虎􅈹門上子孫帶綬張衡集曰南陽太守鮑得有詔所賜先公綬笥傳丗用之時得更治笥平子爲主簿作銘陸機吊魏武曰今爲著作郎遊祕閣見魏武遺令云吾衣裳可爲一藏歷官所著者綬内藏中太平御覽卷第六百八十二
