front:
  text: 太平御覽卷第六百六十六
  hash: sha256:90052780137dc1a1e6b2a9e805383ca4ab7213b365a49540bcca489d4c2cebc8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_666-1a}
body:
  text: 道部八道士太霄經曰人行大道謂之道士又云從道爲事故稱也周穆王因尹􅁤眞人制樓觀遂召幽􅇣之人置爲是士平王東遷洛邑置道士七人漢明帝永平年置二十一人魏武帝爲九州置壇度三十五人魏文帝幸雍謁陳熾法師置道土五十人晉惠帝度四十九人給户三百眞誥曰劉翊字子相後漢人也世居潁川家冨以濟貧爲事爲陳留太守後去官入山爲道士又曰淳于斟字叔顗㑹稽人漢桓帝時爲縣令入山修道又曰劉寛字文饒後漢南陽太守年七十三入華山服丹􅀥又曰王㓪字法明太原人也入茅山師陶隱居以梁大通三年正月十四日化隱居爲制銘誌并設奠云冕豈榮隨璜非寳萬里求眞緘兹内抱又曰陶弘景父真寳清辯有才學工草􅀠閑􅀐射藥術而陶隱居亦善􅀠書雖効王書而別爲一法文章尺牘爲世所重又曰孫韜字文藏㑹稽剡人也入山師潘四明叅受眞法學摹冩遂大巧妙後學王書殊有深意當時稱之南洞大碑及許長史壇碑並是韜跡也陶隱居手爲經題握中祕訣門人罕能見之惟􅀓孫韜與桓闓音開二人而巳又曰朱仲甞於㑹稽賣珠漢髙后時人也仲以素書􅀝酒於女几家几盗冩學其術又曰道士不欲臨喪損神壞氣所以去世不仕而獨存焉惟父母及師不懼性命之傷必臨其䘮以此而傷是無傷也抱朴子曰薛旅字季和燕代人周武王時學道於鍾山北河經七試而不過者由􅁋佚鄙滯敗其試耳又曰郭文舉河内軹縣人入陸渾山學道獨能無情意不生也又曰吴大帝時蜀中有李阿者穴居不食累丗見之號八百歳翁人徃問事阿無所言但占阿顔色􅀂欣然則事􅁻􅀂􅃤戚則㓙􅀂含􅀏則大慶微歎則深憂如此之候未曽不審也一旦忽去不知所之又曰范零子少好仙道如此積年後遇司馬季主季主同入常山中積七年入石室北東角有石甕或作石牖季主出行懇戒之曰愼勿開零子忽發視之季主還乃遣歸後復召至使守一銅匱又戒勿發零子復發之季主乃遣之遂不得道又曰馮良者南陽人少作縣吏年三十爲尉佐史迎督郵自耻無志乃毀車殺牛裂敗衣幘去從師受詩傳禮易復學道術占遊候十五年乃還州郡禮辟不就詔特舉賢良髙第半道委還家年六十七弃世東度八山在鹿迹洞中又曰安丘望之字仲都京兆長陵人也修尚黄老漢成帝重其道德常宗師之愈自損退成帝請之􅀂值望之章醮則待事畢然後徃老子章句有安丘之學望之忽病篤弟子公沙都輿於庭樹下望之曉然有痊時冬月􅈹聞李香開目則見􅀟赤李著枯枝望之仰手承李李自墮掌中因食李所苦盡除身輕目明遂去莫知何在也道學傳曰燕濟字仲微漢明帝時人也少好道德不仕周遊名山後居武當山寢息無常所或因積石或􅀝大樹四時衣服不變恒散髮亦有練巾又曰鮑靚字太玄上黨人也漢司􅀠鮑宣之後禀性清慧學通經史修身養性蠕而允切動不犯聞人之惡如犯家諱人多從受業楊道化物號曰儒林又曰王嘉字子年隴西人也在東陽谷口鑿岸穴居其徒數百各自穴處爲人皃短陋而聦察滑稽有問世事善惡終不直說過率有驗又曰嚴遵守君平蜀郡人也修道自保與人子言孝與人臣言忠與人弟言順各因其發導之以善又曰王逺字方平常降蔡經家湏􅁷麻姑至􅀐從半於方平麻姑手􅀲如鳥經私心曰時背癢得搔之佳也方平曰姑神人汝何遽此遂鞭之經願從方平學道方平使背立從後觀之曰心邪不可教之仙道乃與度世術又曰􅁃承仙字崇光頴川人明老㽵隱文江縣白水臺立廬舎講肆儒士釋老受其學隱居江南累詔不出後來始興講道德經剖析凝滯又曰薛玉寳字延世沛國人也梁時師玄圃先生以文章見美善書翰甞書一章於崇靈觀道正省壁上見者翫之也又曰東鄕宗超字􅇣倫髙密黔陬人也甞露壇行道奩中香盡自然滿溢又爐中無火而烟氣自生氤氲周遍乆之不歇又曰張􅁉天師十二世孫起招眞觀植名果盡山栖之趣梁簡文爲製碑又曰晉陵人錢妙眞於茅山鷰口洞得道門人立碑於茅山邵陵王爲觀序今具存焉又曰梁武帝天􅁥二年置大小道正平昌孟景翼字道輔時爲大正屢爲國講說四年建安王偉於座問曰道家經教科禁甚重老子二篇盟誓乃授豈先聖之旨非凢所􅀃耶景翼曰崇祕嚴科正宗妙化理在相成事非乖越又曰劉法先彭城人也時頋歡著道經義於孔德璋多有與奪法先與書討論同異頋道屈服乃荅曰吾自古之遺狂水火不避得足下此箴始覺醒悟旣徃狂言不足在恠又云法先毎見道釋二衆亟相是非乃著息争之論頋歡又作夷夏辯或及三科論明釋老同異又曰張詵呉郡嘉興人也善玄言屢講老子修行上道討論上經人自逺來集也詵尋求眞祕甚識宗尚又曰陳景尚呉人也善講誦道釋中皆不可及制靈書經大行於世梁邵陵王甚重之召景尚隨王之郢終於江夏又曰桓闓字音舒東海丹徒人也梁􅀄崑崙山渚平沙中有三古􅃮笥内有黄素冩于君所出太平經三部村人驚異於經所起静供養先呈陶隱居隱居云此真干君古夲闓將經至都便苦勞瘧諸治不愈陶隱居聞云此病非餘􅂲取經爲咎何不送經還本即依二日送尋愈又曰曹寳字世珎丹陽人善爲歩虚兩京冠絶貴遊見者皆稱賞焉又曰嚴智明字惠識晉陵人也受性有善聲㓜工誦詠聲明帝有疾每引法衆於内殿行道聞智明詠經甚懷賞恱云疾爲之愈及法席旣解智明還外帝中夜不安寢勑呼智明對御轉誦即覺歡又曰徐師子字德威東海人也陳武帝立宗靈大觀引德威爲觀主後卒文皇勑賫祕器葬焉太平經日嚴􅀉之字静處丹陽句容人也爲道士事親至孝住石渚觀母老不敢逺離乃迎母於觀邊立小屋以盡温清母終毀瘠過禮識者嘉之又曰郗愔字方回髙平金郷人爲晉鎭軍將軍心尚道法密自遵行善􅈻書與右軍相埒手自起冩道經將盈百卷于今多有在者又曰張孝秀以王元䂓筆跡妙巧頻相請屈元䂓但翫泉石終日撫琴嘯詠了不執筆臨還止爲行書數行而巳孝秀雅相推憚弗敢固祈今簡寂館長牓猶有筆迹也又曰許思􅀇者許逺遊之弟也生而好道儒雅知名晉簡文帝爲俗外之交也又曰任敦尚愽昌人永嘉中投茅山講道集衆敦􅀼歎曰衆人雖云慕善皆外好耳未見眞心可與斷金者又曰晉陸納爲尚書令時年四十病瘡告杜恭云弈世短壽臨終皆患此瘡恭爲奏章又與雲飛散謂納曰君命至七十果如其言王右軍病請恭恭謂弟子曰右軍病不􅏔何用吾十餘日果卒又曰蔣負芻義興人也與晉陵薛彪之爲俗外之交去來茅山有志栖託齊永明中暫下都陶隱居一遇便盡素契陶後解􅌧結宇中茅中茅山也仍請􅀒芻度嶺相就經典藥術常共論之又曰楊超字超逺東海人也出入事陶隱居徃復與陶論難得爲入室又曰諸慧開字智逺吳興烏程人也每以戒行自修拯濟爲務齊大明八年天下飢饉慧開有少􅂖實乃悉分賑郷邑頼之有三人積飢食飽而致死其家訴縣稱慧開飼殺餓人苦相誣謗邑令􅀏曰乞食飽死反怨主人法無此科遣而不問又曰濮陽者不知何許人事道專心祈請皆驗鄭鮷音帝女足跛陽療之尋差晉簡文廢世子無嗣時使人祈請於陽於是中夜有黄氣起自西南遥墮室􅈛時李皇后懷孝武又曰許邁字叔􅀇少名映後改名逺遊志求仙道入臨安西山經月不返人亦不知其所之先娶散􅀐常侍呉郡孫宏女爲妻邁居臨安山中爲書謝遣其妻云欲聞懸雷之響山鳥之鳴自爲簫韶九成不勝能也偶景青葱之下栖息巖岫之室以爲殿堂廣厦不能過也情願所終志絶於此吾其去矣長離別矣又曰禇伯玉字元璩呉郡錢瑭人早慕冲虚年十八父爲娶婦入前門伯玉後門出徃剡居瀑布山性耐寒暑在山三十餘年隔絶人事一說云伯玉􅀄遊南岳路入閩中飛湍走險伯玉泊舟晚瀬衝颷忽起山水􅁀至激上巓崩落絕嶂徒侣以爲冰碎縁阻尋求見伯玉自􅀂以小杖撝舟渉不測之泉衆以駭伏入霍山而去􅀄隱瀑布山齊髙祖欽其風欲與相見辭以疾而去帝追恨詔瀑布山下立太平觀孔稚圭立碑又曰張陵􅀶學及河洛天文悉窮其妙静處衡門不求聞逹彈琴詠詩順志而巳又曰龍威丈人山中得道者也時人莫知其名號曰山隱居慠然不群髙絶人世又曰陶􅒮景字道明魏郡平陽人也自號華陽隱居常謂人曰我心􅁪如懸鏡觸物不遺好行隂德拯濟困窮合施諸藥逺近賴之平生末甞晝眠看書必至半夜好聞松風傳之郷人隱銅爲設酒旣去酒在器中不耗道士舒道雲病瘧比年猛授以三皇詩使諷之頓愈甞還豫章以白羽畫江而渡縣東有石笥歴代未甞開猛徃發之多得簡牒古字不可識縣南有峻石時立千仞猨狖不能上猛仗䇿登之縣令新蔡千慶好畋獵猛屢諌不聽後慶大獵四面引火烘天而猛坐草中自􅀂鳥獸依附左右火不能及慶大駭因是悔王敦於坐収猛俄失之敦大怒是歳敦敗猛登廬山見一􅅱坐樹下以玉柸承甘露授猛又有玉房金室見數人與猛語􅀂舊相識設玉膏終日猛又乗䥫舡於廬山頂又曰錢妙眞晉陵人也㓜而好道便欲離俗親族逼以適人泣涕固免遂居大小二茅山後徃鷰口洞手裁書并詩七章與陶隱居又曰孔靈産㑹稽山隂人也遭母憂以孝聞宴酌珎羞自此而絶饘􅂼布素志畢終身父見過毀惻然命具饌靈産勉從父命咽以成疾父以人有天性不可移遂不復逼深研道幾遍覽仙籍宋明帝於禹穴之側立懷仙觀詔使居之遷太中大夫加給事髙帝賜以鹿巾猿裘竹素之器手詔曰君有古人之風賜以林下之服登泛之日可以相存也又曰張繹字士和呉郡人也㢡勵學徒整肅法事屢講衆經理致深宻詞端華辯當時所宗梁武帝雅相欽賞時陶隱居著法檢論明釋老二教繹徃復討論甚有條理隱居嘉焉專心道法居貧守約善八體書别制雲􅂐作茅山南洞碑甚工又曰宋文同字文明呉郡人也梁簡文時文明以道家諸經莫不敷釋撰靈寳經義䟽題曰謂之通門又作大義名曰義淵學者宗頼四方延請長於著撰訥於口辭又曰王遂起太原人爲集眞觀主性少眠縱卧熟猶覺人語言論相渉即領其辭莫不歎其清寤又曰晝夜不卧日月合光太平御覽卷第六百六十六
