front:
  text: 太平御覽卷第九百九十四
  hash: sha256:b60be275812f30e080bb9173ec6c952bce88044fafa7445bc4fed298769e33bd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_994-1a}
body:
  text: 百卉部一草薜荔石蘭胡䋲覇薫楚薫楚蘅秦蘅龍􅂡狼尾燕夌荆葵蜀葵莵葵鳬茈烏韭鹿豆鹿䓗草爾雅曰卉草也草謂之華木謂之榮不榮而實者謂之秀榮而不實者謂之英尚書禹貢曰兖州厥草惟繇繇茂也徐州草木漸包漸進也包叢生也楊州厥草惟夭少長曰夫並出書注毛詩緇衣野有蔓草曰野有蔓草零露漙兮蔓延也􅄎漙然盛多也毛詩問荅曰國多兵役男女怨曠於是女感傷而思男故出遊於洧之外託采芬香之草而爲媱妷之行時草始生而云蔓者女情急欲以促時也周禮秋官下薙氏曰薙氏掌殺草春始生而萌之夏日至而夷之秋縄而芟之冬日至而耜之鄭玄日含實曰䋲也大戴禮曰孟春氷冸百草權輿禮記月令曰孟夏之月靡草死鄭玄曰舊􅀃靡草薺葶􅏣之屬季夏之月大雨時行燒薙行水利以殺草薙迫地芟草也薙草乾燒之至此雨水蓄水其中則草死不生也又曰霜降之日草木黄落又曰檀弓上曰曽子曰朋友之墓有􅀫草而不哭焉左傳襄公曰松􅁊之下其草不殖又僖公曰一薫一蕕十年尚猶有􅆨蕕臰草薫香草也春秋潭潜巴曰下不廉蜚廉之草爲不生言瑞應之物應行上論語曰君子之德風小人之德草草上之風必偃漢書五行志曰元帝永光二年天雨草葉相紏結如彈九續漢書五行志曰靈帝中平元年夏東郡陳留濟陽長垣濟隂諸縣界有草生莖其大如手指狀似鳩爵龍虵鳥獸之形五色各如其物毛羽頭目足翅皆具又曰西夜國生獨白草煎以爲藥傅箭所射輙死崔鴻十六國春秋西􅁗録曰永和二年國中地震百草皆自及晉書載記曰符堅至壽春與符融登城而望王師見部陣齊整將士精銳又北望八公山上草木皆􅀋人形頋謂融曰比亦勍敵也何謂以乎憮然有懼色後周書曰宇文􅀷字奴干性鯁正有器􅈰年數歳便累石爲營伍并折草作旌旗布置行列皆有軍陣之勢父永遇見之乃大喜曰汝自然知此於後必爲名將又曰宕昌羗俗無文字伹候草榮落以記歳時吕氏春秋曰草有華有藟獨食之則殺人合而食之則益壽淮􅀯子曰神農始甞百草一日七十毒又曰逮至衰世草木之勾萌衘華佩實而死者不可勝數符子曰隣人謂展禽曰魯聘夫子夫子三黜無憂色何禽曰春風皷百草敷蔚吾不知其茂秋霜降百草零落吾不知其枯人物志曰草之將精者爲英獸之將群者爲雄張良是英韓信是雄也水經曰魏興錫義山山髙谷􅀷多生薇蘅草其草有風不偃無風獨揺又曰建寜郡山生牧靡可以解毒百卉方盛鳥多悮食烏喙口中毒必急飛徃牧靡山喙牧靡以解毒也金樓子曰魯城北孔子塋中不生㓨人草木崔豹古今注曰牛亨問曰草木生􅀋也有識乎荅曰物有生而有識者有不生而無識者有不生而有識者有不生而而有識者不生無識者夫生而有識者蟲􅀋是也生而無識者草木是也不生而有識者􅀑神是也不生而無識者水土是也又曰天雨草狀如莎絞如丸無數皆名曰蓮蔞草郭子横洞􅁳記曰東方朔曰臣有􅁻雲草十頃種於九景山東二千歳一花此草難種東取璋琅山表之澗以灑之臣種來一千九百九十九年矣明年應生臣走徃刈収之以秣馬馬食不覺飢帝許之朔平旦去至暮而返背􅀒數束其形葉似夌而金色裁長二尺剉以飼馬即不覺飢武帝曰種之生否朔曰臣東遊過􅁻雲之澤多生此草移於九景之山大不如􅁻雲之地又曰甜溪水如􅁡東方朔遊此水還將數斛以獻帝帝投隂井井裏遂􅁪甜而寒洗􅁏肌理柔滑瑶琨去玉門九萬里有碧草如夌剉之以釀則味如酒而釅烈看之則顔色如醉飲一合則三旬不醒飲甜水則隨飲隨醒也異苑曰青州劉㦎音􅀗元嘉􅀄射得一麞割五藏以草塞之䠞然起走㦎恠而拔塞便復還倒如此三焉㦎􅁡録此種以來其治傷痍多愈三齊略記曰不其城東有鄭玄教授山山下生草如薤葉長尺餘堅紉異常土人名作康成書帶括地圖曰君子民帶劒使兩文虎衣野絲土方千里多薫華之草好讓故爲君子國薫華草朝生夕死大極山西有采華之草服之乃通萬里之言服䖍通俗曰草盛曰菶脯朦切生茂曰葆音保方言曰凡草生而􅀄逹謂之䓲䓲音恱小也荄杜根也東齊曰杜或曰苃􅀶物志曰太原晉陽已北生屏風草又曰黄帝問天老曰天地所生豈有食之令人不死者乎天老曰太陽之草名曰黄精餌而食之可以長生太隂之草名曰鉤吻入口立死人信鉤吻之殺人不信黄精之益壽不亦惑乎又曰海上有草焉名曰蒒音師草其實食之如大夌從七月稔熟民歛穫名曰自然􅂖或曰禹餘粮又曰􅀋草也其根名爲弱頭大者大如升其外理白可以􅁅汁煑則凝成熟可以苦酒淹食之不以􅁅煑則不成熟蜀人珎貴之異物志曰文草作酒能成其味以金買草不言其貴以羙用之故也王逸子曰草有玄巨暢威憙木有扶桑梧桐松栢皆受氣淳羙異於群􅀋者也風俗通曰靈帝光和七年陳留濟隂諸郡路邊草生作人狀操持矛弩牛馬萬狀備具後關東誅董卓陳留濟隂弃好即戎吏民殱殘草妖之興豈不或信抱朴子曰草有黄精一名白及有鴟頭鵝尾鷄膓烏喙而非有翼之鳥也靈書記曰霍山上有神草三十四種典術曰壽榮草出少室金山丘下服之令人不老取葉服之可通百神又曰餌玉長生草一名通天價直千萬隂乾方寸七日再服之令人得仙師曠占曰黄帝問師曠曰吾欲知歳苦樂善惡可知不對曰歳欲豐甘草先生甘草薺也歳欲儉苦草先生苦草者葶􅏣也歳欲惡惡草先生惡草者水藻也歳欲旱旱草先生旱草者蒺䔧也歳欲潦潦草先生潦草者蓬也淮南萬畢術曰廻風之草見八方取廻風草三寸三枚五寸五枚以城西靣士三家不汲井中青泥南鷄欲上栖不上者并治合爲丸磨其靣目出户視八方矣楚辭曰春草生兮萋萋王孫逰兮不歸古詩曰廻車駕言邁悠悠涉長道四顧何芒芒東風搖百草又曰新樹蘭蕙葩􅄂用杜衡草終朝採草榮日暮不盈抱採之欲遺誰所思在逺道又曰穆穆清風止吹我羅裳􅅂青􅂁似春草長條從風舒又曰青青陵中草傾葉晞朝日陽春􅀍惠澤枝葉可􅄃結草木爲恩感况人含氣血薜荔山海經曰小華之山有草焉曰薜荔狀如烏韮縁木而生或生石上食之以已心痛楚辭曰罔薜茘兮爲帷罔結也結辟茘爲帷帳也擗惠櫋音眠兮旣張檘所也以折蕙覆櫋屋上也又曰採薜茘兮水中搴芙蓉兮木末又曰􅀂有人兮山之阿􅀍薜荔兮帶女蘿石蘭楚辭曰䟽中石蘭兮以爲芳王逸曰石蘭香草䟽布也胡䋲楚辭曰索胡縄之纚纚胡䋲香草也覇薫范子計然曰覇薫出覇陵也楚薫范子計然曰楚薫出洛陽也楚蘅范子計然曰楚蘅出楚國也􅁗蘅宋玉風賦曰夫風翶翔激水之上擊芙蓉之精獵蕙草離􅁗蘅龍􅂡山海經曰賈超之山草多龍􅂡廣志曰龍􅂡一名西王母簮水經曰自洮強南北三百里中地草並是龍􅂡而無樵柴周景式廬山記曰石門峯石間多龍􅂡草遊名山志曰龍􅂡草唯東陽永嘉有永嘉有縉雲堂意者謂鼎湖攀龍􅂡時有墜落化而爲草故有龍􅂡之稱鄭緝之東陽記曰仙姥巖間不生蔓草盡出龍􅂡夲草經曰西超山多龍循龍􅂡也一名續断狼尾爾雅曰孟狼尾也郭璞注曰似茅今人亦以覆屋廣志曰狼尾子可作􅁰燕夌爾雅曰籥雀夌郭璞曰即燕夌古歌曰田中莵絲何甞可絡道邊燕夌何常可穫荆葵爾雅曰荍音比婢支翹䖝切衃房左切也郭璞曰今荆葵也似葵紫色謝氏云小草多華少葉葉又翹起毛詩宛丘東門之枌曰視􅈛如荍詩義䟽曰荍一名楚葵崔豹古今注曰荆葵一名茙葵一名芘芣花色奪目有紅有白有赤但花異葉不殊也蜀葵爾雅曰菺音堅戎葵也郭璞曰今蜀葵花似木槿傅玄蜀葵賦序曰蜀葵其苗如􅀲瓠甞種之一名引苗而生華經二年春乃發虞繁蜀葵賦曰惟兹珎草懷芬吐榮挺河渭之膏壤吸􅄧井之玄精繞銅爵而䟽植映昆明而羅生莵葵爾雅曰莃虚機切莵葵郭璞曰頗似葵而葉小狀如藜有毛汋啖之滑廣志曰莵葵爚之可食鳬茈爾雅曰芍都了切鳬茈也生下田苗似龍􅂡而細根如指頭黒色可食東觀漢記曰王莽末南方枯旱民多餓群入野澤掘鳬茈而食之烏韮廣雅曰昔耶烏韮也生乆屋之瓦在房曰昔耶在牆曰垣衣鹿豆爾雅曰蔨音卷切鹿藿也其實莥郭璞曰今鹿豆也葉似大豆根黄而香蔓延生莥音紐也􅀃文曰莥鹿藿之實也夲草經曰鹿藿味苦平無毒主治蠱毒女子􅆎腹痛不樂膓癰瘰􅊓瘍氣生汶山山谷鹿䓗花曰冝男風土記曰冝男草也冝懷娠婦人佩之必生男傅玄冝男花賦曰猗猗令草生于中方華曰冝男號膺禎祥嵇含冝男花序曰冝男花者丗有之乆矣多殖幽臯曲隰之側或華林玄圃非衡門蓬宇所冝序也荆楚之土號曰鹿䓗根苗可以薦於俎丗人多女欲求男者取此草服之尤良也太平御覽卷第九百九十四
