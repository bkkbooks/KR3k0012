  text: 太平御覽卷第一百二十三
  hash: sha256:5ed40860a4c2ce045455581c676a273fb79794eccdbc1ab73412e449610dd3ee
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_123-1a}
body:
  text: 偏霸部七後秦姚弋仲姚襄姚萇姚興姚泓蜀李特李流李雄李期李壽李勢後秦姚弋仲崔鴻十六國春秋後秦録曰姚弋仲南安赤亭羗人也其先有虞氏之苗裔昔夏禹封舜少子于西戎丗爲羗長其後燒當雄於洮罕之間當七孫塡虞虞九丗孫遷郍率種人内附漢朝嘉之假西羗校尉㱕順王處之赤亭郍􅀇孫柯迥魏假綏戎校尉西羗都督迥生弋仲少而聦猛英果雄毅永嘉之亂戎夏隨之數萬自稱雍州刺史護羗校尉扶風公劉曜以弋仲爲平西將軍石虎廢石弘自立仲稱疾不賀虎累召之乃赴太寜元年拜侍中征西大將軍石祗稱尊號於襄國以仲爲右丞相石祗爲劉顯所殺仲乃與燕連和仲有子四十二人誡諸子曰我死之後汝㱕晉家竭盡臣節乃使使降晉晉永和七年拜仲使持節六夷大都督江北諸軍事儀同三司大單于封髙陵郡公八年薨七十三後仲屍柩爲符生所得生以王禮葬之於天水萇稱尊號追謚景元皇帝廟號始祖陵曰髙陵姚襄崔鴻十六國春秋後秦録曰姚襄字景國仲第五子雄武多才藝能明察善撫納士民愛敬之咸請爲嗣仲以襄非長不許石祗僭號以襄爲使持節驃􅀐將軍護烏丸校尉晉遣使拜襄持節平北將軍并州刺史即丘縣公弋仲薨率戸六萬南至滎陽晉處襄于譙城遣弟爲任單􅀐渡淮見豫州刺史謝尚一靣交􅅃便􅀂平生楊州刺史殷浩憚其威名遣謝萬討襄逆擊破之鼔行濟淮屯于盱眙上音吁下音怡朝廷大震襄方軌引北自稱大將軍大單于據許昌自許遂攻洛陽踰月不尅晉征西大將軍􅁊温自江陵伐襄温至伊水襄徹圍拒之爲温所敗襄奔還洛陽率數千􅀐奔于北山百姓隨襄者四千餘戸襄㝷從北山將圖関中進屯杏城遣輔國將軍姚蘭略地鄜城符生遣符飛拒戰襄率衆西引與符堅戰于三原爲堅所殺時年二十七萇稱尊追謚魏武王姚萇崔鴻十六國春秋後秦録曰姚萇字景茂仲之第二十四子少聦哲多權略不脩行業兄襄爲符堅所煞萇率諸弟降秦符堅以爲􅀭武將軍歩兵校尉潞川之戰有殊功遷左衛將軍累授幽州刺史符堅伐晉以萇爲龍驤將軍督益梁二州諸軍事謂曰朕本以龍􅋮建業龍驤之號未曾假人特以相授山南之事一以委焉左將軍竇衛進曰王者無戲言此不祥之徴也堅黙然白雀元年慕容泓起兵堅遣子叡討之以萇爲叡司馬旣而爲泓所敗叡死萇遣參軍姜協討罪堅怒殺之萇懼奔于渭北㱕者五萬餘家咸推萇爲盟主自稱大將軍大單于萬年秦王大赦改元稱制行事二年六月慕容冲入長安司􅀠崔翼尚書趙遷等數百人來奔萇聞符堅在五將山遣驍􅀐呉忠率􅀐圍之萇自故縣如新平呉忠執堅送之萇將求禪代堅不許慕容冲遣車􅀐大將軍尚書令髙蓋來戰于新平大破之蓋率麾下數千人來降建初元年僣即皇帝位于長安大赦改年國號大秦改長安爲常安追尊考仲景元皇帝妣曰德皇后子興爲皇太子秋七月萇如安定二年徙秦州三萬户于安定七月以太子興鎭長安四年十月立社稷于長安六年大敗符登于長安七年三月萇寢疾遣鎭東姚碩德守長安召太子興詣行在所八年十月萇如長安至于新支堡疾篤輿疾而進十二月至長安召太尉姚旻僕射尹緯等受遺詔輔政萇曰吾氣力轉微將不能復臨天下卿等善相吾子謂興曰有毀此諸人者愼勿受之汝撫骨肉以仁接大臣以禮待物以信遇民以恩四者旣備吾無恨矣庚子薨于永安宮年六十四謚武昭皇帝葬元陵廟號太祖姚興崔鴻十六國春秋後秦録曰姚興字子略萇之太子萇薨祕不發喪皇初元年乃發喪行服即位于槐里大赦改元七月如涇陽與符登徙改宻三萬户於長安二年以叔父緒爲晉王征西將軍碩德爲隴西王弟崇爲齊公􅂋爲常山公三年以緒爲并兾二州牧鎭蒲坂四年二月遣齊公崇伐洛陽弘始元年九月大赦改元冬十月尅洛陽以東平公紹爲都督山東諸軍事豫州牧鎭洛陽四年五月遣大將軍隴西王碩德率歩􅀐六萬伐吕隆於涼州先是吐蕃傉內沃切擅據西平沮渠蒙遜據張掖李暠據燉音屯煌各制方域共相侵伐碩德從金城濟河直趣廣武逕蒼松至隆城下隆遣弟輔國超龍驤邈等率衆拒碩德碩德大破之生擒邈傉擅蒙遜李暠等各脩表奉獻九月隆奉表請降興荅報嘉美以隆爲鎭西將軍凉州刺史建康公十一月鳩摩羅什至長安七年正月興如逍遥園引諸沙門聽什說佛經九年以太子泓録尚書事燕王慕容超遣使稱蕃十年與魏通和貢馬千疋十一年蜀譙縱遣使稱蕃十六年五月興疾于内寢太子泓以兵屯東華門侍疾于諮議堂尚書令廣平公弼如弼也潜謀爲亂招集數千人持兵於第興疾損升前殿百官咸㑹征虜劉羗泣曰陛下寢疾數旬柰何忽有斯第興曰朕過庭無訓諸子交惡含恥胡顔愧于四海興以弼文武兼才未忍致法免其尚書令以公就第十七年十二月興疾重廣平公弼告病不朝集兵於第興怒乃収弼囚之十二月興疾甚遣収廣平公弼第甲仗還武庫於是弼黨率甲仗攻端門殿中上將軍斂曼髙一作嵬勒兵拒戰不得入遂燒端門興力疾臨前殿賜弼死丁未薨於前殿年五十三謚文桓皇帝廟號髙祖墓曰偶陵姚泓崔鴻十六國春秋後秦録曰姚泓字元子興之太子興薨即位大赦改爲永和元年廬于諮議堂訖葬乃親庶政晉相劉􅁉來伐遣冠軍檀道濟龍驤王鎭惡入自淮肥二年七月劉􅁉次于陜城泓次于灞上􅁉至潼􅀜泓自㶚上還軍次于石橋􅁉進據鄭城泓遣姚􅁉屯兵宫中將軍姚丕守渭橋泓軍于逍遥園丕爲晉所敗泓自赴之因丕之敗遂相踐而退泓與河間公􅁉等數百􅀐岀奔于石橋大將軍東平公讃聞泓之敗率諸軍赴難㑹泓于石橋晉人巳固青門一云諸門諸軍不得入衆皆驚散泓與河間公􅁉等詣􅁉請降泓于彭城公伏念年十二謂泓曰陛下今雖降晉劉􅁉待人無禮終必不全願自裁決􅇦憮音武又音姥失意也然不荅念遂登宮牆自投而死平原公璞井州刺史尹昭以蒲坂降晉東平公讃率宗室子弟百餘人降于􅁉􅁉盡殺之九月􅁉至長安送泓于建康市戮之時年三十建康百里之内草木燋死自姚萇白雀元年歳在甲申至于是歳歳在丙辰三十有三歳蜀李特崔鴻十六國春秋蜀録曰李特字􅀇休巴西宕渠人其先廪君之苗裔秦併天下以爲黔中郡薄賦其人口歳出錢四十巴人謂賦爲賨藏宗切遂因名焉及髙祖爲漢王始募賨民平定三秦旣而不願出􅀜求還郷里髙祖以其功復同豐沛更名其地爲巴郡土有鹽􅃮之利民用殷阜俗性剽勇又善歌舞髙祖愛其舞詔樂府習之今巴渝舞是也其後繁昌分爲數十姓及魏武尅漢中特祖父虎歸魏魏武嘉之遷略一云洛陽陽拜虎等爲將軍内徙者亦萬餘家散居隴右諸郡及三輔泓農所在號爲巴人虎子慕爲東羗獵將慕凡有五子輔特庠流驤特身長八尺雄武善􅀐射沉毅有大度元康中氏齊萬年擾亂天水略陽扶風始平諸郡皆􅀍兵㓂民頻歳大飢流移就榖相與入漢川者數萬家特至劒閣顧盻嶮阻曰劉揮有如此地而靣縛於人豈非庸才耶同移者閻彧音郁等咸歎異之初流民旣至漢中上書求􅀉食巴蜀朝廷從之由是散在梁益不可禁止元康九年詔徴益州刺史趙廞音歆爲大長秋以成都内史耿勝代廞廞遂謀叛有劉氏割據之志勝率衆入州廞遣衆逆之戰于西門勝敗走廞獲煞之廞自稱大將軍益州牧時李庠與兄弟及李合任回等以四千􅀐歸廞廞以庠爲威宼將軍使斷北道庠素東羗良將曉兵陣軍部肅然廞惡其齊整煞之復以特爲督將特兄弟旣怨廞引兵歸綿竹廞恐朝廷討已遣長史費逺犍音䖍爲太守李苾蒲結切督萬餘人斷北道次綿竹之石亭特宻収合得七千餘人夜襲逺軍逺軍大潰因放火燒之死者十八九進攻成都廞聞兵至驚懼不知所爲李苾等夜斬􅀜走出文武盡散廞獨與妻子乗小􅂳走至廣都爲其下人朱笁所煞先是梁州刺史羅尚聞廞叛上表稱廞非雄才又蜀人不願爲亂事終無成願欲征之惠帝遣尚平西將軍益州刺史率七千餘人入蜀特等聞尚來甚懼使弟驤於道奉迎并貢寳物尚甚恱冬十月六郡流人推特行鎭北將軍承制封拜其弟流行鎭東將軍弟驤驍􅀐將軍少子雄爲前將軍以相統領進兵攻尚於成都頻爲特所敗乃阻長圍縁水作營自都安至犍爲七百里與特相距大安二年都下推特爲大將軍大赦改元爲建初元年益州從事任明􅀃尚曰特旣兇逆侵􅁀百姓又分人散衆在諸村堡驕怠無備是天亡之時也可告諸村宻尅期日内外擊之破之必矣尚從之遣大衆奄襲特營尚出逆戰到官桑特軍敗績死之雄稱成都王追謚景王及稱尊號追尊曰景皇帝廟號始祖李流崔鴻十六國春秋蜀録曰李流字􅀇通特第四子也少好學便弓馬東羗校尉何攀稱流有賁音奔育之勇舉爲東羗校尉平趙廞於成都晉朝論功拜奮威將軍封武陽侯建初元年特旣見殺流自稱大將軍益州牧九月流疾篤謂諸將曰驍􅀐李驤日髙明仁愛識量多竒固足以濟大事然前軍李雄也英武殆天所相可共受事於前軍以爲成都王也遂薨年五十六諸將共立雄爲主雄稱尊號追謚流秦文王子龍嗣李雄崔鴻十六國春秋蜀録曰李雄字仲儁特第三子母羅氏夢􅀟虹自門昇天一虹中斷旣而生蕩後羅氏汲水忽然而寐夢大虹繞其身遂有孕十四月而生雄常言二子􅀂有先亡在者必大貴蕩以李流丗卒雄長八尺三寸美容貌相工相之曰此君將貴其相有四目如重雲鼻如􅀛龍口方如器耳如相望法爲貴人位過三公不疑雄少以烈氣聞識者皆器重之特稱益州牧以雄鎭梓潼又拜前將軍流薨雄稱大將軍益州牧治郫音友城以西山范長生巖居穴處求遵養之志雄欲迎爲君長生固辭曰推歩太元五行大㑹甲子祚鍾於李非吾節也建興元年十月雄即成都王位於南郊大赦改元約法七章以叔父驤爲太傅兄虎威爲太保晏平元年三月范長生乗素與詣城雄迎于大門執版延坐長生請雄對坐即拜丞相尊曰范賢長生勸雄稱尊號夏六月僭即帝位大赦改年國號大成追尊父特爲景帝母羅氏爲太皇后十月加丞相范長生天地太師之號封西山侯玉衡五年正月立妻任氏爲皇后八年四月范長生卒以其子侍中賁爲丞相長生善天文有術數民奉之如神十四年立兄子班爲太子二十四年五月雄寢疾六月丁卯薨年六十一謚武皇帝廟號太宗十月葬安都陵太子班襲位李期崔鴻十六國春秋蜀録曰李期字丗運雄第四子聦惠好學弱冠能屬文雄薨班即位雄子車􅀐將軍越自江陽奔䘮以期與班非雄所生而嗣位心不平十月因夜哭臨越煞班於殯宫班字丗文雄兄蕩第四子雄事任氏無子養班爲子越旣煞班於是矯太后令罪狀謚戾太子立期爲主甲子期􅆫即皇帝位玉􅁪元年正月大赦改年立妻閻氏爲后四月大將軍漢王壽率歩􅀐一萬自涪音浮向成都期不虞至預不設備至即尅城屯兵宫門殺相國建寕王越尚書令景騫尚書田衮等廢期爲卭都公幽之别宮期自殺年二十五謚曰幽公李壽崔鴻十六國春秋蜀録曰李壽字武考特季弟驤之子少尚禮容敏而好學雄竒其才秀以爲足荷重任封爲建寕王旣而期立改封漢王領梁州刺史治涪城壽見期兄弟十餘人竝有強兵懼不自全隂謀據成都稱藩於晉乃誓文武得數千人襲成都尅之放兵虜掠數日乃定於是僣即皇帝位於南郊大赦改咸康四年爲漢興元年追尊父驤獻皇帝三年六月壽下書曰呉㑹遺燼乆逋天誅今將太興百萬躬行天罰九月大閱軍士七萬餘人舟師泝江而上過成都鼔譟盈江壽登城觀之羣臣以國小衆寡江呉險逺圖之未易叩頭泣諌乃止兵人咸呼萬歳十月醼禮於太學舉明經者封好學侯四年以太子勢領大將軍録尚書事六年分寕州興古永昌雲南朱捉越嶲音䯝河陽六郡爲漢州四月壽寢疾常見李期爲崇八月薨年四十謚昭文皇帝廟號中宗葬安昌陵李勢崔鴻十六國春秋蜀録曰李勢字子仁壽之長子身長七尺九寸􅆎帶十四圍善於俯仰時人異之壽旣薨僣即帝位大赦改太和元年正月尊母閻氏爲皇太后妻李氏爲皇后嘉寕二年晉遣安西將軍荆州刺史桓温來伐勢大發軍禦之鎭東李位都逆往降温逹成都之十里陌勢衆自潰三月温至城下縱火燒其大城諸門勢衆惶懼無復固志勢乃夜開東門走九百里至晉壽然後送降文於温勢㝷與櫬靣縛軍門温解縛焚櫬送勢及叔父福戴記云及弟福等十餘人於建康晉封爲歸義侯升平五年卒常璩字道將蜀成都人少好學著華陽國志十篇序開闢以來迄于李勢皆有條理云宕渠古賨國今有賨城秦始皇時有長人長五丈見宕渠秦史胡母敬曰五百年外其地必有異人爲大人者及雄之稱尊號祖先出自宕渠有識者皆以爲應之譙周云我死後三十年當有異人入蜀又著䜟云廣漢城北有大賊曰流曰特攻難得歳在玄宮自相尅又惠帝之丗蜀童謠曰江橋頭闕下市成都北門十八字至是而應焉李特以晉永寧元年歳在辛酉起兵至勢嘉寧二年晉永和三年歳在壬戌而降晉合四十七年太平御覽卷第一百二十三
