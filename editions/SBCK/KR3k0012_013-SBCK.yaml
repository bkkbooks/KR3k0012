front:
  text: 太平御覽卷第十三
  hash: sha256:6b496fd0e7d503dcbd6917fc260d13ea6ca96ae95088d80c9b9cef706624d38d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_013-1a}
body:
  text: 天部十三雷霹靂電雷釋名曰雷者如轉物有所硠音郎雷之聲也􅀃文曰霆雷餘聲鈴鈴所以挺出萬物易曰雷電皆至豐君子以折獄致刑又曰震爲雷又曰動萬物者莫疾乎雷又曰鼓之以雷霆又曰洊慈見反雷震君子以恐懼脩省又曰震來􅊒􅊒許逆反又曰雷出地􅁬豫先王以作樂崇德又曰雷電噬嗑先王以明罰勑法又曰雲雷屯君子以經綸又曰雷在地中復先王以至日閉􅀜啇旅不行后不省方又曰天地解而雷􅀨作雷􅀨作而百果草木皆甲坼又曰震驚百里驚逺而懼邇也又曰雷以動之又曰雷􅀨之動滿盈又曰雷風不相悖又曰雷風相薄又曰澤中有雷隨書曰納于大麓烈風雷􅀨弗迷詩曰殷其雷在南山之陽又曰虺虺其雷禮曰仲春日夜分雷乃發聲先雷三日􅁬木鐸以令兆民曰雷將發聲有不戒其容止者生子不備必有凶災主戒婦人有娠者止猶動静又曰君子􅀂有疾風迅雷甚􅀨則必變雖夜必興衣服冠而坐謂敬天之怒又曰秋分之日雷乃収聲傳曰藏氷以時則雷出不震棄氷不用則雷不發而震榖梁傳曰隂陽相薄感而爲雷激而爲霆爾雅曰疾雷爲霆郭璞注曰疾雷謂雷音急激者論語曰迅雷風烈必變京房易傳曰當雷不雷陽德弱也又曰五星占雷電殺人何雷天拒難折衝之臣也君承用節度即雷以節􅁀人威福則雷電殺人易妖占曰天冬雷地必震教令撓則冬雷民飢書洪範曰雷於天地爲長子以其首長萬物與其出入也雷出地百八十三日而復入入則萬物入入地百八十三日而復出出則萬物亦出此其常經也又曰􅁗二世元年天無雲而雷雷陽也雲隂也有雲然後有雷象君臣也故雲雷相託隂陽之合也今二世不恤人人臣叛之故無雲而雷也又曰凡大風雷􅀨爲不敬也又曰春後十日雷乃發聲又曰正月雷微動而雉雊又曰夫雷人君象也入能除害出能興利尚書中候曰秦穆公出狩天震大雷下有火化爲白雀衘丹書集公車大戴禮夏小正曰雷震雉鳴雊鼓其翼也正月必雷雷不必聞唯雉必聞之春秋元命包曰隂陽合爲雷春秋合誠圖曰軒轅星主雷􅀨之神論語䜟曰雷震百里聲相附宋均注云雷動百里故因以制國也雷聲謂諸侯之政教所至相附也史記曰髙祖母劉媪常息大澤之陂夢與神遇是時雷電晦􅁳太公徃視見蛟龍於其上巳而有娠遂孕髙祖漢書曰迅雷妖風恠雲變氣此皆隂陽之精夲在地而上發於天續漢書曰桓帝建和三年六月乙卯雷震憲陵寢屋是時梁太后聽兄兾誅李固杜喬晉書曰晉人王襃母生時畏雷襃至母終後天雷輙還遶墓曰襃在此褒在此齊書曰永明八年六月十日晡時雷有黃光照地􅃺如金色占曰人君有德或謂之榮光周斐汝南先賢傳曰蔡順母平生畏雷自亡後毎有雷震順輒環塚泣曰順在此韓詩外傳曰東海之上有勇士曰菑丘訢音忻以勇㳺於天下過神淵飲馬沉訢去朝服拔劒而入三日三夜殺二蛟一龍而出雷神隨而擊之十日十夜眇其左目王歆孝子傳曰笁彌字道綸父生時畏雷毎至天隂輒馳至墓伏墳哭有白兎在其左右搜神記曰義興人周永和出行因日暮路旁小屋中有女子留􅀫一更後有喚阿香女應諾官喚汝推雷車女遂辭周云有官事須去俄而大雷旣明周自異其處返㝷唯見一新􅃁􅃁只有馬跡東方朔神異記曰八方之荒有石鼓其徑千里撞之其音即雷也天以此爲喜怒之威盛􅀪之荆州記曰朝陽縣樊重母畏雷爲母立石室以避之悉以文石爲階砌至今猶存孟奥北征記曰凌雲臺南角一百歩有白石室名避雷室又曰臨賀有石方二丈石有磨刀斧迹春夏常明浄其迹甚新秋冬則苔穢故爲雷公磨石莊子曰隂陽交爭爲雷文子曰夫目察秋毫之末耳不聞雷霆之聲耳調金石之音目不見太山之形小有所志必大有所忘曽子曰隂陽之氣俱則雷淮南子曰隂陽相薄感而爲雷又曰䕃不祥之木爲雷霆所撲又曰庻女叫天雷電下擊景公臺殞支體傷折海水大出庶賤之女齊之少寡婦人也無子不嫁事姑謹敬姑無男有女女利財令母嫁婦婦終不肯女殺母以誣寡婦婦不能自明􅁈結呌天天爲作雷電下擊景公之臺殞壞之也傷毀景公支體水爲之溢又曰雷霆之聲可以鍾鼓冩也風􅀨之變可以音律和也抱朴子曰雷天之鼓也鶡冠子曰昔者有道之君取政非取於耳目也夫耳之生聦目之生明兩葉蔽目不見太山兩豆塞耳不聞雷霆孫子曰擊電無停光疾雷無餘聲河圖帝通紀曰雷天地之鼓河圖曰玉虎晨鳴雷聲也又曰黃帝以雷精超六韜曰武王伐紂􅀨甚雷疾武王之乗雷震而死周公曰天不祐周矣太公曰君秉德而受之不可如何也伏侯古今注曰成帝建始四年無雲而風天雷如擊連鼓音可四五刻隆隆如車聲山海經曰羭音榆次之山有鳬名橐􅖦服之不畏電􅖦音肥匪備三音又曰飛魚如豚赤文無羽食之辟兵不畏雷師曠占曰春雷初起其音恪恪霹靂者所謂雄雷旱氣也其鳴依依音不大霹靂者謂之雌雷水氣也又曰春分有音如雷非雷音在地中其所住者兵起其主無雲而雷名曰天狗行不出三年其國亡又曰􅀄雷從金門起上旬旱下田熟一曰􅀊中兵革起也風俗通曰雷不蓋醬俗􅀃令人腹中雷鳴丗􅀃曰曹爽將誅夢二虎衘雷公若二升椀放着庭中華陽國志曰曹公從容謂先主曰天下英雄唯使君與操爾夲初之徒不足數也先主方食失匕箸㑹雷大震先主曰聖人言迅雷風烈必變良有以也一震之威乃可致此公亦悔失言酈炎對事曰或曰雷震驚百里何以知之炎曰以其數知之夫陽動爲九其數三十六隂静爲八其數三十二一陽動二隂故曰百里雷雜兵書曰雷電霹靂破軍中樹木屋舎者徙去􅁻也雷電風所從來不可逆而相代冝愼之也物理論曰積風成雷王充論衡曰子路感雷精而生尚剛好勇親涉衛難結纓而死孔子聞而覆醢毎聞雷鳴乃中心惻怛亦復如之故後人忌焉以爲常也又曰盛夏之時雷電疾擊殺人謂之有隂過飲食不潔則天怒殺之隆隆之聲天怒之音也此虚言也道士劉春楚王英使食不潔春死必遇雷也建武四年六月夏雷擊㑹稽鄞魚巾反縣羊五頭羊有何隂過而雷擊之乎俗以爲天取龍殺人罰隂過與取吉凶不同非實道也又曰圖􅀞之工圖雷之􅃺纍纍如連鼓形又曰一人若力士之容謂之雷公使之左手引連鼓右手推之世人信之莫不謂然始復原之虚妄之象也霹靂釋名曰霹靂析也震戰也所擊輒破􅀂攻戰也􅀃文曰震霹靂振物也榖梁傳曰震雷也爾雅曰疾雷爲霆蜺郭璞曰雷之急激者爲霹靂春秋繁露曰王言下不從則金不從革而秋多霹靂霹靂者金氣其音啇故應霹靂五經通義曰震與霆皆霹靂也晉安帝紀曰義熙二年六月震太廟鴟尾徹壁柱􅀂有文字晉朝雜事曰元康七年霹靂破城南髙禖石髙禖中宫求子象也賈后將誅之應曹嘉之晉紀曰諸葛誕以氣邁稱常􅀝柱讀書霹靂震其柱誕自􅀂列女後傳曰河南李叔卿爲功曹應舉孝廉同時應人害之使婢宣言叔卿􅁋其寡妹同舉人詣尹以骨􅁏相姧不合應孝廉叔卿杜門自絶女妹傷􅀍􅁋之名遂到府門自殺叔卿亦自殺明巳無􅄽也後三年霹靂害叔卿者以其死屍置叔卿冡前其家收而葬之秋又雷發其冡􅀇中記曰玉門之西有一國國中有山山上有人􅀊􅀊出石子林反數千輸廟中名曰霹靂給霹靂用從春雷出日減至秋而盡搜神記曰扶風楊道和於田中霹靂擊之道和以鋤格折其左肱遂落地不得去色如丹目如鏡毛角長三尺狀如六畜似獮猴續搜神記曰呉興人章荀者五月中於田耕以飯籮置菰裏晚於菰中伺之見一大虵偷其食荀即以鉟歩悲反义之虵便走去荀乗船逐之至一坂有穴虵便入穴但聞號哭云人斫傷某甲或云當如何或云付雷公令霹靂殺奴須􅁷雲􅀨􅁳合震電傷荀荀於是跳梁大罵云天公我貧窮展力耕墾虵來偷食我飯罪在虵反來霹靂我是無知雷公若來今當以鉟斫汝腹破須􅁷雲雨輒開乃更霹靂向穴中諸蛇死者數十莊子曰隂陽錯行天地大駭於是有雷有霆劉義慶丗􅀃曰夏侯􅀇字太􅀄嘗􅀝柱讀書時暴􅀨霹靂破所􅀝柱衣服焦然􅀇神色無變讀書如故異苑曰佛佛虜凶虐暴忍常自言國名佛佛則是佛中之佛㝷􅀍震而死旣葬而後就冡中霹靂其柩引身出外題背四字表其凶逆之國也又曰滕放太元􅀄夏枕文石枕卧忽暴雷雨震其枕枕四解傍人莫不怖懾而放微覺有聲不足爲驚又曰元嘉十九年京口霹靂殺人赤字題臂丗􅀃曰王丞相見郭景純君可試爲作一卦卦成郭意惡云公有震厄王問可有消伏理否郭曰公能命駕西出數里得一栢樹截短如公長置寢處灾可消王悉依其語數日中果震栢樹碎門内子弟皆稱慶桓譚新論曰天下有鶴鳥郡國皆食之三輔俗獨不敢取之或雷霹靂起原夫天不獨左彼而右此殺鳥適與雷遇耳愽物志曰九眞有狸牛出谿上或闘岸上家牛皆怖或遮捕即霹靂號曰神牛山海經曰半石之山有草名曰嘉榮服之不畏霆不畏霹靂琴操曰楚髙梁子出遊九皐之澤覽漸水之臺張罛置􅅈於荆山臨曲池而漁而疾風霣于敏反雹雷電奄􅁳天火四起霹靂下臻􅀇鶴翔其前白虎吟其後乃援琴而歌歎作霹靂引正論曰里語云州縣符如霹靂得詔書但桂壁電釋名曰電殄也乍見則殄滅也􅀃文曰電隂陽激燿也從雨申聲易曰离爲電又曰雷電皆至豐君子以折獄致刑詩曰燁燁震電禮記月令曰春分之日􅀇鳥至後五日雷乃發聲後五日始電傳曰隱九年三月癸酉大雨震電易稽覽圖曰隂陽和合爲電輝輝也其光長春秋元命包曰隂陽激爲電史記天官書曰電者隂陽之動也帝王丗紀曰黄帝有熊氏母曰附寳有蟜音喬氏之女也見大電光繞北斗樞星照郊野感附寳而孕漢書李㝷傳曰㝷􅀃王根曰竊見徃者盛冬雷電潜龍爲孽晉書曰王戎㓜而頴悟神彩秀徹視日不眩裴揩目之曰戎眼爛爛如巖下電神異傳曰東王公與玉女投壷誤而不接天爲之􅀏開口流光今電是也漢武内傳曰西王母曰東方朔爲太山仙官太仙使至方丈􅂇三天司命朔但務山水遊戯擅弄雷電激波揚風風􅀨失時西京雜記曰董仲舒曰太平之世電不眴許絹反目宣示光輝而巳莊子曰隂氣伏於黄泉陽氣上通於天隂陽分爭故爲電文子曰腎爲電主鼻曽子曰隂陽交則電抱朴子曰良將如収電可見不可追立如丘山可瞻不可動淮南子曰電以爲鞭筞電擊氣也物理論曰風清熱之氣散爲電楚辭曰凌驚雷軼駭電楊雄河東賦曰􅁬電鞭驂雷輜鳴洪鍾建五旗張衡思􅀇賦曰凌驚雷之砊苦浪反􅔫苦大反􅀆弄狂電之滛裔傅􅀇詩曰童女裂電夏侯孝􅀂電賦曰攅雲間而飛火絳煙起於雲中曹毗霖􅀨詩曰紫電光牗飛迅雷終天奔頋愷之電賦曰天怒行凌雲赤光發李顒詩曰甚徒感黑反䨴徒對反重雲隂碎稜震電咤陟嫁反太平御覽卷第十三
