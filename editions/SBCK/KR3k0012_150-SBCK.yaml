front:
  text: 太平御覽卷第一百五十
  hash: sha256:74e9019a1d0d56ec62f19a8d7fe3f33145d0a12221301641bb14e19cbfd0198c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_150-1a}
body:
  text: 皇親部第十六諸王上漢書百官表曰諸侯王髙帝􅀄置金璽組綬史記曰髙帝得定陶戚􅁎愛幸生趙王如意幾代太子者數矣頼大臣爭之及留侯䇿太子得無廢髙帝崩惠帝立吕后使人持鴆飲之遂斷戚夫人手足去眼燻耳飲瘖藥使居厠中名曰人彘居數日迺召惠帝視人彘帝視而知其戚夫人迺大哭因病歳餘不能起使人請太后曰此非人所爲臣爲太后子終不能治天下又曰燕王劉澤漢書曰澤髙帝從祖昆弟髙帝十一年封爲營陵侯髙后時齊人田生以畫干營陵侯澤澤大恱之用二百斤金爲壽田生巳得金假大宅令其子求事吕太后所幸大謁者張卿居數月請張卿酒酣乃屏人􅀃張卿曰太后欲立吕産爲王恐大臣不聽今卿最幸大臣所敬何不諷大臣以聞太后太后必喜諸吕巳王萬戸侯亦卿有卿大然之乃諷大臣立吕産爲王田生因􅀃張卿曰吕産王也諸大臣未服今營陵侯澤諸劉長爲大將軍尚觖音决望今卿言太后裂十縣王之彼得王喜於諸吕益固矣張卿入言太后乃以澤爲琅瑘王又曰齊哀王襄悼惠王子髙祖孫也太尉周勃誅諸吕大臣欲立齊王瑯瑘王澤曰齊王母家駟鈞惡戾虎而冠者張晏曰言鈞惡戾如虎而着冠也方以吕氏幾亂天下又立齊王是復爲吕氏也漢書曰呉王濞髙帝兄仲之子也髙祖立濞於沛爲呉王巳拜受印髙祖召濞相之曰􅀂狀有反相因撫其背曰後五十年東南有亂豈􅀂耶天下同姓一家汝愼無反濞頓首曰不敢又曰楚元王交髙帝少弟也髙祖即帝位交與盧綰常侍上出入卧內傳語言諸內事隱謀文帝尊寵元王子爵比皇子又曰齊悼惠王肥其母髙祖微時外婦也髙祖六年立食七十餘城孝惠二年入朝帝與齊王燕飲后前置齊王上坐如家人禮太后怒遣人酌巵鴆酒置前令齊王爲壽齊王起帝亦起欲俱爲壽太后恐自起反巵齊王怪之因不敢飲陽醉而去又曰濟北王興居􅀄以東牟侯與大臣共立文帝於代邸曰誅吕氏臣無功請與太僕􅅬公入清宫遂將少帝出迎皇帝入宫始誅吕氏時朱虚侯功尤大大臣許盡以趙地王朱虚侯章盡以梁地王東牟侯興居及孝文帝立聞朱虚東牟之􅀄欲立齊王故黜其功又曰淮南王安爲人好書鼔琴不喜弋獵狗馬騁馳亦欲行隂德撫循百姓流譽招致賔客方術之士數千人作爲內書二十篇外書甚衆有中篇八卷言神仙黄白之術張晏曰黃黃金白白銀亦二十萬言時武帝方好藝文以安屬爲諸父辯􅀶善爲文辭甚重尊之毎爲報書及賜張晏曰賜賜書常召司馬相如等視草乃遣􅀄安入朝獻所作內篇新出上愛秘之使爲離騷賦旦受詔食時上又曰孝文皇后生景帝梁孝王孝王太后少子愛之賞賜不可勝道於是孝王築東􅁐方三百餘里廣睢陽城七十里大治宫室爲􅃨道自宫連屬於平臺三十餘里如淳曰在梁東北離宫所在也得賜天子旌旗從千乗萬􅀐出稱蹕入言警擬天子招延四方豪傑自山東遊士莫不至又曰梁懷王揖文帝子也文帝愛之異於他子五年壹朝因墮馬死又曰孝景栗􅁎生河間獻王德孝景二年立脩學好古從民間得善書必爲好寫與之留其夲加金帛賜以招之繇是四方道術之人不逺千里或有先祖舊書多奉以奏獻王者故得書多與漢朝等脩禮樂􅀍服儒術造次必於儒者武帝時獻王來朝獻雅樂及詔䇿問三十餘事其對推道術而言得事之中文約而指明又曰江都易王非景帝子呉楚反時非年十五有材氣上書願擊呉景帝賜非將軍印呉巳破二歳爲江都王治呉故國以軍功賜天子旌旗元光五年匈奴大入漢爲賊非上書願擊匈奴上不許又曰孝景程􅁎生魯恭王餘二年立爲淮陽王呉楚反破後徙王魯好治宫室苑囿狗馬好音樂口吃難言王􅀄治室壞孔子舊宅以廣宫室聞鍾磬琴瑟之聲遂不敢復壞於其壁中得古文經傳又曰孝景賈夫人生中山靖王勝建元三年來朝天子置酒勝聞樂聲而泣帝問其故勝對曰臣聞悲者不可爲累欷思者不可爲歎息故髙漸離擊筑易水上荆軻爲之泣而不食雍門子壹微吟孟甞君爲之於邑今臣之心結日乆毎聞窈眇之聲不知涕泣之橫集也夫衆煦漂山應劭曰煦吹煦聚蚊成雷朋黨執虎十夫橈椎臣身逺與寡莫爲之先衆口鑠金積毀銷骨聚輕折軸羽翮飛肉今臣雍閼不得􅀼自悲也臣聞杜鼷不懽屋䑕不燻何則所託者然也臣雖薄也得蒙肺腑位雖卑也得爲東藩屬又稱兄今羣臣非有葭莩之親張晏曰葭蘆葉莩裏白皮也鴻毛之重羣居黨議明友相爲使夫宗室擯却骨肉冰釋斯伯竒所以流離比干所以横分也勝又樂酒好肉有子百二十餘人常與趙王彭祖相非曰兄爲王專代吏治事王者當日聽音樂御聲色趙王亦曰中山王但奢淫不佐天子拊循百姓何以稱爲藩臣又曰景帝唐􅁎生長沙定王發唐􅁎故程􅁎侍者景帝召程􅁎有所避不願進而􅅚侍者唐兒使夜進上醉不知幸之遂有身及生子因名曰發以母微無寵故王居卑濕貧國應劭日景帝後二年諸王來朝有詔稱爵歌儛定王但張䄂小舉手左右嗟其拙上恠而問之對曰臣國小地狹不足廻旋帝以武陵桂陽屬焉又曰孝武李􅁎生燕刺盧逹切王旦爲人辯略愽學經書及衛太子敗齊懷王又薨旦自以次弟當立上書求入􅀫衛上怒下其使獄遂立少子爲太子帝崩太子立是爲孝昭帝賜諸侯王璽書旦得書不肯􅂘霍光秉政襃賜燕王錢三萬益封萬三千戸因怒曰我當爲帝何賜也多齎金寳走馬賂遺蓋古盍切主上官桀及御史大夫桒􅀪羊􅀪羊等皆與交通數記䟽光過失與旦令上書告之桀欲從中下其章旦聞之喜上䟽是時昭帝年十四􅁴其有詐桀等皆伏誅旦聞之憂懣音悶置酒萬載宫㑹賔客臣妾坐飲王自歌曰歸空城􅀆狗不吠雞不鳴橫術何廣廣􅀆􅂫林曰廣音曠瓉以術爲道路固知國中之無人華容夫人起舞曰髮紛紛􅀆寘渠骨籍籍􅀆亡居母求死子􅀆妻求死夫俳佪兩渠間􅀆君子獨安居坐者皆泣又曰孝武李姬生廣陵厲王胥倡樂逸遊故終不得爲漢嗣始昭帝時胥見上年少無子有覬欲心迎女巫李女須使下神祝詛女須泣曰孝武帝下我左右皆伏言吾必令胥爲天子胥多賜女須以錢㑹昭帝崩胥曰女須良巫也殺牛塞禱及昌邑王徴復使巫祝詛之後王廢胥􅐛信女須等宣帝即位胥曰太子孫何以反得立復令女須祝詛如前又胥女爲楚王延壽后弟婦相餽音匱遺通私書後延壽謀反誅辭連及胥又聞漢立太子謂􅁎南等曰我終不得立矣居數月祝詛事發􅁴有司桉驗天子遣廷尉大鴻臚即訊胥胥旣見使者還置酒顯陽殿召太子霸及子女董訾胡生等夜飲使所幸八子郭昭君家人子趙左君等鼓瑟歌舞王自歌曰欲人生􅀆無終長不樂􅀆安窮奉天期􅀆不得須􅁷千里馬􅀆駐待路黄泉下􅀆幽􅀷人生要死􅀆何爲苦心何用爲樂心所喜出入無悰爲樂亟蒿里召􅀆郭門閱死不得取代庸身自逝左右悉更涕泣奏酒至雞鳴時罷胥讓太子霸曰上遇我厚今􅀒之甚我死骸骨當暴幸而得葬薄之無厚也即以綬自絞死又曰淮陽憲王欽宣帝子好經書法律聦逹有才帝甚愛之數嗟歎憲王曰眞我子也又曰􅀄楚元王敬禮申公等穆生不􅄝酒元王毎置酒常爲穆生設醴也又曰王尊爲東平相東平王以至親驕奢不奉法度傅相連坐及尊視事奉璽書至庭中王未及出受詔尊持璽書歸舎食已乃還致詔後謁見王太傅在前􅀃相䑕之詩尊曰母持布皷過雷門王怒起入後宫復延請登堂尊謂王曰尊來爲相人皆弔尊也以尊不容朝廷故見使相王耳天下皆言王勇王顧但􅀒貴安能勇如尊乃勇耳王變色視尊意欲格殺之即好謂尊欲願觀相君佩刀尊舉掖顧謂傍侍郎前引佩刀視王王欲誣相枝刃嚮王耶王又雅聞尊髙名大爲尊屈酌酒具食相對極歡東觀漢記曰東平獻王蒼少有孝友之質寛仁􅀪雅明帝即位詔以爲驃􅀐將軍位在三公上四年蒼上䟽願朝上以王觸寒渉道使中謁者賜乗輿豹裘蒼到洛陽使鴻臚持節郊迎引入不在讃拜之位􅂛殿乃拜上親荅拜諸王歸國上特留蒼八月飲酎畢大鴻臚奏遣蒼蒼發上親臨送流涕賞賜以億萬數又曰明帝詔書示諸國曰詔問東平王蒼處家何等最樂王對云爲善最樂帝曰其言甚大稱是腰腹蒼美􅁂髯腰帶圍八尺二寸又曰北海靖王興毎朝廷有異政京師雨澤秋稼好醜輙乗驛馬問焉其見親重如此又曰廣陵思王荆性刻急隱害喜文法有才能中元二年丗祖崩不悲哀而作飛書與東海王彊􅀃之令舉兵爲逆亂彊得荆書即執其行書者封上之以親親隱其事遣荆止河南宫又曰明德后詔書流布咸稱至德王主諸家莫敢犯禁廣平鉅鹿樂成王在邸入問起居帝望見車􅀐鞍勒皆純墨無金銀綵飾馬踰六尺於是以白太后即賜錢各五百萬於是施親戚􅀍服自如范曄後漢書曰沛獻王輔矜嚴有法度好經書善􅀃京氏易孝經世號之曰沛王通論在國謹節終始如一稱爲賢王顯宗敬重數賞賜焉又曰琅瑘孝王京建武十七年追爵爲王京性恭孝好經學顯宗尤愛幸賞賜恩寵殊異莫以爲比光烈皇后崩帝悉以太后遺金財寳賜京京都莒好治宫室窮極􅇊巧皆􅅚以金銀上詩賦頌德帝嘉美下之史官又曰樂成靖王黨永平十五年封樂成王黨聦慧善史書如正文字與肅宗周年尤相親愛又曰清河王慶爲太子竇后諷有司奏廢慶慶時雖㓜而知避嫌畏禍言不敢及宗氏帝更憐之勑皇后令衣服與太子齊等慶小心恭孝自以廢黜尤異事愼法毎朝謁陵廟常夜分嚴裝衣冠待明約勑官屬不得與諸王車馳常以貴又葬禮有闕毎􅀼感恨至四節臘輙􅀕於私寢竇氏誅後始使乳母於城北遥祠及竇太后崩慶求上冢致哀帝許之詔大官四時給􅀕慶垂涕曰生雖不獲供養終得奉􅀕祀私願足矣又曰李爕字德公靈帝時拜安平相先是時安平王續爲張角賊所略國家贖王還欲復其國爕奏曰續在國無守蕃政不稱損辱聖朝不冝復國續竟歸蕃爕以謗毀宗室輸作佐校未滿歳王果坐不道􅀍誅乃貴爕爲議又曰董卓置􅀪農王於閣上使郎中令李儒進酖曰服此藥可以辟惡王曰我無疾是欲殺我耳乃與妻唐􅁎宫人飲讌別王悲歌曰天道易兮我何如棄萬乗兮退居蕃逆臣見迫兮命不延逝將去汝兮適幽􅀇因令唐􅁎起舞􅁎枕䄂而歌曰皇天崩兮后土頽身爲帝王兮命天摧死生路異兮從此乖奈我煢獨兮心中哀因泣下嗚咽王曰卿王者妃􅀔不復爲吏民妻自愛從此長辭遂飲酖死時年十八漢名臣奏曰杜業奏曰河間獻王經術通明積德累行天下雄駿衆儒皆歸之孝武帝時獻王朝武帝色難之謂獻王曰湯以七十文王百里王其免之知其主意即縱酒聽樂因以終也漢􅄂事曰中元二年光武崩王莽之亂國無制度皇太子與諸王同席坐尊卑無別是時上下莫之是正太尉趙喜乃正色横劒殿階扶下諸王以明尊卑魏略曰任城王彰字子文武帝子也太子嗣立旣葬遣彰之國如彰自以先王見任有功兾因此見授用而聞當隨例意甚不恱不待遣而去時以􅋣陵璿薄使治中牟及帝受禪因封爲中牟王是大駕幸許昌北州諸使上下畏其剛嚴每過中牟不敢不速又曰趙王朝幹一名良良夲陳妾子良生而陳氏死太祖令王夫人養之良年五歳而太祖疾因遺令語太子言此兒三歳亡母五歳失父以累汝太子由是親待隆於諸弟良年小常呼文帝言阿翁帝言良曰我汝兄耳愍甚如是毎爲涕淚太平御覽卷第一百五十
