front:
  text: 太平御覽卷第九百六十九果部六
  hash: sha256:9dda89cc3668abdd0a8724bbececf7366a4520a4b43b6acbcdc3d0f6757f4aae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_969-1a}
body:
  text: 梨樝櫻桃梨爾雅曰梨山摛即金梨樹摛音離梨曰鑚之啖食治擇之名漢書曰淮北滎南河濟之間千樹梨其人皆與千戸侯等晉書載記曰符􅀟據上邽符抑據蒲坂叛于堅符武據安定並應之將共伐長安堅遣使諭之各齧梨以爲信皆不受堅命宋書曰王􅀇謨征滑臺一疋布責民八百大梨又曰張敷小名查父邵小名梨文帝甞戯謂之曰查何如梨荅曰梨萬果之宗查何敢比也齊書曰扶桑國有赤梨經年不壞兼多蒲桃唐書曰貞觀中杭州言木連理二十四株有樝梨二木合爲一體又曰􅀇宗至馬嵬驛令髙力士縊貴妃於佛堂前之梨樹又曰崔逺文才清麗風神峻整人皆慕其爲人當時目爲釘座梨言席上之珎韓子曰夫樹柦梨橘柚者食之則甘嗅之則香莊子曰柤梨橘柚其味雖別各適其口淮南子曰佳人不同體羙人不同靣而皆􅀃於目佳羙也梨橘􅀥栗不同味而皆調於口調適也應劭漢官儀曰光武封太山上壇見酢梨酸􅀥主者云百官上者所置具􅀥門晉令曰諸宫有梨守護者置吏一人晉宫閣名曰明光殿前梨一株丗􅀃曰桓南郡每見人不快輙嗔云君得哀家梨復蒸食否舊􅀃秣陵有哀仲家梨甚大如􅂛入口消釋言愚人不别得好梨蒸食之又曰安公講僧常數百習鑿齒甞餉十梨正值講安公便於座中手自剖分梨盡人遍都無偏頗山海經曰洞庭之中其木多梨盧毓冀州論曰常山好梨地産不爲無珎関令尹喜內傳曰老子西遊省太真王母共食紫梨漢武内傳曰太上之藥有玄光梨曹暪別傳曰王自漢中至洛陽起建始殿使工􅂫黄越徙羙梨掘之根盡血出越以狀聞王王躬自視之以爲不祥還遂寢疾神仙傳曰介象言病帝使左右以羙梨一奩賜象象死帝殯而埋之以日中時死其日晡時到建業以所賜梨付苑吏種之後吏以狀聞即發象棺棺中有一奏符大士傳曰孔融年四歳與諸兄食梨輙取其小者人問其故荅曰我小兒法當取小者由此宗族竒之西京雜記曰上林有紫梨芳梨實小青梨大谷梨金柯梨岀瑯瑘王野家太守王唐所献縹蔕梨紫條梨瀚海梨岀瀚海耐寒不枯青玉梨廣志曰洛陽北芒張公夏梨海内唯有一樹常山真定梨山陽鉅野梨梁園睢陽梨齊郡臨淄梨鉅野槀梨上黨楟音亭梨小而甘新豐箭谷梨関以西弘農京兆右扶風界谷中梨多供御廣都梨重六斤可數人分食之嵩髙山記曰東嶽脚上有梨樹云是武帝菓園山中諸生皆取食之辛氏三􅁗記曰漢武帝園一名樊川一名禦􅀫有大梨如五􅂛落地則破其主取者以布囊盛之名含消梨三晉山險記曰山陽縣北有谷通得驢馬石勒十八􅀐昔在此啖梨生樹今有梨園叚􅀛龍涼州記曰吕光時燉煌太守宋歆獻同心梨永嘉記曰青田村民家多種梨樹名曰官梨子大一圍五寸樹老今不復作子此中梨子佳甘羙少比實大出一圍􅁪以供獻名爲御梨吏司守視土人有未知味者梨實落至地即融釋郭子横洞􅁳記曰塗山之北有梨大如斗色紫千年一花冬月乃實煎之有膏食者身輕亦曰紫輕梨愽物志曰梨􅀋甚多樝杜樸音卜皆是有大小甜酢之異耳神異經曰東方有樹焉髙百丈敷張自輔葉長一丈廣六七尺名曰梨其子徑三尺剖之自如素食之爲地仙張華注曰是故今梨樹大耳幽明録曰成彪兄䘮晝夜哭泣兄提二􅂛酒一槃梨就之引酌相勸廣五行記曰宋廢帝大始年江南盛傳種蕭梨先無此樹百姓爭欲植之識者曰當有姓蕭人王者後齊受禪楊衒之洛陽伽藍記曰歡農里報徳寺有園珎菓出焉有含消梨重六斤禁苑所無也從樹投地盡散爲水焉世人云報德之梨承光之柰承光寺亦多菓木柰味甚羙冠於京師李鄴侯傳曰唐肅宗甞夜坐召頴王等三弟同於地爐􅄢毯上時李泌多絶粒上每爲自燒二梨以賜之潁王恃恩固求上與曰汝􅁪飽肉食先生絶粒何乃爭之潁王曰臣等試大家心何乃偏耶不然三弟共乞一顆可乎上亦不許賜以他菓潁王等又曰臣等以大家自燒故乞他菓何用因曰先生恩渥如此臣等請聮句以爲他年故事潁王曰先生年幾許顔色似童兒信王曰夜抱九仙骨朝披一品衣一王曰不食千鍾粟唯飡兩顆梨旣而三王請上成之上曰天生此間氣􅂇我化無爲王讃梨頌曰太康十年梨樹四枝其條與中枝合生於玄圃園皇太子令侍臣作頌魏文帝詔曰真定御梨大􅀂拳甘􅀂􅁡脆􅀂凌可以解煩釋渴傳選七證曰􅁪陽黄梨巫山朱橘何晏九州論曰安平好􅀥真定好梨左思蜀都賦曰紫梨津潤又齊都賦曰菓則昫山之梨潘岳閑居賦曰張公大谷之梨孫楚秋賦曰朱橘甘羙紫梨甜脆膚不隱於齗牙融液易於含雪王廙洛都賦曰梨則大谷冬紫張公秋黄潘岳金谷園靈圃繁􅀂榴茂林列芳梨宋武帝戯馬臺梨花讃曰嘉樹之生于彼山基開榮布綵不離塵緇王弘謝賜河上梨表曰奉賜河上梨一千逺方味甘每垂降及仰佩恩逮俯増祗愧魏武帝爲兖州牧上書曰山陽郡有羙梨謹上甘梨二箱楂爾雅曰樝梨曰鑚之樝以梨而酢澁見禮記禮記内則曰樝梨薑桂鄭玄曰樝梨之不􅆇者皆人君羞吕氏春秋曰箕山之東有甘樝山海經曰平丘有楊栁甘樝又曰洞庭之上其木多樝􅀃文曰樝似梨神異經曰南方大荒有樹焉名曰柦三千歳作華九千歳作實其花紫色中髙百丈敷張自輔葉長七尺五色實長九尺無核割之如凝􅁡張茂先注曰祖梨􅄒異記曰江淮南人至北見榅勃香以爲柦子蓋實異耳傳􅀇􅀲賦曰龍眼生於南極甘樝引於崑山櫻桃禮記月令曰仲夏之月天子羞以含桃先薦寢廟鄭玄注曰含桃今之櫻桃也爾雅曰楔音革􅃛反荆桃郭璞注曰今櫻桃廣雅曰含桃櫻桃漢書曰惠帝岀離宫叔孫通曰今櫻桃熟可獻陛下冝以櫻桃獻宗廟上許之諸菓獻由此興唐書曰太宗將致櫻挑於􅈶公稱奉則以尊言賜又以卑問之虞􅁥曰昔梁帝遺齊巴陵王稱餉遂從之又曰玄宗紫宸殿櫻桃熟命百官摘之又曰蕭潁士李林甫採其名欲抜用之乃召見時潁士寓居母䘮即縗麻而詣京師徑謁林甫於政事省林甫素不識遽見縗麻大惡之即令斥去潁士大忿乃爲伐櫻桃賦以刺林甫云擢無庸之􅃈質因夲枝而自庇洎枝榦而非據專階􅋝之右地雖先寢而或薦豈和羹之正味其狂率不遜皆此􅀋也又曰文宗始即位甞因内園進新櫻桃將以賜三宫太后上曰送太后焉可以爲賜因援筆易其文簿曰奉太后自是以爲常拾遺録曰漢明帝於月夜讌賜群臣櫻桃盛以赤瑛盤群臣視之月下以爲空盤帝􅀏之吕氏春秋曰仲夏之月羞含桃髙誘注曰含桃櫻桃爲鳥所含故曰含桃范汪祠制曰孟夏􅀕用櫻桃洛陽宮殿簿曰顯陽殿前櫻桃六株明光殿前櫻桃四株徽音殿前櫻桃二株廣志曰櫻桃大者如彈丸有長八分者白色多肌者凡二種虎丘山䟽曰山下有櫻桃三株唐景龍文館記曰四年夏四月上與侍臣於樹下摘櫻桃恣其食未後於蒲萄園大陳宴席奏宫樂至暝每人賜朱櫻兩籠又曰四年夏四月上幸兩儀殿命侍臣􅄧殿食櫻桃其櫻桃並盛以琉璃和以杏酪飲塗麋酒􅀶物志曰櫻桃或如手指春秋冬夏華實竟歳吴氏夲草曰櫻桃味甘主調中益脾氣令人好顔色羙志氣一名朱桃一名麥英也傅咸粘蟬賦序曰櫻桃爲􅀣則多䕃爲菓則先熟故種之於㕔事前以盛暑逍遥其下左思蜀都賦曰朱櫻春就素柰夏成魏文帝與鍾繇書報曰臣繇言賜甘酪及櫻桃惠厚意綢非言所申夏侯孝􅀂春可樂曰進櫻桃於玉盤太平御覽卷第九百六十九
