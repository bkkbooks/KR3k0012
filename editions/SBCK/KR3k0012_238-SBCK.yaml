  text: 太平御覽卷第二百三十八職官部三十六
  hash: sha256:27d962e92624777e12ea5b4d1ac9e6ec570fcc7a4d2259f7d510fc0269df2a97
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_238-1a}
body:
  text: 大將軍寮屬附車􅀐將軍驃􅀐將軍驍􅀐將軍衛將軍前將軍後將軍左將軍右將軍大將軍史記曰武帝伐匈奴以衛青爲大將軍位在諸公上公卿皆拜唯汲黯獨揖有言大將軍尊貴不冝爾黯曰大將軍有揖客獨不貴􅁘靑聞之愈重黯漢書曰武帝以霍光爲大將軍輔昭帝田千秋爲丞相及昭帝􅀄即位未任聽政事一决大將軍光千秋居相位謹厚有重名光謂千秋曰始與君侯俱受先帝遺詔令光治内君侯治外冝有以教督使光無􅀒天下千秋曰唯將軍留意即天下幸甚終不有所言後漢書曰竇憲爲大將軍威震天下復出屯武威㑹帝西祠園陵詔憲與車駕㑹長安及憲至尚書以下議欲拜之伏稱萬歳韓稜正色曰夫上交不謟下交不黷禮無爲人臣稱萬歳之制議者皆慙而止又曰詔鄧騭班師朝廷以太后故遣五官中郎將迎拜騭爲大將軍到河南使大鴻臚親迎中常侍齎牛酒郊勞王主以下􅀱望於道旣至大㑹群臣賜束帛焉應劭漢官儀曰和帝以竇憲爲大將軍乃冠三公又曰梁兾爲大將軍以三世姻媾援立之功公卿希旨上比周霍舉髙第茂才官屬皆倍餘府魏志曰文帝以孫權爲大將軍呉王加九錫又曰太傅司馬宣王奏免曹爽皇太后詔召髙文惠假節行大將軍事據爽營太傅謂之曰君爲周勃矣後魏書曰莫題有謀䇿爲大將軍平慕容驎賜爵東宛侯後太祖欲廣宫宇規度平城四方數十里將摸鄴洛長安之制運材數百萬以題機巧令􅁥定焉陳思王輔臣論曰知慮深奥淵然難測恭以奉上愛以接下納言左右爲帝喉舌曹大將軍也大將軍寮屬附魏志曰王謙爲大將軍何進長史進以謙名公之胄欲與爲婚見其二子使擇焉弗許以疾免臧榮緒晉書曰魯芝字世英躭思墳籍研精稽古自三代之奥典聖人之微言皆該覽焉大將軍曹爽輔政髙選賢明以爲官屬延芝爲司馬續漢書曰李固字子堅拜議郎爲洛陽令大將軍梁兾請爲從事中郎晉書曰鄭冲字文和以儒雅爲業簞食瓢飲布衾緼􅂁不以爲憂大將軍曹爽以爲從事中郎又曰李喜景帝輔政命喜爲大將軍從事中郎喜到引見謂喜曰昔先公辟君而不應今孤命君而至何也對曰先公以禮見待喜得以禮進退明公以法見繩喜畏法而至帝甚重之何法盛晉中興書曰郭舒大將軍王敦以爲從事中郎㑹郭討劉隗切諌敦大怒曰人中間言卿癡故炙卿眉頭今疾復發􅁘勿復語也舒曰明公聽舒一言舒聞古之狂也直周昌汲黯朱雲皆不癡也昔堯立誹謗之木舜懸敢諌之鼔公爲勝堯舜􅁘而乃折舒使不得言敦黙然也竹林七賢傳曰阮籍字嗣宗爲太傅司馬宣王叅軍遷景王大將軍從事中郎通典曰從事中郎漢末官也陳陽爲大將軍王鳯從事中郎是也在主簿上所掌與長史同華嶠後漢書曰崔駰字亭伯辟大將軍竇憲府􅁺憲新輔政貴重􅁺三十人皆故刺史二千石唯駰以處士年少擢在其間憲擅權驕恣駰數諌之出爲長岑長不得意不之官而歸華嶠後漢書曰馬融字季長爲大將軍鄧騭舎人晉陽秋曰義興周延爲左率轉尚書遷大將軍諮議叅軍車􅀐將軍漢書曰元光元年以中尉程不識爲車􅀐將軍屯鴈門應劭漢官儀曰帝以元舅馬防爲車􅀐將軍銀印青綬呉志曰孫壹奔魏以壹爲車􅀐將軍儀同三司封呉侯以故王芳貴人邢氏妻之邢美色妬忌下不堪命遂共殺壹及邢氏蜀志曰鄧芝字伯苗義陽新野人益州從事張􅁉相芝徃從芝謂芝曰君年過七十位至大將軍封侯爲車􅀐將軍賞罰明善䘏卒伍身之衣食資仰於官不茍素儉然終不治私産妻子不免飢寒死之日家無餘財後魏書曰王衍字文舒出爲散􅀐常侍征東將軍西兖州刺史衍届治未幾屬尓朱仲逺稱兵内向州旣路衝爲其攻逼衍不能守爲仲逺所擒以其名望不害也令􅀐牛從車乆乃見釋還洛除車􅀐將軍隋書曰長孫覽周武帝在藩與覽親善及即位彌加禮焉超拜車􅀐大將軍毎公卿上奏必令省讀覽有口辯聲氣雄壯凢所宣􅀓百寮屬目帝毎嘉歎之覽􅀄名善帝謂之曰朕以万機委卿先覽遂賜名焉驃􅀐將軍漢書曰武帝以霍去病爲嫖姚校尉征匈奴累有功寵冠群臣置驃􅀐將軍秩與大將軍同又曰明帝即位以東平王蒼爲驃􅀐輔政開東閣延英雄及蒼歸國有驃􅀐時吏丁牧周相以蒼敬賢下士不忍去之遂爲王家大夫數十年事祖及孫帝聞襃美又曰驃􅀐將軍漢官也長史司馬各一人金璋紫綬五時朝服武冠佩山􅀇玉光武中興諸將皆稱大後天下旣定武官悉省東觀漢記明帝詔曰東平王蒼寛􅀶有謀可以託六尺之孤臨大節而不可奪其名以蒼爲驃􅀐將軍又曰張意拜驃􅀐將軍討東甌備水戰之具一戰大破所向無前又曰其將軍不常置比公者又有驃􅀐將軍建武二十年復置驃􅀐將軍位次公有長史一人後漢書曰劉隆爲驃􅀐將軍行大司馬事隆奉法自守視事八歳上將軍印綬罷賜養牛上樽酒十斛應劭漢官儀曰漢興置驃􅀐將軍位次丞相隋書曰崔彭轉驃􅀐􅁪典􅀫衛性謹宻在省闥二十餘年毎當上在仗危坐終日末嘗有怠惰之容上甚嘉之上毎謂彭曰卿當上日我寢處自安又甞曰卿弓馬固以絶人頗知學不彭曰臣少愛周禮尚書毎於休沭之暇不敢廢也上曰試爲我言之彭因說君臣戒愼之義上稱善韋昭辯釋名曰驃􅀐將軍􅀐將軍秩比三公辯云此二將軍秩夲二千石世說曰何驃􅀐弟第五以髙情遜避而驃􅀐令仕對曰然第五之稱何必减之驃􅀐陳思王輔臣論曰魁傑雄特秉心平直威嚴足憚風行草靡戎昭果毅折衝厭難者司馬驃􅀐梁簡文帝讓驃􅀐楊州刺史表曰常願侯服就列希同特進之班角巾還第不競龍驤之貴而天澤無涯名器惣集竊以驃􅀐之官旣爲上將神州之重實號土中故以彈壓六戎冠冕九牧豈止司􅀠絳節金吾緹􅀐况復任惣皇畿位重連率何則驃􅀐之號歷選爲重元狩之中始自去病永平之建特授劉蒼齊獻爲公主所申呉漢因群臣之舉驍􅀐將軍漢書曰李廣爲驍􅀐將軍後出鴈門擊匈奴匈奴生得廣廣時傷陽死睨傍胡兒善馬漸騰而上南馳得脫廣亡失多當斬贖爲庶人東觀漢記曰光武以劉桓爲驍􅀐將軍攻中山又曰建武九年以劉喜爲驍􅀐將軍攻􅃰郡華嶠後漢書曰馬成字君遷拜驍􅀐將軍北屯常山積數年上以其勤勞徵歸京師邊民多上書請之上復以成鎭撫之魏志曰任城威王彰字子文性勇而􅂡黃爲驍􅀐將軍北出塞爲㓂所要彰獨與麾下數百􅀐突虜王聞之曰我黄􅂡兒定可用也又曰董卓立獻帝表太祖爲驍􅀐將軍與計事太祖乃變姓名間行東歸齊書曰江斆爲侍中轉都官尚書領驍􅀐將軍王晏啓武帝曰江斆今重登禮閣兼􅀉六軍慈渥所覃實有優忝但語其事任殆同閑軰天旨旣欲􅂛其名位愚謂以侍中領驍􅀐望實清顯有殊納言上曰斆常啓吾爲其鼻中惡今旣以何胤王瑩還門下故有此㢠換耳衛將軍漢書曰文帝至渭橋群臣奉天子法駕迎代邸皇帝即日夕入未央宫夜拜宋昌爲衛將軍領南北軍又曰文帝三年遣灌嬰擊匈奴發中尉材官兵屬衛將軍軍長安晉書曰虞潜字思奥爲衛將軍貌如不武内實堅明前將軍漢書曰前後左右將軍皆周末官秦因之位亞上卿金印紫綬又曰武帝征西夷有前後左右將軍宣元以後􅄂錯更置或爲前或爲後或爲左或爲右雖不出征猶有其官在諸卿上爲國爪牙所以揚示威靈於四逺折衝萬人如虎如羆又曰左右前後將軍皆周官也秦漢因置以征四夷後雖不征伐其官常存又曰􅀓喜爲右將軍􅀓太后與政喜數諌后不恱上印綬病在家上䟽固請乃拜前將軍又曰張遼字文逺鴈門馬邑人也聶壹之後以避􅁈變姓少爲郡吏武力過人文帝即位轉前將軍又黃初二年遼至洛陽宫文帝引遼㑹建始殿親問破呉意狀帝歎息顧左右曰此亦古之邵虎也蜀志曰先主爲漢中王遣費詩拜􅀜羽爲前將軍羽聞黄忠爲後將軍怒曰大丈夫終不與老兵同列不肯拜受詩謂羽曰夫立王業者所用非一昔蕭曹與髙祖少小親舊而陳韓亡命後至論在班列韓最居上未聞蕭曹以爲怨也今漢中王以一時之功隆崇於漢叔然意之輕重寜當與君侯齊乎王與君譬猶一體同休等戚禍福共之愚謂君侯不冝計官號之髙下爵位之多少也僕一介之使銜命之臣君侯不受拜如是便還但相謂惜此舉動恐有後悔耳羽太感悟即受拜漢叔黃忠字也後魏書曰谷楷昌􅀺人濮陽公渾曽孫也稱有幹局遷前軍將軍楷􅆌一目而性甚嚴忍時人號爲瞎虎後將軍漢書曰趙充國爲後將軍西羗反上使御史大夫邴􅁻問誰可將者充國時年巳七十餘對曰無踰於老臣者矣遣問焉曰將軍度羗虜何如當用幾人充國曰百聞不如一見兵難踰度踰逺也臣願馳至金城圖上方略然羗戎小夷逆天背叛滅亡不乆願陛下以屬老臣勿以爲憂東觀漢記曰郅􅊮字瑋君信都人也爲曲陽卒正更始即位上以大司馬平河北至曲陽􅊮舉城降爲後大將軍魏志曰曹洪爲文帝所廢明帝即位拜後將軍蜀志曰黄忠字漢叔先主爲漢中王欲用忠爲後將軍諸􅁑亮說先主曰忠之名望素非􅀜馬之倫而今使令同列馬張在近親見其功尚可喻指􅀜羽遥聞之恐必不恱得無不可乎先主曰吾當解之遂與羽等同位賜爵􅀜内侯晉中興書曰應詹字思逺太興三年爲後軍將軍晉起居注曰太始八年置後軍將軍掌􅀫衛左將軍漢書曰公孫賀封南􅐎侯􅐎音芳孝反以左將軍出定襄無功失侯又曰辛慶忌字子真爲左將軍爲􅀦虎臣匈奴西城親附敬其威信東觀漢記曰賈復字君文治尚書事舞隂李生李生竒之謂門人曰賈生容貌志意如是而勤於學此將相之器徴詣洛陽拜左將軍南擊赤眉新城轉西入􅀜擊盆子於渑池破之魏志曰文帝即位以李郃爲左將軍詔郃與曹眞討安定盧水胡及東羗晉書百官名臣曰王濟字武子起家中書郎遷左軍將軍山濤啓事曰左將軍裴楷通理有才義右將軍漢書曰常惠以明習外國事勤勞數有功爲右將軍又曰何武薦辛慶忌冝在爪牙乃拜爲右將軍魏志曰徐晃字公明爲右將軍性儉約畏愼爲將常逺斥􅃸歎曰古人患不遭明君今我遇之當以功自効蜀志曰諸􅁑亮上䟽曰臣以弱才叨竊非據親秉旄􅃏以厲三軍不能訓章明法臨事而懼至有街亭違命之闕令箕谷不戒之失咎皆在臣授任無方臣明不知人恤事多闇春秋責師臣職是當請自貶三等以督厥咎於是以亮爲右將軍行丞相事所捴統如前何法盛晉中興書曰郭黙爲右軍將軍黙旣逺人樂爲邊將不願内轉謂劉胤曰我能衛胡而不用更用虚名者且石軍主禁兵禁兵不妄出有急方更配給兵將無素是謂棄之安得不亂又曰王羲之字逸少導之從子也㓜訥於言人未之知年十三嘗見周顗異之時重牛心炙座客未啖先割啖之羲之於是聞名及長尤善草􅀠書爲今古冠絶累遷爲右將軍不樂京師遂徃㑹稽與謝安孫綽等遊處山隂有道士養群鵝羲之意甚恱道士云爲寫黄庭經當舉群相贈乃爲寫訖籠鵝而去太平御覽卷第二百三十八
