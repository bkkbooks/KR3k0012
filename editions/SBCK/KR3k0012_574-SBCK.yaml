  text: 太平御覽卷第五百七十四
  hash: sha256:1a60f80e0a04245cb3d446a263870f21f25a17a7966ee9acd1fd9c73063154ae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_574-1a}
body:
  text: 樂部十二舞毛詩甫田賔之􅀄筵曰舎其坐遷屢舞僊僊側弁之俄屢舞傞傞又宛丘東門之枌刺幽公也風化之所行男女棄其舊業歌舞於市井爾尚書曰苗民逆命帝乃誕敷文德舞干羽于兩階干楯羽翳也皆舞者之所執也又顧命曰胤之舞衣在西房孔安囯日胤囯所爲舞者衣中法制尚書大傳曰惟丙午王建師及鼔譟前歌後舞禮記曰治民勞者其舞行綴逺治民逸者其舞行綴短故􅀚其舞知其德民勞則德薄鄼相去逺舞人少也民逸則德盛鄼相去近舞人多也又曰天子宫懸四面舞行八佾諸侯軒懸三面舞行六佾大夫判懸二面舞行四佾士特懸一面舞行二佾又曰季夏六月以禘禮祀周公於太廟朱干玉戚冕而舞大武皮弁素積裼而舞大夏又曰夫樂者象成者也象成功而爲樂者也㹅干而山立惣持干楯山立不動也武王之事也發揚蹈厲太公之志也志在鷹揚武亂皆坐周召之治也武乱武之理也皆坐以象其人舞事且夫武始而北出象􅀚兵盟津時也再成而㓕啇成猶奏也再奏象克殷時三成而南誅紂己而南也四成而南國是疆有南囯疆界也五成而分周公左召公右分陜東西而理六成而復綴以崇六奏象兵還振旅也復綴反位止也崇充也凡六奏以充武樂天子夾振之而四伐盛威於中國也夾振之者王將夾舞者振木鐸以爲節也武舞戰也象四伐者伐四方也毎奏四伐一擊一刺爲一伐也周禮曰地官舞師掌教兵舞帥而舞山川之􅀕祀教忮舞枝者拂帥而舞社稷之􅀕祀教皇舞帥而舞旱暵之事四方􅀕祀謂四望也旱暵之事謂雩也暵炎􅀬氣也春官樂師掌教國子小舞謂以㓜少時教之舞内則曰十三舞籥成童舞象大夏也凢舞有舞有皇舞有旄舞有干舞有人舞鄭衆云􅇊舞者金羽舞者折羽也皇舞者以羽帽覆頭上衣飾翡翠之羽旄舞者旄牛之尾干舞者兵舞也人舞也社稷以折宗庿以羽四方以皇辟雍以旄兵事以干星辰以人舞子持之是也皇雜五綵雜羽如鳯皇色持以舞也人舞所執以手䄂爲威儀也凢四方之舞仕者属焉凢􅀕祀賔客舞其燕樂籥師掌教國子舞羽吹籥文舞有持羽吹籥舞者所謂籥舞文王丗子曰冬斈羽籥詩曰左手執籥右手秉翟也􅀕祀則鼔羽籥之舞鼔之者􅁪􅁪為之節賔饗則亦如之又曰地官旄人掌教舞散樂舞夷樂散樂野人爲樂之善者也夷樂四夷之樂也左傳隠公曰舞所以節八音而行八風也又莊公曰王子頽樂及徧舞又昭三曰晉侯與諸侯宴于温使大夫舞曰歌詩必􅀋髙厚之詩不􅀋大夫盟髙厚髙厚逃歸又隠公曰考仲子之宫將万焉公問羽舞數於衆仲對曰天子用八諸侯用六大夫四士二夫舞所以節八音而行八風也故自八巳下公從之又莊公曰楚令尹子元欲蠱文夫人爲舘於宫側而振万焉夫人聞泣曰先君以是舞也習戎備也今令尹不尋諸􅄷讎而於未亡人之側不亦異乎論語八佾曰季氏八佾舞於庭是可忍也孰不可忍也家語曰子路戎服見孔子拔劒而舞曰古之君子固以劒自衛乎孔子曰古之君子忠以爲質仁以爲衛史記曰沛公見羽鴻門項莊入曰軍中無以爲樂請以劒舞拔劒起舞項伯亦起舞以身蔽沛公又曰長沙定王發以其母微無寵故王卑濕貧國景帝後三年諸王來日有詔更前稱壽歌舞定王但張袖小舉手左右􅀏其拙上怪問之對日臣囯小地狹不足廻旋帝以武陵桂陽属焉又曰師經撫琴魏文侯躭之起舞經怒以琴撞文侯文侯大怒經曰臣撞桀紂之主不撞堯舜之君文侯恱掛琴於室爲戒又日孝景皇帝元年制詔御史盖聞歌者所以發德舞者所以明德髙廟始奏文始五行之舞漢書曰李陵在匈奴置酒與􅂫武別日異域之人一別長絶陵起舞属之又曰髙祖廟奏武徳文始五行之舜武徳者象天下樂巳行武以除亂也文始舞者夲舜韶舞也髙祖更名曰文始示不相襲也又日孝武李夫人夲以倡進兄延年知音善歌舞延年侍上起舞曰北方有佳人絶世而獨立一頋傾人城再頋傾人國寕不知傾城傾國佳人難再得上歎息曰世豈有此人乎平陽公主因言延年女弟上召見實妙麗善舞由是幸生昌邑哀王又曰趙飛鷰體輕能掌上舞又曰平恩侯許伯入第丞相巳下皆賀酒酣樂作少府檀長卿起舞爲沐猴與狗闘一坐皆􅀏盖寛饒劾之長卿爲列卿而爲沐猴舞失禮許伯爲謝乃解後漢書曰光武平隴蜀増廣郊祀髙皇帝配食樂奏清陽朱明西皓玄􅁳雲翹育命舞北郊及祀明堂並奏樂如南郊迎時氣五郊春歌靑陽夏歌朱明並舞雲翹之舞秋歌西皓冬歌玄􅁳並舞育命之舞季夏歌朱明兼舞二舞又曰蔡邕坐上章事徙及歸將就還路五原太守智餞之酒酣智起舞属邕邕不爲報智者中常侍王甫之弟智衘之宻告邕怨於囚放謗訕朝廷邕慮卒不免禍乃亡命江海逺迹吴㑹魏志曰舞師馮肅曉知先代舞名吴書曰陵統怨甘寕殺其父操寕常避統不與相見權亦命統不得讎之甞於吕􅂪舎㑹酒酣乃以刃舞寕起曰寕能􅀟㦸舞蒙曰寕雖能未􅀂􅂪上之也因操刃持楯以身蔽之後權知統意因令寕將兵徙屯中洲又曰陸遜破曹休上與群僚大㑹酒酣命遜舞解所著白鼯子裘賜之又曰陶謙爲舒令郡守張磐謙耻爲之屈磐舞属謙謙不爲起強之乃舞舞不轉磐曰不當轉耶曰轉則勝人宋書樂志曰鞞舞之由來未詳所起漢代已於燕亭用之矣故曹植鞞歌漢靈帝時有李堅者善鞞舞遭亂播遷帝聞其舊伎召之堅旣中廢兼古曲多謬故知異代之文未必相襲也後魏書曰嵇康生性氣麄武元又憚之康生知之亦懼不安肅宗朝靈太后於西林園文武坐酒酣迭舞次至康生乃爲力士舞及於折旋每頋視太后舉手蹈足瞋目傾首爲殺􅅞之􅀔太后解其意而不敢言唐書馮定爲太常少卿文宗毎聽樂鄙鄭衛聲詔奉常習開元中霓裳羽衣舞以雲韶樂和之舞曲成定惣樂工閱於庭定立於其間文宗以其端凝􅀂植問其姓氏翰林學士李珏對曰此馮定也文宗喜問曰豈非能爲古章句者耶乃召􅂛階文宗自吟定送客西江詩吟罷益喜因賜禁中瑞錦仍令大録所著古體詩以獻晉中興書曰殷融弘逺爲司徒左西属飲酒善舞終日嘯詠未甞以事務爲懷齊書永明中舞人冠幘並簮筆武帝曰筆笏盖以記事受言舞不受言何事簮筆豈有服朝衣而足綦讌屨於是去筆江表傳曰孫權請頋雍父子及孫譚時爲選曹尚書見任貴重是日孫權極忻譚醉酒三起舞舞又不知止雍内怒之明日召譚訶責之君王以含垢爲德臣下以㳟謹爲節何有舞不復知止雖爲酒後亦爲恃恩謙虚不足損吾家者必汝也何承天三代樂序云正德大恱舞盖岀於三容樂然則其聲節有古之遺音也魏名臣奏王朗表曰凢音樂以舞爲主自黄帝雲門至周大武皆太廟舞樂所以樂君之德舞所以象君之功淮南子曰今皷舞者繞身􅀂環曽繞摩以宣地扶於阿郍動容轉面轉更也回竟更爲也便姢擬神􅀂秋葯􅀍風葯白芷香草也􅀍風言其弱髮􅀂結旌卷而復舒騁馳􅀂驚周穆王傳曰有偃師者􅅞草作人以五采衣之使舞王與美人觀之草人以手招美人王怒國史􅀘曰于司空因韋太尉奉聖樂亦撰順聖樂以進毎宴必使奏之其曲將半行綴皆伏而一人舞於中央幕中韋綬􅀏曰何用窮兵獨舞雖詼諧必有爲也山海經曰形夭與帝争神帝斷其首葬之常羊之山乃以乳爲目以齊爲口操干戚以舞又曰帝俊八子始爲舞五經通義曰王者之樂有先後者各尚其德也以文得之先文樂持羽毛而舞以武得之先武樂持朱干玉戚所以増威武也戚斧干楯也玉取其仁明當尚德行仁以斷斬也又曰東夷之樂持矛舞助時生也南夷之樂持羽舞助時飬也西夷之樂持􅃏舞助時殺也北夷之樂持干舞助時藏也蔡邕月令章句曰天子省風以作樂舞所以節八音而行八風天子八佾諸侯六佾大夫四佾佾列也每佾八人每服冕而執戚有俯仰張翕之容行綴長短佾八人之制所以受命而歌王者之功也人之動而有節者莫􅀂舞肆所以因陽氣而逹物也續搜神記曰滎陽人姓何忘其名有名聞士也荆州辟爲別駕不就隠遁飬志甞至田舎収穫在塲上忽有一人長一丈黄踈單衣角巾來詣之翩翻舉其兩手並舞而來語何云君甞見韶舞不此是韶舞且舞且去尋逐徑向山山有穴裁容人即入穴何亦隨之見有良田數十頃何遂墾作以爲丗業子孫于今賴之搜神記曰太康中天下爲晉丗寕之舞其舞抑手以執杯盤而反覆之反覆至危也杯盤酒食器也而名晉丗寕者言時人茍且酒食之間而其智不及逺如噐在手也英雄記曰建安中曹操於南皮攻􅀽譚斬之操作皷吹自稱萬歳於馬上舞十二年攻烏桓蹹頓一戰斬蹹頓首繫馬鞍於馬上抃舞三巴記曰閞中有渝水賨民銳氣喜舞髙祖樂其猛銳數觀其舞使樂人羽之故名巴渝舞韓子曰長䄂善舞多財善賈王子年拾遺録曰燕昭王即位二年廣延國來獻善舞者二人一名旋波一名提漢並玉質凝膚體輕氣馥綽婉妙絶曠古無倫或行無迹影或經年不飢昭王處以單綃華幄飲以瑞珉之膏飴以丹泉之粟王登崇霞之䑓乃召二人在側時香風欻起二人徘徊翔轉殆不自支王以纓綏属拂之二人皆舞容冶妖麗靡􅀂鵉翔而歌聲輕下乃使伶人代唱其曲清響流韻雖遶梁動木未足加焉其舞曲一名縈塵言體輕與塵霧相亂也次曰集羽言婉轉􅀂羽毛之從風也末曲游懷言支體緬曼􅀂入懷䄂也晏子春秋曰晉與攻齊使范昭徃觀景公觴之范昭請公之弃酌公曰諾告侍者酌樽進之晏子曰撤樽更之范昭起舞太師曰我不習昭曰調成周之樂吾爲之舞太師曰􅊕臣不習范昭趍而出公問晏子晏子曰昭非不知禮也欲慙吾君臣公問太師太師曰成周之樂天子樂范昭人臣而舞之臣故不爲昭歸報晉平公曰齊未可伐也吾欲慙其君欲犯其禮而太師識之吕氏春秋曰陶唐氏陽多滯伏民氣壅閼故爲舞以宣導之樂苑曰羽調有柘枝曲啇調有掘柘枝此舞因曲爲名用二女童鮮衣帽帽施金鈴抃轉有聲其來也於二蓮花之中藏之花坼而後見對舞中之雅妙者也明皇􅄂録曰開元二年上於梨園自教法曲必盡其妙謂之皇帝梨園弟子明皇在位甞令教舞馬四百疋分爲左右部目爲某家寵某家嬌時塞外亦以善馬來貢者上俾之教習無不曲盡其妙因命衣以文繡絡以金鈴飾其鬛間雜以珠玉其曲謂之傾盃樂者數十曲􅁬首鼓尾縱横應節又施三層板床乗馬而上抃轉如飛或命壯士舉一榻馬舞於榻上樂工數十人立於左右前後皆衣以淡黄衫文玉帶必求少年而姿皃美秀者每千秋節常命舞於勤政樓下其後明皇旣幸蜀舞馬亦散在人間禄山甞覩其舞而心愛之自是因以數十疋置於范陽其後轉爲田承嗣所得而承嗣不知􅄂於戰馬置之外棧忽一日軍中大享士樂作馬舞不能自止厮飬軰謂其爲妖擁篲以擊之馬謂其舞不中節抑揚頓挫尚存故態厩吏遂以爲恠白承嗣承嗣命箠之甚酷馬舞益整而鞭撻愈加終斃於􅇫下時人亦有知其舞馬者懼曰􅁀逆而終不敢言又曰至德中明皇復幸華清宫父老奉迎壷漿塞路時上春秋巳髙常乗歩輦父老進曰前時上皇過此常馳逐從禽今何不爲上曰吾老矣豈復堪此父老士女聞之莫不悲泣新豊市有女伶曰謝阿蠻善舞凌波曲常出入宫中楊貴妃遇之甚厚亦遊於國忠及諸姨宅上至華清宫復令召焉舞罷阿蠻因出金粟裝臂環云此貴妃所與上持之悽怨出涕左右莫不嗚咽又曰舞者樂之容也有大垂手小垂手或象驚鴻或如飛鷰婆娑舞態也蔓延舞綴也古之能者不可勝記開元中有公孫大娘善舞劒氣僧懷素見之草書遂長蓋壯其􅉐挫􅀔也又曰開成末有樂人崇胡子能軟舞其􅆎支不異女郎也古今樂録曰白紵舞案辭有巾􅂁之言紵夲吴地所岀冝是吴舞也􅀳徘徊歌曰交交白緒節節爲􅀟吴音呼緒爲紵疑白緒即自紵也釋智匠古今樂録曰大壯之舞曰武舞大觀之舞曰文舞通禮義纂曰漢儀拜陵食舉奏文始五行之舞唐制皇帝親行奠獻及薦服玩禮畢再拜辭退而巳拜陵奏舞漢代禮也又曰古者臣於其君有拜手稽首之禮自後魏巳來臣受恩皆以手舞足蹈以爲歡喜之極也唐㑹要韋萬石曰武舞貞觀禮及今禮但郊廟􅀕享奏武舞之樂即用之凡有六變一變象龍興參野二變象尅静開中三變象冬夏賔伏四變象江淮寕謐五變象獫狁讋伏六變位崇象六還振旅又曰龍朔元年三月一日上召李勣任雅許園師張延師􅂫定方阿史郍忠于闐王伏闍雄上官儀等讌于城門觀屯營新教之舞名之一戎大定樂皆親征遼東以象用武之􅀔也又曰調露二年正月二十一日上御洛城南樓賜宴太常奏六合還淳之舞又曰上元三年十一月三日勑新造上元之舞先令太祠享皆將陳設自今巳後圎丘方澤太廟祠享然後用此舞餘􅀕並停又曰大定元年天后幸京師同州刺史􅂫瓌進聖主還京樂舞上御行宫樓觀之賜以束帛令編於樂府沈志曰江左􅀄有拂舞舊云拂舞吴舞檢其歌非吴辭也皆陳於殿庭賜泓拂舞序曰自江南見曰符舞或言自亮鳩沈曰有此來數十年察其辭旨乃是吴人患孫皓虐政也又曰公莫舞今布舞也相傳云項莊舞劒項伯以䄂隔之古人相呼曰公伯語莊云公莫害漢王今之用巾盖像項伯衣䄂之遺也曹植鞞舞歌序曰漢靈帝西園皷吹有李堅者鞞舞遭亂西隨叚煨先帝聞其舊伎召之堅旣中廢兼古曲多謬誤異代之文未必相襲故依前曲改作新歌五篇不敢充之黄門近以成下國之陋樂焉晋鞞舞歌亦五篇人鐸舞歌一篇幡舞歌一篇皷舞􅇊六曲兼陳於元㑹今幡皷舞歌辭猶存舞並闕鞞舞即今鞞扇舞也今謂巴渝是地名鞞扇是噐名也曹植鞞舞序曰晉􅀄有杯槃舞公莫舞史臣案柸槃舞令之齊丗寕也張衡舞賦云歴七槃而縱躡王粲七釋云七槃陳於廣庭宋丗文士顔延之云逓間開於槃扇鮑昭云七槃舞長䄂
