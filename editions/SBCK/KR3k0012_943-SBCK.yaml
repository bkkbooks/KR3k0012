front:
  text: 太平御覽卷第九百四十三
  hash: sha256:a5d51e5ca2173fc263501ff980dfcffc882851101bbeddcad6ceb30f9d18d4a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_943-1a}
body:
  text: 鱗介部十五擁劒鰌蝥彭螖竭朴沙狗招潮􅀝望石碅蜂江蘆虎石華蚐􅨐鱟瑟􅲯海􅏯􅀋越王筭石蚑陽遂足􅡷􅠦土肉蝦海月玉䖴陵龍石矩玳琩蟕􅏲水母海鏡擁劒廣志曰擁劒似蟹色黄方二寸其一螯偏長如足大指長三寸餘有光其短細者如簪異物志云擁劒􅃺如蟹但一螯偏大耳何遜詩云躍魚擁劒是不分魚蟹也崔豹古今注曰蟚螖音滑小蟹也生海邊塗中食土一名長卿其有螯偏大者名擁劒一名執火其螯赤故謂之執火也俗謂之越王劒杜寳大業拾遺録曰呉郡獻蜜蟹二千頭作如糖蟹法蜜擁劒四擁劒似蟹而小一螯偏大呉都賦所謂烏賊擁劒是也鰌蝥祖台之志怪曰㑹稽山隂東郭氏女先與縣人私通此人買還於縣東靈慈橋女徃入船就之因共寢爲設食食蝥食畢女將兩鰌蝥上岸去船還來至郭逢人語此女巳死乃徃省之尚未殯也發衾視之兩手各把一鰌蝥嶺表録異曰蝤蛑乃蟹之巨者異者兩螯上有細毛如苔身有八足蝤蛑則螯足無毛後兩小足薄而闊俗謂之撥掉子與蟹有殊其大如􅂛南人皆呼爲蟹有大如小楪子者八月此物與人闘徃往夾殺人也彭螖爾雅曰螖蠌小者蟧螺属見捭蒼或曰即彭螖也似蟹而小滑澤二音晉書曰夏統字仲御㑹稽永興人也㓜􅀌貧養親以孝聞睦於兄弟毎採捃求食星行夜歸或至海邊拘蟛􅒹以資養捜神記曰晉太康四年㑹稽彭螖化爲䑕食稻爲災崔豹古今注曰彭螖小蟹也一名長卿嶺表録異曰蟛螖吴呼爲越蓋語訛也足上無毛堪食呉越間多以塩藏貨於市竭朴臨海異物記曰竭朴大於彭螖殻黒斑有文章螯正赤常以大螯彰目屈小螯以取食嶺表録異曰竭朴乃大彭蜞也殻有黒斑􅀟螯一大一小常以大螯捉食小螯分以自食沙狗臨海異物志曰沙狗似彭螖壤沙爲穴見人則走曲折易道不可得也招潮臨海異物志曰招潮小如彭螖殻白依潮長背坎外向舉螯不失常期俗言招潮水也嶺表録異曰招潮子亦蟛蜞之属殻帶白色海畔多潮欲來皆出坎舉螯如望故俗呼招潮也􅀝望臨海水土物志曰􅀝望常起頋睨西東其形如彭螖大行塗土四五進輙舉兩螯八足起望行常如此唯入穴中乃止石蜠巨隕切臨海水土物志曰石蜠大於蟹八足殻通赤狀鴨􅆑蜂江臨海水土物志曰蜂江如蟹大有足兩螯殻牢如石蜠同不中食也蘆虎臨海水土物志曰蘆虎似彭蜞兩螯正赤不中食石華臨海水土物志曰石華附石肉淡㑹稽地理記曰鄮縣濵多石華蚐􅨐上古侯切下并亦切劉欣期交州記曰蚐􅨐似瑇琩􅀛頭鼈身蝦尾色班似錦文大如笠四足漫湖無指甲前有黒珠可以飾物臨海水土物志曰􅔢􅨐其狀􅀛形如笠味如黿可食􅆑大如鴨􅆑正圎中生噉味美於諸鳥􅆑其甲黄􅀧注之廣七八寸長二三尺有光色左思呉都賦曰􅔢鼊鯖鰐鱟胡遘切廣志曰鱟似便面􅀒雌而行失雄則不能獨活出交阯南海中呉録地理志曰交阯龍編縣有鱟形如惠文冠青黑色十二足似蟹長五寸腹中有子如麻子取以作醬尤美裴淵廣州記曰鱟廣尺餘形如熨斗頭如蜣蜋腹下有十足南人重之以爲鮓南越志曰漲海口有鱟毎過海輒相積於背髙尺餘如㠶乗風而遊嶺表録異曰鱟魚其殻瑩浄滑如青瓷盌􅌯背眼在背上口在腹下青黒色腹兩傍爲六脚有尾長尺餘三稜如㨑莖常雌附雄而行捕者必􅀟得之􅀂摘去雄者雌者即自止背􅀒之方行腹中有子如菉豆南人取之碎其肉脚和以爲醬食之尾中有珠如粟色黄雌者小置之水中即雄者浮雌者沉瑟􅲯臨海水土物志曰瑟􅲯與􅏯相似海臨海水土物志曰海如􅏯狹後廣前其肉中食亦又多膏􅏯􅀋上音朝臨海水土物志曰􅏯􅀋似􅔢􅨐腸如羊胃中啖越王筭臨海水土物志曰越王筭如笄大正白長尺餘生海邊沙中見仍取之即可心中存來取即入土中石蚑去豉切臨海水土物志曰石蚑生附石長三寸如小竹大有甲正黒中食陽遂足臨海水土物志曰陽遂足此物形狀背青黒腹下正白有五足長短大小皆等不知頭尾所在生時躰軟死即乾脆􅡷􅠦上音迷下音麻臨海水􅁟物志曰􅡷􅠦􅔢􅨐相似形大如䕠生渤海邊沙中肉極好噉一枚有三斛膏土肉臨海水土物志曰土肉正黒如小兒臂大長五寸中有腹無口自有三十足如􅁫股大中食蝦爾雅曰鰝大蝦也蝦大者出海中長二三丈鬚長數尺今青州呼蝦魚爲鰝音鄗東觀漢記曰馬稜字伯威爲廣陵太守奏罷塩官賑貧羸薄賦稅蝗蟲飛入海化爲魚蝦王隱晉書曰呉後置廣州以南陽􅅬脩爲刺史或語脩蝦長一丈脩不信其人後故至東海取蝦􅂡長四五尺封以示脩脩乃服廣州記亦云金樓子曰舜攝天子有緩耳貫胷之民來獻珠蝦丗􅀃曰虞嘯父爲孝武帝侍中帝從容謂曰卿在閤下􅀄不聞有獻替虞家冨近海謂帝望其意對曰天時尚䁔魚鼈蝦鮓未可致㝷有所獻帝撫掌大􅀏異物志曰蝦種多最大中作脯南越志曰南海以蝦頭爲杯􅂡長數尺金銀鏤之晉簡文以盛酒未及飲酒躍於外筮之曰三旬當後庭有告變者果有生子人面犬身􅀶物志曰東海有物狀如凝血縱廣數丈正方圎名曰鮓魚無頭目處所内無腹藏衆蝦附之隨其東西越人煑食之嶺南異物志曰南海有蝦􅂡長四五十尺嶺表録異曰海蝦皮殻嫰紅色就中腦殻與前􅀟脚有鉗者其色如朱余甞曽登海􅔓忽見牎版懸二巨蝦殻頭尾鉗足具全各七八尺首占其一分刺尖利如鋒刃刺上有􅂡如紅筯各長二三尺前􅀟脚上有鉗云以此捉食鉗麁如人大指長三尺餘上有芒刺如薔薇枝赤而銛硬手不可觸腦殻烘透彎環尺餘何止於盃盂也北户録云滕脩爲廣州刺史有客語脩曰蝦􅂡有一丈者堪爲拄杖脩不之信故去東海取􅂡長四丈以示脩方服其異寕蝦大者亦首尾尺餘閩越率取其肉臠而爲炙又渾以塩藏自然紅色謂之紅蝦貢送白蝦肉薄而白瑩如水精廣人偏食之蓋美而毒詢於閩川吴中悉無此􅀋嶺表録異曰南人多買蝦之細者生切綽菜蘭香蓼等用濃醬醋先潑活蝦盖以生菜然以􅀬飲覆其上就口跑之亦有跳出醋揲者謂之蝦生鄙俚重之以爲異饌也王朗荅魏文表曰夫張大網以漉鰌蝦辱九鼎以烹鼃鼂應璩百一詩曰大􅀛承衰弊復欲密其羅蚍蜉猶見得何云鰌與蝦􅁑龔與張季景書曰夜從劉伯宣舎西垂過龔家無飯噉煼蝦海月臨海水土物志曰海月大如鏡白色正圎常死海邊其指如搔頭大中食謝靈運詩曰挂席拾海月玉䖴余招切臨海水土物志曰玉䖴似蚌長二寸廣五寸上大下小其殻中拄炙之味似酒陵龍臨海水土物志曰陵龍之躰黃身四足形短尾長有鱗無角南越嘉羞見之竟逐石矩嶺表録異曰石矩亦章舉之􅀋身小而足長入塩爲乾燒食極美又有小者兩足如帶曝乾後似射踏子故南中呼爲射踏子也玳瑁嶺表録異曰玳瑁形狀如􅀛唯腹背甲有烘􅀧其大者悉似盤蓋本草經云玳瑁解毒兼云辟邪余􅀉居廣南日見盧亭海島夷人獲活玳瑁􅀛一枚以獻連帥嗣薛王王令生取背甲小者二片帶於左臂上以辟毒􅀛􅀍生揭其甲亦甚苦楚後養於使宅後北池伺其揭處漸生復遣盧亭送於海畔或云玳瑁􅀂生帶之有蠱毒玳瑁甲即自揺動􅀂死無此驗蟕􅏲上遵為切下音嶺表録異曰蟕􅏲俗謂之兹夷乃山􅀛之巨者人立其背可􅀒而行産潮循山中鄉人採之取殻以貨要全其殻湏以木楔其肉􅀛吼如牛聲響山谷廣州有巧匠取其甲以爲梳箆盃器之属水母廣志曰水母如羊􅠛在海中常浮聞人聲沉水底可生切食沈懷逺南越志曰海岸間育水母東海謂之蛇音蜡張茂先􅀶物志曰東海有物􅃺如凝血廣數尺正方圎名曰水母無頭目所處則衆蝦附之隨其東西南北可煑食之異物志曰水母在海汎汎常浮其躰正白常在水上浮也嶺表録異曰水母廣州謂之水母閩人謂之䖳癡駕切其形乃渾然凝結一物有淡紫色者大如覆帽小者如盌腹下有物如懸絮俗謂之足而無口眼常有數十蝦􅀉腹下咂食其涎浮汎水上捕者或遇之即歘然而没乃是蝦有所見耳越絶書云海鏡蟹爲腹水母即蝦爲目也南中好食之海鏡嶺表録異曰海鏡廣人呼爲膏葉盤兩片合以成形殻圎中甚瑩滑日照如雲母光内有少肉如􅑕胎腹中有小蟹子其小如豆黄而螯足具備海鏡飢則蟹出拾食蟹飽歸腹海鏡亦飽余曽市得數箇驗之或迫之以火即蟹子走出離腸腹立斃或生剖之有蟹子活在腹中逡廵亦斃太平御覽卷第九百四十三
