front:
  text: 太平御覽卷第四十四
  hash: sha256:42e8b33bd5c85ccfa677ba4eb32f2961f3c832737a38cbe1bcddd1985ceec88f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_044-1a}
body:
  text: 地部九􅀜中蜀漢諸山呉山驪山龍首山九嵕山嶻嶭山鷄頭山牛首山藍田山笄頭山賀蘭山太白山五將山仇池山青城山卭崍山岷山石鏡山綏山覆舡山牛頭山董政山彭亡山鼎􅈹山靈臺山黃厥山靈山猿門山金山五婦山玉女山祁山閬山盤龍山銅梁山髙梁山青石山雲南山禺同山弔鳥山呉山周禮雍州其山鎭曰呉嶽孫炎曰雍州鎭有呉嶽山也郭璞曰呉嶽别名開山漢書地理志云呉山在汧縣西國語謂之西呉秦都咸陽以爲西岳酈元水經注云流水水發南山西側俗以此山爲吴山其山三峯望之􅁪有落􅀔山下有石穴廣四尺髙七赤水溢石穴懸波傾注涌瀾奔盪發源成川北流注于汧是也驪山三輔故事曰始皇葬驪山起陵髙五十丈下錮三泉周廻七百歩以明珠爲日月魚膏爲脂燭金銀爲鳬鴈金􅅙三十箱四門施徼奢侈太過六年之間爲項籍所發放羊兒墮羊􅊘中燃火求羊燒其槨藏述征記曰長安東則驪山西則白鹿原北望雲陽悉見山阜之形而􅁪􅀂在雲霧之中孟康曰昔周幽王恱褒姒姒不􅀏王乃擊鼔舉烽以徴諸侯至而無冦褒姒乃􅀏王甚恱之及犬戎至王舉烽以徴諸侯不至王遂敗身死于驪山之北龍首山辛氏三秦記云龍首山長六十里頭入渭水尾連樊川頭髙二十丈尾漸下髙五六丈土赤不毛昔有黒龍從山出飲水其行道成土山今長安城即䟽山爲臺殿基址不假築其含元殿即龍首山之東麓髙敞爲京城之最階髙於平地三十餘尺南去丹鳯門四百餘歩中無間隔左右寛平東西廣百歩兩都賦云漢之西都寔曰長安左據凾谷二崤之岨右界褒斜龍首之險表以太華終南之山帶以洪河涇渭之川即此山之形勢也九嵕山四夷郡國縣道記曰九嵕山東連仲山西當涇水出焉九嵕髙六百五十丈周十五里在咸陽嶻嶭山四夷郡國縣道記曰嶻嶭山在雲陽縣東北十里一名慈峨山俗嵯峨山頂有雲起即雨里人以爲􅀱昔黃帝鑄鼎於此山鷄頭山崔鴻十六國春秋云石生不能守長安欲西上隴士卒散盡遂入鷄頭山爲追兵所害山在鄠縣東牛首山山海經曰牛首山澇水出焉而注于潏水是多飛魚狀似魽可療痔疾又云牛首山有􅀑草赤莖葉如葵莠如禾服之使人不憂藍田山後魏風土記云藍田山巓方二里仙聖遊集之所劉雄鳴學道於山下有祠甚嚴亦灞水之源此西又有尊盧氏陵次北又有媧氏谷則知此地是三皇舊居於是笄頭山史記云黃帝西至于崆峒笄頭山圖經云笄頭山在涇陽西禹貢涇水所岀淮南子云薄落山一名笄頭山注水經云大隴之山異名耳莊子謂廣成子學道於崆峒之山亦黃帝問道於廣成子盖在此山按今肅州又有崆峒山未詳孰是今此見有栢堂在山頂上不知何代所置也後漢隗囂使王孟塞雞頭道謂此山也賀蘭山涇陽圖經曰賀蘭山在縣西九十三里山上多有白草遥望青白如駮比人呼駮馬爲賀蘭鮮卑等􅀋多依山谷爲氏族今賀蘭姓者皆因此山名太白山辛氏三秦記曰太白山南有陳倉山山有石與山雞不别趙髙燒山雞飛去晨鳴山頭聲聞三十里或謂是玉雞録異傳云秦文公時雍南山有大梓樹文公伐之輙有大風雨樹生合不斷有一人病夜往山中聞有􅀑語樹神秦􅀂使人􅀍髪以朱􅁝繞伐樹汝得不憂否文公如其言伐樹樹斷中有一青牛岀走入澧水中復岀使􅀐擊之不勝􅀐墮地復上髪解牛乃畏之入水不出故置髦頭􅀐也五將山崔鴻十六國春秋云符堅爲慕容冲所逼長安城中有書曰帝出五將乆長得免是又謠曰堅入五將長得堅大信之率􅀐數百出五將宣告州郡期以孟冬救長安堅至五將山姚萇遣將軍呉忠圍堅衆奔散忠執堅以歸新平即此山也仇池山辛氏三秦記云仇池山上有百頃地平如砥其南北有山路東西絶壁百仞上有數萬家一人守道萬夫莫向山勢自然有樓櫓却敵之狀東西二門盤道可七里上有岡阜泉源史記謂秦得百二之固也西晉末爲氐陽茂捜所據於山上立宫室囷倉皆爲板屋乃氐之所理於此今謂之洛谷道是也秦州記曰仇池山本名仇維山􅄱似覆壷上廣百頃下周數十里髙二十餘里壁立千仞自然樓櫓却敵分置均調竦起數丈有如人力也青城山福地記曰青城山髙三千六百丈周匝五千里有甘露芝草天池醴泉玉匱經云黃帝封爲五岳丈人乃岳瀆之上司眞仙之崇秩一月之内群岳再朝六時灑泉以代晷漏一名赤城一名青城都一名天谷山亦爲第五大洞寳仙九室之天對郡之西北在岷山之南群峯掩映㸦相連接靈仙所宅祥異則多益州記云崗蠻㠋連嶺千里上有仙都地理志云西徹之外江水所出天彭青城連峯不絶李膺記云入山七里至赤石城有羊馬臺三師壇上五里至瀑布水澗二百歩有二石梯有一石笋髙三丈過二石門絶崖數百丈下起常道觀髙峯下有氷六時灑落東北有二石室名龍宫可容百餘人從龍宫過石室至石梯名龍橋又有一石梯洞穴深淺莫知所極西北有石室宛然見存又有黃帝壇石法天地上圎下方闊一丈二尺有十二角觀東有石日月各闊五尺厚一尺二寸相對柱上烏兎煇鑠方圎磅礴可觀五岳真形圗云洞天所在之處其下别有日月分精以照其中龍橋處二山相去百餘歩其峯危竦相對橋在峯首其橋中半漸漸促小可六七寸長一丈五尺兩邊懸崖俯臨不測山傍有誓石天師張道陵與􅀑兵爲誓朱筆􅀞山青崖中絶今驗斷處石並丹色闊二十丈深六七丈望之赩然卭崍山山海經曰崍山江水岀焉今在漢嚴道縣南中江所岀有九折坂出貘似熊其陽多黃金其隂多麋其木多檀柘也華陽國志曰嚴道縣縣有卭崍山山上凝氷夏結廻曲九折王陽去官之所岷山山海經曰岷山江水岀焉而東海注于大江其中多恠蛇有鳥焉其狀如鴞而赤身白首其名曰竊脂可以禦火石鏡山華陽國志曰疊州合川縣石鏡山在縣西北四十五里其山有石瑩皎絜照之莫不備見形體故謂之石鏡山山下又有銅窟隋􅀄於此置監鼔鑄錢刀焉綏山列仙傳曰葛由者蜀之羗人周成王時刻木爲羊賣之一旦乗木羊入蜀蜀中王侯賔之上綏山山在安固縣東三十里隨之人皆得仙術覆舡山十道録曰覆舡山堯遭洪水維舟樹下舡因覆焉又益州記云覆舡山中十五里有七里坂一名羊腹坂屈曲有壁立難昇之路牛頭山九州記云牛頭山首日􅁑仙翁多遊於此今立爲寺與白獸山相連昔秦時有白獸爲害夷人射因刻白石於此山今遺像尚存董政山十道記曰董政山隋開皇中縣令董叔封髙雅之士去官之後民咸思其德因指此山爲董政山彭亡山十道記曰彭亡山後漢將軍岑彭征公孫述於此山戰死故號曰彭亡山鼎鼻山十道記曰鼎鼻山周道衰微九鼎淪一於此山之下其水清澄今民猶或見其鼎耳靈臺山十道記曰靈臺山在縣北一名天柱山髙四百丈即漢張道陵昇眞之所郡國志曰靈臺山天柱崖下有一桃樹髙五尺皮是桃心肉似栢張道陵與王良趙昇試法於此四百餘年桃迄今不朽小碑記之黃厥山郡國志曰黃厥山有鍾乳穴十九又西岸有自然石塞其下流水上有一懸石似罄驚之有聲可聽靈山郡國志曰靈山昔有神女於此擣衣因號擣衣山山南絶巖有方石明瑩謂之玉女擣練砧又有盤龍山以山形如盤龍也猿門山益州記云猿門山在涪縣之北二十五里上多猿其山二峯磔堅如門故曰猿門金山益州記曰金山在涪縣東五十歩東臨澗水光照映川又李膺記云金山長七八里每夏潦雨有崩處即金粟散出是也五婦山蜀記云梓橦縣有五婦山一名五婦臺秦王遺蜀王美女五人蜀王遣五丁迎女至梓橦五丁蹋地大呼驚五女並化爲石蜀王築臺登而望之因名爲五婦􅀱臺焉玉女山梁州記云肥城東南有玉女山山有一石穴中􅀂房宇有玉女入穴不出穴前有脩竹下有石壇風微動竹拂壇如箒祁山􅀜山圖曰漢陽西南有祁山九州之名阻天下之竒峻蜀志云建興六年諸􅁑亮率師攻祁山不扳即謂此也又按九州志云祁山上有髙樓武陟二神祠每歳郡邑祀之又周地圖地記云其城即漢時守將所築閬山閬山圖經曰閬山四合於郡故曰閬中按名山志云閬山多仙聖遊集焉盤龍山李膺益州記云閬中盤龍山南有一石長四十丈髙五尺當中有户及扇􅀂人之掩􅐬古老以爲玉女房銅梁山左太冲蜀都賦云外貟銅梁宕渠張孟注云銅梁山名也按其山有桃枝竹西連亘二十餘里山嶺之上平整逺望諸山而此獨秀也山在州南九里髙梁山江源記云南浦郡髙梁山尾東跨江西首劒閣東西數千里山嶺長峻其峯崔嵬於蜀市望之􅀂長雲垂天一日行之乃極其頂俯視衆山泯􅀂平原劒閣銘可謂岩梁山積石峨峨即述此也青石山益州記云昔巴蜀爭界乆而不決漢髙帝八年一朝宻霧石爲之裂今猶如之自上及下破處直􅀂引繩焉於是州界始判山上有古神祠甚靈今名青石山雲南山九州要記云雲南郡山山有祠處石室稱黃石公祀之必用􅁓一百張筆一􅀟墨一丸室内有啓必知􅁻㓙但不見其形禺同山九州要記曰禺同山有金馬碧雞之祠弔鳥山九州要記曰弔鳥山在葉檢縣葉檢則雲南郡廢邑也山上有鳥千百群飛啁啾一歳必一度大集即鳯皇死也太平御覽卷第四十四
