body:
  text: 人事部一百三十五詭詐􅀃文曰詭責也又撗射物爲詭詐欺也詩曰無縱詭隨以謹無良禮曰用人之智去其詐論語曰古之愚也直今之愚也詐戰國䇿曰楚懷王拘張儀將殺之靳尚爲請王之幸夫人鄭䄂曰子亦自知且賤於王乎鄭䄂曰何尚曰張儀者秦王之忠信有功臣也今楚拘之秦王欲岀之秦王有愛女美又簡擇宫中佳麗習音者以從之資以金玉寳器以上庸六縣爲湯沐邑欲因張儀内之楚王必受之而忘子子踈必矣鄭䄂遽說王出張子又曰張丑爲賈於燕燕王欲殺之走且岀境境吏得之丑曰燕王所爲將殺我者人有言我有寳珠也今我巳亡矣而燕王不我信今子致我我且言子之奪我珠而吞之燕王必且殺子刳子之腹君不可􅀃吏恐而赦之史記曰趙武靈王立吴􅁎子何爲惠文王自號爲主父令何主治國而自胡服將士大夫西北略胡地而欲從雲中九原直南襲秦於是詐自爲使者入秦秦昭王不知而恠其􅃺甚偉非人臣之量使人逐之而主父馳巳脫門矣秦人大驚主父所以入秦者欲自略地因觀秦王爲人也又曰張儀􅀃楚王曰大王誠能聽臣閉􅀜絶約於齊臣請獻啇於之地六百里使秦女得爲大王箕箒之國楚王大恱而許之遂閉􅀜絶約於齊使一將軍隨儀儀至􅁗陽失綏墮車不朝三日楚王聞曰以寡人絶齊未甚邪乃使勇士至宋借宋之符北罵齊王齊王大怒折節下秦秦齊之交合儀乃朝謂楚使曰臣有奉邑六里願獻大王左右使者曰臣受命於王以啇於之地六百里不聞六里還報楚王大怒又曰新垣平使人持玉柸上書闕下云有寳玉氣來者臣巳視之果有獻玉柸者刻曰人主延壽平又言臣候日再中於是始更以十七年爲元年令天下大酺平言曰臣望汾隂有金寳氣意周鼎其出乎其見不迎則不至於是上使治廟汾隂南臨河欲祠出周鼎人有上書告新垣平所言皆詐也漢書曰陳勝吴廣起兵乃丹書帛曰大楚興陳勝王置人所􅊻魚腹中卒買魚烹食得而恠之又令廣隱社作狐鳴曰陳勝王吴廣相又曰韓信與家臣謀欲發兵攻吕后其舎人得罪信囚欲殺之舎人弟上書告信欲反狀於吕后后乃與蕭何謀詐令人從上所來言陳豨巳死羣臣皆賀相國紿信曰雖病強入吕后使武士縛信斬之長樂鍾室信方斬曰吾不用蒯通之計反爲女子所詐豈非天哉又曰孝惠張皇后宣平侯敖女也吕太后欲爲重親以公主女配帝欲其生子時方無子迺使佯爲有身取後宫美人子名之殺其母立所名子爲太子又曰人不患其不知患其爲詐也又曰宣帝始元五年有男子來乗黄犢車衣黄䄡䄖着黄帽詣北闕自稱衛太子京兆尹雋不疑收􅅞之廷尉驗治卒得姧詐又曰􅀓介子與士卒俱賫金幣揚言以賜外國爲名至樓蘭王意不信介子佯引去至其西界使譯謂曰漢使者持黄金錦繍行賜諸國王不來受我去之西國矣即出金幣以示譯譯報王王貪漢物來見使者介子與坐飲陳物示之飲酒皆醉介子謂王曰天子使私報王王起隨介子入帳中屏語壯士二人從後刺之刄交胷立死又曰李廣以衛尉爲將軍出鴈門擊匈奴匈奴兵多破廣軍單于素聞廣賢令曰得李廣必生致之胡􅀐得廣佯死得脫匈奴􅀐數百追之廣行取弓射殺追􅀐又曰梓潼人哀章學問長安素無行見王莽居攝即位作銅匱爲兩檢書言王莽爲行天子即日昬時衣黄衣持匱至髙廟莽至廟拜受金匱又曰匈奴㓂邊甚王莽乃大募天下有竒􅇊術可以攻匈奴者將待以不次之位言便冝者以萬數或言能渡水不用舟楫或云不持升糧服食藥物三軍不飢或言能飛一日千里可窺匈奴輙試之取大鳥翮爲兩翼頭與身皆着毛通引環紐飛百歩隨莽知其不可用苟欲獲其名皆拜爲將軍賜以車馬范曄後漢書曰王郎起北州擾惑吴漢素聞世祖長者獨欲歸心乃􅀃太守彭寵岀止外亭念所以譎衆未知所出望見道中有一人似儒生者漢使人召入爲具食問以所聞生因言劉公所過爲郡縣所歸邯鄲舉尊號者實非劉氏漢大喜即詐爲丗祖書移檄漢陽使生賷以詣寵令具以所聞􅀃之漢復隨後入寵甚然之於是遣漢將兵擊王郎又曰王莽時尚書缺詔將大夫六百石以上試對政事天文道術以髙第者􅀘之翟酺自恃能髙而忌太史令孫懿恐其先用乃往候懿旣坐言無所及唯涕泣流連懿恠而問之酺曰圖書有漢孫登以才智爲中官所害􅀚君表相似當應之酺受恩接愴君之禍耳懿憂懼移病不試由是酺對第一拜尚書又曰靈帝時宦官得志並起第擬則宫室帝甞登永安候臺宦官恐其望見居處乃使中大夫尚坦諌曰天子不當登髙登髙則百姓虚散自是不敢升髙東􅀚漢記曰和熹鄧后臨朝權在外戚杜根以安帝年長冝親政事乃與同時郎上書直諌太后大怒収執根等令盛以嫌囊於殿上撲殺之執法者以根知名語行事人使不加力旣而載出城外根得蘇太后使人檢視遂詐死三日目中生蛆因得迯竄也又曰隗囂敗公孫述懼欲安其衆成都郭外有秦時舊倉改名白帝倉自王莽以來常空述詐使人言白帝倉出􅂖如山陵百姓空市里往􅀚之述乃大㑹群臣問曰白帝倉岀􅂖乎皆對言無述曰訛言不可信道隗王破者復如此矣又曰臧宫將兵至中盧屯駱越是時公孫述將田戎任滿與征南大將軍岑彭相拒於荆門彭等戰數不利越人謀叛從蜀宫兵少力不能制㑹属縣送委輸車數百宫夜使鋸断城門限令車周轉岀入至旦越人候伺者聞車聲不絶而門限断相告以漢兵大至其帥乃奉牛酒以勞軍魏志曰司馬宣王稱病因李勝出爲荆州刺史曹爽等令勝辭宣王自陳無它功効撗䝉時恩當爲本州宣王令兩婢侍邊持衣衣落復上指口言渇主飲婢進粥宣王持杯飲粥皆流岀沾􅅐勝􅉖然爲之涕泣曰今主上尚㓜天下頼明公然衆情謂公舊風病發何意尊體乃尓宣王徐更言年老沉疾死在旦夕君當屈爲并州并州近胡好善爲之恐不復相見如何勝曰當遷夲州非并州宣王仍復陽爲惛謬曰君方到并州努力自愛錯亂其辝狀如荒語勝復曰當忝夲州非并州也宣王乃􅀂微悟者謂勝曰懿年老意荒不解君言今當與君别自顧氣力轉微後必不更㑹同欲自力設薄主人生死共別今師昭兄弟結君爲友因流涕哽咽勝亦長歎吴志曰孫峻謀置酒誅諸􅁑恪恪將見駐車宫門峻巳伏兵於帷中恐恪不時入事洩自出見恪曰使君􅀂尊體不安自可湏復當具白主上欲以甞知恪意荅曰當力人散􅀐常侍張約朱思宻書與恪曰今日張設非常疑有佗故恪省書而去未出門逄太常滕裔恪曰卒腹痛不任入裔不知峻計謂恪曰君自行旋未見今上置酒請君巳至門直當力進恪踟蟵而還劒履上殿謝亮還坐設酒峻因曰使君疾未善平當有常服藥酒自可取之恪意乃安則飲所賫酒數行亮還入内峻起如厠着短服岀曰詔收諸􅁑恪恪驚起杖劒未殊而峻刄交下晉書曰謝􅀇等旣破符堅有驛書至謝安安方對客圍碁看書旣竟便攝放牀上了無喜色碁如故客問之徐荅云小兒輩遂巳破賊旣罷還内過户限心喜甚不覺屐齒之折其矯情鎮物如此又曰桓玄以歴代咸有肥遁之士而巳丗獨無乃徴皇甫謐六丗孫希之爲著作并給其資用皆令讓而不受号曰髙士時人名爲充隠又曰紀瞻爲㑹稽内史時有詐作大將軍府符收諸吏曁令令巳受拘瞻􅁴其詐便破檻出之訊問使者果伏詐妄又曰崔洪口不言貨財手不執珠玉汝南王亮甞讌公卿以琉璃鍾行酒酒及洪洪不執亮問其故對曰慮有執玉不趍之義故尓然實乖其常性故爲詭也晉中興書曰晉元帝叔父東安王繇爲成都王頴所害懼禍及謀岀奔其夜月明禁衛甚嚴不能得去有頃天􅁀風􅀨晦􅁳邀者散帝乗間得脫至河陽爲津吏所止從者宗典後至以馬鞭拂之謂曰舎長官禁貴人而汝􅀍駐耶因大􅀏由是􅀍釋又曰温嶠知王敦不可復諌乃潜謀滅之先夙夜綜其府事而附其欲錢鳯敦所信也嶠謂人曰錢丗儀精神滿腹嶠素有知人之稱鳯聞而恱之深結好於嶠㑹丹陽尹缺嶠說敦曰京尹輦轂喉舌宜得文武兼之公冝自選其才敦然之問嶠誰可作者嶠曰愚謂錢鳯可用然裁之在公敦思惟良乆曰無復勝君嶠即苦辭敦不從表􅀘丹陽尹猶懼錢鳯爲之姧因敦置酒與嶠别嶠曰違離宇下情戀不巳願自起行酒以展􅄮路之心行酒至鳯未飲嶠因僞醉以手板擊鳯幘爲之墜作色曰錢鳯何人温太真行酒而敢不飲鳯不恱敦以爲醉兩釋之明日鳯曰嶠與朝廷甚宻必未可信或懷反噬冝更思之敦曰太眞昨醉小加聲色豈得以此相詭貳由是鳯謀不行而得還都又曰王允之年在捴角敦深知之謂爲似巳入則共寢甞夜飲辭曰醉先眠敦將錢鳯計逆允之悉聞慮敦或疑於眠處大吐敦果照視見眠吐中不復疑之唐書曰李義府擢拜中書侍郎同中書門下三品􅁥修國史賜爵廣平縣男義府貌狀温恭與人語必嬉怡微􅀏而􅄶忌隂賊旣處權要欲人附已微忤意者輙加傾䧟故時人言義府􅀏中有刀又以其柔而害物亦謂之李猫尹文子曰虎求百獸食之得狐狐曰子無食我也天帝令我長百獸今子食我是逆天帝命也子以我言不信吾爲子先行子隨我後觀百獸之見我不走乎虎以爲然故遂與行獸見之皆走虎不知獸之畏已而走以爲畏狐也韓子曰司城子罕謂宋君曰慶賞賜予者民之所好也君自行之誅罰殺戮者民之所惡也臣請當之於是戮細民而誅大臣君曰與子罕議之居朞年民知死生命制於子罕故一國歸焉子罕親刼奪宋之政淮南子曰夫狐之搏雉也卑體弭毛以侍其來也雉見而信之故可得而禽也使狐瞑目見其必殺之􅀔雉亦知憚驚逺飛以避其怒矣夫人僞詐以相欺非直禽獸詐也呉越春秋曰要離爲王殺慶忌曰請以罪岀走殺臣之妻子焚之吴市飛楊其􅁅購臣千金與百里之邑詐徃慶忌必信臣也王曰諾要離以罪出走王殺其妻子焚之吴市飛揚其􅁅購之千金與百里之邑吕氏春秋曰趙簡子病召太子告曰我則死巳葬上夏屋之山以望簡子死巳葬襄子上夏屋以望代曰先君必以此殺之也反歸慮所以取代乃先善之代君好色請以其弟妻之襄子謂代君而請觴之先令舞者置兵羽中數百人又先具大金斗代君至酒酣舉斗而擊之腦塗地舞者操兵以闘盡殺其從者陸賈新語曰秦二丗之時趙髙駕鹿而從行王曰丞相何爲駕鹿髙曰馬也王曰丞相誤耶以鹿爲馬也髙曰乃焉也陛下以臣之言爲不然願問群臣於是乃問群臣群臣半言馬半言鹿當此之時秦王不敢信其目而從邪臣之言鹿與馬之異形乃衆人之所知也然不能别其是非况於闇昧之事乎王符潜夫論曰昔紂好色九侯聞之乃獻厥女紂則大喜以爲天下之麗莫􅀂此也以問妲己妲己懼進御而奪巳愛也乃爲俯而泣曰君王年旣老耶明旣衰耶何貌惡之􅀂此而覆謂之好也紂於是渝而以爲惡妲己恐天下之愈進美女因曰九侯之無道也乃欲以此惑君王也而弗誅何以革後紂則大怒遂脯淑女而烹九侯論衡曰儒書稱武王伐紂太公隂謀食小兒以丹令身絶赤長大教言啇亡啇民見身赤以爲天神及言啇亡皆謂啇滅世􅀃曰鍾㑹宻白鄧艾有反􅃺㑹善効人書於劒閣要艾章表白事皆易其言令辭指倨傲多自矜伐葛仙公別傳曰時有一老人頗能治病從中國來其人言年巳數百歳後他坐仙公欲知此公定年俄一人從天下舉坐瞻目良乆集地着朱衣進賢冠即問此公曰天遣我來問君定年幾何故欺詐民人速以實對公大怖下地長跪言曰無􅃺實九十三仙公因撫手大􅀏忽然失朱衣人所在太平御覽卷第四百九十四
