  text: 太平御覽卷第二百九十四
  hash: sha256:85410f88250254100bada79e3b34f0c793e59c5d92e9de29554919df6a369b83
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_294-1a}
body:
  text: 兵部二十五示弱示強示弱孫子曰兵者詭道也無常形以詭詐爲道􅀂息侯誘蔡楚子謀宋也故能而示之不能用而示之不用言巳實能用師外示之怯也􅀂孫臏示弱而制龐㳙近而示之逺逺而示之近欲進而理去道也言多疑設其近誑曜敵軍示之以逺本從其近􅀂韓信之襲安邑陳舟臨晉而渡夏陽又曰古之善用兵者能使敵人前後不相及衆寡不相待貴賤不相求上下不相扶卒離而不集兵合而不齊多設詐変出東見西攻南引北亂之使彼張惶離亂而不集聚也合於利而動暴之使離亂之使不齊動兵而戰之不合於利而止左傳曰蔡聲子謂楚令尹屈建曰􅀂敖之亂伯賁之子苗賁皇奔晉以爲謀主及鄢陵之役楚晨壓晉軍而陣苗賁皇曰楚師之良在中軍王族而巳􅀂塞井夷竈成陣以當之欒范易行以誘之欒書時將中軍范爕佐之易行謂簡兵備欲令楚貪巳而不復顧二穆之兵易以豉反行胡郎反中行二郤必克二穆郤錡時將上軍中行偃佐之郤至佐新軍令此三人分良以攻二穆之兵楚子重子辛皆出穆王故日二穆吾乃四萃於王族必大敗之四萃四靣集攻之也晉人從之楚師大敗王夷師􅑒夷傷也呉楚之間謂火滅爲􅑒子廉切子反死之鄭叛呉興則苗賁皇之爲也戰國䇿曰趙將李牧常居代鴈門備匈奴以便冝置吏市租皆輸入于幕府爲士卒費日擊數牛饗士習􅀐射謹烽火多間諜厚遇戰士爲約曰匈奴即入盗急入收保有敢捕虜者斬匈奴毎入烽火謹趣入收保不敢戰如是數歳亦不亡失然匈奴謂牧爲怯趙王讓牧牧如故王怒使人代將歳餘匈奴毎來岀戰數不利復遣牧牧至如故約匈奴數來道狹而旁多阻隘可伏兵乃斫大樹白而書之曰龐㳙死于此樹之下於是令萬弩夾道而伏期曰暮見火舉而俱發龐㳙夜至斫木下見白書乃鑚火燭之讀書未畢齊軍萬弩俱發軍大亂龐㳙乃自剄曰遂成竪子之名漢書曰韓王信反髙帝自往擊至晉陽聞信與匈奴欲擊漢帝使人使匈奴匈奴匿其壯士肥牛馬徒見其老弱及羸畜使者十軰來皆言匈奴易擊帝使劉敬復往使匈奴還報曰兩國相擊此冝誇矜見所長見示也今臣往徒見羸胔老弱胔音漬一說讀日瘠瘠瘦也此欲見短伏竒兵以爭利愚以爲匈奴不可擊也是時漢兵以踰句注三十餘萬衆兵巳業行帝怒以爲沮吾軍阻謂止壞也械繫敬廣武遂往至平城匈奴果出竒兵圍髙帝白登七日然後得解漢書曰孫䇿遣軍攻陳登於匡􅄾城賊􅀄到旌甲覆水郡下衆寡不敵登乃閉門自守示弱不戰將士銜聲寂􅀂無人登乗城觀􅄱勢知其可擊乃申命士衆宿整兵器昧爽開門引軍指賊營歩􅀐抄其後賊周章方結陣不得還舩登縱兵乗之賊遂大敗晉書曰李矩守滎陽城前趙劉聦將劉暢歩􅀐三萬討矩屯于韓王故壘相去七里遣使招矩時暢卒至矩未暇爲備遣使奉牛酒詐降于暢潛匿精勇見其老弱暢不以爲虞大饗渠帥人皆醉飽矩謀夜襲之暢僅以身免又曰慕容寳載記曰魏伐并州驃􅀐李農逆戰敗績寳引群臣于東堂議之尚書封懿曰今魏師十萬天下之勁敵也示之以弱岨􅀜拒戰計之上也陳書曰武帝東討杜龕侯安都軍守北齊軍人據石頭遊騎至于闕下安都閉門偃旗幟示之以弱耳令城中曰有登陴看賊者斬及夕賊收軍還石頭安都夜令士卒密營禦敵之具明辰賊又至安都率甲士三百人開東西掖門與戰大敗之賊乃退還石頭不敢復逼臺城後周書曰隋文帝作相之􅀄尉遲逈拒命遣將崔仲文率兵定􅀜東軍次蓼隄逈將檀讓擁衆數萬仲文以羸師戰讓悉衆來拒仲文僞北讓軍頗驕於是遣精兵左右翼擊之大敗讓軍進攻梁郡逈守將劉子寛弃城遁走隋書曰煬帝大業中彭城賊張大彪宋丗模等衆至數萬作保縣薄山㓂掠徐兖隋將董純討之純􅀄閉營不與戰賊屢桃之不出賊以純爲怯不設備縱兵大掠純選精銳擊賊合戰於昌慮大破之斬首萬餘級築爲京􅀚又曰隋末山賊孟讓衆號十萬屯盱眙煬帝遣王充保都梁山以拒之乆不與戰乃宣言士卒亡叛使賊中聞之讓果大􅀏曰王充文法吏何能爲將吾當生􅅞之於是進攻其柵充與戰佯不勝讓益輕之乃分兵虜掠充知其可擊令軍中移竈撤幕設方陣四靣而出戰大破之虜男女十萬餘口讓僅以身免六韜曰武王問太公曰敵人先至巳據便地形􅀔又強則如之何對曰當示以怯弱設伏徉走自投死地敵見之必疾而赴擾亂失次必離固所入我伏兵齊起急擊前後衝其兩旁示強左傳曰楚將子元以車六百乗伐鄭師入桔祑之門桔祑鄭逺郊之門也又入自純門及逵市純門鄭外郭門也逹市郭内道上市也懸門不發楚言而出子元曰鄭有人焉懸折門施折於内城門鄭示楚以間暇故不閑城門出兵而效楚言故子元畏不敢進也諸侯救鄭楚師夜遁鄭人將奔桐丘諜言曰楚幕楚囯有烏乃止幕帳也又曰楚大饑戎伐其西南戎山夷也庸人帥羣蠻以叛楚庸楚屬之小國麋人率百濮將伐楚百濮夷也於是申息之北門不啓備中國也楚人謀徙於阪髙楚險地也蔿賈曰不可我能往㓂亦能往不如伐庸夫䴢與百濮謂我饑不能師故伐我我􅀂出師必懼而歸百濮離居將各走其邑誰暇謀人乃出師旬有五日百濮乃罷自廬以徃振廪同食往往伐庸也振發也廪倉也同食上下無異饌也又曰晉文公率諸侯伐楚楚子王從晉師晉退三舎楚師不止又次于城濮楚師背􅈶而舎􅈶丘陵險阻名也􅈶音携文公患之聽輿人之誦恐衆畏險故聽其歌誦也曰原田莓莓舎其舊而新是謀髙平日原喻晉軍羙盛􅀂原田草也莓然可以謀立新功不足念舊惠也晉大夫狐偃曰戰也􅀾而捷必得諸侯􅀂其不捷表裏山河必無害也晉國外河而内山也晉車七百乗韅靷鞅靽五萬二千五百人也在背曰􆀁在􅇩曰靷在腹曰鞅在後曰靽言駕乗修備韅呼見切靷與進切晉侯登有莘之墟以觀師曰少長有禮其可用也有莘故國名也遂伐其木以益其兵伐木以益攻􅀾之具盖亦示強也終敗楚師又曰晉侯伐齊齊侯登巫山以觀晉人使司馬斥山澤之險雖所不至必斾而䟽陣之斥􅀱也䟽建旌旗以爲陣示衆也使乗車者左實右僞以斾先僞以衣物爲人􅄱也建斾以先驅輿曳柴而從之以揚塵齊侯見之畏其衆也乃脫歸脫不張旌幟也又曰蔡聲子聘楚謂令尹屈建曰子儀之亂折公奔晉以爲謀主繞角之役析公曰楚師輕佻易震蕩也􅀂多鼔鈞聲以夜軍之鈞同其聲楚師必遁晉人從之楚師宵潰晉遂侵蔡襲沈獲其君敗申息之師于桒隧獲申麗而還鄭於是不敢南靣楚失諸華則析公之爲也漢書曰景帝時匈奴大入上郡天子使中貴人從李廣中官之幸貴也勒習兵擊匈奴貴人將數十􅀐出獵見匈奴三人與戰􅀍射傷中貴人煞其􅀐且盡中貴人走廣廣曰是必匈奴射鵰者也鵰善飛故使善射者射之廣乃遂從百􅀐徃馳三人令􅀐左右翼而廣身射彼三者殺其二人生得一人果射鵰者也遥見匈奴有數千􅀐廣以爲誘􅀐驚上山陣廣之百􅀐皆大恐還馳走廣曰吾去大軍數十里今􅀂走匈奴追射我立盡今我留匈奴必以我爲大軍誘之必不敢擊我廣令諸􅀐曰前到匈奴陣二里所止令曰皆下馬解鞌其􅀐曰虜多且近即急奈何廣曰彼虜以我爲走今皆解鞌以示不走用堅其意胡􅀐遂不敢擊有白馬將出護其兵於是廣上馬與十餘􅀐奔射殺之而復還至其􅀐中解鞌令士皆縱馬卧是時㑹暮胡兵終恠之卒不敢擊向夜半時胡兵以爲漢有伏軍於旁欲夜取之皆引兵去詰朝廣乃歸其軍後漢書曰廉范爲雲中太守㑹匈奴大入塞范自率士卒拒之虜衆盛不敵㑹日暮令軍士各交􅅞兩炬三頭然火虜遥見火多謂漢兵救至待朝將退范乃令軍中蓐食晨徃擊之斬首數百級虜自此不敢復向雲中又曰虞詡爲武郡太守以討叛羌羌乃率衆數千遮詡於陳倉崤谷詡即停軍不進而宣言上書請兵須到當發聞之乃分抄傍縣詡因其兵散日夜進道兼行百餘里令吏士各作兩竈或曰孫臏減竈而君増之兵法日行不過三十里以戒不虞而今日且二百里何也詡曰虜衆多吾兵少徐行則易爲所及速進則彼所不測虜見吾竈日増必謂郡兵來迎衆多行速必憚追我孫臏見弱吾今示強勢有不同故也旣到郡兵不滿三千而羌衆萬餘攻圍赤亭數十日詡乃令中使強弩勿發先用小弩羌以爲矢力弱不能至并兵急攻詡於是使二十強弩共射一人發無不中羌大震退詡因岀城奮擊多所傷殺明日悉陳其衆令從東郭門出北郭門入換易衣服廻轉數周羌不知其數更相恐動詡計賊當退乃潛遣五百餘人於淺水設伏􅀱其走路虜果奔因掩擊大破之通典曰後漢末陳登爲廣陵守孫䇿遣軍攻登於匡􅄾城登使人求救於曹公而密去城十里理軍營處所令多取柴薪兩束一聚相去十歩從横成行令俱起火牙燃其聚城上稱慶􅀂大軍到賊覩火驚潰登勒兵追奔斬首萬級也又曰蜀大將諸葛亮屯于陽平并兵東下亮唯留萬人守城魏將司馬宣王率二十萬衆拒亮當亮六十里所􅀱邏白宣王說亮在城中力弱將士失色亮是時意氣自􅀂勑軍皆卧旗息鼔不得輙出卷幔開四門掃地却洒宣王疑其有伏於是引軍北趣山亮謂叅佐曰司馬懿謂吾有強伏循山走矣􅀱邏還白亮所言宣王深以爲恨又曰西晉將杜元凱伐呉陳兵于江陵遣牙門管定周􅈲伍巢等率竒兵八百汎舟夜度以襲樂郷多張旗幟起火巴山出於要害之地以奪賊心呉都督孫歆震恐與呉將伍延書曰北來諸軍乃飛渡江也皆破之又曰東晉末宋武帝爲將討海賊孫恩恩在扈瀆海鹽令鮑陋遣子嗣之以呉兵一千請爲前驅宋武曰賊兵甚精呉人不習戰􅀂前驅失利必敗我軍可在後爲聲援不從是夜宋武多設伏兵兼置旗鼔然一處不過數人明日賊率衆乃萬餘迎戰前驅旣交諸伏皆舉旗鳴鼔謂四靣有軍乃引退嗣之追奔爲賊所没宋武且戰且退賊旣盛所領死傷且盡宋武慮不免至向伏兵處乃止令左右脫取死人衣賊謂當走反停疑猶有伏宋武因呼更戰氣色甚猛賊以爲然乃引軍去宋武徐歸然後散兵稍集又日東齊末桓􅀇簒晉宋武帝起義討玄使將桓謙何湛之屯覆舟山武帝使羸弱登蔣山多張旗幟􅀇不之測大懼武帝與劉毅等分爲數隊進突謙陣皆殊死戰無不一當百東北風急義軍放火煙塵漲天鼔譟之音震駭京邑謙等諸軍一時奔散又曰蕭齊將馮道根守阜陵城戍􅀄到阜陵理城隍逺斥􅀱有如敵將至者衆頗突之道根曰怯防勇戰此之謂也理城未畢㑹魏將党法宗傅堅眼率衆二萬奄至城下道根塹壘未固城中衆少失色道根命廣開門緩服登城選精銳二百人出與魏軍戰敗之魏人見意閑且戰又不利因退走又曰後魏將宇文測行綏州事每嵗河冰合後突厥即來㓂先是常遣居人入城堡以避之測至皆令安堵如舊乃於要路數百處並多積柴仍逺遣斥􅀱知其動静是年十二月突厥從連谷入㓂去界數十里測命積柴之處一時縱火突厥謂有大軍至懼而遁走自相蹂踐委弃􅄂畜及輜重不可勝數測徐率所部收之分給百姓自是突厥不敢復至又曰梁雍州刺史岳陽王蕭登雖稱藩附於西魏而尚有貳心西魏將楊忠自樊城觀兵於漢濵易旗逓進實􅀐二千􅊫登樓覩之以爲三萬也懼而伏焉崔鴻十六國春秋曰後趙石勒荆州監軍郭敬宼晉襄陽勒驛令敬退屯樊城戒之使偃藏旗幟寂􅀂無人彼􅀂使人觀察則告之曰自愛堅守後七八日大􅀐將至相禁不復得走矣敬使人浴馬于津周而復始晝夜不絶偵諜還告晉南中郎將周撫撫以爲勒軍大至懼而奔于武昌敬遂入襄陽焉又曰前凉張重華以謝艾爲軍師將軍率􅀐三萬進軍臨河後趙石勒將麻秋以三萬衆拒之艾乗軺車㓂白慆慆苦洽切鳴鼓而行秋遥覩而怒曰艾年少書生冠服如此輕我也令黒矟龍騰三千人馳擊之艾左右大擾或勸乗馬艾不從乃下車踞胡牀指麾分處賊以爲伏兵發也懼不敢進艾又遣將縁河截其後秋軍乃退艾乗擊遂大敗之斬秋將杜勲汲魚俘斬首三千級秋疋馬奔大夏太平御覽卷第二百九十泗
