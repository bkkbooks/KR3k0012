body:
  text: 鷰白鷰赤鷰雀舞雀神雀赤雀黄雀青雀大雀鷰春秋運斗樞曰揺光星散爲鷰禮記曰仲春之月玄鳥至之日以太牢祠于髙禖天子親徃左傳曰郯子云少皥鳥師而鳥名玄鳥氏司分者也玄鳥鷰也春分來秋分去又曰吴公子禮自衛如晉將􅀫於戚戚孫文子之邑也聞鍾聲曰異哉夫子之在此也猶鷰之巢於幕上也言至危也詩曰鷰鷰衛莊姜送歸妾也鷰鷰于飛差池其羽之子于歸逺送于野鷰鷰于飛下上其音又曰天命玄鳥降而生啇宅殷土茫茫玄鳥乙鳥也春分鳥降湯之先祖有娀氏女簡狄配髙辛與之祈于郊禖而生契故本以玄鳥至而祠焉茫茫大貌也爾雅曰鷰鷰乙也注云齊曰鷰梁曰乙史記曰帝嚳少妃有娀氏娀音嵩曰簡狄以春分玄鳥至之日祠于髙媒有玄鳥遺􅆑簡狄吞之生契又曰陳勝輟耕歎曰鷰雀安知鴻鵠之志哉又曰臨江閔王榮坐侵廟壖爲宫上徴榮詣中尉府郅都責訊王王恐自殺葬藍田鷰數万衘土置冢上百姓憐之漢書名臣奏曰丞相薛宣對曰茂陵寢上食日玄鳥來集吐所含大豆紫墨色翶翔殿上此陛下永與天無極天下幸甚又曰成帝和平二年秋大水有鷰生雀又曰王莽開哀帝母丁􅁎冢有鷰數千衘土投其穿中魏志曰館陶令諸􅁑原遷新興太守管輅祖餞之賔客並㑹自起取鷰􅆑蜂窠蜘蛛着器中使輅覆射卦成輅曰含氣湏變依于宇堂雄雌以分趐未舒張此鷰􅆑也晉中興書曰中原䘮亂郷人遂共推郗鑒爲主與千餘家俱避難於魯國嶧山山有重險百姓飢饉野􅄿生草時或掘野䑕蟄鷰而食之晉書載記曰慕容㑺時鷰巢于㑺正陽殿之西椒生三雛頂上堅毛几城献異鳥五色成章儁謂羣僚曰是何祥也咸稱鷰者燕鳥也首有毛冠者言大燕龍興冠通天冕章甫之象也巢正陽西椒者言至尊臨軒朝萬國之徴也三子者數應三統之驗也神鳥五色言聖朝將繼五行之籙以御四海者也㑺覽之大恱南史曰襄陽覇城王整之姉嫁爲衛敬瑜妻年十六而敬瑜亡父母舅姑咸欲嫁之誓而不許乃截耳置盤中爲誓乃止所住户有鷰巢常􅀟來去後忽􅀌飛女感其偏栖乃以縷繫脚爲誌後歳此鷰果復更來猶帶前縷女復爲詩曰昔年無偶去今春猶獨歸故人恩旣重不忍復􅀟飛雍州刺史西昌侯藻嘉其美節乃起樓於門題曰貞義衛婦之閭又表於臺崔鴻北録曰昔魯人有浮海而失津者至于澶洲見仲尼及七十子遊于海中與魯人一木杖令閉目乗之使歸告魯侯築城以備㓂魯人出海投杖水中乃龍也具以狀告魯侯不信俄而有羣鷰數萬衘土培城魯侯信之大城曲阜訖而齊㓂至攻魯不克而還韓子曰天下無道攻擊不巳甲胄生蟣虱鷰雀處帷幄淮南子曰故先王之政四海之雲至而修封疆春分之後四海出雲蝦蟇鳴鷰降而逹路除道春分之後又曰大厦成而鷰雀相賀吕氏春秋曰有娀氏有二佚女爲九成之臺飲食必鼔帝令鷰徃視之鳴􅀂謚隘二女愛而争􅅮之覆以玉筐少選髙誘注曰少選湏􅁷發而視之鷰遺二􅆑北飛遂不反二女作歌曰鷰徃飛實始爲北音北國之音也宣驗記曰程德度武昌人昔在潯陽夜見屋裏自明先有鷰窠忽有小兒長尺餘潔白從窠出至床前曰却後三年當得長生之道㝷闇而滅甚祕宻之又曰沛國周氏有三子瘖並不能言有人來乞飲聞其兒聲問之具以實對客曰君可還内思過旣異其言知非常人良乆云都不憶有罪過客曰試更思㓜時事入内食頃出曰記小兒時當床有鷰巢中有三子母還哺之輙出取食屋下舉手得及指内巢中鷰子亦出口承受乃取三蒺䔧各與之吞即死母還不見子悲鳴而去恒自悔責客變爲道人之容曰君旣自知悔罪今除矣便聞其兒言語周正即不見道人廣雅曰玄鳥鷰也說文曰鷰玄鳥也布翅拔尾象形也齊魯之鳯作巢避戊巳論衡曰鷰鳥也形似非氣也安得生人且鷰之長不過五寸安能成七尺之形契母適欲懷妊遭吞鷰􅆑好竒因以爲其生耳楊子法言曰朱鳥翾翾歸其肆矣侯苞注曰朱鳥鷰别名四海肆也􅀶物志曰人食鷰􅁏不可入水爲蛟龍所吞又曰鷰戊巳日不衘泥塗巢此非才智自然得之吴地記曰春申君都吴宫因加巧飾春申死吏照鷰窟失火遂焚越絶書曰吴路西宫在長秋周一里二百二十六歩秦始皇十二年守宫者照鷰失火燒之􅂫州塚墓記曰宋青州刺史郁㤗玄字義真好黄老故老相傳㤗性仁恕德感禽獸􅀄葬之日有羣鷰數千衘􅁟於塚上今塚猶髙大與他有異村郷歳時迄今􅀕祀茅君内傳曰句曲山有神芝五種弟三名鷰貽芝其色紫形如葵藿葉上有鷰象如欲飛狀光明洞澈食一株拜爲太清龍虎仙君崔豹古今注曰鷰一名天女一名鷙鳥廣州志曰鷰有三種乳於巖崖者爲土鷰湘中記曰零陵有石鷰形似得雷風則飛鴶䲳如真鷰談數曰王景素甞與劉璡同在小齋有鷰集承塵飛鳴相追景素曰萬物各有性靈而獨賤於鱗羽乎􅀂斯鳥也遊則叅於雲煙之上止則隱於林木之下飢則啄渇則飲形體無累乎物得失不􅀜於心一何樂哉九章筭術曰五雀六鷰飛集于衡適平一雀一鷰飛而易處則雀重而鷰輕白鷰宋元嘉起居注曰元年七月有白鷰集於齊郡遊翔庭宇經九日乃去衆鷰翼隨􅁪有數千陳書曰髙士馬樞目常黄能視闇中物有白鷰一􅀟巢其庭樹馴狎欄廡時上几案春來秋去幾三十年抱朴子曰千􅀊鷰户向北其色白而尾屈隂乾之服一頭得五百歳此􅁏芝也京房易占曰山見白鷰其君且得貴女今俗名一爲天女也續異記曰孫氏妻見一童子當前以􅁫擲之躍入雲中夜聞户外歌曰昔填夏家冢輦泥頭欲秃今􅀉黄氏居非意傷我目㝷覔巢中得一白鷰左目傷宣城記曰侍中紀昌睦􅀄生有白鷰一雙出巢旣表素質官途亦通京州記曰吕光大安三年白鷰遊酒泉郡黒鷰列從王威別傳曰時有白鷰來翔􅀍令爲賦赤鷰田俅子曰少昊氏之時赤鷰一衘羽而飛集少昊氏之戸遺其丹書雀春秋運斗樞曰瑶光星散爲雀禮記月令曰季秋鴻鴈來賔雀入大水化爲蛤又内則曰雀晏蜩范鄭玄注云范鋒又三年問曰凡生天地之間血氣之属莫不知愛其􅀋今失䘮其疋至於鷰雀猶有啁噍之頃焉然後乃能去之詩曰誰謂雀無角何以穿我屋春秋外傳趙簡子曰雀入淮而爲蛤韓詩外傳曰夫鳯凰之􅀄起也遥遥千里藩籬之雀喔咿而􅀏之及其􅂛少陽一詘一信羽雲間藩籬之雀超然自知不及逺矣易通卦驗曰立夏雀子飛史記曰趙武成王自號主父廢長子章而傳國於公子何主父遊沙丘公子章作亂與何戰敗章士父閉之何遂圍主父主父飢探雀􅑹而食之月餘遂餓死沙丘范曄後漢書曰楊由字襄侯蜀郡人少習易爲文學椽時有雀夜集庫門上太守廉范以問由對曰此占郡内當有小兵然不爲害後二十餘日廣柔縣蠻夷反殺傷長吏宋書曰蕭思話在青州常所用銅斗覆在藥厨下忽於斗下得二死雀思話歎曰斗覆而􅀟雀殞其不祥乎俄而􅀍繫北史曰後魏河南王曜五歳甞射雀於道武前中之帝驚歎焉又曰潘樂字相貴􅀄生有一雀止其母左肩占者咸言冨貴之徴因名貴相後以爲字唐書曰開元二十二年秋八月甲申幽州長史張守珪渝􅀜界内虸蚄虫食田稼曼延入平州俄頃有羣雀來食此虫一日食盡平州稼穡無有傷者莊子曰一雀遇羿羿必得之或曰以天下爲之籠則雀無所逃是故殷湯以庖人籠伊尹􅁗穆以五羊之皮籠百里奚抱朴子曰千羊不能捍獨虎萬雀不能抵一鷹戰國䇿曰莊辛謂楚王曰夫雀俯啄白粒仰栖茂樹鼔翅􅁬翼自以爲無患不知夫公子王孫左挾彈右握丸以加其頸也晏子春秋曰齊景公探雀􅑹弱反之晏子再拜賀曰吾君有聖人之道矣君探􅑹而弱故反之是長㓜也禽獸􅀂此而况人乎此聖人之道也家語曰孔子見羅者所得雀皆黄口也孔子曰黄口盡得大雀獨不得何也羅者對曰黄口從大雀者不得大雀從黄口者得孔子頋語弟子曰君子愼所從孔藂子曰邯鄲民以正月旦獻雀於趙王而綴以五采王大恱申叔告子順曰王何以爲也對曰正旦放之吕氏春秋曰鷰雀争處於一屋之下子母相哺呴呴焉相樂自以爲安矣突决上焚棟宇鷰雀顔色不變是何也不知禍之將及爲人臣免鷰雀之智者寡矣陳留耆舊傳曰圉人魏尚髙帝時爲大史有罪繫治獄有萬頭雀集獄􅁄樹上拆翼而鳴尚占曰雀爵命之祥其鳴即即復也我其復故官也有頃詔還故官說文曰雀依人小鳥也太玄經曰明珠彈雀貴不當也風俗通曰中平中懷陵上有雀萬餘亂闘殺頭縣着樹也郭璞洞林曰丞相府有將鶵鷄雀飛集其背上駈之去復來如此再三令璞占之此晉王即祚之漸也崔豹古今注曰雀一名嘉賔言栖􅀫人家狀如賔客也王子年拾遺曰舜葬蒼梧之野有鳥如丹雀自來吐五色氣氛氲如雲名曰慿霄雀能羣飛衘土成墳異苑曰上虞孫家奚奴多諸方術向空長嘯則羣雀來萃夜呪蚊䖟悉死於側又曰任城魏肇之􅀄生有雀飛入其手占者以爲封爵之祥益部􅂄舊傳曰楊宣爲河西太守行縣有羣雀鳴桑樹上宣謂吏曰前有覆車粟此雀相隨欲徃食行數里果有覆車粟張顯析言曰萬雀不及一鳯凰衆星不如一明月沙州記曰寒嶺去太陽川三十里便有雀䑕同穴雀亦如家雀色小白䑕亦如家䑕色如黄瓦無尾舞雀述異記曰周成王元年貝多國人獻舞雀周公命返之神雀漢武内傳曰西王母仙藥有昆丘神崔漢書曰宣帝元康三年詔曰前年夏神雀集雍今春五色鳥以萬數飛屬縣翺翔而舞欲集未下其令三輔母得以春夏擿巢探夘彈射飛鳥具爲令東觀漢記曰永安十七年公卿以神雀五色翔集京師奉觴上壽令賈逵作神雀頌崔豹古今注曰孝哀帝太􅀄三年㤗畤殿有雀五色頭冠長寸餘始到時鳥環其旁也隋書曰開皇十六年有神雀降於含章闥髙祖召百官賜醼告以此瑞許善心於座請紙筆製神雀頌奏之髙祖甚恱曰我見神雀共皇后觀之今且召公䓁入適述此事善心於座始知即能成頌文不加􅀧筆不停毫常聞此言今見其事因賜物二百叚赤雀春秋孔演圖曰鳥化爲書孔子奉以告天赤雀書上化爲黄玉刻曰孔提命作法爲制赤雀集將受命制尚書中候曰赤雀衘丹書入豊止於昌前謝承後漢書曰琅琊董仲爲不其令赤雀乳㕔事前桑上民爲作歌頌呉録曰景帝永安六年赤雀見於豫章北齊書曰天保元年京師􅀗赤雀獻於南郊唐書曰武德中赤雀巢於殿門宴五品以上頌者十餘人極歡而罷抱朴子曰靈寳經仙術也吴王伐石治宫室而合石之中得紫文金簡之書不能讀之使使者以問仲尼曰吴王間居有赤雀衘書以置殿前不知其義故逺諮呈仲尼視之曰此乃靈寳方長生之法禹所服之禹將仙化封之名山石凾之中今乃赤雀衘之殆天授也孫氏瑞應圖曰赤雀者王者動作應天時則衘書來遁甲曰赤雀不見則國無賢白雀不降則無後嗣赤雀書陽精也白雀主衘鐵劵隂主衘精也不來則國主無後嗣也尚書中候曰維天降紀􅁗伯出狩至于咸陽天振大雷有火下化爲白雀衘籙集于公車孝經援神契曰王者奉已約儉臺榭不侈尊事􅂄老則白雀見典略曰泰伯出獵於咸陽大雷有火流下化爲白雀衘丹書集于公車書曰泰伯霸丗魏略曰文帝欲授禪白雀十九見吴志曰莘覈上孫皓表曰明珠旣覿白雀繼見燕書曰􅉖帝時有異雀素質緑頭集于端門東樹棲翔二旬而去夏四月以異雀故大赦名東園爲白雀園涼州記曰吕光大安三年白雀巢陽川令郭敏室燉煌實録曰侯瑾字子瑜解鳥語甞出門見白雀與群雀同行􅁣然歎曰今天下大亂君子小人相與雜北齊書曰臨漳縣令裴鑒蒞官清苦致白雀之瑞樊遜上清德頌十首唐書曰􅀄髙祖於太原斬王威有白雀飛入髙祖之懷又曰武德九年江州都督太子衛副率侯君集於納義門獻白雀一又曰開元十三年兖州奏白雀見景戍上謂宰臣曰徃昔史官唯記災異將令王者懼而循得故春秋不書祥瑞唯記有年聖人之意明矣勑天下諸州府不得更奏祥瑞南越志曰魯城縣多白雀大如鳩素質凝映先賢傳曰周不疑曹公欲以爲議郎不就時有白雀瑞不疑已作頌授紙筆立令復作操竒異之羅含傳曰含在家中時有白雀集堂宇此徳行幽感所致䂊章舊志曰太守孔笁臨郡三月白雀出南昌太守夏侯嵩臨郡六年白雀見黄雀禮稽命徵曰􅀕五岳四瀆得其冝則黄雀見黄雀士精春秋考異郵曰黄帝將起有黄雀赤頭占曰黄者土精赤者火榮雀者賞萌余當立古詩曰桂樹華不實黄雀巢其顛說􅁐曰吴王欲伐荆有諌者死舎人少孺子欲諌不敢即懷操彈於後園露沾其衣如是三旦王曰子何來沾衣如此對曰園中有樹其上有蟬蟬髙居悲鳴飲露不知螳蜋在其後螳蜋委身曲附欲取蟬而不知黄雀在其旁黄雀延頸欲啄螳蜋不知彈丸在其下臣梜彈欲取黄雀不知露霑衣如此皆務欲得於前不顧於後患呉王乃罷漢武故事曰拜孫卿爲郎持節候神自大室至於東萊云見一人長五丈自稱巨公牽黄犬持黄雀欲謁天子因忽不見續齊諧曰弘農楊寳字文淵後漢名士也年九歳時至華隂北見一黄雀爲鵄梟所􅅮墜于樹下爲螻蟻所困寳見之􅉖然命左右取之㱕致巾箱中養之唯食黄花百餘日毛羽成朝去暮還後忽與羣雀俱來哀鳴繞堂數日乃去及夕三更寳讀書未卧有黄衣童子向寳拜曰我王母使臣昔使蓬萊不慎爲鵄梟所搏君仁愛極救實成德濟今當受使南海不得奉侍極以悲傷以白環四枚與寳曰令君子孫㓗白且位登三事當如此環矣於此遂絶寳生震震生秉秉生賜賜生彪四丗名公爲東京盛族􅀽山松後漢書曰陳弇字叔明陳留人學尚書躬自耕種常有黄雀飛來隨弇翶翔風俗記曰六月東南長風俗名黄雀風時海魚化爲黄雀因以爲名異􅁐曰永康王曠家井上有一浣衣石時時見有赤氣後有二胡人􅀉居忽求買石未及受錢曠子婦孫氏覩二黄雀闘於石上疾徃取之變成黄金蕭廣濟孝子傳曰王祥後母病欲得黄雀炙祥思念卒難致湏􅁷忽有數十黄雀飛入其幕臨海異物志曰黄雀魚常以八月化爲黄雀到十月入海爲魚廣志曰黄雀體純脂江夏竟陵常獻給大官青雀禮記曲禮曰前有水則載青旌鄭玄注載舉於旌首以驚衆青雀水鳥也劉偵詩曰翩翩野青雀栖竄茨􅁄蕃朝拾平田粒夕飲曲池泉猥出蔚萊中乃至丹丘邊司馬彪與山巨源詩曰翩翩野青雀受性􅀌且微昔生三河側鼓翼帝王畿䴢元詩曰青雀西飛別鵠東翔大雀廣志曰安息大雀鴈身蹄似橐駞色蒼舉頭髙八九尺張翅丈餘􅆑如瓮東觀漢記曰永祚元年安息王獻條枝大雀曹大家集兄超爲西城都護獻大雀詔大家作頌太平御覽卷第九百二十二
