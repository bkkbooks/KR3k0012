front:
  text: 太平御覽卷第九百七十三
  hash: sha256:1f09f3f81302d7444c3428214c4d282d6a4287441157a324a16ff315ab0e8875
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_973-1a}
body:
  text: 果部十龍眼樝餘甘蒟子木􅀲劉鬰杜梨㮕􅀥榛柚椵椹龍眼廣雅曰益智龍眼也謝承後漢書曰交阯七郡献龍眼廣志曰龍眼􅀣葉似荔支蔓延縁木生子大如酸􅀥色異純甜無酸朱崖傳曰果有龍眼交州記曰龍眼樹髙五六丈似荔支而小廣州記曰龍眼子似荔支七月熟吴氏本草曰龍眼一名比目嶺表録異曰龍眼子樹如荔支葉小殻青黄色形圎如彈丸大核如木槵子而不堅肉白蔕漿其甘如􅁡一朶􅁪三二十顆荔支方過龍眼即熟南人謂之荔支奴以其常隨後也左思蜀都賦曰傍挺龍眼側生荔支榠樝齊書曰武帝幸丹陽郡宴飲郅撝恃舊酒後狎侮同列時王敬則執榠樝以刀子削之謂曰此非元徽頭何事自喫之爲左丞􅁃果之所糺以贖論廣志曰樝其子甚酢出西方餘甘吴録地理志曰髙涼安寜縣有餘甘􅀄食之味苦後口中更甘臨海異物志曰餘甘子如梭形出􅀳安候官界中餘甘橄㰖同一果耳雲南記曰瀘水南岸有餘甘子樹子如彈丸許色微黄味酸苦核有五稜其樹枝如柘枝葉如小夜合葉陳祁暢異物志曰餘甘大小如彈丸大視之理如定陶􅀲片􅀄入口如苦忽咽口中乃更甜羙塩而蒸之尤羙可多食之朱崖故事曰朱崖果有餘甘左思吴都賦曰其果則丹橘餘甘荔支之林蒟子漢書曰畨陽令唐􅂪風曉南粤南粤食􅂪蜀枸醬注曰枸音矩枸樹也如桑其椹長二三寸酢取其實以爲醬廣志曰蒟子蔓生依􅀣子似桑椹長數寸色黒辛如薑以􅐭淹之下氣消食出南安左思蜀都賦曰笻杖傅節於大夏之邑蒟醬流味於畨禺之郷木􅀲爾雅曰楙木􅀲郭氏注曰實如小􅀲酢可食楙音茂也周禮冬官下弓人職曰取幹之道木􅀲次果桑毛詩衛淇澳木􅀲曰投我以木􅀲報之以瓊琚毛云楙也詩義䟽曰楙葉似榛實如小㼐􅀲上黄著中令蚡香欲噉者蜜封藏百日食之也三國典略曰齊孝昭北伐庫莫奚至天池以木􅀲􅁅毒魚魚皆死而浮出庫莫奚􅀼相謂曰池有靈魚犯之不祥乃岀長城北道齊主分兵追擊獲牛羊七萬振旅而還水經曰魚復縣地多木􅀲樹有子大如甒音武白黄實甚苦香爾雅之所謂楙也盛弘之荆州記曰魚復縣有固陵村地多木􅀲樹其子大者如甒晉宫閣記曰華林園有木􅀲五株廣志曰木􅀲子可藏枝爲一尺百二十節吴氏本草曰木􅀲生夷陵虎丘山䟽曰山三靣悉有木􅀲何承天木􅀲賦曰惟兹木之在林亦超􅀋而獨劭方朝華而繁實比沙棠而有曜劉爾雅曰劉劉杙也劉子生山中實如梨酢甜核堅出交趾杙音弋吴録地理志曰交阯羸僂縣有劉子樹出山中實如梨而味酸羙郡内皆有之南方草物狀曰劉三月華七月八月熟其色黄其味酢出交阯武平興古九真吴都賦曰梌劉禦霜欎周書曰夏食欎棣也毛詩􅃎七月曰六月食欎毛注日欎棣詩義䟽曰其樹髙五六尺其實大如李正赤食之甜魏王花木志曰欎薁樹髙五六尺實大如李赤色食之甘廣雅曰一名雀李又名車下李又名郁李亦名棣亦名薁李子毛詩七月食欎及薁即郁李也一名棣也吕氏夲草曰郁核一名雀李一名車下李一名棣晉宫閣名曰華林園薁李一林司馬相如上林賦曰隱夫欎棣合逯離支潘岳閑居賦曰梅杏薁棣之屬曹毗魏都賦曰􅀂榴郁棣杜梨爾雅曰杜甘棠今之杜梨也山海經曰岷山其木多棠韓詩外傳曰邵伯在朝所司請召民邵伯曰不勞一身而勞百姓此非文王之志也於是廬於棠樹之下百姓大恱詩人見而歌焉毛詩鵲巢甘棠曰蔽芾甘棠勿剪勿伐召伯所菱毛云甘棠杜也詩義䟽曰今棠梨也一名杜梨如梨而小有甜酢可噉也毛詩蟋蟀枤杜曰有枤之杜生于道周陸氏毛詩䟽義曰枤杜杜赤棠也與白棠同但有赤白羙惡子白色者爲白棠白棠甘棠也多酸羙滑赤棠子澁而酢者也俗語澁如杜是也木理亦赤可以作弓材孫楚枤杜賦序曰家弟以虞氏梨賦見示余謂豈以梨有用之爲貴杜無用之爲賤故賦之㮕􅀥晉宫閣名曰華林園㮕音軟􅀥四株廣志曰㮕􅀥味如柿晉陽楛㮕肌細而厚以供御范子計然曰㮕􅀥岀漢中郡崔豹古今注曰㮕􅀥葉如柿實似柿而小味甘羙司馬相如子虚賦曰樝梨梬栗梬楟􅀥也橘柚芬芳左思蜀都賦曰林檎枇杷橙柿梬楟榛毛詩􅆁栢舟簡兮曰山有榛隰有苓陸機毛詩䟽義曰山有榛枝葉似栗樹子似橡子味似栗枝莖可以爲燭毛詩鄘栢舟定之方中曰樹之榛栗椅桐梓漆詩義䟽曰榛栗屬有兩種其一種大小皮葉皆如栗其子小形似杼子味亦如栗所謂樹之榛栗者也其一種枝莖如木蓼生髙丈餘作胡挑味遼代上黨皆饒周禮天官下籩人職曰饋食之籩其實榛禮記曲禮下曰婦人之贄椇榛􅀥栗􅀃丈曰榛似梓實如小栗山海經曰上申之山下多榛楛郭氏注曰榛似栗而小任昉述異記曰漢末楊氏家園中産神榛二株張衡七辨曰寒梨乾榛柚尔雅音義曰或作爾雅曰柚條也鄭氏注曰以橙實酢出江南尚書禹貢曰楊州厥苞橘柚周書曰秋食橘柚毛詩􅁗車轔曰終南何有有條有梅列子曰吴越之間有木焉其名曰碧樹而冬青實丹而味酸度淮北而化爲枳焉莊子曰三王五帝之禮義法度譬猶柤梨橘柚其味相反而皆可於口淮南子曰天之所處地之所載皆生於一父母故槐榆與橘柚合而爲兄弟吕氏春秋曰果之羙者雲夢之柚山海經曰洞庭之山綸山銅山賈超之山其木多㐬郭氏榣注曰柚似橘而大塩鐵論御史曰孝武皇帝平百越以爲園圃臣庶皆厭橘柚崔寔政論曰橘柚之貢堯舜所不常御裴淵廣州記曰別有柚號爲雷柚實如􅂛大廣志曰成都有柚大如升􅀶物志曰橘柚􅀋多豫章郡出真者風土記曰柚大橘也赤黄而酢也神異記曰東方建春山外多柚異苑曰南康歸羙山石城内有甘橘柚楚辭曰斬伐橘柚列樹苦桃楚辭曰􅄂橘柚以爲圃兮列辛夷與椒楨司馬相如子虚賦曰橘柚芬芳古詩曰橘柚垂華實乃在深山側聞君好我甘竊獨自雕飾楊雄楊州牧箴曰彭蠡旣瀦陽鳥攸居橘柚羽貝瑶琨篠簜崔琦七蠲曰于斯江睪寔産橘柚紫葉玄實緑裏朱莖郭璞讃曰屈生嘉歎以爲羙談椵爾雅曰櫠椵也郭璞注曰柚屬子大如盂皮厚二三分中似枳食之味少椹毛詩䮐頌泮宫曰翩彼飛鴞集于泮林食我桑黮懷我好音黮桑實後漢書曰献帝時三輔大飢九月桑復生椹人得以食魏略曰楊沛爲新鄭長課民益畜乾椹㑹太祖西迎天子無糧食沛進乾椹及太祖輔政遷爲鄴令賜其生口十人絹百疋欲以勵之報乾椹也魏書曰􅀽紹在河北軍人仰􅀥椹車頻􅁗書曰慕容垂圍鄴百姓不得復田民以桑椹爲糧相噉略盡晉書載記曰符登攻姚萇萇據武都相持累戰互有勝􅀒登軍中大飢収葚以供兵後魏書曰崔逞自燕奔魏㝷除御史太祖攻中山乏糧問郡臣取食之方逞曰取椹可以􅂇糧太祖雖衘侮慢兵湏食乃聽人取椹北史曰後周趙肅爲齊州別駕有能名其東鄰有桑椹落其家就遣人悉拾歸其主誡諸子曰吾非以此求名意者非機杼物不願侵人汝等冝以爲誡金樓子曰􅁗皇遣徐福求一寸椹碧海之中有扶桑樹長數千丈樹兩兩同根生更相依􅀝是名為扶桑仙人食其椹而體作金光飛騰玄宫也漢武内傳曰神仙上藥有扶桑丹椹汝南仙賢傳曰蔡君仲孝飬老母時赤眉亂君仲取桑椹赤黒異器賊問之荅云黒者與母赤者自食賊嘉之與塩二􅂛丗􅀃曰張天錫爲晉孝武所器每入言話無不竟日頗有嫉之者於坐問張北方何物可貴張荅曰桑椹香甘鴟鴞革響醇酪養性人無嫉心丗􅀃曰有王甲從北方來詣謝公問北方何果㝡勝甲云桑椹最好謝公問可以比江東何杲甲云是黄甘之流公曰君何乃爾妄語甲旣受妄語之名恐宰相所貴乃買駿馬候熟時取數十枚還以奉公公食之以爲羙乃謂甲此味乃江東所無而君近比黄甘於是引甲爲賔客十洲記曰有椹樹長數千丈名爲扶桑芝仙人食其椹而體作金色飛翔玄宫其樹雖大其葉則小故如中夏之桑椹也但椹稀而赤九千歳一生實耳楊衒之洛陽伽藍記曰願㑹寺中書侍郎王翊捨宅立也佛堂前生桑樹一株直上五尺枝條横遶柯葉傍布形如羽蓋復髙五尺凡爲五重每一重葉棋各異京師道俗謂之神桑觀者成市布施者甚衆帝聞而惡之以爲惑衆命給事黄門侍郎元紀伐殺之其日雲霧晦􅁳下斧之處流血至地見者莫不悲泣東方朔神異記曰東方有樹髙八十丈敷張自輔葉長一丈廣六七尺名曰桑上有椹長三尺五寸其圍如數異苑曰漢興平元年九月桑再椹時劉玄徳軍小沛年荒榖貴士衆皆飢仰以爲糧又曰北方有白桑椹長數寸食之甘羙五行記曰晉武太元中太原王戎爲欝林太守泊舡新亭眠夢人以七枚椹與之着衣􅁭中旣悟得椹如夢中傳休弈桑椹賦曰繁實離離含甘吐液翠米三變或玄或白嘉味殊滋食之無斁太平御覽卷第九百七十三
