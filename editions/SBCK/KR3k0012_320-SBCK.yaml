front:
  text: 太平御覽卷第三百二十
  hash: sha256:79515fbe05f704f1acae1edb5b740167a970e8faf8554e47da523f43e7e62770
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_320-1a}
body:
  text: 兵部五十一拒守下危急拒守下唐書曰乾符中元萬頃從李勣征髙麗勣嘗令頃作文檄髙麗其語有譏髙麗不知守鴨緑之險莫離支報云謹聞命矣遂移兵固守鴨緑官軍不得入萬頃坐是流于嶺外又曰李光弼守太原自賊圍城城中張一小幕止􅀫有急即自徃救之行至府門未嘗廽頭不復省視妻子賊退後収拾器械處置公事經三日然後歸家又曰史思明圍光弼於太原四面重圍十日不解每日使賊於陣前嫚罵光弼並戯弄城上人光弼使人穿地道以木撑之賊明日還於舊處立將戯之地道透遂把賊脚曵入地道中光弼得而對衆戮之城中大喜思明知事不集遂退歸河北又曰薛愿爲頴川太守夲郡防禦使時賊已䧟陳留滎陽汝南等郡方圍南陽頴川當其來徃之路愿與防禦副使龐堅同力固守城中儲蓄無素兵卒單寡自至德元年正月至十一月賊晝夜攻之不息距城百里廬舎墳墓林樹開發斬徹殆盡而外救不至賊將阿史郍承慶悉以銳卒併攻爲木驢木鵝雲梯衝棚四面雲合鼔噪如雷矢石如雨力攻十餘日城中守備皆竭賊夜半乗梯而入而愿堅俱􅀍執送於東都將支解之或􅀃禄山曰薛愿龐堅義士也人各爲其主屠之不祥乃繫於洛水之濵屬苦寒一夕凍死又曰張廵守睢陽在城中每戰登陴大呼以助威皆血流面牙齒皆碎城將䧟西向再拜曰爲救不至臣智勇俱竭不能全一城今使逆賊見逼臣死之後願爲􅀑與賊爲厲以荅國恩及城䧟尹子竒見巡問之曰聞公每督戰皆裂齒碎實有之否巡應之曰然子竒曰何以至此日欲得殺逆賊遂至於此子竒以大刀剔其口見其存者不過三數巡因大詬罵子竒責以悖逆損害平人子竒欲存之左右曰此人必不爲我用又得衆死心不可留故害之又曰史朝劉昌在圍中連月不解城中食盡賊垂將䧟之刺史李岺計蹙昌爲之謀曰今河陽有光弼制勝且江淮足兵此􅅒中有數千斤趜可屑以食衆計援兵不二十日當至東南敵衆以爲危昌請守之昌遂􅀍鎧持盾登之陳逆順以告諭賊之衆甚畏之後十五日副元師李光弼救軍至賊乃霄潰光弼聞其謀召置軍中超授試左金吾衛郎將又曰元和中鄂岳都􅇛練使李道古攻申州剋其羅城乃進圍逼其中城城中守卒夜師婦人登城而呼懸門􅀼發分出其衆道古之衆驚亂多爲虜殺又曰王凝爲宣州黄巢自嶺表北歸大掠淮南攻圍和州凝令牙將樊儔舟師據採石以援之儔違令凝即斬之以徇命別將馬頴代儔赴援竟解歷陽之圍賊怒引衆攻宣城大將王㳙請出軍逆戰凝曰賊忿而來冝持重待之彼衆我寡萬一不捷則州城危矣㳙銳意請行凝即閱集丁壯分守要害登陴設備㳙果戰死賊乗勝而來則守有備矣賊爲梯衝之具急攻數月禦備力殫吏民請曰賊之兇􅀔不可當願尚書歸欵退之懼覆尚書家族凝曰人皆有族子豈獨全誓與此城同存亡也旣而賊巳退去時乾符五年也又曰王栖曜爲常州別駕時江左兵荒詔内常侍馬日新領汴滑五千人鎭之日新貪暴賊蕭庭蘭乗人怨訴逐之而劫其衆時栖曜遊弈逺郊遂爲賊所脅進圍􅂫州栖曜因其懈怠挺身登城率城中出攻賊衆大潰又曰張伾建中初以澤潞將鎭臨洺田恱攻之伾度兵力不能出戰嚴設守備嬰城拒守賊不能㧞累月攻之益急士多死傷糧儲漸乏救兵未至伾知事不濟無以激士心乃悉召將卒於軍門命其女出拜之謂曰將士辛苦守戰伾之家無尺寸物與公等爲賞獨有此女幸未嫁人願出賣之爲將士一日費衆皆大哭曰誓與將軍死戰幸無慮也㑹馬燧以太原之師至與軍衆合擊恱於城下大敗之伾乗􅀔出戰士卒無不一當百圍解以功遷泗州刺史三國典略曰周獨􅀌永業恐洛州刺史叚思文不能自固馳入金墉助守尉遲逈爲土山地道曉夕攻戰永業選其三百人爲爪牙每先鋒死戰逈不能剋又曰臺城朱䧟侯景又燒大司馬門後閣舎人髙善寳以􅀻金千兩賞其戰士直閣將軍宗思領將士數人踰城出外灑水乆之火滅景又遣持長柯斧入門下斫門將開羊促鑿扇爲孔以槊刺倒二人斫者乃退又曰陳人侵齊北徐州刺史祖班令不􅐬城門守陴者皆下街巷業斷人行鷄犬不許鳴吠陳人莫測所以疑人走城空不設警備中夜班忽令鼓譟陳人驚散曉復結陳向城班自臨戰陳人先聞其盲謂不能抗拒忽見親在戎行彎弧縱鏑怪之遂退時穆提婆憾之不巳欲令城䧟不遣救援班軍守百日城竟保全北史曰梁將呉明徹攻圍海西齊將郎基固守乃至削木爲箭翦􅁓爲羽圍解還朝僕射楊愔迎勞之曰卿夲文吏遂有武略削木剪􅁓皆無故事班墨之思何以相過墨子曰禽滑釐問曰雲梯施攻備巳具武力又多爭上吾城爲之奈何墨子曰多下矢石􅁅以􅀨薪火水湯以濟之􅀂城外穿地來攻者冝城中掘於井以薄􆁹内井中使聽聦者伏􆁹聽之審知穴處鑿内而迎之吕氏春秋曰公輸般爲髙雲梯欲以攻宋墨子聞之自魯而徃裂裳裹足日夜不休十日十夜而至於郢見荆王曰臣北方之鄙人也聞大王將攻宋信有之乎王曰然墨子曰臣以宋必不可得公輸般天下之攻工也巳爲攻宋之械矣墨子曰請公輸般試攻之臣請試守之於是公輸般設攻宋之械墨子設守宋之備公輸般九攻之墨子九却之不能入故荆輟不攻宋墨子也能以術禦之荆而存乎宋矣􅀶物志曰處士東里䰟責禹亂天下事禹退作三城強者攻弱者守敵者戰城郭盖禹始也賈􅁩過􅁗論曰有嚢括四海之意并吞八荒之心當是時也啇君佐之命内立法度務耕織脩守戰之備外連衡而􅋐諸侯又曰然後踐華爲城固河爲池據億丈之城臨不測之谿以爲固良將勁弩守要害之處信臣精卒陳利兵而誰奈何任彦昇奏彈曹景宗曰故司州刺史蔡道恭率勵義勇􅁬不顧命全城守死自冬徂秋猶轉戰戰窮極摧醜虜危急韓子曰智伯圍襄子於襄陽決水以灌之城中巢處懸釡而炊昜子食折骨炊史記曰楚莊王圍宋五月不解宋城中食盡易子而食析骨而炊宋華元出告以情莊王曰君子哉遂罷兵去又曰齊田單攻聊城歳餘不下魯連乃爲書繼之矢射城中遺燕將書曰今公以弊聊人之距全齊之兵是墨翟之守也食人炊骨士無反心是孫臏之兵也又曰趙襄子保晉陽三國攻􅀳陽􅀊餘引汾水灌其城不没者三板城中懸釡而炊易子而食漢記曰叚熲破羌胡明年羌復㓂張掖熲下馬大戰弓刀折盡虜亦引退追之晝夜攻擊割内食雪四十餘日後漢書曰車師王與匈奴共攻耿恭於䟽勒中恭食盡乃煑鎧弩食其筯革又曰臧洪爲東郡太守爲袁紹所圍初尚掘䑕煑筯角後無所食取草實而食之魏志曰太祖圍張超於雍丘超言唯臧洪當來救吾衆人以爲􅀽曹方穆洪爲紹所表用必不敗好招禍洪聞之果徒跣號泣勒所鎭又從紹請兵馬救超紹不許遂爲太祖所滅洪由是怨紹紹興兵圍之歷年不下紹忿洪無降意増兵急攻洪自度不得免呼吏士謂曰􅀽氏無道所圖不軓且不救洪郡洪於大義不得不死念諸君無事空興此禍耳可將妻子去吏士皆垂泣掘䑕煑筯角後無所食主簿啓内厨米三斗洪使作薄粥衆分醊之殺其愛妾以食士城中男女七八千人相枕而死莫有離叛城䧟紹生執洪徐廣晉紀曰霍彪爲賊貴黒所隔積百日殺馬燒皮鎧食之又曰韓晃􅂫碩等攻􅁐城中飢米一㪷萬錢晉書劉崑赴并州上表曰臣自渉州彊目覩困之流移四散十不得存二携老扶弱不絶於路及其在者鬻賣妻子生相􅂢弃死亡委厄白骨横野哀呼之聲感傷和氣羣胡數萬周匝四山動足遇掠開目覩㓂唯有壷􅀜可得告糴而此二道九州之險數人當路則百夫不敢進公私徃反没䘮者多嬰守窮城不得薪菜耕牛旣盡又乏田器以臣愚短當此至難憂如循環不遑寢食晉中興書曰中宗初鎭江左假郄鑒龍驤將軍兖州刺史徐龕石勒左右交侵鑒収合荒散保固一山隨冝抗對百姓飢饉掘野䑕蟄鷰而食之三十六國春秋曰蜀王李雄攻譙登于涪城無救援登固守不下士卒皆燻䑕食之一無叛者宋書曰朱脩之留府滑臺乃爲索虜所攻圍脩之糧盡救兵不至將士燻䑕食之城䧟爲虜所執上嘉其節蕭子顯齊書曰魏遣魏郡王元英圍南鄭退入斜谷天大雨軍馬浛截竹炊米於馬上持炬吹而食之隋書曰李宻聞行人􅀜􅀍囚於京兆與王仲伯亡抵平原賊帥郝孝德不甚禮之備遭飢饉至削樹皮食之矣太平御覽卷第三百二十
