body:
  text: 地部十河北諸山大伾山枉人山鮒鰅山天門山􅂫門山萬谷根山郡山嬰山牢山介山静巖山風山管涔山五臺山謁泉山懸罋山五指山紇眞山元􅁎山白登山火山三山稷山霍山平山發鳩山抱犢山房山韓信山湯山干山言山黒山雷公山鼔山隆慮山鮮卑山大碣石山白狼山鳴雞山歷山川喬山大翮山小翮山飛龍山無終山燕山龍山孔山大伾山隋圖經曰大伾山按書云至于大伾又名青檀山今名􅀺陽東山劉澄山川記云􅀺國也詩云􅀺侯寓于衛衛以中露􅅺中二邑處之以國名也又張揖云成臯山是大伾山即謬矣枉人山隋圖經曰枉人山俗名上陽三山或云紂殺比干於此山因得名古凢伯國之地也鮒鰅山山海經曰鮒鰅山顓頊葬其陽九嬪葬其隂四虵衛之鮒鰅山者盖今廣陽山之别名也郡國志曰顓頊所葬俗名青冢山焉天門山水經注曰天門注曰謂之百家巖下可容百家故以爲名山有石穴狀如門􅂊得通人自平地東南入便至天井􅂫門山十道志曰蘇門山一曰􅂫嶺俗又名五巖山魏氏春秋云即阮籍見孫登長嘯有鳯皇集登隱之處故號登爲􅂫門先生萬谷根山郡國志曰晉陽萬谷根山即羊腸坂也皇甫謐云羊腸塞在龍山西即晉陽西北古西河上郡􅀜於此隋焬帝大業四年經此幸汾陽改名深谷嶺十二州志云晉陽有羊腸蟠曲在其西北九十里也又隋國經曰失山去萬谷根山二十里頭上有石墟魏太武避暑之所羊腸坂在焉郡山後魏興國土地記曰太原郡山有石室方丈四尺四壁有􅂐字人莫之識嬰山隋圖經曰嬰山爲并州之主牢山又曰牢山在太原縣東北後魏書劉聦遣子粲襲據晉陽猗廬救之遂獵于受陽年山陽閱皮肉山爲之赤也介山并州記曰介山一名撗嶺左傳僖二十四年晉侯賞從亡者介之推不及禄遂與母階隱而死晉侯求不􅀗以綿上田封之以志吾過且旌人杜注曰西河介休縣南有地名綿上也静巖山郡國志曰靈石縣有静巖山在東北二十里即太岳也下有五龍泉即文公封推綿上之田是也風山水經注曰河水南經北屈縣故城西十里有風山上有穴如輪風氣蕭瑟習常不止當其衝飄也而略無生草盖常不定衆風之門故也管涔山水經注曰管涔山汾水所出土人亦云箕管山見多管草或以爲名又爲管字前趙録云劉元海族子曜嘗隱避於管涔之山夜忽有二童子入跪曰管涔王使小臣奉謁趙皇帝獻劒一口置前再拜而去以燭視之劒長二尺光輝非常背有名云神劒服御除衆毒矅遂服之隋時變爲五色也又有三城堆故縣城於此置也又有汾陽宫隋大業四年置隋末廢也又有汾水岀山陽山海經云管涔之山汾水岀焉西流至于河十二州記云汾水岀周武縣之燕京山盖管涔之異名也五臺山水經注曰五臺山其山五蠻巍然故曰五臺晉永嘉三年鴈門郡人五百餘家避乱入此山見山中人爲先驅因而不返遂寧巖野往還之士稀有望見其村居者至詣㝷訪莫知所在故俗人以爲仙者之都矣中臺之山山頂方三里西北陬有一泉水不流謂之太華泉盖五臺之層秀仙經云此山名爲紫府仙人居之其北臺之山冬夏常氷雪不可居即文殊師利常鎭毒龍之所今多佛寺四方僧徒善信之士多往禮焉謁泉山隋圖經曰西河謁泉山一名隱泉山有石室子夏退居之所水經注曰謁泉山俗云陽雨􅄽時謁禱是應故得其名懸罋山郡國志曰懸罋山一名龍山亦名結絀山多鮆魚食之不驕晉水岀焉又有象山前録云劉聦征劉琨不克略晉陽踰象山而歸也又汾水自陽曲縣界流入南過晉陽縣晉水從縣南流注之又有洞過水西入于汾晉水下口也又有晉祠水經注曰倨西山枕水有唐叔虞祠水側有凉堂晉川之中最爲勝處姚最序行記云髙洋天保年中大修樓觀五指山李穆叔趙記曰轑陽東北有五指山巖石􅀌聳上有一手一足之迹厥大如箕指數俱全又郡國志云北齊宣王遣人量之長七尺又十六國春秋云石勒當生之時此山上草木皆爲鐡􅀐之形紇眞山兾州圖經曰紇眞山在城東北登之望桑乾代郡數百里内宛然又郡國志云望之數百里内夏􅁪積雪故彼人語曰紇眞山頭凉死雀何不飛去生處樂又有神泉人歌曰紇眞山頭有神丹入地千尺絶骨冷是山北十里有白登山元􅁎山兾州圖經曰元􅁎山在馬邑後魏書云道武侍人姓李善謳歌死葬此山魏主思之樂府爲之曲其曲存焉白登山兾州圖經曰白登山在定襄縣東北漢髙所困之處上有臺因山爲名火山兾州圗經曰火山在定襄縣西五里水經注曰西溪水源出火山山有火井南北七十歩深不見底炎􅀬上升常􅀂雷之發嚮以草㸑之則煙騰火發其山一名熒臺井東五六尺有陽井廣輪與火井相狀􅀬􅀔亦同東有火井祠歳時祀之井北百歩有東西谷廣十許歩南岸下有風穴厥大容人其深不測而穴中肅肅常有微風雖三伏亦凛列三山隋圗經曰河東都三山即舜所耕歷山也禹貢所謂壷口雷首至于太岳壷口山在慈州太岳在晉州雷首在河東界此山有九名謂歷山首山薄山襄山甘􅀥山渠猪山獨頭山陑山等之名又湯伐桀升自陑之所稷山隋圖經曰稷山在綘郡后稷播百榖於此山亦左氏傳謂晉侯治兵於稷以略狄土是此也後魏曰髙凉山隋巳後又爲稷山霍山隋圖經曰霍山在洪洞縣東北霍水岀焉水經注云發源成潭潭闊七十歩而不測其深爾雅云霍山之珠玉焉又有聖人崖崖有七穴相通又水經云霍山北有雀䑕谷中道險左右柱結成偏梁閣道累石成路俗謂之魯班橋也平山隋圖經曰平山在平陽一名壷口山尚書謂壷口治梁及歧即此地也今名姑射山在縣西平水岀其下又山海經云憲山之南三百里有姑射山兾州圖經云西入文成郡以山爲界又莊子云堯見姑射神人杳然䘮其天下即是此山也發鳩山山海經曰上黨發鳩山多柘木有鳥狀如烏而文首白喙赤足名曰精衛其鳴自相呼云炎帝女東遊溺海化鳥今猶銜石以塡之抱犢山道書福地記曰抱犢山在上黨東南髙七丈有石城髙十丈方一里東南角有草名玉照下枝冬生花髙五六尺味頗甘取其末服之方寸匕日三不飢冝五􅂖多食物無惡毒宼賊不至玉匱云抱犢山東北去􅁪山之南數百里云南有穴行三百里岀美陽縣西七十里名洞口又隋圗經日卑山卑音蔽今名抱犢山四面危絶山頂有二泉後魏􅁑榮亂百姓抱犢上山因以名之也房山隋圖經曰房山嶺上有王母祠甚靈俗號爲王母山後漢書曰章帝永和三年幸趙祠房山即謂此山也在縣西北十里濊水出焉亦謂石臼水又謂之鹿水出行唐東入博陵謂之木刀溝一謂袈裟水又從此過石童山南流入滹沱河前燕慕容雋時房山王母祠前大樹自抜根下得玉圭壁八十三顆光色稍苛雋以爲岳神之命以太牢􅀕之每祀有一虎來往祠側性頗馴狎而不害於物韓信山隋圖經曰韓信山圎峻俗呼爲韓信臺又乎爲土門口西入井陘即向太原路是此也又有韓信城信破趙駐軍於此湯山山海經曰湯山湯水出焉此湯能愈疾爲天下最又按隋圖經云湯後側巖上有石室一户無塵穢俗號曰聖人室下經銅鳥廟有碑題云漳河神壇是也干山言山李公緒記曰栢仁縣有干山言山衛詩云出宿于干飲餞于言是此也黒山九州要記曰墨子昔居汲郡黒山採茯苓餌五百歳或老或少又魏志漢獻帝􅀄平二年黒山賊爲毒自統睦固等十万餘衆以掠魏郡也又云一名青山列仙傳曰犢子鄴人在黒山常牽一黃犢來過鄴城沽酒陽都女見恱之遂留相奉都女生死連眉即此者也土地十三州志云黒山險爲逋逃幽藪隋區宇圖志云周太祖諱黒因改黒山爲青山也雷公山隋圖經曰雷公山􅂄老傳曰魏時黒山群盗張燕等不立君長直以名號爲稱多髯者謂之羝公大聲者謂之雷公時雷公賊保此山因以爲名鼓山隋圖經曰鼔山亦名塗山宋永􅀄古今山川記云鼔山如石鼔形二所南北相當二鼔相去十里兾州圖經云鄴城西有石鼔鼔自烏即有兵魏都賦云神誕召逓於髙巒是也髙齊末此鼔鳴未幾云鄴城有兵而齊滅隋文季年又鳴聞數百里也隆慮山隋圖經曰隆慮山一名林慮盖隋縣西二十里山有三峯南第一峯名仙人樓髙五十丈下有黃花谷北巖岀瀑布水注成池黃花谷西北有洞穴去地十餘仞下有小山􅀌竦謂之玉女臺髙九百丈其山北一峯名舉峯其北有偏橋即抱犢因也南接大行北連􅁪岳又按顔脩内傳曰橋順字仲產有二子曰璋曰琮師事仙人盧子基於隆慮山栖霞谷教二子清虚之術服飛龍藥一丸千年不飢魏文帝詩曰西山有􅀟童不飲亦不食謂此也鮮卑山隋圖經曰鮮卑山在桞城縣東南崔鴻十六國春秋慕容廆先代君遼左號曰東胡其後雄昌與勾奴爭盛秦漢之際爲匈奴所敗分保鮮卑山因復以山爲號也􅁄城之東塞外又有鮮卑山在遼西之西北一百里與此異山而同號大碣石山地理志曰大碣石山在右北平驪城縣西南王莽改曰碣石也漢武帝亦常登之以望巨海而勒其石今於此枕海有石如埇道數十里當山頂有大石如柱形往往而見立於海之中潮水大至及潮波退不動不没不知深淺世名之天橋柱也狀􅀂人造亦非人力所就韋昭亦指此以爲碣石也白狼山郡國志曰白狼山一曰鹿首山魏武於此逢師子處事具獸部鳴鷄山隋圖經曰鳴鷄山在懷戎縣東北本名磨笄山昔趙襄子殺代王其夫人曰代已亡矣吾將何歸遂磨笄於山而自殺代人憐之爲立祠焉因名其山爲磨笄山毎夜有野雞群鳴於祠屋上故亦謂爲鳴鷄山歷山後魏輿地圖風􅁟記曰潘城西北三里有歷山􅄱似覆釡故以名之其下有舜祠瞽􅅱祠存焉川喬山山海經曰川橋山有黃帝祠大荒内有軒轅臺射者不敢西向畏軒轅故也梁湘東王臨終詩云寂寥千載後誰畏軒轅臺大翮山小翮山山海經曰大翮山小翮山有王仲廟仲字次仲年小入學而逺常先到其師恠之謂不歸使人􅀱焉實在家等軰常見次仲捉一小􅁄木長三尺餘至著屋間欲取輙不見及年弱冠變蒼頡舊文爲今􅀠書秦始皇時官務繁多次仲爲文簡略赴急用之大嘉使徴不至始皇大怒詔檻車送之次仲吟詠化爲大鳥岀車外翮然髙飛徘徊長引至于西門山落二翮因名之也飛龍山隋圖經曰飛龍山又名封龍山十六國春秋前趙録云王俊遣祁弘率鮮卑討石勒戰於飛龍山下勒師大敗酈元水經注云汶水東經飛龍山北又趙記云毎歳有疾風雹雨東南而行俗傳此山神女爲東海而三石人猶存衣冠全具其北即張耳故墟耳無終山隋圖經曰無終山一名歩隂山又名翁同山神仙傳云仙人白仲理者遼東人也隱居無終山中合神丹又於山中作金五千斤以救百姓即此山也又水經云翁伯周末避亂適無終山山前有泉水甚清夏嘗澡浴得玉藻架一􅀟於泉側又捜神記云無終山又有陽翁玉田昔雍伯雒陽人父母終葬於無終山山髙八十里上無水雍伯置飲有人就飲與石一升令種之後玉生得白壁五􅀟娉北平徐氏遂家焉燕山隋圖經曰燕山在易縣東南七十里巖側有石鼓去地百餘丈望之􅀂數百石囷左右梁貫之鼓東南有石人援桴之狀同擊勢云燕山石鼓鳴則有兵龍山隋圖經曰龍山在易縣西南三十里有龍山石上往往有仙人及龍跡西麓谷有一坈大如車輪春則風岀東夏岀南秋岀西冬岀北有沙門法猛以夏日入其東穴見石堂石人欲窮諸穴便有一人厲聲云法師有滯三穴皆如東者不冝仍來見穢猛仍意不息不覺忽在穴外也孔山水經注曰易水東經孔山北又隋圖經云孔山有孔表裏通徹故名尓太平御覽卷第四十五
