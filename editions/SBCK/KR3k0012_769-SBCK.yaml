front:
  text: 太平御覽卷第七百六十九舟部二
  hash: sha256:976bd155ad5ddcdd66e9665cd298c246ae045c09c8b1ed83b207cac24f694a8d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_769-1a}
body:
  text: 叙舟中方言曰舟自􅀜而東謂之舡自􅀜而西或謂之舟方舟或謂之航又曰舩首謂之閭或謂之鷁首郭璞注曰今江東貴人舡前作青雀是其象也東觀漢記曰鄧訓爲護羗校尉綘革爲舡置於箄上以渡河掩擊明羗張璠漢記曰梁兾弟池中舡無故自覆問椽朱穆穆曰舟所以濟渡萬物不施遊戯而巳今覆者天戒將軍濟渡萬民不可長念遊戯也漢宫殿䟽曰武帝作大池周匝四十里名昆明池作豫章大舡可載萬人舡上起宫室吴記曰孫皓問中書令張尚詩言汎彼栢舟唯栢中舟乎尚曰詩云檜檝松舟亦中也皓忌其勝巳因下獄晉令曰水戰飛雲舡相去五十歩蒼隼舡相去四十歩金舡相去三十歩小兒先登飛鳥舡相去五十歩晉朝雜事曰太康八年七月大雨殿前地䧟方五尺深數丈中有破舡晉宫閣記曰天淵池中紫宮舟升進舡曜陽飛龍舟射獵舟靈芝池有鳴鶴舟指南舟舎利池有雲母舟無極舟都亭池有華潤舟常安舟崔鴻後趙録曰張彌師衆一萬徙洛陽鍾簴九龍翁仲銅駞飛廉鍾一没於河募浮没三百人入河以竹絙牛頭轆轤引之乃岀造萬斛舟載以渡之至于鄴穆天子傳曰天子乗鳥舟龍本浮于大沼沼池龍下冝有舟皆以龍鳥爲形制今吴之青雀昉遺象山海經曰大人之國㘴而削舡世夲曰共鼔貨狄作舟共鼔貨狄黄帝二臣又曰廪君名曰豫相姓巳氏即與樊氏曋音審氏栢氏鄭氏凡五姓争神以土爲舡雕文􅀞之而浮水中其舡浮者神以爲君他姓舡不能浮獨廪君舡浮因立爲君蜀王本紀曰􅁗爲舶舡萬艘欲攻楚吕氏春秋曰虞姁作舟姁音劬詡二音又曰荆有佽飛者得寳劒渉江中流而有蛟夾繞其舡佽飛拔寳劔赴江刺蛟殺之舟中之人皆活荆王聞之位以執圭又曰楚人有渉江者其劒自舟中墜於水遽契其舟曰是吾劒所從墜也舟去從所契處入求之而舟巳行劒不行􅀂此不亦惑乎又曰伍貟如吴過於荆至江上欲涉見一丈人刺小舡方將漢從而請焉丈人渡之又曰管夷吾百里奚覆王之舡􅂹也絶江者託於舡致逺者託於􅂹淮南子曰湯武聖主也而不能與越人乗舲音靈舟而浮於江湖舲舟小舡者也又曰楚人有乗舡而遇大風者投於水非不貪生而畏死也或於死而反忘於生又曰龍舟鷁首浮吹以虞此道於水也於舡中吹􅄜與竿以爲樂故曰浮吹以虞者也衡波傳曰孔子使子貢乆而不來孔子謂弟子占之遇鼎鼎易卦也皆言無足不來顔回掩口而􅀏子曰回也哂謂賜來也曰無足者乗舟而來至矣子貢朝至如顔回說苑曰梁相死惠子欲之梁渡河而遽墮水中舩人救之曰子欲何之而遽也曰梁無相吾欲徃相之舡人曰子居舡檝之間而溺無我則死矣子何能相梁乎惠子曰居艘長檝之間不如子至於安國家社稷子比我矇矇如未視狗耳又曰晉平公使叔向聘吴吴人飾舟以逆之左右各五百人有繡衣豹裘者錦衣狐裘者叔向歸以告平公吴其亡乎潜夫論曰人行之動天地譬車上御駟馬蓬中櫂舟雖有覆載猶在我所之蔣子萬機論曰吴越争於五湖用舟檝而相觸怯勇共覆鈍利俱傾顧譚新言曰蓬蒿生于泰山之上豫章長于窮藪之中良匠造舟興宮建廟必不取泰山之陋質而弃窮藪之羙材明矣又曰奔事失轄泛舟無檝欲以不覆未之有也譙周法訓曰以道爲天下者猶乗安舟而由廣路安舟難成可乆處也廣路難至可常行也又曰乗舡曲折不失其瀆是善乗舟者􅀽准正書曰非其所事而強學猶以百萬之師積之河濟之中其用舟擑固不如江漢之良杜夷幽求曰輕舟可以救溺濡幕可以濟焚抱朴子曰欲以􅁦藥必􅂛騰者何異䇿蹇驢而欲㝷遺風櫂籃舟而欲濟大川語林曰劉道真遭亂於河側自牽舡見一老嫗採桑逆旅劉謂之曰女子何不調機利杼而採桑逆旅女荅曰丈夫何不跨馬揮鞭而牽舡王子年拾遺記曰周昭王二十四年塗脩國獻青鳯丹鵠各一雌一雄孟夏之時鳯羽皆脫易毛羽聚鵠翅爲羽扇鳯羽以飾車蓋扇名遊飄二名條翮三名􅉻光四名側影時東甌獻二羙女一名延姢二名造娱使此二人更摇此扇侍於王側輕風乍至冷然自凉昭王淪於江漢二女與乗舟來願同没漢水故江漢之民到今異之丘祠於江湄數十年間人於江漢之上猶見王與二女乗舟檝於水際至暮春上巳之日禊集於祠間或以時鮮甘味採杜蘭之葉以包褁之沉於水中或結五色紗囊盛食或用金䥫之器並沉於波中以言蛟龍水中一褁之不侵食也其祠號曰招祇之祠又曰軒皇變乗採以造舟檝水物爲之翔踴滄海爲之恬波又曰周武王東伐夜郎濟河時雲明如晝八百之旅皆薦賢而歌有大蜂􅃺如舟鳥飛集王舟困以鳥􅀞幡旗翌日而梟紂名其舡曰蜂舟魯哀公二年鄭人擊趙簡子得其蜂旗則其遺􅀋也事出太公六韜又曰漢成帝嘗與飛鷰汎舟戯太液池以沙棠爲舟貴不沉没也以雲母飾於鷁首一名雲母舟又刻大桐木爲虬龍雕飾如真像以夾雲舟而行又曰比翼鳥多力狀似鵠㗸南海之舟泥巢昆岑之去木而止其中遇聖人則來翔集以表周公輔聖人之力也又曰漢武思李夫人之儔不可復得時始穿昆靈池汎翔螭舟帝自歌曲使女伶歌之時日巳西傾凉風激水女伶歌甚道自賦葉落哀蟬之曲又曰張丞之母孫氏懷丞之時乗輕舫遊於江浦之際忽有白蛇長三尺騰入舟中母呪曰􅀂禎􅁻勿毒噬我及將還置諸房内一􅀫視之不復見蛇嗟而惜之韻集曰蠲鷁首天子舡也吴越春秋曰吴王僚二年使公子光伐楚以報前來誅慶封也吴師敗而亡舟光懼因復得王舟之而還又曰范蠡旣滅吴乃乗扁舟出三江入五湖人莫知其所適郡國志曰濟州有浮山故老相傳云堯時大雨此浮水上時有人䌫舡於巖石間今猶有斷鐵鎻吴時外國傳曰扶南國伐木爲舡長者十二㝷廣肘六尺頭尾似魚皆以䥫鑷露裝大者載百人人有長短襓及篙音髙各一從頭至尾靣有五十人作或四十二人隨舡大小立則用長撓坐則用短橈水淺乃用篙皆當上應聲如一杜蘭香别傳曰香降張碩碩既成婚香便去絶不來年餘碩舡行忽見香乗車於山際碩不勝驚喜遥徃造香見香悲喜香亦有悅色言語頃時碩欲登其車其婢舉手排之嶷然山立碩復欲車前上車奴攘臂排之碩於是遂退續捜神記曰臨淮公荀序字休玄母華夫人憐愛過常年十歳從南臨歸經青草湖時正帆風駃音文十也序岀塞郭上落水比得下帆巳行數十里洪波淼漫母撫膺逺望少頃見一掘頭舡漁父以檝撥舡如飛載序還之云送府君還荀後位至常伯長沙相故云府君也又曰合肥口有大舶舡云是曹公舶舡常有漁人夜􅀫傍以舡繫之但聞箏絃節之音又音氣非常漁人又夢人駈遣去云勿近官舡此人驚覺即移舡去相傳云曹公載數妓舡覆於此今猶存焉異苑曰扶南國治生皆用黄金僦舡東西逺近雇一斤時有不至所届欲减金數舡主便作幻誑使舡底砥拆􅃺欲淪滯海中進退不動衆人驚怖還請賽舡合如􅀄也又曰越雀門㑹無縣有元馬河有銅舫舡嵩陽記曰山東北五了山上有池池有破舟云禹乗來也三秦記曰俗云太一山有水神人乗舡今有故􅃮舡也劉欣期交州記曰安定縣有越王銅舡潮退時有見者合浦四十里有潮隂雨日百姓撨採見銅舡岀水上南州異物志曰外域人名舡曰舡大者長二十餘丈髙去水三二丈望之如閣道載六七百人物岀萬解太平御覽卷第七百六十九
