front:
  text: 太平御覽卷第六百五十八
  hash: sha256:483c1c13f5e2992a500a1ed7e2068f84f4c7a221a421dc46018208d4effffd1f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_658-1a}
body:
  text: 釋部六戒律禪塔寺戒律梁書日武帝惑於佛教朝賢多啓求受戒江革精信因果而帝未知謂革不奉佛法乃賜革覺意詩五百字又手勑革日果報不可不信革因乞受菩薩戒又日陶􅀪景曾夢佛授其菩薩記云名爲勝力菩薩乃詣鄮縣阿育王塔自誓受五大戒大同二年卒遺令不須沐浴以大袈裟覆衾蒙首足弟子遵而行之又日陸杲素信佛法持戒甚精著沙門傳三十卷又日蕭昱字子眞厯位中書侍郎每求試邊州武帝以其輕脫無威望抑而不許普通五年徙臨海郡行至上虞勑追還令受菩薩戒旣至恂恂盡禮改意蹈道持戒又精潔帝甚善之北齊書日趙隱字彦深專意􅀇門崇敬佛道雖年期頥常持戒行髙僧傳日弗若多羅此云功德華􅄢賔人也少出家專精十誦律部僞秦中振錫入􅀜姚興待以上賔之禮先是經法雖傳律藏未闡鳩摩羅什聞多羅旣善斯部以秦􅀪始六年集僧數百餘人延請多羅誦出十誦胡本羅什譯爲晉文三分獲二多羅遘疾弃世後有曇摩流支此云法樂西域人弃家入道偏以律藏馳名以􅀪始七年秋達􅀜中初弗若多羅誦出十誦末竟而亡廬山釋惠逺聞支旣善毗尼希得究竟律部乃遣書通好流支旣得逺書乃與羅什共譯十誦都畢支曰吾當更行無律教處於是遊化餘方不知所卒毗婆沙論曰善分別戒名爲毗尼藏大智論曰諸羅漢問誰能明了集毗尼藏皆言優婆離持律第一請就師子座問佛在何處說初毗尼戒優婆離言我聞佛在毗舎離爾時須隣郍迦蘭陀長者子初犯戒以是因縁故結初罪如是二百五十戒義三部七法八法尼律增一開雜部善部如是等八部十作毗尼藏經云五戒一不殺生二不偷盜三不邪婬四不妄語五不飲酒食肉故云五戒布施持戒忍辱精進禪定智惠以法能度生死故云六度色聲香味觸法能坌汙人之淨心故曰六塵禪寶林傳曰佛未􅄺槃時每吿弟子迦葉曰吾以淸淨法眼湼槃妙心實相正法將付於汝汝可流布無令斷絶迦葉敬諾唯然受教迦葉傳阿難阿難付商郍和脩自此轉相傳授至般若多羅并佛二十八師般若多羅付菩提達磨菩提達磨者南天竺人也梁普通中泛海至于廣州後過江上嵩山少林寺達磨傳惠可惠可傳僧璨隱於晥山璨傳道信道信傳􅀪忍􅀪忍傳惠能惠能住韶州曹溪是爲六祖髙僧傳曰釋道立不知何許人出家事安公爲師隱覆舟山岩居獨立不受供養每潛入禪輒七日不起塔宋書曰謝尚嘗夢其父曰西南有氣至衝人必死勿當其鋒家無一全汝冝修福建塔寺可穰之若未暇立寺可杖頭刻作塔形見有氣來可擬之尚悟懼未及造塔寺遂刻小塔施杖頭􅁪置左右後果有異氛遥見西南從天而下始如車輪漸弥大直衝尚家尚以杖指之氣便廻散闔門獲全氣所經處數里無復孑遺遂於永和四年捨宅造寺名莊嚴寺宋大明中路太后於宣陽門外造莊嚴寺改此爲謝鎭西寺又日阿育王寺塔阿育王卽鐡輪王王閻浮提一天下佛滅後一日一夜役􅀑神造八萬四千塔此卽其一吳時居其地以爲精舎孫綝尋除毁之塔亦同滅吳平後諸道人復於舊處建立焉晉元帝初渡江更脩飾之其後有西河離石縣胡人劉薩阿遇疾暴亡七日更蘇說云觀世音語云汝縁未盡當得活可作沙門洛下齋丹陽㑹稽並有阿育王塔可往禮拜忽然醒寤因此出家名惠達遊行至丹陽未知塔處及登越城四望見長千里氣色因就禮拜果是先阿育王塔所屢放光明由是定知必有舎利集衆就掘得三石碑有鐵函函中有銀函函中又有盛三舎利及爪髮長一丈七尺詔遣沙門釋雲隨使往迎之先是武帝改造阿育王等塔出舊塔下舎利及佛爪髮髮青紺色衆僧以手伸之隨手長短放之則旋屈爲蠡形按經云佛髮青而細猶如藕莖絲佛三昧經云我昔在宫沐頭以尺自量髮長一丈二尺放已右旋還成蠡文則與帝所得同也佛圗澄傳日後趙尚書張離張良家富事佛起大塔澄謂日事佛在於淸淨無欲慈矜爲心檀越雖儀奉大法而貪恡未巳遊獵無度積聚不窮方受見丗之罪何福報之可希也洛陽茄藍記曰永寧寺熙平元年靈太后胡氏所立也在宫前閶闔門南一里中有九層浮圖初掘基至黃泉下得金像三十軀太后以爲信法之徴永熈三年浮圗爲火所燒後有人從東萊郡來云見浮圖於海中光明照耀儼然若新海上之民咸皆見之俄然霧起浮圗遂隱又曰西方佛沙伏國國王造一塔初成用眞珠爲羅網覆其上於後數年王乃思量此珠羅網價直萬金我崩之後恐人侵奪復慮大塔破壞無人脩補因解珠網以銅鑊盛之在塔西北百歩掘地埋之上種樹名菩提枝條四布密葉蔽天樹下四面坐像各髙丈五􅁪有四龍典掌此珠若興心欲取卽有禍變刻石爲銘屬語將來若此塔壞勞煩後賢出珠修治寺後漢書曰陶謙同郡人笮融聚衆數百往依於謙謙使督廣陵下邳彭城運糧遂大起浮圖寺上累金盤下爲重樓又堂閣周回可容三千許人作黃金塗像衣以錦綵每浴佛輒多設飲飯布席於路其有就食及觀者且萬餘人宋書曰明帝以故宅起湘宫寺費極奢侈以孝武莊嚴寺刹七層帝欲起十層不可立分爲雨刹各五層新安太守巢尚之罷郡還見帝曰卿至湘宮寺未我起此寺是大功德虞愿在側日陛下起此寺皆是百姓賣兒貼婦錢佛若有知當悲哭哀愍罪髙佛圗有何功德帝大怒馳曳下殿愿徐去無異容又曰巢尚之甚聦敏時百姓欲爲孝武立寺疑其名尚之應聲曰冝名天保詩云天保下報上也時服其機速又曰蕭惠開丁父難家素事佛凡爲起四寺南岡下名曰禪岡寺曲阿舊鄉宅名曰禪鄕寺京口墓亭名曰禪亭寺所封陽縣名曰禪封寺梁書日何氏自晉司空充宋司空尚之奉佛法建立塔寺至敬容又捨宅東爲伽藍趍權者因助造搆敬容並不拒故寺堂字頗爲宏麗時輕薄者因呼爲衆造寺及敬容免職出宅止有常用器物及囊衣而巳竟無餘財又曰謝舉宅内山齋捨以爲寺泉石之美殆若自然舉託情􅀇勝尢長佛理注淨名經嘗自講說又曰武帝以三橋舊宅爲光宅寺勑周興嗣與陸倕各製寺碑及成俱奏帝以興嗣所製自題又曰江紑字含潔幼有孝性年十三父蒨患眼紑侍疾將朞月衣不解帶夜夢一僧云患眼者飲惠眼水必差及􅁴說之莫能解者與草堂寺智者法師善往訪之智者曰無量壽經云慧眼見眞能度彼岸蒨乃因智者啓捨同夏縣界牛屯里舎爲寺乞賜嘉名勑荅曰近見智者云慧眼則五眼之一號可以惠眼爲名及就創造㳿故井水淸冽異於常水夢中取水洗眼及煑藥稍覺有瘳因此遂得差南史日王懿字仲德父苗仕苻堅至二千石苻堅之敗仲德年十七及兄叡同起義兵與慕容垂戰敗被重創走與家屬相失路經大澤困未能去卧林中有一小兒青衣年可七八歲騎牛行見仲德驚日漢己食未仲德言飢小兒去須􅁷復來得飯與之食畢欲行而暴雨莫知津徑有一白狼至前仰天而號號訖銜仲德衣因渡水仲德隨後得濟與叡相及渡河至滑臺復爲翟遼所留積年仲德欲南歸乃棄遼奔泰山晉太元末徙居彭城宋元嘉九年又爲徐州刺史仲德三臨徐州威德著於彭城立佛寺作白狼童子像於塔中以在河北所遇也又日波斯國城外佛寺二三百所梁大通二年遣使獻佛牙又日劉孝綽與到漑兄弟甚狎漑少􅀌宅近僧寺孝綽謂僧物也撫手􅀏漑知其旨奮拳擊之傷口而去三國典略日齊主初爲胡昭儀起大慈寺未成改爲穆皇后大寶林寺運石塡泉牛死無數唐書日會昌五年四月括天下寺几大寺四千二百蘭若四萬僧尼二十六萬五百七月勑併省天下佛寺上州各留寺一所中下州寺並廢上都東都各留十寺寺僧十人洛陽伽藍記日白馬寺漢明帝所立也佛教入中國之始寺在西陽門外御道南明帝夢見金人長丈六項佩日月光明胡神號日佛遣使向西域求之乃得金像焉時以白馬􅀒經而來因以爲名寺上經函常存時放光明曜於堂字是以道俗禮敬之如仰眞容又日崇義里有京兆人杜子休宅時有隱士趙逸云是晉武時人晉朝舊事多所記録正光初來至京師見子休宅歎息日此中朝時太康寺也時人未之信遂間寺之由􅇣云龍驤將軍王濬平吳之後始立此寺本有三層浮圖用塼爲之指子休園中日此是故處子休掘而驗之果得塼數萬并有石銘云晉太康六年歲次乙巳九月甲戍朔八日辛巳儀同三司襄陽侯王濬敬造子休遂捨宅爲靈應寺又日冝壽里内苞信縣令段暉宅地下常聞有鍾聲時見五色光明照於堂宇暉甚異之遂掘光所得金像一軀髙三尺并二菩薩趺上銘云晉泰始二年五月十五日侍中中書監荀勗造暉遂捨宅爲光明寺時人咸云此地是荀勗宅又曰脩􅆊寺有金剛鳩鴿不入鳥雀不栖菩薩達摩云得其眞相建康實録曰晉許詢捨永興山陰二宅爲寺家財珍異悉皆是給旣成啓奏孝宗詔曰山陰舊爲祗洹寺永興居爲祟化寺造四層塔物産旣罄猶欠露槃相輪一朝風雨相輪等自備時所訪問乃是剡縣飛來又曰一乘寺梁邵陵王綸造梁末賊起遂延燒陳尚書令江揔捨堂宇寺今之堂是也寺門遍畫凹凸花代稱張僧繇手跡其花乃天竺遺法朱及青緑縁所成逺望眼暈如凹凸就視卽平世咸異之乃名凹凸寺又曰牛頭山西峯中有窟不測深淺古老相傳云辟支佛所出梁武帝於窟穴下置寺名曰仙窟寺窟有一石鉢盂莫知所由來形狀甚古唐神龍初鄭克俊取將入長安乃開禪寺志公嚴屐也髙僧傳日釋法度少出家高士明僧紹隱居瑯琊之攝山及亡捨所居山爲棲霞精舎謂度居之經歲許忽聞人馬鼓角之聲俄見一人持名􅁓通日靳尚前度見尚形甚都羽衛亦嚴致敬已乃言日弟子主有此山七百餘年法師道德所歸謹捨以奉給并願受五戒永結來縁度爲設㑹受戒而去又日孫放西寺曾搆傾頽沙門支雲惠謀欲建立其日有童子持􅁓蓮花插故寺東面相去十餘丈於是建刹中標正當華所太平御覽卷第六百五十八
