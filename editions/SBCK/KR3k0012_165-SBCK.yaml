front:
  text: 太平御覽卷第一百六十五
  hash: sha256:7676fcaf2e63c2dedcc8a9f55a5cdc1a588129d8ab26aaeb14a77f68389f5f11
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_165-1a}
body:
  text: 州郡部十一隴右道秦渭蘭㑹河洮岷廓疊鄯凉甘肅􅀲沙伊西庭秦州十道志曰秦州天水郡禹貢雍州之域古西戎地􅁗始封之邑􅁗爲隴西郡漢武置天水郡史記秦本紀曰周孝王時非子好馬及善畜養孝王曰昔栢翳爲舜主畜多息故有土賜姓嬴今其後丗亦爲朕息馬遂分土地爲附庸邑之􅁗使續嬴氏漢志曰天水郡莽曰填戎明帝改曰漢陽􅁗州記曰郡前有湖水冬夏無増减或􅀃天水取名由此湖也漢志曰上邽屬隴西郡戎邑也又曰成紀清水並屬天水郡莽改清水曰識時輿地志曰石紐地名夏禹所生之地續漢書郡國志曰成紀古帝庖犧氏所生之地漢志曰略陽道屬天水郡十三州志曰略陽即故冀城也又曰街泉戎邑道屬天水郡續漢書地里志有街泉亭渭州十道志曰渭州隴西郡春秋及戰國時羗戎所居􅁗昭王伐得義渠戎王始置隴西郡禹貢曰導渭自鳥䑕同穴又曰終南敦物至于鳥䑕漢志豲道戎邑也屬天水郡即今隴西縣地豲音桓地道記曰漢陽有大坂名曰隴坻亦曰隴山郡處其西故曰隴西其山堆旁崩聲聞數百里揚雄所謂響􅀂坻頽是也蘭州十道志曰蘭州金城郡禹貢雍州之域古西戎地􅁗併天下爲隴西郡後漢書西羗傳曰羗無戈援劒曽孫忽留湟中忽子研立研最豪徤故羗中號爲研種􅁗始皇時務併六國兵不西行故羗人得蕃息及􅁗併天下築長城以界之衆羗不復􅀯渡漢興匈奴冐頓強盛臣伏諸羗景帝時研種留何率人求守隴西於是徙留何於狄道漢志曰狄道屬隴西郡以其地有狄種故云狄道又曰浩亹水􅀂西塞外東至允吾入湟水詩大雅曰鳬鷖在亹亦其義也蘭州有浩亹故城浩亹音閤門漢志曰金城郡領縣十三應劭曰􅀄築城得金故曰金城瓉曰金取其堅固也故墨子曰金城湯池㑹州十道志曰㑹州㑹寜郡禹貢雍州之域古西羗地􅁗併天下屬隴西郡漢屬金城郡唐武德二年平李􅁤置西㑹州貞觀八年改爲㑹州元和郡縣志曰後周太祖爲西魏相來廵㑹師於此因置州爲名唐貞觀中亦爲粟州河州十道志曰河州安郷郡禹貢雍州之域古西羗地􅁗併天下爲隴西郡漢分置天水郡漢志曰枹罕屬金城郡故罕羗侯邑也抱音孚其子從木禹貢曰道河積石至于龍門積石山在金城西南西域傳曰河注蒲昌海潜行地下南出於積石山洮州十道志曰洮州臨洮郡禹貢雍州之域􅁗漢諸羗之地漢志曰洮水出西羗中北至抱罕東入河沙岷州十道志曰岷州和政郡禹貢雍州之域六國時屬􅁗􅁗併天下爲隴西之臨洮縣史記曰蒙恬築長城起臨洮廓州十道志曰廓州寜塞郡禹貢雍州之域古西羗地漢書曰宣帝時諸羗數背叛後將軍趙充國屯隴西羇縻之諸羗不敢動後漢書叚熲傳曰延熹中燒當煎河勒姐等八種羗冦隴西金城熲追討大破之明年澆河大豪㓂張掖熲斬澆河大帥五千餘人西羗於是弭定疊州十道志曰疊州合川郡禹貢梁州之域歷􅁗漢魏晉爲諸羗所據後周書曰建德六年西逐諸戎始統有其地因置􅁪香郡㝷改爲疊州蓋以其地多山重疊以名郡也又於三交口築城置甘松防又爲三川縣以􅀠􅁪香郡至建德元年改三川縣爲常芬縣仍立芳州以邑􅀠焉取其地多芳草爲郡之名鄯州十道志曰鄯州西平郡禹貢雍州之域古西戎之地漢志曰允吾屬金城郡今龍攴縣即其地凉州十道志曰凉州武威郡禹貢雍州之域六國至􅁗戎狄月攴居焉漢􅀄爲匈奴右地釋名曰西方寒凍或云河西土田薄故曰凉晉書曰姑臧城匈奴所築舊蓋臧城語訛後云姑臧又曰惠帝末張䡄求爲凉州於是大城此地爲一㑹府以據之號前凉後吕光復據之號後凉禹貢曰原隰厎績至于豬野織皮崑崙析支渠捜西戎即叙續漢書曰西羗自賜支以西濵河首左右居今河􅀜西可十餘里有河曲羗謂之賜支異物志曰古渠捜國當大宛北界豬野今姑臧界豬野澤是劉昞燉煌實録曰晉安帝隆安元年凉州牧李暠微服出城逢虎道邊虎化爲人遥呼暠爲西凉君暠因彎弧待之又遥呼暠曰有事告汝無疑也暠知其異投弓於地人乃前曰燉煌空虚不是福地君之子孫王於西凉不如徙酒泉言訖乃失暠乃移都酒泉後漢書曰安帝時匈奴冦常山於是西北有事民飢民用不足大將軍鄧騭欲棄凉州專務北邊曰譬􅀂家人衣壞敗一以相􅀘猶有所完􅀂不如此將兩無所保郎中虞討曰大將軍之䇿不可者三先帝闢境而今棄之不可一也棄凉州即以三輔爲塞園陵單外不可二也諺曰􅀜西出將􅀜東出相烈士武臣多出凉州風土壯猛便習兵事今羗所以不過三輔爲腹心害者以凉州在其後也甘州十道志曰甘州張掖郡禹貢雍州之域六國至􅁗戎狄月支居焉漢爲匈奴右地尚書禹貢曰道弱水至于合􅀺十道志曰今張掖有合􅀺水漢志西域傳曰月支本居祁連燉煌間霍去病傳曰濟居延遂臻小月支攻祁連即此道也漢志曰張掖郡匈奴昆邪王地武帝時開之莽曰設屏應劭曰張國臂掖故曰張掖也又曰觻得屬張掖郡有千金渠西至樂涫入澤中莽曰官式涫音官音鹿又曰刪丹屬張莽曰貫虜肅州十道志曰肅州酒泉郡禹貢雍州之域古西戎地月支所居漢爲武威酒泉郡也漢書曰武帝元狩二年昆邪王殺休屠王將其衆來降以其地爲武威酒泉郡又匈奴傳曰漢置酒泉郡以隔絶故與羗通路又西通月支大夏以公主妻烏孫王以分匈奴西方之援國其水甘􅀂酒故名酒泉後漢書曰班超乆在西域年老思土上書曰臣不敢望到酒泉郡但願生入玉門關玉門屬燉煌今沙州也去長安三千六百里酒泉今肅州也去長安二千八百五十里路􅀲州十道志曰􅀲州晉昌郡禹貢雍州之域古西戎地戰國時烏孫月支居焉漢􅀄爲匈奴右地後爲武威酒泉二郡漢志曰寘安屬燉煌郡寘水出焉又名籍端水出羗中西入澤寘安即晉昌地又曰廣至冝禾都尉治昆侖障莽曰廣桓即常樂地有冝禾故城沙州十道志曰沙州燉煌郡禹貢雍州之域古西戎地􅁗屬西戎漢置燉煌郡左傳范宣子數戎子駒支曰昔􅁗人迫逐乃祖吾離于􅀲州􅂪犯荆􅁄以來歸我先君惠公有不腆之田與汝剖分而食之􅀲州地在燉煌漢書曰武帝元鼎六年分酒泉置燉煌郡徙人以實之應劭曰燉大也皇盛也又西域傳曰東則接漢扼以玉門陽􅀜今壽昌有陽􅀜及玉門故􅀜漢志曰燉煌郡龍勒縣有陽􅀜玉門􅀜伊州十道志曰伊吾郡本伊吾盧地在燉煌之北大磧之外南去玉門八百里後漢書曰永平十六年明帝命將北征取伊吾盧地置冝禾都尉以屯田又西羗傳曰伊吾地冝五榖桑麻蒲陶其北有栁中皆膏膄之地故漢與匈奴爭車師伊吾之地以制西戎西州十道志曰西州交河郡漢書西域傳曰車師後王國有新道通玉門􅀜戊巳校尉徐普欲開以省道里半以避白龍堆之扼車師後王姑勾以道通爲不便即馳突出髙昌壁入匈奴後魏書曰以其地􅀔髙峻人物昌盛因名髙昌庭州十道志曰庭州雍州之外流沙之西北前漢烏孫舊地東與匈奴接歷代爲胡虜所居漢書西域傳曰貳師伐西域諸國震懼自燉煌西至鹽澤徃徃起亭而輪臺渠􅀺多有田卒後漢書曰班超將兵擊伊吾於蒲􅀋海太平御覽卷第一百六十五
