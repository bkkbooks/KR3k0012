body:
  text: 偏霸部二呉孫堅孫䇿孫權孫亮孫休孫皓孫堅呉志孫堅字文臺呉郡富春人盖孫武之後也少爲縣吏府召署校尉㑹稽妖賊許昌起於句章堅以郡司馬募精勇得千餘人與州郡合討破之刺史臧旻列上功狀詔書除堅鹽瀆丞又徙下邳丞漢中平元年黄巾賊張角起於魏郡遣車􅀐將軍皇甫嵩中郎將朱儁將兵討擊之儁表請堅爲佐軍司馬堅又募精兵千許人與儁併力􅁬擊所向無前拜别部司馬中平三年司空張温西討邊章韓遂温表請堅叅軍事温以詔書召董卓卓良乆乃詣應對不順堅數卓三罪勸温斬之温不忍發舉軍還拜堅議郎時長沙賊區星自稱將軍以堅爲長沙太守克破星等漢朝録前後功封堅烏程侯靈帝崩董卓専擅朝政諸州郡舉義兵討卓堅亦舉兵比至南陽衆數萬人南陽太守張咨晏然自􅀂牽咨於軍門斬之郡中震慄無求不獲前到魯陽與􅀽術相見術表堅行破虜將軍領豫州刺史遂治兵於魯陽城進軍討卓卓惮堅猛壯乃遣將軍李􅔸音覺等求和親堅曰卓逆天無道蕩覆王室今不夷汝三族懸示四海則吾死不瞑目豈與汝和耶復進軍大谷距雒九十里卓㝷徙都入􅀜焚雒邑堅至雒修諸陵平塞卓所發掘訖引軍住魯陽􅀄平三年術使堅征荆州擊劉表表遣黄祖逆於樊鄧之間堅破之追渡漢水圍襄陽單馬行峴山爲祖軍士所射殺追謚武烈皇帝兄子賁帥將士衆還就術術復表賁爲豫州刺史堅四子䇿權翊匡孫䇿呉志曰䇿字伯符堅初興義兵䇿將母徙居舒與周瑜相友江淮間人成向之堅薨還葬曲阿巳乃渡居江都䇿舅吴景時爲丹陽太守䇿乃載母徙曲阿興平元年從􅀽術術甚竒之以堅故部曲還䇿太􅀓馬日磾音低仗節安集􅀜東辟䇿表拜懷義校尉術常歎曰使術有子如孫郎死復何恨先是劉繇爲楊州刺史楊州舊治壽春壽春術巳據之繇乃渡江治曲阿時吴景尚在丹陽䇿從兄賁又爲丹陽都尉繇至皆迫逐之景賁退舎歴陽繇遣樊能等屯江津張英屯當利以距術術以景爲督軍中郎將與賁共將兵擊英等連年不克䇿乃說術乞助景等平定江東術表䇿爲折衝校尉行殄宼將軍兵纔千餘􅀐數十疋賔客願從者數百人比至歴陽衆五千䇿又徙母阜陵渡江轉􅃲所向皆破莫敢當其鋒而軍令整肅百姓懷之䇿爲人羙姿顔好􅀏語性闊逹聽受善於用人是以士民樂爲致死劉繇弃軍遁逃諸郡守皆􅂢城奔走呉人嚴白虎等衆各萬餘人處處屯聚䇿引兵渡浙江據㑹稽乃攻破虎等更置長吏䇿自領㑹稽太守彭城張昭廣陵張紘秦松等爲謀主時􅀽術僣號䇿以書責而絶之曹公表䇿爲討逆將軍封爲吴侯後術死長史楊弘大將張勲等將其衆欲就䇿廬江太守劉勲要擊悉虜之䇿輕軍襲拔廬江勲衆盡降勲與數百人自歸曹公是時􅀽紹方強而䇿并江東曹公乃以弟女配䇿小弟匡又爲子章取賁女又命楊州刺史嚴象舉權茂才建安五年曹公與􅀽紹相拒於官渡䇿隂謀襲許迎漢帝宻治兵未發㑹爲故吴郡太守許貢客所刺傷創甚謂張昭等曰中國方亂以吴越之衆三江之固足觀成敗公等善相吾弟呼權佩以印綬至夜卒時年二十六追謚長沙桓王孫權吴志曰孫權字仲謀兄䇿旣定諸郡時權年十五以爲陽羡長郡察孝廉舉茂才行奉義校尉漢以䇿逺脩貢職遣使者劉琬加錫命琬語人曰吾觀孫氏兄弟雖各才秀明逹然皆禄祚不終唯中弟孝廉形皃竒偉骨體不恒有大貴之表年又最壽䇿薨以事授權權􅂘未及息䇿長史張昭謂權曰孝廉此寧哭時耶扶令上馬使岀巡軍曹公表權爲討虜將軍領㑹稽太守屯呉建安八年權西征伐黄祖破其州軍劉備表權行車􅀐將軍領徐州牧十六年權徙治秣陵明年城石頭改秣陵爲建業二十一年冬曹公攻濡湏權令都尉徐詳詣曹公報脩好誓重結婚二十三年十月權將如呉親乗馬射虎馬爲虎所傷權投以􅀟㦸虎却廢常從張丗擊以戈獲之二十四年􅀜羽圍曹仁於襄陽權內惮羽外欲以爲已功飛牋于曹公乞討􅀜羽閏月權征羽遂定荆州曹公表權爲驃􅀐將軍持節領荆州牧封南昌侯權自公安都鄂改名武昌魏文帝踐祚加􅁠九錫爲吴王􅀄權外託事魏而誠心不欵魏欲遣侍中辛毗尚書桓階往與盟誓并徴任子權辤讓不受遂改元爲黄武元年臨江拒守權使太中大夫鄭泉聘劉備于白帝始復通好猶與魏文帝相往来至後年乃絶七年二月公卿百司皆􅂆正尊號夏四月武昌言黄龍鳯皇見丙申祭南郊即皇帝位是日大赦改元黄龍元年追尊父破虜將軍堅爲武烈皇帝母吴氏爲武烈皇后兄討逆將軍䇿爲長沙桓王六月與蜀爲盟九月遷都建業四年魏使以馬求易珠璣翡翠瑇瑁權曰此皆􅀌所不用而以得馬聽與交易赤烏七年歩騭朱然等各上䟽云自蜀還者咸言蜀欲背盟與魏交通宜爲之備權曰吾待蜀不薄無以􅀒之人言􅀂不可信朕爲君破劵保之蜀竟無謀如權所籌太元元年權􅀕南郊還􅃦疾二年四月薨時年七十一謚曰大皇帝葬蔣陵呉志評曰孫權屈身忍辱任才尚計有勾踐之竒英人之傑矣能自擅江表成鼎峙之業然性多嫌忌果於殺戮曁臻末年弥以滋甚至于讒說殄行㣧嗣廢斃豈所以貽厥孫謀以宴翼者哉其後遂致覆國未必不由此也吴志曰權自陸口遂征合肥合肥未下徹軍還兵皆就路權與陵統甘寕等在津北爲魏將張遼所襲統等以死捍權權乗駿馬越津渠得去獻帝春秋曰張遼問吴降人曰向紫髯將軍長上短下大便馬善射是誰降人荅曰是孫㑹稽耶張遼樂進相謂言早知之急追即獲舉軍歎恨吴暦曰曹公出濡湏􅁠數挑戰公堅守不岀權乃自乗舩從濡湏口入公見舟舩器仗法伍整肅喟然歎曰生子當如孫權劉景升兒􅀂㹠犬耳􅁠爲牋與曹公說春水方生公宜速去别紙言足下不死􅀌不得安曹公語諸將曰孫權不欺􅀌乃徹還江表傳曰堅爲下邳丞時權生方頥大口目有精光堅異之以爲有貴像及堅亡䇿起事江東權常隨從性度弘朗仁而多断好俠養士始知名侔於父兄矣毎叅問計謀䇿甚竒之自以爲不及也毎請㑹賔客頋權曰此諸君之將軍也孫亮吴志曰孫亮字子明權少子權春秋髙而亮最少故尤留意姊全氏公主嘗譛太子和子母心不自安因􅀝權意欲豫自結數稱述全尚女勸權爲亮納焉赤烏十三年和廢權遂立亮爲太子以全氏爲妃權薨太子即尊號大赦改元建興元年冬十月大􅀓諸􅁑恪率軍遏巢湖城東興十二月魏使將軍諸􅁑誕等岀􅀐七萬圍東興恪以大兵赴敵大破魏軍太平元年以從兄偏將軍綝丑林切爲侍中武衛將軍領中外諸軍事二年四月亮臨正殿大赦始親政事又科兵家子弟十八巳下十五巳上得三千餘人選大將子弟年少有勇力者爲之將帥亮曰吾立此軍欲與之俱長日於􅁐中習焉三年亮以綝專恣與太常全尚將軍劉承謀誅綝九月綝以兵取尚遣弟恩攻殺承於蒼龍門外召大臣㑹宫門黜亮爲㑹稽王時年十六吴暦曰亮出西􅁐方食生梅使黄門至中藏取􅁡漬梅􅁡中有䑕屎召問藏吏吏叩頭亮問吏曰黄門從汝求蜜耶吏曰向求實不敢與黄問不服侍中刁玄張邠啓黄門藏吏辤語不同請付獄推亮曰此易知耳令破䑕屎屎裏燥亮大􅀏謂􅀇邠曰􅀂乆在􅁡中中外當俱濕今裏燥必黄門所爲黄門首服左右莫不驚悚孫休吴志曰孫休字子烈權弟六子也年十三從中書郎謝慈郎中盛冲受學太元二年正月封琅耶王居虎林四月權薨休弟亮承統諸􅁑恪秉政不欲諸王在濵江兵馬之處徙休於丹陽郡太守李衡數以事侵休休上書乞徙他郡詔徙㑹稽居數歳夢乗龍上天頋不見尾覺而異之孫亮廢孫綝使宗正孫楷與中書郎董朝迎休休􅀄聞問意疑楷朝具述所奉迎本意留一日一夜發行至曲阿有老公于休叩頭曰事乆變生天下顒顒願陛下速行休善之是日進及布塞亭武衛將軍孫恩行丞相事率百僚以乗輿法駕迎於永昌亭綝以兵千人迎拜於道側休下車荅拜即日御正殿大赦改元永安元年冬綝一門五侯皆典禁兵權傾人主休聞綝逆謀隂與張布圖計十二月戊辰臘辰百僚朝賀公卿升殿詔令武士􅅞綝即日伏誅五年以衛將軍濮陽興爲丞相休以丞相興及左將軍張布有舊恩委之以事布典宫省興􅀜軍國休銳意於典籍欲畢覽百家之言又好射雉春夏之間常晨出夜還唯此時舎書休欲與博士􅀕酒韋矅博士盛冲講論藝矅冲素皆切真布恐入侍發其隂失令巳不得專因妄飾說以拒遏之休荅曰􅀌之渉學群書略偏所見不少也其明君闇主姧臣賊子古今賢愚成敗之事無不覽也今矅等入但欲與講論書耳不爲從矅等始更受學也縱復如此亦何所損君特當以矅等恐道臣下姧變之事以此不欲令入耳如此事􅀌己自備之不湏矅等然後乃解也此都無所損君意特有所忌故耳布得詔陳謝重自序述又言懼妨政事休荅曰書藉之事患人不好好之無傷也此無所爲非而君以爲不宜是以􅀌有所及聖王務學業其流各異不相妨也不圖君今日在事更行此於􅀌也良甚不敢布拜表叩頭休荅曰聊相開悟耳何至叩頭乎如君之忠誠逺近所知往者所以相感今日之巍巍也詩云靡不有初鮮克有終終之實難君其終之初休爲王時布爲左右將督素見信愛及至踐祚厚加寵待專擅國勢多行無禮自嫌瑕短懼曜冲言之故尤患忌休雖解此旨心不能恱更恐其疑懼竟如布意廢其講業不復使冲等入七年七月休薨時年三十謚曰景皇帝江表傳曰休寢疾日不能言乃手書呼丞相濮陽興入令子􅓣音湾岀拜之休把興手而指􅓣以託之也襄陽記曰李衡爲丹陽太守時休在郡衡數以法繩之妻習氏毎諫衡衡不從㑹休立衡懼謂妻曰不用卿言以至於此遂欲奔魏妻曰琅邪王素好善慕名方欲自顯於天下終不以􅀻嫌殺君明矣可自囚詣獄如此乃當逆見優饒非但直活而巳衡從之果得無恙又加威逺將軍授以棨㦸吴志曰休詔曰丹陽太守李衡以往事之嫌自拘有司夫射鈎斬祛在君爲君遣衡還郡勿令自疑孫皓吴志曰孫皓字元宗權孫和之子也一名彭祖字皓宗孫休立封皓爲烏程侯遣就國西湖民景養相皓當大貴皓隂喜而不敢泄休薨是時蜀􅀄亡而交阯携叛國内震懼貪得長君左典軍萬彧昔爲烏程令與皓相善稱皓才識明断是長沙桓王之儔又加之好學奉遵法度屢言之於丞相濮陽興左將軍張布布興􅀃休妃太后朱欲以皓爲嗣朱曰我寡婦人安和社稷之慮苟吴國無隕宗廟有頼可矣於是遂迎立皓時年二十三改元大赦皓旣得志麄暴驕盈多忌諱好酒色大小失望興布竊悔之或以語皓十一月誅與布天紀三年冬晉命鎭東將軍司馬伷音宙安東將軍王渾楊州刺史周浚太尉賈充爲大都督量宜處要􅀔之中􅀄皓毎宴㑹羣臣無不咸令沉醉置黄門郎十人特不與酒侍立終日爲司過之史宴罷之後各奏其闕失罔有不舉大者即加威刑小者咸以爲罪後宫千數而采擇無巳激水入宫宮人有不合意者輒殺流之或剥人靣或鑿人眼岑昏險䛕貴幸致位九列好興功役衆所患苦是以上下離心莫爲皓盡力蓋積惡巳熟不復堪命故也晉軍所至則土崩瓦解而王濬順流司馬伷王渾皆臨近境皓用光禄勲薛瑩中書令胡冲等計分遣使奉書於濬濬先到於是受皓之降解縛焚襯延請相見伷以皓致印綬於巳遣使送皓皓舉家西遷以太康元年三月丁亥就集于京邑四月詔賜號爲歸命侯給衣服車乗田三十頃歳給榖五千斛錢五千萬絹五百疋綿五百斤皓太子瑾拜郎中五年皓死于洛陽吴録曰皓以四年十二月死時年四十二葬河南縣也丗說曰晉武帝問孫皓聞南吴人好作女歌頗能不時正飲酒因舉觴􅂆帝而言曰昔與汝國隣今爲汝作臣上汝一柸酒令汝壽萬春帝悔之吴志評曰皓淫刑所濫殞斃流黜者蓋不可勝數是以羣下人人惴恐虐用其民窮淫極侈宜其腰首分離以謝百姓旣蒙不死之詔復加歸命之寵豈非曠蕩之恩過厚之澤也哉太平御覽卷第一百一十八
