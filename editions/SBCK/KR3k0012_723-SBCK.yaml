body:
  text: 方術部四醫三齊書曰徐嗣伯爲臨川王映所重時直閤將軍房伯玉服五石散十許劑無益更患冷夏日常􅃨衣嗣伯爲􅐷之曰卿伏􅀬應湏以水發之非冬月不可至十一月氷雪大盛令二人夾捉伯玉伯玉解衣㘴石上取冷水從頭澆之盡二十斛伯玉口噤氣絶家人啼哭請止嗣伯遣人執杖防閤敢有諌者撾之又盡水五斛伯玉始能動而見背上彭彭有氣俄而起㘴曰􅀬不可忍乞冷飲嗣伯以水與之一飲一􅂛病都差自尓恒發􅀬冬月猶單衣體更肥壯又甞有傴人患滯冷積年不差嗣伯爲􅐷之曰此尸注也當得死人枕煑服之乃愈於是徃古􅃁中取枕枕巳一邊腐􅆙服之即差後秣陵人張景年十五腹脹靣黄衆醫不能療以問嗣伯曰此石蚘音廻耳極難療當得死人枕煑之依語煑枕以湯投之得大痢并蚘蟲頭堅如石者五􅂛病即差後沈僧翼患眼痛又多見􅀑物以問嗣伯嗣伯曰邪氣入肝可覔死人枕煑服之服竟可埋枕於故處如其言又愈王晏問之曰三病不同而皆用死人枕而俱􅆧何也荅曰尸注者􅀑氣伏而未起故令人沉滯得死人枕促之䰟氣飛越不得復附體故尸注可差石蚘者乆蚘也醫療旣僻蚘蟲轉堅丗間藥不能遣所以湏􅀑物驅之然後可散故令煑死人枕也夫邪氣入肝故使眼痛而見魍魎應湏邪物以鈎之故用死人枕也氣因枕去故復埋於􅃁間也又春月出南籬門戯聞草屋中有呻吟聲嗣伯云此病甚重更二日不療必死乃徃視見一老姥稱體痛而處處有􅗼音敢黒無數嗣伯還煮斗餘湯送令服之服之訖痛􅀬愈甚跳投牀者無數湏􅁷所􅗼處皆拔岀長寸許乃以膏塗諸瘡口三日而復云此名釘疽也又薛伯宗善徙癰疽公孫㤗患發背伯宗爲氣封之徙置齋前栁樹上明日癰消樹邊便起一瘤如拳大稍稍長二十餘日瘤大膿爛出黄赤汁􅂛餘樹爲之痿損齊書曰禇澄字彦道建元中爲吴郡太守百姓李道念以事到郡澄見謂曰汝有重病荅曰舊有冷病至今五年衆醫不􅆧澄爲􅐷脉曰汝病非冷􅀬當是食雞子過多所致令取䔉一斗煑之服一服乃吐一物如升許涎褁之而動開視乃雞鶵十二頭而病都愈吴均齊春秋曰顧歡字玄平吴都人也隠於㑹稽山隂白石村歡率性仁愛素有道風其濟人也或以禳厭而多全護有病邪者造之歡問君家有書乎荅曰唯有孝經三篇歡曰取置病人枕邊恭敬之當自􅆧如言果愈後問其故歡曰善禳惡正勝邪故尓梁書曰陶弘景字通明丹陽人性愛林泉尤好著􅄒常曰我讀書未滿萬卷以内典叅之乃當小岀耳先生性好醫方專以拯濟欲利益羣品故修撰神農本草經三卷爲七卷撰眞誥十卷集驗方五卷廣肘後爲百一之製丗所行用多􅀗異効焉又曰范雲疾召醫徐文伯視之文伯曰緩之一月乃復欲速即時愈正恐二年不復可救雲曰朝聞道夕死可矣而况二年文伯乃下火而壯焉重衣以覆之有頃許汗流於此即起二年果卒又曰王僧孺工屬文善楷􅀠多識古事侍郎金元起欲工素問訪以砭石僧孺荅曰古人當以石爲針必不用鐵說文有此砭字許愼云以石刺病也東山經髙氏之山多針石郭璞云可以爲砭針春秋羙􅐄不如惡石服子愼注云石砭石也季丗無復佳石故以鐵代也後魏書曰王顯字丗榮陽平人也頗叅士流雖以醫術自逹而明敏有决斷才用􅀄聞昭懷后之懷丗宗也夢爲日所逐化龍而遶后后寤而驚悸遂成心疾勑召諸醫診脉徐謇云是微風入藏冝進湯藥顯云案三部脉非有心疾將是懷孕生男之象後果如顯言乃􅀘御史常在御營進藥出入禁内丗宗詔顯撰藥方三十卷頒布天下又曰徐謇字伯城丹陽人也兄文伯皆善醫藥謇性秘忌承奉不得其意雖貴爲王公不爲指療魏孝文遷洛除中散大夫子雄亦以醫術稱又曰裴宣患篤丗宗遣太醫令馳馹就視并賜御藥宣素明隂陽之書自始患便知不起因自尅亡日果如其言又曰髙允微有不適猶不寢卧呼醫請藥出入行止吟咏如常髙祖文明太后聞而遣醫李循徃脉視之告以無恙循入密陳允榮衛有異懼其不乆於是遣使備賜御膳珍羞自酒米至於塩醢百有餘品皆盡時味及牀帳衣服茵􅀍几杖羅列於庭王官徃還尉問相屬允喜形於色語人曰天恩以我篤老大有所賚得非以贍客矣表謝而巳不有他慮如是數日夜中卒家人莫􅁴北齊書曰張子信少以醫術知名隠於白鹿山時出京師甚爲魏收崔季舒所知甞以詩酬贈大寕中徴爲尚藥典御歳餘謝病歸又曰馬嗣明河内野王人少明醫術診脉預知生死邢劭子寳十七八苦傷寒嗣明診其脉告楊愔曰此子今病不療自愈然不踰年必死覺之少晚不可爲也數曰兩公侍宴酒酣顯祖曰子才兒聦冝以近郡處之愔曰年少未可劭出愔以嗣明言奏乃止寳未朞而卒其驗如此背發腫嗣明以麄理色石大如鵝卵烈火燒令黄赤投醋中使屑落盡􅁀乾擣篩和􅀓之立愈嗣明從駕之晉陽至遼陽見牓云女病能差之與錢拾萬衆醫視之無敢措手嗣明見牓􅀏曰眞得汝矣乃抵其家問其由云曽將麥穗見赤物長二尺似蛇入指中因驚倒手臂疼重月餘曰漸及半身腫痛不可忍呻吟晝夜不絶嗣明曰毒虵爲􅔏所啄遺血於此犯而得之即受方令服十餘劑以湯散􅀘之明年還鄴女疾都愈載鏹而歸嗣明恃其􅇊視徐之才崔鸞叔等蔑如也隋開皇中卒又曰李元忠趙郡栢仁人也代爲著姓元忠倜儻􅀶學通隂陽術數􅀄以母老多患乃專心醫藥研習積年遂善於方技性仁恕人有疾病無問貴賤咸爲療之故郷里推敬聲稱益逺後拜南郡太守族弟宻性方直亦以母老習醫遂成妙手又曰崔季舒字叔正􅀶陵安平人少􅀌明敏有識幹精於醫術經方本草常所披覽天保中於徙所無事更銳意研精後雖位望顯貴亦不懈怠張太素齊書曰徐之才字士茂髙平金郷人五葉祖仲融隠於􅁗望山有道士過之求飲因留瓠蘆遺之曰習此子孫當以道術救丗位至二千石開視乃扁鵲鏡經一卷習之遂爲良醫至濮陽太守父雄貟外散􅀐侍郎代傳其術號爲神明而之才㓜而俊發􅀹爲精敏仕梁爲豫章王綜鎮東右常侍隨綜鎮彭城綜降魏之才走至吕梁爲魏所􅀗旣覉旅以醫自業又諧隠滑稽無方王公貴人爭饋之為貴人居矣稍遷貟外散􅀐常侍加中軍金紫天平中高祖詣晉陽恒居内館所療十全皇建中除兖州刺史未行武明皇太后不豫之才奉藥立愈賞賜巨萬有人脚跟腫痛不堪忍諸醫莫識之才視日蛤精也當乗舡入海岀脚水中得之疾者曰是也之才爲割得兩蛤子大如榆莢或以五色骨爲佩刀靶之才曰此人瘤也何從得之對曰於古􅃁見髑髏額骨長數寸試削視文理故用之其通識􅀋此武成王酒色過度恍惚不恒曽病發自言􅀄見空中有五色物稍近變成一羙婦人去地數丈亭而立之才曰此色慾過多大虚所致即進藥一服稍稍逺變成五色物數服而愈病發輙馳召之針藥所加無不愈者齻音積武成王生齪牙遍召諸醫尚藥典御鄧宣文以實對帝怒而抶之之才拜賀曰此謂智牙生則聖明而壽帝大恱賜帛萬疋加金玉重寳又曰張逺遊齊人以醫藥道術知名㝷有詔徴令與術士同合九轉金丹成顯祖置之玉匣曰我貪人間樂不能飛上天待我臨死方可服之後周書曰姚僧坦字法衛吴興武康人也父菩提梁高平令甞嬰疾歴年乃留心醫藥梁武帝性又好之毎召菩提討論方術言多㑹意由是頗禮之僧坦㓜通洽居䘮盡禮年二十四即傳家業梁武帝召入禁中面加討試僧坦酬對無滯梁武甚竒之時武陵王所生􅁑脩華􅀫患積時方術莫効帝令僧坦視之僧坦還說其狀武帝歎曰卿用意綿宻乃至於此以此候疾何疾可逃朕毎留情頗識治體今聞卿說益開人意十一年帝因發􅀬欲服大黄僧坦曰大黄乃是快藥然至尊年髙不冝輕用帝弗從遂至危篤梁元帝甞有心腸疾諸醫咸謂冝用平藥可漸宣通僧坦曰脉洪而實此有􅀫奶非用大黄必無差理帝從而愈及大軍克荆州爲燕公于謹所召大相禮接太祖遣使馳驛徴僧坦謹固留不遣謂使人曰吾年時衰暮疢疾嬰沉今得此人望與之偕老太祖以謹勲隆重乃止明年隨至長安伊婁穆以疾還京請僧坦省疾自云自􅆎至臍似有三􅅞兩脚緩縱不復自持坦即爲診脉處湯三劑穆􅀄服一劑上􅅞解再服中􅅞解又服三􅅞悉除而兩脚疼痺猶自攣弱更爲合散稍得屈伸至九月遂能起行大將軍襄樂公賀蘭隆先有氣疾加以水腫喘息奔急㘴卧不安或有勸其服决命大散者其家疑未能决乃問僧坦僧坦曰意謂此患不與大散相當若欲自服不煩賜問因而委去其子殷勤拜請曰多時仰屈今日始來竟不下治意實未盡僧坦知其可差即爲處方諸患悉愈大將軍樂平公竇集􅁀感風疾精神瞀亂無所􅁴知諸醫先視者皆云巳不可救僧坦後至曰困矣終當不死若專以見付相爲治之其家欣然僧坦爲合湯散所患即瘳大將軍永丗公叱伏列摏苦痢積時而不廢朝謁燕公于謹甞問僧坦曰樂平永丗俱有痼疾若如㒒意永丗􅏔輕對曰夫患有􅀷淺時有克殺樂平雖困終當保全永丗雖輕必不免死謹曰君言必死當在何時對曰不岀四月果如其言謹歎異之文宣太后寢疾醫巫雜􅀃各有同異髙祖引僧坦問曰太后患勢不輕諸醫並云無慮朕人子之情可以意得君臣之義言在無隠公以爲何如對曰臣無聽聲視色之妙特以經事巳多唯之常人竊已憂懼帝泣曰公旣决之矣知復何言㝷而太后崩四年髙祖親戎東討至河隂遇疾口不能言臉垂覆目不得視一足短縮又不得行僧坦以爲諸藏俱病不可並治軍中之事莫先於語乃處方進藥帝遂得言又治目目疾便愈未及治足疾亦瘳比至華州帝已痊復是歳髙祖幸雲陽遂􅃦疾乃召僧坦赴行在所内史柳昂私問曰至尊貶膳日乆脉候何如對曰天子上應天心或當非愚所及若凢庶如此萬無一全㝷而帝崩宣帝􅀄在東宫甞苦心痛乃令僧坦治之其疾即愈及即位恩禮弥隆大象二年除太醫下大夫帝尋有疾僧坦􅀫直侍疾帝謂隋公曰今日性命唯委此人僧坦􅐷候知帝危殆乃對曰臣荷恩旣重思在効力但恐庸短不逮敢不盡心帝領之及静帝嗣位遷上開府儀同大將軍隋開皇􅀄卒僧坦撰集驗方十二卷行紀三卷行於丗隋書曰許智藏髙陽人也祖道㓜甞以母疾覽醫方因而究極丗號名醫誡其諸子曰爲人子者甞膳視藥不知方術豈謂孝乎由是丗相傳授仕梁官至貟外散􅀐侍郎父景武竟陵王諮議叅軍智藏少以醫術自逹仕陳爲散􅀐常侍及陳滅髙祖以爲貟外散􅀐侍郎使詣楊州㑹􅁗孝王俊有疾上馳召之俊夜中夢其妃崔氏泣曰夲來相迎如許智藏將至其人若到當必相苦爲之奈何明夜俊又夢崔氏曰妾得計矣當入靈府中以避之及智藏至爲俊診脉曰疾巳入心即當發癎不可救也果如言俊數日而薨上竒其妙賫物百叚煬帝即位智藏時致仕于家帝毎有所苦輙令中使就詢訪或以轝迎入殿扶登御􅃺智藏爲方奏之用無不効唐書曰甄權許州扶溝人也甞以母疾與弟立言專醫方得其旨趣隋開皇􅀄爲祕書省正字後稱疾免隋魯州刺史庫狄嶔若風患手不得引弓諸醫莫能療權謂之曰欽但將弓箭向垜一針可以射矣針其肩偶一穴應時射貞觀十七年權年一百三歳太宗幸其家視其飲食訪以藥性因授朝散大夫賜几杖衣服其年卒撰脉經針方明堂人形圖各一卷弟立言武德中累遷太常丞御史大夫杜淹患風毒發腫太宗令立言視之旣而奏曰從今更十一日午時必死果如其言時有尼明律年六十餘患心腹皷脹身體羸瘦巳經二年立言􅐷其脉曰腹内有蟲當是誤食髪爲之耳因令服雄黄湏􅁷吐一虵如人手小指唯無眼燒之猶有髮氣其疾乃愈又曰許裔宗常州義興人也􅀄仕陳爲新蔡王外兵叅軍時栁太后感風不能言名醫療皆不愈脉益沉而噤裔宗曰口不可下藥冝以湯氣薫之令藥入腠理周時可差乃造黄􅂄防風湯數十斛置於牀下氣如煙霧其夜便得語武德􅀄􅀜中多骨蒸病得之必死遞相連染諸醫無能療者裔宗毎療無不愈或謂曰公醫術若神何不著書以貽將來裔宗曰醫乃意也在人思慮又脉候幽微若其難别意之所解口莫能宣且古之名手唯是別脉脉旣精別然後識病夫病之於藥有正相當者唯湏單用一味直攻彼病藥力旣純病即立愈今人不能別脉莫識病源以情臆度多安藥味譬之於獵未知兎所多發人馬空地遮圍或兾一人偶然逢也如此療疾不亦踈乎假令一藥偶然當病復共他味相和君臣相制氣勢不行所以難􅏔諒由於此脉之􅀷趣旣不可言虚設經方豈加於舊吾思之乆矣故不能著述耳年七十餘卒又曰􅁗鳴鶴爲侍醫髙宗苦風眩頭重目不能視武后亦幸災異逞其志至是疾甚召鳴鶴張文仲診之鳴鶴曰風毒上攻若刺頭岀少血即愈矣天后自簾中怒曰此可斬也天子頭上豈是試出血處􅁘上曰醫之議病理不加罪且吾頭重悶殆不能忍岀血未必不佳命刺之鳴鶴刺百㑹及腦户出血上曰吾眼明也言未畢后自簾中頂禮拜謝之曰此天賜我師也躬􅀒繒寳以遺鳴鶴又曰安金藏爲太常工人時睿宗爲皇嗣或有誣告皇嗣潜有異謀者則天令來俊臣按之左右不勝楚毒皆欲自誣唯金藏大呼謂俊臣曰公旣不信金藏言請剖心以明皇嗣不反即引佩刀自剖其胷五藏並出血流􅀍地氣遂絶則天聞之令舁入宫中遣醫人却内五藏入以桑白皮縫合之傅藥經􅀫乃蘇太平御覽卷第七百二十三
