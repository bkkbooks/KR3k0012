front:
  text: 太平御覽卷第二百五十二
  hash: sha256:760dc6c25a33f7767cee47c7b9ee1eb32193fbf32d36fcaf3fb8d0fe35baa1e5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_252-1a}
body:
  text: 職官部五十尹少尹留守尹春秋傳曰周公相王室以尹天下尹正也漢書曰内史周官􅁗因之掌治京師景帝二年分置左右内史武帝太􅀄元年更名京兆尹張晏曰地髙曰京左傳曰莫之與京十億曰兆尹者正也祑二千石銀印青綬進賢兩梁冠絳朝服佩水蒼玉又曰趙廣漢字子都涿郡人也守京兆尹廣漢爲人強力天性精於吏職見使吏民或夜不寢至旦尤善爲鈎鉅以得事情蘇峻曰鈎得其情吏不得去鉅鈎者設如欲知馬價則先問狗次問羊又問牛然後及馬參伍其價以􅀋相凖則知馬之賤貴不失實矣銖兩之姧皆知之長安少年數人㑹窮里空㑹謀共刼人坐語未訖廣漢使捕治具服廉明威制豪強百姓追思歌之至今又曰元始五年有一男子乗黄犢車建黄旐衣黄䄡䄖逕來詣北闕自謂衛太子京兆雋不疑後到叱從吏使收縛之曰昔蒯瞶違命出奔輙距而不納春秋是之衛太子得罪先帝亡不即死今來自詣此罪人也遂送詔獄由是名聲重於朝廷在位者皆自以不及廷尉驗治何人竟得姧詐夲夏陽人姓成名方遂皃一似戾太子又曰張敞爲京兆尹朝廷毎有大議引古今處便冝公卿皆服敞無威儀時罷朝㑹過走馬章臺街或曰在長安中安在章臺下街使御史駈自以便面拊馬又爲婦􅀞眉長安中傳張京兆眉憮無大也孟康曰撫音詡北方人謂爲妍有司以奏上問之對曰臣聞閨房之内夫婦之私有過於􅀞眉者上愛其能然不得大位爲京兆尹九年與楊惲厚坐惲大逆誅又曰張敞冬爲尹一日捕諸偷得數百人由是市無偷盗又曰王尊王章王駿並爲京兆有名京師稱曰前有趙張後有三王後漢書曰􅀽安爲河南尹政号嚴明然未曽以􅂍罪鞫人常稱曰凡學士者髙則望宰相下則希牧守養人於聖丗曰尹不忍爲也聞之者感激自厲在職十年京師肅然名重於朝廷又曰張酺入爲河南尹竇景家人復擊傷市卒吏捕得之景怒遣緹􅀐侯海等五百人毆傷市承說文曰緹帛丹黄色也漢官儀曰執金吾有緹􅀐酺部吏楊章等窮究正海罪徙朔方景忿怒乃移書辟章等六人爲執金吾吏欲固執之章等惶恐入白酺願自引贓罪以辝景命酺即上言其􅃺竇太后詔報自今執金吾辟吏皆勿遣又曰楊彪遷侍中京兆尹光和中黄門令甫使門生於郡界辜攉官財物七千餘萬華嶠書曰甫使門生翹辜榷解見靈帝紀彪發其姦言之司􅀠校尉陽球因此奏誅甫天下莫不愜心又曰延篤字叔固及邊鳯皆爲京兆尹並有能名語曰前有張趙後有邊延張趙即趙廣漢及張敞也又曰梁兾爲河南尹居職􅁀恣多非法父啇所親客洛陽令吕放頗與啇言及兾之短啇以讓兾兾即遣人於道刺殺放而恐啇知之乃推疑於放怨􅄷請以放弟禹爲洛陽令安慰放家欲以滅口使捕之盡滅其宗親賔客百餘人又曰王梁爲河南尹穿渠引榖水注洛陽城下東冩鞏川及渠成而水不流七年有司劾奏之梁慙懼上書乞骸骨謝承後漢書曰周暢字伯時性仁慈爲河南尹永􅀄二年夏旱乆禱無應暢自収葬洛陽城旁客死骸骨凡萬餘人應時澍􅀨歳乃豐稔􅀽崧後漢書曰延篤字叔堅南陽人也爲京兆尹正身率下民不忍欺應劭漢官儀曰河南尹所治周地也洛陽本成周周之衰微分爲東西周􅁗兼天下置三川洛河伊也漢更名河南孝武皇帝増曰太守丗祖中興徙都洛陽改号爲尹尹正也詩云赫赫師尹魏志曰鄭渾字文公爲京兆尹渾以百姓新集爲制移居之法使兼復者與單輕者相伍温信與􅀌老爲比勤稼穡明禁令以發姦者由是民安於農而盗息又曰􅀓嘏字蘭石爲河南尹内掌帝都外統京畿兼主六卿六遂之士其民異方雜居多豪門大族啇賈胡貃天下四㑹利之所聚而姧之所生也前尹司馬舉其綱而太簡次尹劉静綜其綱而太宏後尹李勝毀常法以收一時之聲嘏立司馬之綱統裁劉氏之綱目以經緯之李氏所毀以漸􅀘之郡有七百吏半非舊也河南俗黨五官掾功曹典􅃟職皆授其夲國人無用異􅀖人者嘏各舉其良而用之分官曹之職次考栲之其治以德教爲夲然持法有􅁪而不可犯見理識情獄訟不枉檟楚而得其實不爲小惠有所薦逹及大益於民事皆隱其端迹􅀂不由巳出故當時無赫赫之名使民乆而後安者也又曰司馬芝字子華爲河南尹教群下曰蓋君設教不能使吏必不犯也吏能犯教而不能使君必不聞也夫設教而犯君之劣也犯教而聞吏之禍也君劣於上吏禍於下此政事所以不理也可不勉之哉於是下吏莫不自厲又曰劉馥字子靖出爲河南尹散􅀐常侍應璩以書與子靖曰入作納言出臨京任冨民之術日引月長王隱晉書曰樂廣字彦輔爲河南尹故郡中前多恠後人皆於廊下郵􅀓中治事無敢在㕔事者唯廣處之自􅀂白戸自􅐬二子凱模等懾怖廣使掘牆孔得狸乃絶代者乃相承入止又曰􅁃純字謀甫太始六年詔曰河南大郡四方表則中書令􅁃純清粹忠正才紹治化其以純爲河南尹又曰劉隗􅀘丹陽尹雖在外而萬機秘密皆預聞之晉書曰羊㬅爲丹陽尹時朝士過江􅀄拜官相飾供饌㬅拜丹陽尹客來早者得佳設日晏則漸罄不復及精隨客早晚而不問貴賤有羊固拜東海太守竟日皆美雖晚至者猶􅀗盛饌論者以固之豐腆乃不如㬅之真率晉起居注曰武帝咸寧三年詔曰河南百郡之首其風教冝爲遐邇所模以導齊之侍中奉車都尉王恂忠亮篤誠才兼外内明於治化其以恂爲河南尹晉中興書云晉天興元年改丹陽内史爲丹陽尹宋書劉秀之遷丹陽尹先是秀之從叔穆之爲丹陽尹與子弟於㕔事上飲宴秀之亦與焉㕔事柱有一穿穆之謂子弟及秀之汝等試以栗遥擲此柱􅀂能入穿後必得此郡穆之諸子並不能中唯秀之獨入焉唐書曰開元􅀄改雍州長史爲京兆尹揔理衆務又曰鄭珣瑜出爲河南尹珣瑜旣入境官吏以逼降延曰珣瑜到即後於事乃送所獻馬賫印於路以例告珣瑜曰未上官不可遽有進獻及旣上即過時矣遂不獻又曰郭英乂時嚴武卒元載薦英乂代之遂兼成都尹充劒南節度使英乂到成都肆行不䡄無所忌憚玄宗舊宫置爲道士觀内有玄宗鑄金真容及乗輿侍衛圖􅀞先是節度使毎至皆先拜而後視事英乂以觀地有形勝乃入居之其真容及圖􅀞悉遭毀壞見者無不憤怒又曰英乂爲成都尹頗恣狂蕩聚女人􅀐鑪擊毬製鈿驢鞍及諸服用皆侈靡裝飾日費數萬以爲􅀏樂未甞問百姓間事人頗㤪之又曰許孟容爲京兆尹神䇿軍吏李昱假貸長安冨人錢八千貫满三歳不償孟容遣吏收捕械繫尅日命還之曰不及其當死自興元巳後禁軍有功又中貴之尤有渥恩者方得護軍故軍士日益横府縣不能制孟容剛正不懼以法繩之一軍盡驚􅁈訴於上立命中使宣旨令送夲軍孟容繫之不遣中使再至乃執奏曰臣誠知不奉詔當誅然臣職司輦轂合爲陛下彈抑豪強錢未盡輸昱不可得上以其守正許之自此豪右歛迹威望大震又曰劉栖楚爲京兆尹摧抑豪右不頋患難事無大小必設鈎鉅故時人重之或稱其機變徃徃有􅀋於西漢時趙廣漢者又曰李傑爲河南尹傑旣勤於聽理毎有訴列雖衢路當食無廢處斷由是官無留事人吏愛之先是河汴之間有梁公堰年乆堰破江淮􅈇運不通傑奏調發汴鄭丁夫以濬之省功速就公私深以爲利刻石水濵以紀其績又曰栁仲郢爲河南尹以寛惠爲政言事者以爲不􅀋京兆之政仲郢曰輦轂之下彈壓爲先郡邑之治惠養爲夲何取􅀋耶又曰蘇震爲太常卿是歳東都􅂄老表乞行幸上重違其心選勤舊勲賢爲之牧守遂以震爲河南尹兼御史中丞仍充東都畿甸觀察使英雄記曰董卓廢少帝自公卿巳下莫不卑下於卓唯京兆尹盖勲長揖争禮見者皆爲失色李爕別傳曰爕字德公京兆人拜京兆尹吏民愛敬乃作歌曰我府君道教舉恩如春威如虎愛如母訓如父李郃別傳曰鄧騭弟豹爲將作大匠河南尹缺豹欲得之上及騭兄弟亦欲用難便召拜下詔令公卿舉騭以旨遣人諷公卿悉舉豹李郃曰司􅈻河南尹當整頓京師檢御貴戚今反使親家爲之必不可爲後法公舉司􅈻羊浸不舉豹豹竟不得尹恨公卿不舉對士大夫曰李公寕能不舉我故我不得尹耶莊子曰孫叔敖能以爵禄爲巳害故三爲令尹三去令尹而色不變語林曰蘇峻新平温􅁃諸公以朝廷􅀄復京尹冝得望實唯孔君平可以處之孔固辭二公逼諭甚苦孔敖然曰先帝大漸卿軰身侍御床口行詔令孔垣尓時正璅臣耳何與國家事不可今日䘮亂而猥見逼迫吾爼豆上腐􅁏任人割截耶􅁃愧不能荅說􅁐曰楚令尹子文之族干法者廷理釋之子文責之曰吾豈爲私意耶何廷理之駮於法也不寘刑地吾將死廷理懼遂刑其人國人聞之曰􅀂令尹之公也吾黨何憂乃相與作歌曰子文之族犯國法程廷理釋之子文不聽通典曰凡帝王所都皆曰尹南朝曰丹陽尹後魏􅀄曰代尹東魏曰魏尹北齊曰清都尹楊雄河南尹箴曰茫茫天區畫兾爲京啇邑翼翼四方之經爰作卿士以尹王州風化攸興萬國承流梁邵陵王讓丹陽尹􅀄表曰臣進非民譽退異宗英尸居戎號已紊彛典况京兆五守西漢難追河南二尹東京罕繼審已循涯自知莫可街談巷議尤見不勝梁􅁃肩吾爲南康王讓丹陽尹表曰臣聞劒鏤七星非有司天之用縑圖五嶽寕識崇朝之雲是知䇿彼泥龍不能令其逐日乗斯流馬安可使其奔電方今振鷺盈庭白駒空谷惟帝念功惟明克允君子之國罕聞其讓石門之水獲免於貪少尹唐書曰李憕爲東京少尹時蕭胤爲尹依􅀝權貴蒞事多不法憕以公直正之人用繄頼又道士孫甑生以左道求進託以修功德徃來嵩山求請無度憕必挫之五代史後唐書曰李承勲累遷至太原少尹劉守光之僣號也莊宗遣承勲徃使伺其亹端承勲至幽州見守光如藩方交聘之禮謁者曰燕王爲帝矣可行朝禮承勲曰吾大國使人太原亞尹是唐帝除授燕主自可臣其部人安可臣我哉守光聞之不恱拘留於獄數日出而訊之曰臣我乎承勲曰燕君能臣我王則我臣之吾有死而巳安敢辱命㑹王師討守光承勲竟没於燕中留守東觀漢記曰和帝南廵祠園廟張禹以太尉留守北宫太官朝夕送食後漢書曰車駕征張歩留伏湛居守時蒸􅀕髙廟冬􅀕日蒸也而河南尹司􅀠校尉於廟中争論湛不舉奏坐䇿免呉志曰孫權征新城使登居守揔知留事時年榖不豐頗有賊盗乃表定科令所以防禦甚得止姧之要晉書日張方刼惠帝幸長安僕射荀藩等與其遺官在洛陽爲留臺承制行事号爲東西臺後魏書曰髙祖南伐以太尉元丕廣陵王羽留守京師並加持節又曰荀頽大駕行幸三州頽留守京師沙門法秀謀反頽率禁兵収掩畢􅀗内外晏然駕還飲至文明太后曰當􅈛之日卿􅀂持疑不即収捕處分失所則事成不測矣今京畿不擾宗廟社稷安者實卿之功也隋書曰楊瓉平齊之役諸王咸從留瓉居守帝謂之曰六府事殷一以相付重朕將遂事東方無西頋之憂矣其見親信如此唐書曰儀鳯元年司農卿韋弘機爲東都留守時有道士朱欽遂爲中宫所使至都所爲横恣弘機執而囚之因奏曰道士假稱中宫駈使依􅀝形􅀔臣恐虧損皇明爲禍患之漸髙宗特發中使賜書慰諭仍云不湏漏􅂥又曰武后垂拱中文昌右丞相蘇良嗣爲京留守時尚方􅁥裴匪躬檢校京苑將鬻苑中果菜以収其利良嗣駮之曰昔公儀休相魯猶能拔葵去織未聞萬乗之主鬻其果菜以與下人争利也又曰栁公綽爲北都留守充河東節度觀察使等是歳北虜遣梅禄將軍李暢以馬萬疋來市且曰朝貢所經過守帥毎假禮分嚴其兵備留館則戒卒于外懼有襲奪太原故事亦出兵送之暢至界上公綽獨使牙門將祖孝㳟單馬勞焉待以修好之意暢感義出涕徐駈道中不妄馳獵及至􅀜牙門令譯引謁宴以常禮及市馬歸竟不敢有所犯太平御覽卷第二百五十二
