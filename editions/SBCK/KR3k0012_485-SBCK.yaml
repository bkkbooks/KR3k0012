front:
  text: 太平御覽卷第四百八十五
  hash: sha256:f5e3b32019441084c416b337ced74291fa0f827f4b5ca6dc8f5b417c3947e260
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_485-1a}
body:
  text: 人事部一百二十六貧下魏志曰崔林字徳清河東武城人也㓜時宗族莫知從兄琰異之太祖定兾州召除鄢長貧無車馬單歩之官太祖征壷關擢爲兾州主簿又曰華歆素清貧禄以賑親戚故家無擔石之儲又曰鄧艾字士載義陽人以口吃不得作幹佐爲稻田守草吏同郡吏憐其貧資給甚厚艾􅀄不稍謝每見髙山大澤輙窺度指畫軍營處所時人多􅀏焉呉志曰吕範字子衡汝南人有容觀姿兒邑人劉氏家冨女美範求之母嫌欲勿與劉氏曰吕子衡寧當乆貧者遂與之婚又曰潘璋字文珪東郡人性嗜酒其家甚貧性好賖貸輙言豪冨必相還孫權甚竒之魏將夏侯尚南郡作浮橋渡百里洲璋於上流伐葦作簟欲順風放火簟成尚使引退璋遂爲平北將軍晉書阮咸字仲容陳留人時俗七月七日曬衣裳或宗族於庭羅列衣服咸貧無物乃脫犢鼻布裩以竹竿頭挂之人問故荅曰不能免俗宋書曰武帝劉􅁉少時其家大貧與人傭賃及登帝位耕具猶存并衲布襖並令收掌以示子孫令爲規戒又曰江湛家貧約不營財利餉饋盈門一無所受無兼衣餘食甞爲上所召值澣衣稱疾經日衣成然後赴牛餓馭人求草湛良乆曰可與飲又曰陶潜嗜酒而家貧不能􅁪得親舊知其如此或置酒招之造飲輙盡期在必醉旣辭而退曽不􅈔情去留環堵蕭然不蔽風日短􅄄穿結簞瓢屢空晏如也又曰顔延之屏居里巷不預人間者七載中書令王球名公子延之居常罄貧球輙分財贍之齊書曰王延之清貧居宇穿漏禇淵徃􅃸之見其如此具啓明帝帝即勑材官爲起三間齋屋又曰虞玩之太祖鎭東府朝野致敬玩之猶躡履造席太祖取屐視之曰卿此履巳幾載玩之曰着此履巳二十年貧竟不辦易太祖善之又曰􅁃杲字景行新野人􅀄爲駕部郎清貧自業食飡唯有韭􅉁生菜任彦昇甞戯曰誰謂􅁃郎貧食鮭常有二十七種菜至儉用爲長史安陸侯蕭􅃡與儉書曰盛府元僚實難其選􅁃景行泛渌水依芙蓉何其麗也時人以儉府為蓮花池故􅃡書言之官至御史中丞梁書曰阮孝緒家貧無以㸑僮妾􅀼隣人樵以繼火孝緒知之乃不食更令撤屋而炊所居室唯有一林竹樹環繞後魏書曰胡叟居家蓬室草户唯以酒自適常謂人曰我此生活似勝焦光不治産業飢貧不以爲耻飬子字螟蛉以自給養每至貴勝之門􅁪乘一牸牛布囊容三四升飲噉醉飽便盛餘肉餅以付螟蛉見車馬榮華視之蔑如也隋書曰張仁詡州縣以其貧素將加賑恤輙辭不受每閑居從容長歎曰老冉冉而將至恐脩名之不立以如意擊几皆有處所人方之閔子騫原憲又曰虞丗基陳滅歸國爲通直郎直内省無産業毎傭書養親怏怏不乎甞爲五言以見意情理悽切丗以爲工作者莫不吟詠又曰房彦謙居官所得俸禄皆以周恤親友家無餘財車服器用務存素儉自少及長一言一行未甞渉私雖致屢空怡然自得甞從容獨􅀏顧謂其子􅀇齡曰人皆因禄冨我獨以官貧所遺子孫在於清白又曰許康佐擢進士第以家貧母老求爲知院官人或輕怪􅀏而不荅及母亡服除不就侯府之辟君子知其不擇禄養親之志也故名益重又曰李建字杓直家素清貧無舊業與兄造遜於荆􅀯躬耕致養嗜學力文六韜曰武王問太公曰貧冨豈有命乎太公曰爲之不宻宻而不冨者盗在其室武王曰何謂盗也公曰計之不熟一盗也收種不時二盗也取婦無能三盗也養女太多四盗也棄事就酒五盗也衣服過度六盗也封藏不謹七盗也井竈不利八盗也舉息就禮九盗也無事燃燈十盗也取之安得冨哉武王曰善說苑同列女傳曰黔婁妻者魯黔婁先生之妻也先生死曽子與門人徃弔之見先生尸在牖下覆以布􅀍手足不盡歛覆頭則足見覆足則頭見曽子曰衺其􅀍則歛矣妻曰衺之有餘不如正之不足且先生以衺故至於此又曰齊女徐吾者在海上貧婦人與隣婦人李吾之属合燭相從績徐吾最貧而燭數不属李吾謂曰徐吾燭數不属請無與夜徐吾曰是何言歟今一室之中益一人燭不爲益明去一人燭不爲益闇何愛東壁餘光貧妾不蒙見愛之恩長爲妾不亦可乎莫之能應遂復與夜髙士傳曰老萊子楚人耕蒙山之陽以藿葭爲牆蓬蒿爲室枝木爲床􅆱艾爲席東方朔別傳曰朔書與公孫弘借書曰朔當從甘泉願借外廐之後乗木槿夕死而朝生者士亦不必長貧也李郃別傳曰公居貧而不好治産有稻田三十􅅿弟宅一區至京學問常以賃書自給爲人沉深弘雅有大度郭林宗别傳曰林宗家貧􅀄欲遊學無資就姉夫貸五千錢乃逺至成臯從師受業併日而食衣不蔽形常以蓋幅自鄣出入入則户前出則掩後邴原别傳曰原字根矩年十一䘮父家貧早􅀌隣有書舎原過其傍而泣師問曰童子何悲原曰孤者易傷貧者易感夫書者必有其父兄一則願其不孤二則羡其得學心中惻然而爲涕零也師亦哀原之言而爲泣曰欲書可書耳桓階别傳曰階貧儉文帝甞幸其第見諸子無禈文帝摶手􅀏曰長者子無禈乃抱與同乘是日拜二子爲郎使黄門賫衣三十囊賜曰卿兒能趍可以禈矣文士傳曰劉梁字曼山一名岑漢宗室子孫少有清才以文學見貴梁貧􅁪賣書以供衣食汝􅀯先賢行􅃺曰胡定字元安頴川人至行絶人在喪雉兎遊其庭雪覆其室縣令遣户曹椽排雪問定定巳絶榖妻子皆卧在床令遣以乾糗就遺之定乃受半三輔决録曰第五頡字子陵倫小子以清正爲郡功曹至州從事公府辟舉髙第侍御史南頓令皆稱病免洛陽無主人郷里無田宅􅀉止靈臺中或十日不炊又曰孫晨字允公家貧不仕居杜城中織箕爲業明詩書爲郡功曹冬月無􅀍有一束蒭暮卧中旦燒之華陽國志曰朱良字雲卿什仿人少受學於蜀郡張寕食豆屑飲水以諷誦同業憐其貧給米肉不受家貧􅁪以歩行爲郡功曹丗􅀃曰李弘度常歎不􅀍遇殷楊州知其家貧問君能屈志百里不李荅曰北門之歎乆巳上聞窮猿奔牀豈暇擇木遂作鄼縣俗􅀃曰謝僕射太常詣呉領軍坐乆呉留客作食日巳中方使婢賣狗供客比得食無氣力可語又曰劉眞長少時居丹徒家至貧織芒履以養母說􅁐曰子思居於衛緼􅂁無裏二旬九食西京􅄂記曰司馬相如􅀄與卓文君至成都文君貧愁憊以所服鷫鸘裘就市人楊昌貰酒遂相與謀還於成都賣酒相如親着犢􅈹禈滌噐以耻王孫墨子曰天下有義則冨無義則貧列子曰管仲之相齊君淫亦淫君奢亦奢志合言從道行國覇其後田氏相齊君盈則巳降君斂則巳施民皆歸之因有齊國􅀂實名貧僞名冨也又曰齊有貧者乞於城市患其亟也衆莫之與遂適田氏之廐從馬竪作役而假食郭中人戯之曰從馬竪而食不以辱乎乞見曰天下之辱莫過於乞乞猶不辱豈辱馬竪哉又曰齊之國氏大冨宋之問氏大貧自宋之齊謀術國氏告之曰吾善爲盗始吾爲盗也一年而給二年而定三年大攘自此徃施及州閭問氏大喜喻其爲盗之言而不喻其爲盗之道遂踰垣鑿室手目所及亡不探也未及時以贓罪没其先君之財問氏以國氏之􅍝己也徃而怨之國氏曰嘻􅀂夫爲盗之道天有時地有利吾盗天地之利雲雨之澗吾陸盗禽獸水盗􅀛鱉亡非盗也夫金玉珎寳􅂖帛財貨人之所聚豈天之所與若盗之而獲罪孰怨哉又曰凢爲名者必廉廉斯貧爲名者必讓讓斯賤莊子曰原憲處魯居環堵之室蓬户不完乗木爲樞而甕牖上漏下濕匡坐而弦歌子貢乗大馬中紺而表素軒車不容巷徃見原憲原憲杖藜而應門子貢曰先生何病也原憲應之曰憲聞無財之謂貧學道不能行之謂病今憲貧也非病也子貢逡廵而退有愧色又曰孔子謂顔淵曰家貧居卑胡不仕乎對曰不願仕回有郭外之田五十􅅿足以給饘鬻郭内之田五十􅅿足以爲絲麻鼔琴足以自娱所學於夫子者足以自樂也回不願仕孔子愀然變色曰美哉又曰莊周家貧故徃貸粟於􅁥河侯曰我將得邑貸子三百金周忿作色曰周昨來有中道而呼者頋視車轍有鮒魚焉問之曰子何爲者耶對曰我東海之波臣也君豈有斗升之水而活我哉周曰諾我將南遊呉越之王激西江之水而迎子可乎鮒魚忿然作色曰吾得斗升之水然活耳君乃言此曽不如早索我於枯魚之肆又曰曽子居衛捉衿而肘見納履而踵決又曰河上有家貧窮恃緯蕭而食者其子没淵得千金珠謂其子取石來鍜之夫千金之珠必在九重之淵而驪龍之頷下汝得之必遭其睡若龍寤子尚奚珠之有哉吕氏春秋曰丗皆以珠玉爲寳寳愈多而民愈貧失其所寳也荀卿子曰仁義禮善於人譬􅀂貨財粟米之於家也多有之者冨少有之者貧至無有者窮也又曰子夏貧衣􅀂懸􅁝人曰子何不仕曰諸侯驕我者吾不爲臣丈夫之驕我者吾不復見也抱朴子曰洪禀體尫羸兼之多疾貧無車馬不堪徒行荆􅁄叢於庭宇蒿莠塞乎階霤披榛出門排草入室准南子曰貧人夏則披􅄄帶索唅菽飲水以支暑熱冬則羊裘鮮札短􅄄不掩形而煬竈口焉爲裘如鎧甲之札言其破壞也煬炙也向竈口之自温湯讀髙尚之尚也故其爲編户齊民無以異然貧冨之相去也猶人君之與僕虜不足以喻之喻猶方也又曰人有盗而冨者未必冨盗有廉而貧者未必廉也符子曰楚之交子魯之周子齊之狂子三子和與居乎太山之陽處乎環堵之室蓽門不扇蓋茨不翳而弦不輟鶡冠子曰家冨踈族聚居貧兄弟離漢􅀭雄逐貧賦曰楊子遁居離俗獨處左鄰崇山右接曠野鄰垣乞兒終貧且窶禮薄義􅁦相與羣聚惆悵失志呼貧與語汝在六極投弃荒遐好爲庸卒刑戮如是匪惟㓜稚嬉戯土沙居非近鄰接屋連家恩輕毛羽義薄輕羅進不由人退不受呵乆爲滯客其意謂何人皆文繡余􅄄不完人皆稻梁我獨藜飱貧無寳玩何以接歡宗室之宴爲樂不槃徒行􅀒賃出處易衣身服百役手足胼胝或耘或耔霑體露肌朋友道絶進䆠凌遟厥咎安在職汝爲之舎爾逺竄崑崙之顛爾復我隨翰飛戾天舎爾登山巖穴隱藏爾復我隨陟彼髙崗舎爾入海汎彼栢舟爾復我隨載沉載浮我行爾動我静爾休豈無他人從我何求今汝去矣勿復乆留貧曰唯唯主人見逐多言益􅃖心有所懷願得盡辭昔我乃祖宣其明德克佐帝堯誓爲典則土階茅茨匪彫匪飾爰及季丗縱其昬忒饕餮食群貪冨茍得鄙我先人乃傲乃驕瑶䑓瓊室華屋嵩髙流酒爲池積肉爲崤是用鵠逝不踐其朝三省吾身謂予無諐處君之家福禄如山忘我大德思我小怨堪寒能暑少而習焉寒暑不忒等壽神仙桀跖不顧貪􅀋不干人皆重蔽子獨露居人皆怵惕子獨無虞言辭旣罄色厲目張攝齊而興降階下堂誓將去女適彼首陽􅀌竹之子與我連行金乃避席辭謝不直請不貳過聞義則服長與爾居終無猒極貧遂不去與我遊息太平御覽卷第四百八十五
