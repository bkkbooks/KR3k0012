body:
  text: 人事部七耳目耳釋名曰耳耏也耳有一體屬着兩邊耏耏然也耏音而禮曰是故先王之孝也色不忘乎耳目不絶乎聲傳冨辰諌曰耳不聽五聲之和爲聾又曰晉襄公卒靈公少晉人以難故欲立長君使先蔑士㑹如秦逆公子雍秦康公送公子雍于晉曰文公之入也無衛故有吕郤之難乃多與之徒穆嬴日抱太子以啼于朝曰先君何罪其嗣亦何罪舎適嗣不立而外求君將焉寘此出朝則抱以適趙氏頓首於宣子曰先君奉此子也以屬諸子曰此子也才吾受子之賜不才吾唯子之怨今君雖終言猶在耳而棄之􅀂何宣子與諸大夫皆患穆嬴且畏偪畏國人以大義來偪也乃背先蔑而立靈公以禦秦師又曰攝叔曰吾聞致師者右入壘折馘折馘斷耳執俘而還皆行其所聞而復又曰林雍羞爲顔鳴右下羞爲右改下車戰也苑何忌取其耳不欲殺雍但截其耳以辱之詩曰君子無易由言耳屬于垣又曰匪手擕之言示之事匪靣命之言提其耳我非且以手擕之親視以其事之是非我非且語之親提撕其耳此言教道易曰荷校滅耳聦不明也又曰巽而耳目聦明語曰六十而耳順􅂖梁傳曰梁自亡湎於酒滛於色心昏耳塞上無正長之治大臣背叛春秋元命苞曰耳者心之􅃸尚書大傳曰孔子曰自吾得由也惡言不至於耳史記曰吕太后遂斷戚夫人手足去眼煇耳又淮隂傳曰韓信使人言於漢王曰齊反覆之國南邊楚不爲假王鎮之其勢不定漢王大怒張良陳平躡漢王足因附耳語曰寧能禁信之王乎戰國䇿曰􅂫秦􅀃李兊明日復來舎人謂兊曰臣竊􅀚蘇公􅀃也其辨過於君君能聽乎兊曰不能曰君即不能願君竪塞而耳無聽其談明日復見終日談而去秦謂舎人曰昨日我談薄而君動今精而君不動何也舎人曰我爲塞兩耳無聽談也漢書曰楊煇報孫㑹宗書曰家本秦也能爲秦聲婦趙女也雅善鼓瑟奴婢歌者數人酒後耳熱仰天拊􅇲而呼烏烏英雄記曰曹公擒吕布布顧謂劉備曰玄徳卿爲座上客我爲降虜繩􅅞我急獨不可一言邪操曰􅅞虎不得不急乃命緩布􅅞備曰不可公不見布事丁建陽董太師乎操領之布目備曰大耳兒最叵信叵普火切魏書曰荀攸年七八歳父衢曽醉誤傷攸耳而攸出入遊戯常避護不欲令衢見衢後聞之乃驚其􅀫智如此吴録曰􅀜羽走孫權使虞翻筮之曰必當斷頭傷其耳果如翻言蜀志曰先主長七尺五寸垂臂下􅂰顧自見其耳晉書曰王導多疾每自憂陳訓曰耳竪必壽亦大貴又曰殷仲堪父患耳聞床下蟻動謂是牛􅃲王隱晉書曰張􅁤爲涼州刺史燉音煌曹祛上言軌老病更請刺史􅁤治中率數十人皆割耳於盤流血訴枉得停蜀書曰武皇帝李雄美容貌相工相之曰此君口如方器耳如相望位必過三公不疑也唐書曰汴州節度李忠臣甞因奏對德宗謂之曰卿耳甚大貴人也忠臣對曰臣聞驢耳甚大龍耳即小臣耳雖大乃驢耳也上恱之老子曰五音令人耳聾孟子曰伯夷耳不聽惡聲鶡冠子曰夫耳主聽兩豆塞之則上不聞雷霆淮南子曰禹耳三漏是謂大通興利除害决江䟽河抱朴子曰老子耳長七寸又曰耳能聞雷霆而不聞蟻虱之音吕氏春秋曰雷則掩耳電則掩目耳聞所惡不如無聞目見所惡不如無見又曰且天生人而使其耳可以聞不學其聞不􅀂聾使其目可以見不學其見不􅀂盲使其口可以言不學其言曲以爽使其心可以知不學其知暗以狂凢學非爲能益也達天性也􅀃苑曰昔費仲惡來膠革長鼻决耳從紂之心武王誅之􅀶物志曰南方落頭民其頭能飛以耳爲翼瀬郷記曰老子耳有三門王子年拾遺録曰沐胥國人左耳中出青龍右耳中出白虎龍虎􅀄出之時如繩縁頰手捋靣而龍虎皆飛去地十餘丈而雲氣繞龍風來吹虎俄而以手一揮龍虎皆還入耳髙士傳曰堯聘許由爲九州牧由聞之洗耳於河列仙傳曰務光夏時人耳長七寸陽都女耳細而長衆皆言此天人也又曰􅇞先生毛身廣耳阮丘耳長六七寸列士傳曰燕丹師田光往候荆軻值軻醉唾其耳中軻􅁴曰此出口入耳之言必大事也即往見光列女後傳曰劉仲敬妻者沛國桓林之姊也仲敬早亡桓乃引刀割耳宗婦問之桓曰吾自五代以來世知名男以忠孝顯女以貞順稱家以我年少必相嫁故預自裁割以信我心又曰曹文叔妻譙國夏侯寧之女文叔早亡妻斷髪自誓其家欲嫁之又截兩耳司馬太􅀓美之乞爲曹氏後又曰陽華穆妻者下邳劉方之女字桃樹生一男而穆早亡吴丁諿音緝求之諿知名之士家將許焉桃樹乃操刀割耳其子又亡桃樹乃安身守正動不諐禮諐音傜長沙􅂄舊傳曰太尉劉壽少遇相師相師曰耳爲天柱今君耳城郭必典家􅀖樊氏相法曰耳門不容麥歳至百兼冨目釋名曰目黙也謂黙而内識也眼限也童子限限而出也禮曰目者氣之清明者也又玉藻曰目容端不睇視也又曽子曰十目所視十手所指其嚴乎傳曰宋華父督見孔父之妻于路目逆而送之曰美而艷又曰冨辰曰目不別五色之章爲昧又曰子玉使􅃲勃請戰曰請與君之士戯君慿軾而觀之得臣與寓目焉又曰楚子將以啇臣爲太子訪諸令尹子上子上曰楚國之舉􅁪在少者且是人也蜂目而豺聲忍人也不可立也又曰秦伯伐晉取羈馬乃出戰交綏古名退軍爲交綏秦晉志未敢堅戰兵未致争而兩軍退故曰交綏秦行人夜戒晉師曰兩軍之士皆未愸也明日請相見愸缺也􅁷駢曰使者目動而言肆懼我也將遁矣薄諸河必敗之又曰宋華元爲植廵功植將主也城者謳曰睅其目皤其腹弃甲而復睅出目皤大腹弃甲謂師也于思于思弃甲復來于思多􅂡之貌又曰潞子嬰兒之夫人晉景公之姊也酆舒爲政而殺之又傷潞子之目又曰晉楚將戰晉侯筮之卜史曰吉卦遇復曰南國蹙射其元王中厥目及戰共王中目又曰叔孫豹㑹晉士丐于柯盟于督陽荀偃癉疽生痬於頭癉疽惡瘡濟河及著雍病目出卒而視不可唅目開口禁也宣子盥而撫之曰事吴敢不如事主猶視大夫稱主欒懷子曰其爲未卒事於齊故也懐子欒盈也乃復撫之曰苟終所不嗣事于齊者有如河乃瞑受唅嗣續也又曰宋公子地有白馬四公嬖向魋欲之向魋司馬植魋卜也公取而朱其尾鬛以與之與魋之地怒使其徒奪之魋懼將走公閉門而泣之目盡腫又曰公侵齊門于陽州顔息射人中眉退曰我無勇吾志其目也詩曰美目盻􅀆巧􅀏倩􅀆素以爲絢􅀆書曰正月元日舜格于文祖詢于四岳闢四門明四目逹四聦咨十有二牧曰食哉惟時易小畜曰輿􅀃輻夫妻反目象曰夫妻反目不能正室也又􅀃卦曰离爲目春秋孔演圖曰蒼頡四目是謂並明春秋元命苞曰目肝之使又曰舜重瞳子是謂慈原上應攝提下應三元尚書大傳曰舜目四瞳子論語隱義曰衛蒯聵亂子路興師往有孤黯者當師曰子欲入耶曰然黯從城上下麻繩釣子路半城問曰爲師耶爲君耶曰在君爲君在師爲師黯因投之折其左股不死黯開城欲殺之子路目如明星之光曜黯不能前謂曰畏子之目願覆之子路以衣􅃑覆目黯遂殺之史記曰吴王賜子胥屬鏤之劒以死子胥仰天歎曰嗟乎抉吾眼着吴東門上以觀越㓂之入滅吴也又曰趙王與秦王㑹􅃆池秦王不肯擊􅇲相如曰五歩之内請得以頸血濺大王矣左右欲刄相如相如張目叱之左右皆靡秦王不懌爲一擊􅇲又曰越王無殭與中國争強北伐齊齊威王使人􅀃越王越王不納齊使者曰幸也越之不亡也吾不貴其用智如目之見毫毛而不自見睫也今王知晉之失計不知越之過是目論也又曰大梁人尉繚曰秦王爲人蜂凖蜂一作隆長目又曰漢王詣鴻門謝項羽羽欲殺漢王樊噲帶劒擁㦸楯入軍門披帷西向而立瞋目視羽􅁂髮上指目眥盡裂又曰項王大呼馳下漢軍皆披靡時赤泉侯爲􅀐將追項王項王瞋目而叱之人馬俱驚辟易數里楚漢春秋曰上過陳留酈生求見使者入通公方洗足問何如人曰狀􅀋大儒上曰吾方以天下爲事未暇見大儒也使者出酈生瞋目案劒曰入言髙陽酒徒非儒者漢書曰東方朔上書曰臣朔目􅀂懸珠齒如編貝東觀漢記曰杜根諌和喜音喜又許忌切鄧后以安帝冝親政事太后大怒囊盛撲殺之根詐死三日目中生蛆魏志曰太祖與韓遂馬超等軍馬㑹語左右皆不得從唯將許禇超􅀒其力隂欲前突太祖素聞禇勇疑從􅀐是乃問公有虎侯者安在太祖顧指禇瞋目眄之超不敢動又曰張繡反襲太祖營典韋戰於門中韋乃􅀟挾兩賊擊殺之餘賊不敢進復前突殺數人瘡重瞋目大罵而死又曰夏侯燉音敦從征吕布爲流矢所中傷左目時夏侯淵與燉俱爲將軍軍中號燉爲盲夏侯晉書曰王衍甞因宴集爲族人所怒舉音壘擲其靣衍􅀄無言引王導共載而去然心不能平在車中攬鏡自照謂爾看吾目光乃在牛背上矣王隱晉書曰甘卓爲􅀭威將軍歴陽内史郡人陳訓私語人曰甘公頭伭視仰目中有赤脉當危於兵勿爲將可也果爲王敦所害又曰王敦枉害刀恊及敦病白日見恊乗軺音遥車從吏騶詣敦而仰頭瞋目鄧粲晉紀阮籍能爲青白眼禮俗士輙以白眼對之􅄞喜康之兄聞籍不􅂘見白眼喜不憚而退蕭子顯齊書曰禇淵有器度不妄舉動宅常失火煙燄甚遍左右驚擾淵神氣怡然索轝來徐去輕薄子頗以名節譏之以淵眼多白睛謂之白虹貫日也崔鴻十六國春秋前秦録曰符生驍果麤􅁀昏酒無頼祖洪甚惡之生無一目年七歳洪戲之問侍者曰吾聞瞎兒一淚信乎侍者曰然生怒引佩刀自刺出血曰此亦一涙也洪大驚三國典略曰齊韓鳯穆提婆髙阿郍肱共處衡軸號曰三貴瞋目張拳有噉人勢又曰和士開常言曰琅瑘王目光弈弈數歩射人向者暫對不覺汗出又曰周武帝還自東伐􅀄遇疾口不能言臉垂覆目老子曰五色令人目盲韓非子曰目見有百歩之外而不能見其眥莊子曰温伯雪子適齊舎於魯仲尼見之不言子路問焉仲尼曰􅀂夫人者目擊而道存也又曰孔子見老􅆅而語仁義老聃曰夫播糠眯目則天地四方易位矣夫仁義飜然乃憒吾心亂莫大焉孟子曰伯夷目不視惡色又曰存乎人莫良於眸子眸子不能掩其惡􅇩中正則眸子膫焉􅇩中不正則眸子眊焉范子曰掩目別黒白雖一時中猶不知天道也愼子曰離朱之明察毫末於百歩之外尺水不能見淺􅀷非目不明其勢難覩也尸子曰使目在足下則不可以視又曰舜兩眸子是謂重明孫卿子曰厭目而視者視一以爲兩燕丹子曰樊於期聞荆軻之言於是自剄頭墮背後兩目不瞋韓子曰田駟欺鄒君將殺之田駟恐告惠子見鄒君曰有人見君則䁋大叶切閉目也其一目奚如君曰我必殺之惠子曰瞽䁋兩目君奚弗殺駟東欺齊侯南欺荆王駟之於人瞽也君奚惡乃弗殺又曰古人目短於自見故以鑑觀靣又曰刻削之道鼻莫如大目莫如小鼻大可小小不可大目小可大大不可小舉事亦然又曰楚莊王子曰王之伐越何也王曰政亂兵弱莊子曰臣患知之如目也能見百歩之外而不能自見其睫王之弱亂非越王之下也而欲伐越此知之如目也淮南子曰夫目察秋毫之末而耳不聞雷霆之音耳調玉石之聲而目不見太山之髙何則不小有所志而大有所志也孔叢子曰夫子適周見萇􅀪言終而退萇􅀪語劉文公曰吾觀仲尼有聖人之表其狀河目而隆顙是黄帝之形貌也郭子曰劉尹道桓温􅂡如反蝟毛眼如紫石稜自是孫仲謀一流人也抱朴子曰眼能察天衢而不能周項領之間蔣子語曰兩目不相爲視昔吴有二人共評王者一人曰好一人曰醜乆之不决二人各曰尓可來入吾目中則好醜分矣王有定形二人察之有得失非茍相反眼睛異耳􅀽凖正書曰目以見小爲明耳以聽大爲聦顧子義訓曰假天下之目以視則四海毫末可見也山海經曰一臂國爲人一目中其靣而居括地圖同太公金匱曰一目視則不明一耳聽則不聦吕氏春秋曰孟賁過於先其伍舡人怒以檝䖊音乂其頭中河孟賁瞋目視舡人髮植目烈􅂡指指直舟人盡惕駭播入於河使舡人知孟賁不敢直視渉無先者又辱之乎此不知故也又曰管子􅅞束於魯鮑叔曰君欲霸王則臣不􅀂管夷吾桓公曰夷吾寡人之賊也射我者也不可鮑叔曰夷吾爲其君射人􅀂得之則彼亦將爲君射人君不聽鮑叔固讓果聽之於是使告魯曰管仲寡人讎也願得而親加手焉魯許諾乃使吏鞟其拳膠其目以革囊其手也盛之以鴟夷置之車中至齊境桓公使人以朝車迎之又曰使其目可以見不學其見不􅀂盲春秋後語曰平原君對趙王曰􅃆池之㑹臣察安君之爲人也小頭而銳瞳子白黒分明小頭而銳断敢行也瞳子白黒分明者見事明也列仙傳曰秦召魏公子無忌不行使朱亥奉璧一􅀟秦王大怒將朱亥着虎圈中亥瞋目視虎眥血出濺虎虎終不敢以視鄭􅀇別傳曰􅀇􅀏眉明目董卓别傳曰卓㑹公卿召諸降賊飰行責降者曰何不鑿眼應聲眼皆落地趙至自叙曰􅄞康謂至曰卿頭小銳瞳子白黒分明覘占停諦有白起風列仙傳曰偓於角切佺音筌槐山人採藥好食松實而目更方又曰赤斧戎人也爲碧雞祠主簿餌丹身及瞳子皆赤神仙傳曰渉正巴東人入吴常閉目弟子隨之數十年莫有見開目者有一弟子固請之正爲開目音如霹􅆮光如電照弟子頓伏良乆乃起竹林七賢傳曰王戎眸子洞徹視日而眼照不虧世􅀃曰顧長康云其哭桓宣武眼如懸河决溜又曰康僧淵目深而鼻髙王承每調之僧淵曰鼻者靣之山目者靣之淵山不髙則不靈淵不深則不清又曰裴令儁有姿容時人名之爲王人有疾至困武帝使王夷甫徃視之王出語人曰眸子閃閃如巖下電精神挺動體中故如惡耳語林曰王右軍見杜􅀪冶歎曰面如凝脂眼如􅀧􅃮此神仙中人談藪曰王肅􅀄歸國謂陽大眼曰在南聞君之名以爲眼如車輪今見乃不異人大眼曰􅀂旗鼓相望瞋眸奮發足使君亡魂喪膽何必大如車輪又曰後魏昭成帝常擊賊流失中目賊破執射者至左右
