front:
  text: 太平御覽卷第七百六十三器物部八
  hash: sha256:674422d13ab6e4170a842a7612e0e6f82eb572474dac2f99387e0a46755cb17d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_763-1a}
body:
  text: 斧鋸椎鑿斧釋名曰斧甫始也凡將制器始以斧伐木已乃制之也易曰得其資斧我心不快斧所以破除荆􅁄以安其客舎者也不得其位不獲平之地雖得資斧其心不快龍魚河圖曰斧神名狂章周書曰神農作陶治斧破木爲耜鋤耨以墾草莽然後五􅂖興詩曰析薪如之何匪斧不剋取妻如之何匪媒不得又曰􅅙月條桑取彼斧斨音牆以伐逺揚又曰破斧羙周公也旣破我斧又缺我斨周禮曰大䘮及窆執斧以莅匠師匠師主豊碑之士執斧以師之使戒其士禮曰禮諸侯賜鈇音夫􅃏然後誅又曰天子􅀒斧依南郷而立斧依爲斧文屏風於户牖之間傳曰楚子執齊慶封將戮之􅀒之斧􅃏以徇於諸侯使言曰無或如齊慶封弑其君弱其􅀌以盟其大夫春秋元命苞曰斧鑕主亂行斬狂詐斧之爲言􅀘也漢書曰分周爲二有逃責之臺􅀍竊鈇之言應劭曰周赦王出至路邊竊取過人又曰􅁀勝之爲直指使者衣繡持斧逐捕盗賊又曰王莽司徒王㝷􅀄發長安􅀫霸昌廐亡其黄􅃏㝷軍士所王素狂直入哭曰此經所謂䘮其齊音資斧者也應劭曰齊利也亡其利斧言無以復斬断者東觀漢記曰􅀕遵襲略陽遣護軍王忠皆持刀斧伐樹開道又曰蔣翊字元卿後母憎之伺翊寢操斧斫之值詡如厠謝承後漢書曰㑹稽戴就字景成爲都曹􅁺太守爲州所奏就見伏考燒斧以着腋下就罵獄卒此無火氣何不熟燒魏志曰太祖延張繡及其將帥置酒髙㑹太祖行酒典韋持大斧立後刃徑尺太祖所至之所韋輙舉目之繡及將帥莫敢仰視晉書曰魏舒嘗適野王主人妻夜産俄而聞車馬之聲相問曰男也女也曰男書之十五以兵死復問􅀫者誰曰魏公舒後十五載詣主人問所生兒何在曰因條桑爲斧傷而死舒自知爲公晉咸和起居注曰因有司奏魏氏故事正旦賀公卿上殿虎賁六人隨上以斧柄柱衣裙上令冝依舊爲儀注詔曰此非前代善制其除之三輔舊事曰王莽夢大夏殿前五銅人語莽惡之斧斫開銅人腹東陽記曰􅀳中朝時有民王質者入山伐木至石室中見童子數人彈琴而歌因留跂斧柯而聽之童子以物與之􅃺如􅀥核質含之便不復飢也童子曰汝來巳乆冝去質承聲起斧柯漼然爛盡旣歸去家巳數十年列女傳曰丁仲謀妻氏共夫至交趾夫爲賊所殺妻舩上得一斧舉以破賊列仙傳曰赤斧手中常有赤斧録異傳曰陳丗母黄亡後還家但聞聲丗忽亡斧黄言問家奴福盗之幽明録曰文翁常欲斷大樹欲斷處去地一丈八尺翁先祝曰吾􅀂得二千石斧當着此處因擲之中所欲一丈八尺處後果爲郡賈逵別傳曰逵廟一栢樹有人竊來斫伐始投斧數下斧刃仍折於樹中七賢傳曰文黨字翁仲與人俱入山取木謂侣人曰吾欲逺學先試投斧髙木上斧當挂乃投之斧果上因之長安受經廷尉决事曰廷尉髙文惠上民􅀓晦詣民籍牛塲上盗􅁰爲牛所􅁴以斧擲折晦脚物故依律牛應弃市監􅀥超議晦旣夜盗牛本無殺意冝减死一等六韜曰操刀不割失利之期執斧不伐賊人將來繁葉不去將爲斧柯列子曰人有亡鈇者意其隣人子視其行歩竊鈇也顔色竊缺也言語竊鈇也動作態度無爲而不竊鈇也俄而於其谷而得其鈇他日復見其隣子之動作態度無似竊鈇矣孟子曰斧斤以時入山林材木不可勝用也荀卿子曰林木茂而斧斤至焉吕氏春秋曰孔甲田于東陽萯音倍山天大風晦孔甲迷惑入于民室主人方乳乳産也或曰后來是良日也是子必大􅁻或曰不勝之是子必大殃后取其子以歸曰以爲余子誰敢殃之子長成莫動析音老斧破斬其足遂爲太者以其無足遂使守門淮南子曰巨斧擊桐薪不待利時日而後破之又曰古之遣將尹親操斧持頭授將軍柄曰閫以外者將軍裁之􅀃苑曰雍門周說孟甞君以秦楚之強而報於弱薛譬猶蕭斧而伐朝􅌲也玄晏春秋曰隣人亡斧及雞意予竊之居三日雞還斧又自得隣人大愧志林曰齊斧齋當爲齋凡師岀必齋戒入廟受斧故云齋也抱朴子曰介象燒斧而立其上乆不知􅀬諸葛亮教曰前後所作斧都不可用前伐鹿角壞刀斧千餘枚頼賊已走間自令作部刀斧數百枚用之百餘日􅀄無壞者爾乃知彼主者無意冝收治之此非小事也􅀂臨敵敗人軍事矣鋸釋名曰鋸倨也其體直所截應倨勾之正也說文曰鋸槍唐也古史考曰孟莊子作鋸史記曰公孫鞅之事孝公也設刀鋸以禁姧邪信賞罰以致理後漢書曰獻帝欲復肉刑孔融議曰雖忠如鬻拳信如楚和智如孫臏一離刀鋸没丗不齒吴志曰孫皓愛妾使人至市賊奪百姓財物同市陳聲䋲之以法皓大恕假他事燒鋸斷聲頭王隱晉書曰趙王倫欲廢賈后而門錀在侍中處所部司馬多木作有利鋸至期倫乃命三部司馬以銅鋸截􅀜開門晉書曰胡母輔之字彦國少擅髙名王澄常與人書曰彦國吐佳言如鋸木屑霏霏不絶誠爲後進領䄂也又中興書曰符徤凶滛􅁀虐常露刀張弓椎鉗鋸鑿殺人之具備置左右宋書曰後廢帝名昱􅀄在東宫惰業好嬉師主不能禁及嗣位漸自放恣晨岀暮歸從者並執鋌矛加以虐刑鍼椎鑿鋸之徒不離左右莊子曰禮􅀂亢鋸之柄亢舉也禮有所断割猶舉鋸之柄以断物也又曰天下好智而百姓求竭矣於是乎釿音斤鋸顓焉䋲墨殺焉椎鑿决焉管子曰軍中必有一斧一鋸尸子曰水非石之鑚繩非木之鋸列女傳曰臧文仲爲魯使齊齊拘之文仲使人遺公書恐人得之乃謬其詞曰臧我羊食我以銅魚公及大夫莫能知之乃問臧孫母母泣曰吾子拘有木治矣木治桔也臧我羊者臧善也羊者有母告妻善養母食我以銅魚銅魚其父錯錯者所以治鋸也鋸者所以治木是以知有木治擊於獄矣淮南子曰夏屋聮房公輸王爾無所措剖居綺切劂居月切削鋸然猶未能贍人主之欲也丗􅀃曰晉元皇􅀄見賀司空言及吴時孫皓燒鋸截一賀頭是誰司空未復言元皇曰燒是賀邵司空流涕曰昔者先臣遭遇無道臣創巨痛深無以上荅明詔元皇慙愧三日不出衡山記曰雞頭陂西有石室有人採藥暮􅀫其中曉見一鋸懸在壁上示有形無復䥫貫椎􅀃文曰椎擊也齊謂之柊音終揆音葵鐓丁回切千椎斤也纂文曰柊揆方椎隹贑易林曰亡椎失斧公輸無輔廣雅曰柊揆㪙􅀂卧切櫌鐇音煩䤶於業切㭬音卓椎也史記曰張良爲韓報讎得切刀爲䥫椎重百二十斤擊始皇於􅀶浪沙中誤中副車又曰信陵君客朱亥䄂四十斤䥫椎椎晉鄙殺之奪兵以救趙戰國䇿曰始皇遺齊君王后連環曰齊多知能解環君王后引椎椎破之謝􅁗使曰謹巳解矣漢書曰賈山上書曰􅁗王東窮燕齊南極吴楚厚築其外隱以金椎爲馳道之麗至於此使其後丗曽不得斜逕而託足焉又曰淮南王長怨辟陽侯之不救其母也䄂金椎椎殺辟陽侯又曰中山靖王勝來朝聞樂聲而泣曰衆煦漂山聚蚊成雷明堂執虎十夫橈椎王隱晉書曰梅陶及鍾雅數􅀃事祖納輙困之因曰君汝頴之士利如錐我幽兾之士鈍如椎持我鈍椎椎君利錐皆當槯陶雅並稱有神錐不可得椎納曰假有神錐必有神椎吴越春秋曰夫差使力士石畨以䥫椎椎殺王孫聖益州記曰市橋莋音作橋今各有一䥫椎大十許圍長六七十尺云􅀄橋引機運此椎以擊橋柱本有三今餘二管子曰一農必有一椎莊子曰儒以詩禮發􅃁曰徐以金椎控其頥無傷口中珠周生列子曰昔伊尹操啇栝􅁎公揮周機管子執齊􅃏范蠡􅁬越椎世􅀃曰永嘉三年中牟縣故魏任城王臺下池有漢時䥫椎長六尺入地三尺頭西南指不動桓譚上事曰孔子問屠牛曰屠牛有道乎曰刺必中解割必中理盤筯則引終葵而椎終葵方椎孫盛優劣論曰子房􅁬椎爲天下唱義義聲旣震則􅁗亡可知矣鑿釋名曰鑿有鑿穿鑿也􅀃文曰鑿小鑿也通俗文曰石鑿曰鏨作澹切鑿充曰銃昌仲切小鑿曰音潺柄曰境音擎受樈曰鍃七切古史考曰孟莊子作鑿尸子曰利錐不如方鑿管子曰軍必有一鑿莊子曰齊桓公讀書堂上輪扁斵輪堂下釋推鑿而上問桓公抱朴子曰魏明帝好聞椎鑿之聲搜神記曰陳仲舉微時常宿黄申家婦方産夜有叩門者湏􅁷門裏言有客堂下有人不可進曰從後徃湏􅁷還留者問曰何等名可與幾歳應以何死荅曰男也名奴得十五歳當以兵死仲舉告其家父母不使執寸刃年十五有置鑿於梁者其末岀奴以長木鉤取鑿墮䧟腦而死太平御覽卷第七百六十三
