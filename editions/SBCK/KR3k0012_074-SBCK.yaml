front:
  text: 太平御覽卷第七十四
  hash: sha256:affbd796f19fd70dc45f2d5e83c9990d1ddd745fbd58b6d7e7a05a0748dd9d6b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_074-1a}
body:
  text: 地部三十九塘隄島嶼滸岸泥礫沙塘録異傳曰文翁者廬江人爲兒童時乃有神異及長當起歷下陂以作田文翁晝日斫伐柴薪以爲陂塘其夜忽有數百頭野猪以􅈹一戴土着柴中比曉成塘吴地記曰壇塘一名陌城夫差十二年旣殺子胥後悔之與群臣臨江作塘創設􅀕奠百姓因以立廟吴越春秋云夫差設􅀕杯動酒盡劉道眞錢塘記曰防海大塘在縣東去邑一里徃時郡議曹華家信冨乃議立此塘以防海水始開募有能運土石一斛即與錢一􅂛旬日之間來者雲集塘未成而譎不復取於是載􅁟石者棄置而去塘以之成旣遏絶潮源一境􅂪利也述異記曰今烏江長亭亭下有騅馬塘即當時烏江亭長艤舟待項王處南越志曰丹城縣有釡塘金沙自是而出裴淵廣州記曰彰平縣朱沙塘水如絳魚鼈皆赤荆州記曰長沙郡東十餘里有郡人劉壽墓有石闕四所壽漢順帝時爲司徒其東有􅀛塘周廽四十五里有靈􅀛出其中故塘因名焉盛弘之荆州記曰始安熈平縣東南有山山西其形長狹水從下注塘一日再减盈縮因名爲朝夕塘幽明録又載幽明録曰耒陽縣東北有蘆塘淹地八頃其􅀷不可測中有大魚常至五日一躍􅁬出水大可三圍其􅃺異常每躍出水則小魚奔迸隨水上岸不可勝計異記云蘆塘有鮫魚五日一化或爲美異婦人或爲男子至於變亂尤多郡人相戒故不敢有害心鮫亦不能爲計後爲雷電殺之此塘遂涸劉欣期交州記曰鑿南塘者九真路之所經去州五百里焉援積石爲塘以通於海逹於象浦建標爲南極之界淮南子曰壞塘取􅀛發屋求狸桀跖之徒君子不爲堤爾雅曰墳大防也謂隄梁書曰始興忠武王憺音淡字僧逹爲荆州刺史遇大江溢堤壞憺親率將吏冒􅀨築之􅀨勢甚猛人皆恐懼或請避之憺曰王尊尚欲身塞河堤我心何獨以危登堤歎息遂輟膳而刑白馬以􅀕江神以身爲百姓請命言終而水退堤出郡國志曰長沙金牛堤漢武時有異人牽金牛走入此堤内因以名焉水經注曰􅃰郡王尊自益州刺史遷東郡太守河水盛溢泛浸瓠子金堤尊躬率吏民投沉白馬祈水神河伯親執圭璧請身填堤廬居其上吏民皆走尊立不動水齊足而止公私壯其勇節水經曰漢安帝永􅀄七年今謁者太山于岑於石門東積石八所皆如小山以捍衝波謂之八激堤島釋名曰海中可居曰島到也人所奔到漢書曰田橫懼誅入居海島中孟康海中山曰島魏志曰王傾討句驪入沃沮人云嘗乗􅂳捕魚風吹十日東得一島上有人常以七月取童女沉海齊地記曰嶗山東北五里入海有管彦島是黃巾賊帥管承後也又曰東牟城東有盤島城東北有牛島常以五月海牛及海狸與島産乳其上嶼臨海記曰去郡七里東有樊續嶼嶼上空冢裏猶餘敗鼓角或呼爲樊府君墓今郡公田在此嶼下滸爾雅曰岸下地曰滸詩曰綿綿􅁑藟在河之滸岸爾雅曰重涯曰岸詩曰髙岸爲谷又曰淇則有岸晉書曰殷仲堪於江濵見流棺而􅁙焉旬日之間門溝忽起爲岸其夕有人自稱感君之恩堪因問岸何祥也荅曰水中有岸曰洲君將牧州言終而没至是果得荆州也水經注曰船官浦東即黃鵠山林澗甚美譙郡戴仲􅀂野服居之山下謂之黃鵠岸又曰昆明池有金堤石岸益州有金堤左思曰西踰金堤東曰玉津孫卿子曰泉生珠而岸不枯􅅺􅀃文曰􅅺黒􅁟在水中者也易曰井􅅺不食舊井無禽在井之下故稱􅅺井而􅅺則不可食書曰淮海惟楊州厥土惟塗􅅺詩含神霧曰夫齊之地處孟春之位海岱之間􅁟地汙􅅺流之所歸利之所聚傳曰晉楚將戰吕錡夢射之中之退入於􅅺論語曰子夏云雖小道必有可觀者焉致逺恐􅅺是以君子不爲小道令諸子書泥滯䧟不通也漢書溝洫志曰涇水一石其􅅺數斗且漑且畨長我禾黍又曰禹􅅺行乗橇東觀漢記曰隗囂將王元􅀃囂將背漢曰請以一丸􅅺爲大王東封函谷􅀜此萬丗一時也又曰鄧訓將黎陽宫兵屯漁陽遷護烏丸校尉黎陽宫故吏皆戀慕知訓好以青􅅺封書從黎陽歩推鹿車載青􅅺至上谷遺訓其得人心如此隴石記曰武都紫水有􅅺其色亦紫而粘貢之用封璽書故詔誥有紫􅅺之美帝王丗紀曰周穆王征犬戎得錬剛赤刀用之割玉如割􅅺焉神仙傳曰董奉君居廬山嘗大旱縣令于士彦詣奉􅀃大旱之意奉因仰視其屋曰貧家屋皆見天不可以得􅀨如何令解其意身率將吏爲起屋屋成當􅅺壁作人巳掘􅁟欲取江水沃􅅺奉曰不須日暮當􅀨也其夜果大􅀨聚壤成􅅺頋微廣州記曰鬰林郡山東南有池有石牛在池下民常祀之歳旱百姓殺牛祀之以牛血和􅅺􅅺石牛背祠畢天􅀨洪注洗背􅅺盡而後晴曾子曰白沙在􅅺與之皆黒淮南子曰琬琰之玉在汙􅅺之中雖廉者不釋也丗􅀃曰石崇以椒爲􅅺􅅺屋王君夫以赤石脂􅅺壁雜五行書曰二月上王取􅁟􅅺屋四角冝蠶􅁻礫釋名曰小石曰礫礫析也小石相支其間析析然抱朴子曰軍術曰地生瓦礫不去有大禍蔡伯喈青衣賦曰金生沙礫珠出􅑕􅅺盧子雲相風賦曰楚石雜結緑沙礫厠隋珠沙龍魚河圗曰􅃖尤兄弟八十一人並銅頭鐵額食沙石韓詩外傳曰孔子南遊􅃴楚至於阿谷之隧有女子佩瑱而浣者孔子曰彼婦人其可與言乎執觴以授子貢曰善爲之辝婦人荅曰阿谷之隧隱曲之汜欲飲則飲何問於婢子授子貢觴跪坐置之沙上曰禮不親授禮曰自西河至於流沙千里而遥雍州是也家語曰得其人如聚沙而􅀨之非其人如會聾而鼓之史記曰張良以鐵椎擊􅁗始皇於博浪沙中其副車又曰上在雒陽南宫從􅃨道望見諸將徃徃相與坐沙中語又曰武帝元封元年旱於是天子乃禱萬里沙應劭注曰万里沙祠戰國䇿曰齊襄王立田單相之過淄水有老人渉水而寒不能行坐沙中田單見其寒也解裘而衣之襄王曰弗早圗恐後悔之疑單有異心也漢書曰韓信擊龍且夾睢水夜令人爲萬餘囊盛沙以壅水上流東觀漢記曰朱鮪等共㑹洧水上沙中設壇立聖公爲天子􅀶物志曰石蕃衛臣也背能􅀒千二百石沙廣志曰流沙在玉門􅀜外南北二千東西數百里有三斷名曰三隴列子曰牛􅆙者上地之大儒也之邯鄲遇盗於耦沙魯連子曰朝露之蒲工女不能治淄澠之沙計兒不能數韓子曰孫叔敖請漢間之地沙石之處曾子曰白沙在􅅺與之皆黒淮南子曰河水欲清沙壤穢之又曰寒凝水熱焦沙抱朴子曰穆王南征一軍盡化小人爲􅆉沙􅀃苑曰湯之時大旱七年焦沙爛石葛洪肘後方曰治溺死方􅆈沙以覆死人使上下有沙但出口􅈹古今注曰宣帝地節元年上都沙中夜風有火如粟曹瞞傳曰操征馬超隔渭水婁子伯􅀃曰今天寒可起沙爲城以水灌之可一夜而成劉根別傳曰潁川太守髙府君到官民人疫郡中􅁺吏死者過半夫人郎君悉得病從根求消除病氣之術根曰於㕔事之亥上穿地取沙三斛着中以淳酒三升沃其上府君從之病者悉得愈疫氣絶捜神記曰有物處于江水其名曰蜮一曰短狐能含沙射人以術方抑之則得沙石於肉中叚國沙州記曰澆河西有黃沙沙南北一百二十里東西七里西極大楊川望黃沙猶人委乾糒地不生草木黃沙蕩然沙州取號焉䂊章記曰龍沙在郡北帶江沙甚㓗白髙峻而峙陂陁有龍形舊俗九月九日登髙上處也新安記曰錦沙村傍山依壑素波澄膜錦石舒文冠軍吴喜聞之而造焉鼓柂遊泛弥旬忘返歎曰名山美石故不虚賞使人喪朱門之志王孚記曰􅀽州有水春交則上白沙如米於兩岸九十餘里呼爲米沙􅀂一岸徧米其方豐熟湘中記曰白沙如霜雪赤岸似朝霞遁甲開山圖曰沙土之福雲陽之墟可以長生可以隱居沙􅁟即長沙也雲陽古仙人也郡國志曰杭州浙江有江沙漲昔武列爲郡吏赴府郷人餞之㑹此沙上父老曰此沙狹而長君必爲長沙太守果然又曰伊州䥫勒國也而路多沙磧磧内時聞叫喚聲不見人或聞歌􅀏之聲蓋􅀑物也鄱陽記曰新昌水有一砂堆在縣東北五十里其形狀如覆船鮮浄特異毎年豐稔其沙即堆積如舊􅀂砂移向岸其年儉古來相傳以爲常驗太平御覽卷第七十四
