body:
  text: 飲食部四􅄝酒使酒􅄝酒傳曰齊慶封好田而􅄝酒與舎政舎封子慶封當國不自爲政以付舎則以其内實遷于盧蒲嫳氏易内而飮酒内實寳物妻妾也傳曰鄭伯有􅄝酒爲窟室窟實地室而夜飲酒擊鐘焉朝至未巳朝者曰公焉在家臣故謂伯有爲公其人曰吾公壑谷壑谷窟室皆自朝布路而罷布路分散旣而朝伯有朝鄭君則又將使子晳如楚歸而飲酒庚子子晳以駟氏之甲伐而焚之伯有奔雍梁雍梁鄭地醒而後知之遂奔許傳曰齊惠欒髙氏皆􅄝酒欒髙二族皆出惠公信内多怨􅀃婦人言政多怨疆於陳鮑氏而惡之惡陳鮑夏有告陳桓子曰子旗子良將攻陳鮑氏亦告鮑氏桓子授甲而如鮑氏遭子良醉而騪欲及子良醉故驅告鮑文子遂見文子文子鮑國則亦授甲矣使視二子二子子旗子良也則皆將飲酒桓子曰彼雖不信彼傳言者聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒髙氏後漢書曰更始韓夫人尤􅄝酒毎侍飲見常侍奏事輙怒曰帝方對我飲正用此時持事來乎起抵破書案又曰馬氏爲人􅄝酒闊達敢言闊達大度也敢言謂言果言敢無所隱也時醉在御前面折同列言其短長無所避忌帝故縱之以爲􅀏樂魏志曰徐邈字景山魏國􅀄爲尚書郎時科禁酒而邈私飲至於沉醉校尉趙達問以曹事邈曰中聖人逹白太祖太祖甚怒度遼將軍鮮于輔進曰平日醉客謂酒清者爲聖人濁者爲賢人邈性慎偶醉言耳坐刑後車駕幸許昌問邈曰頗復中聖人不邈對曰昔子反斃於榖陽御叔罰於飲酒臣􅄝酒二子不能自懲時復中之然􅀫瘤以醜見傳而臣以醉見識帝大􅀏頋左右曰名不虚立又曰時苗字徳胄鉅鹿人也少清白爲人疾惡建安中入丞相府出爲壽春令令行風靡􅀭州治在其縣時蔣濟爲治中苗以􅀄至欲徃謁濟素􅄝酒適㑹其醉不能見苗恚恨還刻木爲人署曰酒徒蔣濟竪之於墻下旦夕射之州郡雖知其所爲不恪然以其履行過人無􅀂之何呉書曰鄭泉字文淵陳郡人􅀶學有竒志而性􅄝酒其閑居毎日願得美酒滿五百斛舡以四時甘脆置兩頭反覆以飲之憊即住而啖肴膳酒有㪷􅂛減即隨益之不亦快乎晉書曰光逸字孟祖遇亂避難渡江依胡母輔之􅀄至屬輔之與謝鯤阮放畢卓羊曼桓彛阮孚散髪祼衣閉室酣飲巳累日逸將排户入守者不聽逸便於户外脫衣露頭於狗竇中窺之而大叫輔之驚曰他人决不能爾必我孟祖也遽呼入遂與飲不捨晝夜人謂之八逹又曰孟嘉爲桓温叅軍嘉好酣飲愈多不亂温問嘉酒有何好而卿􅄝之之嘉曰未得酒中趣耳又曰孝武末年􅄝酒好肉而㑹稽王道子昏醟尤甚唯狎眤謟邪於是國寳䜛䛕之計稍行於主相之間宋書曰衡陽王義季素􅄝酒自彭城王義康廢後遂爲長夜飲畧少醒曰文帝詰責曰此非唯傷事業亦自損性皆汝所請近長沙兄弟皆縁此致故將軍􅂫徴躭酒成疾旦夕待盡一門無此酣法汝於何得之義季雖奉㫖酣縱不改成疾以至於終又曰范㤗􅀄爲太學􅀶士外弟荆州刺史王忱請爲天門太守忱􅄝酒醉輙累旬及醒則儼然端肅泰陳酒旣傷生所冝深誡其言甚切忱嗟歎乆之曰見䂓者衆未有􅀂此者也又曰劉邕穆之之子河東王歆之與邕俱甞爲南康相素䡖邕後歆之與俱豫元㑹並坐邕􅄝酒謂歆之曰卿昔見臣今能見勸一盃酒不歆之因斆孫皓歌荅曰昔爲汝作臣今爲汝比肩旣不勸汝酒亦不願汝年梁書曰王贍爲吏部尚書性率亮居選所舉其意多行頗􅄝酒毎飲或彌日而精神朗贍不廢簿領武帝毎稱贍有三術射棊酒也南史曰陳暄文才俊逸尤􅄝酒無節操遍歴王公室沉湎過差非度其兄子秀常憂之致書於暄友人何胥兾其諷諌暄聞之與秀書曰且見汝書與孝典陳吾飲酒過差吾有此好五十餘年昔呉國張公亦稱躭􅄝吾見張公時伊巳六十自言引滿大勝少年時吾今所進亦勝於徃曰老而彌篤唯吾與張季舒耳吾方與此子交歡於地下汝欲夭吾此志􅁘昔阮咸阮籍同遊竹林宣子不聞斯言王湛能􅀇言巧􅀐武子呼爲癡叔何陳留之風不嗣大原之氣巋然飜成可怪吾旣寂寥當丗朽病殘年産不異於顔原名未動於卿相􅀂不日飲醇酒復欲安歸女以飲酒爲非吾以不飲爲過昔周伯仁渡江唯三日醒吾不以爲少鄭康成一日三百盃吾不以爲多然洪醉之後有得失成厮養之志是其得也使次公之狂是其失也吾常譬酒猶水也可以濟舟亦可以覆舟故五議有言酒猶兵也兵可千日而不用不可一日而不備酒可千日而不飲不可一飲而不醉美哉江公可與共論酒矣汝驚吾墮車侍中之門䧟池武陵之地遍布朝野自言憔悴丘也幸苟有過人必知之吾平生所願身没之後題吾墓云陳故酒徒陳君之神道􅀂斯志意豈避南征之不覆賈􅁩之慟哭者哉何水曹眼不識盃鐺吾口不離觚杓汝寕與何同日醒與吾同日而醉乎政言其醒可及其醉不可及也速營糟丘吾將老焉後魏書曰夏侯道迁長子史字元廷歴鎮逺將軍南兖州大中正史性好酒居䘮不戚醇醪肥鮮不離口沽買飲噉多所費用父時田園貨賣畧盡人間債猶數千餘疋榖食至常不足弟妹不免飢寒於是昏酣而卒􅀄史與南人辛諶􅁃遵江文遥等終日遊聚酣飲之際􅁪相謂曰人生局促何殊朝露坐上相看先後間耳脫有先亡者於良辰美㬌靈前飲宴儻或有知庻共歆饗及史亡後三月上巳諸人相率至史靈前仍共酌飲時日晚天隂室中微闇咸見史在坐衣服形容不異平昔時執盃酒似􅀂獻酬但無語耳後魏書曰李元忠微拜侍中雖處要任􅀄不以物務干懐唯以聲酒自娱大率常醉家事大小了不􅀜心園庭羅種果藥親朋尋詣必留連宴賞每挾彈㑺壷遊遨里閈毎言寕無食不可使我無酒阮步兵吾師也孔少府豈欺我哉後自中書令復求爲太常以其有音樂而多美酒故神武欲用爲僕射文襄言其放逹常醉不可任以臺閣其子揆聞之請節酒元忠曰我言作僕射不勝飲酒樂爾愛僕射時冝勿飲酒北齊書曰黃門郎司馬消難左僕射子知之子是髙祖之壻勢盛當時因退食之暇㝷髙季式與之酣飲留􅀫旦日重門並閉􅀜鑰不通消難固請云我是黄門郎天子侍臣豈有不參朝之理旦一􅀫不歸家君必當大怪今􅀂又留我狂飲我得罪無辭恐君亦不免譴責季式曰君自稱黄門郎又言畏家君怪欲以地勢脅我邪髙季式死自有處􅀄不畏此消難拜謝請出終不見許酒至不肯飲季式云我留君盡興君是何人不爲我飲命左右賫車輪括消難頸又賫一輪自括頸仍命酒引滿相勸消難不得巳欣􅀏而從之方仍俱脫車輪更留一􅀫是時失消難兩􅀫莫知所在内外驚異及消難岀方具言之丗宗在京輔政白魏帝賜消難美酒數石珎羞十轝并令朝士與季式親狎者就季式宅讌集其􅀍優遇如此唐書曰王源中爲户部侍郎翰林丞㫖學士性頗􅄝酒甞召對源中方沉醉不能起及醉醒同列告之源中但懷憂殊無悔恨他日又以醉不任赴召遂終不得大任以眼病求免所職列子曰子産之兄公孫朝聚酒千鍾積麹成封望門百歩糟漿之氣逆於人􅈹方其荒於酒也不知正道之安危人理之悔恡室内之有無九族之親踈雖水火兵刃交於前不知也王子年拾遺記曰晉有羌人姚馥字丗芬充廐馬圉毎醉中好言王者興亡之事常云九河之水不足以漬麹蘖八藪之木不足以爲蒸薪七澤之麋不足以充庖俎恒言渴於醇酒羣軰呼爲渴羗後武帝受以朝歌守馥辭願且爲馬圉時賜美酒以樂餘年帝曰朝歌紂之舊都地有酒池故使老羗不復呼渴固辭遷酒泉太守地有清池其味􅀂酒馥乗醉而拜受之丗􅀃曰劉靈病酒渴甚從婦求酒持器泣諌曰君飲酒太過非攝生之道必冝斷之靈曰甚善我不能自禁唯當祝􅀑自誓斷之耳便可具酒肉婦從之靈跪而呪曰天生劉靈以酒爲名一飲一斛五斗解醒婦人之言慎不可聽便引酒進肉隗然巳醉又曰畢茂丗云一手持蟹螯一手持酒盃拍浮酒池中便足了一生使酒史記曰季布爲河東守孝文時人有言其賢者孝文召欲以爲御史大夫復有言其勇使酒難近至留邸一月見罷布因進曰臣無功竊寵待罪河東陛下無故召臣此人必有以臣欺陛下者今臣至無所受事罷去此人必有毀臣者夫陛下以一人之譽而召臣以一人之毀而去臣臣恐天下有識聞之有以窺陛下也上嘿然慙良乆曰河東吾股肱郡故時召君耳布辭之官又曰孝武建元元年灌夫入爲太僕二年夫與長樂衛尉竇甫飲輕重不得飲酒輕重不得其平夫醉搏甫甫竇太后昆弟也上恐太后誅夫徙爲燕相數歳坐法去官家居長安灌夫爲人剛直使酒不好面䛕貴戚諸有勢在巳之右不欲加禮必陵之諸士在巳之左愈貧賤尤益敬灌夫家居雖冨然失勢賔客益衰及魏其侯失勢亦欲􅀝夫引䋲排根生平慕之後棄之者夫亦􅀝魏其而通列侯宗室爲名髙兩人相爲引重其游如父子然相得驩甚恨相知晚也夫有服過丞相丞相從容曰吾欲與仲孺過魏其侯㑹仲孺有服夫曰將軍乃肯幸臨况魏其侯夫安敢以服爲解請語魏其侯帳具將軍旦日早臨武安許諾夫具語魏其侯如所謂武安侯魏其與其夫人益市牛酒夜灑掃早帳具至旦平明令門下候伺至日中丞相不來魏其謂夫曰丞相豈忘之哉夫不懌曰夫以服請冝徃乃駕自徃迎丞相丞相特前戯許灌夫殊無意徃及夫至門丞相尚卧於是夫入見曰將軍昨日幸許過魏其魏其夫妻治具自旦至今未敢嘗食武安愕謝曰吾昨日醉忽忘與仲孺言乃駕徃及飲酒酣夫起舞屬丞相丞相不起夫從坐上語侵之魏其扶灌夫去謝丞相丞相卒飲至夜極驩而去丞相嘗使籍福請魏其城南田不得由此怨灌夫魏其後丞相娶燕王女爲夫人有太后詔召列侯宗室皆徃賀魏其侯過灌夫與俱夫謝曰夫數以酒失得過丞相丞相今者又與夫有郄魏其曰事巳解強與俱飲酒酣武安起爲壽皆避席伏巳魏其侯爲壽獨故人避席耳餘半􅂰席夫不恱起行酒至武安武安􅂰席曰不能滿觴夫怒因嘻􅀏曰將軍貴人也屬之時武安不肯行酒次至臨汝侯灌嬰孫名賢臨汝侯方與程不識耳語又不避席夫無所發怒乃罵臨汝侯曰生平毀程不識不直一錢今日長者爲夀乃效女兒呫囁耳語武安謂灌夫曰程李俱東西宫衛尉今衆辱程將軍仲孺獨不爲李將軍地乎灌夫曰今日斬頭䧟􅅐何知程李乎坐乃起更衣稍稍去續漢書曰時聖公聚客家有酒請游徼飲賔客醉歌言朝烹兩都尉游徼後來用調羮味游徼大怒縛捶數百魏志曰呉質黄􅀄五年朝京師詔大將軍及特進以下皆㑹質所太官給供俱酒酣質欲盡歡時上將軍曹真性肥中領軍朱鑠性瘦質召優使􅀃肥瘦真􅀒其貴耻見賤怒謂質曰卿欲以部曲將遇我􅁘驃􅀐將軍曹洪輕車將軍王忠言將軍必欲使上將軍肥即自冝爲痩真愈恚拔刀瞋目言俳敢輕􅀃吾斬爾遂罵坐質案劒曰曹子丹汝非屠机上肉呉質吞爾不嚙喉咀汝不嚙牙何敢恃勢憍􅁘鑠因起曰陛下使吾等來樂卿耳乃至此耶質頋叱之曰朱鑠敢壊坐諸將軍皆還坐鑠愈恚還拔劒斬地遂使罷也呉志曰權旣爲吳王歡宴之末自起行酒虞翻伏地佯醉不起權去翻起坐權於是大怒手拔劒欲擊之侍坐者莫不惶遽唯大司農劉基起抱權諌曰大王以三爵後手殺善士雖翻有罪天下孰知之且大王以能容賢畜衆故海内望風今一朝棄之可乎權曰曹孟徳殺孔文舉􅀌於虞翻何有哉基曰孟德輕害士人天下非之大王躬德義欲與堯舜比隆曽何自喻於彼乎翻由是得免權因勑左右自今酒後言殺皆不得殺也又曰胡綜性愛酒酒後讙呼極意或推引杯觴搏擊左右權愛其才不備責也又曰凌統當擊賊圍先期統與督將陳勤㑹飲酒勤剛勇任氣因督酒際陵轢一坐舉罰不以其道統疾其侮慢面折不爲具酒勤怒詈統及其父操統流涕不荅衆因罷坐勤乗酒凶悖又於道路辱統統不忍引刀斫勤數日死及當攻屯統曰非死無以謝罪乃率厲士卒身當矢石所攻一面應時破壞諸將乗勝遂大破之還自拘於軍正權壯其果毅許以功贖罪晉書曰􅁃純爲河南尹以賈充姦倿與任愷共舉充西鎮􅀜中充由是不平充嘗宴朝士而純後至充謂曰尹行嘗居人前今何以在後純曰且有小市事不了是以來後丗言純之先嘗有五百者充之先有市魁者故充純以此相譏焉充自以功隆望重意殊不平及純行酒充不時飲純曰長者爲夀何敢爾乎充曰父老不歸供養將何言也純因發怒曰賈充天下兇兇由爾一人充曰輔佐二丗蕩平巴蜀有何罪而天下謂之兇兇純曰髙貴郷公何在衆坐因罷充左右欲執純中護軍羊琇侍中王濟佐之因得出充慙怒上表解職純懼上河南尹􅀜中侯印綬上表自劾晉裴楷傳曰石崇以功臣子有才氣與裴楷志趣各異不與之交長水校尉孫季舒常酣讌慢慠過度欲表免之楷聞之謂崇曰足下飲人狂藥責人正禮不亦乖乎乃止又曰裴遐嘗在平東將軍周馥坐與人圍碁馥司馬行酒遐不即飲司馬醉怒因曵遐墮地遐徐起還坐顔色不變復碁如故其性和如是宋書曰謝超宗爲人恃才使酒多所陵忽在直省常醉上召見語及北方事超宗曰虜動來二十年矣佛出亦無如之何以失儀出爲南郡王中軍司馬梁書曰蕭頴逹出爲豫章内史意甚憤憤未發前預華林宴酒後於座辭氣不悅沈約因勸酒欲以觀之頴逹大罵約曰我今日形容正是汝老䑕所爲何忽復勸我酒舉坐驚愕帝謂之曰汝是我家阿五沈公􅀫望何意輕脫􅀂以法䋲汝汝復何理逹竟無一言唯大涕泣心愧之又曰謝善勛飲酒至數􅂛醉後輙張眼大罵雖復貴賤親踈無所擇也時謂之謝方眼陳書曰栁盼爲散􅀐常侍性愚戅使酒因醉乗馬入殿門爲有司劾免於家風俗通曰陳國有趙祐者酒後自相署或稱亭長督郵祐復於外􅀐馬將絳幡大我使者也司徒鮑昱决獄云􅀐馬將幡起於戯耳無他惡意又曰汝南張妙酒後相戯遂縛捶二十下又縣足指遂至死鮑昱决事云原其夲意無賊心冝减死風俗通曰巴郡宋遷母名静往阿奴家飲酒迁母坐上失氣奴謂遷曰汝母在坐上何無儀適遷曰膓痛誤耳人各有氣豈止我遷罵奴乃持木枕擊遷遂死太平御覽卷第八百四十六
