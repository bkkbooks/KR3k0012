body:
  text: 職官部五十六良刺史下酷刺史良刺史下唐書曰姜謩拜􅁗州刺史髙祖謂曰衣錦還郷古人所尚今以夲州相授用荅元功涼州之路近爲荒梗冝􅀪方略有以靜之謩至州撫以恩信州人相謂曰吾軰復見太平官府矣盗賊悉來歸首士庶安之又曰顔遊􅁗遷廉州刺史封臨沂縣男時劉黒闥􅀄平人多以強􅁀寡禮風俗未安遊􅁗撫恤境内敬讓大行邑里歌之曰廉州顔有道性行同莊老愛人如赤子不殺非時草髙祖璽書勞勉之又曰太宗詔朝集使刺史以上􅂛殿親問之曰卿等在州何以撫教定州刺史薛獻對曰老者國家所養臣毎存恤之少者國家所使臣毎勸誡之田疇荒廢漸加墾闢禮義旣行産業咸振此皆禀之聖化非臣之力太宗曰如公之所奏足稱循良清浄爲政朕所望於公等也又曰賈敦頥曹州􅁈句人也貞觀中歷遷滄州刺史在職清潔毎入朝盡室而行唯弊車一乗羸馬數疋羈有闕以繩爲之見者不知其刺史也後轉瀛州刺史州界滹沲河及滱水毎歳泛溢漂流民人敦頥奏立堤堰自是無復水患又曰田仁㑹永徽􅀄累遷郢州刺史以善政聞時属亢旱仁㑹自曝祈禱竟􅀗甘澤其􅀊大熟百姓歌之曰父母育我田使君精誠爲人上天聞旱田致雨山出雲倉廪旣實禮義申但願常在不患貧又曰許景先傳開元十三年玄宗令􅌠臣擇刺史之任必在得人景先首中其選自吏部侍郎出爲􅉑州刺史後轉歧州又曰薛大鼎爲滄州刺史州界有無棣河隋未填廢大鼎奏開之引魚鹽於海百姓歌之曰新河得通舟檝利直逹滄海魚塩至昔日徒行今騁駟美哉薛公德滂􅀍大鼎又以州界卑下遂决長蘆及漳衡等三河分􅂥夏潦境内無復水災時與瀛州刺史賈敦頥冀州刺史鄭德夲俱有美政河北號鐺脚刺史又曰敬暉除衛州刺史時河北新有突厥之冦方秋而修城不輟暉下車謂曰金湯非粟而不守豈有棄収穫而繕城郭哉悉令罷散由是人吏咸謌詠之又曰蕭定大曆中有司條天下牧守課績唯定與常州刺史蕭復濠州刺史張溢爲理行第一其勸農桑均賦稅逋亡歸復户口増加定又冠焉又曰叚秀實爲涇州刺史兼御史大夫四鎮北庭行軍涇原鄭頴節度使三四年間吐蕃不敢犯塞清約率昜逺近稱之非公㑹不聽樂飲酒私室無妓媵無嬴財退公之後端居静慮而巳德宗嗣位就加檢校禮部尚書又曰劉賛子􅀇之孫爲淅西都􅇛練判官建中􅀄楊炎作相擢爲歙州刺史以勤幹聞有老婦捃拾於叢林之間爲猛獸將噬㓜女號呼􅅮而救之母子俱免夲道觀察使韓滉奏爲異跡加金紫之服累歳遷常州刺史又曰李惠登李希烈反授惠登兵二千鎮隋州貞元􅀄舉州歸順授隋州刺史兼御史中丞州遭李忠臣希烈殱殘後野曠無人惠登朴質不知學居官無枝棄率心爲政皆與理順利人者因行之病人者因去之二十年間田疇闢户口加諸州奏吏入其境無不謌謡其能又曰韓愈爲潮州刺史旣視事詢吏民疾苦皆曰郡西湫水有鱷魚夘而化其長數丈食民畜産將盡以是民貧居數日愈徃視之令判官􅁗濟炮一豚一羊投之湫水呪之曰前代德薄之君棄楚越之地則鱷魚涵泳於此可也今天子神聖四海之外撫而有之况楊州之境刺史縣令之所治出貢賦以供天地宗廟之祝鱷魚豈可與刺史雜處此土哉刺史受天子命令守此土而鱷魚晘然安谿潭食民畜熊鹿麞豕以肥其身以䌓其􅆑與刺史争爲長雄刺史雖駑弱安肯爲鱷魚低手而下哉今潮州大海在其南鯨鵬之大蝦蟹之細無不容鱷魚朝發而夕至今與鱷魚約三日乃至七日如頑而不徙湏爲物害則刺史選材􅇊壯夫操勁弓毒矢與鱷魚從事矣呪之夕有􅁀風雷起於湫中數日湫水盡涸徙於舊湫西六十里自是潮人無鱷患又曰盧鈞開成元年爲廣州刺史御史大夫嶺南節度使南海有蠻舶之利珎貨輻湊舊帥作法興利以致冨凡爲南海者靡不稇載而還鈞性仁恕爲政廉㓗請􅁥軍領市舶使巳一不干預自貞元巳來衣冠得罪流放嶺表者因而物故子孫貧悴雖遇赦不能自還凡在封境者鈞减俸錢爲營槥櫝其家疾病死䘮則爲醫藥殯歛􅀌兒稚女爲之㛰嫁凡數百家由是山越之俗服其德義不嚴而人化又曰朱敬則爲御史冉祖雍所誣貶授廬州刺史經數月代到還郷里無淮南一物唯有所乗馬一疋諸子姪徒歩而歸又曰許圉師轉相州刺史政寛存惠人吏刋石以頌之甞有官吏犯􅂍事露圉師不令推究但賜清白詩以激其犯者愧懼遂改節爲廉士其寛如此又曰齊瀚定州義豊人爲汴州刺史河南爲雄郡自江淮逹于河洛舟車輻湊人庶浩䌓前後牧守多不稱職唯倪􅀂水與瀚皆以清嚴爲治吏民歌之又曰李勉爲廣州刺史兼嶺南節度使觀察畨禺賊帥馮崇道桂州叛將朱濟時等阻洞爲亂前後累歳䧟没十餘州勉至遣將李觀與容州刺史王翃併力招討悉斬之五嶺平前後西域舶泛海者歳􅂊四五勉性廉㓗舶來都不撿閱故末年舶至者四十餘在官累年器用車服無増飾者􅂄老以爲可継前朝宋璟盧奐李朝隱之徒人吏詣闕請立碑代宗許之又曰楊城爲道州刺史在州以家人法待吏人冝罰者罰之冝賞者賞之一不以簿書介意道州土地産民多矮每年常配郷户貢其男號爲矮奴城不平其以良爲賤又憫其編甿􅀊有離異之苦乃抗䟽論而免之自是乃停其貢民皆頼之無不泣荷又曰尹思貞爲青州刺史境内有􅁞一年四熟者黜陟使衛州司馬路敬潜八月至州見􅁞歎曰非善政孰能至於此乎特表薦之又曰馬璲改懷州刺史乗兵亂之後其夏大旱人吏失耕稼璲乃務修教化將吏有父母者璲輙造之施敬収􅄟􅁀骨去其煩苛至秋界中生穭榖人頗頼之又曰牛心􅐐爲鄂州刺史武昌軍節度使江夏城容土散惡難立垣墉毎年加版築賦菁茅以覆之吏縁爲姧蠧弊綿歳僧孺至計茅莒板築之費􅀊十餘萬即賦之以塼以當苫築之價凡五年墉皆甃葺蠧弊永除又曰皇甫無逸爲同州刺史閉門自守不通賔客左右不得岀門凡所貨昜皆徃他州毎桉部樵採不犯於人甞夜􅀫人家遇燈炷盡人主將續之無逸遽抽佩刀斷衣帶以爲其炷其廉介如此又曰吕元膺爲蘄州刺史頗著恩信甞歳終閱郡獄囚囚有自告者曰某有父母在明日元正不得相見因泣下元膺憫焉盡脫其械縱之以爲期守吏曰賊不可縱元膺曰吾以忠信待之及期無後到者由是羣盗感義相引而去又曰栁宗元爲栁州刺史土俗以男女質錢過期則没入宗元革其郷法其巳没者仍出私錢贖之歸其父母又曰王仲舒爲洪州刺史江南西道觀察使江西前例榷酒私釀法深仲舒主鎮奏罷之又出官錢二萬貫代貧户輸稅又曰令􅀌楚子緒以䕃授官歴隋壽汝三郡刺史在汝州日有能政郡人請立碑頌緒以弟綯在輔弼上言曰臣先父元和中特承恩顧弟陶官不因人出自宸􅂨臣伏睹詔書以臣刺壽州日粗立政勞民民求立碑頌㝷乞追罷臣任隋州日郡人乞留得上下考此名以聞於日下不必更立碑頌乞賜寢停宣宗嘉其意從之五代史梁書曰韓建爲潼􅀜防禦使兼華州刺史河潼經大冦之後户口流散建披荆􅁄闢汚萊勸課農事樹植􅂼果岀入閭里親問疾苦不數年流亡畢復軍民充實又曰王檀字衆美爲宻州刺史郡接淮戎舊無壁壘乃率丁夫修築羅城六旬而畢居民頼之又曰趙克􅁉河陽人也繼領毫鄭二州刺史時􅀜東藩鎮方爲蔡冦所毒􅀺元流散不能相保克􅁉妙有農戰之備復善於綏懷民頼而獲安五代史晉史曰相里今自羽林都虞候爲忻州刺史凡部曲私屬將吏不遣涖州邑之職皆優其給贍使分掌家事而巳其後累典大都皆有聲績又曰澤州奏前刺史史延韜離州爲軍民遮圍不放出城兼截下馬鐙其史延韜經三日後夜開城門赴闕又曰安元信歷數任皆名郡也親族謂曰公身俸二千石􅁂有白髮家無肥美田園何以爲子孫計元信曰吾夲無文經武略遭遇先帝風雲之㑹繼提郡印位在親人平生之望過矣毎以衣食豊足爲愧安有積貨治産欲爲豚犬輩後圖不亦愚乎聞者美之英雄記曰幽州刺史劉虞食不重餚藍縷繩屨華陽國志曰趙琰爲青州刺史有貴要屬託琰於㕔事前置大器水發書悉投置水中無有所報益部􅂄舊傳曰嚴遵字王思爲楊州刺史行部聞路旁女子􅂘聲不哀問所􅂘者誰對曰夫遭焼死遵勑吏輿尸到與語吏曰死人自道不焼死攝女令人守尸曰當有物徃吏曰有蠅聚頭所遵令披視得䥫錐貫頂栲問以􅁋殺夫㑹稽典録曰謝夷吾字尭卿山隂人爲荆州刺史遇孝章皇帝廵狩幸魯陽有詔勑夷吾入傳録見囚有亭長姧部民者縣言和姧上意以爲吏刼民何得言和湏􅁷夷吾呵之曰亭長朱幘之吏職在禁姧今爲惡之端何得言和切讓長吏治亭長罪其所決正一縣三百餘事與上合帝歎曰使諸州刺史悉如此者朕不憂天下矣遷鉅鹿太守臨發陛見賜車馬劒帶勑之曰鉅鹿劇郡舊爲難治以君有撥煩之才故特授任無毀前功祖逖别傳曰逖爲豫州刺史克巳矜施不畜資産䘮亂之餘白骨未収者爲之殯葬其有骨􅁏恩薄不収歛者皆加貶責由是百姓感化復覩太平置酒大㑹坐中􅂄老相與流涕而歎曰吾等投老更得父母死將何恨又童謡曰幸哉遺民免豺虎三辰旣㓪遇慈父玄酒清醪甘瓠脯亦何報恩歌且舞陶氏家傳曰基字叔先爲交州刺史始夷人不識禮義男女牙相奔隨生子乃不知父君乃敦以㛰姻之道訓以父子之恩道之以禮齊之以刑設庠序立學校合境化之莫不恱之語林曰何公爲楊州有葬親者乞數萬錢而帳下無有楊州常有糲米以賑􅀌寡乃有萬餘斛虞存爲治中面見道帳下空素求粲此米付帳下何公曰何次道義不與􅀌寡争粒酷刺史續漢書曰侯覽爲益州刺史豊冨者輙誣以大罪皆誅㓕之没入財物謝承後漢書曰第五倫上䟽襃稱盛美曰前􅀊誅刺史二千石貪殘者皆明聖所察非臣下所及晉書曰郄隆爲楊州刺史僚屬有過輙依臺閣峻制繩之逺近咸怨于寳晉記曰茍晞爲兖州刺史姨母寡有一子坐小事姨母向晞叩頭及中外皆乞活不聽死後徃哭之甚悲曰殺弟者兖州刺史􅂘卿者茍道將也後魏書曰于洛侯代人也以勞舊爲􅁗州刺史而貪酷安忍民王冨熾奪民吕勝脛無有紀極夜常不卧執燭逹暁呼召賔客􅀃人間細事戲謔無不爲性不飲酒唯多置餚胾晝夜食噉而巳自旦至中方始寢寐又曰齊以斛律武都爲兖州刺史塗經衛地受絹千疋􅀺陽郡守石曜手持一縑而謂之曰此是老石機杼聊以奉贈自此巳外並湏出於吏人武都知曜清素純儒􅀏而不責北史曰齊漁陽王紹信文襄第六子歷特進青州刺史行過漁陽與大冨人鍾長命同坐太守鄭道蓋來謁長命欲起紹信不聽曰此何物小人主人公爲􅁸乃與長命結爲義兄弟仍與長命妻爲姉妺責其闔家長㓜皆有贈賄鍾氏遂貧又曰齊安德王延宗爲定州刺史於樓上大便使人在下張口承以猪糝和人糞以飼左右有難色者鞭之隋書曰庫狄士文拜貝州刺史性清苦不受公料家無餘財子甞噉官厨餅士文枷之於獄累日杖之一百歩送還京僮􅈻無敢出門所買塩菜必於外境凡有出入皆封署其門親舊絶跡慶吊不通法令嚴肅吏人股戰道不拾遺有細過必深文䧟害又曰庫狄士文爲貝州刺史發摘姧隱長吏尺布斗粟之􅂍無所寛貸得千餘人而奏之上悉配防嶺南親戚相送􅂘泣之聲遍於州境至嶺南遇瘴癘死者十八九於是父母妻子唯􅂘士文士文聞之令人捕捉撾捶盈前而􅂘者弥甚又曰趙仲卿拜石州刺史法令嚴猛纎微之失無所容捨鞭笞長吏輙至二百官人戰慄無敢違犯者賊屏息皆稱其能唐書曰楊德幹髙宗末歷澤齊汴相四州刺史治有威名郡人爲之語曰寜食三斗䔉不逢楊德幹太平御覽卷第二百五十八
