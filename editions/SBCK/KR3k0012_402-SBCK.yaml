body:
  text: 人事部四十三叙賢周禮地官曰以賢制爵則民慎徳禮大學曰君子賢其賢而親其親詩􅁰離曰丘中有麻思賢也莊王不明賢人放逐國人思之而作是詩也丘中有麻彼留子嗟留大夫氏子嗟字也丘中麻麦子嗟所治箋云子嗟放逐於朝去治卑賤之識又曰白駒大夫刺宣王也刺其下能留賢者也皎皎白駒食我􅂣苗縶之維之以永今朝宣王之末不能用賢者有秉白駒而去箋云願去者乗其白駒來者食我場中之苗縶絆之欲留也書大禹謨曰野無遺賢萬􅀖咸寧又曰任賢勿貳去邪勿疑又說命曰爵罔及惡徳惟其賢又曰惟后非賢不乂惟賢非后不食又武成曰建官惟賢莅事惟能又旅􅋙曰所寳惟賢則邇人安易曰坤地卦天地變化草木蕃天地閉賢人隱又大畜曰不家食􅁻養賢也又頥曰天地養萬物聖人飬賢以及萬民又繫辭曰可乆則賢人之德可大則賢人之業論語里仁曰君子見賢思齊焉見不賢者而内自省也齊等也省察也察己得無然也又雍也曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂囬也不改其樂賢哉回也簞笥也貧者人之所憂而顔志道有所樂故深賢之又述而曰冉有曰伯夷叔齊何人也子曰古之賢人也又衛靈公曰臧文仲其竊位者歟知柳下惠之賢而不與立柳下惠魯士師展禽也其邑名柳下謚曰惠也又子張曰叔孫武孫毀仲尼子貢曰仲尼不可毀也他人之賢者丘陵也猶可踰也仲尼日月也無得而踰焉春秋䌓露曰氣之清者爲神人之精者爲賢治身以練神爲寳治國以積賢爲道大戴禮曰帝入西學上賢而貴徳樂動聲儀曰召公賢者也明不能與聖人分職常戰慄恐懼故舎於樹下而聽斷焉勞身苦體然後乃與聖人齊是周南無美而召南有之韓詩外傳曰魏文侯問狐卷子曰父賢足恃乎對曰不足子賢足恃乎對曰不足兄賢足恃乎對曰不足弟賢足恃乎對曰不足臣賢足恃乎對曰不足文侯勃然作色而怒曰寡人問此五者於子子一以爲不足者何也對曰父賢不過堯而丹朱放子賢不過舜而瞽瞍拘兄賢不過周公而管叔誅臣賢不若湯武而桀紂伐君欲治從身始人何恃國語曰智宣子將以瑶爲後宣子荀寅瑤宣子之子智伯也智果曰不如霄也智果荀氏之族也霄宣子庶子也宣子曰霄也佷佷戾不從人也對曰霄之佷在面瑶之佷在心心佷敗國面佷不害瑶之賢於人者有五其不逮者一美鬢長大則賢􅁂髪􅁂也射御足力則賢􅇊藝必給則賢巧文辯惠則賢強毅果敢則賢􅀂是而甚不仁以其五賢陵人而以不仁行之其誰能待之􅀂果立瑶也智宗必㓕弗聽智果别族于太史爲輔氏太史掌氏姓也及智氏之亡也唯輔果在又曰臼季使舎於兾野臼季胥臣兾野晉地見兾缺耨其妻饁之相敬如賔耨耘田也野饋日饁字音曄從而問之兾芮之子也與之歸旣復命進之曰臣得賢敢以告文公曰子何以知其賢對曰臣見其賢不忘敬也公使爲下軍大夫史記曰燕昭王於破燕之後即位卑身厚幣以招賢者謂郭隗曰齊因􅀌之國亂襲破燕􅀌極知燕小力少不足以報然得賢士與共國以雪先王之耻􅀌之願也先生視可者得身事之郭隗曰王必欲致士必從隗始况賢於隗者豈逺千里哉於是昭王爲隗改築宫而師事之又曰伯禽就封於魯周公戒伯禽曰我文王之子武王之弟成王之叔父我於天下亦不賤矣然我一沐三握髮一飯三起以侍士猶恐失天下之賢人子之魯慎無以國驕人又曰楚昭王聘夫子夫子徃焉路岀東蔡大夫謀曰夫子賢者所刺譏皆中諸侯之病􅀂用於楚則陳蔡危矣遂使兵拒之孔子不得行家語曰孔子謂宓子賤曰子治單父衆恱何施而得之對曰此地民有賢於不齊者不齊事之事而禀度焉皆教不齊以治道孔子歎曰昔堯舜聽天下務求賢以自輔夫賢人百福之宗神明之主也惜乎不齊之所治小也又曰子夏問於孔子曰顔回之爲人奚若子曰回之信賢於丘曰子貢之爲人奚若子曰賜之敏賢於丘曰子路之爲人奚若子曰由之勇賢於丘曰子張之爲人奚􅀂子曰師之莊賢於丘子夏避席而問曰然則四子耆何爲事先生子曰居吾語汝夫回能信而不能反反謂反信也君子言不必信唯義所在也賜能敏而不能詘詘人唯辯敏亦冝有折屈時也由能勇而不能怯師能莊而不能同言人雖務莊亦當有和同時也兼四子者之有以易吾吾弗與也此其所以事吾而不及也又曰孔子讀史至楚復陳夏徵舒殺其君楚莊王討之取陳而有之申叔時諌莊王莊王從之乃復陳國也喟然曰賢哉楚莊王輕千乗之國而重一言之信非申叔時之忠弗能建其義非莊王之賢弗能受其訓又曰所謂賢者徳不踰閑閑法行中䂓繩又曰哀公問於孔子曰當今之君孰者最賢孔子對曰亡未之見㧕有衛靈公乎公曰吾聞其閨門之内無別而子次之賢何也孔子對曰臣論其朝廷行事不論其私家之際也公曰其事何也孔子曰靈公之弟曰公子渠牟其智足以治千乗其信足以守之靈公愛而任之又有士曰王林者見賢必進之而退與分其禄是以衛國無遊放之才靈公知而尊之又有士曰慶足者國有大事則必起而治之國無事則退容賢言其所以退欲以容賢於朝靈公恱而敬之又有大夫史鰌以道去衛靈公郊舎三日琴瑟不御必待史鰌之入而後敢入臣以此取之難次之賢不亦可乎孔叢子曰魯人有公儀潜者厲節行道恬於榮利不事諸侯子思之與友穆公因子思欲以爲相謂子思曰公儀子必輔寡人寡人三分魯之一子思對曰如君之言則公儀愈所不至也若飢渇待賢納用其言儀雖􅂼食飲水亦願在下風今徒以髙官厚禄釣餌君子無信人之意公儀子則終身不躡乎君之庭矣且臣不任爲君操竿不釣以傷守節之士也又曰子思自齊反衛君館而問曰先生魯國之士不以衛􅄶小猶歩玉趾而慰存之願有賜於寡人子思曰覊旅於此而辱君之威尊亟臨蓽門其榮多矣欲報君以財弊則君府藏巳盈而伋又貧欲報君以善言恐未合君心而徒言不聽也願有報君者唯逹賢耳君曰固寡人所願也任子曰夫賢人者至徳以爲己心行道以爲巳任處則不求私名仕則不求私寵不爲其身不阿其君積禮義於朝播仁風於民使天下之人翼翼焉向戴其君之尊欣欣焉歌舞其君之徳文子曰山有猛獸林木爲之不斬野有螫蟲葵藿爲之不採國有賢臣折衝千里列子曰牛缺者上地之大儒也至邯鄲遇盗於耦沙之中盡取其衣裝車牛歩而去視之欣然無憂苦之色盗追而問其故曰君子不以所飬害其所養盗曰嘻賢矣旣而相謂曰彼之賢往見趙君使以我爲事必困我乃相與追而殺之孫卿子曰古之賢人賤爲布衣貧爲匹夫然而非禮不進非義不受莊子曰以財分人謂之賢尹文子曰尹文子見齊宣王王歎國寡賢尹文子曰使國悉賢孰處王下王曰國悉不肖可乎尹文子曰國悉不肖孰理王朝王曰賢與不肖皆無可乎尹文子曰不然有不肖故王尊於上臣卑於下進賢退不肖所以有上下也王孫子曰趙簡子獵於晉山之陽撫轡而歎董安于曰敢問何歎子曰吾有食榖之馬數千多力之士數百欲以獵獸也吾恐隣國養賢以獵吾也文子曰虎豹之駒未成而有食牛之氣鴻鵠之翼未合而有四海之心賢者之生亦然也又曰國之所以不治者三不知用賢此其一也或求賢不能得此其二也雖得弗能盡此其三也申子曰千里有賢者是比肩而立韓子曰晉平公問叔向曰吾群臣孰賢對曰趙武賢武之立如不勝衣言如不岀口然其所舉士者數十人皆令得其意而公家甚頼之况武子之生也不利其家死不託其􅀌臣敢以爲賢孟子曰國君進賢如不得巳將使卑踰尊踈踰戚可不慎歟左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之吕氏春秋曰伊尹出空桑之中長而賢湯聞伊尹使人請之有侁氏有侁氏不可伊尹亦欲歸湯湯於是請取妻於有侁氏有侁氏喜使伊尹爲媵送女故賢主之求有道之士無不以也有道之士求賢主無不行也相得然後樂不謀而親不約而信相為殫智竭力犯危行苦志懽樂之此功名所以大成也又曰百里奚之未遇時亡虢而虜飯牛於􅁗鬻以五羊之皮公孫枝得而恱之献諸繆公三日請屬事公曰賈之五羊之皮而屬事無乃爲天下􅀏乎枝曰信賢而任之君之明也議賢而下之臣之忠也君爲明君臣爲忠臣彼爲信賢境内將服敵國且畏夫誰暇􅀏哉遂用之謀無不當舉必有功號曰五羖大夫又曰史台謂申向曰吾所患者不知賢申向曰人之患不在乎不言用賢而在乎不誠用賢夫言用賢者口也􅁍賢者行也言行相反而欲賢者用不肖者廢不亦難乎人主誠用賢則境内賢者岀矣天下賢者至矣又曰得十良馬不如得一伯樂得十良劒不如得一歐冶得地千里不如得一賢人又曰魏文侯過段干木之閭而軾其僕曰君胡爲軾曰此非段干木之閭歟干木蓋賢者也吾安敢不軾又曰趙簡子將襲衛使史墨行瞶之瞶視也音貴期以一月六月而反復簡子曰何其乆也對曰謀利而得害猶弗察也蘧伯玉爲相史鰌佐焉孔子爲客子貢使令於君前甚聽君聽其言易曰渙其羣元􅁻渙者賢也羣者衆也元者􅁻之始也渙其羣元􅁻者其佐多賢簡子案兵而不動周書隂符曰凢治國有三常一曰君以舉賢爲常二曰官以任賢爲常三曰士以敬賢爲常夫然雖百代可知也京房易飛候曰何以知賢人隱師曰視四方有大雲五色具而不雨下賢人隱也易叅同契曰天道無適莫常傳與賢者黃石公三略曰傷賢者殃及三世蔽賢者身當􅇜害逹賢者福流子孫嫉賢者其名不令陸賈新語曰聖人居髙處上則以仁義爲巢乗危履傾則以聖賢爲杖􅀃苑曰周公卜居曲阜命􅀛曰作邑于山之陽賢則茂昌不賢則速亡又曰夫朝無賢人猶鴻鵠之無羽翼是故絶江海者託於舡致逺道者託於乗欲覇王者託於賢又曰明君在上慎於擇士務於求賢設四佐以自輔有英俊以治官又曰伯禽與康叔封朝成王見周公三見而三笞康叔駭色謂伯禽曰有啇子者賢人也與子往見之康叔與伯禽見啇子曰吾二子者朝乎成王見周公三見而三笞其􅀃何也啇子曰二子蓋相與觀南山之陽有木焉名曰橋二子者往觀乎南山之陽見橋竦然實髙而仰反以告啇子啇子曰仰者父道也啇子曰二子蓋相與觀乎南山之隂有木焉名曰梓二子者往觀乎南山之隂見梓勃焉實而俯反以告啇子啇子曰俯者子道也二子者明日見乎周公入門而趍登堂而跪周公拂其首勞而食之曰安見君子二子對曰見啇子周公曰君子哉啇子也又曰孔子之郯遭程子於塗傾蓋而語終日有間顧謂子路曰取束帛以贈先生子路不對有間又顧謂曰取束帛以贈先生子路屑然對曰由聞之也士不中間而見女無媒而嫁君子不行也孔子曰詩不云乎野有蔓草零露團兮有美一人清陽婉兮邂逅相遇適我願兮今程子天下之賢士於是不贈終身弗見也中間謂紹介也六韜曰文王舉賢若何太公曰案察實選才任能名實俱得也物理論曰在金石曰堅在草木曰緊在人曰賢千里一賢謂之比肩故語曰黄金累千不如一賢杜氏幽求曰周封千里而巳八州之地皆以禄賢抱朴子曰桓文漢髙鼔群賢以爲六翮託豪傑以爲舟檝􅀓子曰或問近世大賢君子􅀂荀令君之仁荀軍師之智斯可謂近世大賢人士君子矣荀令君仁以立徳明以舉賢行無謟瀆謀能應機孟軻稱五百年而有王者其間必有命世者其荀令君乎桓譚新論曰以賢代賢謂之順以不肖代不肖謂之亂論衡曰賢聖之君察知侫臣若視爼上之脯指掌中之文風俗通曰賢堅也堅中廉外白虎通曰王者即位先封賢者憂民之急也故列土爲疆非爲諸侯張官設府非爲卿大夫皆爲民也越絶書曰子胥正而信范蠡智而明皆賢人也潜夫論曰南面之大務莫急於知賢異苑曰汝南陳仲躬與諸息姪就潁川荀季和父子于時徳星爲之聚太史奏曰五百里内有賢人集列女傳曰衛靈公與夫人夜坐聞車聲轔轔至闕而止過闕復有聲公問曰知此爲誰夫人曰此必蘧伯玉也問何以知之曰妾聞禮下公門式路馬所以廣敬也夫忠臣不爲昭昭信節不爲􅁳􅁳墯行今伯玉衛國賢大夫也仁而有智敬於事上此其人必不以闇昧廢禮是以知之公使視之果伯玉也反戯之曰非也夫人進觴再拜賀之公曰子何以賀曰始妾謂獨有伯玉今衛復有與之齊者是君有二賢臣也國多賢臣則國之福也西京雜記曰漢文帝爲太子立思賢菀以招賔客周斐汝南先賢傳曰黃憲㓗静通理齊聖廣淵不矜名以詭時不抗行以矯俗論者咸曰顔子復生乎漢之代矣語林曰賢者國之紀人之望自古帝王皆以之安危故書曰惟后非賢不乂惟賢非后不食昔者周公體大聖之德而勤於吐握由是天下之士爭歸之向使周公驕而且􅈔士亦當高翔逺去所至寡矣王襃聖主得賢臣頌曰夫賢者國家之器用也君人者勤於求賢而逸於得人故聖主必待賢臣而弘功業俊士亦候明主以顯其德千載一㑹論􅀃無疑翼乎如鴻毛之遇順風沛乎􅀂巨魚之縱大壑其意如此則胡禁不止􅂚令不行鍾子蒭蕘論曰賢者之處世猶金玉生於沙礫䂊章産乎幽谷下不進之於上則無由而至矣太平御覧卷第四百二
