front:
  text: 太平御覽卷第八百三十
  hash: sha256:d9ed318df7982c5d86754c1af3a82b37b5dbf3e497340b562325d4fea1fdd487
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_830-1a}
body:
  text: 資産部十尺寸量秤剪刀衣軸管針醫針附鐟縫尺寸禮記王制曰古者以周尺八尺爲歩今以周尺六尺四寸爲歩古者百􅅿當今東田百四十六􅅿三十歩古者百里當今百二十一里六十歩四尺二寸二分周尺之數未詳聞也案禮制周猶以十寸爲尺蓋六國時多變亂法度或言周尺八寸則歩更爲八八六十四寸以此計之古者百􅅿當今百五十六畒二十五歩古者百里當今百二十五里漢書曰度者分寸尺丈引也所以度長短也度音大各反本起黄鍾之長以子榖秬􅁰中者師古曰秬即黒􅁰中者不大不小也言取黑黍穀子大小中者率爲分寸也一黍之廣度之九十分黄鍾之長一爲一分十分爲古尺一具隋書曰丗稱有田父於野地中得周時玉尺便是天下正尺荀朂試以校尺所造金石絲竹皆短校一米管子曰尺寸㝷丈者所以得短長之情也故以尺寸量短長則萬舉而萬不失矣是故尺寸之度雖冨貴衆強不爲益長雖卑辱貧賤則弗爲損度公平而無所偏故姧詐之人弗能誤也故明法者不可巧以詐僞有㝷丈之數者不可欺以長短又曰以規矩爲方圎則成以尺寸量短長則得以法數治民則安故事廣於理者其成􅀂神孟子曰陳代謂孟子云枉尺直㝷􅀂冝可爲枉尺直㝷欲使孟子屈巳宗道也尸子云孔子曰詘寸而信尺小枉而大直吾爲之者也韓子曰釋法術而心治堯不能正一國去規矩而妄意度奚仲不能成輪廢尺寸而差短長王爾不能半中使中主守法術拙匠執規矩尺寸則萬不失孔叢子曰跬一舉足也倍跬謂之歩四尺謂之仞倍仞謂之㝷㝷舒兩肱也倍㝷謂之常五尺謂之墨倍墨謂之丈倍丈謂之端端謂之兩倍兩謂之疋兩有五謂之束家語曰孔子曰夫布指知寸布寸知尺舒肱知㝷舒身知常斯不逺之則也白虎通同􅀃苑曰度量衡以粟生之十粟爲一分十分爲一寸十寸爲一尺十尺爲一丈夣書曰丈尺爲人正長短夣得丈尺欲正人也魏武上雜䟽曰中宫用物􅄂􅀞象列尺一枚貴人公主有象牙尺三十枚宫人有象牙尺百五十枚骨尺五十枚量周禮冬官考工記曰㮚氏爲量改煎金錫則不耗消涷之精不復減也㮚古文或作歴􅀇謂量當與鍾鼎同齊工異者大器不耗然後權之權謂稱分之也雖異法用金必齊權之然後凖之凖故書或作水杜子春云當爲水金噐有孔者水入孔中則當重也玄謂凖擊平王之又當齊大小凖之然後量之鑄之於法中也量讀如量人之量量之以爲鬴􅀷尺内方尺而圜其外其實一鬴以其容爲之名也四升曰豆四豆曰區四區曰鬴鬴六斗四升也鬴十則鍾方尺積千寸於今粟米法少二升八十一分升之二十二其數必容鬴此言大方耳圜其外者爲之脣其臋一寸其實一豆故書臋作脣杜子春云當爲臋謂覆之其底􅀷一寸也其耳三寸其實一升耳在旁可舉也重一鈞重三十斤其聲中黄鍾之宫應律之首槩而不稅鄭司農云令百姓得以量而不租稅其銘曰時文思索允臻其極銘刻之也時是也允信也臻至也極中也言是文徳之君思求可以爲民立法者而作此量信至於道之中矣嘉量旣成以觀四國以觀示四方使放象之永啓厥後兹器維則左傳昭公三年云晏子曰齊舊四量豆區釡鍾四升爲豆各自其四以登於釡四豆爲區區斗六升四區爲釡釡六斗四升登成也釡十則鍾六斛四斗陳氏三量皆登一焉鍾乃大矣登加也一謂加舊量之一也以五升爲豆五豆爲區五區爲釡則區二斗釡八斗鍾八斛以家量貸而以公量収之貸厚而収薄漢書曰量者龠合升斗斛也所以量多少也本起於黄鍾之龠用度數審其容師古曰因度以生量也其容謂其中所容受之多少也以子穀秬黍中者千有二百實其龠以井水凖其槩槩欲其直故以水平之井水清清則平也師古曰槩所以槩平斗斛之上者也十龠爲合十合爲升十升爲斗十斗爲斛而五量嘉矣其法用銅方尺而圎其外旁有焉師古曰不滿之處也音吐彫反其上爲斛其下爲斗其上謂仰斛也其下謂覆斛之厎受一斗也左耳爲升右耳爲合龠其狀似爵以縻爵禄縻散也上三下二叄天兩地圜而函方左一右二隂陽之象也其圜象規其重二鈞備氣物之數合萬有一千五百二十三十斤爲鈞萬一千五百風俗通曰斛者角也􅁃三斛四斗秉二十四斛秤廣雅曰秤謂之衡錘謂之􅁠􅀃文曰秤銓也禮記曰令仲春曰是月也日夜分則同度量平􅁠衡因春分晝夜平則正之同亦平也丈尺曰度斗斛曰量稱錘曰􅁠稱上曰衡又經解曰禮之於正國也猶衡之於輕重也繩墨之於曲直也規矩之於方圜也故衡誠縣不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圜漢書曰衡􅁠者衡平也􅁠重也衡所以任􅁠而鈞物平輕重也其道如厎厎平也謂以厎石厲物令平齊也厎音指以見凖之正繩之直左旋見規右折見矩其在天也佐助璇機斟酌建指以齊七政故曰玉衡論語云立則見其參於前也孟康曰􅁠衡量三䓁爲參也四百八十兩者六旬行八節之象也孟康曰六甲爲六旬一歳有八節六甲周行成歳以六乗八節得之也三十斤成鈞者一月之象也石者大也權之大者也始於銖两明於斤均於鈞終於石物終石大也四鈞爲石者四時之象也重百二十斤者十二月之象也終於十二辰而復於子黄鍾之象也孟康曰稱之數始於銖終於石石重百二十斤象十二月銖之重本􅂑於子律黄鍾一􅕛容千二百􅁰爲十二銖故曰復於子黄鍾之象也千九百二十两者陰陽之數也三百八十四爻五行之象也四萬六千八十銖者萬五千五百二十物歴四時之象也而歳功成就五權謹矣魏志曰鄧哀王冲字倉舒少聦察歧嶷生五六歳智意所及有􅀂成人孫權曽致巨象太祖欲知其斤重訪之羣下咸莫能岀其理冲曰置象大舡之上而尅其水所至稱物以載之則立可知矣太祖大恱即施行焉呉志曰薛綜上䟽云九眞㑹稽朱符多以郷入虞裒劉彦之徒作長吏侵虐百姓強賦於民黄魚一枚収稻一稱唐書曰安禄山晚年益肥垂肚過􅂰自秤得三百五十斤毎朝見􅀇宗戲之曰朕􅃴見卿肚幾垂至地管子曰權衡者所以起輕重之數也然而人不事者非心惡利也權不能爲之多少其數而衡不能爲之輕重其量也知事權衡之無益故不事也又曰有權衡之稱者不可欺以輕重有㝷丈之數者不可差以長短又曰四㑹諸侯令曰修道路偕度量一稱數偕同也稱斤两也數多少也莊子曰聖人不死大盗不止爲權衡以稱之則并與權衡而竊之雖有軒冕之賞弗能勸斧􅃏之威不能禁掊斗折衡而民不爭也愼子曰厝鈞石使禹察錙銖之重則不識也縣於權衡則􅈊髪之微識矣及其識之於權衡則不待禹之智中人之知莫不足以識之矣愼子曰君臣之間猶權衡也權左橛則右重右重則左橛輕重迭相柝天地之理也孔叢子曰二十四銖曰两两有半曰揵倍揵曰舉倍舉曰鏘鏘謂之鍰二鍰四兩謂之斤斤十二謂之衡衡有半謂之倍稱謂之鈞鈞四謂之石石四謂之鼔然則鼔四百八十斤也韓子曰人之不事衡石者非貞廉而逺利也石不能爲人多少衡不能爲人輕重求索不得故人不事也明主之國官不敢枉法吏不敢爲私利貨賂不行是境内之事盡如衡石也􅀃􅁐曰度量衡以十粟生之十粟重一豆六豆重一銖二十四銖重一兩十六兩重一斤三十斤重一鈞四鈞重一石語林曰孟業爲幽州其人甚肥或以爲千斤武帝欲秤之難其大臣乃作大秤挂壁業入見帝曰朕欲試自秤有幾斤業荅曰陛下正是欲稱臣耳無煩復勞聖躬於是遂秤業果得千斤夣書曰銓衡爲人正也夣得衡爲平端也以銓稱量平財錢也重者價貴輕者賤也銓衡折敗無平人也李尤權衡銘曰夫審輕重莫􅀂權衡正是非其唯賢明剪刀爾雅釋言曰劑剪齊也郭璞注曰南方人呼剪刀爲劑刀釋名曰剪刀剪進也所剪稍進前也齊書曰范雲幸於竟陵王子良江祐求雲女婚姻因酣以巾箱中剪刀與雲曰且以爲娉雲􅀏受之至是祐貴雲又因酣曰昔與將軍俱爲黄鵠今將軍化爲鳯皇荆布之室理隔華盛因出剪刀還之南史曰沙門寳誌不知何許人齊宋之交稍顯靈迹􅀍髪徒跣語黙不倫恒以銅鏡剪刀鑷屬挂杖負之而趍預言未兆識之多驗脩復山陵故事曰后梓宫用剪刀六枚東宫舊事曰太子納妃有龍頭金縷交刀四銀牙鏁綵帶副丗􅀃曰爰綜爲新安太守郡南界有刻石爰至其下醼飲忽有人得剪刀於石下者衆咸異之綜問主簿主簿對曰昔呉長沙桓王嘗飲餞孫洲父老云此洲狹而長君當爲長沙乎事果應夫三刀爲州得交刀君亦當交州後果交州幽明録同衣軸丗􅀃曰張華將敗有飄風吹衣軸六七􅀝壁管禮記内則曰鍼管線纊荀卿針縷賦曰管以爲母魏武上雜物䟽曰中宫雜物雜􅀞象牙鍼管一枚針􅀃文曰針綴衣也禮記内則曰舅姑衣裳綻裂紐針請􅀘綴左傳成公上曰楚伐魯賂以執針百人女工呉書曰虞翻年十二客詣翻兄不過之乃與客書曰虎魄不受腐芥慈石不受曲針王隱晉書曰東宫舊制月請五十万以供衆用愍懐太子桓􅊥取三月以供賤妾舎人杜錫數諌太子後取針着錫常坐處氊中錫上床刺足血流晋書曰鳩摩羅什嘗講經于草堂寺姚興及朝臣大德沙門千餘人肅然觀聽什忽下髙坐謂興曰有二小兒登吾肩慾障湏婦人興乃召宫女進入一交而生二子焉興甞謂什曰天師聦明超悟天下莫二何使法種無嗣遂以妓女十人逼令受之尓後不住僧坊別立廨舎諸僧名多効之什乃聚針􅄹鉢引諸僧謂之曰􅀂能見効食此者乃可畜室尔因舉匕進針與常食不別諸僧愧服乃止又曰頋愷之常恱一隣女挑之弗從乃圖其形於壁以􅁄針釘其心女遂患心痛愷之因致其情女從之遂宻去針而愈宋書曰傳琰爲山隂令賣針賣糖老姥爭􅇛絲來詣琰琰樹􅇛絲於柱鞭之宻視有鐵屑乃罰賣糖者南史曰齊王奐爲雍州刺史加都督與寧蠻長史劉興祖不睦十一年奐遣軍主朱公息征蠻失利興祖欲以啓聞奐大怒収付獄興祖於獄以針畫漆合盤爲書報家稱枉令啓聞而奐亦馳信啓上誣興祖扇動荒蠻上知其枉勑送興祖還都後魏書曰胡太后臨朝常幸西林園命侍臣射不能者罰之又自射針中之大恱呉楚春秋曰勾踐與妻入臣呉妻奉針縷北靣爲妾管子曰女必有一刀一針然後成爲女淮南子曰先鍼而後縷可以成帷先縷而後鍼不可以成衣針成幕蕢成城幕帷也縷非針无以通故宜先蕢土籠也始於一蕢以成其城也淮南萬畢術曰首澤浮針取頭中垢􅂗針塞其孔水中則浮針抱朴子曰殫鳥則千金不及丸􅅺縫緝則長劒不及數分之針又曰結巾投地而莬走鍼綴丹帶而蛇行西京雜記曰漢綵女常以七月七日夜穿七針於開􅁭樓俱以習之􅀃苑曰客因孟嘗君􅀉於齊王而不用客反見孟嘗君曰不知君之過臣之罪孟甞君曰夫縷因針而入不因針而急典論曰劉表子弟好酒設大針於坐端有醉伏者輙刺驗其醉醒王子年拾遺記曰魏文帝美人薛夜來妙於針巧雖處於􅀷帷重幕之内不用燈燭裁衣製作六成非夜來所縫製帝不服也宫内號曰針神諸􅁑元遜傳曰昔元遜對南陽韓文晃誤呼其父字晃難之曰何人子前呼人父字是禮乎諸􅁑􅀏荅曰向天穿針而不見天何者不輕天意有所在耳即罰文晃酒一盃王郎新奏議曰至於遺針御衣懼傷至尊之體故加之以髠刑將欲懲戒先傷以防絶後傷輿地志曰齊武起曽城觀七月七夕宫人登之穿針丗謂之穿針樓劉義恭啓事曰聖恩賜金銀針七色縷并格一犀棟刷匣副綿布兆珎服寳翫以恊嘉辰孫卿針賦曰有物於此生於山阜處於堂室不盗不􅀼穿窬而行日夜合離以成文章以能合從又善連横下覆百姓上飾帝王時用則存不用則亡臣愚弗識敢請之王曹大家針賦曰鎔秋金之剛精形微妙而直端性通逹而漸進􅀶庶物而一貫醫針附魏志曰樊何從華他學何善針凡醫咸言背及胷藏之間不可妄針何針背入一二寸巨闕入五六寸疾輒瘳三輔舊事曰江充爲桐人長尺以針刺其腹埋太子宫中充曉醫術因言其事燉煌實録曰張存喜針存有奴好逃亡存􅀫行針縮奴脚欲使則針解之王渾表曰臣有氣病善夜發服半夏湯或服湯不解尚取針前殿中醫趙恭思纂見給事醫在醫署纂能針有方伎乞以纂名課稱考課醫給臣自療治梁書曰王僧孺多識古事侍郎金元起欲注素問訪以砭石僧孺荅曰古人當以石爲針必不用鐵􅀃文有此砭字許愼云以石刺病也東山經髙氏之山多針石郭璞云可以爲砭針春秋美􅐄不如惡石服子愼注云石砭石也季丗無復佳石故以鐵代之􅁘唐書曰貞觀中太宗幸甄權宅權頴川人醫術爲天下㝡孫思邈師之以授針法時年一百三歳唐書曰太宗征髙麗江夏王道宗在陣損足上親為之針鐟說文曰鐟可以綴署物者也韻集鐟綴衣細竹也晉東宫舊事曰太子納妃金鐟二枚縫􅀃文曰縫線也縷線也周禮春官下曰縫人掌王宫縫線之事以役女御縫王及后之衣服淮南子曰􅁗代天下婦不得剡麻考縷抱朴子曰髙巖將霣非細縷所綴龍門沸騰非掬壤所遏而京雜記曰賈佩蘭云在宫時七月七日臨百子池作于闐樂樂畢以五色縷相羈謂爲連愛鄴中記曰北方五月五日自作飲食祠神乃作五色縷花相遺不爲介子推離騷大招曰􅁗齊縷鄭線絡鄭氏婚禮謂文讃曰長命之縷女工所制縫君子裳髙松爲例太平御覽卷第八百三十
