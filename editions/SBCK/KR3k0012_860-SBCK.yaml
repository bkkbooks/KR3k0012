  text: 太平御覽卷第八百六十
  hash: sha256:56ff41d0141f0193367d6ae80c43694e8106d14bd4790d3201050a8592a808a6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_860-1a}
body:
  text: 飲食部十八餅糗糒餌粢不籹上巨下汝寒具餅釋名曰餅并也溲麥使合并也胡餅作之大漫汗亦言以胡麻着上也蒸餅湯餅體餅之属皆隨形而名之也漢書曰宣帝微時毎買餅所從買家輙大售亦以自怪續漢書曰靈帝好胡餅京師皆食胡餅後董卓擁胡兵破京師之應東觀漢記曰光武問弟五倫曰聞卿爲市􅁺人有遺卿母一笥餅卿從外來見之奪母飼􅊥口中餅岀有之乎倫對曰實無此衆人以臣愚蔽故爲出此言耳英雄記曰李叔節與弟進先共在乗氏城中吕布詣乗氏城下叔節從城中岀詣布進先不肯出爲叔節殺數頭肥牛提數十石酒作萬枚胡餅先持勞客魏志曰漢末趙歧避難逃之河間不知姓字又轉詣北海着絮巾袴常於市中販胡餅孫賔碩時年二十餘乗犢車將􅀐入市觀見歧疑其非常人也因問之自有餅耶歧曰販之賔碩曰買幾錢賣幾錢歧曰買三十賣亦三十賔碩曰視處士之望非買餅者殆有故乃開車後户頋所將兩􅀐令下馬扶上之時歧以爲是唐氏耳目也甚怖面失色賔碩閇後户下前䄡謂之曰視處士􅃺皃旣非販餅者如今面色變動即不有重怨則當亡命我北海孫賔碩闔門百口又有百歳老母在堂勢能相度者也終不相􅀒必語我以實歧乃具告之賔碩遂載歧以駈歸又曰嚴翰字公仲學問特善春秋公羊司􅊢鍾繇不好公羊而奸左氏謂左氏爲太官而謂公羊爲賣餅家又曰盧毓爲吏部尚書時舉中書郎昭曰得其人與不在盧生耳選舉莫取有名名如􅀞地作餅不可啖也魏畧曰丁斐封列侯坐免官後太祖啁曰斐文侯印綬何在斐對曰以易餅太祖大􅀏晉書曰何曽性奢豪務在華侈幃帳車服窮極綺麗厨膳滋味過於王者毎燕見不食太官所設帝輙命取其食蒸􅾔上不坼作十字不食王隠晉書曰王長文州辟別駕陽狂不詣舉州追求乃於成都市見蹲地嚙胡餅又曰王羲之㓜有風操郗虞卿聞王氏諸子皆後令使選壻諸子皆飾容以待客羲之獨坦腹東床囓胡餅神色自􅀂使具以告虞卿曰此真吾子壻也問爲誰果是逸少乃妻之晉陽秋曰惠帝崩由食餅也又曰王􅂬躭學貧窭或人惠蒸餅一軸以充一日妻子常有菜色宋書曰王恱之爲吏部郎隣省有㑹同者遺恱之餅一甌辭不受曰此費誠小然少來不願當之蕭子顯齊書曰永明九年正月詔太廟四時􅀕薦宣皇帝􅋗起餅又曰何戢爲司徒左長史太祖爲領軍與戢來徃數置􅂬宴上好水引餅戢令婦女躬自執事以設上焉梁書曰武帝甞設大臣䴵蔡樽在坐帝頻呼其姓名樽竟不荅食餅如故帝覺其􅀒氣乃改喚蔡尚書樽始放筯執笏曰唯帝曰卿向聾今何聦對曰臣預爲右武且職在納言陛下不應以名垂喚帝有慙色也趙録曰石勒諱胡胡物皆改名胡餅曰􅅮鑪石虎改曰麻餅又曰石虎好食蒸餅常以乾􅀥胡桃瓤爲心蒸之使坼裂方食及爲冉閔所􅆲幽廢思其不裂者不可得後魏書曰胡􅅱不治産業常苦飢貧能不以爲耻養子字螟蛉以自結常作布囊容三四斛飲噉醉飽便盛􅁏餅以付螟蛉見車馬榮華者視之蔑如也北齊書曰庫狄連冬至日親表稱賀其妻爲設豆餅連問此豆餅何處得來妻對曰於食中减連大怒後周書曰樊􅀷以父遇宫因避難墜崖傷足絶食再􅀫後遇得一簞餅飲食之然念繼母年老患痺咸免虜掠乃弗食夜中匍匐尋覔母過得相見因以饋母還復遁去改易姓名遊學於汾晉之間唐書曰僧万廻閿郷人也恢諧以狂發言屢中其兄戍邊五載母思之万廻年㓜請詣兄所䇿竹馬去經歸而返白母曰兄還矣請辦餅更徃迎之數日持襆而至母發襆乃戌子衣也尋而子至母大驚范子曰餅岀三輔墨子曰魯陽文君云有人於此牧羊芻豢不可勝食也見人作餅即還然竊之楚四境之田蕪廣不可勝闢見宋鄭之門邑則還然竊之與彼異乎枹朴子曰莽之丗賣餅小人皆得等級斗筲之徒兼金累紫楊子雲確然忠貞之節形矣三輔舊事曰太上皇不樂關中髙祖徙豐沛屠兒沽酒賣餅啇人立爲新豐縣故一縣多小人李固別傳曰質帝􅁀得疾云食煑餅腹中悶遂崩蔡質漢官儀曰尚書郎直太官供餅餌五熟玄晏春秋曰衛倫過予而讌論及於味倫稱侍中劉子楊食餅知塩生精味之至也予曰昔師曠識勞薪易牙別淄渑子楊之妙抑末乎倫曰晉曠齊牙古之精也魏之子楊今之妙也子何間焉語林曰何平叔面絶白魏文帝疑其着粉正夏月喚來與􅀬湯餅大汗出隨以朱衣自拭色轉皎然幽明録曰姚泓叔父大將軍紹揔司戎政召胡僧問以休咎僧乃以麺爲大胡餅形徑一丈僧坐其上先食正西次食正北次食正南所餘卷而吞之訖便起去了無所言是歳五月楊盛大破姚軍於清水九月晉師北討掃定熲洛明年遂席卷鄷鎬生禽泓焉􅁑洪神仙傳曰壷公者從逺方來賣藥常懸一壷干坐上每日入後跳入壷中市􅁺費長房於樓上見之知非常也身爲掃除并進餅公令長房共跳入壷但見樓觀五色重門閣道侍者數十人京兆舊事曰蕭彪爲巴郡守父老歸供養父􅄝餅從至市立車下自進之廷尉決事曰廷尉上士張柱私賣餅爲蘭臺令史所見方言曰餅謂之飩徒昆切或謂之餦音張或謂之餛音渾􅀃文曰餅麺餈也雜五行書曰十月亥日食餅令人無病食經有髓餅法以髓脂合和麺崔寔四民月令曰五月距立秋無食煑餅及水溲餅夏月飲水時此二餅得水即冷堅不消不幸便爲食作傷寒矣以餅置水中則㵕唯酒溲之入則闌也王郎上劉纂等樗蒲曰左中郎樂林得纂麺􅁏共啖湯䴵繆襲􅀕儀曰夏祀以蒸餅盧諶􅀕法曰四時祠用㬅頭餲餅體牢九夏祠別用乳餅冬祠用白環餅荀氏四時列饌注日夏祠以薄液代㬅頭徐暢􅀕記曰舊五月麥熟薦新麥作起漱白餅明皇雜録曰武惠妃生日上與諸公主按舞於萬歳樓下上乗歩輦從􅃨道窺見衛士食畢以餅餌弃水竇中上大怒命髙力士杖殺之上方震怒左右莫敢言者寕王從容謂上曰從􅃨道窺見獲衛士之過而殺之恐人臣不能自安又失大體陛下志在勤儉愛物惡弃於地柰何性命至重重於殘飱者乎上蹶然大悟遽命赦之荆楚歳時記曰六月伏日並作湯餅名爲辟惡時鏡新書曰四月八日長沙市肆之人無子者供寺閣下羊􅁏薄餅結願以乞兒徃徃有驗束晳餅賦曰禮仲春之月天子食麥而朝事之籩煑麥爲麺内則諸饌不􅀃餅然則雖云食麥而未有䴵䴵之作也其來近矣􅀂夫安乾粔籹之倫糺耳狗后之屬釰帶案成餢飳髓燭或名生於里巷或法岀乎殊俗三春之􅀄隂陽交際寒氣旣消温不至􅀬于時享宴則㬅頭冝設呉囬司方純陽布暢服飾飲氷隨隂而凉此時爲餅莫􅀂薄壯啇風旣厲太火西移鳥獸氄毛樹木䟽枝肴饌尚温則起溲可施玄冬猛寒清晨之㑹涕凍􅈹中霜成口外充虚解戰湯餅爲最尓乃重羅之麮丘與切塵飛雪白膠黏䵑䈥䐧溔柔澤􅁏則羊膀豕脅脂膚相半臠􅀂縄首珠連礫散薑株葱本莑音封縷切判剉末椒蘭是灑是和塩漉䜴􅄃合樛亂於是火盛湯涌猛氣蒸作攘衣服振掌握搦俯摶􅋗弥離於指端手縈囬而交錯紛紛馺馺星分雹落籠無逆􅁏餅無流􅋗妹媮咧敕薄而不綻巂巂和和䑋色外見柔如春綿白􅀂秋練氣㪍鬰以􅀭布香飛散而逺遍行人失涎於下風童僕空爵而斜盻擎器者砥脣立侍者千咽􅈛乃換増濯以玄醢鈔以象著要虎丈叩􅂰遍據槃案財投而輙盡庖人叅潭而促遽手未及換増禮復至脣齒旣調口習咽利三籠之後轉更有次􅁃闡惡餅賦序曰范子常者造余􅀫曤鷄爲餅遟御之情甚虚竒嘉之味不實聊作惡餅賦以釋之弘君舉倉檄曰催厨人作茶䴵􅆈油煎葱例茶以絹當用輕羽拂取飛􅋗剛軟中適然後水引細如委綖白如秋練羮杯半在財得一咽十杯之後顔解體潤梁呉均餅􅀃曰宋公至長安得姚泓時故太官承程季者了了人也公曰今日之食何者最先季曰仲秋御景離蟬欲静變變曉風淒淒夜冷臣當此時唯能􅀃䴵公曰善季乃稱曰安定噎鳩之麥雒陽董德之磨河東長􅀂之葱隴西䑛背之牘枹音夫罕赤恥之羊張掖北門之䜴燃以銀屑煎以銀銚洞庭􅀒霜之橘􅄷池車帶之椒調以濟北之塩剉以新豊之雞細如華山玉屑白如梁甫銀渥旣聞香而口悶亦見色而心迷公曰善糗糒書曰峙乃糗粮亡敢弗逐峙具糗熬稻也儀禮曰四籩􅀥糗粟脯左傳曰陳轅頗賦公田嫁公女以爲巳大夫公逐之岀奔鄭道得其族轅咺進稻醴梁糗腵脯焉曰何其給也曰六成而具公羊曰公出奔齊國子執壷漿曰敢致糗從者公稽首以祍受􅀃文曰糒平祕切乾食也糗熬米也乆切釋名曰糗齲也飯而磨散之使齲碎也餱侯也候人飢者以飡之漢書曰李陵擊匈奴兵敗令軍士人持二􅂛糒一片氷相待東􅀚漢記曰嚴尤擊江賊世祖奉糗一斛脯三十朐又曰隗囂且病餓岀城飡糗糒腹張悉憤而死也又曰張禹廵行守舎止大樹下食糒乾飯屑飲水而巳後年貧人來歸者千餘戸又曰賀􅀇字文弘爲九江太守行縣齎持乾糒但就温湯而巳謝承後漢書曰沈景爲河間相􅁪食乾糒後漢書曰趙孝兄禮爲餓賊所得孝聞之即自􅅞詣賊曰禮乆餓羸瘦不如孝肥飽賊大驚並放之謂曰可且歸更持米糒來孝求不能得復徃報賊願就烹衆異之遂不害郷黨服其義魏略曰寒貧者夲姓石後還長安車􅀐將軍郭淮以意氣呼之問其所欲亦不肯言淮因與脯糒及衣財取脯一朐糒一升而止唐書曰黄巢將逼三輔僖宗出幸途無供頓衛軍不得食張濬謂漢隂令李康曰公可爲糗餌以供行在康乃鳩集騾乗分道進饔糗列女傳曰勾踐伐呉有獻一囊糒者王以賜軍士甘不踰嗌而戰自十倍孟子曰舜之飯糗茹草也􅀂將終身焉玄晏春秋曰衛倫過予而讌論及於味命僕取糗以進予予甞之曰吾知之矣麥其主者也有李柰杏味三果不同予焉得兼之倫曰吾之將來家實多故杏時將發故糅之以杏汁李柰時發又糅之以李柰汁故有三果之味也物理論曰吕子義清賢之士也思之冝徃存省懷乾糒而徃主人盛爲饌食乃出懷中糒求冷水一杯而食之楚辭九章曰播江離與滋菊兮願春日以爲糗芳崔寔四民月令曰四月可作􅀥糒餌粢周禮曰羞籩之實糗餌粉粢鄭玄日二物皆粉稻稻米黍米所爲也合蒸日餌餅之日餈糗者擣粉􅆈文豆爲餌餈之䊀着以粉之也餌言糗餈言粉牙相明也廣雅曰鐸䭣餌也方言曰餌謂之䭐音恙或謂之粢或謂之音鈴或謂之餣烏業切或謂之䬧音原􅀃文曰餌粉餅也餈稻餅也釋名曰餌而也相黏而也兖豫曰溏浹或作就形之名也餈漬也蒸􅏫屑使相潤漬餅之也韻集曰餹䬾餌也東觀漢記曰樊畢字仲華丗祖甞於新野坐文書見拘時畢爲市吏餽餌一笥上德之建武􅀄拜河東都尉引見雲臺上啁畢曰一笥餌得都尉何如風俗通曰汝陽彭氏墓近大道有一石人田家老母到市買數片餌以歸過䕃墓樹下以餌着石人頭忽去而忘之行道人見餌恠問之或人調云此石人有神能治病病愈者以餌來謝之轉以相語云頭痛者磨石人頭腹痛者磨石人腹遂千里來就號曰賢君如此數年前餌母聞之爲人􅀃之乃無復徃者梁書曰朱异好飲食極滋味聲色之娛子鵝炰鰌不輟於口雖朝謁從車中必賫飴餌粔籹上巨下汝通俗文曰于䋫者謂之粔籹􅄂字解詁曰粔籹膏環也異苑曰張􅂹永􅀄中於都䘮亡司馬茂之徃哭見􅂹慿几而坐以著刺粔籹食之楚辭招䰟曰粔籹􅁡餌言以􅁡和米麵􅆈作粔擣黍作餌寒具周禮曰朝事之籩鄭司農云朝事謂清朝未食先寒具口實之籩通俗文曰寒具謂之餲音􅂚桓譚新論曰孔子疋夫耳而晫然名著至其冢墓髙者牛羊鷄豚而􅀕之下及酒脯寒具致敬而去張逸遺令日閉口寒具不得入太平御覽卷第八百六十
