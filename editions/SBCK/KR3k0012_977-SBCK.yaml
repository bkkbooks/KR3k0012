front:
  text: 太平御覽卷第九百七十七菜茹部二
  hash: sha256:44139ea9a500de20a419cdfac3bcf9d9a556719beb94026967b872f330eb2b79
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_977-1a}
body:
  text: 䓗薤䔉茄薑􅂫䓗禮曰凡進食之禮䓗葉處末又膾春用䓗又脂用䓗又爲君子擇䓗薤必絶其本爾雅曰茖古百切山䓗茖䓗細莖大葉漢書曰龔遂爲勃海太守令人一口種五十本䓗又曰邵信臣為少府先是官園種冬葱韭覆以屋晝夜難音然火待温氣乃生奏罷之東觀漢記曰孔􅁬字君魚爲姑臧長時天下亂河西獨安前長居官數月輙致貲産􅁬在姑臧四歳財物不増唯老母極膳妻子但食䓗菜或嘲􅁬曰置脂膏中不能自潤義熈起居注曰十年有司奏太常謝澹遣四人還家種䓗菜免官􅀳書曰居洛陽城十里内有園菜欲以當課聽引其長流灌紫䓗􅀳書曰石勒時石聡將叛佛圗澄戒勒曰今年䓗中有虫害人百姓無食䓗俄而石聡走後秦書曰姚興種䓗皆化爲韭其後兵戈日盛後周書曰宣帝大象年左衛園中䓗變作韭梁書曰吕僧珍拜南兖州刺史從父兄子先以販䓗爲業僧珍至乃棄業求州官僧珍曰吾荷國恩重無以報効汝等自有常分豈可妄求叨越當速反䓗肆耳金樓子曰名山之下生䓗䓗薤者是古人食石種也故語曰寧得一把五茄不用金王一車寧得一片地榆不用明月寳珠五茄一名金塩地榆一名王鼓惟此二物可煑石又曰用紫芝煑石石美如脂食之可更調五味下橘皮䓗豉漢武内傳曰西王母曰仙上藥有􅀇都綺䓗列仙傳曰阮公者鳴山上道士也衣裘髮覆耳耳長六七寸口中無齒日行四百里於山上種䓗薤百餘年人不知也春秋元命苞曰天門山上有䓗所種畦壠悉成行人抜取者悉絶􅀂請神而求即不柭自出竒異辛香繆龍􅀕儀曰秋祀和羹芼以䓗西河舊事曰䓗領在燉煌西八十里其山髙大故曰䓗嶺也河源潜發其嶺分爲二水一水西經休循國囯在䓗嶺也郭義恭廣志曰休循國居䓗嶺其山多大䓗華陽國志曰曹公旣與先主語失匕㑹天震雷先主曰賢人言迅雷風烈必變良有以也曹公亦悔失言使人覘之見其拔䓗公曰大耳公未覺也其夜先主急去廣志曰有胡䓗木䓗巴南山川記曰有石蒜石䓗續搜神記曰新野趙眞家園中所種䓗未經抽抜忽一日盡縮入地後經歳餘眞之兄弟相次分散楊雄蜀都賦曰萬條熒熒翠藻青黄􅀂摛錦布繡望之無彊潘岳閑居賦曰菜則有䓗韭䔉芋青荀紫薑荲薺旨蓼􅂫芬芳薤爾雅曰巨盈切山薤今山中多有此菜皆如人家所種又曰薤鴻薈也即薤菜也漢書曰龔遂爲渤海太守令民一口種百本薤後漢書曰龐叅爲南陽太守郡人任棠者有竒節隱居教授叅到先候之棠不與言但以薤一夲水一孟置户屏前自抱孫兒伏户下主簿白以爲倨叅思其微意良乆曰棠是欲暁太守也水者欲吾清也㧞大夲薤欲吾擊強宗也抱兒當户欲吾開門恤􅀌也於是歎息而還叅在職果能抑強助弱以惠政侍人魏略曰李孚字子憲爲諸生常種薤欲以成計有求索不與一莖亦不自食時人謂之能行意丗􅀃曰桓公座有叅軍猗音覊筯取物也蒸薤不時解其食者又不助而猗終不放舉座皆􅀏又曰􅂫峻亂􅁃公南奔見陶􅋲雅相重及食􅁃噉薤因留白陶問用此何爲􅁃云故可種於是尤歎列仙傳曰務光服蒲薤根荆州圗副曰筑陽縣有薤山山多野薤因以爲名古詞曰薤上朝露何易稀潘岳閑居賦曰白薤􅀒霜䔉爾雅曰􅏣力的切山䔉今山中多有此菜皆如人家所種􅀃文曰䔉菜之美者雲夢之葷菜東觀漢記曰李恂爲兖州刺史前刺史所種園小麥胡䔉悉付從事無所留謝承後漢書曰江夏費遂字子竒爲楊州刺史悉出前刺史所種小麥胡䔉付從事又曰太原閔仲叔者代稱節士雖同黨之㓗清自以弗及也同黨見其含菽飲水遺以生䔉受而不食王隱晉書曰郄詵母病苦車及亡不欲車載乃養雞種䔉得馬八疋輿棺至􅃁齊書曰䂊章王大㑹賔僚張融食炙始畢人便去融欲求塩䔉口終不言方揺食􅃌半日乃息梁書曰邵陵王使賊煞何智通旣擒賊智通子敞之割炙食之即載出新亭四面火炙之燋熟蔽車載錢設塩䔉雇百姓食之撤一臠賞載錢一千徒黨并母肉遂盡抱朴子曰謂夏必長而䔉麥枯謂冬必凋而竹栢茂正部曰張騫使還始得大䔉苜蓿三輔决録曰平陵范氏南陽舊語曰前隊大夫有范仲公塩豉䔉果共一筩言其廉儉也􅀽子正書曰􅀽子曰吾甞與陳子息於鄴東門之外見一老父方坐而食其子授之䔉食必有餘欲弃則惜欲持去則暑遂盡食於是大辛螫其膓胃兩目盡赤陳子􅀏之吾謂曰子之家中牛羊數千而不敢食天暑有喝音謁死者而後食之病子之軀亦由是也晉四王起事曰成都王頴奉惠帝還洛陽道中於客舎作食宫人持斗餘粳米飯以供至尊大䔉塩䜴到􅀗嘉市麄米飯瓦盂盛之天子噉兩盂燥䔉數株塩豉而巳顔氏家訓曰三輔决録云前隊大夫范仲公塩豉䔉顆共一䇶顆當音魏顆之顆北土通呼物一叚爲一顆䔉是俗間常語耳故陳王雀鷂賦曰頭如䔉顆目似擘椒崔豹古今注曰䔉􅈋䔉也俗語謂之小䔉胡國有䔉十子共爲一株二籜裏之名爲胡䔉尤辛於小䔉俗人謂之大䔉􅁈報記曰梁廬陵王蕭績在荆州時常遣從事量括民田南陽樂孟卿亦充一使公府舎人韋破虜發遣試􅃙失王夲意及孟卿以數誤得罪破虜惶懼不敢引􅗅但誑孟卿公自爲當爲公分雪無勞訴也數日之間遂斬於市孟卿號呌無由自陳唯語人以􅁓筆隨殮死後少日破虜在糟上看牛忽見孟卿挈頭而入持一椀蒜韲與之破虜驚呼奔走不獲巳而服之因尓病未幾乃卒廣五行記曰唐咸亨四年洛州司户唐望之冬集計至五品進止未出間有僧來覔􅀄不相識延之共坐少頃間曰貧道出家人得飲食亦少以公名故闇相記能設一頓鱠否司户欣然即處分買魚此僧云㸔有䔉否司户家人云䔉盡僧云䔉盡去出即起􅇔之云䔉盡遣得買僧云䔉旣盡不可更住苦留不止司户果無疾􅁀亡延薦與李文徳書曰五折張騫大宛之䔉潘浞釣賦曰西戎之䔉南夷之薑茄梁書曰蔡樽爲吴興太守不飲郡井水齋前自種白莧紫茄以爲常餌詔襃其清加信武將軍杜寳大業拾遺録曰四年改胡牀爲交牀改胡􅀲爲白露黄􅋎改茄子爲崑崙紫􅋎嶺南異物志曰南土無霜雪生物不復凋枯種茄子十年不死生子人皆攀縁摘之樹髙至二丈嶺表録異曰南中草菜經冬不衰故􅂼薗之中栽種茄子􅀫根有二三年者漸長枝幹乃爲大樹每夏秋熟則梯樹摘之三年後樹漸老子稀即伐去別栽嫰者薑春秋運斗樞曰琁星散爲薑失德逆時則薑有翼辛而不臭也援神契曰薑禦温菜也禮記檀弓上曰䘮有疾食􅁏飲酒必有草木之滋焉以爲薑桂之謂也論語郷黨曰不撤薑食撤去齊禁薫物薑卒而不臭故不去也韓詩外傳曰宋玉因其友見楚相楚相待之無以異讓其友其友曰夫薑挂因地而生不因地而辛女因媒而嫁不因媒而親子之於王未也何怨於我也史記曰萬家之城千畦薑與千户侯等魏志曰倭國有薑不知其滋味齊書曰孔琇之爲臨川太守在任清約罷郡還獻乾薑二斤武帝嫌其少知琇之清乃歎息梁書曰周拾占對辯捷甞居直盧語及􅄝好裴子野言從來不甞食薑拾應聲曰孔稱不撤裴乃不甞一坐皆恱吕氏春秋曰和之美者楊璞之薑招揺之桂楊璞地名在蜀郡招摇山名在桂楊越駱之􅙪神仙傳曰吴孫權曰􅁠使介象作變化種􅀲菜百菓皆立生可食先主論膾魚何者最美象曰鯔魚爲上先主曰論近道魚耳此出海中安可得乎象曰可得耳乃令人於殿庭中作方坑汲水滿之并求釣象餌之垂綸於坑中不過頃得鯔魚先主驚喜問象曰可食否象曰故爲陛下取安敢取不可食之物乃使厨下切之先主曰聞蜀薑作虀至佳此間薑永不及也恨尓時無此薑耳象曰蜀薑豈不易得願差所使行者并付以直象自書一符以青竹杖使行人閇目􅀐杖杖止便買薑買薑畢復閉目此人承其言􅀐杖須􅁷止巳到成都不知是何處問从言是蜀市乃買薑于時吴使張温於市見之問曰與帝買薑於是甚驚作書􅀉家比人買薑畢捉書􅀐竹杖閉目復須􅁷巳還到吴厨下切膾亦適了也李先生傳曰郎中喬飜於牛渚遇神人意欲啖薑而市無之神人以絹數匹并書一牒付信入市門南下任意所如須􅁷得薑數斗還以問神人神人曰問李先生當知我􅀶物志曰伏波將軍唐資傳蜀人煞薑法先拪掃別麄細爲三輩盛着籠中作沸湯没籠着湯中須􅁷取一片横截断視如熱否裏旣熱訖便内着甖中細擣米末以覆上令薑不見訖以向湯令復沸使相淹消息視甖中當自沸沸便隂乾之又曰任娠者可啖生薑令兒􅄹指嶺表録異曰山薑花莖葉即薑也根不堪食而於葉間吐花穗如麥粒嫰紅色南人選未拆開者謂之含胎以塩淹藏入甜糟中終冬如琥珀香辛可重用爲膾無加也又曰以塩藏曝乾煎湯之極能治冷氣􅂫爾雅曰􅂫桂荏也􅂫荏􅀋故名桂荏方言曰周鄭之間謂之公蕡湘沅之間謂之湘沅在武陵沙州記曰乞佛虜不識五榖唯食􅂫于本草經曰芥蒩一名水􅂫吴氏日假􅂫一名䑕實一名薑芥也太平御覽卷第九百七十七
