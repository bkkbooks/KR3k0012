front:
  text: 太平御覽卷第四百四十
  hash: sha256:53180f69120804d8aa9c26ef0bb60aed1b65cb7f6dcd35e68c42aa6c65e01961
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_440-1a}
body:
  text: 人事部八十一貞女中唐書曰魏衡妻王氏梓州郪人也武德􅀄薛仁果舊將旁企地侵掠梁部因獲王氏逼而妻之後企地漸強盛衡謀以城應賊企地領衆將趍梁州未至數里飲酒醉卧王氏取其佩刀斬之携其首入城賊衆乃散髙祖大恱封爲崇義大夫人又曰絳州孝女衛氏字無忌夏縣人也􅀄其父爲郷人衛長則所殺無忌時年六歳母又改嫁更無弟兄及長常思復讎無忌從伯嘗設宴爲樂長則時亦預坐無忌以􅅮擊殺之旣而詣吏稱父讎旣報請就刑戮廵察大使黃門侍郎禇遂良以聞太宗嘉其孝烈特令免罪又曰鄒侍徴妻薄氏待徴大暦中爲嘗州山隂縣尉其妻爲海賊所掠薄氏守節出待徴官告於懷中託付村人使謂待徴曰義不受辱乃投江而死賊退潮落待徴於江岸得妻屍焉江左文士多著節婦文以紀之又曰奉天縣竇昇朝二女伯娘仲娘雖長於村野而㓜有志操住與邠州接界永泰中草賊數千人持兵刄入其村落行剽刼聞二女有容色姉年十九妹年十六藏於巖窟間賊徒擬爲逼辱乃先曵伯娘出行數十歩又曵仲娘出賊相顧自慰行臨深谷伯娘曰我豈受賊汚辱乃􅄬之於谷賊方驚駭仲娘又􅄬於谷谷深數百尺姉㝷卒仲娘脚折靣破血流􅀍體氣絶良乆而蘇賊義而去又曰崔玄暐􅀶陵安平人也父行謹爲胡􅂫令夲名畢以字下體有則天祖諱乃改爲玄暐少有學行深爲叔父秘書􅁥行功所器重龍朔中舉明經累􅀘庫部貟外郎其母盧氏嘗誡之曰吾見姨兄屯田郎中辛玄馭云兒子從官者有人來云貧乏能有立此是好消息􅀂聞貲貨充足衣馬輕肥此是惡消息吾嘗重此言以爲確論比見親表中仕官者多將錢物上其父母但知喜恱竟不問此從何而來必是禄俸餘資誡以善事如其非理所得此與盗賊何别縱無大咎獨不内媿於心孟母不受魚鮓之饋盖爲此也汝今坐食禄俸榮幸巳多􅀂其不能忠清何以戴天履地孔子云雖日用三牲之飬猶爲不孝又曰父母唯其疾之憂特冝修身㓗巳勿累吾此意也玄暐遵奉母氏教誡以清謹見稱又曰于琮尚廣德公主琮爲黃㓂所害而赦公主主視琮受禍爲賊曰妾李氏女也義不獨存願與于公并命賊不許公主入室自經而死又曰幽州兵亂殺判官韋雍雍妻蕭氏聞難號呼專執夫􅃑左右格去以死不從及雍臨刄蕭氏泣而告曰妾不幸年少義不茍活今日之事願先就死執刄者斷其臂詞氣不撓雖􅇯捍圜視無不傷歎其夕蕭氏亦卒趙畢呉越春秋曰子胥至呉乞食至於溧陽溧陽有女子澣紗瀬水之上筥中有少飯子胥遇見長跪而請之曰夫人豈可乞一飡乎女子曰妾獨與母居年三十不嫁飯不可得也子胥曰夫人賑窮者少飯有何嫌乎女知非恒人言曰妾豈可逆人情乎即發其簞飯清其壷漿長跪而與子胥子胥去顧見女子自沉孔演漢魏春秋曰龐濟外祖父酒泉趙君安爲同縣李壽所殺濟舅兄弟三人同時病死壽家喜相賀濟母娥自傷讎不報乃推車䄂劔白日刺壽於都亭前訖徐詣縣顔色不變曰父讎巳報請受戮禄福長尹嘉解印綬縱娥娥不肯去遂強載還㑹赦得免州郡莫不嗟歎嘉其烈義刋石以表其閭張勃呉録曰呉入郢也自王以下位班處宮而妻其室次及伯嬴伯嬴者昭王之母也伯嬴操刄曰公侯一國之儀表也有失則其􅀖危亂夫婦之禮人倫之始王教之端􅀂君王棄儀表則無以臨民妾犯非禮則無以自存貪生受辱固不如死王乃止和苞漢趙記曰今上殺晉散􅀐常侍梁緯召妻辛氏伏地大􅂘仰白今上曰妾聞女不再醮男以義烈聞妾夫巳死理無獨生乞就辟有司地下以事舅姑且婦人再娉明公亦安用哉遂號哭不止上曰貞婦也其任之亦自殺又曰魯陽侯王廣字廣之爲西揚州刺史晉末聚衆避丗爲蠻梅芳扇動山夷圍廣城䧟蠻囚廣將詣芳廣女有美色芳引入甚有寵入經一旬王伺芳睡引刀斬芳芳驚起曰何故反耶王罵曰蠻畜我欲誅反賊何等謂我反乎吾聞父仇不同天母仇不同地汝反逆無狀害我父母而復無禮凌人吾所以不死者欲誅汝耳今死自吾分不待汝殺我但恨不得梟汝首於通逵以塞大耻辭氣猛厲色無變容乃自殺時年十五劉義慶幽明録曰武昌陽新縣北山上有望夫石狀􅀂人立者傳云昔有貞婦其夫從役逺赴國難婦携弱子餞送此山立望而死形化爲石列女傳曰息夫人者息君之夫人伐息破之虜其君使守門將其夫人而納之於宫楚王出遊夫人遂出見息君謂之曰人生要一死而巳何自苦乃作詩曰􅂖則異室死則同穴謂予不信有如皎日息君止之夫人不聽遂自殺息君亦自殺又曰安定陳仲妻者同郡張叔明之妹名芝字李張年十四􅃴仲朞年而寡執節不嫁叔明從軍芝與二嫂没賊恐見侵略而相謂曰婦人以不汙身爲髙不虧節爲美豈可委身待辱哉於是自刺二嫂旣死芝獨不死叔明言於將軍耿弇耿弇以駙馬􅀒芝芝曰女子亡之餘汙將軍服乗不可也弇竒其言更以他馬􅀒芝至營爲致醫藥因乃得全郡表其閭九十壽終又曰譙國曹文叔妻者同郡夏侯文寜之女字令女文叔早死無子喪畢斷髪自誓不貳其後家欲嫁之又截兩耳依文叔從兄爽爽後􅀍誅文寜上書與曹氏絶婚復欲嫁之乃割鼻其母謂曰曹氏夷滅巳盡守此欲爲譙乎令女曰仁者不以盛衰改節義者不以存亡易心曹氏前盛尚欲保終况今衰滅何忍棄之太傅司馬公聞而嘉嘆聽乞子爲曹氏後又曰呉孫竒妻者廣陵范慎女名􅁎十八配竒一年而竒亡慎以􅁎少寡無子起還其家􅁎不肯歸迎者以父命迫之􅁎遂操刀割耳及鼻曰父迎我者不過以我年少色美今巳殘矣行將焉之於是迎者空反又曰丹陽華穆妻者下邳劉方之女字桃樹生一男而早亡呉丁諝相與反知名之士家將嫁許焉桃樹聞之乃操刀割耳其子又亡樹桃安身守正動不踰禮又曰呉沈伯陽妻者顧文宣之女字昭君早寡無嗣盡禮供養其父隂許人姑聞之而哭昭君乃引刀剪髪割兩耳以明其志又曰呉許昇妻吕氏之女名榮􅂛遊誕􅀶戲不治操行榮躬勤家業以養其姑勸􅂛學問未甞不垂淚而言榮父疾􅂛呼榮欲改嫁之榮曰命之所遭義無離貳終不肯歸􅂛後感悔㝷師逺學四年乃歸遂致名譽爲州所辟遇刼害歳餘姑亡夫族多欲娉之誓不肯嫁後黃巾賊欲犯之榮踰垣而走賊拔刀追榮曰從我則生不從立死榮曰義不畏死而見虜辱也賊遂殺之又曰河南貞義者樂羊子之妻羊子出學七年不歸鄰人欲犯貞義而刼其姑貞義操刀而出鄰人曰從者可不從者殺汝姑貞義仰天而歎以刀刎頸而死太守以大夫葬之號曰貞義皇甫謐列女傳曰漢中趙嵩妻者同郡張氏之女也字禮脩遭賊嵩死君難理脩以碧塗靣亂髪稱病懷刀在身意氣列决賊不迫也叔父矜其年少又世方喪亂欲更嫁禮脩慷􅁣以死爲誓又曰丹陽羅静者廣德羅勤之女爲同縣朱曠所婚禮未成勤遇疫疾喪没鄰比齗絶曠觸冒經營㝷復病亡静感其義遂誓不嫁與弟妹共居求者過十餘志無傾移有楊祚者多將人衆自徃納幣静乃逃竄祚刼其弟妹静懼爲祚所害乃出見之曰實感朱曠爲妾父而死是以託身亡者自誓不貳辛苦之人願君哀而舎之如其不然請守之以死祚乃舎之静守純固年六十餘卒又曰蜀景竒妻者羅氏之女字貢羅竒亡無嗣貢羅專心供養父青以許同郡宰詩貢羅與父母書陳其情志暦年不歸後青使詩白州告縣發遣貢羅乃由徑道詣州自訴言意慷􅁣請死不從州嘉而許焉貢羅恐詩於道路迫脅乃請吏兵自衛還家執義終身又曰犍爲相登妻者周氏之女名度適登一年而寡牢令呉厚因人問度心執匪石引刀截髮縣長吏復遣媒欲娉度曰前巳斷髮謂足表心何誤復有斯言哉取刀欲割鼻左右救止表其閭又曰廣漢馮季宰妻者季氏之女名珥字進娥早寡無嗣奉飬繼姑及宰兄顯守心純固以義自防珥母愍其姑苦隂有所許珥斷髮自明遂乞飬男女各一率道有法郷人稱之又曰廣漢王輔妻彭氏之女也名非輔遊學數年遂卒京師迎䘮葬訖事姑孝敬彌篤非叔父以許􅂫孟非叩心泣血訴情九族猶不見聽乃剪髮諸府乞終供養遂乞養子静居年踰七十而卒又曰沛國劉長卿妻者同郡桓始春之女少有名於桓宗嫁於劉氏生一男字玉玉五歳而長卿卒懼見誘嫁旣不歸寧兄弟時徃防漸逺疑言不及外玉年十五死其弟㑹䘮援刀割耳明巳不貳在喪側者無不感傷宗婦謂之曰家未有相嫁之計􅀂其有也徐可因姉妹以喻意何貴義輕身之甚耶荅曰昔我君五更學爲儒宗尊爲帝師歴世不替以忠孝顯女以貞順稱是以懼忝諸姑或以我年未衰又喪子卒迫之間非所能防豈可不豫見其意哉郡表其閭號曰景行義桓皇甫謐列女傳曰沛公孫去病妻者同郡戴元丗之女旣嫁乆而無子謂其夫曰妾不才得奉巾櫛歴年無嗣禮有七出請願受訣以其夫不許復進曰福莫大於昌熾禍莫大於絶嗣君不忍見遣當更廣室夫復不肯夫死服除父母欲嫁之女遂操刀割鼻郡表其閭又曰梁夏文生妻者沛國劉景賔之女名娥生一女而寡娥誓不再嫁父以配同郡衡氏逼迫入門娥謂衡氏曰妾聞婦人不改嫁越義失節妾所不爲君可見遣衡氏曰相取有媒禮何遣之有衡氏妻服未闋娥因數之曰君衰麻在身犯禮納室雖顔之厚奈相䑕何妾必死不爲君妻相留不知辱乎􅁬衣而出衡氏不敢強留父復以許臨睢倪氏強扶上舩俄陽不憂書與女别乃以刀割耳鼻曰所以不死者老姑在堂􅀌女尚㓜故耳執義終身太平御覽卷第四百四十
