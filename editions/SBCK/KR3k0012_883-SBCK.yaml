front:
  text: 太平御覽卷第八百八十三􅀑神部三
  hash: sha256:688c11d50376f6ac5992de5d464736dce9a26548aeb9ef16ee296cdbc78931b2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_883-1a}
body:
  text: 􅀑上易曰􅀑神害􅄹而福謙又曰睽􅀌見豕􅀒塗載􅀑一車見􅀑盈車吁可怪也左傳莊公曰齊侯田于貝丘見大豕從者曰公子彭生也公見大豕而從者見彭主皆妖􅀑公怒曰彭生敢見射之豕人立而啼公懼墜于車傷足喪屨又僖公曰晉侯改葬共太子秋狐突適下國遇太子太子使登僕而告之曰夷吾無禮余得請於帝矣將以􅀳􅂌􅁗􅁗將祀余對曰臣聞之神不歆非􅀋民不祀非族君祀無乃殄乎且民何罪失刑乏祀君其圖之君曰諾吾將復請七日新城西偏將有巫者而見我焉許之遂不見及期而往告之曰帝許我罰有罪矣斃於韓又文上曰有事於太廟躋僖公逆祀也於是夏父弗忌爲宗伯曰吾見新鬼大故鬼小先大後小順也君子以爲失禮又宣公曰楚司馬子良生子越椒子文曰是必㓕􅀂敖氏矣及將死泣曰鬼猶求食􅀂敖氏之􅀑不其餒而又宣公曰􅀄魏武子有嬖妾無子武子疾命顆曰必嫁是疾病則曰必以爲殉及卒顆嫁之及輔氏之役顆見老人結草以亢杜囬杜囬躓而顛故􅀗之夜夢之曰余而所嫁婦人之父也爾用先人之治命余是以報又成公曰晉侯夢大厲􅀍髪及地􅅮膺而踊曰殺余孫不義厲􅀑也趙氏之先祖也八年􅀳侯殺趙同趙括故怒余得請於帝矣壞大門及􅃦門而入公懼入于室又壞户公􅁴召桑田巫巫言如夢巫云􅀑怒如公所夢又昭二曰鄭子産聘于晉晉侯有疾韓宣子逆客私焉曰寡君寢疾於今三月矣並走群望有加而無瘳今夢黄熊入於􅃦門何厲􅀑也對曰昔堯殛鯀于羽山其神化爲黄熊以入于羽淵實爲夏郊三代祀之􅀳爲盟主其或者未之祀也乎宣子祀夏郊􅀳侯有間又昭二曰鄭人相驚以伯有至矣曰伯有至矣則皆走不知所徃鄭人殺伯有言其􅀑至鑄刑書之歳二月或夢伯有介而行曰壬子余將殺帶也明年壬寅余又將殺叚也及壬子駟帶卒國人益懼齊及燕平之月壬寅公孫叚卒國人愈懼其明月子産立公孫泄及良止以撫之乃止子太叔問其故子産曰鬼有所歸乃不爲厲吾爲之歸也又哀上曰􅀄曹人或夢衆君子立于社宫而謀亡曹曹叔鐸請待公孫􅆠許之旦而求之曹無之戒其子曰我死爾振聞公孫疆爲政必去之又哀下曰衛侯夢于北宫見人登昆吾之觀􅀍髪北靣而譟曰登此昆吾之虚綿綿生之􅀲余爲渾良夫呌天無辜大當免三死并數一時之事爲盟三罪殺之故自謂無辜也論語曰樊遲問知子曰敬􅀑神而逺之可謂知矣敬􅀑神而不賣尓雅曰􅀑之爲言歸也史記始皇夲紀曰使者從􅀜東夜過華隂平野道有人持壁遮使者曰爲吾遺滈池君因言曰今年祖龍死使者問其故忽不見遂迺置其壁去使者奉璧具以聞始皇黙然良乆曰山􅀑固不過知一歳事也漢書郊祀志曰旣滅兩粤人勇之乃言粤人俗􅀑言其土俗尚􅀑神之事而其祠皆見􅀑數有効昔東甌王敬􅀑壽百六十歳後丗怠慢故衰耗迺命粤巫立粤祠安臺無壇亦祠天神帝百􅀑漢書曰田蚡疾一身盡痛􅀂有擊者呼服謝罪上使視􅀑者瞻之曰魏其侯與灌夫共守笞欲殺之竟死後漢書曰第五倫爲㑹稽太守俗好􅁋祀人常以牛􅀕神百姓財産以之困匱其自食牛􅁏而不以薦祠者發病且死先爲牛鳴倫到官移書屬縣暁告百姓其巫祝有依託􅀑神詐怖愚民皆按論之後遂断絶又曰宋均爲辰陽長其俗少學者而信巫鬼均爲立學校禁絶􅁋祀人皆安之又曰劉根有神術太守史祈以爲妖乃執而數之曰􅀂有神可願一驗根曰頗能使􅀑乃左頋右嘯祈之亡父近親數十皆反􅅞在祈前向根叩頭曰小兒無狀分當万死叱祈曰汝子孫不能光榮先祖而辱如此何不叩頭謝之祈哀驚悲泣頓首請罪根黙然忽去不知所之王隱晉書曰鎮南劉弘以故刺史王毅子衡陽太守矩爲廣州矩至長沙見一人長大著布單衣自持奏左岸上矩省奏云京兆杜靈之仍入舡共語稱叙稀闊矩問君京兆人何時發來荅曰朝發矩恠問京兆去此數千那得朝發今到杜荅曰僕曰天上在京兆去此乃數萬何止數千乎晉書曰鄒湛字􅃳甫嘗見一人自稱甄仲舒餘無所言如此非一乆之乃悟曰宅西有積􅁟敗瓦其中有死人甄仲舒者予舎西土瓦中人也撿之果然厚加歛葬葬畢遂夢此人來謝又曰􅂫韶字孝先安平人也仕至中牟令卒韶伯父第九子節在車上晝日韶自外入乗馬日黒又介黄䟽單衣白襪絲履慿節車轅節謂兄弟曰中牟在此兄弟皆􅕎視無所見問韶君何由來韶曰吾欲改葬即求去數日又來兄弟遂與韶坐節曰􅀂必改葬別自勑兒韶曰吾將爲書節授筆韶不肯曰死者書與生者異爲節作其字像胡書也乃􅀏喚節爲書曰昔魏武侯浮於西河而下中流頋謂吴起曰羙哉河山之固此魏國之寳也吾性愛好京洛毎徃來出入瞻視邙山樂哉萬丗之基也北背孟津洋洋之河南望天邑濟濟之盛此志雖未言銘之於心矣不圖􅍕忽所懷未果前去十月便速改葬買數􅅿地便足矣節延韶入室設坐祀之不肯坐又無所饗謂韶曰中牟平生好酒可少飲韶手執盃飲盡曰佳酒也節視杯空旣去杯酒乃如故前後三十餘來兄弟狎翫節問所疑韶言天上及地下事亦不能悉知也顔淵卜啇今見在爲脩文郎凡有八人􅀑之聖者梁成賢者吴季子節問死何如生韶曰無異耳死者虚生者實此其異也節曰死者何不歸屍骸韶曰譬如斷卿一臂以投地就剥削之於卿有患乎死之去屍骸如此也節曰厚葬羙墳死者樂乎韶曰無在也節曰􅀂無在何改葬韶曰今我誠無所在但欲述生時意耳韶欲去節留之閇門下鏁鑰韶爲之少住韶去節見門故閇韶巳去矣韶與節別曰吾今見爲脩文郎守職不下得來也節執手乃別自是遂絶續晉陽春秋曰襄陽羅友在桓温府屢以貧乞禄温以其誕肆許而不用同府人有得郡者温爲坐別友亦􅀍命至􅀹晚温問之曰出門於中路遇一􅀑大見耶榆曰見汝送人作郡不見人送汝作郡友始怖終慙不􅁴淹緩温􅀏而用之􅀳書曰周訪􅀫宫亭湖廟晨起如厠見一老父訪執之化爲雄鴨晉陽春秋曰符堅未敗長安市􅀑夜􅂘一月止前趙録曰麟嘉三年螽斯則百堂灾自此􅀑􅂘二宫夜夜不絶崔鴻十六國春秋後趙録曰魏豹字叔虎范陽人也遷中山太守所在有治名豹嬖妾先死豹後守于廪丘南妾形見與豹言翌日而卒後魏書曰先是河邊人夢神謂巳曰爾朱家欲渡河用爾作灅波津令爲之縮水脉月餘夢者死及兆至有行人自言知水淺深以草往往表挿而導焉忽失所在兆遂䇿馬渉渡宋書曰劉伯龍少而貧薄及長歷位尚書左丞武陵太守貧窶尤甚嘗在家􅁣然召左右將營十一之方忽見一􅀑在傍撫掌大􅀏伯龍歎曰貧窮固有命乃復爲􅀑所􅀏也遂止梁書曰范雲嘗與梁武同􅀫頋暠之舎妻方産􅀑在外曰此中有王有相雲起曰王當仰属相以見歸因是盡心推事老子曰以道蒞天下者其􅀑不神鬼不敢見其精神以干犯人非其􅀑不神其神不傷人其􅀑非無精神也邪不入正不能傷自然莊子曰齊桓公田於澤管仲御見􅀑焉公撫管仲之手曰仲父何見對曰臣無所見也公反誒詒爲疾數日不出齊士有皇子告敖者曰公則自傷􅀑惡能傷公夫忿滀之氣散而不反則爲不足上而不下則使人善怒下而不上則使人善忘不上不下者中身當心則爲病耳桓公曰然則有􅀑乎曰有沉有履竈有髻戸内之煩壤雷霆處之水有岡象丘有莘山有夔野有彷徨澤有委虵公曰請問委虵之狀何如曰委虵其大如轂其長􅀂轅紫衣而朱冠其爲物也惡聞雷車之聲則捧首而立見之者其殆乎覇桓公囅然而􅀏曰寡人之所見者也墨子曰周宣王殺杜伯不以罪後宣王田於圃見杜伯執弓矢射宣王㐲弓衣而死吕氏春秋曰梁北有􅀺丘部有竒鬼焉喜效人之子姪昆弟扶邑丈人布之市醉而歸者􅀺丘之􅀑效其子之􅃺扶而道苦之丈人歸酒醒而譙譙責也其子曰吾爲汝父也豈爲不慈哉我醉汝道苦我何故其子㐲而觸地曰孽無此事也其父信之曰譆是必竒鬼我固聞之明日復於市欲遇而刺殺之則旦之市而醉其真子恐其父之不能返也遂往迎之丈人望見之抜劒而刺之韓詩外傳曰人死曰􅀑􅀑者歸也精氣歸於天􅁏歸於􅁟血歸於水脉歸於澤聲歸於雷動作歸於風眼歸於日月骨歸於木筋歸於山齒歸於石膏歸於露髪歸於革呼吸之氣歸復於人淮南子曰蒼頡作書􅀑夜􅂘董仲舒五行逆順曰人君簡宗廟不禱祀則􅀑夜哭風俗通曰汝南周翁仲􅀄爲太尉椽婦産男及爲北海相吏周先能見􅀑書署爲主簿使還致敬於本郡縣因告之曰事訖臘日可與小男俱侍祠主簿事還翁仲問之對曰但見屠人弊衣蠡髻而踞神座持刀割􅁏有衣冠青墨綬數人彷徨堂東西不進不知何故翁仲問妻曰何以養此子嫗大怒曰君常言兒體質聲氣喜學似我公欲死爲作狂語翁仲具告之祠􅀕如此不具服子母立截嫗泣涕言昔以年長無男不自安實以女易屠者之男禆錢一萬此子年巳十八遣歸其家迎其女女嫁爲賣餅者妻後適隴西李文思文思官至南陽太守抱朴子曰按九鼎記及青靈經言人物之死俱有鬼也馬􅀑常以晦夜出行􅃺如炎火􅀇中記曰姑獲鳥夜飛晝藏盖鬼神􅀋衣毛爲飛鳥脫毛爲女人名爲帝少女一名夜遊一名鈎星一名隱飛鳥無子喜取人子養爲子人養小兒不可露其衣此鳥度即取兒也荆州爲多昔豫章男子見田中有六七女人不知是鳥匍匐徃先得其毛藏之徃就諸鳥諸鳥各走就毛衣衣之飛去一鳥獨不得去男子以爲婦生三女其女母後令問父知衣在積稻下得衣飛去後以衣迎三女三女得衣亦飛去神異經曰東北方有鬼星石室三百户而共一門石牓題曰􅀑門晝日不開至暮即有人語有火青色又曰南方有人長三二尺祼形而目在頂上走行如風名曰魃所見之國大旱赤地千里一名旱母一名狢遇者得之投溷中乃死旱灾銷也又曰西方深山有人焉長尺餘祖身捕鰕蟹性不畏人止􅀫喜依其火以炙鰕蟹伺人不在而盗人鹽以食蟹名曰山㺑其音自呌人常以竹着火中焷音朴音卑而山㺑皆驚犯之令人寒􅀬此雖人形亦􅀑魅耳所在山中皆有之齊諧記曰廣陵王瓊之爲信安令在縣忽有一􅀑自稱姓蔡名伯喈或復談議誦詩書知古今靡所不諳問是昔蔡邕不荅云非也與之同姓字耳問此伯喈今何在云在天上或下作仙人飛來去受福甚快非復疇昔也論衡曰上古之人有神荼鬱壘者昆弟二人生而執􅀑居東海度朔山上亡桃樹下簡閱百􅀑􅀑道理妄興人禍荼與鬱壘縛以蘆索執以食虎幽明録曰阮瞻常著無􅀑論而一􅀑通姓名作客詣之寒温畢􅂓談名理客甚有才辨與言良乆及􅀑神事乃作色曰􅀑神古今聖賢所共傳君何獨言無即僕便是􅀑於是變爲異形湏􅁷便滅阮嘿然大惡之年餘卒又曰王輔嗣注易輙􅀏鄭玄爲儒云老奴無意于時夜分忽聞外閤有着屐聲湏􅁷進白云鄭玄責之曰君年少何以輙穿鑿丈句而妄譏詆老子也極有忿色言竟便退輔嗣心生畏惡經少時遇厲病而卒又曰阮德如嘗於厠見一􅀑長丈餘色黒而眼大着皂單衣平上幘去之咫尺德如心安定徐􅀏語之曰人言􅀑可憎果然鬼即赧愧而退又曰晉丗王彪之年少未官常獨坐齋前有竹忽聞有歎聲彪之􅅥然怪似其母因往看之見母衣服如昔彪之跪拜歔欷母曰汝方有竒厄自今巳去當見一白狗􅀂能東行出千里三年然後可得免灾忽不復見彪之悲悵逹旦旣明獨見一白狗􅁪隨行止便經營行裝將往㑹稽及出千里外三年乃歸齋中復聞前聲往見母如先謂曰能用吾言故來慶汝汝自今巳後年踰八十位班台司後皆如母言又曰殷仲宗以隆安􅀄入蜀爲毛璩叅軍至涪陵郡暮􅀫在亭屋中忽有一􅀑體上皆毛於牎櫺中執仲宗臂牽仲宗大呼左右來救之鬼乃去又曰河南楊起字聖卿少時病瘧逃於社中得素書一卷譴劾百鬼法所劾輙効爲日南太守母至則上見􅀑頭長數尺以告聖卿曰此肅霜之神劾之出來變形如奴送書京師朝發暮反作使當千人之力又曰東昌縣山有物形如人長四五尺裸身􅀍髮髮長五六寸常在髙山巖石間住喑啞作聲而不成語能嘯相呼常隱於幽昧之間不可􅁪見有人伐木􅀫於山中至夜眠後此物抱子從澗中發石取蝦蟹就人火邊燒炙以食兒時人有未眠者宻相􅁴語齊起共突擊便走而遺其子聲如人啼也此物使男女群共引石擊人趣得然後止太平御覽卷第八百八十三
