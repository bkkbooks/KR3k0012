front:
  text: 太平御覽卷第二百五十五
  hash: sha256:24258f3069f029f21b56c1515e9da6b5c5768f05352e30e558057d39bd7feaac
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_255-1a}
body:
  text: 職官部五十三刺史下隋書曰楊尚希素有足疾上謂之曰蒲州出羙酒足堪養病屈公卧治之於是出拜蒲州刺史又曰髙勵拜楚州刺史吏民安之先是城北有伍子胥廟其俗敬􅀑祈禱者必以牛酒至破産業勵歎曰子胥賢者豈冝損百姓乃告諭所部自此遂止百姓頼之又曰張威以罪免後從上祠㤗山至洛陽上謂威曰自朕之有天下毎委公以重鎮可謂推赤心矣何乃不修名行唯利是視豈直􅀌􅀒朕心亦且累卿名德因問威曰公所執笏今安在威頓首曰臣􅀒罪􅃜失無顔復執謹藏於家上曰可持來威明日奉笏以見上曰雖不遵法度功効實多朕不忘之今還公笏於是復拜洛州刺史又曰梁彦光拜趙州刺史彦光言於上曰臣前待罪相州百姓呼爲戴帽餳臣自分廢黜無復衣冠之望不謂天恩復垂収採請復爲相州改弦昜調庶有以變其風俗上荅隆恩上從之復爲相州刺史豪猾者聞彦光自請而來莫不嗤􅀏彦光下車發擿姧隠有􅀂神明於是狡猾之徒莫不潜竄合境大駭唐書曰天授二年正月天后内出繡􅂁賜新除都督刺史其􅂁皆刺繡作山形繞山勒廻文銘曰德政惟明職令思平清信忠勤勞進躬親自此每新除都督刺史必以􅂁賜之又曰李擇言開元中爲漢褒相􅄮四州刺史安德郡公所歴皆以嚴幹聞其在漢州張嘉貞爲益州長史判都督事性簡貴待管内刺史禮隔而引擇言同搨坐談正理時人榮之又曰􅀽光庭者河西戌將天寳末爲伊州刺史禄山之亂西北邊戍兵入赴難􅀜隴郡邑皆爲吐藩所抜唯光廷守伊州累年外救不至虜百端誘􅀃終不屈部下如一及矢石旣盡粮儲並竭城將䧟没光廷手殺其妻子自焚而死朝廷聞之贈工部尚書又曰曹王臯上書言理道拜爲衡州刺史坐小法貶潮州刺史楊炎作相復以皐爲衡州刺史􅀄皐爲御史覆訊懼貽太妃憂出則素服入則公服言皃如平常太妃不之知也及爲潮州詭詞謂遷官至是復爲衡州方具以事白太妃因泣下具言非疾不敢有聞其沉宻重慎如此又曰貞元􅀄徳宗以奉先縣令鄭珣瑜爲饒州刺史昭應縣令韋武爲遂州刺史華原縣令崔琮爲汝州刺史藍田縣令韋貞伯爲舒州刺史盩厔令李曽爲郢州刺史録善政也各賜馬一疋并綵物衣服以遣之又曰元和十四年十月上欲以潮州刺史韓愈爲􅀽州刺史愈至潮州獻上表上對􅌠臣曰昨日韓愈表因思當時所論佛骨大是愛我我豈不知然爲人臣不當言人主事佛乃年促也我以是惡之是時上深欲擢用愈候􅌠臣啓之耳皇甫鏄素嫉愈乃曰終是狂踈且與移一郡故有是命又曰劉禹錫移授播州刺史御史中丞裴度奏禹錫母年八十今播州乃猿狖所居人跡罕至禹錫誠合得罪然其老母必至不得行則湏與子爲死別傷陛不孝理之風伏請屈法稍移近處使得終飬上曰夫爲人子毎事尤湏修謹常恐貽親之憂今禹錫所坐更合重於他人豈可以此論度不能對上曰我所言是責人子之事然終不能傷其所親之心明日改授禹􅃬爲連州刺史又曰崔珙大和七年正月拜廣州刺史兼嶺南節度使延英中謝帝問以撫理南海之冝珙奉對明辯帝深嘉之時髙瑀鎮徐州承智興之後軍驕難制軍士數犯法上欲擇威望之帥以臨之乆難其才㑹珙言事慷􅁣謂􅌠臣曰崔珙言事神氣精爽此可以臨徐人即以王茂先代珙鎮廣南授珙檢校工部尚書徐州刺史又曰張賈出守衢州辭日文宗謂賈曰聞卿大善長行賈知上不喜愽遂自解􅀃乃曰臣公事之餘聊與賔客爲戯非有所妨也上曰豈謂好之而不妨事耶自後刺史面辭曰上必殷勤戒飭曰無􅄝慱無飲酒又曰渾鐬瑊之子開成􅀄年相擬壽州刺史文宗曰鐬勲臣子弟豈可以委牧民仲尼有言不如多與之邑今我念其先人之功與之致冨可也􅌠臣曰鐬常歴名郡有政能乃從之又曰開成二年幽州節度使史元忠奏當管八州准門下牒追刺史古魚各一隻臣勘自天寳末年頻有兵戈並多失墜伏乞各賜新銅魚可之又曰李暠授汝州刺史爲政嚴簡州境肅然與兄昇弟暈尤相篤睦昇等每月自東都省暠徃來微行州人不之覺其清慎如此又曰孔􅀂思爲衡州刺史先是諸州別駕皆以宗室爲之不爲刺史致敬由是多行不法􅀂思至州舉奏別駕李道欽罪犯請加鞠訊乃詔别駕於刺史致禮自􅀂思始也又曰蕭復累遷同州刺史時州人阻饑有京畿觀察使儲廪在境内復輙以賙貧人爲有司所劾詔下削階受代親友唁之復怡然曰苟利於人敢憚薄責又曰趙昌除華州刺史辭於麟德殿時年八十有餘趨拜輕捷占對詳明上退而歎異宣令􅌠臣宻訪其頥飬之道以奏焉又曰咸通中衛洙奏狀稱蒙恩除授滑州刺史官號中一字而臣家諱音同雖文字有殊而聲韻難別請改授閑官者勑曰嫌名不諱著在禮文成命巳行固難依允五代史後唐書曰李嗣肱克脩之子也少有膽略時朱温將賀徳倫急攻蓨縣朱温率師五萬合勢營於蓨之西嗣肱自下愽率􅀐三百薄晚與賊之樵蒭者相􅄂日旣晡入朱温營門諸􅀐相合大譟弓矢星發虓闞馳突汴人不知所爲營中大擾旣暝歛􅀐而退是夜朱温焼營而遁解蓨縣之圍以功特授蔚州刺史又曰莊宗以教坊使陳俊爲景州刺史内園栽接使儲德源爲憲州刺史伶人剖符非制也上􅀄平汴州陳俊德源皆爲樂官周匝所薦上許之典郡郭崇韜以爲不可遂􅃦伶官言之者衆上宻召崇韜謂之曰予巳許陳俊一郡今經年未行卿雖以正言匡諌我毎慙見二人卿當屈意行之故有斯命又曰前洋州節度副使程乂徽陳利見請於瀛莫兩州界起置營田以備邊因授乂徽莫州刺史充兩州營田使五代史梁書開平四年九月詔曰魏愽管内刺史比來州務並委督郵遂使曹官擅其威權州牧同於閑冗俾循通制冝塞異端並河南諸州例刺史得以專逹時議者曰唐朝憲宗烏重裔爲滄州節度使甞稱河朔六十年能抗拒朝命者以奪刺史權與縣令職而自作威福耳􅀂二千石各得其柄又有鎮兵雖安史挾姧豈能據一墉而叛哉遂奏以所管德棣景三州各還刺史職分州兵並􅈻収管是後雖幽鎮魏三道以河北舊風自相傳襲唯滄州一道獨禀命受代自重裔制置使然也則梁氏之更張正合其事矣五代史曰晉少帝開運中沈斌爲祁州刺史契丹自恒州駈牛羊過城下斌乃出州兵擊之爲契丹精􅀐剗門邀擊之州兵䧟賊趙延壽知其無兵遂與蕃賊急攻之仍呼謂斌曰沈使君我故人也擇禍莫􅀂輕早以城降無自辱也斌登城呼而報曰侍中父子誤計䧟於腥膻忍以大羊殘害父母之􅀖不自羞慙反有德色沈斌弓折箭盡寧爲國家死耳不俲公所爲也翌日城䧟斌自殺三輔决録曰韋康代父爲涼州刺史父出止傳舎康入官宇時人榮之桓石秀別傳曰石秀爲竟陵太守遷江州刺史非其志也治稱不煩在州郡弋釣山澤縱心游覽而巳善馳射望之􅀂􅀞桓氏家傳云範爲兖州刺史表謝曰喜於復見選擢慙於不堪所職悲於戀慕闕廷三者交集不知所裁黄㤗交廣記曰􅁗兼天下改州牧爲刺史朱明之時則出廵行封部玄英之月則還詣天府表奏刺史言其刺舉不法史者使也異苑曰晉陵韋㓪家在延陵元嘉初忽見庭前井中有人長尺餘所􅀍帶組相應相隨出門良乆乃盡㓪兄藪頗善占筮常云吾子弟當至刺史㓪歴清廣二州郭子曰王丞相治楊州廨舎案行而言我正爲次道理此耳何次道少爲王公所知重故有此歎太平御覽卷第二百五十五
