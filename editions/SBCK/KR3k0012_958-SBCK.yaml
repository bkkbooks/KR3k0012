front:
  text: 太平御覽卷第九百五十八木部七
  hash: sha256:0a86f08a37a60300e8343d78e4665ab396e242612885f0e196d398b456f9f900
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_958-1a}
body:
  text: 楠檜柞檀柘􅂎梓楸樅椒木蘭夜合甘棠欓櫟橡楠㝷陽記曰黄金山有楠樹一年東邊榮西邊枯後年西邊榮東邊枯年年如此張華云交讓樹者此是也檜爾雅曰檜栢葉松身尚書禹貢曰杶榦栝栢栢葉松身曰栝毛詩竹竿曰檜檝松舟檜栢葉松身檝所以棹舟也柞爾雅曰栩杼柞樹也毛詩車牽曰陟彼髙崗析其柞薪析其柞薪其葉湑􅀆又曰維柞之枝其葉蓬蓬䟽曰栩今柞殻爲斗可以染皂今俗及河内云杼斗或橡斗陸機毛詩䟽義曰芃芃棫樸爾雅曰棫白挼注音蕤三倉􅀃棫即柞也其柞理純白無赤心爲白挼直理易破故可爲牘車軸又可爲矛㦸鎩西京雜記曰五柞宫有五柞樹皆連抱五株樹枝覆䕃數十畒崔豹古今注曰鑿木出交州林邑國也色黒而有文亦謂之文木周處風土記曰舊􅀃舜葬上虞又記云耕于歷山而始寜剡二縣界上舜所耕田在於山下山多柞樹吴越之間名柞爲􅇫故曰歴山檀毛詩將仲子曰將仲子􅀆無踰我園無折我樹檀檀彊忍之木又曰伐檀刺貪也在位貪鄙無功而受禄君子不得進仕爾坎坎伐檀􅀆寘之河之干􅀆聖賢􅃁墓記曰孔子墓有檀樹柘禮記月令曰季春無伐桑柘又投壷曰矢以柘􅀂􅁄無去其皮周禮冬官曰弓人辨六材一曰柘古史考曰烏號弓以柘枝爲也譙周曰野柘枝勁烏集之飛起枝彈之烏乃驚號伐取爲弓故稱烏號弓周書曰季夏取桑柘之火風俗通曰柘材爲弓彈而放快崔寔四民月令曰柘染色黄赤人君所服黄者中尊赤者南方人君之所向也雲南記曰㑹川室屋相次皆是板及茅舎滿川坡盡是花木亦有赤柘􅂎爾雅曰􅂎枸檵音計今枸􅂎也毛詩將仲子曰將仲子兮無伐我樹􅂎􅂎木名䟽曰狗骨也又湛露曰湛湛露斯在彼􅂎􅁄左傳昭公曰聲子聘于晉還令尹子木與之語問晉政焉且曰晉大夫與楚孰賢對曰晉卿不如楚其大夫則賢皆卿材也如􅂎梓皮革自楚徃也雖楚有材晉實用之周書曰太姒夢梓化爲􅂎梓爾雅曰㮴音俞䑕梓楸屬也今江東有虎梓毛詩小弁曰惟桑與梓必恭敬止又定之方中曰樹之榛栗椅桐梓􅃮陸機毛詩䟽義曰北山有楰爾雅曰楰䑕梓其樹葉木理如楸山楸之異也今人謂之昔楸濕時脆燥而堅令永昌人謂䑕梓漢人謂之楰禮斗威儀曰君乗火而王其政和平楸梓爲常生周書曰太姒夢太子發取周庭之梓樹於啇闕間化爲松􅂎史記曰子胥將死告舎人曰必樹吾墓上以梓梓可爲器而抉吾眼於吴之東門上以觀越兵入吴也漢書曰元帝􅀄元四年皇后曽祖父濟南平陵王伯墓門梓柱卒生枝葉上出劉向以爲王氏代漢之象後漢書曰應順爲兾州刺史廉直無私遷東平相賞罰必信吏不敢犯有梓樹生於聽事室上事後母至孝衆以爲孝感之應􅀃苑曰伯禽與康叔封朝于成王見周公三見而三笞康叔有駭色謂伯禽曰有啇子者賢人也與子見之康叔封與伯禽見啇子曰吾二子者朝乎成王見周公三見而三笞其􅀃何也啇子曰二子盍相與觀乎南山之陽有木焉名曰橋二子者徃觀乎南山之陽見橋竦焉實而仰反以告乎啇子啇子曰橋者父道也啇子曰二子盍相與觀乎南山之隂有木焉名曰梓二子者徃觀乎南山之隂見梓勃焉實而俯反以告啇子曰梓者子道也二子者明日見乎周公入門而趍登堂而跪周公拂其首勞而食之曰安見君子二子對曰見啇子周公曰君子哉啇子也樂資春秋後傳曰使者鄭客入凾谷至平舒見素車白馬曰吾華山君願以一牘致滈池君子之咸陽過滈池見一大梓樹有文石取以扣樹當有應者以書與之鄭客如其言見宫闕如王者居謁者出受書入有頃云今年祖龍死山海經曰玉山碧山多梓木雞山羙梓孟子曰拱把之桐梓人欲生之皆知所以養之者至於身不知所以養之者豈愛身不􅀂桐梓哉漢武故事曰衛子夫入宫上曰吾昨夜夢子夫庭中生梓樹數株豈非天乎是日幸之有娠郭氏􅀇中記曰􅁗文公造長安宫面四百里南至終南山山有梓樹大數百圍䕃宫中公惡而伐之連日不剋輙大風􅀨夜有􅀑問梓樹樹曰豈奈吾何􅀑曰􅀂使三百人披頭以絲繞樹豈不敗汝樹黙然不應明日人上言􅁗王依此言伐之中有青牛逐之入澧水豫章記曰松陽門内有大梓樹大四十五圍樹先枯永嘉中一旦忽更榮華太興中元帝果継大業楸爾雅曰槄音滔山榎今之山楸楸小葉曰榎音賈大而皵音􅍎楸老乃皮麄散者爲楸也小而皵榎小而皮麄皵者爲榎漢書曰淮北滎南河濟之間千樹楸與千户侯等任昉述異記曰吴中有陸家白蓮種顧家班竹趙有韓氏酸􅀥中山有楸尸掌楸木者楸可爲什器漢書貨殖志有千樹楸樅七容反爾雅曰樅松葉松身郭璞注云今太廟梁用此木尸子所謂松栢之䑕不知堂室之有羙樅魯連子曰松樅髙千仞而無枝非憂王室無柱椒春秋運斗樞曰玉衡星散爲椒援神契曰椒薑禦温菖蒲益聦爾雅曰檓音毀大椒也今椒樹叢生實大者名爲檓也椒榝醜莍莍蓃子聚生成房貌今江東亦呼莍椒似茱茰而小赤色莍蓃音求搜山海經曰琴鼓之山其木多椒景山多􅁗椒毛詩椒聊曰椒聊刺晉昭公也君子見沃之盛彊能脩其政知其蕃衍盛大子孫將有晉國焉椒聊之實蕃衍盈􅂛役巳之子碩大無朋椒聊椒也陸機毛詩䟽義曰椒聊聊語助也椒樹似茱茰有針刺葉堅而滑澤蜀人作茶吴人作茗皆煑其葉以爲香今成臯諸近山間謂竹葉椒樹亦如蜀椒小毒熱不中合藥也可着飲食中用蒸雞豚佳香東海諸島上椒樹枝葉皆相以子長而不圎甚香其味似橘皮島山麞鹿食此椒葉其肉自然作橘香也又東門之枌曰貽我握椒椒芬香也續漢書曰天笁國出石蜜胡椒黒鹽孫卿子曰民之親我驩􅀂父母其好我芬􅀂椒蘭應劭漢官儀曰皇后稱椒房取其實蔓延盈􅂛以椒塗屋亦取其温煖張璠漢記曰桓帝竇皇后崩中常侍曹節王甫欲以貴人禮葬太尉李固自扶輿起擣椒自隨謂妻子曰􅀂太后不得配桓帝吾不生還矣魏氏春秋同異曰鍾繇嬖庻子㑹之母黜嫡夫人文帝命復焉繇恚忿飡椒致噤帝乃止齊書曰建武中王敬則於㑹稽反奉子恪爲名而子恪奔走未知所在始安王遥光勸上併誅髙武諸子孫於是並􅃙竟陵王昭胃等六十餘人入永福省令太醫煑椒二斛并命辦數十具棺材謂舎人沈徽孚曰椒熟則一時賜死期三更當殺之㑹上暫卧主書單携啓依旨斃之徽孚堅執曰事湏更審爾夕三更子恪徒跣奔至建陽門上聞驚覺曰故當未賜諸侯命耶徽孚以荅上撫床曰遥光㡬誤人事及見子恪顧問流涕諸侯悉賜供饌丗􅀃曰石崇以椒爲泥泥屋三君夫以赤石脂泥壁崔寔四民月令曰正月之旦進酒降神畢室家無大小次坐先祖之前子孫各上椒酒於家長稱觴舉白范子計然曰蜀椒出武都赤色者善􅁗椒出隴西天水細者善風土記曰三香椒欓薑離騷曰雜申椒與菌桂播椒房􅀆成堂布椒於堂上晉成公綏椒花銘曰嘉哉芳樹載繁其實厥味唯珎蠲除百疾肇惟歳首月正元日以介眉壽祈以􅀄吉晉劉臻妻陳氏正旦獻椒花頌曰璇穹周廽三朝肇建美哉靈葩爰採爰獻聖容服之永壽於萬木蘭漢書曰孝桓帝元嘉元年芝生後庭木蘭上神仙傳曰北海于君病􅋪見市賣公姓白問之公云明日木蘭樹下當見卿明日徃授素書二卷以消災救病無不愈者郭子橫洞􅁳記曰元封三年大􅁗國獻花蹄牛飴以木蘭之葉使方國貢此葉此牛不甚食食一葉則累月不飢任昉述異記曰木蘭川在㝷陽江中多木蘭樹昔吴王闔閭植木蘭於此用搆宫殿又曰七里洲中有魯班刻木蘭爲舟至今在洲中詩家所云木蘭舟出於此離騷曰䲻鴞集於木蘭􅀆又曰朝飲木蘭之墜露夕飡秋菊之落英夜合風土記曰夜合葉晨舒而暮合一名合昏甘棠爾雅曰杜甘棠今之杜黎杜赤棠白赤棠棠色赤白各異其名毛詩曰甘棠美召伯也蔽芾甘棠勿剪勿伐召伯所茇思其人愛其樹又杕杜曰有枤之杜生于道周杜赤棠也欓宋春秋曰義熈八年太社欓樹生于壇側欓尚黒也宋水德忽生此一樹櫟爾雅曰櫟其實梂有梂彚自裹毛詩晨風曰山有苞櫟櫟木也莊子曰匠石之齊至曲園見櫟杜樹曰是不材木故􅀂是之壽淮南子曰十二月官獄其樹櫟水經曰􅀂耶溪􅀌潭上有一櫟樹謝靈運與從弟惠連嘗遊之作連句題刻樹側橡後漢書曰李恂詣洛陽時歳荒司空張敏司徒魯恭等各遣子饋糧悉無所受徙居新􅀜下拾橡實以自資橡櫟實也晉書曰摯虞從惠帝幸長安及東軍來迎百官奔散遂流離鄠杜之間轉入南山中糧絶飢甚拾橡實而食之又曰司馬元顯之討􅁊􅀇于時楊􅁟飢虚運漕不継􅀇断江路啇旅遂絶於是公私匱乏士卒唯給桴橡􅀃苑曰莒穆公有臣朱厲附事穆公不見識焉冬處於山林食橡栗夏處於洲澤食菱藕穆公以難死朱厲附將徃死之其友曰子事君而不見識焉今君難吾子死之意者其不可乎朱厲附曰始我以爲君不吾知也今君死而我不死是果不知我也吾將死之以激天下不知其臣者遂徃死淮南子曰髙臺増榭接屋連桅非不麗也然而民無窟室狹廬所託於身者則明主不樂也肥膿甘脆非不香羙也然而民有糟糠橡栗不接於口者則明主不甘也抱朴子曰假榖於夷齊之門告寒於黔婁之家所得者不過橡栗緼􅄄必無太牢之膳衣狐裘矣太平御覽卷第九百五十八
