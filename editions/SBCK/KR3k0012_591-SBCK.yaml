body:
  text: 文部七御製上尚書臯陶曰帝庸作歌曰勑天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熈哉臯陶拜手稽首颺言曰念哉率作興事愼乃憲欽哉屢省乃成欽哉乃􆆷載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱隋哉萬事隳哉漢書曰髙祖還歸過沛置酒沛宫悉召故人父老子弟佐酒發沛中兒得百二十人教之歌酒酣髙祖擊筑自爲歌曰大風起兮雲飛揚威加海内兮歸故郷安得猛士兮守四方又曰武帝求賢詔曰盖有非常之功必待非常之人故馬或奔踶而致千里士或有􅀒俗之累而立功名夫泛駕之馬弛斥之士亦在御之而巳泛覆也方腫反弛廢也斥逐也其令州縣察吏民有茂才異等可爲將相及使絶國者又曰武帝幸河東祠后􅁟顧帝京欣然中流與群臣宴飲上歡甚乃自作秋風辭云秋風起兮白雲飛草木黃落兮鴈南歸蘭有秀兮菊有芳携佳人兮不能忘泛樓舡兮濟汾河橫中流兮揚素波蕭皷鳴兮發棹歌歡樂極兮哀情多少壯幾時兮柰老何後漢書東平憲王蒼傳曰顯宗以所自作光武本紀示蒼蒼因上丗祖受命中興頌上甚善之令校書郎賈逵爲之訓解又曰顯宗自制五家要􅀃章句令桓郁定於宣明殿華嶠書日帝自制五行章句此言五家即謂五行之家也魏志曰武帝御軍三十餘年手不捨書晝講軍䇿夜則思經傳登髙必賦遇物必詩及造詩􅀍之管弦皆成樂章魏志曰文帝行幸廣陵故城臨江觀兵戎卒十餘萬旌旗數百里帝馬上爲詩曰觀兵臨江水水流何湯湯戈矛成山林玄甲曜日光猛將懷暴怒膽氣正縱橫誰云江水廣一葦可以航不戰能屈敵戢兵稱賢良古公宅歧邑實始剪殷商孟子營虎牢鄭人懼稽顙充國務耕植先零自破亡興農淮甸間築室都徐方量運冝權略六軍咸恱康豈如東山詩悠悠多悲傷魏文帝紀曰帝好文學以著述爲務自所勒成垂百篇又使諸儒撰集經傳隨􅀋柤從凢百篇號曰皇覽晉書曰殷仲堪爲黃門郎孝武嘗示仲堪詩曰勿以巳才而􅀏不才宋書曰髙祖過彭城置酒命􅁓筆爲詩曰先蕩臨淄穢却清河洛塵華陽有逸􅂹桃林無伏輪於是群才並作也後魏書曰孝文帝雅好讀書手不釋卷五經之義覽之便講學不師授探其精奥史傳百家無不該涉才藻冨贍好爲文章詩賦銘頌有興而作有大手筆馬上口授及其成也不改一字自太和巳後詔䇿皆帝文也自餘文章百有餘篇三國典略曰周明帝㓜而好學詞彩温麗捃摭衆書自羲農巳來訖于魏末叙爲丗譜凢百卷所著文章十卷行於丗後周書曰明帝三年秋九月幸同州過故宅賦詩曰玉燭調秋氣金輿歴舊宫還如過白水更似入新豐霜潭漬晚菊寒井落踈桐舉盃延故老令聞歌大風梁書曰武帝賜張率詩曰東南有才子故能服官政余雖慙夙昔得人斯爲盛率氶詔徃復六首又曰髙祖製春景明志詩五百字勑在朝辭人沈約巳下同作髙祖以王僧孺詩爲工隋書曰陳禎明􅀄後主作新歌詞甚哀思令後宫羙人習而歌之其辭曰玉樹後庭花花開不復乆時人以歌䜟此其不乆兆又曰大業三年幸榆林啓民可汗奉觴上壽拜伏甚恭帝大恱賦詩曰鹿塞鴻旗駐龍庭翆輦廻氊惟望風舉穹廬向日開呼韓稽顙至休屠繼踵來索辦擎羶肉韋韝獻酒杯何如漢天子空上單于臺國朝傳記曰煬帝善屬文而不欲人出其右司􅀠薛道衡由是得罪後因事誅之曰更能作空梁落鷰泥否煬帝爲鷰歌行文士皆和著作郎王胄獨不下帝帝毎衘之竟坐此見害而誦其警句曰庭草無人隨意緑復能作此語耶又曰牛􅀪煬帝之在東宫也數有詩書遺􅀪􅀪亦有荅及嗣位之後嘗賜􅀪詩曰晉家山吏部魏丗盧尚書莫言先哲異竒才亦佐余學行敦時俗道素乃冲虚納言雲閣上禮儀皇運􅀄彞倫欣有叙垂拱事端居唐書曰太宗以武功定海内櫛風沐雨不暇於詩書洎于嗣業進引忠良銳精思政朝多孜孜求之􅀂不及數年之後天下晏和遂於聽覽之暇留精文史叙事言懷時有制作天才宏麗興記􅀇逺著作鄧隆請編次之詔不許又曰太宗著金鏡述以示群臣其辭曰朕以萬機暇日遊心前文仰六代之髙風觀百王之遺跡興亡之運可得言焉每至軒昊之無爲唐虞之至治未甞不留連賛詠不能巳矣及於夏殷末丗􅁗漢暴君使人凛然競懼如履朽薄然人君皆欲其永享萬乗之尊以垂百王之後而得失異迹興滅不同何也盖短於自見不聞逆耳之言至於滅亡終身不悟豈不懼哉觀理亂之本原足爲明鏡之鍳戒亂未常不任不肖理未嘗不任忠賢任忠賢則享天下之福用不肖則受天下之禍社稷臨危之主各師其臣􅀂使􅁴悟安有危亡之禍特由不留心於任使翻屬意於遨遊豈不哀哉以遨遊將爲任使以任使將爲遨遊豈不善哉古人言舜禹不愛於聲不貪於色予謂不然將爲愛也人云桀紂躭於聲色子將爲不好也何以然桀紂命不終於天年樂不終於一丗以此知爲不好也舜禹命壽於終樂畢於丗予謂之愛也且夫人有寛躁強柔之志愁樂貪慾之心性有善不善者也由是觀之堯舜禹湯躬行仁義治致隆平此禀其善性也幽厲桀紂乃爲炮烙之刑刳孕婦割人心斮朝渉脯􅀑侯造酒池糟丘爲長夜之飲此其受於不善之性也夫立身之道在於折􅂨不在於偏躭呉起曰昔桑氏之君脩德廢武以滅其國有扈之君恃衆好勇以䘮社稷仲尼曰寛濟猛猛濟寛仁義之道猶不得偏何况於左道乎况於不仁乎爲君之道處至極之尊以億兆爲心以萬􅀖爲意安民必以文德防邊必以武功孔子曰夫文之所加者深武之所服者大德之所施者愽則威之所制者廣不可以武威安民不可以文德備塞大鯨岀水必廢遊波之功鴻鵠沉泥定無凌空之効􅀂各令遂志並不失其能古人云構大厦者先擇木然後簡材治國者先擇佐然後定民大匠構屋必以大材爲棟梁小材爲榱撩苟有所中尺寸之木無棄此善理木者也非獨屋有棟梁國家亦然大德爲宰相亦國之棟梁也予思三代以來君有所好民必從之在上留心臺榭竒巧之人必至致情遊獵馳騁之人逺臻存意管􅁌鄭衛多進降懷脂粉燕趙斯來塞切直之路爲忠者少少開謟䛕之道爲佞者必多古人云君猶器也民猶水也方圎在於器不在於水以此而言足爲永戒夫玉不􅅣不成器人不學不知道仲尼好於郯子文王學於虢叔聖人且猶如此何况於凢人乎治主思賢如農夫之望􅀊哲后求人􅀂旱苗之思雨亂君嫉勝巳如讎視不肖如子懷之中心何日暫忘王莽僞行仁義之道有始無終孫皓權施恩惠之風有􅀄無末二子猶舡之汎巨浪毁在不遥􅀂駑焉之奔千里困其將至古人云􅂛量不以盛碩小智不可謀大巧詐不如拙誠信無謬矣有明主有暗主漢祖攝衣於酈生比干剖心於辛紂殷湯留情於伊尹龍逢􅀍戮於夏桀楚莊暇􅂩而懷憂武侯罷朝而含喜闇主護短而永愚明主思短而長善覩漢祖殷湯仰其有德行譬􅀂隂陽調四時㑹法令均萬民樂則騏驎呈其祥漢祖殷湯豈非騏驎之􅀋乎觀夏癸商辛嗟其悖惡之甚猶政令不行寒暄失序則猛獸肆毒螽螟爲害夏癸商辛豈非猛獸之儔乎予以此觀之豈非天道也雖曰天時抑亦人事成湯之丗有七年之旱剪髪爲犧千里雨降太戊之時桑穀生朝懼而脩德遂使十有六國重譯而來此豈非人事者也或云爲君難爲臣不易君處尊髙之位執賞罰之權録人之材因人之力何爲不成何求不得此言似易論之實難何者輕凌天地衆精顯其妖忽慢神靈風雨應其暴是以帝乙有雷震之禍殷紂致分砂之災多營池觀逺求異寳民不得耕女不得蚕田荒業廢兆庶凋殘見其飢寒不爲之哀覩其勞苦不爲之戚苦民之君也非治民之主也薄賦輕傜百姓家給上無急命之徴下有謳歌之詠屈一身之欲樂四海之民憂國之主也樂民之君也此其所以爲難也且用人之道又爲未易巳之所賢未必盡賢衆之所毀未必全惡知能不舉即爲失才知惡不黜則爲禍胎又人才互有長短不必兼通是以公綽優於大國之卿子産善爲小􅀖之相綘侯木訥卒安劉氏之宗嗇夫利口不任上林之令捨短從長然後爲羙夫人剛柔之情各異曲直之性不同不可不察也逆主耳而履道戮孔懷以安國周公是也順上心以安身隨君情而殺之易牙是也棄巳之命存君之身紀信是也挾國謀事以報公讎􅀽盎是也􅂢身而執節􅀌立而自毁屈原是也外顯和穆之端内懷湯火之意宰嚭是也忠謟之道以此觀之足以永鏡白起爲􅁗平趙乃􅀍昭王所殺亞夫定七國之亂卒爲景帝所誅文種設䇿滅呉翻遭越王之戮五貟竭誠爲國終罹賜劒之禍乃君之過也非臣之罪焉至如趙髙韓信黥布陳狶之儔此自貽厥釁非君之濫刑之也髙祖失於存功之能光武獲於置將之妙臣安君社稷之國君處臣危亡之地豈是相酬之道也爲天下之君處萬民之上安可易乎背道違禮非惟損已乃爲賢人之所􅀏卑身厲行實爲君子又爲凢夫之所譏越品進官其􅀋必爲深怨偏與人語衆以爲曲􅀻任使賢良則謂偶委伏凢才則言愚闇數言則謂太繁辭寡則謂道薄恣情忿怒則朝野戰慄留心寛恕則法令不行民樂則官苦官樂則民勞四海之内莫非王􅁟要荒爲枝葉畿内爲根本古人云皮之不存毛將安傅深根固本之内相而伊尹傅􅀃丗所希逢至如鎭積氷之塞守飛雪之邊而魏尚李牧當今罕遇遣人逺撫則眷戀而不忍􅉖而不遺則枝葉而不存二冝之間致心何所是以晨興夕􅅥無忘斯事爲上猶然何况臣下易云書不盡言言不盡意今畧陳梗槩以示心之所存耳古語云勞者必歌其事朕非故煩翰墨以見天藻但學以爲巳聊書所懷想逹見群賢不以爲嗤也又曰太宗思隋氏失道皇運開基因而序之以明誡愼神筆書石命工刻之以賜皇太子其詞曰昔隋季崩離天綱㢮紊波濤沸四海氣霧塞三光􅀑哭石言人怨神怒丁壯疲於兵甲老弱斃於飢寒㸑骨百城流血千里宮闕變爲禾黍中原化爲㓂塲余以弱齡屬當厄運思靜大難以濟蒼生秣馬揮戈風驅電掃尅平八表臨撫萬方聊因暇景載懷興亂歴想前代暗君庸王莫不恃其智力則輕侮聖賢騁其文才則不尊道德縱其口辯以飾非肆其姦言以拒諫昏迷酒色習近䜛邪暴疾􅀺元窮其轍跡傾危莫悟以至滅亡明鏡不逺於焉自鑒又曰魏徴葬日太宗登􅁐西樓臨路哭􅀕太宗復爲製碑文并御書公卿士庶競來摸冩車馬塡噎日有數千時人號其碑爲二絶文與書也又曰太宗幸積翠池宴五品以上太宗曰今兹年榖大登水潦不能爲害天下旣安邊方靜息因此農隙與公等舉酒酒旣酣各冝賦一事太宗賦尚書其詞曰日􅉴翫百篇臨登􅀍五典夏康旣逸預商辛亦流湎恣情昬主多尅巳明君鮮滅身資累惡成名由積善又曰太宗征髙麗廻次營州詔遼東戰死骸骨並集栁城東南有司設太牢以􅀕之大宗臨哭盡哀從臣無不流淚帝親爲文􅀕之曰忠烈盖世徃賢明䡄忘身徇國先哲良規惟􅈛等懷忠立節重義輕生奮劒提戈摧城䧟陣冐鋒刃而不頋赴湯火以如歸殞命戰塲殘形宼壘膏原潤􅃏身喪名存揺落寒關遂非生入蒼茫雷野無復餘蹤山川宛其不殊存亡䬃焉非昔然則身者今之所重名者後之所貴身乃常有而愚夫怯焉功則難立惟烈士成焉去一生之短期收千載之令譽此聖賢之操也豈直忠勇者乎所以按轡停輿撫膺一慟嘉乃誠節痛􅈛遺靈酒爼旣陳䰟其斯享又曰貞觀十一年太宗幸洛陽遣使􅀕漢太師楊震墓太宗自爲文曰惟君資華巖之竒氣禀金方之秀質艶忠篤以成性應時運而挺生彈冠賛務弼諧帝道正色立朝周行以肅坐槐爕理鼎餁載調值安德不昇政由近習氣舛玉衡日微黃道君􅁣然忠憤乃心王室昌言正議屢犯於逆鱗霜簡且繩志祛於時蠧而運屬陵夷道消賢哲不納嘉猷遂嬰嚴網方弘至治遽夭天年英傑云亡􅀖國彌瘁斯乃緬想髙蹤可爲長歎朕省方班瑞言事東廵瞻墳􅎬於道周想風徽於前代􅀂使九原可作吾將與歸千載如存依然何逺行潦致屬君其饗之又曰髙宗製元首前星維城股肱等誡以示侍臣禮部尚書弘文館學士許敬宗又上表請揔名爲天訓并請注解許之及注畢敬宗爲之序又曰咸亨中上自製樂章有上元二儀三材四時五行六律七政八風九宫十洲得一慶雲之曲以示群臣令太常行用之又曰咸亨中御書飛白書賛以賜中書門下三品户部尚書戴至德詞曰汎洪源俟舟楫中書侍郎郝處俊曰飛九霄假六翮吏部侍郎李敬玄曰資啓沃罄丹誠中書侍郎崔知悌曰竭忠節賛皇猷議者以戴郝寛厚而李崔忠勤故上以此言褒羙之又曰顯慶中上以琴中雅曲古人歌之近代巳來此聲頓絶令所司簡樂工解琴笙者脩習舊曲冬十月辛亥太常上書謹案禮記及家語云舜彈五弦之琴歌南風之詩是知琴操曲弄皆合於歌又張華􅀶物志云白雪是太帝使素女皷五十絃琴曲名又楚大夫宋玉對襄王云有客於郢中歌揚春白雪國中和者數十人是知白雪琴曲本冝合歌以其調髙人和遂寡自宋玉巳來迄今千祀未有能歌白雪曲臣今准勑依於琴中舊曲定其宫商然後教習並合於歌輙以御製雪詩爲白雪歌詞又按古今樂府奏正曲之後皆別有聲君唱臣和事彰前史輙取侍中許敬宗等奉和雪詩以爲送聲各十六節令悉教訖並皆諧韻上善之乃付太常編於樂府又曰􅀇宗製令長新誡一篇頒賜天下縣令其詞曰我求令長保義下人人之所爲必有所因侵漁浸廣賦役不均使夫離散莫保其身徴諸善理􅀉尔良臣與之革故政在惟新調風變俗背僞歸真教先爲冨惠恤於貧無大無小以躬以親青旌勸農其唯在勤墨綬行令孰不攸遵􅂚云􅀍之我澤如春又曰玄宗親製春臺望一章二十八句起居舎人蔡孚奏曰伏見所製氣雄詞羙德音相屬鄙炎漢之奢侈徇有唐之儉陋知作勞而居逸念中人之家産用心如此天下斯安臣職在司言請宣示百寮及編國史又曰端午日􅀇宗自賦詩曰端午臨中夏時清日復良鹽梅巳佐鼎麴蘖且傳觴事古人留迹年深縷續長當軒知槿荗向水􅁴蘆香億兆同歸壽群公共保昌忠貞如不替貽厥後昆芳又曰􅀇宗幸寧王憲宅與諸王宴探韻賦詩上詩曰魯衛情先重親賢受轉多冕旒豐暇日乗景蹔經過戚里申髙宴平臺奏雅歌復㝷爲善樂方驗保山河又曰天寳八載九月甲午是日皇太子生日上製仁孝詩六章親札於歩障以賜太子令中官髙力士以示朝臣太平御覽卷第五百九十一
