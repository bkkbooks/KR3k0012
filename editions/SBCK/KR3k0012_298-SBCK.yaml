front:
  text: 太平御覽卷第二百九十八
  hash: sha256:6f2d0616455690875d1e7b85d4f04f27425a4defb25cc7966d01292af95e44ee
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_298-1a}
body:
  text: 兵部二十九軍制偏將軍制禮記曰六十不豫服戎師出不踰時爲怨思也踰時即内有怨女外有曠夫周禮曰五人爲伍五伍爲兩四兩爲卒五卒爲旅五旅爲師五師爲軍鄭􅀇曰兩二十五人卒百人旅五百人師二千五百人軍萬二千五百人也漢書武紀曰建武元年春二月赦天下賜民爵一級年八十復二筭九十復甲卒張晏注云復甲卒不豫革車之賦也白虎通曰王命法三十受兵六十歸兵國有三軍何以誡非常伐無道尊宗廟重社稷安不忘危何以言有三軍也論語云子行三軍則誰與詩云周王于邁六師及之三軍者何法法天地人也以爲五人爲伍五伍爲兩四兩爲卒五卒爲旅五旅爲師師二千五百人二師爲一軍三軍六師萬五千人也傳曰一人必死十人不能當百人必死千人不能當千人必死萬人不能當萬人必死横行天下雖有萬人猶謙讓自以不足故復加五千人因法月數月羣隂之長也十二月足以窮盡陰陽備物成功萬二千人亦足以征伐不義致天下太平榖梁傳曰天子六軍諸侯上國三軍次國二軍下國一軍諸侯所以一軍者何諸侯藩屏之臣也任兵革之重距一方之難故得有一軍也淮南子曰季武子爲三軍爲作也武子魯卿季文子之子季孫夙也周禮天子六軍諸侯大國三軍魯伯禽之封舊有三軍其後削弱二軍而巳武子欲專公室故欲益中軍爲三三家各征其一事在魯哀公十一年叔務穆子曰不可天子作師公帥之以征不德師謂六軍之衆公謂諸侯爲王卿士者爲元帥也元侯作師卿帥之以承天子元侯大國之君師三軍之衆大國三卿皆命於天子一卿命於其君無軍無三軍也􅀂元侯有事則命卿帥其所敎武衛之士以佐元侯禮所云次國二軍小國一軍謂以賦岀軍從征伐賛佐也自伯子男有大夫無卿無卿無命卿也王制小國二卿皆命於其君也帥賦以從諸侯賦國中出兵車甲士以從大國諸侯是以上能征下無姦慝征正慝惡今我小侯也言小侯削弱之日乆矣處大國之間大國齊楚繕貢賦以共從猶懼有討猶懼以不結見誅討􅀂爲元侯之所之所謂作三軍元帥所爲以怒大國無乃不可乎弗從遂作中軍中者明巳有上下軍自是齊楚代討於魯代更襄昭皆如楚襄公昭公如楚朝事楚也穰苴兵法曰五人爲伍十五爲隊一軍凢二百五十人隊餘竒兵隊七十有五以爲中壘守地六千尺積尺得四里以中壘四面乗之一面得地三百歩壘内有地三頃餘百八十歩正門爲握竒大將軍居之六纛五麾金鼓府藏輜積皆中壘外餘八千七百五十人隊一百七十五分爲八陣六陣各有一千九十四人六陣各減一人巳爲一陣之部署舉一軍則千軍可知九兵者有四正四竒或合而爲一或離而爲八陣故以正合以奇勝通典曰毎軍大將一人别奏八人傔十六人副二人分掌軍務奏傔減大將半判官二人典四人揔管四人二主左右虞候二主左右押衙傔各五人在衙官下子將八人委其分行陣辨金鼓及部署傔各二人執鼔十二人吹角十二人司兵司倉司􅀐司胄城局各一人毎隊五十人押官一人隊頭一人副二人旗頭一人副二人火長五人六分支甲四分支戰􅂁一分支槍又曰周制萬有二千五百人爲軍軍將皆命卿二千有五百人爲師師帥皆中大夫五百人爲旅旅帥皆下大夫百人爲卒卒長皆上士二十有五人爲兩兩司馬皆中士五人爲伍伍皆有長軍師旅卒兩伍皆衆名伍一比兩一閭卒一旅旅一黨師一州軍一郷家所出人也按司馬法二十五人爲兩四兩爲卒百人也五卒爲旅五百人五旅爲師二千五百人五師爲軍一萬二千三百人萬二千象十有二月五百象閏管子言於齊􅁊公曰欲正卒伍脩兵甲則大國亦將爲之君有征戰之事則小國有守圉之備矣公欲速得意於天下諸侯則事有所隱而政有所寓不顯習於兵事故曰事有所隱軍政寓之田獵故有所寓公作内政而寓軍令焉三分齊國爲髙子之里爲國子之里爲公之里以爲三軍擇其賢民使爲里君毎里皆使賢者爲君郷有行伍卒長則有制令且以田獵因以賞罰因曰獵之功過寄行賞罰則百姓通於軍事矣於是乃制五家以爲䡄䡄爲之長十䡄爲里里有司四里爲連連爲之長十連爲郷郷有良人以爲軍令是故五家爲䡄故五人爲䡄軏長率之十䡄爲里故五十人爲小戎里有司率之四里爲連故二百人爲卒連長率之十連爲郷故二千人爲族郷良人率之三軍故有中軍之鼓中軍則公之里卒也有髙子之鼓春以田曰蒐振旅因寓軍政而且整旅秋以田曰獮理兵順殺氣因理兵是故卒伍定於里軍政定於郊内敎旣成令不得遷徙故伍之人人與人相保家與家相受少同居長同游􅀕祀同福死喪相恤災禍同憂居處同樂行作同和哭泣同哀是故夜戰其聲相聞足以無亂晝戰其目相見足以相識歡欣足以相死是故以守則固以戰則勝君有此敎士三萬人以横行於天下敎士謂先敎習之士又曰凢立軍一人曰獨二人曰比三人曰叅比叅曰伍伍人爲列列有頭二列爲火十人有長立火字子五火爲隊五十人有頭二隊爲官百人立長二官爲曲二百人立􅀱二曲爲部四百人立司馬二部爲校八百人立尉二校爲禆千六百人立將軍二禆爲軍三千二百人有將軍副將軍唐書曰髙祖起義兵命太宗將兵徇西河郡下之癸巳建大將軍府以裴寂爲長史劉文静爲司馬具設官屬始置三軍分爲左右以公子建成爲隴西公左領大都督左三軍悉􅀠焉命太宗爲燉煌公右領大都督右三軍悉􅀠焉開倉庫以賑窮乏逺近響應又曰髙祖二年秋七月壬申詔曰天生五材司物資其器用武有七徳撥亂所以定功故黄帝垂衣尚有阪泉之戰放勛光宅猶稱丹浦之師禁􅁀安人率由兹道創業垂統莫此爲先以是周置六軍毎習蒐狩漢増八校畢選驍勇故能化行九有威震百蠻姧宄不興䖍劉息志季葉凌替軍政湮亡卒利不修旌旗舛雜部伍符籍空有調發之名逗撓之興竟無討襲之用遂使夷狄放命盗賊交侵戰争多虞黔􅀺殄喪朕受天明命撫育萬方爰自義師克成帝業至如超乗之士莫匪百金彀􅀐之材豈唯七萃今雖􅀜塞寜謐荒裔肅清伊洛猶蕪江湖尚梗役車未息戎馬載馳武備之方尤冝精練所以各因部校序其統屬改授鋋鼓創造徽章取象天官定其名號庶使前茅後勁􅀋別區分玉帳絳宫刑德允備蹈兹湯火譬彼椒蘭大定戎衣止戈斯在於是置十二軍分關内諸府以􅀠焉萬年道爲叅旗軍長安道爲鼓旗軍冨平道爲􅀇戎軍醴泉道爲井􅃏軍同州道爲羽林軍華州道爲􅀐官軍寧州道爲折威軍􅄮州道爲平道軍幽州道爲招揺軍西麟道爲􅁐游軍涇州道爲天紀軍冝州道爲天節軍時髙祖以天下未定實資武力將舉􅀜中之衆以臨四方故興此制也毎軍一人副一人取威名素重者爲之督以耕戰之務自是士馬精強無敵於天下矣五代周史曰顯德􅀄丗宗自髙平還乃大閱帝親臨之帝自髙平之役覩諸軍未甚嚴整遂有退却至是命太祖皇帝一槩簡閱選武藝超絶者署爲殿前諸班因是有散貟散指揮内殿直散都頭鐵􅀐控鶴之號復命揔戎者自龍捷虎捷以降一一選之老弱羸小者去之諸軍士伍無不精當由是兵甲之盛近代無比偏將尚書曰司馬掌􅀖政統六師平􅀖國左傳曰趙朔趙嬰齊爲中軍大夫鞏朔韓穿爲上軍大夫荀息趙同爲下軍大夫韓厥爲司馬又曰晉侯請於王戊申以紱冕命士㑹將中軍且爲太傅命郷之服於是晉國之盗逃奔于齊又曰楚子北師次于郔沈尹將中軍子西將左子反將右將飲馬於河而歸又曰魯宣公十年夏六月晋師救鄭荀林父將中軍先縠佐之士㑹將上軍郄克佐之趙朔將下軍欒書佐之公羊曰秋衛師入盛昌爲或言帥師或不言帥師將尊師少稱將將卑師衆稱師論語曰王孫賈治軍旅奚其喪衛靈公無道得賈免喪也史記項羽本紀曰於是梁爲㑹稽守籍爲禆將又曰項王召宋義與計事而大􅀃之因置以爲上將軍項羽爲魯公爲次將范増爲末將又灌嬰傳曰嬰擊陳狶受詔別攻狶丞相侯敝斬敝及特將五人文頴注云特一之將後漢書西域傳曰大秦國一名梨鞬所治城周百餘里各有官曹文書置三十六將皆㑹議國事晉書曰張光字景武江夏鐘武人也身長八尺明眉目美音聲少爲郡吏家丗有部曲以牙門將伐呉有功遷江夏西部都尉又曰羊祜在軍常輕裘緩帶身不􅀍甲鈴閤之下侍衛者不過十數人而頗以田漁廢政甞欲夜出軍司徐胤執棨當營門曰將軍都督萬里安可輕脫將軍之安危亦國家之安危也胤今日若死此門乃開耳祜改容謝之此後稀出矣又曰吾彦爲小將級呉大司馬陸抗抗竒其勇略將拔用之患衆情不允乃㑹諸將密使人佯狂􅋞刀跳躍來坐諸將皆懼而走惟彦不動舉几拒之衆服其勇乃擢用焉又天文志曰太白爲上將羽林爲中軍又曰文昌六星在北斗魁前天府之六星也一曰上將建武威二曰次將尚書中書司􅀠賞功也又曰郎將位北主閱旗所以爲武備也又曰畢八星主邊兵弋獵其大星曰天髙一曰邊將又曰參白獸之體其中三星横列三將也北曰左肩主左將西北曰右肩主右將故黄帝占參應七將七將大天下兵精又曰南三星􅀐陣將軍􅀐將也南三星車􅀐車􅀐之將也又曰狼一星在東南狼爲野將主侵掠也色有常欲不動也後周書曰賀拔岳事尔朱榮以定䇿功授前將軍時万俟醜奴僭稱大號關中騷動朝廷深以爲憂榮將岳討之岳私謂其兄勝曰醜奴擁􅁗隴之兵足爲勍敵若岳徃而無功罪責立至假克定恐䜛愬生焉勝曰汝欲何計自安岳曰請尔朱氏一人爲元帥岳副貳之則可矣勝以爲然乃請於榮榮大恱乃以天光爲雍州刺史以岳爲衛將軍左都督隋書曰大業九年徴天下兵募民爲驍果置折衝果毅武勇雄武等郎將官以領驍果唐書曰李質者汴之牙將李㝏旣爲留後􅀝質爲心腹及朝廷以㝏爲郡守㝏志邀節􅃏質勸諭不從㑹㝏疽發首乃與監軍姚文夀謀斬㝏傳首京師有詔以韓充鎮汴充未至質權知軍州事使衙兵二千人皆日給酒食物力爲之損屈充將至質曰若韓公始至頓去二千人日膳人情必大去􅀂不除之後當無繼不可留此弊以遺吾帥遂處分停日膳而後迎充太平御覽卷第二百九十八
