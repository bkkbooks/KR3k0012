front:
  text: 太平御覽卷第五百五十八
  hash: sha256:b921a4e6685ec359f5d5abf4db8b5e1d2bd599c26e748df57f539b291add5850
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_558-1a}
body:
  text: 禮儀部三十七冢墓二宋書曰王􅀇謨從弟􅀇象位下邳太守好發冢地無完椁時人間垣内有小冢墳上殆平毎朝日􅀄升見一女子立冢上近視則亡或以告􅀇象便命發之有一棺尚全有金蚕銅人以百數剖棺見一女子可二十姿質􅀂生卧而言曰我東海王家女應生資財相奉幸勿見害女臂有玉釧斬臂取之於是女復死又曰大明三年孝武幸籍田經􅀽湛墓使致􅀕増守墓五户又曰何承天􅀶見古今爲一時所重張永甞開􅀇武湖遇古冢冢上得一銅斗有柄文帝以訪於朝士承天曰此亡新威斗王莽時三公亡皆賜之一在冢外一在冢内時三台居江左者唯甄邯爲大司徒必邯之墓俄而又啓冢内更得一斗復有一石銘云大司徒甄邯之墓又曰張􅁉曽祖澄當葬父郭璞爲占墓地葬某豦年過百􅀊位至三司而子孫不蕃某豦年幾减半裁卿校而後累丗貴顯澄乃葬其劣豦位至光禄年六十四而亡其子孫遂昌又曰周山圗爲淮南太守時盗發桓温冢大􅀗寳物客􅀼取以遺山圗山圗不受簿以還官齊書曰栁丗隆曉數術於倪塘創墓與賔客踐履十往五往常坐豦及卒墓工圗墓取其坐豦焉又曰王倫之爲豫章太守下車􅀕徐孺子許子將墓又曰􅀄荀伯玉微時有善相墓者謂其父曰君墓當丗暴貴者但不得乆耳又出失行女子伯玉聞之曰朝聞道夕死可矣頃之伯玉姑當嫁明日應行今夕逃隨人去尋求不能得後出家爲尼伯玉卒敗亡又曰冨陽人唐㝢之僑居桐廬父祖相傳啚墓爲業㝢之自云其冢墓有王氣山中得金轉相誑惑永明二年冬㝢之聚黨遂䧟冨陽至錢塘又曰始興王鑑鎮蜀於州園地得古冢無復棺但有石椁銅器十餘種並古形玉璧三枚珎寳甚多不可皆識金銀爲蚕形者數斗又以朱砂爲阜水銀爲池左右咸勸取之鑑曰皇太子昔在雍有發古冢者得玉鏡玉屏風玉匣之屬皆將還都吾意常不同乃遣功曹何佇之爲起墳諸寳物一不得犯又曰宜都王鑑鎭姑熟于時人發桓温女冢得金巾箱織金􅑪爲嚴器又有金蚕銀蠒等物甚多條以啓聞欎林勑以賜之鑑曰今取往物後取今物如此循環豈可熟念使長史蔡約自徃脩復纎毫不犯又曰文惠太子鎮雍州有盗發古冢者相傳云是楚王冢大􅀗寳物玉履玉屏風竹書青絲綸簡廣數分長二丈皮節如新有得十餘簡以示王僧䖍云是科斗書考工記周官所闕文也南史曰齊前將軍陳天福坐討唐寓之於錢塘掠奪百姓財物棄市先是天福將行令家人預作壽冢未至東又信催速就冢成而得罪因以葬焉梁書曰丁貴嬪薨昭明太子遣人求得善墓地將斬草有賣地者因閫人俞三副求市􅀂得錢三百萬與之三副密啓武帝言太子所得地不如今所得地於帝􅁻帝末年多忌便命市之葬畢有道士善圗墓云地不利長子􅀂厭伏或可申延乃爲蠟鵝及諸物埋墓側長子位有宫􅁥鮑邈之魏雅者二人􅀄並爲太子所愛邈之晚見踈於雅宻啓武帝云雅爲太子厭禱帝宻遣檢􅀧果得鵝等物大驚將窮其事徐勉固諌得止唯誅道士又曰蕭斆太清􅀄爲梁州長史梁州有古墓名曰尖冢或云張騫墳欲有發者輙聞鼓角與外相拒堆埋者懼而退斆謂無此理求自􅁥督及開唯有銀鏤銅鏡方尺唐書曰代宗時號州刺史王竒光上言閿郷縣女媧墓去天寳末失所在今一夜河上側近忽聞風雷声曉見其墓踊出上有􅀟栁樹下有巨石其栁各髙丈餘又曰天后西幸京師路經楊􅀇感墓上誦李百藥過玄感墓詩云劒有萬人敵文爲一代英除昏志不遂僣亂道難平歎曰百藥唯解綴文不識大義又曰韓恩復則天朝爲太常慱士定南郊儀注云太妃鼓吹排羣邪守大體國家頼之睿宗朝爲給事活嚴善思於雷霆之下拒武三思於䧟附之中􅀇宗御筆題碑云有唐忠孝韓長公之墓又曰伊愼兖州人善􅀐始爲果毅喪母將營合附不識其父之墓晝夜號哭未浹日夢寐有指導焉遂發壠果得舊記驗又曰盧坦爲侍御史㑹李錡反有司請毀錡祖父廟墓坦甞爲錡從事乃上言曰淮安王神通有功於草昧且古之父子兄弟罪不相及況以錡故可累五代祖乎乃不毀因賜神通墓五戸以備洒掃白虎通曰春秋之義王者墳髙三仞樹以松諸侯半之樹以栢大夫八尺樹以欒士四尺樹以槐庶人無墳樹以楊栁晏子曰梁丘據死景公召晏子告之據曰忠臣愛我欲厚葬之髙大其壟晏子對曰不可公遂止列子曰燕人長於楚老而還過晉國同行者給之指城曰此燕國之城其人愀然變容指社曰此􅀂里之社􅀂猶汝也乃喟然而歎指舎曰此君先人之廬乃泫然而泣指壠曰􅀂先人之冢其哭不自禁同行者啞然大􅀏曰余等給君乃晉國耳其人慙及至燕國之城社眞見先人之廬冢悲心更微􅀓子曰太原民發冢破棺中有婦人將出與語生人也視其冢上木三十􅀊不知此婦人三十􅀊常生地中也將一朝欻然生偶與發冢者㑹也抱朴子曰呉景帝時於江陵掘冢取板治城後發一大冢内有重閤石扉皆樞轉開閇四周徼道通事具髙可乗馬又鑄銅爲人數十枚長五尺皆大冠衣執劒列侍靈坐皆刻銅人背後石壁言殿中將軍或言侍郎似公王冢也破其棺棺中有人􅁂巳班白鮮明靣體如生人棺中有白玉壁三十枚藉尸兵人舉出死人以􅀝冢壁一玉長一尺形似冬􅀲從死人懷中出墮地兩耳中及鼻中有黄金如􅀥此則骨骸有假物而不杇之効也吕氏春秋曰丗之爲丘壟也其大􅀂山其樹􅀂林以此觀丗示冨則可矣以此爲死則不可自古及今未有不亡之國者則是無不掘之墓也是故大墓無不掘者而丗争爲之豈不悲哉堯葬於􅂖林通樹枝舜葬於紀市不變其肆禹葬於㑹稽不變人徒是故先王以儉葬也非愛其費非惡其勞以爲死者虚也越絶書曰宋大夫華元冢在華原陳留小黄縣城北呉越春秋曰虎丘者呉王闔閭墓也下池廣六十歩􅀷一丈五赤銅椁三重中池廣六尺金鴈玉鳬諸膓魚膓之劒以送焉取士臨海潮千萬人築治之以葬後金精上地爲白虎據墳故以爲虎丘越傳曰禹到大越上苗山更名山曰㑹稽因死葬焉穿壙􅀷七尺上無寫泄下無流水壇髙三尺土階三等周方一􅅿華陽國志曰周失綱紀蜀先稱王有名􅅙藂其目縱死作石階石棺國人化之故俗以石棺椁爲縱目人冢又曰蜀有五丁能移山舉萬鈞其王薨輙立大石長三丈重千鈞爲墓志又曰蜀遣使朝􅁗􅁗惠王許嫁五女於蜀蜀遣五丁力士奉迎虵山崩同時壓殺五丁及􅁗五女蜀王痛傷命曰五婦冢今其人或名五丁冢又曰武都有一丈夫化爲女子美而艶盖山精也蜀王納爲妃不習水土欲去王必留之乃作東平之歌以樂之無幾殁故王哀之乃遣五丁之武都擔士爲妃作冢三輔决録曰竇后父名猗遭􅁗亂隱身鈎魚墜淵而卒后登尊號遣使者於父墜所築起大墳丗􅀃曰戴公見林法師墓曰德音未逺而拱木巳積冀神理綿綿不與氣運俱盡耳又曰黄􅀄末呉人發長沙王呉芮冢以其材於臨湘爲孫堅立廟容良如生衣服不朽後預發者見綱曰君何􅀋長沙王芮但微短耳綱瞿然曰是先祖也自芮之卒至冢發四百餘年綱芮之十六丗孫也又曰有人相羊祜應出受命君忌其言遂使掘斷墓後以壞之相者云墓勢相讓猶有折臂三公俄而祜墜馬折臂後至三公又曰郭景純過江居于曁陽母亡安墓不盈百歩時人以爲近水景純曰將當爲陵今沙漲去數十里皆爲人居家桑田慱物志曰漢末發范明友冢奴猶活明友是霍光女聓奴記言光家事廢立之際多與漢書相應又曰漢末有發前漢時宮人冢者宫人獨活旣出平如復舊列士傳曰羊角哀葬友人在栢桃與荆將軍冢比他日角哀夢栢桃語巳曰蒙子之恩而􅀗原厚葬荆將軍自以豪欲役伏吾吾不聽與連戰不勝期十五日大合戰以決勝負得子則勝不得則負矣角哀至期日陳兵詣其冢上三輔决録曰趙嘉年三十餘有重疾七年不樂乃爲令勑兒曰丈夫生一丗豦無箕山二公之操仕無伊摰吕尚之勲天不我與復何言哉聊立一圎石樹吾墓前刻之曰漢有逸民姓趙名嘉有志無時命也柰何後病愈楚國先賢傳曰李善字次孫南陽人也夲同縣李元蒼頭建武中元家死没唯􅀌兒續始生善親自哺養丗祖拜善及續並爲太子舎人善顯宗時辟公府以能治劇再遷日南太守從京師之官道經南陽李元冢未至一里乃脫服持劒去草及拜墓􅂘泣甚悲身炊爨自執姐鼎以脩􅀕楊雄家諜曰子雲天鳯五年卒葬安陵阪上所厚沛郡桓君山平陵如子禮弟子鉅鹿侯子芭共爲治喪諸公遣丗子朝郎更行事者㑹送桓君止爲歛􅉠起祠塋侯芭負土作墳號曰􅀇冢七略曰楊雄死弟子共爲起冢號曰楊冢趙歧別傳曰歧字臺卿年九十餘建安六年卒先自爲壽藏圖季札子産晏嬰叔向四像居賔位又自像其像居主位皆爲讃頌勑其子曰我死之日墓中聚沙爲牀布簟白衣散髮其上覆以單􅀍即曰便下下訖便掩王子年拾遺記曰舜葬蒼梧之野有鳥如丹雀自丹州而來􅄍五色之氣氣如雲白日慿霄雀能羣飛衘土以成墳太平御覽卷第五百五十八
