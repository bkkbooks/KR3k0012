body:
  text: 人事部八十八品藻下孔叢子曰子髙謂魏王曰臣入魏見君二計臣張叔謀有餘范威智不逮然其功一也王曰叔也有餘威也不逮可得同乎荅曰駑􅂹同轅伯樂爲之咨嗟玉石相糅和氏爲之歎息故賢愚共貫則能士匿謀眞僞相錯則智士結舌雖有餘猶不逮也又曰東里閭空腹而好自賢欲自親於子順子順弗下曰夫東里閭外質頑拙有似踈直内懷虚妙非丈夫之節􅀂其度骸稱膚面目􅁂眉實羙於人也聖人論士不以此爲貴者無益於德故也又曰宫他見子順曰他困於貧賤欲自託冨貴之門庶克濟乎子順曰夫冨而可以託貧貴而可以􅀉賤者天下寡矣非信義君子明識通逹則不可所欲託者誰也宫他曰將適趙公子順曰非其人矣雖好養士奉而巳終不能稱也宫他曰將之燕相子順曰彼從兄弟甥舅各濟其私無求賢之志不足歸也宫他曰將之齊田氏子順曰齊大國也其士大夫皆有多黨之心不能容子也他曰然則何向而可子順曰濟子之欲則冝􅀂后成子可也又曰魏安􅁵王問子順曰馬回之爲人雖少文桓桓亮直丈夫之節吾欲以爲相可乎荅曰知臣莫􅀂君何有不可至於亮直之節臣未明也何故荅曰聞諸孫卿其爲人也長目而永視者必體方而心圎毎以其法相人千百不失臣見回非不偉其體幹然甚疑其自王卒用之三月王果以䧟得罪淮南子曰管子文錦也雖醜登廟相桓公以覇功成事衣文錦之服大書在明堂故曰雖醜登廟也子産絹染也羙而不尊子産相鄭以乗車濟朝渉者孟子曰惠而不知爲政絹染者以子産喻母人月令曰命婦宫染絹温䁔其民如人之母也􅀽子正書曰孔子稱蘧伯玉國無道可卷而懷也今李膺居濁丗之中皦然與丗殊塗此西山餓夫之疇耳卒死於非罪惡得爲雅人又曰李膺言出于口人莫得違也有難李君之言者則郷黨非之李君子與人同輿載則名聞天下又曰或云少府楊阜豈非忠哉荅曰然可謂直士忠臣則吾不知也夫爲人臣見人主失道指其非而播楊其惡可謂直士未爲忠臣故司空陳羣則不然其談論終日未甞言人主之非書數十上而外不知君子謂陳羣於是乎長者姚信士緯曰論清髙之士上可如老子莊周下可如君平子貢耳􅀂於陵仲子及嚴遵夏甫子治未可盡以爲師矣平議之士􅀂季札趙武逮于林宗皆可盡爲則也其洩冶伯宗及末丗史雲子將之屬皆羙而未善也聖人考功黜陟猶以三載而子將月旦之處史雲睚眦廢人其觀進者或飾虚其怠沮者皆離叛識誠可謂妙矣然非洙泗之風三千之􅀪化又曰延陵季子際㑹之間衛尉蔡君限之於弱余必以然季子通妙逹道之機假其討光恐増禍亂受光之譲非其夲志􅀂季子之爲君也欲行王道其與周爭治霸術以力與列國爭強則不肯破強楚而并其封疆也國人疾光而心歸季子季子不立社稷將傾恐光憂迷內灼而異圖外生非常之變將加于髙人是以季子相時慮事順以安民而謂其弱未聞厥㫖蔡子荅曰諸兄以賢譲國與之兾能楊文武之遺敎崇仁義之羙化以移風昜俗耳何必當與周爭乎而茍守一節退耕於野使還國無討賊之意反云國家有主社禝有祀乃吾君也蓋開簒弑之路非所謂從忠敎也又曰楊子雲有􅀷才潛知屈伸沉浮從容􅀇黙近于柳下惠朝隱之風智似蘧瑗而髙不及也班固稱之有大度不孜孜於富貴不戚戚於貧賤二者之美蓋亦良矣然楊子之書清貴甚逺然無廟堂之議對王公大人之辭故令其骨鯁不見節操不顯也夫孟子之書將門人所記非自作也故其志行多見非唯敎辭而已或扼方鍾之禄或辭兼金之贈或以周漢禮殊二子時異不可責之於周或曰帝納異言而子雲無正論卒有投閣之累孟軻昻昻其肯然子雲保家飬智之士孟軻鳯峙髙丗之英也又曰周勃之勲不如霍光此前史所載較然可見而人以勃功大於光意􅀼不安何者勃夲帝大臣居太尉之位擁兵百萬旣有陳平王陵之力又有朱虚諸王之據酈􅀉遊􅀃以譎諸吕因衆之心易以濟事􅀂霍光者以倉卒之際受􅀉託之任輔弼㓜主天下晏然遇燕王上官之亂誅除凶逆以靖王室廢昌邑立宣帝任漢家之重隆中興之祚叅聲伊周爲賢相推驗事校優劣明矣又曰汝南陳仲舉體氣髙烈有王臣之節頴川李元禮忠平正直有社稷之能海内論二士有議而未決陳留蔡伯喈云仲舉強於犯上元禮長於接下犯上爲難接下爲易仲舉爲先元禮後矣天下於是爲定愚思􅀼以伯喈未必可從也夫臯繇戒舜犯上之徴也舜治百揆接下之效也故陳平謂王陵言面折廷爭我不如公至安劉氏公不如我而犯上則爲優是王陵當髙於良平朱雲殊乎呉鄧矣陸恭仲荅曰陳李二君德齊於行才等於身無長短之差時人或其先後魏文帝典論曰或有方周成王於漢昭帝者余以爲周氏體聖考之作氣禀賢妣之胎敎周邵爲保傅吕尚爲太師故咳􅀏必含仁義之聲􅀚聽必覿禮義之容􅀪踐祚之義隆太平之化禮樂興於上頌聲作於下時成王年二十二享國三十年丗永治長德與年豐夫孝昭父非武王母非邑姜體不承聖化不胎育保無仁孝之德佐無隆平之治所謂生􅀷宫中長婦人手矣德與體并智與性成孝昭之崩年二十有一承衰􅁦之丗牧彫落之民臣無淑聖之智身有短折之期欲髙隆周豈不謬哉曹植漢二祖論曰髙祖因􅁀􅁗而起官由亭長自亡徒招集英雄遂誅強楚光有天下功齊湯武業流後嗣誠帝王之元勲人君之盛事也直寡善人之美稱鮮君子之風采惑􅁗宮而不出窘項座而不起計失乎酈生忿過乎韓信太公是誥於孝違矣敗古今之大敎傷王道之實義然其驍將藎臣皆古今之鮮有而能任其才而用之聽其言而察之故兼天下而有帝位也不然斯不免當丗之妄夫丗祖體乾靈之休德韜亞聖之才聦逹而多識樂施而愛人神光前驅威風先逝軍未出於南京莽巳斃于西都當此時也九州鼎沸四海淵涌言帝者二三稱王者四五咸鴟視狼顧虎超龍驤光武秉朱光之臣􅃏震赫斯之隆怒盪滌凶穢勦除醜􅀋􅀂勁風而縱烈火曬白日而掃朝雲也計功則業殊比隆則事異語德則靡諐言行則無穢卒能立不刋之遐跡建不朽之元功故曰光武其近優也曹檀成王論曰周公以天下初定武王旣終而成王尚㓜未能定南面之事是以推巳忠誠稱制假號二弟流言邵公疑之發金縢之匱然以用寤亦未決也至於昭帝所以不疑於霍光亦縁武帝有遺詔於光使光􅀂周公踐天子之位行周公之事吾恐叛者非徒二弟疑者非徒邵公也且賢者固不能知聖賢自其冝耳昭帝固可不疑霍光周王自可疑周公也􅀂以昭帝勝成王霍光當踰周公耶􅀂以堯舜爲成王湯禹作管蔡邵公周公之不見疑必也陳羣汝潁士論曰羣以爲孔氏先汝潁士勝􅀒之評矣孔荅曰汝南戴子髙親止千乗万􅀐與光武帝共揖於道中潁川士雖抗節未有能頡頏天子者也汝南許子伯與友人共􅀃丗俗將壞同夜起舉聲號哭潁川士雖頗憂時未有能􅂘丗者也汝南許椽敎太守劉晨圖開稻陂灌數万頃累丗獲其功韓元長雖好地理未成功見效如許􅁺者也汝南張元伯身死之後見夢於范巨卿頴川雖有竒異未有􅀑神能靈者也汝南應丗叔讀書五行並下頴川士雖多聦明未有能離婁並誦者也汝南李鴻爲太尉􅁺弟殺人當死鴻自􅅞詣門乞代弟命使飲鴆而死弟因得全潁川士雖欲尚節義未有能煞身成仁者也汝南翟文仲爲東郡太守始舉義兵以誅王莽潁川士雖疾惡未有破家爲國者也汝南􅀽公著爲甲科郎中上書欲治梁兾潁川士雖務忠讜未有能没命直言者也何晏兾州論曰略言春秋以來可與海内比而校也恭謹有禮莫賢乎趙衰仁德忠義莫賢乎趙盾納諌服義莫賢乎韓起決危定國莫賢乎狐偃勇謀經國莫賢乎魏絳逹讎爲主莫賢乎祁奚延譽先主莫賢乎張老明智識物莫賢乎趙武清直篤義莫賢乎叔向聦明肅恭莫賢乎羊舌職守信不移莫賢乎荀息見利思義莫賢乎中行穆子憂國扞君莫賢乎先􅎮書法不諱莫賢乎董狐分謗和衆莫賢乎郄克流放能顯莫賢乎兾缺抜幽進滯莫賢乎曰季守義死節莫賢乎欒恭子坑言不屈莫賢乎荀瑩刼略不動莫賢乎解楊審聽知機莫賢乎師曠放而益顯莫賢乎狼曋儒雅􅀶通莫賢乎董仲舒體恭篤敬莫賢乎石􅁬才兼文武千金不入私門莫賢乎竇嬰明君顯賢莫賢乎田叔證主知分莫賢乎貫髙忠義正直莫賢乎鮑子都謇諤忠諌莫賢乎王宏張輔名士優劣論曰丗人論司馬遷班固才之優劣多以固爲勝余以爲失遷叙三千年事五十萬言固叙二百年事八十萬言煩省不敵固之不如一也良史􅄒事善足以奬勸惡足以鑒誡人道之常中流小事無取之因循難易益不同矣又遷爲蘇􅁗張儀范睢蔡澤作傳逞辭流離亦足以明其大才也此眞所以爲良史也又曰丗人見魏武皇帝處有中土莫不謂勝劉􅀇德也余以􅀇德爲勝夫撥亂之主當先以能収相獲將爲夲一身之善戰不足恃也丗人以􅀇德爲吕布所襲爲武帝所走舉軍東下爲陸遜所覆未􅀂武帝爲徐榮所敗馬􅀍創之危也􅀇德在荆州劉景􅂛父子不能用其計舉州降魏手下歩􅀐不滿數千爲武帝大衆所走未􅀂武帝爲吕布奔北􅀐所擒勒突火之急也􅀇德爲陸遜所覆未􅀂武帝爲張繡所困挺身逃遁以喪二子也􅀂令髙祖死於彭城丗人方之不及項羽逺矣武帝死於宛下將復謂不及張繡矣而其安忍無親􅀂楊德祖之徒多見賊害孔文舉桓文林等以􅀫恨見殺良將不能任行兵三十餘年無不親征功臣謀士曽無列土之封豈􅀂􅀇德威而有思勇而有義諸葛孔明張飛􅀜羽曰皆人傑也服而使之夫明闇不相爲用臧否不相爲使武帝雖處強不爲用矣況在危急之間􅀔弱之地乎􅀂令􅀇德據有中州將與周室比隆豈徒三傑而巳又曰樂毅諸葛孔明之優劣乎或以毅爲弱燕合五國之兵以破強齊雪君王之恥莫不謂毅爲優余以爲五國之兵共伐一齊不足爲強大戰濟西伏尸流血不足爲仁夫孔明苞文武之德劉􅀇德以知人之明屢造其廬諮以濟丗至如竒䇿泉涌智謀縱横遂東􅀃孫權北抗大魏以乗勝之師翼佐取蜀及􅀇德終禪登大位在擾攘之際立童􅂪之主設官分職班叙衆才文以寧内武以折衝勲業濟而殞觀其遺文謀謨􅀪逺雅規恢廓巳有功則讓於下闕則躬自咎見善則遷納諌則改故烈聲震遐迩者也習鑿齒周魯通諸葛論曰客問曰周瑜魯肅何人也主人曰小人也客曰周瑜竒孫䇿於揔角定大計於一面摧魏武百勝之鋒開孫氏偏王之業威震天下名馳四海魯肅一見孫權建東帝之略子謂之小人何也主人曰此乃眞所以爲小人也夫君子之道故將竭其志直佐扶帝室尊主寧時逺崇名敎􅀂乃力不能合事與志違躬耕南畒遁迹當年何由盡臣禮於孫氏於漢室巳亡之日耶客曰諸葛武侯翼戴􅀇德與瑜肅何異而子重諸葛毀瑜肅何其偏也主人曰夫論古今者故冝先定其所爲之夲迹其致用之源諸葛武侯龍蟠江南託好管樂有匡漢之望是有宗夲之心也今玄德漢髙之正胄也信義著於當年將使漢室士而更立宗廟絶而復繼誰云不可哉􅀽宏七賢序曰阮公瓌傑之量不移於俗然獲免者豈不以虗中犖節動無近對乎中散遣外之情最爲髙絶不免丗禍將舉體秀異直致自髙故傷之者也山公中懷體黙易可因任平施不撓在衆樂同遊刄一丗不亦可乎新序曰晉獻公用荀息之謀而禽虞不用宮之竒謀而士故荀息非霸王之佐乃戰國并兼之臣也􅀂宫之竒則可謂忠臣之謀也蔣子萬機論曰太史遷云顔回雖篤行不遇仲尼不能彰其名也故五尺之童德擬大舜使在他門未或及此也夫甘羅少回六歳獲河東五城万乗郊迎而佩印雖所􅀪非道義然當􅁗之時染詐變之風也使羅在孔門治丘之訓亦可聞一知十乎曰末必也昔齊欲伐魯回求􅀃陳常而孔子不許遂使子貢子貢一出破齊強晉亡呉霸越存魯也夫顔子與賜程智比才相校於八至於此事而丘不使也抱朴子曰凡薄之徒雖便辟流俗而懷空枹虗有似蜀人瓠壷之喻胷中無一􅁓之識不過酒炙所謂冒于貨賄貪于飲食左生所載不才之子􅀓子曰夏侯玄求交於傅嘏嘏不納荀粲謂􅀓嘏曰夏侯太􅀄一時之俊虗心交子不合則怨至二賢不睦非國之利也嘏荅之曰太􅀄能虗聲而無實才何平叔言逺而情近好辯而無誠鄧玄茂外徇名利内無􅀜鑰此三人者皆敗德也孫子曰譙周勸王降魏何平曰自謂天子而乞降請命何恥之􅀷乎夫爲社稷死則死亡則亡先君正魏之篡不與同天過於其父俛首而事讎可謂苟存豈大君之正道哉郭子曰􅁃道季云藺相如雖千載死人懔懔􅁪如有生氣曹蜍李志雖見在厭厭如九泉下又曰丗中稱􅁃文康爲豐年玉􅁃稚恭爲荒年榖又曰魏明帝丗使后弟毛曽與夏侯太􅀄共坐時人謂蒹葭􅀝玉樹時目夏侯太􅀄朗如明月入懷又曰人有問王長史王仲祖也江霦羣從兄弟者王荅云諸江皆能自生活又曰人問謝太傳王子敬可與先軰誰比謝荅曰阿敬近王劉之間王脩與眞長又曰王子敬問謝公嘉賔何如道季嘉賔郄超小名庾龢小名道季荅云道季誠抄撮清悟嘉賔故自勝桓公稱云桓温也鏘鏘有文武又曰王右軍道劉眞長樹雲柯而不扶踈又曰桓公問孔思陽安石何如文度孔思未荅反問公謂如何荅曰安石居然不可陵踐又曰簡文云謝安南名奉字弘道清泠如其弟弟名躬字弘逺學義不如孔嚴嚴字彭祖又曰王丞相云雒下論以我比安期千里王丞字安期阮瞻字千里我亦不推此二人唯共椎王太尉夷甫也又曰周伯仁道桓茂倫欽﨑歷落可􅀏之人也或云是謝㓜輿言又曰王丞相言刁玄亮之察察刁恊字玄亮戴􅀂思之巖巖戴淵序􅀂思卞望之峰岠並一見我而服也又曰祖士少道右軍王家阿菟莬羲之小各吾莬何縁復減處仲右軍道祖士少風領毛骨恐没丗不復見如此人王子猷􅀃丗目士少爲朗邁我家亦以爲徹朗又曰孫子荆應上品􅃺王武子時爲之目曰天才英􅀶亮抜不羣太平御覽卷第四百四十七
