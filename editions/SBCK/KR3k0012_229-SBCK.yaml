  text: 太平御覽卷第二百二十九
  hash: sha256:763bf4bdb092b0f1ed75861d9f870054db24a8fd3a51bddfd8bfe0940c918383
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_229-1a}
body:
  text: 職官部二十七太常少卿丞􅀶士太祝恊律郎太廟令陵令太樂令太醫令廪犧令光禄令少卿太官令太常少卿六典曰凢有事於宗廟少卿太師祝齋郎入薦香燭整拂神幄出入神主將享則與良醖令實鐏罍後魏書曰太和十五年置少卿官太常少卿一人第三品上至二十二年降爲正四品又曰景明􅀄班職令太常少卿第四品上第一清選明禮兼天文隂陽者爲之又曰元順爲太常少卿以父憂去職哭泣歐血身自􅀒土時年二十五便有白髮免䘮抽去不復更生世人以爲孝思所致三國典略曰齊太常少卿􅀽聿修廵省河南諸州兖州刺史刑部與聿修故舊嘗於省中盛呼聿修爲清郎至是遣送白紬爲信聿修不受與邵書郎曰􅀲田李下古人所愼多言可畏譬之防川願表此心不貽厚責邵亦忻然報書曰一日之贈率尓不思老夫忽忽意不及此敬丞來旨吾無間然弟昔爲清郎今作清卿矣唐書曰馮定爲太常少卿文宗每聽樂鄙鄭衛聲詔奉常習開元中霓裳羽衣舞以雲韶樂和之舞曲成定揔樂工閱於庭定立於其間文宗以其端凝􅀂植問其姓氏翰林學士李珏對曰此馮定也文宗喜問曰豈非能爲古章句者耶乃召升階文宗自吟定送客西江詩吟罷益嘉因錫禁中瑞錦仍令大録所著古體詩以獻太常丞六典曰太常丞二人從五品上􅁗有奉常丞漢因之比千石魏晉宋皆置一人漢書曰韋弘爲太常職掌陵庿煩劇多過父賢勑令自免懷嫌不去官及賢疾篤果坐廟事繫獄宋百官春秋曰太常丞視尚書郎銅印黄綬一梁冠品第七掌舉陵廟非法陶氏家傳曰覆之字孫宗爲太常丞凢宗廟疑義多所决定時人爲之語曰定禮决疑問陶覆之陶氏職官要録曰晉宋九卿丞皆進賢一梁冠介幘皂衣銅印黄綬齊梁墨綬太常􅀶士六典曰太常􅀶士掌辨五禮之儀式本先王之法制適變隨時而損益焉凢大􅀕祀及有大禮則與卿導賛其儀凢王公巳下擬謚皆跡其功徳而爲之褒貶通典曰愽士魏官也魏文帝􅀄置晉因之事掌引道乗輿王公巳下應追謚者則􅀶士議定之晉中興書曰􅀶士之職端委佩玉朝之大典必於詢度當以正道克厭人望然後爲可唐書曰王彦威太原人世儒家少􅀌貧苦學尤通三禮無由自逹元和中遊京師求爲太常散吏部卿知其書生􅀘爲檢討官彦威於禮閣掇拾自隋巳來朝廷㳂革􅁻㐫五禮以􅀋區分成三十卷獻之號曰元和新禮繇是知名時授太常􅀶士又曰陸亘爲太常􅀶士寺有禮生孟真乆於其事凢􅁻㐫大儀官不能逹率訪真真亦頼是湏姑息元和七年􅁽皇太子將撰儀注真亦欲叅預亘笞之由是禮儀不專於胥吏郭子曰張慿舉孝廉詣劉真長還舡湏􅁷真長至遣覔張孝廉舡同旅愕然旣同載俱詣撫軍劉前進謂撫軍曰今日爲公得一士太常􅀶士之選旣前撫軍與之言咨咾嗟稱善乃曰張慿勃倅爲理窟即用爲太常􅀶士太祝六典曰太祝掌出納神主于太廟之九室而奉享薦禘祫之儀周禮曰太祝掌六祝之辭以事􅀑神示祈福祥求永貞一曰順祝二曰年祝三曰􅁻祝四曰化祝五曰瑞祝六曰筴祝鄭司農曰順祝順農年也年祝求永貞也􅁻祝祈福祥也化祝弭災兵也瑞祝逆時􅀨寧風旱也筴祝逺罪疾也漢書百官表曰太常属官有太祝令丞景帝六年更名爲祝祀武帝太􅀄元年更曰廟祝東觀漢記曰隂猛好學温良稱於儒林以郎遷爲太祝令續漢書曰太祝令秩六百石掌祠讃祝近臣神巫主祝小祝恊律郎六典曰恊律郎掌知六律六吕以辨四時之風氣八風五音之節漢書曰武帝時李延年善新聲以爲恊律都尉魏志曰武帝平荆州得杜䕫知音識舊樂故以爲恊律郎太廟令漢書百官表曰太常属官有諸廟令長丞續漢書曰髙廟令一人六百石主守宗廟掌按行掃除無丞丞世祖廟令一人宋書太廟令一人主守宗廟案行洒掃衆事領齊郎二十四人齊職儀曰周有守祧之官掌先王廟令陵令六典曰陵令掌先帝山陵率户守衛之事丞爲之貳凢朔望元正冬至寒食皆修饗於諸陵若橋陵則曰獻羞焉凢功臣宻戚請陪陵葬者聽之以文武分爲左右而列􅀂父祖陵陪子孫從葬者亦如之周禮曰冢人下大夫二人中士四人掌公墓之地辨其兆域先王之葬居中以昭穆爲左右漢書曰太常属官有諸陵令元光元年分諸陵邑属三輔又曰司馬相如爲茂陵令續漢書曰太常職掌先帝陵每園令各一人秩六百石掌守園陵按行掃除丞及校長各一人校長主戒賊盗齊職儀曰周有墓大夫冢人之職掌先王之墓又曰每陵令一人品第七秩四百石銅印墨綬進賢一梁冠絳朝服唐書官品志曰梁天監七年又詔以爲陵監之名不出前誥且宗廟憲章旣備典禮園寢職司理不容異諸正陵先立監者改爲令於是陵置令矣胡廣陵令箴曰昔在黄葉葬野衣薪禮非極哀不樹不封瓦棺墍周聚夏攸謂壤不毀膚賄不害生是謂皇極百王此經故厚不可皇薄不可王乃眷西顧爰矩孝文陵臣司墓敢告守人太樂令六典曰太樂令掌教樂人詞合鍾律以供􅀖國之􅀕祀饗讌承爲之貳漢書百官表曰太常屬官有太樂令丞續漢書曰明帝永平十三年曹褒奏尚書琔璣鈐曰有帝漢徳合作樂名天子下詔改太樂令丞以應圖䜟又曰太樂令秩六百石掌􅇊樂人凡國􅀕祀掌奏樂及大司樂掌其陳序晉起居注曰成帝咸和中詔太樂令載綏教官􅇊樂勤勞賜米百石布二十疋太醫令六典曰太醫令掌諸醫療之法丞爲之貳其屬有四曰醫師針師按摩師呪禁師皆有􅀶士以教之考試登用如國子監之法漢書曰百官表曰少府屬官有太醫令丞無貟多至數十人續漢書曰太醫一人秩六百石有藥丞主藥方丞魏略曰脂習字元升除太醫令與孔融親善融􅀍誅習獨往哭之黄􅀄中以習有欒布之節賜拜中散大夫應劭漢官注曰太醫周官也兩梁冠秩千石典論曰中常侍張讓子奉爲太醫令與人飲酒輙掣引衣裳發露形體亂其舄履使小大無不傾倒崔寔太醫令箴曰動不肆勤静不宴逸有疾歸天醫無能恤晉平好内四時是一非􅀑非食惑以自失雖有秦和焉所施術太上防疾其次萌牙腠理不蠲骨髓奈何􅅒犧令六典曰廪犧令掌薦犧牲及粢盛之事丞爲之貳凢三祀之牲牢各有名數昊天上帝以蒼地皇祗以黄神州以黝五帝之牲各以方色韋昭辨釋名曰釋云􅅒犧犧戯也廪養之也辨云六牲取其純毛者别養之以奉􅀕祀純色者少故名犧犧希也周禮曰牧人下士掌牧六牲以供􅀕祀漢書百官表曰内史屬官有􅅒犧令丞尉後屬司農齊職儀曰周牧人之職也掌六牲陽祀用騂隂祀用􅉳取純毛者光武中興属河南秩六百石光禄卿六典曰光禄卿之職掌􅀖國醪醴膳羞之事揔太官珍羞良醖掌醢四署之官屬修其儲備謹其出納少卿爲之貳有大􅀕祀則省牲鑊視濯漑漢官解詁曰士之權貴不過尚書其次諸吏諸吏光禄勲是也應劭漢官儀曰光明也禄爵也勲功也言光禄典郎謁諸虎賁羽林學不安得賞不失勞故曰光禄勲唐書官品志曰光禄卿位視太子中庶子掌宫尉門户統守黃門華林園􅁀室等令漢書曰郎中令􅁗官武帝太􅀄元年更名光禄勲掌中殿門户秩中二千石又曰石建爲郎中令奏事下建省讀驚曰書馬者與尾而五今乃不足一獲譴死矣其謹愼如此又曰周仁景帝時爲郎中令爲人隂重不􅂥服䖍曰質重不泄人之隂謀也師古曰隂宻也言爲性宻重不泄人言也以是得幸出入卧内於宫祕戯仁常在傍終無所言又曰張安世字孺子爲光禄勲郎有醉小便殿上主事白行法安世曰何以知其不覆水􅁘郎有􅁋官婢婢兄自言安世怒以奴􅁋汚衣冠告署撻奴其隱人過皆此􅀋也東觀漢記曰孫堪字子雅爲光禄勲以清廉稱與周澤相􅀋澤字雅都京師號之爲二雅又曰劉昆字桓公爲光禄勲授皇太子及諸王小侯五十人經昆老退位以二千石禄終其身又曰邵訓字伯春郷里號之曰徳行恂恂邵伯春章和中爲光禄勲後漢書曰杜林字伯山扶風人也林少沉審􅀶學多聞世稱通儒爲光禄勲内奉􅀫衛外㹅三署郎有好學者輙見引進朝夕滿堂又曰馬防字公平林風人也防貴寵最盛與九卿絶席拜光禄卿又曰張湛字子孝拜光禄勲光武臨朝或有惰容輙陳諌常乗白馬上後見湛輙曰白馬生且復諌矣又曰􅀽彭順帝􅀄爲光禄勲行至清爲吏麄􅂁糲食續漢書曰荀爽字慈明爲光禄勲視事三月䇿拜司空謝承後漢書曰楊賜字伯欽拜爲光禄勲嘉徳殿前有青赤氣詔特進遣中使問賜祥異禍福􅁻㐫所在以賜􅀶學頭儒故宻諮問其極陳其意嘗上䟽陳請案春秋䜟天投蜺海内亂今妄嬖閹尹共專國朝之所致也魏志曰鄭袤爲光禄勲母丘儉作亂帝自征之百官祖送時袤疾不任㑹上謂王肅唯不見鄭光禄爲恨袤聞白輿追上上􅀏曰知生必來遂與同載問以計謀帝甚重之又曰王肅字子雍爲光禄勲時有二魚長尺集武庫之屋有司以爲􅁻祥肅辨之曰魚生於泉而見於屋鱗介之物失其所也邊將其殆有弃甲之變乎其後果有東関之敗又曰􅀽渙字曜卿爲中郎令時言劉備死群臣皆賀渙以嘗爲備吏獨不賀卒官太祖爲之流涕吴志曰石偉字公操南郡人少好學修節不殆爲獨六有不可奪之志舉茂才賢良方正皆不就孫休即位將徴偉累遷至光禄勲及皓即位朝政昏亂爲乃辭老耄固疾乞身又曰薛瑩字道言以時法政多謬舉措煩苛瑩每上便冝陳緩刑簡役以濟育百姓頗或施行迁光禄勲晉中興書曰鄭黙字思元轉光禄勲寛冲􅀶受不以聲色矜人雖卒徒厮養皆遇之以恩宋書曰王惠宋國􅀄建當置郎中令髙祖難其人謂􅀓亮曰今用郎中令不可令减􅀽曜卿也旣而曰吾得其人矣乃以惠居之孟宗别傳曰宗爲光禄勲大㑹宗先少酒偶有強者飲一杯便吐傳詔司察宗吐麥飯察者以聞上乃歎息曰至徳清純如此光禄少卿後魏職令曰光禄少卿第四品上第二清用肅勤明敏兼職古典者唐書曰柳亨拜光禄少卿太宗每誡之曰與卿舊親情素兼􅀫卿爲人交遊過多今授此職冝存簡静亨性好射獵有饕􅊺之名此後頗自勗勵杜絶賔客約身節儉勤於職事太宗亦以此稱之也太官令六典曰太官令供膳食之事丞爲之貳凡􅀕之日則白卿諸厨省牲鑊取明水於隂鑑取明火於陽燧帥宰人以銮刀割牲取其毛血實之於豆遂烹牲焉又帥進饌者實簠簋設於饌幕之内漢書百官表曰少府屬官有士官令一人丞一人應劭漢官儀曰太官令兩梁官冠秩千石丞四人郡孝廉年五十清修聦明者光禄上名迺召拜皆秩四百石三歳爲令以供養勞苦迁左丞有湯官丞掌諸甘肥有菓丞掌菓􅀲菜茹薪炭漢舊儀曰太宫主飯肉湯官酒皆令丞治太官湯官奴婢各三千大置酒皆緹構音溝蔽膝縁幘又曰太官上食黄釦音口金飾器器中官私官上食用白銀釦器如祠廟器云謝承後漢書曰魯國陳政字叔方爲太官令黄門郎與政有􅂩因進御食以髪貫炙光武見髮勑斬政政曰臣有當死者三黒山出炭増治吐炎燋膚爛􅁏而髪不消臣罪一也陜出佩刀砥礪五石虧肌截骨曽不能断髪臣罪二也臣朗月書章奏側光讀經書旦臨食與丞及庖人六目齊視黄門一人臣罪三也詔赦之魏略曰時苗爲壽春令迁爲太官令後魏書曰毛循之能爲南人飲食手自煎調多所適意世祖親侍之進太官尚書賜爵南郡公加冠軍將軍常在太官主進御膳楊雄太官令箴曰時惟膳夫實司王饔祁祁庶羞口實是供群物百品八珍清觴以御賔客以膳于王王朗集曰朗爲大理時上主簿趙郡張登昔爲本縣主簿值黒山賊圍郡登與縣長王携帥吏兵七十二人俱往赴救與賊交戰吏兵散走携殆見害登手格二賊以全携命又守長夏逸爲督郵所枉登身授拷掠理逸之罪義濟二君冝加顯異黄􅀄詔曰登忠義彰著在職功勤名位雖卑直亮冝顯饔膳近任當得此吏今以登爲太官令太平御覽卷第二百二十九
