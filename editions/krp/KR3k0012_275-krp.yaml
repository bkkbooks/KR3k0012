front:
  text: 太平御覽卷第二百七十五
  hash: sha256:b4c859b5ff570d207c4382a4d420a0dd29e5d50fdcf39102906ccc92a9fb4b61
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_275-1a}
body:
  text: 兵部六良將上論語曰子曰孟之反不伐孔注曰魯大夫孟之側也與齊戰軍大敗不伐者不自伐其功也孝經左契曰將軍順虎衘珠大夫正海出魚抱朴子曰良將剛則法天可望而不可干柔則象淵可觀而不可入去如收電可見而不可得留如山岳可瞻而不可量唐子曰良將如泉如山不知其歡戚也史記曰吴起者衛人也好用兵事魯君齊人攻魯魯欲將起起取齊女爲妻而疑之起遂殺妻明不爲齊也魯卒以爲將大破齊後之魏又曰陳勝之反秦使王離擊趙王及張耳鉅鹿城或曰王離秦之名將也又曰魏文侯問吴起何如人李克曰其用兵司馬穰苴弗能過也於是魏文侯以爲將擊秦拔五城又曰杜業曰竊見朱愽忠信勇猛材略不丗出誠國家雄俊之寳臣也冝徴愽左右以塡天下此人在朝則陛下可髙卧矣又谷永傳曰平阿侯譚位持進領城門兵永聞與譚書曰君侯躬周召之德執管晏之操敬賢下士樂善不倦冝在上將乆矣屬聞以特進領城門兵屬之欲切愚竊不爲君侯喜冝深辭職自陳淺薄不足以固城門守收太伯之讓保謙謙之路闔門髙枕爲智者譚得書大感遂辭讓不受領城門職又曰霍去病爲驃騎將軍上甞欲教之孫吴兵法對曰顧方略何如耳不至學古兵法上爲治第令視之對曰匈奴不滅無以家爲又曰李廣爲右北平匈奴號曰漢飛將軍廣歴七郡太守前後三十餘年得賞賜輙分其麾下飲食與士卒共之家無餘財不言生産事又曰李廣其先曰李信秦時爲將逐其燕太子丹者也廣以良家子從軍擊胡文帝曰惜廣不逢時令當髙祖丗萬户侯豈足道哉又曰劇孟洛陽人也以任俠顯吴楚反時條侯爲太尉乗傳東將至河南得劇孟喜曰吴楚舉大事而不求劇孟吾知其無能爲也天下騷動大將得之若一敵國又曰沛公入咸陽諸將皆争赴金帛財物之府分之蕭何獨先收秦丞相御史律令圖書藏之沛公具知天下阨塞户口多少強弱處民所疾苦者以得圖書故也後漢書景丹傳曰帝曰景將軍北州大將是其人也又馬武傳論曰中興二十八將前丗以爲上應二十八宿未之詳也然咸能感㑹風雲奮其智勇稱爲佐命亦各志能之士也又曰賈復傳曰丗祖大驚曰我所以不令賈復别將者爲其輕敵也不然失吾名將又曰馮異大破赤眉于郁璽書曰始雖垂翅回谿終能奮翼澠池可謂失之東隅收之桑榆者也又曰耿秉能說司馬兵法尤好將帥之略又曰馮異字公孫爲人謙退不伐行與諸將相逢輙引車避道東觀漢記續漢書云異勑吏士非交戰受敵常行諸營之後相逢引車避之由是無争道變闘者也進止皆有表識言其進退有常處軍中號爲整齊毎所止舎諸將並坐論功異常獨屏樹下軍中號曰大樹將軍光武破邯鄲乃更部分諸將各有配隷隷屬也袁折崧書曰先時諸將同營吏卒多犯法軍士皆言願屬大樹將軍光武以此多之又鄧禹傳云赤眉遂入長安是時三輔連覆敗赤眉所過殘㓕百姓不知所歸聞禹乗勝尅而師行有紀綱紀也言有條貫而不殘暴皆望風相攜負以迎軍降者以千數衆号百萬禹所止輙停車住節住或作柱以勞來之父老童穉垂髮戴白垂髪童㓜也戴白父老也滿其車下莫不感恱於是名震關西帝嘉之數賜書褒美又曰竇融以兄弟並受爵位乆專方靣懼不自安數上書求代詔報曰吾與將軍如左右手耳韓信亡蕭何自追之人曰丞相何亡髙祖聞之如失左右手見前書數執謙退何不曉人意勉循士人無擅離部曲又曰諸將毎論功自伐賈復未嘗有言帝輙曰賈君之功我自知之又曰陳蕃楊秉處稱賢宰皇甫張遐出號名將又曰馮緄字鴻卿巴郡宕渠人也長沙蠻冦益揚荆南皆没於是拜緄爲車騎將軍軍長沙進擊武陵蠻溪荆州平定詔賜錢一億固讓不受振旅還師推功於從事中郎東觀漢記曰上自征隗囂至􅃮諸侯多以王師之重不冝逺入險阻計未决㑹召馬援因說隗囂將帥土崩之勢兵進必破之狀於上前聚米爲山指畫囂衆大潰又曰吴漢當出師朝受詔夕即引道𥘉無辦嚴之日故能常任職以功名終又曰吴漢常屬吏士治兵事上時令人視吴公何爲還言曰方脩攻具上曰吴公隱若一敵國矣魏志曰諸葛亮斜谷出軍至武功司馬宣王禦之亮挑戰宣王不出亮遺之婦人巾幗宣王怒表請决戰天子不許遣辛毗杖節立於軍門以制之㑹亮病卒歸宣王不敢追之而退百姓爲之語曰死諸葛走生仲達宣王曰吾便料死故也宣王案幸亮營壘處曰天下竒才也又曰趙典字曼成好學問貴儒不與諸將争功敬賢士大夫若不及又任城王傳曰太祖問諸子所好便各言其志至彰曰好爲將又曰劉曄謂太祖曰諸葛亮明於治而爲相關羽張飛勇冠三軍而爲將蜀人旣定據險守要則不可犯矣又曰賈逵字梁道河東人自爲兒童戯弄常設部伍祖父習異之曰汝大必爲將率口授兵法數萬言蜀志曰鄧芝爲大將二十餘年賞罰明善䘏卒伍身之衣食資仰於官然終不治私産妻子不免飢寒死之日家無餘財又曰關羽字雲長亡命奔涿先主於郷里合徒衆而羽與張飛爲之禦侮晉書曰應詹遷南平太守鎮南將軍山簡復假詹督五郡軍事蜀賊杜疇作亂金寳溢目詹一無所取唯收圖書莫不難之又曰周訪威風旣著逺近恱服智勇過人爲中興名將性謙虚未嘗論功伐或問訪曰人有小善鮮不自稱卿功勲如此𥘉無一言何也訪曰朝廷威靈將士用命訪何功之有又曰蘇峻平論功顧衆推功於蔡謨謨衆唱謨非巳之力俱表相讓論者美之又曰符堅衆號百萬次于淝水謝玄入問計謝安無懼色方與玄圍碁遊渉至夜乃還指受將帥各當其任玄等破堅驛書至安對客圍碁看書便攝放床上了無喜色客問徐荅小兒輩破賊旣罷還内過户限心喜甚不覺屐齒之折其矯情鎮物如此也又曰帝謂紀瞻曰卿雖疾病爲朕卧護六軍所益多矣又羊祜傳曰吴人冦戈陽江夏略户口語遣侍臣移書詰祜不追討之意并欲移州復舊之冝祜曰江夏去襄陽八百里皆知賊去亦巳經日矣歩軍方往安能救之哉勞師以免責恐非事冝也昔魏武帝置都督皆與州相近以兵勢好合惡離疆埸之間一彼一此愼守而已古之善教也若輙徙州賊出無常亦未知之所冝據者使者不能詰又曰羊祜入朝武帝遣中書令張華問其籌䇿祜曰今主上有禪代之美而功徳未著吴人虐政巳甚可不戰而尅混一六合以興文教則主齊堯舜臣同稷契爲百代之盛若孫皓不幸而殘吴人更立令主雖百萬之衆長江未可而越也將爲患乎華深讃成其計祜謂華曰成吾志者子也帝欲使祜卧護諸將祜曰取吴不必湏臣自行但旣平之後勞聖慮耳功名之際臣所不敢居事當有所付授願審擇其人疾漸篤乃舉杜預自代㝷卒又曰毛穆之鎮廣陵遷右將軍宣城内史假節鎮姑熟穆之以爲戍在近畿無復軍驚不冝加節上䟽辭讓許之又曰朱伺字仲文安陸人少爲吴牙門將陶丹給使吴平徙江夏伺有武勇訥口不知書爲郡將督見郷里士大夫揖稱名而已及爲將遂以謙恭稱又曰鄧遐字應逺勇力絶人氣蓋當時人方之樊噲桓温以爲叅軍數從温征伐歴冠軍將軍數郡太守號爲名將襄陽城北沔有蛟常爲人害遐拔劒入水蛟繞其足遐揮劒截蛟數叚而岀又曰劉牢之面紫赤色鬚目驚人而沉毅多計畫于寳晉紀曰文淑字次騫小名鴦有武力筭䇿楊休胡烈爲虜所害武帝西憂遣淑出征所向摧靡秦涼遂平名震天下爲東夷校尉姿器膂力萬人之雄慕容盛載記曰尚書左僕射領中軍熈從征句驪契丹皆勇冠諸將又曰皇甫真字楚季弱冠以高才隨慕容評攻鄴都珍貨充溢眞一無所取唯存恤人物收圖籍而已二石僞事曰郭權降石虎虎問權曰卿若得吾者當殺不權曰若登時得至尊必殺不疑也虎曰卿徤將也因與共言事崔鴻前燕録曰張蚝夲姓弓上黨人也膂力過人能曳牛走堅甚寵之常侍左右終爲名將所在有殊功世稱鄧羗張蚝皆萬人敵也宋書曰姚泓屯軍長城下王鎮惡撫慰士卒及以身先士衆騰躍争先泓衆一時奔潰泓妻子歸髙祖降將至京鎮惡於灞上奉迎髙祖勞之曰成吾霸業者真卿也鎮惡再拜謝曰此明公之威諸將之力鎮惡何功之有焉笑曰卿欲學馮異耶又曰桓玄云劉毅勇冠三軍當今實爲無敵又曰劉順幢主樊僧愛勇冠三軍軍中皆懼齊書曰曹景宗建武四年隨太尉陳顯達北圍馬圈以竒兵二千破魏援中山王英四方人及尅馬圈顯逹論功以景宗爲後景宗退無怨言又曰垣崇祖𥘉見髙帝便自北韓白唯上獨許之及破魏軍啓至上謂朝臣曰崇祖恒自擬韓白今其人也進爲都督梁書曰馮道根每征伐終不言功其部曲或怨非之道根喻曰明主自監功夫多少吾將何事武帝常指道根示尚書令沈約美其口不論勲約曰此陛下之大樹將軍也梁後略曰陸納分其衆輕舸掩襲巴陵晨至城下驃騎始命諸將㑹議乃出自壘門坐胡床以望之賊乗水來攻矢下如雨人情搔擾莫不震懼而驃騎方食甘蔗曽無遽色又曰齊遣其將竇太趂潼關太祖將襲秦衆咸難之太祖問䇿於宇文深深對曰竇氏歡之驍將也歡毎伏之以爲禦侮北齊書曰劉豊本出河間樂城豊有雄姿壯氣果毅絶人有口辯好說兵事又曰辛術字懷哲隴西狄道人也清儉寡欲及平楚定淮南凢諸貲物一毫不犯唯收典籍多是晉宋齊梁時佳夲鳩集萬有餘卷太平御覽卷第二百七十五
