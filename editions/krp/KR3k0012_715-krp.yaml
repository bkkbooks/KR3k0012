front:
  text: 太平御覽卷第七百一十五
  hash: sha256:7bfcca8555fefb7df59c6fc97d1dae0d960308ed591f8984157ebca2bc35729d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_715-1a}
body:
  text: 服用部一十七歩揺假髻髲歩搖釋名曰后首飾曰副副覆也以覆於首上有垂珠歩則揺也周禮曰王后首服爲副所以副首爲飾若今歩揺也續漢書輿服志曰皇后入廟歩揺以黄金爲山題貫白珠桂枝相糺八爵九華熊虎赤羆天鹿辟邪後漢書曰和熹鄧后賜馮貴人赤綬以未有歩揺環佩各加賜一具晉書曰慕容廆曽祖莫護跋魏𥘉率其諸部入居遼西從宣帝伐公孫氏以功拜率義王始建國於棘城之北時燕代多冠歩摇冠護跋見之乃歛髮襲冠諸部因呼之爲歩摇其後音訛遂爲慕容焉江表傳曰務皓使尚方以金作歩揺假髻以千數令宫人着以相撲朝成夕敗輙命更作晉令曰歩揺蔽髻皆爲禁物西京雜記曰趙飛鷰爲皇后其女弟上遺黄金歩揺宋玉風賦曰主人之女垂珠歩揺梁沈靖妻沈氏歩揺花詩曰珠花縈翡翠寳葉間金瓊翦荷不似製爲花如自生低枝拂衣領微歩動揺英假髻周禮曰追師掌王后首服爲副鄭玄云副婦人首飾三輔謂之假髻東觀漢記曰章帝詔東平王蒼惟王孝友之德令以光烈皇后假髻帛巾各一衣一篋遺王可時瞻視以慰凱風寒泉之思晉中興書微祥說曰太元中公主婦女緩鬢假髻以爲盛飾用髮豐多不可恒戴乃先於籠上扶之名曰假髻或名假頭至於貧人不能自辦自號無頭就人借髻後孫恩桓玄之亂死者万計𬒳戮之家多亡頭首至大歛時皆以藤縛菰草爲頭是假髻之應也晉令曰士卒百工不得着假髻髲釋名曰髲𬒳也髲少者得以𬒳助其髲也詩曰鬒髮如雲不屑髢也髢髪也音弟傳曰衛莊公自城上見戎州巳氏之妻髪美使髠之以爲吕姜髢後爲巳氏所殺也呉志薛綜上事云漢時朱崖叛以長吏覩其人好髮髠取爲髲故百姓怨叛南越志曰開安縣岀頭髲異苑曰琅瑘費縣民家恒患失物作䋲彄施穿穴口因繫得一髲長三尺許後不復失物太平御覽卷第七百一十五
