front:
  text: 太平御覽卷第九百七
  hash: sha256:6cf9bc438f07554ffde2e333f452246d2e5af9f26a339f82b0904ac1c587f43e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_907-1a}
body:
  text: 獸部十九麞麕附兎麞春秋運斗樞曰樞星散爲麞伏侯古今注曰麞有牙而不能噬鹿有角而不能觸麞一名􅍪青州人謂􅍪爲麞抱朴子曰麞兎入軍中當徙之又曰山中稱赤吏者麞也吕氏春秋曰使麞疾走馬弗及也而得之者時願也瑞應圗曰宋文元嘉二十五年華林園飬麞生二百子文帝又獲青麞晉起居注曰咸寧中白麞見魏郡後諸州各送白麞異苑曰青州劉幡元嘉𥘉射得一麞剖肚藏以草塞之厥然起走幡怪而拔塞湏臾復還倒如此三焉幡宻録此種求類治傷痍多愈北史曰後魏廣平王懷甞獵於河北馬塲間逐一麞入草命人圍遶將自射之田巳先經燒不見其出遂失麞所在唯有塼塔存焉懷乃悵然動仁恕之心解鷹放犬遂不復獵蕭廣濟孝子傳曰蕭國遭喪有鵠遊其庭至暮而玄麞暮入其門與馬犬侣至旦而去王𫐠上白麞表曰所領阮藻之於江寧縣界得白麞一頭毛色鮮㓗異於類誠嘉祥也􅍪几筠切爾雅曰􅍪牡麌牝麋音栗其子麆音助其跡解絶有力豜音肩說文曰􅍪麞也毛詩曰野有死􅍪惡無禮也野有死􅍪白茅苞之穆天子傳曰天子賜曹奴之人白銀之􅍪論衡曰都尉王子鳯時􅍪入府中其後迁爲丹陽太守魏文帝詩曰巾車出鄴宮校獵東橋津湾弓忽髙馳一發連雙􅍪晉書曰中興所在獻白麕建武故事曰咸和六年計貢合集於樂堂有野􅍪走至堂前左右逐之於池中而獲之沈約宋書曰宗室傳曰劉慶於廣陵有疾野􅍪入府心甚惡之因陳惡求還太祖許之薨于京邑兎爾雅曰兎子嬎敷万切其跡迒絶有力迒音剛又胡剛切廣志曰兎大者曰毚音讒春秋運斗樞曰玉衡星散而爲兎孫氏瑞應圖曰赤兎者瑞獸王者盛德則至典略曰兎者明月之精詩小雅曰巧言躍躍毚兎遇犬獲之又國風有兎曰有兎爰爰雉離于羅爰爰緩意又小雅瓠葉曰有兎斯首炮之燔之斯白也字或作鮮史記曰李斯出獄頋謂其子曰吾欲與尓復牽黄犬俱出上蔡東門逐狡兎其可得乎又曰范雎謂秦昭王曰夫以秦而治諸侯譬若縱韓盧而摶蹇兎也謝承後漢書曰儒叔林爲東郡太守赤烏巢於屋梁兎産於牀下又曰方儲字聖明丹陽歙人㓜喪父事母母死負土成墳種樹千株鸞鳥栖集其上白兎遊其下范曄後漢書曰南徼外蠻夷獻白雉兎又曰蔡邕性篤孝母嘗滯病三年邕自非寒暑節變未嘗解衿帶不寢寐七旬母卒廬於冡側動静以禮有兎馴擾其室傍漢獻帝春秋曰張楊大將睦固屯於射犬巫戒之曰將軍本名白兎兎見犬必驚不宜屯此固不從司空曰兎入犬城伹當取遂進軍擊平之張璠漢記曰梁冀起兎苑於河南移檄所調發生兎刻其毛以爲識民有犯者罪至死西域嘗有賈胡來不知禁誤殺一兎轉相告坐死者十餘人也晉書載記曰石勒時茬叔之切平令師歡獲黒兎獻之於勒或以爲勒龍飛革命之祥於晉以水承金兎隂精之獸玄爲水色此殿下冝速副天人之望也於是大赦改咸和三年曰大和王隱晉書曰慕容皝田于南鄙見父老曰此非獵所言卒不見旣明日又出見白兎馳射之墜馬于石即死後魏書曰有兎入於後宮撿問門官無從得入太祖恠之令崔浩推其咎徵浩以爲當有隣國貢嬪嬙者明年姚興果來獻女三國典略曰周命尉遟逈伐蜀帥甲士一萬二千騎萬疋自散關由固道而入太祖送於城西見一走兎命弟中領軍網射之網誓曰若獲此兎必當破蜀俄而獲兎太祖喜曰事平之日賞汝佳口及剋蜀乃賜侍婢二人隋書曰華秋汲郡臨河人也㓜喪父事母以孝聞家貧傭賃爲飬其母卒秋髮盡秃落廬於墓側負土成墳有人欲助之者秋輒拜而止之大業𥘉調狐皮郡縣大獵有一兎人逐之奔入秋廬中匿秋膝下獵人至廬所異而免之自尓此兎常宿廬中馴其左右郡縣嘉其孝感具以狀聞春秋考異尤曰熒惑不明雉生兎焉春秋運斗樞曰行失揺光則兎出月宋灼注曰隂不衘陽故兎出月也春秋元命苞曰君失德則地吐泉魚銜兎宋灼注曰兎陽精魚是陽見制也詩推度災曰八月成光决鼻始明决鼻兎也黄帝占書曰月望而月兎不見者所見之國崩大水滔民崔豹古今注曰兎口有缺尻有九孔括地圗曰天池之出有獸如兎名曰飛兎以背毛飛莊子曰蹄者所以在兎也得兎而忘蹄蹄者取兎網韓子曰宋人有耕者田中有株兎走觸折頭而死因釋耕守株冀復得兎爲宋國笑慎子曰一兎走街百人追之積兎於市過而不視非不欲得分定不争也韓子曰趙王遊於圃中左右以兎與虎而輟之虎盻然環其眼王曰可惡哉虎在左右曰平陽之目可惡過此平陽君趙王之弟文子曰飛鳥反郷兎走歸窟狐死首丘抱朴子曰兎壽千歲五百歲其色白又曰山中夘日稱丈人者兎也又曰采女丹法以兎血和丹與宻蒸之百日服之如梧子者二丸一百日有神女二人來侍之可役使淮南子曰以兎之走使大如馬則逐日追風及其爲馬則不走矣又曰楚王珮玦逐兎爲速破乃取兩玦重而着之其破愈疾述異記曰殷紂之時大龜生毛兎生角兵甲將興兆也春秋後語曰昔齊有良兎曰東郭俊本或作狡兎以其善走故曰俊一日走百里有良狗曰韓子獹黒犬也獹讀如盧也亦一日而走百里使人遥見而指屬指属猶指蹤也属音之欲切則雖韓獹不及良兎躡跡而蹤之則雖東郭不能離也春秋後語曰淳于髠說齊威王曰韓子獹天下之壯犬也東郭俊者海内之狡兎也韓子獹逐東郭俊環山者三騰山者五兎極於前而犬疲於後犬兎俱疲各死其處田父見而獲之無勞倦之苦而擅其功今齊魏相持頓兵弊衆臣恐強秦大楚乘其後而有田父之功也威王懼而罷兵又曰㽵辛對楚王曰臣聞鄙諺曰見兎而頋犬未爲晩也亡羊而𥙷牢未爲遲也又曰馮煖謂孟嘗君曰聞狡兎有三穴范子計然曰兎毫出玄莵樂浪書紀年曰昭王十九年天大曀雉兎皆震宣王三十年有兎舞鎬風俗通曰食兎􅩋音牝者令人靣生􅩋食得􅩋者賞以寒酒按秦法言好車裂抽脅黔首飲泣永歎故食兎􅩋以爲嘉瑞全巳之􅩋也所以有賞耳古今注曰成帝建平元年山陽得白兎目赤如朱京房妖占曰兎止城上邑必虚入宫生子宫空廣志曰漢諸郡獻兎毫書鴻都門題唯趙國豪中用論衡曰兎䑛雄豪而孕及其生子從口中出又博物志曰兎望月而孕兎吐子舊有此說余目所見也又曰儒者言月中兎夫月水也兎在水中無不死者夫兎月氣也又曰任娠者不食兎肉令兒口缺幽明録曰桓大司馬温時有叅軍夜坐忽見屋樑棟間有一伏兎張目切齒而向之甚可畏惡兎來轉近遂引刀而斫之正中於兎而實反傷其膝流血滂沲深恠此意命家中悉藏刀刄不以自近後忽復見如前意廻或復索刀重斫因傷委頓幸刀不利故不至死再過而止傳玄歌辤曰兎擣藥月間安足道神烏戯雲間安足道楚辤天問曰夜光何德死則又育夜光月也育生也言月得於天死而復生也古豔歌曰焭焭白兎東走西頋衣不如新人不如故樂府歌詩曰採取神藥山之端白兎擣成蝦蟇九奉上陛下一玉柈音盤太平御覽卷第九百七
