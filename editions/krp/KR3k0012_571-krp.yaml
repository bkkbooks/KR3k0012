front:
  text: 太平御覽卷第五百七十一
  hash: sha256:980038e0c3c7617534726899d19ad39edb3651f5252e840cbbf3b05be00f5fc4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_571-1a}
body:
  text: 樂部九歌二家語曰孔子厄於匡謂子路曰汝歌予和汝子路彈劒孔子和之曲終匡人解甲又曰孔子相魯齊人患其將覇欲敗其政乃選好女子八十人衣以文錦而舞容璣及文馬四十季桓子受女樂君臣淫荒三日不聽國政郊至又不致膰祭肉名也爼於大夫孔子遂行作歌曰彼婦人之口可以出走彼婦之請可以死敗優哉游哉聊以卒歳吕氏春秋曰管子得於魯魯束縛而㩜之使役人載而送之齊皆謳歌而引管子恐魯之止而殺巳也欲速至齊因謂役人曰我爲汝歌汝爲我和其和適冝走役人不倦而取道甚逺管子可謂能因矣役人得其所欲巳亦得其所欲以此術也是用萬乗之國其覇猶少又曰周申喜亡其母聞乞人歌於門下而悲之動於顔色自見而問焉何故而乞與之語乃是其母也故父母之於子也子之於父母也一躰而分得同血氣與而異息若莽草之華實樹木之有根心離處而通憂思相感也又曰禹年三十未娶有行塗山恐時日暮吾娶必有應也乃有白狐九尾而造禹禹曰白者吾服也九尾其證也塗山人歌曰綏綏白狐九尾龐龐成家成室我都彼昌禹因娶塗山女吴越春秋曰採葛越之婦人傷越王用心乃作若何之歌辭曰甞膽不苦味若飴今我採葛以作絲又曰越王入吴與諸大夫別於浙江遂登舡俓去終不反頋越王夫人乃授舡而哭復見啄江涯之蝦飛去者復來哭訖即承之以歌其辭曰兩飛烏兮䳒作載何居食兮江湖水中虫子曰蝦去復反兮嗚呼始事君兮去家終我命兮君都中年過兮何辜離我國兮入呉妻爲婢兮夫爲奴歳昭昭兮難極冤痛悲兮心惻嗚呼哀兮不食越絶書曰伍子胥走至吴江上見漁者曰來渡我漁者知其非恒人也欲徃渡之恐衆人知之即歌而徃過之曰炤炤侵巳施於子期甫蘆之子胥從復歌曰心中悲曰巳施子可渡河不岀爲舡到即載入舡而伏戰國䇿曰齊人馮煖属孟甞君願寄食門下孟甞君笑而受之有頃倚柱彈其劒鋏歌曰長鋏歸來兮食無魚左右以告孟甞君曰食之比門下之客復彈其劒鋏歌曰長鋏歸來兮出無車又彈其劒鋏歌曰長鋏歸來兮無以爲家魏氏春秋曰阮藉少時遊蘇門山有隠者藉對之長嘯蘇門生莞尓而笑藉旣降蘇門生亦嘯若鸞風之音藉乃假蘇門生之論以寄所懷歌曰日沒不周西月出丹淵中陽精蔽不見隂光代爲雄冨貴俯仰間貧賤何必終又曰歌天地解兮六合開星辰霣兮日月頽我騰而上將何懷帝王丗記曰舜恭巳無爲歌南風之詩詩曰南風之時兮可以阜吾人之財兮南風之薫兮可以解吾人之愠兮尚書大傳曰維五紀奏鍾石論人聲始欲改堯樂及乃鳥獸咸變於前百獸率舞之属秋養耆老而春食孤子乃浡然招樂興於大麓之野報事還歸二年􅨳然乃作大唐之歌􅨳猶灼也大唐之歌美堯之禪也歌者三年昭然乃知乎王丗明有不丗之義招爲賔客而雍爲主人招雍皆樂章名也賔入奏招主人入奏雍也始奏肆夏納以孝成始謂尺入時也納謂薦賢時也肆夏孝成皆樂章名也舜爲賔客而禹爲主人舜旣使禹攝天子之事於祭祀避之居賔客之位献之位酒則爲亞賢也矣樂正道賛曰尚考犬室之義唐爲虞賔尚考猶言古考謂徃時也太室明堂之中央室也義當爲儀儀禮也謂祭大室禮先爲舜賔之也至今衍於四海衍猶溢也言堯之禪天下至於今其德義溢滿四海也成禹之變垂於萬丗之後帝乃唱之曰卿雲爛兮和氣之明者也禮縵縵兮教化廣逺日月光華旦咸且兮言明明相代八佾咸進稽首曰明明上天爛然星陳日月光華弘予一人帝乃再歌曰日月有常星辰有行四時從經萬姓允誠施子論樂配天之靈遷于賢聖莫不咸聽長乎歌之軒乎㒇之精華巳竭褰裳去之於時八風循涌卿雲藂藂蟠龍僨信於其藏蛟魚躍踊於其淵龜魚咸出其穴遷虞而事夏也孔叢子曰叔孫氏之車子鉏啇樵於野而獲麟焉衆莫之識以爲之不祥弃之五父之衢冉有告曰䴢而肉角豈天之妖乎夫子曰今何在吾將觀焉遂泣曰予之於人猶麟仁獸出而死吾道窮矣歌曰唐虞丗兮麟鳯遊今非其時來何求麟兮麟兮我心憂又曰哀公使以幣如衛迎夫子而卒不能官故夫子而作丘陵之歌曰登彼丘陵山施其阪仁道在迩求之若逺迷而不復自嬰屯蹇又曰楚王使奉金帛聘夫子宰予冉有曰夫子之道於是行矣遂請見問夫子曰太公勤身苦志七十而遇文王孰與許由之賢夫子曰許由獨善身者也太公兼天下者也然今丗無文王之君雖有太公孰識之哉乃歌曰大道隠兮禮有基賢人竄兮將待時天下如一兮欲何之說苑曰曽子耘瓜而誤斬其根曽晳怒援大杖擊之曽子仆地有頃乃蘇蹶然而起進曰曩者參得罪於大人大人得無疾乎退屏鼓琴而歌令曽晳聽其歌聲令和莊子曰孔子窮於陳蔡之間七日不火食羹不糝顔色甚憊歌於室不輟又曰子桑户孟子反禽張三人相與友有間而子桑户死相和而歌子貢曰敢問臨尸而歌禮乎二子相視而笑是悪知乎禮意也又曰莊子妻死惠子弔之箕踞鼓盆而歌惠子曰不哭亦足矣歌不亦甚乎莊子曰人且偃然寢乎巨室而我哭之是不通乎命故止之又曰曽子居衛捉衿而肘見納履而踵决曵履而歌啇頌聲滿天地若岀金石夏侯玄辨樂論曰昔伏羲氏因時興利教民田漁天下歸之時則有網罟之歌神農繼之教民食糓時則豊年之詠黄帝俻物始垂衣裳時則有龍衮之頌古今樂録曰周文王時鳯凰衘書而至文王乃作歌又曰堯郊天地祭神在座上有響誨堯曰水方至爲宫命子救之堯乃作歌又黄帝堯之丗民樂無事擊壤之歡慶雲之瑞因以作歌又曰白日落西山歌者沈攸之發荆州未敗之前思歸京師所作歌也又曰莫愁樂者亦因石城樂而有此歌石城西有女子名莫愁善歌謡且石城樂和中有忘愁聲因有此歌又曰秦始皇祠水群有黒頭公從河中出呼始皇曰來受天寳乃與群臣作歌又曰昔炎帝時有娥之覆以玉筐少選視之䴏遺二卵五色北飛逐之不及二女作歌始作北音夏孔甲田於東陽迷入民室主人方乳曰后來大吉或曰不勝之子必有殃孔甲取其子歸曰爲余子誰敢殃之及成人幕動折斧𬒳斬足孔甲爲作斧斤之歌始爲東音周昭王征荆辛餘靡長且多力爲王右渉漢梁敗王及祭公殞于漢中辛餘靡振王北濟又反振祭公周公候之于西翟實爲長公殷愸甲從宅西河追思故處始作西音長公繼是音以處西山此盖四方之歌也又曰許由者古之貞固之士也堯時爲布衣徒歩不與方逺交通衣食財得自足夏則巢居冬則穴處無杯杅毎以手捧水而飲之人有見其飲無杯以瓢遺之許由受以操飲畢輙掛於樹枝風吹樹瓢揺動歴歴有聲許由尚以爲繁擾取而棄之以清節約聞於堯堯大其志乃遣使以符璽禪爲天子於是許由喟然歎曰疋夫結志固如盤石采山飲河所以養性非以求禄位也放髮一優㳺所以安巳不懼非以貪天下也使者有愧還以狀報堯堯知許由不可動亦巳矣夫於是許由以使者言爲不善乃臨河洗耳樊堅見由方且洗耳問之耳有垢乎由曰無垢聞惡語耳堅曰何等語者由曰堯聘吾爲天子堅曰尊位何爲惡之由曰吾志在青雲何乃劣劣當作九州伍長乎於是樊堅方且飲牛聞其言而去耻飲子之下流於是許由名布四海堯旣殂落乃作箕山之歌曰登彼箕山兮瞻望天下山川麗﨑萬物還普日月運照靡不記暏游放其間何所却慮嘆彼唐堯獨自愁苦勞心九州憂勤后土謂余欽明傳禪易祖我樂如何蓋不盻頋河水流兮縁髙山甘瓜施兮弃綿蠻髙林肅兮相錯連居此之處傲堯君其後許由死遂葬于箕山又曰周太伯者周太王古公之長子也古公有子三人長者太伯次者虞仲少者季厯季厯之子名昌昌即文王也古公寢疾將死國當有傳心欲以傳季厯乃呼三子謂日我不起此病繼體興者其在昌乎太伯見太王傳季厯於是太伯與虞仲俱去𬒳髮文身以變形託爲王採藥後聞古公卒乃還犇喪哭於門外示夷狄之人不得入王庭於是季厯謂太伯長子也伯當立何不就太伯日吾生不供養死不飯含哭不臨棺不孝之子焉得繼父乎斷髮文身刑餘之人也戎狄之民也三者除焉何可爲君矣季厯垂涕而留之終不肯止遂委而去到江海之涯吟詠優游仰覽俯觀求膏腴之處遂適于吳率以仁義化以道德荆越之人移風易俗成集韶夏取象中國乃太伯之化也是後季厯作哀慕之歌章日先王旣徂長霣異都哀喪腹心未寫中懷追念伯仲季我如何栝桐萋萋生于道周宫館徘徊臺閣旣除何爲逺去使此空虚支骨離別垂思南隅瞻望荆越涕淚交流伯兮仲兮逝肯來遊自非二人誰訴此憂又日拘羑里者謂紂拘文王於羑里也文王未能政候時修道德百姓親附文王有子其二子皆賢是時崇侯虎與文王列爲諸侯德不及文王常疾之乃譛文王於紂日西伯昌聖人也長子發仲子旦皆聖三聖合謀將不利於君君冝慮之紂日冠雖弊冝加於上屨雖新冝處於下文王雖聖安可尅我崇侯譖文王至十紂用其言乃徙文王於羑里欲殺之於是文王四臣太顛宏夭散冝生南宫适之屬往見文王文王爲矉反目者紂之好色也拊桴其腹者言欲得奇寶也蹀躞其足者使疾迅也於是乃周流海內經厯豐土得美女二人水中太寶白馬朱鬛以獻於紂陳其中庭紂見之仰天而嘆日嘻哉此誰寶散冝生趍而進曰是西伯之宝以贖刑罪紂曰於寡人何其厚也立岀西伯紂謂冝生譛歧侯者長鼻决耳也冝生還以狀告文王乃知崇侯虎譛之文王在姜里時演八卦以爲六十四作欎戹之辤據于石困於蒺䔧乃申憤以作歌章曰殷道溷溷浸濁煩兮丹紫相合不分別兮迷乱聲色信䛕言兮閻閻之虎使我騫兮幽閑牢獄誰其言兮無辜桎梏誰所宣兮遘我四人皆憂勤兮得此珍玩且解大患兮倉遑迄命遺後昆兮作此象變兆在昌兮欽承祖命天不䘮兮遂臨下土在聖明兮討暴除乱誅逆王兮又曰莊周者齊人也明篤學術多所愽逹進准見方來却覩未發是時齊涽王好爲兵事習用干戈莊周儒士不合於時自以不用行欲避乱自隠於山岳後有逹莊周於涽王遣使賫金百鎰以聘相位周不就使者曰金至宝相尊官何辤之爲周曰君不見夫郊祀之牛衣之以朱綵食之以禾粟非不樂也及其用時鼎鑊在前刀俎列後當此之時雖欲還就孤犢寧可得乎周所以飢不求食渇不求飲者但欲全身逺害耳於是重謝使者不得巳而去後引声歌曰天地之道近在胷臆呼噏精神以養九德渇不求飲飢不索食避世俟道志潔如玉卿相之位難可直當巖巖之石幽而清涼枕塊寢處樂在其央寒涼回固可以乆長楊泉物理論曰始皇起驪山之冢使蒙恬築長城死者相属民歌曰生男慎勿舉生女哺用晡不見長城下尸骸相支柱丗說曰晉武帝問孫皓聞吴人好作汝歌頗能不皓正飲酒因舉觴勸帝而言曰昔與汝爲鄰今爲汝作臣上汝一杯酒令汝壽萬春帝悔琴操曰王昭君齊國王襄漢元帝時獻入後宫帝以妻單于昭君心念郷土乃作怨曠之歌曰秋木萋萋其葉委黄有鳥爰止集于包桑旣得升雲遊倚惟房志念幽沉不得頡頑我獨伊何改徃變常翩翩之鷰逺集西羗髙山峩峩河水泱泱嗚呼哀哉憂心惻傷太年御覽卷第五百七十一
