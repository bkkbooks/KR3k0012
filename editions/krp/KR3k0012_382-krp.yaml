front:
  text: 太平御覽卷第三百八十二
  hash: sha256:80773af871f0b5ffc730c84de72d99994384d4a83dc9424ef3796a313cac767d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_382-1a}
body:
  text: 人事部二十三醜丈夫醜婦人醜丈夫釋名曰醜臭也如臭穢也說文曰音蚩酉反可惡也又曰丈十尺也從手而持十也又曰夫從一大象人形也一象簮形冠而旣簮人二十而冠成人也故成人曰丈夫尚書曰洪範六極五曰惡孔安國曰醜陋也毛詩曰不見子都乃見狂且注曰狂且犯醜之人左傳曰賈大夫貌惡娶妻而羙三年不言不笑御以如臯射雉獲之其妻始笑又曰叔向適鄭唆口鬲薎惡惡醜皃也欲觀叔向從使之収器者而往立於堂下一言而善叔向將飲酒聞之曰必唆口鬲明也下執其手以上曰昔賈大夫惡娶妻三年不言不笑如臯射雉獲之其妻始笑而言賈大夫曰才之不可以巳我之不能射汝遂不言不笑夫今子少不颺言醜貌不發揚子若無言吾幾失子又曰宋華元爲植廵功植將主也城者曰睅其目皤其腹睅岀目皤大腹廣雅曰仳倠媒婄儓􅤵䫪䫂噅睢頦鶻䫏醜也仳鼻之切倠火遺切始音倍儓音臺􅤵蒲比反䫪差丈切䫂丁可切爲許爲切睢音佳頦古來切鶻音骨䫏音欺家語曰髙柴字子羔長不滿六尺狀皃甚惡爲人篤孝知名孔氏之門仕爲郕宰又曰耗土之人醜史記曰秦相蔡澤魋顔蹙頞頞鼻堇也又曰澹臺滅明字子羽狀皃甚惡欲事孔子孔子以爲材薄旣而受業退而脩行行不由徑非公事不見卿大夫南遊至江弟子三百人從之設取子去就名施乎諸侯孔子聞之曰吾以言取人失之宰子以皃取人失之子羽嘆書曰田蚡孝景帝皇后同母弟也辯有口學盤盂諸書爲人貌寢而貴又曰詔求能爲韓詩者蔡義召見恱之擢爲光禄大夫代楊敞爲相時年八十餘短小無鬢眉貌似老嫗行歩僂傴常吏挾乃行又曰張良貌若婦人范曄後漢書曰周舉字宣光汝南人也姿貌短陋而慱學東觀漢記曰永平中徴承宫爲博士遷左中郎數納忠諌論議切直名播匈奴時單于遣使求欲得見宫詔勑宫自整飾宫對曰夷狄炫名非識實也臣狀醜不可以示逺宜選長大威容者帝乃以大鴻臚魏應代之魏志曰管輅容貌醜無威儀言語不擇非類又曰王粲字仲宣山陽髙平人也年十七徃荆州依劉表表以粲貌寢而體通脫不甚重也晉書曰孫秀尚河東公主形陋短小奴僕之下者也又曰左思貌醜而口訥又曰張孟陽毎出人惡之輒擲瓦礫盈車王隱晉書曰劉伶字伯倫長六尺貌甚醜悴常携一壷酒使人荷鍤自隨以爲死便埋也孫嚴宋書曰桓護之字彦宗少倜儻不拘小節形狀短陋而氣幹強果又曰少帝㓜而狷急輕脫嶮迅細形黄貌色長頸鳥喙嘶聲齊書曰張融形貌短醜精神清徹王敬則見融革帶寛謂曰革帶太急融曰旣非歩吏急帶何爲又曰蕭坦之肥黒無鬢詔聲嘶時人號爲蕭瘂剛佷專執群小畏而憎之崔鴻十六國春秋前趙録曰郭汜字子游上郡人也父士爲縣卒隨巫而遇一女子於路巫曰此女生貴子君亦有貴子可相納之當興君門士納之生汜長不滿七尺醜極當時朴訥無慧後爲縣卒感憤遊學師事安平趙孔曜曜見而偉之曰此生有公骨其當貴逹又曰前秦録曰符雄字元才趙建武中拜龍驤將軍貌醜頭大而足短故軍稱爲大頭龍驤又曰徐成純直亮素爲王猛所知長不滿六尺醜極當時車頻秦書曰符堅六歳戯於路司隷徐統見而異焉而問曰符郎此官街小兒戯不畏縛耶荅曰吏縳犯事者不縛小兒戯統語左右曰此兒有王覇相左右曰此兒狀皃甚醜而君以爲相貴異何也曰非尓等所知也南史曰劉韞人材凡鄙爲明帝所寵在湘州雍州使善畫者圖其形出行鹵簿羽儀常自披翫嘗以圖示征西將軍蔡興宗戯之陽若不解畫者指韞形問之曰此何人韞曰是我其庸底類如此耶北史曰後魏廣陵侯衍弟欽中書監尚書右僕射儀同三司欽色尤黒故時人號爲黒面僕射唐書曰李輔國本名静忠短小貌陋頗知書計髙力士見之収在左右與諸奴爲伍年四十餘矣爲小䆠掌廐中文帳後遷至封成國公也又曰蘇丗長容貌醜陋頗有學識性滑稽言雜諧調隋大業中爲都水使者煬帝嘗謂之曰卿面何類駏驢丗長再拜叫呼以手據地蹙項敗面爲駏驢之狀羣臣掩口而笑煬帝大恱賜帛百疋又曰貞觀十年文德皇帝崩百官縗絰率更令歐陽詢狀貌醜異衆或指之許敬宗見而大笑爲御史所劾左授洪州都督周史曰慕容彦超吐渾部人也父亮以彦超貴累贈至三師彦超即漢髙祖之同産弟也嘗冒姓閻氏體黒面胡故謂之閻崑崙莊子曰厲人夜半生子其父取火視之恐其似巳也厲人醜人也又曰魯哀公問仲尼衛有惡人焉曰哀駘佗大夫之與處者思不能去也婦人之請於父母曰與爲人妻寜爲失子妾者十數而未止也是必有以異乎人也寡人召而觀之果以惡駭天下又曰支離䟽者頥隱於臍肩髙於頂㑹撮指天五管在上兩髀爲脅也孫卿子曰衛靈公有臣曰公孫吕身長七尺面長三尺而廣三寸名動天下孔藂子曰子髙見齊王齊王問誰可爲臨淄宰稱管穆焉王曰管穆容貌陋民不敬他荅曰夫見敬在德且臣所稱其能也君不聞晏子乎長不滿六尺面狀醜惡齊王上下莫不崇焉以穆體形方之猶賢之逺矣王乃以管穆爲臨淄宰也尸子曰禹長頸鳥喙面目顔色亦惡矣天下猶獨賢之吕氏春秋曰陳有惡人曰敦洽犨麋椎顙色如􅃮也又曰列精子髙德行於齊涽王所敬着布衣白縞冠㑹朝歩堂下謂侍者曰我好醜何如侍者曰公艷出而窺井歎曰惡丈夫也人之阿齊王實不良而言良亦其我之侍者也周斐汝南先賢傳曰周爕字彦祖歛頥折頞皃甚醜母欲不舉其父曰吾聞諸聖賢人狀皆有異於人興我宗者必此兒遂育之梁兾别傳曰子嗣爲河南尹嗣一名胡狗時年十六容皃甚陋不勝冠帶道路見者莫不嗤㗛焉司馬徽别傳曰劉綜欲候徽先使左右問其存亡徽鋤園左右問馬君所在徽曰我是徽頭靣醜陋問者罵之曰即欲求司馬公何等田奴而稱徽更刷頭飾服而出左右叩頭而謝之續捜神記曰桓大司馬從南州來拜簡文皇帝陵問左右商㳙形皃有人荅㳙爲肥短黒色形甚醜公云吾見之亦如此意惡之還州遂病無幾而薨謝綽宋拾遺記曰何尚之顔延年少年好爲嘲調二人並短小常謂顔公爲猴顔亦以何爲猴常共遊戯西池顔問路人云二人誰似猴路人指何曰彼似猴耳君乃真猕也束晳發蒙記曰醜男􅎦薎醜女鍾離春丗說曰王廣娶諸葛誕女入室言語始交王語婦曰神色卑下殊不似公休婦曰犬丈夫令婦人比蹤英傑崔駰慱徒論曰愽徒見農夫戴笠持耨以芸蓼荼靣目驪黒手足胼胘膚如桑朴足如熊蹄蒲伏壟敏汗出調泥乃謂曰子觸熱耕芸背上生鹽脛如燒椽皮如領革錐不能穿行歩狼跋脚戾脛酸謂子草木支體屈伸謂子禽獸形容似人何受命之薄禀性不純桓譚新論曰余嘗與郎泠喜出見一老翁糞上拾食頭靣垢醜不可忍視喜曰安知此非神仙余曰道必形體如此無以道焉風俗通曰齊有一女二家求之其家語其女曰汝欲東家則左袒欲西家則右袒其女兩袒父母問其故對曰願東家食而西家息以東家富而醜西家貧而羙也新序曰齊有田巴先生者行脩於外王聞其賢聘之將問政焉田巴先生改製新衣拂餙冠帶顧謂其妾妾曰佼將出門問其從者從者曰使過於淄水自照視醜惡甚焉遂見齊王齊王問政對曰今者大王召臣臣問妾妾愛臣䛕臣曰佼問從者從者畏臣䛕臣曰佼臣至臨淄水而觀然後知醜惡也今王察之齊國治矣㑹稽録曰任弈字安和句章人也爲人皃寢無威儀劉謚之龐郎賦曰其頭也則中觡而上下銳額平而承枕四起繁欽三胡賦曰莎車之胡黄目深精貟耳狹頥康居之胡焦頭折頞髙輔䧟無眼無黒眸頰無餘肉罽賔之胡靣象炙蝟頂如持囊隈目赤眥洞頞卬鼻朱彦時黒兒賦曰丗有非常人實惟彼玄士禀兹至緇色内外皆相似卧如驪牛𩥇立如烏牛時忿如鸜鵒闘樂似鸕鷀喜醜婦人周易曰老婦士夫亦可醜也韓詩外傳曰齊王厚送女欲妻屠門肚肚辭以疾其友勸之曰子孫死腥臭之肆而巳乎何以辭之肚應曰其女醜其友曰何謂也肚曰吾肉善如量而去苦少耳吾肉不善雖以他附益之尚猶不讎今厚送子子醜故耳其友下問女果醜目如擗杏齒如編蟹東觀漢記曰梁鴻同郡孟氏其女名光狀貌醜而黒力能舉石臼擇而不嫁至年三十鴻聞而聘之王隱晉書曰武帝爲太子納妃謀乆不决上欲娶衛瓘女楊后欲娶賈充女上曰衛公女有五可賈公女有五不可衛家種賢而多子端正而長白賈家種妬而少子醜而短黒也唐書曰張萬福典泗州時遇德宗幸奉天李希烈反陳少遊悉令管内刺史送妻子楊州以爲質萬福獨不肯送謂使者曰爲某白相公萬福妻老且醜不足煩相公意獨不送又曰中宗好與朝臣狎戲韋庶人微時有一乳母實蠻婢也旣老且醜齒髮秃落制於後宫刻列花燭嫁爲御史大夫竇懷貞妻俗謂乳母之􅡾曰阿遮懷貞毎進表狀列其官位必曰國遮欣然有自負之色莊子曰陽子之宋宿於逆旅逆旅人有妾二人其一人羙其一人惡惡者貴而羙者賤陽子問其故逆旅小子對曰羙者自羙吾不知其美也陽子曰弟子記之行賢而去自賢之行何徃而不受哉郭子曰許允婦是阮德如妹甚醜交禮竟許永無復入理桓範勸之曰阮嫁醜女與卿故當有意冝察之許便入見婦即出提裙𥚑停之許謂婦曰婦有四德卿有幾荅新婦所乏唯容士有百行君有其幾許曰皆備婦曰君好色不好德何謂皆備許有慙色遂雅相重劉向列女傳曰齊孤逐女者其狀甚醜三逐於郷五逐於里過時無所容乃造襄王之門而求見王輟食而起謹敬左右曰三逐於郷者不忠五逐於里者少禮何足爲遽王曰子不識也夫牛鳴而馬不應者異類故此人必有異者遂見與之語而嘉之又曰齊宿瘤者東都採桑之女閔王之后也閔王宣王子也項有大瘤故號曰宿瘤𥘉閔王遊至東百姓盡觀宿瘤女採桑如故王召問曰寡人出遊車騎甚衆百姓無長少弃事來觀汝不視何也對曰妾受父母教採桑不受教觀大王王曰此女也惜其宿瘤女曰中心何謂宿瘤何傷王大恱曰此賢女也命後車載之女曰女不受父母之教而隨大王是奔女也王大慙曰寡人失之貞女一禮不備雖死不從及歸遣使奉禮加金百鎰娉迎之父母驚惶欲洗沐爲衣裳女曰變容更服恐見不識於是如故隨使者閔王歸見諸夫人告曰今日出遊得一聖女及至諸夫人見者皆大笑王曰未飭耳飭與不飭相去十百女曰飭與不飭相去千萬不足言何獨十百也王曰何以對曰昔者堯舜桀紂俱爲天子堯舜安於節儉茅茨不剪採椽不斵後宫衣不曳地食不重味至今數千歲天下歸善桀紂不自飭仁義爲髙臺榭深池澤後宫蹈綺縠弄珠玉身死國亡爲天下㗛至今千餘歲天下歸惡由是觀之飭與不飭相去千萬閔王大感立以爲后朞月之間化行隣國諸侯朝之侵三晉懼秦楚立帝號及女死燕遂屠齊又曰齊鍾離春者齊無鹽邑之女鍾離姓春名也其爲人極醜無雙臼頭深目長壯大節卭鼻結喉頂上少髮折腰出胸皮膚若􅃮行年三十無所容入行嫁不售流弃莫執於是乃拂拭短褐自詣宣王願乞一見謁者曰晏齊之不售女也聞大王之聖願備後宫之掃除頓首司馬門外謁者以聞宣王方置酒於漸臺左右聞之莫不掩口而笑王曰此天下強顔女子也乃召見之謂曰昔先王爲寡人娶妃疋皆以備有列位者今夫人不容郷里布衣而欲干萬乘之主有何異乎鍾離春曰竊慕大王之羙義耳王曰然何善曰嘗隱善王曰試一行之言未卒忽不見王大驚立發隱書而讀之乆不能解明日復召之但揚目衘齒舉手拊膝曰殆哉如此者四矣王曰願聞命對曰今大王之國西有撗秦之患南有強楚之讟外有二國之難内聚姧臣衆人不附春秋四十年壯男不立故不務衆子而務衆婦尊所好而忽所恃一旦山陵崩墜社稷不定此一殆也漸臺五層黄金白玉琅玕翡翠萬人疲極比二殆也賢者伏匿於山林謟䛕強行於左右耶僞立於夲朝不得通入此三殆也酒漿流湎以夜繼晝女樂俳優縱橫大㗛外不脩諸侯之禮内不康國家之理此四殆也王闇然無聲喟然而歎曰痛乎無鹽君之言於是立壞漸臺罷女樂退謟䛕去彫琢選兵馬寳府庫闢四門招進直言卜擇吉日立大子拜無鹽君以爲王后齊國大安皆醜女之力也習鑿齒襄陽記曰黄承産沔南名士也謂諸葛孔明曰君擇婦否有醜女黄頭黒色而才堪相配孔明許焉即載送之時人爲㗛樂郷里爲之嗟曰莫作孔明擇婦正得河外醜女束晢發蒙記曰醜男􅎦篾醜女鍾離春通俗文曰不媚曰㜅音畜可惡曰嬒烏㑹反大醜曰㚠呼交反醜稱曰娭烏在反何承天纂曰嫫母醜人也楚辭曰西施媞媞而不得見兮嫫母勃屑曰侍而又曰珪璋雜於甑室隴廉與孟陬同宫舉丗以爲常俗固將愁苦而終窮劉思真醜婦賦曰才質陋且儉姿容劇嫫母鹿頭猕猴靣椎額復出口折頞靨樓鼻兩眼䫜一交切如臼膚如老桑皮耳如側兩手宋玉登徒子好色賦曰登徒子妻蓬頭攣耳攣牛善反齞牛美反脣歴齒旁行傴僂又疥且痔太平御覽卷第三百八十二
