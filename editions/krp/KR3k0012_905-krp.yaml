front:
  text: 太平御覽卷第九百五獸部十七
  hash: sha256:bd8be91a0cbdab62c72df4e7e89b06018c9ed556306eb7e1449a12afd85c3ba3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_905-1a}
body:
  text: 狗下列子曰楊朱之弟曰布衣素衣而出天雨解素衣衣緇衣而反其狗迎而吠楊布怒將扑狗楊朱曰子無扑矣子亦猶是也向者使汝狗白而徃黒而來豈能無怪哉晏子春秋曰晏子短使楚楚人爲門於大門側延晏子晏子曰使狗國者從狗門入今使楚不當從此門入又曰景公走狗死公命外供之棺内給祭晏子諌不可公曰善韓子曰宋有酤者斗槩甚平遇客甚謹爲酒甚羙懸幟甚髙而酒不售遂致於酸問楊長倩長倩曰汝狗惡也孺子懷錢挈壷往酤輙有狗齧之猶大臣齕有道之士尸子曰齊有貧者命其狗爲富命其子爲樂方將祭狗入於室叱之曰富出祝曰不祥家果有禍長子死哭之曰樂乎而不息悲也隋巢子曰昔三苗大亂龍生于廟犬哭于市尹文子曰康衢長者字僮曰善搏字犬曰善噬賔客不過其門三年於是改之賔客復往吕氏春秋曰齊有善相狗者其隣藉之買鼠狗朞年而得曰是良狗也其隣畜之數年不噉䑕以告相者曰此良狗也志在麞麋豕鹿不在䑕欲取其䑕也則桎之其鄰桎其後足則狗取䑕又曰齊有好獵者不得獸欲湏良狗家貧不能得乃還疾耕疾耕則家富家富則有良狗有良狗則數得獸也獵常過人霸王亦然又曰荆王得茹黄之狗宛路之繒以畋雲夢三月不返保申跪而笞王出而自沉於澗而死王乃殺狗拆繒又曰鄭子陽之難猘狗潰之子陽鄭伯逐猘狗春秋亦去齊髙固之難失牛潰之逐失牛如逐猘狗也當其時狗牛猶可以爲人倡而况夫以人爲倡乎飢馬盈厩嗼然嗼無聲也未見蒭也飢狗盈宫嗼然未見骨也見骨與芻動則不可禁淮南子曰削薄其德曽累其形而欲以爲治無以異於執彈而來鳥䄂梲而狎犬也稅仗也又曰馬之死也剥之若橐槖治橐也雖含氣而形不能摇狡狗之死也割之猶蠕狡少也蠕動也又曰狂馬不觸於木猘狗不自投於河聾蟲不自䧟况人乎聾無知也淮南萬畢術曰取馬毛犬尾置朋友夫妻衣中自相憎矣抱朴子曰陶犬無守夜之益瓦鷄無同晨之警又曰甘始以駐年藥餌食新生雞犬皆不長食白犬則毛黒說苑曰梁相死惠子之梁渡河而遽墮舡舡人救之問欲何之曰欲相梁舡人曰子居舟擑之間而溺無我則死又安能相梁乎惠子曰居廣長艥之間我不如子至於安國家全社稷子不比我吾視子蒙蒙若未視之狗子耳論衡曰亡獵犬於山林大呼犬名其犬則鳴號而應其主人犬異類聞呼而應者識其主也潜夫論曰一犬吠形百犬吠聲桓譚新論曰占仲子婢死有兒年四歲葬後數來撫循之亦能爲兒沐頭甚令人惡之以告方士曰有狗効之婢遂不復來又曰楊仲文家嫗死巳歛未葬忽起坐棺前牀上飲酒醉而狗形見殺之風俗通曰殺狗磔邑四門俗云狗别賔善守衛着以辟惡又曰太史公記云秦始皇殺狗磔四門以禦凶災今人殺白犬以血題門户曰正月白犬血辟除不祥又曰殺犬磔攘犬者金畜攘者却也抑金使不害也又曰桂陽太守汝南李叔堅少時爲從事在家狗如人立行家人言當殺犬叔堅云犬馬喻君子狗見人行効之何傷叔堅見縣令還解冠搨上狗戴持走家大驚堅復云悞觸冠冠纓挂着之耳狗於竈前畜火家益怪堅復云兒婢皆在田中狗助畜火狗何能作怪遂不肯殺後數日狗自暴死卒無纎芥之異叔堅辟太尉掾固陵長原武令終享大位金樓子曰入名山牽白犬抱白鶴山神大喜芝草及寳玉等自出又曰王思微性好浄㓗左右提衣悉令白紙裏手指在宅有犬汙柱思微令門生洗之意猶不巳更令刮削復言未足遂令易柱洞林曰楊州從事慎曜伯婦病困經日發作有時如聞物徃來者其兄周彦武令人作卦得蹇身在戊戍與坎鬼并卦中當有從東北田家市黒狗畜之以代人任患死當有無幾時狗便死復更養如前凡三遇飬輙皆吐血而死婦病亦差雜五行書曰白犬虎文南斗君畜之可致萬石也黒犬白耳大王犬也畜之令冨貴黒犬白前兩足冝子孫白犬黄頭家大吉黃犬白尾代有衣冠黄犬白前兩足利人玄中記曰昔髙辛氏犬戎爲亂帝言曰有討之者妻以羙女封三百户帝之狗名槃瓠亡三月而殺犬戎以其首來帝以女妻之於㑹稽東南得海中土三百里而封生男爲狗生女爲羙人封爲狗氏國于寳搜神記曰槃瓠者夲髙辛氏宫中老婦人有耳疾醫者挑治之有物大如繭以瓠離盛之以槃覆之有頃化爲犬其文五色因名槃瓠秦氏三秦記曰有白鹿原周平王時白鹿出此原原有狗枷堡秦襄公時有天狗來其下凡有賊天狗吠而護之一堡無患凉州異物志曰犬狗如驢希見其牙周處風土記曰犬則青鸇白雀飛龍虎子馴良捷警難狎易使述異記曰濟陽山有麻姑仙處俗說山上千年則金鷄鳴玉狗吠漢末皆云淮南王昇仙其處鷄鳴天上犬吠雲中又曰朱休之家犬歌曰言我不能歌聽我歌梅花今年故復可明年當柰何家殺犬明年並死又曰宋元徽中呉縣中都里石玄度家有黄狗生白雄子母愛其子異於常犬銜食飴之子成大狗子每出獵未反母輙門外望之玄度乆患氣嗽轉就危困毉爲處湯湏白犬胏市索卒不得乃殺所飬白狗以供湯用母向子死處跳踊嘷呼倒地復起累日不息其家煑狗肉與客共食之投骨於地母輒銜置窟中食畢移入後園大桑樹下掘土埋之日向樹嘷喚月餘乃止玄度漸劇臨死屢言湯不救恨殺此狗其弟法度從此終身不食狗肉又曰陸機少時頗好遊獵在呉豪盛客獻快犬名曰黃耳機往仕洛常將自隨此犬黠惠能解人語又常借人三百里外犬識路自還一日至家機羈官京師乆無家問機戯語犬曰我家絶無書信汝能賫書馳還取消息不犬喜揺尾作聲應之機試爲書盛以竹筒繫之犬頸犬出驛路疾走向呉飢入草噬肉取飽毎經大水輙依渡者弭耳掉尾向之其人怜愛因呼上舡載近岸犬即騰上速去如飛逕至機家口銜竹筒作聲示人機家開筒取書看畢犬又向人作聲如有所求其家作荅内竹筒中復繫犬頸犬旣得荅仍馳還洛計人程五旬而犬往還裁半後犬死殯之遣送還家葬機村南去機家二百歩築土爲墳村人呼爲黄耳冢異苑曰東海何澹之隆安𥘉屢入關中後還得一犬壯大非常何每行來輙巳知處澹之後抱疾犬亦疾及其亡犬一噑而斃神仙傳曰李仲甫者能隱形𥘉隱百日一年復見形後遂長隱但聞其聲與人對接飲酒食如常有諸張欲從學甫云卿性急未中教張守之至費用五十疋了無所得張大怒乃懷上手而往先與仲甫語畢因依聲左右斫之甫巳在他牀笑云天下乃當有汝曹愚人學道未得而殺人也我寧可得殺我真得殺汝但頑癡不足問耳使主人呼一犬來着諸生前看能殺之否俄尔犬頭在地犬腹巳破叱諸生云卿言我能使卿如犬形否諸生下地叩頭乃止遂不教之列仙傳曰列子者自稱蜀人好放犬犬走入山穴列子隨十餘宿行度數百里出山頭上有殿屋官府松樹仙人吏使甚嚴見其故妻主江魚與列子一函藥發函魚子也着池中飬之一年皆爲龍列後送函上山犬色更赤有長翰常隨列往來百餘年遂留山上時時下護其宗族蜀人立祠於穴孔常有皷似傳呼聲搜神記曰山陽王瑚字孟璉爲東海蘭陵令夜半時輙有黒幘白單衣吏詣縣扣閣近之則忽然不見如此數年後令伺之見一老狗黒頭白軀至閣便爲人以白孟璉殺之乃絶又曰鄱陽趙壽有犬蠱有陳岑家有黄犬六七群出吠岑後令伯婦與壽婦食吐血幾死屑桔梗飲之乃愈又曰東越門中有墉下北隰中有大虵長七八丈大十餘圍嘗八月送童女至虵穴輒吞之噉九女時樂縣李誕有小女名竒應募而行乃請好劒咋虵犬詣之至則放犬咋虵以劒擊之越王竒之娉以爲后續搜神記曰林慮山下有亭有過宿者或病或死常云有十餘人男女各雜衣或黒或白轉來爲害有劉伯夷者過宿明燭而坐誦經至中夜其怪復集伯夷宻以鏡照之乃一群狗也因陽以燭悞灼其衣作燃毛氣乃以刀刺之遂死餘大悉走去又曰晉穆哀之丗領軍司馬濟陽蔡詠家犬夜群相吠伺之見一狗着黄衣戴帢爲衆犬所吠打殺乃是詠家老黄犬又曰晉太和中廣陵人楊生養狗甚怜愛之行止與俱後生飲酒醉行經大澤草中眠不能動時冬月有野火起風又猛狗周章號喚生醉不覺前有一坑水狗便走徃眠水中還以身壓生左右草沾濕着地火㝷過去生方醒他日又闇行墮空井中犬呻吟徹曉湏臾有人逕過怪犬向井號徃視見生生曰君可出我當厚報君人問以何物見與生云唯君耳人曰以狗見與便相出生曰此狗曽活我於巳死不得相與任君人曰若氽便不成相出狗因下頭目井生知其意乃語路人以狗相與乃出之繫狗而去却後五日狗夜走還又曰㑹稽人張然滯役經年不歸婦遂與奴私通然飬一狗名曰烏龍後歸奴與婦欲謀殺然狗注精䑛脣視奴然烏龍與手應聲盪奴奴失刀仗然取刀殺奴也幽明録曰晉太興二年呉民華隆生獵飬一快犬号曰的尾常將自隨隆後至江邊伐荻犬暫出渚次隆爲大虵所圍繞周身犬還便咋虵虵死隆僵仆無所知犬彷徨涕泣走還舡復反草中伴怪所以隨徃見隆悶絶將歸家二日犬爲不食隆復蘇乃始進飯隆愈愛惜同於親戚後忽失之二年尋求見在顯山嶺表録異曰嘗有人自青社泛海歸閩爲惡風所飄五日夜不知其幾千里也經一處同舡有新羅人云是狗國逡廵果如人躶形抱狗而出見舡驚走楚辤九辨曰豈不鬱陶而思君兮君之門以九重猛犬唁唁而迎吠兮關梁閉而不通魏賈岱宗大狗賦曰其頭顱也不可論以盡其骨法也不可辨而釋傞蹴蹌雄姿猛相兀然髙八九尺毛踰紫豔光雙眉如白壁時頻伸而振迅若應龍之騰擲瓜類刀戈牙如交㦸西晉傅玄走狗賦曰骨相多竒儀表可嘉足懸鈎瓜口含素牙首類驤螭尾如騰虵脩頭闊腋廣前捎後豐顱促耳長又緩口舒薄急筯豹耳龍形蹄如結鈴五魚體成勢似凌青雲目若泉中星轉視流光采矅赤精震茹黄而慴朱鵲兮越妙古而揚名太平御覽卷第九百五
