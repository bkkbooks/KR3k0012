front:
  text: 太平御覽卷第九百七十果部七
  hash: sha256:d82b1a8c6a52083702edfff82035afeb7e3293a24a35fd69becc23ceaec404d8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_970-1a}
body:
  text: 梅石榴㮏梅爾雅曰梅柟似杏實酢尚書說命曰若作和羮爾爲塩梅毛詩鵲巢標有梅曰標有梅男女及時也標有梅其實七兮標落也盛極則墮落者梅也求我庶士迨其吉兮詩義䟽曰梅杏類也樹及葉皆如杏而黒煑而乾爲蘇置羮臛韲中又可含以香口又谷風四月曰山有嘉卉侯栗侯梅又墓門曰墓門有梅有鴞萃止大戴禮夏小正曰正月煑梅爲豆實吴曆曰孫亮岀西苑方食生梅使黄門至中藏取蜜以漬蜜中有䑕矢侍中請付獄推亮曰此易知耳令破䑕矢矢裏燥亮大笑曰乆在蜜中中當濕今外濕裏燥必黄門爲搆黄門首服左右莫不驚悚宋書曰武帝女壽陽公主人日卧於含章簷下梅花落公主額上成五岀之華拂之不去皇后留之自後有梅花粧後人多効之南史曰栁惲甞與琅瑘王瞻博射嫌其皮闊乃摘挴帖烏珠之上發必命中觀者驚駭梁書曰任眆爲新安太守郡有蜜嶺及楊梅舊爲太守所採眆以冒險多毒物故即時停之唐書曰蕭倣爲嶺南節度使倣性公廉南海雖冨珎竒月俸之外不入其門家人疾病醫工治藥湏烏梅左右於公厨取之倣知而令遷之促買於市淮南子曰百梅足以爲百人酸一梅不足以爲百人酸喻衆能濟少少不能有所成也枹朴子曰綺里丹法以鈆百斤合五石煑之皆成銀以雄黄煑之皆成黄金金太剛以猪膏煑之太柔以梅煑之山海經曰靈山其木多梅郭樸注曰似杏而酢說苑曰越使諸發執一枝梅遺梁王梁王之臣韓子顧謂左右惡有一枝梅遺列國之君乎論衡實知篇曰使聖人空坐獨思則不知百丗後有馬生牛牛生驢桃生李李生梅也世說曰魏武帝行失道三軍皆渇帝令曰前有大梅林饒子甘酸可以解渴士卒聞之口皆水出地理志曰南陵有梅根治風俗通曰夏禹廟中有梅梁忽一春生枝葉又曰五月有落梅風江淮以爲信風又有霖霪號爲梅雨沾衣服皆敗黦桂陽先賢傳曰有人謂蘇統後園梅樹下種藥可治百病吴氏夲草曰梅核明目益氣不飢東方朔別傳曰朔與三門生俱行見一鳩占皆不同一生曰今日當得酒一生曰其酒必酸一生曰雖得酒不得飲也三生皆到主人湏臾主人岀酒樽中即安於地羸而覆之訖不得酒出門問見鳩飲水故知得酒鳩飛集梅樹上故知酒酸鳩飛去所集枝折墮地折者傷覆之象故知不得飲也西京雜記曰上林苑有朱梅同心梅紫蔕梅燕支梅麗枝梅紫花梅侯梅周處風土記曰夏至之雨名爲黄梅雨廣志曰蜀名梅爲䕩大如鴈子梅䕩皆可以爲油脯黄梅以熟䕩作之䕩音老伍瑞休江陵記曰洪亭村下有白藉洲東南得邴洲上頭有枚迴村舊云是梅槐合生成樹是以名之音訛謂之梅迴荆州記曰陸凱與范曄相善自江南寄梅花一枝詣長安與曄并贈花詩曰折花逢驛使寄與隴頭人江南無所有聊贈一枝春神異經曰北方荒外有石胡焉方千里中有横公魚夜化爲人刺之不入煑之不死以烏梅二七煑之即熟可巳邪病述異記曰嘉興縣睪陶村朱休之有弟朱元元嘉二十五年十月清旦兄弟對坐家中有一犬來向休蹲遍視二人而笑遂揺頭歌曰言我不能歌聽我歌梅花今年故復可柰汝明年何其家驚懼斬犬榜音滂首路側至歳末梅花時兄弟相忿奮㦸傷兄官収治並𬒳囚繫經歳得免至夏舉家時疾母及兄弟皆卒任昉述異記曰邯鄲有故邯鄲宮基存焉中有趙王果園梅李至冬而花春得食嶺南異物志曰南方梅繁如北杏十二月開語林曰范汪至能啖梅人甞致一斛奩湏臾啖盡潘岳閑居賦曰梅杏郁棣之属左思蜀都賦曰梅杏羅生栢梁臺太官令曰柤梨橘栗李桃梅張恊七命曰燀音闡以秋橙酢以春梅接以啇王之箸承以帝辛之盃石榴廣雅曰若榴石榴也晉隆安起居注曰武陵臨沅縣安石榴子大如椀其味不酸一蔕六實宋書曰元嘉末魏太武征彭城遣使求甘蔗安石榴張暢曰石榴岀自鄴下亦當非彼所乏北史曰齊安徳王延宗納趙郡李祖収女爲妃後帝幸李宅宴而妃母宋氏薦二石榴於帝前問諸人莫知其意帝投之問魏収曰此竟何意収曰石榴房中多子王新㛰妃母欲子孫衆多帝大喜詔収卿還将來仍賜羙錦二疋唐書曰孔紹安大業末爲監察御史時髙祖爲隋討賊於河東詔紹安監髙祖之軍深見接遇及髙祖受禪紹安自洛陽間行奔髙祖見之甚恱拜内史舎人時夏侯端亦甞爲御史監髙祖軍先紹安歸朝授祕書監紹安因侍宴應詔詠石榴詩曰秪爲來朝晚開花不及春時人稱之神仙傳曰劉馮者沛人也封桑郷侯學道於樓丘子常服石桂英及中岳石榴垂四百年如十五㓜童瀬郷記曰老子祠堂北有石榴二株鄴中記曰石虎苑中有安石榴子大如椀盞其味不酸廬山記曰香爐峯頭有大盤石可坐數百人石垂生山石榴三月中作花色似石榴而小淡紅敷𬗋蕚輝曄可愛襄國記曰龍崗縣有好石榴博物志曰張騫使西域還得安石榴廣志曰安石榴有甜酢二種陸機與弟雲書曰張騫爲漢使外國十八年得塗林安石榴也李尤徳陽殿賦曰蒲挑安若曼延蒙籠應吉甫安石榴賦曰余徃日爲中書直廬上有安石榴枝葉甚茂故爲之賦傳玄安石榴賦曰虎宿中而纎條結龍辰升而丹華繁其在晨也灼若九日栖扶桑其在夕也爽若燭龍吐潜光庾儵若石榴賦曰逺而望之若摛績𬒳山阿迫而察之赫若龍輝耀渌波也夏侯孝若石榴賦曰接翠蕚於緑蔕冒紅牙於丹鬚赩然含㽔璀爾散珠雪酲解䬼怡神實氣潘岳閑居賦曰若榴蒲陶之珎磊落蔓廷於其側又安石榴賦曰實有嘉木名安石榴採條外暢縈幹内樛丹輝綴於朱房緗的點於紅鬚煌煌煒煒熠耀入蘃似長離之栖鄧林苦珊瑚之暎流水光明燐爛含丹耀紫味滋芳䄂色麗瓊蘂潘岳安石榴賦曰若榴者天下之竒樹九州之名菓也是以屬文之士或叙而賦之遥而望之煥若隨珠耀重淵詳而察之灼若列宿岀雲間千房同模十子如一御飢療渴解酲止醉左思吴都賦曰蒲桃亂潰若榴竟裂張載重作石榴賦曰於是天廻節移龍火西夕流風晨激行露朝白紫房獨熟頳膚自坼剖之則珠散含之則氷釋充嘉味於庖籠極酸甜之滋液上薦清廟之靈下羞玉堂之客張恊安石榴賦曰乃剖乃折金房緗隔范堅安石榴賦曰紅鬚肉艷頳牙外摽似華燈之映翠幕若丹瓊之厠碧瑶殷元安石榴賦曰余以暇日散愁翰林覩潘張若榴二賦雖有其羙猶不盡善客復措辝故聊爲之賦曰或珠離於琁琬或玉碎於雕觴璘彬洒暎曄紫嬰緗璀若瑶英之攅鍾巘粲若靈􅑕之含珠璫徐藻妻陳氏石榴賦曰惟木之珎莫羙石榴擢鮮葩於青春結芳實於素秋王倫妻羊氏安石榴賦曰振緑葉於柔柯垂彤子之累衰張載詩曰大谷石榴木滋之冣膚如凝脂汁如清瀬渴者所思銘之裳帶曹植弃妻詩曰石榴植前庭緑葉揺縹青翠烏飛來集拊翼以悲鳴麋元詩曰蒼蒼陵上栢參差列成行童童安石榴列生神道傍㮏晉書曰成帝杜皇后崩先是三吴女子相與簮白花望之如素㮏傳言天公織女死爲之着服至是而后崩三國典略曰楊愔一門四世同居家甚隆盛昆弟就學三十餘人庭有㮏樹實落于地羣兒咸争愔獨坐不顧季父暐見之謂賔客曰此兒恬𥙿有我風蕭廣濟孝子傳曰王祥後母庭有㮏樹始着子使守視祥晝駈鳥雀夜則驚䑕時雨忽至祥抱樹至曙母見惻然紫虗南岳夫人傳曰夫人姓魏名華存性樂神仙季冬夜半有四真人並年可二十降夫人靖室因設酒饌陳玄雲紫㮏夫人還王屋山王子喬等並降時夫人與真人爲賔主設三玄紫㮏玄晏春秋曰衛倫過子論及於時味倫因命僕取糗進予予曰夌也有杏李㮏味具杏部杜恕篤論曰日給之華與㮏相似也㮏結實而日給零落虚僞之然與真實相似也虛僞敗而真實成西京雜記曰上林苑有白㮏紫㮏花紫緑㮏花緑廣志曰㮏有白赤青三種張掖有白㮏酒泉有赤㮏西方例多㮏家以爲脯數十百斛以爲蓄積如収藏棗栗若㮏汁黒其方作羮以爲豉用也漢武故事曰上握蘭園之金精摘圎丘之紫㮏釋名曰㮏油擣㮏實也和以塗繒上慘而發之形似油也㮏脯切㮏曝乾之如脯也盧諶祭法曰夏祠法用白㮏秋祠用赤㮏晉太始起居注曰太始二年六月嘉㮏一蔕十五實或七實生於酒泉王子年拾遺記曰崑崙山上有㮏冬生子碧色湏玉井之水洗方可食郭子横洞冥記曰有紫㮏大如升甜如蜜核紫花青虎丘山䟽曰山下三靣有春秋二㮏夲草經曰㮏味苦令人臆脹病人不可多食晉宫閣名曰華林園有白㮏四百株左太冲蜀都賦曰朱櫻春就素㮏夏成潘安仁閑居賦曰二㮏燿丹白之色潘尼東武觀賦曰飛甘瓜於浚水投素㮏於清渠曹植求祭先王表文帝曰乞請白㮏二十枚又謝賜㮏表曰即夕殿中虎賁宣詔賜臣等冬㮏一奩詔使温啖夜非食時而賜見及㮏以夏熟今則冬至物以非時爲珎甘以絶口爲厚實非臣等所冝蒙荷詔曰此㮈乃從梁州來道里旣逺來轉暖故㮈變色張載詩曰江南都蔗釀液豊霈三巴黄甘瓜州素㮏凡此數品殊羙絶快渴者所思銘之裳帶太平御覽卷第九百七十
