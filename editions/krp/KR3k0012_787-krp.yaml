body:
  text: 南蠻三赤土國蒲羅中國優鈸國横跌國北攎國馬五洲薄歎洲躭蘭洲巨延洲濵郍專國鳥文國期調國林陽國牟奴七國蒲林國師子國毗加梨國干陁利國狼牙脩國婆利國訶羅陁國呵羅單國蒲黄國婆皇國婆逹國闇婆逹國槃槃國斤陁利國赤土國隋書曰赤土國扶南之別種也在南海中水行百餘日而逹所都土色赤因以爲号陳婆羅刺國西婆羅婆國南訶羅旦國北巨大海地方數千里其王姓瞿曇氏名利冨多塞不知有國近逺稱其父釋王位出家爲道傳位於利冨多塞在位十六年矣有三妻並隣國王之女也居僧祇城有門三重相去各百許歩毎門圖畫仙人菩薩之像懸金花鈴毦婦女數十人或奏樂或捧金花又飾四婦人容飾如佛塔邊金剛力士之狀夾門而立門外者持兵杖門内者執白拂夾道垂素網綴花王宮諸屋悉是重閤北户北面而坐坐三重之榻衣朝霞布冠金花冠垂雜寳瓔珞四女子立侍左右兵衛百餘人王榻後作一龕以金銀五香木雜鈿之龕後懸一金光熖夾榻又樹二金鏡鏡前首陳金甕甕前各有金香炉當前置一金伏牛牛前樹一寳盖盖左右皆有寳扇婆羅門等數百人東西重行相向而坐其官有薩陁迦邏一人陁拏逹又二人迦利密迦三人共掌政事俱羅末帝一人掌刑法毎城置郍耶迦一人鉢帝十人其俗皆穿耳剪髮無跪拜之禮以香油塗身敬佛尤重婆羅門婦人作髻於項後男女通以朝霞朝雲雜色布爲衣豪冨之室恣意華靡唯金鏁非王賜不得服用毎婚嫁擇吉曰女家先期五日作樂飲酒父執女手以授壻七日乃配焉旣娶則分財別居唯㓜子與父同居父母兄弟死則剔髮素服就水上構竹爲棚棚内積薪以屍置上燒香建幡吹蠡擊皷以送之縱火焚薪遂落於水貴賤皆同唯國王燒訖収灰貯以金瓶藏於廟屋冬夏常温雨多霽少種植無時特冝稻穄白豆黒麻自餘物産多同交阯以甘蔗作酒雜以紫瓜根酒色黄赤味亦香羙亦名椰漿爲酒又曰煬帝即位募能通絶域者大業三年屯田主事駿虞部主事王君政等請使赤土帝大恱賜駿等帛各百疋時服一襲遣賫物五千叚以賜赤土王其年十月駿等自南海郡乗舟晝夜二旬毎值便風至焦石山而過東南泊陵伽鉢拔多洲西與林邑相對上有祠神焉又南行至師子石自是島嶼連接又行二三日西望見狼牙湏國之山於是南逹雞籠島至於赤土之界其王遣使婆羅門鳩摩羅以舶三十艘來迎吹蠡擊皷以樂隨使進金鏁以纜駿舩月餘至其都王遣其子郍耶迦請與駿等禮見先遣人送金盤貯香花并鏡鑷金合二枚貯香油金瓶八枚貯香水白疊布四條以擬供使者盥洗將象二頭持孔雀盖以迎使人并致金花盤以藉詔凾男女百人奏蠡鼓婆羅門二人導路至王宫宣詔訖引駿等坐奏天笁樂事畢駿等還舘又遣人送食以草葉爲盤其大方丈後請駿等入宴王前設兩床床上並設草葉盤方一丈五尺上有黄白紫赤四色之餅牛羊魚鱉猪蝳蝐之肉百餘品延駿升床從者坐於地席各以金鍾置酒女樂迭奏禮遺甚厚㝷遣郍邪迦隨駿貢方物旣入海見緑魚群飛水上浮海上十餘曰至林邑東南並蒲浪北山而行其海水闊千餘歩色黄氣腥舟行一日絶云是大魚糞也循海北岸逹于交阯至六年春與郍耶迦於弘農謁帝帝大恱賜物及官賞各有差蒲羅中國呉時康㤗爲中郎表上扶南土俗曰拘利正東行極﨑頭海邊有居人人皆有尾五六寸名蒲羅中國其俗食人優鈸國康㤗扶南土俗曰優鈸國者在天笁之東南可五千里國土熾盛城郭珎玩謡俗與笁司横趺國康泰扶南土俗曰横趺國在優鈸之東南城郭饒樂不及優鈸也北攎國康泰扶南土俗曰諸薄之東南有北攎洲出錫轉賣與外徼馬五洲康㤗扶南土俗曰諸薄之東有五洲出鷄舌香樹木多華少實薄歎洲康㤗扶南土俗曰諸薄之西北有薄歎洲土地出金常以採金爲業轉賣與諸賈人易粮米雜物躭蘭洲康㤗扶南土俗曰諸薄之西北有躭蘭之洲出鐡巨延洲康㤗扶南土俗曰諸轉薄之東北有巨迹洲人民無田種芋浮舩海中截大蚶螺杯徃扶南濵郍事國康㤗扶南土俗曰濵郍專國岀􅗬都田切馬及金俗民皆有衣𬒳結髪也烏文國康㤗扶南土俗曰鳥文國昔混滇𥘉載賈人大舶所成此國斯調國康㤗扶南土俗曰斯調洲灣中有自然監累如細石子國人取之一車輸王餘自入南州異物志曰斯調海中洲名也在歌營東南可三千里上有王國城市街巷土地沃羙萬震南方異物志曰斯調國又有中洲焉春夏生火秋冬死有木生於火中秋冬枯死以皮爲布林陽國康㤗扶南土俗曰扶南之西南有林陽國去扶南七千里土地奉佛有數千沙門持戒六齊曰魚肉不得入國一曰再市朝市諸雜米甘菓石宻暮中但貨香花南州異志曰林陽在扶南西七千餘里地皆平博民十餘萬家男女行仁善皆侍佛牟奴國摸盧國末利國卑離國滿都國余國沙樓國晉起居注曰太熈元年正月牟奴等國大小口十七萬九千餘人各遣正副使詣護東夷校尉何龕上獻方物蒲林國晉起居注曰興寜元年閠月蒲林王國新開通前所奉表詣先帝今遣到其國慰諭師子國宋元嘉起居注曰師子國王遣使奉獻詔曰此小乗經甚少彼國所有皆可悉爲冩送之聞彼隣多有師子此所未覩可悉致之法顯記曰師子國本无人正有鬼神及龍居之諸國商人來共市易鬼神自現身但岀寳物顯其時直商人則依價直取物諸國人文其土樂悉亦復來於是遂成大國和適無冬夏之異草木常茂田種隨人無有時節毗加梨國宋元嘉起居注曰五年天笁毗加梨國王月遣使上表并奉金剛指環一枚剛印摩勒金環一枚翕毛㲪一具白旃檀六叚白赤鸚鵡各一頭細疊兩張干陁利國南史曰干陁利國在南海洲上其俗與林邑扶南略同出班布古貝㯽榔特精爲諸國之極宋孝武世王釋婆羅郍隣陁遣長史竺留陁獻金銀寳器梁天監元年其王瞿曇脩跋陁羅以四月八日夢一僧謂曰中國今有聖主十年後佛法大興汝若遣使貢奉禮敬則土地豐樂啇旅百倍若不信我則竟土不得自安𥘉未之信旣而又夢此僧曰汝若信我我當與汝徃觀乃於夢中至中國拜覲天子旣覺心異之陁羅本工畫乃冩夢中所見武帝容資飾以丹青仍遣使并畫工奉表獻玉盤等物使人旣至摸冩帝形以還其國比本畫則符同焉因盛以寳凾日加禮敬後跋陁死子毗針耶跋摩立遣長史毗貟䟦摩奉表獻金芙蓉雜香藥等狼牙脩國南史曰狼牙脩國在南海中其界東西三十日南北二十日行北去廣州二萬四千里土氣物産與扶南略同偏多棧沉婆律香其俗男女皆袒而披髪以古貝爲于漫其王及貴臣乃加雲霞布覆胛以金繩爲絡帶金環貫耳女子則布以纓絡繞身其國累塼爲城重門樓閣王出乗象有幡毦旗皷罩白盖兵衛甚嚴國人說立國巳四百餘年後嗣衰弱王族有賢者國人歸向之王聞乃加囚執其鏁無故自斷王以爲神因不敢害乃逐出境遂奔天笁天笁妻以長女俄而狼牙王死大臣迎還爲王二十餘年死子婆伽逹多立天監十四年遣使阿撤多奉表婆利國南史曰婆利國在廣州東南海中洲上去廣州二月日行國界東西五十日行南北二十日行有一百三十六聚土氣暑熱如中國之盛夏榖一歳再熟草木常榮海出文螺紫具有石名坩貝大硬其國人抱古貝如𫀆及爲都縵乃用班絲者以瓔絡繞身頭着金長冠髙尺餘形如牟綴以七寳之飾帶金裝劒偏坐金髙座以金鐙支足侍女皆爲金花雜寳之飾或持白毦拂及孔雀扇王岀以象駕輿輿以雜香爲之上施羽蓋珠簾導從吹螺擊皷自古来通中國問其先及年數不能記自言白静王夫人即其國女天監十六年遣使奉表獻金席等普通三年其王頻伽復遣使珠智獻白鸚鵡青蟲兠鍪琉璃器古具螺杯雜色香數十種隋書曰婆利國自交阯浮海南過赤土丹丹乃至其國國界西四月行南四十五日行王姓刹利耶伽名護濫那婆官曰獨訶邪拏次曰獨訶氏拏國人善投輪刀其大如鏡中有竅外鋒如鋸逺以投人無不中其餘兵器與中國略同俗類眞臘物産同於林邑其殺人及盗截其手姦者鏁其足朞年而止祭祀必以月晦盤貯酒殽浮之流水毎十一月必設大祭海出珊瑚有鳥名舎利解人語大業十二年遣使入貢後遂絶訶羅陁國南史曰訶羅陁國宋元嘉七年遣使奉表曰伏承聖主重三寳興立塔寺周滿國界今故遣使二人表此微心呵羅單國宋元嘉起居注曰去年六月闍婆洲呵羅單國王毗沙䟦摩遣使獻奉又曰十一年呵羅單國王尸梨毗遮耶獻銀㵕柈等南史曰呵羅單國都闍婆洲元嘉七年遣使獻金剛指環鸚鵡鳥天笁國白疊等物十年呵羅單國王毗沙䟦摩奉表曰常勝天子陛下諸佛世尊常樂安稳三逹六通爲丗間尊是名如來是故至誠五體敬禮其後與子所篡奪十三年又上表二十六年文帝詔曰呵羅單國婆皇婆逹三國頻越遐海欵化納貢逺誠冝甄可並加除授乃遣使䇿命之二十九年又遣長史婆和沙弥獻方物蒲黄國宋元嘉起居注曰二十六年蒲黄國獻牛黄等物又獻欎金香等物婆皇國南史曰婆皇國元嘉二十六年國王舎利婆羅䟦摩遣使獻方物四十一種文帝䇿命之爲婆皇國王二十八年復遣使貢獻孝武孝建三年又遣長史笁郍婆智奉表獻方物以郍婆智爲振威將軍大明三年獻赤白鸚鵡大明八年明帝㤗始二年又遣使貢獻明帝以其長史笁湏羅逺前長史振威將軍笁郍婆智並爲龍驤將軍婆逹國南史曰婆逹國元嘉二十六年國王舎利不陵伽䟦摩遣使獻方物文帝䇿命之爲婆逹國王二十六年二十八年復遣使獻方物闍婆逹國南史曰闍婆逹國元嘉中國王師利婆逹呵阿陁羅跋摩遣使奉表曰宋國大主大吉天子足下敎化一切種智安稳天人師降伏四魔成等正覺轉道法輪度脫衆生我雖在逺亦霑靈潤槃槃國宋起居注曰孝建二年七月二十日槃槃國王遣長史笁伽藍婆奉獻金銀琉璃諸香藥等物南史曰槃槃國元嘉孝建大明中並遣使貢獻梁中大通元年四年其王使使奉表累送佛牙及畫塔獻沉檀等香數十種六年八月復遣使送菩提國舎利及畫塔國圖并菩提樹葉詹糖等香梁書曰槃國南海大洲中北與林邑隔小海自交州舩行四十日至其國王曰楊栗翨音翅栗翨父曰楊德武連以上無得而紀百姓多縁水而居國無城皆竪木爲柵王坐金龍床毎坐諸大人皆兩手交抱肩而跪及其國多有婆羅門自天竺來就王乞財物王甚重之其大臣曰勃郎索濫次曰崑崙帝也次曰崑崙勃和音胡卧切次曰崑崙勃帝索甘且其言崑崙古龍聲相近故或有謂爲古龍者其在外城者曰郍延猶中夏刺史縣令其矢多以石爲鏇矟則以䥫爲刃有僧尼寺十所僧尼讀佛經皆食肉而飲酒亦有道士寺一所道士不飲食酒肉讀阿脩羅王經其國不甚重之俗皆呼僧爲比丘呼道士爲貪隋大業中亦遣使朝貢唐書曰槃槃國在林邑西南海曲中北與林邑隔小海自交州郍行四十四日乃至其國與狼牙脩國爲隣人皆學婆羅門甚敬佛法貞觀九年遣使来貢方物斤陁利宋起居注曰孝建二年八月二日斤陁利國王釋陁羅降陁遣長史竹留陁及多奉表獻方物太平御覽卷第七百八十七
