front:
  text: 太平御覽卷第六百六十三
  hash: sha256:30f5a9129a8b5140b1f22068513ff57e182970973a2fea6ed1a571e238913374
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_663-1a}
body:
  text: 道部五地仙史記曰蓬萊方丈瀛洲左渤海中去人不逺蓋常有至者諸仙及靈藥在焉其物禽獸盡白未至望之如雲祕要經曰立三百善功可得存爲地仙居五岳洞府之中抱朴子曰彭祖言天上多尊官太神新仙者位卑所奉事者非一但更益勞苦耳故不切於升騰而止乎人間者八百年𫐠異記曰盧山上有三石梁長數十丈廣不盈尺俯眄而杳不見底晉咸康中江州刺史廋亮迎吳猛將弟子登山遊覽因過此梁見一翁坐桂樹下以玉柸承甘露與猛猛分賜弟子又進至一處見祟臺廣厦金玉房宇器物不可識與猛言若舊設玉膏終日裴君傳曰西玄三山洞周千里西山有相連各一宫金城九重濳通洞道距玄洲崑崙非人跡所及裴君周君分處其内五岳圖曰靑城山洞周二千里蜀郡界黃帝拜五爲岳丈人又名山記曰北接嶓􅜗南接峨嵋東至成都山形似城其山有赤壁張天師所治處今遺跡猶存魏夫人傳曰赤城丹山洞周三百里有日月仗根三辰之光照洞中五岳圖云此山在㑹稽羅江其西北有赤城按茅君傳云霍林司命治赤城丹山玉洞之府齊永明中忽有大羣鵠從西北來下集霍門溪溪谷塡塞彌漫數里多所蹹籍狀如爲物所驚一夕還飛向西北計是赤城上都泉湖中物也羅浮山山洞周五百里眞誥呼爲層城葛洪交州逺停此解化茅君傳曰句曲山洞周一百五十里秦時名爲句金之壇漢時三茅君得道來治此山五符曰林屋山周四百里一名苞山在太湖中下有洞濳通五岳號天后别宫夏禹治水平後藏五符於此吳王闔閭使龍威丈人入山所得是也眞誥云包山下有石室銀房方圎百里又有白芝隱泉泉水紫色又曰城玉山洞周三千里周司命先在恒山中太玄玉女語令往西城師王君於是往焉即此山也又曰厚載之中有洞天三十六所又八海中諸山亦有洞宫或方千里五百里非三十六洞天之例也五岳名山皆有洞宫或三十里二十里並舎神仙又非小天之數也名山記曰岳洞方百里在終南太一閒或名桂陽宫多諸靈異王屋山洞周迴萬里名曰小有淸虚天按王君内傳云在河内沁水縣界濟水所出之源也北有太行東南有北邙嵩山内洞天日月星辰雲氣草木萬類無異矣宫闕相映金玉鏤飾皆地仙所處即淸虚王君所居也眞誥云此諸天所謂陽臺也諸得道者皆詣焉委羽山在海中司馬季主所處也又曰括蒼山洞周三百里東缶佐命也在㑹稽東南群帝之所遊山多神異又有縉雲堂孤峯直聳巖嶺秀傑特冠群山山中茅玄嶺獨髙處有司命埋丹砂六千斤深二丈盤石塡上其山左右泉皆小赤色人飲之夀茅山天帝壇石正當洞天之中央玄牎之上也昔東海靑童君乗風颷飛輪車按行洞天曾來於此劉向列仙傳曰赤松子神農時雨師服水玉至崑崙山上常止西王母石室隨風雨上下仙去又曰渥佺槐山採藥父也好食松實體生毛目方瞳能飛行又曰廣成子古仙也居崆峒山石室中黃帝聞而造焉問其道要廣成子曰帝治天下雲不待族而飛草木不待黃而落何足語至道黃帝退居三日順風再拜廣成子日至也之精杳杳冥冥無視無聽抱神以靜形將自正必靖必淸吾將去無窮之門遊無極之野又曰白石先生者中黃道人弟子也常煑白石爲粮因就白石山居亦食脯飲酒食穀日行三四百里容貌不衰又日黃山君者脩彭祖之術百餘歲有少容彭祖去乃追論其言爲經又曰上淸六甲經曰宋玄德周宣時人也服六甲靈飛符得眞靈之道止嵩高山又曰李意期蜀人也世常見之衍道行於人於蜀城角穴土居之當劉備欲東伐吳報關羽之怨使迎意期到甚重之問其伐吳不荅而求𥿄畫兵馬器仗萬數乃一一裂壞之又畫一尊官掘地埋之乃徑去備不恱後果爲吳所破大敗十餘萬衆纔數百人還器甲軍資略盡備恚怒病終於永安宫意期少言人有所問都不對蜀中人有憂患往問之曰吉凶自有常候但占其顔色慘悅耳後入琅琊山不復出又曰封君達隴西人服黃連五十年餘入鳥鼠山中服練百餘歲往來故里常騎靑牛施藥愈病人推呼靑牛道士居人閒積年後入虎丘山仙去又曰王仲都西漢人也少修道德孝文以積寒之日令仲都單衣載四馬於上林昆明環水而馳御者原衣狐裘而寒慄垂死仲都色曾不變體和氣溢如焰及盛暑闈以烈火體亦不汙後不知所之又曰有稷丘公者太山下道士也漢武帝東巡狩至泰山稷丘公乃冠章甫衣黃擁琴來迎上曰陛下勿上也恐傷足帝必欲上及數里果如言但諱之故但祠而還爲稷丘公立祠復百戸使奉承之也又曰戴孟本姓燕名濟字仲微漢明帝時人入華山及武當山受裴君玉佩金璫經及受石精金光符復有太微黃書能周旋名山又曰左慈字元放廬江人也明五經通星氣見漢祚衰微乃學道精思於天柱山得石室中九丹金液經是太淸中經法也師李仲甫又葛玄師於慈曹操聞而召之問學道之由慈不荅操怒欲規殺之乃爲置酒俄失慈建安末渡江尋山入洞在小括山顔色甚好又曰王遥字伯遼鄱陽人也頗行治病皆愈遥有篋長數寸一弟子姓錢隨遥十數年未嘗見開之一夕天雨晦冥遥使錢以九節杖負此篋將錢出行所道非所曾經度行十數里登一小山入石室中先有二人遥見旣至取篋發之中有五舌竹簧三枚三人各鼔一簧良乆復内篋中辭石室中人及還家着奮葛單衣及自負竹篋而去遂不復還後三十年弟子見遥在馬蹄山下顔更少蓋地仙也又曰陳子皇濟陰人也得餌术方服之絕穀初年七十餘衰老及服餌反少在民閒積年入霍山去又曰葛洪字稚川琅邪人不好榮爵閉門却掃尚神仙道術未嘗交遊於餘杭山見何多道郭文舉目擊而已各無所言從祖玄吳時學道得成以其鍊丹術授弟子鄭隱字思逺洪就隱學悉得其法道學傳曰鮑靚字太玄以太興元年八月二十日步道上京行達龍山見前有一少年姿容整茂徒行甚徐而去殊疾靚垂名馬密逐數里終不能及意甚異之及問曰視君似有道者少年荅曰我中山陰長生也又曰介像字元則會稽人也學通五經能屬文後學道聞有還丹經周疑天下求之不得其師乃入山精思遇一人授以還丹經吿曰得此便仙勿復他爲也乃辭歸像嘗往弟子駱延雅舎帷下平牀中有諸生論左氏義不平像傍聞爲辨正諸生知非常人密表薦於吳主像欲去吳主詔至武昌甚尊異之稱爲介君爲賜第供帳黃金千斤像後吿病須臾便死詔葬之爲立廟先主時躬祭常有白鶴集座上徘徊而去又曰李根字子側許昌人也昔往壽春吳太文家弟子知根有道術窮竊視其器見素書一卷自記學道服藥時日又太文說根目瞳子方根乃地仙耳又曰伯山甫者雍州人也入華山中二百年不到人家即言人先世以來善惡功過有如臨見又知方來吉凶又曰劉政沛人也髙才愽物尋考異聞苟勝己雖隷奴必師事之求養生之術餌丹年四百餘歲又曰王烈字長休邯鄲人也常黃精及鈆二百餘歲行歩若飛愽極群書嵇甚重之數數就學共入太行山見山裂有靑石髓流出烈取髓丸之成石氣如米飯嚼之亦然烈因擕少歸欲遺康康取而視之已成靑石擊之錚錚康即與往視斷山山已如故烈入河東抱犢山見一石室室中有石架架上有素書兩卷莫識其字暗記數十字以示康康盡識之烈喜乃與康共往讀之至其所失其石室烈私語弟子曰叔夜來合得道故也按神仙經云神仙五百年山輒一開其中石髓出得而服之壽老烈後莫知所之又曰步正者字玄眞巴東人也說秦始皇時事了如目前漢末將數十弟子入吳授以服氣及石髓方小丹法年四百歲又曰焦光字孝然河東人也常食白石煑如芋毎入山伐薪負之與人魏受禪與人別去不知所適又曰孫登不知何許人常止山門穴地而坐彈琴讀易冬單衣天大寒人視之被髮丈餘自覆身厯世見之顔色如故更無餘資亦不食時楊駿爲太傅使迎問之不荅駮遺布袍登出門借刀斷袍上下異處置駿門下知駿當伏誅時曾稽嵇康曾詣登登不與語康乃扣難之登彈琴自若乆之康退登曰康才髙識寡劣於保身又曰帛和字仲理遼東人也入地肺山事董奉奉以行氣服术法授之吿和曰吾道盡此不能得神丹金沙周遊天下無山不往汝今少壯廣求索之和乃到西城山事王君君語和大道訣曰此山石室中當熟視北壁當見壁有文字則得道矣視壁三年方見文字乃古人之所刻刻太淸中經神丹方及三皇天文大字五岳眞形圖皆著石壁和諷誦其萬言義有所不解王君乃授之訣曰作地仙在林慮山又曰宫嵩琅邪人也能文著道書二百卷服雲母爲地仙又曰李常在蜀郡人也少治道術世常見之在虎壽山下陶潜桃源記曰晉太康中武陵人捕魚從溪而行忘路逺近忽逢桃花林夾岸芳華鮮美落英􅌭紛林盡得山山下有一小口初極狹行四五步豁然開朗屋字連接雞犬相聞男女衣着悉如外人見漁父驚爲設酒食云先丗避秦難率妻子來此遂與外隔問今是何代不知有漢魏晉旣出白太守遣人隨住尋之迷不復得眞誥曰劉憑沛人也學道於稷丘子常服石英年三百餘歲有少容嘗到長安諸貴人聞憑有道乃往拜見之又有百餘人隨憑語賊曰汝輩作人何犲狼其心相教斷道危人利己此是伏尸都市肉饗烏鳶之法賊忽頓伏駭去憑後入太白山數十年歸鄕里顔色更少又曰尹思字少龍安定人晉元康五年正月十五日夜坐屋中遣兒視月中有異物否兒曰今當有大水月中有一人披蓑帶劒思自視之日月中人乃帶劒伏矛當大亂三十年復當小淸思後不知所之又曰皇初平者丹谿人年十五家使牧羊有道士見其良謹便將至金華山石室中四十餘年不復念家其兄初起尋索厯年後見市中一道士言其處初起即隨去得見語畢問羊何在曰近在東耳初起住視之但見白石初平乃往叱石爲羊數萬頭初起知得仙道便弃家共服松脂茯苓至五百歲初平改字爲赤松子初起改字爲赤魯班又曰吕恭字文敬於太行山採藥忽逢人授以仙方得道因遣恭去曰可視卿里及孫吕習者作道士民多奉事之恭傳言到習家扣門問訊奴出問公從何來恭曰此是家習聞驚喜出拜恭乃以神方授習而去習時已年八十服之還少至二百歲乃入山中子孫世不復老又曰沈建丹陽人世爲長吏建好道不仕學服餌之術能治病飛行或去還如此三百餘年乃絕跡不知所之又曰許逺遊第三男名翽字道翔小名王斧糠粃世務居雷平山下修業精勤常願早遊洞室不欲乆停人丗遂詣北洞以梁太和六年於茅山舊宅年三十而告終卽居方隅山洞方園館中常去來四平方臺後爲上淸仙去又曰馬明生臨淄人爲縣吏逐賊被傷遇太眞以靈丸得差後師安期生受服太淸丹在世五百年漢靈帝光和中去世集仙籙曰楊平不知名姓在楊平山居多變化之術或問之乃曰我楊平洞中仙人耳稱毎歲三元大節諸天各有上眞下游洞天以觀其善惡人世死生興廢水旱風雨預關報洞中其龍神祠廟血食之司皆爲洞府所統洞中仙曹如人閒郡縣聚落耳不可一一詳記也言訖而去太平御覽卷第六百六十三
