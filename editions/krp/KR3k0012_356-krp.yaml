body:
  text: 兵部八十七甲下兠鍪楯上甲下吴越春秋曰勾踐使大夫種於吴曰竊聞大王興大義誅彊救弱越使賤臣種以先人藏噐及甲二十領以賀君又曰公子光㐲甲士於私室具酒而請王僚王僚乃𬒳棠夷之甲三重使兵衛至光家之門夾陛帶甲左右皆王僚之親戚也專諸置魚膓劒炙魚腹中而進之刺王僚貫逹背王僚立死獻帝春秋曰越騎挍尉伍孚以董卓無道欲身自殺之內貫小鎧拔佩刀詣卓卓送岀閤執手告别孚引刀刺卓卓多力却不中即殺孚夷其族董卓傳曰卓孫年七歳愛以爲己子爲作小鎧胄使騎駃音决騠音啼馬與玉甲一具俱出入以爲麟駒鳯鶵至殺人之子如蚤虱耳晉建武故事曰王敦死秘不發䘮賊於水南北渡攻官壘柵皆重鎧浴鐵都督應詹等岀精銳距之宋元嘉起居注曰御史中丞劉損奏前廣州刺史韋㓪於廣州所部作犀皮鎧六領請免㓪官也鄴中記曰石季龍左右置直衛萬人皆五色細鎧光曜奪目伏侯古今注曰章帝建𥘉三年丹陽宛陵民掘地得甲一述異記曰乹羅者慕容廆之十一丗祖也着金銀𥜗鎧乗白馬金銀鞍勒自天而墜鮮卑神之推爲君長家語曰孔子言於定公曰家不藏甲古之制也今三家過制請皆損之管子曰葛盧之山發而得黃金蚩尤受之制以爲劒鎧言其始也孟子曰矢人豈不仁於函人哉矢人唯恐不傷人函人唯恐傷人巫匠亦然故術不可不慎也趙岐章句曰矢箭也函鎧也孫卿子曰楚人鮫革犀兕以爲甲堅如金石慎子曰藏甲之國必有兵道鹽鐵論曰強楚勁鄭有犀兕之甲吕氏春秋曰田賛𥙷衣而見荆王王曰先生之衣何其惡也賛曰衣又有惡於此者王曰可得而聞乎對曰甲惡於此王曰何謂也對曰甲冬日則寒夏日則暑衣無惡乎惡乎甲者賛也貧貧故衣惡今大王萬乗之主冨厚無敵而好衣民以甲臣弗得也意者爲其義也甲之事兵之事也刈人之頸刳人之腹墮人之城郭刑人之父子其名又甚不榮也吕氏春秋曰邾之故爲甲裳以帛以帛綴甲公息忌謂邾君曰不若以組凡甲之所以爲固者以滿竅也今竅滿矣而任力者半組則不然竅滿則盡任力矣邾君以爲然曰將何所得組公息忌對曰上用之則民爲之矣邾君曰善下令令官爲甲必以組公息忌知說之行也因令其家皆爲組人有傷之者曰公息忌之所以欲用組者其家多爲組也邾君不說於是乎止官無以組以用邾君有所尤也爲甲以組而便公息忌雖多爲組何損以組不便公息忌雖無爲組亦何益爲組與不爲組不足以累公息忌之說用組之心不可不察又曰趙攻中山中山有多力者曰丘鳩衣鐵甲操杖擊無不碎衝無不䧟以車投車以人投人說苑曰孔子之匡簡子殺陽虎孔子似之甲士以圍孔子之舎子路怒奮㦸將下鬪孔子止之曰何仁義之不免俗也夫詩書之不習禮樂之不脩是吾之過也若非陽虎而以爲陽虎則非丘之罪也夫由歌方和汝子路歌孔子和之三終而甲罷崔寔政論曰貪饕之吏􅔡納財用狡猾之工復盗竊之至以麻枲𬒳弓弩鐵焠醘中令脆易治鎧孔又𥚹小不足容入凢漢所以能制胡者徒𥜗鎧弩之利也今鎧則不堅弩則不勁永失所恃矣抱朴子曰屠犀爲甲給乎專征之服裂翆爲華集乎后妃之首雖出於幽谷迁于喬木然爲二物之計未若棲竄於林薄攝生乎榛藪文選曰介胄𬒳霑汗又曰金練照海浦注練甲也又曰玄甲耀日陳林武庫賦曰鎧則東胡闕鞏百錬精剛函師震推韋人製縫玄羽縹甲灼爚流光孔融寘刑論曰古聖作犀兕革鎧今盆領鐵鎧絶聖甚逺魏武軍䇿令曰袁夲𥘉鎧萬領吾大鎧二十領夲𥘉馬鎧三百具吾不能有十具見其少遂不施也吾遂出竒破之是時士卒精練不與今時等也曹植表曰先帝賜臣鎧黒光明光各一具兩當鎧一領環鏁鎧一領馬鎧一領今丗以昇平兵革無事乞悉以付鎧曹殷仲堪相王牋曰奉所賜馬鎧旣足以奬厲懦心又以光華逺任庾翼與燕王書曰今致𥜗鎧一領兠鍪一副又曰鄧百山昔送此犀皮兩當鎧一領雖不能精好復是異物故復致之李尤鎧銘曰甲鎧之施扞禦鋒矢尚其堅剛或用犀兕内以存身外不傷害有似仁人厥道廣大好德者寧好戰者危專智恃力君子不爲兠鍪廣雅曰兠鍪謂之胄錏鍜謂之鏂鍭上音歐下音侯說文曰胄兠鍪首鎧也易曰離爲甲胄詩曰公徒三萬貝胄朱綅毛萇曰貝胄具飾也朱綅以朱綅綴之綅子林切禮記曰獻甲者執胃獻杖者執末又曰臨哀則必有哀色執紼甫勿切不笑臨樂不歎甲胃則必有不可犯之色貌與事冝相配也又曰車則梚綏執以將命甲若有以前之則執以將命無以前之則袒櫜奉胄鄭玄注曰袒其衣出兠鍪以致命櫜鎧衣也左傳曰公及邾師戰于井陘我師敗績邾人獲公胄懸諸魚門杜預曰胄兠鍪也魚門邾城門又曰秦師襲鄭過周北門左右免胄而下又曰晉侯敗狄于箕先􅎮曰匹夫逞志於君而無討敢不自討乎免胄入狄師死焉狄人歸其元面如生又曰晉楚戰於鄢陵郄至見楚子必下免胄而趨風疾如風也楚子使工尹襄問之以弓問遺也郄至見客免胄承命曰君之外臣從寡君之戎事以君之靈間蒙甲胄間尢近也不敢拜命介者不拜三肅使者而退又曰楚白公亂葉公亦至及北門或遇之曰君胡不胄國人望君如望慈父母焉盗賊之矢若傷君是絶民望也若之何不胄乃胄而進又遇人曰君胡胄國人望君如望歳焉冐日以兾若見君面是得艾也艾安也而又掩面以絶民望不亦甚乎乃免胄而進言葉公得民心也榖梁傳曰古者𬒳甲嬰胄非以興國也則以征無道豈曰以報其恥哉漢書曰王莽傳云元始五年䇿王莽加九命之錫於是稽首拜受甲胄一具後漢書曰劉虞積忿公孫瓉不巳自率兵十萬攻瓉將出從事代郡程緒免胄而前曰公孫瓉雖有過惡而罪名未正明公不先告曉使得改行以武臨之瓉必悔禍謝罪所謂不戰而服人也虞以緒臨事沮議斬之以徇戒軍士曰無傷餘人殺一伯珪而巳虞遂大敗斬虞於薊市東觀漢記曰祭遵薨䘮至河南博士范升上䟽曰遵爲將軍雖在軍旅心存王室不忘爼豆可謂守死善道者也乃贈將軍給侯印綬遣校尉發騎士四百人𬒳玄甲兠鍪兵車軍陣送葬又曰建武六年馬武與衆將上隴擊隗囂身𬒳甲兠鍪持㦸犇擊殺數十人囂追兵盡還武中矢傷又曰上征彭寵朱浮上䟽切諌曰連年距守吏士疲勞甲胄生蟣虱弓弩不得㢮上下相率焦心大兵兾蒙救護生活之恩陛下輟忘之於河北誠不知所以然獻帝春秋曰孫䇿獲太史慈謂曰孤昔與卿神亭之役若爲卿先如何慈謂曰不敢面欺若兠鍪帶不斷未可量也吴志曰太史慈與孫䇿戰於䄂亭䇿得慈兠鍪吴暦曰諸葛恪作東關遏魏軍距之時寒雪恪使丁奉等皆解鎧但着兠鍪持刀縁遏上北軍見祼身縁遏皆大笑不即嚴兵便亂斫遂破北軍晉書天文志曰魏文帝黃𥘉六年十月有星孛于少微歷軒轅占曰兵䘮除舊布新之象時帝軍廣陵辛丑帝親御甲胄觀兵沈約宋書曰元嘉二十七年北討至陜虜多縱突騎衆軍患之薛安都怒甚乃脫兠鍪解所帶鎧唯着絳納兩當械馬亦具裝馳奔以入賊陣猛氣咆哱所向無前當其鋒者應刄而倒賊忿之夾射不能中如是者數四每一入衆無不披靡王琰宋書曰晉康太守劉思道攻廣州殺刺史羊希龍驤將軍陳伯紹討之思道迎擊之殺傷甚衆㑹紹髻解兠鍪墜地退走見禽車頻秦書曰符登堅族曾孫堅死登自立皆刻兠鍪作死休字示士以必死爲度故戰所向無前崔鴻前秦録曰符堅末慕容冲率衆登城堅身貫甲胄飛矢滿身後周書曰突屈之先臣於茹茹居金山之陽爲茹茹鐵工金山形似兠鍪其俗謂兠鍪爲突厥因以爲號春秋繁露服制象曰夫執介胄而後能距敵者固非人之所貴也孝經威嬉拒曰欲去惡鬼五刑具五人皆持大斧着鐵兠鍪將之常使去四五十歩不可令近人也戰國䇿曰蘇秦說韓王曰韓之劒當敵則斬甲楯鞮鍪國語曰靡笄之役郄獻子傷曰余病矣張御曰受命於廟受脤於社甲胄而效死戎之政也又晉語曰郄至甲胄而見客免胄而聽命樂資春秋後傳曰吴越令魏武侯厲衆五年秦人興師而臨西河魏士聞之介胄不待令而奮擊殺秦人者萬數英雄記曰袁紹爲公孫瓉所圍别駕田豐扶紹入空垣紹脫兠鍪抵地云丈夫當前鬪死而返逃入牆間豈可得活一云入匿牆間盧綝晉四王起事曰建武元年天子還洛陽右將軍張方啓曰陛下自鄴來還冝謁宗廟天子出因便刦居鄴切啓移都其夜方悉引兵從西明廣陽諸城門入自領五千騎皆捉鐵纏矟擊兠鍪燋茸皆用凉州白鶡毛望之若荼周遷輿服雜事曰刺校者挍人之執刺兵者也首戴虎皮胄傳曰蒙臯貔以犯陳蔡因是有虎皮胄焉蜀隊戴貝胄𬒳犀角此古制也詩云貝胄朱綅謂以貝齒飾胄朱縷綴之也胄挿以翟尾垂以紅絮朱綅之象也晉令曰軍列營歩騎士以下皆着兠鍪郭義恭廣志曰獠音老在䍧柯興古鬱林交阯蒼梧皆以朱􅃮皮爲兠鍪家語曰孔子對魯哀公曰介胄執戈者無退懦之氣非體純猛服使之然孔叢子曰陳王曰將居軍之禮勝敗之變如之何太師曰介胄在身執銳在列雖君父不拜又曰子髙曰夫儒者居德行道則衮冕之服統師旅則有介胄之服韓子曰天下無道攻戰不巳甲胄生蟣虱燕雀處帷幄虞喜志林曰宋祭酒云可以扞禦者爲械謂鎧甲兠鍪也抱朴子曰夫德教者黼黻祭服也刑罰者杆刄之甲胄也若以德教治狡暴猶以黼黻禦剡音琰鋒也以刑罰施平丗是以甲胄升廟堂也又曰忍痛苦之藥石者所以除伐命之疾嬰甲胄之重冷者所以扞鋒鏑之集又曰盤旋揖讓非禦寇之容摜甲纓胄非廟堂之飾曹植表曰兩當鎧二十領兠鍪自副鎧百領兠鍪自副陶侃荅温嶠書曰奉所送帳下得蘇峻兠牟兠牟作之巧劼用功殊多戰噐不事湏此也意謂不如三甲者逆賊身所服此是凶噐古人惡其名得此兠牟者猶以有功今賞其細葛一端魏武帝上事曰臣前上言逆賊袁尚還即厲精銳討之今尚人徒震蕩部曲喪守引兵遁亡臣陳軍𬒳堅執銳朱旗震燿虎士雷譟望旗眩精聞聲䘮氣投戈解甲翕然沮壞尚單騎迸走捐弃僞節鉞鈇大將軍邥郷侯印各一枚兠鍪萬九千六百二十枚其矛楯弓㦸不可勝數苦浪切又古衡切于寳百志詩曰壯士禀傑姿氣烈有自然俯仰羣衆中胡能救丗艱閱鞏代縫掖兠鍪易進賢楊雄長楊賦曰髙祖奉命順斗極運天關横鉅海漂崑崙提劒而叱之所過麾城摲邑下將降旗一日之戰不可殫記當此之勤鞮鍪生蟣虱介胄𬒳霑汗文選曰朝食不免胄夕息常負戈又曰貝胄星離以貝飾之楯上釋名曰楯遯也跪其下避刄以隱遯也大而平者曰呉魁夲出於吴爲魁師者所持也隆者曰滇盾夲出於蜀蜀滇所持也或曰羗盾言出於羗也約脅而邹者曰䧟虜言可䧟破虜敵今謂之曰露是也狹而長者曰歩盾歩兵所持與刀相配者也狹而短者曰夾子盾車上所持者也子小稱也以䩼音逢編板者謂之木絡盾以犀皮作之曰犀盾以木作之曰木盾皆因所用爲名也許慎說文曰楯音伐也所以杆音汗身蔽目象形聲也樐大楯也樐音魯楊雄方言曰楯自關而東或謂之或謂之干干者杆也關西謂之楯張揖埤蒼曰盾也廣雅曰果科于􅳻㦸盾也龍魚河圗曰楯名自障禮記曰仲夏之月命樂師脩鞀音桃鞞皷均琴瑟管簫執干戚戈羽又曰春夏學干戈秋冬學羽籥皆於東序又曰季夏以禘禮祀周公於太廟朱干三戚冕而舞大武鄭玄曰朱干亦大楯也周禮曰旅賁氏掌執戈楯夾王車而趨䘮紀則衰葛執戈楯又曰方相氏掌蒙熊皮黃金四目衣朱裳執戈楊楯帥百隷而時儺又曰司兵掌五兵五楯各辯其物與之等以待軍事鄭玄曰五楯干櫓之属其名未盡聞也又曰司戈楯掌戈楯之物而頒之又曰魯及齊戰于炊鼻杜預曰炊鼻魯地齊子泉捷從泄聲子声子魯大夫也射之中楯瓦瓦楯脊也繇軥音鈎汰輈匕入者三寸入楯瓦也繇過汰矢激也又曰宋樂祁獻趙簡子楊楯六十太平御覽卷第三百五十六
