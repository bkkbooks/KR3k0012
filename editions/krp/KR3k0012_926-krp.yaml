body:
  text: 鷹鶻鸇隼鷂鵰鷲鶚白鷢鷹春秋運斗樞曰瑶光星散爲鷹禮記月令曰驚蟄之日鷹化爲鳩又曰七月鳩化爲鷹然後設罻羅左傳文公十八年季文子使太史克對宣公曰先大夫臧文仲敎行父事君之禮行父奉以周旋弗敢失墜曰見無禮於其君者誅之如鷹鸇之逐鳥雀也又昭公四郯子曰少皥鳥師而鳥名爽鳩氏司㓂者也杜預注曰爽鳩鷹鷙鳥也故爲司㓂主盗賊也又襄公四曰子産始知然明問爲政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀毛詩曰維師尚父時惟鷹揚如鷹之飛揚也箋云鷹鷙鳥也爾雅曰鷹鶆鳩郭璞注曰鶆當爲鷞字之誤也左傳作鷞鳩是也善擊官於代郡捕之又曰鷹隼醜其飛也翬鼓趐翬翬然疾春秋考異郵曰金伐木故鷹擊雉易通卦驗曰鷹者鷙殺之鳥周書曰驚蟄之日鷹變爲鳩小暑之日鷹乃學習處暑之日鷹乃祭鳥大戴禮日正月鷹則爲鳩鷹也者非其殺之時也鳩也者非其殺之時也善變而知仁故具言之也鳩爲鷹而不仁故不盡其辭史記曰李斯臨刑思牽黄犬臂蒼鷹出上蔡東門不可得矣漢書曰鷹隼未撃矰弋不得施於蹊隧又酷吏傳曰郅都爲濟陽太守時人號爲蒼鷹又曰孫寳爲京兆尹請故吏侯文爲椽立秋日文謂寳曰今鷹隼始擊當順天氣成嚴霜之誅後漢書曰崔駰與竇憲牋曰今日漢陽太守率吏卒數十人皆臂鷹牽狗云欲上幕府夫鷹犬所獲不過雉兎斯乃細人之事東觀漢記曰和熹皇后臨朝上林鷹犬悉斥賣之又曰趙勤字孟卿太守桓虞署督郵新野令自責還印綬去虞歎曰善吏如使良鷹下韝即中馬融與伯丗書曰憒憒愁思猶不解懷思在竹間放狗逐麋晚秋渉冬大蒼出籠黄棘下莵芼以乾蔡以送餘日兹樂而巳魏志曰吕布因陳登求徐州牧不得布怒登喻之曰登見曹公言待將軍譬如養虎當飽其肉不則噬人公曰不如養鷹飢則爲用飽則揚去布乃解晉書曰虞潭字思奥㑹沈充等逼京師潭起義軍至上虞有野鷹飛集屋梁衆懼潭曰起大義而剛鷙之鳥來破賊必矣後如其言又曰崔洪清厲骨鯁爲尚書左丞時人爲之語曰叢生荆棘來自博陵在南爲鷂在北爲鷹又載記曰慕容垂請至鄴拜墓符堅許之權翼諌曰垂猶鷹也飢則附人飽便髙颺遇風塵之㑹必有凌霄之志唯宜急其羈靽不可任其所欲堅不從南史曰王僧逹性好鷹犬何尚之致仕復膺朝命於宅設八關齊大集朝士自行香次至僧逹曰願即且放鷹犬勿復遊獵又曰齊鬱林王即位未踰旬多聚飛鷹快犬以梁肉俸之陳書曰侯安都率水軍於中流斷齊軍糧運又襲秦郡破徐嗣徽柵收其家口得嗣徽所彈琵琶及所養鷹遣信餉之曰昨至弟住處得此今以相還嗣徽等見之大懼北史曰後魏華山郡王澄弟嵩孝文時位歩兵校尉大司馬安定王休薨未及卒哭嵩便遊田帝聞大怒曰嵩大司馬薨殂一月爾便以鷹鷂自娱有叔父之痛無猶子之情損心棄禮何其太速便可免官又曰齊廣寧王孫孝珩好綴文有技藝甞於㕔事壁自畫一蒼鷹見者皆以爲眞三國典略曰元坦爲冀州刺史不恤人事專爲聚歛性好畋漁無日不岀秋冬獵禽獸春夏捕水族鷹犬常數百頭器網十餘車自云寧三日不食不能一日不獵唐書曰太宗𥘉傳位舊苑中有籠鷹悉斷聮任去良大並解絏放之又曰太宗謂侍臣曰李大亮可謂忠直矣朕遣使至其所見有佳鷹諷令獻朕大亮因宻表責朕云陛下乆絶田獵而使者求鷹若是陛下之意深乖昔旨如其自擅便是任使非人朕覽表嘉歎不能自巳有臣若是朕復何憂於是賜之金壷以彰忠讜又曰源乾曜爲京兆尹仍京師留守乾曜政存寛簡不嚴而理甞有仗内白鷹因縱逸遂失所在上令京兆切捕之俄於野外獲之其鷹掛於叢棘而死官吏懼得罪相頋失色乾曜徐曰事有邂逅死亦常理主上仁明當不以此寘罪必其獲戾吾自當之不湏懼也遂入自請失旨之罪上不問又曰憲宗時每歳冬以鷹犬出近畿習狩謂之外按宣徽院供奉官爲其使領徒數百恃恩恣横郡邑懼擾皆厚礼迎犒之恣其所便止舎私邸百姓畏之如㓂盗戰國䇿曰唐睢謂秦王曰要離刺慶忌蒼鷹擊於殿上廣志曰有雉鷹有莵鷹一歳爲黄二歳爲撫三歳爲青胡鷹獲麞出廬江幽明録曰楚文王少時好獵有人獻一鷹文王見之瓜距神爽殊絶常鷹故爲獵於雲夢置網雲布烟燒張天毛羣羽族争噬競搏此鷹軒頸瞪目逺視雲際無搏噬之志王曰吾鷹所獲以百數汝鷹曽無奮意將欺余耶獻者曰若効於雉兎臣豈敢獻俄而雲際有一物凝翔鮮白不辯其形鷹便竦翮而升矗若飛電湏臾羽墮如雪血下如雨有大鳥墮地度其兩翅數十里衆莫能識時有博物君子曰此大鵬鶵也文王乃厚賞之西京雜記曰茂陵少年李亭好馳駿狗逐獸或以鷹鷂逐兎皆以爲佳名狗則有修毫釐睷白望青曹之名鷹則有青翅草眸青冥金距之屬鷂則有從風鷂孤飛鷂論衡曰孔子畏陽虎却行流汙陽虎未必色白孔子未必面青鷹擊雀鶚啄鴈未必鷹鶚南方雀鴈西方自以䈥力勇壯相勝服也秦子曰虎能雄猛不可以託麑鷹能飄擊不可以寄鶵物理論曰使武士宰民如使狼牧羊使鷹養鶵也焦贑易林曰鷹棲茂樹候雀徃來益部耆舊傳曰廣漢馮顥爲謁者逐單于至雲中大將軍梁冀遣人求鷹止晉陽舎人不避顥顥収之使人擊鷹而亡也顥追捕甚急冀辭乃止古樂府曰豹則虎之弟鷹則鷂之兄魏文帝荅繁欽書曰啇風振條秦鷹秋吟斯可謂聲恊鍾石氣應風律孫楚鷹賦曰郭延考與余辞其後從者韝二鷹以侍側郭邊人也好弋獵顧眄心欲自娱樂請余爲賦曰其爲相也踈尾闊臆髙鬐圎顱深自娥眉狀似愁胡曲觜短頸足若雙枯隋魏彦深鷹賦曰惟兹禽之化育實鍾山之所生資金方之猛氣擅火德之炎精何虞者之多端運横羅以羈東綴輕絲於雙臉結長皮於两足飛不遂於本情食不充於所欲逸翰由其暫歛雄心爲之自局若乃貌非一體相乃多途指重十字尾貴合盧立如植木望似愁胡觜同劒利脚等荆枯亦有白如散花赤如點血大文若錦細班似纈眼類明珠毛猶霜雪身重若金爪剛如鐵或復頂平似削頭圎如卵臆闊頸長筋麁脛短翅厚羽勁髀寛肉緩求之事用俱爲絶伴或似鶉頭或似鵄首赤精黄足細骨小肘懶而易驚姦而難誘住不可呼飛不及走若斯之軰不如勿有若夫疾食速消此則有命兎頸猴立是爲無病厠門忌大結肚惡軟條不欲絶背不宜喘生於窟者則好眠巢於木者則常立雙骹長者則起遟六翮短者則飛急毛衣屢改厥色無常寅生酉就緫號爲黄二周作鴘千日成蒼雖日排虚性殊衆鳥雌則體大雄則形小遇大則驚猜得人則馴擾養鶵則少病野羅則多巧察之爲易調之實難格必髙逈屋必華寛薑以取熱酒以排寒韝湏温煖肉不陳乾近之令狎靜之使安晝不離手夜便火宿微加其毛少減其肉肌肥骨瘦心和性熟念絶雲霄志在馳逐鶻北齊書曰上洛王思宗弟思好少以騎射事文襄及文宣受命爲左衞將軍本名思孝天保五年討賊文宣恱其驍勇謂曰爾擊賊如鶻入鵶羣宜思好事故改名焉隋書曰劉昶子居士爲太子千牛備身聚徒任俠不遵法度公卿子弟有力雄徤者輒將至家以車輪括其頸而捧之殆死能不屈者稱爲壯士釋而與交黨與三百人其趫捷者号爲餓鶻隊唐書曰元和四年藹徳曷里禄設弭施合蜜里迦可汗遣使請改廻紇爲廻鶻義取廻旋輕犍如鶻又曰元和八年淄青節度使李師道進鶻十二命還之唐杜甫義鶻行曰隂崖二蒼鷹養子黒栢顚白蛇登其巢吞噬恣朝飡雄飛逺永食雌者鳴辛酸力強不可制黄口寕半存其父從西來翻身入長煙斯湏領徤鶻憤懣寄所宣斗上捩孤影無聲來九天脩鱗脫逺枝巨顙拆老拳髙空得蹭蹬短草辝蜿蜒折尾能一擺飽膓今巳穿生雖滅衆鶵死亦垂千年物情有報復快意貴目前兹實鷙鳥㝡急難心烱然功成失所徃用捨何其賢近經潏水湄此事樵夫傳飄蕭斍素髮凛欲衝儒冠人生所與分亦在顧眄間聊爲義鶻行永激壯士肝鸇爾雅日晨風鸇也郭璞注曰鵭屬孟子曰爲䕺驅雀者鸇也爲湯武驅民者桀與紂也隼毛詩曰織文鳥章白斾央央箋云鳥章隼之文章將帥之服又曰鴆彼飛隼其飛戾天亦集爰止隼急疾之鳥詩義䟽曰鷂也齊人謂之擊正或謂之題肩或曰雀鷹春化爲布榖此属數種皆爲隼周易曰公用射隼于髙墉之上春秋考異郵曰隂陽氣貪故題肩擊宗均注曰題肩有爪芒爲陽中隂故擊殺也國語曰仲尼在陳有隼集于陳侯之庭而死楛矢貫之石弩其長尺有咫陳惠公使以隼如仲尼之館問之仲尼曰隼之來也逺矣此肅愼氏之矢也昔武王克啇通道于九夷八蛮使各以其方賄來貢使無忘職業於是肅愼氏貢楛矢石弩其長尺有咫先王欲昭其令德之致逺也故銘其括曰肅愼氏之貢矢以分大姬配虞胡公而封諸陳古者分同姓以宝玉展親也分異姓以逺方之職貢使無忘服也故分陳以肅愼氏之貢君若使有司求諸故府其可得也使求得之金櫝鷂說文曰鷂鷙鳥也爾雅曰鷣負雀郭璞注曰鷣鷂也江東呼爲鷣善捉雀因名云廣雅曰肩鷸子籠脫鷂也廣志曰鷸子大如胡鷰色似鷂食雀籠脫擊鳩鵲晉書曰王育京兆人也太守杜宣命爲主簿俄而宣左迁萬年令杜令王攸詣宣宣不迎之攸怒曰卿徃爲二千石吾所敬也今吾儕耳何故不見迎欲以小雀遇我使畏死鷂也唐書曰武德𥘉萬年縣法曹孫伏伽上表以三事諌其一曰陛下貴爲天子冨有四海凡曰蒐狩湏順四時陛下二十日龍飛二十一日有献鷂鶵者此乃前朝之弊風少年之事務何忽今日行之又曰太子承乾與漢王元昌相託附承乾賜以琵琶名馬元昌報以鷂子山鷄又曰太宗得鷂絶俊異私自臂之望見鄭公魏徴乃藏於懷公知之遂前白事因語古帝王逸䂊微以諷諌語乆帝惜鷂且死而素嚴敬徴欲盡其言徴語不時盡鷂死懷中又曰楊德幹髙宗朝爲萬年令有宦官恃貴寵放鷂不避人禾稼德幹擒而杖之二十悉拔其鷂頭宦者涕泣袒背以示於帝帝曰爾情知此漢獰何湏犯他百姓竟不之問又曰貞元十四年九月中書門下奏賀嵯峨山獲白鷂莊子曰鷂爲鸇鸇爲布谷布谷復爲鷂此物変也列士傳曰魏公子無忌方食有鳩飛入案下公子使人頋望見一鷂在屋上飛去公子乃縱鳩令出鷂逐而殺之公子暮爲不食曰鳩避患歸無忌竟爲鷂所得吾負之爲吾捕得此鷂者無忌無所愛於是左右宣公子慈聲旁國左右捕得鷂三百餘頭以奉公子公子欲盡殺恐無辜乃自案劒至其籠上曰誰獲罪無忌者耶一鷂獨低頭不敢仰視乃取殺之盡放其餘名聲布流天下歸焉論衡曰儒書稱魏公子方欲與客飲有鸇擊鳩鳩逃公子案下鸇追殺之於公子之前公子使人設罔捕鸇得數十責殺鳩之罪擊鳩之鸇俯頭不敢仰視公子乃殺之此虚言也鸇有千數擊鳩飛去安可復得或是捕鸇者折其頸也夢書曰鷹鷂爲攻剽殘心也夢見鷹鷂憂賊人也魏陳王曹植鷂雀賦曰鷂欲取雀雀自言雀微賤身躰柴小肌肉痟痩所得盖少君欲相噉實不足飽鷂得雀言𥘉不敢語頃來轗軻資糧乏旅三日不食略思死䑕今日相得寕復置汝雀得鷂言意甚怔營性命至重雀䑕貪生君得一食我命隕傾皇天是鍳賢者是聽鷂得雀言意甚泹惋當死弊雀頭如果蒜不早首服烈頸大喚行人聞之莫不徃觀雀得鷂言意甚不移目如擘椒跳蕭二翅我雖當死略無可避鷂乃置雀良乆方去二雀相逢似是公嫗相將入草共上一樹仍共本末辛苦相語向者近出爲鷂所捕頼我畨揵躰素便附說我辯語千條萬句欺恐含長令兒大怖我之得免復勝於汝自今後竟莫復相妬鵰毛詩谷風四月曰匪鶉匪鳶翰飛戾天毛曰鶉鵰也鵰鳶貪殘之鳥也說文曰鷲黄頭赤目五色皆備一曰鵰漢書曰李廣爲上郡守匈奴入上郡武帝使中貴人從廣匈奴射中貴人廣曰是必射鵰者也廣射殺二人生得一人果射鵰者也穆天子傳曰春山爰有青鵰執犬豕食鹿列子曰周宣王之牧正有役人梁鴦者能養野禽獸委食於園庭之内雖虎狼鵰鶚之類無不柔者雌雄在前孳尾成羣異類雜居不相搏噬後魏書曰秦王幹機悟壯勇善弓馬太宗出遊白登之東北幹以騎從有雙鵰飛於上太宗命左右射之莫能中鵰旋飛稍髙幹自請射之以二箭而下雙鵰太宗嘉之賜御弓矢金帶以旌其能軍中於是号幹爲落鵰都尉北齊書曰斛律光甞從丗宗於洹橋校獵見一大鳥雲表飛颺光引弓射之正中其頸此鳥形如車輪旋轉而下至地乃大鵰也世宗取而觀之深壯異焉丞相属邢子髙見而歎曰此射鵰手也當時傳号落鵰都督隋書曰長孫晟周宣帝時突厥攝圖請婚于周以趙王招女妻之然周與攝圖各相誇競妙選驍勇以充使者因遣晟副汝南公宇文神慶送千金公主于其牙前後使數十輩攝圖多不禮見晟而獨愛焉毎共遊獵留之竟歳甞有二鵰飛而争肉因以兩箭與晟曰請射取之晟乃彎弓馳徃遇鵰相攫遂一發而雙貫焉攝圖喜命諸子弟貴人皆親友兾昵近之以學彈射鷲漢書曰匈奴有計入漢地直張掖郡直當也生竒材箭竿鷲羽師古曰大鵰也黃頭赤目其羽可用爲箭西域諸國記曰耆闍崛山在王舎城北四里山有兩崖鷲鳥常羣居其顛土人号爲靈鷲山也佛囯記曰山石頭似鷲阿育王使鑿石假安兩翼兩脚今見存林邑國記曰西南逺界有靈鷲鳥能知吉凶覘人將死食尸肉盡乃去家人取骨燒爲灰投之漲海鶚毛詩曰関雎后妃之德也風之始也所以風化天下而正夫婦也關關睢鳩在河之洲一名王睢一名鵰鷞江東呼爲鶚食魚鷙而有別倉頡解詰曰鶚金喙鳥也見則天下兵能擊殺麞鹿漢書曰鄒陽諌吴王曰臣聞鷙鳥累百不如一鶚孟康曰鶚大鵰白鷢爾雅曰揚白鷢郭璞注曰以鷹尾上白也廣雅曰白鷢鷹也說文曰白鷢玉鵰也崔豹古今注曰揚白鷢似鷹而尾上白也亦号爲印尾鷹風土記曰說詩義者或說睢鳩爲白鷢白鷢鸇属於義無取盖蒼鷃大如白鷢而色蒼其鳴戞戞和順又遊於水而息於洲常隻不雙太平御覽卷第九百二十六
