body:
  text: 龜爾雅曰龜三尺賁今呉興陽羡縣君山上有池池中有六眼龜龜俯者靈行頭低仰者謝行頭仰前弇諸果甲前長左倪不類行頭今江東所謂者以甲卜審右倪不若行頭右庳爲右食甲形皆爾一曰神龜龜之最神明二曰靈龜涪陵郡出大龜甲可以卜縁中文似瑇瑁俗呼爲靈龜即今觜􅏲龜一名靈􅏲能鳴􅏲以規切三曰攝龜小龜也腹甲曲折解能自張閉好食虵江東呼爲靈龜也四曰寳龜書曰遺我大寳龜五曰文龜甲者文彩者河圖曰靈龜負書丹甲青文六曰筮常在著藂下潜伏見龜榮傳七曰山龜八曰澤龜九曰水龜十曰火龜此者說龜生之處所火龜猶火䑕午耳物有含異氣者不可以常理推然亦無所恠周易曰或益之十朋之龜又說卦曰離爲龜京房易緯曰靈蓍四十九莖下有千歳神龜守之焦贑易林曰龜猒江海陸行不止自今枯藁失其都市尚書臯陶謨曰昆命于元龜又禹貢曰九江納錫大龜又曰寜王遺我大寳龜文王也遺我大寳龜疑則卜之尚書中候曰堯沉璧於洛玄龜負書出於背中赤文朱字止壇塲沉璧於河黒龜出赤文題又曰周公攝政七年制禮作樂成王觀於洛沉壁禮畢王退有玄龜青純蒼光背甲刻書上躋于壇赤文成字周公冩之雒書曰靈龜者玄文五色神靈之精也上隆法天下法地能見存亡明於吉凶王者不偏黨尊耆老則岀洪範五行曰龜之言乆也十歳而靈比禽獸而知吉凶者也周禮天官上鼈人曰春獻鼈蜃秋獻龜魚又春官下龜人曰龜人掌六龜之屬各有名物天龜曰靈屬地龜曰緯屬東龜曰果屬西龜曰雷屬南龜曰獵屬北龜曰若屬凢取龜用秋時攻龜用春時各以其物入于龜室六龜各異室也大戴禮曰甲之蟲三百六十而神龜爲之長禮記月令曰季秋登龜取黿甲類秋乃堅成故是月登取又學記曰青黒縁者天子之寳龜也又禮運曰麟鳯龜龍謂之四靈逸禮曰天子龜尺二寸諸侯八寸大夫六寸士民四寸龜者隂蟲之老也龜三千歳上游於卷耳之上老者先知故君子舉事必考之禮統曰神龜之象上貟法天下方法地背上有盤法丘山玄文交錯以成列宿五光昭若玄錦文運轉應四時長尺二寸明吉凶不言而信左傳襄二十三年曰臧武仲自邾使告臧賈且致犬蔡焉大蔡臧文仲所居大龜也曰紇不佞失守宗祧祧廟敢告不吊言我爲人後不至於道而失守紇之罪不及不祀不祀絶也言冝有後也子以大蔡納請其可請爲先人立後其必可也賈曰聞命矣再拜受龜公羊傳定公曰弓繡質質祔龜青純純縁春秋運斗樞曰瑶光星散爲龜史記龜䇿傳曰余至江南觀其行事問其長老云龜于歳乃游蓮葉之上江傍家人嘗畜龜飲食之以爲能導引致氣有益於助衰飬老豈不偉哉史記禇先生曰能得名龜者財物歸之家必大冨至千萬一曰北斗龜二曰南辰龜三曰五星龜四曰八風龜五曰二十八宿龜六曰日月龜七曰九州龜八曰王龜凢八名龜龜各有文在腹下此龜不必滿尺二寸民人得長七八寸可寳矣神龜岀於江中廬江郡常歳時出龜長尺二寸者二十枚輸太卜官太卜官因以吉日剔取其腹下甲龜千歳乃滿尺二寸有神龜在江南嘉林中嘉林者獸無虎狼鳥無鴟梟草無毒螫野火不及斧斤不至是謂嘉林龜在其中嘗巢於芳蓮之上左脅書文曰甲子重光得我者匹夫爲人君有土正諸侯得我爲帝王南方老人用龜支牀足行二十餘歳老人死後移床龜尚生能行氣導引又曰宋元王二年江使神龜使於河至於泉陽漁者豫且舉網得而囚之置之籠中夜半龜來見夢於宋元王曰我爲江使於河而網當吾路泉陽漁者豫且得我我不能去身在患中王有德義故來告愬元王惕然乃召博士衛平而問之平曰龜也王求之泉陽豫且曰夜半舉網得龜使者載行入端門見王延頸而前三歩而止縮頸而却復其故處於是元王擇日齋戒以刀剥之元王之時衛平相宋宋國最強龜之力也魏略曰文帝時神龜岀於靈芝池晉書曰懷帝永嘉元年有玉龜出於覇水也崔鴻十六國春秋前燕録曰海出大龜枯死於平墩遼東送之侍郎王弘以爲宇文允得龜滅亡之徴也晉書曰符堅末髙陸人穿井得龜大三尺背上有文象八卦堅命太卜池飬之食以粟及死藏其骨於太廟是夜廟丞髙虜夢龜謂之曰我本岀將歸江南遭時不遇殞命秦庭又有人夢於虜曰龜三千六百歳終必妖興亡國之象也其後竟驗又載記曰乞伏國仁隴西鮮卑人也昔有如弗斯出連叱盧三部自漠北南岀太隂山遇一巨蟲於路狀若神龜大如阜乃殺馬而祭之祝曰若善神也便開路惡神也遂塞不通俄而不見乃有一小兒在焉南齊書曰永明年唐濳獻青毛神龜一頭梁書曰元帝爲江州刺史時有安成望族劉敬躬者田間得白蛆化爲金龜將銷之龜生光照室敬躬以爲神而禱之所請多驗也三國典畧曰梁陸法和至襄陽城北大樹下畫地方二尺令弟子掘得一龜長一尺五寸杖叩之曰汝欲岀此巳數百歳若不遇我豈見天子日爲授三歸龜乃入草去陳書曰武宣章皇后母常遇道士以小龜遺巳光采五色曰三年有徴及朞后生紫光照室因失龜所在隋書曰開皇中掖庭宫毎有人來挑宫人宫司以聞帝曰門衛甚嚴人何從而入當是妖精耳因戒宫人曰若逢但斫之其後有物如人夜來登床宫人抽刀斫之若中枯骨其將落牀而走宮人逐之因入池而没明日帝令涸池得一龜徑尺餘其上有刀迹煞之遂絶唐書曰先天二年丁未江州獻靈龜六眸腹下有玄文象卦文梁記曰朱友貞末年許州獻緑毛龜以爲瑞因宮中造室以居之目爲龜堂晉史曰安州李金全之將叛也郡樓有介蟲如龜而巨鱗銳首能䧟堅出於金全足下金金惡而焚之列子曰渤海之東有大壑焉其中有山無所連著常隨潮波上下徃還不得暫峙焉仙聖毒之訴於上帝帝恐流於西極失羣聖之居使巨龜十五舉首而戴之迭爲三番六萬歳一交焉五山始峙而不動龍伯之國有大人舉足而不盈數十歩而曁五山之所一釣而連六龜合負而趣歸其國灼其骨以數焉莊子曰莊釣於濮水楚王使大夫徃先白焉曰願以境内累子莊子持竿不顧曰吾聞楚有神龜死已二千歳矣巾笥而藏之廟堂之上此龜者寧其死留骨而貴乎寧其生而曳尾塗中乎大夫曰寕生而曳尾塗中莊子曰徃矣吾將曵尾於塗中又曰宋元君夜半而夢人𬒳髮窺阿門曰予自宰露之淵予爲清江使河伯之所漁者余且得予元君覺召占夢者占之曰此神龜也君曰漁者有余且乎左右曰有君曰令余且㑹朝明日余且朝君曰若漁何得荅曰且之網得白龜五尺君曰獻若之龜龜至君再欲殺之再欲活之心疑卜之曰殺龜以卜吉乃刳龜以卜七十二鑚而無遺筴仲尼曰神龜能見夢於元君而不能避豫且之網智能七十二鑚而無遺筴不能避刳膓之患淮南予曰龜三千歳蜉蝣不過三日以蜉蝣而爲龜憂飬生之具人必笑之又曰牛彘顱亦骨也而弗灼必問吉凶於龜者以其歷歳乆也抱朴子曰千歳靈龜五色具焉其雄額上兩骨起似角解人言浮於蓮葉之上或在䕺蓍之下以來朱浴之乃剔取其甲火炙擣服方寸匕日三盡一具壽千歳又曰山中辰曰稱雨師者龍也巳曰稱寡人者社中虵也稱時君者龜也又曰郄儉少時行獵墮空冢中饑餓見冢中先大龜數數迴轉所向無常張口吞氣或俛或仰素聞龜能導引乃試隨龜所爲遂不復饑百餘日後竟能咽氣斷榖魏王弃置土室中閉試之一年不食顔色恱懌氣力自若符子曰邦人獻燕昭王以大豖者曰於今百二十歳邦人彼背歲彗星見彼操其柄我操其標吾又夢與荆上搏彼在上我在下吾以無戰子以爲何如咎犯對曰卜戰龜􅑒是荆人也我迎歳彼背歳彼去我從之也又曰晉屠岸賈欲追趙氏趙盾夢見叔帶持龜而哭甚悲巳而笑拊手且歌謂趙盾卜之占兆絶而後好趙史援占曰此甚惡非君之身國語曰夫服心之文也如龜焉灼其中必文於外若楚公子不爲君必死不合諸侯矣家語曰孔子問􅃮彫馮曰子事臧文仲武仲及孺子容此三大夫者孰爲賢乎對曰臧氏家有守龜焉文仲三年而爲一兆武仲三年而爲二兆孺子容三年而爲三兆馮從此見之若夫三人之賢與不賢所未敢識也孔子曰君子哉􅃮彫氏之子其言人之美也隱而顯言之過也微而著智不能及明不能見孰克如之論衡曰龜三百歳大如錢游華葉上三千嵗則青邊有距山海經曰大苦山陽狂水出焉注于伊水中多三足龜星經曰天龜五星在南漢中廣志曰觜兹維切􅏲夷焦切形如龜出交州山龜在山上食草長尺餘栁氏龜經曰龜一千二百嵗可卜天地之終始何以言之三千四十二占於天地千歲之龜甲黒龜有五色時用之神仙傳曰南極子融即柸呪之即成龜煑之可食腹藏皆具柸成龜殻煑取肉還成柸㑹稽後賢傳曰孔愉字敬康甞至呉興餘不亭見人籠龜於路愉求買而放於溪中龜行至水反顧視愉及封此亭而鑄印龜首廻屈三鑄不正有似昔龜之顧靈德感應如此華陽國志曰秦惠王十二年張儀司馬錯破蜀克之儀因築城城終頺壞後有一大龜從硎而出周行旋走乃依龜行所築之乃成古史考曰伏羲時靈龜負河圖八卦是也洛陽記曰禹時有神龜於洛水負文列於背以受禹文即治水文也南越志曰龜甲名神屋出南海生池澤中呉越謂之元佇神龜大如拳而色如金上甲兩邊如鋸齒瓜利而能縁大木捕鳴蟬至美可食不中於卜以其小故也嵩髙山記曰千歳松或化爲伏龜義興記曰君山廟其下有池池中有三足六眼龜崔豹古今注曰龜一名玄衣督郵一名元緒王子年拾遺録曰崑崙山第五層有神龜長一尺九寸四翼萬嵗則升木而居也亦能言矣郭子橫洞冥記曰黃安代郡人也常去自云卑猥不敢處人間執鞭懷而欲書畫地以記其數一夕地成池矣明腹移亦復成池時人謂言黃安舌耕年可八十餘視若童子常服朱砂舉體皆赤冬不着衣坐一大神龜時人問子坐此龜幾年對曰昔伏羲氏始造網罟有此龜以授吾龜背巳平此蟲畏日月之光二千嵗而一岀頭我坐此龜巳來五遇岀頭矣行則負龜而移世人謂黃安萬歲博物志曰人有出行墜深泉澗者無出路饑餓分死左右見龜虵甚多朝暮引頸向東方人因伏地學之遂不復饑體殊輕便能巖岸經數年後試竦身舉臂遂超出澗上即得還家顔色恱懌頗更黠慧勝故還食榖啖滋味百餘日中復其本質又曰龜三千歳猶旋卷耳之上蓍千嵗三百莖同本以老知吉㓙神異經曰西方大荒中有人焉長丈其腹圍九尺踐龜虵載朱鳥知河海升斛識山石多少知天下鳥獸言語續捜神記曰司徒蔡謨親友王蒙者單獨常爲蔡公所怜公嘗令曰捕魚獲龜如車輪公付厨帳下倒懸龜着屋蒙其夕纔眠巳厭如此累夜公聞而問蒙何故厭荅云眠輙夢人倒懸巳公容慮向龜乃令人視龜所在果倒懸着屋公嘆曰果如所度命下龜於地於是蒙即得安寢龜乃去又曰晉咸康中豫州刺史毛寳戍邾城有一軍人於武昌市見人賣一白龜子長四五寸潔白可愛寳便買取持歸着瓮中養之日日大近欲尺許其人憐之持至江邊放水中視其去後邾城遭石勒敗毛寳弃豫州旣越江莫不沉溺寳于時𬒳鎧持刀亦同自投旣入水中覺如隨一石上水裁至腰湏臾游去中流視之乃是先所養白龜甲六七尺旣送至東岸出頭視此人徐游而去中江猶迴首數焉又曰鄱陽縣民黃赭入山採荆楊子遂迷不知道數日饑餓怱見一大龜赭便呪曰汝是靈物吾迷路不知道今騎汝背示吾路龜即回右膊赭即從行去十餘里便至溪水見賈客行舡赭即徃乞食便語舡人云我向者於溪邊見一龜甚大可共徃取之言訖靣即生瘡旣徃亦復不見龜還家數日病瘡而死劉敬叔異苑曰餘姚縣倉封印完全而開之覺大損耗後伺之乃是冨陽縣桓王陵上雙石龜所食即密令毀龜口於是不復損耗又曰孫權時永康有人入山遇一大龜即束之歸龜便言曰遊不良爲時君所得人甚恠之載岀欲上呉王夜洎越里纜舡於大桑樹霄中樹呼龜曰勞乎元緒奚事爾耶龜曰我𬒳拘縶方見烹臛雖盡南山之樵不能潰我樹曰諸葛元遜博識必致相苦令求如我之從計從安岀龜曰子明無多辭禍將及爾樹寂而止旣至權命煑之焚柴萬車語猶如故諸葛恪曰燃以老葉乃熟獻人仍說龜樹共言權登使伐取煑龜立爛今烹龜猶多用葉薪野人故呼龜爲元緒孔氏志恠曰㑹稽吏謝宗赴假呉中獨在舡忽有女子姿性妖婉來入舡問宗有佳絲否欲市之宗因與戲女漸相容留在舡宿歡宴繼曉因求宗寄載宗便許之自爾舡人恒夕但聞言笑兼芬馥氣至一年徃來同宿宻伺之不見有人方知是邪魅遂共掩之良乆得一物大如枕湏臾叉得二物並小如拳以火視之乃是三龜宗悲思數日方悟自說此女子一歳生二男大者名道愍小者名道興旣爲龜送之於江廣五行記曰晉孝武太元中呉郡岑泉爲司農造碑於江畔湖西之村見石龜載碑從田中岀還其先處萍藻猶在腹下其月泉暴亡任昉述異記曰陶唐之世越裳國獻千嵗神龜方三尺餘背上有文背科斗書記開闢已來命録之龜曆伏滔述帝功德銘曰胡書龜暦之文又曰周時城陽雨錢終日方絶王莽時未央宫雨五銖錢旣至地悉爲龜兒又曰龜一千年生毛壽五千歳謂之神龜壽萬年曰靈龜孫惠龜賦曰有輜衣之大夫兮衣玄繡之衣裳乗輜車之岌兮駕雲霧而翺翔風雨爲之電奮兮五色赫以焜煌李顒龜賦曰質應離象位定坎居賤彼孕頥賁我靈符浮洛川見緯書洞祕賾通玄虚太平御覽卷第九百三十一
