front:
  text: 太平御覽卷第九百三十九
  hash: sha256:6fabbbec1938f9ddfeee32ae2f4f7759ba5acc2744073c54e122c5ba093dd8c0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_939-1a}
body:
  text: 鱗介部十一牛魚天牛魚水猪魚鹿魚鰕魚鰩魚珠鼈魚赤鱬魚何羅魚鰼鰼魚䲃魚鮨魚鱅鱅魚葴魚縳魚鯥魚􅼗魚魚無遺魚鰠魚􅛈魮魚蠃魚䰽䰽魚􅚝魚􅗫父魚師魚文魚鯩魚魚飛魚豪魚鯸鮐魚鯸􅲬魚鮠魚丹魚䖶魚􅗫魚望魚班文魚蕭拆魚䱐䰽魚蕃踰魚龍魚牛魚愽物志曰東海中有牛魚形如牛剥其皮懸之潮水至則毛起潮去則伏臨海異物志曰牛魚形如犢子毛色青黄好眠卧人臨上及覺聲如大牛聞一里魏武四時食制曰海牛魚皮生毛可以飾物出揚州天牛魚南越記曰天牛魚方圎三丈眼大如升在脾頭口在脅中露齒無脣兩肉角如臂兩翼長六尺尾長五尺水猪魚南方草物狀曰水猪魚隨海潮博岸邊食人人乗舩刺之大者圍九尺長二三尺似猪形鹿魚臨海異物志曰鹿魚長二尺餘頭上有角腹下有脚如人足嶺表録異曰鹿子魚頳其尾鬛皆有鹿班赤黃色余曽覽羅州圖云州南海中有洲毎春夏此魚跳岀洲化而爲鹿曽有人拾得一魚頭巳化鹿尾猶是魚南人云魚化爲肉腥不堪食郭璞江賦曰或鹿觡象鼻鹿觡頭角如鹿鰕魚爾雅曰鯢大者謂之鰕今鯢魚似鮉四脚前似猕猴後似狗聲如小兒啼大者長八九尺異物志曰鰕魚有四足如龜而行疾有魚之體而以足行故名鰕魚含水仰天不動小鳥就飲因而吞之異物記曰鰕實四足而有魚名頭尾類鯷歧行生長山澗出入深坈頂上有光迎風濆流云是嬾婦㤪勤自投鰩魚吕氏春秋曰灌水之魚名曰鰩狀如鯉有翼左思呉都賦曰文鰩夜飛而觸綸珠鼈魚山海經曰葛山澧水中多珠鼈之魚如肺而有六足目有珠其味酸甘食之不厲山海經圖讃曰澧水之鱗狀如浮肺體兼三才以貨賈客吕氏春秋曰魚之美者澧水之魚名曰珠鼈六足有珠澧水在蒼梧九疑之西赤鱬魚山海經曰青丘之山英水出焉中多赤鱬音需其狀如魚而人靣其音如鴛鴦食之疥經圖讃曰赤鱬之狀魚身人頭何羅魚山海經曰譙明之山譙水出焉其中多何羅之魚一首十身其音如吠犬食之巳癕山海經曰􅈪之山速株食水岀焉中多鱅鱅之魚音容狀如犁牛其音如彘山海經圖讃曰魚號鱅鱅如牛虎駮葴魚山海經曰狗狀之山􅯤音枳水岀焉中多葴魚狀如鯈喙如葴食者無疫南越記長針魚口四寸縳魚山海經曰鷄山暴水岀焉其中有縳魚音團狀如鮒彘毛其音如豚見則天大旱又曰圖縳魚并顒鳥讃曰顒鳥栖林魚處川俱爲旱徵災延普天測之無象厥數惟玄吕氏春秋曰魚之美者洞庭之縳鯥魚山海經曰爲音帶山多水有魚岀焉狀如牛陵居虵尾有翼在魼祛榻二音下其音如留牛其名曰鯥音六冬死夏生蟄類也食之無腫疾山海經圖讃曰魚號曰鯥處不在水厥狀如牛鳥翼虵尾􅼗魚音山海經曰英山愚水出焉北流注于招音詔水其中多􅼗魚狀如鼈其音如羊魚音謂山海經曰樂遊之山桃水出焉其中多魚其狀如虵而四足漢書地理志曰子桐之水其中澤多魚無遺魚山海經曰英鞮之山涴水岀焉是多無遺之魚魚身虵首六足目如馬耳食之使人不昧可以禦凶鰠魚山海經曰鳥䑕同穴之山渭水出焉其中多鰠魚音駱其狀如鱣魚動則其邑大兵山海經圖讃曰物以感應亦有數動壯士挺劒氣激江涌鰠魚潜淵出則民悚􅛈鮆魚山海經曰鳥䑕同穴之山濫音檻水出於其西多􅛈鮆之魚如二音其狀如覆銚鳥首而魚翼魚尾其聲如磬是生珠玉珠母􅑕類山海經圖讃曰形如覆銚苞玉含珠有而不積泄以尾閭闇與道㑹可謂竒魚嬴魚山海經曰邽音邽山濛水出焉其中多蠃魚魚身而鳥翼聲如鴛鴦見其國大水䰽䰽魚山海經曰少咸之山鴈門之水其中多䰽䰽之魚音沛食之殺人魮魚山海經曰懸甕之山晉水出焉其中多魮魚音紫其狀如鯈而赤鱗其音如吒食之不驕或作慅山海經圖讃曰微哉毗魚食則不驕物有所感其用無摽􅗫父魚山海經曰陽山流水出焉其中有􅗫音瑫父之魚其狀如鮒魚首如彘食之巳歐山海經圖讃曰􅗫父魚首厥體如豚師魚山海經曰饒山歷號之水岀焉中有師魚食之殺人文魚山海經曰景山睢音蛆水岀焉中多丹粟文魚有班彩也鯩魚山海經曰半石之山來需音湏之水出焉其中多鯩魚音綸黒文狀如鮒食者不腫鰧魚山海經曰半石之山合水出其隂是多鰧音騰魚其狀如鱖居逹逹水中之穴相交通蒼文赤尾食者不雍可以巳瘻臨海水土記曰鰧魚似鱦長二尺飛魚王子年拾遺録曰仙人寗封食飛魚而死死百年生故寗先遊涉七言頌亡菁藻灼爍千載舒萬齡蹔死餌飛魚山海經曰騩音愧山􆂃過之水出焉而北流注于河其中多飛魚其狀如豚而赤文服之不雷可以禦兵郭璞山海經圗飛魚讃曰飛魚如豚赤文無羽山海經曰牛首之山勞水出焉是多飛魚其狀如鮒食之可以巳痔又曰飛魚如豚赤文無羽張駿山海經飛魚讃曰飛魚如鮒登雲遊波林邑國記曰飛魚身圎長丈餘羽重沓翼如胡蟬出入群飛逰翔翳薈而沉則泳海底豪魚山海經曰渠猪之山渠猪之水出焉是多豪魚其狀如鮪而赤喙尾赤羽食可以巳白疥鯸鮐魚左思吴都賦曰王鮪鯸鮐劉逵曰鯸鮐狀如科斗蟲大者長尺餘腹白背青有黄文性有毒雖小獺犬魚不敢敢也蒸煑肥美鯸􅲬魚潘岳滄海賦曰鰫魚鯸􅲬鮠魚午回切廣志曰鮠魚一名河豚丹魚枹朴子曰南陽丹水有丹魚先夏至十日夜伺之魚夜浮水側有赤光割取血以塗足可以歩行水上䖶魚廣志曰䖶魚一名鮦直壟切􅗫魚劉敬叔異苑曰􅗫魚凡諸魚欲産􅗫輙以頭衝其腹􅗫魚自欲生者亦更相橦觸故丗人謂爲衆魚之生毋也嶺表録異曰􅗫南人云魚之欲産子者湏此魚以頭觸其腹而産俗呼爲生母魚望魚魏武四時食制曰望魚側如刀可以刈草岀䂊章明都澤云云滏澤班文魚魚豢魏略曰濊國岀班魚皮漢時恒獻之郭義恭廣志曰班文魚出東夷濊獻其皮蕭拆魚魏武四時食制曰蕭拆魚海之乾魚也䱐䰽上孚下沛魚魏武四時食制曰䱐䰽魚黒色大如百斤猪黃肥不可食數枚相隨一浮一沉一名敷常見首出淮及五湖三十六國春秋曰呉人夏丞爲孝廉髙士夏仲御以母疾將市藥于京師隨丞入洛時值褉飲賈充見而放之仲曰我㑹稽夏仲御也充問卿居海濵能獻舩不仲曰能之充因命焉仲御即登舩皷拽容止可觀爲䱐䰽之形俄然雲霧杳冥白魚躍入其舟充甚異之蕃踰魚一曰蕃魚魏武四時食制曰蕃踰魚如鼈大如箕甲上邊有髯無頭口在腹下尾長數尺有節有毒螫人龍魚山海經曰龍魚陵居其狀如狸或曰龍魚似狸一角也一曰鰕魚音遐却有神聖乗此以行九野一曰鼈魚郭璞山海經圖讃曰龍魚一角似狸居陵俟時而出神聖攸乗飛鶩九域乗雲上升括地圖曰龍魚一名鰕魚狀如龍而有神聖乗此以行九野郭璞江賦曰或虎狀龍顔龍魚亦似魚太平御覽卷第九百三十九
