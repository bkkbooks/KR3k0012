front:
  text: 太平御覽卷第六百三
  hash: sha256:b73bfa45d7089a3e7f91104166e8efda1d7558fcb16d0633495aadece10945ad
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_603-1a}
body:
  text: 文部十九史傳上文心雕龍曰史者使也執筆左右使之謂也古者左史記言右史書事言經尚書事經春秋也說文曰史記事者也釋名曰傳傳也以傳示後人也博物志曰賢者著述曰傳禮記曰五帝憲養氣體而不乞言有善則記之爲惇史詩序曰國史明乎得失之迹韓詩外傳曰周舎對趙簡子曰臣操牘秉筆從君之後司君過而書之周禮曰外史掌四方之志鄭玄注曰志記也謂若魯之春秋晉之乗楚之檮杌左傳昭十五年曰荀躒如周籍談爲介王謂籍譚曰昔而髙祖孫自黶司晉之典籍以爲大政曰籍氏及辛有之二子董之晉於是乎有董史汝司典之後也何故忘之籍談不能對又宣二年傳曰晉趙穿弑靈公宣子未出境而復太史書曰趙盾弑其君以示於朝宣子曰不然對曰子爲正卿亡不越境反不討賊非子而誰宣子曰嗚呼我之懷矣自詒伊慼其我之謂矣孔子曰董狐古之良史也書法不隱趙宣子古之良大夫也爲法受屈惜也越境乃免又襄二十五年傳曰齊崔杼弑莊公太史書曰崔杼弑其君崔子殺之其弟嗣書而死者二人其弟又書乃舎之南史聞太史盡死執簡以往聞旣書矣乃還又昭十二年傳曰楚王與右尹子革語左史倚相趍而過王曰此良史也能讀三墳五典八索九丘史記曰秦趙澠池之㑹其君相爲鼓瑟扣缶皆命御史書之漢書曰司馬喜生談爲太史公談生遷遷爲太史令掌紬史記紬綴集也又曰武帝始置太史天下計書先上太史副上丞相故司馬談父子丗居此職得撰史記又曰劉向楊雄皆稱遷有良史之才服其善序事理辨而不華質而不俚其文直其事該不虚美不隱惡故謂之實録後漢書曰班彪續司馬遷後傳數十篇未成而卒明帝命其子固續之固以史遷所記乃以漢氏繼百王之末非其義也大漢當可獨立一史故上自髙祖下終王莽爲紀表傳志九十九篇又曰明德馬后能誦易好讀春秋楚辭尤善周官董仲舒書周官周禮也仲舒有王柸繁露清明竹林之屬自撰顯宗起居注削去兄防叅醫藥事章帝請曰黄門舅且夕供養且一年旣無褒異又不録勤勞無乃過乎太后曰吾不欲後代聞先帝數親後宫之家故不録也東觀漢記曰時人有上言班固私改作史記詔下京兆収繫固弟超詣闕上書具陳固不敢妄作但續父所記述漢事晉書曰王沉仕魏正元中遷散騎常侍侍中與荀顗阮籍共撰魏書多爲時諱未若陳壽之實録也又曰華嶠常沉醉所撰書十典未成而終祕書監何劭奏嶠中子徹爲佐著作郎使踵成之未竟而卒後監繆徽又奏嶠少子暢爲佐著作郎尅成十典并草魏晉紀傳與著作郎張載等俱在史官又曰陳壽撰魏呉蜀三國志凢六十五篇時人稱其善叙事有良史之才夏侯湛時著魏書見壽所作便壞巳書而罷張華善之謂壽曰當以晉書相付耳其爲時重如此宋書曰王韶之琅耶臨沂人也私撰晉陽秋成時人謂之冝居史職即除著作郎使續後事訖義熈九年善叙事辭論可觀爲後丗佳史又曰裴松之字丗期注陳壽三國志松之鳩集傳記廣増異聞旣成奏之上覽之曰裴丗期爲不朽矣又曰范曄獄中與諸生姪書曰旣造後漢轉得統緒詳觀古今著述及評論殆少可意者班氏最有髙名旣任情無例唯志所推耳博贍不可及之整理未必媿也吾雖傳論皆有精意深旨至於循吏巳下及六夷諸序論筆勢縱放實天下之竒作中合者往往不减過秦篇當共比班氏所作俱不愧之而巳欲遍作諸志前漢所有者悉令備雖事不必多且使見文得盡此書行故應有嘗意者自古體大而思精未有此也梁書曰呉均欲撰齊書求借齊起居注及群臣行狀武帝不許遂私撰奏之稱帝爲齊明帝佐命帝惡其書不實録以其書不實使中書舎人劉之遴詰問數十條竟支離無對勑付省焚之坐免職又曰裴子野曽祖松之宋元嘉中受詔續脩何承天宋史末成而卒子野常欲繼成先業及齊永明末沈約所撰宋書稱松之巳後無聞焉子野更撰爲宋畧二十卷其叙事評論多善而去戮淮南太守沈璞以其不從義師故也約懼徒跣謝之請兩釋焉歎其述作曰吾弗逮也蘭陵蕭琛言其評論可與過秦王命分路楊鑣後魏書曰毛循之位次崔浩之下浩以其中國舊門雖學不博洽而猶渉獵書傳每期重之與論說言次遂及陳夀三國志有古良史之風其所著述文義典正皆楊于王庭之言微而顯婉而成章班史以來無及壽者循之曰昔在蜀中聞長老言壽曽爲諸葛門下書佐得撻百下故其論武侯云應變將畧非其所長浩乃與論曰夫亮之相劉備當九州鼎沸之㑹英雄奮發之時君臣相得魚水爲喻而不能與曹氏争天下委弃荆州退入巴蜀誘奪劉璋僞連孫氏守窮﨑嶇之地僣號邊夷之間此䇿之下者可與趙它爲偶而以爲蕭曹亞匹不亦過乎謂壽貶亮非爲失實三國典畧曰齊主以魏収之卒也命中書監陽休之裁正其所撰魏書休之以収叙其家事稍美且寡才學淹延歳時竟不措手唯削去嫡庻一百餘字又曰周蕭大圜爲滕王逌友逌問於大圜曰吾聞湘東王作梁史有之乎餘傳乃可抑揚帝紀奚若隱則非實記則攘羊對曰言之者妄也如使有亦不足怪昔漢明爲丗祖紀章帝爲顯宗紀殷鑒不逺足爲成例且君子之過如日月之蝕彰於四海安得隱之如有亦安得而不隱盖子爲父隱直在其中諱國之惡抑又禮也逌乃大笑又曰齊主命魏収撰魏史至是未成常令群臣各言其志収曰臣願得直筆東觀早出魏書齊主乃令収專在史閣不知郡事謂収曰當直筆我終不學魏太武誅史官於是廣徴百官傳惣斟酌之旣成上之凢十二􅽆一百三十卷尚書陸操謂楊愔曰魏収可謂博物宏才有大功於魏室愔曰此不刋之書傳之万古但恨論及諸家枝葉過爲繁碎時論収爲爾朱榮作傳以榮比韓彭伊霍者盖由得其子文賂黄金故也邢劭父兄書事皆優劭唯笑曰列女傳悉是史官祖母尚書左丞盧斐臨漳令李庶度支郎中王松年中書舎人盧潜等言曰魏収誣罔一代其罪合誅盧思道曰東觀筆殊不直斐庶等與収靣相毀辱無所不至齊主大怒乃親自詰問斐曰臣父位至儀同収附於族祖中書郎玄傳之下収之外親博陵崔綽位止功曹乃爲傳首齊主問収曰崔綽有何事迹卿爲之立傳収曰雖無爵位而道義可嘉魏司空髙允曽爲其賛稱有道德臣所以知之齊主曰司空才士爲人作賛理合稱楊亦如卿爲人作文章道其好者豈能皆實収不能對以其才名不欲加罪髙德正其家傳甚羙乃言於齊主曰國史一定當流天下人情何由悉稱謗者當加重罪不然不止齊主於是禁止諸人各杖二百斐庶死於臨漳獄中又北史収所引史官恐其陵逼唯取髣髴學流先相依附者其房延祐辛元植睦仲讓雖夙渉朝伍並非史才刁柔裴昴之以儒業見知全不堪編緝髙孝幹以左道求進脩史諸人父祖姻戚多𬒳書録飾以羙言収性頗不甚能平夙有怨者多没其善每言何物小子敢共魏収作隙若舉之則使上天按之當使入地収在神武時爲太常少卿脩國史得陽休之助因謂休之曰無以謝德當爲卿作佳傳休之父固魏丗爲北平太守以貪虐爲中尉李平所彈獲罪収書云固爲北平甚有惠政坐公事免官又云李平深相敬重群口沸騰勑魏史且勿施行號爲穢史唐書曰杜正倫知起居注太宗嘗謂侍臣曰朕毎日坐朝欲出一言即思此言於百姓有所益不所以不敢多言正倫進曰君舉必書言存在史臣職當脩起居注不敢不盡愚直陛下若一言乖於道理則千載累於聖德非直當今有損於百姓願陛下慎之太宗大恱又曰許敬宗𥘉虞丗基與敬宗父同爲宇文化及所害封德彞時爲内史舎人備見其事因謂人曰丗基𬒳戮丗南匍匐而請代善心之死敬宗舞蹈以求生敬宗聞而銜之及爲德彛立傳盛加其罪惡在監門大將軍錢九隴皇家之隷也敬宗與之結婚乃爲九隴曲叙門閥妄加功績又蠻首龐孝㤗率郷兵從征髙麗賊知其怯愞先擊破之敬宗納其家寳貨妄稱其頻破賊徒斬獲數萬漢將驍徤者唯蘇定方龐孝泰耳曹繼叔劉伯英皆出其下虚美如此又曰太宗謂諌議大夫禇遂良曰卿猶知起居皆書何等事大底人君得見否遂良曰今之起居古之左右史書人君言事且記善惡以爲鑒誡庻幾人主不爲非法不聞帝王躬自觀史太宗曰朕有不善卿必記之耶遂良曰守道不如守官臣職當載筆君舉必記黄門侍郎劉洎曰設令遂良不記天下之人皆記之矣帝曰然又曰貞觀十年尚書左僕射房玄齡侍中魏徴散騎常侍姚思廉太子右庻子李百藥孔潁逹守禮部侍郎令狐德蔡守中書侍郎岑文本中書舎人許敬宗等撰成周隋梁陳齊等五代史詣闕上之太宗勞之曰朕覩前代史書彰善癉惡足爲將來之誡秦始皇奢淫無度焚書坑儒用緘談者之口隋煬帝雖好文儒尤疾學者前丗史籍竟無所成數代之事殆將泯絶朕意則不然將欲覽前王之得失爲在身之龜鏡公軰以數年之間勒成五代之史副朕深懷極可嘉尚又詔司空房玄齡等脩晉書以臧榮緒書爲夲採摭諸家傳記而益附之爰及晉代文集罔不畢舉爲十夲紀二十志七十列傳三十載記其太宗所著宣武二帝及陸機王羲之四論皆稱制焉房玄齡以下爲論皆稱史臣後數載而書就藏之祕府頒賜加級各有差以其書賜皇太子及新羅使者各一部焉又曰顯慶中髙宗以許敬宗所撰太宗實録所紀多非實乃謂劉仁軌曰朕昨觀國史所書多不周悉卿等必湏窮微索隱原始要終盛業鴻勲咸使詳備至如先聖作威鳯賦意屬阿舅及士廉敬宗乃移向尉遟敬德傳内又嘗温湯教習長圍四合萬隊俱前忽然雲霧晝昏部伍亂錯先聖旣覩斯事恐其挂法者多遂潜隱不出待其整理然後臨觀顧謂朕曰振旅訓兵國之大典此之錯失於法不輕我若見之必湏行法我今不出良爲於此今乃移向魏徴傳曰稱是徴之諌語此旣乖於實何以垂之後昆朕嘗從幸未央宮辟仗巳過忽於草中見一人身帶撗刀其人云聞辟伏至怕不敢出仗家捜索不覺遂伏不敢動先聖歛轡即還顧謂朕曰此事若發數人合死汝可後伺看早放出之史家唯此一事差似不失其真郝處俊曰先聖仁恩觸類皆是臣弟傑往年宿衛之日𬒳羌腰轝供奉見有三衛誤拂御衣此人怕懼五情無主先聖謂之曰此間無御史我不爲汝作罪過不湏怕懼上謂處俊曰此亦湏入史於是處俊等引左史李仁實專掌其事太平御覽卷第六百三
