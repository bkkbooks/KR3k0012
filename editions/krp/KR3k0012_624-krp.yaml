front:
  text: 太平御覽卷第六百二十四
  hash: sha256:0b518fcf5c2c6fac1ab506943ff80c2306e360a24af7ca76b0eca58953e3e46c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_624-1a}
body:
  text: 治道部五政治三管子曰國有四維一維絶則傾二維絶則危三維絶則覆四維絶則滅傾可正危可安覆可起滅不可復措也四維一曰禮二曰義三曰廉四曰恥又曰政之所行在順民心政之所廢在逆民心民惡憂勞我佚樂之民惡貧賤我冨貴之民惡危墜我存安之民惡㓕絶我生育之又曰凢牧民者使士無邪行女無淫事士無邪行教也女無淫事訓也教訓成俗而刑罰省也又曰善爲國者使民若飢魚之歸餌渴馬之走飲又曰堯舜之民非生而治桀紂之民非生而亂故治亂在上也又曰聖人設度量置儀法如天地之堅如列星之固如日月之明如四時之信然故令徃而民從之老子曰治大國若烹小鮮烹小鮮不敢橈恐其縻也治國煩則亂治身煩則精神散以道蒞天下者其鬼不神以道德治天下則鬼不敢見其精神以犯人也又曰聖人虚其心實其腹弱其志強其骨常使民無知無欲使夫知者不敢爲也爲無爲則無不治矣又曰聖人無恒心以百姓心爲心善者吾善之不善者吾亦善之信者吾信之不信者吾亦信之欲善信者吾因而善信之不善信者吾亦以善信教之聖人在天下惵惵爲天下惲其心聖人治天下常惵惵心同惲用心皆爲天下百姓皆注其耳目聖人皆孩之百姓頃注耳目以觀聽聖人聖人視百姓如嬰兒又曰以政治國以竒用兵以無事取天下以政教治國以竒計用兵皆不合道惟無事可以取天下吾何以知天下其然哉以此以此下文知之天下多忌諱而民弥貧國多忌諱人失作業故貧人多伎巧竒物滋起法令滋章盗賊多有法令益明竊盗爲姦盡成盗賊故聖人云我無爲而民自化我與事而民自冨我好静而民自正我無欲而民自朴老子曰其政悶悶其民淳淳其政察察其民缺缺文子曰水濁則魚險政苛則民亂墨子曰葉公子髙問政於仲尼曰善爲政者若何對曰善爲政者逺者近之而舊者親之墨子聞之曰葉公子髙未得其問也仲尼亦未得其對也孟子曰爲髙必因丘陵爲下必因川澤爲政必因先王之道孫卿子曰魯有子訟父者康子曰殺之孔子曰不教而誅之是虐殺不辜三軍之敗不可誅也獄犴不治不可刑也上陳教而先服之則百姓從風矣先教而後刑則民知罪矣夫一仞之墻民不能踰百仞之山童子升而遊焉陵遟乆矣能謂民弗踰乎訟者聞之乃請無訟莊子曰至德之丗山無蹊隧澤無舟梁烏鵲之巢可攀援而闚又曰聞在宥天下不聞治天下在之者恐天下之淫其性也宥之者恐天下之遷其德也天下不淫其性不遷其德豈有治天下者哉不淫不遷無爲守分性旣正矣德又定焉人皆治道何勞布政有治天下者哉昔堯之治天下也使天下欣欣焉人樂其性也是不恬也桀之治天下也使天下瘁瘁焉人苦其性是不愉也夫不恬不愉非德也非德而可長乆者天下無之也又曰黄帝將見大隗于具茨之山適遇牧馬童子問塗焉曰若知具茨之山乎曰然若知大隗之存乎曰然黄帝曰異哉小童非徒知具茨之山又知大隗之所存請問爲天下小童曰夫爲天下者亦奚以異乎牧馬哉亦去其害馬而已矣又曰黄帝立爲天子十九年令行天下聞廣成子在崆峒之上故徃見之曰吾欲取天地之精以佐五榖以養民人又欲官隂陽以遂羣生爲之柰何廣成子曰而所欲問者物之質也而所官者物之殘也自而治天下雲氣不待族而雨草木不待黄而落日月之光益以荒矣而侫人之心翦翦焉又奚足以語至道哉翦翦狹劣貌尸子曰范獻子泛於河大夫皆在君曰孰知欒氏之子大夫莫荅舟人清㳙捨檝荅曰君奚問欒氏之子若脩晉國之政内得大夫外不失百姓雖欒氏之子其若君何若不脩晉國之政内不得大夫而外失百姓則舟中之人皆欒氏子也君曰善申子曰明君治國而晦晦而行行而止故一言正而天下定一言倚而天下靡啇君書曰善治者使跖可信不能治者使伯夷可疑韓子曰或曰景公不知用勢師曠晏子不知除患夫獵者託車輿之安用六馬之足使王良左轡則身不勞而易及輕獸國者君之車勢者君之馬不乗君之車不因馬之利釋車而下走者也故曰景公不知用勢之主師曠晏子不知除患之臣也又曰桓公謂管仲曰官少而索者衆索求也寡人憂之管仲曰君無聽左右之請因能而授禄因功而與官人莫敢索君何憂焉又曰夫堯舜在上位雖有十桀紂不能亂者勢治也桀紂在上位雖有十堯而不能治者勢亂也又曰故善毛嬙西施之美無益吾靣用脂澤粉黛則倍其𥘉明法度必賞罰則國冨而治法度賞罰者國之脂澤粉黛也孔叢子曰夫子適齊晏子就其舘旣燕而私焉曰齊其危夫譬若載無轄之車以臨千仞之谿其不顚覆亦難兾也子吾心也以齊爲遊息之館當或可救子幸不吾隱也夫子曰死病不可爲醫夫政令者人君之銜轡所以制下也仐齊君失之巳乆也子雖欲挾其輈而扶其輪良弗及也抑猶可以没齊君及子身過此而徃齊其田氏矣又曰定公問曰周書所謂庸庸祇祇畏畏顯民何謂也孔子曰不失其道明之於民之謂也夫能用可用則政治矣敬可敬則尚賢矣畏可畏則省刑矣人君審此三者明以示民而國不興未之有也又曰哀公問書稱夔曰於子擊石拊石百獸率舞庶尹允諧何謂也孔子對曰此言善政之化乎物也古之帝王功成作樂其功善者樂和樂和則天地且猶應之况百獸乎䕫爲帝舜樂正實能以樂盡治理之情公曰然則政之大夲莫尚夔乎孔子曰夫樂所以歌其成功非政之本也衆官之長信旣咸熈然後樂乃和焉又曰孔子之衛衛將軍文子問曰吾聞魯公父氏不能聽獄信乎孔子荅曰不知其不能也夫公父氏之聽獄有罪者懼無罪者耻文子曰有罪者懼聽之察刑之當也無罪者耻耻何乎孔子曰齊之以禮則民耻矣刑以止刑則民懼矣文子曰今齊之以刑刑猶弗勝何禮之齊孔子曰以禮齊民譬之於御則轡也刑以齊民譬之於銜則鞭也執轡於此而動於彼御之良也無轡而用䇿則馬失道矣文子曰以御言之左手執轡右手運用不亦速乎若任轡無䇿馬何懼哉子曰吾聞古之善御者執轡如組兩驂如舞非䇿之助也是以先王盛於禮而薄於刑故民從命也廢禮而尚刑民弥暴矣又曰子思問於夫子曰亟問夫子之詔正俗化民之政莫善於禮樂也管子任法以治齊而天下稱仁焉是法與禮樂異用而同功也何必但禮樂哉子曰尭舜之化百丗不輟仁愛之風逺矣管仲之智足以定法材非管氏而專任法終必亂成矣又曰孟軻問子思曰尭舜文武之道可力而致乎子思曰彼人也我人也稱其言履其行夜思之晝行之滋滋焉汲汲焉如農之趍時商之趍利惡有不致者乎又曰穆公問子思曰吾國可興乎子思曰可公曰爲之柰何對曰苟君與大夫慕周公伯禽之治行其政化開公家之惠杜私門之利結恩百姓脩禮鄰國其興也勃矣又曰衛君問子思曰寡人之政何如荅曰無非君曰寡人不知其不肖亦望其如此也子思曰希㫖容媚則君親之中正弼非則君䟽之夫能使人冨貴貧賤者君也在朝之士孰肯舎其所以見親而取其所以見䟽乎是故競求射君之心而莫有非君之者此臣所謂無非也公曰然乎寡人之過也今知改矣荅曰君弗能焉口順而心不懌者臨事必痝君雖有命臣未敢受也又曰信陵君問曰古之善爲國至於無訟其道何由荅曰由乎政善也上下勤德而和德無不化俗無不和衆之所譽政之所是也衆之所毁政之所非也毁譽是非與政相應所以無訟也又曰子順相魏改嬖寵之官以事賢才奪其不任之禄以賜有功諸䘮職者不恱造謗言文咨以告且曰夫不善前政而有成孰與變之而起謗哉子順曰民之不可與慮始乆矣古之善爲政者其𥘉不能無謗子産相鄭三年而後謗止吾先君之相魯三月而後謗止今吾爲政日新雖不及聖賢庸知謗止獨無時乎文咨曰子産之謗嘗亦聞之未識先君之謗何也子順曰先君𥘉相魯魯人頌曰麛裘而芾投之無戾芾而麛裘投之無郵及三月政化旣行民又作頌曰衮衣章甫實獲我所章甫衮衣恵我無私文咨喜曰乃今知先生不異乎聖賢矣又曰新桓固謂子順曰賢者所在必興化致治今子相魏未聞異政而即自退其身者志不得乎何去之速也荅曰以無異政所以自退也且死病無良醫今秦有呑食天下之心以義事之故不獲安救亡不暇何化之興昔伊摰在夏吕望在啇而二國不治豈伊吕之不欲哉勢不可也又曰尹魯謂子魯子之讀先王之書將奚以爲荅曰爲治丗丗治則助之行道丗亂則獨治其身治之至也又曰建𥘉元年大旱天子憂之問羣臣政教得失子豊乃上䟽曰臣聞爲不善而災報得其應也爲善而災至遭時運之㑹耳非政所治也昔成湯遭旱因自責省畋散積减御損膳而大有年意者陛下未爲成湯之事焉天子納其言淮南子曰治國者若耨田去害苗而已今沐者墮髮而猶爲之不巳以其所去者少所利者多又曰聖主之治也猶造父之御也和輯乎轡衘之際而緩急乎唇吻之和正度乎胷臆之中而執節乎掌握之間内得於中心而外合於馬志是故能進能退履䋲而還曲中䂓取道致逺而氣力有餘誠得其術也是權勢者人主之車輿也大臣者人主之四馬也體離車輿之安而手失四馬之心能無危者古今未之聞也是故輿馬不調王梁不能以取道理君臣不和唐虞不能爲治執術以御之則管晏之知盡矣明分以視之則跖蹻之姦止矣又曰惠子爲惠王爲國法惠王梁惠王也惠子惠王師也已成而示之諸先生示爲國法先生皆善之奏之惠王惠王甚說之以示翟璜曰善惠王曰善可行乎翟璜曰不可惠王曰善而不可行何也翟璜對曰今夫舉大木者前呼邪許後亦應之此舉重勸力之歌也豈無鄭衛激楚之音哉然而不用者不若取是其冝也治國者禮不文辯故老子曰法令滋章盗賊多有此之謂也又曰田駢以道術說齊王齊王應曰寡人之治齊國也道術難以除患願聞國之政田駢對曰臣之言無政而可以爲政譬之若林木無林而可以爲林願王察其所謂而自取齊國之政焉已雖無除其患天地之間六合之内可陶冶而變化也齊國之政何足問哉又曰昔者五帝三王之蒞政施教必用叅五何謂叅五仰取象於天俯取度於地中取法於人乃立明堂之朝行明堂之令明堂布政之宫有十二月之政令以調隂陽之氣而和四時之節以辟疾病之蕃俯視地理以制度量察陵子澤肥墩髙下之冝立事生財巳除飢寒之患中之考乎德以制禮樂行仁義之道以治人倫而除暴亂之禍乃澄列金木水火土之性澄清故立父子之親而成家別清濁五音六律相生之數以立君臣之義而成國察四時季孟之序立長㓜之禮而成官此之謂叅制君臣之義父子之親夫妻之辯長㓜之序朋友之際此之謂五乃裂地而州之分職而治之築城而君之割宅而異之分財而衣食之立太學而教誨之夙興衣寐而勞力之此治之紀綱也然得其人則舉失其人則廢又曰天地之生物也有夲末其養物也有先後人之於治國也豈得無終始故仁義者治之本也今不知事脩其夲而務治其末是釋其根而灌其枝也且法之生也以輔仁義重法而弃義是貴其冠履而忘其頭足也故仁義者爲厚定者也不益其基而張其廣者毁不益其基而増其髙者覆趙政不増其德而累其髙故㓕智伯不行仁義而務廣地故亡國語曰不基其棟不能任重重莫若國棟莫若徳國主之有民也猶城之有基木之有根根深即夲固基美則上寕又曰禹以夏王桀以夏亡湯以殷王紂以殷亡非法度不存也紀綱不張而風俗壞也三代之法不亡而丗不治者無三代之智也六律具存而莫能聽者無師曠之耳也故法雖在必待聖而後治律雖具必待耳而後聽故國之所以存者非以有治也以有賢人也其所以亡者非以無法也以無聖人也又曰治國譬若張瑟大絃絙絙急也則小絃絶矣故急轡數䇿者非千里之御也清聲不過百里無聲之聲施於四海是故禄過其功者損名過其實者蔽情行合而名副之禍福不虚矣身醜夣不勝正行國有妖祥不勝善政太平御覽卷第六百二十四
