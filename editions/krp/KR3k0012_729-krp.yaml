front:
  text: 太平御覽卷第七百二十九
  hash: sha256:fa33fd68315afbb7940f88804a70de0f40aaba4c7faff148a70f0a8a6af8fd47
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_729-1a}
body:
  text: 方術部十相上左傳文上日王使內史叔服來㑹葬公孫敖聞其能相人也見其二子焉叔服日穀也食子難也收子穀文伯難惠叔也食子奉祭祀供餋者也收子葬子身也穀也豐下必有後於魯國豐下蓋方面也又日初楚子將以商臣爲太子訪諸令尹子上子上日君之齒未也而又多愛黜乃亂也楚國之舉恒在少者且是人也蜂目而犲聲忍人也不可立也弗聽又宜上日楚司馬子良生子越椒子文日必殺之是子也熊虎之狀而犲狼之聲不殺必滅若敖氏矣諺日狼子野心是乃狼也其可畜乎子良不可子文以爲大慼及將死聚其族日椒也知政乃速行矣無及於難且泣日鬼猶求食若敖氏之鬼不其餒而周書日師曠見太子晉日汝聲淸浮汝色赤火色不壽王子日後三年上賔於帝汝愼母言殃將及汝師曠歸末及三年告死者至史記日秦王見尉繚亢禮衣服食飲與繚同繚日秦王爲人蜂淮徐廣日蜂一作隆長目鷙喙鳥膺犲聲少恩而虎狼心居約易岀人下得志亦輕食人我布衣也然見我常身自下我誠使秦王得志於天下天下皆爲虜矣不可與乆遊乃亡去王覺固止之以爲秦國尉又日吕公日臣少好相人相人多矣無如季相願季自愛臣有息女願爲箕帚妾吕公女乃吕后也季漢高祖字也又日吕后與兩子居田中耨有一老父過請飲吕后因餔之老父相后日夫人天下貴人令相兩子見孝惠日夫人所以貴乃由此男相魯元亦皆貴又曰薄姬母媪之許負相薄姬當生天子薄姬少時與管夫人趙子皃相約曰先貴無相忘而管趙先幸漢王漢王坐河南城臯臺兩美人相與笑薄姬初約漢王問其故以實告漢王心憐薄姬召一幸生代王卽文帝也又曰姑布子卿見趙簡子簡子徧召其子使相之子卿曰無爲將軍者簡子日趙氏其滅乎子卿曰吾嘗見一子於路殆君之子也簡子召子母恤母恤至則子卿起日此眞將軍矣簡子曰其母賤翟婢也奚道貴哉子卿日天所授也雖賤必貴自是之後簡子盡召諸子與語母恤最賢簡子乃告諸子曰吾藏寶符於常山之上先得者賞諸子馳之恒山求無所得母恤還日巳得符矣簡子曰奏之母恤日從常山臨代代可取也簡子於是知母恤果賢乃廢太伯魯而以母恤爲太子又日平原君對趙王日澠池之㑹臣察武安君之爲人小頭銳上瞳子白黒分明眡瞻不轉小頭銳上斷敢行也瞳子白黒分明者見事明也眡瞻不轉者執志疆也眡讀如視古文通用可與持乆難與爭鋒廉頗爲人勇摯而愛士知難而忍恥與之野戰則恐不如守足以當之王從其計又曰蔡澤者燕人也遊學干諸侯大小甚衆而不遇因從唐舉相日聞子相李兊百日之內持國秉政有之乎日有之日若臣者如何唐舉熟視而笑曰先生曷鼻曷鼻如謂蝎蟲也巨肩巨肩謂頂仾而肩竪魋顔蹙齃謂蹙鼻於眉膝攣兩脚曲也吾聞聖人不相殆先生乎蔡澤知唐舉戲之乃曰富貴吾所自有吾所不知者夀也願聞之舉曰先生之壽從今巳往四十三歲矣蔡澤笑謝而去謂其御者日吾持粱齧肥躍馬疾驅懷黃金之印結紫綬於腰揖讓人主之前肉食富貴四十三歲亦足矣又曰英布少時遇相者日當黥而王後布被刑欣然果爲王又曰上使善相者相鄧通日當貧餓死文帝曰能富通者在我於是賜通蜀嚴銅山得自鑄錢景帝立有告通盜岀徼鑄錢下吏驗問頗有遂竟案盡没其家一簮不得着身遂寄死人家又曰條侯周亞夫爲河内太守時許負相之曰君三歲而侯侯八歲爲將相貴重於人臣無兩其後九歲而餓死負指其口有從理入口此餓死法也又曰韋賢爲吏至大鴻臚有工相之至丞相有男四人使相之至第二子玄成相工日此子貴當封俟竟爲亟相又日衛靑爲侯家人少時歸其父使牧牛母子皆奴畜之不以爲兄弟數青嘗從上至甘泉居室有一鉗徒相靑日貴人也官至封侯青笑日人之奴得無笞罵卽足矣安得封侯漢書日上立劉濞於沛爲吳王王郡五十三城巳拜受印高帝召濞相之日若狀有反相因拊其背日漢後五十年東南有亂者豈汝耶然天下同姓一家慎無反濞頓首日不敢又日李陵爲匈奴所圍上欲陵戰死召陵毋及婦使相者視之無死喪色後聞降上甚怒又日翟方進字子威汝南上蔡人家世微賤方進年十二三失父孤學給事大守府爲小吏號遟鈍不及事數爲掾史所詈辱方進自傷乃從汝南蔡父相問巳能所冝蔡父大奇其形皃謂日小吏有封侯骨當以經術進方進聞蔡父言心喜因病歸家辭其後母欲西至京師受經後母憐其幼隨之長安織履以給方進又日黃霸與善相者共載岀見一婦人相者言此婦人當貴不然相書不可用矣霸推問之乃其卿里巫家女也霸即娶為妻與之終身後爲丞相後漢書日世祖以朱祐爲護軍常見親幸舎止於中祐侍讌從容日長安亂公有日角之相此天命也又日龍澗善相劉宏造淵淵聞宏聲乃起迎日公當極位也宏日家貧負債何得貴乎淵日公相然也張濟就淵相淵日事劉宏可至三公濟事宏宏後爲解犢侯旣去南陽桓帝崩迎解犢侯爲天子是爲靈帝濟爲司空也又日明德馬皇后伏波將軍援女其母嘗使善相者看后日此女必將大貴遂爲帝王妃然而少子養他子得力乃當踰於所生耳又日章德竇皇后扶風平陵人大司徒融之曾孫也父勲尚東海恭王疆女泚陽公主后其長女也家旣廢壞數呼相工問息耗薛氏韓詩章句日耗惡也息耗猶言善惡也見后者皆言當大尊貴非臣妾容貌又日和熹鄧后傳日幼時嘗有相者蘇大見后大驚日此成湯之骨法也貴不可言家人竊喜而不敢宣又日漢法常因八月筭人漢儀注日八月初爲筭賦故日筭人遣中大夫與掖庭丞及相工於洛陽鄉中閱視良家童女十三以上二十巳下姿色端麗合法相者載還後宫擇視可否乃用登御所以慎娉納詳求淑哲東觀漢記日班超行詣相者相者日祭酒布衣諸生耳而當封侯萬里之外超問其狀相者指日生鷰頷虎頸飛而食肉此萬里侯相也又日李固字子堅漢中南鄭人也司徒郃之子固貌狀有奇表鼎角匿犀足履龜文少好學常步行隨師不遠千里魏志日管輅族兄李國居在斥丘輅往從之與二客會客去後輅謂國日此二人天廷及耳口之閒同有凶氣黑變俱起雙䰟無宅輅别傳日厚味腊毒天精幽夕坎爲棺楟兊爲喪車流魄于海骨歸于家少許時當並死後十數日二人飲酒醉夜共載車牛渴下道入漳河中皆即溺死矣又日鍾繇嘗與族父瑜俱至洛陽道遇相者日此童有貴相然當厄於水努力愼之行未十里度橋馬驚墮水幾死瑜以相者言中益貴繇是供給資費使得專學舉孝廉又日朱建平沛國人善相術頴川荀修錘繇相與親善修先亡子幼繇經記其門戸欲嫁其女與人書日吾與公達曾共使朱建平相建平日荀君雖少然當以後事付鍾君吾時嘲之日唯當嫁卿阿騖耳何意此子竟早殞殁戲言遂驗乎今欲嫁阿騖使得善處焉追思建平之妙雖唐舉許負何以復加耶又日文帝爲五官將坐上㑹客三十餘人文帝問朱建平巳年壽又命徧相衆賔建平日將軍當壽八十至四十時當小有厄願謹護之謂夏侯威日君四十九位爲州牧而當有厄厄若得過可年至七十致位公輔謂應璩日君六十二位爲常伯而當有厄先此一年獨見白狗而旁人不見也謂曹彪日君據藩國至五十七當厄於兵冝善防之後文帝黄初七年年四十病困左右日建平所言八十謂晝夜也吾其決矣頃之果崩夏侯威爲兖州刺史年四十九十二月上旬得疾念建平之言自分必死至三十日夜半卒應璩六十一爲侍中直省内歘見白狗問之衆人悉無見者於是數聚㑹并急遊田里飲宴自娱過期一年而卒曹彪封王五十七坐與王陵通謀賜死凡說此輩無不如言魏書曰文帝甄皇后漢光和五年十二月丁酉生毎寢寐家中髣髴見如人持玉衣覆其上常共恠之後相者劉良相后及諸姉指后曰此貴乃不可言蜀志曰先主穆皇后陳留人也兄吳壹少孤壹父素與劉焉有舊焉有異志聞善相者相后當大貴遂爲子瑁納后瑁死后寡居先主旣定益州而孫夫人還吳羣下勸先主娉后先主疑與瑁同族法正進曰論其親踈可與晉文之於子圉乎於是納后爲夫人又曰張裕曉相術每舉鏡視面自知刑死未嘗不撲之于地也又曰鄧芝字伯苗義陽新野人也漢末入蜀知益州從事張裕善相芝往從之𥙿謂曰君年過七十位至大將軍封侯吴志曰漢以孫策遠脩職貢遣使者劉琬加錫命琬語人曰吾觀孫氏兄弟才秀明遠然皆禄祚不終唯中弟孝廉形兒奇偉骨體不恒有大貴之表年又最壽爾其識之晉書裴秀傳曰文帝未定嗣而屬意舞陽侯攸武帝懼不得立問秀曰人有相否因以奇表示之秀後言於文帝曰中撫軍人望旣茂文表如此固非人臣之相也由是世子乃定又曰孝武李太后諱陵容本岀微賤始簡文帝爲㑹稽王有三子繼夭自道生廢黜獻王早世其後諸姬絶孕將十年帝乃令善相者召諸愛妾而示之皆云非其人又悉以諸婢媵示焉時后爲宫人在織坊中形長而色黑宮人皆謂之崑崙旣至相者驚云此其人也帝以大計召之侍寢后數夢兩龍枕膝日月入懷意以爲吉祥向儕類說之帝聞而異焉遂生孝武帝及㑹稽文孝王鄱陽長公主晉書日王覽祥之弟也初吕䖍有佩刀工相之以爲必登三公可服此刀䖍謂祥日苟非其人刀或爲害卿有公輔之量故以相與祥始固辭强之乃受祥臨薨以刀授覽日汝後必興足稱此刀覽後弈世多賢才興於江左矣又日羊祜少喪父遊汶水之濵父老謂之日子有好相年未滿六十必建大功於天下旣而去莫知所在又羊祜傳日祜幼時有喜相墓者言祜墓有帝王氣若鑿之則無後祜遂鑿之相者見曰猶岀折臂三公而祜竟墮馬折臂位至三公而無子又日豫章人雷煥妙達緯象張華乃要煥宿屏人日可共尋天文知將來吉凶因登樓仰觀煥曰僕察之乆矣唯牛斗之閒頗有異氣華曰是何祥也煥曰寶劒之精上徹於天耳華日君言得之吾少時有相者言吾年六十位登三事當得寶劒佩之斯言豈効歟又日檀梁憑之嘗有善相者晉陵韋叟見憑之大驚日卿有急兵之厄其候不過三四日耳冝深藏以避之不可輕出及桓玄將皇甫敷之至羅落橋也憑之與劉𥙿各領一隊而戰軍敗爲敷軍所害又曰魏詠之字長道任城人家素貧而躬耕爲事好學不倦生而兔缺有善相者謂之日卿當富貴後果如言又日王弥少遊俠京師隱者董仲道見而謂之曰君豺聲豹視好亂樂禍若天下騷擾不作士大夫矣晉中興書日陶侃少漁雷澤夢生八翼飛至天門而不入相者師珪日君位當上公爲八州都督太平御覽卷第七百二十九
