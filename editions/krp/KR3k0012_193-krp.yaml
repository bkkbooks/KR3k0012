front:
  text: 太平御覽卷第一百九十三
  hash: sha256:68855537df2a772c50fe877a117ed122fe6c502ad929e119ea80d0840f9ae9f9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_193-1a}
body:
  text: 居處部二十一城下郭壕櫓附丹陽記曰石頭城呉時悉土塢義熈始加塼累石頭因山以爲城因江以爲池形險固有竒勢故諸葛亮曰鍾山龍盤石城虎踞良有之矣又曰越城去宫八里案越絶書則東甌越王所立也又曰江寕縣北三十里有白馬城呉時爲烽火之所太康地記曰梁孝王築睢陽城十二里以鼔唱節杵而下和者稱睢陽因以爲縣又曰鴈門馬邑縣秦時建此城輒崩不成有馬周旋馳走反覆父老異之因以築城遂名馬邑云搜神記亦載也述征記曰思子城漢武帝延和二年衛太子遇江充之亂奔湖自縊壷關三老太廟令田千秋訴太子之冤築思子宫於湖其城存焉續述征記曰廣固城有大澗甚廣阻之爲固謂之廣固又曰白馬城魏黄𥘉中曹彪封白馬王治于此城又曰小城陽城在陽城西南半里許實中俗說囚堯城羊頭山記邯鄲城邯山名鄲盡也邯山至此而盡也又曰曲阜城城内有曲阜逶迤長八九里東方朔十洲記曰崑崙山有積金爲天城四面千里關中記曰長安城其形似北斗其土夲皆黒壤今城赤如火堅如金父老所傳鑿龍首山土以爲城也幽明録曰始興縣有臯天子廟因山﨑嶇十有餘里坑塹數重阡陌交通城内堂基碎瓦柱穿猶存東有臯天子冢臯天子未之聞也劉植京口記曰有小昇城鄧徳明南康記曰歸美山下有石城髙數丈有一門門外有二石夾左右髙數百丈逺望嵯峨雲闕騰空故老謂之神仙游焉江寧圖曰石頭城呉之金陵城爲石城郡國誌曰兖州兩觀城即仲尼爲魯司㓂誅少正卯之處又曰陜州魏城即芮伯萬母惡芮伯逐之出居于魏此也晉獻公滅之以賜畢萬山河之間土地迫隘故魏周著十畒之詩又曰雲中府快馬城有綾羅泉即塞上翁所居之邑有快馬亭塞上翁六國前人姓李也又曰雍州霸陵城在通化門東二十里秦襄王葬於其坂謂之霸上又曰汴之髙陵城即髙陽之墟也繁陽城漢云外黄縣有繁陽亭張耳爲外黄令有夏后祠神井能興雨雹又曰徐州薛城髙厚無比多出暴桀子弟蓋孟甞君餘風也又曰六壁府後魏太平眞君五年討胡於六壁即此城俗以城有六面因以爲名焉又有虢城虞城相傳云晉旣滅虞虢遷其人於此築城以居之又曰幽州無終縣西平城即李廣射石虎之處又曰復州竟陵城雲夢城城西大澤即古雲夢澤也却月城在河口魏將黄祖所守處又曰嬀州涿鹿城即黄帝擒蚩尤處黄帝泉今枯而不流即古之版泉也又曰涼州昌松縣有鸞鳥城魏改爲神鳥城張軌時有五色鳥集於其處築城又曰衛州有狗城蓋紂養狗之處也又曰洛州夫人城即趙武靈王夫人築也又曰衛州有酒城又曰涼州卧龍城又云鳥城亦名多翅城又曰登州文登縣有不夜城尚書城有石橋即秦始皇造欲觀日處文登山始皇召文士而登此山又曰齊有士郷城鄭玄云齊有士郷城越有君子軍又曰同州韓城即韓原也詩所謂韓侯受命是此韓地春秋時秦擒晉惠公處也又曰肅州福禄城因謝艾所築也又曰廉州宋太始年陳伯紹平夷至合浦見三青牛圍之不獲即其處置城俗號青牛城又曰箕子城石勒每破一州必簡别衣冠號爲君子城泊乎幽州擢荀綽裴憲等還襄國路經此後俗訛爲箕子城又曰平州孤竹城即孤竹國也漢靈帝時遼西守廉翻夢人云余孤竹君之子也今遼海漂吾棺明日見浮棺因葬之又曰雲中府齊柳㸦舒城有道人城𥘉築時有仙人遊其地遂名城焉又曰成都郡城秦惠王二十七年張儀築以象咸陽沃野千里號曰陸海有萬歳池即築城取土之處也又曰定州博陵縣唐城堯爲唐侯國於此又曰陽翟縣舊屬汝州有鷄鳴城又曰隨州博望城即張騫封侯之國也又曰許州雍城即黄帝臣雍父始作杵臼處又曰朔州太平城後魏穆帝治也太極殿琉璃臺瓦及鴟尾悉以琉璃爲之又曰鄭州博浪城即張良爲韓報仇擊秦王處又曰雍州杜城在安仙門南七里春秋范宣子云在周爲唐杜氏即是此也又曰益陽城魯肅築也云登之望見長沙城邑人馬形色宛然相去三百里故老云長沙益陽一時相望又曰廣州万人城即尉佗故城也又曰張掖郡竇融築千秋城万歳城又曰洛陽澠池縣有秦趙二王城號爲俱利城又曰定州博陵縣樂羊城魏文侯使樂羊取中山造又曰重泉城漢武爲李夫人所築又曰藍田有青維泥城亦曰柳城又曰賀州蕪城池隍中頗岀珠玉寳器即尉佗拒防之所也又曰曹州漆園城莊周爲吏處又曰曹州白鴈城即衛侯伐鄭至于鳴鴈是此也又曰洛州王城宫城西入苑故郟鄏城也周武王伐殷遷九鼎此地也夏至之影尺有五寸謂之土中焉泉亭即春秋時泉臯伊洛之戎同伐京師又曰坊州鄜城即髙奴城俗謂髙樓城又曰汴有浚城鄘詩云孑孑干旌在浚之城又曰爰有寒泉在浚之下水冬夏常冷因曰寒泉又曰滑州鹿鳴城城内有鳴鹿臺又曰陳官城周二十里東晉所築號曰六門城宣陽門楣上作虎刻木相對又施雲楣藻井言武武門上作重樓號曰西辰觀呉𥘉築在府宫南號太𥘉宫正殿曰神龍殿又有臨海赤烏殿孫皓起顯明宫引水激之飾以珠玉有彎﨑臨硎之觀門及樓皆擊鼔持夜以齊以鼔多驚眠改爲鐵磬過秦論曰秦踐華以爲城因河以爲池越絶書曰石城者呉王闔閭所置美人離城也又曰樓門外馬寜溪止復城者故越王餘復君所治也又曰樓門外鴻城者故越王城也去縣百五十里呉鷄籠山外鷄陂故呉王所畜鷄使李保之飬去縣二十里闔閭姑胥臺外有九曲路闔閭造以遊姑胥之臺太湖中窺百姓去縣三十里又曰呉大城周四十七里二百一十歩陸門二有樓水門八南面十四里四十二歩西面七里百一十二歩北面八里二百六十歩東面一十里七十九歩闔閭所造也呉郭周六十八里六十歩呉小城周一十二里其下廣二丈七尺髙四丈門三皆有樓東宫周一里二百歩路西宫在長秋門周一里二百二十六歩秦始皇帝二十一年守宫者照鷰失火燒之呉越春秋曰鯀築城以衛君造郭以居人此城郭之始也又曰范蠡觀天文法於紫宫築作小城周千一百二十二歩一貟三方西北立飛翼之樓以象天門東南服漏石竇以象地户陵門四逹以象八風外郭築城而缺西北示服事呉也不敢壅塞内以取呉故缺西北而呉不知也又曰伍子胥爲呉相土甞水象天法地造築大城周廻四十七里陸門八以象天之八風水門八以象地之八牎築小城十里陸門三東面者欲以絶越明矣立閶門者以象天門通閶闔風立地門者以象地户也闔閭欲西破㢰強楚楚在西北故立閶門以通天氣也因復名破楚門水經注云葉東界有故城犨縣東至瀙水逹泚陽縣界南北聮聮數百里號爲方城一謂之長城云酈縣有故城一面未詳里數號爲長城即此城之西隅其間相去六百里北南雖無基築皆連山相接而漢水流其南故屈完荅齊桓公云楚方城以爲城漢水以爲池郡國志曰萊縣有長城曰方城指此城也呉地記曰袁山松城晉書云左將軍袁山松陳郡人時爲呉郡太守隆安五年築此城在滬瀆邊江城之以禦孫恩圍山松於此城䧟害山松城今爲波潮所衝以半毀江中山松城東夾江又有二城相對闔閭所築以備越處鄱陽記曰仙人城在縣東南其城皆峭壁危石直上千仞自古呼爲仙人城每天空無雲秋日清澈其上宫殿倉廪歷歷可見趙曄呉越春秋曰堯聽四嶽之言用鯀修水鯀曰帝之遭天災厥黎及康乃築城造郭以爲國固淮南子曰崑崙山上有層城九重列女傳曰齊人祀梁殖襲莒戰而死其妻無所歸乃就夫尸於城下而哭之七日城崩妻遂投淄水而死郭說文曰郭廓也廓落在城也禮記月令曰孟秋之月修宫室𥙷城郭又禮記曰正月無置城郭妨農也國語曰火見而清風戒寒而修城郭月令曰孟夏坯城郭漢書曰馬援所過爲郡縣治城郭謝承後漢書曰汝南廖扶畢志衡門死葬北郭號曰北郭先生風俗通曰郭郛者亦大也莊子曰孔子謂顔回曰回來家貧居卑胡不仕乎顔回對曰不願仕回有郭外之田五十畒足以給饘粥郭内之田十畒足以爲絲麻鼔琴足以自娯學夫子之道足以自樂回故不仕矣魏略曰秦國石爲城郭管子曰内謂之城外謂之郭焦貢易林曰金城鐵郭上下同力宼不敢賊王肅表曰夫城之有郭猶裏之有表骨之有皮表裏各異則保障不完皮骨分離則一體不具壕釋名曰城下謂之壕壕翶也言都邑内所翶翔祖駕處也禮曰今大道旣隱天下爲家各親其親各子其子貨力爲巳城郭溝池以爲固謀用是作兵由是起漢書神農之教曰有石城十仞湯池百歩帶甲百萬而無粟不能守櫓釋名曰櫓露也露上無覆屋也孫子兵法曰攻城之法脩櫓枌榅其器械三月而後成陸機洛陽城周公所制東西十里南北十三里城上百歩有一樓櫓外有溝渠太平御覽卷第一百九十三
