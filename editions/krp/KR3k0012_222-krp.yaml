front:
  text: 太平御覽卷第二百二十二
  hash: sha256:84d8447c6a773fecf14bf7e5ebff74fca18a240e307085a6ca3a090f3822d6df
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_222-1a}
body:
  text: 職官部二十中書舎人起居郎起居舎人中書舎人六典曰中書舎人掌侍奉進奏叅議表章凢詔旨制勑及璽書冊命皆按典故起章草進畫旣下則署而行之其禁有四一曰漏洩二曰稽緩三曰違失四曰忘誤所以重王命也制勑旣行有誤則奏而正之通典曰自永淳以來天下文章道盛臺閣髦彦無不以文章逹故中書舎人爲文士之極任朝廷之盛選諸官莫比焉晉中興書曰劉起遷中書舎人時臺省初建内外多事出内書命以忠愼稱加以治身清苦衣不重帛每上所賜皆固辭曰凢陋小臣横竊賞賜無德而禄殃咎必至上益嘉焉又曰徐邈字仙民東莞姑幕人也少好學問尤善經傳時烈宗始覽典籍招延禮學之士謝安舉選𥙷中書舎人在西省撰正五經音訓學者宗之每預頋問輙有獻替多所𥙷益烈宗甚愛之齊書曰永明元年熒惑入紫微時中書通事舎人四人各住一省謂之四户旣㧾重權勢傾天下㑹玄象失度太史奏冝修福禳之太尉王儉謂帝曰天文乖忤此由四户乃具舎人王文明等名奏之又曰明帝踐阼引傳昭爲中書舎人時居此職者皆權傾天下昭獨廉静無所干預器服率略身安麄糲常挿燭板床明帝聞之賜􅃮合燭槃勑曰卿有古人之風故賜卿古人之物又曰茹法亮乆爲中書通事舎人後出爲大司農中書勢利之職法亮戀之垂涕而去梁書曰裴子野以中書侍郎鴻臚常兼中書通事舎人别勑知詔誥南史曰頋恊爲舎人同官者皆潤屋恊在省十六載器服食飲不改於常有門生始來事恊知其廉㓗不敢厚餉止送錢二千恊發怒杖二十因此事者絶於饋遺北齊書曰荀士遜世祖時爲中書舎人狀皃甚醜以文辭見用曽有事湏奏值世祖在後庭因左右傳通者不得士遜姓名乃云醜舎人世祖曰必士遜也看封題果是内人莫不忻笑又曰顔之推天保末從顯祖至天池以爲中書舎人令中書郎叚孝信將勑書出示之推之推營外飲酒孝信還以狀言顯祖仍曰且停由是遂寢北史曰魏収兼中書舎人與温子昇邢子才齊譽世號三才隋書曰虞世基拜内史舎人煬帝即位頋遇彌隆秘書監河東柳頋言博學有才罕所推謝至是與世基相見歎曰海内當共推此一人非吾儕所及也唐書曰貞觀中中書舎人髙季輔上封章曰時巳平矣功巳成矣然而刑典未措者何哉良由謀猷之臣不弘簡易之政臺閣之吏昧於經逺之道執憲者以深刻爲奉公當官者以侵下爲益國未有坦平恕之懷副聖明之旨伏願隨方訓誥使各楊其職人敦朴素俗革澆浮家識孝慈人知廉耻杜其利欲之心載以清淳之化自然家冨國肥禍亂何由而作太宗善之特賜鍾乳一劑曰卿進藥石之言故以藥石報之也又曰顔師古遷中書舎人專掌機宻于時軍國多務凢有制誥皆成其手師古逹於政理冊奏之工時無及者又曰武后天授元年壽春郡王成器兄弟五人𥘉出閤同日受冊有司撰儀注忘載冊文及百竂在列方知闕禮宰臣相頋失色中書舎人王劇立召小史五人各令執筆口授分冩同時湏臾俱畢詞理典贍時人歎伏又曰景龍四年初定内難唯中書舎人蘇頲在太極殿後文詔塡委動以萬計手操口對無毫氂差誤主書韓禮談子陽轉書詔草属謂頲曰乞公稍遟禮等書不及恐手腕將廢又曰楊炎爲中書舎人與常衮並掌綸誥衮長於制書炎善爲德音開元已來言詔制之美者號常楊焉又曰王徽曽祖擇從擇從兄易從天后朝登進士第從弟朋從言從睿宗朝並以進士擢第昆仲四人開元中三至鳯閣舎人故時人號鳯閣王家又曰齊澣開元中遷中書舎人論駮書詔潤色王言皆以古義謨誥爲凖的侍中宋璟中書侍郎蘇頲並重之又曰薛元超道衡孫也爲中書舎人中書省有一盤石初道衡爲内史侍郎嘗踞而草制元超每見此石未嘗不泫然流涕又曰賈曽授中書舎人曽以父名忠固辭乃拜諌議大夫知制誥至開元𥘉復拜中書舎人又固辭議者以爲中書是曹司名又與曽父音同字别於禮無嫌乃就職與蘇晉同掌制誥皆以詞學見知時人稱爲蘇賈又曰許景先轉中書舎人中書令張說常稱曰許舎人之文雖無峻峯激流嶃絶之勢然屬詞豐美得中和之氣實一時之秀也又曰郄髙卿爲中書舎人處事不回爲宰相元載所忌魚朝恩署牙將李琮爲兩街功徳使琮暴撗於銀臺門毀辱京兆尹崔昭髙卿立詣元載抗論以爲國耻請速論奏載不從髙卿遂以疾辭以前中書舎人居東洛凢十年自號伊川田父清名髙節稱於天下又曰建中三年詔中書舎人分署尚書六曹復舊制也又曰髙郢掌誥累年家無制草或謂曰人皆留制集公焚之何也曰王言不可存私家時人重其愼宻又穆宗詔曰中書舎人故事分押六司佐宰臣判按廢革日乆頓復稍難冝漸令條舉有湏愼重者便令叅議如關機宻者即且如舊又曰路隨敬宗𥘉登極拜中書舎人翰林學士仍錫金紫有以金帛謝除制者必叱而却之曰吾以公事接私財耶終無所納又曰大和四年勑前行郎中知制誥者約滿一周年即與正授從諌議大夫知者亦冝准此又曰封敖爲學士拜中書舎人敖構思敏速語近而理勝不務竒澁武宗深重之嘗草賜陣傷邊將詔警句云傷居爾體痛在朕躬帝覽而善之賜之宫錦又曰崔郾轉中書舎人入思政殿謝恩郾奏曰陛下用臣爲侍講卒歳有餘未嘗問臣經義今蒙轉改實慙尸素有愧厚恩帝曰俟朕機務稍閑即當請益髙釴曰陛下意雖樂善旣未延接儒生天下之人寜知重道帝深引咎錫之錦綵又曰中書舎人鄭居中少有時名楊歷清貫晚年尤薄名利以疾辭官恣遊名山一日搦管爲詩纔書五字曰雲山遊巳徧紙猶在手筆忽墮地而終又曰晉𥘉中書置舎人通事各一人東晉合爲一職晉代入直閤内宣詔命而侍郎之任輕矣梁秩四百石品第八梁用人殊重簡以才能不限資地多以它官兼領其後除通事直曰中書舎人五代史後唐書曰明宗時劉賛爲中書舎人與學士竇夢徴同年登第隣居友善夢徴早卒賛與同年楊疑式緦麻爲位而哭其家無嫡長與視䘮䘏其孀稚士人稱之五代史晉史曰陳乂長興中自舎人衘命冊公主於大原公主即帝后也帝深待之但訝其髙岸人或有獻可於乂冝陳一謳頌以稱帝之美可邀其異待耳乂曰人生貧富咸有定分未有持天子命違禮以求利旣損國綱且虧士行乂今生所不爲也聞者無不嘉之又曰天福五年九月詔曰六典云中書舎人掌侍奉進奏叅議表章凢詔㫖制勑璽書䇿命皆按故事起草進畫旣下則署而行之其禁有四一曰漏洩二曰稽緩三曰違失四曰忘誤所以重王命也古昔巳來典實斯在爰從近代别創新名今運屬興王事從師古俾仍舊貫以輝前規其翰林學士院公事冝並歸中書舎人五代史漢史曰唐李昭以尚書郎出爲蘇州刺史朞歳以中書舎人召還不拜謂宰輔曰省郎拜舎人以知制誥爲次序便由刺史玷綸闈非敢聞命乃以兵部郎中知制誥翌歳拜舎人受之五代史周史曰王延爲中書舎人權知貢舉有崔頎者恊之子也授偃師簿薄其卑屑棄去數年應進士延將入貢院見舊相吏部尚書盧文紀素與恊不睦謂延曰舎人以謹重聞于時所以老夫去冬與諸相首以長者聞奏然此一途取事者頗多面目說者云越人善泅生子方晬乳母浮之水上或駭然止之乳母曰其父善泅子必無溺今若以名下取士徴泅之類也舎人當求實才以副公望延退而嗤曰盧公之言爲崔頎也縱與其父不恱致意何至此耶來春以頎登甲科其仁而徇公皆此類也百官志曰魏初中書置通事一人主呈奏晉𥘉中書又置舎人一人至東晉合通事及舎人二職謂之通事舎人猶掌呈奏陶氏職官要録曰中書舎人舊視給事中梁選簿云梁天監用人務簡英才不限資次又曰隋内史舎人八貟專掌詔誥焬帝减四人後改爲内史舎人荀勗集曰晉武帝時門下啓令史伊羡趙咸爲中書舎人對掌文法勗奏以爲不可起居郎六典曰起居郎掌記天子之法度以修記事之史凢記事之制以事繫日以日繫月以月繫時以時繫年必書其朔日甲乙以紀曆數典禮文物以考制度遷拜旌賞以勸善誅伐黜免以懲惡季冬則授之于國史焉唐書曰大和九年十二月左右省起居郎賫筆硯及紙於螭頭下記言記事又曰鄭㓪開成中爲起居郎𥘉太和末風俗稍奢文宗恭勤節儉兾革其風宰臣等言曰陛下躬儉節用風俗巳移長𥚑大𬒮漸以减損若更令戚屬絶其侈靡不慮下不從教帝曰此事亦難户曉但去其泰甚自以儉德化之朕聞前時内庫唯二錦𫀆飾以金鳥一𫀆玄宗幸温湯時御之一與貴妃當時貴重如此今奢靡豈復貴之邪今冨家往往皆有左街副使張元昌便用金唾壺昨因李訓巳誅之矣時朗執筆螭頭下宰臣退上謂朗曰適所議論卿記録未吾試觀之朗對曰臣執筆所記便名爲史伏准故事帝王不可取觀昔太宗欲覽國史諌議大夫朱子奢云史官所𫐠不隱善惡或主非上智飾非護失見之則致怨所以義不可觀又禇遂良曰今之起居郎古之左右史也記人君言行善惡必書庶幾不爲非法不聞帝王躬自觀史帝曰適來所記無可否臧見亦何爽乃宣謂宰臣曰鄭朗引故事不欲朕見起居注夫人君之言善惡必書朕恐有平常閑話不關理體垂諸將來竊以爲恥異日臨朝庶幾稍改何妨一見以誡醜言朗遂進之又曰開成二年十二月閤門對左右史裴素等上自開成𥘉復故事每入閤左右史執筆立干螭頭之下君臣論奏得以備書故開成政事最詳於代起居舎人六典曰起居舎人掌修記言之史録天子之制詔德音如記事之制以紀時政之損益季冬則授之於國史唐書曰邢文偉滁州全椒人時右史官缺髙宗謂侍臣曰邢文偉事我兒能减膳切諌此正直人也遂擢拜右史又曰李讓夷字逹心爲諌議大夫開成元年以本官兼知起居舎人事時起居舎人李襃有痼疾請罷官宰臣李石奏闕官上曰禇遂良爲諌議大夫嘗兼此官卿可盡言今諌議大夫姓名石遂奏李讓夷馮定孫簡俶帝曰讓夷可也李固言欲用崔球張次宗鄭覃曰崔球遊宗閔之門赤墀下秉筆記注爲千古法不可用朋黨如斐中孺李讓夷臣不敢有纎芥異論其爲人主大臣知重如此又曰魏謩轉起居舎人紫宸中謝帝謂之曰以卿論事忠切有文貞之風故不循月限授卿此官又謂之曰卿家有何舊書詔對曰比多失墜唯簮笏見在上令進來鄭覃曰在人不在笏上曰鄭覃不㑹我意此即甘棠之義非在笏而巳又曰魏謩文宗時爲起居舎人紫宸入閤遣中使取謩起居注欲視之謩執奏曰自古置史官書事以明鑒誡陛下但爲善事勿畏臣不書如陛下所行錯忤臣縱不書天下人書之臣以陛下爲文皇帝陛下比臣如禇遂良帝又曰我嘗取觀之謩曰由史官不守職分臣豈敢䧟陛下爲非法陛下一覽之後自此書事湏有廻避如此善惡不直非史也遺後代何以取信乃止又曰張次宗有文學稽古厲行開成中爲起居舎人文宗復故事每入閤左右史執筆立于螭頭之下宰相奏事得以備録宰臣旣退上召左右史更質證所奏是非故開成政事詳於史氏太平御覽卷第二百二十二
