front:
  text: 太平御覽卷第八百九十九
  hash: sha256:26b59d02bfd1548a5548249a4d0b496ed051e88f41a3d3e2c243bc14828644f9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_899-1a}
body:
  text: 獸部十一牛中春秋潜潭巴曰宫有牛鳴政教衰諸侯相并牛兵之符也楊方五經鈎沉曰東夷之人以牛骨占事呈吉示凶無往不中牛非含智之物骨有若此之效穆天子傳曰泰山百獸之所聚也爰有赤豹封牛又曰天子大饗正侯諸王七萃之士于丕衍􅜑韓之人獻朋牛三百又曰天子飲干文山乃獻良馬駟牥牛二此牛能行沙中如馳又曰天子北征舎于珠澤釣于流水因獻食馬三百牛羊二千皇甫謐帝王丗紀曰黄帝於東海流波山得竒獸狀如蒼牛身無角能走出入水中則風雨光如日月其音如雷名曰䕫黄帝殺之以其皮爲鼓聲聞五百里丗本曰鯀作服牛鮌黃帝臣也又云少昊時人始駕牛孔子家語曰子路拯溺者其人拜之以牛子路受之孔子曰魯人必拯溺矣焦贑易林曰教牛逐兎任非其人費日無功相牛經曰牛經自寗戚傳百里奚漢丗河西薛公得其書以相牛千百不失至魏丗髙堂生傳晉髙祖宣皇帝其後王愷秘其書又曰牛歧胡夀歧牽兩腋眼下分爲三去角近行駃眼欲得大眼中有白脉貫童子最快頸骨長且大駃壁堂欲得闊壁堂病股間也倚欲得如絆馬聚而正也膺廷欲得廣膺廷胷前天關欲得成天関背接骨雋骨欲得垂眷也央欲得下蘭株欲得大尾株豐岳欲得大膝株骨垂星欲得有怒肉垂星蹄上也肉覆蹄間名怒肉力柱欲得大而成當車骨也懸蹄欲得如八字陽鹽欲得廣陽塩者夾尾株前兩膁上常有似鳴者有黄也洞胡無壽珠淵無壽遊毛當目下也上池有亂毛妨主凶上池角中央也身欲得如卷大臁踈肋難飴龍頭突目好跳豪筋欲得成就豪筋脚後横筋也毛欲得短密若長踈不耐寒氣尾不用至地尾毛少骨多者有力膝上肉欲得竪角欲得細鼻如鏡鼻難牽口方易飴漦府方易飴莊子曰聲氏之牛夜亡而遇夔止而問焉曰我尚有四足動而不善子一足而起踊何以然夔曰以吾一足王於子矣莊子曰夫氂牛其大如垂天之雲此能爲大矣而不能執䑕又曰魯聞顔闔得道之人使幤致焉顔闔守廬麤布之衣而自飯牛魯君之使者問此顔闔家耶闔曰然使者致幤闔對曰恐聽謬而遺使者罪不若審之使者還反復求之則不得也又曰庖丁爲文惠君解牛曰臣之刀十九年所解千牛而刀刄若新彼節者有間而刀刃無厚以無厚入有間而恢恢乎其投刃必有餘地是以十九年刀刃如新管子曰屠牛坦朝解九牛而刀可以剃髮則刃遊於其間也又曰或聘莊子莊子應其使曰子見夫犧牛乎衣以文繍食以芻菽及其牽入於太廟雖欲爲狐犢其可得乎孟子曰臣聞胡齕云王坐於堂上有牽牛而過堂下者王見之曰牛何之對曰將以釁鍾王不忍見其觳觫欲以羊易之是見牛而不見羊也晏子春秋曰今公之牛老於蘭罕不勝服也車蠧於瓦石不服乗也列子曰宋人有好行義者三丗不懈家無故而黒牛生白犢以問孔子孔子曰此吉祥也以享上帝居一年其父無故而盲牛又復生白犢其父令其子問孔子孔子曰吉祥也復以祭居一年中其子又盲其後楚攻宋圍其城民易子而食之折骸而炊之丁壯皆乗城戰死者太半此人父子有疾皆免也吕氏春秋曰昔葛天氏之樂三人操牛尾投足以歌八闋注事具樂部又曰使烏獲疾引牛尾尾絶力單而牛不行逆也使五尺竪子引其捲而恣所之順也又曰亂國之妖有牛馬言韓子曰商太宰嘗使庶子行市還云市門多車太宰召市吏問曰市何多牛馬耶吏恠太宰是神知又曰詹何坐弟子侍有牛鳴於門外弟子曰是黒牛也而白在其蹄詹何曰然黒牛也而白在其頭使人視之果黑牛而以布褁其角尸子曰夫龍門魚之難太行牛之難以德報怨行之難也淮南子曰牛跋蹄而戴角馬𬒳髦而全足者天也絡馬之口穿牛之鼻者人也又曰剥牛皮鞹以爲皷正三軍之衆然爲牛計者不若服軛也又曰城上視牛如羊如豕所居髙也又曰戴角者無上齒無角者膏而兊前豕馬之屬前小有角者脂而兊後牛羊後小又曰季春之月乃合騾牛騰馬游牝于牧又曰取牛膽塗熱釡即鳴矣又曰牛膽塗目莫知其誰注曰取八歲黃牛膽桂二寸着膽中百日以成因使巧工刻象人丈夫着目下爲女子着頭上爲小児着頥下盛以五綵囊先宿齋無令人知也尹文子曰語曰好牛不可察也好則物之通稱牛則物之定形以通稱隨定形不可不察也重白而憎黒嗜甘而逆苦能定名則萬事不亂也卞子曰郭林宗謂仇季智曰子嘗有過否季智曰吾嘗飯牛牛不食搏牛一下說苑曰秦穆公使賈人載鹽徴諸賈人百里奚以五羖羊之皮將車之秦秦穆公觀鹽見百里奚牛肥也對曰臣飲食以時使之不以暴有險先後之以身是以肥也穆公知其君子也乃以爲上卿張温自表曰昔百里奚賢秦繆公欲干之繆公好牛奚因賃官以養牛蹄上乗肉三寸公使禽息行牛息入言之公不信怒息復言之公又怒吏曰再怒其主罪當刖使守門公出禽息跪而請之曰夫養牛者願君勿忘也公乃問百里曰臣之長非養牛者也乃養民也公視牛察之則賢人也遂與同車而出謝禽息息曰所以不死者君未知客也今巳知之矣乃觸門而死抱扑子曰南方水牛無冬夏常卧雪中又曰智禽銜蘆以逆網水牛結陣而却虎矣說苑曰齊桓公岀獵逐鹿入山谷中見一老父問曰此何谷也曰愚公之谷曰何也曰畜牸牛子大賣之買駒少年曰牛不能生馬遂持駒去旁人聞以臣爲愚因以爲谷也管子曰此臣之過也使堯在上臯陶爲大理者安有取人駒乎論衡曰十圍之牛爲牧竪所驅又曰牡馬見雌牛不相合者異類也風俗通曰賣牛勿握角令不售按恐觸人人不取也又曰秦昭王使李冰爲蜀守開成都兩江漑田江神歲取童女二人爲婦冰自以其女與神爲㛰徑至神祠勸神酒抷但澹淡不耗冰厲聲責之因忽不見良乆有兩蒼牛闘於岸旁有頃冰還流汗謂官屬曰吾鬪大極不當相助也南向要中正白者我綬也主簿㓨殺北面者江神遂死又曰丁壯小犢跳梁弄角飲水數石生芻十束當風露夜至死不曲愽物志曰介葛盧聞牛鳴知生三犢盡爲犧牲嵆叔夜以爲無此皆先儒妄說又曰蜀牛不施繩右前曰排左側曰促而牛解人語又曰九眞有神牛生谿上里時時共闘即海沸而昏或出鬪岸上人家牛皆怖人或遮捕即霹靂號曰神牛洞林記曰義興叔保得傷寒垂死令郭璞占之不吉令求白牛厭之求不得璞爲致之即曰白牛從西來逢叔保大驚遂病差語林曰宋岱爲青州刺史禁淫祀著無鬼論有一書生葛巾修刺詣岱曰君絶我軰血食二十餘年君有青牛髯奴所以未得相困耳奴巳叛牛巳死今日得相制矣言絶而失明日而岱死郭子曰蒲奮字武林髙平人畏風在晉武帝坐北䆫有琉璃扇實密似踈奮有難色帝乃笑之奮曰臣猶呉牛見月而喘述異記曰牛之不角者呼犝牛金樓子曰東海中有牛剥其皮貫之潮水至則毛起潮去則毛弭諸葛亮集曰木牛者方膓曲頭一脚四足頭入領中着於腹載多而行少則否冝可大用不可小使杜預奏事曰臣前在南聞魏興西北山有野牛野羊牛之大者二千斤羊之大者千數百斤袁喬江賦注曰呉時有錢約釣於牛渚獲一金鎻引之則金牛汎然而出約懼而捨因以爲名束晳延遊賦曰乗露車以偃蹇賀蘭單之疲牛連縋索以爲鞅結斷綆而爲鞦臧彦駃牛賦曰殊相允備名不虚假偉質魁梧骨竒形雅竦若驚鹿駔若奔馬太平御覽卷第八百九十九
