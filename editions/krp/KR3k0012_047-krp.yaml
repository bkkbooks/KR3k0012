  text: 太平御覽卷第四十七
  hash: sha256:e30d90a0b0cb1104cad21aa3a89ec514551f1bef17b69bf1e921195aecb67996
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_047-1a}
body:
  text: 地部十二㑹稽東越諸山稷山麻山雞豕山獨女山龜山秦望山􅌘山塗山重山羅山鶴山陳音山銅牛山土城山亭山洛思山烏帶山龍頭山壇讌山白石山小白山縉雲山桃都山椒山覆釡山石簣山括蒼山天姥山消山白鶴山仙石石新婦山靈石山臨海山崛門山石公山石城山金勝山長山畢嶺銅山崑山騎石山江郎山石室山天階山太湖山孤山泉山梨嶺武夷山闌干山雞巖烏嶺山金泉山演仙山稷山越絶書曰稷山者勾踐齋戒臺也麻山越絶書曰麻山者勾踐欲伐吴種麻以爲弓弦雞豕山越絶書曰雞豕山者越將伐吴養雞豕於此山以食死士獨女山吴越春秋曰獨女山者諸寡婦女淫佚犯過皆輸此山上越王將伐呉其士有憂思者令遊山上以喜其意龜山呉越春秋曰怪山者琅邪東武海中山也一夕自來百姓怪之故曰怪山形似龜體故謂龜山孔曄㑹稽記曰城西門外百餘歩有怪山越時起靈臺於山上又作三層樓以望雲㑹稽志曰龜山之下有東武里即琅邪東武縣山一夕移於此東武人因徙此故里不動秦望山水經注曰㑹稽秦望山在州城正南爲衆峯之傑渉境便見史記云秦始皇登之以望南海自平地取山頂七里懸嶝孤危峭路險絶記云攀蘿捫葛然後能昇山上無甚髙木當由地逈多風所致山南有嶕峴中有大城越王無餘之舊都也故呉越春秋云勾踐語范蠡曰先君無餘國在南山之陽社稷宗廟在湖之南又有會稽之山古防山也亦謂之茅山也又曰揀山越絶云揀猶鎭也蓋周禮所謂楊州之鎭山矣山形四方多金玉下多玞石山海經曰夕水出焉南流注于湖呉越春秋稱山覆盎釡之中有金簡玉字之書黃帝之遺䜟也山下有禹廟廟有聖姑像禮樂緯云禹治水天賜神女聖姑即其像也山上有禹冢昔大禹即位十年東巡狩崩于會稽因而葬之言鳥爲之耘春銜抜草根秋啄其穢是以縣官禁民不得妄害此鳥犯則有刑無赦山東有陘去廟七里深不見厎謂之禹井云東游者多探其穴也秦始皇登稽山刻石紀功尚存山側孫暢之述書云承相李斯所篆也又有石山上有金簡玉字之書言夏禹發之得百川之理也又有射的山逺望山的狀若射侯故謂射的射的之西有石室之爲射堂年登否常占射的以爲貴賤之准的明則米賤的闇則米貴故喭云射的白斛米百射的玄斛米千􅌘山水經注曰剡縣􅌘山山下有亭亭帶山臨江松嶺森蔚沙渚平淨浦陽江之東北經始寧縣嶀山之嶠嶠壁立臨江欹路峻狹不得併行行者牽木稍進不敢俯視嶠西有孤峯特上飛禽罕至嘗有採藥者㳂山見涌蹊㝷上於山頂樹下有十二方石地甚方㓗還復更㝷遂迷前路言諸仙之所集讌故以壇讌名山嶠北有嶀浦浦口有廟廟甚靈驗行人及樵伐者皆先敬焉若相盗竊必爲蛇虎所傷北則嶀山與􅌘山接二山雖曰異縣而峯嶺相連其間傾澗懹烟泉溪引霧吹陸風馨觸岫延賞是以王元琳謂之神明境事備謝康樂山居記宋書曰張稷子􅌘字四山稷𥘉爲剡令至􅌘亭生之因名􅌘字四山塗山郡囯志曰塗山禹㑹萬囯之所有石舡長一丈云禹所乗者宋元嘉中有人於舡側掘得鐵履一雙又㑹稽記云東海聖姑從海中乗舟張石㠶至二物見在廟中又有周時樂器名錞于銅爲之形似鍾有頸映水用芒莖刜則鳴宋武修廟得古珪梁武初修之又得青玉印重山孔曄㑹稽記曰重山大夫種墓語訛成重漢江夏太守宋輔於山南立斈教授今白樓亭處是也羅山孔曄㑹稽記曰諸曁縣北界有羅山越時西施鄭旦所居所在有方石是西施矖紗處今名紵羅山王羲之墓在山足有石碑孫興公爲文王子敬所書也鶴山孔靈符㑹稽記曰射的山西南水中有鶴山此鶴常爲仙人取箭曽刮壤㝷索遂成此山漢太尉鄭弘少貧賤以採薪爲業嘗於山中得一遺箭羽鏃異常心甚怪之頃之有一人覔箭弘以還之又曰射的山半嶺有石室仙人射堂東髙巖臨潭有石的岫形甚圎明視之如鏡矣陳音山孔曄㑹稽記曰陳音山昔有善射者陳音越王使簡士習射於郊外死因葬焉冢今開冢壁悉畫作騎射之象因以名山孔曄㑹稽記曰銅牛山舊傳常有一黃牛出山巖食草採伐人始見猶謂是人所養或有共驅蹙之垂及輙失然後知爲神異土城山孔曄㑹稽記曰勾踐索美女以獻呉王得諸曁羅山賣薪女西施鄭旦先教習於土城山山邊有石云是西施澣紗石亭山孔曄稽㑹記曰晉司空何元忌臨郡起亭山椒極望巖阜基址猶存因號亭山洛思山孔曄㑹稽記曰永興縣東五十里有洛思山漢太尉朱偉爲光禄大夫時遭母哀欲卜墓此山將洛下冢師歸登山相地冢師去郷旣逺歸思常深忽極目千里北望京洛遂縈咽而死葬山頂故以爲名烏帶山孔靈符㑹稽記曰諸曁縣西北有烏帶山其山上多紫石世人莫知之居士謝敷少時經始諸山往往遷易功費千計生業將盡後遊此境夜夢山神語之曰當以五十萬相助覺甚怪之旦見主人床下有異色甚明澈試取瑩拭乃紫石因問所從來云岀此山遂往掘果得其利不訾龍頭山孔靈符㑹稽記曰上虞縣有龍頭山上有蘭峯峯頂盤石廣丈餘葛洪學坐其上壇讌山孔曄㑹稽記曰始寧縣有壇讌山相傳云仙靈所讌集處山頂有十二方石石悉如坐席許大皆作行列白石山孔曄㑹稽記曰剡縣西七十里有白石山上有瀑布水懸下三十丈巖際有蜜房採蜜者以葛藤連結然後得至小白山名山略記曰小白山在㑹稽陽城趙廣信以魏末入小白山受李氏服氣法又師左元放受守中之道後錬九華丹丹成服之太一遣迎今在東華宫爲眞人縉雲山郡國志曰括州即處州也括蒼縣縉雲山黃帝遊仙之處有孤石特起髙二百丈峯數十或如羊角或似蓮花謂之三天子都有龍鬚草云群臣攀龍髯所墜者桃都山郡國志曰台州桃都山上有大桃樹上有天雞日初岀桃樹天雞即鳴雞下聞之而鳴樹下有兩鬼持葦索取不祥之鬼食之椒山郡國志曰越州椒山呉王遣木客入山求大木不得工人憂思作木客吟一旦神木自生合抱長二十丈伐造姑蘇臺覆釡山郡國志曰台州覆釡山云夏帝登此得龍符處有巨跡云是夸父逐日之所踐石簣山賀循記曰石簣山其形似簣在宛委山上呉越春秋云九山東南曰天柱山號宛委承以文玉覆以盤石其書金簡青玉爲字編以白銀禹乃東廵登衡山殺四馬以祭之見赤繡文衣男子自稱玄夷倉水使者謂禹曰欲得我簡書知導水之方者齋於黃帝之岳禹乃齋登石簣山果得其文乃知四瀆之眼百川之理鑿龍門通伊闕遂周行天下使伯益記之名爲山海經開山圖曰禹開宛委山得赤珪如日碧珪如月長一尺二寸也括蒼山五岳圖序曰括蒼山東岳之佐命登眞隱訣注及吴録云括蒼山登之俯視雷雨也天姥山郡國志曰天姥山與括蒼山相連石壁上有刋字科斗形髙不可識春月樵者聞簫鼓笳吹之聲䀨耳元嘉中遣名畫寫狀於圎扇即此山也消山郡國志曰消山下有夫人祠山北湖隂又有消御史廟孤石聳出似婦人艶粧而坐白鶴山郡國志曰白鶴山者昔有白鶴飛入㑹稽雷門鼓中擊之聲震洛陽臨海記曰郡西有白鶴山山上有池泉水懸溜逺望如倒掛白鶴因名掛鶴泉又郡國志云漢末有徐公於白鶴山成道控鶴騰虚而去又有鶴掛嶺猶有翶翔之勢仙石山臨海記曰仙石山有館土人謂之黃公客堂兩邊有石歩廊觸石雲起崇朝必兩有四竿䈥竹風吹自垂空微拂石皆浄即王方平遊處也石新婦山臨海記曰新婦山亦名似人山土石悉紺色列石參差似人形逺望如鳥之俯仰宋文帝遣畫工模冩山狀時一國盛圖於白團扇焉靈石山臨海記曰靈石山者山有寺當孫恩作叛毀材木以爲舩舸山石即於空中自然而落賊每有所傷故曰靈山石臨海山臨海記曰臨海山山有二水合成溪曰臨海一水是始豊溪一水是東女溪至州北兩溪相合即名臨海溪山因溪名崛門山郡國志曰崛門山在海中腹有孔上達于頂有聲即大風不風即水涌岀必見大兵吴將平孔内有聲逺聞千里石公山東陽記曰石公山孤石望如石人坐其傍又有石如人狀似新婦着花履焉或名新婦巖石城山呉録曰永康有石城山海内南經云三天子都在閩西海北郭璞注云在新安歙縣東又引張氏土地記云東陽永康縣南四里有石城山上有小石城云黃帝曽遊此山即三天子都也金勝山郡國志曰金勝山昔有人於此拾得金勝因以名之山有趙炳祠炳善方術廟至今無蚊䖝異苑曰孫權時永康人入山還得大龜烹之不爛即此山也長山郡國志曰長山相連逕三百里一名金華山即皇初平初起遇道士教以仙方處吴録地理志曰常山仙人採藥處謂之長山山南有春草巖折竹巖巖間不生蔓草盡岀龍鬚云赤松羽化處又有似龍鬚而麄大者名爲虎鬚不中爲席但以其蓑爲燈炷又抱朴子云左元放言金華山可以合神丹免五兵洪水之患又按輿地志云金華山連亘三百餘里畢嶺輿地志曰東陽畢嶺之下有錢嶺往往人於嶺下獲大錢今俗謂之錢嶺銅山東陽記曰銅山下有泉水色鮮白號爲銅泉又按異苑曰吴時有軍士五百人破洞得一銅釡將欲破之水從中暴發遂成湖以溺人皆死於此崑山東陽記曰崑山頂上有一孤石髙可三十丈其形如甑人謂之石甑騎石山郡國志曰騎石山如人騎馬而無頭昔有神巫以印指馬馬頭即落則此山也江郎山郡國志曰江郎山有三峯峯上各有一巨石髙數十丈歳漸長昔有江家在山下居兄弟三人神化於此故有三石峯在焉又有湛滿者亦居山下其子仕晉遭永嘉之亂不得歸滿乃使祝宗言於三石之靈能致其子靡愛斯牲旬日中湛子岀洛水邊見三少年使閇眼入車欄中等閑去如疾風俄頃間從空墮怳然不知所以良乆乃覺是家園中也石室山郡國志曰石室山一名石橋山一名空石山晉中朝時有王質者嘗入山伐木至石室有童子數四彈琴而歌質因放斧柯而聽之童子以一物與質狀如棗梅含之不復飢遂復小停亦謂俄頃童子語曰汝來巳乆何不速去質應聲而起柯巳爛盡天階山建安記曰天階山在將樂縣南二十里山下有寳華洞即赤松子採藥之所洞中有石鷰石蝙蝠石室石柱并石臼石井俗云其井南通沙縣溪復有乳泉自上而滴人以服之登山頂者若昇碧霄故有天階之號大湖山建安記曰大湖山在浦城縣西南一百里一名聖湖山湖在山頂昔有採藥者止此湖畔見滿湖芙蓉渉水採之乃石也亦有禽鳥逺望如飛近視則石孤山建安記曰孤山在環璋之間其地坦平悉是溝塍阡陌以以此山挺然孤立因以名之梁江淹爲吴興令云此地有碧水丹山珎木靈草昔爲淹之勝境泉山泉山記曰山頂有泉分爲兩沠一入處州一入建溪即漢書朱買臣所謂東越王居保泉山一人守險千人不得上即此山也梨嶺泉山記曰梨嶺因梨以名之記云南嶺下道東有鍾離古亭跡存焉武夷山蕭子開建安記曰武夷山髙五百仞巖石悉紅紫二色望之若朝霞有石壁峭抜數百仞於煙嵐之中其石間有木碓礱簸箕籮箸什器等物靡不有之顧野王謂之地仙之宅半巖有懸棺數千傳云昔有神人武夷君居此故因名之又坤元録云建陽縣上百餘里有仙人葬山亦神仙所居之地郡國志云漢武好祀天下岳瀆此山預祭故曰漢祀山䦨干山建安記曰䦨干山南與武夷山相對半巖有石室可容六千人巖口有木欄干飛閣棧道逺望石室中隱隱有床帳按几之屬巖石間悉生古栢懸棺仙葬多類武夷雞巖建安記曰雞巖隔澗西與武夷山相對半巖有雞窠四枚石峭上不可登履時有群雞數百飛翔雄者類鷓鴣魏王泰坤元録云武夷山瀾東一巖上有鷄栖即此是也烏嶺山烏嶺山記曰烏嶺峻極不通牛馬以其烏居山連接因以爲名魏王泰坤元録云邵武北有庸嶺一名烏嶺北隰中有大虵爲將樂令李誕女所殺者金泉山建安記曰金泉山南枕溪有細泉岀沙彼人以夏中水小披沙掏之得金山之西有金泉祠演仙山建安記曰演仙山古老相傳云演氏錬丹於此山竈之餘基近猶存焉此山東面亦略通人逕山中岀橘其味甘人有食者即可携之岀山即迷道又有演仙水出此山當郡城北爲大河莫知其深淺兼下有暗竇入城流出於劒潭居人資之常流不絶太平御覽卷第四十七
