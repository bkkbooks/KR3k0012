front:
  text: 太平御覽卷第七百八十九四夷部十
  hash: sha256:9d942514b60ceb1e6759655def47cd63f729de6b5eae063cf2cce8bd322b143b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_789-1a}
body:
  text: 南蠻五南詔蠻驃國暴蠻等部落勿鄧大賧南瀘量水川弥諾國弥臣國崑崙國小婆羅門國夜半國女王國獨錦國弄㨂國清蛉蠻長禈國施蠻磨此蠻撲子蠻㝷傅蠻祼形蠻苴望子蠻望蠻黒齒諸蠻繡面蠻穿鼻蠻長鬃㨂鋒范蠻堂魔蠻南詔蠻唐書曰南詔蠻本烏蠻之別種也姓蒙氏蠻謂王爲詔自言哀牢之後代居蒙舎州爲渠帥在漢永昌故郡東姚州之西其先渠帥有六自號六詔兵力相埓各有君長無統帥蜀時爲諸葛亮所征皆臣服之又曰南詔蠻國𥘉時有蒙舎尨生迦獨迦獨生細奴邏髙宗時來朝細奴邏生邏盛武后時來朝其妻方娠邏盛次姚州間妻生子曰吾且有子死於唐地足矣子名盛邏皮邏盛至京師賜錦𫀆金帶師國開元𥘉邏盛死盛邏皮立盛邏皮死子皮邏閤立又曰南詔蠻皮邏閤嗣立二十六年詔授特進封越國公賜名曰歸義其後破洱阿蠻洱音而志切以功策授雲南王歸義漸強盛餘五詔浸弱先是劒南節度王昱受歸義賂奏六詔合爲一詔歸義旣併五詔服群蠻破吐蕃之衆兵日縣令嶲州䧟爲所虜閤羅鳯以回有儒學更名曰蠻利甚愛重之命教鳯迦異及異牟㝷立以回爲清平官事皆咨之回嘗言於牟㝷曰自昔南詔嘗𣢾附中國中國尚禮義以惠飬爲務無所求取今弃蕃歸唐無逺戍之勞利莫大焉牟尋善其言謀内附者十餘年矣會劒南西川節度使韋臯招撫諸蠻苴烏星虜望等歸化聞牟尋之意因諸蠻寓書於牟尋且招懷之牟尋乃斬吐蕃使去其所立帝號以歸我仍請復南詔舊名𥘉吐蕃因爭北庭與迴鶻大戰死傷頗衆乃徴兵於牟尋湏萬人牟尋欲因以襲之及示寡弱謂吐蕃曰蠻軍素少僅可發三千人吐蕃五千人戍吐蕃乃將數萬踵其後晝夜兼行乗其無備大破吐蕃於神川䥫橋遣使告捷帝乃命兼御史中丞袁滋持節冊南詔王仍賜金印曰貞元冊南詔印又曰貞元十年南詔王遣使蒙湊羅棟來獻鐸槊浪人劒驃國唐書曰驃國在永昌故郡南二千餘里其國境東隣真臘西接東天竺南盡海北通南詔些樂城界東北距陽苴咩城六千八百里徃來通聘迦羅婆提等二十國役属者道林王等九城食境土者羅君潜等二百九十八部落其王姓困没長名摩羅惹其國相名摩訶思郍其王近適則輿以金繩床逺適則乗象嬪妃甚衆常數百人其羅城構以塼甃周一百六十里壕岸亦構塼相傳本是舎利佛城城内有居人數萬家佛寺百餘區其堂宇皆錯以金銀塗以丹彩地以紫鑛覆以錦罽其俗好生惡殺其土冝菽粟稻無麻麥其理無刑名桎梏之具犯罪者以竹五十本束之復犯者撻其背數止五輕者止三殺人者戮之男女十歳則落髪止寺舎依桑門至二十不悟佛理乃復髪爲居人其衣服悉以白㲲爲朝霞繞腰而巳不衣繒帛云出於𧖟爲其傷生故也君臣父子長㓜有序華言謂之驃自謂突羅成闍婆人謂之徒里拙古未嘗通中國貞元中其王聞南詔異牟㝷歸附心慕之八年乃遣其弟悉利移因南詔重譯來朝又獻其國樂凡十曲與樂工三十五人俱樂曲皆演釋氏經論之詞意以悉利移爲試大僕卿南夷志曰驃國在永昌南七十五日程閤羅鳯所通也其國用銀錢以青塼爲圎城周行一日程百姓盡在城内有十二所堂當國王所居門前有大象露坐髙百餘尺白如霜雪俗尚廉耻人壯和善少言重佛法城中並無宰殺又多推歩天文若有訴訟者王即令焚香向大象思惟是非便各引退或有災疫王亦焚香對象悔過自責男子多衣白疊婦人當頂爲髙髻以金銀真珠爲飾餘着青婆裙又披羅叚行必持扇貴家婦女皆三人五人在傍持扇與波斯及婆羅門接界西去舎利城六十日程疑此是東天竺也暴蠻等部落南夷志曰竹子嶺東有暴蠻部落嶺西有盧鹿蠻部落又有生蠻磨弥殿部落此等部落皆東㸑烏蠻也男則髻女則散髪見人無禮節拜跪三譯乃與華通大部落則有大鬼主百家二百家小部落亦有小鬼主一切信使鬼巫用相服制土多牛馬無布帛男女悉𬒳牛羊皮勿鄧南夷志曰勿鄧部落大鬼主夢衝地方千里功部一姓白蠻五姓烏蠻烏蠻婦人以白黒繒爲衣白蠻婦人以白繒爲衣下不過膝大賧南夷志曰大賧周迴百餘里悉是野蠻無君長地有瘴毒河賧人至中瘴者十死八九閤羅鳯嘗遣使築城於彼管制野蠻不逾歳死者過半歳遂罷弃其土肥沃種瓠長丈餘冬瓜亦然皆三尺圍又多薏苡無農桑収此充粮三靣皆是雪山其髙造天南瀘南夷志曰瀘水蜀諸葛亮伐南蠻五月渡瀘處大如臂川中氣候常熱雖方冬行過者皆袒衣流汗量水川南夷志曰量水川在滇池南兩日行漢舊黎州地川中有天地其水東南流岀一石竇中水流甚廣石竇甚狹蠻云此竇忽室空則百姓憂溺弥諾國弥臣國南夷志曰弥諾國弥臣國皆邊海國也呼其君長爲壽弥諾面赤而長弥臣靣黒而短性恭謹毎與人語向前一歩一拜國無城郭弥諾王所居屋之中有一大柱雕刻爲文飾以金銀弥臣王以木柵爲居海際水中以石師子爲屋四足仍以板蓋悉用香木王岀即乗象百姓皆樓居披婆羅籠男少女多俗好音樂樓兩頭置皷飲酒即擊皷男女携手樓中踏舞為樂在永昌城西南六十日程崑崙國南夷志曰崑崙國王北去西洱河八十一程出象及青木香旃檀㯽榔琉璃水精犀牙等物蠻宼嘗攻之爲其决水淹浸進退無計餓死萬餘不死者去其右腕後放迴小婆羅門國南夷志曰小婆羅門國在永昌北七十四日程俗不食牛肉預知身後事出貝齒白蠟越諾共大耳國來徃蠻夷善之信通其國夜半國南夷志曰夜半國在蒼望城東北隔麗水城川原其婦人唯與鬼通能知吉凶禍福本土君長崇信之蠻夷徃徃以金購之要知善惡女王國南夷志曰女王國去驩州十月程徃徃與驩州人交昜蠻嘗伐之中其藥箭百不存獨錦蠻南夷志曰獨錦蠻者烏蠻之苗裔也在秦臧川去安寜兩日程其族多姓李異牟尋母即獨錦蠻女也有季負藍貞元中爲大將軍在勃弄㨂川爲城使等弄㨂蠻南夷志曰弄㨂蠻則白蠻苗裔也本姚州弄㨂縣部落其地舊爲褒州嘗有首領誤殺司户懼罪率衆北奔在摩磨些江側貞元中異牟㝷破吐蕃城邑獲弄㨂城遷於永昌之地清蛉蠻南夷志曰清蛉蠻亦白蠻苗裔也本清蛉縣部落天寳中嶲州𥘉䧟有首領尹氏父子相率南奔河賧閣羅鳯厚待之貞元中南詔清平官尹輔酋皆其人也衣服言語與蒙舎略同長禈蠻南夷志曰長禈蠻本鳥蠻之後部落在劒川属浪詔其俗皆衣長禈曵地更無衣服唯披牛羊皮施蠻南夷志曰施蠻本烏蠻種族也䥫橋西北大施賧小施賧劒㝷賧皆其所居之地男以繒布爲縵襠袴婦人從頂横分其髪當額及頂後各爲一髻男女終身跣足披牛羊皮磨些蠻南夷志曰磨些蠻鳥種也䥫橋上下及大婆小婆三婆採覽昆池等川皆其所居之地土多牛羊一家即有羊群終身不洗手靣男女皆披羊皮俗好飲酒歌舞撲子蠻南夷志曰撲子蠻勇悍趫捷以青婆羅叚爲通身袴善用泊箕竹弓深林間射飛䑕發無不中部落首領謂之酋在上無食器以芭蕉葉藉之㝷傳蠻南夷志曰尋傳蠻俗無絲綿布帛披婆羅籠跣足可以踐履捺棘持弓挾矢射豪猪生食其肉取其兩牙雙挿頂傍爲飾又條其皮以擊腰毎戰鬪即以籠子籠頭如兠鍪狀祼形蠻南夷志曰祼形蠻在㝷傳城西三百里爲巢穴謂之野蠻閤羅鳯旣定㝷傳而野蠻散居山谷集戰即召之亦無君長女多男少無田農衣服唯有木皮以蔽形或十妻五妻共養一丈夫盡日持弓下褐欄有外來侵害者則射之苴望子蠻南夷志曰苴望子蠻在蘭蒼江以西其人勇捷善於馬上用槍所乗馬不用鞍跣足衣短甲纔蔽胸腹而巳望蠻南夷志曰望蠻外喻部落在永昌北其人長大負排持槊前無強敵又能用木弓短箭傅毒藥中人立斃婦人跣足以青布爲衣聯珂具巴齒真珠斜絡其身有夫竪分髪爲兩髻無夫者頂後爲一髻垂之地冝沙牛角長四尺以來婦人嗜乳酪黒齒金齒銀齒繡脚南夷志曰黒齒金齒銀齒繡脚四蠻並在永昌關南雜種類也黒齒以􅃮􅃮其齒金齒以金鏤片裏其齒以銀齒以銀有事見人則以此爲飾寢食則去之皆當頂上爲一髻以青布爲通身袴又斜披青布條繡脚蠻則於踝上腓下周匝刻爲文彩衣以緋布繡靣蠻南夷志曰繡靣蠻生一月則以針刺靣青黛塗之如繡狀穿鼻蠻南夷志曰穿鼻蠻在柘東以徑尺金環穿鼻中隔下垂過頥君長即以絲繩繫使人牽起乃行其次者花頭金釘兩枚從鼻兩邊穿令透下長鬃㨂鋒南夷志曰長鬃㨂鋒二蠻部落鬃黒而長當額前爲一長鬃髻下過臍每行即以物撑起君長使兩女在前各持一物撑之今爲南詔所惣茫蠻南夷志曰茫蠻部落並開南雜種也茫是其君之号亦呼茫詔從永昌城南先過唐封次鳯藍苴次茫天連次茫吐薅又有火賧茫昌盛恐他茫鮓茫施皆其類也樓居無城郭或􅃮齒衣青布衫藤篾纏腰紅繒布緾髻出其餘垂後爲飾婦人披五色娑羅籠孔雀巢人家樹上象如水牛俗飬以耕田棠魔蠻南夷志曰棠魔蠻去安南林西原十二程俗飬牛馬長與漢人愽易大中八年經略使苛暴人將塩一斗愽牛或馬一疋因兹隔絶不來太平御覽卷第七百八十九
