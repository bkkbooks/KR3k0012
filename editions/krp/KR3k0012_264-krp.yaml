  text: 太平御覽卷第二百六十四職官部六十二
  hash: sha256:1ad1347f874cd15d79cc5f6889a99cf5ebe46943f7811b9bdb72d644ccd5311a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_264-1a}
body:
  text: 功曹叅軍司倉叅軍司户叅軍司兵叅軍司法叅軍五官掾功曹叅軍韋昭辯釋名曰曹群也功曹吏所群聚户曹民所群聚也其他皆然漢書曰蕭何爲主吏孟康曰主吏功曹也又曰朱愽爲琅邪郡守召見功曹閇閣數責與筆札使自記受取一錢巳上無得有所匿欺謾半言斷頭矣功曹惶怖具自書姦贓大小不敢隱愽知其對以實乃令就席受勑自改而巳投刀使削所記遣出就職東觀漢記曰趙勤南陽人太守桓虞召爲功曹委以郡事嘗有重客過欲託一士令爲曹吏虞曰我有賢功曹趙勤當與議之潜於内中聽虞乃問勤勤對曰恐未合衆客曰止止勿復道又曰楊正爲京兆功曹光武崩京兆尹出西域賈胡共起帷帳設祭尹車過帳胡牽車令拜尹疑止車正在前導曰禮天子不食支庶况夷狄乎勑壞祭遂去又曰鮑永爲郡功曹時有稱侍中止傳舎者太守趙興欲出謁永以不冝岀當車㧞佩刀興因還後數日詔書下捕之果矯稱使者由是知名又曰郭丹爲郡功曹薦隂亶程胡魯歆自代太守杜詩曰古者卿士讓位今功曹稽古經可爲至德編署黄堂以爲後法又曰吴良字大儀齊國臨淄人𥘉爲郡吏歳旦與掾史入賀門下掾王望舉觴上壽謟稱太守功德良於下席勃然進曰倿邪之人欺謟無狀願勿受其觴太守歛容而止讌罷轉良爲功曹耻以言受進終不肯謁又曰汝南太守歐陽歙召郅惲爲功曹汝南舊俗十月饗㑹百里内皆賫牛酒到府飲讌時臨饗禮畢歙教曰西部督郵繇延天資忠貞不嚴而治今與衆儒共論延功顯之于朝惲於下座愀然前曰案延資性貪邪外方内貟朋黨搆姦罔上害民明府以惡爲善以直從曲此旣無君又復無臣惲敢奉觥歙色慙不知所爲門下掾鄭敬進曰君明臣直功曹言切明府德也歙意少解曰實歙罪也又曰永平𥘉新野功曹鄧寅以外戚小侯毎預朝㑹而容姿趍歩有出於衆上目之頋左右曰朕之儀皃豈若此人特賜輿馬衣服虞延以寅無實行未甞加禮上乃詔令自稱南陽功曹詣闕寅在職不服父喪帝聞乃歎曰知人則哲推帝難之信哉斯言寅聞而慙退後漢書曰虞延去官還郷里太守富宗聞延名召署功曹宗性奢靡車服器物多不中節延諌曰昔晏嬰輔齊鹿裘不完季文子相魯妾不衣帛以約失之者鮮矣宗不恱延即辭退居有頃宗果以侈縱𬒳誅臨當伏刑攬涕而歎曰恨不用功曹虞延之諌又曰周章𥘉仕郡爲功曹時大將軍竇憲免封冠軍侯就國章從太守行春到冠軍太守猶欲謁之章進諌曰今日公行春豈可越儀私交且憲椒房之親勢傾王室而退就藩國禍福難量明府剖符大臣千里重任舉止進退其可輕乎太守不聽遂便升車章前抜佩刀絶馬鞅於是乃止及憲𬒳誅公卿以下多以交關得罪太守幸免以此重章又曰徐穉豫章人時陳蕃爲太守以禮請署功曹穉不免之旣謁而退蕃在郡不接賔客唯稺來特設一榻去則懸之又曰韓稜𥘉爲郡功曹太守葛興中風疾不能聽政稜隂代興視事出入二年令無違者又曰廉范永平𥘉隴西太守鄧融備禮謁范爲功曹謁請㑹融爲州所舉案舉其罪案驗之范知事譴難解欲以權相濟乃託病求去融不逹其意大恨之范於是東至洛陽變名姓求代廷尉獄卒居無幾融果徴下獄范遂得衛侍左右盡心勤勞融怪其貌類范而殊不意乃謂曰卿何似我故功曹耶范訶之曰君困戹瞀亂耶鄭玄注禮記曰瞀目不明之皃語遂絶融繫出困病范隨而養視及死竟不言身自將車送䘮致南陽葬畢乃去續漢書曰汝南太守宗資以事委任功曹范滂時人謡曰汝南太守范孟愽南陽宗資主晝諾又曰李恂字叔英安定臨涇人太守李鴻請署功曹未及到而州辟爲從事㑹鴻卒恂不應州命而送鴻䘮還郷里旣葬留起冢墳治䘮三年又曰李充爲太守魯平請署功曹不就平怒乃投充以捐溝中因謫署縣都亭長不得已起親職役謝承後漢書曰范滂字孟愽汝南人太守宗資署功曹滂外甥西平李頌公族子孫頑嚚穢濁爲郷曲所棄常侍唐衡属其事資勑曹召署文學史滂不肯聽資怒召功曹書佐朱零問不召頌意狀零以告滂滂曰荅教當言頌則滂之姉子豈不樂其升進但頌洿穢小人不冝染汙朝廷不敢以位私人是以不召零具荅教如此零入聞資使五伯亂捶困杖言辭不懾仰疾言曰范滂清議猶利刃截腐肉願爲明府所笞殺不爲滂所廢絶今日之死當受忠名爲滂所發永成惡人滂正直謇諤皆此類也又曰許劭仕郡爲功曹抗忠舉義進善黜惡正機執衡允齊風俗所稱如龍之升所貶如墮干淵清論風行所吹草偃爲衆所服又曰李壽聦明智逹有俊才太守黄讜髙其名德召署功曹毎進見常薦逹郡中善人有異行者讜輙序用壽雖見優禮愈隆壽意益下其所致逹未嘗伐其功美又曰羊定字丗德爲郡功曹病困𬒳不覆軀衣不周身郡將賜大布𬒳及𥜗袴皆不受執志而終又曰鍾皓字季明潁川長社人同郡陳寔年不及皓引與爲友皓爲郡功曹㑹辟司徒府臨辭太守問誰可代卿者皓曰明府必欲得其人西門亭長陳寔聞之曰鍾君似不察人不知何猶識我又曰彭脩㑹稽人仕郡爲功曹時西部都尉宰晁行太守事以徴過収吴縣獄吏將殺之主簿鍾離意争諌甚切晁怒使収縳意脩排閤直入拜於庭曰明府發雷霆於主簿請聞其過晁曰受殺三日𥘉不奉行廢命不忠豈非過耶脩因拜曰昔任座面折文侯朱雲攀毀欄檻自非賢君焉得忠臣遂原意罰貸獄吏袁崧後漢書曰岑晊字公孝髙才絶人五經六藝無不洞貫太守成瑨請爲功曹時謡曰南陽太守岑公孝弘農成瑨但坐嘯張璠漢記曰陳寵爲廣漢太守風聲大行徴爲大司農帝問何以爲治寵曰臣任功曹王渙渙由是知名魏志曰臧洪廣陵郡人也爲張超功曹超兄邈謂超曰聞弟爲郡守政教威恩不由巳出動任臧洪洪者何人超曰洪才略智數優超超甚愛之海内竒士也邈即引見洪與語大異之又曰臧洪字子原太守張超請洪爲功曹卓圖危社稷洪說超曰明府歷丗受恩兄弟並據大郡今王室將危賊臣未梟此誠天下義烈報恩効命之秋也今郡境尚全吏民殷冨若動桴鼓可得二萬以此誅除國賊爲天下倡先義之大者也超然其言又曰袁渙字曜卿當時諸公子多越法度而渙清静舉動必以禮郡命爲功曹郡中姦吏皆去又曰陳矯字季弼廣陵人太守陳登請爲功曹使矯詣許謂曰許下論議待君不足者相爲觀察還以見誨矯還曰聞逺近之論頗言明府驕而自矜使過泰山泰山太守東郡薛悌異之結爲親友戯矯曰以郡吏而交二千石隣國君從陪臣遊不亦可乎又曰杜畿字伯侯京兆杜陵人年二十爲郡功曹鄭縣内繫囚數百畿親臨獄裁其輕重盡决遣之郡中竒其年少而有大志魏略曰京兆尹張時河東人也與杜畿有舊署爲功曹常言此家䟽誕不中功曹也畿竊云不中功曹中河東太守蜀志曰龐統字士元郡命爲功曹性好人倫勤於長養毎所稱𫐠多過其才時人怪而問之統荅曰當今天下大亂雅道陵遟善人少而惡人多方欲興風俗長道業不美其談即聲名不足慕企不足慕企而爲善者少矣今㧞十失五猶得其半而可以崇邁丗敎使有志者自勵不亦可乎吴志曰聶友字文悌豫章人也有脣吻少爲縣吏虞飜徙交州縣令使友送之飜與語而竒焉爲書與豫章太守謝斐令以爲功曹郡時見有功曹斐見之問曰縣吏聶友可堪何職對曰此人縣間小吏耳猶可堪曹吏佐斐曰論者以爲冝作功曹君其避之乃用爲功曹又曰虞飜字仲翔爲孫䇿功曹好馳騁遊獵飜諌曰明府用烏集之衆驅散附之士皆得其死力雖漢髙帝不及也至於輕出微行從官不暇嚴吏卒常苦之夫君人者不重則不威故白龍魚服因於豫且子余切白虵自放劉季害之願少留意䇿荅曰君言是也然時有所思端坐悒悒有諀諶草創之計是以行耳又曰處士謝譚爲呉粲功曹以疾不詣粲教曰夫應龍以屈伸爲神鳯皇以嘉鳴爲貴何必隱於天外潜鱗於重淵者哉又曰潘濬字承明武威人也爲人聦察對問有機理王粲見而貴異之由是知名爲郡功曹吴録曰孫劭字長緒北海人爲孔融功曹融稱曰廊廟才也後爲吴丞相王隱晉書曰劉毅字仲雄僑居陽平太守杜恕逼迫舉毅爲功曹月餘日沙汰郡吏百餘人三魏稱焉爲之語曰但聞劉功曹不聞杜府君又曰丗號庾兖有異行元康之末頴川太守復以功曹命之兖服造事之衣杖棰荷斧不俟駕行曰請受下夫之役府君飾車而迎逡廵辭焉形雖益恭而神有不可動之色府君知其不屈乃難曰非常士也吾無以臣之矣乃厚禮遣之晉中興書曰胡母輔之嘗過河南門下飲酒門下騶王子愽箕坐其傍輔之叱之使取火愽曰我卒也不乏吾事薦之河南君樂廣召見甚恱擢爲功曹又曰任旭字次龍臨海人操立清儉不染流俗郡將蔣秀請爲功曹治官貪穢毎不奉法旭正色苦諌秀旣不納旭乃謝去閇門講肆養志而巳乆之秀坐事𬒳収旭於獄狼狽營救躬自扶送秀慨然歎曰任功曹直人吾違其讜言以至於此復何言哉九州春秋曰建安六年劉表攻西鄂西鄂長杜子緒帥縣男女嬰城而守時南陽功曹栢孝長亦在城中聞兵攻聲恐懼入室閇戸牽𬒳覆頭相攻半日稍敢出面英雄記曰尚栩先人尚子平有道術爲縣功曹休歸自入山擔薪賣以食飲㑹稽典録曰孫䇿功曹魏勝以忤意見遣將殺之吴太夫人乃倚大井而語䇿曰汝新造江南其事未集方當優賢禮士捨過録功魏功曹在公盡䂓汝今日殺之則人明日叛汝吾不忍見禍及當先投此井中耳䇿大驚遽釋勝又曰魏㓪字少英上虞人從太守行春寢於閤外感時志激中夜長歎府君朝問昨歎息者誰主簿曰書佐魏㓪也府君由是知㓪有凌雲之志轉功曹佐正旦與掾史上朝時功曹吏頋翕披裘以加朝服㓪以裘非臣服非翕不敬勑卒撤去翕恚而不聽以手歐卒㓪右手鳴鼔左手撤裘以聞府君曰㓪當朝正色有不撓之節遂退翕以㓪代之㓪辭病不就又曰魏徽字孔章仕郡爲功曹史府君貴其各重徽每拜謁常跪而待之華陽國志曰公孫述入蜀蜀郡拒守述功之功曹朱尊絆馬死戰光武帝嘉之又曰李業字臣遊廣漢梓橦人少執志清白太守到咸慕其名召爲功曹十命不詣又曰朱倉字雲卿下邳人少受學於蜀郡張寧飡豆屑飲水同業憐其貧資給米肉不受家貧常以歩行爲郡功曹鍾岏良吏傳曰桓虞字仲春馮翊萬年人也爲南陽郡守下車聞葉縣雍昱及新野令不遵法度選督郵不能正乃署趙勤爲督郵到葉昱即解印綬入新野新野令聞昱巳去遣吏奉記陳罪亦即弃官虞乃歎曰善吏如良膺下韝即中擢爲功曹委以郡事豫章列士傳曰華茂爲功曹病𬒳不覆軀布衣不周身郡將與大布𬒳袴皆不受汝南先賢傳曰袁閬字奉髙爲功曹辟太尉掾太守唐珍曰今君當應宰府冝選功曹以自代因薦陳仲舉珍即請蕃爲功曹又曰新蔡鄭敬字次都爲郡功曹都尉髙懿㕔事前槐樹有露類甘露者懿問掾属皆言是甘露敬獨曰明府政未能致甘露但樹汁耳懿不恱託疾而去又曰許愼爲功曹奉上以篤義率下以恭寛荆州先德傳曰周瑜領南郡以龐士元名重州里所信乃逼爲功曹任以大事瑜垂拱而巳鍾離意別傳曰意字子阿㑹稽山隂人也太守竇翔召意署功曹史意乃爲府立條式威儀嚴肅莫不靖恭後日竇君與意相見曰功曹湏立嚴科太守觀察朝晡吏無大小莫不畏威陳寔別傳曰寔字仲弓潁川許人也爲郡功曹時中常侍侯覽託太守髙倫用吏倫敎署文學掾寔知非其人乃懷撽請見乞從外署倫從之於是郷論怪其非舉倫後𬒳徴爲尚書郡中士大夫送至傳舎倫語衆人曰吾前爲侯常侍用吏此各由故人畏憚強禦陳君可謂善則稱君惡則稱巳者也聞者方歎息陸績別傳曰績字公紀郡人也太守王㓪命爲功曹風化肅穆郡内大治京兆舊事曰長安孫晨家貧爲郡功曹十日一炊無𬒳有蒿一束暮卧其中旦則収之司倉叅軍後漢書曰戴就字景成仕郡爲倉曹掾刺史劾其太守遣部從事案倉庫簿領五毒慘至郡事遂釋也三國典略曰張䡄入關抜岳以爲倉曹叅軍或有請貸官粟者䡄曰以私害公非吾宿志濟人之難詎得相違乃賣所服之衣糴粟以賑其乏司户叅軍後漢書曰陸績李郃皆仕郡爲户曹史郃後官至司空唐書曰裴琰之絳州聞喜人也丗爲著姓永徽中爲同州司户叅軍時年少美容儀刺史李崇義𥘉甚輕之先是州中有積年舊案數百道崇義促琰之使斷之琰之命書吏數人連𥿄進筆斯湏剖斷並畢文翰俱美且盡與奪之理崇義大驚謝曰公何忍藏鋒以成鄙夫之過由是大知名號爲霹靂手司兵叅軍唐書曰杜甫字子美夲襄陽人後徙居鞏縣天寳𥘉應進士不第天寳末獻三大禮賦玄宗竒之召試文章授京兆兵曹叅軍司法叅軍後漢書曰周燕宣帝時爲郡决曹掾太守欲枉殺囚燕數諌不聽遂殺囚家詣闕稱冤詔遣覆考燕謂太守曰願謹定之書背著燕名府君但時言病而巳使収燕燕遂死之燕有五子皆至刺史太守兩漢有决曹賊曹掾主刑法歷代皆有或謂之賊曹或爲法曹又曰郭弘爲潁川郡决曹掾治獄至四十年用法平正郡内比之東海于公隋書曰陳孝意爲㑹郡司法書佐太守蘇威欲殺一囚固諌不許乃解衣請先受死乃止後至侍御史汝州刺史五官掾後魏書曰王尊字子贛涿郡人爲安定太守出教曰五官掾張輔懷虎狼之心貪汙不䡄一郡之錢盡入輔家適足以葬矣遂將輔送獄直府史詣閤下從太守受其事輔繫獄數日死東觀漢記曰黄香江夏安陵人也父况爲郡五官舉孝廉貧無奴僕香躬勤左右苦暑乃扇牀枕冬以身温席又曰桓帝時白馬令李雲坐直諌繫獄弘農五官掾杜衆傷其忠直獲罪上書願與雲俱得死遂俱死獄中後漢書曰諒輔字漢儒仕郡爲五官掾夏大旱太守自祈禱無應輔乃自曝庭中祝曰輔爲股肱不能進諌納忠薦賢退惡和調隂陽承順天意乃積薪以自環構火其旁曰若日中不雨將自焚未日中而澍雨也臧榮緒晉書曰范畧字彦長南陽人少遊學清河遂徙家僑居郡命爲五官掾太平御覽卷第二百六十四
