front:
  text: 太平御覽卷第五百一十四宗親部四
  hash: sha256:4ef41a222bafa7e1ced3b5e9c080bc0c5e9980a0f32c41c026a19f7bf6a20146
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_514-1a}
body:
  text: 兄弟上釋名曰兄荒也荒大也故青徐人謂兄曰荒第日第也相次第而生也說文曰兄長也周易曰家人卦曰父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣尚書五子之歌曰太康尸位以逸豫滅厥德黎民咸貳乃盤遊無度畋于有洛之表十旬不反有窮后羿因民弗忍距于河厥弟五人御其母以從徯于洛之汭五子咸怨述大禹之戒以作歌又君陳王若曰君陳惟爾令德孝恭惟孝友于兄弟克施有政又康誥曰王若曰孟侯朕其弟小子封孔安國曰封康叔名稱小子明當受教訓惟乃丕顯考文王克明德慎罰弗敢侮鰥寡庸庸祗祗威威顯民爾雅曰男子先生爲兄後生爲弟又曰張仲孝友善父母爲孝善兄弟爲友毛詩棠棣曰棠棣燕兄弟也閔管蔡之失道故作棠棣焉棠棣之華蕚不􅙽􅙽凡今之人莫如兄弟死䘮之威兄弟孔懷原隰襃矣兄弟求矣鶺鴒在原兄弟急難毎有良朋况也永歎兄弟䦧于牆外禦其侮每有良朋烝也無戎喪亂旣平旣安且寧雖有兄弟不如友生儐爾籩豆飲酒之飫兄弟旣具和樂且孺又何人斯曰伯氏吹塤仲氏吹箎土曰塤竹曰箎云伯仲喻兄弟也又頍弁曰爾酒旣旨爾肴旣嘉箋云旨嘉皆羙也汝猶己羙矣汝餚巳羙矣何巳不同與族人燕也言其知能具其禮而弗爲之也豈伊異人兄弟匪他又氓曰兄弟不知咥其笑矣静言思之躬自悼矣又葛藟曰綿綿葛藟在河之漘終逺兄弟謂他人昆謂他人昆亦莫我聞又曰枤杜刺時也君不能親其宗族骨肉離散獨居而無兄弟將爲沃所并爾有枤之杜其葉湑湑獨行踽踽豈無他人不如我同父嗟行之人胡不比焉人無兄弟胡不佽焉有枤之杜其葉菁菁獨行睘睘豈無他人不如我同姓嗟行之人胡不比焉人無兄弟胡不佽焉又六月日四壯廢則君臣缺矣皇皇者華廢則忠信缺矣棠棣廢則兄弟缺矣又陟岵曰陟彼岡兮瞻望兄兮兄曰嗟予弟行役夙夜必偕上慎旃哉猶來無死又泉水曰嗟我兄弟邦人諸友莫肯念亂誰無父母又曰黄鳥刺宣王也刺其以隂禮敎親而不至聦兄弟之不固者也黄鳥黄鳥無集于桑無啄我梁此邦之人不可與明言旋言歸復我諸兄又斯干曰兄及弟矣式相好矣無相猶矣似續妣祖又行葦曰戚戚兄弟莫逺具爾或肆之筵或授之几又角弓曰角弓父兄刺幽王也不親九族而信䜛佞骨肉相怨故作是詩也騂騂角弓翩其反矣兄弟婚姻無胥逺矣此令兄弟綽綽有𥙿不令兄弟交相爲瘉又將仲子曰將仲子刺莊公也不勝其母以害其弟弟叔失道而公不制祭仲諌而公弗聽小不忍而致大亂焉將仲子兮無踰我墻無折我樹桑豈敢愛之畏我諸兄仲可懷也諸兄之言亦可畏也又揚之水曰揚之水不流束楚終鮮兄弟維予與汝無信人之言人實廷女揚之水不流束薪終鮮兄弟維予二人無信人之言人莫不信又皇矣曰維此王季因心則友則友其兄則篤其慶載錫之光又蓼蕭曰蓼彼蕭斯零露泥泥旣見君子孔燕愷悌冝兄冝弟令德壽考爲兄亦冝爲弟亦冝禮記王制曰兄之齒鴈行朋友不相踰又檀弓曰子栁之母死子碩請具子栁曰何以哉子碩曰請粥庶弟之母子栁曰如之何其粥人之母以葬其母也不可旣葬子碩欲以􅉠布之餘具祭器子栁曰不可吾聞之也君子不家於䘮請班諸兄弟之貧者周禮春官曰大宗伯之職以脤膰之禮親兄弟之國脤膰祭社稷宗廟之肉也賜以同姓之國同福禄也兄弟有共先王者也魯定公十四年天王使石尚來歸脤也儀禮醮辭曰旨酒旣清嘉薦亶時亶誠也古文亶爲癉始加元服兄弟具來孝友時格永乃保之左傳桓公曰宋穆公疾召大司馬孔父而属殤公焉曰先君舎與夷而立寡人寡人不敢忘若以大夫之靈得保首領以殁先君若問與夷其將何辤以對請子奉之以主社稷寡人雖死亦無悔焉對曰羣臣願奉馮也公曰不可先君以寡人爲賢使主社稷若棄德不讓是廢先君之舉也豈曰能賢光昭先君之令德可不務乎吾子其無廢先君之功使公子馮出居于鄭杜預曰公子馮穆公子也穆公卒殤公即位又襄公曰宋向戍來聘且㝷盟見孟獻子尤其室曰子有令聞而羙其室非所望也對曰我在晉吾兄爲之毀之重勞且不敢間杜預曰傳言獻子友于兄且不隱其實也又曰文上曰穆伯如莒莅盟且爲襄仲逆及鄢登城見之美鄢城莒邑自爲娶之仲請攻之文公將許之叔仲惠伯諌惠伯叔子孫也曰臣聞之兵作於内爲亂於外爲冦冦猶及人亂自及也今臣作亂而君不禁以啓冦讎若之何公止之惠伯成之平仁子也使仲舎之公孫敖反之還莒女也復爲兄弟如𥘉又文下曰齊人歸公孫敖之喪爲孟氏且國故也葬視共仲聲巳不視帷堂而哭襄仲欲勿哭惠伯曰䘮親之終也惠伯叔彭生也雖不能始善終可也史佚有言曰兄弟致美救乏賀善弔灾祭敬䘮哀情雖不同母絶其愛親之道也子無失道何怨於人襄仲說帥兄弟以哭之又昭元曰秦后子有寵於桓如二君於景后子秦桓公子景公母地鍼也其權寵如兩君也其母曰弗去懼選鍼適晉具車千乘曰秦伯之弟鍼出奔晉罪秦伯也后子享晉侯造舟于河十里舎車自雍及絳歸取酬幣終事八反司馬侯問曰子之車盡於此而巳乎對曰此之謂多矣若能少此吾何以得見焉又隠公曰鄭莊公弟共叔叚居京謂之京城太叔祭仲諌曰都城過百雉國之害也無使滋蔓蔓難圖也蔓草猶不可除况君之寵弟乎又襄二曰吴諸樊旣除䘮將立季札杜預曰札諸樊弟也辭曰曹宣公之卒也諸侯與曹人不義曹君將立子臧子臧去之遂弗爲也以成曹君君子曰能守節君義嗣也諸樊適子故曰義嗣誰敢干君有國非吾節也札雖不才願附於子臧以無失節固立之棄其室而耕乃舎之傳言季扎之讓且明吴兄弟相傳又曰兄弟天倫兄先弟後天之倫次論語曰周有八士伯逹伯适仲突仲忽叔夜叔夏季隨季騧包氏日周時仲乳生八子皆爲顯士故記之也又曰子路問曰何如斯可謂之士矣子曰切切偲偲怡怡如也可謂士矣朋友切切偲偲兄弟怡怡馬融曰切切偲偲切責之皃也怡怡和順之皃也又爲政曰或謂孔子曰子奚不爲政子曰書云孝乎惟孝友于兄弟施於有政是亦爲政奚其爲爲政又顔淵曰司馬牛憂曰人皆有兄弟鄭玄曰牛兄桓魋行惡死䘮無日我爲無兄弟我獨亡子夏曰啇聞之矣死生有命冨貴在天君子敬而無失與人恭而有禮四海之内皆兄弟也君子何患乎無兄弟也包氏曰君子䟽悪而友賢九州之人皆可以禮親之史記曰伯夷叔齊孤竹君之二子也父欲立叔齊及卒叔齊譲伯夷伯夷曰父命也遂逃去叔齊亦不肯立而追之國人立其中子於是伯夷叔齊聞西伯昌養老徃歸焉又曰信陵君無忌謂魏王曰秦與戎翟同俗有虎狼之心不顧親戚兄弟禽獸耳故太后母也而以憂死穰侯舅也功莫大焉而竟逐之兩弟無罪而再奪之國此於親戚若此而况於仇讎之國乎又曰漢五年漢王與項羽相距京索之間數使使勞苦丞相蕭何鮑生謂丞相曰王暴衣露盖數使勞苦君者有疑君心焉爲君計遣君子孫昆弟能勝兵者悉詣君所上必益信君於是何從其計漢王大說又曰卜式者河南人也以田畜爲事親死式有少弟弟壯式脫身出分獨取畜羊百餘田宅財物盡與弟式入山牧十餘歲羊致千餘買田宅而其弟盡破其生式輙復分與弟者數矣又曰周公旦武王弟也及武王即位旦常輔翼武王用事居多又曰朱公居於陶中男殺人囚於楚朱公告其少子生徃視之乃裝黄金千鎰置褐噐中載以一牛車且遣其少子朱公長男請欲行不聽長男曰家有長子曰家督今弟有罪大人不遣乃遣少弟是吾不肖欲自殺其母爲言公從之長男竟持其弟䘮歸至其母及邑人盡哀之唯朱公獨笑曰吾固知必殺其弟也彼非不愛其弟也顧有所不能忘者也是少與我俱見苦爲生難故重棄財至如少弟者生而見我冨乗堅駈良逐狡兔豈知財所從來故輕棄之前日吾所以爲欲遣少子固爲其能棄財而長者不能故卒以殺其弟事之理也無足悲者吾日固巳望其䘮之來也又曰蒙恬弟毅仕至上卿出則叅乗入則御前蒙恬任外事而毅常爲内謀名爲忠信故雖諸將相莫敢與之争焉又曰漢王滅項籍立爲皇帝田横懼誅與其徒属五百餘人入海居島中髙帝聞之以爲田横兄弟夲定齊齊人賢者多附焉乃使赦田横罪而召之田横與其客二人乗傳詣雒陽謂其客曰横始與漢王俱南面稱孤今漢王爲天子而横乃爲亡虜北面事之其耻固巳甚矣且吾烹人之兄與弟併肩而事主縱彼畏天子詔不敢動我獨不愧於心乎遂自剄令客奉其頭從使者馳奏之髙帝曰嗟乎有以也匹夫起布衣兄弟三人更王豈不賢哉爲之流涕又曰季布弟季心氣盖關中遇人恭謹爲任俠方數千里士皆争爲之死當是時季布以諾心以勇著聞又曰衛青爲侯家人少時歸其父父使牧羊先母之子皆奴畜之不以爲兄弟數青常至甘泉居室有一鉗徒相青曰貴人也官至封侯青笑曰人奴之生得無笞罵即幸矣何得封侯漢書曰陳平陽武户牖人也少時家貧好讀書有田三十畒與兄伯居伯常耕田縱平㳺學又田何武字君公蜀郡郫人武兄弟五人皆爲郡吏郡縣敬憚之又曰田蚡封武安侯爲丞相召客飲坐其兄盖侯北郷自坐東郷以爲漢相尊不可以兄故私撓由此滋驕又曰丞相韋賢封扶陽侯長子方山早終次子弘少子玄成𥘉弘爲太常丞職奉宗廟典諸陵邑煩劇多罪過父賢以弘當爲嗣故勑令自免弘懷嫌不去官及賢病篤弘竟坐宗廟事繫獄罪未决室家問賢當爲後者賢恚不肯言於是賢門生博士等與宗室計議共矯賢令以玄成爲後賢薨玄成在官聞䘮又言當爲嗣玄成深知其非賢雅意即陽爲病狂妄笑語士大夫多疑其欲讓爵遜兄者丞相衘史劾奏之不得巳受侯爵又曰左馮翊韓延壽行縣至髙陵有昆仲相訟田延壽耻不能明教化因入傳舎閉閤思過於是訟者自髠肉袒謝罪又曰嚴延年兄弟五人有吏才至大官東海號其母曰萬石嚴嫗又曰金日磾兩子賞建俱爲侍中與昭帝略同年共卧起賞爲奉車建駙馬都尉及賞賜佩兩綬上謂霍將軍曰金氏兄弟兩人不可使俱兩綬耶霍光對曰賞自嗣父爲侯耳上笑曰侯不在我與將軍乎光曰先帝之約有功迺得封侯又曰張延壽巳歴位九卿旣嗣侯國在陳留別邑在魏郡租入歲千餘萬延壽自以身無功德何以能乆堪先人大國數上書讓減户邑又因弟陽都侯彭祖口陳至誠天子以爲有讓廼徙封平原并一國户口如故而租稅减半又曰王啇自子威涿郡蠡吴人啇少爲太子中庶子以肅敬敦厚稱父薨啇嗣爲侯推財以分異母諸弟身無所受居䘮哀戚於是大臣薦啇行可以勵群臣義足以厚風俗冝備近臣繇是擢爲諸曹侍郎中郎將范曄後漢書曰光武郭后諱聖通眞定槀人也爲郡著姓父昌譲田宅財産數萬與母弟國人義之又曰馬援字文淵扶風茂陵人也援三兄况余貟並有才能援年十二而孤少有大志諸兄竒之甞受齊詩意不能守章句迺辭况欲就邊郡田牧况曰汝大才當晚成良工不示人以䃼直從所好㑹况卒援行服暮歲不離墓所太平御覽卷第五百一十四
