front:
  text: 太平衘覽卷第一百八十六
  hash: sha256:7dc92b647830391092e06a9a63195d2ec408f31313a3775789e26a7811d60fec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_186-1a}
body:
  text: 居處部十四厨竈竇厠厨說文曰厨庖屋也易曰庖有魚義不及賔也毛詩大庖不盈禮記玉藻曰君子逺庖厨凡有血氣之類弗身踐也又田獵之禮一爲乾豆二爲賔客三爲充君之庖漢書賈誼曰其禽獸見其生不忍見其死聞其聲不忍食其肉故逺胞厨所以長恩且明有仁也後漢書祢衡到許都人問荀文若趙稚子云何趙爲盪冦將軍見魏志也衡曰文若可使借面吊䘮稚長可監厨請客典略曰衡見苟儀容但有皃耳故可吊丧趙有腹徤啖肉故可監厨也七賢傳曰阮籍以歩兵厨中有羙酒求爲歩兵校尉司馬相如上林賦曰庖厨不徙後宫不移古詩曰左顧勅中厨竈禮有五祀竈居一焉月令孟夏其祀竈祭先肺陽氣盛熱外祀之於竈從熱類也禮臧文仲燔柴於竈者竈者老婦之祭也盛於盆尊於鉼非所柴也文仲焉知禮禮庶人立一祀或立户或立竈論語王孫賈曰與其媚於奥寜媚於竈史記孫臏救韓入魏爲十萬竈明日爲五萬竈又明日爲三萬竈龐㳙經三日大喜曰我固知齊人怯入吾地三日士卒亡者過半遂逐之又曰李斯曰竈上騷除萬世一時也騷音掃漢書李少君言祀竈皆可致神物而丹砂可化爲黄金黄金成以爲器以食則益夀夀益則海中蓬萊仙者乃可見之封禪則不死黄帝是也天子親祀竈焉又曰𥘉霍氏奢侈茂陵徐生曰霍氏必亡夫奢則不遜不遜必侮上侮上逆道也在人之右衆必害之也霍氏秉權日乆害之者多矣天下害之而又行以逆道不亡何待迺上䟽言霍氏太盛陛下即愛厚之冝以時抑制無使至亡書三上輙不報聞其後霍氏誅滅而告霍氏者皆封人爲徐生上書曰臣聞客有過主人者見其竈直突傍有積薪客謂主人更爲曲突逺徙其薪不者且有火患主人不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝其人灼爛者在於上行餘各以次不録言曲突者人謂主人曰郷使聽客之言不費牛酒終亡火患今論功而請賔曲突徙薪亡恩澤燋頭爛額爲上客主人迺寤而請之茂陵徐福數上書言霍氏且變冝防絶之郷使福說行則國士裂土岀爵之費臣亡逆亂誅滅之敗往事旣巳而福不蒙其功唯陛下察之貴徙薪曲突之䇿使居焦髮灼爛之右上迺賜福帛千疋後以爲郎又曰息夫躬祠竈人見之告呪詛遂弃市又曰昭帝時燕王宫豕岀圂胡困切壞都竈注都竈蒸炊之大竈也劉向以爲豕禍後漢書李南女曉術爲由拳縣人妻晨詣竈室卒有暴風婦上堂從姑求歸辭其二親姑不許乃跪而泣曰家世傳術疾風起先吹竈突及井此禍爲婦女主㸑者妾將應之因著其亡日乃聽還家如期病卒又曰更始李軼朱鮪擅命山東王匡張印撗暴三輔其所與官爵皆羣小賈竪或有膳夫庖人多著繡面衣錦袴䄡䄖諸子罵詈道中長安爲之語曰竈下養中郎將爛羊頭關内侯又曰虞詡爲懷令後羗㓂武都鄧太后以詡有將帥之略遷武都太守引見嘉徳殿厚加賞賜羗乃率衆數千遮詡於陳倉崤谷詡即停軍不進而宣言上書請兵須到當發羌聞之乃分鈔傍縣詡因其兵散日夜進道兼行百餘里令吏士各作兩竈日増倍之羌不敢迫或問曰孫臏減竈而君増之兵法日行不過三十里以戒不虞而今日行二百何也詡曰虜衆多吾兵少徐行則易爲所及速過則彼所不測虜見吾竈日増必謂郡兵來迎衆多行速必憚追我孫臏見弱吾今示強勢有不同故也又曰向栩性不恒又似狂坐於竈北板屋上又曰張忠署孫賔爲主簿遂祭竈請比隣又曰隂識之臘日晨炊而竈神見殺黄羊因祀之三世繁昌遂常以臘日祭也戰國䇿曰智伯攻晉陽城城不沉者三板洎竈生蛙懸釡而炊魯連子曰一井五鉼洩可立待一竈五突烹餁十倍分烟者衆淮南子曰黄帝作竈死爲竈神莊子曰仲尼讀春秋老聃踞竈觚而聽觚竈額也又曰陽子居南郭之沛老聃西遊於秦邀還於郊至於梁而遇老子中道仰天而歎曰始以汝爲可敎今不可也陽子居不荅至舎進盥漱巾櫛脫屨户外膝行而前曰向者弟子欲請夫子夫子行不閑是以不敢問今閑矣請聞其過老子曰而睢睢盱盱而誰與居大白若辱盛徳若不足陽子居蹵然變容曰敬聞命矣其徃也舎者迎將家公執席妻執巾櫛舎者避席煬者避竈其反也舎者與之爭席矣冝都縣記曰冝都山絶崖壁立數百丈有一火燼挿在崖間望可長數尺傳云堯洪水人泊船此旁㸑餘留之故曰挿竈崖萬畢術曰竈神晦日歸天白人罪夢書曰竈主食夢者得食李尤竈銘曰燧人造火竈能以興竇周禮考工記曰宫中之竇其崇三尺左傳曰蓽門圭竇之人皆凌其上又曰有渦氏滅夏立相后緍方娠逃岀自竇晉書阮逸避乱依胡母輔之𥘉至屬輔之與謝鯤阮放畢卓羊曼桓彛阮孚散髮祼袒閉室酣飲己累日逸將排户入守者不聽逸便於户外脫衣露頭於狗竇中窺之而大呌輔之驚曰他人决不能尓必我孟祖也遽呼入遂與飲不捨晝夜時人謂之八逹家語曰子羔爲衛之士師刖人之足衛有蒯瞶之亂子羔逃至郭門刖者守焉謂子羔曰彼有鈌子羔曰君子不踰又曰彼有竇子羔曰君子不隧又曰彼有室子羔入焉追者罷子羔乃去厠溷附廣雅曰清溷屏厠也說文曰厠清也釋名曰厠言人雜厠在上非一也或曰溷濁也或曰清至穢冝常脩治使清㓗儀禮曰隷人温厠温塞也爲人復徃䙝也左傳曰晉侯將食麥如厠䧟而卒史記曰朱虚侯入未央宮遂擊吕産産走天風大起從官亂莫敢闘遂殺産於郎中府吏厠中又曰范睢事魏中大夫須賈賈爲魏昭王使於齊睢從齊襄王聞睢辯有口才乃使人賜睢金十斤及牛酒須賈以睢持魏隂事告齊故睢獨得此饋心怒㱕以告魏相魏齊齊使人笞撃睢折脅摺齒睢佯死卷以置厠中賔客飲者醉更溺睢以懲後無妄言者又曰李斯者楚之上蔡人也少時爲郷小吏見吏舎厠中鼠食不絜近人犬數驚恐之斯入倉觀倉中䑕食積粟居大廡下不見人犬之憂於是李斯乃嘆曰人之賢不肖譬如鼠矣在所自處耳乃從荀卿學帝王之術又曰萬石君長子建老白首萬石君尚無恙建爲郎中令每五日洗沐歸謁親入子舎竊問侍者取親中裙厠牏身自浣滌徐廣曰牏築垣短版也音注厠牏謂溷垣牆建隱於其側而浣滌也一謂牏爲竇言建又自洗盪厠竇厠竇舄除穢汚之穴也吕静曰楲窬䙝器音威豆復與侍者不敢令萬石君知以爲常又曰趙襄子滅智伯其臣豫讓遁逃山中曰嗟乎士爲知巳者死女爲說巳者容今智伯知我我必爲報讎而死以報智伯則吾魂魄不媿矣乃變名姓爲刑人入宫塗厠中挾匕首欲以刺襄子襄子如厠心動執問塗厠之刑人豫讓内持刃兵曰欲爲智伯報仇左右欲誅之趙襄子曰彼義人也吾謹避之耳且智伯亡無後而其臣欲爲報仇此天下之賢人也卒釋去之又曰大將軍衛青侍中上據厠而視之注溷厠也漢書郅都侍上賈姬如厠有野彘入厠上目都擊之都不徃上欲自行都伏諫曰一姬死復一姬進上雖自輕奈太后宗廟何太后聞之賜都金晉書王戎惠帝反宫以戎爲尚書令旣而河間王顒遣使說成都王潁將誅齊王冏檄書至冏謂戎曰孫秀作逆天子幽偪孤糾合義兵掃除元惡臣子之節信著神明二王聽䜛造構大難當賴忠謀以和不恊卿善爲我籌之戎曰公首舉義衆定大業開闢已來未始有也然論功報賞不及有勞朝野失望人懷貳志今二王帶甲百萬其鋒不可當若以王就第不失故爵委權崇讓此求安之計也冏謀臣葛旟怒曰漢魏以來王公就第寜有得保妻子乎議者可斬於是百官震悚戎僞藥發墯厠得不及禍又曰郭璞素與桓彛友善彛每造之或值璞在婦女間便入璞曰卿來他處自可徑前但不可厠上相㝷耳必客主有殃彛後因醉詣璞正逢在厠掩而觀之見璞躶身𬒳髮銜刀設醊璞見彛撫心大驚曰吾每屬卿勿來反更如是非但禍吾卿亦不免矣天實爲之將以誰咎璞終嬰王敦之禍彛亦死蘇峻之難魏氏春秋曰許允爲鎮北將軍未發徙樂浪允善相印將拜印以不善更刻大如此者三允曰印雖好而巳𬒳辱問送印者果懷之而墜于厠幽明録曰建徳民虞敬上厠輙有一人授草手内與之不覩其形如此非一過後至厠乆無送者但聞户外闘聲窺之正見死奴與死婢爭先進草奴適在前婢便因後撾之由此輙兩相擊食頃敬欲出婢奴陣勢方未巳乃厲聲叱之奄如火滅自是遂絶又曰阮徳如甞於厠見一鬼長丈餘色黒眼大著皂單衣平上幘去之咫尺徳如心安氣定徐喚而語之曰人言鬼可憎果然桓譚新論曰博士弟子譚生居東寺連三夜有惡夢以問人教使晨起厠中說之三旦而人告以爲呪咀捕治數日曹毗曰杜蘭香戒張碩不冝露頭上厠夜行必燭若脫誤當跪拜謝周景式孝子傳曰管寧避地遼東經海遇風船人危懼皆叩頭思過寜思惟無諐念常如厠不冠即便悔過海風㝷止異苑陶侃曽如厠見數十人悉持杖有一人著平上介幘自稱後帝云君長者故岀相見襄沔記蜀先主之依劉表起至厠見髀裏生肉慨然流涕還坐表怪問之備曰平常身不離鞍髀肉皆消今不復騎髀裏肉生日月若馳老將至矣而功業不建是以悲耳表雖重備因此欲取備備覺僞如厠潜遁岀所乗馬名的鸕從襄陽城西檀溪水中而渡𬒳溺不得岀備旣急乃曰的鸕今日危矣可不弩力乎的鸕乃一踴三丈遂得過溪而去神仙傳曰淮南王安謁仙伯坐起不恭主者奏安不敬讁守厠三年抱朴子内篇曰河東項曼都入山學仙十年而歸家問其故曼都曰在山中仙人乗龍迎我上天先過紫府金床玉几眞貴處也仙人以流霞柸飲我輙不死不飢渇昔淮南王事天帝有失行謫之守厠矣吾何人哉語林曰劉寔詣石崇如厠見有絳文帳茵縟甚麗兩婢持錦囊寔遽退笑謂崇曰向誤入卿室崇曰是厠耳寔更徃向乃守厠婢所進錦囊是籌良乆不得便行出謂崇曰貧士不得此厠乃如他厠又曰石崇厠常有十餘婢侍列皆佳麗藻飾置甲煎沉香無不畢備又與新衣客多不能着王敦爲將軍年少往脫故衣着新衣氣色傲然羣婢謂曰此客必能作賊世說王大將軍敦𥘉尚主厠見漆箱中盛乾棗夲以塞鼻王謂厠上下菓食遂至盡旣還婢擎金澡盤盛水瑠璃椀盛澡豆敦自倒着水中而飲之謂之乾飯羣婢掩口而笑之太平御覽卷第一百八十六
