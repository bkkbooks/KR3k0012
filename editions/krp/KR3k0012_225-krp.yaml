front:
  text: 太平御覽卷第二百二十五
  hash: sha256:692024fb51b991555f8565b4e7f1d9687a8be952146282380b95d834d45e1473
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_225-1a}
body:
  text: 職官部二十三御史大夫御史中丞上御史大夫六典曰御史大夫之職掌邦國刑憲典章以肅正朝列中丞爲之貳凢天下之人有稱冤而無告者與三司誥之三司即御史大夫中書門下也凢中外百寮之事應彈劾者御史言於大夫大事則方幅奏彈之小事但署名而已漢書公卿表曰御史大夫秦官也應劭曰侍御之率故稱大夫史記曰趙堯者少爲符璽御史趙人方興公謂御史大夫周昌曰君之吏趙堯年雖少竒士也君必異之且代君位昌笑曰堯刀筆吏何能至是乎居頃之堯侍髙祖獨不樂悲歌羣臣不知所以然堯進問陛下所悲者非爲趙王年少而戚夫人與吕后有隙萬歳之後而趙王不能自全乎髙祖曰然吾私憂之不知所出堯曰陛下獨冝爲趙王置強相及吕后太子群臣所素敬憚者乃可髙祖曰然誰可堯曰御史大夫周昌其人賢忍質直且吕后太子及大臣皆敬憚之獨昌可髙祖乃召問昌謂之曰吾欲固煩公公強爲我相趙昌泣曰臣𥘉起從陛下獨柰何中道而弃之於諸侯髙祖曰吾極知其左遷君私憂趙念非公母可者於是徙昌爲趙王相旣行髙祖持御史大夫印弄之曰誰可以爲御史大夫者孰視趙堯曰母以易堯遂拜堯御史大夫漢書曰元帝時琅瑘貢禹爲御史大夫而華隂守承嘉上封事言治道在於得賢御史之官宰相之副九卿之右不可不選平陵朱雲兼資文武中正有智略可使以六百石秩試守御史大夫盡其能又曰朱博爲御史大夫府史舎百餘區井泉俱竭又其府中列栢樹常有野烏數千棲其上晨去暮來號曰朝夕烏後去不來者數月長老異之果廢焉又曰汲黯謂上曰公孫弘位在三公奉禄甚多然爲布𬒳此詐也上問弘弘謝曰有之夫三公爲布𬒳誠飾詐以釣名今臣弘位爲御史大夫九卿以下無差誠如黯言又曰公孫弘爲御史大夫時又東置滄海北置朔方之郡弘諌以爲罷弊中國以奉無用之地願罷滄海專奉朔方上許之又曰張湯爲御史大夫舞文巧詆以輔法又曰張歐爲御史大夫上具獄事可却之不可者不得巳而爲之涕泣對之其愛人若此年老請免天子亦寵以上大夫禄歸老于家又曰杜周爲御史大夫後周子延年又爲御史大夫以居父官府不敢當舊位坐卧皆易其處又曰倪寛爲御史大夫以稱意任職故乆無所匡諌官屬易之又曰張湯爲御史大夫每朝奏事語國用日旰天子忘食丞相充位而巳又曰晁錯遷御史大夫請諸侯之罪過則削其地奏上上令公卿列侯宗室集議莫敢難錯獨竇嬰争之由此與嬰有隙又曰哀帝建平二年朱博奏請罷大司空以御史大夫爲百僚帥帝從之又曰梁相禇大通五經爲博士倪寛爲弟子及御史大夫缺徴禇大大自以爲得御史大夫至雒陽聞寛爲大夫禇大笑及至與寛議封禪於上前大不能及退而服曰誠知之漢書百官志曰御史大夫秦官位上卿銀印青綬掌副丞相事漢雜記事曰故事上書爲二封其一曰副領尚書者先發之有不善屏去不奏魏相爲御史大夫奏去副封以防擁蔽漢舊儀曰御史大夫寺在司馬門内門無塾門署用梓板不起郭邑題曰御史大夫寺北齊楊楞伽鄴都故事云御史臺在宫闕西南其門北開取冬殺之義也唐書曰韋挺太宗嘗謂挺曰卿之任御史大夫獨朕意耳左右大臣無爲卿地者卿勉之哉又曰薛謙光拜御史大夫時僧惠範恃太平公主權勢逼奪百姓店肆州縣不能理謙光將加彈奏或請寢之謙光曰憲臺理冤滯何所廻避朝彈暮黜亦可矣遂與殿中慕容珣奏彈之又曰韋思謙除右肅政大夫遂坐受拜或以爲言謙曰國家班列自有等差柰何以姑息爲事又曰崔隱甫爲大夫一切督責之事無大小悉令諮决稍有忤意列上其罪前後貶黜者過半羣僚側目上常謂曰卿爲大夫深副朕所委又曰肅宗幸靈武李峴應召至行在拜扶風郡太守兼御史大夫旣収京師拜禮部尚書守京兆尹復兼御史大夫時峴兄峘爲户部尚書兼成都尹乾元𥘉玄宗還京峘自蜀至又兼御史大夫兄弟俱判臺事自國𥘉以來兄弟並拜大夫未有其比時長安士庶皆賦美之又曰崔縱勸李懷光西至奉天加右庶子充使無幾拜京兆尹兼御史大夫數奏懷光剛愎反覆冝隂備之及幸梁州左右或短之曰縱素善懷光必不來矣上曰他人不知縱吾可保不數日縱至拜御史大夫又曰李元素徴拜御史大夫大夫自貞元中位缺乆難其人至是元素以名望召拜中外聳聽及居位一無修舉但規求作相乆之寖不得志見客必曰無以某官散相踈也見屬官必先拜脂韋在列大失人情又曰李景讓轉御史大夫景讓慷慨有大志事母以孝聞正色立朝言無避忌時宣宗皇舅鄭光卒詔贈司徒罷朝三日景讓曰國舅雖親朝典有素無容過越乃上言曰鄭光是陛下親舅外族之愛誠軫聖心况皇太后哀切之時理合加等而賜之粟帛降之弔問自家刑國允謂合冝今以輟朝之數比於親王公主即前例所無縱有亦不可施用何者先王制禮所貴防微大凢人情於外族則深於宗屬則薄所以先王制禮割愛厚親士庶猶然況當萬乗親王公主宗屬也舅氏外族也今朝廷公卿以至庶人據開元禮外祖父母及親舅䘮止服小功五月若親伯叔親兄弟即服齊縗周年所以踈其外而宻於内也有天下者尤不可使外戚強盛故西漢有吕氏之侈幾滅劉氏國朝有則天之簒殆革唐命盖非一朝一夕其所由來漸也今鄭光輟朝日數與親王公主同設使陛下速改詔命輟朝一日或兩日示其昇降有差恩禮無僣使四方見陛下欽明之徳青史傳陛下制度之文垂之百王永播芳烈臣愚不肖謬竊恩私實願陛下處於堯舜之上羲軒之列所以甘心鼎鑊伏進危言優詔報之乃罷朝兩日又曰田令孜軍沙陁逼京師移幸鳯翔邠帥朱玫引兵來迎駕令孜挾帝幸山南時中夜出幸百官不及扈從而隨駕者黃門衛士數百人而巳帝駐寳雞候館詔授孔緯御史大夫遣中使傳詔令緯率百竂赴行在時京師急變從駕官屬至盩厔並爲亂兵所剽資裝殆盡緯承令見宰相論事蕭遘以田令孜在帝左右意不欲行辭疾不見緯遣臺吏促百官上路皆以𫀆笏不具爲詞緯無如之何乃召三院御史謂之曰吾軰世荷國恩身居憲秩雖六騑奔道而咫尺天顔累詔追徴皆無承禀非臣子之義也凢布衣交舊緩急猶相救䘏况在君親䇿名委質安可背耶言竟泣下三院曰夫豈不懷但盩厔剽剥之餘丐食不給今若首途聊營一日之費俟信宿繼行可也緯拂衣而起曰吾妻危疾旦不得夕丈夫豈以妻子之故忽君父之急耶公軰善自爲謀吾行决矣即日見李昌符告曰主上再有詔命令促百寮前進觀群公之意未有發期僕忝憲闈不冝居後道途多梗明公幸假五十騎送至陳倉昌符嘉之謂緯曰路無頓逓褁粮辦耶乃送錢五十緡令騎士援緯逹散関緯知朱玫必蓄異志奏曰関城小邑不足以駐六師請速幸梁州翌日車駕離陳倉纔入関而邠歧之兵圍寳雞攻散関微緯之言幾危矣五代史後唐史曰天成元年夏六月以李琪爲御史大夫自後不復除通典曰漢御史大夫副丞相事若今之同平章及叅知機務之類所以漢書云薛貢韋匡迭爲宰相薛宣韋賢匡衡則是丞相而貢禹但爲御史大夫又曰武后時改御史臺爲蕭政臺凢置左右肅政二臺别置大夫中丞各一人侍御史殿中監察各二十人漢武帝集曰武帝作栢梁臺詔群臣二千石有能爲七言詩者乃得上坐御史大夫曰刀筆之吏臣執之唐中宗授楊再思檢校左臺大夫制曰避車要秩非徳靡升專席雄班惟賢是屬侍中楊再思衣冠舊齒廊廟宏材寨暑不易其心始終弗虧其度在明時而有立居暗室以無欺投水陳謨邁漢朝之三傑霑砂作相掩虞日之五臣森乎抱松栢之心􅏮若負冰霜之氣佇因獻替兼肅權豪冝分務於鸞扄俾効能於烏署又蘇授右臺大夫制曰烏臺峻秩望惣䥫冠蒼珮崇班威髙石室誠副相之榮級實次卿之通任前歧州蘇詞吞楚澤量湛黄陂旣光大厦之材堪入巨川之用西京展驥道掩題輿右輔慿熊風超露冕朱幡霧撤𥘉停州縣之勞白簡霜凝冝屏權豪之氣御史中丞上韋昭辨釋名曰御史中丞居中丞相者也辨云此中丞自御史大夫下丞有二其一别居殿中舉不法故曰中丞周禮曰周官小宰之職常建邦之宫刑以理王宫政令凢宫之糺禁注曰若漢之御史中丞史記曰臧宣爲御史及中丞者幾三十年以微文深詆殺者甚衆稱爲敢决漢書曰陳咸字子康沛郡人爲中丞㹅領州郡奏事課第諸刺史執法殿中公卿已下皆敬憚之又曰鮑宣字貢君爲中丞執法殿中外㹅部刺史郡國二千石所貶退稱進白黒分明由是知名又曰中丞有石室以藏秘書圖䜟之屬以其居殿中故曰中丞又曰張湯爲御史大夫丞上請造白金與五銖錢籠天下塩鐵排冨啇大賈東觀漢記曰樊准字㓜陵爲御史中丞舉正非法百僚震悚又曰宣秉建武元年拜御史中丞上特詔御史中丞與司隷校尉尚書令㑹同並專席而坐故京師號曰三獨坐後魏書曰髙恭之字道穆爲御史中丞帝姉壽陽公主行犯清路執赤棒卒呵之不止道穆令卒棒破其車公主深以爲恨泣以訴帝帝謂主曰髙中尉清直之人彼所行者公事豈可以私恨責之耶道穆後見帝帝曰一日家姉行路相犯極以爲愧道穆免謝曰臣蒙陛下恩奉陛下法不敢獨於公主虧朝廷典章謝承後漢書曰陳謙字伯讓拜御史中丞執憲奉法多所糺正爲百僚所敬尚書選舉序位旌賢常諮問謙自陳蕃雖尊爲宰相論議褒貶每往質疑皆服其清識髙亮續漢書曰馬嚴字威卿拜御史中丞賜冠幘衣服車馬嚴舉劾案章申明舊典奉法按舉無所廻避百竂憚之漢官儀曰御史中丞二人本御史大夫之丞其一别在殿中兼典蘭臺祕書外督部刺史内領侍御史受公卿章奏紏察百僚漢舊儀曰御史中丞督司隷司隷督司直司直督刺史刺史督二千石以下漢官解詁注曰建武以來省御史大夫官屬入侍蘭臺蘭臺有十五人特置中丞一人以惣之此官得舉非法其權次尚書魏志曰鮑勛字叔業黄𥘉四年尚書令陳群僕射司馬宣王並舉勛爲官正官正即御史中丞也帝不得巳而用之百寮嚴憚罔不肅然魏氏春秋曰故事御史中丞與洛陽令相遇則分路而行以土主多逐捕不欲稽留也太平御覽卷第二百二十五
