front:
  text: 太平御覽卷第一百一十九偏霸部三
  hash: sha256:bf1c2435eabce9dec367bc8b931062571019a0630a623090f12a633e4ccbe58e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_119-1a}
body:
  text: 前趙劉元海劉淵劉恥劉曜劉元海晉書載記序曰劉元海以惠帝永興元年據離石稱漢後九年石勒據襄國稱趙張氏先據河西是歳自石勒後三十六年也重華自稱凉王後一年冉閔據鄴稱魏後一年符健據長安稱秦慕容氏先據遼東稱燕是歳自符健後一年也儁始僣號後三十一年後燕慕容垂據鄴後二年西燕慕容冲據阿房是歳也乞伏國仁據枹罕稱秦後一年慕容求據上黨是歳也吕光據姑臧稱凉後十二年慕容德據滑臺稱南燕是歳也秃髮烏孤據廉川稱南凉叚業據張掖稱北凉後三年李玄盛據燉煌稱西凉後一年沮渠蒙遜殺叚業自稱後凉四月譙縱據蜀稱成都王後二年赫連勃勃據朔方稱大夏後二年馮跋殺離班據和龍稱北燕堤封天下十喪其八莫不龍旌帝服建社開祊華夷咸曁人物斯在或篡通都之郷或擁數州之地雄圖内卷師旅外井窮兵凶於勝負盡人命於鋒鏑其爲戦國者一百三十六載抑元海爲之禍首云前趙劉淵崔鴻十六國春秋前趙録曰劉淵字元海新興匈奴人先夏后氏之苗裔曰淳維丗居北狄千有餘歳至冒頓襲破東胡西走月氏北服丁零内侵燕岱控弦四十萬漢祖患之使劉敬奉公主以妻之約爲兄弟故子孫遂冒姓劉氏建武𥘉入居西河羙稷後漢中平單于羌渠使子於扶羅將兵助漢討平黄巾㑹羌渠爲國人所殺扶羅以其衆留漢立爲單于属董卓之亂宼掠太原河東屯於河内扶羅死弟呼厨泉立以於羅子豹爲左賢王即元海入朝魏武因留之爲分其衆爲五部以左賢豹爲左部帥其餘帥皆以劉氏爲之太康中改置都尉雖分属五部皆家于晉陽汾澗之賔豹妻呼延氏魏喜平中祈子於龍門有一大白魚以有二角軒鬐躍鱗而至祭所乆之乃去巫覡皆異之曰此嘉祉其夜夢所見魚變爲人左手把一物大如雞子光景非常授呼延曰此是日精服之生貴子寤以告豹豹曰吉徴也自是十二月而生淵淵生左手有文曰淵海遂以名焉幼而好學不捨晝夜常謂同門生朱紀范隆等曰吾毎觀書傳常鄙隨陸之無武絳灌之無文一物之不知固君子恥之也二生遇髙皇不能建封侯之業兩公属太宗不能開庠序之美惜哉於是學武事並皆工絶猨臂善射膂力過人身長八尺四寸鬚長三尺餘當心有赤毫毛三根長三尺六寸太原王渾虚衿友之命子濟拜焉咸熈中爲任子在洛陽國晉文王深待之時東萊王弥等皆慿結渾言之於晉武帝帝召見與言大恱之後謂王濟曰劉元海容皃風儀機談鑒智雖由余日磾無以加也㑹父豹卒帝以淵代爲左部帥轉寧朔將軍監五部軍事大安中惠帝失政諸王迭相殘廢州郡姧豪所在蜂起從祖北部都尉右賢宣等議曰右賢淵姿器絶人幹宇超丗天下恢崇單于終不虚生此人也於是共推淵爲大單于淵曰當爲崇崗峻阜何能爲培螻乎夫帝王豈有常哉大禹生於西戎文王生於東夷頋惟德所授耳今見衆十餘萬皆一當晉十鼔行摧亂晉猶拉枯耳上可成漢髙之業下不失爲魏氏何呼韓耶足道哉宣等稱善元熈元年遷於左國城晉人東附者數萬宣等上尊號淵曰今晉氏猶在四方未定可仰遵髙皇𥘉法且稱漢王權停皇帝之號聽宇宙混一當更議之十月爲壇南郊僣漢王位改晉永興元年爲元熈元年大赦天下追尊劉禪爲孝懷皇帝立三宗五祖之神主而祭之置百官以劉宣爲丞相拜授各有差四部之東萊王弥起兵青徐遣使來降拜鎮東大將軍青州刺史東萊郡公四月汲桑叛自稱趙王選置州郡十一月石勒及胡部等帥衆來降永鳯元年秋七月鳯皇集于蒲子丞相劉宣等六十四人上尊號十月僣即皇帝位于南郊大赦改元以衛軍和爲大將軍撫軍聦爲車騎大將軍建武矅爲龍驤大將軍河瑞元年遷都平陽汾水中得王璽大赦改元二年以大司馬梁王和爲皇太子八月淵寢疾以劉洋爲太傅延年爲太宰司徒聦大司馬大單于並録尚書置單于平陽西淵薨于光極殿太子和即位聦自西明門攻斬和于西室九月葬淵永陵謚曰光文皇帝廟號髙祖劉聦崔鴻十六國春秋前趙録曰劉聦字玄明一名載淵第四子母張夫人之孕夢日入懷寤而告淵淵曰吉徴也自是十五月而生聦夜有白光之異左耳一白毫長二尺餘幼而聦寤究通經史百家之言孫吴兵勢靡不通之猨臂善射彎弓三百斤膂力驍捷冠絶一時以永嘉四年僣即帝位于光極前殿大赦改年光興元年以衞尉呼延晏爲前鋒大都督配禁兵二萬七千自宜陽入洛州命東萊弥龍驤矅鎮軍勒進軍㑹之比及河南十二敗晉師長驅圍洛陽䧟之縱兵大掠幽晉帝于端門煞晉太子及諸百官巳下二十餘人洛水北築爲京觀遷帝及太后侍中庾珉等于平陽大赦改光興爲嘉平元年二月晉帝進號儀同三司㑹稽郡公聦引帝入讌謂曰卿爲豫章王時朕曽與王武子相造武子介朕於卿言聞其名乆矣以卿所作樂府歌文示朕謂朕曰聞君善爲辭賦試爲看之朕時與武子俱爲盛德頌卿稱善乆之又引朕射于皇堂朕得十二籌卿與武子俱得九籌卿贈朕柘弓銀硯頗憶不帝曰臣敢忘之伹恨尓曰不早識龍顔聦曰卿家骨肉相殘何其甚也帝曰此殆非人事皇天之意大漢將應乾受暦故爲陛下自相驅除且臣家若能奉武帝之業九族敦睦者陛下何由得之三年正月醼於光極前殿逼晉帝行酒庾珉王隽等起而大哭聦惡之二月丁未懷帝崩于平陽於是誅珉等三月立貴嬪劉氏爲皇后四月愍帝即位於長安車騎矅等攻長安河東地震雨于平陽建元元年正月黒霧四塞着人如墨五日而止辛酉庚時日落地三月相承出於西方東行平陽地震崇明觀䧟爲池水赤如血赤氣至天有赤龍奮迅而去流星起于牽牛入紫微龍形逶迤其光照地落于平陽北十里視之則肉臰聞于平陽長三十歩廣二十七歩肉旁常有哭聲晝夜不止聦甚惡之癸未劉后産一虵一虎各害人而走㝷之不得頃之見在隕肉旁己丑劉氏卒乃失此肉哭聲亦止十一月以晉王粲爲國相大單于㹅百揆十二月宣光陵石人皆行數歩宫中鬼哭麟嘉元年武庫䧟入地一丈五尺聦自去冬至是遂不復受朝賀軍國之事一决於粲立市於後庭與宮人讌戲或三日不醒七月河東大蝗唯不食栗豆司隷靳准率部民牧而埋之哭聞于十餘里然後鑚土飛岀復食黍豆大司馬矅攻䧟長安外城九月犬與豕交于宫門有豕着進賢冠昇聦御㘴犬冠帶綬與豕並昇俄而闘死殿上宿衛莫有見其入者長安飢甚死半麴允爲粥以供帝膳帝泣曰今窘厄如此外無救援勢不自支乃使侍中宗敞奉牋降矅敞隨使者至帝内祖牽羊輿襯銜壁出降東門矅受璧焚櫬遷愍帝及司徒梁汾驃騎麴允等諸臣百餘人至于平陽聦臨光極殿帝稽顙于前麴允伏地大哭扶不能起聦大怒允自殺以帝爲光禄大夫懷安侯以大司馬矅假黄鉞大都督陜西諸軍事太宰秦王二年正月東平王約卒十一月聦校獵上林以晉帝行車騎大將軍戎服執㦸前導行三驅之禮觀者皆指帝曰此故長安天子聚而觀之故老亦有悲泣者十二月大饗于光極前殿聦欲觀晉臣之意使帝行酒洗爵更衣又使帝執蓋多有涕泣或有失聲者尚書郎辛賔起而抱帝大哭引出斬之戊戌愍帝崩于平陽三年聦所居螽斯則百堂灾㑹稽王康已下二十一子焚焉而卒自此鬼哭宮至於九月夜聲不絶四月尚書令王監崔懿之等極諫聦大怒收監等斬之秋七月鬼哭于光極殿聦晝見東平王約甚惡之徴秦王矅爲丞相録尚書事固辭仍以丞相領雍州收靳准爲大司空領司隷校尉癸亥薨于建始殿甲子粲即位大赦改年漢昌葬宣光陵爲謚昭武皇帝廟號烈宗八月以丞相矅爲相國大都督司空靳准爲將軍領尚書事粲荒酗酒色遊讌後庭軍國之事一決於准准遂勒兵入宮執粲數而殺之追謚靈帝劉氏無少長男子盡刑于市發掘二陵焚燒宗廟鬼大哭聲聞百里准自號漢大王置百官遣使稱蕃于晉相國矅自長安赴難前趙録曰麟嘉元年十二月大將軍東平王約卒一指猶煖遂不殯殮至甲戌乃蘇言見淵於不周山經五日遂復從至崑崙山三日而復反於不周見諸王公卿將相死者悉在大有人民宮室甚壯麗號曰蒙珠離國淵謂約曰東北遮湏夷國無主乆待汝父爲之汝後二年當來後國中大亂相殺害吾家死亡略盡俱可永明輩十數人在耳汝伹還後年當來見汝不遟不乆約拜辭而歸道過一國曰猗尼渠餘國引約入宫與皮囊一枚曰爲吾遺漢皇帝約辭而歸謂約曰劉郎後年來必見過當以女相妻約歸置皮囊於机上俄而蘇謂左右曰机上取囊來左右取得開有一方白玉題文曰猗尼渠餘國天王敬信遮湏夷國天王歳在攝提當相見馳使奏呈聦曰若當如此吾不懼死也及聦以戊寅歳薨與此玉并葬焉劉曜崔鴻十六國春秋前趙録曰劉曜字永明淵之族子少孤見養於淵幼而聦惠性託落髙亮與衆不羣鐵厚一寸射而洞之身長九尺三寸手垂過膝生而眉白目有赤光鬚不過百餘根皆長五尺光𥘉元年十月太保呼延晏等自平陽來奔上尊號于矅僣即皇帝位十二月靳准左右車騎喬太王騰等殺准奉六璽來降二年夏四月徙都長安立子熈爲皇太子六月繕宗廟社稷南北郊于長安令曰蓋王者之興必禘始祖我皇家之先岀自夏后居于北夷丗跨燕朔光文以漢有天下歳乆恩德結於民庶故立漢祖宗之廟以懷民望昭武因循遂未悛革今欲除宗廟改國號御以大單于爲太祖其速議以聞於是太保呼延晏等議曰仐宜承晉母子傳號以光文本封盧奴中之属城陛下勲功懋於平洛終於中山中山分野屬大梁趙也宜革稱大趙遵以水行曜從之於是以冒頓配天淵配上帝三年五月西明門内大樹風吹折一宿樹撥撥變爲人形髪長一尺鬚眉三寸皆黄色白有歛手之狀亦有兩脚着履之形唯無目鼻毎夜有聲十日而生柯條遂爲大樹枝葉甚茂四年將於霸陵西南營壽陵侍中喬豫和苞上䟽諫曰伏聞敕旨營陵將周廻四十下深二十五丈以銅爲棺槨黄金飾之臣聞堯葬榖林市不改肆顓頊葬廣陽下不及泉聖王之終也如是秦始皇下固三泉周逾七里身亡之後毀不旋踵闇王之終也如此從喪亂巳來漢帝諸陵咸見踐辱唯霸陵獨全此雖太宗之逹至然抑亦釋之之功興亡奢儉囧然於前唯陛下覽之曜大恱終南山崩崩所得白玉一尺有字曰皇亡皇亡敗趙昌以爲己瑞羣臣咸賀中書監劉均曰山崩石壞國傾民亂皇亡皇亡敗越昌者此言皇室將爲趙所敗趙因之而昌大趙都於秦雍而勒跨全趙趙昌之應當在石勒不在我也曜撫然改容五年曜后羊氏卒故晉惠后也洛陽之䧟納之六年正月天裂廣一丈餘長五十丈十一年七月石虎帥衆四萬人宼擾河東進攻蒲攻矅盡中外精銳自潼關北濟虎懼引師而還曜追而敗之枕尸二百餘里虎奔朝歌遂攻石生于金墉分遣諸將攻討汲郡河内十二月勒自帥衆拒之陣于洛西曜性少酗酒末年尤甚將戰飲數斗常乗赤馬無故跼蝢乃乗小馬比岀復飲斗餘至于西陽門撝陣就平勒將石堪因而乗之師遂大潰曜昏醉奔退馬䧟石渠墜于水上爲堪所執勒將還襄國喻曜使與太子毗書令速降但敕毗與諸大臣匡維社稷勿以吾易意建平末爲勒所殺十二年正月太子毗大司馬南陽王㣧等議欲西保秦州遂相率奔上邽石虎乗勝追戰抌尸千里上邽潰虎執毗及王公已下三千餘人皆殺之自劉淵建號西河至是二十有六載晉書載記曰曜在位十年而敗始元海以懷帝永嘉四年僣立至曜三丗凡二十有七載以成帝咸和四年㓕太平御覽卷第百一十九
