front:
  text: 太平御覽卷第三百九十二
  hash: sha256:1f7a8374f27cd3bf79877cff7bce22edba446842640165f3c049910daf9302ac
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_392-1a}
body:
  text: 人事部三十三吟嘯嚬吟釋名曰吟嚴也其聲夲出於憂愁故聲嚴肅使聽之悽歎也說文曰吟歎也毛詩關雎序曰吟詠情性以諷其上東觀漢記曰梁鴻常閉户吟咏書記遂潜思著書十餘篇魏志曰管輅隨軍而行過母丘儉墓下倚樹哀吟精神不樂人問其故輅曰林木雖茂無形可乆碑誄雖羙無後可守玄武臧頭蒼龍無足白虎衘尸朱雀悲哭四危以備法當㓕族不過二載應至矣卒如其言蜀志曰諸葛亮字孔明早孤躬耕壠畒好爲梁甫吟毎自比於管樂唐書曰蔡允㳟荆州江陵人有風彩解綴文雅善吟詠煬帝所屬詞賦多令諷誦之莊子曰北門成問黄帝曰帝張咸池之樂於洞庭之野吾聞之藹藹黙黙乃不自得帝曰吾奏以隂陽之和燭以日月之明其聲能長慮之不知望之不見曭然立於四虛之通倚槁梧而吟又曰莊子謂惠子曰今子外乎子之神勞乎子之精依樹而吟處槁梧而瞑文士傳曰李康清廉有志節不能和俗爲卿里豪右之所共害故官塗不進作遊山九吟辭曰蓋人生天地之間若流電之過户牖輕塵之捿弱草矣湘中記曰渉湘千里但聞漁父吟中流相和其聲綿邈也盛弘之荆州記曰新城郡瀙𥘉覲切水别有一溪其傍有白馬塞孟逹登之歎曰金城千里遂爲上瀙吟彼方人猶傳此聲韻悽激其哀思之音乎西京雜記曰相如將娉茂陵人爲妄文君作白頭吟鹽鐡論曰曽子倚山而吟山鳥下翔丗說曰韓壽羙姿容賈公辟爲掾充毎聚㑹其女於青璅中看見壽心甚恱之乃問其婢識此人不婢說是其先主女内懷存想發於吟咏婢後往壽家具說如此并言女色麗壽聞之心動乃因婢通意婢以白女女大喜乃期徃宿壽趫捷絶人乃踰墻而入家中莫知自是賈公覺女恱暢有異於常陳武別傳曰陳武字國夲休屠胡人常騎驢牧羊諸家牧竪十數人或有知歌謡者武遂學太山梁父幽州馬客吟及行路難之屬阮籍樂論曰漢順帝上恭陵過樊濯聞鳴鳥而悲泣下横流曰善哉鳥鳴使左右吟之使聲若是豈不佳乎此謂以悲爲樂也王粲登樓賦曰鍾儀幽而楚奏莊舄顯而越吟嘯說文曰嘯吟也雜字解詁曰嘯吹聲也毛詩江有汜曰之子歸不我過不我過其嘯也歌箋大嘯蹙口而出聲也又白華白嘯歌傷懷念彼碩人後漢書曰南陽太守成瑨委功曹岑晊郡中謡曰南陽太守岑公孝弘農成瑨但坐嘯漢晉春秋曰桓帝幸樊城百姓莫不觀有一老父獨耕不輟議郎張温使問焉父嘯而不荅魏略曰諸葛亮在荆州遊學毎晨夜常抱膝長嘯魏氏春秋曰阮籍少時嘗遊蘇門山山有隱者莫知其姓名有竹實數斛臼杵而巳籍從之與談太古無爲之道五帝三王之義蕭然曽不經聽籍乃對之長笑清韻響亮蘇門生逌尓而笑籍旣降蘇門生亦嘯若鸞鳯之音晉陽春秋曰嵇康見孫登對之長嘯逾時不言康辭還曰先王竟無言乎登曰惜哉晉中興書曰桓石秀風韻秀徹叔父冲嘗與石秀共獵獵徒甚盛觀者傾坐石秀未嘗瞻盻嘯咏而已晉書曰石勒年十四隨邑人行販洛陽倚嘯上東門王衍見而異之謂左右曰向胡鶵吾觀其聲視有竒志將恐爲天下之患馳遣收之㑹勒去又曰謝弈桓温辟爲安西司馬猶推布衣之好在温座岸幘嘯咏無異常日温曰我方外司馬又曰王徽之在吴中一士大夫家有好竹欲徃觀之乃遥造竹下諷嘯良乆主人洒掃請坐徽之不頋將去主人乃閉門徽之盡歡而去又曰謝鯤隣家髙氏有女常徃挑之女方織以梭投折鯤齒旣歸微然長嘯曰猶不廢我嘯也趙書曰石勒屯葛陂值天雨不息勒長史刀應勸勒降晉勒愀然而嘯張賔勸勒還北勒攘臂曰賔計是也應冝斬吴越春秋曰越王念吴欲復之乃中夜抱拄而哭哭訖承之以嘯於是羣臣咸曰君王何愁心之甚也夫復讎誅敵非君王之憂自是臣下之急務又曰吴王闔閭將欲伐楚登臺南向而嘯有頃而歎羣臣莫有暁王意者子胥乃薦孫子孫子者吴人名武善爲兵法僻隱幽居丗人莫知其能英雄記曰向栩爲性卓詭不凢好讀老子狀如學道又復似狂居甞竈北坐𬒳髮喜長嘯人客從就輙伏不視人有於栩前獨拜栩不荅山海經曰玉山者是西王母所居也西王母其狀如人豹尾虎齒而善嘯蓬髮戴勝蓬髮亂髪勝玉勝也莊子曰童子夜嘯鬼數若齒孫登列傳曰孫登字公和汲郡共縣人清静無爲其情志悄如也好讀易彈琴頽然自得觀其風神若遊六合之外當魏末共處北山中以石室爲宇編草自覆阮嗣宗聞登而徃焉適見公和苫蓋𬒳髮端坐巖下鼓琴嗣宗自下趨進旣坐莫得與言嗣宗乃嘹嘈長嘯與琴音諧㑹雍雍然登乃逌尓而笑因嘯和之妙響動林壑風氣清太玄竹林七賢論曰阮籍字嗣宗性樂酒善嘯聲聞百歩箕踞嘯歌酣放自若時蘇門山中忽有真人在焉籍親徃尋其人於巖巔遂登嶺從之箕坐相對籍乃啇略終古以問之仡然不應籍因對之長嘯有頃彼乃斷然嘆曰可更作籍又嘯意盡退還半嶺聞嶺巓然有聲若數部鼓吹頋瞻乃向人之嘯也丗說同王廙別傳曰王道與庾亮遊于石頭㑹遇廙至是日迅風飛㠶廙倚樓而長嘯神氣甚逸王子年拾遺記曰太始二年南方有囙霄之國人皆善嘯大丈夫嘯聞百里婦人嘯聞五十里如笙竽之音秋冬則聲清髙春夏則聲沉下人舌尖處倒向喉内亦云有兩舌重沓以爪徐徐刮之則嘯聲踰逺故吕氏春秋云反舌殊郷之國即此之謂也列女傳曰魯􅃮室之女者過時未適人當穆公之時君老太子㓜女倚柱而嘯隣人婦從謂曰何嘯之悲也子欲嫁乎女曰吾憂魯君老而太子少也西京雜記曰東方生善嘯毎一曼聲長嘯塵落瓦飛郭子曰劉道眞少時劉寳字道眞髙平人安北將軍漁釣而憊於草澤善歌嘯聞之者無不留連有一老嫗識其非常人甚樂歌嘯乃殺豚進道眞食豚盡了不謝丗說曰晉文王徳盛功大坐席嚴敬擬於王者惟阮籍在坐箕踞嘯歌酣飲自若又曰劉越石爲胡騎所圍數重窘迫無計劉依夕乗月登樓清嘯胡賊聞之皆悽悲長歎又曰謝太傅盤桓東山時與孫興公諸人泛海戲風起浪湧諸人色動並唱使還太傅神情方雅王逸少吟嘯不言又曰王子猷嘗寄人空宅便令種竹嘯詠良乆直指竹曰何可一日無此君又曰謝萬北征甞以嘯詠自髙未甞撫慰衆士謝公謂曰汝爲元帥冝數喚諸將慰勞之萬都無其說直以如意指四座曰諸公皆是勁卒諸將甚怨之捜神記曰趙炳甞臨水從舡人乞渡舡人不許炳乃張盖坐其中長嘯呼風亂流而濟潯陽記曰桓宣穆使人尋廬山見一人謂之曰君過前嶺必逢二年少相隨長嘯試要問之若不與言者可速去此人過嶺果見二年少以𬒮掩鼻長嘯狀如惡獸呼不與言神境記曰營道郡西有靈源山有石髓紫芝者有採藥此山聞林谷間有長嘯者今樵人徃徃猶聞焉異苑曰潯陽姑石在江之坻𥘉桓玄西下令人登之中嶺便聞長嘯聲甚清徹至峯頂見一人踑踞石上嘯旨曰嘯者其氣激於喉中而濁謂之言激於舌端而清謂之嘯言之濁可以通人事逹情性嘯之清可以感鬼神致不死出其言善千里應之出其嘯清萬靈授職故古之學道者重矣又曰太上道君授於西王母西王母授於南極眞人南極眞人授於廣成子廣成子授於嘯父嘯父授於務光務光授於舜舜演之爲琴以授禹自後而廢續有晉太行山仙君孫公得之乃得道而無所授焉阮嗣宗所得少分其後堙㓕不復聞矣又曰嘯有一十五章一曰權輿嘯之始也二曰流雲乃古之善嘯者聽韓娥之聲而寫之三曰深溪虎古之善嘯者聽溪中虎聲而冩之四曰髙栁蟬古之善嘯者聽而寫之五曰空林夜鬼古之善嘯者夜過空林聞而冩之六曰巫峽猿古之善嘯者聞而冩之七曰下鴻鵠出於師曠演清角之音善嘯者冩之八曰古木鳶九曰龍吟皆嘯者聞而冩之十曰動地出於孫公其音亦師曠清徴也十一曰蘇門孫公隱蘇門山之作也十二曰劉公命鬼仙人劉根之所爲也十三曰阮氏逸韻阮籍所作也十四曰正章深逺極大非常聲也十五曰畢音五音之極而大道畢矣晉成公綏嘯賦曰逸羣公子體竒好異傲丗忘榮絶棄人事於是延友生集同好精性命之至機研道徳之玄奥邈跨俗而遺身乃慷慨而長嘯發妙聲於丹脣激哀音於皓齒響抑揚而潜轉氣衝鬱而熛起恊黄宫於清角雜啇羽於流徴飄遊雲於㤗清集長風乎萬里諒自然之至音非絲竹之所擬桓玄與袁冝都書論嘯曰讀卿歌賦序詠音聲皆有清味然以嘯爲髣髴有限不足以致幽旨將未至耶夫契神之音旣不俟多瞻而通其致苟一音足以究清和之極阮公之言不動蘇門之聽而微嘯一鼓玄黙爲之解顔若人之興逸響惟深也哉袁山松荅書曰嘯有清浮之羙而無控引之深歌窮淵根之致用之彌覺其逺至乎吐辭送意曲究其奥豈脣吻之切發一徃之清吟而巳若夫阮公之嘯蘇門之和盖感其一竒何爲徴此一至大疑嘯歌所拘邪嚬韓子曰韓昭侯使人藏弊袴或曰君亦不仁矣弊袴不以賜左右而藏之昭侯曰吾聞明君嚬有爲嚬笑有爲笑袴之與嚬笑相去逺矣吾必待有功故藏之未有與也莊子曰西施病心而嚬其里之醜人見而羙之歸亦捧心而嚬其里之冨人見之堅閉門而不出貧人見之挈妻子而走之夫彼知羙嚬而不知嚬之所以羙嵇康髙士傳曰於陵仲子齊人常歸省母人饋其兄鵝仲子嚬蹙曰惡用是鶂鶂者哉太平御覽卷第三百九十二
