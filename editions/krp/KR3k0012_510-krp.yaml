front:
  text: 太平御覽卷第五百十
  hash: sha256:2020b34a727e7d3aadab84f654628e5f838039186f07f2acb83b583782288b61
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_510-1a}
body:
  text: 逸民部十逸民十嵇康髙士傳曰周豐魯人也潜居自貴哀公執䞇請見之豐辭使人問曰有虞氏未施信於民而民信夏后氏未施敬於民而民敬何施而得斯於民也對曰墟墓之間未施哀於民而民哀宗廟社稷之中未施敬於民而民敬殷人作誓而民始叛周人作㑹而民始疑苟無禮義忠信誠慤之心以蒞之雖固乗結之民其兩不解乎又曰顔歜者齊人也宣王見之王曰歜前歜曰王前王不恱歜曰夫歜前爲慕勢王前爲趍士王作色曰貴乎歜曰昔秦攻齊令曰敢近栁下惠壟樵者罪死不赦有能得齊王頭者封萬户由是觀之生王之頭不如死士之壟齊王曰願先生與寡人遊食太牢乗安車歜曰願得𬞞食以當肉安歩以當輿無事以當貴清浄以自娯遂辭而去又曰魯連者齊人好竒偉俶儻嘗遊趙秦圍邯鄲連却秦軍平原君欲封連連不受平原君文置酒以千金爲壽連笑曰所貴於天下之有者爲人排患釋難而無取也即有取是啇販之事不忍爲也遂隱居海上莫知所在又曰河上公不知何許人也謂之丈人隱德無言無德而稱焉安丘先生等從之修其黄老業又曰鄭仲虞不知何許人也漢章帝自徃終不肯起曰願陛下何惜不爲太上君令臣得爲偃息之民天子以尚書禄終其身丗號之白衣尚書又曰司馬季主者楚人也卜於長安漢文帝時宋忠賈誼爲太中大夫誼曰吾聞聖人不居朝廷必在巫毉試觀卜數中見季主閑坐弟子侍而論隂陽之紀二人曰觀先生之狀聽先生之辭丗未嘗見也尊官髙位賢者所處何業之卑何行之汙季主笑曰觀大夫類有道術何言之陋夫相引以勢相導以利所謂賢者乃可爲羞耳夫内無飢寒之累外無刼奪之憂處上而有敬居下而無害君子道也卜之爲業所謂上德也鳯凰不與燕雀爲群公等喁喁何知長者二人忽忽不覺自失後遂不知季主所在史記又載又曰班嗣樓煩人也丗在京師家有賜書内足於財好老莊之道不屑榮官桓君山從借莊子報曰若莊子者絶聖棄智修性保身清虚淡泊歸之自然釣漁於一壑則萬物不干其志栖遲於一丘則天下不易其樂今吾子伏孔氏之軌跡馳顔閔之極藝旣繫率於丗教矣何用大道爲自炫燿也昔有學歩邯鄲者失其故歩匍匐而歸恐似此類故不進也其行巳持論如此遂終于家又曰蔣詡字元卿杜陵人爲兖州刺史王莽爲宰衡詡奏事到㶚上稱病不進歸杜陵荆棘塞門舎中三徑終身不出時人諺曰楚國二龔不如杜陵蔣翁又曰王眞字叔平杜陵人李邵公上郡人眞世二千石王莽辟不至嘗爲杜陵門下掾終身不窺長安城但閉門讀書未嘗問政不過農田之事邵公王莽時避地河西違武中竇融欲薦之固辭乃止家累百金優遊自樂又曰薛方齊人飬德不仕王莽安居迎方因謝曰堯舜在上下有巢許今明王方欲隆唐虞之德亦由小臣欲守箕山之志莽恱其言遂終于家又曰龔勝楚人王莽時遣使徴聘義不事二姓遂不食而死有老父來吊甚哀旣而曰嗟乎薫以香自燒膏以明自消龔先生竟夭天年非吾徒也趍而出終莫知其誰也張顯逸民傳曰曹子臧者曹宣公之子也宣公卒負芻殺太子留而自立是爲曹成公其後晉執成公將見子臧於周而立之子臧辭曰前志有之聖逹節次守節下失節爲君非吾節也遂亡命奔宋晉侯請子臧反國而歸成公子臧以國致成公爲君見左傳又曰周黨字伯况整身清約非法不行建武中徴爲義郎以病去詔曰昔夷齊不食周粟太原周黨不食朕禄後終隱居娯志不營於丗虞般佑髙士傳曰皇甫士安少執冲素以耕稼爲業專心好學毎改服以行兼日而食得風痺或多勸修名士安荅曰居畎畒之中亦可以樂堯舜之道何必崇勢利而後名乎詔以爲太子中庻子著作郎並不應也又曰朱冲字巨容南安人少有德行閑静寡欲好學而貧隣牛犯種擔蒭送牛牛主人大慙乃不復暴晉咸寧二年詔曰處士朱冲履行髙㓗經學修明徴爲愽士及太子中庶子冲毎聞徴書至輒逃入深山以免居近夷俗羌戎奉事若君也又曰劉兆字延丗公府五辟三徴皆不就安貧慕道潜志𫐠作數十年不出門凡是述十餘萬言又曰伍朝字丗明好學該愽顯命屢加不就鎭南將軍劉弘上請𥙷零陵太守主者以非選竟不聽尚書郎胡濟言朝守静衡門志道日新誠江南之良才丘園之逸老也且白衣爲郡前漢有舊賁于家食近代所崇事可行也朝竟不就後卒於家王隱晉書亦同也又曰郭文舉河内軹縣人年十三有懷隱志毎行山林旬日忘歸父母喪終辭家不娶入陸渾嵩山少室乃隱華隂之崖以觀石室之石函洛下將没歩擔入呉興餘杭大辟山窮谷無人之地倚木於樹苫覆其上亦無壁鄣時多虎暴而文獨宿積十餘年恒着鹿皮裘葛巾司徒王公迎置果園中衆人問文曰飢而思食壯而思室自然之性先生安獨無情乎文曰情由意生意息則無情又問先生獨處窮山若疾病遭命終則爲烏鳥所食頋不酷乎文曰藏埋者亦爲螻蟻所食復何異哉又曰狼虎害人先生獨不畏乎文曰人無害獸之心獸亦不害人耳居園七年逃歸餘杭袁淑真隱傳曰蘇門先生嘗行見採薪於阜者先生嘆曰汝將以是終乎哀哉薪者曰以是終者我也不以是終者我也且聖人無懷何其爲哀聖人以道德爲心不以冨貴爲志因歌二章莫知所終又曰鬼谷先生不知何許人也隱居鬼谷山因以爲稱蘇秦張儀師之遂立功名先生遺書勉之曰二君豈不見河邊之樹乎僕御折其枝風浪盪其根此木豈與天地有仇怨所居然也子見嵩岱之松柘乎上枝干於青雲下根通於三泉千秋萬歲不逢斧斤之患此木豈與天地有骨肉所居然也又曰鄭長者隱德無名著書一篇言道家事韓非稱之丗傳是長者之辭因以爲名又曰南公者楚人埋名藏用丗莫能識居國南鄙因以爲號著書言隂陽事又曰野老六國時人遊秦楚間年老隱居掌勸爲務著書言農家事因以爲号又曰鶡冠子或曰楚人隱居幽山衣弊履穿以鶡爲冠莫測其名因服成號著書言道家事馬煖常師事之煖後顯於趙鶡冠子懼其薦巳也乃與煖絶又曰楚人有獻魚于楚王曰今日漁獲食之不盡賣之不售弃之又可惜是故來獻左右曰鄙哉辭也楚王曰漁者仁人將以誨我也乃恤鰥寡而存孤獨出倉粟發幣帛去後宫楚國大治又曰河上丈人家貧編蕭自給其子沒泉得千金之珠丈人曰取石來鍜之夫千金之珠必在九重之泉驪龍頷下子能得其珠者遇其睡也使龍而寤子其韲粉矣又曰孫叔敖遇狐丘先生曰僕聞人有三利必有三患子知之乎夫爵髙者人妬之官大者主惡之禄厚者怨處之叔敖曰不然吾爵髙而志益下官大而志益小禄厚而施益溥丈人曰善哉言乎堯舜其猶病諸又見列子又曰客有候孔子者顔淵問曰客何人也孔子曰窅兮泛兮吾不測也夫良玉徑尺雖有十仭之土不能掩其光明珠度寸雖有函丈之石不能戢其曜苟藴羙自厚容止可知矣說苑曰衛有丈夫負缶入井灌韭終一日一區鄧析下車教之爲機後重前輕命曰槁終日灌韭百區不倦衛丈夫曰吾師言有機智之心我非不知不欲爲也雜記事曰徐稚忽榮禄陳蕃欽其髙行以禮招請署爲功曹及師友祭酒又特爲設東面之坐重席佩巾几以候之稚辭疾不到王僧䖍呉地記曰處士陸著字文伯漢桓靈之間州府交辟並不就唯事棲遁臨卒誡諸子弟云吾少未嘗官勿苟仕濁丗子弟遵訓遂二代不仕並有盛名又曰桐廬縣東有大溪九里注廬溪口南通新安東出冨陽青山緑波連霄亘壑昔徴士散騎常侍戴勃遊此自言山水之致極也勃字長雲譙國銍人父散騎常侍逵字安道弟子常侍國子祭酒顒並髙蹈俗外三葉肥遁爲海内所稱梁典曰戴顒字仲若與逵並隱遁有髙名顒以父不仕復循其業辟皆不就梁蕭繹孝德傳曰繆斐字文雅東海蘭陵人丗亂將家避地海濵不以遯丗爲悶不以窮居爲傷浣衣濯冠以俟絶氣道學傳曰樂鉅公者宋人獨好黄老恬静不慕榮貴號曰安丘丈人又曰孔惣㑹嵇山隂人逸操不群唯有一奴自隨奴善吹笙揔爲洛生詠與之相對而巳丗說曰郗超每聞欲髙尚隱退者輙爲辨百萬資并爲造立居室在剡爲戴公起宅其精戴始徃居與所親書曰近至剡如入官舎又曰支道林因人就深公買印山深公曰未聞巢由買山而隱陸機招隱詩曰明發心不怡投䃿聊躑躅躑躅欲安之幽人在浚谷朝採南澗藻夕宿西山足輕條象雲構宻葉成翠幄左思招隱詩曰杖䇿招隱士荒途撗古今巖穴無結構丘中有鳴琴陸雲逸民賦曰古之逸民輕天下輕萬物而欲􅌹一丘之忻擅一壑之羙天地不易其樂萬物不干其志然後可以妙有生之極因無疆之休乃爲賦曰相荒土以爲居度山阿而考室層幽翳薈穹谷重深巖木振頴葛藟垂隂潜魚潦沚嚶鳥來吟顧𬞞圃於滋薄即蘭堂於芳林靡飛飄以赴節揮天籟以興音抱迴流之别沼食秋華於髙岑濛三泉以濯流浚金谷以投簮遵渚龍見在林鳯戢遁綿野而宅心望巖穴而凱入太平御覽卷第五百一十
