front:
  text: 太平御覽卷第九百八十五藥部二
  hash: sha256:a6a95aba5f96dfecde82d496e0bda8a784ce083d4ede81c304c9bf1545e00fc9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_985-1a}
body:
  text: 丹芝上丹易叅同契曰丹沙木精得金乃并書曰荆及衡陽惟荆州杶幹栝栢礪砥砮丹砥細於礪皆磨石也砮石中矢鏃丹朱類汲冢周書王會曰成王時濮人獻丹沙濮人西南角之蠻丹沙所出禮儀曰君乗木而王地生丹孝經援神契曰德至山陵則陵出黒丹宋均注曰丹應五典備五色也春秋斗運樞曰揺光得陵出黑芝亦令人長生以金投中則名爲金漿以玉投中則名爲玉澧服之皆長生又有取伏丹法云天下諸水有石丹者其水中皆有丹魚先夏至十日夜伺之丹魚必浮於岸側赤光上照赫然如火網而取之雖多勿盡取之也割取血以塗足下則可歩行水上長居水中史記曰寡婦清先得丹穴而擅其利清寡婦能守其業始皇爲女築懐清䑓梁書曰陶弘景旣得神符祕訣以爲神丹可成而苦無藥物帝給黄金朱沙曽青雄黄等後合飛丹色如霜雪服之體輕及帝服飛丹有驗益敬重之唐書曰道士劉道合者宛丘人髙宗令合還丹丹成而上之咸亨中卒唯有空皮而背上開拆有似蟬蜕髙宗聞之曰劉師爲我合丹自服仙去其所進者亦無異典略曰白丹者山陵之精也淮南子曰赤水冝丹黄水冝金清水冝龜抱朴子曰余考覽飬生之書究集乆視之方曽所披渉篇以千計矣莫不以還丹金液爲大要焉然則二事盖仙道之極也服此而不仙則古無仙矣昔左元放於天注山中精思神人授以丹經仙公從元放受之凡受太清丹經三卷及九鼎丹經一卷金液經一卷子師鄭君者子從祖仙公之弟子乃於馬迹山中立墠盟受之并具諸口訣之不書者又曰太清神丹其法出元君元君者老子之師也太清觀天經有十四篇云其上七篇不可以教授其中四篇無足傳甞沉之三泉下篇者正是丹經上中下三卷其經曰上下得道長生丗間又曰漢末新野隂君合此太清丹得仙其人本儒生有才思著詩及丹經讃并序述初學道凌師本末引已所知識之得仙者四十餘人甚分明也又曰有九光丹與九轉異法大都相似耳作之之法當先以諸藥合水火以轉五石五石者丹砂雄黄礜石曽青磁石也一石轉五轉而各成五色五石合爲二十五色色各一兩而異器盛之欲起死人未滿三日取清丹一刀圭和以水浴死人之身又以一刀圭發其口内之死人立生欲致行厨取黒丹和以塗左手所求如所道皆自致可致天下萬物也欲隠形及先知未然方來之事及住年不老服黄丹一刀圭即便長生不復老坐見千里之外吉凶皆如在目前也人生相命盛衰壽夭貴賤貧冨皆知之矣其法具在太清中卷又曰五帝雲丹方一卷其法五也用丹砂雄黄石流黄曽青礐石磁石礬石戎鹽太一禹餘粮亦同用太一泥及神室祭醮之三十六日成又曰以金液爲威喜巨勝之法取金液及水銀合煑之三十日岀以黄土甌盛封以太一泥置之猛火上炊之卒時皆化爲丹服如小豆便仙以此丹一刀圭粉和水銀一斤即成銀又取此丹一斤置猛火上扇之化爲赤金而流名曰丹金以塗刀劒兵去萬里以此丹金爲盤椀食其中令長生以承日月得神液如方諸之得水也飲之令人不死又曰九丹誠爲仙藥之上然合作之所用雜藥甚多若四方清通者市之可得取若九域分攝則其物或不可得也又曰葛雅川云余祖鴻臚少時曽爲臨沅令云此縣有廖氏家丗壽考或出百或八九十後徙去子孫多夭折他人居其故宅者復累丗壽由此乃覺是宅所爲而不知其何故疑其井水殊赤乃試掘井左右得古人埋丹沙數十斛山海經曰拒山英水岀焉其中多丹粟又曰始州國有丹山論衡曰太公隂謀書武王伐紂食小兒以丹金身純赤長大教云殷王亡民見兒身赤以爲天神說文曰丹越之赤石也雘善丹也神仙傳曰采女請問彭祖延年之法彭祖曰欲舉形登天上𥙷仙官者當用金丹此九君太一所以白日昇天又曰馬明生從道人受太清神丹經三卷入山合藥服之不樂昇天但服半劑爲地仙展轉九州百餘年乃白日昇天也又曰淮南王安從八公受丹經及三十六水方又曰李少君從安期先生受神丹爐火之方家貧不得藥乃以方干漢武帝云又曰葛玄字孝先從左元放受九丹金液仙經又曰劉元鳯南陽人服芙蓉丹及鷄子丹魯女生別傳曰李少君字雲翼齊國臨淄人也少好道入山採藥修全身之術道未成而病困於山林中遇安期先生經過見少君少君叩頭求乞生活安期愍其有志乃以神樓散方與服之即起少君求隨安期奉給奴役廣志曰丹朱沙之朴也大者如米生山中出牂牁與古僂國裴淵廣州記曰鄣平縣有朱沙塘水如絳又曰鄣平縣有石膏山望之若霜雪又一嶺東爲銀石南是䥫石西則丹沙北乃銅石本章曰丹砂味甘微寒生山谷養精神益氣明目鈆丹味辛微寒生平澤治吐逆胃反乆服成仙生蜀都吴氏本草曰丹砂神農甘黄帝歧伯苦有毒扁鵲苦李氏大寒或生武陵採無時能化朱成水銀畏礠石惡鹹水武陵太守謝承表曰新宫成上丹砂五百斤上億萬歲壽芝上春秋運斗樞曰摇光得陵出黒芝孝經援神契曰德至草木則芝草生尓雅曰苬似由反芝也郭璞曰芝一歳三華瑞草漢書曰武帝時芝生殿内房中九莖詔赦天下作芝房歌又曰宣帝神爵元年三月詔曰金芝草九莖服䖍曰色象金産于函德殿銅池中如淳曰函亦含也銅池承霤也晉灼曰以銅作池韋昭曰以銅飾池邊也東觀漢記曰明帝永平七年公卿以芝生前殿奉觴上壽桓帝建和元年芝草生中黄藏府又曰光和四年郡國上芝草英續漢書曰建𥘉五年零陵女子傅寧宅内生紫芝五株長者尺四寸短者七八寸太守沈豐使功曹齎芝以聞帝告示天下宋書曰順帝升明二年臨城縣生紫盖黃裏芝芝歷時質色不變唐書曰貞觀中皇太子寢室中産素芝十四莖並爲龍興鳯翥之刑又曰天寳中有玉芝産于大同殿之柱礎一夲兩莖神光照於殿又曰上元中延英殿御座生玉芝一莖三花御製玉靈芝詩淮南子曰巫山之上從風縱火紫芝與蕭艾俱死又曰稻生水而不能生於湍瀬之流芝生於山而不能生於盤石之上抱朴子曰芝者有石芝有木芝有草芝有肉芝有􅌲芝名有百許種也石芝者石象生於海隅石山及島嶼之涯肉芝者狀如肉頭尾四足良似生物也附於大石盖在高岫嶮峻之地或却着仰綴也赤者如珊瑚白者如截肪黒者如澤􅃮青者如翠羽黄者如紫金而皆光明洞徹如堅氷也晦夜去之一二百歩便望見其光矣大者十餘斤小者三四斤非乆齋至精及佩老子入山靈寳五符亦不能得見此凢見諸芝且先以開山却害符置其上則不得復隱蔽化去矣徐徐擇王相之日設醮然後取之皆從日下禹歩閉氣而徃也又得石象擣之三萬六千杵服方寸匕日盡一斤則得千歳十斤則萬歳亦可分人服之玉脂芝生於有玉之山常居懸危之處玉膏流出萬年已上則凝而成芝有似鳥獸之形色無常采率多似山水蒼玉也亦鮮明如水精得而采之以無心草汁和之湏㬰成水服一升得一千歳也又曰七明九光芝皆石也生臨水之髙山石崖之間狀如盤椀不過徑尺以還有莖葉連綴之起三四寸有七孔者名九光皆如星百餘歩内夜可望見其光其光自別常以秋分伺之得之擣服方寸匕人服則噏然身熱五味甘美盡一斤則得千歳令人身有光所居暗地如月可以夜視書也又曰石蜜芝生少室石户中户中便有深谷不可得過以石投谷中半日猶聞其聲也去户外十餘丈有石柱柱上有偃盖石南度徑可一丈許蜜芝生石上墮入偃盖中良乆輙有一滴有似雨後屋之餘漏時時一落耳然蜜芝墮不息而偃盖亦終不溢也户上刻石爲科斗字曰得服石蜜芝一斗者壽萬歳諸道士共思推其處不可得徃唯當以椀器着勁竹木端以承取之然竟未有能爲之者按此户上刻題如此前世必已有得之者也又曰石桂芝生山巖穴中似桂樹而實石也髙尺光眀而味辛有枝條檮服之一斤得千歳也石中黃子所在有之沁水山爲尤多在其在大石中則其石常潤濕不燥打其石石有數十重乃得之在大石中赤黄溶溶如鷄子之在殻中也即當飲之不飲則漸堅凝成石不復中服也法正當及未堅時歠之旣凝則不得服也破一石中多者有一升少者有數合不可頓服雖不得多相繼服之其計前後所服合成三斗則千歳但欲多服唯患難得耳又曰石脛芝生滑石中亦如石中黄子狀但不皆有耳打破大滑石千許乃可得一斤𥘉破之其在石中五色光明而自動服一升得千歳矣又曰木芝者松栢脂淪地千歳化爲伏芝萬歳其上生小木狀似蓮花名曰木威喜芝夜視有光持之甚滑燒之不燋帶之辟兵以帶鷄而雜他鷄十二頭共籠之去十二步射十二箭他鷄皆傷帶威喜芝者終不傷也從生門上採之六甲隂中乾之百日末服方寸匕日三盡一枝則三千嵗也太平御覽卷第九百八十五
