front:
  text: 太平御覽卷第四百七十一
  hash: sha256:a1a291c1f7fd6f9f7bf3234edb34dc2a6305c1d63e936f3b361faf73cac6def0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_471-1a}
body:
  text: 人事部一百一十二富上周易曰富有之謂大業兼濟萬物故有曰冨有尚書曰五福二曰富毛詩曰瞻烏爰止于誰之屋冨人之屋烏所集禮記曰儒有不保金玉而忠信以爲寳不祈土地立義以爲土地不祈多積多文以爲富也又曰富潤屋德潤身又曰問國君之冨數地以對山澤所出問大夫之冨曰有宰食刀祭器衣服不假問士之冨以車對問庶人之冨數畜以對周禮曰太宰掌建邦之六典以佐王平邦國六曰事典以冨邦國左傳曰秦后子有寵於桓后子秦桓公子也景公之母弟公子鍼如二君於景其母曰不去懼選選數也君子奢冨弗去君將數其罪而加也又曰齊慶氏亡分其邑與晏子晏子不受人問曰富者人之所欲也何爲不受對曰我非惡富恐失富也又曰𥘉衛公叔文子朝而請享靈公退見史鰌而告之史鰌曰子必禍矣子冨君貪罪其及子乎文子曰君旣許我矣其若之何史鰌曰無害也子臣可以免子雖冨禮恭不失臣禮富而能臣必免於難戍也驕戌子之才公救戍也其亡乎又曰鄭駟秦富而侈嬖大夫也而常陳卿之車服於其庭鄭人惡而殺之論語曰孔子曰富而可求也雖執鞭之士吾亦爲之如不可求從吾所好又曰季氏富於周公而求也爲之聚歛而附益之子曰非吾徒也小子鳴鼓而攻之可也求冉有名也季氏富矣而求聚民財以增之又曰富與貴是人之所欲不以其道得之不處也又曰不義而富且貴於我如浮雲又曰富而無驕易又曰富而好禮史記曰孔氏用䥫冶爲業秦伐魏遷孔氏南陽大鼓鑄䂓陂池連車騎遊諸侯因賈之利有遊聞公子賜與名然其羸得過當愈於纎嗇家致富數千金故南陽行賈盡法孔氏之雍容又曰計然曰貴出如糞土賤取如珠玉財幣欲其行如流水脩之十年國富又曰蘇秦說齊王曰臨淄富而實其人無不闘雞走狗六博蹴踘者又曰范蠡之陶乃營生積居與時馳逐十九年之中三致千金又曰君子富好行其德小人富以適其力又曰白圭曰吾營生猶伊尹吕尚之謀又曰穰侯魏冉之冨冨於王家出閞輜車千乗有餘又曰白圭樂觀時變歲熟取糓與之絲􅃮繭出取帛絮與之食趍時若猛獸鷙鳥之發又曰卓氏用鐡冶冨又曰程鄭冨埒卓氏又曰呉楚七國兵起時長安中列侯封軍從軍旅齎貸于錢子家以爲侯邑國在閞東成敗未决莫肯與唯無塩氏捐千金貸息什之三月呉楚平一歲中則無塩氏息十倍用此冨埒閞中又曰關中冨啇大賈盡諸田田韋家粟氏安陵杜氏亦巨萬此其章章尤異者也皆非有爵邑奉禄弄法犯姧而冨也盡推理去就與時俯仰獲其羸利以來致財用也又曰吕不韋徃來販賤賣貴家累千金又曰齊俗賤奴虜而刁間獨貴人之桀黠奴人所患也惟刁間収使之逐漁塩啇賈之利或連騎交守相然愈益任終得其力起冨數千萬又曰范蠡浮海出齊變名姓自謂䲭夷子及耕於海畔苦身務力父子治生無幾何致錢數千萬齊人聞賢以爲相范蠡嘆曰居致千金官則至卿相此布衣極又受尊名不祥乃歸相印盡散財以分于知交郷黨懷其重寳間行以去止于陶以爲此天下之中交易有無之路通爲生可致冨矣於是自謂陶朱公復約身又耕畜勞居候時轉物逐什一之利居無何則致貲累巨萬天下稱陶朱公也又曰子貢旣學於仲尼退而仕於衛廢著鬻財曹魯之門徐廣曰子貢傳云廢居著猶居也讀音如貯七十子徒賜最爲饒原憲不饜糟糠匿於窮巷子貢結駟車騎束帛之幣以聘諸侯所至國君無不界迎與杭禮者夫使孔子名布揚於天下者子貢先後之也又曰猗頓用盬起而邯鄲郭縱以鑄冶成業與王者埒冨烏氏倮韋昭曰烏氏縣名屬安定倮名也畜牧及衆賣求繒物問遺戎王戎王倍與之蓄至用谷量牛馬秦始皇令倮比封君寡婦清其先得丹穴而擅其利數丗家足不貲清寡婦也能守其業用財自衛不見犯秦皇帝以爲貞婦而容之爲築女懷情臺夫倮鄙人収長清窮郷寡婦禮抗萬乗君顯天下豈非以冨耶又曰夫用貧求冨農不如工二不如啇刺繡文不如倚市門此言末業貧者之資也冨者人之情性所不學而俱顯也今有無祑禄之俸爵邑之人而與之比者命曰素封又曰蜀卓氏之先趙人用鐡冶冨秦破趙遷卓氏見虜畧獨夫妻推輦行諸遷虜少有餘財争干吏求近卜處葭萌唯卓氏曰此地挾薄吾聞岷山之下沃野下有蹲䲭至死不飢民工於市亦乃求逺遷致之臨卭大喜即鐡山鼓鑄運籌策漢蜀之民冨至僮千人田池射獵之樂擬於人君程鄭山東遷虜也亦冶鑄賈椎結之民冨埒卓氏俱居臨卭也漢書曰寗成旣𬒳刑乃詐刻傳出關歸家曰仕不至二千石賈不至千萬安可比人乎乃廣貸陂曲千餘頃假貧人役使數千家致産數千萬爲任俠又曰張耳大梁人少時魏公子母忌爲客嘗亡命遊外黃冨人女甚美庸奴其夫亡邸父客如淳曰父時賔客也謂曰求賢夫從張耳女聽爲請决嫁之女家厚奉給耳以故致千里客官爲外黄令陳餘亦大梁人好儒術遊趙苦陘冨人公乗氏以妻之餘年少父事耳相與爲刎頸交又曰梁孝王未死財以巨萬計不可勝數及死藏府餘黄金尚四十萬斤他財物稱是也又曰張安丗尊爲公侯食邑萬户然身衣弋綈夫人自紡績家僮七百人皆有手伎作事内治産業累積纎微是以能植其貨富於大將軍光也又曰卓氏女文君亡奔司馬相如相與歸成都家徒四壁立相如與俱之臨卭盡賣車騎置酒舎乃令文君當壚相如身自著犢鼻禈與傭保雜作滌器於市中卓王孫耻之爲杜門不出昆弟諸公謂王孫曰有一男兩女所乏者非財今文君旣失身於司馬長卿長卿故倦遊雖貧其人才足依也且又令客柰何相辱如此王孫不得巳分與文君僮百人錢百萬及其嫁時衣𬒳財物文君乃與相如歸成都買田宅爲冨人居又曰鮑宣上書哀帝曰柰何獨私養外親與幸臣董賢多賞賜以萬數奴從賔客漿酒藿肉蒼頭盧兒比日用致冨非天意也又曰上使善相人相鄧通曰當貧餓死上曰然冨通者在我何說貧於是賜通蜀嚴道銅山得自鑄錢鄧氏錢布天下其冨如此餓部中亦岀又曰原渉父哀帝時南陽太守時天下殷冨大郡二千石死官賦歛送䘮皆千萬以上妻子通共受之以定産業時又少行三年䘮者及渉父死讓還南陽賻送行䘮塚廬三年由是顯名京師遊使部中亦出又曰故秦陽以田農而甲一州以田地過限從而富貴爲一州第一翁伯以脂而傾縣濁氏以賣脯而連騎張里以馬毉而撃鍾又曰宣曲任氏之先爲督道倉吏秦之敗豪桀皆争金玉任氏獨窖倉粟楚漢相距滎陽人不得耕種米石至萬四豪桀金玉盡歸任氏以此起冨又曰安邑千樹棗燕秦千樹栗此其人皆與千户侯等又曰劉德寛厚好施家産過百萬則以賑昆弟賔客又曰史丹盡得父財身又食大國邑數見褒賞賜累千金僮奴以百數後房妾數十人内奢淫好飲食極滋味聲色之樂又曰冨者土木𬒳文錦犬馬餘肉粟又曰中大夫張匡上書言王啇宗族權勢合貲巨萬計私奴以千數又曰郡國富人兼利顓業以貨賂自行取重於郷里者不可勝數又曰師史轉轂百數賈郡國無所不至能致千萬又曰京師冨人杜楊樊嘉茂陵勢綱爲天下髙貲又曰所忠言貴家子弟冨人或闘雞走狗馬弋獵博戲亂齊人又曰成都羅裒貲至鉅萬又曰郭况遷大鴻臚上數幸其宅賞金帛甚盛京師號况家爲金穴言其富貴也又曰樊童字君雲世善農稼好貨殖性温厚有法度三丗共財子孫朝夕禮敬常若父家其營理産業物無所棄課役童隷各得其冝故能上下戮力財利歳倍至及廣開田土三百餘頃其所起廬舎皆有重堂髙閣陂渠灌注池魚畜牧有求必給貲至巨萬而賑贍宗族恩加郷閭又曰宣帝時隂子方者至孝有仁恩當臘日晨炊而竈神形見子方再拜受福家有黄羊因以祠之自是以後暴至巨冨有田七百餘頃輿馬僕隷比於封君方常言我子孫必將強大至識三丗而遂繁昌故後常以臘日祠竈而以黄羊又曰王丹字仲因京兆人哀平時仕州郡家累千金隱居養志好施周給毎歲農時輙載酒肴於田間候勤勞者而勞之其墮嬾者耻不致丹皆兼功自厲邑長相師以致冨殷其輕黠游薄廢業爲患者輙䁱其父兄使黜責之没則賵給親自將護其有遭䘮憂者輙待丹爲辦也又曰馬防以病乞骸骨詔賜故中山王田廬以特進就第防弟貴盛奴婢各千人巳上寳貨巨億皆買京師膏腴美業又大起第複觀連閣臨道弥貨曰街路多聚聲樂曲度比諸郊廟賔容畢至京兆杜篤之徒數百人常爲食客居門下刺史守令多出其家謝承後漢書曰戴遵字子髙富於貲産輕財好義賔客常三四百人時人名之關東大豪戴子高魏典畧曰公沙穆字文人北海膠東人也體履清直兼學多文嶾居東萊山中桓帝時有冨人王仲者謂穆曰今多以貸仕吾奉子以百萬唯子所用穆荅曰斯意厚矣夫冨貴在天得之有命以賄求爵姦莫大焉郡舉孝廉除郎中以髙第爲光禄主事吴書曰劉表亡曹公向荆州表子琮降以節迎曹公諸將皆疑其詐曹公以問婁子伯子伯曰天下擾攘各貪王命以自重今以節來是必至誠曹公大喜遂進近寵祑子伯家累千金公曰婁子伯冨樂於孤但勢不如孤耳從破馬超等子伯功爲多曹公常歎曰子伯之計孤不及也蜀志曰董和字㓜宰南郡人益州牧劉璋以爲牛鞞江原長成都令蜀土冨貴時俗奢侈貨殖之家侯服玉食婚姻葬送傾家竭産和躬率之以儉惡之𬞞防過踰僣爲之䡄制所在皆移風變善又曰麋笁字仲祖業貨殖僮客萬人貲産巨億王隱晉書曰石崇雖有人財而性麄強貪而好利冨擬王者有司簿閱崇田宅財物及水碓有三十餘區倉頭八百人他珍寳竒異不可稱數又曰何曽遒豪累丗人有小𥿄爲書者曽勑記室勿報也蒸餅上不垪作十字不食食日膳萬錢猶曰無下筯處又曰刁逹字伯道弟暢字仲逺次弘字叔仁各歷職州刺史兄弟子姪並不治名行競脩貨殖有田萬頃奴婢數千人義旗𥘉建弘將謀起兵宋王遣劉毅誅之刁氏旣冨奴客從横上山固澤爲京口之蠹宋旣誅暢散其糓帛金錢牛羊令民稱力取之弥日不盡時天下飢儉編户菜色及刁氏之破百姓充足徐廣晉記曰石季倫甚冨侈衣服妓樂夸於許史有妓人曰緑珠美孫秀欲之使人求焉崇盡出其婢妾數十人皆藴蘭麝而被羅縠晉諸公讃和嶠字長輿逌之子也少知名以雅重稱常慕其舅夏侯玄之爲人厚自封植嶷然不群拜黄門郎遷中書令轉尚書愍懐太子𥘉立以嶠爲少保加散騎常侍家産豊冨擬王公而性至儉恡宋書曰沈攸之少貧及貴在荆州富擬王侯夜中諸廂廊然燭逹曉曳珠玉者數百人皆一時絶妙孫巖宋書曰徐堪之産業豊冨室宇園池貴遊莫及門生千餘皆三呉冨人子毎岀入行遊塗巷盈滿唐書郝處俊侍中平恩公許圉師即處俊之舅早同州里俱宦逹於時又其郷人田氏彭氏以殖貨見稱有彭志筠顯慶中上表請以家財絹布二萬叚助軍詔授其絹萬疋特授奉議郎仍布告天下故江淮間語曰貴如許郝冨若田彭太平御覽卷第四百七十一
