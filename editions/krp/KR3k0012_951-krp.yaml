body:
  text: 蟲豸部八蚤虱蟣螕蜼螟蛕叩頭食屍蟯蛻蛾蛹蛓蟥蛢班猫地膽蛤蚧龐降蛆蚤焦贛易林萃之大過曰亂頭多憂蚤虱生愁膳夫仲年使我無聊說文曰蚤齧人跳蟲也韓子曰子韋見孔子於啇太宰曰吾見孔子則視子猶蚤虱之細者也今吾見之於君子韋恐孔子貴於君也因謂太宰曰且君巳見孔子亦将視子猶蚤虱太宰弗復見也又曰韓昭侯搔而佯亡一蚤求之甚急左右因取其蚤虱而殺之昭侯以此察左右不誠也淮南子曰昌羊去蚤虱而人弗席者為其來蛉窮也高誘曰窮幽兾謂之蜟蚳入耳之蟲蜟音育又曰釋大道任小枝無異使蟾諸捕蚤論衡曰人在天地之間猶蚤虱之在衣裳螻蟻之在穴隙也趙壹解擯賦曰丹鴻可殺蚤虱抱朴子曰蚤虱羣攻卧不獲安曹植論曰孟春之旦從陽徑生貴放鳥雀者加其禄也得者莫不馴而放之爲利人也得蚤者莫不摩之齒牙爲害身也虞翻與弟書曰其餘幾何老更衣希爲蚤虱所咋故一二相告省書一過悉以付火齊卞士蚤虱賦序曰余居貧布衣十年不製一𫀆之緼有生所託資其寒暑無與易之爲之多病起居甚踈縈寝敗絮不能自釋兼攝性懈惰嬾事皮膚澡刷不謹澣沐失時四體㲰㲰乃耕切加以臭穢故葦席蓬纓之間蚤虱猥流探揣獲撮日不替手虱蟣說文曰虱齧人蟲也蟣虱子也漢書曰項羽謂宋義曰疾引兵渡河破秦必矣義曰不然夫搏牛之䖟不可以破虱䖟諭秦虱諭章邯等言大小不同勢又曰王莽校尉韓威進曰以新室之威而吞胡虜無異口中蚤虱東觀漢記曰馬援擊㝷陽山賊上書曰除其竹木譬如嬰兒頭多蟣虱而剃之蕩蕩然蟣虱無所復依書奏上大恱因出小黄門頭有虱者皆剃之續晉陽秋曰咸陽王猛被緼𫀆而詣桓温一靦談當時之事猛摸虱而言傍若無人温察而竒之晉書曰阮籍著大人先生傳曰少稱郷黨長聞鄰國上欲圖三公下不失州牧獨不見羣虱之處禈中逃乎深缝匿乎壞絮自以爲吉宅行不敢離縫匿乎禈襠自以爲得䋲墨也然炎丘火流焦邑滅都羣虱處於禈中而不能出也君子之處域内何異夫虱之處禈中乎齊書曰江泌性行仁義衣弊虱多綿裏置壁上恐虱飢死乃置衣中數日中終身無復虱又曰卞彬爲南康郡丞彬頗飲酒擯棄形體仕旣不遂乃著蚤虱􅘿蟲蝦蟇等賦皆大有指斥三國典略曰梁劉殻常有飛書謗殻梁主怒曰劉殻似衣中虱少湏搯之音恰北史司馬子如爲大行臺及文襄輔政見之哀其憔悴以膝承其首親爲擇虱賜酒百缾羊五百口粳米五百石子如曰無事尚𬒳囚幾死若受此豈有生路耶列子曰紀昌學射於飛衛使學視小如大紀昌以氂懸虱於牗南面而望之二年之後如車輪焉以覩餘物皆丘山也乃以燕角之弧孤蓬之簳射之貫虱之心而懸不絶以告飛衛飛衛曰汝得之矣莊子曰濡需者豕虱是也擇䟽鬛自以爲廣宫大囿奎蹄曲限乳間股脚自爲安室利處不知屠者一旦布燥烟火而與豕俱燋韓子曰天下無道攻擊不巳甲胄生蟣虱燕雀處帷幄而兵不歸故曰戎馬生於郊淮南子亦云又曰應侯謂秦王曰王得宛臨陳陽夏断河内臨東陽邯鄲猶口中虱也又曰三虱食彘相與訟一虱遇之曰奚訟三虱曰爭肥饒者一虱曰若爾不患臘之将至而烹之也躁目若有奚患於是乃相與聚其目而食之彘痩人乃不殺淮南子曰牛馬之氣蒸不能生蟣虱蟣虱之風蒸不能生牛馬故化生於外非生於内也又曰湯沐具而蟣虱相吊大厦成而鷰雀相賀抱朴子曰夫虱生於我我非虱之父母虱非我之子孫也又曰眼能察天衢而不能周項領之間耳能聞雷霆而不能周蟣虱之音也又曰今頭虱著身皆稍變而白身虱著頭皆漸化而黒則玄素果無定質移易在乎所漸也符子曰齊魯爭汶陽之田魯侯有憂色魯隱者周豊往觀曰臣甞晝寢愀然聞羣虱之鬪乎衣中甘臣膏腴之肌珎臣項膂之膚相與樹黨爭之日夜不息相殺者太半虱父止之曰我與汝廬不過縫所飡食不過容口奚用竊乎交戰爲哉羣虱止今君以七百里地爲君之城亦以足矣而以汝汶陽數歩之田感君之心曽不如一虱之知竊爲君羞之魯侯曰善語林曰顧和始爲楊州從事月且當朝未入停車州門外湏臾周侯巳醉著白恰慿兩人來詣丞相歴和車邊和先在車中覔虱夷然不動周始見遥過去行數歩覆反還指顧心曰此中何所顧擇虱不輟徐徐應曰此中最是難測量地風俗通曰河南趙仲讓爲梁兾從事郞中冬月坐庭中向日觧壞裘捕虱襄成君使推問之兾笑曰此我從事絶清髙士也楊偉時務論曰夫吞八荒者不咀蟣虱也神異經曰西荒之中有人焉長短如人着百結敗衣手足虎爪名獏㺔張茂先曰俗曰貌僞音撝伺人眠輙徃就人欲食人腦先使捕虱得卧而舌出盤地丈餘聞其聲常燒大石伺其得卧舌出以石投舌上於是低頭絶氣而死異苑曰太孫廣頭上不得有虱虱大者便遭朞䘮大功小則小功殤服劉義慶宣驗記曰晉義熈中京師長年寺道人惠祥與法向連堂夜四更中惠遥喚向暫來徃視祥仰眠交手胷上足脡欶鼎切直云可解我手足繩曰上並無繩也祥因得轉動云向有人衆以我手足鞭箠交下問何故齧虱語祥若更不止當入兩間礚之音盍祥後徴戒於虱餘無精進相牛經曰治牛虱用苦梗生魚汁清坎底土若酒和塗之夢書曰夢梳箆爲憂解也其髮滑澤心喜也蟣虱盡去百病愈也蟣虱爲憂齧人身也夢見蟣虱有憂至也揚雄長楊賦曰鞮鍪生蟣虱介胄𬒳霑汗趙壹作非草書曰俯而擇虱不睱見地仰而觀鍼不睱見天天地至大而不見者銳精於鍼虱也魏文帝與王朗書曰蚤虱雖細虐於安寢鼷䑕至微猶毁郊牛嵇康養生論曰夫虱處頭而黒麝食桓而香又與山濤書曰危坐一時痺不得揺性復多虱把搔無巳而當襲以章服揖拜上官三不可堪也螕邊奚切字林曰螕齧牛蟲也蟭螟晏子春秋曰景公問晏子曰天下有極細乎對曰東海有蟲生於蚊睫再乳而飛蚊不爲驚臣嬰不知其名東海者者命曰蟭螟列子曰江浦之間生麽細麽也蟲其名曰焦螟羣飛而集於睫不相觸也捷宿去來蚊不覺也離朱子羽方晝栻皆楊眉而望之弗見其形離未黄帝時明目人子羽未聞也抱朴子曰焦螟也蚊眉之中而笑彌天之大鵬寸鮒遊牛迹之水不貴横海之巨鱣也蛕音囿說文曰蛕蝮中長蟲也叩頭異苑曰有小蟲形色如大豆呪令叩頭又使吐血皆從所教如似請放稽顙輙七十而有聲故俗呼爲叩頭也傅咸叩頭蟲賦叙曰叩頭蟲蟲之微細者然觸之輙叩頭人以其叩頭殺之不祥故莫之害也食屍裴氏廣州記曰林任縣有甲蟲嗜臭肉人死食屍都盡紛紛满屋非可驅殺博物志曰景𥘉中蒼梧刺史京師云廣州西南數郡人病将死便有飛蟲狀如麥集舎人死便食不可斷截惟殘骨在便去以梓板爲器則不集蟯音饒說文曰蟯蝮中短蟲也史記曰臨菑汜里女子薄吾病甚衆醫皆爲寒熱篤當死不治淳于意侯其脉曰蟯瘕蟯瘕爲腹大上膚黄麤修之戚戚然意飲以元華一撮即出蟯可數升病巳三十日如故淮南子曰天下物莫不資於水澤及音𡵨蟯而不求報高誘曰蟯微蟲也蛻廣雅曰復育蛻也論衡曰蟬生於復育開背而岀蛾詩曰螓首蛾眉爾雅曰蛾羅也郭廣雅曰蛢歩丁反蛾也漢書曰建始元年春三月上幸雍祠五畤秋八月有白蛾羣飛蔽日從東都門至軹道宋書曰傳亮少帝失徳内懷憂懼直宿禁中睹夜蛾赴燭作感物以寄意焉王子年拾遺記曰有谷将子學道也言於燕昭王曰西王母尋來必語虚尤之術不踰一年王母果至與昭王遊乎燧林之下談炎上鑚火之術取縁桂之膏燃以眏夜忽有飛蛾衘火狀如丹雀來拂於桂膏之上蛾出於貟丘之穴郭子横洞冥記曰武帝旣耽於靈恠常得丹豹之髓白鳯之膏磨青錫爲屑以淳蘇油和之照於神壇夜暴雨火光不滅有霜蛾如蜂赴燈侍者舉麟鬚之拂以驅之列仙傳曰園客濟陽人種五色香草服食其實一旦有五色蛾止其香末收而薦之生蠶焉符子曰不安其昧而樂其明是猶夕蛾去闇赴燈而死者也崔豹古今注曰飛蛾善拂燈一名火花一名慕光廣志曰有蠶蛾凢草木蟲以蛹化爲蛾甚衆任昉𫐠異記曰楚荘王宫人一旦化爲野蛾而飛去夢書曰蛾爲婦女眉儇也夢見蛾者憂婚也白澤圖曰赤蛾兩頭而白翼者龍也殺之兵死矣支曇諦火蛾賦序曰悉逹有言曰愚人貪財如蛾投火誠哉斯言信而有徴鮑明逺飛蛾賦曰仙人司闇飛蛾候明均靈升化詭態齊生觀生齊而態詭各㑹性以慿方凌焦烟之浮景赴熈爛之明光拔身幽草下畢命君子堂本輕死以邀願得縻願其何傷豈効南山之文豹避霧雨而巖藏蛹蚕具資産部中爾雅曰螝蛹也郭璞曰蚕蛹也說文曰螝蛹也讀若潰蛹繭蟲也韓子曰蟲有螝者一身兩頭爭食相嚙也遂殺巳人臣爭事亡其國者皆螝類也蛓七賜切爾雅曰户感切毛蠹即也墨蛅如占切蟴蛓属今八月角螫蟲音虫說文曰蛓毛蟲也讀若笥蜭手蠹也蟥蛢上音黄下音瓶爾雅曰蚑符蟥蛢郭璞曰甲蟲也大如虎豆緑色江東呼黄蛢孫炎曰翼在甲褱說文曰蛢􅛔音韋也蟥也以翼鳴者也班猫本草經曰班猫一名龍尾味寒生谷吳氏本草經曰班猫一名班蚝音判一名龍蚝一名班􅌲一名腃髪一名晏青神農辛歧伯醎桐君有毒扁鵲甘有大毒河内川谷或生水石地膽廣雅曰地膽地要青蠵也本草經曰元青春食芫華故云元青秋爲地膽地膽黒頭赤味辛有毒主蟲毒風注秋食葛華故名之爲葛上亭長呉氏本草經曰地膽一名元青一名杜龍一名青虹陶洪景本草經曰地膽味辛寒有毒一名元青一名青蛙一眞者岀梁州狀如大馬蟻有小翼子僞者即是班猫所化狀如大豆大都治躰略同必不能得眞此亦可用蛤蚧嶺表録異曰蛤蚧首如蝦蟇背有細鱗如蠶子土黄色身短尾長多巢於樹中端州子墻内有巢於㕔署城樓間者旦暮則鳴自呼蛤蚧或云鳴一聲是一年者里人採之鬻於市爲藥能治肺疾醫人云藥力在尾尾不具者無功龐降嶺表録異曰龐降生於山野多在橄欖樹上形如蜩蟬腹青而薄其聲業其鳴自呼爲龐降但聞其聲探者鮮得名以善價求之以爲媚藥蛆梁書曰王琳敗後入齊爲特進侍中所居屋脊無故剥破岀赤蛆數升落地化為血蠕動又曰元帝時安城人劉敬躬於田間得白蛆化爲黄金龜将銷之龜生光照室敬躬以爲神而禱之所請多驗遂謀作亂帝命都督王僧辯討擒之後魏書曰宣武遐昌三年章武王熈爲相州刺史有蛆生於庭俄而反伏誅廣五行記曰北燕馮跋太平二十一年三月蛆觸地而生月餘跋爲弟洪所殺又曰唐來俊臣性殘忍貪淫縱異自知制獄數年家積巨萬凢所殺戮不可勝計俊臣家婢生一塊肉大如二升椀剖之有赤蛆升餘湏臾皆變爲蜂螫人而去太平御覽卷第九百五十一
