front:
  text: 太平御覽卷第六百四十七刑法部十三
  hash: sha256:688823d4b9a7178b677be5099dd3a4f57911c7a0a90a08aa706b138a9a26e04f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_647-1a}
body:
  text: 殺三族刑雜死刑附殺釋名曰殺竄也埋之使不復見也周禮秋官上曰掌戮掌斬殺諜而搏之斬以鈇鉞若今要斬也殺以刃刀若今弃市也諜爲姦㓂反間者斬之小者殺之凡殺其親者焚之殺王之親者辜之焚之燒也易曰焚如死如弃如辜之言枯也謂磔之也凡殺人者踣諸市肆之三日刑盗于市踣僵尸也肆猶陳也又司刑職曰殺罪五百鄭玄曰煞死刑尚書大傳曰武王殺紂而繼公子禄父使管叔康叔監禄父武王死成王㓜周公盛飬成王盛猶長之使召公奭爲傳周公身居位聽天下爲政管叔疑周公流言於國曰公將不利王奄君薄姑謂禄父曰武王已死矣成王㓜周公見疑矣此丗之時也請舉事言周弱旦不和欲代之而復政也然後禄父三監叛周公以成王之命殺禄父禮曰邾婁定公時有殺其父者有司以告公瞿然失席曰是寡人之罪也寡人甞學斷斯獄矣臣弑君凢在官者殺無赦子弑父凢在官者殺無赦言諸臣子孫無尊卑皆得殺之其罪無赦也殺其人壞其室洿其宫而瀦焉明其大逆不欲人復之也盍君踰月而後舉爵自貶損也又王制曰析言破律亂名改作執左道以亂政者殺析言破律巧賣法令也亂名改作謂變易官與物之名更作法度也左道若巫蠱及俗禁也作淫聲異服竒技竒器以疑衆殺淫聲鄭衛之聲異服若聚鷸冠瓊弁竒技竒器若公輸般請以機窆也行僞而堅言僞而辯學非而博順非而澤以疑衆殺皆謂虚華捷給無誠也假於鬼神時日卜筮以疑衆殺今時持䘮葬染盖嫁娶卜數文書使民倍禮違制者也此四誅者不以聽左傳襄六年曰齊子尾害閭丘嬰欲殺之使帥師以伐陽州我問師故魯以師往問齊何故伐我子尾殺閭丘嬰以說于我師又昭四年曰楚子謂成虎若敖之餘也遂殺之書曰楚殺其大夫成虎懷寵也又昭四年曰楚子伏甲而饗蔡侯於申醉執而殺之刑其士七十人論語顔淵曰如殺無道以就有道何如子曰子爲政焉用殺子欲善而民善矣史記曰二丗使使殺公子將閭將閭曰朝廷之禮吾未甞敢不從賔賛也廊廟之位吾未嘗敢失節也仰天而大呼天者三昆弟皆流涕自殺又曰二丗又遣使者之陽周令蒙恬曰君之過多矣而卿弟毅有大罪法及内史蒙恬喟然太息曰我何罪於天無過而死良乆徐曰恬罪固當死矣起臨洮壍萬餘里此其中不能無斷地脉此乃恬之罪也吞藥自殺又曰秦昭王賜白起劒令自殺武安君曰我固當死矣長平之戰趙卒降者數十萬人我詐而坑之是以死乃引劒自殺秦人憐之郷邑皆祭祀華嶠後漢書曰梁兾聞崔琦才請與交兾行多不軌琦數誡之不能受琦以言不從失意爲白鵠賦兾知興已大怒幽之室谷數月得出後竟殺之范曄後漢書曰陳蕃上䟽欲急誅侯覽等太后不納朝廷聞者莫不震怒蕃因與竇武謀殺之及事泄曹節等矯詔誅武等蕃時年七十餘聞難作將官屬諸生八十餘人並拔刃入丞相門攘臂呼曰大將軍忠以衛國黄門反逆何云竇氏不道耶王甫時出與蕃相迕讓蕃曰先帝新弃天下山陵未成竇武何功兄弟父子一門三侯又多取掖庭宫人作樂飲醼旬月之間貲財億計大臣若此是爲道耶公爲㨂樑枉撓阿黨復焉求賊遂令収蕃蕃拔劒叱甫甫兵不敢近乃益人圍之數十里遂執蕃送黄門北寺獄黄門從官騶蹋蹴蕃曰死老魅復能損我曹貟數奪我曹廩假否即害之呉志曰人詐告樓玄謗訕政事華覈上䟽乞玄自新孫皓疾玄名聲復徒玄及子男據付交阯將張弃使以戰自効隂別勑弈令殺之據到交阯病死玄一身隨弈討賊持刃歩見弈輒拜弈不忍殺玄㑹弈暴疾卒玄殯歛弈於器中見勑書還自殺也王隱晉書曰周處字子隱陽羡人姑爲中書省事時女子李忩斍父北叛時殺父處奏曰斍父以偷生破家以邀福子圉告歸懷羸結舌忩無人子之道證父攘羊傷化汙俗冝在投卑以彰㐫逆平刑市朝不足塞責奏可殺忩唐書曰宰相宋申錫爲鄭注所搆獄自内起崔玄亮首率諌官請對與文宗往復數百言文宗不省其詐欲寘申錫於法玄亮泣曰孟軻有言衆人皆曰殺之未可也諸大夫皆曰殺之未可也天下皆曰殺之然後察之方寘於法今至聖之代殺一凢庶尚湏合於典法况無辜殺一宰相乎臣爲陛下惜天下法實不爲申錫也文宗爲之感悟玄亮由此名重於朝又曰興平縣人上官興因醉格殺人亡竄吏執其父下獄興自首請罪以出其父京兆尹杜悰以其首罪免父有光教義請減死配流王彦威曰殺人者死百王共守若許殺人不死是教殺人興雖免父不合減死山海經曰共工氏之臣曰相柳氏九首以食于九山頭各自食一山之物言貪暴難饜也相柳之所抵厥爲溪澤抵觸也禹殺相柳其血脉不可以樹㯏乃以爲衆帝之臺曹操别傳曰始袁忠爲沛相薄待操沛國桓劭亦輕之及在兖州陳留邊讓頗笑操操殺讓族其家忠劭俱避難交州操逺使就太守士爕盡族劭劭得出者拜謝於中庭操謂曰跪可解死耶遂殺之孟子曰孟子謂齊宣王曰左右皆曰可殺勿聽諸大夫皆曰可殺勿聽國人皆曰可殺然後察之見可殺焉然後殺之故曰國人殺之也言當真行大辟之罪如此而後可以爲民父母又曰或問勸齊伐燕有諸曰未也今有殺人者或問之曰人可殺與則將應之曰可彼如曰孰可以殺之則將應之曰爲士師則可以殺之今以燕伐燕何爲勸之哉燕有罪王者當誅之燕猶齊故不可搜神記曰漢宣帝之丗燕代之間有三男共取一婦生四子及其將分妻子而不可均反致争訟廷尉范延壽斷之曰此非人類當以禽獸處之禽獸從母不從父也請戮三男以兒還母帝嗟嘆曰何必古若此則可謂當於理而厭人情也延壽盖見人事而知用刑矣太公金匱曰殺一人而千人恐者殺之殺二人而萬人動者殺之殺三人而君振者殺之三族刑雜死刑附尚書泰誓曰今商王受弗敬上天降災下民沉湎冒色敢行暴虐罪人以族官人以丗一人有罪刑及父母兄弟妻子言淫濫也史記曰秦始皇平六國制天下以古非今者族吏見知不舉與同罪又曰陳狶反韓信欲謀發兵欲以襲吕后太子其舎人得罪於信告信欲反於吕后吕后使武士縛信斬之長樂鍾室信方斬歎曰吾悔不用蒯通計乃爲兒女子所詐豈非天哉遂夷信三族漢書刑法志曰漢興尚有夷三族之令令曰當三族者先黥劓斬左右趾笞殺之梟其首葅其骨肉於市其誹謗者又先斷舌故謂之具五刑彭越韓信之屬皆受此誅至髙后元年乃除三族罪妖言令後新垣平謀逆復行三族之誅又五行志曰趙人新垣平以望氣得幸以圡上立渭陽五帝廟欲出周鼎夏四月郊見上帝嵗餘懼誅謀爲逆發覺腰斬夷三族後漢書曰少府耿紀丞相司直韋晃起兵誅曹操不尅夷三族又曰建安五年車騎將軍董承越騎校尉和輯受宻詔誅曹操事泄壬午曹操殺董承夷三族魏志曰建安二年遣謁者僕射斐茂率關西諸將誅李􅔸夷三族又曰太傅司馬宣王奏免大將軍曹爽又尚書丁謐鄧颺何晏司隷校尉畢䡄荆州刺史李勝大司農桓範皆與爽通姦夷三族三十國春秋曰魏帝謁陵曹爽及弟義訓彦皆從髙祖命授兵召公卿於廟堂奏皇太后廢爽丁酉斬爽義訓彦夷三族雜死刑韓子曰齊國好厚葬布帛盡於衣裘林木盡於棺槨桓公患之以告管仲曰布帛盡則無以爲幣林木盡則無以爲守備如民之厚葬不休柰何管仲對曰凡民之有爲也非名之則利之於是乃下令曰棺過度者戮其尸罪當䘮者夫戮尸無名罪當䘮者無利無名無利民何故爲之吕氏春秋曰趙簡子沉鸞繳於河曰吾嘗好聲色矣而鸞繳致之吾嘗好宫室臺榭矣而鸞繳來之今吾好士六年矣而鸞繳未嘗進一人也是長吾過而絀吾善也淮南子曰夏桀殷紂生燔人辜頡者爲炮烙鑄金柱鑄金柱然火其下以人置上人火中而對笑之符子曰桀觀炮烙於鎐臺謂龍逢曰樂乎龍逢曰樂桀曰觀刑何無惻怛之心龍逢曰天下苦之而君以爲樂臣君之股肱何不悅乎桀曰聽子諌諌得我改之諌不得我刑之龍逢曰臣觀君冠危石也臣觀君履春冰也未有冠石而不壓蹈春氷而不䧟桀笑曰是曰亡則與俱亡子知我之亡而不自知乎亡子就炮烙之刑吾觀子龍逢歌趍造作勞我以生息我以炮烙故渉薪我樂人不知赴火而死太平御覽卷第六百四十七
