front:
  text: 太平御覽卷第四百三十三
  hash: sha256:4ecfecde178ade2d820db7a99668785817194542e7c6f8b70e17b995c9906fb4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_433-1a}
body:
  text: 人事部七十四勇一釋名曰勇踴也見敵踴躍欲擊之也說文曰勇氣也從力用聲尚書曰武王左杖黃鉞右秉白旄以麾曰逖矣西土之人稱爾戈比爾于立爾矛予其誓朂哉夫子尚桓桓孔安國曰桓桓武皃也如虎如貔如熊如羆于啇郊又曰亦有熊羆之士弗二心之臣保乂王家言文武旣聖則亦有勇猛如熊也羆之士毛詩曰大叔于田刺莊公也叔多才而好勇不義而得衆大叔于田乗乗馬執轡如組兩驂如舞叔在藪火烈具舉袒禓暴虎獻于公所將叔無狃戒其傷女禮記曰魯莊公及宋人戰于乗丘縣賁父御卜國爲右馬驚敗績公墜左車授綏公曰末之卜也縣賁父曰他日不敗績而今敗績是無勇也遂死之又曰用人之智去其詐用人之勇去其怒用人之仁去其貪鄭玄曰用智者之謀勇者之断仁者之施足以成治矣又曰啇者五帝之遺聲也啇人識之故謂之啇齊者三代之遺聲也齊人識之故謂之齊明乎啇之音者臨事而屢斷明乎齊之音者見利而讓臨事屢斷勇也見利而讓義也有勇者義非歌孰能保此左傳曰公及齊師戰于長勺公將鼔之曹劌曰未可齊人三鼔曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師旣克公問其故對曰戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之又曰晉襄公縳秦囚使菜駒以戈斬之囚呼菜駒失戈狼瞫取戈以斬囚禽之以從公乗遂以爲右箕之役先軫黜之而立續簡伯狼瞫怒其友曰盍死乎瞫曰吾未獲死所其友曰吾與汝爲難瞫曰周志有之勇則害上不登於明堂杜預曰周志書也明堂祖庿也所以崇功序德故不義之士不得外之死而不義非勇也共用之謂勇吾以勇求右無勇而黜之亦其所也謂上不我知黜而冝乃知我矣子姑待之及彭衙旣陳以其屬馳秦師死馬晉師從之大敗秦師君子謂狼瞫於是乎君子也又曰晉郄克及齊侯戰於鞍齊髙固入晉師磔石以投人杜預曰磔也禽之而乗其車繫桑本焉以徇齊壘將至齊壘以桑樹繫車而走欲自異也曰欲勇者賈余餘勇賈買也言巳有餘勇欲賣之也又曰欒盈師曲沃之甲以晝入絳𥘉斐豹隷也著於丹書欒氏之力臣曰督戎國人懼之斐豹謂范宣子曰茍焚丹書我殺督戎宣子喜曰而殺之所不請於君焚丹書者有如日乃出豹而閉之督戎從之踰隱而待之督戎踰入豹自後擊而殺之又曰楚平王執伍奢無忌曰奢之子材若在吴必憂楚國盍以免其父召之彼仁必來不然將爲患王使召之曰來吾免而父棠君尚謂其弟貟爾適呉我將歸死吾知不逮我能死爾能報聞免父之命不可以莫之奔也親戚爲戮不可以莫之報也奔死免父孝也度功而行仁也擇任而徃智也知死不避勇也父不可棄名不可廢爾其勉之相從爲愈伍尚歸奢聞貟不來曰楚君大夫其旰食乎楚人皆殺之又曰晉趙鞅圍衞報夷儀也𥘉衛侯伐邯鄲午於寒氏城其西北隅而守之霄􅑒及晉圍衛午以從七十人門於衛西門殺人於門中曰請報寒氏之役渉他曰夫子則勇矣然我徃必不敢啓門亦以徒七十人旦門爲歩左右皆立如植日中不啓門乃退又曰楚白公勝將作難謂石乞曰王與二卿士皆以五百人當之則可矣乞曰不可得也市南有熊冝僚者若得之可當五百人矣乃從白公而見之與之言恱告之故辭承之以劔不動勝曰不爲利謟不爲威愒不泄人言以求媚者去之又曰楚白公奔山而縊其徒微之生拘石乞而問白公之死焉對曰予知其死所而長者使予勿言不言將烹乞曰此事也克則爲卿不克則烹固其所也何害乃烹石乞又曰晉楚戰楚師薄於險叔山冉謂飬由基曰雖君有命爲國故子必射乃射再發盡殪叔山冉搏人以投中軍折軾晉師乃止言二人皆有退人之能又曰齊莊公朝指殖綽郭最曰寡人之雄也州綽曰君以爲雄誰敢不雄然臣不敏平隂之役先二子鳴十八年晉伐齊及平隂莊公爲勇爵設爵位以命勇士殖綽郭最與焉州綽曰東閭之役臣左驂迫還於門中識其板數識門板數其可以與此乎周官曰司右掌群右之政令凡軍國之勇士能用五兵者屬焉掌其政令河圖曰勇敢重瞳宋均注曰項羽也又曰鳥一足名獨立見則主勇強家語曰仲由字子路少孔子九歳子路性鄙好勇力志抗直冠雄鷄佩猳豚陵暴孔子孔子設禮稍誘之子路後服子路問君子尚勇乎孔子曰君子義以爲上君子好勇而無義則亂小人好勇而無義則盗又曰孔子將之衛路出於蒲㑹公叔氏以蒲叛衛而止孔子弟子有公良孺者爲人賢良有勇力挺劔而合衆將與之戰蒲人懼曰苟無適衛吾則出子乃盟孔子出之又曰孔子北遊登乎農山子路子貢顔回侍側孔子四望喟然而歎曰於斯致思無所不至矣二三子各言爾志吾將擇焉子路進曰由願得白羽若月赤羽若日鍾鼓之音上震于天旌旗􅌭紛下蟠于地由也當一隊而敵之必也攘地千里搴旗執馘唯由能之使二子者從我焉夫子曰勇哉史記曰毛遂隨平原君與楚合從言其利害日出而言之日中不決遂案劔歷階而上謂平原君曰從之利害兩言而決耳今日出而言從日中不決何也楚王謂平原君曰客何爲者也平原君曰是勝之舎人也楚王叱胡不下吾乃與爾君言汝何爲者也毛遂案劔而前曰今十歩之内王不得恃楚國之衆也王之命懸於遂手叱者何且遂聞湯以七十里之地王天下文王以百里之壤而臣諸侯今楚地方五千里持㦸百萬此霸王之資也白起小竪子耳率數萬之衆興師以與楚戰一戰舉鄢郢再戰而燒夷陵三戰而辱王之先人此百世之怨而趙之所羞而王弗知惡合從者爲楚非爲趙也吾君在前叱者何也楚王曰先生之言是也遂定從而還又曰范雎說秦昭王夫以烏獲任鄙之力荆成孟賁許慎曰荆成古勇士孟賁衛人也慶忌夏育之勇焉而死死者人之所必不免也又曰廉頗者趙之良將也趙惠文王十六年廉頗爲趙將伐齊大破之取晉陽拜爲上卿以勇氣聞於諸侯又曰藺相如者趙人也爲趙官者令繆賢舎人趙惠文王時得楚和氏璧秦昭王願以十五城請易璧令曰臣客舎人藺相如其人勇士有智謀冝可使乃使相如奉璧入秦秦王坐章臺得璧大喜傳璧以示美人及左右左右皆呼萬歳相如視秦王無意償趙城乃前曰璧有瑕請指示王王授璧中立倚柱怒髮上衝冠謂秦王曰趙王齋戒五日使臣奉璧拜送書於廷何者嚴大國之威以脩敬也今臣至大王見臣列觀禮節甚倨得璧傳戲無償趙王城邑故臣復取璧大王必欲急臣臣頭今與璧俱碎於柱矣持璧睨柱欲以擊柱秦王恐其破璧乃辭謝固請召有司案圖十五城與趙相如見其詐乃謂曰趙王送璧時齋五日大王亦冝齋五日乃敢上璧秦王許相如就舎使其從者衣褐褁璧亡歸趙秦王齋竟引相如相如曰自秦繆公以來二十餘君未有堅盟約者臣恐見欺負趙故令人持璧歸間至趙矣王若割十五都與趙趙豈敢留璧得罪於大王臣知欺大王當誅請就湯鑊秦遂厚遇之旣歸趙王以爲賢大夫使不辱於諸侯拜爲上大夫秦亦不以城與趙趙亦不與秦璧後秦王㑹澠池秦王飲酒酣曰寡人竊聞趙王好音請奏瑟趙王鼔瑟秦御史前書曰某年某月秦王與趙王㑹飲令趙王鼔瑟相如前曰趙王竊聞秦王善爲秦聲請奏缶以相娱樂秦王怒不許於是相如前進缶因跪請之秦王不肯擊缶相如曰五歩之内臣請以頸血濺大王矣左右欲刄相如相如張目叱之左右皆靡秦王不懌爲一擊缶相如顧召趙御史書曰某年某月秦王爲趙王擊缶秦之群臣曰請以趙十五城爲秦王壽相如亦曰請以秦之咸陽爲趙王壽趙亦盛設兵待秦秦不敢動旣罷歸國以相如功大拜爲上卿位在廉頗右又曰曹沫者魯人也以勇力事魯莊公齊桓公與魯莊公㑹于柯而盟桓公與莊公旣盟於壇上曹沬執匕首刧齊桓公桓公左右莫敢動問曰子將何曹沫曰齊強魯弱而大國侵魯亦巳甚矣今城壞即壓境君其圗之公乃許盡還魯之侵地旣巳言曹沫没其匕首下壇北面就羣臣之位顔色不變辭令如故又曰楚於期奔燕丹計無所出鞠武曰燕有田光先生者其爲人智深而勇抗可與太子因謁光光言荆卿太子曰願因先生得結交於荆卿可乎田光曰敬諾即起趍出太子送之至門戒曰丹所報先生言者國大事也願先生勿洩也田光跪而笑曰諾見荆軻曰光與子相善燕國莫不知今太子聞光壯盛之時不知吾形巳不逮也幸而敎之曰燕秦不兩立願先生之留意光竊不自外言足下於太子願足下過太子於宫荆軻曰謹奉敎田光曰吾聞之長者爲行不使人疑之今太子告光曰所言國之大事也願先生勿洩也是太子疑光也夫爲行而使人疑之非節也欲自殺以激荆卿曰願足下急過太子言光己死明不言也因遂自刎又曰秦將李信年少壯勇嘗以兵數千逐燕太子丹至於汙水卒得破丹太平御覽卷第四百三十三
