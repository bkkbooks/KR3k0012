front:
  text: 太平御覽卷第四百六十七
  hash: sha256:47d7bcc864a3c02bf289a1a3dc8dea9fe380c1535705846883dcf617ba4def5f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_467-1a}
body:
  text: 人事部一百八喜說文曰喜不言而恱曰喜從壴口壴音知句切易曰上九傾否先否後喜尚書曰股肱喜哉元首起哉毛詩曰風雨如晦鷄鳴不已旣見君子云胡不喜又曰我有嘉賔中心喜之又曰菁菁者莪樂育才也君子能長育人才則天下喜樂之也禮記曰樂者音之所由生也其夲在人心之感於物是故其喜心感者其聲發以散又曰人喜則斯陶陶欝陶也陶斯詠詠斯揺又曰何謂人情喜怒哀樂愛惡欲七者弗學而能也又曰武王承命興師誅啇萬國咸喜軍發盟津前歌後舞又曰文王朝夕至于大寢之門外問於内竪曰今日安否何如内竪曰今日安太子乃有喜色左傳曰城濮之役晉師三日榖文公猶有憂色左右曰有喜而憂如有憂而喜乎公曰得臣猶在憂未艾也困獸猶鬪况國相乎及楚煞子玉子玉得臣公喜而後可知也又曰子産始知然明問爲政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀子産喜以語子太叔曰他日吾見蔑之面蔑然明名今吾見其心矣又曰公賜公衍羔裘使獻龍輔於齊侯齊侯喜與之陽榖又曰呉將伐齊越子率其衆以朝焉呉人皆喜唯子胥懼曰是豢呉也呉王聞之使賜之屬鏤以死又曰鄭六卿餞韓宣子於郊宣子曰二三君子請賦起亦以知鄭志子賦野有蔓草宣子曰孑焉正子善哉吾有望矣子柳賦蘀兮宣子喜曰鄭其庶幾乎公羊傳曰九月丁卯子同生子同者孰謂謂莊公何言乎子同生喜有正也此言喜有正何乆無正子也又曰齊髙子來盟髙子者何齊大夫也何以不稱使我無君也然則何以不名喜之也爾雅曰坎坎僔僔喜也論語曰父母之年不可不知也一則以喜一則以懼又曰上失其道民散乆矣如得其情則哀矜而勿喜又曰子曰道不行乗桴浮于海從我者其由也與子路聞之喜尚書中候曰維王旣誅崇侯虎諸侯貢萬民咸喜鄭玄曰王文王也貢貢囯異物色也尚書大傳曰惟丙午王還師師乃皷譟師乃慆前歌後舞鄭玄曰熖喜也衆大喜前歌後舞也春秋元命包曰兩口衘土爲喜喜得明心喜者爲憙憙天心宋均曰心爲天王布政之宫万物湏之乃盛所以爲喜也今於口間土移一畫之者於字體安也是為兩口土也喜得明明得所喜也春秋繁露曰春之言猶蠢也蠢蠢者喜樂之皃國語曰伯宗朝以喜歸其妻曰子皃有喜何也曰吾言於朝諸大夫皆謂我似陽子知有似也陽子陽處父也對曰陽子華而不實言而無謀是以難及於身子何喜焉戰國䇿曰吕他亡西周之東周盡輸西周之情於東周東周大喜又曰孟甞君出行至楚楚獻象牀郢之登徒直送之不欲徃見孟甞門人公孫戊曰臣郢之登徒直送象牀象牀之直千金傷此若髮標賣妻息不足以償足下能使僕無行先人有寳劒願獻之戊曰諾入見孟甞曰五國所以皆致相印於君以國事累君者誠恱君之義慕君之廉今君至楚而受象牀所未至國將何以待君孟甞曰善戊趍而岀孟甞君曰今子舉足髙志之楊何也戊曰臣有大喜三重之以寳劒一孟甞曰何謂也戊曰門下百數莫敢入諌臣入諌一喜諌而聽臣二喜諌而止君之過三喜史記曰趙使藺相如賫璧西入秦秦王坐章臺見相如相如奉璧秦王大喜傳璧以示美人及左右左右皆呼萬歳又曰孔子由大司冦攝行相事有喜色門人恠之孔子曰非樂其貴然喜下人得吾也又曰龍且與韓信夾濰水陣信乃夜令人爲萬餘囊滿盛沙水壅上流引軍半渡擊龍且佯不勝還走龍且果喜曰固知韓信怯也追信渡水信使人决壅囊水大至擊殺龍且又曰慶雲喜氣也又曰吕后謂髙祖曰季所居之上常有雲氣故從性常得季髙祖心喜又曰邑中人民甞俱岀獵任安爲人分麋鹿雉兎衆人皆喜曰無傷也任少卿分則平也漢書曰朱慱爲左馮翊長陵大姓尚方禁少時盗人妻見斫創着頰慱聞以它事召視其面果瘢愽辟左右問方禁是何創禁自知情得叩頭服狀愽笑曰大丈夫固時有是愽欲洒郷耻能自効不方禁且喜且懼對曰必死博因親信以爲耳目又曰高祖入關與父老約法三章民大喜也又曰英布間行與隋何俱歸漢王方踞床洗召布入見布大怒悔來欲自死就舎張御食飯從官如漢王居布又大喜又曰韓信投漢蕭何等巳數言上不用即亡何聞信亡不及以聞自追之人有言上曰丞相何亡上怒如失左右手居一二日何來謁上且怒且喜又曰吕湏甞以陳平前爲高帝謀執樊噲數䜛平於吕后曰爲丞相不治事日飲醇酒戲婦人平聞日益甚太后聞之私喜又曰翟方進隨父至汝南蔡父竒方進形皃有封侯骨方進旣厭爲小吏聞蔡父言心喜又曰匈奴單于言願壻漢氏以自親元帝以後宫良家子王嬙字昭君賜單于單于忻喜謝承後漢書曰廬江毛義家貧以孝行稱南陽張奉慕其名徃候之坐定而府檄適至以義守令義捧檄而入喜動顔色續漢書曰荀爽甞謁李膺因爲其御旣還喜曰今日乃得御李君侯見慕如此東觀漢記曰上謂鮑永曰我攻懷三日兵不下關東畏卿且將故人徃即拜永諌大夫至懷謂太守曰足下所以堅不下者未知孰是也今聖主即位天下以定不降何待即開城降上大喜與永對食又曰賈復北與五校戰於真定大陂之復傷瘡甚上驚復病尋愈追及上上見大喜又曰梁鴻妻椎髺着布衣操作具而前鴻大喜曰此真梁鴻之妻也字之曰德曜孟光又曰上幸長祠髙廟十一陵歴覽宫館舊處㑹郡縣吏勞賜作樂者有縣三老大言陛下入東都臣望顔色容儀類似先帝臣一驩喜百官嚴設如舊時臣二驩喜見吏賞賜識先帝時事臣三驩喜陛下聽用直諌黙然受之臣四驩喜陛下至明懲艾酷吏視人如赤子臣五驩喜進賢用能各得其所臣六驩喜天下太平德合於堯臣七驩喜又曰上以馮異爲孟津將軍屯河上擊走朱鮪追至雒陽城門環城一匝乃還上聞之大喜諸將皆賀又曰郭伋字細侯河南人在并州素結恩德行部到西河羙稷有童兒數百各騎竹馬於道次迎拜伋問曰兒曹何自逺來對曰聞使君到喜故來奉迎魏志曰潁川戲志才籌畫士也太祖甚器之早卒太祖與荀彧書曰自志才亡後莫可與計事者汝潁固多竒士誰可以繼之彧薦郭嘉召見論天下事太祖曰使孤成大業者必此人也嘉岀亦喜曰真吾主矣表爲司空軍謀呉志曰曹公破走魯肅先還權大喜肅將入閤拜權起禮之因謂曰孤特鞌下馬相迎足以顯卿未肅趍進曰未也衆人聞之無不愕然就坐徐舉鞭曰願至尊威德加乎四海揔括九州克成帝業更以安車蒲輪徴肅始當顯耳權拊掌歡笑王隱晉書曰石珩問袁甫壽春以西何以常旱東何以恒水甫曰東是呉人新附積憂成隂西是中國新平呉珎寳羙人皆入志盈心滿長歡故旱孫嚴宋書曰劉宣字万壽彭城人也素曉天文知晉室當復又夢丸土服之覺而喜曰丸者桓也桓旣吞矣吾當復夲土乎齊書曰謝超宗詣東府門自通其日風慘太祖謂四座曰此客至使人不衣自暖矣超宗旣坐飲酒數廵辭氣横出太祖對之甚歡崔鴻後秦録曰秦末祅星見于東井尹緯知秦將㓕心喜踴躍向天再拜唐書陸贄從幸山南道途艱險扈從不及與帝相失一夕不至上喻軍士曰得贄者賞千金翌日贄謁見上喜形於顔色其寵待如此周書曰人有五氣喜氣内畜雖欲隠之陽喜必見喜色油然以岀又曰師曠見太子晉曰願聞一言王子應之曰吾聞太師將來吾心甚喜旣巳見子喜而又懼吾年甚少見子而懾盡忘吾度韓詩外傳曰曽子曰吾甞仕爲吏禄不過鍾釡尚猶欣欣而喜者非以爲多也樂其逮親也張勃呉錄曰長沙桓王在歴陽遣書呼周瑜瑜將兵五百人舡粮器仗星夜馳赴王大喜執瑜手曰卿至諧矣又曰呉王之女有所怨王者遂自殺王痛之葬於昌門外文石爲槨髙墳深池珎玩人馬以徇葬國人哀之湛盧之劒夜飛去楚楚昭王覺劒在其床首昭王召風胡子而問焉對曰越獻劒於呉名曰湛盧人君有過則去適他國聞吳王葬女奢侈以人從死其必是也昭王大喜胡冲呉暦曰太史慈字子義於神亭戰敗爲孫䇿所執䇿素聞其名即解縳諮問進取之術慈曰州郡新破士卒離心若儻分散難復合聚欲出宣恩安集恐不合尊旨䇿長跪荅曰誠夲心所望也明日日中望君來還諸將皆疑䇿曰太史子義青州名士以信義爲先終不欺䇿明日大㑹諸將預設酒食立竿視中而慈至䇿大懽喜常與叅論軍事司馬彪九州春秋曰曹公與袁紹相距遣人招張繡繡欲歸紹賈詡勸繡歸曹公繡曰紹強又曹公與吾有讎不可詡曰此乃所以冝從之也夫有霸王之志者固將釋大怨明德於四海也繡從之歸曹公曹公見之喜執詡手曰使我信重於天下者君也檀道鸞續晉陽秋曰𥘉符堅南冦京師大震謝玄入問討禦之方謝安夷然無懼色玄等旣破賊有驛書至安方對客圍棊看書旣畢攝放牀上了無喜色還棊如故客問之安徐荅云小兒軰遂巳破賊客罷還内過戸安心喜甚不覺屐齒之折其矯情鎮物如此也太公六韜曰因其所喜以順其志又曰文王拘羑里求天下珎恠而獻之紂貪其幣大喜殺牛而賜之曹操別傳曰拜操典軍都尉還譙沛士卒共叛襲擊之操得脫身亡走竄平河亭長舎稱曹濟南處士卧養足創八九日謂亭長曰曹濟南雖敗存亡未可知公幸能以車牛相送徃還四五日吾厚報公亭長乃以車牛送操未至譙數十里騎求操者多操開帷示之皆大喜始寤是操雷換別傳曰張華以煥爲豊城令得雙寳劒乃送一劒與華自留一剱華得劒甚喜曰此干將也邴原別傳曰魏太祖爲司空辟原署東閤祭酒太祖北伐三郡克單于還太祖曰孤返鄴守諸君必將來迎其不來者獨邴祭酒耳言訖未乆而原先至門下通謁太祖大喜攬履而起逺出迎原曰賢者誠難則度孤謂君將不能來而逺自屈誠副飢虚之心零陵先賢傳曰劉巴入益益州牧劉璋見而驚喜毎有事咨問璋遣法正迎劉備巴諌曰備雄人入必有爲不可内也旣入巴復諌曰若使備討張魯是放虎於山林璋不聽巴閉門稱疾備攻成都令軍中曰其有害巴者誅及三族及得巴甚喜列異記曰華子魚爲諸生寄宿入門外主人婦夜生頃兩吏詣門便辟易却相謂曰公在此躊蹰良乆一吏曰籍當定柰何住乃前向子魚拜相將入入出並行共語曰當與幾歳一人曰當三歳子魚後故徃視之兒果巳死子魚喜曰我固當公後果爲太尉西京雜記曰樊將軍噲問陸賈曰自古人君皆云受命於天云有瑞應豈有是乎賈應之曰有之夫目􅽋得酒食火花得錢財鴉鵲噪則行人至蜘蛛集而百事喜也晉朝雜事曰明帝入幘不正元帝自爲正之明帝大喜莊子曰凢交近則靡以信逺則必忠之言以言必或傳之失傳兩喜兩怒之言天下之難者也夫兩喜必多溢羙之言兩怒必多溢惡之言凢溢之類妄則信之列子曰鄭人有薪於野者遇駭鹿從而擊之斃恐人之見也遽藏諸隍中覆之以蕉不勝其喜俄而遺其所藏之處遂以爲夢焉又曰堯微服遊於康衢聞兒童謡曰立我蒸民莫匪爾極不識不知順帝之則堯喜曰疇敎爾爲此言童兒曰我聞之大夫問大夫曰古詩也孟子曰魯欲使樂正子爲政孟子聞之喜而不寐公孫丑曰奚爲喜曰其爲人也好善又曰子路人告其過則喜抱朴子曰人主有道國無粗政則四七從度五星不逆日不蝕朔月不薄望霜不夏繁雷不冬洩嘉瑞並臻災厲寢滅此則天喜也吕氏春秋曰湯聞伊尹使人請之有侁氏有侁氏不可伊尹亦欲歸湯湯於是請取婦爲㛰有侁氏喜以伊尹爲媵送女頋子曰夫哀樂喜怒愛憎欲懼人之情也當其哀也則欲哭泣擗踴遇其樂也則欲懽笑皷舞公孫尼子曰君子怒則自說以和喜則収之以正楚辭曰師望在肆昌何識鼓刀揚聲后乃喜王逸曰師謂太公也昌文王也后亦文王也曹植禮上表曰臣得去幽屏之城獲覲百官之羙此一喜也背茅茨之陋登閶闔之闥此二喜也必以有靦之容瞻見穆穆之顔此三喜也將以擣扤之質禀受崇聖之訓也此四喜也太平御覽卷第四百六十七
