front:
  text: 太平御覧卷第九百四十九蟲豸部六
  hash: sha256:ce38d2e1fcae7070b3104185824fb8fa7b328f392de38eee3ab615b320e8ec88
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_949-1a}
body:
  text: 蟾蜍蝦蟇蟋蟀虭蟧䑕負蠹強蝆齧桑守瓜蚰蜒蜰蜚廉蠁螋塵蟲蛇公螲蟷金花兹母蟾蜍春秋運斗樞曰紀乖政則蟾蜍月精四頭感翔感翔為妖韓詩外傳曰魚網之設鴻則離之嬿婉之求得此戚施薛君曰戚施蟾蜍喻醜惡文子曰蟾蜍辟兵壽在五月之望淮南子曰月照天下而蝕於蟾諸騰虵游霧而殆於蝍蛆蟾諸月中蝦蟇食羽故曰食於蟾諸殆猶畏也蝍蛆蟋蟀爾雅謂之蜻􅖹之大腹也上蛇蛇不敢動故曰殆於蝍蛆抱朴子曰蟾蜍壽三千歳又曰肉芝者謂萬歳蟾蜍頭上有角頷下有丹書八字再重以五月五日日中時取之隂乾百日以其足畫地即爲流水帶其左手於身辟五兵若敵人射巳者弓弩矢皆反還自向也又曰辟兵法或以月蝕時刻三歳蟾蜍喉下有八字者血以書所持之刀劒玄中記曰蟾蜍頭生角得而食之壽千歳又能食山精張衡靈憲曰羿請不死之藥於西王母姮娥竊之以奔月遂託身於月是爲蟾蜍淮南子同河圖曰蟾蜍去月天下大亂西京雜記曰廣川王發晉靈公冡得玉蟾蜍一枚大如拳腹空容五合如新王取以盛水滴硯崔寔四民月令曰五月五日取蟾蜍可治惡疽瘡傅玄詩曰蟾蜍食明月虹蜺薄朝日蝦蟇易通卦驗曰夏至小暑蝦蟇無聲山海經曰藟音誄山湖水出焉東流于食水其中多活即師科斗也小雅或曰活東也爾雅曰蟼蟇郭璞注云蛙類音驚亦曰景科斗活東蝦蟇子也周禮秋官下曰蟈氏掌去鼃黽焚牡蘜菊同以灰洒之則死齊魯之間謂鼃爲蟈黾耿黽也蟈與耿黾尤怒鳴而聒人耳故去之漢書曰武帝元鼎五年秋蛙與蝦蟇俱鬪是歳四将軍衆十萬征南越開九郡後漢書曰馬援爲隗囂使公孫𫐠歸謂囂曰子陽井底蛙耳言述志識𥚹狹如坎井之蛙事見莊子而妄自尊大不如專意東方東觀漢記曰彭寵堂上聞蝦蟇聲在火鑪下鑿地求之無所得寵爲奴所殺張璠漢記曰靈帝鑄天禄蝦蟇吐水於平昌門外橋東約入宫又作翻車渴烏施於橋西洒南北郊晉書曰有蛙鳴于華林園惠帝問左右曰爲官乎爲私乎侍中賈㣧對曰在官地爲官在私地爲私宋書曰張暢弟収嘗爲猘大所傷醫云冝食蝦蟇膾収甚難之暢含笑先嘗収因此乃食創亦即愈齊書曰沈僧照別名法朗少事文師道土梁武陵王紀爲㑹稽太守宴坐池亭蛙鳴䀨耳王曰殊廢絲竹之聽僧照呪厭十許口便息及日晚王又曰欲其復鳴僧照曰王歡巳䦨令汝鳴即便喧聒又曰卞彬蝦蟆賦云紆青拖紫名蛤魚丗謂比令僕也又云蝌斗唯唯羣浮暗水唯朝繼夕筆役如鬼比令史諮事也南史孝義傳曰丘傑字偉跱呉興烏程人也年十四遭母喪以熟菜有味不甞於口歳餘忽夢見母曰死亡是分别耳何事乃爾荼苦汝噉生菜遇蝦蟆毒靈牀前有三丸藥可取服之傑驚起果得甌甌中有藥服之下科斗子數升三國典略曰周天和二年齊武安妖人與其徒僞云盲躄因飲泉水下得金佛其疾並愈於是逺近信之男女霧集水中有老黄蝦蟆全如金色乍出乍没齊武成及百官巳下莫不飲之隋書曰焬帝在東宫宫中數有妖變乃命衛尉少卿蕭吉禳邪氣於宣慈殿座祭神是時孟冬地乆無水乃有蝦䗫從西南來入至座忽然而失文子曰禽子曰多言有益乎墨子曰蝦蟇蛙黽日夜恒鳴口乾舌擗然而不聽今觀晨雞時夜而鳴天下俱動多言何益唯其言之時也韓子曰越王勾踐欲伐呉欲民輕死岀見鬪鼃乃下軾從者曰王何敬也曰以其有勇氣故也其後國人而輕命死戰淮南子曰夫蝦蟇爲鶉水蠆爲䗓音聦皆生於非其類老蝦蟇化爲鶉水中蠆蟲化爲蟌蟌者蜻蜓也唯聖人能知其化又曰蘭芝以芳未甞見霜芳香也皷造辟兵壽盡五月之望鼓造蓋謂梟一曰蝦蟇今丗人五月望作梟羮亦作蝦蟇羹國語曰趙襄子以尹鐸有寛政於晉陽其心必和乃守晉陽後晉師圍而灌之沉竈生鼃民無叛意神仙傳曰葛玄指蝦蟇使舞皆應絃節使止乃止燕丹子曰太子自喜得荆軻永無秦憂日與軻之東宫臨池而觀軻拾塼投鼃太子令人奉槃金以進物理論曰夫虚无之談尚其華藻此無異於春蛙秋蟬聒耳而巳國俗通曰肅肅蝦蟇掉尾俗說蝦蟇一跳八尺再跳丈六從春至冬袒祼相逐無他所作掉尾肅肅謹按蝦蟇旣處水中其尾又短正能使掉之豈能肅蕭乎原其所以當言夏馬患蚋掉尾振擊常肅肅也蝦蟇夏馬音相似崔豹古今注曰科斗蝦蟇子也一名懸針一名玄魚形圓有尾聞雷則尾脫脚生也廣五行記曰懷州凝眞觀東廊下柱巳五十餘年道士徃徃聞有蝦䗫聲不知的處後因柱朽壞以他柱易之斫之於柱中得一蝦䗫其柱又無孔隙嶺表録異曰唐林藹爲髙州太守有郷墅小兒牧牛聞田中有蛤鳴蛤即大蝦蟇牧童遂捕之蛤躍入一穴中遂掘之乃蛮酋塚也得一銅鼓其色翠緑土射數處損缺其上隱起多鑄蛙黽之狀疑其鳴蛙即銅皷精也楚辭七諌曰蝦鼃遊於藥池芳藥之池成公綏隂霖賦曰百川泛濫潢潦流竈中生鼃庭運舟蟋蟀易通系卦曰蟋蟀之蟲隨隂迎陽居壁向外趣婦女織績女工之象今失節不居壁似女事不成有淫佚之行因夜爲姦故爲門户夜開門户人之所由岀入今夜不閉明非也易通卦驗曰立秋蜻音精蛚音列鳴白露下蜻蛚上堂京房易妖占曰七月建申爲夷則蟋蟀鳴毛詩蟋蟀曰蟋蟀在堂歳聿其暮今我不樂日月其除又豳七月曰七月在野八月在宇九月在户十月蟋蟀入我牀下箋云自七月至十月入我牀下皆謂蟋蟀也言将寒有漸非卒來也陸機毛詩䟽義曰蟋蟀似蝗而小正黑有光澤如􅃮有角翅一名蛬一名蜻蛚楚人謂之王孫幽州人謂之促織督促之言也里語曰趣織鳴懶婦驚詩義問曰蟋蟀食蠅而化成也劉芳毛詩義筌曰蟋蟀今促織也一名蜻蛚楚謂之蟋蟀或謂之蛬南楚謂之王孫也方言同蔡邕月令章句曰蟋蟀或謂之蛬亦謂之蜻蛚斯螽莎雞之類禮記月令曰季夏之月蟋蟀居壁春秋考異郵曰立秋趣織鳴宋均曰趣織蟋蟀也立秋女功急故趣也春秋潜潭巴曰蟋蟀集天子無逺兵春秋說題辭曰趣織爲言趣織也織興事遽故趣織鳴女作兼爾雅曰蟋蟀蛬也郭璞曰今促織也亦名青蛚也周書時訓曰小暑之日温風至又五日蟋蟀居壁袁宏後漢書曰崔駰上書曰竊聞春陽發而倉庚鳴秋風厲而蟋蟀吟盖氣使之然也于寳搜神記曰朽葦爲蛬麥爲􅺄蝶崔豹古今注曰蟋蟀一名吟蛬秋𥘉生得寒則鳴噪濟南謂爲嬾婦也又曰沙雞一名促織一名絡緯一名蟋蟀促織謂鳴聲如急織也絡緯謂其聲如紡也促織一曰促機絡緯一名紡緯阮籍詩曰開秋肇涼氣蟋蟀鳴牀帷感物懷殷憂消然心悲盧諶蟋蟀賦曰何兹蟲之資生亦靈智之攸授享神氣之么眇體形容之微陋于時微凉旣戒火靈告去玄乙辭宇翔鶤音昆南顧風戾戾而動柯露零零而隕樹月轉景而西頽漢廻波而東注厲清響於長宵激悲聲以迄署王襃聖主得賢臣頌曰虎嘨而風洌龍興而致雲蟋蟀候秋吟蜉蝣出以隂楚辭曰澹容與而獨倚兮蟋蟀鳴於西堂虭蟧詩義䟽曰蝘音偃一名虭音刃蟧音勞蟪蛄也爾雅曰蜓蚞螇螰即蝭蟧也一名蟪蛄齊人呼螇題木奚鹿四音家語曰孔子謂宰予曰違山十里蟪蛄之聲猶在於耳荘子曰蟪蛄不知春秋司馬彪注曰蝭蟧春生夏死夏生秋死故不知歲之春秋也楊雄方言曰蛥蚗上音折下音夬齊謂之螇螰奚鹿兩音楚謂之蟪蛄或謂之蛉蛄上音零秦謂之蛥蚗自関而東謂之虭蟧貂料兩音或謂之蝭蟧音帝或謂之蜓蚞音廷木西楚與秦通名江東又呼為蟂蟧風土記曰秋而蟪蛄鳴於朝寒螿鳴於夜䑕負爾雅曰蟠䑕負也郭璞曰此瓮器底蟲也舊說伊威竄婦别名未詳也毛詩東山曰伊威在室伊威委黍也陸機毛詩䟽義曰伊威一名委黍一名䑕婦在壁瓮底土中似白魚者也說文曰蟠蟅音柘䑕婦也蛜威委黍䑕負也于寳搜神記曰豫章有一家婢在竈下忽有人長數寸來竈間婢誤以履踐殺一人湏臾遂有數百人着縗麻持棺迎喪凶儀皆備出東門入園中覆舩下就視皆是䑕婦作湯澆殺遂絶葛洪治瘧方曰取䑕婦蟲十四枚各以糟封裹之凢十四丸臨發服七丸便愈陶弘景夲草經曰䑕婦一名蟠負一名伊威一名委人俗言䑕多在坎中背則負之今作婦字如似乖理又一名䑕姑家用此恱媚人甚多方而應少蠹韓詩外傳曰枯魚衘索于何不蠹爾雅曰蝎蛣􅔒木中蠹蟲蝎桒蠹即蛣􅔒也漢書曰文帝賜尉佗書衣物佗因使者獻桂蠹一器文子曰山生金反自刻木生蠧還自食穆天子傳曰天子東遊次雀梁蠹書于羽陵謂暴書蠹蟲囚曰蠹書也杜寳大業拾遺録曰七年始安郡獻桂蠹四瓶瓶別一千頭紫色香辛有味噉之去隂痰之疾強蝆音芈爾雅曰蛄䗐強蝆也郭璞曰米穀中蠹小墨蟲也建平人呼爲蛢子音芉方言曰蛄䗐音施謂之強䖫郭璞注曰江東謂之蛄䗐也齧桒爾雅曰蠰音餉齧桒郭璞曰似天牛也長角體有白點喜齧桒樹作孔藏其中江東呼爲齧髪守瓜爾雅曰蠸音權輿父守瓜也郭璞曰今瓜中黄小蟲喜食瓜葉故曰守瓜蚰蜒爾雅曰螾􅨪入耳蚰蜒也􅨪音衍方言曰自關而東蚰蜒謂之螾􅣓或謂之入耳或謂之䗅音長􅫡所冝切趙魏之間或謂之蚨虶音扶于北燕謂之䖡蚭廣雅同䖡奴六切蚭音尼蜰音肥廣五行記曰春秋魯莊公二十九年蜰劉向以爲此非中國所有南越盛暑男女同川澤滛亂所生爲蟲臰惡時公娶齊淫女爲夫人後漢書曰王莽地皇元年蜰蔽天至長安入未央宫縁奔發吏捕之于時天下大亂㝷而莽敗見殺蜚廉夲草經曰蜚廉味鹹治血瘀逐下血破積聚喉痺生晉地山澤中二月採之呉氏本草曰蜚廉蟲神農黄帝云治婦人寒熱蠁爾雅曰國音或貉蟲蠁也音許兩切今呼蛹蟲爲蠁廣雅曰土蛹蠁蟲螋音求搜說文曰多足蟲也廣雅曰矜螋也博物志曰蠷螋蟲溺人影亦隨所着處生瘡盧氏曰以雞腸草搗塗經日即愈塵蟲呉氏本草曰塵蟲一名土鼈蛇公異苑曰海曲有物名蛇公形如覆蓮花正白庾闡楊都賦曰蛇公沉光於海曲螲蟷上知栗切下多郎切爾雅曰三蛈音䥫蝪音湯也郭璞注曰即螲蟷也似蜘蛛在穴中有盖今河北人呼蛈蝪也金花笁法眞登羅山䟽曰金花蟲大如斑猫形色文采如金是龜屬得之養翫彌日兹母淮南子曰朝秀不知晦朔許愼注曰朝生暮死蟲也生水上似𧖟蛾一曰兹母太平御覽卷第九百四十九
