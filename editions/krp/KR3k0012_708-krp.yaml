front:
  text: 太平御覽卷第七百八
  hash: sha256:2705e123de282c0d35fd3b76e02e18fc4d68aec36800bc77c5c49571790881c3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_708-1a}
body:
  text: 服用部簟褥氊卧具氍㲣翕毛㲪簟說文曰簟竹席也釋名曰簟簟也布之簟然正平禮曰莞簟之安藁秸之談又曰父母舅姑之簟席枕几不傳詩曰下莞上簟乃安斯寢莞蒲曰席蒲竹葦曰簟方言曰簟宋魏之間謂之笙或謂之蘧曲自關而東謂之簟其粗者謂之蘧蒢行唐以蘧蒢直文而粗也自關而東周楚魏之間謂之倚佯音陽自關而西謂之行唐東觀漢記曰殤帝詔省荏弱平簟又曰馬稜爲㑹稽太守詔詰㑹稽車牛不務堅強車皆以桃枝細簟又曰尚書令王允奏曰太史令王立說孝經六隱事能消却姦邪常以良月允與立入爲獻帝誦孝經一章以杖二竹簟畫九宫其上隨日時入焉及允𬒳害乃不復行也晉書曰王恭字孝伯與王忱齊名友善恭有六尺簟枕見之謂其有餘因求之恭輟以送遂坐薦上忱聞而大驚恭曰吾平生無長物王隱晉書曰車永爲廣州刺史永子溢使工作象牙細簟工患之晉公卿禮秩曰太宰何曽遜位賜簟褥一具蕭子顯齊書曰林邑王永明九年遣使貢獻金簟等物孫卿子曰輕煖平簟而體不知其安淮南子曰席之上先雚簟尊之上先玄酒王貴之先夲而後末也東宫舊事曰太子納妃有赤花䨥文簟西京雜記曰武帝以象牙爲簟賜李大夫又曰㑹稽獻竹簟供御丗號爲流黄簟諸葛亮轉教曰計一歳運用蓬旅簟十萬具庾翼與王書曰今致八尺丈二細桃枝簟十枚黄篾雙文簟二領黄篾獨坐雙文簟一枚王廙春可樂曰弱簟平端潘岳悼亡詩曰展轉睇枕席長簟竟床空左思呉都賦曰桃笙象簟韜於筒中王鍳竹簟賦曰楚簟陳於玉房巴箱列於椒臺褥尓雅曰褥謂之兹釋名曰褥人所坐䙝辱也又曰茵車中所坐用虎皮也詩曰文茵暢轂駕我騏馵文茵虎皮漢書曰霍禹廣治第室作乗輿輦加繡茵慿黄金塗如淳曰馮謂所馮者也金塗以黄金塗飾之也韋絮廌輪晉灼曰御輦以韋縁輪貯之如絮也東觀漢記曰祭遵有疾詔賜重茵魏畧曰焦先字孝然河東人也髙尚不仕自作蝸牛廬浄掃其中榮木爲床布蓐其上天寒搆火以自炙魏志曰太祖性節儉帷帳屏風壞則𥙷衲茵褥取温無有縁飾又曰王朗上䟽曰老臣慺慺願國家同祚於軒轅之伍某少小常苦𬒳褥泰温則不能使軟膚弱體是以難可防䕶而易用感慨若常全小緼𫀆不至於甚厚則必咸保金石之性而比壽於南山矣呉録曰孟仁字㳟武江夏人也從李肅學其母爲作厚褥大被人問其故母曰小兒無德客多貧故爲廣𬒳大褥齊書曰宗測髙尚不仕王儉亦雅重之贈以蒲褥筍席又曰禇彦回弟澄爲左户尚書彦回薨澄以錢一萬一千就招提寺贖髙帝所賜彦回白豹坐褥又栁慶逺爲儀同𥘉慶逺從父兄丗隆嘗謂慶逺曰吾夢太尉以褥席見賜吾遂亞台司適又夢以吾褥席與汝汝必光我門族至是慶逺亦継丗隆焉太尉謂元景也後魏書曰尓朱丗隆將𬒳誅此年正月晦日令僕並不上省西門不開忽有河内太守田帖家奴告省門亭長云今且爲令王借車牛一乗終日於洛濵遊觀至晚王還省將軍自東掖門始覺車上無褥請爲之記識丗說曰晉孝武年十三四時冬天晝日不着衣夜則累茵褥謝公云體冝令常和陛下晝過冷夜過熱恐非攝生之術帝曰夜静冝温謝公出歎之也南越傳曰尉佗卧象牀錦茵茵褥也東宫舊事曰皇太子拜有八尺禱一重中褥一歩輿褥一納妃有承床禱三㑹稽後賢傳曰丁潭以光禄大夫還第詔賜床帳席褥鄴中記曰石虎作褥長三丈用綿縁之神異經曰北方有冰萬里厚百丈奚䑕在冰下土中其毛長八尺可以爲褥也西京雜記曰趙飛鷰爲皇后其女弟上遺鴛鴦褥拾遺録曰周穆王時紫羅文褥者壇孫國獻之語林曰大將軍収周侯至石頭坐南門石盤上將戮之送巳褥與周司馬相如美人賦曰髙茵重設氊說文曰蛩毛可以爲氊釋名曰氊旃也毛相著旃旃然也韻集曰氊細罽也周禮春官掌次曰王大旅上帝則張氊案大旅上帝祭天於圎丘也張氊案以氊爲林於堀中又曰掌皮供其毳爲氊以待邦用事漢書曰蘇武使匈奴匈奴絶不與食天雨雪武卧齧雪與氊毛裹咽之也漢書曰王吉諌昌邑王遊獵曰夫廣厦之下細氊之上明師居前勸誦在後上論唐虞之際下及殷周之盛其樂豈徒衘撅之間也哉又曰江都王女細君歌云逺適異國烏孫王穹廬爲室氊爲壇魏志曰李勝爲荆州刺史往辭太傳曹爽因察之太傳曰謬問勝曰并州有佳氊可致之勝岀曰太傅耄無能爲也又曰鄧艾伐蜀自隂平行無人之地鑿山通道作橋以氊自裹推轉而下魏武帝與楊彪書曰今贈足下青氊牀褥三具也晉書曰杜預子錫爲愍懷太子舎人屢直諌於太子太子患之置針於錫坐處氊中錫上刺足血岀又曰戴記曰慕容熈后符氏卒慕容隆妻張氏熈之㛐也美姿容有巧思熈將以符氏之殉欲以罪殺之乃毀其檖鞾有中弊氊遂賜死三女叩頭求哀熈不許齊書曰孔奐爲晉陵太守清白自守妻子並不之官唯以單舡臨郡所得秩俸隨即分贍孤寡郡中號曰神君曲阿冨人殷綺見奐居處儉素乃餉以衣氊一具奐辭不受北齊書曰裴寛與東魏將彭樂戰於新城因傷𬒳擒至河隂見齊文襄寛舉止閑雅善於占對文襄甚賞異之解鏁付館厚加禮遇寛乃裁所卧氊夜縋而出因得遁還又曰清河三年周師及突厥至并州突厥謂周人曰尔言齊亂故我伐之今齊人眼中有鐵何可當耶乃還至陘嶺凍滑乃鋪氊以渡之卧而不動偷遂登榻欲有所覔子敬因呼曰偷兒石染青氊是我家舊物可特置否於是羣偷置物驚走南傳曰調斯國有青石染氊絳染氊也王褒聖主得賢臣頌曰夫荷氊𬒳毳者難與道純錦之麗宻陸雲詩曰冬坐比肩氊比肩獸名也取其毛爲氊卧具風俗通曰扶風蘇不違父爲司隷李暠所遷司農不違穿府北垣徑上㕔事斫暠卧具暠一宿數遷沈約宋書曰朱百年隱居山隂家素貧母以冬月亡衣並無絮自此不衣綿帛嘗寒時就孔顗飲酒醉眠顗以卧具覆之百年不覺也旣覺引卧具去體謂覬曰綿定竒温因流涕悲慟覬亦爲之感傷齊書曰謝眺嘗行還過候江革時大寒雪見革弊絮單席而躭覺不倦眺嗟歎乆之乃脫其所着𥜗并手割半氊與革充卧具而去又曰劉孝綽與到漑兄弟甚狎漑少孤宅近僧寺孝綽往漑宅適見黄卧具孝綽謂僧物色也撫手笑漑知其旨奮拳擊之傷口而去氍㲣通俗文曰織毛褥謂之氍㲣聲類曰氍㲣毛席也廣志曰氍㲣田㲲毛織也近出南海文稱北漢之氍㲣非其所生魏畧曰大秦國以野蠒作織成氍㲣文出黄白黒緑氍㲣後周書波斯國大月氏之别種也其地出氍㲣呉時外國傳曰天笁國出細靡氍㲣陶侃别傳曰外國獻氍㲣公舉之曰我還國當與牙共眠牙名惔之字處静是公庻孫小而𬒳知以爲後嗣南州異物志曰氍氀以羊毛雜羣獸之毳爲之鳥獸人物草木雲氣作鸜鵡逺望軒若飛也古樂府詩曰請客上北堂坐氊及氍㲣張衡四愁詩曰美人贈我氊氍㲣諸葛亮集詔荅恢曰行當離别以爲惆悵今致氍㲣一以逹心也翕毛㲪上音榻下音登通俗文曰氍㲣細者謂之翕毛㲪名翕毛㲪者施大牀之前小榻之上所以登而上牀也東觀漢記曰景丹率衆至廣阿光武出城外馬坐按氊翕毛㲪上設酒肉魏畧曰大秦國以羊毳木皮野絲作翕毛㲪之屬有五色九色翕毛㲪其毛鮮於海東諸國所作也南史中天笁國出好裘翕毛㲪丗說曰王子猷詣郄雍州雍州在内未岀王見鋪翕毛㲪云阿乞那得此令左右送向家㕁岀王曰向有大力者負之以趍郄無忤郄愔爲雍州刺史阿乞愔小字異苑曰沙門有法存者生廣州善醫術遂冨有八尺翕毛㲪作百種形像又有沉香八尺板牀太原王淡爲刺史大兒邵之屢求二物法存不與王殺而藉焉法存後形見於府内經日王尋得疾亡邵之又喪杜篤邊論曰匈奴請降翕毛㲪罽褥帳幔氊裘積如丘山班固與弟超書曰月支翕毛㲪大小相雜但細好而巳馬融奏馬賢於軍中帳内施翕毛㲪士卒飄於風雪太平御覽卷第七百八
