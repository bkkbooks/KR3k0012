front:
  text: 太平御覽卷第七百七
  hash: sha256:748dba1eb7c5da3ea94c8c0bd355d57316b84a44a2bdc06603af03bcb8004315
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_707-1a}
body:
  text: 服用部九枕𬒳枕說文曰枕卧爲所薦首者也釋名曰枕撿也所以檢項也詩曰角枕粲兮錦衣爛兮又曰有美一人碩大且儼寤寐無爲展轉伏枕周禮曰王府掌王之金玉玩好大䘮則供角枕禮曰鷄鳴咸盥漱歛枕簟歛枕簟不欲人見國語曰楚靈王敗於乾谿王親獨行彷徨於山林之中三日乃見其㳙人疇王呼之曰余不食三日矣疇趍而進王枕其股以寢於地王寐疇枕王曰墣而去之璞塊也洞林曰丞相從事中郎王文英家枕自作聲漢書曰淮南王有枕中鴻寳祕苑書言使鬼物爲金之術及鄒衍重道延命方丗人莫知劉更生父於武帝時治淮南獄得書更生以爲竒獻之言黄金可成上命典作方鑄事費甚多不驗後漢書曰樂崧天性朴忠家貧爲郎嘗獨直臺上無𬒳枕杫祉音思漬切謂爼九也蜀漢之郊日祉食糟糠帝毎夜入臺輙見崧問其故甚嘉之自此詔太常賜尚書以下朝夕飡給幃帳東觀漢記曰黄香事親暑則扇枕寒則以身温席後漢書曰魏髙昌有白塩其形如玉髙昌人取以爲枕貢之中國魏志曰蘇則爲侍中董昭嘗枕則膝卧則推下之曰蘇則膝非佞人枕也魏畧曰大秦國岀五色枕呉書曰張紘作柟榴枕賦陳琳在此得之因以示士人曰此吾郷里張子㓜作也晉書曰王敦鎭豫章爲王澄以舊意所侮敦益忿怒請澄入宿隂欲殺之而澄左右二十人持䥫馬鞭爲衛澄手恒捉玉枕以自防故敦未之得發後敦賜澄左右酒皆醉借玉枕觀之因下牀而謂澄曰何與杜弢通信敦令力士路戎搤殺之又曰筮者謂董豊曰君憂獄逺二枕避三沐豊旣歸妻具枕授沐豊皆不從其夜果誤殺妻也沈約宋書曰武帝紀曰寜州嘗獻虎魄枕光色甚麗時北征以虎魄治金瘡上大恱命擣碎分諸將又曰武昌王渾少而凶戾爲中書令毎夕祼身露頭往散騎省戲因彎弓射通直郎周朗中枕以爲笑樂又朱齡石少好武不事崖撿舅淮南蔣氏才劣齡石使舅卧㕔事剪紙方一寸怗着舅枕以刀子懸擲之相去八九尺百擲百中舅畏齡石終不敢動齊書曰陳顯逹建武丗不自安侍宴酒後啓上借枕帝令與之顯逹撫枕曰臣年巳老冨貴巳足唯少枕死特就陛下乞之上失色曰公醉矣北齊書曰郎基自丗業清愼嘗語人曰任官之所木枕亦不湏作况重於此者也梁書曰王茂爲雍州長史人或譛茂反武帝弗之信令鄭紹叔徃候之遇其卧因問疾茂曰我病可耳紹叔曰都下殺害日甚使君家門塗炭今欲起義長史那猶卧茂因擲枕起即袴褶隨紹叔入見武帝唐書曰玄宗嘗製大𬒳長枕與寕王憲申共之又曰貴妃姉虢國夫人豪侈尤甚所枕照夜枕不知其價夜中照廡其光如晝尸子曰孝子一夕五起視親衣之厚薄枕之髙下淮南子曰楚將子發好伎道之士有善偷者往見子發子發禮之無幾齊伐楚偷夜出盗其齊將軍枕歸之明夕復取其簮又以歸之齊師大駭還師而去越絶書曰越王問范子曰寡人巳問隂陽之事糓之貴賤可得而知乎曰陽者主糓貴隂者主糓賤故當寒而不寒糓爲之暴貴當温而不温者糓爲之暴賤王曰善書帛藏之枕中以爲國寳范子曰堯舜禹湯皆有預見之明雖有凶年而民不窮王曰善以丹書置之枕中以爲邦貴東宫舊事曰皇太子納妃有龍頭舊髻枕銀鐶鈎副之蔡質漢官儀曰尚書郎直給通中枕西京雜記曰趙飛燕爲皇后其女弟上遺虎珀枕龜文枕拾遺録曰魏咸熈二年宫中夜夜有異或吼呼驚人乃有傷害者詔使宦者闇中伺候有白虎毛色净宻以戈投虎即中左目俄而往取虎巳隱形更搜覔乃於藏中得一玉虎枕左目有血帝嗟其大異問諸大臣荅云昔誅梁兾得玉虎枕一枚云此枕單池國所獻臆下有題云帝辛九年獻帝辛紂也金玉乆而有神神仙傳曰㤗山父者漢武帝東廵狩見父頭頂白光髙數尺帝呼問之曰有道士教臣作神枕枕有三十二物二十四物以應二十四氣八物應八風臣行之轉少而齒生列異傳曰景𥘉中咸陽縣吏王臣夜倦枕枕卧有頃聞竈下有呼曰文納何不以之頭下應曰我見枕不得動汝來就我至乃飲缶也集異記曰中山劉玄暮忽見一人着烏袴褶取火照之靣首無七孔靣莽黨然乃請師筮之師曰此是君家先丗物乆則爲魅劉因執縛刀斫數下變爲一枕乃是其先祖時枕異苑曰滕放枕文石枕卧忽暴雷震其枕傍人莫不爲之怖懾微覺有聲不爲驚也楚宋玉髙唐賦曰楚王嘗遊髙唐怠而晝寢夢見一婦人曰妾巫山之女也願薦椀蓆司馬相如長門賦曰搏芳若以爲枕席荃蘭而爲香又美人賦曰髙茵重設角枕横施劉向別録曰向有芳松枕賦後漢張紘瓌林枕賦曰有卓爾之殊瓌超詭異以邈絶且其色也如芸之黄其爲香也如蘭之芳其文綵也霜地金莖紫葉而紅榮蔡邕警枕銘曰應龍蟠蟄潜德保靈制器像物示有其形哲人降鑒居安慮傾崔駰六安枕銘曰枕有規矩恭一其德承元寕躬終始不􅑯六安言六靣安也蘇彦楠榴枕銘曰珎木之竒文鬰理鮮廉稜方正宻滑貞堅卞敬宗作無患枕讃無患木名也言人枕之無患也江文通詩曰撫枕懷百慮𬒳說文曰衾大被也釋名曰𬒳所以𬒳覆人也衾也其下廣大如岸一受人也論語曰必有寢衣長一身有半詩曰錦衾爛兮又曰肅肅霄征抱衾與裯裯單𬒳也傳曰楚子次于乾谿雨雪楚王皮冠秦復陶翠被豹舄執鞭以出史記曰王章字仲卿疾無𬒳卧牛衣中又曰汲黯曰公孫弘位至三公俸禄甚厚爲布𬒳此詐也上問弘弘謝曰有之夫九卿與臣善者無過黯然今日廷詰臣誠中臣之病夫以三公爲布𬒳飾詐以釣名且臣聞管仲相齊有三歸侈擬於君桓公亦霸晏嬰相景公食不重肉妾不衣絲齊國亦治今臣位爲御史大夫而爲布𬒳自九卿以下至小吏無差誠如黯言且無汲黯申之陛下安聞此言天子以爲謙讓愈益厚之漢書曰廣川王去疾妃昭信甚砳王愛姬陶望卿昭信妬之譛於王曰望卿視有姦窺即言郎中令卧錦𬒳王信之擊殺之又曰李夫人病篤上自臨候之夫人蒙𬒳謝曰妾乆寢病形貌壞不可以見帝願以王及兄弟爲託又曰霍光薨詔賜繡𬒳百領後漢書曰祭遵奉公家無私財布𬒳夫人裳不加綵又曰宣秉性節儉常服布𬒳𬞞食華嶠後漢書曰樂崧爲郎獨宿眞臺上無𬒳帝推𬒳與之袁山松後漢書曰范丹爲萊蕪長去官無𬒳空囊自隨也謝承漢書曰京兆朱寵字仲威爲太尉家貧卧布𬒳朝廷賜錦𬒳卧兼布𬒳又曰羊續字興祖爲南陽太守以清率下唯卧一幅布綯敗糊𥿄𥙷之綯與禂同東觀漢記曰王良爲大司徒在位恭儉妻子不入官舎布被瓦器又曰馮豹字仲文後母惡之嘗因豹夜卧引刀斫之正值其起中𬒳獲免又曰馮豹毎奏事未報常服省閣下或從昏至明天子黙使小黄門持𬒳覆之曰勿驚之漢官典職曰尚書郎入直供青練白綾𬒳或錦被魏書曰文帝詔朝臣三代大夫知𬒳服五代大夫知飲食此言𬒳服飲食難曉也晉陽春秋曰景帝有目疾文鴦之來攻驚而目出懼六軍恐䝉以𬒳痛甚齧被破晉書曰魏舒爲尚書郎或有非其人論者欲有沙汰之言舒乃曰吾即其人也襆被徑出論者咸自愧之也又曰楊駿𬒳誅𥘉駿徴髙士孫登遺以布𬒳登截𬒳於門外大呼曰斫刾旬日託疾死及是其言果驗又曰光逸字孟祖爲博昌小吏令使之冒雨還令不在逸解衣卧衾𬒳中令還詰之逸曰衣單冐雨如不易衣衣必致凍死何惜一𬒳而殺一人耶令竒之而不問又曰祖逖字士雅與琨共𬒳寢中夜聞鷄鳴蹴琨覺曰起舞此非惡聲又曰呉納爲呉興守徴爲尚書去任有𬒳幞而巳又曰秃髪烏孤之祖壽闐之在孕母胡掖氏因寢而産於𬒳中鮮卑謂𬒳爲秃髪因而氏焉宋書曰虞龢位中書郎廷尉少好學居貧屋漏恐濕墳典乃舒𬒳覆書書獲全而𬒳大濕時人以比高鳯又曰沈麟士以楊王孫皇甫謐深逹生死而終禮矯俗乃自爲終制遺令氣絶剔𬒳取三幅布以覆屍及斂仍移布於屍下以爲斂服反𬒳左右兩際以周上又曰康沙門釋寳志王亮欲以衲𬒳遺之未及有言寳志忽來牽𬒳而去又曰羅研齊苟兒之役臨汝侯嘲之曰卿蜀人樂禍貪亂一至於此對曰蜀中積弊實非一朝百家爲林不過數家有食貪亂樂禍無足多恠若令牀上有百錢布𬒳甑中有數升麥飯寜肯爲亂乎梁書曰裴之横字如岳少好賔重氣俠不事産業兄之髙以其縱誕乃爲狹𬒳𬞞食以激厲之之横嘆曰大丈夫冨貴必作百幅𬒳後爲呉興太守作百幅𬒳以成其志陳書曰髙宗時豫州獻織成羅文錦𬒳詔於雲龍門外焚之孫卿子曰天子至尊重無上矣衣𬒳則五彩雜間色重文繡加飾之以珠玉家語曰黔婁先生死𬒳短露足孔子及門人見之謂其妻曰寧使正之不足不可斜之有餘說苑曰鄂君乗青翰之舟張翠華之蓋越人擁檝而歌曰山有木兮木有枝心恱君兮君不知於是鄂君舉繡𬒳而覆之夏侯孝子集曰羊太常辛夫人字憲英性不好華麗從外孫胡母楊上夫人錦𬒳夫人取反卧之晉惠帝起居注曰帝至朝歌無𬒳中黄門以兩幅布𬒳給帝東宫舊事曰太子納妃有綵柸文綺𬒳一絳具文羅一幅被一綘𬒳羅繡文四五幅被一東宫故事曰太子有七彩文綺𬒳又有綘文羅𬒳京兆舊事曰長安孫晨家貧爲郡功曹十月無被夜卧蒿束晝収之西京雜記曰趙飛鷰爲皇后其女弟上遺鴛鴦𬒳晉陸雲與兄機書曰一日按行曹公器物有寒夏被七枚海内先賢傳曰姜肱字伯淮事繼母年少肱兄弟感凱風之孝同𬒳而寢不入室以慰母心也邊讓别傳曰讓字元禮才辯俊逸孔融薦於魏武曰邊讓爲九州之𬒳則不足爲單衣䄡則有餘益部耆舊傳曰王忳字少林於客舎見諸生疾甚困謂忳曰腰下有金十斤願以相與乞收藏屍骸未及問其姓名呼吸困絶忳賣金一斤以給棺柩餘九斤置生腰下後署大度亭長到亭有白大馬一疋入亭中其日大風有一繡𬒳隨風來而後忳乗馬馬突入金彦父家彦父見曰眞得盗矣忳說得馬之狀又取𬒳示之彦父曰卿有何隂德曰念葬諸生事且說形狀彦父曰眞我子也忳即以被馬歸之彦父不受遣迎生䘮金具存焉列女後傳曰江夏孟宗少遊學與同學共處母爲作十二幅𬒳其隣婦恠問之母曰少兒無異操懼明類之不頋大其𬒳以招貧生之卧庻聞君子之言耳桓任傳曰任後母酷惡常憎任爲作二幅箕踵𬒳杜祭酒别傳曰君曽新作𬒳煖眠不覺晏起乃歎煖眠使人忘起異事因命着陌上有寒苦人舉𬒳乞之常眠布𬒳中孫畧别傳曰親親有窮老者畧或推𬒳以恤之竟寒不解帶而寢郭子曰殷浩好作楊州劉君行曰小欲暮便令左右取𬒳幞人問其故荅云刺史嚴不敢夜行語林曰魏武云我眠中不可妄近近輙斫人不覺左右冝愼之後乃陽凍眠所幸小兒竊以𬒳覆之因便斫殺自尔莫敢近之又曰傳信字子思遭父䘮哀慟骨立母憐之竊以錦𬒳䝉其上林宗往吊之見𬒳謂之曰卿海内之雋四方是則如何當䘮錦𬒳蒙上郭奮衣而去自後賔客絶百許日古詩曰客從逺方來遺我一端綺文彩雙鴛鴦裁爲合歡𬒳着以長相思縁以結不解樂府詩曰天寒知𬒳薄憂思知夜長楚辭曰翡翠珠爛齊光陸雲芙蓉詩曰寢共織成𬒳絮以同攻綿傅玄𬒳銘曰𬒳雖温無忘人之寒無厚於巳無薄於人張華苦行曰重無暖氣輕𬒳覆空牀潘岳悼亡詩凛凛凉風升始覺夏衾單豈曰無重瀇詩與同歳寒劉孝威謝賚錦𬒳啓曰色豔蒲萄采踰聮壁鄂君慙繡楚侍羞朱雖復帝賜鶴綾客贈鴛綺髙慙藻麗逺謝鮮明漢老恱其恠文魏馬驚其香氣太平御覽卷第七百七
