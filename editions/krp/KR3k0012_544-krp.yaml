front:
  text: 太平御覽卷第五百四十四
  hash: sha256:a5c051ef080d061ad99e14f91aeb21e056060ba641e36da137626854b0ee84eb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_544-1a}
body:
  text: 禮儀部二十三喪紀上周禮天官宰夫曰大喪小喪掌小官之戒令帥執事而治之大喪王后丗子也小喪夫人以下也小官士三公六卿之喪與職喪帥官有司而治之凡諸大夫之䘮使其旅帥有司而治之旅冢宰下下士也又天官宫正曰大喪則授廬舎辨其親踈貴賤之居廬倚廬也舎堊室也親者貴者倚廬踈者賤者居堊室也又天官獸人曰凡喪紀賔客共其死獸生獸共其完者又天官漁人曰凡喪共其魚之鱻薧周禮天官腊人曰凡喪共其脯腊凡乾肉之事又天官凌人曰大喪共夷槃水夷亦尸也實水於夷槃中置之尸牀之下所以寒尸也又天官籩人曰喪事及賔客之事共其薦籩羞籩䘮事乃籩謂殷莫時又天官醢人曰凡喪紀共其薦羞之豆實又天官掌次曰凡喪紀王則張帟三重諸侯再重孤卿大夫不重張帟柩上承塵又天官曰司裘大喪廞裘飾皮車皮車遣車之革路也古書廞字爲滛鄭司農云滛裘陳裘也折謂廞興也若詩人之興云謂象似而作之又天官内小臣曰若有裘紀則儐詔后之禮又天官􅕡曰喪紀之事設門燎蹕宫門廟門燎地燭也蹕行者廟在中門之外又天官寺人曰䘮紀之事則帥女宫而致於有司有司謂宫卿丗婦也又天官丗婦曰掌喪紀之事帥女宫而濯槪爲粢盛槪拭也爲猶差擇也又天官女御曰大喪掌沐浴王及后之䘮也后之喪持翣從丗婦而吊于卿大夫之喪從之數盖如使者之介也又天官典絲曰喪紀共其絲纊組文之物以給線縷著盱口綦握之屬也青與赤謂之文又天官内司服曰右之喪共其衣服凡内具之物内具紛悅線纊槃帙之属又地官大司徒曰大喪帥六郷之衆庻屬其六引而治其政令衆庻所致役也鄭司農云引喪車索也六郷主六引遂六主紼也若國有大故則致萬民于王門令無節者不行天下大故謂王崩及冦兵也節大節也有節乃得行防姦僞也又地官曰郷師大䘮用役則帥其民而至遂治之治謂監督其事及葬執纛以與匠師衘匶而治役匠師事官之屬其司官若郷師之於司徒也郷師主役匠師主衆匠共主葬引翿羽葆折也爾雅曰纛醫也以指麾輓柩之役正其行列進退及窆執斧以涖匠師匠師主豊碑之事報執斧以難之使戒其事又地官閭胥曰凡喪紀之數聚衆庻旣比則讀法書其敬敏任恤者䘮紀大喪之䘮之事也皆㑹聚衆民因以讀法勑戒之也又地官遂師曰大喪使帥其屬以幄帟先道野役及窆抱磨共丘籠及蜃車之役使以幄帟先者太宰也其餘司徒也幄帟所爲葬窆之間先張神坐也道野役帥以至墓也丘籠之役竁復士也其器曰籠蜃車柩路也載柳四輪迫地而行似於蜃因取名焉行至壙乃脫更復載復以龍又地官委人曰喪紀共其薪蒸木材又地官土均曰禮俗喪紀祭祀皆以地媺惡爲輕重之法而行之掌其禁令君子行禮不求變俗隨其土地厚薄爲之制也又地官囿人曰䘮紀賔客共其生獸死獸之物又地官舎人曰大喪共飯米敖榖飯所以實口不忍虚也君用梁大夫用稷士用黍皆四外實者唯盈敖榖者措于一旁所以惑蚍蜉又春官大宗伯曰以凶禮哀邦國之憂朝覲㑹同則爲上相大喪亦如之又春官小宗伯曰王崩大肆以秬鬯渳鄭司農云大肆大浴也秬以鬯浴尸也又春官肆師曰大喪大渳以鬯則築鬻築香草煑以爲鬯以浴尸也香草欎又春官鬱人曰大喪之渳共其肆器肆器陳尸之器及葬共其祼器遂埋之遣奠之彛瓉也埋於祖廟階間又春官鬯人曰大喪渳設斗共其釁鬯斗所以沃尸也釁尸所以鬯酒使之香美者也又春官司几筵曰凡䘮事設葦席右素几其栢席用萑黼純諸侯則紛純每敦一几喪事諸几奠也萑如葦而細者也鄭司農云栢席迫地之席也葦居其上或曰柏席載黍稷之席也玄謂柏椁字磨减之餘也椁席藏中神坐之席也敦謂曰燾燾覆也棺在殯則椁敦旣窆則加見皆謂覆之周禮雖合葬及周時在殯皆異几體實不同也祭於廟同几精氣合凡吉事變凡凶事仍几古書仍爲鄭司農云變几變更其質謂無節又春官天府曰凡國之玉鎭大寳器藏焉若有大祭大䘮則出陳之旣事藏之玉鎭大寳器王瑞玉器之羙者也禘祫及䘮陳之以華國也凡吉凶之事祖廟之中沃盥執燭吉事四時祭也凶事后王䘮朝於祖廟之奠也又春官職喪曰掌諸侯之䘮及卿大夫士凡有爵者之喪以國之喪禮涖其禁乃序其事國之䘮禮䘮服士䘮旣夕土虞今存者也其餘則亡事謂小歛大歛葬也凡國有司以王命有事焉則詔賛主人有事謂含遂贈之屬鄭司農云凡國諸侯國也有司謂王有司以命有事職䘮主詔賛主人凡公有司之所共職喪令之趣其事今令其當共物者給事之期也有司或言公或言國者由其君所來也居其官曰公又春官司巫曰凡喪事掌巫降之禮降下也下神之禮也又春官太史曰大䘮執法以涖勸防鄭司農云勸防六引六紼也遣之日讀誄遣謂祖廟之庭大奠將行之時也人之道終於此累其行而讀之太師帥瞽廞之而謚瞽史知天道使共其事言王之誄謚成於天也凡䘮事考焉爲有得失又春官巾車曰掌王之䘮車五乘木車蒲蔽犬䄙尾橐䟽飾小服皆䟽木車不􅃮者也鄭司農云蒲蔽車謂嬴蘭車以蒲爲蔽也天子喪服之車也漢儀亦然犬䄙以犬皮爲覆笭也故書䟽爲揟杜子春讀揟爲沙玄謂蔽車旁禦風塵者也犬白犬皮也旣以皮爲覆笭又以其尾爲戈㦸之弢麄布飾二物之側爲縁也若今攝菔云也服讀爲菔刀劒短兵衣也此始遭䘮所乗也爲君之道尚微備姦臣也書曰以虎賁百人迎子釗亦爲備焉素車棼蔽犬䄙素飾小服皆素素車以白土堊車也棼讀爲薠薠麻也以麻爲蔽也其䄙繒爲縁此卒哭所乗也爲君之道益著在車可以去戈㦸也薻車薻蔽鹿淺䄙革飾故書藻爲􅠘杜子春云折讀爲華藻之藻直謂華藻也玄謂薻水草名蒼色也以蒼土堊車以蒼繒爲蔽鹿夏皮爲覆笭也又以所治去毛者縁之此旣練所乗之車也駹車雚蔽然䄙髤飾駹車邊側有􅃮飾也雚細葦席也以爲蔽者漆則成藩即吉也然果然也髤赤多黑少之色韋也此大祥所乗之車也漆車藩蔽豻䄙雀飾􅃮車墨車也藩今時小車藩也􅃮席以爲蔽豻胡犬也雀黑多赤少之色韋也此所乗之車也大喪飾遣車遂廞之行之謂陳駕之及葬執蓋從車持旌隨柩路持盖與旌及墓呼啓關陳車小䘮共匶路與其飾柩路載柩車飾柩飾又春官司常曰大喪共銘旌建廞車之旌又夏官大司馬曰大喪平士大夫鄭司農云平壹其服也玄謂平者正其職與位也喪祭奉詔馬牲王之喪以馬祭者盖遣莫也奉猶送也送之至莫告而藏之又夏官射人曰大喪與僕人遷尸作郷大夫掌事此其廬不敬者呵罰之僕人大僕與射人俱掌王之朝位也又夏官司士曰大喪作士掌事作六軍之士執披披持棺者又夏官諸子曰大䘮正羣子之服位又夏官虎賁氏曰國有大故則守王門大喪亦如之又夏官太僕曰䘮紀正王之服位詔法儀賛王牲事牲事殺割杜載之屬大䘮始崩戒鼔傳逹于四方窆亦如之戒鼔擊鼔以敬衆也又夏官司兵曰大䘮廞五兵廞興也興作明器之役器五兵也又夏官圉人曰䘮紀牽馬而入陳廞馬亦如之廞馬遣車之馬也又秋官大司冦曰凡朝覲㑹同前王大䘮亦如之大䘮所前或嗣王也又秋官士師曰諸侯爲賔則帥其属而蹕于王宫大䘮亦如之又秋官郷士曰大䘮紀帥其属夾道而蹕属中士巳下也又秋官司隷曰賔客䘮紀之事則役其煩辱之事煩猶劇也士䘮禮下篇曰隷入涅厠又秋官大行人曰若有大䘮則詔相諸侯之禮詔相左右告敎之禮記檀弓上曰子上之母死而不䘮門人問諸子思曰昔者子之先君子䘮出母乎曰然子之不使白也䘮之何也子思曰昔者吾先君子無所失道道隆則從而隆道汙則從而汙伋則安能爲伋也妻者是爲白也母不爲伋也妻者是不爲白也母孔氏之不䘮出母自子思始也禮記所由廢非之也又檀弓上曰公叔朱有同母異父昆弟死問於子游子游曰其大功乎狄儀有同母異父之昆弟死問於子夏子夏曰我未之前聞也魯人爲人齊衰狄儀行齊衰今之齊衰狄儀之問也又檀弓上曰子思之母死於衛子思伯魚子伯魚死妻嫁於衛栁若謂子思曰子聖人之後也四方於子乎觀禮子蓋愼諸栁若衛人子思曰吾何愼哉吾聞之有其禮無其財君子弗行也有其財無其時君子弗行也時所止則止時所行則行吾何慎哉太平御覽卷第五百四十四
