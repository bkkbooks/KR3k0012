front:
  text: 太平御覽卷第七百六十二
  hash: sha256:3665ea1e9da581f6500295b748894d7837a5962051101cf0ecb5e028f1475502
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_762-1a}
body:
  text: 器物部七瓢勺豊禁食架食厨酒臺槽杵臼堪擣衣杵碓磨碾瓢方言曰蠡瓠勺也音禮也陳楚宋魏之間或謂之樹今江東呼勺爲樹或謂之瓢通俗文曰瓠瓢爲蠡禮曰合卺音謹而酳三禮圖曰卺取四升瓠中破夫婦各一論語曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂爾雅曰康瓠謂之甈孫炎曰康瓠也郭璞曰瓠壷也賈曰寳康瓠是也戰國䇿曰應侯謂秦昭王曰百人輿瓢而趍不如一人持而走疾百人試與瓢瓢必裂今秦國華陽穰侯太后用之秦國必裂矣東宫舊事曰􅃮卺爵二銀鏁連長七尺莊子曰惠子謂莊子曰魏王貽我大瓠之鍾我樹之成而實五石剖以爲瓢濩落無所容吾爲其無用捨之楚辤九歎曰藏瓠蠡於筐簏瓠瓢蠡瓠東方朔荅客難曰以管闚天以蠡測海張晏曰蠡瓢瓠也琴操曰許由無杯噐常以手捧水人以一瓢遺之由操飲畢以瓢掛樹風吹樹瓢動歴歴有聲由以爲煩擾遂取捐之勺與枸字同說文曰斗勺也通俗文曰木瓢爲斗詩曰惟北有斗不可以挹酒漿又曰酌以大斗大斗長三尺以祈黄耇周禮曰大璋中璋九寸邊璋七寸射四寸厚寸黄金勺青金外朱中鼻寸衡四寸有繅音早天子以廵守宗祝以前焉杜子春云勺謂酒樽中勺也鄭司農云鼻謂勺龍頭鼻也衡謂勺柄龍頭也鄭玄謂勺鼻流凡流智爲龍口也三璋之勺形如玉瓉天子巡守有事山川則用灌焉於大山川則用大璋中山川用中璋於小山川用邊璋也又曰梓人爲飲噐勺一升勺尊升也禮曰犧恩歌切尊䟽布鼏音覔椫之演切勺此以素爲貴也鄭玄日禅木白理也又曰勺夏后氏以龍勺殷以䟽勺周以蒲勺鄭玄曰龍龍頭也䟽道刻其頭也蒲合滿如鳧頭也漢書曰霍顯之謀行於柸勺東宫舊事曰􅃮注八合鴨頭勺四論衡曰司南之勺投之於地其柄指南語林曰諸阮以大盆盛酒木勺數枚也束晳貧家賦曰舉短柄之掘勺豊三禮圖曰射爲罰爵之豊作人形也豊國名也坐酒亡國戴盂戒酒說文曰豊爼豆貴豊厚也一曰郷飲酒有豊侯者儀禮曰司射適堂西命弟子設豊將飲不勝設豊以承其爵豊形蓋似豆卑而大之又曰公尊瓦泰兩有豊崔駰酒箴曰豊侯沉酒荷甖負缶自戮於丗圗形戒後李尤豊侯銘曰豊侯荒繆酔亂迷逸乃象其形爲豊戒式後丗傳之固無止說禁一名棜乙去切三禮圖曰於長四尺廣二尺四寸深寸無足􅃮赤中青雲畫䔖苕華飾禁長四尺廣二尺四寸通局足髙三寸􅃮赤中青雲畫䔖苕華飾刻鏤其足爲褰帷之形儀禮曰尊於户間兩甒音武有禁禁承尊之噐名之曰禁因爲酒戒也又曰尊兩壼于房户間斯斯禁禁切地無足也禮曰天子諸侯之尊廢禁大夫士棜禁此以下爲貴也廢猶去也棜斯禁也無足有似於棜或因名之小耳大夫用斯禁士用棜禁如今方案情悵局食架東宮舊事曰􅃮食架二食厨禮曰大夫七十而有閣閣以板爲之度食物也天子之閣左逹五右達五公侯伯於房中五大夫於閣三士於坫一達夾室大夫言於閣與天子同處天子二五倍諸侯也東宮舊事曰􅃮食厨一具酒臺周禮曰六彛皆有舟鄭司農曰舟下臺也若今時承盤也東宫舊事曰􅃮酒臺二金塗鐶鈿槽劉伶酒德頌曰先生方棒罌承槽衘柸嗽醪杵臼易下繫辭曰斷木爲杵掘地爲臼臼杵之利萬民以濟蓋取諸小過王肅曰雷起起上杵之象地艮止於下曰之義書曰血流漂杵孔安國曰流而漂春杵甚之言也一戎衣天下大定禮曰隣有䘮舂不相相送杵聲又曰暢臼以掬杵以梧所以檮欎鬯栢也穀梁傳曰大夫救日擊門士擊杵舂染盛之具示有上下隂陽周易類謀曰間可倚杵鄭玄曰天地相去其間才可倚一杵也春秋繁露曰夏求雨暴杵臼於街十日漢書曰傳咸爲南陽太守有猾吏大妵犯令爲地臼木杵舂不中程者輙加笞箠又曰江都易王非宫人有過者或髠鉗以鈆杵舂不中程輙掠又曰楚王戊即位胥靡申公白公衣赭衣使雅舂於市東觀漢記曰公沙穆遊太學無資粮乃變服客傭爲吴祐賃舂祐與語大驚遂共定交於杵臼之間後漢書曰梁鴻之妻孟光多力能舉石臼又曰馮衍娶北地任氏女爲妻悍忌不得畜媵妾兒女常自探井臼王隱晉書曰賈后使小黄門孫慮徙愍懷太子於坊中不與食乃刼服杏子黒丸其夜薨或傳太子不肯服藥伺至厠以藥杵橦害之喚聲聞於外燕書曰昭武帝營新殿昌黎大棘城縣河岸崩出䥫築杵頭一千一百七十枚永樂民郭陵見之詣闕言狀詔曰經始崇殿而築具出人神允恊之應賜陵爵關外侯戰國䇿曰智伯攻趙襄子於晉陽臼竈生鼃於禍切又曰衛人迎新婦婦入室見臼曰徙之牖下妨徃來者主人美之河圗曰千歳之後天可倚杵孟子曰盡信書不如無書吾於武成取二三䇿而巳矣仁者無敵於天下以至仁伐至不仁何其血之流杵也吕氏春秋曰伊尹母夢神告之臼出水而東走賈誼書曰黄帝行道炎帝不聽故戰涿鹿之野血流漂杵淮南子曰解門以爲薪塞井以爲臼雖用小而所喪大矣桓譚新論曰伏羲制杵臼之利後丗加巧因借身以踐碓而利十倍又曰復設機關用驢羸牛馬及役水而舂其利百倍論衡曰春者以杵擣臼杵臼鼔動地動地臨池水河水震蕩夫臼杵木也水與木土三者殊類而相應首相叩動其勢然也風俗通曰秦留燕太子丹天爲雨栗厨中杵生肉是不然也丗本曰雍父曰作舂杵臼宋志折雍父黄帝名也湘州記曰棗陽縣有蔡倫宅宅西有一石臼云是倫舂紙臼荆州記曰長沙醴泉縣有山石空空中有石牀牀頭有臼容五升父老相傳昔有仙人以此合金丹衡山記曰桂英巖上鑿石作臼有鐵杵倚置巖畔石臼邊有兩人脚跡名山記曰羅浮山有道士賫䥫臼杵欲合丹未成而仙化丗說曰魏武帝讀曹娥碑云外孫虀臼楊修曰虀臼受辛受辛辤字幽明録曰劉松在家忽見一鬼杖劒斫之鬼走松起逐見鬼在髙山巖室上卧仍徃逼突群鬼争走遺置藥杵臼及所餘藥因將還家松爲人合藥時臨熟取一經此臼者無不効驗列異傳曰魏郡張舊家巨冨復暴衰賣宅與黎陽程應應入居死病相繼賣荆民何文日暮持刀上北堂中至二更有一人長丈餘髙冠黄衣來堂前呼問細腰舎中何以有人氣湏臾復有一人髙冠青衣次又髙冠白衣問並如前將曙文下堂如向法呼細腰問曰黄衣者誰曰金也在堂西壁下青衣者誰曰錢也在堂前井西五歩白衣誰曰銀也在堂東北任下汝誰也曰我也在竈下至明文按次掘之得金銀各五百斤錢千餘萬取杵焚之宅遂清安魏武上獻帝表曰臣袒騰有順帝賜噐今上藥杵臼一具堪與砧同爾雅曰堪謂之榩郭菐曰堪木質也榩音䖍廣雅曰枕質堪也東宫舊事曰太子納妃有石砧一枚又擣衣杵十杵荆州記曰柹歸縣有屈原宅女嬃音湏廟擣衣石猶存漢水記曰有女郎檮衣砧也古樂府詩曰藁砧今何在山上復有山藁砧謂失也碓廣雅曰碓也丁切方言曰碓機陳魏宋楚自關而東謂之柩魏略曰司農王思弘作水碓免歸田里晉書曰魏舒遟鈍質朴不爲郷親所重從叔父吏部郎衡有當丗名猶不知之使守水碓王隱晉書曰石崇有水碓三十區又曰劉頌爲河内太守有公王水碓三十餘區所在遏塞輒爲侵害頌表上封諸民獲便冝又曰衛灌爲太子少傅詔賜園曰水碓不受又曰鄧攸去石勒投李矩借水碓舂於城東晉諸公讃曰征南杜預作連機碓晉陽秋曰給陳留王碓一區幽明録曰弘農徐儉家有一逺來客寄宿有馬一疋中夜驚跳客不安騎馬而去一物長丈餘來逐馬後客射之聞如中木聲明日㝷昨路見箭着一碓柵丗說曰王戎旣貴且冨區宅水碓洛下莫比孔融肉刑論曰賢者所制或踰聖人水碓之巧勝於斷木掘地王渾表曰洛陽百里内舊不得作水碓臣表上先帝聽臣立碓并攙得官地磨說文曰䃺莫佐切石磑也磑音五對切釋名曰磑磨也廣雅曰礱磨也方言曰磑或謂之婕即磨也錯碓切通俗文曰麤曰䃀内刀填音鏤䃺曰硐途棟切磨牀曰􅎥直易切魏略曰諸葛亮爲衝車圍郝昭於陳倉昭以繩繫石磨羂古犬切其衝車魏志曰管輅字公明平原人也徃同村郭思家磑上有鳩食相闘輅曰不祥思明日射鳩悮中隣女蜀志曰許靖爲許劭排擯以馬磨自給晉書曰王戎爲司徒好治産業周遍天下水碓四十所鄴中記曰解飛者石虎時工人造作旃檀車左轂上置磑右轂上置碓每行十里磨麥一石春米一斛丗本曰公輸般作磑諸葛亮別傳曰孫權常饗蜀使費椲音揮停食䴵索筆作麥賦恪亦請筆作磨賦異苑曰上黨侯亮之於江都城下獲一石磨下有銅馬幽明録曰廣陵有家相傳漢江都王逮之墓也常有村人行過見地有數十具磨取一具持歸暮即叩門求磨甚急明且送着故處抱朴子曰周髀家云天旁轉如推磨而左行日月右行隨天左轉譬之於蟻行磨上磨左旋而蟻遟故不得不隨磨以右廽焉嵇含八磨賦曰外兄劉景宣作爲磨竒巧特異䇿一牛之任轉八磨之重因賦之曰方木矩跱圎質䂓旋下靜以坤上轉以乾巨輪内建八部外連碾通俗文曰石碢轢榖曰碾碢徒後魏書曰崔亮在雍州讀杜預傳見其爲八磨嘉其有濟時用遂教民爲碾及爲僕射奏於張方橋東堰榖水造水碾磨數十區其利十倍國便之太平御覽卷第七百六十二
