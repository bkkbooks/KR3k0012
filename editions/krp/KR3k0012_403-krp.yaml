  text: 太平御覧卷第四百三
  hash: sha256:b5514b5609e155853920d49bc830040ca4cf787a1b623be79c7587ccab894e96
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_403-1a}
body:
  text: 人事部四十四道徳隂徳道徳禮記中庸曰天命之謂性率性之謂道修道之謂教道也者不可湏臾離也可離非道也又曰大哉聖人之道洋洋乎發育萬物峻極于天育生也峻高大也優優大哉禮儀三百威儀三千待其人然後行故曰苟不至徳至道不凝焉又曰天下之逹道五所以行之者三曰君臣也父子也夫婦也昆弟也朋友之交也五者天下之逹道也知仁勇三者天下之逹徳也又曰君子之道四丘末能一焉所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也庸德之行庸言之謹有所不足不敢不勉又曰君子之道造端乎失婦及其至也察乎天地子曰道不逺人人之爲道而逺人不可以爲道又學記曰玉不琢不成器人不學不知道又曰大道不器謂聖人之道不如器施於一物也又樂記曰君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑而不樂道謂仁義也欲謂邪淫也尚書大禹謨曰罔違道以干百姓之譽失道求名古人賤之又洪範曰無有作好遵王之道言無有亂爲私好惡動必循先王之道又旅􅋙曰志以道寜言以道接在心爲志發氣為言皆以道為本故君子勤道周易繫辭曰知周乎萬物而道濟天下又曰一隂一陽之謂道論語學而曰敏於事而慎於言就有道而正焉有道謂有道徳者正謂問事是非也又公冶長曰子謂子産有君子之道四焉其行己也恭其事上也敬其養民也惠其使民也義又曰子曰天下有道則見無道則隱邦有道貧且賤焉恥也邦無道冨且貴焉恥也又衛靈公曰子曰人能弘道非道弘人又曰君子謀道不謀食又曰天下有道則禮樂征伐自天子岀又曰君子學以致其道又曰子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉又顔淵曰季康子問於孔子曰如殺無道以就有道何如孔子對曰子爲政焉用殺子欲善而民善矣君子之徳風小人之徳草草上之風必偃欲使季康子先自正也偃仆也草加之以風無不仆者猶民之化下大戴禮曰篤仁而好學多聞而順道天子疑則問應而不窮者謂之道道者導天下之道老子曰道可道非常道王弼曰可道指事造形非其常道可道莊子曰魚相造乎水人相造乎道子思子曰天下有道則行有枝葉天下無道則言有枝葉又曰祝牧謂其妻曰天下有道我韍子珮天下無道我負子戴又曰原憲處魯居環堵之室上漏下濕匡坐而絃歌匡正也子貢乗大馬中紺而表素軒車不容巷往見原憲原憲正冠蹤履杖藜應門子貢曰嘻先生何病也原憲應之曰憲聞無財之謂貧學道而不能行之之謂病今憲貧也非病也子貢逡廵而有愧色文子曰夫道德者匡邪以爲正治辭以爲定上下之儀也上有道徳即下有仁義積道者天與之地助之鬼輔之鬻子曰發政施令爲天下福謂之道公孫尼子曰道爲智者設賢爲聖者用淮南子曰聖人之道若中衢樽過者斟酌雖多少不同而各得其冝也楊子法言曰仲尼之道猶四瀆經營中國終入大海又曰君子之道有四簡而易用也要而易守也炳而易見也法而易言也又曰聖人重其道而輕其禄衆人重其禄而輕其道鹽鐵論曰以道徳爲城文王是也以道徳爲胄湯武是也桓譚新論曰三皇以道治五帝以德化王道純粹其德如彼霸道駮雜其功如此王逸正部曰仲尼門人餔道醇飲道宗昌言曰道德仁義天性也織之以成其物練之以致其情瑩之以發其光任子曰道德之懷民猶春陽之柔物也履深冰而不寒結木條而不折杜氏幽求子曰蓋道清淡以無爲爲家恬虚寂靜弘廣多包豈非聖人所宅乎又曰有道之國其鬼不神崔元始正論曰國不信道工不信度亡可待也傅子曰君子審其宗而後學明其道而後行中論曰道之於人甚簡且易不如採金攻玉渉艱難也符子曰爲道者日損而月章爲名者日章而月損釋名曰徳得也得事冝也周禮地官下師氏曰一曰至徳二曰敏徳三曰孝徳至徳中和之德敏德仁義順時孝徳尊祖愛親禮記學記曰禮樂皆得謂之有徳徳者得也又祭義曰天子有善讓徳於天又中庸曰雖有其位苟無其徳不敢作禮樂焉雖有其徳苟無其位亦不敢作禮樂焉又曰小徳川流大徳敦化此天地之所以爲大也又表記曰以徳報徳則民有所勸又大學曰冨潤屋徳潤身左傳桓公曰臧哀伯諌曰君人者將昭徳塞違以臨照百官猶懼或失之故昭令徳以示子孫又僖公中曰庸勲親親䁥近尊賢德之大者也又曰德以柔中國刑以威四夷又曰太上以德撫民又文公上曰孝敬忠信爲吉徳盗賊姧藏爲凶徳又宣公上曰楚子觀兵于周疆定王使王孫滿勞楚子楚子問鼎之大小輕重焉對曰在徳不在鼎又成公上曰四王之王也禹湯文武樹徳而濟同欲焉又襄公四曰太上有立德其次有立功又昭公三曰盛徳必百世毛詩蕩烝民曰徳輶如毛民鮮克舉之尚書舜典曰玄徳升聞乃命以位玄謂幽潜潜行道徳升聞天朝遂見徴用又大禹謨曰臯陶邁種徳徳乃降黎民懷之邁行種布也臯陶布行其徳下洽於民民歸服之又曰惟徳動天無逺不届又伊訓曰徳日新萬邦惟懷志自蒲九族乃離又曰爾惟徳罔小萬邦惟慶爾惟不徳罔大墜厥宗又太甲曰徳惟治否徳亂爲政以徳則治不以德則亂又咸有一徳曰非天私我有啇惟天佑于一徳非啇求于下民惟民歸于一徳徳惟一動罔不吉徳二三動罔不凶又秦誓曰同力度徳同徳度義力鈞則有徳者勝德鈞則秉義者強又曰受有億兆夷人離心離徳子有亂臣十人同心同徳又曰樹徳務滋除惡務本立德務滋長去惡務除本又洪範五福四曰攸好徳所好者徳福之道又旅獒曰玩人喪徳玩物喪志以人爲戯弄則䘮其徳又蔡仲之命曰皇天無親惟徳是輔又周官曰作德心逸日休作僞心勞日拙為德直道而行於心逸豫而名日美又君陳曰黍稷非馨明徳惟馨周易坤卦象曰地勢坤君子以厚徳載物又繫辭曰冨有之謂大業日新之謂盛徳論語爲政曰爲政以徳譬如北辰居其所而衆星拱之德者無爲猶北辰之不移而衆星拱之又里仁子曰徳不孤必有隣又先進曰徳行顔回閔子騫冉伯牛仲弓又憲問耻曰有徳者必有言有言者不必有徳又曰驥不稱其力稱其徳也驥古之善馬也徳謂在五御之威儀又季氏曰逺人不服則修文徳以來之尚書大傳曰有徳者尊其位而重其禄史記曰一年種之以榖十年樹之以木百年來之以徳東觀漢記曰張湛字子孝右扶風人以篤行純淑郷里歸徳雖居幽室闇處自整頓三輔以爲儀表又曰淳于恭字孟孫北海淳于人以謙儉推讓爲節人有刈恭禾見之念其愧因伏草中至去乃起恭家井在門外上有盆鄰里牧牛兒争飲牛恭惡其争多置器其上爲預汲水滿之小兒復争恭各語其家父母父母乃禁怒之里落皆化而不争三輔決録曰馮豹字徳文母爲父所岀後母遇之甚酷豹事之愈謹時人爲之語曰道徳彬彬馬徳文王隱晉書曰庚衮字叔襃頴川人少遭大疫二兄亡次兄毗又疫其癘氣方熾衮父母諸弟皆出避家衮獨不出諸父強之不可曰衮性不畏病納漿粥扶持不捨晝夜省柩哀臨十有餘旬病曁歇家乃反而衮亦無患害宗黨歎曰異哉此子能守人之所不能守能行人之所不能行晉中興書曰衛玠字叔寳常以人有不及可以情恕非意相干可以理遣故終身不見其喜愠齊書曰張緒字思曼爲吏部尚書毎朝見太祖目送之謂王儉曰緒以位尊我我以徳貴緒又曰王秀之字伯奮爲南郡内史州西曹荀丕欲交秀之拒而不納報丕書曰僕以徳爲寳足下以位爲寳各寳其寳於此敬冝也老子曰上徳不徳是以有徳下徳不失徳是以無徳上徳之人唯道用其徳故能有德下德而徳之必有失焉文子曰山髙者其木脩地廣者其徳厚又曰閉九竅㓕志意棄聦明反無識含陽吐隂而與萬物同徳也莊子曰至徳之世不尚賢不使能韓子曰善爲吏者樹徳不能爲吏者樹怨孟子曰周于利者凶年不能殺周于徳者邪世不能亂鶡冠子曰徳及萬人者謂之豪徳過百人者謂之英孔叢子曰晏子長不過六尺齊國莫不宗焉趙文子身如不勝衣相晉國以寜諸侯敬服其徳故也楊子法言曰耕道而得道獵徳而得徳傅子曰上徳之人其濟萬物也猶天之有春秋時至自生非徳之力太公金匱曰徳行則福徳廢則覆易叅同契曰道成徳就潜伏俟時海内先賢行狀曰王烈字伯善時有盗牛者主得之盗者曰我邂逅迷惑從今將改子旣赦宥幸無使王烈聞之又曰戴良字叔鸞髙才磥硌英聲逺播少者懷之長者慕之郷里搢紳下至黎庶莫有忿争之家又曰徐孺子徴聘未甞出門赴䘮不逺萬里常事江夏黄公薨往㑹其葬家貧無以自供賫磨鏡具自隨毎至所在賃磨取資然後得前旣至設祭哭畢而返陳仲舉爲豫章太守召之則到饋之則受但不服事以成其節又曰仇覧字季智學通五經選爲亭長民有孫元少孤與母居詣覽告元不孝覽謝遣之属母歸勿言方爲教之後覧賫禮詣元爲陳孝子供養之意元遂感激卒爲孝子時令河内王渙政尚清嚴聞覧得元不治心獨望之乃問覽在亭不治不孝得無失鷹鸇之志乎對曰竊以鷹鸇不如鳯皇故不爲也渙感覧言用損威刑㑹稽典録曰鄭弘字巨爲郡督郵上計史時計掾勾章任尚居素温冨乗鮮車駕肥馬弘恒在後尚輙罵弘無愠容弘尚在京師遊學還郡俱見府君府君所問弘無不對而尚不知出又問弘掾行道數相折辱何以不荅弘謝曰過奉顯使無光國之羙馬嬴行遟靣恐失期賀以相催促自是其冝愚聞兩虎俱闘大者必傷小者必死兩爲無益故不敢荅府君歎曰此謂長者太守所不能也汝南先賢傳曰黄憲字叔度不矜名以詭時不抗行以矯俗闚其門者莫敢踐其庭覩其流者不能測其深時人論曰顔淵復生乎襄陽耆舊記曰龐徳公子奐字世文晉太康中爲䍧牁太守去官歸郷里居荆南白沙郷里人宗敬之相語曰我家池中龍種來里中化其徳少壯皆代老者擔陳寔别傳曰寔字仲躬潁川人自爲兒童不爲戯弄等類所歸寔在郷閭平心率物其有諍訟輙求判正暁譬曲直返無怨者至乃歎曰寧爲刑罰所加不爲陳君所断時歳荒民儉有盗夜入其室止於梁上寔隂見之乃起自整拂呼命子孫正色訓之曰夫人不可不自勉不善之人未必本惡習與性成遂至於此如梁上君子矣盗大驚自投於地稽首歸罪寔徐譬之曰視君狀皃不似惡人冝深尅已反善然此當由困貧令遺絹二疋自是縣無復盗竊荀氏家傳曰荀彧徳行周備名重天下海内英俊咸嘉焉又曰鍾繇以爲顔子旣没能備九徳百行不二其過者唯荀彧乎或問繇曰君推荀君比之顔子自以不及其可得聞乎繇曰夫明君師臣其次友之以太祖之聦明毎大事常先諮之荀彧是則古師友之義也吾等受命而行猶或不盡去固逺耶潘朂别傳曰朂寛賢容衆與天下人等休戚同有無不以家財爲已有任嘏别傳曰嘏字照先樂安人㓜以至性見稱遇荒亂家貧賣魚㑹官發魚魚貴數倍嘏取直如常㑹太祖創業召海内至徳嘏應其舉爲臨淄侯庶子隂徳左傳宣公下曰魏顆敗秦師于輔氏獲杜回秦之力人也𥘉武子有嬖妾無子武子疾命顆曰必嫁是疾病則曰必爲殉及卒顆嫁之曰病疾則亂吾從其治也及輔氏之役顆見老人結草以亢杜回亢禦也杜回躓而顛故獲之夜夢之曰余而所嫁婦人之父也爾用先人之治命余是以報漢書曰于定國父于公爲縣獄吏郡決曹獄平羅文法者于公所决皆不恨其閭門壞父老方共治之于公謂曰少高大閭門令容駟馬髙蓋車我治獄多隂徳未曽有所冤子孫必有興者至定國爲丞相又曰邴吉字少卿魯國人爲丞相寛大好禮𥘉吉有隂徳於孝宣帝微時帝即位衆莫知之吉亦不言吉從大將軍長史遷至御史大夫帝聞將封之㑹吉病甚將使人加綬而封之及其生也太子太傅夏侯勝曰此未死也臣聞有隂徳者必饗其樂以及子孫今未獲其樂而病非其死病也後果愈乃封博陽侯終饗其禄後漢書曰何敞六代祖比干學尚書於晁錯注云比干字少卿經明行脩兼通法律爲汝隂縣獄吏決曹掾平活數千人後爲丹陽都尉征和三年三月辛亥天大隂雨比干在家日中夢貴客車騎滿門覺以語妻語未巳而門有老嫗年可八十餘頭白求寄避雨雨甚而衣履不霑雨漬止送至門乃謂比干曰公有隂徳今天賜公策以廣公之子孫因出懷中符䇿狀如簡長九寸凡九百九十杖以授比干曰子孫佩印綬者如此筭又曰和熹鄧后叔父陔言常聞活千人者子孫有封兄訓爲謁者使修石臼河歳活數千人大道可信家必蒙福𥘉太傅禹歎曰吾將百萬之衆未甞妄殺一人其後代必有興者又曰永平中楚王英謀爲逆事下郡覆考明年三府舉袁安能理劇拜楚郡太守是時英辭所連及繫者數千人顯宗怒甚吏按之急迫痛自誣死者甚衆安到郡不入府先往按獄理其無明驗者條上岀之府丞椽吏皆叩頭争以爲阿附反虜去與同罪不可安曰如有不合太守自當坐之不以相及也遂分別具奏帝感悟即報許得出者四百餘人又曰虞詡字升卿祖經爲縣獄吏決獄平甞曰東海于公髙其里門而其子定國卒至丞相吾決獄六十年矣雖不及于公其庶幾乎吾子孫何必不爲九卿耶故字詡曰升卿謝承後漢書曰陳重字景公豫章冝春人舉孝廉在郞署有郎負息錢數十萬債主日至煎求無巳重乃宻以錢代還郎後覺知而厚辭謝之重曰非我之爲將有同姓名者終不言惠吴志曰鍾離牧字子幹㑹稽山隂人少居永興自墾稻田二十餘畒臨熟而縣民識之牧曰本以田荒故墾之耳遂以稻與縣人沈約宋書曰沈道䖍吴興武康人少仁愛好老易郡州府凡十二命皆不就有人竊其園菜者外還見之乃自逃隱候竊者取足去後乃出唐書曰載𥘉中徐有功爲大理丞時酷吏來俊臣等構䧟無辜公卿震恐有功獨存平恕詔下大理者有功皆議岀之前後濟活數十百家吕氏春秋曰宋景公時熒惑在心問子韋子韋對曰禍在君可移宰相公曰宰相所與治國家曰移於民公曰民死誰與爲君曰移於歳公曰歳飢民必死子韋北面再拜曰君有至徳之言三天必賞君熒感果三徙舎賈誼書曰楚惠王食寒𦵔得水蛭王不欲以飲食傷人乃吞之令尹避席再拜而賀曰臣聞天道無親唯徳是輔是夜惠王之後溷而蛭出其乆病心膓之積皆愈又曰孫叔敖之爲兒也岀遊歸遂憂而不食其母問其故泣而對曰今旦見兩頭虵恐死其母曰今虵安在曰敖聞見兩頭虵者必死吾恐人又見之殺而埋之母曰無憂汝不死矣吾聞有隂徳者天必報之以福果不死矣髙士傳曰𥘉晉宣帝布衣時與胡昭有舊昭同郡周士等謀欲害帝昭聞而渉險邀士於齊澠之間止士不肯昭泣以示誠士感義乃止昭雖有隂徳於帝口終不言續齊諧記曰楊寳年九歳時至華隂山北見一黄雀爲鵶鳬所摶墜於樹下爲螻蟻所困寳取之以歸置巾箱中唯食以黄花百餘日毛羽成乃飛去其夜有黃夜童子向寳再拜曰我王母使者君仁愛救拯實感成濟以白環四枚與寳曰令君子孫絜白位登三公事當如此數矣會稽典録曰鄭弘爲靈文郷嗇夫民有弟用兄錢者未還之嫂詣弘訴之弘賣中單即今之汗衫也爲叔還錢兄聞之慙愧遣其婢索錢還弘弘不受又曰夏香字曼卿永興人門側有大井傍設水瓮里中兒童各􅔡飲牛爭水共闘香預爲汲水多置器瓮由是無爭專以徳化香至四節先慶酌二親退賫酒肴勞問里中父老以此爲常益都耆舊記曰王忳常詣京師於空舎中見一書生疾困愍而視之書生謂忳曰我當到洛而得病命在湏臾腰下有金十斤願以相贈死後乞藏骸骨未及問姓名而絶忳即鬻金一斤營其殯葬餘金悉置棺下人無知者後歸數年縣署忳大度亭長𥘉到之日有馬馳入亭中其日風飄一繍𬒳復墮忳前即言於縣馬遂奔走牽忳入他舎主人見之喜曰今擒盗矣問忳得馬忳說其狀并繡𬒳主人悵然良乆乃曰𬒳隨飄風與馬俱亡卿何隂徳而致此二物忳自念有葬書生事因爲說之道書生形兒及埋金之處主人驚曰是我子姓金名彦前往京師不知所在何意卿乃葬之大恩乆不報天以此彰卿徳耳忳悉以𬒳馬還之彦父不取又厚遺忳忳辭譲而去時彦父爲州從事因告新都令假忳休息與俱迎彦䘮餘金且存由是顯名後漢亦載廣州先賢傳曰羅威字德仁南海番禺人也有隣家牛數食其田禾旣不可止遂爲断蒭多着牛家門中不令人知數如此牛主驚怪不知爲誰隂察求之乃覺是威自後更相約率收拾牛犢不敢復踐傷於威田豫章耆舊志曰施陽字季儒遷舒令及之官道經江夏遇冦賊興起刼奪陽物賊去後車上席下尚有五千錢追以與賊荀氏家傳曰荀遂字仲陽夫人有至行時歳荒飢有餘米糶之夫人恒㧻斛籴者傾量輒過本時人號日㧻斛夫人太平御覽卷第四百三
