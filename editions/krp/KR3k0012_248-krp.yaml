body:
  text: 職官部四十六王師王傳王友王侍讀王文學郡國相國郎中令國中尉國常侍國侍郎府長史府司馬王師漢書曰王式字翁思東平人爲昌邑王師昭帝崩邑王嗣立以行淫亂廢昌邑群臣皆下獄治事使者責問曰師何以無諌書式對曰臣以詩三五百篇朝夕授王至於忠臣孝子之篇未甞不爲王反覆誦之臣以三五百篇諌是以無諌書使者以聞亦得减死論王傳後漢書曰皇太子彊求乞自退封東海王故重選官屬以杜林爲王傳從駕南廵狩時諸王傳數𬒳引命或多交遊不得應詔唯林守慎有召必至餘人雖不見譴而林特受賞賜又辭不敢受帝益重之吴志是儀字子羽北海營陵人也南魯二宫𥘉立儀以夲職領魯王傅儀嫌二宫相近切乃上䟽曰臣竊以魯王天挺懿德兼資文武當今之冝冝鎮四方爲國藩輔宣揚德美廣耀威靈乃國家之良䂓海内所瞻望但臣言辭鄙野不能究盡其意愚以二宫冝有降殺正上下之序明教化之夲書三四上爲傅盡忠動輙䂓諌事上勤與人恭不治産業不受施惠爲屋舎纔足自容隣家有𧺫大宅者權出望見問起大室者誰左右對曰似是儀家也權曰儀儉必非問果他家其見知信如此唐書曰丘恱河南陸渾人亦有學業景龍中爲相王府掾與文學韋利器典籖裴耀卿俱爲王府直學士睿宗在藩甚重之官至歧王傅開元𥘉卒撰三國典略三十卷行於時王友晉中興書曰謝尚字仁祖司徒左西屬爲㑹稽王友北史曰蕭大圜除滕王逌友逌甞問大圜曰吾聞湘東王作梁史有之乎餘傅乃可抑楊帝紀奚若隱則非實記則攘羊對曰言之者妄耳如使有之亦不足恠昔漢明爲丗祖紀章帝爲顯宗紀殷鍳不逺足爲成例且君子過如日月之蝕彰於四海安得而隱之如有不彰亦安得不隱盖子爲父隱直在其中諱國之惡抑又禮也逌乃大笑殷浩別傳曰㑹稽王少著名譽友學之舉必極有德以浩爲友山公啓事曰近啓修武令劉訥𥙷南陽王友詔曰友誠冝得有益者然以長吏治民不易屢易爲疑令散人無依仰又啓今者職散中誠自有人然劉訥才志外内非稱臣以爲冝蒙此者是以啓及不審固可用不詔可爾所啓王侍讀隋書曰楊汪字元度勤學專精左氏傳通三禮解福周冀王侍讀王甚重之每曰王侍讀德業優深孤之穆生也唐書曰姚思廉𥘉爲代王侍讀屬義師入京城時府寮駭散唯思廉侍王不離其側義師入殿門思廉謂之曰唐公舉兵夲匡王室卿等不冝無禮於王衆服其言於是布列階下湏臾太宗至聞而義之許其扶王至順陽閤下泣拜而去觀者咸歎曰忠烈之士也仁者有勇此之謂也太宗居藩引爲文學及親征徐圎朗思廉時在洛陽太宗甞從容言及隋亡之事慨然歎曰姚思廉不懼兵刃以明大節求諸古人亦何以加也因寄物百叚遺其書曰想卿節義之風故有斯􅙔王文學魏志曰中山㳟王褒毎讀書文學左右常恐以精力爲病數諌止之不能廢也文學阬輔相與言曰受詔察王舉措有過當奏及有善亦冝以聞遂共表陳褒美褒聞之大驚責讓文學曰修身自守常人之行耳而諸君以上聞適増其負累也晉書曰鄭袤魏武帝𥘉封諸子爲侯精選賔友袤與徐幹俱爲臨淄文學晉諸公讃曰扶風王年八歳聦明善詩賦中表竒之魏烈祖以爲齊王芳文學長沙耆舊傳曰太尉李公時爲荆州刺史下辟書夫採名珠求之於蚌欲得名士求之文學或割百蚌不得一珠不可捨蚌求之於魚或百文學不出竒士不可捨文學求之於斗筲也由是言之蜯乃珠之所藏文學亦士之塲矣郡國相東觀漢記曰吴祐字季英陳留人遷膠東相政唯仁簡以身率物民有相争訴者輙閉閤自責然後科其所訟以道譬之或身到閭里重相和解自是之後争隟省息吏民不欺又曰魯平字叔陵拜趙相爲政尚寛惠禮讓雖有官不廢教授門人常有數百關東號曰五經復興魯叔陵後漢書曰張禹遷下邳相徐縣北界有蒲陽坡東觀記曰坡水廣二十里徑直百里在道西其東有田可萬領坡與陂同傍多良田而堙廢莫修禹爲開水門通引灌漑遂成熟田數百頃勸率吏人假與種粮親自勉勞遂大收榖實鄰郡貧者歸之千餘户室廬相屬其下成市後歳至墾千餘頃人用温給又曰趙咨應召復拜東海相之官道經榮陽令燉煌曹暠咨之故孝廉也咨爲燉煌太守時暠薦爲孝廉迎路謁候咨不爲留暠送至亭水次望塵不及謂主簿曰趙君名重今過界不見必爲天下笑即弃印綬追至東海謁咨畢辝㱕家其爲時人所貴若此謝承後漢書曰東郡趙咨爲東海相人遺其雙枯魚噉之二歳不盡以儉化俗魏志曰𥘉曹公爲兖州以東平畢諶爲別駕張邈之叛也邈刼諶父母弟妻子公謝遣之卿老母在彼可去諶頓首無二心公嘉之爲之流涕旣出遂亡㱕及邈敗生得諶衆爲諶懼公曰夫人孝於其親者豈不亦忠於君乎吾所求也以爲魯相又曰太祖光和末黄巾𧺫拜騎都尉討頴川賊遷爲濟南相國有十餘長吏多阿附貴戚贓汚狼籍於是奏免其人禁断淫祀姧究逃竄郡界肅然蜀志劉俻領平原相郡民劉平素輕先主耻爲之下使客刺之客不忍刺語之而去其得人心如此晉書曰文帝輔政阮籍常從容言於帝曰平生曽遊東平縣樂其風土帝大恱即拜東平相籍乗驢到郡壞府舎屏障使内外相望法令清簡旬日而還又曰阮神遷平原相時襄邑衛京自南陽太守遷於河内與神俱拜帝望而歎曰二千石皆若此朕何憂乎九州春秋曰孔融爲北海相一朝殺部督郵㑹稽典録曰駱俊字孝逺烏傷人孝靈皇帝擢拜陳相汝南葛陂盗賊並起陳與接境四面受敵俊厲吏民爲之保鄣出倉見榖以贍貧民隣郡士庶咸徃歸之身捐俸禄給其衣食民有産子常勑主者厚致米肉生男女者輙以駱爲名國郎中令漢書曰龔遂字少卿山陽人以明經爲官至昌邑郎中令事王賀賀動作多不正遂爲人忠厚剛毅有大節内諌諍於王外責傳相引經義陳禍福至於涕泣謇謇無巳面刺王過王至掩耳起走曰郎中令善媿人及國中皆畏憚之王又與騶奴宰人遊戲飲食賞賜無度遂入見王涕泣膝行左右侍御皆出涕王曰郎中令何爲哭遂曰臣痛社稷之危也又曰周勃等共誅諸吕迎代王郎中令張武等議皆曰不可信願稱疾無徃以觀其變中尉宋昌進曰羣臣之議皆非願大王勿疑也代王遣太后薄昭見勃勃等俱言所以迎立王者昭還報信矣王笑謂宋昌曰果如公言乃令宋昌驂乗張武等乗傳詣長安群臣奉法駕代邸皇帝即日夕入未史宫夜拜宋昌爲衛將軍領南北軍張武爲郎中令行殿中續漢書曰皇子封王其郡爲國毎國置郎中令一人秩千石掌王夫人郎中宿衛官也魏志曰袁渙爲魏國郎中令及卒太祖爲之流涕榖二千斛一教以太倉榖千斛賜郎中令家一教以垣下榖千斛與卿家外不解其意教曰以太倉榖者官法也以垣下榖者親舊也晉中興書曰頋榮時在洛者唯陸機陸雲及榮唯三人而巳機雲雖有才藻不及榮也以南土秀望𥙷吴王郎中令沈約宋書曰宋國𥘉建當置郞中令髙祖難其人謂傅亮曰今用郎中令不可减袁曜卿也旣而曰吾得其人矣乃以王惠居之續搜神記曰㑹稽朱弼爲王國郎中令營立第舎未成而卒同郡謝子木代其事以弼死亡乃定簿書多張功費長百餘萬以其贓誣弼而實入子木子木夜寢忽聞有人道弼姓字者俄頃而到子木堂前立謂之曰卿以枯骨腐肉專可得誣當以某日夜更相書言終忽然不見陸機詣呉王表曰臣夲吴人靖居海隅朝廷欲抽引逺人綏慰遐外故太傅所辟殿下東到淮南發詔以臣爲郎中令國中尉史記曰魯申公弟子爲博士十餘人孔安國至臨淮太守徐偃爲膠西中尉其治官皆有廉節稱其好學漢書曰鄭當時字莊陳人也稍遷爲魯中尉又曰梁孝王招延四方豪傑齊人公孫詭多竒計𥘉見曰王賜千金官至中尉號曰公孫將軍續漢書曰清河王小心恭孝特見親愛後諸王就國鄧太后詔特清河國置中尉内史賜乗上御物焉漢舊儀曰帝子爲王王國置太傅相公尉各一人秩二千石以輔王三輔决録曰淮陽憲王宣帝愛子器異其才欲以爲嗣王恃寵自驕天子乃用韋玄成爲中尉以輔導之受詔與蕭望之等論五經同異於石渠閤邵氏家傳曰邵弘字德𥙿時景帝爲瑯邪王詔書髙選官屬請君爲中尉君爲人體素方嚴儀容甚偉雖私門接對僮僕儼然不厲而威王甚憚焉王常候君晝息身隨使者潜至君舎令使者進曰王有令君徐理鬢冠履俯伏盡禮然後讀之王與使者羣立瞻聽爲之歎息曰古人稱不愧于屋漏其邵中尉乎吾反逆詐以試長者豈不陋哉王虚心受納忻宴言話晝夜無休君乃上書諌王王讀三四瞿然失色後謂左右曰思邵中尉之言使人于今毛竪國常侍漢書曰龔舎字君倩少好學明經楚王入朝聞舎髙名聘爲常侍不得巳隨王歸國晉春秋曰甘卓字季思察孝廉爲吴王晏常侍國侍郎王隱晉書曰孫秀瑯邪國書佐爲趙王倫國侍郎桓譚新論曰宣帝元康神爵之間丞相奏能皷雅瑟者渤海趙定梁國龍德召見温室拜爲侍郎府長史諸府附漢書曰張湯爲御史大夫爲三長史朱買臣等所譛帝遣杜周詰湯湯欲對周曰君爲大臣今𬒳責詰何用對爲於是自殺臨死上書曰譛臣者三長史也帝追惜湯悉誅三長史又曰趙充國從貳師將軍擊匈奴身𬒳二十餘瘡武帝視而嗟嘆遷車騎長史晉書曰劉輿爲魏郡太守東海王越將召之或曰輿猶膩也近則汙人及至越疑而御之輿密視天下兵薄及倉庫午馬器械水陸之形皆黙識之是時軍國多事每㑹議自潘弼以下莫知所對輿旣見越應機辯盡越顧睞酬接即以爲左長史又曰劉輿爲東海王越左長史越旣秉政時賔客滿筵文案盈几逺近書記日有數千終日不倦或以夜繼之皆人人懽暢莫不恱附命議如流酬對欵備時人服其能比之陳遵時越府有三才潘滔大才劉輿長才裴邈清才晉中興書曰王獻之少有清譽亦善隷書後將軍謝安請爲長史甚欽愛之又曰薜兼字令長與同郡紀瞻等𥘉入洛張華歎曰皆南金也屢遷至丞相右長史兼恪勤王事以佐禄秩優泰每約損辝讓以周貧而巳宋書曰阮萬齡陳留尉氏人萬齡少知名自通直郎爲孟昶建威府長史時袁豹江夷相繼爲昶司馬時人謂昶府有三府齊書曰庾杲之出爲王儉衛軍長史時人呼儉府爲入芙蓉池又曰陸慧曉爲晉熈王冠軍長史慧曉歴輔五政治身清肅僚佐以下造請起送之或謂慧曉曰長史貴重不冝妄自謙屈荅曰我性惡人無禮不容不以禮處人又曰陸慧曉遷右長史時陳郡謝朏爲左長史府公竟陵王子良謂王融曰我府二上佐求之前丗誰可爲比融曰兩賢同時便是未有前例崔鴻十六國春秋後趙録曰張躍字丗淵清河東武城人也學敏才逹雅善清談石勒偉其儀辯拜丗子衛軍長史勑丗子日張長史人之表範汝其師之後魏書曰張衮字洪龍上谷沮陽人也好學有文才太祖爲代王遷爲左長史决䇿幃幄太祖器之禮遇優厚南史曰孔覬除安陸王子綏後軍長史性使酒恃氣每醉輙弥日不醒僚類間多所凌忽尤不能曲意權幸莫不畏而嫉之居常貧罄無有豐約未甞開懷爲府長史典籖諮事不呼前不敢前不令去不敢去雖醉日居多而曉明政事醒時判决未甞有壅衆咸云孔公一月二十九日醉勝他人二十九日醒也孝武每欲引見遣人覘其醉醒隋書曰衛玄𥘉仕周武帝親揔萬機拜益州揔管府長史賜以萬釘寳帶唐書曰和元祏爲千牛衛長史先是元祏獻詩十首其詞猥陋皆寓言嬖幸而意及兵戈韋氏命拘於大理而將戮月餘而韋氏就誅其詩言若合符䜟故上聞而拜之魏武故事載令曰府長史王必是吾披荆棘時吏也忠能勤事心如鐵石國之長吏也蹉跌乆不辟之捨騏驥而不乗焉惶惶而更求哉今故教辟之陶氏家傳云猷字恭豫王導以君江東儁望請爲右軍長史君恪勤王事毎當朝日恒夙興就路及到府門輙先衆僚爲人美容止善談論亦以此見稱當丗焉府司馬諸府附左傳曰季氏以公鉏爲馬正馬正家司馬也愠而不出閔子馬見之曰閔子馬閔馬父也子無然禍福無門惟人所召爲人子者患不孝不患無所所位處也恭敬父命何常之有言廢置在父無常位公鉏然之恭敬朝夕恪居官次家語曰郷射曰孔子觀於郷射於是退而與門人習射於矍相之圃盖觀者如堵墻焉射至於司馬使子路執弓矢出延射者子路爲司馬故射至於子路使出延射魏略曰諸葛誕伐吴戰于東関上欲速進軍司馬王儀諌曰吴賊必有伏冝持重不可進上不聽果爲吴人所覆儀曰今日之敗誰當其咎上曰司馬欲委罪孤耶遂法儀晉書曰石苞爲景帝中護軍司馬宣帝聞苞好色薄行以讓帝帝荅曰苞雖細行不足而有經國才略夫廉貞之土未必能經濟丗務是以齊桓忘管仲之奢僣而録其匡合之大謀漢髙舎陳平之汚行而取其六竒之妙筭苞雖未可以上儔二子亦今日之選也懿乃止晉陽秋曰晉陵人韋夐桓脩令於坐相劉𥙿仕官當至州不夐云劉粗是有相人當不失邊州刺史旣出私於𥙿曰卿大有貴相向不敢極言耳𥙿惡其言末略荅曰卿狂言驗當相用爲司馬義旗後數年夐見𥙿訴曰周成不負桐葉之信公不應忘司馬之言今不希鎮軍府聞護軍司馬鈌願賜卒恩𥙿美而用之晉中興書曰中宗爲安東將軍鎮下邳請王導爲司馬軍國之事無不諮訪中宗遷鎮建康導爲司馬委以政事于時朝野傾心號曰仲父導忠於事上逹於從政以百六之弊寄寓江左爲治之夲務在清静沈約宋書曰羊徽𬒳遇於髙祖髙祖謂諮議叅軍鄭鱗之曰羊徽一時美器丗論猶在兄後恨不識之板𥙷右將軍劉蕃司馬後魏書曰辛祥爲并州平北府司馬有白壁還兵藥道顯𬒳誣爲賊官屬推據咸以爲然祥曰道顯面有悲色察獄以色其此之謂乎苦執申之月餘別獲真賊丗說云謝弈爲桓宣武荆州司馬弈旣上猶推布衣之交在温坐岸幘嘯詠無異常日宣武毎曰我方外司馬也弈醉温於許主避之主每曰君若無狂司馬我何由得相見太平御覽卷第二百四十八
