front:
  text: 太平御覽卷第二百九十九
  hash: sha256:a1b4c1e414a1bded0b96ef572e43c94e65287bcc5774a27632dc92156776e734
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_299-1a}
body:
  text: 兵部三十練士兵衆隊伍練士通典搜才曰凡爲将統戎在知士器用當設目差等優異應機而任以收其效選士之科沉謀密略出人者詞辨從衡能移奪人之性情堪辨說者能徃來聽言語覽視四方之事軍中之情僞日列於前者能得敵之主佐門廬請謁之情堪間諜者能知山川險易行止形勢利害逺近井泉水草逕路迂直堪郷導者巧思出人制造五兵及攻守器械者引強敵撤扎戈鋋劒㦸便於利用挺身捕虜搴旗斬將堪䧟陣者趫捷若飛踰城越塹出入無形堪窺覘者徃返三百里不及暮至者破格舒鈎或負六百斤行五十歩四百斤行百歩者推歩五行瞻風雲氣候轉或多言天道詭說隂陽者此雖非兵家本事所要資權譎以取勝耳罪犯者父子兄弟欲執仇者貧窮忿怒將欲快其志故贅聓人虜欲昭迹楊名長短經曰夫王者帥師必簡練英雄知士髙下因能授職各取所長爲其股肱羽翼以成威神然後萬事畢矣腹心一人主淵泉應卒揆天消变緫樶計謀保國全命者也謀士五人主國安危豫慮未然諭才能明賞罰授官位决嫌疑定可否者也天文三人主占星暦候風氣理時日考符驗效災異知天心去就者也地形三人主軍行上形勢利害逺近險昜水涸山阻不失地利者也兵法九人主講論異同行事成敗簡練兵器凢軍陣所用刺舉非法者也通粮四人主廣飲食密蓄積通粮道致五榖令三軍不困乏食也奮威四人主擇材士諭兵馬風流電掣不失所由竒狀也鼔旗三人主左鼓旗符節號令倐忽徃來出入若神股肱四人主出旌扞任重持難修溝塹治壁壘四轉守禦者通才三人主拾遺𥙷過集㑹術數周流並㑹應偶賔客議論談語消息結解也權士三人主竒譎殊異非人所識行無窮之變也耳目七人主徃來聽言語覽視四方之事軍中之情僞日列於前也爪牙五人主揚威武激厲三軍冒難死攻令三軍勇猛也羽翼四人主飛名譽震逺近動移四境以弱敵心也游士八人主祠徵祥候開闔視敵人爲謀者也偉士二人主爲諸詐依託鬼神以惑敵心法筭二人主計㑹三軍領理萬物也方士二人主爲藥以全傷病也軍中有大勇敢死樂傷者聚爲一卒名曰冒將之士有勃氣壯勇暴強者聚爲一卒名曰䧟陣之士有學於竒正長劒琱弧接武齊列者聚爲一卒名曰銳騎之士有破格舒鈎強梁多力能潰破金鼔絶滅旗旌者聚爲一卒名曰勇力之士有能踰髙超逺輕足善走者聚爲一卒名曰冠兵之士有故王臣失勢欲復見其功者聚爲一卒名曰死鬪之士有死罪之人昆弟爲其將報讎者聚爲一卒名曰死責之士有貧窮忿怒將快其志者聚爲一卒名曰必死之士有故贅聓人虜欲昭迹揚名者聚爲一卒名曰厲頓之士有辯言巧辭善毁譽者聚爲一卒名曰間諜飛言弱敵之士有故咠靡免罪之人欲逃其恥者聚爲一卒名曰幸用之士有材伎過人能負重行數百里者聚爲一卒名曰待令之士夫卒強將弱曰陁音豕吏強卒弱曰䧟兵無選鋒曰北必然之數矣故曰兵衆孰強士卒孰練知之者勝不知之者不勝不可忽也兵衆書曰如虎如貔如熊如羆于商郊又曰用咸戒于王曰王左右常伯常任凖人綴衣虎賁詩曰予王之爪牙予王之爪士周禮曰司戈掌戈盾之物而頒之軍旅㑹同授貳車戈盾建乗車戈盾授旅賁及虎士戈盾左傳曰彤弓虎賁文公受之以有南陽之田又曰組甲三百𬒳練三千史記曰蘇秦說韓惠王曰韓之卒勇𬒳堅帶甲利劒一人當百以大王之賢西面事秦爲天下笑漢書晁錯云陛下又興數千萬之衆以誅數萬之匈奴衆寡之計以一擊十之術也後漢書光武紀曰伯升拔宛巳三日而丗祖尚未知乃爲使書報城中宛已下兵到而佯墮其書㝷邑得之不喜諸將旣累捷膽氣益壯無不一當百後漢書曰光武起王莽遣大司徒王尋大司空王邑王莽時表章所獻金匱圖有王尋姓名王邑王南子於莽爲從父兄弟將兵百萬其甲士四十二萬人五月到潁川復與嚴尤陳茂合頴川郡今洛州陽瞿縣也又曰王元說隗囂曰今天水完冨士馬景強北取西河上郡東收三輔之地按秦舊迹表裏河山秦外山而内河元請以一九泥爲大王東封函谷關此萬代一時也又曰河南賊張歩據齊地耿弇討敗之歩肉袒負斧鑕於軍門鑕鍖也示必死鍖音砧鑕音質弇傳歩詣行在而勒兵入據其城樹十二郡旗鼔弇凢平城陽琅邪髙密膠東萊比海齊千乗濟山臨淄令歩兵各以郡人詣旗下衆尚十餘萬輜重七千餘兩皆罷遣歸郷里齊地悉平又曰建安中劉表爲荆州牧理今江陵郡也劉備時在荆州衆力尚少諸葛亮曰荆非少人也而著藉者寡平居發調即人心不恱凡有游户皆使自實因録以益衆可也備言其計故表衆遂強又曰百官志云節從武賁比二百石東觀漢記曰上賜馮異璽書曰聞吏士精銳水火不避購賞之賜必不令將軍負丹青失斷金也魏志曰張繡反襲太祖出戰不利輕騎引去典韋戰於門中賊不得入兵遂散從他門並入時韋校尚有十餘人皆殊死戰無不一當十前後至稍多韋以長㦸左右擊之左右死傷者略盡晉書曰桓玄使陶謙屯覆舟山劉毅至蔣山𥙿羸弱登山多張旗幟玄不之測𥙿與毅分爲數隊進突謙陣皆殊死戰無不一當百謙等諸軍一時奔散𥙿則劉𥙿也又職官志曰左衛將軍領熊渠武賁右衞將軍領佽飛武賁又天文志曰武賁一星在太微西蕃北下台南静室旄頭之騎官也徐爰宋書曰衆推髙祖爲盟主移檄京邑遇呉甫之主驍將也其兵甚銳髙祖躬執長刀徑入其陣衆皆披靡甫之進至羅落橋髙祖望賊旗鼓誓衆馳進挺劒指麾光曜如電將士皆莫敢仰視但馮神武爭爲先登殊死而戰無不一當百蕭方等三十國春秋曰陳安奔隴城前趙將劉賁馳將追之石虎止賁曰窮㓂歸兵不可迫也我士卒連勝皆巳怠矣以驕急之卒當致死之衆恐無萬全之利賁曰不然彼銳氣盡矣衆心乖沮人懷苟免莫有鬭志我卒乗猛氣甚盛皆一當十豈其衰沮之餘所能抗也賁躬先士卒戰輙敗之遂圍安于隴城又曰定陽人梁犢因民心怨趙也謀兵東還犢自稱大將軍率衆攻下辨尅之犢軍人皆多力善射一當十餘無兵甲所在略大斧施一丈柯攻戰若神擬向崩潰後魏書曰燕鳯甞使於符竪曰彼國人馬實爲多少鳯曰控弦之士數十萬見馬百萬疋堅曰卿言人衆可尔說馬太多是虚辭耳鳯曰雲中川自東山至西河二百里北山至南山百有餘里每歲孟秋馬常大集略爲滿川以此推之使人之言猶尚未盡堅厚加贈遺又曰宋遣沈攸之呉憘公領卒數萬從沂清而進欲援下邳尉元遣孔伯恭卒歩騎一萬以拒之并以攸之前敗軍人傷殘手足瘃兀膝行者盡送令還之又宫氏志曰太和中定品令有㦸楯武賁將軍有募貟武賁將軍有髙車武賁將軍又曰河北賊葛榮爲魏將尔朱榮所擒餘衆悉降以賊徒旣衆若即分割恐其疑懼或更結聚乃普告勒從所樂親屬相隨任所居止於是羣情喜恱登即四散數十萬衆一時散盡待出百里之外乃始分道押領隨便安置咸得其冝擢其渠帥量才授用新附者咸安時人服其處分機速三國典略曰蕭明王僧辨書曰凡諸部曲並使招携投赴戎行前後雲集霜戈電㦸無非武庫之兵龍甲犀渠皆是雲臺之仗莊子曰䈥力之士矜難勇敢之士奮忠兵革之士樂戰文選曰雲屯七萃士魚麗六郡兵又曰士馬精研陸士衡辨亡論曰于時雲興之將帶州焱起之師跨邑哮闞之羣風驅熊羆之士霧集又曰夫曹劉之將非一丗所選向時之師無曩中之衆又曰孫子荆爲石仲容與孫皓書云今百僚濟濟俊乂盈庭虎臣武將折衝萬里國冨兵強六軍精練隊伍太白隂經曰陽隊起一至九隂隊起九至一隊有五十人五人火長五九不失四十五人之數卒間容卒相去二歩隊間容隊相去一十八歩前後十歩其隊前後相去亦如之黄帝曰陣間容陣隊間容隊曲間容曲是也衛公兵法曰諸道狹不可並行者即第一戰鋒隊爲首其次右戰隊次之其次左戰隊次之其次右駐隊次之其次左駐隊次之若道平川闊可以並行者冝作統法毎統戰銳隊居前兩戰並行次之又兩駐隊並行次之餘統准此若更堪齊頭行者每統五隊横列齊行後統次之如毎統三百人簡取二百五十人分爲五隊第一隊爲戰鋒隊第二隊第三隊爲戰隊第四第五隊爲駐隊隊頭一人副隊頭一人其下等五十人爲輜重隊別着隊頭一人擬戰日押輜重遥爲聲援若兵數更多皆類此諸軍當軍折衝果毅必湏排定隊伍毎行引發營湏依次第戰曰有罪湏罰有功湏賞依名排次甚爲省易不然推逐稍難争競不定又曰請毎隊給一旗行則引隊住則立於隊前大揔管及副揔管則立十旗以上副揔管則立四旗以上行則建於車前住則立於帳側統頭亦別給異色旗擬臨陣之時辨其進退駐隊等旗別様別造令引輜重各令本軍營隊識認此旗諸軍相去旣逺語聲難徹走馬報又勞煩故建幟用爲節度其方面旗舉當方面兵急湏裝束旗向前亞方面兵急湏進旗三竪即住旗卧却迴審細看大將所舉之旗大將方面旗東方碧南方赤西方白北方黒專看方色旗亞處即是其方賊來便湏禦捍攻擊又曰諸軍將戰毎營跳盪隊馬軍隊竒兵隊戰鋒隊駐隊等分拆爲五等當軍各令一官押領出戰之時先用某等兵戰鬪如更湏兵以次更取某等兵用盡當營輜重隊不得輙用亦各一官人押領使堅壘各令知其部伍不使紛雜自餘節度一依横陣太平御覽卷第二百九十九
