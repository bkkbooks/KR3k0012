front:
  text: 太平御覽卷第七百
  hash: sha256:d9a014f563bb83ab37597a2061b68b3326a70bb306c58e030473be042425d452
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_700-1a}
body:
  text: 服用部二簾帷幄幕帟簾釋名曰簾廉也自障蔽爲廉耻也聲類曰簾户蔽也通俗文曰户幃曰簾楊雄方言曰宋魏陳楚謂之曲或謂之麹自関以西謂之箔南楚謂之蓬薄漢書曰周勃以織薄曲爲業蘇林曰薄一名曲也又曰嚴君平筮卜成都市日得百錢則閇肆下簾而授老子梁書曰夏侯亶性節儉不事華侈晚頗好音樂有妓妾十數人無𬒳服姿容毎有客常隔簾奏時謂簾曰夏侯妓衣齊書曰沈麟士字雲禎有髙尚之心居貧織簾誦書号爲織簾先生又曰栁丗隆善卜別龜甲價至萬永明𥘉丗隆曰永明九年我亡後三年丘山崩齊亦於此季矣屏人命典籖李黨取筆及髙齒屐題簾箔旌曰永明十一年因流涕謂黨曰汝當見吾不見也唐書曰張嘉貞蒲州猗氏人也弱冠應五經舉拜平郷尉坐事免歸侍御史張循憲爲河東採訪使薦嘉貞材堪憲官請以巳之官秩授之則天召見垂簾與之言嘉貞奏曰以臣草菜而得入謁九重是千載一遇也咫尺之間如隔雲霧竟不覩日月恐君臣之道有所未盡則天遽令卷簾與語大恱擢拜監察御史又曰王鍔爲淮南作法軍中無一弃物至故簾亦令収之他日付舡坊以爲篸箬上作含切下而灼切他皆如此莊子曰河上有家貧窮緯蕭以爲業司馬彪注曰蕭蒿也織緯蒿爲薄簾也又曰張毅者髙門懸薄無不奏也漢武故事曰甲帳居神以白珠爲簾箔玳瑁押之象牙爲蔑洞冥記曰漢武元鼎元年甘泉宮起招仙靈閣編翠羽麟毫以爲簾西京雜記曰漢諸陵寢皆以竹爲簾簾皆爲水文及龍鳯像又曰昭陽殿織珠爲簾風至聲如珩珮拾遺記曰石虎於太武殿前起樓髙十丈結珠爲簾垂五色玉珮至鏗鏘和鳴晉東宫故事曰簾箔皆以青布縁純三秦記曰明光宫在漸臺西以金玉珠璣爲簾箔叚龜龍涼州記曰吕纂時胡人發張駿塚得白珠薄簾汝南先賢傳曰范滂𬒳収曰願得一幡一薄埋於首陽山上不負皇天下不愧夷齊謝綽拾遺曰戴明寳歴朝寵倖家累千金大兒嬌滛爲五色珠簾明寳不能禁之崔寔政論曰珠璣玩飾匿若懐䄂丈繡蔽於帷簾夢書曰夢簾屏風蔽匿一身也唐國史𥙷曰尚書李廙有清德其妻劉晏妹也晏嘗造廙見其門簾甚弊乃暗度廣狹以麄竹織成不加縁飾將以贈廙三攜至門不敢發言而去帷說文曰在旁曰帷釋名曰帷圍也以自障圍也禮記曲禮曰帷簿之外不趨又曰弊帷不棄爲埋馬也又曰路馬死埋之以帷周禮春官下曰掌舎掌王之㑹同之舎帷宫設旌門謂王行晝止有所展肆若食息張帳爲官樹旌表門左傳曰齊歸公孫敖之喪爲孟氏且國故也爲惠叔毀請且國之之族故聽其歸殯而書之葬視共仲制如慶父皆以罪降聲巳不視帷堂而哭聲巳蕙叔母怨敖從莒女故帷堂又曰公孫歸父以襄仲之立也有寵欲去三桓以張公室與公謀而聘于晉欲以晉人去之冬公薨季子言於朝曰使我殺適立庶以失大援者仲也夫遂逐東門氏襄仲居東門子家還及笙子家歸父壇帷復命於介除地爲壇而張帷介副也使副反命於君又曰閭丘嬰以帷縛音篆其妻而載之與申鮮虞乗而出仁子莊公倍臣也鮮虞推而下之下嬰妻也曰君昏不能匡危不能救死不能死而知匿其眤匿藏也眤親也其誰納之又曰公孟有事於蓋獲之門外齊子氏帷於門外而伏甲焉禮記曰士喪君使人吊撤帷主人迎吊于寢門外史記曰孔子見衛夫人夫人在絺幃中而拜又曰蘇秦說齊宣王曰臨菑之衆連袵成帷又曰髙祖曰運籌帷幄之中决勝千里之外子房功也又曰文帝幃帳不得文繡又曰董仲舒爲博士下帷講誦弟子以次相授或莫見其靣三年不窺舎園漢書曰秦起咸陽而至西雍離宫三百帷帳不移而具又曰成都侯王啇弟内大池以行舡立羽盖張周帷又曰東方朔上䟽云文帝集上書囊爲殿帷後漢書曰更始委於趙萌日夜與婦人飲宴後庭群臣欲言事輙醉不能見時不得巳令侍中坐帷内與語諸將識非更始聲出皆怨曰成敗未可知遽自縱放若此華嶠後漢書曰班始尚隂城公主公主順帝之姑貴驕淫亂與所嬖居帷中而始入使伏牀下袁宏漢記曰獻帝出長安李􅔸來追董承懼射之以𬒳爲帳幔又曰賈琮爲兾州刺史垂帷而行及至州曰刺史當逺視廣聽反垂帷以自掩蔽乃命褰帷東觀漢記曰張奐字然明使匈奴中郎將時休屠各及朔方烏丸並反燒度遼將軍門煙火相望兵衆大恐各欲亡走奐安坐車中與弟子講書自若魏志曰司馬景王奏太后廢齊王芳曰帝於陵雲臺曲室中施帷見九親婦女呉志曰孫峻欲誅諸葛恪置酒伏兵於帷中晉書曰穆帝立年始二歳皇太后禇氏設白紗帷於太極前殿抱帝臨軒晉陽春秋曰武帝令曰殿前織成帷不須施也宋書曰袁粲毎經傳昭戸輙歎曰經其户寂若無人披其帷其人斯在豈非名賢乎齊書曰毛惠素爲少府卿性孝母服除後更修母所住處幃屏毎月朝十五向帷悲泣傍人爲之感傷終身如此吕氏春秋曰伍子胥將欲見呉王而不得客有言之於王子光者王子光見而惡其貌客以告子胥曰此易改也願令王子光居於堂上重帷而見其衣王子光許之子胥說之半王子光舉帷搏其手而與之坐淮南子曰先鍼而後縷可以成帷先縷而後鍼不可以成衣漢武帝内傳曰七月七日宫掖之内張雲錦之帷然九光之燈候西王母至也王母以紫錦爲帷神仙傳曰淮南王見八公至足不及履迎之登思仙之喜張綺羅之帷西京雜記曰趙飛鷰爲皇后其弟上遺金錯繡帷拾遺記曰漢安帝好微行於郊間或露起帷宫千問皆用錦罽文繡風俗通曰俗說帷帳車不可作衣令人病癘東宫舊事曰太子納妃有青布碧裹梁下幃一紺絹青布䆫户幃各一夢書曰夢見帷帳憂隂事離騷曰紐薛荔而爲帷楚詞曰翡翠幬飾髙堂張衡南都賦曰暮春之禊元巳之辰朱帷連綱曜野映雲左太冲呉都賦曰藹藹翠帷嫋嫋素女潘岳寡婦賦曰入空室兮望靈座帷飄飄兮燈熒熒庚闡楊都賦曰皇帝廼坐路寢御組帷阮藉詩曰薄帷鑒明月清風吹我衿幄尔雅曰以覆帷謂之幄說文曰幄木帳也三禮圖曰在上曰弈四傍及上曰帷上下四傍悉周曰幄幄大帷也書曰成王疾大漸出綴衣於庭孔安國曰綴衣幄帳周禮天官曰幕人掌帷幕幄弈皆以布爲之四合象室宫曰幄至所居之幄丗左傳曰楚子伐鄭諸侯還救鄭晉侯使張骼輔躒致楚師求御于鄭鄭人卜宛射犬吉二子在幄坐射犬于外又曰子産子太叔相鄭伯以㑹子産以幄幕九張行子太叔以四十旣而悔之每舎損焉及㑹亦如之亦九張也又曰衛侯爲虎幄於籍圃於籍田之圃幄幕以虎獸爲飾也漢書曰元后未央宫置酒内者令爲傳太后張幄座於太皇后旁王莽案行責内者令曰定陶太后藩妾何得與至尊並撒去更設座傳太后聞之大怒不肯㑹漢書儀曰祭天紫壇有紺幄帳西京雜記曰成帝設雲幄雲幕於甘泉紫殿丗謂爲三雲殿拾遺録曰燕昭三年廣延之國獻善舞者二人王處以丹綃華幄物理論曰漢末黄門張讓叚珪等於靈帝幄後相對泣帝驚問尚復幾時哉於是大収諸黨劉植魯都賦曰緹幄弥津丹帷覆洲幕廣雅曰幕帳也釋名曰幕絡也在裏之稱也說文曰帷在上曰幕蒙之覆案食亦曰幕周禮天官下曰幕人掌帷幕幄弈綬之事在旁曰帷在上曰幕又曰國君過市刑人赦夫人過市罸一幕丗子過市罸一帟命夫過市罰一盖命婦過市罰一帷謂諸侯及夫人丗子過其國市大夫内子過其都之市者人之所交利而行刑之處君子無故不遊觀之若遊觀之則施惠儀禮曰國君與卿圖事管人布幕寢門外左傳曰楚子元伐鄭楚師夜遁諜告曰楚幕有烏乃止諜間也鄭所使間候伺楚也幕帳也又曰呉季礼來聘過衛夜宿於戚戚子孫邑也聞鍾聲季子曰異哉夫子之在此猶燕之巢於幕上而又何樂乎文子聞之終身不聽琴瑟又曰晉人執季孫意如以幕蒙之漢書曰衛青征匈奴大尅武帝就拜大將軍於幕下府中因號幕府東觀漢記曰明德馬皇后旣處椒房太官上飯重加幕覆輙撤去晉書曰郄超字嘉賔桓公與謝安論大事令超卧帳内聽之風動帳開安笑曰郄生可謂入幕之賔宋書曰劉穆之孫瑀仕官甚不得意至江陵與顔峻書曰朱循之三丗叛兵一日居荆州青油幕下作謝宣明靣唐書曰杜暹爲監察御史徃磧西覆屯蕃人賷金以遺暹固辭不受左右言不可逆其情乃受而埋之幕下旣去乃移牒令取之黄石公三略曰軍幕未設將不言熱此謂之禮將說苑曰晏子謂景公曰合䟽縷之緯以成幕兵書曰將軍帳幕無故動敵人散走魚豢典畧曰孔子反衛見夫人在錦帷中孔子北靣稽首夫人自帷中再拜環佩之聲璆璆然王子年拾遺記曰漢成帝好微行於太液池傍起霄游宫鋪黒緹幕器服皆尚黒色漢武内傳曰李夫人旣死帝思之命工人作夫人形狀置於輕紗幕中宛然如生帝大恱楚辭曰離榭脩幕侍君之間間静潘安仁籍田賦曰青壇蔚其岳立翠幕黯似雲布張景洛陽禊賦曰停與蕙渚息駕蘭田朱幔虹野翠幕蜺連劉楨詩曰明月照緹幕華燭散炎暉弈釋名曰小幕曰帟張在上弈帟然也周禮曰幕人掌惟帟鄭司農云帟平帳也凢喪王則張帟三重諸侯再重卿大夫不重又掌次曰師田則設重帟禮曰君於士有賜帟太平御覽卷第七百
