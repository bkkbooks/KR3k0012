front:
  text: 太平御覽卷第七百七十八
  hash: sha256:d48185e797c3db5b200e3564c371de12fd7b8344d7a8ee33604954418334fc8d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_778-1a}
body:
  text: 奉使部二奉使中後漢書曰伏湛子隆字伯文少有節操立名當時張歩兄弟各擁強兵據有齊地拜隆爲太中大夫持節使青徐招降張歩等五校尉皆降其冬拜隆爲光禄大夫復使於歩皆招懷綏輯多來附隆帝嘉其功以比之酈生即拜歩爲東萊太守劉永復遣使立歩爲齊王歩貪受王爵猶與未决隆暁譬曰髙祖與天下約非劉氏不王今可得爲十萬户侯耳歩欲留隆與共守二州隆不聽求得反命歩不從乃執隆隆遣間使上書曰臣隆奉使無狀言罪大也受執凶逆雖在困戹授命不顧又吏人知歩反叛心不附之願以時進兵無以臣隆爲念也臣隆得生歸闕庭受誅於有司此其大願若令沒身寇手以父母兄弟長累陛下陛下與皇后太子永享萬國與天無極帝得隆奏召其父湛流涕以示之曰隆可謂有蘇武之節恨不且許而遽求還也其後歩遂殺之時人莫不憐哀焉以其子瓊爲中郎又曰奉車都尉竇固出擊匈奴以爲班超假司馬將兵別擊伊吾戰於蒲類海多斬首虜而還伊吾匈奴中地名蒲類匈奴中海名在燉煌北固以爲能遣與從事郭恂俱使西域超到鄯善鄯善夲西域樓蘭國也後改為鄯善去陽關一千六百里去長安六千一百里鄯善王廣奉迎超禮敬甚備後忽更踈懈超謂其官屬曰寧覺廣禮意薄乎此必有北虜使來狐疑未知所從故也明者覩其未萌况己著耶乃召侍胡詐之曰匈奴使來數日今安在乎侍胡惶恐具服其狀超乃閉侍胡悉㑹其吏三十六人與共飲酒酣因激怒之曰卿曹與我俱在絶域欲立大功以求冨貴今虜使到裁數日而王廣禮敬即廢如今鄯善収吾屬送匈奴骸骨長爲豺狼食矣爲之柰何官屬皆曰今在危亡之地死生從司馬超曰不入虎穴不得虎子當今計獨有因夜以火攻虜使彼不知我多少必大震怖可殄盡也滅此虜則鄯善破膽功成事立矣衆曰當與從事議之超怒曰吉凶决於今日從事文俗吏聞此必恐而謀泄死而無所名非壯士也衆曰善𥘉夜遂將吏士徃奔虜營㑹天大風超令十人特鼓藏虜舎後約曰見火燃者當鳴鼓大呼餘人悉持弓弩夾門而伏超乃順風縱火前後鼓噪虜衆驚亂超手格殺三人吏兵斬其使及從士三十餘級衆百許人悉焼死明日乃還告郭恂恂大驚旣而色動超知其意舉手曰掾雖不行班超何心獨擅之乎恂乃恱超於是召鄯善王廣以虜使首示之一國震怖超暁告撫慰遂納子爲質還奏於竇固固大善具上超功効并求更選使使西域帝壯超節詔報曰吏如班超何故不遣而更選乎今以超爲軍司馬令遂前功又曰鄭衆字伯師拜越騎校尉使匈奴至北庭虜欲令拜衆不屈單于大怒不與水火欲脅伏衆拔劒自誓單于乃止又曰張網字文紀爲侍御史漢安元年選八使徇行風俗皆耆舊知名多歷顯位唯綱年少官資最微餘人受命之部而綱獨埋其車輪於洛陽都亭曰豺狼當路安問狐狸遂奏大將軍梁兾弟河南尹不疑皆蒙外戚之任居阿衡之職不能敷揚五教專務虵豕而己帝雖知綱言公直然不忍行用也時廣陵賊張嬰殺太守據部兾乃用綱爲廣陵太守綱至乃陳示禍福嬰等開門出降網乃撫納離叛使各得安居部内肅清帝嘉之賜錢十萬續漢書曰大使車乗駕駟赤帷持節者重導伍百瑣弩十二人小使車蘭與赤轂赤帷從騶騎四十人又曰周舉字宣光順帝時詔八使遣巡行風俗皆選素有威名者拜舉侍中杜喬守光禄大夫周栩前貴州刺史馮羡尚書欒巴侍御史張網兖州刺史甄遵太尉張史劉班普守光禄大夫分行於天下其刺史二千石有贓罪顯明者驛馬上之墨綬以下便輒収舉其有清忠惠利爲百姓所安宜表異者皆以狀上於是八使同時俱拜天下號曰八俊舉於是劾奏貪猾表薦清公朝廷稱之又曰范滂字孟博汝南征西人厲清節爲州所服舉孝廉時兾州飢荒盗賊群起乃使滂案察之滂登車攬轡慨然有澄清天下之志乃至州境守令自知贓汙望風解印綬去其所舉奏莫不厭伏衆議東觀漢記曰來歙字君叔南陽人也建武五年持節送馬援奉璽書於隗囂囂遣子恂隨入侍時山東略定帝謀西牧囂兵與俱伐蜀囂將三元說囂故不决歙素剛直遂發憤責之曰國家以公知臧否暁廢興故以手書暢至意足下擁忠誠眷委質是君臣父子信也今乃欲從佞惑之言爲族滅之計叛主負子違背忠信吉凶之决在於今日因欲前刺囂囂起入部勒兵將殺歙歙徐杖節就車而去又曰隗囂甚重馬援以爲綏德將軍時公孫述稱帝囂使援徃觀之援素與𫐠同郷里相善以爲至當握手迎如平生而𫐠方盛陳陛衛以延援入交拜禮畢就館更爲援製都布單衣交譲冠㑹百官於宗廟立舊交之位𫐠鸞旗旄騎警􅵖就車禮甚盛欲以援封侯食大將軍位賔客皆樂留援暁之因而辭歸謂囂曰子陽井底鼃耳不如專意東方囂乃便援奉書洛陽援至引見於宣德殿上迎笑謂之曰卿遨遊二帝間見卿使人慙援頓首謝曰當今之丗非獨君擇臣臣亦擇君臣與公孫述少相善臣前至蜀述陛㦸而後進臣今逺來陛下何知非刺客而簡易如此於是上復笑曰卿非刺客顧說客耳援乃曰天下反覆目盗名字者不可勝數今見陛下恢廓大度同符髙祖乃知帝王自有眞也又曰郭丹從師於長安買傳入凾谷關乃慨然歎曰丹不乗使者車終不出關後三公舉丹賢能徴諌議大夫丹自去家十有二年果乗高車出關如其志也何賢之有伊曰以地言尉佗不在弊邑馮弘聞而大恱還封都亭侯後魏書曰燕鳯字子章代人也拜代王左長史叅决國事常使符堅堅問鳯曰代王何如人也對曰寛和仁愛經略髙逺一時雄主也常有并吞天下之志堅曰卿軰北人無剛甲利器敵弱則進敵強則退安能兼并也鳯曰北人壯掉上馬持三仗驅使若飛主人雄雋率服北土控弦百萬號令若一軍粮輕重樵㸑自若輕行速捷因敵取資此南方所以疲弊北方所以常勝也堅曰彼國人馬多少鳯曰控弦之士數十萬見馬一百萬疋堅曰卿言人衆則可說馬太多鳯曰雲中川自東山至西河二百餘里北至南山百餘里每歲自孟秋馬常大集略爲滿川以此推之使人言猶未盡鳯還堅厚加贈又曰朱長生岱人孝文時爲散騎常侍使髙車其王阿伏至羅國乃不以禮待長生長生責至羅王旣稱臣内附何得口云再拜而實不拜乃呼出帳令衆中拜至羅慙其臣下大怒乃以兵脅之曰不降則殺長生厲声曰我寧作魏鬼不爲汝臣留三歲乃放還孝文比之蘇武也又曰李彪使蕭頥親謂彪曰卿前使還日賦詩云但願長閑暇後歲復來遊果如言今日卿此還也復有來理否彪荅曰使臣請重賦詩曰宴衍清都中一去永矣哉頥惘然曰清都可爾一去何事觀卿此言似成長闊隋書曰許憙字務夲髙陽北新成人也家有書萬卷皆悉遍渉禎明二年加通直散騎常侍聘隋遇文帝伐陳禮成而不獲反命留縶賔館陳亡素服號泣於西陛下藉草三日有詔就館拜通直散騎常侍憙盡夜哀哭北靣立垂涕再拜受詔明日乃朝伏泣於殿下悲不能勝左右曰我平陳唯獲此人旣懷其舊君則我誠臣也勑以夲官直門下省賜物千叚唐書曰大歴𥘉以授歸崇敬倉部郎中兼御史中丞賜金紫充吊祭冊立新羅王使至海中流波濤迅急舟漏衆咸驚駭舟人請以小艇載崇敬避禍崇敬曰舟人凢數百我何獨濟逡廵波濤稍息故事使新羅者至海東多有所求或携資帛而往貿昜䂓利崇敬一皆絶之東夷稱重其德又曰殷侑爲童児力學不念家産長能通經以講習自娯五經登第通歴代㳂革擢爲太常博士轉虞部貟外郞爲入囬紇副使囬紇驕倨見漢使盛陳兵甲與其相不拜欲受漢使禮侑堅立不動宣命旣畢虜使責之云欲留使者行人皆惶怖獨侑謂虜曰今可汗是漢家子壻㘴受使臣禮是可汗無禮非使臣無禮也虜憚其嚴正卒不敢逼荆州先德傳曰費禕字文偉江夏人也呉與蜀和遣使張温字惠怒來脩好温辨好論議鮮能抑之諸葛亮以禕有俊才冝遣報温使以禕爲奉信校尉權時竊尊號意猶豫未决禕爲陳存亡之晝開國建家之䇿權甚恱滑稽時知名皆在㑹並使發異端之難禕應機輒荅坐席稱之由是愛敬焉太平御覽卷第七百七十八
