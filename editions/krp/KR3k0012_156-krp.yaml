body:
  text: 州郡部二叙京都下史記婁敬齊人漢五年戍隴西過雒陽脫輓輅木横展車前人推之音胡格反衣其羊裘因齊人虞將軍見上說曰陛下都雒陽豈欲與周室比隆哉上曰然敬曰陛下取天下與周室異周自后稷堯封之邰積德累善十有餘丗成王即位而營雒邑以天下中四方貢職道理均有德易以王無德易以亡凢居此者欲令務以德致人不欲依險阻令後丗驕奢以虐人也今陛下與項籍戰滎陽爭成臯大戰七十小戰四十使天下之人肝腦塗地暴骨中野欲與成康比隆臣以爲不侔矣夫秦𬒳山帶河四塞之固夫與人鬪不搤其喉拊其背未能全勝上疑之及留侯言之上即日車駕西都賜敬姓劉氏拜郎中號奉春君漢書曰劉敬說上都關中上疑之左右大臣皆山東人多勸上都雒陽曰雒陽東有成臯西有崤澠背河向雒其固亦足恃張良曰雒陽雖有此固其中小不過數百里田地薄四面受敵此非用武之國夫關中左崤函右隴蜀沃野千里南有巴蜀之饒北有胡宛之利阻三面而獨守以一面東制諸侯安定河渭漕輓天下西給京師諸侯有變順流而下足以委輸此所謂金城千里天府之國劉敬說是也上即日車駕西都關中又曰秦中形勢之國也地勢便利以下兵於諸侯譬如髙屋之建瓴水也又曰翼奉上書曰天道有常王道亡常亡常者所以應常也必有非常之主然後能立非常之功臣願陛下徙都於成周左據成臯右阻澠池前郷嵩髙後介大河師古曰郷讀曰嚮个隔礙也建滎陽扶河東南北千里以爲關而又敖倉地方千里者八九足以自娯東厭諸侯之權西逺胡羌之難師古曰厭抑也音一葉反逺音于萬反陛下恭巳亡爲按成周之居兼盤庚之德萬歳之後長爲髙宗後漢書建武元年冬十月癸丑車駕入洛陽幸南宫却非殿遂定都洛陽宫闕名有却非殿又曰時京師脩起宫室濬繕城隍而關中耆老猶望朝廷西顧班固感前代相如壽王東方之徒造構文辭終以諷勸相如作上林子虚賦吾丘壽王作士大夫論及驃騎將軍頌東方朔作客難及非有先生論其辭以諷喻爲主者也乃上兩都賦盛稱洛陽制度之美以折西賔淫侈之論又黄琬傳董卓秉政以琬名臣徴爲司徒遷太尉更封陽泉郷侯卓議遷都長安琬與司徒楊彪同諌不從琬退而駮議之曰昔周公營洛邑以寜姬光武卜東都以隆漢天之所啓神之所安大業旣定豈妄有遷動以虧四海之望也又曰杜篤以關中表裏山河先帝舊京不冝改營洛邑乃上奏論都賦又曰王景建𥘉七年遷徐州刺史先是杜篤上論都賦欲令車駕遷還長安耆老聞者皆動懷土之心莫不眷然佇立而望景以宫廟巳立恐人情疑惑㑹時有神雀諸瑞景帝時有神雀鳯皇白鹿白烏等瑞乃作金人論頌洛邑之美天人之符文有可採又曰陳紀遷侍中出爲平原相謁董卓時欲徙都長安乃謂紀曰三輔平敞四面險固土地肥美號爲陸海今關東兵起恐洛陽不可乆居長安猶有宫室今欲遷何如紀曰天子有道守在四夷左傳之文冝脩德政以懷不附遷移至尊誠計之末者愚以公冝以事委公卿專精外任其有違命則威之以武今關東兵起民不堪命若謙逺朝政率師討伐則塗炭之民庶幾可全若欲徙萬乗以自安將有累卵之危崢嶸之險也卓意甚恨而敬紀名行無所復言呉録曰張紘言於孫權曰秼陵楚武王所置名爲金陵秦始皇時望氣者云金陵有王者氣故掘㫁連崗改名秣陵有別小江可以貯舡冝爲都邑劉備勸都之自京口遷都焉呉志先亂時童謡云寜飲建業水不食武昌魚寧歸建業死不就武昌居乃遷都建業案江表傳漢建安中劉備曽宿於秣陵覩江山之秀勸帝居之初張紘當謁帝曰秣陵都楚威王所置名爲金陵地勢崗阜連石頭訪問故老云昔秦始皇東廵會稽經此縣望氣者云金陵地形有王者都邑之氣故掘斷東崗改名秣陵今處所見存地有其氣象天之所㑹今冝爲都邑帝深善之後聞劉備語曰智者意同案呉録劉備曾使諸葛亮至京因覩秣陵山阜歎曰鍾山龍盤石頭虎踞此帝王之宅晉書周馥成都王頴以爲河南尹馥觀洛陽孤危乃建䇿迎天子都壽春曰不圖危運戎狄交侵畿甸危逼僉以殷人有屢遷之事周王有歧山之徙方今河朔蕭條崤函阻澁宛都屢敗江漢多虞淮陽之地北阻塗山南枕靈岳名州四帶有重險之固運漕四通無空窶之難雖聖上神聦元輔明賢居儉守約用保宗廟末若相土遷宅以保永祚也載記曰劉元海之僣太史令宣于脩之言於元海曰陛下鳯翔龍興奄受大命然皇居仄陋非可乆安平陽勢有紫氣兼陶唐舊都願陛下上迎乾象下恊坤祥乃遷都平陽又石勒下令曰武都吾之豐沛萬歳之後䰟魄歸之𥘉張賔謂勒曰今天下鼎沸戰爭方始夫得地者昌失地者亡邯鄲襄國趙之舊都依山慿險形勝之國可擇此二國而都之然後命將四出授以竒略推亡固存兼弱攻昧王業成矣遂據襄國又符堅自臨晉登龍門頋謂羣臣曰美哉山河之固婁敬有言關中四塞之國眞不虚矣權翼對曰臣聞夏殷之都非不險也周秦之衆非不多也終於身殞南巢首懸白旗軀殘於犬戎國分於項籍何也德不修故地呉起有云在德不在險願陛下守之以德山河之固不足恃也江表傳孫皓欲徙都武昌楊土百姓㳂流供給以爲患陸凱上䟽曰臣聞有道之君以樂樂人無道之君以樂樂身樂人者其樂彌長樂身者不乆而亡民者國之根也誠冝重其食愛其命民安則君樂矣又武昌土地危險磽确非王者都安國養民之處舡泊則沉漂陵居則峻危且童謡曰寜飲建業水不食武昌魚寜還建業死不就武昌居臣聞翼星爲祥熒惑作妖童謡之言發自天心也後魏書文帝泰和十八年卜遷都鄴登銅雀臺魏御史大夫崔吉等曰鄴城平原千里運漕四通有西門使起舊迹可以饒冨在德不在險請都之孝文曰君知其一未知其二鄴城非長乆之地石虎傾於前慕容滅於後國冨主奢暴成速敗且西有枉人山東有列人縣北有柏人城君子不飲盗泉惡其名也遂止乃都洛陽三國典略梁元帝在江陵即位欲還都建康領軍將軍胡僧祐太府卿黄羅漢吏部尚書宗懔御史中丞劉諌等曰建業王氣巳盡與虜止隔一江若有不虞悔無及也且渚宫洲數滿百當出天子陛下龍飛是其應乎梁主令朝臣議之黄門侍郎周弘正尚書左僕射王襃曰帝王所都本無定處其如黔首萬姓未見輿駕入建業謂是列國諸王冝順百姓之心從四海之望時江陵人士咸云弘正等皆是東人志願東下恐非良計弘正面折之曰若東人勸東謂爲非計君等西人欲西豈成良䇿梁主笑之又於後堂大㑹文武五百人問之曰吾欲還業諸卿以爲何如衆皆愕然莫敢先對梁主曰勸吾去者左祖於是左祖者過半武昌太守朱買臣入勸梁主云建業舊都瑩陵猶在荆鎭邊疆非王者宅願陛下弗疑致後悔也臣家在荆州豈不願陛下住但恐是臣冨貴非陛下冨貴耳乃召卜者杜景豪决其去留遇兆不吉荅云未去景豪退而言曰此兆爲鬼賊所留也五經要義曰王者受命創始建國立都必居中土所以揔天地之和據隂陽之正均統四方以制萬國者也王嬰古今通論曰崑崙東南方五千里謂之神州州中有和美郷方三千里五岳之城帝王之宅聖人所生也鹽鐵論曰燕之涿薊趙之邯鄲魏之温軹韓之滎陽齊之臨淄楚之宛陳鄭之陽翟三川之二周富冠海内皆爲天下之名都丗說曰謝公時兵厮養逋亡多外竄在南塘下諸舡中或欲求一時捜索謝公不許云不容置此軰何以爲京師譙周法訓曰王者居中國何也順天之和而同四方之統也管子曰凢立國都非太山之下必廣州之上髙無近旱而水用足下無近水而溝防省因天材就地利故城郭不必中規矩道路不必中准繩山海經曰青要之山實惟帝之密都郭璞注曰大帝曲密之邑又曰帝之下都崑崙之墟又曰從極之深三百仭唯冰夷都焉冰夷河伯尸子曰舜一徙成邑再徙成都三徙成國堯聞之賢舉之草茅之中與之語禮樂而不逆與之語政至簡而易行與之語道廣大而不窮於是妻之以皇媵之以娥九子事之而託天下焉帝王丗紀曰古公亶父是爲大王以脩德爲百姓所附狄人攻之以皮幣事之不得免焉又事之以玉帛不得免焉又事之以犬馬不得免焉遂䇿杖而去止於歧山之陽邑于周地故始改國曰周豳人聞之曰仁人不可失也東循而奔從之者如歸市焉一年而成三千户之邑二年而成都三年五倍其𥘉王於是改戎俗築城郭立宗廟設官司即詩所謂乃召司空乃召司徒俾立室家其繩則直作廟翼翼築之登登削屢馮馮者也周道之端蓋自此始两京記曰隋文帝開皇二年夏自故都移今所帝以長安故城漢來舊邑宮宇蠹杇謀欲遷都僕射蘇威等議合帝旨太史令庾季才奏當遷都帝曰吾乃今知天道開皇二年六月十八日移入新邑在漢故城之東南萬年縣界南直終南山子午谷北枕龍首原今朝堂即舊楊興村村門大樹今見在𥘉周代有異僧名棖公言詞多驗時村人於此樹下集棖公忽來逐之曰此天子坐位何故坐之左僕射髙頴㹅領其事太子左庶子宇文愷創制規模謂之大興城隋文𥘉封大興公及登極縣門園池多取其名宫城東西四里南北二里四十歩周廻十三里一百八十歩髙三丈五尺又云東都城隋大業元年自故都移於今所其地今周之王城自周敬王後漢並居於今之故都至仁壽四年隋文帝於此營建𥘉謂之東京有詣闕言事者稱一帝二京事非稽古乃改爲東都爲王充所據充平改爲洛州惣管府㝷又置陜東大行臺武德九年復爲洛州都督府貞觀六年改爲東都舊宮爲洛陽宮明慶元年復爲東都武太后虢爲神都神龍元年復舊又改爲河南府洛水貫都有河漢之象𥘉隋焬帝登北邙觀伊闕頋曰此龍門耶自古何爲不建都於此僕射蘇威對曰自古非不知以俟陛下帝大恱然其地北據山麓南望天闕水木滋茂川源形勝自古都邑莫有比也又曰太宗車駕始幸洛陽宫唯因舊宫無所改製終於貞觀永徽之間荒蕪虚耗置都之後方漸修𥙷龍朔中詔司農少卿韋機更繕造髙宗常謂機曰兩京朕東西二宅來去不恒卿冝善思修建始作上陽等宮至武太后遂定都於此日巳營構而宮府備矣郡國誌廬山在柴桑彭澤二縣之郊疊障九成崇巖萬仭山海經所謂三天子障亦曰天子都楊雄蜀都賦曰蜀都之地古曰梁州張衡南都賦曰於顯樂都旣麗且康陪京之南居漢之陽魯都賦曰彼齊諸儒皆繪弁端衣散佩垂紳金聲玉色温故知新訪魯都之區域弔先王之遺眞左思蜀都賦曰蓋兆基於上丗開國於中古廓靈關而爲門苞玉疊而爲宇又曰魏土者畢昴之所應夏之餘民先王之桑梓列聖之遺塵考之四奥則八紘之中測之寒暑則霜露所均後漢杜篤論都賦夫大漢之盛代藉雍土之饒得御外理内之術孰能致功若斯創業於髙祖嗣傳於孝惠徳隆於太宗財衍於孝景威盛於聖武政行於宣元侈極於成哀祚缺於孝平傳代十一歷載三百髙祖至平帝十一代歷渉也合二百一十曰年此言三百者謂出二百年渉三百年德衰而復盈道微而復彰謂吕氏乱而文帝興昌邑廢而宣帝中興皆莫能遷於雍州而背於咸陽宮室寢廟山陵相望髙顯弘麗可思可榮羲農巳來無兹著明夫雍州本帝皇所以育業周始祖后稷封邵公劉居豳太王居歧文王居鄷武王居鎬並在關中故曰育業也霸王所以衍功戰士角難之塲也衍廣也謂秦都關内也太平御覽卷第一百五十六
