body:
  text: 天部九風相風易曰撓萬物者莫疾乎風又曰風以動之又曰風行天上小畜君子以懿文德又曰巽爲風又曰雲從龍風從虎又曰風行地上曰觀尚書金縢曰周公居東二年則罪人斯得于後公乃爲詩以遺王名之曰鴟鴞王亦未敢誚公秋大熟未獲天大雷電以風禾盡偃大木斯拔邦人大恐王與大夫盡弁以啓金縢之書乃得周公請代武王之說王執書以泣曰其勿穆卜昔公勤勞王家唯予冲人弗及知今天動威以彰周公之德朕小子其新逆我國家禮亦冝之王出郊天乃雨反風禾則盡起又舜典曰納于大麓烈風雷雨弗迷又洪範曰休徴聖時風若咎徴蒙常風若孔安國曰君能通理則時風順之君行蒙闇則常風順之詩曰大風有隧貪人敗類又曰終風且曀終日而風爲終風又曰習習谷風以隂以雨又曰凱風自南吹彼棘心南風謂之凱風又曰冬日烈烈飄風發發禮記月令曰秋行㫪令則煖風來至又曰立春之日東風解凍又曰春行秋令則人有大疫飄風暴雨惣至又曰夏行春令則蟲蝗爲灾暴風來至又曰前有塵埃則載鳴鳶鳶鳴則風生又曰饗帝於郊而風雨節寒暑時五帝主五行五行之氣和而庶徴得其序也左傳曰楚侵鄭甚雨楚師多凍役徒幾盡晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競注曰歌者吹律以詠八風南風音徴故曰不競師曠唯歌南北風者聽晉楚之強弱也又曰僖公十年春六鶂退飛過宋都風也又昭公四年申豐曰夫氷以風壯而以風出其藏之也周其用之也徧則冬無愆陽夏無伏隂春無凄風秋無苦雨今藏川池之氷棄而不用則風不越而殺爾雅曰祭風曰磔今俗當大道中磔㺃以止風此其像也又曰南風謂之凱風詩曰凱風自南東風謂之谷風詩曰習習谷風北風謂之凉風詩曰北風其荼西風謂之泰風詩曰泰風有隧焚輪謂之頺暴風從上下也扶揺謂之猋暴風從下上也風與火爲庉炖炖熾盛之貌廻風爲飄旋風日岀而風爲暴詩曰終風且暴風而雨土爲霾詩曰終風且霾隂而風爲曀詩曰終風且曀又曰四氣和爲通正道平暢也謂之景風所以致景風也論語云曽點曰暮春者春服旣成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸又曰君子之德風小人之德草草上之風必偃又曰迅雷風烈必變易稽覽圖曰太平時隂陽和風雨咸同海内不偏地有險易故風有遲疾雖太平之政猶有不能均同也唯平均乃不鳴條易通卦驗曰冬至廣莫風至誅有罪斷大刑立春條風至赦小罪出稽留春分明庶風至正封疆修田疇立夏清明風至出幣帛禮諸侯夏至景風至辯大將封有功立秋凉風至報土功祀四郷秋分閶闔風至解懸垂琴瑟不張立冬不周風至修宫室完邊城八風以時則隂陽變化道成萬物得以育生王當順八風行八政當八卦也京房易候曰何以知聖人隱也風清明其來長乆不動揺物此有龍德在下也易緯曰八節之風謂之八風立春條風至東北風春分明庶風至東方風立夏清明風至東南方風夏至景風至南方風立秋凉風至西南方風秋分閶闔風至西方風立冬不周風至西北方風冬至廣莫風至北方風又吕氏春秋說八風東北曰猋風高誘注曰亦曰融風東方曰舀風東南方曰薫風南方曰巨風西方日颼風西北曰厲風北方日寒風尚書大傳曰舜將禪禹八風循通又曰王者德及皇天則祥風起又曰成王時越裳重譯而來朝曰乆矣天之無烈風澍雨意中國有聖人乎大戴禮曰正月時有浚風浚者大也大風南風也何大於南風也曰合氷必於北風解氷必於南風故大之也禮稽命徵曰出號令合民心則祥風至禮說曰風萌也養物成功所以八風象八卦也禮緯同禮斗威儀曰人君政頌平則祥風至宋均注曰即景風也春秋考異郵曰八風殺生以節翺翔距冬至四十五日條風至條者逹生也距猶起也自冬至後四十五日而立春此風應其方而來生萬物四十五日明庶風至明庶迎惠春分之候言庶衆也陽以施惠之恩德迎衆物而生之四十五日清明風至精芒挫収立夏之候也挫猶止也時薺麥之屬秀出巳備故挫止其鋒芒収之使成實四十五日景風至景風強也強以成之夏至之候也強言萬物強盛也四十五日凉風至凉風者寒以閉也立秋之候也閇収也言隂寒収成萬物也四十五日閶闔風至閶闔者當寒天収也秋分之候也閶闔盛也時盛収物蓋藏之閶或爲當四十五日不周風至不周者不交也隂陽未合化也立冬候也未合化言消息純坤無陽也月令日天地不通而閇塞成冬也四十五日廣莫風至廣莫者精大滿也冬至之候也言冬物無見者風精大滿羙無偏風之爲言萌也其立字虫動於几中者爲風虫動於几言陽氣無不周也明昆虫之屬得陽乃生遇隂則死故風爲隂中之陽者也春秋元命苞曰隂陽怒爲風春秋繁露曰恩及金石則凉風出王者與臣無禮身不肅敬則木不曲直而夏多暴風風者木之氣其音角故應孝經援神契曰德至八方則祥風至史記曰項王圍漢王三匝於是風從西北起折木發屋楊沙石楚軍大亂而漢王乃得與數十騎遁去又曰蚩尤民能徴風召雨黄帝爭強滅之中兾又曰庶女者齊之寡婦養姑姑女利母財而殺母以告寡婦婦不能自解以冤告呉而大風襲於齊殿又曰荆軻入秦燕太子丹送别易水上歌曰風蕭蕭兮易水寒壯土一去兮不復還漢書曰燕王都薊大風拔宫中樹七圍巳上十六枚壞城樓後王誅又曰髙祖過沛擊筑自歌曰大風起兮雲飛楊威加海内兮歸故郷魏志管輅傳曰輅過清河倪太守時大旱輅言樹上巳有少女徴風樹間又有隂鳥和鳴其雨應至矣果如其言晉書曰永和元年大風拔栁樹百餘枚若風從八方來者時王敦害刀恊周顗等故風從撗拔樹非一處也又曰賈謐家數有妖異飄風吹其朝服上數百尺大虵出𬒳中後果及禍晉陽秋曰袁宏爲東郡守謝安執宏手授扇宏曰謹當奉揚仁風慰彼黎庶宋書曰明帝猜慮肥體憎風夏月常着小皮衣拜左右二人爲司風令史風起方面輙先啓聞又曰宗慤字元幹徴士炳兄子也少時問慤所志荅曰願乗長風破萬里浪前秦録曰術士蓋欽苻堅召至長安因讌㑹以其惑衆將誅之酒酣將執欽欽化爲旋風飛去前凉録曰永嘉五年抱罕令嚴羌妾産一龍一鷲鷲㝷飛去龍十五日雷雨迎之大風吹拔張掖郡大樹經宿還立趙録曰石勒時忽有旋風下屬地隱隱雷聲良乆視之見大石神仙傳曰老子將去周而出關以升崑崙關令尹喜占風逆知當有神人來過乃掃道見老子老子知喜命應得道乃停關下以長生之事授之又曰葛玄行過神廟乗車不下湏臾有大廻風逐玄埃塵漲天玄大怒曰小邪敢爾即舉手指風風便止益部耆舊傳曰蜀楊由善風雲占候文學令豐持雞酒以奉由時有客不言客去豐起欲取雞酒由止之曰向風吹削柿當有持雞酒來者度是二人豐曰實在外湏客去取耳王子年拾遺記曰伏羲坐於方壇之上聽八風之氣乃畫八卦又曰崑山有四面風又有祛塵之風若衣服塵汙風至吹衣則浄又曰瀛州時有香風泠然而去張䄂受之則歷紀不歇着肌膚必軟滑十洲記曰南海中有炎洲洲上有風生獸形似㺃青色狀如狸以鐵椎鍜其頭數十下乃死張口向風須臾即起風土記曰南中六月則有東南長風風六月止俗號黃雀長風時海魚變爲黄雀因爲名也庾仲雍湘州記曰零陵山有石鷰遇風雨則飛雨止還化爲石交州記曰風山在九眞郡風門在山頂上常長風又曰風母出九德縣風母似猿見人若慙而屈頸若打殺之得風還活南越志曰熈安間多颶音具風颶者具四方之風也一曰懼又曰大塊噫依界反氣其名曰風是唯無作作則萬竅怒號而獨不聞之翏翏乎長風之聲又曰湯之問棘也窮髮之北有冥海者天池也有魚焉其廣數千里其名爲鯤有鳥焉其名爲鵬背若太山翼若垂天之雲摶扶揺羊角而上者九萬里扶揺羊角風也今旋風上如羖羊角也列子曰列子師老啇氏友伯髙子進二子之道乗風而歸莊子曰列子御風而行泠然至旬有五日而後反管子曰吾不能以春風風人夏雨雨人吾道窮矣又曰夫兩堯不能相王兩桀不能相亡木雖蠹無疾風不折墻雖隟無大雨不壞淮南子曰物類之相應玄妙深微論辯不能解故東風至而酒沉溢東風大風也酒沉清酌酒也米物下沉木味酸酸風入酒故酢而沉者沸盖物類相感也又曰烏鵲識歳之多風去喬木而巢扶枝扶傍又曰禹沐淫雨櫛扶風扶風奔風又曰騰虵雄鳴上風雌鳴下風而化成形又曰虎嘯而谷風至髙誘注曰虎陽獸也與風同類又曰人主之精通于天故誅暴則多飄風枹朴子曰用兵之要唯風爲急扶摇獨鹿之風大起軍中軍中必有反者風髙者道逺風下者道近風不鳴葉者十里鳴條揺枝百里大枝五百里仆大木千里折大木五千里三日三夕天下盡風二日二夕天下半風一日一夕萬里風周生列子曰夫獵葉之風不應八節吕氏春秋曰何謂八風東北曰焱風一日融風東方曰滔風一日庶風東南曰薫風一日清明淮南子作景風南方曰巨風一日凱風西南曰淒風淮南子作凉風西方曰颼風一日閶闔西北方曰厲風一曰不周風風俗通曰風或清明來乆長不揺樹木枝葉離地三二丈者此有龍德在其下風或清明不及二三尺者此君子之風也又曰猛風曰颲列音凉風曰瀏劉音微風曰飉遼音小風曰颼搜音小風從孔來曰䫼呼穴反周書時訓曰小暑之日温風至立秋之日凉風至又曰小暑之日温風不至國無寛教淮南萬畢術曰欲致疾風焚雞羽帝王世紀曰堯時厨中自生肉脯薄如翣摇則生風使食物寒而不臭名曰翣脯又曰舜彈五絃琴歌南風曰南風之薫兮可以解吾人之愠兮括地圖曰鍾山之神名曰燭龍視爲晝眠爲夜吹爲冬吁爲夏息爲風又曰竒肱民能爲飛車從風逺行湯時西風吹竒肱車至於豫州湯破其車不以示民十年西風至乃復作車遣賜之去玉門四萬里黄帝風經曰調長祥和天之喜風也折揚奔厲天之怒風也山海經曰法獄之山有獸其名曰山􅏈音暉其行如風音疾見則天下大風又曰大荒之中有山名曰鞠陵有人名曰折丹神人處東極以出入風又曰扶陽之山多怪風又曰大極山東有温水湯風不可過也河圖帝通紀曰風者天地之使六韜曰人主好田獵罼弋則歳多大風禾榖不實紂時如此陸機要覽曰列子御風常以立春歸于八荒立秋遊乎風穴是風至草木皆生去則揺落謂之離合風潜夫論曰排翣障風揲沙擁河無禦也又曰黄帝夢大風吹天下塵土得風后以爲相漢武帝秋風辭曰秋風起兮白雲飛草木揺落兮鴈南歸汎樓船兮濟汾河撗中流兮楊素波龍魚河圖曰風者天之使也荆山圖曰佷山縣山下有石床傍生野薤人徃乞者神許則風吹制其分齊隨偃而翦不得過越廣雅曰風伯謂之飛廉法訓曰利物誘人猶飄風之加庶草也唯有直愼者然後不回濳潭巴曰疾風拔木䜛臣恣忠臣辱崔豹古今注曰武王伐紂大風折蓋太公因折蓋之形而製曲蓋養性經曰治身之道春避青風夏避赤風秋避白風冬避黒風鹽鐵論曰太平之時風不鳴條雨不破塊又曰林中多疾風冨貴多䛕言樂動聲儀曰風氣者禮樂之使萬物之首也物靡不以風成熟也風順則歲羙風暴則歲惡國語曰海鳥曰爰居止於魯國東門之外臧文仲使國人祭之展禽曰今兹海島有灾乎夫廣川鳥獸恒知避其灾也是歳也海多大風又曰飄風之末不能舉鴻毛又曰火見而清風戒寒清風至而脩城郭物理論曰風者隂陽亂氣激發而起者也猶人之内氣因怒喜哀樂激越而發也故春氣温其風温以和喜風也夏氣盛其風熛以怒怒風也秋氣勁其風清以貞清風也冬氣石其風慘以烈固風也此四正之風也又有四維之風東北明庶庶物出幽入明也東南融風其道以長也西南清和百物備成也西北不周方潜藏也此八風者方土異氣徐疾不同和平則愼違逆則凶非有使之者也氣積自然怒則飛沙楊礫發屋拔樹喜則不揺枝動草順物布氣天地之性自然之體也楚宋玉風賦曰楚襄王遊於蘭臺之宫宋玉景差侍有風颯然而王乃披襟而當之曰快哉此風寡人所與庶人共者耶宋玉對曰此獨大王之風耳庶人安得共之夫風生於地起於青蘋之末浸滛谿谷盛怒於土囊之口縁於太山之阿舞於松栢之下故其清凉雄風則飄忽升降乗凌髙城入于深宫徘徊於桂椒之間翺翔於激水之上獵蕙草離秦衡槩新夷披稊楊徜徉中庭北上玉堂躋于羅帷經于洞房故其風也清清泠泠愈病析酲發明耳目寜體便人此謂大王之雄風也夫庶人之風塕然起於窮巷之間堀堁揚塵勃欎煩動沙塸吹死灰此謂庶人之雌風也楚辭曰光風轉蕙泛崇蘭又曰嫋嫋兮秋風洞庭波兮木葉下相風崔豹古今注曰司風烏夏禹所作王子年拾遺記曰帝與娥皇汎於海上以桂枝爲表結芳茅爲旍刻玉爲鳩置於表端言知四時之候今之相風此遺像也晉書曰廢帝初即位有野雉集于相風後爲桓温所廢沈約宋書輿服志曰案周禮辯載法物莫不詳究然無相風罼旄頭之屬此非古制明矣愚謂戰國並爭師旅數岀縣烏之設務察風祲疑是秦制矣梁書曰長沙王懿孫孝儼字希莊射策甲科除祕書郎太子舎人從幸華林園於坐獻相風烏華光殿景陽山等頌其文甚羙帝深賞之晉令曰車駕出入相風已前侍御史令史淮南子曰故終身隷於入譬若綄之見風也綄音緩候風者也丗所謂五两述征記曰長安宫南靈臺上有相風銅烏或云此烏遇千里風乃動鄭玄相風賦曰昔之造相風者其知自然之極乎其達變通之理乎上稽天道陽精之運表以靈烏物象其類下慿地體安貞之德鎮以金虎玄成其氣風雲之應龍虎是從觀妙之徴神明所通夫能立成器以占吉凶之先見者莫精乎此乃構相風因象設形蜿盤虎以爲趾建脩竿之亭亭體正直而無撓度徑挺而不傾捿神烏於竿首候祥風之來征張華相風賦曰太史候部有相風在西城上而作者弗爲豈以其託處幽閑違衆特立無羽毛之飾而丹􅃮不爲之容乎傳咸相風賦曰相風之賦蓋亦衆矣然辭義大同唯中書張令以太史相風獨無文飾故特賦之太僕寺丞武君賔樹一竹於前庭其上頗有樞機挿以雞毛于以占事知來與彼無異斯乃簡易之至有殊太史相風張氏之賦非其至者也翟翟竹竿在武之庭厥用自然旣脩且貞挿羽其首丹􅃮弗營經之營之不日而成庾闡楊都賦曰雲虎之門雙竿内啓祥烏司颷丹墀竟陛太平御覽卷第九
