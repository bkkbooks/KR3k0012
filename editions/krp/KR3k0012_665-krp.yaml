front:
  text: 太平御覽卷第六百六十五
  hash: sha256:efe3a36593588da541a98dc8deb73e4c86d97a668b848fa9227d63d23a5965d2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_665-1a}
body:
  text: 道部七劍解太極眞人石精金光藏景録形神經曰制劒之法上宰惣眞西城王君昔授之於紫陽公施行道成揔眞昔用劒解之道又授九轉丹方於長里先生此即周人也東鄕序云漱龍胎而死決服瓊英先師王西城此是飲丹後用劒解而不言服九轉者當是雖授而不遂合用後以付門弟子茅君亦是受而不用故云付耳茅君傳南岳魏夫人傳楊君故安妃云可尋劒解之道但不知遂用不耳許長史旣服腴石或當不必爲其事掾從鎭南夜解則又非此法掾許長史子也若是太淸解及單用劒者應不得反望故鄉而掾遊處方臺還本居邦也神劒用之而解化則能遊宴太極採五星之靈軌煥七元之威光以儀烈映眞氣故軒轅喬山之葬劒舄在焉王子渤海之家劒鳴空槨王喬有京陵之墓劒飛冲霄斯實眞驗九玄精應太靈神方靈致威劒之妙化也諸以劒尸解者以劒代身五百年之後此劒皆自然還其處諸以劒解者不必止是用丹書者空劒亦可幽響無閒恍惚難尋不可得言矣不可得爲之者見之者惟當應之於心耳神奇歘怳變動無方非復物理所期正當心任化卽事從冝耳爲之者亦不覺其所以見之者固莫測其所然軒轅採百山之銅以鑄鼎虎豹百禽爲之視火參鑪鼎而軒轅疾崩葬喬山五百年後山崩寶劒赤舄在焉一旦又失王子喬者曾詣鍾山獲九化十變經以隱遁日月遊行星辰後一旦疾終營冢渤海山夏襄時有發王子墓者一劒在北寢上自作龍鳴人無敢近後亦失所之王子喬墓在景陵戰國時復有發其墓者見一劒人適欲取視其劒忽然上飛去王子喬事舊說浮丘公擕與乘鶴共登嵩山此事不同解化時年五十五六耳故戴逺遊冠者昔葛洪云陰君授鮑靚尸解之法後死埋石子崗有人發其棺見一大刀冢左右有人馬之聲遂不敢取此似劒解法而不能飛去此是用靈寶太玄陰生符朱書刀矣太清之下故得生者而已按玉清靈傳說揔眞帶劒揚君說桐柏帶劒此並應是先解劒化也眞人用寶劒以尸解蟬蛻化之上品也夫尸解之法多如蟬蛻今此劒非蛻也故云上品明變遁之髙道營造劒之時先齋戒百日乃於幽隱處近淸泉立西向屋作竈口亦西向善鍜人鍊好鐵生鋌合鍊成令得八斤爲足也若欲窮其精理當用竹炭又以銅錫柔澳如此用歲月功夫殊多所以古人作劒三年然後成也薛燭云甌冶鑄劒赤鍾之山破而出錫若耶之溪涸而出銅今以此合燒則煉多而不燥剛利而銷其鍜人亦須温良新衣沐浴造劒之日尢不得飲酒食肉及遊履淹穢用七月庚申日八月辛酉日使長三尺九寸廣一寸四分厚三分半謂背脊上近柄閒令厚三分半也至兩刃際可減一二釐耳又向刃邊先殺背二分乃立刃至杪亦以漸令簿也杪九寸爲左右刃處當從鐶項定度整三尺刻背爲刃亦廣三分八釐必使中脊餘六分也杪九分合殺兩邊令尖殺杪鋒令有兩稜如戟杪殺鋒也其柄用長短適令鐶髙二寸四分身長二尺四寸則餘一尺二寸六分以爲柄鐵因當中央令廣九分厚二分與鐶相連柄操梓材近環圍四寸九分刃圍三寸九分皆以釦竟爲正若作劒裝則促扁於此也劒頭可安籙鐶謂發始鍊剛仍使鐶身相連勿别作模合作釘連之都使外形大小厚薄相似乃鑿除應空之内亦可先鑚作數孔鑿爲易其伏基處鑿鏝之都畢令大鐶髙二寸四分横分廣處對中徑二寸八分內方員徑四分鐶形古今多法或正圎或狹長或如鼎耳乃有十許種今此經中所圖亦是顯其左右法耳非正定形也謹准製古今取其合度立圗如右又鐶之内不得正圎如竹亦不得正方如界尺當令内面小方而外落稜角必令得刻己刃字不甚邪轉惟使長三尺九寸耳尺寸度數厚薄形制並備如別圗尋古今尺長短不同九章筭法皆積毫釐之度晉中書監荀勗善音律伎藝常恨八音不調後有人掘地得一玉律銘題周世短晉尺四分半以改定音律聲韻合度今冝用此尺爲准所以尔者揔眞桐柏並以周時作劒用周尺也籙鐶者鏤刻劒鐶鐶左右面刻之作刃字面有九刃字也鐶背上刻作九已字也深刻字皆從刃背而下順刃謂兩邊刃及已字皆對從刃皆邊起俱下就刃故曰順刃也順環而刻之隨鐶曲轉故曰順鐶也謂刻處得以金銀閒之益分明佳也劒身刻象鐶中央復有竪起如小手鐶者名之曰伏基伏基之義謂爲日月之基隱秋光景也内鐶左面爲日字内鐶者卽小環之中伏基也刻右面爲月字先又圎刻日月之外爲郭也五百年還出以揮五岳入以藏無閒謂濳靈遁迹隱影藏形也下以制九陰謂可以攝召九陰之神也上以承玄冥謂北斗玄冥星主隱變也衛足以逐邪魔威足以鑒七精謂控威秉勢鑒照七星也仰以映五氣謂五行之氣常栖映也俯以代身化形矣欲知劒之左右内外以劒正指南使劒背在上使劒刃在下也於是以東面爲右西面爲左東爲内面西爲外面此劒尺度長短廣狹厚薄刻鏤文字乃太極四眞人靈劒之模範也上淸眞人亦皆帶劒上淸之劒並是太極所造耳故此經爲太極之法乃四眞人定範何必須昆吾之金割玉之鋌耶此蓋明不必須精鐵所存者模範而已王子喬劒乃凡下之鐵耳喬山尸解之劍非昆吾之流金也此太極眞人紫陽公詞以告王君也軒轅駕龍玄圃是步綱之術爲解化後乃行前眞多有此例此劒經前章也太極上化符以飛精書𥿄盛以紫囊欲去時以係劒鐶右以曲晨飛精書劒左面令至劒抄也又太極藏景符飛精書紙盛以絳囊欲去時以係劒鞘右以曲晨飛精書劒右面令至劒杪也又太極籙形符以飛精書紙臨去之日服之身生七色之雲自有電光右以曲晨飛精書劒背令皆兩刃之際也又太極解化符恒日服一符七年化去朱書竹中帛祕要也是合曲晨丹成臨欲解化時以題劒七年以後朱題劒亦能解化陶隱居曰晉永嘉中劉㦎呼麥切多奇識亦云是異人作此劒乃方佛符字殊細設婁羅鐶日大乘法而䥫甚快利宋來便恒供御衛名曰劉㦎鈸尚千牛刀同寶女巳易去鐶麾刻處亦漸漸欲滅又見有四五故鐶並相似如一不知其剱身何在東山顧居上亦造此劒諸人有同時共製者今猶存焉大抵違謬不可具說乃有銅鑄作鐶以釘鑄着故刀如此並可以類推今此儀式惟是陶隱居所匠深搆心解亦謂理極未知必同太極模範不耳凡試刃之利鈍取中形芒數枚急束以一髮懸其抄繫於杖頭令一人執之乃以刃一斫芒斷而髮猶連計芒多少爲優劣劉㦎鈸千牛刀皆舊斫十三芒又有一百鍊剛刀斫十二芒國中惟稱此爲絶而近造神劒斫十五芒觀其鐵色青激光采有異蓋薛燭所謂渙如冰之將釋者矣頃來有作者十餘人皆不及此作剛朴是上虞謝平鑿鏤裝怡平聲是石尚方師黃文慶並是中國絕手以齊建武元年甲戌歲八月十九日辛酉建於茅山造至梁天監四年乙酉歲勑令造刃劒形供御用窮極精功奇麗絶世別有橫法剛公家自作百鍊黃文慶因此得免隷役爲山館道士也周禮制劒長三尺柄居五寸是六分之一也内刃廣二寸半重古秤一斤四兩今秤三斤十兩也今公家劒長四尺七寸柄居一尺五寸是三分之一小減也刃廣一寸六分輕重不定此寶劒長三尺九寸廣一寸四分而經有刀劒兩名晉武帝大始十年中書監荀勗及張華等校定鍾律八音不與古樂相諧由漢來用尺漸長乃更依周禮積黍法制尺以量鑄新器募求古物得周世正玉律比之毫釐無差因擊古鍾以律命之亦皆響合兼以七種古物相課皆㑹又得汲冢竹簡亦長二尺四寸於是施用謂之古尺阮咸聽荀樂聲以爲髙功非興國之音咸亡後有人掘地得銅尺長荀尺古尺之四分半時人以阮咸之解音遂復施行謂之官尺令司農相承以制五尺并取積寸以作㪷斛也宗元嘉中大將軍彭城王義康製物每欲廣大又加官尺寸半民閒復有相與用之至今謂之爲尚方御府都水材官用尺乃復長民一分推如衆例則以古尺爲勝鍾律宫商自然嚮㑹是合神精冥數且周世又二眞製劒之時兼荀張窮極精功時又有束晳雷煥之徒妙貫神鬼阮咸雖善音樂而性度縱誕不能淸切故以單緩爲好耳掘地銅尺猶應是後漢時物也梁天監四年又更校尺以調正鍾律定用張荀古尺半分於事合衷今施用名曰法尺又曰若欲濳遁名山隨時觀化不願眞官隱浪自足者當修劒尸解之道以曲晨飛精書劒左右面先逆自託疾然後當抱劒而臥也謂先僞稱疾寢卧數日乃密脫劒靑囊拔出題書及繫符都畢於是抱之而祝須天馬迎至解衣而遊勿令人知覺也又以飛精藥密拭劒鐶呼劒名字祝畢忽見太一以天馬來迎於寢卧之前於是上馬若女子則以輜軿來迎古來諸仙多有託以餘物或用竹杖或巾屨惟鮑靚用太淸刀法此神變欻怳假類㑹形不可以理趣相求眞奇事矣天馬者吉光騰黃之獸也古畫圗有此獸形皆昔眞人所顯相傳示也吉光似鹿騰黃類馬男則單騎女則駕軿也太極眞人命太一使者賫馬執控并迎以寶衣欻忽而來不知所以然也太一主仙變也馬去之時雖衆醫侍疾子孫滿側則我易服束劒流景變跡而不覺我之云爲也所謂化遁三辰巓徊月精呼吸萬變非復故形者也又曰極上化符以飛精書紙盛以紫囊欲去時以係劒鐶藏景符以飛精書𥿄盛以絳囊欲去時以係劒鞘諸仙人多以竹杖不必盡得劒法或是太淸術耳假物變化不可一類求之又曰夫修下尸解者皆不得反望故鄕上解之道名配紫簡三官不得復窺其隟但畜神劒與之起居相隨十三年自能化形不必須藥書之若不辨作藥七年之後但以丹書劒亦能潛化也單行此法似不得反故鄕矣自不及曲晨之妙精吉光騰黃之延控也雖單此猶賢於太淸雜法兼得改形練化遊宴太極其用他藥得尸解非是靈丸之化者皆不得反故鄉反故鄕三官執之也太淸尸解之法那得比太極之化遁乎太淸尸解法五符中有太玄陰生符又用牛脂煎錫藥丸兩事耳無復餘方也佩用制劒之法具在符圖訣中其後用解化之道又非常修之事故並不載太平御覽卷第六百六十五
