front:
  text: 太平御覽卷第五百二十九禮儀部八
  hash: sha256:29ea1024a15899aeeb8261a3e2815eed3081a04860884d04669afbc52ff729b3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_529-1a}
body:
  text: 五祀四望髙禖禱祈五祀禮記祭法曰王爲羣姓立七祀曰司命曰中霤曰國門曰國行曰太厲曰戸曰竈諸侯爲國立五祀曰司命曰中霤曰國門曰國行曰公厲大夫立三祀曰族厲曰門曰行適士立二祀曰門曰行庶人立一祀或立戸或立竈鄭玄注曰五祀門户中霤也此皆小神居人之間司察小神也又月令曰孟春其祀戸孟夏其祀竈季夏其祀中霤孟秋其祀門孟冬其祀行餘吉吉禮門白虎通曰何謂五祀者門户竈井中霤也又曰曲禮下記云天子祭天地四方山川五祀歳遍諸侯方伯祀山川祭五祀歳遍士祭其先凡祀有廢之莫敢舉也有舉之莫敢廢也非所當祭而祭之名爲淫祀無福祭五祀所以歳遍何愼五行也五經異義曰大戴說禮器云竈者老婦之祭許君按月令孟夏之月其祀竈五祀之神王者所祭非老婦也鄭玄曰竈神祝融是老婦又曰王爲羣姓立七祀一曰司命主督察人命也二曰中霤王宫室居處也三曰門四曰戸主岀入五曰國行主道路也六曰大厲主殺也七曰竈主飲食也漢書議曰祠五祀謂五行金木水火土也木正曰勾芒火正曰祝融金正曰蓐收水正曰玄冥土正曰后土皆古賢能治成五行有功者也主其神祀之魏名臣奏曰秦静議云祭法七祀有國行今月令謂行爲井是以俗廢行而祀井武帝始定天下興復舊祀造祭祀門戸井竈中霤文帝稱詔靜按凡諸祠祀所以尊敬神靈不冝稱詔髙堂隆議曰國中霤門井竈多不遍唯祀在者故曰祭五祀在於廟今毎門户輒祭之自漢以來非舊典也祭井自漢從水類不列五祀冝除井祀行世夲曰徴作禓五祀徴者殷王八世孫也禓者強死男也謂時難索宣駈疫逐強死鬼也五者謂門户及井竈中霤也傳玄五祀議曰禮大記云室中央中霤謂四霤之中也祭於漏井盖失之矣七祀之文皆云祀行而無井祭竈而不祭井於事則闕夫設祀者非唯報功而巳亦神道設教使民慎之幽冥也臣以爲帝之都城冝祭一門正宫一門正室一户井竈中霤亦各擇其一正者祭之四望尚書舜典曰正月上日受終于文祖在璿璣玉衡以齊七政肆類于上帝禋于六宗望於山川遍于群神歳二月東廵狩至于岱宗柴望秩于山川肆覲東后孔安國曰望秩于山川者以尊卑祭之也五岳視三公四瀆視諸侯其餘小者或卿大夫伯子男周禮春官上曰大宗伯之職國有大故則旅上帝及四望四望五嶽四鎮四瀆也又春官曰小宗伯之職掌兆五帝於四郊四望四類亦如之兆爲壇之營城又春官上典瑞曰掌玉瑞玉器之藏四珪有邸以祀天旅上帝兩珪有邸以祀地旅四望又春官下大司樂曰春奏姑洗歌南吕舞大韶以禮四望公羊傳僖下曰夏四月卜郊不從乃免牲猶三望三望者何望祭也則曷爲祭祭㤗山河海山川有能潤于百里者天子秩而祭之比皆助天氣成功故祭天及之五經通義曰王者所以因郊祭日月星辰風伯雨師山川何以爲皆有功於民故祭之也皆天地之别神從官也縁天地之意亦欲及之故歳一祭之禮日於南門外禮月四瀆於北門外禮山川丘陵西門外祭風伯雨師於東門外各即其位也以是明之其祭之柰何乎曰祭日者懸祭月者毀祭風者明祭雨者布䟽祭山川者沉各象其貌也三輔黄圖曰宰衡王葬奏曰冬至使有司祭天神於南郊髙祖配而望羣陽夏至使有司祭地祇於北郊髙后配而望羣隂隋書志曰梁朱异議鄭衆云四望謂日月星海鄭玄云謂五岳四瀆㝷二鄭之說牙有不同竊以望是不即之名凢厥遥祭皆有斯目豈容局於星海拘於海瀆請今天司有關水旱之義爰有四海名山大川能興雲致雨一皆備祭髙禖禮記月令曰仲春玄鳥至之日以太牢祀于髙禖天子親徃后妃率九嬪御乃醴天子所御帶以弓韣授以弓矢立於髙禖之前蔡邕章句曰髙禖祀名也髙猶尊也禖者所以祈子孫之祀也天子所御謂后妃以下主妾御者韣弓衣也祝以髙禖之命飲以醴酒帶以弓衣尚使得男者也鄭玄注曰玄鳥遺卵娀簡狄吞之生契後以爲禖官嘉祥而立祀也漢書曰太子據立爲皇太子𥘉上年二十九乃得太子甚喜爲立禖張晏曰禖求子禖神使東方朔枚皐作禖祝續漢書曰仲春之月立髙禖祀於城南禮以特牲五經異義曰王者一歳七祭天地仲春后妃郊禖禖亦祭天也五經要義曰契母簡狄以玄鳥至之日祀於髙禖而生契髙禖者盖先王所以祈子孫之祀也玄鳥感陽而至集人棟宇有孳乳之祥故重其至日因以用事五經異義曰鄭記曰玄鳥至之日以太牢祀于髙禖注曰髙辛氏世娀簡狄吞鷰子而生契後王以爲禖官嘉祥其祀焉王權問曰以注言之先啇之時未有髙禖生民詩曰克禋克祀以祓無子傳以爲古者必以郊禖焉姜嫄禋祀上帝而生稷是則郊禖之祀非以生契之後立也譙喬荅曰先啇之時自必有禖氏祓除之祀位在南郊盖亦以玄鳥至之日然其所禋乃於上帝娀簡狄吞乙子之後王以爲禖官嘉祥祀之以配帝謂之髙禖晉束晳髙禖壇石議曰元康六年髙禖壇上石破爲二叚詔書問置此石來幾時岀何經典今應復不博士議禮無髙禖置石之文未知造設所由旣巳毀破無可改造設髙辛氏有簡狄吞卵之祥今此石有吞卵之象盖俗說所爲而史籍無記可但收聚復於舊處而巳太常以爲吞卵之言盖是逸俗之失義因今毀破便冝廢除下四府博士議賊曹屬束晢議夫未詳其置之故而欲必其可除之理理不可然按郊祀志秦漢不祀髙禖漢武帝五子傳武帝晚得太子始爲立禖其事未之能審許慎五經異說云山陽民祭皆以石爲主然則石之爲主由來尚矣其此象矣而祭禮龜䇿祭器弊則埋之而改置新石今破則冝埋而更造不冝遂廢収集破石積之故處於禮無依於事不肅思所未安也時公卿從太常所處此議不用其後得髙堂隆故事魏青龍中造立此禮詔書更鐫石令如舊置髙禖壇上埋破石入地一丈隋書禮志曰梁太廟北門内道西有石文如竹葉小屋覆之宋元嘉中脩廟所得陸澄以爲孝武時郊禖之石然則江左亦有此禮矣後齊髙禖爲壇於南郊傍廣輪二十六尺髙九尺四陛三壇禱祈周書曰四月孟夏王𥘉祈禱于宗乃甞麥于廟毛詩甫田曰琴瑟擊鼔以御田祖以祈甘雨以戒我稷黍以榖我士女又生民行葦曰曽孫唯主酒醴維醹酌以大斗以祈黄者又臣工噫嘻曰春夏祈榖於上帝也祈猶禱求周禮春官上小宗伯曰小宗伯掌大災乃執事禱祠于上下神祇又春官下太祝掌六祝之辭以事鬼神祈福祥求永貞馬融傳曰神天神鬼人鬼祇地祇也禮記月令曰孟春是月也天子乃以元日祈糓于上帝左傳襄上曰郊祀后稷以祈農事也又定上曰魯昭公岀故季平子禱于煬公九月立煬宫平子逐君懼而請禱於煬公昭公死於外自以爲獲福故立其宫又哀上曰衛太子禱曰曽子蒯瞶敢昭告皇祖文王周文王皇大也烈祖康叔文祖襄公鄭勝亂從勝鄭聲公名釋君助臣爲從於亂晉午在難午晉定公名不能治亂使鞅討之鞅趙簡子各論語八佾曰王孫賈問曰興其媚於奥寕媚於竈何謂也王孫賈自周出仕於衛也宗廟及五祀之神皆祭於奥室西南隅謂之奥子曰不然獲罪於天無所禱也明當媚其尊者夫竈者老婦之祭又述而曰子疾病子路請禱禱謝過於鬼神子曰有諸觀子路曉禱禮否子路對曰有之誄曰禱爾于上下神祇誄天神之辭也子曰丘之禱乆矣孔子自知無過謝五經異義曰禮祭法云天子有祧逺廟曰祧將祧而去之故曰祧去祧曰壇去壇曰墠皆藏於祖廟有事則禱無事則止說文曰告事求福爲禱漢書曰文帝曰昔先王逺施不求其報望祀不祈其福今吾聞祠官祝釐如淳曰釐福皆於朕躬不爲百姓夫以朕之不德而專饗獨美其福百姓不與是重吾不德也其令祠官致祀無有所祈東觀漢記曰鄧太后甞體不安左右憂惶至令禱祠願以人爲代太后聞之即譴怒勑掖庭令以下何故乃有此不祥之言左右咸流涕歎太后臨大病不自頋而念兆民後病瘳豈非天地之應與晉中興書曰大旱經乆太興四年四月始雨有奏應報賽宗廟山川中宗詔曰祈廟云報賽非奉尊上辭也吾意有疑以爲舊山川有許報故雨賽非大事不應告廟臣子無要君之道黷祭稱賽於禮有違唐書曰憲宗謂宰臣曰穰災祈福之說其事信否李藩對曰臣竊觀自古聖逹皆不禱祠故楚昭王有疾卜者謂河爲崇昭王以河不在楚非所獲罪孔子以爲知天道仲尼疾病門人子路請禱仲尼以爲神道助順繫於所行巳旣全徳無愧屋漏故荅子路云丘之禱乆矣書云惠迪吉從逆凶言順道則吉從逆則凶詩云自求多福則禍福之來感應行事若苟爲非道則何福可求是以漢文帝毎有祭祀使有司敬而不祈其見超然可謂盛德若使神明無知則安能降福必其有知則私巳求媚之事君子尚不可恱也况於明神乎由此言之則履信思順自天祐之茍異於此實難致福故堯舜之務唯在脩巳以安百姓管仲云義於人者和於神蓋以人爲神主故但務安人而巳虢公求神以致危亡王莽妄祈以速漢兵古今明誡書傳所紀望陛下毎以漢文孔子之意爲凖則百福具臻矣上深嘉美之又曰文宗開成中以乆旱分命郡官偏祠祈禱於紫宸殿對宰臣憂形於色宰臣以星官所奏天時當爾乞不過勞聖慮上懔然改容曰朕爲天下主無徳及人致此災旱今又謫見于上若三日不雨當退歸南位更選賢明以主天下宰臣嗚咽流涕各請罪乞免相位是夜澍雨大洽又曰孔戣爲廣州刺史先是准詔禱南海神多令從事代戣必自越風波而徃韓愈爲潮州作詩美之華陽國志曰梁輔爲郡五官時天大旱請雨不降輔出禱乃積薪祝神曰二日不雨則欲自焚謝罪百姓言終而雨長沙郡耆舊傳曰祝良爲洛陽令時亢旱天子祈不得良乃曝身階庭告誠引罪自晨至中紫雲沓起甘雨登降民爲之歌曰天乆不雨烝民失所天王自出祝令特苦精符感應滂沲而下列仙傳曰歴陽有彭祖仙室前丗云禱請風雨莫不輙應常有兩虎在祠左右今日祠訖即有虎迹異苑曰晉簡文旣廢丗子道生次子郁又早卒而未有息嗣濮陽令在弟前禱至三更鬱有黄氣自西南來逆室前爾夜幸李太后而生孝武皇帝韓子曰衛人有夫妻禱者而祝曰使我無故得百束布其夫曰何少也對曰益是子將以買妾吕氏春秋曰昔殷湯剋夏而天下大旱五年不収湯乃以身禱於桑林曰余一人有罪無及萬方萬方有罪在子一人無以一人之不敏使上帝鬼神傷民之命於是剪其髮麗其手自以爲牲用祈福於上帝民恱雨乃大至淮南子曰聖人者不恥身賤而媿道之不行不憂命之短而憂百姓之窮也是故禹爲水以身解於陽肝之河湯爲旱以身禱於桑林之下聖人之憂民如此其明也太平御覽卷第五百二十九
