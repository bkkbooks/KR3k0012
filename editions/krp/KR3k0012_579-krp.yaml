front:
  text: 太平御覽卷第五百七十九樂部十七
  hash: sha256:66bd8c8ec8032beaab3cdfe2b5edc95a69fc000579daa2b5f148542a60c54037
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_579-1a}
body:
  text: 琴下三禮圗曰琴第一絃爲宫次爲啇次爲角次爲徴次爲羽次爲少宫次爲少啇廣雅曰伏羲氏琴長七尺二寸上有五絃孫登別傳曰孫登字公和汲郡人清静無爲好讀易彈琴頽然自得觀其風神若遊六合之外者當魏末居北山中石窟爲宇編草自覆阮嗣宗見登𬒳髪端坐岩下逍遥然皷琴嗣宗自下趍進兾得與言嗣宗乃長嘯與琴音諧㑹登因嘯和之妙響動林壑洞冥記曰帝恒夕望東邊有青雲俄見雙白鵠集於䑓上倐忽變爲二神女舞於樓下握鳯管之簫舞落霞之琴歌清吴春波之曲也劉向別録曰雅琴之意事皆出龍德諸琴雜事中趙氏者渤海趙定人也宣帝時元康神爵間丞相奏能皷琴者渤海趙定梁國龍德皆召入見温室使皷琴時閑燕爲散操多爲之涕泣者樂府解題曰魏武帝宫人有盧女者故將軍隂叔之姨也七歳入漢宫學皷琴琴特鳴異善爲新聲阮籍樂論曰漢帝聞楚琴倚扆而悲慷慨長息曰善哉爲聲若此而足矣昔季流向風而皷琴聽之者涙下列仙傳曰稷丘公華山道士漢武帝封禪公乃冠章甫擁琴來迎靈異志曰嵇中散神情髙邁任心遊憇甞行西南出去洛數十里有亭名華陽投宿夜了無人獨在亭中此亭由來殺人宿者多㓙至一更中操琴先作諸弄而聞空中稱善聲中散撫琴而呼之曰君何以不來此人便云身是古人幽没於此數千年矣聞君彈琴音曲清和故來聽耳而就終殘毀不冝以接侍君子向夜髣髴漸見以手持其頭遂與中散共論聲音其辝清辯謂中散君試過琴於是中散以琴授之旣彈悉作衆曲亦不出常唯廣陵散絶倫中散纔從受之半夕悉得與中散誓不得教他人又不得言其姓也琴書曰昔者至人伏羲氏王天下也仰觀象於天俯察法於地逺取諸物近取諸身始畫八卦削桐爲琴又曰自堯相傳善琴者八十餘人有八十餘様雖少有差大體相似皆長三尺六寸法朞之數也上圎而歛象天也下方相平法地十三徽配十二律餘一象閏也夲五絃宫啇角徴羽也加二絃文武也至後漢蔡邕又加二絃象九星在人法九竅其様有異傳於代四所象鳯首翅足尾南方朱雀爲樂之主也五分其身以三爲上以二爲下三天兩地之義也上廣下狹尊卑之象也中翅八寸象八風腰廣四寸象四時軫圎象陽轉而不窮也臨樂承露用棗脣用梓未逹先賢深意也又曰琴髙以琴飬性𥘉學於羅浮山後遊四海或傳禽髙非也又曰舜彈五絃之琴以歌南風之詩豈唯道在思親志兼憂民養萬物故感之又曰穎陽西北界李氏處女年十五六天寳八年二月遘疾七月不食魂飛冥冥如昇上景在雲霧中女仙人蘆藕苗間受琴清風弄等五十曲至天寳十五載五月留守悲逈御史中丞蔣列馹騎上聞玄宗度爲女道士賜琴三面留内供奉琴德絃妙旁行不流所感無恒也又曰師㳙紂之樂官也善皷琴感四馬嘘天仰秣或曰師曠傳雖二疑即是一風俗通曰琴者樂之統也君子所常御不離於身非若鍾皷陳於宗廟列於簴懸也以其大小得中而聲音和大聲不諠譁而流漫小聲不湮滅而不聞適足以和人意氣感發善心也琴書曰堯大德堯彈感天神降聽儼然言和之至也故堯制神人暢瑞應圗曰師曠皷琴通於神明而白鵠翔竹林七賢傳曰嵇康臨死頋視日影索琴彈之曰袁孝尼甞從吾學廣陵散吾無惜固不與廣陵散於是絶矣司馬相如美人賦曰上客何國之公子所從來無乃逺乎遂設旨酒進鳴琴撫絃爲幽閑之曲張茂樞響泉記曰余家丗所寳琴書圗昼廣明之乱散失蕩盡其中二琴一名響泉一名韻磬皆希代之寳也宋玉賦曰臣甞行僕飢馬疲正值主人門開主人翁出獨有主人女在欲置臣堂上太髙堂下太卑乃便爲蘭房奥室止臣其中其中有鳴琴焉臣援琴而皷之爲秋竹積雪之曲吴均續齊諧記曰王彦伯㑹稽餘姚人也善皷琴仕爲東宮扶侍赴告還都行至吴郵亭維舟中渚秉燭理琴見一女子披幃而進二女從焉先施錦席於東床乃就坐女取琴調之似琴而聲甚哀雅有類今之登歌女子曰子識此聲否彦伯曰所未曽聞女曰此曲所謂楚明光者也唯嵇叔夜能爲此聲自此以外傳習數人而巳彦伯欲受之女曰此非艶俗所冝唯岩栖谷隠可以自娯耳當更爲子彈之幸復聽之乃皷琴且歌歌畢止於東榻遟明將別各深怨慕女取四端錦卧具繡臂囊一贈彦伯爲別彦伯以大籠并玉琴以荅之而去說苑曰雍門周以琴見孟甞君孟甞君曰先生皷琴亦能令我悲乎周曰臣烏能令足下悲哉所能令悲者先貴而後賤先冨而後貧不若身才髙妙適遭暴亂不若處之隠絶不及四隣屈折擯壓無所告訴臣一爲之徴操琴則涕零矣今足下千乗之君廣厦䆳房下羅帷來清風闘象旗舞鄭妾麗色淫目流聲娱耳水遊則連方舟載旗野遊則馳弋獵平原廣囿入則撞鍾擊皷乎深宫之中雖有善琴者固未能使足下悲也然臣所爲足下悲者一也千秋萬歳之後宗廟必不血食髙䑓旣巳壞曲池旣巳壍墳墓旣巳平嬰児竪子採樵者躑躅其足而歌其上曰夫以孟甞君尊賢乃若是乎於是孟甞君泣焉垂臉周引琴而皷之徐動宫徴拂羽角孟甞君涕泣増哀下而就之曰聞先生皷琴立若破國亡邑之人也鄭緝之東陽記曰晉中朝時有王質者常入山伐木至石室見童子四人彈琴而歌質因留斧柯而聽之童子以一物與質狀如棗核質取而含之便不復飢遂復少留亦謂俄頃童子曰汝來己乆何不速去質承而起所坐斧柯爛盡旣歸計離家巳數十年矣舊宅遷移室宇靡存遂號慟而絶韓子曰昔衛靈公之晉於濮水之上宿夜聞有皷琴聲者恱之問左右盡不聞乃召師㳙而告謂之曰有皷新聲者子爲我聽而冩之師㳙静坐撫琴冩之明日報曰臣得之矣公遂之晉晉平觴之虒祈之臺靈公召師㳙令坐師曠之傍援琴皷之未終師曠曰此師延之作紂爲靡靡之樂及武王伐紂延東走至於濮水而自投聞此聲者必於濮水之上先聞者其國削不可遂此平公曰此何聲也曰此所謂清啇也公曰清啇固冝悲乎師曠曰不如清徴公曰清徴可得聞乎師曠曰不可古之聽清徴者皆有徳義之君今主君德薄不足以聽之平公曰願試聽之師曠不得巳援琴一奏之有玄鶴二八南方來集於郎門之邑再奏之列三奏之延頸而鳴舒翼而舞平公大恱提觴而起爲師曠壽曰音莫悲於清徴乎師曠曰不如清角平公曰清角可得聞乎師曠曰不可昔者黄帝合鬼神於西山之上駕象車六蛟龍畢方並館蚩尤居前風伯進掃雨師洒道虎狼前在䖝蛇伏地鳯皇覆上大合鬼神作爲清角今主君德薄不足以聽之平公曰願試聽之師曠不得巳而皷之一奏之有雲從西北方起再奏之大風至大雨隨之裂帷幕破爼豆墮廊瓦坐者散走平公恐懼伏於廊室晉國大旱赤地西京雜記曰趙后有寳琴曰鳯皇皆以金玉隠起爲龍鳯螭鸞古賢列女之象亦爲歸風送逺之操淮南子曰孟春東宫御女青色采衣皷琴瑟琴瑟木也春木王桓譚新論曰神農氏爲琴七絃足以通萬物而考理乱也又曰八音之中唯絲最爲宻而琴爲之首應邵風俗通曰琴者樂之與八音並行君臣以相御也孔叢子曰孔子晝息於室而皷琴閔子自外聞之以告曽子曰嚮子之音清微而和淪入至道今也更爲幽沉之聲幽則欲上所爲發也沉則貪德之所爲施也夫子何所感一若斯乎吾從子入而問焉曽子曰諾二子入問孔子孔子曰然如是也吾有之嚮見狸方取䑕欲其得之故爲音汝二人者孰識諸曽子對以閔子夫子曰可以聽音矣家語曰孔子遊於泰山見榮啓期行郕之野鹿裘帶索抱琴而舞孔子問曰先生爲樂何也對曰天生萬物唯人爲貴吾旣爲人一樂也男尊女卑吾旣爲男二樂也人生有不見日月不免襁褓吾行年九十五歳矣三樂也貧者士之常死者人之終處常得終又何憂乎孔子曰善吕氏春秋曰伯牙皷琴鍾子期聽之方皷琴志在泰山鍾子期曰善哉乎皷琴巍巍乎如泰山志在流水鍾子期曰善哉乎皷琴茫茫乎若流水鍾子期死伯牙擗琴絶絃終身不復皷琴以爲丗無足以皷琴也列仙傳曰華山毛女獵即見常居岩彈琴桓譚新論曰神農氏継宓羲而王天下亦上觀法於天下取法於地近取諸身逺取諸物於是始削桐爲琴䋲絲爲絃以通神明之德合天人之和焉琴書曰師曠晉之樂官也上於琴能易寒暑召風雨爲晉平公皷之感玄鶴六下舞西京雜記曰張安丗十五爲成帝侍中善皷琴能爲雙鳯離鸞之曲丗說顧彦先平生好琴及䘮家人常以琴置靈牀上張季鷹性哭顧不勝慟遂徑上牀皷琴作數曲而去又曰㑹稽賀思令善彈琴常夜在月中坐臨風鳴絃忽有一人形皃甚偉著械有慘色在中庭稱善便與共語自云是嵇中散謂賀云卿手下極快但於古法未備因授以廣陵散遂傳之於今不絶大周正樂曰勝之逸人也常挟琴牧羊巨澤漢王知其賢將聘焉委以國政勝之曰王廢牧羊之任而委四海之務是錯乱天地顚倒人倫竟逃於隂山之中又曰琴所以脩身理性反其天真也君子所以常御不離於身非若鍾皷陳於宗廟列於簴懸也以其大小得中而聲音和大聲不諠譁而流漫小聲不湮滅而不聞適足以和人意氣感發善心也又曰瓠巴六國時人也工琴好古因夏日俯於池亭皷之感魚躍潜藻而聽焉又曰嵇康字叔夜有邁俗之志爲中散大夫或傳晉人非也常宿王伯通館忽有八人云吾有兄弟爲樂人不勝覉旅今授君廣陵散甚妙今代莫測又曰凡琴曲和樂而作命之曰暢暢者言其道之羙暢從不敢自安也憂愁而作命之曰操操者言困阨危迫猶不失其操也又曰清角黄帝之琴鳴廉脩况藍脅自鳴空中號鍾齊桓公琴繞梁楚莊王琴緑綺司馬相如琴焦尾蔡邕琴鳯皇趙飛鷰琴又曰賀韜吴人也常夜彈琴感鬼神見舞數曲斯亦妙之至也十二國史曰周師經仕魏文侯善皷琴文侯躭之起舞經怒以琴撞文侯文侯怒使人曵下殿將殺之經曰乞申一言而死文侯曰何經曰臣撞桀紂之君不撞堯舜之主文侯曰寡人過矣乃捨之懸琴於壁以爲戒晉紀曰孫登字公和不知何許人散髪宛地行吟樂天居白鹿蘇門二山彈一絃琴善嘯每感風雷嵇康師事之三年不言樂纂曰趙耶利居士唐𥘉天水人也以琴道見重於海内帝王賢貴靡不欽風舊錯謬十五餘弄皆削凢歸雅無一徴玷不合於古𫐠執法象及胡笳五弄譜兩卷弟子逵者三人並當代翹楚貞觀十年終於曹壽七十六弟子宋孝臻公孫常數百年内常傳於馬氏國史𥙷曰張弘静少時㑹名客觀鄭宥彈琴宥調二琴至切各置一榻動宫則宫應動角則角應稍不切乃不應宥師董庭蘭尤善汎聲又曰李汧公勉雅好琴常斵桐又取􅃮䇶爲之多至數百張永者與之有絶代者一名響泉一名韻磬自寳於家京師又以樊氏路氏爲第一路氏有房太尉石枕損之不理蜀氏斵琴甞自品第一上者以玉次者以琴瑟又次以金徽螺蚌唐書樂志曰趙師字耶利天水人也在隋爲知音至唐貞觀𥘉獨歩上京遽入琴苑疇之嵇氏累代居曹遂今曹郡琴者所修五弄具列於曹妙傳濮州司馬氏琴道不墜於地也師云吴聲清宛若長江廣流緜緜徐逝有國士之風蜀聲躁急若擊浪奔雷亦一時俊決也丗說曰晉戴顒字仲若父逵髙尚不仕顒年十六遭憂不忍傳父之琴與兄勃各造新弄勃五部顒十五部又制長弄一部並傳於丗太平御覽卷第五百七十九
