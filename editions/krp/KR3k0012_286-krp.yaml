front:
  text: 太平御覽卷第二百八十六
  hash: sha256:df34910b77f275d809e0503453e5d9ac1d5ee32380ac9b28ffce236650c2790e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_286-1a}
body:
  text: 兵部十七機略五王隱晉書曰馬隆子咸爲成都王前鋒統陸機攻長沙王乂於石橋將士器仗嚴利長沙王所統冠軍司馬王瑚率衆討咸咸堅不動瑚乃使數十騎下馬縳㦸於馬安革頭放令伺咸又使數十騎各刺所放馬馬驚奔咸軍軍即壞瑚因馳逐猛戰臨陣斬咸晉書毛寳傳曰時蘇峻送米万斛饋祖約約遣司馬桓撫等迎之寳告其衆曰兵法軍令有所不從豈可不上岸邪乃設變力戰悉獲其米又曰馬隆平泰原加赤幢曲盖鼔吹隆竒謀間發夾道累礠石賊負鐡鎧行不得前隆卒先𬒳犀甲無所留礙賊咸以爲神也又曰衛瓘旣囚鄧艾諸將圖欲刼艾整仗趨瓘營瓘輕岀迎之僞作表草將申明艾事諸將信之而止又曰劉琨少負壯氣有縱横之才善交勝已而頗浮誇與范陽祖逖爲友聞逖𬒳用與親故書曰吾枕戈待用志梟逆虜常恐祖生先吾着鞭其意相期如此在晉陽甞爲胡騎所圍數重城中窘迫無計琨乃乘月登樓清嘯胡賊聞之皆悽然長歎中夜奏胡笳賊又流涕歔欷有懷土之切向暁復吹之賊弃圍而走又曰盧循自廣州南下戎卒十萬舩艫千艘討敗將軍劉毅于桑落逕至江寧循妹夫徐道覆素有膽决知𥙿已還欲乾没一戰請於新亭白石焚舟而上數道攻之循多謀少决欲以萬全爲討固不聽道覆曰我終爲盧公所誤事必不成使我得爲英雄主驅馳天下不足定也後循戰敗又曰王敦反敦旣死以兄子應爲嗣沈充自呉率衆萬餘人至與王含等合充司馬顧颺說充曰今日舉大事而天子巳扼其喉情離衆沮鋒挫持疑猶豫必致禍敗今若決破栅塘因湖水灌京邑肆舟艦之勢極水軍之用此所謂不戰而屈人之兵上䇿也藉𥘉至之銳并東南衆軍之力十道俱進衆寡過倍理必摧䧟中䇿也轉禍爲福因敗爲成召錢鳯計事因斬之以降下䇿也充不能用颺逃歸于呉含復率衆渡淮蘇峻等逆擊大敗之充亦燒營而退旣而周光斬錢鳯呉儒斬充並傳首京師又載記曰符登攻姚萇萇退還安定登就食新平留其大軍于胡空堡率騎萬餘圍萇營四靣大哭哀聲動人萇惡之命三軍哭以應登登乃引退又曰河間王顒在関中遣將張方討長沙王乂方率衆自凾谷入屯河南入遣左將軍皇甫啇拒之而敗張方率兵入洛陽又奉惠帝討方于城内方軍遥見乗輿於是引退方止之不得衆遂大敗方退壁于十二里撟人情挫衂無復固志或勸方夜遁方曰兵之利鈍是常貴因敗以爲成耳我更前作壘出其不意此用兵之竒也乃夜潜進逼洛城七里人旣新捷不以爲意忽聞方壘成乂師乃戰遂大敗又曰石勒據襄國晋將王浚遣督護王昌及鮮卑叚就六眷末杯等部衆五萬餘以討勒時城隍未修乃築隔城重栅以待之就六眷屯于渚陽勒分遣諸將連出桃戰頻爲六眷所敗又聞其大造攻具顧謂其將佐曰今宼來轉逼彼衆我寡恐攻圍不解外救不至内糧罄絶必敗不能固也吾將簡練將士大陣於野以決之何如諸將曰冝固守以疲宼彼師老自退追而擊之必尅張賔曰聞就六眷尅來月上旬送死北城今以我勢寡弱謂不敢出戰意必懈怠今叚氏種衆之悍末杯尤最其卒之精勇悉在末杯可勿復出戰示之以弱速鑿北壘爲突門二十餘道候賊列守未定出其不意直衝末杯帳敵必震惶計不及設所謂迅雷不及掩耳末杯之衆旣奔餘自摧散擒末杯之後王浚指揮而定勒納之即以孔萇爲攻戰都督造突門于北城鮮卑入屯北壘勒候其陣未定躬率將士鼓譟于城上㑹孔萇督諸突門伏兵俱出擊之生擒末杯就六眷等衆遂奔散萇乗勝追擊枕屍三十餘里獲鎧馬五千疋就六眷收其遺衆屯于渚陽遣使永和送鎧馬金銀并以末杯三弟爲質而請末杯諸將並勸殺末杯以挫之勒曰遼西鮮卑與我素無㤪讎爲王浚所使耳今殺一人結㤪一國非計也放之必恱不復爲浚用矣於是納其質而遣末杯就六眷等引還終獲其用又曰杜預以太康元年正月陳兵于江陵遣叅軍樊顯尹林鄧圭襄陽太守周竒等率衆循江西上授以節度旬日之間累尅城邑皆如預䇿焉又遣牙門管定周旨伍巢等率竒兵八百汎舟夜渡以襲樂郷多張旗幟起火巴山於要害之城以奪賊心呉都督孫歆震恐與伍延書曰北來諸軍乃飛渡江也呉之男女降者萬餘口旨巢等伏兵樂郷城外歆遣軍出拒王濬大敗而還旨等發伏兵隨歆軍而入歆不覺直至帳下虜歆而還故軍中爲之謡曰以計伐戰一當萬又曰劉牢之等討妖賊孫恩恩敗走虜男女二十餘萬口一時入海懼官軍之躡乃縁道多弃寳物子女時東土殷實粲麗盈目牢之等遽收歛故恩復得逃入海通典曰孫恩用此術獲免也又曰李矩守滎陽後趙石勒親率兵襲矩矩遣老弱入山令所在散牛馬因設伏以待之賊爭取牛馬伏發齊呼聲動山谷遂大敗之斬獲甚衆勒乃退又曰劉琨守太原遣將姬澹率衆十餘萬討石勒勒將拒之或諌曰澹兵馬精盛其鋒不可當冝深溝髙壁以挫其銳攻守勢異必獲萬全勒曰澹衆大逺來體疲力竭犬羊烏合號令不齊可一戰擒之何強之有宼巳垂至胡可捨去大軍一動豈易中還若澹乗我之退頋走乃無暇焉得深溝髙壘乎此爲不戰而自滅亡之道立斬諌者以孔萇爲前鋒都督令三軍後出者斬設疑兵於山上分爲二伏勒輕騎與澹戰僞收衆而北澹縱兵追之勒前後伏兵夾擊澹軍大敗又載記曰前燕慕容廆封略漸廣廆胡罪切據棘城晉平州刺史東夷校尉崔毖隂結髙勾麗毖音祕及宇文叚回等謀滅廆以分其地遂同伐廆廆曰彼信崔毖虚說邀一時之利烏合而來耳旣無統一莫相歸伏吾今破之必矣然彼軍𥘉合其鋒甚銳幸我速戰若逆擊之落其計矣靖以待之必懷疑貳迭相猜防一則疑吾與毖譎而覆之二則自疑三國之中與吾有韓魏之謀者待其人情沮惑然後取之矣於是三國攻棘城廆閉門不戰遣使送牛酒以犒宇文大言於衆曰崔毖昨有使至於是二國果疑宇文同於廆也引兵而歸宇文悉獨官曰二國雖歸吾當獨兼其國盡衆逼城連營三十里廆簡銳士配子皝推鋒於前皝音晃子翰領精騎爲竒兵從傍出直衝其營廆方陣而進悉獨官自恃其衆不設備見廆軍之至方率兵拒之前鋒始交翰巳入其營縱火焚之衆遂大敗又曰蘇峻反攻尅石頭城據之以陶侃温嶠率兵討之諸將請於查浦築壘監軍鄧岳曰查浦地下又在水南唯白石峻極崇固可容數千人賊來攻不便戮賊之術也侃從之夜立壘訖賊見壘大驚賊攻大葉侃將救之長史殷羡曰若大葉歩戰不利則大事去矣但當急攻石頭峻必救之而大葉自解侃又從羡言峻果弃大葉救石頭諸軍與峻戰陵東侃督竟陵太守李陽部將彭伐斬峻於陣賊衆遂潰又曰妖賊孫恩北出海鹽劉𥙿爲將築城于海鹽賊日來攻城城内兵力甚弱𥙿深獨慮之一夜偃旗匿衆若巳遁者明旦開門使羸疾數人登城賊遥問𥙿所在曰夜已走矣信之乃率衆大上𥙿乘其懈怠奮擊大破之崔鴻十六國春秋曰北涼泪渠蒙遜率兵伐南凉秃髮傉檀傉奴沃切入其境徙數千户而還傉檀追及蒙遜于窮泉蒙遜將擊之諸將皆曰賊已安營不可犯也蒙遜曰傉檀謂吾逺來疲弊必輕而無備及其壘壁未成可一鼓而滅進擊敗之乘勝至于姑臧夷夏降者乃數千戸傉檀懼請和之而歸又曰前燕將慕容垂討丁零翟釗于滑臺次于黎陽津釗於南岸拒守垂徙營就西津爲牛皮舡百餘艘載疑兵列仗泝流而上釗先以大衆備黎陽見垂向西津乃弃營西拒垂潜遣其桂林王慕容鎮率驍騎於黎陽津夜濟壁于河南釗聞而奔士衆疲渇走歸滑臺釗携妻子率數百騎北趣白鹿垂遣追擊盡擒其衆又曰後燕慕容盛據遼東其遼西太守李㓪隂引後魏軍上表請發兵以拒宼盛曰此必詐也召其使而詰之果驗盡滅其族遣將李旱率騎討之師次建安召旱旋師㓪聞其家𬒳誅也擁二千餘户以自固及聞旱中路而還謂有内變不復爲備留其子養守令又迎魏師于北平旱候知之襲尅令友遣禆將追㓪及于無支斬之盛謂羣臣曰前以追旱還者㓪新爲叛逆必忌官威一則鳩合同類刧害良善二則亡竄山澤未可卒平故非意而還以盈怠其志卒然掩之必尅之理也羣臣皆曰非所及也又曰前秦符堅䧟襄陽晉將桓沖攻之堅將慕容垂等率歩騎五萬救襄陽以石越爲前鋒次于沔水垂越夜命三軍人持火拒於樹枝光照數里沖懼退還又曰後趙石勒將石季龍太掠陳蔡間而去留將桃豹守譙城住西臺東晉將祖逖遣將韓潜等鎮東臺同一大城賊從南門出入放牧逖軍開東門相守四旬逖以布囊盛土如米狀使千餘人運上臺又令數人擔米僞爲疲極而息於道賊果逐之皆弃擔而走賊旣獲米謂逖士衆豐飽而胡戎飢乆益懼無復膽氣又曰後涼吕光遣將吕延伐西秦乞伏乾歸大敗之乾歸因大泣歎曰死中求生正在今日也乃縱反間稱乾歸東奔成紀吕延信之引師輕進延司馬耿雅諌曰乾歸雄勇過人權略難測破王廣尅楊定皆羸師以誘之雖蕞尓小國蕞左外切亦不可輕也困獸猶鬪况乾歸而可覩風自散乎今冝部陣而前歩騎相接徐俟諸軍大集可一舉滅之延不從戰敗死之又曰北涼沮渠蒙遜伐西涼李士業於酒泉先攻浩舋浩音閤舋音門虵盤於帳前蒙遜笑曰前一爲騰虵今盤在吾帳天意欲吾廻師燒攻具而還次于川巖聞李士業徴兵欲攻張掖蒙遜曰入吾計矣但恐聞吾迴軍不敢前也兵事尚權乃露布西境稱得浩舋將進軍黄谷士業聞而大恱進入都瀆澗蒙遜潜軍逆之敗士業于懷城遂進尅酒泉又曰南涼秃髮傉檀守姑臧後秦姚興遣將姚弼等至於城下傉檀驅牛羊於野弼衆採掠傉檀分擊大破之又曰前燕慕容儁巳尅幽薊至于兾州冉閔帥騎拒之與儁將慕容恪相遇於魏昌閔將董閏言於閔曰鮮卑乘勝勁不可當也請避之以溢其氣然後濟師以擊之可以捷也閔怒曰吾成師以出將平幽州斬慕容儁今遇恪而避之人將侮我矣閔威名素振燕衆咸憚之恪謂諸將曰閔勇而無謀一夫之敵耳雖有甲兵不足擊也呉今分爲軍三都掎角以待之閔性輕銳又以吾軍勢非敵必出萬死衝吾中軍吾今貫甲厚陣以俟其至諸軍但勵卒從傍湏其戰合夾而擊之必尅閔與恪遇十戰皆敗之恪乃以鐡鎻連馬簡善射鮮卑勇而無㓻者五千方陣而前閔乗駿馬左杖雙刀右執鈎㦸順風擊之斬鮮卑三百餘級俄而燕騎大至圍之數周閔衆寡不敵躍馬潰圍東走行二十餘里爲恪所擒太平御覽卷第二百八十六
