front:
  text: 太平御覽卷第二百一
  hash: sha256:97d75e6535d7df96098b9d5138fdaa1bd5bafb032ae590faed50382f811d5ed8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_201-1a}
body:
  text: 封建部四德行封討亂定䇿封奉使封尊賢繼絶封死王事子孫封異域降封雜恩澤封雜名號封宦者封遜讓誅貶德行封漢書在恩澤表漢書曰宣帝以劉德謹重封爲陽城侯又曰邴吉有隂德於孝宣帝微時帝即位衆莫知吉亦不言吉從大將軍長史轉遷御史大夫帝聞將封之㑹吉病甚將使人加紳而封之及其生存也太子太傅夏侯勝曰左右安得遺詔封三子事羣兒自相貴耳光聞之切讓王莽莽酖殺忽奉使封史記曰髙祖使劉敬使匈奴還報曰匈奴不可擊此必見短伏竒兵以爭利上怒械繫敬必徃而厄於白登七日乃得解還至廣武赦敬封千户號建信君漢書曰武帝以校尉張騫從大將軍擊匈奴知水草處軍得以無飢渴因前使絶國功封騫愽望侯又昭帝以平樂廐監傅介子誅樓蘭王封爲冝陽侯又元帝以甘延壽使西域郅支單于封義成侯蜀志曰陳震字孝起使呉賀孫權踐祚及到武昌權與震昇壇㰱血還封陽亭侯尊賢繼絶封尚書大傳曰武王勝殷箕子走之朝鮮因以封之禮記郊特牲曰天子存二代之後由尊賢不過二代又禮記曰武王克殷未及下車而封黄帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於𣏌封殷之後於宋史記曰武王克紂以紂子武庚禄父續殷祀使管蔡相之武王崩成王少管蔡疑周公乃與武庚作亂周公以王命誅之命微子開爲殷後奉其先祀國于宋至宋王偃立於是齊魏楚伐宋滅之而三分其地漢書自古受命及中興之君必興滅繼絶脩廢舉逸然後天下歸仁四方之政行髙祖撥亂日不暇給然猶脩祀六國求聘四皓過魏則壠無忌之墓適趙則封樂毅之後又曰武帝元狩中復詔御史以鄼二千四百戸封蕭何曾孫慶爲鄼侯布告天下令明知朕報蕭相國德厚也又曰武帝過洛陽下詔以三十里地封周後爲周子南君又曰封周公後公孫相如爲襃魯侯又曰元始四年靳翕夏侯嬰陳平張良周勃等一百一十八人紹爵復家東觀漢記曰建武二年封殷紹嘉公爲宋公周承休公爲衛公十四年封孔子後孔志爲襃成侯魏志曰文帝以議郎孔羡爲崇聖侯奉孔子祀晉中興書曰元帝封孔亭爲奉聖侯不食户邑又曰元帝詔封魏後曹勵爲陳留王吕氏春秋曰武王勝殷封帝堯之後於犁丘成湯之後於宋以奉桑林死王事子孫封功封子郈音后爲新都亭侯說苑曰邯鄲傳舎吏子李談說平原君令盡散家財以饗士攻秦國平原從其計勇敢三千人皆出從談赴秦軍秦軍爲却三十里亦㑹楚魏救至秦軍遂罷李談死封其父爲李侯異域降封漢書曰匈奴王徐盧等五人降漢景帝欲侯之以勸後亞夫曰彼背其王降陛下陛下侯之即何以責人臣不守節者乎上曰丞相議不可用乃悉封徐盧等爲列侯亞夫因謝病免相又曰武帝時匈奴王及太子相都尉以下趙信南越王兄建德等凡三十五人來降並封侯又曰宣帝時匈奴單于先賢樿音纏等二人降並封侯魏志曰鮮卑軻比能明帝時將其部衆降拜歸義侯雜恩澤封漢書曰髙后以大謁者張澤勸王諸吕封爲建陽侯又曰孝武以方術封欒大爲樂通侯又曰宣帝掖庭令張賀有舊恩封賀子彭祖爲都陽侯又曰王莽居攝安衆侯劉崇與張紹攻宛而敗詔從兄竦崇父嘉詣闕自歸竦因嘉作奏莽莽大恱太后下紹惟嘉父子兄弟雖有屬不敢阿私以千户封嘉爲師禮侯嘉子七人皆賜爵關內侯後又封竦爲淑德侯長安人爲語曰欲求封過張伯松力戰鬪不如巧爲奏東觀漢記曰馬防子鉅爲常從小侯上欲冠之夜拜爲黃門侍郎華嶠後漢書曰元和元年遂置鴻都學畫孔子及七十二弟子像其諸生皆勑州郡三公舉用辟召或出刺太守入爲尚書侍中乃有封侯賜爵者士君子皆恥與爲列魯國先賢志曰汶陽鮑氏起於鮑吉吉字利主桓帝𥘉爲蠡吾侯吉爲書師及桓帝立歴位至河南尹詔曰吉與朕有龍潜之舊其封西郷侯宗族以吉勢力至刺史二千石者五雜名號封漢書曰初髙祖微時嘗避事時與賔客過其丘嫂食應劭曰丘氏女也孟康曰西方謂上女壻立爲壻立空也上有嫂也晉灼曰丘大也大婦爲冢婦也嫂厭叔與客來佯爲羮盡鑠釡客以故去巳而視釡中有羮由是怨嫂及立齊岱等王而伯子獨不得侯太上皇以爲言髙祖曰某非敢忘封之也爲其母不長者七年十月封其子信爲頡羮侯又曰霍去病以校尉伐匈奴乃封爲冠軍侯又曰趙破奴以司馬再從驃騎將軍擊匈奴封爲從驃騎侯東觀漢記曰彭寵奴子密殺寵詣闕降封爲不義侯魏志曰初平二十年置名號侯爵十八級關中侯爵十七級皆金印紫綬又置關内外侯十六級銅印龜紐墨綬五大夫十五級銅印環紐亦墨綬皆不食租與舊列侯關内侯凡六等注曰臣松之以爲今之虚封盖自此始也搜神記曰張顥爲梁相天新雨後有鳥如山鵲飛翔墮地市人擿之隨地化爲石顥椎破之得一金印文曰忠孝侯顥藏之祕府後校書東觀奏言曰堯舜時朝有此官今落印冝可復置宦者封漢書曰髙后大謁者寺人張澤勸王諸吕封建陽侯東觀漢託曰孫程爲中黃門安帝崩初江亰等譛誣太子廢爲濟隂王居西鍾下徴北郷侯爲嗣程等十八人殺江亰閻顯等立濟隂王爲帝以功封程爲浮陽侯万户又封中黃門王康華容侯王國爲酈侯續漢書曰吕強爲中黃門靈帝例封宦者以強爲都郷侯強辭讓懇惻帝乃聽之數上書諌諍爲中常侍趙忠等所譛死晉起居注曰惠帝永平元年詔曰中常侍董猛固讓封邑其封爲武安侯猛前求餘户封三兄今皆封爲亭侯遜讓史記曰晉丈公賞從亡者未至隱者介之推推亦不言禄使人召之則亡遂求所在聞其入緜上山中於是丈公環緜山而封之以爲介推田號曰介山且記吾過以旌善人旌表之也又曰魯連說魏人新垣衍以帝秦之害秦軍爲郤平原君欲封魯連魯連辭謝者三曰吾與冨貴而屈於人寜貧賤而肆意戰國䇿曰趙王以武城封孟嘗君擇舎人以爲武城吏而進之曰鄙說借車者馳之借衣者𬒳之夫所借衣車者非親即兄弟也夫馳親友之車𬒳兄弟之衣文以爲不可今趙王不以文不肖封之以武城願大夫之徃也無伐樹木無廢室屋然趙王悟而知文也僅可使全而歸之漢書曰初武帝遺詔以討莽何羅功封金日磾爲秺侯日磾以帝少不受封又曰武帝詔曰匈奴逆天理亂人倫車騎將軍青度西河至髙闕輕銳之卒執訊獲醜驅馬牛羊百有餘萬全甲兵而還益封三千户以千户封青三子皆爲侯青固謝云皆諸校尉之力臣青子在繦緥中未有勤勞而受之封非臣待罪行間以勸士力戰之意又曰張延壽歴位九卿國在陳留别邑在魏郡租入歳千餘萬延壽自以身無功德何以乆堪數上書減户邑天子以爲有讓迺封平原并一國户口如故而租稅减半又曰張賀爲掖庭令収飬皇曾孫恩甚密皇曾孫即位是爲宣帝而賀已死欲封其冢爲恩德侯其子彭祖小與上同席研書欲封之先賜爵關内侯賀弟安丗深辭讓上曰吾自爲掖庭令不爲將軍也安丗乃不敢言東觀漢記曰竇融數辭爵位曰臣有一子質性頑鈍何况乃當傳以連城廣土享諸侯之國也因㑹見詔曰公欲讓職還土今相見不冝論也又曰永元元年以定䇿功増封鄧騭三千户讓不獲遂逃避使者上䟽自陳又曰劉愷字伯預以當襲父爵封居崇侯讓與弟憲有司奏之侍中賈逵上書陳之和帝詔愷致國於弟遁亡所守弥固乃拜爲郎又曰丁綝拜河南太守及封功臣上令各言所樂綝曰昔孫敖教其子受必求磽确之地綝德薄功微郷亭可矣上從之封爲定陵謝安郷食千户又曰帝欲封樊興置印綬於前固讓曰臣未有先登䧟陣之功一家數人並受爵土令天下觖望上嘉興之讓不奪其志又曰封朱祐爲髙侯邑七千三百户祐自陳功薄而國大願受南陽五百户足矣上不許也又曰翟歆字敬子父于以功封臨沮侯歆當嗣爵以母年老國逺上書辭讓詔許乃賜關内侯又曰丁綝卒子鴻上書讓國於弟盛旣葬乃挂纕結冢廬而逃又曰大將軍竇憲封舞陽侯食邑二万户憲固辭封詔曰大將軍憲前歳出征克滅北狄朝加封賞固辭不受舅氏舊典並蒙爵土其封憲冠軍侯邑二万户魏志曰田疇從太祖入盧龍塞太祖猶欲侯之疇素與夏侯悙善太祖語悙曰且徃以情喻之荅曰疇負議逃竄之人耳蒙恩令活巳爲多矣豈可賣盧龍塞以昜賞禄哉獨不愧於心乎太祖知不可屈乃拜爲議郎魏志曰王基抜壽春進封東武侯上䟽固辭歸功叅佐由是長吏司馬等七人皆侯又曰司馬宣王誅曹爽進蔣濟封都郷侯上䟽固辭不許孫盛曰蔣濟之辭邑可謂不負心矣蔡邕獨斷曰漢揔名諸侯王之子弟封者爲諸侯異姓者爲徹侯避武帝諱曰通侯法律家皆曰列侯功德優朝廷所異者賜位在三公下其次諸侯在九卿下其小國侯以肺腑宿公親公主子孫墳墓於京師者亦隨㑹見猥諸侯誅貶漢書曰髙帝子淮南厲王長孝文六年謀反徙蜀至雍死趙王如意趙王恢趙王友爲吕后所殺孝景子膠東王自殺孝武子燕王旦廣陵王胥並自殺齊王肥子濟北王興居濟南王辟光膠西王卭膠東王雄渠髙帝兄子呉王濞弟孫楚並反伏誅淮南王長子安衡山王賜江都王非子建並謀反誅楚王六丗孫延壽淮南王曾孫寛並謀反死武帝子孫侯者凡坐酎金等失侯及誅免者一百九人又曰陳平薨子何代立坐略人妻弃市國除始平曰我多隂謀道家所禁吾丗即廢亦已矣終不能復興又曰平陽侯曹參六丗孫宗坐䦨入宫掖門配城旦留侯張良子不疑坐謀殺楚内史贖爲城旦封絶其餘功臣子孫皆罪誅免輙復立嗣又曰髙后封諸吕五人爲侯八年九月並誅張澤一人免孝文元年軹侯薄昭自殺景帝魏其侯竇嬰有罪弃市武帝樂通侯欒大斬昭帝安陽侯上官桀桑樂侯安反誅宣帝平丘侯王遷自殺昌永侯田廣明自殺陽成侯田延年盗都内錢自殺元帝樂安匡衡免成陵侯淳于長大逆誅冝郷侯馮叅自殺啇陽侯薛宣坐不忠孝免哀帝丁明傅晏丁滿朱愽王嘉傅啇鄭崇董賢孫寵息夫躬並誅免平帝甄豐劉歆爲王莽所殺髙陵侯翟方進子盧坐弟舉兵爲王莽所殺東觀漢記曰光武子楚王英謀反自殺廣陵王荆詛自殺又曰成德侯朱鮪玄孫𣏌坐殺人國除昌成侯桓公孫述坐與楚謀反國除又曰魏成曾純坐訐訕國除山桑侯王常孫廣坐楚事國除利取侯畢㝷玄孫守坐姧人妻國除首卿侯叚普曾孫勝坐殺婢國除夕陽侯邢崇孫之爲賊所盗亡印綬國除廣平侯呉漢無後國除頴陽侯祭遵無子國除華嶠後漢書曰傳俊子昌徙封蕪湖侯建初中遭母憂固上書以國貧不之封乞錢五万爲關内侯肅宗貶爲關內侯竟不賜錢魏志曰曹洪性恡文帝少時求假不稱恨之後犯罪死太后謂郭后曰今曹洪犯死吾勑帝廢后后泣涕請乃得免官削爵土又曰彭城王據坐私遣人詣中尚方作禁物削户二千申王衮楚王彪並入朝犯京都禁削縣户又曰楚王彪坐王陵同謀延彪都昌遣御史案驗収治使自圖乃自殺又曰黃初三年臨淄侯植監國謁者灌均希旨奏植酒悖刦脅使者有司奏治罪帝以太后故貶爲安都侯太平御覽卷第二百一
