front:
  text: 太平御覽卷第七十
  hash: sha256:216c8f948e9e86d2a30d412f58922f9e3cab7663eeaadf2d070330c072f49e76
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_070-1a}
body:
  text: 地部三十五淵泉水淵說文曰淵囬水也尚書逸篇曰堯子丹朱不肖舜使居丹淵爲諸侯韓詩外傳曰東海之上有士曰菑丘訢以勇遊於天下過神淵飲馬馬果沉菑丘訢朝服㧞劒而入三日三夜殺三蛟一龍而出雷電隨而擊之十日十夜眇其左目大戴禮曰聖人有國則淵不湧傳曰鄭子産曰若堯殛鯀于羽山其神化爲黄熊以入于羽淵又曰鄭大水龍闘于時門之外洧淵時門鄭城門也水經注曰白鹿淵南北三百歩東西千餘歩深三丈餘其水冬清而夏濁淡然不流九州記曰樂壽縣有房淵方三百里石勒建安二年水忽變爲赤燕慕容㑺二年水忽生塩如印形其淵一日再長再減不失其度居近者時見龍狗之狀戯於旁葉落於淵者輙有群燕衘出盛弘之荆州記曰新野城北有柴山山上有清冷之淵耕父楊光之處又曰魚復縣有神淵北有白塩崖天旱火燃崖上推其灰燼下降淵中㝷則降雨西有龍淵清深不測傳云漢祖伐秦經途於此見淵中白壁赤柱狀若官府因名龍淵冝都山川記曰卿下村有淵淵有神龍毎旱百姓輙以菵草投淵上流魚死龍怒應時天雨齊地記曰瑯瑘臺上有神淵汚之則竭齋戒即出莊子曰舜以天子讓其友北人無擇無擇曰異哉欲以其辱汚漫我羞之自投於清冷之淵管子曰水出於地而不流者命之曰淵隋巢子曰夏桀德衰岱淵沸尸子曰龍淵有玉英司馬相如上林賦曰丹水更其南紫淵經其北泉水說文曰泉水源也易蒙卦曰山下出泉蒙君子以果行育德詩曰泉水衛女思歸毖彼泉水亦流于淇有懷于衛靡日不思又曰爰有寒泉在浚之下又曰泉源在左淇水在右又曰莫髙匪山莫浚匪泉又曰相彼泉水載清載濁又曰原隰旣平泉流旣清召伯有誠王心則寧又曰觱沸檻泉傳曰鄭伯寘姜氏于城潁而誓之曰不及黄泉無相見也旣而悔之潁考叔問公公語其故對曰君何患焉若闕地及泉隧而相見其誰曰不然公從之論語撰考䜟曰水名盗泉仲尼不漱應劭漢官儀曰酒泉城城下有金泉味如酒故曰酒泉郡三秦記曰酒泉郡中有井味如酒也晉安帝紀曰呉隱之字處黙性廉操桓玄欲救嶺南之弊以隱之爲刺史州界有一水父老云飲此水者廉士皆貪隱之始踐境先至水所酌而飲之因賦詩以言志清操逾厲沈約宋書曰王彭盱眙人少喪母元嘉𥘉父又亡家貧力弱營葬郷人助作塼湏得水天旱穿井數十丈無水一旦塼竈前忽生泉用之事畢復竭助者嗟歎隋書曰豆盧勣武帝嗣位拜渭州刺史甚有惠政華夷恱服德澤流行大有祥瑞鳥䑕山谷呼爲髙武隴其下渭水所出其山絶壁千㝷由来乏水諸羌苦之勣馬足所踐忽飛泉涌出有白鳥翔止㕔前乳子而後去又有狼見於襄武民爲之謡曰我有丹陽山出玉漿濟我民夷神鳥來翔百姓因號其泉爲玉漿泉唐書曰安金藏京兆長安人爲太常丞𥘉䘮母寓葬於都南闕口之北廬於墓側躬造石墳石塔晝夜不息原上舊無水忽有湧泉自出遁甲開山圖榮氏解曰女狄暮汲石紐山下泉水中得月精如鷄子愛而含之不覺而吞遂有娠十四月生夏禹水經注曰若耶溪東又有寒溪溪北有鄭公泉泉方數丈冬温夏凉漢太尉鄭公弘宿居潭側因以名泉又曰横流溪溪水甚小冬夏不乾俗亦爲貪泉飲者輙冒於財賄同於廣州石門貪泉矣廉介爲二千石則不飲之昔呉隱之挹而不辭豈謂能渝其眞乎蓋亦惡其名也又曰汲縣城北三十里有太公泉泉上又有太公廟廟側髙林秀木翹楚競茂相傳云太公之故居也又曰土糓縣故城西水源方百歩百泉俱出故謂之百脉水又曰霍太山上有岳廟廟甚有靈鳥雀不栖其林猛虎常守其廷又有靈泉供祭事鼓動則泉流聲絶則水竭也又曰長城背山面澤謂之白道城北出有髙坂謂之白道嶺㳂路唯土穴出泉挹之不窮古詩飲馬長城窟非虚言也風土記曰陽羡縣西南有泉常有紫黄色浮見水上岀金之地也益部耆舊傳曰姜詩母好食生魚飲江水詩至誠之感一朝湧泉在於門側流引江魚以結饍羞十洲記曰􅌡洲青玉膏山泉如酒味名之爲玉泉也玄中記曰東方有柴渚焉在齊國山山泉如井狀深不測至春時雹從井中出出常敗五糓人常以林木柴塞則不出故名爲柴渚焉魏土地記曰頌陽縣東八十里有駮牛山山下有百泉競發有一神牛駮身自山而下飲泉竭故山得其名魏記曰洛城東南六十里有涿鹿城城東一里有阪泉泉上有黄帝祠三輔舊事曰昔有犢失母哀鳴甚苦地爲發泉因名鳴犢泉今天旱祭之降雨在馮翊又曰姜泉在歧山縣皇甫謚帝王丗紀云炎帝神農氏母有喬氏女登爲少典妃遊華陽感神而生炎帝長於姜水因以氏焉酈元注水經云炎帝長於姜女即此水是焉義興記曰國山縣有金硎硎中沙石時灼灼如金者舊名金泉時獲真金也漢水記曰漢水有泉方貟數十歩夏常沸涌望見白氣衝天能差百病常有數百人飲浴之宣城記曰臨城縣南四十里有盖山登百許歩有舒姑泉昔有舒氏女與其父斫薪於泉處坐牽挽不動父還告家比還唯見清泉女母曰吾女本好音樂乃絃歌泉涌洄流見朱鯉一雙今作樂嬉戯泉故涌出周景式廬山記曰山西有龍泉精舍𥘉逺法師遣諸道人行卜地息此而渴法師因以杖掘地即泉出天旱法師令道人讀海龍王經泉中有物如虵而出角騰空中去須臾而雨括地圗記曰昆丘之上有赤泉飲之不老神宫有美泉飲之眠三百歲乃覺不死盛弘之荆州記曰城東北三百歩有孔子泉其水甘馨雖帝漿無以過也又曰冝都夷陸縣南勾將山下有三泉傳云夲無此泉居者苦於汲水有一女子孤貧忽有一乞人瘡痍竟體村人無不稱惡此女哀矜飴之乞人乃腰中出刀刺山下三處即飛泉涌出㝷陽記曰莫山有澗深丈餘朝夕輙有湧泉溢出如潮號爲潮泉外國圖曰貟丘有赤泉飲之不老郡國志曰蘭舟有梁泉昔梁暉者爲羌所圍無水暉以鞭扣地以青羊祈山神湧泉出而榆木成林又曰肅州延壽城有山出泉注地水肥如肉汁燃之極明與膏無異但不可食此方人謂石􅃮得水愈熾吕氏春秋曰太公釣於滋泉又曰水之美者崐崘之并髙泉之山有涌泉焉淮南子曰正土之氣仰乎埃天正士中也其氣上水埃天中夾也埃天五百歳生蚨蚨石名也中夾數五天故五歲而一化蚨五百歲生黄鴻黄􅐓英氷銀也黄鴻五百歲生黄金黄鴻英五百歲化而爲黄金也黄金千歲生黄龍黄金之精爲黄龍也黄龍入藏生黄泉黄泉黄龍之精汋也黄泉之埃上爲黄雲其氣上至天也隂陽相薄爲雷激陽爲電言黄氣之相激薄也上者就下其氣傷復於天下也流水就通而合乎黄海言水從天下則通流入於海也偏土之氣仰乎青天偏土方土也青天八百歳生青増青増青石也東方數八八故八百歲而一化青増八百歲生青澒青鴻八百歲生青金青金千歳生青龍青龍入藏生青泉青泉之埃爲青雲隂陽相薄爲雷激陽爲電上者就下流水就通而合乎青海壯士之氣仰於赤天壯土南方土也赤天七百歲生赤丹赤丹沙也南方數七故七百歲而一化也赤丹七百歲生赤金丹沙不化爲沙而可以爲金故氣赤􅐓也赤金千歳生赤龍赤龍入藏生赤泉赤泉之埃上爲赤雲隂陽相薄爲雷激陽爲電上者就下流水就通而合乎赤海弱土之氣仰乎白天弱土西方土也白天九百歲生白礜白礜礜石也西方数九故九百歲一化也白礜九百歳生白澒白澒九百歳生白金白金千歳生白龍白龍入藏生白泉白泉之埃上爲白雲隂陽相薄爲雷激陽爲電上者就下流水就通而合乎白海牝土之氣仰乎玄天牝土北方土也玄天六百歲生玄石也北方數六故六百歲而一化也玄砥六百歲生玄澒玄澒六百歲生玄金玄金千歲生玄龍玄龍入藏生玄泉玄泉之埃上爲玄雲隂陽相薄爲雷激陽爲電上者就下流水就通而合乎玄海又曰崑崙四水者帝之神泉以和百藥以潤萬物也傅咸神泉賦曰余所居庭庭前有湧泉在夏則冷渉冬而温毎夏遊之不知歲之有暑枹朴子曰崑崙及蓬萊其上鳥獸飲玉井泉皆長生不死也李華雲母泉詩序曰洞庭湖西玄石山俗謂之墨山山南有佛寺寺倚松嶺松嶺下有雲母泉泉出石引流分渠周遍庭宇發源如乳源末派如淳漿烹茶灌園漱濯皆用之大浸不盈大旱不耗自墨山西北至石門東南至東陵廣二十里盡生雲母墻階道路光彩如列星井泉溪澗色皆純白郷人皆壽考無癖痼疥搔之疾華深樂之太平御覽卷第七十
