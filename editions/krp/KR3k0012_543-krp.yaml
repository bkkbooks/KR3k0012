front:
  text: 太平御覽卷第五百四十三
  hash: sha256:7e53a1b7d0ea029c642f8114dc85c6e18d8facff7fd0ad2da7812dbc4fcc4e06
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_543-1a}
body:
  text: 禮儀部二十二揖鐟賀揖周禮夏官曰司士擯詔王出楫公卿大夫以下朝者孤卿特揖大夫以其等旅揖士旁三揖王還揖門左揖門右特揖一一楫之旅衆也大夫爵同者衆揖之公及孤卿大夫始入門右皆北靣東上王揖之乃就位三揖者士有上中下王揖之皆逡巡趍復位又秋官曰司儀掌九儀之賔客擯相之禮以詔儀容辭令揖讓之節出接賔曰擯入賛禮曰相以詔者以禮告王又秋官曰司議詔王儀南郷見諸侯土揖庻姓時揖異姓天揖同姓謂王旣祀方明諸侯上介皆奉其君之旂置于宫乃詔王升壇諸侯皆就其旂而立王揖之者定其位也庻姓無親者也土揖推手小下之也異姓昬姻舉之禮記曲禮上曰揖人必違其位鄭玄注曰禮以變爲敬也又仲尼燕居曰兩君相見揖譲而入門入門而懸興揖譲而升堂升堂而樂闋又表記曰事君難進而易退則位有序易進而難退則亂也故君子三揖而進一辭而退以逺亂也榖梁傳昭公曰夾谷之㑹孔子相焉兩君就壇兩相相揖齊人鼓噪而起欲執魯君孔子歷階而上不盡一等而視歸乎齊侯左傳襄公曰齊慶封圍髙唐弗克夙沙衛以叛故圍之冬十一月齊侯圍之見衛在城上號之乃下衛下與齊侯語問守備焉以無備告揖之乃登齊侯以衛告誠揖而禮之欲生之也衛志於戰死故不順齊侯之揖而還登誠也又襄公曰衛侯入書曰復歸國納之也大夫逆於竟者執其手而與之言道逆者自車揖之逆於門者頷之而巳頷揺其頭言衍驕心易生又昭三曰王揖而入饋不食窮不寐數日又哀上曰衛侯遊于郊子南僕子南靈公子郢也僕御也公曰余無子將妾蒯聵奔無太子不對他日又謂之對曰郢不足以辱社稷君其改圖君夫人在堂三揖在下三揖卿大夫士論語曰君子無所争必也射乎揖讓而升下而飲其爭也君子又述而曰陳司敗問昭公知禮乎孔子對曰知禮孔子退揖巫馬期而進之曰吾聞君子不黨君子亦黨乎君娶於呉爲同姓謂之呉孟子君而知禮孰不知禮漢書曰沛公至髙陽見酈食其入即長揖不拜曰足下必欲聚徒合兵誅無道秦不冝倨見長者史記曰郅都遷爲中尉丞相條侯至貴倨也而都揖丞相漢書曰田蚡爲丞相中二千石皆拜謁及黯獨揖之又曰萬章爲京兆尹門下督從尹至殿中諸侯貴人爭欲揖章莫與尹言者後漢書曰崔駰上四廵頌肅宗雅愛文章自見駰頌後帝嗟歎之謂侍中竇憲曰卿寜知崔駰乎對曰班固數爲臣說之然未見也帝曰公愛班固而忽崔駰此葉公之好龍也試請見之駰由此候憲憲屣履迎門笑謂駰曰亭伯吾受詔交公公何得薄我遂揖入爲上客後漢袁紹傳曰董卓議欲廢立謂紹曰天下之主冝得賢明毎念主上令憤毒毒恨也董侯似可今當立之紹曰今上冨於春秋未有不善宣於天下若公違禮任情廢嫡立庶恐衆議未安卓案劒叱紹曰竪子敢然天下之事豈不在我我欲爲之誰敢不從紹跪對曰此國之大事請出與太傅議之卓復言劉氏種不足復遺紹勃然曰天下健者豈惟董公横刀長揖徑出懸節於上東門而奔冀州漢官典職曰尚書丞郎見尚書執板對揖稱曰明公尚書郎見左右丞對揖無敬稱曰左右君晉陽秋曰晉文帝進號爲王太尉王祥獨長揖王謂祥曰今日然後知君見顧之重也後魏書曰宗愛之任勢也威振四海甞召百司於都㘴王公巳下望庭畢拜髙允獨昇階由此觀之汲長孺可卧見衛青何杭禮之有向之所謂風節者得不謂此乎宋書禮志曰漢丗朝臣見三公並拜丞郎見八座皆持板揖事在漢儀南史曰袁憲陳武帝作相除司徒户曹𥘉謁遂抗禮長揖中書令王勵謂憲曰卿何矯衆不拜録公憲曰於理不應致拜衛尉趙知禮曰袁生舉止詳中故有陳汝之風白虎通曰朝禮奈何君出居内門之外天子揖諸侯持揖卿大夫膝下至地天子特揖三公靣揖卿略揖大夫士所以不拜何爲其屈尊者說文曰揖讓也一曰手着胷曰揖風土記曰越俗定交有禮皆於大樹下封壇祭以白犬呪曰卿雖乗車我載笠後日相逢下車揖文士傳曰趙壹郡舉計吏至京輦是時袁陽爲司徒宿間其名時延請之壹入閣揖而不拜陽問曰甞聞下郡討吏見漢三公不爲禮者乎壹曰昔酈食其髙陽白衣也而揖髙祖今壹關西男子其揖漢三公不亦可乎陽壯其言接之甚厚列子曰范氏門徒路遇乞兒馬醫弗敢辱也必下車而揖之尹文子曰越王勾踐謀報呉欲人之勇路逢怒鼃下車而揖之袁淮正論曰太祖破吕布袁渙在軍中陳羣父子見上拜唯袁渙獨髙揖不爲禮上嚴敬之鐟音簮摯虞決略録要注曰小㑹殿就席皆鐟頭而後坐鐟頭伏地也欲起亦先鐟頭賀周禮春官上宗伯曰以賀慶之禮親異姓之國鄭玄注曰異姓王婚姻甥舅也禮記玉藻曰有慶非君賜不賀鄭玄注曰唯君賜爲榮左傳僖下曰楚子將圍宋使子文治兵於暌終朝而畢不戮一人子王復治兵於蔿終日而畢鞭七人貫三人耳國老皆賀子文子文飲之酒蔿賈尚㓜後至不賀子文問之對曰不知所賀子之傳政於子玉曰以靖國也靖諸内而敗諸外所獲㡬何子玉之敗子之舉也舉以敗國將何賀焉又昭三曰叔弓如晉賀虒祁也賀宫也游吉相鄭伯以如晉亦賀虒祁也史趙見子大叔曰甚哉其相蒙也蒙欺也可弔也而又賀之子大叔曰若何弔也其非唯我賀將天下實賀言諸侯長晉非獨鄭國語曰晉簡子問於杜馳兹曰東方之士孰爲愈杜馳兹東方人爲晉大夫者蓋呉人也愈賢也杜馳兹拜曰敢賀簡子曰未應吾問何賀乎對曰臣聞之國家之將興也其君自以爲不足其亡也若有餘今主晉國之政而問及小人求乎賢人吾是以賀史記曰單父人吕公善沛令避讎從之客因家沛中豪傑吏令聞有客皆徃賀蕭何爲主吏令諸吏曰不滿千錢坐堂下髙祖爲亭長素易諸吏乃徃爲謁曰賀錢千萬實不挂一錢漢書曰田肯賀上曰甚善陛下得韓信又治秦中如淳曰時山東人謂關中爲秦中秦形勝之國也帶河阻山懸隔千里持㦸百萬秦得百二焉地勢便利其次以下兵於諸侯譬猶髙屋之上建瓴水也夫齊東有瑯瑘即墨之饒南有太山之固西有濁河之限北有渤海之利地方二千里持㦸百萬懸隔千里之外齊得十二焉此東西秦也非親子弟莫可使王齊者也上曰善賜金五百斤又曰盧綰與髙祖同里綰親與髙祖親太上皇相愛及生男髙祖與綰同日生里中持羊酒賀兩家及髙祖盧綰壯俱學書又相愛也里中嘉兩家及家親相愛也生子同日壯又相愛復賀兩家羊酒後漢書曰光武謂馮異曰我昨夜夢乗赤龍上天覺悟心中動悸異因下席再拜賀曰此天命發於精神心中動悸大三愼重之性也異遂與諸將定議上尊號東觀漢記曰上傳聞朱鮪破河内有項寇恂檄至上大喜曰吾知寇子翼可任也諸將軍賀因上尊號謝承後漢書曰鄭弘爲臨淮郡兩鹿隨車主簿拜賀曰聞三公轓盡作鹿明府必爲宰相弘果爲太尉漢雜事白冬至陽氣起君道長故賀夏至隂氣生君道衰故不賀魏志曰王粲爲丞相掾太祖置酒漢濵粲奉觴賀曰明公定冀州之日下車即其甲卒収其豪傑而用之以横行天下及平江漢司其賢俊而置之列位使海内迴心望風願治文武並用英雄畢力北三玉之舉呉志曰顧雍迎母於呉旣至孫䇿臨賀之親拜其母於庭公卿大臣畢㑹後太子又徃慶焉王隱晉書曰㤗始五年龍見武庫井中車駕親幸有喜色内外議咸云當賀劉毅獨表舊典無賀龍之禮詔報政德未脩慶賀之事冝詳依典義晉中興書曰武帝時甘露降公卿奏賀詔曰三代盛隆猶自戒勿休况自頃懸象告變盗賊充斥百僚司牧不能存職匪解使道有寄雖麟鳯至慶有餘矣此道未弘雖四靈在郊吾猶懼然何甘露之足賀其停之晉書禮志曰永和二年納后議賀不王彪之議云㛰禮不樂不賀禮之明文傳稱子罕如晉賀夫人旣無經文又禮云娶婦三日不舉樂明三日之後自當樂至於不賀無三日之斷恐三日之後故無應賀之禮㑹稽典録曰盛憲字孝章嘗出逢一童容皃非常憲恠而問之是魯國孔融融時年十餘歲憲下車執融手載以歸舎與融談知其不凡便結爲兄弟因昇堂見親憲自爲壽以賀母母曰何賀憲曰母昔有憲憲今有弟家國所頼以是賀耳融果以英才煒艶冠丗晏子曰景公探爵鷇弱故返之晏子逡巡再拜賀曰君有聖人之道矣君探爵鷇鷇弱故反之此聖人之道也韓子曰晉孟獻伯拜上卿叔向徃賀門有御馬不食禾向曰子無二輿馬不食禾何也獻曰吾觀國人尚有饑色是以不秣馬班白者多以徒行故不二輿向曰吾始賀子拜卿今賀子之儉也吕氏春秋曰人主得地百里則喜四境皆賀得士則不喜不知相賀不通乎輕重新序曰魏文侯出遊見路人反裘而負芻文侯曰何爲交反裘而負芻對曰臣愛其毛文侯曰若不知其裏盡而毛無所恃耶明年東陽上計錢布十倍大夫畢賀文侯曰此非所以賀我也譬無異夫路人反裘而負芻也將愛其毛不知愛其裏也無所恃也今田地不加廣士民不加衆而錢十倍必取之士大夫也吾聞之下不安者上不可居也此非所以賀我也劉向與子歆書曰董生有云弔者在門賀者在閭言憂則恐懼敬事則有善功又曰賀者在門弔者在閭言受福則驕奢驕奢則禍至太平御覽卷第五百四十三
