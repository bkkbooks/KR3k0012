front:
  text: 太平御覽卷第九百八十四藥部一
  hash: sha256:f59422fd2bb8f6d7b081bfeb9a009a686756c55a85702f39e8fbefdd4d9fc287
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_984-1a}
body:
  text: 藥歸藏經曰昔常娥以不死之藥奔月易曰無妄之疾勿藥有喜象曰無妄之藥不可試也書曰若藥弗瞑眩厥疾弗瘳周禮曰醫師掌聚藥供醫事疾醫以五藥飬病凡藥以酸飬骨以辛飬筯以鹹飬脉以苦飬氣以甘養肉以滑飬竅鄭玄注曰毒藥之辛苦者也五藥草木䖝石榖禮記曰君有疾飲藥臣先甞之親有疾飲藥子先甞之甞者度所堪也醫不三丗不服其藥又曰季春餧獸之藥無出九門爲鳥獸方孚乳傷之爲逆天時天子九門者路門應門雉門畢門庫門臯門國門近郊門逺郊門孟夏之月聚蓄百藥蕃蕪之時毒氣盛也左傳曰臧孫曰季孫之愛我也疾疹也孟孫之惡我也藥石也常志相違戾猶藥石之療疾也美疹不如惡石孟孫死吾亡無日矣又曰許悼公疾飲太子止之藥卒太子奔晉書曰殺其君君子曰盡心力以事君舎藥物可也藥物有毒當由醫非凢人所知譏止不舎藥物所以加殺君之名論語曰康子饋藥拜而受之曰丘未逹不敢甞饋遺史記曰長桑君與扁鵲藥服之三十日見人五藏漢書曰灌夫擊吴身中大創十餘適有萬金良藥故得不死又曰王嘉爲丞相數上封事言不冝封董賢上怒有詔假謁者節召丞相詣廷尉詔獄使者旣到府掾史涕泣共和藥進嘉嘉引藥盃以擊地謂官屬曰丞相幸得備位三公奉職有罪當伏刑都市以示萬衆丞相豈兒女耶何爲咀藥而死東觀漢記曰上甞與朱祐共買蜜合藥上追念之即賜祐白蜜一石問何如長安時共買蜜乎又曰鄧訓爲護烏桓校尉吏士常大病瘧轉易至數十人訓身煑湯藥咸得平愈其無妻者爲適配偶又曰王閎者王莽叔父平阿侯譚子也王莾簒位潜忌閎乃出爲東郡太守閎懼誅常繫藥手内莾敗漢兵𧺫閎獨完全華嶠後漢書曰張楷字公超家貧無以爲業常乗驢車至縣賣藥九州春秋曰青州刺史焦和多作䧟水丸沉河望㓂不得渡吴書曰合肥之役凌統身𬒳六七瘡有卓氏良藥故得不死魏志曰太祖性嚴掾屬公事徃徃杖之何夔常畜毒藥誓死無辱是以終不見及晉書曰餘杭隱士郭文字文舉王導聞召之永昌中大疫父病亦殆導遺藥文曰命在天不在藥也王隱晉書曰李㳙爲尚書令家至貧兒病無錢買藥上賜錢十萬李㳙一作李鳯又曰程咸字延休其母夢白頭公授藥曰服此當得貴子後生咸至侍中又曰符生常使太醫令程延合安胎藥問人參好惡并藥分多少延曰雖小小不具自可堪用生以爲譏已遂斬之又曰陸抗與羊祜推喬扎之好抗甞遺酒祜飲之不疑抗有疾祜饋之藥杭亦推心服之宋書曰髙祖微時伐狄新洲見大虵長數丈射傷之明日洲中聞杵臼聲徃視之見童子數人皆青衣於榛中禱藥問其故荅曰我王爲劉寄奴所射合藥傅之帝曰神何不殺之童子曰寄奴王者不死不可殺帝叱之皆散仍収藥而反又客經下邳逆旅㑹一沙門謂帝曰江表當亂能安之者其在君乎帝先患手瘡經年不愈沙門有黄藥因留與帝旣而忽亡帝以黄散傳瘡一傅而愈寳其餘及所得童子藥毎遇金瘡傅之並愈齊書曰隨郡王子隆年二十一而體過充壯常使徐嗣伯合藘茹丸服以自銷損又曰䂊章王嶷薨後見形於沈文季曰我未應死皇太子加膏中十一種藥使我癰不差湯中復加藥一種使利不断吾已訴先帝先帝許還東邸當判此事因匈中出青𥿄文書示文季曰與卿少舊因卿呈主上俄失所在文季袐而不傳甚懼此事少時太子薨矣魏書曰邢巒爲侍郞甚見親遇髙祖因行藥園至司空府南見巒宅遣使謂巒曰朝行藥園至此見卿第宅乃佳東望徳舘情有依然又曰天竺烏長國婆羅門爲上族解天文人有争訟服之藥曲者發狂直者無恙隋書曰隋大舉伐陳王頒力戰𬒳傷恐不堪復闘悲感嗚咽夜中睡夢有人授藥比寤而瘡不痛時人以爲忠感又曰楊素寢疾帝毎令醫侯候賜以上藥然蜜問醫人恒恐不死素又自知名位已極不肯服藥亦不將慎每語弟約曰我豈湏臾活耶唐書曰太宗幸襄城宫登子邏坂見暍者僵於路駐馬命左右取藥飲之乃蘇又曰天竺方士郍羅邇婆娑寐自言壽二百歳云有長生之術太宗信之深加禮敬館之金飈門内造延年之藥令崔敦禮監主之發使天下採諸竒藥異石不可稱數後竟不就又曰元和中山人柳泌言靈藥可得上信之乃以爲台州刺史賜紫令採靈藥又曰桞公綽有道士獻藥試之有驗問所從來曰合此藥於薊門時朱克融方叛公綽遽謂曰惜哉至藥來於賊臣之境雖驗何益乃沈之于江而逐道士莊子曰宋人有善爲不龜手之藥者龜手裂若龜文丗丗以洴音萍澼音僻絖音曠爲事洴澼漂也統絮也冬漂絮則手拘能爲藥以自治客聞之請買其方百金以說吴王說可以戰吴王使之將冬與越人水戰大敗越人列地而封之能不龜手一也或以封或不免於洴澼絖則所用之異也唐子曰仙人韓終即韓馮之兄爲宋王採藥王不肯服之終因服之遂得仙淮南子曰羿請不死之藥於西王母姮娥竊而奔月姮娥羿妻也羿從西母請不死之藥於西王母未及服之姮娥盗服得仙奔入月中爲月精又曰今夫地黄主屬骨而甘草食肉之藥也以其屬骨而責其生肉以其生肉而責其屬骨是王孫綽之欲倍偏枯之藥而欲以生殊死之人亦謂失論矣王孫綽魯人也又曰崑崙墟旁有九井玉横維其西北之隅横猶光也撗或作彭盛不死藥噐也四水者帝之神泉以和百藥以潤萬民抱朴子曰神農經曰上藥令人身安命延昇天神仙遨遊上下役使萬靈體生毛羽行厨立至又曰五芝及餌丹砂玉札曽青雄黄雲母太一禹餘粮各可單服之皆令人飛行長生又曰中藥飬性不藥除病能令毒蟲不加猛獸不死惡氣不行衆祅辟屏孝經援神契曰椒薑禦濕菖蒲益聦巨勝延年威喜辟兵此皆上聖之至言方術之實録也又曰仙藥之上者丹砂次則黄金次則白銀次則諸芝次則五玉次則五雲次則明珠次則太一禹餘粮次則石中黄子次則石桂英次則石腦次則石流丹次則石􅏁次則曽青次則松栢脂茯苓地黄麦門冬术巨勝重樓黄連石韋柠石家紫一名托盧是也或名仙人杖或名西王母杖或名天精或名却老或名地骨或名枸𣏌也戦國䇿曰有獻不死之藥於荆王者謁者操以入中射之士問曰可食乎曰可因奪而食之王怒使人殺中射之士士曰臣問謁者謁者曰可食臣故食之是臣無罪罪在謁者也且客獻不死之藥臣食之而王殺臣是死藥也王乃殺無罪之臣而明人之欺王王乃不殺說苑曰湯曰藥食先甞於卑然後至於貴藥食甞乎卑然後至乎貴教也藥言獻於貴然後聞於卑道也又曰孔子曰良藥苦於口利於病忠言逆於耳利於行吕氏春秋曰魯有公孫綽者告人曰我能治偏枯今吾倍爲偏枯之藥則可以起死人矣物固有以爲小不可以爲大可以爲半而不可以爲全者矣又曰良醫醫病病万變藥亦万變病變而藥不變嚮之壽民今爲殤子矣又曰若用藥者得良藥則活人得惡藥則殺人義兵之爲天下良藥也亦大矣論衡曰大王亶父睹王季之可立故易名曰歴歴者適也大伯覺悟採藥以避王季山海經曰大荒之中有黄木赤枝青葉群帝取藥言樹花實皆爲藥也又曰大荒中有山名豐阻玉門日月所入有靈山巫咸巫昉巫即巫盼巫彭巫姑巫真巫祀巫謝巫羅十巫從此升降百藥爰在酈善長注水經曰茷山甚嵒峻重疊灌栢齊隂攅柯翠峙泉石轉深盖仙居之宿所是以丗人目巖爲擣藥巖名此水爲擣藥水漢武内傳曰王母謂武帝曰太上之藥乃有玄光黎角風實雲子帝園王族昌城王蘂夜河天骨崆峒靈瓜四刧一實寘陵驎膽仰掇扶桑之丹椹俯採長河之文藻紫虬童子九色鳯腦太真虹芝天漢臣草南宫大碧西郷扶老三梁龍華生子大道有得食之後天而老此太上之所服非中山之所寳也又曰武帝崩遺詔以雜道書四十卷置棺中到延康二年河東工曹李及入上黨抱犢山採藥於巖室中得此書盛以金箱其書後題臣姓名記日月是武帝時物也河東太守張純以箱及書奏宣帝宣帝示武帝時左右侍臣有典書中郎見書流涕曰此是帝崩時殯殮物也東方朔別傳曰孝武皇帝好方士敬鬼神使人求神僊不死之藥甚至𥘉無所得天下方士四靣鋒至不可勝言東方朔睹方士虚語以求尊顯即云上天欲以喻之其辭曰陛下所使取神藥者皆天地之間藥也不能使人不死不獨天上藥能使人不死耳上曰然天何可上也朔對曰臣能上天上知其謾詫陁後二音極其語即使朔上天取不死之藥朔旣辭去出殿門復還曰今臣上天似謾詫者願得一人爲信驗上即遣方士與朔俱徃期三十日而反朔等旣辭而行日日過諸侯傳飲徃徃留十餘日期又且盡無上天意方士謂之曰期且盡日日飲酒爲奈何朔曰鬼神之事難豫言當有神來迎我者於是方士晝卧良乆朔遽覺之曰呼君極乆不應我今者屬從天上來方士大驚還具以聞上以爲面欺詔下朔獄朔啼對曰朔湏幾死者再上曰何也朔對曰天公問臣下方人何衣臣朔曰衣䖝䖝何若臣朔曰䖝喙髯髯類馬邠邠類虎天公大怒以臣爲謾言繫臣使下問還報有之名蚕天公乃出臣今陛下苟以臣爲詐願使人上問之上大驚曰善齊人多詐欲以喻我止方士也罷諸方士弗復用也由此朔日以親近列僊傳曰樂子長者齊人也少好道真到霍林山遭僊人受服巨勝赤松散方僊人告之曰虵服此藥化爲龍人服此藥老翁成童能昇雲上下改易形容崇氣益精起死飬生子能服之可以度丗子長服之年百八十色如少女妻子九人皆服此藥老者還少少者不復老又曰燕王遣韓終採藥王先使韓終服之面如金色又曰安期生賣藥海邊時人以爲千歳公又曰瑕丘仲賣藥於寗後地動舎壞仲死人取屍弃水収其藥賣之仲𬒳裏誚之後爲失余使者又曰崔文子太山人賣藥都市後有疫死者萬計文子擁朱幡持黄散循問民服其散愈者萬計後在蜀賣黄散赤丸丗故寳之又曰負局先生者語似燕代間人也負磨鏡局循吴帝市中磨一鏡一錢因磨輙問主得無人疾苦者有輙出紫丸藥以與之得莫不愈後上吴山絶崖頭丗丗懸藥與下人曰吾欲還蓬莱山與汝曹神水崖頭一旦有水白色從石間來下服之病多愈髙士傳曰韓康字伯休京兆覇陵人採藥名山賣於長安市口不二價三十餘年時有女子從康買藥康價不移女子怒曰公是韓伯休郍乃不二價也康歎曰我本避名今女子皆知有我何用藥爲乃遯入覇陵山中魯女生別傳曰封君逹隴西人也少好道𥘉服黃連丸五十餘年乃入鳥䑕山又於山中服水銀百餘年還鄊里年如二十者常乗青牛故號爲青牛道士桂陽先賢畫讃曰蘇眈甞除門庭有衆賔来耽告母曰人招耽去已種藥着後園梅樹下可治百病一葉愈一人賣此藥過足供飬便隨賔去母走牽之四體如醉足不能舉邴原別傳曰魏太子爲五官中郎将原爲長史太子讌㑹衆賔百數十人太子建議曰君父各有篤疾有藥一丸可救一人當救君耶父耶衆人紛然或君或父時原在坐不與此論太子諮之於原原悖然對曰父太子亦不復難曹毗杜蘭香傳曰神女蘭香降張碩碩問壽如何香曰消磨自可愈疾淫祀無益香以藥消磨王子年拾遺録曰燕昭王坐祇明之室晝而假寐忽夣西方有白雲蓊蔚而起俄而闇於庭間有人衣服皆毛羽駕蒼螭之車從雲中而出直詣王所王夣中與語問以上僊之術羽人曰大王精智未開欲求恒生不可得也王請受絶慾之教羽人指畫王心應手而裂王乃驚悟因患心疾乆之乃昇於泉照之館復見前所夢人於前曰本欲易王之心乃出方寸緑囊囊中有續脉名丸哺四精散其細若灰以手摩王之臆俄而旣愈王因請其方曰其用物也有九明神芝煎以蒼鷹之血黒河鱗膽煑以琨璵之脂貯以玉缶緘以金䋲封以玉印王得服之後天而死若溺於滛嗜於欲求者祇苦心焉語畢化爲青鳬入天際王求合藥終不能成黒河北極也其水濃黒不流上有濃雲生焉有黑鯤千尺如鯨常飛遊於南海博物志曰夫性之所以和病之所以愈是當其藥應其病則生違其藥失其應則死本草經曰太一子曰凡藥上者飬命中藥飬性下藥飬病神農乃作赭鞭鈎尺制切從六隂陽與太一升五岳四瀆土地所生草石骨肉心皮毛羽万千類皆鞭問之得其所能主治當其五味百七十餘毒異苑曰魏武北征踰頓升嶺眺矚見一崗不生百草王粲曰如是古冢此人在丗服生礜石死而石上熱蒸岀外故卉木燋滅即令鑿之果得大墓有礜石滿塋仲宣愽識強記皆類此也一說粲在荆州從劉表登鄣山見此異任昉述異記曰漢丗古諺云雖有神藥不如少年雖有珠玉不如金錢太原神釡崗中有神農甞藥之鼎在焉成陽山中有神農鞭藥處一名神農原一名藥草山山中有紫陽觀丗傳神農於此辨百藥也飬生略要曰神農經曰五味飬精神強魂魄五石飬髓肌肉肥澤諸藥其味酸者𥙷肝飬心除腎病其味苦者𥙷心飬痺除肝病其味甘者𥙷脾飬肺除心病其味辛者𥙷肺飬腎除脾病其味鹹者𥙷腎飬肺除肝病故五味應五行四體應四時夫人性生於四時然後命於五行以一𥙷身不死命神以母飬子長生延年以子守母除病䆒年嶺表録異曰廣之屬郡及郷里之間多蓄蟲彼之人悉能驗之以草藥治之十得其七八藥則金釵服形如石斛古漏子女票愄罟食之即士人肝藤濃汁煎喫陳家白藥子一名吉利本梧州陳氏有此藥善解蟲每有中者即求之前後救人多矣遂以爲名今封康州有得其種者廣府毎歳常爲土貢焉諸解毒藥功力皆不及陳家白藥王彪之閩中賦曰藥草則青珠黄連拳栢决明蓯蓉鹿茸漏蘆松榮痊痾則年永練質則翰生謝靈運山居賦曰本草所載山澤不一雷桐是別和緩是悉三枝六根五華九實樂府歌詩曰仙人騎白鹿髮短耳何長道我奉上藥覽之獲無疆來到主人門奉藥一玉箱主人服此藥身體日康強髮白復還黒延年壽命長魏文帝詩曰西山何如髙髙髙殊無極上有兩仙童不飲亦不食與我一丸藥光耀有五色服藥四五日身體生羽翼應劭表曰臣劭言郡舊因計吏獻藥闕而不修慙悸交集無辭自文今道少通謹遣五官孫艾貢茯苓十斤紫芝六枝鹿茸五斤五味一升計吏發行輙復表貢太平御覽卷第九百八十四
