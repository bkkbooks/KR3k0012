body:
  text: 咎徴部三風㤗風黒風赤風雷冬雷霹靂無雲而雷風尚書洪範咎徴曰蒙恒風若君行蒙暗則常風順之也禮記月令曰孟春行夏令飄風暴雨揔至季秋行春令則煖風來至京房易傳曰后專拜厥風疾而樹不揺不循道厥風不摇草京房別對災異曰廻風起何風者天之號令也當直而正普而不偏佞人衆君迷惑則迴風起不救則致逆風起其救也用公直黜邪枉此災消矣春秋潜潭巴曰疾風㧞木䜛臣恣忠臣辱史記曰殷紂末年大風飄牛馬壊屋拔樹飛颺數十里周滅之又曰秦始皇二十八年渡淮至衡山浮江至湘遇大風博士云堯女舜妻葬於此始皇怒使刑人三千人伐湘山樹明年東遊至博浪沙中爲盗所驚乃令天下大索焉又曰項羽背約都彭城漢祖伐之圍漢三重大風從西北起折木發屋楚軍大亂漢書曰吕后崩後吕産執北軍朱虚侯劉章入宫衛帝見産廷中遂擊産走大風起從官莫敢鬪章逐産殺之又曰昭帝時燕王旦都葪大風拔宫樹十六吹壞城樓王反伏誅又曰濟北王興居反始舉兵太風從東吹其旌旗飛上墮城西井中馬皆悲鳴不進李廓切諌王不聽俄而兵敗自殺又曰平帝元始四年冬大風吹長安城門屋瓦盡又曰王莽天鳯年大風抜樹飛北闕城門屋瓦縁邊大飢人相食又曰地皇四年大風毀王路其年司徒王㝷司空王邑守昆陽光武起兵南陽至昆陽攻之大風雷屋瓦皆飛雨下如注滍川盛溢㝷邑乗死人而渡王㝷見殺軍人皆散走王邑還長安莽敗俱殺之後漢書曰安帝時京師大風拔南郊梓樹九十六後海賊張伯路略九郡魏畧曰正始元年啇風大起數十日發屋拔樹動太極殿東閤正大㑹風又甚傾盃按曹爽將誅之徴母丘儉反景王率衆征之晉書曰吴孫權太元𥘉大風江海湧溢平地水深八尺拔髙陵樹二千株動吴城兩門瓦飛落是時賦役繁重明年權死又曰孫休永安元年十二月孫綝岀屯武昌衛士施朔告綝欲反綝聞之大懼是夜大風四轉五復發屋折木揚沙石綝益恐明日臈㑹稱疾休強起之不得巳乃至㑹張布丁奉自左右縳之綝叩頭請爲奴不許乃斬之又曰孫皓末年狂暴丞相陸抗與大司馬大丁奉謀欲廢皓太史令陳苗奏乆隂不雨風氣廻逆將有隂謀皓深驚懼抗遂寢其事又曰晉武帝咸寜三年八月大風拔木暴寒且氷其年吴將孫慎入江夏太康末京都風發屋拔木又曰惠帝永康中六月飄風吹賈謐朝衣飛數百丈明年謐誅其年十一月京都大風發屋折木十二月愍懷太子幽于金墉又曰永康元年四月張華舎颻風起折木飛繒軸六七枚是月趙王倫矯制廢賈后害張華裴頠等又曰趙王倫篡位改元建始祠太廟風暴起黄塵四合其年倫誅又曰元帝永昌中大風抜木壊屋抜御道柳百餘株時王敦害尚書刀恊僕射周顗等又曰成帝時劉㣧鎮㝷陽有迴風從東來入㣧舡中西出狀如疋練長五六丈術人戴洋曰有刀兵死䘮之亂頃㣧爲郭黙所害王隠晉書曰王澄在荆州率衆軍次江陵之東堂皇北救國難飄風折其節後爲王敦所殺晉中興書曰桓玄入建康宫逆風迅激旌旗不亡儀飾一皆傾偃是月酷寒此日尤甚急恒寒若之應也出遊門外飄風飛其儀蓋又曰符堅三年長安大風堅宫中樹悉抜是歲王猛死沈約宋書曰孝武帝大明七年風吹𥘉寧陵隧口左標折鍾山通天臺新成飛倒散落山澗又曰徐羡之文帝𥘉作揚州有摽風自西明門湏臾入城直至㕔前繞帽及蓆遥逺雲際㝷羡之爲文帝所誅又曰文帝元嘉九年壽陽驟雨有迴風雲霧廣三十歩從南來至城西廻散滅當其衝者室樹木皆摧到其年晉寜太守爨松子反又曰元嘉三十年正月朔上㑹羣臣於大極殿有大風抜木雷電晦瞑凍殺牛馬及人明年太子劭逆也又曰孝武時柳太尉乘車行還於庭中洗車有大風從門而入直來衝車有聲車蓋覆向天其年明帝立合門𬒳殺又曰竟陵王誕文帝子孝武時鎮京口夜大風吹落屋瓦城門鹿床倒覆反鎮廣陵將入城衝風暴起俄而反伏誅又曰順帝昇明二年飄風起建康縣吹帛一疋入雲風止下於御道上俄而宋授禪其君爲疋夫之象齊書曰明帝建武末大風抜東宫門外楊樹齊木行東木位其衰乎至東昏侯立狂亂𬒳害又曰東昏侯寳卷永元元年始安王遥光知政入城有飄風飄儀繖岀城外少日而反𬒳殺又曰崔惠景圍臺城有一五色幡風吹飛翔在雲中半日乃下衆見皆驚恠相謂曰幡者事當飜覆數曰恵景敗隋書曰梁武帝太清二年九月邵陵王綸岀頓丘下其日天色隂慘風塵蕭瑟咸以出軍不祥十一月綸至江遇風亟溺人馬多損又曰大寳元年邵陵携王綸出鎮南浦僣擬施幄帳無何風起吹投於江後爲侯景將任約所襲綸敗走保汝南爲魏將侯萬通所攻城䧟𬒳殺又曰元帝承聖三年帝觀講武于津陽門風雨惣集普天昏暗旗幟飄亂帝趍駕而廻無復次序還宫至城風雨隨息竊驚俄爲魏軍所執送岳陽殺之又曰元帝徐妃𥘉嫁夕車至州西疾風大起發屋折木無何雪霰交下帷簾皆白及還之日又大雷震西州㕔兩柱碎以爲不祥妃竟以淫穢自殺又曰梁岳陽王察昭明太子之子西魏立爲梁王其年至江陵結營夜疾風甚雨水平地數尺其月察乃夜遁爲諸蠻断於山路墜馬僅得脫又曰侯景篡梁拜南郊登壇大風抜木物盡吹散見者莫不驚駭俄而景𬒳殺崔鴻十六國春秋曰北燕馮跋太平二十一年二月飄風入征南大將軍上黨公姚昭宅至于司徒中山公宅而散上黨公家人問太史閔尚曰風者天之號令所以吹塵去穢除姦慝之禍至二十二年跋弟弘篡立以姚昭爲大司馬昭貪暴其子肇諌曰大人不聞飄風之怪昭不納明年馮弘殺昭并諸子姪四十餘人又曰前秦符生壽光元年長安大風發屋抜樹行人顚頓官中奔擾或稱賊至門晝閉五日乃止生推告賊者殺之刳出其心左光禄大夫強平諌曰元正盛曉日有蝕之正陽神朔風昏大起願陛下務養元元生大怒鑿其頂而殺之又曰符堅建元十八年三月大風吹壞長安西門抜宫中大樹倒根於上至二十一年堅爲姚萇所殺又曰李期玉恒四年三月大風抜樹發屋四月爲季壽所殺又曰蜀李壽漢興三年二月大風暴雨震端門至六年壽死子勢立三年爲晉將桓温所滅又曰前趙劉曜葬其父母費用億計發掘古冡暴骸原野哭聲盈衢大霖雨震曜父墓門屋大風飄發其父寢堂于外垣五十餘歩松栢衆木植巳成林至是悉枯死曜竟爲石勒所擒又曰劉曜末年與石季龍對軍不撫士衆專與嬖臣博飲左右諌之以爲妖言斬之大風拔木昏霧四塞湏臾見擒又曰前凉張玄静四年六月大風震雷晦冥宫中雨水深四尺時宋混兄弟擅權玄静虚坐而巳後魏書曰孝文太和中安定王禎出爲湘州刺史至日暴風大雨凍死者數十是月禎發背死後宣武延昌三年章武王熈除湘州刺史七月入理其日大風雨凍死者二十餘人驢馬凍死數十熈聞祖父禎前事心甚惡之俄而舉兵反伏誅齊書曰後主天統年大風晝晦發屋抜木和士開譛趙王叡生坐死士開岀入宫掖胡太后幸之琅邪王儼矯詔殺士開於南臺儼伏誅又曰後主末年安德王延宗鄴下宅𬒳風吹其㕔棟榱相連置外數百歩後主敗爲王二日𬒳擒入周賜死陳書曰陳文帝天嘉三年梁永嘉王將司空王琳與陳將侯禎對軍其日東西風吹琳舟艦琳軍大敗又曰天嘉六年大風西南吹靈臺候樓倒又曰後主至德年風吹朱雀門倒又禎明年大雨風自西北激濤水入石頭城時後主昏誅諌臣沈客卿明年陳亡又曰隋文帝開皇中宫都大風發屋抜木時獨狐皇后干預政事後宫多有濫死又楊素邪佞又曰開皇末泰州啇胡乗騾遇暴風飄上空數百丈俄而墜下人騾俱碎時晉王廣矯詐取媚謀危太子勇勇竟廢死立廣爲太子淮南子曰人主之精通于天故誅暴則多飄暴風京房易妖占曰獄吏暴害人臣專政暴風折木又曰暴風折柱邑大憂暴風折木吹草上屋且有急令獨禄風入宫人主死飄數相從入殿門有㓙疾憂以此亡飄留君門一日一夜不去亂兵在門獨禄風者回轉風也京房別對災異曰狂風發何人君政教無法爲下所逆則致狂風發泄其救也脩政教聘賢士狂風消矣又曰人君賊罰良善政教無常使命數變則致暴風折木發屋鳴瓦或害殺人其救也脩舊典任忠臣思過自改則風災消六韜曰人主好田獵畢弋則歳多大風飄牛馬發屋抜木民人飛楊數十里漢書曰文帝時吴暴風雨壞城門吴王濞反卒服誅其年楚王都彭城大風毀市門殺人後王與吴王濞謀反同誅京房曰衆逆同志暴風將起晉書曰孝武太元二年春暴風折木發屋夏又暴風楊沙石三年又暴風折木發屋時符堅強盛又曰安帝元興𥘉夜大風雨大舡門飛落明年桓玄篡位沈約宋書曰前廢帝義符時正月朔朝暴風發殿前㑹席翻楊數十丈至五月帝廢爲榮陽王梁書曰昭明太子孫㨂簡文大寳二年八月爲侯景廢㨂時與妃張氏鋤菜而法駕至驚懼而泣昇輦及即位昇武徳殿備陳文物於庭有暴風自東來吹旌旗悉倒又有廻風從地踊起折竿翻飛華蓋經出端門不見陪列者驚駭時人知其不終十一月景廢㨂景乃篡立崔鴻十六國春秋曰南燕慕容超僣位祠南郊將登壇大風暴起天地晝昏行宫羽儀皆壞裂後超爲晉將劉𥙿所滅斬於建康市又曰慕容盛建平元年八月暴風抜闕前七大樹其月歩兵校尉馬勒謀反伏誅至長樂三年盛爲叚纉于泰所殺又曰後燕慕容垂遣太子寳伐魏次叅合忽大風黒氣狀若堤防臨覆軍上沙門支曇猛言於寳曰風氣暴逆魏軍將至冝遣兵禦之寳笑而不納俄黄霧四塞日月晦冥魏師至三軍奔潰其年垂死又曰石季龍死子遵立其月夜暴風抜樹震電雨雹俄而遵見殺隋書曰太子勇朝髙祖於仁壽宫還至𡵨山妃元氏止干周大王廟因縱騎獵湏臾暴風折樹雨雪深至人膝天晦暝咫尺不相見妃因心痛再宿而死勇後廢爲庶人煬帝殺之又曰太子勇廢立晉王爲皇太子當受冊髙祖曰吾以大興公成帝業令出舎大興縣其夜烈風大雪地裂山崩民舎多壞死者百餘又曰煬帝大業十四年三月在江都蜀王秀囚於右驍勇營暴風吹塵晝昬識者大以爲暴秀謂防者曰吾生年巳來未見斯變亡國之禍應在旦夕其日夜宇文化及司馬徳戡裴乾通反唐書曰玄宗天寳十一年潼関口女媧墓因風雨失所在後至肅宗乾元二年五月一日其墓復舊黒風後漢書曰世祖太常元年二月京師有黒風竟天廣五十餘丈其年四月沮渠蒙遜㓂張掖古今五行志曰大業十三年二月李宻於鞏縣南設壇刑白馬祭天稱魏公置僚佐改元升壇時有黒風從南北暴至吹宻衣冠及僚属皆匍匐于壇下沙塵暗天咫尺不相見良乆息賊軍惡之俄而宻敗赤風春秋潜潭巴曰天赤有大風發屋折木兵大起行千里漢書曰建元四年夏有風赤如血六月旱崔鴻十六國春秋曰張天錫十一年有赤風昬闇至十三年符堅滅之雷古今五行記曰夏桀末年雷震殺人其年湯放之左傳曰僖公十五年九月晦震夷伯之廟董仲舒以爲夷伯季氏之陪臣不當有廟明絶去僣差之類河圖曰臣僣奢下犯主則雷電撃朝京氏易五星占曰雷霆殺人何夫雷天拒難之折衝也人君承用節度即雷風以節暴行威福則雷霆殺人其救也議獄緩死則災銷矣京房别對災異曰雷鳴連而不絶者何夫雷鳴萬里懼今鳴不絶此謂人君行政事民不恐懼也故致游雷之災雷當先電而鳴今雷電俱出或鳴而後電何此謂執法者貪所致災也後漢書曰桓帝建和三年六月雷震憲陵寢屋先是太后聽兄梁兾桓殺李固杜喬魏志曰魏明帝景𥘉中洛陽水橋同日俱震時勞役大起古今五行記曰吴孫權赤烏八年夏雷震宫門柱又擊南津橋至十三年廢太子和立子亮又曰晉惠帝永康𥘉六月震崇陽陵標西南五百歩標破時賈后䧟害大臣終見殺晉中興書徴祥說曰元興三年永安王皇后至自巴防將設威儀入宫天大雷震人馬多死沈約宋書曰元嘉十四年震𥘉寜陵標四破至地十七年廢大將軍彭城王義康後魏書曰太祖天賜六年震天安殿東序帝惡之令佐校以衝車攻殿東西兩序屋毀之唐書曰太宗貞觀十一年四月震乾元殿前槐樹冬雷京房易妖占曰天冬雷地必震教令撓則冬雷民飢漢書曰昭帝五年十一月大雷震十二月丞相王訢薨後漢書曰安帝永𥘉六年十月郡國大雷延光四年十月郡國凢三十雷時鄧太后專政帝不親萬機晉書曰吴孫亮建興𥘉十二月大風雷亮見廢又曰愍帝建興𥘉十一月大雨雷震劉向以雷二月岀八月入於此月雷電者陽不閉藏失節之異是時九州幅裂至四年帝降劉曜害之晉中興書徵祥說曰太興元年十一月京都雷震凢未應雷而雷皆恒燠也又曰升平二年十一月雷時皇太后臨朝政舒緩也崔鴻十六國春秋後趙録曰建武十三年十二月雷大雨霖石虎問佛圖澄此何災也澄曰其爲我耳至戊子而卒又曰前秦符登攻姚萇冬大雷姚萇營殺七人萇軍大敗霹靂春秋合誠圖曰霹靂擊於宫殿者妃后争政春秋潜潭巴曰霹靂擊宫失君精泄下有謀起宋均曰君精泄去也春秋繁露曰王言不從革而秋多霹靂霹靂者金氣也其音啇故應之續晉陽春秋曰太元五年霹靂含章殿四柱殺内侍二人晉朝雜事曰元康七年霹靂破髙禖石占曰賈后將殺愍懷趙書曰前石時暴風雷雨霹靂雲臺壞署婦人震死瘞之三日重霹靂出之蔡邕封事曰臣聞天降災異縁象而至霹靂數發殆刑誅繁多之所生無雲而雷洪範五行傳曰秦二世元年無雲而雷雷陽也雲隂也有雲然後有雷有臣然後有君無雲而雷示君獨處無民臣天中裂爲二無雲而雷成都王穎舉兵逼京師又曰太安二年無雲而雷其年張方入京燒服御死者萬計石超逼帝幸于緱氏王師不利大飢人相食梁書曰大通六年十二月西南無雲有聲如雷至地是年魏分爲二東西各主崔鴻十六國春秋曰張重華三十九年十月無雲而雷聲皆東南引四十一年重華死子曜靈立爲叔祚簒之又曰南燕慕容超太上二年無雲而雷七年爲晉將劉𥙿所殺隋書曰文帝開皇二十年二月無雲而雷四月有聲如瀉水自南而北又曰無雲而雷其年立晉王廣爲太子皇太子勇廢爲庶人立晉王爲太子唐書曰則天時宗楚客以佞幸爲内史受命之日無雲而雷聲震裂未周歳而誅太平御覽卷第八百七十六
