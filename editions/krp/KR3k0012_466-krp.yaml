front:
  text: 太平御覽卷第四百六十六
  hash: sha256:9cdb38dba6327409ad0e642db648d56367bcb2edff7d32c31bb999f839378b8a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_466-1a}
body:
  text: 人事部一百七嘲戲罵詈嘲戲說文曰嘲相調戲相弄也又曰戲弄也毛詩曰善戲謔兮不爲虐兮又曰伊其相謔贈之以芍藥又曰謔浪笑傲中心是悼左傳曰宋萬歸宋宋公靳之曰始吾愛子今子魯囚也吾不愛子矣萬病之遂殺宋公戲而相狎曰靳論語曰子之武城聞絃歌之聲莞尓而笑曰割鷄焉用牛刀子游對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使夫子曰偃之言是也前言戲之耳漢書曰上以東方朔爲常侍伏日詔賜從官肉朔獨拔劒割謂其同官曰伏日當早歸即懷肉去上問朔賜肉不待詔割肉而去何也先生自責朔曰不待詔何無禮也拔劒割肉一何壯也割之不多又何廉也歸遺細君又何仁也上笑曰令生自責反自譽復賜酒一石肉一百斤使遺細君東觀漢記曰光武令王霸至薊市中募人將以擊王郎市中人皆大笑舉手邪揄之覇慙懅而還後漢書曰邊韶字孝先陳留浚儀人以文學教授數百人曽晝卧弟子嘲之曰邊孝先腹便便嬾讀書伹欲眠韶潜聞之應時對曰邊爲姓先爲字腹便便五經笥但欲眠思經事寐與周公通情夢與孔子同意師而可嘲出何典記嘲者大慙呉志曰諸葛瑾字子瑜面長似驢吳王使優人牽驢入題其上曰諸葛子瑜瑾子恪請筆益兩字曰之驢人伏其敏權即以驢賜恪蜀志曰先主與劉璋㑹涪時張𥙿爲璋從事侍坐其人饒鬚先主嘲之曰昔吾居涿縣時多毛姓東西南北皆諸毛也𥙿即荅曰昔有士作上黨潞長遷爲涿郡令者去官還家時人與書欲曙潞則失涿欲署涿則失潞乃署曰潞涿君先主無鬚故𥙿以此及之晉書曰范寗甞患目痛就中書侍郎張湛求方湛因嘲之曰右方宋陽里子少得其術以授魯東門伯東門伯以授左丘明遂世世相傳及漢杜子春鄭康成魏髙堂隆晉左太冲凢此諸賢並有目疾得此方云用損讀書一减思慮二專内視三簡外觀四旦晚起五夜早眠六凢六物熬以神火下以氣篩藴於胷中七日然後納諸方寸脩之一時近能數其目㫸逺視尺捶之餘長服不巳洞見牆壁之外非惟明目乃亦延年又曰謝敷傳𥘉月犯少微一名處士星占者以隠士當之譙國戴逵有羙才時人憂之俄而敷死故㑹稽人士以嘲呉人云吴中髙士便是求死不得死又曰謝万有才名爲㑹稽王道子驃騎長史甞因侍坐于時月夜明净道子歎以爲佳万率尓曰意謂不如微雲點綴道子因戲萬曰卿居心不浄乃復彊欲滓穢太清耶又曰何充性好釋典崇修佛寺供給沙門縻費巨億而不吝親友貧乏無所施遺以此獲譏於世阮𥙿常戲之曰卿志大宇宙勇邁終古充問其故𥙿曰我圖數千戸郡尚不能得卿圖作佛不亦大乎又曰陸雲與荀隠素未相識甞㑹張華坐華曰今日相遇可勿爲常談雲因撫手曰雲間陸士龍隠曰日下荀鳴鶴鳴鶴隠字也雲又曰旣開青雲覩白雉何不張尓弓挾尔矢隠曰本謂是雲龍騤騤乃是山鹿野麋獸微弩彊是以發遟華撫手大笑又曰袁山松欲以女妻謝混王珣曰卿莫近禁臠𥘉元帝始鎮建業公私窘罄毎得一扽以爲珎膳項下一臠尤羙輙以薦帝羣下未甞敢食于時呼爲禁臠故珣以爲戲混果尚主又曰郄詵遷雍州刺史東堂㑹送武帝問詵卿自以爲何如詵對曰臣舉賢良對䇿爲天下第一猶桂林一枝崑山之片玉帝笑侍中奏免詵詔曰與戲耳不足罪又曰張憑字長宗祖鎮蒼梧太守慿年數歳鎮謂其父曰我不如汝有佳兒慿曰阿翁詎冝以子戲父耶又曰郄超爲桓温叅軍時王珣爲温主簿亦爲所重府中語曰髯叅軍短主簿能令公喜能令公怒超髯珣短故也又曰潘京爲州所辟因謁見問策探得不孝字刺史戲京曰辟士爲不孝耶京舉荅板曰今爲忠臣不得復爲孝子沈約宋書曰何承天除著作郎時年巳老諸佐郎並名家少年荀伯子嘲之曰呼爲妳母承天曰卿當云鳯凰將九子妳母何言耶又曰袁淑憙爲誇誕毎爲時人所嘲始興王濬甞送錢三萬餉淑一宿復遣追取謂使人謬誤欲以戲淑齊書曰陵澄當世稱爲碩學讀易三年不解義欲操宋書終不就王儉戲之曰陸公書厨也又曰庾杲之清貧自業食唯有韭菹卄瀹韭生韭雜菜或戲之曰誰謂庾郎貧食常有二十七種言三九也又曰謝超宗送湘州刺史王僧䖍閣道壞墜水僕射王儉甞牛驚跣下車超宗撫掌笑戲曰落水三公墮車僕射梁書曰朱异遍治五經涉獵文史慱弈書筭皆其所長年二十詣尚書令沈約誡之因戲异曰卿年少何乃不廉异逡廵未逹約乃曰天下唯有文義棊書卿一時將去可謂不廉也陳書曰徐陵使魏魏人授館宴賔是日甚熱其主客魏収嘲陵曰今日之熱當因徐常侍來陵即荅曰昔王肅至此爲魏始制禮儀今我來聘使卿復知寒暑収大慙隋書曰何妥少機警八歳遊國學助教頋良戲之曰汝姓何是荷葉之荷是河水之河妥應聲荅曰先生姓頋是眷頋之頋是新故之故衆咸異之隋書曰麥鐵杖考功郎竇一嘲之曰麥是何姓鐡杖應聲對曰麥豆不殊那忽相怪竇𧹞然無以應之時人以爲敏惠又曰鄭譯少爲太祖所親恒令與諸子遊集年十餘歳甞詣相府司録李長宗於衆中戲之譯歛容謂長宗曰明公位望不輕瞻仰斯屬輙相玩狎無乃䘮德也長宗甚異之唐書曰蘇世長髙祖甞嘲之曰名長意短口正心邪弃忠貞於鄭國忘信義於吾家丗長對曰名長意短實如聖旨口正心邪未敢奉詔昔竇融以河西降漢漢十世封侯臣以山南歸國唯蒙屯監即日擢拜諫議大夫晏子春秋曰晏子短小使楚楚人爲小門於大門側而延晏子晏子不入日使狗國者從狗門入今日臣使楚不當從狗門入王曰齊無人耶對曰齊之臨淄張袂成帷揮汗成雨何爲齊無人使賢者使賢王不肖者使不肖王嬰不肖故使耳莊子曰惠子始與莊子相見而問乎莊子曰今日自以爲見鳯凰而徒遭䴏雀耳坐者俱笑孔藂子曰平原君與子髙飲強子髙酒曰昔有遺諺堯舜千鍾孔子百觚子路溘溘尚飲百㯼古之聖賢無不能飲也吾子何辭焉子髙曰以穿所聞賢聖以道德爲人未聞以飲也平原君曰即如先生言則此言何生子髙曰生於嗜酒者蓋其勸勵采戲之辭非實然也平原欣然曰吾弗戲子無所聞此雅言也吕氏春秋曰成王與唐叔虞燕居援梧葉以爲珪授虞曰此封汝虞喜以告周公公請曰天子封耶成王曰余一人與虞戲尓周公曰臣聞之天子無戲言天子言則史書之工誦之士稱之於是遂封虞于唐裴啓語林曰劉道眞遭亂於河側自牽舡見一老嫗採穭劉謂之曰女子何不調機利杼而採櫓女荅曰丈夫何不跨馬揮鞭而牽舡又曰祖士言與鍾雅相調鍾語祖曰我汝潁之士利如錐卿燕代之士鈍如槌祖曰以我鈍搥打尔利錐鍾曰自有神錐不可得打祖曰旣有神錐亦有神搥鍾遂屈劉義慶世說曰謝太傳始有東山之志祖公見藥中有逺志公問謝此藥又曰小草何以一物二稱謝未即荅郝叅軍荅曰處則爲逺志岀則爲小草謝公殊有愧色又曰鄧艾口吃語艾艾晉文王戲之曰爲云艾艾故是幾艾鄧荅曰鳯兮鳯兮故是一鳯諸葛恪別傳曰孫權甞宴見蜀使費禕逆勑羣臣使至伏勿起禕至權輟食而羣下不起禕嘲之曰鳯凰來翔騏驎吐哺驢騾無知伏食如故恪荅曰愛植梧桐以待鳯凰是何燕雀自稱來翔何不彈射使還故郷劉昭㓜童傳曰張玄字祖希年八歳虧齒先逹知其不常故戲之君口復何爲開狗竇玄荅云正使君軰從中入罵詈釋名曰罵迫也以惡言𬒳迫人也又曰詈歴也以惡言相弥歴音力智反左傳曰冉堅射陳武子中手失弓而罵戰國䇿曰宋康王時有雀生鸇於城之陬使史占之曰小而生巨必覇天下王大喜於是滅滕伐薛取淮北之地逾自信欲覇之亟成故射天笞地斬社稷而焚㓕之曰威服天下鬼神罵國老諌者爲無頭之冠以是示勇國人大駭齊聞而伐之史記曰陳狶將趙利守東垣髙祖攻之月餘不下卒衆罵髙祖髙祖怒城降令岀罵者斬不罵者原之漢書曰項羽拔滎陽城生得周苛羽謂苛爲我將以公爲上將軍苛罵曰若不趍降漢今爲虜矣又曰陳稀反上自至邯鄲令周昌選趙壯士可令將者昌見四人上嫚罵曰竪子能爲將乎四人慙伏地上以爲將又曰張湯以更定律令爲廷尉汲黯於上前憤發罵曰天下刀筆吏不可以爲公卿果然又曰王莽自立使安陽侯王舜素傳國璽太后知爲莽求怒罵之曰我漢家老寡婦旦暮且死欲與此璽俱葬終不可得又曰魏豹叛漢王謂酈生曰緩頰徃說之豹曰人生一丗間若白駒過隙今漢王嫚侮人罵詈諸侯群臣如奴耳吾不忍復見又曰張敖爲趙王髙祖從平城過趙王旦暮自上食髙祖箕踞罵詈甚慢之趙相貫髙等怒說敖曰今王事皇帝甚㳟而皇帝無禮請爲王殺之又曰諱信平齊使人請自立爲假王漢王大怒詈曰吾困於此望若來佐我乃欲自立爲王張良陳平附耳語之漢王寤因復罵曰大丈夫即爲真王耳何以假爲又曰田蚡取燕王女爲夫人太后詔召列侯宗室皆徃賀灌夫行酒次至臨汝侯灌賢方與程不識耳語又不避席夫乃罵曰賢平生毀程不直一錢今長者爲壽乃効女兒曹沾囁耳語耶又曰黥布反上自征謂布何苦而反布曰欲爲帝耳上怒罵之遂戰破布陣又曰吕后召趙王周昌令王稱疾不行吕后大罵昌曰尓不知我之怨戚氏乎而不遣趙王也又曰上擊黥布時流矢所中行道疾甚吕后迎良醫入見問醫疾可治不醫曰可治上嫚罵之曰吾以布衣提三尺劒取天下此非天命乎命乃在天雖扁鵲何益又曰陸賈時時前說稱詩書髙帝罵曰我乃馬上得之安事詩書乎賈曰馬上得之寕可馬上治之乎范曄後漢書曰王允與吕布謀令騎都尉李肅并勇士千餘人於掖門内以待董卓卓將岀馬驚不行肅以㦸刺之墜車頋大呼曰吕布何在布曰有詔討賊卓大罵曰庸狗敢如是耶又曰李􅔸等共追乗輿大戰恒農東澗射聲校尉祖雋𬒳瘡隨馬李􅔸謂左右曰尚可活不雋罵之曰汝等㓙逆逼迫天子亂臣賊子未有如汝者􅔸使殺之續漢書曰董卓爲司空辟蔡邕稱疾不就卓大怒詈曰我力能族人邕不得巳及到署祭酒東觀漢記曰劉寛甞坐客遣蒼頭市酒迂乆大醉而還詈曰畜生寛遣人視奴疑必自殺魏志曰諸葛恪圍合肥新城中遣士劉整出圍傳消息爲賊所得拷問所傳語整罵曰死狗此何言也我當必死爲魏國鬼不茍求活逐汝去又曰龐德與曹仁討關羽爲羽所得羽謂曰我欲以卿爲將何不早降德罵羽曰竪子何謂降也遂爲羽所殺又曰劉俻爲豫州舉袁渙爲茂才後復爲吕布所拘布欲使渙作書詈辱俻渙不可再三強之不許布大怒以兵脅渙曰爲之則生不爲則死渙顔色不變笑而應之曰渙聞唯徳可以辱人不聞以罵且他日之事劉將軍猶今日之事將軍也將軍亘去此復罵將軍可乎布慙而止呉志曰孫峻誅諸葛恪臨淮臧均表乞収葬曰今恪父子三首懸示積日觀者數萬罵聲成風國之大刑無所不震又曰孫堅至南陽太守張咨不給軍粮又不見堅堅詐得急病欲以兵付咨咨心利其兵則將騎五六百入營省堅堅卧與相見無何卒然而起按劒罵咨遂執斬之王隠晉書曰叚疋磾弟文鴦與石勒戰所乗馬乏勒呼曰大兄乆望共同天不違願今日相見何復戰請釋㐲語鴦罵曰汝爲虐乆應死吾兄不能用吾計故令汝得至此吾寕死不忍爲汝所擒遂下馬與戰山海經曰若山有獸焉名曰山膏其狀如豚赤若丹火善罵好罵也賈誼新書曰紂自謂天王而桀自謂天父巳滅之後民以相罵祢衡別傳曰祢衡着寛布單衣練巾坐曹操大營門下以杖捶地數罵責操及其先祖無所不至營令史入啓言外有狂生祢衡言語悖逆請案科治操聞之嘿然良乆乃勑外具上廐馬三疋并騎二人挾將送置荆州黃祖遂令殺之呉質別傳曰魏文帝詔上將軍及特進以下皆㑹質所上將軍曹真肥領軍朱鑠瘦質召優使說肥瘦真扣刀瞋目曰言俳敢說吾斬尓遂罵質案劒曰曹子丹呉質吞尓不揺喉何敢恃勢驕耶楊雄方言曰荆淮海岱雜齊之間罵奴曰贓罵婢曰獲桓譚新論曰哀帝時有老人范蘭言年三百歳𥘉與人相見則喜而相應和再三則罵而逐入列女傳曰安定皇甫規妻年盛色羙董卓娉以輜軿百乗乃輕服詣卓門跪自陳請卓使侍者悉杖刀圍之妻知不免乃立罵卓曰君羗胡之種毒害天下猶未足耶敢欲行非禮於尓君夫人乎卓乃以其頭懸車軛鞭樸交至遂死車下太平御覽卷第四百六十六
