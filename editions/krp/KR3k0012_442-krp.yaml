front:
  text: 太平御覽卷第四百四十二
  hash: sha256:418b85fc1470961cb130a805c51a2f5c78960c934adc921986a8cf0af98bf5a4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_442-1a}
body:
  text: 人事部八十三知人上尚書咎繇曰都在知人在安民禹曰吁咸若時惟帝其難之言堯亦以知人安民爲難故曰吁知人則哲能官人安民則惠黎民懷之禮記曰趙文子與叔譽觀乎九原文子曰死者如可作也吾誰與歸叔譽曰其陽處父乎處父字文公之傳也文子曰行并植音特於晉國不没其身其智不足稱也井專也謂剛而專爲狐射姑所殺其咎犯乎文子曰見利不顧其君其仁不足稱也我則隨武子平利其君不忘其身謀其身不遺其友晉人謂文子其中退然如不勝衣其言呐呐然如不出諸其口所舉於晉國管庫之士七十有餘家生不交利死不屬其子焉春秋僖五年曰鄭殺申侯初申侯申出也姊妹之子日出有寵於楚文王文王將死與之璧使行曰唯我知女女專利而不厭予取予求不女疪瑕從我取從我求我不以女爲罪後之人將求多於女謂嗣君也求多以禮義大望責之女必不免我死女必速行無適小國將不女容焉政狹法峻旣葬出奔鄭又有寵於厲公子文聞其死也曰古人有言曰知臣莫若君弗可改也巳又曰晉文公及曹曹共公聞其駢脅欲觀其祼浴薄而觀之薄迫也骈脅合幹僖負羈之妻曰吾觀晉公子之從者皆足以相國若以相若遂以爲傅相夫子必反其國反其國必得志於諸侯而誅無禮曹其首也子盍蚤自貳焉自貳自别異於曹乃饋盤飱寘璧焉臣無竟外之交故用盤藏璧飱中不欲令人見也公子受飱反璧又曰秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽户而還遂霸西戎用孟明也君子是以知秦穆之爲君也舉人之周也與人之壹也壹無二心孟明之臣也其不解也能懼思也子桑之忠也其知人也能舉善也子桑公孫枝舉孟明者詩曰于以采繁于沼于沚于以用之公侯之事秦穆有焉詩國風言沼沚之繁至薄猶采以共公侯以喻秦穆下遺小善夙夜匪懈以事一人孟明有焉詩大雅善仲山南也一人天子也詒厥孫謀以燕翼子子桑有焉詒遺也燕安也翼成也詩大雅羙武王能遺其子孫善謀以安成子孫言子桑有舉善之謀又曰晉陽處父聘于衛反過寗寗嬴從之及温而還其妻問之嬴曰以剛啇書曰沈潛剛克髙明柔克夫子壹之其不没乎陽子性絶剛天爲剛德猶不干時寒暑相順况在人乎且華而不實怨之所聚也言過其行犯而聚怨不可以定身剛則犯人余恐不獲其利而離其難是以去之爲六年晉殺處父又曰晉侯觀于軍府見鍾儀問之曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使稅之稅解也召而弔之再拜稽首問其族對曰伶人也伶人樂官公曰能樂乎對曰先父之職官也敢有二事使與之琴操南音南音楚聲公曰君王何如對曰非小人之所得知也固問之對曰其爲太子也師保奉之以朝于嬰齊而夕于側也嬰齊令尹子重側司馬子反言其尊卿敬老不知其他公語范文子文子曰楚囚君子也言稱先職不背本也樂操土風不忘舊也稱太子抑無私也舍其近事而逺稱少子以示性所自然明至誠名其二卿尊君也尊晉君也不背本仁也不忘舊信也無私忠也尊君敏也仁以接事信以守之忠以成之敏以行之事雖大必濟言有此四徳必能成大事君盍歸之使合晉楚之成公從之重爲之禮使歸求成又曰子産始知然明問爲政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀也子産喜以語子太叔且曰他日吾見蔑之面而巳蔑然明名今吾見其心矣又曰韓宣子如齊納幣見子雅子雅召子旗子旗子雅之子使見宣子曰非保家之主也不臣志氣亢見子尾子尾見疆疆子尾之子宣子謂之如子旗亦不臣大夫多笑之唯晏子信之曰夫子君子也夫子韓起君子有信其有以知之矣爲十年齊欒施髙疆來奔漢書曰薛宣爲丞相而翟方進爲司直宣知方進大儒有宰相器深結厚焉後方進竟代爲丞相又曰薛宣字貢君初宣察孝廉瑯瑘太守趙貢見宣異之令妻子與相見戒曰貢君至丞相我兩子亦中丞相史宣爲相除趙貢兩子爲史東觀漢記曰上旣破邯鄲誅王郎石鄧禹宿夜語曰欲北發幽州突騎諸將誰可使者禹曰呉漢可其人勇􅋧有智謀諸將鮮能及者上於是以漢爲大將軍漢遂斬幽州牧苗曽上以禹爲知人更始時大司馬朱鮪在洛陽上欲南定河内問禹曰諸將誰可使守河内者禹曰宼恂文武備足有牧民之才河内冨貴南迫雒陽非宼恂莫可使也上拜宼恂爲河内太守又曰朱勃字叔陽年十二能誦詩書候馬援兄勃衣方領能矩歩辭言閑雅援纔知書見之自失兄知其意乃自酌酒慰援曰朱勃小器速成智盡此耳卒當從汝禀學及援爲將軍封侯而勃位不過縣令又曰虞延字子大陳留人孝明帝時有新野功曹鄧寅以外戚小侯每豫朝㑹而容姿趍歩有出於衆顯宗目之顧左右曰朕之儀貌豈若此人特賜輿馬之服延以寅雖有容儀而無實行未嘗加禮拜郎中遷玄武司馬寅在職不服父喪帝聞乃歎曰知人則哲惟帝難之信哉斯言以延爲明謝承後漢書曰許邵字子將汝南平輿人清論風行髙唱草偃多所賞識抜樊子昭於未聞天下咸稱許郭袁山松後漢書曰李膺子瓉位至東平相𥘉曹操微時瓉異其才將没謂子宣等曰丗將亂矣天下英雄無過曹操張孟卓與吾善袁夲𥘉汝外親雖爾勿依必歸曹氏諸子從之並免亂丗矣又曰南陽何顒初見曹操歎曰漢將亡安天下者必此人也操以是嘉之魏志曰武帝機警有權數時人莫知者橋玄見而異焉謂曰今天下將亂安生民者其在君乎太祖常感其知巳後經過玄墓輙悵然致祭又曰王粲字仲宣蔡邕見而竒之時邕才學顯著常車騎塡巷賔客盈座聞粲在門倒屣迎之粲年旣㓜弱容狀短小一座皆驚邕曰此王公孫也有異才媿吾不如也吾家書籍文章盡當與之又曰陳羣爲童兒時祖晏常異之曰此兒必興吾門羣爲司空而曹屬時薦樂安王摸下邳周逵者太祖辟之還敎以爲摸逵穢德終必敗太祖不聽後摸逵皆坐姧宄誅太祖以謝羣羣薦廣陵陳喬丹陽戴乾太祖皆用之後呉人叛乾忠義死難喬爲名臣又曰楊駿字季才司馬宣王年十六七與駿相遇駿曰此非常人也同邵王象少孤特爲人僕隷年十七八使牧羊而私讀書駿見羙其人質即贖着家中娉妻立屋然與別駿自少及長以人倫自任魏略曰趙歧逃難匿姓名賣餅北海市時安丘孫嵩字賔石遊市見歧察非常人呼與共載歧懼失色嵩乃令騎屏行人從容問曰視子非賣餅者不有重㤪即亡命乎北海孫賔石闔門百口勢能相濟歧素聞嵩名即以實告之遂與俱歸藏歧複壁中孫盛魏氏春秋曰嘉平元年右將軍夏侯霸本蜀人問太傅之德霸對曰彼自爲家非人臣也問京師隽士對曰有鍾㑹者若管朝政呉蜀之憂也蜀志曰先主年十五母使學同宗劉德然遼西公孫瓉俱事同郡盧植德然父元起常資給先主與德然等起妻曰各自一家何能常尓耶起曰吾宗中有此非常人也又曰諸葛亮字孔明瑯瑘人耕壟畒好爲梁父吟自比於管仲樂毅時人莫之許也唯博陵崔州平頴川徐庶與亮友善謂爲信然先主屯新野庻見先主器之庶謂先主曰諸葛孔明卧龍也將軍豈願見之先主曰君與俱來庻曰此人可就見不可屈致也將軍冝枉駕顧之由是先主詣亮又曰龐統字士元襄陽人少時樸鈍未有識者頴川司馬微清雅有知人鑒統弱冠徃見微微採桑樹上坐統桑下共語自晝逹夜微甚異之稱當爲南州士人冠冕由是漸顯也呉志曰顧邵字孝則雍長子也年三十七起家爲豫章太守小吏姿質佳者令奬就學擇其先進擢置左右職舉善以敎風化大行𥘉錢塘丁謂出於役伍陽羡張康生乎民庶烏程吴粲雲陽殷禮起乎微賤邵皆抜而友之謂至典軍中郎康至丹陽禮至零陵令粲至太子少保又曰張温字惠恕少脩操容貌瓌偉權聞之以問公卿曰温當今與誰爲北大司農劉基曰無可與爲軰顧雍曰温當今無軰權曰如是張允不死也徴到延見文辭占對觀者傾悚權改容加禮又曰張昭字子布爲人矜嚴忠謹能識人諸葛恪字元遜年少之時衆人竒其英才昭言終敗葛氏者元遜呉書曰陶謙字恭祖年十四獨帛幡乗竹馬而戲邑中兒童皆隨之蒼梧太守同縣甘公出遇之於塗見其容貌異住車與語甚恱之因許妻以女甘夫人怒曰聞陶家兒遨戲無度如何以女許之甘公曰彼有竒志必大成遂與之後爲徐州刺史王隱晉書曰石苞少子崇字季倫苞臨終預分諸子財物獨不及崇其母以爲言苞曰此兒雖小大自能得財也又曰魏舒字陽元任城人容貌朴實少號遟鈍人莫之知唯叔父衡知其竒每有賔客已常勸使過舒言吾兄子非常人也虞預晉書曰魏舒少名遟鈍唯太原王又曰卿終當爲台輔然亦不能令妻子免飢寒吾當助卿營之常借給舒受而不辭又曰武陔字元夏沛國竹邑人父同有顯名陔及二弟韶茂皆緫角見稱時同郡劉公榮名人嘗詣同過陔兄弟與觀其舉動便出語同曰君三子皆國士也元夏量最優出輔佐之風仕官可爲亞公叔夏季夏不減常伯納言陔後果開府徐廣晉書曰鄭齊純和有識𥘉荀攸見齊曰鄭公業爲不亡矣時相國掾魏諷有盛名同郡任覽謂齊曰諷姦雄必以禍終子冝絶之後諷果敗司空王朗辟掾委以求才齊舉髙陽許允扶風魯芝東萊王基並爲名臣又曰魏謁者郭玄信出使從弘農求御人遣石苞及鄧艾爲御行十餘里玄信謂二人曰子並當至將相旣而苞爲縣吏到鄴賣鐵于市長趙元儒異之曰公輔才也遂與交稍遷至弘農司馬欲求縣吏部郎許允謂苞曰君我軰人也當相引置朝廷何欲小縣乎苞還歎不意允之知巳晉書陶偘傳曰樂廣欲㑹荆楊士人武庫令黄慶進偘於廣人中或非之慶曰此子終當逺到復何疑也又曰王導少有風鑒識量清逺年十四陳留髙士張公見而竒之謂其從兄敦曰此兒容貌志氣將相之器也又石苞傳曰趙元儒有知人鑒見苞異之因與結交歎苞逺量當至公輔又曰陸雲㓜時呉尚書廣陵閔鴻見而竒之曰此兒若非龍駒當是鳯鶵又曰劉𥙿爲布衣衆未之識也唯王謐獨竒貴之嘗謂𥙿曰卿當爲一代英雄晉書曰庾翼字稚恭風儀俊偉少有經綸大略京兆杜乂陳郡殷浩並才名冠丗而翼弗之重也毎語人曰此軰冝束之髙閣候天下太平然後議所任耳見桓温緫角之中便期之以逺略因言於成帝曰桓温有英雄之才願陛下勿以常軰畜之冝委以方部之任必有弘濟艱難之勲又曰謝安常疑劉牢之不可獨任又知王味之不冝專城牢之旣次亂終而味之亦以貪敗由是識者服其知人又陶偘傳曰劉弘爲荆州刺史將之官辟侃爲南蠻長史遣先向襄陽討賊張昌破之弘旣至謂偘曰吾昔爲羊公叅軍語吾其後當居此今相觀察必繼老夫矣又曰時豫章郎中令楊晫陶侃州里人也爲郷論所歸侃詣之晫曰易稱貞固足以幹事陶士行是也與同乗見中書郎顧榮榮甚竒之吏部郎温雅謂晫曰奈何與小人共載晫曰此人非凢器也太平御覽卷第四百四十二
