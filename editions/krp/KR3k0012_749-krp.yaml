body:
  text: 工藝部六書下古文篆書八分書隷書草書飛白書章草書行書古文王隱晉書曰荀勗領祕書監始書師鍾朗法太康二年得汲郡冡中古文竹書勗自撰次注冩以爲中經別在秘書以較經傳闕文多所證明書斷曰古文者黄帝史蒼頡所造也頡首有四目通於神明仰觀奎星圜曲之勢俯察龜文鳥跡之象採乎衆美合而爲字是曰古文孝經援神契云奎主文章蒼頡放象是也夫文宇者揔而爲言包意以名事也分而爲義則文者祖父字者子孫得之自然備其文理象形之屬則爲之文因而滋蔓母子相生形聲會意之屬則謂之字字者言孳乳浸多也題於竹帛謂之書書者如也舒也紀也又曰魏衛覬字伯儒河東安定人官至侍中尤工古文筆跡精絶魏𥘉淳古文者出於邯鄲淳伯儒冩淳古文尚書以示淳淳不能別篆書漢書曰元帝善史書史籕所作大篆籕音紂續漢書曰靈帝置鴻都門諸生能爲尺璧賦及以工書鳥篆相課試至千人焉魏略曰邯鄲淳善蒼頡蟲篆許氏宇指後魏書曰竇遵善揩篆北京諸碑及臺殿樓觀門題多其書也書斷曰秦李斯妙篆始省改之爲小篆著蒼頡篇七章雖帝王質文丗有損益終以文代質漸就澆醨則三皇結繩五帝畫象三王肉刑斯可况也古文可爲上古大篆爲中古小篆爲下古三古謂之實草隷謂之華妙極於華者羲獻精窮於寶者籕籕史籕斯始皇以和氏之壁琢而爲璽令斯書其文今㤗山繹山及秦望等碑並其遺迹謂國之偉寳百丗之法式斯小篆入神大篆入妙書斷曰大篆者周宣王大史史籕所作也或云柱下史始變古文或同或異謂之爲篆篆者傳也傳其物理施之無窮鄄酆定六書三曰篆書八體書法一曰大篆又漢書藝文志史籕十五篇蓋此也又曰吕氏春秋云蒼頡造大篆非也若蒼頡造大篆則置古文何地即籕篆蓋其子孫是也又曰小篆者秦丞相李斯所作也増損大篆異同籕文謂之小篆亦曰秦篆蔡邕篆勢曰體有六篆妙巧入神或象龜文或化龍鱗紆體放尾長翅短身延頸脅翼勢似凌雲八分書唐書曰張廷珪與陳州刺史李邕親善屢上表薦之邕所撰碑碣之文必請廷珪八分書之甚爲時人所重丗論曰安定梁鵠字孟皇善八分書太祖使書信憧宫門牓題書斷曰八分書者秦羽人上谷王次仲所作也又曰後漢師冝官南陽人也靈帝好書徵天下工書於鴻都門至數百人八分稱冝官焉最大則一字徑丈小則方寸千言甚矜其能而性嗜酒或時空至酒家因書壁以雇之觀者雲集酤酒多售隷書呉志曰張昭字布善隷書晉書曰王羲之尤善隷書爲古今之冠論者稱其筆勢以爲飄若遊雲矯若驚龍深爲從伯敦導之所器重晉中興書曰李充字弘度母衛氏廷尉展之妹也充少孤母聦明有訓又善楷書妙叅鍾索丗咸重之充從兄咸亦善書沈約宋書曰文帝善爲隷書又曰羊欣字敬元長隷書父不疑𥘉爲烏程令欣年十二時王獻之爲吴興太守甚知愛之獻之甞夏月入縣欣着新絹裙晝寢獻之書裙數幅而去欣夲工書因此弥善齊書曰王僧䖍善隷書宋文帝見其書素扇歎曰非唯跡逾子敬文當器雅過之齊書曰周顒少徃外氏車騎將軍臧質家得衛常散隷書法學之甚能文惠太子使顒書玄圃茅齋璧國子祭酒何胤以倒薤書求就顒換之顒笑曰天下有道丘不與易也三國典略曰周白石縣男趙文深以題牓之功除魏興郡守文深字德夲南陽宛人也少學楷隷有鍾王之則當時書唯文深及兾㑺而已王褒尢善書文深慙恨形於言色後知好尚難及改習褒書竟無所成轉𬒳譏誚謂之學歩邯鄲焉至於碑榜人莫之逮褒亦推之宫殿樓問皆其迹也丗宗令至江陵書景福寺碑蕭察觀而美之陳書曰蕭引善隷書爲當時所重髙宗甞披奏事指引署名曰此字筆勢翩翩似鳥之欲飛引謝曰此乃陛下假其羽毛耳唐書曰薛稷好古愽雅尤工隷書自貞觀永徽之際虞丗南禇遂良時人宗其書跡自後罕能繼者稷外祖魏徵家圖籍多有虞禇舊跡稷銳精模倣筆能遒麗當時無及之者書斷曰隷書者秦下邽人程邈所作也邈字元岑始爲縣獄吏得罪始皇幽繫雲陽獄中覃思十年益小篆方圎而爲隷書三千字奏之始皇善之用爲御史以奏事煩多篆家難成乃用隷書爲隷人佐書故曰隷書又曰和帝時賈魴撰滂喜篇以蒼頡爲上篇訓纂爲中篇滂喜爲下篇所謂三蒼也皆是隷字冩之隷法由兹而廣酈善長水經注曰臨淄人發古冡得棺前和外隱起爲隷字言齊太公六代孫胡公之棺也唯三字是古餘同今書證知隷字出古非始於秦也成公綏隷勢曰蟲篆旣䌓草藁近僞適之中庸莫尚於隷草書東觀漢記曰北海靜王睦善草書臨病明帝驛馬令作草書尺牘十首焉范瞱後漢書曰張超並善於草書妙絶時人魏志曰劉廙轉五官將士學文帝器之命廙通草書晉書曰王獻之時議者以爲羲之草書江左中朝莫有及者獻之骨力逺不及父而媚趣過之又曰衛瓘字伯玉與尚書郎燉煌索靖俱善草字時人號之一臺二妙漢末張芝芝字伯英善草書論者謂瓘得伯英之筋靖得伯英之肉北齊書曰趙仲舒善草隷雖與弟書字皆楷正云草不可不解若放之於人即似相輕易若當家卑㓜又恐其疑三國典略曰蕭子雲齊䂊章文獻王之子有文學工草書與兄子顯子昭齊名少子特又善書梁武帝稱之曰子敬之迹不及逸少蕭特之書遂逼其父陳書曰文帝時軍人於丹徒盗發晉郄曇墓獲晉右軍將軍王羲之書及諸名賢遺跡事覺其書並没縣官藏于祕府文帝以伯茂好古多以賜之由是伯茂大工章草甚得右軍之法伯茂始興王也唐書曰賀知章善草書好事者供其牋翰每紙不過數十字共傳寳之時有呉郡張旭亦與知章相善而好酒毎醉後號呼狂走索筆揮灑變化無窮若有神助時人號爲張顚三輔决録曰趙襲字元嗣爲燉煌太守先是杜伯度崔子玉以工草稱於前丗襲與羅暉亦能草頗自矜誇故張伯英與襲同郡太僕朱賜書曰上比崔杜不足下方羅常有餘張壹非草書曰夫草書之興也其於近古乎上非文象所垂下非河雒所吐中非聖人所造蓋秦之末官書煩冗戰攻並作軍書交馳羽檄分飛故隷草趣急速耳示簡易之指非聖人之業也今之學草者不思其簡易之旨直以爲杜崔之法龜龍所見也齓齒以上苟任渉學者廢倉頡史籕竟以杜崔爲楷私書相與庶獨就書云適迫遽故不及草草夲易而速今反難而遟失指多矣夫杜崔張子皆有超俗絶丗之才愽學餘暇遊手于斯後丗慕焉專用爲務鑚堅仰髙忘其罷勞夕惕不息昃不睱食十日一筆月數丸墨領䄂如皁脣齒常黒雖處衆坐不遑談戯展指畫地見䚡蘇來切角中骨也出血猶不休輟然其爲字無益工拙亦效嚬者之増醜學歩者之失節也王右軍自叙草書勢曰昔秦時諸侯爭長簡檄相傳望烽走馹正以篆隷之難不救其速遂作赴急之書蓋今草書也其先岀自杜氏以張爲祖以衛爲父索范者伯叔也二王父子可謂兄弟薄爲庶息羊爲僕隷自而叙之亦不失倉公觀鳥跡之意抑體有踈宻意有倜儻或有飛走流注之勢驚竦峭絶之氣滔滔閑雅之容卓犖調宕之志百體千形而呈其巧豈可一槩而論哉書斷曰如淳云作起草爲藁姚察曰草猶麄書爲夲曰藁蓋剏文議出於此草書之先因於起草又曰晉王逸少妻郄氏甚工書七子獻之最知名玄之凝之徽之操之並工草書凝之妻謝藴有才華亦善書甚爲君舅重焉獻之猶善草書㓜學於父次習於張尓後改變制度別刱其法率尓師心冥合天矩觀其逸志莫之與京齊謝朓字玄暉風華黼藻當時獨歩書甚有聲草殊流美亦猶薄暮川上則餘霞照人晩春林中則飛花滿目宋蕭思話工書學於羊欣得其草妙崗連盡望勢不斷絶雖無竒峯壁立之秀可謂有巧矣袁昂云羊真孔草蕭行范篆各一時之妙也飛白書宋書曰王僧䖍爲尚書令甞爲飛白書題尚書壁曰圎行方止物之定質修之不巳則溢髙之不巳則躓引之不巳則遺是故去之冝疾當時嗟賞以比座右銘唐書曰劉洎除散騎常侍洎性踈俊敢言太宗工王羲之書尤善飛白甞宴三品巳上於玄武門帝操筆作飛白字賜羣臣或乗酒爭取於帝手洎登御座引手得之皆奏曰洎登御牀罪當死請付法帝笑而言曰昔聞婕妤辭軰今見常侍登牀馬周太宗甞以神筆賜周飛白書曰鸞鳯凌雲必資羽翼股肱之寄誠在忠良髙宗爲飛白書以賜侍臣賜戴至德曰泛洪源俟舟檝賜郝處俊曰飛九霄假六翮賜李玄敬曰資啓沃罄丹誠大業拾遺曰大業年煬帝將幸江都命越王侑留守東都宫女半不隨駕爭泣留帝攀車借別指血染鞅帝不廻因飛白題二十字留賜宫妓云我夢江都好征遼亦偶然但留顔色在離別只今年唐㑹要曰貞觀十八年五日端午日太宗爲飛白書作鸞鳯虬龍等字筆勢驚絶謂司徒長孫無忌吏部尚書楊師道曰五日舊俗必用服翫相賀朕今各賀君飛白扇二枚庶動清風以增美德書斷曰飛白書者後漢左中郎蔡邕所作也王隱王愔並云飛白變楷制也夲是宫殿題署勢旣勁大字冝輕微不滿名爲飛白王僧䖍云飛白八分之輕者雖有此說案漢靈帝嘉平年詔蔡邕作聖皇篇篇成詣鴻都門上時方脩飾鴻都門伯喈待詔門下見役人以堊帚成字心有恱焉歸而爲飛白之書漢末魏𥘉並以題署宫閣其體有二剏法於八分窮微於小篆自非蔡公設妙豈能詣此可謂勝寄冥通縹緲神仙之事也法書要録曰飛白夲是宫殿八分之輕者全用揩法吴時張弘好學不仕常着烏巾時人號爲張烏巾此人特善飛白能書者鮮不好之章草書晉書曰王羲之書初不勝庾翼郄愔及其暮年方妙甞以章草荅庾亮而翼深歎伏因與羲之書云吾昔有伯英章草十紙過江顚狽遂乃亡失常歎妙迹永絶忽見足下荅家兄書煥若神明頓還舊觀書斷曰章草書漢黄門令史史游所作也衛常李誕並云漢𥘉而有草法不知其誰蕭子良云章草者漢齊相杜操始變藁法非也王愔云漢元帝時史游作急就章解散隷體麄書之漢俗簡惰漸以行之是也又曰索靖字㓜安善章草出韋誕峻險過也有若山形中裂水勢懸流雪嶺孤松冰河危石其堅勁則古今不逮後漢徐幹字伯張善章草書班固與弟超書稱之曰得伯張書藁知識讀之莫不歎息實亦藝由巳立名自人成後有蘇班者平陵人也五歳能書甚爲伯張之所稱歎又曰後漢張伯英損益伯度章草亦猶逸少增减元帝真書雖潤色開華精於斷割美則美矣至若髙深之致質素之風俱不逮其師也然名爲今古之獨歩又曰張伯英章草書急就章字皆一筆而成合於自然可謂變化至極羊欣云張芝皇象鍾繇索靖時並號書聖張芝善章草書崔瑗云龍驤豹變青出於藍又剏爲今草天縱尤異率意超曠無惜是非若清間長源流而無限縈迴崖谷任於造化至於蛟龍駭獸奔驕拏玃之勢心手隨變窃冥不知其所如也精熟神妙冠絶古今則百丗不易之法式不可以智識不可以勤求若上士游乎沉黙之郷鸞鳯翔乎大皇之野韋仲將謂之草聖豈徒言哉又曰後漢張昶字文舒伯英季弟爲黄門侍郎尤善章草家風不墜弈葉清華書類伯英時人謂之亞聖又曰後漢杜度字伯度京兆杜陵人也御史大夫延年曽孫章帝時爲齊相善章草書雖史游始草書傳不紀其能又絶其跡剏其神妙其唯杜公乎韋誕杜氏傑有骨力而字畫微瘦崔氏法之書體甚濃結字工巧時有不及張芝嘉而學焉轉精其巧可謂草聖超前絶後獨歩無雙矣行書書斷曰後漢頴川劉德升字君嗣造行書即正書之小僞務從簡易相間流行故謂之行書王愔云晉丗以來工書者多以行書著名昔鍾元常善行狎書是也尓後王羲之獻之並造其極焉又曰劉德升桓靈之時以造行書擅名以草剏亦豐妍風流宛約獨歩當時胡昭鍾繇並師其法而胡書體差瘦亦各有德升之美也又曰晉王脩字敬仁善行書甞就右軍求書乃冩東方朔畫讃與之王僧䖍云敬仁書殆窮其妙王子敬每省之曰咄咄逼人太平御覽卷第七百四十九
