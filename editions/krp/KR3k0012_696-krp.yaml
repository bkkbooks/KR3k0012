front:
  text: 太平御覽卷第六百九十六
  hash: sha256:e296d9d5386dacae68328acca2044f889f4a83556d9b6a5538abeb4b4e8fa5aa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_696-1a}
body:
  text: 服章部十三帶大帶裳裙裩帶說文曰帶紳也男子鞶帶婦人帶絲象繫佩之形帶必有巾故從巾釋名曰帶蔕也着於身如物蔕也易訟卦曰或錫之鞶帶終朝三禠之鞶命服之上飾革帶也禮記玉藻曰革帶博二寸漢書曰文帝遺匈奴黄金飾具帶一黄金犀毗又班固與竇將軍牋云復賜固犀毗金頭帶此將軍所帶也東觀漢記曰楊賜拜太常詔賜自所服冠幘綬玉兼革帶又曰鄧遵破匈奴上賜金剛鮮卑緄帶一具典略曰文帝嘗賜劉楨廓落帶其後師死欲取以爲象因書啁楨云夫物因人而貴故在賤者之所不御至尊之側楨荅曰荆山之璞耀元后之寳隨侯之珠燭衆女之好南垠之金登窈窕之首鼲鼯之尾綴侍臣之幘此皆伏朽壞之下潜汙泥之中而楊光千載之上發采疇昔之外楨所帶無他妙飾若實殊異上可納也魏略曰踈勒王獻大秦赤石帶一枚又曰漢陽嘉三年踈勒王獻海西責石金帶呉書曰陸遜破曹休於石亭上脫御金校帶以賜遜又親以帶帶之爲鈎絡帶呉録曰鈎絡者鞍飾革帶也丗名爲鈎絡帶齊書曰張融形皃短醜精神清徹王敬則見融革帶寛殆將至骼謂曰革帶太急融曰旣非歩吏急帶何爲後周書曰隨文作相李穆曰周德旣衰愚智共悉天時若此豈能違天乃遣使謁隨文帝并上十三鐶金帶盖天子服也以微申其意戰國䇿曰魯仲連謂田單曰將軍黄金横帶而馳乎淄䋲之間有生之樂無死之心楚漢春秋曰北郭先生獻帶於淮隂侯曰牛爲人任用力盡猶不置其革呉時外國傳曰大秦國人皆着袴褶絡帶又曰扶南人悉着鈎絡帶穆天子傳曰天子北征舎于珠澤獻白玉食天子賜黄金之環三五朱帶具飾三十西征至赤烏氏先出自周宗乃賜赤烏之人具帶五十鄴中記曰石虎皇后女騎腰中着金環叅鏤帶𫐠異記曰夏侯祖欣爲兖州刺史喪於宫沈僧榮代之祖欣見形詣僧榮沈牀上有一織成寳飾絡帶夏侯曰此帶殊好豈能見之與沈曰甚善夏侯曰卿直許終不見關必以爲施可命焚與沈沈對前燒視此帶巳在夏腰矣應璩新詩曰革帶䋲爲複舄穿無底大帶論語衛靈公曰子張問行子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉子張書諸紳紳大帶詩芃蘭曰容兮遂兮垂帶悸兮容儀可觀佩玉遂遂然垂其紳帶悸悸焉有節度又野有死麕曰無感我恱兮無使尨也吠又都人士曰彼都人士垂帶而厲彼君子女卷髪如蠆匪伊垂之帶則有餘匪伊卷之髮則有旟旟揚也又鳴鳩曰淑人君子其帶伊絲其帶伊絲其弁伊騏騏騏文也弁皮弁也其帶伊絲謂大帶也大帶用素絲以雜色飾焉騏當作琪以玉爲之禮玉藻曰凡侍於君紳垂足如履齊紳垂則磬折齊裳下緝又曰紳長制士三尺有司二尺有五寸子游曰三分帶下紳居二焉韠結三齊又曰素帶終辟大夫素帶辟垂士練帶率下辟居士錦帶弟子縞帶素帶終辟謂諸侯也辟讀如禆冕之裨謂以繒采飾其側也裳釋名曰上曰衣下曰裳裳障也以自障也易坤卦六五曰黄裳元吉象曰黄裳元吉文在中也又易繫曰黄帝堯舜垂衣裳而天下治尚書大傳曰舜曰精華巳竭褰裳去之詩緇衣曰子惠思我褰裳渉洧又鷄鳴曰東方未明顚倒衣裳箋云挈壷氏掌漏刻之節東方未明而爲巳明也又葛屨曰撡撡女手可以縫裳撡撡猶纎纎也要之音㦸之好人服之要領也又七月曰載玄載黄我朱孔陽爲公子裳陽明也又鴻鴈曰乃生男子載衣之裳載弄之璋禮玉藻曰衣正色裳間色又曲禮上曰諸母不漱裳左傳曰華登以呉師救華氏齊烏枝明曰用少莫如齊致死齊致死莫如去備彼多兵矣請皆用劒從之華氏北復即之厨人濮以裳裏首而荷以走曰得華登矣遂敗華氏于新里春秋演孔圖曰駈除名政衣吾衣裳坐吾曲牀濫長九州滅六王至于沙丘亡後漢書曰祭遵爲人廉約夫人裳不加縁東觀漢記曰鮑宣妻桓氏女字少君宣嘗就少君父學父竒其精苦以女妻之裝送甚盛宣謂妻曰少君生富驕習美飾而吾貧賤不敢當禮妻乃悉歸侍御服飾更着短布之裳續漢書輿服志曰樊噲常持䥫揗聞項羽有意殺漢王噲裂裳以褁楯冠之入軍門立漢王旁管子曰桀之時女樂三千人無不服文繡衣裳者鄧析子曰責疲者以舉千鈞督跛者以及走兎駈騏驥於廷求猨猴於檻斯逆理而求之猶倒裳以索領也晏子春秋曰景公飲酒數士衣縠繡之裳一衣而五采具焉又曰景公飲酒數日去冠披裳自鼓盆甕而巳淮南子曰楚欲攻宋墨子聞之自魯趍而徃十日十夜足重繭而不休息裂裳而褁之至于郢見楚王風俗通曰禹入祼國欣起而解裳俗說禹治洪水乃播入祼國君子入俗不改其恒於是欣然而解裳也原其所以當言皆裳祼國今呉即是也𬒳髮文身祼以爲飾盖正朔所不及也猥見大聖之君恱禹文德欣然皆着衣裳矣郭子横洞冥記曰東方朔生三日而母死隣母得而飬之經歲母忽失朔累月暫歸後復去家萬里見一枯樹脫白布裳掛樹裳化爲龍嵇康集自録曰孫登字公和於汲郡北山中爲土窟夏則編草爲裳冬則以髮自覆崔駰逹㫖曰有事則褰裳濡足劉梁七舉曰黼黻之服紗縠之裳繁飾參差微鮮若霜古樂府陌上桑曰秦氏有好女自名爲羅敷緗綺爲下裳紫綺爲上𥜗傅玄裳銘曰上衣下裳天地則也服從其冝君子德也楚辭曰青雲衣兮白蜺裳又曰採薜荔以爲裳又曰披綵裳之芬芳又曰制芰荷以爲衣兮集芙蓉以爲裳楊雄反騷曰𬒳芙蓉之朱裳裙釋名曰裙下裳也連接裙幅也緝下撗縫緝其下也縁裙之柂縁也又曰裙裏衣也古服裙不居外皆有衣籠之楊雄方言曰陳魏之間謂裙爲帔音披繞衿謂之裙東觀漢記曰王良爲司徒司直妻布裙徒跣曳柴續漢書曰漢明德太后秃裙不縁又五行志曰獻帝時女子好爲長裙而上甚短魏略曰燉煌俗婦人作裙攣縮如羊腸用布一疋皇甫隆爲太守禁改之魏志曰管寕恒着布裙宋書曰羊欣字敬元年二十時王獻之爲呉興太守甚知愛之欣嘗夏月着新絹裙晝寢獻之入縣見之書裙數幅而去欣書夲工因此弥善齊書曰魚復侯子響不道帝以兵圍之有司奏絶子響属籍賜爲蛸氏子響宻作啓數𥿄藏妃王氏帬腰中具自申明云輕舫還闕而不得見此苦之深唯願矜之無使竹帛齊有反父之子父有害子之名後魏書曰河間人齊與太武攻赫連昌帝以微服入其城齊固諌不許乃與數人從帝入城内旣覺諸門悉閇帝及齊等因入其宫中得婦人裙繫之槊帝乗而上因此得㧞於齊有力焉北齊書曰丗祖爲胡皇后造真珠裙積所費不可勝計後𬒳火燒之晉東宫舊事曰皇太子納妃有絳紗複裙絳碧結綾複裙丹碧紗紋雙裙紫碧紗紋雙裙紫碧紗紋繡纓雙裙紫碧紗縠雙裙丹碧杯文雙裙山陵故事曰梓宮有緗絳雙裙無腰晉宋舊事曰崇進皇太后爲太皇太后有絳碧絹雙裙絳絹褥裙緗絳紗複裙白絹裙四王起事曰惠帝還洛陽得鹿犢事一乗以單帛裙爲幃河東記曰西河無𧖟桑婦女着碧纈裙上加細布裳秦州記曰婦人着裙制乃三千餘幅崔鴻十六國春秋後趙録曰孟卓字君偉少脩苦之志着單裙十年不換西京雜記曰趙飛鷰爲皇后其女弟上織成裙列女傳曰梁鴻妻孟光布裙荆釵汝南先賢傳曰戴良嫁五女皆布裙無縁裙四等眞人内傳曰南極夫人𬒳錦服青羽裙俗說曰車武子婦大妬夜恒出掩襲車車後呼其婦兄顔熈夜宿共眠取一絳裙掛着屏風上其婦果來拔刀逕上牀發欲刃牀上人定㸔乃是其兄於是慙羞而退繁欽定情詩曰何以合懽欣紈素三條裙乗晳近遊賦曰着紫裙之禆又曰帽有四角之隆裙有三條之殺裩晉書曰王澄之荆州送者傾城澄脫衣着犢鼻裩上樹取鵲􅑹音冦傍若無人晉記曰客詣劉伶值其祼袒因責伶伶笑曰吾以天爲屋以屋爲裩諸君不當入何怨乎宋書曰桂陽侯義融孫冕字茂德性庸鄙爲郢州刺史暑月露禈上㕔事齊書曰鬰林王常祼袒着紅縠緄梁書曰周弘正善玄理爲當丗所宗藏法師於開善寺講說門徒數百弘正年少未知名着紅禈錦紋髻踞關而聽衆人蔑之弗譴也旣而乗間進難舉坐盡傾法師疑非丗人覘知相賞狎弘正後爲左民尚書夏月着犢鼻裩衣朱衣爲有司所奏彈其放逹如此又曰吉士瞻少時嘗於南蠻國中擲摶無禈褰露於儕軰所侮及平魯休烈軍得絹三萬疋乃作百裩其外並賜軍士不以入室又曰謝幾卿性通脫在省署夜着犢鼻裩與門生登閣道飲酒酣呼爲有司糺奏坐免西京雜記曰司馬相如𥘉與卓文君至成都遂相謀還成都賣酒相如自着犢鼻裩滌器以恥王孫也丗說曰范宣㓗行廉約韓伯字康伯爲豫章太守遺百疋絹不受減五十疋復不受如是减半遂至一疋旣終不受韓後與范載就車中裂二丈與范云人寧可使婦無裩耶范笑而受之阮籍大人先生傳曰羣虱之處禈逃于深縫自以爲吉宅君子之處城中何異虱處禈中乎竹林七賢論曰諸阮皆儒學富財唯阮咸好酒家貧俗七月七日曬衣諸阮庭中並列綈錦咸以長竿掛牘鼻布裩人問之曰未能免俗聊復爾耳語林曰桓宣武性儉着故禈上馬不調裩敗五形遂露太平御覽卷第六百九十六
