body:
  text: 皇親部十七諸王下王妃諸王下魏志曰鄧哀王沖字倉舒少聦察歧嶷生五六歳智惠所及有若成人之智孫權曾致巨象太祖欲知其斤重訪之羣下咸莫能出其理沖曰置象大舡之上而刻其水痕所至稱物以載之則校可知矣太祖大恱時軍國多事用刑嚴重太祖馬鞍在庫而爲䑕所齧庫吏懼必死欲面縛首罪猶懼不免沖謂曰待三日然後自歸沖於是以刃穿單衣如䑕齧者謬爲失意貌有愁色太祖問之沖對曰丗俗以爲䑕齧衣者其主不吉今單衣見齧是以憂慼太祖曰此妄言耳無所苦也俄而庫吏以齧鞍聞太祖笑曰兒衣在側尚齧況鞍懸柱乎一無所問冲仁愛識逹皆此類也太祖數對羣臣稱述有欲傳後意年十三病卒太祖親爲請命及亡哀甚文帝寛喻太祖太祖曰此我之不幸而汝曹之幸也又曰中山王衮建安二十一年封平郷侯少好學年十餘歳能屬文毎讀書文學左右常恐以精力爲病數諌止之然性所樂不能廢也又曰樂陵王茂性傲很少無寵於太祖及文帝丗又獨不王太和元年徙封聊城公其年爲王詔曰昔象之爲虐至甚而舜猶侯之有􅋻近漢氏淮南阜陵皆爲亂臣逆子而錫土有虞建之於上古漢文明帝行之于前代斯皆敦叙親親之厚義也聊城公茂少不閑禮教長不務善道先帝以爲古之立諸侯也皆命賢者故姬姓未有不爲侯者是以獨不王茂太皇太后數以爲言如聞茂頃來小知悔昔之非今封茂爲聊城王以慰太皇太后下流之念又曰任城威王彰字子文少善射御膂力過人手格猛獸不避險阻數從征伐志意慷慨太祖常抑之曰汝不念讀書慕聖道而好乗汗馬擊劒此一夫之用何足貴也或諫彰讀書彰謂左右曰大丈夫一爲衛霍將十萬騎馳沙漠驅戎狄立功建號耳何能爲愽士耶又曰陳思王植字子建年十餘歳讀誦時論及辭賦數十萬言善屬文太祖甞視其文謂植曰汝倩人耳植跪曰言出爲論下筆成章頋當面試奈何倩人時鄴銅爵臺新成太祖悉將諸子登臺使各爲賦植援筆立成可觀太祖甚異之性簡易不治威儀輿馬服飾不尚華麗毎進見難問應聲而對特見寵愛蜀志曰魯王永字公𥘉永憎官人黄皓皓旣信任用事構永於後主稍䟽外永至不得朝見者十餘年呉書曰南陽王和字子孝𬒳譴之長沙行過蕪湖有鵲巢于㠶檣故官僚聞之皆憂慘以爲檣非乆安之象或言鵲巢之詩有積行累功以致爵位之言今王至德茂行當復國儻神靈以此告寤人意乎呉志曰魯王霸字子威和同母弟也和爲太子霸爲魯王寵愛崇特與和無殊頃之和霸不穆之聲聞於權耳權禁斷徃來假以精學又曰齊王奮字子揚居武昌權薨太愽諸葛恪不欲諸王處江濵兵馬之地徙奮於䂊章奮怒不從命又數越法度恪上牋諫曰帝王之尊與天同位是以家天下臣父兄大王冝上惟太伯順父之志中念河間獻王東海王彊恭敬之節下當存抑驕恣荒亂以爲警戒晉書曰安平獻王孚丗祖受禪爲太宰一門三丗同時十人封王二人丗子父子位極人臣子孫咸居大官出則旌旗節鉞入則貂蟬衮冕自公族之寵未始有也享年九十然而夙夜滋恭恒有履冰之懼又曰安平王孚武帝以孚明德屬尊當宣化樹教爲羣后作則遂備置官屬焉又以孚內有親戚外有交遊惠下之費而經用不豐奉絹二千疋及元㑹詔孚輿車上殿帝於階迎拜旣坐帝親奉觴上壽如家人禮帝毎拜孚跪而止之又給以雲母輦青蓋車孚雖見尊寵不以爲榮常有憂色又曰安平獻王孚性通和以貞白自立未甞有怨於人陳留殷武有名於海內甞罹罪譴孚徃省之遂與同處分食談者稱焉又曰平原王幹字子良宣帝子太始元年封平原王邑一千三百户四年給鼔吹駙馬二疋使服侍中之服幹不治國事雖有爵禄若不在身所得俸秩皆露積腐爛齊王囧爲長沙王乂所殺幹哭之哀謂左右曰宗室轉衰唯此兒最可而復害之從今殆矣又曰文帝崩齊王攸率禮過哀上以攸至孝毀甚二年五月文明皇太后親臨省攸攸毀瘠塵黒貌不可識太后留攸慰撫旬日還中詔勉攸曰若萬一加以他疾將復如何冝逺慮深思不可專守一意以䧟於不孝若復不從徃言當遣人監守飲食又曰武帝子乂字仕慶封長沙王性果厲有威斷𥘉入洛謂成都王曰天下先帝之業王冝維之時齊王囧已至聞乂言者皆憚之又曰成都王頴字章度武帝子後屯騎校尉加散騎常侍形狀美而神明少乃不知書又曰梁孝王肜宣帝子拜大將軍領西戎校尉因大㑹語王銓曰我從兄爲尚書令不能啖大臠銓知肜求爲尚書令荅曰下邳王爲令與天下共嚼啖大臠故難公在此獨嚼肜曰長安大臠誰耶詮荅盧播是肜曰是吾家吏隱忍之耳詮曰天下皆王家吏王法可不復行之耶又曰齊王攸好學不倦借人書皆爲治護時還有水旱則出租秩加賤以賑國人須豐年乃收入夲直太康三年詔齊王攸當出方嶽遂撫其國加都督青州增封濟南郡備物典䇿軒懸之樂六佾之舞賜黄鉞朝車乗輿之副晉陽秋曰齊王冏輔政士以牛酒郊勞平原王幹獨齎百錢于懷賀之晉中興書曰譙王丞鎭湘州至武昌釋軍備見王敦敦因宴集謂丞曰大王雅素佳士非將御才也丞曰公未盡耳安知鈆刀不能一割丞以敦欲測其情故發此言敦果謂錢鳯曰彼不知懼而學壯語此之不武何能爲聽丞之鎭又曰武陵威王晞爲桓温所收忠敬王少子也𬒳廢後新安王遵初封新寧王年十二受拜流涕哀慼左右將軍桓伊當造遵遵恕門人曰何通桓氏門人曰桓伊與桓温踈宗相見無嫌遵曰我聞人姓木邊便欲殺之況諸桓乎由是少稱聦察及長輙凡退無復名望晉百官表曰王古號也夏殷周稱王金璽龜釰纁朱綬五時朝服逺遊冠佩山玄玉沈約宋書曰彭城王義康性好吏職銳意文案糺剔是非凡所陳奏入無不可方伯並委義康授用由是朝野輻湊勢傾天下義康亦自彊不息無有懈倦又曰南郡王義宣爲荆州刺史白晳美鬚眉長七尺五寸腰帶十圍多畜嬪媵後房千餘尼媪數百男女四十人崇飾綺麗費用殷廣又曰江夏王義恭性嗜不恒與時移變自始至終屢遷弟宅與人遊𣢾意好亦多不終而奢侈無度不受財寳前廢帝狂勃無道義恭元景等謀欲廢立永光元年八月廢帝親率羽林兵於第害之并其四子時年五十三斷折義恭支體分裂腸胃挑取眼睛以蜜漬之謂之爲鬼目粽又曰衡陽王義季爲荆州刺史先是臨川王義慶在任巴蜀亂擾師旅應接府庫空虚義季躬行節儉蓄財省用數年間還復充實隊主續豐母老家貧無以充養遂斷不食肉義季哀其志給豐母月白米二斛錢一千并制豐噉肉義季素拙書上聽使餘人書啓事唯自署名而巳二十一年徴爲都督南徐兖青兾幽六州諸軍事南兖州刺史登舟之日帷帳器服諸應隨刺史者悉留之荆楚以爲美談又曰桂陽王休範進位司空休範素凡訥少知解不爲諸兄所齒遇太宗常指左右人謂王景文曰休範人才不及此以我弟故生使冨貴釋氏願生王家良有以也又曰建平宣簡王宏字休度文帝第七子也少而閑素篤好文籍太祖寵愛殊常爲立第鷄籠山盡山水之美建平國髙他國一階又曰晉平王休祐貪淫好財色在荆州列所營財貨以短錢一百賦民田登求白米一斛皆令徹白若折者悉簡糴此米升一百至時又不受米平米責錢凡諸求皆如此蕭子顯齊書曰竟陵王子良雲英少尚禮才好士居不疑之地傾意賔客天下才學皆遊集焉後魏書曰河南王平原拜齊州刺史善於懷撫邊民歸附者千有餘家時歳頻不登齊民飢饉平原以私米三千餘斛爲粥以全民命北州戍卒一千餘人還者皆給路糧百姓咸稱詠之州民韓凝之等千餘人詣闕訟之髙祖覽而嘉歎又曰任城王澄字道鏡少好學文明太后引見誡厲之顧謂中書令李冲曰此兒風神秀發德音閑婉當爲宗室領䄂後爲中書令改授尚書蕭頥使庾蓽來朝蓽見澄音韻道雅風儀秀逸謂主客郎張彛曰徃魏任城乃以文見美也又曰安定王休少而聦慧治斷有稱車駕南伐領大司馬髙祖親行軍遇休以三盗人徇於軍將斬之有詔赦之休執曰陛下親御六師跋渉野次軍行始尓已有姧切如其不斬何以息盗請必行刑以肅姧匿詔曰大司馬執憲誠應如是但因縁㑹朕聞王者之體亦應有非常之澤雖違軍法可特原之休乃奉詔髙祖謂司徒馮誕曰大司馬嚴而秉法諸君不可不愼於是六軍肅然又曰永昌王健姿貌魁壯善弓馬逹兵法所征戰常有大功才藝比陳留桓王而智略過人又曰臨淮王彧字文若少有才學時譽甚美侍中崔光見彧退而謂人曰黒頭三公當此人也瑯瑘王誦有名人也見之未甞不心醉忘疲又曰東平王匡字建扶性耿介有氣節髙祖器之謂曰叔父必能儀刑社稷匡輔朕躬今可改名爲匡丗宗即位時茹皓始有寵百寮微憚之丗宗曾於山陵還詔匡陪乗又命皓登車皓褰裳將上匡諌上丗宗推之令下當時壯其忠謇又曰廣陵王羽字叔飜少而聦惠有斷獄之稱領廷尉髙祖幸羽第與諸弟言曰朕昨親受民訟始知廣陵之明了咸陽王禧對曰臣年爲廣陵兄明爲廣陵弟髙祖曰我爲汝兄汝爲羽昆汝復何恨又曰彭城王勰字産和小而歧嶷姿性不羣勰生而母潘氏卒及有所知啓求追服文明太后不許乃毀瘠三年不叅吉慶髙祖大竒之敏而躭學不捨晝夜愽綜經史雅好屬文從征河北破新野南陽髙祖令勰爲露布勰辭曰臣聞露布者布於四海露之耳目必須威示天下以臣小才豈是大用髙祖曰但可爲之及就尤類帝文有不見者咸謂御筆髙祖曰汝所爲者人謂吾制非兄則弟誰能辯之北史齊書曰安德王延宗文襄第五子母陳氏廣寧王伎也延宗㓜爲文宣所養年十二猶騎置腹上令溺已齊中抱之曰可怜止有此一箇問欲作何王對曰欲衝天王文宣問楊愔愔曰天下無此郡名願使安於德於是封安德焉隋書曰楊雄髙祖族子也𥘉封清漳王仁壽𥘉髙祖曰清漳之名未允聲望命職方進地圖上指安德郡以示羣臣曰此號足爲名德相稱於是改封安德王唐書曰紀王愼爲貝州刺史愼少好學長於文吏皇族中與越王貞齊名時人號爲紀越賈誼書曰髙皇帝分天下以封有功之臣反者如蝟毛而起髙皇帝以爲不可是故去不義諸侯空其國擇良日立諸子雒陽上東門之外諸子畢王而天下乃安蔡邕獨斷曰漢制皇子封爲王其實諸侯也周末諸侯或稱故以王號加之惣名諸侯王法律家皆曰列侯天子大社以五色土爲壇皇子封爲王者受天子太社之土以所封之方色東方受青南方受赤他以其方色藉以白茅歸國以立社稷謂之茅土王妃史記曰趙王友以諸吕女爲后弗愛愛他姬諸吕女妬怒讒之太后誣以罪太后怒以故召趙王趙王至置邸不見命衛士圍守之弗與食趙王餓廼歌曰諸吕用事兮劉氏危迫脅王侯兮強授我妃我妃旣妬兮誣我以惡讒女亂國兮上曾不寤續漢書曰樂安陳夫人孝質皇帝母也家夲魏郡少以伎入孝王家得幸生質帝梁兾欲專國權令帝母不得至京都又帝短祚是以外家無他寵帝拜夫人爲王妃范曄後漢書曰董卓置弘農王於閣上使郎中令李儒進酖王乃與妻唐姬及宫人別坐者皆歔欷王謂姬曰卿王者妃勢不復爲吏臣妻自愛從此長辭遂飲藥而死時年十八唐姬潁川人也王薨歸郷里父欲嫁之姬誓不許及李􅔸破長安遣兵抄關東略得姬􅔸因欲妻之不聽而終不自名尚書賈詡知之以狀白獻帝帝聞感愴乃下詔迎姬置園中使侍中持節拜爲弘農王妃魏志曰中山恭王衮衮得病詔遣太醫視疾又遣太妃沛王林並就省疾又曰彭城王據建安十六年封范陽侯以環太妃彭城人徙封彭城呉志曰呉主孫權謝夫人㑹稽山隂人也父㷡權聘以爲妃愛幸有寵後權納姑孫徐氏欲令謝下之不肯由是失志早卒又曰呉主孫權徐夫人呉郡冨春人也祖父眞與權父堅相親堅以妺妻眞生琨琨生夫人𥘉適同郡陸尚尚卒權爲討虜將軍在呉娉以爲妃後母養子登後權遷移以夫人妬忌廢處呉積十餘年㝷卒臧榮緒晉書曰賈充前妻李氏生二女荃濬禁錮解荃等屢請充迎其母而父不判充當鎭關中屯軍城西爲供帳受百官錢荃濬遂突出於坐中叩頭流血訴充并陳說羣客以母應還之意荃是齊獻王之妃衆賔皆驚起散出充甚愧愕晉中興書曰海西李皇后庾氏字道憐司空冰女也初爲海西王妃海西即位拜爲皇后㤗和元年崩葬敬平陵海西公夫人無子又曰簡文皇后王氏字蘭姬后以冠族太宗納焉𥘉爲㑹稽王妃生子道生爲丗子並失太宗意后及道生俱𬒳幽廢以憂薨烈宗踐祚追尊曰順皇后又曰中宗母太妃夏侯氏字光姬一字銅環太妃爲恭王妃生中宗王薨中宗嗣立稱王太妃永嘉元年薨還葬瑯瑘又曰元敬皇后虞氏字孟母濟陽外黄人中宗之爲王納后爲妃永嘉六年薨又曰康獻皇后禇氏字䔉太傅裒之女也后以名家人爲瑯瑘王妃生孝穆皇帝蕭子顯齊書曰隋郡王子隆字雲興娶尚書令王儉女爲妃上以子隆能屬文謂儉曰我家東阿重出實爲皇家蕃屏後魏書曰元匡爲太宗正卿河南邑中正奏親王及始蕃二王蕃妻悉有妃號而三蕃巳下皆謂妻上不得同爲妃名而下不如五品巳上有命婦之號竊以爲疑曰夫貴於朝妻榮於室婦人無定升降從夫三蕃旣啓王封妃名亦同等妻者齊也理與紀齊可從妃例自是三蕃王妻名號始定又曰陽平王顯詔曰顯所生親李誕育懿胤儀形藩國母縁子貴義著春秋可授陽平王太妃以申典例太平御覽卷第一百五十一
