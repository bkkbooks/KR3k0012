front:
  text: 太平御覽卷第九十八皇王部二十三
  hash: sha256:06d352a69af30f3fdf995a75fda04c27e18ad1e99ccf5ee69d03fb83c6b5fbb7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_098-1a}
body:
  text: 西晉懷帝愍帝東晉元帝明帝成帝懷皇帝晉書曰孝懷皇帝諱熾字豊度武帝第二十五子也光熈元年封豫章郡王屬惠帝之時宗室構禍帝冲素自守門絶賔遊不務世事專玩史籍有譽於時𥘉拜散騎常侍及趙王倫篡見収爲射聲校尉累遷車騎大將軍都督青州諸軍事未之鎮永興元年改授鎮北大將軍都督鄴中諸軍事十二月丁亥立爲皇太弟帝以清河王覃本太子也懼不敢當典書令廬陵脩肅曰二相經營王室志寜社稷儲貳之重冝歸時望親賢之舉非大王而誰清河㓜弱未允衆心是以旣升東宫復賛藩國今乗輿播越二宫乆曠常恐氐差飲馬於涇川螘衆控弦於㶚水冝及吉辰時登儲副上翼大駕早寜東京下允黔首顒顒之望帝曰卿吾之宋昌也乃從之光熈元年十一月孝惠帝崩羊皇后以於太弟爲㛐不得爲太后催清河王覃入巳至尚書閤侍中華混等急召太弟癸酉即皇帝位大赦皇后羊氏爲惠皇后居弘訓宫追尊所生太妃王氏爲皇太后立妃梁氏爲皇后十二月南陽王摸殺河間王顒於雍谷永嘉元年春正月癸丑朔大赦改元除三族刑以太傅東海王越輔政二月辛巳東萊人王彌起兵反㓂靑徐二州三月庚午立豫章王詮爲皇太子辛未大赦庚辰東海王越岀鎮許昌五月馬牧帥汲桑聚衆反叛魏郡太守馮嵩遂䧟鄴城害新蔡王騰燒鄴宫火旬日不滅入掠平原山陽公劉秋遇害洛陽歩廣里地䧟有二鵝出色蒼者冲天白者不能飛秋七月巳酉朔東海王越進屯官渡以討汲桑巳未以平東將軍琅瑘王睿爲安東將軍都督楊州江南諸軍事假節鎮建鄴八月己卬朔撫軍將軍荀晞音希敗汲桑於鄴十二月戊寅并州人田蘭薄盛等斬汲桑于樂陵東海王越矯詔囚清河王覃于金墉城癸卯越自爲丞相以撫軍荀晞爲征東大將軍二年春正月丙子朔日有蝕之丁未大赦二月辛卯清河郡王覃爲東海王越所害冬十月甲戌劉元海僣帝號於平陽仍稱漢三年三月丁巳東海王越歸京師乙丑勒兵入宫於帝側収近臣中書令繆播帝舅王延等十餘人並害之大旱江漢河洛皆竭可渉九月景寅劉聦㓂浚儀遣平北將軍曹武討之丁丑王師敗績東海王越入保京城聦至西明門越禦之戰於宣陽門外大破之使車騎將軍王堪平北將軍曹武討劉聦王師敗績堪奔還京師劉聦攻洛陽西明門不尅冬十一月石勒䧟長樂安北將軍王斌遇害因屠黎陽乞活師李惲薄盛等帥衆救京師聦退走惲等又破王彌于新汲四年十月壬子以驃騎將軍王浚爲司空平北將軍劉琨爲北平大將軍京師飢東海王越羽檄徴天下兵帝謂使者曰爲我語諸征鎮若今日尚可救後則無逮矣時莫有至者十一月甲戍東海王越帥衆出許昌以行臺自隨宫無復守衛荒饉日甚殿内死人交横府寺營署並掘壍自守盗賊公行桴鼔之音不絶越軍次項自領豫州牧鎭東將軍周馥表迎大駕遷都壽陽越使裴頠討馥爲馥所敗走保東城請救於琅瑘王睿五年春正月帝宻詔荀晞討東海王越罪狀告方鎮討之以征東大將軍荀晞爲大將軍景子東海王越薨五月進司空王浚爲大司馬琅瑘王睿爲鎮東大將軍東海王越之出也使河南尹潘滔居守大將軍荀晞表遷都倉垣帝將從之諸大臣畏滔不敢奉詔且宫中及黄門戀貲財不欲出至是飢甚人相食百官流亡者十八九帝召羣臣㑹議將行而警衛不備帝撫手歎之曰如何曽無車輿乃使司徒傳祇出詣河隂脩理舟艥爲水行之備朝士數十人導從帝歩出西掖門至銅駞街爲盗所掠不得進而還六月癸未劉曜王彌石勒同㓂洛川王師頻爲賊所敗死者甚衆庚寅司空荀藩光禄大夫荀組奔轘轅太子左率温夷夜開廣莫門奔小平津丁酉劉曜王彌入京師帝開華林園門出河隂藕池欲幸長安爲曜等所追及曜等遂焚燒宫廟辱妃后呉王晏竟陵王楙音茂尚書左僕射和郁等皆遇害百官士庶死者三萬餘人帝蒙塵於平陽劉聦以帝爲㑹稽公荀藩移檄州鎮以琅瑘王爲盟主豫章王端東奔荀晞晞立爲皇太子自領尚書令且置官屬保梁國之蒙縣百姓飢米斛萬餘價八月劉聦使子粲攻䧟長安太尉征西將軍南陽王模遇害長安遺人四千餘家奔漢中九月癸亥石勒襲陽夏至于蒙縣大將軍荀晞豫章王端並没于賊六年春正月帝在平陽九月辛巳前雍州刺史賈疋討劉粲於三輔走之關中小定乃與衛將軍梁芬京兆太守梁綜共奉秦王業爲皇太子於長安七年春正月劉聦大㑹使帝著青衣行酒侍中庾珉號哭聦惡之丁未帝遇弑崩于平陽在位七年時年三十晉陽秋曰懷帝天姿清劭少有聲名若遭承平之丗足爲守文佳主而繼惠帝擾亂之後東海專政禄去王室無幽厲之釁而有犬戎之禍悲夫愍皇帝晉書曰愍皇帝諱鄴字彦旗武帝孫呉孝王晏之子也岀繼伯父秦獻王東襲封秦王永嘉二年拜散騎常侍撫軍將軍及洛陽傾覆避難於滎陽密縣與舅荀藩荀組相遇自密南趣許頴豫州刺史閻鼎與前撫軍長史王毗司徒長史劉疇中書郎李昕及藩組等同謀奉帝歸于長安而疇等中塗復叛鼎追殺之藩組僅而獲免鼎遂扶帝乗牛車目宛趣武關歸於長安頻遇山賊士卒亡散次于藍田鼎告雍州刺史賈疋疋遽遣州兵迎衛逹于長安又使輔國將軍梁綜助守時有玉龜出霸水神馬鳴城南元年九月辛巳奉秦王爲皇太子登壇告類建宗廟社稷大赦加疋征西將軍以秦州刺史南陽王保爲大司馬賈疋討賊張連遇害衆推始平太守麴允領雍州刺史爲盟主承制選置建興元年夏四月景午奉懷帝崩問舉哀成禮壬申即皇帝位大赦改元以衛將軍梁芬爲司徒雍州刺史麴允爲使持節領軍將軍録尚書事京兆太守索綝爲尚書右僕射五月詔琅瑘王曰朕以冲昧纂承洪緒未能梟夷凶逆奉迎梓宫枕戈煩冤肝心抽裂前得魏浚表知公帥先三軍巳據壽春傳檄諸侯恊齊威勢想今漸進巳逹洛陽涼州刺史張軌乃心王室連旗萬里巳到汧隴梁州刺史張光亦遣巴漢之卒屯在駱谷秦川驍勇其㑹如林間遣使適還具知平陽定問云幽并隆盛餘胡衰破然猶恃險當須大舉未知公今所到是以息兵秣馬未便進軍今爲巳至何許當須來旨使乗輿自出㑹除中原也公冝思弘謨猷朂濟逺略使山陵旋反四海有頼故遣殿中都尉劉蜀蘇馬等具宣朕意公茂徳昵屬宣隆東夏恢融六合非公而誰但洛都陵廟不可空曠公冝鎮撫以綏山東右丞相當入輔弼追蹤周邵以隆中興也二年秋七月劉曜趙舟等又逼京都領軍將軍麴允討破之四年七月劉曜攻北地麴允帥歩騎三萬救之王師不戰而潰北地大守麴昌奔于京師曜進至涇陽渭北諸城悉潰建威將軍曽充散騎常侍梁緯少府皇甫陽等皆死之八月劉曜逼京師内外斷絶鎮西將軍焦嵩平東將軍宋哲始平太守笁恢等同赴國難麴允與公卿守長安小城以自固散騎常侍華輯監京兆馮翊弘農上洛四部兵東屯覇上鎭軍將軍胡崧帥城西諸郡兵屯遮馬橋並不敢進冬十月京師飢甚米斗金二兩人相食死者太半太倉有麴數十餅麴允屑爲粥以供帝至是復盡帝泣渭允曰今窘厄如此外無救授死於社稷是朕事也然念將士暴離斯酷今欲聞城未䧟爲羞死之事庶令黎元免屠爛之苦行矣遣書朕意决矣十一月乙未使侍中宋敞送牋於曜帝乗羊車肉袒銜壁輿櫬出降羣臣號泣攀車執帝之手帝亦悲不自勝御史中丞吉㓪自殺曜焚櫬受壁使宋敞奉帝還宫𥘉有童謡曰天子何在豆田中時王浚在幽州以豆有藿殺隠士霍原以應之及帝如曜營營實在城東豆田壁辛丑帝蒙塵於平陽麴允及羣官並從劉聦假帝光禄大夫懷安侯壬寅聦臨殿帝稽首于前麴允伏地慟哭因自殺五年春正月帝在平陽庚子虹霓弥天三日並照平東將軍宋哲奔江左十一月劉聦岀獵令帝行車騎將軍戎服執㦸爲導百姓聚而觀之故老或歔欷流涕聦後因大㑹使帝行酒洗爵反而更衣又使帝執蓋晉臣在座多失聲而泣尚書郎辛賔抱帝慟哭爲聦所害十二月戊戌帝遇弑崩于平陽在位五年時年十八帝之繼皇統也屬永嘉之亂天下崩離長安城中户不盈百墻宇頽毀蒿棘成林朝廷無車馬章服唯桑板署號而已衆唯一旅公私有車四乗器械多闕運饋不繼巨猾滔天帝京危急諸侯無釋位之志征鎮闕勤王之譽故君臣窘迫以至殺辱東晉元皇帝晉書曰元皇帝諱睿字景文宣帝曽孫琅耶㳟王覿之子也咸寧二年生於洛陽有神光之異一室盡明所藉藁如始刈及長白毫生於日角之左隆凖龍顔目有精曜頋眄煒如也年十五嗣位琅耶王㓜有令問惠皇之際王室多故毎恭儉退讓以免于禍沉敏有度量不顯灼然之跡故時人未之識焉唯侍中嵆紹異之謂人曰琅耶王毛骨非常殆非人臣之相元康二年拜貟外散騎常侍累遷左將軍從討成都王頴蕩隂之敗叔父東安王繇爲頴所害帝懼禍及將出奔其夜月正明而禁衛嚴警無由得去甚窘迫有頃雲霧晦冥雷雨暴至徼者皆㢮因得潜出頴先令諸關無得出貴人帝旣至河陽爲津吏所止從者宋典後來以䇿鞭帝馬而笑曰舎長官禁貴人汝亦𬒳拘耶吏乃聽過至洛陽迎太妃歸國東海王越之収兵下邳也假帝輔國將軍㝷加平東將軍都督楊州諸軍事越西迎大駕留帝居守永嘉𥘉用王導計始鎮建業以頋榮爲軍司馬賀循爲叅佐王敦王導周顗音擬刀恊等爲腹心股肱賔禮名賢存問風俗江東歸心焉及懷帝蒙塵于平陽司空荀藩等移檄天下推帝爲盟主愍帝即位加左丞相歳餘進位丞相大都督中外諸軍事建武元年春二月辛巳平東將軍宋哲至宣愍帝詔曰時遭屯否皇綱不振朕以寡徳奉承洪緒不能祈天永命紹隆中興至使凶胡敢帥犬羊逼迫京輦朕今幽塞窮城憂慮萬端恐一旦崩潰卿指詣丞相具宣朕意使攝萬機時據舊都脩復陵廟以雪大恥三月帝素服出次舉哀三日西陽王義及羣僚叅佐州郡牧守等上尊號帝不許義等以死固請至于再三帝慨然流涕曰孤罪人也唯有蹈節死義以雪天下之恥庶贖鈇鉞之誅吾夲琅耶王諸賢見逼不巳乃呼私奴命駕將反國群臣乃不敢迫請依魏晉故事爲晉王許之辛卯即王位大赦改元太興元年春正月戊申朔臨朝懸而不樂三月癸丑愍帝崩問至帝斬纕居廬景辰百寮上尊號即皇帝位詔曰昔我髙祖宣皇帝誕膺期運廓開王基景文皇帝奕丗重光緝熈諸夏爰曁丗祖應天順時受兹明命功格天地仁濟宇宙昊天不融降此鞠凶懷帝短丗越去王都天禍荐臻大行皇帝崩殂社稷無奉肆群后三司六事之人疇諮庶尹至于華戎致輯大命于朕躬予一人畏天之威罔弗敢違遂登壇南面受終文祖燔柴頒瑞告類上帝惟朕寡德纉戎洪緒若渉大川罔知攸濟惟爾股肱瓜牙之佐文武熊羆之臣用能弼寜晉室輔予一人思與萬國共兹休慶於是大赦改元庚午立太子紹爲皇太子永昌元年春正月乙卯大赦改元戊辰大將軍王敦舉兵於武昌以誅劉隗爲名龍驤將軍沈充帥衆應之三月徴征西將軍戴若思鎮北將軍劉隗還衛京都劉隗軍于金城右將軍周札守石頭帝𬒳甲徇六師於郊外遣平南將軍陶侃領江州安南將軍甘卓領荆州各帥所統以躡敦後夏四月敦前鋒攻石頭周札開城應賊奮威將軍侯禮死之敦據石頭戴若思劉隗帥衆攻之王導周顗郭逸虞潭等三道出戰六軍敗績尚書令刀恊奔于江垂爲賊所害鎮北將軍劉隗奔于石勒帝遣使謂敦曰公若不忘本朝於此息兵則天下尚可安也如其不然朕當歸于琅耶以避賢路辛未大赦敦自爲丞相都督中外諸軍録尚書事封武昌郡公邑萬户十一月巳丑帝崩于内殿在位六年時年四十七葬平陵廟號中宗孫盛晉陽秋曰昔秦始皇東遊望氣者云五百年後東南金陵之地有天子氣於是始皇改曰秼陵呉人以爲孫權帝之表也盛案始皇逰歳至權僣號四百三十七年考之年數旣不合校之基守又非倫豈應帝王之符而見兆於上代乎有晉金行奄君四海金陵之祥其在斯乎且秦政東遊至是五百二十六年所謂五百年之後當有王者也又孫皓將亡呉郡臨無湖一夜草木自除于湖邊得石凾中有小石青白色長四尺廣二寸餘上有白帝字時人莫察其祥意者豈中宗興五湖之徴歟太康三年建業有㓂餘姚人任振以周昜筮之曰㓂巳滅矣後三十八年楊州當有天子又太安中童謡曰五馬浮渡江一馬化爲龍永嘉大亂王室淪覆唯琅耶西陽汝南南頓彭城五王獲濟至是中宗登祚先是歳鎮辰太白四星聚於牛斗之間五鐸又見于晉陵寘數玄感若合符契焉又𥘉玄石圖有牛繼馬後故宣帝深忌牛氏遂爲二榼共一口以貯酒帝先飲佳者以毒者酖其將牛金而恭王妃夏氏通小吏牛欽而生元帝亦有符云丗說曰元帝始過江謂頋驃騎曰寄人國事志常懷慙䇿跪荅曰臣聞王者天下爲家是以耿毫無定處九鼎後洛邑願陞下無以迁都爲念又曰元帝正㑹引丞相王導登御床王公旣固辭中宗引之彌苦文獻曰使太陽與萬物同暉臣下何以仰瞻明皇帝晉書曰明皇帝諱紹字道畿元皇帝長子也㓜而聦哲爲元帝所寵異年數歳甞坐置膝前屬長安使來因問帝曰汝謂日與長安孰逺對曰長安近不聞人從日邊居然可知也元帝異之明日宴羣寮又問之對曰日近元帝失色曰何乃異間者之言對曰舉目則見日不見長安由是益竒之建興𥘉拜東中郎將鎮廣陵元帝爲晉王及即帝位爲皇太子性至孝有文武才略永昌元年閏月巳丑元帝崩庚寅太子即皇帝位大赦尊所生荀氏爲皇太后大寜元年三月戊寅朔改元臨軒停饗宴之禮懸而不樂二年夏五月王敦矯詔拜其子應爲武衛將軍兄含爲驃騎大將軍帝所親信常從督公乗雄冉曽並爲敦所害六月敦將舉兵内向帝密知之乃乗巴滇駿馬微行至于湖隂察敦營壘而岀軍士疑帝非常人又敦晝寢夢日環其城驚起曰此必黄鬚鮮卑奴來也帝母荀氏燕代人帝狀類外氏鬚黄敦故爲帝云於是使五騎物色追帝帝亦馳去僅以獲免秋七月壬申朔敦遣其兄含及錢鳯周撫鄧岳等水陸五萬至于南岸南温嶠移屯水北燒朱爵桁以挫其鋒帝躬帥六軍岀次南堂至癸酉夜募壯士遣將軍叚秀中軍司馬曹渾左衛叅軍陳嵩鍾寅等甲卒千人渡水掩其未備平旦戰於越城大破之斬其前鋒將何康王敦憤惋而死三年春二月戊戌復三族刑唯不及婦人三月戊辰立皇太子衍爲皇太子大赦増文武位二等大酺三日賜鰥寡孤獨帛閏八月壬午帝不豫召太宰西陽王義司徒王導尚書令卞壷車騎將軍郄鑒護軍將軍庾亮領軍將軍陸曄丹陽尹温嶠並受遺詔輔太子戊子帝崩于東堂在位三年時年二十七葬武平陵廟號肅祖晉陽秋曰明帝文武鑒斷𥘉在東宫敬禮賢士昵近明德自王導庾亮温嶠桓彛阮放皆見親待分好綢繆雅好辭章談論辯明理義與二三君子並著詩論粲然可觀于時東宫號爲多士王敦旣平思求民瘼詔尚書令僕射尚書曰吾飢於飡直言渇於求亮正想諸君逹此懷矣予違汝弼堯舜之相君臣吾雖虚闇庶不距逆耳之談稷契之任諸君居之矣望共朂之丗說曰晋明帝欲起池臺元帝不許之明帝爲太子好養武士夕中作池比曉便成即令謂太子池是也成皇帝晉書曰成皇帝諱衍字世根明帝長子也大寜三年三月戊辰立爲皇太子閏月戊子明帝崩巳丑太子即皇帝位大赦増文武位二等賜鰥寡孤老帛人二疋尊皇后庚氏爲皇太后秋七月癸卯皇太后臨朝稱制咸和元年春二月丁亥大赦改元大酺五日賜鰥寡孤老米人二斛二年十一月豫州刺史祖約歴陽太守蘇峻等反十二月辛亥蘇峻使其將韓晃入姑孰屠蕪湖三年二月庚戍峻至于蔣山假領軍將軍卞壼節六師及峻戰于西陵王師敗績景辰峻攻青溪柵因風縱火王師又大敗尚書令領軍將軍卞壼丹陽尹羊憲黄門侍郎周導廬江太守陶瞻並遇害死者數千人庾亮又敗于宣陽門内遂携其諸弟與郭黙趙裔奔㝷陽於是司徒王導右光禄大夫陸曠荀崧等衛帝於太極殿太常孔愉守宗廟賊乗勝麾戈接於帝座突入太后後宫左右侍人皆見掠奪是時太官惟有燒餘米數石以供御膳百姓號泣震響都邑丁巳峻矯詔大赦又以祖約爲侍中太尉尚書令自爲驃騎將軍録尚書事五月乙未峻逼迁天子于石頭帝哀泣升車宫中慟哭峻以倉屋爲宫九月戊申司徒王導奔于白石庚午陶侃使督護楊謙攻峻于石頭温嶠庾亮陣于白石竟陵太守李陽拒賊南偏峻輕騎岀戰墜馬斬之衆遂大潰賊黨復立峻弟逸爲帥四年二月大雨霖丙戌諸軍攻石頭李陽與蘇逸戰于柤浦陽軍大敗建威長史滕含以銳卒擊之逸等大敗含奉帝御于温嶠舟羣臣頓首號泣請罪丁亥大赦時大兵之後宫闕灰燼以建平園爲宫甲午蘇逸以萬餘人自延陵湖將入呉興乙未將軍王允之及逸戰于漂陽獲之咸康元年春正月庚午朔帝加元服大赦改元増文武位一等大酺三日賜鰥寡孤獨不能自存者米人五斛二月楊州諸郡餞遣使賑給八年夏六月庚申帝不豫詔曰朕以眇年獲嗣洪緒託于羣公之上於兹十有八年未能闡融政道翦除逋祲夙夜戰兢匪遑寜處今遘疾殆不興是用震悼于厥心年齡眇眇未堪艱難司徒琅耶王岳親則母弟體則仁長君人之風允塞時望肆爾群公卿士其輔之以祗奉祖宗明祀恊和内外允執其中嗚呼敬之哉无墜祖宗之顯命壬辰引武陵王晞㑹稽王昱中書監庾氷中書令何充尚書令諸葛恢受頋命癸巳帝崩于西堂在位十七年時年二十二葬興平陵廟號顯宗太平御覽卷第九十八
