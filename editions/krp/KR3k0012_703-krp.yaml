front:
  text: 太平御覽卷第七百三
  hash: sha256:78912e4988c198cee87af9d4acf235c648bf621af9a7ba19eb5049211535f6f6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_703-1a}
body:
  text: 服用部五麈尾如意拂唾壷書臺香爐麈尾晉陽秋曰石勒僞事王浚遺勒麈尾勒爲不執置之於壁朝拜之云見王公所賜如見公也晉書曰王衍夷甫盛才美貌明悟若神毎捉玉柄麈尾與手同色又曰王導妻曹氏妬導令別修舘以安衆妾曹氏知之導將恐有他喧辱命駕恐遲以所執麈尾柄驅牛而進司徒蔡謨聞之謂導曰朝廷欲加公九錫導不之覺但謙退而巳謨曰不聞餘物唯有短轅犢車長柄麈尾導大怒宋書曰張融字思光弱冠有名道士同郡陸脩静以白鷺羽麈尾扇遺之曰此旣異物以奉異人又融臨卒遺令建白旐無旒不設祭令人捉麈尾登復魂又曰張敷好讀玄言兼屬文論弱冠𥘉父邵使與髙士南陽宗少文談繋象徃復數畨少文欲屈握麈尾歎曰吾道東矣於是名價曰重齊書曰周顒音辭辯麗長於佛理著三宗論言空假義西凉州智林道人遺顒書深相賛美言捉麈尾來四十餘載頗見宗録唯此塗白黒無一人得者非意此音猥來入耳見重如此梁書曰盧廣有儒術爲國子博士於學中講說僕射徐勉以下畢至謝舉造坐屢折廣詞理遒邁廣深歎服仍以所執麈尾贈之以况重席焉陳書曰張譏善講論後主在東宫集宫僚置宴時造玉柄麈尾新成後主親執之曰當今雖復多士如林至於堪捉此者獨張譏耳即手授譏後主嘗幸鍾山開善寺召從臣坐於寺西南松下勑譏講義時索麈尾未至後主勑取松枝手以屬譏曰可代麈尾郭子曰何次道嘗詣王丞相以麈尾𫾣牀呼何共坐曰此君子坐也又曰孫安國徃殷中軍許共語左右進食冷而復煖者數四彼我奮擲麈尾悉墮落滿飯中賔主遂至暮忘飡也又曰王長史病巳篤寢燈下轉麈尾而視之歎曰如此人曽不得滿四十及亡劉尹臨殯以犀柄麈尾置柩中因慟哭丗說曰王丞相常懸一麈尾著帳中及殷中軍來乃取之曰今當遺汝又曰客問樂令旨不至者樂亦不復剖析文句以麈尾柄𫾣机曰至不客曰至樂因又舉麈尾曰若至者郍得去客乃悟服語林曰康法暢造庾公捉麈尾至彼公曰麈尾過麗何以得在荅曰廉者不求貪者不與故得在耳華陽國志曰冝君山出麈尾王道麈尾銘曰誰謂質卑御於君子拂穢静暑虚心以俟許詢白麈尾銘曰蔚蔚秀格偉偉竒姿荏弱軟潤雲散雪霏君子運之探玄理微如意齊書曰蒼梧欲害髙帝帝嘗以書案下安鼻爲楯以鐵爲書鎮如意甚大以備不虞欲以代仗蕭子顯齊書曰明僧紹字丞烈平原聶人也隱長廣郡勞山詔徴爲正貟郎稱疾不就賜竹根如意笋籜冠隱者以爲榮梁書曰席闡文武帝將起兵闡文勸蕭頴胄同焉仍遣客田祖㳟私報帝并獻銀裝刀帝報以金如意又曰韋叡拒魏於邵陽叡乗素木輿執白角如意以麾軍一日數合又曰殷鈞字季和梁武與鈞父叡有舊以女永興公主妻鈞公主驕淫險虐釣形皃短小爲主所憎每𬒳召入先滿壁爲殷叡字鈞輙流涕以出主命婢束而反之鈞不勝怒言於帝帝以犀如意擊主碎於背然猶恨鈞自侍中岀爲王府諮議又曰李膺字公胤有才辯西昌侯藻爲益州以爲主簿使至都武帝恱之謂曰今李膺何如膺對曰今勝昔問其故對曰昔事桓靈之主今逢堯舜之君帝嘉其對以如意擊席者乆之乃以爲益州别駕後魏書曰髙祖孝文欲試諸子志尚乃大陳寳物任其所取京兆王愉等競取寳玩宣武皇帝惟取骨如意而巳帝大竒之又曰廣陵王羽爲太子太保録尚書事孝文將南討遣羽持節安撫六鎮發其突騎夷夏寧恱還領廷尉卿及車駕發羽與太尉元丕留守帝賜羽如意以表心焉拾遺記曰呉主潘夫人之父坐法夫人輸入織室夫人容態少儔爲江東絶色同幽者百餘人謂夫人爲神女敬而逺之有司聞於呉主使圖其容皃夫人憂慼不食减瘦改形工人冩其眞狀以進呉主呉主見圖而嘉之以虎魄如意撫案折嗟曰此神女也遂納之又曰孫和恱鄧夫人常置膝上和月下舞火精如意誤傷夫人頰胡綜别傳曰時有掘得銅匣長二尺七寸以琉璃爲蓋布雲母於其上開之得白玉如意所執處皆刻螭虎文蝇蟬等形時人莫有識者太常以問綜綜荅曰昔秦始皇帝東遊以金陵有天子氣乃改名掘鑿江湖平諸山南處處輙理寳物以當王氣其事見於秦記石季倫夲事曰崇有珊瑚如意長三尺二寸丗說曰殷荆州有所識作賦示束晢慢戯之殷甚以爲有才語王㳟適見新文甚可觀便於手巾函岀之王旣讀殷笑不自勝王看竟旣不笑亦不言好惡但以如意點之而巳殷帳然自失又曰謝萬北征而常嘯詠自髙未嘗撫慰衆士萬兄安謂萬曰汝爲元帥冝數呼諸將宴以恱其心萬從之於是召集諸將帥無所說直以如意指四坐曰諸軍皆是勁卒諸將甚恨之語林曰石崇與王愷争豪晉武帝愷之甥也每助愷以珊瑚高二尺許愷以示之崇以鐵如意撃之應手瓦碎愷聲色俱厲崇曰此不足恨乃命取珊瑚有三尺光彩溢目者六十七校愷悵然自失異苑曰太原郭澄之義熈𥘉諸葛長民欲取爲輔國諮議澄之不樂後爲南康太守盧循反自廣州長民以其謀先告因騁私惡収澄之以付延尉將致大辟夜夢見一神人以烏角如意與之旣覺便在其頭側可長尺餘形制甚陋澄之遂得無它後從入關齎以自隨忽失所在劉義慶啓事曰恩旨賜臣犀鏤竹節如意目所未覩拂晉書曰武帝泰康四年有司奏先帝舊物麻䋲爲細拂以明儉約宋書曰孝武大明中壞髙祖所居隂壁於其處起玉燭殿與群臣觀之牀頭有土障壁上掛葛燈籠麻䋲拂侍中袁覬盛稱上儉素之德孝武曰田舎翁得此巳爲過矣齊書曰陳顯逹子休尚爲郢府主簿過九江拜别顯逹謂曰凡奢侈者鮮有不敗塵尾繩拂是王謝家許汝不湏捉此即取於前燒除之東宫舊事曰太子有白眊拂二秦嘉婦與嘉書曰今奉旄牛尾拂一枚可拂塵垢唾壷晉書曰王敦爲荆州牧旣專外任有問鼎之志引劉隗刀恊爲腹心及隗用事頗間王氏敦怒䟽陳之自爾憤憤不平安每酒後詠魏武帝樂府歌曰老驥伏櫪志在千里列士暮年壯心不巳以鐵如意擊唾壷爲節壷邊盡鈌梁書曰天監中中天笁國奉表獻琉璃唾壷脩復山陵故事曰皇后玄宫有白瓦唾壷五枚東宫舊事曰太子納妃有􅃮書銀帶唾壷一魏武帝上雜物䟽曰御雜物用有純金唾壷一枚􅃮圎油唾壷四枚貴人有純銀叅帶唾壷三十枚王子年拾遺記曰魏文帝納薛靈芸靈芸別父母歔欷累日淚下沾衣至升車就路之時玉唾壷承淚壷即如紅色及至京師壷之淚如凝血矣又曰呉主潘夫人帝嘗與夫人遊昭宣之臺恣意幸適旣盡酣醉唾於玉壷中使侍婢冩於臺下西京雜記曰廣川王發魏襄王塚得玉唾壷一枚交州雜記事曰太康四年臨邑王范熊獻紫水精唾壷一口青白水精唾壷各二口續齊諧記曰武昌小吏呉龕渡水得五色石夜化爲女子稱是龕婦至家見婦翁𬒳白羅𫀆隱漆几銅唾壷狀如天府自稱河泊馬融遺令曰冢中不得下銅唾壷賀循葬禮曰藏物今用瓦唾壷一枚蔡邕表曰詔賜薫鑪唾壷朝廷之恩前後重疊父母於子無以加此孔臧與子琳書曰侍中安國群臣近見崇禮不供䙝器猶復掌御唾壷朝廷之士莫不榮之書臺東宫舊事曰皇太子𥘉拜有栢書臺又曰太子妃有漆書臺香爐漢官典曰尚書郎給女史二人潔衣服執香爐燒薫從入臺中給使護衣服梁書曰侯景即位景牀東邊香爐無故墮地景呼東西南北皆謂爲廂景曰此東廂香爐那怱下地議者以爲湘東軍下之徴南史曰陶弘景字通明丹陽株陵人也父貞孝昌令𥘉弘景母郝氏夢天人手執香爐來至其所巳而有娠又曰庾仲文貪賄何尚之奏選令史龍向臣說亦歎其受納之過言實得嫁女具銅鑪四人舉乃勝細葛斗帳等物不可稱數齊書曰江泌爲南康王子琳侍讀建武中明帝召諸王後泌憂念子琳訪誌公道人問其禍福誌公覆香爐灰示之曰都盡無餘後子琳𬒳害東宫舊事曰皇太子𥘉拜有銅博山香爐一枚晉東宫舊事曰泰元中皇太子納妃王氏有銀塗博山連盤三斗香爐一西京雜記曰長安巧工丁諼作卧褥香爐一名𬒳中香爐爲機環轉四周而鑪體常平可置之褥𬒳故取𬒳褥以爲名又作九層博山香爐鏤以竒禽怪獸魏武上雜物䟽曰御物三十種有純金香爐一枚貴人公主有純銀香爐四枚襄陽記曰劉和季性愛香上厠置香爐主簿張坦曰人名公作俗人眞不虚也和季曰荀令君至人家坐處三日香君何惡我愛好也鄴中記曰石虎冬月爲複帳四角安純金銀鑿鏤香爐徐先生南岳記曰衡山石室中有几及香爐盧諶祭法曰香爐四時祠坐側皆置也徐爰家儀曰㛰迎車前用銅香爐二集異記曰呉郡呉㤗能筮㑹稽盧氏失博山香爐使泰筮之泰曰此物質雖爲金其象實山有樹非林有孔非泉閶闔風至時發青煙此香爐也語其主處求即得之古詩曰四坐且莫諠願聽歌一言請說銅鑪器崔嵬象南山上以植松栢下根據銅盤雕文各異類離婁自相連末火燃其中青煙颺其間順風入君懐四坐莫不歎香風難乆居空令蕙草殘梁昭明太子銅博士香鑪賦曰禀至精之純質産靈嶽之幽深經般倕之妙指運公輸之巧心有蕙帶而巖隱亦霓
