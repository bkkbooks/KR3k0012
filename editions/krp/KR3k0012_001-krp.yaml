body:
  text: 太易老子曰有物混成先天地生易乾鑿度曰夫有形者生於無形故有太易者未見氣也帝王世紀曰天地未分謂之太易列子曰夫有形者生於無形則天地安從生自然而生故有太易太𥘉太始太素此有物之始自微至著變化自相因襲太易者未見氣也易者不窮滯之稱凝寂於太虚之域將何見乎即如易繫之太極老氏之混成太𥘉者氣之始也隂陽未判下句所謂渾淪太始者形之始也隂陽旣判品物流形太素者質之始也質性也旣爲物矣則方圎剛柔静躁各有其性氣質具未相離此直論氣之形質不復說太易爲三者宗本下句别自明之故曰渾淪渾淪者言萬物相渾淪而未相離雖渾然一氣不相離襲而三才之道實潜兆乎其中淪語助也視之不見聽之不聞循之不得故曰易也易無形畔老子曰視之不見名曰希而曰易易簡之别稱也太易之義如此而巳故能爲萬物宗性真一而不變也易變而爲一所謂易者窈冥忽恍不可變也一氣持之而化變故寄名變也一變而爲七七變而爲九九變者之究也究窮也一變而爲七九不足以次數者全舉陽數頋其都㑹也乃復變而爲一一者形變之始既渉於有形之域理數旣終乃復反而爲一反而爲一歸形變之始也此蓋明變化徃復無極太初易乾鑿度曰太初者氣之始也帝王世紀曰元氣始萌謂之太初詩推度灾曰陽夲爲雄隂夲爲雌物夲爲魂宋均注曰本即原也變隂陽爲雄雌䰟也亦言未有形也皆無兆朕故謂之氣雄生八月仲節號曰太初行三節節猶氣也太初者氣之始也必知生八月仲者據此時薺夌生以爲驗也陽生物行三節者湏雌俱行物乃著也廣雅曰太初氣之始也清濁未分莊子曰太初有無言太古之初上下未形所有者無無有無名旣無有形人無有名一之所起有一而未形一謂道也物得以生謂之德淮南子曰稽古太初人生於無當太初天地之始人生於無形無形生有形也成形於有有形而制於物爲物所制楊雄檄靈賦曰太易之始太初之先馮馮沉沉奮搏無端王阜老子聖母碑曰老子者道也乃生於無形之先起於太初之前行於太素之元浮逰六虚岀入幽冥觀混合之未别窺清濁之未分陳思王魏德論曰在昔太初玄黃混并渾沌濛鴻兆朕未形阮籍孔子誄曰養徒三千升堂七十潜神演思因史作書考混元於無形夲造化於太初又大人先生傳曰太初眞人惟太之根專氣一志萬物以存又曰馳騖乎太初之中休息乎無爲之宫太初何始無後無先太始易乾鑿度曰太始者形之始也又曰雌生戍仲號曰太始雄雌俱行三節俱行起自戍仲至亥帝王世紀曰氣形之初謂之太始楚辭天問曰遂古之初誰傳道之王逸注曰初始也太始之元虚廓無形神物未生誰傳此道上下未形何由考之言天地未分混沌無根誰考述而知也張衡玄圖曰玄者無形之類自然之根作於太始莫之與先阮籍大人先生傳曰登乎太始之前覽乎忽漠之初慮周旋於無外志浩蕩而遂舒太素易乾鑿度曰太素質之始也又曰雄含物䰟號曰太素雌雄俱行故能含物魂而生物也獨言雄雌主於陽故也帝王丗紀曰形變有質謂之太素太素之前幽清寂寞不可爲象惟虚惟無蓋道之根自道旣建猶無生有太素質始萌萌而未兆謂之厖洪蓋道之幹旣育萬物成體於是剛柔始分清濁始位天成於外而體陽故圎以動蓋道之實禮斗威儀曰二十九萬一千八百四十歲而反太素冥莖蓋乃道之根也禮含文嘉曰推之以上元爲始起十一月甲子朔旦夜半冬至日月五星俱起牽牛之初鄭玄注上元太素巳來至所永年廣雅曰太素質之始也巳有素朴而未散也樂動聲儀曰作樂制禮時有五音始於上元戊辰夜半冬至北方子鄭玄注曰戊辰土位土爲宫宫爲君故作樂尚之以爲始也夜半子亦天時之始禮稽命㣲起於太素十一月閼逢之曰歳在攝提格之紀是云作樂制禮蓋作樂則有禮通其文耳張衡靈憲注曰太素之前幽清玄靜寂寞冥黙不可爲象厥中惟靈如是者永乆焉斯謂冥莖蓋乃道根旣建由無生有太素始萌萌而末兆并體同色坤屯不分坤屯音渾沌陳思王髑髏說曰昔太素氏不仁勞我以體苦我以生今也幸變而之死是反吾眞也又魏德論曰不能貫道義之清英窮混元於太素亦以明矣又魏文帝誄曰皓皓太素兩儀始分沖和産物肇有人倫又大暑賦曰壯皇居之瑰瑋兮歩八閎而爲宇節四運之常氣兮踰太素之儀矩阮籍通老論曰聖人明於天人之理達於自然之分通於治化之體審於大愼之訓故君臣垂拱太素之撲百姓熙怡保性命之和又詩曰焉得松喬頥神太素逍遥區外登我年祚又老子讃曰隂陽不測變化無倫飄颻太素歸虚反祚陸機孫權誄曰皇聖膺期有命太素承亂下萌清難天歩又浮雲賦曰集輕浮之衆采厠五色之藻氣貫元虚於太素薄紫微而竦戾又詩曰太素卜令宅希微啓奥基玄冲慕懿文虚無承先師又詩曰澄神玄漠流棲心太素域弭節欣髙視俟我大夢覺頋公直荅陸機曰恢恢太素萬物初基在昔哲人觀衆濟時太極易繫辭曰易有太極是生兩儀兩儀生四象四象生八卦漢書律曆志曰太極元氣凾三爲一又曰太極中央元氣故爲黃鍾又曰元以統始易太極之首也帝王世紀曰質形巳具謂之太極樂動聲儀曰神守於心遊於目窮於耳徃乎萬里而至疾故不得而不速從胸臆之中而徹太極援引無題人神皆感神明之應音聲相和班固典引曰太極之先兩儀始分烟烟煴煴有沉而奥有浮而清陳思王七啓曰夫太極之初混沌未分萬物純純與道俱運又畫讃叙曰上形太極混元之前却列將來未萌之事阮籍通老論曰道者法自然而爲化侯王能守之萬物將自化易謂之太極春秋謂之元老子謂之道陸機雲賦曰覽太極之初化判玄黃於乾坤考天壤之靈變莫稽羙乎慶雲傅玄風賦曰嘉太極之開元羙天地之定位樂雷風之相薄恱山澤之通氣張華詩曰混沌無形氣奚從生兩儀元一是能分太極焉得離玄爲誰翁子道是誰家兒天行自西廻日月曷東馳陸士龍荅士衡詩曰伊我世族太極降精昔在上代軒虞篤生天部上釋名曰天顯也在上髙顯也天坦也坦然髙而逺也易曰天垂象見吉凶聖人則之又曰觀乎天文以察時變觀乎人文以化成天下又曰立天之道曰隂與陽又曰天行健君子以自強不息又曰夲乎天者親上本乎地者親下又曰天地之道貞觀者也又曰天道虧盈而益謙又曰天地設位而易行乎其中又曰乾爲天又曰時乗六龍以御天又曰天尊地卑乾坤定矣又曰在天成象在地成形又曰大哉乾元萬物資始乃統天書曰髙明柔克沉潜剛克髙明謂天也又曰乃命義和欽若昊天又曰皇天無親惟德是輔又曰皇天震怒命我文考肅將天威詩曰敬天之威不敢馳驅又曰天歩艱難之子不猶又曰悠悠蒼天此何人哉又曰謂天蓋髙不敢不跼謂地蓋厚不敢不踳跼典也蹐累足也箋云跼蹐者天髙而有雷電地厚而有淪䧟此民疾若王政上下皆可畏怖之言禮曰天地之道慱也厚也髙也明也悠也乆也今夫天斯昭昭之多及其無窮也日月星辰繫焉萬物覆焉又曰天則不言而信天無私覆是天道也無爲而物成又曰天秉陽垂日星秉持也又曰天不愛其道故天降甘露又曰天有四時春夏秋冬風雨霜露無非教也又曰著不息者天也聖人作樂以應天又曰燔柴於泰壇以祭天也又曰孟冬之月天氣上騰地氣下降又曰祭天於南郊就陽之義也祭天掃地而祭於其質而巳矣又曰清明象天傳曰天有六氣降生五味六氣者隂陽風雨晦明又曰叔孫穆子夢天壓巳弗勝又曰公孫歸父㑹楚子於宋宋人告急於晉晉侯欲殺之伯宗曰不可天方授楚未可與爭雖晉之強能違天乎又曰晉侯賜畢萬魏卜偃曰畢萬之後必大萬盈數也魏大名也以是始賞天啓之矣爾雅曰穹蒼天也天形穹隆其色蒼蒼因以名云春爲蒼天萬物蒼蒼生也夏爲昊天言氣晧旰秋爲旻天旻猶愍也愍萬物凋落也冬爲上天言時無事在上臨下而巳語曰天何言哉四時行焉百物生焉又曰惟天爲大惟堯則之又曰夫子之不可及也猶天之不可階而升也易乾鑿度曰天動而施曰仁地靜而理曰義又曰輕清者上爲天重濁者下爲地又曰天有隂陽地有柔剛人有仁義是謂三才京房易傳曰地動隂有餘天裂陽不足此臣下盛強害君上之變也景帝三年天東北有赤氣廣長十餘丈或曰天裂其後七國兵起春秋說題辭曰天之爲言顛也居髙理下爲人經也白虎通亦云羣陽精也合爲太一分爲殊名故立字一大爲天禮統曰天地者元氣之所生萬物之祖也天之爲言鎭也神也珎也施生爲夲運轉精神功効列陳其道可珎重也尚書考靈耀曰中央鈞天其星角亢東方臯天吕氏春秋日蒼天廣雅曰上天其星房心東北變天其星斗箕北方玄天其星須女西北幽天其星奎婁西方成天吕氏春秋曰晧天其星胃昴西南朱天其星參狼南方赤天吕氏春秋廣雅皆曰炎天其星輿鬼栁東南陽天其星張翼軫吕氏春秋曰天有九野東方曰蒼天西方曰晧天南方曰炎天其餘悉同周書曰神農之時天雨粟神農耕而種之尚書中候曰天地開闢甲子冬至日月若懸璧五星若編珠詩記曆樞曰箕爲天口主出氣大戴禮曰放勛其仁如天其智如神就之如日望之如雲春秋感精符曰人主與日月同明四時合信故父天母地兄日姊月父天於圓丘之禮也母地於方澤之祭也兄日於東郊姊月於西郊也春秋繁露曰天有十端天爲一端地爲一端陽爲一端隂爲一端水爲一端土爲一端人爲一端金爲一端木爲一端火爲一端凡十端天亦有喜怒之氣哀樂之心與人相副以類合之天人一也春喜氣故生秋怒氣故殺夏樂氣故養冬哀氣故藏四者天人同有之春秋内事曰天有十二分次日月之所躔也春秋元命包曰天不足西北陽極於九故周天九九八十學者温問曰天有頭乎宻曰有詩曰乃眷西頋天若無頭何以頋之又曰有耳乎曰有詩云鶴鳴于九臯聲聞于天無耳何以聞之天有足乎曰有詩云天歩艱難若無足何以歩天有姓乎曰有曰何姓曰姓劉何以知之曰其子姓劉故以知之温大敬之晉書曰世祖登祚探筞得一羣臣失色吏部郎中裴揩進曰天得一以清王侯得一爲天下貞上大恱又曰惠帝末天裂爲二無雲有聲如雷晉中興書徵祥說曰大興二年天鳴東南有聲如水相薄三年又鳴後哀帝廢後魏書曰聖武田於野見輜軿自天而下至則見羙女曰天使我偶君遂寢宿旦乃還期周年復㑹於此旣而以所生男授帝曰善養之丗爲帝王子即始祖也齊書曰王摛史學博聞永明中天忽黃色照地衆莫能解摛云是榮光丗祖大恱用爲永陽郡守陳書曰髙祖夢天開數丈有一人朱衣捧日令帝張口納之及覺猶熱後二百日爲帝太平御覽卷第一
