front:
  text: 孝經左契曰元氣混沌孝在其中漢書律曆志曰黃鍾黃者中之色故陽氣施於下泉孳萌萬物爲六氣元也故以黃色名元氣焉又曰太極運三辰五星於上元氣轉三統五行於下家語曰夫禮必夲之太一太一分爲天地轉爲隂陽變爲四時列爲鬼神太一謂元氣也淮南子曰道始生虚霩虚霩生宇宙宇宙生元氣有涯垠清陽者薄音博劘音摩而爲天又曰古未有天地之時唯象無形幽幽冥冥茫茫昧昧幕幕閔閔鴻濛澒洞莫知其門有二神混沌生髙誘注曰二神經天營地之神經地營天孔深也乎莫知其終滔乎莫知其所止息於是乃别爲隂陽離爲八極剛柔相成萬物乃形遁甲開山圖曰有巨靈者徧得元神之道故與元氣一時生混沌又曰南溟之山金堂玉室上無元氣寔滋神化又曰麗山氏分布元氣各生次序産生山谷帝系譜曰天地𥘉起溟涬濛鴻即生天皇始萬八千歳以木德王十洲記曰崑陵崑崙山也上有金臺玉闕亦元氣之所合天帝之居治處六韜曰天之爲天逺矣地之爲地乆矣萬物在其間各自利何世莫之有乎夫使世俗皆能順其有是乃溟涬濛鴻之時爲王故莫之能有七十六聖發起其所繫天下而有之豈一日哉楊泉物理論曰楊雄非渾天而作蓋天圓其蓋左轉日月星辰隨而東西桓譚難之雄不解此蓋天者復難知也元氣皓大則稱皓天皓天元氣也皓然而巳無他物焉楊雄檄靈賦曰自今推古至於元氣始化古不覽今名號迭毁請以詩春秋言之又解嘲曰太玄五千文支葉扶踈獨說十餘萬言深者入地底髙者出蒼天大者涵元氣纎者入無倫等也班固東都賦曰萬樂備百禮曁皇情浹群臣醉降烟煴調元氣又漢頌論功歌詩曰后土化育兮四時行脩靈液養兮元氣覆冬同雲兮春霡霂膏澤洽兮殖嘉榖張衡玄圖曰玄者包含道德搆掩乾坤橐籥元氣禀受無原陳思王魏德論曰元氣否塞玄黃漬薄星辰逆行隂陽舛錯國無完邑陵無掩槨四海歸沸蕭條沙漠又七啓曰有形必杇有端必窮茫茫元氣誰知其終孫楚石人銘曰大象無形元氣爲母杳兮冥兮陶冶衆有陸機雲賦曰攄神景於八幽合洪化於烟煴充宇宙以播象恊元氣而齊勲潘岳西征賦曰古徃今來邈矣悠哉寥廓惚恍化一氣而甄三才
