front:
  text: 太平御覽卷第六百一十一
  hash: sha256:5476692239fef85ba9590657004b0ff0eef2a157da3a1fcd5d80c82a60c929bf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_611-1a}
body:
  text: 學部五勤學史記曰蘇秦洛陽人與魏人張儀同師事鬼谷先生讀書至睡秦輙引錐刺股血流至踝漢書曰董仲舒廣川人景帝時爲博士少躭學業下幃讀書弟子傳以相受莫見其靣十年不窺園圃乗馬三十年知牝牡又曰路温舒字長君父使牧羊温舒取澤中蒲截以爲牒編用冩書後漢書曰桓榮字春卿沛國龍亢人也少與兄元卿俱在田捃拾而榮開書讀之講誦不息元卿嗤榮曰但自苦氣力何時復施用乎榮笑不應日夜不倦丗祖聞召拜議郎使入教授太子帝稱善曰得生幾晚後爲太子少傅帝賜其車馬衣服榮得之陳於庭謂父兄曰此吾稽古之力也元卿歎曰我本農家子豈意學之爲利乎又曰法真隱居大澤講論術藝歴年不窺園圃又曰何休作公羊解詁覃思不窺園者十有七年又曰趙昱常就處士東莞綦母公受公羊傳至歴年潜思不窺園門親踈稀見其面又曰張覇字伯饒成都人好學七歳通春秋復欲進餘經父母曰汝小未能也覇曰我饒爲之故字伯饒四遷侍中謝承後漢書曰戴封字平仲年十五詣太學師事東海申君申君卒送䘮到東海道經其家父母以封當還豫爲娶妻封蹔過拜親不宿而去又曰髙鳯字文通南陽蔡人家以農畝爲業而勤學專精讀誦妻甞之田曝麥於庭令鳯護之懼雞以竿授之時天暴雨而鳯持竿讀書不覺潦水大至流其麥矣又曰袁閎傳黄巾賊起攻没郡縣百姓驚散閎誦不移賊相約語不入其閭郷人就閎避難皆得全免又曰曹褒博雅踈通尤好禮事常感朝廷制度未備慕叔孫通爲漢禮儀晝夜研精沉吟專思寢則懷抱筆扎行則誦習文書當其念至忘所之適又曰承宫少孤年八歳爲人牧豕郷里徐子盛者以春秋經授諸生數百承宮過息廬下樂其業因就聽經遂請留門下續漢書曰宫過徐子盛好之因弃其猪而留聽經主恠其不還求索得宮欲笞之門下生共禁止因留之爲諸生拾薪執苦數年勤學不倦又曰崔琦字子瑋濟北相瑗之宗也引古今成敗以誡梁兾兾不能受乃作外戚箴又作鵠賦以爲諷後除臨濟令不敢之職解印而去兾令刺客求之見琦耕於陌上懷書一卷息輙偃而詠之刺客賢之以實告琦因得脫走又曰荀爽字慈明㓜好學太尉杜喬見而稱曰可爲人師爽遂躭思經籍慶弔不行徴命不應司馬彪續漢書曰杜喬字叔榮累祖二千石以孝稱雖二千石子常歩擔求師又曰李固少有儁才雅志好學爲三公子常躬歩駈驢負書隨師魏志曰楊浚同郡王蒙少孤爲人僕隷年十七見使牧羊而私讀書因獲捶楚浚美其才即贖着家中聘娶立屋然後與別居官至散騎常侍魏略曰常林少單貧爲諸生耕帶經鋤其妻自擔餉餽之相敬如賔又曰賈逵字梁道好春秋左傳及爲牧守常自課讀之月一遍蜀志曰譙周字元南躭古篤學家貧未甞營産業誦讀典籍欣然獨笑以忘寢食研精六經頗曉天文而不留意諸子文章非心所存吴志曰魯肅爲人方嚴寡於玩飾治軍整頓禁令必行雖在軍陣手不釋卷又曰闞澤字德潤山隂人常爲人傭書所冩畢誦之亦遍虞溥江表傳曰張紘事父至孝居貧躬耕稼帶經而鋤孜孜汲汲以夜繼日至于弱冠無不窮覽晉書曰王育少孤貧爲人傭牧羊豕近學堂育常有暇拾薪以雇書生抄書後截蒲以學書日夜不止亡失羊豕其主笞之育甚有慙色將鬻巳以償於是郭子敬聞而嘉之代育還羊豕給其衣食令育與其子同學育遂博通經史仕僞漢官至太傅又曰車胤字武子南平人勤學不倦家貧甞不得油夏月則練囊盛數十螢火虫以照書晉中興書曰孫盛字安國爲祕書監好學自少及長手常不釋卷旣居史官乃著三國晉陽秋又曰劉寔長不滿七尺精學不倦雖居官職至于皓首手不釋卷崔鴻春秋前燕録曰豫州刺史張悕字文祖清河武城人也悕少孤貧隨母長於舅氏令其牧牛悕㓜而好學事母以孝聞毎日必於牧暇採撨二束菜二本一以供母一以雇人書晝則折木葉學書夜則誦所書者宋書曰沈攸之字仲逹晚好讀書史漢事多所諳憶常歎曰早知窮逹有命恨不七年讀書又曰鄭鮮之字道子滎陽開封人鮮之下帷讀書絶交遊之務又曰王歆字休㤗琅邪人家貧好學甞三日絶粮執書不輟父母家人或謂之曰困窮如此何不耕農爲求活乎歆荅曰我當以典籍自耕耳武帝以其博學有文才累遷中書侍郎揚州牧後魏甄琛曰中山人也舉秀才入都累歳常以弈碁通夜不止手下蒼頭奴常令執燭或時睡則加杖之如此非一奴不勝痛楚乃曰郎君辭父母仕官若爲讀書執燭不敢辭罪今博弈是何事也琛惕然大慙遂冩書研習經史聞見日優仕至侍中蕭子顯齊書曰頋歡字景怡吴郡塩官人也年六十歳書甲子有蘭三篇歡推計遂知六甲家貧父使駈田中雀歡作黄雀賦雀食稲過半父怒欲撻之見賦乃止郷中有學舎歡貧無以受業於舎壁後倚聽無遺忘者八歳誦孝經詩論及長篤志好學母年老躬耕誦書夜則燃糠自照又曰隱士沈驎士火燒書數千卷驎士年過八十耳目猶聦明乃故手抄冩火下細書復成二三千卷滿數十篋南齊春秋曰江泌字士清少貧晝日斫􅓏夜讀書隨月光握卷升堂北齊書曰杜弼字輔玄髙祖令弼帶州驃騎府長史弼性好名理探味玄宗自在軍旅帶經從役又曰李鉉字實鼎家貧苦學春夏務農秋冬入學三冬不畜枕毎至睡時假寐而巳後魏書曰李道固頓丘衛國人髙祖賜名焉家寒少孤有大志好學不倦𥘉受業於長樂監伯陽伯陽稱美之晚與漁陽髙恱北平陽尼等將隠於名山不果而罷恱兄閭博學髙才家冨典籍彪遂於恱家手抄口讀不暇寢食三國典略曰齊右僕射冨平子魏収字伯起鉅鹿曲陽人㓜習騎射欲以武藝自逹太學博士鄭伯猷調之曰魏郎弄㦸多少收慙悟乃折節讀書坐版床積年版亦爲之銳収甞爲庭竹賦以自發名伯猷謂之曰卿不值老夫猶當逐兔後周書曰樊深博物性好學老而不怠朝暮還往常據鞍讀書至馬驚墜地損折支體終亦不改後除國子博士梁史曰沈約十三而遭家難潜竄㑹赦乃免旣而流寓孤貧篤志好學晝夜不釋卷母恐其以勞生疾常遣減油滅火而晝之所讀夜輙誦之遂博通群籍善屬文濟陽蔡興宗聞其才而善之及爲郢州引爲安西外兵參軍兼記室興宗常謂其諸子曰沈記室人倫師表冝善師之梁書曰韋叡族弟受字孝友沉毅有器局年十二甞遊京師值天子出遊南苑邑里諠譁老㓜争觀受坐讀書不釋卷宗族莫不異之沈峻字士嵩師事宗人沈驎士嵩在門下積年晝夜自課或睡寢輙以杖自擊其爲志如此又曰江革字休映考城人吏部郎謝眺常過革第時大寒雪革弊絮單席而耽學不倦眺乃脫其所着衣并手割半氊與革後建安王爲雍州刺史表求記室人或薦之以爲征北記室參軍與弟觀少長共居不忍離别苦求同行參軍沈約任昉同與革書曰此雍府妙選英才文房之職揔卿昆弟可謂馭二龍於長途騁騏驥於千里又曰劉峻字孝標平原人勤學去學五六里常行讀書不息地有坑坎毎常倒蹶然後始悟隋書曰皇甫繢字功明三歳而孤爲外祖韋孝寛所鞠養甞與諸外兄博弈孝寛以其惰業篤以嚴訓愍繢歎曰我無庭訓養於外氏不能克躬何以成立深自感激命在左右自杖孝寛聞而對之流涕於是學問渉經史又曰盧思道字子行年十六遇中山劉松爲人作碑以示思道讀之多所不解於是感激閉户讀書師事河間邢子才後思道爲文以示劉松松又不能甚解思道乃喟然歎曰學之有益豈徒然哉又曰劉炫字光伯少以聦敏見稱與信都劉焯閉户讀書十年不出又曰王邵篤學好經史道遺落丗事用思旣專性頗怳忽至對食閉目凝思盤中之肉輙爲僕從之所噉邵弗之覺唯責肉少數罰厨人厨人以情白依前閉目伺而獲之厨人方免笞辱其專固如此唐書曰李磎昭宗朝爲宰相磎自在臺省聚書至多手不釋卷時人號曰李書樓所撰文章及注解書傳之闕疑近百餘卷經亂悉亡丗說曰管寧華歆甞同席讀書有乗軒冕過門者寧讀書如故歆出觀寧割席分坐曰子非吾友也邴原别傳曰原字根矩家貧早孤隣有書舎原過其傍而泣師問曰童子何悲原曰一則顧其少孤二則羡其未學師亦哀原之言而爲之泣曰童子苟有志我從相教不之求費也楚國先賢傳曰孫敬好學時欲寤寐懸頭至屋梁以自課常閉户號爲閉户先生廬江七賢傳曰文黨字翁仲欲之學時與人俱入藂木謂侣人曰吾欲逺學先試投我斧髙木上斧當掛乃仰投之斧果上掛因之長安受經七賢傳曰阮籍有竒才異質或閉戸讀書連月不出或遊行丘林經日不返益都耆舊記曰朱倉字雲卿廣漢人畜錢八百文之蜀從處士張寧受春秋籴小豆十斛屑之爲粮閉戸精誦寧矜之歛得米二十石倉不受嵇康髙士傳曰逢真王莾辟不至甞爲杜陵門下掾終身不窺長安城但閉門讀書未甞問政吕氏春秋曰寗越中牟之鄙人也苦耕稼之勞謂其友曰何爲而可以逸此苦也其友曰莫如學學三十年則可以逹矣寗越曰請以十五歳人將休吾不休人將卧吾不卧學十五歳而周威公師之丗要論曰有讀書倦而刺其掌墨子曰墨子使衛載書甚多強唐子見而恠之墨子曰昔周公旦朝讀書百篇夕見七十士相天子猶如此况無事敢廢此乎鄒子曰朱買臣孜孜修學不知雨之流粟漢武帝洞冥記曰董謁字仲玄出隠無常常息人家於座以筆題掌還以竹籜冩之書竟䑛掌中加以少來精勤䑛之累爛丗謂之董仲玄掌録西京雜記云匡衡好學貧無燭隣家甚冨穿壁引光照書漢書曰倪寛千乗人受業孔安國貧無資傭作帶經而鋤在太學爲弟子都養太平御覽卷第六百一十一
