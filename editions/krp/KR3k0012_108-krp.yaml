body:
  text: 皇王部三十三唐髙祖神尭皇帝唐書曰髙祖神尭皇帝姓李氏諱淵其先隴西狄道人涼武昭王暠七代孫也暠生歆歆生重耳仕魏爲弘農太守重耳生熈爲金門鎮將領豪族鎮武川因家焉儀鳯中追尊宣皇帝熈生天賜仕魏爲幢主儀鳯中追尊光皇帝生皇祖諱虎後魏左僕射封隴西郡公與周文帝及太保李弼大司馬獨狐信等以功叅佐命當時稱爲八柱國家仍賜姓大野氏周受禪追封唐國公至隋文帝作相還復夲姓武德𥘉追尊景皇帝廟號太祖皇考諱昞音丙周安州㹅管柱國大將軍襲唐國公謚曰仁武德𥘉追尊元皇帝廟號丗祖髙祖以周天和元年生於長安七年襲唐國公及長倜儻豁逹任性真率寛仁容衆無貴賤咸得其歡心隋受禪𥙷千牛備身文帝獨狐皇后即髙祖從母也由是特見親愛累轉譙隴歧三州刺史有史丗良者善相人謂髙祖曰公骨法非常必爲人主願自愛勿忘鄙言髙祖頗以自負大業𥘉受滎陽樓煩二郡太守徴爲殿内少監九年遷衛尉少卿遼東之役督運於懷逺鎮及楊玄感反詔髙祖馳驛鎮弘化郡兼知關右諸軍事髙祖歴試中外素樹恩德及是結納豪傑衆多欵附時焬帝多所猜忌人懷疑懼㑹有詔徴髙祖詣行在所遇疾未謁時甥王氏在後宫帝問曰汝舅何遟王氏以疾對帝曰可得死不髙祖聞之益懼因縱酒沉湎納賄以混其迹焉十一年焬帝幸汾陽宫命髙祖徃山西河東黜陟討捕師次龍門賊帥母端兒帥衆數千薄于城下髙祖從十餘騎擊之所射七十發皆應弦而倒賊乃大潰十三年爲太原留守郡丞王威武牙部將髙君雅爲副將羣賊蜂起江都阻絶太宗與晉陽令劉文靜及門下客長孫順德劉弘基各募兵旬日間衆且一萬宻遣使召丗子建成及元吉于河東威與君雅見兵大集恐髙祖爲變相與疑懼請髙祖祈雨於晉祠將爲不利晉陽郷長劉丗龍知之以告髙祖隂爲之備五月甲子髙祖與威君雅視事太宗宻嚴兵於外以備非常遣開陽府司馬劉政㑹告威等謀反即斬之以徇遂起義兵遣劉文靜使於突厥始畢可汗令率兵相應六月甲申命太宗將兵徇西河下之癸巳建大將軍府并置三軍分爲左右開倉庫以賑窮乏逺近響應秋七月髙祖率兵西圖關中以元吉爲鎮北將軍太原留守癸丑發自太原有兵三萬景辰師次靈石縣營於賈胡堡隋武牙郎將宋老生屯霍邑以拒義師㑹霖雨積旬餽運不給髙祖命旋師太宗切諌乃止有白衣老父詣軍門曰余爲霍山神使謁唐皇帝曰八月雨止路出霍邑東南吾當濟師髙祖曰此神不欺趙無䘏豈負我哉八月辛巳髙祖引師趨霍邑斬宋老生平霍邑景戍進下臨汾郡及綘郡癸巳至龍門突厥始畢可汗遣康稍利率兵與劉文静㑹于麾下隋驍衛大將軍屈突通鎮河東津梁斷絶關中向義者頗以爲阻於是水濱居人競進舟檝不謀而至者前後數百人九月壬寅馮翊賊帥孫華土門賊帥白玄度各率其衆送欵并具舟檝以待義師髙祖令華與統軍王長諧劉弘基引兵渡河屈突通遣其武牙郎將桑顯和率兵數千夜襲長諧義師不利太宗以遊騎數百掩其後顯和潰散義軍復振景辰馮翊太守蕭造以郡來降戊午髙祖親率衆圍河東屈突通自守不出乃命攻城不利而還文武將吏請髙祖領太尉加置僚佐從之華隂令李孝常以永豐倉來降庚申髙祖率軍濟河舎于長春宫三秦士庻至者日以千數髙祖禮之咸過所望人皆喜恱景寅遣隴西公建成司馬劉文静屯兵永豐倉兼守潼關以備他盗太宗率劉弘基長孫順德等前後數萬人自渭北徇三輔所至皆下髙祖從父弟神通起兵鄠縣柴氏婦舉兵於司竹至是並與太宗㑹乙亥命太宗自渭汭屯兵阿城隴西公建成自新豐趣覇上髙祖率大軍自下邽西上經焬帝行宫園苑悉罷之宫女放還親屬冬十月辛巳至長樂宫有衆二十萬京師留守刑部尚書衛文昇右翊衛將軍隂丗師京兆郡丞骨儀挾代王侑音宥以拒義師髙祖遣使至城下諭以匡服之意再三皆不報諸將固請圍城十一月景辰攻拔京城衛文昇先巳病死以隂丗師滑儀等拒義兵並斬之癸亥率百僚備法駕立代王侑爲天子遥尊煬帝爲太上皇大赦改元爲義寕甲子隋帝詔加髙祖假黄鉞使持節大都督内外諸軍事大丞相進封唐王惣録萬機以武德殿爲丞相府改教爲令以隴西公建成爲唐國丗子太宗爲京兆尹改封秦王姑臧公元吉爲齊公十二月癸未丞相府置長史司録巳下官僚金城賊帥薛舉寇扶風命太宗爲元帥擊之遣趙郡公孝恭招慰山南所至皆下癸巳太宗大破薛舉之衆於扶風屈突通自潼關奔東都劉文静等追擒於閿音聞郷虜其衆數萬河池太守蕭瑀音禹以郡降丙午遣雲陽令詹俊武功縣正李仲衮徇巴蜀下之二年春正月戊辰世子建成爲撫疑大將軍東討元帥太宗爲副揔兵七萬徇地東都三月景辰右屯衛將軍宇文化及弑隋太上皇於江都宫立秦王浩爲帝自稱大丞相徙封太宗爲趙國公戊辰隋帝進髙祖位相國㹅百揆備九錫之禮唐國置丞相巳下立皇髙祖巳下四廟於長安通義里第夏四月戊戌丗子建成及太宗自東都班師五月乙巳天子詔髙祖冕十有二旒建天子旌旗出警入蹕王后王子王女爵命之號一遵舊典戊午隋帝詔遣使持節兼太保刑部尚書光禄大夫梁郡公蕭造兼太尉司農少卿裴之隠奉皇帝璽紱于髙祖髙祖辭讓百寮上表勸進至于三乃從之隋帝遜于舊邸改大興殿爲太極殿甲子髙祖即皇帝位於太極殿命刑部尚書蕭造兼太尉告於南郊大赦天下改隋義寧二年爲唐武德元年官人百姓賜爵一級義師所行之處給復三年罷郡置州改太守爲刺史丁夘宴百官于太極殿賜帛有差東都留守共立隋越王侗音同爲帝壬申命相國長史裴寂等修律令六月甲戍太宗爲尚書令廢隋大業律令頒新格巳夘備法駕迎皇髙祖宣簡公巳下神主祔于太廟追謚妃竇氏爲穆皇后庚辰立丗子建成爲皇太子封太宗爲秦王齊國公元吉爲齊王諸州揔管加號使持節癸未封隋帝爲􅈶國公薛舉寇涇州命秦王爲西討元帥征之改封永康王神通爲淮安王壬辰加秦王雍州牧餘官如故秋七月秦王與薛舉大戰於涇州我師敗績八月壬午薛舉死其子仁杲復僣稱帝命秦王爲元帥以討之凉州賊帥李䡄以其地來降拜凉州㹅管封涼王九月乙巳親録囚徒辛未追謚隋太上皇爲焬帝宇文化及至魏州鴆殺秦王浩僣稱天子國號許冬十月李宻率衆來降十一月秦王大破薛仁杲於淺水原降之隴右平乙已凉王李軌僣稱天子於涼州詔頒五十三條格以約法緩刑十二月壬申加秦王太尉陜東道大行臺庚子李宻叛於桃林行軍㹅管盛彦師追討斬之二年春二月丁酉竇建德攻宇文化及于聊城斬之傳首突厥閏月辛丑劉武周侵我并州己酉李宻舊將徐丗勣以黎陽之衆及河南十郡降授黎州㹅管封曹國公賜姓李氏庚戌上微行都邑以察甿俗即日還宫甲寅賊帥朱粲殺我使散騎常侍叚確奔洛陽夏四月乙巳王丗充簒越王侗位僣稱天子國號鄭辛亥李䡄爲其僞尚書安興貴所執以降河右平九月辛未賊帥李子通據江都僣稱天子國號吴沈法興據毗陵僣稱梁王丁丑和州賊帥杜伏威遣使來降授和州㹅管東南道行臺尚書令封楚王裴寂與劉武周將宋金剛戰於介州我師敗績右武衛大將軍姜寳誼死之并州㹅管齊王元吉懼武周所逼奔于京師并州䧟乙未京師地震甲子上親祠華岳十一月景子竇建德䧟黎陽盡有山東之地淮安王神通左武衛大將軍李丗勣皆没於賊十二月景申永安王孝基工部尚書獨狐懷恩惣管于筠爲劉武周宋金剛掩襲並没焉甲辰狩于華山壬子大風拔木三年春正月辛巳幸蒲州命祀舜廟癸巳至自蒲州甲午李丗勣於竇建德所自拔歸國建德僣稱夏王四月甲寅加秦王益州道行臺尚書令秦王大破宋金剛於介州金剛與武周俱奔突厥遂平并州僞揔管尉遟敬德尋相以介州降六月壬辰徙封楚王杜伏威爲吴王賜姓李氏加授東南道行臺尚書令景午親録囚徒七月壬戌命秦王率諸軍討王丗充遣皇太子鎮蒲州以備突厥景申突厥殺劉武周於白道冬十月庚子懷戎賊帥髙開道遣使降授蔚州揔管封北平郡王賜姓李氏四年五月己未秦王大破竇建德之衆於武牢擒建德河北悉平景寅王丗充舉東都降河南平秋七月甲子秦王凱旋獻俘於太廟丁夘大赦天下廢五銖錢行開通元寳錢斬竇建德於市流王丗充於蜀甲戍建德餘黨劉黒闥據漳南反置山東道行臺尚書省於洛州八月兖州惣管徐圎㓪舉兵反以應劉黒闥僣稱魯王冬十月乙丑加秦王天䇿上將軍位在王公上領司徒陜東道大行臺尚書令齊王元吉爲司空乙巳趙郡王孝恭平荆州獲蕭銑五年春正月景申劉黒闥據洺州僣稱漢東王三月丁未秦王破劉黒闥于洺水上盡復所䧟州縣黒闥亡奔突厥蔚州惣管北平王髙開道叛寇易州夏四月庚戌秦王還京師髙祖迎勞於長樂宫壬申代州惣管定襄郡王大恩爲虜所敗戰死六月劉黒闥引突厥宼山東置諌議大夫官貟秋七月隋漢陽太守馮盎以南越之地來降嶺表悉定八月辛亥以洺荆并幽交五州爲大惣管府改封恒山王承乾爲中山王葬隋焬帝于楊州景辰突厥頡利宼鴈門巳未進寇朔州遣皇太子及秦王討擊大敗之冬十月巳酉遣齊王元吉擊劉黒闥於洺州時山東州縣多爲黒闥所守所在殺長吏以應之行軍㹅管淮陽王道玄與黒闥戰于下博道玄敗没十一月甲申命皇太子率兵討劉黒闥景申幸宜州簡閱將士十二月景辰校獵於華池庚申至自宜州皇太子破劉黒闥於魏州斬之山東平六年春二月辛亥校獵於驪山三月乙未幸昆明池宴百官夏四月巳未幸舊宅改爲通義宫曲赦京城繫囚於是置酒髙㑹賜從官帛各有差癸酉以尚書右僕射魏國公裴寂爲左僕射中書令宋國公蕭瑀爲右僕射秋七月突厥頡利宼朔州遣皇太子及秦王屯并州以備之八月壬子東南道行臺僕射輔公祏據丹陽反僣稱宋王遣趙郡王孝㳟及嶺南道大使永康縣公李靖討之景寅吐谷渾内附九月景子突厥退皇太子班師七年二月丁已幸國子學親臨釋奠改大揔管府爲大都督府三月戊寅廢尚書省六司侍郎増吏部郎中秩正四品掌選事戊戍趙郡王孝恭大破輔公祏擒之丹陽平夏四月庚子大赦天下頒行新律令以天下大定詔遭父母䘮者聽終制五月造仁智宫於宜州之冝君縣李丗勣討徐圎朗平之六月辛丑幸仁智宫秋七月巂音髓州地震山崩江水咽流八月戊辰突厥寇并州京師戒嚴壬午突厥退乙未京師解嚴八年夏六月甲子幸太和宫突厥宼定州命皇大子往幽州秦王往并州以備突厥八月并州道惣管張公謹與突厥戰于大谷王師敗績中書令温彦博没於賊九月突厥退冬十月辛巳幸周氏陂校獵因幸龍躍宫九年春正月景申命州縣修城隍備突厥尚書左僕射魏國公裴寂爲司空二月庚申加齊王元吉爲司徒戊寅親祀社稷三月辛夘幸昆明池六月庚申秦王以皇太子建成與齊王元吉同謀害已率兵誅之詔立秦王爲皇太子㹅統萬機大赦天下八月癸亥詔傳位于皇太子尊帝爲太上皇徙居弘義宫改名太安宫貞觀八年三月甲戌髙祖讌西突厥使者於兩儀殿頋謂長孫無忌曰當今蠻夷率服古未嘗有無忌上千萬歲壽髙祖大恱以酒賜太宗太宗又奉觴上壽流涕而言曰百姓獲安四夷咸附皆奉遵聖旨豈臣之力於是太宗與文德皇后氏進御膳并上服御衣物一同家人常禮是歲閱武於城西髙祖親自臨視勞將士而還置酒於未央宫三品巳上咸侍髙祖命突厥頡利可汗起舞又遣南越酋長馮智戴詠詩旣而笑曰胡越一家自古未之有也太宗奉觴上壽曰臣早蒙慈訓教以文道爰從義旗平定京邑重以薛舉武周丗充建德皆上禀垩神籌幸而尅定三數年間混一區宇天慈崇寵遂蒙重任今上天垂祐時和歲阜𬒳髪左袵並爲臣妾此豈臣智力皆由上禀聖筭髙祖大恱羣臣皆呼萬歳九年五月庚子髙祖大漸下詔從漢制以日易月園陵制度務從儉約是日崩於太安宫之垂拱前殿年七十謚曰大武皇帝廟號髙祖葬獻陵髙宗上元元年改上尊號曰神尭皇帝天寳十三年上尊號曰神尭大聖大光孝皇帝太平御覽卷第一百八
