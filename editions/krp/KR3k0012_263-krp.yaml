front:
  text: 太平御覽卷第二百六十三職官部六十一
  hash: sha256:0f89bb80635c6e5d551f5675fb77f299372311f6febe1ec7549f2b90fa1c35b1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_263-1a}
body:
  text: 別駕治中長吏司馬別駕應劭漢官儀曰元帝時丞相于定國條州大小爲設吏貟治中別駕諸部從事秩皆百石漢書曰黄霸爲豫州刺史三歳宣帝詔賜車蓋特髙一尺別駕主簿車緹油屏星於軾前以彰有德東觀漢記曰郭伋在并州行部童兒騎竹馬迎拜問使君何白當還伋語別駕計日告之後漢書曰袁紹領兾州以審配爲別駕委以腹心并揔幕府紹又以田豐爲別駕豐勸迎天子紹不納及敗曰吾慙田別駕謝承後漢書曰周景爲豫州辟陳蕃爲別駕不就景題別駕輿曰陳仲舉座也不復更辟蕃惶懼起視職又曰陳茂豫州刺史周敞辟爲別駕從事與俱行部到潁川陽翟傳傳中有置羙酒一押敬去勑御騶載酒以行茂見於外取押擊柱破之敞問茂刺史年老酒益氣別駕破押名亦何益茂荅曰所過皆有以明使君傳車騑驂載酒非冝也魏志曰崔琰字季珪太祖破袁氏領兾州牧辟琰爲別駕語琰曰北案户籍可得三十萬衆故爲大州也琰曰今天下分崩九州幅裂二袁兄弟親㝷干戈兾方蒸庻暴骨原野未聞王師仁聲先路存問風俗救其塗炭而計校甲兵唯此爲先斯豈彼州士女所望於明公哉太祖改容謝之于時賔客皆復失色又曰李膺自蜀使至都武帝恱之謂曰今李膺何如昔對曰今勝昔問其故對曰昔事桓靈之主今逢尭舜之君帝嘉其對以如意擊席者乆之乃以爲益州別駕又曰王基字伯輿東萊人時青土𥘉定刺史王陵表請基爲別駕陵流稱青土盖亦由基恊和之輔也吴書曰陸遜爲右護軍鎮西將軍權嘉遜功德欲殊顯之雖爲上將列侯猶欲令歷本州舉命乃使楊州牧吕範就辟別駕從事晉書曰王祥徐州刺史吕䖍撽爲別駕祥乃應召虔委以州事于時寇盗充斥祥率勵兵士頻討破之州界清靖政化大行時人歌之曰海沂之康實頼王祥邦國不空別駕之功鄧粲晉紀曰王澄爲荆州宗厥以酒色禮澄澄叱左右捽之別駕郭舒厲色曰使君醉澄曰狂邪枉我醉因炙舒眉晉中興書曰𥘉魏徐州刺史任城吕虔有佩刀工相之以爲必三公可服此刀虔語別駕王祥曰茍非其人刀或爲害卿有公輔之量故以相與祥始辭之虔強與乃受祥死之日以刀授弟覽曰吾兒凢汝後必興足稱此刀故以相與又曰長沙鄧粲髙㓗著名桓冲召粲爲別駕粲起就職時南郡劉尚公亦治操不仕粲旣就職尚公語粲曰卿道廣學深衆所推懷忽然改節誠失所望粲笑荅曰足下可謂有志於隱而未知隱之爲道朝亦可隱市亦可隱𥘉在我不在於物尚公無以難之雖然粲名譽解半矣又曰鄧騫字長眞長沙人也譙王承爲魏乂所敗乂求騫甚急郷人爲懼騫笑曰欲用我耳乃往詣乂喜謂曰君可謂古之解楊也以爲別駕續晉安帝紀曰益州刺史李邈微時居漢川與別駕姜顯餞送刺史顯忽邈邈曰大丈夫何至守偏地爲姜顯所陵即不復還家仍附舡下自是十五年而鎮梁漢顯猶拪遟即撽爲别駕後周書曰栁慶爲雍州別駕有賈人持金二十斤詣京師交易寄人停止毎欲出行常自執管鑰無何緘閉不異而失之謂是主人所竊郡縣訊問主人遂自誣服慶聞而歎之乃問賈人曰卿鑰恒置何處對曰恒自帶之慶曰頗與人同宿乎曰無與人同飲乎曰日者曽與一沙門再度酣宴醉而晝寢慶曰主人特以痛自誣非盗也彼沙門乃眞盗耳即遣吏逮捕沙門乃懷金逃匿後捕得盡獲所失之金隋書趙軌爲齊州別駕徴入朝父老相送者各揮涕曰別駕在官水火不與百姓交是以不敢以壷酒相送公清若水請酌一杯水奉餞軌授而飲之唐書曰德宗命王䖍休幕客昭義軍節度掌書記盧頊爲洺州別駕知州事賜緋魚袋賞有功也時元誼據洺州頊白於虔休請入城說下之頊見誼爲陳利害誼請隨頊歸朝故頊不次授官三輔决録曰蘇章爲兾州刺史召安平崔瑗爲別駕豫章列士傳曰孔恂字巨卿新淦人爲别駕車前後舊有屏星如刺史車曲翳儀式時刺史行部發失旦怒命去之恂曰明使君發自晏而飲撤去屏星毀國舊儀此不可行別駕可去屏星不可省即投傳而去曹操別傳曰武皇帝爲兖州以畢諶爲別駕兖州亂張孟卓劫諶母弟帝見諶曰孤綏撫失和聞卿母弟爲張邈所執人情不相逺卿可去孤自遣不爲相弃諶涕泣曰當以死自効帝亦垂涕荅之諶明日便走後破下邳得諶還以爲掾王允別傳曰允仕郡民有路拂者少無行而太守王珠召以𥙷吏允犯顔固爭珠怒収允欲殺之刺史鄧盛聞而馳傳辟爲別駕從事允由是知名路拂以之廢弃管輅別傳曰趙孔耀言輅於兾州刺史裴徽即撽召輅一相見清論終日不覺疲倦天時大熱移床在庭前樹下乃至雞鳴向晨然後出自尓引輅爲別駕江氏家傳曰統字應元太傳東海王領州牧請君爲別駕與君書曰昔子師作豫州末下車辟荀慈明下車辟孔文舉貴州人士有堪此求者不知君舉髙平郗道微爲賢良陳留阮宣子爲直言濟北程弘叔爲方正皆於時選爲允顧和別傳曰顧球時爲楊州別駕顧榮謂球曰卿速歩公孝如是超卿矣和字公孝庾亮集荅郭遜書曰別駕舊與刺史别乗周流宣化於萬里者其任居刺史之半安可任非其人應享與州將牋曰誨命欲求佳別駕自頃諸府大開捜延路廣海無遺蚌山亡逸璞歸數日卧思始得一人陳國有袁琇字惠瑛者才識可以經於治亂棲跱可以勸礪後進享具所服聞而未甞接顔交言也又宗令文早有名軰相與通家門素所具抑亦其次治中通典曰治中從事史一人居中治事主衆曹文書漢制也謝承後漢書曰陳禪爲州治中從事刺史爲人所劾受納贓賂禪當傳栲乃至笞掠無笇五毒畢加神意自若辭對無屈事遂釋應劭漢官儀曰司隷功曹從事即治中也魏志曰審配字正南魏郡人少忠烈慷慨有不可犯之節袁紹領兾州委配腹心之任以爲治中别駕又曰太祖令曰頻年巳來不聞嘉謀豈吾開延不勤之耶自今已後諸掾属治中別駕常以月旦各言其失吾將覽也又曰毛玠字孝先陳留平丘人也少爲縣吏以清公稱將避亂荆州未至聞劉表政令不明遂住魯陽太祖臨兖州辟爲治中從事蜀志曰龐統以從事守耒陽令不治免官魯肅遺先主書曰龐士元非百里之才使處治中別駕之任始當展其驥足耳乃以爲治中江表傳曰孫權尅荆州將吏悉皆歸附而潘濬獨稱疾不見權遣人以床就家轝致之濬伏面着床席涕泣交横權至慰勞與語使親近以手巾拭其面濬起下地拜謝即以爲治中王隱晉書曰唐彬檄爲治中別駕忠肅公亮匡救違闕盡規誨以納善不顯諌以彰主當朝正色焉又曰譙郡太守李詮稱散吏後竟爲治中檀道鸞晉紀曰習鑿齒少愽渉才情秀逸桓温竒之自州從事歳中三轉至治中梁書曰蕭洽爲南徐州治中旣近畿重鎮吏數千人前後居之者皆致巨富洽爲之清身率職饋遺一無所受妻子不免飢寒又曰陸襄字師卿爲楊州治中襄父終此官乃固辭髙祖不許聽與府司馬換廨居之也益部耆舊傳曰栁琮字伯騫爲治中與人交結乆而益親其所抜進皆世所稱致位牧守郷里爲之語曰得黄金一笥不如栁伯騫所識又曰張彦字伯春爲治中從事刺史毎坐髙床治中單席於地鄧德明南康記曰昔有盧躭仕州爲治中少有棲山之術善解飛每夕輙凌虚歸家暁則還州曽元㑹暁不及朝則化爲白鵠至閣前廻翔欲下威儀以箒擲之得一隻履躭乃驚還就列時歩騭爲廣州刺史意惡之便以狀列聞遂至誅滅世說曰習鑿齒才吏不常桓宣武器之未三十用爲荆州治中謝牋曰不遇明公荆州老從事耳長史後周書曰劉璠爲蕭循益州長史及太祖旣納蕭循之降又許其返國循至長安累月未之遣也璠因待宴太祖曰我於古誰比對曰常以公命世英主湯武莫逮今日所見曽齊桓晉文之不若太祖曰我不得比湯武望與伊周爲匹何桓文之不若乎對曰齊桓存三亡國晉文不失信於伐原語未終大祖撫掌曰我解尓意欲激我耳於是即命遣循陳書曰蕭濟爲楊州長史髙宗嘗勑取楊州曹事躬自省覽見濟條理詳悉文無滯留乃頋謂左右曰我夲期蕭長史長於經傳不意精練䌓劇乃至於此隋書曰榮毗楊素薦毗爲華州長史丗號爲能素之田宅多在華隂左右放縱毗以法繩之無所寛貸毗因朝集素謂之曰素之舉卿適以自罰也毗荅曰奉法一心者但恐累公所舉素笑曰前者戯耳卿之奉法素之望也又曰髙祖時制刺史二佐毎歲暮更入朝上考課唐書曰張惟一爲荆州長史以防禦使陳希昂爲司馬希昂衡州酋帥家兵千人在部下自爲藩衛有牟遂金仕至將軍爲惟一將希昂積憾持兵領衆入惟一衙索遂金頭金藏於惟一後院惟一懼截頭遂與之兵始退自此之後政歸希昻惟一寄坐而巳司馬北史曰魏蘇亮拜黄門侍郎文帝子冝都王武爲秦州刺史以亮爲司馬帝謂亮曰黄門郎豈河爲秦州司馬以朕愛子出藩故以心腹相委勿以爲恨三國典略曰齊以太子率更令崔龍子爲司州司馬𥘉龍子爲司徒功曹嫁女與穆提婆以求此職提婆許之以其品懸絶先轉爲率更令至是成㛰旣畢即便用之㝷有謡言牓於路側曰司州司馬崔老鴟取錢能疾判事遟御史馮士幹見而劾之遂免其官北史曰隋房恭懿歷澤德二州司馬盧愷復奏其政羙上甚異之復賜以帛諸州朝集稱爲勸勵之首以爲上天宗廟之所祐助豈朕寡薄能致之乎隋書曰劉摸爲嵐州司馬楊諒旣作亂刺史喬鍾葵發兵將赴逆摸拒之曰漢王所圖不軌公荷國厚恩致位方伯謂當竭誠効命以荅慈造豈有大行皇帝梓宫未掩飜爲厲階鍾葵失色曰司馬反耶臨之以兵氣辭不撓鍾葵義而釋之軍吏進曰若不斬摸何以厭衆心於是囚之於獄悉
