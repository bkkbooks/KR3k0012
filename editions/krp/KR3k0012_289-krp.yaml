  text: 太平御覽卷第二百八十九
  hash: sha256:022c90a363f040848e41e8e6fa059d31c428bdc7d7f190b0b63d49d2c118e07b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_289-1a}
body:
  text: 兵部二十機略八隋書曰楊義臣與漢王將喬鍾葵相拒義臣自以兵少悉取軍中牛驢得數千頭復令兵數百人人持一鼔潛驅之澗谷間出其不意義臣晡後復與鍾葵戰兵𥘉合命驅牛驢者疾進一時鳴鼔塵埃張天鍾葵軍不知以爲伏兵發因而大潰縱擊破之以功進位上大將軍又曰長孫晟討突厥逹頭晟進䇿曰突厥飲泉易可行毒因取諸藥毒水上流逹頭人畜飲之多死於是大驚曰天雨惡水其亡我乎因夜遁晟追之斬首千餘級又曰髙熲獻取陳之䇿曰江北地寒田收差晚江南土熱水田早熟量彼收穫之際徴集士馬聲言掩襲必屯兵禦守足得廢其農時彼旣聚兵我便解甲再三若此賊以爲常後雖集兵彼必不信持疑之頃我乃濟師登陸而戰兵氣益壯文帝行其䇿陳人益弊又曰賀若弼鎭淮南先是弼請縁江防人毎交代之際必集歷陽於是大列旗幟營幕𬒳野陳人以爲大兵至悉發國中士馬旣知防人交代其衆復散後以爲常不復設備其後弼以大軍濟江陳人弗之覺也遂滅陳通典曰隋末王丗充與李密相持於東都充夜渡陣於洛水之北其時密亦渡洛水陣兵與充相對月城西至石窟密兵多馬騎長槍冝路寛放縱充兵多戈矛􅗋冝隘險然南逼洛水北限大山地形𥚹促騎不成列縱􅗋蹙之密軍失利密與數子登舡南濟自餘兵馬皆東走月城充乗勝長驅直至月城下密旣渡南岸即䇿馬西上直向充本營左右麾旌相繼而至充營内見密兵來逼急連舉六烽充乃捨月城之圍收兵西退自洛北逹於黒石中間四十餘里奔赴顛狽大喪師徒密之行也東北之圍不救而自解西南之㓂不戰而成功充伏其權竒不復輕岀又曰隋漢王諒據并州及隋將楊素率衆數萬討諒時晉絳吕三州並爲諒城守素各以二千人縻之而去諒遣將趙子開擁衆十餘萬柟絶徑路屯據髙壁嶺布陣五十里素令諸將以兵臨之自引兵入霍山縁崖谷而進直指其營一戰破之殺獲數萬又曰隋開皇中文帝大議伐陳諸將皆云大江闊逺兵不習水以此爲疑若一登南岸秦兵一可當百襄邑公賀若弼獻十䇿其一事請多造舡須舡旣多賊必防擬更甚今南地無馬請付傍江諸州二十歳巳上老馬令飼以平陳爲名賊必懼求馬擬戰密勑刺史私賣博大舡江南下濕特不冝馬不逾周年並當死盡終不爲彼用陳主陳叔寳果大造舡市馬輸舡旣多方覺不便而止髙頴請所博得舡運諸州米貯壽陽城役徒於壽陽穿大池以魚蓮遨遊爲名造舡教水戰仍以賀若弼爲壽州揔管終以此平陳又曰隋將軍劉方率兵討林邑國其王𣑽志率其徒乗巨象而戰方軍不利方於是多掘小坑草覆其上因以兵挑之𣑽志悉衆而陣方以戰僞奔北𣑽志逐之至坑所其衆多䧟轉相驚駭軍遂亂縱兵擊大破之又曰隋末宇文化及殺焬帝後率兵來攻李宻於黎陽密知化及糧且盡因僞與和弊其衆化及弗之悟大喜恣其兵食兾密饋之㑹密下有人獲罪亡投化及具以告密情化及大怒其食又盡乃度永濟渠與宻戰于童山之下自辰逹酉密爲流矢所中頓於汲縣化及掠汲郡北趣魏縣其將王智略張童仁等率所部兵歸于宻者前後相繼又曰隋末楊玄感反攻東都刑部尚書衛玄感戰兵始㑹玄感詐令人大呼曰官軍巳得玄感矣官軍稍怠玄感與數千騎乗之玄感兵於是大潰又曰隋焬帝征髙麗隋將于仲文率軍從樂浪道軍次烏骨城仲文㨂羸馬驢數千置於軍後旣而率衆東過髙麗出兵掩襲輜重仲文廻擊大破之又曰隋漢王諒作亂遣其將余公理自太行下河内隋將史祥討之軍於河隂乆不得濟祥謂軍吏曰余公理輕而無謀才用素不足稱又新得志謂其衆可恃恃衆必驕且河北人先不習兵所謂擁市人而戰不足圖也乃令軍中修攻具攻河陽公理使諜知之果屯兵於陽内城以備祥祥於是􅋈舩河南公理聚甲以當之祥乃簡精銳於下流潛度公理率衆拒之祥至浿水浿古間切兩軍相對公理未成列祥縱擊大破之又曰隋末李密破宇文化及還其勁兵良馬多死隋將王充守東都欲乗其弊練精勇得二萬餘人馬千餘疋於洛水南密軍偃師北山上時密新得志於化及有輕充之心不設壁壘充夜遣二百餘騎潛入北山伏溪谷中令軍士秣馬蓐食旣而霄濟人奔馬馳遲明而薄密出兵應之陣未成列而兩軍合戰其伏兵蔽山而上潛登北原乗髙而下馳壓密營營中亂無能拒之者即入縱火密軍大驚而潰唐書曰太宗屯武牢竇建德悉衆而南陳兵於汜水王充將郭士衡陣於南周亘數里鼓譟請戰諸將大懼太宗數騎升髙丘安坐以望之謂諸將曰賊起山東未見大敵今度險而囂是無正令逼城而陣有輕我心我按兵不出彼廼氣衰陣乆卒飢勢將自退追而擊之何徃不尅吾與公等爲約必以午後破之如或不然寡人爲無謀矣建德乃遣兵渉汜水太宗令揔管王君廓以少擊之待河北馬渡方欲與戰建德列陣自辰至午士卒飢倦人皆坐列又爭飲水太宗乃令宇文士及將三百騎經賊陣之西馳而南上誡之曰賊若不動汝冝引歸如覺動冝岀東面士及纔過賊衆果動逡廵欲退太宗曰可以擊也親率輕騎追而誘之衆軍継至建德廻師陣未及整列太宗先登以擊之所向皆靡俄而衆軍合戰囂塵四起太宗率史大奈程䶧金秦叔寳宇文歆等纏幡而入出其陣後張我旗幟賊顧見之衆乃大潰追奔三十里斬首三千餘級虜其衆五萬餘人一時放散又曰太宗討劉黒闥相持兩月餘黒闥率歩騎二萬南渡洺水結陣而至晨壓我營太宗遣輕騎當之賊皆殊死戰於是親率精騎擊賊馬軍破之因乗勝蹂其歩卒自午及昏戰數合賊大潰斬首萬餘級溺水死者數千人黒闥與二百人北走悉虜其衆先是太宗遣兵堰洺上流令黒闥得渡及戰之日遽令決堰水大至深丈餘賊衆以爲神由是敗走又曰武德中突厥頡利二可汗到原州太宗率兵拒之雨甚太宗乃召諸將謂之曰虜控弦鳴鏑弓馬是慿今雨弥時弧矢俱弊突厥人衆如鳥矢所介切羽我屋宿火食搶槊犀利料我之逸揣敵所勞此而不乗夫復何待今欲先令勁兵亂其陣乃率突騎驅其後虜俗進不相讓退不相救自以北澗谷深長時有一道魚貫以度因而迫之彼十萬騎坑穽中物耳追至黄河縱不盡擒必當十獲八九此曉兵者所以解諸君勿疑於是潛師夜出冒雨而進醜徒震駭因縱反間於突利恱而歸心二可汗内離頡利欲戰不可因請和而去又曰貞觀中蘇定方率兵討突厥賀魯大雪平地二尺軍中咸請停兵候晴定方曰虜恃雪深謂我不能前進必當憇息追之可及若緩以縱之則漸逺難追省日兼功在此㪯也於是勒兵陵雪晝夜兼進所經收其人衆遂至雙河去賀魯所居二百餘里布陣長驅徑至金牙山賀魯牙帳時賀魯集衆欲獵定方縱兵擊之盡破其牙帳生擒數萬人賀魯脫走投石國定方於是悉命諸部歸其所居埋瘞骸骨存問疾苦復其産業賀魯所虜掠者悉撿責還之於是西域諸國安堵如故令副將蕭嗣業徃石國以追賀魯遂擒歸于京師又曰貞觀中突厥諸部離叛朝庭將圖進取以李靖爲代州道行軍揔管率驍騎三千自馬邑出其不意直趨惡陽嶺以逼之突利可汗不虞於靖見官軍掩至相謂曰唐兵若不傾國而來靖豈孤軍而至一日數驚四年靖進擊定襄城破之突厥諸部落並走磧北突利可汗來奔又曰貞觀中吐谷渾㓂邊以李靖爲西海道行軍大揔管統兵部尚書侯君集刑部尚書任城王道宗等五揔管征之軍次伏埃城吐谷渾燒去野草以餧我師退保大非川諸將咸言春草未生馬巳羸疲不可赴敵唯靖決計而進深入敵境遂踰積石山前後戰數十合殺傷甚衆大破其國又曰武德中突厥突利頡利二可汗到原州太宗率兵拒之兩陣將交太宗以數騎岀謂之曰不念昔者香火之言乃來相侵知二可汗外同内異故以此言疑之頡利見太宗輕岀又聞香火之言乃隂猜突利因遣使曰王不須慮我無惡意更欲與王自斷當耳於是歛軍引却又曰貞觀中北狄鐡勒薛延陀發同羅㒒骨廻紇等衆合二十萬度漢屯白道川據善陽嶺以擊突厥可汗李思摩之部思摩引其種落走朔州留精騎以拒戰延陁乗之及塞太宗令張儉李勣等率兵數道擊之時太宗誡之曰延陁負其兵力踰漠而來經途數千馬巳疲瘦夫用兵之道見利速進不利速退其掩思摩不能疾擊思摩旣入長城又不能速退吾先勑思摩燒薙殺草延陁糧食日盡野無所獲頃者偵人來云其馬齧噉林木枝皮略盡卿等椅角思摩不須前戰俟其將退一時奮擊制勝之舉也於是李勣擊延陁之衆破之先是延陁擊突厥沙鉢羅及杜尓皆以歩兵戰而勝及其將來㓂也先講武於國中教習歩戰毎五人以一人經習戰陣者使執馬而四人前戰克勝即授馬以追奔失於應接罪至於死没其家口以賞戰人至是遂行其法突厥先合趣退延陁乗勝而逐之勣兵拒擊而延陁萬矢俱發傷我戰馬李勣乃令去馬歩陳率長矟數百爲隊齊奮以衝之其衆潰散副揔管薛萬徹率數千騎收其執馬者其衆失馬莫知所從因擊之乃大敗又曰武后𥘉徐敬業起兵於揚州武太后令將軍李孝逸討之敬業拒于髙卸之下阿谿敬業置陣旣乆士卒多疲怠皆顧瞻陣不能整孝逸遂率衆擊之因風縱火敬業懼燒而退孝逸進擊大破之又曰武德中薛萬均與羅藝守幽燕竇建德率衆十萬来至范陽萬均謂藝曰衆寡不敵今若兵鬪百戰百敗當以計取可令羸兵弱馬阻水背城爲陣以誘之賊若度水請公精騎百人伏於城側待其半度而擊之破之必矣從之建德引兵度水萬均擊之大破又曰武德𥘉王丗充據東都太宗徃征之屯青城宫營壘未立王丗充衆二萬自方諸門岀臨穀水以禦大軍諸將甚懼太宗以精騎陳於北邙登後魏宣武陵以觀賊陣謂左右曰賊勢迫矣悉衆而出利在一戰今日破之其後不能出矣乃令屈突通率歩卒五千度水布陣以當之因戒通曰待兵交即放煙吾當率馬軍南下兵纔接太宗以騎衝之挺身先進表裹合勢賊衆殊死戰散而復合者數焉地旣險隘賊多􅗋􅗋鋋也筭也騎戰稍難太宗親自射之莫不應弦而倒起辰及午賊衆始退因乗之迫于城塹俘斬七千人自是不敢復岀又曰髙宗遣將軍裴行儉計突厥於黒山至朔川謂其下曰兵法尚詐者以權謀制敵也若御其下則非誠信不可行遣副將蕭嗣業運糧𬒳掠兵多餧死所以敗也狡㓂狃忲不可以不備乃詐爲糧車三百乗毎車伏壯士五人各賫陌刀勁弩以羸兵數百人援之兼伏精兵居險以待之賊果大下羸兵弃車散走賊驅馬就泉井解鞍牧馬方擬取糧車中壯士齊發伏兵亦至殺獲殆盡賊衆奔潰自是續遣糧運無敢近之者又曰馬燧爲魏博招討使田恱求救於淄青恒州李納遣大將衛俊將兵僅萬人以救恱李惟岳亦遣三千餘人救恱收合散兵二萬餘壁於洹水淄青軍其東恒州軍其西首尾相應燧帥諸軍進屯於鄴奏請益河陽兵詔遣河陽節度使李芁將兵㑹之軍次於漳恱遣將王光進以兵守長橋築月城以爲固軍不得渡燧乃於下流以兵車數百乗維鐵鎻絶中流實以土囊以遏水水稍淺諸軍畢渡是時軍粮少恱深壁不戰欲老燧軍燧令諸軍持十日粮以前進次倉口與恱等夾洹水而軍李抱眞等問曰粮少深入何也燧曰粮少利速戰兵法善於致人而不致於人今田恱與淄青恒州三軍爲首尾計以老我師若分軍擊其左右兵少未可必破恱且來救是前後受敵也兵法所謂攻其必救固當戰也燧爲諸公合而破之燧乃造三橋逾洹水日挑戰恱不敢出恒州兵自以軍少懼爲燧所并引軍合於田恱燧又令於軍中曰恱死傷之餘安敢岀戰所恃者淄青軍尓吾當先破納軍則田恱坐受降也淄青軍聞懼亦引軍合於田恱謂燧明日復挑戰乃伏兵萬人欲邀之燧乃令諸軍半夜皆食先鷄鳴時擊鼔鳴潛師旁洹水西徑趨魏州令曰聞賊至即止爲陣又令百騎鳴鼔角留於後仍抱薪持火待軍止鼔角匿其旁伺恱軍渡焚其橋軍行十數里恱乃率淄青恒州兵歩騎四萬餘踰掩其後乗風縱火鼔噪而進燧乃坐軍前除草斬榛棘廣百歩以爲陣募勇士得五千餘人分爲前引以俟賊至比恱軍至則火㓕氣乏力少衰乃縱擊之恱大敗時神䇿昭義河陽軍小却河東軍勝諸軍還鬪合擊又大破迫切洹水恱軍走橋橋巳焚矣恱軍亂赴水斬首二萬殺賊大將孫晉卿安墨啜生獲三千餘人溺水死者不可勝數淄青軍殆盡死者相枕藉三十里恱收兵得千餘人走夜至魏州又曰元和十二年唐鄧節度使李愬奏以九月二十六日
