front:
  text: 太平御覽揔類卷第五百五十九
  hash: sha256:cdcbc20a9932c84effa80462f171750a12675cea9adcb4cef6d3a7892150b41e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_559-1a}
body:
  text: 禮儀部三十八冢墓三三秦記曰昭帝母鈎弋夫人居甘泉宫三年不反遂死即葬之以千人營葬故有千人葬名曰思合墓徐廣晉紀曰關中發漢杜霸二陵薄太后棺靣如生矣呉録曰范愼字子敬在武昌自造冢名作長室時與賔客作樂鼓吹入中宴飲漢趙記曰上洛男子張盧死二十七日人有盗發其冢盧得蘇起且問盗人姓名郡縣以雖元意姦䡄盧復由之而生不能決豫州牧呼延謨以聞詔曰以其意惡功善論笞三百不齒終身王智深宋紀曰齊宣帝墳塋在武進縣常有雲氣氛氲入天元嘉中望氣者稱此地有天子三齊略記曰田開強公孫接古治子三壯士冢在齊城東南三百歩陽隂里中王子年拾遺記曰南尋之國其死者葬之中野百鳥衘土爲墳羣獸爲之掘穴不封不樹西京雜記曰青龍觀前有三梧樹樹下石麒麟二枚始皇葬墓中物也又曰廣川王去疾好聚無頼少年遊獵無度國内冢藏一切發掘其竒異者魏襄王冢以文石爲椁髙八尺許廣狹容四十人以手捫棺滑液如新中有石床石屏風婉然周正不覺棺柩盥器縱跡但床上玉唾盂一枚銅劒二枚金雜具皆如新玉自取服之襄王冢以鐵灌其上穿鑿三日乃開黄氣如霧觸人鼻目痺辛不可入以兵守之經曰乃歇𥘉至一户無扉籥石床方四尺床上有石几左右各三石人立侍皆武冠帶劒復入一户石扉有關籥叩見棺椁黒光照人刀斫不入燒鋸截之乃􅃮雜兕革爲棺椁厚數寸累積十餘重力不能開乃止復入一戸亦石扉關鑰得一石床方七尺屏風銅帳鈎或在床上或在地下似是帳糜杇而銅鈎墮落床上石枕一枚床上塵埃朏朏音斐甚髙似是衣服床左右婦女二十悉皆立侍或有執巾櫛鏡鑷之象或有執盥捧食之形無餘異物俱見䥫鏡數百所魏王子且渠冢甚淺狹無柩但有石床廣六尺長一丈石屏風下悉是雲母床上兩屍一男一女年皆二十許俱東首祼形卧無衣裳肌膚顔色髪齒如生人畏懼不敢侵擁閇如故袁盎冢以瓦爲棺器物都無唯銅鏡一枚晉靈公冢甚瑰壯四角皆以石爲玃大奉燭石人男女四十餘皆立侍棺器無復形兆尸猶不壞穴竅中皆有金玉其餘器物皆朽爛不別唯玉蟾一枚大如拳腹空容五合水光潤如新玉取以成水書幽公冢甚髙壯羡門旣開皆是石惡撥除深文餘乃得雲母深尺所乃得百餘尸縱横相枕皆不朽唯一男子餘悉女子或卧亦有立者衣服形色不異生人欒書冢棺柩明器朽爛無餘有白狐見人驚走左右逐㦸之不能得傷其左脚夕王夢一丈夫鬢眉盡白來謂王曰何故傷吾左脚仍以杖叩王左脚王覺左脚腫痛生瘡至死不差述征記曰梁孝王冢斬山徙户以石爲藏行一里到藏中有數尺水有大鯉魚人皆潔而進不齊輙有獸噬其足獸似豹也幽明録曰漢未大亂頴川有人將避地他郡有女年七八歳不能渉逺勢不兩全道邊有古冢穿敗以繩繫女下之經年餘還於冢尋覔欲更殯葬忽見女尚存父大驚問女得活意女云冢中有一物於晨暮際輙伸頭翕氣爲試效之果覺不復飢渇家人於冢尋索此物乃是大龜又曰孫鍾呉郡冨春人堅之祖也與母居至孝篤信種瓜爲業忽有三年少詣乞瓜鍾爲設食臨去曰我司命也感君不知何以相報此山下善可作冢復言欲連丗封侯而數代天子耶鍾跪曰數代天子故當所樂便爲定墓曰君可山下百歩後頋見我去豦便是墳所也下山行百歩便頋見悉化成白鶴也述異記曰南康郡鄧德明常在豫章就雷次宗學雷家丗東郊之外去史豫章墓半里許元嘉十四年德明與諸生歩月逍遥忽聞音樂諷誦之聲即夜白雷出聽曰此間去人尚逺必鬼神也乃相與尋之遥至史墓但開墳下有管綰女歌講吟詠之聲咸歎異焉酈善長注水經曰智水東逕七女冢冢夾水羅布如七星髙十餘文周廻數畒元嘉六年大水破墳崩出銅不可稱計北有七女池池東有明月池狀如偃月皆相通注謂之張良渠盖良所開也又曰粉水有文將軍冢前有石虎石柱甚脩麗閭丘羡爲南陽葬婦墓側將平其域夕夢文諌止之而羡不從後羡乃爲人所害又曰淄水出太山萊蕪縣原山東過利縣東水西有桓公冡冢東有女水或云桓公女冢在其上故以名水甚有神焉化隆則水生政薄則津竭又曰潜水縣有車騎將軍馮緄音衮桂陽太守李温冢二子之靈常以日還郷潜水暴長郡縣吏莫不水上祭之搜神記曰宋大夫韓馮取妻而美康王奪之馮怨王囚之論爲城旦妻宻遺馮書謬其辭曰其雨淫淫河大水深日出當心王以問蘇賀對曰其雨淫淫言愁且思也河大水深不得徃來也日出當心有死志也俄而馮自殺妻乃隂腐其衣王與之登䑓遂自䑓投下左右攬之衣不中手遺書於帶曰願以骨與馮而合葬王怒弗聽使人埋之冢相望也王曰尓夫婦相愛不巳能使冢合則弗禁也一宿有丈梓木生於二冢之端旬日其大合抱屈體以相就根交於下又有鴛鴦雌雄各一恒栖樹上晨夕交頸悲鳴音聲感人宋人哀之遂號其木曰相思樹又曰漢馮貴人死將百歳盗賊發冢貴人顔色如故但微令羣盗共姦之致妬忌争闘然後事覺續捜神記曰王伯陽家東有一冢傳云魯肅墓伯陽婦喪乃平其墳以葬後數年伯陽白日在㕔事忽見一貴人乗平肩轝將從數百人馬皆浴䥫徑來坐謂伯陽曰吾是魯子敬安冢在此二百許年君何敢壊吾冢目頋左右掌伯陽下床以刀環築之數百而去登時絶良乆乃蘇築破豦皆發疽潰尋便死又曰承儉者東莞音管人病亡葬夲縣界後十年忽與其縣令夣云故民承儉今見刼明府急見救令便勑内外裝乗作百人仗便令馳馬徃冢上日向巳出天忽大霧對靣不相見但聞冢中忷忷破棺聲有二人墳上望霧冥不見人百人同聲大呌收得冢中三人墳上二人得逸走其夜令夢云二人雖得走民巳誌之一人靣上有青誌如藿業一人斵其兩齒折明府但案此尋覔也追捕並擒獲異苑曰蒼梧王士爕漢末死於交趾遂葬南境而墓常蒙霧靈異不恒屢經離亂不復發掘晉興寧中太原温放之爲刺史躬乗騎徃開之還即墜馬而卒又曰潁川諸闔字道明墓在楊州蔣山之西每至隂雨冢中輙有絃管之音又曰魏武北征蹹頓升嶺眺瞩見一崗不生百草王粲曰必是古冢此人在丗服特生礜石死而石生熱蒸出外致大木燋滅即令鑿果得大墓有礜石滿塋志恠集曰陶侃微時遭大喪葬家貧親自營塼有班特牛專以載致忽然失去便自尋覔道中逢一老公便舉手指云向於崗上見一牛眠山洿中必是君牛眠豦便好可作墓安墳則致極貴小下當位極人臣丗爲方嶽侃指一山云此好但不如下當丗有刺史言訖便不復見太尉之葬如其言侃指別山與周訪家則并丗刺史矣潘岳關中記曰秦始皇陵上驪山之北髙數十丈周廻六七里今在隂盤界此陵雖髙大不足以銷六十萬人積年之功也其用功力或隱而不見者驪山泉夲北流者皆陂障使西流又此無大石運取於渭北諸山故其歌曰運石甘泉口渭水爲不流千人一唱萬人相鈎又曰漢諸陵皆髙十二丈方百二十歩唯茂陵髙十四丈方百四十歩徙民置諸縣者凡七陵長陵茂陵各萬戸其餘五陵皆各五千縣属太常不領郡也守衛陵掃除凡五千戸陵令一人食官令一人寢廟令一人園長一人園門令史三十二人候四人元帝時三輔七十萬戸始不復從民陪陵渭陵延陵義陵皆不立縣也雷次宗豫章記曰郡東南二十里有一大冢號丹陽郭長老云是郡人丹陽太守聶友冢也外形甚髙大内一大冢居中兩邊各有四小冢横首大冢外作徼道周匝皆通冢裏髙二丈餘小者半之徼道又半之此冢相通一埏似是殉葬者不聞聶友奢僣以人從死也且今新塗音紺縣南十里見聶友墓荆州圗記曰酈縣北三十里有一墓甚崇偉前有石樓髙一丈五尺上作石鳯將九子相傳云是姚家墓不詳其人又曰江陵縣東南七十里有楚昭王墓髙四丈餘王粲登樓賦所謂西接昭丘是也盛弘之荆州記曰霄城東南有單龍村村外有單龍冢甚髙大舊傳單龍能仰觀俯察少公之儔也數稱劉氏當王聖公應其符聖公潜嘉之固此起兵後稱号於宛而龍卒故厚爲其葬又曰鄭郷即鄭城地也崗南有劉長沙墓益州牧焉之父其南又有漢魏郡太守黄香冢鄧德明南康記曰白水有髙巖臨水頂有柴侯墓遥望松樹卒歳不彫說者云墓豦極峻及累石爲冢又別有金錢藏不可得開若欲上山必遇雷晦之異夜時見光色如雷之爛音艶所謂寳精也又曰平固水口下數里有螺亭昔一少女曽江畔乗小船採螺停沙邊共宿夜聞騷騷如軍馬行須臾見羣螺張口無數突來破舎噉此女子同侣悉走上岸至曉方還伹見骨耳収埋林際報其家經西五日間所埋豦飜見古冢髙十餘丈穹隆頂可受二十人坐其旁多螺新故相傳謂之螺亭又曰南野山獻山大塘下流三十里有漢太傅陳蕃冢墓昔值軍亂聞墓有寳三軍争掘忽有大虵圍繞墳前崩雷晦雨當時竟不得發鄭緝之東陽記曰孝子許孜父墓去虎山十里在山之麓曲隧三里鹿甞食其松栽孜心念之即日鹿自死於所犯栽之下孜埋死鹿有小墳至今猶存又曰獨公山有古冢臨溪其塼丈曰筮言吉龜言凶三百年墮水中義熈中冢猶半存自後稍以崩盡㑹稽郡十城地志曰上虞縣東南有古冢二十餘墳宋元嘉之𥘉潮水壞其大冢𥘉壞一冢塼題文曰居在夲土厥姓黄卜葬於此大冨強易卦吉亀卦凶四百年後随江中當值王顒縣令皮熈祖取數塼置縣樓下池中録之悵然而巳輿地志曰瑟琶折有古冢半在水中甓有隱起字云瑟琶筮云吉龜云凶八百年墮水中謝靈運取甓至京師諸貴傳觀之神恠志曰王果經三峽見石壁有物懸之如棺使取之乃一棺也發之骸骨存焉有銘曰三百年後水漂我至長江垂欲墮欲落不落逢王果果􅷐然曰數百年前巳知有我乃改葬祭之而去蘇州冢墓記曰宋青州刺史郁泰玄性多仁恕德感禽獸𥘉葬之日羣鷰數千銜土於冢上今冢猶髙大與他墳有異村郷歲時祭祀至今不絶太平御覽卷第五百五十九
