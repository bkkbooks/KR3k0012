front:
  text: 太平御覽卷第二百七
  hash: sha256:bbae1ebf4ae0ba68366c51c4c62ef9fbc3e3adc06f987e06607c35e2846adf63
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_207-1a}
body:
  text: 職官部五太尉司徒上太尉禮記月令曰孟夏之月命太尉賛傑俊蔡邕章句曰太尉卿官春秋運斗樞曰赤龍負圖以出河見堯與太尉舜等百二十臣集發藏大麓春秋合誠圖曰堯坐中舟與太尉舜臨觀鳯皇授圖史記曰孝惠帝六年置太尉官漢書曰太尉秦官也掌武事又曰髙祖言周勃重厚而少文然安劉氏者必勃也可爲太尉東觀漢記曰劉彪字智伯爲太尉在位清白廉讓以率下又曰張輔字孟侯爲太尉父尚在輔每遷轉乃一到雒父來適會正臘公卿罷朝俱賀歳奉酒上輔父壽極欣醼莫不嘉其榮也後漢書曰楊震字伯起嘗客於湖外不荅州郡禮命數十年衆人謂之晩暮而震勵志踰篤後有鸛雀衘三鱣魚飛集講堂前都講取魚進曰凡鱣者卿大夫之服象也數三者法三台也先生自此昇矣後果位至太尉又曰劉寛爲太尉靈帝頗好學藝每引見寛令講經寛嘗於坐𬒳酒睡伏𬒳加也爲酒所加也帝問太尉醉耶寛仰對曰臣不敢醉但任重責大憂心如醉又曰張禹爲太尉時連歳災荒府藏空虚禹上䟽求入三歳租稅以助郡國廪假廪給也假貸也許之又曰楊震代劉愷爲太尉帝舅大鴻臚耿寳薦中常侍李閏兄於震震不從寳乃自徃候震曰李常侍國家所重欲令公辟其兄寳唯傳上意耳言非巳本心傳在上之意震曰如朝廷欲令三府辟召固冝有尚書勑遂拒不許寳大恨而去又宦者傳曰曹嵩靈帝時貨賂中官及輸西園錢一億万故位至太尉續漢書百官志曰太尉一人掌方岳事物功課歳盡則奏其殿最而行賞罰丗祖即位爲大司馬又曰太尉郊廟掌亞獻大喪告謚南郊又曰王龔爲太尉在位恭愼自非公事不通州郡書記其所辟命皆海内長者謝承後漢書曰鄭弘爲臨淮太守行春有二白鹿隨車夾轂而行弘怪問主簿黃國鹿爲吉凶賀曰聞三公車轓畫作鹿明府當爲宰相弘後果爲太尉又曰陳蕃拜太尉臨朝歎曰黃憲若在不敢先佩印綬又曰鄭弘字巨君爲太尉舉將第五倫爲司空班位在下每正朝見弘曲躬自卑帝知遂置雲母屏風分隔之由此以爲故事又曰京兆朱寵字仲威爲太尉家貧食脫粟飯卧布𬒳朝廷賜錦𬒳梁肉皆不敢當華嶠後漢書曰安帝即位太尉徐防以災異宼賊䇿免就國凡三公以災免自防始也袁山松後漢書曰太尉劉虞讓位於羊續靈帝時爲三公者皆輸禮錢千万續舉褞𫀆以示之曰臣之所有唯此而巳遂不代虞張璠漢記曰楊秉字叔卿爲太尉常曰我有三不惑酒色財也天下稱爲名公漢書百官表曰太尉秦官金印紫綬掌武事周勃灌嬰周亞夫等爲之又百官表注曰太尉古官也自上安下曰尉故官以爲號應劭漢官儀曰章帝詔曰司空牟融典職六年勤勞不怠其以融爲太尉録尚書事又曰冲帝冊書曰太尉趙峻貳掌樞衡有匪石不貳之心又曰三公國之楨幹朝廷取正以成斷金大司農李固公族之苗忠正不撓有史魚之風其以固爲太尉又曰河間相張衡說明帝以爲司徒司空府已榮欲更治太尉府府公南陽趙喜也西曹掾安衆鄭均素好名節以爲朝廷新造北宫整飭宫寺今府夲館陶公主第舎貟職鮮少自足相授喜表陳之即見聽許其冬帝幸辟雍歴二府光觀壯麗而太尉府獨卑陋顯宗東顧歎息曰屠牛縱酒勿令乞兒爲宰漢官典職曰太尉孝文三年置七年省武帝建元二年置五年復省更名大司馬建武二十七年復置太尉魏志曰文帝踐祚鍾繇遷太尉時華歆王朗並先丗名臣帝罷朝謂左右曰此三公者乃一代之偉人也後日殆難繼矣又曰華歆拜太尉歆疾乞退讓位於管寕文帝不許臨當大㑹乃遣散騎常侍繆襲奉詔諭旨曰朕新蒞庻事一日万機懼聽斷之不明賴有德之臣左右朕躬君其力疾就㑹以惠予一人將立几筵命百官揔巳以須君到然後御坐又曰鄧艾字士載旣平劉禪詔曰艾曜威奮武深入虜庭斬將搴旗梟斬鯨鯢使僭號之主稽首係頸歴丗逋誅一朝而平兵不踰時戰不終日雲徹席卷蕩定巴蜀雖白起破强楚韓信克勁趙呉漢擒子陽亞夫滅七國計功論美不足比勲其以艾爲太尉増邑二万户又曰王祥字休徴爲太尉司馬文王進爵爲王祥與司徒何曽司空荀顗並詣王顗曰相王尊重今可相率而拜祥曰相國勢位誠爲尊貴然乃是魏之宰相吾等魏之三公公王相去一階而已班列大同安有天子三司可輙拜人者耶損魏朝之羙虧晉王之德君子愛人以禮吾不爲也及入荀顗遂拜祥獨長揖文王謂祥曰然後知君子見顧之重呉志曰孫皓詔曰范慎勲德俱茂朕所敬慿冝登上公以副衆望可爲太尉晋中興書曰郄鑒爲太尉雖在公位沖心愈約勞謙日庂誦翫墳索自少及長身無擇行家夲書生後因喪亂解巾從戎非其夲願常懷慨然咸康五年秋寢疾上䟽遜位優詔不許又曰桓温授侍中太尉固讓不受旬月之中使者八至軺軒相望於道温遂親職謝靈運晉書曰秦有太尉掌兵漢仍修之或置或省是故司馬之官主九伐之職齊職儀曰魏文黃𥘉二年日蝕奏免太尉賈詡詔天地灾害責在朕躬勿貶三公遂爲永制五代史後唐書莊宗御文明殿冊齊王張全義爲守太尉如常儀禮畢全義於尚書都省領事宰臣羣官在列左諌議竇專不降階爲御史所劾專援引舊典以對時宰臣不記故事無能詰責寢而不行汝南先賢傳曰陳蕃拜太尉讓曰齊七政訓五兵臣不如議郎王暢天文録曰三公星在北斗杓南主宣徳化和隂陽若今之太尉司空之象也摯虞冊隴王太尉文曰朕惟君行爲時表親則宗臣論道經邦保乂皇家是用進登上台司徒上尚書舜典帝曰契百姓不親五品不遜五品五常遜順也汝作司徒而敬敷五教在寛五常之教務在寛也禮記王制曰司徒脩六禮以節民性明七教以興民徳齊八政以防民滛一道徳以同俗養耆老以致孝恤孤獨以逮不足上賢以崇徳簡不肖以黜惡司徒地官卿掌邦教也又月令曰孟夏之月司徒行縣鄙蔡邕月令章句曰司徒教官也又曰契爲司徒而民成謂知五教之禮也毛詩緇衣曰緇衣羙武公也父子並爲周司徒善於其職國人冝之故羙其德以明有國善善之功焉周禮曰乃立地官司徒使帥其屬而掌邦教以佐王安擾邦國擾亦安也又曰大司徒之職掌建邦之土地之圖與其人民之數以佐三安擾邦國以天下土地之圖周知九州之域廣輪之數辨其山林川澤丘陵墳衍原隰之名物又曰地官曰大司徒之職凡建邦國以土圭土其地而制其域土其地猶言度其地也又曰大司徒之職以五禮防万民之僞而教之中禮所以節止民之侈僞使其行得中以六樂防万民之情而教之和樂所以蕩正民之情思使其心應和也又地官曰大司徒之職以保息六養万民一曰慈㓜保息謂安之也慈㓜謂愛㓜少也二曰飬老三曰振窮四曰恤貧五曰寛疾六曰安冨安富謂平其徭役不專取春秋傳曰祝鳩氏司徒也尚書大傳曰百姓不親五品不訓則責司徒韓詩外傳曰君臣不正人道不和國多盗賊人怨其上則責之司徒論語摘輔像曰仲尼爲素王顔淵爲司徒家語曰地冝不殖則物不蓄万民飢寒教訓不行風俗淫僻人民流散曰危危則飭司徒飭謂整攝漢書曰祝良字仲子東海人爲大司徒鮑恢爲長史以事至東海過其家見良妻布衣徒跣曵柴從田中歸恢告曰我司徒史也故來授書欲見夫人妻曰妾是也若掾耶恢下拜之歎息而歸東觀漢記曰鄧禹爲司徒討赤眉不以時進光武與書日司徒堯也赤眉桀也今長安飢民孰不延望又曰袁安爲司徒每朝會憂念王室未嘗不流涕又曰郭丹爲司徒在朝名清廉公正後漢書曰蔡茂字子禮代戴渉爲司徒在職清儉匪懈茂初在廣漢夢在大殿之極上有三穗禾茂跳取之得其中穗輙復失之主簿郭賀離席慶曰大殿者官府之形像也極而有禾人臣之上禄也取其中穗中台之位也於字禾失爲秩雖曰失之乃以得禄秩也衮職有闕君其𥙷之旬月而茂徴焉辟賀爲掾又曰光武即位髙邑使使者持節拜鄧禹爲大司徒䇿曰前將軍禹深執忠孝與朕謀謨帷幄決勝千里孔子曰自吾有回門人日親斬將破軍平定山西功效尤著百姓不親五品不訓汝作司徒敬敷五敎五教在寛今遣奉車騎都尉授印綬封爲鄼侯邑万户其敬之哉禹時年二十四又曰范遷爲司徒有宅數畒田不過一復推與兄子其妻常謂曰君有四子而無立錐之地又曰張湛稱疾不朝後大司徒戴渉𬒳誅渉字叔平兾州清河人也坐所舉人盗金下獄帝強起湛以代之湛至朝堂遺失溲便溲小便也溲音所流反因自陳疾篤不能復任朝事遂罷之又曰馮勤遷司徒先是三公多見罪退帝賢勤欲令以善自終因讌見從容戒之曰朱浮上不忠於君下陵轢周列竟以中傷至今朱浮爲大司空坐賣弄國㤙免又爲陵轢同列帝銜之借其功不忍加罪死生吉㐫未可知豈不惜哉人臣放逐受誅雖復追加賞賜􅉠祭不足以償不訾之身訾量也言無量可比之貴重之極也訾與資同忠臣孝子覽照前代以爲鑑誡能盡忠於國事君無二則爵賞光乎當代功名列於不朽可不勉哉勤愈恭約盡忠號稱任職又曰宣秉字巨公拜大司徒所得俸禄以収養親族自無檐石之儲又曰鮑昱代王敏爲司徒賜錢帛什器帷帳又曰司徒公一人掌人民事凡教民孝悌遜順謙儉養生送死事則議其制建其度凡四方民事功課歳盡則奉其殿最而行罰凡郊祀之事掌牲視濯謝承後漢書曰劉寵爲司徒卧麤布𬒳漢官典職曰司徒夲丞相官哀帝改爲大司徒主司徒衆馴五品府與蒼龍闕對厭於尊者不敢稱府也魏志曰華歆字子魚拜司徒歆素貧禄賜以賑施親戚故人家無擔石之儲公卿嘗並賜没入生口唯歆出而嫁之帝歎息下詔曰司徒國之儁老所與和隂陽理庻事也今太官重膳而司徒𬞞食甚無謂也特賜御衣及其妻子男女皆作衣服又曰黃初元年改相國爲司徒御史大夫爲司空奉常郎中令爲大司農魏名臣奏曰黃門杜恕奏曰漢故事人民病疾責之司徒蜀志曰許靖字文休及先主即尊號䇿靖曰朕獲奉洪業君臨万國夙宵徨徨懼不能綏百姓不親五品不遜汝作司徒其敬敷五教五教在寬君其朂哉秉哉無怠稱朕意焉靖雖年踰七十愛樂人物納誘後進清談不倦丞相諸葛亮皆爲之拜呉録曰丁固爲司徒初爲尚書夢松樹生其腹上謂人曰松字十八公也後十年吾當爲公乎遂如夢焉太平御覽卷第二百七
