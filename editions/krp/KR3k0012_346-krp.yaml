  text: 太平御覽卷第三百四十六兵部七十七
  hash: sha256:4843d3cd9118b6c790b854e8b709d81c7385f2ed516c801bea6e3274ada79ad2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_346-1a}
body:
  text: 刀下匕首鋏鈹刀下陶弘景刀劒録曰董卓少時耕野得一刀無文字四靣隱起作山雲文斫玉如木及貴示五官郎蔡邕邕曰此項羽刀也又曰袁紹在黎陽夢有人授一寳刀及覺果在床前銘曰思紹思紹字也又曰郭璞於太原得一刀文曰冝爲將後遂爲將軍及與蜀戰敗走遂失此刀又曰王雙曽於市中買得一刀賣人曰得之者貴因之不見雙後佩之果爲將將此刀與曹真真以一刀換之又曰鍾㑹克蜀於成都土中得一刀文曰太一刀㑹死入帳下王伯昇後渡浮江刀遂飛入水又曰鄧艾年十二曽讀太山碑碑下掘得一刀黒如􅃮色長三尺餘上常有風氣冷凄凄然時人以爲神賜又曰孫權遣張昭代周瑜爲南郡太守曽作一刀背上有盪冦將軍四字八分書又曰蔣欽拜別部司馬造一刀文曰司馬古隷書又曰周㓜平擊曹公勝拜平虜將軍因造一刀遂銘曰㓜平又曰董元代少果勇自打鐵作刀後討黄祖蒙衝俠河元代引刀断蒙衝纜分爲二流大司馬號刀曰断蒙刀又曰潘文珪偏將軍爲擒關羽拜固陵太守因刻刀曰固陵又曰朱理君少愛征討黄武中累功拜安國將軍作佩刀文曰安國又曰關羽爲先主所重不惜身命自採武都山鐵爲二刀銘曰萬人及羽敗惜刀投於水又曰張益德𥘉受新亭侯自命匠錬赤珠山鐵爲一刀銘刄曰新亭侯蜀帝大將也後𬒳范強將此刀入吴又曰黄中從先主定南郡得一刀赤如血於漢中擊夏侯軍一日之中手刄數百又曰諸葛亮定黔中從青石祠過抜刀刺山没刃不拔而去行者莫測又曰蜀主劉備令蒲元造刀五千口皆連環及刃口刻七十二錬柄中通之兼有二字又曰西晉司馬炎咸寕元年造刀八千口銘曰司馬又曰東晉司馬聃永和五年於房山造五口刀銘曰五方單符隷書又曰前趙劉元海元熈二年造滅賊刀長三尺九寸隷字又曰後蜀主李雄晏平元年造騰馬刀五百口隷字又曰前凉張寔造刀一百口無故盡生文曰覇又曰後趙石勒建平元年造一刀用五金工用萬人尖頭長三尺六寸銘曰建平隷書又曰石勒未貴時耕得一刀銘曰石氏昌篆書又曰石季龍建武十四年造一刀長五尺銘曰皇帝石勒氏隷書又曰西凉李暠玄威元造珠碧刀銘曰百勝隷書又曰前秦符堅甘露四年造一刀用五千功銘曰神術隷書又曰前燕慕容俊元年造二十八口刀銘曰二十八將又曰後燕慕容垂興元元年於中山造刀一口長三尺六寸隷書又曰後秦姚萇建𥘉元年造二刀長七尺一銘曰雄一曰雌隷字若叩即鳴又曰西秦乞伏國仁建義三年造刀一口銘曰建義隷字又曰後凉吕光麟嘉元年造一刀銘曰背麟長三尺六寸又曰南凉秃髪烏孤大𥘉三年造一刀狹小長三尺五寸青色匠云當作之時夢見一人𬒳朱衣云吾是太一神故看尓作此刀有敵至刀必鳴後落突厥可汗處又曰南凉慕容去明建平元年造刀四口文曰建平隷書又曰北凉沮渠蒙遜永安三年造刀百口銘曰永安隷書又曰夏赫連勃勃龍昇二年造五刀背上有龍雀環兼金鏤作一龍形長三尺九寸劉𥙿破長安得此刀後入梁又曰北燕馮跋太平八年造一刀銘曰太平隷書又曰宋髙祖劉𥙿永𥘉元年造一刀銘其背曰定國小篆書長八尺後入梁又曰宋劉義符景平元年造一刀銘曰五色小篆書又曰劉淮昇明元年掘得一刀銘曰上血其刀光照一室帝竒之常服至二年七月帝使楊玉夫候織女玉夫候不得懼死因用弑帝果如其銘故知吉凶其兆見矣又曰齊髙祖蕭道成建元二年克位造一刀銘曰定業長五尺篆書帝自制之又曰明帝鸞建武二年造一刀銘曰朝儀刀小篆書長四尺又曰後魏宣武帝以景明元年於白鹿山造白鹿刀隷書又曰後魏元昭成帝建國元年於赤冶城鑄刀十口金鏤赤冶二字隷書莊子曰庖丁爲惠文君解牛丁曰今臣之刀十九年矣所解數千牛矣而刃若新發於硎彼節者有間而刀刃者無厚以無厚入無間恢恢乎其游刃必有餘地是以十九年而刀刃如新發於硎列子曰周穆王征西戎獻赤刀切玉如切泥墨子曰墨子見齊王曰有刀於此試之人頭倅然断之可謂利也王曰利墨子曰刀則利矣孰將受其不祥王曰刀受其利試者受其不祥墨子曰并國覆軍賊殺百姓孰謂受其不祥王俯仰曰我受其不祥孔叢子曰秦王得西戎利刀以之割玉如割木淮南子曰屠牛坦一朝解九牛而刀可以剃毛又曰鈆不可以爲刀銅不可以爲弩鐵不可以爲弓木不可以爲斧又曰金勝木者非以一刀殘林也土勝水者非以一墣塞江也墣塊也法言曰刀不利筆不銛冝加諸礪阮子曰裁國無利器猶鈆刀而望其巧抱朴子曰金丹以塗刀辟兵萬里論衡曰丗諱厲刀井上恐刀墮井中或說以爲刑之字井與刀也厲刀井上井刃相見恐𬒳刑也典論曰魏太子丕造百辟寳刀三其一長四尺三寸六分重三斤六兩文似靈龜名曰靈寳其二采似丹霞名曰含章長四尺四寸三分重三斤十兩其三鑒似崩霜刀身劒鋏名曰素質長四尺三寸重二斤九兩又造百辟露陌刀一長三尺二寸重二斤二兩狀似龍文名曰龍鱗聖證論曰昔國家有優曰史利漢氏舊優也云梁兾有火浣布切玉刀一朝以爲誕而不信也正始𥘉得火浣布乃信楚辭曰師望在肆昌何識師望謂太公也昌文王名池言太公在市肆而屠何似知識之皷刀楊聲后乃喜后謂文王又曰鈆刀進御違棄太阿太阿劒名張衡西京賦曰吞刀吐火雲霧杳冥畫地成川流渭通涇劉揁瓜賦曰折以金刀四剖三離曹植寳刀賦曰建安中家父魏王乃命有司造寳刀五枚三年乃就以龍虎熊馬雀爲識太子得一余及余弟饒陽侯各得一焉其餘二枚家王自杖之賦曰有皇漢之明后思潜逹而玄通飛文義以博致揚武備以禦凶乃熾火炎爐融鐵挺英烏獲奮椎歐冶是營扇景風以激氣飛光鑑於天庭爰告祠於太一乃感夢而通靈然後礪以五方之石鑿以中黄之壤䂓貟景以定衆攄神思而造像垂華紛之葳㽔流翠采之晃陸斬犀象水断龍舟輕擊浮截刃不瀐流踰南越之巨闕超有楚之太阿寔真人之攸御永天禄而是荷樂府歌曰秦家有好女自名曰女休休年十四五爲宗行報讎左執白陽刀右據宛景矛張華詩曰吴刀鳴手中利劒嚴秋霜古詩曰美人贈我金錯刀何以報之雙瓊瑶後漢馬敬通刀陽銘曰脩尓甲兵用戒不虞見危授命臨事而懼又刀隂銘曰温温穆穆配天之威苗裔無疆福禄來綏後漢李元錯佩刀銘曰佩之有錯抑武揚文豈爲麗好將戒其身又金馬書刀銘曰巧冶練剛金馬託形黄文錯鏤兼勒工名魏文帝露陌刀銘曰於鑠良刀胡練亶時譬諸麟角靡所任兹不逢不若永丗寳持曹植寳刀銘曰造兹寳刀旣礱旣礪匪以尚武予身是衛麟角匪觸鸞距匪蹷王粲刀銘曰相時隂陽制法利兵陸剸犀兕水截鯢鯨君子服之式章威靈何晏斫猛獸刀銘曰徒摶不共作戒宣丘用造斯噐螭獸是劉制禽允良昬明亶時永釐厥後蠲民之災一作斬虎刀銘曰螭虎是劉晉張協把刀銘曰赫赫名金昆吾遺璞裁爲把刀利亞切玉時文斯偃含精内燭威助雖化武不可黷裴景聲文身刀銘曰良金百錬名工展巧寳刀旣成窮理盡妙文繁波廽流光霆一作電照在我皇丗戢而不耀張恊露陌刀銘曰露陌在服威靈逺振遵養時晦曜得崇信魏武䇿軍令曰孤先在襄邑有起兵意興工師共作卑手刀時北海孫賔碩來候孤譏孤曰當慕其大者乃與工師共作刀耶孤荅曰能小復能大何苦曹植表曰昔歐冶改視鈆刀易價伯樂所眄駑馬百倍王濬表曰孫皓出案行石頭還左右兵皆跳刀大呼云要當爲國家一死戰决之勝魏帝尚以千人定天下况今有數萬衆自足辯事晧意大喜便開庫藏盡出金寳以賜與之小人無狀得便持走陶侃表曰伏承大官厨器損失謹奉獻狼炙刀槃二具張衡與特進書曰以爲鈆刀強可一割謝尚與張凉州書曰今致五尺金断頭刀一口班固與竇憲牋曰今月中以令賜固刀曰此將軍少小時所服今賜固伏念大恩且喜且慙謝尚與楊征南書曰云今餉五尺金頭刀碧綾車中盾梁簡文帝謝勑賚善勝威勝刀啓曰冰鍔含采彫琰表飾名均素質神號脫光五寳𥘉成曹丕先荷其三勝今造愚臣揔𬒳其恩錫韓非之書未足爲比給博山之筆方此更輕梁劉孝儀爲晉安王謝東宫賜玉環刀啓曰苗峯珎鋌利極銛鋩謹當擁以雄身藉而安體匕首通俗文曰匕首劒属其頭類匕故曰匕首短而便用周禮冬官無桃氏曰桃氏爲劒廣臈二寸有半寸臈謂兩刀也兩從半之鄭司農云謂劒脊兩面殺趣鄂者也以其臈廣爲之莖圍長倍之鄭司農云莖謂劒夾人所握鐔以上也玄謂莖在夾中者莖長五寸也叅分其臈廣去一以爲首廣而圍之身長五其莖長重九鋝音刷謂之上制上士服之身長四其莖長重七鋝謂之中制中士服之身長三其莖長重五鋝謂之下制下士服之上制長三尺重三斤十二兩中制長二尺五寸重二斤十四兩三分兩分下制長二尺重二斤一兩三分兩之一此今之匕首也各以其形㒵大小帶之此上謂國勇力之士能用五兵者也樂記武正克啇碑冕搢笏而虎賁之士說劒也史記曰燕丹使荆軻刺秦王預求天下名匕首趙人徐夫人匕首取之百金使工以藥淬之以試人血濡縷無不亡死者摘秦王不中見誅漢書曰王莽避火宣室持虞帝匕首東觀漢記曰鄧遵破匈奴得劒匕首二三千枚魏志曰典韋好節俠襄邑劉氏與睢陽李禮爲讎韋爲報之懷匕首入殺禮徐歩而去後魏書曰叔孫俊少聦敏十五内侍左右以便弓馬轉獵郎太宗𥘉以俊爪牙與磨渾等拾遺左右遷衛將軍賜爵安城公朱堤王恱懷刃入禁欲爲大逆俊覺恱動有異便引手於恱懷中得兩刃匕首遂執恱殺之太宗以俊功重軍國大計皆委之說苑曰秦王以五十里封􅋣陵君􅋣陵君辭不受使唐且謝秦王秦王怒曰嘗見天子之怒乎一怒伏尸百萬流血千里唐且曰大王嘗聞布衣韋帶之士怒乎一怒伏尸二人流血五歩即案其匕首起曰今將是矣王變色長跪曰先生就坐寡人喻矣秦破韓滅魏􅋣陵獨以五十里存者徒用先生故乎零陵先賢傳曰劉章請劉備璋將楊懷數諌備誤主人請璋子禕及懷酒酣備見懷佩匕首備出其匕首謂曰將軍匕首好孤亦有可得觀之懷與之備得匕首謂懷曰汝小子何敢間我兄弟之好邪懷罵言未訖備斬之典論曰昔周魯之寳赤刀孟勞楚越稱太阿純鈞余善擊劒能以短乗長故選兹良金命彼國工精而錬之至于百辟其始成也五色充鑪臣囊自鼓靈物彷彿飛鳥翔舞以爲三劒三刀三匕首因姿定名以銘其拊惜乎不遇薛燭青萍也其三劒一曰飛景長四尺二寸二曰流采長四尺二寸三曰華鋌色似綵虹長四尺二寸其三刀一曰靈寳長四尺二寸似靈龜二曰含章采似丹霞長四尺四寸三曰素質長四尺三寸刀身而劒鋏其三匕首一曰清剛長二尺三寸光似堅冰二曰楊文長二尺一寸重一斤六兩曜似朝日三曰龍鱗狀似龍文又曰昔周魯寳鹿狐之㦸屈盧之矛狐父之戈徐氏匕首凡斯皆上丗名器用子雖有文事必有武備矣諸葛亮教曰作部仲匕首五百枚以給騎士鹽鐵論曰荆軻懷數年之謀事不就者以尺八匕首不足恃也神仙傳曰有書生姓張就李仲文學隱術乆無所得患之張懷匕首斫之仲文笑曰我寕可殺拾遺記曰漢太上皇微時常佩一刀長三尺上有名字雖難識疑是殷髙宗伐鬼方時物也上皇遊豊沛山中寓居窮谷裏有冶鑄上皇息其傍問曰此鑄何器工笑荅曰天子鑄劒慎勿泄上皇謂戯辝無疑色工人曰今所鑄剛礪製噐難成若得翁腰間佩刀雜而冶之即成神噐可以尅定天下昴星爲輔以殱三猾木衰火盛此爲興何上皇曰余此物爲匕首其利難儔水斷虬龍陸斬虎豹魑魅魍魎莫能逢之切玉鐫金其刃不卷工人曰若不得此匕首以和鑄雖歐冶專精越礪劒鍔終爲鄙噐上皇即解之以投鑪中俄而煙𦦨衝天日爲之晦及乎劒成殺三牲以釁祭工問上皇曰何時得此匕首荅曰秦昭襄王時余時行逢一野人於野授余云是殷髙宗𥘉時物此丗丗相傳上有古書字記其年月及成劒工人視之其銘尚存叶前疑也工人即持以授上皇上皇賜髙祖髙祖長佩於身以殱三猾天下巳定吕后藏於寳庫之中守藏者見白氣如雲出户外如龍虵庫名曰靈禽藏及諸吕擅權白氣亦滅案鈎命决蕭何爲昴屋精項羽陳勝胡亥爲之三猾晉張載匕首銘曰先民造制戒豫惟謹匕首之設應速用近旣不忽備亦無輕忿利以形彰功以道隱鋏史記曰馮煖聞孟嘗好客見之君置之傳舎五日彈其劒鋏而歌曰長鋏歸來兮食無魚君遷之幸舎五日彈其鋏歌曰長鋏歸來兮出無輿又遷之代舎五日又彈其劒歌曰長鋏歸來兮無以爲家一出戰國䇿曹子建詩曰長鋏鳴韒中晉張恊長鋏銘曰五才並建金作明威長鋏陸離弭凶防違素刃霜厲溢景撗飛又短鋏銘曰噐用名品詭制殊觀亦有短鋏清暉載爛昔在光明戢兵静亂惟皇寳之優而弗玩左思吴都賦曰毛羣以齒角爲矛鋏劉淵林注曰鋏刀身劒鋒有長有短也鈹說文曰鎩鈹有鐔也鈹普皮切左傳昭七年曰吴公子光伏甲於窟室而享王門階户席皆王親也夾之以鈹羞者薦體抽劒刺王鈹交於胷左思吴都賦曰羽族以觜距爲刀鈹鈹兩刃小刀也太平御覽卷第三百四十六
