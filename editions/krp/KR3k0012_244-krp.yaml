front:
  text: 太平御覽卷第二百四十四
  hash: sha256:6eb8d2ea7a26c3e510059757c4933f7d1fc4be6904b501f663278ed8787b1c05
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_244-1a}
body:
  text: 職官部四十二太子太師太子太傳太子太保太子少師太子少傅太子少保太子太師六典曰太子三師以道德輔教太子者也止於動静起居言語視聽皆有以師焉禮記文王丗子曰教丗子必以禮樂樂所以修内也禮所以修外也禮樂交錯於中發形於外是故其成也懌出則有師是以教喻而德成也師也者教之以事而諭諸德也大戴禮曰昔者周成王㓜在襁褓之中太公爲太師唐書官品志曰太子太師太傅太保是爲三師掌師範訓導輔詡太子太傅禮記曰三王教太子立太傅少傅以養之太傅在前少傅在後史記曰萬石君姓石名奮無文學㳟謹無比遷爲太子太傅又曰夏侯勝爲太子太傅受業詔撰尚書論語賜黄金百斤年九十卒官賜冢塋葬平陵太子賜錢二百萬爲勝素服五日以報師傅之恩儒者以爲榮漢書曰景帝栗太子以竇嬰爲太傅十年栗太子廢嬰争不能得謝病屏居藍田山下數月諸竇賔客辯士說請遂起朝又曰蕭望之字長倩爲太子太傅以論語授太子又曰叔孫通爲太傅髙帝欲立趙王廢太子通諌曰昔晉獻公以驪姬故廢立太子晉國亂者數十年秦不早定扶蘇終使滅祀今太子仁孝陛下必廢嫡立庶臣願先伏誅以頸血汙地上曰公罷吾戲耳通曰太子天下夲夲一揺天下振動奈何以天下戲乎又曰踈廣字仲翁爲太傅弟受爲少傅朝廷以爲榮皆請免歸郷里公卿祖餞東都門外百姓觀者歎曰賢哉二大夫𥘉太子外祖許伯以太子少請使其弟舜監護太子家廣曰太子國儲副君師友必天下英俊不冝獨親外家今官屬以備若親䁥外家非所以廣太子德於天下也上善之東觀漢記曰建安二十八年大㑹百官詔問誰可傅太子者羣臣承意皆言太子舅執金吾隂識可愽士張佚正色曰今陛下立太子爲隂氏乎爲天下乎即爲隂氏則隂侯可爲天下則固冝用天下之賢才上稱善曰欲置傅者以輔太子也今愽士不難正朕况太子乎即拜爲太子太傅又曰張湛字子孝爲太子太傅及郭后廢因稱疾拜太中大夫病居中東門候舎故時人號中東門君帝數存問賞賜後大司徒戴渉𬒳誅帝強起湛以代之至朝堂遺失溲因自陳疾篤不能復任朝事遂罷之後漢書曰明帝以鄧禹先帝名臣拜太子太傅也應劭漢官曰太子太傳日就月將琢磨玉質言太子有玉之質琢磨以道也魏志曰何䕫代涼茂爲太子太傳毎月朔太傅入則太子正法服而禮焉吴志曰吴粲遷太子太傅遭二宫之變抗言執正明嫡庶之分欲使魯王出住夏口遣楊笁不得令在都邑又數以消息語陸遜遜時駐武昌連表諌争由此爲笁等所譛害又曰孫權寢疾徴大將軍諸葛恪爲太子太傅㑹稽太守滕胤爲太常並受詔輔太子又曰闞澤字德閏㑹稽山隂人拜太子太傅領中書孫權甞問書傳篇賦何者爲美澤欲諷諭以明治亂因對賈誼過秦論最美權覽讀焉又曰程秉字德樞汝南南頓人也秉事鄭玄避亂交州與劉熈考論大義遂愽通五經士爕命爲長史權聞其名儒以禮徴秉旣到拜太子太傅又曰張温字惠恕吴郡吴人也温少脩節操容貌竒偉權聞之以問公卿曰温當今與誰爲比大司農劉基曰可與全琮爲輩大常頋雍曰基未詳其爲人也今無輩權曰如是張允不死也徴到延見文辭占對觀者傾竦權改容加禮罷出張昭執其手曰老夫託意君冝明之拜議郎選曹尚書尋遷太子太傅晉起居注曰武帝太始三年始置太子二傅是時官事大小皆由二傅太傅立章少傅寫之晉中興書曰賀循字彦先爲太子太傅詔曰循清直履道秉尚貞貴居身以冲約爲夲立德以仁讓爲行可躬訓儲宫黙而成化唐書官品志曰太子太傅一人位視尚書令少傅一人位視左僕射魏故事曰太傳於太子不稱臣少傳稱臣太子太保禮記曰保也者慎其身以輔翼之而歸諸道者也晉書曰劉寔字子真以特進開府加太子太保晉中興書曰懷帝以荀組爲侍中特進行太子太保傅暢晉賛曰賈充爲太尉行太子太保以公位重其爲保傅㦯行或領各隨其時後魏書曰顯祖將禪位於京兆郡王子推隴西王源賀並固諌陸馥抗言曰皇太子聖德承基四海屬望不可橫議干國之紀臣請刎頸殿廷有死無二乆之帝意乃解詔曰馥直臣也其能保吾子乎遂以馥爲太保太子少師六典曰太子三少掌奉皇太子以觀三師之道德而教諭焉晉書曰惠帝以衛尉裴揩爲太子少師宋書曰太子少師少保並晉置後魏書曰郭祚領太子少師曽從丗宗幸東宫肅宗㓜弱祚懷一黄㼐出奉肅宗時應詔左右趙桃弓與御史王顯爲丗宗所信祚私事之時人謗祚者以爲桃弓僕射黄㼐少師唐書官品志曰太子少師少傅少保是爲三少各一人掌皇太子以觀三師之德出則三師在前三少在後又曰李綱拜太子少師綱有脚疾不堪踐履太宗特賜歩輿令綱乗至閤下數引禁中問以政道又令轝入東宫皇太子引上殿親拜之綱於是陳君臣父子之道問寢視膳之方理順詞直聽者忘倦又曰貞觀十三年以左僕射房玄齡爲太子少師玄齡上表遜位詔不許太宗因謂侍臣曰太子師保古難其選若成王㓜小以周公爲傳左右皆賢日聞雅訓自㓜及長便爲聖君秦之胡亥趙髙傅之教以刑法及其立也誅功臣殺親族酷烈不巳旋踵而亡以此言之善惡由於習近又曰唐休璟年力雖衰進取弥銳時宫人賀婁氏用事而休璟爲男取其養女因以自逹拜太子少師時議譏之又曰長慶中以兼太常卿趙宗儒爲太子少師太常有師子樂備五方之色非㑹朝聘享不作焉至是中人掌教坊之樂者移牒取之宗儒不敢違以狀白宰相以爲事在有司執守不合關白而宗儒憂恐不已宰相責以懦怯不任事故換此散秩陶氏職官録曰三少舊視左僕射冠服同三太也太子少傅漢書曰上謂張良曰子房雖疾強起傅太子時叔孫通巳爲太傅以良行少傅事又曰匡衡字稚圭爲太子少傅數上書陳便冝少好學家貧傭力以供資用東觀漢記曰建興二十八年以桓榮爲少傅賜以輜車乗馬榮大㑹諸生陳車馬印綬曰今日所蒙稽古之力也可不勉乎後漢書曰徴王丹爲太子少傅時大司徒侯霸欲與交友及丹𬒳徴遣子昱候於道昱迎拜車下丹下荅之昱曰家公欲與君結交何爲見拜丹曰君房有是言丹未之許也續漢書王丹字仲回爲太子少傅謇諤正直名德重於時魏志曰邢顒字子昂𥘉太子未定而臨淄侯植有寵丁儀等並讃翼其美太祖問顒顒對曰以庶代宗先丗之戒也願殿下深重察之太祖識其意後遂以爲太子少傅吴志曰薛綜綜子瑩瑩子兼三丗並爲太子少傅談者羙之晉書曰山濤轉太子少傅在東宫年巳七十病疾求退手詔不聽㝷講武於宣武塲有詔濤乗歩輦導皇太子入時尚書僕射盧欽與濤言及孫武用兵夲意武帝欣然而言曰山少傅故是天下談士也舉坐傾心又曰何曽議太子少傅當稱臣拜荀顗曰太之與少自二傅之名次耳非於太子有輕重也詔曰秦漢巳來舊章廢滅隨時改作其故事不可依用冝逺准古義定二傳不臣拜又曰王雅爲太子少傳時朝望屬王珣珣亦頗以自許及詔用雅衆遂赴雅焉將拜遇雨請以繖入王珣不許之因冐雨而拜雅旣貴倖威權甚振門下車騎常數百而善應接傾心禮之晉中興書曰周顗字伯仁拜太子少傳顗上䟽曰臣退自忖省學不通一經智不効一官止足良難未能守分不悟天監忘臣頑蔽乃欲使臣内管銓衡外忝傳訓質輕蟬翼事重千鈞此之不可不待識而明矣後周書曰蕭武帝建德三年授太子少傳増邑九百户蕭氏以任當師傅調護是職乃作少傅箴曰惟王建國辯方正位左史記言右史書事莫不立太子爲皇之貳是以易稱明兩禮云上嗣東序養德震方主器束髮就學宵雅便隷朝讀百篇乙夜乃寐愛日惜力寸隂無棄親膳再飯寢門三至小心翼翼大孝烝烝詢謀計慮問對疑承安樂必敬無忘戰兢夫天道益謙人道惡盈漢嗣不絶乎馳道魏儲廻還乎鄴城前史攸載後丗揚名三善旣備萬國以貞姬周長乆實頼元良嬴秦短祚誠由少陽雖卜年七百有德至歴而昌數丗一萬無德不及而亡敬之敬之天惟顯思光副皇極永固洪基觀德觀諭敢告職司太子見而恱之致書勞問陳書曰孝明帝在東宫宣武皇帝欲以崔光爲太子師傅光固辝帝令太子南面再拜宫官皆從太子拜光北面立不敢荅拜惟西面拜謝而出乃授光太子少傅傳玄太子少傅箴曰夫金木無常方貟應形亦有隱括習以性成故近墨者黒聲和則響清形正則影直正人在側德義盈堂鮑肆先入蘭蕙不芳傳臣司訓敢告君王太子少保晉書曰懷帝以光禄劉蕃爲太子少保晉諸公讃曰惠帝以吏部尚書和嶠爲太子少保唐書曰李綱字文紀爲太子少保髙祖以綱隋代名臣甚加優禮每手勑未甞稱名其見重如此唐新語曰李適之爲右相李林甫密奏其好酒頗妨政事玄宗惑焉乃除太子少保適之遽命親故歡㑹賦詩曰避賢𥘉罷相樂聖且銜杯爲問門前客今朝幾箇來舉朝服其度量太平御覽卷第二百四十四
