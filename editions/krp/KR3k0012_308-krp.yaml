body:
  text: 兵部三十九戰上尚書大傳曰戰者憚也驚之也說文曰戰鬪也開元文字曰仲秋大閱戒衆庶脩戰法隂疑於陽必戰是也凡師皆陣曰戰謂堅而有備各得其所成敗決於志力也易曰上六龍戰于野其血玄黄隂之爲道甲順不盈乃全其美盛而不巳固陽之地陽所不堪故戰于野也又曰隂疑於陽必戰爲其嫌於無陽也故稱龍焉爲其嫌於非陽而戰也書曰湯與桀戰于鳴條之野又曰武王戎車三百兩虎賁三千人與受戰于牧野左傳曰魯宣公十二年晉荀林父與楚子戰于邲晉師敗績又曰呉伐楚王使執燧象以奔呉師又曰齊伯郭啓伐莒子將戰宛羊牧諌之曰齊師賤其求不多不如下之又曰諸侯之戌謀曰若華氏知困而致死楚恥無功而疾戰非吾利也又曰孟懿子陽虎伐鄆鄆人將戰又曰宋多責賂於鄭鄭人不堪故以絶魯及齊與宋衛燕戰不書所戰後也又曰冬宋人以諸侯伐鄭報宋之戰也又曰齊人侵魯疆疆吏來告曰疆埸之事愼守其一而備其不虞姑盡所備焉事至而戰又何謁焉又曰狄人伐衛衛懿公好鶴鶴有乗軒者將戰國人受甲者皆曰使鶴鶴實有禄位余焉能戰又曰里克諌曰故君之嗣適不可以帥師君失其官帥師不威將焉用之且臣聞臯落氏將戰君其舎之又曰楚人伐宋以救鄭宋公將戰大司馬固諌曰天之棄啇乆矣君將興之弗可赦也巳又曰子魚曰君未知戰勍敵之人阨而未成列天賛我也又曰公曰君子不重傷不禽二毛子魚曰且今之勍者皆吾敵也雖及胡耉獲則取之何有於二毛明恥教戰求殺敵也傷未及死如何勿重又曰晉公子重耳之及於難也晉人伐諸蒲城人欲戰重耳不可又曰齊晉將戰髙固入晉師桀石以投人桀擔擒之而乗其車旣獲其人固釋巳車而載所獲繫桑本焉以徇齊壘將至齊壘以桑樹繫車而桑走欲自異也曰欲勇者賈余餘勇賈賣也言巳勇有餘欲賣之也又曰晉楚將戰而楚晨壓晉軍而陣軍吏患之范丐趍進曰塞井夷竈陣於軍中而䟽行首晉楚唯天所授何患焉文子執戈逐之曰國之存亡童子何知焉又曰齊侯還自晉不入不入國遂襲莒門于且于且于莒邑傷股而退齊侯傷明日將復戰期于壽舒夀舒莒邑𣏌殖華還載甲夜入且于之隧宿於莒郊郊子齊大夫也且于隧狹路明日先遇莒子於蒲侯氏蒲侯氏近莒之邑莒子重賂之使無死曰請有盟欲以盟二子無致死戰華周對曰貪貨棄命亦君所惡也華周即華還也昬而受命日未中而棄之何以事君莒子親鼓之從而伐之獲𣏌梁𣏌梁即𣏌植又曰齊師伐我公將戰曹􅔘請見其郷人曰肉食者謀之又何間焉肉食在位者也間猶与也􅔘曰肉食者鄙未能逺謀乃入見問何以戰公曰衣食所安弗敢專也必以分人對曰小惠未徧民不從也公曰犧牲玉帛不敢加也必以信對曰小信未孚神不福也公曰大小之獄雖不能察必以情對曰忠之屬也上思吏民忠也可以一戰戰則請從公與之乗戰于長勺公將鼓之􅔘曰未可齊人三鼓曰可矣遂逐齊師旣克公問其故對曰夫戰勇氣也一鼓作氣再而衰三而竭我盈彼竭故克之夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之又曰丙戌復戰大敗呉師獲太子友王孫彌庸又曰郤獻子曰二憾往矣弗備必敗彘子曰鄭人勸戰弗敢從也楚人求成弗能好也又曰夫禮樂慈愛戰所蓄也又曰楚子與若敖氏戰于睪滸睪滸楚地伯棼射王汰輈及鼔跗着於丁寧伯棼子越椒也輈車轅汰過也箭過車轅上也丁寕鉦也又射汰輈以貫笠轂兵車尊者則邊人執笠依轂下以禦寒暑師懼退王使廵師曰吾先君文王克息獲三矢焉伯棼竊其二盡於是矣鼓而進之遂㓕若敖氏又曰晉楚交戰叔山冉搏人以投中車折軾晉師乃止又曰晉侯使張骼輔躒致楚師求御于鄭欲得鄭人自御知其地利者也鄭人卜宛射犬吉射犬鄭公孫也將及楚師而後從之乗皆踞轉而鼓琴轉衣裝也近不告而馳之皆取胄於橐而胄入壘皆下搏人以投収禽挾囚禽獲也弗待而岀又曰子蒲曰吾未知呉道使楚人先與呉人戰又曰呉師居麋子期將焚之子西曰父兄親暴骨焉不能収而又焚之不可子期曰國亡矣豈憚焚之焚之而又戰又曰呉伐楚師及清發清發水名將擊之夫槩王曰困獸猶闘況人乎若知不免而致死必敗我若使先濟者知免後者慕之蔑有闘心矣半濟而後可擊也從之又敗之楚人爲食呉人及之奔食而又從之敗諸雍澨五戰及郢奔食食者走不陣故不在戰數數也澨時制切又曰晉侯逆秦師使大夫韓簡視師復曰師少於我闘士倍我公曰何故對曰出因其資謂奔梁求秦也入用其寵爲秦所納也飢食其粟三施而無報是以來也今又擊之我怠秦奮倍猶未也戰于韓原晉戎馬還濘而止濘泥也還便旋也小駟不調故還泥中濘乃定切秦伯獲晉侯以歸晉曲而怠秦直而怒所以勝也又曰楚子伐隋軍於漢淮之間隋將季梁謂隋侯曰請下之弗許而後戰下之請服所以怒我而怠㓂也隋少師曰必速戰不然將失楚師戰于速𣏌隋師敗績若用季梁之謀必勝矣又曰呉楚二師陣于栢舉呉子闔閭之弟夫槩王晨請於闔閭曰楚相囊瓦不仁其臣莫有死志先伐其卒必奔而後大師繼之必克以其屬五千先擊囊瓦之卒楚師亂呉師大敗之又曰晉師伐楚苗賁皇言於晉侯曰楚之良在其中軍王族而巳請分良以擊其左右而三軍萃於卒萃集必大敗之及戰晉將吕錡射楚恭王中目錡魚綺切楚師霄遁晉師入楚三日館糓又曰求曰若不可則君無出一子帥師背城而戰不屬者非魯人也當子之身齊人伐魯而不能戰子之恥也又曰彭城之役晉楚遇於靡角之谷晉侯將遁矣雍子發命於軍曰恤老㓜反孤疾二人役歸一人簡兵蒐乗秣馬蓐食師陣焚次明日將戰行歸者而逸楚囚楚師霄潰又曰入我河曲伐我涑川俘我王官翦我羈馬我是以有河曲之戰又曰欒武子欲報楚韓獻子曰無庸使重其罪民將叛之無民孰戰又曰晉楚遇於鄢陵范文子不欲戰郄至曰韓之戰惠公不振旅又曰潘尫之子黨與飬由基蹲甲而射之以示王曰君有二臣如此何憂於戰又曰苗賁皇徇曰蒐乗𥙷卒秣馬利兵脩陣固列蓐食申禱明日復戰乃逸楚囚又曰智武子曰大勞未艾君子勞心小人勞力先王之制諸侯皆不欲戰乃許鄭成又曰晉陽處父侵蔡楚子上救之與晉師夾江而軍陽子患之使謂子上曰吾聞之文不犯順武不違敵子若欲戰則吾退舎子濟而陣遲速唯命又曰宣子曰秦獲穿也獲一卿矣秦以勝歸我何以報乃皆出戰交綏公羊傳曰巳巳晋侯及楚戰城濮楚師敗績此大戰也又曰詐戰不日此何以日詐卒也齊人語也又曰晉人及秦伯戰于殽秦敗或曰襄公稱人何貶也君在殯而用師詐戰又曰狐壤之戰隱公獲焉然則何以不言戰諱獲也又曰齊侯衛侯鄭伯來戰于郎此偏戰也何以不言師敗績内不言戰乃敗績又曰及鄭師伐宋丁未戰于宋戰不言伐何避嫌也惡乎嫌嫌與鄭人戰也此偏戰也何以不言師敗績内不言戰言戰乃敗績與鄭人戰於宋地故學伐以明之也家語曰齊國書伐魯書齊卿也季康子使冉求帥左師衛之樊遲爲右季氏曰須也弱湏遲名弱㓜也有子曰能用命矣及齊師戰于郊未踰溝前有溝衆不肯踰也樊遲曰非不能也不信子也言季孫德不素著不爲民所信也請三交而踰之與衆要信三交而踰溝也如之衆從之師入齊齊軍遁冉有用戈故能入焉子聞之曰義也在軍能却敵合於義旣戰季孫問冉有曰子於戰學之乎性逹之乎對曰學之季孫曰從事孔子兹于學冉有曰即學於孔子也孔子者大聖兼該文武並用也適聞其戰法猶未之詳也季孫樊遲以告孔子子曰季孫於是乎可謂悅人之有能矣又曰孔子曰黄帝服牛乗馬擾馴猛獸以與炎帝戰于阪泉之野又曰子貢言志曰願得齊楚合戰於漭蕩之野埃塵連接挺刃交兵國語曰申包胥曰夫戰智爲始仁次之勇次之不智則不知人之極不仁則不共三軍饑勞之殃不勇則不能斷疑以發大計戰國䇿曰魏太子自將過宋水黄徐子曰臣有百戰之術今太子自將攻齊大勝不過有魏而貴不益爲王若不勝即墨丗無魏矣此臣百勝之術也太子曰請從公言而還太子上車請還其御曰將出而還與敗北同不如遂行乃與齊戰而死史記曰黄帝教熊羆貙虎以與炎帝戰于阪泉之野服䖍曰阪泉地名皇甫謚曰在上谷三戰然後得行其志蚩尤作亂不用帝命黄帝乃徴師諸侯與蚩尤戰於涿鹿之野服䖍曰涿鹿山名在涿郡張晏曰涿鹿在上谷遂擒蚩尤皇覽曰蚩尤冡在東平郡壽張縣闞郷城中髙七尺民常十月初祀之有赤氣出如疋綘帛名為蚩尤旗又曰卿子冠軍威振楚國名聞諸侯乃遣當陽君蒲將軍將卒張晏曰率黥布二萬人渡河救鉅鹿戰小利陳餘復請兵羽悉引兵渡河巳渡皆沉船破釡甑燒廬舎持三日糧示士必死無還心於是至即圍秦將王離與秦軍遇九戰絶其甬道大破之虜王離當是時楚兵冠諸侯諸侯軍救鉅鹿者十餘壁皆莫敢縱兵及楚擊秦諸將皆從壁上觀楚戰士無不一當十楚兵呼聲動天地諸侯無不人人惴恐於是巳破秦軍羽見諸侯入轅門張晏曰軍行以車爲陣轅相向爲門曰轅門無不膝行而前莫敢仰視羽於是始爲諸侯上將軍兵皆屬焉又淮隂侯傳曰信云此謂驅市人而戰之其勢非置之死地使人人自爲戰今予之生地皆走寧尚可得而用之乎又曰項王至東城乃有二十八騎漢騎追者數千人項王自度不得脱謂其騎曰吾起兵至今八年矣身七十餘戰所當者破所擊皆服未常敗北霸有天下今卒困於此天之亡我非戰之罪也今日固決死願爲諸君決戰又啇君傳曰鞅今行之十年秦民道不拾遺山無盗賊民勇於公戰怯於私闘又藺相如傳曰廉頗曰我爲趙將有攻城野戰之功而藺相如徒以口舌爲勞而位居我上又曰秦人開關延敵九國之師遯逃追亡逐北伏尸百萬流血漂鹵徐廣曰鹵盾也漢書曰漢王入彭城収羽羙人貨賂置酒髙㑹羽聞之令其將擊齊而自以精兵三萬人從魯出胡陵至蕭晨擊漢軍大戰彭城靈壁東胡陵縣在彭城南睢水上大破漢軍多殺士卒睢水爲之不流圍漢王三匝大風從西北起折木發屋揚沙石晝晦楚軍大亂而漢王得與數十騎遁去過沛使求室家而室家亦巳亡不相得漢王道逢孝惠魯元公主載行楚騎追急漢王推墮二子滕公下収載遂得脱又張騫傳曰身毒國在大夏東南可數千里其俗土著與大夏同而卑濕暑熱其民乗象以戰又叙傳曰述趙充國辛慶忌云兵家之䇿惟在不戰又曰西南夷傳曰姑繒葉瑜復反遣水衡都尉吕辟胡將郡兵擊之辟音壁辟胡不進蠻夷遂殺益州太守乗勝與辟胡戰戰士乃溺水死者四千餘人復攻武威張掖酒泉燒民廬舍六年隴西太守孫羌擊破之又曰蕭何功最盛封鄼侯所食邑最多功臣皆曰臣等𬒳堅執銳多者百餘戰少者數十合攻城略地大小各有差今何未嘗有汗馬之勞顧居臣上何也又曰髙帝末黥布友渡淮擊楚楚發兵與戰徐潼間楚三軍欲以相救爲竒兵或說楚將曰布善用兵人素畏之且兵法自戰其地爲散地今別爲三軍彼敗吾一軍餘皆走安能相救楚將不聽布果破其一軍二軍散走遂西與上兵遇蘄西大戰布軍敗走又曰趙充國討先零羌乆屯聚解㢮覩見大軍棄輜重欲度湟水道阨狹充國徐行驅之或曰逐利行遲充國曰此窮宼不可迫也緩之則走不顧急之則還致死諸將校皆曰善虜果赴水溺死者數百於是破之又司馬遷傳報任少師書云又不能拾遺𥙷闕招賢進能顯巖穴之士又不能備行伍攻城野戰有斬將搴旗之功太平御覽卷第三百八
