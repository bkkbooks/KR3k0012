front:
  text: 太平御覽卷第九百二十九鱗介部一
  hash: sha256:0b10a3f6035bd823fcf734952a655ad3f71bdd5dfb66be5f2fde0fbb51a664d9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_929-1a}
body:
  text: 龍上河圖曰舜以太尉即位與三公臨觀黃龍五采負圖出置舜前以黃玉爲押白玉檢黃金繩黃芝爲泥章曰黃帝符璽春秋運斗樞同又曰黃金千歳生黃龍青金千歳生青龍赤金千歳生赤龍白金千歳生白龍玄金千歳生玄龍又曰黃龍從雒水出詣虞舜鱗甲成字舜令冩之冩竟去星經曰東方七宿爲蒼龍凢有鱗之類皆屬於木故龍爲鱗蟲之長歸藏明夷曰昔夏后啓土乗龍飛以登于天睪臯陶占之曰吉周易乾卦曰雲行雨施品物流形時乗六龍又曰坤卦龍戰于野其血玄黃又文言曰雲從龍又說卦曰震爲龍易通卦驗曰立夏清風至而龍昇天尚書中候曰黃龍負卷舒圖又曰青龍衘玄圖大戴禮冠曰鱗蟲三百六十而龍爲之長禮記禮運曰龜龍在宫沼龍以爲畜故魚鮪不淰淰潛藏也禮含文嘉曰龍馬金玉帝王之瑞也左傳昭五曰鄭大水龍鬪于時門之外洧淵國人請爲榮焉子産不許曰我鬪龍不我覿也龍鬪我獨何覿焉穰之則彼其室也吾無求於龍龍亦無求於我乃止又昭七曰秋龍見於綘郊魏獻子問於蔡墨曰吾聞之蟲莫智於龍以其不生得也謂之智信乎對曰人實不智非龍實智言人實不智而謂之智非龍智也乃不智也古者畜龍故國有豢龍氏有御龍氏豢養也昔有飂叔安飂古國也安其君名也有裔子曰董父矞逺也玄孫之後爲裔也實甚好龍能求其嗜欲以飲食之龍多歸之乃擾畜龍以服事帝舜帝賜之姓曰董氏曰豢龍故帝舜氏丗有畜龍氏及有夏孔甲擾于有帝帝賜之乗龍河漢各二各有雌雄孔甲不能食而未獲豢龍氏有陶唐氏旣衰其後有劉累學擾龍于豢龍氏以事孔甲能飲食之夏后嘉之賜氏曰御龍以更豕韋之後龍一雌死潜醢以食夏后嘉之旣而使求之懼而遷于魯縣龍水物也水官弃矣故龍不生得春秋元命苞曰龍之言萌也隂中之陽故言龍舉而雲興史記曰昔夏后氏之衰有神龍二止於夏帝庭而言曰余襃之二君也夏帝卜殺之徙去之與止之莫吉卜請其漦而藏之吉又曰黃帝得土德黃龍見夏得木德青龍止於郊漢書曰惠帝二年正月兩龍見蘭陵人家井中又曰文帝時公孫臣以爲漢土德黃龍見張蒼以爲水德至十五年黃龍見成紀下詔召臣爲愽士東觀漢記曰公孫述有龍出其府殿中夜有光耀述以爲符瑞因稱尊號改元曰龍興後漢書曰哀牢夷其先有婦人捕魚水中觸沉木有孕生男子十人沉木化爲龍出水上九男驚走一兒不去背龍因䑛之後諸兒推爲哀牢主魏志曰華歆邴原管寧三人爲友號曰一龍歆爲龍頭原爲龍腹寧爲龍尾魏略曰文帝欲授禪郡國奏黃龍十三見明帝鑄銅黄龍髙四丈置殿前晉書曰劉毅爲尚書左僕射時龍見武庫井中帝親觀之有喜色百官將賀毅獨曰昔龍降鄭時門之外子産不賀龍降夏庭沬流不禁卜藏其漦至周幽王禍釁乃發易稱潜龍勿用陽在下也證據舊典無賀龍之禮又曰陸機甞餉張華鮓于時賔客滿座華發噐便曰此龍肉也衆未之信華曰試以苦酒濯之必有異旣而五色光起機還問鮓主果云園中茅積下得一白魚質狀殊常以作鮓過美故以相獻崔鴻十六國春秋前燕録曰慕容晃十二年夏四月黒龍一白龍一見於龍山晃親帥羣僚觀龍二百餘歩祭之以太牢二龍交首嬉翔解角而去晃大恱還宫殿赦其境内號新宫曰和龍宫晉書曰符生𥘉夢大魚食蒲又長安謡曰東海大魚化作龍男便爲王女爲公問在何所洛城東時符堅爲龍驤將軍第在洛門之東其後果驗又曰吕光伐龜兹軍其城南營外夜有一黒物大如斷堤揺動有頭角目光若電及明而雲霧四周遂不復見且視其處南北五里東西三十餘歩鱗甲隱地之所昭然猶在光嘆曰黒黒龍也俄而雲起西北暴雨滅其跡杜進言於光曰龍者獸之君大人利見之象易曰見龍在田德施普也斯誠明將軍道合靈和德符幽契願將軍勉之以成大慶光有喜色又曰馮跋弟素弗與從兄萬泥及諸少年遊于水濵有一金龍浮水而下素弗謂萬泥曰頗有見不萬泥等皆曰無所見也乃取龍而示之咸以爲非常之瑞又曰雷奐子華度襄水劒躍入水化爲龍又曰𥘉桓温南州起齋悉畫龍於其上號曰盤龍齋及玄篡而劉毅字希樂討玄玄死於盤龍齋而毅居之沈約宋書曰劉穆之字道和嘗夢與髙祖俱泛海忽值大風驚懼俯視舩下見有二白龍挾舩旣而至一山峯崿聳秀林樹繁宻意甚恱之宋書曰徐羡之嘗從兄履之爲臨海樂安縣嘗行經山中見黒龍長丈餘頭有角前兩足皆具無後足曵尾而行後文帝立羡之竟以㓙終又曰傳亮率行臺迎冝都王王舟輿發自江陵中流有黒龍躍出負王舟左右失色王顧長史王曇首曰此大禹所以受天命吾何德以堪之齊書曰建武中荆大風雨龍入栢齋中柱壁上有爪足處刺史蕭遥欣恐畏不敢居也又曰𥘉武帝夢金翅鳥下殿庭搏食小龍無數乃飛上天明帝𥘉宗室多遇害其夢竟驗梁書曰武帝郄后素妬忌及終化爲龍入于後宫井通夢於帝或見形光彩照灼帝體將不安龍輙激水騰涌於是井上爲殿衣服委積南史曰梁江陵城壕中有龍騰出煥爛五色竦躍入雲六七小龍相隨飛去羣魚騰躍墜死於道龍出處爲窟若數百斛圌音遄三國典略曰陸法和拒任約至安南入赤亭湖法和乗輕舟不介胄㳂流而下去約軍一里乃還謂將士曰彼龍睡不動吾軍之龍其能踊躍若待明日攻之當不損客而自破賊陳書曰隨師濟江荆州吕肅敗後別師廖世寵領大舴詐降欲燒隋艦更決死一戰於是有五黃龍備色象各長十餘丈驤首連接順流而東風浪大起雲霧晦冥陳人震駭不覺火自焚故隋文下詔以告郊廟又曰宣帝𥘉在江陵軍主李緫與帝有舊毎同遊處帝甞夜𬒳酒張燈而寐緫適岀㝷反乃見帝是大龍便驚走他室後魏書曰波知國有三池傳云大池有龍王次者龍婦小者龍子行人設祭乃得過不祭多遇風雪又曰正元元年有黒龍如狗南走宣陽門躍穿門樓下而出此魏衰之徴也後周書曰大象中榮州有黒龍見與赤龍闘於汴水之側黒龍死隋書曰源師𥘉在齊遷在外兵郎中又攝祠部屬孟夏以龍見請雩時髙阿郍肱爲相謂真龍出大驚喜問龍所在師整容報曰此是龍星𥘉見依禮當雩祭郊壇非謂真龍也唐書曰貞觀中汾州言青龍白龍見白龍吐物𥘉在空中有光如火至地䧟入二尺掘之則玄金也形圎斜廣尺餘髙六七寸又曰先天中玄宗以旱親性龍首池祈禱有赤虵自池中而出雲霧四布應時澍雨又曰禇無量字弘度杭州鹽官人㓜孤貧勵志好學家近臨平湖湖中有龍闘傾里閭就觀之無量時年十三讀書晏然不動及長精三禮及史記又曰文宗太和二年五龍㑹於宻州禆産山之北次第而至五方之色具焉自申及戍而没後唐史曰莊宗時五臺僧誠惠自號降龍師帝雅重之毎屈膝施敬諸王嬪御皆爲之拜誠惠悉倨坐而受之𥘉自臺山謁帝鎭州王鎔不爲之禮誠惠恚怒曰吾有毒龍五百豈勞于命一龍揭片石常山其爲沼乎踰年而滹川大溢敗鎭之郛或聞其言益以爲神繇是帝敬之愈篤周史曰徐州豐縣民單興井中龍岀民有子母三人同覩之即時皆卒龍旣岀澍雨漂沬城内居民濟之以栰登城以避水管子曰龍𬒳五色而遊故神欲小則如蚕蠋欲大則凾天地欲上則陵雲欲沉則伏泉又曰蛟龍水蟲之神者也乗水則神立失水則神廢墨子曰墨子北之齊遇日者曰帝以今日殺黒龍於北方先生色黒不可以北又曰帝以甲乙殺青龍於東方丙丁殺赤龍於南方庚辛殺白龍於西方壬癸殺黒龍於北方若用子言則禁天下之行也孫卿子曰積土成山風雨興焉積水成川蛟龍生焉莊子曰朱泙漫學屠龍於支離益殫千金之家三年伎成而無所用其巧也又曰子張見魯哀公哀公不禮託僕大夫而去曰君之好士也有似葉公子髙之好龍也葉公好龍室屋彫文盡以寫龍於是天龍聞而下之窺頭於牖拖尾於堂葉公見之弃而還走失其魂魄五色無主是葉公非好龍也好夫似龍而非真今君非好士也好夫似士而非者也新序又載又曰孔子見老聃歸三日不談弟子問曰夫子見老聃亦得何規哉孔子曰吾乃今於是乎見龍龍合而成體散而成章乗乎雲氣飬乎隂陽余口張而不能䝱子又何規老聃哉又曰河上有家貧恃緯蕭而食者其子没淵得千金之珠歸與其父其父謂其子曰取石來鍜破也夫千金之珠必在九重之淵而驪龍頷下子能得珠者必遭其睡也如使驪龍悟子尚奚徼之有哉韓子曰夫龍之爲蟲有狎而騎也然喉下有逆鱗徑尺若嬰之則殺人人主亦有之說者能無嬰人主之逆鱗則幾矣淮南子曰人莫欲學御龍而皆欲學御馬莫欲學治鬼而皆欲學治人急所用也御龍治鬼不益丗用故以御馬治人爲務矣又曰伯益作井而龍登玄雲神棲崑崙伯益夏禹之佐也𥘉鑿井泄地氣以後必漉他而漁故龍登玄雲神棲崑嵛一日龍在黃泉下恐害及故去之知愈多而德愈薄矣又曰夫騰虵游霧而騰龍乗雲而舉又曰虎嘯而谷風生虎隂中陽獸也與風同類龍舉而景雲屬龍陽中隂蟲也與雲同類又曰人不見龍之飛舉而能髙者風雨之奉也奉助也又曰燭龍在鴈門北蔽于委羽之山不見日其神人靣龍身而無足不見日故龍以目照之蓋長千里視爲晝瞑爲夜吹爲冬呼爲夏新言曰漢祖驂三龍而乗雲路振長䇿而驅天下三龍人傑又曰龍潜之水乗雲躍鱗虎嘯之聲因風奮烈逹則振纓朝堂窮則身親南畝抱朴子曰山中辰日稱雨師者龍也又曰西域方士能神祝者臨淵禹歩吹氣龍即出浮其𥘉出乃長十數丈於是方士更吹之一吹則龍輙一縮至長數寸方士乃掇取著壷中或有四五龍以少水飬之以踈物塞壷口於是方士聞有旱處便賫龍徃賣之一龍直數十斤金舉國㑹歛以雇之直畢乃發壷出一龍着淵潭之中因復禹歩吹之輙一吹一出長數十丈湏叟雲雨四集又曰有自然之龍有虵蠋化成之龍又曰夏時龍生於太廟之中說苑曰呉王欲從民飲酒伍子胥諌曰不可昔白龍下清冷之淵化爲魚漁且豫且射中其目白龍上訴天帝曰當是之時若安置而形白龍對曰我下清冷之淵化爲魚天帝曰魚固人之所射也若罪豫且何罪夫白龍天帝貴畜也豫且宋國之賤臣也白龍不化豫且不射今棄萬乗之位而從布衣之士飲酒臣恐其有豫且之患矣王乃止吕氏春秋曰禹南濟江黃龍負舟人懼五色無主禹笑曰吾受命於天竭力以飬人奈何憂於龍龍弭耳而逃又曰晉文返國介子推不肯受賞自爲詩賦曰有龍于飛周徧天下五虵從之爲之承輔龍反其郷得其處所四虵從之得其露雨一虵着之死於中野懸書公門而伏山下文公聞之曰嘻此必介子推家語曰鱗蟲三百六十而龍爲長水之怪龍罔象夏食而冬蟄皇甫謐帝王丗紀曰太昊包犧氏風姓有景龍之瑞故以龍紀官又曰黃帝采首山銅鑄鼎荆山下有龍垂胡髯而下迎黃帝羣臣欲從持龍髯髯㧞遂墮說文曰龍鱗蟲之長能幽能明能小能大能短能長春分而登天秋分而入淵山海經曰夏后啓乗兩龍雲盖三層左手操翳右手操環又曰鍾山之神名曰燭龍視爲晝瞑爲夜身長三千里括地圖曰龍池之山四方髙中央有池方七百里羣龍居之多五花樹羣龍食之去㑹稽四千里論衡曰龍少魚衆少者爲神列仙傳曰騎龍鳴者於池中求得龍子狀如守宫十餘頭結草廬而守飬之龍大稍稍去後五十餘年水壞其廬一旦騎龍來語云吾馮伯昌孫也此間人不去百里當皆死信之者皆去不信者以爲妖言至八月水出死者以萬計又曰陵陽子明者好釣釣得白龍子明解釣拜謝放之後數十年得白魚魚腹中有書教子明服食遂上黃山採五石脂石肺服之三年白龍來迎止陵陽山上百餘年又曰馬師皇者黃帝馬毉有龍下垂耳張口師皇針其唇飲以甘草湯而愈後一旦負之而去又曰陶安公者六安鑄冶師也數行火一旦散上紫色衝天安公伏冶下求哀湏臾朱雀止冶上曰安公冶與天通七月七日迎汝以赤龍至期赤龍來安公騎之大雨東南上而去又曰呼子先者漢中關下卜師也老壽百餘年臨去呼酒家老嫗曰急裝常與汝俱夜有仙人持二茅狗來呼子先子先持一與嫗嫗得而俱騎騎乃龍也上華隂山甞於山上大呼言子先酒母在此耳太平御覽卷第九百二十九
