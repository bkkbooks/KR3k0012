front:
  text: 太平御覽卷第九百五十五
  hash: sha256:b57a398e3a43770025d03b17adf4968193b3c3bab7a574b13a6071dc009a3662
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_955-1a}
body:
  text: 木部四桑易曰其亡其亡繫于苞桑苞桑藂生桑也書曰青州厥篚檿絲孔安國曰檿桑蚕絲中琴瑟絃檿於琰切又曰伊陟相大戊亳有祥桑榖共生於朝妖怪也二木合七日大拱不恭罰詩曰桑之未落其葉沃若桑女功之所起沃若猶沃然于鳩兮無食桑葚桑之落矣其黄而隕又曰交交黃鳥止于桑又曰星言夙駕稅于桑田教民稼穯務農急也又曰女執懿筐爰求柔桑柔桑穉桑也又曰𧖟日條桑條桑枝落採其葉也又曰猗彼女桑女桑少枝長條不枚落者㨂而採之又曰肅肅鴇行集于苞桑又曰將仲子兮無踰我墻無折我樹桑又曰隰桑有阿其葉有儺阿然羙貌也儺然盛貌也有以利人也箋云隰中之桑條之阿阿然長羙其葉又茂盛可庇䕃人興者喻時賢人君子不用而處有覆養之得旣見君子其樂如何禮記曰季春之月命野虞無伐桑柘又曰古者天子諸侯必有公桑蠶室近川而爲之左傳曰晉重耳及齊桓公妻之有馬二十乗公子欲安之從者以爲不可將行謀於桑下蠶妾在其上以告姜氏姜氏殺之又宣上曰趙宣子田於首山舎於翳桑田獵也翳桑桑之多䕃翳者也見靈輙餓問其病應之曰不食三日矣食之捨其半問之曰官三年矣宦未知母之存否今近焉去家近也請以遺之使盡之而爲之簞食與肉簞笥寘諸槖以與之旣而與爲公介靈輙為公甲也倒㦸以禦公徒而免問其故曰翳桑之餓人也問其名居問所居也不告而退春秋元命苞曰姜嫄遊閟宫其地扶桑履大人迹生稷扶桑日所出也春秋孔演圖曰孔子母徴在遊大冢之陂睡夢黒帝使請巳徃夢交語女乳必於空桑之中覺則若感生丘於空桑之中乳生爾雅曰女桑挗桑郭璞注曰谷呼小桑長條爾爲女桑樹挗音拫又音夷檿鳥點切桑山桑詩曰其檿其柘林中弓也桑柳醜條阿郍垂條也史記曰齊魯千畒桑其人與千户侯等又曰吴公子光伐楚㧞居巢鐘離𥘉楚邊邑卑梁氏之處女與吴邊邑之女爭桑二女家怒相㓕兩邊邑長聞之怒而相攻㓕吴之邊邑吴王怒故遂伐楚漢書曰息夫躬免官㱕國未有第宅寄居丘亭姦人以爲侯家冨常夜守之賈惠徃過躬教以祝盗方以桑東南枝爲七畫北斗七星其上躬夜自𬒳髪立中庭向北斗持匕招指祝盗人有上書言躬懷怨恨繫雒陽詔獄死東觀漢記曰蔡君仲汝南人王莽亂人相食君仲取桑椹赤黒異器賊問所以君仲云黒與母赤自食賊義之遺鹽二斗受而不食謝承後漢書曰陳留申屠蟠恥郡無處士遂閉門養志處蓬室依大桑樹以爲棟梁又曰河内髙弘爲瑯瑘相妻子不歷官舎桑杯盛漿又曰汝南尹昆爲汝隂功曹令新到官問曰園中有桑以飯蠶何如昆曰非𥘉政所務令嘉其言又曰張湛爲漁陽太守勸民耕種百姓歌曰桑無附枝麥穗兩岐張君爲政樂不可支又曰陳曄爲巫令有惠政桑生二萬餘株民以爲給魏略曰楊沛爲新鄭長課民益蓄桑椹䝁豆積浸得千餘斛太祖遷天子軍無粮沛乃進乾椹後爲鄴令賜其生口十人絹百疋以報乾椹也蜀志曰先主舎東南角籬上有桑樹生髙丈餘遥望童童如小車蓋徃來者皆恠此樹非凡或謂當出貴人先主少時同宗中諸兒於樹下戲言吾必當乗此羽葆車蓋晉書曰賈后將廢愍懷太子時有桑生於西廂長數日而枯十二月后廢太子又曰劉驎之尚書質素好道車騎將軍桓冲聞名辟爲長史固辭冲嘗到其家驎之於樹條桑使者致命驎之曰使君旣枉駕光臨冝先詣家君冲愧詣其父又載記曰北燕馮跋下書曰今疆守無虞百姓寜業而田畒荒穢有司不隨時督察欲令家給人足不亦難乎桑柘之益有生之夲此土少桑人未見其利可令百姓人植桑一百二十根崔鴻前凉録曰張天錫爲符堅破後歸晉孝武帝問之曰北方何物爲羙錫對曰桑椹甘香䲻鴞革響淳酪養性人無疾心崔鴻十六國春秋後燕録曰𥘉晃之遷于龍城也植松爲社主及秦滅燕大風吹拔之後數年社處忽有桑二根生焉先是遼川無桑及廆通于晉晉求種江南平川之桑悉由呉來齊書曰太祖宅在武進宅南有桑樹擢夲三丈横出四枝狀如車蓋上年數歳遊其下從兄敬宗謂曰此樹爲汝生也又曰沈瑀爲建德令教人一丁種十五株桑四株柿栗女丁半之人咸歡恱頃之成林又曰韓係伯襄陽人也事父母孝謹襄陽土俗鄰居種桑樹於界上爲誌係伯以桑枝䕃妨他邊界上開數尺鄰畔隨侵之係伯輙更叚種乆鄰人慙愧還所侵地躬徃謝之又曰扶桑國在大漢國東二萬餘里地在中國之東其土多扶桑木故以爲名扶桑似桐𥘉生如笋國人食之實如梨而赤績其皮爲布以爲衣亦以爲錦以扶桑皮爲𥿄三國典略曰宋子仙召吴令沈景令掌書記景固辭以疾子仙怒命斬之景解衣就戮礙於路間桑樹乃更牽徃他處或救之獲免又曰齊長廣郡㕔梁木忽作人像太守惡而刷去之明日復出郷人伐枯桑樹於中得死龍長尺餘識者以爲長廣齊太上主太封也齊氏木得龍爲吉象木枯龍死非吉徴焉隋書曰齊河清中定令丁給永業二十畒爲桑田其中種桑五十根榆三根棗五根土不冝桑者給麻田如桑田法唐書曰李龍譽居家以儉約自處每謂子孫曰吾性不好貨財遂至貧乏然吾近京城有賜田十頃耕之可以充食桑若干根採之可以充衣家語曰殷太戊之時道鈌法圯以致天孽桑榖生朝七日大栱占者曰桑榖野木而生于朝意者朝亡乎太戊恐駭側身修德范子計然曰桑葉出三輔列子曰晉文公㑹欲伐衛公子鉏仰而笑公問何笑曰臣之鄰人有送妻適私家者道見桑婦恱而與言然顧視其妻亦有招之者臣竊笑此也公寤其言乃止引師還未至而有伐其北鄙者孟子曰孟子謂梁惠王曰五畒之宅樹之以桑五十者可以衣帛矣孫卿子曰孔子適楚於陳蔡之間七日不食曰居不隱者思不生身不佚者志不廣汝庸知吾不得之桑落之韓子曰子産開畒樹桑鄭人謗訾鄒子曰季夏取桑柘之火吕氏春秋曰伊尹之母居伊水上孕夢有神吿之曰臼出水而東走無顧明日視臼中出水告其鄰東走顧其邑盡爲水身因化爲桑有莘氏採桑得嬰兒於桑之中獻之於君君命乳之命之曰伊尹又曰季春之月也命野虞母伐桑柘野虞主林官也桑與柘皆可養𧖟故命其宦使民不得斫伐鳴鳩拂其羽戴勝降於桑淮南子曰原𧖟一歳再登非不利也登成也然王法禁之者爲其殘桑也殘害也又曰扶桑在暘州日所拂此東方十日所出扶桑在暘谷中九日無下枝一日君上枝也山海經曰宣山上有桑大五十疋圍五丈其枝四衢枝交四出葉大尺赤理青葉名曰帝女之桑郭璞曰婦人主桑故以名爲桑又曰東北海外圎丘南有三桑無枝皆髙万仞又曰暘谷上有扶木郭璞曰扶桑十日所浴穆天子傳曰甲寅夫子作居范宫范離宫别名以觀桑者詩曰桑者閑二兮乃飲于桑中桑林之中天子命桑虞主桑者也出桑者用禁暴民不得令妾􆇙犯桑也神異經曰東方有樹焉髙八十尺敷張自輔葉長一丈廣六七尺曰扶桑有椹焉長三尺五寸任昉述異記曰桓冲爲江州刺史遣人周行廬山兾覩靈異陟崇巘有一湖匝生桑樹湖有敗艑赤鱗魚使者渴極欲徃飲水赤鱗張鬣向之使者不敢飲列女傳曰魯秋胡子納妻五日而官於陳後歸未至家見路傍有羙婦人方採桑秋胡恱之下車願託桑隂下婦人採桑不輟秋胡曰力田不如逢年力桑不如見郎今吾有金願與夫人婦人不受胡乃歸母呼其婦乃向採桑者也數胡之罪而自投于河又曰齊瘤女者齊東郭採桑之女項有大瘤閔王遊至東郭百姓盡觀獨瘤女採桑如故王恠召問之對曰受父母教採桑不受教觀大王王曰此竒女恱娉迎之又曰東辨女者陳國採桑之女也晉大夫解居甫使於宋解居甫宋大夫道過陳遇採桑之女止而戲之曰女爲我哥吾將捨女捨置不留女也採桑女乃歌曰墓門有棘斧以斯之夫也不良國人知之益部耆舊傳曰何祗夢桑生井之中解桑字四十八君壽恐不可過此祗四十八而卒荆州先賢傳曰龐士元師事司馬德操不矜小名衆莫知之德操𧖟月躬採桑後園士元助之因與談断丗廢興其言若神遂移日忘飡德操於是異之甄異傳曰沛國張伯逺年十歳時病亡見泰山下有十餘小兒共推一大車車髙數丈伯逺亦推之時天風暴起揚塵伯逺因桑枝而住聞呼聲便歸遂蘇髮中皆有沙塵後年大至泰山識桑如死時所見十洲記曰扶桑在碧海中上有天帝宫東王公所治有椹樹長數千丈二千圍兩兩同根更相依倚故曰扶桑仙人食其椹椹體作金色其樹雖大椹如中夏桑椹也稀而色赤九千歳一生實耳味甘香玄中記曰天下之髙者扶桑無枝木焉上至天盤蜿而下屈通三泉括地圖曰化民食桑二十七年化而自裏九年生翼十年而死石虎鄴中記曰幸梓苑中盡種桑三月三日及蠶時虎皇后將宫人數千出採桑遊戲其下汜勝之書曰種桑五月取椹著水中濯洒取子隂乾之好治肥田十畒荒乆不耕者先好耕治之黍椹子各三升合和種之黍桑當頃俱生鉏之桑令稀䟽調適黍熟穫之桑生正與黍髙下平因以利鎌歷地刈之曝令燥後有風調放火燒之常逆起火桑至春生一畒食三簿𧖟神仙傳曰麻姑謂王方平云吾見東海三爲桑田夲草經曰桑根旁行出土上者名伏蛇治心痛神農夲草曰桑根白皮是今桑樹根上白皮常以四月採或採無時出見地上名馬領勿取毒殺人典術曰桑木者箕星之精楚辭曰衣攝葉以儲與兮攝葉儲與不舒展之貌左祛絓於扶桑祛神也得巳衣服長大攝葉儲與不得舒展得能弘廣不得施用東行則左䄂絓於扶桑无所不㐲右祍拂於不周兮六合不足以肆行又曰路室女之方桑路室客室孔子過之以自待言孔子出過於客舎其女方採桑一心不視若貞信故以自待古詩曰柘桑知天風海水知天寒繁欽桑賦曰上似華蓋紫極比形下象鳯闕萬桷一楹陸機桑賦曰𥘉丗祖武皇帝爲中壘將軍植桑一株丗更三代年漸三紀緑葉興而盈尺崇條曼而増㝷曹植艶歌曰出自蒯北門遥望胡池桑枝枝自相植葉葉自相當太平御覽卷第九百五十五
