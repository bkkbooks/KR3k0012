front:
  text: 太平御覽卷第四百四
  hash: sha256:b5c902b1daa1e33f5103ba99b5139b8764075594aa9a27e8fa88db08bf82a058
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_404-1a}
body:
  text: 人事部四十五師韓詩外傳曰智如源泉行可以爲表儀者人師也又曰哀公問於子夏曰五帝有師乎子夏曰臣聞黃帝學乎太顛顓頊學乎禄圖帝嚳學乎赤松子堯學乎務成子附舜學乎尹壽禹學乎西王國湯學乎貸子相文王學乎錫疇子斯武王學乎太公周公學乎郭叔仲尼學乎老􅡭此十一聖人未遭此師則功業不能著乎天下名號不能傳乎後世尚書曰徳無常師主善爲師周禮地官下曰師氏掌以媺詔王告王以善道也文王世子曰師也者教之以事而喻諸徳者也以三德教國子居虎門之左則司王朝掌國中得失之事以教國子弟凡國之貴遊子弟學焉大戴禮曰帝入太學承師問道禮記檀弓上曰事師無犯而無隱左右就養無方服勤至死心䘮三年心䘮戚容如父而無服也又學記曰君子知至學之難易而知其美惡然後能博喻能愽喻然後能爲師能爲師然後能爲長能爲長然後能爲君故師也者所以學爲君也是故擇師不可不慎也記曰三王四代唯其師其此之謂乎凡學之嚴道師爲難師嚴然後道尊道尊然後民知敬學是故君之所不臣於其臣者二當其爲尸則弗臣也當其爲師則弗臣也尸主也爲祭主太學之禮雖詔於天子無北面所以尊師也善學者師逸而功倍又從而庸之不善學者師勤而功半又從而怨之又曰記問之學不足以爲人師師無當於五服五服不得不親又文王世子曰師也者教之以事而喻諸徳者也左傳襄六曰鄭人游于郷校郷人之學校以論執政諭政得失然明謂子産毀郷校如何患人於中謗議囯政子産曰其所善者吾則行之其所惡者吾則改之是吾師也若何毀之榖梁傳昭公曰子旣生不免乎水火母之罪也成童不就師傳父之罪也就師學問無方心老不通師之罪也論語爲政曰温故而知新可以爲師矣又述而曰三人行必有我師焉孔叢子曰子思居魯穆公師而尊之春秋後語曰甘羅請張唐相燕吕不韋叱曰我自請不行汝安能行之甘羅曰夫項橐七歳爲孔子師今臣十二歳矣曰君其試臣何遽叱乎史記曰孔子旣没弟子思慕有若狀似孔子弟子相與立爲師師之如夫子時又曰曹叅爲齊相乃避正堂舎蓋公而師之齊果大治又曰鄒子如燕昭王擁篲先駈請列弟子之座而受業築碣石宫身往親師之又曰文王爲西伯鬻熊者爲文王師有功於文王及武王㓕殷未之封也成王學勤事之後封其曽孫熊繹爲楚子漢書曰𥘉梁相禇大通五經爲博士時倪寛爲弟子及御史大夫缺徴禇大夫自以爲得御史大夫至雒陽聞倪寛爲之禇大笑乃至與寛議封禪於上前大不能及退而服曰上誠知人也又曰龔勝旣歸郷里二千石長吏𥘉到官皆至其家如師弟子之禮又曰嚴彭祖字公子東海下邳人與顔安樂俱事眭孟弟子百餘人唯彭祖安樂爲明質問疑誼各持所見孟曰春秋之意在二子矣孟死彭祖安樂各顓門教授又曰竇皇后兄弟長君少君絳侯灌將軍等曰吾属命乃懸兩人此兩人所出微不可不爲擇師傳於是乃選長者之有行者與居長君少君由此爲退讓君子不敢以冨貴驕人又曰張良稱曰今以三寸舌爲帝者師封萬户位列侯此亦布衣之極於良足矣又曰張禹成就弟子尤著者淮陽彭宣至大司空沛郡戴崇至少府九卿宣爲人恭儉有法度而崇愷悌多智二人有異行禹心親愛敬宣而踈之崇毎候禹常責師置酒設樂與弟子相娱禹將崇入後堂飯食婦女相對作優人管絃鏗鏘極樂昏夜乃罷而宣之來也禹見之於便坐講論經義日晏賜食不過一肉巵酒相對宣未甞得至後堂及兩人皆聞知自得服䖍日各為得冝也又曰晁錯潁川人也學申啇刑名於軹張恢生所軹縣之儒生姓張名恢與洛陽宋孟劉帶同師以文學爲太常掌固又曰孔霸亦治尚書事太傅夏侯勝昭帝末年爲博士宣帝時爲太中大夫以選授皇太子經遷詹事髙宻相元帝即位徴霸以師爵關内侯號褒成君常為師教帝今成就故曰褒成君又曰張禹𥘉爲師以上難數對己問經爲論語章句獻之後漢書曰廉范𥘉師事薛漢後辟公府㑹薛漢坐楚王事誅故人門生莫敢収視范獨往収歛之吏聞顯宗大怒召入詰責范叩頭曰臣無狀愚戅心爲漢等皆己伏誅不勝師資之情罪當萬死因貰之謝承後漢書曰董春字紀陽㑹稽餘姚人少好學師事侍中祭酒王君仲受古文尚書後詣京房授易究極聖旨條列科義後還爲師立精舎逺方門徒學者常數百人東觀漢記曰顯宗即位尊桓榮以師禮常幸太常府令榮坐東面設几杖㑹百官驃騎將軍東平王蒼以下榮門生數百人天子親自執業毎言太師在是旣罷悉以太官供具賜太常家其恩禮如此永平二年壁雍𥘉成拜榮爲五更毎大射養老禮畢上輙引榮及弟子升堂執經自爲下說又曰顯宗以張酺受皇太子業甚得輔導之體章帝即位出拜東郡元和二年東廵狩幸東郡引酺及門生并郡椽吏並㑹庭中帝先備弟子之儀使酺講尚書一篇然後修君臣之禮賞賜殊特續漢書曰李膺性簡亢無所交接唯以同郡荀淑陳寔爲師友又曰楊政從代郡范升學升甞爲岀婦所告坐繫獄政乃肉祖以箭貫耳抱升子潜伏道傍候車駕過泣涕辭請有感帝心詔曰乞楊生師即爲放出升范曄後漢書曰歐陽歙字王思樂安千乗人爲大司徒坐汝南贓罪千餘萬發覺下獄平原孔震年十七聞獄當斷馳之京師行到河内獲嘉縣自繫上書求代歙死曰伏見臣師大司徒歐陽歙爲儒宗八丗博士乞殺臣以代歙命書奏而歙己死獄中又曰鄭玄字康成北海髙宻人也事扶風馬融融門徒四百餘人升堂進者五十餘生融素驕貴玄在門下三年不得見乃使髙業弟子傳授於玄日夜尋誦未甞怠倦㑹融集諸生考論圖說聞玄善筭乃召見於樓上玄因從質諸疑義問畢辭歸融喟然謂諸門人曰鄭生今去吾道東矣又曰鍾皓字季明潁川長社人以篤行稱爲士大夫所慕李膺常歎曰鍾君至徳可師魏志曰夏侯惇字元讓年十四就師學人有辱其師者惇殺之又曰荀攸字公逹文帝在東宫太祖謂曰荀公逹人之師表汝當盡禮敬之攸曽病世子問病獨拜床下其見尊異如此晉書曰魏髙貴郷公之入學也將崇先典乃命王祥爲三老侍中鄭小同爲五更祥南靣几杖以師道自居帝北靣乞言又曰王承爲東海王越記室越興世子毗書曰習禮度不如式瞻儀形諷味遺言不如親承音旨王叅軍人倫師表尔其師之徐爰宋書曰武帝登祚加顔延之金章紫綬領湘東王師後魏書曰陽平王之子欽託高僧壽爲子求師師至未幾逃去欽以讓僧壽僧壽性滑稽乃謂欽曰凡人絶粒七日乃死始經五朝便爾逃遁去欽乃大慙於是待客稍厚之裴景仁前秦記曰符堅幸太學問博士經典博士盧壼對曰周官禮注未有其師韋逞母宋傳其父業得周官音義自非此母無可授後堅於是就宋立講室書堂生徒百二十人隔綘紗幔而授業焉拜宋爵號宣文君賜侍婢十人崔鴻後秦録曰𥘉姚泓之爲太子受經於太學博士淳于歧歧病在家泓以師者人之表範傳先聖之訓加在三之義不可以不重親詣省疾拜於牀下又前燕錄曰劉讃字彦真平原人也經學博通爲世純儒貞清非禮不動慕容廆重其徳學使太子晃師事之又後趙録曰張躍清河武城人也學敏才逹雅善清談勤偉其儀辯拜世子衛軍長吏勑世子曰張長史人之表範汝其師之案世說或曰王趙鄧王㕘軍人倫師表爾其師之謂王安期鄧伯道趙禮之也唐書曰賀徳仁越州山隂人少與從兄徳基俱事國子祭酒周弘正咸以詞學見稱時人語曰學行可師賀徳基文質彬彬賀徳仁徳仁仕陳至吴興王友入隋授豫章王府記室叅軍王以師資禮之恩遇甚厚又曰貟半千本名餘慶與彦先同師事學士王義方甚嘉重之嘗謂曰五百年生一賢足下當之矣因改名半千及義方卒半千與彦先皆制師服䘮畢而去六韜曰文王卜田史扁布卜曰田于渭之陽將得焉非熊非罷非虎非狼天遺汝師以之佐昌文王乃齊戒三日田于渭陽卒見吕尚坐茅以漁文王再拜乃與之歸老子曰善人者不善人之師孫卿子曰干將莫耶鉅闕辟閭此皆古之良劒也然而不加砥礪則不能利不得人力則不能斷驊騮騏驥纎離緑耳此皆古之良馬也然而必前有衘轡之制後有鞭策之戚加之造父之御然後一日而致千里夫人雖有性質美而心辯智必將求賢師而事之擇良友而友之又曰國將興必尊師重傳尊師重傳則法度存師術有四傳習不與焉尊嚴而憚可以爲師耆艾而信可以爲師誦說不懈可以爲師知微而論可以爲師又曰夫逹師之教也弟子安焉樂焉休焉遊焉肅焉嚴焉此六者得於學則邪僻之道塞焉此六者不得於學則君不能令於臣父不能令於子師不能令於徒鶡冠子曰伊尹酒保太公屠牛管子作革百里官奴海内荒辭立爲丗師莊子曰堯之師曰許由許由之師曰齧缺齧缺之師曰王倪王倪之師曰𬒳衣又曰善卷堯聞其得道之士乃北面而師事之蒲衣八歳而舜之師又曰申屠嘉兀者也與鄭子産同師伯昏無人列子曰列子旣師壷丘子林友伯昬瞀人反居南郭從之處者百數吕氏春秋魏文侯師子夏又曰神農師悉諸黃帝師大撓帝顓頊師伯夷父帝嚳師昭帝堯師子州支父帝舜師許由禹師大成摯湯師小臣文王武王師吕望周公旦齊桓公師管夷吾晉文公師咎犯隨㑹秦穆公師伯里奚公孫枝楚莊王師孫叔敖沈申吴王師伍子胥文之儀越王勾踐師范蠡此十聖六賢未見不尊師者也淮南子曰段干木晉之大駔爲文侯師海内先賢傳曰仇覽字季智郭太賫刺從之曰暮求留宿明旦太下床朝之曰君非太友乃太師也荀氏家傳曰爽字慈明㓜而歧嶷大學儒林咸歎服之年十二太尉杜喬師焉江微陳留志曰樓望字次子雍丘人也少受春秋於少府丁子然以節操稱建武二十八年趙孝王聞其名遣大夫賫玉帛聘望爲師不受邴原别傳曰原舊能飲酒自行後八九年間酒不向口單行負笈苦身持力至陳留則師韓子助潁川宗陳仲躬涿郡則盧子幹臨歸師友以原不飲酒㑹米肉送原原曰本能飲酒但以荒思廢業故斷之耳今當逺别因見況餞可以一飲讌於是每坐飲終日不醉太史公素王妙論曰計然者蔡丘濮上人其先晉國公子也姓辛氏字文當南游越范蠡師事之楊子法言曰務學不如務求師師者人之模範也又曰一閧之市必立之平一卷之書必立之師又曰李仲元一丗之師也見其貌者肅如也觀其行者穆如也桓譚新論曰該言三歳學不如三歳擇師又曰昔殷之伊尹周之太公秦之百里奚雖咸有天才然皆年七十餘乃昇爲王覇師論衡曰通書千篇以上萬卷己下敷暢壅閉審定文議而以教授爲人師者通人也潜夫論曰天地之所貴者聖人聖人之所尚者徳義徳義之所成者智也智之所求者學問也雖有至聖不生而知雖有至智不生而能故志曰黄帝師風后顓頊師老彭帝嚳師融堯師務成舜師紀后禹師黒始湯師伊尹文武師姜尚周公師庶季孔子師老􅡭若此言之而信則人不可以不就師矣夫此十一君者皆上聖也猶待學問其智乃博其徳乃碩而況於凢人乎符子曰玄冥子謂由有子曰子有師乎由有子曰吾將以萬物爲師矣韋昭辯名曰古者稱師曰先生應璩百一詩曰子弟可不慎慎在選師友師友必良徳中才可進誘四百四卷終
