front:
  text: 太平御覽卷第二百七十六
  hash: sha256:214977fb6f1a0caf403107aef239aa574d0caa999de880281535d76d1a18d738
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_276-1a}
body:
  text: 兵部七良將下後周書曰王思政𥘉入頴川士卒八千人城旣無外援亦無叛者思政常以勤王爲務不營資産嘗𬒳賜園池思政出征後家人種桑菓及還見而怒曰匈奴未滅去病辭家況大賊未平何事産業命左右拔而弃之故身䧟之後家無蓄積又曰元定有勇略每戰必䧟陣然未嘗自言其功太祖深重之諸將亦稱其長者又曰蔡祐少有大志與郷人李穆布衣齊名嘗相謂曰大丈夫當建立功名以取富貴安能乆處貧賤耶言訖各大笑穆即申公後皆如其言又曰王羆爲華州刺史時茹茹渡河南寇候騎巳至豳州朝廷慮其深入乃徴兵發士馬屯守京城壍諸街巷以備侵軼右僕射周專逹召羆議之羆不應命謂其使曰若茹茹在渭北者王羆率郷里自破之不煩國家兵馬何爲天子城中遂作如此驚動由周家小兒性怯致此羆輕侮權勢守正不同皆此類也又曰劉亮夲名道德累遷左大都督從擒竇泰復弘農與沙苑之後並力戰有功遷車騎大將軍開封府長廣公亮以勇敢見知爲當時名將并屢陳謀䇿多合機冝太祖謂之曰卿文武兼資即孤之孔明也乃賜名亮并賜姓侯莫陳氏出爲東州刺史卒喪還京師太祖親臨之泣而謂人曰股肱喪矣腹心何寄又曰王傑夲名文逹太祖竒其才擢授楊烈將軍羽林監㝷加都督太祖嘗謂諸將曰王文逹万人敵也伹恐勇决太過耳復潼關破沙苑争河橋戰邙山皆以勇敢聞親待日隆賞賜加於倫等於是賜姓宇文氏又曰于謹平江陵還太祖親至其第宴語極歡賞謹奴婢一千口及寳物并金石絲竹樂一部謹自以乆當權望隆位功名旣立願保優閑乃上先所乗駿馬及所着鎧甲等太祖識其意乃曰今巨猾未平公豈得便尓獨善遂不受又曰蔡祏字承先有膂力便騎射從征伐常潰圍䧟陣爲士卒先軍還之日諸將争功祏終無所競太祖毎歎之嘗謂諸將曰承先口不言勲孤當代其論叙其見知如此三國典略曰周髙琳毎征伐勇冠諸軍太祖謂之曰公即我之韓白也又曰胡僧祐爲梁名將常以鼓吹置于齋中恒坐對之以自娯玩或諌之曰公名望隆重朝野具瞻此是羽儀可自居外僧祐曰我性愛之恒須見耳又曰北齊斛律金字阿六敦朔州勑部人光禄大夫郍瓌之子世敦直善騎射行兵用匈奴法望塵識馬歩多少嗅地知軍度逺近神武戒文襄曰有讒此人者勿信之文宣嘗與金宴射親持矟走馬以擬金胷者三金堅不動賜帛千疋因過其宅置酒作樂北史曰隋文帝嘗從容命髙頴與賀若弼言及平陳事頴曰賀若弼先獻十䇿後於蔣山苦戰破賊臣文吏耳焉敢與將論功帝大笑時論嘉其有讓又曰周將王思政乆經軍旅毎戰唯着破衣弊甲敵人疑非將帥故得免又曰韓果從平竇㤗於潼關周文依其規畫軍以勝返賞眞珠金帶一腰隋書曰李宻父寛驍勇善戰幹略過人自周及隋數經將領至柱國蒲山郡公號爲名將又曰史万歲少英武善騎射驍捷若飛好讀兵書兼精占候又曰宇文忻毎叅帷幄出入卧内禪代之際忻有力焉後拜右領軍大將軍恩賜彌重忻妙解兵法馭戎齊整當時六軍有一善事雖非忻所建在下輙相謂曰此必忻法也其見推服如此又曰薛丗雄性廉謹凢所行軍破敵之處秋毫無犯帝由是嘉之帝嘗從容謂群臣曰我欲舉好人未知諸君識不羣臣咸曰臣等何能測聖心帝曰我欲舉者薛丗雄羣臣皆稱善帝復曰丗雄廉正節槩有古人之風於是超拜右翊衛將軍又曰楊玄感欲立名隂求將領謂兵部尚書叚文振曰玄感世荷國恩寵踰涯分自非立効邊裔何以塞責若方隅有風塵之警庶得執鞭行陣少展絲髪之功明公兵革是司敢布心腹文振因言於帝帝嘉之顧謂群臣曰將門必有將相門必有相故不虚也於是賚物千叚禮遇益隆又曰突厥入朝上賜之射突厥一發中的上曰非賀若弼無能當此於是命弼弼再拜而呪曰若赤誠奉國者當一發破的如其不然發不中也旣射一發而中上大恱頋謂突厥曰此人天賜我也唐書曰劉黒闥爲竇建德將竒兵東西揜襲多所尅獲毎臨危難而色不變軍中號爲神勇又曰屈突通平薛仁果之際寳物山積諸將争取通一無所犯髙祖聞之曰通清正奉國著於終始名下定不虚也賜金銀六百兩雜綵千叚又曰右武候將軍張士貴破反獠而還太宗劳之曰聞公親蒙矢石爲士卒先雖古名將無以加也朕嘗聞以身報國者不顧性命嘗聞其語未覩其實於公方見之矣又曰文德皇后之葬也叚志玄與宇文化及分統士馬出宿於章武門太宗夜使宫官至三將軍處宇文士及營内使者志玄閉門不内曰軍門不可夜開使者曰此有手勑志玄曰夜中不辯眞僞竟停使者至暁太宗聞而歎曰此眞將軍也周亞夫何以加焉又曰霍王元範髙祖第十四子也母曰張美人元範少善騎射𥘉爲呉王時嘗從太宗遊獵遇群獸命射之矢不虚發獸無遺者太宗撫其背曰汝才藝過人恨今無所施耳當天下未定我得汝豈不安乎又曰王君廓統兵經略東都王丗充將郭士行許羅漢前後入掠君廓輙擊退之拜右武衛將軍詔勞之曰卿以十三人破賊一万自古以少擊衆未之前聞非唯驍勇絶人亦足以顯卿忠節也又曰突厥入寇王君廓邀擊破之俘斬二千餘人獲馬十五疋髙祖聞而大恱徴之入朝賜與御馬令殿廷乗之而出又謂侍臣曰吾聞藺相如叱秦王目皆出血君廓徃擊建德將出戰徐勣遏之君廓憤發大呼目及鼻耳一時流血此之壯氣何謝古人不可以常例賞之復賜錦𫀆金帶還領幽州又曰髙宗時吐蕃䧟安西四鎮長壽𥘉蕃軍逼安西府則天令武威軍緫管王孝傑將軍阿史那忠節等率師拒之孝傑至安西合戰屢捷大破蕃軍収復龜兹于闐踈勒碎葉四鎮而還則天大恱謂侍臣曰昔貞觀年中俱統得此蕃域其後西陲不守並䧟吐蕃今旣復舊邊境自然無事孝傑建兹功効竭盡欵誠遂能裏足徒行身與士卒齊力如此忠懇深足可嘉遷左衛大將軍又曰薛仁貴擊九姓突厥於天山軍將發髙宗出甲令仁貴射之射穿五重九姓衆十餘万令驍徤十人逆來挑戰仁貴發三箭中三人其餘下馬請降並坑之更就磧北安撫餘衆而還軍中歌曰將軍三箭定天山將士長歌入漢關又曰劉仁䡄顯慶四年出爲青州刺史五年大軍征遼令仁䡄監統水軍以後期免特令以白衣隨軍自効㝷撿校帶方州刺史兼熊津道行軍長史仍別領水軍二万襲破倭賊數万於白波虜獲舡艦四百餘艘倭及躭羅等國皆遣使詣之請降𥘉仁軌將發帶方州謂人曰天將富貴此翁耳乃於州司請歴日一卷并七廟諱人恠其故荅曰擬削平遼海頒示國家正朔使夷俗遵奉焉至是果以軍功顯正除帶方州刺史又曰郭元振爲安西大都護時安西突厥首領烏質勒部落強盛欵塞通和元振就其牙帳計㑹軍事時天大雪元振立於帳前與烏質勒言議湏臾雪深風冷元振未嘗移足烏質勒年老不勝寒苦㑹罷而死又曰李晟臨洮人也祖思恭父欽代居隴右嘗爲禆將晟數歲而孤事母孝聞少雄烈有材力善騎射年十八從軍身長六尺勇敢絶倫時河西節度使王忠嗣擊吐蕃有驍將乗城拒闘頗多殺士卒忠嗣募軍中能射者射之晟乃引弓一發而斃三軍大呼忠嗣厚賞之因撫其背曰此万人之敵也又曰貞元五年九月馬燧與太尉晟召見於延英殿上嘉其有大勲力皆圖形於凌煙閣列於元臣之次九年十月召見延英殿因拜手仆于地上親起之又曰王栖耀性謹厚善騎射始起兵渉寇境太深遇遊騎四合百歩内立表俾之環視發必破的虜相顧恐懼徐而解去嘗獵㑹稽山中有逸林白額獸卒起草中應弦而斃在蘇州嘗與諸文士遊虎丘寺平野霽日先一箭射空再發貫之江東文士自梁肅巳下歌詠焉又曰李愬旣執送呉元濟裴度建彰義軍節擁降卒万餘人次入焉李愬具橐鞬候度馬首度將避之愬曰此方不識上下等威之分乆矣請公因以示之度以宰相禮受愬謁衆聳觀焉明日愬以師還文成柵度乃視節度使觀察及刺史事蔡人大恱又曰李光顔爲河東禆將討李懷光楊惠琳皆有功後隨髙崇文平蜀搴旗斬將出入如神由是稍稍知名授兼御史大夫時兄光進官亦至兼御史大夫軍中號曰大大夫小大夫國語周語曰邵公告單公曰晉有三伐勇而有禮返之以仁吾三逐楚君之卒勇也見其君必趨禮也能獲鄭伯而捨之仁也老子曰以道佐人主者不以兵強天下果而勿矜果而勿伐河上公注云當果敢推讓勿自伐取其美也六韜曰兵入殷郊見太公曰是吾新君也而啇容曰非也其人虎據而鷹峙威怒自副見利欲發進不頋前後見武王曰是新君也見敵不怒獻帝春秋曰張遼問呉降人曰紫髯將軍長上短下誰也荅曰是孫㑹稽㑹稽典録曰張立之爲人剛毅志意慷慨太祖嘗抑之曰爾不念詩書慕聖道而好乗汗馬擊劒此一夫之用何足貴也謂左右曰丈夫一爲衛霍將十万馳沙漠驅戎狄立功建號耳何能作愽士耶荆州記曰鄧遐襄陽人也勇力絶人歴位冠軍將軍數郡太守號名將袁子丗說曰吕布之破也太祖給衆官車乗使取軍中物唯所欲衆人皆重載唯袁渙取書數百卷資粮而已衆人聞之大慙劉向新序曰孫武樂毅之徒皆前丗之賢將也乆逺深奥其事難知至於呉漢近時人耳起於販馬立爲良將乗名竹帛天下歸德此可慕也太平御覽卷第二百七十六
