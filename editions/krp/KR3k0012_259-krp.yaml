front:
  text: 太平御覽卷第二百五十九
  hash: sha256:8d9a14d3f8ba13606ff6fd64ea6e221d013ba73ee475a105e3d7319983cf5abc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_259-1a}
body:
  text: 職官部五十七太守論語子路曰善人爲邦百年亦可以勝殘去殺矣善人居中不踐迹不入室也此人爲政不能早有成功百年乃能無殘暴之人史記曰萬石君奮其父趙人也姓石氏奮長子建次子甲次子乙官皆至二千石於是景帝曰石君及四子皆二千石人臣尊寵乃集其門號奮爲万石君孝景季年万石君以上大夫禄歸老于家以歳時爲朝臣過宫門闕万石君必下車趨見路馬必式焉又曰杜周爲御史大夫家兩子夾河爲守漢書曰郡守秦官也常治其郡袟二千石有丞邊郡又有史掌兵馬祑皆六百石景帝中二年更名太守又曰季布爲河東太守孝文時人有言其賢召欲以爲御史大夫又言其勇使酒難近至留邸一月見罷布進曰臣待罪河東陛下無故召臣此人必有以臣欺陛下者今臣至無所受事罷去此人必有毀臣者夫以一人譽召臣一人毀去臣臣恐天下有識聞之有以窺陛下韋昭曰窺見陛下深淺也上黙然慙曰河東吾股肱郡故特召君耳又曰嚴助㑹稽人也上問所欲對曰願爲㑹稽太守在郡數年不聞問上賜詔書曰君猒承明之廬石渠門外勞侍從之事懷故土出爲郡間者闊焉乆不聞問助惶恐上書謝曰臣事君猶子事父臣當伏誅願奉二年計最如淳曰舊法當使丞奉歲計躬自欲入奉之也最凡要也又曰朱買臣字翁子拜㑹稽太守上謂買臣曰冨貴不歸故郷如衣錦夜行今子何如買臣蝢首辝謝買臣衣故衣懷其印綬歩歸郡邸時㑹稽吏方相與羣飲不視買臣買臣入室中守邸與共食且飽少見其綬守邸怪之前引其綬又視其印㑹稽太守章也守邸驚出相語上計椽吏皆醉大呼曰妄誕耳守邸曰試來視之其故人素輕買臣者入内視之還走疾呼曰實然座中驚駭丞守相推排陳列庭中拜謁又曰龔勝楚人也哀帝以勝守右扶風數月上知勝非撥煩吏遷勝光禄卿東觀漢記曰彭寵字伯通南陽宛人也父容哀帝時爲漁陽太守有名於邊容貌飲食絶衆是時單于來朝當道二千石皆選容貌飲食者故容徙爲雲中太守又曰馮勤字偉伯曽祖揚宣帝時爲弘農太守生八男皆典郡趙魏間號爲萬石諸馮至是世至二千石漢雜事曰蔣滿爲上黨其子萬爲北地都尉同詔徴見宣帝曰父子剖符耶即詔滿爲淮陽相萬爲弘農守後漢書曰郅惲再遷長沙太守先是長沙有孝子古𥘉遭父䘮未葬鄰人失火𥘉匍匐柩上以身扞火火爲之㓕惲真異之以爲首舉又曰任延爲武威太守帝親見戒之曰善事上官無失名譽延對曰臣聞忠臣不私私臣不忠履正奉公臣子之節上下雷同非陛下之福善事上官臣不敢奉詔帝歎息曰卿言是也又曰橋玄爲上谷太守上邽姜歧守道隱居名聞西州玄召以爲吏稱疾不就玄怒勑督郵尹益逼致之曰歧若不至趣嫁其母趣音促益固争不能得遽暁譬歧歧堅卧不起郡内士大夫亦徃諌玄乃止時頗以爲譏漢官解詁云太守專郡信理庻績勸農賑貧決訟斷辟興利除害檢察詳姧舉善黜惡誅殺暴殘者也魏志曰賈逵字梁道太祖征馬超至弘農曰此西道之要以逵領弘農太守召見計事大恱之謂左右曰使天下二千石悉如賈逵吾何憂也又曰劉靖馥之子也黄𥘉中遷廬江太守詔曰卿父昔爲彼州今卿復爲此郡可謂能克負荷者也又曰曹仁字子孝太祖征吕布仁别攻句陽抜之數有功拜廣陽守太祖器其勇略不使之郡蜀志曰法正字孝直先主以正爲蜀郡太守揚武將軍外統都畿内爲謀主一飡之德睚䀝之怨無不報覆擅殺毀傷巳者數人或謂諸葛亮曰法正於蜀郡大縱横將軍啓主公抑其威福亮荅曰主公之在公安也北畏曹操之強東憚孫權之逼近則慮孫夫人生變於肘腋當斯之時進退狼跋法孝直爲之輔翼令翻然翺翔不可復制如何禁法正使不得行其意也又曰劉琰字威碩魯國人也先主在豫州辟爲從事以其宗姓有風流善談論厚親待之遂墮從周旋常爲賔客先主定益州以琰爲固陵太守吴志曰士爕爲交阯太守中國士人徃依避難者以百數躭翫春秋爲之注解陳國袁徽與尚書令荀彧書曰交阯士府君旣學問優愽又逹於從政處大亂之中保全一郡二十餘年疆埸無事民不失業羈旅之徒皆蒙其慶雖竇融保河西曷以加之又曰周魴黄武中鄱陽大帥彭綺作亂攻没屬城及以魴爲鄱陽太守與胡綜等勠力致討遂生擒綺送詣武昌又曰陸績字公紀孫權統事辟爲奏曹掾以直道見憚岀爲鬱林太守晉書曰桓玄出𥙷義興太守鬱鬱不得志甞登髙望震澤歎曰父爲九州伯兒爲五湖長棄官歸國又曰辛恭靖隴西狄道人也少有器幹才量過人隆安中爲河南太守㑹姚興來冦恭靖固守百餘日以無救而䧟𬒳執至長安興謂之曰朕將任卿以東南之事可乎恭靖厲色曰我寧爲國家鬼不爲羗賊臣興怒幽之別室經三年至元興中誑守者乃踰垣而遁歸于江東又曰鄭冲爲陳留太守冲以儒雅爲德蒞職不爲幹局之譽而簞食緼𫀆不營貲産世以此重之又曰劉世智字子房貞素有寔兄風少貧窶毎負薪自給讀書不輟竟以儒行稱歷吏部郎出爲潁川太守平原管輅甞謂人曰吾與劉潁川兄弟語使人神思清發昬不暇寐自此之外殆白日欲寢矣又曰劉胤王敦請爲右司馬胤知敦有不臣心枕疾不視事以是悮敦意岀爲豫章太守辭以脚疾詔就家授印綬郡人莫鴻南土豪族因亂殺夲縣令横恣無道百姓患之胤至誅鴻及諸豪右界内肅然晉起居注太康八年詔曰昔先王御俗以興至治未有不先成民事者也漢宣識其如此是以歎息良二千石今欲皆先外郡治民著績然後入爲常伯納言及典兵宿衛黄門散騎中書郎晉書吕光載記曰吕纂尅金城太守衛鞬鞬瞋目謂光曰我寕守節斷頭不爲降虜也光義而免之沈約宋書曰羊玄保爲黄門郎善弈棊棊品第三太祖亦好棊數蒙引見嘉其温謹與太祖賭郡戲勝以𥙷宣城太守齊書曰王敬則遷吴興太守郡舊多剽掠有十數小兒於路取遺物敬則殺之以徇自此路不拾遺物郡無刼盗又録得一偷召其親屬於前鞭之令偷身長掃街路乆之乃令偷舉舊偷自代諸偷恐爲所識皆逃走境内以清又曰劉善明太祖踐祚以善明勲誠欲與善明禄召謂之曰淮南近畿國之形勝自非親賢不使居之卿爲我卧治也代髙宗爲征虜將軍淮南宣城二郡太守又曰張岱時新安王子鸞以盛寵爲南徐州割吴郡屬焉髙選佐吏孝武帝召岱謂之曰卿美望夙著今欲用卿爲子鸞㹅刺史之任無謂小屈終當大伸也又曰王敬則爲吴興太守入烏程從市過見屠肉枅結賢反歎曰吴興昔無此枅是我少時在此作也召故人飲酒說平生不以屑也南史曰謝超宗有髙名齊髙帝以超宗爲義興太守昇明二年坐公事免詣東府門自通其日風寒髙帝謂四坐曰此客至使人不衣自䁔矣三國典略曰王慶籍爲京兆太守太祖以其精勤賚以紫𫀆及綾裳一襲謂百官曰王慶籍一世清人也又曰隂鏗爲招逺將軍晉陵太守鏗甞與賔友宴飲見行觴者因廽酒矣以授之衆坐皆笑鏗曰吾儕終日酣酒而執爵者不知其味非人情也及侯景之亂鏗甞爲賊所擒或救之獲免鏗問其故乃前所行觴者梁書曰劉之遴爲南郡太守𥘉之遴在荆府常寄居南郡廨忽夢前太守袁彖謂曰卿後當爲折臂太守則居此中之遴後果折臂遂臨此郡又曰謝朏字敬仲齊時爲義興太守加秩二千石不省雜事悉付綱紀曰吾不能作主者但吏能作太守耳又曰任昉爲吴興太守清潔友人到漑與弟洽從昉爲山澤遊𬒳代而還無衣沈約遺裙衫迎也又曰范縝爲冝都太守性不信鬼神夷陵有伍相廟唐漢三神廟胡里神廟縝乃下教斷不祠後魏書曰房士逹永安末轉濟南太守士逹不入京師而頻爲夲州郡時人榮之又曰崔休爲渤海太守時大儒張吾貴有盛名於山東四方學士咸相宗慕弟子自逺而至者常千餘人生徒旣衆所在多不見容休乃爲設爼豆招延禮接使肆業而還儒者稱爲口實又曰盧道將爲燕郡太守道將下車表樂毅霍光之墓而爲之立祠又曰房㓜愍安豊新蔡二郡太守坐事奪官居家忽聞有客聲出無所見還至庭中爲家羣犬所噬遂卒北史曰宋欽道仕齊歷位中山太守長於撫接然好察細事其州府佐吏使民間者先酬錢然後敢食臨蒞處稱爲嚴整後周書曰盧光爲京兆太守先是舎數有妖怪前後郡將莫敢居者光曰吉凶由人妖不妄作遂入居之未幾光所乗馬忽昇㕔事昇牀南首而立又食器無故自破光並不以介懷其精誠守正如此唐書曰崔玄亮清慎介獨自登朝行不樂趨競歷御史尚書宻湖曹三部守毎一遷秩謙譲輙形於色又曰李暠守太原舊俗有僧徒以習禪爲業及死不歛但輿屍送近郊以飼鳥獸如是積年土人號其地爲黄坑坑側有餓犬千數食死人肉因侵害㓜弱逺近苦之前後官吏不能禁止暠到官申明禮憲期不再犯仍發兵捕殺羣狗其風遂革三輔决録曰馬援誡兄子書龐伯髙敦篤周慎口無擇言吾愛之重之願汝曹効之世祖見援書即擢爲零陵太守在郡四年甚有治化文士傳曰文帝亦親阮籍常與談戲任其所欲不迫以職事籍常從容言昔曽遊東平樂其土風願得爲東平太守文帝大恱即從其意籍便乗驢徃之至郡皆壞府舎諸壁鄣使内外相望教令清當十餘日便復乗驢而去楚國先賢傳曰耒陽胡紹字伯蕃年十八爲郡門下幹迎太守許荆荆足中風使紹枊之紹視荆蹠音跖下而笑荆怒問之紹曰見明府蹠下黒子紹亦有之忻而故笑荆視之果有黒子令其從學學八年遂爲九真零陵二郡太守華陽國志曰趙瑶字元珪弟琰字稚珪瑶兄弟皆以令德著聞瑶少有公望遷扶風太守徙爲蜀郡司空張温謂之曰弟五伯魚從蜀郡入爲司空吾今掃弟以待足下矣西京雜記曰朱買臣爲㑹稽太守懷章綬還至舎亭而國人未知也所知錢勃見曝露乃勞之曰無罷乎遺以紈扇買臣至郡引爲上客㝷遷爲掾吏韓子曰李悝爲魏文侯上地之守而欲人之善射乃下令曰民有狐疑之訟者令之射杓中之者勝不中者負令旦下而人皆習射日夜不休及與秦戰大敗之以民之善射也風俗通曰蜀郡任嘉年三四歳時父騰爲諸生於漢中就師有盗賊道路斷絶蜀亦覆没客轉長沙爲州郡吏後嘉爲長沙太守騰爲奏曹掾黙知嘉實其子曰嘉母語次謂嘉曰奏曹任掾則汝父也但差老耳嘉曰天下豈獨有一任夫人何以老更生邪意母曰咄我尚守飬汝數十年無嫌譏豈以垂没更失計哉顧實真父不可棄捐後嘉問掾聲音何類太守何州里耶掾曰夲犍爲武陽人蓬轉流宕到此母察審諦又識左耳前贅因出抱持對之流涕嘉自㧞榻歔欷哽咽世說曰爰綜爲新安太守南界有刻石爰至其下醼有人於石下得剪刀者衆咸異之主簿對曰昔長沙桓王甞飲餞孫洲父老云此洲狹而長君當爲長沙事果應夫三刀爲州今得交刀君亦當爲交州後果作交州世語曰荆州刺史裴潜以南陽周泰爲從事使詣司馬宣王宣王知之辟泰㤗九年居䘮留鈌行之後三十六日擢爲新城太守宣王爲大㑹使尚書鍾毓嘲之曰君釋褐登宰府三十六日擁麾盖守兵馬典郡乞兒乗小車一何快耶泰曰君貴公之子故守吏職猕猴騎土牛一何遟也潘尼贈二李郎詩序曰元康六年尚書吏部郎汝南李光彦遷汲郡太守都亭侯江夏李茂曽遷平陽太守此二子皆弱冠知名歷職顯要旬月之間繼踵名郡離儉劇之勤就放曠之逸枕鳴琴以俟逺致離別之際各斐然賦詩太平御覽卷第二百五十九
