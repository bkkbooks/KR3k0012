front:
  text: 太平御覽卷第九百八十二
  hash: sha256:9f35ccaa098f8bf7f7396e1454829e61349a5d2272455e6c2f1625095eb2ecf7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_982-1a}
body:
  text: 香部二蘇合安息薫陸流黄靑木旃檀甘松艾納霍香楓香棧香木蜜栟香都梁沉香甲香迷送零陵芸香蘇合續漢書曰大秦國合諸香煎其汁謂之蘇合梁書曰中天竺國出蘇合是諸香汁煎之非自然一物也又云大秦人採蘇合先筌其汁以爲香膏乃賣其滓與諸國賈人是以展轉來逹中國不大香也傳子曰西國胡人言蘇合香獸便也中國皆以爲恠從征記曰劉表家在髙平郡表子擣四方珎香數十斛置棺中蘇合消疫之香畢備永嘉中郡人發其墓表如生香聞數十里廣志曰蘇合出大秦或云蘇合國人採之筌其汁以爲香膏賣滓與賈客或云合諸香草煎爲蘇合非自然一種也傅玄四愁詩曰佳人贈我蘇合香何以要之翆鴛鴦班固與弟超書曰竇侍中令載雜綵七百疋市月氏蘇合香安息晉書佛圖澄傳曰石勒時襄國城水源暴竭勒問澄澄曰當勑龍取水乃坐䋲床燒安息香呪願三日水微流有小龍五六尺隨水來湏臾水大至唐書曰曹國出青黛安息靑木等香薫陸魏略曰大秦出薫陸抱朴子曰俘焚洲在海中薫陸香之所出薫陸香木膠也樹有傷穿膠因墮夷人採之以待估客所以賈不多得者所患狤居一切掘獸噉之此獸斫刺不死投火中薪盡不燋以杖打之皮不傷而骨碎然後乃死廣志曰寄六出交州又大秦海邊人採與賈人易榖若無賈人取食之南方草木狀曰薫陸香出大秦云在海邊自有大樹生於沙中盛夏樹膠流出沙上夷人採取賣與賈人南州異物志同其異香唯云狀如桃膠典術又同唯云陶松栢法不飲食之令人通神靈也俞益期牋曰衆香共是一木木膠爲薫陸流黄吴時外國傳曰流黄香出都昆國在扶南南三千餘里南州異物志同廣志曰流黄香出南海邊國青木隋書曰樊子盖爲武威太守車騎駕西廵將入吐谷渾子盖以彼多瘴氣獻青木香禦霧露唐子曰師子國出朱砂水銀薫陸欝金蘇合青木等諸香南夷志曰崑崙國正北去蠻界西洱河八十一日程出象及青不香旃檀香紫檀香㯽榔琉璃水精䗍柸又曰南詔青木香永昌所出其山名青木山在永昌南三月日程廣志曰青木出交州天竺徐裏南方記曰青木香出天竺國不知其形南州異物志曰青木香出天竺是草根狀如甘草俞益期牋曰衆香共是一木木節是青木旃檀三國典略曰周師䧟江陵𥘉梁主以白檀木爲梁武之像毎朔望親祭之軍人以其香也剖而分之竺法真登羅山䟽曰旃檀出外國元嘉末曽城有人於山見一大樹貟䕃數畝三丈餘圍辛芳酷烈其間枯條數尺授而刃之乃白旃檀俞益期牋曰衆香共是一木木根爲旃檀崔豹古今注曰紫旃木出扶南林邑色紫赤亦謂紫檀也杜寳大業拾遺録曰薵禪師甚妙醫術作五香第一沉香飲次丁香飲次檀香飲次澤蘭飲次甘松飲皆別有法以香爲法以香爲主更加別藥有味而止渴兼於𥙷益甘松廣志曰甘松出凉州諸山艾納廣志曰艾納出剽國樂府歌曰行胡從何來列國持何來􅚊五味香迷送艾納及都梁霍香廣志曰霍香出日南諸國吴時外國傳曰都昆在扶南山有霍香南方草物狀曰霍香榛生民自種之五六月採曝之乃芳芬耳出交阯武平興古九真地名也南州異物志曰霍香生曲遜國属扶風香形如都梁可以着衣服中劉欣期交州記曰霍香似蘇合范曄和香方曰靈霍虚燥俞益期牋曰衆香共是一木木葉爲霍香楓香梁書曰任昉爲新安太守甞欲營佛齋燒調香二石始入三升便出教長奪曰與奪自巳不欲貽之後人南方記曰楓香樹子如鴨卵爆乾可焼魏武令曰房室不㓗聽得焼楓膠及蕙草棧香音牋廣志曰棧香出日南諸國南方草物狀曰棧蜜香出都昆不知棧蜜香樹若爲但見香耳嶺表録異曰廣管羅州多棧香樹身似栁其花白而䌓其葉如橘皮堪作𥿄名爲香皮𥿄灰白色有紋如魚子牋其紙慢而弱沾水即爛逺不及楮皮者又無香氣或云沉香鷄骨黄熟棧香同是一樹而根幹枝節各有分別者也南越志曰交州有蜜香樹欲取先斷其根經年後外皮朽爛木心與節堅黒沉水者爲沉香與水面平爲鷄骨㝡麄者爲棧香木蜜異物志曰木蜜名曰香樹生千歳根本甚大先伐僵之四五歲乃徃看歳月乆樹材惡者腐敗唯中節堅直芬香者獨在耳魏王花木志曰廣志木蜜樹號千歳樹根甚大伐之四五歳乃取木腐者爲香其枝可食本草經曰木蜜一名蜜香味辛温栟香南方草物狀曰栟香莖生出烏滸都梁廣志曰都梁出淮南盛弘之荆州記曰都梁縣有小山山水清淺其中生蘭草俗謂蘭爲都梁即以號縣沉香晉書曰石崇以奢豪矜物厠上常有十餘婢侍列皆有容色置甲煎粉沉香汁有如厠者皆易新衣而出客多羞脫衣而王敦脫故着新意色無怍群婢相謂曰此客必能作賊又曰吴隱之至自畨禺其妻劉氏齎沉香一斤隱之見遂投於湖亭之水梁書曰林邑國出古貝及沉香木古貝者樹名也其華成時如鵝毳抽其緒紡之以作布與紵布不殊亦染成五色織爲班布沉木香土人斫斷積年以杇爛而心節獨在置水中則沉故名曰沉香次不沉者棧和之属陳書曰波皇后素無寵至德二年乃於光照殿前起臨春結綺望仙三閣髙數十丈並數十間其䆫牖壁帶懸楣欄檻之類皆以檀香爲之唐書曰先天二年十月親講武於驪山之下徴兵二十萬上親擐戎服持沉香大槍立於陣前威振宇宙長安士庻奔走縱觀填塞道路又曰長慶中波斯大賈李蘇沙進沉香亭子材左拾遺李漢上䟽以爲沉香爲亭比瑶臺玉室上頗怒言過特優容之金樓子日扶南國衆香共是一木根便是旃檀節便是沉水花是鷄舌葉是霍香膠是薫陸竺法眞登羅山䟽曰沉香葉似冬青樹形崇竦其木枯折外皮朽爛内乃香山雖有此樹而非香所出新㑹髙涼土人斫之經年肉爛盡心則爲沉香出北景縣樹極髙大土人伐之累年湏外皮消盡乃割心得香郭子横洞冥記曰薫木鮮祗所獻色如玉而質輕泛之昆盧池爲舟爛則沉矣碎其屑氣聞數百里氣之所至毒疫皆除杜寳大業拾遺録曰四年夏四月征林邑國兵還至獲彼國得雜香真檀象牙百餘万斤沉香二千餘斤又曰尚書令楊素大業中東都宅造沉香堂甚精麗新泥堂訖閉之三月後開視四壁並爲新血所洒腥氣觸人異苑曰沙門支法存在廣州有八尺翕毛㲪又有沉香八尺板床太元中王琰爲州大兒劭求二物不得乃殺而籍焉南州異物志曰沉木香出日南欲取當先斫壞樹着地積乆外皮朽爛其心至堅者置水則沉名沉香其次在心白之間不甚堅精置之水中不沉不浮與水面平者名曰棧香其㝡小麁白者名曰繫香俞益期牋曰衆木共是一木木心爲沉香甲香廣志曰甲香出南方南州異物志曰甲香螺属也大者如甌靣前一邊直攙長數寸圍殻峿有刺其掩可合衆香燒之皆使益芳獨燒則臰甲香一名流螺謂之中流㝡厚味范曄香方曰甲煎淺浴迷送魏略曰大秦迷送廣志曰迷送出西海中魏文帝迷送賦曰余種迷送於中庭嘉其楊條吐香馥有令芳乃爲之賦曰坐中堂以遊觀覽芳草之樹庭舞妙䴡于纎枝楊脩幹而結莖簿六夷之穢俗超万里而來征豈衆華之是芳信希丗而特生應瑒迷送香賦曰振纎枝之翠粲動採葉之菲菲舒芳香之酷烈乗清風以徘徊陳班迷送香賦曰立碧莖之荷郍鋪緑條之蟺蜿零陵南越志曰零陵香土人謂爲鷰草芸香說文曰芸草似苜蓿淮南子曰芸可以死而復生雜字解釋詁曰芸杜榮大戴禮夏小正曰採芸爲廟菜禮記月令曰仲冬之月芸始生鄭玄曰芸香草也禮圗曰芸蒿曰葉似蒿香美可食也魏略曰大秦出芸膠洛陽宫殿簿曰顯陽殿前芸香一株徽音含章殿前各二株晉宫閣名曰太極殿前芸香四畦式乾殿前芸香徽音殿前芸香雜花十一畦明光殿前芸香雜花八畦顯陽殿前芸香二畦廣志曰芸膠有安息膠有黒膠吴氏夲草曰石芸一名敞列一名頋喙傳玄芸香賦序曰始以微香進御終於捐弃黄壤吁可閔也遂詠而賦之成公綏芸香賦曰美芸香之脩㓗禀隆陽之淑精莖類秋竹枝象春松傳咸芸香賦序曰先君作芸香賦辭美髙䴡有覩斯卉蔚茂馨香同遊使余爲序太平御覽卷第九百八十二
