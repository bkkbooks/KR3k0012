front:
  text: 太平御覽卷第七百七十舟部三
  hash: sha256:65de35738821dfd3cb887de55dafa179ed18de8ba1623d8c3213b1b4c8e6b7a8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_770-1a}
body:
  text: 舟下艦朦衝䑦艫音勾艑航舫舠舸舟下周處風土記曰小曰舟大曰船温麻五㑹者永寜縣出豫林合五板以爲大船因以五㑹爲名也晨鳬即青桐大舡名諸葛恪所造鴨頭舡也預章㭠音銑棗木諸木皆以多曲理盤節爲堅勁也浩漂者言舡之在水如蓮花散落浮於川也武昌記曰樊口北有敗舶灣孫權嘗裝一舡名大舡容敵士三千人與羣臣泛舶中流值風起至樊口十里餘便敗故因名其處爲敗舶灣也戴延之西征記曰檀山凡去洛城水道五百三十里由新安澠池冝陽三樂三樂男女老劣未嘗見舡旣聞晉使溯流皆相引蟻聚川側俯仰傾笑越絶書曰闔閭見子胥敢問舩運之備何如對曰舩名大翼小翼突胃樓舡橋舡今舡軍之教北陵軍之法乃可用之大翼者當陵軍之車小翼者當陵軍之輕車突冐者當陵軍之衝車樓舡者當陵軍之行樓車也橋舡者當陵軍之輕足剽定騎也瑞應圖曰王者徳盛則金人下乗舡遊王後池郡國誌曰越州百塗山有石舡一丈禹所乗者宋元嘉中有人於舡側得䥫履一量一云有聖姑從海中乗舟張石㠶至此二物廟中有周時樂器名淳于銅作似鍾而有頸映水用芒刜音弗則鳴又曰硤州逺安縣江有狼尾灘有陸抗故城南有孤山袁山松爲郡甞登以四望大江如索帶舟舡如鳬鴈焉又曰相州魏縣景穆寺西有遭官有石竇橋鳴鶴飛集赤馬飛龍等舟西京雜記曰昆明池中有弋樹舡各數百艘舡上建樓櫓戈舡建戈矛四角迷垂幡音餌旌葆麾蓋照灼涯涘又曰太液池中有鳴鶴舟容與舟清曠舟採菱舟說苑曰吴赤市使於知氏假道於衛寗文子具紵絺三百製將以送之大夫豹曰吴雖大國也不壤交假之道則亦敬矣又何禮焉寗文子不聽遂致之吴赤市至於知氏旣得事將歸吴智伯命造舟爲梁吴赤市曰吾聞天子濟于水造舟爲梁諸侯維舟爲梁大夫方舟臣之職也且敬太甚必有故使人視之則兵在後矣將以襲衛吴赤市曰衛假吾道而厚贈我我見難而不告是與爲謀也稱疾而留使人告衛衛人警戒智伯聞之乃止也列女傳曰趙簡子至河津津吏醉吏女乃持檝而前爲王掉舟餘具下檝門中江表傳曰孫權於武昌新裝大舡名爲長安又曰孫權乗飛雲大舡與張昭魯肅等共追送叙别吴又曰周瑜破魏軍曹公復書與權曰赤壁之役值有疾疫孤燒舡自退撗使周瑜虚獲此名又曰劉備進駐鄂縣之樊口諸葛詣吴未還聞曹公軍下恐懼曰遣邏吏於水次候權軍吏望見周瑜舡馳還白備備曰何以知非青徐軍耶吏對曰以舡知之備遣人慰勞瑜瑜曰有軍任不得委署儻能屈威副其所望備謂張飛關羽曰彼欲致我今自託於東而不徃非同盟之意也乃乗單舸徃見瑜問曰今距曹氏深爲得計戰卒有幾瑜曰此自足用豫州但觀瑜破之吴歴曰曹公出濡湏作油舡夜渡洲工權乃自乗從濡湏吴公軍行五六里廻作鼓吹公見舟舡器仗法伍整粛喟然嘆曰生子當如孫權爲劉景升兒若㹠犬耳又曰孫綝上䟽景帝曰少帝於宫内作小舡三百餘艘飾以金銀師工晝夜不㤙王粲海賦曰乗薗桂之舟晨鳬之舸庾闡楊都賦曰龍坻華屋晨鳬之舸鷁首鋪於芙蓉盤蛟纏於赤馬晉令曰水戰有飛倉集舡說苑曰楚鄂君乗青翰之舟張翠羽之鷁楚辭曰舡容與而不進奄迴水以凝滯又曰羙要妙兮冝修沛吾乗兮桂舟桂櫂兮蘭枻増水兮積雪魏文帝沂淮賦曰建安十四年王師東征泛舟萬艘楊脩岀征賦曰汎順風而廻艫徐日轉而月移斾已入乎河口殿都練切尚集於菌池班固東都賦曰命舟牧爲水嬉浮鷁首醫雲芝交又曰東郊則有通溝大漕潰渭洞河泛舟山東控引淮湖與海通波漕水運也蒼頡篇月潰傍决也前書武帝渠通渭史記曰滎陽下引河東南爲鴻溝以與淮泗㑹也袁宏東征賦曰驚瀾嶾音隱嶙力軫切而嶽轉頽波嵔音猥􅐑力猥切以嶺没咨余舟之小狹衝奔湍以檮杌櫂弱檝之弗施授洪流以藏骨夏侯弼吴都賦曰嚴嚴舡艫汎汎楊舟權河髙跱風駭雲浮堅壁金扶有若髙樓劉謐之與公牋曰昔甲申之際遭湯旱流烟今子亥之歳值堯水滔天火延燒其廬水突壞其園何小人兮頓偷雙舡由是行無擔石室如懸磬魏文與孫權書曰知巳選擇見舡最大樟材者六艘受五百里石從汚水送付樊口王粲詩曰方舟浮大江日暮愁我心曹植詩曰何以汎舟媿無榜人嵇康詩曰淵淵緑水淪滑而逝汎汎虚舟載停載滯皷枻投竿優遊卒歳梁王筠詠輕利舡應臨汝侯教詩曰君侯飾輕利揺蕩邁飛雲凌漾浮鷁采映木煥蛟文雷流巳冠絶鳥逝復超群倐忽方千里戀兹岐路分陳張正見後湖泛舟詩曰上苑奢行樂滄池聊薄遊泛荇分蘭櫂槎觸桂舟残虹収度雨缺岸上乗新流欲知有髙趣長楊送夌秋又别韋諒賦得江潮泛别舟詩曰千里㝷陽岸三翼木蘭舡鷁泛青鳬後雞鳴白鷺前􅉼花没淺纜帶葉動深舡不言朝夕水獨自限神仙又與錢玄智泛舟詩曰髙門事休沐朝野念逢迎還乗金谷水俱望洛陽城舟移洛女度檝動渭橋横風髙鴈巳落雨霽水還清葉盡桐門淨花秋菊岸明欲奏江南曲聊習棹歌行晉棗據舡賦曰嘉聖王之神化理通微而逹幽悼民萌之隔塞愍王教之不周立成器以備用因垂象以造舟濟迅波之絶軌越巨川之湍流運重固之滯質雖載沉而必浮且論器而比象似君子之淑清外質朴而無飾内空虚以受盈不辭勞而惡動不偷安以自寧且其行無轍趾止無所不疾而速忽若馳奔晉王叔之舟賛曰塗則騁車水惟用舟弱檝輕棹利渉濟求𬗟彼漁人鼓枻清謳後漢李尤舟檝銘曰舟檝之利譬猶輿馬載重歴逺以濟天下相風視波窮究川野安審懼慎終無不可艦釋名曰上下重牀曰艦四方施板以禦失如牢檻也洞冥記曰昆靈弛中有淩波艦棭電艦吴志曰周瑜逆曹公部將黄公蓋取艨衝闘艦數十艘實以薪草膏灌其中裏以帷幕上建牙旗同時發火時風猛火盛悉延燒岸上營曹公軍敗退晉中興書曰建興九年冬左將軍王敦遣振威將軍周訪廣武將軍趙誘受陶偘節度征蜀賊杜㢰音韜大戰蜀賊以桔橰打没偘艦二十餘艘人皆投水義熙起居注曰盧循新作八槽艦九枚起四層髙十餘丈連營繕令曰諸私家不得有戰艦等舡艨衝釋名曰外狹而長曰艨衝吴志曰董襲討黄祖祖横兩艨衝夾守沔口栟音并櫚音閣大紲繫石爲矴軍不得前襲與陵統俱爲前部各將敢死百人人𬒳兩鎧乗舸舡突入艨衝裏身以刀斷兩紲艨衝方横流大兵遂進又曰周瑜逆曹公部將黄蓋取艨衝鬪艦數十艦餘艦上艦門户又曰將軍賀齊性奢綺好軍事所乗舡雕刻丹鏤青蓋綘居朦衝鬪艦之屬望之若山營繕令曰諸私家不得有蒙衝等舡餘具叙舟中門䑦􅑳雜字觧詁曰䑦􅑳雜舡也吴志曰吕蒙襲關羽至㝷陽晝伏精兵於􅑳艑中使白衣揺櫓作啇賈販晝夜兼行故羽不聞知遂到南郡物理論曰夫工匠徑渉河海爲舸􅑳以浮大淵皆成於巧手岀乎聖意艑廣雅曰艑舟也荆州土地記曰湘洲七郡大艑之所岀皆受萬斛吴志曰吕蒙襲關羽至㝷陽晝伏精兵於􅑳艑中餘上具䑦􅑳門温嶠教曰廪者無米受得艑下濕米豈是吾遇兵衆無異之懷乎雖是數合米欲令齊均若有不如教鞭五十也荆州土地記曰桓宣穆遣人㝷廬山下有一湖中有敗艑航說文曰航方舟也詩曰誰謂河廣一葦航之異苑曰晉時錢塘浙江有大樟林桁毎有乗者軌潭盪摇揚不可禁嘗鳴鼓錢塘江頭陵浪如故唯桁吏章奥能相制伏及奥死遂長廢淮南子曰公孫龍在趙之時謂弟子曰人而無能者龍與遊有客衣褐帶索而見曰臣能呼公孫龍頋謂弟子曰門下故有能呼者乎對曰無有公孫龍曰與之弟子之藉後數日徃說燕王至於河側而航在北使客呼之一呼而航來楊子灋言曰舎舟航而濟乎瀆者末矣舎五經而濟乎道者末矣李軌注曰末無之也乗國者如乗航乎則民斯安矣孫綽子曰仲尼見滄海横流故務爲舟航左思吴都賦曰長鯨吞航脩鯢吐浪也舫說文曰舫併舡吴書陸孫破曹休當還西陵公卿並爲祖道上賜御舡一舫繒綵舟也晉書曰王廙性儁率嘗從南下旦自㝷陽迅風飛㠶暮至都倚舫樓長嘯神氣甚逸梁書曰安成康王秀爲江州刺史將發主者求堅舡以爲齎舫秀曰吾豈愛財而不愛士乃教以牢者給叅佐下者載齎物旣而遭風齎舫遂破舠釋名曰舡三百斛曰舠舠豹也短也江南所名短而廣安不傾危也詩曰誰謂河廣曽不容舠舸王隠晉書曰頋滎徴侍中見王路塞絶便乗舡而還過下邳遂觧舫爲單舸一日一夜行五六百里遂得免沈約宋書曰垣護之隨王玄謨入河玄謨攻滑臺護之以三百舸爲前鋒進據石濟石濟在滑臺西南百二十里玄謨敗退不暇報護之及護之聞知而虜悉巳牽玄謨水軍大艚連以䥫鎻三重欲以絶護之還路護之中流而下毎至鐵鎻輙以長柯斧斷之虜不能禁唯失一舸吴志曰甘寜厨下兒有過走投吕蒙蒙恐寜殺之故不即還後寧齎禮禮䝉母蒙臨當輿斗堂乃岀厨下兒出還寜寜許不殺斯湏還舡縛置桑樹自挽弓射殺之勑舡人更増舸䌫觧衣卧舡中蒙大怒擊鼓㑹兵欲攻寜蒙母諌乃止江表傳曰劉備進住鄂縣之樊口聞曹公軍下恐懼俄周瑜舡軍至備乃乗單舸徃見瑜己具舡門又曰孫權名舸爲馬言飛馳如馬之走陸地也洞冥記曰昆靈池中有橦雷舸太平御覽卷第七百七十
