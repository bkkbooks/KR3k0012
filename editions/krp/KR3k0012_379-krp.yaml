front:
  text: 太平御覽卷第三百七十九人事部二十
  hash: sha256:bcd5961d1749a0af0f610496b52361579c01ab451c74fea89e123ef47e2058f2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_379-1a}
body:
  text: 羙丈夫上尚書洪範曰二五事一曰貌容儀毛詩曰云誰之思西方羙人箋云思周室之賢者彼羙人兮西方之人兮箋云彼羙人謂碩人也又曰叔于田巷無居人叔大叔叚也田取禽也豈無居人不如叔也洵羙且仁洵信也又淇奥曰有匪君子如金如錫如圭如璧寛兮綽兮猗童較兮又猗嗟曰猗嗟昌兮頎而長兮昌盛也頎長貌也抑若揚兮抑羙色揚廣揚羙目揚兮好目揚眉巧趨蹌兮射則臧兮又小戎曰文茵暢糓駕我騏馵言念君子温其如玉又盧令曰盧令令其人羙且仁盧重環其人羙且鬈鬈好貌讀當爲權權勇壯也盧重鋂其人羙且偲偲才也又汾沮洳曰彼其之子羙如英羙如英殊異乎公行又曰彼其之子羙如玉羙如玉殊異乎公族左傳曰宋公子鮑羙而艶又曰子太叔羙秀而文又曰冉竪射陳武子中手冉竪季氏臣失弓而罵武子罵詈以告平子曰有君子白晢鬒鬚眉甚口平子曰必子彊也子彊武子字爾雅曰羙士爲彦論語曰堂堂乎張也言子張容貌盛難與並爲仁矣孝經曰容止可觀進退可度家語曰息土之民羙漢書曰張子房狀貌如羙婦人又曰直不疑狀貌甚羙又曰班伯少受詩於師丹大將軍王鳯薦伯冝勸學召見宴昵殿中容貌甚麗誦說有法拜中常侍又曰公孫弘對䇿時百餘人太常奏弘第居下天子擢弘對爲第一召入見容貌甚麗拜爲博士待詔金馬門又曰張蒼好書律暦爲御史主柱下方書亡歸沛公略地過武陽蒼當斬解衣伏質蒼羙麗長大肥白如瓠王陵見羙乃言沛公赦之後爲御史大夫及爲相事陵如父陵死蒼洗沐常先朝陵夫人上食後歸又曰陳平少時家貧好讀書長大羙色而肥或譛平於漢王曰平雖貧羙丈夫如冠玉耳注曰此王比平又曰董偃始與母賣珠爲事年十三隨母至館陶公主家左右言其姣好主召見曰吾爲母養之因留第中教書射御年十八乃冠出則執轡入則侍内甚温軟以主故諸公接之名稱城中號曰董君又曰車千秋姓田爲髙寢郎戾太子敗千秋訟太子冤上頗知太子無他意乃召見千秋千秋長八尺餘體貌甚麗帝恱之曰此髙廟神靈使公公當遂留輔我後年老乗小車上殿故號車氏又曰董賢字聖卿雲陽人也爲太子舎人哀帝時爲郎傳漏在殿爲人羙麗哀帝望見恱其儀貌拜爲黄門郎又曰江充召見太一宫自請願以所常𬒳服衣冠見上許之魁岸容貌甚壯帝望見異之謂左右曰燕趙固多竒士又曰王啇長八尺餘體甚鴻大容貌絶人單于來朝仰視遷延却退天子聞而嘆曰眞漢相也又曰東方朔目如懸珠齒如編貝又曰司馬相如車騎雍容閑雅甚都都閑雅之稱也又曰薛宣好威儀進止雍容細甚可觀又曰霍光白晢踈目羙鬢髯也後漢書曰徐防字謁卿沛國人也體貌矜嚴占對可觀顯宗異之特授尚書郎又曰新野功曹鄧衍以戚小子侯毎預朝㑹容姿趨歩有出於衆顯宗目之曰朕之容貌豈若此人時賜與焉衍雖有容儀而無實行未甞加禮又曰蔡邕字伯喈謂從弟谷曰董卓性剛難濟吾且遁逃山東以待如何谷曰君狀異恒人毎行觀者盈集以此自匿不亦難乎乃止謝承後漢書曰楊喬爲尚書容儀偉麗數上言政事桓帝愛其才貌詔妻以公主喬固辭不聽還閉口不食七日而死東觀漢記曰杜詩薦伏湛曰儀貌堂堂國之輝光智略謀慮朝之淵藪又曰馬援自還京師數𬒳進見爲人明白眉目如畫閑進對尤善述前事毎言及三輔長者至閭里少年皆可觀皇太子諸王聞者莫不屬耳忘倦又曰虞延字子大陳留人也上東廵路過小黄髙帝母昭靈后園陵在焉時延爲督郵詔呼見問園陵事延進止從容跪拜可觀其陵樹株蘖皆諳其數帝善之魏志曰邢顒字子昂時人稱徳行堂堂邢子昂文帝以爲太常呉志曰諸葛恪宇元遜江表傳曰恪辯論應機莫與爲對孫權見而竒之謂父瑾曰藍田出羙玉眞不虛也又曰朱據字子範呉郡人有姿貌膂力又能論難黄武𥘉徴拜五官中郎將權遷建鄴徴尚公主拜左將軍封雲陽侯謙虚接士輕財好施又曰孫韶字公禮爲邊將不進見十餘年權還建鄴乃得朝覲問諸要害逺近人馬衆寡將卒名字具識之所問咸對身長八尺儀貌都雅權恱曰吾乆不見公禮又曰吕範字子衡汝南人有姿貌邑人劉氐家冨女羙範求之母嫌欲勿與範親劉氏曰觀吕子衡寜當乆貧者耶遂與之婚又曰孫桓儀容端正聦明博學能論議應對孫權常稱爲宗室顔淵又曰張純少厲操行學博才秀切問捷對容止可觀拜郎中晉書曰裴揩字叔則爲吏部侍郎風神髙邁容儀俊爽博渉羣書特精義理時人謂之玉人又曰尚書閔鴻見陸雲竒之此兒若非龍駒則是鳯雛又曰潘岳字安仁滎陽中牟人才名冠丗出爲河陽令有異政累遷給事中羙姿儀少時常挾彈出洛陽羣嫗相遇者悉連手縈遶以果擲之盈車而歸又曰王恭字伯季累遷爲青兖二州刺史羙姿儀人或多目之云濯濯若春日栁恭甞𬒳鶴􅌁裘渉雪而行孟昶窺見之歎曰神仙中人又曰衛玠字叔寳河東安邑人也齠齓年乗白羊車入市見者咸曰誰家璧人遂號爲璧人王武子玠之舅也甞與同遊語人曰昨日與吾外甥並坐若珠玉在側朗然映人覺我形穢及長好言玄理武子每聞玠言歎息絶倒故時人語曰衛玠談道武子絶倒玠妻父樂廣有重名議者以爲婦公冰清女壻玉潤爲太子洗馬以國亂至江夏玠亡其妻征南將軍山簡以女妻之至豫章大將軍王敦謂長史謝鯤曰昔王輔嗣吐金聲於中朝此子復玉振於江表後求徃建鄴敦遣之京師人聞其姿容觀者如堵不見者輙嘆之又曰王衍字夷甫有羙貌㓜清辯仕至太尉甞執玉柄塵尾與手無別人爲之義口中雌黄爲丗間之一龍義理有所不安者即隨改之妻郭氐賈后之親籍宫中勢聚歛無猒夷甫患之口不言錢妻試之令婢以錢遶牀夷甫曰好舉阿堵物又曰石苞字仲容渤海南皮人也雅曠有智容儀偉麗不脩小節故時人爲之語曰石仲容姣無雙又曰嵇康長七尺八寸羙音氣好容色土木形骸不自藻飾人以爲龍章鳯姿天質自然又曰王戎字濬冲㓜頴悟神彩秀徹視日不眩裴楷目之曰戎眼爛爛如巖下電又曰王蒙字仲祖羙姿容甞覽鏡自照稱其父字曰王文開生如此兒耶甞帽破入市買之羣嫗悅之爭遺其帽又曰謝尚論中朝人物劉琰云杜又膚清衛叔寳神清爲有識所重如此又曰韓壽武帝時爲掾有姿容太尉賈充有室女見壽羙心悅之充有異香女竊與夀帶之充怪以問婢婢以告充乃以女妻之又曰王戎謂王衍神姿髙徹如瑶林瓊樹自是風塵外物又曰文帝器重魏舒毎朝㑹坐罷目送曰魏舒堂堂人之領䄂也又曰桓温字元子宣城太守彛之子也生未朞而大原温嶠見之曰此兒有竒骨可試使啼及聞聲曰眞英物也年長豪爽有氣槩姿貌甚偉又曰王衍神情明秀王澄曰兄形似道而神鋒大儁晉中興書曰王矩字令式羙容貌毎出行觀者盈路宋書曰謝莊字希逸羙容儀善談論屬文好玄理爲文帝所賞帝一見之輙歎曰藍田出羙玉豈虚也哉又曰盖道風姿貌端雅容止可觀中書郎范述見而竒之曰此荆楚仙人也又曰謝晦羙風姿善言笑眉目分明鬢髮如墨渉獵文義朗贍多通時人以方楊德祖微將不及晦聞猶以爲恨齊春秋曰丗祖甞於華林園宴集使羣臣各出所能王儉曰臣少爲書生請誦封禪書跪前誦之容止可觀音吐藴藉上大恱曰樂哉梁書曰陶洪景字通明特愛松風毎聞其響欣然爲樂有時獨遊泉石望見者以爲仙人又曰王茂字休逺太原祁人也身長八尺羙容觀武帝布衣時見之歎曰王茂年少堂堂如此必爲公輔之器崔鴻十六國春秋前凉録曰辛綝弟理羙姿貌張駿欲奪其妻以寡妹妻之理割鼻自誓駿大怒徙理燉煌遂以憂死又曰前趙録曰遊子逺㓜姿貌聦亮好學年十五至洛陽張華見而竒之曰此兒雅㓗洪方精公才也又曰後趙録曰張謐羙姿貌㓜有逸氣太守陸雲見而異之謂傳喜曰吾聞兾州多名童故不虚也又曰劉光弱冠羙姿儀自稱佛太子從大秦來當至小秦國昜姓名爲季子轉相扇惑聚千人於南山僣稱號鎭西石廣擊斬之于鄠頸無血十餘日面猶如生北齊書曰崔陵子瞻字彦通聦明有文情善容止神彩凝然楊愔曰昔裴瓉在晉也爲中書郎情髙邁每於禁門出入宿衛者肅然動容崔生堂堂之貌亦當無愧裴子又曰王昕字元景北海劇人也生九子並風流藴藉丗號王氏九龍又曰劉禕五子並有志行爲丗所稱璿字祖玉聦敏機悟羙姿儀爲其舅北海王昕所愛顧座曰可謂珠玉在傍覺我質穢又曰李繪字恭文儀貌端偉河間邢晏即繪第五舅也與繪清言歎其髙逺每稱曰若披雲霧如對珠玉又曰北平陽貞字仁堅丗祖第五子沉審寛恕太祖稱之曰此兒得我鳯毛又曰陸郎字雲駒洛陽人也昆弟六人並魏藍田公主元氏所生故邢邵甞謂人云藍田生羙玉豈虚也十二國史曰鄒忌爲齊相身長八尺餘體肥麗朝服衣冠窺照自視謂其妻曰我與城北徐公孰美妻曰君美徐公齊之美者也忌不信復問妾妾曰君美旦日客從外來忌復問之客亦曰徐公不如君及徐公來忌孰視之自以爲不如因思之曰吾妻之羙我私我也妾之美我畏我也客之羙我有求於我也於是入朝見威王曰臣誠不如徐公而臣妻妾及客皆言臣美或私畏於臣或有求於臣今齊地千里宫女左右莫不私王朝廷之臣莫不畏王四境之内莫不有求於王由此觀之王蔽甚矣王曰善乃下羣臣吏民能面刺寡人過者受上賞又曰羙男破老羙女破居北史後魏書曰咸陽王禧弟樹字秀和一字君立羙姿貌有將略位宗正卿後奔梁梁武尤器之封爲魏郡王陳書曰韓子髙㑹稽山隂人本家微賤年十六猶揔角才敏過人容貌羙麗狀似婦人又曰謝哲字頴豫陳郡陽夏人也羙風儀舉止藴藉襟情朗然爲士君子所重又曰蕭允字叔然蘭陵人也風神凝逺通逹有識鑒容止藴藉動合規矩又曰王瑒字子璵司空冲之第十三子沉靜有器局羙風儀舉止藴藉又曰冝郡王叔明字照髙宗第六子也儀容羙麗舉止柔弱狀似婦人隋書曰燕王倓字仁安敏慧羙姿儀煬帝於諸孫中特所鍾愛常置左右好讀書重儒素有若成人良娣早終毎至忌日未甞不流涕嗚咽帝由是益竒之又曰元善洛陽人也以風流藴藉俯仰可觀音韻清朗聽者忘倦由是爲後進所歸語林曰何平叔羙姿儀而絶白魏文帝疑其著粉夏月與熱湯餅旣啖大汗出隨以朱衣自拭色轉皎然又曰王右軍目杜弘冶曰面如凝脂眼如點􅃮此神仙中人也異苑曰􅋣陽陳忠女名豐隣人葛勃有羙姿豐與村中數女共聚絡絲戯相謂曰若得壻如葛勃無所恨也太平御覽卷第三百七十九
