front:
  text: 太平御覽卷第八百八十一
  hash: sha256:5f3446f6349fa1d15546aead4b82676aa7751495f72dbcf4e37868c193455e10
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_881-1a}
body:
  text: 神鬼部一神上易曰隂陽不測之謂神神者變化之極妙萬物而爲言不可以形詰者也又曰知變化之道者其知神之所爲乎夫變北之道不爲而自然故知變化者則知神之所爲唯神也故不疾而速不行而至毛詩嵩髙曰維嶽降神生甫及申禮記孔子間居曰清明在躬氣志如神又中庸曰鬼神之爲德也其盛矣乎視之而弗見聽之而弗聞體物而不可遺體猶生也可猶所也不有所遺言萬物無不以鬼神之氣生也使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右詩曰神之格思不可度思矧可射思格來也矧况也射厭也言神之來其形象不可億度况可厭倦乎又祭法曰山林川谷丘陵能出雲爲風雨見怪物皆曰神又祭義宰我曰吾聞鬼神之名不知其所謂子曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也衆生必死死必歸土此之謂鬼骨肉斃于下隂爲野土其氣發揚于上爲昭明焄蒿悽愴此百物之精也神之著也因物之精制爲之極明命鬼神以爲黔首則百衆以畏萬民以服又樂記曰明則有禮樂幽則有鬼神聖人之精氣謂之神賢智之精氣謂之鬼左傳曰莊公有神降于莘有神聲以接人莘號地惠王問諸内史過曰是何故也對曰國之將興明神降之監其德也將亡神又降之觀其悪也故有得神以興亦有以亡虞夏啇周皆有之王曰若之何對曰以其物享焉其至之日亦其物也三從之内史過徃聞􅉑請命反曰􅉑必亡矣虐於民而聽於神神居莘􅉑公使祝應宗區史嚚享焉神賜之土田史嚚曰􅉑其亡乎吾聞之國將興聽於民將亡聽於神神聦明正直而壹者也依人而行􅉑多凉德其何土之能得凉薄也爲僖二年晉滅下陽傳又宣上曰昔夏之方有德也逺方圗物圖畫山川竒異之物獻之貢金九牧鑄鼎象物象所圗物著之於鼎百物爲之備使民知神姦圗鬼神百物之形使民逆備之故民入川澤山林不逢不若若順也螭魅罔兩螭山神獸形魅怪物罔兩水神莫能逢之又昭元曰晉侯有疾鄭伯使公孫僑如晉聘且問疾叔向問焉曰寡君之疾病卜人曰實沈臺駘爲崇敢問此何神也子産曰昔髙辛氏有二子長曰閼伯季曰實沈居于曠林不相能也日尋干戈以相征討后帝不臧遷閼伯于啇丘主辰遷實沈于大身主參由是觀之則實沈參神也昔金天氏有裔子曰昧爲玄冥師生允格臺駘臺駘能業其官宣汾洮障大澤以處大原帝用嘉之封諸汾川由是觀之則臺駘汾神也又昭三曰石言于晉魏榆魏榆晉也晉侯問於師曠曰石何故言對曰石不能言神或馮焉謂有精神馮依石而言不然民聽濫也抑臣又聞之曰作事不時怨讟動於民則有非言之物而言今宫室崇侈民力凋盡怨讟並作莫保者性石言不亦冝乎論語曰子不語怪力亂神神謂鬼神之事又曰子路問事鬼神子曰未能事人焉能事鬼鬼神難明語之無益故不荅家語曰不食者不死而神國語曰􅉑公夢在廟有神人靣白色虎瓜執鉞立於西阿之下公懼而走神曰無走帝命曰使晉襲于爾門公拜稽首覺召史嚚占之對曰如君之言則蓐収也天之刑神也天事官成公使囚之且使國人賀夢舟之僑告其族曰衆謂􅉑不乆吾乃今知之又曰有神降於莘王問内史過曰是何故對曰昔夏之興祝融降於崇山其亡也回禄信於聆隧啇之興也檮杌次於丕山其亡也夷羊在牧周之興也鷟鳴於歧山其衰也杜伯射王於鄗宣王殺杜伯不辜後宣王田于囿中杜伯起於道左衣朱冠操朱弓矢射宣王中心拆脊而死今則丹朱之神也􅉑其亡也賈逵注曰祝融回禄火之神也檮也丹朱堯子又曰長勺之役曹劌問所以戰於莊公公曰余不愛衣食於民不愛牲玉於神對曰夫惠本而後民歸之志民和而後神降之福今將惠以小賜祀以獨恭小賜不咸民弗歸也獨恭不優神弗福也又曰夏之衰也褒人之神降化爲二龍以同于王庭而言曰余襃之二君也夏后卜殺之與去之與止之莫吉卜請其漦而藏之吉乃布幣焉而䇿告之龍亡其漦在櫝而藏之又曰古者民神不雜謂司民司神之官各異民之精爽不携貳者而又能齊肅衷正其智能上下比義其聖能光逺宣㓪其明能光照之其聦能聽徹之如是則明神降之在男曰覡在女曰巫河圖曰東方蒼帝神名靈威仰精爲青龍南方赤帝神名赤熛怒精爲朱鳥中央黄帝神名含樞紐其精爲麟西方白帝神名白招矩精爲白虎北方黒帝神名叶光紀精爲玄武龍魚河圖曰天歳星主德慶其精下爲大社之神天太白星主兵凶其精下爲雨師之神天熒惑星主司非其精下爲風伯之神天辰星之氣司災其精下爲先農之神天鎮星主得士之慶其精下爲靈星之神又曰東方太山君神姓圎名常龍南方衡山君神姓丹名靈峙西方華山君神姓浩名鬱狩北方恒山君神姓登名僧中央嵩山君神姓壽名逸群呼之令人不病東方太山將軍姓唐名臣南方霍山將軍姓朱名丹西岳華隂將軍姓鄒名尚北岳恒山將軍姓莫名惠中岳嵩髙山將軍姓石名玄恒存之却百邪東海君姓馮名脩青夫人姓朱名隱娥南海君姓視名赤夫人姓翳名逸寥西海君姓勾大名丘百夫人姓靈名素簡北海君姓是名禹帳里夫人姓結名連翹河伯公名子夫人姓馮名夷君有四海河神名並可請之呼之却鬼氣又曰髪神名壽長耳神名嬌女目神名珠殃鼻神名勇盧齒神名丹朱夜卧三呼之有患亦便呼之九過悪鬼自却史記曰趙襄子爲智伯所敗走弃晉陽原過從後至於王澤見三神人自帶以上可見自帶以下不可見與原過竹二節莫通曰爲我以是遺趙無䘏原過旣至以告襄子襄子齊三日親自剖竹有朱書曰趙無䘏余霍太山之陽侯天使也三月丙戊余將使汝反滅智氏汝亦立我百邑余將賜汝林胡之地襄子再拜受如三神之令果以丙戍滅智氏又曰始皇夢與海神戰如人狀問占夢博士曰水神不可見以大魚鮫龍爲候今上禱祠謹而有此惡神當除去而善神可致又曰始皇西南渡淮水之衡山南郡浮江至湘山神逢大風幾不得渡上問博士曰湘君何神博士對曰聞堯女舜之妻也而葬此於是始皇大怒使刑徒三千人伐湘山樹赭其山上漢書曰髙祖夜徑澤中有大虵當逕乃前抜劒斬虵後人來至虵所見一老嫗夜哭人問何哭嫗曰人殺吾子人曰嫗子何爲見殺曰吾子白帝子也化爲虵當道今赤帝子斬之因忽不見又曰張良甞遊下邳圯上有老父至良所直墮其履道下謂良曰孺子下取履良因取之父笑而去良殊大驚父去里餘復還曰孺子可教矣後五日平明與我㑹良怪之跪曰諾五日平明往父巳先在怒曰與老人期後何也後五日復㑹早來良半夜徃有頃父亦來喜曰當如是出一編書曰讀此當爲王者師矣後十三年孺子見我濟北榖城又曰游水發根言上郡有巫病鬼而下之上召置之甘泉及病使人問神君神君言曰天子無憂病病少瘉強與我㑹甘泉於是上病瘉遂起幸甘泉病良巳大赦置壽宫神君神君最貴者曰太一其佐曰大禁司命之屬皆從之非可得見聞其言言與人音等時去時來則風肅然居室帷中時晝言然常以夜天子祓然後入因巫爲主人關飲食所欲言行下又置壽官北官張羽旗設共具以禮神君所言上使受書其名曰盡法其所言丗俗之所知也無絶殊者而天子心獨喜其事祕丗莫知也又曰公孫卿言見神人東萊山若云欲見天子天子於是幸緱氏城拜卿爲中大夫遂至東萊東萊宿留之數日無所見見大人迹云又曰祠神人於交門宫若有郷坐拜者師古曰如有神景象嚮祠坐而拜也或言益州有金馬碧雞之神可醮祭而致於是遣諌大夫王襃使持節而求之又曰谷永說成帝曰昔周史萇弘欲以鬼神之術輔導靈王㑹朝諸侯而周愈微諸侯叛楚懷王隆祭祀事鬼神欲以獲福助却秦師而兵挫地削身辱國危秦始皇并天下甘心於神仙之道遣徐福韓終之屬多賫童男童女入海求神采藥因逃不還天下怨恨漢書曰文帝思賈誼徴之至入見上方受釐坐宣室上因感鬼神事而問鬼神之夲誼具道所以然之故至夜半文帝前席後漢書曰光武渡呼沲河至下博城西遑惑不知所之有白衣老父在道傍指曰努力信都郡爲長安守光武即馳赴之又曰何敞祖父比干字少卿經明行修爲汝隂縣獄吏决曹掾平活數千人淮汝號曰何公征和三年三月天大隂而比干在家日中夢見貴客車騎滿門覺以語妻語未竟而門有老嫗八十餘頭白求寄避雨雨甚而衣履不霑漬雨止遂謂比干曰公有隂德今天錫君䇿以廣公之子孫因出懷中符䇿狀如簡長九寸凡九百九十枚以授比干曰子孫佩印綬者如此筭比干年五十八有六男又生三子本始元年自汝隂徙平陵代爲名族又曰宣帝時隂子方者至孝有仁恩嘗臘日晨炊見竈神形見雜五行書曰竈神長衣黄衣夜𬒳髪從竈中出知其名呼之而可除凶悪子方再拜受慶家有黄羊因以祀之自是巳後暴至巨冨田有七百餘頃輿馬㒒隷比於邦君子方常言我子孫必將強大至孫識三丗而遂繁昌故後常以臘日祀竈而薦黄羊焉又曰班超至于寘王廣德禮意甚踈且其俗信巫巫言神怒何漢使有騧馬急求取以祠我廣乃遣使就超請馬超宻知其狀報許之而令巫自來取馬有頃巫至超斬其首以送廣德吴志曰臨海羅陽縣有神自稱王表語言飲食與人無異然不見其形又一婢名績紡遣中書郎李崇賫輔國將軍羅陽王印綬迎表表隨崇俱出所歴山川輙遣婢與其神相聞表至權於倉龍門外爲立第舎表說水旱小事徃徃有驗何法盛晉中興書曰王猛北海人少貧賤嘗至洛陽貨畚有一人於市買其畚而云無直家近在此可隨我取利猛隨去行不覺逺而忽至深山中此人語猛且住樹下當先啓道君來湏臾猛進見一公踞床頭鬚悉白侍從十許人有一人引猛云大司馬公可進猛因拜老公公曰王公何縁拜即十倍償畚直遣人送猛出旣頋視乃嵩山也晉書曰符堅入冦㑹稽王道子以威儀鼓吹求於鍾山之神奉以相國之號及堅至壽春望八公山草木皆類人形若有力焉後魏書曰𥘉聖武皇帝嘗率數萬騎田於山澤歘見輜軿自天而下旣至見羙人侍衞甚盛帝異而問之對曰我天帝女受命相偶遂同寢宿且請還曰明年周時復㑹此言終而別去如風雨及周歳前所由處果復相見天女以所生男授帝曰此君之子也善養視之子孫相承當丗爲帝語訖而去子即丗祖也又曰段暉師事歐陽湯湯甚噐愛之有童子與暉同志後二年童子辤歸從暉請馬暉戲作木馬與之童子甚悅謝暉曰吾太山府君子奉勑遊學今將欲歸煩子厚贈無以報德子後位至常伯封侯非報也且以爲好言終乗木馬騰空而去暉乃自知必將貴也太平御覽卷第八百八十一
