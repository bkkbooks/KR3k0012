front:
  text: 太平御覽卷第一百八十八
  hash: sha256:aae1505227de6175d665aaa0575c40f4a2c60032daef2d61fe9ef28b4b8ec910
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_188-1a}
body:
  text: 居處部十六䆫檻椽檐梲楶枅鋪首藻井鴟尾質礎奥屋漏宧突塼瓦䆫說文曰䆫穿壁以木爲交䆫所以見日也向北出牖也在牆曰牖在屋曰䆫又曰櫺楯間子也櫳房室之䟽也釋名曰䆫聰也於内視外爲之聦明大戴禮曰隨武子牖之銘曰隨天之時以地則之敬祀皇天敬以先時禮記郊特牲曰薄社北牖使隂明也又儒行曰蓽門閨竇蓬户瓮牖論語曰伯牛有疾子問之自牖執其手曰亡之命矣夫五經典義曰虞主埋之廟北牖下北方無事虞主亦無事也東觀漢記曰明徳馬后不喜出入游觀希甞臨御䆫牗老子曰鑿户牖以爲室又曰不窺牖見天道漢官封禪儀曰㤗山有天䆫三輔黄圖曰明堂有七十二牖孝經注曰明堂之制八䆫四闥東宫舊事曰閣内有曲鄣鄣上雀目䆫又曰宫有四面䆫八所綾綺連錢及青匡郭飛板郭子曰滿奮畏風在武帝坐北䆫作琉璃扉實宻似踈奮有難色帝問之對曰臣若吴牛見月而喘西京雜記曰昭陽殿䆫户扉多是緑琉璃皆通照毛髪不得藏焉漢武故事曰西王母降東方朔於朱雀牖中窺母母謂帝曰此兒無頼乆𬒳斥逐原心無惡㝷當得還又曰帝起超神屋有雲母䆫珊瑚䆫賢聖冡墓記曰東平思王奢靡及死生葬所幸奴婢着銅䆫内令守冡五行數曰太公金匱牖之書曰闚望端審且念所得可思所忘李尤牖銘曰天設䆫牖開光照隂施于明堂以象八風陸機詩曰安寢北堂上明月入我牖照之有餘輝覽之不盈手靈光殿賦曰玉女窺䆫而下視文選詩曰䆫中列逺岫蜀都賦曰列綺䆫以瞰江古詩曰盈盈樓上女皎皎當䆫牖又曰文踈結綺䆫何閣三重階檻漢書曰朱雲忠諌攀檻檻折及治上曰勿易因而輯之以旌直臣文選曰伏櫺檻而俯聽聞雷霆之相激魯靈光殿賦曰軒檻蔓延楚詞曰坐堂伏檻臨曲池又曰照檻兮抶桑椽說文曰椽榱也桷世橑榱也秦謂之榱周謂之椽魯謂之桷通俗文曰屋加椽曰橑來早切漢書解詁曰桷椽也諸侯丹桷以丹色也詩曰松桷有挻榖梁曰刻桓宫桷禮天子之桷斵之磨礱之加宻石焉諸侯之桷斵之礱之大夫斵之士斲夲刻桷非正也左傳曰宋人伐鄭以太宫之椽爲盧門之椽續漢書曰蔡邕避難在呉告人曰吾昔經會稽髙遷亭見屋掾竹從東間數第十六可以爲籥取用果有異聲張璿漢記曰梁兾起臺殿梁柱椽桷鏤爲青龍白虎畫以丹青雲氣戰國䇿曰或謂孟甞君曰廊廟之椽非一木之枝先王之法非一士之智漢武故事曰上起神屋以金椽爲刻玳瑁爲龍虎禽獸以簿其上狀若隠起椽首皆作龍形龍首銜鈴流蘇懸之西京雜記曰照陽殿椽桷皆刻作蛇龍縈繞其間鱗甲分明見者莫不驚慄韓子曰堯舜采椽不刮茅茨不剪檐說文曰檐㮰也又曰楣秦名屋聮櫋也齊謂之檐楚謂之梠釋名曰檐椄也椄屋前後也梠旅也連旅之或謂之櫋櫋緜也連緜榱頭使平也上入曰雀頭形似爵也禮記明堂位曰複廟重檐天子之廟飾也榖梁傳文公曰壞廟之道易檐可也爾雅曰檐謂之􅎥郭璞曰屋梠也梲爾雅曰梁上楹謂之梲漢官解詰曰梲梁上柱也諸侯藻梲爲藻文也華延儁洛陽記曰堂皇宮殿皆石玉璫龍桷藻梲禮記禮器曰管仲鏤簋朱紘山節藻梲君子以爲濫矣楶爾雅曰栭謂之楶郭璞曰注即櫨也三輔故事曰王莽起九廟爲銅鑮櫨楊子法言曰吾未見斧藻其徳若斧藻其楶者也枅爾雅曰笄謂之疾郭璞注曰柱上薄也亦名枅犍爲舎人曰朱儒下小方木廣雅曰薄謂之枅曲枅肩謂之欒說文曰枅屋强也王延壽靈光殿賦曰曲枅夭矯而環勾韋仲將景福殿賦曰於是周覽升降流目詳觀叢楹負極飛櫨承欒枅梧綺錯梲楶鮮攅鋪首通俗文曰門扇飾謂之鋪首說文曰門扇環謂之鋪首風俗通曰門户鋪首百家書云輸般見水上蠡謂之曰開汝頭見汝形蠡適出頭般以足畫圖之蠡引閉其户終不可開設之門户欲使閇藏當如此固宻也楊雄甘泉賦曰排玉户而楊金鋪兮發蘭蕙與穹窮李尤平樂觀賦曰過洞房之輔闥歴金環之華鋪藻井風俗通曰殿堂象東井形刻作荷蓤水物所以厭火也西都賦曰蔕倒茄於藻井披紅葩之狎獵魏都賦曰綺井列䟽以懸蔕注䟽布也以板爲井形飾以丹青如綺也王延夀魯靈光殿賦曰圎折方井反植荷蕖縁房紫的咄咤垂珠左思魏都賦曰綺井列䟽以懸蔕華蓮重葩以到披曹植七啓曰綺井含葩金壁玉箱顔延之七繹曰木冩雲氣土祕椒芳旣挻天而到井又斵圎而鏤方鴟尾晉中興書曰泰元十年鸛巢太極殿東鴟尾晉安帝紀曰義熈六月雷震太廟鴟尾徹壁柱若有文字宋武大明元年五月戊午嘉禾一株五莖生清暑殿鴟吻中陳書曰髙祖二年戊辰重雲殿東鴟吻有紫煙出屬天唐㑹要曰漢栢梁殿災後越巫言海中有魚虬尾似鴟激浪即降雨遂作其象於屋以厭火祥時人或謂鴟吻非也質礎尚書大傳曰大夫有石材庶人有石承注曰石材柱下質也石承當柱下而已不外岀爲飾說文曰礩柱下石也古以木今以石廣志曰舄石有五色者光澤以爲柱礩岀苑蓬山戰國䇿曰智伯攻趙襄子襄子之晉陽謂張孟談曰吾城郭完倉廪實銅少奈何孟談曰臣聞董安于之治晉陽公之堂皆以黄銅爲柱礩請發而用之則有餘銅矣古史考曰秦始皇使刑徒七萬人作驪山以北山石爲舄異物志曰大秦國以水精爲舄淮南子曰山雲蒸柱礎潤張衡西京賦曰彫楹玉舄阿平叔景福殿賦曰金楹齊列玉舄承跌奥論語八佾曰與其媚於奥寜媚於竈爾雅曰西南隅謂之隩郭璞注曰室中隱隩處通俗文曰奥内曰扆韓子曰衛將軍文子見曽子曽子不起而延之於坐席正身見於奥文子謂其御曰曽子愚人哉以我爲君子也君子安可不敬以我爲愚人愚人安可侮也吕氏春秋曰苑春諌衛公云君因隅隩有竈不知寒矣屋漏毛詩蕩抑曰相在爾室尚不愧于屋漏爾雅曰東北隅謂之屋漏郭璞注曰屋漏義未詳也犍爲舎人曰古者徹屋西北隈以炊浴没者訖而復之古謂之屋漏也宧爾雅曰東北隅謂之宧郭璞注曰義未詳犍爲舎人曰東北陽氣始起萬物所養故謂之宧說文曰宧養也室東北隅食所居也爾雅曰東南隅謂之郭璞注曰折闇也犍爲舎人日東北萬物生蟄虫必出無不由户釋名曰幽也亦取冝也塼詩曰乃生女子載弄之瓦瓦紡塼也又曰中堂有甓注一名瓴甋晉書曰陶侃字士行在廣州無事輙朝運百甓於外暮運於内人問其故荅曰吾方致力中原過爾優逸恐不堪事宋書范曄母如厠而産額爲塼所傷故以塼爲小字瓦說文曰瓦土器巳燒之惣名也禮記曰有虞氏瓦棺又曰毁方而瓦合史記曰秦軍武安西鼔譟勒兵武安屋瓦盡震漢書曰霍光巷行人見有人在屋上撤瓦投地就視不見而霍氏誅又曰平帝元始四年東風吹長安城東門屋瓦盡落魏志曰魏文帝謂周宣曰朕夢殿上雙瓦落地化爲鴛鴦何也宣曰後宫當有暴死者須臾後宫相害死者呉録曰景帝時戎將於廣陵掘諸冢取版塼以城所壞甚多晉書曰張孟陽皃醜甞從潘岳遊洛陽市岳羙皃羣女爭以果擲岳滿車廂孟陽𬒳投之瓦石愽物志曰桀作瓦古史曰昆吾氏作瓦老子曰挻埴以爲器夢書云夢見瓦爲甲鎧禦禍患春秋潜巴潭曰宫瓦自墜至死不祥漢武故事云上起神屋以銅爲瓦莊子曰雖有忮心不怨飄瓦又曰以瓦注者巧注射賭物也所賭輕則意巧又曰陶者曰我善冶埴大秦記曰大秦以水精爲瓦枹朴子曰班狄不能削瓦石爲芒鍼燕子丹曰荆軻之東宫臨池拾瓦投鼃太子進金瓦太平御覽卷第一百八十八
