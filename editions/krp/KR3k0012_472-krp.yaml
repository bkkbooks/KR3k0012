front:
  text: 太平御覽卷第四百七十二
  hash: sha256:058df8d9f6614762eace4bb280575a89d9abd676f2838c38d19de6e39de3c716
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_472-1a}
body:
  text: 人事部一百一十三冨下家語曰魯哀公問政於孔子孔子對曰政之急莫大乎使人冨且壽也公曰爲之柰何孔子曰省力役薄賦斂則民冨矣公曰寡人欲行夫子之言恐吾國貧矣孔子曰詩云愷悌君子民之父母未有子冨而父母貧者又曰南宫敬叔冨得罪於定公而奔衛朞年衛侯請復之載其寳以朝夫子聞之曰冨而不好禮殃也敬叔以之䘮矣而又弗改吾懼其將有患也敬叔聞之驟如孔氏而後備禮散焉又曰以冨貴而下人向人不與以冨貴而敬人何人不親國語曰鬪且曰鬪且楚大夫昔鬪子文三舎令尹無一日之積䘏民故也成王毎出子文之禄必逃王止而復人謂子文曰人生求冨而子逃之何也對曰夫從政者以庇民也民多曠曠寡而我取冨是不勤民以自封也封厚死無日矣我逃死非逃冨也太公六韜曰文王問守土柰何對曰人君必從事於冨弗冨不足爲人弗與無以合親䟽其親則困失其衆則敗也太史公素王妙論曰諸稱冨者非貴其身得志也乃貴恩覆子孫而澤及郷里也又曰黄帝設五法布之天下用之無窮盖丗有能知者莫不尊榮如范子可謂暁之矣子貢吕不韋之徒頗預焉自是以後無其人曠絶一百有餘年管子設輕重九府行伊尹之術則桓公以覇九合諸侯一匡天下范蠡爲越相三江五湖之間民冨國強卒以擒呉功成而弗居變名易姓之陶自謂朱公行十術之計二十一年之間三致千萬再散與貧桓寛塩鐵論曰古者盂樽杯飲蓋無爵無觴今冨者銀劒黄耳罍樽玉鋪又曰人太冨則不可以禄使也又曰古者庻賤騎繩校草鞮皮薦而巳今冨者黄金銀鑣罽繡掩汗又曰燕之涿葪趙之邯鄲魏之温軹韓之滎陽齊之臨淄楚之宛陳鄭之陽翟冨冠海内皆爲天下名都也魏文帝典論曰雒陽郭珍居財巨億毎暑夏召客侍婢數十盛裝飾披羅縠使之進酒劉義慶記曰王武子移第北芒下于時人多地貴濟好馬射買地作垀編錢布地竟埒時人號曰金埒又幽明録曰餘杭人沈縱家素貧與父同入山得一玉豚從此所向如意田蠶並収家冨又曰海陵人黄㝷先居家單貧常因大風雨散錢飛至其家錢來觸籬援誤落在餘處皆拾而得之㝷巨冨錢至數千萬異苑曰晉陵曲阿湯貺財數千萬三呉人多取其直爲啇賈治生輙得倍直或行長江卒暴風及刼盗者若投錢多獲免濟貺死後先所埋金皆移去隣人嘗晨起見門外忽有百許萬錢封題是湯貺姓字然後知財物聚散必由天運也又曰張永家地有泉出小龍在焉從此遂爲冨室踰年因雨騰躍而去於是生貲日不暇給俗說云與龍共居不知龍神効矣說苑曰楚王問莊辛曰君子之冨柰何對曰君子之冨假貸人不買也飲食人不便不役也親戚愛之罪人善之不尚者事之皆欲其壽樂不傷於患此君子之冨也論衡曰楊子雲作法言蜀冨賈人齎錢十萬願載書子雲不能曰夫冨無仁義猶圏中之羊安得妄載三輔决録曰平陵士孫奮字景卿少爲郡五官掾起宅得錢貲至一億七千萬冨聞京師而性儉恡客舎雇錢甚少主人曰君士大夫惜錢如此欲作孫景卿耶不知實是景卿從子端梁兾掾奮送絹五疋食以干魚兾問奮何以相送端以實對兾素聞奮冨且恡乃以一鏤安革遺奮從貸錢五千萬奮知兾貪暴畏之以三千萬與兾大怒乃告郡許認奮母爲守官藏婢云盗白珠十斛紫金千萬收考奮兄弟死獄中財貲盡没越絶書曰冨中大塘者勾踐治以爲義肥饒謂之冨中王子年拾遺記曰郭况累金數億庭中起髙閣厝衡石於其上以稱量珠玉也謂爲瓊厨金窟張淵廣州記曰豪冨子女以金銀爲大釵執以叩銅鼓與主人名爲銅鼓釵西京雜記曰茂陵冨人袁廣漢藏鏹萬億八九百人於芒山下築園東西四里南北五里百歩激流注其内構石爲山髙十餘丈連延數里養白鸚鵡紫鴛鴦旄牛青兕竒禽恠獸委積其間也劉道真錢塘記曰防海塘去邑一里郡議曹華信家冨立此塘以防海水始開募有能致土一石即與錢一升旬日之間來者雲集塘未成而譎不復取皆弃置而去塘以之成於是改爲錢塘羅浮山記曰牛潭深洞無極北岸有石周貟三丈討魚人見金牛自水而出磐于此石義興周靈甫嘗見此牛寝伏石上旁有金鏁如索繩焉周甫素銳勇徃掩此牛掣断其鏁得二丈許遂以財雄于寳搜神記曰魏郡張巨本冨忽衰死散賣宅與程應舉家疾病賣與何文文先獨持大刀暮入北堂梁上至一更見人丈餘髙冠赤幘呼曰細腰細腰應喏何以有人氣荅無便去文往向呼處因問向赤衣冠誰荅是金也在屋西壁下問君誰荅云我杵也今在竈下文掘得金三百斤燒去杵由此大富宅清寕又曰元康中屢縣瑶懷家忽聞池中有犬聲視之得犬子雌雄各一長老云此名犀大得之者冨又曰有周擥嘖者貧而好道夫婦夜耕困卧夢天公過而哀之勑外有以給與司禄案云此人相貧限不過此唯有張車子應賜錢千萬車子未生請以借之公曰善曙覺言之於是夫妻戮力晝夜以治生所爲輙得貲至千萬先時有嫗者常往擥嘖傭賃墅舎有身月滿孕使遣岀駐車屋下産得皃主人往視哀其孤寒作麋粥以食之問當名汝兒作何嫗曰在車下生夢天告之名爲車子擥嘖乃悟曰吾昔夢從天換錢外白以張車子錢貸我必是子也財當歸之矣自是居日衰减車子長冨於周家又曰京兆長安有張氏者獨處室有鳩自外入于室止于對床張氏惡之披懷而祝曰爲我禍耶飛上承塵爲我福耶來入我懷鳩飜入懷以手探之則不知鳩之所在而得一金帶鈎焉遂寳之自是後子孫昌盛貲財萬倍故關西稱張氏鈎又曰河間管弼僑居臨水北岸田作啇賈往往如意嘗載兩舫米下都糶垂行忽於宅中見一物形似鼉而長大行還輙大得利如此一家遂巨冨二十年恒有萬斛米續搜神記曰廬陵巴丘人夕晃者丗以田作爲業年市田數十頃家漸冨晉太元𥘉秋収巳過穫刈都畢明旦至田禾悉復滿鬱然如先即便更穫於是遂巨冨列女傳曰陶荅子妻者陶大夫荅子之妻也子治陶三年名譽不興家冨三倍其妻數荅子怒曰非汝所知居五年從車百乗歸休宗人牽牛酒而賀之其妻抱兒而泣姑怒其不祥也婦曰夫子能薄而官大是謂縈害無功而家昌是謂積殃昔楚令尹之治國家貧而國冨君敬之民戴之故福禄結於子孫名垂於後丗今夫子貪冨務大不頋後害妾聞南山有玄豹霧雨七日不下食何也飽其志飢其腹將欲以澤其毛衣而成其文章也故藏而逺害豕不擇食以肥身坐而湏死今夫子治陶家日益冨而國日益貧君不敬人不戴也夫子之逢禍必矣請去頋與少子俱脫於是遂弃之出其年荅子之家果以盗誅母老而免婦乃與少子歸養終始天年録異傳曰昔廬陵邑子甌明者從容賈道經彭澤湖每輙以舡中所有多少投湖中云以爲禮積數年後過見湖中有大道道上多風塵有數吏乗車馬來候云是青洪君使要明知是神然不敢不往甚怖問吏恐不得還吏曰無可怖責洪君以君前後有禮故要君必重送君者皆勿收獨求如願尓去果以繒帛送明辭之乃求如願神大怪明知之意甚惜不得巳呼如願使隨去如願者青洪婢也常使之取物明將如願歸所欲輙得之數年大成冨人意漸驕盈不復愛如願嵗朝鷄一鳴呼如願如願不起明大怒欲捶之如願乃走明逐之於糞上糞上有昨日故歳掃除聚薪如願乃於此得去明不知謂逃在積薪糞中乃以杖棰使出乆無出者乃知不能困曰汝但使我冨不復捶汝今丗人歳朝鷄鳴時轉往捶糞云使人冨也韓詩外傳曰陳之冨人有處師氏者校車百乗觴於韞兵之止風俗通曰河南平隂龐儉本魏郡鄴人遭倉卒之丗失其父時儉三歳弟纔襁抱耳流傳客居廬里中鑿井得錢千餘萬遂温冨儉作府吏躬親家事行求老倉頭謹信屬任者年六十餘直二萬錢使主牛馬耕種有賔婚大會母在堂上酒酣陳樂歌笑奴在竈下助厨竊言堂上母我婦也客罷婢語次說老奴無狀爲妄語所說不可道也窮誌具白母謂婢試問其形狀奴曰家居鄴時在冨樂里宛西婦艾氏女字阿横大兒字阿嶷小兒曰越子時爲縣吏爲人所畧賣阿撗右足下有黒子右胲下赤誌如半櫛母曰是汝公也因下堂相對啼泣兒婦前爲汝公拜即洗浴身見衣𬒳遂爲夫婦如𥘉時人爲之語曰廬里諸龐鑿井得銅買奴得公子孫羞之言我先人𥘉居廬里者兄弟二人家買奴得公尓丗說曰司徒王戎旣貴且冨區宅僮役膏腴水碓之屬洛下莫有比契䟽鞅掌夜與夫人燭下散籌筭計又曰武帝嘗降王武子家武子供饌並不用盤悉用琉璃器婢子百餘人皆綾羅袴褶以手擎飲食蒸肫肥美於常味武帝恡問何由得尔云以人乳飲之武帝色甚不平所下飲食未畢便去又曰王君夫以􅏁䊇澳釡石季倫以蠟炊君夫作絲布步障四十里崇作錦歩障五十里石以椒爲泥泥屏王以赤石脂泥壁新序曰魯孟獻子聘於晉韓宣子觴之飲三徒鍾石之懸不移而具獻子曰冨哉宣子曰子之家孰與我冨獻子曰吾家甚貧我有二士曰顔回慈無靈此二士者使吾邦家安平百姓和恊客出宣子曰彼君子也以畜賢爲冨我鄙人也以鍾石金玉爲富孔子曰孟獻子之冨也可著於春秋也歸藏曰上有髙臺下有雝池以此事君其貴若化若以賈市其冨如河漢列子曰虞氏者梁之冨人也家旣完盛錢金無量財貨無比登髙樓臨大路設樂陳酒擊搏樓上管子曰凢爲國之道必冨人人冨則易理者也七十九代之君法制不一號今不同然而俱有天下何也必國冨而粟衆也又曰天下有義則冨無則貧文子曰帝王冨其民霸王冨其地危國冨其吏治國若不足亂國若有餘存國囷倉實亡國囷倉虛孟子曰陽虎云爲冨不仁爲仁不冨荀卿子曰循禮者王爲政者強節民者安聚歛者亡故王者冨民霸者冨土又曰仁義禮善之於人譬之若貨財米粟之於家也多有之者冨少有者貧至無有者窮韓子曰輿人成輿則願人冨貴也非輿人仁不冨不貴則輿不集也又曰人有福則冨貴至冨貴則衣食美衣食美則驕心生驕心生則行僻邪而動棄理也行僻邪則身夭死動棄理則無成功尸子曰家有千金之玉而不知猶謂之貧也良功治之則冨弇二國身有至貴而不知猶謂之賤也聖人告之則貴最天下孔藂子曰子思曰吾不取於人謂之冨不屈於人謂之貴也又曰猗頓魯之窮士也耕則常飢桑則常寒聞淘朱公冨往問術焉朱公告之子欲速冨當畜五㹀於是乃啇西河大畜牛羊于猗氏之南十年之間其孳息不可計貲擬王公馳名天下以興冨於猗氏故曰猗頓也淮南子曰天下有至冨而非金玉也至壽而非千歳也適情知足則冨矣明死生之分則壽矣又曰冨貴而之不道適足以爲患出車入輦務以自供命之曰蹷身之機肥肉厚酒務以相強命之曰爛腹之食靡曼皓齒鄭衛之音命之曰伐性之斧三患者冨貴之所致又曰隨侯之珠和氏之壁得之而冨失之而貧也劉邵趙都賦曰爰及冨人郭侯之倫貲衍陶衛奓溢無埌金碧其輿朱丹其輪㑹遇燕好其從如雲太平御覽卷第四百七十二
