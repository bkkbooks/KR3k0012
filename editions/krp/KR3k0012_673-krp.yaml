front:
  text: 太平御覽卷第六百七十三
  hash: sha256:b062d5018c08900528b99844f668e292714bd34c9584d4448fc96a860a2da773
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_673-1a}
body:
  text: 道部十五仙經下玉帝七聖玄記曰舊文有十萬玉言自非上聖莫能意通題崑崙之堂北洞之源又曰崑崙之室北洞之眞源廻九乙天霄白簡青籙在其内也夲行經曰九都之上金格玉書並題得道人名展轉刼數又曰紫蘭臺瓊文紫字在其中西極明科曰龜山西室王屋南洞天經備足也又曰玉清洞房三氣金章封於玉京紫户之内又曰玉籙寳章藏紫房九户之内大洞雌一經云有玄琳玉殿五老鎭生上經藏在其中又曰四極明科封於金闕紫臺又曰華耀景眞經祕在九天之上大有之宫金映七寳臺又有三寳玄臺上清隱書祕其中登眞隱訣曰上清仙臺金書在其中太極九玄臺碧簡文在其中玄眞皇龜臺明堂玄眞經在其中又曰崑崙瑶臺西母之宫所謂西瑶上臺天眞祕文在其中金書王字上經曰西玄洞臺有金書洞房經又曰骨命巳定於玄閣緑字巳有生名仙籍故也洞玄經曰有始陽臺在阮樂天中内音書在其上又曰三層玉臺在九天闕之上臺上有太清寳經三百卷及眞人學仙簿籙簡目大帝監眞玉司郎典之又曰瑶臺者髙上帝藏金玄羽章萬神隱音在其内紫書金根經曰凢學者勤尚苦志則玉皇三元東華太上當遣眞人授其眞經後聖衆真莫不先奏金簡於東華投玉札於上清然後得授大洞眞經而或青宫無金簡之籙玉格無玄編之名則神經亦不可得而授也金根經曰開雲鳯之藴紫錦之囊出紫書眞訣玉篇太有經曰帝卿執大洞眞經盛以紫玉凾又曰太一君執素靈洞玄大有妙經盛以黄玉凾又曰大有經金縷玉字以明其篇又曰大有妙經九眞科檢校祕於金藏玉匱大洞雌一篇目曰大洞眞經在九天之上大有宮太玄靈臺又曰華玉堂仙母金丹在其内奔日月二景隱文曰西玄山下洞臺中有鬱儀結隣經也王屋山清虚中亦有此經也而不備惟太上玄宫髙上臺及蓬萊府北室金柱玉壁刻此並備八素經日太上曰諸學眞人而受玄清八素經皆有太帝篇目西華宫有玉簡藻書當爲眞人者乃得此文也又曰西龜之山玄圃之上積石之隂八素眞經在其内龜山元籙曰龜山丹皇飛玄紫文西母常所寳祕其旨隱奥自無仙名不得眄其篇目得者皆九天書籙名題龜山又曰玉華之室丹景玉文在其内飛行羽經曰峨嵋山金臺之室飛玄羽經祕其内又曰太上飛經藏於玉清上宮七映紫臺五寳經曰靈寳紫文祕在九天之上太玄靈臺又曰神州七轉舞天經祕於紫天元臺三元玉檢曰九天三關之門九天龍書三元空洞玉檢飛玄之文刻題其内又曰三玄臺玉檢紫文九天眞書在其内又曰西沙方臺上眞三元之檢在其中也又曰晨燈之臺飛天檢文在其中明照九天之上又曰金牖臺三元玉檢刻題其中又曰鳯生臺太眞金書在其内金簡玉字經曰有洞天陽臺玉佩金璫經在其内洞景金玄經曰自非眞仙之名帝圖玉籙者不得聞見此經得見此經者飛仙上清法輪經曰太上玄一眞人曰吾昔受無極太上大道君無上八門經道成位加眞人此文與元始同生包含天地億刼長存自非仙籙不得妄傳天地綱紀經曰太上玉經隱書皆盛以別笈道迹經曰東井華林堂元洞天中内音玉書置其上大有經曰太玄靈臺玄都九眞明科在其内飛龍隱訣曰飛行羽經封之峨嵋山金臺室道學傳曰洞室中有金城玉屋眞文所在上清九眞中經内訣曰太上宫髙上臺有太上玉晨鬰儀奔日赤玉文及太上玉晨結隣奔月黄景玉章此二經刻以玉簡金字内音玉字經曰内音封於南河洞室石匱之中五符經曰九天靈書封於石匱玉訣經曰南圃丹霍之河三元洞室封題玉匱消魔經曰仙經一藏於荒山觀試凢心也像天地品曰後漢順帝時曲陽泉上得神仙經一百卷内七十卷皆白素朱界青慓朱書號曰太平青道隂行品曰度代君司馬生以白玉板青玉界丹玉字以授呉郡沈羲又曰上清以丹金書之紫金爲界三元眞一經曰琳霄之室者三元眞一之法藏在其中也玉光八景經曰金輝紫殿金眞玉光八景經藏其内上清經曰南極藏上清經於瑶臺茅君傳曰金臺者上眞内經封其中三道順行經曰南洞之室王君封三道經在其中玄眞經曰髙玄之妙道玉清之祕篇皆授金名玉字髙仙之人九眞中經曰奔日月之道太上上清太極九皇四司眞人之所寳祕玄元君之玉章也自非有金闕玉名及東華紫字皆不得聞見此鬰儀奔日結隣奔月二章之篇目三元布經曰南極上上寳祕玉檢之文自無玄名帝圖不得見其篇第也又金羽玄章經此文隱藏不傳於丗自無蘭臺丹字不得見聞靈寳眞一訣曰洞玄自然經夲文出乎太上道也者弥綸無極微妙無形老子曰天下莫柔弱於氣氣莫柔弱於道道之所以柔弱者苞乎天地萬物夫柔之生剛弱之生強而天下莫能知其根夲所從生者乎是故有以無爲母無以虚爲母虚以道爲母自然者道之根本也人能以自然爲道眞則道可得而通也太上經曰道實無形隱爲化本經有文字顯爲教端師有形言出處爲法語黙隨時爲存爲最期至乎道白經與師師經及道號爲三寳又云化夲有三道經師也大道無形湏經爲階經文玄妙非凢所知聖降爲師示人旨訣老子云道者萬物之奥善人之寳賢者得之以爲真寳愚者得之不敢失道道無常術德無常方神無常體和無常容道爲中主與静爲友又曰龍景九文紫鳯赤書經舊文藏在大上六合紫房之内天人侍衛其經太微黄書經曰天眞三皇藏八㑹之文於委羽山太微天帝藏一通於龜山其靈書八㑹字無正形趣究乎奥難可尋詳得爲天書自然至眞斯八㑹之氣全五和之音非淺近者所能洞明天具皇人竭其所見注解其意八㑹多文者生天立地開化人神萬物之夲主召九天上帝校定神仙圖籙政天分度安國息民攝制鄷都降魔伏鬼勑命水帝召龍上雲論天地刼期辨聖眞名氏所理城臺種種因縁廣宣區別五方元精服御求仙化形之法皆演玄妙自然虚無正眞妙趣明了具足也又有玉訣者天眞上聖述釋天書八㑹之文以爲正音又有靈圖者玄聖表化示以靈變像形述理令物易悟也玉皇譜籙者衆聖紀述聖君名姓宗夲繼嗣神官位緒也誡律者玄聖製勑詮量罪福輕重科條防檢過失也威儀自然經者具示齋戒奉法俯仰進止容式䡄範節度也方法者衆聖著述丹藥祕要神草靈芝柔金水玉修養之道也術數者明辨思神存眞念道齋心虚志遊空飛歩飡吸元和導引三光仙度之法也記傳者衆聖載述學業得道成眞證果衆事之迹也昇玄經曰太上以靈寳内教經者咸信著萬民乃可傳授奉戒完具内無毀滅賑恤孤弱逺惡修善不求名譽稱毀如一幽僻之處勤行其道使人信之如四時不欺與賢者論議不自專執者可傳授也又有好求勝法從善如流好近賢智無猜疑行聦明而賞別眞僞謹愼而言不過行柔弱而無過惡能師勝巳而無悖慢重其師教如貧之得寳尊奉師長而不辭勤勞請益之心夙夜不懈如此之類方可授經又曰有上清列紀經者得爲太極仙人益能誦之者遂爲上清之君也有玉清隱書者旦夕當致眞仙論道講妙有四極明科經者則玉帝遣五方神兵左右三官檢制靈文靈寳經曰元始洞玄靈寳赤書五篇眞文者於元始之先空洞之中天地未根日月未光幽幽冥冥無祖無宗靈文闇藹乍存乍亡二儀待之以分太陽待之以明靈圖革運玄象推遷乗機應運於是存焉天地得之而分判三景得之而發光靈文鬰秀洞映上清發乎始青之天而色無定方支勢曲折不可尋究元始錬之於洞陽之館冶于飛火之庭鮮其正文瑩發光芒洞陽氣赤故號赤書天寳之以致浮地祕之以致安五帝賞之以得鎭三光乗之以髙明上聖奉之以致眞五岳從之以得靈天子得之以致治國享之太平寔靈文之妙德摽天地之玄根威靈恢廓普加無窮蕩蕩大化爲神明之宗其量莫測巍巍太空生天立地開化神明上謂之靈施鎭五岳安國長存下謂之寳靈寳玄妙爲萬物之尊又曰太上八威䇿文今靈寳五符後有一符名太上八威䇿以制虎豹山精也太上隱書金眞玉光經即太上玉晨傳也素靈洞玄大有妙經即西王母傳也玉佩金璫太極金書即扶桑大帝君傳也飛行羽經即中央黄老君傳也太宵隱書瓊文玉章即太帝傳也凢諸傳並有眞經或人髙而法下或術重而位輕此傳雖有新法以黄庭内經爲主是爲太極經也赤丹金精石景水母經此似紫文服日精法天皇象符以合元氣黄書赤界長生之要洞眞玄經曰無太一金閣五星隱籙後聖七符空山石凾丹臺章玄黄五行天母抱圖者皆不得聞見至道也洞眞經曰玉室者三九素語玄丹上化三眞洞元之道藏於内又曰髙上藏三元玉撿三元布經於其内曲室者太微天帝君祕九丹上仙文之所也元始五老又祕五篇眞文於其内又曰東海青華小童治玉革青宫内其東殿架上有寳經三百卷玉訣九千篇主學仙簿籙應爲眞人者授之玉晨監仙侍郎典之又曰玄靈臺五老寳經及玄母八門金臺玄丹三眞洞元之經藏其内又曰九天關臺上有上皇太眞髙帝玉名及後聖眞人簿籙太虚玉晨監典之太洞玉經曰玉晨延以金華之堂太上書以明玉之札又曰龍山是玉清天中髙臺名也天帝玉字在其中又曰萬華宫有上帝寳經玉清隱書大洞經曰有玄雲羽室黄老元君經封在其中又曰黄老元君經封在素瑶臺及北寒金臺又曰有聞風玉臺㹅司學道仙籍又曰雌一玉檢祕在九天之上大有之名太玄靈臺又曰有混成玉堂大洞眞經在其中又曰大洞眞經者三五之祕號眞道之至精三一之極章並玉清之禁訣髙上之祕篇也又太上九眞明科經云大洞真經雌一寳經素靈妙經三竒之章髙上玉皇寳篇祕在九天之上大有之宫太玄靈臺玉房之中也三籙者衆經之端也金籙黄籙玉籙也夫靈寳經者有内外外敎雜教隨人所悟說之不必盡言也趣令前人受悟爲限也内敎者眞一妙術發自内心行善得道非從外來若道可假外而得者便應以道授至眞不變湛然常存也三皇經者玉清洞眞上清洞玄太清洞神又太極隱注寳訣經云受三洞經當絶人事而行之也㹅三洞名太上洞一髙上之經矣大洞眞經或曰太眞道經或曰太清上道觀天内經上清之髙旨極眞之微辭飛仙之妙經也靈寳經或曰洞玄或云太上昇玄經曰皆髙仙之上品虚無之至眞大道之幽賛也三皇天文或云洞神或云洞仙或云太上玉䇿此三洞經符道之綱紀太虚之玄宗上眞之首經矣豈中仙之所聞哉又金籙簡文經曰三洞寳經自然天文也又太上太眞科經云大化始立人風眞淳故三寳度三品人洞神名仙寳之道接三皇之世洞玄名靈寳之道明三才度五帝之世洞眞名天寳之道紀清正之方濟三代之後又太上倉元經云三洞經者洞眞上清也洞玄靈寳也洞神三皇也又靈書經曰元始以龍漢之年撰十部經告西母曰太上紫微宫中金格玉書靈寳眞文篇目有妙經其篇目今以相示皆刻金爲字書於玉簡題其篇目於紫微宫南軒太玄都玉京山亦具記其文道君列紀曰若三元宫有珠札青書者則紫腦錦舌北爲仙相也太平御覽卷第六百七十三
