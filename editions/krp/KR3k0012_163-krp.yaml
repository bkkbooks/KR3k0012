front:
  text: 太平御覽卷第一百六十三
  hash: sha256:27bcccdb35c736b08703d68f5b82af53b9abcdd95c235adbe2a2f6e0a17def70
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_163-1a}
body:
  text: 州郡部九河東道下蒲絳晉澤潞遼沁隰慈汾并石嵐代忻蔚朔雲蒲州十道志曰蒲州河東郡置在河東縣本漢蒲坂地盖堯舜所都左傳曰晉獻公滅魏以賜畢萬服䖍注曰在晉之蒲坂史記曰季布爲河東太守文帝謂布曰河東吾股肱郡也慱物志曰河東有山澤近鹽沃土之人不才漢興少有名人魏志杜畿傳曰畿爲河東太守開置學官親執經教郡中化之自後河東多儒者閭閻之間習於程法春秋左氏傳曰晉人謀去故絳諸大夫皆曰必居郇音荀瑕氏之地郇瑕故國名河東解縣西北郇城沃饒而近盬鹽鹽猗氏縣鹽池是國利君樂不可失也韓獻子曰不可郇瑕氏土薄水淺其惡易覯易覯則民愁民愁則音墊居隘於是乎有沈溺重膇直僞切之疾不如新田土厚水深居之不疾有汾澮以流其惡夫山澤林盬國之寳也國饒則民驕佚近寳則公室乃貧近寳則民不務本也不可謂樂公說從之郡國志曰猗氏縣猗頓所居之地猗頓魯窮士也問術於陶朱公公教之畜五牸遂富漢因之名縣史記曰魏都安邑惠王三十一年秦用商君東侵地至河而齊趙數破我我安邑近秦於是徙居大梁漢志曰河東郡秦置王莽曰兆陽領縣二十四又曰蒲坂故曰蒲秦更名王莽曰蒲城應劭曰秦始皇東廵見長坂故因加反孟康云晉文公以賂秦後秦人還蒲魏人喜曰蒲反矣遂名之師古曰應說是絳州元和郡縣志曰絳州絳郡禹貢冀州之域春秋時屬晉戰國時爲魏地秦三十六郡爲河東郡後漢書曰章帝元和三年行幸安邑觀鹽池晉太康地志曰安邑有司鹽都尉別領兵五千圖經曰晉穆侯遷都於絳曽孫孝侯改絳爲翼翼爲晉之舊都後獻公復爲絳絳在今曲沃故城二里有絳邑故城是故絳在翼城東南有故翼城是也十道志曰正平縣有九原一名九原即趙簡子觀處禮記曰趙文子與叔譽觀于九原文子曰死者如可作也吾誰與歸叔譽曰其陽處父乎文子曰見利不顧其君其仁不足稱也我則隋武子乎利其君不志其身謀其身不遺其友漢書曰元鼎六年上幸緱氏至此聞南越破遂立爲聞喜縣圖經曰聞喜縣有董澤左傳曰董澤之蒲可勝旣乎晉州元和郡縣志曰晉州平陽郡禹貢冀州之域堯舜所都周爲冀州地春秋時其地屬晉戰國時屬韓秦爲河東郡地十道志曰本漢平陽縣地漢志曰平陽縣屬河東郡以其在平水之陽故名之前趙録曰太史令言於元海曰蒲子﨑嶇非可乆安平陽唐堯所都於是徙居平陽也兩河記曰洪洞縣以此地固重複控據要險故曰洪洞焉漢志曰襄陵屬河東郡王莽曰幹昌以晉襄公之陵以爲名十道志曰霍邑漢彘縣也漢志曰彘屬河東郡周厲所奔也王莽曰黄城澤州元和郡縣志曰澤州髙平郡禹貢冀州之域春秋時屬晉戰國時屬韓魏後屬韓秦兼天下今州即上黨郡髙都縣之地也史記曰秦使武安君白起攻趙趙發兵拒秦秦大破趙於長平長平在髙平縣西北有長平故城十道志曰澤州以濩澤爲名漢志曰濩屬河東郡禹貢析城山在其西南濩音胡虢反墨子曰舜漁於濩澤十道志曰晉城縣本漢髙都縣也漢志曰髙都屬上黨郡有天井關元和郡縣志曰髙平縣本漢泫氏縣也泫音胡玄反漢志曰泫氏屬上黨泫水所出也竹書紀年曰梁惠王九年晉取泫氏史記曰趙成侯十六年與韓魏分晉封晉君于端氏也潞州元和郡縣志曰潞州上黨郡禹貢冀州之域殷爲黎國春秋時屬晉又曰兼有潞子之國秦爲上黨郡地左傳宣十五年曰潞子嬰兒之夫人晉景公之姊也酆舒爲政而殺之又傷潞子之目鄷舒潞相晉侯伐之滅潞酆舒奔衞衞人歸諸晉晉人殺之戰國䇿曰秦有安邑則韓必無上黨以逺韓近趙故卒歸趙隋圖記曰上黨南陽古以爲縣實都也漢志曰上黨郡秦置屬并州有上黨關又曰壼關屬上黨郡黎侯國今有黎亭釋名曰上黨黨所也在山上其所最髙故曰上黨上黨記曰髙平赤壞其地山阻百姓不居即此郡也圖經曰後周建德七年於襄垣縣立潞州以其浸汾潞爲名漢志曰長子縣屬上黨郡周史辛甲所封師古曰長讀長短之長竹書紀平曰梁惠王十二年鄭取屯留尚子即長子之地也左傳襄十九年曰晉人執衞行人石買于長子執孫蒯于屯留長子屬上黨又曰鄭伯如晉晉人執諸銅鞮晉太康地記曰銅鞮故晉大夫羊舌赤邑時號赤爲銅鞮伯華漢以爲縣遼州圖經曰遼州樂平郡禹貢冀州之域春秋時其地屬晉戰國屬韓後屬趙秦漢爲上黨郡貞觀中避諱改爲儀州後又爲箕州復爲遼十道志曰和順縣本漢沾縣地即諱閼與邑史記曰秦昭襄三十八年攻趙閼與趙奢曰其道逺險扼譬如兩䑕闘於穴中將勇者勝乃使趙奢將大破秦軍乃解閼與之圍漢書髙帝紀曰韓信破代相夏說於閼與漢志曰沾縣屬上黨郡有沾水出壼關沾音他兼反沁州十道志曰沁千浸切州陽城郡本漢榖逺縣地元和郡縣志曰禹貢冀州之域春秋時其地屬晉戰國時屬韓在秦爲上黨郡地今州即漢上黨之榖逺屬地漢志曰榖逺屬上黨郡王莽曰糓近晉地記曰榖逺今名孤逺後代語訛耳十道志曰綿上縣亦榖逺縣之地以縣西有綿上地因名之舊屬介休縣隋分置綿上焉蓋晉介子推之地隰州圖經曰隰州大寜郡夏殷巳前其地與箕沁同在周爲晉之北鄙元和郡縣志曰禹貢冀州之域春秋時爲晉地七國時屬魏秦爲河東郡地漢爲蒲子縣屬河東郡國語曰驪姬謂晉獻公曰蒲與屈君之疆也不可以無主若太子主蒲與屈乃可以威民而懼戎太子申生也二子重耳夷吾也蒲陽平蒲子縣郡國志曰以州前二里有泉下濕故取下濕之義爲名十道志曰永和縣本漢狐讘縣也漢志曰狐讘屬河東郡讘音之渉反慈州元和郡縣志曰慈州文成郡禹貢冀州之域春秋時晉之屈邑獻公子夷吾所居也秦併天下即河東郡之北屈縣漢志曰北屈王莽曰朕北應劭曰有南屈故稱北瓉曰汲郡古文翟章救鄭次于南屈左傳僖二年曰晉荀息請以屈産之乗與垂棘之壁假道於虞以伐虢屈地生良馬元和郡縣圖曰吉昌縣有姚襄城西臨黄河控帶龍門孟門之險周齊交争之地齊後主武平二年遣斛律明月破周兵於此城下郡國縣道記曰吕香本漢之北屈有騏縣漢志曰騏屬河東郡侯國汾州十道志曰汾州西河郡禹貢冀州之域其在虞夏及周屬并州春秋時晉地六國時屬趙秦併天下屬太原郡左傳昭元年曰昔金天氏有裔子曰昧爲玄冥師生允格臺駘臺駘能業其官宣汾洮障大澤汾洮二水以處太原太原晉陽也帝用嘉之封諸汾川又曰昔髙辛氏有二子長曰閼伯次曰實沈居于曠林不相能地后帝不臧遷閼伯于商丘主辰啇人是因遷實沈于大夏主參唐人是因大夏今晉陽縣其季世曰唐叔虞及成王滅唐而封太叔焉故參爲晉星叔虞封唐是爲晉侯又昭二年曰齊陳無宇送女晉侯謂之必齊謂陳無宇非卿執諸中都中都晉邑在河西介休縣又僖二十四年曰晉侯賞從亡者介之推不言禄禄亦弗及遂隱而死晉侯求之不獲以緜上爲之田曰以志吾過且旌善人元和郡縣志曰子夏居西河吴起守西河皆爲此也禮記檀弓曰子夏䘮其子而䘮其明曽子弔之子夏哭曰天乎予之無罪也曽子怒曰商汝何無罪也吾與汝事夫子於洙泗之間退而老於西河之上使西河之民疑汝於夫子爾罪一也唐書曰髙祖𥘉起兵師次霍邑隋將宋金剛拒不得進屯軍賈胡堡㑹霖神語曰若向霍邑當東南傍山取路八日雨止我當助破之賈胡堡在靈石縣并州元和郡縣圖志曰并州太原府禹貢冀州之域春秋時晉國戰國時爲趙地秦併天下置太原郡尚書禹貢曰既脩太原至于岳陽春秋元命苞曰并之爲言精合交并釋名曰并者兼并也言或并或設元和郡縣志曰中國曰太原夷狄曰大鹵按晉大鹵太原大夏夏墟晉陽六名其實一也左傳曰晉荀吴敗狄於大鹵釋名曰地不生物曰鹵太康地記曰并州不以衛水爲號不以恒山爲稱而云并者蓋以在兩谷之間乎帝王世紀曰帝堯始封於唐又徙晉陽及爲天子都平陽平陽即今晉陽即太原也又曰禹自安邑都晉陽至桀徙都安邑至周成王以封弟叔虞是爲晉侯史記曰成王與叔虞戲削桐葉爲珪曰以是封汝周公請封於唐王曰吾戲耳周公曰天子無戲言遂以封之魏志曰髙祖圍袁尚於鄴時袁紹外生髙幹爲并州刺史牽招說幹曰并州左有恒山之險右有大河之固北有強胡冝速迎尚併力觀變幹不從故敗史記曰智伯率韓魏攻趙襄子于晉陽引汾水灌其城不没者三板春秋後語曰張孟談謂趙襄子曰董安于之在晉陽公吕之垣皆荻蒿隋圖經曰并州其氣勇抗誠信韓趙魏謂之三晉剽疋妙反悍盗賊常爲他郡劇漢志曰太原郡秦置有鹽官在晉陽屬并州領縣二十一又曰榆次屬太原郡王莽曰太原亭史記秦夲紀曰莊襄王使蒙敖攻趙榆次漢志曰陽曲屬太原應劭曰黄河千里一曲當其陽故曰陽曲石州元和郡縣志曰石州昌化郡禹貢冀州之域虞及周屬并州春秋時屬趙亦爲白狄之地在秦爲西河郡之離石地史記曰秦伐趙取離石前趙録曰今離石在國單于所徙庭是也十六國春秋曰晉惠帝以劉元海爲離石將兵都尉嵐州元和郡縣志曰嵐州樓煩郡禹貢冀州之域春秋時爲晉國後屬趙本樓煩故地秦爲太原郡漢爲太原郡之汾陽地史記曰趙惠文王主父行地遂出伐西遇樓煩王於西河而破其兵取其地爲縣漢志曰汾陽屬太原郡汾水所出漢書項羽傳曰漢有善射者曰樓煩楚挑戰樓煩輙射殺之使射羽羽大怒瞋目叱之樓煩目不能視手不能發樓煩縣屬鴈門北縣人善騎射莊子曰堯治天下之民平海内之政徃見四子藐姑射之山汾水之陽窅然喪其天下代州元和郡縣圖曰代州鴈門郡古并州之域春秋時晉地戰國時屬趙秦置三十六郡鴈門是其一焉漢因之河東記曰代句住在州西北鴈門界西陘山是也史記曰趙襄子與韓魏共滅智伯分晉地則趙有句注之地爾雅曰北陵西踰鴈門是也郭璞注曰西踰鴈門山也地理志曰自代傍隂山至髙闕代王以爲塞漢志曰鴈門郡秦置句注山在隂館王莽曰填狄屬并州領縣十四山海經曰鴈門出其間在髙栁代中史記曰趙襄子與代王㑹於夏屋以銅斗擊殺代王而取其地十道志曰五臺縣夲漢慮虒縣漢志曰慮虒屬太原郡師古曰慮虒音廬夷又曰崞縣屬鴈門王莽曰崞張又曰繁畤屬鴈門王莽曰當要忻州元和郡縣志曰忻州定襄郡古并州之域春秋時爲晉國戰國時爲趙地秦漢爲太原郡地今州即漢太原郡之陽曲縣也十道志曰忻州置在秀容縣夲漢曲陽縣後漢末於此置九原縣十三州志曰漢末大亂匈奴侵邊自定襄巳西盡雲中鴈門之間遂控建安中丞相曹公集荒郡之户以爲縣聚之九原縣界新興郡領九原等縣屬并州元和郡縣志曰秀容城劉元海新築元海感神而生姿容秀美因以爲名蔚州元和郡縣志曰蔚州安邊郡禹貢冀州之域虞及周屬并州春秋時地屬晉戰國時屬趙秦漢爲代郡漢志曰靈丘屬代郡瓉曰靈丘之號在趙武靈王之前也漢書曰酈食其說漢王曰杜白馬之津距飛狐之口晉書曰建興中劉琨自代出飛狐口奔於安次朔州元和郡縣志曰朔州馬邑郡屬禹貢冀州之域虞及周爲并州地春秋時爲北狄地戰國時屬趙秦爲鴈門郡漢爲鴈門郡之馬邑也漢志曰馬邑屬鴈門郡王莽曰章昭晉太康地記曰秦時建此城輙崩不成有馬周旋馳走反覆父老異之因依以築城遂爲馬邑後魏書曰道武天興元年遷都平城孝文遷都之後於此置朔州冀州圖云趙武靈王胡服而征遂有獫狁之地漢髙帝以韓王信壯武乃以太原郡爲韓國徙信以備胡信以晉陽去塞逺請理馬邑上乃許之後匈奴圍信信數求救上賜書責信信懼以馬邑降胡雲州元和郡縣圖曰雲州雲中郡禹貢冀州之域虞及周爲并州之地春秋時爲北狄地戰國時其地屬趙其後屬秦鴈門郡地漢鴈門郡之平城縣也漢志曰平城東部都尉治王莽曰平順郡國志曰雲中五原唾出口成氷言苦寒也漢書曰七年上自將擊韓王信于銅鞮縣名信亡走匈奴與匈奴共距漢上從連戰乗勝逐北遂至平城爲匈奴所圍七日用陳平祕計得出元和郡縣圖曰後魏道武於此建都東至上谷西至河南至中山北至五原地方五千里以爲甸服孝文改爲司州牧置代尹太平御覽卷第一百六十三
