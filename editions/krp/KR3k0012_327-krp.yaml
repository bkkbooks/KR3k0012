body:
  text: 兵部五十八獻俘班師罷兵偃武獻俘詩曰一月三捷左傳曰秋七月丙申振旅凱以入于晉凱樂也獻俘授馘飲至大賞授數也献楚俘於廟徴㑹討貳徴㑹諸侯將冬㑹於温殺舟之僑以徇于國民於是大服又曰晉侯使趙同獻狄俘于周不敬劉康公曰不及十年原叔必有大咎劉康公元孝子元趙同也天奪之魄也又曰士㑹帥師㓕赤狄甲氏及留吁鐸辰鐸辰留吁之属也三月獻狄俘干廟晉書載記曰石季龍攻䧟徐龕送之襄國勒嚢盛於百尺樓自上㩧殺之令歩都等妻子刳而食之坈龕降卒三千又曰杜預平呉王濬先列上得孫歆頭預後生送歆洛中以爲大笑梁書曰沈林子獻捷書每以實聞武帝問其故林子曰夫王者之師夲有征無戰豈可復増張虜獲以示誇誕昔魏尚以盈級致罰此後乗之良轍也武帝曰乃所望於卿也後魏書曰裴叔業率王茂先李定等來侵楚王戍傳永適還州王肅復令傳永討之永將心腹一人馳詣楚王至即令戍塡塞外壍夜伏戰士一千人於城外曉而叔業等至頓於城東列陣置長圍永所伏兵於左道擊其後軍破之叔業乃令將佐守所列之陣自率精甲數千救之永上門樓觀叔業南行五六里許便開門奮擊遂摧破之叔業進退失圖於是奔走左右欲追之永曰弱卒不滿三千彼精甲猶盛非力屈而敗直墮吾計中耳旣不測我之虚實足喪其瞻俘此足矣何暇逐之獲叔業傘扇皷幕甲仗万餘兩月之中遂獻再捷髙祖嘉之後周書曰武帝平齊夏四月至自東伐列齊主於前其王公等並從車轝旗幟及器物以次陳於其後大駕布六軍備凱樂獻俘於太廟京邑觀者皆稱万歳戊申封齊主爲温國公唐書曰武德中西突厥葉護可汗遣使請㛰又入宼邊上髙祖謂群臣曰突厥入宼而復請和和之與戰其䇿安在太常卿鄭元璹對曰若擊之則怨深難以和緝中書令封德彛進曰若不戰而和親夷狄必謂中國畏懼未若擊之尅捷而和親此則威恩兼舉髙祖然之戊辰西突厥遣使獻名馬巳巳并州大惣管襄邑王神符擊突厥於汾東斬首五百級虜其馬二千疋汾州刺史蕭顗斬突厥五千餘級又曰太宗平東都凱旋親𬒳黄金甲陳鐵馬一万騎甲士三萬人前後部鼓吹俘二僞主及隨神器輦輅獻捷于太廟髙祖大恱行飲至禮以享焉又曰張瑾初仕隋歷職顯貴煬帝𬒳圍於鴈門也瑾以驍果出城擊戰一日九捷煬帝登城望之大恱賜物二千叚又曰元和中忠武軍節度使李光顔奏破呉元濟之衆上大恱賜其告捷使奴婢銀錦又曰元和十二年十月隋唐節度使李愬帥師入蔡州執賊師呉元濟以聞淮西平辛巳上御宣政殿受朝賀九品巳上及宗子四夷之使皆㑹又曰元和十四年魏博節度使田弘正遣使獻逆臣李師道命左右軍兵衛之先獻于太廟郊社上御興安門百寮於門下列位稱賀又曰元和中昭義節度郗士羙以賊首三百來獻詔梟於通化門外班師爾雅曰出曰治兵尚武也入曰振旅反尊卑也郭璞日㓜賤在前貴勇也尊老在後尚儀也詩曰出車勞還率也赫赫南仲薄伐西戎昔我徃矣黍稷方華春日遟遟卉木萋萋執訊獲醜薄言還歸又曰杖杜勞還役也有杖之社其葉萋萋周禮曰若師有功左執律右秉鉞以先凱樂獻于社左傳曰三年而治兵入而振旅歸而飲至以數軍實飲至於廟以數車徒所獲也又曰楚子敗晉師于邲潘黨曰君盍築武軍而収晉尸以爲京觀楚子曰夫文止戈爲武武有七德禁暴戢兵保大定功安人和衆豐財者也我無一焉何以示子孫祀于河作先君宫告成事而還後漢書曰曹操討劉備出教曰鷄助外曹莫暁楊德祖曰夫雞肋食之則無所得棄則我惜公歸計决矣操乃還軍又曰馬援自南方振旅還京師軍吏經瘴疫死者十四五賜援兵車一乗晉書曰王濬平具上表云間在秣陵諸軍凡二十万衆臣軍先至爲土地之主百姓之心皆歸仰臣臣切勑所領秋毫不犯諸有市易皆明破劵契有違犯者凡斬十三人皆呉人所知也餘軍縱横詐稱臣軍而軍類皆蜀人幸以此自别耳又曰賈充爲伐呉大都督孫皓降於王濬充未之知方以呉未可平抗表請斑師充表與告捷表同至朝野以充佐居人上智出人下宋書曰十二月景申大軍次左里將戰帝麾之麾竿折幡沉于水衆咸懼帝笑曰昔覆舟之役亦如此今勝必矣遂攻其柵盧循單舸走衆軍皆旋晉帝遣侍中黄門勞師于行所至國典略曰齊公憲夜収軍欲待明更戰逹奚武謂之曰洛陽軍散人情駭動若不因夜速還明日欲歸不得武在軍旅乆矣備見形狀豈可將數營大衆一朝而棄之憲從其諌遂全軍而反後魏書曰蕭衍㓂徐兖州邢巒大破之旋師丗宗臨東堂勞之曰卿役不踰時尅清妖醜鴻勲碩羙可謂不愧古人巒曰此自陛下威略聖靈加以將士之力臣何功之有白虎通曰古者師出不踰時者爲怨思也天道一時生物養人者天之貴物也踰時即内有怨女外有曠夫詩曰昔我徃矣楊柳依依今我來思雨雪霏霏春秋曰宋人取長葛傳曰外取邑此不書此何謂以書乆也六韜曰武王平殷還問太公曰今民吏未安賢者未定何以安之太公曰無故如天如地說苑曰魏文侯攻中山樂羊將巳得中山還反叛文侯命主書曰群臣賔客所獻書操以進主書者舉兩篋以進令將軍視之盡難攻中山之事也將軍還北面而再拜曰中山之舉也非臣之力君之功也韓子曰晉文公將與楚戰召舅犯問曰吾將與楚戰彼衆我寡爲之柰何對曰臣聞之君子不厭忠信戰陣不厭詐僞君其詐之而已又問雍季對曰焚林而田後必無獸以詐遇民後必無民公曰善以舅犯謀與楚戰大敗之歸行爵先雍季而後舅犯群臣曰城濮之事舅犯之謀夫用其言而後其身可乎公曰此非若所知夫舅犯之言權也雍季之言万丗之利也罷兵史記曰漢武帝患匈奴屢爲邊患鴈門馬邑豪聶壹因大將軍王恢言匈奴初和親親信邊可誘以利致之伏兵襲擊必破之道也帝召問公卿曰今欲舉兵攻之何如韓安國曰臣聞髙皇帝圍於平城匈奴至者投鞍髙如城者數所平城之飢七日不食天下歌之及解圍反位而無忿怒之心夫聖人以天下爲度者不以巳私怒傷天下之政故乃遣劉敬奉金千斤以結和親至今爲五代利孝文皇帝又甞一擁天下之精兵聚之廣武常谿終無尺寸之功而天下黔首無不憂孝文悟於兵之不可宿故復合和親之約此二聖之跡足以爲効矣竊以爲勿擊便漢書曰元帝時朱崖儋耳二郡夷數反賈捐之上書請不擊其略曰臣聞堯舜禹三聖之德地方不過千里西被流沙東漸于海朔南曁声教欲與声教則理之不欲與者不強理也是以頌声並作視聽之類咸樂其生秦氏興兵逺攻貪外虗内務欲廣地而天下潰叛頼聖漢爲百姓請命平定天下至孝武皇帝以國富人逸攘却匈奴西連諸國至于安息東過碣石造塩鐵酒攉之利以佐用度猶不能足當此之時冦賊並起征伐不休之故也今陛下不忍悁悁之忿欲歐士衆擠之大海之中悁居縁切擠祖奚切快心幽冥之地非所以保全元元也詩云蠢尓荆蠻大邦爲讎自古患之乆矣何況万里之蠻乎臣竊以往者羗軍言之暴師曽未一年兵出不踰千里費四十餘萬大司農錢盡乃以少府禁錢續之夫一隅爲不善費尚如此況於勞師逺攻亡士無功乎臣愚以爲非冠帶之國禹貢所不及皆可且無以爲於是遂罷其郡後漢書曰光武建武中北匈奴衰弱臧宫馬武上書請臨塞厚懸購賞喻告髙勾驪烏桓鮮卑攻其左發河西四郡及天水隴西羗胡擊其右如此北虜之㓕不過數年矣帝曰舎近謀逺者勞而無功舎逺謀近者逸而有終故曰務廣地者荒務廣德者強有其有者安貪人有者殘殘滅之政雖成必敗今國無善政災變不息百姓驚惶人不自保而復逺事邊外乎孔子曰吾恐季孫之憂不在顓臾自是諸將莫敢復言兵事魏志曰諸葛誕據壽春及魏將王基討之司馬文王欲遣諸將輕兵深入招迎呉將唐咨等子弟因釁有蕩覆呉之勢基諌曰昔呉將諸葛恪乗東關之勝竭江表兵以圍新城城旣不㧞而衆死者太半蜀將姜維因洮上之利輕軍深入粮餉不継軍覆上邽音圭夫旣勝之後必輕敵則慮難不深今賊新敗於外又内患未弭是其脩政設慮之時也且兵出踰年人有㱕志俘馘十万罪人斯得自歷代征伐未有全兵獨克如今之盛者也武皇帝破袁紹於官度自以所獲巳多不復追奔懼挫威也從之尸子曰公輸般爲蒙天之階階成將以攻宋墨子聞之赴於宋至於郢見般曰聞子爲階將以攻宋宋何罪之有無罪而攻之不可謂仁胡不巳也公輸般曰不可吾旣以言之王矣墨子曰胡不見我於王公輸般曰諾墨子見楚王曰今有人於此舎其文軒隣有弊輿而欲竊之舎其錦繡隣有短褐而欲竊之舎其梁肉隣有糠糟而欲竊之此爲何若人王曰此爲竊疾耳墨子曰荆之地方五千里宋之地方五百里此猶文軒之與弊輿也荆有雲夢犀兕麋鹿盈之以江漢之魚鱉黿鼉爲天下饒宋無雉兎鮒魚者也猶梁肉之與糠糟也荆有長松文梓楩柟豫章宋無長木此猶錦繡之與短褐也臣以王之攻宋也爲與此同類王曰善請無攻宋吕氏春秋曰秦興兵欲攻魏司馬唐諌秦君曰叚干木賢者也而魏禮之天下莫不聞無乃不可加兵乎秦君乃按兵而輟不攻魏文侯可謂善用兵矣聞君子之用兵也莫見其形其功巳成此之謂也偃武易曰澤上於地萃君子以除戎器戒不虞書曰武王伐殷乃偃武脩文倒載干戈包以虎皮示不用也行禮射設庠序脩文教也歸馬于華山之陽放牛于桃林之野示天下弗服山南曰陽桃林在華山東北皆非長養牛馬之地欲使自生死示天下不服乗用也脩文教也禮記曰武王克啇後散軍而郊左射狸首右射騶虞而貫革之射息矣歸馬于華山之陽放牛于桃林之野干戈弓矢包之以虎皮示天下不復用兵也左傳曰宋向戌欲弭諸侯之兵以爲名子罕曰天生五材民並用之廢一不可誰能去兵兵之設乆矣所以威不軌而昭文德也聖人以興乱人以廢興廢存亡昏明之術皆兵由也而子求去之不亦誣乎又曰武王克啇作頌曰載戢干戈載橐弓矢又曰夫文止戈爲武家語曰孔子北遊登於農山曰二三子各言其志吾將擇焉子路進曰由願白羽若月赤羽若曰攘地千里搴旗折馘唯由能之子貢進曰賜願旗鼓相望縞衣白冠陳說其間二國釋怨唯賜能之顔回曰回聞薫蕕不同器而治回願得明王聖主王相之鑄劒㦸爲農器放牛馬於原藪則由無所施其勇賜無所用其辯矣孔子曰羙哉德也史記曰始皇曰寡人頼宗廟之靈六王咸服其辜天下大定収天下兵器銷以爲鍾鐻金人十二重各千斤置咸陽廷宫中漢書文帝詔曰朕能任衣冠念不到征討故鷄鳴狗吠煙火万里也又食貨志曰武帝末年悔征伐之事乃封丞相爲冨民侯顔師古曰欲百姓之殷實故取其嘉名也莊子曰孔子謂盗跖曰將軍有意聽臣臣請南使呉越北使齊魯東使宋衛西使晉楚使爲將軍造大城數百里立數十萬户之邑使尊將軍爲諸侯與天下更始罷兵休卒収飬昆弟共祭先祖此聖人才士之行而天下之願又曰見侮不辱救民之鬪禁政寢兵救丗之戰古司馬法曰古者武軍三年不與民覩之勞也上下相報和之至也還師罷兵復戎卒三年不傜役以荅人勞得意則凱樂歌示喜也聖主誅不義百姓皆得其所喜樂各安其居樂其常偃伯靈臺荅民之勞告不興也偃休息也伯主兵也靈臺錯德羙之喜以祭天示不復用兵也吕氏春秋曰武王以武得之以文持之倒戈㢮矢示天下不用兵尸子曰武王巳戰之後三革不累五刃不砥牛馬放之歷山終身弗乗也淮南子曰秦之時髙爲臺榭大爲苑囿逺爲馳道鑄金人秦始皇二十六年𥘉兼天下有長人見於臨洮其髙五丈足迹六尺放冩其刑鑄金人以象之翁仲君何是也發謫戍入蒭槀戍守長城也入蒭藁之說以供囯用之也頭㑹箕賦於少府頭㑹隨民口數人責其稅箕賦似箕檢民則多取意也少府官名如今司農丁壯大夫西至臨洮狄道臨洮隴西之縣能水北狄道漢陽之縣是也東至㑹稽浮石㑹稽山名浮石隨水髙下言不没皆在遼西界一說㑹稽山在㤗山下封于㤗山禪於㑹稽是也南至豫章桂林䂊章郡挂林欎林也北至飛狄陽原飛狄在代郡南飛狄山也陽原在太原道路死人以溝量言滿備也當此之時忠諌者謂之不祥而道仁義者謂之狂逮至髙皇帝存亡継絶漢髙祖也舉天下之大義身自奮𬒮執銳以爲百姓請命于皇天執利兵伐无道以求百姓之命祈之皇天也當此之時天下雄俊豪英暴露于野澤才過千人爲俊百人爲豪万人爲英前蒙矢石而後墮壑出百死而紹一生以争天下之權墮入也紹至也奮武厲誠以决一旦之命當此之時豐衣博帶而道儒墨者以爲不肖言尚武也逮至累乱以勝勝暴乱也海内大定継文之業立武之功継文王受命之業武王誅无道之功履天子之圖籍造劉氏之貌冠髙祖於新農所作竹冠一曰季貌冠也揔鄒魯之儒墨通先聖之遺教載天下之旗乗㤗輅建九旒撞大鍾擊鳴鼓奏咸池陽干戚周礼天子五輅㤗輅上輅也王者功成作樂故撞鍾擊鼓咸池黄帝樂也干楯也戚斧也春夏舞者所執當此之時有立武者見疑一丗之間而文武代爲雌雄有時而用也今丗之爲武也則非文也爲文者則非武更相非而不知時丗之用也說苑曰魏文侯與田子方語有兩童子衣青白衣而侍於君前子方曰此君子之寵子乎文侯曰非也其父死於戰此其孤㓜也寡人収之子方曰臣以君之賊心爲足今滋甚君之寵此子也又且以誰之父殺之乎文侯愍然曰寡人受令矣自是已後兵革不用
