front:
  text: 太平御覽卷第七百九十九四夷部二十
  hash: sha256:469f2c19f6240bb69a53491394d959d6324f65dc9a328b36450e21d62f1a9666
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_799-1a}
body:
  text: 北狄一揔叙北狄上說文曰狄犬種字從犬狄之言淫僻也白虎通曰狄者易也言僻易無別風俗通曰胡者謹按漢書山戎之別種也㹮者略也云無禮法又胡者互也其𬒳髮左袵言語贄幣事殊互也晉中興書曰胡者北狄之揔名也詩曰采薇遣戍役也文王之時西有昆夷之患北有玁狁之難以天子之命命將帥遣戍役以守衛中國故歌采薇以遣之出車以勞還枤杜以勤歸也采薇采薇薇亦作止薇菜作生也西伯將遣戍役先與之期以采薇之時今薇生矣可以行矣重言来薇丁寧行期也曰歸曰歸歳亦暮止又丁寧歸期定其心也靡室靡家玁狁之故不遑啓居玁狁之故玁狁北狄也古者師出不踰時今薇生而行歲晚乃歸使汝無室家夫婦之道不暇跪居者有玁狁之難也又曰我戍未定靡使歸聘聘問也定止也我方守於北折狄未得止息無所使歸問言所以憂又曰戎車歸駕四牡業業豈敢定居一月三捷一月之中三有勝功謂侵也伐也戰也又曰豈不日戒玁狁孔棘戒警勑軍事也孔甚棘急也言君子小人豈不日相警戒乎獫狁之難甚急預𫐠其苦以勸之又曰王命南仲往城于方出車彭彭旂旐央央王殷王也南仲文王之屬方朔方近獫狁之國也彭彭駟馬貌王使南仲爲將率往築城於朔方爲軍壘以禦北狄之難天子命我城彼朔方赫赫南仲玁狁于襄襄除也又曰昔我往矣黍稷方華今我來思雨雪載塗王事多難不遑啓居塗凍釋也黍稷方華朔方之地六月時也以此出征至春凍始釋而來反又曰執訊獲醜薄言還歸訊言醜衆也執其可言問所獲之衆以歸者當献之赫赫南仲玁狁于夷夷平也又曰六月宣王北伐也六月言周室微而復興美宣王之北伐也六月棲棲戎車旣飭四牡騤騤載是常服棲棲簡閱皃飭正也日月爲常服戎服也記六月者盛夏出兵明其急也玁狁孔熾我是用急熾盛也此序吉甫之意也北狄來侵甚熾故王以急遣我又曰玁狁匪茹整居焦穫侵鎬及方至于涇陽焦穫周地名也接于獫狁者也匪非也茹度也鎬與方皆北方地名言獫狁之來侵非其所當度爲也乃自整齊而處周之焦穫來侵至涇水之北言其太恣也又曰薄伐玁狁至于太原言遂出之而巳又曰文武吉甫萬邦爲憲吉甫尹吉甫也有文有武憲法也吉甫此時大將也吉甫燕喜旣多受祉吉甫尹吉甫也有文祉福也吉甫旣伐獫狁而歸天子以燕禮樂之則歡喜矣又多受賞賜也又曰顯允方叔征伐玁狁方叔先與吉甫征伐獫狁又曰車攻宣王復古也宣王能内脩政事外攘夷狄復文武之境土又曰漸漸之石下國刺幽王也戎狄叛之山石漸漸然髙峻不可登而上喻戎狄衆強而無禮義不可得而復也又曰何草不黄下國刺幽王也四夷交侵中國背叛用兵不息視民如禽獸用兵不息自歳始至晚歳何草不黄禮曰北方曰狄衣羽毛穴居有不粒食者周禮曰職方氏掌天下之圖以掌天下之地辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人民與其財用九糓六畜之數要周知其利害北方曰貉狄四八七九五六周之所服國數也利金錫竹箭之屬害神姧鑄鼎所象百物也又曰司隷掌五隷之法辨其物而掌其政令五隷謂罪隷四狄之屬也物衣服兵器之屬夷隷掌養牛馬與鳥言鄭司農云東夷狄之人或曉鳥獸之言故春秋傳曰介葛盧聞牛鳴曰是生二犧皆用矣是以夷隷職掌與獸言傳曰北戎侵鄭鄭伯禦之公子突曰戎輕而不整貪而無親勝不相讓敗不相救又曰晉里克帥師梁由靡御以敗狄于采桑平陽北屈縣西南有采桑津梁由靡曰狄無耻從之必大克不耻走也里克曰懼之而已無速衆狄又曰晉侯敗狄于箕郤缺獲白狄子白狄狄之別種也故西河郡有白部胡又曰鄋䐽侵齊鄋瞞狄國名遂伐魯魯使叔孫得臣敗狄于鹹獲長狄僑如冨父終甥摏其喉以戈殺之埋其首於子駒之門又曰赤狄侵齊又侵晉取向隂之禾晉滅赤狄潞氏以潞子嬰兒歸潞赤狄之別種氏又曰成下潞子嬰兒之夫人晉景公之姉也鄷舒爲政而殺之又傷潞子之目晉侯將伐之諸大夫皆曰不可鄷舒有三俊才伯宗曰狄有五罪不祀一也嗜酒二也弃仲章而奪黎氏地三也虐我伯姬四也傷其君目五也天反時爲災地反物爲妖民反德爲亂亂則妖災生故文反正爲乏盡在狄矣晉侯從之晉荀林父敗赤狄于曲梁晉侯賞桓子狄臣千室又曰無終子嘉父使孟樂如晉無終山戎國名孟樂其使臣因魏莊子納虎豹之皮以請和諸戎晉侯曰戎狄無親而貪不如伐之魏綘曰勞師於戎諸華必叛戎禽獸也獲戎失華無乃不可乎公曰然則莫如和戎乎對曰和戎有五利焉戎狄荐居貴貨易土可賈焉一也邊鄙不聳民狎其野穡人成功二也戎狄事晉四隣振動諸侯威懷三也以德綏戎師徒不勤甲兵不頓四也鑒于后弄而用德度逺至邇安五也又曰鄭人賂晉侯歌鍾二肆肆列也懸鍾十六爲一肆及其鍾磬女樂二八晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之辝曰夫和戎狄國之福也臣何力之有焉公曰微子無以待戎夫賞國之典也子其受之魏絳於是乎始有金石之樂禮也又曰魯襄公十八年白狄始來白狄狄之別各未嘗與魯掠故日始來也又曰晉荀吴帥師敗狄于大鹵大鹵太原晉陽縣也又曰晉中行穆子敗無終及群狄于太原即大鹵也無終山戎也將戰魏舒曰彼徒我車所遇又阨地険不便車以什共車不克更増十人以當一車之用乃毀車以爲行毀車爲歩陣爲五陣以相離兩於前伍於後專爲右角參爲左角偏爲前拒皆臨時處能用善謀以誘之狄人笑之笑其失常未陣而薄之大敗之傳言荀吴能用善謀又曰晉梁丙率隂戎伐潁潁周邑王使詹桓伯辝於晉曰我在伯父猶衣服之有冠冕木水之有本原民人之有謀主也民人謀主宗族之師長伯父若裂冠毀冕拔本塞源專弃謀主雖戎狄其何有余一人伯父猶然則難戎狄無所可責又曰晉荀吴僞㑹齊師者假道于鮮虞遂入晉陽鮮虞白狄別種晉陽肥國滅肥以肥子縣皐歸肥白狄也縣皐其君名鉅鹿下曲陽西南有肥累城又曰晉荀吴帥師伐鮮虞圍皷三日皷人告食竭力盡而後取之克皷而反不戮一人以皷子鳶鞮歸鳶鞮皷名也又曰晉荀躒如周葬穆后籍談爲介王求彛器籍談曰晉居深山戎狄之與隣而逺於王室王靈不及拜戎不暇其何以献器王曰叔父唐叔成王之母弟也宻湏之皷與其大路文所以蒐也宻湏折姓國也文王伐之得其路鼔以蒐闕鞏之甲武所以克啇也闕鞏國所出鎧唐叔受之處叅虚撫有戎狄參實沈之次晉之分野又曰晉侯訓兵於稷以略狄土糓梁傳曰中國夷狄曰大鹵爾雅曰北至于祝栗左極逺之國又曰觚竹北户西王母曰下謂之四荒觚竹在北地户在南西王母在西日下在東西方昏荒之國又曰九夷八狄七戎六蠻謂之四海八狄在北又曰北載斗極爲空桐載值也空桐之人武地氣使之然也論語曰管仲相桓公覇諸侯一匡天下民到于今受其賜微管仲吾其𬒳髮左袵矣無管仲則君不君臣不臣皆爲夷狄又曰子曰夷狄之有君不如諸夏之亡也國語曰鄭人伐滑王使游孫伯請滑鄭人執之王怒將以狄伐鄭狄隗姓之國也冨辰諌曰不可夫狄無列於王室列位次也豺狼之德也王不忍小忿而弃鄭又登叔隗以階狄階狄禍狄封豕豺狼不可厭也厭足也王弗聽十八年王黜狄后於王子帯故也狄人來誅殺譚伯狄人奉子帶攻王而殺譚伯𥘉惠后欲立王子帶故以其黨啓狄人狄人遂入周王乃出居于鄭又曰晉侯使隨㑹聘于周王饗之餚蒸原公相禮范子私於原公曰吾聞王室之禮無毀折今此何禮也原公以告于王主召士季范子字也曰親戚宴饗則有餚蒸蒸外也升折俎之餚也唯戎狄則有體薦夫戎狄冒没輕儳貪而不讓冒抵觸也没入也儳進退無列其血氣不治若禽獸焉其適來班貢不俟馨香嘉味適往也班賦也故坐諸門外而使舌人體委與之舌人能逹異方之志象咠之官汝今我王室之一二兄弟以時相見於是乎有折俎加豆加豆謂旣食之後所加之豆也其實芹俎莬醢之属以示容合好胡有効戎狄也又曰驪姬曰以臯落狄之朝夕苛我邊鄙臯落東山狄苛擾也君盍使申生伐狄若不勝狄雖濟其罪可也且夫勝狄諸侯驚懼吾邊鄙不警公說使申生伐東山至稷桑稷桑臯落狄地狄人出逆申生欲戰狐突諌曰不可果戰敗狄於稷桑又曰公令閹楚刺重耳重耳逃於狄狄北狄隗姓又曰襄王避叔帶之難居于鄭地汜子犯曰君盍納王公乃行貽于草中之戎驪土之狄以啓東道二邑戎狄在晉之東也尚書大傳曰狄人將攻大王亶父亶父召耆老而問曰狄人何欲耆老對曰欲得菽粟財貨太王曰與之毎與而狄人之至不止太王問耆老曰狄人又何欲耆老曰又欲土地太王曰與之耆老曰君不爲社稷乎太王曰社稷所以爲民也不可以所爲亡民也耆老曰君縱不爲社稷不爲宗廟乎太王曰宗廟者私也不可以吾私害民也遂杖䇿而去過梁山止乎岐山周氏之民奔而從之者三千乗詩含神霧曰四方蠻貊制作器物多與中國反書則撗行食則合和伏則交脚皷則細腰知此類甚衆中國之所効者貂蟬胡床胡飯春秋考異記曰北狄之氣主生幽都太平御覽卷第七百九十九
