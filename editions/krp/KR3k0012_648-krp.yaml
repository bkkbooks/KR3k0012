front:
  text: 太平御覽卷第六百四十八
  hash: sha256:f779207b60e49d537a2cba535c362eafc470495f0aef84a301150e3925436259
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_648-1a}
body:
  text: 刑法部十四黥劓臏刖宫割造肉刑除肉刑論肉刑黥尚書吕刑曰墨辟疑赦其罰百鍰孔安國曰刻其顙而涅之曰墨刑疑則赦從罰六兩曰鍰鍰黄䥫也尚書刑德放曰涿鹿者竿人顙也黥者馬羇竿人面也鄭玄曰涿鹿黥皆先次刀笠傷人墨市其中故後世謂之墨土民也尚書大傳曰非事之事入不以道義而誦不祥之辭者其刑墨注曰非事而事之今所不當得爲也周禮秋官司刑職曰墨者使守門鄭玄曰墨黥也先刻面以墨窒之白虎通曰墨墨其額也取法火之勝金也得火亦變而墨也說文曰黥刑在靣也史記曰秦太子犯法衛鞅曰法之不行自上犯之將刑太子君嗣也不可施刑刑其傳公子䖍黥其師公孫賈明日秦民皆隨令行之十年秦民大恱道不拾遺山無盗賊民勇於公戰怯於私闘又曰黥布秦時爲布衣年少客相之當刑而王及壯坐黥布欣然笑曰人相我當刑而王幾是乎漢書曰文帝除肉刑當黥者髠爲城旦春律說曰男女論决髠鉗輸邊晝日防㓂虜夜暮築長城女子無軍警之事但舂食徒者也又曰黥劓之罪不及大夫故里諺曰欲投䑕而忌器器君也大夫近於君晉令曰収婢亡加銅青若墨黥黥兩眼後再亡黥兩頰上三亡撗點目下皆長一寸五分廣五分唐通典曰梁制劫身皆斬妻子𥙷兵遇赦降死者黵面爲劫字黵音都咸反十四年又除黵面之刑劓尚書吕刑曰劓辟疑赦其罰惟倍也孔安國曰劓截鼻者也尚書大傳曰觸易君命革與服制度姦兇攘傷人者其刑劓鄭玄曰攘竊也周禮秋官司刑職曰劓罪五百鄭玄曰劓截鼻令今東夷或以墨劓爲俗古刑人亡逃者之類與劓者使守關禮統曰劓刑法木勝土决其皮革也白虎通曰劓劓其鼻也法木之穿土也去鼻亦孔見漢書曰文帝除肉刑當劓者笞三百楚漢春秋曰正疆數言事而當上使參乗解玉劒以佩之天下定岀以爲守有告之者上曰天下方急汝何在曰亡上曰正疆沐浴霜露與我從軍而汝亡告之何也下廷尉劓臏尚書大傳曰决關梁踰城郭而略盗者其刑臏尚書刑德放曰臏者脫去人之臏也臏罰之屬五百象七精七宿昏中變易節氣之精也禮統曰臏刑法金勝木去其節目也周禮秋官上司刑曰刖罪五百鄭玄注曰周改臏作刖白虎通曰臏者脫其臏也取法金之刻木也風俗通曰俗說臈正祖食得兎者名之曰幸幸者善祥令人吉利也或說兎􅩋者令人面皃生􅩋露見醜惡今覺得之嘉不爲巳疾也謹案尚書夏禹始作肉刑則天象而慎其過故穿踰盗竊者􅩋去其臏骨也逮至暴秦亂獄糺紛烹爼車裂黔首窮愁飲泣永歎凢人食得兔􅩋以爲佳瑞物類以感兾全己之臏也刖尚書吕刑曰剕辟疑赦其罰倍差孔安國曰刖足曰剕也周禮秋官司刑職曰刖罪五百鄭玄曰刖斷足也周改臏作刖也刖者使守門家語曰季羔爲衛士師刖人之足俄而衛亂李羔逃刖者守門焉曰彼有缺季羔曰君子不踰曰彼有竇季羔曰君子不隊曰此有室季羔入焉旣而問其故刖者曰斷足固我罪也臨當刑君愀然不樂見於顔色此臣之所以脫君也史記曰孫臏與龐㳙學兵法龐㳙旣事魏得爲惠王將軍而自以爲能不及孫臏隂使召孫臏臏到龐恐其賢以刑法斷其兩足而黥之欲隱而勿見齊使者如梁孫臏以刑徒隂見說齊使以爲竒竊載與之齊列子曰魯施氏有二子其一好學其一好兵好學者以術干齊侯齊侯以爲公子傳好兵者以法干楚王楚王以爲軍政隣人孟氏有二子所業亦同問施氏之方施氏告之一子以術干秦王秦王曰今諸侯力争安得用仁義遂宫而放之一子以法干衛侯衛侯曰吾弱國豈可稱兵遂以刖之二人讓施氏曰子不得時也韓子曰楚人和氏得璞玉於楚山之中獻之武王武王使玉人相之曰石也王以和爲慢刖其左足及文王即位和又奉其璞王又使玉人相之又曰石也文王刖其右足文王薨成王即位和乃抱其璞而哭於荆山之下三日三夜泣盡而繼之血成王問其故曰天下刖者多矣子何哭之悲也和曰吾非悲刖也夫寳玉而題之以石直士命之以慢此吾之所以悲也王乃使玉人剖其璞而得寳焉遂名曰和氏之璧宫割尚書吕刑曰宫辟疑赦其罰六百鍰宫淫刑也男子割勢婦人幽閉次死之刑也尚書大傳曰男女不以義交者其刑宫尚書刑德放曰宮者女子淫亂執置宫中不得出割者丈夫淫割其勢也巳周禮秋官上司刑職曰宮罪五百宫者丈夫割其勢女子閉於宫若今官男女也又掌戮曰宮者使守内也以其人道絶也今丗或然禮曰文王丗子曰公族無宫刑也漢書曰漢聞李陵降匈奴上怒甚群臣皆罪陵上以問太史令司馬遷遷盛言陵事親孝與士信嘗奮不頋身以殉國家之急彼之不死冝欲得當以報漢也𥘉上遣貳師大軍出財令陵爲助兵上以遷誣罔欲沮貳師爲陵遊說下遷腐刑造肉刑尚書吕刑曰王享國百年耄荒度作刑以詰四方度時丗所宜訓作贖刑以治天下四方之民王曰若古有訓蚩尤惟始作亂延及于平民罔不㓂賊鴟義姦宄奪攘矯䖍爲鴟梟之義以相奪攘苗民弗用靈制以刑惟作五虐之刑曰法殺戮無辜爰始滛爲劓刖㭬黥三苗之主頑㐫苦吴敢行虐刑以殺戮無罪於是始大爲截人耳鼻㭬隂黥面以加無辜故曰五虐商君書曰斷人之足黥人之面非求傷民也以禁姦止過故禁姦止過莫若重刑除肉刑漢書曰齊太倉令淳于公有罪當刑詔獄還繫長安淳于公無男有五女當行㑹逮罵其女曰生子不生男緩急非有益也其少女緹縈自傷悲泣廼隨其父至長安上書曰妾父爲吏齊中皆稱其廉平今坐法當刑妾傷夫死者不可復生刑者不可復屬雖欲改過自新其道無由天子憐悲其意遂下令曰制詔衘史盖聞有虞氏之時畫衣冠異章服以爲戮而民不犯何法之至也今法有肉刑三孟康曰黥劓二左右趾合一凢三也而姦不止其咎安在無乃朕德之薄而教不明與夫刑至斷支體刻肌膚終身不息息生也何其刑之痛而不德也豈稱爲民父母之意哉除肉刑者有以易之丞相張蒼御史大夫馮敬奏言肉刑所以禁姦所由來者乆矣陛下下明詔憐萬民之一有過𬒳刑者終身不息及罪人欲改行爲善而道亡繇至於盛德臣等所不及也臣謹議請定律曰諸當完者完爲城旦舂文帝除肉刑皆有以易之故以完易髠以笞代劓以釱左右趾代刑此言髠者完之也當黥者髠鉗爲城旦舂當劓者笞三百當斬左趾者笞五百當斬右趾及殺人先自告及吏坐受賕枉法守縣官財物而即盗之巳論命復有笞罪者皆弃市命者名也成其罪也趾足也當斬右足以其罪次重故從弃市也殺人先自告謂殺人而自首吏受賕枉法守縣官財物而盗之者此三罪已論名而又犯笞罪即皆弃市也罪人獄巳决完爲城旦舂满三嵗爲鬼薪白粲鬼薪白粲一嵗爲隷臣妾隷臣妾一嵗免爲庻人應劭曰取薪給宗廟爲鬼薪白粲生擇使正白粲然論肉刑續漢書曰時論者多欲復肉刑孔融乃建議曰古者敦厖善否區別吏端刑清政無過失百姓有罪皆自取之末丗陵遲風化壊亂政撓其俗法害其民故曰上失其道民散乆矣而欲繩之以古刑投之以殘弃非所謂與時消息者也紂斮朝渉之脛天下謂爲無道夫九牧之地千八百君若各刑一人是天下常有千八百紂也求俗休和弗可得巳且𬒳刑之人慮不念生志在思死類多趣惡莫復歸正風沙亂齊伊戾禍宋趙髙英布爲丗大患不能正人遂爲非也故明德之君逺度深惟棄短就長不茍革其政者也朝廷善之卒不改焉魏志曰鍾繇上䟽曰大魏受命繼蹤虞夏孝文革法不合古道先帝聖德固天所縱典墳之業一以貫之是以繼丗仍發明詔思復古刑爲一代法連有軍事遂未施行陛下逺追二祖遺意惜斬趾可以禁惡恨入死之無辜使明習律令與群臣共議出本當右趾而入大辟者復行此刑書云皇帝清問下民鰥寡有辭於苗此言堯當除蚩尢有苗之刑先審問於下民之有辭者也若今蔽獄之時訊問三槐九棘群吏萬民使如孝景之令其當弃市欲斬右趾者許之其黥劓左趾宫刑者如孝文易以髠笞能爲姦者率年二十至四五十雖斬其足猶任生育令天下人少於孝文之丗下計所金嵗三千人張蒼除肉刑所殺嵗以萬計臣欲復肉害刑嵗生三千人䟽奏詔曰太傳學廣才髙留心政事文於刑理深逺此大事公卿群僚善共平議司徒王朗議以爲繇欲輕減大辟之條増益刖刑之數此則起偃爲竪化屍爲人矣然臣之愚猶有未合微異之意夫五刑之屬著在科律科律自有減死一等之法不死即爲減死施行巳乆不待逺假斧鑿於彼肉刑然後罪次也前丗仁者不忍肉刑之慘酷是以廢而不用不用巳來歴年數百今復行之恐其所減之文未彰於萬民之目而肉刑之問巳宣於㓂讎之耳非所以來逺人也議者百餘人與朗同者多帝以呉蜀未平且寢王隱晉書曰曹彦議云嚴刑以殺犯之者寡刑輕易犯蹈惡者多臣謂玩常苟免犯法乃衆黥刖彰刑而民甚耻且創黥刖見者知禁彰罪表惡亦足以畏所以易曰小懲大戒豈蹈惡者多耶假使惡多尚不至死無妨産育苟必行殺爲惡縱寡而不已將至無人天無以神君無以尊矣故人寧過不殺是以爲上寧寛得衆若乃于張聽訟刑以止刑可不革舊過此以往肉刑冝復肉刑於死爲輕減死五百爲重重不害生足以懲姦輕則知禁禁民爲非所謂相濟經常之法議云不可或未知之也又曰尚書梅陶問光禄大夫祖納漢文帝故當爲英雄旣除肉刑而五六百歲無能復者納荅曰諸聖制肉刑而漢文擅除已來無勝漢文帝者故不能復非聖人者無法何足爲英雄於是陶不能對隱白征西大將軍曰夫政未可立則思制度全育民命冨國強兵叛盗之屬斷支而已是好生惡殺叛盗皆死是好殺惡生也斷支若謂之酷截頭更不謂之虐何其乖哉刑罰不中則民無所措手足也蠻夷猾夏則臯陶作士此欲善其末則先制其本也自古多人猶惜民命得以御㓂况今千不遺一益冝存在以伐大賊今若得改之則歲活數萬生數亦如之若此十載生各數萬斷支之後隨刑使役不失民不乏用冨國強兵此之謂也又曰劉頌上書曰古者刑以止刑及今反於刑生刑以徒生徒諸重犯亡者髮過三寸輒重髠之此以刑生刑亡加作一歲此以徒生徒也亡者積多繫囚猥蓄議者因曰不可不赦復從而赦之此爲刑不制罪法不勝姦民知法之不勝相聚而謀爲不軌故自頃以來姦惡陵暴所在充斥漸以滋蔓日積不巳弊將所歸議者不深思此故而曰肉刑於名忤聽忤聽孰與盗賊不禁聖王之制肉刑逺有深重其事可得而言非徒懲其畏剥割之痛而不爲也乃去其爲惡之具使夫姦民無用不復肆其志止姦絶本理之盡也亡者刖其足無所用復亡盗者截其手無所用復盗淫者割其勢理亦如之除惡塞源莫善於此又非徒然也此等巳刑之後便各歸家父母妻子共相飬恤瘡愈可役上准古制隨冝業作雖巳刑殘不爲虐也生育繁阜之道自若也今冝取死刑之限重生刑之限輕及三犯逃亡滛恣悉以肉刑代之其三歲刑以下冝杖罰及冝制其罰數使有常限後刑不復生刑徒不復生徒而殘體爲戮終身作誡民見其痛畏而不犯必數倍於今且爲惡者隨發𬒳刑去其爲惡之具豈與全其爲姦之手足而戚居必死之窮地哉而猶曰肉刑不可用臣切以爲識務之甚也愽物志曰肉刑明王之制荀卿毎論之漢興文帝感太倉公女之言而廢之班固著論云冝復之迄漢末魏𥘉陳紀又論冝申古制孔融謂不可復魏武帝輔漢欲申之鍾繇王㓪不同遂寢夏侯玄李勝曹義逹丁謐建私議各有彼此多言時未可復故遂寢崔寔政論曰髙祖非九章之律髙后深三族之罪文帝去肉刑景帝減加笞由此言之丗有所更何獨拘前太平御覽卷第六百四十八
