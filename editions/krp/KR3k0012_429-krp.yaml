front:
  text: 太平御覽卷第四百二十九
  hash: sha256:d1ceca1430683e7951dfa7da43f14ae035167912cfb776376d17995df94fcd9a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_429-1a}
body:
  text: 人事部七十公平尚書洪範曰無偏無黨王道蕩蕩無黨無偏王道平平礼記曰昔衛献公出奔反國及郊將班邑於從者而後入栁莊曰如皆守社稷則孰執覊勤而從如皆從則孰守社稷君反其國而有私也無乃不可乎於是弗果班又孔子間居曰子夏曰三王之德叅於天地敢問何如孔子曰奉三無私以勞天下曰敢問何謂三無私子曰天無私覆地無私載日月無私照奉斯三者以勞天下又儒行曰儒有内稱不避親外舉不避怨左傳文上曰賈季奔狄宣子使臾駢送其孥孥妻子也宣子以賈季中軍之佐同官故也夷之蒐賈季戮臾駢臾駢之人人臾駢從臣也欲盡殺賈氏以報之臾駢曰不可吾聞前志有之曰敵惠敵怨不在後嗣忠之道也敵猶對也夫子禮於賈季我以其寵報私怨無乃不可乎介人之寵非勇也介因也損怨益仇非智也以私害公非忠也釋此三者何以事夫子盡具其孥與其噐用財賄親帥扞之送致諸境又襄上曰祁奚請老晉侯問嗣焉稱解狐其讎也將立之而卒解狐之卒又問焉對曰午也可午祁奚子於是羊舌職死矣晉侯曰孰可以代之對曰赤也可赤職之子伯華於是使祁年爲中軍尉羊舌赤佐之君子謂祁奚能舉善矣稱其讎不爲謟立其子不爲比舉其偏不爲黨啇書曰無偏無黨王道蕩蕩其祁奚之謂矣又昭七年曰晉韓宣子卒魏献子爲政魏舒魏戊爲梗陽大夫戊舒之庶子也梗陽在太原也魏子謂成鱄鱄晉大夫吾與戊也縣人其以我爲黨乎對曰何也夫舉無他唯善所取親踈一也論語雍也曰子游爲武城宰孔子問之曰汝得人焉耳乎汝爲此宰寧得賢人與之耳語助也對曰有澹臺滅明者行不由徑非公事未甞至於偃之室史記曰邑人出獵任安常爲人分麋鹿雉兔部署小大劇易衆人皆喜曰任少卿分別平又曰陳平爲社宰分肉甚均里父老曰善哉陳孺子之爲宰平曰嗟乎使平得宰天下亦如此肉漢書曰蕭何不與曺叅相能及何病惠帝自臨視因問君即百歲後誰可代君對曰知臣莫若主帝曰曺叅何如何稽首曰帝得之矣臣死不恨又曰朱邑惇篤於故舊然性公正不可交以利天子器之東觀漢記曰耿嵩字文都鉅鹿人履清髙之節髫童介然特立不隨於俗郷黨大人莫不敬異之王莾敗盗賊起宗族在兵中榖食饑貴宗家數百人升合分粮時嵩年十二三宗人長少咸共推令主廩莫不稱平又曰隂興字君陵盡忠竭思其無益於國雖在骨肉不以私好害公義與張宗鮮于褒不相喜而知其有用猶稱其所長而薦之張汜杜禽之徒與興厚善以其華而少實私貨以財終不爲言是以丗稱其忠平又曰第五倫字伯魚京兆尹閻興召爲主簿時長安鑄錢多姦巧乃署倫爲督鑄錢掾領長安市長倫平銓衡正斗斛市無阿枉百姓恱服又曰呉漢甞出征妻子在後買田業漢還讓之曰軍師在外吏士不足何多買田宅乎遂盡以分與昆弟外家謝承後漢書曰張陵清河人𥘉爲梁兾弟胤舉孝廉正月𥘉歲百官朝賀兾恃豪勢不卹王憲帶劔入省陵主臺中威儀呵兾使出勑羽林虎賁奪其劔胤爲陵曰昔舉君適所以自伐也荅曰明府不以陵之不德誤見擢序不敢阿公以報私恩㣧有媿色華嶠後漢書蔡孟喜汝南頓人以禮化郷里郷里有諍訟者輙詣喜决之其所平處皆曰無怨范曄後漢書曰袁紹官渡之役審配二子爲曹操所擒逢紀與配不睦紹以問之紀對曰配天性烈直毎所言行慕古人之節不以二子在南爲不義也公勿疑之紹曰君不惡之耶紀曰先所爭者私情今所陳者國事紹曰善乃不廢配又曰蘇章字孺文扶風平陵人順帝時遷兾州刺史故人爲清河太守章行部案其姦贓乃請太守爲設酒殽陳平生甚欣太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲者私恩地明日兾州刺史案事者公法也遂舉正其罪典略曰荀彧在臺閣不以私欲撓意彧有群從一介才徳實薄或謂彧曰以君當事不可以某爲議郎耶彧笑曰官者所以表才也若如汝言衆人其謂我何其持心平實皆類此也魏志曰王觀字偉臺東郡廩丘人爲南陽太守明帝即位下詔書使郡縣條爲劇中平者主者欲言郡爲中平觀敎曰此郡濵近外虜數有㓂害云何不爲劇耶主者曰若郡爲外劇則恐於明府有任子觀曰夫君者所爲民也郡外劇則於役調當有降差豈可爲太守之私而負一郡之民遂言爲外郡送任子詣鄴時觀但有一子而又㓜弼其心公如此又曰魏國𥘉建時未立太子臨淄侯植有才而愛太祖狐疑以亟令密訪於外唯崔琰露荅曰蓋聞春秋之義立子以長加五官郎將仁孝聦明冝承正統琰以死守之植琰之兄女壻太祖貴其公亮蜀志廖立傳曰諸葛亮爲人公直表廢立徙汶山立聞亮卒泣曰吾其左祍矣又李傳曰亮表廢平徙梓潼平聞亮卒乃發病死習鑿齒曰夫水至平而邪者取法鏡至公而醜者忘怒水鏡之所以能窮物而不怨者以其無私也水鏡無私猶以免謗况大人君子懐樂生之心流矜恕之德爵之而非私誅之而非怒天下豈有不服也哉故蜀志評曰諸葛亮之爲國開誠心布公道其盡忠益時者雖讎必賞犯法怠慢者雖親必罰呉志曰吕蒙字子明甞以部曲事爲江夏太守蔡遺所白蒙無恨意及豫章太守顧邵卒權問所用蒙因薦遺奉職佳吏權笑曰君欲爲祁奚耶於是用之甘寧麁暴好殺旣甞失蒙意又時逹權令權怒之蒙輙陳請曰天下未定闘將如寧者難得冝容忍之權遂原寧卒得其用徐廣晉紀曰劉弘字和季在襄陽帝在西京命弘選良才乃稱守宰徴士武陵五朝字丗朗髙尚荆王牙門將魯國皮𥘉有勲江漢弘上言朝爲零陵太守𥘉爲襄陽内史詔以襄陽顯郡𥘉資名未允以弘壻前東平太守夏侯陟爲襄陽弘曰夫揔天下者當與天下同心治一國者當與一國推實吾揔荆州十郡安得十女壻然後爲治乃表陟㛰親舊制不得相臨燕書曰梁琛使秦琛從兄弈先在秦爲尚書郎㑹罷秦主欲令琛止弈舎琛語有司曰昔諸葛亮兄弟各處三國及其聘集公朝相見退無私靣君子之志余敢忘乎竟不詣弈數就邸舎因問東國起居琛曰今二方鼎據兄弟並蒙附寵論心各有所在今欲以東國事語君恐非西國之所欲聞周書曰王羆字熊京兆覇陵人也性嚴急處物必當毎至享㑹自秤量酒肉給付將士時人尚其均平宋書曰張邵有佐命功元嘉五年爲征虜將軍領寜蠻校尉𥘉王華與邵不和及華叅要親舊爲之危心卲曰子陵方弘至公豈以私隙害正義是任也華實舉之唐書曰房玄齡爲尚書左僕射旣任揔百司䖍恭夙夜盡心竭節不欲一物失所聞人之善若巳有之明逹吏事而縁飾以文雅審定法令意在寛平不以求備取人不以已長格物隨能収叙無隔卑賤論者稱爲良相焉又曰張文瓘爲大理卿旬日決遣疑事四百餘條莫不允當自是人有抵罪者皆無怨言又曰奚陟字殷卿知吏部選事銓綜平允有能名遷吏部侍郎所莅之官時以爲稱職又曰韋承慶自天授巳來三掌天官選事銓授平允海内稱之又曰楊纂除吏部侍郎典選十餘載銓叙人倫稱爲允當然而抑文雅進黠吏觀時任數頗爲時論所譏尸子曰自井中窺星所見不過數星自丘上望之則見其始出也夫私心井中公正丘上也愼子曰有權衡者不可欺以輕重有尺寸者不可差以長短有法度者不可巧以詐僞又曰夫投鈎分財投䇿分馬非以鈎䇿爲均也使得羙者不知所以德得惡者不知所以怨故蓍龜所以立公識也權衡所以立公正也書契所以立公信也度量所以立公審也法制禮籍所以立公義也凢立公所以弃私也國語曰趙宣子言韓獻子於靈公以爲司馬宣子趙孟獻子韓厥河曲之役趙孟使人以其乗車奸行獻子執而戮之衆咸曰韓厥必不役矣其主朝登之而夕戮其車車車僕也宣子召禮之告諸大夫曰可賀我矣吾舉厥而忠吾乃今知免於罪矣家語曰澹臺滅明公正無私韓詩外傳曰直者順道而行順理而言公平無私不爲安肆志不爲危易行又曰楚有白公之難有壯之善者辭其母將死君難其母曰棄母死君何乎壯之善曰聞事君者内其禄而外其身今之所養母者君之禄也請往死之比至朝三廢車中其僕曰子懼如是何不返也壯之善曰懼吾私也死吾公也吾聞君子不以私害公遂徃死之韓子曰古之全大體者則天地觀江海不以智累心不以私累巳寄治乱於法術託是非於賞罰属輕重於權衡不逆天理不傷情性不引繩之外不推繩之内不急法之外不緩法之内守成理因自然禍福主乎道法而不出乎愛惡榮辱之責在巳而不在乎人故名成於前德垂於後治之至也又曰解狐與荆伯栁爲怨趙簡主問於解狐曰孰可以爲上黨守對曰荆伯栁可趙簡主曰非子之讎乎對曰臣聞忠臣舉賢不避仇讎其廢也不阿親近簡主曰善遂以荆伯栁爲守韓詩外傳曰魏文侯問解狐曰寡人將立西河之守誰可用解狐舉其讎荆伯栁文侯乃用又曰爲人臣者北面委質有口不以私言有目不以私視又曰解狐薦其讎以爲相其讎性拜謝解狐引弓迎而射之吕氏春秋曰堯有子十人不予其子而授舜舜有子九人不予其子而授禹至公也周語曰舜有啇均此曰九子不知出何書墨者鉅子腹䵍居秦鉅姓子男子通稱䵍續大車啍啍之啍也其子殺人秦惠王曰先生之年長矣非有他子寡人已令吏弗誅對曰墨者之法殺人者死傷人者刑此所以禁殺傷天下之義也王雖爲之賜賜愛而令吏弗誅腹䵍不可不行墨者之法遂殺之子人之所私也忍所以行大義鉅子可謂公矣又曰晉平公問祁黄羊曰南陽無令其誰可乃舉其讎解狐又問國無尉其誰可乃舉其子午孔子聞之曰祁黃羊可謂至公也又曰天無私覆地無私載日月無私燭四時無私爲又曰昔先聖王之治天下必先公公正也公則天下平矣其得之必以公其失之必以偏偏私下正又曰荆人有遺弓者弗肯索曰荆人遺之荆人得之又何求焉孔子聞之曰去其荆而可矣老聃聞之曰去其人而可矣故老聃則至公得矣又曰天下非一人之天下也天下之天下也書云皇天無親惟德是輔故天下之天下隂陽之和不私長一類甘露時雨不私長一物私猶異也萬民之主不阿一人又曰夏不衣裘非愛裘也煖有餘也冬不用翣翣扇也非愛翣也清有餘也清寒聖人不爲私非愛費也節乎巳也說苑曰人臣之公治官事則不營私處公門則不言貨當公法則不阿親奉公舉則不避仇讎忠於事君謂之公又曰楚令尹虞丘子言於莊王曰臣聞奉公行法可以得榮能淺行薄無望上位臣爲令尹十年國不加治竊選俊士孫叔敖秀才多能其性無欲君舉而授之政則國可寧莊王從之賜虞丘子田三百號曰國老以孫叔敖爲令尹少焉而虞丘子家干法孫叔敖執而戮之虞丘子喜入見於王言孫叔敖果可使持政奉國法而不黨施刑戮而不乱可謂公平莊王曰夫子之賜也又曰楚令尹子文之族有奸法者廷理拘之聞其令尹族也釋之子文召廷理而責之曰今立廷理者將以伺犯王令察觸國法者也於犯法甚明而使廷理縁吾私心釋之是吾不公之心明著於國執一國之柄而以私聞吾生無義吾不若死遂致其族人於廷理曰不是刑也吾將死廷理懼遂刑其族人又曰晉文侯問於咎犯誰可使爲西河守者對曰盧子羔可曰子羔非汝之仇歟曰君問可爲守者非問臣之仇也子羔見咎犯謝之曰君幸赦臣之過薦於君得爲西河守咎犯曰薦子者公也吾不以私事害公義子其去矣頋吾射之矣周生列子曰天下所以平者政平也政所以平者心平也心所以平者衡平也衡所以平者銖兩平也銖兩所以平者毫釐平也無所不均也無所不平也謂之太平夫天之於物無所偏阿君之散恩無所外内任子曰以義事主不私其巳以仁接人不謀其欲火佚焚家家不罪火食過傷人人不罪食以其積之於仁義無私害也伊尹放太甲太甲無怨心管仲黜伯氏伯氏無怨言以其積之於公正無私惡也抱朴子曰君人者必脩諸巳以先四海去偏黨以平王道遣私情以摽至公魏武令曰今壽春漢中長安先欲使一見各往督領之欲擇慈孝不違吾令亦未知用誰也兒雖小時見愛而長大能善必用之吾非有二言也不但不私臣吏兒子亦不欲有所私諸葛亮書曰吾心如秤不能爲人作輕重應享與州將牋曰夫公正治化之夲德敎之基公則無私正則無邪無邪無私而患政敎不行未之有也昔叔向論叔魚之罪石碏討石厚之亂祁奚稱解狐之賢臧紇思孟孫之愛春秋嘉之敦崇世敎經乎百王厝乎盛衰其義不傾公正之德弘矣重矣明君之所以揔天下賢臣之所以奉上民庶之所以繫仰德化之所以羙盛公正之可不勉哉曹羲至公論曰夫丗人所謂掩惡揚善者君子之大義保明同好朋友之至交斯旨之作盖閭閻之白談所以救愛憎之相謗崇居厚之大分耳篤正之至理折中之公議也丗士不料其數而係其故善惡不分以覆過爲弘朋友忽義以雷同爲美善惡不分亂實由之朋友雷同敗必從焉談論以當實爲清不以過難爲貴相知者以等分爲交不以雷同爲固是以逹者存其義不察於文識其心不求於言嵇康釋私論曰不知冒隂之可以無景而患景之不匿不知無情之可以無患而恨情之不巧豈不哀哉未有抱僞而身立清丗藏情而信著明君者也是以君子旣有其質又覩其鑒貴夫亮逹希而存之惡夫矜恡弃而逺之言無苟諱而行不苟隱不也愛之而苟善不以惡之而苟非心無所矜而情無所擊體清神立而是非允當忠感明天子而信篤乎萬民寄胷懷於八荒垂坦蕩於永日斯非賢人君子髙行之美者乎太平御覽卷第四百二十九
