front:
  text: 太平御覽卷第六百四十四
  hash: sha256:9a854e58e86e20b775fbae28f9d431379cc89fe6c5f8bee1b89a53092dba0756
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_644-1a}
body:
  text: 刑法部十械拲鏁鉗械易蒙卦曰利用刑人用說桎梏又噬嗑曰𥘉九屨校滅趾無咎校者以木絞者也即械也校者取其通名也傳曰郤犫與長魚矯争田執而梏之梏械也與其父母妻子同一轅繫之車轅又曰宋華弱樂轡少相狎長相優又相謗也優調戯也子蕩怒以弓梏華弱于朝子蕩樂轡也張弓以貫其頸若械之在手故曰梏平公見之曰司武而梏於朝難以勝矣司武司馬也言其懦弱不足以勝敵也說文曰梏手械所以告天桎足械所以質地也史記曰桓公乃徉爲召管仲欲甘心焉實欲用之鮑叔牙迎受管仲及堂阜而脫之桎梏漢書曰有罪當盗械者皆頌繫應劭曰智畧令各有當盗但頌繫者言見寛容但處曹吏舎不入堅牢盗着也恐亡故着械不謂盗竊乃械也謝沈後漢書曰赤眉入長安時式侯㳟以弟盆子爲赤眉所尊故自繫赤眉至更始奔走式侯從獄中叅械出街中具獄門中魏略曰賈逵爲丞相主簿王欲征呉逵諌之王怒付獄獄吏以逵主簿不即着械逵曰促我械王且疑我在近職求緩於卿將遣來察着械適訖而果遣視之江表記曰孫䇿得太史慈即勑破械使沐浴賜衣巾并設酒食魏志曰田豫爲汝南太守先是郡人侯音反前太守収其黨五百餘人皆當死䂊悉見慰喻破械遣之諸囚叩頭願効即相報語群賊解散呉志曰陳表傾意待士皆樂爲用命時有盗官物者疑施明明壯悍収考極毒雖死不伏廷尉以聞權以表使自以意求其情實表便破械沐浴易其衣服厚設酒食欲以誘之明乃首服晉書曰范廣爲堂邑令丞劉榮坐事當死郡以付縣榮即縣人家有老母至節廣輒蹔還榮亦如期而返縣堂爲野火所及榮脫械救火事畢還自着械又曰并州刺史司馬騰執諸胡於止東賣充軍實將詣兾州兩胡一枷石勒亦在中又載記曰符丕敗徐義爲慕容永所獲械堙其足將殺之義誦觀丗音經至夜圡開械脫出於重禁之中若有人脫之者遂奔後魏書曰孝文太和𥘉時法官及州郡縣多爲重枷復以縋石懸於囚頸傷肉至骨勒以誣服吏以爲能帝聞而傷之乃制非大逆有明證而不疑辭者不得大枷又曰宋飜爲河南令縣舊有大枷時人號曰方結切尾青及飜爲縣主吏請焚之飜曰且置南墻下以待豪猾未幾有内監楊小駒詣縣請事辭色不遜飜命取青尾以鎮之小駒旣免入訴於宣武宣武大怒勑河南尹推之飜具自陳伏詔曰卿固違朝法豈不欲作威以買名飜對曰造具亦非臣所以留者非敢施於百姓欲待兇暴之徒如駒者耳由是威振京師三國典略曰東魏中尉宋遊道限外受故選狀詞渤海王怒而禁之獄掾欲爲之脫枷逰道不肯曰此王命所着不可輒脫王聞而宥之北齊書曰庫狄遷封武章郡王其子士文爲貝州刺史性孤直其子㗖官厨餅枷於獄累日杖之二百歩送還京蕭子顯齊書曰戴僧静㑹稽永興人也少有膽力便弓馬於都載錦爲歐陽式所得繫兖州獄太祖遣薜淵餉僧静酒食以刀子置魚膓中僧静與吏飲醉以刀刻械手自折鎻發屋而出歸太祖後周書曰栁慶爲雍州别駕廣陵王元欣魏之懿親其甥孟氏屢爲凶横或有告其盗牛慶捕推得實趣令就禁孟氏殊無懼容乃謂慶曰今若加以桎梏後復何以脫之欣亦遣使辨其無罪孟氏由此益驕慶於是大集僚吏盛言孟氏依倚權戚侵虐之狀言畢便令笞殺之此後貴戚歛手不敢侵暴唐書曰酷吏來俊臣所作大枷凡有十號一曰定百脉二曰喘不得三曰突地吼四曰着即臣五曰失魂膽六曰實同反七曰反是實八曰死猪愁九曰求即死十曰求破家又令寢處糞穢備諸苦毒自非身死終不得出山海經曰貳負之臣曰危與貳負煞窫窳帝乃梏之䟽屬之山桎其右足桎械也反縛兩手與髮繫之山上郭璞注曰漢宣帝使人作上郡發盤石石室得一人徒役𬒳髮反縛械一足以問群臣莫能知劉子政案此對之帝大驚於是時人争學山海經也又曰大荒之中有宋山者有木生山上名楓木蚩尤所弃桎梏蚩尤黄帝所得械之煞巳擲弃其械化而爲樹也異苑曰新野庾紹之少子道遐與南陽宋恊中表之親桓玄時庾爲湘東太守病亡恊以義熈中晨起服茱茰酒一小兒通云庾湘東湏臾便至兩脚着械脫之而坐孟子曰盡其道而死者正命也桎梏死者非正命也吕氏春秋曰齊有善相狗者其隣畜之數年不取䑕以告相者相者曰此良狗也志在麞豕鹿不在䑕也欲其䑕則桎之其隣桎其後足則狗取䑕矣賈誼書曰紂作梏數千睨諸侯之不謟巳者而桎梏之文王桎梏囚于羑里七年而後得免及武王剋殷旣定令殷之民連梏而流之於河民輸梏者以手㯙之弗敢敗之跪入之水不敢投也昔者文王擁此故思愛文王猶敬其梏况其法教乎風俗通曰延嘉中京師長者皆着木屐婦人始嫁至作􅃮畫五采爲系謹案黨事始發傳詣黄門北寺臨時惶恐不能信天任命多有逃亡不就栲者九族拘繫及所過歴長少婦女皆𬒳桎梏應木屐之像矣又曰械戒也所以警戒使爲善也桎實也言其下垂至地然後吐情首實語林曰嵇中散夜彈琴忽有一鬼着械來歎其手快曰君一絃不調中散與琴調之聲更清婉問姓名不對疑是蔡伯喈伯喈將亡亦𬒳桎梏拲音拱周禮秋官上曰掌囚掌守盗賊凡囚者上罪梏拲而桎王之同族拲有爵者桎以待弊罪拲者兩手共入一木王同性及命上巳上雖有上罪或拲或桎而巳弊猶断也晉令曰死罪二械加拲手趙書曰後石率精騎五千襲邵續一戰生禽續於青丘鉗頸拲手於襄國青陽城門頓頭稱囚鎻說文曰銀鐺鏁也漢書食貨志曰王莽爲貨有誹詛者郡國檻車䥫鏁傳送長安鍾官又王莽傳曰民犯錢伍人相坐没官爲奴婢其檻車兒女歩以䥫鏁銀鏁其頸傳至鍾官奴以千萬數華嶠後漢書曰崔鈞爲西河太守與袁紹起兵董卓収鈞父烈下之郿獄銀鐺卓誅烈得歸長安也王隱晉書曰石勒鏁苟晞頸以爲司馬而反煞之南史曰丹徒縣令沈㠝之以清廉􅔰罪㠝之呉興武康人性踈直在縣自以清廉不事左右浸潤日至遂鏁繫尚方歎曰一見天子足矣上召問曰復欲何陳荅臣坐清所以獲罪上曰清復何以獲罪曰無以承奉要人上曰要人爲誰㠝之以手扶四面指曰此赤衣諸賢皆是若臣得更鳴必令清譽日至㠝之雖危言上亦不責後知其無罪重除丹徒令又曰禇玠除山隂令縣人張次的王休逹等與諸猾吏賄賂通姦全丁户類多隱没玠鏁次的等具狀啓臺宣帝手勑慰勞并遣使助玠捜括所出軍人八百餘户三國典略曰梁湘東王以鮑泉圍湘州乆不䧟使平南將軍王僧辯代爲都督數泉十罪舎人羅重懽帥三百與僧辯俱發先令通泉曰羅舎人𬒳令送王竟陵來泉愕然頋左右曰得王竟陵助我賊不足平俄而重懽先入僧辯繼之泉方拂席而坐僧辯曰鮑郎卿有罪令旨令我鏁卿勿以故意相待羅重懽宣令即鏁之於牀側泉舉止自若謂重懽曰稽緩王師甘受其罪但恐後人更思鮑泉之憤耳僧辯意甚不平泉乃爲啓自申并謝淹遲之罪湘東怒解遂釋之宋躬孝子傳曰繆斐字文雅東海蘭陵人父忽得患醫藥不給斐晝夜叩頭不寢不食氣息將盡至三更中忽有二神引鏁而至求哀曰尊府君昔經見侵故有怒報君至孝所感昨爲天曹所攝鏁銀鐺斐驚視父已差父云吾病恒見二人見持向來忽不見斐乃具說父曰吾曽過五子胥廟引二神像置地當此是也劉欣期交州記曰居風山去郡四里夷人從太守裴庠求市此山云出金旣不許㝷有一嫗行田見金牛出食斫得鼻鏁長丈餘人後徃徃見牛夜出其色光耀數十里鉗說文曰鉗䥫有所刼束也􅎂脛鉗也􅎂音遞史記曰衛青平陽人其父爲吏與給事平陽侯家妾通生青爲侯家人少時歸其父使牧羊先母之子皆奴畜之不以爲兄弟青嘗至衆居室有一鉗徒相青曰貴人也官至封侯青歎曰人奴得無笞罵即足矣安得封侯晉令曰徒着鉗者刑竟録輸所送獄官晉律曰鉗重二斤翹長一尺五寸太平御覽卷第六百四十四
