front:
  text: 太平御覽卷第五百七
  hash: sha256:5f05e13b4565b37a7b92e8e7a14ef36b98b2832d569079da50e37952ceaa87ea
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_507-1a}
body:
  text: 逸民部七逸民七皇甫士安髙士傳曰荷蕢者衛人也避亂不仕自匿姓名孔子擊磬於衛乃荷蕢而過孔氏之門曰有心哉擊磬乎旣而曰硜硜乎莫巳知斯巳而巳矣深則厲淺則掲孔子子聞之曰果哉蔑之難矣姓曰石門守者魯人也亦避丗不仕自隱又名爲魯守石門主晨夜開閉之子路從孔子入石門而宿問子路曰奚自子路曰自孔氏遂譏孔子曰是知其不可而爲之者與時人賢焉又曰東郭順子者魏人也脩道守眞田子方師事之而爲魏文侯師友侍坐於文侯數稱谿工文侯曰谿工子師耶子方曰非也無擇之里人也稱道數當無擇稱之文侯曰然則子無師耶子方曰有文侯曰子師誰子方曰東郭順子也文侯曰然則夫子何故未嘗稱之子方曰其爲人也直情而容物物無道則正容以悟之使人意也消無擇何也以稱之子方出文侯曰逺哉全德之君子始吾以聖智之言仁義之行爲至矣吾聞子方之師形解而不敢動口鉗而不知言語所學真土梗耳夫魏真爲居累矣又曰壷丘子林者鄭人也道德甚優列禦㓂師事之又曰列禦㓂者鄭人也隱居不仕鄭穆公時子陽爲相專任刑列禦㓂乃絶迹窮巷面有飢色或告子陽曰列禦㓂盖有道之士也居君之國而窮君無乃不好士乎子陽聞而悟使官載粟數十乗以與之禦㓂出見使再拜而辭之入見其妻妻撫心而怒曰聞爲有道之妻子皆得樂今子之妻子有飢色君遺先生食先生不受豈非命也哉禦㓂笑曰君非自知而遺我也以人之言而遺我至於其罪我也又必且以人之言此吾所以不受也居一年鄭人殺子陽其黨皆死禦㓂安然獨全終身不仕著書八篇言道家之意号曰列子又曰叚干木者晉人也少貧且賤心志不遂乃治清節逰西河師事卜子夏與田子方李克翟璜呉起等居於魏皆爲將唯干木守道不仕魏文侯就造其門叚干木踰墻而避之文侯尊以容禮出過其廬而軾其僕問曰干木布衣也君軾其廬不以甚乎文侯曰叚干木不趨勢利隱處乎窮巷聲馳千里敢不軾乎文侯以名過齊桓公者盖能尊叚干木敬卜子夏友田子方故也又曰公儀潜魯人與子思爲友穆公因子思而致命欲以爲相子思曰公儀子逾所以不至也君若飢渴待賢納用其謀雖𬞞食飲水伋亦願在下風如以髙官厚禄爲釣餌而無信用之心公儀子智若魚者可也不尔則不踰君之庭且臣不佞又不能爲君操竿下釣以傷守節之士潜竟終身不屈又曰王斗齊人也修道不仕與顔歜並時曽造齊宣王門欲見宣王宣王使謁者延斗入斗曰趍見王爲好勢趍見斗爲好士於王何如謁者還報王曰先生徐之寡人請從王趍而迎之於門曰寡人奉先君之宗廟宇社稷願聞先生直言正諫斗曰王之憂國愛民不若王之愛尺之縠王曰何謂斗曰王使爲冠不使左右便辟而使工者何也爲能之也今王治齊國非左右便辟則無使也臣故曰不如愛尺之縠也王乃謝曰寡人有罪於國家矣於是舉士五人任之以官齊國大治王斗之力也又曰黔婁先生者齊人也修身清節不求進諸侯魯恭公聞其賢遣使致禮賜粟三十鍾欲以爲相辭不受齊王又禮之以黄金百斤聘以爲卿又不就著書四篇言道家之務号曰黔婁子終身不屈以壽終又曰原憲居環堵之室甕牖桑樞上漏下濕緼衣無表手足胼胝三日不舉火十年不製衣坐而彈琴子貢相衛結駟連騎排藜藿入窮閭巷不容軒來見憲憲韋冠杖藜而岀應門正冠則纓絶歛袵則肘見納屨則踵决子貢曰嘻先生何病也憲笑曰憲聞之無財謂之貧學道而不能行者謂之病若憲貧也非病也若夫仁義之慝車馬之飾憲不忍爲子貢逡廵面有慙色終身耻其言之過也又曰曽參字子羽魯哀公致邑焉參辭不受曰吾聞受人者常畏人與人者常驕人縱君不我驕我豈無畏乎又曰陳仲子齊人其兄載爲齊卿食禄萬鍾仲子以爲不義將妻子適楚居于於陵自謂於陵子仲窮不苟求不義之食遭歳飢乏糧三日乃匍匐而食井上李實之蟲者三咽而食視身自織履妻擘纑以易衣食楚王聞其賢欲以爲相遣持金百鎰至於陵聘仲子仲子入謂妻曰楚王欲以我爲相今日爲相明日結駟連騎食方丈於前意可乎妻曰夫子左琴右書樂在其中矣結駟連騎所安不過一肉而懷楚國之憂竟可乎於是謝使者遂相與逃而爲人灌園又曰披裘公者呉人延陵季子出逰見道中有遺金顧而覩公曰取彼金公投鎌瞋目拂手而言曰何子處之髙而視之卑五月披裘而負薪豈取金者哉季子大驚旣謝而問姓名公曰子皮相之士何足語姓名哉又曰江上丈人者楚人也楚平王以費無忌之䜛殺伍奢奢子貟士將奔呉至江上欲渡無舟而楚人購貟甚急自恐不脫見丈人得渡因解所佩劒以與丈人曰此千金之劒也願獻之丈人不受曰楚國之法得伍胥者爵執珪金千鎰吾尚不取何用劒爲不受而别莫知其誰貟至呉爲相求丈人不能得每食輙祭之曰名可得聞而不可得見其唯江上丈人乎又曰漁父者楚人也見楚亂乃匿名隱釣於江濵楚頃襄王時屈原爲三閭大夫名顯於諸侯爲上官靳尚所譛王怒遷之江濵𬒳髪行吟於澤畔漁父見而問之曰子非三閭大夫歟何故至斯原曰舉丗混濁而我獨清衆人皆醉而我獨醒是以見放漁父曰夫聖人不疑滯於萬物故能與丗推移舉丗混濁何不隨其流揚其波汨其泥衆人皆醉何不餔其糟歠其醨何故懷瑾握瑜自令放焉乃歌曰滄浪之水清可以濯吾纓滄浪之水濁可以濯吾足遂去深自閉匿人莫知焉又曰河上丈人者不知何國人也明老子之術自匿姓名居河之湄著老子章句故丗號曰河上丈人當戰國之末諸侯交爭馳說之士咸以權勢相傾唯丈人隱身修道老而不虧專業於安期先生爲道家之宗焉又曰樂臣公者宋人也其先宋公族其後别從趙其族樂毅顯名於諸侯而臣公獨好黄老恬静不仕及趙爲秦昭王滅臣公東之齊以老子顯名齊人尊之號稱賢師趙人田叔等皆師事之又曰盖公者齊之膠西人也明老子師事樂臣公楚漢之起齊人爭往于丗主唯盖公獨遁居不仕及漢定天下曹叅爲齊相延問諸儒數百人何以治齊人人各殊叅不知所從盖公善黄老乃使人厚幣䀻之公爲言治道貴清浄則民定遂推此爲類爲叅言之叅恱乃避正堂舎之師事焉齊果大治及叅入相漢導盖公之道故天下歌之盖公雖爲叅師然未嘗仕以終壽又曰四皓者皆河内軹人也或在汲一曰東園公二曰角里先生三曰綺里季四曰夏黄公皆修道㓗巳非義不動秦始皇時見秦政虐乃退入藍田山而作歌曰莫莫髙山深谷逶迤曄曄紫芝可以療飢唐虞丗逺吾將何歸駟馬髙盖其憂甚大冨貴之畏人不如貧賤之肆志乃共入啇洛隱地肺山以待天下定及秦敗漢髙聞之徴之不至深自匿終南山不能屈也又曰黃石公者下邳人也遭秦亂自隱姓名時人莫能知者𥘉張良易姓爲張自匿下邳歩遊沂水圯上與黄石公相遇衣褐衣而老墜履圯下顧謂良曰孺子取履良素不知乍愕然欲毆之爲其老也強忍下取履因跪進焉公笑以足受而去良殊驚公行里許還謂良曰孺子可教也後五日平明與我期此良愈恠之復跪曰諾五日平旦良徃公怒曰與老人期何後也後五日早㑹良雞鳴徃公又先在怒曰何後復五日早㑹良夜半徃有頃公亦至喜曰當如是乃岀一篇書與良曰讀是則爲王者師後十二年孺子見濟北榖城山下黄石即我遂去不見良且視其書乃是太公兵法良異之因講習以說他人莫能用後與沛公遇於陳留沛公用其言輙有功後十三年從髙祖過濟北榖城山下得黄石公良乃寳祠之及良死與石并葬焉又曰魯二徴士者皆魯人也髙祖定天下即皇帝位博士叔孫通白徴魯諸儒三十餘人欲定漢儀禮二士獨不肯罵通曰天下𥘉定死傷者未起而欲起禮樂禮樂所由起百年之德而後可舉吾不忍爲公所爲也公所爲不合古吾不行也公徃矣無汙我通不敢致而去又曰安期先生者琅瑘人受學河上丈人賣藥海邊老而不仕時人謂之千歳公秦始皇東遊請與語三夜賜金璧直數千萬出置阜鄉亭而去赤玉舄爲報留書與始皇曰後數十年求我於蓬萊山下及秦敗安期先生與其友蒯通同徃見項羽羽欲封之卒不肯受見列仙傳又曰東郭先生者與其友梁石君俱修道隱居不仕曹叅爲齊相尊禮士范陽人蒯通爲叅客入見叅曰婦人有夫死三日嫁者有幽居守寡不出門者足下即欲求婦何取叅曰取不嫁者通曰然則求臣亦由是也彼東郭先生梁石君齊之雋士也今隱未嘗卑節下意以求仕願足下禮之叅遂致禮聘二人亦終不仕齊人羙焉又曰田何字子齊人也自孔子受易丗傳至何及秦焚學以易爲卜筮之書獨不焚故何傳之不絶漢興何以齊諸田徙杜故号曰杜田生以易受弟子東武王仲洛陽周王孫丁寛齊服生梁項生等皆顯當丗惠帝時何年老家貧守道不仕帝親幸其廬以受業終爲易者宗又曰王生者漢文景時人也善爲黄老退居不仕與南陽張釋之交當時釋之爲公車令太子與梁王共入朝不下司馬門釋之劾奏太子不敬文帝善之遷至庭尉及文帝崩太子代立爲帝是謂景帝釋之懼稱病欲去用王生計乃見上謝之景帝不過也王生平常與釋之及公卿㑹庭中立王韤解顧謂釋之前跪而繫之旣退或讓生曰獨奈何辱張廷尉使跪繫韈乎生曰吾年老老且賤矣自度終無益張廷尉廷尉方爲天下名臣吾豈敢耻廷尉使繫韤乎欲重之諸公聞之皆賢王生而重張廷尉太平御覽卷第五百七
