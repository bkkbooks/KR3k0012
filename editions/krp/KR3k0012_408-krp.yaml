front:
  text: 太平御覽卷第四百八
  hash: sha256:d8c3b242fd60910ebf2ed4ea4826ed0233c1bc631823e2f37153effe8db8b2cf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_408-1a}
body:
  text: 人事部四十九交友三宋書曰晉安帝義熈𥘉高祖命瑯瑘王弘爲徐州治中從事吏不就隱于㑹稽與魯國孔淳之爲莫逆交又曰何點字子晢盧江灊人也宋徴爲庶子不就與陳郡謝瀹吴國張融㑹稽孔稚珪爲莫逆之交王智深宋紀曰孔淳之隱居剡山甞遇桑門法崇於三山披衿領契自以爲得意之交齊春秋曰檀超字恱祖髙平金郷人也少而負氣始爲南徐州西曹書佐與別駕蕭惠開抗禮惠開自以地位居前稍相凌駕而嘯慠不以地勢推之謂惠開曰我與卿並有何等宫閥俱是國家徴時外戚耳何以一爵髙人惠開欣然更爲刎剄之交齊書曰劉悛字士操彭城安上里人也從駕登蔣山上數歎曰貧賤之交不可忘頋悛曰此况卿也今日與卿盡布衣之交遊悛起拜謝又曰柳世隆字彦緒河東解縣人宋太尉元景弟也當時名士張緒王延之沈淡之徒雅相欽慕以爲君子之交又曰劉善明素與崔思祖友善聞死慟哭仍得病卒又曰孔稚珪字徳璋㑹稽人也早立名譽當時名士陸惠曉謝瀹張融何點沈淵相與爲君子之交梁書曰何遜字仲言東郡郯人也弱冠舉秀才南郷范雲見其荅策大相稱賞因結忘年交好自是一文一詠雲輙嗟賞又曰張緬弟纉遷尚書吏部河東裴子野曰張吏部有喉舌之任子野性曠逺自云年出三十不復詣人𥘉未與纉遇便相推重因爲忘年交又曰蕭介性髙簡少交遊唯與族兄琛從兄音素子洽從弟俶等文酒賞㑹時人以比謝氏烏衣之遊又曰髙祖性不好聲色頗慕髙名與裴子野劉顯蕭子雲張纉及當時才秀爲布衣交何玄之梁典曰劉許字彦度與陳留阮藉李緒申金蘭之契築室鍾阜之傍共聽内義鑚尋奥典魏書曰夏侯尚字伯仁有籌畫智略文帝器之爲布衣之交後魏書曰眭夸一名昶趙郡髙邑人也少與崔浩爲莫逆之交北齊書曰崔瞻與趙郡李槩爲莫逆之交槩將東還瞻與之書曰仗氣使酒我之恒弊詆訶指切在卿尤甚足下告歸吾於何聞過也又曰袁聿修歷任清華郎署之日值趙彦深爲水部郎中同在一院因成交友彦深後𬒳沙汰停私門生藜藋聿修猶以故情存問往來又曰裴讞魚列切之字士平不妄交遊唯與隴西辛術趙郡李繪頓丘李構淸河崔瞻爲忘年之友後周書曰柳弘字光道河東解縣人少聦潁工草隷博涉群書詞彩豐贍與弘農楊素爲莫逆之交又曰張軌濟隂臨邑人也少好學志識開㓪初在洛陽家貧與樂安孫仁爲莫逆之交毎易衣而出以此見稱又曰黎景希字季明河間鄚音莫人也好占玄象頗知術數而落魄音託不事生業與范陽盧道源爲莫逆之交又曰韋夐休政切字弘逺志尚夷簡澹於榮利周弘正乃造夐談謔盡日恨相遇之晚也後請夐至賔館夐未赴弘正乃贈詩曰徳星猶未動真車詎肯來當時所欽如此南史曰謝弘微性寛博無喜愠末年甞與友人棊友人西南棊有死勢復一客曰西風急或有覆舟者友人悟乃救之弘微大怒投扃於地識者知其暮年之事果以此歳終北史曰盧懷仁有行撿善與人交與瑯瑯王衍隴西李壽之情好相得甞語衍云昔太丘道廣許劭知而不顧嵇生峭立鍾㑹遇而絶言語處季孟之間去其太甚衍曰然三十國春秋曰憞煌太守李暠古老切表於段業暠稱盡忠不貳横爲李嗣所䜛請業殺嗣暠自歸司敗業乃殺嗣遣使謝暠𥘉嗣與暠結刎頸之交嗣常以宗族託暠曰我身猶子身勿爲疑也及是暠反爲嗣所搆暠乃恨之又曰姚萇單騎度淮見豫州刺史謝尚于壽陽幅巾以待之一面如舊相識又曰王鎭惡隨宋髙祖入關中𥘉鎭惡流寓崤澠崤澠人李方厚待之鎭惡曰待吾佇英雄王取萬户侯乃厚相報方笑曰本縣足矣鎭惡力不絶人不閑弓馬略通諸子兵書縱横有智計以此成名及是李方尚在鎭惡昇堂拜母衣方澠池令陳書曰江揔聡敏篤學有文范陽張纉瑯琊王筠南陽劉之遴並髙才碩學揔時少有名纉等雅相推重爲忘年友又曰陸景文字叔辯少有膽略武勇與陳武帝有布衣之舊隋書曰李宻與楊玄感爲刎頸之交尢好兵書常皆在口唐書曰武徳中元敬爲秘書郎太宗召爲天䇿府叅軍兼直記室薛收與元敬俱爲文學館學士時房杜等處心腹之寄深相友託元敬畏於權勢竟不之狎如晦常去小記室不可得而親不可得而踈又曰于休烈河南人也貞觀中任左僕射爲十八學士心性貞慤機鑒敏悟自㓜好學善属文與㑹稽賀朝萬齊融延陵包融爲文詞之友齊名一時又曰王琚懷州河内人也少孤而聦敏有才略好玄象合錬之學神龍𥘉甞謁駙馬王同皎甚器之及謀刺武三思事琚義許之與周璟張仲之爲忘年之友又曰蕭昕河南人也開元中首舉博學宏詞授陽武簿後遷左拾遺昕甞與布衣張鎬友善表薦之曰如鎬者用之則爲王者師不用之則幽谷一叟爾玄宗擢鎬拾遺後爲將相又曰權臯德輿之父大暦中卒于家元和中謚曰貞孝𥘉臯卒韓洄王定爲服朋友之喪李華爲其墓表以爲分天下善惡一人而已又曰杜伏威齊州章丘人也少爲盗與郷人輔公祏爲刎頸之交公祏姑家家以牧羊爲業公祏數欀羊以餵之又曰楊慿字虚受爲左散騎少負氣節與母弟凝凌相愛皆有名重交遊與穆質許孟容李鄘王仲舒爲友故時人稱穆許李之交又曰朱敬則亳州永城人也長壽中爲右𥙷闕家代孝義敬則倜儻早以詞學知名與左史江融尚書左僕射魏元忠相友善又曰劉黒闥貝州漳南人也與竇建徳少相友善家貧無以自給建德毎資之黒闥所費至盡而不以爲疑建徳亦弗之間也又曰劉孝孫者荆州人也祖貞周石臺太守孝孫弱冠知名爲當時詞人虞丗南蔡君和孔德紹庾自直劉斌等登臨山水結爲交㑹又曰陸象先弟監察御史景倩吏部侍郎景融大理正景獻河南令景裔皆有羙譽僧一行少時與象先昆弟友善常謂人曰陸氏兄弟皆有才行古之荀陳無以加也又曰楊纂華州華隂縣人也父文偉隋温州刺吏纂略渉經史尤明時務以與瑯瑘顔師古燩煌令狐徳棻音芬友善大業中進士舉終爲考功郎中又曰張道源甞與友人客遊友人病中霄而卒道源恐驚擾主人遂共屍卧逹曙方哭親歩營送至其本郷後仕隋爲監察御史又曰孔紹安越州山隂人也陳吏部尚書奐子也少以文詞知名年十三入隋徙居京兆鄠縣閉門讀誦集數十萬言時有詞人孫萬壽與紹安篤忘年之好紹安大業末爲監察御史又白李宻長安人也父寛隋上柱國蒲山公宻開皇中襲父爵年始弱冠尚書令楊素見而竒之謂其子玄感曰李宻智計不窮爾所不及可與爲友玄感遂傾心禮遇定爲刎頸之交又曰劉裔之徐州彭城人也少有學業與隋信都丞孫萬壽宗正卿李百藥爲忘年之交又曰柳宗元移栁州時劉禹錫得播州宗元謂所雜曰禹錫有母今爲郡蠻方絶域萬里如何與母偕行吾於禹錫爲執友胡忍見其若是即草奏請以柳州授禹錫自往播州禹錫易連山又曰張九齡素與中書侍郎嚴挺之尚書左丞袁仁敬右庶子梁昇卿御史中丞盧怡結交友善挺之等皆有才幹而交道終始不渝甚爲當時之所稱也太平御覽卷第四百八
