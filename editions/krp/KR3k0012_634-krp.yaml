front:
  text: 太平御覽卷第六百三十四治道部十五
  hash: sha256:ec815e62b04dab5313d21bda30633f162478900fc4f653a2f1c8c1033a0c04e4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_634-1a}
body:
  text: 急假釋名曰急及也功之使相逮及也漢書曰髙祖常吿歸之田李斐注曰告請也言請休謁也寧安也吉日告㓙日寧也漢律吏二千石有予告有賜告者在官有功最法所當得也賜告病滿三月當免天子優賜其告使得印綬將官屬歸家理病至成帝時郡國二千石賜告不得歸家自馮野王始也漢律吏五日得一下沐言休息以洗沐也又曰汲黯多病病且滿三月上常賜告者數終不愈又曰馮野王爲琅瑘太守成帝時王鳯輔政京兆尹王章譏鳯顓權薦野王代鳯上𥘉納其言而後誅章於是野王懼不自安遂病滿三月賜告與妻子歸杜陵大將軍鳯風音諷御史中丞劾奏野王賜告奏病而私自便杜欽素髙野王奏記於鳯爲野王言曰竊見今日吏二千石過長安如淳曰謁者自白得告也不分別予賜予予告也賜賜吿也今有司以爲子告得歸賜告不得歸是一律兩科失省刑之意夫三最予告令也在官連有三最則得予吿也病滿賜告詔賜也今告則得詔思不得失輕重之差又二千石病賜告得歸有故事不得去郡亡者著令鳯不聽竟免野王官謝承後漢書曰許荆字子張少䘮父養母孝順家貧爲吏無有舟車休假常單歩荷擔上下清節稱於郷里又曰范丹字史雲陳留人也爲郡功曹毎休假上下常單歩䇿杖同類以車牛與之不取又曰呉馮字子髙爲州郡吏休假先存恤行䘮孝子次贍病畢拜覲郷里耆老先進然後到家名昭逺近後漢書曰光武皇帝紀告寧之典魏志曰王思正始中爲大司農年老目暗又少信時有吏父病篤近在外舎自白求假思疑其不實發教曰丗有思婦病母者豈此謂乎遂不與假吏父明日死思無恨意其爲刻薄如此魏志曰祝皓字子春南陽平氏人也志節抗烈篤於仁義爲吏歸休周旋郷里吊死問疾畢乃還家晉起居注曰孝武太元元年詔大臣疾病假滿三月解職王隱晉書曰王􅊂音夷字季孫洛中貴盛名士王澄胡母輔之等皆與􅊂交時􅊂爲兵曹左大將軍幕澄等持羊酒詣軍門吏䟽名内請入見大將軍澄等旣入語吏過王􅊂炙羊飲酒訖而去竟不見將軍聞之因與尼長假遂得離兵宋書曰王敬弘字惔之爲祕書郎惔之曽請假還家未定省敬弘尅日見之至輙不果假日將盡惔之乞求奉辭敬弘呼前至閣復不見又曰謝景仁増弟述甞設饌請宋武帝帝召𫐠𫐠知非景仁夙意又慮非帝之命請急不從帝馳遣呼述頃至乃飡其見重如此又曰謝靈運自以名軰應叅時政王曇首王華名位素不踰之並見任遇意不平多稱疾不朝直岀郭遊行或一百六七十里經旬不歸旣不表聞又不請急上不欲傷大臣諷旨令自解靈運表陳疾賜假東歸又曰庾炳之居選部請急還家尚書令史來諮事一人善彈一人工歌留與宿有司以違制奏焉又曰伏暅音亘自以名軰素在始興内史何逺前爲吏俱稱廉白逺累見擢暅循階而已意望不滿多託居家尋求假到東陽迎妹䘮因留㑹稽築宅自表解職詔以爲豫章内史乃岀拜侍御史虞㬭奏曰風聞豫章内史伏暅去歳啓假以迎妹䘮爲辭因停㑹稽不去入東始貨宅賣車以此而推則是夲無還意暅深懷誹怨形於辭色請以大不敬論有詔勿論遂得就郡又曰謝𥙿字景仁晦從父也爲左僕射𥙿性矜嚴居家守静毎唾輙唾左右衣事畢即聽假一日浣濯每唾右右爭來受之徐爰宋書曰申恬字道獻少懷貞恪志業介然拜殿中將軍禁省八載不休急時莫之比齊書曰衡陽公諶字彦平髙帝絶服族子武帝即位除歩兵校尉領御仗主齊内兵仗委付之心膐宻事皆使叅掌欝林即位深委信諶毎請急宿出帝通夕不能寐諶還乃安梁書曰太清元年大舉北侵𥘉謀元帥帝欲用蕭範時朱异取急外還聞之遽入曰嗣王雄豪盖丗得人死力然所至殘暴非常非吊人之才昔陛下登北頋亭以望謂江右有異氣今日之事尤冝詳矣後魏書邢虬字神寳爲光禄卿虬母在郷遇患請假而歸值秋水暴長河梁断絶虬得一舡而渡舡漏而不溢時人異之唐書曰張志寛蒲州安邑人隋末䘮父哀毁骨立爲州里所稱賊帥王君廓屢爲冦掠聞其名獨不犯其閭隣里頼之而免者百餘家後爲里正詣縣稱母疾取急求歸縣令問其狀對曰母常有所苦志寛亦所苦向患心痛知母有疾令怒曰妖妄之辭也繫之於獄馳驗其母竟如所言令異之慰諭遣去襄陽耆舊傳曰習温長子宇爲執法郎取急歸賔從甚盛温怒杖宇責之曰吾聞生於乱世貴而能貧始可以後亡况侈競乎文士傳曰顧榮兼侍中安慰河北以前後功封嘉興伯求急還南旣造江渚欣然自得風俗通曰濟北李登爲從事吏病得假歸家復移刺延斯後𬒳召登自嫌不甚羸瘦謂雙生弟寧曰我兄弟相似人不能別汝類病者代我至府寧曰府君大嚴得無不可登曰我新吏耳無能覺者我自行見侯必死寧便詣府醫藥集侯有驗後爲人所言事發覺遂殺登丗說曰車武子爲侍中與王東亭諸人期共遊集車早請急出過詣王子敬子敬于時宅在建陽門内道北車求去王問卿何以怱怱車荅云與東亭諸人期共行王曰卿何以乃作此不急行車遂不敢去盡急還臺又曰頋長康作殷州請假還東尔時例不給苦求之乃得又曰張敷爲宋臺祕書郎自彭城請假還東于時相國府有一叅軍督護亦請假武帝遣傳令語敷云可載之荅曰臣性不雜遂不載俗說曰張邀在鼓城請假當歸東傳亮時爲宋臺侍中下舫中與張別張不起授兩手指着舫户外傳遂不執其手熟視張面云摣是梨中之不臧者便去陸機思歸賦序曰余牽役京室去家四載以元康六年冬取急歸而羌虜作亂王師外征機興憤而成篇范寗啓國子生假故事曰國學開建弥歷年載講誦之音靡聞考課之績不著良由導逹之訓未弘鑚仰之心弗至陵替文源冝見整正謂應断假精加督勵嚴其師訓舉善黜違啓断衆官受假故事曰伏見内外衆官陳假紛紜煩黷無巳舊有急假一月五急一年之中六十日爲限不問虚實相率如此誣罔視聽煩穢官曹舉丗行之不以爲非急假之制唯以父母妻子爲辭而伯叔兄弟制所不及長偷薄之風傷敦睦之化臣謂冝去病解故之制一年令賜衣假日隨其所欲之適任其取日多少假寧令曰諸内外官五月給田假九月給受衣假爲兩畨各十五日田假若風土異冝種收不等通隨給之又日諸百官九品私家祔廟除程給假五日四時祭祀各給假四日並課主祭者去任所三百里内亦給程若在京都除祭日仍各依朝叅又曰諸文武官若流外巳上者父母在三年給定假三十日其拜墓五年一假十日並除程若巳經還家者計還後給其五品巳上所司勘當於事毎闕者奏不得輙自奏請請冠給假三日五服内親冠給假一日並不給程又曰諸婚給假九日除程周親婚嫁五日大功三日小功巳下一日並不給程周巳下無主者百里内除程諸夲服周親已上疾病危篤逺行乆別及諸急難並量給假太平御覽卷第六百三十四
