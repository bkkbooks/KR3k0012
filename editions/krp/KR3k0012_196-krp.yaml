front:
  text: 太平御覽卷第一百九十六
  hash: sha256:1cd349ee9cf1338ed6a15dd9b5557365c2dbfc30572cfc74c77689d31b89323e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_196-1a}
body:
  text: 居處部二十四苑囿風俗通曰苑藴也言薪蒸所藴積也又曰囿者畜魚鱉之處也囿猶有也說文曰苑有園曰囿一曰養禽獸曰囿毛詩文王靈臺曰王在靈囿麀鹿攸伏左傳僖上曰齊侯與蔡姬乘舟于囿蕩公公懼變色禁之不可公怒歸之未絶蔡人嫁之又成下曰十八年秋築鹿囿書不時也又曰冬築郎囿書時也季子欲速成叔孫昭子曰焉用速成其以勦民也無囿猶可無民其可得乎又曰鄭之有原圃猶秦之有具囿注皆囿名也毛萇詩注曰囿所以養禽獸天子百里諸侯四十里大戴禮曰正月祭韮囿周官曰囿人掌囿游之獸禁鄭玄注云囿游囿之離宮小苑遊觀處也禁者其蕃衛也囿游之獸游牧之獸也史記曰漢二年東略地諸故秦苑囿園池皆令民田之又滑稽傳曰秦始皇欲大苑囿東至函谷關西至陳倉優旃曰善多縱禽獸於其中宼從東方來令獸觸之足矣始皇以故輟止又蕭相國請曰上林中多空地願令民得田苑中上大怒曰相國多受民財乃爲民請吾苑乃下廷尉械繫數日王衛尉侍曰便於民而請眞宰相事陛下距楚數歳陳豨黥布反上自擊之當是時相國守關中揺足則關巳西非陛下有也相國不此時爲利今乃利賈人之金乎陛下何疑於是使持節赦出何徒跣謝上曰休矣相國爲民請吾苑吾不許我不過爲桀紂主而相國爲賢耳漢書曰武帝好微行後南山下乃知帝微行數出也然尚迫於太后未敢逺出丞相御史知旨乃使右輔都尉徼循長楊以東右内史發小民供待㑹後乃私置更衣從宣曲以一十二所中休更衣師古曰宣曲宫名在昆明池西投宿諸宫長楊五柞倍楊宣曲尤幸於是上以爲道逺勞苦又爲百姓所患乃使太中大夫吾丘夀王待詔能用筭者二人舉籍阿城以南阿城本秦阿房宫也盩厔以東冝春以西隄封頃畒及其賈直欲除以爲上林苑屬之南山又詔中尉左右内史表屬縣草困欲以償時東方朔在傍進諌曰臣聞謙遜靜慤天表之應應之以福驕溢靡麗天表之應應之以異今陛下累郎臺恐其不髙也師古曰郎者堂下周屋也弋獵之處恐不廣也如天不爲變則三輔之地盡可以爲苑何必盩厔鄠杜乎奢侈越制天爲之變上林雖小臣尚以爲大也夫南山天下之陌也南有江淮北有河渭其地從汧隴以東啇雒以西厥壤肥饒漢興去三河之地止霸産以西都涇渭之南北所謂天下陸海之地秦之所以虜西戎兼山東者也其山出玉石金銀銅鐵豫章檀柘異類之物不可勝原師古曰原本也言說不能盡其根本也此百工所取給万民所足卬也又有秔稻梨栗桑麻竹箭之饒土冝薑芋水多䵷魚貧者得以人給家足無飢寒之憂故酆鎬之間號爲土膏其賈畒一金今規以爲苑絶陂池水澤之利而取民膏腴之地上乏國家之用下奪農桑之業弃成功就敗事損耗五榖是其不可一也且盛荆棘之林而長養麋鹿廣狐兎之苑大虎狼之墟又壞人冢墓發人室廬令㓜弱懷土而思耆老泣涕而悲是林苑又曰武帝建元三年微行始出北至池陽西至黄山南獵長楊東遊冝春皆宫觀名八九月中侍中常侍武騎及待詔隴西北地良家能騎射者期諸殿門故有騎門之號自此始也日一入山下馳射鹿豕狐兎手格熊羆馳騖禾稼秔稻之地民皆號呼罵詈也又曰宣帝神爵三年起樂遊苑三輔黄圖云在社陵又曰元始元年罷安定呼池苑以爲安民縣又曰枚乗說呉王曰漢上林離宫積聚玩好圈守禽獸不如長洲之苑游曲臺臨上路不如朝夕之池又曰戾太子旣冠就宫爲立愽望苑以通賔客范曄後漢書曰永𥘉六年春正月庚申詔越嶲置長利髙望始昌三苑又令益州置万歳苑犍爲置漢平苑又曰延熹二年𥘉造陽苑置丞尉又曰安帝永𥘉元年以廣成遊獵地假與貧民貧民廣成苑名在汝州又曰靈帝光和三年作罼圭靈昆苑罼圭苑有二東罼圭周一千五百歩中有魚梁臺西苑周三千三百歩並在洛陽宣平門外又曰靈帝光和五年始置圃囿署以宦者爲令又曰楊賜爲少府光禄勲代劉郃爲司徒帝欲造罼圭靈琨之苑賜上䟽諌曰竊聞使者並出規度城南人田欲以爲苑昔先王造苑囿裁足以修容三驅之禮薪萊芻牧皆悉徃焉先帝之制左𥙷鴻池右作上林鴻池在洛陽東上林在西不奢不約以合禮中今猥規郊城之地以爲苑囿壞沃衍廢田園驅居人奮禽獸殆非所謂若保赤子之義今城外苑巳有五六陽喜元年起西苑延熹三年造顯陽苑洛陽宫殿名有平樂苑上林苑桓帝延熹元年置鴻德苑可以逞情意順四節也冝惟夏禹卑宫太宗露臺之義以慰下人之勞書奏帝意欲止以問侍中任芝中常侍樂松等曰昔文王之囿百里人以爲小齊宣七十里人以爲大今與百姓共之無害於政也帝恱遂令築苑漢官典職曰宫内苑聚土爲山十里九坂種竒樹育麋鹿麑麂鳥獸百種激上河水銅龍吐水銅仙人銜杯受水下注天子乗輦遊獵苑中漢舊儀曰上林苑中廣長三百里置令丞左右尉苑中養百獸天子遇秋冬獵射苑中取禽無數其中離宫七十所皆容千乗万騎又曰武帝時使上林苑中官奴婢及天下民貧貲不滿五十万徙置苑中人日五錢到帝得七十億万以給軍擊西域續漢獻帝紀曰昭寧元年董卓住兵屯陽苑使者就拜司空續漢書百官志曰上林苑令一人六百石主苑中禽獸東觀漢記曰桓帝延熹元年𥘉置鴻德苑張璠漢記曰梁兾多規苑囿西至弘農東至滎陽南入魯陽北到河淇周旗十里崔鴻十六國春秋後趙録曰趙王八年春正月立桑梓苑於襄國又後燕録曰慕容熈築龍騰苑廣袤十餘里役徒二萬人又起景靈山苑内基廣五百歩峰髙十七丈又起逍遥宫甘露殿連房數百觀門相交鑿天河渠引入宫晉宫閣名曰洛陽有洪德苑靈崑苑平樂苑河南十二境簿曰河南縣有鹿子苑洛陽城西有桑梓苑孟子曰齊宣王問孟子曰文王之囿方七十里有諸何其大也孟子曰民猶以爲小也王曰寡人囿方四十里民以爲大何故曰文王之囿芻蕘雉兎者徃焉與民同之民以爲小冝矣王之囿殺麋鹿者如殺人之罪是以四十里爲穽於國中也民以爲大不亦冝乎吕氏春秋曰昔先王之爲苑囿園池足觀望勞形而巳矣非好儉節乎性也陶季直京都記曰覆舟山周廻二十里有林名白水苑又曰建康縣北呉朝爲桂林苑南朝宫苑記曰樂游苑在覆舟山南北連山築臺觀苑内起正陽林光等殿又曰桂林苑在落星山之陽呉都賦云數軍實于桂林之苑即此也又曰芳林苑一名桃花園夲齊髙帝舊宅在廢東府城東邊秦淮大路北齊王融作曲水詩序載懷平浦乃睠芳林即此也又曰南苑在臺城南鳯臺山宋孝武以南苑地給張永云且給三百年期訖更啓即此也渚宫故事云湘東王於子城中造湘東苑穿地構山長數百丈植蓮蒲縁岸雜以竒木其上有通波閣跨水爲之南有芙蓉堂東有禊飲堂堂後有隱士亭北有正武堂堂前有射堋馬埓其西有郷射堂堂安行堋可得移動東南有連理太清𥘉生此連理當時以爲湘東踐祚之瑞北有映月亭脩竹堂臨水齋前有髙山山有石洞潛行宛委二百餘歩山上有陽雲樓極髙峻逺近皆見北有臨風亭明月樓顔之推云屢陪明月宴並將軍扈義熈所造三輔黄圖曰宫二觀十四在甘泉苑垣内甘泉苑起仙人觀石虎鄴中記曰鄴城西三里桑梓苑有宫臨漳水凡此諸宫皆夫人侍婢又並有苑囿養獐鹿雉兎虎數遊宴其中西京雜記曰廬陵王胥有勇力恒於別囿學格熊羆後遂能空手搏之又曰樂遊苑自生玟瑰樹樹下多苜蓿又曰文帝爲太子立思賢苑以招賔又曰梁孝王好宫室苑囿之樂作矅華之宫築兎園園中有白室山山上有膚寸石落猿巖棲龍岫又有鴈池池間有鶴洲鳬渚宫館相連延亘數里竒果異樹瑰禽怪獸靡不畢備王與宫人賔客弋釣其中韓子曰秦大飢應侯請發五苑果棗栗以活民王曰秦法賞有功誅有罪令發五苑是有功無功俱賞也禮稽命徴日外内之制各得其所四方之事無有畜滯則麒麟遊囿六畜繁多天苑有德星應白虎通曰苑囿所以在東方何苑囿養萬物者也東方所以生也戰國䇿曰張儀說韓王曰大王不助秦鴻臺之宫樂林之苑非韓之有也拾遺記曰黄帝爲養龍之囿洞冥記曰北及玄坂去空同十七萬里日月不至其地自明有紫河萬里流沬千丈中有寒荷霜下方香茂也北有潰陽之山有兎如䑕能飛毛色光如􅃮以腦和丹食則不死帝使放兎於昭祥苑苑在甘泉宫西周千里萬國獻異物皆集此中三輔黄圖曰甘泉苑起仙人觀縁山谷行至雲陽三百八十里入右扶風周廻五百四十里兩京記曰東宫有九殿禁苑在宫城之北苑中有四面監分掌宫中種植及修緝又置苑惣監都統並屬司農寺又曰東都苑隋曰㑹通苑又改爲芳華又曰神都苑周廻一百二十六里東面七十里南面三十九里西面五十里北面二十四里司馬相如封禪文曰般般之獸樂我君囿太平御覽卷第一百九十六
