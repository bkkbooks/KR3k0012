  text: 太平御覽卷第八十五
  hash: sha256:6d2d4fbb0b6706ec82e9e188fa014a64db576f38d67fe5dcc8cc2eab99ca53e1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_085-1a}
body:
  text: 皇王部十周康王昭王穆王㳟王懿王孝王夷王厲王宣王幽王平王桓王莊王僖王惠王襄王頃王匡王定王簡王靈王景王悼王敬王元王貞定王哀王思王考王威烈王安王烈王顯王慎靚王赧王周康王紀年曰成康之際天下安寜刑措四十餘年不用帝王世紀曰康王元年釋䘮冕作誥申諸侯命畢公作筞分民之居里于成周之郊王在位二十六年崩子瑕代立是謂昭王述異記曰廬山上有康王谷巔有一城號爲劉城天每欲雨輙聞山上鼓角笳簫之聲聲漸至城而風雨晦合時人以爲常候傳云此周康王之城康王愛竒好異廵歷名山不逺而至城中每得古器大鼎及弓弩金之屬知非常人之所處也而山有康王之號城又以釗爲稱斯言將有徴昭王傳曰齊侯伐楚楚子使與師言管仲對曰爾貢苞茅不入王祭不供無以縮酒寡人是徴昭王南征不復寡人是問對曰貢之不入寡君之罪也敢不供給昭王之不復君其問諸水濵昭王時漢水非楚境故不受罪也帝王世紀曰昭王在位五十一年以德衰南征及濟于漢舡人惡之乃膠船進王王御船至中流膠液解王及祭公俱没水而崩其右辛游靡長臂且多力拯得王周人諱之王室於是乎大微王娶於房曰房后生太子滿代立是謂穆王漢上記曰咋額至横桑三十里桑字本作䘮辛㳺靡取昭王䘮處吕氏春秋曰周昭王親征荆髙誘注曰秦莊王名楚故曰荆還及渉漢梁敗王杜於漢中杜尤粉切䚯墜也辛餘靡振王北濟穆王歸藏曰昔穆王天子筮出於西征不吉曰龍降於天而道里脩逺飛而中天蒼蒼其羽傳曰穆王有塗山之㑹周穆王㑹諸侯於塗山又曰昔穆王欲肆其心周行天下將必皆有車轍馬跡焉祭父作祈招之詩以止王心王是以獲殁於祗宫史記曰穆王即位春秋巳五十矣而王道衰微王將征犬戎祭公謀父諌不可王遂征之得四白狼四白鹿以歸自是荒服者不至諸侯有不睦者甫侯言於王作脩刑辟命曰甫刑穆王立五十五年年一百五歳而崩子恭王翳扈立穆天子傳曰天子北征乃絶漳水郭璞注日絶猶截也水今在鄴縣也於是即井鈃山之下即井鈃山也今在常山石邑縣鈃音刑癸未雨雪天子獵于鈃山之西河河山足坡乃至于崑崙之丘以觀春山之寳乃披圗視典用觀天子之寳器省河所出禮圗玉果石似美玉所謂如果者也璿珠璿玉類也音琁燭銀有精光如燭也黄金之膏金膏亦猶玉膏皆其精汋宿於崑崙之阿赤水之陽崑崙山有赤水東北流見山海經也升于崑崙之丘以觀黄帝之宫黄帝巡遊四海登崑崙山而起宫室其上見新涪也天子北征舎乎珠澤此澤出珠乃因名之今越舊平舊岀青海北昇于舂山之上以望四野曰春山是惟天下之髙山者也癸丑天子乃遂西征吉日甲子天子賔于西王母西王母如人虎齒蓬髪載勝善嘯紀年曰穆王十七年西征于崑崙之丘見西王母其年辛丑來賔于昭宫乃執白珪玄璧以見西王母執贄者致敬也獻錦組百純乙丑天子觴西王母于瑶池之上西王母爲天子謡謡徒歌也曰白雲在天山陵自岀道里悠逺山川間之將子無死將請尚能復來尚庶幾也巳酉天子飲于溽水之上音汗溽也六師之人畢至于曠原乃奏廣樂六師之人翔畋于曠原翔猶遊也得獲無疆無疆猶無限也鳥獸絶群言取盡也帝王世紀曰穆王修德教㑹諸侯於塗山命吕侯爲相或謂之甫侯五十一年王巳百歳老耄以吕侯有賢能之德於是乃命吕侯作吕刑之書五十五年王年百歲崩于祗宫楊子法言曰周穆少不好學至乎耄長抱朴子曰周穆王南征一軍盡化君子爲猨爲鵠小人爲蟲爲沙恭王帝王世紀曰恭王能庇昭穆之闕故春秋稱之周自恭至夷王四世年紀不明是以曆依魯爲正王在位二十年崩子堅代立懿王史記曰懿王時王室遂衰懿王在位二十五年崩恭王弟辟方立是爲孝王帝王世紀曰懿王二年徙都犬丘孝王史記曰孝王在位十五年崩諸侯復立懿王太子變是爲夷王夷王禮曰禮天子不下堂而見諸侯下堂而見諸侯天子之失禮也由夷王巳下也史記曰夷王崩子厲王胡立紀年曰夷王二年蜀人吕人來獻瓊賔于河用介珪三年王致諸侯烹齊哀公于鼎帝王世紀曰夷王即位諸侯來朝王降與抗禮諸侯德之三年王有惡疾愆于厥身諸侯莫不並走群望以祈王身十六年王崩厲王史記曰厲王即位三十年好利近榮夷公大夫芮良諌王不聽卒以榮爲卿士用事王行暴虐侈傲國人謗王召公諌曰民不堪命王怒得衛巫使監謗以告則殺之諸侯不朝三十四年王益嚴國人莫敢言道路以目三年相與叛襲厲王出奔于􅮿太子靜匿召公之家國人聞乃圍之召公以其子代太子竟得脫召公周公二人相共行政號曰共和共和十四年厲王死于彘太子静長於召公家二相乃共立之是爲宣王帝王世紀曰厲王荒沉于酒淫於婦人宣王史記曰宣王即位二相輔之修政法文武成康之遺風諸侯復宗周十二年魯武公來朝宣王不脩籍於千畒虢文公諌曰不可王弗聽三十九年戰于千畒王師敗績于姜戎王在位四十六年崩子幽王宫涅立帝王世紀曰宣王元年以邵穆公爲相秦仲爲大夫誅西戎是時天大旱王以不雨遇灾而懼整身修行欲以消去之祈于群神六月乃得雨大夫仍叔美而歌之今雲漢之詩是也是歲西戎殺秦仲王於是進用賢良樊仲山父尹吉父程伯休父虢文公申伯韓侯顯父南仲方叔仍叔邵穆公張仲之屬並爲卿佐自厲王失政獫狁荆蠻交侵中國官政墮廢百姓離散王乃脩復宮室納規諌安集兆民命南仲邵虎方叔吉父並征定之復先王境土繕車徒興畋狩禮天下喜王化復行號稱中興墨子曰周宣王殺杜伯不辜杜伯曰死若有知三年必使君知之宣王田於圃田從人滿野日中杜伯乗白馬素車朱衣朱冠手執朱弓挾朱矢射王而中其心折脊伏㢰而死從者莫不聞見幽王國語曰幽王之二年西周三川皆震伯陽父曰周將亡矣夫天地之氣不失其序若過其序民亂之也陽伏而不能出隂迫而不能蒸於是有地震今三川寔震陽失其所而鎮於隂也史記曰幽王得褒姒而篤愛之乃欲廢后并太子用褒姒爲后以其子伯服爲太子褒姒爲人不好笑恱之萬方猶不笑幽王爲烽燧火鼔㓂至則舉烽火於是諸侯悉至至而無㓂褒姒乃大笑幽王恱之爲數舉烽火其後諸侯不信並不至幽王以虢石父爲卿用事國人皆怨之石父爲人佞巧善䛕好利今王用之幽王之廢后去太子也申侯怒乃與繒西夷大戎共攻幽王王舉烽火徵兵兵莫至遂殺幽王驪山之下虜褒姒盡取周之財而去於是諸侯乃即申侯而共立故太子冝臼是爲平王以奉周祀平王乃東徙洛邑避戎㓂也幽王在位凡一十一年紀年曰幽王立褒姒之子伯盤以爲太子瑣語曰宣王之元妃獻后生子不恒朞月而生后弗敢舉天子召問群王之元史史皆荅曰若男子也身體有不全諸骨節有不備者則可身體全骨節備不利於天子也將必䘮邦天子曰若而不利余一人命棄之仲山父曰天子年長矣而未有子或者天將以是棄周雖棄之何益天子弗棄之平王史記曰平王之時王室微弱而諸侯以強并弱齊楚秦晉始大政由方伯五十一年平王崩太子泄父早死立其子林是爲桓王桓王平王孫也帝王世紀曰平王元年鄭武公爲司徒與晉文侯股肱周室夾輔平王率諸侯戮力一心東遷洛邑桓王史記曰桓王在位二十三年崩子莊王他立帝王世紀曰桓王旣失於信禮義陵遲男子淫奔䜛僞並作諸侯背叛構怨連禍九族不親故詩人刺之莊王史記曰莊王四年周公黒肩欲殺莊王而立王子克辛伯告王王殺周公王子克奔燕十五年莊王崩子僖王胡齊立僖王史記曰僖王三年齊桓公始霸五年僖王崩子惠王閬立帝王世紀曰僖王自即位以來變文武之制作玄黃華麗之飾宫室峻而奢侈故孔子譏焉五年王崩子凉洪代立惠王傳曰有神降於莘惠王問内史過曰是何故也對曰國興明神降之監其徳也將亡神又降之觀其惡也故有得神以興亦有以亡虞夏商周皆有之史記曰𥘉莊王嬖姬姚生子頽有寵及惠王即位奪其大臣蔿國之田以爲囿故大夫邊伯等五人作亂謀召燕衛之師伐惠王惠王奔温居鄭之櫟立僖王弟子頽爲王遂享諸大夫樂及徧儛虢君怒四年鄭與􅉑君殺子頽復立惠王惠王在位二十五年崩子襄王鄭立襄王史記曰襄王母蚤死後母曰惠后后生叔帶有寵襄王畏之三年叔帯與戎翟謀伐襄王襄王欲誅叔帶叔帶奔齊齊桓公使管仲平戎于王十五年王以翟師伐鄭王德翟人將以其女爲后冨辰諌不聽十六年王絀翟后翟人來誅殺譚伯冨辰曰吾數諌不從乃以其屬死之𥘉惠后欲立王子帶故以其黨開翟翟人遂入周襄王出奔於鄭鄭居於汜子帶立爲王取襄王所絀翟后與居温十七年襄王乃告急於晉晉文納王而誅叔帶襄王於是賜晉文公秬鬯弓矢爲伯以河内地與晉二十年晉文公又召襄王襄王㑹之河陽書曰天王狩于河陽三十二年襄王崩子頃王壬臣立頃王史記曰頃王六年崩子匡王班立匡王史記曰匡王六年崩弟瑜代立是爲定至定王史記曰定王元年楚伐陸渾之戎次於洛使人問九鼎之重輕王使王孫滿應設以辭楚兵乃去二十一年定王崩子簡王夷代立簡王史記曰簡王十三年晉殺其君厲公迎子周於周立之爲悼公十四年簡王崩子靈王泄心立靈王傳曰王子朝使告于諸侯曰定王六年秦人降祓曰周其有頿王亦克能脩其職至于靈王生而有頿王甚神聖無惡於諸侯國語曰靈王二十年榖雒鬪將毁王宫賈逵注日榖雒二水合有似鬪洛在王城南榖在城北者王欲壅之太子晉諌曰不可晉聞古之長民者不墮山不崇藪不竇澤竇决出夫山土之聚也藪物之歸也川氣之導也澤水之鍾也天地成聚於髙歸物於下䟽爲川谷以導其氣陂塘汙原以鍾其美聚萬物合之美大也伯屬封崇九山决汨九川陂障九澤豐殖九原故天無伏隂地無散陽觀之詩書與民之憲言則皆亡王之爲也王其圖之王卒壅之亂於是始史記曰靈王在位二十七年崩子景王貴立景王傳曰天王將鑄無射周景王也無射鍾名泠州鳩曰王其以心疾死乎泠樂官州鳩其名也夫樂天子之職職主也夫音樂之輿也樂因音而行而鍾音之器也音由器以發天子省風以作樂省風俗作樂以移之器以鍾之鍾聚之與以行之樂須音而行小者不窕窕細也他彫切大者不槬槬横大不入也音畫則和於物物和則嘉成喜樂成也故和聲入於耳而和於心心僖則樂僖安也窕則不咸不充滿人心大則不容心不堪容心是以感感實生疾今鍾摦矣王心弗堪其能乆乎史記曰景王太子聖而早卒王愛子朝欲立之㑹崩子丐之黨與争立國人立長子猛爲王子朝攻殺猛猛爲悼王晉人攻子朝而立丐是爲敬王帝王世紀曰景王遇心疾崩于榮錡氏單穆公與劉文公立太子猛是爲悼王景王在位二十五年悼王帝王世紀曰悼王以景王二十五年四月始即位十一月崩王立凡二百日故春秋稱王子猛卒不成䘮故不言天王崩也立王母弟是爲敬王敬王史記曰晉定公遂入敬王于周四十三年敬王崩子元王仁立元王史記曰元王八年崩子定王介立貞定王史記曰定王十六年三晉滅智伯分其地二十八年崩子去疾立是爲哀王皇甫謚日貞定王哀王帝王世紀曰哀王即位三月弟叔襲殺王而立是爲思王思王帝王世紀曰思王即位五月弟隗攻殺王而代立是爲考哲王考王史記曰考王十五年崩子威烈王午立威烈王帝王世紀曰威烈王崩子躭立是爲元安王安王史記曰安王立二十六年而崩子烈王喜代立帝王世紀曰安王子喜立是爲烈王烈王史記曰烈王十年崩弟扁立是爲顯王顯王史記曰顯王三十五年致文武昨於秦惠王四十四年秦惠王稱王其後諸侯皆爲王四十八年顯王崩子慎王定立帝王世紀曰顯王元年趙成侯韓哀侯來攻周二年西周威公之嗣曰惠公始封惠公少子班於鞏以奉王是爲東周惠公周於是始分爲東西王微弱政在西周慎靚王帝王世紀曰慎靚王六年崩子延代立是爲𧹞王赧王史記曰東西周分治赧王徙都西周五十九年秦攻西周王奔秦頓首受罪盡獻其邑三十六口三十萬秦受其獻而歸其君於周周王赧卒周民遂東亡秦取九鼎寳器而遷西周公於􅓆音憚狐後七歳秦莊襄王滅東西周皆入於秦周旣不祀旣盡也漢書曰幽平之後日以陵夷至乎﨑嶇河洛之間分爲二周然天下謂之共主雖後微弱猶云以爲主強大弗之敢傾歷載八百餘年數極德盡曁於𧹞王降爲庶人號位以絶於天下尚枝葉相持莫得居其虚位四海亡主三十餘年帝王世紀曰𧹞王二十七年冬十月秦昭襄王仍僣號西帝齊閔王稱東帝十一月齊各復去帝號爲王四十五年王如秦得罪於秦秦攻周或說秦王乃止王雖居天子之位爲諸侯之所侵逼與家人無異多貰於民無以歸之乃上臺以避之故周人因名其臺曰逃債之臺洛陽南宫謻臺謻音夷又音尸移切是也五十九年秦攻韓魏趙大破之玉懼乃背秦與諸侯合從將天下銳師出伊門攻秦秦昭襄王大怒使將軍摎音虬攻周王王恐乃入秦頓首受罪盡獻其邑秦盡納其獻使赧王歸于周降爲庶人以夀終王逸正部曰幽厲禮樂崩壊諸侯力政轉相吞滅德不能懐威不能制至於王赧遂䘮王計太平御覽卷第八十五
