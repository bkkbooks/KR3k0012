  text: 太平御覽卷第三十八
  hash: sha256:a7128a552d54372bffc48225cbb6b3da3d06701b0609382660ec3efc8369e736
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_038-1a}
body:
  text: 地部三叙山崑崙山鍾山玉山蓬萊山方丈山瀛洲山終南山叙山釋名曰山頂曰冢亦曰巓亦曰椒山脊曰罔山大而髙曰嵩嵩髙稱也令中岳嵩山蓋依此亦作崧小而髙曰岑銳而髙曰嶠卑而大曰扈小而衆曰巋上大下小曰巘山有草木曰岵音户無草木曰垓古來切石載土曰岨土載石曰崔嵬此因形而名之山東曰朝陽山西曰夕陽隨日照而名之山足曰麓山穴曰岫山邊曰崖崖之髙曰巖上秀曰峯陬隅髙者曰􅯀山坡曰坂山三襲曰陟山再成曰莫一成曰坯山中絶曰陘未及上曰翠微一說山氣青縹色曰翠微山屬曰嶧言駱驛相連今魯國有嶧山絶石相積搆連屬成山盖謂此也山狹而髙曰巒小曰嶞它果反謂山形長狹者荆州人謂之巒詩云墮山喬岳土山曰阜阜厚也言其髙厚曲阜曰阿大阜曰陵小陵曰丘山精曰夔亦曰跂亦曰雲陽祭山曰屐懸角毁反自山頂曰冢巳下並出說文釋名爾雅易曰兼山艮又曰地中有山謙又說卦曰山澤通氣又曰艮爲山詩曰如南山之壽不騫不崩又曰節彼南山楊义易卦序論云險而止山也險而動泉也動静皆蒙險故曰山書禹貢曰道汧及𡵨至于荆州踰于河孔安國注曰此謂梁山龍門也壷口雷首至于太岳三山在兾州南河之地也大行恒山至于碣石入于海此二山者連延東北接碣石而入滄海百川經此衆山禹皆治之也不可勝名故以滄海山川言之也西傾朱圉鳥䑕西傾朱圉在積石以東鳥䑕謂所出在隴西三者雍州之南至于太華相首尾而東也熊耳外方桐栢至于陪尾四山相東南在豫州洛經熊耳經方外淮南桐栢經陪尾凢此皆先舉所施功之山於上而後條列所治水于下以相備也導嶓冢至于荆山漾山嶓冢在梁州經荆山荆山在荆州也内方至于大別内方大別二山名在荆州漢所經岷山之陽至于衡山泯山江所出在梁州衡山江所經在荆州春秋曰山有木工則度之禮記曰今夫山一拳石之多及其廣大草木生之禽獸居之寳藏興焉又曰天子祭名山大川五岳視三公視視其牲器之數又曰天不愛其道地不愛其寳人不愛其情故山出器車又曰居山不以魚鱉爲禮爾雅曰土髙有石曰山釋名云山産也言産萬物說文曰山宣也宣氣散生萬物有石而髙春秋元命苞曰山者氣之苞所以含精藏雲故觸石而出春秋說題辭曰山之爲言宣也含澤布氣調五神也韓詩外傳曰夫山萬人之所觀仰材用生焉寳藏植焉飛禽萃焉走獸伏焉育物群而不倦有似夫仁人志士是仁者所以樂山也尚書大傳曰孔子曰夫山者嵬嵬然草木生焉鳥獸蕃焉財用殖焉四方皆無私與焉出雲雨以通乎天地之間隂陽和合雨露之澤萬物以成百姓以饗此仁者之樂于山也國語曰禹封九山山者土之聚也河圖曰嶓冢山上爲狼星武開山爲地門上爲天髙星主囹圄荆山爲地雌上爲軒轅星大別爲地理以天合地以通三危山在鳥獸之西南上爲天范星歧山在崑崙東南爲地乳上爲天麋星汶山之地爲井絡帝以㑹昌神以建福上爲天井桐栢山爲地穴鳥䑕同穴山之幹也上爲掩畢星熊耳山地門也精上爲畢附耳星莊子曰凾車之獸分而離山不免網罟之患又曰山積卑而成髙管子曰凢天下名山五千三百七十出鐡之山三千六百有九上有丹砂者下有黄金上有磁石者下有銅金上有緑石者下有鈆錫上有赭下有鐡淮南子曰牛蹄之涔無徑尺之鯉魅父之山無文林營宇狹小而不能容巨大也孫卿子曰不登髙山不知天之髙不臨深谿不知地之厚不聞先王之道不知學問之爲大吕氏春秋曰何謂九山㑹稽泰山㑹稽今㑹稽也泰山今泰山郡是爲東岳也王屋首山泰華𡵨山太行羊腸孟門𡵨山在右扶風美陽縣西北周家所邑也太行在河内野王縣北羊賜其山盤紆如羊腸狀在太行晉陽北孟門太行是說苑曰土積成山則豫章生焉又曰五嶽者何謂也泰山東嶽也霍山南嶽也華山西嶽也恒山北嶽也嵩髙山中嶽也五嶽何以視三公能大布雲雨焉能大歛雲雨焉觸石而出膚寸而合不崇朝而雨天下施得愽大故視三公也白虎通曰東岱山岱者言萬物相代於東方南衡山者上承景宿銓徳均物故曰衡也西華山華者獲也萬物熟成乃有獲也北恒山恒常也言萬物伏藏於北方有常度也中嵩山嵩者髙也言峻大矣處中以領四方地鏡曰入名山必齋五十日牽白犬抱白雞以白塩一升山神大喜芝草異藥寳玉爲出未到山百歩呼曰林兵此山王主者名知之却百邪關令尹喜内傳曰五百歲天下名山一開開時金玉之精涌出晏子春秋曰齊大旱景公召群臣問曰天下不雨矣民且有飢色吾卜旅在髙山廣澤寡人欲祠靈山可乎晏子曰夫靈山以石爲身以草木爲毛髮天不雨髪毛將焦身將熱獨不欲雨乎祠之何益山海經曰周穆王周歴四荒名山大川靡不登躋東昇天夫之堂西宴王母之廬列子傳曰共工與顓頊争天下怒而觸不周山魏志曰明帝起景陽山於芳林園晉書顧凱之好遊㑹稽人問山川之美對曰千巖競秀萬壑争流宋書曰謝靈運好登山常着木屐上山則去前齒下山則去後齒漢書曰李廣利刺山而泉涌楚詞曰山中兮不可以乆留古詩曰上山採蘼蕪下山逢故夫崑崙山爾雅曰西北之美者有崑崙之璆琳琅玕焉史記曰禹本紀言河出崑崙其上有澧泉華池漢書曰張安丗房中歌詩云天馬來兮開逺門竦余身兮遊崑崙愽物志曰崑崙從廣萬一千里神物集也出五色雲氣五色流水其白水東南流入中國名爲河也河圖括地象曰崑崙之山爲地首上爲握契滿爲四瀆横爲地軸上爲天鎭立爲八柱河圖始闔圖曰崑崙之墟有五城十二樓河水出四維多玉龍魚河圖曰崑崙山天中柱也紀年曰周穆王十七年西征至崑崙丘見西王母穆天子傳曰天子昇於崑崙之丘以觀黄帝之宫増封於崑崙山上又曰天子遂宿于崑崙之阿赤水之陽山海經曰周穆王至崑崙之丘遊軒轅之宫晀鍾山之嶺勒石西王母之山紀迹玄圃之上又曰槐江之山實惟帝之平圃南望崑崙其光熊熊有木焉其狀如棠而黄華赤實其味如李而無核名曰沙棠食之令人不溺草之美者沙棠之實又曰崑崙之墟方八百里髙萬仞上有木木長五㝷大五圍面有井以玉爲檻檻欄面有五門門有開明獸守之百神所在又曰崑崙之丘有神人面虎身文尾其下有弱水泉徐整長暦曰北斗當崑崙上眞人關尹内傳曰萬億萬歳有一大水崑崙飛浮是時飛仙迎取天王及善民安之山上也葛仙公傳曰崑崙山一日玄圃臺一曰積石瑶房一曰閬風臺一曰華蓋一曰天柱皆仙人所居列仙傳赤松子者神農時雨師也服水石以教神農能入火不燒至崑崙山止常上西王母石室中隨風雨上下炎帝少女追之亦得仙俱去至髙辛時復爲雨師今之雨師是也又曰西王母者神人也人面蓬頭髪虎爪豹尾善肅空居名西王母在崑崙山下神仙傳曰東郭延者山陽人也服雲飛散能夜書有數十人乗虎豹來迎比隣盡見之與親友辭別而去云詣崑崙山神異經曰崑崙有銅柱焉其髙入天所謂天柱也圍三千里貟周如削銅柱下有屋壁方百丈搜神記曰崑崙之山是惟帝之下都環以炎火山十洲記曰昆陵崑崙山也上有金臺玉闕亦元氣之所合天帝君治處玄元記曰崑崙西南山周廽三萬里巨虵繞之得三周虵長九萬里尸子曰赤縣州者寔爲崑崙之墟玉紅之草生焉食其一實而醉卧三百歲而後寤吕氏春秋曰菜之美者有崑崙之蘋也淮南子曰崑崙山上有層城九重上有木禾其條五㝷珠樹玉琔樹不死樹在其西沙棠琅玕在其東綘樹在其南瑶樹在其北又曰崑崙之玉瑱而塵垢不能污也抱朴子曰蔡誕者自云𬒳謫至崑崙𥘉誕還人問云崑崙似何荅曰天不問其髙幾里要於仰視之去天過十數里也崔鴻十六國春秋前趙録曰東平王劉約癸亥卒一指猶暖遂不殯殮至於甲戍乃蘇言見劉淵於不周山經五日遂復從至崑崙山三日而復返於不周見諸王公卿將死者悉在焉又曰酒泉太守馬岌上言酒泉南山卽崑崙之體也周穆王見西王母樂而忘歸卽在此山山有石室王母堂珠璣鏤飾煥若神宫鍾山穆天子傳曰自密山以至鍾山四百六十里其閒盡澤多怪獸奇魚又曰天子北昇于春山之上望四野郭璞注曰春音鍾也曰是惟天下之髙山山海經曰黃帝取密山之玉筞投之鍾山之陰以爲玉鍾又曰鍾山其子曰鼓此亦神名名之爲鍾山之子耳其類皆見歸藏啓筮也其狀人面而龍身帝乃戮之鍾山之東也又曰鍾山之神名曰燭陰燭龍也是燭九陰也視爲晝瞑爲夜吹爲冬呼爲夏魯女生列傳曰鍾山之棗其大如缾十洲記曰北海外有鍾山自生千芝及神草此洲受太玄生符録仙家數十萬耕田種芝草課計頃畝種稻玄中記曰北方有鍾山焉山上有石首如人首左目爲日右目爲月開左目爲晝開右目爲夜開口爲春夏閉口爲秋冬淮南子曰鍾山之玉灼之以鑪炭三日三夜其色不變論衡曰鍾山之上以玉抵鵲彭蠡之濵以魚食犬玉山穆天子傳曰天子西征來還乃循黑水至于群玉之山天子於是取玉板玉器服物載玉萬候雙玉爲珏羊壁爲候見左傳山海經曰玉山是西王母所居此山多玉石因以爲名帝王世紀曰崑崙之北玉山之神人身虎首豹尾蓬頭外國圖曰西王母國前弱水中有玉山白兎闞駰十洲記曰赤水西有白玉山山有西王母堂室蓬萊山漢書王莽傳曰有竒士大十圍自言巨無霸出於蓬萊山軺車不能載三馬不能勝又武記曰太𥘉元年十二月祀后土東臨渤海望祀蓬萊十洲記曰蓬萊山外别負海謂之溟海無風而洪波百丈有九氣丈人九天眞君宫玄中記曰東南之大者有巨鼇焉以背負蓬萊山列子曰渤海之東有大海其中有山一曰岱輿二曰貟嶠三曰方壺四曰瀛州五曰蓬萊其上臺觀皆金玉禽獸皆純縞珠玕之樹皆聚生實皆有滋味食之不老不死人皆仙聖一日一夕飛翔來徃山海經曰蓬萊山海中之神山非有道者不至列仙傳曰安期生琅琊阜郷人時人皆言千歲秦始皇與語賜金壁數千萬岀阜郷亭皆置去留以赤玉舄一量爲報曰後千歲求我蓬萊山下又曰負局先生語似燕岱間人吴市中摩鏡一錢因摩之輙問主人得無有疾苦輙出紫赤藥與之莫不時愈後上吴山懸藥下與萬姓欲去時語下人曰吾欲還蓬萊山神仙傳麻姑謂王方平曰自接侍巳來三見海水變爲桑田蓬萊之清淺也方丈山漢書曰太液池有方丈瀛洲象海中神山焉仙傳曰服閭者不知何許人常止莒徃來海邊諸祠中有三仙人於祠中博賭瓜使服閭檐黄瓜十枚令瞑目乃止方丈山在蓬萊山南時徃莒取珎寳賣之瀛洲山史記封禪書曰齊宣王燕昭王使人求蓬萊方文瀛洲此三神山傳在海中去人不逺望之如雲中及至則三山返在水下欲至則風引舡而去莫能至者仙人不死藥皆在焉黄金白銀爲宫闕終南山書曰終南惇物至於鳥䑕謂終南惇物二山西出至于鳥鼠山詩曰終南何有有條有枚漢書曰太一山又爲終南山五經要義太一山在扶風武功縣則終南太一不得爲一山明矣蓋終南南山之惣名太一山之別號唐書曰盧藏用𥘉隱終南山後出仕道士司馬子微歸天台山群公祖道藏用指終南山曰此中甚有佳處何必天台子微曰以吾觀之此乃仕宦之捷徑尓藏用有慙色又曰文宗開成二年詔曰毎聞京師舊說以爲終南山興雲祈必有雨若晴霽雖宻雲至他竟不霑濡况兹山北面闕庭日當息觀脩其望祀寵數冝及今聞都無祠宇終南山未備禮秩命有司即時建立關中記曰終南山一名中南言在矢中居都之南也又曰終南太一左右三十里内名福地皇甫謐髙士傳曰四皓共入啇洛隱地肺山以待天下定漢髙祖徴之不至乃深自匿終南山辛氏三秦記曰太一在驪山西去長安二百里山之秀者也中有石室常有一道士不食五糓自言太一之精齋㓗乃得見之其狀似仙人山一名地肺可避洪水俗云上有神人乗舡行追之不可及方輿記曰東方朔謂天之大阻其終南多金銀鐡玉石樟檀異類之物此百工取給萬姓所仰足也風土記曰王莽以皇后有子通子午道從杜陵直抵終南太平御覽卷第三十八
