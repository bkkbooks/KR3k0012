front:
  text: 太平衘覽卷第五百六十一
  hash: sha256:0ccf67de86174c7e21d20c19135674fd3a08271f8eabd745cc0b959b3f858739
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_561-1a}
body:
  text: 禮儀部四十弔周禮喪祝曰王弔則與巫前鄭司農注云喪祝與巫以桃茢執戈在王前又司巫曰男巫王弔則與祝前女巫后弔則興祝前女巫與况前后如王之禮又太僕曰太僕掌三公孤卿之弔勞王使徃也小臣掌士大夫之弔勞禮曰知生者弔知死者傷知生而不知死弔而不傷知死而不知生傷而不弔弔喪不能賵弗問其所費又曰將軍文子之喪旣除喪而後越人來弔主人深衣練冠待于廟垂涕洟子游觀之曰將軍文氏之子其庶幾乎亡於禮者之禮也其動也中中禮之變也又曰死而不弔者三謂輕身亡孝也畏人或時以非罪攻巳不能有以說之死之者孔子畏於國是也猒行止危險之下溺不乗橋舡又曰曽子弔於負夏負夏衛也主人旣祖填池祖謂移柩車去載處爲行始也填池當爲奠徹聲之誤奠遣奠設祖奠推柩而反之反於載處荣曽子弔欲更始降婦人而后行禮禮旣祖而婦人降今反柩婦人辟之復升堂矣柩無反而反之又降婦人盖欲矜賔於此婦人皆非也從者曰禮與怪之曽子曰夫祖者且也且未定之辝且胡爲其不可以反宿也曽子襲裘而弔子游禓裘而弔曽子指子㳺而示人曰夫夫也爲習於禮者如之何其禓裘而弔也又曰哀公使人弔蕢尚遇諸道辟於路畫宫而受弔焉哀公魯君也畫地爲宫象曽子曰蕢尚不如𣏌梁之妻知禮也齊莊公襲莒于奪𣏌梁死焉其妻迎其柩於路而哭之哀莊公使人弔之對曰君之臣不免於罪則將肆諸市朝而妻妾執肆陳尸也大夫以上於朝士以下於市執拘也君之臣免於罪則有先人之敝廬在君無所辱命無所辱命辝不受也春秋傳曰齊侯弔諸其室又曰季孫之母死哀公弔焉曽子與子貢弔焉閽人爲君禮弗内也閽人守門者曽子與子貢入於其厩而修容焉更鼎飾子貢先入閽人曰郷者巳告矣旣不敢止以言下之曽子後入閽人辟之見兩賢相隨彌益恭也渉内霤卿大夫皆辟位公降一等而揖之又曰殷旣封而弔周反哭而弔封當爲空窆下棺也孔子曰殷巳慤吾從周又曰曽子與客立於門側其徒趍而出徒謂客之旅曽子曰爾將何之曰吾父死將出哭於巷以爲不可發㓙於人館曰反哭於爾次次舎也禮館人使專之若其自有然曽子北面而弔焉又曰五十無車者不越疆而弔人氣力始衰又曰婦人不越疆而弔人不通於外行弔之日不飲酒食肉焉以全哀也弔於葬者必執引若從柩及壙皆執紼示助之以力車日引棺日紼喪公弔之必有拜者往謝之雖朋友州里舎人可也謂无主後弔曰寡君承事示亦爲執事來主人曰臨君辱臨其臣之喪君遇柩於路必使人弔之君於民臣有父母之恩大夫之喪庶子不受弔不以賤者爲有爵者主又曰子張死曽子有母之喪齊衰而徃哭之或曰齊衰不以弔以其無服非之曽子曰我弔也與哉於朋友哀痛甚而徃哭之非若凡弔又曰晉獻公之喪秦穆公使人弔公子重耳獻公殺其子申生重耳避難出奔是時在翟就弔之且曰寡人聞之亡國恒於斯得國恒於斯言在喪代之際雖吾子儼然在憂服之中喪亦不可乆也時亦不可失也孺子其圗之勸其反國意欲納之喪亡失位孺穉也以告舅犯舅犯是重耳之舅狐偃也字子犯舅犯曰孺子其辭焉喪人無寳仁親以爲寳寳謂善道可守者仁親親行仁義父死之謂何又因以爲利欲反國求爲後是利父死而天下其孰能說之孺子其辭焉說猶解也又曰羔裘玄冠夫子不以弔不以吉服弔喪也又曰衛司徒敬子死子夏弔焉主人未小歛絰而徃子㳺弔焉主人旣小斂出絰反哭子夏曰聞之也與曰聞諸夫子主人未改服則不絰又曰曽子問曰三年之喪弔乎孔子曰三年之喪練不群立不旅行君子禮以飾情三年之喪而弔哭不亦虚乎爲彼哀不專於其親也爲親哀則是妄弔又曰諸侯非問疾弔喪而入諸臣之家是謂君臣爲謔又曰弔者即位于門西東靣其介在其東南北靣西上於西門賔立門外不當門主孤西面立於阼階下相者受命曰孤某使某請事客曰寡君使某如何不淑受命受主人命以出也不言殯者䘮無接賔淑善也如何不善言君痛之甚使某弔相者入告出曰孤某湏矣稱其君名者君薨稱子某使人知通嗣也湏矣不出逆也弔者入主人升堂西靣弔者升自西階東靣致命曰寡君聞君之喪寡君使某如何不淑子拜稽顙弔者䧏反位子孤子也降反位者出反門外位又曰婦人非三年之喪不踰封而弔踰封越竟也或爲越疆又曰諸侯弔於異國之君則其君爲主君爲之主弔臣恩爲巳也子不敢當主中庭北面哭不拜諸侯弔必皮弁錫衰所弔雖巳葬主人必免主人未喪服則君亦不錫衰必免者尊人君爲之慶也未䘮服未成服也旣殯成服又曰殷人弔於壙周人弔於家示民不偝也旣葬哀而哭踊於是弔之傳曰宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔對曰孤實不敬天降之災又以爲君憂拜命之辱臧文仲曰宋其興乎禹湯罪巳其興也勃焉桀紂罪人其亡也忽焉又曰齊侯歸遇𣏌梁之妻於郊梁戰死妻行迎䘮使弔之辭曰殖之有罪何辱命焉言若有罪不足弔若免於罪則有先人之敝廬在下妾不得與郊弔婦人无外事故下猶賤也齊侯弔諸其室傳善婦人有礼又曰㳺吉相鄭伯以如晉亦賀虒祁也史趙見子太叔曰甚哉其相蒙也蒙欺也可弔也而又賀之子太叔曰若何弔也豈特唯我賀將天下實賀又曰琴張聞宗魯死琴張孔子弟子字子開名牢將徃弔之仲尼曰齊豹之盗而孟縶之賊女何弔焉言齊豹所以爲盗孟縶所以見賊背由宗魯又曰晉頃公卒秋八月葬鄭游吉弔且送葬魏獻子使士景伯詰之曰悼公之喪子西弔子蟜送葬在家十五年今吾子無二何故漢書曰龔勝死有老父來弔其哭甚哀旣而曰吁薫以香自燒膏以明自消龔生竟夭天年非吾徒也又曰蔣許自元卿遭父憂有弔者盈門後母疾之不與席不得止舊廬於側作小菴徃如舊也續漢書曰郭太字林宗退身隱居教授徒衆甚盛喪母友人或千里來弔之東觀漢記曰祭遵病薨喪至河南詔遣百官皆詣喪所上車駕素服徃弔望城門舉音遂哭而至哀慟復幸城門遇喪車瞻望涕泣上親臨祠以太牢儀如孝宣帝臨霍將軍故事謝承後漢書曰徐孺子不就諸公之辟及有喪者萬里赴弔常於家預炙雞一隻以一兩綿絮浸酒中暴乾以褁雞徑到所赴冢遂以水漬綿使有酒氣以雞置前祭畢便去王隱晉書曰何劭爲司徒薨養子歧爲嗣袁粲弔歧歧辭以疾粲獨笑而出曰今年决下歧品王詮謂之曰知死弔死何必見生歧前多罪尓時不下今何公新亡便下歧品人謂中正畏強侮弱粲乃止也鄧粲晉紀曰阮藉能爲青白眼禮俗之士輙以白眼對之宗正嵇喜康之兄也聞藉喪弔焉籍以不哭見其白眼喜不懌而退也晉中興書曰周嵩兄顗旣𬒳害王敦便入弔嵩嵩曰亡兄天下之罪人爲天下所殺復何弔敦甚衘之家語曰季桓子死魯大夫朝服而弔子㳺問孔子曰禮乎孔子不荅他日又問孔子曰始死則羔裘玄冠者易之而已又何疑焉又曰孔子有母之喪旣練陽虎弔焉私於孔子曰今季氏將大饗鏡内之士聞諸乎曰丘弗聞之雖在衰絰亦欲與徃陽虎曰子謂不然乎季氏饗士不及子禮統曰弔生曰唁弔死曰弔生謂之唁何非有喪之位哭之事但嗟嘆以言故謂之嗟弔死謂之弔何弔者毒也致有恩厚禮無服属但致傷哀痛毒故謂之弔白虎通曰檀弓記曰天子哭諸侯爵弁純衣又曰遣大夫弔辭曰皇天降災子獨遭離之嗚呼哀哉莊子曰孔子圍於陳蔡之間七日不火食太公任弔之曰幾死乎曰然子悪乎曰然任曰直木先伐甘井先竭子其意者飾智以驚愚修身以明汙昭昭乎若掲日月而行故不免又曰莊子妻死惠子弔之則方箕踞鼓盆而歌曰察其始夲無生非徒無生也夲無形非徒無形也夲無氣變而有生今變而之死人且寢於巨室我噭噭隨而哭之自以爲不通乎命故止之又曰老聃死秦失弔之三號而出弟子曰非夫子之友耶曰然然則弔焉若此可乎曰然始也吾以爲其人也而今非也向吾入而弔焉有老者哭之如哭其子少者哭之如哭其母彼其所以㑹之必有不蘄言而言不蘄哭而哭者是遁天倍情忘其所受淮南子曰北塞上之人有喜遊者其馬無故亡入胡中人皆弔之其父曰此何知乃不爲福居數月其馬將胡駿馬而歸人皆賀之其父曰此何知乃不爲禍家冨良馬其子好騎隨馬而折髀人皆弔之其父曰此何知乃不爲福居一年胡夷大出丁壯者控弦而戰塞上之人死者十九此獨以跛之故子父相保符子曰陶之冨者朱公喪其中子隣人徃弔之朱公方擁膝蹲踞棒頭而笑隣人曰聞有喪將唁子之哀朱公曰生不致哀死而唁何隣人之不通也說苑曰孫叔敖爲楚令尹一國吏民皆來賀有老父衣麄衣冠白冠後來弔曰身已貴而驕人者民去之位巳髙檀權者君悪之禄已尊厚而不知足者患處之叔敖再拜敬受命願聞餘教父曰位已髙意益下官益髙而心益小禄已厚而慎不敢取君謹守此三者足以治楚矣丗說曰顧彦先性好琴及喪家人常以琴置靈床上張季鷹徃哭顧不勝其慟徑上床鼓琴作數曲意撫琴曰彦先頗復賞此不因又慟哭下執孝子手而去賀循喪服要記曰始弔朝玄端之服也皮弁絰素弁而加環絰也始死而徃朝服者主人未變賔未可以變也又曰古之弔者皆因朝夕哭而入弔賔至主人出即中門外西面北上拜賔入門即位於堂下當阼階西靣賔入即位皆哭哭止主人拜之又曰大夫弔於大夫始死而徃朝服禓裘如吉時也當歛之時而至則弁絰服皮弁之服以襲裘也主人成服而徃則皮弁絰而加錫衰也大夫於士有朋友之恩乃得弃絰謝兹喪服圗曰天王弔三公及三孤弁絰錫衰弔六郷弁絰錫衰弔大夫弁絰疑衰弔士弁絰緦衰弔畿内諸侯弁絰緦衰郭太別傳曰賈淑字子厚林亭郷人雖丗有冠冕而性險害邑里患之林宗遭母憂淑來弔之而鉅鹿孫咸直亦至咸直以林宗賢而受悪人弔心恠之不進而去林宗遽追而謝曰賈子厚誠㓙德然洗心同善仲尼不逆互郷故許其進也淑聞之改過自厲終成善士又林宗有母喪徐稚徃弔置生芻一束於廬前而去林宗曰此必南州徐孺子也詩不云乎生芻一束其人如王吾無德以堪之裴楷別傳曰裴楷少知名而風情朗悟𥘉陳留阮籍遭母喪楷弱冠徃弔籍乃離喪位神志晏然至乃縱情嘯詠傍若無人楷不爲改容行止自若遂便率情獨哭哭畢而退威容舉動無異陶侃傳曰侃丁母艱在墓下忽有二客來弔不哭而退儀服鱗異知非常人遣隨而看之但見雙鶴孤而冲天也列女傳曰魯黔婁先生之死曽子與門人徃弔焉隱門而入立於堂下其妻出衣褐𫀆曽子弔之上堂見先生尸在牗下枕墼席藁緼𫀆無表覆以布𬒳首足不盡歛覆頭則足見覆足則頭見皇覽逸禮曰君使大夫弔於國君禮錫衰裳弁絰有下大夫爲介亦如之士介者將命者緦衰裳弁絰異姓葛同姓麻語林曰陳元方遭父喪形體骨立其母哀之以錦蒙其上郭林宗往弔見錦𬒳而責之賔客絶百許日太平御覽卷第五百六十一
